body:
  text: 普濟方卷十明周王朱橚撰運氣圖少隂君火司天陽明燥金在泉中見太宫土運嵗土太過氣化運行先天熱化在上左黅化司氣右動化厥陰故天政所布其氣明辛化在下左藏化太陽右明化少陽故地氣肅而其令切寒交暑熱加燥雲馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其榖白丹熱化二雨化五燥化四所謂正化日也羽蟲介靜蟲育藏物之宜也毛蟲耗濕毒不生地氣所制也寒熱持於氣交而為病始熱病生於上清病生於下寒熱相犯而爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥胃心痛腰痛腹大嗌乾腫上是嵗火為天氣金為地氣火勝金天氣盈宜於年前先取化源以平火氣土運在中天氣生運運生地氣三氣相得而行順化其邪乃微必抑其運土資其嵗勝無使暴過而生其病食白丹之榖以全其真氣食間氣之榖以辟其虛邪嵗宜以醎耎之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之適氣異同而多少之運同地氣以溫熱化其化上醎寒中苦熱下酸熱藥食宜也嵗半之前少陰主之化熱若甚熱淫所勝即怫熱至火行其政民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本於肺診在手尺澤之脈其法平以醎寒佐以苦甘以酸收之歲半之後陽明主之陽明之氣燥淫於內即霿霧清暝民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱其為法治以苦溫佐以甘辛以苦下之氣交之中土運主之敦阜之紀是謂廣化厚德清靜順長以盈至隂內實物化充成煙埃朦鬱見於厚土大雨時行濕氣乃用燥政乃辟其化圎其氣豐其政靜其令周備其動濡積并稸其德柔潤重淖其變震驚飄驟其化兼其所勝其病腹滿四肢不舉故曰嵗土太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩寃甚則肌肉萎足痿不收行善瘈腳下痛飲發中滿食減四肢不舉變生得位藏氣伏化氣獨治之泉涌河衍涸澤生魚風雨大至土潰鱗見于陸病腹滿溏泄腸鳴反下甚而大溪絶者死不治初之氣自癸巳年大寒日申初至是嵗春分日午初凡六十日八十七刻半主位太角木客氣太陽水中見土運地氣遷燥將去寒乃始蟄復藏水乃氷霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜治太陽之客以鹹補之以酸收之以苦堅之以辛潤之嵗榖宜丹間榖宜稷雖有寒邪不能為害二之氣自春分日午正至小滿日辰正凡六十日有竒主位少徴火客氣厥隂木中見土運木勝土陽氣布風乃行春氣以至萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱宜治厥隂之客以辛補之以酸㵼之以甘緩之嵗榖宜丹間榖宜稻雖有風邪不能為害三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位少徴火客氣少隂火中見土運二火相加天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜調治少隂之客以鹹補之以甘㵼之以酸收之嵗榖宜丹間榖宜豆雖有熱邪不能為害四之氣自大暑日卯正至秋分日丑正凡六十日有竒主位太宫土客氣太陰土中見土運氣與運同又當其位是謂司氣溽暑至大雨時行寒熱互至民病寒熱嗌乾黃疸鼽衄飲發宜調太隂之客以辛補之以苦瀉之以甘緩之嵗榖宜白間榖宜麻雖有熱化不能為邪是氣也無犯司氣五之氣自秋分日寅初至小雪日子初凡六十日有竒主位少啇金客氣少陽火中見土運畏火臨暑反至陽乃化萬物乃生乃長乃榮民乃康其病溫宜治少陽之客以酸補之以甘㵼之以醎耎之嵗榖宜白間榖宜豆雖有火邪不能為害終之氣自小雪日子正至大寒日戌正凡六十日有奇主位太羽水客氣陽明金中見土運土生金燥令行餘火內格腫於上咳喘甚則血嗌寒氣數舉則霿霧翳病生皮腠內舍於脅下連少腹甚則寒中地將易也宜治陽明之客以酸補之以辛㵼之以苦泄之嵗榖宜白間榖宜黍雖有燥邪不能為害是嵗火勝則火復氣之勝也微者隨之甚者制之氣之復也稍者平之暴者奪之皆隨勝氣安其屈伏無問其數以平為期太陰濕土司天太陽寒水在泉中見少商金運嵗金不及氣化運行後天濕化在上地氣上騰左少陽明化右少陰灼化其政肅醎化在下天氣下降左厥隂動化右司氣素化其令寂陰專其政陽氣退辟大風時起原野昏霧白埃四起雲奔南極寒雨數至物成於差夏濕寒合德黃黑埃昏流行氣交上應鎮星辰星其榖黅玄間榖命太角者熱化寒化勝復同所謂邪氣化日也濕化五清化四寒化六所謂正化日也倮蟲靜鱗蟲育是謂嵗物所宜羽蟲耗熱毒不生是乃地氣所制故隂凝於上寒積於下寒水勝火則為氷雹陽光不治殺氣乃行有餘宜髙不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之其病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急土為天氣水為地氣土勝水天氣盈地氣虛當取化源以平土氣益金運嵗中天氣生運運生地氣三氣相得其化順邪氣乃微必益其嵗氣無使邪勝食黅玄之榖以全其真食間氣之榖以保其精嵗宜以苦燥之溫之甚者發之泄之不發不泄則濕氣外溢肉潰皮折而水血交流必贊其陽火令禦甚寒嵗運同寒宜以熱化上苦熱中酸和下甘熱所謂藥食宜也嵗半之前太陰主之若濕淫所勝則沉隂旦布雨變枯稿胕腫骨疼隂疸隂疸者按之不得腰脊頭項痛時眩大便難隂氣不用飢不欲食咳唾則有血心如懸病本於腎診在足太溪之脈其法平以苦熱佐以酸辛以苦燥之以淡泄之嵗半之後太陽主之若寒淫於內則凝肅慘栗民病少腹控皋引腰脊上衝心痛血見嗌痛額腫其法制以甘熱佐以苦辛以醎㵼之以辛潤之以苦堅之嵗運之化金不及紀曰從革是謂折收收氣乃後生氣乃揚長化合德火政乃宣庶類以蕃其氣揚其用躁切其動鏗禁瞀厥其發咳喘其化兼所不勝其病嚏咳鼽衄候其氣者夏有光顯鬱蒸之令則冬有嚴凝整肅之應若夏有炎爍燔燎之變則秋有冰雹霜雪之復其眚西其藏肺其病舍膺脅肩皆外在皮毛所謂嵗金不及民病肩背瞀腫鼽嚏血便注下收氣乃後復則寒雨暴至乃零氷雹霜雪殺物隂厥且格陽返上行頭腦疼痛延及額頂發熱口瘡甚則心痛初之氣自甲午年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位太角木客氣厥隂木中見金運木當其位地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相薄雨乃後民病血溢經絡拘強關節不利身重筋痿宜調厥隂之客以辛補之以酸㵼之以甘緩之嵗榖宜黅間榖宜稻雖有風化不能為邪二之氣自春分日酉正至小滿日未正凡六十日有竒主位少徴火客氣少隂火中見金運二火得位而勝金運大火正物承化民乃和其病溫厲盛行逺近咸若濕蒸相薄雨乃時降宜調少隂之客以鹹補之以甘㵼之以酸收之歲榖宜黅間榖宜豆雖有濕化不能為邪三之氣自小滿日申初至大暑日午初凡六十日有竒主位少徴火客氣太隂土中見金運火生土天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕民病身重胸腹滿胕腫宜治太隂之客以鹹補之以苦㵼之以甘緩之嵗榖宜黅間榖宜麻雖有濕邪不能為害四之氣自大暑日午正至秋分日辰正凡六十日有奇主位太宫土客氣少陽火中見金運火勝金畏火臨溽蒸化地氣騰天氣否隔寒風曉夜蒸熱相薄草木凝煙濕化不流則白露隂布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以醎補之以甘㵼之以醎耎之嵗榖宜玄間榖宜豆雖有火邪不能為害五之氣自秋分日巳初至小雪日卯初凡六十日有竒主位少商金客氣陽明金中見金運氣與運同又得其位慘令巳行寒露下霜乃早降草木黃落寒氣入體君子周密民病皮腠宜調陽明之客以酸補之以辛㵼之以苦泄之嵗榖宜玄間榖宜黍雖有燥化不能為邪是氣也司氣以涼用涼無犯終之氣自小雪日卯正至大寒日丑正凡六十日有竒主位太羽水客氣太陽水中見金運金生水寒大舉濕大化霜乃積隂乃凝水堅氷陽光不治感於寒則病人關節禁固腰脽痛寒濕持於氣交而為疾也宜調太陽之客以苦補之以醎㵼之以苦堅之以辛潤之嵗榖宜玄間榖宜黍雖有寒化不能為邪嵗氣之交濕勝則厥隂復之寒勝則太隂復之觀其氣至而致其治濕者燥之寒者熱之溫者清之其氣乃平治之大體也少陽相火司天厥陰風木在泉中見太羽水運嵗水太過氣化運行先天相火在上左陽明右太隂故天氣正而其政嚴厥隂在下左少隂右太陽故地氣擾而其令撓風乃暴舉木偃沙飛炎火乃流隂行陽化雨乃時應風熱參布雲物沸騰太隂橫流寒乃時至涼雨並起火木同德上應熒惑嵗星其榖丹蒼火化二寒化六風化八所謂正化日也羽蟲靜毛蟲育是謂嵗物宜倮蟲耗清毒不生是皆地氣所制民病寒熱瘧泄聾瞑嘔吐上怫腫色變是嵗陽為天氣隂為地氣天氣盈當於年前取火之化源水運在中制火而生木其邪乃微必抑其運水贊所不勝則暴過不生苛疾不起嵗宜醎宜辛宜酸參之泄之潰之發之觀氣寒溫以調其過運異風熱宜少寒化食宜同法此其道也故曰其化上醎溫下辛溫所謂藥食宜也嵗半之前少陽相火主之若火淫勝則溫氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黃赤傳而為水身面胕腫腸滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則􅍠衄病本于肺診在手天府之脈其法平以醎冷佐以苦甘以酸收之以苦發之以鹹復之嵗半之後厥隂風木主之若風淫于內則地氣不明平野昧草乃早秀民病灑灑振寒善呻數欠心痛攴滿兩脅裏急飲食不下隔咽不通食則嘔腹脹善噫得後與氣則怏然如衰身體皆重其法治以新涼佐以苦甘以甘緩之以辛散之嵗運之化水運太過紀曰流衍是謂封藏寒司物化天地嚴凝藏政以布長令不揚其化凛其氣堅其政謐其令流注其動漂泄沃涌其德凝慘寒氛其變氷雪霜電其病脹其化兼其所勝故曰嵗水大過寒氣流行邪害心火民病身熱煩心躁悸隂厥上下中寒譫妄心痛甚則腹大脛腫喘咳寢汗出憎風診在手神門之脈其法治以鹹溫初之氣自乙未年大寒日寅初至是嵗春分日子初凡六十日八十七刻半主位太角木客氣少隂火中見水運木生火水運承之地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣怫於上血溢目赤咳逆頭疼血傷脅滿膚腠中瘡宜治少隂之客以醎補之以甘㵼之以酸收之嵗榖宜丹間榖宜豆二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣太隂土中見水運土勝水火反鬱白埃四起雲趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡宜治太隂之客以甘補之以苦㵼之以甘緩之嵗榖宜丹間榖宜麻三之氣自小滿日亥初至大暑日酉初凡六十日有竒主位少徴火客氣少陽火中見水運火居其位水承之天政布炎暑至民病熱中聾瞑宜調少陽之客以甘㵼之以醎耎之嵗穀宜丹間穀宜豆四之氣自大暑日酉正至秋分日未正凡六十日有竒主位太宫土客氣陽明金中見水運土生金涼乃至白露降民病身重宜治少陽之客以酸補之以苦泄之嵗榖宜蒼間榖宜黍五之氣自秋分日申初至小雪日午初凡六十日有竒主位少商金客氣太陽水中見水運水金相和時令至此陽乃去寒乃來民病寒邪君子周密宜治太陽之客以醎㵼之以苦堅之以辛潤之嵗榖宜蒼間榖宜稷終之氣自小雪日午正至大寒日辰正凡六十日有竒主位太羽水客氣厥隂木中見水運水生木地氣正風乃至陽氣不藏而咳宜治厥隂之客以辛補之以酸㵼之以甘緩之嵗榖宜蒼間榖宜稻此六氣之化也嵗氣火木同德其氣専其化淳勝氣自微而况聖人遇之和而不爭也陽明燥金司天少隂君火在泉中見少角木運嵗不及氣化運行後天燥化在上左藏化右明化故天氣急而其政切苦化在下左柔化右蒼化故地氣明而其令暴陽專其令大暑盛行物燥以堅淳風乃治風燥橫運流於氣交多陽少隂雲趨雨府濕化乃敷燥極而澤清先而徑毛蟲乃死熱後而暴介蟲乃殃金火合德上應太白熒惑其榖白丹間榖命太徴之榖其耗白甲品羽清化熱化勝復同所謂邪氣化日也燥化九風化三熱化七所謂正化日也介蟲靜羽蟲育是謂嵗物之宜介蟲耗寒毒不生是皆地氣所制清熱之氣持於氣交民病咳嗌塞寒熱發暴振栗癃閟金為天氣火為地氣火勝金天氣虛當資化源以取金氣安其運木無使受邪食白丹之榖以安其氣食間氣之榖以去其邪嵗宜以醎以辛以苦汗之清之散之運與熱同宜多天化此其道也若化上苦小溫中辛和下醎寒所謂藥食宜也嵗半之前陽明主之若燥淫所勝則木乃晚榮草乃晚生筋骨內變民病左胠脅痛寒清於中感而瘧大涼革候咳腹中鳴注泄鶩溏名木斂生菀於下草焦上首心脅暴痛不可反側嗌乾面塵腰痛目昧眥瘍瘡痤癰病本於肝診在足太衝脈法宜平以苦溫佐以酸辛以苦下之嵗半之後少隂主之若熱淫于內則熖浮川澤隂處反明民病腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛頰腫惡寒發熱如瘧少腹中痛腹大法宜治以鹹寒佐以甘苦以酸收之以苦發之嵗運之化木不及紀曰委和是謂勝生生氣不改化氣乃揚長氣自平收令乃早涼雨時降風雲並興草木晚榮蒼乾凋落物秀而實膚肉內充其氣斂其用聚其動緛戾拘緩其發驚駭其化兼所不勝春有鳴條和暢之化則秋有霧露清涼之政春有慘悽殘賊之勝則夏有炎暑燔爍之復其眚東其藏肝其病內舍胠脅外在關節上臨陽明上商與正商同其病支發癰腫瘡瘍其甘蟲邪傷肝也初之氣自丙申年大寒日巳初至是嵗春分日卯初六十日八十七刻半主位少角木客氣太隂土中見木運風濕相遇以行春令地氣遷隂始凝氣始肅水乃氷寒雨化民病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋宜調太陰之客以甘補之以苦㵼之以甘緩之嵗榖宜白間榖宜麻雖有濕化不能為邪二之氣自春分日卯正至小滿日丑正凡六十日有奇主位太徴火客氣少陽火中見木運二火相加木運相和陽乃布民乃舒物乃生榮厲大至民善暴死宜治少陽之客以醎補之以甘㵼之以醎耎之嵗榖宜白間榖宜豆雖有熱邪不能為害三之氣自小滿日寅初至大暑日子初凡六十日有竒主位太徴火客氣陽明金中見木運金勝木天政布涼乃行燥熱交合民病寒熱宜治陽明之客以酸補之以苦泄之嵗榖宜白間榖宜黍雖有燥邪不能為害四之氣自大暑日子正至秋分日戌正凡六十日有竒主位少宫土客氣太陽水中見木運寒雨降民病暴仆振栗譫妄少氣嗌乾引飲反為心痛瘧寒之疾宜治太陽之客以苦補之以醎㵼之以辛潤之嵗榖宜丹間榖宜稷雖有寒邪不能為害五之氣自秋分日亥初至小雪日酉初凡六十日有竒主位太商金客氣厥隂木中見水運氣與運同司氣為蒼化春令反行民氣和宜調厥隂之客以辛補之以酸㵼之嵗榖宜丹間榖宜稻雖有風化不能為邪終之氣自小雪日酉正至大寒日未正凡六十日有竒主位少羽水客氣少隂火中見水運水生木木生火其化順陽氣布候反溫流水不氷其病溫宜治少陽之客以甘㵼之以酸收之嵗榖宜丹間榖宜豆雖有熱邪不能為害嵗氣之交天氣勝者少陽復之地氣勝者太陽復之其治各以勝復法太陽寒水司天太陰濕土在泉中見太徵火運嵗火太過氣化運行先天寒化在上左動化右清化故天政所布其風肅甘化在下左丹化右灼化故地氣靜而其令徐寒臨太虛其政大舉陽氣不令澤無陽𦦨則火發待時少陽中治時雨乃涯止極雨散還於太陰雲朝北極濕化乃布澤流萬物寒敷于上雷動于下寒化一熱化七濕化五所謂化日也鱗蟲靜倮蟲育是謂嵗物所宜鱗蟲不成燥毒不生是皆地氣所制寒濕之氣持於氣交水土合德上應辰星鎮星其榖玄黅民病寒濕發肌肉萎足痿不收濡㵼血溢蓋水為天氣土為地氣土勝水天氣虛先資化源以助水化抑其運水扶其不勝無使暴過而生其疾食玄黅之榖以全其真避虛邪之氣以安其政嵗宜以苦燥之溫之適氣同異多少制之運與寒濕異宜以燥濕化其化上苦溫中甘和下甘溫所謂藥食宜也嵗半之前天氣主之其化太陽寒水若寒淫所勝則寒氣反至水且氷血變于中發為癰瘍民病厥心痛嘔血血泄鼽衄善悲時眩仆運火炎烈雨暴乃雹胸腹滿手熱肘攣腋腫心淡淡大動胸脅胃脘不安面赤目黃善噫嗌乾甚則色炲渴而欲飲病本于心診在手神門之脈其法平以辛熱佐以甘苦以醎㵼之嵗半之後地氣主之其化太隂濕土若濕淫于內則埃昏巖谷黃反見黑至隂之交民病飲積心疼耳聾渾渾淳淳嗌腫喉痺隂病血見少腹痛腫不得小便病衝頭疼目似脫項似拔腰似折髀不可以曲膕如結腨如别其法治以苦熱佐以酸淡以苦燥之以淡泄之嵗運之火紀曰赫曦是謂蕃茂隂氣內化陽氣外榮炎暑施化物得以昌其化長其氣髙其政動其令明顯其動炎灼妄擾其德暄暑鬱蒸其變炎烈沸騰其化兼其所勝其病笑瘧瘡瘍血流狂妄目赤上見太水抑運火是謂上羽與正德同其收齊其病痓其治宜以甘和初之氣自丁酉年大寒日申初至是嵗春分日午初凡六十日八十七刻半主位少角木客氣少陽火中見火運氣與運同地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭疼嘔吐肌腠瘡瘍宜調少陽之客以鹹補之以甘㵼之以鹹耎之嵗榖宜玄間榖宜豆則火不為邪是氣也無犯司氣之熱二之氣自春分日午正至小滿日辰正凡六十日有竒主位太徵火客氣陽明金中見火運嵗運得位陽明客之燥熱相遇大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜調陽明之客以醎補之以辛㵼之以苦泄之嵗榖宜玄間榖宜黍則燥不為邪三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位太徵火客氣太陽水中見火運當其位天政布寒氣行民病寒反熱中癰疽注下心熱瞀悶不治者死宜治太陽之客以苦補之以醎㵼之以苦堅之以辛潤之嵗榖宜玄間榖宜稷則寒不為邪四之氣大暑日卯正至秋分日丑正凡六十日有竒主位少宫土客氣厥陰木中見火運土木相刑風濕交爭風化為雨乃化乃成民病大熱少氣肌肉萎足痿注下赤白宜治厥隂之客以辛補之以酸㵼之以甘緩之嵗榖宜黅間榖宜稻則風不為邪五之氣自秋分日寅初至小雪日子初凡六十日有竒主位太商金客氣少隂火中見火運氣與運同不司氣化時令至此陽復化宜調少隂之客以醎補之以酸收之嵗榖宜黅間榖宜豆則熱不為邪終之氣自小雪日子正至大寒日戌正凡六十日有竒主位少羽水客氣太隂土中見火運地氣正濕隂凝太虛宜治太隂之客以甘補之以苦㵼之嵗穀宜黅間穀宜麻則濕不為邪六氣之化也有勝氣必有復氣治宜以勝復之法厥陰風木司天少陽相火在泉中見少宫土運嵗土不及氣化運行後天風化為天氣灼化左藏化右故天氣擾而其政撓苦化為地氣清化左黅化右故地氣正而其令速風生髙逺炎熱從之雲趨雨府濕化乃行風火同德上應嵗星熒惑其榖蒼丹間榖言太啇者其耗文角品羽風化清化勝復同所謂邪氣化日也風化三濕化五火化七所謂正化日也毛蟲靜羽蟲育是謂嵗物之宜介蟲耗寒毒不生是皆地氣所制風燥火熱勝復更作熱病行於下風病行于上風燥勝復形於中陰在上陽在下天氣虛當資化源以助木氣嵗土不及上角與正角同其邪乃微必贊其運氣無使邪勝嵗宜以辛調上以醎調下畏火之氣無妄犯之故曰其化上辛涼中甘和下醎寒藥食宜也嵗半之前厥隂風木主之若風淫所勝則太虛埃昏雲物以擾寒生春氣流水不氷民病胃脘當心而痛上肢兩脅隔咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉蟄蟲不去病本於脾診在足衝陽之脈法宜平以辛涼佐以苦甘以甘緩之以酸㵼之嵗半之後少陽相火主之若火淫於內則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便法宜治以醎冷佐以苦辛以酸收之以苦發之嵗運之化紀曰卑監是謂減化化氣不令生政獨彰長氣整雨乃愆收氣平風寒並興草木榮美秀而不實成而粃也其氣散其用靜定其動腸湧分潰癰腫其發濡滯其化兼所不勝風化盛行四維有埃雲潤澤之化則春有鳴條鼓折之政四維發振拉飄騰之變則秋有肅殺霖霪之復其眚四維其藏脾其病內舍心腹外在肌肉四肢上臨厥隂氣同正角民病飱泄邪傷脾也法宜治以甘和初之氣自戊戌年大寒日亥初至是嵗春分日酉初凡六十日八十七刻半主位少角木客氣陽明金中見土運土生金清化行寒始肅殺氣方至民病寒於右之下宜治陽明之客以酸補之以辛㵼之以苦泄之嵗榖宜蒼間榖宜黍制其燥邪弗能為害二之氣自春分日酉正至小滿日未正凡六十日有竒主位少徵火客氣太陽水中見土運濕寒合氣以行舒榮之化寒不去華雪水氷殺氣施化霜乃降谷草上焦寒雨數正陽復化民病熱於中宜治太陽之客以苦補之以醎㵼之以苦堅之以辛潤之嵗榖宜蒼間榖宜稷治其寒邪不能為害三之氣自小滿日申初至大暑日午初凡六十日有竒主位太徵火客氣厥隂木中見土運木勝土天政布風乃時舉民病泣出耳鳴掉眩宜治厥陰之客以辛補之以酸㵼之以苦緩之嵗榖宜蒼間榖宜稻制其風邪莫能為害四之氣自大暑日午正至秋分日辰正凡六十日有奇主位少宫土客氣少隂火中見土運土居其位少隂居之溽暑至濕熱相薄爭於左之上民病黃疸而為胕腫宜治少隂之客以醎補之以甘㵼之以酸收之嵗榖宜丹間榖宜豆制其邪熱莫能為害五之氣自秋分日巳初至小雪日卯初凡六十日有竒主位太商金客氣太隂土中見土運氣與運同燥熱更勝沉陰乃布寒氣及體風雨乃行宜治太陽之客以甘補之以苦瀉之以甘緩之嵗穀宜丹間穀宜麻治其邪濕莫能為害是氣也無犯司氣終之氣自小雪日酉正至大寒日未正凡六十日有竒主位太羽水客氣少陽火中見火運火土相得畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病溫厲宜治少陽之客以酸補之以甘瀉之以鹹耎之嵗穀宜丹間穀宜豆制其火邪莫能為害嵗氣大法風勝則有陽明之復火勝則有太陽之復觀其所至各以其法治之少隂君火司天陽明燥金在泉中見太商金運嵗金太過氣化運行先天堅成之紀曰上徵與正商同經又曰太商下加陽明太過而加同天符天符為執法是謂平氣之化命曰審平之紀收而不爭殺而無犯五化宣明其氣潔其性剛其用散落其化堅斂其政徑肅其候清切其令燥其類金其應秋其榖稻其果桃其實榖其蟲介其畜雞其物外堅其色白其味辛其音商其數九其在人也在藏為肺在竅為鼻在體為皮毛在病為咳此嵗運所主也天地之氣熱化在上左柔化右動化故天政所布其氣明辛化在下左藏化右明化故地氣肅而其令切二嵗交司之氣寒交暑天地相應之氣熱加燥雲馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其榖丹白熱化七清化九燥化九所謂正化之日羽蟲靜介蟲育是謂嵗物所宜也毛蟲耗濕毒不生是謂地氣所制水火寒熱時氣交而為病始熱病生於上清病生於下寒熱相犯而爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上嵗半之前少陰君火以司天氣少隂之化有本標之異寒熱得中其氣乃和而無熱淫之勝嵗半之後陽明燥金以司地氣陽明不從標本以中氣為化燥熱相兼其化乃平而無燥淫之勝是嵗平金無勝復不取化源惟資嵗勝折其鬱氣無所暴過而生其病嵗宜以醎寒調其上以酸溫安其下以辛溫調其中食丹白之榖以全真氣食間氣之榖以辟虛邪運同地氣宜多溫熱化司氣以涼用涼逺涼此其道也初之氣自己亥年大寒日寅初至是嵗春分日子初凡六十日八十七刻半主位少角木客氣太陽水中見金運風寒燥三氣同奉少隂之政以行春令地氣遷燥將去寒乃始蟄復藏水乃氷霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之嵗榖用丹間榖用稷乃無寒邪之害二之氣自春分日子正至小滿日戌正凡六十日有竒主位太徵火客氣厥隂木中見金運風火燥三氣同奉少隂之政以行舒榮之化木火相得陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱宜治厥隂之客以辛補之以酸㵼之以甘緩之嵗榖宜丹間榖宜稻乃無風邪之害三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位太徴火客氣少隂火中見金運二火勝運又為天政所布故大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜治少陽之客以鹹補之以甘瀉之以酸收之嵗榖宜丹間榖宜豆乃無熱邪之害四之氣自大暑日酉正至秋分日未正凡六十日有竒主位少宫土客氣太隂土中見金運土得其位以生運金二氣相得以行陽明之令溽暑至大雨時行寒熱反至民病寒熱嗌乾黃疸􅍠衄飲發宜治太陽之客以甘補之以苦㵼之以甘緩之嵗榖宜白間榖宜麻乃無邪濕之害五之氣自秋分日申初至小雪日午初凡六十日有竒主位太商金客氣少陽火中見金運氣金雖得位客氣少陽用事清化乃抑畏火臨暑反至陽乃化萬物乃生乃長乃榮民乃康其病溫宜治少陽之客以鹹補之以甘瀉之以鹹耎之嵗榖宜白間榖宜豆乃無火邪之害終之氣自小雪日丑正至大寒日辰正凡六十日有竒主位少羽水客氣陽明金中見水運金氣相符水氣生之又為嵗之司氣金之氣乃平故燥令行餘火內格民病腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連小腹而作寒中宜調陽明之客以酸補之以辛瀉之以苦泄之嵗榖宜白間榖宜黍乃無燥邪之害是氣也司氣以涼用涼無犯是謂至治太陰濕土司天太陽寒水在泉中見少羽水運嵗不及氣化運行後天涸流之紀曰上宫與正宫同是嵗天氣平又少羽下加之太陽不及而加同嵗會凡嵗會為行令此運化宜平也諸同正嵗氣化運行同天嵗運既平命曰靜順之紀藏而勿害治而善下五化咸整其氣明其性下其用沃衍其化凝堅其政流演其候凝肅其令寒其類水其應冬其榖豆其果栗其實濡其蟲鱗其畜彘其色黑其味醎其音羽其數六其在人也其藏為腎其主二隂其飬骨髓其病厥嵗運之化也天地之氣濕化在上明化左灼化右故地氣上騰而其政肅醎化在下動化左清化右故天氣下降而其令寂隂專其政陽氣退辟大風時起原野昏霿白埃四起雲奔南極寒雨數至物成於差夏濕寒合德黃黑埃昏流行氣交上應鎮星辰星其榖黅玄故隂凝於上寒積於下寒水勝火則為氷雹陽光不治殺氣乃行民病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急故有餘宜髙不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之間榖命太徵太角之榖嵗氣既平不取化源唯折其水鬱之氣無使邪勝食黅玄之榖以全其真食間氣之榖以保其精嵗宜以苦溫調上以苦熱調下以苦和調中燥之溫之嵗半之前天氣太隂主之太隂所致為雲雨其化從本當其時多行雨濕化者太隂之政也嵗半之後地氣太陽主之太陽所至為寒霧其化從本從標當其時寒氣至而熱氣應者地氣之平也初之氣自庚子嵗大寒日巳初至是年春分日卯初凡六十日八十七刻半主位少角木客氣厥隂木中見水運木當其位水運統之奉太陰之政布行春令地氣遷寒乃去春氣至風乃來生布萬物以榮民氣條舒風濕相薄雨乃後民病血溢筋絡拘強關節不利身重筋痿宜治厥隂之客以辛補之以酸㵼之以甘緩之嵗榖宜黅間榖宜稻乃無客風之害二之氣自春分日卯正至小滿日丑正凡六十日有竒主位太徵火客氣少隂火中見水運火當其位隂精承之寒熱二氣奉太陰之政以行舒榮之化大火正物承化民乃和其病溫厲勝行逺近咸若濕蒸相薄雨乃時降宜治少隂之客以醎補之以甘㵼之以酸收之嵗榖用黅間榖用豆乃無客熱之害三之氣自小滿日寅初至大暑日子初凡六十日有奇主位太徵火客氣太隂土中見水運天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕民病身重胕腫胸腹滿宜治太隂之客以甘補之以苦㵼之以甘緩之嵗榖用黅間榖用麻乃無濕邪之害四之氣自大暑日子正至秋分日戌正凡六十日有竒主位少宫土客氣少陽火中見水運火土相得奉太陽之令畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相薄草木凝煙濕化不流則白露隂布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以酸補之以甘瀉之以鹹耎之嵗榖用玄間榖用豆乃無邪熱之害五之氣自秋分日亥初至小雪日酉初凡六十日有竒主位少商金客氣陽明金中見水運金當其位與水運相得慘令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠宜治陽明之客以酸補之以辛㵼之以苦泄之嵗榖用玄間榖用黍乃無客邪之害終之氣自小雪日酉正至大寒日未正凡六十日有竒主位少羽水客氣太陽水中見水運氣運符會寒大舉濕大化霜乃積隂乃凝水堅氷陽光不治感於寒則病人關節禁固腰脽痛寒濕持於氣交為疾也宜治太陽之客以苦補之以鹹瀉之以苦堅之以辛潤之嵗榖用玄間榖用稷乃無客寒之害是嵗行平氣之化嵗會為行令無淫氣勝復唯行德化政令然土為天氣水為地氣水土雖睦而運化不及濕土在上木氣行之或有濕邪其氣亦微內經所謂中行令者其病徐而持也少陽相火司天厥陰風木在泉中見太角木運嵗木太過氣化運行先天太角下加厥陰太過氣而加同天符為執法平木之化也命曰敷和之紀木德周行陽舒隂布五化宣平其氣端其性隨其用直其化生榮其政發散其候溫和其類草木其物中堅其令風其應春其榖麻其果李其實核其蟲毛其畜犬其色蒼其味酸其音角其數八其在人也其藏肝其主目其養筋其病裏急肢滿此嵗運所主也天地之氣火化在上左清化右柔化故天氣政而其政嚴酸化在下左灼化右藏化故地氣擾而其令撓風乃暴舉木偃沙飛炎火乃流隂行陽化雨乃時應火木同德上應熒惑嵗星其榖丹蒼風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起民病寒中外發瘡瘍內為泄滿聖人遇之和而不爭往復之作民病寒熱瘧泄聾暝嘔吐上怫腫色變嵗半之前天氣少陽主之少陽所至為炎暑其化從本當其時化火化盛行風氣應之候乃和嵗半之後地氣厥隂主之厥隂所至為風府其化不從標本而以中氣為化當其時風從火化者厥隂之中也是嵗運化既平不取化源惟贊所不勝則暴過不生苛疾不起嵗宜以醎寒調上以辛涼調下以酸和調中滲之泄之漬之發之運同風熱宜多寒化司氣以溫用溫逺溫治之常也初之氣自辛丑年大寒日申初至是嵗春分日午初凡六十日八十七刻半主位太角木客氣少隂火中見木運木火相得運當其位以奉少陽之政而行春令地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣怫於上血溢目赤咳逆頭痛血崩脅滿膚腠中瘡宜治少陽之客以醎補之以甘㵼之以酸收之嵗榖宜丹間榖宜豆則熱不為邪二之氣自春分日午正至小滿日辰正凡六十日有奇主位少徵火客氣太隂土中見木運風濕之氣奉畏火之政以行舒榮之化火反鬱白埃四起雲趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發于中胸嗌不利頭疼身熱昏憒膿瘡宜治太隂之客以甘補之以苦泄之以甘緩之嵗榖宜蒼間榖宜麻則熱不為邪三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位少徵火客氣少陽火中見木運火當其位與木運之氣相得天政布炎暑至少陽臨上雨乃涯民病熱中聾瞑血溢膿瘡咳鼽衄渴嚏欠喉痺目赤善暴死宜治少陽之客以鹹補之以甘㵼之以鹹耎之嵗榖宜丹間榖宜豆則火不為邪是嵗木氣適平民自無暴死四之氣自大暑日卯正至秋分日丑正凡六十日有奇主位太宫土客氣陽明金中見木運風燥之氣下應在泉厥隂之令而為天地交司秋氣早行涼乃至炎暑間化白露降民氣和平其病滿身重宜治陽明之客當以酸補之以辛㵼之以苦泄之嵗榖宜蒼間榖宜黍則燥不為邪五之氣自秋分日寅初至小雪日子初凡六十日有竒主位少商金客氣太陽寒水中見木運水木相和與金相得當此一氣寒化早至陽乃去寒乃來雨乃降氣門乃閉剛木早凋民病寒邪君子周密宜治太陽之客以辛補之以半㵼之以苦堅之以辛潤之嵗榖宜蒼間榖宜稷則寒不為邪終之氣自小雪日子正至大寒日戌正凡六十日有竒主位少羽水客氣厥隂木中見木運太角下加厥隂之時運與氣符其化和平又居水位水不相得其化乃順地氣正風乃至萬物反生霿霧以行其病關閉不禁心痛陽氣不藏而咳氣平之時不應有疾或有疾者氣有初承不能無侮所謂邪中執法也經曰中執法者其病速而危宜治厥隂之客以辛補之以酸瀉之以甘緩之嵗榖宜蒼間榖宜稻則風不為邪此一氣司氣以溫用溫無犯陽明燥金司天少隂君火在泉中見少徴火不及氣運嵗不及氣化運行後天伏眀之紀曰上商同言天氣平也六元正紀曰少徵下加少隂不及而加同嵗會言嵗運平也諸同正嵗氣化運行同天上見天氣平下見運火平火氣之平也命曰升明之紀正陽而治德施周普五化均衡其氣高其性速其用燔灼其化蕃茂其政明曜其候炎暑其類火其應夏其榖麥其果杏其實絡其蟲羽其畜馬其色赤其味苦其物脈其音徴其數七其在人也其藏心其主舌其飬血其病瞤瘛此嵗運所主也天地之氣燥化在上左藏化右丹化故天氣急而其政切苦化在下左濕化右動化故地氣明而其令暴陽專其令炎暑盛行物燥以堅淳風乃治風燥橫運流於氣交多陽少陰雲趨雨府濕化乃敷燥極而澤其榖白丹間榖命太者其耗白甲品羽金火合德上應太白熒惑清熱之氣持於氣交民病咳嗌塞寒熱發暴振栗癃閟清先而徑毛蟲乃死熱後而暴介蟲乃殃民嵗運熱寒雨寒化雨化勝復同所謂邪氣化日也燥化四熱化二所謂正化日也嵗半之前天氣陽明主之陽明以中氣為化當其時燥濕相半者陽明得中也嵗半之後地氣少隂主之少隂有本標之化當其時寒熱得中者少隂之氣和也嵗火適平不資化源惟安運氣無使受邪嵗宜以若小溫調上以醎寒調下以醎溫調中食白丹之穀以安其氣食間氣之榖以去其邪運同熱氣宜多天化治之常也初之氣自壬寅年大寒日亥初至是嵗春分日酉初凡六十日八十七刻半主位太角木客氣太隂土中見火運奉陽明之政而行春令地氣遷隂始凝氣始肅水乃氷寒雨化其病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋宜治太隂之客以甘補之以辛㵼之以甘緩之嵗榖宜白間榖宜麻乃無濕邪之害二之氣自春分日酉正至小滿日未正凡六十日有竒主位少徴火客氣少陽火中見火運三火相符以行舒榮之化陽乃布民乃舒物乃生榮厲大至民善暴死是嵗火氣適平民無暴死宜治少陽之客以醎補之以甘瀉之以醎耎之嵗穀用白間穀用豆乃無火邪之害是氣也司氣以熱用熱無犯三之氣自小滿日申初至大暑日午初凡六十日有竒主位少徵火客氣陽明金中見火運金居火位天政布涼乃行燥熱交合燥極而澤民病寒熱宜治陽明之客以酸補之以辛㵼之以苦泄之嵗榖用白間榖用黍乃無燥邪之害四之氣自大暑日午正至秋分日辰正凡六十日有奇主位太宫土客氣太陽水中見火運寒濕之氣下奉少隂之令寒雨降民病暴仆振栗譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便宜治太陽之客以苦補之以醎㵼之以苦堅之以辛潤之嵗榖用丹間榖用稷乃無寒邪之害五之氣自秋分日巳初至小雪日卯初凡六十日有竒主位少商金客氣厥隂木中見火運春令反行草乃生榮民氣和宜調厥隂之客以辛補之以酸瀉之以甘緩之嵗穀用白間穀用稷乃無風邪之害終之氣自小雪日卯正至大寒日丑正凡六十日有竒主位太羽水客氣少隂火中見火運運火氣符會陽氣布候反溫蟄蟲乃見流水不氷民乃康平其病溫宜治少隂之客以鹹補之以甘㵼之以酸收之嵗穀用丹間穀用豆乃無熱邪之害是嵗運氣適平若有邪氣則中行令其病徐而持也普濟方卷十
