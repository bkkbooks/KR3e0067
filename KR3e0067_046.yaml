body:
  text: 普濟方卷四十六明周王朱橚撰頭門首風論内經謂新沐中風則為首風首風之狀頭面多汗惡風當先風一日則病甚甚則頭不可以出内至其風日則病少愈夫諸陽之脈皆會於頭平居安静則邪無自而入新沐之人皮腠既疎膚髪濡漬不慎于風風邪得以乗之故客于首而為首風其證頭面多汗惡風頭痛不可以出内者以邪氣之客也當先風一日則病甚至其風日則少愈者陽之氣以天地之疾風召之風行陽化頭者諸陽之會與之相應也是太陽者頭之經也六經傷寒惟太陽受病最多葢頭居其上當風寒之衝一有間隙則若項若腦若耳若鼻風邪乗氣皆得而入之矣况復櫛沐取凉飽食仰卧之不謹乎頭風為病不必須有偏正頭疼之證但自頸項以上耳目口鼻眉稜之間或有一處不若吾之體焉皆其漸也有頭疼有頭暈有頭皮頑厚不自覺知有口舌不仁莫知滋味或耳聾或頭汗或目痛或眉稜上下掣痛或鼻中聞香極香聞臭極臭或只呵欠而作暈眩之狀凡此皆頭風證也治法大要有熱證者消風散用防風荆芥煎湯下無熱證者追風散用薄荷清下又有素患頭風之人或因傷風寒暑濕之證調理之已獲輕安未幾頭風發則不必拘泥前藥無附子又不可也若夫太陽項强一證無汗惡風則為表實合用葛根湯汗出惡風則為表虚合用桂枝葛根湯是又感風邪在頭風界限之内者也婦人月候適行輙梳箆多成頭風痒滿頭如水泡之狀大凡人病雷頭癩乾俗呼之謬名也頭痛昏眩皆因浴髮而得之即為首風此因邪風在於胸中熱甚化而為痰之所致也可以茶調散吐之吐訖次用藏用丸下之後可服烏荆丸若是雷頭者上部多有赤腫結核或面血無汗經云火鬱發之開之却之可用銚鍼出血則愈靈樞經云奪血者無血血汗俱蕩豈不妙哉衰老者可用凉膈解毒消風散熱為治年壯者可以蕩滌積熱大黄牽牛氣血宣通使無壅滯而愈凡頭風眩暈手足麻痺胃腕發痛心腹滿悶按如水聲可用獨聖散吐之吐訖可用清上辛凉之藥仲景曰此寒疾結在胸中而致然也夫頭風者是陽明邪熱太甚資實少陽相火而為之也多在少陽或在陽明或在太陽視其腫勢在何部分隨經取之濕熱為腫木盛為痛此邪見于頭多在前後先出治之大不宜藥速速則過其病所謂上熱未除中寒復生必傷人命此病是自外而之内者是血病况頭部分受邪見於無形迹之部當先緩而後急先緩者謂邪氣在上着無形之部分無不至若用重劑速下過其病難已雖無緩藥若急服之或食前或頓後服此宜先緩急則藥不能除病當徐除浸漬無形之邪也或藥性味形體據象皆要不離緩體是也且後急者謂緩劑已瀉邪氣入於中是到隂部染於有形質之所若不速則損隂也此終始却為客邪當急取之是治客以急也且治主當緩者謂陽邪在上隂邪在下若急治之不能解紛而益亂也治客以急者謂隂分受邪隂分受陽邪此客氣急除去之也假令少陽陽明為病少陽為邪出於耳前後也陽明為邪者首大腫也先以黄芩黄連甘草湯通炒過剉煎少少不住服或劑畢再用煨黍粘子新瓦上炒香同大黄煎或去滓内芒硝俱各等分亦時時呷之無合飲食在前得微利及邪氣已只前藥若不能已再同煎次第服之取大便利邪氣則止如陽明渴者加𤓰蔞根陽明行經升麻芍藥葛根甘草太陽行經羌活防風之類方仙方如聖餅子出海上方草烏天麻何首烏天花粉芎鬚半夏細辛薄荷荆芥香白芷防風羌活蒼术松香甘松藿香晩蠶沙赤小豆菊花赤芍藥甘菊花蔓荆子各等分右為細末炒麪為餅赤土為衣每服一餅細嚼茶淸送下巴㦸散出千金方治頭中五十種病方見本門頭風類牛黄丸出聖濟總録治首風頭項急疼腦重四肢拘急行步有妨牛黄别研膩粉各半兩天麻酒炙桂去粗皮白附子炮乾蝎炒去土天南星炮石菖蒲附子炮裂去皮臍麻黄去根節湯煑掠去沫羌活去蘆芎藭當歸切焙乾薑炮獨活去蘆防風去义各一兩麝香一分烏蛇酒浸濕紙裹煨取肉三兩右先將牛黄麝香同研後漸入諸末藥并膩粉一半煉蜜和丸如梧桐子大於膩粉内衮為衣每服五丸空心温酒下追風散出直指方治偏正頭風疼痛面上遊風狀若蟲行川烏炮去皮尖軟石膏煅白殭蠶川芎防風荆芥甘草炙各一兩南星炮白附子炮羌活天麻全蝎地龍去土白芷各半兩草烏炮去皮尖没藥乳香雄黄并研各一分右為末毎服半錢入好茶少許沸湯調食後臨睡服搐鼻藥治八般頭風疼痛鼻塞聲重赤芍藥川芎草烏黄芩乳香没藥半錢黄連一錢元胡索當歸䔧蘆各半錢荆芥一錢藁本半錢石膏細辛薄荷甘草炙各一錢右為細末口噙水用藥一匙㗜鼻中救生丸出聖濟總録治體虚陽經為風所乗上走頭面多汗惡風頭痛及新沭中風失音不語天麻附子去皮臍炮裂烏頭炮裂去皮臍白附子炮天南星炮丹砂研半夏湯浸七次生薑汁製作餅焙乾犀角鎊屑以紙裹置欀令暖方𢷬芎藭藿香葉零陵香葉桂去粗皮蠍稍炒木香白殭蠶炒牛黄研各半兩右為末煉蜜和劑丸如梧桐子大中風不語者每服五丸用漿水半鍾取東南栁枝一條長七寸滴生油三滴在漿水中即攪四十九攪便灌之立差如小可中風只用漿水吞下三丸如豆大天雄丸出聖濟總録治風虚頭腦重四肢拘急骨節痛疼天雄炮裂去皮臍黄耆剉熟乾地黄焙蒺藜炒去角各三分白茯苓去黒皮牛膝酒浸切焙石斛去根附子焙裂去皮臍獨活去蘆山芋白术桂去粗皮各半兩右為末煉蜜和丸如梧桐子大毎服十五丸薄荷酒或烏梅湯下茯神方出聖濟總録治首風頭痛當先風則甚茯神去木羌活去蘆木通剉防風去义細辛去苗葉蔓荆實去白皮生乾地黄焙白术當歸芍藥陳橘皮湯浸去瓤焙芎藭各一兩右麤𢷬篩每服三錢水一盞煎至七分去滓空心食前温服必效丸出王氏博濟方治頭風眩暈者由氣血虚為風邪所乘也諸陽經脈上走於頭面因運動勞役陽氣發洩腠理開疎因而受風邪頭風之狀面多汗惡風甚則頭疼心煩悶或因新沐髮中風亦為此病久不差眩暈因風邪流入於腦傳於目系目系急故成眩暈也其脈寸口洪大而長是也宜服此大效巴豆去皮出油一分丹砂研乳香研細辛去苗葉當歸切焙檳榔各半兩丁香桂去粗皮龍腦研各一錢右𢷬研為末蒸餅為丸如梧桐子大每發日用好茶清下一丸須是當門齒嚼冷茶下之十年只用一粒額汗出即差一方有麝香柴胡飲出聖濟總録治首風頭腫嘔噦柴胡去苗芎藭桑根白皮炙剉各一兩白檳榔羚羊角鎊人參黄連去鬚天雄炮裂去皮臍各一兩旋覆花炒桂去粗皮枳殻去瓤麩炒各半兩右剉如麻豆每服三錢以水一盞生薑三片煎取七分去滓温服茯苓湯出聖濟總録治首風頭目昏痛痰涎不利赤茯苓去黒皮一兩沉香半兩甘菊花三分訶梨勒皮二兩藿香去梗一兩木香半兩檳榔剉一兩白术一兩枇杷葉拭去毛十片枳殻去瓤麩炒甘草炙各一兩右麤𢷬篩毎服三錢入生薑鹽各少許煎至七分去滓温服不拘時候一字經金散出危氏方治偏正頭風疼夾腦風眉稜骨痛牽引兩眼抽掣疼痛並或生翳膜視物不明藿香葉荆芥穗旋覆花香白芷防風各半兩石膏細研水飛取半川芎半兩川烏兩頭尖者去皮尖生用二錢半天南星二錢半草烏頭一錢半右各修治日曬乾同𢷬為末每服一匙食後淡茶調下十味如補丸出百一選方治偏正頭風墜痰涎散滯氣寛胸膈久服清頭目强腰膝晉礬枯過天門冬去心五味子半夏四十九粒湯浸七次南星一箇大者薑汁浸炮各半兩麥門冬去心逺志去心各一兩甘草炙白术人參各一分右為末生薑自然汁調飛羅麪煑糊丸如梧桐子大硃砂為衣毎服十丸至十五丸食後臨卧生薑湯下或有因驚而患頭風者宜服芎菊湯出聖濟總録治首風目暈頭痛芎藭防風麻黄去根節前胡去蘆獨活去蘆各一兩菊花枳殻去穰麩炒甘草炙剉細辛去苗葉各一兩石膏碎研三兩右麤𢷬篩毎服三錢水一盞入薄荷五葉同煎至六分去滓食後温服前胡湯出聖濟總録治首風每發胸膈滿悶吐逆痰涎飲食不下前胡去蘆赤茯苓去黒皮升麻各半兩木通剉一分桔梗去蘆切炒半兩枳殻去瓤麩炒旋覆花微炒各一分半夏湯浸洗七遍半兩入生薑同𢷬炒一兩麥門冬去心焙半兩甘草二錢一分右麤𢷬篩毎服五錢以水一盞半入生薑一棗大拍碎同煎至一盞去滓空心日午臨卧温服治頭中痛身熱風熱方出千金方竹瀝三升升麻生薑杏仁各三兩芍藥柴胡各四兩石膏生葛根各八兩右㕮咀以水六升合竹瀝煑取二升七合分三服摩膏出千金方治頭中二十種病頭眩髮落面中風蜀椒莽草各三兩桂心䕡茹附子細辛半夏乾薑各一兩右㕮咀以生猪肪二十兩合𢷬令肪消盡藥成先沐頭令净然後以藥摩顖上一日即愈如非十二月合則用生烏麻油和塗頭皮沐頭令净乃用之頓生髮如昔必效方無蜀椒莽草半夏乾薑天麻餅一名如聖餅子治頭風傷風鼻塞一切頭疼并偏正頭風不問所因久服更不再發此藥最效川烏生去皮尖天麻防風乾薑羌活甘草生各一兩半夏洗天南星生各半兩右用湯浸炊餅和揑成丸每服三丸荆芥或葱茶細嚼送下一方有川芎無羌活用生薑汁和揑成餅子隂乾一兩日曬乾服更増餅數隨意頭疼甚者更於芎辛湯方求之若初感傷寒因汗而解尚餘頭疼者濃煎葱白生薑湯下治中脘痰飲停積及療脾胃飲食所傷溫中快膈尤得其宜白龍丸出王氏博濟方治首風每發頭痛難忍白附子炮附子炮裂去皮臍天南星炮各半兩半夏洗去滑切焙麝香研少許凝水石三兩用炭火三斤煅通赤埋於地坑内出火毒候冷取出龍腦研少許右為細末用麪糊為丸如豌豆大每服三丸至五丸薄荷温酒茶下空心食前服芎术湯出聖濟總録治首風頭面多汗惡風頭痛芎藭蒼术米泔浸去粗皮切焙麻黄去根節芍藥甘草白芷石膏荆芥穗等分右麤末每服三錢水一盞入薄荷五七葉同煎七分去滓熱服驅風丹出海上方草烏四兩不去皮尖川烏四兩芎鬚白膠香河水煑過赤土赤小豆荆芥穗夏蠶沙各六兩右為細末用白麪半斤攪勻沸湯泡為丸如梧桐子大每服十五丸至二十丸茶酒下打撲傷損乳香酒下頭風薄荷茶下渾身倦怠蘇木酒下孕婦莫服治頭風冷淚出本事方甘草决明子白术羌活川芎細辛白芷荆芥穗各三錢右為細末毎服一錢沸湯調下食後日三服八風湯出聖濟總録治首風頭目昏痛肢體拘急疼痛防風去义六兩人參二兩芎藭細辛去苗葉前胡去蘆白芷去义六兩甘草炙三分羌活去蘆半兩右麤𢷬篩每服三錢水一盞入薄荷五葉煎至六分去滓温服不拘時頭風方出直指方川芎天麻各半兩細辛華隂者去苗爛石膏荆芥穗白芷稍甘草微炙各二錢全蝎炙五箇右為末白湯或茶清食後臨卧服消風散加蝉殻白丸子加硃砂薑汁湯下皆要藥防風飲出聖濟總録治首風腦項掣痛防風去义一兩龍骨二兩升麻赤芍藥黄芩去黒心各一兩葛根剉石膏碎各一兩半右麤𢷬篩毎服五錢水一盞半煎至一盞入薑汁半合更煎一兩沸去滓空心日午夜卧温服清神散麝香腦子雄黄青黛全蝎乳香没藥各等分右為細末每用抄少許口含温水㗜入鼻中清香散治偏正頭風并牙疼川芎藁本各一兩防風羌活各二錢細辛三錢香白芷一兩甘草三錢右為細末清茶調服三錢如疼甚者吞黒錫丹三十粒必效南星丸出海上方治頭風天南星大者一箇全蝎一對川芎二兩人參藁本各半兩龍腦二錢防風一兩右為末以蒸餅一箇水浸一宿去皮捜和藥末如鵝眼食前茶清下三餅入薄荷尤佳羌活散出本事方治清目去風邪順真氣羌活薑蠶白蒺藜去尖白附子各一兩甘菊花硃砂麝香各一兩右為細末每服一錢薄荷茶酒任意調下菊花散一名旋覆花湯治首風頭痛上焦煩悶方見本門頭風類薯蕷散出千金方治頭目有風牽引目睛疼偏視不明薯蕷三兩細辛一兩半秦艽天雄各二兩獨活桂心山茱萸各二兩半右擣末篩酒服方寸匕日三荆實湯出聖濟總録治首風頸項緊急骨疼痛荆實揉去白皮一兩芎藭防風去叉酸棗仁炒過各半兩薏苡仁炒一兩半犀角鎊三分桑根白皮剉一兩右麤篩每服五錢水一盞半入生薑一棗大拍碎煎至八分去滓空心日午臨卧温服以愈為度九生丸治頭風半夏南星大草烏川芎白芷細辛硬石膏各等分右為末生韮汁飛羅麪和丸薑湯送下一十丸七生丸治男女八般頭風一切頭痛痰厥腎厥隂厥傷寒傷風頭痛不可忍川烏草烏南星三味生用去皮臍半夏水洗去滑川芎石膏白芷等分並生右為細末韮菜汁飛羅麪為丸如梧桐子大毎服七丸至十丸嚼生葱茶送下一方加細辛全蝎减半每服二丸荆芥湯一名八風散治首風頭目昏眩肢體疼痛手足麻痺上膈煩悶或發寒熱方見本門頭旋類香芎散出神効方香附子炒貫芎石膏水飛白芷甘草薄荷各半兩川烏頭炮一兩去皮臍右為細末每服二錢温酒或茶調下無時川芎散出海上方治頭風川芎三錢白芷二錢細辛半兩去葉蓽撥一分石膏煅防風一錢半右為細末白湯調服清隠方出海上方治頭風川芎白芷細辛防風川烏各二錢草烏一錢半右為麤末每服七錢水二盞煎至一盞去滓濾藥在碗内却把碾細雄黄作四分入一分在碗内通口便服再煎滓連服治風勞氣吐逆不能食四肢骨節酸疼頭痛頂重方茯苓三兩枳實橘皮人參芍藥各二兩生薑四兩右切以水五升煑取三升去滓分温三服日晚再服忌麪蒜醋等物一字散出聖濟總録治沐頭中風頭面多汗為首風頭痛藿香葉烏頭去皮臍各二兩甘松零陵香各一兩白附子天南星各半兩右生用為散每服一匙温酒調下中風口噤斡開口微灌服半錢未愈再服芎藭散出聖濟總録治首風頭面多汗惡風頭痛芎藭石膏碎細辛去苗葉荆芥穗甘草炙剉草烏頭去皮臍同黒豆炒去豆各一兩右為散毎服半錢臘茶清調下加至一錢空心食前服之透頂散出本事方治偏正頭風夾腦風并一切頭風不問年深日近刻日取效𤓰蔕七箇丁香三粒糯米七粒腦子一豆大細辛長白者三墜麝香一黒豆大右先將腦麝乳鉢内研令極細却將前四味碾内修治為末乳鉢内蕩起腦麝令勻用瓦罐子盛之𦂳閉􅀈口患人隨左右搐之一大豆許良久出冷涎一升許即安不卧散出徳生堂治偏正頭風疼痛渾身壯熱及風腫牙疼並宜服之細辛甘草人參藜蘆川芎各一錢石膏半兩水飛研末右為細末口噙水手捻藥末少許㗜鼻中治偏正頭風久年不愈没藥一錢乳香一錢川芎三錢青黛半錢腦子二分細辛一錢半白芷二錢盆硝三錢半薄荷葉三錢半川烏尖一錢右為細末水噙口中次用藥以竹管吹入鼻中太陽丹出海上方治頭風石膏一斤川芎白芷甘草各一兩腦子二兩右為細末蜜和麪為丸每料分作一十八丸硃砂為衣每服一丸食後薄荷湯下䆒原抽刀散出直指方治頭風掣痛川烏切片薑汁浸晒雄黄蟬退去頭各半兩川芎細辛各一兩右為散每服半錢食後臨卧茶清調下川芎丸出本事方治頭風冷淚川芎甘菊花細辛白术白芷各一分右為細末蠟丸如黍米大夜一丸日中一時換一丸菊花散出聖濟總録治首風頭痛菊花地骨皮石膏蒺藜子炒一角各一兩甘草炙剉半兩右為末每服一錢熱湯調食後服天麻散出聖濟總録治首風頭痛天麻二兩藿香去梗石膏研莎草根炒去毛各一兩王𤓰十枚燒灰右為散每服一錢臘茶調下通闗青金散出海上方治偏正頭風兼治赤眼薄荷葉好朴硝各四錢川芎青黛各二錢腦子一匙右為細末搐入鼻中茵陳散出經驗良方治一切頭風牙闗緊急眉稜骨痛鼻塞清涕眼旋屋轉耳作蟬聲並宜服之北細辛三錢茵陳穗石膏火煅紅候冷研入各一兩川芎一兩右為細末毎服二錢茶沸湯㸃服通頂散出海上方石膏四兩荆芥一兩半川芎三兩薄荷五錢右為細末每服二錢食後茶清調下藿香散出海上方全蝎八箇蓽撥半兩川烏半兩川芎半兩右為末每服少許搐入鼻中或以茶清食後調服亦可玉容搐鼻散専治頭風去面上腫毒川芎細辛芒硝藁本各等分右為細末口噙水鼻中葦筒吹之立效芎芷散出直指方治頭風風壅川芎白芷荆芥穗軟石膏煅等分右為末每服一錢食後沸湯調服天香散出聖惠方治逺年日近頭風纔發則頑痺麻痒不勝爬搔或塊瘰停疾嘔吐飲食莫入此藥兩服可㫁根天南星湯泡七次半夏製同上川烏生去皮臍川香白芷各等分右為末每服七錢或十錢水一碗半煎至一碗入生薑自然汁半碗再煎八分熱服藥稍熱難服須要勉强喫二三服一説滿頭上有塊子者切宜麻油針逐箇針之宜忌房事茶調散出宣明論治一切諸風痰壅目澁昏眩頭疼心憒煩熱皮膚痛痒并風毒壅滯爽神志通和闗竅消惡汗菊花細辛去苗葉石膏研莎草根炒去毛各等分右為細末每服一錢茶清調下食後服一日三服黒散出聖濟總録治首風頭痛不可忍天南星一枚重一兩剉皂莢二梃不蛀者寸截二味同燒令通赤放冷細研半兩芎藭末一分荆芥穗末半兩右研令勻重羅毎服一錢臘茶調服蜜水亦可不拘時候全蝎膏出徳生堂治偏正頭風氣上攻不可忍者全蝎二十箇土狗三箇五倍子五錢地龍六條去土右為細末好酒調成膏子攤在紙上貼於太陽穴上治頭風出神効方苦丁香川芎䔧蘆各等分右為細末噙水鼻内搐之温腦散治頭風川芎二兩天麻川烏炮去皮尖研剉炒黄各一兩右為細末毎服二錢茶調下薄荷尤佳治頭風方出本事方香附子一斤炒烏頭一斤炮甘草二兩右為末煉蜜和丸如弹子大每服一丸葱茶嚼下一字散出濟生方治頭風雄黄研細細辛洗去葉各半兩川烏尖去皮五箇生用右為末每服一匙薑汁茶芽煎湯食後調服治頭風出百一選方熟乾地黄半兩須自晒乾洒酒九蒸九曝者市賣者以緑礬荅色不中用或無即以好大川當歸半兩代之川芎二錢附子一兩炮裂去皮臍右㕮咀每料分五服水一盞薑三片棗一枚煎六分去滓入細磨木香水一蚶殻再煖令熱服張裁衣得此方屢以醫人皆立效細辛散出海上方治八般頭風及眩暈惡心吐逆細辛半兩去葉川芎白芷各一分右為末搐鼻中仍以薄荷湯調川芎細辛甘草為末服之芎草散出海上方川芎十文荆芥五文甘草五文右為末搐鼻中覆花散出海上方旋覆花一兩焙殭蠶一兩焙石膏一兩研細右為末以連根葱煨熟同杵為丸如梧桐子大急痛用葱茶下二丸慢痛一丸立愈三仙不老丸出海上方治頭風腰痛瘡癬草烏去皮尖苦參生用香附子各等分右為細末醋糊為丸如梧桐子大每服三十丸空心陳米湯下一方出海上方治頭目風荆芥穗細辛川芎右等分為末毎服二錢飯後白湯調下立效寸金丹治頭風偏正風等疾大效川烏草烏甘草荆芥薄荷各等分右為末酒打麪糊丸皂子大每服一丸食後細嚼茶清送下治積年頭風粟米胡椒紅豆右為細末搐鼻中取下臭膿却用補藥服之治八般頭風出本事方草烏尖細辛等分黄丹少許右為細末葦管搐入鼻中立效治清頭目辟嵐氣出本事方蒼术四兩焙荆芥甘草各一兩右為細末每服一錢沸湯㸃早晨服凡入煙瘴之地宜修合隨行余昔入廣合一劑毎日一服及歸不染瘴即至僕价等亦皆無染瘴疾者又况能清頭目白殭丸出聖濟總録治首風每遇風時即發頭痛白殭蠶炒菊花石膏研各四兩右𢷬研為末用葱白細研絞取汁一大盞同拌和入炒麪和丸梧桐子大每服二十丸荆芥茶或溫酒下治頭風餅子白芷半斤川芎四兩薄荷四兩右為末用宿蒸餅和合為餅子每服細嚼一餅煎葱茶下神聖餅子出永類鈴方治痰一切頭風猪牙皂角炮存性净末一錢延胡索一錢净末青黛五錢右為末滴水和丸如梧桐子大於日中晒乾毎用一丸新水化開男左女右仰面用葦筒鼻内嚾之口咬銅錢一十五文其涎便出去銅錢却用井水灌𠻳袪風神妙散治偏正頭風𤓰蔕四十九箇赤小豆四十九粒小黄米一百粒右為細末於己間口含水搐鼻内雄黄丸出三因方治八般頭風及眩暈惡心吐逆通明雄黄一兩川烏頭生去皮尖一兩半右為末滴水為丸如梧桐子大每服十丸煨葱白茶清下即用後藥搐鼻内一方酒煑麪糊丸酒下二十丸名烏頭丸搐鼻藥出三因方蓽撥良薑各一分白芷一錢細辛半錢右為末每服一小匙先含水一口搐鼻内吐水即止治頭風痛黒牽牛子七粒縮砂一顆右細研井花水調和仰眠灌鼻中待涎沬出即愈治頭風葉椿方出百一選方白殭蠶去嘴絲良薑等分右為細末毎服半錢白梅茶清調下臨發時服治諸般頭風二三十年不愈者天南星一兩炮川烏生用大者去皮尖四兩右為細末水一盞好茶三錢薄荷七葉鹽梅一箇同煎五分食後臨卧時冷服要熱加生薑汁少許一方無茶薄荷烏靈丸専治頭風川烏頭二兩五靈脂一兩右為末水丸如梧桐子大硃砂為衣毎服一丸薄荷湯磨下葱涎丸芒硝一兩生明硫黄一兩右為細末葱涎丸如彈子大每服一丸食後葱茶調下辛香散細辛丁香各等分右為細末搐入鼻中芷芎散白芷川芎右為末毎服二錢茶清調服専治頭風藥雄黄一錢香白芷三錢右為細末用好酒一鍾葱白三莖將藥放入酒將葱三莖調藥勻先嚼葱便喫藥再喫葱三莖又將酒蕩藥喫重者不過三服服了之後將被葢了頭面汗出即愈附子湯治頭風大附子一箇生用去皮臍菉豆一合右同入銚子内煑豆熟為度去附子服豆即安每箇可煑五服為末服之一滴金丸治首風及偏正頭疼人中白地龍炒各一分右為細末入羊膽汁和丸如芥子大毎用一丸新汲水一滴化開㸃在兩鼻竅中搐附子摩頭散治因沐頭中風多汗惡風當先風一日而病甚頭痛大附子一箇炮去皮臍鹽等分右為散沐了以方寸摩顖上令藥力行一方用麻油和稀餳摩之大川芎丸治首風旋暈眩急外合陽氣風寒相摶為膈痰飲偏正頭疼身拘倦川芎一斤天麻四兩郫州者右為末煉蜜和丸每作十丸每服一丸細嚼茶酒下黄烏丸治頭風不時發作硫黄六錢生用烏藥四錢右為細末宿蒸餅為丸如梧桐子大毎服三五丸食後茶清送下稍者一服住多日則三五服便退荆芥散治偏正頭風及諸般頭痛荆芥末煅石膏末右等分每服二錢葱白三莖薑三片煎湯調服一得立效一方無薑葱治偏風痛不可忍者防風白芷各四兩右為末煉蜜和丸如彈子大如牙風毒只用茶清為丸每服一丸茶湯下如偏正頭風空心服如上身麻風食後服未止連進三服大豆酒治頭風用大豆三升炒令無聲先以一斗二升瓶盛清酒九升乗豆熱即傾著酒中宻泥頭七日温服之治頭風方用荆芥瀝不限多少取差止又方用𢷬葫蘆根一升酒二升漬眠汗出立愈又方用蔓荆子一升為末絹袋盛以酒一斗浸七宿温服三合日三服又方出千金方用臘月烏雞屎一升炒令為黄末絹袋盛以酒三升浸温服任性常令醺酣又方出千金方以七月七日麻勃三升麻子一石相和蒸之沸湯一石五斗徧淋之煑取一石漬神麴二十斤令發釀黍米兩石五斗熱封三七日服清一升百日身澁皮八風胸膈五藏骨髓伏風百病悉去治頭風百藥不效者用天南星一兩以白礬湯泡去毒水五七次焙乾為末分作三服毎分用水二盞白梅三箇同煎至一盞當發時食服楊梅散出海上方用楊梅為末每服二錢食後薄荷茶清調下又方出海上方用香白芷二兩為末以白梅肉為丸如梧桐子大每服三十丸食後茶清任下治頭風并汗方及頭中一切風用荆芥茶煎服之治頭風沐頭方出肘後方用茱萸二升水五升煑取三升以綿染拭髮眼良又方出肘後方治頭風右𢷬葶藶子以湯淋取汁洗頭上三四度即愈芎藭方出肘後方治頭風化痰用川芎不計分兩净水洗浸薄切片子日乾或焙杵為末煉蜜為丸如小彈子大不拘時候茶酒嚼下一丸又方出肘後方治頭風通大小便用烏臼根皮以慢火炙令脂汁盡黄乾後用又方治頭風目眩用䲭頭燒灰以飲服之菊花方主男子婦人久患頭風眩悶頭髮乾落胸中痰結每風發即頭旋眼昏暗不覺欲倒者是其候也方先灸兩風池各二十七壯并服此白菊花酒及丸永差其法春末夏初收軟苗隂乾搗末空腹一方寸和無灰酒服之日再漸加三方寸若不飲酒者但和羮粥汁服之亦得秋八月合花收暴乾切取三大斤以生絹囊盛貯三大㪷中酒中經七日服之日三常令酒相續為佳川烏丸出鮑氏方治一切頭風用芧山光烏四兩須用清白者去皮臍研為細末用韮菜洗過根乾然後取自然汁撥和為丸如菉豆大每服四丸漸加至七八丸用冷茶淸送下臨睡服忌魚腥療頭風出千金方用生油二升鹽一升入油煎一宿令消盡塗頭石鹽尤良治頭風出聖惠方用苦瓠攪碎取汁葦管之屬㗜入鼻其藥上衝腦門須臾惡涎流下如稠膿其病立愈可以除根勿以昏暈為疑治諸風頭痛用真華隂細辛不以多少水洗净白剉如米大拌好細芽茶同煎細嚥下一盞即愈治洗頭風出百一選方用新通草於新瓦上燒存性為灰每服二錢熱酒調下牙闗緊者掉開口灌治頭風羌活防風旋覆花獨活川芎細辛芽蔓荆子停通七味甘草石膏各半加中風作剉煎為妙尋常只得㸃紅茶大師留下羌活散選盡仙方不如他治頭項强不得顧視方出千金方右蒸好大豆一升令變色内囊中枕之又方出千金方右以九月尢日取菊花作枕袋枕卧良及治頭目風熱又方出千金方右以八月後取荆芥鋪牀又作枕頭立春日去之又方出千金方右穿地作小坑深長等一小尺燒令赤以水沃之令小冷去水内生枕蔕滿其上布席就卧近一頭人卧之令項當藥上以衣着頂兩邊令氣蒸病上汗出良久愈若病大者作地坑亦大治頭風頭痛明目用菉豆作枕卧即無頭風赤眼患治頭疼久而不愈痛甚者用苦葫蘆不以多少水一盞熬至三分放冷用筯頭或釵頭㸃入鼻中不可多蘸些小立效一方用子為末吹半匙於鼻中其病立止隨左右用之如聖散治雷頭風癩乾風遍身麻木常服尤妙川烏頭防風去蘆白芷各三兩川芎一兩二錢半草烏頭半兩細辛去苗土净七錢半蒼术二兩去皮實者右件生用曬乾研為細末𫝊如神治雷頭風出濟生拔萃方一名清震湯夫雷頭風者震卦主之諸藥不效為與證不相對也震仰盂故予製藥内荷葉謂象其震之形其色又青乃類象形也升麻研一兩蒼术一兩荷葉全一箇右為細末每服五錢水煎或燒荷葉一箇研細用前藥調服亦可治頭風發雷頭風發聴此言羊糞將來不使錢細𢷬細羅為細末送服酒下便安然黒白散出濟生抜粹方治大頭病如神黒烏蛇酒浸白花蛇去頭尾酒浸雄黄二兩二錢大黄煨半兩右為細末每服一二錢白湯調下無時治赤頭風等證此方名為神聖乳香没藥川芎石膏雄黄各二錢盆硝半錢共用右為細末每搐鼻中専治赤眼冷淚頭風耳聾痒鼻塞聲重如患牙疼一㗜便住摩頭散出千金方治頭風及風毒攻腦疼痛䕡茹半夏蜀椒各六分烏頭八分桂心七分莽草四分附子細辛各一兩右治下篩以大酢和摩頭記日數三日頭膚痛四五日後一著藥如前十月以酢漿洗頭復摩藥即愈若生息肉并咽喉中息肉大如棗欲塞以藥摩之即愈耳鼻齒有疾并用之良犀角升麻湯治鼻額間痛或痺不仁方見本門頭面風類金花一聖散出朱氏集驗方治頭風川芎川烏白芷各等分右為細末每服一匙以生葱三寸薄荷葉三四片同煎食後調服又方出朱氏集驗方治頭風楊梅皮多用右為細末入消風散薄荷煎各一貼若楊梅皮末多則各加兩貼合和為末却用十分厚白梅肉杵為丸彈子大每服一丸食後葱茶嚼下徐介翁熏頭風方出澹療方乳香地龍等分指甲不拘多少細剉右同為細末每服一捻向香爐内慢火燒之却以紙卷筒如牛角狀尖上留一小孔以病人之鼻承之燻透為度遇燻時須含温水令滿口候燻暈即吐去必有涎痰在内仍㸃好茶一盞呷之即愈治眉心并眉梁骨疼者痰飲也出澹療方宜用二陳湯煎飲吞下青州白丸子最驗沉香順氣湯出家藏經驗方専治頭風白术白茯苓各一兩縮砂仁川芎人參各半兩陳皮乾薑各三錢半夏切片薑汁和勻焙乾半兩丁香甘草各三兩沉香半兩右為麤末毎服三錢水一盞半生薑七片同煎至八分去滓温服不拘時候崔菊坡甞苦頭風遂寧何起巖以此方進之服之而愈全蝎散出楊氏家藏方治頭風攻注口眼不正全蝎三枚去毒醋炙赤足蜈蚣一條醋炙麝香一匙别研神砂一錢别研右件為細末同研勻每服一匙温酒調下食後臨睡細辛散出楊氏家藏方治洗頭傷風項背拘急甚者數搐之細辛半兩去葉土防風半兩去蘆川烏頭尖七枚去皮生用地龍去土半錢右件為細末每服二錢水一盞入酒少許槐白皮一寸同煎至七分温服不拘時候麝香䖧􅀈丸出楊氏家藏方清利頭目消風壅香白芷四兩麻黄去根節藿香葉去土天麻去蘆甘草炙羌活去蘆已上五味各一兩細辛去葉藁本全蝎去毒川芎雄黄别研白附子炮已上六味各半兩腦子一錢麝香半錢右為細末煉蜜為丸每兩作一十丸每服一丸細嚼薄荷茶下不拘時候神效散出衞生寳鑑専治頭風江茶二兩香白芷半兩為細末右一處水調成膏子攤在盞内用巴豆十四箇槌碎逐箇燒煙薫盡為度隂乾為末每服一大錢薄荷七葉白梅一箇水一盞煎至六分臨發時服七服立效梅煎散出衞生寳鑑治頭風南星二兩川芎一兩白芷半兩並生用右為細末毎服一錢水一盞半臘茶一錢白梅一箇煎至半盞發時服立效勝妙散出衞生寳鑑治頭風亦治暴感風寒發散外邪蒼术四兩泔水浸一宿草烏二兩半炮白芍藥何首烏一兩川芎半兩白芷一分羌活一錢防風一分獨活一分藿香半兩地龍一兩去土右為細末每服一小錢用薄荷茶調下金花散出衞生寳鑑治頭風川芎六箇三箇炮三箇生全蝎十箇雄黄白殭蠶華撥各六兩石膏一兩煅香白芷川芎各半兩荆芥一兩龍腦薄荷一兩右為細末每服一錢用葱白茶調下天雄散出衞生寳鑑治頭風天雄一兩如無以大川烏代之雄黄半兩水磨澄乾川芎一兩半全蝎半兩去土白殭蠶四錢直者去絲嘴蓽撥三錢微炒右為細末每服一小盞臘茶調下如牙疼先以鹽湯潄口次用藥擦牙上即愈通闗散出衞生寳鑑治八般頭風用半夏為末百草霜少許以紙一條入藥半夏作紙撚子焙極乾毎用藥時先含水一口將紙撚子㸃着鼻中搐之如有涎即吐去再含水再搐如此用三次見效香芎散出華陀中藏經方治一切頭風香附子半斤炒去毛川芎二兩甘草一兩炙石膏一分研右為細末毎服一錢臘茶荆芥湯㸃服食後右鄉古販散出華陀中藏經方治頭風血風又名荆芥散荆芥穗一斤乾菊花半斤川芎四兩白术二兩右為細末食後茶調二錢此藥明目去風治男女一切頭風發作有時甚則頭痛大腑熱宜服此方出䕶命方荆芥穗半兩防風蝎稍伏牛花川芎殭蠶去絲桑寄生山茵陳牽牛各一分右為細末每服二錢半用水一盞先煎令沸入藥末攪便急瀉出和滓喫通氣防風湯出試效方清利頭目寛快胸膈夫胸中若不利者悉初由於表黄耆三錢甘草炙四兩人參五錢葛根一錢半防風一錢蔓荆子半錢右㕮咀如麻豆大分作二服每服水一盞半煎至一盞去滓臨睡温服以夾衣服覆面目勿語須令汗出為效比至服藥前一日少語如服藥畢以少語言一日極效聖餅子出余居士選竒方治風痰清頭目川芎防風白芷甘草各一兩半夏半兩麪炒天南星炮川烏頭半兩炮去皮臍天麻一兩乾生薑半兩右為細末泡餅為丸如梧桐子大揑作餅子每服五七餅茶清荆芥湯任下不計時候梁李全總領方云一服見效此天下第一頭風藥半夏丸出十便良方治頭風吐痰半夏四兩以醋一升煑候醋乾為度甘草一兩右為細末薑汁煑糊為丸以米湯不時下三四十丸湖南押衙顏思退𫝊頭風掣痛以蠟二斤鹽半斤相和於錫羅中鎔令相入揑作一兠盔勢可合腦大小搭頭至額頭痛立止黒虎丹出永類鈴方治諸損男女頭風手足麻痺川烏水鱉肉各一斤地龍洗净去土十兩黒小豆半斤五靈脂二兩右為末以五靈脂同麵糊為丸一丸至二丸温酒薄荷茶皆下又方何首烏十斤生黒豆半斤同煎薄荷二十兩青木香牛膝各五兩皂角一斤燒存性牽牛十兩炒取頭末川烏二兩炮右為末酒糊丸芎藭附子湯出十便良方治風寒客於頭中清涕項筋拘急堅硬又治胸中寒痰嘔吐清水等疾附子芎藭各半兩生薑一兩右三味細切如麻子大拌勻每服五錢水二大盞慢火同煎至一盞去滓食後温服間日三四不得併服嘔逆食前服自然銅散出楊氏家藏方治頭風疼痛至甚黄蘖半兩厚者自然銅半兩細辛去葉土一分胡椒四十九粒右件生為細末毎遇頭疼頭風時先含水一口後用藥一匙搐鼻中左疼左搐右疼右搐搐罷吐去水口咬筯頭瀝涎出為度治頭風頭疼出本草臘月烏頭一升炒令黄去皮尖碾為末入絹袋盛酒三升浸一宿毎服酒一盞温服治頭風明目補腦出本草折取槐嫩房角作湯以當茗治頭風目眩出本草取鶻嘲鳥煑多食之頓進一枚至驗一方以蟬蛻為末飲湯下治頭風痒出本草以莽草煎湯沐之勿令入眼治頭中一切風出本草以驢毛一斤炒令黄投一斗酒中漬三日空心細細飲使醉衣覆卧取汗明日更依煎服忌陳倉米麥麪等治患頭風出本草用山豆根𢷬油調塗之療頭風出本草以莽草華藥沐之腦風論内經嘗謂風氣循氣府而上則為腦風夫風生高逺始自陽經然腎脈陽維之會自風府而上至腦户者督脈足太陽之會也又太陽之脈起於目内眥上額高巔上入絡腦今風邪客摶其經稽而不行則腦髓内弱故頂背怯寒而腦户多風冷也方芎藭酒出千金方治腦風頭重頸項强眼昏昏淚出善欠目欲眠睡憎風劇者耳鳴滿眉眼疼悶吐逆眩倒不自禁諸風乘虛經五臟六腑皆為癲狂諸邪病悉主之芎藭辛夷天雄人參天門冬磁石栢子仁石膏茵芋山茱茰白頭翁桂心秦芃各三兩松羅羚羊角細辛薯蕷菖蒲甘草各二兩防風四兩雲母一兩燒令赤末為粉右㕮咀以酒二斗漬七日初服二合漸加至五合日三有女人少時患風眩發則倒地為婦積年無兒服此酒并將磁石門冬丸服之眩愈生兒平復磁石門冬九方出婦人方中桂心羌活丸出聖濟總録治腦風頭痛久不差桂去粗皮白茯苓去黒皮麻黄去根節白殭蠶炒防風去义枳殻去瓤麩炒烏蛇酒浸去皮骨炙苦參酸棗仁炒烏頭炮裂去皮臍犀角鎊羌活去蘆獨活去蘆龍骨郁李仁去皮研人參等分右為末煉蜜和丸如梧桐子大每服十丸熱酒下摩頂油出聖濟總録治風腦頭旋惡心昏悶發歇不定蓮子草五六月收吴藍梔子葉麥門冬生地黄五味並𢷬取汁各三升連翹秦芁去苗土甘草剉防風去义細辛去苗葉地骨皮大青紫蘇子葉紫草茸各一兩右除前五味汁外麤𢷬篩用絹袋盛同五味汁煎减半去滓澄清後入麻油一升和勻重煎又减半收入瓶内二七日細研馬牙硝四兩攪勻每用量多少摩頂上何首烏丸出聖濟總録治腦風鼻息不通清涕流出及諸風疾何首烏去黒皮三兩芍藥一兩桂去粗皮烏頭炮裂去皮臍甘草炙剉芎藭藁木去苗土甘松羌活去蘆天麻陳橘皮湯浸去白焙縮砂蜜去皮各二兩墨煅存性一分右為末煉蜜和丸如櫻桃大每服一丸薄荷葱酒嚼下芎連散出聖濟總録治腦風鼻息不通時出清涕項背拘急久成眩暈芎藭連翹羌活去蘆柴胡去苗防風去义黄芩去黒心木賊去節荆芥穗甘菊花旋覆花地骨皮一兩甘草炙石膏𢷬研各二兩右為散毎服二錢淡竹葉湯調下食後臨卧日三摩頂立成膏出聖濟總録治頭風腫痒腦熱生瘡目赤痛青蓮花研二朶青黛研四兩石膏研一兩麝香研一兩半芒硝研硝石研各二兩凝水石研朴硝研各一兩桑寄生五兩蓮子草三兩白楊皮剉二兩右以水三升先煎桑寄生蓮子草白楊皮濾去滓再煎下朴硝凝水石硝石减火微煎候凝取出暴乾細研入諸藥等再研令勻以宻器盛每用二錢以生麻油煉熟茶清五匙更煉候如粥用少許於前項連𩕄百會兩鬢處塗摩數百遍能引散毒一方去青蓮花用緑鹽白附子散出聖濟總録治風邪循風府上至腦户為腦風頭痛白附子生用白术天麻白芷各一兩防風去义蘆薈各半兩丹砂研一分龍腦研少許麝香研少許右先將白附子等𢷬羅為末次將丹砂等研細同前藥末拌勻瓷器中盛早晚每服一錢用薄荷汁少許温酒一盞調下芎香散出聖濟總録治腦風頭痛至甚芎藭藿香葉黄耆剉焙天麻各一兩槐花炒一兩蔓荆實白芷各半兩木香甘草炙剉各分右為細散每服二錢荆芥或温酒調下太一麝香湯一名烏香散出百一選方治風邪客於腦頭痛至甚及偏正頭痛夾腦風連眉骨項頸上徹腮項疼痛不可忍者草烏頭生用一兩細辛去苗葉二兩新茶芽二兩右㕮咀如麻豆毎服三錢水一盞半入真麝香一捻同煎八分去滓熱服一方無麝香為末茶清調下臨睡食後服烏頭剉用鹽炒黄桂心散治腦風頭痛桂去粗皮蓽撥細辛去苗葉右等分𢷬羅為散毎用一匙先含温水一口即㗜藥於鼻中偏頭痛隨痛左右用之白附子散出危氏方治腦逆頭痛齒亦痛及治年逺頭痛麻黄不去節天南星炮烏頭炮去皮各半兩白附子炮一兩硃砂研麝香乾薑各一錢全蝎去毒足炒五箇右為末酒調半錢服訖去枕卧少時白附子丸白附子三錢龍腦研一錢麝香研半錢蝎稍微炒七枚天南星炮一兩白殭蠶微炒一錢凝水石煅過研一兩半右除凝水石外𢷬為末再同和勻入白蜜不拘多少研令如稀餳狀入白麪糊半匙頭許然後將凝水石末旋入以乳椎和丸如雞頭大於凝水石末中留少許為衣慢火焙乾每服一丸細嚼薄荷熟水下茶淸亦得食後服通闗散出聖濟總録治腦風鼻息不通不聞香臭或鼻流清涕多嚏肩項拘急頭目昏痛風府怯寒原蠶蛾土炒令黄白附子炮苦參益智去皮蒺藜子炒去角乾薄荷各一兩右為散每服二錢温酒調下日三香芎散出聖濟總録治頭風邪氣留客頭痛久不已荆芥穗芎藭白芷槐蛾莎草根炒去毛甘草炙剉右等分𢷬羅為散茶酒調下一錢日三服羌活丸治腦風氣皷或膈痰氣逆上衝於頭令旋暈方見本門頭面風類必健散出聖濟總録治腦風頭痛甚者白花蛇酒浸三宿去皮骨炙二兩蒺藜子炒去角蔓荆實酒浸二宿焙各一分蓽澄茄二十枚白附子五枚酒浸一宿切作片子炒乾右為散毎服一錢用薄荷自然汁和温酒半盞調下食後服地骨皮散出聖濟總録治腦風頭痛時作及偏頭痛地骨皮一分荆芥穗二兩石膏研飛過二兩白花蛇酒浸炙去皮骨天南星漿水煑軟切焙各一兩右為散每服一錢入臘茶一錢湯㸃服食後臨卧石膏菊花散出聖濟總録治腦風頭痛難任時瘥時發石膏研飛過一兩天南星炮一兩半白殭蠶一兩炒甘菊花一兩甘草炙剉二分右為散每服二錢臘茶調下食後服芎藭湯出聖濟總録治腦風鼻息不通或流清涕多嚏芎藭細辛去苗葉黄芩去黑心各一兩荆芥穗二兩甘草炙剉半兩右麤𢷬篩每服三錢水一盞入薄荷七葉煎至七分去滓温服烏金煎出聖濟總録治男子腦風頭腦俱痛及中風語澁手足無力黒豆五合净淘羌活去蘆獨活去蘆荆芥去梗各一兩右麤𢷬篩以水一斗煎至一升更入無灰酒半升和令勻再煎令沸去滓盛於瓷器中每服一合温酒及薄荷茶調下不拘時候吹鼻㸃頭散出聖濟總録治腦風頭痛細辛去苗葉𤓰蔕各一分硝石半兩右為細散每用新水滿含一口搐藥半匙入鼻中良久即定神聖散出十便良方治腦風項背怯寒腦户極冷頭痛不可忍連眉骨項徹腮頂痛皆治之麻黄去節細辛去苗全蝎生半兩炒半兩藿香各等分右為細末每服二錢煎荆芥薄荷湯調下茶清亦可并治婦人血氣一方用薄荷酒逺志散出宣明方治腦風邪氣留飲頭疼不可忍者右用逺志末不以多少於鼻中搐於痛處揉之相兼前藥可用小芎辛湯出濟生方治風寒在腦或感濕頭重頭痛眩暈欲倒嘔吐不定川芎一兩細辛去蘆白术去蘆炒甘草炙各半兩右剉散每服四錢水一盞半薑五片茶芽少許煎至七分不拘時候温服一方以川芎一兩細辛半兩甘草二錢防風半夏川白芷各半兩煎同上治風濕頭疼立效勝金散治腦風頭疼鼻息不通或流清涕多嚏不已荆芥穗薄荷葉各四兩木賊去節二兩蛇蛻二條微炙右𢷬羅為散每服二錢茶調下食後日三服清神散治腦風頭痛連眼目緊急肢體拘急疼痛芎藭二兩莎草根炒去毛三兩石膏研一兩龍腦研一錢右為散每服二錢用荆芥臘茶淸調下食後服吹鼻散治腦壅頭痛蘆薈研龍腦研𤓰葉搗硝石研右等分為末每用一豆許吹之神效細辛㪚一名附子芎清湯治風入腦經頭痛如破頭痛者謂痛連腦户或但額間與眉相引如風所吹如水所温遇風寒則極常欲得熱煦熨火此由風寒客於足太陽之經入腦致搏於正氣其脈微弦而緊謂之風冷頭痛出海上方細辛一兩净川芎一兩附子炮半兩净麻黄一分右㕮咀入連根葱白薑棗每服五錢水一盞半煎至一盞連進三服一方無葱棗微熱服石膏散出聖濟總録治腦風邪氣留連頭痛不已石膏火煅研天南星炮白殭蠶炒各等分右為散每服二錢葱白二寸臘茶一錢同煎湯㸃連葱頓服良久再服榖精草散出聖濟總録治腦風頭痛吹鼻榖精草末銅緑研各一兩硝石研半錢右研和勻每用一匙吹入鼻中或偏頭疼隨病左右吹入鼻中朴硝散治時氣腦痛不止右用生麻油調朴硝塗頂上立止治破腦風頭浮腫不省人事者出經驗良方右用苕蔕子不以多少用生薑同研極爛以酒調下熱服汗出即愈羌活附子湯出試效方治冬月大寒犯腦令人腦痛齒亦痛名曰腦風麻黄三分不去义黒附子三分羌活半錢防風二分黄耆一錢甘草升麻各二分白芷白殭蠶黄蘖各三分右件都研作一服水二盞煎至一盞去滓温服食後有寒𠻳加佛耳草三分川烏散出危氏方防風白附子北細辛白茯苓川烏菖蒲乾薑香白芷川芎甘草節各等分右為末每服二錢嚼生葱白湯調下食後服腦寒頭痛有風痰晝夜涔涔不得安白芷太陽同研末水調貼患勝靈丹腦寒之病皆因邪攻於上焦令人頭痛晝夜引痛不能安寧出澹寮方用局方太陽丹一貼加香白芷半兩用水調塗患處主添腦出本草以鱧腸草作膏㸃鼻中普濟方卷四十六
