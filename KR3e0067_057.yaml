  - {type: page-break, offset: 0, content: '', id: KR3e0067_WYG_057-1a, image: WYG0748/WYG0748-0589a.png}
body:
  text: 普濟方卷五十八明周王朱橚撰口門總論夫口者足太隂之經脾之所主五味之所入也蓋五味入口藏於脾胃為之運化津液以養五氣五氣者五臟之氣也節宣微爽五臟之氣偏勝由是諸疾生焉且醎則為寒酸則停滯澀則因燥淡則由虛熱則從苦從甘也口臭者乃腑臟燥腐之不同藴積於胸膈之間而生熱衝發於口也口瘡者脾氣凝沸風熱加之而然醫療之法各隨其所因以治之口乾論夫手少隂心之經也其氣通於舌足太隂脾之經也其氣通於口臟腑虛熱熱氣乘心脾津液竭燥故令口舌乾燥也診其右手寸口脈名曰氣口以前脈沉為隂手太隂肺之經也其脈虛者病苦少氣不足以息咽乾無津液故也又左手關上脈浮為陽足少陽膽之經也其脈實者病苦腹中滿不可咽乾燥也方葛根湯治口舌乾焦葛根銼甘草炙各半兩人參二分赤茯苓去黑皮一兩黃耆銼一兩天門冬去心焙三錢桂去粗皮三分犀角屑生乾地黃芎藭各半兩麻黃去根節一兩牛黃研一分地骨皮銼半兩麥門冬去心焙一兩右粗搗篩每服三錢匕水一盞煎至七分去滓溫服杏仁散出聖惠方治心胃中客熱唇口乾燥或生瘡杏仁湯浸去皮尖雙仁麩炒微黃麥門冬去心赤茯苓黃連去鬚梔子仁黃芩地骨皮薔薇根各一兩犀角屑三分甘草炙微赤銼半兩川大黃一兩銼碎微炒右為末每服三錢以水一盞入淡竹葉四十片煎至六分去滓每於食後溫服牛黃丸出聖惠方治心脾壅熱口舌乾燥兼濁煩牛黃三分細研黃連二兩去鬚黃芩芎藭梔子仁馬牙硝細研甘草各一兩炙微赤研川大黃二兩銼碎細微炒麥門冬一兩半去心焙右為末同研令勻煉蜜和丸彈子大每於食後及夜卧時煎竹葉湯研下一丸乾棗湯治口舌乾焦乾棗去核焙貝母去心各一兩半生乾地黃焙胡桃瓤各三兩陳橘皮去白焙牛膝用酒浸切焙葛根銼鱉甲去裙襴醋炙桑根白皮茈胡去苗各一兩右粗搗篩每服五錢匕水一盞煎至半盞去滓溫服不拘時酸棗丸治虛勞口乾酸棗一升酸石榴子烏梅各五合栝蔞實葛根甘草各三兩麥門冬四兩覆盆子三合右為末以蜜丸含如棗大以潤為度茯苓湯治心熱舌乾煩燥白茯苓去黑皮大黃銼炒升麻麥門冬去心焙逺志去心人參葛根炒甘草炙銼各半兩右粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時􅌝􅌣根散治風熱口中乾燥舌裂生瘡􅌝􅌣根三分牛黃乙分白僵蠶微炒白蘚皮川大黃各半兩銼碎微炒子芩胡黃連各三分滑石一分右為細散入牛黃研勻每服不計時候煎淡竹葉湯調下二錢甘草丸治口中熱乾甘草人參半夏生薑烏梅肉各一兩半棗膏二兩半右為末蜜丸如彈子大旋含咽日三一方無薑用石膏栝蔞根湯治口乾渴燥栝蔞根二兩石膏碎二兩鉛丹研三分赤石脂白石脂各半兩澤瀉三分右粗搗篩每服五錢水一盞并煎至半盞去滓入胡粉半錢分溫二服不拘時甘草丸出聖惠方治口舌乾燥煩熱甘草炙微赤銼人參去蘆頭烏梅肉各三分微炒麥門冬一兩半去心焙􅌝􅌣根三分寒水石一兩右為末煉蜜和丸如彈子大每服含一丸咽津茈胡散治口中乾燥心膈痞壅茈胡去苗一兩地骨皮赤茯苓去黑皮枳殼去瓤麩炒旋復花各半兩右為散每服二錢生薑調下三服不拘時杏仁煎出聖惠方治口熱舌焦乾杏仁去皮尖雙仁研半兩生薑汁一合甘草炙銼為末半兩棗去皮核三十枚蜜五合右先下薑汁與蜜煎令煬後入藥煎赤色如餳每取一丸如棗核大含化一枚日宜五四丸甘露丸出聖惠方解壅毒退風熱治口舌乾燥寒水石二斤燒令通赤攤宿於地上出火氣一鉛霜三分細研馬牙硝三分細研龍腦三分細研甘草三分炙微赤銼右為末再入乳鉢內研令極細用糯米飯和丸如彈子大每於食後以新汲水磨下半丸乾棗杏仁丸治口舌乾燥乾棗肉焙杏仁去皮尖雙仁研烏梅肉焙甘草炙銼各一兩右為末煉蜜丸如彈子大每服一丸不拘時含化含化丸出聖惠方治上焦煩熱口舌乾燥心神頭目不利宜服石膏半斤細研水飛過寒水石半斤研如麵白蜜半斤右以水四大盞煎取一大盞半綿濾過入蜜同煎令稠丸如雞頭實大常含一丸咽津又方出聖惠方麥門冬五合蜜三合棗肉三十故右相和勻瓷瓶中於飯甑上蒸一炊久取出每服一茶匙含咽津一方治虛勞口乾以蜜二升和令任意服治口乾除熱下氣方石膏五合蜜一升右以水二升煮石膏取三升內蜜煮取二升去滓丸如棗核大咽汁盡更用麥門冬湯治口舌乾燥心熱麥門冬去心焙栝蔞根各一兩右粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時治口乾方用山羊脂并豬脂雞子大擘之內半升酢中漬一宿絞取汁含之瘥治虛勞口乾用豬脂如雞子大醇酒半升棗七枚擘合漬七日取棗食之立愈玄明粉出危氏方治實熱勞渴口乾燥作煩者及乾喉風立效右用朴硝十斤防風一斤煎水泡溶却用布掤上鋪花葉紙澄濾七遍却於霜下露天露一夜却取內牙硝再用防風水淋漕淨用瓦鉢熬煎成鹽却再入鼎內用鹽泥固濟炭火燒一時通紅為度出火去毒研為末每一斤用甘草三兩每服一茶匙溫熱水調如實熱煩渴口乾燥作煩者可略加硼砂腦子入口噙化主口乾以桑梨蜜煮食之口臭論夫口臭者由五臟六腑不調壅滯之氣上攻胸膈腑臟之燥腐不同藴積胸膈之間而生熱衝發於口故令臭也張子和云遂平一男子年二十餘病口中氣出臭甚親戚莫肯與語戴人過曰肺金本主臟金為火所煉火主焦故如是久則成腐者腎也此極熱則反腎水化也病在上宜通之先以茶調散通而去其七分以舟車濬川散下五七行比旦而臭止人有口臭至老者世以為風系偏而與胃相通故臭者忘也方含香丸治口臭去熱毒風調和臟腑雞舌香芎藭各一兩藿香甘松香當歸桂心白芷青桂香各半兩零陵香木香各三分香附子十枚肉豆蔲去殼白檳榔各五枚丁香麝香各一分細研右為末麝香研勻煉蜜和丸如棟實大常含一丸咽津升麻散出聖惠方治口氣川升麻三兩甘草炙銼藁本白芷芎藭甘松香各半兩防風去蘆頭丁香露蜂房炙黃木香各三分當歸三分細辛地骨皮一分東引桞枝心一兩􅀈乾右為細散每取一錢以綿裹含咽津五香丸出聖惠方治口臭去熱毒夫口者脾之候心脾感熱藴積於胃變為腐臊之氣府聚不散隨氣上出熏發於口故令臭也沉香丁香各一兩薰陸香三分麝香研半分木香羚羊角屑黃連犀角屑各三分甘草炙銼一兩鬼臼黃芩去黑心梔子仁各半兩右為末煉蜜和丸如梧桐子大每服七丸漿水下日二服加至十丸雞舌香丸出聖惠方治口臭去熱毒雞舌香藿香木香草豆䓻仁白芷各半兩零陵香甘松香莎草根去毛各一分當歸桂去粗皮芎藭各三分檳榔銼五枚右為末煉蜜和丸如雞頭大綿裹含化咽津以差為度青黛散治口臭濕疳蝕齒欲落唇頰穿破青黛研甘草炙銼各一兩雄黃研苦礬細辛去苗葉各半兩丹砂研茛菪子微炒青礬石燒令汁盡白礬石燒令汁盡附子炮裂去臍䔧蘆去蘆頭麝香研各一分右為散先以綿拭令淨後用藥貼之五香丸出聖惠方治口及身臭令香止煩散氣豆䓻丁香藿香零陵香青木香一作木香白芷桂心各一兩香附子檳榔各二兩甘松香當歸各半兩右為末蜜和丸常含丸如大豆許咽汁日三夜一亦可常咽之五日口香十日遍體香二七日衣被香三七日下氣人聞香四七日洗手水落地香五七日把他人手亦香慎五辛下氣去臭一方有麝香無甘松含香丸治口臭辟除邪惡冷氣零陵香一兩甘松洗淨焙二兩沉香銼三兩乳香四兩研木香五兩草豆䓻仁六兩檳榔銼七兩桂去粗皮八兩赤茯苓去黑皮九兩甘草炙銼十兩右為末煉蜜丸如泥彈子大臨卧及五更初含化一丸下注丹田能生津液語音清爽顔色悅澤鬢髮烏黑止小便眀目益智補虛勞除冷氣久服一生無患豆䓻丸治口臭肉豆䓻去殼紅豆䓻去皮草豆䓻去皮白豆䓻去皮丁香甘草炙銼人參赤茯苓去粗皮半兩細辛去苗葉一分桂去粗皮一兩右為末煉蜜和丸如雞頭大每用一丸含化咽津甘露飲出聖驗方治男子婦人小兒胃中客熱口臭齒齦宣露膿血目瞼腫但欲冷不思飲食或飢煩不欲食赤眼口舌咽中有瘡疹已未發熟乾地黃洗去土生乾地黃枇杷葉去毛令淨山茵陳去根天門冬去心麥門冬去心枳殼去瓤麩炒黃芩石斛去蘆甘草炙各等分右為末每服二錢水一盞煎至七分去滓食後臨卧溫服分二服仍量嵗數加減與之此方得自一品之家其家用犀角一味甚有道理百發百中有施中有一僕牙宣口臭牙齒漸至頽落豫與二服頓愈服之無不效者本事方前集所未載此方緣得之不易今不欲專為已有不能廣利一切謹附此與衆共之明醫者見之必加嘆賞一方有犀角無麥門冬含香丸一名丁香丸出聖惠方治口氣臭穢宜服之丁香半兩甘草三兩芎一兩細辛桂心各一兩半右為末蜜丸如彈子大臨卧服二丸一方如梧桐子大每服不計時候煎竹葉湯下二十丸治口香去臭方瓜子仁芎藭藁本當歸杜蘅各六銖細辛半兩防風二兩右治下篩食後飲服方寸匕日三服五日口香十日身香二十日肉香三十日衣香五十日逺聞香一方加白芷十八銖沉香散沉香升麻白芷藁本去苖土細辛去苗葉丁香各半兩寒水石研二兩右為散每日早取桞枝咬枝頭令軟托藥揩齒暖水嗽復以綿揩之令淨藁本散治口臭生瘡藁本去苗土芎藭各半兩細辛去苖葉桂去粗皮當歸切焙杏仁湯浸去皮尖雙仁生用雄黃研各一分右為散每用一錢匕傅瘡上日三度七寶散治口臭揩齒令香鐘浮研丹砂研海水沫研白石英真珠末研麝香研珊瑚研各一分右為散再研細以桞木箆子咬頭令軟托藥揩齒芎藭散治凡虛寒口臭蟲蝕齒痛芎藭白芷各一兩甘草炙銼三分桂去粗皮杜蘅各半兩當歸切焙三分右為散食前暖酒調下一錢匕日二服三十日體覺香即瘥抵聖散治口臭齒疳脫落漏齦膿出不止銅緑膽礬各一錢蟾酥七片膩粉兩筒子鉛丹半錢砒霜一錢右為勻先以熱湯嗽口次貼一字表裏拭之候涎出盡别用鹽湯嗽口升麻散出聖惠方治口臭及􅉶齒川升麻一兩半細辛藁本防風去蘆頭芎藭甘草各半兩炙銼右為末每用少許傅齒齗止即瘥治臟腑藴熱上衝發為口臭出十便良方用芎藭不拘多少銼小塊子含化咽津治口臭方一名香附子丸出危氏方用香附子炒去毛為末每早晚揩少許牙上一方為末一半醋糊為丸一半白湯下又方治口臭棗肉八兩芎藭白芷橘皮桂心各四兩右為末以棗丸乾則加蜜和丸如大豆許旦服十丸食前食後常含之或吞之七日口香又方桂心木蘭皮沉香各一兩芎藭一兩半陳橘皮半兩湯浸去白瓤焙右為細散每於食前以暖酒調下一錢細辛散治口臭血不止細辛去苗葉雞舌香各一分菖蒲三分乾薑炮裂棗肉炮乾各半兩右為末每用半錢綿裹如杏仁含咽津日三丁香丸治口臭穢丁香三錢甘草炙一錢芎藭二錢白芷半錢各不見火右為細末煉蜜為丸如彈子大綿裹一丸噙咽津又方治口臭桂心甘草細辛橘皮右等分治下篩以酒服一錢匕瘥又方橘皮二十銖桂心十八銖木蘭皮一兩大棗二十枚右治下篩酒服方寸匕日三久服身香亦可以棗肉丸服二十丸如梧桐子大稍加至三十丸一方有芎藭十八銖又方芎藭白芷陳橘皮湯浸去白瓤焙桂心各一兩右為末以棗肉兼入少錬蜜和丸如梧桐子大每於食前以溫水下二十丸細辛散治口臭細辛甘草炙銼桂心各一兩右為細散每服不計時候以熱水調下一錢一方有橘皮酒服一錢匕瘥口香去臭方一名芎藭散出聖惠方甘草三十銖白芷十八銖芎藭二十四銖右治下篩以酒服方寸匕日三服三十日口香一方為末以綿裹含咽津瘥一方蜜丸如彈子大噙咽又方大棗爪子仁松根白皮右治下篩以酒服方寸匕日二服一百日衣被香丁香散出聖惠方治口臭慝齒丁香研二十枚白礬燒灰香附子各三分右為散用絹揩齒以散一錢傅之一方用鹽揩齒後用藥治口臭穢出聖惠方甘草炙銼松根皮瓜子仁各一兩微炒右為末煮棗肉和丸如梧桐子大每服以熱水下二十丸礬石散出海上名方治口臭􅉶齒白礬燒灰一分麝香少許右細研為末貼患處日三五上一方用青鹽少許調搽吐出涎為度治心氣不足口臭出經驗良方益智子去榖甘草少許右為末時復乾噙咽之更以沸湯調服立效治口氣出百一選方香白芷七錢甘草五錢右為細末食後井花水調下一錢芎芷膏出濟生方治口氣熱臭香白芷川芎各等分右為細末煉蜜為丸如雞頭大食後臨卧噙化一丸治口中臭方桂心古今録用細辛甘草各等分右為末臨卧以三指撮調酒服二十日香又方蜀椒桂心各等分右為末酒服三指撮許生香膏出三因方治口氣熱臭用乾甜瓜子去殼一味研細蜜熬少許調成膏食後含化或傅在齒上尤妙一方空心洗潄訖含一丸如棗核大亦用傅齒治口臭方用象膽每夜和水研少許綿裹貼齒根上每夜含之平明暖水洗口如此三五度瘥一方用牙香薷方出聖惠方治口臭用香薷一把水一斗煎取三升稍稍含之又方治口臭常以月旦日未出時從東壁起步七步回頭向垣立含水噀壁七遍口即香又方出肘後方用細辛豆䓻含之甚良又方出聖惠方用濃煮細辛汁含之久乃吐之又方用井花水三升正朝含之潄口吐厠中良數度即瘥又方出聖惠方用熬大豆焦及熱酢沃取汁含之又方用蜜陀僧為末每服一錢用醋半盞調勻嗽口治口痛用髙腳地銅盤馬蹄香亦和蜜桶藤以醋搗取汁雞毛刷取出涎即愈治口臭及􅉶齒腫痛出聖惠方用乾瓠子搗羅為末蜜和丸如半棗大每日空心淨潄口了含一丸兼取少許塗在齒齗上亦妙梁濟氏膏出衛生寶鑒方梁而飲因勞心過度肺氣受傷以致氣出腥臭唾涕稠粘咽嗌不和口苦乾燥加減㵼白散治之桑白皮二錢地骨皮一錢半炙甘草一錢半知母七分黃芩五分五味子二十個麥門冬五錢桔梗一錢右㕮咀都作一服水二盞煎至一盞去滓溫服食後每日三服忌酒濕麵及辛熱物難經云心主五臭入肺為腥臭其一也因洪飯大熱之氣所傷滋溢心火刑於肺金以桑白皮苦微寒降肺中伏火而補氣故以為君以黃芩知母苦寒治肺息腥臭清利肺氣為臣肺欲收急食酸以收之用五味子之酸溫以收肺氣麥門冬甘苦寒治涕唾稠粘口舌燥為佐桔梗辛溫體輕浮治痰逆利胸膈為使也雞蘇丸出如宜方治口臭心脾熱柴胡二兩麥門冬製四兩黃耆炙一兩阿膠製二兩生地黃末六兩後入膏蒲黃微炒雞蘇一斤即龍腦薄荷甘草炙各一兩人參二兩木通三兩同柴胡銼湯浸二宿絞汁後入膏右除别研藥後入外並搗羅為細末將好蜜一斤先煉二沸然後下生地黃末不住手攪時時入絞出之木通柴胡汁慢慢熬成膏勿令焦然後將其餘藥末同和為丸如豌豆大每服二十丸嚼破熱水下肺熱口臭口中如膠舌乾發渴小便多出永類鈐方地骨皮桑白皮生黃耆山梔子馬兜苓右甘草煎食後噙咽升麻黃連丸出東垣祕藏方治多肉口臭不欲聞穢惡氣使左右得近升麻半兩黃連去鬚二兩生甘草三錢生薑半兩取自然汁連花青皮半兩黃芩去腐酒洗二兩白檀二錢如無藿香一錢代之右同為極細末水浸蒸餅為丸如彈子大每服一丸或二丸細嚼白湯下治口臭以梅曝乾為臘含之可以香口治口臭氣以雞舌香含之抱朴子云應劭漢官侍中年老口臭帝賜雞舌香含之日華子云雞舌香治口氣所以三省故事郎官含雞舌香欲其奏事對答其氣芬芳也唇口面皴論夫唇口面皴者為寒時觸冒風冷冷拆腠理傷其皮膚故令皴劈經絡之氣諸陽之會皆在於面其脈有環唇夾於口者若血氣實者雖徑風嚴寒不能傷之虛則腠理開而受風邪故得風冷而皴劈也又冬時以暖湯洗面及向火外假熱氣動腠理而觸風冷亦令病皴也方生地黃煎出聖惠方一名開脾膏治脾熱唇焦枯無潤澤生地黃汁生天門冬汁各半升葳㽔生麥門冬各三兩去心細辛甘草生銼芎藭白术各一兩黃耆升麻各一兩半右細銼綿裹酒浸一宿以豬脂二斤煎令藥色焦黃綿濾去滓內鍋中後下地黃天門冬汁熬令稠瓷器中盛每服不計時候含咽半匙治唇面皴出聖惠方蠟羊脂硃砂各半兩研細甲煎紫草半分銼右先將蠟於銅鍋中微火煎稍鎔下羊脂煎一沸次下甲煎紫草硃砂等更煎三兩沸濾去滓以竹筒貯之候凝任意使用妙治逺行唇口面皴出十便良方一名豬脂膏用豬脂熟煎以合器盛每至夜間常塗唇及面上或於野宿睡卧唇面不皴治冬月唇乾拆出血方出海上方一名桃仁膏用桃仁爛搗以豬脂調塗於唇上效治緊唇面疱出聖惠方以馬齒莧水煮洗之治瀋唇緊方取鱉甲及頭燒灰作末以傅之普濟方卷五十八
