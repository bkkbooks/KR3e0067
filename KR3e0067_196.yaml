在內悶亂坐卧不安聖惠方用生髮燒灰存性為末新汲水調方寸日三服治緩疸本草用黃耆一兩杵成散不拘時以溫水調二錢匕疸病有五種謂黃疸榖疸酒疸黑疸女勞疸是也黃汗者身體四肢微腫胸滿不得汗汗出如黃蘖汁由大汗出卒如水所致方本草用豬脂一斤溫令熱盡服之日三當下下則稍愈治疸病有五黃疸榖疸酒疸黑疸女勞疸黃汗身體四肢微腫胸滿不得汗出如蘖汁由大汗出卒入水所致肘後方用藍花一把水五升鼠矢兩頭尖者二七枚煮取二升盡服溫覆取汗小半夏湯指南方治濕疸半夏五分生薑八兩用水七升煮至一升分五服腎疸湯試效方治腎疸目黃甚至渾身黃小便赤澀升麻五錢羌活防風藁本獨活柴胡各五分以上治腎疸目黃渾身黃白术五分蒼术一錢豬苓四分澤瀉三分茯苓二分以上治小便赤澀葛根五分甘草三分黃蘖二分人參三分麴六分右件銼如麻豆大分作二服每服水三盞煎至一盞去滓稍熱服食前服療熛疸者手足肩背纍纍如米起色白刮之汁出愈而復發夲草以虎屎白者以馬尿和之暴乾燒灰粉之風疸附論論曰風疸者由風氣在於臟腑與熱相搏便發於黃小便或赤或黃好卧而心振靣虗黑名為風疸也方犀角散聖惠方治風疸臟腑風熱相搏心神不安多卧少起小便赤澀犀角屑黃連各一兩赤芍藥三分茵陳一兩白鮮皮三分梔子仁柴胡去苗葀蔞根子芩各三兩大黃炒一兩五錢朴硝二兩貝齒二十枚燒令赤細研右為末每服不計時煎茅根湯調下二錢以利為度牛黃散聖惠方治風疸心脾風熱靣色虗黑身體皆黃小便赤澀牛黃一分細研犀角屑三分防風三分去蘆葀蔞根大黃炒各一兩甘草五錢炙白鮮皮秦芁各三分去苗麥門冬一兩去心梔子仁五錢杏仁三分湯浸去皮尖微炒黃右為散研入牛黃令勻每服不拘時以竹葉湯調下二錢金銀湯下亦可艾煎丸千金方治因傷風瘀熱不解發於風疸舉身皆黃小便或黃或白寒熱好卧不欲動其脈陽浮陰弱生艾三月內採取束搗取汁銅器煎如膏大黃蒸黃連炒葀蔞仁凝水石苦參葶藶隔紙炒各等分右為末以艾膏和得所丸如梧桐子大初服六七丸漸加至二十丸有熱加苦參渴加葀蔞根小便澀加葶藶小便黃加凝水石小便白加黃連大便難加大黃所加並倍之溫水服之胃疸附論論曰已食如飢者胃疸也夫胃熱則能消榖今已食如飢者以胃氣但熱而無陰也然胃為足陽明陽明之脈絡屬於心陽明得熱則心火上行陽炎過矣單陽成疸心慒煩而身靣黃小便赤色也方瀉熱湯聖濟總録治胃中有熱食已如飢不生肌肉靣色萎黃大黃生銼麻黃去根節黃芩去心各四兩杏仁去皮尖赤茯苓去皮甘草陳橘皮去白炒芒硝澤瀉各三兩右粗搗篩每服三錢水一盞煎至八分去滓食後溫服大黃瀉熱湯聖濟總録治胃中熱食已即飢舌強腹脹身重節疼大黃銼水浸一宿甘草各三兩澤瀉赤茯苓去皮黃芩去心細辛去苗葉芒硝陳橘皮去白焙各二兩右粗搗篩每服三錢水一盞煎至八分去滓食後溫服茯苓湯宣明論治胃中積熱食已即飢靣黃肌瘦胸滿脅脹小便悶赤赤茯苓去皮陳皮去白焙澤瀉各三分芍藥白术各四兩人參桂去皮各二兩桑白皮三兩石膏八兩半夏六兩湯洗七次右粗搗篩每服四錢水一盞半入生薑少許煎至一盞去滓不拘時溫服如病甚者加大黃朴硝各二兩黃芩湯聖濟總録治胃中熱甚食已即飢唇燥口乾黃芩石膏各三分赤茯苓去皮甘草葛根五加皮麻黃去根節各五錢柴胡去苗一兩右粗搗篩每服三錢水一盞入生薑半分煎至八分去滓食後溫服梔子湯聖濟總録治胃中熱盛食已復飢靣黃肌瘦唇燥口乾瀉熱梔子仁赤芍藥犀角屑赤茯苓去皮黃芩去心射干大黃炒各一兩右為散每服四錢水一鍾半煎至八分去滓入生地黃汁一合蜜一大匙攪勻再煎一二沸食後分作二次溫服蘆根散聖濟總録治胃中熱盛食已如飢常渴引飲滌熱蘆根葀蔞根麥門冬去心各一兩知母甘草各五分赤茯苓去皮三分右為粗篩每服三錢水一盞入小麥五十粒竹葉二七片生地黃一分生薑半分煎至八分去滓食後溫服黃連丸聖濟總録治胃中熱盛食已如飢多渴心煩肌肉羸瘦黃連去鬚葀蔞根各一兩麥門冬去心焙一兩五錢知母焙茯神去木各三分右為末煉蜜和丸搗百餘杵丸如梧桐子大食後粥飲下三十丸或牛乳汁下亦可犀角湯聖濟總録治胃實熱嘔逆不下食犀角屑葛根各三分枇杷葉拭去毛炙黃麥門冬去心各一兩右為散每服三錢水一鍾入生薑半分煎至八分去滓不拘時溫服榖疸附論論曰失飢飽甚則胃中滿塞榖氣未化虗熱熏蒸遂為榖疸其證心下懊悶頭眩心忡怫欎發黃小便不利身黃如橘是也寸口脈浮而緩浮則為風緩則為痺痺非中風四肢苦煩脾色必黃瘀熱以行跗陽脈緊而數數則為熱熱則消榖緊則為寒食則滿也尺脈浮為傷腎跗陽脈緊為傷脾風寒相搏食榖即眩榖氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身故盡黃名曰榖疸方石韋湯聖濟總録治榖疸跗陽脈緊而數緊則為實數則為熱緊數相搏胃中苦熱骨節煩疼小便不利石韋去毛木通柴胡去苗茅根各一兩五錢梔子仁芒硝各五錢右銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服日三碙砂乳香丸聖濟總録治榖疸食畢頭眩腹滿及酒疸脈沉實碙砂乳香安息香各一兩五錢杏仁二七粒去皮尖麩炒研巴豆三十粒去皮心膜用醋一盞煮至半盞研右為細末棗肉丸如菉豆大每服五丸食後溫生薑米飲下日二夕一苦參梔子丸聖濟總録治榖疸苦參龍膽黃芩去心各一兩山梔子仁五錢右為細末以豬膽汁和搗五百杵丸如梧桐子大每服二十丸食後米飲下日三紅丸子危氏方治榖疸腹滿眩暈怫欎怔忡酒疸通用二陳湯加􅒦砂煎湯下莪术三稜各二兩醋煮一伏時胡椒一兩青皮三兩炒香阿魏一分醋化右為末别研陳倉米用阿魏醋煮米糊搜和丸如梧桐子大炒土硃為衣每服五十丸生薑甘草湯下榖疸丸一名苦參丸危氏方治胃蓄瘀熱氣濁食榖不消大小便不利脹滿不下食跗陽脈緊而數亦治因勞發熱熱欎發黃苦參三兩龍膽草一兩梔子仁炒五錢人參三分右為末以豬膽汁入熟蜜少許丸如梧桐子大以大麥煮湯下五十丸日三不知稍加之一方用牛膽一箇依上丸服欎金散聖惠方治榖疸唇口先黃腹脹氣急欎金一兩牛膽一枚乾者麝香五分研右為末每服五分新汲水調下不拘時滌熱湯一名茵陳蒿湯治榖疸食畢頭眩心中怫欎腹滿方見夲門諸疸類治食氣遍身黃腫氣喘不得食心胸滿悶皂角不蛀者去皮及子酥炙令焦為末一錢匕巴豆七粒去油右以淡醋及研好墨為丸如麻子大每服三丸食後陳皮湯下日三服隔一日增一丸以利為度如常食酒酒飲一方名黑虎丸苦參丸千金方治榖疸食已頭眩心中怫欎發黃由失飢大食胃氣攻衝所致其腹必滿苦參一兩五錢龍膽五錢去蘆生用右為細末以牛膽和搗三百杵丸如梧桐子大每服十五丸早晚食後煎大麥湯下或以生薑甘草湯下一方煉蜜丸以生麥門冬汁下一方用豬膽不用龍膽榖疸食畢頭旋心怫欎不安而發黃由失飢大食胃氣衝熏所致治之方一名茵陳蒿湯出肘後方見夲門諸疸類茯苓梔子茵陳湯衛生方昔元顔正卿丙寅二月區區官事勞役飲食不節心火乘脾脾氣虗弱又以怒氣逆傷肝心下痞滿四肢困倦身體麻木次傳心目俱黃微見青色顔黑心神煩亂怔忡不安兀兀煩悶欲吐口生惡味飲食遲化時下完榖小便癃閉而赤黑辰巳之間發熱日暮則止至四月則尤甚其子以危急來請治之具説其事疹其脈浮而緩金匱要略曰浮則為風緩則為痺痺非中風四肢苦煩脾色必黃瘀熱以行食榖則眩榖氣不消胃中苦濁濁氣下流熱流膀胱身體盡黃名曰榖疸此之謂也梔子仁蒼术白术各三分豬苓二分茵陳葉一錢澤瀉黃連去鬚各二分枳實麩炒二錢陳皮二分青皮去白一分茯苓去皮五分漢防己二分黃芩六分右㕮咀都作一服長流水三盞煎至一盞去滓溫服食前一服減半又二服良愈內經曰熱淫於內治以鹹寒佐以甘苦又濕化於大行熱反勝之治以苦寒以苦泄之以淡滲之以梔子茵陳苦寒能瀉濕熱而退其黃故以為君難經云并主心下滿以黃連枳實為苦寒泄心下痞滿肺主氣今日傷其氣故身體麻木以黃芩苦寒瀉火補氣故以為臣二术苦甘溫青皮苦辛溫能除胃中之濕熱去其壅滯飬其正氣漢防己以苦寒能去十二經留濕澤瀉鹹平茯苓豬苓甘平導膀胱中濕熱利小便而去癃閉也胡椒紅丸子如宜方治榖疸因飢中過食傷胃藴熱瘀滯腹滿心欎怔忡三稜陳皮青皮莪术各一兩胡椒乾薑各二兩右為末醋糊丸如梧桐子大硃砂為衣每服三十丸空心薑湯煎二陳湯加砂仁下酒疸附論論曰胃虗榖少醉以入房冒犯風邪胃中熱毒隨虗入裏小便黃赤濕毒內聚心下懊痛熏發肌肉則身目發黃赤斑足脛浮腫或下之早則變為黑疸令人心如病飢大便黑瘀皮膚不仁治法既宜先去濕毒後分小水餘隨證治之如心下懊憹而熱不能食則欲吐名曰酒疸夫酒疸者必小便不利心中熱足下熱欲吐鼻燥脈浮者先吐之沈弦者先下之欲嘔者吐之即愈大抵五疸唯酒疸變證最多蓋酒之為物隨人性量不同有盈石而不醉者有濡唇而輒亂者以醖釀而成有大熱毒滲人百脈為病則不特發黃溢於皮膚為黑疸流於清氣道中則眼黃鼻腫種種不同故方中論酒疸外有肉疸黑疸癖勞役疸令人恍惚失常等數證不同方黃連丸聖濟總録治酒疸心靣黃心懊痛小便黃赤不利黃連去鬚黃蘖去皮黃芩去心大黃炒梔子仁欎金黃藥子秦芁去苗上貝母去心甘草炙欵冬花黃明膠炙令燥白芥子各五錢右為末粳米飲丸如梧桐子大每服十丸煎麥門冬湯下半夏湯千金方治酒疸發黃身無熱言語了了腹滿欲嘔心煩足熱或成癥癖心中懊憹其脈沉弦或緊細千金方云酒澼蔭胸心脹滿骨肉沉重逆害飲食乃至小便赤黃此根本虗勞風冷飲食衝心由脾胃內痰所致半夏洗去􅉸茯苓白术各三兩前胡枳殼麩炒去穰一作枳實甘草炙大戟炒各二兩黃芩茵陳當歸各一兩右銼散每服四錢水一盞半薑三片煎至七分去滓空心服當歸白术湯三因方治酒疸發黃結飲癖在心胸間心下從橫堅滿骨肉沉重逆害飲食小便赤黃此由本虗飲食生冷與脾胃痰結所致其脈弦澀白术茯苓各三兩當歸黃芩茵陳各一兩枳實麩炒去穰前胡甘草炙杏仁麩炒去皮尖各二兩半夏湯洗匕次二兩五錢一方加乾葛二兩右為散每服四錢水二盞薑七片煎至七分食前服凡酒疸熱疸大便祕者可服三黃丸方見積熱門赤茯苓丸聖惠方治心下堅而小便赤澀是酒疸之後宜服此方赤茯苓茵陳枳實麩炒去白微黃白术前胡去蘆大黃各一兩甘草炙當歸半夏湯洗七次去􅉸杏仁湯浸去皮尖麩炒微黃各三分右為末煉蜜和丸如梧桐子大每服三十丸粥飲下茯苓丸千金方治酒疸心下縱橫堅而小便赤茯苓茵陳乾薑各一兩白术熬枳實各三十銖半夏杏仁各十八銖甘遂六銖蜀椒當歸各十二銖右為末煉蜜丸如梧桐子大空心服三丸日三稍稍加以小便利為度千金翼加木通一兩大黃十八銖名茵陳丸治黑疸身體暗黑小便澀二石散一名凝水石散千金方治肉疸飲少小便多如白泔色因酒所致其脈弦滑凝水石煆水飛白石脂煆葀蔞根桂心各一兩一錢兔絲子酒浸别研知母各三分右為末每服二錢大麥飲調下日三服五日知十日瘥茵陳湯聖濟總録治酒疸心中懊憹痛小便黃赤茵陳赤茯苓去皮葛根各三兩梔子仁半分葀蔞根三分秦芁去苖土升麻各一兩右粗搗篩每服三錢水一盞煎至七分去滓食後溫服日三桔梗湯聖濟總録治酒疸腹滿如水狀心中懊憹不能下食時時欲吐桔梗銼炒百合赤茯苓去黑皮桑白皮枳殼去穰麩炒各一兩五錢木通二兩檳榔五枚右銼如麻豆大每服三錢水一盞煎至七分去滓食前溫服良久再服白术湯一名桂术湯三因方治酒疸因下後久為黑疸目青靣黑心中如啖韭虀狀大便正黑皮膚不仁脈微而數桂心白术枳實麩炒去穰京䜴乾葛杏仁甘草各五錢右銼為散每服四錢水一盞煎至七分去滓食前服一方有柴胡無桂心治酒疸經驗良方茵陳葛花黃連神麴京三稜細辛各等分右為細末每服三錢用溫酒或鹽湯調無時服葛根湯治酒疸因下後久為黑疸目青靣黑心中如啖韭虀狀大便正黑小便赤或靣黑脈微而數葛根二兩枳實去穰麩炒梔子仁䜴各一兩甘草炙五錢右為散每服四錢水一盞半煎至八分去滓不拘時溫服瓜蒂丸一名牛膽丸治酒疸遍身黃麯塵出瓜蒂大黃炒蕘花炒各一兩牛膽一枚芫花醋炒五錢右為末以清酒二升漬一宿煎至一升去滓入牛膽汁微火煎稠丸如梧桐子大每服五丸溫熱水下得吐利為度六物湯治酒疸腹脹蓽撥荆芥穗不蛀川楝子連皮核用生薑母軟烏梅甘草各等分右於石臼中搗細用磁器盛以自己滿腹小便去其首尾取中間小便浸藥兩重紗蓋露星一宿拂明飲其汁續用車前子茵陳竹園荽煎湯乘熱調五苓散服自覺黃水從小便出而腹不脹追毒飲治酒疸遍身發黃狗脊去毛一兩白芥子甘草各一錢右細銼用酒一升煎取半升去滓分溫二服以利下為度乳香碙砂丸治酒疸心下懊痛身目發黃方見夲門榖疸類大黃湯治酒疸心下懊痛脛腫溲黃靣發赤斑靣不甚熱或乾嘔大黃銼炒枳實去穰麩炒梔子仁各一兩䜴炒三合右粗搗篩每服四錢水一盞半煎至八分去滓溫服日三一方無枳實艾葉湯治酒疸身目俱黃心中懊痛生艾葉一握無生者乾者煮亦得麻黃去根節二兩大黃炒一兩五錢右銼如麻豆大每服四錢酒一盞半入大豆半合同煎至八分去滓食前溫服黃耆术蘭散治酒疸心懊痛足脛滿又小便黃靣發赤斑或黃黑色此由飲酒大醉當風入水所致黃耆二兩木蘭皮一兩右為末每服二錢匕食前熱酒調下日三治酒疸心懊痛足脛滿小便黃飲酒發赤斑黃黑由大醉當風入水所致肘後方芫花椒目右等分燒末服五分立愈如神散危氏方治酒毒不散發黃久久浸漬流入清氣道中宜引藥內鼻滴出黃水愈苦匏子去壳苦葫蘆子各三七箇黃黍米三百粒安息香二皂子大右為末以一字搐入鼻滴盡黃水一二升或過多則以黍穰燒灰麝香末各少許搐鼻立止治酒疸百一選方蒻葉燒灰神麯炒各五錢右為細末每服二錢或酒米飲調下食前服甚妙治酒疸百一選方用田螺七箇水飬出泥捶碎取螺頭細銼以熱酒浸頻服永類鈐方用小螺螄煮肉并汁常服小麥飲聖濟總録治酒疸用生小麥二合以水一盞絞取汁食後頓服一方用三升杵和水取汁五合服之酒蒸黃連丸直指方治酒疸用黃連去鬚淨四兩銼碎以酒灑醃一宿日乾為末米糊為丸如梧桐子大每服三四十丸以二陳湯加葛根茵陳薑棗煎湯送下治酒疸及治熱疸直指方用土瓜搗取汁任服除煩熱解酒疸目黃本草以黃櫨木煮服之治酒疸用明眼草研細調喫大黃丸指南方治酒疸脈沈腹脹滿大便祕方見本門黃疸類治酒疸目黃及野病熱利下血夲草用黃屑水煮服之治酒疸夲草用苜蓿搗取汁服一升令人吐利即愈治酒疸黃色通身者取萱草根搗絞汁服亦取嫩苗煮食之治酒疸以鹽麩子根白皮搗碎米泔浸一宿平旦空心溫服一二升瓜蒂散治酒疸脈浮腹滿欲嘔宜吐之方見夲門黃疸類木通散治酒疸通身黃腫木通銼甘草炙木香檳榔銼麻黃去根節秦芁去苗土瞿麥穗乾薑炮右等分為散每服一錢白湯點服空心食前日三病甚者用豬膽一枚去汁一半入巴豆一粒薤白二寸在膽內以線繫定同青橘皮少許以水一盞半煎熟濾去膽取藥湯調下一錢匕女勞疸附論論曰脾胃素有濕熱或緣大暑醉飽房勞過度引熱歸腎濕氣交攻小水不利小腹堅脹濕氣流於肌肉之中則四肢身靣發黃故謂之女勞疸然其症又有額心黑微汗出手足心熱薄暮即發膀胱急小便自利腹如水狀則不治三因症治云夫交接輸瀉必動三焦上焦屬心中焦屬脾下焦屬腎動則熱熱則欲火熾因入水中中焦熱欎故能發黃下焦氣勝故額黑上焦起血隨熱瘀行大便溏黑貴勝人有男女同室而浴者多成此病攝生者不可不知方辰砂妙香散治飲酒行事酒熱瘀於心經致成黃疸茯苓茯神去木山藥炮逺志水浸去心梗炒黃耆炙各一兩人參甘草炙北梗各五錢木香辰砂另研各三錢麝香一錢右為末每服二錢加辰砂少許用茵陳湯調下日三服人參飲一名人參散治飲酒房勞酒入百脈令人恍惚失常人參白芍藥括蔞根枳殼去穰麩炒茯神酸棗仁各一兩熟地黃二兩甘草炙一兩右銼為散每服四錢水一盞煎至七分去滓食後臨卧溫服鱉甲湯治女勞疸手足煩熱肢節疼痛小腹拘急時有虗汗鱉甲去裙襴醋炙一兩五錢柴胡茵陳地骨皮赤芍藥梔子仁黃耆麥門冬去心焙各三兩右粗搗篩每服三錢水一盞煎至七分去滓不拘時溫服牡蠣湯治女勞疸額上汗出四肢虗煩日晡發熱小便自利牡蠣燒令赤龍膽升麻麥門冬去黑心炒甘心炙各三分犀角鎊藁本桂各五錢右為散每服四錢水一大盞煎至八分去滓熱服溫覆即避風寒秦芁散治勞黃心脾熱壅皮肉靣目悉黃秦芁去苗土犀角屑赤芍藥各五錢茵陳麥門冬去心柴胡去苗各一兩大黃炒二兩黃芩三分右為散每服四錢水一盞煎至六分去滓溫服日三四服以利為度治心熱勞黃口乾舌澀皮肉靣目俱黃上氣喘急宜服此方黑豆二升淨以水四升煎取二升去豆生地黃汁麥門冬汁生藕汁葀蔞根汁各三合蜜右藥并豆汁微火煎如膏於磁器內盛每服一茶匙不拘時服龍膽湯治女勞疸額上黑汗出手足中熱四肢煩疼薄暮發熱小便自利龍膽去蘆甘草炙麥門冬去心柴胡去蘆升麻犀角各三分牡蠣一兩燒研如粉右為散每服三錢水一盞煎至七分去滓入生地黃汁半合再煎一二沸不拘時溫服犀角湯治女勞疸及勞氣熱渴額上汗出手足俱熱小便赤澀犀角鎊龍膽各一兩升麻甘草炙各五錢麥門冬去心焙三分右為細末山藥糊三錢水一盞入生薑一片棗一枚拍碎煎至七分去滓入生地黃汁一合食後溫服小兔絲子治色疸兔絲子五兩洗酒浸一宿研焙石蓮肉二兩白茯苓一兩山藥一兩留一半打糊右為末山藥糊丸如梧桐子大每服五十丸用芎藭湯下加多茯苓下四君子湯直指方治色疸人參白术白茯苓甘草加後黃蘖白芍藥黃耆白扁豆各一兩右銼細每服三錢薑五片棗二枚煎服苦參丸聖濟總録治女勞疸苦參三兩龍膽二兩五錢梔子仁三兩五錢右為末以牛膽汁和丸如梧桐子大每服二十丸溫水下日二夜一稍加至四十丸本草用豬膽服硝石散一名礬石散千金方治女勞疸其腹臚脹膀胱急欲作水狀大便黑者非水其脈滑腹滿者難治身目皆黃發熱惡寒小腹滿急大便難由太勞大熱房室損傷得之交接後入水所致治之方硝石礬石并研各等分右為末每服一錢用大麥粥飲調下蓋衣出汗其病隨小便出者色黃大便出者色黑是效滑石散千金方治女勞疸身黃額黑日晡發熱惡寒小腹急足下熱其脈浮緊腹滿者難治滑石石膏煆等分一作白礬右為末大麥粥飲調下二錢日三四小便極利則瘥豬膏髮煎夲草治女勞疸身目皆黃發熱惡寒小腹滿急小便難由大熱大勞交接後入水所致方見本門諸黃類黑疸附論論曰諸疸黃疸酒疸女勞疸久不已皆變為黑疸其狀小腹滿身體盡黃額上黑足下熱大便黑是也黃本脾病脾者土也脾病不已傳其所勝腎斯受之腎為水臟其經足少陰其色黑病在腎故小腹滿色黃大便黑足下熱是皆少陰經受病之證方當歸湯聖濟總録治諸疸久不瘥變成黑疸當歸三兩桂去皮六兩麥門冬去心一兩五錢黃芩去黑心黃耆乾薑炮赤茯苓去皮芍藥黃連去鬚石膏人參甘草炙各三兩大黃炒茵陳各一兩右銼如麻豆每服二錢七分去滓溫服日三一方無黃耆茵陳蒿丸聖惠方治黑疸身體暗黑小便澀茵陳蒿赤茯苓去皮葶藶子炒各一兩枳殼去穰麩炒白术各一兩一分杏仁湯浸去皮尖炒三分蜀椒去閉口及目子炒令出汗當歸焙乾薑炮甘遂炮各一分大黃醋炒半夏湯洗七次去􅉸焙各一錢右為末煉蜜搗三五百杵丸如菉豆大每服十丸空心米飲下日三一方有木通無乾薑溫水下瓜蒂散一名赤小豆散聖惠方治黑疸身體及大便並黑及黃疸久不瘥瓜蒂一分雄黃研一錢先用醋煮甘草炙一兩瓜蔞二兩右為細散每服一字用赤小豆二十粒茯苓一分水一盞煎至六分去滓調服須臾當吐吐止即愈硝石散治日晡所發熱而及惡寒此為女勞而得之膀胱急小腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治方見本門女勞疸類治黃疸變成黑疸醫所不能療多死急治之方千金方用土瓜根汁每日空心服半錢即半盞其病隨小便出即愈然須量病人強壯者可服半盞羸人一合如無生者即銼乾的一兩水一盞半煎取七分去滓頓服羸量減普濟方卷一百九十六
