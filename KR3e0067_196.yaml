body:
  text: 普濟方卷一百九十六明周王朱橚撰黃疸門三十六黃附論論曰黃病有三十六種所載名數雖同而證候各異皆非黃疸之比求之於經無所稽考然此病中原之人未曾識唯東南方往往有之其狀與熱病相似俚俗能辨之看其口中血脈即知是黃乃施點烙針灸多致痊安者大抵東南之域其地濕其氣熱濕熱相蒸易成瘴毒人感其邪有此黃病療不及時則傷害至速灸烙方治不可緩也方心黃第一病人靣赤口張氣喘多驚饒睡手腳煩疼舌上生瘡心下急悶不欲飲食舌縮口乾七八日內心發狂走即是心黃先烙上管穴次烙關元及炙十八壯若不瘥再炙七炷次烙背心下亷穴及天窗如不瘥再服柴胡湯柴胡去苗枳殼去白升麻黃連各一兩麻黃去根節一兩五錢甘草炙知母焙梔子仁各三兩右為散每服五錢水一盞半煎至七分食後溫服日三飲少熱粥以助藥力汗出為度肝黃第二病人齒黃目如丹赤口燥熱渴氣力虗劣身體青黃即是肝黃眼中血出氣息急者不堪醫先炙肝俞次烙心俞及上𩕄炙下亷次烙臍下三寸次烙中脘陽明二穴若不瘥炙天窗及心腧各百壯又不瘥即作土漿服之又不瘥宜服知母湯炙烙百會土漿方人糞半盞用新汲水三升調入地坑中攪百遍濾取汁二合青蒿汁一合如無汁取末二錢右入生薑汁半合和勻頓服不拘時知母湯聖惠總録知母焙五錢柴胡去苗茵陳蒿甘草炙常山烙鱉甲醋炙去裙襴各三分右粗搗篩每服五錢匕水一盞入䜴一百粒同煎至七分去滓入煉了豬脂半合攪勻食前溫服吐利為度脾黃第三病人兩頰上青脈起目黃齒齗背青唇黑生瘡通身黃色鼻中煤生心腹脹滿不下飲食大便不通即是脾黃先烙頰上青脈次烙脾俞及胃脘及陰都穴不瘥炙脾俞百壯宜服豬苓湯聖惠總録豬苓去皮黃芩去心大黃梔子仁朴硝各一兩右粗搗篩每服五錢匕水一盞半煎至七分去滓空心溫服鹽蜜煎聖惠總録治脾黃脹滿氣沖胸膈大腸不通鹽為末五錢蜜二合皂莢為末一分右先將鹽入銚子內次下蜜皂莢末慢火煎候冷丸如棗核大以膩粉滚為衣納下部中良久大便通利肺黃第四病人口乾舌縮目赤鼻血出先烙足心次烙心俞百會天窗裏亷肺俞丹田等穴若不瘥即炙肺俞期門氣海穴百壯若煩渴欲得飲水及大便不利宜服之黃硝湯聖濟總録大黃炒硝石各五錢右和勻水二盞煎至一盞去滓空心分溫二服腎黃第五病人腳冷靣目俱青身上冷臍下結鞕氣急衝心先烙腎穴次烙期門氣海足陽明兩手心天窗百會等穴若不瘥炙氣海期門下亷腎俞百壯宜候之如氣聲重呼吸勻即堪醫若氣連呼三聲吸氣不入者不堪醫者也炙兩乳下三七壯不瘥宜服雞參飲聖濟總録雞子去殼一枚人參一兩蜜一合生薑汁半合朴硝一分與雞子同研勻右先將人參薑蜜用水一升煎至七合去滓入雞子朴硝攪和更煎五七沸空心頓服藝薹飲聖濟總録治病人手足俱急眠卧艱難藝薹子萵苣子各一兩右同研如泥入新汲水一盞攪和後以生絹濾取汁頓服之鬼黃第六病人汗不出漸加困重惙氣心脹脣黑遍身黃妄見鬼物道得古人名字此是鬼黃宜烙中脘穴更炙二七壯次烙背心及炙上𩕄一七壯又烙心俞肝俞腎俞如瘥即遍身赤色汗流如雨喘氣調勻此為可救如身體青脈息漸微胃脈絶者死如無此候宜服龍齒湯聖濟總録龍齒麥門冬去心人參各一兩遠志去心三分甘草炙銼一分右粗為篩每服五錢匕水一盞半煎至七分去滓食後溫服姧黃第七病人向明卧多愛索鞋擬起身體全冷肉蒼色睡中啼泣或狂言妄語此是姧黃先烙手心次烙第三指間又炙一七壯次烙氣海上脘人中神庭等穴不瘥炙背心下亷穴百壯候之如背心腫腳腫驀回窺人者不堪醫也如無此候宜服茯神湯聖濟總録茯神去木心酸棗仁炒人參各一兩附子炮去皮臍五錢乾薑炮一分右㕮咀如麻豆每服五錢匕水一盞半煎至七分去滓食前溫服血黃第八病人三日鼻中出血大小便亦下血心間煩悶腹中有塊痛如蟲咬吐逆喘粗此是血黃先烙丹田穴次烙後心上𩕄不瘥者宜服續隨湯聖濟總録用續隨子十四粒細研水一盞煎至六分去滓放冷頓服當吐瀉愈看鼻衄及下血其血鮮者堪醫如齒及鼻黑髮直者死茅根湯聖濟總録治血黃頭悶心中痛結塊心煩吐逆生茅根一握銼生地黃一兩拆碎刺薊五錢銼右以水三盞煎至一盞半去滓食後分溫二分人黃第九病人靣青掩口惡聞人聲或似顛狂此是人黃急宜炙烙承漿穴次烙第三椎次烙下脘次烙期門不瘥炙肺俞後心百壯若脈息動止常共鬼語此不堪治若無此證宜服赤箭散赤箭一兩天竺黃五錢牛黃一分鉛白霜一錢右為散和勻服一錢匕食後煎金銀湯下髓黃第十病人四肢疼痛無力好眠冷地身體遍黃次變青緑色起脣齒俱白眼帶微腫宜炙下亷及兩手陽明穴百會等每處各三十五壯若身體赤色宜服黃耆散黃耆銼黃連去鬚甘草炙各五錢黃芩去心一兩右為散每服三錢匕粳米泔調下不拘時癊黃第十一病人色青次却色赤或頸後髮自落喫食漸少吐逆心煩夢與鬼交氣力虗乏或食物難消宜炙臍下百壯得力者肉色漸變如是小便赤澀鼻中煤生齒焦眼黑不堪治也若無此候宜服桑磦硝湯桑磦硝炒白术黃耆赤茯苓去皮人參各一兩甘草炙五錢右為散每服五錢匕水一盞半入生薑棗大拍碎同煎七分去滓食前溫服急黃第十二病人心腹急悶煩躁身熱五日之間便發狂走體如金色起卧不安此是急黃先烙百會次烙下廉再烙肝俞更炙三十壯不瘥炙神庭天窗後心百壯宜用吹鼻方瓜蒂七枚為末亂髮燒灰一錢右同研勻每用少許吹鼻中又方惡實一兩黃芩去心五錢右粗搗篩用水一盞半煎至半盞去滓入馬通汁一合攪令勻更煎一二沸食前分二溫服若是齒如熟豆色惙氣心頭鞭者不可治也氣黃第十三病人初得先從兩腳黃腫大小便難心中戰悸靣目虗黃不能食宜服葫蘆飲用苦葫蘆穰不以多少以水研服少許須臾吐出瘥癎黃第十四病人身如金色不多言語四肢無力好眠卧口吐黏涎者宜服茵陳湯茵陳蒿白鮮皮各一兩右粗搗篩每服三錢匕水一盞煎至六分食前溫服日三白黃第十五病人顔色乾枯目下赤口乾舌縮心中恍惚四肢煩重此是白黃先烙舌上青脈次烙上脘魂門二穴炙二十壯不瘥炙百會氣海百壯宜服地黃當歸湯地黃汁五合如無生以乾地黃三兩水漬研汁代之蜜二合當歸白术各一兩右先將當歸白术用水二盞煎至一盞去滓下地黃汁并蜜和勻分作三服相繼服盡若患人言語錯亂者十死不治也陰黃第十六病人寒熱并十指冷痛鼻中生煤此是陰黃先烙上脘穴更炙二十壯次烙氣海下廉內乳等穴不瘥炙氣海天窗百壯更服麻黃梔子湯若唇反者不可治也麻黃梔子湯麻黃去根節五錢梔子仁七枚甘草炙三分右各細銼用水二盞煎至一盞去滓食後分二溫服膽黃第十七病人身上黃緑色胸中氣滿或硬不下飲食此是膽黃先烙膽俞下脘穴次烙手足心并十指次烙心俞百會神庭風門穴不瘥炙膽俞并後心百壯宜服黃芩湯黃芩去心三分芍藥一兩五錢右粗搗篩每服五錢匕水一盞半煎至七分去滓食後溫服驚黃第十八病人靣青身黃心煩亂起卧不安脣裏生瘡目視昏昏此是驚黃先烙上脘次烙風池心俞下廉穴如不瘥炙後心兩傍一寸五分各二十壯宜服牡荆湯牡荆子白术各五錢芒硝一分研湯化下右細銼以水二盞煎至一盞去滓下芒硝攪令勻食後溫服如病人望之色青近之色白身體涼冷言語帶邪氣急衝心汗出不多此是死候也風黃第十九病人愛笑腰背急手足強口乾舌上生瘡三部脈亂此是風黃先烙肺俞次烙第三椎風門兩旁相去各三寸又烙手心及烙足陽明氣海陰都百會下廉腎俞不瘥更炙神庭天窗氣海後心下百壯宜服麻黃湯麻黃去根節葛根白术各一兩右粗搗篩每服五錢匕水一盞半煎至七分去滓食後溫服走精黃第二十病人惛惛饒睡四肢疼痛靣目俱黃舌上紫色甚則舌靣拆裂及加黑色皆是走精黃宜用藥烙之治走精黃牛脂一兩䜴半合右煎過牛脂以綿褁作包子於舌上烙去一重黑皮濃煎䜴湯一盞飲之不瘥者炙上𩕄穴百會穴後心氣海百壯名爪甲黑者不可治若得睡喘息勻者生酒黃第二十一病人五臟積熱靣赤語言帶邪昏錯亂目中黃色此是酒黃炙後心百會下亷三處百壯若是惙氣上喘脈如屋漏此候不治如祗大便下血宜服澤瀉散澤瀉銼黃芩去心白鮮皮茵陳蒿阿膠交炒各一兩甘草炙三分右為散每服一錢半空心米飲調下日三雞黃第二十二病人靣目俱青好向暗處眠卧不欲見明手捉衣服狀如鬼神望見黃花生者此是雞黃六日堪醫七日難治宜先烙大權次烙風府及手心更炙後心天窗百壯即瘥若腳冷腰疼搐掣左足眼睛忽陷不可治也如無此狀宜服地黃飲地黃八兩肥嫩者洗黃雌雞一隻去毛腸胃細銼右用水一斗煮至五升去滓一日徐次服盡一方以地黃納雞腹中繫定於銅器中蒸令熟絞取汁分五服不拘時溫服蚰蜒黃第二十三病人身體涼冷舌上黑脈及兩頰有青脈起目黃時時變異腦如針刺頭旋欲倒者是蚰蜒黃宜先烙青脈令斷次烙舌上黑脈及舌根兩傍更烙章門百會不瘥即炙氣海下亷百壯宜服驢乳方用驢乳一二升頓服若舌上有黑黃色鼻乾不得睡靣帶青色不可治也火黃第二十四病人先體熱身赤午後却涼遍身有赤點起宜烙腳心背心手心百會下廉即瘥如生黑點不可療也若無黑點宜服紫草湯紫草去苗吳藍各一兩木香黃連去鬚各五錢右粗搗篩每服五錢匕水一盞半煎至七分去滓食後溫服走馬黃第二十五病人眼黃靣赤狂言罵詈怒目髙腎起卧不安發即狂走先烙髮際次烙風門上脘及關元又烙下廉并兩手足心即瘥宜服竹葉湯聖濟總録竹葉一握細切小麥二合生薑一兩白馬通新者絞取汁二合湯成下右用水三盞先煮麥取二盞去麥下竹葉生薑煎至一盞半去滓入白馬通汁一合和勻分溫二服房黃第二十六病人身體沉重狀似著熱不得睡卧小便黃色眼赤如朱心下塊起狀若癡人如此證候十無一生先烙上脘及心俞次烙舌下炙關元下廉百壯宜服燒衣灰方取婦人內衣燒灰細研每服二錢匕溫酒調下黑黃第二十七病人身靣黑黃口脣兩頰上有青脈起出於口角者十無一生亦有脈息沉細喫食不妨身如土色宜先烙口中黑脈次烙百會穴又烙玉泉足陽明穴章門心俞下廉不瘥宜服鬼臼方聖濟總録用生鬼臼一兩絞取汁一小盞服之即瘥如無生鬼臼即用乾者搗為末每服二錢新汲水調下不拘時服厭黃第二十八病人四肢煩疼手足無力吐逆不下飲食漸漸瘦弱先烙玊泉及炙三十壯次烙口中黑脈并曲池炙裏廉後心百壯如未瘥宜服大黃湯聖濟總録大黃銼炒木香枳殼去穰炒各一兩右粗搗篩每服五錢匕水一盞半煎至七分去滓食前溫服水黃第二十九水黃之狀靣目俱青狂言妄語聲咽不出先烙關元次烙下廉百俞髮際不瘥炙後心氣海百俞百壯宜服大黃甘草湯聖濟總録大黃銼炒甘草炙各五錢右銼如麻豆大每服用水一盞煎至六分去滓食後溫服又方聖濟總録乾木瓜一兩芥子半合陳橘皮湯洗去白銼炒五錢右銼如麻豆大分為三服每服水一盞半煎至八分去滓食前溫服爪黃第三十爪黃之病口苦舌乾身體急強靣目俱黃行履不得言語狂亂四肢疼痛發即便走宜先烙後心次烙氣海足陽明及烙百會炙五心穴各二十七壯未瘥宜服瓜蒂散聖濟總録用瓜蒂一兩為細末每服五分匕新汲水