body:
  text: 普濟方卷二百七十四明周王朱橚撰諸瘡腫門諸疔瘡廣濟療疔腫犯之重發方以青羊糞一升用水二升漬少時煑兩服絞取汁一升頓服無所忌又方出肘後方以鹿角焼作灰三年大醋和刺破四畔傅上則大良又方出肘後方以馬兠鈴擣根以蜘蛛網裹之傅瘡少時根自出又方出肘後方以焼鐡針若釵烙燼瘡根此方無有不應手瘥者療背彌騐又方出肘後方用顛蟷頭二枚蜘蛛短脚墨者好二物並先取隂乾彌精緋方寸倒須棘刺二七枚蜂􅀈一棗許大薰陸香炲煤亂髪各一棗許大其炲煤取竈突上者八物先鋪亂髮次下緋蜂窠及諸藥以髪纒裹作塊長釵穿之炭㷔上轉側後炙熱㷔盡停冷細温清酒一小盞子和一錢服盡一食乆即瘥瘥訖欲之後針棘根即痛變成好肉若經食犯者療取驗疾口已噤者折齒灌之入咽即其顛蟷蜘蛛無乾者濕用亦得一無禁忌又方出肘後方取戸邉蜘蛛搗以醋和先挑四畔令血出根稍露用藥塗乾即易後旦至午後㧞根出大有神効一方用斑蜘蛛冷無毒又方出聖惠方取栁枝葉煎為劑塗之神効一方細挫水五斗煑取三斗去滓煎如餳刺破塗之又方出肘後方防毒氣入心常飲枸杞汁至瘥又方治疔腫用白犬血塗立愈及手指赤随月生死煑苦酒沸以生薤一把内中熱出以傅之即愈又用韭治疔瘡用九月九日採芙蓉花葉隂乾研細如遇有瘡兒用井水調銀釵打成膏厚紙攤貼瘡上次日用蚰蜒螺即鬼丁螺一箇用銀器盛打破依前調藥却將油蜒螺放在瘡上貼待過周日掲起其疔自出立効其藥不用要攤闊治疔瘡用多年墻内或泥土中秀釘洗净以灰火内煆入醋内淬待冷用刀刮釘銹又於火内煆紅入醋淬仍前刮末再三如此煆淬刮末用紗帛細羅包裹遇人有此證略將瘡口撥開挑藥末在内不拘貼何膏露蜂房散出聖惠方治疔腫露蜂房亂髮蛇蛻棘針各三兩一方用皂荚刺代右以緋帛裹於熨斗内焼灰細研為散空心温酒調下一錢匕晩再服根自出一方用温水調下一方緋帛一尺分作四片褁上件藥髮䋲扎炭火焼存性服棘鍼散出肘後方治疔腫内消棘鍼倒勾多年者三十二枚大豆黄生用四十枚緋頭􅔮三條毎條濶一寸亂髮如雞子大三團右分三分各将緋一裹棘鍼豆子用髮一團纒裹令周匝牢固各於炭火焼令烟盡先研兩團令細温酒半盞調下候覺瘡四邉軟即瘥過半日未効更服一團必瘥瘥後犯之當有三五頭赤黒膿出不經犯者七八日瘥勿輕之其棘鍼一年已上陳者佳此法常用神効良方治疔腫病疽瘡出本草以赤翅蜂焼令黒和油塗之療疔腫出本草用白薑石末和鷄子清傅之疔自出治疔腫出本草用苦苣折取莖中白汁傅之疔腫出根又方以苦苣搗汁傅疔瘡殊驗青苗隂乾以備冬月為末水調傅治疔瘡出本草以蜆子活侵取汁洗瘡痱以糟煑蜆食之治疔瘡出本草以白狗屎水絞取汁服之治疔腫惡瘡出本草用銅鑛石末傅瘡上良治疔腫出本草以槐葉煎湯服皮莖同用治疔腫出本草搗充蔚莖傅之仍服其汁使疔腫毒内消及治諸毒腫服之亦効一方用子破疔腫開出本草以新人屎封之一日根爛療疔腫惡瘡骨疽出本草以蝮蛇皮作灰傅之治疔腫瘡出本草以前藥為細末用清油調塗之瘡口内立効又方以㧞毒散水煎服方見本門熱腫類又神効方千金草四兩明礬五錢乳香一兩右為末酒調下一錢出汗為度又方治㧞疔兩尖一兩係兩頭尖巴豆四箇右為細末貼瘡上紙封又方治冷疔瘡青靛一兩明礬七錢右為末井花水調服五錢仍飲熱葱湯一盞被盖汗出即愈治赤根疔出千金方熬白粉冬黒蜜和傅之良治一切疔瘡出本草以螲蟷焼為末和臘月猪脂傅之治疔瘡櫻桃者用佛掌花根蜜薑三件研汁服用天茄藥繫瘡口上連珠者用鴨脚青蕪蘇研糖水拌刷水晶者用水莧天茄治疔瘡用荔枝或三箇五箇不用雙復用狗食過米糞淘浄為末復用糯米厚粥一處研搗成膏用好皮紙攤上貼之患處紙上留了一竅只痊可又方治疔瘡凡黒者中央凹四畔黒腫用頭髮䋲扎住將尖葉薜荔葉搗細取汁和蜜調一盞服之又用葱白和蜜搗傅患處又方治水疔瘡色黄􅂒麻木不疼用刀刺四畔將桕樹根經行路者取二尺許去皮搗細井花水調一盞服待㵼用三角銀杏去殻浸在油水年久者搗盒患處亦治暗疔瘡頭凸紅色使人昏懵狂􅀈者又方治冷疔瘡用生烏頭切片醋熬成膏子塗瘡上絹帛貼次日去絹疔根自出又方治疔瘡取末結子柜樹根細嫩者洗淨去黒皮取白皮擂細以無灰生酒調開攄去滓用藥吞下解毒雄黄丸瘡化黄水而散奪命丹治一切疔腫血蝎一錢蟾酥銅緑明礬硃砂輕粉大黄各半錢麻黄半兩去根節麝香三字海羊十五個去蝸牛一方用龍腦二字右研為細末將海羊研細爛為丸如雞頭大毎一丸先嚼葱白三寸然後用好酒送下一丸如重車行七里汗出為効走馬丹硃砂輕粉粉霜金脚信雄黄蟾酥百草霜又方治一切疔腫班猫不去翅足不可用多多則結頂藥不能入殭蠶麻蟲蒼耳内者炒磁石仙人髄蒼耳子肉一方加輕粉右用白梅猪謄為膏常以蜜濕潤之遇有瘡調藥傅上早間傅至午前再換立馬囬奪命散治疔瘡咽喉乳鵝腫痛喉痺大効牡礪當歸牛蒡子白殭蠶各五錢大黄一兩右用毎五錢用青石磨刁水酒各一盞煎去滓連進二服疔瘡汗者生無汗者死又方治一切疔腫麻蟲江茶殭蚕右為末用蜜水調傅上二烏散出永類鈴方治發背蜂窩疔瘡便毒等證川烏草烏各一箇右將新瓦一個汲新水一桶將川烏頭草烏頭併瓦俱浸於水桶内如無新於房上取浄瓦亦可候透瓦將川烏草烏於瓦澁面磨藥成膏就磨藥手挑藥貼於瘡口明圍如未有瘡口慢慢塗藥如三四重紙厚上用紙條透孔貼盖如藥乾用雞翎蘸水掃濕如此不過三兩次一方單用草烏亦可用醋磨又方治一切疔腫用楊樹上大烏殻硬蟲或地上新糞内泥堆中者亦得活者取末用蜜浸待死將新瓦上煆灰用好醋調傅上先用針將火上焼過待冷撥損瘡頭上又方用麻樹蟲焼灰為末用麻油調傅即愈又方用田螺一箇以好氷腦二片放在螺内化為水㸃瘡上又方用南墻上朝陽螺螄殻用手撚易碎者又用田中浮螄去靨搗爛丸如蘿蔔子大遇瘡放一粒在内又方先用針刺周圍令出紫血次用海螵硝脊骨為末掺於刺破處其疔自出又方用江菇放銅青在内即時化水将瓦噐藏之必用銀簮頭㸃治疔走了黄打衮将死者牡蠣大黄山梔子金銀花地骨皮牛蒡子連翹木通乳香没藥皂角刺瓜蔞右等分氣壮者加朴硝水一碗酒半碗同煎一服定愈救命仙方也治魚臍疔瘡疼痛不可忍方出聖惠方淘河舌一枚天南星一分肉桂一分去粗皮砒霜半錢硃砂一分巴豆五枚麝香半錢硇砂一分右為極細散用黄臘并猪膽汁相和消鎔為丸如緑豆大一丸放瘡上取穴為度其藥却収取毎一丸可藥五六人青金錠子銅緑三錢青礬真者輕粉白丁香真者苦葶藶净洗各一錢研細片腦麝香各半錢右藥先研葶藶子細次下餘藥用研細白麺加白芨末一錢調糊為度捻如麻黄麄約入瘡口深淺絍入疼者可治不疼難治前藥分作三分加减藥用一𦂳峻加砒一錢生用碧雲錠子閉瘡口用二𦂳緩加砒一錢煆煉過碧霞錠子去死肉三緩慢去砒加枯礬一錢碧玉錠子生肌肉詩曰𦂳峻始初開瘡口𦂳緩去肉慢生肌若人會得三般錠免使針刀五臟虧先賢妙法傳為是分明一一與君推更通難素隂陽理起死囬生天下知聖授奪命丹五倍子槌碎洗净三兩重山茨菰去皮焙乾二兩重即紅金撜花根川墨焼存性一兩重續隨子去殻不去油二兩重一名千金子五靈脂洗净一兩重㧞藍根洗浄焙乾一兩重即大靛子紅牙大㦸去蘆洗浄一兩重右用續隨子加麝香四錢二味另研外六味另研細令勻却用公鴨血為丸無鴨糯米粥亦可分作四十九丸隂乾勿令見日量病人虚實忽半丸忽一丸生薑薄荷井花熱水磨化細細服之三五行為度温粥補之合藥日用端午重陽天德月德吉勿令人見專治一應無名疔腫肺癰肚癰菌蕈菰子金石砒毒疫死牛馬羊肉河豚魚毒時行瘟疫山嵐瘴氣急喉閉纒喉風脾病黄腫衝冐寒暑熱毒上攻癰疽發背未破魚臍瘡湯火所傷百蟲風犬䑕咬蛇傷用東流水磨化塗之又磨化半丸服之良乆覺癢立効打撲攧傷炒松節加酒磨化服半粒仍東流水磨化塗之男子婦人顛邪鬼氣鬼胎用熱酒磨化一丸作二服有毒吐下自縊溺水打折傷死但心頭微熱未隔宿用生薑蜜水磨化灌之芫花根膏出聖惠方治魚臍疔瘡乆療不瘥芫花根二兩猪牙皂荚五挺白礬二兩焼令冷細研黒豆三合右用醋一斗先洗芫花及皂荚黒豆三日於釡中以火煎至二升去滓後却日當中煎至一升入白礬末攪令勻去火成膏但是魚臍丹惡瘡攤於帛上日二易之治魚臍疔瘡出危氏方絲瓜葉即虞刺葉連鬚葱韭菜右入石鉢内擣爛如泥以酒和服以滓貼腋下如病在左手貼左腋下右手貼右腋下在左脚貼左胯右脚貼右胯如在中則貼心臍並用布帛縛住候肉下紅線處皆白則可為安如有潮熱亦用此法却令人抱住恐其顛倒倒則難救矣奪命丹硃砂半錢乾胭脂一分蟾酥右為末毎服一錢用帯根葱一根破開将藥於用火焼軟湏嚼碎好酒下汗出為妙一方用銀朱水為丸毎服一丸温酒下名走馬丹治魚臍疔瘡以新火針瘡四邊赤中央黒可針刺之若不大痛則殺人又方出千金方以臘月魚頭灰和髮灰等分以雞溏屎和傅上此瘡見之甚可即能殺人一方不用髮灰以雞子清塗又方以寒食餳傅之良硬者焼灰塗貼即瘥治魚臍瘡頭白似腫痛不可忍者出聖惠方先以針刺瘡四畔作孔擣白苣取汁滴着瘡孔内一方用白芷崔氏療魚臍毒瘡腫方出千金方凡瘡初生之時頭白如黍米許大當中黑如蟻四畔赤至四五日之後疼痛不可忍似潰不潰雖至潰破膿出廻轉還滿疼痛不止者便是其候取獺屎以水和封腫處及瘡上即得膿出止痛消腫慎口與患疔瘡腫同必至瘥莫浪雜犯觸又方出崔氏方治魚臍毒腫瘡藥難醫治火内治魚眼睛魚睛瘡藥難醫治火内焼礬上面攤寒食麫糊敷貼了無膿抽腫完全治魚臍疔瘡如黑豆色者以大針針瘡四邉兼中央出聖惠方用臘猪頭一枚焼灰搗為散以雞子清調勻傅瘡上日三易之雄黄硇砂各一錢蟾酥金脚信各半錢加輕粉半錢巴豆一十箇生用右為細末刺破絍之蟾酥錠子蟾酥不以多少八角兒四箇粉霜少許雄黄少許麝香少許巴豆一箇去皮右將八角兒先研如泥化開黄蠟少許入前藥末和成膏子如麥粒大如有患瘡者先用針針破疼時用榆條兒送下藥後用雀兒糞於瘡口内放二箇如瘡囬也不須下藥如不疼依前再下藥如針破無血時係是着骨疔即於男左女右中指指甲用女人未使新針刺之有血時藥糊突下瘡内効如指内無血即於脚大拇指内刺取血糊突藥丸下瘡口効如是都無血時恐證難醫必死然如此呵再将醫六七人藥下瘡口内救之忌飲冷水如瘡更不囬用蟾酥放瘡口内便囬如蟾乾用八角兒且如冬月天無八角只用八兒窠三箇用楊桞上者酒煎散治疔瘡赤烏桕根水桞根水楊梅根葱頭根紅内消白香芷各等分右剉散酒煎旋入通明雄黄研爛和服如㵼時瘡勢畧退只喫此藥若不㵼再服通利藥通利藥黒牽牛炒一兩巴豆十五箇去油大黄五箇生用右為末米糊丸如菉豆大初服七丸次五丸第三服五丸如㵼不止喫白粥及冷水洗五心如一服即止㵼服量人虚實與服如人盛服前二藥通再服後藥人十分實者大通藥芫花巴豆大黄荆芥各等分生用右剉散白水煎一沸便濾過空心服可留藥滓再煎放用若要㵼住再服一服連翹散㵼後用此用小蒜五月五日採者生食之不可常食治疔瘡用蜣蜋安盞内以膿米泔半盞在内以火逼之蟲熱喫泔及困死取腹中白肉新瓦上焙乾為末熱酒調二錢服仍以些小傅瘡即愈一方蜣蜋心即腹上度稍白處搗爛貼瘡上半日許再易血盡根出昔劉禹錫纂桞州救三死方云元和十一年得疔瘡凡十四日益篤善藥傅之皆莫能知長樂賈方伯教用蜣蜋心一夕而百苦皆已明年正月食羊肉又大作再用如神驗大忌羊肉蜣蜋所忌貝母散出鮑氏方治馬疔川山甲焼存性貝母等分右為末酒調下三四服隨用先藥下惡物用小刀子取出烏疔深者寸半用惹蠒花乾小便浸乾為末麻油調傅治疔瘡奪命散出保命集烏頭尖附子底蝎稍雄黄各一錢蜈蚣一對硇砂粉霜輕粉麝香乳香各半錢信二錢半腦子少許右為細末破瘡出惡血以畢草仗頭用紙帯入於内以深為妙㧞毒散出楊氏家藏方治十腫疔瘡毒氣發硬如石痛不可忍鈆百霜膽礬粉霜硇砂硃砂少别研上五味各一錢蜈蚣一條炙右件研為細末先用針桃令血出入藥一字在内上用醋煑麫糊貼之一日其根潰出立愈又方出未類鈴方用紫花地丁草擂水洗極有効元朝脫脫丞相疔方太醫院抄本未用他藥先服硝黄湯利動毒氣若虚老人却宜斟酌出永類鈴方朴硝明者熬成牙硝二錢大黄生用半兩荆芥黑牽牛炒各半兩甘草節四錢右為細末酒調空心以利為度疔腫隂證脉沉四肢冷瘡不發出永類鈴方用五香散除大黄加蒼耳連肉酸棗仁藿香茯苓黄茋肉桂當歸防風白芷附子等藥生薑煎半水半酒以發藥性潮熱皮膚受毒加生大黄柴胡地骨皮嘔逆脾胃受毒加丁香喘𠻳肺經受毒加杏仁去皮尖知母蓁芁紫苑大小便秘腹脹滿加製枳殻木通苦葶藶或生大黄眼花心經受毒加硃砂雄黄麝香脚冷腎經受毒加木瓜黑牽牛並鹽炒發渴自汗肝經受毒加黄芩山梔疔瘡陽證潮熱心間霍亂或發譫語六脉洪大出永類鈴方用五香散熱不退而渴用不二散蛇床子生大黄作末冷酒或冷水調二錢止二服使微利主疔瘡出本草以㫁罐草合白牙荲菜青苔半夏地骨皮蜂窩小兒髮緋帛並等分作灰五月五日和調諸藥末服一錢疔根自出治溪毒疔腫用狗屎和臘月猪脂傅之疔根出救生丹專治諸腫疔瘡眼内火光出昏迷不醒用一丸研細放舌中汗出効三月辰日採生桑黄荆葉用竹針穿成孔用紙裹風内隂乾至未端午前多収蝦䗫至端午日五更將二味藥為細末用蝦䗫酥滴在藥末上就為丸如用時再用雄黄同藥一般大同為細末依前服之救生散服前救生丹却用此藥外傅瘡上用荆桑二藥同為細末一錢胡桃肉一箇片腦半錢大黄半錢硇砂半錢同為細末用竹針撥開瘡口唾津調藥末如麥大一錠貼瘡上封固為妙反花瘡附論夫瘡生惡肉久則反出於瘡外故謂之反花瘡其初如一飯粒破之血出餘毒尚熾惡肉隨生根深而膿潰此皆風熱毒氣之所作也方臙脂散出直指方治反花瘡臙脂貝母各一分硼砂没藥各半分胡粉一分右研細先以温漿水拭後傅藥甘草塗傅方出聖濟總録治反花瘡甘草半生半熟礬石灰人中白宻陀僧各半兩右為末入童子小便半盞以㣲灰火熬用竹箆攪成膏取塗瘡上日三五次臙脂塗傅方出聖惠方治反花瘡臙脂一兩胡粉一兩半右相和研令勻先以鹽湯洗瘡浄帛揾乾用藥傅之三五上治反花瘡方出聖惠方以䑕尾草根細切不拘多少熱搗和豬脂封貼瘡上用䑕粘草根莉蘆傅方出聖濟總録治反花瘡莉蘆末豬脂右相和調糊塗瘡上日三五度惡實根塗傅方出聖濟總録治反花瘡并治積年諸瘡不瘥者惡實根末四兩豬脂右調和如糊塗瘡上日三四度又方出聖惠方鷰糞胡粉各一兩右搗細羅為散先以温漿水洗瘡後以藥傅之治反花瘡久不瘥方出聖惠方用鵓翎三兩炒黄為散先以温漿水洗瘡揾乾以藥傅之馬齒莧塗方出危氏方取馬齒莧搗爛令細塗瘡上日五度一方焼灰以豬脂調塗之治反花瘡方出千金方取踟蛛膜貼瘡上乾即易之瘥止治反花瘡方以桞枝葉三斤剉水五升煎至二升去滓再煎如餳塗傅瘡上日三五度一方以清油單煎桞枝令焦黄去滓候冷令塗之治反花瘡方出聖濟總録以硇砂細研塗傅上日三五度治反花瘡方以蒼耳藥搗攪取汁服三合并塗瘡日三五次治反花瘡方出本草以鬼屎刮取和油塗之生隂濕地如屎亦如地錢黄白色者治反花瘡方出本草以掬天皮和油塗之浸淫瘡附論夫心惡熱風熱藴於心經則神志躁鬱氣血鼔作發於肌膚而為浸淫瘡其狀初生甚微痒疼汁出漸以周體若水之浸淫佚不止故曰浸淫其瘡自出曰流散四肢者輕毒氣已升出故也從四肢反入於口則重以毒復入於内故也方水沉膏乳香輕粉白歛赤歛各二錢雄黄半錢白芨黄丹烏魚骨各一錢右為細末後將草藥一處再為末先用熟絹子放在水上浸少時取出量大小調藥攤於絹子上貼瘡口上三二日勿敷之升麻湯出聖濟總録治心有風熱生浸淫瘡遍體升麻大黄剉炒黄芩枳實芍藥各一兩甘草炙當歸各半兩右麄搗篩毎服五錢用水一盞半入燈心一握煎至一盞去滓空心晩食前服苦瓠散出聖惠方治浸淫瘡表裏相當苦瓠一兩蜂房蛇蛻各半兩大豆半兩梁上塵一兩右治下篩以粉為粥和傅紙上貼之日三一方無大豆胡粉散出聖惠方治浸淫瘡多汁胡粉研炒黄甘草䕡茹黄連去鬚已上各半兩右搗細羅為散日三四上以傅之戒鹽塗傅方出聖惠方治浸淫瘡戒鹽半兩大黄一兩䕡茹心一分右為細末以酒調塗傅瘡上日三五度治靣上耳邊生浸淫瘡有黄水出久不愈名辦香瘡羖羊鬚荆芥乾棗去核各二錢右焼灰存性研勻入膩粉半錢同研每日少許清油調搽先以温熱湯洗浄拭乾塗藥三二次必効又治大人小兒兩吻瘡立効丸治浸淫瘡疼痛動臟腑雄黄一兩雌黄五錢没藥半兩巴豆一兩去皮不出油另研乳香五錢木香一兩右為細末麺粉丸梧桐子大毎服五丸夏月清茶下冬月温水食後下又方出千金方治浸淫瘡以豬牙車骨年久者槌破焼令脂出熱塗之鷄冠血塗方出聖濟總録治卒得浸淫瘡早不治則遶身周匝能殺人外臺云浸淫瘡轉廣有汁多起於心以雄雞冠上刺血塗傅日三五度牛屎汁塗方出聖濟録治浸淫及濕瘑丹毒以牛屎新者絞汁傅之或取乾者焼烟燻之亦佳治卒得浸淫瘡有汗多發於心不早治周身則殺人出肘後方以秫米熬令黄黒杵末以傅之療卒毒氣攻身或腫或赤痛痒并分散上下周匝煩毒欲死方出聖惠方以生鯽魚切之如繪以鹽和搗傅之若通身即多作遍病上乾復易之此為浸淫瘡也備急同一方用豆豉和搗傅之或醬清調用魚焼灰為之亦療馬瘡苦練散又名苦練膏出聖惠治浸淫瘡及大人小兒禿惡瘡右以苦練根日乾存性或用皮亦得為末豬脂調傅濕則掺先用苦練参大腹皮煎湯洗一云取皮并枝焼作灰傅上治卒得浸淫瘡有汗多出於心不早治周匝身則殺人出聖濟方取胡鷰窠中末水和傅之治浸淫瘡出本草以瞿麥搗傅之治浸淫惡瘡用胡麻子生嚼傅之治浸淫瘡遶身至心者死用燕子窠中草焼灰為末酒調服之冷瘡附論夫形不足者温之以氣氣能養形故也周官瘍醫掌腫瘍潰瘍金瘍折瘍有五氣養之之法盖以氣不足則血不行血不行則經久不瘥所謂冷瘡是也盖諸瘡既潰風冷之氣入於榮衞傷於肌肉故冷瘡而不痛痒治宜温肌養血滌汚除膿則愈方猪骨膏出聖濟總録治諸瘡口氣冷不瘥猪筒骨二箇取髄松脂通明者研二錢乳香研黄連去鬚為末白芨為末各五分同研右搗研鎔蠟和為膏不拘時傅之乳香膏治諸冷瘡久不瘥乳香一両食鹽末一両半松脂杏仁湯浸去皮尖研各一両半生地汁三両白羊腎脂半斤蠟三両右先熬脂令沸下杏仁生地黄汁蠟煎候蠟鎔盡入香鹽松脂煎以桞棍攪勻甆合盛取傅瘡上日三両度蕪荑散出聖惠方治冷瘡久不瘥蕪荑一両微炒䔧蘆一両去蘆熏黄半両青礬半両雄黄五錢苦参三分附子三分右為末先以温水洗瘡去痂拭乾生油調塗之烏賊魚骨散出聖惠方治冷瘡發歇疼痛膿水不止生肌烏賊魚骨一兩焼黄連一分㯽榔一枚訶梨勒皮一分白龍骨一錢半赤石脂一錢半麝香一錢右為細散於瓦鉢内入麝龍骨赤石脂相和研勻毎用時先暖鹽漿水洗瘡拭乾後以散傅日二用之葶藶膏出聖濟總録治一切瘡久冷葶藶一両蜣蜋五枚馬牙蟲五枚蟬殻五枚斑猫五枚麝一錢右搗研為末煉蜜和為膏以故帛上攤貼日三次瘥為度二黄散治冷瘡不愈雌黄雄黄宻陀僧定粉膩粉各一分乳香少許右研細乳香同研蜜調傅之六灰煎膏出聖濟總録治諸冷瘡紫肉乆不瘥石灰五升蒺䔧灰白頭翁灰桑灰白柞灰如無蒿灰代之䔧蘆各半斤右相和於瓦甑内蒸一飯時取釜中湯淋下灰汁二升於銅器中煎成膏以磁合盛先以塩湯洗瘡後取塗傅即瘥葱白湯治諸瘡風冷腫痛皆因瘡腫坐於水中及風冷所致或反脹腫入腹則能殺人葱白切蜀椒去目及合上者用薤白各半斤香䜴二合防風三兩芎藭一兩半右剉碎取一長項甆􅑥納藥於􅑥中下水二升以故帛及紙三兩重宻封􅑥口以繩縛之然後納􅑥於釜中以水煑之􅑥中氣沸當中通氣以瘡當氣上射之瘡中黄水出盡即止日三兩度再煑􅑥令熱用之以瘥為度亂髮熏方治冷瘡亂髮鷄屎蠟各二兩大麻子大豆各二合青布一尺二寸右先鏞髮安青布上吹鏞鷄屎蠟麻豆等如果餅角可麄如臂長一尺以繩縛之取一瓦着煻灰火置藥於瓦中更以一瓦覆上以繩縛定塞一頭孔其烟只一頭出以瘡當烟上射之令瘡中黄水出盡乃止或汗出勿觸風薰了鎔熱蠟疰瘡中即瘥㯽榔散治冷瘡鷄心㯽榔木香硫黄薑黄各半兩吴茱萸麝香一字右擣末麻油調傅有膿乾掺㯽榔散治冷瘡不瘥㯽榔半兩甘草欝金木香黄連各半兩麝一字右為細末令勻先取砒霜少許安上用生油調敷有膿乾掺日再換丹砂散治冷瘡長肌肉止疼痛丹砂一分麝一分陳石灰一分鉛丹一分猪筒骨一枚右搗羅為散毎用一錢乾傅之乳香散治瘡冷及膝脛生瘡年深筋骨攣躄膿血不瘥乳香一錢紫藤香末一錢安息香灰半錢人指甲灰五分硇砂一字右細研令勻用油單褁角令人懐中貼肉懐十日取丹研令勻患者以温水洗瘡以紙撚子小頭上㸃藥少許深納瘡中外靣以帛子裹縛令定一夜當取出惡物如魚腸之類自然生肉雄黄散治冷瘡暖瘡口雄黄研百合乳香研黄蘖去皮炙墻上爛白蜆子小蚌蛤子是各一分右為細散先用漿水煎甘草􅊜桞枝湯温洗拭乾𫝊之乳香散治冷瘡暖瘡立止疼痛乳香研末麝黄蜀葵花搗白小豆搗黄蘖右等分搗為細散乾傅瘡口附子散治冷瘡夜發歇疼痛附子半兩泡裂去皮臍川椒一分去目白礬三分焼汁盡細研膩粉二錢雄黄一分細研右附子川椒二味為末次入白礬膩粉雄黄相和勻毎使以清油調令得所貼瘡日二換木香散治冷瘡或在頂上或在脇間年深未瘥木香乳香各一分母丁香一枚麝一字右搗研為散用雞子一枚打作眼子取清和藥二錢却入空殻内濕紙盖了飯上炊熟分作四服毎日空心午間臨卧各一服爛嚼臘茶下金黄散治冷瘡經乆不愈雄黄括蔞根五倍子等分右為散先用温漿洗瘡了乾貼如瘡口久不合者洗了用巴豆一米許絍瘡内待血出後傅此藥治冷瘡疼痛不止方蛇床子一兩乳香半兩薤白臨時切右為末入薤白搗㸔稀稠得所可瘡上貼之治積年風冷疼痛方麝香一分乳香一分龍骨一分右細研用黄蠟臨時㸔口大小於湯内鎔蠟如軟麫入前藥相和熱貼在瘡口上不過三兩度又方治冷瘡日夜發歇疼痛龍骨一兩焼蜂窠一兩焼蛇床子焼半兩右研令勻以生油調塗日二換之桑灰洗方出聖濟總録治冷瘡以水淋桑柴灰汁温浸洗日三五度即瘥棗肉浸洗方出聖濟總録用棗肉二斤以水五升煑取三升浸之洗瘡以瘥為度生肌散出聖濟總録治一切瘡口不合以秦芁净洗焙乾為細末貼之便生肌肉冷露瘡出應驗方用細茶同藿葉一處煑一般焼灰油調照瘡大小攤在葉上貼之灸藥餅出聖濟總録治冷瘡諸瘡中風冷氣膿出痛急薤白切一合商陸切二合右以鹽半兩相和熟搗令細捻作餅子厚如錢安瘡口上以艾炷灸令熱氣射瘡中即水出再灸水出盡即止餅子乾頻頻換之以瘥為度熱瘡附論凡熱瘡起便生白膿黄爛瘡起即淺但出黄汁名肥瘡又有洪燭瘡身上忽生瘭漿如沸湯灑劇者徧頭靣亦有胸脇腰腹腫緩通體如火湯灼瘭起者是也治之急服漏蘆湯下之外以升麻膏傅之其間傅升麻膏若無効一依𫝊丹方熱瘡本於熱盛風氣因而乗之故特謂之熱瘡盖陽盛前表實形勞則腠踈風邪得入相搏於皮膚之間血氣之内聚而不散故藴結為瘡赤根白頭輕者瘭浆汁出甚者腐為膿血熱少於風則痒熱盛於風則痛而腫方内塞散一名防風散出聖惠方治大瘡熱退膿血不止瘡中肉虚疼痛排膿防風去义白茯苓去黒皮白芷桔梗剉炒逺志去心甘草炙炒人参芎藭當歸切焙黄耆剉炒各一兩肉桂去麄皮半兩附子二箇泡裂去皮臍厚朴去麄皮生姜汁炙三分赤小豆五合酒浸熬之右搗羅為散酒調下二錢日三度一方無酒用黄芪湯調下白蘚皮散出聖惠方治遍身熱毒瘡及皮膚瘙痒發躁白蘚皮子芩川升麻𤣥参白蒺䔧微炒去刺桔梗去蘆頭前胡去蘆頭百合甘草炙微赤剉梔子仁各半兩馬牙硝一兩麥門冬一兩半去心焙右為散毎於食後以薄荷湯調下二錢黄耆湯出聖濟總録治瘡退風熱黄耆剉一兩半生地黄四兩甘草炙剉麥門冬去心焙芍藥黄芩去黑心各一兩半石膏碎芎窮大黄剉炒人参當歸切剖一兩右剉如麻豆毎服五錢用水一盞半竹葉七片煎至一盞去滓空心温服日晚再服犀角散出聖惠方治熱毒攻皮膚生瘡疼痛犀角屑木香川升麻吴藍𤣥参子芩羚羊角屑防風去蘆頭白蒺䔧㣲炒去刺枳壳麫炒黄去穰甘草炙微赤剉各一兩麝香一錢研細入右為細散毎於食後煎竹葉湯調下二錢白蒺䔧散出聖惠方治熱毒瘡瘙痒心神壅躁白蒺䔧㣲炒去刺白鮮皮防風去蘆頭子芩𤣥参赤芍藥梔子仁桔梗去蘆頭川大黄麥冬去心焙前胡去蘆頭甘草炙微赤剉各一兩右為細散毎於食後煎薄荷湯調下二錢木蘭皮膏出聖濟總録治熱瘡木蘭皮芍藥射干蛇床子各一兩白芷黄連去鬚一兩半黄栢去皮黄芩去黑心狼牙山梔子各一兩豬脂二斤右除脂外細剉如麻豆大先熬脂令沸下藥煎候白芷黄赤色以綿濾去滓甆合盛塗瘡上日三五度即瘥甘家松脂方出肘後方療熱瘡尤嗍膿不痂無瘢松脂白膠香薫陸香各一両當歸蠟一兩半甘草一兩並切猪脂羊腎脂各半合許生地黄半合右以松脂等末内脂膏地黄汁中微火煎令黄下蠟絞去滓塗布貼瘡極有驗秘不能𫝊此是半劑蛇床子散出聖濟總録治熱瘡蛇床子乾地黄各半兩苦参洗大黄生木通剉白芷洗黄連去鬚各一兩狼牙半兩右搗羅為散旋取臘月猪脂調塗傅瘡上日三五度赤小豆散出聖惠方治熱毒瘡腫痛赤小豆糯米各三兩松脂黄蘖㣲炙剉白礬灰萵苣子三合黄丹㣲炒宻陀僧各半兩細研右為末研勻用生油調日三兩次塗之芎藭散一名大黄散出聖惠方治熱瘡多膿汁芎藭大黄生白歛芍藥黄連去鬚槐皮剉龍骨火焼各半兩右搗羅為散塗傅瘡上日三五度一方無芎藭紫金散出聖惠方治一切熱毒瘡紫草黄芩漏蘆車前子黄蘖各半両剉赤小豆糯米各一合炒焦右為末以生油調令稀稠得所日三塗之人参龍骨散出千金方凡患腫皆因宿熱所致湏服冷藥瘥後有患冷利不止者人参龍骨赤石膏甘草乾姜各三兩附子一枚右㕮咀以水八升煑取二升半分三服毎服八合麦門冬湯治體卒生熱瘡麦門冬去心焙二兩䜴炒一分人参三分桑根白皮剉一兩半肉桂去皮半兩甘草炙剉一両右麄搗篩毎服五錢用水一盞半葱白三寸切同煎至一盞去滓空心温服晩再服紫草膏出直指方治熱瘡紫草茸黄連黄栢漏蘆各半兩赤小豆菉豆粉各一合右搗細入麻油為膏日三傅常服黄連阿膠丸清心又方出直指方治熱瘡淫濕南星半夏黄栢黄連各一分五倍子煆虢丹各半分右細末糁癢加煆白礬更癢加雄黄熱證平血飲出危氏方治徧身生瘡膿血臖腫極痛極癢乾葛赤芍藥升麻各一兩粉草五錢天麻加蟬蛻加右挫散與人参敗毒散合和生薑薄荷生地黄麥門冬去心煎不拘時候服大效膩粉膏出聖惠方治熱毒瘡腫痛膩粉胡粉細研黄連去鬚為末甘草生為末各一両松脂半両猪脂六両鍊了者右先以猪脂煎松脂花後去滓下四味攪勻甆合盛用毎日三四度塗之狼牙湯出聖惠方治熱毒惡瘡淋洗狼牙赤芍藥白芷黄蘖丹参各五両川大黄三両生用右細剉分為六貼毎度一貼以水四升煎取二升半去渣㸔冷暖洗之日三度黄芩湯治表熱實身體生瘡或發瘡癤大小便不利梔子仁半兩知母焙甘草炙剉黄芩去黑心各一兩大黄剉炒二兩右麄搗篩毎服五錢水一盞半煎至一盞去渣入芒硝一錢空心温服以利為度未利再服二參丸出聖濟總録治熱瘡𤣥参苦参烏頭炒裂去皮臍用之何首烏各二兩丁香一分右搗羅為末麺糊丸如梧桐子大毎服二十丸至三十丸空心塩湯下日三金露散出瘡科精要治時氣熱毒瘡黄栢一両白芨白歛雄黄各二錢半寒水石生一兩半右為細末無根水調以紙花紙貼或掃亦妙宻陀僧散出聖惠方治熱毒惡瘡臰爛乆不生肌宻陀僧雄黄雌黄定粉各半兩膩粉三錢右研為末先用桞枝一握生甘草一兩槌碎以漿水二升煎六七沸去滓稍熱淋洗瘡後以藥傅之竹茹膏出醫方大成真麻油二両青木香半兩青竹茹一小團杏仁二七粒去皮尖右用藥入麻油慢火煎令杏仁色黄去滓入松脂末半兩熬成膏子毎用少許擦瘡上四聖丸出𫝊信適用方治熱毒風瘡何首烏蔓荆子苦參荆芥穗各一兩右生為細末酒糊為丸如梧桐子大毎服二十丸至三十丸温酒送下水銀膏出聖惠方治熱毒瘡亦治頭中惡瘡水銀并胡粉入少水研星令盡胡粉松脂各二兩猪脂半斤鍊了者右先以猪脂煎松脂令消次下水銀胡粉攪勻甆噐中盛旋取塗瘡日二胡治云療兒頭靣瘡加黄連二兩亦療得禿瘡大黄散出聖濟總録治熱毒瘡腫大黄剉炒赤小豆各三両石灰一両右搗羅為散用釅醋調塗傅瘡上日三五度即瘥大黄散出聖濟總録治熱瘡大黄生為末硝石研各半兩黑膠一分右先搗大黄硝石為末用醋半合鎔膠烊調散子如糊塗傅患上日三五度即瘥又方出直指方治熱止痛収汁先用大腹皮苦参白芷煎湯泡荆芥洗次用止地榆苦参白芷黄連等分右為細末入真蚌粉乾掺更痛加去皮菉豆治身體生瘡熱毒似火焼爛赤方出聖惠方胡粉黄連去鬚各一両膩粉一錢右為末用掺瘡上日四五度又方出聖惠方宻陀僧細研胡粉細研各一兩黄連二両去鬚為末右研勻先以温水洗去瘡痂拭乾日三四度傅之黄連散出仁存方治風熱毒氣胳膊肌膚成瘡癢痛不止黄連一両輕粉一錢右為細末入輕粉和勻瘡乾燥生油調塗有膿汁乾捻在患處一日兩三上黄連湯出聖濟總録治熱不散體生細瘡黄連去鬚四兩芒硝四兩右先將黄連以水一斗煎取七升去滓下芒硝乗温洗瘡上冷即再煖洗日三五徧以瘥為度治皮膚熱生瘡及皮熱方苦参地龍去土右等分為末醋糊丸毎服三十丸空心酒下温漿亦可青金散治一切熱毒膿窠瘡青黛一兩寒水石一兩煆過蘇為度右為細末用香油調搽茄子角方出聖濟總録治熱瘡先取生茄子一枚割去二分令口小再去瓤三分似一罐子合於腫上角即消如已出膿再用以瘥為度地榆根湯出聖濟總録治熱瘡以生地榆根二斤洗切細剉以水一斗煎出五升去滓温洗瘡上冷即温日二度瘥治熱瘡搗蕪荑和猪脂塗瘥白金散治風攻注毒便及手足生熱瘡疼痛有黄水出者用桂府滑石為細末先用虎杖甘草豌豆各等分約半兩許二椀水煎上項藥煎至二椀去滓㣲熱淋洗瘡水冷拭乾上掺滑石末冷通便睡至明决愈治遍身熱毒瘡痛而不痒手足尤甚粘着衣被夜不得睡及治頭瘡出危氏方多取菖蒲為末布於􅀢上使病者恣卧其間仍以衣被覆之五七日瘡愈疹瘡爛用艾葉亦可一方用末傅瘡上苦参丸出醫方大成治肺受熱毒遍身生瘡及治火丹用苦参為末粟米飯和丸梧桐子大毎服五十丸米湯送下或為末水調傅丹上治熱毒赤瘡子心神煩熱出聖惠方用梔子仁二兩以少酥拌㣲炒為細散每於食後以温水調下二錢硝石水漬方出肘後方治服丹石人有熱瘡疼痛不可忍用硝石研末以紙撚作䋲如指大累起圍腫上取硝石填令滿以匙抄新汲泠水澆令濕候覺寒冷不痛即止日三四徧瘥為度宻陀僧散出楊氏家藏方治熱毒攻注遍身生瘡臭穢不可近者黄連去鬚宻陀僧火煆别研香白芷白歛已上各半両膩粉半錢右為細末先以塩湯洗瘡次用生油調藥以翎毛傅之五参丸出澹嶚方凡瘡無有不属腎心者赤而痛乃心經熱痒而黑乃心腎虚皆當兼服此藥人参杜参𤣥参苦参沙参等分右為細末麺糊丸熱水吞下本草無杜参一方用紫参即沙参之紫花者亦名杜蒙羚羊角散出朱氏集騐方治一切濃泡熱瘡及發背羚羊角黄耆生熱地黄川芎當歸芍藥右等分㕮咀毎服三錢水一盞煎八分空心服鹿角丸出朱氏集騐方治療同前鹿角剉黄蓍炙右等分却入羚羊角一半蜜丸地黄酒下趙龍學病虚服之剛劑多劉立之云必有瘡疾服此藥後不發止遍身發細瘡用生地黄汁觧白餅酒常服兼進前方服之遂無事盖鹿角散血羚羊角消濃兼用鍾乳鹿茸為丸服之治熱瘡出本草以蚯蚓屎鹽研傅之治熱瘡出本草以田中螺肉擣碎傅瘡上治熱瘡觧諸毒出本草以藍澱傅之治熱瘡出本草以水萍搗汁傅之治身皮瘡熱氣出本草以牛扁作湯浴之治大颷熱瘡及疥瘡出本草以活螄搗碎傅之治火心瘡出本草以慎火草根濃研取汁塗患處疿瘡附論夫經謂汗出見濕乃生痤疿盖熱盛汗出陽氣發泄而腠理踈反以寒水洗浴則熱氣内欝於皮腠之間輕則為疿重則為痤也世俗通謂之疿子瘡其状皮肉如毫針所刺徧體細瘡如麫片愈而復發者是也方玉粉散出御藥院方治熱汗浸漬成瘡腫痒焮痛定粉一両蛤粉九両半石膏白石脂白龍骨各半兩滑石粟米粉二兩寒水石焼通赤於浄地上放冷出火毒一両右為末再捻極細勻毎用藥乾擦患處七寳散出御藥院方治熱汗浸漬成瘡痒痛不已黄耆當歸防風荆芥穗地骨皮木通各三両白礬一両右為麄末毎用藥一両水三椀煎五六沸濾去滓稍熱淋泄患處拭乾避風少時先師東垣老人論次方城北獨桞店之客舍有推江軸者皮膚皴裂不任痛両手不能執轅足不能履地而輙止宿因製此藥與傅之即効明日遂行自此屡用屡効赤石脂散出聖惠方治疿子磨破成瘡宜止痛生肌赤石脂細研一两黄蘖去粗皮剉臘茶末各半両白麺二両龍腦半錢右搗研為細末毎用時綿揾撲之葛粉方治夏月疿子及熱瘡葛粉三両石灰㣲炒半两甘草生用為末一両右研細末毎服用時綿揾撲之滑石粉方治夏月疿盛滑石研菉豆粉研棗葉乾者為末各一両右合研為細末徧傅之治熱疿瘡方乾炭灰半合石灰半合㣲炒棗葉半斤右為細散先以温漿水洗瘡後以藥傅之瘥蛤粉散治夏月㧓破皮膚成瘡蛤粉白礬各少許胡桃一箇焼灰右研細油調塗之龍腦粉方治疿瘡痒痛龍腦一錢粟米粉五両右研細末先用棗葉湯洗後綿揾撲之玉女英治夏月疿瘡痒痛一名疿子滑石粉菉豆粉四両㣲炒滑石半両研右拌勻如粉綿撲之棟花粉傅方治疿子瘙痒以苦棟花不拘多少焙乾細為末入蚌粉滑石末各少許研勻日頻傅之丹惡散治夏月疿瘡取舊屋梁上刮取舊赤白羅末傅之治暑月肌膚瘡爛或因搔及汗抓成瘡出水汗出坐卧濕地多是大暑傷肌膚取乾壁土揉細末傅之随手即瘥治夏月痧疿子痒痛用新汲水挪蒿汁調蛤粉傅之雪水尤妙又方以剪草汁調蛤粉傅之剪刀草即慈菰葉也治熱疿瘡以棗汁揩之和葛根汁尤妙亦治熱瘤一方棗葉乾為末和葛粉褁之治暑月汗漬腋下赤腫及疿瘡以臘和拌粉傅之立瘥瓦木上以雞毛羽掃取収甆瓶中持久亦不壊可用或用霜亦可一方加滑石菉豆粉同和勻無雪水則用新汲水調塗或日乾撲之又方用升麻煎湯洗仍湏先歛一盞如神治痤疿法用黄瓜一枚切作段子擦疿子上玉粉散治疿痤寒水石四两火煆紅取出地上去火毒井泉石二両生用腦子半錢右件細研新水調傅乾撲亦得治疿子用冬瓜切摩甚良治疿瘡英粉方用粟米浸累日令敗研澄取之傅瘡尤佳普濟方卷二百七十四
