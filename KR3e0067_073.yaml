body:
  text: 普濟方卷七十四明周王朱橚撰眼目門暴赤眼論夫暴赤眼者肝心壅熱散於血脈之中熱氣上炎攻衝眼目令暴赤隱澀疼痛風氣加之則癢悶也龍木論云暴赤眼後急生翳外障眼初患之時忽然目睛赤腫淚出或癢或痛此是肝心壅毒在胸膈之間更相擊發臟氣上攻致使然也切宜熏洗出血後飲蘆根飲子鎮肝丸歌曰忽然暴赤白睛紅輕者無妨甚者痛還是肝心二臟熱更相擊發使相攻蘆根飲子須通淺莫遣他時更復蹤丸散鎮肝吞半劑如斯治療有神功方好槐枝湯治赤目昏痛淚出隱悶槐枝銼二兩秦皮黃連去鬚蕤仁去皮馬牙硝黃柏去粗皮山梔子各半兩古字錢十四枚淡竹葉一握細切食鹽一分右前藥粗搗篩每用五錢水二盞入錢煎至一盞半濾去滓放溫洗眼冷再暖洗蔓荆實丸一名羚羊角丸治肝臟風熱目暴赤隱澀腫痛方見本門目風赤類犀角湯治肝心壅熱上攻眼目暴赤腫隱澀疼痛犀角鎊黃芩去黑心瞿麥穗黃連去鬚三分梔子仁各一兩車前子木通銼大黃炒柴胡去苖青葙子各一兩右粗搗篩每服五錢水一鍾半煎至七分入竹葉去滓入芒硝半錢食後放溫服臨卧再服石蜜煎出聖惠方治暴赤眼石蜜三兩半硃砂食鹽各研細川芒硝細辛石決明水飛過各細研烏賊魚骨各半兩鹽緑一分研蕤仁一兩半去赤皮黃連去鬚為末右研如粉以蜜調成膏磁器中盛之每點如菉豆大內眼大眥中宜避風處治暴赤眼方見本門目赤痛類鎮肝丸出龍木論治暴赤眼後生翳膜外障羌活石決明各一兩藳本一兩半乾山藥細辛五味子車前子人參茯苓各一兩右為末煉蜜為丸如梧桐子大空心茶下一十丸犀角散出聖惠方治暴赤眼腫澀痛犀角屑子芩瞿麥黃連各三分去鬚梔子仁大黃炒車前子木通芒硝各一兩右搗篩為散每服三錢水一鍾半入竹葉二七片煎至六分去滓食後服之加味香蘇散出德生堂治時行赤眼暴發赤腫怕日羞明疼痛難忍紫蘇香附子陳皮甘草桑白皮生地黃蘇木蟬脫黃芩各二兩右㕮咀每服五錢水一鍾半燈草二十莖同煎去滓不拘時候熬服仙靈脾丸出聖惠方治眼暴赤風熱衝上疼痛赤腫生翳仙靈甘菊花黃芩車前子玄參石膏決明子羚羊角屑各一兩蛇蛻皮一分燒灰右為末煉蜜和搗二三百杵丸如梧桐子大食後溫水下二十丸洗肝柴胡散出聖惠方治眼暴赤柴胡二兩半去苗川升麻黃芩羚羊角屑川大黃地骨皮各一兩決明子石膏各二兩甘草半兩炙微赤右為散每服三錢水一鍾煎至七分去滓食前溫服治眼暴赤最宜服之𬎼仁膏治眼暴赤熱毒腫痛膜障瞳人蕤仁去皮鉛丹重羅各半兩井鹽一分黃連去鬚一兩石膽半錢龍腦麝香各半錢蜜五兩右除腦麝蜜外先將蕤仁等重研如粉以水一升入蜜五兩同煎令稀稠得所用新綿濾去滓入腦麝末調和令勻磁器盛每以銅筯點少許還睛散出御藥院治風赤暴赤眼生浮翳眯目胎赤眥爛澀癢腫痛山梔仁黃連黃柏各一兩細辛去苗杜仲炙各二兩秦皮四兩甘草炙半兩右粗搗篩每服五錢水三盞入竹葉七片燈心二十莖煎一二十沸去滓澄清早晨臨卧洗了避風一日兩三次冷則再暖洗每次用兩服藥亦可龍膽草散出和劑方治眼赤暴腫痛風熱上衝連眶瞼眥赤爛瘀肉侵睛時多熱淚或因呌怒有損肝氣及久勞瞻視風沙土所入致成內外障翳及一切眼患悉皆治之蒺藜子炒去刺草龍膽各六兩甘草三兩赤芍藥半斤羌活防風去叉各二兩菊花去枝半兩茯苓去皮尖四兩右為末每服二錢食後臨卧溫酒調下四物龍膽湯治目赤暴發作雲翳疼痛不可忍熟地黃川芎芍藥當歸羌活防風各三錢草龍膽防己各二錢右為粗末水煎服清金散治暴赤隱澀疼痛眵淚不住仙靈脾取葉用惡實略炒木通黃芩去黑心藳本去土晚蠶沙炒甘草炙各一兩右為散每服二錢七分食後用沙糖水調下蘆根飲子治暴赤眼後生翳外障兼治胎風赤爛蘆根銼一兩大黃炒二兩防風去叉一兩黃耆銼一兩芒硝一兩黃芩去黑心黑參一兩半右為散以水一鍾每服五錢煎至五分食前去滓溫服之𬎼仁散治眼暴赤蕤仁去皮黃芩秦皮各二兩梔子仁黃連去鬚犀角屑各一兩甘草半兩右為散每服三錢水二盞入竹葉七片同煎至六分去滓食後溫服杏仁膏治眼赤暴痛杏仁浸去皮尖研如膏黃芩去鬚為末各半兩消梨汁三合膩粉一錢白蜜半合古銅錢五枚右於銅器中慢火熬令沸煎取一半漸漸火逼如膏方去古錢每用半小豆點之菊花防風散治目暴赤及風毒眼菊花防風去叉甘草威靈仙去土黃連去鬚惡實各三分右為散每服一錢七分風毒蔥湯下赤目新汲水下日再服秦皮湯治眼暴赤積年瞼爛不差澀痛睛上有白膜秦皮蕤仁去皮黃連去鬚山梔子各半兩黃柏一兩大棗五枚去核右粗搗篩以水四升煎取二升去滓微暖數洗之冷則重暖餘滓再煎洗大黃湯治眼暴赤爛痛大黃梔子仁各一兩茯神去木生麥門冬去心焙犀角鎊旋復花各一兩半右銼如麻豆大以水五大盞煎至三盞下芒硝一兩煎至一盞去滓食後溫服三次菊芎散治暴赤眼薄荷二兩菊花甘草川芎各一兩防風七錢白芷半兩右為細末食後茶少許沸湯泡藥點眼如傷風酒調服尤效生地黃湯出御藥院治男子婦人暴赤眼澀痛腫不開乾地黃決明子黃芩竹葉各三兩川黃連芍藥各半兩右為粗末大人用十錢水三盞煎至五七沸綿濾去滓乘熱洗冷即再暖洗可二三次只用一日換藥小兒藥量歲數用洗治男子婦人暴患赤眼方當歸川芎各二兩黑豆一升籜葉燒灰半兩赤土一兩沙糖半兩右以水二升煮黑豆令熟去皮以豆入藥煎熟次入籜葉灰赤土沙糖同煎每服一盞食後溫服秦皮湯治眼暴腫痛秦皮黃連去鬚黃蘖去粗皮甘草炙沙糖一彈子大右銼碎如麻豆大每服三錢水一盞入沙糖一處同煎一二十沸濾去滓稍熱洗如冷再暖可洗五度艾煙丸治暴赤眼黃連去鬚一兩半膽礬半豆許研鉛丹研半錢膩粉一分杏仁湯浸去皮尖雙仁炒研十四粒右同研勻入粟米粥和以煙艾薰之丸如雞頭大每用一丸以綿裹井花水浸點眼歸連湯出經驗良方治暴赤洗眼當歸尾極細者黃連赤芍藥防風各等分杏仁七粒去皮尖男孩子乳汁蒸過右以水半盞同蒸乘熱洗冷則再熱又洗氷膏似雪出德生堂治惡眼暴眼發赤腫內生翳膜者黃連黃柏黃藥子苦參朴硝各二兩右為末用芽茶水調貼太陽穴上乾則潤之日二三次洗目方治暴赤眼疼痛磣澀用楮樹嫩稍盡去葉並細毛放地上火燒著碗覆入一日置灰為末置碗內以沸湯浸澄清乘溫以指蘸洗又方出聖惠方用馬牙硝研為末安於罩上以銅沙鑼盛罩稍開罩夜露之令露滴消下入鑼中收取點眼中絶妙八月半白露後時可合之治暴赤眼方出永類鈴方用升麻乾葛湯三貼每貼加蟬脫七箇作三服如未退用敗毒散加大黃又不退却用五膈寬中散酒調墜下氣氣順自愈療眼暴赤腫磣疼不得開淚出黃連黃柏𬎼仁鹽緑芒硝各等分右搗篩和丸如黍米大點內眥中忌豬肉龍腦膏子出聖惠方治風毒暴赤眼腫澀痛龍腦半錢秦皮黃連去鬚甘草炙馬牙硝煉過研各半錢右搗篩用水一大盞浸藥一宿以銀銚子煎五分用新綿濾過入龍腦攪勻磁器盛之以銅筯點之蕤仁膏治眼暴赤腫痛並翳膜但瞳人不損皆治之蕤仁去皮丹砂一分青錢十枚斗子鹽鹽緑各半錢右取新好綿裹並錢於銀器中以井花水一盞浸經一宿如稀膏每卧即以綿於眼大眥頭點時經一宿點了即且停三兩日却點即避風處三兩日不然有損無益點時深暗房中杏仁湯治暴赤眼澀痛腫疼杏仁十四枚黃連去鬚膩粉二錢沙糖一錢右於晨朝睡覺未語時口內將杏仁與黃連同嚼爛并餘藥盡入絹內線繫以沸湯浸洗之冷重暖過夜露之每用可洗五次黃連膏治暴赤眼痛渾暈隱澀黃連去鬚一分膩粉杏仁湯浸去皮尖一分𬎼仁去皮半分右先將杏仁蕤仁研爛如膏後入黃連膩粉同置一處研了後以新綿厚裹於外梨少許以新汲水三盞於淨器內澄濾二盞候至清取二分浸藥裹了良久濾汁仰卧將藥裹溫藥點眼十餘次青梅膏治暴赤眼澀痛青梅七枚古字錢七枚鹽花一合黃連去鬚一兩右粗搗篩以水二升煎取一升去滓如稀膏入新瓶子內盛繫勿令泄氣埋七日取出每日點目眥三次鉛丹膏治暴赤眼疼痛鉛丹絹羅黃連去鬚為末蕤仁去皮研半兩鹽花一分右以蜜二兩用文武火先煎𬎼仁鹽待勻沸即下鉛丹黃連煎如膏磁盒盛每次可用如半小豆大以新水調化筯點日二次連竹湯治風毒攻眼暴赤澀癢黃連竹葉各一兩秦皮一分半蛇蛻皮半分右細銼用水一升半煎取五合綿濾去滓夜卧時白絹蘸藥汁洗眼生明丸治眼目暴赤睛痛腫薄荷葉川芎各七錢半縮砂仁甘菊花各半兩右為細末煉蜜和丸每一兩作十五丸服一丸至二丸細嚼溫水送下或噙化散熱飲子治眼暴赤暴腫防風羌活黃芩黃連各一兩右㕮咀水煎食後溫服如大便閉澀加大黃一兩如痛甚加地黃當歸各一兩如煩燥不得眠睡加梔子一兩細辛湯治眼暴赤澀腫痛木賊大者去節半兩細辛淨洗半兩草烏一分龍膽草去根半兩右為散每服三錢水一大盞入黑豆半合煎一兩沸又入沙糖一塊如彈子大煎至八分去滓食後溫服忌煎煿油麵酢醬熱物及忌房色事赴筵散治暴赤眼朴硝一錢沙糖一彈子大膩粉一錢杏仁七枚去皮右研如膏水半盞調濾過洗三五次竹葉湯治眼暴赤腫痛柴胡去苗蛇銜草去根二兩黃連去鬚細辛去苗各一兩右粗搗篩每服五錢煎水一盞半入竹葉七片煎七分去滓入芒硝一字食後溫服洗眼秦皮湯治眼暴熱腫痛澀方見本門目飛血赤脈類治眼毒風暴赤羞明不差方出聖惠方鵝梨三顆取汁黃丹一兩硇砂半分蜜二兩右入竹筒內盛坐湯鍋內煮一日為度後取出綿濾過以磁器盛用筯點大效杏仁膏治風毒暴赤眼腫澀痛方見本門目生努肉類蕤仁膏治眼暴赤熱毒蕤仁去皮胡黃連研末各一兩雞子一枚去黃用清右以綿裹內雞清中浸一宿揾眼日數次後則洗之大黃膏治暴赤眼大黃研末半兩大麥麵三錢雞子去黃用清不拘多少右調如膏傅上下瞼大黃膏治暴赤眼痛腦熱大黃解毒子木香各等分右搗羅漿水調如膏於生絹上貼瞼頻易之沙糖黃連膏治暴赤眼白沙糖黃連研各一兩大棗青州者七枚洗煮過去皮核右搗熟如膏以菉豆大用綿裹新汲水浸點之龍腦膏治暴赤眼龍腦少許麝香少許黃連去鬚一兩淨洗為末極細右以蜜調黃連為餅子塗在白瓦器上用艾四兩薰取末刮下入腦麝以磁盒盛用時取如皂角子大以新汲水調點之乳香膏治暴赤眼甘草黃連去鬚各半兩黃蘖去粗皮三分右搗篩為粗散以水二盞煎至七分濾去滓後入膩粉少許黃明乳香皂角子大兩塊研勻點之至明膏出御藥院治暴赤疼痛淚出眵多熱氣上攻視物昏花黃連一兩當歸二錢𬎼仁去皮一錢已上藥用水一大碗浸一時辰慢火熬至半碗澄濾去滓入白蜜半兩再重湯煮成膏綿濾過出火毒入後藥龍腦二錢青鹽一字南硼砂一錢右研極細與前藥一處同研令勻每用黃米粒大或一菉豆大每日點一次兩眼各點二次碧霞引治赤眼暴發并赤瞎神效方銅緑白土芒硝各等分右為細末丸如皂角子大每用白湯研化一丸洗之療眼暴赤方雞舌香二七枚乾棗二七枚黃連二七枝右以水半大升煎五六沸澄取清點目中差治赤眼暴作明礬銅青黃連研末各等分右為細末水泡洗又方出聖惠方治風毒暴赤眼腫澀痛黃連一分為末蕤仁半兩湯泡去白赤皮青古錢七枚右以甜淡漿水一大盞於銀器中用文武火熬如稀餳以新綿濾過淨磁瓶中密封有患者以銅筯點之黃連膏治暴赤眼黃連不拘多少去鬚為末以銀器內熬成膏用龍腦少許右入罐子內油單紙封之令緊沉於井底著泥處浸一宿取出點之香蠟膏治暴赤眼風熱癢痛黃連宣州者去鬚秦皮各一兩右粗搗篩臘月臘日井花水五更者取一大碗煎藥二七日綿濾銀器內文武火煎盡水如膏入龍腦和勻磁盒盛每用倒流水化藥少許候勻點之黃蘖膏一名黃金膏治眼暴赤澀痛兼治一切眼退翳黃蘖去粗皮為末蛇蛻微炒為末一兩右用醋漿水三盞於銅器內煎一盞稀稠以乳香和膏綿絹濾待冷磁盒盛點眼大眥地黃膏治暴赤眼腫痛生地黃淨洗研黑豆各二兩生搗末右搗成膏臨卧時以鹽湯洗眼後閉目以藥膏罨目上至曉水潤青金散出旅含方治暴赤眼澀痛難開黃連去鬚艾葉燒黑灰各二兩右搗羅為細末每貼用五錢湯浸澄清用新綿濾過乘熱洗眼兼治目始赤澀痛熱腫熱淚不止如目中有瘡即不可用神應散出御藥院治眼暴赤疼痛玄明粉生用如風化飛便妙爐甘石燒赤各等分右同研極細每用藥一粟米大以新水一匙調藥不拘時候點之杏連湯治暴赤眼方見本門風目衝眼虛熱赤痛類又方出聖惠方治風毒暴赤眼腫澀痛黃蘖水洗過去皮一兩桑條三握洗過右於銀銚子內以水一大盞慢火煎至半盞新綿濾去滓於淨器內一兩度以水拔藥令冷點之數多為妙魚膽傅眼方出聖惠方治暴赤熱腫痛澀鯉魚膽十枚取汁膩粉二兩右相和令勻磁合中盛之每服少許點之又方出聖惠方治眼暴赤腫痛粗黃連十枚取汁青州棗三枚右取河水一鍾令患人自含水黃連吐於銚子內有苦汁即咽之勿得吐也其棗劈開去核同煎至三分綿濾澄清入孩兒乳汁少許相和點之清金散治暴赤眼澀痛難開用芰荷根絞取汁點目眥中治眼暴赤方及磣澀用薺菜根搗絞取汁點之暴赤眼方出千金方及治目不得開痛淚不止腫磣用附子一枚炮去皮臍粗搗碎如蠶沙許臨卧時置目眥中良以定痛為度一方用稍去黑皮治暴赤眼方用烏雞冠血以筯點目眥內日三度治暴赤眼方以新粉腳二斤以甑簞一所淨紙二重襯甑簞先安腳粉如淋灰法用沸湯潑落日方淋露地上勿著屋下來日早晨濾出滓用水於烈日內曬乾如鹽花入磁瓶中盛後入龍腦點目神效治暴赤眼出傳信適用方用四物湯三錢以水一盞同煎至七分去滓溫服不拘時候一方加大黃如栗子大食後煎服五行方出危氏方治暴赤時行赤腫痛取黃柏以刀略去粗皮不拘多少濕紙裹黃泥炮煨候泥乾取出每用一彈子大紗帛包水一盞浸飯上蒸熟乘熱薰洗修製有金木水火土故命名一丸可用三兩次治暴赤眼腫用桑葉為末裹紙內燒煙薰鼻效治暴赤眼用黃連取驢乳汁淹漬點甚效豬膽方治火眼用豬膽一箇銅錢三枚洗淨瓦盞內蒸漸乾取膽丸如粟米安眼中又方用生薑切破夾黃連濕紙裹煨熟以乳汁蒸點眼洗眼方出聖惠方治眼卒患赤腫疼痛秦芃去苖黃連去鬚細辛乾桑葉各一兩蕤仁一分浸去赤皮右為散用藥一兩水三大盞入青鹽二錢煎至二盞去滓每暖三合洗眼日三度又方一名洗眼方出十便良方甘草細辛黃連去鬚各一兩右為散和勻每取一兩以水一大盞半入青鹽二錢煎至一盞濾去滓每暖三合洗眼日三度𬎼仁煎一名黃連丸治暴赤眼熱淚不止疼痛隱悶黃連一分為末蕤仁三十枚去皮研細右為散末水和薄攤磁器底覆之以熟艾一斤漸以火燒艾煙薰藥上艾盡為度刮丸如梧桐子大每以冷水少許化藥一丸澄清點之一方用肥棗開竅去核納藥於內以棗蓋之然後以薄紙裹定以大茶碗量水半碗煮候水得一雞子許即以綿濾過待冷却點眼甚效亦治風眼淚癢或生翳或生赤眥沙糖膏出選竒方洗赤眼腦子三十文沙糖少許生薑自然汁右件同勻為膏臨時滴點之立愈杏仁湯出選竒方治暴赤眼黃連杏仁右等分同研勻以水調濾取汁入輕粉和勻點之湯調頓冷洗皆可用黃連湯出選竒方治暴赤眼乾薑淨洗黃連半兩杏仁各半兩右同搗為粗末綿包之沸湯泡閉目乘熱洗之生地黃湯出御藥院治眼暴赤才發或經一二日赤痛隱悶淡竹葉草決明黃芩各二兩生乾地黃二兩赤芍藥半兩右為粗末每用五錢水三盞煎五七沸絹濾去滓乘熱洗眼冷再暖洗之秦皮散出永類鈴方治暴腫赤障疼痛灑淚當歸黃芩川芎荆芥穗宣連羌活秦皮黃柏梔子赤芍藥蔓荆子各等分右銼細新汲水漉出沙灰用二大盞溫熱泡洗至寶金絲膏出永類鈐方治暴赤客熱一切外障當歸羌活生地黃黃柏秦皮蔓荆子川芎黃芩赤芍藥山梔子宣連大黃細辛右逐味修製擇稱各等分入淨銅鍋內用淨水浸過藥汁煮令透去滓取見在濃汁以上等結如沙糖以濃藥汁相停和入銅鍋內再煮令沸以兩重絹濾過銅器內煮成膏如綿四季減火色續入沒藥水飛過如麵更加腦麝隨便多少尤嘉係點眼膏或用湯泡鎔洗亦可重明散出衛生家寶方治一切風熱之毒上衝眼目暴赤腫不住疼痛或生翳膜瘀肉隱澀羞明兩瞼赤爛爐甘石一斤火燒紅黃連湯蘸七次川椒二錢同爐甘石末熬成膏用文武火焙乾黃連半兩盆硝三錢銅緑半兩蒲黃半兩豆粉四兩雄黃二錢右以上六味同爐甘石末用密羅過研細舌上嚼不磣為度後入腦子一錢南硼砂一錢研細用大豆養之每用少許以骨筯乾拈點卧少時忌酒麵諸雜魚肉辛熱之物此方得之於路大夫數以此為生治一切暴痛赤眼疼痛極甚或生翳膜外使點藥內喫此方護命方荆芥蔓荆子薄荷羌活牡丹皮黃芩當歸甘草梔子青葙子大黃決明子麥子獨活牛蒡子牽牛各一分半夏三錢右搗細杵羅為末每服二錢水一鍾先煎令沸方下藥輕攪便瀉出食後臨卧和滓喫柴胡湯出朱氏積驗方治眼目暴赤腫痛柴胡蒼术甘草各等分右為末白水煎如頭疼壯熱用薑蔥煎已驗救苦丸出保命方治眼赤發嗔痛不可忍者黃連一兩當歸二錢甘草一錢右同銼新水半碗浸一宿慢火熬至一半以綿濾去滓以淨為妙用火再熬作稠膏子為度攤上碗倒合以物蓋之熟艾一大彈子許底下然之用艾薰膏子艾盡為度再入下項藥硃砂一錢飛腦子半錢乳香沒藥等分右同研極細入黃連膏拌和勻為丸如米大每服二丸點眼大角內仰面卧待藥化銅青膏出楊氏家藏方治暴赤眼隱澀羞明癢痛銅青一錢杏仁四箇去尖輕粉少許右並研令細和作四丸每一丸湯化洗如勝散出楊氏家藏方治赤暴腫痛難開眼白礬生二錢川烏頭去皮二錢瓦上焙黃連去鬚二錢右件為末入白麵半錢和勻取生薑薄荷汁調作餅貼太陽退赤湯出千金方治眼暴赤乾艾葉燒灰二錢宣連二錢為末古銅錢一枚右都入大盞內百沸湯泡了放冷澄定取上清者以水隔盞浸令冷以所浸泡銅錢點之一日內取差薑連散出大衛方治暴赤眼乾薑黃連各半兩右搗羅同為粗末以綿包之沸湯泡閉目乘熱頻洗治暴赤眼出經驗方細研生薑去滓以汁頓在盆底上浥乾研令極細重絹羅過每用少許點之出熱淚畢以冷水淨洗即愈暴赤眼方出淡療方玄參枳殼升麻杏仁防風旋復花赤芍藥黃芩菊花甘草葶藶黃連各等分右以上㕮咀煎服還光散出朱氏集驗方治一切男女暴生赤白翳膜菊花炒羌活防風蟬脫蒺藜炒川芎當歸甘草右為末各等分食後茶下治暴赤眼出永類鈐方以雞子清銼黃連浸置地下一宿次早濾過雞毛蘸點眼又方出永類鈐方宣連一兩熬濃汁入好明淨朴硝一兩火熬乾研細入好羯羊膽中懸之膽頭用紙袋一箇放寬籠之候硝盡滲出膽上成霜掃以為末入麝少許入筒中盛點眼又方生薑汁濾過器中澄令細再用宣連銼浸一七令透用綿絹濾薑汁成粉日乾點眼諸證皆佳又方苦竹一假兩頭留節一頭開小孔入銼宣連半兩以紙塞孔置井中浸一宿次早出竹節中水洗少加腦子尤效治暴赤眼無瘡者以古銅錢刮淨薑上取汁於錢唇點目熱淚出今日點來日愈但小兒甚懼不須疑已試良驗紫衣主黃障暴熱目黃沉重下水瘀以紫衣煮服之療眼暴赤痛神效以枸杞汁點眼立效去暴熱目黃祕閉塞用苦􅀢菜煮汁服明目方用合明草搗絞汁服目積年赤論風熱毒氣發於目眥則令目脈赤不治則眥頭爛眵淚磣痛風熱不退雖積年月亦莫能差此由肝臟積成風熱脾肺常多壅滯邪氣伏留在臟不能消散乃上攻於目則令赤痛怕見風日或癢或澀或淚睛痛風冷外傷不差則經年眼及瞼常赤痛也龍木論云兩粘睛外障眼初患之時或癢或痛年多風熱赤瞼中有瘡因熱在肝膈脾胃風壅致令兩瞼相粘即宜鈎割尉眼排風散烏犀丸立效歌曰兩眼睛痛何所論多年風赤是何因睛疼瞼澀皮肉爛兩瞼相粘似有筋割烙直須多出血銅箆燒焙赤眩門治風丸散多頻服年歲中間自去根方決明子丸治風毒眼赤痛久患及虛熱眼暗地膚子麥門冬去心焙玄參車前子各半兩決明子微炒赤茯苓去皮青葙子遠志去心焙茺蔚子蔓荆實地骨皮柏子仁山芋人參黃芩防風去叉大黃甘草炙銼黃連各一兩去鬚細辛去苖葉切半兩右為細末煉蜜為丸如梧桐子大每服二十丸食後以米飲下加至三十丸菊花散出聖惠方治風赤眼積年不差腫澀疼痛心神虛煩宜服甘菊花前胡去蘆防風去蘆羌活生乾地黃茯神決明子木通銼車前子麥門冬去心焙羚羊角屑地骨皮甘草各半兩微炒赤銼右為散每服三錢以水一鍾煎至六分去滓食後溫服松皮湯洗頭方出聖濟總録治風熱久目赤腦中積熱白鮮皮甘菊花荆芥穗老松白皮去粗皮細辛去苗蔓荆實防風去叉荷葉蒂玄參苦參雄黑豆二升桑白皮各一兩右除豆并荆實外細銼以水三斗煎至一斗五升去滓投朴硝一兩半攪熱洗頭餘滓重煎入朴硝如此三度洗之犀角散出聖惠方治遠年風赤眼腫癢澀痛暈翳宜服犀角屑梔子仁木通銼子芩川大黃瞿麥決明子車前子黃連甘草甘菊花防風各等分右為散每服三錢以水一鍾煎至六分去滓食後溫服忌魚熱麵決明膏出聖濟總録治風熱目赤翳積年不差磣痛石決明蕤仁蘆薈秦皮研馬琦研黃柏去皮烏賊魚骨紫貝各一兩鯉魚膽四箇鹽緑一分右以水三升煎決明𬎼仁蘆薈秦皮黃柏五味至一升淨濾去滓却入紫貝魚膽烏賊魚骨馬琦鹽緑更煎約三合於磁器中盛不令泄氣每取一豆大少許乳調勻點九子丸出聖濟總録治久患風毒眼赤昏暗蔓荆子炒五味子枸杞子地膚子青葙子決明子炒楮實子炒茺蔚子兔絲子酒浸一宿焙乾另研為末各一兩右為細末煉蜜和丸如梧桐子大每服二十丸溫酒下夜卧食前再服決明丸出聖濟總録治風暴赤眼久不差石決明研水飛甘菊花人參地膚子各一兩細辛半兩熟乾地黃防風去蘆各二兩兔肝一具五味子一兩半右為細末煉蜜和搗三五百杵丸如梧桐子大每日空心及晚間食後煎鹽湯下二十丸或竹葉白湯可漸加三十丸撥雲散治積年赤眼方見本門一切眼疾類右搗篩每服三錢水一鍾半竹葉七片煎至六分去滓食後溫服萎蕤湯治眼赤腫疼痛萎蕤桔梗木通羚羊角屑黃芩黃耆各三分麥門冬焙一兩右粗搗篩每服五錢水一盞半煎至七分去滓投芒硝一字空心溫服食後再服得利去芒硝前胡湯治眼赤腫痛兼治熱氣客目內眥腫起前胡去蘆二兩芍藥青箱子決明子炒細辛去苖車前子梔子仁各一兩右粗搗篩每服五錢水一盞半入竹葉七片煎取八分去滓入芒硝一字食後溫服臨卧再服以利為度既利即去芒硝洗眼秦皮湯治眼赤腫熱疼痛方見本門目飛血赤脈類大黃膏治眼赤腫痛大黃三兩玄參芒硝黃芩白斂木香射干各二兩右為末以雞子清和如膏貼眼上下瞼乾易之不計度數瀉肝湯治積熱不散目赤腫痛或生障翳茈胡去苗芍藥青葙子決明子肉桂升麻各二兩梔子仁一兩右粗搗散每服五錢水一鍾半入竹葉七片煎七分去滓入芒硝半錢食後溫服取利為度嗅藥方治目發赤腫疼痛毒氣侵睛脹痛薄荷葉二錢青黛石膏芒硝川芎各半錢細辛二錢蔓荆子三分右為細末鼻內嗅之洗眼方治眼赤腫痛秦皮一兩防風一兩甘菊花三分竹葉四十片梔子仁三分𬎼仁湯浸去赤皮一兩半萎蕤一兩右銼以水三大盞煎取一盞半綿濾去滓每服三合日二三度洗眼宜避風處黃連煎水藥治熱眼赤生翳障黃連半兩蕤仁半兩浸去赤皮研杏仁四十九枚浸去赤皮龍腦一錢黃蘖半兩膩粉二錢青鹽半兩右除龍腦外並搗為散入生絹袋盛用雪水二大盞浸藥二七日取絹袋子將藥汁灌竹筒內密封坐在湯中以慢火煮一伏時掘地坑子三尺深隔宿取出入龍腦攪勻以磁瓶盛要點時即旋取點之涼頂散治赤眼疼腫刺著生翳川芎一兩半薄荷一兩鬱金一兩盆硝一兩半乳香三錢或加龍腦尤佳右為細末鼻內嗅之次用黃連一味為末煎濃汁熱薰并洗眼上覺口中苦即愈菊花散治目赤腫及因麻痘傷寒後熱藥并毒食致令腫痛如桃李大不得開黃芩大黃菊花甘草防風土當歸各半兩右銼散每服三錢水一盞煎空心服升麻湯治眼壅熱兩目如紅桃腫脹昏暗視物不明翳膜遮障痛升麻黃芩薄荷澤瀉各等分大黃一兩甘草少許右㕮咀每服一抄水一盞煎至八分去滓不計時候溫服聚寶散治眼目赤腫疼痛龍膽二兩黃連一兩荆芥一兩鼠粘子大黃各一兩薄荷二兩右為散每一錢水一盞煎至七分去滓食後服犀角膏治赤眼腫痛犀角末半兩秦芃二兩黃連滑石牙硝各一兩杏仁湯浸去皮尖一兩半右為細末和勻以沙糖水一處入藥熬成膏每用皂角子大沸湯化洗羚羊角散治眼赤腫痛並白翳去肝肺熱毒羚羊角屑萎𬎼甘菊花澤瀉川大黃微炒木通各一兩右為散每服三錢至四錢水一鍾煎至六分去滓食後溫服黃連湯治肝經積熱上攻眼目赤腫疼痛黃連為末一字乳香一字燈心五莖大棗二枚膩粉半錢杏仁五枚去皮龍腦為末一錢右用水二盞同煎至半盞臨卧時洗洗眼方治眼赤腫痛熱澀淚出苦竹葉茈胡黃連細辛川芒硝蛇銜草各一兩右細銼和勻每用藥二兩水三大碗煎取一鍾半綿濾去滓每暖三合洗之日二三度洗了避風半夏湯治眼目赤腫痛疼方見本門鈴目類大黃湯治赤眼腫痛大黃炒香冷細辛去苖甘草炙黃芩各一兩去黑心芍藥二兩青州棗去核淡竹葉一分右用水七合入銀器內煎取二合濾去滓重湯內暖過以銅筯點眼中點眼方治赤眼腫痛不可忍並澀癢蛇蛻皮二寸淨訶子核中仁十粒以漿水研如粉黃連一分青州棗去核三枚淡竹葉一分右用水七合銀石器內煎取二合濾去滓重湯內暖過以銅筯點眼中卧再點生犀丸出御藥院治赤腫隱澀眵淚生瘡荆芥穗大黃各一兩川芎半兩甘草半兩薄荷葉七錢右為細末煉蜜和丸每兩作十丸每服二丸細嚼溫水送下食後服沒藥乳香散治眼痛赤腫鬱金半兩盆硝二錢雄黃沒藥乳香各一錢右為末鼻內嗅之少許三兩次疼止蔓荆散出危氏方治赤腫眵淚多痛瓜根蔓荆子荆芥梔子甘草各等分右銼每服三錢水一盞煎先薰後洗食後穿針散出本事方治眼目赤腫翳障羞明木賊去黑皮香附子細辛洗淨日乾菊花去梗羌活各半兩右為末每服三錢用好茶少計同點食後歸連湯出德生堂治赤眼方方見本門暴赤眼類羊肝散出德生堂治翳膜攀睛赤爛腫痛榖精草五錢甘菊花一兩木賊半錢甘草三錢黃連三錢右為細末每服二錢用羊肝一塊切開入藥末在內炙熱食後啖之涼肝散出聖濟總録治赤眼腫痛昏暈芎藭梔子仁槐蛾各一兩荆芥穗一兩甘草半兩右為散沙糖水調下一錢或二錢食後服通頂散出聖濟總録治赤眼腫痛苦葫蘆子四十九粒榖精草一錢瓜蒂十四枚燒灰乳香薄荷各一錢右為細末入龍腦少許鼻內嗅一字立效蕤仁煎治熱毒攻注目昏腫久結赤痛蕤仁去皮秦皮去皮黃柏去皮青竹茹各兩梔子仁半兩右銼拌勻以水三升入銅器內煎取一升以綿濾清汁點眼日二三次車前餅子治眼昏赤腫痛車前草二握牛蒡子地龍糞各二兩青鹽一錢大黃半兩右相和搗作餅子仰卧貼在眼上乾即易之黃連丸出聖濟總録治眼赤及風赤眼腫痛黃連一兩去鬚為末杏仁七枚湯浸去皮尖膽礬半兩膩粉一錢黃丹半分右都研令勻入粟米粥和稀稠得所塗於磁盒子內别用艾一兩燒煙出令盒子於上面薰之候煙盡為度圓如雞頭子大每用一丸以綿裹用井花水少許浸點眼中車前散出聖濟總録治眼赤腫痛車前子決明子菥蓂子枳殼各一兩右為細末每服二錢溫水調下食後臨卧再服大黃餅子治眼熱毒赤腫障翳攻眉骨及頭疼壯熱大黃一兩大麥麩半兩雞子五枚右搗羅二味為末以雞子大和作餅子傅腫上乾即易之梔子湯一名三黃湯治眼痛赤微腫眥爛多眵方出本門目赤痛類黃連點眼方治目赤痛腫煩熱昏睛并障翳黃連宣州者二分馬牙硝一錢蜜綿濾半匙同二味藥和勻右取消梨一顆割頂作蓋去核作甕子將諸藥內於梨中以蓋子覆之冬月半月夏月一日傾出以綿絞去滓以汁點之又方出聖濟總録黃連去鬚四兩鉛丹四兩蜜四兩右三味同和先蒸一次再暴一日綿裹雞頭實大用水浸點之青黃膏出聖濟總録治目赤腫疼明目涼腦蓮子草七月七日搗絞取汁一斗煎取一升生麻油一升梧桐淚一兩綿裹右以火煎取一升二合去梧桐淚磁器盛七日後用每夜以銅筯點鼻中每孔三點去枕仰卧良甘草湯出聖濟總録治眼赤腫痛甘草甘竹