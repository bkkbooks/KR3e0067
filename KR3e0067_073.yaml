body:
  text: 普濟方卷七十四明周王朱橚撰眼目門暴赤眼論夫暴赤眼者肝心壅熱散於血脉之中熱氣上炎攻衝眼目令暴赤隱澁疼痛風氣加之則癢悶也龍木論云暴赤眼後急生瞖外障眼初患之時忽然目睛赤腫淚出或癢或痛此是肝心壅毒在胷膈之間更相擊發臟氣上攻致使然也切宜熏洗出血後飲蘆根飲子鎮肝丸歌曰忽然暴赤白睛紅輕者無妨甚者痛還是肝心二臟熱更相擊發使相攻蘆根飲子須通淺莫遣他時更復蹤丸散鎮肝吞半劑如斯治療有神功方好槐枝湯治赤目昏痛淚出隱悶槐枝剉二兩秦皮黄連去鬚蕤仁去皮馬牙硝黄栢去粗皮山梔子各半兩古字錢十四枚淡竹葉一握細切食鹽一分右前藥麤搗篩每用五錢水二盞入錢煎至一盞半濾去滓放温洗眼冷再煖洗蔓荆實丸一名羚羊角丸治肝臟風熱目暴赤隱澁腫痛方見本門目風赤類犀角湯治肝心壅熱上攻眼目暴赤腫隱澁疼痛犀角鎊黄芩去黒心瞿麥穗黄連去鬚三分梔子仁各一兩車前子木通剉大黄炒柴胡去苖青葙子各一兩右麤搗篩每服五錢水一鍾半煎至七分入竹葉去滓入芒硝半錢食後放温服臨卧再服石蜜煎出聖惠方治暴赤眼石蜜三兩半硃砂食鹽各研細川芒硝細辛石决明水飛過各細研烏賊魚骨各半兩鹽緑一分研蕤仁一兩半去赤皮黄連去鬚為末右研如粉以蜜調成膏磁器中盛之每㸃如菉豆大内眼大眥中宜避風處治暴赤眼方見本門目赤痛類鎮肝丸出龍木論治暴赤眼後生翳膜外障羌活石决明各一兩藳本一兩半乾山藥細辛五味子車前子人參茯苓各一兩右為末煉蜜為丸如梧桐子大空心茶下一十丸犀角散出聖惠方治暴赤眼腫澁痛犀角屑子芩瞿麥黄連各三分去鬚梔子仁大黄炒車前子木通芒硝各一兩右搗篩為散每服三錢水一鍾半入竹葉二七片煎至六分去滓食後服之加味香蘇散出德生堂治時行赤眼暴發赤腫怕日羞明疼痛難忍紫蘇香附子陳皮甘草桑白皮生地黄蘇木蟬脱黄芩各二兩右㕮咀每服五錢水一鍾半燈草二十莖同煎去滓不拘時候熬服仙靈脾丸出聖惠方治眼暴赤風熱衝上疼痛赤腫生瞖仙靈甘菊花黄芩車前子𤣥參石膏决明子羚羊角屑各一兩蛇蛻皮一分燒灰右為末煉蜜和搗二三百杵丸如梧桐子大食後温水下二十丸洗肝柴胡散出聖惠方治眼暴赤柴胡二兩半去苗川升麻黄芩羚羊角屑川大黄地骨皮各一兩决明子石膏各二兩甘草半兩炙㣲赤右為散每服三錢水一鍾煎至七分去滓食前温服治眼暴赤最宜服之𬎼仁膏治眼暴赤熱毒腫痛膜障瞳人蕤仁去皮鉛丹重羅各半兩井鹽一分黄連去鬚一兩石膽半錢龍腦麝香各半錢蜜五兩右除腦麝蜜外先將蕤仁等重研如粉以水一升入蜜五兩同煎令稀稠得所用新綿濾去滓入腦麝末調和令匀磁器盛每以銅筯㸃少許還睛散出御藥院治風赤暴赤眼生浮翳眯目胎赤眥爛澁癢腫痛山梔仁黄連黄栢各一兩細辛去苗杜仲炙各二兩秦皮四兩甘草炙半兩右麤搗篩每服五錢水三盞入竹葉七片燈心二十莖煎一二十沸去滓澄清早晨臨卧洗了避風一日兩三次冷則再煖洗每次用兩服藥亦可龍膽草散出和劑方治眼赤暴腫痛風熱上衝連眶瞼眥赤爛瘀肉侵睛時多熱淚或因呌怒有損肝氣及久勞瞻視風沙土所入致成内外障翳及一切眼患悉皆治之蒺藜子炒去刺草龍膽各六兩甘草三兩赤芍藥半斤羌活防風去叉各二兩菊花去枝半兩茯苓去皮尖四兩右為末每服二錢食後臨卧温酒調下四物龍膽湯治目赤暴發作雲翳疼痛不可忍熟地黄川芎芍藥當歸羌活防風各三錢草龍膽防己各二錢右為粗末水煎服清金散治暴赤隱澁疼痛眵淚不住仙靈脾取葉用惡實畧炒木通黄芩去黒心藳本去土晩蠶沙炒甘草炙各一兩右為散每服二錢七分食後用沙糖水調下蘆根飲子治暴赤眼後生翳外障兼治胎風赤爛蘆根剉一兩大黄炒二兩防風去叉一兩黄耆剉一兩芒硝一兩黄芩去黒心黒參一兩半右為散以水一鍾每服五錢煎至五分食前去滓温服之𬎼仁散治眼暴赤蕤仁去皮黄芩秦皮各二兩梔子仁黄連去鬚犀角屑各一兩甘草半兩右為散每服三錢水二盞入竹葉七片同煎至六分去滓食後温服杏仁膏治眼赤暴痛杏仁浸去皮尖研如膏黄芩去鬚為末各半兩消梨汁三合膩粉一錢白蜜半合古銅錢五枚右於銅器中慢火熬令沸煎取一半漸漸火逼如膏方去古錢每用半小豆㸃之菊花防風散治目暴赤及風毒眼菊花防風去叉甘草威靈仙去土黄連去鬚惡實各三分右為散每服一錢七分風毒葱湯下赤目新汲水下日再服秦皮湯治眼暴赤積年瞼爛不差澁痛睛上有白膜秦皮蕤仁去皮黄連去鬚山梔子各半兩黄栢一兩大棗五枚去核右粗搗篩以水四升煎取二升去滓微煖數洗之冷則重煖餘滓再煎洗大黄湯治眼暴赤爛痛大黄梔子仁各一兩茯神去木生麥門冬去心焙犀角鎊旋復花各一兩半右剉如麻豆大以水五大盞煎至三盞下芒硝一兩煎至一盞去滓食後温服三次菊芎散治暴赤眼薄荷二兩菊花甘草川芎各一兩防風七錢白芷半兩右為細末食後茶少許沸湯泡藥㸃眼如傷風酒調服尤效生地黄湯出御藥院治男子婦人暴赤眼澁痛腫不開乾地黄决明子黄芩竹葉各三兩川黄連芍藥各半兩右為麄末大人用十錢水三盞煎至五七沸綿濾去滓乗熱洗冷即再煖洗可二三次只用一日換藥小兒藥量歲數用洗治男子婦人暴患赤眼方當歸川芎各二兩黒豆一升籜葉燒灰半兩赤土一兩沙糖半兩右以水二升煮黒豆令熟去皮以豆入藥煎熟次入籜葉灰赤土沙糖同煎每服一盞食後温服秦皮湯治眼暴腫痛秦皮黄連去鬚黄蘖去粗皮甘草炙沙糖一彈子大右剉碎如麻豆大每服三錢水一盞入沙糖一處同煎一二十沸濾去滓稍熱洗如冷再煖可洗五度艾煙丸治暴赤眼黄連去鬚一兩半膽礬半豆許研鉛丹研半錢膩粉一分杏仁湯浸去皮尖雙仁炒研十四粒右同研勻入粟米粥和以煙艾薫之丸如雞頭大每用一丸以綿裹井花水浸㸃眼歸連湯出經驗良方治暴赤洗眼當歸尾極細者黄連赤芍藥防風各等分杏仁七粒去皮尖男孩子乳汁蒸過右以水半盞同蒸乗熱洗冷則再熱又洗氷膏似雪出德生堂治惡眼暴眼發赤腫内生翳膜者黄連黄栢黄藥子苦參朴硝各二兩右為末用芽茶水調貼太陽穴上乾則潤之日二三次洗目方治暴赤眼疼痛磣澁用楮樹嫩稍盡去葉並細毛放地上火燒著椀覆入一日置灰為末置椀内以沸湯浸澄清乗温以指蘸洗又方出聖惠方用馬牙硝研為末安於罩上以銅沙鑼盛罩稍開罩夜露之令露滴消下入鑼中收取㸃眼中絶妙八月半白露後時可合之治暴赤眼方出永類鈴方用升麻乾葛湯三貼每貼加蟬脱七箇作三服如未退用敗毒散加大黄又不退却用五膈寛中散酒調墜下氣氣順自愈療眼暴赤腫磣疼不得開淚出黄連黄栢𬎼仁鹽緑芒硝各等分右搗篩和丸如黍米大㸃内眥中忌猪肉龍腦膏子出聖惠方治風毒暴赤眼腫澁痛龍腦半錢秦皮黄連去鬚甘草炙馬牙硝煉過研各半錢右搗篩用水一大盞浸藥一宿以銀銚子煎五分用新綿濾過入龍腦攪匀磁器盛之以銅筯㸃之蕤仁膏治眼暴赤腫痛並翳膜但瞳人不損皆治之蕤仁去皮丹砂一分青錢十枚斗子鹽鹽緑各半錢右取新好綿裹並錢於銀器中以井花水一盞浸經一宿如稀膏每卧即以綿於眼大眥頭㸃時經一宿㸃了即且停三兩日却㸃即避風處三兩日不然有損無益㸃時深暗房中杏仁湯治暴赤眼澁痛腫疼杏仁十四枚黄連去鬚膩粉二錢沙糖一錢右於晨朝睡覺未語時口内將杏仁與黄連同嚼爛并餘藥盡入絹内線繫以沸湯浸洗之冷重煖過夜露之每用可洗五次黄連膏治暴赤眼痛渾暈隱澁黄連去鬚一分膩粉杏仁湯浸去皮尖一分𬎼仁去皮半分右先將杏仁蕤仁研爛如膏後入黄連膩粉同置一處研了後以新綿厚裹於外梨少許以新汲水三盞於淨器内澄濾二盞候至清取二分浸藥裹了良久濾汁仰卧將藥裹温藥㸃眼十餘次青梅膏治暴赤眼澁痛青梅七枚古字錢七枚鹽花一合黄連去鬚一兩右粗搗篩以水二升煎取一升去滓如稀膏入新瓶子内盛繫勿令泄氣埋七日取出每日㸃目眥三次鉛丹膏治暴赤眼疼痛鉛丹絹羅黄連去鬚為末蕤仁去皮研半兩鹽花一分右以蜜二兩用文武火先煎𬎼仁鹽待勻沸即下鉛丹黄連煎如膏磁盒盛每次可用如半小豆大以新水調化筯㸃日二次連竹湯治風毒攻眼暴赤澁癢黄連竹葉各一兩秦皮一分半蛇蜕皮半分右細剉用水一升半煎取五合綿濾去滓夜卧時白絹蘸藥汁洗眼生明丸治眼目暴赤睛痛腫薄荷葉川芎各七錢半縮砂仁甘菊花各半兩右為細末煉蜜和丸每一兩作十五丸服一丸至二丸細嚼温水送下或噙化散熱飲子治眼暴赤暴腫防風羌活黄芩黄連各一兩右㕮咀水煎食後温服如大便閉澁加大黄一兩如痛甚加地黄當歸各一兩如煩燥不得眠睡加梔子一兩細辛湯治眼暴赤澁腫痛木賊大者去節半兩細辛淨洗半兩草烏一分龍膽草去根半兩右為散每服三錢水一大盞入黒豆半合煎一兩沸又入沙糖一塊如彈子大煎至八分去滓食後温服忌煎煿油麵酢醬熱物及忌房色事赴筵散治暴赤眼朴硝一錢沙糖一彈子大膩粉一錢杏仁七枚去皮右研如膏水半盞調濾過洗三五次竹葉湯治眼暴赤腫痛柴胡去苗蛇銜草去根二兩黄連去鬚細辛去苗各一兩右粗搗篩每服五錢煎水一盞半入竹葉七片煎七分去滓入芒硝一字食後温服洗眼秦皮湯治眼暴熱腫痛澁方見本門目飛血赤脉類治眼毒風暴赤羞明不差方出聖惠方鵞梨三顆取汁黄丹一兩硇砂半分蜜二兩右入竹筒内盛坐湯鍋内煮一日為度後取出綿濾過以磁器盛用筯㸃大效杏仁膏治風毒暴赤眼腫澁痛方見本門目生努肉類蕤仁膏治眼暴赤熱毒蕤仁去皮胡黄連研末各一兩雞子一枚去黄用清右以綿裹内雞清中浸一宿揾眼日數次後則洗之大黄膏治暴赤眼大黄研末半兩大麥麵三錢雞子去黄用清不拘多少右調如膏傅上下瞼大黄膏治暴赤眼痛腦熱大黄解毒子木香各等分右搗羅漿水調如膏於生絹上貼瞼頻易之沙糖黄連膏治暴赤眼白沙糖黄連研各一兩大棗青州者七枚洗煮過去皮核右搗熟如膏以菉豆大用綿裹新汲水浸㸃之龍腦膏治暴赤眼龍腦少許麝香少許黄連去鬚一兩淨洗為末極細右以蜜調黄連為餅子塗在白瓦器上用艾四兩薫取末刮下入腦麝以磁盒盛用時取如皂角子大以新汲水調㸃之乳香膏治暴赤眼甘草黄連去鬚各半兩黄蘖去粗皮三分右搗篩為粗散以水二盞煎至七分濾去滓後入膩粉少許黄明乳香皂角子大兩塊研匀㸃之至明膏出御藥院治暴赤疼痛淚出眵多熱氣上攻視物昏花黄連一兩當歸二錢𬎼仁去皮一錢已上藥用水一大碗浸一時辰慢火熬至半碗澄濾去滓入白蜜半兩再重湯煮成膏綿濾過出火毒入後藥龍腦二錢青鹽一字南硼砂一錢右研極細與前藥一處同研令匀每用黄米粒大或一菉豆大每日㸃一次兩眼各㸃二次碧霞引治赤眼暴發并赤瞎神效方銅緑白土芒硝各等分右為細末丸如皂角子大每用白湯研化一丸洗之療眼暴赤方雞舌香二七枚乾棗二七枚黄連二七枝右以水半大升煎五六沸澄取清㸃目中差治赤眼暴作明礬銅青黄連研末各等分右為細末水泡洗又方出聖惠方治風毒暴赤眼腫澁痛黄連一分為末蕤仁半兩湯泡去白赤皮青古錢七枚右以甜淡漿水一大盞於銀器中用文武火熬如稀餳以新綿濾過淨磁瓶中宻封有患者以銅筯㸃之黄連膏治暴赤眼黄連不拘多少去鬚為末以銀器内熬成膏用龍腦少許右入罐子内油單紙封之令緊沉於井底著泥處浸一宿取出㸃之香蠟膏治暴赤眼風熱癢痛黄連宣州者去鬚秦皮各一兩右麤搗篩臘月臘日井花水五更者取一大椀煎藥二七日綿濾銀器内文武火煎盡水如膏入龍腦和勻磁盒盛每用倒流水化藥少許候匀㸃之黄蘖膏一名黄金膏治眼暴赤澁痛兼治一切眼退翳黄蘖去粗皮為末蛇蜕㣲炒為末一兩右用醋漿水三盞於銅器内煎一盞稀稠以乳香和膏綿絹濾待冷磁盒盛㸃眼大眥地黄膏治暴赤眼腫痛生地黄淨洗研黒豆各二兩生搗末右搗成膏臨卧時以鹽湯洗眼後閉目以藥膏罨目上至曉水潤青金散出旅含方治暴赤眼澁痛難開黄連去鬚艾葉燒黒灰各二兩右搗羅為細末每貼用五錢湯浸澄清用新綿濾過乗熱洗眼兼治目始赤澁痛熱腫熱淚不止如目中有瘡即不可用神應散出御藥院治眼暴赤疼痛𤣥明粉生用如風化飛便妙爐甘石燒赤各等分右同研極細每用藥一粟米大以新水一匙調藥不拘時候㸃之杏連湯治暴赤眼方見本門風目衝眼虛熱赤痛類又方出聖惠方治風毒暴赤眼腫澁痛黄蘖水洗過去皮一兩桑條三握洗過右於銀銚子内以水一大盞慢火煎至半盞新綿濾去滓於淨器内一兩度以水㧞藥令冷㸃之數多為妙魚膽傅眼方出聖惠方治暴赤熱腫痛澁鯉魚膽十枚取汁膩粉二两右相和令勻磁合中盛之每服少許㸃之又方出聖惠方治眼暴赤腫痛粗黄連十枚取汁青州棗三枚右取河水一鍾令患人自含水黄連吐於銚子内有苦汁即嚥之勿得吐也其棗劈開去核同煎至三分綿濾澄清入孩兒乳汁少許相和㸃之清金散治暴赤眼澁痛難開用芰荷根絞取汁㸃目眥中治眼暴赤方及磣澁用薺菜根搗絞取汁㸃之暴赤眼方出千金方及治目不得開痛淚不止腫磣用附子一枚炮去皮臍粗搗碎如蠶沙許臨卧時置目眥中良以定痛為度一方用稍去黒皮治暴赤眼方用烏雞冠血以筯㸃目眥内日三度治暴赤眼方以新粉脚二斤以甑簞一所淨紙二重襯甑簞先安脚粉如淋灰法用沸湯潑落日方淋露地上勿著屋下來日早晨濾出滓用水於烈日内曬乾如鹽花入磁瓶中盛後入龍腦㸃目神效治暴赤眼出傳信適用方用四物湯三錢以水一盞同煎至七分去滓温服不拘時候一方加大黄如栗子大食後煎服五行方出危氏方治暴赤時行赤腫痛取黄栢以刀畧去粗皮不拘多少濕紙裹黄泥炮煨候泥乾取出每用一彈子大紗帛包水一盞浸飯上蒸熟乗熱薫洗脩製有金木水火土故命名一丸可用三兩次治暴赤眼腫用桑葉為末裹紙内燒煙薫鼻效治暴赤眼用黄連取驢乳汁淹漬㸃甚效猪膽方治火眼用猪膽一箇銅錢三枚洗淨瓦盞内蒸漸乾取膽丸如粟米安眼中又方用生薑切破夾黄連濕紙裹煨熟以乳汁蒸㸃眼洗眼方出聖惠方治眼卒患赤腫疼痛秦芃去苖黄連去鬚細辛乾桑葉各一兩蕤仁一分浸去赤皮右為散用藥一兩水三大盞入青鹽二錢煎至二盞去滓每煖三合洗眼日三度又方一名洗眼方出十便良方甘草細辛黄連去鬚各一兩右為散和匀每取一兩以水一大盞半入青鹽二錢煎至一盞濾去滓每煖三合洗眼日三度𬎼仁煎一名黄連丸治暴赤眼熱淚不止疼痛隱悶黄連一分為末蕤仁三十枚去皮研細右為散末水和薄攤磁器底覆之以熟艾一斤漸以火燒艾煙薫藥上艾盡為度刮丸如梧桐子大每以冷水少許化藥一丸澄清㸃之一方用肥棗開竅去核納藥於内以棗葢之然後以薄紙裹定以大茶碗量水半碗煮候水得一雞子許即以綿濾過待冷却㸃眼甚效亦治風眼淚癢或生翳或生赤眥沙糖膏出選竒方洗赤眼腦子三十文沙糖少許生薑自然汁右件同匀為膏臨時滴㸃之立愈杏仁湯出選竒方治暴赤眼黄連杏仁右等分同研勻以水調濾取汁入輕粉和匀㸃之湯調頓冷洗皆可用黄連湯出選竒方治暴赤眼乾薑淨洗黄連半兩杏仁各半兩右同搗為粗末綿包之沸湯泡閉目乗熱洗之生地黄湯出御藥院治眼暴赤纔發或經一二日赤痛隱悶淡竹葉草决明黄芩各二兩生乾地黄二兩赤芍藥半兩右為粗末每用五錢水三盞煎五七沸絹濾去滓乗熱洗眼冷再煖洗之秦皮散出永類鈴方治暴腫赤障疼痛灑淚當歸黄芩川芎荆芥穗宣連羌活秦皮黄栢梔子赤芍藥蔓荆子各等分右剉細新汲水漉出沙灰用二大盞温熱泡洗至寶金絲膏出永類鈐方治暴赤客熱一切外障當歸羌活生地黄黄栢秦皮蔓荆子川芎黄芩赤芍藥山梔子宣連大黄細辛右逐味脩製擇稱各等分入淨銅鍋内用淨水浸過藥汁煮令透去滓取見在濃汁以上等結如沙糖以濃藥汁相停和入銅鍋内再煮令沸以兩重絹濾過銅器内煮成膏如綿四季減火色續入没藥水飛過如麵更加腦麝隨便多少尤嘉係㸃眼膏或用湯泡鎔洗亦可重明散出衞生家寶方治一切風熱之毒上衝眼目暴赤腫不住疼痛或生翳膜瘀肉隱澁羞明兩瞼赤爛爐甘石一斤火燒紅黄連湯蘸七次川椒二錢同爐甘石末熬成膏用文武火焙乾黄連半兩盆硝三錢銅緑半兩蒲黄半兩豆粉四兩雄黄二錢右以上六味同爐甘石末用宻羅過研細舌上嚼不磣為度後入腦子一錢南硼砂一錢研細用大豆養之每用少許以骨筯乾拈㸃卧少時忌酒麵諸雜魚肉辛熱之物此方得之於路大夫數以此為生治一切暴痛赤眼疼痛極甚或生翳膜外使㸃藥内喫此方䕶命方荆芥蔓荆子薄荷羌活牡丹皮黄芩當歸甘草梔子青葙子大黄决明子麥子獨活牛蒡子牽牛各一分半夏三錢右搗細杵羅為末每服二錢水一鍾先煎令沸方下藥輕攪便瀉出食後臨卧和滓喫柴胡湯出朱氏積驗方治眼目暴赤腫痛柴胡蒼术甘草各等分右為末白水煎如頭疼壯熱用薑葱煎已驗救苦丸出保命方治眼赤發嗔痛不可忍者黄連一兩當歸二錢甘草一錢右同剉新水半椀浸一宿慢火熬至一半以綿濾去滓以淨為妙用火再熬作稠膏子為度攤上碗倒合以物葢之熟艾一大彈子許底下然之用艾薫膏子艾盡為度再入下項藥硃砂一錢飛腦子半錢乳香没藥等分右同研極細入黄連膏拌和勻為丸如米大每服二丸㸃眼大角内仰面卧待藥化銅青膏出楊氏家藏方治暴赤眼隱澁羞明癢痛銅青一錢杏仁四箇去尖輕粉少許右並研令細和作四丸每一丸湯化洗如勝散出楊氏家藏方治赤暴腫痛難開眼白礬生二錢川烏頭去皮二錢瓦上焙黄連去鬚二錢右件為末入白麵半錢和勻取生薑薄荷汁調作餅貼太陽退赤湯出千金方治眼暴赤乾艾葉燒灰二錢宣連二錢為末古銅錢一枚右都入大盞内百沸湯泡了放冷澄定取上清者以水隔盞浸令冷以所浸泡銅錢㸃之一日内取差薑連散出大衞方治暴赤眼乾薑黄連各半兩右搗羅同為粗末以綿包之沸湯泡閉目乗熱頻洗治暴赤眼出經驗方細研生薑去滓以汁頓在盆底上浥乾研令極細重絹羅過每用少許㸃之出熱淚畢以冷水淨洗即愈暴赤眼方出澹療方𤣥參枳殻升麻杏仁防風旋復花赤芍藥黄芩菊花甘草葶藶黄連各等分右以上㕮咀煎服還光散出朱氏集驗方治一切男女暴生赤白翳膜菊花炒羌活防風蟬脱蒺藜炒川芎當歸甘草右為末各等分食後茶下治暴赤眼出永類鈐方以雞子清剉黄連浸置地下一宿次早濾過雞毛蘸㸃眼又方出永類鈐方宣連一兩熬濃汁入好明淨朴硝一兩火熬乾研細入好羯羊膽中懸之膽頭用紙袋一箇放寛籠之候硝盡㵕出膽上成霜掃以為末入麝少許入筒中盛㸃眼又方生薑汁濾過器中澄令細再用宣連剉浸一七令透用綿絹濾薑汁成粉日乾㸃眼諸證皆佳又方苦竹一叚兩頭留節一頭開小孔入剉宣連半兩以紙塞孔置井中浸一宿次早出竹節中水洗少加腦子尤效治暴赤眼無瘡者以古銅錢刮淨薑上取汁於錢唇㸃目熱淚出今日㸃來日愈但小兒甚懼不須疑已試良驗紫衣主黄障暴熱目黄沉重下水瘀以紫衣煮服之療眼暴赤痛神效以枸杞汁㸃眼立效去暴熱目黄祕閉塞用苦􅀢菜煮汁服明目方用合明草搗絞汁服目積年赤論風熱毒氣發於目眥則令目脉赤不治則眥頭爛眵淚磣痛風熱不退雖積年月亦莫能差此由肝臟積成風熱脾肺常多壅滯邪氣伏留在臟不能消散乃上攻於目則令赤痛怕見風日或癢或澁或淚睛痛風冷外傷不差則經年眼及瞼常赤痛也龍木論云兩粘睛外障眼初患之時或癢或痛年多風熱赤瞼中有瘡因熱在肝膈脾胃風壅致令兩瞼相粘即宜鈎割熨眼排風散烏犀丸立效歌曰兩眼睛痛何所論多年風赤是何因睛疼瞼澁皮肉爛兩瞼相粘似有筋割烙直須多出血銅箆燒焙赤眩門治風丸散多頻服年歲中間自去根方決明子丸治風毒眼赤痛久患及虛熱眼暗地膚子麥門冬去心焙𤣥參車前子各半兩决明子㣲炒赤茯苓去皮青葙子遠志去心焙茺蔚子蔓荆實地骨皮栢子仁山芋人參黄芩防風去叉大黄甘草炙剉黄連各一兩去鬚細辛去苖葉切半兩右為細末煉蜜為丸如梧桐子大每服二十丸食後以米飲下加至三十丸菊花散出聖惠方治風赤眼積年不差腫澁疼痛心神虛煩宜服甘菊花前胡去蘆防風去蘆羌活生乾地黄茯神决明子木通剉車前子麥門冬去心焙羚羊角屑地骨皮甘草各半兩㣲炒赤剉右為散每服三錢以水一鍾煎至六分去滓食後温服松皮湯洗頭方出聖濟總録治風熱久目赤腦中積熱白鮮皮甘菊花荆芥穗老松白皮去粗皮細辛去苗蔓荆實防風去叉荷葉蒂𤣥參苦參雄黒豆二升桑白皮各一兩右除豆并荆實外細剉以水三斗煎至一斗五升去滓投朴硝一兩半攪熱洗頭餘滓重煎入朴硝如此三度洗之犀角散出聖惠方治遠年風赤眼腫癢澁痛暈翳宜服犀角屑梔子仁木通剉子芩川大黄瞿麥决明子車前子黄連甘草甘菊花防風各等分右為散每服三錢以水一鍾煎至六分去滓食後温服忌魚熱麵决明膏出聖濟總録治風熱目赤翳積年不差磣痛石决明蕤仁蘆薈秦皮研馬琦研黄栢去皮烏賊魚骨紫貝各一兩鯉魚膽四箇鹽緑一分右以水三升煎决明𬎼仁蘆薈秦皮黄栢五味至一升淨濾去滓却入紫貝魚膽烏賊魚骨馬琦鹽緑更煎約三合於磁器中盛不令泄氣每取一豆大少許乳調匀㸃九子丸出聖濟總録治久患風毒眼赤昏暗蔓荆子炒五味子枸杞子地膚子青葙子决明子炒楮實子炒茺蔚子兎絲子酒浸一宿焙乾另研為末各一兩右為細末煉蜜和丸如梧桐子大每服二十丸温酒下夜卧食前再服决明丸出聖濟總録治風暴赤眼久不差石决明研水飛甘菊花人參地膚子各一兩細辛半兩熟乾地黄防風去蘆各二兩兎肝一具五味子一兩半右為細末煉蜜和搗三五百杵丸如梧桐子大每日空心及晩間食後煎鹽湯下二十丸或竹葉白湯可漸加三十丸撥雲散治積年赤眼方見本門一切眼疾類右搗篩每服三錢水一鍾半竹葉七片煎至六分去滓食後温服萎蕤湯治眼赤腫疼痛萎蕤桔梗木通羚羊角屑黄芩黄耆各三分麥門冬焙一兩右麤搗篩每服五錢水一盞半煎至七分去滓投芒硝一字空心温服食後再服得利去芒硝前胡湯治眼赤腫痛兼治熱氣客目内眥腫起前胡去蘆二兩芍藥青箱子决明子炒細辛去苖車前子梔子仁各一兩右麄搗篩每服五錢水一盞半入竹葉七片煎取八分去滓入芒硝一字食後温服臨卧再服以利為度既利即去芒硝洗眼秦皮湯治眼赤腫熱疼痛方見本門目飛血赤脉類大黄膏治眼赤腫痛大黄三兩𤣥參芒硝