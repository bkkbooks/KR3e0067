以鐵鍋熬到一小半覷藥力盡在水中用新細絲絹濾去上項藥滓又用好絹濾去兩遍滓再熬令至一盞如稀麵糊相似取出用銀器於木炭炕成膏子入腦子菉豆粉一并和成劑用盞葢著旋丸如豆大用淨几上搓成細條子以竹刀切如米粒大㸃之清肺湯出永類鈐方治氣壅盛白雲赤腫努肉侵睛多淚大黄當歸木通赤芍藥桑白皮茵陳地骨皮乾葛麻黄粉草炙杏仁去皮尖炒知母炒各等分右㕮咀每服三錢水煎食後服羚羊角湯出永類鈐方治眼赤腫砂澁羞明流淚翳膜侵睛雀目等證大黄二兩黄芩山梔仁炒石决明煆草决明炒木賊去節桔梗宻蒙花蟬脱洗炒去嘴足蒺藜炒去刺赤芍藥青葙子龍膽草粉草炙羚羊角炒各一兩製焙右為末每服二錢食後服心熱燈心湯下後生昏花米飲下常服麥門冬湯下雀目猪羊肝蘸喫肺熱桑白皮湯下流淚夏枯草湯下小便不通車前子湯下欝金湯出永類鈐方治赤腫痛大黄荆芥穗薄荷葉欝金朴硝各等分右為末雞子清或嫩芋根白者打爛調貼眉眶上及瞼腫加生地黄尤好痛加乳香末調傅糖煎散出楊氏家藏方治風熱毒氣上攻眼目赤腫疼痛視物不明隱澁難開龍腦草漢防已大黄荆芥穗赤芍藥當歸洗焙甘草炙防風去蘆上八味各一兩川芎半兩右件㕮咀每服四錢水一盞入砂糖如彈子大同煎至七分去滓温服食後如聖水出楊氏家藏方治眼赤腫痛生瘡乾艾葉燒灰炒半錢黄連去鬚搗細末半錢右件入新磁器中用無油沸湯浸稀稠得所新汲水内沉令極冷入青古老錢一文浸兩時辰臨卧仰睡用古老錢蘸藥㸃眼侯口中覺味即驗祛風散出朱氐集驗方治一切風熱上攻眼目赤腫羞明大黄黄芩地骨皮山梔子各半斤柴胡𤣥參赤芍藥荆芥薄荷防風甘草桑白皮右㕮咀每服三錢水一盞半赤腫加生地黄煎大人小兒小便秘澁心胸滿悶加枳殻羌活散出永類鈐方治一切風熱上攻頭目赤腫疼痛昏澁眵淚怕日羞明赤脉羌活獨活柴胡川芎黒參赤芍藥桔梗荆芥地骨皮薄荷各半兩大黄一兩桑白皮半兩山梔子黄芩各一兩右件各生用為㕮咀每服重三錢水一盞半煎去滓無時服如有翳膜加蟬脱宻䝉花各半兩淚多則加木賊半兩目赤磣痛赤腫論夫五臟六腑之精華皆上注於目若風熱搏於臟腑毒氣乗肝衝發於目則熱氣外泄淚下眵多目液暴燥故熱磣痛赤腫也方龍腦膏出聖濟總録治肝熱衝發於目赤痛赤腫磣痛山梔子去皮二兩甘草生七錢生乾地黄一兩熟乾地黄一兩黄連去鬚青葙子各八錢當歸四錢馬牙硝六錢决明子一合已上共搗為粗末青鹽四錢蜜陀僧半錢朴硝一兩一錢石决明一枚米泔浸三日刮洗乳香一錢硇砂一字硼砂蕤仁各二錢已上并細研燈心半錢切碎鉛丹一兩三分羅過白蜜三斤已上同杵勻入磁瓶子内用籜油紙封定勿令透氣坐在鍋内重湯煮一日取出絹濾去滓大棗十枚去核龍腦一錢麝香成顆者研膩粉各一字丹砂研二錢右除前膏外將後四味同研勻入前膏内攪令相得以乾磁器收之用銅筯如常法㸃眼其藥滓更以雪水二碗攪和入罐子依前法煮濾取清者㸃眼其滓焙乾入蔓荆子惡實各二兩炒過同為末每服一錢七分食後荆芥臘茶調下龍腦散出聖惠方治肝臟風熱眼目赤爛腫痛磣澁龍腦細研牛黄細研硃砂各一分細研天竺黄細研赤芍藥𤣥參甘菊花車前子决明子胡黄連茈胡去苖川升麻各半兩犀角屑羚羊角各二兩川大黄一兩炒甘草三分炙剉細辛一分右為散研令勻食後竹葉湯調下一錢七分忌炙煿熱麵毒滑魚肉羌活散出聖濟總録治風毒氣攻注頭目昏眩磣澁疼痛及治皮膚瘙癢隱疹赤腫羌活獨活前胡去蘆并剉人參桔梗防風各去蘆頭芎藭細辛去苖荆芥穗甘菊花土蒺藜茯苓去皮枳殻麩炒去穰石膏細研水飛甘草各一兩右除石膏外同杵為散再入石膏和匀每服二錢不計時候酒調下决明子方出聖濟總録治目赤翳膜磣痛熱淚不止决明子為末𬎼仁研各六分象膽黄蘖去皮為末秦皮為末各四分鹽緑研三分鯉魚膽去皮四枚烏賊魚骨去甲研貝齒燒研馬琦研各四分右各研細先以水三大升煎後五味至一升去滓重煎至半升即下前五味再以㣲火煎取三合用宻器盛每服一大豆許以人乳和少少㸃眼中日二度夜一度為效瀉肝散出聖濟總録治眼熱磣痛赤腫淚出昏暗茈胡去苖决明子升麻苦竹葉朴硝研各二兩澤瀉一兩大黄蒸梔子仁黄芩去黒心芍藥各三兩右為散每服五錢水一盞半煎至一盞去滓温服以利為度决明湯出聖濟總録治眼燥澁痛睛如眯磣石决明淨洗細辛去苖防風去叉車前子人參白茯芩去黒皮大黄炒令香熟桔梗炒各一兩茺蔚子二兩右為散每服五錢水一盞半煎至一盞去滓食後臨卧温服日三服羚羊角湯出聖濟總録治肝腎虛熱氣壅攻衝眼磣澁赤脉羚羊角鎊屑半兩木通細剉𤣥參防風去皮各一兩芍藥一兩山梔子仁三分枳殻去穰麩炒半兩馬牙硝為末湯浸澄下甜竹葉洗各一兩右除硝並竹葉外粗搗篩每服五錢水一盞半入竹葉十片煎一盞去滓入硝末一錢於食後温服卧時再服㸃眼方出聖濟總録治肝熱目赤腫磣痛黄連蕤仁各三兩秦皮去粗皮馬牙硝研决明子山梔仁黄蘖去粗皮各一兩鉛丹研一分龍腦研一錢右除鉛丹牙硝龍腦外餘為粗末用蜜四兩於磁罐内拌和諸藥令勻將硝末摻於藥面上坐罐子於鍋内以水浸罐子内令深莫教浮動慢火煮令牙硝耗盡湯少旋添熱湯勿令湯淺次入鉛丹更煮一日取出候冷入龍腦封閉地坑内窨著如要用旋以生絹絞濾少許㸃眼如㸃久患障翳即用五分藥膏别入淡竹瀝七分和勻㸃之車前子丸出聖濟總録治肝腎風熱目赤痛腫磣生努肉車前子人參决明子㣲炒黄連黄芩去黒心大黄炒細辛去苖各一兩甘草炙半兩右為散末煉蜜和丸如梧桐子大食後温漿水下三十丸臨卧再服中黄湯出聖濟總録治脾胃熱眼赤澁痛犀角鎊屑生麥門冬去心蘆根各一兩半淡竹葉十五片石膏甘草炙各一兩生地黄二合地骨皮二兩右㕮咀研如麻豆大每服三錢水一盞半煎至一盞去滓食前温服煎藥不得犯鐵器地骨皮湯出聖濟總録治風毒衝目赤腫乾澁地骨皮升麻甘菊花擇防風去皮决明子炒細辛去苖各一兩竹葉洗右除竹葉外粗搗每服五錢水一盞半入竹葉七片煎一盞去滓食後臨卧温服象膽煎出聖濟總録治目赤障翳磣痛熱淚昏暗象膽鹽緑各研一兩防風去皮一兩半蕤仁去皮二兩石蜜一兩一分黄連去鬚二兩龍腦研半兩細辛去苗三分右除龍腦鹽緑外各細切以水三大升煎取七合濾去滓下龍腦鹽緑更煎一二十沸於宻器盛每取一二豆大許新汲水或人乳和㸃眼中良久閉目日夜各二次龍涎湯出聖濟總録治眼磣澁並如針刺血痛昏暗生麥門冬去心一兩半熟地黄焙三兩木通一兩旋復花大青茯神去木各一兩黄連去鬚半两右剉如麻豆大每服三錢水一鍾半煎至一盞去滓入芒硝半錢攪勻食前温服食後再服𬎼仁湯治目熱赤腫磣痛蕤仁去皮秦皮去粗皮防風去叉各一兩甘菊花擇半兩竹葉一握山梔子仁萎蕤各半兩右剉如麻豆大水五盞煎至二盞半去滓熱淋冷頻煖淋洗煎藥不得犯鐵器𬎼仁膏治目磣澁迎風淚出眥瞼赤爛生瘡癢痛不已蕤仁去皮一兩胡粉研一錢黄連為末一兩龍腦研一錢膩粉研一錢貝齒燒研一分真牛乳三兩右各研匀用銀石器鎔乳訖然後下蕤仁等攪令匀煎數沸熟便以綿濾去滓用宻器盛每取一麻子許㸃目大眥中日二度地骨皮散治風熱毒氣上攻眼目磣澁疼痛地骨皮去土羌活防風去义土蒺藜去刺㣲炒甘草炙各一兩右為散每服二錢七分荆芥茶清調下患暴赤眼濃煎甘草湯下食後臨卧服解熱眼方治解熱消血明目大黄甘草當歸川者赤芍藥各一兩右為細末每服二錢湯調下食後服或以一錢湯泡洗尤妙大棗煎治目熱眥赤生赤脉侵睛息肉急痛不開磣痛大棗七枚去皮核黄連二兩淡竹葉切五合右以水二升煮竹葉取一升澄清取八合入棗肉黄連煎取四合去滓令淨細細以傅眼眥中忌猪肉羊肝丸治解熱消血明目黄連淨為末杏仁去皮尖半兩白羊子肝一具去筋膜右臼内搗細衆手丸如梧桐子大每服七十粒食後臨卧温米泔下日三服洗眼車前草散治目熱痛淚不止方見本門目飛血赤脉類黄連煎治眼目暴赤磣澁疼痛甘蔗汁二合黄連㨶碎為末半兩右於銅器以慢火養令汁涸去半以綿濾去滓每日兩度㸃之黄連㸃眼方治熱毒乗肝上冲於目推眵赤痛磣澁疼痛用黄連去鬚搗末半兩以生竹筒一箇留節可長六七寸以水三大合將黄連用新綿裹内竹筒中著古銅錢一文葢筒口於炊飯甑中蜜葢之待下饙即取出以綿濾過候冷納瓶中每以銅筯㸃少許著目眥頭日三度不可過多若治眼暗不過一七差治眼熱痛淚不止用䓆蓂子為末欲卧以銅筯㸃眼中當有熱淚及惡物出并去努肉三四夜㸃之甚效寒氷散治目赤多眵磣痛用馬牙硝三兩研入新竹筒中宻封入地埋四十九日取出更研每用一次用黒豆末少許以水調如糊後同藥調匀攤紙花子上貼太陽穴一方只用硝極細研夜卧銅筯取如黍米大㸃目眥旦以漿水洗普濟方卷七十四
