毛筆蘸藥塗疼處次用表紙貼之少許一方用酒熬蒼术丸出經驗良方治腰腳濕痛能養腎水順氣疏風蒼术一斤四兩酒浸四兩米泔浸四兩醋浸四兩青鹽水浸冬五日夏三日如數分作四分用椒一兩炒一分破故紙一兩炒一分用黑牽牛一兩炒一分用茴香一兩炒右炒訖除去伴藥只留蒼术為末醋麵糊丸空心溫酒下或鹽湯熟水任下年五十上加沉香一兩南木香二兩巴戟二兩酒浸二宿去心獨栗丸出聖濟總録治腰腳沉重及勞傷腳氣等疾栗不拘多少右取肉焙乾為末煉丸如梧桐子大每服二十丸溫酒下空心日午服漸加至三十丸治腰腳出本草以韭子一升揀擇蒸兩炊以來曝乾簸去黑皮炒令黃搗成粉安息二大兩水煮一二百沸乾緩火令炒赤色二物相和搗為丸如乾入蜜亦得每日空心服酒下二十丸然後以少飯壓之大佳補腎散出十便良方治卒患腰腳疼痛以杜仲一兩去粗皮炙微黃銼用水二盞煎一盞去粗用羊腎一對細切去脂膜入藥中煮次入牙皂莖鹽花椒薑醋調和作羹喫空心食之治腰腳疼痛方出肘後方用胡麻一升新者熬令香杵篩日服一大升計服一斗即永差酒飲羹汁蜜湯皆可服之佳皂角方出本草治腰腳不履地取皂角子一千二百箇淨洗令乾少酥熬令香為末蜜丸如梧桐子大空心以蒺䔧子酸棗子湯下三十丸治腰腳疼痛久不差方出聖惠方取不著子皂莢樹上刺五兩燒作灰搗細羅為散每於食前以溫酒調下三錢除濕丹出經驗良方治腰腳重痛足脛浮腫筋腫拘攣便尿不利且療疹癰疽發背走注腳氣疹癬惡瘡並皆治之澤瀉檳榔乳香别研末葳靈仙赤芍藥大戟水煮甘遂水煮各一兩陳皮青皮沒藥黑牽各半兩右為細末麵糊丸小豆大溫湯下三十丸百倍丸出御藥院方治男子婦人腰膝疼痛筋脈拘攣行步艱難敗龜虎骨二味各醋浸一宿蘸醋炙令黃為度肉蓯蓉酒浸一宿牛膝酒浸一宿去苗木鱉子去殼乳香别研沒藥别研骨碎補去苗自然銅醋淬七炙破故紙炒以上各半兩右為末以浸蓯蓉牛膝酒煮麵糊丸如梧桐子大每服三十丸溫酒下葫藋散出御藥院方治榮衛不順氣血偏虛風寒濕氣攻注腳膝疼痛葫藋吳茱茰頑荆黃耆防風防已各四兩躑躅花白獨活荆芥穗藁本各二兩右為粗末都入水半碗蔥白二七莖細銼木瓜半箇挼碎拌令勻作三分每服用藥一分於銚內慢火炒令通熱用綿帛兩重褁藥尉分引痛處如覺藥微冷依前别炒餘藥更換尉之三劑必減萬安丸出經驗方川鍊子半斤微炒出汗知母半斤微炒出汗甘草四兩炒黃色茴香四兩炒黃色蓮子心木香各一兩晚蠶沙一兩微炒右除甘草茴香先為末存留四兩熬膏子外將餘末四兩共餘藥一處為末用膏子為丸如梧桐子大每服七八十丸空心溫酒送下金鈴子丸治腰腳痛并小腸腳氣等疾金鈴子肉葫蘆芭一兩破故紙一兩萆薢一兩小茴香三兩蒼术二兩附子一箇右為細末酒打麵糊丸如梧桐子大每服五十丸空心溫酒送下玄胡索散出海上方治逺年近日腰腿疼痛大有神效玄胡索牛膝當歸破故紙各等分為度右為末每服三錢空心溫醋湯調下四焙丸出瑞妙聖治腰膝疼痛杜仲四兩瓦器內炒黃色去絲破故紙四兩瓦器內炒黃色甘草四兩胡桃四兩去皮膜右為細末酒丸如梧桐子大每服五十丸空心用甘草末調湯下六半湯治血虛腰腿疼痛白芍藥六兩甘草炙半兩右用水一盞半煎至八分服空心食前草烏膏出仁存方治行路腳板腫痛草烏甘遂各等分右為細末臨卧用新汲水調傅腳板上下痛處次早洗去便可行藥碁子一名銀􅀈丸治腿腰痛氣滯出本事方右以牽牛不拘多少用新瓦入火煿得通赤便以牽牛在瓦上自然一半生一半熟不得撥動取末一兩入細研硫黃一分研勻分三每用白麵一匙水和捍開切作碁子五更初以水一盞煮熟連湯溫送下住即己未住隔日再作豫嘗有此疾每發止一服痛止病源曰腿腰痛者或墜傷腰是以痛一方二味同炒熟不用研碎每服五十丸粒用溫酒鹽湯空心吞之下正本丸治心氣妄行流入腎經腰膝疼痛眼見黑花流入經絡四肢疼痛或不能舉動右用益智仁四兩擘破鹽二兩於瓷器內同炒令香熟篩出鹽不用將益智碾為細末煉蜜丸如梧桐子大却以白茯苓二兩甘草一兩研羅為末每以末二錢百沸湯服不拘時送下療腰膝疼右用久年陳艾一斤濃煎將小深桶滿盛將腳擱其上却以衣服覆之令其汗出透了如湯可容下腳則以膝腳放入浸之覺有意思就以洗之治膝腰疼痛貼損傷出肘後方右用鹿茸不限多少塗酥炙紫色為末溫酒下一錢單以鹿茸燒赤淬酒中服亦得治腰膝疼痛久不已方出聖惠方右以糟底酒摩腰膝及痛處筋攣處治腰膝急痛出本草右用虎骨煮作湯浴之或和醋浸亦良治筋骨急痛脛骨痛尤妙及行步足膝痛方以熱水沃之竟日便能愈又方出永類鈴方治腰腳撑腿痛亟用葡萄根煎湯淋洗治久行腳心腫痛出危氏方用蚯蚓糞塗腫處髙擱起腳一夕即愈葳靈仙方一名葳靈散出御藥院方治腰腳痛并腰腎腳膝積聚腸內諸冷病積年用葳靈仙一斤洗乾好酒浸七日為末麵糊丸桐子大却以浸藥酒每服送下二十丸一方為細末每服一錢溫酒調下逐日微利為度烏礬散出海上方治行千里不損腳板草烏頭半斤白礬二斤右以大黑豆煮軟為度同為末每用三錢調塗足下又方出永類鈴方治腰腳撑腿痛貓糞燒灰研痛處即汗無汗處以唾溫酒而研之治腰腳損痛出永類鈴方川牛膝一兩半川萆薢半兩薏苡仁半兩乳香一兩當歸一兩半破故紙一兩製杜仲二兩南木香半兩北茴香一兩半沒藥半兩杜烏藥一兩吳茱茰一兩半川鍊子二兩青鹽半兩天麻半兩蓯蓉一兩葫蘆芭一兩葳靈仙半兩續斷半兩麝香一錢青藤根半兩川烏一隻附子一隻虎骨炙酥令黃又酒糊為丸療腰膝髀連腿疼酸者方方見腰腳臍冷痺類獨活酒三仙飛步丹出永類鈴方白芷草烏醋煮破故紙杜當歸乳香各二兩川山甲南星醋煮各一兩蒼术六兩杜烏藥五兩香附子四兩吞沙四兩炒去皮炒作末右為末薑汁丸挫氣皆治常服薑酒下挫氣茴香酒腰痛胡桃酒頭風生蔥茶酒法獨活牛膝防已當歸烏頭薏苡仁肉桂秦芁防風羌活萆薢蒼耳乾葡萄五加皮海桐皮附子杜仲杉木節川椒乳香沒藥生薑出永類鈴方乳香散正元安挫方孫尚藥治腳轉筋疼痛攣急者松節一兩細銼如米乳香一錢右以銀石器內慢火炒令焦只留一二分性出火毒研細每服一錢至二錢熱木瓜酒調下應是筋病皆治之治血㾏腳先祖妣十餘年不愈用此方收效出經驗良方桑桂菰牛屎菰又石灰菰生地上如石塊者碎其中有灰起肥株柱菰胎髮男用男女用女右用三菰焙乾各五錢重胎髮燒灰存性並為末和前藥濕則乾搽乾則清油調塗治腰腳弱出本草以生栗子食之昔有人患腳弱往栗樹下食數升便能起行此是補腎之義治人冷失腰腳出本草用小麥麩蒸熱袋盛尉主腹內冷腰膝痛弱小便白數陽道乏出本草以牛領藤煮汁酒服之治腰膝痛及折傷出本草多取鹿角併截取尖錯為屑以白蜜淹浸之微火熬令小變色曝乾搗末篩令細以酒服之治丈夫腰膝積冷痛或頑麻無力出本草莵絲子洗稱一兩牛膝一兩同浸於銀器內用酒過一寸五日曝乾為末將原浸酒再入少醇酒作糊搜和丸如梧桐子大空心酒下二十丸腋臭論夫有天生狐臭有為人所染臭者天生臭者難治為人所染者易治然須三年醋傅礬石散弗止并服五香丸乃可得瘥勿言一度傅藥即瘥正亦傅藥時暫得一瘥耳凡狐臭人通忌食藝薹五辛治之終身不瘥狐臭與漏腋雖不害人性命而害人身奉親事君乃至交友皆非所宜修身之士務為清潔者或得此患不可不思有以去之夫狐臭者多因勞逸汗漬以手摸而嗅之致清氣道中受此宿穢故傳而為病方論有天生臭之説恐未必皆然多見為人相染者蓋其氣吸上元宫遂散百脈多相沾染忌之為得漏腋者亦由腋不收汗致汚衣數重皆透然未必臭以二證致之其病自别古方共作一病未為至論隂陽之在人血與氣爾兩者調適則行流散徙莫或疷滯逹於形色暢於膚理無不得其和茍失其宜血氣從而凝積此所以有狐臭之病其候不一有曰狐臭有曰體臭有曰漏腋狐臭者指其腋間體臭者舉其大槩漏腋則又曰言其溫而生瘡者不可不辨也方十香丸出聖惠方含化令人遍體俱香沉香銼白檀香銼木香零陵香甘松去土藿香白芷細辛去苖葉芎藭檳榔銼肉豆殼雞舌香丁香各半兩龍腦麝香各一分别研右除别研外同搗羅為末入腦麝拌勻煉蜜和雞頭大每日三四度用綿褁一丸令化咽津香粉方出聖惠方白附子白茯苓白芷白斂白檀香沉香木香雞舌香零陵香以上各一兩麝香三分細研英粉六升研碎絹囊盛藿香一兩右為散入麝香研勻將粉囊置大盒子內上以藥末覆之密閉七日後以粉粉身極香透香丸出聖惠方治身體常香麝香細研沉香白檀香龍腦研細各一分煎香雞舌香丁香黃熱香雞骨香甘松香各一兩川升麻鬱金香各三分右為末入麝香龍腦和拌令勻煉蜜和丸如雞頭米大每服用鹽湯嚼下三十丸留一半散不和每揩齒了以散子重揩然咽津不過半月香汗通透也五香丸主口臭及身臭止腫痛散血氣豆蔲子丁香藿香白芷青木香當歸桂心各一兩零陵香一兩甘松香三分香附子二兩檳榔仁二枚右搗篩蜜丸如大豆日三夜二時含之咽津五日內口香十日身香二七日衣被香三七日下風人聞香四七日淨洗手水落地香五七日把他人手亦香禁五辛下氣去臭令人體香方出肘後方瓜子芎藭藁本當歸杜蘅細辛甘草炙各二分白芷桂心各五分右搗下篩食後服方寸匕日三五日香二十日肉香一方無甘草石灰散出千金方治狐臭石灰一斤楓香一作沉香丁香薰陸香青木香各二兩礬石四兩一作白礬橘皮陽起石各二兩右治下篩以綿作篆子粗如指長四寸展取藥使著篆上以絹袋盛著腋之下先以布揩令痛然後挾之丁香丸一名香遍滿方出千金方治七竅臭氣皆令馨香沉香白瓜子仁各一兩丁香甘草炙當歸切焙芎藭麝香研各半兩藁本去土三分右搗篩七味為細末後入麝香拌勻煉蜜和丸如小豆大每服溫酒下二十丸日三服令身背香療腋臭方好硯砂好白礬蜜陀僧各三兩酢酪三兩乾者胡粉鉛錫生銅屑各三分金屑八分右並研令細酪一升新銅器中盛藥密封其口二七看上青緑色欎欎然其藥即成還須研令極細至用若乾更以好酒和藥以塗病處若有毛先拔去以石炭水淨洗拭使乾以生布揩令微赤可作瘡一日一塗洗逺不過十日即待腋瘡差訖更取銅屑細研成粉粉病處日五六即止病差終身不可帶麝香食胡薑治身體臭令香出聖惠方柑子皮白芷各二兩半瓜子仁二兩藁本當歸細辛桂辛各一兩右治下篩服方寸五日口香三七日身香金錯屑塗法金錯屑一銖銀錯屑一兩赤銅屑香附子胡粉錢錯屑各一兩三年醋三升右以羊酪一升於銅器中煮得二沸用以塗之療人七孔臭氣方出聖惠方瓜子防風各一分芎藭藁本當歸杜蘅各一兩細辛右搗下篩食後溫水服方寸匕日三六物散出千金方治漏腋下及足心手掌隂下股裏常如汗濕臭乾枸杞根乾薑薇根肘後作苗甘草各半兩商陸根胡粉三兩滑石各一分右治下篩以苦酒少少和塗當微汗出易衣服更塗上不過三著便愈或一嵗復發塗之蟬殼膏出聖濟總録治血氣藴積成狐臭蟬殼四十九枚烏梅七枚去核微炒緑礬一兩爾滷一合杏仁七枚湯浸去皮青銅錢七文右除錢外搗羅極細入滷中調之先以皂莢水洗拭乾用錢腋下摩之候熱稍拔去腋下毛即以藥塗之仍用膩粉覆其上兩三度便愈療腋臭方雞屎白礬石熬令汁盡黃礬附子炮木蘭皮青木香右搗為散粉之又石龍衣一大兩蛇􅀈皮是也以子日夜半燒為灰服之治腋氣息似狐狸者白礬燒令汁盡黃丹各一兩南礬鐵粉雄黃膩粉各一分右研為散每夜先以皂莢水洗後用津唾調藥塗之治狐臭方出千金方辛夷芎藭細辛杜蘅藁本各二兩右㕮咀以淳苦酒漬一宿煎取汁傅之欲傅取臨卧時以瘥為度療腋臭方錢三十七文胡粉馬齒草粗莖各二兩青木香一兩大酢半升右切先以醋浸錢五六日然後總漬諸藥一物煎五六沸置磁器中先以石灰汁洗病處拭乾訖塗之以差為度令人體香方出肘後方枯礬輕粉蜜陀僧蛤粉麝香等分右三味為細末入香蛤粉麝香少許摻之治腋氣積久身體手足心汗出皆臭白礬灰麝香膩粉母丁香各一錢砒霜半錢右同研如粉患者先浴了以津唾調之甚者不過三上效治狐臭不可近木香白礬燒令汁盡各二兩附子生用去皮石灰各一兩米粉半升右為末如粉傅於腋下良治腋氣胡椒白礬灰膩粉蜜陀僧乳香各等分右細研令勻塗擦腋下每日用之以差為度治狐臭方出千金方辛夷細辛芎藭青木香各四兩右治下篩薰竟粉之治身體臭令香出千金方甘草松根皮大棗甜瓜子各等分右治下篩食後方寸匕日三七日除五十日身體並百日大香衣服床幃皆香四灰散出聖濟總方録治腋氣粉霜艾人灰鉛灰無即用胡粉蜜陀僧代之礬石灰右唯艾人灰用稍多餘並等分研令極細先以醋漿洗拭乾即傅之不過三五上永除臭氣如要試但傅藥在上良久自無臭氣兼治腳汗效治腋氣人不可近者方出十便良方石灰雄黃各二兩炭灰桑柴皮各一兩右同研為末水調塗於腋下可一食久即以栁木箆子刮藥其腋下毛並落後用前四灰散傅之效驗狐臭方出肘後方雞舌香藿香青木香胡粉各二兩右作粉綿褁內腋下常傅即差療腋臭方黃礬細辛芎藭各二兩雄黃一兩右搗下篩為散先以泔淨洗腋拔去毛令血出以粉腋下又方三年釅醋二升碎銅一斤鹽半合灰二合右浸藥攪藥色青即塗腋下日三四塗三日小愈一月全差治男子婦人狐臭一切治之麝香白膠香蜜陀僧青銅等分右為細末傳上臭處半月不可盡述小靈丹取體氣藥硯砂三錢用濕紙包數層再用紙與泥一處包火上燒煉二次放冷然後去泥燒成白雪雷丸香附子輕粉各五錢右為細末用醋打糊為丸硃砂為衣如梧桐子大每服五七丸臨睡紫荷車磨水送天明體氣根源皆去為妙治狐臭不可近方白礬三兩燒令汁盡馬齒莧乾者各二兩石灰五合右為細散先以生布揩腋下令黃汁出拭乾便以散傅之三五度永差又方青礬燒灰白礬燒灰各一兩白梅七枚搗碎古字錢十四文右於瓷瓶內盛冷水一大盞浸半日先洗淨腋下將藥水時時塗之肢臭方出神效方烏魚頭骨枯白礬各三錢蜜陀僧一錢右為末先用漿水洗臭處後用藥末擦之治腋氣出百一選方蜜陀僧輕粉多用染胭脂墮意右為細末乾傅之一方無染胭脂用蛤粉擦腋下又方膩粉明礬煨紅丹右為細末臨睡時抹上便可住半月去根又方大銅錢二七文白梅二七箇鹽一升右以五月五日水一升共置瓶子裏置戶上百日畢可取用塗不得令婦人為塗藥食粘食復發又方右以酢五合內銅器中以錢十四文胡粉五銖置瓶中泥頭七日後以粉十銖和之訖去腋下毛日再傅之合藥勿令人見祕之療人七孔臭氣方甘草五分炙芎藭四分白芷三分右作散下篩食後飲服方寸匕日三治狐臭方龍骨白膠香蜜陀僧右研為細末擦之治體氣臭者出德生堂枯白礬一兩樟腦一錢蛤粉半兩右為末擦之又方出德生堂膽礬一豆許田螺大生者巴豆去殼各一箇右將田螺以水飬三日出泥土揭起靨入礬豆同麝香少許以綿拴住放磁器內次日化成水溫令熱候五更將藥水以手自抹在兩腿內不住手抹藥直待腹內欲行臟腑却住手先要揀深逺無人處空地內去大便下黑糞極臭是其證以土厚蓋之不可令人知之如不盡再以藥水抹又去大便後次日以礬藥擦之可去病治七孔臭氣皆令香出聖惠方松根白皮冬瓜仁各一兩細辛半兩右為細散每服以溫酒調下二錢日二服治狐臭方出千金方牛脂胡粉各等分右煎令可丸塗腋下一宿即愈不過三劑肘後方云合椒以塗之治漏腋腋下及足心手掌隂下股裏常如汗濕臭者出千金方水銀胡粉外臺作粉霜右以面脂和塗之良驗又方出千金方石灰三升銀屑一升一作銅屑右合和絹囊盛汗出粉之妙治腋臭出海上名方黃丹輕粉各少許右以唾調之塗搽腋氣方出直指方明白礬黃丹右入麝少許末傅之至效石緣散出海名方治腋氣纍醫不退石緣三錢細研膩粉一錢半一作輕粉右同研令勻先疏拔去腋下毛然後以醋和藥末熟摩令熱效青羊脂粉療狐臭胡粉銅青各等分右先以鹽湯洗兩腋不及著藥且淋洗又以青羊脂和傅數日差一方用人乳和塗療諸身體痛方出十便良方竹葉一兩桃白皮四兩右以水一石二斗煮取五斗浴即香治體氣臭者出德生堂枯白礬蜜陀僧各三錢右為末擦之即止又方一名涼肌散出德生堂輕粉一作蛤粉蜜陀僧右為末擦腋下即效治腋氣人不敢近者伏龍肝白茅香各二兩右為末每月用塗腋以差為度又方出一便方胡粉一兩麝香一錢右研令細以牛脂調每日用塗之治狐臭出肘後方取三年苦酢和石灰傅之又方出千金方取槲葉切三升以水五升煮取一升用洗腋下即以白苦瓠燒令火出熏之數數作用又方出千金方用馬齒菜一束搗碎以蜜和作丸以絹袋盛之以泥紙褁厚半寸曝乾以火燒熟破取更以少許蜜和使熱勻令冷先以生布揩之夾藥腋下藥痛久忍之不能然後以手巾勒兩臂又方一名諸病臭出肘後方取伏龍肝作泥傅之治漏腋腋下及足心手掌隂下股裏常如汗濕臭者出千金方取正月一日以尿洗腋下神妙或將自己尿洗亦妙舊衣服洗換尤佳肢臭方出神效方用蜜陀僧不以多少研細先以漿水洗臭處乾擦之蜘蛛散出簡易方治狐臭熏人不可嚮邇者用大蜘蛛一箇以黃泥入少赤石脂搗羅極細入鹽少許為一窠盛蜘蛛在內以炭燒令通紅候冷剖開研細臨卧入輕粉一匙用釅醋調成膏傅腋下明早必㵼下黑汁臭穢於逺僻處傾褁埋之免致染人治腋氣出簡易方以膽礬如琉璃者半生半熟煆為細末入膩粉少許同研每用半錢用生薑自然汁調藥揩擦腋下亦令十分熱痛則止礬無灰色石頭者妙又方出百一選方用輕粉傅之雖不能去根本嘗用立效又方出百一選方用熱餅一枚擘作四片摻蜜陀僧細末一錢許急夾在腋下略睡少時候冷易之如一腋有病只用一半藥元方平素苦此疾來結興偶得此方用一次遂絶根本治狐臭股內隂下常濕臭或作瘡出肘後方用青木香好醋浸於腋下塗之即愈又方治腋氣出海上方用泥礬少許為末如光韶粉擦腋下乳汁調亦可一方無光韶粉有灰末水調抹之又方出海上方以古老錢七文煆通紅米醋浸以酥為度研細入麝香少許先用皂角鹽煎湯洗次以自己唾傅之一方無麝香醋浸一二宿用磨錢抹之銅錢亦可一方用開通錢四十九文銅筯穿入炭火內燒赤醋浸四十九次為細末入麝香一分和勻先用熱酒洗腋下後將藥抹揩腋下七次永除臭氣又方出海上方用銅青乾傅之可止半月之臭又方出海上方捋去腋毛以甘遂半兩為末用豬肉兩片薄批開將甘遂末摻肉上午後貼放兩腋下候明旦五更濃煎甘草半兩為湯一碗服須臾通下臭氣又方出海上方用活田螺一箇以好麝香少許安於田螺內仰埋於露天地上不可再打七七四十九日取出看患處淨洗拭乾用黑土搽之却再洗看有孔處是竅子用田螺汁點之兩度立愈治腋臭傅信適用之取生薑連皮帶汁夾於腋下三次絶根本或以濕紙褁煨研腋下立效腋臭方出直指方用好緑礬半生半煆為細末入少輕粉研細每半錢匕浴後以生薑汁調擦候十分熱痛即止又方出直指方用夜明砂為末同豉汁調傅治腋氣以銅青好者不拘多少米醋調成膏先淨洗腋下用輕粉摻過却使上膏塗之立效治腋氣神妙不可盡述出簡易方用白礬飛不拘多少臨卧時以紙襯桌上伸手托壁柱上以藥乾揩令腋下十分熱痛兩腋揩遍先於中日將所著上截衣服用灰汁淨洗又泡去衣袖中臭氣皆無氣息庶新衣方可著若洗氣息不斷枉用其藥大槩藥無不驗多是衣服再作氣故不能斷根一方用燒好礬石末絹囊盛常以粉腋下不過十度一方唾調塗之治狐臭出本草用鐵屑炒極熱用投酒中飲酒療賤風痙又褁以尉腋療驗一方用鐵屑炒褁尉腋療狐臭若股內隂下常濕且臭或作瘡出肘後方以胡粉一物粉之即差治狐臭方出千金方先以清泔淨洗又用清醋漿洗微揩使破取赤銅屑和醋熱揩數度瘥或取銅屑和酢銀器中炒極熱以絹褁尉下冷復易之一方赤銅屑以醋和如麥飯袋盛先刺腋下脈去血封之療人體及腋下狀如狐􅀈思晉切少獸也氣世謂之狐臭病源云人腋下臭如蔥豉之氣者亦言如狐狸之氣者故謂之狐臭此皆血氣不和藴積故氣臭出十便良方以炊甑飯溫熱丸以拭腋下臭如此即差一方以二月社日盜取私家糜饋一圑背地摩腋下三七偏擲著五路勿令人知又方出十便良方取雞子兩枚煮熟去殼及熱各內腋下冷棄之三路口反顧三為之又方青木香附子各一兩礬半兩燒白灰一兩半右為細末以粉腋下出汗因以粉之亦差又方青木香一斤石灰半斤熬右常以粉身亦差並搗末傅之又方乾薑胡粉白灰等分右合作末粉之療腋臭方常以鹽滷和釃酢塗之一遍一年再塗永除以胡粉和水銀和令相入塗腋下十日以來無氣出又方取五月五日承露百草隂乾火燒為灰用井華水和灰為丸重火燒如燂灰色煉訖即以釃酢和為餅厚如掌大小徑二寸以來即放兩腋下挾冷即易夾時一身連頭並悶二日後若病不差復著藥微發亦不甚臭還法如前療之永斷一身瘡出即以小便洗之又方以首先男兒乳汁浸鹽研銅青拔去毛使血出塗差錢汁傅方用錢二七文以礦石磨令平以夾腋下神良療漏腋方夫病源腋下常濕仍臭生瘡謂之漏腋此亦是氣不和為風邪所摶津液不和故令濕臭用馬齒菜腋下夾之令燥復易之先用焦黃石灰等分合水煎一兩沸如泥泥之毛落然後塗諸藥良治發腋方用攬藤搗碎傅之或用厭草亦佳治腋氣用雞子一枚醋浸過宿針刺小孔厯取清液入砒霜菉豆許和勻將粗布痛擦患處以指點揩之妙治七孔臭氣皆令馨香用麻骨一條燒煙吸入喉中即去導引法養生方云以兩手掩口鼻臨卧閉氣久許時手中即生液連以手摩面目常行之使人體香治腋臭用銅礦石石上水磨取汁塗之治腋臭用田螺一箇水養之候開即以針插巴豆於其中取螺拭乾仰傾酒盞內夏月一宿冬月五七宿即自成水取以搽腋下永絶除根治腋下體臭妙方水銀粉半錢椒半兩黃丹一錢右先將水銀粉入瓶子內却將椒末紙裹却留在粉瓶內經一宿去了椒不用將黃丹同粉塗之却將米醋再抹之甚妙田螺散治狐臭有效田螺兩箇各起掩入巴豆一粒去殼取肉入在螺內仍掩住須臾盡化成水却去掩傾注器內令貼在患上須臾狐氣退神保丸三丸同用溫湯送下令瀉即愈兩服斷根神效治腋氣又方白礬火煆乾為度研一錢輕粉半錢右二味令勻乾時擦腋下神效治隂汗鴉臭不可與人同行共處白礬蜜陀僧黃丹各一分麝香一錢右於乳鉢內研如飛塵以醋於手心內調藥末搽腋下經兩時辰許却以香白芷煎湯洗之一日使一次蜜陀僧散治腋氣開通錢十文米醋內蘸用炭火燒蜜陀僧半兩麝香一匙别研輕粉一匙右件為末每月先令浴了剃去腋毛以生薑一塊切作兩片左手托右右手托左少頃去薑傅藥數次效石膽散治腋氣膽礬蜜陀僧輕粉各等分右件為細末津唾調擦之數次除根普濟方卷一百五十六
