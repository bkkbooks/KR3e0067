二分炙桂心一分右藥切以水一升煮取八合分服效升麻散治小兒鼻衄或唾血川升麻半兩羚羊角屑甘草炙微赤銼黃芩赤芍藥以上各一分右搗為散每服一錢水一小盞入淡竹葉七片煎至五分去滓入地黃汁半合更煎一兩沸不計時候量兒大小分減溫服生地黃煎治小兒鼻衄不止生地黃半斤取汁刺薊半斤取汁杏仁一兩湯浸去皮尖雙仁麩炒黃别研阿膠半兩搗碎炒令黃燥為末蜜一合右都入銀鍋內以慢火熬為膏不計時候用新汲水調下一錢量兒大小加減服之又方刺薊半兩亂髮灰一分蒲黃半兩右羅為散每服以冷水調下半錢不計時候量兒大小加減服之桂心散治小兒鼻衄心悶桂心一分亂髮灰一分乾薑半分炮裂銼右羅為散不計時候以冷水調下半錢更隨兒大小加減又方刺薊汁二合地黃汁二合生薑汁少許右調令勻徐徐服半合仍將滓塞鼻即瘥梔子仁散治小兒卒熱毒氣攻腦鼻衄梔子仁一兩槐花半兩微炒右羅為散不計時候用溫水調下半錢量兒大小加減治小兒鼻衄不止方亂頭髮半兩伏龍肝一兩右研令勻不計時候以新汲水調下半錢量兒大小加減治人少小鼻衄小勞輒出用桑耳無問多少熬令焦搗末每衄發輒以杏仁大塞鼻數度即可斷止一方燒末於鼻孔中為丸內亦得一方以冷水調下半錢大小加減鼻衄方右以生蘿蔔為汁仰頭滴下鼻仍飲其汁療小兒鼻衄不止方以馬矢綿褁塞鼻孔中又方用燒髮灰末吹鼻孔中亦佳一方加山梔子又方單服白馬糞汁三合甚良小兒腦熱鼻乾無涕附論夫肺氣通於鼻鼻上通於腦腦髓下滲而為涕故涕為肺液而其出從鼻小兒肺臟壅滯內有積熱上攻於腦津液內涸故令鼻乾無涕也方柴胡煎治小兒頭熱肺壅鼻乾無涕喘息不得柴胡去苗麻黃去根節湯煮掠去沫甘草木通銼紫苑去苗土五味子大青乾百合各一兩半欵冬花藍葉人參赤茯苓去黑皮各三分大黃銼炒半兩酥一斤蜜煉熟去白沫一斤右除酥蜜外細銼水七升慢火煎至三升去滓入酥蜜同熬成煎瓷器盛五六嵗兒食後熱水調下一錢日三看病輕重量大小加減藁本湯治小兒腦熱鼻乾無涕藁本去苗土銼一分羚羊角鎊防風去叉各一分芎藭菊花去蕚爁細辛去苗葉白术人參柴胡去苗白蒺藜微炒山梔子仁白茯苓去黑皮各半兩甘草炙黃芩去黑心各一分右粗搗篩每服一錢水七分入青竹葉五片同煎至四分去滓澄清放溫細呷食後日再犀角散治小兒腦熱鼻乾無涕犀角鎊半兩升麻惡實微炒各一兩麥門冬去心焙茯神去木百合桑根白皮炙銼大黃銼炒柴胡去苗甘草炙銼山梔子仁枳殼麩炒各半兩桔梗炒黃芩去黑心各一分右粗搗篩每服一錢水七分煎至四分去滓放溫食後臨卧服牛黃散治小兒心肺壅熱腦乾無涕時有煩躁牛黃一分細研黃連半兩去鬚赤茯苓半兩犀角屑半兩鉛霜半兩研麥門冬一兩去心焙硃砂半兩研馬牙硝半兩龍腦半分細研甘草一分炙微赤銼川升麻半兩子芩半兩右為散入研了藥都研令勻不計時候用溫蜜水調下半錢量兒大小加減茯神湯治小兒腦熱鼻乾無涕茯神去木栝樓根麥門冬去心各一兩羌活去蘆頭葛根銼黃耆銼一兩半生乾地黃洗焙三兩酸棗仁炒半兩羚羊角鎊各一分右粗搗篩每服一錢水七分煎藥良久煎至四分去滓放溫服日三食後良久犀角散治小兒心肺氣壅腦熱鼻乾心神煩躁大小腸不利犀角屑黃耆銼麥門冬去心焙半兩赤芍藥枳殼麩炒微黃去瓤木通銼甘草炙微赤銼以上各一分川大黃半兩銼微炒右為散每服一錢水一小盞煎至五分不計時候量兒大小加減溫服木通散治小兒腦熱口乾無涕心躁眠卧不安木通銼川麻黃麥門冬半兩去心焙知母犀角屑杏仁湯浸去皮尖雙仁麩炒微黃甘草炙微赤以上各一分梔子仁三枚右搗為散每服一錢水一小盞煎至五分去滓不拘時量兒大小加減溫服射干散治小兒心肺壅熱鼻乾無涕咽喉不利少欲乳食射干川麻子麥門冬半兩去心焙黃連去鬚犀角屑子芩甘草炙微赤銼以上各一分柴胡半兩去苖右為散每服一錢水一小盞煎至五分不計時量兒大小加減溫服犀角升麻散治小兒腦熱肺壅鼻乾病犀角一兩馬牙硝升麻黃連各半兩硃砂半兩牛黃一分龍腦一分並研細右為細末每服半錢蜜湯調下乳食前天門冬散治小兒肺壅腦熱鼻乾無涕大腸祕澀眠臥心躁天門冬半兩去心焙桑根白皮銼川麻子枳殼麩炒微黃去瓤甘草炙微赤銼以上各一分川大黃半兩銼微炒右為散每服一錢水一小盞煎至五分不計時量兒大小加減溫服黃芩湯治小兒腦熱鼻乾燥常閉目黃芩去黑心青箱子大黃銼炒各半兩蜀漆甘草炙各一分右粗搗篩五六嵗兒每服一錢水一小盞煎至五分去滓放溫食後日二服量兒大小加減大黃湯治小兒腦熱鼻乾無涕大黃銼炒柴胡去苗防風去叉甘草炙各一分右搗篩每服一錢水七分煎至三分去滓放溫食後臨臥各一服量兒大小加減貼頂散治小兒鼻乾腦熱地膽草半兩芒硝一分地龍糞半兩黃蘖右羅為散以豬膽汁和濕作餅子兩枚更互貼于囟門上升麻丸治小兒腦熱鼻乾無涕升麻防風去叉梔子仁各半兩右為末清羊腦髓和丸如麻子大一二嵗每服三丸溫熱水研化下食後午時臨卧各一服量兒大小加減吹鼻散治小兒腦熱無涕蚺蛇膽一分蟾酥一小豆大硝石一分右研如粉每取少許吹入鼻中尤良白礬塗方治小兒腦熱鼻乾白礬生末黃米粉各一兩右每用一錢清水半合調如泥塗腦上日三黃連汁治小兒腦熱黃瘦用黃連半兩粗搗為末童子小便一盞浸一宿每日取清汁半合服之量兒大小加減治小兒腦熱以蚺蛇膽小漬注鼻中小兒鼻多濁涕附論夫人之津液涕唾得熱則燥涸得冷則流溢小兒因解脫不時風冷傷於肺經或冷中囟戶皆令兒涕液不收蓋肺氣通於鼻腦液下通於鼻故也方前胡橘皮湯治小兒肺傷冷鼻流濁涕前胡去蘆頭陳橘皮湯浸去白焙各半兩白茯苓去黑皮桂去粗皮白术人參細辛去苗葉甘草炙各一分右粗搗篩每服一錢水一盞煎至五分去滓溫服日三隨兒大小加減防風湯一名甘菊花湯治小兒腦戶傷風冷鼻多濁涕精神昏悶防風去乂甘菊花擇白术人參細辛去苗葉白茯苓去黑皮甘草炙銼各一分右粗搗篩每服一錢水一盞入生薑少許同煎至五分去滓溫服不拘時量大小加減菊花散治小兒鼻塞多涕等病甘菊防風前胡各一兩細辛桂心各半兩甘草一分右為細末每半錢研入乳香少許煎荆芥湯調下乳後人參散治小兒肺塞鼻多清涕精神不爽少欲乳食人參去蘆頭前胡去蘆頭杏仁湯浸去皮尖雙仁麩炒微黃桂心甘草炙微赤銼以上各一分右搗為散每一錢水一小盞入生薑少許棗一枚煎至五分去滓不拘時量兒大小加減溫服甘菊花湯治小兒鼻濁涕是腦門為風冷所乘甘菊花擇甘草炙各一分防風去叉半兩山茱茰七枚右粗搗篩每服一錢水一盞煎至六分去滓分溫三服早晨日午晚後各一更量大小加減杏仁膏治小兒鼻塞多涕杏仁湯浸去皮尖雙仁炒半兩蜀椒去目并閉口者炒出汗附子炮裂去皮臍細辛去苗葉各一兩右除椒外銼如麻豆大以醋五合漬藥一宿明旦以豬脂半斤與藥相和入銚子內慢火同熬候附子黃成膏去滓取出貯瓷器內候冷取塗鼻中兼摩頂上日三五度細辛膏塗方治小兒風冷傷囟鼻塞不通多涕細辛末一兩麻油二合右以油煎細辛令微黑入蠟半兩候消令凝每日薄塗囟上日三易鼻疳瘡方涼膈飲子一名清肺飲子治􅉶鼻清肺桑白皮地骨皮黃芩生乾地黃各等分右㕮咀水煎去滓食後大小加減服石膽散治鼻乾病疳蟲上蝕於鼻赤癢及連唇生瘡赤爛石膽一兩頭髮燒灰細研莨菪子半兩生用地龍一分冼淨右為細末入麝香一錢同研勻每服一字貼於瘡上二黃散治小兒腦冷漿水溜下從口鼻出氣息甚惡久不瘥能害命大人同治仙方也硫黃好者黃丹炒香白芷右等分為末少許吹鼻內三五次即瘥治鼻疳右先用甘草白礬水洗淨後摻蘆薈黃連黃蘖末日三上治小兒鼻下兩道赤者名曰􅉶亦名赤鼻疳鼻右以米泔水洗傅黃連末日三度佳亦治月蝕瘡治小兒鼻下瘡用牛卷草燒之為屑傅之一方治腦疳鼻癢毛髮作穗肌肉羸瘦用鯽魚膽滴於鼻中連用三五日甚妙一方治疳瘡蟲蝕鼻中用熊膽水調化塗鼻中斂瘡方如先服前藥已多方用此傅為驗青黛末當歸赤小豆瓜蒂地榆黃連蘆薈等分右為末入雄黃末傅之化毒丸治鼻􅉶玄參一兩桔梗一兩赤茯苓一分人參一分牙硝一分青黛一分甘草一分麝香一字金銀箔一分右件除牙硝金銀箔麝香别研外次和青黛煉蜜丸如芡實大薄荷湯化下麝香散治鼻瘡疳侵蝕鼻柱麝香草烏頭燒灰右等分研細貼之普濟方卷三百六十四
