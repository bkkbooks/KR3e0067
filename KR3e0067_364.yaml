body:
  text: 普濟方卷三百六十四明周王朱橚撰嬰孩頭眼耳鼻門眼生翳膜附論夫眼是腑臟之精華肝之外候而肝氣通於眼也小兒臟腑積熱熏漬衝發於眼初覺熱痛熱氣藴積變生障翳熱氣輕者生白翳結聚小者如黍米大者如麻豆隨其輕重生翳重者乃至兩三層也若生翳而白障者是病重極遍覆黑睛滿眼悉白則失明也其障有輕者黑睛邉微有白膜來侵黑睛漸染散漫若不早治則滿眼併生白障又眼翳暈者五臟煩壅攻於肝也或者內傷於風熱赤澀痛或腦熱下流或斑瘡入眼侵黑睛者是也車前子湯治小兒肝熱眼生翳膜或生血輪腫脹車前子防風去叉甘菊花甘草炙銼人參菥蓂子青葙子各三分梔子仁黃連去鬚各半兩右粗搗篩每服一錢水一盞入淡竹葉七片煎至五分去滓溫服日三量兒大小加減決明丸治小兒肝臟壅熱眼生翳障決明子車前子菊花川芎宣連當歸大黃紫參各等分右為末煉蜜丸如小豆大三嵗三十丸燈心湯下食後一方煎桑枝湯麥門冬熟水亦可以意加減服之㽔仁丸治小兒熱盛翳膜侵睛兼赤眼疼痛并眼生赤翳𬎼仁湯浸去皮搗一兩半肝炙一具梔子仁黃芩去黑心黃連去鬚各半兩升麻決明子各三分細辛去苖葉一分右為末煉蜜丸如菉豆大每三丸至五丸溫水下早晨日晚各一服更隨兒大小加減一方無黃芩有羚羊角屑名兔肝丸龍腦飲治小兒肝受病目昏漸生翳膜散漫侵睛因此失明須內外治之龍膽鈎藤土瓜根茯神去木各半兩甘草炙桑根白皮炙防風去叉各一分右粗搗篩每一錢水一盞入棗半枚同煎至六分去滓分作二服量兒大小加減早晚服鎖肝散治小兒痰熱退翳膜一名鎮肝散胡黃連梔子仁各一兩甘草炙馬牙硝青葙子各半兩以上各為細末次入真珠牛黃並研各一分右都拌勻細研每服一錢水八分荆芥薄荷各少許煎四分去滓溫服食後旋覆花散出聖惠方治小兒從下生赤膜上漫黑睛旋覆花桑根白皮銼羚羊角屑赤芍藥玄參以上各一分甘草半分炙微赤銼黃連半分去鬚右搗為散每服一錢水一小盞入竹葉七片煎至五分去滓日三四溫服量兒大小加減真珠膏出聖惠方治小兒熱風眼生翳膜真珠末龍腦𬎼仁湯浸去皮膩粉朴硝青鹽硃砂以上各一分右研如粉酥和如膏每點如黍米大日三四度點之㽔仁煎點方出聖惠方治小兒眼生翳膜瞳人昏昧㽔仁一分湯浸去皮黃丹半分井鹽半分黃連末一兩龍腦半錢麝香一錢蜜五兩右除麝香龍腦蜜外先將㽔仁等都細研以水一大盞入蜜同煎令稀稠得所用新綿濾去滓入麝香龍腦末調勻入瓷器中盛每用銅筯點少許日兩度神效羌菊散出全嬰方治小兒肝臟壅熱眼生膜翳及治赤眼班瘡毒羌活防風山梔子各一分甘草菊花白蒺藜炒去刺各半兩右為末三嵗半錢蜜湯調下食後日三服大小以意加減通神散治小兒斑疹毒氣入眼雲翳失明石決明燒粉一分硼砂一錢粉霜一錢片腦一字硃砂半錢右研勻每用一字乳汁調隨左右耳灌之日三次黃芩湯出聖惠方治小兒五嵗以下肝臟熱毒目生丁翳黃芩去黑心升麻甘草炙銼各半兩萎𬎼玄參犀角鎊各一分右粗搗篩每一錢水七分煎四分去滓分溫二服量兒大小加減日三四服黃芩散出聖惠方治小兒眼生翳膜體熱心煩黃芩決明子防風去蘆頭川升麻大黃銼微炒甘草炙微赤銼以上各一分右搗為散每服一錢水一小盞入淡竹葉七片煎至四分去滓溫服日三四服量兒大小加減羖羊角散出聖惠方治小兒眼生白翳羖羊角屑川大黃銼微炒桑根白皮銼真珠末甘菊花以上各一分甘草半分炙微赤銼右羅為散每服溫水調下半錢日三四服量兒大小加減苦竹葉散出聖惠方治小兒眼生翳膜下垂苦竹葉半兩知母川升麻川大黃銼微炒甘草炙微赤銼梔子仁以上各一分右為細末三五嵗者每日於食後溫淡漿水調下半錢稍大以意加之龍腦膏出聖惠方治小兒眼赤生翳膜龍腦細研麝香細研膩粉𬎼仁湯浸去皮黃連去鬚以上各半分馬牙硝半兩右搗為散都研令勻加白蜜四兩同於瓷瓶中密封頭於炊飯甑內蒸飯熟為度每日三四度以銅筯取少許點之蟬青煮肝散治小兒疳氣斑疹雲昏翳膜一切病眼榖精草去土蟬殼去嘴足土定粉蛇蛻皮長二寸石決明各等分右為細末每服二錢豬肝二兩竹刀批開摻藥了捲麻扎定米泔煮熟分三五次熟鹽細嚼煮肝湯送下如瀉加定粉半兩決明子散治小兒眼赤或生翳膜或眼常合不開決明子車前子梔子仁防風去義黃連去鬚各一兩半右為散每服一字至半錢搗生豬肝投熱湯取汁調下早晨日晚各一服更量兒大小加減青葙子丸出聖惠方治小兒眼有翳膜遮睛青箱子蚺蛇膽熊膽馬牙硝各半兩龍腦半錢右搗為末煉蜜丸如菉豆大每服以溫水研化五丸日三四服量兒大小加減石決明散治小兒眼生翳膜石決明一分搗研令細龍腦半錢膩粉一錢黃丹一錢麝香半錢右同研極細每於臥時取少許點之還明丸出全嬰方治小兒疳眼白膜遮睛并雀目夜明沙井泉石榖精草蛤粉各等分右為末煎黃蠟丸如雞頭大三嵗一丸豬肝一片切開嵌藥在內麻扎定沙瓶內煮熟先熏眼後食之煮肝散治小兒疳眼翳膜沙澀黃連去鬚沙參玄精石決明子右等分搗羅為散每半錢用羊子肝一片箆子切作縫子摻末在內線繫入沙罐子內垂挂勿令到底以米泔煮熟食羊肝每一片分作兩服或三服量兒大小與食真珠膏醫方妙選治小兒眼久不瘥􅑩􅑩不見物真珠末甘菊花末香䜴炒研末井泉石各一分右研勻用白蜜一合鯉魚膽一枚同前藥慢火熬成膏次入好龍膽一錢拌勻每用少許時時點眼中治小兒眼生障翳及努肉宜點此方出聖惠方龍腦珊瑚真珠末石決明以上各等分右研如粉以白蜜一合相和更研令勻以瓷器盛不計時候相與點之即瘥治小兒眼生翳膜出經驗良方白菊花榖精草菉豆皮各等分右為細末用豬肝擂細為丸如菜子大每服三五十丸茶清送下或豬肝蘸藥喂之惡實散治小兒風翳散漫侵瞳人及風疳眼惡實木通銼蒺藜子炒去角各一兩右為散每服半錢以水搗羊子肝汁調早晨日晚各一服更量兒大小加減治小兒眼生黑翳覆瞳子方出聖惠方空青一分貝齒一枚白􅈨一錢右研令細取如黍米大點翳上日再點之治小兒出瘡疹眼內有雲翳方輕粉黃丹各等分右用竹筒吹在耳內左眼有翳吹右耳內右眼有翳吹左耳內即退至妙立消膏出活幼口議治小兒眼患初作粟翳浮翳或來或去漸發差大侵睛減明用雪白食鹽生者少許須以淨器以大燈心點鹽輕手指定浮翳就􅀈凡三五次點見效令子勿驚恐不痛疼亦不礙人多投之勿慮屢用尅效珊瑚散出聖惠方治七八嵗小兒眼有麩翳未堅不可妄傳藥以點用珊瑚細研如粉每日少少點之日三立愈治小兒目睛上白膜出直指方用白礬一分水四合熟銅器中煎取半合少許白蜜調之以綿濾過每日三度點一芥子大貝齒入龍腦方出聖惠方治小兒黑花眼翳澀痛用貝齒一兩燒作灰研如麵入少龍腦點之又去目翳貝子十枚燒灰細研取一胡豆大著眼上卧如炊石米久乃減息肉者加真珠與貝齒等一方單用貝齒研如粉點眼赤及翳治小兒眼生白膜方出聖惠方用雄雀糞以人乳汁熟研傅翳上當漸漸消除又方出聖惠方治小兒眼有障翳用馬腦半兩細研如粉每用時取如黍米大點在翳上又方出聖惠方用楸葉三兩嫩者爛搗以紙裹更將泥重包著猛大燒之候泥乾即取去泥入水少許絞取汁以銅器盛慢火漸漸熬之令如稀餳即貯於瓷合中每日一度點一菉豆許又方用書中白魚為末點少許翳上即愈又方用露蜂房一兩以水二盞煮五七沸去滓溫溫洗之即瘥洗肝散治眼生翳膜視物難明或尋常赤痛人參一錢荆芥穗半錢生地黃一錢酒浸當歸一錢甘草二錢赤芍藥一錢大黃半錢煨茯神一錢大澤草半錢右為末每服半錢清米泔調下蒲黃散治小兒肝熱上攻眼生翳膜蒲黃一分黃連白芨各半兩黃蘖去粗皮二錢赤小豆一兩右件同為細末每用一錢井花水調作膏子封貼𩕄上日一易之煮肝散治小兒肝眼翳膜羞明不見物服十日必退下如大人雀目只一服效夜明沙青蛤粉榖精草各一兩右件為末每服一錢五七嵗以上二錢豚豬肝一匙大批開糝藥在內攤勻麻纒定淘米泔水半碗煮肝熟取出肝湯傾碗內薰眼後溫湯分肝三服嚼喫並用肝湯下一日三服不拘時候大人雀目空心服至十服便見物如患多時日三服治㿀後小兒眼有翳膜煎竹葉湯同沙糖化下㵼青丸一兩丸漸至微利為效目偏視通睛附論夫目偏視者皆由心肝臟風邪所攻瞳人不正顧視常偏宜服羚羊角散牛黃散治之小兒通睛外障者此眼初患之時皆因失誤築打著頭面額角倒蹙撲下令小兒肝受驚風遂使眼目通睛宜服牛黃丸犀角飲子通頂石南散立效歌曰嬰兒兩目患睛通欲擬看西又著東振著腦中睛帶轉肝中受得內驚風牛黃犀角頻研灌細搗石南吹鼻中乳母牽連須忌口數朝方得舊時容方羚羊角散治眼風邪所攻瞳人不正顧視常偏宜服羚羊角屑一兩半犀角屑蜜蒙花各一兩龍腦研牛黃各一分研天竺黃研甘草炙微赤硃砂研各半兩防風人參沙參各去蘆赤芍藥甘菊花細辛酸棗仁微炒蔓荆子𬎼仁湯浸去赤皮玄參各一兩右為散入研了藥更研令勻每於食後以竹瀝湯調下二錢牛黃散治心肝臟風熱攻眼偏視宜服之牛黃一錢細研人參防風各去蘆犀角屑甘菊花天麻槐子芎藭車前子決明子蔓荆子黃耆銼各半兩硃砂一分細研龍腦一錢研甘草一分炙赤羚羊角屑半兩右為末入研了藥同研令勻每於食後以竹葉湯調下一錢臨卧再服牛黃丸牛黃白附子炮肉桂全蝎芎藭石膏各一分燒通赤白芷藿香各半兩硃砂二錢麝香一分右為末煉蜜丸芡實大三嵗以下每服一丸薄荷湯化下乳食後乳母忌酒麵豬肉犀角飲子犀角一兩射干草龍膽各半兩鈎藤三分黃芩五分人參二兩茯苓甘草各一分遠志右為末以水一盞散一錢煎至五分食後去滓溫服牛黃膏治嬰兒雙眼睛通者欲觀東邉則見西若振掉頭腦則睛方轉此肝受驚風冝服牛黃一錢犀角二錢金銀箔各五片甘草一分右為末煉蜜丸菉豆子大每服七丸用薄荷湯吞下食後服通頂石南散石南一兩藜蘆黃二分瓜蒂五七箇右為細末每用一錢粳米少許一日兩度通頂為妙眼瞼生贅附論夫小兒瞼中生贅外障此眼初患之時皆因脾胃壅熱上衝於眼瞼眥之中致令生肉初時即小如麻米後三五年間如豆大摩隱瞳人赤澀淚出切莫鈎割散去瘀血後乃尉烙即效宜服搜胃散補肝丸點曽青膏即瘥歌曰小兒眼瞼贅雖稀學療之流也要知初即小如麻米大日深漸長豆珠垂亦須割烙流瘀血斟量湯藥在臨時若逢髙貴嬌兒女點藥還須得妙竒方搜胃散大黃桔梗黑參防風車前子細辛芒硝黃芩各等分右為末以水一盞散一錢煎至五分食後去滓溫服補肝丸芎藭藁本五味子細辛各一兩羌活一兩半茺蔚子二兩知母右為末煉蜜丸如梧桐子大空心茶下十丸曾青膏曾青一兩龍腦少許乳香頭牙硝琥珀真珠各一分右研如麵入酥和為膏每至夜後點眼青肓外障附論夫眼無障翳而不見物者謂之青肓此由小兒臟內有停飲而無熱但有飲水停積肝也目是五臟之精華肝之外候也肝氣通於目肝為停飲所積臟氣不宣通精華不明審故不赤痛亦無翳而不見物名曰青肓也小兒青肓外障此眼初患之時於母胎中忽受驚邪之氣令生後五七嵗以來便乃患眼其初患之時夜卧多驚嘔吐痰涎黃汁漸漸失明還從一眼先患後乃相牽俱損致使然也初覺便宜將息急療服牛黃丸犀角飲子立效歌曰胎中受得風邪氣五臟相連各有名天弔只因心領得目肓肝細是前成痰涎嘔吐黃汁甚神彩時時忘與驚兩眼若能救見物服藥良醫始見能方牛黃丸牛黃牛膽鈎藤各半兩羚羊角藿香人參麝香各一兩虎睛少許右為末煉蜜丸如梧桐子大空心薄荷湯下三丸七嵗以上五丸犀角飲子出龍木論犀角防風芍藥黃芩各一兩羚羊角知母人參半兩右為末以水一盞散一錢煎至五分食後去滓溫服羊子肝散出聖惠方治小兒青肓不見物𬎼仁一分湯浸去皮防風一分去蘆頭香䜴一分炒黃井泉石半兩細研右搗為散用羊子肝一片并藥同煮肝令爛四五嵗兒分作二服新汲水下甚者不過三四服隨兒大小加減菊花散治小兒青盲外障及雀目甘菊花一分牯牛膽一枚隂乾寒水石一分雌雞肝一枚隂乾右搗為散取豬肝血調下半錢不過三五服驗兼退翳治小兒青盲􅑩􅑩不見物方出聖惠方真珠半兩研如粉白蜜一合鯉魚膽一枚右相和煎一兩沸候冷點眼中當淚出藥歇即效治小兒青盲不見物方出聖惠方鼠膽鯉魚膽各二枚取汁右相和點眼用之即效治小兒青盲腦痛方出聖惠方鯉魚腦鯉魚膽各等分右為相和令勻點眥中日三四度神效又方出聖惠方用豬膽一枚微火上煎之良久候冷點如黍米大效疳眼外障附論夫小兒疳眼外障此眼初患之時皆因腦熱頭上有瘡或因雀目多時瀉痢潛衝疼痛淚出難開膈間熱氣肝風入眼初患時時癢澀撏眉咬甲揉鼻致令翳生赤腫疼痛淚出難開間更白膜遮瞞怕日合靣而卧不喜擡頭此疾不宜燒灸頭靣恐損眼也尤忌點眼即宜服煞疳散退翳丸立效歌曰小兒疳眼有自來腦熱肝風變禍災或因瀉痢潛衝上雀目多時亦是媒初患之時饒癢澀病深生翳腫難開手撏頭髮兼揉鼻怕見光明頭不擡拙計便將頭靣灸相遭疼痛實堪哀庸醫不解輕輕點疼看瘡痕痛不才欲得痊瘥求合道服藥如風捲霧開方生乾地黃湯治小兒疳蝕眼患閉合不開羞明怕日及至開眼有如內障朦朦失所宜服生乾地黃熟乾地黃各一兩酒洗麥門冬去心半兩川當歸一分枳殼米泔浸一宿麩炒稱一分杏仁湯泡去皮尖麩炒令赤防風甘草炙赤芍藥各一分右㕮咀每一大錢水一小盞黑豆七粒煎黑豆熟去滓通口服一方無黑豆退翳丸出龍木論黑參防風人參茯苓細辛桔梗車前子黃芩石決明各一兩半右為末煉蜜丸如梧桐子大空心茶下十丸煞疳散出龍木論防風龍腦牡蠣各二兩白芷五味子細辛各一分右為細末每日食前米飲調下一錢如聖散方出王氏博濟方治小兒因瀉痢日久眼生翳膜并疳眼退翳蛇蛻兩條用紙燭燒灰研穀精草一兩蟬蛻去土一分附子去皮臍生二錢石決明刷淨一分胡粉研四錢右為散每服一字半羊子肝一片批破摻末用麻皮線纒米泔煮熟先熏眼後與食量大小加減如未能食研灌之井泉石散出醫方妙選治眼疳邪熱攻於眼目漸生障翳致損睛瞳井泉石一兩石決明半兩甘菊花半兩夜明沙半兩微炒黃連半兩去鬚晚蠶沙半兩微炒右為細末每服一錢用米泔一盞入生豬肝少許煎五分肝爛為度放溫時時服乳食後二草散治小兒疳眼睛疼及赤眼腫痛甘草龍膽草當歸細辛各一分右為末三嵗一錢水半盞沙糖少許煎三分去滓食後服三黃丸亦治疳熱眼若因瀉痢後疳昏澀大便不實者六神丸六甲丸并暖疳藥亦可服之撥雲膏治小兒風熱疳氣攻眼赤痛障翳桃仁杏仁各四枚並去皮尖雙仁𬎼仁郁李仁各五枚去皮右同生研細濾入蜜龍腦麝香膩粉各少許冉研極勻點之雞肝散治小兒疳見明不得不赤不腫不痛但開眼不得者此藥能治之川烏頭大者一枚生去皮好坯子二字右為末五嵗一錢雄雞肝一具洗淨去筋膜竹刀子薄切開摻藥在內箸葉裏麻皮扎定用第二次米泔半盞磁器中煮熟放冷切作片子空心臨卧嚼喫將煮肝湯送下又有腦熱閉目者鼻內乾燥通頂散可服神光湯治小兒腦熱疳熱閉目不開并腦疼以川大黃一分粗末水半盞浸一宿一嵗分作兩服餘滓塗頂上乾易之通頂散亦治瘡入眼外障附論夫小兒班瘡入眼外障此眼初患之時不論大小須患班瘡一度瘡子患時覺入眼中即須將息慎忌若不忌口將息即便疼痛赤而澀怕日難開腫硬翳如銀色此為熱氣在肝上衝於眼肝膈壅毒致成障翳宜用秦皮湯洗之然後服涼肝丸亦不宜鎌冼出血點藥挑撥恐損眼候疼痛定後即點退赤藥歌曰夫為人子既生身須患斑瘡不可論熱氣透肝衝上眼難開皮腫且羞明疼時淚出翳如銀不要強將兩手親却恐呌啼傷破後須知此語是殷勤秦皮煎水須頻洗眼藥應教微點勻謹省若能依得此遺君終老是全人方涼肝丸防風一兩黃芩茺蔚子黑參大黃知母各一兩人參茯苓各一兩半右為末煉蜜丸如梧桐子大空心茶下十丸秦皮湯秦皮二兩秦芁細辛防風各一兩甘草半兩右為末以水一盞散一錢煎三五服熱淋洗眼立效鱔血方治小兒豆瘡入眼生翳用鱔魚繫其尾而垂之從頂下割破些少取生血點得白鱔尤佳若翳已凝即用南硼沙以燈心蘸點仍用威靈仙仙靈脾等物為末每一錢第二次米泔調服消翳丸治小兒斑瘡眼生障翳硃砂指甲末不拘男子婦人先入水內淨洗指甲拭乾用木賊草打取細末右件等分再同研令極細以露水搜和丸如芥子每用一粒於夜卧時以新筆蘸水點在眼內夜半更點一粒緣目生瘡附論夫小兒緣目生瘡者由風邪客於瞼眥之間與血氣相摶挾熱則生瘡浸漬緣目赤而有汁時瘥時發世云小兒初生之時浴而不淨使露穢浸漬瞼眥後遇風邪發則目赤爛生瘡難瘥瘥後還發成疹也方犀角散治小兒赤眼疼痛緣目生瘡難開澀痛及有熱淚犀牛屑羚羊角屑防風去蘆頭玄參黃芩黃耆銼以上各一分柴胡半兩去苗川大黃半兩銼微炒馬牙硝半兩右搗為散每服一錢水一小盞煎至五分去滓溫服日三四服量兒大小增減黃連散治小兒肝熱衝眼緣目生瘡黃連半兩去鬚赤芍藥𬎼仁湯浸去皮木通銼決明子梔子仁黃芩甘草炙微赤銼以上各一分右搗為散每服一錢水一小盞入竹葉七片煎至五分去滓溫服日三四服量兒大小加減細辛丸治小兒緣目生赤瘡及生翳細辛黃連去鬚蘆薈桑根白皮銼甜葶􅏣隔紙炒令紫色以上各一分𬎼仁半兩湯浸去皮龍腦半錢細研右羅為末煉蜜丸如菉豆大每服以溫水下七丸日三服三嵗已上即服五丸白礬煎治小兒緣目及眥爛作瘡腫痛白礬一分燒為灰黃連半兩去鬚青錢十文防風三分去蘆頭朴硝三分地黃汁一合白蜜三令右搗為散用綿裹內一青竹筒中入地黃汁及蜜以絹油單蓋緊繫筒口於炊飯內蒸之候飯熟即瀉出以綿濾過日三四度取少許塗之黃連丸治小兒緣目及眥爛作瘡黃連半兩去鬚川大黃銼微炒細辛龍膽去蘆頭防風去蘆頭玄參以上各一分右羅為末煉蜜丸如菉豆大每服以熟水下五丸日三量兒大小加減龍腦煎治小兒風熱致緣目生瘡赤痛龍腦半錢川芒硝一分膩粉半分蜜三兩黃丹一分右同入筒內以重湯煮一日用綿濾過於瓷瓶內盛每日三四度點之黃連煎治小兒眼赤痛及緣目生瘡黃連半兩去鬚童子蛔蟲五條吐出者龍腦半錢細研蜜二兩右除龍腦外入在瓷瓶中於炊飯中蒸候飯熟為度以綿濾去滓取汁入龍腦令勻日三四度點之梨汁煎治小兒熱毒衝眼緣目生瘡熱疼不止大鵝梨一枚去皮核黃連末二錢龍腦一錢右先將梨爛研絞出汁綿裹黃連末於梨汁內浸半日入龍腦令勻日三五度點之豬膽煎治小兒緣目生瘡腫痛豬膽一枚龍腦一錢馬牙硝半錢右研令勻內豬膽中牢繫懸於旺方隂乾取出內瓷合中每以麻子許水化日三四上點之又方黃連半兩去鬚杏仁一分湯浸去皮尖細研膩粉半錢右以綿褁冷水一小盞浸一宿後每日三五上點之又方黃蘖黃連去鬚梔子仁各半兩右細銼以水一大碗青汁一分煎十餘沸綿濾過溫溫洗之日三兩度用之治小兒緣目眥爛作瘡方青錢二十文青鹽一兩右相和先以濕紙數重包又用泥褁候乾於猛火中燒令赤放冷剝去泥紙搗羅為散每取一菉豆許以津調塗瘡上車前子丸治小兒肝臟壅熱眼生瘡翳車前子甘菊花芎藭黃連去鬚當歸切焙各一分大黃􅊜紙裹煨黃芩去黑心各半分右為末煉蜜丸如菉豆大每服五七丸量兒大小加減煎桑枝湯下耳疾總論夫耳者宗脈之所聚腎氣之所通小兒腎臟盛而有熱氣上衝於耳津液壅結則生膿汁亦有因沐浴水入耳內水濕停積摶於血氣藴結成熱亦令耳膿汁出皆謂之聤耳久不瘥則變成聾也聤耳者常有黃膿出是也膿耳者常有紅膿出是也伍耳者裏靣疳息是也纒耳者常有白膿出是也囊耳者裏靣虛明時有青膿出是也雖有五般其病源一也皆由風水入耳而內有積熱上壅而成此患若不速治久則成聾聤耳者小兒胎氣不充實關竅不通利蓋有稟賦不足胞養有虧臟傷腎經腎為根本水之一數也外應耳孔或云水入耳或曰乳食入耳要之皆非兒生氣脈根壯臟腑固實雖水及乳入耳必不作此自是氣不充脈不實使之然也兒無補腎之方但得清心肺而已初生之兒而有作尤甚重也卒難療理用藥傅摻少愈愈而復發至於過周與服黃耆白茯苓人參白芍藥川當歸熟地黃甘草等分作湯劑以固其內內若固實不必摻傳亦自瘥愈摻方用壁上蜘蛛一枚瓦上火乾坯子白礬腦子麝香各少許同研令勻雞羽引入自愈耳聾附論夫小兒耳聾者是風入頭腦所為手太陽之經入於耳內頭腦有風邪隨氣入其脈盛與氣相薄風邪停積則令耳聾也方通鳴散治小兒耳聾病菖蒲一寸九節者遠志去心各一兩柴胡去苗麥門冬去心防風去蘆頭半兩細辛一錢甜葶􅏣一錢磁石搗為末水淘去赤汁研杏仁十四箇浸去皮尖右為細末研勻每服半錢蔥白湯調下日二服大小加減食後細辛膏治小兒耳聾或因腦熱或因水入或因吹著細辛防風川大黃銼微炒黃芩以上各一分川椒十粒去目蠟半兩右為銼用清麻油二合煎紫色濾過下蠟候消為膏每日三度用一大豆大點於耳中治小兒風熱兩耳聾鳴方遠志去心菖蒲柴胡去苖甘草炙微赤銼以上各半兩磁石三分搗碎水淘去赤汁麥門冬半兩去心焙右羅為散每服以蔥白湯調下半錢日二服量兒大小加減治小兒耳聾不瘥方生地黃一寸半杏仁七枚湯浸去皮巴豆七枚去皮鹽半錢右同搗堪為丸即丸如𬎼核大用髮薄裹內耳中日一易之若耳內痛有水出即去藥未效再用之又方杏仁湯浸去皮甜葶􅏣一分鹽各等分右研如膏以少許豬脂和合煎令稠以綿裹如㽔核大塞耳中日一易之又方箆麻子一枚去皮棗肉七枚右搗如膏每取㽔核大綿裹內於耳中日一易之又方取蔥白於煻灰中煨令熟以蔥白頭內耳中三易之又方搗芥子令爛以人乳和綿裹少許塞耳中日易之又方菖蒲末松脂烏油麻各半兩右相和搗熟綿裹如豇豆大塞入耳中日一易之又方菖蒲末一分杏仁半兩湯浸去皮尖雙仁研如泥右相和以人乳調每用少許綿裹內於耳中日易之治小兒耳聾立效方取自死白頸地龍內蔥葉中麵裹蒸令熟以汁瀝著耳中不過三度瘥聤耳附論夫耳者宗脈之所聚腎氣之所通小兒腎臟盛而有熱氣上衝於耳津液壅結則生膿汁亦有因沐浴水入耳內水濕停積摶於血氣藴結成熱亦令膿汁出皆謂之聤耳久不瘥則變成聾也方紅藍花散治小兒聤耳病不瘥紅藍花洗黃柏各一兩烏魚骨黃芩各半兩雄黃研細半兩麝香一分研右研細以綿纒揾藥塞耳中日再換黃連散治小兒聤耳久不瘥黃連去鬚白斂赤石脂龍骨烏賊魚骨以上各半兩右羅為散綿裹如棗核大塞耳中濕即更易之明礬散治腎經有熱上衝於耳遂使津液壅滯為稠膿為清汁耳內痛亦有沐浴水入耳中濕氣停滯為膿但不疼二證久不瘥變成聾明礬煆龍骨研各三錢黃丹煆二錢胭脂一錢麝香少許並為末右先以綿杖取去水次以鵝毛管吹藥於耳本方加海螵蛸末亦好龍黃散治小兒聤耳汁出不止一名白礬散白礬灰龍骨末黃丹各半兩炒麝香一分研右同研令細先以綿杖子展却耳中膿水用散一字半分為兩處摻在耳內日二用之勿令風入一方竹蚛末一分花胭脂膏治小兒聤耳常出膿水不止花胭脂白龍骨白礬灰白石脂各半兩右研如粉用棗瓤和丸如棗大以綿裹一丸內耳中日三換之竹蚛散治小兒聤耳出濃汁疼痛不可忍者竹蚛糞一兩白礬熬令枯半兩雄黃二錢麝香一字右同研勻細先用棉裹杖子拭乾耳中次以藥少許摻之赤石脂散治小兒聤耳膿血塞耳赤石脂白礬熬令汁枯黃連去鬚烏賊魚骨去甲各一分右為散每用少許綿裹塞耳中大人可用一錢一方無赤石脂有龍骨白礬灰散治小兒聤耳有膿血疼痛不止白礬灰黃蘖烏賊魚骨龍骨以上各半兩右搗為散以綿裹桞枝展去膿血盡乾摻藥末於耳內日二三用之礬脂散治聤耳膿水不絶白礬熬令汁枯松脂木香花胭脂各一分右為散每用綿拭膿後滿耳填藥金箔散治小兒聤耳常出膿水不止白礬灰花胭脂各半兩金箔七片右同研令勻細末日三四度摻少許入耳中治小兒聤耳汁出方黃連二分去鬚龍骨三分烏賊魚骨半兩右羅為散每服少許以綿裹內耳中日三四度易之雄黃散治小兒聤耳汁出沾外邉生惡瘡瘜肉雄黃半兩細研黃芩末一分曾青一分細研右研令勻以綿裹豇豆大塞耳中日再換之更以少許摻外瘡上黃礬散治小兒聤耳出膿水黃礬半兩烏賊魚骨一分黃連一分去鬚右羅為末綿裹如棗核大塞耳中日三易之蜜陀僧散治小兒聤耳蜜陀僧白礬灰夜明沙微炒各一分右研細末令用少許乾摻日三上用之紅白散治小兒耳聾膿出久不瘥者兼聤耳膿耳一名通雲散一名麝香散一名紅玉散白礬熬令汁枯染胭脂各一錢麝香一字右為細末先以綿杖子纒去膿極乾用藥半錢摻之不過三兩次又以鵝毛管吹藥入耳如聖散治小兒水入耳內膿出疼痛日夜不止箭簳內蚛末如有同子蟲研令細用三錢膩粉麝香各一錢研右為細末先以綿杖子拭乾耳取藥三剜子深摻入耳以綿塞定如覺刺劄即是惡物要出去綿側耳令出甚者三度瘥大人亦可用狼牙散治聤耳有膿水狼牙白斂竹蛀屑各一分右搗研細每用少許摻耳內雄黃散治小兒聤耳有瘡及耳中惡肉并通耳白麻秸取皮一合花胭脂十顆右細研傅耳中令滿一兩度瘥止此方中無雄黃未詳其名亦可用少許為佳治小兒聤耳久不瘥桂心一分青羊糞一分炒令轉色右研為散取一字以綿裹塞耳中瘥夜明沙散治小兒聤耳夜明沙二錢麝香一字右同研極細先以綿杖子拭去膿用藥半錢摻入耳中治小兒聤耳方右以硫黃末粉耳中日一夜一即瘥治小兒聤耳方用桃仁熟末以綿裹塞耳治小兒通耳方取蟲食荆子中白粉和油滴耳中日再治小兒聤耳方用青羊糞暴乾以綿裹塞耳中瘥又方用生薑汁滴耳中神驗又方以桑樹上毒蜂炙黃搗羅為散空腹以溫酒調下半錢大人服二服又方以陳橘皮燒為灰細研取少許綿裹塞耳中又方取鮝魚枕骨燒灰細研如粉每用一字內在耳中日二上用之又方研韭汁點之日二三度用之又方取狼牙搗為末以輕迹生絹裹塞耳中又方用杏仁爛研為膏以亂髮裹塞耳日三易之又方取釡下墨綿裹塞耳中瘥治小兒患瞶耳出膿水成瘡汚方以蚯蚓屎研末傅之兼吹入耳中效螵蛸散治大人小兒聤耳大妙用桑螵蛸須桑上者微炙末之用一味入麝香少許同研先用物拭膿淨然後摻藥一方用葦管挑藥吹入耳內三五次即住膿水竹蠧散治小兒聤耳瘡膿苦竹蛀末二錢白礬二錢枯乾胭脂半錢麝香一字右為細末先以綿珠兒搌之不盡不妨然後以鵝毛管子輕輕吹一字入耳中甚妙麝香散治小兒聤耳蜘蛛一箇坯子半錢真麝香五十文右同研乾為末每用一鑷頭以鵝毛管吹入耳即乾又方治大人小兒聤耳大妙用五倍子三錢入麝香少許碾細末如前吹耳內如用紙撚蘸藥入耳亦可治小兒聤耳以胭脂滴耳中耳瘡附論夫小兒耳瘡者瘡生於兩耳時瘥時發亦有膿汁如此是風濕摶於血氣所生世亦呼之為月蝕瘡也方香礬散治小兒耳瘡白礬一兩燒灰蛇床子一錢麝香一錢研右為末拌勻每用一字糝瘡上白斂散治小兒凍耳成瘡或癢或痛黃柏白斂各半兩右為末先以湯洗瘡後用生油調塗椒䜴散豆䜴三兩炒黑焦生椒三兩去目右為末以津調看多少傅之立效白礬散治小兒耳瘡及頭瘡口邉肥瘡蝸瘡白礬一兩燒灰蛇床子一兩右同研為散乾糝於瘡上立效治小兒耳內生瘡汁出方白礬灰一錢麝香一字右同研令細少少摻於耳內治小兒耳瘡燒馬骨灰傅之又方燒雞屎白筒中吹之一方雞糞白炒黃為末傅之又方用大蒜研令爛塗之治小兒因築磕損耳耳內有瘡汁出不止方右取胡桃搗肉取油用滴耳內即止又方取肉杌上垢傅之良鐡液酒治小兒十嵗以上耳聾并膿耳及耳後生疳瘡以鐡燒令赤投酒中服之以真磁石塞耳內大人亦治又雄黃硫黃為末綿裹塞耳內又舶上硫黃為末內耳中治膿耳先綿托淨用即瘥又治耳後月蝕瘡并疳瘡胡粉炒用麻油調塗於瘡上百蟲入耳方桃心塞耳方治小兒蟲入耳桃心葉二七葉焙胡麻子一升炒右先以桃葉塞耳中其蟲必出如不出以胡麻子炒令香用葛袋盛枕頭耳中蟲即出治小兒飛蟲入耳不