body:
  text: 普濟方卷五十明周王朱橚撰頭門鬚髮黃白論足少隂血氣盛則髮潤澤而黑足太陽血氣盛則鬚潤澤而黑二經血氣虗乏則鬚髮變為黃白然則還其潤澤復其紺黑雖有傅染之法不如益血補氣之為妙也方駐顔苣蕂丸出聖惠方治白鬚髮令黑補益面顔苣蕂二斤杏仁四兩湯浸去皮尖雙仁者麵炒微黃陳橘皮一兩湯浸去白瓤焙細辛一兩附子一兩炮裂去皮臍旋復花一兩覆盆子二兩青葙子二兩秦椒二兩去目及閉口者微炒去汗熟乾地黃四兩白芷一兩續斷一兩秦皮一兩桂心二兩生地黃五斤綿絞取汁用大熟去一半右為末入地黃汁中以沙糖相和搗五七百杵丸如梧桐子大每日空心服以橘皮湯下三十丸晚食前再服忌生蔥蘿蔔大蒜等治掠白反黑出德生堂白檀白芷三奈子各二錢白芨一兩甘松一錢半廣茯苓二錢半回回青百藥煎針砂炒各五分滑石二錢梨兒鐡一塊瓶盛漿水浸藥右為末每服三錢漿水一盞於錫器瓶中頗冷澄清掠之旋飾巫雲膏出醫方大成治髮鬢黃白不黑膽礬五倍子百藥煎訶子青胡桃皮木瓜皮何首烏細辛醋石榴皮豬牙皂角右等分為極細末煉蜜為丸如小錢大常於木灰內培養勿得離灰如要烏髭時用好熱醋磨化開撚髭如烏鬢時用熱好醋磨以掠頭鬢上地骨皮丸出聖惠方變髭髮益氣血令終身不白但黑潤而已黃白者經六十日變黑白者服百日如漆堅齒益筋力四時常服地骨皮三兩生乾地黃五兩牛膝去苗三兩覆盆子三兩黃耆三兩銼五倍子三兩桃仁四兩去皮尖雙仁别研如膏絲子四兩酒浸三日曝乾别杵為末蒺藜子四兩微炒去刺右為末下桃仁攪使相入錬蜜和更搗三千杵丸如梧桐子大每日空心以溫酒下四十丸粥飲下漿水下亦得服藥十日即急拔去白者二十日即黑者生神妙不可言終身不得食蒜牛肉生蔥蘿蔔等摩頂黑髮方出聖惠方治髮黃浸油白芷附子去皮臍生用連翹防風去蘆頭卷柏零陵香蔓荆子蓮子草躑躅花川芒硝已上各一兩右細銼用綿裹以生油二斤浸經三日略煎取藥力放冷每用塗頂揩令入肉治血腦虛髮白早宜服馬齒莧還黑效方出聖惠方馬齒莧子一升白茯苓二兩熟乾地黃四兩澤㵼二兩眷柏二兩人參五兩去蘆頭松脂四兩煉成者桂心一兩右為散每日空心以溫酒調下二錢漸加至三錢晚食前再服一月效忌生蔥蘿蔔大蒜等柏子仁丸出聖惠方治髭髮早白壯血脈令復黑柏子仁一兩醋石榴皮二兩秦椒三兩去目及閉口者微炒去汗何首烏二兩馬齒莧二兩蓮子草二兩白芷二兩旋復花二兩右為末煉蜜和丸如梧桐子大每日空心以熱水下三十丸晚食前再服忌大蒜生蔥等地黃丸出聖惠方變白令黑補益熟乾地黃一斤牛膝一斤去苖枳殼五兩麩炒微黃去瓤茯神三兩絲子五兩酒浸三日曝乾别搗為末車前子五兩地骨皮三兩訶梨勒皮二兩右别取生地黃肥者搗絞取汁五升浸牛膝及地黃曝乾如前又浸曝乾以地黃汁盡為度旋令乾搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服以溫酒下三十丸再服忌血食并生蔥蘿蔔大蒜等川椒丸出聖惠方治血腦虗髮白宜服補益令黑川椒五兩去目閉口者微黃去汗苣蕂一升瓦松半斤茜根二斤銼熟乾地黃三斤覆盆子一斤牛膝一斤去苖兔絲子五兩酒浸三日曝乾搗别為末右為末煉蜜和搗五七百杵丸如梧桐子大每服以溫酒下四十丸食前服忌生蔥蘿蔔蒜等神不安方治年少髮白及心氣虗神不安地骨皮一兩桂心三分熟乾地黃二兩白芷三分旋覆花三分訶梨勒皮三分秦椒三分去目及閉口者微炒去汗杏仁一兩湯浸去皮尖雙仁研如膏右為末煉蜜和丸如梧桐子大每日空心以溫酒下四十丸忌生蔥蘿蔔大蒜等膽礬丸出宣明論治男子年少髭鬢髮斑白土馬鬃墻蠶兒半夏川五倍子各一兩生薑二兩胡桃十個真膽礬半兩右為末和作一塊絹袋子盛如彈大熱酒水各少許浸下藥汁淋洗頭髮一月神效變白髮神效揩齒藥方出聖惠方酸石榴一枚以泥裹燒令通赤候冷去泥用槐枝茄子根加槐枝同燒令煙絶急以物蓋之候冷取用馬齒莧蘭香菜并根薄荷石膏五倍子燒蒸川升麻已上各一兩右為散用揩齒不惟變白為黑兼更牢固牙齦地仙丹出聖惠方令髮黑延年久服可貌如童子齒落重生行如奔馬夜視有光久服為地仙逺志一斤去心白茯苓一斤熟乾地黃一斤地骨皮一斤麥門冬一斤半去心焙苣蕂一斤蒸曝乾去皮右為末以棗肉和木杵臼搗千餘杵丸如梧桐子大每日空腹以溫酒下四十丸晚食前再忌生蔥大蒜蘿蔔等五神還童丹出瑞竹堂歌曰堪嗟髭髮白如霜要黑元來有異方不用擦牙并染髮都緣五味配隂陽赤石脂與川椒炒辰砂一味最為良茯神能養心中血乳香分內要相當棗肉為丸桐子大空心溫酒十五雙七服之後君休摘管教華髮黑油光兼能明目并延壽老翁變作少年郎赤石脂川椒炒辰砂茯神乳香已上各一兩右為末棗肉和丸如梧桐子大每服三十丸空心溫酒下兔絲子丸一名牛膝丸治髭髮黃白可變令黑及治鬚髮秃落不生出聖惠方兔絲子酒浸三日别搗地骨皮各三兩枳殼去瓤麩炒八兩生牛膝搗絞取汁半升生地黃搗絞取汁半升右將前三味搗羅為末以牛膝地黃汁和作餅子曝乾再搗羅煉蜜丸如梧桐子大每服十五丸早食後溫酒下夜中熟米飲下一方生搗為末煉蜜和丸每日空心生薑湯下三十丸漸加至五十丸久服忌生蔥蘿蔔大蒜人參丸出聖濟總録治髭髮白能變令黑人參五兩熟乾地黃焙天門冬去心焙白茯苓去黑皮各十兩右為末煉蜜丸如梧桐子大每服十丸食後溫酒下胡麻丸出聖濟總録治髭髮白可變令黑胡麻仁炒杏仁去皮尖入炒研各二兩桂去粗皮一兩黑豆黃二兩生地黃搗絞取汁一升右先將地黃汁入鍋煎三兩沸次入杏仁膏餘藥並搗羅為末投同煎令稠丸如梧桐子大每服十丸早食後溫酒下臨卧再服之甜瓜子散出聖惠方治血虗腦髓空竭諸藏虗乏血氣不足少如蒜髮及憂愁早白逺視昏昏得風淚出手足煩熱恍惚忘悟逺年不利服之一月大驗甜瓜子一升微炒白芷一兩當歸二兩銼微炒芎藭二兩甘草二兩炙微赤銼右為散每於食後以酒或溫水調下二錢服之一方有松子去皮令白髮還黑方一名秦椒散出千金方旋復花秦椒隴西白芷各一升桂心一尺右治下篩以井花水服方寸七日三服三十日白髮還黑禁房室若不信將此藥拌飯喂貓兒一月白處變黑此乃神效一方或溫酒茶調亦得乾漆丸出聖濟總録治髭髮白可以變黑乾漆炒令煙盡柏子仁微炒生乾地黃焙熟乾地黃焙各一兩右為末研糯米飲和搗三五百杵塗酥丸如梧桐子大每服三十丸空心溫酒下治髭髮早白令變為黑方硫黃一兩細研酸石榴皮一兩天竹黃半兩細研磁石二兩燒醋淬七遍研飛過右先以和了麵少許裹硫黃內於石榴皮中又用麵都裹石榴皮於瓷碗中盛飯甑內蒸兩遍取出晒乾搗羅為末次入天竹等磁石等末相和更研令勻煉蜜和丸如菉豆大每日早晨以杏仁湯下二十丸其藥服六七日已來覺頭癢便是效也白者落黑者再生神妙駐顔益心神方出聖惠方染鬢髮變白為黑熟乾地黃半斤牛膝四兩去苗杏仁半斤湯浸去皮尖雙仁微炒研如膏兔絲子三兩湯浸三日曝乾搗末右為末都研令勻以煉蜜和搗三五百杵丸如梧桐子大每服以溫酒下四十丸食前服忌生蒜蔥蘿蔔秦椒丸出聖惠方治髭髮黃悴秦椒去目及閉口炒出汗生乾地黃焙旋復花白芷各一兩右為末煉蜜和丸如梧桐子大每服三十九米泔水下不拘時蜀椒丸出聖濟總録治髭髮白可還黑也蜀椒去目并閉口者杏仁去皮尖雙人各八兩熟乾地黃一升右先銼地黃入淨磁器中以酒一升浸一宿取出與杏仁同為膏次用炭火燒地令赤以釅醋潑乘熱將椒置上以盆覆之四向泥塗令勿透風候冷取出搗羅為末合和前膏入糯米飯一升同搗三百杵丸如梧桐子大每服三十丸空心溫酒下地黃丸出聖惠方治人年四十髭髮俱白還黑生地黃肥者銼五斤五加皮銼牛膝溫酒浸焙各五兩右先將地黃入淨瓶中以酒五升浸一宿取出曝乾入甑九蒸九曝後同後二味搗羅為末煉蜜丸如梧桐子大每服二十丸空心溫酒下一方搗細羅為散每日以空心溫酒下二錢若於羮粥中喫亦得此藥能化白令黑補益筋力忌生蔥蘿蔔大蒜等三倍丸出聖惠方補益明目壯氣延年令人好顔色變鬚髮令黑其功不可盡述川椒取紅者一斤牛膝三斤去苗生地黃三十斤淨洗搗絞取汁右為末用生地黃拌之令溫燃乾即更拌以地黃汁盡為度燃乾搗羅為末和於木杵臼搗千餘杵丸如梧桐子大每日空心及晚食前以溫酒下四十丸忌生蔥蘿蔔大蒜等變白髮令黑填骨髓去萬病方出聖惠方熟乾地黃四斤杏仁一斤湯浸去皮尖雙仁研如膏訶梨勒皮半斤右為末入杏仁同研令勻以煉蜜和搗三二百杵丸如梧桐子大每服以溫酒下三十丸食前服漸加至四十丸為度於磁器內密貯之變白功效不可具述切不得令孝子女人見忌生蔥蘿蔔大蒜等變白不老出本草多收桑椹曝乾搗末蜜和為丸每日服六十丸治婦人蒜髮用乾柿子五箇濃煎芽香湯煮令枸杞子搗為末合和爛研如梧桐子大每日空心服及卧時煎芽香湯下五十丸治髮鬢黃赤令黑方出千金方用羊糞燒灰以臘月豬脂相和塗之日三夜一取黑即止又方出聖惠方用黑豆三升以水七升煮黑豆令極爛去豆再煎令稠常用塗髮良治髮黃出海上方用臘月豬脂和羊屎灰蒲灰等分封頭三日一易之一醉烏治頭鬚白再黑方生地黃汁一斤訶梨勒十箇磨兩頭酸石榴三個大者取汁緑礬半兩研碙砂研硫黃研各半兩右藥同入磁瓶中內用二味汁浸密封勿令透氣至四十九日後取出其訶子狀若黑梅至夜臨卧含一枚咽津到曉爛嚼以酒一盞下之三二日後再服忌蔥大蒜蘿蔔近效換白髮及髭方熊脂二大兩臘月者佳白馬鬐脂一兩細切熬之以綿濾絞汁婆羅勒十個其狀似芙蓉子去皮取汁俱以指甲稻之即有汁生薑一兩一塊者煮之母丁香半兩右為末其脂煉濾之以藥末相和勻令取一小槐枝左攪數千遍少頃即凝或似膏即投白髮以辰日良槐枝點藥拔一條即以藥令入髮根孔中以指頭熱揩之令藥入十餘日更黑髮生槐枝散出聖濟總録治鬚黃白揩牙方槐枝如筯大者青鹽胡麻子仁炒黑色生乾地黃各一兩皂莢不蚛者去皮子二挺右銼碎入磁瓶中用瓦片蓋紙筋泥固濟仍蓋上留一穴如錢眼大候乾以文武火燒煙盡放冷為末每旦揩牙畢餘藥塗鬚上少頃洗之治髭鬢黃赤一染即黑出醫方大成生薑半斤生地黃一斤各淨洗研自然汁留滓右用不蛀皂角十莖去黑皮并筋將前藥汁蘸皂角慢火炙黃以藥汁盡為度前藥滓同入罐內用火煆存性為末用鐡器盛藥末三錢湯調停三日臨卧將藥蘸髭鬢即黑服菊增年變白方用菊以三月上寅日採名曰玉英六月上寅採名曰容成九月上寅日採名曰金精十二月上寅日採名曰長生者根莖也隂乾百日取等分以成日合搗千杵下篩和以蜜丸如梧桐子大服三七丸百日身體潤一年白髮變黑二年齒落復生三年八十者變童兒必效染白髮方出十便良方用揀細粒烏頭四升以醋漿四升去却豆以好灰汁淨洗髮待乾以豆汁熱塗之以油帛裹之經宿開之待乾即以熊脂還以油帛裹即黑如漆一塗三年不變驗又方醋煮大豆黑者去豆煎令稠塗之又方用搗木槿葉以熱湯和汁洗之亦佳染白髮方用黑桑椹一升科斗子即蝦蟆子瓶盛密封懸東屋角百日盡化為泥染鬚髮如漆又取二七枚和胡桃脂研如泥拔去白者點孔中則生黑一方無蝦蟆子栝蔞散治鬚黃白揩牙取栝蔞實一枚開蓋子取瓤并子用青鹽一兩細研杏仁去皮尖三七粒同栝蔞瓤并子納入栝蔞內却將頂蓋蓋了麻綿繫定鹽泥固濟炭火煆煙盡去泥取研為末早夜揩牙一方無青鹽一方用濕紙兩三重包裹次用蚯蚓泥并紙筋一處搗為筋泥包裹於濕紙上厚一指許用圓勻不破紙綻於日中晒乾用熟炭二斤四邊上下煆之火多則恐爆裂徐添火候泥毬通紅有青煙熖出即藥成去火掃淨地尺許置泥毬其上以新瓦盆蓋食頃擊去泥皮取藥細研晨起日中臨睡以指蘸藥擦牙令極熱即取效速仍不輟用之百日髭鬢可致黑如先有白者摘去以餘藥擦於鬢間後來髮不生白矣其治口齒之功未易具陳變白令黑方生乾地黃覆盆子已上各二斤地骨皮一斤右為末煉蜜和搗三五百杵丸如梧桐子大每服以溫酒下四十丸食前服忌生蔥大蒜蘿蔔等白髮令黑方八角附子一抆大酢半升右以銅器中煎兩沸內好礬石大如碁子許一枚消盡內香脂三兩和令相得攪至凝內竹筒內拔白髮以膏塗拔根生黑髮也治髭髮鬢黃赤令黑方生柏葉切一升豬膏一斤右搗柏葉為末以豬膏和為二十丸用布裹一丸用泔汁中化破沐之日一用一月後漸黑光潤拔白令黑取除日自拔白以鱉脂塗之又豬狗膽塗之又白狗乳亦塗又方用大豆五升酢漿水二斗煮取五升沭之治鬢髮黃赤方用燒梧桐灰以乳汁和塗傅鬢髮即黑并皮肉鬢髮即黑防連皮肉俱黑方便傅之酸榴漿方治鬚髮黃白令還黑色用酸石榴五月內於東南枝上揀平生不側而大者一枚於頂上筯劄眼子深一寸餘用水銀半兩灌於眼子內不得封閉從風日雨露至十月葉落盡時取下殼內盡成水每用時以魚胞裹指頭點藥撚之療髮黃用熊脂塗髮梳之散頭入床底火地一食頃即出便盡黑不過一升脂驗治年衰髮白用桑葉丫枝多雞桑最堪入用甚利五臟關節通血氣夕服不飢多用曝乾搗末蜜和為丸每服六十丸變白不老一方取黑椹水漬之頻沐髮即黑備急拔白毛令黑毛生方用拔去白毛淨然後以好白蜜傅拔處即生黑毛眉中無毛以針挑傷傅蜜亦生眉毛又有治法以石子香汁拔白毛淨急手以傅孔中即生黑毛如毛髮不生取梧桐搗汁塗上必生黑者一方用白蜜傅髮孔即不復生也治鬢黃剪瓜甲搔令毛孔少血出以蜜塗之即生黑毛令髮不生用蚌灰鱉脂相和新拔毛即塗毛孔永不生令人髮不白以大麥食之久食之良治蒜髮用蔓菁子壓油塗頭能變蒜髮變白方出本草用丁香以生薑汁研拔去白髮塗汁其中即異常黑也劉君安頭不白方出本草以己髮燒灰合頭垢等分合服如大豆許三丸名曰還精令頭不白變白方出本草多取烏臼子壓為油塗頭令黑治白髮出本草鑷去白髮銷白蠟點孔中即生黑者變白髮出本草以槐黑子水吞之變白令黑耐老明目輕身出本草以龍葵子赤珠者服之若能生食得苦者不食他菜十日後則有靈異不與蔥薤同噉榮養髭髮論夫腎骨髓腦為髓海髮者腦之華髓之所飬也衝脈為經絡之海其浮而外者循腹上行會於咽喉别絡唇口血盛則滲灌皮膚生毫髮此髭髮所本若髭髮不生而黃悴則腦衝脈衰無以榮養故也須以藥治之令潤澤方地黃丸出聖惠方榮養髭髮堅牙齒補血氣益顔色延年生地黃二斤搗取汁杏仁三升去皮尖雙仁點地黃汁研如膏丁香三兩胡桃瓤一斤同杏仁别研烏麻油一升點地黃汁研絞取汁大麻油一升木香牛膝人參白苓去黑皮各三兩無食子三兩訶梨勒皮三兩箋香沉香安息香搗如碁子水煮各二兩栁枝皮炙乾鹽花各三兩松香以布袋盛湯煮精好者自化出湯冷自凝如米白便換布袋煮極白取八兩龍腦研一分白蜜一升酥一升右將搗研藥令極細同諸藥與地黃汁調如膏磁瓶盛三分三瓶每瓶約七分不欲令滿坐爐中磚上四靣用火候瓶中藥沸即以栁枝攪欲乾施添地黃汁盡為度時時抄看可丸乃止候冷藥以蠟紙蓋頭勿令泄氣每食後含化一丸如彈子大咽津日三夜一十日覺百日大效初服藥處淨室一月忌萊蔔藕蒜常食少生薑即效零陵香油方出聖惠方治髮令黑光滑潤梳頭零陵香半兩烏麻油一斗茅香半兩蓮子草一兩細辛半兩藁本半兩白芷半兩生鏵鐡五兩搗碎訶梨勒皮一兩沒石子一兩酸石榴皮一兩牛膝一兩去苗白檀香一兩沉香一兩地骨皮半兩芎藭半兩右細銼并鏵鐵以綿裹入油中浸四十九日藥成常用梳頭經年尤驗浸油長髮令光潤澤方出聖惠方生麻油五升乾桑椹一兩梔子花一兩訶梨勒皮一兩蓮子草一兩細辛半兩白芷半兩藁本一兩零陵香白蘝一兩生鐡三斤搗碎硝石一兩地骨皮一兩沒石子一兩酸石榴皮一兩右細銼并生鐵以綿裹入油中浸經四十日後藥成常用梳頭經年尤效治風益髮令潤澤不白合油塗頭方乾蓮子草半兩蔓荆子細辛藁本柏子仁芎藭白芷甘松香零陵香白檀已上各一兩胡桃二十顆去皮鏵鐡一斤搗碎右都銼并鏵鐵以綿裹用清油五斤於磁器中浸半月藥成常用塗頭一月後甚驗惜梳髮神效散出海上方當歸荆芥黑牽牛白芷葳靈仙側柏葉訶子各等分右為細末隔夜在髮中次早埋之能去風屑垢膩解氊結巨勝七十丸益髭髮變白為黑甘菊花三兩旋復花三兩吳白芷三兩白茯苓三兩牛膝三兩覆盆子三兩半炒旱蓮子一兩半右為末煉蜜搜和搗杵一二千下丸如梧桐子大每服三十丸空心溫酒送下食後再服三十丸良久少飲酒引動藥力如此日進三服兩箇月髭髮鬢如鴉更治一切氣益脈補下尤忌生蘿蔔豬羊血蔥蒜忌月日如左并已服藥如右每月至此日無服藥止喫素麵昔日唐李升服此藥壽至七十嵗全無白髮若試此藥用白犬一隻食藥六十日乃黑正月初四二月初六三月十二四月十六五月十八六月二十四七月二十一八月十五九月十六十月十三十一月十四十二月初七槐花膏出聖惠方榮養髭髮瓦松半生半燒灰鐡粉鏵鐵醋淬十遍搗碎羊糞半生半燒灰槐枝細銼各一兩胡桃仁一斤右除瓦松等三味外將胡桃仁與槐枝搗作一團傾瓶中令實又取槐枝斫長二寸密插於瓶中與瓶口齊更取一瓶子須盛得前藥瓶子者勘合然後穿地坑陷空瓶子與地靣齊其向上瓶子即擁馬糞火燒一宿候冷開之其向下瓶子滿中有油清則取此油調前三味塗頭每日淨洗再換藥柏葉散出御藥院方常使榮養髭鬢側柏葉四兩何首烏地骨皮白芷各二兩右為粗末每用半兩入生薑十片水一大碗煎五七沸去滓淋洗髭鬢臨睡用槐實膏出聖惠方治腦虗髭髮悴目暗槐實去皮取黑炒搗末一合生地黃搗取自然汁一合馬牙硝研三錢酥鍊一兩右以銀石器盛地黃汁文武火上先下槐實末次下馬牙硝不停手攪常令如魚眼沸候煎減一半即下酥更煎三二十沸傾出置磁合中每臨卧棗核大內鼻中取去枕仰卧展足腦中出惡水勿怪三倍丸出聖濟總録榮養髭髮固牙齒補益血氣丹砂研一兩磁石煅研二兩陳麴炒研二兩右搗研為末細羅别以豬腎三隻去脂膜用濃酒二升熬腎爛去腎取酒和藥末丸如菉豆大空心溫酒或熱水下二十丸三物膏出聖濟總録栁枝桑枝槐枝各銼一升右以水二斗同煮至一斗去滓入好鹽一斤熬成膏磁盒盛臨卧揩牙滋榮散出御藥院方長養髭髮落最宜生薑焙乾一兩人參一兩右為細末每用生薑一塊切斷蘸藥末於髮落處擦之日二次録蛭油方出聖濟總録榮養髭髮録一兩乾水蛭七枚為末右以水銀三兩作小盒盛録與水蛭以蚯蚓土和泥固濟約半指厚深埋在馬糞中四十九日取出化為黑油用魚胞作指袋時蘸少許撚髭上其油自然倒至髭能變黑烏金散出聖濟總録榮養髭髮牢牙草烏頭四兩青鹽二兩右將青鹽為末同入藏瓶內瓦子一片蓋瓦上鑽一竅外用紙筋泥固濟仍留元竅候乾用火煆黑煙盡青煙出為度以新黃土罨一宿取出為末逐日未洗靣前揩牙候洗靣了方潄三方瑩肌膏出御藥院方治毛髮長茸散頻剃復生不盡者以膏貼之次日隨膏藥茸毛自退瑩淨再不生乳香二錢瀝青三兩右慢火同化開入小油一處煎沸硬軟得所臨卧塗患處明旦用溫淡漿洗去蒺藜散右用蒺藜子一斤當七月八月熟時收日乾舂去刺然後杵為末每服二錢新汲水調下日三服勿令中絶斷榖長生服之一年已後冬不寒夏不熱服之二年老者復少髮白復黑齒落重生服之三年身輕長生治髮不落方劉君安曰欲髮不脫梳頭滿千遍用羊糞和鴈膏傅毛髮落三宿即生金陵草煎方益髭髮變白為黑用金陵草一稱六月以後收采揀擇無泥土者不用洗須青嫩不雜枝梗者爛搗研新布絞取汁又以紗絹濾令滓盡通內油器鉢盛之日中微煎又取生薑一斤白蜜一斤合和入煎中以栁木箆攪勿停中令薑蜜勻中日煎之令稀餳為藥成矣每日及午後各服一匙以溫酒調服欲作丸日中再煎令可丸大如梧子依前法酒服三十丸及時多合製為佳其效甚速又方出聖惠方用東行棗根三尺橫安瓶中蒸之令汁出收之傳髮即長治血脈虗極鬚不得潤澤冝用此方用桑根白皮銼一斤柏葉銼一升以水三斗淹浸煮五六沸去滓沐頭數數為之髮即潤澤南燭煎出本草益髭髮及容顔兼補暖方右於三月三日採南燭葉并蘂子入大淨瓶中乾盛以童小便浸滿瓶固濟其口置閉處經一周年取開每日一兩次溫酒服之每酒一盞調藥一匙極有效驗治病後頭病不可理通頭髮出十便良方右以生麻油二升將頭髮解開安銅沙盆中用油淹漬之細細將叉子領髮斯須並自通潤毛髮滑肌膚益血色出本草方以胡麻葉作湯沭良黑潤毛髮出本草方以柏葉燒取汁塗頭去風潤髮出本草以白油麻葉搗和漿水絞去滓沭之治髮出本草以木瓜浸油梳頭浸油益髮神效方出衛生家寶方蓮花鬚一兩隂乾零陵香一錢卷柏葉白芷芎藭防風各半兩右件細切以綿裹入生椒七十粒生麻油半斤浸於新瓶中埋地中七日取出婦人塗髮極佳兼治頭髮落不生極佳作香澤塗方依臘澤藥內漬油裏煎即用塗髮以綿裹煎之鬚髮墮落論夫足少陽膽之經也其榮在鬚足少隂腎之經也其華在髮衝任之脈為十二經之海語海其别絡上辰日月若血盛則榮於鬚髮故鬚髮美血氣衰故鬚髮墮落也方生髮膏治熱衝髮鬚落松葉切蓮子草錬成馬鬐膏棗根皮切各一升韭根切蔓荆子碎各三分竹瀝豬脂各二升防風白芷辛夷仁吳藍升麻芎藭獨活寄生藿香沉香零陵香各一兩右以棗煮汁竹瀝等浸一宿以脂等煎之候白芷色黃膏成以塗頭髮及頂上日三五度妙治眉髮墮落出千金方白芷附子防風芎藭莽草辛夷細辛黃芩當歸蜀椒各一兩大黃一兩半蔓荆子一升右共十二味㕮咀合二膏微火煎白芷色黃膏成先洗髮用膏傅如常澤法勿近靣生毛也蔓荆子膏出聖惠方治血虗頭風鬚髮秃落不生蔓荆子三兩桑寄生三兩桑根白皮二兩白芷二兩韭根鹿角屑各二兩馬鬐脂五合五粒松葉三兩甘松香一兩零陵香一兩生烏麻油三斤棗根皮汁三升右細銼綿裹內脂及油棗根汁中浸一宿漫火煎數攪候白芷色焦黃膏成去滓收磁合中每日揩摩鬚髮不生處十日後即生鬢髮秃落生髮膏出聖惠方莽草一兩防風升麻白芷薺苨各二兩蜣蜋四個驢鬐膏貓膏一作狗膏豬膏馬鬐膏熊膏各半升右諸膏成煎各半升合煎諸藥沸則下停冷復上火三五沸上濾去滓傅頭當澤用之一方有雄雞膏無驢鬐膏治頭風髮落并眼暗方蔓荆實三而桑寄生桑根白皮各二兩韭根切三合白芷二兩甘松香零陵香各一兩馬鬐膏三合烏麻油一升松葉切三合甘棗根白皮汁三升右細切諸藥內棗根汁中浸一宿數數攪令調溫色已然後內油脂中緩火煎之勿令太熱三五日候棗汁竭白芷色黃膏成去滓每日揩摩鬢髮及梳洗其藥浸經宿臨時以綿寬裹煎之膏成之滓綿濾以新瓷瓶盛稠濁者即先用却不堪久停特勿近手摩壞也南燭草煎丸出聖惠方治血氣虗偏鬚髮秃落不生縱生色黃不黑冝服南燭草酸石榴葉旱蓮子苖各五斤右已上三味於端午日內收於瓷瓶中泥封令密安日中至六月中旬取出皆如黑錫研之又以生地黃五斤絞取汁及白蜜五合同前上件三味成膏次下諸藥末地骨皮四兩熟乾地黃四兩訶梨勒皮二兩秦椒三兩去目及閉口者微炒去汗白芷二兩旋復花二兩桂心二兩杏仁三兩右為末入上件膏中用緩火煎可丸如梧桐子大每日空腹以溫酒下三十丸晚食後再服至四十九日鬚髮皆生黑而復光忌生蔥蘿蔔大蒜摩膏出聖惠方治頭中二十種風髮秃落摩之即此療頂如剝似銅盆者蜀椒三兩半莽草二兩乾薑半夏桂心䕡茹附子細辛各一兩並生用右細搗篩以生豬脂剝去筋膜稱取二十兩和前件藥合搗令消盡脂其藥成矣先以白米泔沐髮令極淨夜摩之經四五日即毛孔漸漸日生軟細白皮毛十五日後漸漸變作黑髮至一月四十日待髮生五寸以上若至五日不停彌佳好酥及生油和藥亦得又腸寒鼻塞但以摩之瘥茯苓术散一名通神效治髮白及秃落白术一斤一方蒼术茯苓澤㵼豬苓各四兩桂心半斤右搗散服一刀圭日三食後服調服一方酒或米飲調服後三十日髮白變黑容貌改紅筋骨強盛久服通神鬼治鬚鬢秃落出聖惠方附子二兩去皮荆實二兩柏葉三兩烏雞糞三合松葉三兩右相和於新瓷瓶中盛隂乾百日出之搗羅為末以馬鬐脂和如膏塗之經十日即生治頭一切風髮秃落更不生頭中二十種病頭眩向中風以膏摩之方䕡茹三兩半細辛附子各二兩桂心半兩右搗篩以豬膏勿令中水去上膜及赤筋二十兩搗令脂銷盡藥成搗訖仍研恐其中有脂膜不盡以生布絞掠取以密器貯之先用桑柴灰汁洗髮令淨方去桑灰兩日洗待乾以藥摩頭令入肉每日須摩如非十二月合則用生烏麻油和極效治鬢髮墮落令生長方出海上方生柏葉切一升豬膏三升附子四枚右為末以膏和為三十丸用布裹一丸內泔汁中煎沐髮長不落其藥密收貯勿令泄氣三聖膏出醫方大成治髭髮脫落能令再生附子蔓荆子柏子仁各三分右以馬鬐膏和搗三千杵貯新磁器中封百日出以馬鬐和以傅頭訖巾裹之勿令見風日三傅即生肘後方不用柏子仁以酒漬澤沫一方無鬐膏和用藥塗在髭髮落處三五日即生自然牢壯不落治梳頭髮不落棐子三個去皮胡桃二個去皮側柏葉四片如手大右和合用雪氷三日取水用梳髮永不脫落兼澤潤之治鬚髮秃落不生令生出聖惠方生薑汁一合生地黃汁一合羊子肝汁一合右相和令勻夜卧塗之十日便生治脈極虗寒鬚髮墮落令髮潤澤方出聖惠方麻子三升碎白梧葉切一把右以米泔汁二斗煮五六沸去滓以洗沭則鬢不落而長治鬢髮墮落出千余方麻葉桑葉右以泔煮去滓沭髮七遍石灰酒治頭髮落不止及治眉鬚用石灰三升細篩水拌令溫極熱蒸之炒令至焦以木柴投中火即著為候停冷取三升絹袋之以酒三斗浸三宿初服半合日三四夜又稍加至一合神效一方密封冬浸十四日春秋七日取服常令酒氣相接服之一月即新者生也沭頭湯出海上方治脈極虗寒鬚髮墮落令髮澤方用桑根皮切三升以水五升淹漬者五六日去滓洗沐髮數數為之自不復落一方用長三尺瓷瓶飯上蒸之蒸取兩頭汁以塗鬚鬢則立愈治頭風毛髮落不生方出千金方用鐵上生衣研以臘月豬脂和塗之日三亦治眉毛落一方先以酢泔清淨洗秃處以生布揩令大熱臘豬膏細研入生鐵煮沸三二度塗之遍生治髮易長而黑出聖惠方多取烏麻花磁器盛密蓋深埋百日出用之塗髮療人病秃落不生長方出聖惠方用麻子仁三升秦椒一合置泔汁中一宿去滓日一沐一月長二尺也一方無秦椒治髮落不生令長方出聖惠方用麻子仁一升熬黑壓取油以傅頭長髮妙三十日漸生胡麻散出王氏濟方治五癩頭靣遍身生赤核麻木鼻內聞腥穢鬚髮退落胡麻子三兩何首烏三兩蔓荆子一兩葳靈仙一兩九節菖蒲一兩苦參一兩荆芥穗菊花沙苑白蒺䔧鼠粘子炒一兩右件一十味藥洗擇淨控乾如治大風但鼻目耳不動並可以療之每服一錢薄荷酒任下日用五七服不以時候如才覺便喫半月見效如已患年嵗須服一月方始見功及五十日可減一半服及百日永瘥其鬚髮自生如治皮膚風疾瘙癢疥癆之類即入下四味與前六味為末以薄荷自然汁和酒調下一錢若腎臟風攻注亦宜服之如喫此藥至三五日須頻暖浴貴其汗出也治髮落出本草取蕡麻汁煮粥食之治頭風并女人髮出本草以芭蕉油傳之眉髮鬚不生論夫足少隂之血氣其華在髮足少陽之血氣盛眉美足陽明之血氣盛鬚美諸經血氣盛則眉髭鬢並美若血氣虗少枯竭則變黃白而不生若風邪乘其經絡血氣改變則異色惡髮每生也則冝以藥傅之令生好髮也方松葉膏出聖惠方治血氣風熱所攻眉髮鬚不生松葉半斤蓮子草半斤馬鬐膏半斤韭根半斤防風一兩蔓荆子二兩白芷一兩辛夷仁半兩川升麻半兩吳鹽半兩芎藭半兩獨活桑寄生藿香沉香零陵香已上各半兩右細銼先以桑根白皮一斤以水八升煮取五升去滓又以竹瀝一升相和浸潤諸藥一宿後豬脂二升煎候白芷色黃膏成濾去滓於瓷器中盛每用塗之日三五度妙治血憊心腦虛頭風致髭眉不生踈薄冝用此方蔓荆子半兩白芷附子防風芎藭莽草辛夷黃芩細辛當歸漢椒各一兩川大黃一兩半右都細銼以馬鬐膏一斤豬脂二斤以慢火同煎候白芷色黃住火去滓放冷用瓷盛淨洗塗之日三上良治眉髮髭不生兼令黑方鐡粉二兩附子二兩羊躑躅三兩蓮子草二斤零陵香三兩沒石子五顆蔓荆子二兩右粗羅為散以生油五升浸五七日後用慢火煎取一半已下去滓於瓷合內盛貯無眉髭髮每日塗之神驗但不得塗著口鼻恐有毛生青蓮膏治血虗眉髮髭不生冝用此方蓮子草汁三升生苣蕂油一升牛乳一升甘草二兩右相和於鐺內以慢火煎之才似魚眼沸便攪之勿住手直沫盡為熟澄清濾去滓盛於不津器中每用候夜卧時低仰卧每鼻孔點三五點如小豆大至六七遍止涼久乃起有唾須唾却勿得咽之啜少湯飲如此點半年白者即黑落者重生其藥良驗忌生蒜蘿蔔辛辣物松脂膏出聖惠方治眉髮髭不生松脂二兩附子二兩去皮蔓荆子半斤右為末以烏雞脂和瓷器中盛密封頭於屋北隂乾百日藥成細研以馬鬐膏和塗於不生處勿近靣又方出聖惠方柏葉切一斤附子二兩去皮右為末以豬脂和作二十丸每日一丸又米泔中化開洗之每日用之十日後再生新者餘藥以綿裹密器貯之勿令泄氣治生眉毛方出聖惠方鐡生衣墻上青衣小臺祕要作爐右為末以水和塗之即生治髮薄不生出本草先以醋泔清淨洗秃處以生布揩令大熱臘月豬脂細研入生鐡煮沸三二度傅之遍生治眉毛鬚鬢火燒瘡瘢毛不生方用蒲灰以正月狗腦和傅則生生髮方出肘後方塗頭髮潤頭髮取側柏葉隂乾作末和油塗之治眉髮髭不生方出聖惠方用羊糞灰二斗以水淋取汁洗之三日一洗不過十洗大生令白髮不生出本草以麻子五升研同葉一握搗相和浸三日去滓沐髮令白髮不生治髮薄不生用豹脂塗無髮處朝塗而暮生生髮令長論夫足少隂之經血所榮也氣盛則髮長若虛則髮不長方胡麻膏出聖惠方長髮令速生及黑潤胡麻油一升臘豬脂一升烏雞脂一合丁香一兩半甘松香一兩半零陵香二兩芎藭竹葉細辛川椒各二兩苜宿香三兩澤蘭一兩大麻仁一兩桑根白皮一兩辛夷一兩桑寄生牡荆子各一兩杏仁三兩防風三兩莽草二兩柏葉三兩右都細銼米醋浸一宿漉出內入油豬脂雞脂中以慢火煎候白芷色焦黃膏成綿濾去滓以磁合盛淨洗頭塗之日二用三十日髮生長髮塗香油方出聖惠方松皮二兩天雄三兩莽草一兩秦芃一兩獨活二兩川烏頭三兩川椒二兩白芷二兩芎藭二兩辛夷二兩甘松一兩零陵香一兩沉香一兩羊躑躅木香一兩藿香一兩甘菊花一兩牛膝一兩松葉半斤杏仁三兩右細銼以醋五升漬一宿漉出烏麻油六斤於鐺內微火煎令沸候白芷色黃膏成以綿濾去滓瓷器盛一依塗油之法任意塗之以髮生為度生髮膏出聖惠方細辛防風續斷芎藭皂莢柏葉辛夷仁各一兩寄生二兩澤蘭零陵香各二兩蔓荆子四兩桑根汁一升韭根汁三合三勺竹葉松葉切六合烏麻油四大升白芷六兩右以苦酒韭根汁漬一宿以綿裹煎微火三上三下白芷色黃去滓濾以器盛之用塗摩頭髮日三兩度一方無苦酒浸生髮膏胡麻油一升鴈脂一合丁香甘松香各一兩半吳藿香細辛椒各二兩澤蘭白芷牡荆子苜蓿香大麻子各一兩芎藭防風莽草杏仁各三兩竹葉切三合右切以酢漬一宿煎之以微火三上三下白芷色黃膏成去滓以塗髮及頂尤妙又方令髮速長黑烏喙莽草續斷皂莢澤蘭竹葉細辛白术各二兩辛夷防風各一兩柏葉切四兩杏仁松葉各三兩豬脂右先以米酢漬一宿以脂煎三上三下膏成去滓塗髮及頂上傅藥時忌風令髮速長而黑方出聖惠方烏喙三兩莽草三兩續斷三兩皂莢二兩澤蘭三兩白术細辛各三兩辛夷柏葉防風竹葉杏仁各一兩右細銼以隔年米醋三升漬一宿漉出以麻油二斤豬脂二斤同煎藥焦黃藥成去滓以瓷器盛每使洗淨頭了塗之三日效治頭風烏喙膏生髮令速長而黑光潤烏喙莽草石南草續斷皂莢澤蘭白术各二兩辛夷仁一兩柏葉豬脂三升右以苦酒漬一宿以脂煎於東向竈釡中以煎之先致堆土每三沸即下致一堆上候沸定却上至三一致堆上三畢成膏訖去滓置銅器中數北向屋溜從西端至第七溜下埋之三十日藥成小兒當亂頭日三塗大人數沐日塗之甚驗蓮子草膏治鬚髮秃落令重生兼黑潤蓮子草汁二升熊白脂一合豬鬐膏一合生麻油一合柏白皮三合山韭根三合瓦衣五合右以銅器煎之候膏成去滓收貯每欲梳頭塗膏令頭肌中髮生治婦人長髮方零陵香白芷蔓荆子蓁樹生附子藿香各一兩荆芥枝半兩右㕮咀綿包扎於瓶內用香油一斤浸却用紙封口埋地內半月取刷之近效生髮方出聖惠方蔓荆子青柏葉蓮子草各一分附子二枚碎頭髮灰二七右以酒漬內瓷器中封閉經二七日藥成以烏雞脂和塗之先以泔洗然後傅之數日生長一尺也生髮牆衣散牆衣五合鐡精一合合歡木灰二合水萍末三合右搗研以生油和少許如膏以塗髮不生處日夜再即生髮效令髮易長方出聖惠方蓮子草三升麻油二升羊乳一升豬脂一升右先煎乳一沸次入脂等更煎三兩沸放冷以磁合貯之每日塗髮七日之外不長盡長長髮方出聖惠方蔓荆子三升大附子二枚右以酒一斗二升漬之以磁器盛之封頭二十日藥成先以灰汁淨洗髮須痛拭乾取烏雞脂煎以塗之一日三遍凡經七日然後以藥塗日三四便澤以汁櫛髮十日長一尺勿近靣塗恐有毛生一方無烏雞脂令髮易長出聖惠方熊脂一兩蔓荆子一兩右相和令勻以醋調塗之髮即漸長常用長髮藥用亂髮洗淨晒乾以油煎令燋就鉢內細如膏搽甚是長髮又法凡婦女秃髮即以漢椒四兩用酒浸蜜食內坐挫之其髮自然長紫金油用鯽魚膽二十枚生鐵一片五錢重訶子五枚煨去核鬱金二枚銼黃芩半兩銼黑豆一大合紫草半兩零陵香半兩生薑汁一大合和勻生絹袋子盛取竹瀝油四兩油一十二兩入藥袋子於有油瓷合內浸密封放涼處半月取出逐日搽頭百日內如漆永不落治稀黃香芎油治頭風髮落不生用秦椒白芷川芎各二兩蔓荆子零陵香各二錢半細銼用綿裹以生麻油半斤於瓷器內浸三七日塗髮稀少處不可滴上去風生髮柏枝油用柏枝乾者椒紅半夏各三兩㕮咀用水二碗煎至半碗入蜜少許再煎一兩沸每用時入生薑汁少許調勻搽無髮處每日兩次去風生髮烏韭方用烏韭石衣燒灰令沐頭長髮此是隂崖濕處長者可四五寸治髮落不生令長用鴈肪傅之主生毛髮以胡麻生油塗頭令人生髮生髮羊糞燒灰和鴈肪塗頭上日三生長髮方以石荆生水傍作灰汁沐頭生髮生毛髮以白犬乳汁塗孔中即生黑髮若欲不生拔去毛髮以鱉膏塗之長髮方用續斷汁沐頭主生髮出本草以水萍作湯沐浴又為膏傅之長髮出本草挼皂莢葉沐頭長髮出本草以松菜子作油傅頭主生髮去風癢出本草取菴摩勒子壓取汁合鐡粉如油塗頭初塗髮脫後生如漆令腦滿髮不白而長生用槐子以相連多者為好十月已日採之新盆盛和泥百日皮爛為水核如大豆服之生毛髮出本草用金星草根捶碎浸油塗頭治無髮出本草用瓜蒂葉生搗汁塗之即生生眉論足太陽之經其脈起於目內眥上額交顛血氣勝則眉美有毫血少則眉惡又眉為風邪所傷須以藥生之方烏蛇圓治風毒眉毛墮落冝服烏蛇肉白附子白殭蠶乾蠍防風各半兩麝香一分虎脛骨半兩藿香半兩臘月烏右為末煉蜜和搗三二百杵丸如梧桐子大每日空心溫酒下二十丸夜臨卧再服治眉毛脫落冝用此方用蓮子草搗攪取汁磨生鐵塗之以手揩磨令藥氣透肉一日可三兩度塗之為妙又方出聖惠方用白礬十兩燒令汁盡細研為末以蒸餅和丸如梧桐子大每日空腹以溫水下七丸日加一丸至四十丸減一丸周而復始效生眉毛方用菁子四兩微炒為細末以醋和每夜塗之又方出聖惠方用七月烏麻花隂乾為末生烏麻油浸每夜傅之治眉癢毛落方用垂栁葉隂乾搗羅為末以母生薑汁於生鐵器中調夜間塗之漸以手摩令熱為妙生眉髮出本草以鱧腸草汁塗之生速而繁洗法藿香散去點洗髭髮藿香葉零陵香皂角檀香沉香各一兩香白芷白丁香黃明膠各七錢龍腦糯米各半右為細末每日如常使用洗髭髮手靣白日令光恱潤澤乾洗頭藥甘松百藥煎五倍子川芎薄荷香白芷草烏頭藿香茅香各等分右為末糝髮上揉搓木梳之洗髮菊花散治頭髮脫落甘菊花二兩蔓荆子乾柏葉川芎白芷細辛桑白皮旱蓮子各一兩右粗篩每用二兩漿水五大碗煎至兩大碗去滓沐髮乾洗頭治頭生垢膩兼去風滑石四兩川芎王不留行白芷細辛防風羌活獨活各半兩右為末先梳頭髮通細摻入藥三五錢拪入兩手如洗頭狀再梳通箆之風屑垢膩悉去永無頭風梳頭藥方香白芷零陵香防風荆芥穗地骨皮滑石王不留行各等分右為末每用一大錢摻在頭上梳遲皮湯治髭髮乾澤洗髮方小麥麩半升半夏一兩沉香半兩生薑一兩右用藥水兩碗入生薑一兩和皮細切同煎三兩沸生絹濾去滓又清汁入龍麝少許攪勻洗髮令潤柔易長乾洗頭藥方香白芷零陵香甘香滑石右等分為細末摻於髮內梳箆洗頭方胡餅霜白菖蒲槵子皮各一兩右衮研合煉皂角漿水和丸如毬子大每一丸用灰汁搽洗頭甚好乾洗頭香白芷散香白芷王不留行各二兩右為細末每用乾摻頭髮內微用力擦去膩內箆子刮去藥末治髮積用五芩散摻之或炒燥細麵或百藥煎好必效沐髮柏葉細銼一斗煮取湯沐髮又方取杏仁與麻子搗以水投濾汁濤用沐髮洗頭光澤訣右用豬膽一枚浴頭時仰在水中洗其髮自然如漆光澤訣以乳香油浸七日外常搽髮上光而且黑洗頭明眼方鳯眼草即椿樹上固固翹也右正月七日二月八日三月四日四月五日五月二日六月四日七月七日八月三日九月二十日十月二十三日十一月二十九日十二月十四日洗頭方出本草令髮香白屑不生以雞蘇燒作灰淋汁或煮取汁洗之沐髮方出本草用瓶氣水以物於炊飲時承取沐頭令髮長密黑潤不能多得朝朝梳頭漸漸覺有益好沐頭長髮方出本草以蘭草葉五月六月採陰乾和油作膏塗髮洗頭長髮方出本草取鴈骨燒灰和泔洗頭澤頭方出本草沐頭及洗身上瘡癢出本草以赤瓜實汁洗之主沐髮長潤出本草以麻葉與桐葉搗浸水沐髮則長潤矣沐髮出本草以青蘘生杵汁沐髮令黑而長乃胡麻葉也沐髮方出本草春斫胡桃木皮出水承取沐頭至黑主沐頭長髮出本草以紫衣燒灰淋取汁沐頭良鬼舐頭治鬼舐頭方出本草用燒貓兒屎以臘月豬脂和傅之又方出千金方用博末和蒜搗傅日一度治鬼舐頭取小兒糞臘月豬脂和傅又方出千金方用貓兒毛燒灰以膏和傅之普濟方卷五十
