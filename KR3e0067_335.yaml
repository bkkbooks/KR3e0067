丹草烏頭三分水蛭三箇炒䖟蟲三箇去翅足炒川烏頭七分大蒜大椒柴胡七分羗活全蝎升麻各一分甘草二分破故紙一錢三奈子蓽撥焙半両炒黄塩一錢必用之藥枯礬半錢右為極細末煉蜜丸如指尖大用綿裹定留絲納隂戸中覺臍下暖為度𤣥胡苦楝湯治臍下冷撮疼痛隂中大寒肉桂三分熟地黄附子三分炙甘草稍半分苦楝二分黄栢一分為引用右都作一服水四大盞煎依常食前桂香散治婦人脾血乆冷時作腹痛泄瀉草果去皮炒甘草白术良薑炒香砂仁各一両净青皮炒訶子肉各半両肉桂生薑厚朴製棗肉各一兩水一碗煮爛令乾同研作餅焙為末每服二錢入塩少許空心沸湯㸃服金耆散治婦人小腹急痛脹滿金銀花黄耆甘草地黄芍藥當歸右各等分為末每服五錢重水煎服又方治腹中絞痛不可忍延胡索當歸白芍藥川芎乾薑各等分右為末每服三錢温酒調下治小腹疼青黒或赤不能喘以苦参一兩醋一升半煎八合分二服血分水分腫滿附論夫身腫者有血分有水分之候腎合膀胱為表裏腎主水而膀胱為津液體虛而風濕客於皮膚轉於膀胱津液壅滯腎水停積盖脾土虚而不能榮衛故流入于血分也但腫疼退經血自行也血分者經先閉而後腫是血分而為水也經通而腫自消其外候日驗裏如卧蠶頸邉人迎脉動甚也其姙娠體腫者脾胃虛弱肌肉不實則水浸積而為腫腹滿如蠱者水積於胞也如懐胎将産之月脚腫自易産否則難下也産後身腫者亡血太多邪氣乗虚而入故身腫宜與三物湯治之夫婦人腫滿若先因經水不調後漸至四肢浮腫小便不通名曰血分水分化為血血不通則化為水矣宜椒仁丸先因小便不利後身面浮腫經水不通名曰水分宜服葶藶丸方見後血分者經水流通之際寒熱往復其血忽為之中止壅塞不可行播在皮膚邪氣相摶經血分而為水發為浮腫血分脉經曰經水前斷後病水者名為血分積乆成水腫難治水分者以水氣上下溢於皮膚分散四肢未發為浮腫盖腎胃之關閉不利故聚水而從其類也此病有不同治法亦各異耳方椒仁丸治婦人血分水分腫滿椒仁甘遂續隨子去皮研附子郁李仁黒牽牛五靈脂碎研當歸吳茱茰延胡索各半兩芫花醋浸一宿炒黄石膏各一兩信砒膽礬各一分斑蝥糯米炒黄去米不用蚖青各三十枚去頭足翅糯米炒黄右為細末麫糊為丸如莞豆大每服一丸橘皮湯下大黄甘遂湯治婦人小腹滿如鼓状小便㣲難而不渇産後者此為水與血并結在血室也大黄四両甘遂二両阿膠二両右以水三升煮取一升頓服之其血當即下治婦虚能散滯氣風腫水腫澤瀉防己各等分右為末每服二錢温酒調下不拘時候漢防己散治婦人血分四肢浮腫喘促小便不利漢防己當歸㣲炒赤芍藥桂心羚羊角屑青橘皮湯浸去白穣焙各半兩赤茯苓大腹皮剉前胡去蘆頭木通炒各二分桑根白皮剉㯽榔川大黄剉碎㣲炒各一両右為散每服四錢水一中盞煎至六分去滓食前温服枳實散治婦人血分身體浮腫心腹煩滿枳實去穣麩炒當歸切炒牛膝去苖酒浸切焙桑根白皮剉各一両大黄略炒牡丹皮甘草各半両防己三分猪苓去黒心人参青橘皮去白炒各一両㯽榔剉木香炮各半両右為細散每服沸湯㸃服通口喫日再大腹散治婦人血分身體通腫虛煩不食大腹皮剉桑根白皮剉㯽榔剉各一両當歸二両切焙人参牡丹皮甘遂各半兩葶藶一分炒牛膝去苖酒浸切焙赤茯苓去黒心皮生乾地黄焙各一両木香半兩右為細散每服二錢濃煎紫蘇湯調下日三服㯽榔湯治婦人血分攻頭面身體浮腫煩熱心悶㯽榔剉赤芍藥人参百合各半兩知母焙一分木香半両枳殻去穣麩炒牛膝剉赤茯苓去黒皮各三分丹皮郁李仁去皮尖雙仁牽牛子炒各半兩右麄搗篩每服三錢水一盞煎至七分去滓温服日二夜一羚羊角散治婦人經水先斷後病水名曰血分身體浮腫煩悶宜服羚羊角桂去粗皮甘草苦葶藶紙上炒木香郁李仁炒去皮尖各半両青橘皮去白炒㯽榔剉當歸切焙牡丹皮赤芍藥各一両右為細末每服二錢濃煎桑根白皮湯放温調下不拘時候青橘皮散治婦人經水纔斷後輙病水四體浮腫青橘皮去白炒大㦸去皮白茯苓去黒心皮枳殻去穣麩炒當歸切焙黄耆剉各一両甘遂炒桂去粗皮各一兩人参三分牛膝去苗酒浸切焙一兩右為細散每服二錢濃煎桑根白皮湯調下日再服赤茯苓散治婦人血分腹脇膨脹四肢浮腫肩背壅悶赤茯苓三分川大黄二兩剉碎㣲炒鼈甲一兩塗醋炙令黄桂心半兩赤芍藥三分㯽榔一兩桑根白皮三分剉枳殻半兩麩炒㣲黄去穣郁李仁一兩湯浸去皮㣲炒牽牛子三兩㣲炒右為散每服四錢水一中盞入生薑半分同煎至六分去滓食前温服澤漆丸治婦人血分通身浮腫胸膈不利腹脇脹悶喘息氣粗不能飲食澤漆葶藶桑根白皮炙剉甘遂剉炒令黄㯽榔剉牽牛子各一兩生用昆布湯洗去醎炙三分郁李仁湯浸去皮尖㣲炒黄研一兩枳實去穣麩炒㣲黄三分右除郁李仁搗羅為末入郁李仁再和勻煉蜜為丸如梧桐子大每服十丸煎紫蘇湯下食前服温酒下亦得芍藥湯治婦人血分頭靣浮腫腹脇妨悶四肢煩疼經絡不通赤芍藥一分桃仁湯浸去皮尖雙仁麩炒㣲黄别研枳實去穣麩炒百合當歸剉㣲炒赤茯苓去黑皮牽牛子㣲炒㯽榔剉各一兩右麄搗篩每服四錢水一盞半入生薑半分切同煎至八分去滓空心温服逐日以利為效未利再服大㦸散治婦人血分心腹脹滿手足浮腫肩背疼痛大㦸當歸剉㣲炒各三分芫花半兩醋拌炒令乾猪苓三分去黒皮青橘皮三分湯浸去白穣焙川大黄半兩剉碎㣲炒赤芍藥一分桃仁三分湯浸去皮尖炒㣲黄右為細末每服一錢食前温酒調下郁李仁散治婦人血分氣血壅澀腹脇脹悶四肢浮腫坐卧氣促郁李仁一両湯浸去皮炒令㣲黄桂心半兩㯽榔三分牽牛子一兩㣲炒木香半両青橘皮半両湯浸去白穣焙右為細散每服一錢食前温酒調下芫花丸治婦人血分四肢浮腫心腹氣滯不思飲食芫花大㦸甘遂川大黄各一兩青橘皮一両半湯浸去白穣右細剉以米醋一中盞同藥入於銚子内慢火炒令醋盡搗為細末麫糊和丸如梧桐子大每服七丸温酒調下食前治經脉不利即為水水流走四肢悉皆腫滿名曰血分其候與水相類醫作水治之非也宜此方養生必用方仁存名當歸丸人参當歸大黄濕紙裹三両同飯蒸米熟去紙切焙瞿麥穗桂心赤芍藥白茯苓各三両葶藶炒黄研一分右為末煉蜜丸如梧桐子大空心米飲下十五丸至二十丸鼈甲丸治婦人水分肢體腫滿不消因經水不通宜先去水後調經血鼈甲去裙襴醋炙杏仁湯浸去皮尖雙仁麩炒苦葫蘆用穣天門冬去心焙各一両半巴豆一分去皮心膜出油盡石菖蒲㣲炒猪苓皂荚醋炒桂去粗皮葶藶隔紙炒甘遂㣲煨苦参大黄剉碎醋炒茈胡去苖當歸切焙羚羊角鎊各一両龍骨燒三分右為末煉蜜和丸如小豆大每服十丸至十五丸食前温水下日三服如一二服内水通利即减丸數及間日服黄耆散治婦人水分徧身浮腫煩悶喘渇經水不調黄耆剉赤茯苓木香各一両草豆蔲去皮桂去粗皮當歸切焙防風去义紫葳根炙剉凌霄花根是也桑根白皮甘草炙剉續斷澤瀉各三分甘遂半両右為末每服三錢水一盞半入小豆半匙生薑一塊搗碎煎至七分去滓温服空心日午臨卧各一服葶藶丸治婦人水分浮腫不退經脉不利葶藶隔紙炒二両木香陳橘皮湯浸去白焙枳殻去穣麩炒楮根白皮炙炒乾薑炮㯽榔煨剉防己朴硝剉研馬兠零去皮㣲炒蓬莪茂煨炒各三分甘遂㣲煨一両右為末煉蜜和丸如梧桐子大每日空心日午夜卧時用桑根白皮煎湯下三十丸至四十丸以利爲度如利即减丸數防己飲治婦人水病浮腫因經水斷絶名曰水分防己一両葶藶隔紙炒赤茯苓去黒皮各半両陳皮湯浸去白焙𤣥参黄芩去黒心澤漆炒各一兩猪苓去黒皮白术剉杏仁湯浸去皮尖雙仁不用炒大豆炒各一両半桑根白皮剉二両右粗搗篩每服三錢水一盞煎至七分去滓空心日午臨卧各一服赤茯苓丸治婦人水氣在皮膚浮腫水不通赤茯苓去黒皮一両猪苓去黒皮一兩半瀉澤一両小海蛤一両半陳橘皮湯浸去白炒桂去粗皮三分防己澤瀉㣲炒各一兩木通炙剉一分赤芍藥一兩右為末煉蜜為丸如梧桐子大每服二十丸煎桑根白皮湯下日三大腹皮丸治婦人月水腫滿不消經水斷絶連皮大腹一両半防己澤瀉木香蓬莪茂煨剉枳殻去穣麩炒各一両㯽榔煨剉陳橘皮湯浸去白炒牽牛子㣲炒各三分右為末煉蜜和丸如梧桐子大每日空心日午夜卧生薑湯下三十丸至四十丸如减即少服猪苓散治婦人水病腫滿小便滯澀經水斷絶猪苓去黒皮防己各一両桑根白皮炙剉郁李仁湯浸去皮炒百合瞿麥穗各三分甘遂半両右為末每服三錢水一盞煎至七分空心日午温服水通即止去滓早食前夜卧一服如踈利即减服芍藥湯治婦人水分面目身體浮腫胸滿短氣小便不利赤芍藥剉炒桑根白皮剉炒木通各一両百合三分甘遂半両大腹皮碎五枚郁李仁湯浸去皮炒三分右粗搗篩每服三錢水一盞煎至七分空心日午臨卧服水通即止木通飲治婦人水分先病水腫日乆不消致經水斷絶木通剉一兩桑根白皮剉澤瀉防己赤茯苓去黑皮石韋去毛各三分大根右粗搗篩每服五錢水一盞半煎至一盞去滓温服日二如水通利即踈服甘遂丸治婦人水分四肢浮腫經水斷絶甘遂㣲炒一兩一分葶藶隔紙炒二兩黄連去鬚天門冬去心焙各一兩半苦葶藶一枚取穣右為末煉蜜和丸如梧桐子大每服十丸至十五丸空心温酒下水利即踈服葶藶丸治水分葶藶炒别研續隨子去殻研各半両乾笋末右為末棗肉丸如梧桐子大每服七丸煎扁竹湯下大便利者减續隨子葶藶各一分加白术半兩大㦸散治婦人水氣四肢浮腫心胸痞滿痰毒壅滯喘息稍急小便不利坐卧不安大㦸前胡去蘆頭木通㯽榔赤茯苓各一両當歸桑根白皮剉防己各半両陳橘皮湯浸去白穣焙紫蘇莖葉各三分右為細散每服四錢水一中盞入生薑半分煎至六分去滓空心服以利為效未利再服漢防己散治婦人頭面及四肢浮腫心胸滿悶喘促小便赤色漢防己三分赤茯苓一両桑根白皮剉㯽榔木通川大黄剉碎㣲炒紫蘇莖葉各一両枳殻三分麩炒㣲黄去穣甘草半両炙㣲赤剉右為散每服四錢水一盞入生薑半分葱七寸煎至六分去滓温服不拘時候赤茯苓散治婦人水氣身體浮腫喘息㣲促小便不利赤茯苓漢防己猪苓去黒皮澤漆木通剉㯽榔各一両桑根白皮剉右為散每服四錢水一盞入生薑半分煎至六分去滓每於食前温服為效牽牛子散治婦人水氣腹脇妨悶四肢浮腫喘息㣲促小便不利牽牛子二兩㣲炒青橘皮湯浸去白穣焙㯽榔各一兩漢防己赤茯苓各半兩木通剉桑根白皮剉各三分右為細散每服三錢煎生薑葱白湯調下空心服以利為效未利再服商陸鱧魚湯治婦人水病頭靣及四肢浮腫喘急小便不利宜服商陸剉木通剉陳橘皮湯浸去白穣焙各一兩赤小豆半升鱧魚二枚重一斤桑根白皮二兩剉右為末用水五升入生薑一兩葱五莖同煮令豆熟為度每服喫一中盞魚豆任意食之不拘時候治婦人水氣徧身浮腫喘急麝香一錢細研雄黄二錢細研芫花半兩醋拌炒令乾甘遂半兩煨令黄右為散都研令勻每服半錢空心以温酒調下以快利為度未利再服治婦人水氣腹脹四肢腫滿喘息㣲促小便不利青橘皮三分湯浸去白穣焙甘遂煨令㣲黄郁李仁湯浸去皮研入各半兩右為散每服半錢空心温酒調下至午時當利即再服以大利為效麝香散治婦人短氣虛羸徧身浮腫皮膚急麝香三銖雄黄六銖芫花甘遂各二分右治下篩酒服五錢匕老小以意増减亦可為丸如小豆大酒服七丸一方小品無雄黄深師以蜜丸如大豆服二丸日三治三焦决滿水在胸外名曰水病腹濁大在腹表用大麝香丸華陀一方有人参二分為丸服人参白术飲人参白术炒草果去皮厚朴薑製川薑炮半夏麯大腹子炮各一兩甘草炙一兩澤蘭或加半両右為粗末每服四錢水一盞生薑二十片棗一箇同煎至八分去滓食前服普濟方卷三百三十五
