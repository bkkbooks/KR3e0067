body:
  text: 普濟方卷三百三十五明周王朱橚撰婦人諸疾門血氣心腹疼痛附論夫婦人血氣心痛者由臟腑虚血氣不調風冷邪氣乘於心也其痛發有死者有不死者成疹者心為諸臟之主而主於神其正經不可傷傷之痛者故痛發乍輕乍甚而成疹者也心腹痛者服菩薩湯姙娠心腹忽痛若不急治則痛擊胞絡必致胎動與人参湯二氣丸若因産而心腹内痛者緣氣血俱虚臟腑未實飲冷食生寒氣與熱氣相感是以為痛不治則變痢菩薩湯加紅花主之方治婦人心痛脾疼用荔枝核灰存性為末淡醋湯下亦治男子小児卒心痛􅑕粉湯下沒藥散治婦人血氣壅滯攻心疼痛沒藥半両當歸剉㣲炒赤芍藥牡丹皮桂心㯽榔川大黄剉碎㣲炒牛膝去苖已上各一両右為細散每服食前熱酒調下一錢地黄散治婦人血氣刺心腹痛脇防悶不欲飲食熟乾地黄當歸剉㣲炒木香乾膝搗碎炒令烟出白术桂心枳殻麩炒㣲黄去穣㯽榔已上各三分右為細散每服食前以醋調下一錢烏藥散治婦人血氣攻心痛發歇不定烏藥莪茂桂心當歸炒桃仁青皮木香右等分為末每服二錢熱酒調下當歸散治婦人血氣刺心痛靣無顔色四肢不和當歸剉㣲炒㯽榔桂心蓬莪茂白术各三分吳茱萸半両湯浸七遍焙乾㣲炒右為散每服三錢水一盞生薑半分煎至八分去滓不計時候稍熱服木香散出聖惠方治婦人血氣心痛及蚘蟲疰心痛並主之木香赤芍藥各一両鶴虱一両半當歸二両剉㣲炒㯽榔一両伏龍肝半両右為細散每服食前熱酒調下一錢九痛丸出危氏方治九種心痛一蟲二疰三風四悸五食六飲七冷八熱九瘧去來此悉治之又治連年積冷流疰心胸疼痛并療冷氣衝上落馬堕車瘀血等疾狼毒半両乾薑人参各一両附子炮去皮用三両茱萸炒一両巴豆去皮心膜炒乾取一両右為末煉蜜為丸如梧桐子大每服一丸空心温酒下卒中惡心腹脹痛口乾不能言者服二丸立安當歸散出聖惠方治婦人血氣攻心疼痛及一切積冷氣痛當歸三分剉㣲炒吳茱萸一分湯浸七遍焙㣲炒桂心三分右為細散每服食前以生薑熱酒調下一錢雞活香散治男子婦人九種心痛一切冷氣良薑剉細麻油炒桂心赤芍藥等分右為末每服二錢水一盞入鹽木瓜三片同煎七分温服鹽湯㸃亦可血氣疝瘕痛用熱醋湯調下忌生冷應痛散同不用桂心用醋煎醋湯㸃亦可牡丹丸出永類鈴方治婦人脾血積氣及心脾疼方見本門血氣心腹疼痛類菖蒲丸出永類鈴方治婦人脾血積氣及心脾疼菖蒲九莭者六両吳茱茰炮香附子炒去毛各四両右並剉細以釅醋五升煮乾為度焙乾為末以好神麴打糊為丸如梧桐子大每服空心食前以淡薑湯吞下四五十丸日三橘皮湯亦好黑金散治婦人血氣心疼香附子半斤髙良薑五両五靈脂三両右将香附子良薑以醋煮乾用灰炒為末酒下治婦人血氣衝心欲死者芫花三錢吳茱茰五両右為末炒薑酒下丁香湯治婦人卒心痛用室女頭髪一塊如雞子大燒灰入丁香七箇同研細熱酒調下半錢治婦人乆冷血氣攻心疼痛不止出聖惠方吳茱萸三両桃仁一両湯浸去皮尖右藥漫火同炒令熱即㨂出茱萸不計時候熱酒嚼下桃仁五枚靈苑花治婦人卒血氣心痛用生五靈脂為細末每服一錢沸温服治血塊横心呌噉其痛欲絶至危者如喫不得可灌下用其大順散三錢熱酒調服立止治血刺心痛婦人之疾用𤣥胡索不以多少新瓦炒㣲黄不可焦碾為細末每服三錢酒一盞煎至七分服不能飲者陳米飲調下不拘時候以酒調亦得二者不若酒煎快此藥屢驗王執中既效方𤣥胡索鹽炒乾蝎半之醋湯下紫金散治婦人血氣刺心痛用紫金藤一両米泔浸一宿焙乾為末每服二錢用鐡秤鎚燒紅淬温酒下治婦人血氣刺心痛不可忍用木香末酒服之不拘多少一方用青木香治婦人宿血氣心痛冷氣結聚用鬱金温醋磨服之治婦人氣血心痛破痃癖冷氣方見本門痃癖類又方出聖惠方治婦人乆冷血氣攻心疼痛不止用取豉一團如雞子大以青布裹繫定剪却剩燒令煙盡勿使灰搗羅為散不計時候以熱酒調下二錢治暴心痛用古鑑鼻燒酒淬服之治婦人急心疼出危氏方用南康真蛤粉為末細炒赤以酒調熱服愈阿魏丸出聖惠方治婦人血氣攻心疼痛及一切積冷氣當歸炒桂心青皮附子炮白术阿魏麫裹煨麫熟為度川芎各一両吳茱茰炮乾薑各三分㯽榔肉豆蔲煨延胡索莪茂各一両硃砂細研半両右為末先以醋一升煎阿魏成膏和藥末搗三五百杵丸如梧桐子大服二十丸食前温酒下腹内冷痛用芽香煮服之換金丸出百選方治婦人諸虛不足心腹疼痛當歸沒藥𤣥胡索川芎藁本人参白茯苓牡丹皮甘草白芍藥熟地黄白术白芷白薇各等分産寳方有桂心却無地黄右為細末煉蜜和丸如彈子大服一丸酒送下琥珀散出聖惠方治婦人血氣上攻心腹疼痛經絡不利黄痩虚羸琥珀細研麒麟竭木香沒藥桂心芸薹子吳茱茰湯浸七遍焙乾㣲炒各半両延胡索當歸剉㣲炒牡丹各一両麝香一錢細末青橘皮半両湯浸去白穣焙右為末細散入麝香研勻每於食前熱酒調下二錢大延胡索散出危氏方治婦人經病并産後腹痛或腹滿喘悶或癥瘕痞塊及一切心腹暴痛延胡索當歸赤芍藥京三稜川練子蓬莪茂官桂厚朴木香川芎各一分桔梗黄芩大黄各半両甘草一両㯽榔二錢右為末每服三錢水一鍾煎至六分去滓熱服食前日三服惡物過多去大黄官桂加入黄藥子染子龍骨各半兩如前法平人心胃急痛如本方煎服得利尤良一方無川芎異功散出永類銓方治婦人血冷氣痛心胸煩悶不思飲食四肢無力頭暈昏疼寒熱往來状似勞倦並皆治之牡丹芍藥白芷乾薑各三錢當歸𤣥胡索陳皮去白官桂烏藥川芎苦梗各半両右生為末每服二錢生薑三片酒水各半盞煎至七分温服初生産時宜服此藥每日三服七日後漸减服數至一月滿永無疾病服藥後些少腹痛不妨幸勿嘈囋沈香活血丸治血氣不調臟腑積冷臍腹疼痛肌體日痩沉香廣茂訶子去皮各一両肉豆蔲丁香良薑各一両麝香一分别研椒紅當歸白术附子炮去皮各一両右為末麝香和勻酒糊為丸如梧桐子大每服三十丸温酒下沒藥散出危氏方治一切血氣臍腹撮痛及産後惡露不行児枕塊痛宜服血竭沒藥桂心當歸蒲黄紅花木香延胡索乾漆赤芍藥各等分右等分為細末每服二錢熱酒調下食前若血塊衝心痛甚危者以大順散三錢熱酒調服立止五經湯出百一選方治婦人諸虚不足心腹疼痛熟乾地黄半両人参桂心半夏湯洗七遍白芍藥阿膠麥門冬各二錢半吳茱茰湯浸七次牡丹皮當歸各二錢半右為末每服三錢水一盞生薑五片煎至七分温一方有川芎甘草無熟乾地黄海藏當歸丸出濟生抜萃方治三隂受邪心臍少三腹疼痛氣風等證四物湯各半両防風獨活全蝎各半両續斷一両苦楝𤣥胡各七錢木香丁香茴香一両炒右為細末酒糊為丸如梧桐子大空心温酒下三五十丸大效𤣥胡索湯出危氏方治婦人室女七情傷感遂使血與氣併心腹作痛或連腰脇或引肩背上下攻刺甚作搐搦經候不調但是一切血氣疼痛亦可服之當歸去蘆頭酒浸剉炒𤣥胡索炒去皮蒲黄赤芍藥官桂不見火各半両片子薑黄洗乳香沒藥木香不見火各三錢甘草炙二錢半右㕮咀每服四錢水一盞半煎至七分生薑七片去滓食前温服吐逆加半夏橘紅各半兩瑞金散治婦人血氣撮痛月經不行預先嘔吐疼痛及月信不通片子薑黄四両牡丹皮莪茂紅花當歸赤芍藥川芎桂心延胡索右為末每服二錢水一盞酒三分煎七分温服日三次延胡索散治婦人血氣攻心腹疼痛延胡索當歸川芎桂心各三両枳殻木香赤芍藥桃仁各半両熟地黄一両右㕮咀每服三錢水一盞薑三片煎至七分去滓熱服琥珀散治婦人血氣攻心腹躁煩悶亂疼痛不止及産後惡露不行児枕塊痛琥珀沒藥當歸炒赤芍藥牡丹皮蒲黄延胡索莪茂桂心各等分右為末每服一錢温酒調下一方加血竭紅花木香乾漆無丹皮琥珀莪茂等分紫金散治婦人血氣相摶心腹急痛一切疼痛不可忍者當歸酒浸𤣥胡索川芎肉桂各半両香附子烏藥紫荆皮各一両木香煨甘草各一錢右為細末每服二錢熱酒㸃服立效霹靂食下亦得治婦人一切血氣疼痛如神烏雞煎當歸川芎附子茯苓白术赤芍藥白薑地黄官桂右各一兩為㕮咀用烏雞一隻去頭足肚将藥盛雞肚内用布袋盛之好酒醋各五升砂瓶煮剩下一盞留打糊為丸如梧桐子大每服三十丸温酒鹽湯送下食前八僊散治婦人血氣心腹疼痛立驗當歸厚朴芍藥枳殻製人参各四両甘草茯苓各五分肉豆蔲二分右為末水二升煎取八合空心三服牡丹散治婦人乆虛羸痩血塊走疰心腹疼痛不思飲食牡丹皮桂心當歸延胡索各一両莪茂牛膝赤芍藥京三稜一両半右為粗末每服三錢水一盞酒半盞煎七分温服乳香散治婦人乆冷血氣心腹疼痛乳香一分没藥木香吳茱茰湯浸七遍焙乾㣲炒硇砂細研各一分當歸剉㣲炒芎藭各三分桂心半両右為細散每服食前熱酒調下一錢木香丸治婦人血氣心腹疼痛木香半両肉豆蔲去殻川大黄剉碎㣲炒㯽榔乾薑炮製剉蓬莪茂香墨各一両巴豆一分去皮心研紙裹壓去油右為末入巴豆同研令勻醋煮麫糊為丸如菉豆大每服於食前以温酒下五丸粥飲下亦得神聖北亭丸治婦人積年血氣攻心刺疼痛不可忍者及多方醫療不瘥急宜服此大有竒效又名靈苑丸北亭去石焙没藥木香當歸各一分芫花蓬莪茂各半両巴豆去皮心膜四十粒右先研北亭没藥巴豆如粉用好醋三升同煎如稀膏然後将餘四味為細末入於膏内摶合成塊用新瓦合盛之臨時加减丸數用酒醋各半盞煎數沸通口服不得嚼破仍須喫盡酒醋立瘥或男血氣亦依前方服食如急喉閉者男左女右以一丸鼻中嗅之立愈原方云臨時加减丸丸未分大小服法又無數目古人亦鹵莾也既有北亭芫花巴豆合當丸如菉豆大每服只五丸沒藥丸治婦人血氣攻心腹疼痛經脉不調口乾燥沒藥半両木香㯽榔蓬莪茂硇砂細研當歸剉㣲炒各一両朱砂半両細研右為末用米醋熬硇砂成膏和丸如菉豆大不計時候以熱酒下十丸沒藥散治婦人血氣不利攻心腹疼痛沒藥當歸剉㣲炒琥珀桂心各一両木香半両芍藥三分麝香一分細研右為細散入麝香同研令勻每服熱酒調下二錢日三四服内炙丹治臟腑乆冷中焦停寒心腹臍下疼痛肢莭倦怠心悸怔忪食少惡心蓽撥桂心乾薑炮用舶上硫黄細研金釵石斛細剉酒浸各半両附子炮去皮臍澤蘭葉各一両右為細末麫糊為丸如梧桐子大煆過朱砂為衣每服三十丸至五十丸煎艾葉鹽湯空心下蓬莪茂丸治婦人乆積血氣風冷經候不調心腹疼痛蓬莪茂一両牛膝去苖没藥當歸剉㣲炒木香桂心各三分硇砂一両别研右為末用釅醋煎硇砂成膏入藥末和丸如梧桐子大每服食前以熱酒下十丸紅花丸治腹中血氣刺痛月事不通用紅花子一升為末以好酒一升八合拌了曝乾再為末用蜜和丸如梧桐子大空心酒下四十丸一方為散每服三錢空心温酒服治女子婦人患血氣腹腫痛用山豆根為末三錢熱酒下空心服之軟金花丸治胸心腰腹急痛或淋閟并産前後經病刺痛血氣勞傷往來寒熱四肢困倦夜多盗汗者兼治血積食積當歸半両焙乾漆生用巴豆去殻各二錢斑蝥生全用輕粉硇砂粉霜各一錢右為末同研細棗肉為膏旋丸如菉豆大每服一丸新水下病甚者加服看虚實治婦人血氣刺痛大小腹痛並血脉不調走疰疼痛並皆治之川當歸白芍藥各一両香附子半斤炒去毛山慈姑二両熟地黄二両甘草一両右㕮咀每服三錢水一盞烏梅一箇荆芥少許同煎七分空心温服如腹中冷痛不止者加阿膠二片同煎立效蘇沉麝香丸治諸血氣痛不可忍血竭沒藥沉香辰砂各一分木香麝香各半分右生為末磁器熬生甘草膏丸如皂子大每一丸薑鹽湯嚼下産後血痛氣痛并主之亦治脾痛硇砂丸治婦人血氣攻心腹疼痛宜服此行經脉利氣血立效硇砂水銀琥珀朱砂麝香硫黄各一両右以硫黄結成砂子都研令極細用酒煎狗膽一枚為膏和丸如梧桐子大每服温酒下五丸加减四物湯治婦人血氣不足肢體乏力或瘀血腹痛或下血過多當歸川芎芍藥乾薑炒各半両南木香甘草炒各二錢半右㕮咀剉散每服三錢食前煎服若腹不痛則無瘀血更加人参又能益其血也治婦人血氣撮痛芸薹子隔紙炒半両沒藥三錢赤芍藥當歸莪茂各一両右為末每服三錢熱酒調下沉香散治婦人一切血氣刺痛不可忍者及男子冷氣痛並治之沉香木香當歸白茯苓白芍藥各一錢右㕮咀每服一錢水三盞於銀石器内不用銅鐡器文武火煎數沸入全陳皮一箇又煎十數沸入好醋一盞又煎十數沸入乳香沒藥如皂角子大一塊同煎至一盞去滓通口服不拘時候菩薩湯治産後胎前心腹痛木香不見火半両桂枝不見火七錢半當歸三錢酒浸去蘆赤芍藥半両甘草二錢半右㕮咀每服三錢水酒各半盞煎七分熱服不拘時牡丹煎治婦人血膈牡丹苦参貝母去心𤣥胡索白芍藥右等分為末煉蜜丸如梧桐子大每服十五二十丸米飲吞下無時候烏藥散治婦人血氣上攻心腹疼痛不可忍神情悶亂烏藥木香桂心青橘皮湯浸去白穣焙蓬莪茂已上各二両右為細末散每服生薑半兩拍碎黒豆半合同炒令豆熟入童子小便一盞煎五七沸瀘去滓調下立止芸薹子治婦人血氣痛不可忍芸薹子紅花五靈脂延胡索各半両三稜莪茂各一分右為末每服二錢熱酒調下當歸丸治婦人血氣不和心腹疼痛當歸二両㣲炒硇砂一両别研桂心沒藥各一両蓬莪茂二両右為末用好酒醋大盞銀器内漫火熬􅗠砂成膏入藥末和丸如梧桐子大每日空心及晚食前以醋湯調下十丸沒藥散治婦人血氣疼痛不可忍者紅花沒藥當歸延胡索炒右等分為末每服二錢童子小便酒水各半盞同煎至六分熱服只用秤錘淬過調亦可常服只用温酒調下二錢治月經欲來前後腹中痛手拈散治婦人血氣刺痛不可忍者亦治諸般氣痛草果煨𤣥胡索炒五靈脂㨂去沙石炒各一両沒藥五錢右為末酒調三二錢服治婦人血氣腹痛經候或多或少蔓荆子香附子蘹香子晚蠶沙各等分右㕮咀炒焦酒淬去滓服未愈再服即愈菖蒲散治婦人血氣痛石菖蒲良薑桂心各一両香附子二両右為末熱湯調下二錢治婦人血氣腹内滿以草蒿秋冬用子夏春用苖並搗絞汁服亦曝乾為末小便冲服如覺冷用酒煮服破經湯治婦人血氣不行腹臍疼痛巴豆七箇苦葶藶三錢皂角二錢右為末煉蜜和丸如彈子大每服一丸先用麻絲纒部定坐一夜不行再一丸如覺寒熱取下赤白水再服一丸取行一方不用皂角後四物湯補之抽刀散治婦人一切冷氣血大川烏頭炮去皮炒黄色一両五靈脂芸薹子隔紙炒良薑各半両右為末酒醋各半盞煎至七分温服治婦人室女血氣刺痛不可忍日夜呌喚可怜者一服見效芸薹子肉桂良薑沒藥各等分右乾焙為末每服二錢乳香調下熱服不拘時候延胡索散治婦人血氣走作疼痛不可忍及月水不利靣色痿黄喫食减少及産後諸疾皆治之延胡索三稜生當歸去蘆頭酒浸莪茂醋浸㣲炒等分右為末每服二錢空心温酒調下如血氣發盛者及月水不調並用童子小便酒紅花同煎調下只三服瘥矣或後用黄散子化通珍珠丸一丸服之滿月百病不生當歸良薑散補養血氣去心腹疼痛脇脹滿經絡不調或帶赤白腰脚冷痛一切痼病髙良薑五両當歸桂去皮各三両厚朴去皮薑製二両右乾用紗羅子羅每服二錢水一盞入艾十葉同煎至七分去滓食前熱服之小烏沉湯調中快氣治心腹刺痛烏藥一両去皮甘草一分香附子砂盆内淅去皮毛焙乾穣二両右為細末每服一錢鹽湯㸃不拘時候金不換散治婦人血刺痛不可忍者三稜莪茂並細剉巴豆去皮各一両右以釅醋一碗熬醋成膏為度先将糠固濟一鑵子隂乾後将藥并醋膏一處置鑵子中外用泥裹以平瓦子一片盖之用炭火五七片煆常看守却後煙急出即取出㸔通黒則止不得燒過了便入乳鉢内細研為末有患者炒生薑酒調一錢服之八僊散治婦人血氣心腹疼痛立驗棕櫚二両當歸一両并剉碎一處燒成炭細研麝香一錢細研右同研令停每服一錢温酒調下三神丸治室女血氣相摶腹中刺痛引心端經行澀少或因經事不調以致疼痛橘皮二両𤣥胡索醋煮去皮當歸去蘆酒浸剉㣲炒各一両右為細末酒煮米糊為丸如梧桐子大每服七十丸加至一百丸空心艾湯下米飲亦得捉痛散治婦人血氣痛𤣥胡索一両當歸桂心各半両右為末酒調二錢蠲痛散治婦人血氣刺痛荔枝核燒存牲半両香附子去毛炒一両右為細末鹽湯米飲調下二錢不拘時候治婦人血氣痛遊走及腰痛蓬术切片乾漆研碎各二両右同炒令漆焦香取出漆不用只用蓬术為末温酒調下三錢腰痛胡桃酒下遊走痛冷水調下治婦人血氣刺痛用香附子一二斗皆可舂令極凈用炒鑵盛米醋者令極乆一日夜取出炒乾為末一兩用甘草三錢為末鹽湯調下亦治血崩不止治婦人血氣刺痛神麯香附子各炒赤右等分為末熱酒下治老婦血氣痛不可忍老松皮用醋煮乾延胡索右為末秤錘燒紅淬酒調下土神丸治婦人血氣不和作痛不止及下血無時月水不調宜服一名蓽撥丸眞蒲黄