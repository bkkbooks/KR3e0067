body:
  text: 普濟方卷一百六十七明周王朱橚撰痰飲門痰逆不下食附論夫痰逆不下食者由胸膈壅滯津液不通痰水結聚不能消散流行於脾脾性惡濕得水則脹滿心胸不利多痰而逆故令不下食也方黃耆散出聖惠方治痰止逆和胃思食調利五臟黃耆一兩銼半夏半兩湯浸七次去滑人參三分去蘆頭桂心半兩陳橘皮三分湯浸去白穰焙赤茯苓三分白术三分甘草三分枳殼三分麩炒微黃去穰芎藭半兩訶梨勒皮三分右為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候熱服枇杷葉散出聖惠方治痰逆溫胃口思飲食青橘皮半兩湯浸去白穰焙草豆䓻半兩去皮前胡一兩去蘆頭枇杷葉一兩拭去毛炙令微黃半夏一兩湯洗七遍去滑人參三分去蘆頭赤茯苓一兩大腹皮半兩銼白术一兩厚朴一兩去粗皮塗生薑汁炙令香熟右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候熱服丁香散出聖惠方治痰積心胸氣噎嘔逆飲不下丁香一兩陳橘皮一兩湯浸去白穰焙赤茯苓一兩半夏半兩湯洗七遍去滑人參三分去蘆頭雞蘇三分麥門冬三分去心甘草一分炙微赤銼右為散每服四錢以水一中盞加薑半分煎至六分去滓不拘時溫服木瓜散出聖惠方治痰逆不思飲食化涎益脾胃乾木瓜一兩高良薑半兩銼陳橘皮半兩湯浸去白穰焙桂心半兩訶梨勒皮半兩沉香半兩厚朴半兩去粗皮塗生薑汁炙令香熟甘草一分炙微赤銼半夏半兩湯洗七遍去滑右為散每服三錢以水一中盞入生薑半分棗二枚煎六分不計時候熱服療心胸中痰積氣噎嘔逆食不下柴胡六分橘皮六分茯苓十分人參八分麥門冬八分去心雞蘇八分生薑四分檳榔仁四分末湯成下右切以水八升煮取二升五合濾去滓分溫三服時相去如人行七八里進一服未瘥三日更服一劑以利為度忌酢物生冷油膩粘食檳榔散出聖惠方治胸中痰壅嘔逆不納飲食四肢少力腹內小鳴檳榔三分半夏一兩湯洗七遍去滑赤茯苓一兩白术二兩青橘皮半兩去白穰湯浸焙草豆䓻半兩去皮前胡一兩去蘆頭杏仁二分湯浸去皮尖雙仁麩炒微黃右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服治痰逆不能下食調和胸膈宜服此方出聖惠方前胡一兩去蘆頭半夏半兩湯洗七遍去滑木香三分赤茯苓三分白术一兩陳橘皮半兩湯洗去白穰焙厚朴三分去粗皮塗生薑汁令香熟右為散每服四錢水一中盞入生薑半分煎七分去滓不計時候溫服治痰逆暖胃口思飲食宜服此方出聖惠方白礬一兩燒灰半夏半兩湯浸七遍去滑乾薑半兩炮製銼右為末以生薑汁煮麵糊為丸如桐子大每服不計時候以薑棗湯下二十丸木香丸一名消痰丸出聖惠方治痰逆暖脾胃令思飲食方見本門痰癖類三聖散出儒門事親防風三兩去蘆藜蘆去苗心加減用之或一兩或半兩或八分瓜蒂三兩揀淨研碎以紙捲定連紙銼細去紙用粗羅羅過另放末將渣炒微黃次入末一處同炒黃用右為粗末每服約半兩以虀汁三茶盞用二盞煎三五沸去虀汁另入一盞煎至三沸却將原二盞一處熬沸去渣澄清放溫徐徐下之不必盡劑以吐為度半夏碁子出十便良方治久疾溫冷不下食嘔吐不止停飲在胃中右以半夏五兩洗搗羅為末取二錢以白麵一兩水和搜切如碁子水煮麵熟為度生薑醋調和食之稀涎散出儒門事親豬牙皂角不蟲蛀者去皮弦稱一兩炙用碌礬二兩晉礬半兩藜蘆半兩右為末每服半錢或一二錢斡開牙關漿調下灌之治痰壅嘔吐逆心胸滿悶不下飲食出本草用厚朴一兩塗生薑汁炙令黃為末非時粥飲調下二錢匕療胸中多痰頭痛不飲食出本草右用礬石一兩以水二升煮取一升內蜜半合頓服須臾吐出涎痰如未吐當飲少熱湯即吐一方治痰涎用白礬痰飲食不消附論療源夫痰水者結聚在於胸腑膀胱之間久而不散流行於脾胃惡濕得水則脹脹則不能消食也或令腹裏虛滿或水谷不消化或嘔逆皆其候也方御愛紫宸湯出德生堂解宿酒嘔噦惡心睡不進飲食良薑二兩丁香二兩甘草二兩陳皮二兩藿香一兩官桂一兩茯苓一兩檀香一兩木香半兩砂仁一兩葛花一兩乾葛一兩右㕮咀每服四錢水一盞半煎至八分去滓不拘時候服髙良薑散出聖惠方治痰飲破冷氣化宿食髙良薑三分銼肉桂一兩去皺皮厚朴一兩去粗皮塗生薑汁製白术一兩陳橘皮三分湯浸去白穰焙木香三分赤茯苓一兩訶梨勒皮一兩大腹皮三分銼人參一兩去蘆頭草豆䓻半兩去皮甘草半兩炙微赤銼右為散每服五錢水一盞入生薑半分煎至五分去滓不拘時候溫服白术散出聖惠方治氣膈痰飲兩肋下痛食不消化白术一兩柴胡一兩去苗赤芍藥三分檳榔一兩陳橘皮三分湯浸去白穰焙厚朴一兩去粗皮塗生薑汁炙令香熟桔梗一兩去蘆頭訶梨勒皮三分桂心半兩甘草一分炙微赤銼右為散末每服五錢以水一盞入生薑半分棗三枚煎至五分去滓不計時候溫服枳實散出聖惠方治胸中痰飲冷熱不調食不消化體重多卧枳實二兩麩炒微黃附子一兩炮製去皮臍紫蘇莖葉三分白术一兩人參三分去蘆頭川大黃三分銼碎微炒大腹皮三分銼麥門冬三分去心半夏三分湯浸七次去滑甘草一分炙微赤銼吳茱萸一分湯浸七遍焙乾微炒右為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不拘時候溫服訶梨勒皮丸出聖惠方治痰飲心胸積滯氣不宣通飲食不消訶梨勒皮一兩神麴三分炒微黃前胡一兩去蘆頭枳殼三分麩炒微黃去穰桂心一兩白术一兩人參三分去蘆頭檳榔一兩木香一兩川大黃一兩銼碎微炒右為末煉蜜和丸搗三二百杵丸如梧桐子大每服不計時候以生薑橘皮湯下三十丸前胡丸出聖惠方療心頭痰積宿食水嘔逆不下食前胡五分白术五分甘草五分炙旋蕧花三分豆䓻仁三分人參六分麥門冬六分去心枳實四分炙大黃四分右搗篩蜜和為丸如梧桐子大空心酒下二十丸漸加至三十丸日再服不甚利忌桃李雀肉海藻菘菜熱麵炙肉魚蒜粘食生冷等物或用生薑荆芥湯下亦可前胡散出聖惠方治脾胃虛冷痰飲結聚飲食不消前胡一兩去蘆頭丁香三分陳橘皮一兩湯浸去白穰焙大腹皮一兩銼枇杷葉三分拭去毛炙微黃草豆䓻一兩煨去皮半夏三分湯洗七遍去滑甘草半兩炙微赤銼乾薑半兩炮製銼右為散每服五錢以水一大盞入生薑半分煎至五分去滓不拘時候溫服半夏散出聖惠方治痰飲積聚食不化半夏一兩湯浸七次去滑赤茯苓一兩訶梨勒皮一兩紫蘇莖葉一兩陳橘皮一兩湯浸去白穰附子一兩炮製去皮臍枳實半兩麩炒微黃皂角一挺去皮塗酥炙令焦黃去子甘草半兩炙微赤銼右為散每服五錢以水一大盞入生薑半分煎五分去滓不計時服人參散出聖惠方治胸中積聚痰飲時有嘔逆胃氣不和食不消化人參一兩去蘆頭半夏一兩湯洗七遍去滑陳橘皮一兩湯洗去白穰焙右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服療胸膈痰飲食噉經時則併吐出食皆不消其人初空腹一兩日驟食還服吐之極不便此由痰飲聚下絶不通服此丸宣通下氣吳茱萸二兩白术二兩澤瀉二兩芍藥二兩漢防己二兩赤茯苓二兩川大黃二兩右搗篩蜜和丸如梧桐子大每服二十五丸忌桃李仁雀肉酢物治胸多有痰頭痛不欲食及飲酒瘀阻作痰方肘後方右用桂四兩甘草二兩附子一枚炮水六升煮取二升分為三服暖胃暖胃除痰進食消食方護命方木香一分肉豆䓻二箇去皮半夏半兩去臍孔薑汁浸熬令黃色為末右為末以蒸餅丸如芥子大酒食後以津液下五丸至十丸赤茯苓散治痰飲乾嘔食不消化及脾胃胸膈方見本門留飲類一名赤茯苓湯治痰飲飲食不消化乾嘔人參一兩旋蕧花一兩橘皮一兩細辛一兩澤瀉二兩白术二兩杏仁二兩枳實二兩茯苓三兩柴胡三兩生薑三兩半夏三兩芍藥三兩右㕮咀以水九升煮取二升七合分三服日三驅痰飲子治痰飲神效如人頭痛背痛飲食嘔惡皆痰飲之證天南星一兩切作十片湯浸七次半夏一兩湯洗七次青皮一兩去白陳皮一兩去白赤茯苓草果子去殼稱切碎右六味㕮咀每服二錢水一鍾生薑七片棗子一枚煎七分通口服不拘時候如飲酒先服一服酒後再一服或以次日夜醒又一服永無痰飲膈痰結實附論夫膈痰者氣不降津液痞澀水飲之氣聚於隔上久而隔食故令氣道奔迫痞滿短氣不能卧甚者頭目旋暈常欲嘔吐是也聖惠方論云夫痰結實者由痰水積聚於胸腑間冷氣相摶結實不消故令心腹痞滿氣息不利頭眩目暗常欲嘔逆故言痰結實也方百合湯治痰飲上焦有熱壅塞不利百合兩半枳殼兩半去穰麩炒麻黃兩半去根節天雄兩半炮去皮臍欵冬花兩半昆布兩半洗去醎貝母一兩去心當歸一兩切焙五味子一兩紫苑一兩去苖土白石脂一兩黃連一兩去鬚黃芩半兩去黑心桂半兩去粗皮旋蕧花半兩焙右為㕮咀如麻豆大每服五錢水一盞半入生薑三片同煎至八分去滓溫服茈胡地骨皮湯治膈痰結實氣不升降茈胡去苗地骨皮赤茯苓去黑皮芎藭大黃葛根銼芍藥茵陳蒿甘草當歸切焙升麻各等分如心燥加麥門冬一兩右搗篩每服三錢水一盞半食後臨卧服去滓金箔丸治膈痰結實咽喉不利咳嗽喘急龍腦半兩研珍珠半兩研末金箔十五片研牛黃半兩研麝香半兩研馬牙硝半兩研蓬砂半兩丹砂一兩研甘草末二兩右合研令勻煉蜜和丸如雞頭大每服一丸食後溫薄荷湯或人參湯嚼下前胡散治胸中宿食痰結食飲減少或發寒熱卧欲起前胡一兩去蘆頭旋蕧花半兩桂心半兩人參一兩去蘆頭川大黃一兩銼碎微炒甘草半兩炙微赤銼半夏一兩湯浸七遍去滑檳榔一兩杏仁半兩湯浸去皮尖雙仁麩炒微黃右為散每服五錢水一大盞入生薑半分煎五分去滓不計時溫服八珍丸治膈痰結實胸不利喘嗽嘔逆丹砂半兩研犀角二錢鎊羚羊角二錢鎊牛黃二錢研茯神二錢去本搗末龍腦二錢天南星一錢牛膽內製隂乾蓬砂一錢研右合研令勻煉蜜和丸如雞頭實大每服一丸食後人參荆芥湯嚼下丹砂丸治膈痰結實頭旋惡心肢節疼痛丹砂半兩研半夏一兩湯浸七遍焙天南星一兩炮蝎稍一兩炒白附子一兩炮白殭蠶一兩炒蓬砂一錢研牛黃一錢研右為末合研令勻麵糊和丸如梧桐子大每服五七丸食後荆芥湯下銀粉丸治膈痰結實滿悶喘逆粉霜半兩鉛白霜半兩白礬半兩熬令汁枯水銀半兩鉛半兩與水銀結炒天南星一兩半炮半夏一兩湯洗七遍去滑丹砂一兩研右各研為末合研令勻麵糊和丸如梧桐子大每服三丸食後薄荷湯下小兒丸如麻子大犀角湯治膈痰結實頭目昏暈不思飲食犀角一分鎊人參一分黃芩一分去黑心茈胡一分去苗甘草半分炙白茯苓半兩去黑皮麥門冬半兩去心焙升麻半兩右細銼每服半兩水二盞煎至八分去滓食後服木香丸一名香橘丸治膈痰結實胸膈不利頭目昏眩不思飲食木香一分牽牛子一兩炒半夏一兩湯洗七次焙白礬一兩熬令汁枯檳榔半兩青橘皮半兩湯浸去白入鹽炒右為細末煮棗肉和丸如梧桐子大每服二三十丸食後生薑湯下治痰膈食心胸壅滯常欲嘔逆不能下食宜服此藥出聖惠方半夏一兩湯浸七遍去滑郁李仁一兩湯浸去皮微炒旋蕧花半兩前胡一兩去蘆頭桔梗半兩去蘆頭枳殼半兩麩炒微黃去穰右為散每服三錢以水一大盞入生薑半分煎至六分去滓不拘時候溫服四味半夏丸治痰膈結實寬利胸膈半夏四兩生