溫服食前日三服半夏湯治冷痰消食溫胃止逆半夏二兩湯浸去滑焙乾為末薑汁和作麴焙乾杏仁二兩去皮尖雙仁麩炒研木香半兩桂心一兩去粗皮陳橘皮一兩甘草一兩炙銼乾薑三分炮右搗篩每服三錢水一盞生薑三片煎至七分去滓溫服前胡散出聖惠方治痰盛腹脅脹滿嘔逆不下食胸中冷前胡一兩去蘆頭半夏一兩湯洗七次去滑人參半兩去蘆頭桂心半兩乾薑半兩炮製銼陳橘皮一兩湯浸去白穰焙白术半兩右為散每服五錢水一大盞生薑半分棗三枚煎至五分去滓不拘時候溫服泄白丸出和劑方治膈脘脹滿痰涎不利頭目昏暈吐逆痰沫生硫黃一兩别研天南星一兩生用半夏一兩生用盆硝半兩玄精石半兩附子一箇六錢重者生去皮臍右為末入細麵三兩令停勻水和為丸如梧桐子大每服三十丸沸湯內煮令浮漉出生薑湯送下食後服蓽撥散治胸胸冷痰上焦客熱心下停飲時發醋心咽喉欲唾乾嘔而渴蓽撥三分桂三分去粗皮麻仁三分高良薑三分人參一兩白术一兩甘草半兩炙銼乾地黃一兩半炮厚朴一兩半去粗皮生薑汁炙右為散酒調一錢日再服如要丸即煉蜜和丸如小豆大溫酒下二十丸大半夏湯出千金方治痰冷癖飲胸膈中不利半夏一升白术三兩生薑八兩茯苓三兩人參三兩桂心三兩甘草三兩附子三兩右八味㕮咀以水八升煮取三升分作三服厚朴丸治冷痰不消胸膈不利解酒食毒厚朴八兩去粗皮切用生薑十兩細切同搗細焙乾慢火炒桂心五兩去粗皮乾薑四兩炮蜀椒二兩去目并閉口者炒出汗右為細末煉蜜和丸如梧桐子大每服二十丸溫熟水下治脾胃米飲下中酒吐酒吐逆生薑湯下人參丸治咯唾冷痰膈脘不利不思飲食人參半夏湯洗去滑白礬燒令枯乾薑炮製右等分為末將皂角五挺去皮子挼濾去汁煮成膏和上件藥為丸如梧桐子大每服二十丸溫水下不拘時候法製半夏方治冷痰利胸膈一應諸痰悉治之半夏半斤湯洗四十九次用薑汁二升浸一日焙乾丁香皮三兩末白礬四兩草豆䓻二兩半去皮為末右同入酒內浸春夏七日秋冬半月候日滿只取半夏於溫湯內浴過火焙乾不計時候嚼下三五粒用臘茶下或酒下亦得小半夏湯治病心腹虛冷遊痰氣上胸膈不下食或嘔逆者半夏一升生薑一斤桂心三兩甘草一兩右㕮咀以水七升煮取二升半分三服千金丸出百一選方治中冷停食不散痰實不入食硫黃二兩通明者别研如粉白茯苓二兩乾山藥二兩附子一兩去皮臍生用半夏一兩湯浸去滑青皮一兩去白右為細末拌勻湯浸炊餅為丸或用淡麵糊為丸如梧桐子大每服三十丸至五十丸空心食前服一方治冷痰桂胡椒白芥子黑芥子大戟甘遂右件等分水糊為丸如梧桐子大每服十丸薑湯下丁香半夏丸一名檳榔丸出拔萃方治心下停飲冷痰頭目昏暈睡卧口中多涎檳榔二分丁香一兩半夏一兩細辛半兩乾薑半兩人參右為細末生薑汁煮糊為丸如梧桐子大每服三十丸薑湯下日三服食後白豆䓻湯治胃虛氣寒飲食無味嘔逆冷痰噫時聞食氣白豆䓻去皮檳榔銼半夏為末薑汁和作餅焙乾右為散每服二錢水一盞生薑三片煎至七分去滓溫服溫中化痰丸出和劑方治證與前一切痰飲類溫中化痰丸同乾薑一兩炮半夏一兩煮細辛半兩去葉洗胡椒半兩白术二兩焙右為末薑汁打糊為丸如梧桐子大每服三十丸至五十丸湯飲不拘時候強中丸一名強中二薑丸出三因方治胃脘虛寒冷痰留滯痞塞不通氣不升降口苦無味不思飲食亦主溫脾胃消寒痰茶積高良薑一兩細銼乾薑一兩炮淨拭陳皮一兩去白青皮一兩去穰半夏二兩湯洗去滑右為末用生薑自然汁煮麵糊為丸如梧桐子大每服二三十丸生薑湯下中滿氣痞服之甚妙一方有南星半兩炮一方不用生薑汁丸鹽湯送下空心服一法前藥並不炮製吳茱萸湯治胸膈冷痰心下煩滿欲吐不下食吳茱萸二兩湯洗焙炒半夏二兩湯洗七次切焙桂二兩去粗皮人參二兩甘草一兩炙右㕮咀如麻豆大每服五錢以水一盞半入生薑半分切大棗二枚煎取一盞去滓溫服日三礬石丸治冷痰溫胃利膈思食白礬一兩枯研芎藭一兩乾薑一兩炮半夏一兩碎銼薑汁浸透炒右為細末煮棗肉和丸如梧桐子大每服十五丸至二十丸生薑湯下不拘時候薑桂丸出拔萃方治寒痰咳嗽脈沉面色黧黑小便急痛足寒而逆心多恐怖南星一兩洗半夏一兩洗官桂一兩去粗皮右為細末蒸餅為丸如梧桐子大每服三五十丸生薑湯下食後局方中胡椒理中丸仲景吳茱萸湯亦可如心下痞悶者加枳實五錢如身熱甚者加黃連五錢如體重加茯苓白术各一兩如氣逆上者加苦葶藶五錢如氣促者加人參桔梗各五錢如浮腫加郁李仁杏仁各五錢如大便祕加大黃五錢如痰而能食者大承氣湯微下之如痰而不能食者厚朴湯主之一方食後用防己丸或玉粉丸亦可丁香半夏丸出王氏博濟方治胃冷有痰不思飲食丁香一分白礬半兩研半夏二兩水浸七日每日早換水日足取出切曝乾右為細末薑汁和丸如小豆大每服二十丸薑湯下食後一方鹽湯下如膈上有痰涎只服三服墜下立見效竒效湯治冷痰壅盛胸膈不利胃口冷脾氣弱嘔吐痰涎木香半兩附子二兩炮製去皮臍半夏二兩湯浸七次切焙右㕮咀銼如麻豆大每服三錢水一盞半生薑半分切大棗二枚煎至一盞去滓空心溫服蓽撥丸治冷痰飲食不下膈脘不快蓽撥一兩炒乾薑半兩炮訶梨勒三分煨去皮右為細末煮麵糊和丸如桐子大每服二十丸薑湯下不拘時候治冷痰飲胸膈氣滿吐逆不思飲食宜服此方一名半夏散出聖惠方半夏二兩湯洗七次去滑乾薑一兩炮製銼丁香一兩右為散不計時候以薑湯粥飲調下一錢倍术散治酒癖五飲停水在心下或兩脅胃中膈間動搖有聲白术二兩附子一兩炮去皮臍右銼散三服水一大盞生薑十片煎空心服臟腑微動即安一方除附子加乾薑肉桂各一兩為末蜜和丸如桐子大每服二十五丸米湯下食前大效二生湯出傳信適用方專治寒痰胃冷附子生去皮臍半夏生用右各等分㕮咀每服四錢水二盞薑十片煎至七分去滓溫服空心入少木香煎佳一方去半夏用南星名附子湯薑附湯出千金方治痰冷癖氣胸滿短氣嘔沫頭痛飲食不化生薑八兩附子四兩生用四破右二味㕮咀以水八升煮取二升分四服又主卒風忌肉冷水等一方附子炮製一方治痰涎右用檳榔為末白湯點一錢服一方出聖惠方治冷痰飲惡心右用蓽撥一兩搗為末於食前清粥飲調半錢服胡椒理中丸出衛生家寶方治脾胃虛寒氣不宣通咳嗽喘急逆氣虛痞胸膈噎悶腹脅滿痛迫塞短氣不能飲食嘔吐痰水不止方見咳嗽門冷嗽類豆䓻湯出聖惠方治痰冷嘔逆胸膈不利飲食不下草豆䓻半兩去皮半夏半兩湯浸七次去滑焙陳橘皮三分湯浸去白焙右搗篩每服三錢水一盞生薑五片煎至七分去滓溫服不拘時候吳茱萸湯治冷痰吞酸吐水胸中不利吳茱萸一兩湯洗七次焙炒半夏一兩湯洗七次焙附子一兩炮製去皮臍右㕮咀如麻豆大每服三錢水一盞半生薑五片煎至五分去滓溫服不拘時候鐵刷湯出衛生家寶方治積寒痰飲嘔吐不止胸膈不快不下飲食半夏四錢洗草豆䓻三分丁香三分乾薑三分炮訶子皮三分生薑一兩右㕮咀用水五盞煎至二盞半去滓分三服相繼不拘時候吐不止加附子三錢生薑半兩薑麴餅子出十便良方治冷痰瘚生薑二斤切作片子以鹽二兩淹一宿焙乾半夏麴一兩半大杏仁三十枚甘草二兩丁香半兩右搗為末糯米糊丸為小餅子每以白湯嚼下三五餅白术散出保命集方治夏暑大熱或酒後飲冷痰濕不止胸不利白术茯苓半夏洗黃芩各等分右為粗末每服五錢至七錢水二盞入生薑十片煎至一盞去滓調陳皮末一錢神麴末一錢食後服法曰大熱大飲蓋酒味熱而引飲冷冷與熱凝胃胸中不能散而成濕故痰作甚者亦吐之吐後服五苓甘露燥濕去痰之劑順元散出醫方集成治氣虛痰盛不得睡卧氣壅痰瘚尤宜服之南星一兩炮川烏半兩附子半兩木香二錢半右㕮咀每服三錢水一盞薑十片煎熱服痰瘚方省風湯出衛生家寶方治痰瘚半夏八兩防風四兩甘草二兩右件同為細末分作四十服每服用水一大盞半薑二十片煎至七分去滓溫服不計時候一方用天南星代半夏導痰湯治痰瘚頭昏暈出傳信適用方半夏四兩湯浸七次天南星一兩細切薑汁浸枳實一兩去穰橘紅一兩赤茯苓一兩右為粗末每服三錢水二盞薑十片煎至一盞去滓溫服水玉湯出楊氏家藏方治眉稜骨痛不可忍者此痰瘚也半夏不拘多少湯洗七次切片子右㕮咀每服三錢水一盞半生薑十片煎至八分去滓溫服食後普濟方卷一百六十七
