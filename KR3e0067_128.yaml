body:
  text: 普濟方卷一百二十九明周王朱橚撰傷寒門辨傷寒熱病兩感證候夫熱病者皆傷寒之類也或愈或死其死皆以六七日間其愈皆以一日已上者何也夫巨陽者諸陽之屬也其脈連於風府故為諸陽主氣人之傷於寒也故病則為熱雖甚不死其兩感於寒而病者必死夫兩傷於寒病者一日則巨陽與少隂俱病故頭痛口乾煩滿而渴手太陽是小腸之經手少隂是心之經也二日足陽明與足太隂俱病則復滿體熱不食譫言足陽明胃之經足太隂脾之經三日則足少陽與足厥隂俱病則耳聾囊縮水浆不入口則不知人六日而死矣足少陽膽之經足厥隂肝之經也是為六經隂陽表裏者也陽為腑主表隂為臓主裏臓腑俱病故曰兩感三日而死者為一日兩經受故云兩感是表裏俱病故六日而死矣辨傷寒熱病不可治形候傷寒三部脈隂陽俱盛大汗出不解者不可治傷寒隂陽俱熱虛不止者不可治傷寒脈至乍數乍疎者不可治傷寒讝語妄語身熱脈浮大手足温者生脈沉細手足逆冷者不可治傷寒欬而上氣其脈散者不可治傷寒熱盛脈浮大者生沉小者不可治傷寒已得汗脈沉小者生浮大者不可治傷寒讝語直視而喘者不可治傷寒下利厥逆躁不能卧者不可治傷寒發熱下利至厥不反者不可治傷寒病惡寒踡而利手足逆者不可治傷寒五六日脈微細沉但欲卧汗出不煩時自吐利復煩躁不得卧寐者不可治傷寒六七日喘息髙者不可治傷寒發汗汗出若大灌發不可治傷寒洩而腹滿甚者不可治傷寒目不明熱不已者不可治傷寒老人嬰兒熱而復滿者不可治傷寒汗出嘔血者不可治傷寒舌本爛熱不已者不可治傷寒欬血而衂汗不出出不至足者不可治傷寒髓熱者不可治傷寒熱而痙者不可治傷寒熱病腰折瘈瘲齒噤者不可治傷寒下利後脈絶於手足厥冷脈不還不可治傷寒四逆惡寒脈不至其人不熱而燥者不可治熱病脈代者一旦死熱病二三日身體熱腹痛頭痛倀食飲如故脈直而疾者至八日不可治熱病三四日腹已下不得汗脈大疾者生脈細小難得者不可治熱病四五日頭不熱腹不痛而吐脈來微細至十二日不可治熱病七八日脈微小便如墨口乾脈代舌焦乾黑者不可治熱病七八日脈微小病人便血口中乾一日半而死熱病七八日脈不燥不數後三日中有汗三日不汗者死熱病八九日頭不痛身不痛目不赤色不變而反利脈來壘壘按不彈手時大心下堅者至十七日不可治熱病已得汗而脈尚躁盛此隂脈之極也死熱病脈常躁而不得汗者此陽脈之極也死脈盛躁得汗者生也熱病已得汗體熱不去者不可治熱病其人滚滚大熱脈細小者不可治熱病下利不止腹中痛甚者不可治辦可灸形證夫少隂病其人雖裏和其病惡寒者宜灸之少隂病吐利手足逆而發熱脈不足者灸其少隂夫吐下手足厥無脈者當其厥隂灸之不温反微喘者死傷寒六七日脈數手足厥煩躁不已灸厥隂不順者死辦不可灸形證凡微數之脈不可灸因熱為邪必致煩逆内有損骨傷筋血枯之患脈當汗解反以灸之邪無所去因火而盛病當愈重此為逆之治欲解者當發其汗而解也辦可火形證夫凡下利後下部中痛當温之宜炒枳實若熬鹽等􅀢之辦病不可火證夫傷寒寸口脈浮而弱即血氣虛衞氣微其脈浮則汗出如流珠衛氣微榮氣虛其脈浮汗出如油太陽病中風以火刼其汗風被火熱即冷血氣流泆常有潮熱身體枯發黄病陽勝即衂隂虚即小便難隂陽俱虚竭身體枯燥但頭汗出至頸而還腹滿微喘口乾咽爛或不大便其甚者噦手足躁擾循衣摸床若心下滿小便利者其人可治小便不利不可治夫傷寒脈浮而以火逼刼汗即亡陽必驚狂卧起不安夫陽病以火蒸之不得汗者其人必躁結若不結必下清血其脈躁者必發黄也夫太陽病而熨其背大汗必出火氣入胃胃中乾燥必發㤺語辦可水形證夫太陽病差後胃中乾燥不得眠睡渴欲飲當少與之即愈若嘔吐熱在膈上思水者與五苓散即飲水也夫傷寒七八日大渴欲食水然當與之常令不足勿意極也夫凡傷寒病能飲水者為欲愈也若不渴而强與之因此成禍者其數多矣夫水可除煩使胃和常須少與勿令多若還不與無由汗强與還因水致痾病非大渴不可與水渴不與水無由作汗則喘而殂也傷寒水為欲愈之候若渴者與之過多或小渴而强與之飲腹中熱少一不能消停飲作害者多矣曰水結曰喘悸曰咳噎曰咳噦曰下利曰小便不利安有不自水氣得之診視又職此太陽病發汗後大汗出胃中燥不得眠其人欲水當少與之胃和則愈厥隂病厥病渴欲飲水者與水則愈霍亂發熱頭痛身疼熱多飲水者與五苓散嘔吐條水結證見頭汗出條飲水多停心下氣上乗心則為悸水氣結於胸脇則為水結胸胃中虚冷則為冷嘔噦冷氣相搏為喧上迫於肺則為咳喘漬入腹中則為下利邪執所搏畜於下焦則為小便不利小腹滿而裏急溢於皮膚則為腫重飲水過多者五苓散導之辨不可水形證夫凡發汗後飲水水灌之其人必喘水藥不得入口入則為逆傷寒結胸為無熱證者宜與平和之藥若以水灌之益令熱不得出當汗而不汗即煩假令汗出後腹中痛可服和氣止痛之藥夫寸口脈浮大醫反下之此為大逆浮則無血大則為寒寒氣相搏即為腹鳴醫不知而反飲其水令汗大出水得寒氣必相搏其病必甚也夫傷寒五六日而渴欲食未宜與也為腹中熱氣尚少不能消之更作病深矣若大渴者宜與之也辦可温形證夫法冬宜熱藥夫凡病發熱頭痛脈浮數身有疼痛宜温其表夫病腹滿下利嘔吐身疼痛者宜温其表裏夫太陽病下利不渴其臟有寒當宜温之其人飲食入則吐手足寒脈弦遲此為中寒不可吐下也當温之夫少隂病其脈沉者急當温之下利不欲食者當宜温之下利脈遲𦂳為痛未止下利脈浮大者此皆為虛宜温之夫凡脈浮革者自腹鳴若渴之與水者必噦宜温之夫病下之後續得下利水穀不止身體疼痛急當救之裏宜温之與治平四逆附子湯諸温藥之輩辦霍亂病脈証并治第十三問病有霍亂何答曰嘔吐而利曰霍亂三焦者水穀之道路邪在三焦則吐而不利在下焦則利而不吐邪在中焦則既吐且利以飲食不節寒熱不調清濁相干隂陽乖隔遂成霍亂輕者止曰吐利重者揮霍撩亂名曰霍亂問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂自吐下又利止復更發熱也發熱頭痛身疼惡寒者本是傷寒因邪入裏傷於脾胃上吐下利令霍亂也利止裏和復更發熱者還是傷寒必汗出而解傷寒其脈微澁者本是霍亂今是傷寒却四五日至隂經上轉入隂必利本嘔下利者不可治也欲似大便而失氣仍不利者屬陽明也便必鞕十三日愈所以然者經盡故也微為亡陽澁為亡血傷寒脈微澁則本霍亂吐利亡陽亡血吐利止傷寒之邪未已還是傷寒却四五日邪傳隂經之時裏虚遇夫邪必作自利本嘔者邪甚於上又利者邪甚于下嘔利邪甚於上下先霍亂裏氣大虚又傷寒之邪再傳為吐利是重虛也故為不治難施功也此屬陽明便必鞕也十三日愈者傷寒六日傳遍三陽三隂後六日再傳經盡則隂陽之氣和太陽之邪去而愈也下利後當便鞕鞕則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也下利後亡津液當鞕便能食為胃和必自愈不能食者為未和到後經中為復過一經言七日後再經也頗能食者胃氣方和過一日當愈不愈者暴熱使之殊非陽明氣和也霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多惡寒脈微而復利利止而亡血也四逆加人參湯主之惡寒脉微而利者陽虚隂勝也利止則津液内渴故云亡血金匱玉函曰水竭則無血與四逆湯温經助陽更加人參益津血霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之頭痛發熱則邪自風寒而來中焦為寒熱相半之分邪稍髙者居陽分則為熱熱多欲飲水者與五苓散以散之邪稍下者居隂分則為寒寒多不用水者與理中丸温之理中丸方人參甘温甘草甘平炙白术甘温乾薑辛熱以上各三兩内經曰參术甘草之甘以緩脾氣調中寒淫所勝平以辛熱甘薑之辛以温胃散寒右四味搗篩為末蜜和丸如雞黄大以沸湯數合和一丸碎研温服之日三四夜二服腹中未熱益至四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓温服一升一日三服加減法若臍上築者腎氣動也去术加桂四兩脾虛腎氣動者臍上築動内經曰甘者令人中滿术甘壅補桂泄奔豚是相易也吐多者去术加生薑三兩嘔家不喜甘去术嘔家多服生薑以辛散之下多者還用术悸者加茯苓二兩下多者用术以去濕加茯苓以導氣也渴欲得水者加术足前成四兩半津液不足則渇术甘以緩之也腹中痛者加人參足前成兩半裏虚則痛加人參以補之寒者加乾薑足前成四兩半寒淫所勝平以辛熱腹滿者去术加附子一枚服湯後如食頃飲熱粥一升許微自温勿發揭衣被胃虛則氣壅腹滿甘令人中滿是去术也附子之辛以補陽散壅吐利止而身痛不休者當消息和解其外宜桂枝湯小和之吐利止裏和也身痛不休表未解也與桂枝湯小和之外臺云裏和表病汗之則愈也吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之上吐下利裏虛汗出發熱惡寒表未解也四肢拘急手足厥冷陽虛隂勝也與四逆湯助陽還隂既吐且利小便復利而大汗出下利清榖内寒外熱脈微欲絶者四逆湯主之吐利亡津液則小便當少小便復利而大汗出津液不禁陽氣大虛也脈微為亡陽若無外熱但内寒下利清榖為純隂此以外熱為陽未絶猶可與四逆湯救之断不可作汗若發汗則必亡陽而躁經曰汗多亡陽遂虚惡風煩躁不得眠也動氣在右不可發汗發汗則衂而渴心若煩飲則吐水動氣者築築然氣動也在右者在臍之右也難經曰肺内證臍右有動氣按之牢若痛肺氣不治正氣内虛氣動於臍之右也發汗則動肺氣肺主氣闗竅於鼻氣虛則不能衛血血溢妄行隨氣出鼻為衂血亡津液胃燥則煩渴而心若煩肺惡寒飲食則傷肺故飲則吐水動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤難經曰肝證臍之左有動氣接之牢若痛肝氣不渴正氣内虛氣動於臍之左也肝為隂之主發汗汗不止則亡陽外虛故頭眩筋傷肉瞤針經曰止虛則虛眩動氣在上不可發汗發汗則氣上衝正在心端難經曰心内證臍在上有動氣按之牢若痛心氣不治正氣内虛氣動於臍之左也心為陽發汗亡陽則愈損心氣腎乗邪氣欲上凌心故氣上衝正在心端動氣在下不可發汗發汗則無汗心中大煩骨節疼痛目運惡寒食則反吐榖不得前難經曰腎在臍下有動氣按之牢若痛腎氣不治正氣内虛動氣於臍之下也腎者主水發汗則無汗者水不足也心中大煩者腎虛不能治心火也骨節疼痛者腎主骨也目運者腎病則目眩眩如無所吐惡寒者腎主寒也食則反吐榖不得前者腎水範也主水曰痛病嘔而吐食久反出是無水者咽中閉塞不可發汗發汗則吐血氣欲絶手足厥冷欲得踡卧不得自温咽閉者胃之系胃經不和則咽内不利發汗欲陽血隨發散而上必吐血也胃經不和而反攻表則陽虛於外故氣欲絶手足冷欲踡而不能自温諸脈得數動微弱者不可發汗發汗則大便難腸中乾胃燥而煩其形相象根本異源動異數源為熱在表微弱之脈為熱在裏發汗亡津液則熱氣愈甚胃中乾燥則大便難中乾胃燥而煩根本雖有表裏之異逆治之後熱付之則一是以病形相象也肺濡而弱弱反在闗濡反在巔弦反在上微反在下弦為陽運微為隂寒實上下虚意欲得温微弦為虚不可發汗發汗則寒懐不能自還弦在上則風傷氣風勝者陽為之運動微在下則寒傷血血傷者裏為之隂寒外氣泄與為上實裏有隂寒為下虚表熱裏意欲得温莫發汗吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加猪膽汁湯主之吐已下斷津液内竭則不當汗出汗出者不當厥今之汗出而厥四肢拘急不解脈微欲絶者陽氣大虚隂氣獨通勝也若純與陽藥必格柜或嘔或躁不能得復入也與脈四逆湯加猪膽汁膽苦入心而通脈膽寒補肝而和謂隂引陽藥不被格拒内經曰微者逆之甚者從之此之也吐利發汗脈平小煩者以新虚不勝榖氣故也内經曰食入於隂長氣於陽所虚不勝榖氣是生小煩辨隂陽易差後勞復病證并治第十四傷寒隂陽易之為病其人身體重少氣少復裏急或引隂中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急燒裩散主之大病新差血氣未復餘熱未盡强合隂陽得病者名曰易男子病新差未平復而婦人與之交得病名曰陽易婦人新病差未平復男子與之交得病名曰隂易以隂陽自感動其於毒相染著如交易也其人病身體重少氣者損動真氣也少腹裏急舉引隂中拘攣膝脛拘急隂氣極也熱上衝胷頭重不欲眼中生花者感動之毒所為之氣重蒸於上宜與焼裩散以道隂氣燒裩散方右取婦人中裩近隠處剪燒灰以水和服方寸匕日三服小便即利隂頭微腫則愈婦人病取男子裩襠燒灰大病後勞復者枳實梔子湯主之若有宿食者加大黄如博碁子大五六枚病有勞復有食復傷寒新差血氣未平餘熱未盡早作勞動病者名曰勞復病熱少愈而食之熱有所蔵因其客氣留搏兩陽相合而病者名曰食復勞復則熱氣浮越與枳實梔子䜴湯以解之食復則胃有宿積大黄以解之枳實梔子䜴湯方枳實三枚味苦寒梔子十四枚擘苦寒䜴一升苦寒枳實梔子䜴湯則應吐劑此云復令微似汗出者以其熱聚于上苦則裏苦寒吐之熱散於表者苦則發之内經火淫所勝以苦發之此之謂也右三味以清浆七升空煑取四升枳實梔子煑取二升下豉更煑五六沸去滓温分再服覆令微似汗傷寒差後更發熱者小柴胡湯主之脈浮者以汗解之脈沈實者以下解之差後餘熱未盡更發熱者柴胡湯以解之脈浮者熱在表也故以汗解脈沈者熱在裏也故以下解之大病差後從腹已下有水氣者牡礪澤瀉散主之大病差後脾胃氣虚不能制約胃水水溢下焦腰下為腫也金匱要畧曰腰肚下腫當利小便與牡礪澤瀉散利小便而散水也牡礪澤瀉散方牡礪醎平熬澤瀉醎寒栝蔞根苦寒蜀漆辛平洗去腥葶藶苦寒商陸根熬辛酸醎平海藻醎寒洗去醎以上各等分醎味勇泄牡礪澤瀉海藻之醎以泄水氣内經曰火淫於内平以苦佐以酸辛以苦泄之蜀漆葶藶枯蔞商陸之酸辛與苦以導腫濕右七味均搗下篩為散更入臼中治之白飲和服方寸匙小便利止後服日三大病差後喜唾久不了了者胃上寒當以丸藥温之宜理中丸汗後陽氣不足胃中虚寒不内津液故喜唾不了了與理中丸以温其胃傷寒解後虚羸少氣氣逆欲吐者竹葉石膏湯主之傷寒解後津液熱不足而虚羸餘未盡熱則傷氣故少氣氣逆欲吐與竹葉石膏湯調胃散熱竹葉石膏湯竹葉二把辛平石膏一觔甘寒半夏半觔洗辛温麥門冬一觔甘平去心人參三兩甘温甘草三兩甘平炙粳米半升甘微寒辛甘發散而除熱竹葉石膏甘草之甘辛以發散餘熱甘緩脾而益氣麥門冬人參粳米之甘以補不足辛者散也氣逆者欲其散半夏之辛以散逆氣也右七味以水一斗煑取六升去滓内粳米煑米熟湯成去米温服一升日三服病人脈已解而日暮微煩以病新差人強與榖脾胃氣尚不能消榖故令微煩損榖則愈陽明王於申酉戌宿食在胃故曰暮微煩當小一下之以損宿榖辨不可發汗病脈證并治第十五夫以為疾病至急倉卒尋按要者難得故重集諸可與不可方治比之三隂三陽篇中此易見也又時有不止是三隂三陽出在諸可與不可中也諸不可汗不可下病症藥方前三隂三陽篇中經注已具者更不復出其餘無者于此已後經注備見脈濡而弱弱反在顛微反在上濇反在下微則陽氣不足濇則無血陽氣反微中風汗出而反躁煩濇則無血厥而且寒陽微發汗躁不得眠寸闗為陽脈當浮盛弱反在闗則裏氣不足濡反在顛則表氣不逮衛行脈外浮為在上以候衛微反在上是陽氣不足榮行脈中沈為在下以候衛澁反在下是無血也陽微不能固外腠理開疎風因客之故令汗出而躁煩無血則隂虛不與陽相順接故厥而且寒陽微無津液發汗常常煩躁日夜不能得眠也欬者則劇數吐涎沫咽中必乾小便不利心中飢煩晬時而發其形似瘧有寒無熱虚而寒慄欬而發汗踡而苦滿腹中堅肺寒氣逆欬者則劇吐涎沫亡津液咽中必乾小便不利膈中陽氣虚心中飢而煩一日一夜氣大㑹於肺邪上相擊晬時而發形如隂寒瘧但寒無熱虛而寒慄欬而發汗攻陽則陽氣愈虚寒愈甚故踡而苦滿腹中復堅厥脈𦂳不可發汗發汗則聲亂咽嘶舌蔞聲不得前厥而脈𦂳則少隂傷寒也法常温裏而反發汗則損少隂之氣少隂之脈入肺中循喉嚨挾古本胃為之本肺為之標本虚則標弱故聲亂咽嘶古蔞聲不得前諸逆發汗病微者難差劇者言亂目眩者死命将難全不可發汗而強發之輕者因發而重而難差重者脱其隂陽之氣言亂目眩而死難經曰脱陽者見鬼是此言亂也脱隂者目盲是此目眩也眩目而見眩是近盲也欬而小便利若失小便者不可發汗汗出則四肢厥逆冷肺經虚冷上虚下腫治下者欬而小便利或失小便上虛發汗則陽氣外亡四肢者諸陽之本陽虚則不與隂相接故四肢逆冷傷寒頭痛翕翕發熱形象中風常微汗出自嘔者下之盖煩心中懊憹如飢發汗則致痓身強難以屈伸熏之則發黄不得小便久則發欬唾傷寒當無汗惡寒今頭痛發熱微汗出自嘔傷寒之邪傳而為熱欲形與裏若反下之邪氣乗結流于肓中為虚煩心唾膿如飢若發汗則虚表熱歸經結熱甚生風若身強直而成痓若熏之則火熱相合消津液故小便不利而發黄肺惡火久則火熱肺必發欬而唾膿夫脈沈數病在裏不可發汗無陽故也凡脈盡中遲不可發汗榮衛不足血少故也凡脈微軟弱者不可發汗凡腹中有動氣在左右不可發汗凡諸動脈微弱者皆不可發汗汗則小便難腸中乾煩燥之也凡失血者不可發汗汗發必恍惚心亂凡咽燥者不可發汗凡積熱在臟不宜發汗汗則必吐中爛生瘡凡下利水榖忌攻其表汗出必脹滿欬咳𠻳小便利者不可攻其表汗出即逆不堪者脈微遲温濕虚煩壊病推經水其表兼失血臍間動氣並如之病在表脈浮者可汗表證具發濁脈不浮是表猶蔵裏也未可汗傷寒不可汗條例最多其可汗大抵脈證全在表表固汗然汗大早太過或津液泄變生焉當時誤汗則為亡陽為讝語為可下厥上竭等證其害人又速設或誤汗真武湯救解寒者去芍藥有熱去附子吁此救兵也謹之謹之表中風寒裏消則裏病表熱者雖無陽證可以小心之劑微汗而温散之微脈若為亡陽不可汗桂枝二越婢一湯尺脈遲為血少榮氣不足不可發汗先用黄耆建中湯養血俟其脈不遲即小柴胡湯桂枝二越婢一湯和解風温濕温各有本條虚煩似傷寒傷阹不惡寒身不疼脈不𦂳不可汗下竹葉湯或小柴胡湯壊病者吐汗下温不解知犯何逆法治之並不可汗小柴胡湯衂血下血雖脈浮𦂳無汗然而衂欲愈下者亦欲愈不愈用桂枝湯不可發汗腹中左右上下動氣築觸不可汗不止筋惕肉瞤為逆先服防風白术牡礪湯則頭眩汗下證治論用柴胡桂枝湯動在右發汗汗止建中湯凖之動在右發汗衂而謂心若煩飲吐先五苓散次竹葉湯動在上發氣上衝心棗根湯動在下發汗心中大煩骨節疼頭痛目運入食吐用大橘皮湯以止吐次建中湯下利清穀用理中湯止吐次建中湯或大便不通皆不可汗惡寒脈浮此為表證若謂之邪欲入裏不可汗夫咽乾喉塞亡血淋家衂家與瘡家動氣並不可汗證治論皆用小柴胡湯厥逆不可發汗當歸四逆湯辨可發汗脈證并治第十六大法春夏宜發汗春夏陽氣在外邪氣亦在外故可發汗凢發汗欲令手足俱周時出以漐然一時間許出亦佳不可令如水流漓若病不解當重發汗汗多必亡陽陽虛不得重發汗也汗緩緩出則表裏之邪悉去汗大出則邪氣不能除但亡陽也陽虛為無津液故不可重發汗凡服湯發汗中病便止不必盡劑汗多則亡陽凡云可發汗無湯者丸散亦可用要以汗出為解耳然不如湯隨證良驗聖劑經曰湯津主治本乎腠理壅邪除邪氣者於湯為宜金匱玉函曰水能净萬物故用湯也夫病脈浮大問病言但便鞕爾設利者為大逆鞕為實汗出而解何以故脈浮當以汗解經曰脈浮大應發汗醫反下之為大逆便鞕雖為實裏亦當先解其外若行利藥是為大逆結胷雖急脈浮大猶不可下下之即死況便難乎經曰本發汗而復下之此為之逆若先發汗治不為逆下利後身疼痛便自調者急當救表宜枝湯發汗外䑓嘗云裏和表病汗之則愈太陽病脈浮數者宜發汗也太陽病脈浮大數者宜發汗也陽明病脈遲汗多而微惡寒者外未解宜發汗陽明病脈浮數者宜發汗太陽病常汗微微自出更宜發汗凡脈浮而𦂳者浮則為風𦂳則為寒宜發汗太陽病下之微喘者外未解也宜發汗太陽病發熱汗出而惡寒宜發汗辨發汗後病脈證并治第十七發汗多亡陽讝語者不可下與柴胡桂枝湯和其榮衛以通津液後自愈胃為水榖之海津液之主汗多亡津液胃中燥必發讝語此非實熱則不可下與柴胡桂枝湯和其榮衛通行津液則其胃潤讝語自止辨不可吐第十八合四證已具太陽篇中夫太陽病惡寒而發汗自汗出而反不惡寒其闗上脈細數者不可吐之夫少隂病其人欲食入吐心中温温欲吐復不能吐手足寒脈弦遲乾嘔此膈上有食飲不可吐之當宜温也諸四逆者不可吐之諸虛羸不可吐之新産者不可吐之病者惡寒而不欲近衣不可吐之辨可吐第十九大法春宜吐春時陽氣在上邪氣亦在上故宜吐凡用吐湯中病即止不必盡劑也要在適當不欲過也病胷中諸實胷中鬱鬱而痛不能食欲使人按之而反有涎唾下利日十餘行其脉反遲寸口脈微滑此可吐之利則止胷上諸實或痰實或熱鬱或寒結胷中鬱而痛不能食欲使人按之反有涎唾者邪在下按之氣下而無涎唾此按之反有涎唾知邪在胷中經曰下利脈遲而滑者内實也今下利日十餘行其脈反遲寸口脈微滑是上實也故可吐之玊函曰上盛不已吐而奪之宿食在上脘者當吐之宿食在中下脘則當下宿食在上脘則當吐内經曰其髙者因而越之其下者引而竭之病人手足厥冷脈乍結以客氣在胷中心下滿而煩欲食不能食者在胷中當吐之此與第六卷厥隂門𤓰蔕散證同彼云脈乍𦂳此云脈乍結惟此有異𦂳為内實乍𦂳則實未深是邪在胷中為結乍實則結未深是邪在胷中所以證治同也凡服之吐胷中病便止不必盡劑也大法春夏宜吐凡病頭不强痛寸四脈浮胷中痞滿上衝喉咽不行此為有痰當宜吐之傷寒胷滿痰逆朝嘔熱嗽及肺壅唾膿等宜吐之夫宿食在胷脘宜吐之辨不可下病脈證并治第二十脈濡而弱弱反在闗濡反在巔微反在上澁反在下微則陽氣不足澁則無血陽氣反微中風汗出而反躁煩澁則無血厥而且寒陽微不可下下之則心下痞鞕陽㣲下之陽氣已虚隂氣内甚故心下痞鞕動氣在右不可下下之則津液内竭咽燥鼻乾頭眩心悸也動氣在右肺之動也下之傷胃肺津液内竭咽燥鼻乾者肺屬金主燥也頭眩心悸者肺主氣而虚也動氣在左不可下下之則腹内拘急食不下動氣更劇雖有身熱卧則欲踡動氣在左肝之動也下之損脾而肝氣益勝復行於脾故腹内拘急食不下動氣更劇也雖有身熱以裏氣不足故臥則欲踡也動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌動氣在上心之動也下之則傷胃内動心氣心為火主熱針經曰心之生病者掌中熱肝為臓中之隂病則身雖有熱外則欲踡者表熱裏寒也心為臓中之陽病則身上浮冷熱汗自泄欲得水自灌者表寒裏熱也二臓隂陽寒熱明可見焉動氣在下不可下下則腹脹滿卒起頭眩食則下清糓心下痞也動氣在下腎之動也下之則傷脾腎氣則動寒乗脾故有因腹滿頭眩下利則心下痞之證也咽中閉塞不可下下之則上輕下重水浆不下臥則欲踡身急痛下利日數十行咽中閉塞胃已不和也下之則閉塞之邪為上輕傷胃氣為下動至水浆不下臥則欲踡身急痛下利日數十行知虚寒也諸外實者不可下下之則發㣲熱亡脈厥者當臍握熱外實者表熱也汗之則愈下之為逆下後裏虚表熱内陷故發微熱厥深者熱亦深亡脈厥者則陽氣深陷客於下焦故臍熱也諸虚者不可下下之則大竭求水者欲愈惡水者劇金匱玉函曰虚者十補勿一瀉之虚門下氣之為重虚内竭津液故令大渇求水者陽未竭而猶可愈惡水者陽氣已竭則難可制脈濡而弱弱反在闗濡反在巔絃反在上微反在下弦為陽運微為隂寒上實下虚意欲得温微絃為虚虚者不可下也虚家下之是為重虚難經曰實實虚虚損不足益有餘此是中工治其害也微則為欬欬則吐涎下之則欬止而利因不休利不休則胷中如蟲齧粥入則出小便不利兩脇拘急喘息為難頸背相引臂則不仁極寒反汗出身冷若氷眼睛不慧語言不休而糓氣多入此為除中口雖欲言舌不得前内經曰感於寒則受病微則為欬而不能安甚則為泄為痛肺感微寒為欬則脈亦微也下之氣下欬雖止而利不休則奪正氣而成危惡胷中如蟲齧粥入則出而小便不利兩脇拘急喘息為難者裏氣損也頸背相引臂為不仁極寒及汗出身冷如水者表氣損也表裏損極至隂陽脱者應不能食而言不休難經曰脱陽者見鬼脱隂者則目盲隂陽脱者應俱是不能食而糓多入者此為除中是胃氣除去也口雖欲言舌不能前氣已衰脱不能運也脈濡而弱弱反在闗濡反在巔浮反在上數反在下浮為陽虚數則為無血浮為虚數為熱浮為虚自汗出而惡寒數為痛振寒而慄微弱在闗胷下為急喘汗而不得呼吸呼吸之中痛在於脇振寒相搏形如瘧疾而反下之致令脉數發熱狂走見鬼心下為痞小便淋瀝小腸甚硬小便則尿血也弱在闗則隂氣内弱濡在巔則陽氣外弱浮為虚浮在上衞不足也故云陽虚陽虚不固故腠理汗出惡寒數亦為虚數在下則榮不及故云亡血則不能温潤腑臓脉數而痛振寒而慄微弱在闗邪氣傳裏也裏虚遇邪胷下為急喘而汗出脇下引痛振寒如瘧裏邪未實表邪未解醫反下之裏氣益虚邪熱内䧟故脈數發熱狂走見鬼心下為痞此熱䧟于中焦者也若熱氣深䧟則客於下焦使小便淋澁小腸甚鞕小便尿血也脈濡而𦂳濡則胃氣㣲𦂳則榮中寒陽微衛中風發熱而惡寒榮𦂳胃氣冷微嘔心内煩醫為有大熱解肌而發汗亡陽虚煩躁心下苦痞堅表裏俱虚竭卒起而頭眩客熱在皮膚悵怏不得眠不知胃氣冷𦂳寒在闗元技巧無所施汲水灌其身客熱應時罷慄慄而振寒重被而覆之汗出而冒巔體愓而又振小便為㣲難寒氣因水發清榖不容間嘔變反腸出㒹倒不得安手足為微逆身冷而内煩遲欲從後救安可復追還胃冷榮寒陽微中風發熱惡寒微嘔心煩衣不温胃反為有熱解肌發汗則表虚亡陽煩躁心下痞堅先裏不足發汗又虚其表表裏俱虚竭卒起頭眩客熱在表悵怏不得眠醫不救裏但責表熱汲水灌洗以却熱客熱易罷裏寒益増慄而振寒復以重被覆之裏虚遂汗出愈使陽氣虚也巔頂也巔冐而體振寒小便難者亡陽也寒因水發下為清榖上為嘔吐外有厥逆内為懆煩顛倒不安雖欲拯救不可得也本草曰病勢已過命將難全脈浮而大浮為氣實大為血虚氣實為無隂孤陽獨下隂部者小便當赤而難胞中當虚今反小便利而有大汗出法應衛家當微今反更實津液四射榮竭血盡乾煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此為重虚客陽去有期必下如汚埿而死衞為陽榮為隂衛氣强實隂血虚弱陽乗隂虚下至隂部隂部下焦也陽為熱則消津液當小便赤而難今反小便利而大汗出者隂氣内弱也經曰隂弱者汗自出是以衛家不微而反更實榮竭血盡乾煩而不眠血薄則内消而成暴液者津液四射也醫反下之又虚其裏是為重虚孤陽因下而又脫去氣血竭胃氣内盡必下若汚埿而死也脈數者久數不止止則邪結正氣不能復正氣却結于蔵故邪氣浮之與皮毛相得脈數者不可下下之則必煩利不止數為熱止則邪氣結于經絡之間正氣不得復行于表則却結於蔵邪氣獨浮于皮毛下之虚其裏邪熱乘虚而入裏虚協熱必煩利不止脈浮大應發汗醫反下之此為大逆浮大属表故不可下病欲吐者不可下之也嘔多雖有陽明證不可攻之為邪猶在胷中也大陽病外證未解不可下下之為逆表未解者雖有裏證亦不可下當先解外為順若反下之則為逆也經曰本發汗而復下之此為逆也若先發汗治不為逆夫病陽多者熱下之則鞕陽熱證多則津液少下之雖除熱復損津液必便難也或謂陽多者表熱也下之則心下鞕無陽隂強大便鞕者下之則必清糓腹滿無陽者亡津液也隂強者寒多也大便鞕則為隂結下之虚胃隂寒内甚必清榖腹滿傷寒發熱頭痛微汗出發汗則不識人熏之則喘不得小便心腹滿下之則短氣小便難頭痛背強加温針則衂傷寒則無汗發熱頭痛微汗出者寒邪變熱欲傳於裏也發汗則亡陽増熱故不識人若以火熏之則火熱傷氣内消津液結為裏實故喘不得小便心腹滿若反下之則内虚津液邪欲入裏外動經絡故短氣小便難頭痛背強加温針益陽増熱将必動其血而為衂也傷寒脈隂陽俱𦂳惡寒發熱則脈欲厥厥者脈初來大漸漸小更來漸漸大是其候也如此者惡寒甚者翕翕汗出喉中痛熱多者目赤脈多睛不慧醫復發之咽中則傷若復下之則兩目閉寒多者便清糓熱多者便膿血若熏之則身發黄若熨之則咽燥若小便利者可救之小便難者為危殆脈隂陽俱𦂳則清邪中上濁邪中下太陽少隂俱感邪也惡寒者少隂發熱者太陽脈欲厥者表邪欲傳裏也惡寒甚者則變熱翕翕汗出喉中痛以少隂之脈循喉嚨故也熱多太陽多也目赤脈多者睛不慧以太陽之脈起於目故也發汗攻陽則火隂之熱因發而行上故咽中傷若復下之則太陽之邪因虛而内䧟故兩目閉隂邪下行為寒多必便清榖陽邪下行為熱多必便膿血熏之則火熱甚身必發黄熨之則火熱必輕為咽燥小便利者為津液未竭猶可救之小便難者津液已絶則難可制而危殆矣此則不可不知也傷寒發熱口中勃勃氣出頭痛目黄衂不可制貪水者必吐惡水者厥若下之咽中生瘡假令足手温者必下重便膿血頭痛月黄者若下之則兩目閉貪水者脉必厥其聲嚶咽喉塞若發汗則戰慄陽隂俱虚惡水者若下之則裏冷不嗜食大便完榖出若發汗則口中傷舌上白胎煩燥脈數實不大便六七日後必便血若發汗則小便自利也傷寒發熱寒變熱也口中覺勃勃氣出熱客上膈也頭痛目黄血不可制者熱烝于上也千金曰無陽即厥無隂即嘔貪水者必嘔則隂虚惡水者厥則陽虚也發熱口中勃勃氣出者咽中已熱也若下之亡津液則咽中生瘡熱因裏虚而下若熱氣内結則手足必厥設手足温者熱氣不結而下行作咋熱利下重便膿血也頭痛目黄者氣内䧟故脈厥目閉也貪水為隂虚下之又虚其裏陽聲嚶咽喉閉塞隂虚發汗又虛其陽使隂陽俱虛而戰慄惡水者為陽虚下之又虚胃氣虚寒内甚故致裏冷不嗜食陽虚發汗則上焦虚燥故口中傷爛舌上白胎而煩燥也經曰脈數不解合熱則消榖喜饑至六七日不大便者此則冇淤血也脈數實不大便六七日熱畜血於内也七日之後邪熱漸解迫血不行必便血也便血發汗隂陽俱虚故小便利下利脈大者虚也以其强下之故也設脈浮革因爾腸鳴者屬當歸四逆湯主之脈大為虚以木應下而下之利因不休也浮者按之不足也革者實大而長微强也浮為虚革為寒寒虚相搏則腸鳴與當歸四逆湯補虚散寒大傷寒脈濡而弱陽氣不足不可下之下之則心下痞津液内竭咽燥鼻乾也夫傷寒脈浮而𦂳浮則為風𦂳則為寒風則傷榮寒則傷衛榮衛俱病骨節煩疼當發其汗而不可下也夫傷寒脈浮濡弱不得發汗無陽故也亡陽尺中弱澁者不可下夫傷寒結胷證其脈浮大不可下下之即死矣夫太陽與陽明合病喘是胷滿不可下夫太陽與少陽合病心下堅頸强項而眩不可下也夫四逆病厥者不可下也夫病欲吐者不可下也夫病發於陽而反之熱入咽作結胷也夫太隂病其人腹滿吐食不可下下之益甚夫少隂病當心下堅滿不可下之後利不止者死夫病在裏而腹實者可下裏證悉具若惡寒若脈不實是裏猶帶表也未可下之傷寒不可下條例最多其可下者大抵脈證全在裏也裏故可下然下之太早太過或者水榖脫而變生焉至於當汗而誤下則理中湯丸憹為結胷等證其害人之速耳設或誤下則理中湯丸以救解之或裏煩則少加烏梅或轉損厥逆則兼與四逆湯輩吁此救兵也謹之謹之脈来細小固不可下若細小而牢𦂳又可下也脈浮病在表不可下結胷脈浮大不可下脈細虚或遲緩或尺部濇弱此凡皆為血氣衰不可下也惡寒者表之虚證雖陽明惡寒則與太陽合属病表汗不可下若少隂證惡寒則温之嘔吐者雖有陽明證謹不可下小柴胡加生薑主之小便自利汗出者津液竭糞雖硬屬陽明但用蜜導而出也猪膽汁亦可導也脾約證大便堅小便清者熱不在裏雖不大便不可下桂枝湯治之少隂證小便白為下焦虚寒用四逆湯大便堅小便少者津液還入胃必先鞕後溏不久自出惟小便如常乃可下之有表證脈大浮或惡寒或猶生寒熱並不可下不轉失氣謂不可下泄也不下泄則先鞕後溏不可下大抵陽明燥糞欲下之先與小承氣湯若轉失氣則必先溏後鞕更進一劑不轉失氣則止又陽明讝語潮熱脈疾與小承氣湯不轉失氣則與小柴胡湯若次日又不大便而脈濇則為裏虚黄蓍建中湯主之凡陽證而脈濇謹不可下頭汗出為津液少胞中虚不可下唯陽明語讝血熱頭汗則可下諸虛少血厥逆喉閉喉吐亡陽隂實動氣皆不可下虛加附子湯厥逆當歸四逆湯咽喉閉寒鳥扇湯嘔吐小半夏加梗皮湯無陽隂實而大便鞕者下之必清榖腹滿但用蜜導左動氣下之則腹滿拘急氣愈動身雖熱反欲拳先甘草乾薑湯次小建中湯左動氣下之則津液竭咽鼻乾頭眩心悸竹蔕湯上動氣下之則握掌熱煩汗出欲灌水竹葉湯下動氣下之則腹滿清榖心痞頭眩甘草㵼心湯小柴胡湯加減傷寒諸方惟小柴胡為用最多而諸家屢稱述之盖以柴胡半夏之劑能汗凡半表半裏之間以之和解皆可用也如不知小柴胡非時為表裏和解設其於解益熱消惡血誠有功焉盖傷寒發熱一二日間解撤不去其熱必至於傷血凡男女皆然小柴胡湯内有黄苓柴胡最行血熱所以屢獲竒功但藥性差寒用之貴能加減今推明活法凡表發熱裏又有燥渴糞鞕熱證者是為内外俱熱小柴胡加大黄裏無熱證但發汗在表者小柴胡加桂枝主解表可以温血所謂隂盛惡寒甘辛發散者此也是反别大黄主功裏可以蕩滌血熱所謂陽盛内熱酸苦湧泄者此也是又别其解表以温攻裏以寒之若遇少陽本證及無表裏證或表裏不分之證但依本方用之並不須加減此為正訣虛者少與尤在酌量辨可下病脈證并治第二十一大法秋宜下秋時陽氣下行則邪亦在下故宜下凡服下藥用湯勝丸中病即止不必盡劑也湯之為言蕩也滌蕩腸胃溉灌臓腑推陳燥結却熱下寒破散邪疫理導潤澤枯槁悦人皮膚益人血氣水能净萬物故勝丸散中病即止者如承氣湯證云右一服利而止後服又曰若一服讝語止更莫復服是不盡劑也下利三部脈皆平按之心下鞕者急下之宜大承氣湯下利者脈當微厥今反和者為内實也下利三部脈平者已為實而久按之心下鞕故為邪甚也故宜大承氣湯下之下利脈遲而滑者内實也利未欲止當下之宜大承氣湯主之經曰脈遲者食乾物得之金匱要畧曰滑則榖氣實下利脈遲而滑者為有宿食也脾胃傷食不消水榖是致下利者云内食若但以温中厚膓之藥治之利未必止可與大承氣湯下去宿食利自止矣問曰人病有宿食何以别之師曰寸口脈浮而大按之反澁尺亦微而澁故知有宿食當下之宜大承氣湯寸以候外尺以候内浮以候表沉以候裏寸口脈浮大者氣實血虛也按之反澁尺中亦微而澁者胃有宿食裏氣不和也與大承氣湯以下宿食下利不欲食者以有宿食故也當即下之與大承氣湯傷食則惡食故不欲食如傷風惡風傷寒惡寒之數也下利差後至其年月日復發者以病不盡故也當下之宜大承氣湯乗春則肝先受之乗夏則心先受之乗至隂則脾先受之乗秋則肺先受之假令春時受病氣又傷肝治之難愈邪有不盡者矣春時先受月日内外相感必復動而痛下利為腸胃病宿積不盡故當下去之下利脈反滑當有所去下之乃愈宜大承氣湯主之脈經曰脈滑者為病食也下利脈滑則内有宿食故云當有所去與大承氣湯以下宿食病腹中滿痛者此為實也當下之宜大承氣湯金匱要畧曰病者腹滿中按之下痛為虚痛為實可下之腹中滿痛者裏氣壅實也故可下之矣傷寒脉沈沈者内實也下解之宜大柴胡湯傷寒後為表匕觧脈沈為裏未和與大柴胡湯以下内實經曰傷寒差已後更發熱脈沈實者以下解之也脈雙弦而遲者必心下鞕脈大而𦂳者陽中有隂也可以下之宜大承氣湯金匱要畧曰脈雙弦者寒也經曰遲為在臓脈雙弦而遲者隂中伏陽也必心下鞕大則為陽𦂳則為寒脈大而𦂳者陽中伏隂也與大承氣湯以與隂陽相合夫少隂病得之口燥咽乾宜急下之夫傷寒病人腹滿不大便者亦然夫傷寒病腹中滿痛者為寒當宜下之夫傷寒脈數而滑者有宿食當下之則愈夫傷寒六七日目中童子不明無外證大便難微熱者此為實宜急下之夫太陽病七八日脈微浮者其人發狂此下焦有熱小腹當堅而滿小便自利下血乃愈瘀血在裏故也宜下之夫陽明病但頭汗出其身無汗小便不利渴飲水漿此為瘀熱在裏身必發黄宜急下之夫太陽病有熱而小腹滿者小便反利此為有畜血當宜下之夫傷寒病五六日不大便繞臍痛煩燥汗出者此為有結汗出後則暫解日晡則復發脈實者當宜下之夫傷寒七八日身黄如橘小便不利其腹微滿者宜下之夫陽明病其人多汗津液越出胃中有熱大便必堅宜下之夫傷寒大下後六七日不大便煩熱不解腹滿如痛者此有宿食宜下之夫傷寒病小便不利大便乍難乍易時有微熱不能卧此胃中内有結燥故也宜下之辨發汗吐下後脈證并治第二十三此第十卷第二十二篇凡四十八證前三隂三陽篇中悉具載之此已下諸方于随卷本證下雖已有録止以加減言之未甚明白以覽者撿閲未便今復校勘備列于後桂枝加葛根湯主之方葛根四兩芍藥三兩甘草二兩生薑三兩切大棗十二枚擘桂枝三兩去皮右七味以水一斗先煑麻黄葛根減二升去上沫内諸藥煑取三升去滓温服一升覆取微似汗不須啜粥餘如桂枝法桂枝加厚朴杏仁湯方於桂枝湯方内加厚朴三兩用杏仁五十箇去皮尖餘依前法桂枝加附子湯方於桂枝湯附子一枚炮去皮破八片餘依前法术附湯方附於此方内去皮桂枝加白术四兩依前法桂枝去芍藥湯方於桂枝湯方内去芍藥餘依前法桂枝去芍藥加附子湯方於桂枝湯内去芍藥加附子一枚炮去皮破八片餘依前法桂枝麻黄各半兩湯方桂枝一兩十六銖去皮芍藥生薑切甘草炙麻黄各一兩去節大棗四枚擘杏仁二十四箇湯浸去皮尖及兩仁者右七味以水五升先煑麻黄三沸去沫内諸藥煑取一升八合去滓温服六合桂枝二麻黄一湯方桂枝一兩十七銖去皮芍藥一兩六銖麻黄十六銖去節生薑一兩六銖切杏仁十六箇去皮尖甘草一兩二銖炙大棗五枚擘右七味以水五升先煑麻黄三沸去上沫内諸藥煑取二合去滓温服一升白虎加人參湯方於白虎湯方内加人參三兩餘依白虎湯法桂枝去桂加茯苓白术湯方於桂枝湯方内去桂枝加茯苓白术各三兩餘依前法煎服小便利則愈葛根加半夏湯方於葛根湯方内加半夏半升餘依葛根湯法桂枝加芍藥生薑人參新加湯方於第二卷桂枝湯方更加芍藥生薑各一兩人參三兩餘依桂枝湯法服梔子甘草豉湯方梔子䜴湯方内加入甘草三兩餘依前法得吐止勿服梔子生薑豉湯方梔子䜴湯方内加生薑五兩餘依前法得吐之後服柴胡加芒消湯方小柴胡湯方内加芒消七兩餘依前法服不解更服之桂枝加桂湯方第三卷桂枝湯方内更加桂枝三兩共五兩餘依前法柴胡桂枝湯方桂枝去皮黄苓人參各一兩半甘草一兩炙半夏二兩半芍藥一兩半大棗六枚擘生薑一兩半切柴胡四兩右九味以水七升煑取三升去滓温服附子㵼心湯方大黄二兩黄連黄芩各一兩附子一枚炮去皮臍破别圭取汁右四味以切三味麻黄湯三升漬之須㬰絞去滓内附子汁分温再服生薑㵼心湯方生薑四兩切甘草三兩炙人參三兩乾薑一兩黄芩三兩半夏半升洗黄連一兩大棗一十二枚擘右八味以水一㪷煑取六升去滓再煎取三升温服一升日三服甘草㵼心湯方甘草四兩黄芩三兩乾薑三兩半夏半升洗大棗十二枚擘黄連一兩右六味以水一㪷煑取六升去滓煎取三升温服一升日三服黄芩加半夏生薑湯方於黄芩湯方内加半夏并生薑一兩半餘依黄芩法服桂枝加大黄湯方桂枝三兩去皮大黄一兩芍藥六兩生薑三兩切甘草三兩炙大棗十二枚擘右六味以水七升煑取三升去滓温服一升日三服桂枝加芍藥湯方於第二卷桂枝湯方内更加芍服藥三兩通共六兩依桂枝湯方四逆加吳茱茰生薑湯方當歸三兩芍藥三兩甘草三兩炙通草二兩桂枝三兩去皮細辛三兩生薑半升切吳茱茰二升大棗二十五枚擘右九味以水六升清酒六升和煑取五升去取温分五服方水酒各四升四逆加人參湯方於四逆湯方内加人參一兩亦依四逆湯法服四逆加猪膽汁湯方於四逆湯方内加入猪膽汁半合餘依膽煎服如無猪膽以羊膽代之音釋辨陽明脈證并治厠初吏切間也溷也瘕音假腹中久病疸音但黄病憒古對切心亂也怵勅律切悲也惕音踢敬也又憂也癉丁賀切勞病也辨太隂脈證并治拒音巨抑也函音含又音減書函􅑩音荒目不明也脘音管胃腑也竭渠列切涸也蔕音帝𤓰蔕也辨不可下病脈證并治齧五結切噬也盥音貫澡手也悵怏上丑亮切望恨也下于亮切下脹也嚶於耕切烏鳴也漑灌上居代切下音貫洗也普濟方卷一百二十九
