body:
  text: 普濟方卷一百二十九明周王朱橚撰傷寒門辨傷寒熱病兩感證候夫熱病者皆傷寒之類也或愈或死其死皆以六七日間其愈皆以一日已上者何也夫巨陽者諸陽之屬也其脈連於風府故為諸陽主氣人之傷於寒也故病則為熱雖甚不死其兩感於寒而病者必死夫兩傷於寒病者一日則巨陽與少隂俱病故頭痛口乾煩滿而渴手太陽是小腸之經手少隂是心之經也二日足陽明與足太隂俱病則復滿體熱不食譫言足陽明胃之經足太隂脾之經三日則足少陽與足厥隂俱病則耳聾囊縮水漿不入口則不知人六日而死矣足少陽膽之經足厥隂肝之經也是為六經隂陽表裏者也陽為腑主表隂為臟主裏臟腑俱病故曰兩感三日而死者為一日兩經受故云兩感是表裏俱病故六日而死矣辨傷寒熱病不可治形候傷寒三部脈隂陽俱盛大汗出不解者不可治傷寒隂陽俱熱虛不止者不可治傷寒脈至乍數乍疏者不可治傷寒讝語妄語身熱脈浮大手足溫者生脈沉細手足逆冷者不可治傷寒咳而上氣其脈散者不可治傷寒熱盛脈浮大者生沉小者不可治傷寒已得汗脈沉小者生浮大者不可治傷寒讝語直視而喘者不可治傷寒下利厥逆躁不能卧者不可治傷寒發熱下利至厥不反者不可治傷寒病惡寒踡而利手足逆者不可治傷寒五六日脈微細沉但欲卧汗出不煩時自吐利復煩躁不得卧寐者不可治傷寒六七日喘息髙者不可治傷寒發汗汗出若大灌發不可治傷寒泄而腹滿甚者不可治傷寒目不明熱不已者不可治傷寒老人嬰兒熱而復滿者不可治傷寒汗出嘔血者不可治傷寒舌本爛熱不已者不可治傷寒咳血而衄汗不出出不至足者不可治傷寒髓熱者不可治傷寒熱而痙者不可治傷寒熱病腰折瘈瘲齒噤者不可治傷寒下利後脈絶於手足厥冷脈不還不可治傷寒四逆惡寒脈不至其人不熱而燥者不可治熱病脈代者一旦死熱病二三日身體熱腹痛頭痛倀食飲如故脈直而疾者至八日不可治熱病三四日腹已下不得汗脈大疾者生脈細小難得者不可治熱病四五日頭不熱腹不痛而吐脈來微細至十二日不可治熱病七八日脈微小便如墨口乾脈代舌焦乾黑者不可治熱病七八日脈微小病人便血口中乾一日半而死熱病七八日脈不燥不數後三日中有汗三日不汗者死熱病八九日頭不痛身不痛目不赤色不變而反利脈來壘壘按不彈手時大心下堅者至十七日不可治熱病已得汗而脈尚躁盛此隂脈之極也死熱病脈常躁而不得汗者此陽脈之極也死脈盛躁得汗者生也熱病已得汗體熱不去者不可治熱病其人滚滚大熱脈細小者不可治熱病下利不止腹中痛甚者不可治辦可灸形證夫少隂病其人雖裏和其病惡寒者宜灸之少隂病吐利手足逆而發熱脈不足者灸其少隂夫吐下手足厥無脈者當其厥隂灸之不溫反微喘者死傷寒六七日脈數手足厥煩躁不已灸厥隂不順者死辦不可灸形證凡微數之脈不可灸因熱為邪必致煩逆內有損骨傷筋血枯之患脈當汗解反以灸之邪無所去因火而盛病當愈重此為逆之治欲解者當發其汗而解也辦可火形證夫凡下利後下部中痛當溫之宜炒枳實若熬鹽等􅀢之辦病不可火證夫傷寒寸口脈浮而弱即血氣虛衛氣微其脈浮則汗出如流珠衛氣微榮氣虛其脈浮汗出如油太陽病中風以火劫其汗風被火熱即冷血氣流泆常有潮熱身體枯發黃病陽勝即衄隂虛即小便難隂陽俱虛竭身體枯燥但頭汗出至頸而還腹滿微喘口乾咽爛或不大便其甚者噦手足躁擾循衣摸床若心下滿小便利者其人可治小便不利不可治夫傷寒脈浮而以火逼劫汗即亡陽必驚狂卧起不安夫陽病以火蒸之不得汗者其人必躁結若不結必下清血其脈躁者必發黃也夫太陽病而尉其背大汗必出火氣入胃胃中乾燥必發慌語辦可水形證夫太陽病差後胃中乾燥不得眠睡渴欲飲當少與之即愈若嘔吐熱在膈上思水者與五苓散即飲水也夫傷寒七八日大渴欲食水然當與之常令不足勿意極也夫凡傷寒病能飲水者為欲愈也若不渴而強與之因此成禍者其數多矣夫水可除煩使胃和常須少與勿令多若還不與無由汗強與還因水致痾病非大渴不可與水渴不與水無由作汗則喘而殂也傷寒水為欲愈之候若渴者與之過多或小渴而強與之飲腹中熱少一不能消停飲作害者多矣曰水結曰喘悸曰咳噎曰咳噦曰下利曰小便不利安有不自水氣得之診視又職此太陽病發汗後大汗出胃中燥不得眠其人欲水當少與之胃和則愈厥隂病厥病渴欲飲水者與水則愈霍亂發熱頭痛身疼熱多飲水者與五苓散嘔吐條水結證見頭汗出條飲水多停心下氣上乘心則為悸水氣結於胸脅則為水結胸胃中虛冷則為冷嘔噦冷氣相搏為喧上迫於肺則為咳喘漬入腹中則為下利邪執所搏畜於下焦則為小便不利小腹滿而裏急溢於皮膚則為腫重飲水過多者五苓散導之辨不可水形證夫凡發汗後飲水水灌之其人必喘水藥不得入口入則為逆傷寒結胸為無熱證者宜與平和之藥若以水灌之益令熱不得出當汗而不汗即煩假令汗出後腹中痛可服和氣止痛之藥夫寸口脈浮大醫反下之此為大逆浮則無血大則為寒寒氣相搏即為腹鳴醫不知而反飲其水令汗大出水得寒氣必相搏其病必甚也夫傷寒五六日而渴欲食未宜與也為腹中熱氣尚少不能消之更作病深矣若大渴者宜與之也辦可溫形證夫法冬宜熱藥夫凡病發熱頭痛脈浮數身有疼痛宜溫其表夫病腹滿下利嘔吐身疼痛者宜溫其表裏夫太陽病下利不渴其臟有寒當宜溫之其人飲食入則吐手足寒脈弦遲此為中寒不可吐下也當溫之夫少隂病其脈沉者急當溫之下利不欲食者當宜溫之下利脈遲緊為痛未止下利脈浮大者此皆為虛宜溫之夫凡脈浮革者自腹鳴若渴之與水者必噦宜溫之夫病下之後續得下利水穀不止身體疼痛急當救之裏宜溫之與治平四逆附子湯諸溫藥之輩辦霍亂病脈證并治第十三問病有霍亂何答曰嘔吐而利曰霍亂三焦者水穀之道路邪在三焦則吐而不利在下焦則利而不吐邪在中焦則既吐且利以飲食不節寒熱不調清濁相干隂陽乖隔遂成霍亂輕者止曰吐利重者揮霍撩亂名曰霍亂問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂自吐下又利止復更發熱也發熱頭痛身疼惡寒者本是傷寒因邪入裏傷於脾胃上吐下利令霍亂也利止裏和復更發熱者還是傷寒必汗出而解傷寒其脈微澀者本是霍亂今是傷寒却四五日至隂經上轉入隂必利本嘔下利者不可治也欲似大便而失氣仍不利者屬陽明也便必鞕十三日愈所以然者經盡故也微為亡陽澀為亡血傷寒脈微澀則本霍亂吐利亡陽亡血吐利止傷寒之邪未已還是傷寒却四五日邪傳隂經之時裏虛遇夫邪必作自利本嘔者邪甚於上又利者邪甚于下嘔利邪甚於上下先霍亂裏氣大虛又傷寒之邪再傳為吐利是重虛也故為不治難施功也此屬陽明便必鞕也十三日愈者傷寒六日傳遍三陽三隂後六日再傳經盡則隂陽之氣和太陽之邪去而愈也下利後當便鞕鞕則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也下利後亡津液當鞕便能食為胃和必自愈不能食者為未和到後經中為復過一經言七日後再經也頗能食者胃氣方和過一日當愈不愈者暴熱使之殊非陽明氣和也霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多惡寒脈微而復利利止而亡血也四逆加人參湯主之惡寒脈微而利者陽虛隂勝也利止則津液內渴故云亡血金匱玉函曰水竭則無血與四逆湯溫經助陽更加人參益津血霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之頭痛發熱則邪自風寒而來中焦為寒熱相半之分邪稍髙者居陽分則為熱熱多欲飲水者與五苓散以散之邪稍下者居隂分則為寒寒多不用水者與理中丸溫之理中丸方人參甘溫甘草甘平炙白术甘溫乾薑辛熱以上各三兩內經曰參术甘草之甘以緩脾氣調中寒淫所勝平以辛熱甘薑之辛以溫胃散寒右四味搗篩為末蜜和丸如雞黃大以沸湯數合和一丸碎研溫服之日三四夜二服腹中未熱益至四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升一日三服加減法若臍上築者腎氣動也去术加桂四兩脾虛腎氣動者臍上築動內經曰甘者令人中滿术甘壅補桂泄奔豚是相易也吐多者去术加生薑三兩嘔家不喜甘去术嘔家多服生薑以辛散之下多者還用术悸者加茯苓二兩下多者用术以去濕加茯苓以導氣也渴欲得水者加术足前成四兩半津液不足則渴术甘以緩之也腹中痛者加人參足前成兩半裏虛則痛加人參以補之寒者加乾薑足前成四兩半寒淫所勝平以辛熱腹滿者去术加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被胃虛則氣壅腹滿甘令人中滿是去术也附子之辛以補陽散壅吐利止而身痛不休者當消息和解其外宜桂枝湯小和之吐利止裏和也身痛不休表未解也與桂枝湯小和之外臺云裏和表病汗之則愈也吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之上吐下利裏虛汗出發熱惡寒表未解也四肢拘急手足厥冷陽虛隂勝也與四逆湯助陽還隂既吐且利小便復利而大汗出下利清榖內寒外熱脈微欲絶者四逆湯主之吐利亡津液則小便當少小便復利而大汗出津液不禁陽氣大虛也脈微為亡陽若無外熱但內寒下利清榖為純隂此以外熱為陽未絶猶可與四逆湯救之斷不可作汗若發汗則必亡陽而躁經曰汗多亡陽遂虛惡風煩躁不得眠也動氣在右不可發汗發汗則衄而渴心若煩飲則吐水動氣者築築然氣動也在右者在臍之右也難經曰肺內證臍右有動氣按之牢若痛肺氣不治正氣內虛氣動於臍之右也發汗則動肺氣肺主氣關竅於鼻氣虛則不能衛血血溢妄行隨氣出鼻為衄血亡津液胃燥則煩渴而心若煩肺惡寒飲食則傷肺故飲則吐水動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤難經曰肝證臍之左有動氣接之牢若痛肝氣不渴正氣內虛氣動於臍之左也肝為隂之主發汗汗不止則亡陽外虛故頭眩筋傷肉瞤針經曰止虛則虛眩動氣在上不可發汗發汗則氣上衝正在心端難經曰心內證臍在上有動氣按之牢若痛心氣不治正氣內虛氣動於臍之左也心為陽發汗亡陽則愈損心氣腎乘邪氣欲上凌心故氣上衝正在心端動氣在下不可發汗發汗則無汗心中大煩骨節疼痛目運惡寒食則反吐榖不得前難經曰腎在臍下有動氣按之牢若痛腎氣不治正氣內虛動氣於臍之下也腎者主水發汗則無汗者水不足也心中大煩者腎虛不能治心火也骨節疼痛者腎主骨也目運者腎病則目眩眩如無所吐惡寒者腎主寒也食則反吐榖不得前者腎水範也主水曰痛病嘔而吐食久反出是無水者咽中閉塞不可發汗發汗則吐血氣欲絶手足厥冷欲得踡卧不得自溫咽閉者胃之系胃經不和則咽內不利發汗欲陽血隨發散而上必吐血也胃經不和而反攻表則陽虛於外故氣欲絶手足冷欲踡而不能自溫諸脈得數動微弱者不可發汗發汗則大便難腸中乾胃燥而煩其形相象根本異源動異數源為熱在表微弱之脈為熱在裏發汗亡津液則熱氣愈甚胃中乾燥則大便難中乾胃燥而煩根本雖有表裏之異逆治之後熱付之則一是以病形相象也肺濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為隂寒實上下虛意欲得溫微弦為虛不可發汗發汗則寒懷不能自還弦在上則風傷氣風勝者陽為之運動微在下則寒傷血血傷者裏為之隂寒外氣泄與為上實裏有隂寒為下虛表熱裏意欲得溫莫發汗吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之吐已下斷津液內竭則不當汗出汗出者不當厥今之汗出而厥四肢拘急不解脈微欲絶者陽氣大虛隂氣獨通勝也若純與陽藥必格匱或嘔或躁不能得復入也與脈四逆湯加豬膽汁膽苦入心而通脈膽寒補肝而和謂隂引陽藥不被格拒內經曰微者逆之甚者從之此之也吐利發汗脈平小煩者以新虛不勝榖氣故也內經曰食入於隂長氣於陽所虛不勝榖氣是生小煩辨隂陽易差後勞復病證并治第十四傷寒隂陽易之為病其人身體重少氣少復裏急或引隂中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急燒裩散主之大病新差血氣未復餘熱未盡強合隂陽得病者名曰易男子病新差未平復而婦人與之交得病名曰陽易婦人新病差未平復男子與之交得病名曰隂易以隂陽自感動其於毒相染著如交易也其人病身體重少氣者損動真氣也少腹裏急舉引隂中拘攣膝脛拘急隂氣極也熱上衝胸頭重不欲眼中生花者感動之毒所為之氣重蒸於上宜與燒裩散以道隂氣燒裩散方右取婦人中裩近隱處剪燒灰以水和服方寸匕日三服小便即利隂頭微腫則愈婦人病取男子裩襠燒灰大病後勞復者枳實梔子湯主之若有宿食者加大黃如博碁子大五六枚病有勞復有食復傷寒新差血氣未平餘熱未盡早作勞動病者名曰勞復病熱少愈而食之熱有所藏因其客氣留搏兩陽相合而病者名曰食復勞復則熱氣浮越與枳實梔子䜴湯以解之食復則胃有宿積大黃以解之枳實梔子䜴湯方枳實三枚味苦寒梔子十四枚擘苦寒䜴一升苦寒枳實梔子䜴湯則應吐劑此云復令微似汗出者以其熱聚于上苦則裏苦寒吐之熱散於表者苦則發之內經火淫所勝以苦發之此之謂也右三味以清漿七升空煮取四升枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗傷寒差後更發熱者小柴胡湯主之脈浮者以汗解之脈沈實者以下解之差後餘熱未盡更發熱者柴胡湯以解之脈浮者熱在表也故以汗解脈沈者熱在裏也故以下解之大病差後從腹已下有水氣者牡礪澤瀉散主之大病差後脾胃氣虛不能制約胃水水溢下焦腰下為腫也金匱要略曰腰肚下腫當利小便與牡礪澤瀉散利小便而散水也牡礪澤瀉散方牡礪醎平熬澤瀉醎寒栝蔞根苦寒蜀漆辛平洗去腥葶藶苦寒商陸根熬辛酸醎平海藻醎寒洗去醎以上各等分醎味勇泄牡礪澤瀉海藻之醎以泄水氣內經曰火淫於內平以苦佐以酸辛以苦泄之蜀漆葶藶枯蔞商陸之酸辛與苦以導腫濕右七味均搗下篩為散更入臼中治之白飲和服方寸匙小便利止後服日三大病差後喜唾久不了了者胃上寒當以丸藥溫之宜理中丸汗後陽氣不足胃中虛寒不內津液故喜唾不了了與理中丸以溫其胃傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之傷寒解後津液熱不足而虛羸餘未盡熱則傷氣故少氣氣逆欲吐與竹葉石膏湯調胃散熱竹葉石膏湯竹葉二把辛平石膏一斤甘寒半夏半斤洗辛溫麥門冬一斤甘平去心人參三兩甘溫甘草三兩甘平炙粳米半升甘微寒辛甘發散而除熱竹葉石膏甘草之甘辛以發散餘熱甘緩脾而益氣麥門冬人參粳米之甘以補不足辛者散也氣逆者欲其散半夏之辛以散逆氣也右七味以水一斗煮取六升去滓內粳米煮米熟湯成去米溫服一升日三服病人脈已解而日暮微煩以病新差人強與榖脾胃氣尚不能消榖故令微煩損榖則愈陽明王於申酉戌宿食在胃故曰暮微煩當小一下之以損宿榖辨不可發汗病脈證并治第十五夫以為疾病至急倉卒尋按要者難得故重集諸可與不可方治比之三隂三陽篇中此易見也又時有不止是三隂三陽出在諸可與不可中也諸不可汗不可下病症藥方前三隂三陽篇中經注已具者更不復出其餘無者于此已後經注備見脈濡而弱弱反在顛微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微發汗躁不得眠寸關為陽脈當浮盛弱反在關則裏氣不足濡反在顛則表氣不逮衛行脈外浮為在上以候衛微反在上是陽氣不足榮行脈中沈為在下以候衛澀反在下是無血也陽微不能固外腠理開疏風因客之故令汗出而躁煩無血則隂虛不與陽相順接故厥而且寒陽微無津液發汗常常煩躁日夜不能得眠也咳者則劇數吐涎沫咽中必乾小便不利心中飢煩晬時而發其形似瘧有寒無熱虛而寒栗咳而發汗踡而苦滿腹中堅肺寒氣逆咳者則劇吐涎沫亡津液咽中必乾小便不利膈中陽氣虛心中飢而煩一日一夜氣大會於肺邪上相擊晬時而發形如隂寒瘧但寒無熱虛而寒栗咳而發汗攻陽則陽氣愈虛寒愈甚故踡而苦滿腹中復堅厥脈緊不可發汗發汗則聲亂咽嘶舌蔞聲不得前厥而脈緊則少隂傷寒也法常溫裏而反發汗則損少隂之氣少隂之脈入肺中循喉嚨挾古本胃為之本肺為之標本虛則標弱故聲亂咽嘶古蔞聲不得前諸逆發汗病微者難差劇者言亂目眩者死命將難全不可發汗而強發之輕者因發而重而難差重者脫其隂陽之氣言亂目眩而死難經曰脫陽者見鬼是此言亂也脫隂者目盲是此目眩也眩目而見眩是近盲也咳而小便利若失小便者不可發汗汗出則四肢厥逆冷肺經虛冷上虛下腫治下者咳而小便利或失小便上虛發汗則陽氣外亡四肢者諸陽之本陽虛則不與隂相接故四肢逆冷傷寒頭痛翕翕發熱形象中風常微汗出自嘔者下之蓋煩心中懊憹如飢發汗則致痓身強難以屈伸熏之則發黃不得小便久則發咳唾傷寒當無汗惡寒今頭痛發熱微汗出自嘔傷寒之邪傳而為熱欲形與裏若反下之邪氣乘結流于肓中為虛煩心唾膿如飢若發汗則虛表熱歸經結熱甚生風若身強直而成痓若熏之則火熱相合消津液故小便不利而發黃肺惡火久則火熱肺必發咳而唾膿夫脈沈數病在裏不可發汗無陽故也凡脈盡中遲不可發汗榮衛不足血少故也凡脈微軟弱者不可發汗凡腹中有動氣在左右不可發汗凡諸動脈微弱者皆不可發汗汗則小便難腸中乾煩燥之也凡失血者不可發汗汗發必恍惚心亂凡咽燥者不可發汗凡積熱在臟不宜發汗汗則必吐中爛生瘡凡下利水榖忌攻其表汗出必脹滿咳咳嗽小便利者不可攻其表汗出即逆不堪者脈微遲溫濕虛煩壞病推經水其表兼失血臍間動氣並如之病在表脈浮者可汗表證具發濁脈不浮是表猶藏裏也未可汗傷寒不可汗條例最多其可汗大抵脈證全在表表固汗然汗大早太過或津液泄變生焉當時誤汗則為亡陽為讝語為可下厥上竭等證其害人又速設或誤汗真武湯救解寒者去芍藥有熱去附子吁此救兵也謹之謹之表中風寒裏消則裏病表熱者雖無陽證可以小心之劑微汗而溫散之微脈若為亡陽不可汗桂枝二越婢一湯尺脈遲為血少榮氣不足不可發汗先用黃耆建中湯養血俟其脈不遲即小柴胡湯桂枝二越婢一湯和解風溫濕溫各有本條虛煩似傷寒傷阹不惡寒身不疼脈不緊不可汗下竹葉湯或小柴胡湯壞病者吐汗下溫不解知犯何逆法治之並不可汗小柴胡湯衄血下血雖脈浮緊無汗然而衄欲愈下者亦欲愈不愈用桂枝湯不可發汗腹中左右上下動氣築觸不可汗不止筋惕肉瞤為逆先服防風白术牡礪湯則頭眩汗下證治論用柴胡桂枝湯動在右發汗汗止建中湯凖之動在右發汗衄而謂心若煩飲吐先五苓散次竹葉湯動在上發氣上衝心棗根湯動在下發汗心中大煩骨節疼頭痛目運入食吐用大橘皮湯以止吐次建中湯下利清穀用理中湯止吐次建中湯或大便不通皆不可汗惡寒脈浮此為表證若謂之邪欲入裏不可汗夫咽乾喉塞亡血淋家衄家與瘡家動氣並不可汗證治論皆用小柴胡湯厥逆不可發汗當歸四逆湯辨可發汗脈證并治第十六大法春夏宜發汗春夏陽氣在外邪氣亦在外故可發汗凡發汗欲令手足俱周時出以漐然一時間許出亦佳不可令如水流漓若病不解當重發汗汗多必亡陽陽虛不得重發汗也汗緩緩出則表裏之邪悉去汗大出則邪氣不能除但亡陽也陽虛為無津液故不可重發汗凡服湯發汗中病便止不必盡劑汗多則亡陽凡云可發汗無湯者丸散亦可用要以汗出為解耳然不如湯隨證良驗聖劑經曰湯津主治本乎腠理壅邪除邪氣者於湯為宜金匱玉函曰水能淨萬物故用湯也夫病脈浮大問病言但便鞕爾設利者為大逆鞕為實汗出而解何以故脈浮當以汗解經曰脈浮大應發汗醫反下之為大逆便鞕雖為實裏亦當先解其外若行利藥是為大逆結胸雖急脈浮大猶不可下下之即死況便難乎經曰本發汗而復下之此為之逆若先發汗治不為逆下利後身疼痛便自調者急當救表宜枝湯發汗外臺嘗云裏和表病汗之則愈太陽病脈浮數者宜發汗也太陽病脈浮大數者宜發汗也陽明病脈遲汗多而微惡寒者外未解宜發汗陽明病脈浮數者宜發汗太陽病常汗微微自出更宜發汗凡脈浮而緊者浮則為風緊則為寒宜發汗太陽病下之微喘者外未解也宜發汗太陽病發熱汗出而惡寒宜發汗辨發汗後病脈證并治第十七發汗多亡陽讝語者不可下與柴胡桂枝湯和其榮衛以通津液後自愈胃為水榖之海津液之主汗多亡津液胃中燥必發讝語此非實熱則不可下與柴胡桂枝湯和其榮衛通行津液則其胃潤讝語自止辨不可吐第十八合四證已具太陽篇中夫太陽病惡寒而發汗自汗出而反不惡寒其關上脈細數者不可吐之夫少隂病其人欲食入吐心中溫溫欲吐復不能吐手足寒脈弦遲乾嘔此膈上有食飲不可吐之當宜溫也諸四逆者不可吐之諸虛羸不可吐之新産者不可吐之病者惡寒而不欲近衣不可吐之辨可吐第十九大法春宜吐春時陽氣在上邪氣亦在上故宜吐凡用吐湯中病即止不必盡劑也要在適當不欲過也病胸中諸實胸中鬱鬱而痛不能食欲使人按之而反有涎唾下利日十餘行其脈反遲寸口脈微滑此可吐之利則止胸上諸實或痰實或熱鬱或寒結胸中鬱而痛不能食欲使人按之反有涎唾者邪在下按之氣下而無涎唾此按之反有涎唾知邪在胸中經曰下利脈遲而滑者內實也今下利日十餘行其脈反遲寸口脈微滑是上實也故可吐之玊函曰上盛不已吐而奪之宿食在上脘者當吐之宿食在中下脘則當下宿食在上脘則當吐內經曰其髙者因而越之其下者引而竭之病人手足厥冷脈乍結以客氣在胸中心下滿而煩欲食不能食者在胸中當吐之此與第六卷厥隂門瓜蒂散證同彼云脈乍緊此云脈乍結惟此有異緊為內實乍緊則實未深是邪在胸中為結乍實則結未深是邪在胸中所以證治同也凡服之吐胸中病便止不必盡劑也大法春夏宜吐凡病頭不強痛寸四脈浮胸中痞滿上衝喉咽不行此為有痰當宜吐之傷寒胸滿痰逆朝嘔熱嗽及肺壅唾膿等宜吐之夫宿食在胸脘宜吐之辨不可下病脈證并治第二十脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微不可下下之則心下痞鞕陽微下之陽氣已虛隂氣內甚故心下痞鞕動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸也動氣在右肺之動也下之傷胃肺津液內竭咽燥鼻乾者肺屬金主燥也頭眩心悸者肺主氣而虛也動氣在左不可下下之則腹內拘急食不下動氣更劇雖有身熱卧則欲踡動氣在左肝之動也下之損脾而肝氣益勝復行於脾故腹內拘急食不下動氣更劇也雖有身熱以裏氣不足故臥則欲踡也動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌動氣在上心之動也下之則傷胃內動心氣心為火主熱針經曰心之生病者掌中熱肝為臟中之隂病則身雖有熱外則欲踡者表熱裏寒也心為臟中之陽病則身上浮冷熱汗自泄欲得水自灌者表寒裏熱也二臟隂陽寒熱明可見焉動氣在下不可下下則腹脹滿卒起頭眩食則下清穀心下痞也動氣在下腎之動也下之則傷脾腎氣則動寒乘脾故有因腹滿頭眩下利則心下痞之證也咽中閉塞不可下下之則上輕下重水漿不下臥則欲踡身急痛下利日數十行咽中閉塞胃已不和也下之則閉塞之邪為上輕傷胃氣為下動至水漿不下臥則欲踡身急痛下利日數十行知虛寒也諸外實者不可下下之則發微熱亡脈厥者當臍握熱外實者表熱也汗之則愈下之為逆下後裏虛表熱內陷故發微熱厥深者熱亦深亡脈厥者則陽氣深陷客於下焦故臍熱也諸虛者不可下下之則大竭求水者欲愈惡水者劇金匱玉函曰虛者十補勿一瀉之虛門下氣之為重虛內竭津液故令大渴求水者陽未竭而猶可愈惡水者陽氣已竭則難可制脈濡而弱弱反在關濡反在巔絃反在上微反在下弦為陽運微為隂寒上實下虛意欲得溫微絃為虛虛者不可下也虛家下之是為重虛難經曰實實虛虛損不足益有餘此是中工治其害也微則為咳咳則吐涎下之則咳止而利因不休利不休則胸中如蟲齧粥入則出小便不利兩脅拘急喘息為難頸背相引臂則不仁極寒反汗出身冷若氷眼睛不慧語言不休而穀氣多入此為除中口雖欲言舌不得前內經曰感於寒則受病微則為咳而不能安甚則為泄為痛肺感微寒為咳則脈亦微也下之氣下咳雖止而利不休則奪正氣而成危惡胸中如蟲齧粥入則出而小便不利兩脅拘急喘息為難者裏氣損也頸背相引臂為不仁極寒及汗出身冷如水者表氣損也表裏損極至隂陽脫者應不能食而言不休難經曰脫陽者見鬼脫隂者則目盲隂陽脫者應俱是不能食而穀多入者此為除中是胃氣除去也口雖欲言舌不能前氣已衰脫不能運也脈濡而弱弱反在關濡反在巔浮反在上數反在下浮為陽虛數則為無血浮為虛數為熱浮為虛自汗出而惡寒數為痛振寒而栗微弱在關胸下為急喘汗而不得呼吸呼吸之中痛在於脅振寒相搏形如瘧疾而反下之致令脈數發熱狂走見鬼心下為痞小便淋瀝小腸甚硬小便則尿血也弱在關則隂氣內弱濡在巔則陽氣外弱浮為虛浮在上衛不足也故云陽虛陽虛不固故腠理汗出惡寒數亦為虛數在下則榮不及故云亡血則不能溫潤腑臟脈數而痛振寒而栗微弱在關邪氣傳裏也裏虛遇邪胸下為急喘而汗出脅下引痛振寒如瘧裏邪未實表邪未解醫反下之裏氣益虛邪熱內陷故脈數發熱狂走見鬼心下為痞此熱陷于中焦者也若熱氣深陷則客於下焦使小便淋澀小腸甚鞕小便尿血也脈濡而緊濡則胃氣微緊則榮中寒陽微衛中風發熱而惡寒榮緊胃氣冷微嘔心內煩醫為有大熱解肌而發汗亡陽虛煩躁心下苦痞堅表裏俱虛竭卒起而頭眩客熱在皮膚悵怏不得眠不知胃氣冷緊寒在關元技巧無所施汲水灌其身客熱應時罷栗栗而振寒重被而覆之汗出而冒巔體愓而又振小便為微難寒氣因水發清榖不容間嘔變反腸出顛倒不得安手足為微逆身冷而內煩遲欲從後救安可復追還胃冷榮寒陽微中風發熱惡寒微嘔心煩衣不溫胃反為有熱解肌發汗則表虛亡陽煩躁心下痞堅先裏不足發汗又虛其表表裏俱虛竭卒起頭眩客熱在表悵怏不得眠醫不救裏但責表熱汲水灌洗以却熱客熱易罷裏寒益增栗而振寒復以重被覆之裏虛遂汗出愈使陽氣虛也巔頂也巔冒而體振寒小便難者亡陽也寒因水發下為清榖上為嘔吐外有厥逆內為懆煩顛倒不安雖欲拯救不可得也本草曰病勢已過命將難全脈浮而大浮為氣實大為血虛氣實為無隂孤陽獨下隂部者小便當赤而難胞中當虛今反小便利而有大汗出法應衛家當微今反更實津液四射榮竭血盡乾煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此為重虛客陽去有期必下如汚埿而死衛為陽榮為隂衛氣強實隂血虛弱陽乘隂虛下至隂部隂部下焦也陽為熱則消津液當小便赤而難今反小便利而大汗出者隂氣內弱也經曰隂弱者汗自出是以衛家不微而反更實榮竭血盡乾煩而不眠血薄則內消而成暴液者津液四射也醫反下之又虛其裏是為重虛孤陽因下而又脫去氣血竭胃氣內盡必下若汚埿而死也脈數者久數不止止則邪結正氣不能復正氣却結于藏故邪氣浮之與皮毛相得脈數者不可下下之則必煩利不止數為熱止則邪氣結于經絡之間正氣不得復行于表則却結於藏邪氣獨浮于皮毛下之虛其裏邪熱乘虛而入裏虛協熱必煩利不止脈浮大應發汗醫反下之此為大逆浮大屬表故不可下病欲吐者不可下之也嘔多雖有陽明證不可攻之為邪猶在胸中也大陽病外證未解不可下下之為逆表未解者雖有裏證亦不可下當先解外為順若反下之則為逆也經曰本發汗而復下之此為逆也若先發汗治不為逆夫病陽多者熱下之則鞕陽熱證多則津液少下之雖除熱復損津液必便難也或謂陽多者表熱也下之則心下鞕無陽隂強大便鞕者下之則必清穀腹滿無陽者亡津液也隂強者寒多也大便鞕則為隂結下之虛胃隂寒內甚必清榖腹滿傷寒發熱頭痛微汗出發汗則不識人熏之則喘不得小便心腹滿下之則短氣小便難頭痛背強加溫針則衄傷寒則無汗發熱頭痛微汗出者寒邪變熱欲傳於裏也發汗則亡陽增熱故不識人若以火熏之則火熱傷氣內消津液結為裏實故喘不得小便心腹滿若反下之則內虛津液邪欲入裏外動經絡故短氣小便難頭痛背強加溫針益陽增熱將必動其血而為衄也傷寒脈隂陽俱緊惡寒發熱則脈欲厥厥者脈初來大漸漸小更來漸漸大是其候也如此者惡寒甚者翕翕汗出喉中痛熱多者目赤脈多睛不慧醫復發之咽中則傷若復下之則兩目閉寒多者便清穀熱多者便膿血若熏之則身發黃若尉之則咽燥若小便利者可救之小便難者為危殆脈隂陽俱緊則清邪中上濁邪中下太陽少隂俱感邪也惡寒者少隂發熱者太陽脈欲厥者表邪欲傳裏也惡寒甚者則變熱翕翕汗出喉中痛以少隂之脈循喉嚨故也熱多太陽多也目赤脈多者睛不慧以太陽之脈起於目故也發汗攻陽則火隂之熱因發而行上故咽中傷若復下之則太陽之邪因虛而內陷故兩目閉隂邪下行為寒多必便清榖陽邪下行為熱多必便膿血熏之則火熱甚身必發黃尉之則火熱必輕為咽燥小便利者為津液未竭猶可救之小便難者津液已絶則難可制而危殆矣此則不可不知也傷寒發熱口中勃勃氣出頭痛目黃衄不可制貪水者必吐惡水者厥若下之咽中生瘡假令足手溫者必下重便膿血頭痛月黃者若下之則兩目閉貪水者脈必厥其聲嚶咽喉塞若發汗則戰栗陽隂俱虛惡水者若下之則裏冷不嗜食大便完榖出若發汗則口中傷舌上白胎煩燥脈數實不大便六七日後必便血若發汗則小便自利也傷寒發熱寒變熱也口中覺勃勃氣出熱客上膈也頭痛目黃血不可制者熱蒸于上也千金曰無陽即厥無隂即嘔貪水者必嘔則隂虛惡水者厥則陽虛也發熱口中勃勃氣出者咽中已熱也若下之亡津液則咽中生瘡熱因裏虛而下若熱氣內結則手足必厥設手足溫者熱氣不結而下行作咋熱利下重便膿血也頭痛目黃者氣內陷故脈厥目閉也貪水為隂虛下之又虛其裏陽聲嚶咽喉閉塞隂虛發汗又虛其陽使隂陽俱虛而戰栗惡水者為陽虛下之又虛胃氣虛寒內甚故致裏冷不嗜食陽虛發汗則上焦虛燥故口中傷爛舌上白胎而煩燥也經曰脈數不解合熱則消榖喜飢至六七日不大便者此則冇淤血也脈數實不大便六七日熱畜血於內也七日之後邪熱漸解迫血不行必便血也便血發汗隂陽俱虛故小便利下利脈大者虛也以其強下之故也設脈浮革因爾腸鳴者屬當歸四逆湯主之脈大為虛以木應下而下之利因不休也浮者按之不足也革者實大而長微強也浮為虛革為寒寒虛相搏則腸鳴與當歸四逆湯補虛散寒大傷寒脈濡而弱陽氣不足不可下之下之則心下痞津液內竭咽燥鼻乾也夫傷寒脈浮而緊浮則為風緊則為寒風則傷榮寒則傷衛榮衛俱病骨節煩疼當發其汗而不可下也夫傷寒脈浮濡弱不得發汗無陽故也亡陽尺中弱澀者不可下夫傷寒結胸證其脈浮大不可下下之即死矣夫太陽與陽明合病喘是胸滿不可下夫太陽與少陽合病心下堅頸強項而眩不可下也夫四逆病厥者不可下也夫病欲吐者不可下也夫病發於陽而反之熱入咽作結胸也夫太隂病其人腹滿吐食不可下下之益甚夫少隂病當心下堅滿不可下之後利不止者死夫病在裏而腹實者可下裏證悉具若惡寒若脈不實是裏猶帶表也未可下之傷寒不可下條例最多其可下者大抵脈證全在裏也裏故可下然下之太早太過或者水榖脫而變生焉至於當汗而誤下則理中湯丸憹為結胸等證其害人之速耳設或誤下則理中湯丸以救解之或裏煩則少加烏梅或轉損厥逆則兼與四逆湯輩吁此救兵也謹之謹之脈來細小固不可下若細小而牢緊又可下也脈浮病在表不可下結胸脈浮大不可下脈細虛或遲緩或尺部澀弱此凡皆為血氣衰不可下也惡寒者表之虛證雖陽明惡寒則與太陽合屬病表汗不可下若少隂證惡寒則溫之嘔吐者雖有陽明證謹不可下小柴胡加生薑主之小便自利汗出者津液竭糞雖硬屬陽明但用蜜導而出也豬膽汁亦可導也脾約證大便堅小便清者熱不在裏雖不大便不可下桂枝湯治之少隂證小便白為下焦虛寒用四逆湯大便堅小便少者津液還入胃必先鞕後溏不久自出惟小便如常乃可下之有表證脈大浮或惡寒或猶生寒熱並不可下不轉失氣謂不可下泄也不下泄則先鞕後溏不可下大抵陽明燥糞欲下之先與小承氣湯若轉失氣則必先溏後鞕更進一劑不轉失氣則止又陽明讝語潮熱脈疾與小承氣湯不轉失氣則與小柴胡湯若次日又不大便而脈澀則為裏虛黃蓍建中湯主之凡陽證而脈澀謹不可下頭汗出為津液少胞中虛不可下唯陽明語讝血熱頭汗則可下諸虛少血厥逆喉閉喉吐亡陽隂實動氣皆不可下虛加附子湯厥逆當歸四逆湯咽喉閉寒鳥扇湯嘔吐小半夏加梗皮湯無陽隂實而大便鞕者下之必清榖腹滿但用蜜導左動氣下之則腹滿拘急氣愈動身雖熱反欲拳先甘草乾薑湯次小建中湯左動氣下之則津液竭咽鼻乾頭眩心悸竹蒂湯上動氣下之則握掌熱煩汗出欲灌水竹葉湯下動氣下之則腹滿清榖心痞頭眩甘草㵼心湯小柴胡湯加減傷寒諸方惟小柴胡為用最多而諸家屢稱述之蓋以柴胡半夏之劑能汗凡半表半裏之間以之和解皆可用也如不知小柴胡非時為表裏和解設其於解益熱消惡血誠有功焉蓋傷寒發熱一二日間解撤不去其熱必至於傷血凡男女皆然小柴胡湯內有黃苓柴胡最行血熱所以屢獲竒功但藥性差寒用之貴能加減今推明活法凡表發熱裏又有燥渴糞鞕熱證者是為內外俱熱小柴胡加大黃裏無熱證但發汗在表者小柴胡加桂枝主解表可以溫血所謂隂盛惡寒甘辛發散者此也是反别大黃主功裏可以蕩滌血熱所謂陽盛內熱酸苦湧泄者此也是又别其解表以溫攻裏以寒之若遇少陽本證及無表裏證或表裏不分之證但依本方用之並不須加減此為正訣虛者少與尤在酌量辨可下病脈證并治第二十一大法秋宜下秋時陽氣下行則邪亦在下故宜下凡服下藥用湯勝丸中病即止不必盡劑也湯之為言蕩也滌蕩腸胃溉灌臟腑推陳燥結却熱下寒破散邪疫理導潤澤枯稿悅人皮膚益人血氣水能淨萬物故勝丸散中病即止者如承氣湯證云右一服利而止後服又曰若一服讝語止更莫復服是不盡劑也下利三部脈皆平按之心下鞕者急下之宜大承氣湯下利者脈當微厥今反和者為內實也下利三部脈平者已為實而久按之心下鞕故為邪甚也故宜大承氣湯下之下利脈遲而滑者內實也利未欲止當下之宜大承氣湯主之經曰脈遲者食乾物得之金匱要略曰滑則榖氣實下利脈遲而滑者為有宿食也脾胃傷食不消水榖是致下利者云內食若但以溫中厚腸之藥治之利未必止可與大承氣湯下去宿食利自止矣問曰人病有宿食何以别之師曰寸口脈浮而大按之反澀尺亦微而澀故知有宿食當下之宜大承氣湯寸以候外尺以候內浮以候表沉以候裏寸口脈浮大者氣實血虛也按之反澀尺中亦微而澀者胃有宿食裏氣不和也與大承氣湯以下宿食下利不欲食者以有宿食故也當即下之與大承氣湯傷食則惡食故不欲食如傷風惡風傷寒惡寒之數也下利差後至其年月日復發者以病不盡故也當下之宜大承氣湯乘春則肝先受之乘夏則心先受之乘至隂則脾先受之乘秋則肺先受之假令春時受病氣又傷肝治之難愈邪有不盡者矣春時先受月日內外相感必復動而痛下利為腸胃病宿積不盡故當下去之下利脈反滑當有所去下之乃愈宜大承氣湯主之脈經曰脈滑者為病食也下利脈滑則內有宿食故云當有所去與大承氣湯以下宿食病腹中滿痛者此為實也當下之宜大承氣湯金匱要略曰病者腹滿中按之下痛為虛痛為實可下之腹中滿痛者裏氣壅實也故可下之矣傷寒脈沈沈者內實也下解之宜大柴胡湯傷寒後為表匕解脈沈為裏未和與大柴胡湯以下內實經曰傷寒差已後更發熱脈沈實者以下解之也脈雙弦而遲者必心下鞕脈大而緊者陽中有隂也可以下之宜大承氣湯金匱要略曰脈雙弦者寒也經曰遲為在臟脈雙弦而遲者隂中伏陽也必心下鞕大則為陽緊則為寒脈大而緊者陽中伏隂也與大承氣湯以與隂陽相合夫少隂病得之口燥咽乾宜急下之夫傷寒病人腹滿不大便者亦然夫傷寒病腹中滿痛者為寒當宜下之夫傷寒脈數而滑者有宿食當下之則愈夫傷寒六七日目中童子不明無外證大便難微熱者此為實宜急下之夫太陽病七八日脈微浮者其人發狂此下焦有熱小腹當堅而滿小便自利下血乃愈瘀血在裏故也宜下之夫陽明病但頭汗出其身無汗小便不利渴飲水漿此為瘀熱在裏身必發黃宜急下之夫太陽病有熱而小腹滿者小便反利此為有畜血當宜下之夫傷寒病五六日不大便繞臍痛煩燥汗出者此為有結汗出後則暫解日晡則復發脈實者當宜下之夫傷寒七八日身黃如橘小便不利其腹微滿者宜下之夫陽明病其人多汗津液越出胃中有熱大便必堅宜下之夫傷寒大下後六七日不大便煩熱不解腹滿如痛者此有宿食宜下之夫傷寒病小便不利大便乍難乍易時有微熱不能卧此胃中內有結燥故也宜下之辨發汗吐下後脈證并治第二十三此第十卷第二十二篇凡四十八證前三隂三陽篇中悉具載之此已下諸方于隨卷本證下雖已有録止以加減言之未甚明白以覽者撿閲未便今復校勘備列于後桂枝加葛根湯主之方葛根四兩芍藥三兩甘草二兩生薑三兩切大棗十二枚擘桂枝三兩去皮右七味以水一斗先煮麻黃葛根減二升去上沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥餘如桂枝法桂枝加厚朴杏仁湯方於桂枝湯方內加厚朴三兩用杏仁五十箇去皮尖餘依前法桂枝加附子湯方於桂枝湯附子一枚炮去皮破八片餘依前法术附湯方附於此方內去皮桂枝加白术四兩依前法桂枝去芍藥湯方於桂枝湯方內去芍藥餘依前法桂枝去芍藥加附子湯方於桂枝湯內去芍藥加附子一枚炮去皮破八片餘依前法桂枝麻黃各半兩湯方桂枝一兩十六銖去皮芍藥生薑切甘草炙麻黃各一兩去節大棗四枚擘杏仁二十四箇湯浸去皮尖及兩仁者右七味以水五升先煮麻黃三沸去沫內諸藥煮取一升八合去滓溫服六合桂枝二麻黃一湯方桂枝一兩十七銖去皮芍藥一兩六銖麻黃十六銖去節生薑一兩六銖切杏仁十六箇去皮尖甘草一兩二銖炙大棗五枚擘右七味以水五升先煮麻黃三沸去上沫內諸藥煮取二合去滓溫服一升白虎加人參湯方於白虎湯方內加人參三兩餘依白虎湯法桂枝去桂加茯苓白术湯方於桂枝湯方內去桂枝加茯苓白术各三兩餘依前法煎服小便利則愈葛根加半夏湯方於葛根湯方內加半夏半升餘依葛根湯法桂枝加芍藥生薑人參新加湯方於第二卷桂枝湯方更加芍藥生薑各一兩人參三兩餘依桂枝湯法服梔子甘草豉湯方梔子䜴湯方內加入甘草三兩餘依前法得吐止勿服梔子生薑豉湯方梔子䜴湯方內加生薑五兩餘依前法得吐之後服柴胡加芒消湯方小柴胡湯方內加芒消七兩餘依前法服不解更服之桂枝加桂湯方第三卷桂枝湯方內更加桂枝三兩共五兩餘依前法柴胡桂枝湯方桂枝去皮黃苓人參各一兩半甘草一兩炙半夏二兩半芍藥一兩半大棗六枚擘生薑一兩半切柴胡四兩右九味以水七升煮取三升去滓溫服附子㵼心湯方大黃二兩黃連黃芩各一兩附子一枚炮去皮臍破别圭取汁右四味以切三味麻黃湯三升漬之須臾絞去滓內附子汁分溫再服生薑㵼心湯方生薑四兩切甘草三兩炙人參三兩乾薑一兩黃芩三兩半夏半升洗黃連一兩大棗一十二枚擘右八味以水一斗煮取六升去滓再煎取三升溫服一升日三服甘草㵼心湯方甘草四兩黃芩三兩乾薑三兩半夏半升洗大棗十二枚擘黃連一兩右六味以水一斗煮取六升去滓煎取三升溫服一升日三服黃芩加半夏生薑湯方於黃芩湯方內加半夏并生薑一兩半餘依黃芩法服桂枝加大黃湯方桂枝三兩去皮大黃一兩芍藥六兩生薑三兩切甘草三兩炙大棗十二枚擘右六味以水七升煮取三升去滓溫服一升日三服桂枝加芍藥湯方於第二卷桂枝湯方內更加芍服藥三兩通共六兩依桂枝湯方四逆加吳茱茰生薑湯方當歸三兩芍藥三兩甘草三兩炙通草二兩桂枝三兩去皮細辛三兩生薑半升切吳茱茰二升大棗二十五枚擘右九味以水六升清酒六升和煮取五升去取溫分五服方水酒各四升四逆加人參湯方於四逆湯方內加人參一兩亦依四逆湯法服四逆加豬膽汁湯方於四逆湯方內加入豬膽汁半合餘依膽煎服如無豬膽以羊膽代之音釋辨陽明脈證并治厠初吏切間也溷也瘕音假腹中久病疸音但黃病憒古對切心亂也怵敕律切悲也惕音踢敬也又憂也疸丁賀切勞病也辨太隂脈證并治拒音巨抑也函音含又音減書函􅑩音荒目不明也脘音管胃腑也竭渠列切涸也蒂音帝瓜蒂也辨不可下病脈證并治齧五結切噬也盥音貫澡手也悵怏上丑亮切望恨也下于亮切下脹也嚶於耕切烏鳴也溉灌上居代切下音貫洗也普濟方卷一百二十九
