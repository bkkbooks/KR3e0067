刮竹箭上取茹作炷灸疔腫上二七壯即消治瘍瘡振寒穴小海治馬刀瘍瘻穴太衝臨泣治一切瘑瘡資生經足大指竒間灸二七壯灸大指頭亦佳治瘡毒久不合穴合谷灸七壯至七七壯極驗仍服內托散治疔腫在左灸左臂曲肘紋前取病人三指外於臂上處中灸之兩筋間從不痛至痛腫在右從右灸不過三日即瘥治瘑瘡灸瘑上周匝最良治睡後忽一點疼起遂致遍身赤痛諸藥不效用艾炷如小指頭大以水透濕紙約五分重纒褁其手痛處又用斷木匙頭安於濕紙上對抵痛處却將艾炷於木匙上灸須臾諸痛悉除所灸處有膿水出生痂瘢而後愈治馬刀腫瘻淵腋資生經穴章門支海治馬刀腋下腫肩腫吻傷灸太衝治馬刀痿腋腫穴絶骨治腋下腫馬刀瘻穴俠溪陽輔太衝癬疥治痂疥資生經穴陽溪療皮膚痂疥穴合谷曲池王氏云少患疥凡十五年遇冬則為瘡人教用羊蹄菜根蛇床子根片切如錢米泔浸三二宿漉出入生薑礬同研細褁以生布過浴擦洗良久以水洗三四次用即除根後數年再生用前法愈神效如此何以灸為也治白癜瘋灸左右手中指節去延外腕中三壯永差報之治白癜駮重午日午時灸膝外屈腳當紋頭隨年壯一時下灸不得動治白癜白駮浸淫癧瘍著頭頸胸前灸兩乳間隨年壯立瘥治癬出危氏方日中時灸病處影上三壯呪曰癬蟲毛戎戎若欲治待午日又治八月八日日出時令病人正當東向户長跪平舉兩手將户兩邊取肩頭小垂際骨解宛宛中灸兩火俱下各三壯若七壯十日愈治痂疥穴大陵支溝陽谷後溪治乾癬諸治久不瘥者但看癬頭有痱癗子處即以小艾炷灸之發背癰疽治泄諸陽熱氣背永不發癰疽資生經穴風門頻刺之治發背或不見瘡頭以濕紙傅先乾是以大蒜去皮生切錢子大先安一蒜錢在上次艾灸三壯換蒜復三灸如此易無數痛灸至不痛不痛灸至痛方住若第一日急灸減九分三日減八分至第七日猶可自此以往灸已後時灸訖以石上生者龍鮮茄荔洗研取汁湯溫呷即㵼出惡物去根凡疔瘡頭瘡㿌瘡等瘡一切無名者悉治即效凡發腫至堅有根者名癰治炷當上灸之百壯石子當碎出如不出益壯乃佳凡發背皆因服五石寒食更生散所致亦有服鍾乳而發者又有生平不服而自發背者其候率多於背兩胛間起初如粟米大或痛或癢仍作赤色人皆初不以為事日漸長不過十日遂致於死臨困之時已闊三寸高一寸瘡有數十孔以手按之諸孔中皆膿出尋時失音所以養生者小覺背上癢痛有異即便用此法火急取淨土水和為泥捻作餅子厚三分濶一寸半粗艾大作炷灸泥上貼著瘡上灸之一炷一易餅子若粟米時可灸三餅子即瘥如榆莢大灸七七餅炷即瘥如錢大可日夜灸不限炷數更服五香連翹湯及諸藥以攻之乃愈凡腫起背胛中頭白如黍粟四邊相連腫赤黑令人悶亂即名發背禁房室酒肉蒜麵若不灸治即入內殺人當瘡上灸七八百壯有人不識多作雜腫治者皆死有善治發背癰疽者皆於瘡上灸之多至三二百壯無有不愈但艾炷小作之炷小則人不畏灸灸多則作效矣蓋不得此法也然亦不得泥此近有醫以治外科得名有人發背瘡大如碗有數孔亦無藥可治只以艾遍敷在瘡上灸之灸之而不疼則以瘡上皆死肉故初不覺疼也旋以藥調治之愈蓋出於意表也昔王蘧疽發於背張生以艾大加瘡上自旦及暮凡一百五十壯知痛乃已明日鑷去黑痂膿血盡潰膚理皆紅亦不復痛始别以藥傅之日一易焉易時旋剪去黑爛惡肉月許瘡乃平是歲夏秋間京師士大夫病疽者七人余獨生此雖司命事然固有料理不知其方遂至不幸者治營疽穴商曲治膝臏癰穴犢鼻治營一作骨疽發厲項痛引頭目痛及癰疽頭痛心煩穴竅陰治疽卒著五指筋急不得屈伸者灸踝骨尖數十壯或至百壯附骨疽穴間使後一寸灸隨年壯立瘥療肺癰唾膿血氣壅不通穴天突治肺癰咳嗽上氣唾血不下食胸中氣滿如塞穴亶中治石癰凡發腫至堅有根者是也資生經歌云惡患是石癰不針可藥取當上灸百壯石子出如雨治瘍腫振寒穴小海治頻腫脣癰穴顴髎王氏云余嘗為劉和叔序灸癰疽方云必以毒藥攻於內伐其根也又以火艾灼其外宣其毒也法盡於此矣癰疽始作灼艾服大黃等藥無不愈者大黃宜隨人虛實服王子病背疽京師外醫以為不可治得一徐人教以灼艾如棗大近千壯又魯直數患背瘡亦灼艾而愈灸為第一法也治背疽外科精要凡覺背上腫硬疼痛用濕紙貼腫上先乾便是癰頂可用大蒜十頭淡豉半合乳香一塊如龍眼大細研隨瘡頭大小用竹片作圈子竹片濶二分許隨大小頓在瘡頭上將所研藥填平鋪艾灸之若痛處灸至癢為度若癢處亦灸至痛為度以百壯為率自頭上見疽及項已上見疽千萬不可用此法灸之則反增其疾治發背若初覺赤腫腫上作小瘡疼不可近急用針刺上七八針取冷水用􅙪擊射腫上日夜不止疼歇腫消治發背頭未成瘡及諸熱腫以濕紙拓上先乾處是熱氣衝上欲作瘡子便灸之如先疼痛灸即不痛如先不痛以痛為度治腳脈及曲䐐中癢搔則黃汁出是名風疽灸足大指岐間二七壯又灸大指頭亦佳治肺癰而作吐膿血不止灸肺腧二七壯在三椎下兩旁各一寸半及灸譩嘻二次二七壯其穴在第六椎兩旁各三寸抱肘取之治發背癰疽疔腫諸毒瘡初發出小包如魚眼或陷頂或紫黑色無頭疼作渴惡心者皆惡毒也此法治腫令消速以獨蒜切作片蓋其患處大艾炷多灸令不痛者痛痛者不痛癢者不癢不癢者癢每隨火出即愈如腫甚無頭即以濕紙一張蓋合先乾處即頭也如前以蒜片炷灸之腫大者五花灸壯數多為妙此外科精要方內第一法也五花灸者如樣下灸炷又云灸多為善勿令大熱但痛即去蒜蒜焦換用勿損皮肉體乾不須灸常用此大效治懸癰擇人神不在日早空心先用井花水調百藥煎末一碗服之微利却須得秋葫蘆亦名苦不老生在架上而苦者切皮片置瘡上灸二七壯昔有人患連年一灸效驗騎竹馬灸法治癰疽發背不問男女無不效驗其法先令病人以肘憑几間臂腕要直用篾一條自臂腕中曲處橫紋男左女右貼肉量起直中指尖盡處截斷為則不量指甲却用竹扛一條令病人脫衣騎定令身正直前後用兩人扛起令腳不著地又令一人扶定勿令僵仆却將前所量臂腕篾從竹扛坐處尾骶骨盡處直向上貼脊背量至篾盡處為則用墨點定此是取中非灸穴也却用篾作則子量病人中指節相兩橫頭為則男左女右截為一則就前所點記處兩邊各量一則盡處即是灸穴兩各灸五壯或七壯止不可多灸不問癰生何處並用此法灸之無不愈一云可看癰發於左則灸右發於右則灸左甚則左右皆灸經云諸痛癢瘡皆屬於心此二穴心脈所過處灸之使心火調暢血脈流通愈於服藥又灸足三里穴并氣海穴引熱毒氣歸下其理甚長皆良法也治大人小兒癰腫灸兩足大拇指竒中仍隨病左右治癰疽凡癰疽始發或小或大或如米粒皆須微候急須攻之若無醫藥處即灸當頭百壯一云七八百壯其太重者灸四面及中央二三百壯亦宜當頭以大針針入四分治癰腫者刺癰上視癰大小深淺刺大者多而深之必端納針治發背癰腫已潰未潰出聖惠方用香豉三升以水和搗作餅子厚三分有孔勿覆之布豉餅以艾列其上灸之取溫熱勿令破內如熱痛急湯之一日兩度灸如有瘡以瘡孔中汁出為度腋癰大熱刺足少陽五熱不止刺手心主三刺癰疽不得頃時回癰不知所按之不應手乍來乍已刺手太陰傍三痏與陰脈各二治靣目上癰腫刺陷谷出血立愈治頭大侵潭一作侵淫穴間使治腸癰及諸癰腫灸兩手後肘尖上各一七壯左右同又灸兩足大指岐間各三壯兼治諸癰腫病又出兩肘正灸肘頭鋭骨各百壯下膿血即瘥癰疽瘤石癰結核瘰癧皆不可就針角針角者鮮有不及禍瘰癧治寒熱頸瘰癧資生經穴大迎五里臂臑治寒熱頸痛瘰癧穴大迎治寒熱瘰癧缺盆中腫外潰則生胸中熱滿腹大水氣缺盆中痛汗出穴缺盆治寒熱瘰癧咳嗽穴五里治寒熱頸項急瘰癧臂中痛不得舉穴臂臑治腋下瘰癧臂屈伸不得風痺疼注病穴少海治瘰癧寒熱頸有積氣暴聾肩痛穴天牖治一切瘰癧在頂上及觸處但有肉結凝已作瘻及癰癤者以獨頭蒜截兩頭留心大作艾炷如蒜大小貼癧上灸之勿可令破肉但取熱而已七壯一易蒜日日灸之即消止治一切瘰癧灸兩頰裏患癧處宛宛中日一壯七日止又五里大迎各三十壯又患人背兩邊腋下後紋上隨年壯又耳後髮際直脈七壯王氏云有人項上患癧人教用忍冬草研細酒與水煎服以滓傅而愈次年復生用前藥不效以艾灸之而除根有小兒耳後癧用藥傅不效亦灸之而愈云瘰癧初生如梅李大切忌以毒藥點蝕及針刀鐮割勞癧為甚即經蝕取之後無有不死者特宜戒之治癧瘍著頸及胸前灸乳間治腋下瘰癧漏臂疼屈伸不得風痺漏瘙針少海三分留七呼瀉五吸針瘰癧先拄針皮上三十六息推針入內之追核入小勿出核三上三下乃出針治頸漏灸天池百壯又心鳩尾下宛宛中七十壯又章門臨泣支溝陽輔百壯又肩井隨年壯又以艾炷繞四邊周匝七壯即止若諸惡漏中冷息肉出灸足內踝上各三壯二年者六壯治一切瘰癧以手仰置肩上微舉肘取之肘骨尖上是穴隨所患處左即灸左右即灸右艾炷小筯頭大三壯即愈復作即再灸不過三次除根神效百一選方云湯夀資頃宰鍾離有一小鬟病瘡已破傳此法於本州一曹官早灸晚間膿水已乾凡兩灸遂無恙後屢以治人皆驗駱安之妻患四五年瘡痂如白螺靨不退辰時著灸申時即落所感頗深凡三作三灸遂除根矣灸瘰灸兩腋中患瘰癧處宛宛中百壯止又用商陸搗捻餅子置瘻上以艾炷灸餅上乾熟則易之灸三十壯一云二七壯治癧用韭菜畦中蚯蚓糞和水為餅子量瘡大小用之過瘡二三錢地位貼瘡上外以艾圓灸之患人覺得瘡熱或痛止火休去餅子上以膏藥固定少五日多七日開平復初瘡已破愈好醫未破者自痊治癧瘡用七月七日日出時收麻花五月五日收艾二件作炷子於癧瘡上灸百壯治卒患瘰癧子不痛方取桃樹皮貼上灸二七壯治瘰癧瘡用蒜薄切鋪於瘡上用艾圓灸得知疼痛次用水雞彈九箇每三分齊造三箇每一箇內班貓七箇去翅足巴豆半粒分作三分或一粒過三日又灸又用三箇每箇用十四箇班貓巴豆半粒或一粒分作三分再過三日又灸每箇用二十一箇班貓巴豆一粒分作三分加信少許治瘰癧結核宜用此灸法用巴豆一枚去皮心艾葉一雞子大相和搗爛擘碎曝乾撚作炷灸癧子上三壯即止治瘰癧灸葶藶餅子法用葶藶子二合豉半升湯浸令軟搗熟捻作餅子如錢厚安在癧子上以艾炷如小指大灸餅子五日一度灸七壯不可破頭不可灸葶藶氣入腦能殺人治瘰癧結核宜灸莨菪根法用莨菪根一兩粗者切厚約三四分安癧子上緊作艾炷灸之熱徹則易五六炷頻頻灸當即退矣治瘰癧凡瘰癧欲成瘻周四畔灸之即瘥一云於連核引腳處截灸之即不開去後乃當頂灸之各七壯治瘤癭氣咽腫資生經穴天府臑會氣舍治瘻穴通天灸五十壯胸堂羊矢灸百壯治頭有大氣穴胸户通天消濼天突治頸癭氣瘤及臂腫穴臑會治癭肩不舉穴浮白治癭上氣短氣穴肺腧灸百壯治癭上氣胸滿穴雲門灸五十壯治癭惡氣穴天府灸五十壯胸堂百壯治癭勞氣穴衝陽灸隨年壯治癭穴天瞿灸三百壯三間小灸之治癭氣面腫穴通天灸五十壯治癭穴中封灸隨年壯治諸癭灸肩髃左右相對宛宛處男左十八壯右十七壯女右十八壯左十七壯或再三取差止又風池灸百壯又兩耳後髮際百壯又耳後髮際有一陰骨骨間有一小穴亦有動脈凖前大效治癭惡氣大椎橫三寸間灸之風池穴耳後髮際大椎各百壯大椎兩邊各寸半小垂下各三十壯又臂臑隨年壯凡五處共九穴又垂兩手兩腋下紋頭各百壯針亦良資生經云大智禪師治皮膚頭靣生瘤大如拳小如棗或軟或硬不痛不可輒灸天南星生乾皆得滴少醋研膏先將小針刺病處令氣透以藥膏攤紙上貼三五易瘥此一説也故併存之治腦瘻諸節諸癰腫牢堅治之方削附子令如棊子厚正著腫上以少唾濕附子艾灸附子常令熱徹如附子欲乾又更唾濕之如前常使附子氣入腫中無不即愈此法絶妙祕而不傳凡肉瘤勿可治治之殺人肘後方云不得灸針治面生贅瘤灸一壯即用好醋磨雄黃塗紙上剪如靨子大貼於灸處用膏藥封貼二日易候汁出膿如豆粉愈治癭瘤病男左女右灸肘後屈高骨尖點穴却伸手背灸七壯並灸胸坎骨下巨闕穴五壯常服復元通氣散大效療諸癭頭衝一作頸衝一作臂臑各灸隨年壯治諸癭將患人男左女右以繩量手中指從指端齊繩頭向下至指下橫紋上截繩頭中屈從橫紋直下點繩頭灸七壯五年以後量加壯數須三月三日午時下灸無不瘥者石癭難愈氣癭易治疣目治手足忽生疣目資生經作艾炷如疣目大灸三壯即除治生疣目資生經云疣目雖可灸千金方亦有用杏仁燒令黑研碎塗上者有用松柏脂合和塗之一宿失去者有用牛口中涎數塗自落者有用苦酒漬石灰六七日滴取汁點疣上疣即落者有以豬脂揩癢處令少許血出即瘥其中神效無以加者原不必拘泥灸法以為更無他法治也蠱毒尸厥獸傷類蠱毒當足下小指尖上灸三壯當有物出酒上得者有酒出飯上得者有飯出肉菜上得者有肉菜出即愈神效皆於瘡上灸出治蠱毒穴巨闕尸厥中惡主卒起僵仆惡見風寒資生經穴百會玉枕主暫起僵仆穴通天絡郤主僵仆不能久立煩滿裏急身不安席穴大杼主卒尸厥不知人脈動如故穴隱白大敦主尸厥暴死穴金門主恍惚尸厥煩痛穴中極僕參治邪客於手足少陰太陰足陽明之絡此五絡者皆會於耳中上絡左角五絡俱竭令人身脈動如故其形無所知其狀若尸刺足大指之內側爪甲上去端如韭葉後刺足心後取足中指爪甲上各一痏後取手大指之內去爪甲如韭葉後刺手心主少陰兊骨上之端各一痏立已以筒吹其兩耳中立已不已拔其左角髮方寸燔治飲以淳酒一杯不能飲者灌之立已主厥逆足卒青痛如刺腹若刀切之狀大便難煩心狂見鬼好笑頭面四肢腫穴豐隆治飛尸遁注胸膈脹滿又或時上心嘔吐喘逆咽乾脅痛刺入五分灸五十壯在腋四肋之間髙下正與乳後二寸陷中舉腋取之俗名注市主惡風邪氣遁尸內有瘀血九曲中府刺入五分灸三十壯又云灸五十壯此法神良主卒中惡風邪氣飛尸惡注鬼語遁尸穴天府治卒尸厥不識人足寒不能溫穴隱白治恍惚尸厥不知人穴中極治尸厥狀如死穴大敦治尸厥如中惡狀霍亂癲癎狂見鬼穴僕參治尸厥口禁氣絶狀如中惡心腹脹滿尸厥如死不知人穴厲兊治癲癎尸厥暴疝穴金門治腋腫膨失志身熱飛尸遁注痿厥不仁穴委陽療尸厥走注胸背連痛穴魂門療疾癲尸厥霍亂馬癎穴僕參療卒中惡鬼注不得安卧穴天府療尸厥穴攢竹禾􅐎凡尸厥而死脈動如故此陽脈下墜陰脈上爭氣閉故也針百會入三分補之又尉斗尉兩脅下又竈突墨彈丸大漿水和飲之又針足中指頭去甲如韭葉又刺足大指甲下內側去甲三分一云灸百會百壯治卒中惡穴水溝凡五尸者飛尸遁尸風尸尸疰沉尸也今皆取一方兼治之其狀腹脹痛急不得氣息上衝心胸旁攻兩脅或纍塊踊起或攣引腰背治之法灸乳後三寸男左女右可二七壯不止者多壯數即愈又兩手大拇指頭各七壯又心下三寸六十壯又乳下一寸隨病左右多其壯數又以細繩量患人兩乳頭內即截斷中屈之又從乳頭向外量使當肋罅於繩灸三壯或七壯男左女右治卒疰忤攻心胸灸苐七椎隨年壯又心下一寸三壯又手肘隨年壯治五毒疰不能飲食百病灸心下三寸胃腕十壯治水疰口中吐水內經云肺來乘腎食後吐水灸肺前又灸三陰交又灸期門㵼肺補腎各隨年壯治一切疰無新久及治諸氣神良先仰卧灸兩乳邊斜下三寸第三肋間隨年壯可至三百壯一名注市治鬼神邪穴間使治鬼神邪卒死穴陰囊下第一指理十四壯王氏云有貴人內子産後暴卒急報其母為辦後事母至灸會陰三陰交各數壯而蘇母蓋名醫女也治溺死一宿尚可救解死人衣灸臍中即活治尸厥灸亶中季肋間二七壯又灸鼻下人中七壯又灸陰囊下去下部一寸百壯若婦人灸兩乳中間又以爪刺人中良久以針針人中入至齒立起此亦全是魏大夫傳中扁鵲法即趙太子之患又張仲景云尸厥脈動而無氣氣閉不通故靜然而死也又灸膻中穴二十八壯治尸厥針百會當鼻中入髮際五寸針入三分補之針足大指甲下內側去甲三分又針足中指甲上各三分大指之內去端韭葉又針手少陰鋭骨之端各一分治尸厥刺任脈玉泉一穴在臍下四寸針入三分次針足太陰隱白二穴在足大指端內側去爪甲角如韭葉針入三分更兼兩脅下尉之治卒中五尸以四指尖其痛處灸指下際數壯令人痛爪其鼻人中又爪其心下一寸多其壯即瘥治尸厥灸頭上百會穴四十九壯兼臍下氣海丹田穴三百壯覺身體暖即止治一切病食疰灸手小指隨年壯男左女右治尸厥穴厲兊灸三壯炷如小麥大治卒死而張目反折者肘後灸手足兩瓜後十四壯仍飲以五毒諸膏散有巴豆者良治卒死而四肢不收失便者灸心下一寸臍下三寸臍上三寸各一百壯治中惡肘後灸胃脘五十壯又以繩橫其人口以度度臍去四面各一處灸三壯令火俱起更又用心下灸下頭五壯治尸厥以繩圍其臂腕男左女右繩後大椎上度下行脊上灸繩頭五壯是又亶中二七壯治卒中邪魅恍惚振噤灸鼻下人中及兩手足大指爪甲令艾丸半在爪上半在肉上各七壯不止至十四壯便愈炷如雀屎大治中惡短氣欲死肘後灸足兩拇指上甲後聚毛中各十四壯即愈未瘥又灸十四壯前灸三七壯治救卒客忤者中惡之類也多於道路門外得之令人心腹脹滿絞痛氣衝心胸不即活亦殺人肘後灸鼻下人中三十壯令切鼻柱下也以水漬粳米取汁一二升飲之口已禁者以物強發之治卒忤死又治卒死而張目反折者肘後灸手十指爪下各三壯又灸鼻下人中三壯又灸肩井百壯又灸間使七壯又巨闕百壯又法令大痛爪人中取醒不起者捲其手灸下紋頭隨年壯治卒死無脈及治尸厥針間使各百餘息又灸鼻下人中又尉斗尉兩脅下又蔥刺耳又灸其唇下宛宛中名承漿十壯大良又以細繩圍其人肘宛宛中男左女右伸繩從背大椎上度以下行脊上灸繩頭一云五十壯又從此灸橫行各半繩此凡三灸各灸三壯即起治卒死并卒忤死肘後灸心下一寸巨闕臍上三寸建里臍下四寸中極各百壯又灸臍中百壯用此即活治卒死而口禁不開者以繩縳兩手大拇指灸兩白肉中二十壯治自縊死灸四指大節陷大指本紋名曰地軸各七壯治溺水死灸法急解本人衣服臍中灸百壯或倒懸病人挑去臍上垢或吹兩耳中或綿包皂角末內下部外臺云雖溺死一宿者以皂角綿包內下部須臾出水即活治卒中惡短氣欲死以其人置地取利刀畫從肩起男左女右畫地令周遍訖以刀鋒刺病人鼻中人中令入一分急勿動其人當鬼語求去乃具問何與何故來自當乞去乃以指滅向所畫地當肩上頭數寸令得去不可具詰問之治鬼擊卒死及諸暴絶證灸鼻中一壯立愈不瘥更灸臍上一寸七壯及兩踵白肉際即瘥又灸臍下一寸三壯及兩腳大拇指內離甲一薤葉許各灸三五壯即活臍中灸百壯亦效治鬼魅驚恐哭泣上星穴直鼻入髮際一寸灸五壯又脣表中央絃者中灸三壯又主邪鬼妄語治鬼擊刺足陽明三里二穴手少陽經支溝二穴立愈不愈復刺靈樞經云刺之氣不至無問其數刺之氣至即出其針治中惡卒死短氣胃脘穴甲乙經云一名太倉胃幕也在上脘下一寸若蔽骨臍中手太陽少陽足陽明所主任脈之會宜灸三壯又云灸足大指橫紋隨年壯左右同又云刺督脈水溝一穴任脈中脘氣海二穴凡刺胸腹者必以布繳乃單布上刺又灸兩足大爪甲聚毛甲中七壯此華他法又云三七壯又灸臍中百壯蟲獸傷治猘犬所傷不出發寒熱見外邱穴速以三姓人飯敷之可灸咬處立愈春末夏初狂犬咬人即令人狂過百日乃得免當終身禁食犬肉蠶蛹食此則發不可救也先去却惡血灸瘡中十壯明日以後日灸一壯百日乃止忌酒每七日搗韭汁飲一二盞治睡著蛇入七竅以艾灸蛇尾即出又法刀破蛇尾些子入椒七粒蛇自出出後急以雄黃硃砂細研煎人參湯調灌去蛇毒治蛇傷即以溺溺之拭乾以艾灸之效又云朝野僉載記艾炷當毒蛇咬處灸引出毒氣差薄切獨頭蒜貼蛇咬處灸熱徹即止灸蛇毒上三七壯無艾以火頭稱瘡孔大小熱之治狂犬咬人令人吮去惡血盡灸百壯後日日灸百日止若血不出一生忌酒豬肉治一應蛇虺蜈蚣咬傷用艾炷於傷處灸三五壯拔去毒即愈或七壯其痛止治毒蛇所傷用艾炷當咬處灸之引去毒氣即愈其餘惡蟲所螫馬汗入瘡等用之亦效治射工中人寒熱或發瘡偏在一處有異於常者又云江南有射工毒蟲一名短狐一名蜮常在山間水中人行及浴此蟲口中橫骨角弩即以射人形影則有病若見身中即有瘡切蒜令薄以拓瘡上灸蒜上十壯瘥凡治射工毒灸瘡毒處射工毒若見身中有積瘡處便急治之用急周繞遍去此瘡邊一寸輒灸一處百壯瘡上亦一百壯大良治沙飍毒右用大蒜十片著熱灰中溫之令熱斷蒜及熱拄瘡上儘十片復以艾灸瘡上七壯則良又方已深者針挑取蟲子正如疥蟲著爪上映光方見行動也挑不得便就上灸三四壯則蟲死病除若猶覺惛惛是其病已大深便應依土俗作方術拂出之并諸湯藥以浴皆三升出都盡乃止亦依此方并雜用前中溪毒及射工法急救七日中宜瘥不爾則仍有飛蟲來入攻噉人心臟便死愼不可輕治蝎螫不可忍者詳其經絡部分逆順蹙氣毫針刺之其針呪過呪曰天靈節榮願保長生太玄之一守其真形臟腑神君各保安寧神針欲下萬毒潛形急急如律令攝凡針咒之其病速愈點念一遍吹一口氣於針上刺之治蛇螫嚼鹽唾上訖灸三壯復嚼鹽唾灸瘡上普濟方卷四百二十三
