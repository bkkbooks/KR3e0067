body:
  text: 普濟方卷四百二十三明周王朱橚撰針灸門腳氣論凡腳氣發有陰陽表裏當隨壯療之不可要依古方患陰療陽病表救裏皆為重虛實危殆之甚也若病從陰發起兩大指內側上循脛內及膝裏頑痺不仁或腫先發於此者皆須隨病灸復溜中都陰陵泉等諸穴灸者先從上始向下引其氣便各灸二十壯向後隔七日灸七壯取差止餘穴皆依此若病從陽起兩小指外側向上循脛外骨至風市穴頑痺不仁或腫起於此者須灸陽絶骨陽陵泉風市等諸穴灸數及上向下皆依前法若毒氣兼行表裏者乃可量其輕重隨灸膏以磨之上下遍發表裏各灸一二處以此通泄之其用藥內攻各量病投藥也逐遍若處常使灸瘡不瘥為佳風氣都除乃隨瘡差差後瘢色赤者風毒已盡青黑者猶有毒氣仍灸勿止待身體輕利然後可休矣又一本云常須灸三里絶骨勿令瘡瘥佳腳氣初發轉筋者灸承山承筋二穴噦逆者灸湧泉若頭至連背痛寒熱如瘧及腰痛者灸委中頭項皆痛遍身痛即灸不在正穴也又云若腳氣盛發時自腰以上並不得針灸當引風氣上則殺人氣歇以後有餘病者灸無妨惟冬月得灸春夏不可灸自風市以下固宜告耳又云若氣上擊心不退急灸手心三七炷氣即便退若未退即兼悶者豉酒熱飲逐之即瘥不去即取烏牸牛尿一大升暖服以利為止漸至三服五服彌佳又若已灸腳而胸中氣猶不下滿悶者宜灸間使五十炷兩手掌橫紋後一膚兩筋間是也又若胸中氣散而心下有脈洪大跳數直向下分入兩髀股內令人心急驚悸者宜以手按攝小腹下兩傍接髀大斜紋有脈跳動便當紋上灸三七壯即定灸畢皆須用灸三里二十炷以引其氣下也又若心腹氣既定而兩髀外連膫悶者宜灸膫服七炷在膫頭骨下相接處在筋之外陷中是若後更發復灸五炷又凡人雖不患腳氣但若髀膫疼悶灸此無不應手即愈極為要穴然不可不灸亦不可多針唯只灸七炷以下又若腳十指酸疼悶漸入跗上者宜灸指頭正中甲肉際三炷即愈又若大指或小指傍側疼悶覺內有脈如流水上入髀腹者隨指傍處灸三炷即愈患腳氣體皆春發夏甚秋輕冬歇大法春秋宜灸冬差可行夏都不可灸既瘡敗又不得覆風冷因入反更增疴冬時血凝又逆天理急不得已無藥物處可灸一二要穴不可遍身多灸腳氣病大論毒從下上亦有從上向下者或云灸上毒氣便上繆矣此見毒氣攻處疼痛如刺隨病即灸火徹便瘳不拘上下凡毒氣所衝如賊欲出得穴即出豈在門也風毒所攻亦復如是此皆經試萬不失一必不為誤耳若手指間本節疼痛稍入臂者急宜灸指間疼處七炷即定又若心􅎍氣滿已灸身脛諸穴及服湯藥而氣猶不下煩急欲死者宜灸兩足心下當中陷處各七炷氣即下此穴尤為極要而不可數灸但極急乃灸七炷耳以前諸灸法並經用所試皆驗灸畢應時即愈故具録記之凡灸不廢湯藥藥攻其內灸泄其外譬如開門驅賊賊則易出若閉戶逐之賊無出路當反害人耳世有勤工力學之士一心注意於事久坐行立於濕地不時動轉冷風來擊入於經絡不覺成病故風毒中人或先中手足十指因汗毛孔開腠理疏通風如擊箭或先中足心或先中足跟或先中膝已下腨脛表裏者若欲使人不成病者初覺即灸所覺處三二十壯因此即愈不復發也法治腳氣灸法凡腳氣初得腳弱宜速灸之并服竹瀝湯灸訖可服八風散無不瘥者惟速治之若人但灸而不服散服散而不知夫灸者半瘥半死雖得瘥者或至一二年復更發動覺便依此法速灸之及服散者治十十愈此病輕者雖登時亦未必即惡治之而根源不除久久殺人不可不以為意資生經初灸風市次灸伏兔次灸犢鼻次灸下兩膝眼一云忌灸次灸三里次灸上廉次灸下廉次灸絶骨凡灸八處第一風市穴可令病人起正身平立垂兩臂直下舒十指掩著兩髀便點當手中央指頭髀大筋上是灸之百壯多亦佳輕者不可減百壯重者乃至一處五六百壯勿令頓灸三報之佳第二伏兔穴令病人纍趺端坐以病人手掩橫膝上趺下傍與曲膝頭齊上傍側膚際當中央是灸百壯亦可五十壯第三犢鼻穴在膝頭蓋骨上際外骨邊平處以手按之得節解則是一云在膝頭下近外三骨箕踵中動腳以手按之得窟解是灸之五十壯可至百壯第四膝眼穴在膝頭骨下兩傍陷者宛宛中是第五三里穴在膝頭骨節下一膚附脛骨外是一云在膝頭骨節下三寸人長短大小當以病人手膚度取灸之百壯第六上臁穴在三里下一膚附脛骨外是灸之百壯第七下臁穴在臁下一膚一云附脛骨外是灸之百壯第八絶骨穴在骨外踝上一膚一云四寸是凡此諸穴原不必一頓灸盡壯數可日日報灸之三日之中灸令盡壯數為佳凡病一腳則灸一腳病兩腳則灸兩腳兩腳弱亦皆灸一方云如覺腳惡便灸三里及絶骨各一處兩腳惡者合四處灸之多少隨病輕重大要雖輕不可減百壯不瘥速以次灸之多益佳一説灸絶骨最要人有患此腳弱不即治及入腹腫大上氣於是乃作大法灸隨諸腧及諸腕關節腹背盡灸之并服八風散往往得瘥覺病入腹若病人不堪痛不能盡作大灸但灸胸心腹諸穴及兩腳穴亦有得好瘥者凡量一膚之法覆手并舒四指對度四指上中節上橫過為一膚膚有兩種有三指為一膚者此腳弱灸四指為一膚也亦依支法存舊法梁􅉌犢鼻三里上臁下臁解溪太衝陽陵泉絶骨崑崙陰陵泉三陰交足太陰復溜然谷湧泉承山束骨等凡一十八穴舊法多灸百會風府五臟六腑腧募頃來灸者悉覺引氣向下所以不取其法氣不上者可用之其要病已成恐不救者悉須灸之其足指去指竒一分兩足凡八穴曹氏名曰八衝極下氣有效足十指端名曰氣端日灸三壯並大神效其八衝可日灸七壯氣下即止凡八衝艾炷須小作之病者非深相委勿為灸治腳氣穴陽陵泉絶骨風市崑崙陽輔上臁條口下臁太衝犢鼻膝眼曲泉陰陵泉中都三陰交復溜少陽維太陰蹻委中承筋承山湧泉太陰右件穴並要不可總能火其穴最要者有三絶骨承筋太衝崑崙湧泉有患者可灸又謹按明堂制當以立為正取穴必須直立膝臏骨坐立便即移動不定故宜立取之其寸取病人中指上節為一寸若取尺寸有長短取穴必不著又按奉承祖華他等取穴並云三指四指為凖取三里穴四指指濶六分四六二十四只濶二寸四分取穴如何得著黃帝為本諸説並可信徐同灸風市三里絶骨三穴未效灸犢鼻肩髃氣端日三壯遇痛深處針亦效治患腳針後四穴即能起行穴環跳陽陵泉巨虛下臁陽輔其灸法孔穴亦甚多恐人不能悉皆知處今止疏要者必先從上始若直灸腳氣上不泄則危矣先灸大椎在項上大節高起者其上面一穴是若腳氣可先灸百會五十壯在頭頂凹中也肩井各一百壯在兩肩小近頭凹處指搯之安令正得中穴耳次灸膻中五十壯在胸前兩邊對乳胸厭骨解間指按腳氣次灸巨闕在心厭尖處凹下一寸以盡度之凡灸以上部五穴亦足治其氣若能灸百會風府胃腕及五臟腧則益佳視病之寬急耳諸穴出灸經不可不具載之次灸上臁一百壯又在三里下一膚次灸下臁一百壯又在上臁下一膚次灸絶骨二百壯在外踝上三寸餘指端取足踝骨上際屈指頭四寸便是與下臁頗相對分間二穴也此下一拾八穴並是要穴餘伏兔犢鼻穴凡灸此穴壯數不必頓畢三日中灸令盡灸腳氣法於左右兩腳十指上用艾炷如麥粒大各灸七壯十壯其效如神穴在肉甲之間半著肉半著甲灸腳氣灸法如前灸後瘢色赤白如初風毒盡色青黑者毒仍在更灸勿止得肢體輕利為佳古人得此多是針灸最忌用熱藥蒸泡有僧普清苦二十年灸風市肩髃曲池三穴各二十壯頓效又云若安三里莫教乾患風人宜常灸蓋三里一穴為五臟六腑之溝也若始覺腳氣速灸風市三里各一二百壯以㵼風濕毒氣若覺悶熱者不得灸以本熱灸之則火助風生食物大忌酒麵海鮮及房勞不爾服藥無益王氏云有同舍為豫言史載之謂腳氣有風濕二種宜㵼不宜補只宜以沉香湯㵼而不許其灸千金方乃載灸法如此其詳豈虛人患腳氣方可灸耶故指迷方云若覺悶熱不得灸蓋有所見也凡灸腳氣三里絶骨為要穴而以愛護為第一豫舊有此疾不履濕則數歲不作若履濕則頻作自後常忌履濕凡有水濕不敢著鞋踐之或立潤地亦不敢久須頻移足而後無患此亦愛護之第二義也有達官久患腳氣多服八味丸愈亦以腳氣衝心惟此藥能治之治腳氣上攻穴肩井千金云腳氣病宜針灸針而不灸灸而不針非良醫也針灸不藥藥不針灸亦非良醫也此論甚當治腳氣偏風兩腿腳不隨重不得履地刺風痶風腳冷穴上臁淡寮方云蔡元長知開封日據按視事忽覺如有蟲自足心行至腰間即欲墜筆暈絶久之方蘇掾即云此非俞山人不能療趣使呼而至視之曰腳氣也此當灸風市為灸一炷便安然復常明日疾如初再呼俞俞曰使除病根非千艾不可從其言灸五百壯自此遂愈仲冗文安公守姑蘇署舍卑濕旋感足痺痛掣不堪服藥不效乃用所聞灸風市肩髃曲池三穴終身不復作僧普清苦此二十年每發率是兩月用此灸二十壯即時痛止其他蒙此力者不一而足治腳氣腎氣穴陽蹻腳弱治腳弱無力風濕痺筋急半身不遂穴委中治腳弱穴三里治腳弱無力腳重偏風不遂穴承山治腳弱無力腰尻重曲䐐中筋急半身不遂穴委中王氏云有人舊患腳弱且瘦削後灸三里絶骨而腳如故益知黃君針灸圖所謂絶骨治腳疾神效尤信也同官以腳腫灸承山一穴瘡即乾其後數月不愈不曉所謂豈亦失之將攝耶是未可知也單方歌云風毒腳弱痺肩井及大椎風市與三里百壯不須疑千金灸腳弱凡八穴病一腳則灸一腳病兩腳則灸兩腳凡腳弱病皆灸兩腳或未能盡灸且先灸風市犢鼻三里絶骨亦效或不效當如其法灸之但肩井不可多灸耳治勞冷氣遞腰膝冷痺腳屈難伸灸陽蹻一百壯在踝下腳腫療惡血氣腫痛腳腫穴上崑崙治腳氣膝腫穴承山治腳腫短氣不嗜食煩熱㽱痛穴小腸俞治足跗腫不得履地穴然谷王氏云母久病夏中腳忽腫舊傳夏不理足不敢著艾漫以針置火中令熱於三里穴刺之微見血凡數次其腫如失去執中素患腳見此竒效亦以火針刺之翼日腫亦消何其速也後亦常灸之凡治腳腫當先三里而後陽蹻等穴可也又豫患腳氣指縫爛每以茶末滲之愈他日復爛而腫用茶末不效漸腫至腳背上豫以為腳氣使然竊憂之策杖而後敢行偶賣藥儈者見之云可取床薦下塵滲之如其言滲之而愈此物不值一錢而能愈可憂之疾其可忽之治足忽瘇腓脛暴大如吹頭痛寒熱筋急不即療至老死不愈隨病左右足到內踝直白肉際三壯即愈不愈再灸姚氏方疾處有赤脈絡乃灸絶骨經兩三處二十一壯此方大效末巴豆虻蟲少雜艾為炷灸已下至踝間可依葛氏加至五十壯又有大黃膏白頭翁酒方摩治之亦良足痺治足痺痛穴陰陵泉治足濕痺不能行穴中都治髀樞腕骨痺不仁穴陽輔陽交陽陵泉治脛痺不仁穴陽間環跳承筋治足痺不仁穴膀胱俞太溪次窖治足不仁穴腰俞風府治脛痺不仁穴陽關治髀樞不仁穴浮郤治腳足不仁穴膀胱俞治手足不仁穴白環俞治手足不仁穴上臁治膝不仁穴犢鼻髀關陽陵泉列子載偃師造昌云廢其腎則足不能行是足不能行蓋腎有病也當灸腎俞或一再灸而不效宜灸環跳風市犢鼻膝關陽陵泉陰陵泉三里絶骨等穴但按略痠疼即是受病處灸之無不效也泄㵼類泄痢治腹寒泄痢資生經穴腹結治泄痢不止小兒奶痢不絶腹大繞臍痛穴神闕治大便泄痢穴陽綱治大便滑泄穴意舍治大腸滑泄穀不化穴梁門治泄痢不欲食穴關門治泄痢食不化穴天樞治水穀不化欲泄注穴三焦俞治水穀不化下痢穴懸鍾治溫病積聚下痢穴脊中治腹脹下利食泄穴中髎治泄利穴脾俞治泄利腹痛穴膀胱俞治洞泄食不化穴大腸俞腎俞治腹中冷氣泄利不止穴會陽治小腹急腫腸鳴洞泄髀樞引痛穴京門治腹滿腸鳴洞泄穴三間治腹泄不止穴關元治洞泄不化穴京門然谷陰陵泉治寒中洞泄不化穴腎俞章門治洞泄體痛穴崑崙京門治頭重洞泄不禁穴長強治胸中熱暴泄穴陰陵泉隱白治腸鳴腹脹腫暴泄穴大腸俞治腸鳴腹脹欲泄注穴三焦俞小腸俞下窈意舍章門治腹中有寒泄注腹澼便血穴會陽治腸澼泄穴束骨治冬月重感於寒則泄當臍痛腸胃間遊氣切痛穴天樞治心腹痛而後泄此寒客於腸間穴關元灸一百壯服當歸􅒦砂湯治泄瀉先灸臍中次灸關元治泄痢四肢不舉穴曲泉溏泄治溏泄食不化資生經治溏泄腹痛藏痺穴地機治溏泄穴太衝王氏云嘗患痺疼既愈而溏痢者灸臍中遂不登洞連三日灸之三夕不登洞若灸溏泄臍中第一三陰交等穴乃其次也飱泄治腹脹飱泄資生經穴中窖治小腹痛飱泄次指間痛唇乾涎出不覺不得汗出毛髮焦脫肉少氣胃中熱不嗜食治飱泄穴上臁素問云春傷於風夏必飱泄苟知傷於風得之則藥自可治雖不著艾未為害也痢論資生經云素問言泄痢有五種一曰胃泄飲食不化而色黃胃與脾合故黃也二曰脾泄腹脹而注泄無休又上逆嘔此為寒熱之患也三曰大腸泄食畢腸鳴切痛而痢白色大腸與肺合故白也四曰小腸泄身瘦而便膿血小腸與心合心主血也五曰大瘕泄裏急後重數至圊而不能便莖中痛此腎泄也諸家方有二十餘種此惟言五種蓋舉其綱也而必用方中亦有赤白疳蠱之别其大概則臟腑寒也廩邱公所謂諸下悉寒是也故豫治人痢惟與以鎮靈丹無有不效或未效更加數丸則效矣若蠱痢則用百葉黃連煎服即見效諸痢惟耆域方用厚朴嬰粟殼末最佳後人又加木香黃連陳皮等分甘草拌之黃殼葉數片薑棗烏梅水煎豫嘗用之驗故載於此然痢本無惡證而有因此而死者或者世醫以痢為熱病多服冷藥故也若其急難亦當灼艾不可專用藥云法治腸澼便膿血泄痢後重腹痛如痓狀資生經穴復留治泄痢赤白漏血穴交信治溏泄痢注下血穴太衝曲泉治泄痢膿血五色重下腫痛穴小腸俞治泄痢不禁小腹絞痛食不化穴丹田臍中關元治痢不止穴關元太溪治泄痢不食食不生肌膚穴脾俞治泄水痢膿血穴曲泉治腸冷赤白痢穴中膂俞治泄痢腹痛穴膀胱俞治溫病積聚下痢穴春俞治泄痢穴關元治泄痢食不消穴脾俞灸隨年壯治泄注五痢便膿重下腹痛穴小腸俞灸百壯治泄痢不禁小腹絞痛穴石門灸百壯三報治久痢百治不瘥并治冷痢腹痛灸足陽明下一寸高骨上陷中去大指岐三寸隨年壯又臍中二三百壯又灸關元三百壯十日灸治赤白下穴窮骨灸多為佳治四肢不舉多汗洞痢穴大橫灸隨年壯治泄痢不止灸臍中名神闕穴五壯或七壯艾注如小筋頭大及關元穴三十壯治泄痢少食雖食不消灸循際穴在夾臍下五寸又灸長谷五十壯治泄痢久下失氣勞冷灸下腰百壯三報穴在八魁正中央脊骨上灸數多尤佳三宗是骨忌針治泄痢赤白濁灸足太陰五十壯三報治久泄痢百治不瘥屈竹量正當兩胯脊上點訖下量一寸點兩傍各一寸復下量一寸當脊上合三處一灸三十壯灸百壯以上一切痢皆斷亦治濕匿冷脊上當胯點處不灸治大腸泄痢膿血穴塊舍灸一百壯小兒減之又灸小腸俞七壯治下痢白如鼻涕者灸臍下一寸五十壯良即陰交治膿血痢不止兼治小腹堅逆灸幽門二穴各三壯治水痢不止食不化刺足陽明經天樞二穴大腸之募也在臍兩傍各二寸針入伍分留十呼可灸百壯治痢暴下如水資生經穴氣海灸百壯衛生寶鑑云至元乙亥廉臺王千户四十餘駐兵漣水卑濕之地勞役過度飲食失節至秋深瘧痢併作月餘不愈飲食全減形容嬴瘦乘馬轎以歸時已仲冬求治於豫具陳其由診得脈弦細而微如蛛絲身體沉重手足寒逆時復淋痺皮膚痂疥如厲風之狀無力以動腹痞滿嘔逆不止皆寒濕為病久淹真氣衰弱形氣不足病氣亦不足陰陽皆不足針經曰陰陽皆虛針所不為灸之所宜內經曰損者益之勞者濕之十劑云補可去弱以理中丸加附子溫養脾胃散寒濕澀可去脫服養臟湯加附子固腸胃止㵼痢仍灸諸穴以併除之經曰府會大倉即中腕也先灸五十壯以溫養胃氣進美飲食次灸氣海百壯生發元氣滋榮百脈充實肌肉復灸足三里胃之合穴三十壯引陽氣下交陰分亦助氣復灸陽輔穴二七壯接續陽氣令足脛溫暖散清溫之邪追之月餘後病氣皆去漸至平復精神不減壯年腸鳴治腹虛鳴資生經穴不容治胸滿腸鳴穴三間治腹滿而鳴穴胃俞治腸中常鳴上衝於心及治婦人穴臍中治腸鳴穴太白公孫大腸俞三焦俞治腹脹腸鳴氣上衝胸穴天樞治心滿氣逆腸鳴穴陰都治腸鳴濯濯有如水聲穴陰交治腸鳴相追逐穴上臁治腸鳴強欠心悲氣逆穴漏谷治腸鳴泄注穴膺窗治腸鳴而痛穴陷谷溫溜漏谷復溜陽綱治胸脅脹鳴切痛穴太白治腸鳴穴三里三間京門關門三陰交陷谷水分神闕承滿溫溜三焦俞大腸俞胃俞天樞治腸鳴盈盈然食不化脅痛不得卧煩熱口乾不嗜食胸脅支滿喘息心痛腰痛不得轉側穴章門治腸鳴氣走疰痛穴上臁治腹脹腸鳴不便痺虛令人不樂身寒善太息心悲氣逆穴商􅉌治腹雷鳴穴復溜治腸痛雷鳴穴督俞治腸鳴腹脹上喘氣逆穴承滿治飲食不下腹中雷鳴腸滿䐜脹大便泄消渴身熱靣色黃不嗜食怠惰及治腸鳴穴陽綱治腸鳴腹脹腸中雷鳴相逐痢下灸承滿五十壯三焦俞治腹脹腸鳴氣上衝胸不能久立腹痛濯濯冬月重感於寒則泄食不化不嗜食身腫夾臍急穴天樞治腹中雷鳴灸太衝無限壯數治腸鳴泄注刺下窖入二寸留七呼灸三壯脫肛治大人小兒脫肛資生經穴百會針二分灸七壯至七七壯中極治寒冷脫肛歷年不愈灸翠尾骨七壯立愈又臍中隨年壯橫骨百壯龜尾七壯窮骨治卒大便脫肛灸頂上回髮中百壯腸風痔疾類腸風治久冷五痔便血及腸風㵼血資生經穴脊中灸百壯資生經云有人患此疾積年一灸除根因傳此法後觀灸經此穴療小兒脫肛㵼血蓋岐伯灸小兒法也後人因之以灸大人腸風㵼血耳蓋大人小兒之病初不異故也治腸風下血穴長強王氏云腸風藥多不效何也本草衍義曰腸風乃腸痔苟知其為痔而治之無不效矣若灸腸風長強為要穴云近李倉患腸風醫以杖量臍中於脊骨當臍處灸即愈豫因此為人灸腸風皆除根陸氏方治下血除根治腸風㵼血即愈須顛倒身方灸得穴脊端窮骨脊骨盡處龜尾當灸中三壯腸澼治腸澼㿉疝小腹痛資生經穴中都治腸澼穴復溜束骨會陽治腸澼切痛穴四滿治結積留飲澼囊胸滿飲食不消穴通谷灸五十壯治風冷腹中雷鳴大腸灌沸及腹澼泄痢食不消化小腹絞痛腰脊疼強大小便難不能飲食穴大腸俞灸百壯三報之治諸結積留飲澼囊胸滿飲食不消穴胃脘三百壯三報之治腹中痰腰痛膀胱寒澼飲注下穴下極俞灸隨年壯治腹中有寒泄注腸澼便血穴會陽治腸澼泄穴束骨治腸鳴泄注穴膺窗治大便不節小便赤黃腸鳴泄注穴陽綱治腸鳴腹脹欲泄注穴三焦俞小腸俞下􅐎意舍章門痔漏治腸風下血五種痔疳蝕下部𧈟此痔根本是令謹冷食房勞及療久痔資生經穴長強治穀道瘙擾久痔相通者死又云主痔與陰相通者死穴會隂治久痔穴會陽治五痔疼穴小腸俞治五痔發腫穴秩邊治血痔泄後腫穴復溜治野雞痔穴飛揚治久痔腫痛穴承山治久痔尻脽腫大便難陰胞有寒及小便不利并五種痔㵼鮮血穴承扶治痔病㵼血穴氣海俞治痔篡傷痛穴飛揚治痔血泄後重穴商􅉌復溜治熱痔穴勞宫治痔痛腹下腫穴承筋承扶委中陽谷治痔骨蝕及骨疽蝕穴商􅉌治漏穴天突章門天池支溝治漏頸痛穴天突天窗治下漏穴長強治五痔便血失屎出危氏方灸一百壯穴在脊窮骨上治久冷五痔便血出危氏方灸脊百壯灸痔出百一選方鳩尾骨尖少偃處即是穴麥粒大艾炷灸七壯或十四壯甚者止二十一壯瘡發即安可以除根灸痔法疾若未深尾閭骨下近穀道灸一穴便可除去如傳信方先以經年槐枝煎湯洗後灸其上七壯大稱有驗如本草只以馬藍菜根一握水三碗煎碗半乘熱以小口器瓦瓶中薰洗令腫退於元生鼠妳根上灸却不可灸尖頭恐效遲如患深用湯洗未退再洗令消後灸覺火氣通至胸乃效病雖深至二十餘壯永絶根本以竹片護四邊肉仍於天色寒涼時灸忌毒物治痔灸法出仁存方以葶藶子二合豉一升搗細令作餅如大錢厚二分許取一枚當瘡孔上作大艾炷如小指頭大灸餅上三炷一易三餅九炷隔二日復一灸之外臺灸瘰􅊓資生經云用葶藶子豉作餅灸漏外臺云不可灸頭瘡葶藶氣入腦殺人又法平立量脊骨與臍平處椎上灸七壯或年深更椎骨兩傍各一寸灸如上數無不除根治痔疾如胡瓜實於腸頭熱如溏灰火發則僵仆出危氏方以栁枝濃煎湯洗後以艾炷上三五壯若覺一道熱氣入腸中大㵼鮮紅血穢惡一時至甚痛楚㵼後其疾如失灸痔右以繩圍病者頂令兩頭相拄展繩從大椎正中量之垂繩一頭當脊正下以墨點訖又量病者口兩吻頭接繩頭正下復點之又量病者口吻如前便中屈繩接前口吻繩正下復點之望使相當所三處並下火重者各五百壯輕者三百壯即愈又法令疾者平坐解衣以繩當脊大椎骨中向下量至尾株骨尖頭訖再折繩更從尾株尖頭向上量當繩頭即下火高號州初灸至一百壯得瘥後三年復發又灸之便斷兼療腰腳治五痔痛穴攢竹治五痔痛不得大小便穴會陰治痔䐜痛穴飛揚承筋委中承扶治諸痔宜灸回氣三七壯黃帝針經云在尾脆骨上一寸半又連岡穴主之在回氣穴兩邊相去二寸是也各灸三七壯治九漏穴肩井灸二百壯治漏穴灸鳩尾骨下宛宛中七十壯治諸漏灸漏洞四畔差便血治便血資生經穴復溜太衝會陽治泄痢膿血穴下臁幽門太白治吐泄膿血穴太白治大便膿血出穴小腸俞治大便下血穴下髎治大便膿血寒中食不化腹痛穴腹哀治大小便血不止穴勞宫治下血不止量臍心與脊骨平於脊骨上灸七壯即止如再發即再灸七壯永除根本目覩數人有效王氏云嘗用灸人腸風皆除根本神效無比然亦須按其骨突處痠疼方灸之不疼則不灸也但便血本因腸風腸風本腸痔不可分而為三分而為三治之非也治大便下血出危氏方灸第二十椎隨年壯治大便下血出危氏方平立一杖子比臍平却向後脊骨當中灸七壯或年深於脊骨兩傍各一寸灸七壯余謂寸半則是腎俞自佳大小便諸疾類淋癃治石淋臍下三十六疾不得小便灸足太陽又灸水泉三十壯治五淋資生經穴懸鍾治五淋不得尿穴大敦氣門治腹中滿熱淋閉不得尿穴氣衝治氣淋穴交信治血淋及主療五淋小便如散灰色穴復溜治胞轉氣淋穴關元湧泉治淋癃穴長強小腸俞治腎病不可俯仰氣瘟穴關元隂陵泉治癃閉陰痿穴曲泉治癃閉莖空痛穴行間治癃疝穴然谷治小腹脹血癃小便難穴曲谷治癃閉下重不得小便穴包肓秩邊治氣淋小便黃穴石門治五淋穴長強治五淋小便黃穴曲骨治小便淋失精穴至陰治五淋小便赤澀及治尿道痛失精臍下結如覆杯陽氣虛憊穴中極治五淋小便如散灰穴復溜治不得尿及陰上痛穴太衝灸五十壯治氣淋