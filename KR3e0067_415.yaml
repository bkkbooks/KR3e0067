body:
  text: 普濟方卷四百十五明周王朱橚撰針灸門腧穴圖外督俞二穴氣海俞二穴關元俞二穴大杼二穴在項第一椎下兩旁各相去寸半陷中針五分灸七壯甲乙經明堂經云禁灸下經云灸五壯素問同難疏骨會大杼骨病治此銅人經云甲乙經足太陽手少陽之會療瘧頸項強痛不可俯仰左右不顧頭痛振寒疾瘈瘲氣實脅滿傷寒汗不出脊強喉痺煩滿治風勞氣急咳嗽胸中鬱鬱身熱目眩腹痛不安席西方子云又名本神不灸資生經云明堂經禁灸而銅人云可灸七壯必有説也要非大急不必灸風門二穴一名熱府在二椎下兩旁相去各寸半針五分留七呼若頻刺泄諸陽熱氣背永不發癰疽灸五壯銅人經云督脈足太陽之會治傷寒頸項強目瞑多嚏鼻齀出清涕風勞嘔逆上氣胸背痛喘氣短卧不安西方子云主療風眩頭痛鼻衄窒喘息不通咳逆肺俞二穴在三椎下兩旁各寸半針三分留七呼得氣即瀉出甲乙經甄權針經云在三椎下兩旁以搭手左取右右取左當中指末是穴針五分留七呼灸百壯明下云三壯千金云肺俞對乳引繩度之銅人經云足太陽脈氣所發治上氣嘔吐支滿不嗜食汗不出腰背強痛寒熱喘滿虛煩口乾傳尸骨蒸勞肺痿咳嗽療胸中氣滿背僂如龜頭目眩令人失顔色又云理癲癎癭氣肉痛皮癢明堂經云在第三椎下兩旁各一寸宛宛中主肺寒肺熱唾血西方子云主吐逆脊強喘嗽少氣胸中痛及百病厥隂俞二穴在四椎下兩旁各寸半針三分灸七七壯千金扁鵲云名關俞銅人經云治氣嘔吐心痛留結胸中煩悶牙痛西方子云灸五壯出山朓經心俞二穴在五椎下兩旁各寸半針三分留七呼得氣即瀉不可灸明下云灸五壯千金第七莭對心橫三間銅人經云治心中氣狂走發癎亂語悲泣心胸悶亂煩滿汗不出結積寒熱嘔逆不下餐食即吐咳唾血目痛明堂經云主心痛背相引咳嗽不得息煩心多涎胃中弱目􅉩􅉩淚出悲傷也資生經云銅人經云在心俞不可灸可針入三分世醫因此遂謂心俞禁灸但可針爾殊不知刺中心一旦死乃素問之所戒豈可妄針耶千金言風中心急灸心俞百壯服續命湯又當椎其緩可也豈可泥可灸之説而坐受斃也督俞二穴一名髙蓋在六椎下兩旁各寸半禁針通灸銅人經云主理寒熱腹中痛雷鳴氣逆心痛灸三壯資生經云銅人經缺此穴明堂經有之今依明堂入在此恐銅人經本不全也膈俞二穴在椎下兩旁各寸半針三分留七呼灸三壯明下云五壯難疏血會膈俞血有病明此銅人經云治咳而嘔逆膈胃寒疾食飲不下胸滿支腫兩脅痛腹脹胃脘暴痛熱痛汗不出喉脾腹中積僻默嗜卧四肢急墮不欲動身常濕不能餐食則心痛周痺身皆痛又云治寒熱骨痛虛脹支滿痰瘧痃癖氣塊膈上痛西方子云主胸脅相引不得傾肩背寒痓痰飲吐逆汗出哽噎咽腫不得消食飲不下主吐食明堂經云治胃弱食少資生經云八椎下兩傍銅人明堂並缺俞穴肝俞二穴在九椎下兩旁各寸半陷中針三分留六呼灸三壯明下云七壯素問云刺中肝五日死又云主咳逆兩脅滿悶肋中痛目中白翳氣短唾血目上視多怒狂衄目􅉩􅉩遠視也銅人經云主咳引兩脅急痛不得息轉側難厥脅下與脊相引而反折目眩循眉頭痛咳引胸中痛寒疝少腹痛又云理口乾中風支滿短氣不食食不消吐血目不明閉塞腰痛肩寒西方子云主熱病差後食五辛多患眼暗如雀目鼻中酸吐血嘔筋急手相引筋寒熱痓膽俞二穴在十椎下兩旁各寸半正坐取之灸三壯針五分明云三分下經云灸五壯素問云刺中膽一日半死銅人經云治心腹脹滿嘔則食無所出口苦舌乾咽中痛食飲不下目黃胸脅支滿不能轉側頭痛振寒汗不出腋下腫又云足太陽脈氣所發主理心脹滿吐逆短氣痰寒食難下不消針入三分脾俞二穴在十一椎下兩傍各寸半陷中針三分留七呼灸三壯明堂下經云五壯素問云刺中脾十日死銅人經云主腹脹引胸背痛食飲倍多身漸羸瘦黃疽善欠脅下滿泄利體腫四支不收痰喘痃癖積聚腹痛不嗜食痰瘧寒熱又云理腰身黃脹滿邪氣西方子云主腰脊強急熱痓引骨痛食不生肌膚欲吐身重不欲動明堂經云食飲多咽四支煩熱嗜卧怠墮胃俞二穴在十二椎下兩傍各寸半針三分留七呼灸隨年為壯明堂經云三壯下經云七壯銅人經云治胃中寒脹不嗜食羸瘦腸鳴腹痛胸脅支滿脊痛筋攣急又云理煩滿吐食針二分灸三壯西方子云主食多嘔吐食不下三焦俞二穴在十三椎下兩傍各寸半針五分留七呼灸三壯明堂經云針三分下經云灸五壯銅人經云治腸鳴腹脹腰痛米穀不化腹中痛欲泄注目眩目痛吐逆飲食不下肩背拘急腰脊強不得俯仰又云足太陽脈氣所發西方子云主腹積聚如石灸三壯明堂經云正坐取陷中灸五壯主背痛身熱腎俞二穴在十四椎下兩傍各寸半與臍平針三分留七呼灸以年為壯明堂云三壯下經云五壯刺中腎六日死又云主腰疼不可俯仰轉側難身寒熱飲食倍多身羸瘦面黃黑目􅉩􅉩翳生丈夫婦人灸積冷氣變成勞疾銅人經云治虛勞耳聾腎虛水藏久冷心腹䐜脹兩脅滿引少腹急痛少氣瘀血小便濁出精陰中疼五勞七傷虛憊腳膝拘急足寒如氷頭重身熱振憟腰中四支淫濼洞泄食不化身重如水又云主冷嘔好獨卧西方子云主腰痛小腹痛嘔吐寒中洞泄小便難赤濁骨寒熱兩脅引滿目不明惡風寒靣赤熱心痛如懸慎如前法氣海俞二穴在十五椎下兩傍各寸半通灸銅人云理腰痛痔病瀉血灸三壯資生經云按明堂有氣海俞而銅人無之恐銅人本不全故依明堂附入於此大腸俞二穴在十六椎下兩傍各寸半針三分留六呼灸三壯銅人經云治腰痛腸鳴腹脹滿繞臍切痛大小便不利或有洞泄食不化脊骨強不得侻仰針入三分灸三壯西方子云主大小便不利腹䐜脹暴泄食不下喜食忌生冷酒麵等物關元俞二穴在十七椎下兩傍各寸半針三分銅人經云理風勞腰痛泄利虛脹小便難婦人瘕聚諸疾資生經云按明堂有關元俞而銅人無之恐銅人本不全故依明堂附入於此小腸俞二穴在十八椎下兩傍各寸半針三分留六呼灸三壯銅人經云治小便赤澀淋瀝煩熱少腹㽱痛腳腫短氣不嗜食大便濃血出五痔疼痛婦人帶下西方子云主大小便難淋瀝小便黃赤泄痢膿血五色重下腫痛腰脊疝痛及腰脊急強膀胱俞二穴在十九椎下兩傍各寸半針三分留六呼灸三壯明堂下經云七壯又云主腰脊急強腰下酸重勞損不仁腹中痛大便難也銅人經云足太陽脈氣所發治風勞腰脊強痛泄痢大便難小便赤澀遺溺隂生瘡少氣足䯒拘急不得屈伸女子瘕聚腳膝無力西方子云主泄痢腸痛煩滿汗不出小便赤黃堅結聚足清不仁主熱痓引骨痛明堂經云各二寸半陷者中中膂內俞二穴一名脊內俞在二十椎下兩傍各寸半夾脊起肉針三分留七呼灸三壯明堂下經云主腰夾脊膂痛上下按之應者從項後至此穴痛皆灸之立愈銅人經云少陽脈治腸冷赤白痢腎虛消渴汗不出腰脊不得侻仰腹脹脅痛西方子云主腰疝寒熱痓反折白環俞二穴在二十一椎下兩傍各寸半甲乙經云針人腰尻同挺腹地端身兩手相重支頷從息令皮膚俱緩乃取其穴針八分得氣即瀉訖多補之不宜灸明堂下經云灸三壯又云主腰脊急強痛不能俯仰起坐難手足不仁小便黃腰尻不舉也銅人經云足太陽脈氣所發治大小便不利及治腰髖疼痛腳膝不遂溫瘧腰脊冷疼不得安卧勞損風虛不宜灸忌房勞不得舉重上髎二穴在第一空腰踝下夾脊陷中針三分灸七壯千金云腰踝下一寸銅人經云足太陽少陽絡治腰膝冷痛嘔逆鼻息寒熱瘧婦人絶嗣隂挺出不禁白瀝西方子云在腰踝一寸夾脊兩傍灸三壯主腰痛痓反折大小便利次髎二穴一名次窖在第二空夾脊陷中可灸七壯針三分銅人經云治疝氣下墜腰脊疼痛不得轉搖急引陰器不可忍腰已下至足不仁皆腠寒小便赤淋心下堅脹西方子云灸三壯主腰脊痛惡寒婦人赤白瀝下腰痛不可侻仰足清不仁大小便利中髎二穴在第三空夾脊陷中針二分留十呼灸三壯銅人經云厥陰少陽所結治丈夫五勞七傷六極腰痛大便難腹脹下利小便淋澀飱泄婦人絶子帶月事不調西方子云主婦人赤淫時胎氣癃月事少大小便利下髎二穴在第四空夾脊陷中針二分留十呼灸三壯銅人經云足太陽厥隂所結治腰痛不得轉側女子下蒼汁不禁隂中痛少腹急疼大便下血寒濕內傷赤瀝陰中癢痛引小腹控眇不可侻仰大小便利腸鳴臚脹欲泄注會陽二穴一名利機在隂尾骨兩傍針八分灸五壯銅人經云督脈氣所發治腹中冷氣泄痢不止久痔陽氣虛乏隂汗溫西方子云主腹中有寒泄注腸澼便血千金八窖在腰目下三寸夾脊相去四寸兩邊四穴故名八窖其曰夾脊四寸是除脊各寸半也凡大杼下穴皆當除脊各一寸半附分二穴在第二椎下附項內亷兩傍相去夾脊各三寸灸五壯針三分銅人經云手足太陽之會正坐取之治肩背拘急風冷客於輳頸項強痛不得回顧風勞臂用不仁西方子云主背痛引頷引頭魄户二穴在三椎下兩傍各三寸正坐取之針五分得氣即瀉又宜灸留針日灸七壯止百壯明堂經云日七壯至二百壯下經云魄户在三椎下兩旁各三寸灸三壯又云魄户在三椎下兩旁各三寸灸五壯明堂經云主眉間轉急痛背氣不能引顧咳逆上喘素問注云魄户上直附分銅人經云宛宛中正坐取之足太陽脈氣所發治背轉痛咳逆上氣嘔吐煩滿虛勞肺痿五尸走疰項強胸背連痛不得回顧西方子云主肺寒熱呼吸不得卧嘔沫喘氣相追逐背肺悶無力勞損痿黃忌豬魚酒麵生冷等物資生經云銅人有魂户穴明堂上經亦同而下經既有魄穴又有魄户穴皆云下三椎下若謂誤寫魄作魂不考兩出魄户穴也考之下經既有懸鍾矣後又有懸鍾有天穴矣其治小兒又有天突者魄戶即魂户誤作魄而兩出之不然何其穴皆在三椎旁歟膏盲俞二穴在四椎下明堂云近五椎兩旁各三寸無所不療羸瘦虛損夢中失精上氣咳逆發狂健忘明云狂感忘誤取穴之法令人正生曲脊伸兩手以臂著膝前令正直大脂與膝頭齊以物肢肘令臂勿得動也從胛上角摸􅟥至骨下頭其間當有四肋三間灸中間脾骨之裏去脾骨容側指許磨胠去表肋間空處按之自覺牽引於肩中灸兩脾中一處至百壯多至五百明云六百壯多至千壯當覺下􅀢􅀢然似流水之壯亦嘗有所下出若得停痰宿疾則無所不下也如病人已困不能正坐當令側卧挽上臂令取穴灸之凡取以右手從左肩上住指頭所不及者是穴也右取亦然乃以前法灸之若不能久坐當伸兩臂令人挽兩脾骨使相難不爾即脾骨覆其穴灸之無驗明堂經云不爾肋骨覆穴不可得也所伏衣被當令大小有常足不爾則失其穴也此灸訖後令陽氣益盛當消息以自補養當取身平復論曰昔在和緩不救晉侯之疾以其在膏之上盲之下針藥所不能及即此穴是也時人拙不能求得此穴所以宿病難遣若能用心方法便求之得穴灸之無疾不愈出千金臺西方子云其穴法有孫思邈王惟一石用之葉善其僧仲之或用鈎股或抱拷栳或坐或卧或正靣或斜立或起手曲肘或卧伸臂或揣顀骨定髙下或量臍心或量命門或坐點或坐灸各有所長然而終未明大法以豫平昔用此數十取十百取百一無差者各各取之按其穴須得病人中指麻木則灸無不取之效其要法在四椎下第五椎上各去脊三寸宛宛中資生經云灸膏盲功效諸經例能言之而取穴則未也千金等方之外莊綽論之最詳然繁而無統不能定於一王氏云豫嘗以意取之病人兩手交在兩膞上灸時亦然脾骨遂開其穴竟以手摸索第四椎下兩傍各三寸四肋三間之中間按之痠疼是穴灸之千百壯少七七壯當依千金立點立灸坐點坐灸卧點卧灸云若欠合爪在兩膝頭中點穴亦得神堂二穴在五椎下兩傍各三寸陷中正坐取之針三分灸五壯明堂下經云三壯素問注云上直魄户銅人經云足太陽脈氣所發治肩痛連胸背痛不能俯仰腹滿灑淅寒熱腰脊強急明堂云主逆氣上攻時復噎也譩嘻二穴在胸膞內亷俠明堂作在六椎下兩傍各三寸陷中正坐取之以手痛按之病者言譩嘻針三分留三呼瀉五吸灸二七壯止百壯明堂下經云五壯又云主瘧久不愈者背氣滿悶胸中氣噎勞損虛乏不得睡也銅人經云足太陽脈氣所發治拘攣暴脈急引脅痛病汗不出溫瘧寒瘧肩背痛目眩鼻衄喘逆腹脹肩轉內亷痛不得俯仰又云其穴抱肘取之主胸背寒痓風瘧西方子云治小兒食晦頭痛及五心熱瘧久不愈及咳逆上氣忌莧菜白酒膈關二穴在七椎下兩傍各三寸陷中正坐取之針五分灸五壯銅人經云足太陽脈氣所發治背痛惡寒脊強俯仰難食飲不下嘔噦多涎唾胸中噎悶魄門二穴在九椎下兩傍各寸半正坐取之灸三壯針五分銅人經云足太陽脈氣所發治食飲不下腹中雷鳴大便不節小便赤黃又治嘔吐不住多涎陽綱二穴在十椎下兩傍各寸半陷中正坐闊肩取之亦作微俯取之灸三壯明堂下經云七壯主飲食不下腹中雷鳴腹滿臚脹大便泄消渴身熱目黃不嗜食怠墮也銅人經云足太陽脈氣所發治小便赤澀西方子云主大小便不莭黃水小便黃腸鳴泄注靣黃意舍二穴在十一椎下兩傍各三寸陷中正坐取之針五分灸十五壯至百壯明堂經云五十壯至百二十壯甲乙經云三壯針五分下經云灸七壯明堂經云第九椎下兩傍各三寸主脅脹滿背痛惡寒食飲不下嘔吐不留住也素問云灸二壯銅人經云足太陽脈氣所發治腹滿虛脹大便滑泄消渴靣目黃赤嗜食胃倉二穴在十二椎下兩傍各三寸針五分灸五十壯明堂經云五十壯甲乙經云三壯銅人經云脈氣所治腹內虛脹水腫食飲不下惡寒背脊不得俯仰針三分灸五壯西方子云治氷腫臚脹水食不消盲門二穴在十三椎下兩傍各三寸又肋間明堂作異云與鳩尾相直灸十壯針五分銅人經云治心下冒大堅婦人乳有餘疾志宰二穴在十四椎下兩傍各三寸陷中正坐取之針五分灸三壯明堂下經云兩傍各三寸半灸七壯又云微俯而取之主腰脊痛急兩脅脹大滿便難食飲不下背氣俯仰不得也銅人經云足太陽脈氣所發治腰強痛食飲不消腹中堅急隂痛下腫失精小便淋瀝資生經云明堂上經作兩傍三寸與銅人經云同而下經乃作三寸半必是分外半字也胞盲二穴在十九椎下兩傍各三寸陷中伏而取之灸五七壯針五分明堂經云灸五七壯至五十壯甲乙經云三壯下經云五壯主腰不可忍俯仰難惡寒小便澀也銅人經云足太陽脈氣所發治少腹堅急癃閉重不得小便又云治腰卒痛急食不消腹中堅急隂痛下腫療惡氣秩邊二穴在二十椎下兩傍各三寸陷中伏而取之灸三壯針五分忌同明堂經云在二十椎下兩傍各三寸灸三壯針三分銅人經云足太陽脈氣所發治腰痛不能俯仰小便黃赤澀腰尻重不能舉五痔發腫慎如前法資生經云素問氣府注曰秩邊在二十一椎下兩傍上直胞肓與銅人經明堂經二十椎下不同未知孰是姑兩存之以上二十八穴當凖千金方除脊三寸取穴天容二穴在耳下曲頰後灸三壯銅人經云手太陽脈氣所發主頸項癰不能言頸腫項痛不可顧耳嘈嘈若蟬鳴咳逆嘔沫上氣喘息齒噤喉痺寒熱咽如鯁又云針入一寸西方子云又名大容天牖二穴在項筋缺盆上天容後天柱前完骨下髮際上明堂云一寸髮際上陷中針一寸留七呼不宜補益不宜灸若灸靣腫眼合先取譩嘻後針天牖風池即差若不先針譩嘻即難療明堂經云針五分得氣即瀉瀉盡更留三呼瀉三吸下經云灸三壯又西方子云髮際上一寸不灸又云髮際宛宛中主瘰􅊓寒熱頸有積氣暴聾肩中痛頭風目眩鼻塞不聞香臭銅人經云手少陽脈氣所發治頭風面腫項強不得回顧夜夢顛倒靣青無顔色針入五分不宜灸資生經云銅人明堂上經皆云不宜灸下經素問注乃云灸三壯恐凡禁穴許一壯至三壯也天窗二穴一名窗龍在頸大筋前曲頰下扶突後動脈應手陷中灸三壯針三分明堂經云主耳鳴聾無所聞頰腫喉中痛暴瘖不能言及肩痛引項不得顧銅人經云手太陽脈氣所發西方子云治耳痛及痔漏頸痛天鼎一作天頂二穴在頸缺盆直扶戾後一寸灸三壯針三分忌同明堂下經云在項缺盆直扶突氣舍後一寸陷中灸十壯素問氣府注云在頸缺盆上直扶氣舍同身寸之半按甲乙經作寸半銅人經云手陽明脈氣所發治暴瘖氣硬喉痺咽腫不得息飲食不下喉中鳴西方子云在曲頰下一寸人迎後扶突二穴一名水穴在人迎後寸半灸三壯針三分素問注云在頸當曲頰一寸人迎後仰而取之銅人經云在氣舍後一寸半灸三壯主舌本出咳逆上氣咽中鳴喘多唾喘飲喉中如水雞又云手陽明脈氣所發缺盆二穴一名天蓋在肩下撗骨陷中灸三壯針三分素問云二分不宜刺大深使人逆息也明堂經云肩上撗骨陷中素問同肩上是也銅人經云治寒熱瘰􅊓缺盆中腫外潰則生胸中熱滿腹大水氣缺盆中痛汗出喉痺咳嗽西方子云主哽噎胸熱息賁脅下氣上衝銅人經云在肩下撗骨陷中明堂乃云在肩上橫骨陷中又云肩上是穴恐銅人語下字也人迎二穴一名五會在頸大脈應手夾結喉傍仰而取之以候五藏氣足陽明脈氣所發禁灸之不幸傷人針四分銅人經云治吐逆霍亂胸滿喘呼不得息項氣悶腫食不下水突二穴一名水門在頸大筋前直人迎下氣合上灸三壯針三分銅人經云足陽明脈氣所發治咳逆上氣咽喉癰腫呼吸短氣喘息不卧氣舍二穴在頸直人迎夾扶突陷中針三分灸三壯銅人經云足陽明脈氣所發治咳逆上氣瘤癭喉痺咽腫頸項強不得回顧西方子云主肩腫哽咽食不下也天突在結喉下一分一作宛宛中一作陷者中針五分留三呼得氣即瀉灸亦得即下針宜橫下不得低手即損五藏之氣傷人短夀明堂下經云一穴在項結喉下五分中央宛宛中灸五壯素問氣穴注云在頸結喉下四寸中央宛宛中刺一寸三壯甲乙經云在結喉下五寸明堂下經云主咳逆氣喘暴瘖不能言身寒頸腫喉中鳴翕翕胸中氣哽哽西方子云主頰舌縫脈青暴吝氣哽哽喉痺咽乾咳逆喘背痛及漏頸痛銅人經云隂維任脈氣之會治咳嗽上氣胸中氣噎喉狀如水雞聲肺壅咯唾膿血氣壅不通咽乾舌上急喉中生熱瘡不得下食慎如藥法及辛酸物等璇璣一穴在天突下一寸陷中仰頭取之灸五壯針入三分明堂經云灸三壯主胸脅支滿咳逆上喘喉中鳴也銅人經云脈氣所發治胸脅支滿痺咽腫水漿不下又云主喉癰華蓋一穴在璇璣下一寸陷中仰頭取之針三分灸五壯明堂下經云三壯一本云五壯又云主胸脅支滿咳逆上氣喘不能言也銅人經云任脈氣所發治胸脅支滿痛引胸中紫宮一穴在華蓋下一寸六分陷中仰頭取之灸五壯針三分明堂下經云在華蓋下一寸灸七壯銅人經云任脈氣所發治胸脅支滿痛胸膺骨疼痺痛痰飲食不下嘔吐上氣煩心吐血及唾如白膠玉堂一穴一名玉英在紫宮下一寸六分陷中五壯針三分銅人經云任脈氣所發主胸滿不得喘息痺痛胸膺骨疼嘔逆上氣煩心及寒疼又云可灸三壯膻中一穴一作亶一名元兒在玉堂下一寸六分撗骨兩乳間陷中仰卧取之灸七七壯禁針不幸令人夭明堂經云日灸七壯止七七壯禁針不幸令人死甲乙經云針三分下經云灸三壯千金云鳩尾上一寸銅人經云任脈氣所發治肺氣咳嗽上氣喘唾膿不得下食胸中氣滿如塞可灸二七壯及療膈嘔吐涎沫婦人妳脈帶乳汁及乳不下又云主肺癰明堂經云主胸膈滿悶氣短喉中鳴灸五壯立愈岐伯云治積氣乾噎慎豬魚酒麵等物資生經云靈蘭典云亶中者臣使一官喜樂出焉説者曰亶中為氣之海然心主為君以敷宣教令膻中主氣以氣右陰陽氣和志適則喜樂由生分布陰陽故官臣使也然則亶中者乃十二歲之一臣使官為氣之海分布陰陽非其他穴也此者患心氣噎膈氣肺氣上喘不得下食胸中如塞等疾宜灸此難疏云氣倉三焦外筯直兩乳間氣痛治此中庭一穴在膻中下一寸六分陷中灸五壯針三分明堂經云針二分下經云膻中下一寸灸三壯又云膻中下一寸宛宛中主食飲不下嘔逆食下還出也銅人經云任脈氣所發治脅支滿噎塞心下滿俞府二穴在兩骨下璇璣傍各二寸陷中仰而取之明堂云仰卧取之也針三分灸五壯明堂下經云灸三壯又云主咳逆上氣喘忌嘔逆不下飲食胸中痛也銅人經云足太陽脈氣所發又云足少陽脈氣所發主喘嘔吐胸滿不得食或中二穴在腧府下一寸六分陷中仰而取之明堂仰卧取之針四分灸五壯明堂下經云腧府下一寸灸三壯又云主咳嗽上喘不能食也銅人經云足少陽脈氣所發治胸脅支滿咳逆嘔吐氣涎多多唾呼吸喘悸坐不安席神藏二穴在或中下一寸六分陷中仰而取之灸五壯針三分銅人經云足少陽脈氣所發治胸脅支滿咳嗽喘逆不得息嘔吐胸滿不得食靈墟二穴在神藏下一寸六分陷中仰而取之針三分灸五壯銅人經云足少陽脈氣所發治胸脅支滿痛引胸不得息咳逆嘔吐胸滿不嗜食神封二穴在靈墟下一寸六分仰而取之灸五壯針三分銅人經云足少陽脈氣所發治胸滿不得食咳逆乳癰灑折惡寒西方子云主胸不得息步郎二穴在神封下一寸六分陷中仰而取之針三分灸五壯銅人經云足少陽脈氣所發治胸脅支滿鼻塞不通呼吸少氣喘息不得舉臂氣户二穴在巨骨下俞府兩傍各二寸陷中仰而取之針三分灸五壯銅人經云足陽明脈氣所發治胸脅支滿喘逆上氣呼吸胸背急不得息不知食味庫房二穴在氣户一寸六分陷中仰而取之灸五壯針三分明堂經云在陷者宛宛中主胸脅之滿咳逆上氣呼吸息下至息及肺寒咳嗽多唾膿血濁沫銅人經云足陽明脈氣所發屋翳二穴在庫房下一寸六分陷中仰而取之灸五壯針三分銅人經云足陽明脈氣所發治咳逆上氣呼吸多唾濁沫膿血身體腫皮膚痛不可近衣淫濼瘈瘲不仁膺窗二穴在屋翳下一寸六分陷中灸五壯針三分銅人經云足陽明脈氣所發治胸滿短氣脣腫乳癰寒熱卧不安西方子云主胸脅癰腫及腸鳴泄注也乳中二穴當乳是足陽明脈氣所發禁灸灸不幸生瘡瘡中有清汁膿血可治瘡中有息肉若蝕瘡者死微刺三分亦云相去一寸六分西方子云禁不灸乳根二穴在乳下一寸六分陷中仰而取之灸五壯針三分主膈氣不下食噎病銅人經云足陽明脈氣所發及治乳癰悽慘寒熱痛不可按抑西方子云主胸中滿痛以上十二穴去膺中行各四寸相去一寸六分雲門二穴在巨骨下夾氣户傍各二寸陷中灸五壯針三分刺深使人氣逆不宜深刺明堂經云雲門在巨骨下氣户兩傍各二寸陷中動脈應手舉臂取之眺經云在人迎下第二骨間相去二寸三分通灸禁針甲乙經云灸五壯針七分若深令人氣逆西方子云主嘔逆上氣胸脅徹背痛主喉痺胸中煩滿咳喘不得息不得舉臂胸短氣氣上衝心肩痛銅人經云手太陰脈氣所發針入二分又云足太陽脈氣所理肺同葉療之中府二穴一名膺中俞肺之募在雲門下一寸六分乳上三助間針三分留五呼灸五壯素問注云在胸中行兩旁相去六寸雲門下一寸乳上三肋問動脈應手陷中取明堂經云主肺急胸中滿喘逆唾濁善噎皮膚痛也銅人經云主喉痺胸滿塞寒熱胸中滿痛腹腫及膈寒食不下嘔吐還出及肺系急咳轉胸痛主上氣咳唾濁沫肩息背痛風汗出腹脹食飲不下􅀈􅀈膽焦又云太陰之會主膚骨痛熱寒周榮二穴在中府下一寸六分陷中仰而取之針四分明堂經云灸五壯主胸脅支滿不得俯仰咳唾膿也銅人經云足太陰脈氣所發主咳逆上氣呼吸多唾濁沫膿血飲食不下胸鄉二穴在周榮下一寸六分陷中宛宛仰而取之針四分灸五壯銅人經云足太陰脈氣所發治胸脅支滿引胸背痛卧不得轉側天溪二穴在胸鄉下一寸六分陷中仰而取之針四分灸五壯銅人經云足太陰脈氣所發治胸中滿痛咳逆上氣喉中作聲主乳癰潰賁膺食竇二穴在天溪下一寸六分陷中舉臂取之針四分灸五壯銅人經云足太陰脈氣所發治胸脅支滿膈間雷鳴滀陸陸常有水聲以上十二穴去膺中行各六寸六分淵淵腋二穴在腋下三寸宛宛中舉臂得之禁灸灸之不幸令人生腫蝕馬瘍內潰者死寒熱生馬瘍可治針三分銅人經云治胸無力臂不舉西方子云又名泉液也輒筋二穴在腋下三寸復前一寸首脅灸三壯針六分銅人經云足少陽脈氣所發胸中治暴滿不得卧喘息也天池二穴一名天會在乳後一寸腋下三寸著脅直腋撅肋間灸三壯針三分銅人經云手心主足少陽脈之會治寒熱胸膈煩滿痛四支不舉腋下腫上氣咳嗽胸中有聲喉中鳴明堂經云主寒熱痎瘧熱病汗不出大包二穴在腋下三寸脾之大絡布胸脅中出九肋間灸三壯針三分銅人經云治腹有大氣不得息胸脅中痛內實則其身盡寒虛則百節皆縱鳩尾一穴一名尾翳一名􅐳骭在臆前蔽骨下五分不可灸令人畢世少心力此穴大難針大好手方可下針不然取氣多令人夭針三分留三呼瀉五吸肥人倍之明堂經云在蔽骨下五分陷中灸三壯主心驚悸神氣耗散癲癎病不擇言也素問注云不可灸針人無蔽骨者從岐骨際下行一寸銅人經云治心風驚癎發癲伏如鳥鳴破心吐血心中氣悶不喜聞人語心腹脹滿胸中滿咳逆數噫喘息喉痺咽壅水漿不下忌同前法西方子云禁灸巨關一穴心之募在鳩尾下一寸人有鳩尾拒之弗令強於一寸中可針六分留七呼得氣即瀉可灸七壯止七七壯明堂經云在鳩尾下一寸陷中主心痛不可忍嘔血煩膈中不利臍脅支滿霍亂吐痢不止困蝕不知人銅人經云任脈氣所發治心中煩滿熱病胸中痰飲腹脹暴痛恍惚不知人息賁時唾血蟲心痛蠱毒霍亂發狂驚悸少氣又云主熱風風癎西方子云主風癲浪言或則鳥鳴聲不能食無心力凡心痛有數種冷痛蛔蟲心痛蠱毒或亂不識人及腹中滿暴痛汗出及手清臂不舉忌同上宛一作管一穴在巨闕一寸當一寸去蔽骨二寸明云主巨骨三寸針入八分先補後瀉神驗如風癎熱病宜先瀉後補立愈日灸二七壯至百壯未愈倍之忌同明堂下經云灸三壯千金云名胃腕銅人經云任脈足陽明手太陽之會治心中熱煩賁豚氣脹滿不能食霍亂吐利身熱汗不出三焦多涎心風驚悸心痛不忍氣伏如覆杯又云主嘔吐食飲胸脹氣心忪驚悸時吐嘔血腹內疴刺痛中腕一穴一名大倉胃之募在上腕下一寸上紀者中腕也針八分留七呼瀉五吸疾出針灸二七壯上百壯忌同明堂經云灸二七壯止四百壯千金一名胃募在心下四寸胃管下一寸銅人經云手太陽足陽明所生任脈之會治心下脹滿傷飽食下化霍亂出泄不自知心痛溫瘧傷寒飲水過多腹脹氣喘因讀書得賁豚氣上攻伏梁心悶狀宛如覆杯寒臂結氣忌豬魚生冷酒麵等物西方子云主心匿不能食反胃霍亂心痛熱溫痎瘧天行傷寒腹中熱喜渴涎出是蛔以手取而按之堅持及腹脹不通大便堅憂思損傷氣鬱聚中甚痛作膿腫往來上下及脅下堅痛及鼻間焦臭頭熱鼻齀衄及生寒中傷飽食不化及目黃振寒及衝疝冒死不知人治背與心相控而痛資生經云觀王氏按氣穴論注云中穴居心蔽骨與齊之中上下名四寸刺入一寸二分與同稍異宜從銅人為隱其曰胃之募蓋飲食蓄積于此也豫嘗苦脾疼嘗灸此穴覔冷氣從兩脅下而上至灸處即散此灸功也自從頻灸之亦每教人灸此凡脾痛不可忍飲食全不進者皆宜灸之難經疏府會大倉府病治此在心下三寸建里一穴在中腕下一寸針五分留十呼灸五壯銅人經云治下痛心不欲食嘔逆上氣腸脹身腫又云治腸中疼痛針入一寸二分灸亦良西方子云在中腕下一寸二分不可灸下腕一穴在建里腕下一寸針三分留三呼瀉五吸灸二七壯止二百壯銅人經云在足太隂任脈之會治腹痛六府之氣寒榖食不轉不嗜食小便赤腹堅硬癖塊臍上脈厥氣動日漸羸瘦刺入八分灸亦佳又云治腹胃不調腹內痛不能食腸堅腹胃脹水分一穴在下脘下一寸臍上一寸針八分留三呼瀉五吸若有水灸大良灸七壯止百壯禁針針水盡即斃一名陷者中明堂經云分水穴若水病灸大良日灸七壯止四百壯針五分留三呼又云水氣宜針水溝針余穴水盡即死何於却云可針究竟當以不針為是又云主水氣浮腫鼓脹腸如雷鼓􅀈水腫腸鳴胃虛脹不嗜食繞臍胸不得息又云一名分水主腸痛不能食腸堅腹腫胃管不調堅硬資生經云明堂云若是水病灸之大良針入五分而銅人云若是水病灸之大良禁不可針針水盡即斃是又不可針矣恐人但知明堂之可針不知銅人之不可針也於是書之以示世醫水分穴校之不針為是也神闕一穴一名氣合當臍灸百壯禁針忌同素問注云禁刺刺之使人臍中惡瘍潰矢出者死不治灸三壯銅人經云治泄利不止小兒妳利不絶腹大繞臍痛水腫鼓脹腸中鳴伏如流水聲久冷傷憊可灸百壯禁不可針慎如常法西方子云小兒灸五壯止七壯資生經云臍中千金等經不言灸只言禁針銅人經云宜灸百壯近世名醫遇人中風不省急灸臍中皆效徐伻卒中不省得桃源簿為灸臍中百壯始蘇更數月乃不起鄭紏云有一親卒中風醫者為灸五百而蘇後年餘八十向使徐卒灸三百壯安知其不永年耶論神關穴多灸則是陰交一穴一名橫户素問云在臍下一寸針八分得氣即瀉灸百壯止明堂經云灸不及針日三七壯止百壯西方子云明堂經云日灸三七壯止七百壯主臍熱小便赤氣痛狀如刀攪作塊狀如覆林婦人斷絶月事不調帶下崩中因産後惡露不止繞臍冷痛如藏遊氣及臍下㽱痛銅人經云任脈氣所發治寒疝引少腹痛腰膝拘攣腹滿女人月事不絶針入八分得氣即瀉瀉後宜補灸亦得然不及針氣海一穴一名脖腴一名下育在臍下一寸半宛宛中針八分得氣即瀉瀉後宜補之灸百壯今附氣海者是男子生氣氣海虛憊賁氣不足一切氣疾久不差皆灸之明堂經云灸七壯主冷病靣黑肌體羸瘦四肢力弱小腹氣積聚豚腹堅脫陽欲死不知人五藏氣逆上攻也西方子云主少腹疝氣遊行五藏腹中切痛及驚恐不得卧主冷氣衝心婦人惡露不止繞臍痛結成塊狀如覆杯小便赤澀銅人經云任脈氣所發治臍下冷痛及婦人月事不調帶下崩中慎如常法資生經云此經以氣海為生氣之海難經疏以為元氣之海則氣海者蓋人之元氣所生也故柳公度曰吾養生氣他􅀈但不是元氣作喜怒使氣海常溫爾今人既不能不以元氣佐喜怒矣若氣能時灸氣海使溫亦其次也王氏曰豫舊多病常苦氣短醫者教灸氣海氣遂不促自是每歲須一二灸之則以氣怯故也石門一穴一名利機一名精露在臍下二寸灸亦良可灸二七壯止百壯婦人不可針針之身身無子甲乙經云一名精露一名丹田一名命門針八分留三呼得氣即瀉下經云灸七灸千金云灸絶孕刺五分明堂經云在臍下二寸陷者主腹大堅氣淋小便黃身寒熱咳逆上氣嘔血卒疝繞臍痛賁豚氣上衝甄權云主婦人因産惡露不止西方子云又名端田女子不灸主腹脹痛堅哽婦人惡露不止遂成結塊崩中漏下斷續灸亦良大便難并大便閉塞氣結心間滿及小腹堅痛引陰中不得小便并小腹中拘急及腹中滿暴痛汗出并水脹水氣行皮中小腹皮敦敦然小便黃氣滿少食食入不化及嘔吐并賁豚上氣小腹疝氣遊行五藏疝繞臍衝胸不得息疝積及二丸騫痛銅人經云三焦之募任脈氣所發治腹堅肢滿資生經云臍下二寸名石門明堂載甲乙經云一名丹田千金素問亦謂丹田在臍下二寸世醫因是遂以石門為丹田誤以丹田乃在臍下三寸難經疏論之詳而有據當以難經疏為正詳見關元銅人經云針之絶子千金云灸之絶孕要之婦人不必針灸此穴論丹田穴當以臍下二寸為是也關元一穴一名次門在臍下三寸小腸之募足太陰少陰厥陰三陰任脈之會下紀者關元也針八分留三呼瀉五吸灸百壯至三百壯明堂經云若懷胎必不針若針而落胎胎多不出而針外崑崙立出灸亦良然不及針日三十壯下經云五壯岐伯云但是積冷處之皆宜灸明堂經云在臍下三寸陷者中主賁豚寒氣入小腸時欲嘔若血小便黃腹滿不止卒疝小腹痛轉胞不得小便西方子云主臍下㽱痛小便赤􅅹不覺遺小便處痛狀如疝尿如血色臍下結血狀如覆杯婦人帶下因産惡露不止斷絶産道冷及脅下脹及小腹熱而偏痛寒氣入腹及石淋臍下三十六疾不得小便及腸中尿血胞轉氣淋又主小便數及泄痢不止小腹滿石淋水及賁豚氣入小腸暴疝痛身熱頭痛進退往來銅人經云又治婦人帶下瘕聚月脈絶斷下經冷慎如當法資生經云關元乃丹田也諸經不言惟難經疏云丹田在臍下三寸方圓四寸著脊梁兩腎間名大海而貯其血氣亦名大中極言取人身也上下四向最為中也老醫與人灸皆從此説多者千餘壯少者千二百壯不知全活者幾何人然亦宜頻灸故曰若安丹田三不曾乾中極一穴一名玉泉一名氣原在關元下一寸針八分留十呼得氣即瀉灸百壯止三百壯明堂經云主婦人月事斷絶四度針銅人作此度針針即有子故即時任針也灸不及針日三七壯下經云五壯又云在臍下四寸陷者中灸五壯主尸厥不知人冷氣積聚時上衝心飢不能食小腹痛積聚堅如石小便不利失精絶子靣皯也西方子云主淋小便赤尿道痛臍下結塊如覆杯婦人因産得惡露不止遂成疝瘕或因月事不調血結成塊拘攣腹疝月水不下乳食絶子陰癢子門不端小腹苦寒賁豚搶心飢不能食腹脹經閉不通小便不利及失精及主恍惚尸厥煩痛銅人經云膀胱之募足三陰任脈之會治五淋及陽氣虛憊疝瘕水腫賁豚搶心甚則不得息曲骨一穴在橫骨上毛際陷中艾灸七壯至七七壯針二寸明堂下經云橫骨上中極下一寸毛際陷中千金云臍下五寸明堂經云主五淋小便黃水病脹滿婦人帶下赤白惡合隂陽小便閉澀不通但虛乏冷極者皆宜之西方子云又名屈骨主小便脹血癃小便難主癲疝小腹痛婦人赤白帶下銅人經云動應手任脈足厥陰之會是以少腹脹滿小便淋􅅹不通灸銅針一二寸會陰一穴一名屏醫在兩陰間任脈别絡俠督脈衝脈之會灸三壯西方子云在大便前小便後兩陰間主陰頭寒主痔與陰相通者死陰通中諸病前後相引痛不得大小便女子經不通男子陰端寒衝心耿耿銅人經云治小便難竅中熱皮疼痛搔癢齒門二穴夾巨闕兩傍各五分灸五壯針五分明堂經云在巨闕旁各一寸半陷中千金腎藏夾巨闕各一寸明堂經云一名齒門銅人經云衝脈足少陰之會治胸中引痛心下煩悶逆氣裏急取滿不嗜食數咳健忘泄利膿血少腹脹滿嘔沫吐涎喜睡女子心痛逆氣善吐食飲不下乾噦西方子云在巨闕傍半寸陷中資生經云銅人經云在齒門俠巨闕肓俞夾臍傍各五寸相去一寸明堂乃云幽門在巨闕傍一寸半通天夾上管傍相去三寸按千金四滿第二行穴在丹田今石門兩邊各一寸半與明堂合始知銅人語云通谷二穴在幽門下一寸針五分灸五壯明堂經云夾上管兩傍相去三寸下經云灸三壯又云在幽關下一寸陷中灸五壯主失欠口喎及嘔暴啞不能言也西方子云主頭痛寒熱汗出不惡寒主項拔不可左右顧目􅉩􅉩不明風寒及鼻清涕出及結積留飲癖囊胸滿飲主喜嘔及心中憤憤數欠癲心下悸咽中淡淡恐生食飲善嘔銅人經云衝脈足少隂之會主乾嘔又無所出又治勞食欲膈結隂都二穴一名食宮在通谷下一寸灸三壯針三分銅人經云衝脈足少隂之會治身寒熱瘧病心下煩滿氣逆西方子云主多唾嘔沫大便難婦人血氣子藏有惡血腹厥痛絞刺不可忍及腸鳴明堂經云在通谷下一寸陷者中主痎瘧病心恍惚石關二穴在隂都下一寸灸三壯針一分明堂經云在隂都下一寸宛宛中主多唾嘔沫大便難婦人無子藏有惡血腹厥內逆滿痛絞刺不可忍者西方子云又名石門灸五壯主脊強下關大閉塞氣結心堅滿及脊痓反折銅人經云衝脈少隂之會療婦人惡血上衝腹中溺痛不可忍灸三壯針一分商曲二穴在石關下一寸灸五壯針一寸銅人經云衝脈足少隂之會治腹中積聚腸中切痛不嗜食肓俞二穴在啇曲下一寸臍中各五分灸三壯針一寸銅人經云衝脈足少隂之會治大便乾燥腹中切痛及大腹寒疝小腹有熱可灸五壯針入三分中注二穴在育腧下一寸灸五壯針一寸銅人經云衝脈足少隂之會治小腹有熱大便堅燥不利西方子云在盲脈下五分四滿二穴一名髓府在中注下一寸針三分灸三壯千金丹田傍各一寸半即心下八寸臍下橫文是令人絞勘四滿二穴千金云在丹田傍寸半即心下八寸臍下橫文是右證得丹田在二寸銅人經云衝脈是少隂之會治臍下積聚疝瘕腸澼切痛振寒大腹石水小腹切切痛及奔豚上下西方子云主婦人藏中有惡血內逆滿痛疝及諸血㽱痛氣穴二穴一名胞門一名子戶在四滿下一寸灸五壯針三分銅人經云衝脈足少隂之會治月事不調泄利不止賁氣上下引脅脊痛西方子云在關元左邊三寸名子户主月禁不通大赫二穴一名隂維在氣穴下一寸間可灸五壯針三分銅人經云衝脈足少隂之會治男隂器結縮女子赤帶西方子云千金腎藏卷云在屈骨端三寸又名隂維主男子虛勞失精隂上縮莖中痛灸三十壯主女子赤沃橫骨二穴在大赫下灸三壯千金云名曲骨端在隂上橫骨中宛曲如郊月中央是也西方子云又名曲骨主精五藏虛竭治腹脹小便難隂器縱身痛銅人經云此穴諸經闕療病法也以上二十二穴去腹中行皆當為一寸半説是幽門不容二穴在幽門兩傍各一寸半灸五壯針五分明堂經云在管兩傍各一寸灸三壯素問注在第四肋端又云主腹內弦急不得食腹痛如刀刺兩脅膨膨然西方子云任脈二寸直兩肋端相去四寸主胸背相引痛嘔吐喘咳口乾痰癖脅下痛重肋疝瘕銅人經云足陽明氣脈所發治胸滿痰癖不嗜食腹虛鳴資生經云素問云夾鳩尾外當乳下三寸夾胃管各五寸不容至太赫大巨夾臍廣三寸各三滑內門天樞外陵也下臍二寸夾之各三大巨水道皈來也背腹第三行穴也甲乙經云天樞在臍旁各二寸與諸書同特此經為異信若是則其穴不當乳下可也必當乳下則廣三寸之説為當承滿二穴在不容下一寸針三分灸五壯明堂經云三壯千金云夾巨闕兩旁一寸半銅人經云足陽明脈氣所發治腸鳴腹脹上喘氣逆膈氣食飲不下肩息唾血可灸五壯針二分西方子云主脅下堅痛梁門二穴在承滿下灸五壯針三分銅人經云足陽明脈氣所發治胸脅下積氣食飲不思大腸滑泄穀不化關門二穴在梁門下一寸針八分灸五壯銅人經云足陽明脈氣所發治遺溺上滿及身腫重主積氣腸鳴卒痛泄利不欲食腹中氣遊走夾臍急痰瘧振寒太乙二穴在關門一寸灸五壯針八分銅人經云足陽明脈氣所發治癲疾狂走煩悶吐舌滑肉門二穴在太乙下一寸灸五壯針八分下一寸至天樞銅人經云足陽明脈氣所發治癲疾狂走吐舌嘔逆天樞二穴一名長溪一名穀門大腸之募去盲俞一寸半夾臍旁各二寸陷中灸五壯針五分留呼千金魂魄之舍不可針合臍相去可三寸銅人經云足陽明脈氣所發瘧夾臍切痛時上衝心煩滿嘔吐霍亂寒瘧泄利食不化女月事不時血結成塊腸鳴腹痛不嗜食可灸百壯針入五分留七呼西方子云亦名長谷循毛際主積冷氣繞臍切痛女子漏下赤白腹大堅急靣色蒼蒼主冬月重感於寒則泄腸胃間遊氣面浮腫吐血唾血熱甚狂言語外陵二穴在天樞下一寸灸五壯針三分西方子云在天樞半寸灸五壯主腹中盡痛心如懸下引臍腹痛銅人經云足陽明脈氣所發大巨二穴在長溪下二寸灸五壯針五分長溪天樞也千金在臍下二寸兩旁各二寸銅人經云足陽明脈氣所發治少腹脹滿煩渴㿗疝迢枯四肢不舉西方子云主小便難隂下縱善驚水道二穴在大巨下三寸灸五壯針三分半西方子云主三焦結熱大小便不利肩背痛小腹滿引隂中痛腰背強急膀胱寒銅人經云足陽明脈氣所發針入二寸五分皈來二穴在水道下二寸灸五壯針八分外臺云水道下三寸今校勘皈來二穴在水道下二寸甚為是銅人經云治小腹賁豚卵縮上入引莖中痛婦人血藏積冷氣衝二穴一名氣街在皈來下鼠􅀈上一寸動脈應手宛宛中禁針灸七立愈炷如大麥明堂下經云灸五壯素問注云在腹臍下橫骨兩端鼠􅀈上針三分千金云皈來下一寸明堂經云鼠􅀈上一寸灸三壯主腹有大氣腹脹臍下堅潰疝隂腫亦主婦人月水不通無子西方子云素問刺熱論有云主㿗疝痛隂痿莖中痛兩丸騫痛不可仰卧及大氣石水及中滿熱淋閉不得尿主腹中大熱不安大氣上攻心暴腹脹滿癃淫濼婦人月水暴閉塞乳難子上搶心若胞不出衆氣盡亂絞痛不得反息及氣衝腰痛不得俯仰銅人經云足陽明脈氣所發治腸中不得安卧腹有逆氣月水不利身熱腹中痛以上二十四穴去腹中行當各三寸期門二穴肝之募在不容旁一寸半直兩乳第二肋端針四分灸五壯千金云直兩乳下第二肋端旁一寸半又乳直下一寸半銅人經云足太隂厥隂腧維之會治胸中煩熱賁豚上下目青而嘔霍亂泄利腹堅硬大喘不得安卧脅下積氣女子産後疾食飲不下胸脅泛滿心中切痛善臆熱傷寒卧經解不當針期門使經不傳西方子云主脅下脹心痛氣短脹酸腹大堅不得息脹痺滿少腹尤大及小腹滿小便難隂下縱傷食腹滿日月二穴膽之下在期門下五分陷中灸五壯針五分千金名神光一名膽募明堂經云主悲不樂欲走多唾言語不正四肢不收銅人經云足太隂少陽陽維之會治太息善悲小腹熱可灸五壯針入七分腹哀二穴在日月下一寸半針入三分銅人經云在日月下一寸三分足太隂隂維之會治大便膿血寒中食不化腹中疼痛西方子云此穴不灸大橫二穴在腹哀三寸半直臍旁灸三壯針七分銅人經云足太隂隂維之會症大風逆氣多寒善悲可灸五北西方子云在腹哀下二寸主腹熱欲走大息四支不可動多汗洞利資生經云盲腧去臍旁當一寸半天樞去臍當三寸大橫去臍四寸半其去章門合為六寸難經疏乃云章門在臍上二寸兩旁九寸為可疑焉耳腹結二穴一名腸屈又名臨屈大橫下一寸三分針七分灸五壯銅人經云治繞臍痛上衝搶心腹寒泄利咳逆西方子云在大橫下二寸三分府舍二穴在腹結下三寸足太陰厥隂隂維之會會此三脈上下三分腹絡肝脾結心肺縱脅上至肩此太隂郤三隂明之别針七分灸五壯銅人經云治疝痛脾中急痛循脅上下搶心腹滿積聚厥氣霍亂衝門二穴一名慈宮上去大橫五寸府舍下橫骨兩端約中動脈針入七分灸五壯銅人經云足太隂厥隂之會治腹寒氣滿積聚疼痛淫濼隂疝難乳子上衝心不得息以上十四穴去腹中行合當為四寸半章門二穴一名長平一名腸髎脾之募在大橫外直臍季助端側卧屈上足伸下足舉臂針六分灸百壯明堂經云七壯止五百壯難經疏藏會季脅章門也藏病此是脅骨下短脅左臍下二寸兩旁九寸銅人經云足厥隂少隂之會耳鳴盈盈然食飲不下脅痛不得卧煩熱口乾不嗜食胸脅滿喘息心痛腰不得轉側傷飽身橫羸瘦賁豚腹腫脊強四肢懈惰善恐少氣厥逆肩臂不舉忌如前法又云一名脅窖主膀胱氣癖疝瘕氣膀胱氣痛腹如雷聲積聚氣針入六分灸亦良明堂經云灸七壯主腰背肋間痛腹中膨脹兩脅積聚如卵石也西方子云主咳逆食噦噫食如還出熱中苦吞而聞食臭寒中洞泄不化胸滿嘔無所出身重石水身腫諸漏灸百壯止京門二穴一名氣腧一名氣府督之募堅骨腰中季脅本夾脊灸三壯針三留七呼銅人經云治腰痛不得俯仰寒熱䐜脹引背不得息水道不利溺黃少腹急腫痛腸鳴洞泄髀樞引痛西方子云主肩背寒痓肩甲內廉痛脊痓及及折體痛帶脈二穴在季脅下一寸八分陷中一云宛宛中針六分灸五壯明堂下經云灸七壯如帶繞身管束諸經脈又千金云在季脅下又云主兩脅下氣轉背痛不可忍也銅人經云治婦人少腹堅痛月脈不調帶下赤白裏急瘈瘲也五樞二穴在帶脈下三寸一云在水道旁一寸五分陷中針一寸灸五壯明堂下經云三壯銅人經云治男子寒疝隂卵上入小腹痛明堂經云在帶脈下二寸及主膀胱氣攻兩脅也西方子云在水道下一寸半主婦人赤白裏急瘈瘲維道二穴在章門下五寸三分針八分灸三壯銅人經云足少陽帶脈之會治嘔逆不止三焦不調水腫不嗜飲食及咳逆不止居髎二穴在章門下八寸三分堅骨上陷中灸三壯針八分銅人經云在章門下八寸三分陽蹻足少陽之會治腰引少腹痛肩引胸臂攣急手臂不得舉而至肩脅堂二穴在腋下一骨間陷中舉腋取之灸五壯明堂下經云有脅堂主胸氣滿噫噦逆目黃遠視􅉩􅉩而銅人無之故附入於此普濟方卷四百十五
