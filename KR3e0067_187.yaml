一兩半右搗篩每服五錢水一盞半棗一枚煎至一盞去滓溫服連三服後以熱姜湯投之汗出為度天雄丸出聖濟總録治風濕痺皮肉不仁骨髓疼痛不可忍者天雄炮去皮臍附子去皮臍炮各一兩桂去粗皮一兩半乾姜炮製二兩防風去叉三兩右為細末為丸如梧桐子大每服二十丸溫酒下日三夜一去毒丸出聖濟總録治風濕痺腰脚疼痛不可忍久不瘥者天雄去皮臍附子炮製去皮臍桂去粗皮一兩白姜蚕直者炒三兩防風去义三分右為細末煉蜜丸如梧桐子大每服二十丸溫酒下日三夜一治諸處皮裏面痛右用何首烏末姜汁調成膏痛處以綿子裹之用火炙鞋底熨之妙著痺附論内經謂濕氣勝者為著痺地之濕氣感則害人皮肉筋脉盖濕土也土性重緩榮衞之氣與濕俱留所以濕勝則著而不移也其證多汗濡者以隂氣勝也治宜除寒濕通行經絡則瘥方摩風膏出聖濟總錄治風濕著痺服藥雖多肌肉猶􅍙痺防風去义羌活去蘆芎藭細辛去苗葉當歸蜀椒去目閉口炒出汗躑躅花各半兩白斂白芨丹參苦參黑參桂去粗皮附子去皮臍烏頭去皮臍皂莢去皮莽草各一分杏仁去皮尖并雙仁半兩右細剉如麻豆以米醋二升拌勻浸三宿熬乾同臘月猪脂二觔以文武火煎一日綿濾去滓瓷瓶貯每用一㸃􅍙痺處兼治一切風毒其膏年嵗深久者猶佳石斛散一名石斛秦芃散治寒濕痺著而不散四肢不仁脚弱拘攣或疼痛不能行跌腫上膝少腹堅不欲食方見脚氣門脚氣痺攣類側子浸酒方治寒濕著痺四肢皮膚不仁以致弱不能行方見本門風濕痺類側子湯出聖濟總錄治寒濕痺留著不出皮膚不仁手足無力側子炮製去皮臍五加皮各一兩羚羊角鎊防風去叉薏苡仁麻黄去根節杏仁湯浸去皮尖雙仁麸炒各一兩甘菊花防風己葛根赤芍藥芎藭秦芃去苗土甘草炙各半兩右剉如麻豆每服三錢水一盞煎至七分去滓溫服無時附子丸一名白花蛇丸治寒濕痺留著不去四肢緩弱皮膚不仁精神底塞方見本門風濕痺白花蛇丸出聖濟總録治寒濕著痺皮膚不仁或肢節疼痛白花蛇酒浸去皮骨炙仙靈脾乾蝎炒各一兩茵芋烏頭炮製去皮臍天南星炮各一兩天雄炮製去皮臍天麻桂去粗皮麻黄去根節鹿角鎊萆薢各一兩桑螵蛸炒半兩雄黄研麝香各一分右為末拌和令勻别用天麻三兩以無灰酒一大碗慢火熬成膏和煎藥末更搗五七百杵丸如梧桐子大每服薄荷酒下二十丸不拘時天雄浸酒方出聖濟總録治寒濕著痺皮肉不仁至肉髓疼痛者天雄炮製去皮臍附子炮製去皮臍各一兩防風去叉獨活去蘆當歸切焙白术各二兩五加皮芎藭桂去粗皮乾姜炮製各兩半右剉如麻豆以夾絹囊盛用無灰清酒一斗浸春夏五日秋冬七日每服溫飲一盞任性加減以知為度茯苓湯一方茯苓川芎湯出醫方大成治風濕痺留住不仁四肢􅍙麻拘攣浮腫赤茯苓去黑皮桑根白皮各二兩防己方用防風桂去粗皮芎藭各一兩半甘草炙三兩芍藥當歸切焙麻黄去根節先煮半去末乾一兩右粗搗篩每服六錢水二盞棗三枚擘開同煎去滓取一盞溫服空心臨卧時如欲出汗服藥了以生薑熱粥投之汗出慎外風乾蠍散一名蛜􅖉散出聖恵方治寒熱痺留住不去身體四肢不仁乾蠍一方用蛜􅖉炒側子炮製去皮臍桑螵蛸炒獨活去蘆各一兩躑躅醋拌炒天南星炮各半兩萆􅐺天麻桂去粗皮各一兩右為散每服一錢溫酒調下不拘時候龍虎膏出聖濟總録治風濕著痺肌肉􅍙厚不知痛痒龍骨二兩虎骨三兩塗酥炙當歸切焙桂去粗皮各一兩皂莢半兩右為末先别用好巴皂莢十梃以苦酒三升㧞取汁去滓入減半即入前藥同煎如稀餳入甆合每用少許漬摩􅍙痺處行痺附論内經謂風寒濕三氣雜至合而為痺其風氣勝者為行痺夫氣之在人本自流通所以痺者風寒濕三氣合而為病也然三氣之中各有隂陽風為陽氣善行數變故風氣勝則為行痺其證上下左右無所留止隨其所至氣血不通是也治法雖通血氣宜多用治風之劑方羚羊角丸出聖濟總録治行痺頭面四肢襲著筋脉攣急手足不遂痰涎膠黏語澀昏濁口眼徧留羚羊角鎊一兩青橘皮湯浸去白焙木香半夏湯洗同生姜搗面焙乾羌活去蘆獨活去蘆白附子炮天麻酒浸切焙各半兩梹榔剉芎藭藿香葉乾蝎去土炒白花蛇酒炙去皮骨丹參研麝香研牛黄研龍腦研各一兩右為細末再和勻用皂夾薄荷鵝梨汁各一碗同煎成膏和丸如菉豆大每服七丸溫酒或薄荷湯下不計時候山茱茰丸治風痺遊走無常處亦治血痺方見本門血痺類一名萆􅐺丸乾地黄丸出聖恵方治諸風痺走移無定生乾地黄焙澤瀉山茱茰炒各一兩山芋牛膝去苗葉酒浸焙白术各半兩天雄炮去皮臍一分蠐螬㣲炒乾漆炒煙出狗脊去毛車前子茵芋各三錢萆􅐺炒半兩右為細末煉蜜丸如桐子大空心二十丸溫酒下日三夜一萆􅐺丸出聖濟總録治風痺行走無定處亦治血痺萆􅐺山芋澤瀉各一兩生地黄焙二兩半白术茵芋牛膝去苗酒浸焙乾乾漆炒出煙狗脊去毛車前子天雄炮去皮臍一分蠐螬㣲炒右為細末煉蜜和丸如梧桐子大每服溫酒下二十丸加至三十丸日三防風湯出醫方大成治行痺行走無定防風去叉甘草炙當歸切焙赤茯苓去黑皮各一兩秦芃去苗土葛根各三分桂去粗皮杏仁酒浸去皮尖雙仁炒各一兩麻黄去根節焙半兩右㕮咀每服五錢酒一盞棗三枚擘開生姜五片同煎至一盞去滓溫服日二夜一服一方無麻黄治走注風毒疼痛右用小菜末和鷄子白調傅痺氣附論内經謂人身非衣寒也非有寒氣也寒從中生者何是人多痺氣也陽氣少隂氣多故身寒如從水出夫陽虚生外寒隂勝生内寒人身隂陽偏勝則自生寒熱不必外傷於邪氣也痺氣内寒者以氣痺而血不能運陽虚而隂自勝也血凝滯而脉不通故其證身寒如水中出也方溫補鹿茸丸出聖濟總録治陽氣虚隂氣勝痺氣内寒如從水中出鹿茸去毛酥炙四兩五加皮五味子牛膝酒浸切焙防風去叉逺志去心石斛去根山芋狗脊去毛各二兩肉蓯蓉去皮酒浸切焙熟乾地黄切焙各三兩人參一兩白茯苓去黑皮兎絲子酒浸别搗各一兩一分覆盆子石龍芮各二兩萆􅐺蛇床子炒去皮白术各三分巴㦸天去心酒浸焙天門冬去心焙杜仲炒各一兩半乾姜炮桂去粗皮吳茱茰炒附子炮去皮臍細辛去苖葉蜀椒去目并合口炒去汗各三分天雄炮去皮臍一兩石南三分右除兎絲子别搗外搗羅為末再拌勻煉蜜和丸如梧桐子大每服溫酒下二十丸稍加至三十丸空心食前日三巴㦸天丸出聖濟總錄治陽衰隂勝痺氣身寒補益巴㦸天去心酒浸焙肉蓯蓉去皮酒浸切焙白龍骨五味子鹿茸去毛酥炙白茯苓去黑心天雄炮製續斷山芋白石英各二兩半覆盆子兎絲子酒浸另搗各三兩熟乾地黄焙二兩蛇床子炒去皮一兩逺志去心乾姜炮製各一兩半右為細末入兎絲子拌勻再羅煉蜜丸如梧桐子大每服空心溫酒下二十丸加至三十丸日再補益黄耆丸出聖濟總録治隂勝陽虚痺氣身寒如從水中出黄耆鹿茸去毛酥炙白茯苓去黑皮烏頭炮去皮臍姜乾炮各三分桂去粗皮當歸切焙熟乾地黄焙芎藭各一兩白术兎絲子酒浸一宿别搗五味子栢子仁枸杞根皮剉各一兩半大棗去核二十枚焙右為細末入兎絲子再拌勻煉蜜和丸如梧桐子大每服空心溫酒下十五丸日進三服天雄丸出聖濟總録治陽虚隂勝痺氣身寒如從水中出天雄炮製去皮臍烏頭炮製去皮臍石龍芮王孫王不留行蜀椒去目閉口炒出汗各一兩當歸切焙肉蓯蓉去粗皮浸酒切焙天麻剉各二兩蛇床子炒半兩右為細末煉蜜和丸如梧桐子大每服空心溫酒下三十丸日一服再蓯蓉丸出聖濟總錄治陽虚隂勝痺氣身寒如從水中出肉蓯蓉去粗皮酒浸切焙天雄炮製去皮臍石斛剉當歸切焙桂去粗皮各一兩蜀椒去目閉口者炒出汗陳橘皮湯浸去白牛膝剉酒浸焙乾姜炮製各一兩半右為細末煉蜜和丸如梧桐子大每服三十丸空心服食前溫酒下日三附子丸出宣明論痺氣中寒陽虚隂勝身寒如水中出附子炮製去皮烏頭炮製去皮臍桂去粗皮菖蒲去鬚剉蜀椒去目閉口者出汗右為細末煉蜜和丸如梧桐子大每服空心溫酒下三十丸日再治痺痛大草烏半兩天仙子三錢炒五靈脂一兩甘草半兩右為細末麺糊為丸用羅青為衣如梧桐子大每服三十丸男子石菖蒲湯下婦人莞花湯下普濟方卷一百八十七
