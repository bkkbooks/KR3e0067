body:
  text: 普濟方卷一百八十七明周王朱橚撰諸痺門胸痺附論夫胸痺之病令人心中堅滿痞急痛肌中苦絞急如刺不得俛仰其胸前皮背痛手足不得犯胸中愊愊而滿短氣欬唾引痛或胸或背皆痛或心痛徹背或肌痺皮膚痛咽塞不利習習如痒㗋中乾燥時欲嘔吐煩悶白汗出或徹引皆痛不治之數日殺人夫脉當視太過與不及陽㣲隂弦即胸痺而痛所以然者以其極虚故也今陽虚知在上焦所以胸痺心痛者以其人脉隂弦故也平人無寒熱短氣不足以息者實也又曰寸口沉而遲闗上小𦂳數是也夫胸痺之病其脉陽㣲而隂弦者陽虚則知在上焦隂弦故令胸痺心痛古方用理中湯取緩其中氣則可也然背者胸之府或築或悸或渇或腹痛或寒或腸滿其候不一治當審宜加損也方利膈散出聖恵方治胸痺喘息不通人參去蘆赤茯苓前胡各一兩去蘆甘草炙㣲赤桂心乾姜各半兩訶梨勒皮陳橘皮湯去白焙白术各三分右為散每服五錢水一大盞生姜半分煎至五分去滓溫服頻服蜀椒散出千金方治胸痺逹背蜀椒食茱茰各一兩桂心桔梗各三兩烏頭半兩䜴六銖右治下篩食後酒服方寸七日三一方每服三錢食前煎服小草丸出聖恵方療胸痺心嘔逆氣膈中飲不下小草桂心蜀椒炒出汗乾姜細辛各三分附子二分炮右搗篩和以蜜丸梧桐子大先食米汁三十丸日三不知稍增以知為度忌猪肉冷水生葱生菜理中湯一名人參湯出千金方治胸痺人參甘草炙白术乾姜炮各一兩半右搗篩每服五錢水二盞煎至一盞去滓溫服空心午臨卧各一若築者此為腎氣動也去术加桂二兩臍上築吐多者去术加生姜一兩半下多者復用术悸者加茯苓一兩渇者加术二兩一分腹中痛者加人參二兩一分寒者加乾姜二兩一分腹滿者去术加附子一枚服湯後食久以稀粥投之衣覆取㣲汗一方加天麻枳實湯治胸痺枳實去穰麺炒半兩括􅌣實一枚并穰用厚朴去皮姜汁炙三兩右剉如麻豆每服五錢水二盞煎至一盞去滓溫服空心日晩各一麝香㪚治胸痺壅悶麝香研牛黄研半兩犀角一分右為散每二錢溫酒調下空心日午臨卧各一服半夏湯治胸心下堅痞急痛徹背短氣煩悶白汗出半夏湯洗七遍切焙二兩半括􅌣實一枚右剉如麻豆每服五錢水二盞入生姜一分切碎煎至一盞去滓溫服日三服枳殻湯治結胸結脇秘結方枳殻滑石各二兩甘草一兩右㕮咀每服三錢用臭冷橘葉七片同煎溫服連進三服即觧薏苡仁散出聖恵方療胸痺徧緩急及心下堅痞薏苡仁五百枚附子十枚大者炮甘草三兩炙右篩毎服方寸匕日三忌海藻菘菜猪肉冷水一方入生姜半分煎服金匱方無甘草麝香丸出聖恵方治胸痺壅悶麝香一分研牛膝一兩去苗犀角屑半兩右為細末煉蜜為丸如梧桐子大每服以橘皮湯下二十丸日三四服下氣湯出千金方治胸腹皆閉滿上氣喘息大腹梹榔二十七枚杏仁四七枚右㕮咀以童子小便三升煎取一升半分再服曾患氣發輒合服之妙枳實湯治胸痺枳實去穰麺炒四枚厚朴去粗皮生姜汁炙三兩右篩每服五錢水二盞入薤白一握切煎至一盞去滓溫服空心日晚各一梔子湯治胸痺切痛此方與倉卒散煑製不同故别出梔子仁二兩附子炮去皮臍一兩右㕮咀每服三錢水一盞薤白三寸同煎至五分去滓溫服陳橘皮散一名橘皮生姜湯出聖恵方治胸痺胸中愊愊如滿噎塞如痒咽喉中澀唾沫陳橘皮二兩湯去白穰焙枳殻二兩麸炒黄去穣右為散每服三錢水一中盞入生姜半分同煎至六分去滓溫服括􅌣丸治胸痞胸中痛徹背氣塞喘急欬𠻳心腹痞悶括􅌣去穣取子炒香熟留皮與穣别用枳殻麸炒去穰各等分右為細末取括􅌣皮穣研末水熬成膏和二味為丸如梧桐子大熟水下二十五丸日二食後服梹榔湯出千金方主破胸背惡氣音聲塞閉右用極大者四枚小者八枚㕮咀以小兒尿二升半煮減一升去滓分三服頻與五劑永定枳殻散治胸痺心下堅痞急痛徹背短氣煩悶汗自出右用枳殻去穰麩炒㣲黄三十枚搗散食米飲調下方寸匕日三夜一又方加桂等分枳實散肘後方治胸痺氣壅滿心膈不利右用枳實二兩麩炒㣲黄為丸以清飲調下二錢薤汁飲出聖恵方治胸脾骨痺不可觸者已差更發右取薤根五片淨洗去土搗絞取汁溫服一小盞立愈多服之良􅌝􅌣湯治胸痺疼痛痰逆心膈不利方見本門胸痺心下堅痞急類雄黄丸治胸痺強急疼痛方見本門胸痺心下堅痞急類瓜蒌湯出聖恵方治胸痺疼痛痰逆心膈不利枳殻四個一用枳實厚朴薤白各一兩瓜蒌一個生姜半兩桂枝一兩有熱除此一味右㕮咀以水七升煎取四升去滓溫服一方無姜治胸痺心中急痛如錐刺不得俛仰自汗出或痛徹背上不治或至死可取生韭或根五片洗搗汁灌少許即吐胸中惡血治胸痺心中痛痺堅留氣結胸胸滿脇下逆氣搶心人參术乾姜甘草各三兩右四味以水八升煮取三升每服一升日三如臍上築者為腎氣動去术加桂四兩吐多者去术加生姜三兩下多者復其术悖者加茯苓二兩渇者加术至四兩半復痛者加人參四兩半寒者加乾姜四兩半滿者去术加附子一枚服藥後如食飲熱粥一升許㣲有汗勿發掲衣被此方晉宋以後至唐名醫治心腹病者無不用之或作湯或作蜜丸或加減皆竒效胡洽治霍亂謂之溫中湯導引法食生方云以右足踐地左足蹺上除胸痺食熱嘔胸痺噎塞附論夫臟腑不和血氣弱風冷之氣伏留在内因虚上攻胸膈則人胸中愊愊滿寒習習如痒氣道壅澀咽喉不利心中痞急欬唾引痛氣不宣通故令胸中痺悶而噎塞也吳茱茰㪚出聖恵方治胸痺噎塞不能下食吳茱茰湯七次焙炒半夏湯洗七次去滑白术赤茯苓右為細末用酒麺糊為丸如梧桐子大每服三十丸姜湯送下半夏散治胸痺噎塞心下煩滿半夏湯七次前胡去蘆射干白术桂心人參去蘆枳實各一兩麩炒黄去穣右為散每服五錢水一大盞入生姜半分棗三枚煎至五分去滓不計時溫服赤茯苓湯治胸痺連心氣悶喉中塞滿唾沫赤茯苓去黑皮細辛去苗葉枳殻去穣炒各一兩橘皮湯去白焙桂去皮各三分括􅌣實一枚去皮右篩每服三錢水一盞半生姜一分同煎至七分去滓空心服如行五六里再服陳橘皮湯治胸痺連心喉中塞不通陳橘皮湯去白焙桂心去粗皮甘草炙各一分赤茯苓去黑皮枳殻去穣炒各半兩括􅌣實一枚去皮穣用子右篩每服五錢水二盞煎至一盞去滓空心溫服日午臨卧各一服半夏湯㪚治胸痺氣噎塞疼悶半夏湯浸七次去滑青橘皮湯浸去白穣木通桂心各一兩吳茱茰一分湯浸七次焙炒右為散每服五錢水一大盞入生姜半分煎至五分去滓不計時候稍熱服半夏丸治心胸塞壅悶食不下半夏湯洗七遍去滑桔梗各二兩桂去粗皮一兩半木香枳殻去穣麩炒各一兩右為細末生姜汁煮糊為丸如梧桐子大每服二十丸木𤓰湯送下通氣湯治胸滿氣噎半夏八兩生姜六兩桂心三兩大棗三十枚右㕮咀以水八升煮取三升分五服日三夜二通氣湯治胸痺滿短氣噎塞半夏八兩生姜六兩橘皮三兩吳茱茰四十枚右㕮咀以水八升煮取三升分三服一方用桂二兩無橘皮茯苓湯治胸中氣塞氣赤茯苓去皮三兩杏仁五十枚湯去皮尖雙仁炒甘草炙一兩右搗篩每服三錢水二盞煎至六分去滓溫服空心日午臨卧各一服香附子丸治胸膈不利但是膈間之証並宜服之香附子一觔半巴豆七十或一百個枳殻一觔半右將藥米醋三四碗煎至醋盡晒乾為末醋糊為丸如梧桐子大每服三四十丸用生姜湯送下橘皮枳實一名橘皮生姜湯治胸中愊愊如滿噎塞習習如癢喉中澀燥陳橘皮湯去白半兩焙枳殻麸炒一兩半右篩每服五錢水二盞入生姜一分同煎至一盞去滓溫服三日空心日午臨卧各一胸痺心下堅痺痞急附論夫體虚之人寒氣客之結在胸鬱而不㪚故為胸痺其證心下堅滿痞急甚者癘痛搶心如刺手不得犯治之稍緩便致危殆不可忽也儒門事親書云凡人病心胸痞悶不欲飲食身體壯熱口燥舌乾大小便不利有一上治之說下元虚冷便投緩藥數十服其病不愈又一醫治與前同又投藥五七日其證轉加困弱請余治之診脉而問曰飲食若何大小便若何答云小便赤色大便黑色便言傷寒瘀血之證初用大黄芍藥湯二劑次服犀角地黄湯二服後用通氣湯一服大便轉過黄色為效騐此藥服十餘服方可病瘥矣木香丸治寒風結為胸痺心下堅痞木香青橘皮湯去白焙陳橘皮湯去白焙羌活去蘆梹榔半夏湯洗七遍桔梗去蘆枳實麸炒黄色白术厚朴去粗皮姜汁製甘草各半兩炙黄右為細末煉蜜為丸如梧桐子大每服三十丸日三生姜湯送下荳蔲湯治胸痺心下堅痞白荳蔲去皮桂去粗皮木香人參各半兩陳橘京三稜煨一兩陳橘皮湯去穣焙大麥蘖炒各三兩乾姜炮甘草炙各一兩右㕮咀每服三錢水二盞姜三片鹽少許煎至七分去滓食前溫服半夏散出聖恵方治胸痺心下堅痞胸背緩急疼痛不能下食半夏湯浸七次去滑桂心各一兩赤茯苓白术枳實麸炒黄木香陳橘皮大腹各三分甘草一分炙㣲赤右為散每服二錢水一盞入生姜半分去滓溫溫頻服之桂姜丸出肘後方治胸中隱然而痛亦治胸中痺心膈痞滿肩背緩急痛桂去粗皮乾姜炮烏頭炮去皮臍各一分人參三兩右為末煉蜜和丸如小豆大每服二十丸溫酒下稍加之粥飲亦得陳橘皮湯治心胸氣急刺痛不可俛仰氣促欬唾不下食陳橘皮湯去白焙當歸切焙各半兩桔梗炒三兩木香一分芍藥半兩右篩每服五錢水一鍾半生姜五片煎至八分去滓溫服五味丸治胸痺心下堅痞桂去粗皮訶梨勒皮梹榔各一兩附子炮去皮臍乾姜炮各三分右為細末煉蜜為丸如梧桐子大每服二十丸溫酒或生姜湯下枳實薤白桂枝湯出金匱方治胸痺心中痞氣結在胸胸滿脇下逆搶心枳實四枚薤白一片桂枝一兩一方用心厚朴三兩括􅌣實一枚右㕮咀以水七升煮取二升分再服一方厚朴用四兩薤白半觔水五升煮二升一方有生姜半分煎服枳實散出聖恵方治胸痺心胸背緩急心腹不利宜服枳實麸炒㣲黄前胡去蘆陳橘皮湯去白焙赤茯苓各一兩木杏半兩右為㪚每服五錢水一大盞入生姜半分去滓溫酒服之枳殻㪚治胸痺心下堅痞緩急氣結不通枳殻麸炒㣲黄去穣厚朴各三兩去皮炙香姜汁製桂心半夏各一兩湯洗七遍去滑前胡去蘆右為㪚每服三錢水一中盞入生姜半分煎至六分去滓稍熱服之枳實桔梗湯治胸痺心下氣堅癘刺不可俛仰氣促欬唾引不下食枳實麸炒七枚陳橘皮湯去白焙桔梗炒各半兩甘草炙一分右搗篩每服五錢水一盞半生姜一棗大拍破薤白五寸切煎至八分去滓溫服四溫㪚治寒氣客在胸中鬱而不㪚堅滿痞急病名胸痺附子炮去皮臍蓬莪煨各一兩胡椒枳實麸炒各半兩右為㪚每三錢熱酒調下薏苡㪚出千匱方治胸痺痞急薏苡仁七百五十粒附子大者五片炮去皮臍右為㪚每服半錢溫酒調下空心日午卧各一服未差稍增之雄黄丸出肘後方治胸痺之病令人心中堅痞急痛肌中苦痺絞急捫其胸前及背皆痛手不得犯胸滿短氣欬唾引痛煩悶白汗出或徹引背膂不即療數日殺人療卒患胸痺方雄黄巴豆去皮心熬等分右搗雄黄篩内巴豆務熟搗之相和丸小豆大服一丸不覺稍益忌野猪肉蘆笋一方用生姜橘皮煎湯下五丸治心下痞堅不能食胸中嘔噦方出肘後方右以生姜八兩細切以水三升煮取一升半夏五合洗去滑以水五升煮取一升二味合煮一升半稍稍服之薤汁飲出肘後方治胸痺已差復更發者方見本門胸痺類