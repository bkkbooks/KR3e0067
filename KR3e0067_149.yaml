㣲炒右為末煉蜜和丸如梧桐子大每服不計時候以粥飲下十丸黄連湯出聖惠方治時氣熱毒下痢當歸二兩炒黄連二兩炒黄蘖二兩剉炙右為散每服五錢以水一大盞煎至五分去滓入蜜一茶匙再煎一兩沸温服不計時候外臺秘要方治天行諸下痢可用水六升煮取三升去滓内蜜一合㣲火煎取二升半分三服良騐忌猪肉冷水治時氣赤白痢方出聖惠方鼈甲二兩塗醋炙黄去裙襴阿膠一兩碎炒令黄燥赤小豆一合炒熟右為散每服不計時候以粥飲調下三錢雄黄丸治時氣熱毒下痢赤白及下部毒氣下細蟲如布絲長四五寸黒頭鋭尾雄黄研一分丹砂研乾薑炮附子炮製去皮臍各半兩右搗研為末煉蜜和丸𢷬五百下丸如菉豆大每服十丸空心米飲下麝香丸治天行熱毒下痢赤白久下膿血及下部毒氣常下細蟲如布絲縷大或長四寸黒頭鋭尾麝香一分附子三分炮雄黄丹砂乾薑各二分右五味各𢷬下篩訖復更合治之蜜和丸如小豆大每服一丸老小半之效騐忌猪肉生血等物治天行四五日大下熱病痢方見本門時氣四日類黄連青龍湯同竹茹飲治痢後得天行頭痛三四日食即嘔吐者竹茹二兩橘皮二兩生薑四兩人參二兩蘆根切一升粳米一合右切以水六升煮取二升五合去滓分温五六服中間任食忌熱麵生冷時氣下部䘌瘡論夫時氣下部瘡者䘌由熱毒結在腹中穀氣衰毒氣盛三蟲動作長食人五臟多冷洩痢下部生瘡痒不暫止若唇内生瘡但欲寐者此蟲蝕下部也重者則肚爛傷於五臟也即死也方雄黄散出聖惠方治時氣䘌蝕下部生瘡宜服雄黄半兩細研外一方用醋炙青葙子三兩苦參三兩剉黄連三兩去鬚微炒杏仁一兩半湯浸去皮尖双仁麩炒微黄外一方用桃仁右為散每服食前粥飲調下二錢外臺秘要方𢷬篩綿褁如半棗核大内下部亦可米汁服方寸一日三服忌猪肉冷水及熱麫炙肉蒜等物毒病下部生瘡者出肘後方𢷬蛇苺汁服之三合日三水漬烏梅令濃并内崖蜜數數飲之治天行下部生瘡爛方出肘後方𢷬烏梅二十七枚去核大蒜二十枚屋塵半升篩取細者右擣篩為散苦酒一升和調於銅器中煎成膏作長挺内下部治時氣下部䘌瘡疼出聖惠方桂心二兩藍葉二兩右為末分為三服以生猪肝半斤去膜細切拌藥一服入五味同煮每日早晨一服當於下部中出蟲如髪一合已來便差外臺秘要方治天行䘌病用㕮咀水一斗煮取二升内猪肝十兩去膜細研著湯中和令相得臨時小温若毒悉在腹内盡服之在下部者三服藥中用一分竹筒内下部中服藥一時間當下細蟲如髪大五六升小兒半之忌生葱一名桂枝湯治時氣痢膿血下部生䘌瘡蟲方出聖惠方黄連三分去鬚㣲炒外䑓秘方作三兩蠟一兩烏梅肉三兩微炒右為末化蠟和蜜為丸梧桐子大每服食前以粥飲下三十丸晩再服之外䑓秘要加至四十丸瘥忌猪肉冷水一名黄連丸治時氣下部䘌瘡方出聖惠方用馬蹄燒為灰為末以猪肉脂和塗之一日可五六遍即瘥治時氣病下部䘌瘡痛不止出聖惠方用濃煮桃枝皮取汁煎如調餳以通下部中若口瘡含之差亦治熱病下部生瘡治傷寒䘌病兼治蛔蟲攻心臍如刺口吐清水出千金方取生鷄子小頭叩出白入漆一合熟和攪令極調沫出更内著殻中仰吞之食頃或半日乃吐下蟲劇者再服蟲盡熱除病愈毒病下部生瘡者出肘後方燒鹽以薫導之不透又以綿褁熨之又方出肘後方用生漆塗之綿導之又方出肘後方大丸艾灸下部又方出肘後方取蚓三升水五升得二升半盡服之又方出肘後方取水中荇葉搗綿褁導之日五易瘥又方出肘後方用攪皮檞皮煮汁粘糖以導之又濃煮桃皮飲之最良猪膽苦酒湯出千金方治熱病有䘌上下攻移殺人用猪膽一具苦酒半升和之大煎令沸三上三下藥成放温空心服飲三滿口蟲死便愈治傷寒熱病多睡變成温䘌四肢煩疼不得食出千金方用羊桃十觔切搗令熟暖湯三升掩浸之日正午時入中坐一炊久不過三度瘥青箱散出千金方治熱病有䘌下部生瘡青箱子一兩篇竹二兩藋蘆四兩甘草一分狼牙三分右搗篩米飲和每服一合日三服不知稍加之一方無甘草有橘皮二兩雄黄兊散出千金方治時氣病䘌下部生瘡雄黄半兩桃仁一兩青箱子黄連苦參各半兩右為末綿褁如棗核大内下部亦可棗汁服方寸匕日三服治温病下部有瘡蟲蝕人五臟出千金方雄黄皂莢各一分麝香硃砂各二分右為末蜜和丸如梧桐子大幼得病酒服一丸日二若下部有瘡日二時氣大小便不通論夫天行大小便不通此由脾胃有熱發汗太過則津液竭津液竭則胃乾燥結熱在内故大便不通又汗後津液虚少其人腸有伏熱故小便不通方廣濟柴胡散治天行熱氣惡寒頭疼壯熱大小便澁柴胡八分茵陳十分黄芩八分土𤓰根十分白蘚皮八分青木香十分梔子仁十分擘大黄二十四分芒硝十二分右搗為散平晨空肚以新汲水服五六錢少時當一兩行微利後煮葱䜴稀粥食之熱如未歇明晨更服四錢熱歇停藥忌熱食猪肉油膩等柴胡湯治天行惡寒壯熱頭痛大小便赤澁不下飲食柴胡七分茵陳七分大黄十二分别著升麻七分梔子四枚擘芒硝四分湯成下芍藥七分黄芩十二分右切以水四升先漬藥一時猛火煮取二升五合分温三服服别相去如人行六七里喫一服以快利為度第二服則利更不須服之忌熱食炙肉蒜粘食近效主天行後兩脇脹滿以炒鹽熨之如小便澁亦用鹽熨臍下如水腫以穀枝汁服愈大效滑石湯治天行病腹脹滿大小便不通滑石十四分研葶藶一合紙上炒令紫色研大黄三分切右切以水一大升煎取四合頓服時氣大便不通論夫時氣大便不通者由脾胃有熱發汗太過則津液竭津液竭則胃中乾燥結熱在内則大小便不通也方羚羊角散出聖惠方治時氣熱毒在臟大腸不通宜服羚羊角屑一兩柴胡一兩麥門冬二兩去心大腹皮一兩剉川大黄一兩剉碎微炒川升麻一兩甘草半兩炙微赤剉右為散每服三錢水一中盞煎至六分去滓入元明粉一錢攪令匀不計時候温服大黄散出聖惠方治時氣十日已上腹微滿而喘臍下疼痛大便不通宜服川芒硝二兩川大黄三兩剉碎微炒羚羊角屑一兩枳實一兩麩炒微黄桑根皮一兩右為散每服五錢以水一大盞煎至五分去滓不計時候温服以利為度柴胡散出聖惠方治時氣惡寒頭痛壯熱大便不通宜服柴胡去苗茵陳木通土𤓰根白蘚皮梔子仁各一兩川大黄三兩剉碎微炒川芒硝二兩右為散不計時候以温水調下三錢少時當利一兩行煮葱頭稀粥飲之如熱未歇再服大麻仁丸出聖惠方治時氣胃中煩熱大便不通宜服大麻仁二兩研川大黄二兩郁李仁一兩湯浸槐寄生川朴硝枳殻麩炒㣲黄去瓤木通各一兩右為末入大麻仁等令匀煉蜜和丸如梧桐子大每服不計時候以温酒調下二十丸調氣丸一名承氣丸出聖惠方治時氣十餘日不大便川芒硝二兩枳實一兩麩炒㣲黄川大黄二兩剉杏仁二兩湯浸去皮尖雙仁麩炒微黄研如膏右為末煉蜜和丸如梧桐子大不計時候以温水下三十丸如未利再服治時氣熱毒在胃大便不通出聖惠方川大黄一兩剉碎㣲炒川芒硝一兩右細剉以水一大盞浸一宿明早煎五七沸綿濾取汁不計時候温服時氣小便不通論夫時氣小腸者心之腑也心與小腸為表裏心臟熱久而不除汗後津液虚少不能灌溉而熱毒之氣流注小腸故令不通也方赤茯苓散出聖惠方治時氣有時寒熱四肢沈重口不知味胸中噦塞小便不通宜服赤茯苓二兩前胡三分去蘆頭白蘚皮一兩蘧麥一兩子芩半兩梔子仁半兩滑石二兩川升麻三分木通一兩半剉右為散每服三錢以水一盞煎至六分去滓不計時候温服具齒㪚出聖惠方治時氣熱毒流注小便不通宜服具齒四十枚白蘚皮一兩猪苓一兩去皮川大黄一兩剉碎微炒蘧麥一兩右為散每服不計時候以水一中盞半調下三錢良久再服以利為度犀角散出聖惠方治時氣四五日寒熱頭痛心腹煩悶小便不通犀角屑柴胡去苗赤芍藥蘧麥黄芩知母木通剉各一兩川大黄二兩剉碎微炒滑石二兩右為散每服五錢以水一中盞煎至五分去滓不計時候温服以得通為度柴胡散出聖惠方治時氣惡寒壯熱頭痛小便不通柴胡去苗茵陳川大黄剉碎黄芩木通剉川升麻梔子仁川芒硝茅根剉各一兩右為散每服五錢以水一大盞煎至五分去滓不計時候温服以得通為度治時氣壅毒心腹脹滿小便不通出聖惠方滑石二兩甜葶藶一兩隔紙炒令紫色右搗篩以水二大盞煎至一盞去滓不計時候温服以得通為度療小腹滿不得小便方兼治天行細末雄黄和蜜為丸棗核大内溺孔中令入中等半寸以竹管注隂令痛搠之通普濟方卷一百五十
