body:
  text: 普濟方卷一百五十明周王朱橚撰時氣門時氣宿食不消論夫時氣吐之後或病新差脾胃氣皆虛不能化水穀致有宿食難消頭目多疼時發寒熱或心腹煩滿大腸結燥此皆是其候也方枳實散出聖惠方治時氣後脾胃氣虛心腹虛脹喫食不消枳實麩炒令黃人參去蘆頭各一兩乾薑炮製甘草炙微赤銼半夏湯洗七遍去滑木香各半兩白术桂心桔梗去蘆頭各三分右為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓食前服麥蘖散出聖惠方治時氣後宿食不消不思飲食麥蘖微炒前胡去蘆頭白术檳榔人參去蘆頭厚朴去粗皮塗生薑汁炙令香熱各一兩甘草半兩炙微赤銼右為散每服五錢以水一大盞入生薑半分煎至五分去滓食前溫服人參散出聖惠方治時氣後胃虛心膈壅悶時有寒熱宿食不消人參二兩去蘆頭大腹皮一兩銼枳實一兩麩炒微黃赤茯苓訶藜勒用皮白术桔梗去蘆頭各一兩麥門冬一兩半去心焙甘草半兩炙微赤銼右為散每服五錢以水一大盞煎至五分去滓食前溫服白术散出聖惠方治時氣後宿食不消心胸壅滯乍寒乍熱白术人參去蘆頭陳橘皮湯浸去白瓤焙大腹皮銼黃茋銼枳殼麩炒微黃甘草炙微赤銼各半兩訶䔧勒用皮沈香各一兩右為散每服五錢以水一大盞煎至五分去滓食前溫服大黃散出聖惠方治時氣後宿食不消不思飲食麥蘖微炒前胡去蘆頭白术檳榔人參去蘆頭厚朴去粗皮塗薑汁炙令香熱各一兩甘草半兩炙微赤銼右為散每服五錢以水一大盞煎至五分去滓食前溫服厚朴丸出聖惠方治時氣後腸胃虛冷食不消化厚朴去粗皮塗生薑汁炙令香熱人參去蘆頭枳殼麩炒微黃去瓤神麯炒微黃大麥蘖炒微黃杏仁湯浸去皮尖雙仁麩炒微黃各一兩乾薑炮製銼白术各一兩甘草半兩炙微赤銼吳茱萸桂心各三分右為散煉蜜和丸如梧桐子大每服食前以棗湯下三十丸白豆䓻丸出聖惠方治時氣後脾胃氣冷食不消化白豆䓻去皮草豆䓻去皮白术人參去蘆頭陳橘皮湯浸去白瓤焙桂心神麯炒黃三分乾薑炮銼甘草炙微赤銼各半兩右為末煉蜜和丸如梧桐子大每服食前以薑棗湯下三十丸木香丸出聖惠方治時氣後脾胃虛冷宿食不消木香乾薑炮製銼各三分人參去蘆頭枳殼麩炒微黃去瓤麥蘖炒黃熟檳榔各一兩白术一兩半甘草半兩炙微赤銼右為散煉蜜和丸如梧桐子大每服食前以薑棗湯下三十丸黑神散出活人書治瘟疫時氣有積食巴豆新好者一兩輕槌去皮以急流水兩碗浸一宿然後煮三五十沸候冷瀝出去心膜以帛拂去水然後研如膏用厚紙十數重褁壓去油豆豉二兩新軟者為妙不得令乾與巴豆膏同細研五靈脂黑色者為上二分大戟半兩用生去皮其裏面如粉白者妙三稜半兩生用杏仁半兩燒過後入蒜煮研右三味為極細末入巴豆豆豉研細後入杏仁更研細别入飛羅麵半匙以井花水調漸次拌藥和得所入臼中搗三二千下丸如菉豆大晾乾入瓶盒內或微火焙亦得如遇傷寒有食積者脈沈身體不熱即冝服之量患人臟腑虛實加減丸數服用薑棗湯吞下取微利為度不可太過溏泄身熱下之則為病氣結胸若病在上可吐者同生薑乾嚼五丸時氣煩躁論夫時氣病煩躁者由隂氣少陽氣多故身熱而煩躁也其毒氣在心上而煩躁者由隂氣少伸陽氣多故身熱而煩躁也則令人悶而欲嘔者若其人胃內有燥結而煩躁者或則譫語時繞臍痛其腹脹滿當察其證候而治之也方竹葉湯出聖惠方治時氣表裏未解煩躁不可忍者竹葉二兩石膏二兩麥門冬半兩去心生薑半兩半夏湯洗七遍去滑人參半兩去蘆頭甘草一分炙微赤銼陳橘皮一分湯浸去白瓤焙右細銼和勻每服半兩以水一大盞煎至五分去滓不計時候溫服犀角散出聖惠方治時氣頭目煩疼心神躁壅大小便不利宜服犀角屑半兩防風半兩炙微赤銼檳榔二兩川升麻一兩秦芁一兩去苗白蘚皮一兩甘草半兩炙微赤銼川朴硝二兩木通一兩銼右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服大黃散出聖惠方治時氣表裏如火煩躁欲死宜服川大黃半兩銼碎微炒寒水石半兩川升麻半兩石膏半兩川朴硝半兩甘草半兩炙微赤銼葛根半兩右為散每服不計時候以新汲水調下二錢水解散出聖惠方治時氣煩躁頭痛壯熱宜服方見本門時氣二日類大黃散出聖惠方治時氣壯熱不解心神煩躁宜服川大黃半兩銼碎微炒黃連半兩去鬚麥門冬一兩去心梔子仁半兩銼柴胡一兩去苗甘草半兩炙微赤銼右為散每服五錢以水一大盞入豉半合蔥白二莖煎至五分去滓不計時候溫服苦參散出聖惠方治時氣壯熱不解心神煩悶毒氣在胸膈宜服苦參一兩銼黃芩一兩川升麻二兩右為散每服五錢以水一大盞煎至五分去滓不計時候溫服煩服當吐為效治時氣已五六日心神煩躁不解出聖惠方竹瀝半小盞新汲水半小盞右相和令勻不計時候頓服又方出聖惠方用大地龍二條破腹去泥細切似小豆大小便一中盞煮令熟去滓不計時候溫服又方出聖惠方雞子清一枚芒硝末一錢右以新汲水半盞調服一方用新汲水三合調服竹葉湯治煩躁而渴不止惡寒但熱盛者崔氏療常用亦佳不徒療天行凡虛羸病及病後胸上痰熱者服之皆妙甘草一兩黃芩一兩棗十五枚擘半夏一兩洗芍藥三兩前胡一兩小麥五合人參二兩粳米一升知母二兩栝樓一兩生薑四兩麥門冬四兩去心竹葉一把須用竹葉入水煮湯不用其藥右切以水一斗五升煮取五升分五服若天行而虛羸久病胸上痰熱亦可服之加黃茋二兩除黃芩減知母一兩除栝樓用之大效忌羊肉海藻菘菜救生散治疫癘病壯熱煩躁頭痛體疼人參五味子白术各半兩麻黃去根節三兩桂去粗皮厚朴去粗皮薑汁炙大黃銼炙各二兩附子麩炒去皮尖甘草炙各二兩右搗羅為散每服三錢匕新汲水調下後用熟水嗽口良久喫生薑熱茶一盞以綿被覆之如陽毒汗出隂毒㵼下立差治時氣表裏大熱欲死方大黃寒水石芒硝石膏升麻麻黃葛根紫葛右各搗篩水服方寸匕發汗麻黃湯治天行壯熱煩悶麻黃五兩去節葛根四兩梔子二十一枚擘蔥切一升香䜴一升綿褁右㕮咀以水八升先煮麻黃葛根三味沸去沫內諸藥煎二升五合去滓分為三服别柤去如人行五十里更進一服不利覆取汗後以粉粉身忌風及諸熱食葛根解肌湯出肘後方葛根四兩芍藥二兩麻黃一兩去節大青一兩甘草一兩炙黃芩一兩石膏一兩研桂心一兩大棗四枚孹右切以水五升煮取二升分溫三服相次服之覆取汗差忌海藻菘菜治天行病心悶出本草以水中細草搗絞汁服之治時氣熱毒心神煩躁出肘後方取生杼木削去黑皮細切裏白者一升以水二升五合煎去滓一服八合三服又方出肘後方取术丸子二七枚以水五升挼之熱去滓食服汗吐即愈又方出肘後方取古錢一百五十七枚以水一斗煮取七升服汁盡之須臾復以五升水更煮令得一升以水二升投中合得三升出錢飲汁當吐毒出也又方出肘後方取豬膽膏如彈子大者溫服之日三服三日九服勝金湯出肘後方治時氣病熱狂言心躁用苦參不拘多少炒黃色為末每服二錢水一盞煎至五分溫服連煎三服者有汗無汗皆差治天行病心悶出本草以絡石草煎服治時氣五六日心神煩躁不解用竹瀝半盞新汲水半盞和勻服之時氣煩渴論夫時氣煩渴者此由熱氣入於腎臟故也腎惡燥今熱氣盛則腎燥腎燥故渴而引飲也方知母散出聖惠方治時氣頭疼骨肉煩疼口燥心悶外寒內熱已自下利由有虛熱未退煩渴不止宜服知母人參去蘆頭地骨皮葛根銼甘草炙微赤銼各一兩石膏三兩􅌝􅌣根二兩右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服赤芍藥散出聖惠方治時氣數日不解心燥渴小腹脹急臍下悶痛宜服赤芍藥知母黃芩玄參麥門冬去心柴胡去苖各三分石膏二兩甘草三分炙微赤銼右為散每服四錢以水一中盞入生薑半分竹葉三七片煎至五分去滓不計時候溫服柴胡散出聖惠方治時氣頭痛骨肉煩疼口燥心悶外寒內熱已自下利由有虛熱未退煩渴不止宜服柴胡一兩去苗川升麻三分黃芩三分石膏二兩麥門冬一兩去心犀角屑三分葛根三分銼甘草三分炙微赤銼右為散每服五錢以水一大盞入蔥白二莖竹葉二七片煎至五分去滓不計時候溫服赤茯苓散出聖惠方治時氣頭痛雖時有汗煩渴不止宜服赤茯苓二兩甘草炙微赤銼澤㵼桂心葛根銼各一兩石膏二兩右為散每服五錢以水一大盞煎至五分去滓不計時候溫服豬苓散出聖惠方治時氣煩熱煩渴欲飲水小便不利豬苓去黑皮赤茯苓澤㵼阿膠搗碎炒令微黃滑石各一兩右為散每服五錢以水一大盞煎至五分去滓不計時候溫服麥門冬散出聖惠方治時氣壯熱煩渴麥門冬二兩去心五味子一兩人參一兩去蘆頭石膏二兩甘草一兩炙微赤銼右為散每服三錢以水一中盞煎至六分去滓不計時候溫服土瓜根散出聖惠方治時氣大熱心胸煩渴土瓜根半兩乾棗五枚麥門冬半兩去心甘草三分炙微赤銼䜴半合右細銼和勻每服半兩以水一大盞煎至五分去滓不計時候溫服治時氣煩渴不止方出聖惠方地骨皮半兩阿膠半兩搗碎炒微黃蔥白二莖并鬚右細銼和勻每服半兩以水一中盞煎至五分去滓不計時候溫服治時氣煩渴身熱頭痛嘔逆不能下食宜此方出聖惠方柴胡二兩半去苗赤茯苓二兩枳殼二兩麩炒微黃去瓤甘草二兩炙微赤銼麥門冬二兩去心右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服升麻散出聖惠方治時氣下後煩渴不止川升麻三分知母三分甘草三分炙微赤銼石膏一兩半葛根一兩銼右為散每服五錢以水一大盞入竹葉三七片粳米一百粒煎至五分去滓不計時候溫服葛根散出聖惠方治時氣煩渴飲食即吐心胸不利宜服葛根銼豬苓去黑皮赤茯苓桂心白术澤㵼􅌝􅌣各一兩右為散每服不計時候以溫水調下二錢令亟飲水小便利汗出便愈又方出聖惠方黃連一兩去鬚􅌝􅌣根一兩右為末煉蜜和丸如梧桐子大每服不計時候煎大麥湯溫下三十丸治時氣煩渴不止方出聖惠方葛根二兩銼蔥白五莖切右以水二大盞煎至一大盞去滓內白粳米半合豉半合以生絹裹煎良久候爛去米豉放冷不計時候溫服治時氣煩渴不止方出聖惠方取生藕搗絞取汁一中盞入生蜜一合攪勻不計時候分二服芍藥湯神方治毒溫病及吐下後有餘熱煩渴芍藥五分黃連四分甘草二分炙黃芩二兩桂心二兩栝樓二分右切以水五升煮取三升分三服一日令盡忌豬肉冷水海藻菘菜生蔥等乾糞湯一名破棺湯解大熱天行病若大困患舌燥如鋸極渴不能服藥者宜服用陳久乾人糞一升以沸湯一大升沃糞一食久澄清瀝取一升頓服如渴不止者又依前法更服此炙從心厭骨下一寸半名巨闕取患人中指節為寸炙三十壯若無心厭骨則以中指節前量橫括心上岐骨上兩頭築著骨當橫量下前一寸當中直下則是巨闕也時氣鼻衄論夫時氣鼻衄者由五臟結熱所為心主於血邪熱中於手少隂之經客於足陽明之絡故衄血也衄者血從鼻中出也方石膏飲子出聖惠方治時氣鼻衄煩躁不止頭痛氣逆石膏搗碎竹茹各二兩甘草炙微赤銼桂心各半兩赤芍藥柴胡去苖黃芩各一兩生地黃三兩右銼碎和勻每服半兩先以水一大盞半浸伏龍肝二兩澄清一大盞煎至五分去滓不計時候溫服治時氣心肺中熱鼻衄不止出聖惠方