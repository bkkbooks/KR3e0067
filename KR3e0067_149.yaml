body:
  text: 普濟方卷一百五十明周王朱橚撰時氣門時氣宿食不消論夫時氣吐之後或病新差脾胃氣皆虚不能化水穀致有宿食難消頭目多疼時發寒熱或心腹煩滿大腸結燥此皆是其候也方枳實散出聖惠方治時氣後脾胃氣虚心腹虚脹喫食不消枳實麩炒令黄人參去蘆頭各一兩乾薑炮製甘草炙微赤剉半夏湯洗七遍去滑木香各半兩白术桂心桔梗去蘆頭各三分右為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓食前服麥蘖散出聖惠方治時氣後宿食不消不思飲食麥蘖㣲炒前胡去蘆頭白术檳榔人參去蘆頭厚朴去粗皮塗生薑汁炙令香熱各一兩甘草半兩炙微赤剉右為散每服五錢以水一大盞入生薑半分煎至五分去滓食前温服人參散出聖惠方治時氣後胃虚心膈壅悶時有寒熱宿食不消人參二兩去蘆頭大腹皮一兩剉枳實一兩麩炒㣲黄赤茯苓訶藜勒用皮白术桔梗去蘆頭各一兩麥門冬一兩半去心焙甘草半兩炙微赤剉右為散每服五錢以水一大盞煎至五分去滓食前温服白术散出聖惠方治時氣後宿食不消心胸壅滯乍寒乍熱白术人參去蘆頭陳橘皮湯浸去白瓤焙大腹皮剉黄茋剉枳殻麩炒微黄甘草炙微赤剉各半兩訶䔧勒用皮沈香各一兩右為散每服五錢以水一大盞煎至五分去滓食前温服大黄散出聖惠方治時氣後宿食不消不思飲食麥蘖㣲炒前胡去蘆頭白术檳榔人參去蘆頭厚朴去粗皮塗薑汁炙令香熱各一兩甘草半兩炙㣲赤剉右為散每服五錢以水一大盞煎至五分去滓食前温服厚朴丸出聖惠方治時氣後腸胃虚冷食不消化厚朴去粗皮塗生薑汁炙令香熱人參去蘆頭枳殻麩炒微黄去瓤神麯炒微黄大麥蘖炒微黄杏仁湯浸去皮尖雙仁麩炒微黄各一兩乾薑炮製剉白术各一兩甘草半兩炙微赤剉吳茱萸桂心各三分右為散煉蜜和丸如梧桐子大每服食前以棗湯下三十丸白荳䓻丸出聖惠方治時氣後脾胃氣冷食不消化白荳䓻去皮草荳䓻去皮白术人參去蘆頭陳橘皮湯浸去白瓤焙桂心神麯炒黄三分乾薑炮剉甘草炙㣲赤剉各半兩右為末煉蜜和丸如梧桐子大每服食前以薑棗湯下三十丸木香丸出聖惠方治時氣後脾胃虚冷宿食不消木香乾薑炮製剉各三分人參去蘆頭枳殻麩炒微黄去瓤麥蘖炒黄熟檳榔各一兩白术一兩半甘草半兩炙微赤剉右為散煉蜜和丸如梧桐子大每服食前以薑棗湯下三十丸黒神散出活人書治瘟疫時氣有積食巴豆新好者一兩輕槌去皮以急流水兩碗浸一宿然後煮三五十沸候冷瀝出去心膜以帛拂去水然後研如膏用厚帋十數重褁壓去油豆豉二兩新軟者為妙不得令乾與巴豆膏同細研五靈脂黒色者為上二分大㦸半兩用生去皮其裏面如粉白者妙三稜半兩生用杏仁半兩燒過後入蒜煮研右三味為極細末入巴豆豆豉研細後入杏仁更研細别入飛羅麫半匙以井花水調漸次拌藥和得所入臼中搗三二千下丸如菉豆大晾乾入瓶盒内或微火焙亦得如遇傷寒有食積者脉沈身體不熱即冝服之量患人臓腑虚實加减丸數服用薑棗湯吞下取微利為度不可太過溏泄身熱下之則為病氣結胸若病在上可吐者同生薑乾嚼五丸時氣煩躁論夫時氣病煩躁者由隂氣少陽氣多故身熱而煩躁也其毒氣在心上而煩躁者由隂氣少伸陽氣多故身熱而煩躁也則令人悶而欲嘔者若其人胃内有燥結而煩躁者或則譫語時遶臍痛其腹脹滿當察其證候而治之也方竹葉湯出聖惠方治時氣表裏未解煩躁不可忍者竹葉二兩石膏二兩麥門冬半兩去心生薑半兩半夏湯洗七遍去滑人參半兩去蘆頭甘草一分炙㣲赤剉陳橘皮一分湯浸去白瓤焙右細剉和匀每服半兩以水一大盞煎至五分去滓不計時候温服犀角散出聖惠方治時氣頭目煩疼心神躁壅大小便不利宜服犀角屑半兩防風半兩炙微赤剉檳榔二兩川升麻一兩秦芁一兩去苗白蘚皮一兩甘草半兩炙微赤剉川朴硝二兩木通一兩剉右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候温服大黄散出聖惠方治時氣表裏如火煩躁欲死宜服川大黄半兩剉碎微炒寒水石半兩川升麻半兩石膏半兩川朴硝半兩甘草半兩炙微赤剉葛根半兩右為散每服不計時候以新汲水調下二錢水解散出聖惠方治時氣煩躁頭痛壯熱宜服方見本門時氣二日類大黄散出聖惠方治時氣壯熱不解心神煩躁宜服川大黄半兩剉碎微炒黄連半兩去鬚麥門冬一兩去心梔子仁半兩剉柴胡一兩去苗甘草半兩炙微赤剉右為散每服五錢以水一大盞入豉半合葱白二莖煎至五分去滓不計時候温服苦參散出聖惠方治時氣壯熱不解心神煩悶毒氣在胷膈宜服苦參一兩剉黄芩一兩川升麻二兩右為散每服五錢以水一大盞煎至五分去滓不計時候温服煩服當吐為效治時氣已五六日心神煩躁不解出聖惠方竹瀝半小盞新汲水半小盞右相和令匀不計時候頓服又方出聖惠方用大地龍二條破腹去泥細切似小豆大小便一中盞煮令熟去滓不計時候温服又方出聖惠方鷄子清一枚芒硝末一錢右以新汲水半盞調服一方用新汲水三合調服竹葉湯治煩躁而渴不止惡寒但熱盛者崔氏療常用亦佳不徒療天行凡虚羸病及病後胷上痰熱者服之皆妙甘草一兩黄芩一兩棗十五枚擘半夏一兩洗芍藥三兩前胡一兩小麥五合人參二兩粳米一升知母二兩栝楼一兩生薑四兩麥門冬四兩去心竹葉一把湏用竹葉入水煮湯不用其藥右切以水一斗五升煮取五升分五服若天行而虚羸乆病胷上痰熱亦可服之加黄茋二兩除黄芩减知母一兩除栝楼用之大效忌羊肉海藻菘菜救生散治疫癘病壯熱煩躁頭痛體疼人參五味子白术各半兩麻黄去根節三兩桂去粗皮厚朴去粗皮薑汁炙大黄剉炙各二兩附子麩炒去皮尖甘草炙各二兩右搗羅為散每服三錢匕新汲水調下後用熟水嗽口良久喫生薑熱茶一盞以綿被覆之如陽毒汗出隂毒㵼下立差治時氣表裏大熱欲死方大黄寒水石芒硝石膏升麻麻黄葛根紫葛右各搗篩水服方寸匕發汗麻黄湯治天行壯熱煩悶麻黄五兩去節葛根四兩梔子二十一枚擘葱切一升香䜴一升綿褁右㕮咀以水八升先煮麻黄葛根三味沸去沫内諸藥煎二升五合去滓分為三服别柤去如人行五十里更進一服不利覆取汗後以粉粉身忌風及諸熱食葛根解肌湯出肘後方葛根四兩芍藥二兩麻黄一兩去節大青一兩甘草一兩炙黄芩一兩石膏一兩研桂心一兩大棗四枚孹右切以水五升煮取二升分温三服相次服之覆取汗差忌海藻菘菜治天行病心悶出本草以水中細草搗絞汁服之治時氣熱毒心神煩躁出肘後方取生杼木削去黒皮細切裏白者一升以水二升五合煎去滓一服八合三服又方出肘後方取术丸子二七枚以水五升挼之熱去滓食服汗吐即愈又方出肘後方取古錢一百五十七枚以水一斗煮取七升服汁盡之須臾復以五升水更煮令得一升以水二升投中合得三升出錢飲汁當吐毒出也又方出肘後方取猪膽膏如彈子大者温服之日三服三日九服勝金湯出肘後方治時氣病熱狂言心躁用苦參不拘多少炒黄色為末每服二錢水一盞煎至五分温服連煎三服者有汗無汗皆差治天行病心悶出本草以絡石草煎服治時氣五六日心神煩躁不解用竹瀝半盞新汲水半盞和匀服之時氣煩渴論夫時氣煩渴者此由熱氣入於腎臓故也腎惡燥今熱氣盛則腎燥腎燥故渴而引飲也方知母散出聖惠方治時氣頭疼骨肉煩疼口燥心悶外寒内熱已自下利由有虚熱未退煩渴不止宜服知母人參去蘆頭地骨皮葛根剉甘草炙微赤剉各一兩石膏三兩􅌝􅌣根二兩右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候温服赤芍藥散出聖惠方治時氣數日不解心燥渴小腹脹急臍下悶痛宜服赤芍藥知母黄芩𤣥參麥門冬去心柴胡去苖各三分石膏二兩甘草三分炙微赤剉右為散每服四錢以水一中盞入生薑半分竹葉三七片煎至五分去滓不計時候温服柴胡散出聖惠方治時氣頭痛骨肉煩疼口燥心悶外寒内熱已自下利由有虚熱未退煩渴不止宜服柴胡一兩去苗川升麻三分黄芩三分石膏二兩麥門冬一兩去心犀角屑三分葛根三分剉甘草三分炙微赤剉右為散每服五錢以水一大盞入葱白二莖竹葉二七片煎至五分去滓不計時候温服赤茯苓散出聖惠方治時氣頭痛雖時有汗煩渴不止宜服赤茯苓二兩甘草炙微赤剉澤㵼桂心葛根剉各一兩石膏二兩右為散每服五錢以水一大盞煎至五分去滓不計時候温服猪苓散出聖惠方治時氣煩熱煩渴欲飲水小便不利猪苓去黒皮赤茯苓澤㵼阿膠搗碎炒令微黄滑石各一兩右為散每服五錢以水一大盞煎至五分去滓不計時候温服麥門冬散出聖惠方治時氣壯熱煩渴麥門冬二兩去心五味子一兩人參一兩去蘆頭石膏二兩甘草一兩炙微赤剉右為散每服三錢以水一中盞煎至六分去滓不計時候温服土𤓰根散出聖惠方治時氣大熱心胷煩渴土𤓰根半兩乾棗五枚麥門冬半兩去心甘草三分炙微赤剉䜴半合右細剉和匀每服半兩以水一大盞煎至五分去滓不計時候温服治時氣煩渴不止方出聖惠方地骨皮半兩阿膠半兩搗碎炒微黄葱白二莖并鬚右細剉和匀每服半兩以水一中盞煎至五分去滓不計時候温服治時氣煩渴身熱頭痛嘔逆不能下食宜此方出聖惠方柴胡二兩半去苗赤茯苓二兩枳殻二兩麩炒微黄去瓤甘草二兩炙微赤剉麥門冬二兩去心右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候温服升麻散出聖惠方治時氣下後煩渴不止川升麻三分知母三分甘草三分炙微赤剉石膏一兩半葛根一兩剉右為散每服五錢以水一大盞入竹葉三七片粳米一百粒煎至五分去滓不計時候温服葛根散出聖惠方治時氣煩渴飲食即吐心胷不利宜服葛根剉猪苓去黒皮赤茯苓桂心白术澤㵼􅌝􅌣各一兩右為散每服不計時候以温水調下二錢令亟飲水小便利汗出便愈又方出聖惠方黄連一兩去鬚􅌝􅌣根一兩右為末煉蜜和丸如梧桐子大每服不計時候煎大麥湯温下三十丸治時氣煩渴不止方出聖惠方葛根二兩剉葱白五莖切右以水二大盞煎至一大盞去滓内白粳米半合豉半合以生絹裹煎良乆候爛去米豉放冷不計時候温服治時氣煩渴不止方出聖惠方取生藕搗絞取汁一中盞入生蜜一合攪匀不計時候分二服芍藥湯神方治毒温病及吐下後有餘熱煩渴芍藥五分黄連四分甘草二分炙黄芩二兩桂心二兩栝樓二分右切以水五升煮取三升分三服一日令盡忌猪肉冷水海藻菘菜生葱等乾糞湯一名破棺湯解大熱天行病若大困患舌燥如鋸極渴不能服藥者宜服用陳久乾人糞一升以沸湯一大升沃糞一食久澄清瀝取一升頓服如渴不止者又依前法更服此炙從心厭骨下一寸半名巨闕取患人中指節為寸炙三十壯若無心厭骨則以中指節前量横括心上岐骨上兩頭築著骨當横量下前一寸當中直下則是巨闕也時氣鼻衂論夫時氣鼻衂者由五臓結熱所為心主於血邪熱中於手少隂之經客於足陽明之絡故衂血也衂者血從鼻中出也方石膏飲子出聖惠方治時氣鼻衂煩躁不止頭痛氣逆石膏搗碎竹茹各二兩甘草炙微赤剉桂心各半兩赤芍藥柴胡去苖黄芩各一兩生地黄三兩右剉碎和匀每服半兩先以水一大盞半浸伏龍肝二兩澄清一大盞煎至五分去滓不計時候温服治時氣心肺中熱鼻衂不止出聖惠方