body:
  text: 普濟方卷十七明周王朱橚撰心臟門心煩熱論夫心煩熱之病手少隂經有餘所致也其不足則亦能令人虛煩大抵心屬火而惡熱其受病則易心生熱熱則血氣壅滯故為煩躁寢卧不得安寧口舌生瘡頭痛頰赤之類虛則熱氣內攻心神不寧亦為煩躁也方黃苓湯治心熱恍惚煩躁面赤小便澀黃芩去黑心貝母去心升麻麥門冬去心焙玄參紫苑去苗土柴胡去苗桔梗去蘆頭炒牡丹去心木香胡黃連等分右搗篩每服三錢水一盞煎七分去滓溫服不拘時鐵粉丸治心虛煩熱怔忪頭目昏眩夜卧不寧鐵粉二兩蛇蛻五尺炒焦黃連去鬚澤㵼犀角鎊各三錢龍齒逺志去心各半兩麥門冬去心焙白茯苓去黑皮人參各一兩半右為末錬蜜和丸梧桐子大每服二十丸熟水下日三服烏犀湯治心臟煩熱睡即多驚心忪不欲見人犀角鎊八錢龍齒升麻各一兩麥門冬去心焙二兩茯神去木一兩半玄參一兩甜瓜根銼焙三兩赤芍藥一兩半右搗篩每服三錢水一盞入馬牙硝半錢生地黃五七寸拍碎同煎至七分去滓溫服涼心丸治心熱煩躁紫河車三錢蜜汁人參白茯苓去黑皮各半兩逺志去心一錢麥門冬去心焙半兩丹砂别研一兩龍腦别研半錢金箔二十片與丹砂龍腦同研右除别研外搗羅為末再同研勻錬蜜和丸如雞頭大每服一丸人參湯下逺志湯治心虛多煩躁背膊妨悶面色變赤言語謬亂逺志去心一兩白茯苓去黑皮三分犀角鎊一兩半知母半兩芍藥一兩黃苓去黑皮前胡去蘆頭各三分右搗篩每服三錢水一盞入生麥門冬汁半合煎至八分去滓不拘時溫服麥門冬湯治心煩躁口乾舌澀麥門冬去心焙二兩龍齒半兩玄參洗切梔子仁茅根各一兩木通二兩銼赤芍藥一兩右搗篩每服三錢水一盞煎八分去滓不拘時溫服黃耆湯治虛煩黃耆銼麥門冬去心焙栝蔞根銼各一兩茯神去木熟乾地黃洗切焙四兩右搗篩每服五錢水一盞半煎一盞去滓不拘時溫服瞿麥湯治心熱煩躁小便赤澀瞿麥穗麥門冬去心焙木通銼各一兩黃蓮去鬚甘草炙銼各半兩右搗篩每服三錢水一盞入竹葉十片同煎至七分去滓不拘時溫服黑豆湯治心膈虛煩躁渴至甚黑豆小者一升防風去乂二兩甘草炙銼麥門冬去心各一兩右除黑豆外並細銼用水七升煎取五升不拘時溫服從早至夜勻分作四服如渴不至甚者止用半劑地黃散治心經積熱煩鬱生地黃汁三升蛤粉一斤鬱金銼二兩甘草炙銼三兩右將地黃汁拌和下三味令勻曝乾搗羅為散每服一錢用新汲水調下日三服食後臨卧地骨皮湯治心煩熱咽乾舌澀面赤潮熱地骨皮防風去蘆各一兩甘草銼炙半兩右搗篩每服三錢水一盞入竹葉五七片同煎至七分去滓不拘時溫服㵼心散出千金方治心受積熱譫言發狂逾墻上屋心氣不定吐血衄血大黃黃芩黃連各五錢右銼散每服四錢水一盞半煎服鎮心丹出家藏經驗方治心氣不足病苦驚悸不知人及膽寒不卧自汗心煩悶短氣喜怒悲憂悉不自知亡魂失魄狀若神靈所憑及治男子遺泄女子帶下光明辰砂研白礬煆汁盡各等分右為末水丸如雞頭大每服一丸煎人參湯下食後服治大熱心悶者用槐子燒末酒服方七七理心煩悶益氣力止渴用苦笋熱煮任性食之治心疸煩心中熱取茜根煮之任服治心煩去熱取香薷煎湯作羮煮粥及生食並得治熱攻心煩躁恍惚以牛蒡根搗汁一升食後分為三服良治解勞發汗通利關節以薄荷與薤杵汁服去心臟風熱安神丸出蘭室方一名硃砂丸治心煩懊憹心神顛倒兀兀吐食胸中氣亂而熱皆鬲上血中伏火蒸蒸不安冝用權衡法以鎮隂火之浮行兼以飬上焦之元氣用甘草之甘溫補之為長生隂血之勝藥也以補其不足以黃連去心煩除溫熱之勝藥也以硃砂納浮遊之火而安神明也方見本門心虛類金花散出王氏博濟方治心腹壅熱薰蒸上焦致口氣生瘡連年不差黃連半兩炒令稍焦赤如年少即加少許人參半兩枳殼半兩去白麩炒微黃甘草半兩炙微赤半夏半兩以薑汁拍破浸一宿漉出焙乾右為末每服一錢入生薑三片煎六分食後臨卧時溫服火鬱湯出東垣蘭室方治五心煩熱是火鬱於地中四肢者土也心火下陷在脾土之中升麻根葛根柴胡根白芍藥等分右同㕮咀每服三錢或四錢水二盞入連鬚䓤白三寸煎一盞去滓稍熱服治心臟積熱口臭喉中氣壅精神恍惚心中煩躁面赤非時潮熱喫些醎物即惡心思吐少力小便赤澀大便祕熱楊子建萬全護命方黃芩貝母去心升麻玄參麻黃去根麥門冬去心紫苑柴胡去毛桔梗牡丹皮木香各一分胡黃連三銖右搗羅為細末每服二錢水一盞煎取八分食後去滓溫服柴胡升麻湯出試效方治男子婦人四肢發困熱筋骨熱表熱如火燎於肌膚捫之令人手熱夫四肢者屬脾脾者土也熱伏地中此病多因血虛而得之也又有胃虛過食冷物鬱遏陽氣於脾土之中並宜服之羌活升麻葛根白芍藥人參獨活各半兩柴胡三錢甘草炙三錢防風二錢半生甘草二錢右件㕮咀如麻豆大每服五錢水三盞煎至一盞去滓溫服忌寒冷之物火鬱湯出試效方治五心煩熱是火鬱於地中四肢者脾土也心火下陷於脾土之中鬱而不得伸故經云火鬱則發之是也升麻葛根柴胡白芍藥甘草炙各一兩防風半兩右件㕮咀如麻豆大每服三錢或四錢水二盞入連鬚䓤白三寸煎至一盞去滓稍熱服之無時人參散出經驗方生心胃氣散滯鬱新羅人參沉香白茯苓各半兩大麥蘖丁香各一錢右為末每服二錢水一中盞薑二片煎至六分去薑和滓服空心食前大妙地黃散出衛生寶鑑治心臟積熱口乾煩渴頰赤口澀生津液兼治汗後餘熱防風一兩地骨皮一兩甘草半兩人參半兩右為末每服三錢水一盞入青蒿五七葉同煎至七分去滓溫服如無青蒿用竹葉五七葉涼補圓出衛生家寶方治心經積熱思慮過多一切漏精白濁等病久則飲食減少轉成勞傷此藥上涼心膈下補元陽肉蓯蓉薄切用酒浸一日宿火焙澤㵼切焙乾石菖蒲兔絲子酒浸一宿研爛焙乾黃耆火炙細銼為末川練子細銼山茱莄已上七味各半兩熟乾地黃一兩淨洗焙乾為末右為細末煉蜜丸如梧桐子大每服三十丸食前空心鹽酒湯送下如五淋疾用豆淋酒服鐵粉丸出指南方治凡熱則脈洪數由脾氣上鬱心經鐵粉二兩辰砂一兩牛黃天竺黃鉛白霜半兩天南星一兩右為細末薑煮麵糊為丸如梧桐子大每服五丸薑湯下療煩悶本草以白术末水調七匕止心煩躁悶本草以籃汁服之一方塗五心主心悶煩熱本草治頭旋目眩心中漾漾欲吐卒失音及小兒心熱驚癎止消渴除痰令人不睡取荆莖條截於火上燒之兩頭以器承取瀝汁飲之治心脾熱舌頰生瘡方本草用蘖皮以蜜勻炙與青黛各一分入生龍腦一匙研勻當糝瘡上有涎即吐解煩悶本草以白梁粟經三五年陳者或呼為粢米作粉食之治心腹煩悶本草以乾苔用冷水研如泥飲之即止主大毒熱心腹煩滿本草以梧桐淚水和服之止煩悶本草用冷冬瓜搗絞汁服之通利五臟本草用芥子微熬研之作醬食治胸中煩悶邪氣止渴本草以蟶煮食之於飯後食之佳與服丹石人相宜天行病後不可食切忌治散支節筋骨煩熱毒及消脹腫本草取牛蒡子三七粒熟挼食前吞之十服後甚良細切根如小豆大拌麵作飯煮食尤良治熱攻心煩躁恍惚用黑豆味甘平半升淨淘以水二升煮取七合去滓食後服之心胸煩熱附論夫心氣盛實氣血壅澀隂陽不通榮衛隔塞上焦壅滯故令心胸煩熱也方羚羊角散出聖惠方治心胸煩熱渴逆頭痛羚羊角屑柴胡去苗赤茯苓各一兩葛根銼赤芍藥甘草炙微赤銼梔子仁各半兩石膏二兩麥門冬三錢去心黃芩半兩右為散每服三錢以水一盞入竹葉七片豉三十粒煎至六分去滓不計時溫服麥門冬散出聖惠方治心胸煩熱眠卧不安或大小腸不利口舌生瘡麥門冬去心黃芩各三兩枳殼麩炒微黃去瓤大青黃連去鬚犀角屑川升麻小草甘草炙微赤銼各半兩川芒硝一兩右為散每服三錢水一中盞煎至六分去滓食後溫服真珠散出聖惠方治心胸煩熱口舌乾燥心神不利真珠粉琥珀末寒水石天竺黃馬牙硝鐵粉硃砂甘草末生用半分􅌝􅌣末一分右同研令細每服半錢不計時候竹葉湯放溫調下人參散出聖惠方治心胸煩熱不思飲食人參去蘆頭沙參去蘆頭赤茯苓黃耆銼地骨皮麥門冬去心柴胡去蘆頭羚羊角屑各一兩甘草半兩炙微赤銼右為散每服三錢水一中盞煎至六分去滓不拘時溫服地骨皮散出聖惠方治心胸中久積煩熱口乾頰赤地骨皮葳蕤玄參黃耆銼子芩麥門冬去心川升麻各一兩甘草半兩炙微赤銼右為散每服三錢水一中盞入竹葉七片煎至五分去滓入生地黃汁蜜各半合更煎一兩沸不計時溫服含化玉液丸出聖惠方治心胸煩熱口乾舌澀心神壅悶寒水石研石膏研如粉葛根􅌝􅌣根赤茯苓各一兩烏梅肉半兩炒麥門冬一兩半去心焙龍腦一錢研入右為末入研了藥令勻錬蜜為丸如彈子大每服一丸薄綿裹含化咽津黃芩散出聖惠方治心胸煩熱頭疼目澀煩渴不止黃芩赤茯苓麥門冬去心各一兩石膏二兩甘草炙微赤銼葛根銼甘菊花各半兩右為散每服三錢水一中盞入豉二七粒淡竹葉二七片煎至五分去滓入生地黃汁一合更煎一兩沸不拘時溫服甘露散治心胸煩熱不得安定甘草不灰木各半斤右藥須是臘月內預辦修合取雪水浸過隂乾又投入水中如此三二十度後隂冷極乾搗細為末散每服不計時以新汲水調下一錢除胸膈熱痰用三白草搗絞汁服令人吐逆治胸中痞塞熱結者可多食好生梨即通止心中酸水以楂子食之去心胸煩熱熱風恍惚明目鎮心溫補久服好顔色變白去風不忘用大豆食罷生服半掬治服藥失度心中苦煩取生葛根汁飲之大良無生者搗乾葛末水服五合亦可煮服之利肢節去五臟中煩悶氣以蟹用醋食之八月後食之佳治胸中煩熱或渴心躁用葛粉四兩先以水浸粟米半升經宿漉出與葛粉相拌令勻煮熱食之除胸中實熱氣以鳬茨作粉食之解肌下膈去胸中煩以茵蔯蒿研作飲服之心臟風熱附論夫心屬火主於血血實則生熱風邪摶於陽經傷於血脈榮氣不行心臟壅滯之氣稽留不散則令心胸煩亂語錯多驚故名風熱也方龍齒散出聖惠方治心臟風熱心神恍惚煩躁多驚不得睡卧龍齒細研甘草炙微赤銼甘菊花各半兩硃砂細研如粉犀角屑防風去蘆頭羌活細辛荆芥枳殼麵炒微赤天竺黃細研茯神沙參去蘆頭天麻川升麻子芩麥門冬去心焙羚羊角屑各一兩牛黃研入龍腦各一分細研右為細散入研了藥令勻每服食後煎竹葉湯調下一錢硃砂丸出聖惠方治心臟風熱多驚恍惚煩躁語澀硃砂細研水飛過龍腦細研天竺黃細研馬牙硝犀角屑人參去蘆頭茯神川升麻羚羊角屑天麻麥門冬去心焙獨活甘菊花子芩各一兩牛黃細研麝香細研各一錢虎睛三對酒浸一宿微黃甘草半兩炙微赤銼金銀箔各一百片細研右為末入研了藥令勻錬蜜和搗二三百杵丸如梧桐子大每服不計時以荆芥湯嚼下十丸犀角散出聖惠方治心臟久積風熱臟腑壅滯口乾舌縮神思不安犀角屑硃砂細研如粉防風去蘆頭細辛天竺黃細研茯神龍腦細研各一錢川大黃銼研微炒羌活麥門冬去心焙赤芍藥白殭蠶微炒檳榔各一兩羚羊角屑甘草炙微赤銼梔子仁子芩各半兩麝香一分細研右為細末散入研了藥令勻每服不計時煎竹葉湯調下一錢鐵粉散出聖惠方治心臟風熱頭疼面赤心煩多驚恐精神錯亂鐵粉細研龍腦細研琥珀細研如粉犀角屑赤