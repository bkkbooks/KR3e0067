body:
  text: 普濟方卷十七明周王朱橚撰心臓門心煩熱論夫心煩熱之病手少隂經有餘所致也其不足則亦能令人虚煩大抵心属火而惡熱其受病則易心生熱熱則血氣壅滯故為煩躁寢卧不得安寧口舌生瘡頭痛頰赤之類虛則熱氣内攻心神不寧亦為煩躁也方黄苓湯治心熱恍惚煩躁面赤小便澁黄芩去黒心貝母去心升麻麥門冬去心焙𤣥參紫苑去苗土柴胡去苗桔梗去蘆頭炒牡丹去心木香胡黄連等分右𢷬篩每服三錢水一盞煎七分去滓温服不拘時鉄粉丸治心虚煩熱怔忪頭目昏眩夜卧不寧鉄粉二兩蛇蛻五尺炒焦黄連去鬚澤㵼犀角鎊各三錢龍齒逺志去心各半兩麥門冬去心焙白茯苓去黒皮人參各一兩半右為末錬蜜和丸梧桐子大每服二十丸熟水下日三服烏犀湯治心臓煩熱睡即多驚心忪不欲見人犀角鎊八錢龍齒升麻各一兩麥門冬去心焙二兩茯神去木一兩半𤣥參一兩甜𤓰根剉焙三兩赤芍藥一兩半右𢷬篩每服三錢水一盞入馬牙硝半錢生地黄五七寸拍碎同煎至七分去滓温服凉心丸治心熱煩躁紫河車三錢蜜汁人參白茯苓去黒皮各半兩逺志去心一錢麥門冬去心焙半兩丹砂别研一兩龍腦别研半錢金箔二十片與丹砂龍腦同研右除别研外𢷬羅為末再同研勻錬蜜和丸如雞頭大每服一丸人參湯下逺志湯治心虚多煩躁背膊妨悶面色變赤言語謬亂逺志去心一兩白茯苓去黒皮三分犀角鎊一兩半知母半兩芍藥一兩黄苓去黒皮前胡去蘆頭各三分右𢷬篩每服三錢水一盞入生麥門冬汁半合煎至八分去滓不拘時温服麥門冬湯治心煩躁口乾舌澁麥門冬去心焙二兩龍齒半兩𤣥參洗切梔子仁茅根各一兩木通二兩剉赤芍藥一兩右𢷬篩毎服三錢水一盞煎八分去滓不拘時温服黄耆湯治虚煩黄耆剉麥門冬去心焙栝蔞根剉各一兩茯神去木熟乾地黄洗切焙四兩右𢷬篩每服五錢水一盞半煎一盞去滓不拘時温服瞿麥湯治心熱煩躁小便赤澁瞿麥穗麥門冬去心焙木通剉各一兩黄蓮去鬚甘草炙剉各半兩右𢷬篩每服三錢水一盞入竹葉十片同煎至七分去滓不拘時温服黒豆湯治心膈虚煩躁渇至甚黒豆小者一升防風去乂二兩甘草炙剉麥門冬去心各一兩右除黒豆外並細剉用水七升煎取五升不拘時温服從早至夜勻分作四服如渇不至甚者止用半劑地黄散治心經積熱煩欝生地黄汁三升蛤粉一斤欝金剉二兩甘草炙剉三兩右将地黄汁拌和下三味令勻曝乾𢷬羅為散每服一錢用新汲水調下日三服食後臨卧地骨皮湯治心煩熱咽乾舌澁面赤潮熱地骨皮防風去蘆各一兩甘草剉炙半兩右𢷬篩每服三錢水一盞入竹葉五七片同煎至七分去滓不拘時温服㵼心散出千金方治心受積熱譫言發狂逾墻上屋心氣不定吐血衂血大黄黄芩黄連各五錢右剉散毎服四錢水一盞半煎服鎮心丹出家藏經驗方治心氣不足病苦驚悸不知人及膽寒不卧自汗心煩悶短氣喜怒悲憂悉不自知亡魂失魄状若神靈所憑及治男子遺泄女子帶下光明辰砂研白礬煆汁盡各等分右為末水丸如雞頭大每服一丸煎人參湯下食後服治大熱心悶者用槐子燒末酒服方七七理心煩悶益氣力止渇用苦笋熱煮任性食之治心癉煩心中熱取茜根煑之任服治心煩去熱取香薷煎湯作羮煮粥及生食並得治熱攻心煩躁恍惚以牛蒡根搗汁一升食後分為三服良治觧勞發汗通利闗節以薄荷與薤杵汁服去心臓風熱安神丸出蘭室方一名硃砂丸治心煩懊憹心神顛倒兀兀吐食胷中氣亂而熱皆鬲上血中伏火蒸蒸不安冝用權衡法以鎮隂火之浮行兼以飬上焦之元氣用甘草之甘温補之為長生隂血之勝藥也以補其不足以黄連去心煩除温熱之勝藥也以硃砂納浮游之火而安神明也方見本門心虚類金花散出王氏博濟方治心腹壅熱薫蒸上焦致口氣生瘡連年不差黄連半兩炒令稍焦赤如年少即加少許人參半兩枳殻半兩去白麩炒㣲黄甘草半兩炙㣲赤半夏半兩以薑汁拍破浸一宿漉出焙乾右為末毎服一錢入生薑三片煎六分食後臨卧時温服火欝湯出東垣蘭室方治五心煩熱是火欝於地中四肢者土也心火下䧟在脾土之中升麻根葛根柴胡根白芍藥等分右同㕮咀毎服三錢或四錢水二盞入連鬚䓤白三寸煎一盞去滓稍熱服治心臓積熱口臭喉中氣壅精神恍惚心中煩躁面赤非時潮熱喫些醎物即惡心思吐少力小便赤澁大便秘熱楊子建萬全護命方黄芩貝母去心升麻𤣥參麻黄去根麥門冬去心紫苑柴胡去毛桔梗牡丹皮木香各一分胡黄連三銖右搗羅為細末每服二錢水一盞煎取八分食後去滓温服柴胡升麻湯出試效方治男子婦人四肢發困熱筋骨熱表熱如火燎於肌膚捫之令人手熱夫四肢者屬脾脾者土也熱伏地中此病多因血虚而得之也又有胃虚過食冷物欝遏陽氣於脾土之中並宜服之羗活升麻葛根白芍藥人參獨活各半兩柴胡三錢甘草炙三錢防風二錢半生甘草二錢右件㕮咀如麻豆大毎服五錢水三盞煎至一盞去滓温服忌寒冷之物火欝湯出試效方治五心煩熱是火欝於地中四肢者脾土也心火下䧟於脾土之中欝而不得伸故經云火欝則發之是也升麻葛根柴胡白芍藥甘草炙各一兩防風半兩右件㕮咀如麻豆大每服三錢或四錢水二盞入連鬚䓤白三寸煎至一盞去滓稍熱服之無時人參散出經驗方生心胃氣散滯欝新羅人參沉香白茯苓各半兩大麥蘖丁香各一錢右為末每服二錢水一中盞薑二片煎至六分去薑和滓服空心食前大妙地黄散出衛生寶鑑治心臓積熱口乾煩渇頰赤口澁生津液兼治汗後餘熱防風一兩地骨皮一兩甘草半兩人參半兩右為末每服三錢水一盞入青蒿五七葉同煎至七分去滓温服如無青蒿用竹葉五七葉凉補圓出衛生家寳方治心經積熱思慮過多一切漏精白濁等病乆則飲食减少轉成勞傷此藥上凉心膈下補元陽肉蓯蓉薄切用酒浸一日宿火焙澤㵼切焙乾石菖蒲兎絲子酒浸一宿研爛焙乾黄耆火炙細剉為末川練子細剉山茱莄已上七味各半兩熟乾地黄一兩净洗焙乾為末右為細末煉蜜丸如梧桐子大每服三十丸食前空心鹽酒湯送下如五淋疾用豆淋酒服鉄粉丸出指南方治凡熱則脉洪數由脾氣上欝心經鉄粉二兩辰砂一兩牛黄天竺黄鉛白霜半兩天南星一兩右為細末薑煮麺糊為丸如梧桐子大每服五丸薑湯下療煩悶本草以白术末水調七匕止心煩躁悶本草以籃汁服之一方塗五心主心悶煩熱本草治頭旋目眩心中瀁瀁欲吐卒失音及小兒心熱驚癎止消渇除痰令人不睡取荆莖條截於火上燒之兩頭以器承取瀝汁飲之治心脾熱舌頰生瘡方本草用蘖皮以蜜勻炙與青黛各一分入生龍腦一匙研勻當糝瘡上有涎即吐觧煩悶本草以白梁粟經三五年陳者或呼為粢米作粉食之治心腹煩悶本草以乾苔用冷水研如泥飲之即止主大毒熱心腹煩滿本草以梧桐淚水和服之止煩悶本草用冷冬𤓰𢷬絞汁服之通利五臓本草用芥子㣲熬研之作醤食治胷中煩悶邪氣止渇本草以蟶煮食之於飯後食之佳與服丹石人相宜天行病後不可食切忌治散支節筋骨煩熱毒及消脹腫本草取牛蒡子三七粒熟挼食前吞之十服後甚良細切根如小豆大拌麵作飯煮食尤良治熱攻心煩躁恍惚用黒豆味甘平半升净淘以水二升煮取七合去滓食後服之心胷煩熱附論夫心氣盛實氣血壅澁隂陽不通榮衛隔塞上焦壅滯故令心胷煩熱也方羚羊角散出聖惠方治心胷煩熱渇逆頭痛羚羊角屑柴胡去苗赤茯苓各一兩葛根剉赤芍藥甘草炙㣲赤剉梔子仁各半兩石膏二兩麥門冬三錢去心黄芩半兩右為散每服三錢以水一盞入竹葉七片豉三十粒煎至六分去滓不計時温服麥門冬散出聖惠方治心胷煩熱眠卧不安或大小腸不利口舌生瘡麥門冬去心黄芩各三兩枳殻麩炒㣲黄去瓤大青黄連去鬚犀角屑川升麻小草甘草炙㣲赤剉各半兩川芒硝一兩右為散毎服三錢水一中盞煎至六分去滓食後温服眞珠散出聖惠方治心胸煩熱口舌乾燥心神不利眞珠粉琥珀末寒水石天竺黄馬牙硝鐵粉硃砂甘草末生用半分􅌝􅌣末一分右同研令細每服半錢不計時候竹葉湯放温調下人參散出聖惠方治心胷煩熱不思飲食人參去蘆頭沙參去蘆頭赤茯苓黄耆剉地骨皮麥門冬去心柴胡去蘆頭羚羊角屑各一兩甘草半兩炙㣲赤剉右為散毎服三錢水一中盞煎至六分去滓不拘時温服地骨皮散出聖惠方治心胸中乆積煩熱口乾頰赤地骨皮葳蕤𤣥參黄耆剉子芩麥門冬去心川升麻各一兩甘草半兩炙㣲赤剉右為散每服三錢水一中盞入竹葉七片煎至五分去滓入生地黄汁蜜各半合更煎一兩沸不計時温服含化玉液丸出聖惠方治心胸煩熱口乾舌澁心神壅悶寒水石研石膏研如粉葛根􅌝􅌣根赤茯苓各一兩烏梅肉半兩炒麥門冬一兩半去心焙龍腦一錢研入右為末入研了藥令勻錬蜜為丸如彈子大毎服一丸薄綿裹含化嚥津黄芩散出聖惠方治心胷煩熱頭疼目澁煩渇不止黄芩赤茯苓麥門冬去心各一兩石膏二兩甘草炙㣲赤剉葛根剉甘菊花各半兩右為散每服三錢水一中盞入豉二七粒淡竹葉二七片煎至五分去滓入生地黄汁一合更煎一兩沸不拘時温服甘露散治心胸煩熱不得安定甘草不灰木各半斤右藥湏是臘月内預辦修合取雪水浸過隂乾又投入水中如此三二十度後隂冷極乾𢷬細為末散每服不計時以新汲水調下一錢除胸膈熱痰用三白草𢷬絞汁服令人吐逆治胷中痞塞熱結者可多食好生梨即通止心中酸水以楂子食之去心胸煩熱熱風恍惚明目鎮心温補乆服好顔色變白去風不忘用大豆食罷生服半掬治服藥失度心中苦煩取生葛根汁飲之大良無生者搗乾葛末水服五合亦可煮服之利胑節去五臓中煩悶氣以蟹用醋食之八月後食之佳治胷中煩熱或渇心躁用葛粉四兩先以水浸粟米半升經宿漉出與葛粉相拌令勻煮熱食之除胸中實熱氣以鳬茨作粉食之觧肌下膈去胷中煩以茵蔯蒿研作飲服之心臓風熱附論夫心属火主於血血實則生熱風邪摶於陽經傷於血脉榮氣不行心臓壅滯之氣稽留不散則令心胷煩亂語錯多驚故名風熱也方龍齒散出聖惠方治心臓風熱心神恍惚煩躁多驚不得睡卧龍齒細研甘草炙㣲赤剉甘菊花各半兩硃砂細研如粉犀角屑防風去蘆頭羌活細辛荆芥枳殻麵炒㣲赤天竺黄細研茯神沙參去蘆頭天麻川升麻子芩麥門冬去心焙羚羊角屑各一兩牛黄研入龍腦各一分細研右為細散入研了藥令勻每服食後煎竹葉湯調下一錢硃砂丸出聖惠方治心臓風熱多驚恍惚煩躁語澁硃砂細研水飛過龍腦細研天竺黄細研馬牙硝犀角屑人參去蘆頭茯神川升麻羚羊角屑天麻麥門冬去心焙獨活甘菊花子芩各一兩牛黄細研麝香細研各一錢虎睛三對酒浸一宿㣲黄甘草半兩炙㣲赤剉金銀箔各一百片細研右為末入研了藥令勻錬蜜和𢷬二三百杵丸如梧桐子大毎服不計時以荆芥湯嚼下十丸犀角散出聖惠方治心臓乆積風熱臓腑壅滯口乾舌縮神思不安犀角屑硃砂細研如粉防風去蘆頭細辛天竺黄細研茯神龍腦細研各一錢川大黄剉研㣲炒羗活麥門冬去心焙赤芍藥白殭蠶㣲炒㯽榔各一兩羚羊角屑甘草炙㣲赤剉梔子仁子芩各半兩麝香一分細研右為細末散入研了藥令勻毎服不計時煎竹葉湯調下一錢鐵粉散出聖惠方治心臓風熱頭疼面赤心煩多驚恐精神錯亂鐵粉細研龍腦細研琥珀細研如粉犀角屑赤