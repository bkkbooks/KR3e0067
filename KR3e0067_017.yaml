治下篩食後或酒或水服方寸七三十日力倍六十日氣力強意足歸脾湯出醫方大成治思慮過制勞傷心脾健忘怔忡白术茯神去木黃茋去蘆龍眼肉酸棗仁炒去殼各一兩人參木香不見火各半兩甘草炙二錢半右㕮咀每服四錢水一盞半生薑五片棗二枚煎七分去滓溫服不拘時人參湯治善忘小便赤黃多夢亡人或夢居水中驚恐惕惕目視􅑩􅑩不欲聞人聲逺不知味安神定志人參甘草炙各二兩半夏湯洗去滑七遍三兩龍骨炙逺志去心各六兩麥門冬去心石膏熟乾地黃各四兩右搗篩每服五錢水一盞半大棗二枚擘破小麥五十粒煎八分去滓炙阿膠一片飴糖半匙再煎少頃食後溫服日三桂心湯出千金方治驚勞失志健忘桂去粗皮白龍骨炙防風去乂逺志去心麥門冬去心牡蠣燒研甘草炙各一兩茯神去木五兩右銼如麻豆每服五錢水一盞半入大棗二枚擘破煎八分去滓空心溫服日三逺志散出聖惠方補心定志益智明目逺志去心人參去蘆頭菖蒲熟乾地黃各一兩白茯苓決明子薯蕷各三錢桂心半兩右為細散食前以溫粥飲調下一錢養命開心益智方出千金方乾地黃人參茯苓各二兩蓯蓉兔絲子逺志各三兩蛇床子二分右藥治下篩服方寸匕日二忌兔肉餘無忌加味茯苓湯出意氏方治痰迷心胞健忘失事言語如癡人參去蘆半夏湯洗陳皮去白各一兩半白茯苓去皮一兩粉草五錢益智去殼香附子炒去毛各一兩右銼散每服四錢水一盞半薑三片烏梅半個同煎不拘時服七聖丸治健忘益心令人聰明白茯苓去黑皮二兩桂去粗皮逺志去心人參天門冬去心焙菖蒲地骨皮各一兩右為末錬蜜丸如桐子食後茶酒下三十丸小定志丸出永類鈐方治心氣不定五臟不足甚者憂憂愁愁不樂忽忽喜忘朝差暮劇暮差朝發及因事有所大驚夢寐不祥登髙涉險致神魂不安驚悸恐怯常服益心定志令人不忘菖蒲炒逺志去心薑汁淹各三兩茯苓茯神人參辰砂為衣右為末蜜丸如桐子大每服五十丸米湯下一方去茯神名開心散飲服二錢七不以時人參煮散出楊子建護命方治久懷憂戚氣滯血澀失志健忘人參逺志去心桑寄生各半兩牡丹皮一錢木香一錢半沉香二錢右為散每服二錢水一盞煎八分溫服不拘時治多忘令人不忘方出千金方菖蒲二分茯神茯苓人參各五分逺志七分右為散酒服方寸七日三夜一五日後知神良開心散無茯神又方千金方蓯蓉續斷各一分逺志菖蒲茯苓各三分右為散酒服方寸七日三至老不忘逺志散治心熱健忘補心氣強力益志逺志去心黃連去鬚各八兩菖蒲三兩白茯苓去黑皮二兩半人參一兩半右為散食後酒調方寸七日二夜一山芋丸治心臟氣虛恐怖驚悸恍惚健忘煩悶羸瘦山芋熟乾地黃焙黃耆銼各一兩菖蒲半兩逺志去心一兩半右為末錬蜜和丸如梧桐子大每服二十丸溫酒或米飲不拘時候服龜甲散千金方治善忘開心智強力益志龜甲炙龍骨一方用木通不用龍骨逺志菖蒲各半兩右為散酒服方寸七日三常服令人大聰一方食後水服治健忘方千金方天門冬逺志茯苓乾地黃各等分右為末蜜丸如梧桐子大酒服二十丸日三加至三十丸常服勿絶茯神散出聖惠方補心虛治健忘久服聰眀益智茯神龍骨各三兩人參去蘆頭二兩熟乾地黃一兩菖蒲三兩逺志去心半兩麥門冬去心一兩右為散每服三錢水一中盞棗三枚煎六分去滓食前溫服豫知散出千金方治好忘久服聰明益智治神思虛弱健忘龍骨白者虎骨酥炙逺志肉各等分右為散食後服方寸七日二一方酒服方寸七一方生薑湯下又方出千金方以七月七日用麻勃一升人參二兩為末蒸令氣遍臨卧一刀圭盡知四方之事一方以溫粥飲調下一錢治人心昏塞多忘喜誤出肘後方取商陸花隂乾百日搗末日暮水服方寸匕卧思念所欲事即於眼中自覺商陸花亦名樟栁花治好忘久服聰明益智出聖惠方常以五月五日取東向桃枝日未出時作三寸木人著衣帶中令人不忘矣一方戊子日取東邊桃枝二七枝縛著卧床中枕之不忘治人心昏塞多忘喜誤方出千金方以七月七日取蜘蛛網著衣領中勿令人知不忘治人心昏悶多忘喜誤出肘後方以丙午日取鱉甲著衣帶上良一用五月五日治人心昏塞多忘善誤出千金方以丁酉日密自至市買逺志著巾角中還為末服之勿令人知一方著衣裳帶令人不忘抱朴子云陵陽仲子服逺志二十年開書所視便記而不忘治好忘久服聰明益智出千金方以七月七日取菖蒲酒服三方寸七飲酒不醉好事者服而驗之不可犯鐵若犯之令人吐逆一方常以甲子日取石上菖蒲一寸九節者隂乾百日治下篩服方寸七日三耳目聰明不忘療人心孔惛塞多忘善誤出聖惠方取牛馬豬雞心乾為末向日酒服方寸七日三聞一知十養生方男子勿北首神昏不安多愁忘瓊方既濟丸出衛生家寶方治為事健忘神志不安夢寐驚悸不思飲食腎水無所滋飬腰重腳弱行履少力精神恍惚小便頻數常服益心氣補丹田婦人常服有子白茯苓破故紙各一斤右為細末酒糊為丸如梧桐子大空心食前溫米酒飲下四十丸排風湯出聖惠方治健忘茯苓茯神酸棗仁人參黃耆當歸白芍藥逺志各半兩甘草二錢蓮肉半兩右薑棗煎服琥珀丸出楊氏家藏方安神飬志寧睡固精血恱澤顔色滋益榮衛人參去蘆頭一斤切碎水二升銀鍋內熬去水一升濾過取人參汁再熬成膏和衆藥服之附子一枚重八錢煮去皮臍逺志湯浸去心沉香龍骨飛過琥珀别研上五味各一兩巴戟湯浸去心防風去蘆頭半夏麯蓮子心紫石英研細飛過白茯苓去皮石菖蒲茯神去木熟乾地黃燒焙柏子仁乳香别研麥門冬去心牡蠣火煆取粉辰砂研細飛過酸棗仁炒已上十五味各半兩安息香酒煮去滓熬成膏右件為細末次入辰砂乳香琥珀安息香膏子人參膏子和丸如梧桐子大每服五十丸日午及臨卧溫熟水送下定志丸出楊氏家藏方治怔忪健忘精神恍惚睡卧不寧一切心疾人參去蘆頭白茯苓去皮石菖蒲逺志去心龍腦酸棗仁鐵粉别研硃砂飛過麥門冬去心焙乾乳香麝香琥珀别研右件各等分為末入硃砂鐵粉同研勻絞生地黃汁浸蒸餅為丸如梧桐子大别用硃砂為衣每服二十丸溫熟水下養心丸出楊氏家藏方治憂慮太過健忘怔忪睡多恐惕夢陟險危自汗不止五心煩熱目澀昏暗夢寐失精口苦舌乾日漸羸瘦全不思食茯神去木人參去蘆頭綿黃耆酸棗仁去皮稱别研成膏已上四味各一兩熟乾地黃焙乾逺志去心五味子柏子仁别研成膏已上四味各半兩硃砂三錢研細水飛右件為細末入二膏和勻研細煉蜜為丸如梧桐子大每服五十丸食後卧時濃煎人參湯送下逺志丸出楊氏家藏方治憂愁思慮過多苦勞心神恍惚健忘睡卧不寧逺志去心石菖蒲茯苓去木已上三味各一兩天竺黃酸棗仁炒已上二味各半兩硃砂别研三錢犀角屑龍腦燒研已上二味各一錢右件除别研外並為細末煉蜜丸如梧桐子大每服三十丸溫熟水送下食後臨卧服真珠丸出楊氏家藏方治心氣不足上焦壅熱涎壅上盛睡卧不寧身體發熱口躁咽乾真珠末白术硃砂别研一半入藥一半為衣三味各半兩白茯苓去皮半兩人參去蘆頭一兩麝香别研腦子别研二味各一錢右件為末用豬心血為丸如梧桐子大硃砂為衣每服三十丸煎人參湯送下食後服主鎮安魂魄珠蜜方出本草煉真珠如大豆以蜜一蜆殼和一服與一豆許日三大宜小兒安魂定神令人聰明出本草採桑椹暴乾和蜜食之普濟方卷十七
