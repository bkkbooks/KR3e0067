之治熱病及時疾心躁狂亂奔走狀似癎言語不定久不得汗及不知人事右用人中黄不拘多少入大罐内以泥固濟大火煅半日去火候冷取出于地上以盆葢之又半日許細研如麪新汲水調下三錢或未退間作差人中黄者硬糞也治狂病經乆不差或歌或笑行走不休發動無時用出本草以猳猪肉一斤煑令熱令以細研作膾和醬醋食之或羔粥炒任性服之解熱病不知人事欲死者用蚯蚓不拘多少先杵爛以水泡濾過灌服半椀立効熱病嘔逆論夫熱病胃中有熱則榖氣不和新榖入與熱氣相摶胃氣不平故致嘔逆或吐下已後臟氣虚弱亦令嘔逆也方前胡飲子出聖恵方治熱病惡寒壯熱食則嘔逆宜服前胡去蘆頭麥門冬去心竹茹生地黄葛根各二兩陳橘皮湯浸去白瓤焙甘艸炙微赤剉枇杷葉拭去毛炙微黄各半兩右都細剉和匀每服五錢以水一大中盞煎至五分去滓不計時候溫服人參飲子出聖恵方治熱病壯熱嘔逆不下飲食宜服人參去蘆頭陳橘皮湯浸去白瓤焙生薑赤茯苓麥門冬去心葛根各一兩右都細剉和匀每服半兩以水一大盞煎至五分去滓不計時候溫服麥門冬散出聖恵方治熱病壯熱惡寒食即嘔逆宜服麥門冬去心前胡去蘆頭生地黄各一兩甘艸炙微赤剉陳橘皮湯浸去白瓤焙人參去蘆頭各半兩右為散每服四錢以水一中盞入竹茹半雞子大煎至六分去滓不計時候溫服柴胡散出聖恵方治熱病數日未得汗遍身壯熱嘔逆不下食宜服柴胡去苖川升麻人參去蘆頭麥門冬去心各一兩麻黄一兩半去根節甘艸炙微赤剉枳實麩炒微黄知母梔子仁各三兩鱉甲三兩塗醋炙令黄去裙襴右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服白茅根飲子出聖恵方治熱病因服凉藥過多致胃冷嘔宜服白茅根半兩剉陳橘皮湯浸去白瓤焙桂心葛根高良薑半兩枇杷葉半兩拭去毛炙微黄右都細剉和匀每服半兩以水一大盞入生薑半分煎至五分去滓不計時候溫服治熱病煩渇飲水過多時有嘔逆方出聖恵方枇杷葉拭去毛炙微黄茅根剉葛根剉各一兩右為散以水三大盞煎至一盞半去滓不計時候分溫三服七物黄連湯出聖恵方治夏月傷寒四肢煩疼發熱其人喜煩嘔逆支滿劇如禍祟寒熱相摶故令喜煩黄連茯苓黄芩各十八銖芍藥葛根各一兩甘艸一兩六銖小麥三合右㕮咀以水七升煮取三升冷分三服不能一升稍稍服之湯勢安乃卧藥主毒氣服湯之後胷中熱及咽喉痛皆差其明日復煮一劑如法服之此湯無毒但餘熱下氣安病人小兒服者取三分三一以水四升煮得二升稍稍服黄連解毒湯出經驗良方治煩嘔不得眠口燥呻吟錯語黄連三兩黄栢黄芩各二兩梔子一十四枝右水六升煎取二升分再服外臺云凡大熱盛煩嘔呻吟錯語不得眠皆𫝊此方諸人用之亦効此直解熱毒除熱酷不必飲酒劇者一方每服加半夏三枚全用厚朴二錢剉茯芩去皮剉水一盞半生薑三片煎至半盞温服名曰半夏黄連解毒湯或欲急下者本方加大承氣湯一服生薑煎如前法以利為度一法為細末水丸如小豆大溫水下二十丸治積熱勞欬㵼利甚良小柴胡湯出朱氏律驗方治熱證嘔吐柴胡去蘆半斤黄芩人參甘艸炙各三兩半夏湯洗七次焙乾二两半右剉散每服三錢半生薑五片棗一枚煎服熱病噦候論夫熱病噦者由伏熱在于胃間令人胷滿氣逆則噦若大下後胃氣虚冷亦致噦也方丁香散出聖恵方治熱病未得汗躁熱飲水過多腹脹氣急嘔噦不止宜服丁香陳橘皮湯浸去白瓤焙枇杷葉拭去毛炙微黄前胡去蘆頭葛根剉各半兩人參茅根剉各一兩右為粗散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服甘艸飲子出聖恵方治熱病毒氣攻胃嘔噦不止宜服甘艸炙微赤陳橘皮湯浸去白瓤焙川升麻生薑葛根剉人參去蘆頭各一兩右都細剉和匀每服半兩以水一大盞煎至五分去滓不計時候溫服半夏散出聖恵方治熱病腹胃虚脹心膈壅滯嘔噦不能食宜服半夏湯洗七遍去滑赤芍藥陳橘皮湯浸去白瓤焙大腹皮剉各三分右為粗散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服麥門冬散出聖恵方治熱病煩熱嘔噦不欲飲食宜服麥門冬去心蘆根剉各一兩半柴胡去苖葛根剉各一兩人參三分去蘆頭右為散每服四錢以水一中盞入竹茹一分煎至六分去滓入生地黄汁少半合更煎一沸不計時候溫服前胡散出聖恵方治熱病胃中有熱榖氣入則胃逆逆則胃不下食宜服前胡去蘆頭黄蓍剉人參去蘆頭各一兩麥門冬去心陳橘皮湯浸去白瓤焙各半兩甘艸一分炙微赤剉生乾地黄三分右為散每服五錢以水一大盞入竹茹一分去滓不計時候煎至五分溫服赤芍藥散出聖恵方治熱病往来寒熱胷脇滿悶噦逆宜服赤芍藥人參去蘆頭陳橘皮去白瓤焙茯苓各三分前胡去蘆頭桂心犀角屑大腹皮蘆根各半兩右為散每服三錢以水一大盞煎至五分去滓不計時候溫服白木香散出聖恵方治熱病邪熱已退胃氣未和噦不能食宜服白木香蘆根剉草豆蔲去皮人參去蘆頭陳橘皮湯洗去白瓤焙枇杷葉拭去毛炙微黄厚朴去粗皮塗生姜汁炙令香熱各三分右為散每服五錢以水一大盞煎至五分去滓不計時候溫服白茅根散出聖恵方治熱病噦逆不下食宜服白茅根剉百合陳橘皮湯浸去白瓤焙葛根剉人參去蘆頭各一分右為散每服五錢以水一大盞煎至五分去滓不計時候溫服治熱病未得汗嘔噦不止方出聖恵方麥門冬一兩半去心焙蘆根人參去蘆頭各一兩右為散每服半兩以水一大盞入生薑半分煎至五分去滓不計時候溫服熱病汗後餘熱不退論夫熱病其人或未發汗吐下或經服藥已後而脉洪大實數腹胃脹滿小便赤黄大便難或渇或煩靣色變赤此為腑臟有結熱故也方石膏散出聖恵方治熱病得汗後餘熱不退頭痛心煩宜服石膏二兩麥門冬一兩去心焙知母人參去蘆頭柴胡去苖犀角屑甘艸炙微赤剉各半兩黄芩三分右為粗散每服五錢以水一大盞入葱白兩莖䜴五十粒煎至五分去滓不計時候溫服治熱病汗後餘熱不除寒熱往来頭重體痛宜服此方出聖恵方葛根剉黄蓍剉梔子仁柴胡去苖石膏各一兩地骨皮黄芩各三分甘艸半兩炙微赤剉右為粗散每服三錢以水一中盞入䜴三十粒煎至五分去滓不計時候溫服茵陳散出聖恵方治熱病汗後餘熱不解頭項出汗身上無汗瘀熱在内渇欲飲水小便不利宜服茵陳猪苓去黒皮桑根白皮剉木通剉甘艸炙微赤剉各半兩梔子仁川大黄剉碎微炒秦芁去苖各三分柴胡去苖各一兩右為散每服五錢以水一大盞煎至五分去滓不計時候溫服葛根散出聖恵方治熱病汗後餘熱不解往来寒熱不定宜服葛根剉赤芍藥各三兩麻黄去根節柴胡去苖麥門冬去心各一兩大青葳𬎼黄芩甘艸炙微赤剉各半兩右為散每服四錢以水一中盞煎至六分去滓不計時候溫服黄芩散出聖恵方治熱病後餘熱不解身體沉重宜服黄芩川升麻石膏麻黄去根節各一兩黄連去鬚三分梔子仁甘艸炙微赤剉各一分右為麄散每服四錢以水一中盞煎至六分去滓不計時候溫服犀牛角散出聖恵方治熱病汗後餘熱不退頭痛唇乾宜服犀角屑知母川升麻麥門冬去心黄芩葛根剉各一兩黄連三分去鬚甘艸半兩炙微赤剉石膏二兩右為散每服四錢以水一中盞煎至六分去滓不計時候溫服治熱病汗後餘熱不解宜服此方川升麻黄芩各三分黄連去鬚恒山各一兩右為散每服四錢以水一中盞煎至六分去滓空心溫服得吐即止未吐再服石膏散出聖恵方治熱病已得汗餘熱未退宜服石膏一兩半知母人參去蘆頭葳𬎼甘艸三分炙微赤剉右為粗散每服五錢以水一大盞入生姜半分煎至五分去滓不計時候溫服人參散出聖恵方治熱病汗後餘熱不除煩躁恍忽不安宜服人參去蘆頭梔子仁藍葉甘艸炙微赤剉白鮮皮大青各一兩右為散每服四錢以水一中盞煎至六分去滓不計時候溫服治熱病口中苦下氣除熱喉中鳴煎方出千金方石膏半斤蜜一升右二味以水三升先煑石膏取二升次内蜜復煎取如餳含如棗核許盡復含之大良普濟方卷一百五十二
