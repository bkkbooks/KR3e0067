body:
  text: 普濟方卷一百五十二明周王朱橚撰熱病門總論夫熱者皆傷寒之類也冬傷于寒至春變為溫病至夏變為暑病者熱重于溫也肝熱病者小便赤黄腹痛多卧身熱熱盛則狂言多驚兩脇滿痛手足熱躁不能安卧心熱病者先不樂數日乃熱熱盛則卒心痛煩熱欲嘔頭痛靣赤無汗脾熱病者先頭重頰痛心煩欲嘔身熱熱盛則腰痛腹滿溏泄肺熱病者先淅淅然毛起惡風舌上黄身熱熱盛則喘欬胷背不得大息頭痛不汗出而寒腎熱病者先腰痛脛痠大渇數飲水身熱熱盛則項痛而強脛寒足下熱不欲言肝熱病者左頰赤心熱病者靣先赤脾熱病者唇先赤肺熱病者右頰赤腎熱病者頥先赤病雖未發見色者療之名曰治未病一日汗不出大灌發者死二日泄而腹滿甚者死三日目不明熱不已者死四日老人嬰兒熱而腹滿者死五日汗不出嘔血者死六日舌本爛熱不已者死七日欬血而衂汗出不至足者死八日髓熱者死九日熱而痙者死凡有此候者皆不可治也熱病已得汗脉静者生脉躁者難治熱病脉常盛躁而不得汗者此陽之極也得汗者生不得汗者難差熱病已得汗脉上躁喘且即復熱喘盛者死熱病七八日脉不躁不數後三日當有汗若不汗者難治熱病七八日其脉微小者生脉代舌焦乾黒者死熱病已得汗常熱不去脉静者生脉躁者難治熱者脉常躁此氣之極也亦死熱病腹滿常喘熱不退者死熱病多汗脉虚小者生𦂳實者死矣又云熱病者皆傷寒之類是也或愈或死皆以六七日之間其餘以十日以上者何不知其解願聞其故岐伯曰巨陽者諸陽之屬也其脉連于風府故諸陽主氣也人之傷寒也則為病熱熱雖甚不死其兩感于寒而病必不能免于死矣帝曰願聞其狀岐伯曰傷寒一日巨陽受之故頭項疼腰背强二日陽明受之陽明主肌肉其脉夾鼻絡于目故身熱目痛鼻乾不得卧也三日少陽受之少陽主膽其脉循脇絡于目故胷脇痛而耳聾三陽經絡皆受其病而未入于藏故可汗而已四日太隂受之太隂脉布胃中絡于嗌故腹滿而嗌乾五日少隂受之少隂脉貫腎絡于肺系于舌本故口燥舌乾而渇六日厥隂受之厥隂脉循隂噐而絡於肝故煩滿而嚢縮三隂三陽五藏六府皆受病榮衞不行五藏不通則死矣其不兩感于寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾㣲聞十日太隂病衰腹減如故則思飲食十一日少隂病衰渇止不滿舌乾已而嚏十二日厥隂病衰嚢縱小腹㣲下大氣皆去病日已矣帝曰治之奈何岐伯曰治之各通其藏脉病日衰矣未滿三日可汗而已其滿三日可下而已熱病一日論夫熱病一日病在太陽主表表胃皮膚也病在皮膚之間故頭項腰脊皆痛宜汗之則愈也方解肌散出聖恵方治熱病一日頭痛身熱四肢煩疼宜服麻黄去根節川升麻甘草炙㣲赤剉赤芍藥柴胡去苗桔梗去蘆頭杏仁湯浸去皮尖雙仁麩炒㣲黄各一兩右為粗散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候熱服衣覆取汗未汗再服石膏散出聖恵方治熱病一日頭痛壯熱宜服石膏麻黄去根節各二兩黄芩桂心赤芍藥柴胡去苖各一兩右為粗散每服三錢以水一大盞入生薑半分煎至五分去滓不計時候熱服衣覆取汗未汗再服葛根散出聖恵方治熱病一日頭痛項强身熱如火宜服葛根剉赤芍藥麻黄去根節石膏各二兩白芷柴胡去苖黄芩桂心各一兩右為粗散每服四錢以水一大盞入葱白五寸生薑半分煎至五分去滓不計時候熱服衣覆取汗柴胡散出聖恵方治熱病一日頭痛壯熱煩悶宜服柴胡去苖赤芍藥葛根各一兩梔子仁黄芩各半兩石膏二兩右為散每服四錢用水一大盞葱白二莖䜴半合煎至五分去滓不計時候溫服梔子散出聖恵方治熱病一日頭痛壯熱心中煩悶宜服梔子仁黄芩各三分石膏葛根剉柴胡去苖麥門冬去心焙各一兩右為粗散每服四錢以水一中盞入䜴五十粒葱白二莖煎至五分去滓不計時候溫服麻黄散出聖恵方治熱病一日頭痛壯熱宜服麻黄一兩去根節川大黄三分剉碎㣲炒黄芩桂心甘草炙㣲赤剉赤芍藥各半兩右為細散每服不計時候以新汲水調三錢服後葢衣取汗未汗再服治熱病一日壯熱頭痛宜服出聖恵方甘草一兩炙㣲赤剉生薑三分切􅌝􅌣二枚大者細剉椀中盛之右先將甘草生薑以酒一大盞半煎至八分去滓熱投入􅌝􅌣椀中絞取汁不計時候分溫二服衣覆取汗桃栁湯浴方出聖恵方治熱病一日身體壯熱頭痛骨肉痠楚背脊强口鼻乾手足㣲冷小便赤黄宜用桃枝并葉五斤細剉栁枝并葉五斤細剉右以水一石煮取一㪷去滓帶熱避風處淋浴浴後于密室中刺頭并眼後兩邊及舌下血斷以塩末塗針處便宜服葛䜴粥葛䜴粥方出聖恵方葛根二兩剉葱白五莖并鬚白䜴一合生薑一兩切右藥以水三大盞煎至一盞半去滓下粳米二合煮作粥乗熱頓服衣葢取汗麻黄粥方出聖恵方治熱病一日宜服發汗麻黄一兩去根節䜴半合右藥用水一大盞半煎至一盞去滓下粳米半合煮作稀粥乗熱頓服衣葢取汗治熱病疫毒病一日兩日頭痛壯熱渾身發熱如火眼目昏眩項背强急診其脉寸口浮數總三部俱浮數宜發汗若洪大𦂳急有骨力即不可汗也但熱病疫毒病不可以時日為定只看脉氣可汗即汗可取即取不可差誤凡陽毒傷寒三日後其用藥取病與治熱毒疫病只一般也惟初間兩日所治小有不同但傷寒在表須當發之熱病疫毒病徃徃有不須發也若見得不仔細須俟三日後方可下疏藥也治疫毒在表發汗方萬金䕶命方麻黄去根三分牡丹皮去心桔梗𦍑活獨活細辛荆芥穗各一分右細杵羅為末每服五錢水一椀椒五十粒茶末半錢煎取濃汁用調下藥末非時和滓喫厚蓋衣被發大汗一服安効治時行熱病初得本草以菾菜搗絞汁飲之得差熱病二日論夫熱病二日陽明受病病在肌肉故内熱鼻乾不得眠也故可摩膏火炙發汗而愈也方麻黄散出聖恵方治熱病二日頭痛壯熱肢節不利宜服麻黄二兩去根節川大黄剉碎微炒葛根剉桂心柴胡去苖赤芍藥各一兩甘草半兩炙微赤剉右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候熱服衣蓋取汗前胡散出聖恵方治熱病二日口苦咽乾頭痛壯熱宜服前胡去蘆頭杏仁湯浸去皮尖雙仁麩炒微黄各一兩葛根剉桂心旋覆花各半兩麻黄二兩去根節右為粗散每服五錢以水一大盞入生薑半分葱白五寸煎至五分去滓不計時候熱服衣覆取汗未汗再服桂枝散出聖恵方治熱病二日頭痛壯熱宜服桂枝葛根赤芍藥甘草炙㣲赤剉杏仁湯浸去皮尖雙仁麩炒㣲黄各半兩麻黄三分去根節石膏一兩右為粗散每服三錢水一中盞入葱白五寸生薑半分煎至五分去滓不計時候熱服衣覆取汗未汗再服柴胡散出聖恵方治熱病二日頭痛口苦雖經發汗未解可服柴胡去苖人參去蘆頭甘草炙㣲赤剉黄芩赤茯苓各一兩半夏半兩湯洗七遍去滑右為粗散每服三錢以水一中盞入葱白五寸生薑半分煎至六分去滓不計時候溫服令自有汗即解黄芩散黄芩三分麻黄去根節石膏各一兩川大黄剉碎㣲炒葛根剉桂心赤芍藥甘草炙㣲赤剉川朴硝各半兩右為細散每服不計時候以葱䜴湯調下二錢衣葢取汗未汗再服治熱病二日發汗未解頭痛壯熱宜服此方出聖恵方麻黄去根節甘草炙㣲赤剉葛根各一兩右細剉和匀分為六服每服以水一大鍾入生薑半分煎至五分去滓不計時候熱服衣葢取汗治熱病二日發汗後不解頭痛體熱宜服此方出聖恵方石膏一兩細研麻黄半兩去根節甘草一分炙㣲赤剉右並剉用水一大盞煎至五分去滓入雞子白一枚攪匀不計時候乗熱頓服衣葢取汗未汗再服熱病三日論夫熱病三日諸陽𫝊病訖病猶在表未入于臟故胷脇痛而耳聾可發汗而愈也方葛根散出聖恵方治熱病三日未得汗壯熱煩惱欲得飲水宜服葛根剉川大黄剉碎㣲炒黄芩桂心赤芍藥柴胡去苖各一兩麻黄二兩去根節梔子仁甘草炙㣲赤剉各半兩右為粗散每服四錢以水一中盞入生薑半分煎至五分去滓不計時候熱服令有汗為度大黄散出聖恵方治熱病三日發汗未解頭痛口乾心胷煩悶宜服川大黄剉碎㣲炒柴胡去苖麻黄去根節各一兩秦艽一兩半去苖石膏二兩甘草半兩炙㣲赤剉右為粗散每服四錢以水一中盞入生薑半分去滓不計時候稍熱頻服汗出為度柴胡飲子出聖恵方治熱病三日頭痛口苦寒熱往来宜服柴胡去苖木通剉赤芍藥各一兩半石膏二兩半搗甘草半兩炙㣲赤剉右為細剉和匀每服半兩用水一大盞煎至五分去滓不計時候溫服麻黄散出聖恵方治熱病三日頭疼壯熱宜服麻黄去根節知母葛根各一兩赤芍藥一兩半黄芩甘草炙㣲赤剉白藥子梔子仁細辛柴胡去苖各半兩石膏二兩右為粗散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候稍熱服衣葢取汗發汗桂心散出聖恵方治熱病三日表猶未解壯熱頭目四肢不利宜服桂心赤茯苓澤㵼赤芍藥各半兩柴胡去苖葛根剉麻黄去根節各一兩甘草一分炙㣲赤剉右為粗散每服五錢以水一中盞入薄荷二七葉煎至六分去滓不計時候稍熱服衣葢取汗未汗再服苦參散出聖恵方治熱病三日解毒氣苦參一兩剉黄芩二兩甘草半兩炙㣲赤剉右為粗散每服五錢以水一大盞煎至六分去滓入生地黄汁一合攪令匀不計時候分溫二服知母散出聖恵方治熱病三日經發汗熱退後尚寒熱往来不能飲食宜服知母一兩枳實麩炒㣲黄梔子仁各一兩半右為散每服五錢用水一大盞入䜴少許煎至五分去滓不計時候溫服熱病四日論夫熱病四日太隂受病太隂者三隂之首也三陽受病訖𫝊入于隂故毒氣入于胷膈其病咽喉乾胷膈滿故可吐而愈也方苦參散出聖恵方治熱病四日結胷滿痛壯熱身體疼痛宜服令吐苦參剉恒山各半兩右為散以水二中盞煎至一盞去滓不計時候盡飲之當吐即愈未吐再服𤓰蔕散出危氏方治熱病四日咽喉乾而腹滿胷有寒痰當吐諸亡血虚家不可與服𤓰蔕一分赤小豆一兩右搗粗羅為散每服二錢以水一中盞煎至五分去滓不計時候溫服以吐為度一方用香䜴半合同煎服一方治内傷為細末溫水調一錢以吐為度如傷之太重備急丸獨行丸皆急藥也倉卒無藥糟𤓰頓喫亦一吐柴胡散出聖恵方治熱病四日壯熱四肢沉重喫食不下宜服柴胡去苖葛根剉川大黄剉碎㣲炒石膏前胡去蘆頭鱉甲塗醋炙㣲黄去裙欄各一兩赤芍藥黄芩各三分梔子仁甘草炙㣲赤剉各半兩川朴硝一分右粗搗羅為散每服五錢以水一大盞煎至五分去滓不計時候溫服麻黄散出聖恵方治熱病四日毒氣内攻身體痛壯熱頭重煩渇不止宜服麻黄去根節茵蔯􅌝􅌣根各一兩桂心細辛柴胡去苖甘草炙㣲赤剉各半兩川大黄三分剉碎㣲炒右粗搗羅為散每服五錢以水一大盞煎至五分去滓不計時候溫服葛根散出聖恵方治熱病四日發汗不差身體壯熱心膈煩悶不得睡卧宜服葛根剉石膏各二兩龍膽草去蘆頭大青桂心甘草炙㣲赤剉各半兩麻黄去根節葳㽔赤芍藥黄芩川升麻各一兩右為粗散每服四錢以水一大盞煎至五分去滓不計時候溫服竹茹散出聖恵方治熱病四日頭痛胷滿食即嘔逆宜服竹茹陳橘皮湯浸去白瓤焙葛根剉人參去蘆頭蘆根剉各一兩枇杷葉半兩拭去毛炙㣲黄右為粗散每服五錢以水一大盞入粳米一百粒生薑半分煎至五分去滓不計時候溫服人參散出聖恵方治熱病四日熱毒解後時来時往惡寒㣲熱不能食宜服人參