之治熱病及時疾心躁狂亂奔走狀似癎言語不定久不得汗及不知人事右用人中黃不拘多少入大罐內以泥固濟大火煅半日去火候冷取出于地上以盆蓋之又半日許細研如麵新汲水調下三錢或未退間作差人中黃者硬糞也治狂病經久不差或歌或笑行走不休發動無時用出本草以猳豬肉一斤煮令熱令以細研作膾和醬醋食之或羔粥炒任性服之解熱病不知人事欲死者用蚯蚓不拘多少先杵爛以水泡濾過灌服半碗立效熱病嘔逆論夫熱病胃中有熱則榖氣不和新榖入與熱氣相摶胃氣不平故致嘔逆或吐下已後臟氣虛弱亦令嘔逆也方前胡飲子出聖惠方治熱病惡寒壯熱食則嘔逆宜服前胡去蘆頭麥門冬去心竹茹生地黃葛根各二兩陳橘皮湯浸去白瓤焙甘草炙微赤銼枇杷葉拭去毛炙微黃各半兩右都細銼和勻每服五錢以水一大中盞煎至五分去滓不計時候溫服人參飲子出聖惠方治熱病壯熱嘔逆不下飲食宜服人參去蘆頭陳橘皮湯浸去白瓤焙生薑赤茯苓麥門冬去心葛根各一兩右都細銼和勻每服半兩以水一大盞煎至五分去滓不計時候溫服麥門冬散出聖惠方治熱病壯熱惡寒食即嘔逆宜服麥門冬去心前胡去蘆頭生地黃各一兩甘草炙微赤銼陳橘皮湯浸去白瓤焙人參去蘆頭各半兩右為散每服四錢以水一中盞入竹茹半雞子大煎至六分去滓不計時候溫服柴胡散出聖惠方治熱病數日未得汗遍身壯熱嘔逆不下食宜服柴胡去苖川升麻人參去蘆頭麥門冬去心各一兩麻黃一兩半去根節甘草炙微赤銼枳實麩炒微黃知母梔子仁各三兩鱉甲三兩塗醋炙令黃去裙襴右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服白茅根飲子出聖惠方治熱病因服涼藥過多致胃冷嘔宜服白茅根半兩銼陳橘皮湯浸去白瓤焙桂心葛根高良薑半兩枇杷葉半兩拭去毛炙微黃右都細銼和勻每服半兩以水一大盞入生薑半分煎至五分去滓不計時候溫服治熱病煩渴飲水過多時有嘔逆方出聖惠方枇杷葉拭去毛炙微黃茅根銼葛根銼各一兩右為散以水三大盞煎至一盞半去滓不計時候分溫三服七物黃連湯出聖惠方治夏月傷寒四肢煩疼發熱其人喜煩嘔逆支滿劇如禍祟寒熱相摶故令喜煩黃連茯苓黃芩各十八銖芍藥葛根各一兩甘草一兩六銖小麥三合右㕮咀以水七升煮取三升冷分三服不能一升稍稍服之湯勢安乃卧藥主毒氣服湯之後胸中熱及咽喉痛皆差其明日復煮一劑如法服之此湯無毒但餘熱下氣安病人小兒服者取三分三一以水四升煮得二升稍稍服黃連解毒湯出經驗良方治煩嘔不得眠口燥呻吟錯語黃連三兩黃柏黃芩各二兩梔子一十四枝右水六升煎取二升分再服外臺云凡大熱盛煩嘔呻吟錯語不得眠皆傳此方諸人用之亦效此直解熱毒除熱酷不必飲酒劇者一方每服加半夏三枚全用厚朴二錢銼茯芩去皮銼水一盞半生薑三片煎至半盞溫服名曰半夏黃連解毒湯或欲急下者本方加大承氣湯一服生薑煎如前法以利為度一法為細末水丸如小豆大溫水下二十丸治積熱勞咳㵼利甚良小柴胡湯出朱氏律驗方治熱證嘔吐柴胡去蘆半斤黃芩人參甘草炙各三兩半夏湯洗七次焙乾二兩半右銼散每服三錢半生薑五片棗一枚煎服熱病噦候論夫熱病噦者由伏熱在于胃間令人胸滿氣逆則噦若大下後胃氣虛冷亦致噦也方丁香散出聖惠方治熱病未得汗躁熱飲水過多腹脹氣急嘔噦不止宜服丁香陳橘皮湯浸去白瓤焙枇杷葉拭去毛炙微黃前胡去蘆頭葛根銼各半兩人參茅根銼各一兩右為粗散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服甘草飲子出聖惠方治熱病毒氣攻胃嘔噦不止宜服甘草炙微赤陳橘皮湯浸去白瓤焙川升麻生薑葛根銼人參去蘆頭各一兩右都細銼和勻每服半兩以水一大盞煎至五分去滓不計時候溫服半夏散出聖惠方治熱病腹胃虛脹心膈壅滯嘔噦不能食宜服半夏湯洗七遍去滑赤芍藥陳橘皮湯浸去白瓤焙大腹皮銼各三分右為粗散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服麥門冬散出聖惠方治熱病煩熱嘔噦不欲飲食宜服麥門冬去心蘆根銼各一兩半柴胡去苖葛根銼各一兩人參三分去蘆頭右為散每服四錢以水一中盞入竹茹一分煎至六分去滓入生地黃汁少半合更煎一沸不計時候溫服前胡散出聖惠方治熱病胃中有熱榖氣入則胃逆逆則胃不下食宜服前胡去蘆頭黃蓍銼人參去蘆頭各一兩麥門冬去心陳橘皮湯浸去白瓤焙各半兩甘草一分炙微赤銼生乾地黃三分右為散每服五錢以水一大盞入竹茹一分去滓不計時候煎至五分溫服赤芍藥散出聖惠方治熱病往來寒熱胸脅滿悶噦逆宜服赤芍藥人參去蘆頭陳橘皮去白瓤焙茯苓各三分前胡去蘆頭桂心犀角屑大腹皮蘆根各半兩右為散每服三錢以水一大盞煎至五分去滓不計時候溫服白木香散出聖惠方治熱病邪熱已退胃氣未和噦不能食宜服白木香蘆根銼草豆蔲去皮人參去蘆頭陳橘皮湯洗去白瓤焙枇杷葉拭去毛炙微黃厚朴去粗皮塗生薑汁炙令香熱各三分右為散每服五錢以水一大盞煎至五分去滓不計時候溫服白茅根散出聖惠方治熱病噦逆不下食宜服白茅根銼百合陳橘皮湯浸去白瓤焙葛根銼人參去蘆頭各一分右為散每服五錢以水一大盞煎至五分去滓不計時候溫服治熱病未得汗嘔噦不止方出聖惠方麥門冬一兩半去心焙蘆根人參去蘆頭各一兩右為散每服半兩以水一大盞入生薑半分煎至五分去滓不計時候溫服熱病汗後餘熱不退論夫熱病其人或未發汗吐下或經服藥已後而脈洪大實數腹胃脹滿小便赤黃大便難或渴或煩靣色變赤此為腑臟有結熱故也方石膏散出聖惠方治熱病得汗後餘熱不退頭痛心煩宜服石膏二兩麥門冬一兩去心焙知母人參去蘆頭柴胡去苖犀角屑甘草炙微赤銼各半兩黃芩三分右為粗散每服五錢以水一大盞入蔥白兩莖䜴五十粒煎至五分去滓不計時候溫服治熱病汗後餘熱不除寒熱往來頭重體痛宜服此方出聖惠方葛根銼黃蓍銼梔子仁柴胡去苖石膏各一兩地骨皮黃芩各三分甘草半兩炙微赤銼右為粗散每服三錢以水一中盞入䜴三十粒煎至五分去滓不計時候溫服茵陳散出聖惠方治熱病汗後餘熱不解頭項出汗身上無汗瘀熱在內渴欲飲水小便不利宜服茵陳豬苓去黑皮桑根白皮銼木通銼甘草炙微赤銼各半兩梔子仁川大黃銼碎微炒秦芁去苖各三分柴胡去苖各一兩右為散每服五錢以水一大盞煎至五分去滓不計時候溫服葛根散出聖惠方治熱病汗後餘熱不解往來寒熱不定宜服葛根銼赤芍藥各三兩麻黃去根節柴胡去苖麥門冬去心各一兩大青葳𬎼黃芩甘草炙微赤銼各半兩右為散每服四錢以水一中盞煎至六分去滓不計時候溫服黃芩散出聖惠方治熱病後餘熱不解身體沉重宜服黃芩川升麻石膏麻黃去根節各一兩黃連去鬚三分梔子仁甘草炙微赤銼各一分右為粗散每服四錢以水一中盞煎至六分去滓不計時候溫服犀牛角散出聖惠方治熱病汗後餘熱不退頭痛唇乾宜服犀角屑知母川升麻麥門冬去心黃芩葛根銼各一兩黃連三分去鬚甘草半兩炙微赤銼石膏二兩右為散每服四錢以水一中盞煎至六分去滓不計時候溫服治熱病汗後餘熱不解宜服此方川升麻黃芩各三分黃連去鬚恆山各一兩右為散每服四錢以水一中盞煎至六分去滓空心溫服得吐即止未吐再服石膏散出聖惠方治熱病已得汗餘熱未退宜服石膏一兩半知母人參去蘆頭葳𬎼甘草三分炙微赤銼右為粗散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服人參散出聖惠方治熱病汗後餘熱不除煩躁恍忽不安宜服人參去蘆頭梔子仁藍葉甘草炙微赤銼白鮮皮大青各一兩右為散每服四錢以水一中盞煎至六分去滓不計時候溫服治熱病口中苦下氣除熱喉中鳴煎方出千金方石膏半斤蜜一升右二味以水三升先煮石膏取二升次內蜜復煎取如餳含如棗核許盡復含之大良普濟方卷一百五十二
