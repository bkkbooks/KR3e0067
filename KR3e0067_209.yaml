body:
  text: 普濟方巻二百九明周王朱橚撰泄痢門濡泄夫内經曰濕勝則濡泄甲乙經曰寒客下焦傳為濡㵼夫脾為五藏之至隂其性惡寒濕今寒濕之氣而客於脾則不能禆助胃氣腐熟水榖致清濁不分水入腸間虚莫能制故洞泄如水随氣而下謂之濡泄方堅中丸治脾胃受濕滑泄注下黄連去鬚黄蘗赤茯苓去皮白术澤㵼各一兩陳皮人參肉荳䓻白芍藥半夏桂各半兩右為細末水浸􅔻餅和丸如梧桐子大每服五七十丸食前温米飲下肉荳䓻散治腸胃受濕濡泄不止兼治暴㵼肉荳䓻去殻黄連去鬚炒訶梨勒去核炮各三分甘草炙剉赤茯苓去黒皮乾薑炮白术各半兩厚朴去粗皮生薑汁炙一兩右為散毎服二錢空心食前米飲調下日三當歸散治腸胃寒濕濡泄腹内疞刺疼痛當歸切焙木香乾薑炮肉荳䓻去殻炮各半兩訶梨勒炮去核黄連去鬚炒各三分右為散先用水四盞入甘草生薑各一分黒豆半合並半生半炒同煎至二盞去滓分作二服每服用調散三錢空心日午服之加味五苓散治伏暑熱二氣及胃濕泄㵼注下或煩渇小便不利赤茯苓去皮澤㵼木猪苓去皮肉桂不見火白术各一兩車前子半兩右㕮咀毎服四錢水一盞半薑五片煎八分去滓温服不拘時或進來復丹亦可炙肝散治飲食生冷内受風寒泄㵼無度川麵乾薑炮半兩大附子炮半兩縮砂仁半兩肉荳䓻二箇小茴香四錢炒川小椒四兩右為末毎三四錢用白羊肝三二兩或獖猪肝或猪羊腰子批開放藥在内鹽末一錢葱白二根同肝一處紙褁潤濕焼香熟為度細嚼生薑湯下或米湯酒送下食前空心服之阿梨勒散治寒温傷脾濡㵼阿梨勒炮去核吳茱茰湯浸焙炒木香蕪荑各半兩黄連去鬚炒一兩右為細散每服二錢空心米飲調下白荳䓻湯出聖濟緫録治腸胃虛濕濡㵼無度腸痛飲食不化白荳䓻去皮訶梨勒炮去核乾薑炮陳橘皮湯浸去白焙炒各半兩厚朴生薑汁炙三分右搗篩每服五錢切薤白三寸水一盞半煎七分去滓空心温服日午冄服枳殻湯出聖濟緫録治濡泄暴下不止甘草炙剉阿膠炙燥各半兩黄連去鬚㣲炒枳殻去穰炒三分厚朴去粗皮生薑汁炙秤一兩右搗篩每服五錢水一盞半煎一盞去滓空心温服日再桂附丸出聖濟緫録治濡泄水痢乆不止桂去粗皮附子炮裂去皮臍乾薑炮赤石脂各一兩右為末煉蜜丸如梧桐子大每服二十丸空心日午米飲下日三附子湯出聖濟緫録治腸胃寒濕濡㵼不止及冷痢色白食不消化附子炮裂皮臍甘草炙剉阿膠炙燥各半兩黄連三分右剉如麻豆大每服五錢水一盞半煎至一盞空心温服日再一名甘草湯白术丸出聖濟緫録治脾胃受濕濡㵼不止徤脾白术乾薑炮各三分人參三分厚朴去粗皮生薑汁炙一兩右為末煉蜜丸梧桐子大毎服三十丸空心米飲下日再荳䓻散出宣眀論治脾胃受濕濡泄不止而腸痛滑利肉荳䓻去殻炮五枚甘草炙剉一兩厚朴去粗皮薑汁炙一兩半右為散每服二錢米飲下或湯調下食前温服猪苓丸出聖濟緫録治腸胃寒濕濡泄無度嗜困不食猪苓去黒皮半兩肉荳䓻去殻炮二枚黄蘖去粗皮炙一兩右為末米飲丸菉豆大每服十丸食前熟水下附子丸出聖濟緫録治濡泄不止或冷痢無度附子炮裂去皮臍髙良薑各一兩甘草炙剉一分右為末陳米煑糊丸如桐子大每服二十丸米飲下不拘時候樗根丸出聖濟緫録治濡㵼裏急後重數走圊樗根皮剉一兩甘草炙剉一兩枳殻去穰麩炒半兩右為散每服二錢粥飲調下食前一服止戊巳丸出濟生方治脾胃不定濕熱乗之泄㵼不止米榖腸鳴腹痛方見本門諸㵼類對金飲子出濟生㧞萃方治㵼泄平胃散五錢五苓散二錢半草荳䓻麵褁煨熟半兩右相和勻作四服生薑三片棗二枚水煑白术芍藥湯出保命集治太隂脾經受濕水泄注下體重㣲滿困弱無力不欲飲食暴泄無數水榖不化宜此和之白术芍藥各一兩甘草五錢右剉每服一兩水二盞煎至一盞温服清如痛甚者冝蒼木芍藥湯蒼术芍藥湯出保命集蒼术一兩芍藥一兩黄芩半兩右剉毎服一兩加淡味桂半錢水一盞半煎一盞温服清如脉弦頭㣲痛者冝蒼术防風湯蒼术防風湯出保命集蒼术防風各二兩右剉同前煎服如下血者宜蒼术地榆湯出保命集蒼术二兩地榆一兩右剉同前煎服已上証如心下痞每服各加枳實一錢如茯苓加二錢由小便不利用如腹痛漸已㵼下㣲少宜訶子散止之法云大勢已去而宜止之附子丸出聖濟總録治寒濕濡泄乆不瘥附子一兩炮裂去皮臍甘草炙剉二兩右為末煉蜜丸如梧桐子大毎服二十丸空心生薑湯下日再厚朴湯一名黄連丸出聖濟緫録治傷濕濡泄不定亦治水榖痢乆不瘥吳茱萸湯洗三五遍一分赤芍藥半兩肉荳䓻四枚去殻㯽榔剉四枚右搗羅為散每服三錢用不經水猪肝四兩去筋膜批為薄片重掺藥置一鼎中入漿水一椀半合葢覆煑肝熟入鹽秤用一錢葱白三莖細切生薑彈子許拍破同煑水欲盡空心為一服如服令食之初㣲㵼不效此是逐下冷氣少時自止渇即以粥湯飲之一方為丸桐子大每服十丸粥飲下一方用破故紙即補骨脂猪肚丸出危氏方治臟寒泄㵼先用製成厚朴附子二味生薑棗煎服空心仍服此猪肚丸川烏炮附子炮各二兩乾薑炮白术厚朴各一兩半良薑炒肉荳䓻煨蓽撥禹餘粮火煆醋汁丁香􅒦砂仁桂心各一兩右為末用獖猪肝一隻净洗以川椒一兩去目茴香一兩大麴二兩入猪肝内用線縫定酒醋煑爛取出川椒茴香大麴焙乾為末均和煎藥以猪肚杵和得所為丸梧桐子大每服五十丸空心米飲下人參湯療中焦虛寒洞泄補虛人參三兩甘草三兩黄芩二兩當歸三兩茯苓四兩芎藭三兩厚朴四兩炙乾薑四兩粟米二升右切以水一斗五升煑米取熟去米澄取七升下諸藥煎取三升分三服忌海藻菘菜大酢等物訶梨勒丸出和劑方治腸胃虛冷内受風冷水榖不化泄㵼注下腹痛腸鳴胸滿氣短又治腸胃積寒及冷純白或有青黒日夜無度及脾胃傷冷暴㵼手足逆冷脉欲絶並冝服之訶梨勒皮川烏頭炮去皮臍􅒦砂仁白礬煆各四十兩木香肉荳䓻去皮炮乾薑炮各二十兩龍骨洗赤石脂各八十兩右為末用粟米飲為丸梧桐子大每服二十丸至三十丸温粟飲下食前服甚者加倍丸數一方有附子無砂仁木香散出和劑方治脾胃虚弱内挾風冷泄㵼注下米榖不化臍下疞痛腹中雷鳴胸膈痞悶脇肋虛脹及積寒乆痢膓滑不禁肢體羸困不進飲食木香當歸去蘆細焙肉荳䓻仁炮甘草爁丁香各二十兩赤石脂十兩附子去皮臍醋煑切作片子焙乾十兩藿香葉先焙四十兩訶梨子皮十五兩右為末每服一大錢水一盞半生薑三片棗一箇煎六分空心温服木香訶梨勒丸出聖濟總録治洞泄大腸切痛腸鳴不化食訶梨勒煨生核三分木香半生半炒共二兩白术桂去粗皮蕪荑炒各一兩半附子炮裂去皮臍厚朴去粗皮生薑汁炙焦各二兩良薑炒一兩甘草炙剉半兩乾薑炮一分肉荳䓻去殻一兩右為末陳麴末煑糊為丸梧桐子大每服三十丸煨生薑鹽湯下肉荳䓻出聖濟緫録治脾胃虛寒洞泄注下腹脹腸鳴肉荳䓻五枚去殻木香一分蝎稍炒一錢橘皮去白炒乾薑炮附子炮裂去皮臍胡椒各半兩右為末麵糊丸豌豆大毎服十五丸米飲下黄連飲出聖濟緫録治脾寒洞泄黄連去鬚炒訶梨勒煨去核地榆芍藥炒各半兩木香當歸切焙各三分甘草炙二分右細剉毎服五錢水一盞半煎至八分去滓温服日三七棗湯出和劑方治脾胃虚弱内受寒氣泄㵼注下水榖不化腹脇脹滿臍腹疞痛心下氣逆腹中虛鳴嘔吐惡心胸膈痞悶困倦少力不思飲食茴香去皮炒川烏炮去皮臍縮砂取仁各八兩益智去皮一斤乾薑炮四兩厚朴去粗皮薑製一斤右為粗末每服五錢水一盞大棗七枚同煎七分去滓温服空心食前豆附丸一名桂香丸出和劑方治男婦腸胃虚弱内受風冷水榖不化泄㵼注下腹痛腸鳴手足逆冷服諸藥不効亦治臟腑虚為風濕寒所摶泠滑注下不禁老人虛人危篤服之肉荳䓻炮白茯苓焙附子炮去皮各四兩木香不見火乾薑炮肉桂去粗皮各二兩丁香不見火一兩右為細末薑汁麵糊丸梧桐子大每服五十丸至一百丸用薑湯下粥飲亦得空心食前一方或加訶子半兩一方不用木香茱茰断下丸出危氏方治臟腑寒腹痛泄㵼不止甚效艾葉炒赤石脂川薑各半兩吳茱茰二兩半炒縮砂仁肉荳䓻附子炮去皮臍各一分右為末麵糊丸梧桐子大每服五七十丸米飲食前下昔趙通判名從簡甲辰年丁母憂食素之久苦㵼日七行首尾幾年每服他藥不過三兩日復作後得此方而愈又數年間遇㵼服之再効二黄丸出聖濟緫録治洞泄寒中黄連去鬚炒黄蘗去粗皮炙剉附子炮裂皮臍烏梅肉炒乾薑炮各半兩甘草炙剉一分右為末煉蜜丸梧桐子大毎服二十丸至五十丸空心米飲下固腸散出直指方治脾胃虚弱内受寒氣泄㵼注下水榖不分冷熱不調下痢膿血赤少白多或如魚腦腸滑腹痛遍數頻併心腹脹滿食减少力並冝服之陳米炒二十兩木香不見火一兩肉荳䓻生用罌粟殻去蒂蓋蜜炙二兩乾薑炮甘草炙各二兩半右為細末每服二錢酒一盞生薑二片棗一枚煎至七分温服不計時如不飲酒水煎亦得忌酒麵魚鮮等物加味三建湯出危氏方治洞泄不止大川烏綿附天雄三味並炮鹽水浸去皮臍木香肉荳䓻炮裂訶子去核各一兩右剉散每服三錢生薑十片紅棗二枚鹽梅一箇陳米一撮同煎空心熱服未效仍服来復丹温中丸出聖濟緫録治脾胃虚寒洞泄不止四肢逆冷心腹疞痛肉荳䓻仁硫黄研乾薑生用附子炮裂皮臍龍骨右為細末麵糊丸梧桐子大毎服三十丸食前艾葉湯下厚朴乾薑丸出聖濟緫録治脾胃虚冷洞泄不止厚朴去粗皮生薑汁炙三兩乾薑附子炮去皮臍白术各一兩訶梨勒皮三分右為細末醋煑麵糊丸梧桐子大每服二十丸至三十丸空心食前熱米飲下日三烏梅丸出聖濟緫録治大腸洞泄水榖入即注下烏梅肉炒四兩附子炮去皮臍黄連去鬚炒五兩乾薑炮二兩肉荳䓻去殻五枚右為末煉蜜丸梧桐子大每服三十丸米飲下黄連阿金湯出千金方治洞泄水榖注下亦治熱痢黄連去鬚阿膠炙燥烏梅肉炒各二兩山梔子仁三十枚黄蘗去粗皮剉一兩右搗篩每服五錢水一盞半煎八分空心食前温服日二附子丸出聖濟緫録治洞泄寒中注下水榖或痢赤白食入即出不消兼治膿血痢附子炮裂皮臍烏梅肉炮乾各一兩乾薑炮一兩半黄連去鬚炒二兩右為末蜜煉丸梧桐子大每服五十丸空心米飲下日晩再服如神散出聖濟緫録治洞泄不拘冷熱注下不止附子炮去皮臍白术椎碎用漿水煑半日焙乾各一両甘草炙剉乾薑炮各半兩右為散每服一錢空心米飲調下如熱㵼新汲水調下天仙子丸出聖濟緫録治大膓洞泄不止天仙子乾薑炮陳橘皮湯浸去白焙各一兩訶梨勒一兩右為粗末用醋拌勻一宿炒令黄色再為細末醋煑麵糊和丸桐子大每服二十丸食前米飲下紅豆散一名玉粉散出衛生寶鑑方治洞泄寒中注下不禁不思飲食紅豆揀乾薑炮硫黄細研附子大者炮去皮臍各一兩右為散毎服一錢空心温粥飲下再服當愈荳䓻附子散出聖濟緫録治脾胃乆寒大腸虚滑洞泄肉荳䓻仁麵包炮熟附子去皮臍剉鹽炒縮砂去皮各半兩木香半分右為散每服一錢食前米飲調下丁香散出王氏愽濟方治脾胃冷洞泄丁香二錢厚朴去粗皮生薑汁炙半兩梹榔一枚炮剉肉荳䓻去殻二枚麵包煨右為末每服二錢熱粥飲調下一方粥飲煎三兩沸温服以少許清粥飲衝下黄連當歸湯出聖濟緫録治洞泄中水殻不化黄連去鬚當歸切焙甘草炙剉各二兩酸石榴皮剉炒四兩右搗篩每服五錢水一盞半煎八分去滓空心食前温服荳䓻湯出聖濟緫録治洞泄不止肉荳䓻七枚去殻烏豆白术各一兩右用油四兩先煎後三味後白术黄色烏頭外裂裏黄取出烏頭去皮臍入肉荳䓻三味剉如麻豆每服三錢水一盞煎八分去滓空心食前稍熱服火輪散出聖濟緫録治脾胃氣寒大腸虚滑日夜不止方見本門冷痢類木香丸出本草方治氣冷下㵼木香半兩川烏一兩生右為末醋糊丸桐子大陳皮湯下三五十丸来復丹出徳生堂治配類二氣均調隂陽奪天地冲和之氣乃水火既濟之功可冷可熱可急可緩補損扶虚善理榮衛養心腎上實下虚氣悶痰心腹疼冷臟腑虛滑不拘男女老㓜危急但有胃氣無不獲安硫黄用甘草熬水洒潤細研硝石細研用厚朴水洒潤各半兩右和勻一處同淹少時用砂銚於文武火上炒令交搆氤氲相結取去埋土中去毒氣却碾為末用穤米糊為丸如黄豆大每服三五十丸濃米湯空心服治卒暴冷下下部疼痛用焼磚令熱大酢沃之三重布覆坐上即瘥附子湯出聖濟緫録治洞泄不止兼治霍亂用附子一枚重七錢炮去皮臍細切分二服每服水一盞鹽半錢煎至六分去滓温服建脾湯一名建脾散出聖濟緫録治寒中洞泄不止及年髙乆㵼方見諸㵼痢於本門洞泄方出直指方用車前子末米飲下术附湯出直指方治洞泄白术蒼术各二兩芍藥三兩茯苓四兩附子乾薑各一兩右為粗末毎服五錢水二盞煎一盞去滓温服术附丸出指南方白术附子各一兩橘皮二兩右為粗末煉蜜丸梧桐子大每服三十丸米飲下薑附湯出指南方治隂寒暴下乾薑三兩附子三分甘草一兩右㕮咀每服五錢水二盞煎一盞去滓温服金液丹出指南方用好硫黄一斤研用一甆瓶内盛令七分滿以瓦子盖口通用鹽泥固濟日乾用磚砌作爐中心掘地安一罐子合口與瓶底相當滿盛水去口一指許坐藥瓶在上將熱炭火下在爐内葢藥罐子可厚三五寸每日用熟炭一斤簇著瓶却以熟炭連大葢子更用磚葢爐子如此七伏時撥去候打開色赤黄為上其滓石盡澄在下刮去細研為末以浸蒸餅丸如梧桐子大每服五十丸至百丸空心米飲下白食不消者為寒不療方出肘後方黄連一兩甘草炙附子炮阿膠炙各半兩右水三升煑一分為再服附子赤石脂丸出楊氏家藏方治老人虛人腸胃虚寒洞泄不禁附子炮去皮臍取末一兩赤石脂研細一兩右件拌勻醋煑麵糊為丸梧桐子大每服五十丸食前温米飲下薑朴丸出鮑氏方治中寒洞泄乾薑厚朴等分右為末蜜丸任下三十丸朴附丸出朱氏集驗方厚腸胃止寒泄助元氣進飲食兼治脾腎氣弱手足浮腫川椒去目茴香各二兩青鹽一兩附子四兩去皮生用切作片子生厚朴生薑各四兩右用水三升於銀噐内慢火煑水盡為度焙乾為末煑糊為丸蒜煑壮脾丸出朱氏集驗方厚朴蒼术白茯苓各二兩陳皮七錢甘草二錢半訶子一兩附子川烏各一兩生薑半斤棗子五十枚大蒜十箇去皮煑爛右細末神麴和丸每服百十丸空心米飲鹽湯任下諸痢附論夫一切痢者謂痢無定或米榖或膿或血或青或黄或赤或白變雜無常或雜色相兼而痢也夾熱則黄赤熱甚則變膿血也冷則白冷甚則青黒皆由飲食不節冷熱不調胃氣虚弱故變色也治痢要訣痢出於積滯積物積也滯氣滯也物積欲出氣滯而不與之出所以下墜裏急乍起乍止日夜凡百餘度病家所請莫不求其止孰知物積氣滯有如是之証耶世人但見有上項証候不論色之赤白脉之大小一皆通利行之物即用巴豆大黄軰氣滯用枳殻桔梗青皮蓬术軰二者兼濟必能收功其間佐以黄連阿膠丸效驗尤著者蓋痢疾多因伏暑食熱酒麵炙煿醖釀而成其阿膠尤大膓之要藥有熱毒流滯則能踈導無熱毒流滯則能平胃市肆或無丸子即以阿膠當歸青皮赤茯苓黄連作劑入烏梅濃蜜同煎最能蕩滌惡穢積滯既去遍數自踈嗣是却以木香茯苓􅒦砂白荳䓻陳皮甘草調之自然喜食食則糟粕入於大膓然後真人養臟湯易簡斷下湯可止方増損建脾丸出千金方治丈夫虚勞五臟六腑傷敗受冷初作滯下乆則變五色赤黒如爛腸極臭穢者羸痩身重胃冷飲食不消洩㵼不止鍾乳粉三兩赤石脂三兩礬石乾薑蓯蓉桂心五味子澤㵼逺志寄生栢子仁白頭翁人參天䧺當歸石斛石榴皮牡礪龍骨甘草各二兩右為末蜜丸酒服二十丸加至三四十丸此一方止痢神効水煑木香丸出御藥防方治脾胃受濕臟腑滑㵼腹疼痛日夜無度膓鳴水聲每欲利時裏急後重或下赤黄或便膿血也並冝服之木香去鬚丁香訶子皮當歸藿香葉黄連生薑製各一兩厚朴青皮去白白芍藥陳皮去白甘草炙枳實麵炒乾薑炮各半兩乳香肉荳䓻砂仁各一兩半御米榖蜜水拌炒擇黄色六兩右為細末煉蜜丸彈子大每一丸水一大盞煎至七分和滓稍熱食前服治痢仙方謌曰八利臨終事可危仙方等分與君醫三香止痛尤為妙四白和中不可虧甘枳更加罌粟殻訶榆全藉石榴皮半夏厚朴黄連橘救苦端教在片時丁香沉香木香白术白芷白茯苓白芍藥甘草枳殻訶子地榆酸石榴皮半夏厚朴黄連陳皮罌粟殻蜜炙右等分一錢作五服白加生薑煎赤加烏梅煎諸痢患無新舊如藥療之蹔瘥還發此即縱以新藥止之終存其根本由腸胃中冷熱不調病根固結必須湯藥滌之以洩病勢痢後更以藥物補助之有此候者依後附子等六味湯以利之後服髙良薑十味散以補之附子炮細辛甘草炙人參各二兩乾薑三兩大黄五兩右切以水七升煑取二升四合去滓分三服温服如人行十里乆一服此湯當得快利痢中有惡物如魚腦状或如桃李但異於常利勿怪之將息經三四日宜合後髙良薑等十味散之髙良薑細辛黄耆白术苦參各五兩丁香二兩人參乾薑各四兩荳䓻子三兩赤石脂六兩右藥為散以飲下之初服一方寸日再服之稍加至二三忌生菜桃李雀肉等神應散出危氏方治痢𦂳嚴絶妙金罌草梗肉荳䓻訶子地榆甘草罌粟殻去蒂蕚當歸去尾茯苓白术枳殻去穰烏梅各一兩丁皮木香住痛各五錢陳皮一兩取紅生血若紅痢不用右為丸或末五色痢用春茶陳皮煎湯下如是末用蜜一匙春茶烏梅煎服加减木香煑散出危氏方治一切痢神效木香甘草當歸肉荳䓻人參官桂楊芍藥訶子烏梅去核阿膠蚌粉炒白茯苓各五錢罌粟殻一兩半去蒂蜜炒右剉散每服四錢水一盞半生薑三片紅棗二枚同煎去滓空心服大斷下丸治下痢滑數肌肉消痩飲食不入脉細皮寒氣少不能言有時發虚汗由脾胃虚耗耗則氣奪由殻氣不入胃胃無主以養故形氣消索五臟之液不収謂之五虚此為難治要能食者生及臟腑停寒臍腹疞痛附子炮肉荳䓻麵包煨牡礪煆秤各一兩細辛去土蒂七錢半乾薑炮白龍骨研赤石脂研酸石榴皮醋煑乾為度焙乾各一兩半良薑去蘆一兩半白礬枯訶子去核各一兩右為末醋糊丸梧桐子大每服三十丸粟米湯下一方白湯下無白礬訶子加减平胃散白术厚朴陳皮各一兩甘草七錢㯽榔木香各一兩半桃仁黄連人參阿膠白茯苓各半兩右為細末同平胃散煎服如血多加桃仁如熱泄加黄連如小便澁加茯苓如氣不下後重加梹榔如膿加阿膠如腹痛加芍藥甘草如濕多加白术如脉洪加大黄四時以胃氣為本乆下血則脾胃虚損血不流於四肢入於胃以致血痢治痢如聖散治一切痢疾無問乆新或赤白或赤白相雜日夜無度悉能治之紹熈壬子浙東提舉黄郎中施此藥頗有效驗當歸地榆縮砂仁赤石脂陳皮甘草乾薑訶子肉石榴皮罌粟殻各等分右為麄末三錢重作一服水一盞入烏梅一箇煎至七分去滓赤痢冷服白痢熱服赤白痢温服年高娠婦小兒皆可服忌生冷油膩物斷痢湯治胸心下伏水半夏一升生薑五兩茯苓甘草龍骨各一兩附子一兩人參黄連各三兩大棗十二枚右㕮咀以水八升煑取三升分三服治諸痢及赤白痢不瘥羸痩用䑕尾草煑汁服亦末服粥飲調下一方赤下用赤花白下用白花尤佳治痢方用生鷄子一箇連紙一幅烏梅十箇有肉者取鷄子白攤徧連紙日乾摺作四重包撮烏梅安熨斗中用白炭火焼乗烟将盡時以碗葢覆候冷研令極細入水銀粉少許和勻如大人患分為二服小兒分為三服不拘赤白痢空心井花水調服如覺臟腑㣲有踈利更不要湏再服𤣥青丸治下痢勢惡頻併窘痛或乆不愈諸藥不能止湏可下之以開除濕熱痞悶積滯而使氣液宣行者宜以通之兼宣利積熱酒食積黄痩中滿水腫腹脹兼治小兒驚疳積熱乳癖諸証唯洩㵼者勿服黄連去鬚黄蘗大黄甘遂芫花醋拌炒大㦸各半兩牽牛四兩取末二兩已上同細末輕粉二錢青黛一兩右為末勻水丸小豆大初服十丸後毎服加十丸空腹日午臨卧三服以通利為度後常服十五二十丸數日後得食乆病未瘥除者再加取痢痢後却常服以意消息病去為度後随証用之小兒丸如黍米大或麻子大退疳驚熱積不湏下者常服十丸昔一人常用頗能清利頭目寛膈美食使髭鬚遲白乆用亦能黒髭鬂固牙齒使衰老氣革於靣而手足陽眀經絡貫注之憂思則氣結而血液不行燥熱拂欝而血衰不能榮養故早蒼黄鬢白此藥能使陽眀氣血宣通效輕粉粉霜碙砂另研雄黄研硃砂信砒巴豆去皮各一錢黄丹三錢蠟三錢右先研粉霜次旋入碙砂研細下雄黄硃砂信砒再研下丹粉研勻别研巴豆爛為油與前藥研勻近火上炙控熱别研蠟軟入藥勻搓作劑旋丸小豆大新水下一丸小兒黍米大或止吐㵼痢疾調桂苓甘露散或益元散亦得秘方養臟湯治五色痢經驗陳皮去白枳殻去穰黄連去鬚南木香烏梅去核各五錢罌粟殻去蒂膜蜜炙一兩厚朴去粗皮薑汁炙杏仁去皮尖甘草各五錢右剉散五色黒豆棗子煎紅痢生地黄春茶甘草節煎服五色乆不效加龍骨赤石脂人參楊芍藥一兩為末蜜丸烏梅甘草湯下粟米飲亦可乳香散治痢疾重者數服止人參白术當歸地榆阿膠各一兩蚌粉炒黄甘草各一錢乳香肉荳䓻二箇麵褁煨右剉散每服三錢以水一盞煎七分去滓温服仍兼服來復丹地榆散治大人小兒脾胃氣虚冷熱不調下痢膿血赤多白少或因腸胃乘虚為熱毒所滲下痢純血臍腹疞痛裏急後重口燥煩渇小便不利純下鮮血或先經下痢不應服熱藥悮服熱藥藴毒不散積於膓間滲而成血者並宜服之地榆炒乾葛各半斤茯苓去皮赤茯苓各六兩乾薑炮二兩當歸去苖三兩甘草炙四兩罌粟殻蜜炙十二兩右為末每服二錢用温熟水調下不拘時小兒三歲可服半錢更量歲數加減與之若下痢純白或下紫黒血腸滑不禁者不可服黒虎丹治痢疾不止者用十二月殺的猪膽可収一百之上將雄黄豆装入膽内麝香少許隂乾㸔人大小每服五七粒為細末如紅痢甘草湯下如白痢生薑湯下獨神丸治一切赤白痢不問新乆百藥不效者一名獨聖丸用罌粟殻十兩分作三分一分生用去蒂蕚及穰一分醋炒一分蜜炙為末用蜜丸小指頭大紅痢生地黄春茶煎湯嚼下白痢烏梅甘草節但為末二錢陳米鹽梅湯亦効一方薑煎一方用米醋一盞且炙且蘸候盡色黄為度焙乾研為末煉蜜丸彈子大毎服一丸水一盞入生薑如指面大一塊搥破煎八分通口服樗白皮散治下痢諸藥不效用樗白皮一握粳米五十粒䓤白一握甘草一二寸䜴二合水一升取半升頓服小兒量大小加减陟釐丸治百病下痢及傷寒身熱頭痛目赤四肢煩疼不觧恊熱下痢或醫已吐下之腹内虚熱煩欲得冷飲食不能消腹中急痛温食則吐乍熱乍冷状如瘟瘧或小便不利氣滿嘔逆下痢不止水中陟釐五兩厚朴一兩漢中木防已六兩黄連三兩隴西當歸四兩紫石英三兩三歲醇苦酒五升上好豉三升右皆取真新者以苦酒二升漬防己極令潤出之留苦酒置以利刀切防已厚令一分使厚薄悉等以板瓦覆着炭火上以厚紙藉瓦上布滿取防已以着紙上訖從頭依次翻周而復始令色槁燥復投向餘苦酒中更出着瓦上焙之如此盡苦酒止勿令火猛徐徐焙冷極燥各搗下篩畢都合搗千杵以餘三升苦酒漬豉一宿眀旦以瓦盆盛之以一盆覆之蒸五升土下湏土氣通流熱出之於盆中研䜴以新布絞取濃汁如棗膏法以和藥搗三千杵頓為丸皆如水中鷄頭子大分着數囊中懸令隂乾取燥乃更盛着凾以蠟蜜封其際勿令見風塵此藥三丸為一劑平旦井花水服一劑晝服一劑暮服一劑皆水服之初服寧少食當於未食前服藥若飲食消腹中調和者日可一服若已瘥三二日可一服消息以意若病重藥力未行者但益服之日可四五劑或時下不止者當復更増令腹中有藥力飲食消是其效也新服藥未安調當水飱助藥力心中了然後可作羮臛但當冷食之耳若有時不喜冷食者正是藥力盡耳復益服藥至一宿許則復欲盡冷也若欲不復藥者但稍温食藥力自盡矣服藥不必強多飲水自隨體調耳乆虚服之如法禁熱食生魚肉蒜生菜酒縁酒力發藥力令病者煩熱也又禁腥物及諸肥膩難消物皆莫食若有風病加防風一兩人虚可加石斛一兩若宿有下痢脾胃損弱者可加太一餘粮二兩半取石中黄軟者若婦人産後疾加石硫黄二兩小便黄赤不利加蒲黄一兩依方消息之無不得效胡治云舊有五石赤石脂白石英鍾乳礬石并禹餘粮石各四兩常以二目合之泊宅編云姚祐自殿監遷入座母夫人病痢諸藥不效令李昻筮甄革有真人指靈草語之一日登對上訝其色悴具以寔奏詔賜一散子數服而愈久乃知椿莢子一味為末耳余撿本草椿筴主大便下血今處處有之夏中生莢樗之有花者無莢有莢者無花常見生樗上未見椿有莢者然世俗不辨椿樗之異故俗皆以此為椿莢其寔樗莢耳注云樗皮主再痢日華子云樗皮温無毒止㵼及脚風入藥時用蜜炙藥性論云樗白皮之性號㣲熱無毒能治赤白痢腸滑痔疾㵼血不止下白利成血後不行足治大人丹痢出本草用紅蜀葵葉搗汁服之可恐腹痛即煖飲之白馬骨出本草治水痢以白馬骨莖葉煑汁服主水痢不問冷熱出本草取松楊皮濃煎令黒冷服一升瘥治水痢出本草方見本門冷痢類止水痢後渇不止出本草以赤𤓰實汁服之治水痢出本草以葎草煑汁及生汁服之澁腹止㵼出本草以橡斗子煑食之亦可止飢主水痢出本草以棎子生食之九盞湯出本草主下痢不問冷熱赤白畧帶休息久下悉主之以黄連長三寸三十枚秤重一兩半龍骨如棊子四枚重四分附子大者一枚薑一兩半並切先以水五合着銅噐中去火三寸煎沸便下著土上沸止又添水五合如此九上九下内諸藥著火上沸轍下著土上沸止又復九上九下度可得一升頓服即止張仲景治痢紫參湯出本草用紫參半升甘草二兩以水五升内甘草煎取半升分温作三服斷下藥以酸石榴皮湏老木所結及陳久者㣲炙為末以焼粟米飯為丸梧桐子大食前熱米飲下三十至五十丸以知為度如寒滑加附子赤石脂各一倍治下痢心胸滿腹不快腹中雷鳴或嘔吐黄連橘皮甘草各二兩龍骨生薑半夏各三兩人參大棗十五枚右㕮咀以水一斗先煑一大沸内藥煑取三升分四服並妊娠良阿膠梅連丸治下痢不問乆新赤白青黒疼痛諸症金井阿膠凈草灰炒透眀白别研不細者再炒研細烏梅肉去核炒黄蘖剉炒黄連當歸焙赤芍藥乾薑炮赤茯苓各等分半兩右為末入阿膠研匀水丸桐子大温米飲下十丸食前夜五六服小兒如菉荳大忌油膩物痢藥乳香散白梅一兩灰焼棗子一兩焼灰罌粟殻一兩焼灰訶子半兩焼灰右為細末毎服一二錢水一小盞乳香黒豆大一塊同煎七分不拘時温服治痢方用蠟茶細末不拘多少白梅和丸赤甘草湯下白痢烏梅湯下泄㵼不止陳米飲下每服二十丸團茶尤佳大凡痢疾不問赤白當先辨冷熱之異若手足和暖則為陽當先服五苓散粟米飲調下次服感應丸二十粒即愈若手足厥冷則為隂當服暖藥如已寒丸附子之類如此治痢無不效有人夏月患痢一日六七十行用五苓散立效木香散治痢疾腹痛南木香五錢地榆一兩黄連七錢青皮去穰赤芍藥枳殻煨去穰乳香甘草各五錢右為末每服二錢熱湯調服酸石榴皮散治一切痢不問赤白或一日之間一二百行一服便踈再二三服即愈石榴皮陳皮甘草川當歸罌粟殻去蒂穰各半兩剉散用水十盞煎取三盞次用下藥茯苓七錢粉草七錢北五味子七箇作棗子右為末將前藥汁入此三味再煎五七沸去滓空心服甚者不過兩劑輕者一劑立效治痢如神烏梅七箇楮實子七箇甘草七寸杏仁七枚米殻七箇雄黄豆四十粒棗七箇生薑七片右㕮咀水煎無時服之治一切痢無效冝服此藥巴豆五七枚去皮心研紙褁壓出油桃仁二十枚去雙仁湯浸去皮尖麩炒黄杏仁二十枚去雙仁湯浸去皮尖麩炒令黄硃砂一分硫黄一分砒霜一分麝香半錢右同研令細用軟飯和丸菉豆大每服以粥飲下三丸忌食熱物遇仙立效散治諸般惡痢或赤或白或濃淡相雜裏急後重臍腹絞痛或下五色或如魚腦日夜無度或噤口不食未問大人小兒虚弱老人産婦並冝服此御米殻去蒂蓋炒黄川當歸洗甘草各二兩赤芍藥酸石榴皮地榆闕右為粗散每服三錢水一盞半煎七分去滓空心温服小兒量歲數加减以瘥為度忌生冷油膩腥臊等物一方赤茯苓北棗等分黒豆散小黒豆炒川楝子烏梅甘草乾薑罌粟殻三箇去蒂穰右剉散煎七分將紗濾過澄自然汁空腹服治大人小兒痢疾胡椒甘草米殻䓤白乾棗杏仁竹葉七片右㕮咀水煎服之神效又方治暑毒濕氣下痢右用雄黄一味乾蒸研為末甘草調服即效如聖飲治痢㯽榔半兩大附子半兩甘草半兩地榆半兩陳橘皮二錢去白右為粗末每服半兩作一服水一盞半紫蘓莖舊者一二寸煎至一盞空心食前熱服留滓再煎如㵼不止必多服屡試皆效救命延年男婦一切重痢黄連六兩乾薑川當歸阿膠各三兩右為末米醋煑阿膠令消盡量藥多少令醋恰好不可剰將藥末搜醋丸梧桐子大每服二十丸飯飲吞下駐馬丸主救命延年治男婦一切重痢方見本門合痢類消食止痢令人強徤及服食未能㫁榖者以橡斗子啖之葢橡斗子非果榖而最益人氣無氣而受氣無味而受味常服最有益平補散治痢後不止手足冷此藥補之温脾正氣白术甘草白薑陳皮各二錢茯苓木香各一錢肉荳䓻三箇煨右為末食前空心乃可服鹽湯下一錢日三四服痢止手足温食進却住服金粟湯治男婦室女小兒一切下痢不問新乆冷熱不調日夜無度臍腹絞痛即痢肢體困倦小便閉澁不思飲食漸痩又治傷生冷脾胃虚弱飲食不消腹脹腸鳴泄㵼不止連月不瘥並冝服之陳皮去白一兩一分車前子炒四兩乾薑炮二兩甘草炒罌粟殻去穰蒂蜜炒各半斤右為末每服二錢水一盞棗一箇薑二片煎七分空心食前稍熱服或飯飲調下亦得忌生冷油膩魚鮓醤等物治痢疾黄連巴豆去殻各二兩右和炒赤色分㨂各另研為末以菉豆打糊為丸粟米大作記認二處各自安頓巴豆末作一處為丸黄連末别作為丸白痢黄連丸二十粒米湯米泔下赤痢用巴豆丸二十粒井水下黄連丸療痢無問冷熱並主之一名黄連阿膠丸方見本門白痢類􅙈角丸但是痢服之無不瘥􅙈角屑取黒色文理粗者産后稱佳宣府黄連金州黄蘖赤色𦂳薄者苦參多買輕搗川當歸五物取粉右等分别搗搗了秤和為散空腹爛煑穤米飲和一錢服之日再忌粘滑生菜油膩腸風黒散治荣衛氣虚風邪冷氣進襲臟腑之内或食生冷或啖炙煿或飲酒過度積熱腸間致使腸胃虚弱糟粕不聚大便鮮血臍腹疼痛裏急後重或肛門脱出或乆患酒痢大便頻併並皆療之敗㯶焼木饅頭焼烏梅去核甘草炙各二兩右為細末每服二錢水一盞煎至一盞空心温服治痢紫苑桔梗赤芍藥白术已上各等分右為細末每服三五錢細切羊肝拌之作麵角兒焼服之白湯送下食前蒼术芍藥湯治痢疾痛甚者蒼术一兩芍藥一兩黄苓桂各五錢右剉每服一兩水煎訶子散如腹痛漸已泄下㣲少宜止之訶子皮一兩生熟各半木香半兩黄連三錢甘草炙各二錢右為細末每服二錢以白术芍藥湯調下如止之不已乃内有餘邪訶子散内加厚朴一兩竭其邪氣也若泄久不愈者多傳變為痢疾太隂𫝊至少隂是為鬼邪先以厚朴枳實湯防其大變黄連阿膠湯治毒痢及腸蠱注下血如豚肝心煩腹痛又脉或大或小浮熖而起下血如豚肝五内切痛此或因服五石湯丸逼損氣甚則血自百脉經絡而耒注下甚蠱毒此為難治阿膠一兩炒黄連二兩黄栢一兩炒梔子仁半兩右為粗末每服四錢用水一盞煎七分去滓服不拘時聖棗子出醫方集成治一切下痢臍腹疞痛木香二錢半乳香别研沒藥别研各一錢肉荳䓻二枚麵褁煨右為末每服一錢大乾棗一枚去核先入一半藥末在内次用水浸巴豆半粒再入藥末半錢合定用油餅紙裹一指厚火煨麵熟為度去麵巴豆不用只細嚼棗藥空心米飲下一方用乳香一兩研肉荳䓻二兩煨作末陳米糊丸效猪肝丸出千金方治下痢腸滑飲食及服藥俱完出者猪肝一斤熬乾黄連烏梅肉阿膠各二兩胡粉七棊子大右為末蜜丸梧桐子大酒服二十丸日三亦可為散服方寸匕郁子丸出危氏方治痢後風手足不能屈伸或麻痘証變手足筋急亦能治之郁李仁枳殻川獨活鼈甲醋炙黄右等分為末木𤓰湯調下治一切痢有效出聖惠方寒水石一分附子一分炮去皮為末砒霜一分定粉一分右都研粉以水浸蒸餅和丸如黍米大每服三丸不拘時以新汲水下忌食熱物又方出聖惠方硃砂二兩硫黄一兩砒霜半兩黄丹一兩㣲炒右和細研如粉水浸蒸餅和丸桐子大每服以冷飲下一丸忌食熱物又方出聖惠方巴豆十枚去皮心出油硫黄三分硃砂三分右為細末研如粉以麵糊和丸菉豆大每服以新汲水下二丸忌食熱物又方出聖惠方白礬一兩焼灰硃砂半兩麝香半錢右都研如粉糯米飯和丸如黄米大每服不計時以二宜湯下十丸又方出聖惠方巴豆七枚去皮心出油深色臙脂二錢右先研巴豆末次入臙脂同研令細煮棗肉和丸黍米大每服以冷飲下三丸小兒一丸忌食熱物黄丸子出醫方大成止諸痢黄連八兩枳殻四兩大黄栢皮四兩右為末麵糊為丸空心飲湯下如裏急後重加枳殻湯下參附湯出危氏方人參綿附炮去皮臍肉荳䓻㣲火煨裂右剉散每服二錢水一盞半生薑七片棗二枚煎食前服治痢𦂳嚴絶妙金櫻花葉及子罌粟殻去穰及蒂蕚醋炒右為未用蜜丸手指頭大五花痢用春茶陳皮煎湯如痢用蜜一匙春茶烏梅煎湯服下香茸丸出危氏方治下痢危困氣血衰弱麝香半錢别研臨時入鹿茸刮去皮毛酥炙一兩右鹿茸為末方入麝香以燈心煑棗肉為丸梧桐子大每服五十丸空心食前用米飲下若再添入乳香半兩尤有效楊梅方和五臟能滌腸胃除熱潰氣切不可多食甚能損齒及筋亦能治痢用楊梅焼灰服之獨聖丸治痢用川烏頭一箇好者柴灰火焼烟令盡放地上盞子合良乆細研用酒蠟丸大如麻子每服三丸亦痢用黄連甘草黒豆煎湯冷吞下如白用黒豆甘草煎湯放冷吞下如㵼及肚疼水吞下每於空心服之忌熱物治癆痢及癥瘕甚効用羊腎合脂為羔以蒜虀食脂一升甚驗治下痢用小麥炒粉一合和服㫁治痢藥出百一選方用罌粟殻并去核䑕查子各數枚焙乾末米飲下治噤口痢䑕查子即糖毬百水散出百一選方治一切痢不問赤白或一日之間一二百行只一服便踈再三服即愈魏不伐方罌粟殻三斤去皮上下蒂頂隔剉成片子蜜炒令赤色净秤厚朴三斤去粗皮净炒用生薑汁淹一宿炙令薑汁盡為度右為細末每服二三錢米飲調下忌生冷油膩魚酥毒物三日三神丹治痢疾方見本門赤白痢類濟泄丹治痢疾巴豆七粒去殻膜丁香四十二箇胡椒四十二箇右藥為末糯米和丸菉荳大每服一丸赤米飲下白薑湯下赤白薑飲湯送下男婦皆可小者小丸一方各用一百三十三箇赤痢蜜湯下白痢砂糖湯下痢疾藥黄栢一兩用蜜炙透巴豆三錢不去油右為末滴水為丸梧子大每服三丸赤甘草湯下白薑湯下小兒一丸心痛艾醋湯熱服氣噎薄荷湯下治千百種雜下出肘後方黄連三兩烏梅四十枚右以水八升煑取四升停冷内鷄子白一枚攪調又煎取二升分為三服一方下痢熱諸治不瘥為末蜜丸桐子大每服二十丸三夜薑茶治痢法出危氏方治赤白冷熱諸痢及暑毒食毒治痢下腹痛肚皮熱手不可近用老生薑切如豆許與茶葉等分用新水煎一服一方如白痢用蜜赤痢用薑末効服真人養臟湯再加芍藥當歸立止若熱痢即留薑皮冷即去皮大炒薑能助陽茶能助隂二者能調隂陽失宜治痢一名沙調散出經驗良方用臘茶不拘多少新舊細研如赤痢用蜜同水煎白痢用連皮薑研自然汁同水煎每水一盞煎半盞空心服二服即愈經騐方用臘茶二錢湯㸃七分傾一蛤蜊生麻油在内攪勻空心服之須㬰腹痛大下即止予少年親服之作效真方聖散子治男婦脾胃受濕中脘停寒吃物頻傷心胸滿悶脇肋膨脹腸鳴虚痞小腹堅痛臍下強急或大便不調水榖遲化裏急後重下痢膿血或五色或便如魚腦或如豆汁或有鮮血或如爛肉日夜無度久不愈嗜卧怠惰虚瘦肢體沉重寒熱不時此藥固養脾胃温中止腹痛服之有效御米殻五兩搗碎醋炙黄色甘草炙黄赤石脂烏魚骨去皮肉荳䓻麺褁煨去麺楝丁香訶子皮乾薑炮各二兩右為末每服先用水一盞入如乳香少許煎七分沸調藥末二錢和滓食前熱服治痢疾用臘月雀兒割開腸肚去皮毛用去皮巴豆一箇放在内入沙石罐内盛頓炭火焼作黒研細另用好酒煑黄蠟百十沸將蠟取出磁盞内化開黄蠟却將雀兒末一處為丸每服一二十丸不拘時候如紅痢甘草湯下白痢乾薑湯下花紅痢甘草乾薑湯下蘹香子方治瘴痢渾身熱連背項用茴香子搗取汁服治痢亦治㵼血用芫荽子一合搗碎赤者用糖水調白者用生薑自然汁調水服一方酒調服又方用砂糖水作雜椒料等物將烏龜去殻爛煑食之以多為度即愈交和散治痢用御米殻去隔蒂乾凈安排新瓦上炙焦黄為末次入平胃散如赤則用御米殻末二錢白則用平胃散二分次飲湯調下治暑痢用五苓散粳米煎湯送下消暑丸治痢用杜蒺藜炒為末酒調二三服楮實方治瘴痢無問老少日夜百餘度者取乾楮葉三兩熬搗為末煎烏梅湯服方寸兼取羊猪裏膜内榖道痢出即止治疳痢方取樗根搗絞汁一鷄子殻許和粟米泔一鷄子許服以知為度即瘥甚騐如神小兒加减用之治痢用黄丹不拘多少熔黄蠟和劑為丸豌豆大每服三丸赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑兼用之一方治痢東榆西栁樹南桃塞北雲桑節節髙此是周公出行法萬兩黄金也不消治卒下痢多驗方用韭葉煑鯽魚鮓食之治暴痢方用小鯉魚一枚焼為末米飲服之大人小兒俱服得一方四兩去鱗紙褁火煨煑粥飲下又方用搗蒜兩足下貼之治卒下痢湯方方見本門諸㵼類普濟方卷二百九
