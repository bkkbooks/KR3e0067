body:
  text: 普濟方卷十八明周王朱橚撰心臟門怔忡驚悸附論夫怔忡者此心血不足也蓋心主於血血乃心之主心乃形之君血富則心君自安矣多因汲汲富貴戚戚貧賤又思所愛觸事不意真血虛耗心帝失輔漸成怔忡不已變生諸證舌強恍惚善憂悲少顔色皆心病之候難經云損其心者益其榮法當専補真血真血若冨心帝有輔無不愈者矣又有冒風寒暑濕閉塞諸經令人怔忡五飲停蓄堙塞中脘亦令人怔忡當隨其證施以治法驚悸與忪悸不同驚悸有所大驚或聞虛響或見異相登髙陟險夢寐不祥驚忤心神氣與涎鬱遂使驚悸名曰心驚膽寒在心膽經屬木內外因其脈心動忪悸則因汲汲富貴戚戚貧賤久思所愛遽失所重觸事不意氣鬱涎聚遂致忪悸在心脾經意思所主屬內所因或冒風暑濕塞閉諸經令人忽忽若有所失恐恐如人將捕中脘忪悸此乃外邪非因心病况五飲停蓄閉於中脘最使人忪悸治屬飲家除飲悸與外內因所治人之所主者心心之所養者血心血一虛神氣不守此驚悸之所肇端也驚與悸其可無辨驚者恐怖之謂悸者怔忪之謂心虛而鬱痰則耳聞大聲目擊異物遇險臨危觸事喪志心為之忤使人有惕惕之狀是則為驚心虛而停水則胸中滲漉虛氣流動水既上乘心火惡之心不自安使人有怏怏之狀是則為悸驚者與之豁痰定驚之劑悸者與之逐水消飲之劑所為扶虛不過調養心血和平心氣而已若一切以剛燥用工或者心火自炎又有熱生風之證心為帝王神之所舍諸藏之主不受外邪若人動止非宜寒暄失節臟腑內損氣血外傷風邪乘虛入於心經則令人心不定性識失常乍喜乍怒或歌或笑精神離散悲樂不恆故名風邪也方鎮心丸出千金方治男子婦女虛損夢寤驚悸或失精神婦女赤白注漏或月水不利風邪鬼注寒熱往來腹中積聚憂恚結氣諸病宜服紫石英茯苓菖蒲蓯蓉逺志麥門冬去心大黃當歸細辛卷柏大豆卷乾薑各五分防風人參澤瀉秦艽丹參各六分石膏芍藥柏子仁各三分烏頭桂心桔梗甘草薯蕷各七分白蘞鐵精銀屑前胡牛黃各二分乾地黃十二分白术半夏各八分廣蟲十二枚大棗五十枚右為末蜜棗和搗五千杵丸如梧桐子大酒服五丸日三加至二十丸一本無大豆卷大棗大鎮心丸出千金方所治與前方大同小異凡是心病悉皆主之乾地黃六分牛黃五分一用牛膝羌活桂心麥門冬秦艽芎藭人參逺志紫石英丹砂阿膠甘草大黃銀屑白蘝當歸乾薑防風各八分杏仁蜀椒各三分澤㵼黃耆茯苓大豆卷薯蕷茯神前胡鐵精柏子仁各五分大棗四十枚桑螵蛸十一枚右為末白蜜棗和丸酒服七丸日三加至二十丸神明補心丹出御藥院方治心氣不足神志不定恍惚多驚虛煩少睡心情沉默惡聞人聲一切心虛之證並可常服逺志去心紫石英飛研石菖蒲各八錢熟地黃白茯苓去皮各半兩丹參人參去蘆頭卷柏去根土麥門冬去心黃耆白术澤瀉山茱茰防風秦芃桔梗各四錢川薑柏子仁各二錢半白蘞乾山藥石膏飛研神麯炒當歸半夏生薑製牡丹皮鐵粉飛研芍藥各二錢硃砂研入藥二錢四錢為衣右為末入硃砂令勻煉蜜和丸每兩作十丸硃砂為衣每服一丸人參湯化下溫酒亦得不拘時服大鎮心散出千金方治心虛驚悸夢寐恐畏紫石英茯苓防風人參甘草澤㵼各八分黃耆秦芃白术薯蕷白蘞各六分麥門冬去心當歸各五分桔梗大豆卷柏子仁桂心逺志大黃石膏各四分蜀椒芍藥乾薑細辛各三分右為散酒服二方寸七日三一方無紫石英茯苓澤瀉乾薑有大棗四分蜜丸如梧桐子酒下十五丸鎮心熟乾地黃丸出聖惠方治風臟心虛多驚悸神思昏亂志意不定熟乾地黃白茯苓黃耆銼獨活桂心秦芃去蘆麥門冬去心焙阿膠搗碎炒令黃燥杏仁湯浸去皮尖雙仁麵炒微黃各三分前胡去蘆頭柏子仁澤㵼牛黃細研芎藭逺志去心紫石英細研水飛過防風去蘆頭甘草炙微赤銼各半兩鐵精細研人參去蘆頭硃砂細研水飛過各一兩桑螵蛸五枚微炒右為末入研了藥令勻錬蜜和丸搗二三百杵如梧桐子大每服不計時以溫酒下十丸牛黃丸聖惠方治心臟風邪狂亂失志不得安定牛黃細研如粉鐵精細研如粉石膏龍齒細研如粉地骨皮川升麻玄參葳𬎼赤芍藥生乾地黃黃芩各三錢茯神人參去蘆頭麥門冬去心各一兩枳實麵炒微黃甘草炙微赤銼各半兩金銀箔各五十片細研如粉硃砂一錢細研如粉虎睛一對酒浸一宿微炙右為末都研令勻錬蜜和搗三二百杵丸如梧桐子大不計時煎地骨皮湯下十丸鎮心爽神湯出永類鈐方治心腎不交上盛下虛心神恍惚睡多驚悸小便頻數遺泄白濁常服鎮心安神石菖蒲去毛半兩甘草炙四錢人參去蘆赤茯苓去皮當歸酒浸焙各三錢南星炮一分陳皮去白乾山藥紫苑去蘆半夏酒洗七次川芎不見火五味子去核細辛去苗柏子仁炒枸把子各一錢酸棗仁湯浸去殼炒麥門冬去心通草覆盆子各一錢半右㕮咀每服四錢水一盞蜜一匙煎五分去滓取藥汁入麝香少許再煎一二沸溫服不拘時牛黃散出聖惠方治心臟風邪神魂恍惚心煩語澀牛黃細研龍腦細研硃砂細研雄黃細研麝香細研各一錢沙參去蘆頭獨活羚羊角屑烏頭酒浸去皮骨炙令黃蟬殼天竺黃細研防風去蘆頭柏子仁細辛麥門冬去心焙茯神人參去蘆頭各一兩右為散入研了藥都研令勻每服不計時煎金銀湯調下一錢禹餘糧散出聖惠方治心臟風邪神思不安悲啼哭笑志意不定精神恍惚禹餘糧煆醋淬三遍白芍藥石膏牡礪燒為粉秦芃去苗各一兩半桂心防風去蘆頭逺志去心獨活甘草炙微赤人參去蘆頭麥門冬去心焙菖蒲茯神鐵粉細研雄黃細研如粉各一兩蛇蛻皮一口燒為灰硃砂細研如粉右為散都研令勻每服不計時以麥門冬湯調下一錢逺志湯出千金方補心治心氣虛驚悸喜忘不進食逺志乾薑白术桂心黃耆紫石各三兩防風當歸人參茯苓甘草芎藭茯神羌活各二兩麥門冬半夏各四兩大棗十二枚五味子二合右㕮咀以水一斗三升煮取三升半分五服日三夜二菖蒲散出聖惠方治心臟風虛邪氣恍惚悲泣狂走如有鬼神之狀身體強直或疼痛口噤喉痺水漿不通面目變色不識人者菖蒲秦芃去苗桂心當歸銼微炒蔓荆子人參去蘆頭附子炮製去皮臍黃芩甘草炙微赤逺志去心防風去蘆頭各半兩龍骨赤石脂白茯苓白芍藥芎藭漢防已各三錢右為散每服三錢水一中盞煎至六分去滓不計時放溫漸漸服之小鎮心丸出千金方治心氣少弱驚虛振悸胸中逆氣魘夢參錯謬忘恍惚紫石英硃砂茯神銀屑雄黃菖蒲人參桔梗乾薑逺志甘草當歸桂心各二兩防風細辛鐵精防已各一兩右為末蜜丸如大豆許飲服十丸日三加至二十丸一方用茯苓二兩法丹出永類鈐方治男子婦人心氣不足神志不寧一切心疾憂愁思慮謀用過度或因驚恐傷神失志耗傷心血怔忡恍惚夢寐不安新羅人參熟地黃酒洗蒸焙逺志去心甘草水浸白术當歸去蘆酒浸焙黃耆去蘆茯苓去皮石菖蒲茯神去木益智仁麥門冬去心木鱉子炒去殼石蓮肉去心炒柏子仁揀淨各五兩硃砂五十兩右加人參等各加如法修製銼碎拌勻次將此藥滚和以夾生絹袋盛貯用麻線緊繫袋口於火上安大銀鍋一口著長流水令及七分重安銀罐入白砂蜜二十斤將藥袋懸之心中勿令著底使蜜浸袋令役著桑柴燒鍋滚勿令火歇煮三日蜜焦黑換蜜再煮候七日足住火取出淘去衆藥洗淨研令乾入牛肉蒸七次蒸煮砂時别安銀鍋一口暖水候大鍋水耗從鍋弦添溫水候牛心蒸爛熟取砂再換牛心如前法蒸凡換七次其砂已熟即用沸水淘淨焙乾入乳鉢玉杵研直候十分細米粽為丸如豌豆大隂乾每服十粒至二十粒食後參棗湯麥門冬湯任下一方無木鱉仁用酸棗仁永類鈐方有甘草鎮心丸出聖惠方治心風恍惚驚恐失常或瞋恚悲愁情意不樂紫石英細研飛過硃砂細研水飛過白石英細研水飛過龍腦細研人參去蘆頭細辛赤箭天門冬去心焙熟乾地黃白茯苓犀角屑沙參去蘆頭菖蒲防風去蘆頭各一兩逺志去心半兩右為末都入乳鉢內更同研令勻錬蜜和搗二三百杵丸如梧桐子大每服不計時以溫酒下三十丸人參茯苓湯出千金方治奄奄忽忽朝瘥暮劇驚悸心中憧憧胸滿不下食隂陽氣衰脾胃不磨不欲聞人聲定志下氣人參茯苓逺志甘草各三兩生薑六兩枳實當歸龍腦桔梗各三兩茯神二兩半夏桂心各五兩黃耆四兩大棗二十枚右㕮咀以水一斗二升洗煮粳米五合令熟去滓次入藥煮取四升一服八合日三夜二大定心湯出千金方治心氣虛悸恍惚多忘或夢寤驚魘志少不足人參茯苓茯神逺志赤石脂龍骨乾薑當歸甘草白术芍藥桂心紫苑防風各二兩大棗二十枚右為㕮咀以水一斗二升煮取三升半分五服日三夜二鐵精丸出聖惠方治心臟風虛驚悸恍惚悲愁妄語失志鐵精細研如粉龍齒細研如粉硃砂細研水飛過熟乾地黃各一兩人參去蘆頭白茯苓逺志去心甘草炙微赤銼白薇獨活茯神麥門冬去心焙防風去蘆頭赤石脂白术各三錢右為末入研了藥都研勻錬蜜和搗二三百杵丸如梧桐子大每服不計時粥飲三十丸龍齒散出聖惠方治心風恍惚驚恐心氣不安龍齒細研如粉漢防己麥門冬去心黃耆銼各三錢人參去蘆頭獨活羚羊角屑生乾地黃白茯苓各一兩甘草炙微赤銼細辛桂心逺志去心各三錢杏仁四十五枚湯浸去皮尖雙仁麵炒微黃右為散先以水一大盞入銀一兩煎六分去銀次入藥末四錢又煎至四分去滓入竹瀝半合更煎一兩沸不計時溫服小鎮心散出千金方治心氣不足虛悸恐畏悲思恍惚心神不定惕惕然驚者人參逺志白术附子乾地黃赤小豆桂心黃耆細辛乾薑龍齒防風菖蒲各二兩茯苓四兩右為散酒服二方寸七日三服紫石英散出聖惠方治心臟風虛驚悸失志或瞋恚悲愁志意不樂惕惕苦驚怖紫石英一兩半細研水飛過防風去蘆頭人參去蘆頭細辛羚羊角屑逺志去心各三錢硃砂細研如粉龍骨白鮮皮熟乾地黃鐵精細研如粉各一兩甘草半兩炙微赤銼白茯苓二兩半牛黃一錢細研右為細散入研了藥令勻每服不拘時煎棗湯調下一錢心腎丸出永類鈐方理水火不濟恍惚多忘心忪盜汗夜夢驚恐目暗耳鳴悲憂不樂腰膝緩弱四肢酸疼小便數而赤濁精滑夢遺常服飬心神補氣血生津液進飲食安神定志牛膝去苗酒浸熟地黃洗再蒸蓯蓉酒浸各二兩鹿茸燎去毛好酒塗浸附子炮去皮臍五味子去枝黃耆蜜炙人參去蘆逺志去苗甘草水浸槌去骨山藥炒當歸去蘆頭浸白茯神去木一方作茯苓龍骨煆各一兩兔絲子酒浸蒸研成餅三兩右為末用酒浸煮薄麵糊為丸梧子大每服五七十丸棗湯空心食前服大定心散治風虛驚悸恍惚多忘或夢寤驚魘人參去蘆頭茯神熟乾地黃逺志去心龍腦白术琥珀白芍藥紫苑淨去苗土防風去蘆頭赤石脂各一兩柏子仁三錢甘草半兩炙微赤銼右為散每服四錢水一中盞棗三枚煎至六分去滓不計時溫服真珠丸出聖惠方治心臟風邪恍惚夜睡驚恐不得眠卧真珠細研如粉玳瑁硃砂細研水飛過各稱一兩雄黃細研如粉胡黃連逺志去心烏犀角屑牛黃細研如粉馬牙硝鐵粉細研各半兩龍腦細研麝香細研各一錢虎睛一對酒浸一宿微炙右為末入研了藥都研令勻煉蜜和搗三二百杵丸如菉豆大每服不計時溫酒下十丸養心湯出直指方治心虛血少驚悸不寧黃耆炙白茯苓茯神半夏麯當歸川芎各半兩逺志取肉薑汁淹焙辣桂酸棗仁浸去皮隔紙炒香柏子仁北五味子人參各一