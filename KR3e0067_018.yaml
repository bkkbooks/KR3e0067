兩研薤白四兩治驚悸心熱頭疼眀目並以醍醐傅腦頂心半夏麻黄丸治心下悸以半夏麻黄二物䓁分篩末蜜丸大如小豆每服三丸日三心狂附論夫邪哭使魂魄不安者血氣少也氣少者屬於心心氣虚者其人即畏合目欲眠夢逺行而精神離散魂魄妄行隂氣衰者即為癲陽氣衰者即為狂五臓者魂魄之宅舍精神之所依託也魂魄飛揚者其五臓空虚也即邪神居之神靈所使鬼下之脉短而㣲其臓不足則魂魄不安魂属於肝魄属於肺肺主津液即為涕泣出肺氣衰者即泣出肝氣衰者魂則不安肝主善怒其聲呼風熱搏於陽經入於血脉實則生熱榮氣溢塞不能通流遂使心神煩亂也心主於神候於舌神是心主舌是心官語言機關皆由心出今心既壅熱又風邪相攻故令真性錯亂精神不守則遂狂言也内經謂神有餘則笑不休葢心蔵神在聲為笑在志為喜今心氣實則神有餘而陽氣越所以有喜笑之證方七寳鎮心丸治心風狂語錯亂似如邪瘧發作有時玉屑金屑銀屑黄丹硃砂細研水飛過鐵精細研逺志去心鬼臼去毛人參去蘆頭茯神龍齒麥冬去心焙虎骨頭塗酥炙令黄犀角屑各一兩真珠細研如粉雄黄細研如粉琥珀細研如粉白鮮皮牡丹防風去蘆頭龍膽去蘆頭羚羊角屑各半兩虎睛一對酒浸一宿㣲炙牛黄細研麝香細研各一錢右為末入研了藥都研令勻錬蜜和𢷬三五百杵丸如梧桐子大每服不計時以温水下五丸硃砂散治心風煩躁狂言胸膈壅滯神思不安硃砂細研如粉茯神人參去蘆頭犀角屑防風去蘆頭麥門冬去心焙真珠末羚羊角屑子芩𤣥參天竹黄細研甘菊花川升麻各一兩牛黄細研龍腦細研麝香細研鉛霜細研各一錢甘草半兩炙㣲赤剉右為細末入研了藥都研令勻每服不計時煎金銀湯調下一錢鎮心丸治心風狂言多驚迷悶恍惚犀角屑人參去蘆頭茯神各一兩天竺黄細研硃砂細研如粉龍齒逺志去心生乾地黄龍膽去蘆頭各半兩鉛霜細研牛黄細研各一錢金箔細研各五十片鐵粉細研三錢右為末入研了藥都研令勻錬蜜和𢷬三二百杵丸如小豆大每服不計時煎竹葉湯下七丸犀角丸治心臓風熱上衝頭面心係牽急時時驚恐狂言不定神志不安犀角屑天竺黄露蜂房㣲炙各三兩防風去蘆頭人參去蘆頭川升麻㯽榔各半兩光明砂細研水飛過鐵精各一兩細研龍齒一兩半研如粉金箔五十片細研銀箔五十片細研右如法製為末都入研了藥時令研勻錬蜜和𢷬一二百杵丸如梧桐子大每服不計時温水下二十丸升麻散治心風熱狂言神思不定口乾煩悶川升麻半兩硃砂細研如粉犀角屑茯神甘草炙㣲赤剉龍膽去蘆頭人參去蘆頭麥門冬去心焙寒水石天竺黄細研各三錢牛黄一錢細研右為細散入研了藥都研令勻每於食後以薄荷湯調一錢茯神散治心風狂言恍惚恐懼茯神杏仁湯浸去皮尖雙人麩炒㣲黄川升麻白鮮皮沙參去蘆頭龍齒逺志去心犀角屑各一兩石膏二兩右為散每服三錢水一中盞生薑半分煎至六分去滓食後温服真珠散治心風狂語神思不安如見鬼神真珠細研水精細研鉛霜細研琥珀細研牛黄細研各一錢人參去蘆頭為末硃砂細研各一兩雄黄半兩細研金銀箔各五十片細研右藥都研令勻每於食後薄荷湯調下半錢治發狂者用車轂中脂如鷄子熱温淳苦酒以投脂甚攪令消服令盡龍齒丸治心神狂越多喜善笑如邪祟龍齒逺志去心生乾地黄焙白茯苓去黑皮天門冬去心焙山芋防風去乂五味子車前子麥門冬去心焙地骨皮去土人參各等分右為末煉蜜丸如桐子大每日空心竹葉湯下二十丸日再服龍膽丸治心實熱驚悸善笑龍膽山梔子仁白薇茯神去木大黄剉炒各二兩麥門冬去心焙三兩人參甘草炙剉各一兩半羚羊角鎊𤣥參各二兩半右為末煉蜜丸如梧桐子大每服食後煎棗湯下三十丸升麻湯出楊子建護命方治心氣實熱神思不安常思狂走喜笑無度坐卧不安診其心脉浮洪實大升麻黄芩去黒心白茯苓去黑皮麥門冬去心焙大黄剉炒羗活去蘆頭木香犀角鎊沉香剉𤣥參各䓁分硃砂五分右𢷬篩毎服三錢水一盞於銀器内煎八分去滓食後服𤣥參湯治心實熱驚悸喜笑心神不安𤣥參白薇茯神去木山梔子仁羚羊角鎊各八兩石膏碎五兩人參一兩生地黄洗控乾五兩右㕮咀如豆大每服五錢水一盞半煎八分去滓入竹瀝一合再煎三兩沸不拘時服丹砂丸出王氏博濟方治心神恍惚自語自笑舉止不常丹砂研乳香酸棗仁去皮研各半兩右再合研令勻酒麵糊和丸如梧桐子大冷水下十丸不拘時服丹砂酒出百一選方治心神恍惚又好登髙臨險言語不避親疎時時自笑髙聲呌呼舉止無常大便秘小便赤觧衣露軆不能安處虚言妄語亂話神鬼方丹砂半兩成塊者麝香二錢右同研細和勻用無灰酒二升於􅀢瓶内浸以慢火煨時用銀筯攪令熱每服隨患人平時飲酒多少令至患候睡着急用厚衣被葢之汗出病愈若患人不能多飲只用丹砂一分麝香半分酒一升製如前法時時飲之以盡為度心神已定却服補心氣藥即愈吕少張淳熙壬寅丁家難積憂之後遂成狂陽之疾服此一劑即定繼以𬎼仁之類心氣藥七日而安廖碩夫知府云治心恙方肉桂去粗皮荆芥穗藿香葉去土薄荷葉藁本洗去土焙乾香白芷麻黄去根不去節焙没藥别研天麻去苗牛膝洗切南星焙甘松去土烏藥川芎各三兩焙乳香二兩别研右細末合和糯米糊為劑每兩作十五丸男子女人一切風疾每服一丸磨化茶酒任下不拘時卒中不語口眼喎斜左癱右瘓煨䓤酒下傷風頭疼夾腦風生䓤茶下四肢頭面虚腫沙豆淋酒下風熱腫痛生薑薄荷汁同調酒送下胸膈疾實旋暈昏悶臘茶清下渾身病丙穩禾疹蜜湯下下臓攻耳内蟬鳴煨猪腰子細嚼温酒送下腰疼腿痛乳香酒下風毒攻眼冷淚昏暗菊花茶下乾濕脚氣木𤓰酒下婦人血氣攻刺當歸酒下血風疼痛醋湯下蘂珠丸出經騐良方治心恙猪心一個取血硃砂一兩為衣青靛花一匙右先将青靛暴乾次取猪心血一處同研爛次入硃砂末丸梧桐子大每服二十丸茶酒下不拘時甚者不過三服朱雀丸出醫方大成治心神不定恍惚不樂火不下降時服振跳常服消隂養火全心氣茯神二兩去皮沉香半兩右為末煉蜜丸如小豆大每服三十丸食後人參湯下一醉散一名一醉膏出永銓方治心恙用無灰酒二碗真麻油四兩和勻楊桞枝二十條逐條攪一二百下換遍桞條直候油酒相乳入如膏煎至七分碗狂者强灌之令睡熟或吐或不吐覺來却醒獨効苦丁香散出永類鈐方治忽患心疾癲狂不止得之驚憂之極疾氣上犯心包當伐其源以苦丁香及𤓰蒂半兩為末每服一錢重井花水調滿一盞投之得大吐之後熟睡勿令人驚起凡吐令目翻吐時令閉雙目或不省人事則令人以手宻掩之信乎深痼之疾必投瞑眩之藥吐不止以生麝香少許温湯調即觧治驚勞失志方出千金方甘草桂心各二兩龍骨防風麥門冬牡蠣逺志各一兩茯神五兩大棗二十枚右㕮咀以水八升煮取二升分二服相去如人行五里乆再進服逺志丸出十便良方治因驚言語顛錯不能服温藥硃砂半兩入麝香少許同研金箔五片逺志南星白附子白茯苓酸棗仁人參各半兩右為末煉蜜和丸如梧桐子大硃砂為衣每服三十丸薄荷湯送下食後臨卧服一方無人參茯神散出十便良方茯神熟乾地黄白芍藥川芎當歸桔梗白茯苓逺志人參各等分右為末每服二錢水一盞燈心棗同煎七分不拘時宋明逺教授母七十四嵗因戎馬驚疾如上證服此二方得効治心風出百一選方張徳明閤中失心數年服此而愈再作服第二方得安并治受邪狂言妄語不定水銀半兩生薄荷一大握和水銀如泥細研建茶好者研一錢麝香一錢半夏一兩以生薑汁煮至五十沸取出作塊子切更煮令熟焙乾搗為細末右藥都在薄荷泥内更研千百轉丸如芥子大金銀湯下十五丸臨卧時服三日再進第二方一名珠砂丸出余君七選竒方硃砂乳香各一兩並别研人參白茯苓茯神琥珀各半兩石菖蒲半兩小而節宻者酸棗仁温酒浸半日去殻紙上炒令香熟一錢以一兩半浸去殻只得一錢仁逺志酒浸半日新布裹椎去心焙乾半兩以一兩只得半兩肉右為末煉蜜丸如梧桐子大毎服二十丸食後酒下日進二服如不能飲酒以棗湯下可常服治失心方蛇含石代赭石各四兩並煆通紅醋淬鐵粉二兩麝香二錢硃砂一半入料一半為衣右為末用糯米粉二兩作糊為丸分作二百六十丸每服一二丸棗湯送下寧志膏出直指方治因驚失心心氣虚耗神不守舍恐怖驚惕恍惚健忘睡卧不寧夢渉危險赤白濁甚一切心疾並皆治之寧神定志安眠止痛人參酸棗仁湯浸去皮各一兩辰砂半兩滴乳香一錢乳缽坐水研一方無乳香右為末煉蜜和杵丸如彈子大每服一丸薄荷湯化下一方治心臓虧虚神志不守恐怖驚惕常多恍惚易於健忘睡卧不寧夢渉危險一切心疾並皆治之用温酒棗湯亦可空心臨卧化下一方温人參湯化下荆芥湯亦可又云人有弟婦縁兵火失心製此方與之一服二十粒愈又多傳服之皆騐治失心方黄丹硝石各二兩右煆硝石成汁以皂角逐小叚子投其中直候無火方止去皂角以黄狗肝一具用竹刀切作片子糝藥末數錢於中同煮食之張徳明傳秦太師以治徐履之疾欝金丸出海上方治失心恙心風蝉肚欝金真川者七兩明礬二兩右為末薄荷糊為丸如梧桐子大每服六十丸湯水任下有患癲狂者三服見効數年者亦愈至人授此初服心胸間有物脫去神炁洒然再服而甦此經憂痰絡心竅所致也辰砂丸治狂語言不避親疎此由憂思過甚辰砂一兩右以瑠璃器盞露四十九夜細研入牛黄一分䗶汁丸如豌豆大毎日空心新水下一丸水晶湯出指南方水晶半兩沉香逺志去心各一錢人參一錢麥門冬去心二錢石菖蒲茯神各二錢金一兩右㕮咀水一升煮至半升空心服金露丸出和劑方治痰迷竅恍惚狂言婦人痰血上衝或歌或笑言語狂亂並皆治之生乾地黄焙貝母去心各一兩巴豆去心膜醋煮二十沸用緩火培令乾取一兩黄連洗焙二兩桔梗去蘆柴胡去蘆吳茱茰湯洗七次防風去蘆紫苑去苗菖蒲米泔浸一夕乾薑炮白茯苓去皮蜀椒出目去汗厚朴去皮薑製枳殻去白麸炒鱉甲米醋煮黄人參去蘆甘草炙甘松洗浄各一兩草烏頭炮用二兩芎藭去蘆桂心不見火右為末以麵糊丸如梧桐子大每服五丸心中痰患薑湯下心痛酸石榴皮湯下口瘡蜜湯下頭痛石膏湯䓤茶下一切脾氣橘皮湯下水㵼氣㵼陳皮湯下赤白痢甘草乾薑湯下胷膈噎悶通草湯下婦人血氣當歸酒下疝氣嵐氣小膓氣反下墜附子湯下傷冷腹痛酒食所傷黄疸結氣痞塞鶴膝並用鹽湯酒下一方用甘遂洗心散出如宜方治心熱語亂煩渇眼澁口枯唇焦白术一兩半麻黄當歸芍藥甘草荆芥穗大黄麫裹煨各六兩右為末生薑薄荷湯加辰砂末服排風湯出如宜方治風虚冷濕閉塞諸經恍惚妄言白术白鮮皮川芎白芍藥當歸肉桂防風杏仁製甘草各一兩川獨活麻黄茯苓各三兩右㕮咀四錢薑七片棗二枚煎温服育神散出如宜方治虚弱多驚怔忡語言不節人參白术茯苓茯神去木當歸乾薑炮逺志製紫苑茸赤石脂桂心紅芍藥龍骨各半錢右㕮咀薑棗煎食後服吞雄朱丸礬丹出如宜方治顛狂走妄語見鬼無問冷熱國丹晋礬等分右作磚壚一窠可容二兩許安丹在下礬在上以炭五斤燒令盡取出細研以不經水猪心血為丸如菉豆大毎一十丸或二十丸用陳皮湯吞下又宜牛黄清心丸雄硃丸治狂邪發無常披頭大呌欲殺人不避水火出千金方用苦參以蜜丸如梧桐子大每服十丸薄荷湯下煉砂丹出指南方辰砂天仙子擇净各一兩右以水一碗銀器内煮令天仙子芽出去天仙子不用将辰砂研令極細滴蜜和丸如豌豆大空心人參湯下一丸普濟方卷十八
