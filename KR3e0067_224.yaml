無他止令人鬚髮反白耳合時切忌穢觸并婦人孝子雞犬等見此方非特烏髪鬚而已且大能安養榮衞補益五臟和調六腑滋充百脉潤澤三焦活血取氣添精實髓最要節色慾使藥力功效之驗速也歸神丹出孟氏詵詵方専治丈夫思慮過多役損心氣致神不守舍不能管攝精氣之失無常故精滑冷遺白濁皆由心虛不能攝致宜服此藥引神歸舍辰硃砂二兩搥作小粒不可成麄粉豬心大者一枚去筋膜畧批開朱砂布於内再合右猪心用燈心遍纒合用宻以麻線縛定入銀石鐺内用酒及好醋二味各一升同煑令乾取出去燈心緩緩收下硃砂微炒乾乳鉢内研令極細將所煑餘酒醋打清麵糊為丸如梧桐子大每服九丸用大棗煎湯吞下半空心服數服之後便覺心志安寧無異夣神既守舍則心火下交腎水陽事漸興切不可輕洩須後服他藥補得真氣濃實方可施洩一法加白茯苓二兩為丸每服十八丸鹿茸丸出聖濟總録能平補諸虛益氣血壯筋骨鹿茸去毛酥炙附子炮製去皮臍續斷側栢葉厚朴去麄皮生薑汁炙黄耆剉各一兩阿膠炙燥當歸切焙熟乾地黄焙麝香各五錢右為細末煉蜜和丸如梧桐子大空心米飲下三十丸温酒鹽湯皆可服山芋丸出聖濟總録主平補諸虛百損山芋牛膝酒浸切焙絲子酒浸另搗白茯苓去黑皮巴㦸天去心澤㵼赤石脂各二兩五味子炒杜仲去麄皮酥炙剉山茱茰各一兩右為末煉蜜為丸如梧桐子大每服三十丸空心温酒下參耆散出御藥院方専治虛寒自汗調榮衞補不足人參黄耆當歸芍藥白术五味子官桂甘草前胡秦芁右各等分為細末每服五錢水一盞入生薑五片棗二枚同煎服大五補丸出聖濟總録天門冬麥門冬菖蒲茯神人參益智炒枸杞子地骨皮逺志熟地黄以上各等分右為末煉蜜為丸如梧桐子大空心酒下三十丸本方數服以七宣丸泄之壯氣丸出百一選方茴香炒巴㦸破故紙葫蘆巴𤣥胡索山芋附子炒金鈴子桂以上各三兩木香一兩五錢右為細末酒糊為丸每服五十丸温酒鹽湯下十精丸出經驗良方主升降隂陽既濟水火平補心腎及治下虛上盛破故紙炒逺志去心白茯苓益智仁炒青鹽炒另研各一兩絲子酒浸牛膝川當歸酒浸一宿各二兩石菖蒲九節者山茱茰各五錢右為細末用豶猪腰子一隻去膜和酒研細煑麵作糊丸如梧桐子大每服四五十丸食前鹽湯或温酒下如小便赤而少煎車前子湯下如心虚精神不定用茯苓湯下如夜間煩躁不得睡用酸棗仁末調湯下如心氣盛塞煎麥門冬湯下日二服一方去菖蒲加熟乾地黄二兩用羊腰子丸十寶丸出瑞竹堂能專益肝脾胃三經其功不可具述破故紙酒浸一宿焙乾附子炮製去皮臍秤蒼术剉泔水浸一宿焙乾當歸去蘆頭各一兩大棗去核五錢枸杞子焙五錢絲子酒浸焙乾蓯蓉酒浸焙乾白茯苓去皮各五錢地黄去蘆揀肥壯酒浸蒸焙乾以透黑為度仔細裂全在此一味焙乾二兩右為細末醋糊為丸如梧桐子大每服三十五丸空心用酒或鹽湯送下乾物壓之神仙三黄丸出聖濟總録能平補換骨駐色延年生地黄三十斤木臼搗取自然汁生乾地黄焙熟乾地黄焙各一斤為末鹿角膠炙燥為末大麻仁研乾漆搗末㸃醋炒煙盡為度各四兩甘草炙剉杏仁去皮尖雙仁研炒蜜各半斤右各修製搗研七味為末先以無灰酒一斗與生地黄汁并蜜於銀器内用慢火煎以桞枝攪將欲成膏便入諸藥同熬可丸即丸如梧桐子大每服三十丸空心食前靣東温酒下加至五十丸九子丸出聖濟總録能補隂血補陽氣壯精神倍力强陽補腎益精氣壯筋骨鹿茸一兩刮去毛塗酥炙令黄色其味甘酸其性温熱每主男子腰腎虚冷脚膝少力夜多異夢精自出助隂肉蓯蓉四兩酒浸三宿切焙乾其味丼酸醎其性温治男子絶陽不興女子絶隂不産潤五臟長肌肉煖腰膝益精令人有子仙茅一兩以糯米泔浸三宿用竹刀刮去皮於槐木砧子上切隂乾其味辛其性温主丈夫虚損老人失弱婦人失血無子久服通神强記壯筋骨益肌膚長精神明目彭祖常服逺志一兩去心其味苦其性温主傷中補不足除邪氣利九竅益智慧聰耳明目强志不忘久服輕身不老好顔色益精續斷一兩搥碎去筋醇酒浸一宿其味苦辛其性愠主助氣潤血脉補不足蛇床子一兩微炒其味苦辛甘其性平主男子隂痿濕癢久服輕身好顔色强力令人有子巴㦸一兩去心其味辛甘其性温主隂痿强筋骨安五臟補中増志益氣蘹香子一兩舶上者微炒其味辛其性平主膀胱腎間冷氣國人重之云有助陽道用之車前子一兩其味甘其性平微寒主男子傷中强隂益精令人明目利水道右為細末用鹿角脊髓五條去血脉筋膜以無灰酒一升煑熬成膏更研爛同煉蜜少許和丸如梧桐子大每服五十丸温酒下空心服不足者能補痿者能健滑者能澁弱者能强久服延年不老令人多子人參散出本事方主補虛損老少一切虛症並皆治之人參桂去皮不見火白术茯苓黄蓍熟地黄洗川芎甘草川當歸各等分右為末每服二錢水一盞生薑三片棗子二枚同煎至七分空心服中丹出簡易方能補諸虛百損體勞少力少氣善驚昏憒上焦客熱中脘冷痰不能多食心腹脹滿脾胃氣衰精血妄行容色枯瘁黄茋白芍藥當歸各四兩白茯苓人參桂心各一兩川椒炒去汗一兩大附子黄芩各一兩為末薑汁和作餅右為末薑汁和作餅再細研粟米飲搜和得所搗千杵丸如梧桐子大酒飲任下三五十丸食前服神仙八味丸出聖濟總録性平補壯氣活血駐色輕身徤骨牛膝去苖一斤葳靈仙净洗巴㦸天去心各四兩石斛去根四兩天麻半斤切以上四味用好酒二斗浸兩宿焙何首烏一斤去黑皮米泔浸軟切於黑豆中蒸爛焙乾肉蓯蓉去土二斤洗切用前浸藥酒同於銀石器内慢火熬成膏海桐皮剉半斤右除蓯蓉膏外搗羅為末用蓯蓉膏和搗千杵丸如梧桐子大每服二十丸至三十丸空心食前温酒下日三服久服辟風邪調榮衞順三焦烏髭鬚楮實丸出聖濟總録能平補下元治諸虛冷益陽道令人久立不倦年八十歲服之靣不焦乳母服之令子肥白方見本門補虛駐顔色類八味地黄丸腎脾氣虛或時脚腫方見腎臟門腎虛類八物腎氣丸出御藥院方主平補腎氣堅固牙齒活血駐顔色益壽方見本門補虛固精類八仙丸出楊氏傳家藏方療元臟氣虛頭昏靣腫目暗耳鳴四肢疲倦歩履艱難肢節麻木肌體羸肩拘急兩脇脹滿水榖不消吃食無味恍惚多忘精神不清並宜服之肉蓯蓉牛膝天麻去苖木瓜去子各四兩並用酒浸三日焙乾當歸洗焙二兩附子一兩炮去皮臍鹿茸一兩火去毛酥炙麝香一分另研右為末煉蜜和丸如梧桐子大每服五十丸空心温酒下烏沉湯出澹療方能生氣血補心腎虛損之人服此當勝大建中湯人參當歸大者去蘆白术炒各一兩天台烏藥沉香各五錢附子煨去皮臍白茯苓去皮各一兩肉桂去皮五錢右為末每服二錢水一盞薑五片棗一枚煎空心服香茸丸出永類鈐方能治諸虛鹿茸熟乾地黄各二兩附子破故紙蓯蓉當歸各一兩沉香五錢麝香一錢右為末煉蜜杵丸如梧桐子大每服五十丸空心鹽湯下加减大建中湯治内虛極冷手足厥逆小腹攣痛不堪勞苦食减喘乏夢寐精泄補中益氣血黄耆芍藥各四錢人參當歸切焙甘草炙各二錢桂六錢熟附子四錢老衰久冷加至二錢半半夏洗七次五錢右㕮咀每服二錢水二盞薑一錢三分棗半枚慢火同煎至一盞去滓温服食前日進二三服石刻安腎丸補下元蒼术半斤川椒破故紙葫蘆巴陳皮茴香炒續斷川楝各四兩右為末酒糊丸如梧桐子大每服六十丸空心鹽湯或温酒下六神丸出醫學切問中一名菖蒲丸平補諸虛大益氣血亦治男子婦人虛憊事多忘精神恍惚四肢不能動石菖蒲洗剉焙地骨皮洗焙逺志牛膝去苖酒浸焙生乾地黄絲子酒浸七日炒另搗羅為末各等分右除兎絲子外並為末再與兎絲子一處和勻煉蜜丸如梧桐子大每服二十丸空心食前温酒或鹽湯下加至三十丸犢髓全陽膏出徳生堂大凡體氣虛弱動感疾病羸痩少食似無大害積久可憂不慣服藥者用此治之小牛犢兒一隻未知隂陽不見日者宰過撏去毛開破洗淨肚臟全體不遺大鍋頓煑黄耆一斤剉净皮甘草官桂陳皮良薑各四兩麄剉川椒去子凈四兩鹽二兩好酒二斗右以各藥同酒椒鹽入肉鍋内用水添至八分以慢火熬肉爛如泥取骨搥髓盡化濾去肉骨藥俱净稠汁冷入甕内盖覆掘土深藏露甕靣如法遮蔽凢遇吃飯麵食諸物即取甕内犢兒肉汁任意調和食内以盡為度小地黄煎丸出聖濟總録能平補益顔色烏髭髮令人肥徤生地黄十斤洗漉出一宿後搗絞取汁鹿角膠一斤紫蘇子炒二升酥一斤半生薑半斤絞取汁蜜二升酒四升右先以文火煎地黄汁一二沸即以酒研紫蘇子濾取汁投之又煎二十沸下膠候消盡下酥蜜薑汁等同煎稠如餳收於淨磁器中每服取一匙温酒化飲之人參丸出本事方能平補五臟虛弱六腑怯弱充肌膚進飲食人參山芋白术白茯苓石斛黄耆取頭末五味子以上各一兩右為細末煉蜜和丸如梧桐子每服三十丸空心食前飲下久服不熱尤宜少年者服治虛弱除心腹惡氣以烏雄鷄一隻治食法五味汁和納一器中封口重湯中煑之使骨肉相離食之甚補益仍須空腹時飽食之肉須爛生即有損亦可五味罨經宿炙食之分作兩頓草還丹治上明眼目中煖水臟下補丹田疏風順氣烏髭髪凡病愈後氣體不得復元者服之雖痩弱人亦得氣血調順身體肥徤不可以藥性微少而忽之俗諺云見方不重藥只取其效也予得此方於東平閠候之家常以此藥活人多矣川椒四兩净蒼术泔水浸三日小茴香鹽炒各三兩白茯苓川烏炮一兩甘草二兩右為細末加附子一兩尤佳却不用川烏麵糊為丸如梧桐子大每服五七十丸空心酒或鹽湯下四製蒼术丸出德生堂所治證與前草還丹同又能烏髮髭蒼术一斤分四處一分酒浸一分童子便浸一分泔水浸一分鹽水浸春五夏三秋五冬七日川椒去目炒小茴香破故紙酒浸炒川楝肉炒何首烏白茯苓各四兩右為末酒糊為丸如梧桐子大每服六十丸空心鹽酒湯下沉香鹿茸丸出和劑方能鎮心腎養肝益五臟調順三焦沉香一兩剉穿心巴㦸去心二兩絲子五兩酒浸一宿焙鹿茸去毛酒炙去皮三兩附子四兩炮去皮臍須熟炮為妙熟地黄六兩須是自製好者右為細末入麝香一錢半另研入和匀煉蜜為丸如梧桐子大每服四五十粒好酒鹽湯空心吞下常服調養真氣益精明目恱顔色平補熟乾地黄丸出聖濟總録能治諸虛方見本門補虛益髭髪類鍾乳酒治虛損通順血脉極補下氣鍾乳碎綿裹石斛蓯蓉各五兩附子甘菊花三兩右㕮咀以清酒三斗漬服日二合再稍增至一升栢子仁丸出御藥院方能補益元氣充實肌膚山茱茰四兩逺志去心皮栢子仁各五錢覆盆子山藥另取末各一兩右為細末用山藥白麵同酒煑糊丸如梧桐子大每服三十丸温酒下空心食前服日進二服保神丸出御藥院方善調和心腎補養精神白茯苓黄連各二兩菖蒲逺志各一兩硃砂五錢為衣右為細末水浸蒸餅和丸如梧桐子大每服五十丸煎人參湯下臨臥服漸漸加至八十丸斑龍丸出百一選方鹿角膠以酒浸膠數日煑糊丸入衆藥鹿角霜研為細末絲子洗浄酒浸兩夜蒸研栢子仁净者另研熟地黄好者酒浸兩宿蒸焙餘酒入在膠内各十兩右先焙鹿角霜絲子地黄乾了碾為細末方入栢子仁在衆藥内研却將鹿角膠酒約三四升煑足糊丸於石臼内杵三千下令熟丸之梧桐子大每早晚空心五十丸至一百丸止逐日早晚服久大有功效鹽湯或酒任下熟乾地黄丸出本事方専治虛損熟乾地黄五兩絲子四兩另研鹿茸三兩附子二兩沉香一兩右為細末入麝香五分煉蜜杵丸如梧桐子大每服三十丸至五十丸鹽湯温酒任下五補丸出和劑方昔麗正殿學士李子昭㓜好道甞棲名山徃來茅蒿間三十載傳此二方人參茯苓去皮地骨皮乾地黄牛膝各等分右搗篩蜜和丸如梧桐子大空腹以酒飲下三十丸稍增至五十丸日再此是五補丸服五日十日及半月日覺氣擁即服後七宣丸服經二三日覺氣散還服五補丸若病後未退少少増之常自審以取調適中須五補及七宣丸並須合服之夫人所疾皆因風不宣散即成擁緩熱風若氣不流行即成痃癖冷氣轉生衆病皆因此由尋其本源都為不嫺將理覺虛則補風氣擁疾利利即腰背更虛且凡是利藥皆急服便透過未能蓄洩諸病凡是補藥皆滯服未見效先覺風發動明知宣補必藉兼行名曰五補七宣此所以安七魄鎮五臟堅骨髓養神明久服長生百病日去髮黑行及奔馬七宣丸大黄煨五兩枳實炙五兩青木香柴胡各五兩甘草四兩炙訶梨勒皮五兩桃仁六兩去尖皮炒右搗篩蜜和丸如桐子大以酒服二十丸稍加至五十丸病在下空心服在上食後服之以宣利為度増减以意量之若風氣結聚宿食不消兼石皮沙毛在腹中服經七八日乃盡出下似牛涎魚腦等若病深則須半月或一月專服之不用五補丸若積年腰膝疼痛寒冷如氷脚氣衝心潰悶將死頭旋暗倒肩背重悶心腹脹滿胸膈閉塞風毒腫氣連及頭靣及大小便或利澁脾胃氣不理不能食服之盡瘥夜臥脚轉筋脉疼痛恍惚眠寢不安等疾以飲服之盡瘥此藥功效不可盡說如前十數種病攻擊則須七宣丸令除外感輕病不妨與五補丸兼服循環不輟補養無限不問男女老少並可服餌但須量氣力細察候之加减服若嬰孩可與三丸五丸少少加之取通利其二方當須經久常服不限春夏秋冬朝夕行止間藥性甚善竟如常法平補蓯蓉四倍丸出聖濟總録蓯蓉酒浸一宿去麄皮切焙二兩菊花六兩牛膝酒浸一宿切焙四兩枸杞八兩右為末煉蜜丸如梧桐子大每服三十丸空心温酒服下山芋四倍丸出聖濟總録性平補除風益壽延年山芋五錢枸杞子一兩甘菊花二兩熟乾地黄焙四兩右為末煉蜜丸如梧桐子大空心食前鹽湯下三十丸温酒亦得四金丸出聖濟總録能平補五臟壯筋骨益顔色美飲食肉蓯蓉酒浸一宿焙牛膝酒浸一宿焙天麻青鹽細研各三兩右除鹽外為末與鹽匀和用木瓜一枚除心蒸爛去皮入臼中與四味藥同搗丸如梧桐子大若乾少少入酒丸每服五十丸空心夜卧煖酒下萬壽地芝丸出御藥院方能和顔色利血氣調百節黑髮堅齒逐風散氣愈百病生地黄天門冬去心各八兩枳殻去穰麸炒各四兩右為細末酒蜜麵糊為丸如梧桐子大每服三十丸漸加至四十丸五十丸空心温酒下晩食前再服黄連茯苓丸出御藥院方壯水源降心火黄連白茯苓各四兩破故紙㣲炒菖蒲各五錢右為細末酒麵糊為丸如梧桐子大每服六十丸食前温水下之𤣥兔丹出百一選方能治腎水枯竭津液不生煩渇諸症並皆治之一方有人參絲子十兩五味子七兩一名𤣥及白茯苓五兩蓮肉二兩右為細末以山藥六兩打薄糊為丸每服五十丸鹽酒任下復春丹出醫方大成穿心巴㦸酒浸蓽薢酥炙破故紙酒浸一宿芝蔴同炒熟去蔴揀净杜仲酥炙去絲以上各等分右為細末胡桃仁十五個水煎去皮另研如泥與前藥用酒打麵糊為丸如梧桐子大每服三十丸至四十丸空心酒下忌油膩之物猪羊血菉豆粉芫荽漿水冷物俱忌服之大效平補枸杞子丸出聖濟總録石斛去根一兩鹿茸去毛酥炙地骨皮各一分右焙搗羅為末以紅枸杞子自然汁二合無灰酒一合白蜜五錢熬成膏丸如梧桐子大每服三十丸空心温酒或生薑湯下平補仙术丸出聖濟總録蒼术三斤米泔浸一宿切炒為末生乾地黄切焙為末一斤枸杞一斤為末右為末用好酒二升先調枸杞子末成膏次將蒼术地黄二藥同搗三百杵丸如梧桐子大每服三十丸空心汲水下一方用枸杞子為末一斤同蒼术地黄二藥成膏為度三才丸出御藥院方能滋隂養血潤補不燥養氣和神天門冬去心生地黄各三兩二味用桞甑蒸以酒洒之九曝乾用人參去蘆二兩右同為末以棗肉為丸如梧桐子大每服三十丸食前温酒下日進三服歲久為驗一方用蜜麵糊為丸或米飲亦可服封髓丹出御藥院方専降心火益腎水黄蘗三兩縮砂仁四兩五錢甘草三兩右為細末水煑麵糊稀和丸如梧桐子大每服五十丸用蓯蓉五錢切作片子酒一大盞浸一宿次日煎三四沸去滓送下空心食前服雙芝丸出家藏經驗方麋鹿茸用五兩只用一色亦得鎊細酒浸夏一宿春秋二宿冬浸三宿取出瀝令乾慢火焙沉香七錢川附子兩個六錢者炮去皮臍右為細末鹿角膠三兩麸炒另為末用酒慢火熬成膏入麝香三錢研細搜藥入臼搗數百杵令匀和丸如梧桐子大每服三十丸空心温酒下加至五十丸一方無麝香麋鹿茸丸出十便良方主治腎經虛腰不能反麋茸一兩如無麋茸以鹿茸代絲子取末一兩舶上茴香五錢右為末以腎二對如法酒煑爛去膜研如泥和丸如梧桐子大隂乾如腎膏少入酒糊佐之每服三十丸温酒鹽湯下芙蓉丹出濟生方能治心腎不足氣不升降用心過度驚悸多忘附子一兩炮硃砂五錢右為末煑糊為丸鹽湯空心下五十丸雙補丸出朱氏集驗方能治下部弱腎水冷平補不燥不熱熟地黄補精絲子補腎各五錢右為細末酒糊丸如梧桐子大每服五十丸人參湯下如氣不順沉香湯下如心氣虛茯苓湯下如心氣煩躁不得眠酸棗仁湯下腎氣動茴香湯下小便少車前子湯下小便多益智湯下此法乃劉子受之祖在京師辟雍得史戴之傳此法服之四十年年八十矣固真丸一名鹿角霜丸出御藥院方専治腎經虛損真元不足以鹿角一對用殺者去頂骨截作三寸長短觧作兩鏤秤見斤兩用河水浸七日每日一換新水浸候日數足每角一斤入好黄蠟一兩用磁缸子内以河水用桑柴火煑三伏時不得住火如水少漸添浸着角後煑得角軟削去黑皮只取霜曬乾將煑角汁再以慢火熬成清膠每用鹿角霜一斤入上好者雪白茯苓五兩刮去黑皮二味同搗為細末將鹿角膠水搜和為丸如梧桐子大每服五十丸空心用温酒下漸漸加至一百丸亦得若不吃酒以清米飲下亦可常服煖丹田補真氣活血脉徤筋骨添精固氣延年助陽丙丁丸出本事方能生血養氣降升水火附子一個九錢重炮川烏一個七錢重炮當歸二兩酒浸赤芍藥五兩沉香益智各五錢右為末浸當歸酒煑麵糊丸如梧桐子大硃砂為衣每服五十丸空心温酒鹽湯任下婦人淡醋湯下麝香鹿茸丸出百一選方能治諸虛不足當歸酒浸一宿鹿茸去皮酥炙鹿角霜各三兩麝香三錢研細肉蓯蓉酒浸一宿附子炮製去皮臍各二兩右為細末用鹿角膠四兩鎔作汁和丸如梧桐子大每服五十丸空心酒鹽湯下日一服鹿角膠仝用難和藥可入湯二三合同煑如缺以阿膠代之治大病後不足病虛勞補虛取七歲至十五歲以丄黄牛乳一升水四升煎取一升如飢少少飲不得多服十日住治虛弱出本草用鯽魚一味五味熟煑食之服大豆法長肌膚益顔色填骨髓加氣力補虛又能嗜食痩人服兩劑即令肥充不可識肥人不得服之用大豆五升取肥好者一依作醬法料理取黄搗末以絹篩之以猪肪脂銷煉如法去滓以膏和豆末作丸訖以油帛塞之置於宻器中收之一方服如梧桐子大五十丸漸加至一百丸日再酒飲任下一無所禁服十日以後食不知飽也鎮心丸明目鎮保心氣寧飬神志宣暢氣血觧諸癰黄疸鼻衂小水淋痛宜服之黄芩去黑心大黄各一兩炙熟荆芥穗龍腦薄荷去根甘草炙芍藥山梔子各二兩右為末麵糊丸如梧桐子大每服三十丸温熟水下不拘時候熟乾地黄丸出衛生家寳方當常服平補益顔色填骨髓去勞倦膈熱喀血等疾熟乾地黄十兩温湯洗過焙乾秤枸杞子五兩揀擇净洗焙乾秤肉桂五錢不見火去麄皮右件先將熟乾地黄枸杞子二味搗為細末另搗桂為細末一處拌匀煉蜜為丸如梧桐子大每服三十丸至五十丸空心食前用温酒或温熟水下日二服養真丸出余居士選竒方能治内補腑臟外充百脉資血平氣調筋强力進食養精更宜常服功不可述當歸去蘆酒浸一宿湯洗過焙乾熟地黄洗浄焙乾各乾秤三兩北五味子去梗一兩川芎人參茯苓白术黄耆各一兩右件為細末煉蜜丸如梧桐子大每服三十丸食前米飲吞下椒紅丸出醫學切問能安五臟壯筋骨明目去昏進飲食川椒三兩巴㦸去心茴香川楝子肉山藥各一兩右為末酒為丸如梧桐子大温酒吞下五十丸空心下老人加附子一兩通用炮過養腎丸出醫學切問性平補人參一兩破故紙一兩右為末胡桃一百個取肉為丸每服五十丸空心温酒送下陽起石出孟氏詵詵方能治丈夫隂陽衰微陽事不舉纔交即洩寒精自流胸中短氣隂汗盗汗冷痛或癢而生瘡出黄濃水冝服此藥助隂壯陽逺志洗取肉五錢陽起石煆沉香不見火北五味嫰鹿茸酸棗仁去皮桑螵蛸微炒龍骨白茯苓鍾乳粉各一兩天雄一兩薑汁製去臍兎絲子二兩右為末煉蜜丸如梧桐子大每服四十丸炒茴香白茯苓煎湯吞下若陽臟人服覺火熱去天雄加肉蓯蓉平補蓯蓉煎出十便良方能補虛填精髓蓯蓉五味子山茱茰杜仲茯苓牛膝酒浸切焙絲子薯蕷右件等分搗羅為細末以酒煑麵糊丸如梧桐子大每服三十丸空心米飲下下氣補益出本草以蘇子研之雜米作糜食之甚肥美補治方出本草以金櫻子熬作膏酒服有效十精丸出百一選方専治下部常服吴茱茰茴香台椒三味同炒焦黄色破故紙炒良薑炒川楝子去核皮陳皮青皮蒼术大川烏用青鹽炒赤色去皮尖右十味各一兩同為細末酒糊為丸每服二十丸至三十丸空心鹽湯任下婦人米醋湯下六益丸出朱氏集驗方主専補脾腎乃劉通真家秘方丁香木香肉荳蔲麵煨白附子炮附子炮一兩老人尤炒血茸右件各一兩為末酒糊為丸如梧桐子大每服三十五丸温酒下普濟方卷二百二十四
