body:
  text: 普濟方卷二百二十四明周王朱橚撰諸虛門平補附論夫一隂一陽謂道偏隂陽之謂疾不明乎道未能有治人之疾者世人貪餌藥石惟務酷烈非徒無益反傷和氣故方書論平補之法欲隂陽適平而已方神仙巨勝子丸一名益壽丹黄精木通當歸黄耆蓮子廣木香枸杞子肉蓯蓉酒浸熟地黄酒浸何首烏人參破故紙栢子仁巴㦸酒浸去皮山茱茰絲子酒浸杜仲酒浸酸棗仁五味子酒浸各二兩天雄一對如無附子亦可石菖蒲酒浸楮實子甘菊花牛膝酒浸三日小茴香炒各一兩川烏頭炮白茯苓覆盆子逺志去心酒浸焙天門冬酒浸去皮各一兩右為細末春夏煉蜜為丸秋冬棗肉為丸如梧桐子大每服三十丸温酒空心下日進二服諸病盡除耳聾眼暗並皆治之服至一月真氣元成五十日頭白再黑百日顔如童子若遇冬天單衣不寒年老七十無子服此藥生數子年至百歲忌服日期正月初四日二月初七日三月初六日四月十八日五月十六日六月二十七日七月二十四日八月二十九日九月二十一日并二十四日十月全忌十一月二十四日十二月二十日還童丹一名保靈丹一名延壽丹一名隂陽丹出徳生堂大能壯氣血筋力助脾胃進飲食益顔色添精髓固元陽沉香白茯苓木通熟地晚蠶蛾桑螵蛸巴㦸酒浸去心安息香研益智仁牛膝酒浸葫蘆巴酒浸各一兩木香一兩五錢紅花没藥研蓮蕊蓮肉净細墨燒烟五色龍骨煆硃砂為衣各五錢兎絲子酒浸七錢五分蓯蓉一兩二錢酒浸破故紙七錢酒浸青鹽三錢麝香一錢海馬一對酥微炙炒母丁香七錢右為細末酒糊為丸每服三十丸加至五十丸空心酒下此藥不濕不燥老少可服大通氣血駐顔生精服之七日見效夏月茶清下妙乾物壓之附子蓯蓉丸出聖濟總録主平補壯元陽附子炮製去皮臍一枚肉蓯蓉酒浸一宿蒸焙楮實酒浸一宿蒸熟補骨脂炒蘹香子炒兎絲子酒浸一宿蒸熟研焙牛膝酒浸切焙杏仁去皮尖雙仁炒白茯苓去黑皮當歸蓽撥炒桃仁去皮尖雙仁炒各五錢逺志去心山茱茰打破炒柴胡去蘆頭黄耆剉細巴㦸天去心各三分蕪荑炮山芋各一兩大蒜煨六顆蜀椒去目及閉口炒出汗黄蠟各二兩右除蓯蓉桃仁楮實蒜蠟外並搗羅為末先取精羊肉去皮骨一斤半細切用水煑熟次入好酒三升熬爛次入黄蠟候鎔都取出細研入楮實桃杏仁蓯蓉蒜等一處爛研如膏入前藥末和丸如梧桐子大每服十五丸至二十丸空心鹽湯酒下小金丹一名彭祖丸出三因方主補益勞血去風冷消百病諸虛不足老人精枯神耗女子絶傷斷緒久服益壽延年安神寧志定魄流滋氣血脉絡開益智慧釋散風濕耳目聰明筋力强壯肌膚悅澤氣宇泰定熟地黄肉蓯蓉酒浸各六兩五味子絲子酒浸各五兩栢子仁天門冬去心蛇床子炒覆盆子巴㦸去心石斛各三兩續斷澤㵼人參山藥逺志去心炒山茱茰菖蒲去毛桂心白茯苓杜仲剉炒絲斷各三兩天雄炮去皮臍一兩煉成鍾乳粉扶衰三兩續老二兩常調一兩氣虛則不用右為末蜜丸如梧桐子大食前酒服三十丸至五十丸忌五辛生葱蕪餳鯉虛人去鍾乳倍地黄多忘倍逺志茯苓少氣神虛倍覆盆子欲光澤倍栢子仁風虛倍天雄虛寒倍桂心小便赤濁三倍茯苓一倍澤㵼吐逆倍人參石斛丸出聖濟總録主平補諸虛不足石斛去根逺志去心檳榔煨剉牛膝酒浸一宿焙桑螵蛸炙焦研桂去麄皮乾薑炮各五錢覆盆子微炒巴㦸天去心微炒肉蓯蓉酒浸去皮焙枳殻去瓤麸炒栢子仁研各二兩澤㵼二分陳皮去白二兩鹿茸一對去毛酥炙蒺藜炒各三分天雄炮去皮臍絲子酒浸搗爛焙三次各二兩右為細末和勻煉蜜為丸如梧桐子大每服三十丸空心鹽湯下補骨脂丸出聖濟總録主平補諸虛益精壯陽補骨脂炒松脂山芋白茯苓去黑皮各八兩杏仁湯浸去皮尖雙仁炒焦三升胡桃肉棗各一斤鹿角膠炙燥十兩桂去麄皮牛膝酒浸切焙澤㵼菖蒲薏苡仁萆薢檳榔煨剉獨活去蘆頭蒺藜子炒去角蛇床子各一兩生地黄二十斤取汁右除地黄汁外搗羅為末煎地黄汁成入藥㸃蜜和丸如梧桐子大每服空腹温酒下三十丸經驗補益方石菖蒲川當歸白蒺藜絲子木香各三分丁香酒浸破故紙炒没藥各三分半八角茴香四分半鹽炒熟為度木通七分炙川練子七分麸炒馬藺花七分半醋浸炒桂花龍骨葫蘆巴炒吴茱茰湯浸洗七次各五分仙靈脾九分半醋炙蛇床子地膚子四分右為細末用羊羔兒精肉一斤以刀刮去筋膜無灰酒熬成膏子為丸丸如梧桐子大每服五十丸空心酒下乾物壓之温補藥沉香木通木香丁香八角茴香杜仲炒去絲葫蘆巴楮皮炒破故紙炒川萆􅐺韮子炒甘草肉桂穿山甲地龍菊花枸杞子各一兩無名異二分半青木香半兩右為細末蜜糊為丸如梧桐子大温酒下三十五丸空心服壯元丹治肝腎虛精血不足眼昏黑花迎風有涙頭暈耳鳴服之甚效或腎風下疰腰脚沉重筋骨痠疼歩履無力隂汗盗汗濕癢生瘡常服耐寒暑進飲食黑髭髪潤肌膚壯筋骨牛膝酒浸三日蓯蓉酒浸一日熟地黄川芎覆盆子各二兩石斛一兩五錢去根絲子一兩酒浸三日當歸續斷巴㦸白茯苓山茱茰枸杞子肉桂各一兩五味子防風杜仲炒各半兩右為末用蜜丸如梧桐子大每服五十丸空心食前用鹽湯酒下歸茸丸補諸虛當歸酒洗鹿茸酒浸炙北黄耆鹽水炙沉香靈砂三兩研北五味子炒逺志肉酸棗仁吴茱茰茴香炒破故紙煆牡蠣煆熟地黄蒸人參龍骨煆附子炮巴㦸各一兩右煆製法酒糊丸如梧桐子大每服七十丸空心温酒下温補藥温補下元壯筋骨安神定志去痰驅風乳香没藥木香沉香當歸酒浸肉蓯蓉酒浸破故紙酒浸川續斷酒浸半夏茴香白茯苓天麻官桂琥珀各一兩杜仲麝香辰砂各一錢為衣右為細末酒糊為丸如梧桐子大每服五六十丸空心温酒或鹽湯下乾物壓之沉香猪肚丸出百一選方沉香丁香木通木香川椒炒蓽澄茄陳皮葫蘆巴炒破故紙吴茱茰桂巴㦸去心茴香牛膝肉蓯蓉附子炮去皮臍各三兩檳榔剉肉荳蔲各四兩右為細末生猪肚一個去脂先用生絹袋盛藥末令在猪肚内縫合用酸漿水一桶於銀石鍋内煑令猪肚軟取出放冷不用猪肚將藥焙乾酒麵糊為丸如梧桐子大每服五十丸温酒下婦人醋湯下與壯氣丸相間服此藥雖男子藥婦人久病氣虛服之大驗史忡花母親服取效團參丸出百一選方團參桑白皮剉各二兩人參陳皮洗桂去皮白术訶子去核麥門冬去心大腹皮剉炒杏仁炒去皮尖半夏麯各一兩檳榔剉芫花醋炒附子炮去皮澤㵼吴茱茰炒枳實麸炒去穰各五錢右為細末薑麺糊為丸如梧桐子大每服米飲下十丸未效加至三十丸劉尉服時去芫花加牽牛粉五錢取效牽牛只取第一次用丸作大丸或以水一盞煎服尤妙石菖蒲丸出聖濟總録主平補諸虛久服輕身延年活血益氣潤澤肌體石菖蒲九節者佳一兩五錢栢子仁杜仲去麄皮炙剉百部山芋甘草炙五味子貝母去心丹參各一兩人參蒸防風白茯苓去黑皮茯神去木各一兩五錢逺志去心五錢生乾地黄焙二兩麥門冬去心焙二兩右為末煉蜜和丸如彈子大每服一丸空心食前熟水嚼下日進三服摩腰膏補下元虛憊白濁若摩一丸空心食前熟水摩腰下如火至二丸血脉舒暢三服顔色恱澤十丸骨徤身輕氣全精足骨髓堅完母丁香木香硃砂藿香附子乾薑沉香桂生硫黄枯礬吴茱茰雄黄杏仁陳皮各二錢麝香輕粉一錢右除麝香輕粉為末却入前味研勻蜜丸小鷄子大每服用老薑汁煎滚傾盞内將一丸浸汁中良久化破研之為汁令人蘸藥於腰上摩之藥盡為度須㬰腰上如火但是諸虛之病悉治之地黄煎丸平補諸虛生地黄二十斤洗搗取汁熟地黄焙二斤甘草剉八兩炙鹿角膠炙四兩生乾地黄焙二斤絲子酒浸另搗醇酒一斗用無灰者白蒺藜炒去角牛膝酒浸切焙乾漆用酒拌和末白檳榔煨剉白茯苓去黑皮枳殻去瓤麸炒萆􅐺覆盆子去梗各四兩右取生地黄汁并酒外並各細搗羅為末先取地黄汁與酒五升於銀石鍋内慢火煎三二十沸次下鹿角膠攪勻消盡次下地黄末又次下諸藥添酒以柳枝不住攪候可為丸即分為二十劑餘以蠟紙塞於寛瓷瓶内封貯逐一劑旋取丸如梧桐子大每服三十丸加至五十丸空心食前温酒下餘剰藥收經三月餘取於中日曝之依前收封貯兼治虛勞諸風等疾牢牙齒榮髭髪久服堅筋骨長肌肉悅顔色聰耳明目令人壯徤萬病不生用地黄酒下尤佳延年丸平補五臟治百病方見本門補益强力益志類一名枸杞子丸固真丸治諸虛不足常服補益五臟接助真陽潤澤肌膚强壯筋骨川烏頭鹽炒黄色去鹽熟地黄浸洗焙秦艽各二兩肉桂去皮茴香酒浸炒葳靈仙山藥仙靈脾五味子炒各一兩萆􅐺附子炮去皮臍白茯苓去皮當歸洗焙牛膝酒浸一宿石菖蒲各五錢右為末煉蜜和搗千餘下丸如梧桐子大每服五十丸空心温酒鹽湯下一方無牛膝坎離丸治心脾腎三經不足蒼术八兩剉如豆大泔浸二日或焙或曬乾分作四處一分用真烏頭一兩去皮臍切作片子又用川楝子淨肉一兩同蒼术一處炒焦黄色為度一分用川椒去目一兩又陳皮一兩破故紙一兩酒浸一宿炒令乾次下蒼术川椒一處炒黄一分用茴香淨一兩青鹽一兩半食鹽炒半夏一兩先下蒼术炒熱次下茴香等一處炒黄色一分用醇釀酒醋各一盃煑蒼术令自乾熟燥入後藥麥門冬去心三分焙乾天門冬去心三分焙茯神去麄皮木三分炒逺志去心三分焙沉香一兩焙鹿茸燎去毛酥炙葫蘆巴酒浸焙川巴㦸去心酒浸炒各五分當歸酒浸淨焙人參去蘆枸杞子雀腦五錢川芎陳皮去穰各半兩右為細末好酒煑神麴米二兩打糊為丸如梧桐子大服四十五丸空心服如補心棗湯下補腎温酒鹽湯送下飛歩丸茅山蒼术半斤米泔浸一宿切片子用老葱白同炒半黄色為度小茴香四兩炒杜仲炒去絲肉蓯蓉酒浸絲子酒浸各一兩為餅八角茴香炒南木香生韮子酒浸破故紙炒川楝子取肉炒葫蘆巴炒川牛膝酒浸各五錢胡桃肉六十個去皮油用好川烏炮製去皮臍兩個右為末煑酒為糊丸如梧桐子大每服七十丸加至百丸好酒送下空心食前心腎丸理水火既濟恍惚多忘心忪盗汗夜夢驚恐小便白濁精滑夣泄腰膝緩弱四肢酸痛補氣血生津液安神定志此方皆宣利諸患脫證自泄不止醫不能治服心腎丸慱金散金鎻丹此三方得效復以壯年精不自泄三藥互換間服五味子去核人參去蘆逺志去苖甘草煑搥去骨附子炮去皮臍龍骨煆白茯苓去木山藥當歸去蘆酒浸黄耆蜜炙各一兩蓯蓉酒浸牛膝酒浸熟地黄洗蒸各二兩絲子酒浸蒸研成餅二兩鹿茸燎去毛用好酒塗炙一兩右為末用浸藥酒煮糊為丸如梧桐子大每服七十丸棗湯送下平補鎮心丹治丈夫婦人心氣不足志意不定神情恍惚夜多夢異怪悸煩欝及腎氣傷敗血少氣多四肢倦怠足脛酸疼睡臥不穏夢寐遺精時有白濁日漸羸弱熟乾地黄生乾地黄乾山藥天門冬麥門冬栢子仁茯神各四兩一方七兩辰砂少研另用為衣桔梗炒各三兩石菖蒲九節蜜煑十六兩逺志去心甘草煑三四沸七兩當歸去蘆六兩龍骨一兩右為細末煉蜜為丸如梧桐子大每服三十丸空心飯飲吞下温酒亦得漸加至五十丸宜常服益精髓養氣血明視聼潤肌膚駐顔色三至丸出永類鈐方主補虛損生精血去風濕壯筋骨明目聰耳强健腰脚悅隂陽既濟水火久服百疾不生鹿角鎊細以真酥一兩無灰酒一升煑乾慢火炒乾蒼耳酒浸一宿焙乾山藥沉香鎊細以真酥二兩米醋一升煑乾慢火炒乾四味各半斤當歸五