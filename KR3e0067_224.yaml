body:
  text: 普濟方卷二百二十四明周王朱橚撰諸虛門平補附論夫一隂一陽謂道偏隂陽之謂疾不明乎道未能有治人之疾者世人貪餌藥石惟務酷烈非徒無益反傷和氣故方書論平補之法欲隂陽適平而已方神仙巨勝子丸一名益壽丹黃精木通當歸黃耆蓮子廣木香枸杞子肉蓯蓉酒浸熟地黃酒浸何首烏人參破故紙柏子仁巴戟酒浸去皮山茱茰絲子酒浸杜仲酒浸酸棗仁五味子酒浸各二兩天雄一對如無附子亦可石菖蒲酒浸楮實子甘菊花牛膝酒浸三日小茴香炒各一兩川烏頭炮白茯苓覆盆子逺志去心酒浸焙天門冬酒浸去皮各一兩右為細末春夏煉蜜為丸秋冬棗肉為丸如梧桐子大每服三十丸溫酒空心下日進二服諸病盡除耳聾眼暗並皆治之服至一月真氣元成五十日頭白再黑百日顔如童子若遇冬天單衣不寒年老七十無子服此藥生數子年至百歲忌服日期正月初四日二月初七日三月初六日四月十八日五月十六日六月二十七日七月二十四日八月二十九日九月二十一日并二十四日十月全忌十一月二十四日十二月二十日還童丹一名保靈丹一名延壽丹一名隂陽丹出德生堂大能壯氣血筋力助脾胃進飲食益顔色添精髓固元陽沉香白茯苓木通熟地晚蠶蛾桑螵蛸巴戟酒浸去心安息香研益智仁牛膝酒浸葫蘆巴酒浸各一兩木香一兩五錢紅花沒藥研蓮蕊蓮肉淨細墨燒煙五色龍骨煆硃砂為衣各五錢兔絲子酒浸七錢五分蓯蓉一兩二錢酒浸破故紙七錢酒浸青鹽三錢麝香一錢海馬一對酥微炙炒母丁香七錢右為細末酒糊為丸每服三十丸加至五十丸空心酒下此藥不濕不燥老少可服大通氣血駐顔生精服之七日見效夏月茶清下妙乾物壓之附子蓯蓉丸出聖濟總録主平補壯元陽附子炮製去皮臍一枚肉蓯蓉酒浸一宿蒸焙楮實酒浸一宿蒸熟補骨脂炒蘹香子炒兔絲子酒浸一宿蒸熟研焙牛膝酒浸切焙杏仁去皮尖雙仁炒白茯苓去黑皮當歸蓽撥炒桃仁去皮尖雙仁炒各五錢逺志去心山茱茰打破炒柴胡去蘆頭黃耆銼細巴戟天去心各三分蕪荑炮山芋各一兩大蒜煨六顆蜀椒去目及閉口炒出汗黃蠟各二兩右除蓯蓉桃仁楮實蒜蠟外並搗羅為末先取精羊肉去皮骨一斤半細切用水煮熟次入好酒三升熬爛次入黃蠟候鎔都取出細研入楮實桃杏仁蓯蓉蒜等一處爛研如膏入前藥末和丸如梧桐子大每服十五丸至二十丸空心鹽湯酒下小金丹一名彭祖丸出三因方主補益勞血去風冷消百病諸虛不足老人精枯神耗女子絶傷斷緒久服益壽延年安神寧志定魄流滋氣血脈絡開益智慧釋散風濕耳目聰明筋力強壯肌膚悅澤氣宇泰定熟地黃肉蓯蓉酒浸各六兩五味子絲子酒浸各五兩柏子仁天門冬去心蛇床子炒覆盆子巴戟去心石斛各三兩續斷澤㵼人參山藥逺志去心炒山茱茰菖蒲去毛桂心白茯苓杜仲銼炒絲斷各三兩天雄炮去皮臍一兩煉成鍾乳粉扶衰三兩續老二兩常調一兩氣虛則不用右為末蜜丸如梧桐子大食前酒服三十丸至五十丸忌五辛生蔥蕪餳鯉虛人去鍾乳倍地黃多忘倍逺志茯苓少氣神虛倍覆盆子欲光澤倍柏子仁風虛倍天雄虛寒倍桂心小便赤濁三倍茯苓一倍澤㵼吐逆倍人參石斛丸出聖濟總録主平補諸虛不足石斛去根逺志去心檳榔煨銼牛膝酒浸一宿焙桑螵蛸炙焦研桂去粗皮乾薑炮各五錢覆盆子微炒巴戟天去心微炒肉蓯蓉酒浸去皮焙枳殼去瓤麩炒柏子仁研各二兩澤㵼二分陳皮去白二兩鹿茸一對去毛酥炙蒺藜炒各三分天雄炮去皮臍絲子酒浸搗爛焙三次各二兩右為細末和勻煉蜜為丸如梧桐子大每服三十丸空心鹽湯下補骨脂丸出聖濟總録主平補諸虛益精壯陽補骨脂炒松脂山芋白茯苓去黑皮各八兩杏仁湯浸去皮尖雙仁炒焦三升胡桃肉棗各一斤鹿角膠炙燥十兩桂去粗皮牛膝酒浸切焙澤㵼菖蒲薏苡仁萆薢檳榔煨銼獨活去蘆頭蒺藜子炒去角蛇床子各一兩生地黃二十斤取汁右除地黃汁外搗羅為末煎地黃汁成入藥點蜜和丸如梧桐子大每服空腹溫酒下三十丸經驗補益方石菖蒲川當歸白蒺藜絲子木香各三分丁香酒浸破故紙炒沒藥各三分半八角茴香四分半鹽炒熟為度木通七分炙川練子七分麩炒馬藺花七分半醋浸炒桂花龍骨葫蘆巴炒吳茱茰湯浸洗七次各五分仙靈脾九分半醋炙蛇床子地膚子四分右為細末用羊羔兒精肉一斤以刀刮去筋膜無灰酒熬成膏子為丸丸如梧桐子大每服五十丸空心酒下乾物壓之溫補藥沉香木通木香丁香八角茴香杜仲炒去絲葫蘆巴楮皮炒破故紙炒川萆􅐺韭子炒甘草肉桂穿山甲地龍菊花枸杞子各一兩無名異二分半青木香半兩右為細末蜜糊為丸如梧桐子大溫酒下三十五丸空心服壯元丹治肝腎虛精血不足眼昏黑花迎風有淚頭暈耳鳴服之甚效或腎風下疰腰腳沉重筋骨痠疼步履無力隂汗盜汗濕癢生瘡常服耐寒暑進飲食黑髭髮潤肌膚壯筋骨牛膝酒浸三日蓯蓉酒浸一日熟地黃川芎覆盆子各二兩石斛一兩五錢去根絲子一兩酒浸三日當歸續斷巴戟白茯苓山茱茰枸杞子肉桂各一兩五味子防風杜仲炒各半兩右為末用蜜丸如梧桐子大每服五十丸空心食前用鹽湯酒下歸茸丸補諸虛當歸酒洗鹿茸酒浸炙北黃耆鹽水炙沉香靈砂三兩研北五味子炒逺志肉酸棗仁吳茱茰茴香炒破故紙煆牡蠣煆熟地黃蒸人參龍骨煆附子炮巴戟各一兩右煆製法酒糊丸如梧桐子大每服七十丸空心溫酒下溫補藥溫補下元壯筋骨安神定志去痰驅風乳香沒藥木香沉香當歸酒浸肉蓯蓉酒浸破故紙酒浸川續斷酒浸半夏茴香白茯苓天麻官桂琥珀各一兩杜仲麝香辰砂各一錢為衣右為細末酒糊為丸如梧桐子大每服五六十丸空心溫酒或鹽湯下乾物壓之沉香豬肚丸出百一選方沉香丁香木通木香川椒炒蓽澄茄陳皮葫蘆巴炒破故紙吳茱茰桂巴戟去心茴香牛膝肉蓯蓉附子炮去皮臍各三兩檳榔銼肉豆蔲各四兩右為細末生豬肚一個去脂先用生絹袋盛藥末令在豬肚內縫合用酸漿水一桶於銀石鍋內煮令豬肚軟取出放冷不用豬肚將藥焙乾酒麵糊為丸如梧桐子大每服五十丸溫酒下婦人醋湯下與壯氣丸相間服此藥雖男子藥婦人久病氣虛服之大驗史忡花母親服取效團參丸出百一選方團參桑白皮銼各二兩人參陳皮洗桂去皮白术訶子去核麥門冬去心大腹皮銼炒杏仁炒去皮尖半夏麯各一兩檳榔銼芫花醋炒附子炮去皮澤㵼吳茱茰炒枳實麩炒去穰各五錢右為細末薑麵糊為丸如梧桐子大每服米飲下十丸未效加至三十丸劉尉服時去芫花加牽牛粉五錢取效牽牛只取第一次用丸作大丸或以水一盞煎服尤妙石菖蒲丸出聖濟總録主平補諸虛久服輕身延年活血益氣潤澤肌體石菖蒲九節者佳一兩五錢柏子仁杜仲去粗皮炙銼百部山芋甘草炙五味子貝母去心丹參各一兩人參蒸防風白茯苓去黑皮茯神去木各一兩五錢逺志去心五錢生乾地黃焙二兩麥門冬去心焙二兩右為末煉蜜和丸如彈子大每服一丸空心食前熟水嚼下日進三服摩腰膏補下元虛憊白濁若摩一丸空心食前熟水摩腰下如火至二丸血脈舒暢三服顔色恱澤十丸骨健身輕氣全精足骨髓堅完母丁香木香硃砂藿香附子乾薑沉香桂生硫黃枯礬吳茱茰雄黃杏仁陳皮各二錢麝香輕粉一錢右除麝香輕粉為末却入前味研勻蜜丸小雞子大每服用老薑汁煎滚傾盞內將一丸浸汁中良久化破研之為汁令人蘸藥於腰上摩之藥盡為度須臾腰上如火但是諸虛之病悉治之地黃煎丸平補諸虛生地黃二十斤洗搗取汁熟地黃焙二斤甘草銼八兩炙鹿角膠炙四兩生乾地黃焙二斤絲子酒浸另搗醇酒一斗用無灰者白蒺藜炒去角牛膝酒浸切焙乾漆用酒拌和末白檳榔煨銼白茯苓去黑皮枳殼去瓤麩炒萆􅐺覆盆子去梗各四兩右取生地黃汁并酒外並各細搗羅為末先取地黃汁與酒五升於銀石鍋內慢火煎三二十沸次下鹿角膠攪勻消盡次下地黃末又次下諸藥添酒以柳枝不住攪候可為丸即分為二十劑餘以蠟紙塞於寬瓷瓶內封貯逐一劑旋取丸如梧桐子大每服三十丸加至五十丸空心食前溫酒下餘剩藥收經三月餘取於中日曝之依前收封貯兼治虛勞諸風等疾牢牙齒榮髭髮久服堅筋骨長肌肉悅顔色聰耳明目令人壯健萬病不生用地黃酒下尤佳延年丸平補五臟治百病方見本門補益強力益志類一名枸杞子丸固真丸治諸虛不足常服補益五臟接助真陽潤澤肌膚強壯筋骨川烏頭鹽炒黃色去鹽熟地黃浸洗焙秦艽各二兩肉桂去皮茴香酒浸炒葳靈仙山藥仙靈脾五味子炒各一兩萆􅐺附子炮去皮臍白茯苓去皮當歸洗焙牛膝酒浸一宿石菖蒲各五錢右為末煉蜜和搗千餘下丸如梧桐子大每服五十丸空心溫酒鹽湯下一方無牛膝坎離丸治心脾腎三經不足蒼术八兩銼如豆大泔浸二日或焙或曬乾分作四處一分用真烏頭一兩去皮臍切作片子又用川楝子淨肉一兩同蒼术一處炒焦黃色為度一分用川椒去目一兩又陳皮一兩破故紙一兩酒浸一宿炒令乾次下蒼术川椒一處炒黃一分用茴香淨一兩青鹽一兩半食鹽炒半夏一兩先下蒼术炒熱次下茴香等一處炒黃色一分用醇釀酒醋各一杯煮蒼术令自乾熟燥入後藥麥門冬去心三分焙乾天門冬去心三分焙茯神去粗皮木三分炒逺志去心三分焙沉香一兩焙鹿茸燎去毛酥炙葫蘆巴酒浸焙川巴戟去心酒浸炒各五分當歸酒浸淨焙人參去蘆枸杞子雀腦五錢川芎陳皮去穰各半兩右為細末好酒煮神麴米二兩打糊為丸如梧桐子大服四十五丸空心服如補心棗湯下補腎溫酒鹽湯送下飛步丸茅山蒼术半斤米泔浸一宿切片子用老蔥白同炒半黃色為度小茴香四兩炒杜仲炒去絲肉蓯蓉酒浸絲子酒浸各一兩為餅八角茴香炒南木香生韭子酒浸破故紙炒川楝子取肉炒葫蘆巴炒川牛膝酒浸各五錢胡桃肉六十個去皮油用好川烏炮製去皮臍兩個右為末煮酒為糊丸如梧桐子大每服七十丸加至百丸好酒送下空心食前心腎丸理水火既濟恍惚多忘心忪盜汗夜夢驚恐小便白濁精滑夢泄腰膝緩弱四肢酸痛補氣血生津液安神定志此方皆宣利諸患脫證自泄不止醫不能治服心腎丸慱金散金鎖丹此三方得效復以壯年精不自泄三藥互換間服五味子去核人參去蘆逺志去苖甘草煮捶去骨附子炮去皮臍龍骨煆白茯苓去木山藥當歸去蘆酒浸黃耆蜜炙各一兩蓯蓉酒浸牛膝酒浸熟地黃洗蒸各二兩絲子酒浸蒸研成餅二兩鹿茸燎去毛用好酒塗炙一兩右為末用浸藥酒煮糊為丸如梧桐子大每服七十丸棗湯送下平補鎮心丹治丈夫婦人心氣不足志意不定神情恍惚夜多夢異怪悸煩鬱及腎氣傷敗血少氣多四肢倦怠足脛酸疼睡臥不穩夢寐遺精時有白濁日漸羸弱熟乾地黃生乾地黃乾山藥天門冬麥門冬柏子仁茯神各四兩一方七兩辰砂少研另用為衣桔梗炒各三兩石菖蒲九節蜜煮十六兩逺志去心甘草煮三四沸七兩當歸去蘆六兩龍骨一兩右為細末煉蜜為丸如梧桐子大每服三十丸空心飯飲吞下溫酒亦得漸加至五十丸宜常服益精髓養氣血明視聼潤肌膚駐顔色三至丸出永類鈐方主補虛損生精血去風濕壯筋骨明目聰耳強健腰腳悅隂陽既濟水火久服百疾不生鹿角鎊細以真酥一兩無灰酒一升煮乾慢火炒乾蒼耳酒浸一宿焙乾山藥沉香鎊細以真酥二兩米醋一升煮乾慢火炒乾四味各半斤當歸五兩酒浸一宿焙乾黃耆蜜炙各四兩白茯苓去皮人參去蘆木香逺志去心沙苑蒺藜去土洗炒附子炮去皮臍各一兩肉蓯蓉酒浸一宿焙乾二兩右為細末用酒三升糯米三合煮爛和杵丸如梧桐子大每服五十丸至一百丸溫酒鹽湯空心送下五味子丸出本事方主治肝腎俱虛收斂精氣補真壯陽充肌膚進美飲食五味子川巴戟肉蓯蓉人參絲子熟地黃覆盆子白术益智仁炒土茴香骨碎補洗去毛白龍骨牡礪以上各等分右為細末煉蜜杵丸如梧桐子大焙乾每服三十丸空心食前米飲下日二三服此藥補氣止汗增減斂陽丹出經驗良方主治虛損不足心腎不交安神益志順氣調榮衛甚妙川楝子去核皮取淨肉一兩微炒木香不見火茴香去枝梗淨炒舊附子炮製去皮臍各一兩鍾乳粉二帖破故紙去皮炒各一兩五錢肉豆蔲麵裹煨令赤去麵一兩厚朴去皮不見火一兩葫蘆巴酒炒乾淨一兩二分嫩鹿茸酒炙不令傷火二兩當歸頭去蘆酒炙淨一兩五錢靈砂揀墻壁多者研細四兩右為細末用無灰好酒煮糯米糊為丸如梧桐子大曬乾不可焙每服至五十六十丸空心鹽湯或酒下上丹出和劑方主養五臟補不足祕固真元均調二氣和暢榮衛保神守中久服輕身耐老健力能食明目降心火交腎水益精氣若男子絶陽房事不堪女子絶隂乃不能妊娠腰膝重痛筋骨衰敗靣色黧黑心勞志昏寤寐恍惚煩憒多倦餘瀝夢遺膀胱邪熱五勞七傷肌肉羸瘁上熱下冷難任補藥服之半月隂陽自和容色肌肉光潤悅澤開意安魂魄消飲食養胃氣五味子八兩百部酒浸一宿焙兔絲子酒浸另研肉蓯蓉酒浸杜仲炒斷絲巴戟去心逺志去心枸杞子防風去蘆白茯苓去皮蛇床子山藥柏子仁另研各三兩右為末蜜丸如梧桐子大食前溫酒鹽湯任下三十九春煎乾棗湯夏加五味子四兩四季月加蓯蓉六兩秋加枸杞子六兩冬加逺志六兩食後兼服衛生湯方載補虛益氣類王啓玄傳耘苖丹序曰張長沙戒人妄服燥烈之藥謂藥勢偏有所助勝尅流變則真病生焉猶苖不長而揠之者也若稟氣受血不強舍此藥而不服反忽略之是不耘苖者也或加官桂白芍藥或更加附子平補枸杞子丸枸杞子湯洗菊花揀淨肉蓯蓉酒浸一宿切焙桂去粗皮黃耆塗酥炙銼牛膝酒浸一宿焙逺志去心生乾地黃酒浸一宿焙山芋各二兩柏子仁酒浸焙炒人參白茯苓去黑皮一兩五錢右為末以浸藥酒煮麵糊丸如梧桐子大每服空心溫酒下三十丸鹽湯亦得蓯蓉丸出永類鈐方主治丈夫稟受氣血有偏勝者則陽盛隂微精氣不流經云陽強不能密隂氣乃消亡服此助隂和陽一方無黃耆熟地黃酒浸洗蒸二次焙乾二兩絲子去沙土蒸二次研焙燥一兩五錢黃耆蜜炙一兩川當歸焙洗乾燥一兩五錢穿心紫巴戟肉蓯蓉洗焙各一兩蓮肉北五味人參去蘆嫩鹿茸酥炙白茯苓龍齒各一兩右為末煉蜜和丸如梧桐子大每服五十丸溫酒鹽湯米飲任下補益歸茸丸出危氏方能滋養肝腎益心血利足膝實肌膚悅顔色真男子衛生之良藥也此方專理肝心腎之血澤㵼則引諸藥入腎地黃酒浸九蒸鹿茸去毛酥塗炙五味子各四兩山藥酒浸山茱茰去核大附子炮去皮臍官桂去粗皮川牛膝酒浸一宿各二兩白茯苓牡丹皮去滑澤㵼酒浸一宿各一兩五錢大當歸四兩去蘆右為末用真鹿角膠半斤銼細入銀器中煮酒丸如桐子大每服五十丸空心溫酒鹽湯下鹿茸丸出聖惠方主補虛勞倍筋力安脾胃祛冷氣潤肌膚悅顔色鹿茸去毛塗酥炙微黃肉蓯蓉酒浸一宿刮去皺皮炙乾熟乾地黃絲子酒浸三日曝乾另搗為末各二兩薯蕷石斛去根銼桂心研巴戟牛膝去苖山茱茰枸杞子五味子人參去蘆頭赤石脂柏子仁澤㵼白茯苓逺志去心各一兩右為末煉蜜和搗三五百杵丸如梧桐子大每日空心酒下四十丸香茸丸出本事方鹿茸二兩沉香人參白芍藥熟乾地黃生乾地黃蓯蓉牛膝澤㵼大附子當歸各一兩麝香一錢右為細末酒糊為丸如桐子大每服五十丸鹽酒湯下神仙不老丸出經驗方主養榮衛潤三焦悅肌膚去邪氣惡蟲等疾選竒方云子幼即勤瘁衰不待年方三十而白髮生三十五而白鬚生自是時時衰去四十九則不勝衰矣乃聽其自然未幾遭喪天之慘復罹哭子之憂心志凋耗其白益多餘者益黃久之忽遇金花山張先生謂豫曰子今半百容貌衰甚可不為門户計進補治氣血以強色身之藥乎慨然傳一方云效得之異人豫拜而受之敬合服逾百日覺前時之白者黃者皆反黑矣見者莫不以為異豫遂名曰神仙不老丸以其藥品概括為歌不老仙方功效殊駐顔全不費功夫人參牛膝川巴戟蜀地當歸杜仲俱一味地黃生熟用絲柏子石菖蒲更添枸杞皮兼子細末蜜丸桐子如早午臨眠三次服鹽湯溫酒任君須忌餐三白并諸血能使鬚烏髮亦烏川牛膝長靣潤者去蘆洗淨酒浸一宿焙燥稱一兩五錢地黃皮色黃者去浮皮一兩川巴戟用黑色紫泥重大穿心川當歸大者去蘆二兩地黃以水浸沉重者用以浮者搗取汁浸沉令透蒸焙乾如是者三次色黑者味甘熟稱一兩又用生沉者一兩酒浸各用刀切忌鐡器柏子仁用色紅者去殼取仁一兩細研臨和時入石菖蒲一兩去毛節米泔浸一宿節密者用絲子以水去浮者用沉者酒蒸焙乾二兩枸杞子色紅者用去蒂淨洗酒浸一宿一兩人參二兩新者須是團者結重實滋潤去蘆頭刷洗淨焙乾薄切焙燥稱杜仲去粗皮薑皮炒去絲一兩五錢右件揀選之貴精製之如法不可曬只用慢火焙若太燥則又失藥氣只可八分乾復於風前略吹令冷熱相激便十分燥取淨稱分兩磨為細散煉白蜜以火日搜和入木石臼內搗數百杵丸如梧桐子大每日空心午間臨睡三次服每七十粒鹽湯酒任下忌食蔥白薤白蘆薈豆粉及藕諸般血使解藥力若三白誤食亦無他止令人鬚髮反白耳合時切忌穢觸并婦人孝子雞犬等見此方非特烏髮鬚而已且大能安養榮衛補益五臟和調六腑滋充百脈潤澤三焦活血取氣添精實髓最要節色欲使藥力功效之驗速也歸神丹出孟氏詵詵方専治丈夫思慮過多役損心氣致神不守舍不能管攝精氣之失無常故精滑冷遺白濁皆由心虛不能攝致宜服此藥引神歸舍辰硃砂二兩捶作小粒不可成粗粉豬心大者一枚去筋膜略批開朱砂布於內再合右豬心用燈心遍纒合用密以麻線縛定入銀石鐺內用酒及好醋二味各一升同煮令乾取出去燈心緩緩收下硃砂微炒乾乳鉢內研令極細將所煮餘酒醋打清麵糊為丸如梧桐子大每服九丸用大棗煎湯吞下半空心服數服之後便覺心志安寧無異夢神既守舍則心火下交腎水陽事漸興切不可輕泄須後服他藥補得真氣濃實方可施泄一法加白茯苓二兩為丸每服十八丸鹿茸丸出聖濟總録能平補諸虛益氣血壯筋骨鹿茸去毛酥炙附子炮製去皮臍續斷側柏葉厚朴去粗皮生薑汁炙黃耆銼各一兩阿膠炙燥當歸切焙熟乾地黃焙麝香各五錢右為細末煉蜜和丸如梧桐子大空心米飲下三十丸溫酒鹽湯皆可服山芋丸出聖濟總録主平補諸虛百損山芋牛膝酒浸切焙絲子酒浸另搗白茯苓去黑皮巴戟天去心澤㵼赤石脂各二兩五味子炒杜仲去粗皮酥炙銼山茱茰各一兩右為末煉蜜為丸如梧桐子大每服三十丸空心溫酒下參耆散出御藥院方専治虛寒自汗調榮衛補不足人參黃耆當歸芍藥白术五味子官桂甘草前胡秦芁右各等分為細末每服五錢水一盞入生薑五片棗二枚同煎服大五補丸出聖濟總録天門冬麥門冬菖蒲茯神人參益智炒枸杞子地骨皮逺志熟地黃以上各等分右為末煉蜜為丸如梧桐子大空心酒下三十丸本方數服以七宣丸泄之壯氣丸出百一選方茴香炒巴戟破故紙葫蘆巴玄胡索山芋附子炒金鈴子桂以上各三兩木香一兩五錢右為細末酒糊為丸每服五十丸溫酒鹽湯下十精丸出經驗良方主升降隂陽既濟水火平補心腎及治下虛上盛破故紙炒逺志去心白茯苓益智仁炒青鹽炒另研各一兩絲子酒浸牛膝川當歸酒浸一宿各二兩石菖蒲九節者山茱茰各五錢右為細末用豶豬腰子一隻去膜和酒研細煮麵作糊丸如梧桐子大每服四五十丸食前鹽湯或溫酒下如小便赤而少煎車前子湯下如心虛精神不定用茯苓湯下如夜間煩躁不得睡用酸棗仁末調湯下如心氣盛塞煎麥門冬湯下日二服一方去菖蒲加熟乾地黃二兩用羊腰子丸十寶丸出瑞竹堂能專益肝脾胃三經其功不可具述破故紙酒浸一宿焙乾附子炮製去皮臍稱蒼术銼泔水浸一宿焙乾當歸去蘆頭各一兩大棗去核五錢枸杞子焙五錢絲子酒浸焙乾蓯蓉酒浸焙乾白茯苓去皮各五錢地黃去蘆揀肥壯酒浸蒸焙乾以透黑為度仔細裂全在此一味焙乾二兩右為細末醋糊為丸如梧桐子大每服三十五丸空心用酒或鹽湯送下乾物壓之神仙三黃丸出聖濟總録能平補換骨駐色延年生地黃三十斤木臼搗取自然汁生乾地黃焙熟乾地黃焙各一斤為末鹿角膠炙燥為末大麻仁研乾漆搗末點醋炒煙盡為度各四兩甘草炙銼杏仁去皮尖雙仁研炒蜜各半斤右各修製搗研七味為末先以無灰酒一斗與生地黃汁并蜜於銀器內用慢火煎以桞枝攪將欲成膏便入諸藥同熬可丸即丸如梧桐子大每服三十丸空心食前靣東溫酒下加至五十丸九子丸出聖濟總録能補隂血補陽氣壯精神倍力強陽補腎益精氣壯筋骨鹿茸一兩刮去毛塗酥炙令黃色其味甘酸其性溫熱每主男子腰腎虛冷腳膝少力夜多異夢精自出助隂肉蓯蓉四兩酒浸三宿切焙乾其味井酸醎其性溫治男子絶陽不興女子絶隂不産潤五臟長肌肉暖腰膝益精令人有子仙茅一兩以糯米泔浸三宿用竹刀刮去皮於槐木砧子上切隂乾其味辛其性溫主丈夫虛損老人失弱婦人失血無子久服通神強記壯筋骨益肌膚長精神明目彭祖常服逺志一兩去心其味苦其性溫主傷中補不足除邪氣利九竅益智慧聰耳明目強志不忘久服輕身不老好顔色益精續斷一兩捶碎去筋醇酒浸一宿其味苦辛其性愠主助氣潤血脈補不足蛇床子一兩微炒其味苦辛甘其性平主男子隂痿濕癢久服輕身好顔色強力令人有子巴戟一兩去心其味辛甘其性溫主隂痿強筋骨安五臟補中增志益氣蘹香子一兩舶上者微炒其味辛其性平主膀胱腎間冷氣國人重之云有助陽道用之車前子一兩其味甘其性平微寒主男子傷中強隂益精令人明目利水道右為細末用鹿角脊髓五條去血脈筋膜以無灰酒一升煮熬成膏更研爛同煉蜜少許和丸如梧桐子大每服五十丸溫酒下空心服不足者能補痿者能健滑者能澀弱者能強久服延年不老令人多子人參散出本事方主補虛損老少一切虛症並皆治之人參桂去皮不見火白术茯苓黃蓍熟地黃洗川芎甘草川當歸各等分右為末每服二錢水一盞生薑三片棗子二枚同煎至七分空心服中丹出簡易方能補諸虛百損體勞少力少氣善驚昏憒上焦客熱中脘冷痰不能多食心腹脹滿脾胃氣衰精血妄行容色枯瘁黃茋白芍藥當歸各四兩白茯苓人參桂心各一兩川椒炒去汗一兩大附子黃芩各一兩為末薑汁和作餅右為末薑汁和作餅再細研粟米飲搜和得所搗千杵丸如梧桐子大酒飲任下三五十丸食前服神仙八味丸出聖濟總録性平補壯氣活血駐色輕身健骨牛膝去苖一斤葳靈仙淨洗巴戟天去心各四兩石斛去根四兩天麻半斤切以上四味用好酒二斗浸兩宿焙何首烏一斤去黑皮米泔浸軟切於黑豆中蒸爛焙乾肉蓯蓉去土二斤洗切用前浸藥酒同於銀石器內慢火熬成膏海桐皮銼半斤右除蓯蓉