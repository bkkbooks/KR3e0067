body:
  text: 普濟方卷三百八十八明周王朱橚撰嬰孩大小便淋秘門淋秘附論夫淋者有熱淋血淋石淋氣淋寒淋五者大同小異熱淋者有熱氣傳膀胱飛仙論云熱氣傳於膀胱與腎為熱淋也血淋者久熱積聚結澁脬中巢氏云熱甚入脬中多成血淋石淋者腎執水結化為砂石孫氏云腎熱水結化為砂石巢氏云腎為熱所乗則石淋也其狀如莖中痛甚者令人悶絶是也氣淋者膀胱受熱小腸脹滿巢氏云腎虚膀胱受肺之熱氣氣在膀胱則脹肺主氣氣為熱所乗故流入膀胱氣壅不散腹中氣滿水道不通故小便結滯而成氣淋寒淋者取冷過度顫後尿巢氏云取冷過度下焦受之冷氣入脬不能禁約於水小便者水溢之餘膀胱者津液之腑既受冷氣脬中衰弱不能禁約於水故遺尿成寒淋其狀先寒顫後尿是也皆由冷熱之氣客入腎與膀胱流滲脬中之所致也小腸乃心之腑也水竇流行隨其氣而利之心氣若壅小便不通心氣若冷小便多洒音尠謂洒析也心氣若寒小便多旋心氣若熱小便艱澁心氣積熱小便白赤先赤而復白者是也所言閉小便者醫謂下結腹肚脹𦂳膨滿不通氣結熱盛用力努旋㸃滴而出乃是閉不通利干心疼痛精神昏憒速用生大地龍數條蜜少許研傅莖卵仍燒蠶蛻紙灰留性硃砂腦子麝香同研煎麥門冬燈心湯調下與服一時見效湯氏歌云五般淋瀝病相傳一一須分病本源或見呌啼傷水積忽然飡食入脾間次更因循傳入臟致令淋病小便乾但㸔㣲紅筋上有熱入相和汗又連肚上青筋至腹足砂石淋秘痛難安唇上乾燥如皮退此是皮風淋悪泉外腎不腫氣不急下隂纔腫氣相連先與寛膈疎導氣定知醫藥可安痊諸淋皆腎虚而膀胱生熱也水火不交心腎氣鬱遂使隂陽乖舛清濁相干蓄在下焦故膀胱裏急膏血砂石從水道出焉故有欲出不出淋瀝不斷之狀甚者窒塞其間或令人悶絶大凡小腸有氣則小便脹有血則小便澁有熱則小便痛痛者為血淋不痛者為尿血敗精結者為砂敗精散者為膏金石結者為石揣本尋源各從其類治法並用流行滯氣疎觧小便清利邪熱調平心火盖心清則小便自利心平則血不妄行切不可姑息用補氣得補而愈脹血得補而愈澁熱得補而愈盛水道不行加之穀道閟遏闗格不通未見其能生者也又有腎氣虚弱囊中受寒夾冷而小便淋澁者其証先寒戰而復溲便盖冷氣與正氣交争冷氣盛則寒戰而成淋正氣盛則寒戰解方得便尿也小兒諸淋者由腎虚而膀胱熱故也膀胱與腎為表裏俱主水入小腸下於胞行於隂為小便也腎氣通於隂津液下流之道也若乳食不節悲啼無恒虚實不調則腑臟不和致腎虚而膀胱熱也膀胱津液之腑熱則津液内溢水道不通水不上不下停積於胞腎虚則小便數膀胱熱則水下少數而且澁致淋瀝不宣故謂之淋又有熱淋血淋氣淋石淋寒淋三焦壅盛移熱於膀胱則溲便赤者為熱淋熱甚而摶於血脉流入胞中溺血者為血淋小腹滿溺濇有餘瀝者為氣淋溺出砂石者為石淋寒淋之病本於寒客下焦皆本於膀胱有熱令少腹急痛水道不利故數起而不能出也方五淋散治五淋赤茯苓赤芍藥山梔子生甘草當歸黄芩車前子淡竹葉燈心木通滑石葵子葶藶炒各等分右為末燈心葱白煎或入生車前草擂水調五淋散服或調硝石末服血淋白茅根燈心煎氣淋小腸脹滿尿後有餘瀝木通煎服熱淋便赤而淋瀝臍下痛新水調下或黄芩湯下石淋莖内痛尿澁有砂石令人悶絶硝石隔紙炒焦研末用葵子煎湯下石葦散治諸淋瀝水道中痛臍下妨悶石葦一兩冬葵子木通赤茯苓各半兩車前子瞿麥榆白皮滑石甘草各一分右為細末毎服一錢水一盞葱白五寸煎至七分去滓温服如人行十里再服大小加減一方無甘草立效飲治小兒諸淋不通莖中疼痛木通甘草王不留行荽胡滑石海金沙山梔子檳榔各等分右㕮咀三歳一錢水半盞煎三分去滓温服葵子散治諸淋兼小便不通葵子車前子木通瞿麥桑白皮炒赤茯苓山梔子仁甘草炙各等分右剉散毎服一錢井水一小盞葱白二寸煎食前服桑白皮湯治小兒淋或澁痛小便如血色桑根白皮焙山梔子仁蘆根茅根赤茯苓去黑皮冬葵子甘草炙各一分滑石研半兩右粗搗篩五六歳毎服一錢水一小盞煎至五分去滓食前日二服量兒大小加減瞿麥丸治小兒淋及治遺尿瞿麥穂龍膽石葦去毛桂去粗皮皂莢炙去皮子各半兩雞腸草人參各一兩車前子一兩一分右搗羅為末煉蜜丸如梧桐子大毎服六丸至十丸空心熱湯研下更量兒加減桃仁湯治小兒氣淋水道不通餘瀝疼痛茴香紫蘇檳榔各一兩木通當歸人參巴㦸去心赤茯苓各三錢桃仁炒去皮半兩右㕮咀三歳一錢水半盞煎三分去滓食前服牽牛子丸治小兒諸淋澁臍下連兩傍妨悶并及大腸氣壅牽牛子㣲炒川大黄㣲炒川升麻郁李仁湯浸去皮㣲炒研入川朴硝已上各半兩滑石一兩細研海蛤一兩細研右搗羅為末煉蜜和丸如菉豆大毎服以温水研下七丸日三四服量兒大小加減順經散治十餘歳因驚之後心氣下行小便淋瀝日夕三四十次漸覺黄瘦宜服韭子炒琥珀另研益智去殻金毛狗脊去毛白茯苓去皮石燕子火煆醋淬研細各半兩石葦去毛一錢右為末毎服一錢韭湯調下日二服石燕丸治小兒諸淋肚腹妨悶心神煩熱石燕子研瞿麥穂梔子仁滑石研木通葵子海蛤研各半兩右搗研為末煉蜜丸如菉豆大毎服七丸葱白湯下日三服量兒大小加減石葦湯治小兒淋或澁痛小便如血石葦去毛赤芍藥大黄炒滑石研甘草炙麥門冬去心升麻各一分右粗搗篩毎服一錢水一小盞煎至五分去滓食前日三服量兒大小加減一方有川朴硝無滑石木通湯治小兒諸淋及熱結赤澁不通木通桑根白皮焙滑石研芒硝葵子陳者各三分右粗搗篩毎服一錢水一小盞煎至五分去滓温服日三服量兒大小加減一方葱白湯下半錢石燕丹治小兒淋澁痛悶石燕醋淬燒赤放冷研細瞿麥滑石各半兩木通海蛤研各半兩右為細末煉蜜和丸如黍米大毎服十粒以葱白湯下食前大小加減金沙散治小兒小便淋瀝不通鬱金海金沙滑石甘草各等分右為末三歳一錢煎落帚湯調下燈心木通湯亦得冬𤓰最治小便不通淋瀝并渇木通散一名葵石散治熱淋小便不通啼呌小腹痛悶亂者木通二錢滑石一錢牽牛子一錢炒葵子一錢右用燈心葱白車前草同煎服一方無葵子不用車前草煎一方週歳小兒一服作一錢五歳已上倍之龍香丸一名葵石丸治小兒寒淋因熱淋服冷藥太過小便不禁或取冷過度下焦受冷冷氣入脬不能禁止故遺尿龍骨煆牡蠣煆各一兩茴香炒白茯苓各半兩右為末糯米糊丸如小豆大三歳三十丸茴香湯下一方加赤石脂半兩又方同前治及久患寒淋進退不定尿如脂膏遍數無度茴香炒一兩金液丹二兩糯米二三兩炒龍骨煆半兩右為末糯米糊丸小豆大毎服百丸鹽湯或温酒送下車前子湯治諸淋澁心煩悶亂車前子石燕麥門冬去心焙各半兩右搗篩毎服一錢水一小盞煎至五分去滓不計時候温服葵子湯治小兒諸淋葵子陳者三分石葦去毛三分滑石别研兩半右粗搗篩五六歳毎服一錢水一盞棗二枚同煎取五分去滓分温二服早晚食前各一量兒大小加減滑石散治小兒諸淋澁毎尿之時啼呌不出滑石半兩甘草一分炙川朴硝三分右搗細羅為散毎服以葱白湯調下半錢日三四服量大小加減玉漿散治小兒小便不通莖中淋痛心躁煩渇滑石一兩甘草二錢炙右為末三歳一錢燈心湯調下亂髮燒灰酒調下最治小便不通二神散治諸淋急痛海金沙七錢半滑石五錢右末煎燈心木通麥門冬車前草入蜜調服榆白皮湯治小兒淋兼石淋及治水道中澁痛榆白皮焙瞿麥各一兩半右粗搗篩末一二歳毎一錢水一小盞煎至五分去滓分温二服空心日晚各一量兒大小加減麥葱湯治小兒諸淋閉澁不通小麥一合葱白兩莖切右以水一盞煎至五分去滓不計時候温服量大小加減滑石散一名車前子散治小兒小便淋瀝或尿血滑石研車前子各半兩右搗羅為末二三歳毎服半錢空心粥飲調下近晚再服量兒大小加減蜂房散治小兒淋蜂房炙亂髮各三分右同燒灰研令細毎服半錢米飲并水調下日三服量兒大小加減一方無亂髪有桂小麥湯或酒調服治氣淋一名檳榔散赤芍藥一兩檳榔一箇麫裹煨右末用燈心同棗子煎湯調下治小兒諸淋澁心煩悶亂冬葵子一兩瞿麥半兩右搗為散毎服一錢以水一小盞煎至六分去滓不計時候温服量兒大小加減治小兒諸淋水道中澁痛取臘月猪脂熬過去滓毎服一粟殻大用暖酒一合研攪令勻空心午間各一服量兒大小分減服之治小兒淋及水道中澁痛用車前子一升水二升煮取一升分服一方為散毎服一錢水一盞煎服去滓温服不計時候量大小加減又方用煮冬葵子汁服之一方為散毎服一錢煎服量大小加減服之不計時候治小兒淋疾用槲葉三片煎湯服一雞子小便即時下文仲療小兒淋兼石淋及血淋日夜淋瀝隂中疼痛取特牛隂毛燒灰末以漿水服一刀圭日再服一方粥飲調下半錢大小加減一作牯牛治熱淋用五苓散加辰砂煎燈心淡竹葉湯調下犀灰散治小兒心經虚熱小便澁痛莖管内疼不可忍者用蠶蛻紙不拘多少燒留性為末入麝少許毎服半錢燈心湯調下備急車前草方治小兒小腸有血熱淋痛用生車前草洗搗細井水調取清汁食前服阮氏方治熱淋取大田螺十五箇以新水養候螺吐出泥澄去清水以底下泥膩粉調塗臍上尿即通便將螺放江中若殺之病不愈桃膠丸治小兒諸淋并小便出血隂莖中痛用膠一塊如棗大水半盞煎三分日進三服下石子如豆石盡止又方船下清苔煮汁治淋孫氏云尿在脬中為屈僻津液不通以生葱葉尖内隂莖中深三寸用口吹令脬脹津液大通便愈一法生薑切作槌子様内隂莖孔中深三二寸便利又方琥珀為末燈心湯調下立效紅龍散治淋甚妙又方臍中着鹽灸之即通一方用炒鹽帛包熨小腹治諸淋及大便五六日不通心腹煩滿用海鹽不拘多少燒鹽熨小腹即通於臍中以手摩良久即通大人用之亦得一方用青顆鹽地膚子湯治小兒熱毒入膀胱中忽患小便不通欲小便則澁痛不出出少如血須臾復出方見本門小便不通類治寒淋小便不禁或睡中遺出不覺方見遺尿類楊氏雞腸散石葦散治熱淋石葦半兩洗海金沙三錢車前子三錢海蛤一錢瞿麥半錢右為末用燈心金銀湯下一方加木通石燕子同煎龍骨散治寒淋小便不禁或睡中遺出不覺雞腸草一兩牡蠣粉三錢龍骨半兩茯苓麥門冬半兩去心桑螵蛸半兩右㕮咀毎服一錢水一小盞棗子同煎服治小兒淋閉取衣魚摩臍及小腹溺即通石淋附論夫小兒石淋者為小便中出石也腎主水水結則化為石故腎為熱所乗熱則成淋其狀小便莖中痛尿不能出時時小便痛引膀胱裏急甚者水道不通令人悶絶也方葵子散出聖恵方治腎熱水結化為石淋甚者水道中澁痛不可忍冬葵子一兩石南榆白皮石葦去毛木通各半兩右為細末毎半錢以葱白湯調下日二服量大小加減一方有滑石一兩滑石散出聖恵方治証同前滑石𤓰蔞根石葦去毛各一兩右羅為散毎服半錢前大麥飲和調下日二服大小加減石葦散出活幼口議治小兒熱淋沙淋石淋石葦去毛海金沙木通滑石右為末水一小盞煎至五分通口服治小兒石淋水道中澁痛出聖恵方石葦五分去毛滑石二兩子芩三分右細為散毎服以粥飲調下半錢日三四服量兒大小加減治小兒石淋澁痛心煩出聖恵方甘草炙