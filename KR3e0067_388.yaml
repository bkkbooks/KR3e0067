五六歳每服一錢水一小盞入葱白一莖同煎至五分去滓温服未通再服更量兒大小加減硃砂丹出聖恵方治小兒大便不通小便澀心神煩熱卧忽多驚腹脇妨悶硃砂半兩細研水飛過續隨子三分膩粉一錢右研令勻煉蜜和丸菉豆大三歳毎服温水下三丸乳食後服量大小加減金花散出王氏方治小兒大腸秘不通兼血痢皂子仁一分炒檳榔一箇生用甘草一錢右為末毎服一字或半錢砂糖熟水調下治小兒大便不通出肘後方用猪苓一兩以水少許煮雞屎白一錢調服立瘥調中二黄丸治小兒大便不通口燥頰赤大黄一兩炒牛黄研甘草炙人參各一分右搗研為末煉蜜丸如小菉豆大毎服二丸米飲化下日再服得利即止一方有甜硝一錢為散新水調服通中丸出聖恵方治小兒大便不通心腹壅悶卧即煩喘川大黄一兩炒巴豆霜三分皂莢一兩不蛀者去皮子燒令焦黑右大黄皂莢搗羅為末入巴豆霜同研令勻煉蜜和丸如菉豆大四五歳以温水下三丸量兒大小加減木通湯治小兒大便不通木香剉大黄剉炒陳橘皮去白焙各一兩右粗搗篩三四歳毎服一錢水一小盞煎至五分去滓温服更量兒大小加減丹參湯治小兒大便不通妨悶丹參硝石碎甘草炙各一分右粗搗篩五六歳毎服二錢水一盞棗二枚同煎至七分去滓分温二服更隨兒大小加減黄連丸治小兒風熱壅滯大便秘澀黄連去鬚大黄炒各一分巴豆三粒去心皮膜出油研右搗研為細末麫糊為丸如麻子大毎服三丸至五丸臨卧栁枝湯調下芎黄散出聖恵方治臟有熱小便澀大便不通腹脇妨悶芎藭一兩川大黄三分郁李仁去皮炒三分右㨶為散毎服一錢以温水調下大小加減走馬箭方出聖恵方治小兒大便不通連腰滿悶困重氣急羊膽一枚蜜一合鹽花半兩右同煎如餳揑如筯粗可長一寸内下部中須臾即通蜂房散出聖恵方治小兒卒大便不通用蜂房一枚炙令㣲焦細羅為散毎服粥飲調下半錢量兒大小加減治小兒大便五六日不通心腹煩滿出聖恵方取青顆鹽末於臍中以手摩良久即通大人用之亦得大便血附論夫小兒大便血者為心主於血脉心臟有熱熱乗於血血性得熱流動妄行不依常度其血流滲於大腸所以令大便血出也方槐花散出聖恵方治小兒大便出血腹痛黄瘦不欲飲食槐花㣲炒白术熟地黄芎藭已上各半兩黄耆木香當歸㣲炒甘草炙已上各一分右羅為散毎服一錢水一小盞煎至六分去滓不計時候量兒大小加減服之卷柏丸出聖恵方治小兒大便出血久不止面色萎黄肌體羸瘦或時腹痛不欲飲食卷柏半兩赤石脂半兩阿膠半兩搗碎炒令黄焦槐花㣲炒黄牛角腮炙黄焦當歸炒黄耆芎藭已上各一分右為末煉蜜和丸如麻子大三歳兒毎服以粥飲下七丸日三服量兒大小加減羚羊角散出聖恵方治小兒大便出血體熱黄瘦不能飲食羚羊角黄耆川升麻黄芩地榆甘草炙已上各一分生乾地黄半兩右羅為散毎服一錢水一小盞入苦竹茹半分煎至六分去滓不計時候量大小分減温服治小兒大便後出血方出聖恵方用鼈甲一枚塗醋炙令黄焦去裙襴細羅為散毎服以粥飲調下半錢日三服量兒大小以意加減一方用鼈頭一枚又方出聖恵方燒車釭一枚全赤投於一碗水中毎服半合日三服看兒大小以意加減又方出聖恵方用甑帶燒灰細研毎服用乳汁調下半錢量兒大小加減又方出聖恵方用鹿角燒灰細研以粥飲調下半錢日三服量兒大小加減箬葉散出全嬰方治小兒大便中有血或純下血用茶箬燒灰存性為末米湯調下食前服五倍丸出全嬰方治小兒大便下血及腸風臟毒用五倍子焙乾為末煉蜜丸如小豆大三歳三十丸米湯空心下訶灰散出全嬰方治小兒因痔大便中有血用訶子燒存性細研為末米湯調下食前服三歳一錢一方橡斗子合白梅濕紙裹燒灰存性為末米湯調下食前服三效散出全嬰方治小兒糞前後下血并腸風下血久不瘥糞前下血石榴皮為末煎茄枝湯下糞後下血五倍子為末煎艾葉湯下糞夾血或腸風下血茄蒂燒灰存性為末米湯調下右三歳半錢大小加減與之食前服五倍子為末米湯調下最治泄痢艾葉湯治吐血瀉血治小兒中蠱下血欲死用青藍汁頻頻服半合治小兒下血用雌雞翅下血服之治小兒若堕落有痢血壯熱不食乳哺者用大黄黄連蒲黄各二分芒硝一分半以水二升煮取一升去滓納芒硝分二服大小便血即愈犀角丸出湯氏寳書治小兒揺頭下血乃肝血液盛外有風熱乗之肝屬木木盛而脾土為木所尅脾與肺是子母俱為肝所勝而血遂浸漬於大腸故便血不止犀角屑一分栝蔞根半兩蛇退皮炙赤色鈎藤勾麻黄去節各一分黄耆蜜炙羗活防風白芍藥各半兩甘草一分右為末棗肉丸食後薄荷湯下只二服作效頭揺即止如便血愈多次間與胃風湯服之日減一日鄭都承令嗣患七年揺頭三年下血已服百餘方前後服治揺頭者無非風藥止血者或作痢或作腸風百藥未嘗偶止安撫王尚書挽留都下先君宰錢塘時與之有分一日招飲令其子勸酒愚視其疾又叩其詳亦不能曉其標本酒罷退思遂處此方但損肝祛風益脾數服而愈十餘日後血止而下白膿自此㫁根今數年矣保嬰槐花散出永類鈐方治臟熱便血荆芥穂槐花枳殻麩炒去穰甘草各等分右為末蜜湯調服大便青附論夫小兒大便青者因驚氣及脾氣不和大腸虚冷乳食不消冷氣摶於糟粕故令大便青色也方訶梨勒丸出聖恵方治小兒内冷腹脇妨悶大便青色不欲乳食訶梨勒一兩煨用皮白术半兩陳橘皮半兩去白焙白茯苓當歸一分炒白芍藥半兩厚朴半兩去粗皮薑汁炙香熟甘草炙半兩右羅為末煉蜜和丸如梧桐子大三歳毎服以粥飲研下五丸日三服量大小加減木香丸出聖恵方治兒胎寒腹痛大便青木香蓬莪荗白术人參去蘆頭當歸㣲炒已上各半兩麝香一分細研白芍藥一分右羅為末都研令勻煉蜜和丸如菉豆大三歳毎服以粥飲下七丸温服日三四服量大小加減芎藭丸出聖恵方治小兒胎寒腹痛大便青芎藭三分黄耆三分牛黄半兩細研䗪蟲㣲炒三分麝香一分細研當歸半兩炒白芍藥一分右羅為末研令勻煉蜜和丸如麻子大毎服以粥飲下五丸日三服量大小加減陳橘皮丸出聖恵方治小兒内冷大便青不欲飲食皆胎寒陳橘皮去白焙當歸炒人參去蘆白芍藥各半兩芎藭半兩甘草炙一分右羅為末煉蜜和丸如菉豆大三歳毎服以温粥飲含下七丸日三服量大小加減白术丸出聖恵方治小兒大腸虚冷乳食不消大便青色白术白芍藥木香當歸炒已上各一分麝香一錢研右羅為末煉蜜和丸如菉豆大毎服粥飲研下五丸日三服量大小分減服之當歸丸出聖恵方治小兒大便青不欲飲食皆是胎寒當歸炒人參去蘆白芍藥芎藭已上各半兩甘草一分炙右羅為散煉蜜和丸如麻子大毎服以乳汁下三丸日三服量兒大小加減普濟方卷三百八十八
