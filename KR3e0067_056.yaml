body:
  text: 普濟方卷五十七明周王朱橚撰鼻門鼻淵論夫内經謂膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也夫腦為髓海皆藏於隂故藏而不寫今膽移邪熱上入於腦則隂氣不固而藏者寫矣故腦液下滲於鼻其證濁涕出不已若水之有淵源也治或失時𫝊為衂衊瞑目之患方川烏散治腦㵼防風白附子北細辛白茯苓川烏菖蒲乾薑香白芷川芎甘草節右各等分為末每服三錢嚼生葱白調下食後服川芎防風散治積年腦㵼秘方得此疾多年服一料而愈川芎防風羗活乾薑荆芥已上各一两甘草甘松各三錢白芷半两右為末食後酒服不能飲酒茶清湯服鷄蘇丸治腦熱肺壅鼻淵多涕鷄蘇葉乾者麦門冬去心焙芎藭桑根白皮剉黄耆炙甘草炙剉各一两生乾地黄切焙二两右為末煉蜜丸如梧桐子大毎服二十丸食後臨卧人參湯下荆芥散出御藥院方治肺氣壅腦熱鼻淵不止荆芥穗藿香葉各一两芎藭二两龍腦研一两石膏研如粉一两半莎草根炒去毛二两右為細末每服三錢食後荆芥湯調下防風湯出衞生寳鑑治大人小兒鼻淵腦熱滲下濁涕不止乆而成衂血防風一两半人參黄芩麥門冬去心甘草川芎各一两右為末毎服半錢沸湯㸃服食後日三服一方用天門冬無麥門冬前胡湯治腦熱鼻塞多涕前胡去蘆頭木通剉石膏各二两黄芩去黒心甘草炙各一两半大黄剉炒一两右粗搗篩每服三錢水一盞葱白一寸䜴二十粒生薑一大棗煎七分去滓温服不拘時細辛湯治肺虚不調鼻塞多涕咽中有涎而喘項強筋急或痛細辛半夏麯茯苓桔梗各四錢桂枝二錢甘草二錢右為粗末每服四錢水二盞生薑四片蜜半匙同煎至七分温服日三神効宣腦散取黄水鼻中下立効川欝金川芎青黛水飛薄荷水黄米各三分右為細末每服少許冷水噙之蒼耳散出海上方治鼻流濁涕名鼻淵辛夷仁半两蒼耳子炒二錢半白芷薄荷葉半錢右並乾為末每服二錢用葱淸茶食後調服芎藭散治腦熱鼻淵多涕芎藭莎草根炙各二两石膏研水飛一两龍腦研一分右為散每服二錢食後荆芥穗清茶調下川芎丸治腦瀉臭穢服藥後忌一時炙熱食草烏生用半两去皮尖蒼术生一两川芎生用二两右為細末麺糊為丸如梧桐子食後清茶下十丸南星飲出直指方治風邪入腦宿冷不消鼻内結硬物窒塞不宣遂流髓涕用上等大白南星切成片用沸湯盪两次焙乾每服二錢棗七箇甘草少許同煎食後服三四服後硬物自出腦氣流轉髓涕自収仍以大蒜蓽撥末杵作餅用砂襯炙熱貼𩕄門用火熨透或香附子蓽撥末入鼻中治鼻濕不已并治腦瀉用藕節芎藭焙乾為末每服二錢米飲調下腦流鼻零用薑或乾薑煨塞之睡至二更去之不止再塞治鼻淵腦㵼用生附子為末煨葱涎和如泥塗湧泉穴夜間用川芎茶調散出如冝方治其病由腎氣虚腦髓不固亦有名鼻淵薄荷八两川芎四两羗活甘草炙白芷各三两防風一两半細辛一两荆芥四两右為末茶清調服如鼻淵加辛夷鼻流清涕論夫五臓化液遇熱則乾燥遇寒則流衍鼻流清涕至於不止以肺臓感寒寒氣上逹故其液不能収制如此且涕泗洟皆鼻液也以繼泣則曰涕以生於肺則曰泗涕甚曰洟此獨言涕與宣明五氣言肺為涕同意方五味子湯治鼻出清涕五味子山芋各一两半夏湯洗去滑三分鹿茸酒浸一宿酥炙白术米湯浸一宿剉炒各一分附子炮製去皮臍牛膝酒浸切焙甘草炙剉㯽榔剉熟乾地黄焙乾薑炮製各半两白豆蔻去皮木香丁香各一分白茯苓去黒皮三分右粗搗篩每服三錢水一盞煎至七分去滓空心温服辛夷散出醫方集成治肺虚風寒温熱之氣加之鼻内壅塞涕出不已或氣息不通或不聞香臭辛夷仁細辛洗去土葉藁本去蘆升麻川芎木通去莭防風去蘆羗活去蘆一方無甘草炙香白芷右為細末每服二錢食後茶清調下一方有蒼耳一半㸃熱者茶調合和服細辛膏出醫方集成治鼻塞腦冷常有清涕出不已細辛蜀椒乾薑芎藭呉茱茰附子各十八銖桂心一分皂莢屑半两猪膏一升右㕮咀以綿裹苦酒浸一宿取猪膏煎以附子色黄為度去滓綿裹内鼻中并摩鼻上一方無桂心訶梨勒散出聖惠方治肺虚外傷風冷致鼻塞常流清涕頭目昏痛四肢不利訶棃勒煨用皮白术各一两防風去蘆頭細辛前胡去蘆頭木通剉各三分附子一两炮裂去皮剉麻黄二分去根節甘草半两炙徴赤剉右為散每服三錢水一盞入生薑半分煎至六分食後服細辛散治肺傷風冷鼻流清涕頭目疼痛胸膈不利細辛一两附子炮製去皮臍白术桂心蔓荆子芎藭訶棃勒煨用皮以上各三錢枳殻去瓤麵炒㣲黄甘草炙㣲赤剉各半两右為散每服三錢水一盞入生薑半分煎至六分去滓食後服川椒散出直指方治流涕大紅開口川椒微炒盖出汗訶子煨取肉川白薑生者肉桂川芎細辛净白术等分右為末每服二錢温酒調下白术散出聖惠方治鼻流清涕日久不止皆因肺臓虚寒心膈壅滯頭目不利白术一两丁香訶棃勒煨用皮桂心細辛附子炮裂去皮臍各三錢枳殻去瓤麵炒㣲黄半两吳茱茰一分湯浸七遍焙乾㣲炒右為細末每於食後温酒下一錢芎藭散一名通草膏出聖惠方治鼻清涕出腦冷所致通草辛夷仁各半两甘遂一作甘草北細辛去苖桂心芎藭附子各一兩右為末蜜丸杏仁大綿裹納鼻中宻封塞勿令氣泄丸如麻子漸稍加大㣲覺小痛擣薑為丸即愈此方治腦冷所致然病亦有腦熱者亦有肺塞者素問云膽移熱於腦則辛頞鼻淵又曰腦滲為涕當審詳之一方白狗膽和丸更佳甘遂丸出本事方治鼻多清涕甘遂一两細辛去苖葉一两半附子炮裂去皮臍木通剉各一两一分乾薑炮裂桂去粗皮吳茱茰湯浸焙乾各一两右為末煉蜜和撚如棗核大以綿裹内鼻中仰卧即涕止日三易之避風以瘥為度芎藭膏出聖惠方治鼻塞多清涕芎藭細辛去苖葉呉茱茰湯浸焙乾炒蜀椒去目及閉口者炒出汗右細剉以醋浸一宿内猪脂於銀器中煎候五七沸去滓傾入合中澄凝以綿裹少許内鼻中一方有附子一味塞鼻桂膏出聖惠方治鼻常有清涕桂心細辛乾薑炮裂剉川椒去目及閉口者炒出汗皂莢一分右為末以青羊脂和成膏每服如棗核大綿塞鼻中杏仁膏一名通鼻散出聖惠方治鼻乆塞清涕杏仁湯浸去皮尖雙仁炒二两附子炮裂去皮一两半細辛去苖葉蜀椒去目及閉口者炒出汗各一两右細剉以醋浸一宿用煉成猪脂一斤銀器盛㣲火煎之候附子黄色去滓傾入合中澄凝以綿裹少許内鼻中塗𩕄上一名塗𩕄膏一方無蜀椒二黄散治鼻痛流水臭氣腦冷漏下硫黄黄丹炒白芷右等分為末少許吹鼻中三五次即愈灌鼻黄連汁治鼻塞多年清水出不止黄連去鬚二两蒺藜苖二握右細剉水二升煎至一升取一合灌鼻中不過再灌大嚏瘥治鼻流清涕不止用白芷末葱白搗爛和藥為丸小豆大每服二十丸茶清下傷風鼻塞清涕不止用白芷一两無白芷則用薄荷荆芥一錢為末以臈茶清調下鼻中生瘡論夫心肺有病鼻為之不利盖心肺上膈開竅於鼻心肺壅熱氣熏於鼻間藴積不散其證乾燥而痛甚則成瘡也惟能平調心火以利肺經則瘡自己夫鼻者肺之穴故肺氣通於鼻也若臓腑不調隂陽否塞氣血壅滯榮衞不通則上焦生熱邪熱之氣伏留不散上攻於鼻故令鼻中生瘡也方烏犀丸治鼻中生瘡烏犀細鎊一两羚羊角細鎊一两胡黄連半两貝母㣲炒去心半两知母焙三分麥門冬去心焙半两天門冬去心焙半两甘草炙一分黄芩去黒心一分人參半两牛黄一两别研丹砂半两别研柴胡一两去苗右除别研外搗羅為末入别研藥同更細羅煉蜜和丸如梧子大每服二十丸空心温酒下前胡湯出聖惠方治鼻中生瘡咽喉塞閉及乾嘔頭痛飲食不下前胡去蘆頭三分升麻木通剉黄蘖㣲炒𤣥參各一两大青三分芒硝一两麥門冬去心焙三分竹青茹三分右粗搗篩每服三錢水一盞煎七分去滓温服食後日再白蘚皮湯治肺虚熱氣脹鼻中生瘡喘息促急時復寒熱白蘚皮𤣥參葛根剉白前大黄剉碎㣲炒各二两知母焙鼈甲酒浸炙去裙襴秦艽去苗土各一两半右粗搗每服三錢以水一盞入童子小便少許同煎至七分去滓温服如人行四五里再服升麻湯治鼻乾痒生瘡乾嘔不下飲食升麻桔梗炒黄芩去黒心犀角細鎊貝母㣲炮去心龍膽各半两甘草炙一分右粗搗篩每服三錢以水一盞煎至七分去滓温服不拘時日三辛夷膏治鼻中生瘡鼻塞多涕辛夷一分白芷半两藁本去苗土甘草當歸去蘆頭各三分右細剉以清酒六合羊髓十二兩銀石器盛火上煎三五沸去滓傾合中澄凝大豆許内鼻中日夜各一地黄煎治鼻生瘡癢痛不止生地黄汁一两苦參剉一两酥二合鹽花二錢後入生薑汁一合右以地黄生薑汁浸苦參一宿以酥合於銅石器中煎九上九下候汁入酥盡去滓傾入合中每以少許滴於瘡上諸風熱瘡亦佳其鹽花至半即下辛夷膏出醫方集成治鼻内生瘡疼痛或鼻中窒塞不通利及齆鼻氣不宣通並宜塗用之甚効辛夷葉一两細辛木通木香香白芷杏仁湯浸去皮尖研各半两右用羊髓猪脂各二两同諸藥和於石器中慢火熬成膏赤黄色放冷入龍腦麝香各一錢為丸綿裹塞鼻中數日内脱即愈梔子煎出聖惠方治肺氣風熱鼻内生瘡山梔子去皮煨苦參木通各三两右細剉酥四兩同煎令香濾去滓傾入中每以少許滴入鼻中礬石煎治鼻中熱氣生瘡有膿殠兼有蟲滴鼻礬石一两苦參生地黄洗令净研取汁三合右為末以地黄汁并水二盞煎至三分去滓少少滴鼻中三五度瘥大黄散出聖惠方治肺壅鼻中生瘡腫川大黄生用黄連去鬚各一分麝香一錢細研右為細散研入麝香仝勻以生油旋調塗於鼻中又方出聖惠方杏仁一分湯浸去皮尖雙仁研為膏川大黄一分生為末右和令匀以猪脂調塗鼻中又方出聖惠方黄蘖㯽榔各等分右為末以猪脂調傅之治鼻中生瘡偷孝子㡌以拭之又方出聖惠方以牛口津傅之又方出聖惠方以搗杏仁乳汁傅之亦燒核壓取油傅之又方出聖惠方右燒牛狗骨灰以臘月猪脂和傅之祀竈飯散治鼻中生瘡傅鼻用祀竈飯不限多少燒為灰細羅為散香油調塗傅之一方無香油馬絆繩散用馬絆繩一條燒為灰研細羅以少摻上瘡上黄蘖飲治鼻中熱氣生瘡有膿殠兼有蟲用黄蘖二两去粗皮以冷水浸一两日絞取濃汁一盞服之治鼻中生瘡及治疳蟲蝕鼻用烏牛耳中垢傅之治鼻中瘡出本草以生鷄子磕開頭取白去黄著米醋拌糖火頓沸起擎下湯定更三度成熟熱飲酢盡不過一二瘥止鼻洪并瘡出本草以壁錢蟲滴汁傅鼻中及瘡上疳蟲蝕鼻生瘡論夫五臓皆有蟲蟲得風則化肺開竅於鼻肺經既虚風熱乗之鼻之氣壅塞不得宣利則疳蟲因得侵蝕瘡生鼻間方椿根湯治疳蟲入鼻中椿根切一升去皮塩半合葱白切半升椒去目閉口者炒出汗一合豉半升右合和以醋及清泔各三升煎十數沸去滓約及一升分作三服有惡物下即愈小兒量大小加减治鼻上赤瘡石葶脂輕粉鷄心檳榔各一兩片腦半錢右為細末相合同唾津搽於面上臨卧塗之大有神效如聖散治疳蟲蝕鼻生瘡及鼻下赤爛胡粉半两麝香研一匙甜𤓰蒂七枚為末入粉内同研右再同研勻蟾酥少許浸一宿次日取蟾水先和胡粉次同和丸如菉豆大每服二丸水化傅瘡上鼻下赤爛者塗赤爛處小児每服一丸烏香散治鼻疳瘡侵蝕鼻柱草烏頭燒灰麝香研等分右同研細以少許貼瘡上青金散治疳蟲鼻生瘡及鼻流淹潰銅青白礬生研等分右同研為散毎用少許傅瘡上小児亦可用治疳蟲蝕鼻生瘡出十便良方用燒銅筯頭以酢淬之數過取酢傅之銀屑方治疳蟲蝕人口鼻唇頰作瘡穿透者洗瘡銀屑十两水三升一日三四度洗瘡仍於銅器中煎用又方出十便良方右以綿裹入犀角灰夜著之又方出十便良方右燒牛骨灰末以臘月猪脂和傅之瘥治疳蟲蝕鼻生瘡出本草燒杏核壓油取傅之治鼻口急疳蟲數日欲死用藍澱傅之令遍日十度夜四度立瘥鼻乾論夫鼻乾無涕者由臓腑壅滯内有積熱攻於上焦之所致也夫肺氣通於鼻洩於涕若其臟挾於風熱則津液不通皮毛枯燥两頰時赤頭痛鼻乾故令無涕也方神明青膏出千金方治鼻中乾灌之并摩服蜀椒五合皂莢黄芩石南黄連雄黄桂心䔧蘆各三銖白术芎藭大黄澤㵼各七銖烏頭莽草續斷人參各五銖半夏當歸各十二銖乾地黄十一銖萎㽔細辛各十銖附子桔梗各二銖乾薑六銖戎鹽杏子大二枚右㕮咀苦酒一斗漬之羊髓一斤為南三隅竈内諸藥炊以葦薪作三聚新好土藥沸即下置土聚上三沸下三訖藥成以新布絞去滓病在外大炙摩之在内温酒服如棗核日三後稍益以止為度犀角散出聖惠方治肺熱鼻乾無涕心神煩悶犀角屑木通剉赤茯苓川升麻黄耆剉馬牙硝杏仁湯浸去皮尖雙仁麺炒黄各半兩麥門冬去心焙一两朱砂一分研細龍腦一分細研甘草炙一分右為細散每於食後竹葉湯調下一錢木通散出聖惠方治肺臓積熱两頰時赤皮膚枯燥鼻乾無涕頭目多痛木通一两麥門冬一两半去心赤茯苓一两石膏二两犀角屑半两桑根白皮一两剉杏仁一两湯浸去皮尖雙仁炒㣲黄甘草半两炙㣲黄剉白前一两右為散每服三錢水一盞煎至六分去滓温服天門冬散治肺壅腦熱鼻乾無涕大腸秘澁不眠心躁天門冬大黄升麻桑白皮枳殻甘草各半两荆芥一两右㕮咀每服二錢水一盞煎至六分去滓分作五服桑白皮根散治肺臓積熱皮膚乾燥鼻痛無涕頭疼心悶桑白皮根剉木通剉川大黄剉碎㣲炒甘草炙㣲赤剉已上各一两川升麻一两半石膏三两葛根三两剉右為散每服三錢水一鍾煎至六分去滓食後溫服吹鼻散治鼻乾無涕龍腦半錢馬牙硝一錢𤓰蔕十四枚為末右同細研每用一豆大吹入鼻中鼻皰酒􅖟論夫面生皻者由飲酒勢衝面而遇風冷之氣相摶所生也故令鼻面生皻赤皰匝匝然也方硫黄膏專治赤鼻生硫黄香白芷𤓰蔞根膩粉已上各半錢芫青七箇去足趐一方無芫靑用天仙子全蝎一箇蟬退五箇洗去土右為細末麻油黄蠟約度如合面油法多少熬匀取下離火入諸藥在内毎用少許臨卧洗面净用傅之近眼處勿塗數日間瘡腫處自平赤消再服後藥何首烏丸出危氏方治肺風面赤鼻赤何首烏一兩半防風黒豆去皮藁本荆芥穗地骨皮洗各一兩桑白皮天仙藤苦參赤土各半兩右為細末煉蜜為丸如梧桐子大每服三四十丸食後茶清下木蘭皮膏出聖惠方治酒􅸟皻炮木蘭皮防風去蘆頭白芷木香牛膝去苗右為細末用絹袋盛之於鼻内聞之至夜用津唾濕瘡将藥於鼻瘡上搽磨天明用水洗去藥仍以蒼耳五月五日午時採取隂乾用酒浸九蒸九曝研為末煉蜜丸如彈子大每服一丸食後溫酒化下日進三服半月除之白龍散出危氏方治酒皻鼻并面上肺風瘡川芎藁本白辛甘草白芷右各等分如澡豆法更湏畧罨少時方以湯洗去食後服龍虎丹一貼只作一服不半月盡退局方云其人舊赤皻可畏今瑩然㓗白矣上項所服龍虎丹方見諸風雜治類肺風丸出瘡科精要治面鼻風􅖟及皶䶌苦參二两細辛旋覆花羗活各一两晩蚕蛾二两去皮翅足右為細末軟飯和丸如梧桐子大每服五十丸茶酒任下不拘時候皂角丸出聖惠方治飲酒過多鼻皻皰皂角一斤不蛀者去皮以酥五两漸塗以慢火炙酥盡為度然後搥碎以新汲水浸用生絹濾過以慢火熬成膏防風去蘆頭獨活甘草炙㣲赤剉牛蒡子㣲炒各一两右為末入皂角煎和丸如梧桐子大每於食後茶酒任下二十丸肺風赤鼻草烏尖七箇猪牙皂角一錢明礬五分麝香一匙大楓油右為末和勻磁器内於火上熔開調藥先以薑擦次用手指蘸藥擦之一日三次無不効木香膏出聖惠方治積年酒皻并治面上風瘡硫黄細研蝸牛殻自死乾枯小者為上净去泥土木香杏仁去皮尖研如膏芎藭已上各一两麝香半两細研赤芍藥獨活杜蘅當歸白附子細辛右細剉以臘月猪脂二斤㣲火熬以白芷黄為度濾去滓入麝攪令勻甆合中盛每夜薄塗之何首烏丸出危氏方治肺風面赤鼻赤何首烏一两半防風黒豆去皮荆芥穗地骨皮洗各一两桑白皮天仙藤苦參赤土各半两右為末煉蜜丸如梧桐子每服三四十丸食後茶清下一方有藁本一两治紅鼻出德生堂舶上硫黄天仙子小椒雄黄枯礬三奈子各一两麝香輕粉少許右為細末小油調搽瘡上梔子丸出聖惠方治酒􅖟鼻皰及因飲酒過多致鼻皻皰梔子仁豉各三升大黄六两木蘭皮半两芎藭甘草各四两右為末蜜和丸如梧桐子每服十丸日三加至十五丸冬𤓰子散出聖惠方治鼻面酒皻如麻豆及疼痛搔之黄水出宜服梔子仁二两栢子仁白茯苓葵子㣲炒各一两冬𤓰子仁二两枳實一两麩炒㣲黄右為散每於食後以粥飲調下二錢石亭脂散治酒傷肺經鼻靣生赤紅瘡石亭脂一錢當歸輕粉各半錢腦子少許㯽榔三錢朱粉各半錢右為末入杏仁朱粉硫黄都研令勻以臘日面脂調如稀膏每夜欲卧時以淡漿水凈洗面拭乾以藥塗所患處平明即以温水洗之濕以米泔洗了塗藥三五上亦瘥治酒􅖟鼻生硫黄三錢黄連白礬乳香各一錢半輕粉半錢右為細末用唾津調搽之一日二次塗湏去赤為度神效白附子散出聖惠方治肺臓風毒及酒􅖟癢發歇無定白附子細辛各一两木香白豉各半两麝香一分細研右為末入麝香研勻水調如膏夜卧塗之治鼻皰蒺蔾子梔子仁䜴各一升木蘭皮半升一本無右為末以酢漿水和丸如泥夜傅之日未出時暖水洗却亦主㓕瘢痕粉黄膏治肺熱鼻發赤瘰俗為酒皶硫黄一分為末輕粉烏頭尖各少許為末蘿蔔切去盖剜作瓮子入硫黄在内以竹針盖定正安煻火煨一宿取出研細為末少許右研勻以面油調臨卧時傅早晚洗去以酥調尤佳又方乳香硫黄細辛輕粉等分右為細末用水調傅治酒􅖟鼻并鼻上贅肉及面上雀子班等疾亦可㸃痣黄丹五文硇砂三十文研極細餅藥五十文罐子盛巴豆十箇去殻膜綿包壓去油右同入餅藥罐子盛慢火熬三两沸取下續入研細生礦灰三錢鷄子清調勻酒􅖟鼻用鵝毛掃在紅處一日一次上藥追出毒物病退即止次服消風散樺皮散之類五七貼雀子斑小竹棒児挑藥㸃患處才覺㣲腫即洗去不洗去恐力太猛趙君猷撫幹所傳云貳卿趙再可知湖州時與一詩僧相厚而僧患酒􅖟鼻端生赤贅數枚大者如橘小者如梅李下垂過口飲食言語皆所妨廢良自厭惡之郡有一小兵事刀鑷人但聞其善取靨誠不知其能治酒􅖟也一旦自言於僧請醫此疾即以藥傅之凢半月餘每日取惡物如膿血自皮膚出者甚多其贅後悉成痂落去鼻面瑩然遂以十千為謝且語貳卿俾直齋閤而求得其方以傳秀鄉治人良驗治赤鼻及諸般面上風瘡大楓油五十文草烏頭一箇輕粉麝香各一百文右將草烏頭為末入油内熬令勻取出少時後入輕粉麝香先令研細打和得勻頻頻用少許以塗手擦患處令熱旬日即瘥一方無輕粉用生薑擦患處又方治肺風酒􅖟鼻明礬明硫黄用紅色者好片腦少許與藥同研礬黄右等分研為細末以指蘸藥擦患處治酒􅖟鼻及婦人鼻上生黒粉刺者生硫黄半两杏仁二錢半輕粉一錢右為細末用餅藥調卧時塗上早則洗去數次絶根又方治肺風酒􅖟鼻蔡察推名與義𫝊於一兵官親見其効也生硫黄乳香白礬各等分生用右研如粉每用手指㣲抓動患處以藥擦之不月餘必愈治赤鼻石亭脂蟬蛻白礬右各等分為末研松香為細末用青葱葉盛貯用黄皮湯就煑數沸取出待冷碾細入輕粉和勻香油調傅㯽榔散治鼻頭赤鷄心㯽榔舶上硫黄等分片腦少許右為細末用繦絹帛包裹時於鼻上搽磨鼻聞其臭効又加萆麻子肉為末酥油調臨卧少搽於鼻上終夜得聞又方枇杷葉一两去毛隂乾新者佳梔子半两右為細末毎服二三錢温酒調下早晨服先去左邊臨卧服去右邊効如神治酒􅖟鼻一名凌霄花散人服之屢効但藥性差寒湏量虚實凌霄花山梔子右等分為細末每服三錢食後茶調下日進三服一方治鼻赤臨川曾景仁甞苦是疾一日得此方於都下異人不三次遂去根本趙太叔親服見效治鼻赤風詩曰肺風鼻赤最難醫我有良方付與伊但有硫礬為細末茄汁調塗始是竒澹寮方不用茄汁冷水調傅鼻上夜用𫝊免防人也右用消風散何首烏散各五貼和一處用茶清或酒送下苦參丸不拘時服忌早酒一月五風散出海上方治酒􅖟鼻右用小烏沉湯五貼小消風散和勻以湯㸃服梔子仁丸出澹寮方治肺熱鼻發赤瘰俗名酒皶鼻右用梔子仁不以多少為細末黄蠟為丸如梧桐子每服二十丸食後用茶酒任下治鼻面酒皶及䵟􅍍出仁存方用蜀葵花一合研細臘月脂調傅每夜用之酒􅖟鼻方出直指方用白塩常擦妙鼻中外􅖟瘤膿水血出出危氏方用露蜂房一箇以火炙焦為末用温酒下方寸匕每日三服又方出海上方治酒􅖟鼻赤皰注上面臉者用斛葉灰先以泔清煮榆葉取汁洗蹙乾内灰瘡中良治鼻中外􅖟瘤膿血用腦子不以多少真酥調塗傅之不以度數用之即瘥治鼻中外􅖟瘤膿血出者用取正月鼠頭燒作灰以臘月猪脂傅瘡上治酒􅖟面部生瘡俗呼酒皶鼻用使君子去皮不以多少用香油一呷浸三五箇臨卧時細嚼用香油送下治酒􅖟鼻神効用牛黄末水調傅之治赤鼻用猪肝一副人參潤肺散一貼加桑白皮同煑肝熱肝與藥空心皆喫治酒􅖟鼻用刺薊花為末入生薑汁調瘡上入麝香輕粉少許為頭首小厮児乳調搽大神効荆芥散出楊氏家蔵方治肺風􅖟疱荆芥穗四两防風去蘆頭白蒺藜炒去刺白殭蚕炒出絲觜杏仁去皮尖甘草炙已上五味各一两右件為末每服二錢茶清調下食後赤龍散出楊氏家蔵方凉血消風治鼻生􅖟疱赤土二两半防風赤芍藥地骨皮何首烏當歸山梔子已上六味各二两甘草炙一两右件為細末每服二錢温酒調下茶清亦得食後越桃散出楊氏家藏方治汗出當風邪受風外面生􅖟疱川芎羗活去蘆頭防風去蘆頭甘菊花白蒺藜炒去刺甘草炙六味各一两山梔子仁三錢右件為細末每服二錢茶淸調下食後箆麻子膏出楊氐家藏方專治肺風面赤生瘡并酒􅖟鼻瀝青别研黄蠟輕粉硫黄别研箆麻子去皮研已上五味各二錢麻油一两右件為細末將油蠟同文武火熬令蠟鎔入前件藥末攪成膏子取出用磁合子盛之每用少許於患處擦之紫葳散出楊氏家藏方治肺有風熱鼻上􅖟疱凌霄花半两硫黄一两别研膩粉一錢胡桃四枚去殻右件先將藥三味和勻後入胡桃肉同研如膏子生絹蘸藥頻頻揩之治鼻面酒皶皰出本草用鸕鷀糞一合研以臘月猪脂和每夜傅之治酒􅖟風鼻上赤用橘子核㣲炒為末每用一錢匕研胡桃肉一箇同以温酒調服以差為度神效治酒􅖟枇杷葉右布巾拭去毛焙乾為末每服三錢如㸃茶日两三服普濟方卷五十七
