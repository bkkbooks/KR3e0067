body:
  text: 普濟方卷四百十八明周王朱橚撰鍼灸門傷寒治熱病先腰脛酸喜渇數飲身清清則項痛而寒且酸足熱不欲語頭痛顛顛然先取湧泉及太陽井榮熱中少氣厥寒灸之熱去灸湧泉三壯煩心不嗜食灸湧泉熱去四逆喘氣偏風身汗出而清皆取挾谿治温病身熱五日以上汗不出刺太泉留針一時取針若未滿五日者禁針凡好太息不嗜食多寒熱汗出病至則喜嘔嘔已乃衰即取公孫井俞實則腸切痛厥頭而睡起煩心狂多飲不嗜卧虚則鼓脹腹中氣大滿熱痛不嗜食霍亂公孫主之治熱病煩心足寒清多汗先取然谷後取太谿皆先補之資生經云凡温病可針刺五十九穴又身之穴六百五十有五其三十六穴灸之為害七十九穴刺之為災治温病穴顳顬灸陰毒傷寒法其狀不躁不渴唇青腰皆重咽喉及目睛痛心腹煩疼舌縮面青吃噫氣喘嘔逆冷汗向暗不語以生蔥約十餘莖去根粗皮顛倒紙卷徑闊二寸勿令𦂳欲通氣以快刀切每一餅子髙半寸安在臍心用熨斗火熨葱軟易之不過十餘次患人即甦後服正氣藥灸結胷傷寒法其狀胷滿短氣按之即痛或吐逆滿悶或大便不通諸藥不能救者以巴豆七粒和皮肥黄連七寸去鬚同搗爛作一丸安在臍心上以手按之稍實捻艾皂子大於藥上灸甚者不過三五壯立愈續用補藥一二日若病半月微有氣皆療治氣虚陽脱體冷無脉氣患欲絶不省人事及傷寒陰厥百藥不効葱熨法以葱用索纒如盞許大切去根及葉惟存白長二寸許如大餅餤先以火熁一面令通熱艾勿令灼人及以熱處撘病人臍連臍下其上以熨斗滿貯火熨之令葱餅中熱氣熨入肌肉中須預作三四餅一餅壊不可熨又易一餅良久病人當漸醒手足温有汗則瘥更服四逆湯俾温其内萬萬無憂王氏云予伯兄病傷寒㝠㝠不知人七八日四體堅冷如石藥不可復入用此法遂瘥集賢校理胡全夫用此拯人之危不可勝數初得病或先頭痛身寒熱或濇濇欲守火或腰背强直面目如飲酒狀此傷寒初得一二日但烈火灸心下三處穴巨關上管胃管各灸五十壯大人可五十壯小兒可三壯亦隨其年灸之大小以意斟量治傷寒若病者三四日以上宜先灸胷上二十壯又灸顳顬二穴又灸風池二穴又灸太衝三十壯神驗又灸肝腧百壯餘處各三十壯又以䋲度鼻正上盡髪際中屈䋲斷去半便從髪際入髪中灸䋲頭名曰天聰資生經云凢傷寒惟陰證可灸餘皆當鍼故千金方惟云刺取而素問亦云病甚者為五十九刺所以㵼諸陽胷中胃中四肢五臟之熱也若温病身熱五日以上汗不出可刺太泉未滿五日禁鍼刺而千金於頭痛身寒熱病及灸巨關上中管三處豈亦是陰證耶其狀盖云咸濇濇欲守火是也醫者當辨之治熱病卒心中懊憹數欠頻伸悲恐目眩頭痛面赤而熱心悸肘臂臑痛實則肢腫虚則不能言若咽喉痺少氣遺溺穴通里療天行傷寒穴中管治傷寒嗜卧怠惰不欲動搖身常濕不能食穴膈腧治熱病煩滿上氣心痛痰冷少氣悲恐善一作喜驚及掌胷痛口熱咽酸乍寒乍熱手攣不伸引眼痛穴少衝治傷寒餘疾皮膚乾燥穴曲池治熱病先不樂數日穴通里治熱病振慄鼓頷腹滿陰痿色不變穴魚際陽谷治氣隔喜嘔鼓頷不得汗穴尺澤治頭身熱赤振慄腰中四肢淫濼欲嘔穴腎腧治氣熱身熱喘寒熱口乾身熱喘息目急痛善驚穴三間治熱病寒慄鼓頷腹滿陰痿色不變穴魚際治熱病煩心心悶汗不出掌中熱心痛身熱如火舌本痛穴中衝少衝闗衝勞宫大陵陽谿天窌間使治熱病煩心喜噦胷中澹澹喜動而熱穴間使治煩心喜嘔穴巨關治傷寒温病身熱煩心口乾穴曲澤治熱病先腰脛酸喜渴數飲食身熱項强痛振寒寒熱頸項腫實肘肘攣頭眩痛虚則生疣小者如疥穴支正少海治振寒頸項痛穴天井治熱病俠脊痛穴委中治傷寒頸項强目瞑多噎鼻􅍠出清涕穴風門王氏云陰毒沉困藥餌難為功但灸臍中三百壯艾如半棗手足不煖不可治也或心迷耳聾呌不應因食冷得疾者予以理中湯救數人矣若復渴則煎五苓散與服或煎人参湯服皆効又云傷寒多從風寒得之始表中風寒入裏則不消矣未有温覆而不消也治傷寒結胷穴支溝間使行間治傷寒在表發熱惡寒頭項痛腰脊强無汗尺寸俱浮穴合谷治傷寒飲水過多腹脹氣喘心下痛不可忍穴中管氣海治傷寒少復上有氣衝者穴天樞氣衝三里三陰支治傷寒手足逆穴大都内庭大谿行間治傷寒交汗不出穴風池俠谿魚際經渠内庭治傷寒胸中熱不已穴大杼風門中府缺盆治傷寒胃中熱不已穴中脘三里上㢘下亷氣衝治傷寒四支熱不已穴雲門肩髃委中腰腧治急食不通并傷寒水結穴三間合谷承山治隂證傷寒四支厥冷腹痛吐痢身强煩躁自汗脉沉細或面赤凡三隂中寒皆灸之穴䧟谷灸二三七壯體温脉通汗出効不爾再灸加艾倍之治卒得食病似復寒其人但欲卧七日不療殺人右按其脊兩邊當有䧟處止灸陷處兩頭各七壯則愈治傷寒始得一二日右便可灸頂三壯又灸大椎三壯各加至五炷益良用之驗大椎平肩針齊髙大者是也仍不得侵項分取之則非也上接項骨下肩齊在椎骨節上是餘穴盡在節下凡灸刺不得失之毫釐今崔氏不定髙下是以言之出黄帝鍼灸經治斷温病令不相染着及治時氣瘴疫右用蜜艾灸病人床四角各一壯不得令知之佳也治隂毒傷寒灸法用乾艾葉搗熟去灰作艾炷灸臍下一寸三分名氣海二寸丹田三寸關元五十壯至三百壯以手足漸温人事稍甦為可治治陰證傷寒灸法於臍下一寸氣海穴灸一七壯小作艾炷於臍下以鹽填實灸七壯立効二寸丹田三寸關元皆可灸治熱病後發豌豆瘡灸兩手腕硯子骨灸上三壯男左女右治傷寒熱盛煩嘔穴大椎治熱病偏頭痛引目外眥穴懸釐鳩尾治時氣病起諸復勞灸法男初覺便灸陰三七壯若已疾甚至百壯即愈眼無妨陰道瘡復常治傷寒熱甚五十九刺五十九刺者為頭上五行以尅越諸陽之熱也穴大杼膺腧缺盆背腧此八者以㵼胷中之熱也氣衝三里巨虚上下亷此八者以㵼胃中熱也雲門偶骨委中隨空此八者以㵼四支熱也臟腧傍五此十者以㵼臟之熱也凡此五十九穴者背之左右故病甚則當刺之凢刺之法吸則納針得氣則㵼勿令遲緩起似發機故鍼經曰熱者疾之刺熱病汗不出夫傷寒熱病汗不出者榮衞不交陰陽不和故汗不出當刺結雪穴通其經脉和其陰陽令汗得出手陽明有商陽合谷手太陽有腕骨陽谷足少陽有俠谿足陽明有厲兊手厥陰有勞宮凡此七穴皆刺熱病汗不出隨經辨脉調其陰陽和其榮衞令得汗出又十二經之榮皆治身熱為主身熱背南方火故經曰榮主身熱皆可刺也刺傷寒結胷痞氣傷寒下後結胷痞氣者皆足三隂之終手三陰之始胷中結痞過在足少陰腎手厥陰包絡刺兩經之井原以㵼胷中之氣心中結痞過在足太陰脾手少陰心刺兩經之井原以㵼心中之氣胃中結痞過在足厥隂肝手太隂肺刺兩經之井原以㵼胃中之氣或上腕中腕下應痞結而㵼治傷寒三陽頭痛法傷寒三陽頭痛何法刺之荅曰手之三陽足之三陽皆㑹於頭者謂諸陽之㑹其受邪伏留而不去故曰三陽頭痛視其色脉知在何經而取之如脉浮而頭痛過在手足太陽刺穴腕骨京骨如脉浮而長過在手足陽明刺穴合谷衝陽如脉浮而弦過在手足少陽刺穴陽池丘墟風府風池已上數穴刺三陽之頭痛法也治傷寒三陰腹痛法傷寒邪在三陰内不得交通故為腹痛手足之經皆㑹於腹隨經取之如脉弦而腹痛過在足厥陰肝手太陰肺刺穴太衝太陵太淵如脉沉而腹痛過在足少陰腎手厥隂心胞刺穴太谿太陵如脉細沉而腹痛在足太隂脾手少陰心刺穴太白神門三陰交已上數穴刺三陰腹痛之法也灸少陰原救脉法治傷寒陰病脉欲絶當灸太谿穴太谿者足少陰腎之原少陰病属水陰氣太盛陰氣不得管故㵼陰補陽隂毒傷寒體沉四肢俱重腹痛脉微遲當灸氣海或關元脉属少陰故同法㵼隂補陽也辨傷寒藥附鍼灸法傷寒經與表合鍼與藥自汗逐漏不止刺風府風池却與桂枝湯傷寒經與裏合灸太谿七壯與通脉四逆湯此太陽少陰表裏之法故表可鍼太陽也裏可灸少陰也傷寒刺期門太陽病頭痛眩冐心下痞者刺肺腧肝腧不可發汗發汗則讝語不止當刺期門穴頭痛目眩太陽經病可發汗心下痞滿邪傳裏也不可發汗刺肺腧奪其邪氣二穴皆在陽經也是髙下之刺也妄發其汗内亡津液傳属陽明故讝語不止未太實者當㵼肝經刺期門恐傳於脾胃也傷寒腹滿讝語寸口脉浮而𦂳此肝乗脾也名曰從刺期門腹滿讝語太陰陽明經也脉浮而緊肝脉也故夫乗妻名曰從當刺期門傷寒發熱嗇嗇惡寒大渴飲水其腹必滿自汗出小便利肝乗肺也名曰横刺期門發熱嗇嗇惡寒者肺病也大渴者上焦有熱也自汗者表虚也小便利者裏和也妻未乗夫名曰横當刺期門灸傷寒咳逆法十便良方云有患霍亂吐痢者垂困忽發欬逆半月之間遂至困始有人云有灸欬逆法凡傷寒及患疾得咳逆皆為惡候投藥皆不効者灸之必愈予遂令灸之火至欬逆已定其法乳下一指許正與乳相直骨間䧟中婦人即屈乳頭齊處是穴艾炷如小豆許艾三壯男灸左女灸右只一處火到當即瘥若不瘥則多不效矣治脉微細不見二時無脉者以圓利鍼刺足少隂經復溜二穴在内踝上二寸陷中鍼至骨順鍼往下刺之候廽陽脉生大乃出鍼治傷寒飲水過多腹脹氣喘穴中脘治熱病身痺洒淅振寒季脇支滿痛穴刺陷谷足先寒上至膝乃出鍼治傷寒氣熱身熱喘穴三間治傷寒過經不觧刺足厥陰經期門二穴使經不傳凡治傷寒辨其足三陰三陽經審而刺之仲景傷寒傳足經不傳手經此之謂也傷寒頭痛治傷寒寒熱頭痛噦衂肩不舉穴温溜治熱病頭痛身熱引目外眥而急煩滿汗不出引頷齒面赤皮痛穴懸顱治熱病偏頭痛引目外眥穴懸釐治振寒小作不時頭痛穴少澤治身熱頭痛進退往來穴神道闗元治頭痛食不下穴三焦腧治熱病先頭重項痛煩悶身心熱熱甚則腰痛不可俛仰又熱病滿悶不得卧身重骨痛不相和穴太白治傷寒身熱頭痛噦逆肩不得舉穴温溜治頭痛穴魚際掖門中渚通理治頭痛穴天池治頭眩痛穴支正治頭痛顛顛然穴通泉治頭痛汗不出穴魚際資生經云治傷寒頭痛藥多矣惟濃煎五苓㪚服必効不必鍼灸予屢與人皆效故也治頭痛穴風池傷寒寒熱治熱病先腰脛酸喜渴身熱項强振寒寒熱頸項腫實則肘攣虚則生疣痂穴少海支正治傷寒温病身熱煩心口乾心膽善驚手清逆氣嘔唾肘瘛善揺頭顔青汗不過眉穴曲澤治氣熱身喘寒熱口乾喘息口急痛善驚穴三間治寒熱項適厯耳鳴無聞引缺盆肩中熱痛麻木不舉穴肩貞治傷寒餘熱不盡穴曲池治寒熱好嘔穴商丘治寒熱皮肉骨痛少氣不得卧穴中府膈腧又云膈腧主嗜卧患墮不欲動搖身常熱不能食飲治寒熱悽索氣上不得卧穴支滿肩井關衝治寒熱掌中熱穴列缺治傷寒振寒頸項痛穴天井治振寒而欠穴衝陽治身熱惡寒穴後谿治傷寒熱盛煩嘔穴大椎寒熱治骨寒熱汗注不止穴復溜治寒熱解㪚淫濼頸酸四肢腫痛少氣難言穴至陽治身解寒滛樂䯒酸不能久立穴光明治寒熱風痙脊强反指穴瘂門治洒浙寒熱穴陶道神堂風池治洒浙畏寒厥逆穴陰郗治洒浙惡風寒虚熱舌黄身熱頭痛咳𠻳汗不出痺走胷背痛不得息穴魚際治發寒熱穴浮白治頭重身熱穴腎腧治身熱頭重脇痛不得轉側穴顱顖治身熱穴太白陽綱治身體煩熱穴曲差治勞疾羸痩體熱穴腦空治寒熱胷膈滿穴天池治乍寒乍熱穴少衝治