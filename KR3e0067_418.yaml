body:
  text: 普濟方卷四百十八明周王朱橚撰針灸門傷寒治熱病先腰脛酸喜渴數飲身清清則項痛而寒且酸足熱不欲語頭痛顛顛然先取湧泉及太陽井榮熱中少氣厥寒灸之熱去灸湧泉三壯煩心不嗜食灸湧泉熱去四逆喘氣偏風身汗出而清皆取挾溪治溫病身熱五日以上汗不出刺太泉留針一時取針若未滿五日者禁針凡好太息不嗜食多寒熱汗出病至則喜嘔嘔已乃衰即取公孫井俞實則腸切痛厥頭而睡起煩心狂多飲不嗜卧虛則鼓脹腹中氣大滿熱痛不嗜食霍亂公孫主之治熱病煩心足寒清多汗先取然谷後取太溪皆先補之資生經云凡溫病可針刺五十九穴又身之穴六百五十有五其三十六穴灸之為害七十九穴刺之為災治溫病穴顳顬灸陰毒傷寒法其狀不躁不渴唇青腰皆重咽喉及目睛痛心腹煩疼舌縮面青吃噫氣喘嘔逆冷汗向暗不語以生蔥約十餘莖去根粗皮顛倒紙卷徑闊二寸勿令緊欲通氣以快刀切每一餅子髙半寸安在臍心用尉斗火尉蔥軟易之不過十餘次患人即蘇後服正氣藥灸結胸傷寒法其狀胸滿短氣按之即痛或吐逆滿悶或大便不通諸藥不能救者以巴豆七粒和皮肥黃連七寸去鬚同搗爛作一丸安在臍心上以手按之稍實捻艾皂子大於藥上灸甚者不過三五壯立愈續用補藥一二日若病半月微有氣皆療治氣虛陽脫體冷無脈氣患欲絶不省人事及傷寒陰厥百藥不效蔥尉法以蔥用索纒如盞許大切去根及葉惟存白長二寸許如大餅餤先以火熁一面令通熱艾勿令灼人及以熱處搭病人臍連臍下其上以尉斗滿貯火尉之令蔥餅中熱氣尉入肌肉中須預作三四餅一餅壞不可尉又易一餅良久病人當漸醒手足溫有汗則瘥更服四逆湯俾溫其內萬萬無憂王氏云豫伯兄病傷寒冥冥不知人七八日四體堅冷如石藥不可復入用此法遂瘥集賢校理胡全夫用此拯人之危不可勝數初得病或先頭痛身寒熱或澀澀欲守火或腰背強直面目如飲酒狀此傷寒初得一二日但烈火灸心下三處穴巨關上管胃管各灸五十壯大人可五十壯小兒可三壯亦隨其年灸之大小以意斟量治傷寒若病者三四日以上宜先灸胸上二十壯又灸顳顬二穴又灸風池二穴又灸太衝三十壯神驗又灸肝腧百壯餘處各三十壯又以繩度鼻正上盡髮際中屈繩斷去半便從髮際入髮中灸繩頭名曰天聰資生經云凡傷寒惟陰證可灸餘皆當針故千金方惟云刺取而素問亦云病甚者為五十九刺所以㵼諸陽胸中胃中四肢五臟之熱也若溫病身熱五日以上汗不出可刺太泉未滿五日禁針刺而千金於頭痛身寒熱病及灸巨關上中管三處豈亦是陰證耶其狀蓋云咸澀澀欲守火是也醫者當辨之治熱病卒心中懊憹數欠頻伸悲恐目眩頭痛面赤而熱心悸肘臂臑痛實則肢腫虛則不能言若咽喉痺少氣遺溺穴通里療天行傷寒穴中管治傷寒嗜卧怠惰不欲動搖身常濕不能食穴膈腧治熱病煩滿上氣心痛痰冷少氣悲恐善一作喜驚及掌胸痛口熱咽酸乍寒乍熱手攣不伸引眼痛穴少衝治傷寒餘疾皮膚乾燥穴曲池治熱病先不樂數日穴通里治熱病振栗鼓頷腹滿陰痿色不變穴魚際陽谷治氣隔喜嘔鼓頷不得汗穴尺澤治頭身熱赤振栗腰中四肢淫濼欲嘔穴腎腧治氣熱身熱喘寒熱口乾身熱喘息目急痛善驚穴三間治熱病寒栗鼓頷腹滿陰痿色不變穴魚際治熱病煩心心悶汗不出掌中熱心痛身熱如火舌本痛穴中衝少衝關衝勞宫大陵陽溪天窖間使治熱病煩心喜噦胸中淡淡喜動而熱穴間使治煩心喜嘔穴巨關治傷寒溫病身熱煩心口乾穴曲澤治熱病先腰脛酸喜渴數飲食身熱項強痛振寒寒熱頸項腫實肘肘攣頭眩痛虛則生疣小者如疥穴支正少海治振寒頸項痛穴天井治熱病俠脊痛穴委中治傷寒頸項強目瞑多噎鼻􅍠出清涕穴風門王氏云陰毒沉困藥餌難為功但灸臍中三百壯艾如半棗手足不暖不可治也或心迷耳聾呌不應因食冷得疾者豫以理中湯救數人矣若復渴則煎五苓散與服或煎人參湯服皆效又云傷寒多從風寒得之始表中風寒入裏則不消矣未有溫覆而不消也治傷寒結胸穴支溝間使行間治傷寒在表發熱惡寒頭項痛腰脊強無汗尺寸俱浮穴合谷治傷寒飲水過多腹脹氣喘心下痛不可忍穴中管氣海治傷寒少復上有氣衝者穴天樞氣衝三里三陰支治傷寒手足逆穴大都內庭大溪行間治傷寒交汗不出穴風池俠溪魚際經渠內庭治傷寒胸中熱不已穴大杼風門中府缺盆治傷寒胃中熱不已穴中脘三里上廉下亷氣衝治傷寒四支熱不已穴雲門肩髃委中腰腧治急食不通并傷寒水結穴三間合谷承山治隂證傷寒四支厥冷腹痛吐痢身強煩躁自汗脈沉細或面赤凡三隂中寒皆灸之穴陷谷灸二三七壯體溫脈通汗出效不爾再灸加艾倍之治卒得食病似復寒其人但欲卧七日不療殺人右按其脊兩邊當有陷處止灸陷處兩頭各七壯則愈治傷寒始得一二日右便可灸頂三壯又灸大椎三壯各加至五炷益良用之驗大椎平肩針齊髙大者是也仍不得侵項分取之則非也上接項骨下肩齊在椎骨節上是餘穴盡在節下凡灸刺不得失之毫釐今崔氏不定髙下是以言之出黃帝針灸經治斷溫病令不相染著及治時氣瘴疫右用蜜艾灸病人床四角各一壯不得令知之佳也治隂毒傷寒灸法用乾艾葉搗熟去灰作艾炷灸臍下一寸三分名氣海二寸丹田三寸關元五十壯至三百壯以手足漸溫人事稍蘇為可治治陰證傷寒灸法於臍下一寸氣海穴灸一七壯小作艾炷於臍下以鹽填實灸七壯立效二寸丹田三寸關元皆可灸治熱病後發豌豆瘡灸兩手腕硯子骨灸上三壯男左女右治傷寒熱盛煩嘔穴大椎治熱病偏頭痛引目外眥穴懸釐鳩尾治時氣病起諸復勞灸法男初覺便灸陰三七壯若已疾甚至百壯即愈眼無妨陰道瘡復常治傷寒熱甚五十九刺五十九刺者為頭上五行以尅越諸陽之熱也穴大杼膺腧缺盆背腧此八者以㵼胸中之熱也氣衝三里巨虛上下亷此八者以㵼胃中熱也雲門偶骨委中隨空此八者以㵼四支熱也臟腧傍五此十者以㵼臟之熱也凡此五十九穴者背之左右故病甚則當刺之凡刺之法吸則納針得氣則㵼勿令遲緩起似發機故針經曰熱者疾之刺熱病汗不出夫傷寒熱病汗不出者榮衛不交陰陽不和故汗不出當刺結雪穴通其經脈和其陰陽令汗得出手陽明有商陽合谷手太陽有腕骨陽谷足少陽有俠溪足陽明有厲兊手厥陰有勞宮凡此七穴皆刺熱病汗不出隨經辨脈調其陰陽和其榮衛令得汗出又十二經之榮皆治身熱為主身熱背南方火故經曰榮主身熱皆可刺也刺傷寒結胸痞氣傷寒下後結胸痞氣者皆足三隂之終手三陰之始胸中結痞過在足少陰腎手厥陰包絡刺兩經之井原以㵼胸中之氣心中結痞過在足太陰脾手少陰心刺兩經之井原以㵼心中之氣胃中結痞過在足厥隂肝手太隂肺刺兩經之井原以㵼胃中之氣或上腕中腕下應痞結而㵼治傷寒三陽頭痛法傷寒三陽頭痛何法刺之答曰手之三陽足之三陽皆會於頭者謂諸陽之會其受邪伏留而不去故曰三陽頭痛視其色脈知在何經而取之如脈浮而頭痛過在手足太陽刺穴腕骨京骨如脈浮而長過在手足陽明刺穴合谷衝陽如脈浮而弦過在手足少陽刺穴陽池丘墟風府風池已上數穴刺三陽之頭痛法也治傷寒三陰腹痛法傷寒邪在三陰內不得交通故為腹痛手足之經皆會於腹隨經取之如脈弦而腹痛過在足厥陰肝手太陰肺刺穴太衝太陵太淵如脈沉而腹痛過在足少陰腎手厥隂心胞刺穴太溪太陵如脈細沉而腹痛在足太隂脾手少陰心刺穴太白神門三陰交已上數穴刺三陰腹痛之法也灸少陰原救脈法治傷寒陰病脈欲絶當灸太溪穴太溪者足少陰腎之原少陰病屬水陰氣太盛陰氣不得管故㵼陰補陽隂毒傷寒體沉四肢俱重腹痛脈微遲當灸氣海或關元脈屬少陰故同法㵼隂補陽也辨傷寒藥附針灸法傷寒經與表合針與藥自汗逐漏不止刺風府風池却與桂枝湯傷寒經與裏合灸太溪七壯與通脈四逆湯此太陽少陰表裏之法故表可針太陽也裏可灸少陰也傷寒刺期門太陽病頭痛眩冒心下痞者刺肺腧肝腧不可發汗發汗則讝語不止當刺期門穴頭痛目眩太陽經病可發汗心下痞滿邪傳裏也不可發汗刺肺腧奪其邪氣二穴皆在陽經也是髙下之刺也妄發其汗內亡津液傳屬陽明故讝語不止未太實者當㵼肝經刺期門恐傳於脾胃也傷寒腹滿讝語寸口脈浮而緊此肝乘脾也名曰從刺期門腹滿讝語太陰陽明經也脈浮而緊肝脈也故夫乘妻名曰從當刺期門傷寒發熱嗇嗇惡寒大渴飲水其腹必滿自汗出小便利肝乘肺也名曰橫刺期門發熱嗇嗇惡寒者肺病也大渴者上焦有熱也自汗者表虛也小便利者裏和也妻未乘夫名曰橫當刺期門灸傷寒咳逆法十便良方云有患霍亂吐痢者垂困忽發咳逆半月之間遂至困始有人云有灸咳逆法凡傷寒及患疾得咳逆皆為惡候投藥皆不效者灸之必愈豫遂令灸之火至咳逆已定其法乳下一指許正與乳相直骨間陷中婦人即屈乳頭齊處是穴艾炷如小豆許艾三壯男灸左女灸右只一處火到當即瘥若不瘥則多不效矣治脈微細不見二時無脈者以圓利針刺足少隂經復溜二穴在內踝上二寸陷中針至骨順針往下刺之候廽陽脈生大乃出針治傷寒飲水過多腹脹氣喘穴中脘治熱病身痺灑淅振寒季脅支滿痛穴刺陷谷足先寒上至膝乃出針治傷寒氣熱身熱喘穴三間治傷寒過經不解刺足厥陰經期門二穴使經不傳凡治傷寒辨其足三陰三陽經審而刺之仲景傷寒傳足經不傳手經此之謂也傷寒頭痛治傷寒寒熱頭痛噦衄肩不舉穴溫溜治熱病頭痛身熱引目外眥而急煩滿汗不出引頷齒面赤皮痛穴懸顱治熱病偏頭痛引目外眥穴懸釐治振寒小作不時頭痛穴少澤治身熱頭痛進退往來穴神道關元治頭痛食不下穴三焦腧治熱病先頭重項痛煩悶身心熱熱甚則腰痛不可俯仰又熱病滿悶不得卧身重骨痛不相和穴太白治傷寒身熱頭痛噦逆肩不得舉穴溫溜治頭痛穴魚際掖門中渚通理治頭痛穴天池治頭眩痛穴支正治頭痛顛顛然穴通泉治頭痛汗不出穴魚際資生經云治傷寒頭痛藥多矣惟濃煎五苓散服必效不必針灸豫屢與人皆效故也治頭痛穴風池傷寒寒熱治熱病先腰脛酸喜渴身熱項強振寒寒熱頸項腫實則肘攣虛則生疣痂穴少海支正治傷寒溫病身熱煩心口乾心膽善驚手清逆氣嘔唾肘瘛善搖頭顔青汗不過眉穴曲澤治氣熱身喘寒熱口乾喘息口急痛善驚穴三間治寒熱項適厯耳鳴無聞引缺盆肩中熱痛麻木不舉穴肩貞治傷寒餘熱不盡穴曲池治寒熱好嘔穴商丘治寒熱皮肉骨痛少氣不得卧穴中府膈腧又云膈腧主嗜卧患墮不欲動搖身常熱不能食飲治寒熱悽索氣上不得卧穴支滿肩井關衝治寒熱掌中熱穴列缺治傷寒振寒頸項痛穴天井治振寒而欠穴衝陽治身熱惡寒穴後溪治傷寒熱盛煩嘔穴大椎寒熱治骨寒熱汗注不止穴復溜治寒熱解散淫濼頸酸四肢腫痛少氣難言穴至陽治身解寒淫樂䯒酸不能久立穴光明治寒熱風痙脊強反指穴啞門治灑浙寒熱穴陶道神堂風池治灑浙畏寒厥逆穴陰郗治灑浙惡風寒虛熱舌黃身熱頭痛咳嗽汗不出痺走胸背痛不得息穴魚際治發寒熱穴浮白治頭重身熱穴腎腧治身熱頭重脅痛不得轉側穴顱囟治身熱穴太白陽綱治身體煩熱穴曲差治勞疾羸瘦體熱穴腦空治寒熱胸膈滿穴天池治乍寒乍熱穴少衝治