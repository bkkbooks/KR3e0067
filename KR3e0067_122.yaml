body:
  text: 普濟方卷一百二十三明周王朱橚撰傷寒門傷寒運氣精華圖說傷寒五運六氣歌甲己土運乙庚金丁壬木運盡成林丙辛水運分清濁戊癸南方火熖侵傷寒六氣歌子午君火少隂心丑未脾土太隂存寅申少陽相火位卯酉陽明屬燥金己亥厥隂風木是辰戍太陽寒水侵天地六氣自然數支上排輪仔細尋傷寒逐年五運歌大寒木運始行初清明後二火運居芒種後三土運是立秋後四金運推立冬後五為水運周而復始萬年餘六氣相移換而不株守其位毎年如此傷寒逐年六氣歌大寒厥隂氣之初春分君火二氣居小滿少陽分三氣太隂大暑四氣符秋分陽明為五氣太陽小雪六之餘傷寒逐年主氣歌初氣逐年木主先二君三相火排連四來是土常為主五氣金星六水天傷寒逐年客氣歌每年退二是客鄉上臨實數下臨方初中六氣排輪取主客興衰定弱强假令癸丑年司天退二辛亥是也厥隂風木為初之客氣也子為二之氣丑為三之氣寅為四之氣卯為五之氣辰為六之氣是也傷寒逐日受病起例歌年年逐日是司天前三司地順排連陽前隂後加人命數到司天見病源司地位上分前後攴屬隂陽仔細看却將本命依前取輪至病日是其端假令戊寅生人甲子日得病子日即是司天前進三辰數至卯上是司地卯日是隂支退一位從寅上數本命寅順行至司天位上見子是少隂天字號第一證甲字號下藥假令丁酉生人辛亥日得病辛是水運厥隂司命辛亥日是隂日第五宫是卯便從卯上將本命丁酉順數至司天亥上見巳是厥隂證以得病日為主便將五子元運歌訣云丙辛之嵗庚寅是就寅上加庚字順數到亥上見己字亥乃厥隂風木己是太隂濕土汗差歌云木土丙辛之日差假令戊戌生人壬子日得病是少隂司天壬子日是陽日順數三宫至寅便從寅上將本命戊戌順數至司天上見申是少陽膽第一日膽少陽受病為主二日傳未太隂脾土少陽相火火生土為㣲邪當先補心㵼脾三日傳至午少隂火前少陽三焦亦是火當觧心經四日傅至巳厥隂木三焦火木生火為虚邪當補肝㵼心而愈五日傳至辰為太陽水三焦是火水尅火為客勝主其人危困或死假令己亥生人癸丑日得病屬太隂司天癸丑是隂日順數至第五宫是巳便從巳上將本命亥順數至司天丑上見未太隂證便念傷寒歸號歌云太隂丑母用心精母字號下第一證乙字號藥桂枝湯主之餘倣此又起例歌素問運氣是根基當日隂陽用意推陽三隂五前行順加臨人命在於期又將十干加命上數到司天病總知良工若還明此法何憂道藝不精奇假令庚子生人甲寅日得病是少陽司天甲寅是陽日從寅上順數第三宫是辰將本命庚子順數至司天寅上見戌是太陽證便用甲寅起五子元運歌甲巳之年丙作首數到人命寅字上見丙是小腸屬火逢水汗出第三日丙辰丙是水運是小差日第七日寅申相冲庚是金運金生水汗出子時一刻或三刻餘倣此傷寒逐日受病㨗法起例歌子午之日起寅申丑未之日己亥親寅申辰戍常須記己亥夘酉不虚陳此是六氣㨗訣法辰戍子午正相因若要傷寒傳六氣司天前後起三辰此法與前相同傷寒五運受病歌括起例甲己化土未為期乙庚金運酉中知丙辛水運從子上丁壬木運卯中隨戊癸火運元居午五運皆同旺處推丑命生人子日病順數見午少隂居假令丑命人甲子日病便用司天歌念甲己化土未為期丑加未上順數到司天位上見午字即是少隂君火證也餘倣此例其病熱氣蒸口燥咽乾煩悶又如甲子日得病甲己土運從未上加人命順數到子上見午以得病日為主便用五子元運歌訣順推甲巳之年丙作首遂就寅上加丙字順數到午位得庚午庚本屬大腸燥金午為少隂君火金火相尅宜㵼苦補辛傷寒求司天司地歌司天司地隔三位隂陽上下搃堪推後學醫流如曉得逐年病體見根基假令癸丑年太隂濕土司天前三位太陽寒水司地傷寒求司天司地司人法當日日辰名司天司天前三辰名在泉為司地左右間氣名司人傷寒求左右間氣歌未日司天地氣真間氣湏憑左右分中文午上標兩手日前三位在泉應相冲隔位名足脉明者須知動静形端明此法通神聖隔簾診線謾沉吟傷寒求太過不及平氣歌子午寅申是太過卯酉己亥不及名辰戌丑未為平氣此是地支取用精傷寒六氣所屬歌辰戌行太陽膀胱及小腸卯酉陽明金大腸胃中尋寅申少陽膽三焦本自兼丑未太隂居脾肺總不虚少隂行子午心腎南北都己亥厥隂木肝與胞絡屬傷寒地支所屬歌子為足少隂腎水湧泉深午為手少隂君火配屬心丑足太隂脾土能主四肢未手太隂肺金商毛髮皮寅手少陽火三焦相安坐申居足少陽膽火亦居左卯手陽明金大腸未可侵酉為足陽明榮育土堪任辰乃足太陽膀胱水可量戌為手太陽小腸胃中蔵已木手厥隂安居包絡心亥足厥隂木肝蔵配如今傷寒十二支所屬臓腑歌子中正者膽為頭丑位主肝寅肺流卯上大腸辰主胃巳為脾統午心頭未上小腸同主命血脉膀胱主在猴酉腎戌胞傳注處亥上三焦是地頭傷寒十干所屬歌甲膽乙肝丙小腸丁心戊胃已脾傍庚屬大腸辛屬肺壬是膀胱癸腎堂撿卷歌括上二中三四等旬第五傳流到卯寅六亥子丑分三證便是隂陽活法人又曰上二中三四為儔少陽陽明第五逰厥隂少太尋第六霍亂勞傷七為周普濟方卷一百二十三
