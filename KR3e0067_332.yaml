身黑色漸欲成勞當歸荆芥穗牡丹皮去皮心虎杖木通馬鞭草各一分大黃醋炙如前官桂去粗皮生用芫花土器內醋炒黃色芍藥各半兩右細杵羅為末每服三錢水一盞漫煎至半盞食後和滓喫以經候通為度經候既行即不請喫也若喫此藥了大腑已冷而經候未通即住藥數日候臟腑堅牢即再喫加甘草治室女經十六十七歲無經脈通行兩腳痛行不得肌肉消瘦上焦壅熱大腑乾澀頭痛眼昏牡丹皮去心當歸芍藥牛膝桃仁去皮尖大黃醋煮官桂川芎各一分半夏二銖右細杵羅為細末每服二錢熱湯半盞入藥末童子小便半盞煎一兩沸空心和滓喫土器內煎治室女十六十七歲未有經候通行上焦壅肌肉消瘦肉色忽通身黃忽通身黑大腑熱小便黃赤五心煩躁漸欲成癆宜服此藥荆芥穗連翹牡丹去心射干大黃醋一碗煎乾二分前胡柴胡各去毛桃仁去皮尖虎杖麻黃去杏仁各一分細辛右細杵羅為末每服三錢以熱湯半盞對童子小便半盞入藥末同煎一兩沸食後和滓服經候通止後服治腎氣虧弱不能生肝肝氣虧乏不能生血經後多少遲速不節不能懷孕還復墮胎診其脈關尺俱微細宜服此補肝腎方當歸杜仲去粗皮石斛去頭白芷五味子川芎人參艾葉澤蘭續斷木香各一分川椒二銖細辛三銖右細杵羅為末煉蜜丸如梧桐子大早晨空心鹽湯下三十丸調經湯治衝任脈虛風寒客搏氣結凝滯每月經候將行臍腹先作痛或小腹急脹攻注腰腳疼重欲行時預前五日及經斷後五日並宜服之當歸洗焙半夏湯洗七次甘草炙麥門冬去心五加皮乾熟地黃炒焙川芎吳茱萸湯洗七次肉桂去蘆頭牡丹皮赤芍藥烏藥人參去蘆頭紅花已上十四味各一兩沒藥半兩别研右㕮咀每服五錢水一盞半薑三片煎至一盞去滓食前溫服禹餘糧丸治月水乍多乍少或前或後生地黃一兩禹餘糧白术芍藥當歸續斷各半兩右為細末煉蜜丸如梧桐子大每服三十丸米飲下未知加至五十丸偏少者加當歸芍藥成一兩偏多者倍斷續地黃絶産者加從容一兩腹痛者加蒲黃桂各半兩升陽除濕湯治經水不調如右尺脈按之空虛是氣血俱脫大寒之證輕按甚數疾舉指弦緊或滯澀皆陽脫之證隂火將亡見熱證于口鼻或時靜或時躁此陽欲去之徴也當溫之服大升降氣血之劑峻補命門之下脫也柴胡根三錢諸言者迹苗處去苗便是在地之下是不在深細根羌活二錢藁本去土三錢白术三錢紅花五分當歸根三錢桃仁湯浸去皮尖十箇細研川芎一錢肉桂去皮盛夏勿用秋冬月半減細辛根六分熟乾地黃一錢水中沈者是人參二錢去蘆白芍藥半錢防風根二錢黃耆三錢味甘者佳獨活根一錢半有鬼眼者佳黑附子炮裂去皮臍三錢炙甘草稍子一錢尖細處是也右㕮咀每服稱三錢或二錢若病勢甚當漸漸加至半兩止每服水三錢煎法如常空心服之暖宫丸出楊氏家藏方治衝任脈弱經候不調因成帶下妊娠不牢久無子息日漸羸瘦手足煩熱變骨蒸並宜服之常服大益氣血當歸洗焙二兩續斷藁本去土吳茱萸湯浸七遍焙乾五味子人參去蘆頭白茯苓白术綿黃耆蜜炙川芎香白芷縮砂仁乾薑萆薢酒浸一宿已上一十四味各一兩石斛三兩去根稱牡蠣煨通紅研細稱香附子炒熟乾地黃洗焙山藥兔絲子好酒煮軟焙七分乾砂器研焙乾稱羌活去蘆頭白龍骨細研已上七味各二兩茴香一兩半炒研山茱萸去核半兩玄胡索半兩川椒半兩右為細末煉蜜為丸如梧桐子大每服五十丸溫酒或醋湯送下空心食前服養血丸出楊氏家藏方補血海療虛弱調經候快三焦進飲食久服令人肥盛有子大治月事阻滯腹脅作痛或結堅塊面黃髮落時發寒熱身羸瘦牡丹皮白芍藥卷柏當歸洗焙石斛白茯苓去皮炙巴戟去心熟地黃洗焙肉從容酒浸一宿切焙乾杜仲去皮炙山藥柏子仁別研白薇枳殼去穰麩炒黃色蒲黃微炒肉桂去粗皮荆三稜煨香切蓬莪术煨香切枸杞子覆盆子已上二十味各一兩附子炮去皮臍半兩右件為細末煉蜜為丸如梧桐子大每服五十丸酒或米飲送下空心食前服固經丸出楊氏家藏方治衝任虛弱月候不調來不斷淋瀝不止艾葉醋炙炒鹿角霜乾薑炮伏龍肝各等分右件為細末鎔鹿角膠和藥成熱丸如桐子大每服五十丸淡醋湯下空心食前服益真鹿茸丸出楊氏家藏方治衝任俱虛血海久冷經候不調肌體羸瘦飲食減少石斛牛膝酒浸一宿焙肉從容酒浸一宿焙紫石英鱉甲醋炙續斷柏子仁五味子黃耆蜜炙巴戟去心十味各一兩安息香酒熬去砂石鹿茸酒炙沈香三味各半兩山藥三分覆盆子右件為末煉蜜丸如梧桐子大每服五十丸酒鹽湯或糯米飲送下空心紫桂丸出楊氏家藏方治補益血海治衝任氣虛經不調或多或少腰疼腹痛冷帶崩漏禹餘糧火煆醋淬七遍三兩龍骨艾葉醋炒牡蠣燒赤石脂地榆各二兩厚朴薑汁製炒牡丹皮阿膠蛤粉炒成珠子香白芷當歸洗炒吳茱萸浸七遍微炒肉桂去粗皮各一兩附子炮去皮臍半兩右為細末糊丸如梧桐子大每服三十丸濃艾葉醋湯空心食前溫服防風散出朱氏集驗方治女人經脈不勻氣血壅滯肺有風熱遂令遍身隱疹經紫成片肌肉頑痺皮膚粗澀或時瘙癢北防風川當歸赤芍藥牛旁子各一兩荆芥穗一兩二錢蟬殼七錢半去土生地黃香白芷甘草白附子白殭蠶去絲何首烏烏蛇肉浸去皮骨焙乾俱各半兩紫參右件為細末每服三大錢加至四錢溫酒調下如不飲酒以蜜湯調服終不若酒之功四物湯出淡療方調益榮衛滋養氣血治衝任虛損月水不調臍腹疞痛崩中漏下妊娠將理失宜胎動不安血下不止及産後乘虛風寒內搏惡露不下等症熟乾地黃酒洗如九蒸九曝去製尤妙當歸切去蘆銼微炒白芍藥川芎各一兩右為粗散三錢水一盞半煎至八分去滓空心食前服經血凝滯腹內血氣作痛加莪术官桂名六合湯一方以地黃殢血不能止痛不若只用五味婦人心腸痛不可忍者去地黃加乾薑名四神湯治下血不止及妊婦胎動不安加艾十葉阿膠一片同煎或加熱艾甘草阿膠黃茋等分作膠艾湯産後血搏口乾煩渴加括蔞麥門冬兩脅脹滿加厚朴枳實虛煩不得卧加人參竹葉大渴煩躁加知母石膏同煎易簡方糾繆云四物湯為婦人要藥今不明其要妄肆臆説亦由囂㕓採賣之家不曾依法用酒九蒸九曝以制地黃蓋生則性平而宣熟則性溫而補若蒸晒遍數足決然成功正易簡方乃用當歸川芎芍藥人參乾薑甘草等分每服四錢水一盞煎至六分熱服名增損四物湯治婦人血氣不足四肢怠墮乏力少氣兼治産後下血過多榮衛虛損等證加減四物湯出朱氏集驗方治經候不調腹中疼痛或腳氣衝心四物湯加琥珀煎見效并醋一合煎立效治一切婦人內失將養經候不調骨糟積熱虛實不等非時上焦發熱忽至夜渾身發熱非時背膊勞倦似病不病忽時煩躁精神不安宜服此調宫臟解勞氣方只用經候行時喫若經候已上四五日即住此藥喫後方藥經候復行即住後方藥仍喫此藥兩件觀臟腑進服出護命方桑寄生延胡索鱉甲醋炙當歸各半兩續斷芫花醋炒黃色石斛木香各一分右藥先製芫花一味研為細末所餘衆藥杵羅為末相和令勻每服二錢用鍋內水一盞煎兩三沸溫和去滓空心喫忌甘草治婦人骨槽積熱內失將養經候不調變成勞候非時發熱勞倦不安將此藥對前面方藥服若經候行即住此藥不喫若經候止按定數日仍進此藥出護命方麻黃去根柴胡去毛鱉甲醋炙前胡去毛紫菀杏仁去尖枳殼只用青天靈蓋酥炙黑色桔梗去毛各一分右為細末每服三錢水一盞生薑二片同煎取三兩沸食後臨卧去滓溫服伏龍肝散出永類鈐方治血氣勞傷衝任脈虛經血非時注下或如豆汁或血片五色相雜臍腹冷痛經久不止方見本門前崩中漏下類十味養榮湯出朱氏集驗方治婦人血氣不足臍腹疞痛月水不調熟地黃酒洗黃茋蜜炙各二兩半牡丹皮炒五味子肉桂去皮白芍藥炒白茯苓各一兩當歸酒浸川芎各二兩甘草七錢炙右㕮咀煎服治婦人月經不調腹中結塊及崩中淋露産後血暈暴血衝上因損下血出本草以延胡索酒摩或煎服普濟方卷三百三十二
