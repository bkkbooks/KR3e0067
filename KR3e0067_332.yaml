body:
  text: 普濟方卷三百三十二明周王朱橚撰婦人諸疾門總論夫濟世之道莫先於醫論醫之難濟隂猶急何則婦人之病比之男子十倍難療或云七癥八瘕九痛十二帶下共三十六病雖有名數莫詳證狀惟原其理莫非血病盖平日經脉失於將理産蓐不善調䕶内作七情外感六淫隂陽勞逸飲食生冷遂致榮衛不輸新陳干忤輕則經濁淋露重則凝滯為癥瘕流溢穢惡痛害傷痼以致所患不一所謂犯時微若秋毫感病重於山嶽是也凡女子十四而天癸至天謂天真之氣降癸為壬癸水名故云天癸而衝任脉主之衝任者血之海也月水者經絡之餘也盖婦人以血為本心主血肝行血榮衛四體如環無端灌注百脉餘者為月候以時而行若水溢自流不自知覺故纎疴不作而氣體充盛而有子矣其有來多不斷或過期不來或未期而先來參錯不一而病生當其來時則上一日之前腰腹滿痛或頭疼作熱百節攣急甚於重患過此則發為虚熱自汗加以五心内熱遂為虚勞血少未涸燥氣乗肺則為咳𠻳宿寒留滯血與氣搏則為腹痛敗血結塊時發寒熱則為癥瘕或風寒濕滯經血化為水流溢四肢為之血分脾不能制血與水并腹脹肌肉為之虚腫或衝任氣血内熱過度風邪冷熱之氣入於胞門穢液與血兼下冷則多白熱則多赤冷熱不調赤白相半或為赤白帶下若衝任經勞損經海動傷脾虚胃熱不能約制其血倐然暴下故謂崩中漏下所下五色各應五臟五臟俱虚五色併下以致眩暈煩悶嘔惡怔忡迷亂多忘發狂妄語小便不禁是皆血之為病也復有生於嬌貴之家愛憎在念而氣逆於中故氣逆一息不行血有一息不運則胸腹脹痛眩暈嘔噦倦乏不勝自持飲食不為肌膚致成重患治療之際調氣為上調經次之斯可為定法血氣和平隂陽調順則精血聚而胞胎成胞胎已成而心腎二脉其動也應手而疾盖心之所主者血腎之所主者精精血交併而成之精勝則為男血勝則為女此亦自然之理也血氣不調隂陽愆伏隂過於陽則經脈先期而來陽過於隂則經脉後期而至盖血脈得熱則宣流得寒則凝澁隂氣乘陽内寒血澁故其來乍少陽氣勝隂血熱流散故其來乍多過不及皆致病也經脉不行其候有二一則血氣盛實經脉遏閉其脉滑實見之當通經疎利一則風冷内傷七情内賊以致經絡痺滯其脉浮濇見之解散風冷去瘀生新經絡不行此諸病之所由住也夫婦人乃衆隂所集常與温居貴乎血盛氣衰血盛氣衰是謂從從則百病不生血衰氣盛是謂逆逆則灾害至且婦人嗜慾多於丈夫生病倍於男子及病也比男子十倍難療尤不可不攻若四時節氣喜怒憂思飲食房勞為患者與丈夫同也夫人將攝順理則血氣調和風寒暑濕不能為害若勞傷血氣則風寒乗虚而干之或客之於經絡或循入於腹中内受風邪脾胃虚弱故不能消其飲食也食既不充榮衛凝澁肌膚黄燥而不光澤若大腸氣虚則變為下痢若流入關元致絶子嗣隨其所傷而變成疾醫經曰凡婦人三十六種病皆由子臟冷熱勞損而挾帶下起於胞内是故衝任之脉為十二經之㑹海婦人之病皆見手少隂太陽之經而候之内經云百病皆生於氣經有所謂七氣有所謂九氣喜怒憂懼悲恐驚者七氣也七情之外益之以寒熱二證而為九氣也氣之為病男子婦人皆有之惟婦人血氣為患尤甚盖人身血隨氣行氣已壅滯則血與氣併或月事不調心腹作痛或月事将行預行作痛或月事已行淋瀝不斷心腹作痛或循腰脇或引背膂上下攻刺吐逆不食甚則手足搐搦狀類驚癎或作寒熱或為癥瘕股肉消瘦非特不能受孕久而不治轉而為瘵疾者多矣婦人室女有生平無病者一旦忽感手足搐搦之證痰涎壅塞精神昏憒不省人事徃徃醫者便作癎證治之非也殊不知婦室以肝氣為主盖肝乃血之府庫肝既受病經候愆期或多或少或閉斷不通肺宫堙塞隨其虚實而生病焉婦人多由血氣虚七情所感而生風女子血實七情所感而生熱邪乗四肢是以率然手足搐搦狀類癎證也治療之法先宜多進蘇合香丸温酒化服以快其氣候其生醒亟亟調經調經之法塞者通之通者調之虚者與之實者收之婦人宜服白薇丸女子宜服澤蘭丸多服以病退為期也有此隂陽有此血氣氣陽也血隂也男以陽為主則陽勝乎隂女以隂為主則隂勝乎陽氣血之為病男女則同耳人皆知百病生於氣又孰知血為百病之胎乎血猶水也水行乎地中百川理則無壅遏之患矣人之血脉或凝滯於經絡腸胃之間百病由此而根矣乍寒乍熱發黄發狂讝妄驚狂煩悶嘔惡癡痰自汗閧熱虚勞尿淋漏崩吐衂咳唾以致眩暈厥冷昏憒迷忘塊痛瘀疼起止遺溺凡此數證非血而何經所謂先去其血然後調之良有以也夫血得寒則閉澁得温則宣流榮氣虚竭風冷交侵固易為虚勞月閉之證其若出血等類大抵多因畜熱治之榮道亦開鮮血亦為之不禁矣川芎當歸血中上藥也出血諸證每每以胃藥收功盖心主血肝藏血胃者又所以生其血而能使其氣歸元故其血自止經不云乎血隨氣行氣逆則血逆於此尤當加意素問曰目得血而能視耳得血而能聽指得血而能攝掌得血而能握足得血而能歩臟得血而能液腑得血而能氣夫血既通流則氣亦至也氣先行于其中血自通利而機無不應矣故素問云氣血人之神也不可不謹調䕶而婦人以血臟為基本夫婦人之病手太陽手少隂小腸心之經絡為表裏起自衝任之脉於中極之下以上毛際循腹裏關元上至咽喉復循面目過帶脉環臍而止以婦人月水一月一來如期謂之月信期不來則風熱傷於經絡故血在内不通或内受邪熱脾胃虚損不能飲食食既不充榮衛凝澁肌膚黄燥面不光澤或大腸虚變為下痢流入闗元致絶子嗣而子臟冷虚勞損而疾帶下起於胞内夫帶下之造化但分經絡標本殊異為病之本氣也其病所發正在過本脉之分而淋瀝以下故曰帶下也赤白之色亦無定也曰頭目昏眩口苦舌乾咽嗌不利小便赤色大小便澁滯脉實而數者皆熱證也凡白帶下者亦皆有之為病寒素問亢則害承迺制謂亢過極而反兼已勝之化制其甚也則如火煉金熱極則反化為水及六月熱極則物反出液而濕潤材木流津故肝熱極則出泣心熱甚則出汗脾熱甚則出涎肺熱甚則出涕腎熱甚則出唾大凡俗類以火煮湯熱極則沸溢及熱氣薫蒸於物而生津液也故下部任脉濕熱甚者津液湧而溢已為帶下見俗醫白帶下者但依方論而用辛熱之藥雖有誤中致令鬰熱氣不能宣通舊病轉加世𫝊誤之久矣寡婦之病自古未有言者惟倉公𫝊於禇證略而論之言寡婦者孟子正謂無夫曰寡是也如師尼喪夫之婦獨隂無陽欲男子而不可得是以懨懨成病也易曰天地絪緼萬物化醇男女媾精萬物化生孤隂獨陽可乎夫既處閨門慾心萌而不遂隂陽交争乍寒乍熱有類瘧疾久則為癆又有經閉白淫痰逆頭風膈氣痞悶面䵟瘦瘠等證皆寡婦之病診其脉獨肝脉弦出寸口而上魚際究其脉原其疾皆血盛而得經云男子精盛則思室女子血盛則懐胎觀其精血思過半矣婦人血海挾受風邪不換金正氣散加川芎官桂主之以至眩暈煩悶嘔惡怔忪迷亂多至忽發狂妄語小便不禁此婦人以血受病最多而血之為病遇夜愈增劇也血屬隂隂虚則争濟生㧞萃云婦人童㓜至天癸未行之脉皆屬少隂天癸既行皆從厥隂論之天癸已絶乃屬太隂經也治胎産之病從厥隂無犯胃氣及上三焦為之三禁不可汗不可下不可利小便發汗者同傷寒下早之證利大便則脉數而已動脾利小便則内忘津液謂中枯燥製藥之法能不犯三禁則榮衛自和而熱止矣如發渴而用白虎氣弱則黄耆血刺痛而用以當歸腹中疼而加之芍藥大抵産病從增損柴胡雜證從增損四物宜詳察脉證而用之月水不調附論岐伯曰女子七歳腎氣盛齒髮更至二七而天癸至任脉通太衝脉盛月事以時下天謂天真之氣降而為水癸水行故云天癸也然衝為血海壬主胞胎腎氣全盛二脉流通經脉漸盈應時而下所以謂之月事者平和之脉常以三旬一見以像月盈則虧也若遇經脉行時最宜謹慎將理失宜似産後百般受病輕則為宿疾重可死矣盖破經則血氣錯亂經脉斬然不行逆於身則為血分榮枯等疾若其時勞力則生虚熱變為疼痛之根若恚怒則氣逆氣逆則血瘧逆於腰腿則遇經行時腰腿疼痛重過期即安也逆於頭腹心肺背脇手足之間則遇經行時其證亦然若怒極則傷肝而有眼暈脇痛嘔血瘰􅐇癰瘍之病加之經血滲漏於其間遂成竅穴淋瀝無有已也凡此之中時風則病風感冷則病冷久而不愈變證百出所謂犯時微若秋毫感病重如山嶽可不畏哉飲食五味養髓骨肉肌膚毛髮男子為陽陽中必有隂隂之數八故一八而陽精升二八而陽精溢女子為隂隂中必有陽陽之數七故一七而隂血升二七而隂血溢皆飲食五味之精液所為也方其升也智慮開明齒牙更始髮黄者黑筋弱者强暨其溢也凡屬身體耳目之餘雖針芥之微歴無不到故子形肖父母者以其血經常與父母之身無所不厯也是以其父一肢癈則子一肢不肖其父一目虧則子一目不肖其母亦然雌鳥牝獸無天癸而成胎何也鳥獸精血徃來尾間也精未通而御女以通其精則五體有不滿之處異日有難狀之疾隂已痿而思室以降其精則精不出而内敗小便道澁而淋精已耗而復竭之則大小便道牽痛愈疼則欲大小便愈便則愈疼女人天癸既至踰十年無男子合則不調未踰十年思男子合亦不調不調則舊血不出新血誤行或漬而不入骨或變而成腫或懽合而竭或合男子多則瀝枯虚人産乳衆則血枯殺人觀其精血思過半矣大率治病先論其所主男子調其氣女子調其血氣血人之神也不可不謹調䕶然婦人以血為本氣血宣行其神自清所謂血室不蓄則氣和血凝成孕此乃調爕之常其血不來有因風熱所傷經血不通或外感風邪内受邪熱脾胃虚弱不能飲食食既不充榮衛抑遏肌膚黄燥面無光澤時發寒熱腹脹作痛難於子息子臓冷熱久而勞損必挾帶下便多淋瀝忽致崩漏經云腹中如塊忽聚忽散其病乃癥血痼不流而搏腹脹而作寒熱此乃成瘕或先後爽期雖通而或多或寡究病之源盖本如此論曰經者常候謂候其一身之隂陽愆伏知其安危故其來必以月太過不及皆為不調過於陽則前期而來過於隂則後期而至其有乍多乍少斷絶不行崩漏不止亦由隂陽衰盛寒熱為邪夫婦人月水不調由勞傷氣血致體虚風冷之氣乘也若風冷之氣客於胞内傷於衝任之脉損手太陽少隂之經衝任之脉皆起於胞内為經脉之海手太陽小腸之經手少隂心之經也此二經為表裏主上為乳汁下為月水然則月水是經絡父母之身無所不厯也則月水是經絡之餘若冷熱調和則衝脉任脉氣盛勝太陽少隂所生之衆宣流依時而下若寒濕乖適經脉則虚若有風冷虚則乘之邪搏於血或寒或熱或濕則血結泣則血消故月水乍多乍少不為調也仁存方載許學士云治婦人病多是月經乍多乍少或後或前時發頭疼醫者一例呼為經病不曾説得隂勝陽陽勝隂服藥所以少効盖隂勝陽則胞寒氣冷血不運行經所謂天寒地凍水凝成氷故令乍少而在月後若陽乗隂則血流散溢經所謂天暑地熱經水沸溢故令乍多而在月前治者當知其隂陽調其氣血使不相勝以平為福聖濟總録云月水不調者經脉或多或少或湛或濁或先期而來或後期而至是也盖由失於調養而衝任虚損天癸之氣乖於常度故内經曰任脉通衝脉勝月事以時下言其有常度也危氏得効云二七天癸至七七天癸竭行早性機巧行遲魯鈍通行則隂陽和合始能生子年十四歳當時二十歳不行命臨風燭朝不保暮有病發則死間有不死百中無一亦令一生多病未嘗一日安裕然有四季行亦可又有一年一次者亦不甚嘉或一生不循正道而行者晩年有病疾則難治應騐云夫女子十四則月水行男子十六則陽精溢此皆合乎隂陽之數各及其時故男子之精氣宜盛女子之月水宜調調經之道貴乎䟽其氣以行其血血盛氣變是謂之從從則百病不生孕育無損矣且婦人之病四時所感六淫七情所傷悉與男子治法一例惟胎前産後七癥八瘕崩漏帶下之證為異故凡制方究其所因多由月水不調變生諸證大概婦人之病以經脉如期為安或有愆期當審其冷熱虚實而調之先期而行者血熱故也當清之過期而行者血寒故也當温之又不可不察其有無外邪為之寒熱而後投藥也夫血者隂之物象月盈虧應時而至故謂之月水女子衝任氣血經絡不和其血應至而未至或斷或續或多或少血色有異是月水不調之證也方菴䕡子散出聖濟緫録治婦人血氣不調經脉不定腹脇多脹或五六月一來三二月一來雖來色如煮小豆汁其血復少者菴䕡子一兩一分瞿麥穗㯽榔剉牡丹皮當歸切炮甘草炙剉射干木香吳茱萸湯浸焙炒各三分桂去麄皮桃仁湯浸去皮尖雙仁炒黄十二枚鼈甲去裙襴醋炙牛膝酒浸焙切蒲黄赤芍藥大黄剉炒熟乾地黄焙各一兩黄芩去黒心一兩半水蛭㣲炒一分右為散每服壹錢日再稍加二錢温酒調下以効為度乾地黄丸出聖濟總録治婦人月水不調或一月再來或隔月不來或多少淋瀝不斷腰腹刺斷痛不可忍四體虚弱不能飲食心腹堅痛不能行動體重嗜卧好食酸物熟乾地黄一兩半蒲黄牛膝酒浸切焙赤芍藥乾薑炮黄芩去黒心牡丹皮蜀椒去目并合口炒出汗白芷桑耳炒澤蘭葉􅀢蟲微炒二十枚桃仁去皮尖雙仁炒黄一兩甘草炙剉芎藭當歸切焙人參丹參各三分䖟蟲去翅足糯米同炒米熟去米三十五枚水蛭炒三十五枚右為末煉蜜和丸如梧桐子大每服二十丸空心温酒下漸加至二十五丸一方有桂心名乾地黄當歸丸安息活血丹出和濟方治衝任不足下焦久寒臍腹㽲痛月事不勻或來多不斷或過期不來或崩中有血或帶下不止面色痿黄肌肉消瘦肢體沈重胸脇脹滿氣力衰乏飲食减少一切血氣虚寒並用服之吳茱萸湯浸七遍焙乾微炒柏子仁炒安息香搗碎入好酒研取去渣銀器内慢火熬成膏山茱萸去延胡索桃仁去皮尖麩炒微黄色虎杖當歸杜仲去麄皮剉炒附子炮去臍皮木香各二十兩澤蘭葉乾薑炮肉桂去麄皮艾葉微黄黄茋去蘆牡丹皮各二斤半肉從蓉酒浸焙厚朴去麄皮薑汁炙令熱各五斤右為細末以前安息香膏入白麫同煮作糊丸如梧桐子大每服二十丸食前温酒下醋湯下亦得禹餘糧丸一名紫石英丸出醫方大成論曰經者常候謂其一身之隂陽愆伏知其安危故其來必以月太過不及皆為不調過於陽則前期而來過於隂則後期而至其有乍多乍少斷絶不行崩漏不止亦由隂陽衰盛寒熱為邪詳說於下若經候乍多乍少或前或後臍腹時痛面色不澤久不治療漸至虚損俱令人變産斷生他病若治婦人諸病補煖下元然當知諸病皆因經候不調隂陽相勝所至若隂氣乘陽則胞寒熱冷血不通經所謂天寒地冷水凝成氷故令乍少而在月後經候若陽乘隂則血流散溢經所謂天暑地濕經水沸溢故令乍多而在月前須知其隂陽調其血氣則百病不生矣桂去皮龍骨川鳥頭炮禹餘糧燒醋人參紫石英桑寄生杜仲去皮炒五味子逺志去心澤㵼當歸切洗焙石觓去根蓯蓉乾薑各一兩牡蠣燒甘草炙川椒去目炒出汗各二兩半右為細末煉蜜和丸如梧桐子大米飲下二十丸加至三十丸日三牡丹丸出聖惠方治婦人月水不調或一月再來或隔月不來又或多或少淋瀝不斷或青或黄或黑或清水腰腹刺痛四肢虚弱心腹堅痛舉體沈重欲卧而不欲食漸加羸瘦牡丹生乾地黄各一兩當歸三分剉微炒蒲黄一兩牛膝三分去苖琥珀一兩桃仁一兩去皮尖尖雙仁麩炒微黄赤芍藥三分菴䕡子一兩川椒一兩去目及閉口者微炒出汗水蛭半兩炒令微黄乾薑三分炮裂剉澤蘭一兩䗪蟲三七枚微炒黄芩三分桑耳三分芎藭一兩蝱蟲半兩炒微黄去翅足右為末煉蜜和搗三五百杵丸如梧桐子大每日空心及晩食前以温酒下三十丸牡丹皮湯出保慶積方治婦人經水不調腰背疼痛食物不得牡丹皮白芷桑耳阿梨勒皮煨代赭碎龍骨去土當歸切焙各一兩半黄連去鬚黄耆炙剉地榆鹿茸去毛酥炙各一兩一分蒼术米泔浸切焙附子炮裂去皮臍各一兩杏仁去皮尖雙仁炒令黄十五枚肉豆䓻去皮二枚黄芩去黒心半兩右㕮咀如麻豆大每服五錢水一盞半入生薑五片煎取八分去滓温服調經散行血氣當歸一兩酒浸芎藭半兩紅花三錢班猫去翅足水蛭二錢炒䖟蟲二錢去翅足紅娘子一錢去翅足牡丹半兩赤芍藥半兩白芷三錢蓬术二錢桂三錢白薑生地黄乾漆川牛膝各二錢右每服八錢水煎酒半盞煎至八分空心服如小便隆閉不通用甘草湯解三日三服勝金丹治婦人一切子宫久冷臍腹疼痛月經來期前後不一病證多端並宜治之常服調經順氣暖胎逐積進美飲食功効甚多難以盡𫐠方見本門婦人雜病類吳茱萸湯一名茱萸䖝蟲􅣚出千金方治婦人經血多寒月水不利或多或少吳茱萸湯浸七遍炒焙乾微炒二兩半小麥淘浄桂去麄皮半夏湯浸七宿炒黄各二兩生薑切炒三兩大棗去核炒十枚人參芍藥各一兩甘草炙水蛭糯米少許同炒米熟去米䗪蟲微炒䖟蟲去翅足牡丹皮牛膝切浸切焙各半兩桃仁􅣚浸去皮尖雙人又炒黄色二十枚右粗搗篩每服三錢酒水各半盞煎七分去滓温服日三不