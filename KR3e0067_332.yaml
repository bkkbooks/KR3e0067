body:
  text: 普濟方卷三百三十二明周王朱橚撰婦人諸疾門總論夫濟世之道莫先於醫論醫之難濟隂猶急何則婦人之病比之男子十倍難療或云七癥八瘕九痛十二帶下共三十六病雖有名數莫詳證狀惟原其理莫非血病蓋平日經脈失於將理産蓐不善調護內作七情外感六淫隂陽勞逸飲食生冷遂致榮衛不輸新陳干忤輕則經濁淋露重則凝滯為癥瘕流溢穢惡痛害傷痼以致所患不一所謂犯時微若秋毫感病重於山嶽是也凡女子十四而天癸至天謂天真之氣降癸為壬癸水名故云天癸而衝任脈主之衝任者血之海也月水者經絡之餘也蓋婦人以血為本心主血肝行血榮衛四體如環無端灌注百脈餘者為月候以時而行若水溢自流不自知覺故纎疴不作而氣體充盛而有子矣其有來多不斷或過期不來或未期而先來參錯不一而病生當其來時則上一日之前腰腹滿痛或頭疼作熱百節攣急甚於重患過此則發為虛熱自汗加以五心內熱遂為虛勞血少未涸燥氣乘肺則為咳嗽宿寒留滯血與氣搏則為腹痛敗血結塊時發寒熱則為癥瘕或風寒濕滯經血化為水流溢四肢為之血分脾不能制血與水并腹脹肌肉為之虛腫或衝任氣血內熱過度風邪冷熱之氣入於胞門穢液與血兼下冷則多白熱則多赤冷熱不調赤白相半或為赤白帶下若衝任經勞損經海動傷脾虛胃熱不能約制其血倐然暴下故謂崩中漏下所下五色各應五臟五臟俱虛五色併下以致眩暈煩悶嘔惡怔忡迷亂多忘發狂妄語小便不禁是皆血之為病也復有生於嬌貴之家愛憎在念而氣逆於中故氣逆一息不行血有一息不運則胸腹脹痛眩暈嘔噦倦乏不勝自持飲食不為肌膚致成重患治療之際調氣為上調經次之斯可為定法血氣和平隂陽調順則精血聚而胞胎成胞胎已成而心腎二脈其動也應手而疾蓋心之所主者血腎之所主者精精血交併而成之精勝則為男血勝則為女此亦自然之理也血氣不調隂陽愆伏隂過於陽則經脈先期而來陽過於隂則經脈後期而至蓋血脈得熱則宣流得寒則凝澀隂氣乘陽內寒血澀故其來乍少陽氣勝隂血熱流散故其來乍多過不及皆致病也經脈不行其候有二一則血氣盛實經脈遏閉其脈滑實見之當通經疏利一則風冷內傷七情內賊以致經絡痺滯其脈浮澀見之解散風冷去瘀生新經絡不行此諸病之所由住也夫婦人乃衆隂所集常與溫居貴乎血盛氣衰血盛氣衰是謂從從則百病不生血衰氣盛是謂逆逆則災害至且婦人嗜欲多於丈夫生病倍於男子及病也比男子十倍難療尤不可不攻若四時節氣喜怒憂思飲食房勞為患者與丈夫同也夫人將攝順理則血氣調和風寒暑濕不能為害若勞傷血氣則風寒乘虛而干之或客之於經絡或循入於腹中內受風邪脾胃虛弱故不能消其飲食也食既不充榮衛凝澀肌膚黃燥而不光澤若大腸氣虛則變為下痢若流入關元致絶子嗣隨其所傷而變成疾醫經曰凡婦人三十六種病皆由子臟冷熱勞損而挾帶下起於胞內是故衝任之脈為十二經之會海婦人之病皆見手少隂太陽之經而候之內經云百病皆生於氣經有所謂七氣有所謂九氣喜怒憂懼悲恐驚者七氣也七情之外益之以寒熱二證而為九氣也氣之為病男子婦人皆有之惟婦人血氣為患尤甚蓋人身血隨氣行氣已壅滯則血與氣併或月事不調心腹作痛或月事將行預行作痛或月事已行淋瀝不斷心腹作痛或循腰脅或引背膂上下攻刺吐逆不食甚則手足搐搦狀類驚癎或作寒熱或為癥瘕股肉消瘦非特不能受孕久而不治轉而為瘵疾者多矣婦人室女有生平無病者一旦忽感手足搐搦之證痰涎壅塞精神昏憒不省人事往往醫者便作癎證治之非也殊不知婦室以肝氣為主蓋肝乃血之府庫肝既受病經候愆期或多或少或閉斷不通肺宫堙塞隨其虛實而生病焉婦人多由血氣虛七情所感而生風女子血實七情所感而生熱邪乘四肢是以率然手足搐搦狀類癎證也治療之法先宜多進蘇合香丸溫酒化服以快其氣候其生醒亟亟調經調經之法塞者通之通者調之虛者與之實者收之婦人宜服白薇丸女子宜服澤蘭丸多服以病退為期也有此隂陽有此血氣氣陽也血隂也男以陽為主則陽勝乎隂女以隂為主則隂勝乎陽氣血之為病男女則同耳人皆知百病生於氣又孰知血為百病之胎乎血猶水也水行乎地中百川理則無壅遏之患矣人之血脈或凝滯於經絡腸胃之間百病由此而根矣乍寒乍熱發黃發狂讝妄驚狂煩悶嘔惡癡痰自汗閧熱虛勞尿淋漏崩吐衄咳唾以致眩暈厥冷昏憒迷忘塊痛瘀疼起止遺溺凡此數證非血而何經所謂先去其血然後調之良有以也夫血得寒則閉澀得溫則宣流榮氣虛竭風冷交侵固易為虛勞月閉之證其若出血等類大抵多因畜熱治之榮道亦開鮮血亦為之不禁矣川芎當歸血中上藥也出血諸證每每以胃藥收功蓋心主血肝藏血胃者又所以生其血而能使其氣歸元故其血自止經不云乎血隨氣行氣逆則血逆於此尤當加意素問曰目得血而能視耳得血而能聽指得血而能攝掌得血而能握足得血而能步臟得血而能液腑得血而能氣夫血既通流則氣亦至也氣先行于其中血自通利而機無不應矣故素問云氣血人之神也不可不謹調護而婦人以血臟為基本夫婦人之病手太陽手少隂小腸心之經絡為表裏起自衝任之脈於中極之下以上毛際循腹裏關元上至咽喉復循面目過帶脈環臍而止以婦人月水一月一來如期謂之月信期不來則風熱傷於經絡故血在內不通或內受邪熱脾胃虛損不能飲食食既不充榮衛凝澀肌膚黃燥面不光澤或大腸虛變為下痢流入關元致絶子嗣而子臟冷虛勞損而疾帶下起於胞內夫帶下之造化但分經絡標本殊異為病之本氣也其病所發正在過本脈之分而淋瀝以下故曰帶下也赤白之色亦無定也曰頭目昏眩口苦舌乾咽嗌不利小便赤色大小便澀滯脈實而數者皆熱證也凡白帶下者亦皆有之為病寒素問亢則害承乃制謂亢過極而反兼已勝之化制其甚也則如火煉金熱極則反化為水及六月熱極則物反出液而濕潤材木流津故肝熱極則出泣心熱甚則出汗脾熱甚則出涎肺熱甚則出涕腎熱甚則出唾大凡俗類以火煮湯熱極則沸溢及熱氣薰蒸於物而生津液也故下部任脈濕熱甚者津液湧而溢已為帶下見俗醫白帶下者但依方論而用辛熱之藥雖有誤中致令鬱熱氣不能宣通舊病轉加世傳誤之久矣寡婦之病自古未有言者惟倉公傳於禇證略而論之言寡婦者孟子正謂無夫曰寡是也如師尼喪夫之婦獨隂無陽欲男子而不可得是以懨懨成病也易曰天地絪緼萬物化醇男女媾精萬物化生孤隂獨陽可乎夫既處閨門欲心萌而不遂隂陽交爭乍寒乍熱有類瘧疾久則為癆又有經閉白淫痰逆頭風膈氣痞悶面皯瘦瘠等證皆寡婦之病診其脈獨肝脈弦出寸口而上魚際究其脈原其疾皆血盛而得經云男子精盛則思室女子血盛則懷胎觀其精血思過半矣婦人血海挾受風邪不換金正氣散加川芎官桂主之以至眩暈煩悶嘔惡怔忪迷亂多至忽發狂妄語小便不禁此婦人以血受病最多而血之為病遇夜愈增劇也血屬隂隂虛則爭濟生拔萃云婦人童幼至天癸未行之脈皆屬少隂天癸既行皆從厥隂論之天癸已絶乃屬太隂經也治胎産之病從厥隂無犯胃氣及上三焦為之三禁不可汗不可下不可利小便發汗者同傷寒下早之證利大便則脈數而已動脾利小便則內忘津液謂中枯燥製藥之法能不犯三禁則榮衛自和而熱止矣如發渴而用白虎氣弱則黃耆血刺痛而用以當歸腹中疼而加之芍藥大抵産病從增損柴胡雜證從增損四物宜詳察脈證而用之月水不調附論岐伯曰女子七歲腎氣盛齒髮更至二七而天癸至任脈通太衝脈盛月事以時下天謂天真之氣降而為水癸水行故云天癸也然衝為血海壬主胞胎腎氣全盛二脈流通經脈漸盈應時而下所以謂之月事者平和之脈常以三旬一見以像月盈則虧也若遇經脈行時最宜謹慎將理失宜似産後百般受病輕則為宿疾重可死矣蓋破經則血氣錯亂經脈斬然不行逆於身則為血分榮枯等疾若其時勞力則生虛熱變為疼痛之根若恚怒則氣逆氣逆則血瘧逆於腰腿則遇經行時腰腿疼痛重過期即安也逆於頭腹心肺背脅手足之間則遇經行時其證亦然若怒極則傷肝而有眼暈脅痛嘔血瘰􅐇癰瘍之病加之經血滲漏於其間遂成竅穴淋瀝無有已也凡此之中時風則病風感冷則病冷久而不愈變證百出所謂犯時微若秋毫感病重如山嶽可不畏哉飲食五味養髓骨肉肌膚毛髮男子為陽陽中必有隂隂之數八故一八而陽精升二八而陽精溢女子為隂隂中必有陽陽之數七故一七而隂血升二七而隂血溢皆飲食五味之精液所為也方其升也智慮開明齒牙更始髮黃者黑筋弱者強暨其溢也凡屬身體耳目之餘雖針芥之微歷無不到故子形肖父母者以其血經常與父母之身無所不厯也是以其父一肢廢則子一肢不肖其父一目虧則子一目不肖其母亦然雌鳥牝獸無天癸而成胎何也鳥獸精血往來尾間也精未通而御女以通其精則五體有不滿之處異日有難狀之疾隂已痿而思室以降其精則精不出而內敗小便道澀而淋精已耗而復竭之則大小便道牽痛愈疼則欲大小便愈便則愈疼女人天癸既至踰十年無男子合則不調未踰十年思男子合亦不調不調則舊血不出新血誤行或漬而不入骨或變而成腫或歡合而竭或合男子多則瀝枯虛人産乳衆則血枯殺人觀其精血思過半矣大率治病先論其所主男子調其氣女子調其血氣血人之神也不可不謹調護然婦人以血為本氣血宣行其神自清所謂血室不蓄則氣和血凝成孕此乃調燮之常其血不來有因風熱所傷經血不通或外感風邪內受邪熱脾胃虛弱不能飲食食既不充榮衛抑遏肌膚黃燥面無光澤時發寒熱腹脹作痛難於子息子臟冷熱久而勞損必挾帶下便多淋瀝忽致崩漏經云腹中如塊忽聚忽散其病乃癥血痼不流而搏腹脹而作寒熱此乃成瘕或先後爽期雖通而或多或寡究病之源蓋本如此論曰經者常候謂候其一身之隂陽愆伏知其安危故其來必以月太過不及皆為不調過於陽則前期而來過於隂則後期而至其有乍多乍少斷絶不行崩漏不止亦由隂陽衰盛寒熱為邪夫婦人月水不調由勞傷氣血致體虛風冷之氣乘也若風冷之氣客於胞內傷於衝任之脈損手太陽少隂之經衝任之脈皆起於胞內為經脈之海手太陽小腸之經手少隂心之經也此二經為表裏主上為乳汁下為月水然則月水是經絡父母之身無所不厯也則月水是經絡之餘若冷熱調和則衝脈任脈氣盛勝太陽少隂所生之衆宣流依時而下若寒濕乖適經脈則虛若有風冷虛則乘之邪搏於血或寒或熱或濕則血結泣則血消故月水乍多乍少不為調也仁存方載許學士云治婦人病多是月經乍多乍少或後或前時發頭疼醫者一例呼為經病不曾説得隂勝陽陽勝隂服藥所以少效蓋隂勝陽則胞寒氣冷血不運行經所謂天寒地凍水凝成氷故令乍少而在月後若陽乘隂則血流散溢經所謂天暑地熱經水沸溢故令乍多而在月前治者當知其隂陽調其氣血使不相勝以平為福聖濟總録云月水不調者經脈或多或少或湛或濁或先期而來或後期而至是也蓋由失於調養而衝任虛損天癸之氣乖於常度故內經曰任脈通衝脈勝月事以時下言其有常度也危氏得效云二七天癸至七七天癸竭行早性機巧行遲魯鈍通行則隂陽和合始能生子年十四歲當時二十歲不行命臨風燭朝不保暮有病發則死間有不死百中無一亦令一生多病未嘗一日安裕然有四季行亦可又有一年一次者亦不甚嘉或一生不循正道而行者晚年有病疾則難治應驗云夫女子十四則月水行男子十六則陽精溢此皆合乎隂陽之數各及其時故男子之精氣宜盛女子之月水宜調調經之道貴乎疏其氣以行其血血盛氣變是謂之從從則百病不生孕育無損矣且婦人之病四時所感六淫七情所傷悉與男子治法一例惟胎前産後七癥八瘕崩漏帶下之證為異故凡制方究其所因多由月水不調變生諸證大概婦人之病以經脈如期為安或有愆期當審其冷熱虛實而調之先期而行者血熱故也當清之過期而行者血寒故也當溫之又不可不察其有無外邪為之寒熱而後投藥也夫血者隂之物象月盈虧應時而至故謂之月水女子衝任氣血經絡不和其血應至而未至或斷或續或多或少血色有異是月水不調之證也方菴䕡子散出聖濟總録治婦人血氣不調經脈不定腹脅多脹或五六月一來三二月一來雖來色如煮小豆汁其血復少者菴䕡子一兩一分瞿麥穗檳榔銼牡丹皮當歸切炮甘草炙銼射干木香吳茱萸湯浸焙炒各三分桂去粗皮桃仁湯浸去皮尖雙仁炒黃十二枚鱉甲去裙襴醋炙牛膝酒浸焙切蒲黃赤芍藥大黃銼炒熟乾地黃焙各一兩黃芩去黑心一兩半水蛭微炒一分右為散每服一錢日再稍加二錢溫酒調下以效為度乾地黃丸出聖濟總録治婦人月水不調或一月再來或隔月不來或多少淋瀝不斷腰腹刺斷痛不可忍四體虛弱不能飲食心腹堅痛不能行動體重嗜卧好食酸物熟乾地黃一兩半蒲黃牛膝酒浸切焙赤芍藥乾薑炮黃芩去黑心牡丹皮蜀椒去目并合口炒出汗白芷桑耳炒澤蘭葉􅀢蟲微炒二十枚桃仁去皮尖雙仁炒黃一兩甘草炙銼芎藭當歸切焙人參丹參各三分虻蟲去翅足糯米同炒米熟去米三十五枚水蛭炒三十五枚右為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下漸加至二十五丸一方有桂心名乾地黃當歸丸安息活血丹出和濟方治衝任不足下焦久寒臍腹㽱痛月事不勻或來多不斷或過期不來或崩中有血或帶下不止面色痿黃肌肉消瘦肢體沈重胸脅脹滿氣力衰乏飲食減少一切血氣虛寒並用服之吳茱萸湯浸七遍焙乾微炒柏子仁炒安息香搗碎入好酒研取去渣銀器內慢火熬成膏山茱萸去延胡索桃仁去皮尖麩炒微黃色虎杖當歸杜仲去粗皮銼炒附子炮去臍皮木香各二十兩澤蘭葉乾薑炮肉桂去粗皮艾葉微黃黃茋去蘆牡丹皮各二斤半肉從蓉酒浸焙厚朴去粗皮薑汁炙令熱各五斤右為細末以前安息香膏入白麵同煮作糊丸如梧桐子大每服二十丸食前溫酒下醋湯下亦得禹餘糧丸一名紫石英丸出醫方大成論曰經者常候謂其一身之隂陽愆伏知其安危故其來必以月太過不及皆為不調過於陽則前期而來過於隂則後期而至其有乍多乍少斷絶不行崩漏不止亦由隂陽衰盛寒熱為邪詳説於下若經候乍多乍少或前或後臍腹時痛面色不澤久不治療漸至虛損俱令人變産斷生他病若治婦人諸病補暖下元然當知諸病皆因經候不調隂陽相勝所至若隂氣乘陽則胞寒熱冷血不通經所謂天寒地冷水凝成氷故令乍少而在月後經候若陽乘隂則血流散溢經所謂天暑地濕經水沸溢故令乍多而在月前須知其隂陽調其血氣則百病不生矣桂去皮龍骨川鳥頭炮禹餘糧燒醋人參紫石英桑寄生杜仲去皮炒五味子逺志去心澤㵼當歸切洗焙石觓去根蓯蓉乾薑各一兩牡蠣燒甘草炙川椒去目炒出汗各二兩半右為細末煉蜜和丸如梧桐子大米飲下二十丸加至三十丸日三牡丹丸出聖惠方治婦人月水不調或一月再來或隔月不來又或多或少淋瀝不斷或青或黃或黑或清水腰腹刺痛四肢虛弱心腹堅痛舉體沈重欲卧而不欲食漸加羸瘦牡丹生乾地黃各一兩當歸三分銼微炒蒲黃一兩牛膝三分去苖琥珀一兩桃仁一兩去皮尖尖雙仁麩炒微黃赤芍藥三分菴䕡子一兩川椒一兩去目及閉口者微炒出汗水蛭半兩炒令微黃乾薑三分炮裂銼澤蘭一兩蟅蟲三七枚微炒黃芩三分桑耳三分芎藭一兩虻蟲半兩炒微黃去翅足右為末煉蜜和搗三五百杵丸如梧桐子大每日空心及晚食前以溫酒下三十丸牡丹皮湯出保慶積方治婦人經水不調腰背疼痛食物不得牡丹皮白芷桑耳阿梨勒皮煨代赭碎龍骨去土當歸切焙各一兩半黃連去鬚黃耆炙銼地榆鹿茸去毛酥炙各一兩一分蒼术米泔浸切焙附子炮裂去皮臍各一兩杏仁去皮尖雙仁炒令黃十五枚肉豆䓻去皮二枚黃芩去黑心半兩右㕮咀如麻豆大每服五錢水一盞半入生薑五片煎取八分去滓溫服調經散行血氣當歸一兩酒浸芎藭半兩紅花三錢班貓去翅足水蛭二錢炒虻蟲二錢去翅足紅娘子一錢去翅足牡丹半兩赤芍藥半兩白芷三錢蓬术二錢桂三錢白薑生地黃乾漆川牛膝各二錢右每服八錢水煎酒半盞煎至八分空心服如小便隆閉不通用甘草湯解三日三服勝金丹治婦人一切子宫久冷臍腹疼痛月經來期前後不一病證多端並宜治之常服調經順氣暖胎逐積進美飲食功效甚多難以盡𫐠方見本門婦人雜病類吳茱萸湯一名茱萸蟲蟲􅣚出千金方治婦人經血多寒月水不利或多或少吳茱萸湯浸七遍炒焙乾微炒二兩半小麥淘淨桂去粗皮半夏湯浸七宿炒黃各二兩生薑切炒三兩大棗去核炒十枚人參芍藥各一兩甘草炙水蛭糯米少許同炒米熟去米蟅蟲微炒虻蟲去翅足牡丹皮牛膝切浸切焙各半兩桃仁􅣚浸去皮尖雙人又炒黃色二十枚右粗搗篩每服三錢酒水各半盞煎七分去滓溫服日三不