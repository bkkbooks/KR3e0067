一分生薑三片右為散每服四錢水一盞半煎至七分去滓食前服自大寒至春分依正方自春分至小滿去附子加天麻防風各半兩自小滿至大暑加澤㵼三分自大暑直至大寒並依正方子午之嵗少隂君火司天陽明燥金在泉氣化運行先天初之氣太陽水加厥隂木民病關節禁固腰脽痛中外瘡瘍二之氣厥隂風木加少隂君火民病淋目赤氣鬱而熱三之氣少隂君火加少陽火民病熱厥心痛寒熱更作咳喘目赤四之氣太隂濕土民病疸鼽衄嗌乾吐飲五之氣少陽火加陽明金民乃康終之氣陽明金加太陽水民病上腫咳喘甚則血溢下連少腹而作寒中治法宜醎以平其上苦熱以治其內醎以耎之苦以發之酸以收之正陽湯治子午之嵗少隂君火司天陽明燥金在泉病者關節禁固腰痛氣鬱熱小便淋目赤心痛寒熱更作咳喘或鼻鼽嗌咽吐飲發黃疸喘甚則連小腹而寒中悉主之白薇玄參川芎桑白皮炙當歸芍藥旋復花甘草炙生薑各半兩右為散每服四錢水一盞半煎七分去滓食前服自大寒至春分加杏仁升麻各半兩自春分至小滿加茯苓車前子各半兩自小滿至大暑加杏仁麻仁各一分自大暑至秋分加荆芥茵陳蒿各一分自秋分至小雪依正方自小雪至大寒加紫蘇子半兩己亥之嵗厥隂風木司天少陽相火在泉氣化運行後天初之氣陽明金加厥隂木民病寒於右脅下二之氣太陽水加少隂火民病熱中三之氣厥隂木加少陽火民病淚出耳鳴掉眩四之氣少隂火加太陽水民病黃疸胕腫五之氣太陽水加陽明金燥濕相勝寒氣及體終之氣少陽火加太陽水此下水尅上火民病癘治法宜用辛涼平其上醎寒調其下畏火之氣無妄犯之敷和湯治己亥之嵗厥隂風木司天少陽相火在泉病者中熱而反右脅下寒耳鳴淚出掉眩燥濕相搏民病黃疸浮腫時作溫癘半夏湯洗棗子五味子枳實麵炒茯苓訶子炮去核橘皮甘草炙各半兩乾薑三錢炮右為散每服四錢水一盞半煎至七分食前服自大寒至春分加鼠粘子一分自春分至小滿加麥門冬去心山藥各一分自小滿至大暑加紫苑一分自大暑至秋分加澤㵼山梔仁一分自秋分直至大寒並依正方六氣凡例凡六氣數起於上而終於下嵗半之前自大寒後天氣主之嵗半之後自大暑後地氣主之上下交互氣交主之司氣以熱用熱無犯司氣以寒用寒無犯司氣以涼用涼無犯司氣以溫用溫無犯司氣同其主亦無犯異主則少犯之是謂四調若天地反時可依時反勝其主則可犯以平為期不可過也普濟方卷六
