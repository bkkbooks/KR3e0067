body:
  text: 普濟方卷六明周王朱橚撰五運六氣圖五運太過不及六氣司天在泉政令災變六十年圖天分五氣地列五行上經於列宿下合於方隅故丹天之氣經于牛女奎壁臨戊癸之位故戊癸歲為火運黅天之氣經于心尾角軫臨於甲巳之位故甲巳歲為土運素天之氣經於亢氐畢昴臨於乙庚之位故乙庚歲為金運玄天之氣經於張翼婁胃臨於丙辛之位故丙辛歲為水運蒼天之氣經於危室栁鬼臨於丁壬之位故丁壬歲為木運也然運有五氣有六以君火相火加之也六氣之化者謂寒暑燥濕風火也乃天之六氣然後三隂三陽上奉之然六氣曰主曰客司天在泉有寒暑燥濕風火之化為主者雖干載亦不易為客者六歲復會何謂主自斗建丑正至卯之中則是大寒至驚蟄之末六十日有竒有竒謂八十七刻半厥隂木為風化用事風氣流行陽氣發動萬物發生以應春此初氣主也自斗建卯正至已之中則是春分至立夏之末六十日有竒少隂君火為熱化用事暄淑乃行君德之象不同炎暑以應夏此二氣主也自斗建巳正至未之中則小滿至小暑之末六十日有竒少陽相火暑化用事此司天之位炎暑乃行以應長夏此三氣主也自斗建未正至酉之中則是大暑至白露之末六十日有竒太隂土濕化用事雲雨乃行此四氣主也自斗建酉正至亥之中則是秋分至立冬之末六十日有竒陽明金燥化用事清涼乃行此五氣主也自斗建亥正至丑之中則是小雪至大寒之末六十日有竒太陽水寒化用事在泉之末嚴凝乃行終氣主也厯法五日為候三候為氣六氣為時一歲二十四氣七百二十氣為三十年一千四百四十氣為六十年太過不及斯可見且經曰顯明之地卯地君火之位君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之復行一步君火治之一步凡六十日有奇六六三百六十日春溫夏熱秋涼冬寒以成一歲之令千載而有則此主氣之常也故曰地氣主靜而守護何謂客子午之歲少隂司天丑未之歲太隂司天寅申之歲少陽司天卯酉之歲陽明司天辰戍之歲太陽司天己亥之歲厥隂司天以客加主而推其變故曰天氣動不息其六氣之源則同六氣之緒則異何也蓋天之氣始於少隂而終於厥隂地之氣始於厥隂而終於太隂是故當其時而行變之常也非其時而行變之災也故曰令其所謂春行夏秋冬之令冬行春夏秋之令此客加主之變也故其主化政令之常有暴雨疾風迅雷飄電之變冬有爍石之熱夏有凄清之風此無他天地之氣勝復欎發之致也是説也五氣麗乎太過不及之徴也又有所謂平氣者故有天符歲會同天符同歲會太乙天符是五者所謂符如升明備化審平靜化之紀也何謂天符如木運上見厥隂運與司天合也何謂歲會如木運臨艮卯天運己午運與年合也何謂太乙天符天運上見少隂年辰臨午之類至於同天符同歲會以太過下加而然如木運太過下加厥隂曰同天符火運不及下加少隂少陽之類曰同歲會素問六微旨曰天符為執法歲會為行令太乙天符為貴人邪中執法者其病速而危中行令者其病徐而持中貴人者其病暴而死惟有歲氣之平天地之氣得其中則民無災變災變之異故自前五者而然又有所謂勝復而致變者如木運不及則金勝火為木之子復能勝金則肺反受邪土運不及則木勝金為土之子復勝木則肝反受邪如是之類是謂勝復勝復之作子為母復讐也何謂化氣如甲己化土餘倣此化土甲巳起丙寅數至戊辰為龍龍有變化之象戊為土故甲己化土餘倣此何謂正化對化玄珠曰六氣分正化對化少陽正司於午對化於子厥隂正司於亥對化於己太隂正司於未對化於丑少陽正司於寅對化於申陽明正司於酉對化于卯太陽正司于戌對化于辰正司化令之實對司化令之虗為醫之道須明運氣運氣之旨有太過有不及有隂陽相乘有勝有復若夫脈有氣應則平故曰從其氣則和違其氣則病然有未至而至至而不至難以一言括在乎參之而稽是圖也甲己歲氣土化之圖甲己歲土太過是歲泉湧河溢涸澤生魚風雨大至山崩川潰鱗見于陸歲運黅天敦阜之紀平氣備化甲歲南政太宮之音歲氣雨濕流行至隂內濕物化充成其變震驚飄驟崩潰腎水受邪病有復重清厥體甚重則足痿不收腳疼中滿四肢不舉脾土勝腎水木為水之子復能尅土則反溏泄甚則太溪絶者死臨辰戌為歲會甲辰丙戌下加太隂為同天符同上歲土不及歲運黅天卑監之紀平氣備化已歲南政少宮之音歲氣風寒大作雨乃愆期草木秀而不實濕土受邪病則飱泄霍亂支體重腹痛肝木克脾土金為土之子復能尅肝木則反胸脅暴痛下引小腹臨辰戌丑未為歲會甲辰甲戌乙丑己未上見太隂為太乙天符己丑己未上臨厥隂為水不氷蟄蟲早見民乃康乙庚歲氣金化之圖乙庚歲金不及歲運素天從革之紀平氣審平乙歲北政少商之音歲氣炎火盛行乃用燥石流金涸泉焦草肺金受邪病則肩背瞀重鼽嚏血便重下心火尅肺金水為金之子復能尅火則反心痛腦痛頸急𩕄頂痛發熱口瘡心痛臨酉為太乙天符乙酉又為歲會上見陽明為天符乙卯復則水勝火寒雨暴至氷雹霜雪歲金太過歲運素天堅成之紀平氣審平庚歲北政太商之音歲氣燥行天氣潔地氣明陽氣隨隂肅殺凋零肝木受邪病則腹脅痛目赤體重胸痛血溢痛引小腹耳無聞甚則喘咳逆氣背肩尻隂股膝髀腨䯒足痛肺金尅肝木火為木之子復能尅肺金則反血溢心痛胠脅不可轉側咳逆太衝絶者死臨酉為歲會乙酉下見陽明為天符庚子丙辛歲氣水化之圖丙辛歲水太過是歲雨氷雪霜不時降濕氣變物歲運玄天流衍之紀平氣靜順丙歲北政太羽之音歲氣天地寒凝其變氷霜雹心火受邪病則身熱煩躁心厥中寒甚大腹脛腫喘咳腎水尅心火土為火之子復能尅腎則反腸鳴溏泄甚則神門絶者死臨子為歲會丙子上見太陽為天符丙戌丙辰歲水不及歲運玄天涸流之紀平氣靜順辛歲北政少羽之音歲氣水泉減草木茂腎水受邪病則身重濡泄腫滿腰膝痛足痿清厥甚則胕腫腎氣不行脾土尅腎水木為水之子復能尅脾則反面色時變筋肉瞤瘛膈中痛及心腹臨丑為歲會辛丑辛未上見太隂下見太陽為同歲會則大寒蟄藏丁壬歲氣木化之圖丁壬歲木不及是歲天地凄愴日月朦昧雨非雨晴非晴慘然氣象凝斂肅殺之甚歲運玄天委和之紀平氣敷化丁歲北政少角之音歲氣燥氣乃行生氣不政涼雨時降風雨並興草木晚榮物氣內濕肝木受邪病中清胠脅滿少腹痛腸鳴溏泄肺金尅肝木火為木之子復能尅金則反寒濕瘡瘍痱痤腹腫癰咳血夏生大熱濕變為燥草木稿下體再生臨卯為歲會丁卯上見厥隂為天符丁巳丁亥上臨陽明為生氣失政草木再榮歲木太過歲氣蒼天發生之紀平氣敷和壬歲北政太角之音歲氣風氣流行生化再淳萬物以榮其變振拉摧拔脾土受邪病餐泄食減體重腹痛腸鳴脅滿肝木尅脾土金為土之子復能勝木則反脅痛而吐甚則衝陽絶者死臨卯為歲會丁卯下見厥隂為天符壬申壬寅戊癸歲氣火化之圖戊癸歲火太過是歲火燔灼水泉涸物焦稿歲運丹天赫曦之紀平氣升明戊歲北政太徵之音歲氣隂氣內化其變炎烈沸騰肺金受邪則發瘧少氣喘咳血溢注胸脅痛心火勝肺金火之狂咳嗽血泄甚則太淵絶者死臨子為太乙天符上見少隂少陽為天符歲火不及歲運丹天伏明之紀平氣升明癸歲北政少徵之音歲氣寒乃大行火令不政物生不長陽氣屈伏蟄蟲早藏心火受邪病則胸脅膺背痛鬱冒暴瘖臂痛腎水勝心火土為火之子復能尅腎則反寒中腹鳴泄注攣痺足不任身臨卯酉為同歲會癸酉癸卯下見少隂少陽為歲會癸卯癸酉癸巳癸亥少隂初氣厥隂風木天時寒風切烈霜雪交作蟄復藏司天太陽寒水加民病關節禁固腰腿痛中外瘡瘍子二氣少隂君火天時風雨時行寒氣時至生羽蟲午厥隂風木加民病淋氣欎而上熱令人目赤歲三氣少陽相火天時大火行熱氣時至羽蟲靜不鳴也燕百舌杜宇之類氣少隂君火加民病厥熱心痛寒熱更作咳嗽赤目熱四氣太隂濕土天時大雨時行寒熱互作化少陽相火加民病黃疸鼽衄嗌乾吐飲之五氣陽明燥金天時溫氣乃至初冬尤暖萬物乃榮圖太隂濕土加民病康安伏邪于雪春為虐陽明終氣太陽寒水天時燥寒徑切火尚恣毒寒暴至在泉陽明燥金加民病上腫咳喘甚則血溢下連小腸而作寒中太隂初氣厥隂風木天時大風發榮風雨生毛蟲司天厥隂風木加民病血溢筋絡拘強關節不利身腫筋痛丑二氣少隂君火天時大火正天下疵以行溫厲宣形逺近咸若濕蒸相摶雨時降未少隂君火加民病瘟疫盛行逺近咸若歲三氣少陽相火天時雷雨電雹地氣騰濕氣降氣太隂濕土加民病身重胕腫胸腹滿感寒熱氣濕四氣太隂濕土天時炎熱沸蒸地氣升天氣否隔濕化不流化少陽相火加民病腠理熱血暴溢患瘧心腹䐜脹甚則浮腫之五氣陽明燥金天時大涼霜早降寒及體圖陽明燥金加民病皮膚寒太陽終氣太陽寒水天時大寒凝冽在泉太陽寒水加民病關節禁固腰脽痛少陽初氣厥隂風木天時熱風傷人時氣流行司天少隂君火加民病溫氣拂於上血溢目赤咳逆頭痛血崩脅滿痛皮膚生瘡寅二氣少隂君火天時時兩至火欎風不勝濕申太隂濕土加民病熱欎咳逆吐胸臆不利頭痛身熱昏憒生膿瘡歲三氣太隂濕土天時熱暴至草萎河乾大暑炎亢雨乃涯氣少陽相火加民病熱中聾瞑血溢膿瘡咳火四氣少陽相火天時涼風至炎暑未去風雨及時化陽明燥金加民病民氣和平身重中滿脾寒泄㵼之五氣陽明燥金天時陽乃去寒乃來雨乃降剛木早凋圖太陽寒水加民病民避寒邪君子周密病則骨痿弱目赤痛厥隂終氣太陽寒水天時地氣乃寒風飄揚萬物反生寒氣至雨生鱗蟲在泉厥隂風木加民病關節不禁心腹痛陽氣不藏陽明初氣厥隂風木天時隂始凝氣始肅水乃氷寒雨化花開遲司天太隂濕土加民病熱脹面腫鼻衄嚏欠嘔吐小便赤甚則淋卯二氣少隂君火天時臣依君位大熱早行酉少陽相火加民病疫厲大至善暴死歲三氣太隂濕土天時燥熱交合涼風間發氣陽明燥金加民病上逆下冷瘧痢心煩不食燥四氣少陽相火天時早秋寒雨害物化太陽寒水加民病暴仆振栗妄言少氣咽乾引飲心痛癰腫瘡瘍寒瘧骨痿便血之五氣陽明燥金天時春令反行草木盛生雨生介蟲圖厥隂風木加民病氣和熱行包絡面浮上壅少隂終氣太陽寒水天時氣候反溫蟄蟲出現流水不氷此下尅上在泉少隂君火加民病伏邪溫毒季春發疫太陽初氣厥隂風木天時氣早暖草早榮溫疫至司天少陽相火加民病瘟痿身熱頭痛嘔吐瘡瘍辰二氣少隂君火天時大涼反至草乃遇寒火氣遂抑戍陽明燥金加民病氣欎中滿風腫歲三氣太隂濕土天時寒熱不明寒氣間至熱靜氷雹氣太陽寒水加民病寒反熱中癰疽注下心熱悶冒逆吐病痢不治者死寒四氣少陽相火天時風濕交爭雨生倮蟲木盛生風暴雨摧拔化厥隂風木加民病大熱少氣足痿注下赤白血滯成癰之五氣陽明燥金天時濕熱而寒客行主令圖少隂君火加民病氣舒病則血熱妄行肺氣受濕壅太隂終氣太陽寒水天時地氣正濕令行凝寒隂虐在泉太隂濕土加民病病乃悽慘孕死脾旺腎衰厥隂初氣厥隂風木天時寒始肅客行主令殺氣方至司天陽明燥金加民病寒居右血氣脅滯脾虗胃壅已二氣少隂君火天時寒不去霜雪作殺氣施化草焦寒雨數至亥太陽寒水加民病熱中氣血不升降歲三氣太隂濕土天時風熱大作雨生羽蟲氣厥隂風木加民病淚出耳鳴掉眩風四氣少陽相火天時熱氣永亘山澤浮雲暴雨溽濕化少隂君火加民病心受邪黃疸而為胕腫之五氣陽明燥金天時燥熱更甚沈隂乃布風雨乃行圖太隂濕土加民病寒熱間作脾受風脾受熱發為瘧少陽終氣太陽寒水天時畏火司令陽乃大發蟄乃出見流水不冰地氣大發草生在泉少陽相火加民病溫癘心腎相制天上二位天中二位人下二位地地屬屬屬屬屬屬六太天風雲萬物地黃位虗面之路之路面泉藏金火合木金德水火合火木德土土合火水德象主清下主熱下主溫下主涼下主燥下主寒下溫君風相濕寒之肺上焦象天心包絡肝中焦象人膽脾下焦象地腎黃泉圖絡金腸絡木腸絡火經絡土經絡水胱大小膽胃膀從是動則病者氣之所感也天之邪感則害人五違所生病者血之所成也其臟肝心肺胃腎食而不滿可下之而已也水火其氣之寒熱感則害人六腑膽胃三焦膀胱大腸滿氣則而不食可吐之而已也地之濕氣感則害人度則和骨血脈肌膚從外而入可汗之而已也病難三焦寅相火手少陽素太易未見氣也甲膽大腸卯燥金手陽明撮乙肝小腸辰寒水手太陽要太初氣之始也丙小腸包絡已風木手厥隂究丁心心午君火手少隂治太戊胃肺未濕土手太隂識極已脾膽申相火足少陽病庚大腸胃酉燥金足陽明用太始形之始也辛肺膀胱戌寒水足太陽藥壬膀胱肝亥風木足厥隂之太素質之始也癸腎腎子君火足少隂圖脾丑濕土足太隂外有風寒暑熱屬天之四令無形也一者始因氣動而內有所成者謂積聚癥瘕癭瘤氣血結核在瞀顛間疏曰癭堅氣也瘕血積也二者始因氣動而外有所成者謂壅腫瘡瘍疥癬疸痔掉瘛浮腫目赤熛瘡胕腫痛癢之類是也三者不因氣動而病生于內者謂飲癖飢渴勞損宿食霍亂悲恐喜怒想慕憂結之類是也四者不因氣動而病生于外者謂瘴氣戕生蟲蛇蠱毒伏尸鬼疰衝薄墮風寒暑研射割刺之類也內有飢飽勞逸屬人之四令有形也木之故民病肌胱心煩而四肢兩脅痛咽膈不通飲食不下甚則耳鳴眩轉目不識人善暴僵風鬱病仆筋骨強直而不用卒倒無知也火之故民病少氣瘡瘍臃腫血逆胸背首面四肢䐜脹瘍痱嘔逆瘛瘲骨疼及腹痛注下濕瘧暑鬱病腸中暴痛血逆流注精溢及目赤心熱甚則瞀悶懊惱甚暴死土之故民病心腹脹腹鳴而為數後甚則心痛血枯嘔逆霍亂飲瘀注下胕腫身重者脾熱之濕鬱病至火金之故民病咳逆心腹滿停飲少腹善暴痛不止甚則逆乾嘔面塵色惡金聲而木病也燥鬱病水之故民病寒厥心痛腰腿痛大關節不利屈伸不便善厥逆痞堅腹滿隂乘陽故也寒鬱病肝酸與膽為表裏東方木也色青外應目主治血木風芍藥酸寒烏梅酸熱澤㵼醎平達針諸風眩皆屬肝主動治法曰達者吐也其髙者因而越之可刺大敦炙亦同心苦與小腸為表裏南方火也色赤外應舌主諸經血運火暑大黃苦寒黃連苦涼木香苦溫沒藥苦熱發汗諸瘡瘍痛癢皆屬於火治法曰發者汗之其踈散也可刺少衝炙亦同脾甘與胃為表裏中央土也色黃應唇肌肉應四時土濕蜜甘涼平甘草甘奪針諸濕充滿屬於脾土治法曰奪者㵼也分隂陽利水道可刺隱白穴炙亦同肺辛與大腸為表裏西方金也色白外應皮毛鼻主行氣金燥乾薑辛熱薄荷辛涼生薑辛溫清針諸氣憤鬱皆屬於肺治法曰清者清膈利小便可刺少商炙赤同腎醎與膀胱為表裏北方水也色黑外應兩耳主骨髓水寒牡蠣醎寒折針諸寒收引皆屬腎水治法曰折之謂抑之治其衝逆可刺湧泉炙亦同初自大寒至春分厥隂風木之位陽用事而氣微故曰少陽得甲子元頭常冷以大寒交初之氣分也以六之周甲子以應六氣下倣此正月二月少陽三隂三陽同氣二春分至小滿少隂君火之位陽漸長清明之間交陽明之位之氣三小滿至大暑少陽相火之位陽氣發物俱成故亦云太陽旺其脈洪大而長之氣四大暑至秋分太隂濕土之位天氣先感夏至後用事故曰太陽旺此三隂三陽與天氣標本隂陽異其脈之緩大而長氣五秋分至小雪陽明燥金之位燥金主緊細短澀陽衰隂盛故曰金氣生其脈細而微之氣終小雪至大寒太陽寒水之位隂氣極而盡天氣所收故曰厥隂旺厥者盡也其脈沈短以敦厚萬物收藏之在內寒氣閉塞而膚腠氣液不能散故脈微而力氣大子上初之氣顛初氣為病多發咳嗽風疾口喎半身不遂失音風風中婦人隂中留飲兩臍股微痛嘔寒逆惡心旋眩驚悸狂揚心風掉初之氣病在上者宜以瓜蒂散吐之在下者泄之春卯上二之氣隂二氣為病多發風溫濕熱經曰風傷於陽濕傷於微頭痛身熱法作風濕之候風傷榮分血濕傷衛氣是也風濕為病隂陽俱浮自汗身重多眠鼻息語言難出此證不宜苦下宜桂枝麻黃湯小已上三之氣腰三氣為病發熱多傳足經太陽者發熱惡寒頭項脊強陽明者身熱目疼鼻乾不得卧滿少陽胸脅痛耳聾口乾寒熱往來而嘔此屬三陽太隂者腹痛咽乾手足溫自利不滿或腹滿痛少隂者口燥舌乾耳聾厥隂者腹滿囊縮喘熱悶亂四肢厥冷爪甲青色此屬三隂三之氣病宜以清涼上溫下養不宜用巴豆丸下大未上四之氣治四氣為病多發暑氣頭痛身熱發渴不宜作熱病宜以白虎湯得此病以下傳染發脾暑泄胃泄大腸泄小腸泄大瘕泄霍亂吐㵼藏白及赤白相雜米穀不消腸鳴切痛面浮頭腫目黃口乾脹滿氣痞手足無力小兒亦如此治法四之氣病宜以滲泄五苓散之類也秋酉上五之氣痎五氣為病多發喘息嘔逆咳嗽及婦人寒熱往來瘧痺泄消渴中滿小兒㿀隱瘡疱五分之氣病宜大柴胡湯解治表裏之類小亥上終之氣主終氣為病多發風痰寒痺四肢不收秋冬多大腹水濕相摶肺氣又衰冬寒甚故發則雪不收厥則痿弱無以運用水液澄清為大寒之候積滯瘕塊寒疝血瘕丸氣終之氣病宜破積發汗之類肝足厥是動則病腰痛不可以俯仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸之隂風滿嘔逆飱泄狐疝遺溺閉癃經乙木膽足少是動則病耳聾耳鳴嗌腫喉痺主氣所生病者目黃口乾鼻衄喉痺肩前臑痛大指次指痛不之陽風用經甲木心手少是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後痛厥掌中熱之隂暑經丁火小手太是動則病嗌痛頷腫不可廽顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘腸陽暑臂外後亷痛經丙火脾足太是動則病舌本強食則嘔吐胃脘痛腹脹善噫得後出餘氣決然而衰身皆重是主脾所生病之隂濕者體不能動搖食不下煩心心下急痛寒瘧瘡瘕泄水下黃疸不能卧股膝內腫厥足大指不經已土用胃足陽是動則病凄慘振寒善呻數欠顔黑病則惡人與火聞木音則惕然而驚心動欲閉門獨處甚之明濕則登髙而歌棄衣而走賁響腹脹是為骭厥經戊土心手厥是動則病手心熱肘臂攣急腋腫甚則胸脅支滿心中淡淡動面赤目黃善笑不休是主心脈包隂為所生病者煩心心痛掌中熱絡母血三手少是動則病耳聾渾渾沌沌嗌腫喉痺是主氣所生病者汗出目鋭眥痛耳後痛臑肘臂外皆痛焦陽為小指次指不用經父氣大手陽是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痺肩前臑痛大指次指痛不用腸明燥經庚金肺手太是動則病肺脹滿膨膨而喘咳缺盆痛甚則交兩手而瞀是謂臂厥是主肺所生病者咳嗽上之隂燥渴煩心胸滿臑臂內前亷痛掌中熱氣實肩背痛風寒汗出中風小便數而欠氣虛則肩臂痛經辛金寒少氣不足以息溺血腎足少是動則病飢不欲食面黑如漆唾則有血喉鳴喘坐而欲起目昏無所見心如懸若飢氣不足之隂寒則善恐如人將捕之是謂骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃經癸水疸腸澼脊股內後亷痛痿厥嗜卧足下熱而痛膀足太是動則病頭痛目似脫項似拔腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病胱陽寒者痔瘧狂顛頭頂𩕄痛目黃淚出鼽衄項背腰尻膕踹腳並皆痛小指不用經壬水風風淫于內治以辛涼防風通聖散小續命湯天麻散防風湯制佐以苦甘以甘緩之消風湯排風湯祛風丸法以辛散之暑熱淫于內治以醎寒白虎湯碧玉散桂苓湯玉露散制佐以酸苦以酸收之玉壺丸法以苦發之濕濕淫于內治以苦熱白术木香散石膏湯五苓散蓋元散制佐以酸淡以苦燥之葶藶木香散桂苓白术丸橘皮术散法以淡泄之火火淫于內治以醎冷神功散解毒丸涼膈散八正散制佐以苦辛以醎收之調胃散大小承氣湯法以苦發之燥燥淫于內治以醎溫神功丸潤腸丸麻仁丸葶藶丸制佐以甘辛以醎瀉之脾約丸四生丸法以苦下之寒寒淫于內治以甘熱薑附湯四逆湯二薑湯中湯附子理制佐以苦辛以辛散之术附湯大已寒丸法以苦堅之獨治于內承氣湯神芎丸陷胸湯大黃丸備急丸獨治于外拔毒散生肌散水澄膏魚膽丸兼治于內防風通聖散小柴胡湯大柴胡湯子小柴胡飲當歸飲子兼治于外桂枝湯湯小建中麻黃湯升麻湯五積散先治內謂寒藥先攻裏大黃芒硝黑牽牛之類後治外謂熱藥後攻表桂枝麻黃之類先治外但攻表用熱藥後治內伹攻裏用寒藥金匱十全五泄圖天之氣一也六之則為風火燥濕寒暑故濕之氣六之一也相乘而為之五變其化在天為雨在地為泥在人為脾甚則為泄故風而濕其泄也胃暑而濕其泄也脾燥而濕其泄也大腸熱而濕其泄也小腸寒而濕其泄也大瘕若胃泄不已變而為餐泄餐泄不已變而為洞泄洞泄不已變而為寒中此風乘濕之變也若脾泄不已變而為霍亂不已變而為注下不已變而為腫蠱此暑乘濕之變也若大腸泄不已變而為䐜脹不已變而為腸鳴不已變而為支滿鶩溏此燥乘濕之變也小腸泄不已變而為腸澼腸澼不已變而為臟毒臟毒不已變而為前後便血此熱乘濕之變也若大瘕泄不已又乃變而為脫肛不已變而為廣腸痛不已前為乳痔內為腸風此寒乘濕之變也凡此二十五變若無濕則終不成疾况脾胃二土共管中州脾好飲脾亦惡濕此泄之所由生也凡下痢之脈微且小者生浮大者死水腫脈反變浮大者生沈細者死夫病在裏者脈沈在表者脈浮裏當下之表當汗之下痢之脈浮滑水腫者沈細表裏俱受病故不變也凡臟便血兩手脈俱弦細者死俱滑大者生血溫身熱者死王太僕則曰若下血而身熱血溫是血去而外逆也屬火故曰七日而死七者火之成數也夫餐泄得之於風亦汗可愈或伏驚怖則膽受暴下緑水蓋謂戊巳見伐甲木也嬰兒泄緑水素問有嬰而風理亦如之洞泄者餐泄之甚但餐泄近而洞泄者久久則寒中溫之可也治法曰和之則可也汗之則不可若在腑則易治入臟則難攻洞泄寒中自腑而入臟宜和解而無爭水腫之作未出遽然由濕變於大腸小溲自澀水濕既瀦充滿日倍面黃色瘁肢體如泥濕氣周身難專一法越其髙而奪其下發其表而滲其中酸收而辛散淡滲而苦堅則用攻劑以救其甚緩劑以平其餘如是則孤精得氣獨魄近陽亦可保行陳莝去而淨府潔以彼豆䓻烏梅􅎆粟等物聚用也設病形易變必至大悮或通而塞或塞而通塞塞通通豈應一法世俗止知澀劑之能塞而不知乃通劑之能塞者拘於方也凡治濕皆以利小便為主諸泄不已灸水分穴謂水穀之所别也臍之上一寸半灸五壯腹鳴似雷水道行之候也凡濕勿針內經雖云繆刺其處莫若以張長沙治傷寒法治之蓋泄者亦四時傷寒之一也仲景曰上涌下泄表汗而裏攻