body:
  text: 普濟方卷六十七明周王朱橚撰牙齒門齒䘌論夫齒䘌謂如疳䘌蟲蝕之證齒根宣露壊爛濃血俱出口内氣息葢縁臟腑壅滯熏發上焦攻衝齒牙又有嗜肥甘過多或宿食在齒根不能潄去致腐殠之氣淹漬而成者牙齒雖為骨之所終髓之所養得齗肉而固濟可以堅牢今血氣不足攝理無方風邪襲虚客於齒間則肌寒血弱齦肉宿落漸至宣露永不附着齒根也方附子散治䘌齒齒紫黒皴痒殠爛附子炮裂去皮臍升麻桂去粗皮細辛去苗葉麻黄去根節人參乾薑炮黄芩去黒心甘草炙剉當歸切焙各一分右藥搗羅為細散每用少許貼於齒患齗處每日三五遍上或嚥津不妨治齒䘌方用苦參三兩剉以水三盞煎至一盞去滓熱含冷吐莨菪子散出聖惠方治齒䘌作孔有蟲疼痛莨菪一分水淘去浮者微炒細辛鯽魚燒灰黄連各一分人糞灰一兩甘草半兩乾蝦蟇半兩燒灰石膽半兩細研麝香半兩細研右搗羅為散每取少許以綿裹内蚛孔中日三度換之即瘥麝香散出聖濟總録治齒䘌麝香研白礬研蒲黄細辛去苗葉丁香各半兩附子炮裂去皮臍一分青黛一兩右為散綿裹一錢於患處咬之嚥津不妨日三五遍白礬散出聖濟總録治風䘌口瘡白礬研灰燒半兩升麻一兩細辛去苗葉一兩丹砂研一兩麝香研半錢甘草炙剉一分右為散以鹽漿水洗潄後用熱水調藥鷄毛塗之日三五遍細辛散出聖惠方治齒䘌齒根腐爛動摇細辛二兩川升麻二兩地骨皮三兩角蒿二兩牛膝三兩去苗生地黄五兩右燒為灰細研每夜臨臥傅齒根或以蠟紙上貼之至旦即去一為末先荆芥鹽湯潄口良久揩疼處熱有涎吐每早辰夜臥用薔薇根膏治齒䘌薔薇根二兩地骨皮一兩葱根一兩胡粉一兩蠟一分右剉以水二大盞煎至半盞以重抄紙半張浸之暴乾更浸汁盡為度乾了以粉蠟塗之於上剪作條子夜臥貼之神效黄礬散出聖濟總録治疳䘌齒根宣露黄礬燒研一分麝香乾蛤殻燒灰研一分防風去皮獨活去蘆頭各一兩右羅為末再和勻以煖漿水潄口後用藥貼齒根上有涎即吐出日再貼即瘥傅䘌齒方出肘後方細辛當歸甘草炙蛇床子各一兩青葙子右搗以綿裹如大豆著齒上日三勿嚥汁瘥止皂角散出聖濟總録治齒疳風䘌皂莢不蚛者二兩凝水石搗末二兩升麻一兩同皂莢瓶子内同濟留一孔燒令烟絶取出細研之杏仁去皮尖雙仁研一兩右研勻每用一錢患處貼之細辛散出聖濟總録治齒䘌細辛去苗葉葉膽酥炙乾𤓰蒂黄連去鬚各一兩右為末每用一錢塗貼齒齗上日三五度藜蘆散出聖惠方治齒風䘌疼痛不止藜蘆去蘆頭蜀椒去目并閉口炒出汗附子炮裂去皮臍各一分麝香研一錢右為末次入麝香和勻用一錢綿裹置患處有涎吐之一方為末消黄䗶和丸如粟米大每用一丸内蟲孔中有津則吐治療齒痛不問蟲風者及䘌齒雄黄一兩莽草一兩臘月羊脂蜀葵莖両枝右搗雄黄等為末消羊脂以葵莖蘸脂㸃藥末注齒痛處孔中日三五度每令葵莖熱用之良葶藶煎出聖惠方治齒䘌苦葶藶末地龍末各一分麝香半錢細研臘月猪脂三兩右先煎猪脂令化去滓次入諸藥煎十餘沸於瓷合中盛以柳枝㸃藥於火上炙令熱烙牙齒縫中十餘度三五遍如此烙之即瘥青黛散出聖惠方治齒䘌日夜疼痛不止青黛一兩柑子皮一兩乾蝦䗫一隻五月五日燒灰右為細末以生地黄汁調貼齗上日二換之一方用石黛無地黄汁苦參湯出聖濟總録治齒疳及口生瘡眼澁體重蟲食臟腑苦參切桃白皮切槐白皮切各一兩右搗篩每用五錢以水二盞煎十餘沸去滓熱含潄冷吐日三五度治齒䘌熨烙方出聖惠方雌黄半錢細研猪脂一兩槐枝五莖右煎猪脂入雌黄末及熱以綿裹槐枝㸃取藥熨烙齒齗縫上治齒䘌宣露出聖惠方角蒿灰梧桐淚各一兩麝香一錢右都細研令勻夜後傅於齒根令滿來日早以鹽湯潄口白礬散出聖惠方治齒齗腫有膿血出白礬杏仁二七枚湯浸去皮尖研蚺虵膽一錢右細研先以生布揩齒齗處令血出潄令血盡即用散摻於濕紙上可患處貼之日三兩上以瘥為度白礬散出聖惠方治疳䘌齒根血出白礬燒灰研三分蚺虵膽研一錢右研勻先以布揩齒令血盡每用半錢摻於患處勿嚥津治齒䘌揩齒藥方雄黄一分白礬一兩右相和銚子中熬令黄煙盡研為末每日未洗面先捻少許揩齒含著洗面畢即潄口又方出聖惠方猪牙皂莢一兩燒灰麝香一錢細研右相和細研将用揩齒夜臥時即貼於齗上治䘌齒蟲齒積年不瘥從少至老出千金方用雀麥草一名杜姥草似牛毛草以苦瓠葉四十枝凈洗露一宿平旦取草剉長二寸廣一寸厚五分以瓠葉縳之作五六十褁子取三年釅醋浸之至日中取兩裹内火中炮令極熱内中齒外邊熨之冷則易之取銅器以水内中解裹於水中洗之得蟲長三分老者黄黒色少者白色多者得三四十枚少者得一二十枚一方用醋同前蝸牛方出聖惠方治齒􅉶并有蟲用蝸牛殻三十枚燒灰細研每用揩牙良治口殠及􅉶齒腫痛出肘後方用細辛煮取濃汁熱潄冷吐瘥一方常用剔牙治䘌齒及口瘡蟲食取紫藍燒作灰以傅塗之日三五度取瘥治疳䘌食口齒及下部飛亷蒿燒灰搗篩為末以兩錢着痛處甚痛忍之若不痛非疳也下部蟲如馬尾大拘纒出無數十日瘥平復硫黄烙方出聖惠方治䘌生瘡用硫黄一分以舊鍼鏵頭一枝於炭火中燒令赤捻硫黄著上更入少許猪脂相和熬令沸以柳枝子綿裹頭揾藥承熱烙之齒縫三五遍即愈治䘌齒出永類鈴方桔梗薏苡仁各等分右為生末㸃服小兒亦可用白芷川芎末蜜丸食後噙化生銀杏食後嚼一二箇治口齒風䘌腫疼牙根浮爛惡臭熱毒膿血出本草以蜀升麻水煎綿沾拭瘡上治牙齒䘌痛出本草以留師密食之治齒䘌出本草以鼠李根煮濃汁含之治䘌齒脊骨有疳蟲出本草以牛李煮汁濃含之更空服一盞可灌此汁於有蟲處治齒䘌疳瘡出本草用灰藋燒為灰口含及内齒孔中殺蟲瘥治䘌齒出本草以杏仁燒令烟未盡細研用綿裹内䘌齒孔中良急疳論夫急疳者由風熱藴積脾肺壅滯邪毒之氣衝注口齒遂成疳也其候唇忽變青白齗腫滿膿血俱出朽爛疼痛頰邊有赤白色或有黒暈即須針却惡血不然烙之若不早療死於旬日故名急疳也方黄礬散出聖惠方治急疳蝕齒齗唇口壞爛腫痛黄礬青礬白礬燒令汁盡白狗糞灰莽草雄黄細研各半兩石膽細研茛菪子炒令黒色乾地龍微炒人糞灰各一分麝香一錢細研右為末都研勻先以鹽漿水潄口三兩度於上貼之日三用有涎勿嚥蝦蟇灰散出聖惠方治急疳齒齗腫痛有虫齒朽爛疼痛蝦蟇灰細研青黛細研柑子皮細辛白雞糞麝香細研乾薑薫陸香已上各一分右為末都研令勻以綿裹如杏仁大安於腫處日三換之神效有涎出旋吐却地龍散出聖惠方治急疳蟲蝕牙齒連牙床骨損壞疼痛乾地龍燒灰黄礬白礬燒令汁盡青礬石膽巴豆去皮心研紙壓去油人糞灰細研各一分右為散以綿裹少許内於蚛孔中如孔中小以針内藥一日一度換之待惡物碎骨出盡為度麝香錠子治急疳牙齦腐爛惡肉血殠牙落信砒青黛粉霜各二錢銅緑雄黄各一錢輕粉一字右細研煮麫肐􅀈冷劑為錠子用綿拭去惡血凈食後用米許上蝕處神效雄黄散出聖惠方治急疳齒根唇頰腮上瘡出漸多雄黄一分石膽半兩亂髪半兩燒灰人糞灰一分麝香一錢一方無鯽魚三寸魚肚内滿著鹽燒灰右細研為散先用鹽湯潄三五口後於瘡上貼之有涎即旋旋吐却一方用甘草湯洗瘡後傅麝香散出聖惠方治疳急口中及齒齗腫并口鼻有瘡麝香一分細研雄黄一分細研人乳一合白礬半兩燒令汁盡石膽蓮子大細研川升麻一分末右都研令勻以綿裹如杏仁大含之如有腫爛處塗之藥綿方出聖惠方治走馬疳蝕落牙齒齗腫有膿水麝香一錢砒霜少許莽草末半錢蛤粉一兩蟾酥一字螺子青黛一字右都研為末别用故綿半分剪長一寸碎擘以藥摻在綿内時入少許相和攪令勻隂乾有患者用鹽漿水揩潄三五度用少許藥綿塞在牙根以針按綿子入齒縫中三兩度膝金散治走馬牙疳腫爛人中白五錢火煆雄黄四錢輕粉二錢枯白礬五錢麝香半錢右為細末用少許於患處貼之一方無枯白礬青金膏治走馬牙疳蝕損腐爛青黛二錢砒一錢粉霜輕粉各半錢麝香少許右研為細末旋入小油研如稀糊塗之於夾紙上重疊砑之每用量患大小剪貼之仍以白紙封䕶乾蟾散出聖惠方治牙齒走馬疳乾蟾一枚燒灰龍栢花地骨皮沒藥各一分麝香一錢右為散每有牙齒疳瘡蝕破者先以硝石少許摻之相次以此藥半錢傅於患處日三二度麝膽散治走馬牙疳危惡候銅緑半兩生白礬一分膽礬一錢麝香少許右為細末研勻上牙蝕處乳香丸出衞生寶鑑治走馬疳如神乳香輕粉各半錢麝香少許砒半錢研右先将乳香研細入輕粉麝砒共再研用薄紙一韮葉濶藥内按過撏紙少許丸如黄米大臨臥将藥填在疳處至明愈一方忌漿醋鹽三日柳緑散青黛蒲黄雄黄枯白礬各等分右為細末患處貼之慢牙疳敷此藥少加信一方有五倍子無雄黄青礬散出聖惠方治急疳蟲蝕牙齒徹骨碎青礬黄礬石膽乾地龍燒灰各一分右為末以綿褁内在蚛孔中每日一度換得惡血及碎骨出盡為度三礬散出聖惠方治急疳青礬黄礬各半錢白礬灰一分麝香右同研如粉每用半錢傅於瘡上有涎即吐麝香散治急疳惡蝕肉損枯白礬二兩黄丹一錢半炒麝香一字右為細末研勻乾摻牙病處三停散治大人小兒走馬牙疳硃砂另研硫黄滴水研細乳香另研細各一錢右為一處拌勻量瘡大小用生蜜調攤於棉花紙上臨臥貼之忌油膩葷腥惡物石膽散出聖惠方治急疳脣口赤瘡出者石膽半兩鯽魚一箇長三寸者開肚滿填鹽燒魚焦雄黄一分右研如麵先以疳湯洗口及瘡上用散貼之每日三五上夜後潄口復貼之其瘡便愈石膽散出聖惠方治急疳牛膝燒灰石膽麝香各一分右同研如粉臨臥時先潄口後摻藥於牙縫上不過三兩上雄緑散治惡牙疳蝕腐臭雄黄銅緑各半兩一方加五倍子半兩麝香一匙研勻荆芥水洗净摻之青金散治走馬惡證牙疳蝕損唇舌肉腐牙落殠爛其效如神信砒銅緑各一兩右研為細末攤紙上塗疳蝕處治沉腫牙疳不止不急者斗子鹽白麵右為末三捻吹入鼻中立效治急疳出聖惠方天靈葢一分末羊齊花一分乾者搗為末右同研令細先以綿拭去膿水然後摻之以瘥為度紅鉛散治走馬牙疳用緑礬不拘多少相礬色鮮明者入乾鍋用炭灰燒鍋赤傾出以好酒拌勻再入鍋如此數遍色紅研作細末入麝香少許先以温漿水潄淨用指蘸藥有疳處貼之治大人小兒走馬牙疳用壁蟲兒人中白各燒灰相合為末貼之治男女走馬疳瘡生於口上牙床等處用大天南星一箇剜去心却以雄黄一粒入南星内仍以剜下南星片掩了以麵裹煨以拆為度為細末乾用清油調塗濕乾搽三日全愈治走馬牙疳用北棗去核入信棗内燒灰擦於腫處立效又方用白礬装在蛹兒内燈火燒過黄丹野人肝燒灰各等分停先用熱湯洗之就濕摻之一方用麝香少許金鞭散治腮穿牙落緊牙疳病証用抱退鷄蛋軟白皮兒包活土狗兒一個放入大活蝦䗫口内用草縳四足泥團固濟用火燒過成灰去其泥蝦䗫研為細末貼患處治鼻疳牙疳用五倍子燒存性為末貼治急疳出聖惠方用砒礵半兩以醋調稀如糊於茶碗子内慢火熬攪令不著底待醋乾即刮下每用如粟米大用綿裹安齒縫内來日取出有蟲自死久患者不過三上麝香散出衛生寶方治牙疳麝香一錢銅緑五錢白芨二錢半白蘞三錢半白礬二錢半右為細末每用少許貼牙患處療齒根爛瘡出本草以羅勒燒為細末乾貼齒上良羅勒即蘭香也除疳瘡出本草以蚺蛇肉作膾食之治急疳蝕口鼻數日盡欲死用文蛤燒灰臘脂和塗之文蛤即海蛤也生東海表有文取無時風疳論夫風疳之病其候槽之齗虚腫牙齒摇動侵蝕齒根腐殠脱落下攻齗頰損爛膿血俱出者是也葢縁手足陽明之經氣虚風邪熱毒在胃藴積日久上薫胸間攻發口齒故成斯疾夫風疳者由臟腑壅滯久積風熱脾肺不利心胸痰飲毒之氣衝注上焦薫蒸牙齒則令齒齗浮腫動摇脱落損爛膿血俱出蟲蝕齒根口内常殠面色青黄唇頰腫痛者則是風疳之候也方青黛散出聖惠方治齒疳蝕頰骨破及下部疳痔亦主之青黛研二兩雄黄研青礬研黄礬燒研白礬燒研茛菪子熬令香附子炮裂去皮臍苦參細辛去苖葉藜蘆去蘆頭麝香研甘草炙各一兩右為細散更研如麵以綿裹貼齒若痔病綿裹内下部中若下部有蟲浸甘草苦參各一兩煎湯和散半錢灌之便止雄黄散出聖惠方治牙齒風疳齗爛齒痛雄黄細研麝香細研熊膽天雄生去皮臍細辛當歸附子生去皮臍乾薑剉苦參剉生乾地黄蘆薈甘草剉已上各一分右𢷬細為散同研令勻以綿裹一錢安於齒根含之汁勿嚥沉香散出聖濟總録治風疳齗爛牙齒浮腫沉香一分剉麝香研半兩地骨皮一兩當歸切焙升麻防風去皮各半兩芎藭三分桂去粗皮一分凝水石研一兩甘草炙剉黄蘖去粗皮蜜炙各半兩右為散合研令勻每用一錢傅齒根或以綿裹如彈子大令化嚥津牛酥膏出聖濟總録治齒齗虚軟而無膿血又口䘌其齒齗觸著即膿血出又口疳其齒齗不觸自然膿血出又口瘻其齒齗有小孔如蜂窠形又齒疳其骨脆爛其齒齗唇口吻變作白色或作青紫黒色者是急疳之状死不過旬日宜急救之先看唇頰邊有赤白黒脉處即須以針針去惡血燒鐡箆烙之如此變即定或附齒有黄色物如爛骨状名為食床翼纒著齒者亦須細看之爾其齒齗永不附著齒根也病状如前後方自有委曲也又雄黄膏療齒中疳瘡䘌瘻蟲蝕牙齒口裏之瘡皆療之其膏以十二月合即得一年用難久停好牛酥五大兩黄蠟半兩雄黄一小兩研硃砂二分研藁本半大錢藜蘆二分杏仁去皮尖四分芎藭白芷鰻鯏魚升麻各三分右以酥中煎諸藥魚令黄色去魚煎三上三下入蠟煎盡膏成收器中攪勿住手凝定以本方暨諸藥並為末不去滓甚良每用少許塗患處一方無鰻鯏魚有白蜜硃砂散出聖惠方治牙齒風疳及一切疳蟲硃砂半兩細研雄黄半兩細研乾薑一分炮裂剉晩蠶子紙一張莨菪子一兩炒令黒黄色蜘蛛七枚乾者麝香半兩猪脂如鷄子鍊了者麻仁脂二合犁鏵上鐡皮為末半兩甘草半兩右除脂油外𢷬為末後用猪脂油等和勻旋取塗於瘡上一宿即瘥一月不得食醋又有内疳者夜含半棗大細嚼嚥之青黛散出聖惠方治牙齒風疳及齒齗朽爛欲盡根出有蟲疼痛不可忍青黛細辛棘針微炒當歸香附子木香青葙子各半兩菖蒲乾薑炮裂剉梧桐淚麝香細研各一分右為散每用半錢以綿裹含日四五度夜二度此無毒兼宜以温水調一錢服之升麻散一名地骨皮散出十便良方治風疳蟲蝕齒痛極妙升麻當歸切焙防風去皮各一兩藁本去苗土一作木香甘草炙剉白芷細辛一兩芎藭一兩地骨皮一兩獨活一兩右為散每用五錢以水二大盞煎至一盞去滓熱含冷吐乾薑散出聖濟總録治風疳動摇挺出隠痛蟲蝕地薑炮白礬燒蛇床子微炒甘草炙剉細辛去苗葉蜀椒去目并閉口炒出汗附子炮裂去皮臍防風去叉各一兩藜蘆去蘆頭一分右為散每用一錢熱酒調熱潄冷吐日三度一方有白术治牙齒風疳疼痛頰腫䘌腐口臭方出聖惠方附子炮裂去皮臍莽草當歸獨活芎藭防風去蘆頭細辛李樹根皮各半兩川椒一百粒去目右為剉勻每用半兩以水二大盞煎至一盞去滓熱含冷吐芡實散出聖濟總録治風疳宣露出血不止脱落口臭鷄頭實乾者桑條剉槐枝剉栁枝剉鹽猪牙皂角剉各一升生乾地黄焙地骨皮各一斤右盛新瓦礶中以碗葢口紙裹鹽泥固濟令密暴乾炭火燒通赤候冷取出𢷬羅為末旋入麝香少許揩之温水潄早辰日午臨臥用八僊散治牙疳防風荆芥白芷川芎細辛地骨皮甘草羌活各等分右為粗末煎湯淋洗獨活湯出聖濟總録治風疳獨活去蘆頭當歸切焙藁本去苗土杏仁湯浸去皮尖雙仁炒生乾地黄焙各一分甘草炙剉細辛去苗葉各半兩右搗篩每用一錢水一盞煎十餘沸熱潄冷吐揩齒散出聖惠方治牙齒風疳血出疼痛細辛半兩白蒺藜半兩微炒川升麻半兩露蜂房半兩微炒黄蘗半兩剉槐栁枝如筯粗者長二寸各二七莖燒勿令過火白礬半兩一半燒令汁盡一半生用研令細右為細散研令勻用瓷盒盛用時先以熱鹽水潄口三五度後一如揩牙藥用之揩齗上微覺痛則止有津即吐之又方防風去乂羌活去蘆頭槐白皮黄芩去黒心地骨皮當歸切焙各三分升麻一兩右為散每用三錢水一盞鹽少許煎三五沸熱潄冷吐升麻細辛散出聖濟總録治風疳痒痛侵蝕齗爛升麻細辛去苗葉藁本去苗土防風去乂芎藭凝水石研各一兩甘草炙剉半兩右為散取少許貼齒痒處又取一錢綿裹含化嚥津常令藥味接為佳皂莢散出聖濟總録治風疳宣露口臭皂莢去皮炙一鋌硇砂研白礬熬令汁枯甘松細辛去苗葉各一分鹽花研槐白皮剉各半兩右為散先用鹽揩齒後用散一錢傅患處麝香生肌散治大人小兒牙疳麝香青黛各一錢半乳香輕粉各一錢五色龍骨重研一兩苦葫蘆穰一兩右為細末後與四味又研勻如用時将温水潄口然後着瘡藥臨臥用看瘡大小用藥麝香散出直指方治疳䘌齗爛口臭白礬煆青黛胡黄連蘆薈各一分麝香一字蝦蟆炙焦半兩右為末每用半錢傅患處治牙齒風疳疼痛不止出聖惠方李樹根白皮柳枝各二兩川椒去目棠梨枝郁李仁槐枝各一兩右細剉和勻分為八度每度用水二碗煎至一碗去滓熱含冷吐鶴虱散出聖惠方治牙齒風疳膿血出根有蟲鶴虱半兩細辛半兩露蜂房半兩燒灰膩粉一分麝香一分細研右為細末後入麝香膩粉在前藥中研令勻每臨臥時剪紙如栁枝葉様塗藥貼於所患處一方濕帛子摻藥半錢患處貼之紅玉縫子出宣明論治一切牙疳砒霜一塊皂子大黄丹少許魯土二錢葵子茯苓去黒皮各等分右為末每服四錢水一盞煎三沸食前服一方無葵子茯苓用糊餅水浸和作劑子絍於牙縫治牙疳出神效方米二停鹽一停盆堿麝香少許白礬右相和水拌勻紙包裹燒黒燋為末貼瘡上立止治牙齒風疳及有蚛孔疼痛不止出聖惠方藜蘆一分去蘆頭川椒半兩去目附子半分去皮臍麝香細研雄黄細研各半兩右為散傅於齗上若有蚛孔疼痛即綿裹内於孔中砒霜散出聖惠方治牙齒風疳骨槽風及口氣砒霜一錢麝香川升麻末訶梨勒皮末乾蝦蟇灰各半錢右細研以皂莢五挺水浸援取汁熬成膏調散子塗於紙上剪作片子貼之吐出惡涎立效甘松散出聖濟總録治風疳蟲蝕肉盡甘松一分猪腎薄批炙乾一副蘆薈研半兩膩粉研一分右為散臨臥時先将水潄口後用藥貼患處有涎即吐之牢牙散出聖濟總録治風疳血出及牙齒浮皂莢五挺燒存性小者用十挺附子一枚生乳香研半兩麝香研少許右為散如常揩齒良久潄之頻用為妙枸杞湯出聖惠方治齒疳蟲蝕牙齒成片自落枸杞細剉槐枝細剉柳枝細剉各一握黒豆粗𢷬三合右同於鐺中微炒令黄每用五錢酒一盞水一盞同煎十餘沸去滓熱潄冷吐鹽緑散出聖惠方治齒疳蟲蝕牙齒成片自落鹽緑研黄連麝香研各一分石膽研半分右研極細用綿裹齒孔痛處咬之瘥不過十遍一方為散每用一字摻於濕紙片子上貼之三兩度不過十日即瘥忽患口瘡者綿裹半錢含之牙疳藥治大人小兒牙疳揀信青黛輕粉各一錢麝香半錢右同為末用小油調薄攤紙上用木鎚鎚實收起每用臨臥以漿水洗凈即乾可瘡口大小以藥紙封之至曉去藥紙潄凈勿令嚥下大者不過三上必效升麻散出海上方治牙疳急宣露方見本門齒齗宣露類藁本散石辛散出海上方治如前寒水石十文細辛五文蓽撥三文荆芥三文右𢷬為末摻之止血血竭散血竭五錢龍骨二錢半食鹽不拘多少多年石灰不拘多少右為末貼牙疳芎藭湯治風衝牙齒摇動芎藭剉一兩半細辛去苗葉半兩防風去乂一兩薏苡仁一兩右𢷬篩每用五錢以水三盞煎至三十沸去滓熱含冷吐嚥津無妨砒霜散出聖惠方治牙齒風疳膿血出根有蟲乾蟾一枚燒灰胡桃十枚燒灰砒霜一分蕎麥麫三合燒灰右同研令細每用一字於患處摻牛膝散出聖濟總録治齒痒風疳牛膝燒灰細辛去苗葉各一兩丁香三分右為散更研令細每一錢可患處貼之日三膽礬散治牙疳生肌散一兩蘆甘石三錢膽礬半錢右為末貼之治牙疳出本事方川烏阿魏硃砂各等分右将阿魏醋浸入蒸餅搜作團子切片焙乾同三味為末傅牙齗上不可潄口良久或嚥下去亦不妨藥消盡又使其效如神牙疳藥輕粉一錢黄連二兩右為細末擦牙患處玉粉定兒治牙疳蝕損宣爛臭穢錠粉二錢信一字右研勻細煑白麵肐􅭫冷淘了劑為錠子如綿隂乾為黄米許貼疳處後用麝香散治之麝香散黄連二錢銅緑一錢麝香少許右為細末貼疳蝕處葢前藥牙疳殠方出直指方用蜘蛛殻為末入臙脂麝傅之或用大蜘蛛一枚以濕紙裹又用荷葉外包煆令焦存性為末入少麝研傅又蠶退紙燒入麝亦治牙疳香附可為齒藥治牙齒風疳膿血出牙根有蟲出肘後方用皂莢去黒皮塗酥炙為末每用半錢傅患處入少麝香亦得又以皂莢為末揩之一法用鹽等分燒為末揩疼處良又方出聖惠方用蚺蛇膽傅之效又方出聖惠方用砒黄三錢水三大盞以石鍋内煎稀餳入墨汁三合攪勻攤向好紙上凈潄口夜後剪作片子貼之治牙疳用橄欖灰如無以黄丹代之麝香輕粉各少許同為細末用貼疳處信效散宣明論方治風熱上客陽明之經牙齒疳蝕齗宣腐臭血出色黄氣腐沉悶動摇疼痛作發有時兼解中金石一切毒藥信砒一錢黄丹二錢千古石灰如無但以陳久者炒細研四錢右研細入青鹽一分麝香少許如無此二味亦得每上抄二兩大豆許先洗潄淨蘸藥擦上下牙齒齗瀝涎勿嚥之須臾潄淨或有蝕處再上少許日三四次常用如意以上以頻為妙或服金石藥致病便一日三四上更不上牙齒神效或已上牙齒者傅之即愈或平人常用頗能清利頭目寛膈美食使髭髪遲白久用亦能固牙齒使遲老氣行於面而手足陽明經絡貫注憂思則氣結而血液不行煩燥怫鬰而血衰不能榮養髭髪故早蒼黄而斑白也此藥能使陽明氣血宣故效能然也又方使龍骨不用石灰治牙齒疳䘌蚛牙出本草方取啄木烏一隻燒為末内牙齒孔中不過三數齒漏疳論夫手陽明支脉入於齒風邪客於經脉流滯齒根腫膿汁出愈而更發謂之齒漏疳也方棘刺散出聖惠方治齒漏疳膿血出齒齗宣露氣臭不能飲食棘刺半兩燒灰青葙子三兩當歸乾薑炮裂剉香附子鷄舌香細辛川升麻已上各一兩右為散每用半錢以綿裹於患處咬之嚥津以瘥為度青黛散出百選方治齒露疳出膿水不止青黛梧桐淚胡黄連蘆薈各半兩蝦蟆一枚燒灰麝香一分麝香散出百選方治齒漏疳蟲蝕齒齗殠爛麝香青礬燒赤黄礬燒枯各一分蘆薈半叚約半兩去枝節燒灰右同於乳鉢内細研為散先以綿拭齗上惡血出即用濕紙片子摻藥貼富次律有女年數歳齒上忽生黒㸃後數日齦爛成走馬疳用前方即愈自後屢有竒效丁香散出聖惠方治齒露疳宣露及骨槽風膿血不止丁香一分生地黄五兩以竹刀子切于銅器内炒黒色乾蝦蟆一分炙茛菪子半兩炒黒麝香一錢細研右為散每至夜間用濕紙片子上摻藥約齒齗患處大小貼之有涎即吐以瘥為度銅青散出聖惠方治齒露疳銅青兩字榖精草末兩錢砒霜半錢馬齒莧灰兩字右於乳鉢内研令細臨臥時先以熱漿水潄口三五度後以手指取藥少許揩于齒齗上便合口候良久滿口津即吐之依前潄三五度又揩藥每日夜三五度用之以瘥為度鯽魚散出聖惠方治齒漏疳宣露膿血出大鯽魚一枚砒霜一分乾地黄末一兩右将割破鯽魚復去腸入砒霜及地黄末以紙裹魚入火燒煙絶取出去其紙灰更入白礬灰麝香少許細研為散每用半錢摻濕紙片子上貼患處神功圓出東垣蘭室方治多食肉人口臭不可近牙疳蝕牙齒肉将脱牙齒落血不止黄連去鬚擇凈秤一兩酒洗縮砂仁半錢生甘草三錢藿香葉一錢木香一錢生地黄酒洗三錢當歸身一錢升麻二錢蘭香葉如無藋香代之右同為細末水浸蒸餅為丸如菉豆大每服二十丸或加至二百丸止白湯下食逺兼治血痢及血崩及血下不止血下褐色或紫黒色及腸癖下血空心服米湯下其脉洪大而緩者及治麻木厥氣衝逆氣上行妄見者齒齲論夫手陽明之支脉入於齒足太陽脉有入於頰遍於齒者其經虚風氣客之絡縳齒間與血氣相乗則齗腫熱氣加之膿汁出而殠侵食齒齗謂之齲齒亦曰風齲方細辛湯十便良方治牙齒風齲腫痛膿汁不止細辛去苗葉附子去皮臍生用各半兩芎藭一兩右剉如麻豆每服五錢水二盞煎十餘沸去滓熱潄冷吐蝦蟆散出聖惠方治齒齲疼痛乾蝦蟆一枚五月五日取者佳燒灰麝香研半錢柑皮細辛去苗葉各半兩白雞屎燒灰青黛研一作石黛乾薑炮雄黄研各一分右為散綿裹如黍米大内蟲孔中無蟲孔者貼一字於患處有涎即吐治牙齒風齲出聖惠方郁李根白皮切四兩細辛一兩鹽一合右切以水四升煮取二升半去滓内鹽含之取瘥柳枝湯出聖惠方治牙齒風齲隱痛動摇齒齗宣露栁枝一握剉地骨皮細辛防風去蘆頭生地黄剉蔓荆子杏仁俱各一兩湯浸去皮尖雙仁鹽半兩右剉如麻豆和勻每用一兩水一盞半同煎至一盞去滓熱含就於患處良久倦即吐之含盡為度日二盡此一劑永瘥更不再發酒水各一盞煎亦佳蜀椒湯治牙齒風齲疼痛蜀椒去目并閉口炒出汗芎藭細辛去苗葉升麻莽草防風去乂黄芩去黒心各一分右搗篩每用五錢水二盞煎三五沸去滓熱潄冷吐白礬散出聖惠方治齲齒齗腫出膿汁白礬枯一分蟾酥半分麝香雄黄熊膽俱各半分乾蝦蟆一枚燒灰右研勻令極細每用半錢傅齒根藜蘆散出肘後方治牙齒齗宣露疼痛疳䘌藜蘆去蘆莽草各半兩細辛去苗葉垣衣東墻上取鹽各一兩棘刺四十九枚有鈎者右搗末水調成劑以蕎麥麵四兩和作餅子裹之燒令通赤於醋中蘸焙乾搗羅為散用栁枝咬頭令軟揾散置齒間良久温水潄早晨臨臥用之一法剛炭灰火燒令煙盡又以薄醋淋過重缺三遍勿令作灰每日揩牙齒凈潄口麝香散治牙齒風齲疼痛麝香研硐砂研各等分細辛去苗葉青黛研升麻各一分右為散先以鍼撥開蟲處㸃藥於蟲孔中藥行痛即止白附子散出千金方治牙齒風齲疼痛亦治口氣白附子一分生用莽草細辛芎藭髙良薑各一分剉右為散以綿裹少許著齲齒上有汁出勿嚥一日兩度含之一方無莽草用知母雄黄煎治牙齒風齲疼痛作臭出膿雄黄研葶藶紙上炒為末各一兩麝香研半錢蘆薈研半分先以臈月猪脂三兩煎化去滓次下葶藶末煎少頃次下三味研藥搗勿住手候成煎瓷合盛先刮齒令凈鍼去惡血以綿拭乾塗煎仍用鐡箆子熨烙三兩度次用後方芎藭升麻藁本去苗土各半兩獨活去蘆細辛去苗葉各一分右搗羅為末量患處貼之松脂湯出聖惠方治牙齒風齲疼痛松脂二兩一作松節皂莢炙去皮子一挺者鹽一分右剉每服五錢水二盞煎五七沸去滓熱潄冷吐烏頭湯出聖惠方治牙齒風齲疼痛烏頭炮去皮臍獨活去蘆郁李仁泡去皮各半兩一方用根右剉如麻豆每用五錢好酒一升綿裹藥於酒中浸一宿煎十餘沸熱潄冷吐治療牙齒風齲出聖惠方用鼠粒子四兩煮取二升半濾去滓適寒温含之冷吐别含瘥治齲齒出肘後方用松枝鋭如錐拄齲蛀孔内須臾齲蟲縁松枝出一方取松枝泡潄之不落蟲自死烏頭丸治牙齒風齲疼痛烏頭炮裂去皮臍半兩五靈脂一兩右為末以醋一升煮大棗二十枚醋盡為度取棗肉和藥丸如菉豆大用綿裹一丸於痛處咬勿嚥津茱萸丸治牙齒風齲呉茱萸湯洗焙乾炒夜明沙炒各一分右為末以蟾酥丸如麻子綿裹一丸痛處咬勿嚥津治療齒有孔附子二分炮去皮蜜蠟五分右相和為丸塞齒孔中即瘥忌冷水油膩治齲齒及蟲痛方出千金方用切白馬懸蹄如米許以綿裹著痛處孔中不過三度一方出聖惠方治齲齒疼痛用葫蘆子半升水五升煮三升去滓含潄吐之莖葉亦可不過三劑瘥治風齲齒用栁枝剉一升大豆一升合炒豆炮盡於瓷器盛之清酒三升漬之經三日含之頻吐治齲齒出肘後方用郁李根白皮切水煮濃汁含之冷即吐出蟲一方用李梅白皮治齲齒痛有蟲出聖惠方用雄雀糞用綿裹塞孔中日一二易之治齲齒十便良方用雞舌香煮汁含之瘥治牙齒風齲用薏苡根四根水四升煮取二升含冷易之齗便生扣齒法養生方云朝夕啄齒齒不齲又云食畢當潄口數過不爾使人病齲齒治齲齒出本草以苦參作湯日潄三升出入慎風五六日愈昔淳于意醫齊中大夫病此炙左手陽明并服此藥愈齲齒方出本草搗皂角去皮炙為末塗齒上吐之普濟方卷六十七
