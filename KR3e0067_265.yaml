body:
  text: 普濟方卷二百六十五明周王朱橚撰服餌門丹藥附論夫輕清上騰重濁下結乾道有凝明之氣散作星辰坤靈韜變化之精流於金石備諸藥品皆載神功隂陽既合於運行水火宜專於信候遂能去其火毒全備至和實由煆鍊之勤乃著玄微之驗矣谷神論云含津鍊氣吐故納新上入泥丸下至丹田謂之內丹陽龍隂虎木液金精二氣交會烹鍊而成謂之外丹修真之士先成內丹後鍊外藥內外相應則神仙可致也方神仙中品黃龍丹出聖濟總録赤石脂十兩黃牛乳汁三升白沙蜜二斤乳香通明者一斤甘草三兩末白粳米三斗五升分作五次炊藥以熟為度右將赤石脂為末以生絹夾袋貯之於泔水淨盆內浸半日以手揉擺在水中候沉下刮入紙箱中控乾取五兩精細者入銀盒內盛之第一次於初七日淘米七升如炊飯相似安藥盒在內炊之飯熟為度夜中去其盒蓋露之星辰下一宿第二次於月望日依前炊之亦去其盒蓋夜露月明中一宿第三次於二十四日早晨依前法炊之去其盒蓋於日中暴之要取日月星辰之氣足第四次先將牛乳三升入大盒內於慢炭火上逼令如魚眼沸下乳香候化次入前三次炊煮赤石脂末用柳木箆攪令勻傾於乳鉢內細研復入盒依前用米七升安盒在內炊之米熟為度第五次以蜜二斤入盒內依前慢火逼之如魚眼沸即下前藥不住手用栁木箆攪勻入甘草末三兩同熬令帶濕便住再用米七升安藥盒在內炊米熟為度取盒於新水盆內浸半日取出於淨處頓初服時選天德日欲明時空心焚香面東七拜以好酒調下一匙許此乃出世延年仙丹無金石之毒亦無誤生理服食之後乃得四氣調和經絡無滯但許傳授度人不可規利則其神效速晉廣平中華嶽朱山人自幼慕道年六十餘遊鍾山遇異人授此丹信而服之至唐龍紀改元寓揚州開元觀時已數百嵗矣復授道士周重興且曰此丹服之旬餘自覺臟腑通快精神清爽凡風勞氣冷一切大病悉皆除去若及兩料腸變為筋可與天地齊久凡人先須飬脾脾旺則肝榮肝榮則心壯心壯則肺盛肺盛則元藏實元藏實根本固是謂深根固蒂長生久視之道也修合用新潔器可盛一兩藥銀盒一隻可盛五斗物銀盒一隻新瓦盆三隻可盛一斗物木甑一隻蓋甑盆一隻新淨鍋竈一副新淨乳鉢一副銀匙一柄銀小杓兒一枚細竹小罩籬兒一枚柳木箆一枚淨木柴一百斤神仙返魂丹出聖濟總録起死扶衰延年却老丹砂雄黃雌黃各三兩右先細研雄黃雌黃二味用竹筒盛埋北方地中三日取出先傾出一半當心置丹砂亦研細却用傾出一半蓋之又用雲母粉以絹袋子揉洗出暴乾塞筒子口埋地內只露筒口用炭火於筒中畔圍之緩緩燒三七日養化成水為度傾藥水盛銅器內垂井中五日無井只用深盆中盛水三四寸更置大豆半升在內即安藥器於水上浸五日亦得然後逐夜於露下露之才日出收候藥水赤色可丸即丸如胡麻子大蜜收貯若有人卒死者安在口中即活生人服者終身無病每月旦日服一丸若中毒藥其毒自吐出凡有七名一曰返魂二曰再生三曰追命四曰固壽五曰來蘇六曰知命七曰得道其功不可具言此乃錢忠懿王所傳長壽真人素丹砂方出聖濟總録輕身却老強力悅色丹砂成塊者四兩青鹽半斤硼砂一兩另研分作三分磁石一斤大火煆四十九度逐度釅醋淬右先將磁石青鹽同為末醋拌令浥浥分作四服先一停鋪盒盒底將丹砂如蓮子排一重用硼砂一分糝蓋了上用磁石青鹽蓋之又布丹砂如前都三層著餘一分藥末蓋之按令實先用瓦子一片蓋合更用淨磚一片安爐底灰四寸鋪磚上乃坐藥盒於灰上更用灰蓋盒上四面各及四寸切在子細用頂火四兩養七日待令取出除瓦片却用圓盒蓋却用赤石脂固了口更用鹽鉛白蚯蚓糞紙筋和搗遍固合四面令極牢了依前坐罏中磚上以灰蓋用生熟火三斤一上煆通赤良久退火用灰五升罨却待冷取輕輕鑿開取砂看伏火如灰色一塊除却匱朱砂不折第一轉也更用硼砂一兩青鹽半斤二味熟研如粉入少許研如糊入前匱中和拌令乾濕得所凖前法布砂鋪藥却不固濟只合定如灰池中用火三兩養之復時可五度添火勿令絶養七日息火待冷取出砂看紫色佳是第二轉也只是較脆即將搗研如粉入青鹽少同研了即以重抄細裹可拌作彈子大以線繫定用醋磨京墨重重厚塗晒令徹裏乾坐丸子於盒內定不固濟上以灰勻蓋只用三兩火養三日復時大火五斤一上煆通赤待冷取出砂丸當如雪色第三轉也成矣取砂淘淨洗去鹽味焙乾用真牛乳一合并砂入有節青竹筒內以紬絹褁筒口緊墜於井內七日取晒乾研如粉煮棗肉拌為丸如菉豆大甲辰日齋潔焚香服一丸每日加一丸至第七日却減至一丸又加之如初至六十日有應效至一年身輕健三年行如奔馬力過百夫久服長生能運氣脈為地仙矣顔如童子齒落更生髮白再黑忌羊血死肉魚鮮物太清四扇丹出聖濟總録安心辟邪治一切惡氣丹砂四兩研如麻豆上已採桃花二十兩真蜜一斤同入銀器中重湯煮至五月朔日以新水淘淨滌取砂令童子面東研之麒麟竭四兩選真者五月二日入丹砂中研沒藥四兩透明者五月三日入丹砂研麝香四兩全以當門子五月四日入丹砂同研右先取出黨人參一兩甘草一分並細銼五月一日日未出時採露水一升真蜜三兩同浸之至端午日熬水至半去滓入大麥麵作糊和稍硬劑之丸如棟實大每服以沉香溫水二合嚼下一粒或半粒補心導血駐顔益氣調和血脈去邪氣尤辟時疫嵗即全家齋潔旦起面東以井水化各人嚼下一粒斷不染疫久服則心安無夢邪氣不犯面有紅光合時忌女人貓犬壓穢常於潔淨處藏之一名通神保明丹兼治婦人血氣衝心疼痛丈夫元氣及一切惡氣等並生薑酒下婦人炒薑醋湯下痁瘧臘茶下一粒或半粒量疾大小服神仙太一煆丹出聖濟總録輕身延年聖無知煎掠去白花焙乾研二斤硝石五兩細研分作十分每一度煆入一分綘礬細研五兩麻油一百兩分作十分每一度煆入一分右先將礬鹽入硝石一分拌和研勻用麻油十兩和了入固濟五升瓶內以炭火十斤煆將瓦蓋瓶熖絶炭盡為度取出細研更入硝石一分油一分凖前用炭十斤煆盡如此十度計用炭一百斤足後取藥搗羅為末旋取少許細研湯浸蒸餅為丸如梧桐子大每服十丸加至二十丸空心冷水下久服衆疾皆愈髭髮如漆筋骨輕健耳目聰明元方云服一年日行二百里五年通仙神仙靈妙丹出聖濟總録延年益壽恱顔色堅臟腑壯腰腳益血固精水銀四兩硫黃一兩五錢右先鎔開硫黃即投水銀以鐡匙炒作青沙子稱定四兩如重再炒去盡黃乃已方用煆藥合子一隻口差小者入青沙在內用新茶盞一隻底差大平淨面厚者盛新汲水七分許安盛沙盒上以細羅赤石脂末水拌作泥厚黏外縫令周密盒下坐熟火猛炎得所微扇熁之盞中水耗旋添常令有約半日許令火自冷取起盞底成靈砂一簇打下稱得多少未盡者再用火依前熁之砂成以絹袋盛水煮三五沸或浸半日漉乾細研如粉水煮半夏糊為丸如梧桐子大每服一丸空心井水下直到中腕旋下丹田常覺溫暖忌羊血神仙伏火內固丹出聖濟總録補精育神延年悅色丹砂一兩錫藺脂一兩右以漿水二碗同煮水盡為度用沙盒子一枚將煮過砂用蜜滚過使白附子末再滚為衣却用黑附子末水調裹砂在心中上下用蜀椒鋪底蓋滿盒子又用油調蛤粉固齊口縫外用鹽泥紙筋封固候乾用炭火五斤火盡候冷取出用紙裹丹砂入地竅埋一宿取出細研以糯米作糊丸如梧桐子大每日一粒清淨水下久服無毒神仙益壽二氣丹出聖濟總録丹砂二兩水銀一兩同研百合花夜合花乾菊花槐花不拘多少同為末右用小磁盒將四花於末盒下用一半次入丹砂水銀緊捺更用知母末蓋盒定赤石脂固縫鹽泥固濟候乾一磚上用醋灰都裹定炭三五斤煆頂火炭盡為度候冷取出細研油單裹垂入井水中浸三宿出火氣次先蒸三遍出水氣次用棗肉丸如菉豆大每服一丸二丸酒下延年兼治諸般氣疾久服身中更不出蟲虱三煆神丹法一煆銀茅二煆金茅非尋常伏火朱砂之比趙彥正有言序不多録白附子六兩地骨皮川椒枸把子石葦細辛各三兩天茄子三兩右並不事治杵羅為末用磁盒子一枚須是徑三寸圍九寸髙四寸並用大寸先將藥末入盒子內可厚一指以來實築然後將成塊硃砂五兩或七兩或十兩蜜拌令勻以墨染紙裹之安在盒子中心須更用藥末周圍實築至盒子口可留一分更鋪以椒一分滿之又用墨紙一重蓋定生油調蛤粉固盒口縫鐵線十字繫定盒子用紙筋和膠泥大率三斤泥一斤泥土相和揑塑泥要不裂也固濟盒子周圍可厚一指半隂乾平地安定下不得用物亦不得作坑然後以醋拌灰浥定周圍包了泥盒又周圍立倚炭三十斤并盒子上用炭以瓦圍束勿令炭落上用熟炭一斤令漸漸生著至半日通著直至來日冷打開盒子取出硃砂其形塊大小輕重都不變但紫色耳再用蜜拌如前三煆成丹共十八斤炭十斤此法竒妙煉時忌雞犬婦人孝子見崑崙紙多上墨尤佳太素丹一名白丹出余居士選竒方治停寒肺虛痰實喘急咳嗽經久痰中有血及療氣虛感冷肺腑滑泄脾胃羸弱不進飲食此藥治一切危困之疾神效益陽退隂治虛損固冷及吐瀉暴脫傷寒隂證手足厥冷真陽起石二錢新瓦上用熟火煆過通紅為度去火候冷研極細煉成鍾乳粉一兩右合研令勻用糯米粽子尖拌和丸如雞頭子大臨和時入白石脂一錢須大盤子不住手轉候八九分堅硬隂乾用新粗布以滑石出光每服二粒至三粒空心人參湯陳米飲下白丹熖硝二兩細研白礬三兩研細寒水石四兩研細塊子砒霜一兩細研右用燒藥罐子一箇盛得十兩藥者先用火炙以生薑汁塗數遍炙乾先下砒末在罐子底按實次下熖硝末按實次下白礬末按實次下寒水石末蓋頭填滿罐子上用圓瓦兒蓋合口坐在地上簇炭五斤發頂火煆煙盡為度去火候冷取藥砒撮在底刮令淨盡研極細砒另研尤好次入純白石脂一兩只用好白磰土亦得同研細如粉滴水和成劑於手心內以數入內轉手丸如梧桐子大先隂乾或晒或焙令十分乾再入新乾鍋子內用圓瓦兒蓋合口坐在磚上簇炭火三斤一煆通紅為度用新乾鍋子傾丹入一厚磁碟內如玉霜白每服一二粒空心用冷水吞下以乾物壓之忌溫熱物少時有孕不可服此藥如無藥罐只用煉得五十兩銀乾鍋子兩個分藥作兩處按實燒亦可此藥大治虛寒壯脾胃進飲食有大效寒水石南人謂之軟石膏范忠宣公法煉金液丹透明硫黃四兩豬肪脂八兩右先將硫黃碎為小塊子以沙石銚子煉肪脂成汁去却筋膜後下硫黃在內急以栁枝子攪才候消不可煉過却便下火先用湯一盞以新綿罩其上將所熬硫黃并脂傾在綿上硫黃沉脂浮候冷撥去脂將凝住硫黃以皂角湯洗十餘遍候不粘膩以栁木槌研三五日細如粉水浸蒸餅為丸如梧桐子大每服三五丸元米飲下陳瑩中録此方云頴川范忠宣公家法也忠宣無問老幼有病無病旦旦服之如嗜茶飯以硫黃為脂所製不留臟腑間壯氣飬真莫甚於此真仙法也太上紫霞丹升降隂陽神仙藥也福州石醫方硫黃研細針沙羅去細者各四兩五倍子一兩打破右同用沙鍋內以水煮一時放冷先揀了五倍子不用然後淘去針沙將硫黃鋪紙一張於灰上滲乾團作毬用荷葉一枚褁之安地上以大火煆候藥紅即攔去火經宿研令極細用膏飯和丸如皂角子大隂乾每服一二丸空心白湯下此藥治氣虛頭痛如神水金丹透明硫黃研細輕粉一兩右先將硫黃研令極細於一斤之內取研細硫黃一兩與輕粉一兩合和同研一時辰許别頓一處先用真蛤粉十斤於一片新瓦上實填瓦口令平次用銀盂子一枚可盛硫黃末一斤以上者頓瓦中心四邉用蛤粉緊擁作池子極要實然後輕手脫去盂子將十五兩研細硫黃末用一大匙抄入池子內次入合和輕粉硫黃末二兩鋪蓋頂上以匙撩令小實用熟火五斤就瓦四邉煆之候硫黃成汁透底造化硫黃輕粉二氣融和用細蛤粉一大盂猛罨藥池之上其殘火留經宿直至寒罏取之已成一片刮去蛤粉淨盡研令極細用麵糊為丸如梧桐子大治男子婦人一切虛危痼冷腸滑不禁腹內纒疼瀉注不已手足厥逆飲食生冷吐瀉不止兼治婦人室女赤白帶下面黃痿瘦補暖丹田壯元陽每服七粒或十粒空心人參湯下雄硃丹治宿寒痼冷飲食嘔逆經隔五七年即疲瘠異形變為勞瘵錢觀文方硃砂雄黃各二兩右用沙盒子一箇先以牡丹皮二兩內外薰令黃色入前藥在內用釅米醋和臘茶作餅子蓋定以赤石脂固盒口子縫又用赤石脂泥裹盒子一重再用黃泥紙筋又裹一重約一指厚先以草火燒令盒子極乾再用炭五斤漸漸添至一稱候火力漸消取出掘地坑一尺埋一宿去火毒取出細研續入藥胡椒官桂去皮赤石脂附子炮製去皮臍另為細末木香沉香蓽薢丁香白术各一兩乳香五錢與赤石脂同研細右為細末入前煆藥同研勻却以清酒二斤二分熬去二分入附子末煮成糊丸如梧桐子大每服十丸溫酒鹽湯空心服蜀仙丹辰砂四兩細研水飛過杏仁二兩去皮尖研右用宣州木瓜二枚切下蓋子以竹刀刮去穰先入辰砂實按次入杏仁填滿却以蓋子覆之用竹簽簽定以生絹袋裹之入磁器中蒸一百遍候數足取出刮去木瓜粗皮一處研細候可丸即丸如菉豆大每服十粒空心溫酒米飲下大壯元氣去百病木瓜最忌犯鐵近鐵即不見效資壽小金丹補益真元治諸虛不足上盛下虛喘急瀉泄手足厥逆小腹結痛翻胃脾寒霍亂嘔吐食不消化白濁夢遺便多盜汗恍惚虛驚耳鳴目眩久痢赤白腸風痔漏婦人諸疾經候不勻帶下崩中子宫虛冷久無胎孕此方溫平不僣常服鎮養心氣滋益精神輕身延年活血駐顔代赭石餘糧石四兩石中黃二兩赤石脂五兩一分右各研為細末再稱數足同入羅三兩遍再勻研細膩旋抄二三匙入盞中滴水丸如梧桐子大急手丸畢再丸入盤以光實無皺裂為度赤石脂性硬故須急急丸之待隂乾入新乾鍋子裝載用木柴每排作二三行用炭排十字眼中放藥鍋子再四圍聚木炭以多為佳自頂放熟火令慢燒下不得用扇直至火與藥通紅待冷方取出入乾淨磁器中收貯每服兩粒或三粒棗湯送下或米飲下婦人艾湯空心服峽教王執中刋一書名既效方云金丹治療極多治瘧尤神效其方代赭石一斤餘糧石減半赤石脂石中黃各四兩同研滴水丸如梧桐子大三斤炭煆盡為度每服三五粒空心冷鹽水下又有小金丹亦治瘧代赭石八兩火煆醋淬七次餘糧石火煆醋淬七次赤石脂四兩研石中黃二兩研滴水丸如梧桐子大隂乾三四日於銀器中滚令光滑用磁罐子盛炭火六七斤燒煆通赤却用盆盛冷水盆內坐銀盂子傾藥在盂內出火毒每服三五粒空心溫米湯下杏金丹出本草本出渾皇子亦名草金方服之壽二千二百年不死只是以杏仁成丹輕重如金軟而可食因此立名從三皇後有得法者服之無有不得力奚仲呂望彭祖皆鍊之彭祖曰寧可見此方不用封王寧可見此藥不用封侯老子曰草金丹是衆仙祕要服之得力只為作之者難世俗之人皆不信有神驗將聖人妄説作之者不肯精心潔淨良有惡物觸犯藥即不成徒多損廢又何益矣其造不得令盲聾瘖啞大病及惡心人女子小人知見丹亦不成丹成無忌只是夏姬服之壽年七百乃仙去煉丹法從寅月修杏樹人罕到者良又以寅月钁劚樹下地間圖陽氣通物至二月草生以鋤除草恐損地力至三月離樹五步作畦隴淘成擬引天之暴雨亦須逺裁棘遍攔勿使疏入畜獸殘踏遇亢旱即泉源水灑潤杏樹下初春有霜雪即樹下燒火以救之恐損花蕚至五月杏熟收取當月旬內自落者去核取仁六斗以熱湯去皮去雙仁取南流水三石和研取汁兩石八斗去渣并小美者亦得取新鐵釡受三石水作竈須具五嶽三台形用硃砂圖畫之其竈通四腳去地五寸著鐐不得絶稠恐下灰不得其釡用酥三升以鍊火及炭燃釡少少磨三斤酥盡即內汁釡中釡上安盆盆上鑽孔用筝弦懸車轄至釡底其孔以紙纒塞勿令泄氣初著粳火并乾牛糞火一日三動車轄以滚其汁五日有露液生十日白霜起又十日白霜盡即金花出若見此候即知丹霜成開盆用炭火炙乾雄雞翎掃取以棗肉和丸如梧桐子大釡中獨角成者為上其釡口次也丹滓亦能治冷疾服丹法如人喫一斗酒醉即喫五升喫一升者即喫半升下藥取滿日空心暖酒服三丸至七日宿疾除愈聲喑盲攣跛疝氣野雞癭氣風癎痎氣瘡腫萬病皆除愈頭白即黑齒落更生張先師云二兩為一劑一劑延八十年兩劑延二百四十年三劑通靈不死若為天仙一萬年永忌房室若為地仙五千年三年忌房室若為人仙一千五百年百日忌房室陳居士上表十月已後泥爐造為雷息之時亦不用車馬轟闐聲何以十月造天雷二月起八月息初造丹時祭五嶽神仙地祇亦取童子看火候二十四氣五行隂陽十二時取此氣侯用火丹乃成矣聖人所服皆致長生久壽世人不能常服或言此藥無效若精心確志必就神仙長年矣李太白杏金丹出聖濟總録取肥實杏仁五斗以布袋盛用井花水同浸三日次入甑中以帛覆之上布黃沙五寸炊一日去沙取出又於粟中炊一日又於小麥中炊一日又於大麥中炊一日壓取油五升澄清用銀瓶一隻打如水瓶樣入油在內不得滿又以銀圓葉可瓶口大小蓋定銷銀汁灌固口縫入於大釡中煮七復時常撥動看油打開取藥入器中火滴成汁傾出放冷其色如金後入臼中搗之堪丸即丸如黃米大空心旦暮酒下或用津液下或滚水下或燈心湯下俱可服時必宜數至二十丸不宜過多過少久服延年保氣變白除萬病合丹時用朱書此符三道衣領中藏祕元丹固守三田接養真氣半夏一斤漿水浸七日切作半破斑貓四十九枚去翅足薜荔葉二兩糯米一升右同於銚內炒候半夏赤黃色先以紙鋪地急傾藥於紙上瓦盆蓋之一宿去三味只取半夏為末酒糊丸如梧桐子大空心溫酒下二十丸覽聖丹太上通神洞視預知吉凶上辨仙真下察鬼魅紫芝石菖蒲銼焙預知子去皮茯神去木石決明草決明炒蜜蒙花各二兩鴉睛十四枚隂乾右搗羅為末鍊蜜和丸如梧桐子大空心淨水下二十丸保真護命丹治隂氣太盛五臟昏濁食畢困乏雖未中年衰苶先至消隂天麻銼牛膝去苖銼各四兩天仙子一升淘淨炒黃右以絹袋盛浸酒中七日七夜取藥炒乾為末用浸藥酒作麵糊丸如梧桐子大每日空心酒下二十丸玉芝丹治一切風疾并婦人血氣黑鉛一兩水銀一兩硫黃一大豆大陽起石三大豆大代赭三大豆大硝石右先鎔鉛成汁次下水銀急手攪令勻後下諸藥咬鉛已下四味同研細了旋取點入鉛汁中熟攪之旋咬鉛汁灰於一拌候咬鉛盡然後瀉水銀於磁碗中但稱水銀有一兩在即止入於後匱硫黃一兩五錢細研如末入瓶中用碗合之漸漸火逼候鬼熖出即住火冷細研為匱又將匱入一小鐺中布置以物按中作坑子即將鉛中水銀一兩更入硫黃一分同研細為砂子入於內匱中以一茶碗合定固之令乾鐺子下當以二兩火養仍以草灰沒鐺子蓋之勿令火絶如此七日漸以火燒令通赤即藥成矣放冷取出紙襯攤於濕地盆合一復時出火毒細研如麵以棗肉和丸如粟米大每日空心溫酒下五丸忌羊血鯉魚此名靈寶丹其匱若以飯和圓如大豆熱茶下二丸大行時疾服了以厚衣蓋身取汗出即瘥其匱長生用之紫粉靈寶丹治筋骨風氣添精益髓神氣清爽好顔色紅白久服輕健補暖水臟水銀三兩與上玉芝丹同法修製每二兩水銀即入硫黃五錢結成砂子細研如粉黑鉛四兩右取火硝石於鐺中心作一堆子尖尖裝之堆四面流下些些子令蓋鐺底即取砂子末細細糝於堆子上勿令四面散訖更研入少許硫黃末蓋之又以碗蓋鐺口四面以濕紙固齊縫子上又以泥如法固齊候乾鐺下漸漸以火三五兩候看得所加至一斤已來可燒半日久又加三五兩如此疊疊加至四五斤火煆之當鐺下上通赤即漸去火待冷輕手揭取藥成一團以甘草二兩水五升煎至二升去滓煮藥喫乾出火毒乾了細研水飛過以煮棗肉和丸如梧桐子大每日空心以津下一丸青金丹治一切風冷血氣水銀硃砂硫黃黃丹鉛粉各一兩右於銚子內先下硫黃銷成汁即下硃砂水銀結成砂候冷下黃丹鉛粉同細研入一瓷葫蘆中蜜固齊以小火養從旦至午加火四斤一煆候火三分減二放冷取出其藥已青紫色細研以紙襯攤於潤地一復時出火毒後用赤箭脂汁調麵作糊丸如豌豆大每服空心以酸棗仁煎酒下十丸初服須要出汗即加薄荷汁生薑汁白蜜各半匙同服厚蓋取汗白金丹治一切風偏風口不收半身不遂硃砂三兩别研為末雌黃一兩五錢硫黃一兩右二黃同研如粉先於鐺中銷成汁次下硃砂末攪令勻即以桑灰汁煮三日三夜旋以暖水添之日滿即刮入鼎中以文火㶸乾出隂氣盡重固濟以十斤火煆候火銷至二三斤即住其藥日在鼎底作一片鑿取成白金狀以甘草餘甘子瓷器中水煮日出火毒研為末以粟米飯和丸如菉豆大每日空心以冷椒湯下三丸漸加至五丸服之大效忌羊血水火銀硫黃紫粉丹治一切冷氣反胃吐食冷熱血氣冷勞腸風一切冷病神效硫黃六兩水銀二兩五錢針砂一兩漂洗令淨太隂玄精二兩研入右先細研硫黃次下水銀點少熱水研如泥候水銀星斷即入鼎中并玄精針砂以水煮七日七夜當如魚目沸水耗即以熱水添之時以鑯匙攪七日滿即喫乾仍以微火燻隂氣盡即入盒子中固之泥法用砂盆末白堊土鹽花搗為泥固濟乾了入灰池內埋盒子兩邉以五兩火飬六七日日夜長令不絶日滿以大火十斤煆一日任火自銷冷了以甘草湯浸一日出火毒已鮮紫色候乾細研為末以粳米飯和丸如黍米大每日空心以溫酒下七丸漸加至十丸經旬日效紫靈丹治一切冷氣消食破女子宿血冷病神效硫黃八兩船上者細研白鹽花三斤一斤半白用一斤半以米醋三升拌日暴乾之右用一鼎子先築白鹽令實中心剜作坑子入硫黃末即以米醋拌鹽蓋之亦實築又以白鹽蓋之密密固子以文火飬之從旦至午候漸加火燒至有塊熖出小帚子醮醋灑之熖住即止放冷取出用水研飛過鹽藥在盆底乾了又細研以粟米飯和丸如菉豆大每日空心以溫酒下五丸其鹽水煎化喫甚好四壁匱硃砂法能除風冷溫暖骨髓悅澤顔色久服無疾延年益壽針砂一斤硫黃四兩硃砂三兩白礬四兩鹽右以濃醋一斗五升煮針砂硫黃二味令乾以火煆之待塊煙出盡後放冷再研别入硫黃二兩又以醋一斗五升更煮候乾依前煆之鬼焰盡即止放冷以水淘取紫汁去其針砂澄紫汁極清去其清水盡隂即入白礬鹽同研安瓷器中四面下火煆之候瓶內沸定即止待冷取出細研以醋拌為匱先用藥一半入鉛桶中築實即以金薄兩重硃砂入匱上又以餘匱蓋之築實以四兩火飬三七日即換入銅桶中密固濟用六兩火飬三七日足即用十斤火煆之任火自銷寒爐出藥硃砂已伏於濕地薄攤盆盒一時復出火毒細研以棗肉和丸如麻子大每日空心以溫水下五粒以鉛作桶可重二斤以銅作桶可重三斤忌羊血太陽紫粉丹治男子久冷婦人血氣冷勞五膈氣反胃㾀癖一切冷病無差者硫黃馬牙消水銀各三兩右以無灰酒旋點於乳鉢中同研候水銀星盡即止日中乾之布於鐺內瓷碗合之以鹽泥如法固濟候乾鐺下漸漸以三四兩火飬半日漸加至八九兩火經一復時待冷取藥細研以白蜜拌令濕於竹筒中盛糯米飯蒸一炊久出之更細研以棗肉和丸如梧桐子大每日空心以鹽湯或酒下三丸久冷人加至五丸服青花丹治霍亂吐脹冷氣心痛腸風血氣虛冷病小兒疳瘡神效空青定粉白石脂硃砂桃花石各一兩鹽花四兩右同研如麵入瓷瓶中以鹽蓋之固濟候乾了以一斤二斤火於瓶子四面逼之候熱四面著一稱火漸漸煆一食久任火自銷候冷開出取水飛去鹽味晒乾更入麝香一分同細研令勻以爛飯和丸如麻子大每日空心以溫酒下五丸忌羊血太陽流珠丹治一切風冷風氣癥瘕結塊女人血氣赤白帶下腸風下血多年氣痢痃癖常吐清水反胃吐逆神效硫黃一斤馬牙硝四兩鹽花四兩炒令轉色硼砂二兩伏火者右同研如麵入瓷瓶內按實上更以炒鹽蓋之出隂氣如法固濟將入一鼎下先鎔鉛半斤磹藥瓶子以鐵索括定又銷鉛注入鼎令沒瓶子固濟了入炭爐中以火飬鉛常以熱為候如此一百日滿出鼎别以小火飬三日日滿大火煆令似赤即止於冷取出如琥珀以寒泉出火毒細研為末以棗肉和丸如菉豆大每日空心以茶下二丸四靈丹悅顔補益黃丹水銀鋼鐵銼末硼砂已上各三兩右研入瓷盒中固濟令乾安於炭爐中合上灰厚三寸常以一斤火飬一百日日足以十斤火煆任火自銷放冷取出細研以濃甘草湯拌於飯上蒸一炊久出火毒細研為末以水浸蒸餅和丸如梧桐子大每服空心以溫酒送下三丸百日見效四靈丹治筋骨風角弓風腎臟風熱毒風皮膚風大風感厥風並皆治之其功如神硼砂三兩水銀一兩硃砂一兩硫黃二兩右將硼砂硫黃同研如麵於瓷盒中盛之如法固濟令乾入灰爐中其上灰厚三寸以火三兩飬一七日開取藥入水銀硃砂各一分同研以水銀星盡為度依前入盒飬一七日如此四度計二十八日開取細研以水飛過入竹筒中密封頭於飯上蒸兩炊久及熱取出於地上以紙襯盆盒一周時出火毒用粟米飯和丸如菉豆大每日空心以溫酒下三丸十日後加至五丸忌羊血伏火玄石匱靈砂丹補益筋骨悅顔色治女人風冷暖子宫久服不老延年硃砂三兩細研紙褁磁石一斤半搗碎細研淘去赤汁盡右以石腦油十二兩拌磁石令調和先固濟一瓷瓶子令乾入磁石一半於瓶內築實中心剜作一坑子可容得硃砂褁紙入匱子上以餘藥蓋之築令實瓶口以瓦子蓋勿固之以小火逼隂氣盡候瓶子通熱即聚火一稱已來煆之令上下通赤任火自銷待冷開取砂已伏矣去紙灰取砂細研如麵以生薑汁稀調之安於茶碗中飯上蒸三炊久晒乾研如粉以棗肉和丸如小豆大每日空心以溫酒下三丸忌羊血玄英散祛風熱利三焦耐寒暑悅顔色久服去萬病川朴硝五斤以瓶燒令通赤細研如粉淡竹瀝一升右將竹瀝拌硝令勻濕用大竹筒一枚先以牡礪粉半斤築入筒中次下硝又以牡礪粉半斤築之以蠟紙三重封之勿令通氣安在甑中四面以黑豆埋之令沒筒口蒸一復時待冷去豆開筒去牡礪粉取硝細研如粉每日食後水調一錢服之服至二三斤漸耐寒暑少汗服至五七斤悅顔色去萬病夏月可以衣裘冬月可以履氷雪無懼矣金液含化靈丹補益延年功力不可具載山澤根末八兩硃砂二兩五錢右先鋪銀末一兩於瓷盒中即排硃砂塊子勿令相著上以銀末蓋之令勻又布硃砂塊子又以銀末蓋之候硃砂盡即以鹽花蓋上令滿盒子口實按如法固濟入灰池中盒子上灰厚四寸常以二兩火養七日七夜勿令火猛但令盒子熱可通人手為度日滿取出重翻過排一依前法重固齊以火四兩飬二十日後加火至二三斤燒可一炊久放冷極冷取出細研入龍腦半分同研如粉以構汁和丸如粟米大每日空心含三丸津液咽之如要作油以桂心末一錢大羊腎膒脂煉成者彈子大入龍腦一錢和研兩日久入銀盒子中埋於粳甑中蒸三伏時當自化為油每日含如豇豆大去疾補益延年却老神仙之基也忌羊血含化硃砂丹祛熱毒風鎮心神治萬病反老悅顔功力甚大不可具述硃砂三兩馬牙硝三兩消石三兩右同研如粉入瓷瓶中以重抄油紙三重密固瓶口重湯煮之常如魚眼沸水耗即以熱水添之不歇火三七日夜滿開瓶子其硝自在瓶四面收之細研任服其硃砂即在中心取出細研以小瓷盒子盛固濟微火飬一日加火一斤煆令通赤放冷開取細研以棗肉和每一兩砂可丸得三百六十丸每日早晨含化一丸如要多含俱依分兩酌度修煉為丸婦人服之亦佳忌羊血金液丹治臟腑積冷腰腳疼痛四肢虛羸下元衰憊磁石半斤硫黃三兩右以童子小便一斗燒磁石赤於小便中淬以盡為度候乾入硫黃同研令細却入瓶中以六一泥固濟隂乾坐於灰地中常以火半斤飬一七日滿即更常用火五斤燒一七日足放冷出之以熱絹包褁納於井底一復時出火毒候乾研為末用蒸餅和丸如麻子大每日空心以溫酒下七丸神效無比紫霞丹補暖臟腑添益精髓延年駐顔祛風逐冷治痔漏瘰癧筋骨疼痛婦人服之益子宫神妙消石水銀雄黃硃砂硫黃與水銀炒作砂子各一兩金箔一百片右同研令勻取一瓷瓶鹽泥固濟待乾入藥於瓶內瓶蓋鑽一小竅如半錢孔大蓋瓶口訖仍納煻灰中煨之不得便令火大恐藥飛走專候竅中隂氣盡以泥鹽固塞其竅以火半斤飬三日滿即用火一斤燒一七日候冷取出於土坑中出火毒三日後細研以棗肉和丸如麻子大每服空心以酒下三丸神效忌羊血元石紫府丹出聖惠方補暖下元強筋骨聰耳明目保神益氣祛風利腰腳用磁石三斤好者以炭火燒令赤投一斗米醋中淬之以醋盡為度更燒投一斗好酒以酒盡為度有拆破者一一收之細研以水飛過候乾入瓶中以大火煆令通赤用鹽花三兩同研令勻於地上鋪紙攤勻以盆蓋三日出火毒以蒸餅和丸如梧桐子大每日空心以鹽湯或酒送下七丸漸加至十丸隂伏紫霞丹出聖惠方治男子婦人久積冷氣腸風痢疾臍腹疼痛顔色痿黃不思飲食硫黃四兩研鹽花一斤右先布鹽花半斤於平底鐺中次鋪硫黃末又以餘鹽蓋之濕紙固縫長令如魚眼沸七日七夜勿令絶水火耗即添湯時時開看攪之勿令粘著鐺底日滿喫乾入固濟瓶子內煆令通赤候冷以湯淋去鹽味取硫黃晒乾細研以棗肉和丸如梧桐子大每日空心以茶酒下五丸倚金丹出聖會方治風邪癲癎鬼疰心痛解百毒療惡瘡丹石發動消渴隂黃安心神止驚悸除頭面風止赤白帶下神效丹砂三兩水銀三兩黃丹一斤右同研令水銀星盡入瓷瓶中蓋口如法固濟初以入火養候熱徹即加火十斤煆令通赤半日又藥成候冷開取面上白色內如紫金色光明甚好便細研如麵以紙鋪地攤藥在上以盆蓋之出火毒一日後以粟飯和丸如菉豆大空心以溫水下三丸忌羊血黃庭丹出聖會方治男子婦人積冷氣塊破宿血止疼痛硫黃一兩硼砂二兩右同研如粉入瓷盒子內如法固濟候乾了入灰爐中以頂火四兩飬七日又於盒底著火四兩飬一日取出看硫黃在盒上硼砂在盒下依前研入盒又飬七日足又於盒底著火飬一日但看硫黃不上盒子即住火取出以黃蠟煮出火毒候蠟黑如漆去蠟以火焙乾重細研以粟米飯和凡如麻子大每日空心以酒或醋湯下三丸保神丹出聖會方鎮心神治鬼魅驚邪心狂妄語夜多魘夢精神恍惚小兒驚啼心臟壅熱服之必效金薄二百片膩粉五錢右以新小鐺子中先布金箔一重糝膩粉又鋪金箔膩粉如此重重鋪了用牛乳可鐺子多少浸之以漫火煎至乳盡金箔如泥即成便以火上逼乾研之更入硃砂半兩麝香一分同研令細以水浸蒸餅和丸如菉豆大每日空心以新汲水下一二丸安魂定魄丹出聖會方治驚邪癲癎天行熱病心神狂亂無不應驗黑鉛二兩水銀硫黃細研各一兩右先銷鉛成水次下水銀攪令勻良久即下硫黃末當為碧色攪勻即去火放冷細研如粉以軟飯和丸如菉豆大每服以新汲水研七丸服之返魂丹出聖惠方治卒中風不語及中惡迷悶安心神去風熱神效生玳瑁硃砂雄黃白芥子已上各一兩右搗羅為末同研如麵以安息香一兩細銼以酒下一升熬成膏和丸如菉豆大每服以溫酒下三丸其藥端午日合之神效忌羊血護命丹出聖惠方治男子冷氣婦人血氣腸風下血及赤白痢並宜服之白礬黃丹寒水石各三兩右同研細入固濟了瓷瓶中以醋滿瓶淨以文火熬令乾便加火煆令滿赤候冷開取入硫黃一兩同研入瓶更煆令赤於潤地上盆合之三日三夜出火毒研為末以水浸蒸餅和丸如菉豆大每日空心以酒下十丸栁黃丹出聖惠方治男子三焦壅熱煩渴不止鎮心神治腳氣乳石發動狂躁不徹栁絮礬一兩鉛霜一兩右同研令細以棗肉和丸如梧桐子大每服以金銀湯下五丸若行路走馬熱渴不徹即含化七丸或常含一丸便不患渴極妙勝金丹出聖惠方治風邪驚癎心神迷亂毒風氣鬼疰心痛男子婦人並宜服之雌黃二兩葉子者炒令紫色細研如粉黃丹一兩炒令紫色右以人乳拌勻濕飯甑上蒸一炊久以乳腐和丸如菉豆大每服以金銀湯下三丸當㵼出病根若病多年每日空心服三丸至五丸神效黃英丹治男子婦人久患心腹痛不可忍宜服硫黃粉砒霜以醋一升煎令醋乾蜜陀僧燒令通赤乳頭香别研人糞霜燒灰淋取汁熬成霜各一兩右除乳香外同研如粉以多年米醋半升煎乳香令消入寒食蒸餅末同研如膏後入諸藥和丸如梧桐子大每服酒下一丸但是心痛須臾即定如是多年心痛不差每日空心服一丸服至三十丸一生不再發神效伏火四神玉粉丹治一切冷病補益下元兼治諸瘧痢功力難述亦名白金丹握雪礬石寒水石陽起石各一兩砒霜一分右各研為末先取一油瓶子以六一泥固濟可厚三分已來待乾先下礬石充底次下砒霜次下陽起石上以寒水石蓋之其瓶口磨一磚蓋之以六一泥固縫於灰池內安磚安藥瓶子初以文武後漸煆令通赤住火候冷取出研令極細於潤地鋪熟絹上攤藥可厚半寸以盆合定周圍用濕紙不令透氣一炊時取出少待出隂氣細研以麵糊丸如菉豆大每日空心以鹽湯下五丸如患瘧痢以新水下神效紫精丹治男子婦人一切風及積冷氣暖臍腹止疼痛硫黃三兩細研如麵粗即不伏火色針砂四兩用葛布篩羅去塵取細者用右與硫黃同研令勻用湯二升拌之候冷便去其水入固濟瓶中初用文火飬令熱徹次用大火煆令通赤候冷又細研用熱水淘取濃者不取在下著底者如是飛十遍已來澄濾得盡棄却針砂然後用重抄紙於灰上鋪喫乾已無火毒用水浸蒸餅和丸如菉豆大每日空心茶酒送下五丸碧珠丹治臟腑積冷腸風痔疾一切㵼痢立效青礬半斤硫黃二兩右以醋一斗二升於鍋中煮待乾取出入瓷瓶中蓋頭以六一泥固濟候乾以火五斤煆一復時寒泉出毒了細研以麵糊和丸如麻子大每日空腹以柏子仁湯下十丸還元丹補益下元治虛冷氣砒霜五兩硝石五兩白礬五兩硫黃二兩右各細研先固濟瓷子一所候泥乾掘地坑深一尺納入灰坐瓶子在其間先下硫黃平攤次安硝石砒霜白礬别取羅了石灰填滿瓶子令實以物蓋瓶口便聚炭約二十斤上安熟火三五兩漸漸燒令通赤任火自銷候冷取出以絹褁懸在井中一宿出火毒細研以水浸蒸餅和丸如粟米大每服空心以溫酒下三丸小三生丹暖下元益精氣黑髭鬢悅顔色硃砂細研水銀細研硫黃細研各二兩生鐵十五斤磨洗了以大火燒赤投五斗漿水中二三十遍右取平底鐺一口以前三味用淬漿水煮之三七日常令如魚眼沸水耗即暖漿水添之日滿桃取少許於火試之如有鬼熖又煎之以無熖為度喫乾却入瓶中按實以燒蓋如法固濟用火半斤飬七日滿以火五斤煆令通赤待冷破瓶取之投湯盆中淘去藥味澄取藥晒乾細研如粉以甘草餘甘子煮半日出火毒又研以蛤粉糊和丸如麻子大每日空心以溫酒下七丸忌羊血碧玉丹止一切疼痛一名應病丹硫黃四兩水銀一兩雄黃一兩硝石四兩古字錢一百五十文足百燒令通赤于醋中淬之垢淨即止右一處細研令水銀星斷用一箇固濟了瓷瓶子入錢一重藥一重遍令盡以瓦塞瓶口以鹽泥固之候乾以文武火逼去隂氣常用火半斤燒一復時候更用三斤火燒半日放冷取之其藥如碧玉色研為末以熟夾絹裹于土坑中焙一復時出火毒以粟米飯和丸如麻子大但有疼痛處以溫酒下五丸不過三服見效玉液丹治男子元氣婦人血氣久積虛冷臍腹疼痛並宜服之用硼砂二兩細研以好紙一張褁却硼砂以線緊繫定用瓷罐子一枚可盛一升物者先下黃丹五六兩便安硼砂褁在中間又以黃丹五六兩蓋之後以瓦子蓋瓶口于瓦桶內磚上坐之用粗穀粳三斗蓋之上用火燒一日任火自銷候冷取出去却黃丹細研以麵糊和丸如菉豆大每服空心以鹽湯下五丸曾青丹出聖惠方治癲癎驚風壓熱鎮心曽青四兩黃丹一兩白錫二兩右研曽青黃丹安於乾鍋內上以白錫為屑蓋之後入爐以火五斤燒之候錫鎔即取出放冷細研以白粱米飯和丸如菉豆大空心以冷水下五丸神硃丹出聖惠方暖臟腑止疼痛甚妙雄黃一兩研古字錢四兩右燒古字錢令淨搗羅為末於瓶中布錢末一半次布雄黃上以餘錢末蓋之固濟了候乾文火飬七日滿即開取細研用棗肉和丸如梧桐子大每服以溫酒下五丸銅粉丹出聖惠方壯腰固精髓益顔色耐寒暑熟銅屑四兩硃砂二兩硝石一兩硫黃二兩右硃砂硝石硫黃三味同研為末取一銅桶子內布銅屑一重安藥一重如此重重布盡六一泥固濟待乾即入灰池內以火四兩飬一復時後以大火燒令通赤候冷取出於濕地上一復時去火毒研為末以粟米飯和丸如菉豆大每服空腹以溫酒下七丸忌羊血白雪丹出聖惠方用白礬五兩上好者搗羅為末於銀鍋中以真牛乳五升和白礬煎令如雪以寒食蒸餅末旋下於鍋中攪令勻可丸如梧桐子大每服空心以粥飲下十五丸功力不可偹述神符玉粉丹出聖惠方久服延年駐顔萬病皆去水銀二兩黑鉛一斤右於新鐵鐺中銷鉛成水以白礬末二錢入小筒內當鐺中心下之看沸定即以小竹管盛水銀投入鐺中送令到白礬上以火飬鉛常令成汁候之五日後必有物出向鉛面上如金蟻子即以物收之候盡即止稱如兩數研為末入硫黃等分結成砂子即以物收之更研如粉入瓶密固濟候乾常以火四兩灰厚三寸飬至六十日滿開依前法取出細研入瓶更飬六十日看紫色即更固濟以火煆令通赤待冷取出以濃甘草湯沃之候乾細研如粉以飯和丸如菉豆大每日空心送下一丸若飬至一年火力與小還丹同矣華蓋丹出聖惠方變髭髮能延壽去熱毒風神效無比用黑鉛五斤鑄如方響片子以鐵筋穿作竅以繩穿之用淨磁甕盛米醋一斗將鉛片子懸排于甕口可離醋一寸以來以紙密封甕口每七日一度開取鉛片子出于淨紙上以箆子輕手掠取霜但七日一度取經五七度後即小力不堪也即别取新鉛為之每一兩霜入龍腦半分同研如粉以露水和如梧桐子大每夜含一丸便卧勿語任丸自銷此丹能變白髭髮如先不曽白者常隔日含之一生不白如已白者含此丹至二十丸後拔却白者即黑自生不逾六十丸至一百丸盡如黳色久含延壽一生忌蒜上洞小丹出楊氏家藏方治諸虛百損真陽虛憊形體羸弱臟腑虛弱臍腹久疼及婦人子宫宿寒赤白帶下盜汗心怯精神憔悴服他藥不能見效者宜服此丹辰砂一斤用絹帛包褁黃蘖一兩銼蜜八兩右三味一處用重湯同煮七復時取出辰砂控乾後用羊蹄根車前草二味等分搗細用砂盒一枚入二味藥鋪底入辰砂在內又以二味藥蓋頭滿築以盒蓋子合定鐵線扎縳赤石脂固縫鹽泥固濟令乾以炭二稱周圍簇定發頂火煆一復時火冷取出火毒研令極細用糯米粥和丸如雞頭肉大每服一粒米湯送下空心食前小靈丹出楊氏家藏方治真元虛損精髓耗憊本氣不足面黑耳鳴腰膝沉重膀胱疝瘕手足麻痺筋骨拘攣心腹疼痛冷積瀉痢腸風痔漏八風五痺頭目昏眩飲食不進精神恍惚疲倦多睡漸成勞疾婦人胎藏久冷絶孕無子赤白帶下月經不調風冷血氣並皆治之常服助飬真元補暖丹田活血悅顔健骨輕身代赭石赤石脂紫石英禹餘糧已上四味各四兩各火煆赤入米醋中淬各七遍同研為細末入一砂盒內合了外用鹽泥固濟日中晒乾用炭二十斤頂火一煆以炭火盡為度取出藥盒於辰地上掘坑埋一復時取出研三日令極細次入後藥乳香另研沒藥另研五靈脂研細已上三味各二兩右同前四味一處研令極勻水煮糯米餅和得所入鐵臼中搗一千丸如雞頭肉大隂乾每服一粒溫酒或新汲水送下空心服孕婦不可服雙白丹出楊氏家藏方治脾胃積寒隂陽虛弱吐痢不止及痢下血並皆治之陽起石一分搗碎白石脂一分另研白礬半兩砒半兩二味同研為末右用沙盒一枚入陽起石鋪遍盒底次入白礬砒後入白石脂蓋頭用鹽泥固濟候乾以炭火五斤煆令通赤候火盡入地坑內埋一宿取出同胡粉細研煮糯米粉糊丸如麻子大每服一粒霍亂吐㵼倒流水下赤白痢冷米飲下忌食熱物一時辰玉繡毬丹出楊氏家藏方治男子婦人一切虛冷氣血虧損筋骨羸瘦漸成勞疾及大病方安氣血未復飲食過傷臟腑虛滑或腹痛暴下全不思食嘔逆酸水腹脅脹滿夜多虛汗及婦人赤白帶下久無子息並皆服之砒一兩取益母草燒灰一兩獨掃燒灰一兩同砒研勻米醋和成一塊候乾放新瓦上用熟炭火五斤煆令通紅以扇急搧盡去灰其砒白成一塊如玉繡毬樣研令細白礬一兩火煆成汁候煆枯淨稱一兩研如粉鍾乳粉一兩右同研令極勻煮糯米厚粥為丸如雞頭肉大每服一粒空心新汲水送下忌食豬羊血久煉大素丹出楊氏家藏方治男子婦人一切虛損夜夢紛紜遺精失溺大便滑泄久痢肌瘦及婦人子宮久寒赤白帶下並宜服之礜石鹽泥固濟大火煆十日十夜放冷用陽起石入乾鍋子內煆令通紅放冷用寒水石入乾鍋子內煆令通紅放冷用礬石飛過成灰用右各等分一處同研極細如粉入白石脂細末少許滴水為丸丸時就口以氣吹之如雞頭肉大候乾入乾鍋子內以瓦蓋口一日燒令通赤取出傾在建盞內放冷每服一粒溫酒或米飲送下空心服玉霜丹出楊氏家藏方治男子虛冷婦人帶下及一切㵼痢之疾砒一兩熖硝五錢已上二味同研細以濃墨汁塗紙候乾褁作十褁先用熱炭火三斤燒新乾鍋子令紅先下一褁藥候煙盡再下一褁如此下十褁藥盡看鍋內其信砒煉如汁即傾出碟內候冷研細再用寒水石一兩火煆過候冷研細白石脂一兩研細右四味同研勻水和丸如雞頭肉大日中晒極乾再入乾鍋內上用圓瓦蓋口以炭五斤煆通紅為度傾出碟內如玉色候冷磁盒收之每服一粒或二粒虛冷吐㵼腹痛下痢赤白米湯送下婦人子宫久冷赤白帶下腹脅撮痛冷醋湯送下空心服洞陽金丹出十便良方治真陽不足五臟氣冷常服飬精神安魂魄通血脈止渴久服輕身延年令人不懼寒暑除去萬病硃砂五兩一方用枸把葉二十片初采得時兩日掌之觀其日呪之七遍呪曰我要服你與我們念呪取日氣一口噴在葉上如此七遍可用右用沙盒子一箇於底內鋪枸杞根皮末一錢又注蜜五錢蜜上鋪金箔五片方入硃砂上又蓋金箔上又注蜜五錢蜜上蓋枸把根皮末三錢許多亦不妨按令實蜜和赤石脂末固盒子縫務要嚴密次用鹽紙泥固濟盒子一指厚放乾置平地上用醋拌細灰擁合拍作塜子用炭一稱簇起發頂火煆之候火盡經宿取出盒去泥開盒其硃砂如鐵色又黃土內埋一宿出火毒研令極細用棗肉或糯米煮糊和丸每兩作四十粒隂乾每服一二粒至三粒空心熱水下椒丹出十便良方眉州青神縣王家纍世服食方暖水臟降氣明目補骨髓保長壽命右辰砂一兩細研如塵椒揀大粒帶紅色去枝梗并合口者不用稱一兩五錢以生絹袋盛用無灰淳濃酒浸椒袋令酒在上二三分以來一宿取出空少時入硃砂鉢內掍之令勻餘者滴浸椒酒少許又掍之令硃砂盡為度日曝乾每服五十丸加至百丸不得用火焙不可犯生水此藥可久服王倪丹砂出御藥院方無所不主大補心益精血愈痿疾壯筋骨久服不死王倪者丞相遵十二代孫文明九年為滄州無棣令有一人善相見倪曰公死明年正月乙卯我有藥可以不死也能從我乎倪再拜稱幸乃出煉丹砂法餌之開元元年倪妻之弟亦遇異人授以杏丹法曰吾聞王倪能煉丹砂願以此易之倪以杏丹賜其子辨而倪與授杏丹者後皆仙矣刺史李休光表賜問其弟為道觀煉丹砂法丹砂二十八兩甘草逺志去心檳榔訶梨勒皮各一兩桂去粗皮搗碎八兩右甘草等四味銼末以水二斗盛釡中以細布囊盛丹砂垂于釡中著水和藥炭火煮之第一日兼夜用隂火水絞動第二日兼夜用陽火魚眼沸第三日兼夜用木火動花沫沸第四日兼夜用大火汨汨沸第五日兼夜用土火微沸第六日兼夜用金火乍緩乍急第七日兼夜用水火緩緩調沸先其泥二釡一釡常暖水用添煮藥釡水涸即添暖水常令不減二斗七日滿取出丹砂于銀盆中盛其盒中先布桂肉一兩拍碎即令布丹砂又以餘桂一兩覆之即不合置甑中先布糯米厚三寸乃置盒又以糯米覆焙上亦令米厚三寸許桑薪火蒸之每五日換米桂其甑蔽可換竹子為之不爾蒸多甑墮下釡中也甑下側開一小孔常暖水用一小竹子注添釡中勿令水減第一五日用春火如常炊飯兼夜第二五日兼夜用夏火猛于炊飯第三五日用秋火以炊飰乍緩乍急兼夜第四五日用冬火兼夜火暖如炊飰依五行相生用文武助之藥成即出丹砂以玉椎用力鉢中研之當膩如麵即可服加以楮實煎丸如梧桐子大每日食前服一丸每日三食計服三丸煉成丹砂二十兩為劑二年服盡後每十年即煉服三兩仍取正月一日起服一月使盡既須每十年二兩不可旋合宜須預煉取一劑藏貯隨時服之其丹砂上等刀圭煉時宜齋戒毋令婦女雞犬見造楮實煎法六月六日收取楮實熟者絞取汁于銀器用慢火熬成膏合和前末藥孫用和捷法王倪丹砂上等辰砂十兩甘草訶子檳榔逺志各二兩右先銼草藥如豆大以水一斗煎藥取汁六升去滓絹袋盛砂浸於藥汁中以重湯微火煮令乾即取硃砂入銀盒中置甑內以糯米二斗鋪蓋上用桑柴三日夜如春時製藥一日文火二日武火三日盛武火三宿微火夏時製藥一日武火二日文火三日盛武火三宿微火秋時製藥一日盛武火二日文火三日大火三宿微武火冬時製藥一日微火二日文火三日盛武火三宿微武火如此三日滿取砂研如粉以楮實煎丸如梧桐子大每日空心酒下一丸食後漿水下一丸蒸時以桂末四兩鋪蓋飛靈丹調榮衛暖臟腑去頭風壯下部竒效不可具述辰砂一兩上等水磨雄黃一兩右二味滚研細用一白垍盒子先以牡丹皮燒煙熏盒子黑色光厚入前藥按令平實以白附子末