地黃三分白茯苓半兩人參一兩去蘆頭麥門冬半兩去心焙蛤蚧一隻頭尾全塗酥炙令黃側柏葉一兩塗酥炙令黃右為散每服不計時候以粥飲調下一錢犀角飲治肺痿咳嗽氣喘喉中有血犀角鎊竹茹各一兩桔梗炒柴胡去苗黃芩去黑心兩半生天門冬去心朴硝右㕮咀每服五錢水二盞煎至一盞去滓下朴硝少許溫服治肺破出血忽嗽血不止者用海犀一大片於火上炙令焦黃色後以膠塗之又炙再塗令通透可碾為末用湯化三大錢七放冷服之即血止水膠是也大驗地黃湯治虛寒肺痿喘氣熟乾地黃芎藭各五兩桂去粗皮人參各三兩大麻仁一升炒研為末桑根白皮銼炒二升右除麻仁外並細銼每服五錢水二盞煎至一盞去滓入麻仁少許更煎數沸溫服日三杏仁煎治肺痿久嗽杏仁去皮尖雙仁炒黃研阿膠炙燥各半兩栝蔞一兩銼人參一兩貝母去心焙丹砂各一分研右為末入瓷器中同白餳三兩熬成煎每服皂子大食後夜卧時含化鹿髓煎治傷中脈絶筋急肺痿咳嗽鹿髓半升蜜酥各一兩生地黃取汁五合杏仁桃仁各三兩湯浸去皮尖雙仁炒搗碎酒一升濾去汁右先煎桃仁杏仁地黃汁減半次下鹿髓酥蜜煎如稀餳每服一匙頭徐徐咽服空心食前日三桂枝皂莢湯出千金方治肺痿吐涎沫不止桂枝生薑各三兩甘草二兩皂莢一兩大棗十五枚右㕮咀以水七升煮取三升去滓分三服人參散治身熱頭痛積熱黃瘦肌熱惡寒畜熱發戰膈熱嘔吐煩渴濕熱㵼利或目赤口瘡咽喉腫痛或風昏眩虛汗肺痿勞嗽石膏甘草各一兩滑石四兩寒水石二兩人參半兩右為末每服三錢溫水調下早晚食後兼服梔子金花丸溫中生薑湯出千金方治肺虛寒羸瘦緩弱戰掉虛吸胸滿肺痿生薑一片桂心橘皮四兩甘草麻黃右㕮咀以水一斗煮取二升半分三服先煎麻黃沸去滓然後入諸藥合煮半夏肺痿湯療虛寒喘鳴多飲逆氣嘔吐半夏一升湯浸四次母薑一斤橘皮一斤白术半斤桂心四兩右切以水九升煮取三升去滓分溫三服忌羊肉餳桃李雀肉生蔥一方有桑白皮切一升四聖散治咳嗽有血晉鹽槐花子乾葛山梔子仁右為末每服二錢加烏梅甘草少許同煎水一盞煎至七分食後服炙肝散治咳嗽血不止瓜蔞不去皮用穰瓦上焙乾烏梅大者五箇去核同煎藥焙杏仁二十枚去皮尖熬炒别研右為末每一捻豬肝一片切開入藥在肝內火上炙熟放冷嚼津液吞下食後及臨夜服上紅散治心肺客熱咳嗽吐血北柴胡去蘆一兩胡黃連宣連各半兩右為末入生硃砂少許研勻每服三錢水一盞煎至半盞服阿膠散治肺損嘔血開胃阿膠三箇好者炒木香二錢糯米一合半右為末每服一錢百沸湯點不拘時雄黃欵冬花散治肺痿喘嗽痰涎壅盛欵冬花半兩佛耳草半兩明雄黃一錢研右以碗內停灰火上礫藥煙薰紙蓋碗口留眼吸煙咽了頻嗅吸藥煙其嗽即止桔梗散出聖惠方治肺痿咳嗽胸中滿而振寒脈數乾或渴時出唾又吐膿如米粥者桔梗三兩去蘆頭甘草炙一兩微赤炒赤茯苓二兩右為散每服三錢以水一中盞煎至六分去滓不計時候溫服人參甘草湯出千金方治肺痿咳唾涎沫不止咽燥而渴人參一兩甘草炙一兩三錢右為銼散每服四錢水一盞半薑五片棗五箇煎至七分去滓溫服如聖湯一名桔梗湯出千金方咳而胸滿振寒脈數滑咽乾不渴時出涎唾腥臭久久吐膿若粥者為肺癰桔梗一兩甘草炙二兩右為銼散每服四錢水一盞煎七分去滓不以時服兼治喉痺咽痛或咽中生瘡唾有膿血加薏米知母煎一方有欵冬花一兩半防己散出仁存方治肺痿咯血多痰漢防己黃葶藶右各等分為末每服二錢糯米飲調服食後甘草乾薑湯出千金方溫臟治肺痿多涎唾小便數肺中冷必眩不渴不嗽必遺溺若渴者屬消渴法上虛下不能利溲服此湯宜小溫服之甘草四兩乾薑二兩集驗方內有大棗十二枚右㕮咀以水三升煮取一升半去滓分三服補肺散治肺痿勞傷吐血黃明膠炙燥二兩花桑葉陰乾二兩右為細散每服三錢用生地黃汁調糯米飲亦得甘草湯治肺痿涎唾多出血心中溫溫液液一名溫液湯用甘草二兩以水三升煮取一升半去滓分三服綿膠散治肺損吐血新綿燒灰研黃明膠炙燥搗末右等分研勻每服一錢臨卧糯米飲調下治肺痿喘嗽用漢防己為末每服三錢漿水一盞同煎至七分和滓溫服治療肺痿時時寒熱兩頰赤氣急亦治久嗽涕唾多骨節寒熱用童子小便每日晚取之去初沫少許小便可用五合取上好甘草量病人中指節男左女右長短截之炙令熱破作四片內小便中置於間淨處露一宿器上橫一小刀明日早旦去甘草頓服之每日一劑其童子勿令喫五辛忌海藻菘菜熱麵一方用甘草末一錢小便三合攪令散服治口中血腥吐紅咳嗽用熟地黃乾嚼酒下又為末酒調下治一切肺疾咳嗽膿血不止用豬胰一具削薄竹筒盛於粳火中炮令極熟食後喫之皂莢散治肺痿吐涎沫皂莢半兩去黑皮塗酥炙令焦黃去子桂心一兩甘草一兩半炙微赤銼右為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候服蛤蚧散治患肺痿咳嗽及肺壅嗽蛤蚧一對新好者用湯洗十遍漫火炙令香研為細末人參茯苓去皮知母貝母各炙過湯洗桑白皮以上各二兩大杏仁六兩湯浸去皮尖爛煮令香取出研甘草五兩炙右件八味同為細末入杏仁勻拌却粗羅再篩過唯細為妙每服半錢入生薑二片酥少許水八分煎熟服如以湯點之頻服亦妙四君子湯治肺頻而皮聚者毛落益氣可也白术人參黃耆茯苓右為粗末每服五錢至七錢水一盞煎至七分去滓食遠溫服治痰上氣氣急右用猯豬膏一合暖酒和服治肺痿吐血以鹿血和酒服之良治肺痿咳嗽鬼氣痓病取溺久停臭者佳恐冷當以熱物和溫服之治肺疾唾膿血取薏苡仁十兩杵碎以水三升煎取一升入酒少許服之治肺疾咳嗽以蘿蔔子半升淘澤洗焙乾於銚子內炒令黃熟為末以沙糖丸如彈綿裹含之治肺痿吐血用蘿蔔和羊肉鯽魚煮食之肺痿咽燥附論夫熱在上焦因咳為肺痿其脈則寸口數其證則咳而口中有嘔唾涎沫甚者咽中乾燥蓋以邪熱熏肺使然或因快藥下利重亡津液所致也方地黃湯治肺痿咽燥咳嗽吐膿血胸脅脹滿短氣羸不思飲食一名生乾地黃散生乾地黃切焙赤茯苓去黑皮柴胡去苗各一兩射干甘草炙銼麥門冬去心焙各半兩紫苑去苗土半夏湯洗七次麻黃去節黃芩去黑皮桑根白皮銼五味子各三分右搗篩每服三錢水一盞生薑一棗大棗二枚煎至七分去滓溫服不拘時候天門冬丸治肺痿咽乾煩燥痰壅咳嗽小便赤澀眠卧不安咽喉腫痛天門冬去心焙二兩甘草炙銼一兩人參三分杏仁湯浸去皮尖雙仁炒一兩貝母去心焙五味子阿膠炙令燥桑根白皮炙銼各半兩右為末煉蜜和丸如雞頭大每服一丸食後臨卧時溫人參湯嚼下含化咽液亦得地黃紫蘇煎治肺痿喘嗽涕唾稠粘咽膈不利生地黃切焙用三兩生薑二兩與地黃和研絞取汁生天門冬去心半箇生玄參一斤生麥門冬去心一斤杏仁去皮尖雙仁三兩研别入紫蘇子炒研二兩生牛蒡四兩細切與玄參至紫蘇子四味燥研以水少許拌勻布絞取汁右將兩等藥汁并杏仁和勻於銀石器中慢火煎令稍稠停火入白蜜五兩真酥二兩和勻於飲甑蒸少時候冷以淨器盛每服一小匙含化不拘時日三一方久服大益心肺滑潤肌膚補助榮衛忌生冷豬肉柴胡湯治肺痿久嗽不已四肢煩熱頰赤咽燥柴胡去苗竹茹桔梗紫苑去土貝母去心焙各二兩訶黎勒皮一兩知母炒二兩右㕮咀如麻豆大每服五錢水一盞生地黃汁半盞烏梅一箇煎至八分去滓溫服日再夜一天門冬煎治肺痿咳嗽吐涎沫咽燥而渴者生天門冬去心搗汁取醇酒各一升紫苑去土為末四兩餳糖右同入銀石器中重湯煎候可丸即丸杏仁大每服一丸咽津含化日三五服普濟方卷二十七
