body:
  text: 普濟方卷二百七十一明周王朱橚撰符禁門共産乳諸疾法附論夫乳婦所居就吉而避凶會福而禳禍質諸鬼神以替生育之道者呪禁之力為多也呪毋之既産邪氣易得以乘之則祛邪輔正之術為不可緩是以設席貯水乳難血暈之法始終具存凡以性命所繫不可不慎也法臨産禁草法鋪草及氊席訖即呪曰鐵鐵湯湯非公所當是王一言得之鐵母子相生俱蔑鐵急急如律令欲産時貯水呪曰太上真一水水在井中為井水水在器中為淨水水在法中為法水自知非真莫當真水恃淨持濁以正治邪日遊月殺五土將軍青龍白虎朱雀玄武招搖天狗軒轅女妖天吞地吞懸戶閉肚六甲禁諱十二神王土何伏神各安所在不得動靜不得忌干若有動靜若有忌干頭殃七分身不安且阿法尼阿毗羅莫多梨娑地梨娑訶禁産難法先禁水一杯與服之乃禁曰天有隂陽地有五行星辰列布日月精明四時變化不失其常骨肉已成四體已強毛髮已就今星生辰生遲何望河伯在門司命在庭日月已滿何不早生若男若女司命滇汝促出無遲并持胞衣急急如律令治産乳諸法此一符出子母祕録每於産閣四角乃床四角貼之乃乳婦帶之命速産安胎甚驗一方入目貼之難産符丈隂陽所育生氣十月日滿不停若男若女上屬明星司命所催胞衣所生急急如律令欲産時書此文吞之呪禁産暈法取麻七瓣正月一日面向正東令婦人念之一遍夫亦誦一遍次第文夫吞麻子七枚便上丈夫正面向東行誦七遍不得見穢汙受持之法不可見尸喪見即無驗吾攝天剛遊九州聞汝産難故來救汝斬殺不祥衆喜投母子長生相見面見不得久停留急急如律令唾運鬼法丈夫從婦人口中受取婦人從丈夫口中受取天無梁地無柱五騎三龍使九虎押運略汝身長少許或在人心肝或在人肺或在人心膂五收東海王禁故來追捉汝急急如律令禁運鬼法先禹步三匝左手持刀右手持水怒目急氣然後禁之噴之曰唾東方青運鬼字青短年七十南方赤運鬼字赤短年六十西方白運鬼字白短年五十北方黑運鬼字黑短年四十中央黃運鬼字黃姬年四十唾天皇地皇六律九章是公運子之鬼未嫁之女頭亂如筐腹脹如莒剋害忠良唾如急出不得留藏汝若不去吾遣張丞相捉汝縛汝付鑊湯急急如律令一法催生靈符治一切産難橫逆者於端午日以靈水或雨水飛好朱砂至誠書龍字勿令筆書連接毒臨産即時施丸一字以溫水吞下隨男左女右持符出是驗然須直候腰作陳痛上草欲産時方服不可太早甲月遇甲日亦不書催生靈符九天大刀魔軍速降虛攝天生急急如律令敕右用硃砂研令極細以新汲水濃調勻將新筆蘸朱砂清晨裝食至誠念九天大刀魔軍速降威靈攝天生急急如律令敕念至生乃即寫生字却於生字下面一割下右繞一匝念急急如律令敕須是隨筆一句念令呪俱終候乾剪下摺作一團子用黃蠟匱之以朱砂為衣每服一丸濃煎木香湯送下痛頻時服禁小兒夜啼法附論夫小兒藏挾冷氣過夜多啼名之夜啼以夜屬隂陽動於冷故也可以溫藥調和藏氣冷去啼止又有獨犯鬼邪及諸禁忌亦令夜啼此非獨藥調和石能治宜以法禳之法禁小兒夜啼法令兒毋脫上衣只著中衣跪宅四角呪曰西方白帝東方青帝南方赤帝北方黑帝中央黃帝乞斷某甲夜啼何恩之日奉還意酒隨下還法安五柈置中夜四角四柈中央一柈啓顙招五帝説奉之日今日奉還隨意祝願禁小兒夜啼符禁惡獸諸蟲附論夫彭祖辟蟲獸法曰入山當書龍字孫思邈禁虎狼惡獸亦去草野山林行見惡蟲但閉右目以灰目榮之三匝嘗以再思法意則以龍為陽物之神者也人目亦神之所寓左目為陽蓋為陽足以勝群陽唯神為能攝百邪虎狼猛獸與夫蜂蝎毒蠆雖巨細異形然皆物之隂而不正者昔古聖賢設為符呪之法豈得已而然哉法禁虎入山法吾登行五嶽前置辟邪六駮後從麒麟獅子揚聲哮吼野獸猛虎聞吾來聲伏地不語若不避吾徼蟲殺汝急急如律令敕禁虎法天一大一老君伯陽教我行符厭伏虎狼垂頭塞耳伏匿道傍藏身縮氣疾走千里舅氏之子不得中傷急急如律令禁蛇法三月三日夜向北燒香閉氣誦三七遍呪曰日出東方赫赫煌煌報你蛇蟲逺避深藏你若不藏鶴散步剛食你蛇頭吞汝入腸大蛇死小蛇亡急急如律令又法押蛇頭呪曰寅卯卯寅加卯三遍即愈若欲發蛇毒押蛇尾倒誦之卯加寅卯加卯蛇毒即發劇一注螫右相押左手背餘此同又法庚寅卯庚寅卯三遍即愈若欲發云卯寅庚卯寅庚即發又法辰生巳辰生巳蛇毒即上三遍即愈欲發即云巳生辰巳生辰即發又法一名蛇二名蟾三名蝮居近野澤南山蝮蛇公青蛇母黑蛇公字麒麟蛇母字接助犀牛角麝香牙鸛鵲角野豬牙啄蛇蝮熟蛇頭爛蜈蚣頭鵷鳥羽飛走鳴喚何不急攝汝獨還汝木鄉江南畔急急如律令禁蛇斂毒法暉堂日沒停光姿棹之節唾公字蚰蜓蛇母字彌勒從汝江南來江北言汝何失準何汝當速斂毒若不收斂吾有鳩鳥舌野豬牙蜈蚣頭何山沙吾集要藥破汝速去速出斂毒還家急急如律令六種蛇螫人不死令人殘病并呪山蛇鵲山蚱山青蛇澤青蛇馬蛇蛟黑似蜴蜥呪曰吾有一切之禁山海傾推九種惡毒原出南廂今渡江北専欲相傷吾受百神之禁惡毒原出南邊今來江北截路傷人吾一禁在從你速攝毒受命千年急急如律令六種蛇嚙人不傷直禁即瘥白朔蛇蒿春赤蛇黃蛇水蛇青蛇八種蛇人著者須藥治并呪尺八蛇土蠟蛇子蛇沙虱毒到蛇白蝪蛇罔蛇蟒蛇呪曰道邊一木百尺無枝鳯凰嘴如絲速去速去吾不知急急如律令禁獺法捻蛇目閉氣向王為之蠕神祗八節九枝兄字大節弟字蝎兒公字腐屋草母字爛蒿子但日攝斂汝毒不出去何為急急如律令禁蝎法螮螮移八節九枝公字腐草母字蒿子緣他離落螫他婦兒何不收毒欲住何為山雞戴勝食汝四肢頭破毛拆伏地莫移急急如律令又法蝎蟲毒止速收你尾河伯將軍鐵鉗銅指押你腰斷不得動尾急急如律令禁毒蝎螫人法先二日齋戒正朔一日日未出時淨澡浴洗手北堂東頭下誦之三七遍呪曰天有八節地有九枝一非草木二非蒿枝上他床上傷婦兒速去速去戴勝來追不疼不痛不動不膿急急如律令禁蜂毒法捻蜂目營目閉氣向王為之東方青毒還東方南方赤毒還南方西方白毒還西方北方黑毒還北方中央黃毒還中央呪曰黃蜂揚揚黑蜂變變王有小女嫁與河伯吾有銅掌鐵押汝便死汝是小蟲何不速去毒隂吾曰大鳥敷翅三千八萬不得張口汝應是急急如律令禁惡蚝螫人毒法蛆似蜂著山聚蚝似蝺著山復老蚝蚑緣木枝兄弟五人五都知攝汝五毒莫令移汝不攝毒滅汝毒急急如律令入山辟毒蟲猛獸百邪符入山辟毒蟲猛獸法凡猛獸毒蟲皆受人禁氣將入草山宜先禁之其經術云到山下先閉氣三十五息存神仙將虎來到吾前及存吾前肺中有白帝山把虎兩目塞五下部乃吐肺氣白通貫一山林之上於是良久又閉氣三十五息兩手捻都監目依三部步皆以右足在前乃祝止曰李耳圖汝非李耳耶汝盜黃帝之犬黃帝教我問汝汝答之云何畢便行一山之虎不可得見若逢者目向立大張左手五指側之極勢跳手上下三度於跳中大喚咄虎北斗君法去虎即走止宿亦先四向如此又燒牛角虎亦不敢近人又搗雄黃紫石縫襄貯而帶之辟犬法凡去人家見惡犬時便吸氣一口左手排寅剔丁搯成住手呪云雲龍風虎降伏猛獸一氣念七遍犬自不敢動作咬人禁蠍螫人法呪曰繫梨乎俱向蘇娑訶於五月五日桑木北正隂中菟葵日正午時先七步至菟葵以右膝著地立左膝手摘取菟葵子著口中熟嚼吐於手內與五華草菟葵等相和若無子直取二葉相和於手內左轉挼之口隂誦前呪七遍一吐氣得一百八遍止所挼葉令汁出染手其葉還放置兔葵處勿反顧之一日一夜不得洗手亦不用點汙手內亦不得人知作此法不得人見被螫者口問云何處即除呪七遍男以左手摩螫處口云差去若疼痛者男搯左手無名指第一節內側文頭隂呪搯之女以右手指右手摩螫處其莬葵私取私種於桑北五葉草處處皆有又法呪曰一名萬枝一名薄之傍他離落螫他婦男毒氣急去不出他道你愚癡急急如律令禁蛇法若有人被蛇螫者從身不得來但有熟人至前使之唑間被螫何處即面地依左右訣搯頭指內第一節曲文頭側上仍心想口暗誦曰嚙蛇頭搯蛇目望蛇鄉路蛇足訖則放乘人去待極然後緩放所搯處即瘥又法五月五日從門東刺向南三步九足四方取氣訖重向南方取氣即切切誦後文呪四十九遍於後任所行用其庶呵迦叱僧禁叱噀劍叱蛇毒死噀劒嚴蛇毒爛若欲誦呪蛇次在月連立喚被螫人當前立定然後皆足行七表人頻四足身向螫被人立搯指二所如了誦呪七遍即放所患者歸可以炊久放指目也若不解呪蛇致死乃放搯目誦云吾庭前有木百尺無枝鳯凰在上資斯速出放汝去攝汝毒命寧收急急如律令禁蛇囓呪曰某郡某縣里男女姓名年若干於某年月日時某處為某色蛇螫某處隂呪云你是已功曹我是亥明府你若不攝毒吾當搯你問才氣隨想搯蛇口蛇口在食指第二節自肉際文以手大指甲搯之各自以某手握食指搯閉氣即搯若螫右手右手搯左手搯螫當中兩手盡搯即忙任放手腫處手刺去血即瘥禁客忤法附論客忤一名卒忤蓋言邪氣外至適相觸忤與中惡無以異也説者謂人魂魄衰弱則有鬼厲毒氣能為侵犯其證心腹㽱痛而滿其氣上衝內色變易或即悶絶不知人治之者必有符呪之法蓋以我法齋明意誠心正則厲氣毒邪足以消弭於冥冥之中乃上古祝由之道也法禁鬼剋忤氣呪曰吾上大山府謁拜皇老君教吾却鬼語我神方上呼玉女收攝不祥登天左輿佩帶印章頭戴華蓋足躡鬼剛左呼六甲右呼六丁前黃後越章神師誅罰不必豪強先斬小鬼後殺遊光何神敢住何鬼敢當一鬼不出斬付魁罡急急如律令又法吾上大山道逢東土父教吾殺鬼語我有神上帝王子捕收非祥登天左契佩帶印章頭戴華蓋足蹈天剛先殺小鬼後殺遊光何神敢在何神敢當縳汝正身煮汝鑊湯三日一治五日一量門丞收縳竈君上章吾含天地之氣讀呪殺鬼之方唾天自裂唾金自缺唾山自推唾水自竭唾癰自潰唾火自滅唾邪自走唾鬼自殺急急如律令又法吾為天師祭酒為天地所使身佩乾靈之兵百千萬億在吾前後羅列左右何神敢住何鬼敢當正神當住邪神速去急急如律令又法六甲六乙邪鬼自出六丙六丁邪鬼自冥六戊六己邪鬼自止六庚六辛邪鬼自分六壬六癸邪鬼自死急急如律令又法神師所唾嚴如虛霜唾殺百鬼不避豪強當從十指自出前出封侯後出斬頭急急如律令七遍呪之先呪水噴病人然後呪之欲殺鬼然後分刀下差便呪看之十指頭毛出若呪病人時先以單被籠病人頭更遣兩人捉被單兩以遮前病人洗手莫拭合手叩跪然後呪之敕住忤符呪天帝告六丁十二子從符入某乙腹中隂陽注急急如律令按摩卒中法魍魎呪法配隂脈十二陽脈十五二十七脈隨手上下一脈不通知有疾苦男殘女殘客死不葬骸骨消散流離道傍驚恐馳走責人酒漿南山有一人窮奇不食五穀但食鬼皮朝食鬼父暮食鬼母正欲壯食復索鬼子不如急走詣都市急急如律令敕一切鬼魅符呪呪曰吾頭戴九星足履九城左帶青龍右帶白虎腰帶戊巳鬼萬鬼為吾走使前有萬石鑊湯後有金鉞黃斧斬殺妖邪惡鬼當吾符者死值吾符者亡急急如律令敕精魅魑符呪呪曰乾坤養育萬神通靈日月光照布明星大一神符收除辟精衆邪方魅莫不藏形急急如律令敕令精魅符呪呪曰家龍頭勻龍尾萬精伏千精徙急急如律令敕中惡飛尸符呪天帝告五龍飛尸注鬼速出急急如律令中惡并注符一十五道呪小兒中客忤法客忤為病吐下青黃汁腹中痛及反倒偃側似癇狀但目不上押少睡面色變五色脈急若失時不治久則難治呪法以水和豉搗令熱丸如雞子大以轉摩兒腮上及手足心各五遍又摩心腹臍上下行轉呪摩之食腮破視其心有細毛葉丸道中病愈又可用粉丸如豉法并用唾之呪如在呪曰摩家公摩家母摩家兒若客忤從我使扁鵲雖良不如善唾良久唾訖棄丸道中呪小兒客忤法取一刀橫著竈上解兒衣撥其心腹訖取刀持向兒呪之唾輒以刀擬向心腹曰非非煌煌月出東方背陽向陽葛公葛母不知何公子來不視去不顧過與生人忤梁上塵天之神戶下土鬼所經大刀環犀對竈君二七唾客愈兒驚唾啡啡如此二七啡啡每唾一刀擬之呪當三遍治小兒因驚變生諸疾神靈祕法不可慢施抱兒正坐焚香面太陽念一遍法雙手從兒足摩娑至𩕄門令乳母咳三聲雙手劈腮吸氣三口往太陽吹三吹法曰天梁地柱樹此南枝吾請張天師李天師速天大師八蠻禁師吾請禁道一爐斬身千段萬段暮掠孩兒如若不退吩咐江南淮土公土母土子土孫一羅㬋二十一星三水星四金星五太陽六火星七計都八隂星九木星會𩕄合𩕄三毒歸一𩕄大悲鳥力㘔鎮動三千八萬男我佛速手㘔聖水向心流法水從心㘔一二三四五金木水火土太上老君律令奉敕攝洹東宗善婆娑呪變蒸法變又蒸垢熱七日之內初生胃弱不必加鉺少頃即愈法以父母各呵兒𩕄七遍父先呪之曰爾吾兒順適其宜我精我氣受天勿迷隂陽綱紀聖力扶持薄有違今隨合愈之意急急如律令母復呵呪之曰爾為吾子胎氣充汝我血我脈毋艱毋阻萬神喝生百福為主稍失調度隨何而愈急急如律令次煎蔥白玄參湯或五术湯候溫浴立效禁蟲毒法附論夫蛀驚蜿疑髮癥鱉瘕怪異殊態傳記載之詳矣蓋人之飲食居處動作夢寐一有感觸皆能致疾世傳蠱毒品狀甚多然巢氏狀如鬼氣得又卒重信斯言也是皆毒邪乘人不出於正則綿不絶傷害腑臟日消月侵必致困斃設為禁法以正治邪之意也蓋柔雪齊明作為祝詛申盡符印殄殱毒惡是乃祝由之良術歟以下並出千金翼及普救方法禁蟲毒文毒父龍盤推毒母龍盤指毒孫無度毒子龍盤牙若是咀咮唴蜋還汝本鄉蝦蟇蛇村還汝漕櫪今日甲子蟲毒須出今日甲寅蟲毒本神今日丙丁蟲毒不行今日丙午還看本主雖然不死腰脊關急急如律令禁蟲法取赤雄雞一隻淳色者左手持雞右手持刀來至病人戶前去屋留三步便三聲喚門尉戶丞某甲當令速去急急如律令以雞柱病人口中雞足三遍畢以苦酒二合刺雞冠上血苦酒中便與病人食之愈呪魘蟲及解法天無梁地無柱魘蟲我者還差本主更一魘蟲不行一午魘蟲不語大山昂昂逐殺魅光魅翁死魁母魘蟲大小驅將入鑊湯急急如律令又法咒曰食鬼將軍磨牙利齒不食餘味止食鬼魅鬼九九萬若一不足下符來取鬼魅速還本主又迸與急急如律令又有將軍字屈血牙刑帶劍持兜鋒出門入戶逺地遊促得鬼即砍頭又有一人字窮奇頭如破莒髮強相口如羅披惡神祗不食五穀食魅皮朝食一千暮食九百一口不食便來取索急急如律令又法呪曰東方青帝厭人鬼南方赤帝厭人鬼西方白帝厭人鬼北方黑帝厭人鬼中央黃帝厭人鬼厭公字呵強厭母鬼還向本主走若當不走吾語北斗急急如律令禁狂疾法附論夫氣并於陽則狂病狂者精神不守而妄走字書謂其字或從心病本於心故也蓋心惡熱陽盛則心熱而神躁故速妄而善走入或因心氣不足鬼邪乘之令人欲自殘賊不以為非皆神舍不守之所致也故可以符禁之法治之法禁狂疾法夫老天皇泪心邪熱鬼魅諸怪害人性命玉門八慧消魔神呪曰天真莘元鬼魅甫星太微護行守鍊神明萬鬼消滅玉帝密靈急急如玉神太道君律令先澄神叩齒三十六通面東誦呪二七遍書符治病其功神速也紫元君曰凡欲禁顛狂書符其法之人先存北斗七元君於頂資想遍身火光燒患人誠為要法靈寶方治狂病朱書此以下諸符依符下注隨病用之凡書符勿親穢婦人僧尼孝子雞犬血厭五辛小人宜求靜室焚香念呪禁書也右件靈符並至誠焚香面北誦呪畢朱書剪丸煎沈香湯或桃栁枝煎湯吞下患人東面湯心志誠其水亦呪之煎更妙或急只或呪符以親水吞亦得急有神異又以青紙朱書香薰呪畢佩帶患人頭上或胸前挂之勿犯穢汚信受至誠辟怪法附論夫呪符辟怪所以禳却外邪役除不祥者也成周設官有哲蔟氏覆夭鳥之巢庭氏掌射國中之大鳥是也法辟怪法周禮哲蔟氏堂覆夭鳥之巢以方十日之號十三辰之號十有二月之號十二嵗之號二十八宿之號縣其巢上則去之隂陽正理論辟邪符三道禁夢魔法附論夫夢魔者謂人眠睡則魂魄外遊夢中為鬼邪魔鬼屈若精神強壯則急還寤若精神衰弱則為邪執録久不得還遂成寤魘至有氣暴絶者切忌火照而呼之也人皆有寢夢其覺無憂其急深深隂陽偏勝而夢水火藏真慮也人之怵怵鬼慮傷神於晝之所為則夜之所夢驚愕而多魘周官占夢有惡夢之辨又有憎惡夢於四方之法則符禁之所鎮伏者得古人之道也烏得誣哉法養生方導引法拘魂門制魂戶名曰掘固法屈大母指著四指內包之積習不止眠時不復開令人不魘魅此書省靈寶方以下七符治無故面蕡食飲不得夜多夢魘朱書吞之治卒魔寐久書此符於紙燒令黑以少水和之內死人口中懸縊死耳前打之喚死人名不過時即活禁白虎法附論堪輿厯遊年圖以白虎為嵗後一位之神嬰兒觸忤則為白虎之病蓋精神全盛是以外拒而勝物雖有鬼神不能為害嬰兒血柔脆精神未足邪氣易得以傷之故犯之者狀如風癇而不瘈瘲身時寒熱啼呼屈指也鬼神之氣出而傷人者皆可以法正之然此病與走虎注痛之病不同法法靈寶方治白虎法并呪用豬肉炙三串大麻子一合以酒半盞如麻子口含噀病人將豬肉炙向痛處壁禾去呪曰相州如意張德與是沙白虎本急出呪訖將肉麻子於床下良久便送路神驗禁白虎法呪曰青鹿皮青鹿皮毛出黃鹿皮黃鹿皮毛出赤鹿赤鹿皮毛出白鹿皮白鹿皮毛出黑鹿皮吾口神吉口聖唾山推唾山裂得汝名得汝字汝不拆頭拆頭拆急急如律令誦此呪時不可令人聞之治白虎符十二道普濟方卷二百七十一
