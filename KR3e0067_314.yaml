body:
  text: 普濟方卷三百十四明周王朱橚撰膏藥門諸瘡毒腫方金絲膏治諸惡瘡清油半斤白膠香赤者七錢半白者七錢半膩粉冬用七箇夏用八箇須臨安者韶粉半兩右細研入油內用銀器文武火熬以向南栁枝作小把攪成膏如琥珀色於白碗底上試不散為度如湯蕩火燒金瘡用雞翎掃之如久患惡瘡口含漿水洗淨或麵圈瘡口傾藥在內痛立止如刀斧所傷傾藥在上定疼止血愈無瘢痕聖應膏治諸腫惡瘡疽腫毒疼悶槐枝一斤巴豆二枚木鱉子仁二枚當歸一錢右用好油三兩半下銚內煮十沸滓不用却下黃丹一兩半慢火上錬以鐵冷試之硬軟盛磁器內每用旋攤翠玉膏治軟癤膿水逗流愈後復發明瀝清四兩銅碌二兩芝麻油三錢徖豬膽三箇右先於炭火上鎔開瀝清入油令沸下膽汁攪勻入水用手摶搦磁盒內收每用於緋帛上量瘡大小攤貼不須再換自落為度乳香膏一名大紅膏瀝清一斤黃丹十兩乳香二兩油不以多少添裁用右藥先用瀝青以銀器內慢火熬開鐵鍋子攪覷時月看硬軟旋入油硬軟恰好次用乳香攪勻綿濾過次入黃丹再攪勻盛磁盒內每用熁過熱鐵錍攤厚紙上貼烏金膏治一切惡瘡腫麻油一斤鉛丹四兩煉過白蠟四兩頭髮雞子大一塊右先炒鉛丹黑色即下油及髮以栁木錍不住手攪滳水中侯可丸即止便下蠟更煎銷後即盛磁器內隨大小攤貼烏金膏治一切惡瘡發背毒腫油半斤鹽花一兩黃蠟三兩栁枝二兩銼右先熬油令沸下栁枝煎候焦黃漉出綿布絞去滓再煎下蠟鹽花以栁錍攪稀稠得所磁盒盛如用故帛上攤貼若三日內未成膿便消已成膿頭未破即潰不須針炙其瘡變痛成癢是藥力也色如皮濈黃水若是惡瘡發背用藥貼出膿血及黃水赤小豆汁盡為度烏賊骨膏治一切瘡腫烏賊魚骨去甲研末舊鉛灰研末各一兩鉛丹三兩研清油十二兩右先熬油令沸下鉛丹以栁木錍攪候黑色即將前二味下再攪勻滳水內成珠得所磁盒盛放故帛上攤貼日三一方有麝香楸葉膏治發背癰腫惡瘡右先取馬齒莧楸葉以水五斗煎至一斗濾去滓更煎至一升半下二味藥末栁錍攪候稀稠得所故帛上塗貼日二生肌膏治發背腦疽膁右取婦人梳下油頭髮一兩半油二兩熬髮稀爛去滓滳水中成珠不散下丹一兩冷定下輕粉三錢磁器內放之鐵罐膏治一切惡瘡內毒止痛追毒去死肉桑柴灰蕎麥秸灰石灰各一碗右用瓦罐一箇傍鑽一孔塞住前傾灰填罐內用水注滿著厚紙封固一復時用芙筒插在孔內細淋之盡其水去灰將水於小鍋內慢火熬用鐵片頻攪休暫定看調稠滳水中不散為用鐵罐子盛封定口或有諸般惡瘡及腸風痔瘻量瘡用度遇仙膏治癰疽發背毒瘡川五靈脂白芷貝母各半兩當歸二錢半右用麻油六兩銼細栁枝二十四寸同上藥入磁銚一宿慢火煎栁枝攪色黑焦入肥白巴豆二十一枚木鱉碎五箇攪煎令黑頓冷爐生絹濾再暖入蠟半兩鎔盡再下火入淨虢丹二兩半更換栁枝急攪候色黑滳入水成珠入乳沒末各二錢拌和傾磁器候凝覆泥地三日貼服皆好栁枝止痛百靈膏治癰瘡久不痛槐花子炒焦為末松脂各一兩乳香膩粉各一兩右細研拌勻用清油黃蠟各一兩磁器內慢火熬成膏貼之大乙膏治癰疽發背惡毒虢丹二兩半男生髮洗焙二錢木鱉子仁碎三枚肥白巴豆十八粒肉右用麻油四兩慢火先煎巴豆木鱉髮團更換栁枝攪準髮耗五分頓冷爐絹濾再暖入淨虢丹換栁枝頻攪候色變滳水中右將甘草根節銼成假椎破內留一條長者攪藥用銀石器入油甘草同焦黃取出不用入黃丹以前所留長甘草不住手攪如黑色點少許入水試候成膏不散用綿濾滓入鉼封閉令密坎地上埋二寸許二十日取出臘月合妙發背如梧桐子大五十丸甘草湯下傅貼如常法金絲萬應膏松香一斤香油四兩五積散二兩右用油煎藥黃去滓入松香槐栁條攪數沸候冷濾水中拔百遍就水飬之日換涼水三仙膏治一切惡瘡麻油四兩鉛丹定粉各研一兩右先錬油熟將鉛丹定粉同羅過同煎用槐枝攪勻候稀稠得所滳水內如珠即止每用隨瘡大小貼之貼毒膏治一切癰疽上攻下座風毒瘻瘡疼痛方見本門金瘡類靈鼠膏治諸瘡腫右以大雄鼠一枚用清油一斤慢火煎鼠焦水上試油不散即以綿濾去滓澄清再拭銚令淨仍以慢火煎油次下黃丹五兩炒紫色栁木錍不住手攪令勻又於水上試之候凝即下黃蠟一兩又煎滯黑色方成膏收貯於磁盒內候硬合地上出火毒三二日傅白膏治一切無名腫毒發等疾萆麻四十九粒去殼嫩松脂一錢滳乳半錢用鐵斧於石砧上推為膏乾濕得所隨意加減松乳攤於紙上貼之成珠隨意入乳香末再煎沸傾入磁器候凝覆泥三日貼用凡修合於密室中勿令貓犬婦人見靈應膏治五發惡瘡瘰􅊓結核乳癰白斂五兩鹿角十兩燒存性白麥飯石五兩燒醋淬七次右為細末每用釅醋中熬如膏厚塗於上中心留一竅以出其毒或故舊軟布攤貼未成膿即消已成膿便潰惡瘡疾出新肉早生白芨膏治螻蛄瘡良薑白芨瀝青各等一分右為細末嚼芝麻水同熬為膏入冷水共淀用緋絹一片攤作膏貼瘡上烏麻膏治諸惡瘡一十三般疔腫五色遊腫癰癤毒熱狐刺蛇毒狂犬蟲狼六畜所傷不可識者二十年漏金瘡中風皆以此膏貼之惡膿盡即差止痛生肌一貼不換惟一日一度拭去膿再貼生烏麻油一斤黃丹四兩蠟四分皆大斤大兩右以臘日前一日從午內油鍋器中微火煎至明旦看油減一分下黃丹消盡下蠟令沫消藥成至午時出惟男子合之毋令小兒婦人六畜見白膠香膏治一切軟癤右用麻油半盞先將巴豆煎黑去巴豆入先二藥再煎至令勻乘熱傾入水中為度用緋帛攤貼萬金膏治一切癰癤毒大甘草節四兩銼去皮真麻油八兩黃丹四兩未攤只用水浸貼之便癢癢後即散紅膏治軟癤癰腫風濕疼痛惡瘡瀝青白膠香各二兩黃蠟三錢右同於銚內煎化量用麻油三錢許煎濾於水盆中揉成劑收之每用於水內捻作餅子隨瘡大小貼之上傅以紙如當歸一兩於內煎令黃色去滓於水盆內取出揉成劑再加乳香末各二錢和為乳香膏其加責黛名青金膏其加虢丹即名紫金膏用功一而已矣神應膏治癰疽發背惡瘡龍泉光粉二兩真麻油三兩右慢火同熬更換栁枝頓攪滳入水成珠子方入白膠末少許徐徐傾入磁器以水浸二日抄紙攤貼一方白膠香水晶膏治疔瘡背疽瘤疽妳癰丹毒杖瘡等疾好白油草紙十張每剪作八片鷹爪黃連一兩去須細銼用水兩碗許入砂鍋內同黃連煎至一碗半先下油單紙五張又續下五張同煎五七百沸湯耗旋添不得犯鐵器漉起擦去黃連滓屑焙乾如瘡破有膿將藥花旋鬆貼如杖瘡約度大小恪好剪貼不可太大先將鍋內煎下油單燒灰熱酒調嚼生薑送下次貼藥不得犯女人手水冗金絲膏治一切惡瘡瀝青白膠各一兩春秋用油夏用油蠟二錢半冬用油蠟四錢右鎔開油蠟下瀝青白膠用槐枝攪勻綿濾過滳冷水盆中以手扯一十餘遍其膏軟硬得宜然後收住凡用如瘡透了可喫數丸亦作劑於瘡內填之亦將膏藥攤於紙上貼之勿令火炙黑神膏治諸般瘡腫痛用酒二大碗皂莢一斤去皮粒搗碎熬至半濾去滓再用前汁入銀石器內熬為膏隨患處貼之歸命膏治發背用野生茄子熟黑者取子不拘多少爛研取汁以絹濾去滓入大銀盂內慢火熬成稀膏以細青竹枝去葉五七莖扎聚不住手攪候成稀麵糊收之時用不問隂陽二證發背或一不一或有無頭或癢或痛皆可用之如無頭無異色或熱不熱一發從外漸漸傳入如有赤脈有頭先從去脈傳之漸漸出一日上三四度雄黃膏治一切癰疽發背腦癰諸毒瘡又妳癰疼痛雄黃二兩細研黃茋三分漏蘆絡石續斷菅實紫葛漢防己各三分桑寄生商陸連翹白斂赤芍藥敗醬川升麻莾各半兩當歸苦參木通紫苑去土芫花藜蘆去蘆頭白芨䕡茹各二兩黃丹十五兩蠟四兩清油三斤右藥銼碎以酒二升拌一宿先取油安鐺內慢火煎令熱即下藥前白斂赤黑色漉去滓下蠟候鎔以綿濾過拭鐺却將油入鐺內下丹於慢火上栁錍不住手攪變色黑滳水內為珠則膏成矣去火下雄黃末調勻傾磁盒中如用故帛上攤貼日易之黃丹膏治癰疽發背癰腫風毒一切瘡癤內消止痛黃蠟二十四兩微炒細羅麻油二斤半豬脂八兩臘月者松脂四兩紫菀一兩去土當歸防風黃參莨菪子各一兩棘針四十九枚頭與者青緋帛各二尺燒灰人糞灰一兩青白葉一兩蝪蜥七枚亂髮如雞子大蠟五兩蔥連根二十莖右藥銼碎先下油脂於鍋中煎令鎔次下藥以文火煎半日次下松脂蠟香候熟以綿濾去滓却入油於鍋中內黃丹不住手攪勻候色變紫色收得力盡軟硬得所用磁盒盛攤故帛上貼之通神膏治一切癰疽發背惡瘡瘻瘡雄黃二兩細研黃丹八兩細羅蠟六兩膩粉半兩沒藥一兩騏驎竭一兩麝香一分細研桑枝四兩槐枝四兩蝪蜥三枚當歸三分芎藭三分白芷三分木香三分沉香半兩欎金半兩烏蛇內三分藁本一兩細辛三分桂一兩半麻油二斤右藥細銼先取油傾於鐺中以文火煎令熟下銼藥煎候白芷黃黑色以綿濾過拭鐺內煎令鎔即入藥於油鐺中次下黃丹次下諸藥末不住手攪稀稠得所滳入水不散即膏成以磁盒盛密封閉懸於井底一復時出火毒每用攤在故帛上貼日二易之抵聖膏治一切惡毒瘡腫木香細辛續斷莾草槐枝木鱉子去殼栁枝各一兩陳油一斤半黃丹四兩密陀僧蠟一兩槐松脂野狐膽乳香騏驎竭腽肭臍阿魏沒藥各一分麝香二錢右藥先將前七味細銼入油煎令煙盡綿濾去滓却將後藥除丹蠟脂外為細末先於銀鍋內熬油令沸下丹以栁木錍攪候變黑色即下諸藥末攪勻於地坑內出火毒一宿煎時切忌水落藥中如有發背每日空心酒下七粒如梧桐子大只一服止更於故帛上攤貼日二易之紫金膏治發背癰疽乳癰穿瘻一切惡瘡結腫疼痛紫栁一兩石菖蒲半兩獨活半兩白术三分防風半兩去蘆頭附子三分去皮臍白芷一兩木鱉子仁一兩半漢椒半兩杏仁一兩湯浸去皮尖雙仁半夏三分桂心三分騏驎竭一兩細研沒藥三分木香半兩甘草三分赤芍藥半兩白芨三分沉香半兩麝香一分細研朱砂二兩細研龍腦半兩細研黃蠟三分乳香一兩甘松香半兩零陵香半兩白檀香半兩甲香半兩豬脂一斤半羊脂一斤半右藥銼碎以酒二大盞拌一宿取豬羊脂安鐺內煎沸下諸藥以文火熬候白芷黃黑色下蠟候鎔綿濾過入磁盒中下騏驎竭麝香朱砂龍腦等攪勻故帛上塗貼日二易之大垂雲膏治一切惡瘡焮腫當歸附子去皮臍生用芎藭防風川升麻槐子細辛去苖側柏葉桃仁湯浸去皮尖雙仁甘草杏仁湯浸去皮尖雙仁桑根白皮白芨黃蓍白殭蠶各一分垂栁一握黃丹七兩雄黃半兩朱砂一分細研硫黃一分細研麝香一錢細研白芷一分沒藥一分騏驎竭一分細研龍腦一分細研黃蠟四兩切碎油一斤半右除研藥并丹外細銼先熬油沸下銼藥煎候白芷黃赤色以綿濾過拭鐺令淨再煎下再以栁木錍攪候變黑色即下蠟鎔盡滳於水中為珠不散即次下諸藥末攪勻以磁盒盛如發背瘡熱酒調一錢服外貼之瘰􅊓漏見骨貼之疽瘡風腫疥癬腸癰妳癰髮鬢牙癰發腦腎癰馬墜搕破骨損貼之一切蟲蛇毒物咬之並貼虎豹咬者用甘草水洗貼垂雲膏治發背乳癰及諸瘡腫亂髮一兩黃丹六兩緋絹方一尺二寸燒灰松脂二兩曲頭棘針五十枚丁香半兩末蠟一兩鹽一兩柴胡一兩去苖黃蓍一兩乳香半兩細研莨菪子二兩清麻油一斤驢耳塞半兩右藥錬油令煙絶即下緋帛髮松脂蠟等煎令髮盡