神驗神仙膏藥麻油一斤黃丹半斤巴豆二十粒當歸半兩草烏半兩杏仁半兩新折栁枝如筋大者四十截各長二寸右絶早先煎油慢火至巳時方旋入栁枝二截慢火候色焦赤方取出再入二截候入盡四十截為度仍將新綿一片薄裹杏仁當歸巴豆入油內慢火煎至申時候油煙少即漉出去之入黃丹於油內復用栁枝二條各長尺左手順攪候滳水中成珠即以瓷器收入水中坐一日收之發背癰癤諸般惡瘡隨大小攤帛上貼帛中作孔出毒合時勿令婦人雞犬貓兒孝服人見之紫金膏治一切瘡癤生肌止痛乳香明淨者二錢半膩粉二十文五倍子大者二文右三味入磁瓶子內燒只用槐椿枝子燒至青白煙出每一料用清油五兩黃丹一兩用藥末一錢用慢火不住手用木箆子攪候將卻得時於紙上待油不浸過在紙上即是每用如常法大有妙效敗風膏治本􅀈風毒攻疰蟲瘡及熱毒氣流疰赤癢白芨半兩白斂半兩二文白礬一錢一文吳茱茰一分一文剪草一兩半淨洗細銼四文水銀小豆大三文麝香三十文右七味為末相和先用油半盞已下於磁碗內盛以慢火熬令沸更入蠟一分同煎三五沸却安冷處入前藥末調和自然成膏或是瘡以鹽湯洗後以藥貼在瘡上烏金膏治瘡癤生肌止痛消腫毒乳香沒藥各半錢騏驎竭半兩當歸一錢木鱉子半兩血餘三兩婦人者黃丹水淘去土一兩右將血餘黃丹入銚子內用清油十兩黃蠟二兩同煎熬令黑色後入諸般藥末同煎去滓更入慢火熬候滳在水內成珠子不散即住火乃入淨磁盒內收盛掘地坑子可深三尺埋之在內經二宿取出用之如常法一方有杏仁殘霞膏治風毒流注惡瘡熱疼生肌化毒烏蛇四兩五倍子一兩半蛇皮半兩已上生使銼碎巴豆二十箇去殼雄黃牙硝各一錢細研麝香續添一錢右件依法修事於銚子內入油二兩半煎聞油香入煎藥熬候藥并巴豆焦黑色漉出諸藥不用却入黃蠟一兩半慢火飬成膏以磁器內盛但有風毒瘡以小紙攤貼妙騏驎膏治八發癰疽一切惡瘡軟癤無問年月深逺已成膿成膿貼之即效凡火刀斧所傷並可內服外貼神效白芷白斂川芎甘草已上各四兩當歸丁香半兩木鱉子三十八箇沒藥一兩半另研乳香二兩半另研腦四兩乾蟾半兩杏仁九十八箇鼠頭臘月者二箇清麻油二斤麒麟竭一兩真緋絹一尺燒灰黃丹十兩室女油頭髮一拳大團右並細銼用好酒拌濕一宿入鐺內用油煎候藥深赤色濾去滓另入淨鐺慢火可少頃即入研者麒麟乳香等及黃丹蠟用栁枝子不住攪打時時滳下水試看軟硬得所即是成膏發背未膿者半入銀石器慢火熬及半盞許去滓次下乳香碾碎先入又熬之候如一茶腳許先將蜜熬去滓放冷却入前熬者膏子及衆末攪勻再熬候金錫狀乃成入不犯水磁器內收之每用少許點大妙梧枝膏用香油一斤黃丹五兩槐枝栁枝梧桐樹枝桑枝桃枝各長一寸各重一兩右先用同枝入鍋內文武火煎衆煎黑色濾去滓次入黃丹不住手栁枝攪黑色三黃膏治杖瘡黃梔子一兩去殼黃白皮一兩去粗皮槐花黃連右四件為粗末用井水一碗浸藥一宿次日去滓用無灰白皮紙將藥水浸之令透取曬乾次用後藥麻油三兩輕粉五十文煎油成膏入萆麻子七粒煎焦取出杏仁七粒煎焦取出黃丹一兩煎油成膏入右將油刷紙上成油單紙看杖瘡大小貼之如水纍有神司馬溫公解毒膏治諸瘡及杖瘡尤宜貼之木鱉子二十四箇去皮杏仁四十八箇萆麻子三十四箇巴豆一十四箇乳香三錢槐枝四兩上四指栁枝二兩桃枝三兩春秋入黃丹三兩半夏入黃丹四兩冬入黃丹三兩右件藥下熬黑滳水內不散為度如用時於水內浴貼之用好綿一葉濾過定痛膏清油一十二兩瀝青一斤黃丹十兩沒藥乳香各一兩半另研右先將清油熬香熟次下瀝青再熬濾去滓次下黃丹槐枝攪文武火熬滳水中成珠不散為度去火後下沒藥末攪勻和乳香一處勻瘡方通神乳香膏乳香沒藥血竭黃丹木鱉子二兩膩粉三錢烏魚骨二兩不灰木四兩五靈脂二兩海桐皮二兩瀝青四兩蠟一兩麝二錢油八兩熬用右先將清油木鱉子不灰木等藥熬香熱次下瀝青熬數十沸去滓次入黃丹槐栁條攪滳水中不散再下乳香沒藥血竭麝香膩粉一處攪勻寒水石膏治一切癰發背熱毒猛異攻肌內赤色腫痛不可忍卻成膿及已成膿并風熱毒在關莭欲結成癰便令內消寒水石二兩羊蹄根一兩硝石一兩川大黃一兩白斂二分木香三分附子二分去皮臍黃連一分去頭丁香三兩榆白皮三分銼莾草三分赤小豆一合漢防已一兩半夏三分玄參甘草右十六味搗羅為細散每用時以生密一合地黃汁一合旋調以成膏攤於生絹上貼乾即易腫消為度瘡腫傷折方神仙萬應膏治一切瘡腫傷折川山甲當歸大黃黃芩黃皮玄參川芎木鱉子知母貝母白微白斂羌活獨活降真蘇木柴胡芷稍赤芍藥苦杖防風桔梗蜀葵花瓜蔞椿皮槐枝栁枝竹枝野紫蘇葉天南星續斷荆芥黃茋苦參草烏商陸甘草官桂薄荷車前草桃仁杏仁槐花蒼耳芒硝地榆劉寄奴葛根通草澤蘭桑桂黃梔子右除川芎當歸大黃官桂各半兩餘藥各三錢銼碎用好香油二斤或三斤除薄荷車前草外諸藥俱入油中煎至焦黃色臨熟下薄荷車前草熬一二沸濾去滓以油入銚內煎候油七分熱下黃丹一斤用槐枝條不住手攪成膏於水內滳試以不散為度然後入乳香沒藥各一兩攪勻傾入鉢候凝定却入水中出火毒旬日方可用煎藥油用鉼盛埋土中出火毒用以洗瘡須十分用力揉洗乃貼之雲母膏治一切癰疽瘡腫折傷等病雲母消石細研甘草各二兩槐枝柏葉栁枝桑根白皮各二兩桔梗防風去叉桂去粗皮蒼术菖蒲髙良薑黃芩柴胡去苖厚朴去粗皮松脂蜀椒去目及閉口者芍藥龍膽白芷白芨白斂黃蓍芎藭白茯苓去黑皮夜合花附子去皮臍各半兩鹽花人參當歸切焙木香騏驎竭沒藥麝香乳香各半兩橘皮去白一兩鉛丹十四兩水銀二兩右依次第用各粗銼勿令大細免煎易焦黑先以清油四十兩於鐺內鍊令香熟下雲母用栁錍不住手攪候十數沸即以罩籬漉出次下消石亦凖前法次下柏葉焦黃色為度亦漉出一味味前相次下栁槐枝次下鹽花及人參諸藥候藥盡後提鐺離火待微冷以綿濾過再入鐺內便下鹽丹急以栁錍攪須臾色變即止却將鐺火上加火煎之色黑稠以栁錍取少許滳水上凝結不散不粘手是藥已成先須炙一磁器令熱即下藥仁內候膏藥如人體溫方入麝香仍以絹袋子盛水銀以手彈膏藥上如有頭細再以栁錍攪勻皆是飬藥母也如人收此藥內身以蠟紙裹不令風乾可三二十年並無損動若發背先以敗蒲三斤用水三升煮三五十沸將蒲湯洗瘡拭乾貼藥一兩分為三服溫酒下未成膿者立差乳癰瘰􅊓骨疽毒穿至骨者同藥一兩分作三分溫酒下甚者即㵼出惡物兼貼外差腸癰以藥半兩分為五服用甘草湯下未成膿者當時便消已成膿者膿隨藥下膿出後每日酒下五丸如梧桐子大膿止即止風根貼兩太陽穴一切惡蟲咬外貼留瘡口發腦發髭鬢發眉發耳臍癰牙疼並外貼腎癰馬墜傷筋骨痛不可忍者但以酒下半兩老少臨時加減外更膏藥包裹當時痛止箭頭在內不出者外貼每日喫少爛菉豆箭頭自出虎豹所傷先以甘草湯洗然後貼膏每日換不過三貼犬咬外貼又以生油下十丸如梧桐子大難産二三日不分免者溫酒下一分血暈欲死以薑汁和小便半升溫酒下十丸死胎在腹以榆白皮湯下半兩小腸氣炒蘹香子溫酒下婦人血氣當歸酒下中毒藥者洗襪酒下各一分許中毒之人即吐㵼出惡物一切腫癤瘤贅藥利即差只忌羊血餘無所慮藥八味看點者杵羅為末與黃丹同入神效回生膏治癰疽癤毒逺近膁瘡打撲顛折傷損腫毒發背刀斧所傷箭頭在內蛇犬所傷並皆治之槐栁桃榆桑枸杞已上各二十條每條長二寸通計一百二十條嫩者剝取皮白芷白芨白斂當歸大黃黃蘖赤芍藥杏仁萆麻子已上各一兩半黃丹十二兩血竭雄黃乳香沒藥已上各五錢輕粉二錢右先將前六味樹條皮用清油三斤文武火大砂鍋內煎令津液盡為度將油濾過却將白芷等九味銼碎再下於前油內浸透用慢火煎焦去滓再將油濾過却將黃丹分作三次下油內熬令黑色滳水中不散為度將血竭等為極細末待油微溫下於油內以磁罐盛之蓋口埋土內三日去火毒任意攤貼患處二日外自覺病退其效如神膏藥方川當歸去蘆芍藥川芎黃蓍香白芷黃芩黃連黃蘖皮桑白皮白芨白斂蓬术南木香皂莢去子升麻栝蔞根木鱉子檳榔杏仁藿香沒藥各半兩巴豆一錢川山甲二錢肉桂半錢白膠黃蠟各一兩已上二十四味銼為細末和勻以好澄清油半斤將黃蠟白膠於鐺內煎鎔却下煎藥於內煎令焦黑使棕皮濾去滓再將熟藥油入淨鐺內却用黃丹四兩乳香末五錢射香半錢細研右用煎藥遂匙挑在油內不住手以箭簳大栁枝攪火上鍊至黑色時復滳在水盞內若成珠子不粘手即傾出磁器內盛了任意攤用貼之除炙瘡有瘢癤外但一應惡瘡貼之並無瘢迹修合時須於淨室忌婦人僧雞犬貓畜見萬金膏治癰疽發背諸般瘡癤從髙墜墮打撲傷損腳膝生瘡逺年膁瘡五般痔漏一切惡瘡又士專治發背方神妙不可具言有祁覺或做瘡用牛皮膠熬令稀稠得所如藥化攤在毛頭紙上於初覺處或有做瘡處貼次用軟布帕子二條於釅米醋內煮令熱漉出互相於膠紙上乘熱蒸尉不可令布帕冷布帕二條不可都齊漉出常留一條在醋內煮候蒸尉得一條冷却於醋內取熱布却入醋內煮庶幾常得熱布替換尉蒸即易見效若瘡癢時乃是藥攻其病須思癢不止蒸煮真候膿出將盡即濃煎貫衆湯候溫洗去膠紙次日後依前更洗若尚有膿又如前法蒸尉準連數日蒸尉不防但要瘡中膿盡瘡成乾掩為度然後用生肌紅玉散糝在瘡上即以萬金膏貼每日一上或兩上每再蒸尉並如前先鋪膠紙於瘡上尉了亦如前用貫衆湯洗去膠紙龍骨鱉甲苦參烏賊魚骨黃蘖草烏頭黃連豬牙皂莢黃芩白斂白芨木鱉子仁當歸厚朴去粗皮川芎香白芷沒藥另研槐枝栁枝並同銼碎各一分乳香另研一錢黃丹一兩半清麻油四兩冬月半斤右除黃丹外銀石器中將諸藥於油內慢火煎紫赤色去藥不用却黃丹一半於油內不住手攪令為黑色更入於黃丹不住手攪須是慢火熬令紫黑滳在水中不散及不粘手然後别入黃丹少許再熬沸如硬時却硬入油些少以不粘封為度用時量瘡大小攤紙上貼之專治諸般惡瘡內加自然銅肉桂一分一方無當歸大乙膏黃丹四兩木鱉子九枚去皮巴豆九十箇大摩七十箇去皮栁枝槐桃枝各二兩香白芷一錢蒼术隨用杏仁隨用川山甲一箇清油半斤沒藥川芎當歸人參乳香輕粉已上六味各一錢黃連黃芩黃蘖銅青俱隨用右藥依法煎熬普濟方卷三百十四
