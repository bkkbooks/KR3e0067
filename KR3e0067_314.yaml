神驗神僊膏藥麻油一觔黄丹半觔巴豆二十粒當歸半兩草烏半兩杏仁半兩新折栁枝如筋大者四十截各長二寸右絶早先煎油慢火至巳時方旋入栁枝二截慢火候色焦赤方取出再入二截候入盡四十截為度仍将新綿一片薄裹杏仁當歸巴豆入油内慢火煎至申時候油烟少即漉出去之入黄丹於油内復用栁枝二條各長尺左手順攪候滳水中成珠即以瓷噐收入水中坐一日收之發背癰癤諸般惡瘡隨大小攤帛上貼帛中作孔出毒合時勿令婦人鷄犬猫兒孝服人見之紫金膏治一切瘡癤生肌止痛乳香明凈者二錢半膩粉二十文五倍子大者二文右三味入磁瓶子内燒只用槐椿枝子燒至青白烟出每一料用清油五兩黄丹一兩用藥末一錢用慢火不住手用木箆子攪候将卻得時於紙上待油不浸過在紙上即是每用如常法大有妙効敗風膏治本􅀈風毒攻疰虫瘡及熱毒氣流疰赤癢白芨半兩白歛半兩二文白礬一錢一文呉茱茰一分一文剪草一兩半凈洗細剉四文水銀小豆大三文麝香三十文右七味為末相和先用油半盞已下於磁椀内盛以慢火熬令沸更入蠟一分同煎三五沸却安冷處入前藥末調和自然成膏或是瘡以塩湯洗後以藥貼在瘡上烏金膏治瘡癤生肌止痛消腫毒乳香没藥各半錢騏驎竭半兩當歸一錢木鼈子半兩血餘三兩婦人者黄丹水淘去土一兩右将血餘黄丹入銚子内用清油十兩黄蠟二兩同煎熬令黒色後入諸般藥末同煎去滓更入慢火熬候滳在水内成珠子不㪚即住火乃入凈磁盒内收盛掘地坑子可深三尺埋之在内經二宿取出用之如常法一方有杏仁殘霞膏治風毒流注惡瘡熱疼生肌化毒烏蛇四兩五倍子一兩半蛇皮半兩已上生使剉碎巴豆二十箇去殻䧺黄牙硝各一錢細研麝香續添一錢右件依法修事於銚子内入油二兩半煎聞油香入煎藥熬候藥并巴豆焦黒色漉出諸藥不用却入黄蠟一兩半慢火飬成膏以磁噐内盛但有風毒瘡以小紙攤貼妙騏驎膏治八發癰疽一切惡瘡軟癤無問年月深逺已成膿成膿貼之即効凡火刀斧所傷並可内服外貼神効白芷白歛川芎甘草已上各四兩當歸丁香半兩木鼈子三十八箇没藥一兩半另研乳香二兩半另研腦四兩乾蟾半兩杏仁九十八箇䑕頭臘月者二箇清麻油二觔麒麟竭一兩真緋絹一尺燒灰黄丹十兩室女油頭髪一拳大團右並細剉用好酒拌濕一宿入鐺内用油煎候藥深赤色濾去滓另入凈鐺慢火可少頃即入研者麒麟乳香等及黄丹蠟用栁枝子不住攪打時時滳下水試看軟硬得所即是成膏發背未膿者半入銀石噐慢火熬及半盞許去滓次下乳香碾碎先入又熬之候如一茶脚許先將蜜熬去滓放冷却入前熬者膏子及衆末攪匀再熬候金錫状乃成入不犯水磁噐内收之每用少許㸃大妙梧枝膏用香油一觔黄丹五兩槐枝栁枝梧桐樹枝桑枝桃枝各長一寸各重一兩右先用同枝入鍋内文武火煎衆煎黒色濾去滓次入黄丹不住手栁枝攪黒色三黄膏治杖瘡黄梔子一兩去殻黄白皮一兩去粗皮槐花黄連右四件為麄末用井水一椀浸藥一宿次日去滓用無灰白皮紙将藥水浸之令透取曬乾次用後藥麻油三兩輕粉五十文煎油成膏入萆麻子七粒煎焦取出杏仁七粒煎焦取出黄丹一兩煎油成膏入右将油刷紙上成油单紙看杖瘡大小貼之如水累有神司馬温公觧毒膏治諸瘡及杖瘡尤宜貼之木鼈子二十四箇去皮杏仁四十八箇萆麻子三十四箇巴豆一十四箇乳香三錢槐枝四兩上四指栁枝二兩桃枝三兩春秋入黄丹三兩半夏入黄丹四兩冬入黄丹三兩右件藥下熬黒滳水内不㪚為度如用時於水内浴貼之用好綿一葉濾過定痛膏清油一十二兩瀝青一觔黄丹十兩没藥乳香各一兩半另研右先將清油熬香熟次下瀝青再熬濾去滓次下黄丹槐枝攪文武火熬滳水中成珠不㪚為度去火後下没藥末攪匀和乳香一處匀瘡方通神乳香膏乳香没藥血竭黄丹木鼈子二兩膩粉三錢烏魚骨二兩不灰木四兩五靈脂二兩海桐皮二兩瀝青四兩蠟一兩麝二錢油八兩熬用右先将清油木鼈子不灰木等藥熬香熱次下瀝青熬數十沸去滓次入黄丹槐栁條攪滳水中不㪚再下乳香没藥血竭麝香膩粉一處攪匀寒水石膏治一切癰發背熱毒猛異攻肌内赤色腫痛不可忍卻成膿及已成膿并風熱毒在闗莭欲結成癰便令内消寒水石二兩羊蹄根一兩硝石一兩川大黄一兩白歛二分木香三分附子二分去皮臍黄連一分去頭丁香三兩榆白皮三分剉莾草三分赤小豆一合漢防已一兩半夏三分𤣥参甘草右十六味搗羅為細㪚每用時以生宻一合地黄汁一合旋調以成膏攤於生絹上貼乾即易腫消為度瘡腫傷折方神仙萬應膏治一切瘡腫傷折川山甲當歸大黄黄芩黄皮𤣥参川芎木鼈子知母貝母白㣲白歛羗活獨活降真蘇木柴胡芷稍赤芍藥苦杖防風桔梗蜀葵花𤓰蔞椿皮槐枝栁枝竹枝野紫蘇葉天南星續斷荆芥黄茋苦参草烏商陸甘草官桂薄荷車前草桃仁杏仁槐花蒼耳芒硝地榆劉寄奴葛根通草澤蘭桑桂黄梔子右除川芎當歸大黄官桂各半兩餘藥各三錢剉碎用好香油二觔或三觔除薄荷車前草外諸藥俱入油中煎至焦黄色臨熟下薄荷車前草熬一二沸濾去滓以油入銚内煎候油七分熱下黄丹一觔用槐枝條不住手攪成膏於水内滳試以不㪚為度然後入乳香没藥各一兩攪匀傾入鉢候凝定却入水中出火毒旬日方可用煎藥油用鉼盛埋土中出火毒用以洗瘡湏十分用力揉洗乃貼之雲母膏治一切癰疽瘡腫折傷等病雲母消石細研甘草各二兩槐枝栢葉栁枝桑根白皮各二兩桔梗防風去叉桂去粗皮蒼术菖蒲髙良薑黄芩柴胡去苖厚朴去粗皮松脂蜀椒去目及閉口者芍藥龍膽白芷白芨白歛黄蓍芎藭白茯苓去黒皮夜合花附子去皮臍各半兩塩花人参當歸切焙木香騏驎竭没藥麝香乳香各半兩橘皮去白一兩鉛丹十四兩水銀二兩右依次第用各粗剉勿令大細免煎易焦黒先以清油四十兩於鐺内鍊令香熟下雲母用栁錍不住手攪候十數沸即以罩篱漉出次下消石亦凖前法次下栢葉焦黄色為度亦漉出一味味前相次下栁槐枝次下塩花及人参諸藥候藥盡後提鐺離火待㣲冷以綿濾過再入鐺内便下塩丹急以栁錍攪湏㬰色變即止却将鐺火上加火煎之色黒稠以栁錍取少許滳水上凝結不㪚不粘手是藥已成先湏炙一磁噐令熱即下藥仁内候膏藥如人體温方入麝香仍以絹袋子盛水銀以手彈膏藥上如有頭細再以栁錍攪匀皆是飬藥母也如人收此藥内身以蠟紙裹不令風乾可三二十年並無損動若發背先以敗蒲三觔用水三升煮三五十沸將蒲湯洗瘡拭乾貼藥一兩分為三服温酒下未成膿者立差乳癰瘰􅊓骨疽毒穿至骨者同藥一兩分作三分温酒下甚者即㵼出惡物兼貼外差腸癰以藥半兩分為五服用甘草湯下未成膿者當時便消已成膿者膿隨藥下膿出後每日酒下五丸如梧桐子大膿止即止風根貼兩太陽穴一切惡虫咬外貼留瘡口發腦發髭鬢發眉發耳臍癰牙疼並外貼腎癰馬墜傷筋骨痛不可忍者但以酒下半兩老少臨時加减外更膏藥包裹當時痛止箭頭在内不出者外貼每日喫少爛菉豆箭頭自出虎豹所傷先以甘草湯洗然後貼膏每日換不過三貼犬咬外貼又以生油下十丸如梧桐子大難産二三日不分免者温酒下一分血暈欲死以薑汁和小便半升温酒下十丸死胎在腹以榆白皮湯下半兩小腸氣炒蘹香子温酒下婦人血氣當歸酒下中毒藥者洗襪酒下各一分許中毒之人即吐㵼出惡物一切腫癤瘤贅藥利即差只忌羊血餘無所慮藥八味看㸃者杵羅為末與黄丹同入神效囬生膏治癰疽癤毒逺近膁瘡打撲顛折傷損腫毒發背刀斧所傷箭頭在内蛇犬所傷並皆治之槐栁桃榆桑枸杞已上各二十條每條長二寸通計一百二十條嫩者剥取皮白芷白芨白歛當歸大黄黄蘖赤芍藥杏仁萆麻子已上各一兩半黄丹十二兩血竭䧺黄乳香没藥已上各五錢輕粉二錢右先将前六味樹條皮用清油三觔文武火大砂鍋内煎令津液盡為度将油濾過却將白芷等九味剉碎再下於前油内浸透用慢火煎焦去滓再将油濾過却将黄丹分作三次下油内熬令黒色滳水中不㪚為度將血竭等為極細末待油㣲温下於油内以磁罐盛之盖口埋土内三日去火毒任意攤貼患處二日外自覺病退其効如神膏藥方川當歸去蘆芍藥川芎黄蓍香白芷黄芩黄連黄蘖皮桑白皮白芨白歛蓬术南木香皂莢去子升麻栝蔞根木鼈子㯽榔杏仁藿香没藥各半兩巴豆一錢川山甲二錢肉桂半錢白膠黄蠟各一兩已上二十四味剉為細末和匀以好澄清油半觔将黄蠟白膠於鐺内煎鎔却下煎藥於内煎令焦黒使棕皮濾去滓再将熟藥油入凈鐺内却用黄丹四兩乳香末五錢射香半錢細研右用煎藥遂匙挑在油内不住手以箭簳大栁枝攪火上鍊至黒色時復滳在水盞内若成珠子不粘手即傾出磁噐内盛了任意攤用貼之除炙瘡有瘢癤外但一應惡瘡貼之並無瘢跡修合時湏於凈室忌婦人僧鷄犬猫畜見萬金膏治癰疽發背諸般瘡癤從髙墜墮打撲傷損脚膝生瘡逺年膁瘡五般痔漏一切惡瘡又士專治發背方神妙不可具言有祁覺或做瘡用牛皮膠熬令稀稠得所如藥化攤在毛頭紙上於初覺處或有做瘡處貼次用軟布帕子二條於釅米醋内煮令熱漉出互相於膠紙上乘熱蒸熨不可令布帕冷布帕二條不可都齊漉出常留一條在醋内煮候蒸熨得一條冷却於醋内取熱布却入醋内煮庶㡬常得熱布替換熨蒸即易見効若瘡癢時乃是藥攻其病湏思癢不止蒸煮真候膿出將盡即濃煎貫衆湯候温洗去膠紙次日後依前更洗若尚有膿又如前法蒸熨准連數日蒸熨不防但要瘡中膿盡瘡成乾掩為度然後用生肌紅玉㪚糁在瘡上即以萬金膏貼每日一上或兩上每再蒸熨並如前先鋪膠紙於瘡上熨了亦如前用貫衆湯洗去膠紙龍骨鼈甲苦参烏賊魚骨黄蘖草烏頭黄連猪牙皂莢黄芩白歛白芨木鼈子仁當歸厚朴去粗皮川芎香白芷没藥另研槐枝栁枝並同剉碎各一分乳香另研一錢黄丹一兩半清麻油四兩冬月半觔右除黄丹外銀石噐中將諸藥於油内慢火煎紫赤色去藥不用却黄丹一半於油内不住手攪令為黒色更入於黄丹不住手攪湏是慢火熬令紫黒滳在水中不㪚及不粘手然後别入黄丹少許再熬沸如硬時却硬入油些少以不粘封為度用時量瘡大小攤紙上貼之專治諸般惡瘡内加自然銅肉桂一分一方無當歸大乙膏黄丹四兩木鼈子九枚去皮巴豆九十箇大摩七十箇去皮栁枝槐桃枝各二兩香白芷一錢蒼术隨用杏仁隨用川山甲一箇清油半觔没藥川芎當歸人参乳香輕粉已上六味各一錢黄連黄芩黄蘖銅青俱隨用右藥依法煎熬普濟方卷三百十四
