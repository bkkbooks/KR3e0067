body:
  text: 普濟方卷三百十四明周王朱橚撰膏藥門諸瘡毒腫方金絲膏治諸惡瘡清油半觔白膠香赤者七錢半白者七錢半膩粉冬用七箇夏用八箇湏臨安者韶粉半兩右細研入油内用銀噐文武火熬以向南栁枝作小把攪成膏如琥珀色於白椀底上試不㪚為度如湯盪火燒金瘡用雞翎掃之如久患惡瘡口含漿水洗凈或麺圏瘡口傾藥在内痛立止如刀斧所傷傾藥在上定疼止血愈無瘢痕聖應膏治諸腫惡瘡疽腫毒疼悶槐枝一觔巴豆二枚木鼈子仁二枚當歸一錢右用好油三兩半下銚内煮十沸滓不用却下黄丹一兩半慢火上錬以鉄冷試之硬軟盛磁噐内每用旋攤翠玉膏治軟癤膿水逗流愈後復發明瀝清四兩銅碌二兩芝蔴油三錢徖豬膽三箇右先於炭火上鎔開瀝清入油令沸下膽汁攪勻入水用手摶搦磁盒内收每用於緋帛上量瘡大小攤貼不湏再換自落為度乳香膏一名大紅膏瀝清一觔黄丹十兩乳香二兩油不以多少添裁用右藥先用瀝青以銀噐内慢火熬開鉄鍋子攪覷時月㸔硬軟旋入油硬軟恰好次用乳香攪勻綿濾過次入黄丹再攪勻盛磁盒内每用熁過熱鉄錍攤厚紙上貼烏金膏治一切惡瘡腫麻油一觔鉛丹四兩煉過白蠟四兩頭髪鷄子大一塊右先炒鉛丹黒色即下油及髪以栁木錍不住手攪滳水中侯可丸即止便下蠟更煎銷後即盛磁噐内隨大小攤貼烏金膏治一切惡瘡發背毒腫油半觔塩花一兩黄蠟三兩栁枝二兩剉右先熬油令沸下栁枝煎候焦黄漉出綿布絞去滓再煎下蠟塩花以栁錍攪稀稠得所磁盒盛如用故帛上攤貼若三日内未成膿便消已成膿頭未破即潰不湏鍼炙其瘡變痛成癢是藥力也色如皮濈黄水若是惡瘡發背用藥貼出膿血及黄水赤小豆汁盡為度烏賊骨膏治一切瘡腫烏賊魚骨去甲研末舊鉛灰研末各一兩鉛丹三兩研清油十二兩右先熬油令沸下鉛丹以栁木錍攪候黒色即将前二味下再攪勻滳水内成珠得所磁盒盛放故帛上攤貼日三一方有麝香楸葉膏治發背癰腫惡瘡右先取馬齒莧楸葉以水五斗煎至一斗濾去滓更煎至一升半下二味藥末栁錍攪候稀稠得所故帛上塗貼日二生肌膏治發背腦疽膁右取婦人梳下油頭髪一兩半油二兩熬髪稀爛去滓滳水中成珠不㪚下丹一兩冷定下輕粉三錢磁噐内放之鐵鑵膏治一切惡瘡内毒止痛追毒去死肉桑柴灰蕎麥稭灰石灰各一椀右用瓦鑵一箇傍鑚一孔塞住前傾灰填鑵内用水注滿著厚紙封固一復時用芙筒挿在孔内細淋之盡其水去灰將水於小鍋内慢火熬用鐵片頻攪休暫定㸔調稠滳水中不㪚為用鐵鑵子盛封定口或有諸般惡瘡及腸風痔瘻量瘡用度遇仙膏治癰疽發背毒瘡川五靈脂白芷貝母各半兩當歸二錢半右用麻油六兩剉細栁枝二十四寸同上藥入磁銚一宿慢火煎栁枝攪色黒焦入肥白巴豆二十一枚木鼈碎五箇攪煎令黒頓冷爐生絹濾再煖入蠟半兩鎔盡再下火入凈虢丹二兩半更換栁枝急攪候色黒滳入水成珠入乳沒末各二錢拌和傾磁噐候凝覆泥地三日貼服皆好栁枝止痛百靈膏治癰瘡久不痛槐花子炒焦為末松脂各一兩乳香膩粉各一兩右細研拌勻用清油黄蠟各一兩磁噐内慢火熬成膏貼之大乙膏治癰疽發背惡毒虢丹二兩半男生髪洗焙二錢木鼈子仁碎三枚肥白巴豆十八粒肉右用麻油四兩慢火先煎巴豆木鼈髪團更換栁枝攪准髪耗五分頓冷爐絹濾再煖入凈虢丹換栁枝頻攪候色變滳水中右将甘草根節剉成叚椎破内留一條長者攪藥用銀石噐入油甘草同焦黄取出不用入黄丹以前所留長甘草不住手攪如黒色㸃少許入水試候成膏不㪚用綿濾滓入鉼封閉令宻坎地上埋二寸許二十日取出臈月合妙發背如梧桐子大五十丸甘草湯下傅貼如常法金絲萬應膏松香一觔香油四兩五積㪚二兩右用油煎藥黄去滓入松香槐栁條攪數沸候冷濾水中㧞百徧就水飬之日換凉水三仙膏治一切惡瘡麻油四兩鉛丹定粉各研一兩右先錬油熟将鉛丹定粉同羅過同煎用槐枝攪勻候稀稠得所滳水内如珠即止每用隨瘡大小貼之貼毒膏治一切癰疽上攻下座風毒瘻瘡疼痛方見本門金瘡類靈䑕膏治諸瘡腫右以大䧺䑕一枚用清油一觔慢火煎䑕焦水上試油不㪚即以綿濾去滓澄清再拭銚令凈仍以慢火煎油次下黄丹五兩炒紫色栁木錍不住手攪令勻又於水上試之候凝即下黄蠟一兩又煎滯黒色方成膏收貯於磁盒内候硬合地上出火毒三二日傅白膏治一切無名腫毒發等疾萆麻四十九粒去殻嫩松脂一錢滳乳半錢用鐵斧於石砧上推為膏乾濕得所隨意加减松乳攤於紙上貼之成珠隨意入乳香末再煎沸傾入磁噐候凝覆泥三日貼用凡修合於宻室中勿令猫犬婦人見靈應膏治五發惡瘡瘰􅊓結核乳癰白歛五兩鹿角十兩燒存性白麥飯石五兩燒醋淬七次右為細末每用釅醋中熬如膏厚塗於上中心留一竅以出其毒或故舊軟布攤貼未成膿即消已成膿便潰惡瘡疾出新肉早生白芨膏治螻蛄瘡良薑白芨瀝青各等一分右為細末嚼芝麻水同熬為膏入冷水共淀用緋絹一片攤作膏貼瘡上烏麻膏治諸惡瘡一十三般疔腫五色遊腫癰癤毒熱狐刺蛇毒狂犬虫狼六畜所傷不可識者二十年漏金瘡中風皆以此膏貼之惡膿盡即差止痛生肌一貼不換惟一日一度拭去膿再貼生烏麻油一觔黄丹四兩蠟四分皆大觔大兩右以臈日前一日從午内油鍋噐中㣲火煎至明旦看油减一分下黄丹消盡下蠟令沫消藥成至午時出惟男子合之毋令小兒婦人六畜見白膠香膏治一切軟癤右用麻油半盞先將巴豆煎黒去巴豆入先二藥再煎至令勻乘熱傾入水中為度用緋帛攤貼萬金膏治一切癰癤毒大甘草節四兩剉去皮真麻油八兩黄丹四兩未攤只用水浸貼之便癢癢後即㪚紅膏治軟癤癰腫風濕疼痛惡瘡瀝青白膠香各二兩黄蠟三錢右同於銚内煎化量用麻油三錢許煎濾於水盆中揉成劑收之每用於水内捻作餅子隨瘡大小貼之上傅以紙如當歸一兩於内煎令黄色去滓於水盆内取出揉成劑再加乳香末各二錢和為乳香膏其加責黛名青金膏其加虢丹即名紫金膏用功一而已矣神應膏治癰疽發背惡瘡龍泉光粉二兩真麻油三兩右慢火同熬更換栁枝頓攪滳入水成珠子方入白膠末少許徐徐傾入磁噐以水浸二日抄紙攤貼一方白膠香水晶膏治疔瘡背疽瘤疽妳癰丹毒杖瘡等疾好白油草紙十張每剪作八片鷹爪黄連一兩去湏細剉用水兩椀許入砂鍋内同黄連煎至一椀半先下油单紙五張又續下五張同煎五七百沸湯耗旋添不得犯鐵噐漉起擦去黄連滓屑焙乾如瘡破有膿将藥花旋鬆貼如杖瘡約度大小恪好剪貼不可太大先将鍋内煎下油单燒灰熱酒調嚼生薑送下次貼藥不得犯女人手水宂金絲膏治一切惡瘡瀝青白膠各一兩春秋用油夏用油蠟二錢半冬用油蠟四錢右鎔開油蠟下瀝青白膠用槐枝攪勻綿濾過滳冷水盆中以手扯一十餘徧其膏軟硬得宜然後収住凡用如瘡透了可喫數丸亦作劑於瘡内填之亦將膏藥攤於紙上貼之勿令火炙黒神膏治諸般瘡腫痛用酒二大椀皂莢一觔去皮粒搗碎熬至半濾去滓再用前汁入銀石噐内熬為膏随患處貼之歸命膏治發背用野生茄子熟黒者取子不拘多少爛研取汁以絹濾去滓入大銀盂内慢火熬成稀膏以細青竹枝去葉五七莖扎聚不住手攪候成稀麺糊收之時用不問隂陽二證發背或一不一或有無頭或癢或痛皆可用之如無頭無異色或熱不熱一發從外漸漸傳入如有赤脉有頭先從去脉傳之漸漸出一日上三四度䧺黄膏治一切癰疽發背腦癰諸毒瘡又妳癰疼痛䧺黄二兩細研黄茋三分漏蘆絡石續斷菅實紫葛漢防己各三分桑寄生商陸連翹白歛赤芍藥敗醤川升麻莾各半兩當歸苦参木通紫苑去土芫花藜蘆去蘆頭白芨䕡茹各二兩黄丹十五兩蠟四兩清油三觔右藥剉碎以酒二升拌一宿先取油安鐺内慢火煎令熱即下藥前白歛赤黒色漉去滓下蠟候鎔以綿濾過拭鐺却将油入鐺内下丹於慢火上栁錍不住手攪變色黒滳水内為珠則膏成矣去火下䧺黄末調勻傾磁盒中如用故帛上攤貼日易之黄丹膏治癰疽發背癰腫風毒一切瘡癤内消止痛黄蠟二十四兩㣲炒細羅麻油二觔半猪脂八兩臘月者松脂四兩紫菀一兩去土當歸防風黄参莨菪子各一兩棘針四十九枚頭與者青緋帛各二尺燒灰人糞灰一兩青白葉一兩蝪蜥七枚亂髪如雞子大蠟五兩葱連根二十莖右藥剉碎先下油脂於鍋中煎令鎔次下藥以文火煎半日次下松脂蠟香候熟以綿濾去滓却入油於鍋中内黄丹不住手攪勻候色變紫色收得力盡軟硬得所用磁盒盛攤故帛上貼之通神膏治一切癰疽發背惡瘡瘻瘡䧺黄二兩細研黄丹八兩細羅蠟六兩膩粉半兩没藥一兩騏驎竭一兩麝香一分細研桑枝四兩槐枝四兩蝪蜥三枚當歸三分芎藭三分白芷三分木香三分沉香半兩欎金半兩烏蛇内三分藁本一兩細辛三分桂一兩半麻油二觔右藥細剉先取油傾於鐺中以文火煎令熟下剉藥煎候白芷黄黒色以綿濾過拭鐺内煎令鎔即入藥於油鐺中次下黄丹次下諸藥末不住手攪稀稠得所滳入水不㪚即膏成以磁盒盛宻封閉懸於井底一復時出火毒每用攤在故帛上貼日二易之抵聖膏治一切惡毒瘡腫木香細辛續斷莾草槐枝木鼈子去殻栁枝各一兩陳油一觔半黄丹四兩宻陀僧蠟一兩槐松脂野狐膽乳香騏驎竭腽肭臍阿魏没藥各一分麝香二錢右藥先将前七味細剉入油煎令烟盡綿濾去滓却将後藥除丹蠟脂外為細末先於銀鍋内熬油令沸下丹以栁木錍攪候變黒色即下諸藥末攪勻於地坑内出火毒一宿煎時切忌水落藥中如有發背每日空心酒下七粒如梧桐子大只一服止更於故帛上攤貼日二易之紫金膏治發背癰疽乳癰穿瘻一切惡瘡結腫疼痛紫栁一兩石菖蒲半兩獨活半兩白术三分防風半兩去蘆頭附子三分去皮臍白芷一兩木鼈子仁一兩半漢椒半兩杏仁一兩湯浸去皮尖䨇仁半夏三分桂心三分騏驎竭一兩細研没藥三分木香半兩甘草三分赤芍藥半兩白芨三分沉香半兩麝香一分細研朱砂二兩細研龍腦半兩細研黄蠟三分乳香一兩甘松香半兩零陵香半兩白檀香半兩甲香半兩猪脂一觔半羊脂一觔半右藥剉碎以酒二大盞拌一宿取猪羊脂安鐺内煎沸下諸藥以文火熬候白芷黄黒色下蠟候鎔綿濾過入磁盒中下騏驎竭麝香朱砂龍腦等攪勻故帛上塗貼日二易之大垂雲膏治一切惡瘡焮腫當歸附子去皮臍生用芎藭防風川升麻槐子細辛去苖側栢葉桃仁湯浸去皮尖䨇仁甘草杏仁湯浸去皮尖䨇仁桑根白皮白芨黄蓍白殭蚕各一分垂栁一握黄丹七兩䧺黄半兩朱砂一分細研硫黄一分細研麝香一錢細研白芷一分没藥一分騏驎竭一分細研龍腦一分細研黄蠟四兩切碎油一觔半右除研藥并丹外細剉先熬油沸下剉藥煎候白芷黄赤色以綿濾過拭鐺令凈再煎下再以栁木錍攪候變黒色即下蠟鎔盡滳於水中為珠不㪚即次下諸藥末攪勻以磁盒盛如發背瘡熱酒調一錢服外貼之瘰􅊓漏見骨貼之疽瘡風腫疥癬腸癰妳癰髪鬢牙癰發腦腎癰馬墜搕破骨損貼之一切虫蛇毒物咬之並貼虎豹咬者用甘草水洗貼垂雲膏治發背乳癰及諸瘡腫亂髪一兩黄丹六兩緋絹方一尺二寸燒灰松脂二兩曲頭棘針五十枚丁香半兩末蠟一兩塩一兩柴胡一兩去苖黄蓍一兩乳香半兩細研莨菪子二兩清麻油一觔驢耳塞半兩右藥錬油令烟絶即下緋帛髪松脂蠟等煎令髪盡