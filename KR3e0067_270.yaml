body:
  text: 普濟方卷二百七十明周王朱橚撰符禁門禁瘟疫法附論夫傷寒者熱病温病時行疫癘所感不同其症相類率皆風邪毒氣之傷人也湯液醪醴鍼石灸熨皆有正方若乃從心定氣稱誦神名丹書符印為驅除禳辟之法使神藏安寧邪氣自去夫豈小補哉訣法養生方導引法常以雞鳴時存心念四海神名三遍辟百邪止鬼令人不病東海神名阿明南海神名祝融西海神名巨乗北海神名禺强又云存念心氣赤肝氣青肺氣白脾氣黄腎氣黒出周其身又兼辟邪鬼欲辟却衆邪百鬼常存心為災火如斗煌煌光明則百邪不敢干人可以入瘟疫之中又云封君達常乗青牛魯女生常乗駮牛孟子綽常乗駮馬尹公度常乗青騾時久莫知其名字為誰故曰欲得不死當問青牛道士欲得此色駮牛為上青牛次之駮馬又其次也三色者順生之氣也道士乗此以行欲路除百物之惡精疫氣之癘鬼將攝之焉千金翼禁時氣瘟疫病法一日十禁防難為人施無限也天封無以徳地封無以道吾奉天威取地武吾遇石石爛按結結散左達右貫骨達體追病所在何邪敢進進者斬死北斗七星飲如血叱叱滅手下急急如律令禁時氣法出禁沐浴身體令淨去瘟疫惡鬼九真行道邪氣敢當元氣洞達百鬼消亡伏羲女媧五疽地主流入四肢主作千病萬病上氣虛寒皆以風邪鬼所為急按滅絶手下急急如律令出病家門禁法從病家去出門時三步御禁閉氣左轉而去然後呪之曰一畫成湖再畫成海斬汝黄奴老古頭不得追吾天師祭酒之後急急如律令便以左手畫背後地而去勿回顧禁疫鬼文吾上知天文下知地理天地夫人教吾禁名能禁疫氣鬼汝從東來名曰狗入人身中倚於心中神師呪汝汝自走汝從南來名曰羊入人身中倚於肝腸神師呪汝汝自亡汝從西來名曰雞入人身中倚於皮神師呪汝汝自衰汝從北來名曰蛇入人身中傍於百脈神師呪汝汝自厄科斗七枚在吾目前口是天門不得枉開若唾東方甲乙木木折若唾南方丙丁火火滅若唾西方庚辛金金缺若唾北方壬癸水水竭若唾中央戊己土土裂六甲六乙疫鬼自出六丙六丁知鬼姓名六戊六己疫鬼自止六庚六辛知鬼東西六壬六癸疫鬼自死六亥六戌百鬼速出急急如律令禁時氣瘟疫法東方青瘟吾肝中之氣南方赤瘟吾心中之氣西方白瘟吾肺中之氣北方黒瘟吾腎中之氣中央黄瘟吾脾中之氣五方瘟在吾身中不得動作即師在實急急如律令度惡世禁法一日十念度惡世也東方青帝甲乙君南方赤帝丙丁君西方白帝庚辛君北方黒帝壬癸君中央黄帝戊己君千乗萬騎䕶衞吾身前有萬石桃湯後有萬隊將軍主斬黄奴之氣鬼於近我者吾祭酒父長甲母哥仲語我使吾萬厄之中不近我急急如律令禁時氣却疫法一日十念萬惡不近人也吾是天師祭酒當為天師驅使頭日月北斗七星吾有乾虛之兵十萬人從吾左右前後吾有太上老君天地父母在吾身中左手持節右手持幢何鬼不聞何鬼不走邪不去何不住急急如律令禁時氣瘟疫法吾頭帶朱雀足履𤣥武左伏青龍右伏白虎前有萬石鑊湯後有虎賁猛士天騶甲卒在吾前後黄奴之鬼去我萬鬼急急如律令禁瘟疫法咄汝奴黄奴老古知吾初學道出外東方千城萬伋上紫宫虛鋼百鍊之劍利如鋒芒斬殺凶梟截不祥叱汝黄奴老古先出有禮後出斬你叱叱急急如律令唾時頭疼法南越太公還故鄉壬申之唾自有方神師所唾太上白一皇天使者督察不祥成若天海唾若雪霜當吾者死值吾者亡鬼精魍魎自受其殃急急如律令禁病勅粉大法禁生亦得粉在紙中為神粉舉手以摩體百鬼走出魑魅魍魎應聲散走出天黄老教我唾粉腹中跳眼五臟安穏録保三氣道保精神急急如律令禁瘟鬼法天門停長外都使欲久卿縛鬼士非子法住左手持刀右手持斧斫黄奴瘟病之鬼何不走去前去封侯後出破頭急急如律令勅瘟病符法畧同前禁瘟病法天門停長捕鬼使收治九醜捉縛鬼子疫癘黄奴何敢居此值吾者亡當吾者死何不速去奔千里急急如律令右已上符並依符下說文用之勅治寒熱符呪曰咄南越公還故鄉神符所到立有驗方太白太一督察不祥寒熱之鬼值符消亡急急如律令驅辟五方瘟魔呪一道北帝驅五方瘟魔大神呪曰東方青瘟腐木之精九夷老炁因春化生神不内養外作邪精木毒之氣入人身形或寒或熱舉體不寧九醜之鬼知汝姓名北帝神呪攝録汝精四明破骸北斗然明神刀一下萬鬼自刑邪瘟衆病不得妄生西方金精滅汝身形伏在肝中不得動傾急急南方赤瘟大火之精八蠻老炁因夏而生神不内養外作邪精火毒之氣入人身形或寒或熱舉體不寧三醜之鬼知汝姓名北帝神咒攝録汝精四明破骸北斗然明神刀一下萬鬼自刑邪瘟衆疾不得妄生北方水精滅汝身形伏於心腑不得動傾急急西方白瘟死金之精六戎老炁因秋而生神不内養外作邪精金毒之氣入人身形或寒或熱舉頭不寧七醜之鬼知汝姓名北帝神呪攝録汝精四明破骸北斗然明神刀一下萬死自刑邪瘟鬼魅不得妄生南方火精滅汝身形伏於肺中不得動傾急急北方黒瘟枯地之精五狄老炁因冬化生神不内養外作邪精水毒之氣入人身形或寒或熱舉體不寧九醜之鬼知汝姓名北帝神呪攝録汝精四明破體北斗然明神刀一下萬鬼自刑邪瘟鬼魅不得妄生中央土氣滅汝身形伏在腎宫不得動傾急急中央黄瘟糞土之精四季之炁内王而生神不内養外作邪精五土之氣入人身形或寒或熱舉體不寧五醜之鬼知汝姓名北帝神呪攝録汝精四明破骸北斗然明神刀一下五鬼自刑邪瘟魍魎不得妄生東方木精滅汝身形伏在脾中不得動傾急急五瘟疫毒收付七星東方録魂一付天廷西斗收魄知汝姓名急消急去天帝吏兵張羅布網乗駕火車吞魔食鬼縳汝精祟何神不走何鬼敢當呪神神自滅呪鬼鬼自亡千千皆截首萬萬悉斬頭急急如律令北帝曰下元生人若男若女受持吾呪及醫萬民皆沐沭浴身心依科行法祭醮七元神衆須清淨香果佩行符受吾神呪専心不二則七真下降神符潛服願從心無不成遂若人受持吾法心不精専徒有千金終無服效禁瘧法附論夫瘧之為疾有感於天時者有因於人事者有得於鬼邪者内經曰夏傷於暑秋必痎瘧此感於天時者也許人則謂痰癖積聚居濕飲冷皆致是疾此因於人事者也韓愈謂乗秋作寒熱繼之以符詛之説此得於鬼邪者也三者所感不同其症相類發作無時或一日三兩發寒熱或間日一發心神恍惚喜怒無恒或差而復作或减而更増經久不瘥連綿嵗月令人羸湯液醪醴鍼石炙熨皆有正方若乃存心定氣稱誦人名丹書符印為驅除禳辟之法使神藏安寧邪氣自去固非小補焉符法受禁瘧法候燕初來時以一紙張濃㸃筆於紙上望燕没乃上後若瘧病人來向云我患瘧即語我與你治你但去隂押取一㸃塞壁孔中即愈又法正月元日呼牛馬時火下將筆閉氣多書紙上作鬼字氣盡力上瘧病欲發時押取一鬼字與吞之即差治瘧符凡用三符瘧小兒父字石杖母字石鎚某甲著患人姓名患瘧人竊讀之曰一切天地山水城隍日月五星皆敬竈君今有一瘧鬼小兒罵竈君作黒面奴若當不信看文書急急如律令右件符必須真書前後各留白紙一行擬去竈君額上瓦石壓之不得壓字上勿令人近符或専人遣看符亦勿令壓𫝊符上若明日日出後發須令人夜掃竈君前及額上淨至發日且令患人整衣冠立竈前自讀符或使人讀必須分明讀勿錯一字每一遍畢患人跪一拜一手振衣云病人姓某甲如此三遍了以瓦壓石兩角字向上著竈上王良符張季伯書之急急如律令右符依書長卷兩手握之念佛端坐呪瘧鬼法登高山望海水水中有一龍三頭九尾不食諸物惟食瘧鬼朝食三千暮食八百食之不足差使來索符藥入五臟瘧鬼須屏跡不伏去者縳送與河伯急急如律令一云登高山望海水天公下捕瘧鬼咄汝不疾去吾家有貴客子名破頭如東山軀如山澤不食五穀但食百鬼朝食三千暮食八百一鬼未足催促來索急急如律令禁瘧連年不瘥法於淨處平地以手小指畫地作鬼字口中隂道病人生時年月日姓名以磚覆之勿令知之令三七日不開永差如三七日後開其病還復發若治必須知法時逆前預治勿使患人知之丈夫左手畫之女子右手畫之隂為之勿使人知大騐禁瘧法日正中時正南立取西北桃枝結項兩手脚灰達三匝中心立刀曰頭上戴九天兩手把九宫弓兩脚履九江腹安四神皆出自然吾生食天育養四神上得精禁能轉人身蜈蚣蟒蛇上殺汝身并鬼子孫急急如律令禁瘧法先取一平磚令病人在無人處不得見人大從月建向月破以磚磨地令平以手按磚四角使不動還以手發磚立在前可磚下書北斗傍置三台外盡孤虛直取旬孤虚其北斗中畫作小鬼患人姓名年幾置下在斗柄中呪曰小鬼字某甲年若干你從台八斗瘧鬼㫁後若患人時頭上先下若非患人時頭上先下若無逆順平下磚訖若患人日一發以手二七下打磚若隔發三七下打磚三日一發以上四七下打磚訖取磚傍土擁磚後左手取一把土散磚上而去慎勿反顧大驗又以故筆畫六方尺中畫作北斗形皆以北斗相應其魁衡必令開門以身左行向斗魁閉氣並足俱前而立呪小鬼曰吾令出天門入地戸不得從我去住遂出建上之門急去不得反顧却差三七日不發與人治患還得此患必用此治欲令患人還發二七日内祛之發還取患人發以足蹴磚呪曰小鬼爾徒斗入台瘧疾還迴即發勅禁瘧法書桃枝一尺欲發即用噀病人面誦呪文二七遍擊著頭上呪曰天姓張地姓皇星月字長日字紫光南山有地地中有蟲赤頭黄尾不食五穀只食瘧鬼朝食三千暮食八百少一不足下符請索語你速去即得無殃汝若不去縳送魁罡急急如律令禁瘧法閉氣當心書此兩字書上立瘥甚驗干療瘧法未發前抱大雄雞一隻著懷中時時警動令雞懷中作大聲無不效書瘧法平昔日未出時閉氣書之先書額上作戴九天次書兩手心作把九江又書背上從右脾骨下向左分作兩行書之一如後法南山有一木木下不流水水中有一㸃三頭九尾不食五穀唯噉瘧鬼急急如律令又書兩脚心下作履九江又法令所患人未發前正南北眠頭下心五星并額及舌上七處閉氣鬼書字則瘥隨意任東西又法總書八行其下七行通而為八山題予山題予山題予山題予山題予準前計更有七行通前為八行此符厭瘧鬼一去千里外急急如律令某年某月某州某縣某鄉某里姓名牒姓名則所患人也右以手把手勿開男左女右待過時久然後任開其符仍以燒却呪瘧法候病者發日日未出自熱一石於水濵一氣呪云眢眢團團行路非難捉取瘧鬼送與河官急急如律令即投石沈於水中勿反顧而去又書治瘧法額上書兩金字重胸前書兩火字並背上書兩水字並兩手書木字單兩足下各書土字臍下作四口字重右含水閉氣用硃書未發前書之有驗禁瘧病久不瘥右用淨筆硯水墨焚香度筆書南無勇力戰鬭佛心急急如律令奉勅攝十五字於油餅麵餅上令信者病人喫或用淨紙一張書十五字上用左搓麻繩結七個紇結紙帶男左女右臂上病愈神佛前香火焚之無棄於地治瘧法破一大豆去皮書一片日字書一片月字左手持日右手持月吞之立愈向日服之勿令人知也獨勝丸治瘧疾以桃仁一枚和皮尖雙仁者劈作兩片内書奉勅斬鬼一片内書奉勅殺鬼字却合作一枚以線結定五更新汲水吞下治瘧病方日始出時東向日再拜畢正長跪向日乂手當閉氣以書墨注其管馬兩耳各七注又丹書舌上言子日死畢復再拜還去勿顧安卧勿食過發時㫁即瘥禁尸注法附論夫太素真人保命論曰胃中有三尺九蟲變為諸蟲約百千數分居胃中或大小腸間若能清淨恬澹胎根内守則尸蟲自滅撓動貪競神氣外馳則尸蟲自熾滅則可登耆壽熾則自致夭傷是知尸注之病皆本人之尸蟲及邪氣感通流注而致也故靈寶方論合尸注為一疾方藥治法藥固備載然血氣者人之神本正而不邪苟邪氣附著為病湯劑有不能獨效者則符呪妙術亦安可廢觀養生方謂諸濕食不見影食之使人或卒注豈非有所疑而邪氣之故然耶舉此則諸尸疾狀與夫九十注之候可一理而得法去三尸惡夢呪九天上帝四門八虛七政二元三素九精大桃康上請三清告帝君攝命命寧速召七魄收拾神庭若有不祥七星神兵但呼真虛流燭鍊形斬伐邪精二神和柔血尸流靈神歸絳宅觸向利清使我神仙長保百齡急急如律令朝夕長念能去三尸消三尸鍊七魄法并呪太虛真人口訣曰以春乙夘日夏丙午日秋庚申日冬壬子日㝠臥時擣取朱砂須鮮明者雄黄水磨者硫黄三物以綿裹之如棗大臨臥時以塞兩耳中此消三尸鍊七魄之秘法也勿使人知之明日日中以東流水沐浴畢易新衣於淨室中安床枕平臥向上閉氣握固良久而㣲呪曰天道有常改故易新上帝吉日沐浴為真三炁消尸朱黄安魂寶鍊七魄與我相新此道是消鍊尸穢之上法改真易形之要訣但四時各取一日為之拘三魄法并呪每月三日十三二十三日夜臥伸足叩齒三呼三魄名曰虛爽曰胎光曰迷精住去枕伸兩足交手心上閉氣三息叩齒三存心中赤如雞子從内鍊三魄胎光安寧神保玉身内外動徹覺身中小熱呪曰太微立宫中皇始清内鍊三魄胎光安寧神保玉室與我俱生不得妄動鑒者太虛若欲飛行唯宿上清若有飢渴得飲過水玉精制七魄法每月一日十五日晦日夜伸足以掌心掩兩耳令手指接於項後閉氣七息叩齒七通心存鼻端白氣如小豆須臾漸大灌身上下九重氣變或上咽内青龍在目中白處鼻孔中皆向朱雀在心向外口𤣥武在兩足下兩玉女在兩耳中著綿衣手抱火但在想心魄不去矣禁注法吾從天南來至北食監三斛飲千萬水經江量海手捉岳口含百毒心懷蚰蜒唾地陷穿唾石碎裂唾火滅烟唾鬼即死唾水竭淵東方之注自名醫入人體中注心根神師呪注注滅門南方之注自名青入人體中注百脈神師呪注注即易西方之注自名摇入人體中注脊腰神師呪注注即消北方之注自名雌入人體中注心脾神師呪注注即移中央之注自名雉入人體中注十指神師呪注注即死五方之注盡已出惟我五臟永安强急急如律令禁注出血法三遍七遍急噀之東方之注自名羊入人體中注腸神師呪注注即亡南方之注自名狗入人體中注心口神師呪注注即走西方之注自名雞入人體中注心臍神師呪注注即迷北方之注自名魚入人體中注六腑神師呪注注即無中央之注自名雉入人體中注心裏神師呪注注自死謹告病人身中諸注殃若在心中及胃腸大或四肢并中央謹告四方諸關節急送血殃三焦關元下部膀胱若有若無不出者亡速去百年毒神符欲居汝處急急如律令又法注父張注母楊注兄清注弟强注姊姬注妹姜知姓名得汝宫商何不逺去注何所望前去封侯後出破頭前出與嘗後出與杖汝今不去住何所望急急如律令又禁注法東方青帝食青色之注南方赤帝食赤色之注西方白帝食白色之注北方黒帝食黒色之注中央黄帝食黄色之注五帝之神食十二注北斗七星食一百二十注或食土公注或食土母注或食土子注或食土婦注或食土孫注或食土孫婦注或食生人注或食死人注或食飛遁注大注小注滅急急如律令又禁注法二七遍東方青注南方赤注西方白注北方黒注中央黄注五方五注何不速去雷公霹靂欲居汝處吾唾山山折唾石石裂唾火火滅唾水水竭吾唾五毒隨口消滅急急如律令呪注文咄吾是泰山之子今為泰山所使口如天門不敢枉張唾如毒藥氣如秋霜當吾頭者俱死亡五注之鬼速出速去不得留藏急急如律令此呪當晨朝日初出時遣病人淨洗手面向東方至心禮泰山訖更以水洗手至心合掌正西立師當在東正病人面向西立以此呪之七遍便愈若不愈者明晨更如是呪之不過三朝無不愈者禁唾飛尸入腹急切痛法請天上飛龍窮奇白虎眼如明星腹如建鼓齊切叩齒主食惡鬼入食飛尸出食殃魅人生於天吞氣受道身形之中非汝所處形中五部各有所生肝為青龍肺為白虎心為朱雀腎為𤣥武脾為中府立御四方上有真人赤成童子下有咸池青腰玉女各守部界不得留住方名道人教來汝治頭則法天身法北斗手為魁罡口為金斧主援六甲直神縳汝何鬼不走何尸不走急急如律令按摩卒中注忤魍魎法配隂脈十二陽脈十五二十七脈隨手上下脈一通知汝有若男祥女客死不葬骸骨消散流離道傍驚恐馳走責人酒漿南山有一人窮奇不食五穀但食鬼皮朝食鬼父暮食鬼母食正欲壯復索鬼子急急如律令治𫝊尸符一十二道前五符各有用法在下後七符并朱書淨白紙上丸之與病人吞之但以井花水下兼於太乙所在日月出時當門燒之禁瘡腫法附論夫内經曰榮氣不從送於肉裏乃生癰腫又曰諸痛癢瘡皆屬於心蓋隂陽氣血榮衞内外一有不和而邪毒寒熱乗之則癰腫瘡痕所以作也必曰皆屬於心以言心寂則痛微心躁則痛甚作止情態率本於心古之治此澡雪齋戒移精變氣為唾膿呪癰之術蓋以正心為本能正直心則邪毒可弭周官瘍醫於藥劀殺之齊必先以祝者如此昔薛伯宗去公孫泰疾移癰栁上以能用之道也法受禁腫法古冢北桑木隂内有艾者五月五日平旦日未出時從冢北向南步取五十四步至艾作禹步北斗七星訖還閉氣將取艾葉拭手使汁入手中七日勿洗手持齋過七日以外即成禁五十四步之中摽記使分明一步七尺登取艾時面向西方呪曰願我此手一切癰腫一切諸毒乃至一切諸病手著即瘥作法訖而還勿反顧受持以五月四日作齋摽記步數亦四日使記先從艾東置魁因北向為尾向北十四步作摽記五日且從北向南步之作法了齋至十一日止桑木在冢北從地三尺於冢上生者佳亦於四日在冢東宿五日旦即作法住禹步法閉氣握固若治病時作想此手作熱鐵乂想前人病如雪著病即散又治病時常在病人生氣上若病人頭面上有浮腫不得頓治使盡即傷人必當留少許明日更治神驗不傳受禁腫都禁法正月元日東方動時以淨蓆一領於寂靜無人之處以井花水沐浴漱口三遍手持香炷禮五方五帝君呪願曰弟子某甲今日受天神呪願救一切衆生苦四方各禮三拜訖想取東方青氣入口滿七咽南方赤氣西方白氣北方黒氣中央黄氣等各七咽訖向東南方閉氣誦呪各七遍七日持齋戒呪曰一天之所圓地之所方受天神符可以長生二十八日其定五色變化與符合并急急如律令次呪曰無根肉本生無留停大腫如山小腫如粟登高山臨海水旦起生向暮死急急如律令須紫檀柄刀子以刀柄按腫上直腫疾痛用前禁又若不疼痛用此禁禁之然此三禁皆是禁腫文凡是惡腫皆用此二文其大腫日别五四禁度五日瘥小者當日瘥大腫禁法呪曰朝日良為物所傷上告天公下告地皇地皇夫人教我禁瘡仙人持水玉女持漿一唾止毒二唾止瘡三唾以後平復如常天雷馬鳴瘡亦不驚天雷北動瘡亦不恐皮相連肉相當不疼不痛不動不膿急急如律令用法以刀子一把先吸一口水捻鹽著口中和水噀腫上若小兒驚恐當噀地上二三過駃唾病上以口附病上痛禁每一遍三唾每七遍一遍鹽水漱口三七遍成一禁也若不瘥多加遍數取瘥為限若百遍不瘥者此病大重不可救也慎勿與禁時氣病法并禁金瘡蟲傷頭痛以刀柄隠痛處唾禁如前如有患疼痛處皆用刀背隠而禁之若金瘡從高墮下六畜狼虎毒蛇所傷手足攣躄凡百一切痛若不如意者並用此法禁呪之悉得除愈不可具述男女並得受持禁瘡腫法呪曰先奄腫上閉右目營之三匝然後唾之三乗車四獄吏載癰神氣棄都市登高山臨海水履河伯捕癰鬼大腫如斗小腫如粟吾唾一唾百腫屏迹唾如二七某毒二出急急如律令禁唾癰法禁唾一遍一疫刀割一二三四五六七背隂向陽吾晨朝行女媧相逢教我唾癰從甲至乙癰疽速出從乙至丁癰疽不從生丁至癸癰疽不從生丁至癸癰疽皆死青癰赤癰白癰黒癰血疽肉疽兄弟八人吾皆知汝姓名徒忍割汝汝須急急如律令禁癰腫法正面向東以手把按其邊三匝以墨㸃頭車重圍訖然後急唾之即愈日出東方乍赤乍黄牽牛織女教我唾方若是癰疽鉀碎若是痤應鉀碎若是癤應鉀滅若是腫應鉀隴不疼痛不速去速去急急如律令又法取東壁土三丸向井東置一丸三呪曰赫赫洞洞日出東方上有崑崙之山下有清冷之泉某甲患某處上有發癰土入井中天公當爛石癰當散北斗七星光織女教我方唾汝急出不得留藏急急如律令又嘘三七遍置土井中三丸三禁三噓之地禁五毒法禁蛇亦得吸東方青毒西方白毒南方赤毒北方黒毒中央黄毒天毒地毒水火毒霧毒塵毒死生毒百毒之精知汝姓名天毒上昇地毒下藏百毒止息五毒滅亡惡須出毒腦破毒復出毒腸止不止不已拘汝牙折汝齒吸叱叱急急如律令禁腫法三十遍骨肉皮膚血氣空虛逺入江海急去無留大腫如山小腫如粟一腫千腫滅亦作死急急如律令禁腫法七重右迴一氣朱書皆以右手封之指七過周於五指右手持禁如法呪曰封山山没封石石爛封湖湖決封火火滅上白東王父西王母教我神方白刃封汝大腫如山小腫如米封腫萬腫死急急如律令先以手按之久令痛次以金刀按之四邊令散以氣七呵令熱然後急氣七吹令冷隂陽氣定然後却唾之禁天下腫法别室中以木履相背令以繩繫定上安一屑一禁一打屑令没以三七遍東方青帝攝青精之毒南方赤帝攝赤精之毒西方白帝攝白精之毒北方黒帝攝黒精之毒中央黄帝攝黄精之毒五方毒氣并及五精内吾腸中天下最尊者莫大於五帝天下尊神者莫及於五精天下大惡者莫過於五毒吾含五帝五精五毒與禁共居其聲如雷禁如風霜經口即死逢禁即滅吾禁東方木木折南方火火滅西方金金缺北方水水竭中央土土裂吾上禁飛鳥落下禁井泉枯竭吾禁一腫百腫滅吾禁禁盤告開深澗熱天架摧地柱拆曉停光夜星滅冬變雨夏積雪冷腫熱腫速消滅急急如律令禁水呪法禁水呪曰天陽在上人陽在中隂陽在地水從下流唾腫消化急急如律令太白仙人禁腫法先向五方三嘘三吹以刀約之以手握之訖然後三噀之禁曰日出東方雷起西方南蝦蟆白兔食月中心營月衞日無所不通大腫如山小腫如珠吾唾一腫百腫自除急急如律令又法一二三四五六七百腫皆疾出急急如律令又法日出東方如垂鼓似白虎吾能唾腫散唾毒爛急急如律令又法東方青帝禁駕青毒南方赤帝禁駕赤毒西方白帝禁駕白毒北方黒帝禁駕黒毒中央黄帝禁駕黄毒吾有若口唾十瘥十唾九瘥急急如律令禁一切腫法呪曰吾口如天雷唾山崩唾木拆唾金缺唾水竭唾火滅唾鬼殺唾腫消唾風滅池中大魚化為鼈雷起西南不聞其音大腫如山小腫如氣浮游如末吾唾一腫百腫皆死急急如律令禁一切腫法呪曰生在水間石鹽一撮清水一斗故來治腫南山石羊其角如芒左觝右觝觸風前脚踏疽後脚躋癰東海大鳥飛來食風左翼掠腫右翼引風不疼不痛不壞不膿急急如律令禁癰腫法先叩牙齒三七遍急噀左營目即吹呪曰雷起池中一聽其音月生東盛蟾蜍玉兔食月中心榮衞不通結成癰大腫如山小腫如粟唾呪一腫百腫散死急急如律令又法日出東方赫赫煌煌威威容容天門亭長來捕癰腫石多石海多龍天門亭長來捕魔得便斬殺莫問羅一唾當心再唾都愈急急如律令禁疔瘡法一云初得之時逆以禁即除愈當三七遍唾之訖呪曰日出東方乍赤乍黄天上織女教我唾方疔公疔母願出南方疔公死疔母亡北斗真氣能治疔瘡吾口如天門不可枉張唾山摧唾石裂唾金缺唾火滅唾水竭急急如律令禁疔瘡法用水一碗置棗木南令摶木以子一枚安碗上刀向木三指漫撮臨著刀刃上長跪呪曰上啓伏奴將軍伏奴將軍能治疔瘡今是某年月日姓字某甲若干患某處生疔瘡或是浮漚疔或是麻子疔或是雄疔或是雌疔或是羊角疔或是蛇眼疔或是爛疔或是三十六疔或是驅失疔或是冰洗瘡或是刀鐮瘡三頭著體於人不量清淨七寸棗木下之水伏藏急急如律令禁疔瘡法先閉氣三遍叩齒三十六通閉氣禁之三七遍即瘥東海大神三女郎瘡疔有神方以藥塗此瘡必使疔公死疔母亡疔男疔女自受殃星滅即愈大吉良過時去投迸此方急急如律令一云東海大神三女郎萬細米簸去糠三稱行捶炙疔瘡云云禁風腫法三七遍呪曰風毒腫聚骨肉皮膚血氣空虛故難留住逺入江湖大腫如山小腫如錙銖速去呪唾一遍萬腫俱除急急如律令療風腫及卒風腫並一切腫禁法須用研米槌一枚遍呪一遍著槌抑按二十遍成禁呪曰無根肉本生無留停大腫如山小腫如粟登高山望海水晨朝起生向暮即死急急如律令唾風腫法呪曰日出東方翼翼皇皇五行九列唾有神方東方青氣唾青腫南方赤氣唾赤腫西方白氣唾白腫北方黒氣唾黒腫中央黄氣唾黄腫腫母腫公腫毒腫風吾盡殺之汝身謀路毒齊毒過毒火毒赤毒水毒青毒白毒黒毒黄毒唾毒頭毒頭爛唾毒尾毒連二七唾每一吸一方之氣一嚥一唾一噀禁風腫法呪曰吾從壇來持將熱鹽一把冷水一盂吾有五毒并唾自居真珠唾殺飛鳥唾湖竭唾木枯向東唾唾海竭向南唾唾火滅向西唾唾金缺向北唾唾峯拆向上唾唾雲散向下唾唾地裂汝從何來到此中國北斗七星知汝姓名北斗七星知汝名字速去莫留日出東方乍赤乍黄仙人玉女教我唾腫之方銅掌鐵指摩汝腫死急急如律令唾風腫法呪曰日出東方鬱鬱陽陽上白天公下白地王𤣥女教我腫神方何以急走還度南方吾居在梁山近惡虜雖不由作盡食風何不忘還速度南土吾禁大腫委吾禁小腫衰急急如律令禁腫法凡春初雷始發聲時以兩手指雷聲止後七日勿洗手此後有一切腫及蝎螫惡注腫瘡隨手摩之即消書腫方天乙甲乙不生未乙不成壬癸死以上丹書閉氣書腫上立差金瘡禁法呪曰吾被百煎療無一瘡一人挽弓萬人驚張一箭破於千陣此禁亦是難當急急如律令又法正月一日日未出時取四壁下土和酒井花水向東三拜云受神禁願大神如是四方各禮訖口含酒水西方悉唾至日中還復如此七日之中鮮潔齋戒不得惡言出口禁金瘡即定法先閉氣噓三遍呵七遍唾之曰日出東方惠惠皇皇上告天公下告地皇地皇夫人教我禁瘡五行步不良與刀相逢㫁皮續皮㫁肉續肉㫁筋續筋㫁骨續骨皮皮相著肉肉相當筋筋相連骨骨相承今㑹百藥不如神師一唾止痛再唾愈瘡北斗七星教我禁瘡南斗六星使瘡不疼不痛不風不膿北斗三台轉星正來急急如律令唾瘡法日出東方肓肓陽陽上白天公下白地王有女教我唾瘡皮皮相養肉肉相當今瘡不疼不痛不風不膿連筋續骨肌生肉實急急如律令用旺氣唾瘡良便有神驗吉禁血不止法三七遍日出東方乍赤乍黄南斗主瘡北斗主血一唾㫁血再唾愈瘡青衣恕吐却血千里急急如律令禁血㫁血法某甲不良某甲不慎為刀箭木石所傷上告天公下告地皇地皇夫人教我禁瘡一唾止血再唾合瘡兩皮相連兩骨相當新瘡莫痛故痛莫膿急急如律令治食瘡血不止呪術唾呪曰某今日不良為某所傷上告天皇下告地王清血莫流濁血莫傷良藥畏之不如神師若唾二七遍重誦呪云禁金瘡法吾是天師之子為師之所使執天有綱執地有紀一百二十禁呪吾以受之吾禁此瘡金血須止吾與天地同體金瘡合急急如律令唾百種瘡法神師所唾口為雷門唾為霹靂雷公主隂霹靂主陽殃賊結氣唾下消亡急急如律令禁唾惡瘡毒法先閉氣三通神師受告大道最良呪曰百藥之長不如吾之膏唾吾仰天唾殺飛鳥唾南山之木木為之折唾北山之石石為之裂唾北方之水水為之竭唾百蟲之毒毒自消滅唾百瘡之毒生肌㫁血連筋續骨肌生肉實扁鵲盧醫教我禁方三唾何瘡不愈何毒不去天音神師今在汝處急急如律令禁水洗瘡法先左營目三周開目視瘡中閉氣一息欲止然後禁之無强無弱為某所傷清血無流濁血無往一青一黄一柔一剛皮皮相值脈脈相當南方止血北方止瘡東流海水寒熱如湯朝令淹路暮令復故醫王扁鵲藥術有神還喪車起死人不膿不痛知道為真知水為神急急如律令禁漆看人法三七遍一云火故漆器當看漆急唾之赤非非漆賢丈夫看車移丙丁使者收攝之不得看人體不得看人皮急急如律令一云妄移移漆賢丈夫看車盤以盂何由得看人皮膚保辜保辜收攝漆賢丈夫急急如律令其呪皆驗又法漆翼丹盈漆丹盈為兄漆為弟汝不漆杯以盂乃膚人肌刀來割汝斧來伐汝汝不疾去鹽醃苦醋唾殺汝急急如律令禁火燭瘡法浮陽浮陽火燒東壁窮爛上付河伯還付壬癸火精毒滅入地千里急急如律令禁刀斧破傷金瘡止血疼痛法呪曰山崩石裂河枯海竭太上老君律令奉勅攝念法一遍令病人咳一聲望太陽取氣一口吹破傷瘡處如此三遍效禁百病法附論夫百病諸邪皆非正氣上古有祝由専以移精變風氣為事蓋守正法邪之道也法天元八極洞陽太乙呪曰八極元精洞陽紫庭東西南北混合紫清急急如太上𤣥女明君勅令律太𤣥君曰先誦此呪三遍乃調氣吸影書符禁諸痛法附論夫諸痛癢瘡皆屬乎心是以後之微甚必本乎心之躁靜若心安則神定神定則邪不得干故痛而塞者為可通也法禁目痛法日出東方赤紫如陽兒子目痛父母心傷吾口一唾眼見四方百藥千治不如吾湯若唾唾汝汝眼毒消亡急急如律令又法神師所唾唾目有方日出東方右隂左陽瞳子生肉瞻視无光无能誅罰不避鑊湯唾目二遍還復故常大吉神師四嶽靈方急急如律令禁喉痺法喉痺父喉母喉痺婦喉痺孫天生汝時緣上百草路誰使汝有人喉裏拘汝牙折汝齒破汝頭破汝脇神不得動不得留停北斗知汝名吸吸急急如律令又禁法吸日出陽陽吸為喉痺腫毒所傷莫痛莫癰吸吸愈愈急急如律令禁牙齒法用桃木板長一尺二寸正面南向閉氣書曰某州某縣鄉男女某甲年若干患口中左右若干齒痛讀三訖理三路頭石子蓋之勿反顧南山有一蟲名赤松子不食五穀但食口中齒埋口汝三路頭寒汝用石子埋汝著樹東千年萬載不得起急急如律令又禁牙齒痛法用一板杖長三握復取兩指元艾三姓炙杖頭柱牙上呪曰登高山望海水中有一蟲黄頭赤尾不食五穀専食牙齒吾欲治之握南指神炙三壯蟲死急急如律令靈寶方禁心痛四符隨藥燒服禁嬰孩蟲蝕齒疼痛閉氣細書曰南方赤頭蟲飛來入某姓名裂齒裏今得蝎蟲孔安置耐居上急急如律令小殘紙内著屋柱北邊蝎蟲孔中取水一杯禹步女禁法還誦上文以水沃孔以淨黄土泥之勿令洩氣永愈禁嬰孩牙根腫痛以人靜後向北斗七星三台尚書某甲患㫁若是風㫁閉戸若是蟲㫁盡收取急急如律令再拜作三夜禁諸鯁法附論夫傳曰人死為鬼物死為物人之食難已烹飪其氣性之餘蓋未泯也骨鯁之病可呪其所制而勝之凡以其性猶有所謂也若竹木之鯁猶取故鋸而治之取其制伏之義況蟲魚鳥獸之有性乎然禮典養祝鯁之法蓋以嗜艾之人氣裏不能勝物易以致鯁因祝以助之所以盡人受之道也法禁鯁法南山大虎北狐山狸江中大獺海中鸕鷀某甲得鯁共來吞除急急如律令又法四海蕩蕩滑如石上五虎四獺三鸕鷀共來食鯁速消除横者即入順者即出急急如律令普濟方卷二百七十
