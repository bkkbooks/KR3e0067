body:
  text: 普濟方卷三百七十七明周王朱橚撰嬰孩一切癎門癲癎附論夫黃帝曰人生有病癲疾者疾名謂何安所得之岐伯曰病名為胎病此得之在母腹中時母或感驚恐上而不下精氣失舍故令子發為癎也巢氏病源癎者小兒病也十嵗已上為癲十嵗已下為癎其發之狀或口眼相引而目睛上搖或手足掣瘲或背脊強直或脛上反折由風邪熱毒傷於手少隂之經故也心為帝王神之所舍其藏堅固不受外邪若風熱藴積乘於心則令恍惚不安精神離散榮衛氣亂隂陽相病故發為癲癎也又小兒在胎之時其母卒有大驚精神失守則令子癲癎也方虎睛丸治小兒一二嵗發癎至大不瘥成癲病發無時口出白沫并大小便出不知虎睛一具酒浸一宿炙黃丹砂鐵精子芩大黃龍齒梔子仁銀屑各四分蜂房炙鈎藤皮柴胡白鮮皮麻黃去節雷丸炙各二分羌活沙參升麻各三分牛黃半分蚱蟬四箇去翅足自死者防葵蛇蛻皮各七分炙細辛一分半石膏五分右和蜜丸四五嵗服大豆大十丸與顱𩕄經藥味同多牛黃及分兩不同治小兒熱癎癲右用蚯蚓破之去泥以鹽塗之化成水服虎睛丸治孩子從一嵗至大癲發無時口出白沫小便淋瀝不利治之虎睛一隻在眼佳暴乾酒浸令黃色真珠蜂房各三錢麻黃二分去節鈎藤三分鐵精防葵大黃子芩龍齒銀屑梔子仁羌活各四分柴胡升麻白鮮皮雷丸燒令赤人參各三分細辛一分半蛇皮五寸炙石膏五分蚱蟬四枚去翅足炙右研為末煉蜜為丸四五嵗如赤豆大五丸日再服大兒十丸米飲下忌生冷油膩等物虎睛丸治小兒癲癎至大不瘥或發即口出白沫并大小便出不知虎睛一對酒浸一宿微炙細研硃砂石膏各細研飛水過鐵粉龍齒細研各半兩露蜂房微炙羌活鈎藤防葵麻黃去根節川升麻各半兩細辛一分牛黃半分細研蚱蟬四枚去趐足炙右件都研令勻煉蜜和丸如麻子大每服以溫水下五丸更量兒大小加減鐵粉丸治小兒心臟積熱時發癲癎嘔吐涎沫作聲迷悶鐵粉龍齒各細研一兩鉛霜麝香各細研天南星各一分天麻三分硃砂細研水飛過水銀黑鉛各半兩與水銀結為沙子細研右為末都研令勻以煉蜜和丸如菉豆大每服以竹瀝研化五丸服之量兒大小加減雄黃丸治小兒癲發動無時心悶吐沫雄黃鐵粉各細研硃砂細研水飛過獖豬膽二枚龍膽一分鯉魚膽七枚烏牛膽半枚青羊膽二枚麝香一錢細研右以諸般膽汁相和令勻即入諸藥末和丸如菉豆大每服以金銀湯下五丸量兒大小加減天麻散祛風治癲癎天麻防風麻黃去根節各一兩甘草炙川麻黃羌活黃芩川大黃炮各半兩右為末每服一錢水一盞煎至五分去滓放溫服熊膽丹治癲癎鎮心安神真熊膽鐵粉各細研硃砂細研水飛生天南星末雄黃水磨精明者同研各半兩粉霜一分研腦麝各研一錢右同拌勻用獖豬膽一枚取汁和諸藥丸如黍米大每服十粒至二十粒煎金銀薄荷湯下雄黃丸療五癲牛癲則牛鳴馬癲則馬嘶狗癲則狗吠羊癲則羊鳴雞癲則雞鳴五癲病者臟腑相引營衛氣亂厥不識人氣爭掣瘲吐沫久而得蘇雄黃研雌黃一方無一方用一兩真珠末水銀各一兩千金方水銀使八分鉛丹二兩熬成屑千金方此一味是君丹砂半兩研千金方二兩右搗和入蜜又搗三千杵為丸先食服胡豆大三丸日再驚癎亦愈千金方云小兒三丸如小豆忌生血物黑錫丹治癲癎及諸癎胞絡涎盛黑錫二兩同水銀半兩慢研結沙子粉霜鐵粉各細研半兩麝香一分細研天南星一兩炮取末右同研勻滴水和如黍米大每服十粒煎竹葉湯下日應丹治癲連年不瘥金銀箔各三十片黑錫硫黃水銀研細鐵粉研各一兩右先將錫於鐺子內鎔令消即入硫黃炒不住手就鐺研攪候硫黃煙氣似息次入水銀鐵粉金銀箔同攪用緊火燒少時都傾出置地一宿出火毒再研和勻用粟米飯和如菉豆大每於食後服五粒至七粒煎人參湯下量兒大小加減一方以硃砂為衣治小兒癲癎連年不瘥方名水銀丸鉛水銀各二兩硫黃鐵粉各一兩右先將鉛於鐺子中令消即下硫黃炒不住手就鐺研攪待硫黃煙氣似息入水銀又攪次下鐵粉以武火燒少時將出置地一宿出火毒後研令極細即以粟米飯丸如菉豆大每於食後以金銀湯下五丸量兒大小加減一方食前硃砂丸治小兒癲癎發歇不定硃砂細研水飛過鉛霜鐵粉馬牙硝各一兩右研細如麵以棗肉和丸如菉豆大每服於食後以熟水下三丸量兒大小加減雌黃丸治小兒癲癎欲發精神不足眼目不明瘛瘲惡聲嚼舌吐沫雄黃研細炒令褐色黃丹炒令褐色一兩麝香一分右相和細研如粉用牛乳一升慢火熬成膏可丸即丸如菉豆大每服以溫水下三丸日三服量兒大小加減此方得自明醫之家後余嘗傳與友因施是藥醫道大行治小兒癲癎等疾方右以光明硃砂一兩顆塊者金箔隨硃砂顆塊大小各褁之用磁石固濟了瓶子內築實中心留一坑子即以硃砂置坑子內上更以磁石末覆之瓶子口更以鉛片可瓶口大小蓋之以文武火燒七日又常令露鉛以筯刺得又養七日後去鉛大小煆之候冷取出於乳鉢中細研即置於通油盒子內上以馬牙屑末偏覆之即置飯甑中蒸一炊久其硃砂化成水有患者食後以溫水調下半錢量兒大小加減服露硃丸治十嵗已上癲狂夫隂盛為癲陽盛為狂隂陽相并則癲狂亂走語言錯雜悲歌不定憂喜無常右以辰砂一兩琉璃器內盛露四十九夜遇隂雨日不算入牛黃一錢煉蜜和如豌豆大空心一丸冷水下更常服寧心膏治驚邪癲癎小兒客忤消食及冷氣右以鐵屑煎汁服之真珠丸治小兒自一嵗患癲癎發動無時口內沫出小便不覺呼喚不應真珠研一分虎睛左睛妙酒浸暴乾研一分露蜂房麻黃去根節鈎藤各半兩防葵一兩鐵粉細研三分大黃銼炒黃芩各三分龍齒研一兩銀屑梔子仁各三分獨活去蘆頭半兩柴胡去苗升麻白鮮皮各三分雷丸一分沙參細辛去苗葉各半兩蛇蛻燒灰一分石膏研半兩牛黃研一分蚱蟬去趐足熬四枚右研為末煉蜜丸如麻子大一二嵗兒每服五丸研破米飲下量兒大小加減蛇黃丹治諸風癲癎掣放吐沫急慢風蛇含石四箇建盞內燒紅以楮木汁淬乾南星白附子辰砂麝香等分右為末米糊丸梧桐子大每服湯化下一丸量與食前大人加丸數虎睛丸治小兒五嵗至七嵗發癲癎無時發動口出白沫遺失大小便不覺方見本門一切癲類風癎附論夫風癎者由乳養失理血氣不和風邪所中或衣厚汗出腠理開張風因得而入之先時指屈如數物後乃掣縮是也診其心脈滿大癎瘛筋攣肝脈小急亦癎瘛筋攣尺寸脈俱浮直上直下此為督脈必腰背強直不得俯仰小兒風癎三倍脈緊急其癎可治小兒之脈多似雀鬪要以三倍脈為主若緊者必風癎凡諸癎發手足掣縮慎勿持捉之則令曲捩不隨也方釣藤丸治小兒風癎時發時止嵗月不休常服除根源鈎藤川升麻烏犀鎊黃芩去皮黑心玄參茯神防風去蘆頭一兩秦芁檳榔川連大黃地骨皮天竺黃甘草炙牙硝麥門冬去心青黛珍珠另研麝香牛黃龍齒琥珀丹砂别研龍膽各半兩蜣螂去頭足蚱蟬去頭足翅生用各三箇人參虎睛一對酒浸焙乾金箔銀箔各四十片同研右除另研外為細末軟飯丸如黃米大每一嵗可服二十丸至三十丸參湯或薄荷湯下虎睛丸治小兒風癎自三嵗已來至十嵗不瘥發時口中白沫大小便不覺虎睛一對酒浸炙黃色硃砂細研水飛過麻黃去根節柴胡去苗鈎藤白鮮皮川升麻雷丸沙參去蘆頭牛黃細研各半兩防風去蘆頭子芩川大黃銼碎微炒鐵粉銀屑細研梔子仁羌活各三分龍齒細研石膏細研水飛過各一兩重細辛一分蚱蟬四枚微炙去翅足右件藥搗為末蜜煉和搗三五百杵丸如菉豆大三嵗已下以薄荷湯下三丸日三服三嵗已上以意加丸服之天竺黃散治小兒風癎筋脈抽掣夜卧驚悸皮膚壯熱天竺黃研牛黃研知母銼焙鈎藤銼焙芍藥犀角鎊微炙龍膽去土柴胡去苗銼防風去蘆銼升麻人參各半兩桔梗大黃炒銼令香山梔子玄參雄蠶蛾炒白茯苓去皮銼蜣螂去足微炙龍骨别搗研如粉各三分檳榔一枚紙褁煻火內煨過銼右為散每服半錢用米飲調下如角弓等風用竹瀝調下連夜三四服隨兒大小加減鈎藤飲治大人小兒風癎卒倒嘔沫不醒鈎藤皮麻黃去根節各二分龍齒六分研綿褁銀箔一片寒水石梔子擘知母石膏杏仁去皮尖雙仁各二十分升麻十分子芩十四分蛇蛻皮七寸炙蚱蟬四枚去翅足炙柴胡十分芍藥沙參各八分生葛汁五分蜜七合牡牛黃如大豆十粒煎成研下之右切以水六升淡竹瀝二升煮取二升四合絞去滓內杏仁脂葛汁蜜於微火上煎攪不停手令餘二升三合藥成三四歲一服二合五六嵗一服二合半日再服稍增兒若大便澀者加大黃六分慎熱麵炙肉魚蒜黏食油膩冷水龍齒散療大人小兒風癎卒倒嘔沫不醒麻黃去節大黃牡蠣熬黃芩各四兩寒水石白石脂石膏研赤石脂紫石英滑石研各八兩人參桂心各三兩蛇蛻皮一兩炙龍齒六兩研甘草三兩炙右搗為散用藥八兩以一薄絹袋盛散藥用水一升五合煮取七合絞去滓頓服之日再服一方水二升煮散方寸匕取一升去滓服之少小百日服一合熱多者日二服三五日一服亦得一方無麻黃龍齒蛇蛻皮忌海藻菘菜生蔥熱麵蕎麥豬肉蒜黏食犀角散治小兒心臟壅熱變為風癎身體壯熱驚悸不安心神煩悶多啼少睡犀角屑羌活川升麻柴胡去苗各三分茯神白鮮皮葛根各半兩銼甘草炙微赤蛇蛻皮灰各一兩石膏一兩細研蚱蟬三枚微炒去翅足鈎藤麥門冬一兩半去心川大黃銼碎微炒子芩各一兩右粗羅為散每服一錢水一盞煎至五分去滓量兒大小加減服之天竺黃散治小兒風癎筋脈抽掣夜卧驚悸四肢煩躁皮膚壯熱天竺黃牛黃各細研龍骨知母赤芍藥犀角屑鈎藤玄參各細研桔梗去蘆頭白殭蠶微炒川大黃銼細微炒茯神已上各一分蜣螂七枚去足微炒檳榔一枚紙褁微煨右為細末每服薄荷湯調下半錢一日五服隨兒大小加減烏犀丸治小兒驚風癎病及諸風手足搐搦不定天南星炮製白附子炮製乾蝎微炒烏犀角屑天麻各一分白花蛇半兩酒浸去皮骨焙乾稱已上六味為細末以無灰酒一小盞同入銀器內煎令稠再入後七味同和為丸牛黃麝香膩粉龍腦各一分硃砂半兩水飛水銀以棗少許研星盡一分虎睛一對酒浸微炙為末右都研勻入前膏子為丸如麻子大每服三丸用竹瀝下不拘時候量兒大小加減木防已酒治小兒風癎發動手足不仁木防已十四分鉛丹防風桂心龍齒各八分丹砂甘草炙各六分獨活二分細辛當歸乾薑各五分莾草一分右切入絹袋中酒五升浸五宿初服半合日三服紫石酒治少小風癎發作言語謬錯紫石英八分附子炮三分鐵精茯神獨活各五分逺志去心桂心各六分蜂房炙牛黃各二分乾薑甘草炙人參各三分右絹袋盛清酒五升浸五宿初服一合日二服黃耆湯治小兒風癎發無時數下之後風虛不足黃耆銼炙麻黃去節甘草炙銼當歸切焙細辛去葉桂去粗皮芍藥人參各一兩牛黃研一分蛇蛻炙焦黃一寸蚱蟬炒蜣螂各四枚並微炙去翅足右粗搗篩三四嵗兒每服一錢匕水七分煎至四分去滓溫服日三四隨兒大小加減沉香湯治小兒風癎發作無度頸核瘰癧瘴毒乍寒乍熱欲成骨蒸腸滑骨熱多變疳痢皮肉乾枯不思乳食身熱生瘡喉閉腫痛悉主之沉香銼人參各半兩木香銼厚朴去粗皮擦生薑汁炙乾薑各三分升麻玄參各一兩凝水石一兩半搗研知母地榆甘草炙銼一兩鈎藤一兩一分右為散三嵗兒以水半盞藥末半