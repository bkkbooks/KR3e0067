粒磨沉香湯下量兒大小加減雄黃丸治小兒七嵗已下食癎壯熱無辜痃癖等雄黃麝香牛黃各細研硃砂石膏各細研水飛過蕤仁湯洗去赤皮牡蠣粉巴豆去皮心膜紙褁出油半兩甘遂一分煨微黃右為末煉蜜和丸如黍米大每服以粥飲下三丸如利兩三度勿怪更隨兒大小加減真珠丸治小兒食癎化聚妳食痰墜涎利大腸雄黃細研代赭麝香細研蜣螂微炙板杏仁湯浸去皮尖雙仁麩炒黃各半兩真珠天竺黃並細研一分肥巴豆十粒用油煎令褐色與杏仁研硃砂細研用一分右諸件藥都研為末煉蜜和丸如菉豆大每服以生薑湯下二丸量兒大小加減防葵丸治小兒食癎心胸痰滯大小便常多祕澀防葵末滑石各半兩牛黃麝香各半兩巴豆二十枚取霜膩粉硃砂蛇蛻皮一條燒灰右為末以糯米飯和丸如黍米大每服以粥飲下二丸量兒大小加減蟾酥丹治食癎毒盛湯藥不下蟾酥真珠末各研甘草慢火煨黃杏仁炒去皮牡蠣粉犀角麝香一錢巴豆去皮右為末糯米飯為丸如黍米大每服三粒煎荆芥湯放溫冷下量兒大小加減妙聖丹治食癎通利代赭石煆醋淬一分雄黃蝎稍硃砂各一分輕粉麝香各一錢巴豆二粒去心膜杏仁去皮尖微炒二錢右為末蒸棗肉丸如桐子大每服一丸木香煎湯調下真珠丸治小兒食癎喘息氣粗真珠末天竺黃雄黃丁頭代赭搗羅為末巴豆去皮心出油麝香杏仁湯浸去皮尖雙仁研如膏各一分右為末細研令勻煉蜜和丸如黃米大一二嵗兒每服以溫水下五丸量兒大小加減雄朱膏治食癎利胸膈牛黃研真珠末研丁頭代赭石為末白殭蠶為末𬎼仁湯浸去皮為末一分雄黃半兩水磨精明者細研右同拌勻煉蜜和丸如雞頭大服一粒至二粒參湯化下紫霜丸治乳哺失節宿滯不化胞腹痞滿嘔吐惡心便利不調乳食減少又治傷寒溫壯內挾冷實大便酸臭或已得汗身熱不除及變蒸發多日不解因食成癎先寒後熱並宜服之代赭石煆醋淬研赤石脂末各一兩巴豆炒三十粒去皮心出油細研杏仁五十枚去皮尖麩炒别研右件合研細湯浸蒸餅丸如麻子大每服三丸乳汁或米飲下微利為度量兒大小加減靈脂丸治小兒食癎乳食不消心腹壅滯四肢驚掣硃砂五靈脂各一分巴豆五枚去皮心紙裹出油細研右研細如粉用燒粟米飯和丸如黃米大一二嵗每服用溫水下二丸以吐利為妙量兒大小以意加減鉛霜丸治小兒乳食不消心腹結實壯熱煩悶搖頭反目口吐涎沫名為食癎鉛霜膩粉各一分巴豆去皮心研紙褁出油右為末以糯米飯和丸如粟米大每服以通草薄荷湯下一丸三嵗已上加丸服熱癎附論夫小兒熱癎者由血氣不和內有積熱之所致也凡小兒骨體輕軟腸胃細微易為傷動若乳食不常臟腑壅滯溫搐生熱不得宣通熱極甚者則發癎也又心神多不寧將養過溫內生邪熱所以多驚甚者變成諸癎其狀口眼相牽手足抽牽口中吐沫鼻內作聲頸項反張腰背強直身體壯熱或呌或啼者是熱癎之候也宜服退癎除熱之藥方芍藥丸治少小一百二十癎止驚常服除熱疾芍藥石膏碎當歸切焙鐵粉各三分蚱蟬四箇自死者大黃銼炒人參各五分桂心三分半銀屑研芎藭龍骨研細辛去苗葉黃芩各二分牛黃二銖右為末煉蜜和丸如麻子大一服二丸日三如不知稍增可至四五丸牛黃丸治小兒熱癎發歇不定眼目直視身體壯熱吐沫心神煩悶牛黃半兩研蚱蟬三枚微炒去翅足石膏研細水飛過龍齒研細各二兩梔子仁川升麻犀角屑胡黃連鈎藤龍膽去蘆頭川大黃銼碎微炒杏仁湯浸去皮尖雙仁麩炒微黃各三分金銀箔各五十片細研右為末入研了藥同研令勻煉蜜和丸二三百杵丸如菉豆大每服以竹瀝研五丸服量兒大小加減服之紫石英散治小兒熱癎四肢抽掣每日數發宜服此除熱鎮心紫石英石膏各細研水飛過滑石白石脂寒水石各一兩川大黃銼炒硃砂細研水飛過甘草炙微赤銼犀角屑各半兩龍齒二兩細研牡蠣粉一分右為末每服以溫薄荷湯下半錢量兒大小加減鈎藤湯療未滿月兒及出月兒壯熱發癎鈎藤一分去皮蚱蟬一枚去翅熬為末湯成下柴胡升麻黃芩去黑心甘草炙大黃各二分蛇蛻皮二寸炙竹瀝三合石膏三分碎右切以水一升煮三合半和竹瀝服一合得利下即便停後至五六十日兒一服一合以外忌海藻菘菜等若連發不醒加麻黃一分去節茯神散治小兒食癎皮肉壯熱煩躁頭痛宜服此藥茯神川升麻鈎藤甘草炙微赤銼犀角屑各三分白鮮皮羚羊角各半兩屑石膏二兩蚱蟬三枚微炙去翅足龍齒一兩右為散每服一錢以水一小盞煎至五分去渣量兒大小加減溫服白鮮皮散治小兒百日以來至三四嵗發熱癎瘛瘲身體如火白鮮皮黃芩川升麻地骨皮鈎藤犀角屑胡黃連各三分麥門冬去心焙龍齒各一兩甘草一分炙微赤銼右粗羅為散每服一錢以水一小盞煎至五分去滓入牛黃末一字量兒大小加減溫服升麻散治小兒熱盛迷悶發癎川升麻鈎藤史君子子芩朴硝各一兩石膏龍齒各二兩柴胡去苗赤芍藥川大黃銼碎炒各三分嬰孺方用大黃八分别搗候湯成和用右為散每服一錢水一小盞煎五分去滓溫服量兒大小加減鈎藤散治小兒風壅氣盛心胸痰滯壯熱發癎鈎藤一分蚱蟬二枚微炒去翅足川升麻麥門冬去心焙甘草銼川大黃炒碎子芩各半兩石膏一兩蛇蛻皮五寸燒灰右為散每服一錢水一盞煎至五分去渣入竹瀝半合量兒大小加減犀角散犀角屑鈎藤玄參蚱蟬三枚微炒去翅足甘草炙微赤銼川升麻黃芩梔子仁各半兩麥門冬一兩去心焙右為散每服水一小盞入苦竹葉七片煎至五分去滓溫服量兒大小加減虎睛丸治小兒熱癎搖頭吐舌四肢抽掣心神驚悸虎睛一對酒浸牛黃細研鈎藤川大黃微炙人參去蘆茯神各半兩麝香犀角屑三分硃砂細研各一兩右為末合諸藥同研令勻煉蜜和丸如菉豆大一嵗兒金箔研化一丸日三服治小兒癎病熱多者方牡荆子十五箇細洗淨生鐵一大片半研甘草一兩碎黑豆一大升半布袋盛右以五升大斗煎取一斗半去滓澄清濾煎如餳每食前取一匙和蟬殼湯及酒服之日再服重者一月永瘥治小兒熱癎狂啼右以臘雪略溫服之蟬殼散治諸癎挾熱蟬殼人參去蘆頭黃芩川升麻各一分茯神一分已上搗羅為細末次用牛黃一分研天竺黃研牡蠣細研各二分右細研勻每服半錢煎荆芥薄荷湯調下子芩散治小兒熱癎嘔逆煩悶體熱子芩人參去蘆頭犀角屑甘草炙微赤銼鈎藤赤茯苓川升麻各三分右為散每服一錢水一盞煎至五分去渣量兒大小加減服之麥門冬散治小兒體熱嘔吐發癎麥門冬一兩去心焙鈎藤半兩黃芩赤芍藥川升麻茯神川大黃一兩去土炒各三分右為散每服一錢水一小盞煎至五分去滓溫服梔子散治小兒熱癎不知人迷悶嚼舌仰目梔子仁半兩子芩赤鈎藤吳藍各一兩龍齒石膏二兩川大黃炒研右為散每服一錢水一小盞煎至五分去渣溫服更量兒大小加減服之鈎藤散治小兒熱癎時時戴上眼吐沫鈎藤三分蚱蟬三枚微炒去翅足人參去蘆頭子芩牛黃細研另入川大黃銼碎炒各半兩右粗羅為散每服一錢以水一盞煎五分入竹瀝少許去滓入牛黃一字大小量服治小兒十嵗已下及新生百日無問癎熱無辜疾癖右以京三稜汁作粥與食之祕妙不可具言大效治小兒癎熱時氣煩悶上渴右取瓦上青苔衣煮服普濟方卷三百七十七
