腫注行履不得等疾附子炮製去皮臍黃茋銼羌活去蘆白术白术炒桔梗銼炒青皮湯泡去白焙乾薑炮桂去皮甘草炙五加皮用吳茱萸一兩以水一碗用煮水盡為度去茱萸取五加皮細切焙乾各一兩右粗搗每服三錢水一盞入生薑二片大棗三枚擘破煎至六分去滓不拘時候溫服一方加附子乾薑桂各半兩餘品味同入鹽煎一方有人參無桔梗人參地黃丸治下元不足去風冷邪氣調順脾胃壯氣明目進飲食人參巴戟天去心肉蓯蓉酒浸一宿切焙白术乾菊花兔絲子酒浸一宿焙乾搗末五加皮銼石斛去根柏子仁另研熟地黃焙各一兩右件為末煉蜜和丸如桐子大每服三十丸溫酒下食前服牛膝附子煎丸出王氏博濟方治男子下元虛冷傷憊筋骨衰遍身癮疹及風氣上攻下注疼痛不可忍者牛膝去苗細切五兩酒浸三日取出研如麵糊用酒於銅銀瓷器內慢火熬成膏虎骨酥炙黃色附子炮製去皮臍各三兩補骨脂炒葫蘆巴肉蓯蓉酒浸三日細切焙各四兩巴戟天去心生用仙靈皮去莖生用一兩芎藭右搗羅八味為細末用牛膝膏和入臼杵令軟得所丸小彈大若難丸更入熟蜜少許同丸早晨夜卧溫酒化下一丸服一月永無風氣等疾海桐皮丸治下臟風虛耳內蟬鳴久服壯筋骨駐顔色利胸膈調脾胃補虛海桐皮銼楝實銼炒蘹香子石斛去根牛膝寸截酒浸一宿焙乾各一兩檳榔煨銼一兩芎藭一分木香右為末煉蜜丸如桐子大每服溫酒或鹽湯空心下二十丸至三十丸小牛膝丸治腎臟虛冷風氣等疾牛膝寸截用酒一碗浸一伏時煮三兩沸搗爛取汁熬成膏防風去義附子炮人參赤小豆揀各二兩地龍去土檀香銼各半兩乳香三分右搗七味為末入膏和丸如豌豆大每服十五丸至二十丸空心鹽湯下覆盆子丸出聖惠方治諸風虛補暖下元變白髮久服神效覆盆子半斤五粒松半斤枸杞子六兩秦皮四兩川升麻三兩苣蕂五兩楮實五兩水淘去浮者暴乾微炒右為末以生地黃汁一升好醋半斤酥七兩先煎地黃汁等十餘沸入藥末和丸如桐子大每服於食後以溫酒下三十丸如不飲酒以漿水下切不得食白蒿青蒿荏子蘿蔔蒜等物椒紅丸出聖惠方大補益治風毒健脾胃止咳逆消酒食暖下元補諸虛憊川椒十兩微炒附子四兩炮製去皮臍白蒺䔧二兩微炒去刺巴戟二兩硫黃二兩細研水飛過硇砂二兩細研鹽花二兩右為末研令勻用豶豬腎五對煮熟去脂膜研爛如糊入諸藥末和乾濕得所搗一二千杵丸如桐子大每日空心以鹽湯下三十丸或酒下亦得地骨皮丸治風溫補血氣地骨皮牛膝兔絲子焙枳殼去穰麩炒逺志去心熟乾地黃焙各六兩右並用酒浸三日焙乾為末用浸藥酒煮麵糊為丸如桐子大每服三十丸空心溫酒下烏頭丸出王氏博濟方治補暖水臟虛冷壯筋骨縮小便大治風烏頭一斤用東流河水浸七日每日三度換水日滿取出去黑皮并皮尖切作栁葉片入牽牛子一合同炒候香熟即去牽牛子不用蘹香子炒另搗為末二兩青鹽五兩另研蜀椒去目并合口者炒出汗牛膝各五兩細切以好酒浸七日爛研陳橘皮酒浸去白焙二兩右用牛膝膏和勻入臼再搗千下丸如桐子大每日空心鹽湯或溫酒下十五丸至二十丸牛膝須酒浸後爛研與諸藥末拌和恐難得細或只將牛膝浸日足焙乾為末却將浸牛膝酒煮糊和末為丸亦得若更利膈湯散最相宜也一方無陳皮內青鹽蜀椒牛膝止用四兩餘藥味同鹿茸丸治元臟虛損一切風冷鹿茸去毛酥炙附子炮製去臍皮當歸酒浸一宿焙白术細辛去苗葉生用桂去皮生用各一兩右為細末煉蜜為丸如桐子大空心每服日午鹽湯下二十丸至三十丸沈香紫桂丸治丈夫元臟氣虛損婦人血海虛冷月脈憊漏五般帶下臍腹㽱痛及一切虛風冷氣攻注桂去粗皮烏頭炮製去皮臍赤石脂燒各一兩蜀椒去目合口者炒出汗各半兩乾薑炮右為末酒煮麵糊和丸如桐子大每服二十丸空心食前醋湯下丈夫鹽湯下除風散治八部諸風延年却老駐顔色益氣血白术甘菊花白茯苓去皮天門冬去心各一兩天雄炮製去皮臍半兩右為細散每服一錢七溫酒調下空心食前日進二服硇砂丸出聖惠方治水臟憊傷久積風冷硇砂半兩硝石一分青鹽半兩白礬一兩黃丹一兩右細研令勻用磁瓶子盛固濟瓶口以炭火七斤煆令通赤放冷取出細研以糊和丸如菉豆大每日空心以粥飲下十丸內養丸聖濟方一名草還丹一名益夀地仙丸治本臟虛風皮膚瘡腫固濟丹田方見本門補虛勞耳目類五緯丸治虛損補暖丹田去風冷氣附子一枚炮製去皮臍為末桂去皮為末各一分乾薑炮為末二錢硫黃細研右同研細麵糊和丸如桐子大丹砂為衣遇脾胃冷不思飲食腹中疼痛頻頻洞㵼及赤白痢並濃煎艾湯放冷下十丸良久再服怕冷物用冷水下十丸如小兒有此患化下一丸如冬天逺出早行亦用冷水下五七丸大禦寒氣此藥不熱甚溫亦無反惡大無所忌常服五七粒永不患結胸隂毒傷寒等症不拘時候服四靈丸治腎虛還元保命壯氣除風巨勝子一兩白茯苓去皮三兩生乾地黃焙麥門冬去心焙各一兩右為細末煉蜜如桐子大每服三十丸煎棗湯下水飲亦得服至百日自覺有異通神三靈丸治本臟諸虛延年益壽袪風氣通榮衛活血脈壯腰腳柏葉四斤米泔浸七日每日換泔洗淨至次日取出近日隂處曬乾杵為末松脂四兩用滴乳香以桑葉灰汁內煮半日以上候化取出脂去灰汁入新水內候凝細研如粉右為末同拌勻煉蜜和丸劑再杵一千下丸如桐子大每日空心臨卧茶酒或溫水下五十丸煨腎丸治虛風補暖黃蓍蒸過焙乾白蒺䔧炒羌活去蘆頭各半兩右為散每服豬腎一對入末四錢入鹽少許摻於腎內濕紙煨熟食之次用溫酒一盞投之妙蓯蓉丸治腎虛補元臟除諸風益脾實腎烏頭一斤炮製去皮臍入米泔浸七日逐旦換水七日子别搗生黑豆末一斗以水二石煮烏頭作片子如盞大漸添豆末入水自平明煮至黃昏取出去豆末止將烏頭片子於長流水內浸半月出熱毒日滿隂乾入青鹽三兩同為末蓯蓉半斤酒浸二日入飯甑蒸三度每度添酒滿再蒸候蒸得如泥軟入砂盆內研爛牛膝半斤酒浸二日一日一焙乾搗為細末右以烏頭牛膝末入在蓯蓉膏內和勻丸如兩皂子大每服一丸溫酒嚼下二三服永絶脾胃冷氣烏頭丸治風氣暖水臟去腰膝酸疼臍腹虛冷用川烏頭不以多少淨洗曬乾寬掘地坑子一所却用好土實填築於好土內取作坑子一所亂削坑子口周回如法然後用炭火燒令通赤却去火用釅醋一碗傾在坑子內候滲盡便勻鋪排烏頭在內使好土蓋覆厚一寸已來築却然後坑口頭以炭火密排燒之斟酌欲熟於坑口邊取出一枚看之以軟熟為度其藥又不得令生又不得大焦切在用意取出曬乾搗羅為末以粳米飲和丸如桐子每服溫酒或鹽湯下十丸加至二十丸為度曲囊丸出千金方治風冷補虛弱亦主百病方乾地黃薯蕷牡蠣天雄蛇床子逺志杜仲鹿茸桂心五味子鹿藥草石斛車前子兔絲子蓯蓉雄雞肝未連蠶蛾各等分右十七味欲和任意搗末蜜丸如小豆大酒服三丸加至七丸日三夜一禁如常法須常有藥氣大益人服藥十日以後少少得強烏頭丸出廣南四時攝生論大補暖疏風治氣空心常服即無諸疾方川烏頭一斤以川中者無即草者先以黑豆一斗用水與烏頭同煮水乾旋添湯煮豆爛為度出豆不用烏頭去皮臍以竹刀切作片用鹽四兩湯化為水將烏頭同煎爛研成膏子乃用後藥肉豆䓻四個沈香一兩半破故紙一兩微炒巴戟天一兩去心海桐皮二兩牛膝二兩半茴香二兩微炒甘草半兩天麻一兩半虎脛骨一兩檳榔一兩右為散入烏頭煎搜和入臼杵內搗臨時看硬軟少許入蒸餅丸如桐子大每日空心鹽湯或溫酒下二十丸煎烏頭或用青鹽更妙金粉丸出王氏博濟方治風冷氣流注腰腳疼痛行步艱難久患不瘥川烏一兩每個劈開作片子牛膝一兩去毛酒浸洗切之何首烏一兩劈破右用大豆一斗淘淨先入一半甑內次下三味更用餘豆蓋蒸半日只取藥隂乾為末别入地黃金粉一兩拌勻以酒糊丸桐子大空心木瓜酒下三十丸或二十丸濟危上丹出衛生家寶方治虛極生氣産後尤好妙乳香研五靈脂研硫黃研陳皮去白太隂玄精石研以上四味用石器內微火炒桑寄生真阿膠炒右等分為末同和用生地黃汁糊丸如桐子大溫酒下二十丸救陽湯出十便良方治陽微隂勝風寒侵襲真氣暴衰形寒脈結神識不明心腦痰滿嘔逆清涎頭目昏眩頻倦卧自汗不止飲食不入下利頻數臍腹疼痛肢體困倦並主之川烏頭乾薑各四兩搗碎同炒轉色右為粗末每服三錢以水三盞煎一盞去滓食前溫服寒多加良薑二兩汗出多加牡蠣一兩痰加附子二兩風加防風一兩肢節痛加桂一兩火輪丹即稀蘞丸出鮑氏方補虛損益真元除諸風等症用稀蘞草葉如芥菜而狹長長髙三尺秋乃花實苗色赤稈色紫為上青色次之節葉對生其根白枝桿方花小而黃向上開下有金絲紋是也其根枝圓花黃而大向下開如杓葉深緑下無金絲葉不相對者鶴虱也稀蘞草略似蒼茸牛膝髙於鶴虱成節便張忠定公表言仲一諸般風氣痢桑株上木耳湯下冷氣乾薑湯下軟風頑麻風薑蠶湯下諸般勞風溫酒鹽湯下奔豚風膈氣腎俞風乳香湯下筋骨風炒皂角子湯下血風血氣藝薹子湯下久血痢荆芥湯下蛔蟲米飲下一切風參湯下小兒腎腫陳米飲下痃癖氣檳榔湯下除風血補益出本草以陳恩岌浸酒服之治風血去諸冷益老起陽出本草用鹿茸浸酒服之主一切風血補益并諸疾出本草以羊不吃草煮服之亦浸酒服補虛消痰附論夫脾胃者倉廩之官播萬物氣澤以埤諸臟腑者也脾土也土能制水則水不溢虛損之人脾胃氣弱故於水穀不能尅消土氣不能勝水津液停積結聚上膈是為痰也令補虛兼以助脾之藥則痰自消矣方天麻煎丸出聖濟總録治肝腎久積風冷痰滯氣攻眼目腫澀疼肌肉瞤動心神倦痰去涎少壯筋骨補元氣益心利肺天麻半斤淨洗焙乾搗末牛膝酒浸切焙一斤搗為末杏仁湯浸去皮尖雙仁細研四兩生地黃五斤好者淨洗於臼內杵取汁三升右同於銀器內以新水三斗煎至七升以布絞取汁却將藥渣於木臼內搗令極細後以水三五升浸取汁同於銀器內熬更用無灰酒五升安息香三兩慢火煎成膏後入葫蘆巴二兩天雄炮製去皮臍石斛去根沈香銼桂去皮巴戟天去心玳瑁醋炙為末檳榔白花蛇酒浸炙去皮骨各一兩當歸切焙一兩酸棗仁炒一兩芎藭一兩逺志去心三分大腹和皮銼一兩獨活去蘆頭三分乾薑炮製一兩益智去皮三分木香一兩右除前四味作外搗羅為末入前膏內和為丸於木臼內杵一二千下丸如桐子大每服以酒下二十五丸加至三十丸若常服空心一服有疾早晚一服枇杷前胡湯一名枇杷葉湯出聖濟總録補益五臟去痰飲三焦虛熱風勞毒氣攻手足寒熱煩躁方見虛勞痰飲類附子湯出聖濟總録體勞倦四肢拘急腹內刺痛體弱并頭痛腎臟傷憊胸臆噎塞久疾冷氣婦人血海冷滯補足附子炮製去皮淨烏頭炮製去皮臍柴胡去土前胡去蘆黃蓍芎藭白术人參木香當歸切焙羌活去蘆頭甘草炙桔梗炒白芷地榆桂去皮各一兩右銼如麻豆大每服三錢水一盞生薑二片棗二枚蔥白一寸同煎七分空心服五味子出聖濟總録治痰盛利胸膈和脾胃肺氣止嗽思食心經虛熱咽喉舌乾澀壅悶口內生瘡五味子人參訶梨勒皮炒白术白茯苓去皮桔梗炒枳殼去穰麩炒前胡去苗土貝母去心炒甘草炙陳橘皮湯泡去白麥門冬去心焙半夏生薑汁製和作麯焙乾各一兩乾薑炮桂去皮各半兩右粗搗篩每服三錢七水一盞入生薑一片大棗切煎七分去滓溫服茱萸丸出聖濟總録補虛下氣去痰吳茱萸湯浸洗七次焙一兩半硇砂半兩用醋漿水淹攪五七百度用紙濾過瓷器內慢火逼令乾木香一兩京三稜三兩炮熟搗青橘皮泡去白一兩半附子炮製去皮臍一兩半蘹香子半夏乾薑炮製一兩半巴戟天去心酒浸一宿一兩硫黃一兩甘草水浸七日研右各搗為末先用硫黃末以精羊肉十五兩細切拌和令勻淹一宿便用好醋一升半煎至醋盡刮去在臼內後將藥末并硇砂同入臼內杵一千下丸如桐子大每日空心鹽湯下一十丸五味子丸出易簡方平肺氣補虛消飲五味子三兩人參桂檳榔煨青皮杏仁泡去皮尖細辛去苗各一兩附子炮去皮臍乾薑炮各半兩右為末蜜丸如桐子大每服三四十丸用酒或鹽湯下空心食前日三服理中湯出聖濟總録補虛治痰木香一兩乾薑一兩炮白附子一兩炮附子二枚炮製去皮臍蘹香子一兩微炒天南星一兩切生薑十片同水煮過半夏一兩切生薑十片同水煮過焙乾右為末用羯羊腎一對和前藥一處入臼內杵二千下丸如桐子大每服十丸炒鹽湯下早晚二服瑞連丸出危氏方治濕定心消痰暖腎水勻血去黑痣蒼术蓮肉去心皮一斤酒浸軟入豬肚內煮爛取出焙乾研豬肚為膏每蓮肉一斤約肚二個五味子主肺去梗破故紙主腎微炒熟地黃主血各一兩酒蒸右為細末豬肚膏酒煮飛羅麵為丸如桐子大每服三四十丸空心溫酒鹽湯下雄硃丸出易簡方治丈夫婦人因驚憂失心或多思慮氣結不散積成痰涎留灌心包久而不去窒塞心竅遂心氣不寧狂言亂語呌呼奔走顆塊硃砂一分研雄黃有墻壁明淨者一分研碎白附子一錢為末右拌和勻豬心血和丸如桐子大更别用硃砂為衣每服三粒用人參菖蒲濃煎湯吞下病去常服一粒能安魂定魄補心氣定神靈化痰利膈補虛調腹臟夫脾者倉廩之官也胃為水穀之海其氣和平布散精微上注於心肺下流於腎肝虛損之人倉廩不足穀氣衰弱腹臟不調法治宜以調和脾胃方沈香湯出聖濟總録補虛治氣調順三焦安和臟腹進飲食沈香一兩肉豆䓻仁桂去皮厚朴去皮生薑汁炙木香檳榔青橘皮湯泡去白毛焙訶䔧勒皮白术當歸焙人參枇杷葉炙刷去毛芎藭乾薑炮莪术煨銼黃茋附子炮製去皮臍白茯苓去皮石斛去根酒浸微炒前胡去蘆頭枳壳去穰麩炒郁李仁浸去皮并雙仁京三稜醋浸一宿煨銼甘草炙各半兩右銼如麻豆大每服五錢水一盞半入生薑三片大棗三枚劈破煎至八分去渣稍熱食前服木香和中丸和脾氣益腎水消腸胃積滯調三焦氣脈開胸膈痞滿上攻心腹悶痛筋脈拘急肢體困倦潤大便小便進飲食木香去腐沈香白豆䓻枳實去穰檳榔蓬术去皮青皮去穰陳皮去白當歸酒浸黃芩去腐木通去皮黃連去鬚砂仁三稜去皮各一兩黃柏去腐皮香附子去皮毛各三兩大黃蒸熟四兩牽牛頭末二兩豬牙皂角去皮弦并子蜜炙乾用一兩右為細末水糊丸如桐子大每服二錢半食後溫茶清下或薑湯亦可漸至三錢重如腎水隂虛火熱內餘五臟客熱遂用黃連黃芩黃柏治之如腸胃積熱生濕於內燥甚於腸胃之外則燥濕不相和濟用大黃黃連以流濕潤燥如三焦臟腑血氣血結滯作痛不能消化飲食香附子木香檳榔青皮白豆䓻砂仁沈香蓬术三稜通流結滯之氣如大腸氣滯脹悶作痛大便燥澀艱難用枳殼郁李仁牽牛末以通利濕潤之如胸膈脅肋脹滿痞悶作痛枳實木香開通之如大腸中風燥下血生痔用皂角并子枳實枳殼郁李仁當歸以治之如胸心膀胱氣血鬱結不通臍腹腰胯脊背痛加牽牛頭末取快利之如稟受氣血壯實之人常服不減去牽牛年老之人血虛氣衰腸胃濕甚大便㵼軟減去牽牛茴香煎丸治脾胃弱腎氣虛飲食不美噫醋吞酸臍腹痛小腸氣痛及中酒惡心常服大益脾腎病後氣體瘦弱尤宜服川椒半兩去子及合者老生薑二兩細研厚朴去粗皮青鹽海鹽亦得以上五味入磁罐內湯浸得所慢火煮乾各一兩茴香附子二味去皮臍尖銼骰大炒黃川楝子肉大川烏益智仁陳皮去白蒼术米泔浸一宿各一兩桂去皮破故紙炒右為細末醋糊丸如桐子大每服三十丸溫酒鹽湯下空心服蜜補固真丹劉先生直格方治脾腎真元虛損泄利痰嗽噦痞水榖酸臭惡飲食臍腹冷疼肢體麻痺下虛痿厥上壅滯腎虛耳鳴脾虛困弊肺腎虛證常服補養通氣血進飲食天南星半兩半夏製神麯麥芽茴香炒京三稜各一兩炮白附子乾生薑川烏各一兩生巴豆七枚牽牛三兩代赭石二兩官桂一分右為末水和丸如小豆大每服十丸至五十丸溫水下除泄痢外並加大黃一兩木瓜丸出聖惠方治脾胃積冷腹肋疼痛宿食不消兩腳轉筋時復㵼痢木瓜七枚大者切頭上一片為蓋子割去穰并皮子入硫黃青鹽在內硫黃二兩細研水飛過青鹽二兩細研木香一兩檳榔兩肉豆䓻一兩去壳訶梨勒皮一兩桂心一兩白芍藥半兩當歸半兩微炒胡椒半兩蓽茇半兩草豆䓻半兩去皮右為末入木瓜中令盡以蓋子蓋之用竹簽子劄定以三五重紙裹木瓜於飯甑內蒸令爛熟研如膏候可丸如桐子大每服空心以溫酒下二十丸石斛黃茋丸出聖濟總録治真臟元氣弱洞泄寒中腹內雷鳴多便泄飲食減少多困嗜卧石斛去根二兩五味子一兩黃茋微炙銼一兩蓯蓉酒浸切焙乾各一兩半熟乾地黃一兩焙訶梨勒皮半兩山芋蒼术切炒澤㵼各一兩右為末以酒煮麵糊丸如桐子大每服二十丸至三十丸溫酒或鹽湯空心食前木香丸出聖惠方治一切氣及宿食不消心腹脹疼大腸下利木香一兩檳榔一兩訶梨勒皮半兩丁香桂心一兩牽牛麝香大腹皮半兩郁李仁一兩湯浸去皮微炒陳皮半兩湯浸去白焙吳茱萸半兩