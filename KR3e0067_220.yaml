body:
  text: 普濟方卷二百二十明周王朱橚撰諸虛門補虛壯筋骨附論夫人之有身不自愛惜竭精縱欲遂至勞傷筋骨肝腎虛弱精氣不足則骨髓枯竭形體消瘦氣血既虛則百病斯作故為虛損也腎主骨肝主筋補肝養腎使精血氣實則所以筋骨自壯也方鹿茸丸補暖下元強筋骨益精髓壯腰膝祛風利氣美顔色鹿茸一兩去毛酥炙微黃蓯蓉一兩酒浸一宿去粗皮炙乾兔絲子一兩酒浸三宿曬乾别搗為末巴戟一兩桂心人參去蘆白茯神五味子萆薢銼黃芪銼續斷逺志木香薯蕷澤㵼熟地黃石斛去根銼覆盆子蛇床子各一兩天雄白茯苓附子炮製去皮臍柏子仁牡丹防風去蘆各半兩右為末煉蜜和搗三五百杵丸如桐子大每日空心溫酒並鹽湯下三十丸加至五十丸何首烏丸治風和血壯筋骨潤肌體何首烏一斤米泔浸一宿用竹刀切去皮切作片子焙乾赤芍藥牛膝去苗用醇酒浸一宿切焙乾熟地黃焙乾各四兩右木臼中搗羅為末以酒煮麵糊丸如桐子大每服三十丸空心溫酒或米飲下四生丸壯元氣治一切筋骨疼痛萆薢防風去義狗脊去毛烏頭去皮臍生用右等分先以河水浸烏頭七日夜切作片每烏頭一兩用鹽半兩同炒黃次與諸藥同搗羅取細末用米醋麵糊丸如桐子大每日空心十丸漸加至三十丸溫酒或鹽湯下肉蓯蓉丸出聖惠方暖水臟壯筋骨益精氣利腰腳明耳目強志力悅澤顔色充益肌膚肉蓯蓉二兩酒浸一宿刮去皮炙乾令乾末附子一兩炮製去皮臍巴戟天一兩蘹香子一兩石斛一兩去根銼補骨脂一兩川椒三分去目及閉口者微炒出汗用佳桂心一兩鹿茸一兩去毛酥炙黃木香三分牛膝去苗一兩丁香三分五味子一兩澤㵼檳榔一兩黃芪三分銼白术三分熟乾地黃一兩人參三分去蘆訶梨勒皮三分山茱萸三分乾薑三分炮製銼硃砂一兩細研水飛過麝香半兩細研右為末研令勻煉蜜和搗一千杵丸如桐子大每日空心以溫酒下三十丸松枝丸出聖惠方治風冷強筋骨補五臟除風濕久服輕身能延年益氣補諸不足松枝三兩煉成者松花二兩白茯苓二兩菖蒲一兩桂心一兩生乾地黃二兩薯蕷一兩逺志一兩去心鹿角膠一兩搗碎炒令黃燥牛膝一兩去苗甘草一兩炙微赤銼檳榔一兩肉蓯蓉一兩酒浸一宿刮去皮炙令乾兔絲子一兩酒浸三日曬乾别搗為末鹿茸一兩去毛炙微黃右為末煉蜜為丸和搗三五百杵丸如桐子大每日空心以溫酒下三十丸漸加至四十丸椒紅丸壯筋骨益血脈悅顔色蜀椒去目閉口者炒出汗取紅三兩牛膝去苗酒浸三宿洗暴乾四兩附子二兩泡製去皮臍桂心一兩巴戟一兩生地黃五兩取汁熬為膏石斛一兩去根銼鹿茸二兩去毛塗酥炙微黃肉蓯蓉三兩酒浸去皮炙兔絲子三兩酒浸一宿焙乾為末磁石二兩燒醋淬七次細研水飛過吳茱萸一兩湯浸焙乾炒硫黃一兩細研水飛過木香一兩右為末入研豫藥令勻煉蜜和搗三二百杵丸如桐子大每日空心鹽湯下三十丸烏頭煎丸補壯筋骨烏頭半斤不去皮尖水浸三二宿天麻一兩牛膝去苗酒浸一宿半兩切焙巴戟天去心半兩海桐皮補骨脂炒半兩肉豆冦去壳半兩蘹香子炒一兩萆薢木香一兩石斛去苗半兩沈香銼一兩大棗十五枚爛煮去皮核入膏中右用黑豆半升煮烏頭以豆熟為度取出切作片子焙乾用青鹽二兩炒令黃色去鹽搗為細末以醇酒二升先暖酒令滚沸次下烏頭熬成膏然後以諸藥焙乾搗羅為末并棗膏入膏內和調得所丸桐子大每服三十丸空心鹽湯下五味子丸補虛損益氣血壯筋骨五味子熟乾地黃焙補骨脂炒牛膝去苗酒浸切焙各二兩杜仲去粗皮炙銼石斛去根山芋海桐皮銼黃芪細銼各一兩兔絲子六兩淘去浮者酒浸三日别搗取末三兩天雄半兩炮製去皮臍右為細末煉蜜丸如桐子大每服三十丸空心溫酒下硫黃丸出聖惠方補治虛損益精髓悅顔色久服輕身倍力耐寒暑壯筋骨暖下元硫黃四兩酒煮黑色細研雄雀兒五十隻取肉研硇砂二兩細研阿魏三兩麵裹煨麵熟為度桂心二兩兔絲子二兩酒浸焙乾為末晚蠶砂三兩半醋浸焙乾逺志三兩去心右為末入研藥令勻煉蜜和搗三百杵丸如桐子大每日空心以鹽湯或溫酒下二十丸不問少老並宜服之補真丸補元氣壯筋骨明目駐顔蘹香子炒一兩附子炮製去皮臍巴戟天去心各半兩陳橘皮湯浸去白焙一兩青橘皮補骨脂青鹽研各十兩牛膝去苗酒浸一宿切焙乾蜀椒去目閉口者炒出汗取紅各一兩右為細末用羊腎一對去筋膜細切於砂盆內研令極細入酒半斤煮成糊和丸如桐子大每服三十丸空心溫酒或鹽湯下蘹香子丸補虛損除風冷壯筋骨明耳目蘹香二兩炒川楝子二兩陳橘皮二兩去白穰川烏頭二兩炮製去皮臍萆薢二兩地龍二兩去土微炒旋覆花蜀椒去目閉口者炒出汗各二兩右為末煉蜜和丸如桐子大每服二十丸空心臨卧酒下萆薢丸補虛壯筋骨益氣血萆薢一兩半當歸銼乾薑炮厚朴去皮薑汁製炙桂去皮附子炮製去皮臍各一兩陳橘皮湯泡去白焙六兩京三稜炮銼右為細末酒煮糊丸如桐子大每服三十丸空心食前鹽湯下補氣丸補虛壯筋骨治臍下撮痛及小腸氣葫蘆巴炒良薑炒補骨脂炒烏頭炮製去皮臍葳靈仙去土各半兩蘹香子炒一兩半檳榔生二枚右為細末醋煮糊和丸如桐子大每服十五丸空心溫酒下肉蓯蓉丸補元氣壯筋骨益精駐顔肉蓯蓉酒浸切焙牛膝去苗酒浸一宿切葫蘆巴炒蜀椒去目并閉口者炒出汗楝實去核炒蘹香子炒各一兩青鹽炒研半兩右為細末用豬腎一隻去筋膜細切將浸藥酒煮熟研爛入前件藥末和勻為丸如桐子大每服二十丸加至三十丸空心溫酒下麋角丸出聖惠方補暖下焦治風虛壯筋骨麋角屑三兩酥拌微炒巴戟三兩肉豆䓻二兩去壳微炒當歸一兩微炒檳榔二兩硫黃二兩細研水飛過乾薑一兩炮製銼右為末入硫黃同研末煉蜜和搗三五百杵丸如桐子每服空心以溫酒下三十丸續命丸補虛益氣血實丹田悅顔色壯筋骨乾柏葉一斤甘菊花未開者白茯苓熟乾地黃焙四兩松脂一斤用桑柴灰汁二斗煮令白色為度右為細末煉蜜丸如桐子大每服三十丸空心溫酒下萆薢煎丸補益丹田壯筋骨萆薢一斤用新米泔水洗淨焙乾入新瓦罐子內以酒五升浸用油單紙密封口放日中曬一七日焙乾為末補骨脂炒四兩狗脊去毛醋炙巴戟天去心牛膝去苗酒浸切焙蘹香子以鹽二兩同炒各二兩右以蜜胡桃仁相和熬如稀餳後入補骨脂等末和丸如桐子大每日空心以溫酒下三十丸一方煉蜜和勻如飴盛瓦器中旦日以溫酒化下一七熟水亦可久服延年益氣忌藝臺羊血刪繁本草注云補骨脂令多以胡桃合服此法出於唐鄭相國自序云豫為南海節度年七十有五越地卑熱濕傷於內外衆疾俱作陽氣衰絶服乳石補益之藥百端不應元和七年有訶陵國舶主李摩訶知豫病狀遂傳此方其藥豫初疑而未服摩訶稽顙固請遂服之經七八日而覺應驗自爾常服其功神驗十年二月罷郡歸録傳之破故紙十兩湯浸去細皮研如泥即入前藥更以好蜜和攪令勻如餳糖盛于瓷器中旦日暖酒二合調藥一七服之便以飯壓之如不飲人暖熟水調亦得服爾久則延年益氣悅心明目補添筋骨但忌食藝臺羊血餘無忌此物本自外番隨海舶而來非中華所有番人呼為補骨脂訛語為破故紙也婦人服之亦佳沈香丸調順脾胃補益真氣進飲食壯筋骨治虛乏輕腰膝沈香丁香肥者南木香舶上茴香炒香補骨脂炒南番葫蘆巴炒石斛去根川芎巴戟去心牛膝青橘皮去穰以上各一兩附子半兩炮右為末煉蜜丸如桐子大每服三十丸空心溫酒下飯飲亦得久服尤妙鹿茸丸出十便方補真氣暖腎臟縮小便退隂進陽壯筋骨耐寒暑進飲食鹿茸二兩蓯蓉焙乾稱附子山藥地黃牛膝破故紙各一兩桂麝香一分右搗羅為末以酒蜜各一半煉熟丸如桐子大每服三五十丸空心酒下香茸丸又方出十便良方熟乾地黃五兩兔絲子四兩另末鹿茸三兩右為細末入麝香半錢煉蜜杵丸如桐子大每服三十丸至五十丸溫酒鹽湯下香苓丸出王氏博濟方補助元氣壯筋骨進飲食療膀胱小腸等氣疾茴香舶上者慢火炒令香金鈴子麩內炒過藝臺子炒大附子炮製去皮臍桑螵蛸略炒馬藺花醋浸一宿炒令紫色各一兩右件六味揀令淨同杵為末酒煮麵糊丸如桐子大每服空心鹽湯下三十丸養肝丸出朱氏集驗方治養血氣壯筋骨白芍禹餘糧煆蓯蓉黃茋蜜炙當歸茯神杜仲鹿角膠炒一兩半牛膝木瓜川續斷柏子仁石菖蒲各半兩右為末醋糊丸如桐子大早空心鹽湯下青鹽丸出聖濟總録固丹田壯筋骨青鹽細研一兩蜀椒去目閉口者一兩半肉蓯蓉酒浸一宿切焙巴戟天去心各二兩牛膝酒浸一宿焙右為細末用獖豬腎一對去脂膜細切研爛以浸藥酒熬為膏丸如桐子大焙乾每服五十丸空心食前溫酒或鹽湯下附子丸出朱氏博濟方大壯筋骨補益丹元進飲食化氣治腳氣腰膝乏力行步艱難或腳疼痛或下注成瘡大附子十兩用黑豆一升水五升不犯鐵器內慢火煮候豆熟附子軟為度切作片子焙令乾川芎六兩木瓜末牛膝半斤羌活四兩右為末蜜三斤和勻熬如餳膏可丸如桐子大空心食前鹽湯溫酒任下十五丸或二十丸消榖助筋骨行榮衛明目輕身出本草以棐實多食一二升佳不發病令人能食補中益氣堅筋骨通血脈興陽道用陳倉米作飯乾食之補虛治風附論夫風者百病之始也清淨則肉腠閉拒雖有大風竒毒弗之能害體虛之人本臟虧耗風邪易乘其證或心神驚悸手足顫掉筋脈拘急凡此之類皆因虛挾風所致法宜補藥中加以治風之劑方地仙丸治風順氣補元陽活血大壯筋骨滑膚明益壽駐顔久服輕身萆薢防風去義白蒺䔧炒狗脊去毛烏藥銼附子炮製去皮臍白附子炮赤小豆揀地龍去土骨碎補炒蘹香子炒羌活去蘆天南星炮黃耆銼炒各半兩牛膝酒浸切焙肉蓯蓉酒浸切焙何首烏去黑皮蜀椒去合口者及目炒出汗覆盆子去蒂各一兩木鱉子三分右為末酒煮麵糊為丸如桐子大每服二十丸空心食前鹽湯或酒茶任下男子久冷元氣虛憊腳手疼痛等疾皆可服之神厚朴丸治真元虛弱風寒冷氣入腸間使心腹暴痛背脊酸疼腸鳴泄㵼心虛嗜卧兼調隂陽和臟腑散風冷外邪補丹田正氣厚朴去皮生薑汁炙枳殼去穰麩炒蘹香子炒香肉豆䓻去壳桂去粗皮白术各一兩丁香蓽澄茄右為細末酒煮麵糊為丸如桐子大每服十五至二十丸空心溫酒或鹽湯下婦人久冷亦可服磁石丸出聖惠方暖腰腎壯筋骨明耳目利腳膝磁石三兩燒醋碎七次細研水飛過雄黃二兩細研水飛過桂心末二兩牛酥一分雄雀糞一分兔絲子二兩酒浸三日曝乾另搗為末右將磁石雄黃二味取雞子二枚打破小頭作孔出白調和二味令勻却入於雞子殼內以數重紙糊定後却與雞同抱之二十日後取出細研并兔絲子桂心二味末入牛酥等以蜜和丸如菉豆大每日空心以溫酒下三十丸補腎氣壯元陽神效蓯蓉丸補壯筋骨蓯蓉酒浸一宿切焙附子炮製去皮臍牛膝去苗酒浸一宿切焙鹿茸酥炙去毛半兩兔絲子酒浸二宿另搗末各一兩右為細末酒煮麵糊為丸如桐子大每服三十丸鹽湯或白湯下烏頭丸補元臟壯筋骨益氣力療風寒濕痺暨手足不隨方見本門補虛治風類六味烏頭丸何首烏丸壯筋骨烏潤髭髮益血脈助陽氣一切風攻手足沈重皮膚不仁遍身麻木風勞風疾何首烏淨洗以竹刀刮去皮切一斤與淨黑豆一升同用新汲水浸一宿炊以豆爛為度取出暴乾天南星炮去皮臍