body:
  text: 普濟方卷二百九十六明周王朱橚撰痔漏門諸痔比聖丸治榮衛不調膓癖下血及治五痔下血不止消散下部毒椿莢十兩炒生蕈二兩甘草二兩細剉炙令赤色右為末煉蜜丸桐子大每服五十丸空心米飲下療諸痔及下血不止轉虛羸者服無不效黄蓍綿州者枳實商州者各一兩半細剉炒令煮黄礬石一大兩炭火燒經一復時仍数翻轉令勻著火冷訖細搗去砂石右搗黄蓍枳實篩訖然後和礬石更揚勻蜜丸空心以酒下之二十丸加至三十丸日再服忌蕎麵猪肉蒜魚䓁物療五痔桃葉蒸痔桃葉二斛細糠胡麻各一斗熬右合併蒸之取細糠熟為度内小口甕中将肛門坐氣薫入肛門獨聖散治痔漏明礬用四兩浄信二錢半硃砂一錢右各研為末先将信安瓶内次用白礬葢之用火煆令烟盡候冷為末包下臨用旋入硃砂以香油調𫝊日三次苐二日温水洗去再用藥痔焦黒漸加硃砂末後用荆芥煎湯洗葢硃砂能解信毒故漸加也用此藥湏用水澄膏先䕶好肉水澄膏䕶肉出永類鈐方鬱金白芨各一兩右為末水和蜜用箆子挑藥塗肛門四圍仍用紙貼然後用痔藥凡治内痔湏候登厠翻花用温水洗净不湏坐厠卧床弦後用藥𫝊之後大便閉結服潤腸丸方見大膓門大便閉澁類治痔瘡葱擂爛猪膽汁蜜等分右和勻先木鱉子煎湯洗之方用藥敷之痔瘡方用馬齒莧煎湯薫洗後用白礬五倍子黄丹各等分右以桑葉同為末唾調敷上治五痔必效方枳殻二兩麩炒黄去穣葫荽子一錢炒皂莢去皮子焙一根右為末蜜丸桐子大每服食前煎黄蓍湯下三十丸熨藥方出聖恵方治五痔桃葉切二升槐花一升胡蔴一升右合搗蒸之以熱熟為度旋取一升以綿裹熨痔上冷即頻換熨之淋渫藥葳靈仙散出禦藥院方治大膓痒痛或腫悶葳靈仙枳殻各一兩右為粗末毎用一兩水二碗煎一碗半澄去滓葉熱蒸通手浴不拘時淹乾貼蒲黄散淋渫藥雞冠散治五痔肛邉腫痛或生䑕乳或穿穴或生瘡久不愈變成漏瘡雞冠花鳳眼草各一兩右為粗末毎用藥半兩水一碗半煎三五沸熱淋渫患處烏荆丸出宣明論治膓風痔疾大膓悶澁風病攣搐頭頷抽掣下血川烏頭三兩炮荆芥穂四兩右為末醋糊丸毎服二三十丸如桐子大温水下日三浄固散當歸半兩蜜陀僧二錢半右為末酒調下勝金散草烏一箇白薑一指大右為末毎服用半錢病人津唾調塗在黒瘤上自然脱落遂用洗藥蝸牛膏出濟生方蝸牛一枚麝香少許右用小沙合子盛蝸牛以麝香摻之次日取汁塗痔洗法木槿花無花用葉或根不妨朴硝少許右煎木槿花泡入朴硝令温洗日三次極妙熊膽膏出危氏方熊膽腦子各研細右各少許用井花水調以雞毛搽痔上枯礬散枯礬腦子各等分右為末先用魚腥草即是蕺菜濃煎汁放温洗次用少許𫝊痔上洗痔出百一選方野苧根一斤橡斗子殻半斤右搗細用水一斗煮及七分乗熱以盆盛先薫患處候湯冷熱得所通手洗之冷則止藥汁可再煖用三五次甚妙丹石散出百一選方黄丹滑石右等分為末用新汲水調塗日三五上洗痔方出危氏方木鱉子百藥煎右等分為末毎服一掬布裹煎湯以桶盛之葢上穴一竅先以藥氣薫蒸候通手洗之常有一婦人患已成漏瘡脱肛用此而愈必效丸一名散結丸出經騐良方治五痔結核黄蓍去蘆枳殻炒去白右等分為末蜜丸桐子大空心米飲下三十丸氣痔用飯丸治諸乳痔不問年深不愈者出經騐方生薑不去皮二兩杜牛膝一兩右擂爛酒半盞炒令熟再用酒半升煮數沸去滓空心服如痔不入却用五倍子為細末用蜜調塗乳痔上即收用單紙塗藥𫝊之寛膓丸出危氏方五炎膏塗痔瘡之後或臓腑秘結不通黄連枳殻一分右為末糊丸如桐子大毎服五十丸空心米飲送下治痔方猪牙皂角右各等分燒灰為細末毎服二錢空心熱酒下治痔取蟲方甘遂一錢一半生一半炒瞿麥穂一錢半右為末用獖猪腰子二箇批作四五片作一重摻藥在内止用紙裹用米泔水浸濕文武火燒熟用無灰酒下空心服之忌冷物甘草治痔瘡五倍子紅色者末八錢蛇蜕燒灰末一兩右研勻以鬱金煎湯薫候冷洗了却傅雌痔係翻花痔用雌蛇脱乃低處就地者雄痔係牛嬭痔用雄蛇蜕乃髙處蜕者治諸痔甘草鳳尾草右各等分搗碎先用瓶酒井水華㣲㣲略呷三兩口即用此湯乗熱薫洗了却用栁樹蛀末桑樹蛀末千年草多年爛屋上草也亂頭髪皂角燒烟薫之再用煎藥薫之洗之洗痔妙方五倍子一錢炒枳殻四錢炒右㕮咀用布袋盛藥煎湯薫通手洗之冷住手復傾在瓶内熨熱再薫洗毎日如此數次除根藥袋常浸瓶中如未效再修合治之治痔瘡并枯瘤桑柴灰灰各二升右用水十碗淋灰汁煎成膏稍塗患處治痔瘡方川百藥煎三兩一塊不要碎者乾胭脂五錢半右研為末分作七服毎日五更用無灰酒調下一服面朝東南方服治痔下腫痛出本事方枳殻一兩陳粟米同炒令黄赤米不用右為末毎服二錢飯下秘方白礬右用少許於新瓦上煆過為末再入朱砂少許以新汲井水調成膏用舊􅏛紙上藥隨瘡大小貼之先用鬱金黄丹末以鵝翎刷於瘡四畔圍䕶恐傷好肉仍用大青根晚蚕沙煎水洗後再上藥連服槐角丸皂角丸臓腑結熱秘甚八正散加燈心枳殻薄荷葉煎再用大黄茶莽草荆芥穂防風煎水洗效治痔榖道中蟲痒不止及正發疼痛出肘後方水銀𫝊膏各二錢右研和如𫝊核大絲綿裹納下部明日虫出若痛加韶粉三大分作丸内之雞子膏出聖濟總錄没藥五錢研麝香一錢研右用雞子一枚略取破頂頭出白用雞子黄入雞殻内續入藥末同黄一處調勻用紙糊合頂於飯上炊令熟為度分作四服細嚼麥門冬湯下食前熊消丸出聖濟總錄葳靈仙洗净火炒蟬殻去土净洗去足焙乾各一兩右為末醋糊丸桐子大毎服二十丸至三十丸米飲下苦楝散出聖濟總錄貼痔苦楝子二枚白礬一兩右炒焦為散入麝香研勻臨卧貼空心喫嫩猪肥肉一頓永瘥薫痔丸出聖濟總錄白鱔骨韭子各等分右為末糊丸彈子大火焼熏之殠橘散出聖濟總錄殠橘皂莢子右不拘多少每服一臭橘子鑚眼七個毎眼子内安皂子一枚放在甆瓶内燒存性取出於土内收出火毎一宿細研入麝香少許食前米飲下一錢七分枸杞散出聖濟總錄枸杞根地龍右枸杞根旋取新者刮去外赤皮只取苐二重薄白皮暴乾搗羅為末毎稱一兩别入地龍末一錢和勻先以熱虀汁洗渫患處摻藥日三次治痔肛門腫破痒痛不可忍出經騐良方百藥煎白礬各一兩右研細末用童子小便一盞化藥洗療治下部虫齧出肘後方小豆一升好苦酒五升右煮豆令熟出暴乾復内令酒盡止搗末以酒服方寸匕日三又方蜀椒子二升酒一升右漬經五日稍稍飲一日令盡佳酒蒸黄連丸出徳生堂治諸痔瘡及便血不止黄連一升酒浸蒸苦參半斤右為末以浸黄連酒麵糊丸桐子大毎服五七十丸飯水不時下治痔瘡蒼耳薄荷各等分右藥煎服滓再煎薫洗之療痔神方出肘後方麝香一字熊膽一枚右和勻井花水毎日一服一錢七分唯忌雞魚一方熊膽一味津唾調塗瘡上未差再塗又塗真熊膽取瘥不過三四塗取愈秦太師兄弟皆病此即安然治藥方出𫝊信適用方連翹枳殻麩炒右等分為粗末煎薫洗槐黄散出聖恵方治五痔槐黄二兩㣲炒附子一箇去皮臍右為散毎服食前以温粥飲調下一錢治五痔出聖恵方槐根五兩艾葉三兩右以水一斗煎五升去滓冷煖得所洗下部日二又方一名龍骨膏方見本門脉痔洗貼藥出經騐方豆䜴朴硝各等分右用罌子煮滚即用數重紙裹瓶口放桶内却紙上取一孔透氣薫痔自焦自實𫝊痔方出直指方治膓口熱腫朴硝二錢硼砂半錢右為末乾摻又方出直指方大黄滑石各等分右為末井水調𫝊又方出直指方朴硝五倍子各等分右為末𫝊之硝石散出危氏方寒水石朴硝各等分右為末以津潤手指㸃藥敷治五痔悉主之蛇蛻皮二兩燒灰麝香一錢右為末每服二錢七分粥飲調下空心又方出千金方右用白槐皮十兩搗丸彈子大綿裹内下部中此病宜常食扁竹葉及煮羮粥大佳一方槐根煮洗桃根湯治五痔方見本門血痔類治痔方出千金方右用槐甘赤雞一斤即是槐蘗為末飲服方寸匕日三治穀道痛出肘後方右用兎絲子熬黄黒用雞子黄和以傅之日二苦葫蘆方出御藥院方治諸疼痛不可忍右用苦蘆子每服一錢水一升煎十餘沸濾去滓薫瘡冷熱得所淋洗隔一二日一次薫痔散右用葳靈仙三兩水一斗半煎七八沸去火就盆上坐令氣薫通手洗冷再煖治諸痔出海上方右用蒼术二兩剉碎烟薫之後使渫藥渫藥出海上方右用垂栁乾葉煎湯淋洗之槿花散出百一選方治脱肛痔病等右用槿花不拘多少採時不得用手以竹筯就窠子摘以細篾串眼在風頭令乾毎用時以水煎沸數滚用盆盛先以氣嘘候通手洗方花殻又名骷髏子七箇經霜雪者妙燒灰為末空心酒下或米湯飲下一方木槿花為末塗之治痔出百一選方霅川一醫云此藥甚神驗沈仁父司理𫝊右用雄雞一隻籠罩餓三日令腹空移就别處切乾肉餵之收其糞入乾鍋子焙煆通紅存性入腦麝少許常用生麻油輕粉調𫝊濕即乾摻蘇韜光家方用烏雄雞仍湏眼足俱黒者又入腦麝外用乳香少許傅之治痔立效丸右用百藥煎研末每服三錢煮稀白粥攪勻食之糊丸米飲湯下亦得又方出百一選方右用鴨脚草俗呼甘還草又名碧蟬兒花手挪軟納患處即愈又方出百一選方合肥陳學諭行之説吕應渠親取效右用穿山甲自尾根盡處數除三鱗不用取苐四苐五苐六鱗横三行燒存性為末用麝香少許臘茶一匙同調空心服以取下膿却傅之瘡處其冷如氷即不痛無不取效烏金散出經騐良方治痔及赤白帶腸風右用胡桃殻燒存性為末毎服二錢秤錘燒紅淬酒調藥服又方右用羊屎八十一枚焼存性為末入麝香少許以鹽湯洗了以滓液調塗即效洗法右用木鱉去殻爛研白礬細研梹榔末等分湯一大碗浸放盆内坐薫通手淋洗一方鱉仁研土礬末水煎薫兩三次治翻花痔右用生木𤓰為末鮎魚身上涎調貼以紙搨上三兩次即消鮎魚放則效殺之則不效立效散治熱痔右用皂角火煨去黒灰弦子净取半斤加沉香少許為末醋糊為丸毎服三十丸空心鹽湯下一方去皮弦蜜塗炙酥地上出火毒細研擂和丸桐子大茶湯下五十丸或百丸又方右用韭菜不拘多少先燒熱湯以盆盛湯在内盆上用器具盖之止留一竅却以韭菜於湯内泡之以榖道坐竅上令湯氣薫蒸候温冷却用韭菜輕輕洗瘡上如此數次自然脱體洗貼藥右用烏桕根濃煎湯服之加𤣥參同煎湯洗煎服治痔瘡右用茄花不拘多少陰乾為末空心毎服三錢無灰酒下治痔瘡右用辣芥茶煮薫洗治痔方右用黄葵不經手入缸候爛次用綿紬子蘸藥成餅子如膏藥相似先以甘草湯或葱湯洗浄貼上不一二日全消神效治痔除根方右用拒霜花煎湯薫洗郤用栁蛀末燒烟薫之治乍生痔瘡右用荆芥濃煎湯下服青州白丸子一服便可治痔瘡右用九尖萞麻葉揉碎煎湯薫洗立效治脱肛痔病等右用葱鹽湯先洗却将薄荷煎細研葱白濾汁去滓入蜜調煎貼患處用油單紙傅上貼之坐卧俱可治痔良方一名止痛膏右用大皂莢針七箇燒存性白礬一塊大如指飛過並為末入腦子少許麵油調勻傅患處日兩次易大效治五痔右用蒼耳根曝乾為末水調服方寸匕立效清粥飲調下亦得五月五日採為上一方用子又方用子作四片菜油脚煎油搽之又方右用枳實為末蜜丸桐子大空心米飲下二十丸又痔方右用韭菜自然汁一碗蒼耳子葉汁一碗調勻日晒洗絶根又痔方右用磨刀水澄清放温洗痔方右用甲香明者燒灰多燒烟坐身於瓶口上薫三五次除根又方右用降真香燒香薫妙蠟礬丸治諸痔諸癰惡瘡便毒右用明礬煆為末鎔蠟丸桐子大毎服七十丸温水送下猪甲散右用猪後蹄垂甲不拘多少燒存性為末陳米飲二錢空心服一方燒灰傅青蛙丸右用青色蛙長脚者取一箇燒存性為末雪水丸桐子大毎服十五丸空心先喫飯二匙次以胡桃肉切細煎湯調枳殻散下若産婦發痔裡急作痛用黒豆百粒陳米一合煎湯下亦先喫飯二匙通用方右用鴨嘴青膽礬煆為末青蜜調筆傅可以消脱又方右用雞子一箇煮熟去黄取白切焙明礬煆白歛各一撮同末傅有孔用紙撚蘸入薫洗方右用藩蘺草根煎湯先薫後洗藩蘺花似小芙蓉又方右用蝟皮如指許艾葉團如燒香法置長桶中坐薫三次凡痔發於肛内者湏用薫洗若膓口腫熱朴硝末新汲水調常常淋之治諸痔方右用明白礬泡湯温洗仍以葱湯再沃次用桐殻灰穿山甲尾閣炙燋地膽去足翅秫米炒各一分為細末入膽礬少許研和酒調以茟傅之若痛以葱湯沃之凖一時許前藥又増些膽礬若痛又以葱湯沃之久等一時藥中又増些膽礬並如前法一日三次用前藥其膽礬又以漸加多於苐一日後日三次用前藥其膽礬又以漸加多於苐二日痛仍葱湯沃之三日以還更不用藥只是明礬泡湯與白湯相間淋洗日三四次十餘日自然成痂如柿乾之状無膽礬以綠礬代之治痔方出直指方右用紫金皮新水煎食前服又方出直指方右用一蜈蚣焙乾為末如腦以津唾調傅青紗上貼之良又方出直指方右用五倍子焙黄剉碎毎用一兩井水三大碗煎乗熱薫洗拭乾用石膏燒紅碗覆地出毒為末傅一方為末米飲下五十粒五更服之又五倍子日乾如燒香法置長桶内坐薫患處自然收縮一方用五倍子雌雄各一枚為末洗後用井水調傅痔上五倍子看裡面紅者為雄赤者為雌秘方出危氏方右用川白芷煮白苧作線快手𦂳繫痔上微疼不妨其痔自然乾瘻而落七日後安一方白芷末用米飲調下蝸牛散出危氏方治痔瘡腫脹作熱如火右用蝸牛螺一箇以氷片腦子麝香各少許同入瓦器内頓熱瓦逼半日自化成水以少許㸃瘡上立愈一方無麝香用玉器盛為水羊毛茟塗治痔病右用蜒蝣殻燒作末服之香膽丸治牛痔及痔漏脱肛右用九犍牛兒膽蝟各一箇以膩粉五十分麝香二十分将蝟膽汁膩粉麝香和勻入牛膽内懸於簷前四十九日熟旋取為丸如麥粒却送入瘡内後追退出惡物是驗瘡口漸合生麵葢瘡内一遍出惡物薫洗方出肘後方治痔下部如蟲齧右用掘地作小坑燒令赤以酒沃中杵吳茱茰三升内中極熱復開小孔子以下部坐上冷乃下不過三度良又方治五痔不拘年月逺近右用枳殻為末蜜丸桐子大空心服二十丸又為末服方寸匕治痔方右用駱駝脂作煎餅空腹食之勿令病人知一方領下毛燒灰拌雞子酒服治久野雞痔下血不止肛邉痛右用野猪肉二斤切作五味炙空心服作羮亦得治痔方出肘後方右用臘月牛皮一具熟食之盡瘥勿與鹽醤未瘥再服鼉皮方治膓痔疾甚者右用鼉皮及骨燒灰研末米飲服又入紅雞冠花末白礬灰末和之空腹服便瘥今醫方鮮用黿鼉甲者又方出千金方治五痔下血不止者及痔榖道痛右用杏仁去皮尖及雙仁者水三升研濾取汁煎减半投米煮粥停冷空心食之杏仁熬薫杵膏𫝊之治痔有蟲咬榖道痒或下膿血一名槐白皮方見本門脉痔類虎骨膏治五痔下血右用虎骨膏内下部治患五種痔右用山豆根水研服之治痔右用狸骨頭燒灰和酒服二錢七分治痔病右用茱茰根濃煮水洗痔有騐燒末服之亦效治痔發疼痛出肘後方右用狸肉作羮作脯食不過三頻蒸此肉甚妙治痔疼痛下血不止右用坑月沙不限多少慢火燒令黄色為末毎二錢入乳香半錢空心温酒調下日三四服瘥砂即兎糞是也治痔方右用連翹煎湯洗訖刀上飛礬入麝香貼之治五痔及大便卒痛如鳥啄出千金方右用桑耳作羮空心下飯飽之待卒痛如鳥啄取大小豆各一升合搗作兩囊蒸之及熱更互坐即瘥羮飯湏日三服之一方桑耳為散毎服二錢粥飲調下百中散治痔右用􅒝􅐺不拘多少搗為散毎服二錢七分精羊肉四兩批作四片摻藥却合如餅子於炭火上炙熟細嚼以酒半升送下候膓痛如人行五七里方上厠取下膿血及蟲只一服殠橘散出聖濟總錄右用殠橘不拘多少瓷瓶子一枚紙數重磚一片壓口次用炭火籠作火屋燒殠橘候烟盡去磚存性只置瓶内不以紙并塼子壓口次用候冷為細散毎服二錢七分麝香温酒或陳米飲下小黄連丸出聖濟總錄治五痔有頭如雞冠者右用黄連麩炒黄色不拘多少為末以雞子清和丸桐子大隂乾毎服十五丸於雞鳴聲未絶間温酒下十服取效一方為末服之更加赤小豆地膚子散出聖濟總錄右用地膚子不拘多少新瓦上焙乾為末毎服三錢七分陳米飲調下日三駝糞熏方出聖濟總錄治痔右用駝糞不拘多少隂乾不得見日慢火煨成烟薫後痒甚别用後方洗之淋渫方出聖濟總錄治痔右用惡實一名牛蒡子不拘多少淘去浮者毎用一兩水二碗濃煎乗熱薫候通手淋渫神白散出聖濟總錄治痔下部發腫如梅子李子大痛礙不能行者右用半夏齊州者一枚研令極細入龍腦一分皂子少許研勻用津唾於手心調令稀稠得所攤軟紙上貼之冷如氷良久清水出漸消如未全愈再貼去根本為妙立效散出聖濟總錄治痔疾薰傅右用蜣蜋七枚夜飛撲落者尤妙入瓷合子固濟文火煆存性為末先以温水洗之用藥末燒薫畢復以藥末摻之用薄紙貼上一方搗為丸塞下部蟲出瘥治痔瘡痛右用膂肉一塊煮熟搗爛去脂膜以皂八個去黒皮焙乾為末以平胃散末五錢米湯打糊為丸如桐子大毎服四五十丸空心米湯下治野雞痔下血膓風明目出肘後方右用嫩槐葉一斤蒸如皂衣法取藥作末水煎呷之治大便血及五痔脱肛等皆常有殊效者出肘後方右用槐木上耳取末服方寸米飲下治膓風䑕嬭痔出聖恵方右用蝟皮可燒灰和酒服及炙令黄煮汁飲之一方細剉瓶内燒烟薫痔瘥獺灰方治膓風䑕嬭痔方見本門膓痔類療五痔有氣痔温寒濕勞即發蛇蜕皮主之牝痔生肉如䑕乳在孔中頗見外妨於更衣鱉甲主之牡痔從孔中起外腫五六日自潰出濃血蝟皮主之膓痔更挺出血蜂房主之方久乃縮牡猪左懸蹄甲主之脉痔更衣出毒血蜂房主之方用主藥治下篩等分隨病倍其所主藥為三分宜早以井花水服方匕病甚旦暮服可至四五服忌冷食猪肉魚生菜房室唯得食乾白肉病瘥之後百日乃通房又用藥内下部有瘡内中無瘡内孔中又方右用野葛燒末以刀圭内藥中服五日知二十日瘥三十日愈療痔下血方右用蛇不問多少煎煮肉消盡去滓用汁和藜藘粥著少鹽食之大效亦無所忌療痔方右用積雪草一大握麄切水二大升煮一服頓服盡三日重作一劑治痔頭出或疼痛不可忍右用麝香當門子印成鹽相和以手塗痔頭上若令人著亦佳其痛不可忍不過兩度永瘥又方用二十年鍼線袋口燒作灰分和水服瘥療痔正發疼痛右用薑屑二兩小稱以水三大合煮之去滓煖空腹服隔日再服忌猪肉蒜等又方右用已死竹色黒者取之折斷燒為灰篩和薄飲服之方寸匕忌獨角牛肉療痔出聖恵方右用掘地一尺深一尺圎逕四寸炭火燒令赤去黒以薄板著口上取莨菪子一合内坑中燒烟出痔人坐上以被壅當汗出宻屋内作之以烟盡更著一合莨菪子薫避風如法汗發則瘥一方水淘去浮者生為末餳和丸如蓮子大綿裹之内下部日三四度易之一用根中指大濕紙裹煨熟去紙蜜塗内下部療痔方出千金方右用鯉魚膓可半升擇净仍新鮮取一方板可闊二尺以來厚二寸當中作孔深一寸半圓如醤盞口大布魚膓於其内以好麝香碎末摻魚膓取厚氊二三重當心開孔可板孔大小鋪坐以被擁之數日可至兩次久覺下部痛者即是蟲出也時且更坐良久取魚膓細擇之恐蟲入魚膓中蟲可長一二寸許細如網絲斑作五色毎出不過十餘枚不等度數蟲盡即止一方将魚膓炙令香綿裹内榖道中蟲出入魚膓數數易之三度俱瘥治痔有外痔有内痔但辨血下即有内外之異外痔下部有孔毎便血從孔中出内痔毎便即有便血下血甚者下血遍地誠恐出血過多身體無復血色有痛者有不痛者有此候者宜依後藥用生槐子一斗候其堅硬時採搗碎絞取汁日暴取稠取地膽暴乾搗篩為散和槐子煎作丸以飲服十丸日再加至三十丸如梧桐子大或以藥捻作丸如棗核大内下部中日夜三四度亦可搗苦參末代地膽一方地膽作地脉草藥中無地脉惟有地麥黄茋十味散生槐子煎不覺可宜合此散黄茋五兩苦參𤣥參各六兩附子炮大黄各三兩乾薑二兩蝟皮炙二兩黄連四兩槐子六合猪懸蹄甲一具炙右搗篩為散空心服以飲服方寸匕日再服漸加至二匕忌猪肉治大便孔卒痛如鳥啄方出千金方右以大小豆各一斗和搗内兩袋中蒸令熱更互坐之瘥療痔下部痒痛如蟲齧用温溺令熱内少礬石以洗之良療痔及諸蟲右用石榴東引根深者取一握却勿令見風拭土剉又取鹿脯四指大一片炙兩畔令熟搥細劈水三升煮一升適寒温空腹頓服其患甚發者服即定諸蟲無問赤白出病瘥薫洗痔方出本事方右用枳殻不拘多少為末每服二錢水一大碗砂瓶内煎百沸先薫後洗一方煻灰中煨熱蒸熨七次立定療一切痔出肘後方右用浸石英酒内鹿角膠服之枳殻丸治内痔右用好枳殻不拘多少去穣細切麩炒黄為末毎末一兩入胡桃内一塊研勻以蜜丸如彈子空心細嚼一丸米飲或温酒下兼用井花水淋洗治五痔悉主之出聖恵方右用牛角腮二兩炙令黄焦搗羅為散毎服食前以温粥飲調一兩一錢温酒下亦得又方出聖恵方右用槐子揑作丸半棗大毎日内下部中不過十上差扁竹方出肘後方治外痔右用搗扁竹絞汁溲麵餺飥空心喫日三度常喫一方扁竹葉搗汁服根葉亦可治痔瘡才覺掀腫及久年痔疾出千金方右用熊膽為末先以熱水調化用手蘸抹上不住手數十次後用藥水温熱先蒸後洗如數次可除根又治五痔十年者塗熊膽又方右用膽礬雄黄輕粉各分兩為細末用蝸牛二十一箇連殻搗爛研如泥用末和作膏子如軟不可入瘡口却将烏龍得生膏揑作小挺子和蝸牛膏一處填入痔漏瘡内又用黒膏藥貼葢之庶不透出治痔瘡右用防風荆芥枳殻朴硝杉木各等分入鹽少許熏洗即不痛犀角方治内熱頭痛及五痔諸血痢右用犀角為末服之若食過多令人煩即取麝香少許和水服之即效也治野雞痔病方出肘後方王及郎中充西川安撫判官乗騾入洛谷數入而痔病因是大作如葫苽貫於膓頭其熱如煻煨火至一宅僵卧無計有主郵者云湏炙即差及命所使為槐栁湯洗苽上因用艾炙三五壮忽覺一道熱氣入膓中因大轉㵼鮮血穢物一時出至楚痛㵼後遂失葫苽所在治痔内有柿核痔牛乳痔生於榖道四邉名連子痔若根頭小者如治癧子同平頭生者用瘤法治之若去後必有黄水出如桐油直粘人手待三四日出盡将麝香散摻之口合即愈黄蓍四君子湯出朱氏集騐方治五痔下血右四君子湯加黄茋白藊豆薑棗煎服細末尤佳又方出朱氏集騐方右用橄欖核為末陳米飲調二錢服弔膓丸出朱氏集騐方治脱肛痔右用石灰炒熟入熱湯内薫痔後湯温洗數次却服沉香流氣飲吞弔膓丸蘆陵姚魚原用之有效劉寄奴湯出朱氏集騐方劉寄奴五倍子右各等分研細末空心酒下仍用其末傅乳上遂愈黒雪膏出朱氏集騐方治痔頭熱腫痛不可忍睡卧不安蜒􅀈蟲一箇腦子一撮右件放在硯上用京墨同磨成水塗上隨手無事又方出朱氏集騐方丁香二粒腦子一箇黄白皮不拘多少右為末津液調塗上倍香膏治痔疾出朱氏集騐方五倍子燒存性乳香少許降真香少許右為末用津液少許搽痔上其疼立止木鱉散出衛生家寳方治痔不拘内外洗藥木鱉子去殻切作片搗爛地骨皮紫金皮當歸枳殻各半兩右先以黒豆煮軟水五升煮四升去滓乗熱薫通手淋洗可用四次易之如身體生瘡紫黒添樟木皮或葉同煎洗落痔膏出衛生家寳方治男子婦人一十三般痔萬不失一灰莧灰一斗純白炭灰一斗右各淋取灰汁五升共一斗以薄紙數重竹箕内盛了淋七度取釅清灰汁入鐺内煎一二合却用風化石灰入細絹羅子内羅過三五度臨時旋将汁少許調風化石少許箆子挑藥㸃痔頭少時拭去又㸃如數度如黒色其痔自焦落更看落後裏面似石榴子内平便用鹽湯洗不得出風後用封瘡木槿散立效散出衛生家寳方治翻花痔瘡及一切久不差諸惡毒瘡䑕粘子草根三兩碎切熟搗大栢皮一兩右為末臘月猪脂封貼立差或猪膽和藥勻貼之紫金膏出衛生家寳方治一切翻花等痔妙方穿山甲一兩煨過乳香半錢細研如粉没藥二錢細研如粉右研勻毎用少許以津調塗瘡上即差半夏散出衛生家寳方治諸般痔疾初生急以此藥治之右用半夏生為末先以生姜汁浴榖道次以半夏末泡湯洗不過三兩日即自消夏枯草散出衛生家寳方洗痔妙方夏枯草一兩荆芥一兩枳殻半兩輕粉半錢龍膽草半兩朴硝一兩燈心一握右為麄末用水七椀煎至三椀先乗熱薫通手洗之冷即止蟬退散出衛生家寳方薫痔藥蟬蜕蛇床子穿山甲皂角刺木鱉子右等分為麄末不拘多少燒薫痔再用洗藥礬硝散出衛生家寳方治痔痛不可忍屢試立效朴硝白礬五倍子各等分為細末右以朴硝先煎湯薫候温即洗用軟帛滲乾却以水調二藥末為膏塗痔上妙應散出衛生家寳方治五痔結核痒痛時有膿血逺年不差並皆治之胡荽子用帋盛鍋内慢火炒令香熱芸臺子用紙盛鍋内炒破故紙生用右件各等分搗羅為末毎服抄三錢煨核桃一箇爛嚼後用米飲調下空心服此藥服一月永絶根本但忌酒麵毒物一月次用洗藥一井金散余居土選竒方治痔瘡毒氣潰作膿血久不止或結硬赤腫痛不可忍者露蜂房四兩蜜陀僧二兩别研右件将露蜂房剉碎安一磁鑵子内用黄泥固濟炭火煆令通紅為度放冷取蜜蜂房研末同蜜陀僧和匀毎用乾貼瘡口如瘡口小以紙撚子㸃任入瘡口内如結硬不消用甘草湯調傅之日三次用黄蓍湯淋洗痔疾黄蓍地骨皮防風三味等分焙乾右件㕮咀毎用半兩水三升煎三五沸濾去滓通手淋洗礬石散治痔白礬二兩硼砂二錢辰砂半錢麝香五分研綠礬半兩右件為細末毎用少許㸃在痔上即化作水出上藥五七日了便使後藥土硃五分牡蠣五分白芨三分白歛五分右為細末𫝊在痔上自然乾脱落即愈痔藥五礬散治諸般痔青黒礬即黒礬南礬白礬一兩即南礬明礬一兩紅礬一兩紫礬信半兩右六味研細入乾鍋内用白炭灰煆紅烟盡為度取出安地上用大椀盖定去火毒半日取出研細用香油調傅于痔瘡上半日後惡臭水流出日五六次傅藥在痔頭上焦黒色乾焦數日内自落又方治外痔桑樹灰桐子殻灰白炭灰雜柴灰石灰蠣殻灰右等分用沸湯澆過各傾入鍋内煎取半椀了却入石灰為度膽礬丸治痔下膿血礬膽礬一斤用黄泥裹炭火煆令通赤皂子一升煮去皮雞冠花一斤荆三稜四兩右為細末醋糊丸菉豆大毎服二十丸米飲下淋洗藥天仙子荆芥川椒蔓荆子各等分右以水煎洗槐花枳殻散治諸種痔瘡便血等證槐花黄連枳殻炒百藥煎各二兩右為末毎服三錢飯水空心調服角煎丸治痔病下血黄連四兩枳殻當歸尾牙皂香附子各二兩右為末糯米為丸毎服三十丸空心米湯下又方加木香五錢又宜煮鹿皮如常食之尤妙荆芥散洗薫痔疾荆芥熟艾木鱉子去殻各半兩寒水石煆三錢一作軟石膏右㕮咀毎服用半兩入橘葉四十九片同煎令香熟却以有葢橘子於葢子上開口傾藥汁在内乗熱熏稍温以隻手洗水略略洗之仍留汁更可用一次有效又方右用荆芥水洗用明礬為末以米醋調時復自手指調塗然不可太多後用橘葉燒乾去水氣煎湯熏洗更好厚朴丸治痔厚朴剉生姜各五兩切片水兩碗同煮乾炒白术麥蘗炒神麯炒各一兩右為細末麵糊為丸空心米飲下三十五丸二妙散治痔四君子湯黄芪建中湯右各一貼加白藊豆縮砂同煎服之榼藤子丸治痔瘡久不歛者刺蝟皮草烏頭川烏頭附子一兩白礬猪牙皂角榼藤子皂角刺枳殻七味各半兩右件並剉碎入沙鑵内炭火燒留性為末酒煮麵為丸如梧桐子大毎服二十丸酒送下日進二服不拘時候消毒散治腸風外痔結核或痒或痛消毒定痛令結核自散黄芪一兩五錢蜜塗慢火炙荆芥穂一兩枳殻三兩湯浸去穣切作片子炒黄薄荷葉去土半兩槐花一兩燒赤皂角子仁一兩炒令香熟蝸牛十四枚各去殻焙乾右為細末煉蜜為丸如梧桐子大毎服三十丸至七十丸清茶送下食後透肌散治痔疾山慈菰宜用根不用葉焙白礬生白芨地茄兒開紫花結子下垂瓣如御米相似如春月寒食前後採焙以上四味各二兩右件為細末入飛羅麵拌勻毎用少許冷水調稀稠得所貼患處癰疽皆腫滿以藥傅瘡周圍留病處頭腦次用紙葢貼之四效散治外痔成瘡疼痛蜜陀僧二錢别研麝香半錢片白腦子半錢銅綠一字右件同研極細先以浆水浴瘡拭乾次用藥少許貼之連蘗散貼痔定疼痛黄連去須一兩黄蘗去麄皮二兩膩粉一錢右件為末先用漿水洗瘡後看瘡大小用藥貼之日三次五靈脂散療一切痔疾疼痛腫脹坐卧不安穿山甲六十片用前膊上者五靈脂去砂石一兩黄丹一兩白礬一兩輕粉一両右件藥用乾鍋子一隻入藥在内用瓦片葢定瓦片上鑚小竅子鹽泥固濟只留竅子用炭火五斤煆之烟出盡為度碾為細末空心先嚼胡桃肉一枚飲酒一盞候半時辰再嚼胡桃肉一枚酒一盞調下藥末一錢如人行三五里間又嚼胡桃一枚酒一盞依前服之蒜餅子治風冷結滯成痔疼痛難患獨頭蒜一兩白膠香三錢右件於沙盆内爛搗如泥捻作小餅子如當三錢用大瓶一隻化炒炭火上燒令藥出在瓶上薫之治痔疾方蓽撥乾薑人參茯苓各一兩胡椒一兩官桂一兩訶子一兩半炮去核右為細末煉蜜為丸如梧桐子大空心温酒下十丸婦人積年冷病並宜服之勝金丸治諸般痔疾貫衆􅒝薢右件等分為細末醋煮麵糊為丸如梧桐子大毎服四十丸空心食前熱水送下或入麝香少許作散子毎服二錢阿膠湯調亦或酒調下得出穢膿血生肌為效定痛散治五痔及内外痔疾疼痛不可忍防己不拘多少右件為細末毎用半兩濃煎瓦松湯三升調藥置桶中慢慢熏渫患處候通手淋洗日一二次椿花散淋渫痔疾殠橘雞冠花椿花三味各等分右件㕮咀毎用藥末二兩水三升煎至五七沸乗熱淋渫治痔三黄丸雄黄一兩硫黄一兩黄丹二兩右件研細末入盞内以黄丹盖定用濕紙封火燒候青烟出為度取出候冷研細以軟柿乾和為丸如菉豆大毎服十丸若大腸出血有竅或糞前出以木通湯下若糞後有血甘草湯下甚者加至十五丸空心服紅花桃仁湯治痔疾經年因飽食筋脉横解腸癖為痔當去其筋脉横解破血絡是也治法當補北方㵼中央生地黄一錢當歸尾五分桃仁十箇紅花五分漢防己五分黄蘗一錢五分猪苓五分澤㵼八分防風五分麻黄不去根二分蒼术六分右件剉如麻豆大都作一服水三大盞煎至一盞去滓食前熱服之忌風處大小便枳殻除痔丸大枳殻四兩去穣别為末大草烏四兩不去皮尖别為末右以草烏為末入猪大臓内用醋四五斤煮乾如未爛更加醋煮十分爛為度餘醋些小搗候臓爛却入前枳殻末再搗勻和丸如梧桐子大毎服二十三十丸温米飲送下空心卧時服忌熱飲食片時仍以臭椿皮煎湯洗或謂審是熱毒者氣滯者减草烏增入黄連槐花之類當各有斟酌又方治痔川烏炮古石灰各等分右為細末燒飯為丸梧桐子大毎服三十丸食前酒或米飲下龍腦散出楊氏家藏方痔瘡熱痛鯽魚一枚破開去腸肚入糓精草填滿燒留性右件為細末入腦子并蜜同調傅之治痔出衍義右取蝟皮合穿山甲等分燒存性入肉豆䓻一半末之空心肚熱米飲調二錢服之治腸風痔疾甚者出本草方右以蛇皮骨燒灰研末入雞冠花末白礬灰末和之空腹服便差治痔頭收歛即可服右用十宣散以生氣血又國老湯生甘草湯治痔本藥也煎水熏洗生肌解石毒瘡極痒亦治之洗法右用魚腥草煎湯温洗本事方枳殻末沙瓶煎一百沸先薫蒸而後洗又馬屎莧煎湯洗濟生枯礬散洗滲右用鹽湯頻洗亦效木鱉子三箇搗如泥入小盆中百沸湯泡熏之却洗效木槿花炒作茶或煎湯洗用桃皮葉漬水濃研濾清者於盆中洗之即有蟲出薫洗馬兠苓并根雄黄北艾穿山甲雷丸蝟皮木鱉子白藥煎右等分㕮咀有嘴瓶中燒薫梹榔散出鮑氏方治痔如翻花更衣則出榖道外發即痛楚或下血梹榔一錢半黒牽牛三錢右為細末宿不晚食早起食白煮肉六兩少頃以汁調藥飲之至午下針頭白蟲等不數行自止食輭飯三日以葳靈仙煎湯洗痔自乾脱落厚朴煎出永類鈴方本方云膓胃本無血緣氣虛腸薄自榮衛滲入厚朴五兩生薑五兩二味清炒金紫色白术一兩麥蘗神麯各一兩同炒紫色右為末水麵糊丸梧子大疾時空心米飲下百丸平時三五十丸厚朴理腸胃蘖麯消酒食白术道水血自不作也五痔諸下血論不及是亦以脾胃為主也治五野雞病出本草方右以蛇㜑炙食亦燒末毎服一二錢匕治腸風痔疾出本草方右以蛇皮及骨燒灰研末米飲服治野雞痔出經驗方右用槐栁枝煎湯洗痔上便以艾炙之七壯以知為度治野雞病出本草方右以枳樹根皮末服方寸匕治五野雞病出本草方右以狨獸脂傅瘡亦食其肉血亦坐其皮積久其病皆差也治五野雞病出本草方右用粟米酸泔服治五野雞病右取木通花上粉内瘡中良治野雞病下血不止腸疼痛出本草方右以鯉魚一頭如食法作鱠蒜虀食之治外野雞病下血出本草方右以壁錢蟲汁㸃瘡上治五野雞病脱肛止血出本草方右以益母草炙令香浸酒服之治五野雞病出本草方右以新綿紙一兩燒為末以酒調下治五痔出本草方右以槐皮煎湯浸洗治五痔出本草方右以槐花炒服治五野鷄病出本草方右以蕪荑作醤食之其氣羶者良治五痔出本草方右用胡荽子煮汁冷取服治外野雞病及瘡有根者出本草方右取烏爛死蠶傅瘡上在簇上烏臭死者治五臓痔㵼血出本草方右以艾醋煎服之去痔疾㵼血出本草方右服胡桃初日一顆五日加一顆至二十顆止常服能養一切老痔疾治痔出本草方右取鰻鱺魚燒熏下部痔蟲盡死治痔榖道痛出千金方右取杏仁熬熏杵膏傅之治痔方出本草方右以木鱉子三枚去皮杵碎砂盆内研泥以百沸湯一大碗以上入盆器内坐熏之至通手即洗一日不過三二次治痔瘡出本草方右以仙人杖為末服方寸匕治痔血出本草方右用向東者栁根一抱擣絞汁三升服之治痔出本草方右用栐子根濃煮浸洗有驗或燒末服栐櫟實也治痔疾有頭如雞冠者出本草方右用黄連末傅之即差更加赤小豆末尤良治痔殺蟲出本草方右以乾苔煮汁服治五野雞病出本草方右以鯽魚作鱠服之療五痔隂蝕濕癉出本草方右以龜甲煮浴漬之良治野雞病殺蟲出本草方右以山芋子煮汁服之治五痔病出本草方右以麂肉熟同薑醋進大有效治五痔止血出本草方右以鴝鵒炙食之或為丸散飲食之治五痔出本草方右以榼藤燒成黒灰微存性米飲調服人多剔去肉作藥瓢垂腰間治五痔出本草方右以榧實常如果食之愈過多則滑腸治五野雞病出本草方右以橡斗子中仁碎為粉微熬水服一二匕一升合搗作兩囊蒸之及熱更互坐之益瘥治五痔肛脱出本草方右以死蛇一條指大者用屋濕地作坑燒蛇取有孔板覆坑坐上蟲盡出治痔疾出本草方右用糯米粉和駱駝脂作煎餅服之空腹與服勿令病人知治五痔出本草方右取鷹爪及背燒為末和飲服之一方鷹之頭燒灰和米飲服之烏木丹治臓毒腸風痔漏㵼血右用古楮子初熟上生紅子者用釅醋浸七日取出焙用四兩蒼术米泔浸五日取出去黒皮焙二兩草烏頭炮二兩同為米醋為丸如梧桐子大毎服十五粒空心酒吞下米飲亦得治五痔漏瘡出本草方右用棘針根煮汁洗棘針乃小棗刺也又方右用鴛鴦一隻治如食法煮令極熟切以五味食之或作羮食亦得又方右用蠐螬搗爛傅上普濟方卷二百九十六
