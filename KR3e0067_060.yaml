body:
  text: 普濟方卷六十一明周王朱橚撰咽喉門喉痺治飲食不通欲死者用臘月蠡魚膽隂乾為末點喉中藥至即瘥病深則水調灌之一方用懸枸子莖葉燒為末服方寸匕或取汁用治咽喉不得用針者以小口瓶內燒蛇床子煙張口受煙一熏即破潤關住痛出危氏方用生薄荷研蜜調成膏送入咽喉下立效如涎多未退再用如更不開可通頂又用䓤頭兩箇捶破安牙牀頭處立開妙荆芥方出聖惠方治喉痺用荆芥瀝稍稍咽之又以水三升煮荆芥一握取一升分三服薑蜜煎出聖惠方治喉痺及毒氣方用生薑二斤搗取汁蜜三合微火煎相和每服一合日五服又方出肘後方用剝大蒜塞耳鼻孔中日二易治喉痺卒不得語方出肘後方用濃煮桂汁服一升亦可桂末舌下漸咽之良又方一名宣音湯出肘後方煮大豆汁含之無豆用䜴亦佳又方用酒五合和入乳汁半升分二服又方出肘後方用燒炘算作灰三指撮水服之一方用炘帚燒為末漿水服一匕又方出聖惠方用芥子末水和傅之乾則易一方用蜜水和傅於外喉下候其乾即易之治喉痺深腫連頰吐血氣數者名馬喉痺治之之方出聖惠方用馬銜一具水二升煮取一升分三服又方出聖惠方取氊中蒼耳三七枚燒末調服之又方出聖惠方治馬喉痺紅腫連頰吐氣數用馬鞭草根一握勿見風截去兩頭搗取汁服又方出聖惠方燒縠奴灰酒服之立破治走馬喉痺儒門事親用生白礬研細塗於綿針上按於喉中立破綿針用榆條上以綿纒作棗大是也一方白礬為末化湯灌之又方以馬勃吹咽喉中立止一方濃煎汁灌之治纒喉風出集驗良方治咽喉生癰藥不下及喉閉等症用皂角刺不拘多少刮皮浸生麻油以年深為佳遇患以油滴在口中或吐或破即安一方無麻油治喉風單雙乳鵝出瑞竹堂方用墻上土蜂房一箇碾極細先以楮葉將病人舌用葉擦破微令血出將蜂窠土用醋調用鵝毛蘸藥於喉中撚之令痰涎出為效後用扁蓄根擂爛調冷水與病者只服三口至三行即愈就用冷水漱口立愈急治喉風瑞竹堂方燈草用一大握除去兩頭右將燈草用新瓦一箇盛之又用新瓦一箇合之以火焚燒成灰再將鹽一大匙頭就於瓦上炒存性二物相和合用葦筒一箇藥一捻吹於喉中涎出為效吹兩次立愈治喉痺方用箭頭草葉研入醬少許筆蘸入喉吐其草生於鄉村沿籬夏秋開小白花有鈴兒倒垂下其葉略似木香花葉又方用白梅肉包生白礬末作丸納喉中一方用江茶和為丸噙化下治纒喉風出海上名方用白􅈨末以麻油調下吐即愈又方用水酒各半碗共作一碗皂角二箇打碎煎至半碗候溫於病人鼻內注入如咳嗽出風痰時疾愈又方出海上方治喉痺用羊蹄草牛食者取汁服之立效又方出海上方敗毒散加茯苓半夏同煎服尤驗治喉閉用稻草燒煙如做墨法取細煙酸醋調吹入鼻中如咽得用蘆筒送下喉少頃打磙吐出涎立愈吐涎散出經驗良方治喉風吞藥不得不能飲食用鶴虱二錢半酒一盞醋少許同煎至半盞吞下吐出毒涎安治纒喉風出經驗良方用蒼耳草根老薑一塊同研爛濾汁以溫無灰白酒浸汁服治喉閉出醫方集成用鼓捶草杜牛膝以二味生搗爛取汁灌下鼻中得吐即為愈一方鼓捶草根洗淨研細用陳醋攪和出汗漱之又方出醫方集成用土烏藥即矮樟根以酸醋兩盞煎一盞先噙後咽出痰涎為愈帳頭散出經驗良方治喉閉終夜不能言最急病此方雖能大效且得喉開可語説證尋醫用白􅈨多少置青帳或藍帳角中方便處遇有此證嚼帳􅈨汁吞之如無帳或藍青布帛片將少􅈨在內水濕其片嚼汁吞之如無􅈨或得青藍衣帛水濕嚼汁吞之亦可一方􅈨石一兩水三升浸洗手足治喉閉卒不語濃煮桂汁噙之佳如無桂用火麻子擂碎煎噙之治急喉風喉閉纒喉風用蛇皮裹白梅一枚噙之咽津一方用蛇蛻皮不拘多少揉碎以香爐一箇燒煙令患人用竹筒子吸入喉內熏破一方蛇皮略洗日乾研作細屑白梅為丸含化一方用蛇皮一條新瓦上炒焦黃𢃄黑色碾細入麝香少許摻口內治喉痺用射干即扁竹根也旋取新者不拘多少擂爛取汁吞下或動大腑即解或釅醋同研取汁噙引出涎更妙纒喉風咽中氣不得出用白蛇蛻一條炙黃以當歸等分為末溫酒下一錢得吐愈切忌針灸金銀鎖子治乳蛾喉閉用白礬一斤用銅器熬沸隨下江子肉二十四箇再熬江子以紙碾江子碎為度出江子將白礬出火毒取礬黃色者搗為末治咽喉乳蛾白色者另搗為末治一切毒物以水調敷中風者水調服之如牙噤指甲挑入喉中或竹筒吹入逺志散治喉閉用逺志去心為末以管吹藥入喉低頭涎出即愈咽喉方治咽病深在咽下針刀不能及者一名如神散用膽礬細研以管子挑少許吹喉中即破續以白梅煎湯調炒殭蠶以去其風如無膽礬只透明緑礬代之一方醋磨口噙即時吐下立愈一方為末葦管吹入一方為末摻入喉中為妙一方用緑礬研細米醋調咽一邉痛則卧含咽治熱閉方一名殊驗清中湯治咽喉腫口舌生瘡解傷寒頭痛凡腫毒之屬用川升麻半兩銼井水濃煎少頃吐出毒氣一方用升麻四兩銼水四碗煎至一碗灌下治熱閉喉用蘿蔔汁和皂角漿吐之葛根蔓方治喉閉用葛根蔓燒灰水服方寸匕治喉閉壅塞不通方用紅藍花搗絞取汁一小升服之以瘥為度如冬月無濕花可浸乾者濃絞取汁如前服之極驗但咽喉塞服之皆瘥治喉閉纒喉風方及走馬喉痺一名妙安散用巴豆兩粒約連殼可通得入鼻用刀子切斷兩頭殼子將針穿作孔子內鼻中久即瘥一方用綿裹內鼻中喉通即取出一方用七粒燈上燒存性綿裹含一粒即止如痺已死有餘氣者綿裹內入兩鼻孔約至眉間専把餘綿良久大喘勿怪吐則拔去之治急喉閉逡巡不救者以皂角去皮子生半兩為末每服少許以筯頭點腫處更以醋調藥末厚傅項下須臾便破少血出即愈一方米醋煎服一方暖水一盞灌下或吐或下吐即安治喉痺方用蠐螬蟲汁點喉中即喉開治纒喉風又喉痺牙宣牙癰口瘡并小兒走馬疳方用蠶退紙不計多少燒成灰存性煉蜜和丸如雞豆大含化咽津牙宣牙癰擦齦上口瘡乾傅患處小兒走馬疳入麝香少許貼患處佳治喉痺咽喉疾喘息不通須臾欲絶者一名聖石散用絡石草二兩水一升半煎取一盞去滓細細喫須臾即可令通絡石草即石薜荔治皮膚麻痺方用莽草濃煎湯淋及治風蚛牙喉痺亦濃煎汁含後淨漱口治喉痺卒不語方用䜴煮汁一升服覆取汗亦可一方炒為末含之瘥一方用糯米二升揀去粳米入瓷盆內於端午前四十九日以水冷浸之一日兩度換水輕以水淘轉逼去水勿令攪碎浸至端日取出令隂乾生絹袋盛挂通風旋取少許炒令焦黑研為末冷水調如膏藥並用藥貼項下及腫處一方生研糯米入蜜飲之朴硝方出肘後方療喉痺神效用硝一兩細細含咽汁頃刻立瘥一方為末吹入喉中一方用盆硝以筆管吹入立愈治纒喉風方出海上名方用雄黃一塊新汲水磨急灌吐下瘥一方加薄荷自然汁調下或吐或下紫苑方出衛生家寶方治纒喉風喉閉飲食不通欲死者用返魂草根莖即紫苑淨洗內入喉中待取惡涎出即瘥如患乳蛾刺破更以紫苑濃煎湯咽下更以馬牙硝末挑一錢入喉間即愈一名紫苑又南中呼為牽牛是也治喉痺出肘後方用皂策礬石入好醋內或用釅醋亦妙以二物同研和咽之立瘥此法甚竒如若喉痛偏在一邊即令病者側卧就痛處含之勿咽皂策礬或云即緑礬也治喉痺方出聖惠方用半夏末方寸匕雞子一枚去黃白盛淳苦酒令小滿內半夏末著中攪和雞子內以罐子坐之於炭上煎藥成置杯中稍暖咽之忌羊肉治喉痺腫痛飲食不通出肘後方用黃蘖切片含之又黃蘖一斤㕮咀酒一斗煮三沸去滓恣飲便愈一方搗傅腫上冷復易之用苦酒和末佳杏仁方出肘後方治喉痺用杏仁煎熟杵丸如彈子大含咽其汁或為末綿裹含之亦得治喉痺咽喉喘息不通須臾欲絶神驗方用蠡實根葉二兩水一升半煮取一盞去滓細細喫立通一方用根一握杵水絞取汁咽之一方用根燒灰以燒桑枝瀝汁調下一錢牛角散出肘後方治喉痺塞欲死者用沙牛角燒刮取灰細篩和酒服棗許大水調亦得治咽喉痺不語方用獨根羊蹄草勿見風日及婦人雞犬以三年醋和如泥生布拭喉令赤傅之治馬喉痺并毒氣壅塞方用桔梗二兩去蘆頭銼以水二大盞不計時候分溫三服治患喉閉方用鮫魚膽汁和白礬灰丸之如豆顆綿裹內喉中良久吐惡涎沫即愈一方取臘月青魚膽亦得如聖丸一名寬咽救生散出仁存方治纒喉風一切喉痺危急及走馬喉痺用白殭蠶不拘多少直者新瓦上炒為末用生薑自然汁和丸如雞豆大含化急者生薑汁調一錢竹筒子灌入喉中立效便吐出頑痰半食許再服再吐將大黃一片指大一分厚口含咽半食間再換大黃含至三片皆愈若語不得神不清扶起坐灌藥從鼻入治急喉痺方用油一合急灌之立愈若未瘥急解髮令散當頂心取方寸許急捉痛拔之少頃當通如更急則喉下當咽管口灸一壯如麥粒大火至即瘥氣雖似絶但心下暖者亦可救此數法神驗治喉痺方用黃魚頰骨不計多少燒灰出火毒以茶清調下三錢又方出聖惠方用鹽毬千搗為末以赤糖為丸如彈子大含之又方用石蟹冷水磨飲之兼塗喉上瘥射干湯出肘後方治喉痺用射干細銼每服五錢匕水一盞半煎至八分去滓入蜜少許旋旋服一方用一片含咽津時時大開口吐氣頻拽兩耳又方用地黃汁二升蜜三升合微火煎之取二升稍稍含之又方用剝葫塞耳鼻孔日再易之有效又方用菖蒲根嚼燒稱鎚令赤內一杯酒中沸止飲之青艾方出海上方用夏月青艾一束擂水服之痰涎即來神效冬月則用蛇床子以有嘴瓶盛猛火却以蛇床子置火中用紙封瓶口煙從嘴出以口含煙痰自出一方青艾和莖葉一握用醋搗傅痺上冬月乾艾亦可治喉痺法用韭土中紅小蚯蚓數條用醋擂爛取汁與病人食并噙在喉內即時吐出痰血二三飯碗後飲食即進神效治喉風用天羅瓜研灌潄如無生瓜時用甘草一根穿入瓜內候乾取出研細為末沸湯灌潄又方出德生堂治喉痺用藏茄或糟茄切片令患者嚼數片鹹水咽下喉中效如不可咽絞汁灌下治咽喉用鍋底心墨細研紫蘇湯化下治喉閉方用白明礬飛過燈心草燒灰調和一處於豬膽內盛之懸於當風處乾之研細吹入喉中臘月製佳一方無燈心一方用枯礬末摻喉內即愈治堅鵝用芥辣子一合研極細用好釅醋取汁濾淨用雞毛蘸入喉內待喉內如雷響却用陳年麻骨燒煙吸入喉中立愈救生丸出經效濟世方治纒喉風神效用蚵蚾草又名皴面草細研用生蜜和丸彈子大噙化一二丸即瘥如無新者只用乾為末生蜜為丸不必成彈子但如彈子大一塊此方有竒妙治喉痺出聖惠方用地龍一條細研用白梅去核以裹之重著薄綿再裹令咽津立效又方取麩鹽千搗羅為末以赤糖和丸如半棗大含咽津一方治急喉閉腫詩云急喉腫閉最堪憂只用承燈盞內油甚者不須三五呷此方元是聖人留奪命丹出御藥院方治大頭病兼治五種喉痺詩曰人間治疫有仙方一兩薑蠶二大黃薑汁為丸彈子大井花調蜜便清涼一方為末生薑汁蜜水調服名五痺散奪命丹治纒喉風急喉閉牙關不能開重舌木舌雙乳蛾并誤吞竹木雞魚骨刺並皆治之白殭蠶炒去絲用寒水石山豆根紫河車乾胭脂管仲縮砂仁馬屁勃各一兩地粟沙一兩鳯尾金星一兩射干另研半兩右為末滴水為丸每藥一兩作十五丸蛤粉為衣每丸冷水半盞放藥在水中其藥俟略有水泡起不用藥只服水半盞一丸可以救數人一方或用大青黛為衣治喉痺邪氣惡毒入腹川升麻犀角麝治喉痺卒不得語方用桂心如棗核大綿裹著舌須臾破之即瘥咽喉舌諸方瓜耳下張口解開突處痛瓜勿止兩三食久則得咽喉若已膿便潰又方隨所近左右刺手足指甲下令血出當先縛中指血聚後刺之皆須慎酒麵毒物備急療急咽喉舌病者方隨病所近左右以刀鋒裁刺手指大甲後瓜中令出血即愈又方病卧急瓜其跖心隨所左右以瘥為度治喉痺纒喉風右用艾煙熏惡心自然破又方右用油頭髮用湯一盞洗汁喫惡心自破治咽喉痺用臘月豬尾燒末水服之又方含雞屎白良又方出肘後方用巴豆去皮針線穿咽入牽出又方出聖惠方用馬藺子半升水二升煮取一升半服之又方煮桃皮汁三升服之治喉閉及毒氣出肘後方以附子破作大片蜜塗炙令黃含咽汁令盡更炙如前法治喉痺卒不得語用商陸苦酒熬令濃熱傅之含香法出衛生寶鑑治喉痺物鯁不可進食含乳香一塊良久其物自化又面東丁字立熱水一碗念吳水流順七遍便喫水立下治急喉塞閉方出衛生寶鑑方露地蜂窠燒灰用竹筒吹入喉內或燒巴豆吸煙立效又方出衛生寶鑑方大黃鬱金巴豆去皮不去油另研右等分為末每用一字薑汁調灌下如不能吞下即以鵝翎蘸藥掃喉中吐涎立愈奪命散出衛生寶鑑方治喉風膽礬一兩另研白殭蠶一兩為末烏龍尾一兩另研天南星半兩為末右和勻每用一字以雞翎溫點藥掃喉中涎出再點藥入喉涎化為黃水出方用溫水漱口或用沙糖為丸含化亦得如雞豆大白礬散出衛生寶鑑方治纒喉風急喉痺白礬三錢巴豆三箇出殼分作六片右用礬於銚內熬化為水入巴豆在內候乾去巴豆取礬研末以竹管吹入喉中立愈或是去巴豆用烏雞子清調礬灌入喉中奪命湯治喉風每服用皂角三寸去黑皮并子入甘草二寸同打碎用水一盞煎至半盞去滓入蜜少許再煎三五沸放溫服連進二服立效且喫白粥一日忌麵油酒魚腥炙煿諸熱毒物一百日治急喉閉并喉風出海上方白礬一塊用刀頭煆服或銚內慢火熬化入巴豆肉七粒再熬數沸撩去巴豆為末角管收藏勿令氣走臨用時筆管挑藥吹入喉中即破帳帶散治急喉閉并喉風用生白礬研為末冷水調下二錢余家嘗用之繫於帳帶上以備護急朴硝散選竒方治喉痺朴硝細研黃丹飛過細研右相拌和深粉紅色遇病用蘆管或筆管以半錢許吹入喉中解毒玉壺散出衛生寶鑑方治喉風喉閉及誤吞針錢竹刺物及諸惡毒物無不療一藥醫數人之疾白茯苓管仲硼砂别研馬勃各二錢紫河車水煎山豆根烏魚骨金星鳳尾草山藥白术白殭蠶蜜陀僧各四錢大甘草錢寒水石三錢坯子胭脂一錢乳香四錢别研麝香半錢别研象牙末一錢右各炒焙為末乳香麝香胭脂硼砂各研入衆藥末中用薄麵糊為丸如彈子大再用煆過軟石膏研為衣隂乾服將藥一丸水一盞浸一匙服時磨藥數遍飲之餘藥留再服一匙散治喉風白殭蠶一兩荆芥半兩紫河車三錢五靈脂一分甘草半兩乾柏葉二錢薄荷三錢右為細末每服一匙吹入喉中治喉閉纒喉風百藥不效疾勢危甚死在須臾用此便蘇再能生人不蛀皂角兩挺以水大盞許攪濃汁濾去滓入生麻油攪勻每服一盞強令服之未吐再一服有病者先用它藥不效即急用此一點雪治喉閉喉腫焰硝三兩研細如粉白礬鎔飛一兩右二味拌勻以一錢摻口中口噤不開者以半錢入於小竹筒內吹在鼻中如口內血出即用新水漱之忌熱麵治喉閉用生礬末吹喉中治急喉閉開口不得者右以黃蠟紙裹巴豆一箇如患人鼻孔大小中心切破急以塞鼻氣衝入喉中自破也已覺通利即除去濠守王亞夫方巴豆殼拍碎破以綿裹隨左右納鼻中即吐出惡物後鼻中或小瘡亦無害牙硝散治喉痺及喉咽腫痛閉塞白殭蠶生去絲嘴五錢馬牙硝二錢右同為末每服半錢生薑汁調下不以時候又方用白礬一錢瓷碟內溶成汁入巴豆二粒再候礬枯豆焦為度作末蜜丸雞豆大薑湯調服良久吐痰立愈治喉痛咽喉塞喘息不通須臾欲絶神驗以馬藺根二兩水一升半煮取一盞去滓細細喫立通治喉痺一方纒閉危急解髻令人拔頂中髮十二莖立通秃者撮其皮亦效一方青黛朴硝末吹入喉中又一方朴硝雞子清調刷之治鎖喉瘴名朴蛇瘴項大腫痛連喉蜈蚣赤足者右研水下一二節或酒下愈治朴蛇瘴雄黃白芷等分右為末刷喉項內外仍飲之又方野苦馬汁燈心浸水良久捻其末以和苦馬汁服之又方用白礬一兩巴豆去殼二十箇白礬入銚內滚數沸礬化開豆色黃黑頓冷去豆碾末用葦管吹入喉內即愈治走馬喉痺一法如左右喉痺於頂上分左右頭髮用挽拔之剝然有聲立效此法年幼時常見鄭六嫂救人甚多不得其訣近與子正話及方得其法治卒喉痺用雞子一枚攪黃令相和吞下又方好升麻斷含之喉塞亦然治痺已死有餘氣者用巴豆一枚去皮心研碎分兩丸綿裹內兩鼻孔約至眉間垂出餘綿良久大喘勿怪吐則拔去之治喉閉氣欲絶用乾漆炒令煙筒吸之絳雪散治喉痺硼砂白礬用皂子大一塊馬牙硝一分研硝石四兩新巴豆六枚黃丹半兩右粗瓷小碗一箇先煨令熱下前四味次下黃丹次下巴豆仍將巴豆先打碎逐旋下候盡又下一箇入蛇蛻皮一條自然燒化成汁入桔梗末研勻每用少許以筆管吹在患處治喉痺方元公章少卿説開德府士人携僕入京其一日忽患喉痺脹滿氣塞不通命在頃刻詢諸郡人云惟馬行街山水李家可著治即與之往李駭然曰證候危甚猶幸來用巴豆油紙作撚火著煙起吹滅之令僕張口刺入喉間俄吐出紫血半合即時氣寬能言及啖粥飲摻藥傳之立愈士人甚神其技後還鄉里村落一醫偶傳得此術云咽喉病發於六腑如引手可探及刺破瘀血即已若發於五臟則受毒牢深手法藥力難到惟用紙撚為第一然不言所用之意後有拾得其方者蓋預以巴豆油塗紙故施火即著藉其毒氣直赴病處又方以皂角汁麻油灌未吐再服之奪命丹治纒喉風急喉閉牙關緊急不能開者重舌單雙肉蛾并誤吞竹木雞骨魚刺並皆治白殭蠶炒去絲嘴山豆根寒水石煆貫衆縮砂仁紫河車乾胭脂馬屁勃八味各一兩白茯苓去皮烏賊魚骨磁石三味各半兩烏芋一兩半俗名孛薺南硼砂一錢象牙末一錢甘草一兩炙飛羅麵三兩麝香一錢另研金星鳳尾草一兩右為細末滴水為丸每一兩可作一十五丸蛤粉為衣每服用冷水半盞放藥在內衮動候末起喫藥細細呷之一丸救數人不拘時候消毒丸治喉痺口瘡腮頰腫痛白殭蠶炒去絲嘴牛蒡子微炒右等分為細末煉蜜為丸每一兩作十五丸每服一丸食後含化烏龍膏治喉痺纒喉風皂角七挺捶碎水浸五升濾去滓草烏頭銼碎天南星銼碎大黃銼碎三味各一兩右件並入皂角水內煮至二升濾去滓不用再熬成膏子入新瓷器內盛候微凝入朴硝末一兩攪勻候冷入白殭蠶末一兩如前收之如患喉痺每一服半匙頭以甘草湯或茶清化下灌入口內立愈如藥乾以好酒少許潤之不拘時候萆麻散合瘡口萆麻子七枚焰硝半錢右為細末研成膏每用少許冷水灌潄去之獨附散治腑寒咽閉六脈微弱附子一枚切成片右用蜜炙黃咽甘味下須詳脈方可用又方白礬一兩右用入巴豆二十一粒捶碎去殼用煆礬枯去巴豆為末一字吹入喉中防風立效散治咽喉柴胡升麻牛蒡子炒全蝎赤芍石膏生用乾葛甘草各一兩北防風鬱金薄荷葉半夏炮赤茯苓北細辛川芎羌活各半兩桔梗荆芥各一兩右粗末每服四大錢水一盞半蔥頭一箇煎一盞食後卧時溫服滓再煎服忌酒毒物候發散後又相間服局方解毒雄黃丸湘中朱國學家合施此方往往輒效治人挫喉氣不來急以冷水灌之立效一捻金散鬱金三錢藜蘆二錢巴豆一錢炒右為末喉腫及食刺熱茶點一錢骨鯁乾咽喉風薄荷茶下傳用神效方療喉痺桔梗甘草各一兩右水一升煮服稍有膿出即消治喉風右以白礬末半錢雞子清調灌入喉甚者宜巴豆肉針線穿咽入喉牽出治喉閉右以巴豆十箇去殼將皮紙槌巴油在紙上將紙作大條子撚燈上燒著吹滅濃煙插入喉中得吐妙治急喉痺以礬石生含咽津治喉痺以薄荷乾者為末水調服又方本草以陳白芨煮服之又方以附子去皮炮令拆以蜜塗上炙之令蜜入內含之勿咽甘汁治喉痺本草以搕藤子燒灰研細為末酒調服一錢匕利咽喉治喉痺本草取杏仁去皮熬令赤和桂末研如泥綿裹如指大含之治喉痺本草以紫荆木煮汁服之治纒喉風方用白礬搗地龍以白礬為丸吞之痰出即愈治喉中似物吞吐不出腹脹羸瘦取白蓑荷根絞汁服蟲立出治喉痺草犀根千金藤右二味等分㕮咀煮汁服之鬱金散治喉閉腮腫痰結成核走馬纒喉諸風鬱者鬱金天南星宣連蝎已上各半兩巴豆别研二錢半右除巴豆餘為末入和勻壯者一錢老少者半錢生薑蜜水調下此藥乃微有毒須量人虛實加減服凡服此藥以瀉為度凡治先以手搯腫破或即時再結愈甚或成宿疾不移時仍發如急喉閉未有藥先用漆筯二火燒令有煙含口中不得出氣候煙搶著發嗽即破然後用别藥又先飲生油令氣通後合他藥又巴豆一箇微煨過去皮用綿裹安耳或鼻中如瘡破即除去又白殭蠶直者為末生薑自然汁調下一二錢大妙又桔梗甘草各一兩銼用水五盞煎數沸服有膿出即愈又濃煮桂汁服一盞亦可桂末著舌下漸咽之又含雞屎白又含升麻又急拔頂心髮數莖治喉痺咽喉塞喘息不通須臾欲絶川根葉二兩水一升半煮取一盞去滓細細喫立通治喉痺及咽喉生瘡吞咽不下右用白礬一塊為末安住在鐵香匙上中間作一井入去殼好巴豆一粒同煮候礬乾巴豆熟碾成細末新汲水調下一字若未瘥再服治喉痺用白鸛腳骨及嘴煮汁服之或燒灰為末米飲服之又方用海根以水磨服之又方用東向厠溺坑中青泥水調灌之效治纒喉風咽中如束氣不通用甜瓜蒂不限多少細研為末壯年一匙十五已下及老半匙早晨井花水調下一食時須含沙糖一塊良久涎如水出年深者涎盡有一塊如油布水上知盡矣涎盡食粥一兩日如吐多困甚即飲麝香湯一盞即止矣麝細研溫水調下此藥不大吐逆只出涎水甜瓜蒂採自然落者用水洗淨再以檳榔葉包裹於東墻有風處挂令吹乾用導引法出聖惠方養生方云兩手拓兩頰手不動摟時使急腰內亦然住定於兩肋頭向外拊搏腰氣散盡勢大悶如此來去七遍去喉痺咽喉生癰論夫肺氣上通於喉嚨胃經外連於咽嗌其氣和平則呼吸咽納無所妨礙若脾肺壅熱薰發上焦攻於咽喉結聚腫痛不得消散熱氣熾盛致結成癰妨礙吐納古方論一寸為癤二寸至三寸為癰其候使人寒戰咳唾稠濁善用針者辨其可刺宜速破之仍施以點餌之劑喉嚨者呼吸之道路氣之所上下也懸癰為聲音之關臟腑有伏熱氣上衝咽喉氣血壅遏結於懸癰毒氣不散故腫痛妨悶甚者或長數寸隨喉出入不得食息宜急治之方天門冬煎治纒喉咽嗌不利生天門冬汁二升人參一兩生麥門冬汁二升生薑汁一升生地黃汁一升桂去粗皮一兩赤茯苓去黑皮三兩半夏湯泡七遍暴乾一兩甘草炙三分牛黃研半兩右除四味汁外餘六味先為末以天門冬麥門冬汁煎減半次入生薑汁又煎減半次又入地黃汁并餘六味同煎汁欲盡入白蜜一斤酥四兩同煎煎成甕合盛不拘時溫水調下一匙以瘥為度防風散治喉癰及咽喉腫痛等證防風去義一兩白附子三分地骨皮半兩麝香研三分丹砂研膩粉研白术馬牙硝研桂去粗皮各一兩赤茯苓去黑皮一兩右為散每服半錢匕溫酒調下治懸癰咽中生瘜肉舌腫出聖惠方用羊蹄草煮汁熱含令吐良射干湯治喉癰咽喉嗌腫塞及心肺熱極吐納不利射干半兩升麻大黃銼生用惡實生用各一兩木通銼三分馬藺子炒半兩右粗搗篩每服三錢匕水一盞竹葉七片煎七分去滓下馬牙硝半錢匕攪令勻不拘時細細溫服治懸癰腫痛咽喉不利出聖惠方射干半兩木鱉子一分甘草半兩炙微赤銼川大黃一分銼末微炒川升麻一分杏仁半兩湯浸去皮尖雙仁麩炒微黃右為末煉蜜為丸如彈子大含一丸咽津元參散出聖惠方治懸癰腫痛不下食射干大黃各半兩甘草一分元參一分升麻半兩右細末每服三錢水一盞煎至七分放溫時時咽含良驗破毒妙方出危氏方白礬巴豆去殼紅肉硝草烏尖豬牙皂角薄荷各三錢右為細末好酸醋調鵝毛刷入口內勿吞仍以鹽湯灌潄治喉癰閉方出直指方白明礬煆牙硝各一錢胭脂半錢右研細爛烏梅肉丸旋含咽治懸癰乘熱暴腫脹痛咽中生息肉及舌腫方一名乾薑湯出聖惠方乾薑炮製銼半夏湯浸七遍去滑右等分為末少少著舌上一方用鹽䜴和塗所患處又先以開口鐵針刺破血出後用藥少許塗之神效若癢時以生薑汁解之喉中懸癰垂長咽中妨悶出聖惠方用燒鹽末枯礬末各一兩相和以筯頭點之即消啓閉散治風熱客搏上焦懸癰腫痛惡實炒甘草生各一兩右為散每服二錢匕水二盞煎六分旋含之良久咽下馬牙硝散出聖惠方治喉癰及傷寒熱後咽痛閉塞不通用馬牙硝半兩細研為散每服一錢綿裹含咽津以通為度又方用童子小便四五嵗者一合并銅錢二文含一方用鹽不用錢治懸癰腫痛咽喉不利胸中煩熱宜服此方出聖惠方射干一兩元參半兩川升麻半兩白礬半兩白藥半兩黃蘖半兩天竺黃一兩細研犀角屑半兩白馬牙硝一兩細研甘草炙銼半兩右為末入研了藥令勻煉蜜和搗三二百杵丸如小彈子大不計時候以綿裹一丸含咽津犀角散出聖惠方治咽喉中生癰瘡腫痛犀角屑一兩元參三分黃耆一兩銼黃芩三分絡石三分販醬三分白斂三分川大黃一兩銼碎微炒甘草半兩炙微赤銼右為散每服三錢水一鍾煎至六分去滓入川朴硝一錢攪令勻不計時候服治咽喉卒生癰腫飲食不通方出聖惠方用燒稱錘令赤內一盞醋中令沸止飲之一方用酒治懸癰腫長數寸隨喉出入不得食方令病人大開口以筯按舌下燒小烙鐵於竹管中烙即愈少根不盡漸更烙之即以鹽塗烙處硼砂散出聖惠方治懸癰腫痛硼砂别研馬牙硝枯滑石寒水石已上各二錢腦子别研一錢白礬枯一錢半右研令極細每服半錢新汲水調下不拘時候鉛霜散出聖惠方治懸癰腫脹疼痛鉛霜一分甘草一分半生半熟搗羅為末右都研為散每服以綿裹半錢含咽津瘥治懸癰咽中生息肉舌腫方日初出向日張口使婦人用布裙圍住其頭上七下瘥治喉內生癰出經驗良方五倍子為末入白殭蠶甘草少許用白梅肉為丸噙化其癰自破治喉癰卒腫方出聖惠方用薏苡仁吞二枚即瘥一方用一兩水一大盞煎至五分去滓頻服之治懸癰腫出聖惠方用硼砂二錢綿裹含咽津瘥帝鍾風即喉間帝鍾長腫有長數寸者出聖惠方用食鹽煆過鴉毛蘸下即消不須針破破則傷人綿裹筯頭鹽揩日六七度易名雪花散聖煙散治懸癰腫脹喉閉塞急令開口看有蛾無蛾若有蛾須是針破方可若望不見以草麻子打碎用紙捲作筒一頭燒煙起竟以煙熏咽喉內自然可破才望見即以三稜針刺破出紫血半盞許便愈其有貴宦之家不容用針者則惑之曰用筆蘸藥先以針安筆心內刺之一方用巴豆依前法燒熏或只以萆麻子巴豆二藥榨油在紙上作紙撚子燒用治咽喉間生肉層層相疉漸漸腫起不痛多日乃有竅子臭氣自出遂退食飲出傅信適用方用臭橘葉煎湯連服愈油膏治咽喉生癰藥不下及喉閉等證生麻油半斤挼皂角拾挺用生絹濾去滓右灌此麻油即瘡穿膿血吐出而愈治喉癰方楊立之自廣府通判歸楚州喉間生癰既腫潰而膿血流注曉夕不止寢食俱廢醫者束手適楊吉老來赴郡守招立之令子往邀之至熟視良久曰不須看脈已得之矣然此疾甚異須先啖生薑片一斤乃可投藥否則無法也語畢即出子有難色曰喉中潰膿痛楚豈宜食生薑立之曰吉老醫術通神其言不妄試取一斤我啖如不能進則屏去無害遂食之殊為甘香稍復加益至半斤許痛處已寬滿一斤始覺味辛辣膿血䪺盡粥餌入口了無滯得明日招吉老謝而問之對曰君居南方多食鷓鴣此禽好啖半夏久而毒發故以薑制之今病源已清無服他藥豫記唐小説載崔魏公暴亡醫梁新診之曰中食毒僕曰常好食竹雞梁曰竹雞多食半夏苖蓋其毒也命捩生薑汁拆齒灌之遂復活正與此説相同治喉痛方以山豆根常常含咽津治肉鵝喉痺用白礬半兩飛過者入半碗沸湯調通口服之血胞隨手自消若經少時變作血膿難醫半夏厚朴湯治隂炙內臠半夏三兩厚朴三兩茯苓四兩紫蘇葉二兩右為細末每服五錢水二盞薑五片煎一盞去滓服雄黃散治咽漏瘡初生結喉上如癰腫破後有眼子雄黃蜜陀僧各一錢膩粉三錢麝香一字右研細末未破用白梅湯調塗已破挹去膿汁乾貼破毒丹治單雙雕右以巴豆一枚紙裹火內炮令鱉破聲為度去紙揭起頭皮些子左雕於右鼻內著右雕於左鼻內著雙雕則著兩頭即時響破膿血下也白丁香丸治咽喉雙雕及單雕用白丁香二十箇家雀屎是也以沙糖如胡桃大一塊同和研分作二丸每一丸用薄綿子裹令含在口內即時遂愈甚不過兩粒也此極有竒功治卒喉中生肉以綿裹筯頭柱鹽揩日六七度易咽喉生瘡論夫咽喉生瘡或白或赤痰唾稠濁喉中腥臭疼痛此蓋上焦有熱脾肺不和熱搏其經致熏發咽喉故也方半夏湯治咽喉生瘡嗽唾如鯁語聲不出半夏湯浸去滑七遍二兩射干乾薑炮杏仁湯浸去皮尖雙仁炒紫苑去苗麻黃去節煎掠去沫焙吳茱茰湯洗焙乾炒桂去粗皮陳橘皮湯泄去白焙獨活去蘆頭一兩當歸切焙一兩右粗搗篩每服三錢匕水二盞煎至一盞去滓溫服初痛一二日可發汗病久者可加大黃一兩半初秋夏月暴冷利及天行暴熱喜怒伏於內宜加生薑二兩乾薑茱叟枳實各一兩修製如前法黃耆散出聖惠方治咽喉內生瘡疼病黃耆半兩銼甘草半兩生銼梔子仁半兩黃芩三分元參一兩赤茯苓半兩檳榔半兩川升麻三分紫苑半兩洗留皮麥門冬去心焙一兩牛蒡子半兩右為散每服二錢以水一鍾煎至六分去滓不計時候溫服之治喉中有瘡唾血不下食宜服此方出聖惠方黃耆一兩銼露蜂房半兩微炙薔薇根一兩銼絡石一兩射干一兩羚羊角屑半兩甘草半兩炙微赤銼川大黃一兩銼碎微炒元參半兩右為散每服四錢水一盞煎至六分去滓不計時候溫服普濟方卷六十一
