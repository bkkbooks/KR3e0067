為末用棗肉和丸如菉豆大以粥飲化三丸服藿香湯下用青熱衣蓋兒蟲當自出量兒大小加減雄黄丸治小兒蛔疳出蟲雄黄牛黄硃砂麝香青黛夜明砂各一錢右都細研如粉以水化蟾酥為丸如菉豆大毎服以茶下三丸當有蟲出史君子丸治小兒蛔疳出蟲史君子一分雄黄牛黄一錢麝香一錢蟾酥一錢熊膽一分右都研為末用軟飯和丸如麻子大如小兒疳極者先用桃栁湯浴兒後以粥飲下三丸又方鶴虱半兩胡黄連半兩㯽榔半兩研入乾蟾半兩熊膽半两研入右為細末毎服於空心以煖水下一字服藥後殺蟲有如馬尾數十條出便差三嵗以上即服半錢蟾酥丸治小兒蛔疳蟲毒腹脹青筋急滿日漸枯痩食物則下不長肌肉或時蟲蝕腹内多痛蟾酥一分麝香一分五靈脂一分巴豆去皮心研紙裹壓去油右同研令極細用酒半盞同入銚子内以漫火熬不住手攪候堪丸即丸如黄米大毎服以陳橘皮煎湯下三丸空心及晚後服之隨兒大小以意加減定粉丸治小兒疳蚘定粉猪膽各一分右研和為丸如菉豆大毎服二丸米飲下治小兒疳蚘右用蜀葵花乾為末炙猪肉蘸與喫有竒功除毒丹治蛔疳不差𫝊染骨肉者鬼臼一兩苦參青葙子草龍膽半兩硫黄緋絹白礬乾蝦蟇各一分以上並燒灰存性右為細末煉蜜和丸如麻子大毎服十粒磨沉香湯下量大小加减青黛丸治小兒蛔疳一切諸疾青黛一分研胡黄連一分鶴虱一分蘆薈一分研硃砂一研右件藥搗羅為末都研令匀以猪膽汁和丸如菉豆大空心以熱水下三丸當有蟲出乾漆散治小兒蛔疳腹肚蟲痛乾漆一錢史君子十四個取肉蕪荑六十枚楝樹皮向東邊取皮厚者日曬乾去粗皮取一兩右為末毎服一字二三嵗半錢四五嵗一錢沙糖熟水下一日三服治小兒疳蚘取鸕鷀屎乾研為末炙猪肉蘸與吃有奇功療小兒疳蚘咬心心腹脹滿疼痛黄痩下寸白蟲單搗醋麻子為末酒調一錢服之甚効乾疳附論夫小兒身體増寒壯熱蝕齒口乾髮豎毛焦皮膚枯燥睡多盜汗乳食雖多肌肉消痩肢體無力嘿嘿少知慧者乾疳也此由乳食不調心脾積熱嗜甘味多熏蒸積滯故令兒日漸尫痩又謂之熱疳方牛黄丸治小兒乾疳體痩煩熱眠卧不安牛黄一分研雄黄一分天竺黄一分蘆薈一分胡黄連半兩麝香一錢丁香一分黄連熊膽一分蟾酥半兩蛇蛻皮灰一分青黛一分犀角屑天漿子一分右為末更研令匀以煉蜜和丸如菉豆大以粥飲下三丸日三服量兒大小以意加減天竺黄散治小兒乾疳心脹煩熱眼目赤澁皮膚乾燥夜多盜汗痩不能乳食天竺黄半兩牛黄一分硃砂一分蘆薈一分雄黄一分蟾頭一分龍腦一錢麝香一錢胡黄連一分犀角屑硃砂木香鈎藤一分甘草一分右為細散都研令匀毎服以温水調下半錢日二服量兒大小以意加減青黛丸治小兒乾疳肌體羸痩皮毛乾焦發歇寒熱昏昏多睡青黛三分細研牛黄研細蘆薈研細胡黄連硃砂細研麝香細研蛇蛻皮灰龍膽去蘆頭蟾一枚塗酥炙焦黄蟬殻㣲炒已上各一分雄黄一分右為末都研令匀用麵糊和丸如黍米大毎服以粥飲下三丸日三服量兒大小臨時増減福壽保生丸治小兒乾疳肌肉消痩蘆薈南木香各二兩蓬术蕪荑史君子仁黄連青皮去白砂仁陳皮去白神麯各七錢半右宿蒸飲糊為丸每服三十丸米湯下茵芋丸治小兒乾疳體熱茵芋細辛去苗黄芩去黑心甘草炙龍齒燒灰石膏碎松蘿各三錢杜蘅半兩鉛丹别研一分右為末煉蜜和丸如麻子大一二嵗兒毎服三丸米飲下三四嵗五七丸更量兒大小加減青黛散治小兒乾疳肌熱殺蟲青黛别研半兩苦楝根剉三兩黄連去鬚雄黄别研丹砂别研各一分蕪荑仁夜明砂炒大黄炙各半兩麝香一分别研右搗羅為散毎服半錢或一錢米飲調下日二服更量兒大小加減如要解苦用蜜水調服蟾酥丸治小兒乾疳乳食不減肌膚日漸羸痩身體壯熱毛髮乾枯四肢無力蟾酥一分猪膽一枚青黛三分硃砂三分細研麝香一分蟬殻一分微炙去足乾地龍一分微炙蛇蛻皮灰一分龍腦三分右除蟾酥外細研以猪膽化蟾酥丸如粟米大毎服以温水下五丸更研少許吹鼻内量兒大小以意加減牛黄丸治小兒乾疳煩渴壯熱皮膚枯燥日漸羸痩牛黄半錢細研雄黄一分細研甘草半分炙微赤剉龍腦一錢細研麝香一錢細研黄連一分去鬚蘆薈一分天竺黄一分右為末令匀用糯米飲和丸如菉豆大毎服一嵗以粥飲下一丸日三服青黛散治小兒乾疳日久不差骨立形枯諸治無効青黛一分麝香一分蘆薈一分硃砂一分地龍一分㣲炙夜明砂一分㣲炒乾蝦蟇灰一分熊膽一分右為細散毎服半錢空心以粥飲下更用少許藥吹入鼻中後以桃枝湯看冷熱浴兒衣蓋有蟲子出為効龍齒散治小兒乾疳腹脹急退熱龍齒燒灰龍腦研栝蔞炒白茯苓去黒皮桂去麄皮麝香研各一分蜣蜋三枚去翅足煨焦右為散一二嵗兒毎服半錢匕用温水調下三四嵗一錢空心午後服更量兒大小加減訶梨勒丸治小兒乾疳肌肉消瘦飲食不減寒熱枯瘁心腹脹滿好喫泥土訶梨勒皮搗末三分肉豆蔲去殻一枚搗末青黛細研麝香研蘆薈研熊膽研丹砂研各一分右研令匀用酒煑麵糊丸如黍米大毎服三丸至五丸米飲下更量大小加減麝香丸治小兒乾疳肌熱化食壓驚麝香細研一錢青黛研雷丸鶴虱炒貫衆去皮黄連去鬚各一兩巴豆一十四枚去殻油煎研右除麝香青黛巴豆外餘搗羅為末共和研匀用獖猪膽汁浸炒餅和丸如菉豆大毎服五七丸空心午後米飲下更量兒大小加減服之蝸牛丸治小兒乾疳面青目澁腦熱鼻瘡眼生障膜毛髮焦黄肌膚羸痩蝸牛二分燒灰糓精草三分燒灰夜明砂三分微炙乾蟾一枚塗酥炙令焦黄𤓰蔕末半兩雄黄一分麝香一分右為末用蒸餅和丸如菉豆大毎服以粥飲下三丸日三服量兒大小加減服之胡黄連丸治小兒乾疳痩弱不能食乳髮竪腦乾肌體柴痩胡黄連末半兩硃砂三分麝香一分蛇蜕皮一條燒灰波斯青黛三分蟾酥一杏仁大蘆薈三分右為末用獖猪膽一枚取汁酒一盞和藥末都於銚子内熬成膏丸如菉豆大五嵗至六嵗以粥飲下五丸日三服三嵗以下三丸龍腦散治小兒乾疳痩瘁鼻痒口瘡龍腦蘆薈麝香青黛各别研黄連去鬚青羊肝切焙等分右研細和匀毎服半錢或一字吹鼻中及塗口上破積丸治乾疳煩熱化膓胃食滯令兒能食破積聚木香青橘皮去白焙桂去麄皮各一兩吳茱茰湯浸焙乾二兩硼砂醋熬成霜取一錢匕巴豆霜取半錢右為末與硼砂巴豆霜拌匀醋煑麵糊丸如菉豆大毎服三丸至五丸早晚食後臨卧一服大便利則減丸數治小兒乾疳面色萎黄肌體羸痩蘆薈一分龍膽一分去蘆頭青黛半兩細研胡黄連一分牛黄一分麝香一分細研右為末研匀以蒸餅和丸如黄米大毎服以粥飲下五丸量兒大小以意加減金蟾丸治小兒乾疳體熱肌瘦蟾頭一枚炙黄連去鬚胡黄連木香各一分大黄剉炒半分右為末粟米飲丸如麻子大毎服五丸至十丸米飲下更量兒大小加減蟾酥煎丸治小兒身體寒熱皮毛枯燥飲食雖多肌肉消痩嘿嘿不慧名乾疳乾蟾大者五枚細剉用醇酒五升文火煎爛去骨研羅去滓入蜜四兩銀噐内重熬成稠膏胡黄連二兩黄連去鬚二兩麝香研半兩白蕪荑仁炒二兩右為末以前蟾膏和劑丸如麻子大毎服十五丸米飲下不拘時候過晬至十嵗以前並冝服大能退疳黄長肌肉牛黄丸治小兒乾疳體熱羸痩心神煩躁少得眠卧牛黄半兩研硃砂半兩細研水飛過子芩半兩犀角屑半兩麝香右為末都研令匀以糯米飯和丸如麻子大毎服用粥飲下三丸量兒大小増減服之胡黄連散治小兒乾疳痩瘁胡黄連犀角屑白羊肚切焙研細為末各一錢麝香研一錢右搗羅為散毎服半錢生地黄汁小半盞調下空心午後服更量兒大小加減黄連丸一名金𤓰丸治小兒乾疳身多壯熱黄痩黄連去鬚黄蘖去麄皮甘草炙青橘皮湯浸去白焙各一分右為末加麝香少許以獖猪膽汁和匀却入膽内盛用綿子繫定於石器内漿水一盞煑漿水減半取出當風處掛一宿去膽皮再研令匀可丸即丸如菉豆大毎服五七丸米飲下加至十丸量兒大小加減保童丸治小兒乾疳痩弱萎黄大黄剉炒一兩黄連去鬚半兩夜明砂炙楝實麵炒各一分右為末煉蜜和丸如豌豆大麝香湯下三丸更量大小加減用之胡黄連散治小兒乾疳飯食如常肌體羸痩時作寒熱皮毛枯焦嘿嘿不慧胡黄連半兩黄連去鬚白蕪荑仁各一兩木香半兩右為末獖猪膽和於盞内坐飯甑中蒸兩度為丸如粟米大毎服二十丸米飲下胡黄連丸治小兒乾疳體熱胡黄連黄連去鬚各半兩丹砂研木香各一分右為末用獖猪膽填藥在内取線繫以杖子一條横於銚子上將藥膽掛上面勿令著銚底用漿水煑一炊時取出入蘆薈麝香各一分細研和匀飯米丸如黍米大毎服五丸至七丸米泔温水下更量兒大小加減用之漏疳附論夫漏疳之病由風邪毒氣客於手陽明之脉攻衝齒間齗肉虛腫膿汁焮痛綿綿不斷久而不差時發時愈故名漏疳方青礬散治小兒漏疳蟲頸骨破青礬焼研黄礬燒研雄黄别研白礬燒研細辛去苗葉各一分莨菪子㣲炙附子炮製去皮臍苦參藜蘆去蘆頭各一分麝香研甘草炙青黛各研一兩右為散更於乳鉢中研細毎用少許傅患處病重者以井華水調半錢空心服之黄銀散治漏疳齗爛宣路不止脣齗痒痛牙齒蚛齲黄連去鬚蒲黄各一兩生薑地黄焙烏頭尖生當歸切焙銅緑細辛去苗葉各二兩莨菪子一分為末粉水銀一錢用棗瓤五枚研令星盡并莨菪子和末右為細散洗浄潄口以手指蘸藥匀傅患處良久温水潄頻用取効藁本散治漏疳蟲蝕藁本去苗土當歸切焙杏仁湯浸去皮尖半兩右羅為散毎用一字綿裹納蟲孔中看蟲孔漸小為効青梃子治漏疳口齒破爛生瘡信砒磁瓦上炙半熟粉霜磁瓦上炙半熟膽礬磁瓦上炒半熟各一分銅緑生胡粉麝香研雌黄研各一錢右為細末鹽水洗潄口次以米飯掌内搓藥成梃子如鍼頭大置齒縫中蘆薈散治漏疳蟲蝕脣鼻齒牙臭爛蘆薈半兩研麝香研青礬燒研黄礬燒研白礬燒研各一分蝦蟇灰半兩右研為散令匀先以綿拭齗上惡血出即貼藥半錢日三次黄連散治漏疳血出不得食黄連去鬚黄蘖子馬牙硝研各一分白礬燒研一分龍腦一錢右研為散再同研匀毎用半錢貼患處龍實散治漏疳蟲蝕有竅龍實龍骨中有之深黄或淡黄土褐色𦂳掏人舌者白礬燒研蝸牛殻胡粉牛黄各一錢右研為細散毎用少許糝貼竅内葵根散治漏疳口瘡葵根切赤小豆土𤓰根各一兩麝香研一分右羅為散毎用一字貼瘡黒散治漏疳宣露藁本去苗土升麻皂莢不蛀者燒灰存性各半兩石膏一兩半碎右羅為散卧時以手指蘸揩齒上㣲潄存藥氣兼牢牙去臭普濟方卷三百八十二
