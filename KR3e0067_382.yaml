body:
  text: 普濟方卷三百八十二明周王朱橚撰嬰孩諸疳門氣疳附論夫小兒氣疳者由乳食不調內有壅熱傷於肺也肺主於氣其氣不榮則皮毛枯燥咳逆上氣多涕交流壯熱增寒揉鼻咬甲唇邊赤癢鼻內生瘡腦熱多啼腹脅脹滿乳食減少下痢無恆皮上粟生糞中米出漸漸羸瘦故名氣疳也方蘆薈丸治小兒氣疳毛髮乾堅口無津液或時下痢多渴不欲乳食蘆薈細研青黛細研蟬殼微炒熊膽細研人參去蘆頭黃連去鬚雄黃細研麝香細研蜣蜋去趐足微炒已上各一分蝦蟇一枚酥塗炙微黃訶梨勒皮三分右為末都研令勻以軟飯和丸如菉豆大每一嵗以暖水下三丸常服令兒悅澤無病量兒大小以意加減麝香丸治小兒氣疳壯熱增寒腹脹下痢皮膚乾燥眼澀揉鼻乳食難化日漸羸瘦麝香半錢細研赤茯苓一錢熊膽半錢研入胡黃連一分檳榔一枚蘆薈一分微炮京三稜一分細研當歸半分銼微炒木香半分桂心一分川大黃一分銼炒右為末煉蜜和丸如菉豆大每服乳食前以溫粥飲下五丸量兒大小以意加減麝香丸治小兒氣疳頭髮乾堅心腹脹滿肌體黃瘦乳哺不消麝香一分細研胡黃連半兩蘆薈細研肉豆䓻去殼檳榔夜明砂微炒青橘皮湯浸去白瓤硃砂細研已上各一兩乾膽一枚酥塗炙微黃右為末都研令勻以棗肉和丸如菉豆大每一嵗粥飲下三丸日三服青黛丸治小兒氣疳腹內有積惡滯結之物宜先服搜病青黛一分檳榔一枚木香一分麝香半分細研黃連一兩去鬚肉豆䓻一枚去殼巴豆半兩大黃半兩銼微炒鱉甲半兩塗酥炙令黃去裙襴右件藥先取黃連巴豆二味以淡漿水三碗煮令水盡候乾取出巴豆去皮心研如膏紙裹去油其黃連曝乾然後與諸藥都搗羅為末用豬膽汁和丸如麻子大三嵗每服空心以粥飲下二丸三四嵗每服三丸至四丸每隔三日一服量兒大小加減服之取下惡物為效次宜服訶梨勒丸補之方在後代赭丸治小兒氣疳腹脹時痛體瘦代赭細研川大黃銼微炒桂心草薢銼硃砂細研當歸銼微炒木香已上各半兩麝香半分細研巴豆一分去皮心研紙裹壓去油右為末入研了藥令勻煉蜜和丸如黃米大三嵗兒每服用粥飲下三丸三四嵗每服五丸空心午後各一服量兒大小以意加減硃砂丸治小兒氣疳能益顔色長肌膚消積滯殺疳蟲宜常服硃砂細研麝香細研熊膽細研蘆薈細研蝸牛炒令微黃史君子五靈脂胡黃連已上各一分右為末都研令勻以燒飯和丸如菉豆大每服以粥飲下五丸量兒大小以意加減五靈脂丸治小兒氣疳漸瘦無力五靈脂蟾頭塗酥炙微黃蟬殼微炒夜明砂微炒蝸牛濕者青黛細研已上各一分麝香半分細研雄黃半分細研右為末入研了藥令勻用糯米飲並蝸牛和丸如菉豆大每一嵗以溫茶下一丸後用藿香湯洗兒後以青熱衣蓋令蟲盡出訶梨勒丸取下惡物後宜服訶梨勒皮草豆䓻去皮人參去蘆頭白术陳皮湯浸去白瓤焙白茯苓已上各半兩丁香一分研甘草一分炙微赤銼右為末煉蜜和丸如麻子大三嵗每服以粥飲下三丸三四嵗每服五丸空心午後各一服量兒大小以意加減檳榔丸治小兒氣疳腹脹煩熱大便難檳榔半兩木香半兩續隨子一分青黛半兩細研麝香半分研蟾頭一枚塗酥炙令焦黃右為末入研了藥令勻煉蜜和丸如菉豆大每服以溫水下三丸看兒大小臨時增減木香散治小兒氣疳不欲乳食時復腹痛木香胡黃連當歸銼微炒訶梨勒只用皮已上各半兩青橘皮一分湯浸去白瓤焙麝香一錢細研右為末用粟米飲和丸如菉豆大每服不計時候粥飲下三丸大小以意加減麝香丹治小兒肺疳皮毛枯燥咳嗽上氣胡黃連一兩半夏半兩紫蘇子炒五味子各三分麝香研蘆薈研硃砂研各一分乾蟾一枚酥炙黃右為細末棗肉和丸如黍米大每服十粒煎人參湯下量兒大小加減一方米飲下消氣丸治小兒疳氣腹脹喘粗木香一錢蘿葡子半兩同巴豆一分炒黃色去巴豆不用右為末以糊丸如菉豆大三嵗兒三十丸用米飲下量兒大小與服分氣丸治小兒疳氣腹脹膨脝腹內有積木香一分黑牽牛半兩生右為末糊丸如小豆大三嵗兒十丸用米飲下子丑散治小兒疳氣腹急喘粗食氣攻目乳腫鼠糞黑牽牛等分右為末三嵗一錢橘皮湯下二服立效檳榔丸治小兒疳氣腹脹胸膈痞悶喘急不安青橘皮去白巴豆肉五枚同炒去巴豆不用檳榔蘿葡子香附子炒香木香已上五味各一分黑牽牛半兩微炒右件為細末生薑自然汁煮麵糊丸如黍米大每服一十丸米飲送下不拘時候烏金膏治小兒疳氣灌入隂黃亮色通草一分燒黃皮一分燒大黃一分燒右燒各存性為末每用一錢獖豬膽調成膏於隂上塗未退煎蛇床子湯洗後再調塗之萬壽丸治小兒疳氣羸瘦腹大頸小頭髮稀疏臟腑不調或㵼或祕乾蝸牛半兩乾蚯蚓半兩蛇蛻皮一分乾蝦頭三個黑丑子五個炮麝香一分史君子五個炮右前四味藥入罐子內封閉口炭火燒通赤取出搗羅為末後三味為末同爛研入如粉用粟米飯為丸如菉豆大每服五丸米飲下一日兩服治小兒疳氣不可療神效出本草用緑礬火煅通赤取出用釅醋淬過復煅如此三度細研用棗肉和丸如菉豆大溫水下日進兩三服一方三嵗三十丸米湯下治小兒疳氣以豬肚蒸黃連為丸服之風疳附論夫小兒風疳者由肝臟壅熱乳食不調之所致也是以孩子十旬之內三嵗之間氣血未調骨本輕軟凡於動靜易為所傷若乳母昧於寒暄失於調適滋味不節加乳無恆或外中風寒內懷驚恐便即乳兒邪氣未除傷兒臟腑致成風疳也其狀搖頭揉目眼赤多睡胸熱髮焦百脈拘急漸漸黃瘦者是其候也方胡黃連丸治小兒風疳剜鼻揉眼不知癢處胡黃連人參去蘆頭地龍微炒代赭細研赤石脂已上各半兩蝸牛肉二十七枚青黛研入大蜣蜋五枚去翅足微炒豬牙皂莢二十七枚去黑皮塗酥炙焦黃去子木香蟾酥研入黃連去鬚檳榔硃砂細研麝香細研天麻當歸銼微炒犀角屑乾蝎微炒蟬殼微炒蘆薈細研羌活史君子白蕪荑驢胎耳炙令焦黃蛤蚧頭尾全者塗酥炙微黃牛黃細研已上各一分右為末入研了藥令勻以獖豬膽汁和丸如菉豆大每於空心以粥飲下三丸量兒大小以意加減蘆薈丸治小兒肝肺風熱心脾壅滯體瘦壯熱致成風疳冝常服解風熱殺疳蘆薈細研天竺黃細研胡黃連蚺蛇膽研入蛇蛻皮灰各一分史君子天麻丁香黃連去鬚青黛細研木香硃砂細研已上各一分牛黃一分細研白龍腦一錢細研蟬殼半分微炒麝香半分細研右為末入研了藥令勻煉蜜和丸如菉豆大每日空心及近晚以粥飲下三丸量兒大小以意加減龍腦散治小兒風疳日漸羸瘦嗜睡壯熱面色青黃或時吐乳龍腦細研黃連去鬚蛜微炒天麻馬兜鈴熊膽研入麝香細研牛黃細研蝸牛炒令微黃蚺蛇膽研入藍葉川大黃銼微炒雄黃細研五靈脂硃砂細研已上各一分右為細末入研了藥令勻每服以溫水調下半錢量兒大小以意加減蟬殼丸治小兒初風疳漸羸瘦體熱心驚搖頭揉鼻四肢煩躁皮膚黃黑毛髮乾枯日夕不差蟬殼一分微炒全蝎半分微炒硃砂一分細研雄黃一分細研麝香一分細研青黛半兩細研龍腦半兩研膩粉一分研蜣蜋五枚去翅足炒焦黃牛黃半兩研蟾頭一枚塗酥炙微黃烏蛇三分酒浸去骨炙令微黃甜葶藶一分隔紙炒令紫色巴豆十枚去皮心研伐裹壓去油右為末入研了藥令勻用豬膽汁和丸如黃米大每服以粥飲下三丸量兒大小以意加減黃連丸治小兒風疳身體壯熱或時吐逆心神煩躁胡黃連蘆薈細研天竺黃細研犀角屑胭脂研入天漿子微研羚羊角屑麝香細研乾蝎微炒白殭蠶微炒牛黃細研硃砂細研雄黃細研巳上各一分蟾酥一錢研入右為末都研令勻以豬膽汁浸蒸餅和丸如麻子大每服以粥飲下三丸不計時候量兒大小以意加減牛黃丸治小兒一切風疳搐摘牛黃細研黃連去鬚桂心白附子炮製川大黃銼微炒膩粉研入人參去藶頭茯神硃砂細研雄黃細研龍腦細研各一分巴豆三十枚去皮心研紙裹壓去油右為末都研令勻以􅌝􅌣和丸如菉豆大濃煎蔥白湯下三丸取下惡物為度量兒大小以意加減夜明砂丸治小兒風疳鼻口多癢肌體羸瘦搖頭揉目昏沉多睡夜明砂微炒白附子炮製白殭𧖟微炒牛黃細研乾蝎微研麝香細研硃砂細研甜葶􅐗隔紙炒令紫色青黛細研巳上各一分烏蛇三分酒浸去皮骨炒微黃蟾酥半分雀兒飯甕右為末用豬膽汁和丸如菉豆大每服以粥飲下三丸量兒大小增減服之蛇蛻皮丸治小兒風疳羸瘦蛇蛻皮煨灰一分蘆薈一分細研蜣蜋七枚去翅足微炒蟾頭一枚炙令黃蟬殼一分微炒硃砂一分細研天漿子七枚微炒乾蝎一分微炒青黛半兩細研天南星一分炮製右為末用獨蒜燒熟并醋飲和丸如菉豆大每服空心以粥飲下三丸量兒大小加減蘆薈丸治小兒風疳肌體多熱煩渴心躁夜不得眠卧蘆薈細研天麻胡黃連已上各半兩麝香細研鐵粉細研水銀乾蝎熊膽硃砂細研已上各一分右為末以棗肉研水銀星盡都和丸如菉豆大每服以溫水下三丸量兒大小以意加減一方加雄黃烏蟾丸治風疳羸瘦搖頭揉目百脈拘急烏蛇一兩酒浸去皮骨炙令黃乾蟾酥炙黃蛇蛻皮一兩胡黃連麝香一分蘆薈一分研熊膽一分研右為細末白麵糊丸如黍米大每服十粒薄荷湯下量兒大小加減熊膽天麻丹治風疳羸瘦搖頭揉目百脈拘急天麻羌活熊膽蟬殼史君子去殼胡黃連各一兩蘆薈乾蟬半兩酥炙右為細末粳米飲和丸黍米大每服十粒煎荆芥湯下量兒大小加減天麻丸治肝疳疾風疳由乳母寒溫不調乳哺不節肝臟受熱或外感風寒內傷喜怒邪氣未散便以乳兒多成風疳肝者眼之候上膈脹熱痰涎壅滯以致肝熱眼赤翳生眵淚爛弦發癢揉擦昏時雀盲甚至經月眼合亦名疳眼又外證搖頭揉目白膜遮睛眼淚多頭焦髮堅筋青腦熱甲癢筋拳燥渴汗多下痢瘡癬青黛川黃連天麻夜明砂川芎蘆薈五靈脂各三錢防風龍膽草蟬蛻去翅足各一錢全蝎一錢麝香一分蟾頭炙焦三錢右為末豬膽浸糕丸如麻子大每服十丸薄荷湯下皂角膏治小兒風氣攻項下生核子皂角大者一挺燒存性糯米一合炒黑皮草烏頭生二錢黃皮三錢炒黑色右為末每服不拘多少以井花水調貼如未安須用水精丹取後用調氣觀音散人參散等藥補仍再貼藥與疳藥相間服驚疳附論夫小兒驚疳由心臟實熱所致也襁褓之內氣血未調臟腑細微因其哺乳不時致生壅滯內有積熱不得宣通心神多驚睡卧不穩胸膈煩悶口瘡頰赤靣黃髮枯皮燥多渴乳食漸少久而不痊體瘦壯熱故名驚疳小兒積成驚歌第一襁褓嬰兒骨肉柔周身氣血未通流若還乳積兼驚恐壅滯成疳病可憂第二腹中壅積病徐徐土色形容脾是虛乳食當前嫌不下靣黃肌瘦痛何如第三睡卧昏沉胃積虛胎中受疾實難除更加骨熱三焦渴臟腑蟲生脹不舒第四遍身火熱口難言膈熱涎多心更煩多是因傷諸毒物致令疾苦有根源第五春夏才過倐至秋行遲體軟病仍留髮枯頰赤皮膚燥日久難痊孰怨尤第六皮燥筋青髮更黃肝家受病實難當再加嘔吐驚風作縱有名醫少妙方第七驚多心熱口生瘡啼呌喉乾氣不揚風癎若添鼻下赤脾疳形狀更堪傷第八渾身冷汗苦難收靣赤那堪脈更浮忽發高聲驚欲起乍昏乍醒幾時瘳方青黛丸治小兒驚疳肌膚羸瘦心神煩熱口鼻疳􅉶宜服青黛細研牛黃細研蘆薈細研硃砂細研雄黃細研犀角屑真珠末胡黃連已上各一分蟾酥一粒杏仁大研入夜明砂半分微炒瓜蒂半分龍腦半分細研乾蟾一枚燒灰蟬殼七