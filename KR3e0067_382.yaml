body:
  text: 普濟方卷三百八十二明周王朱橚撰嬰孩諸疳門氣疳附論夫小兒氣疳者由乳食不調内有壅熱傷於肺也肺主於氣其氣不榮則皮毛枯燥欬逆上氣多涕交流壯熱増寒揉鼻咬甲唇邊赤痒鼻内生瘡腦熱多啼腹脇脹滿乳食減少下痢無恒皮上粟生糞中米出漸漸羸瘦故名氣疳也方蘆薈丸治小兒氣疳毛髮乾堅口無津液或時下痢多渴不欲乳食蘆薈細研青黛細研蟬殻微炒熊膽細研人參去蘆頭黄連去鬚雄黄細研麝香細研蜣蜋去趐足微炒已上各一分蝦蟇一枚酥塗炙微黄訶梨勒皮三分右為末都研令勻以軟飯和丸如菉豆大毎一嵗以暖水下三丸常服令兒悅澤無病量兒大小以意加減麝香丸治小兒氣疳壯熱増寒腹脹下痢皮膚乾燥眼澁揉鼻乳食難化日漸羸瘦麝香半錢細研赤茯苓一錢熊膽半錢研入胡黄連一分㯽榔一枚蘆薈一分微炮京三稜一分細研當歸半分剉微炒木香半分桂心一分川大黄一分剉炒右為末煉蜜和丸如菉豆大毎服乳食前以温粥飲下五丸量兒大小以意加減麝香丸治小兒氣疳頭髮乾堅心腹脹滿肌體黄瘦乳哺不消麝香一分細研胡黄連半兩蘆薈細研肉豆䓻去殻㯽榔夜明砂微炒青橘皮湯浸去白瓤硃砂細研已上各一兩乾膽一枚酥塗炙微黄右為末都研令勻以棗肉和丸如菉豆大每一嵗粥飲下三丸日三服青黛丸治小兒氣疳腹内有積惡滯結之物宜先服搜病青黛一分㯽榔一枚木香一分麝香半分細研黄連一兩去鬚肉豆䓻一枚去殻巴豆半兩大黄半兩剉微炒鼈甲半兩塗酥炙令黄去裙襴右件藥先取黄連巴豆二味以淡漿水三碗煮令水盡候乾取出巴豆去皮心研如膏紙裹去油其黄連曝乾然後與諸藥都搗羅為末用猪膽汁和丸如麻子大三嵗每服空心以粥飲下二丸三四嵗每服三丸至四丸毎隔三日一服量兒大小加減服之取下惡物為効次宜服訶梨勒丸補之方在後代赭丸治小兒氣疳腹脹時痛體瘦代赭細研川大黄剉微炒桂心草薢剉硃砂細研當歸剉微炒木香已上各半兩麝香半分細研巴豆一分去皮心研紙裹壓去油右為末入研了藥令勻煉蜜和丸如黄米大三嵗兒每服用粥飲下三丸三四嵗毎服五丸空心午後各一服量兒大小以意加減硃砂丸治小兒氣疳能益顔色長肌膚消積滯殺疳蟲宜常服硃砂細研麝香細研熊膽細研蘆薈細研蝸牛炒令微黄史君子五靈脂胡黄連已上各一分右為末都研令勻以燒飯和丸如菉豆大毎服以粥飲下五丸量兒大小以意加減五靈脂丸治小兒氣疳漸瘦無力五靈脂蟾頭塗酥炙微黄蟬殻微炒夜明砂微炒蝸牛濕者青黛細研已上各一分麝香半分細研雄黄半分細研右為末入研了藥令勻用糯米飲並蝸牛和丸如菉豆大每一嵗以温茶下一丸後用藿香湯洗兒後以青熱衣盖令蟲盡出訶梨勒丸取下惡物後宜服訶梨勒皮草豆䓻去皮人參去蘆頭白术陳皮湯浸去白瓤焙白茯苓已上各半兩丁香一分研甘草一分炙微赤剉右為末煉蜜和丸如麻子大三嵗每服以粥飲下三丸三四嵗每服五丸空心午後各一服量兒大小以意加減㯽榔丸治小兒氣疳腹脹煩熱大便難㯽榔半兩木香半兩續隨子一分青黛半兩細研麝香半分研蟾頭一枚塗酥炙令焦黄右為末入研了藥令勻煉蜜和丸如菉豆大每服以温水下三丸看兒大小臨時增減木香散治小兒氣疳不欲乳食時復腹痛木香胡黄連當歸剉微炒訶梨勒只用皮已上各半兩青橘皮一分湯浸去白瓤焙麝香一錢細研右為末用粟米飲和丸如菉豆大每服不計時候粥飲下三丸大小以意加減麝香丹治小兒肺疳皮毛枯燥咳𠻳上氣胡黄連一兩半夏半兩紫蘇子炒五味子各三分麝香研蘆薈研硃砂研各一分乾蟾一枚酥炙黄右為細末棗肉和丸如黍米大毎服十粒煎人參湯下量兒大小加減一方米飲下消氣丸治小兒疳氣腹脹喘麤木香一錢蘿葡子半兩同巴豆一分炒黄色去巴豆不用右為末以糊丸如菉豆大三嵗兒三十丸用米飲下量兒大小與服分氣丸治小兒疳氣腹脹膨脝腹内有積木香一分黒牽牛半兩生右為末糊丸如小豆大三嵗兒十丸用米飲下子丑散治小兒疳氣腹急喘粗食氣攻目乳腫鼠糞黑牽牛等分右為末三嵗一錢橘皮湯下二服立効㯽榔丸治小兒疳氣腹脹胷膈痞悶喘急不安青橘皮去白巴豆肉五枚同炒去巴豆不用㯽榔蘿葡子香附子炒香木香已上五味各一分黑牽牛半兩微炒右件為細末生姜自然汁煮麵糊丸如黍米大每服一十丸米飲送下不拘時候烏金膏治小兒疳氣灌入隂黄亮色通草一分燒黄皮一分燒大黄一分燒右燒各存性為末每用一錢獖猪膽調成膏於隂上塗未退煎蛇床子湯洗後再調塗之萬壽丸治小兒疳氣羸瘦腹大頸小頭髮稀疎臟腑不調或㵼或秘乾蝸牛半兩乾蚯蚓半兩蛇蛻皮一分乾蝦頭三個黑丑子五個炮麝香一分史君子五個炮右前四味藥入礶子内封閉口炭火燒通赤取出搗羅為末後三味為末同爛研入如粉用粟米飯為丸如菉豆大每服五丸米飲下一日兩服治小兒疳氣不可療神効出本草用緑礬火煅通赤取出用釅醋淬過復煅如此三度細研用棗肉和丸如菉豆大温水下日進兩三服一方三嵗三十丸米湯下治小兒疳氣以猪肚蒸黄連為丸服之風疳附論夫小兒風疳者由肝臟壅熱乳食不調之所致也是以孩子十旬之内三嵗之間氣血未調骨本輕軟凢於動静易為所傷若乳母昧於寒暄失於調適滋味不節加乳無恒或外中風寒内懐驚恐便即乳兒邪氣未除傷兒臟腑致成風疳也其狀搖頭揉目眼赤多睡胸熱髮焦百脉拘急漸漸黄瘦者是其候也方胡黄連丸治小兒風疳剜鼻揉眼不知癢處胡黄連人參去蘆頭地龍微炒代赭細研赤石脂已上各半兩蝸牛肉二十七枚青黛研入大蜣蜋五枚去翅足微炒猪牙皂莢二十七枚去黒皮塗酥炙焦黄去子木香蟾酥研入黄連去鬚㯽榔硃砂細研麝香細研天麻當歸剉微炒犀角屑乾蝎㣲炒蟬殻微炒蘆薈細研羗活史君子白蕪荑驢胎耳炙令焦黄蛤蚧頭尾全者塗酥炙微黄牛黄細研已上各一分右為末入研了藥令勻以獖猪膽汁和丸如菉豆大毎於空心以粥飲下三丸量兒大小以意加減蘆薈丸治小兒肝肺風熱心脾壅滯體痩壯熱致成風疳冝常服解風熱殺疳蘆薈細研天竺黄細研胡黄連蚺蛇膽研入蛇蛻皮灰各一分史君子天麻丁香黄連去鬚青黛細研木香硃砂細研已上各一分牛黄一分細研白龍腦一錢細研蟬殻半分微炒麝香半分細研右為末入研了藥令勻煉蜜和丸如菉豆大毎日空心及近晚以粥飲下三丸量兒大小以意加減龍腦散治小兒風疳日漸羸痩嗜睡壯熱面色青黄或時吐乳龍腦細研黄連去鬚蛜微炒天麻馬兠鈴熊膽研入麝香細研牛黄細研蝸牛炒令微黄蚺蛇膽研入藍葉川大黄剉微炒雄黄細研五靈脂硃砂細研已上各一分右為細末入研了藥令勻毎服以温水調下半錢量兒大小以意加減蟬殻丸治小兒初風疳漸羸痩體熱心驚揺頭揉鼻四肢煩躁皮膚黄黑毛髪乾枯日夕不差蟬殻一分微炒全蝎半分微炒硃砂一分細研雄黄一分細研麝香一分細研青黛半兩細研龍腦半兩研膩粉一分研蜣蜋五枚去翅足炒焦黄牛黄半兩研蟾頭一枚塗酥炙微黄烏蛇三分酒浸去骨炙令微黄甜葶藶一分隔紙炒令紫色巴豆十枚去皮心研伐裹壓去油右為末入研了藥令匀用猪膽汁和丸如黄米大每服以粥飲下三丸量兒大小以意加減黄連丸治小兒風疳身體壯熱或時吐逆心神煩躁胡黄連蘆薈細研天竺黄細研犀角屑臙脂研入天漿子微研羚羊角屑麝香細研乾蝎微炒白殭蠶微炒牛黄細研硃砂細研雄黄細研巳上各一分蟾酥一錢研入右為末都研令匀以猪膽汁浸蒸餅和丸如麻子大每服以粥飲下三丸不計時候量兒大小以意加減牛黄丸治小兒一切風疳搐摘牛黄細研黄連去鬚桂心白附子炮製川大黄剉微炒膩粉研入人參去藶頭茯神硃砂細研雄黄細研龍腦細研各一分巴豆三十枚去皮心研紙裹壓去油右為末都研令匀以􅌝􅌣和丸如菉豆大濃煎葱白湯下三丸取下惡物為度量兒大小以意加減夜明砂丸治小兒風疳鼻口多痒肌體羸瘦搖頭揉目昏沉多睡夜明砂㣲炒白附子炮製白殭𧖟微炒牛黄細研乾蝎微研麝香細研硃砂細研甜葶􅐗隔紙炒令紫色青黛細研巳上各一分烏蛇三分酒浸去皮骨炒微黄蟾酥半分雀兒飯甕右為末用猪膽汁和丸如菉豆大每服以粥飲下三丸量兒大小増減服之蛇蜕皮丸治小兒風疳羸痩蛇蜕皮煨灰一分蘆薈一分細研蜣蜋七枚去翅足㣲炒蟾頭一枚炙令黄蟬殻一分微炒硃砂一分細研天漿子七枚微炒乾蝎一分微炒青黛半兩細研天南星一分炮製右為末用獨蒜燒熟并醋飲和丸如菉豆大每服空心以粥飲下三丸量兒大小加減蘆薈丸治小兒風疳肌體多熱煩渴心躁夜不得眠卧蘆薈細研天麻胡黄連已上各半兩麝香細研鐵粉細研水銀乾蝎熊膽硃砂細研已上各一分右為末以棗肉研水銀星盡都和丸如菉豆大每服以温水下三丸量兒大小以意加減一方加雄黄烏蟾丸治風疳羸痩搖頭揉目百脉拘急烏蛇一兩酒浸去皮骨炙令黄乾蟾酥炙黄蛇蜕皮一兩胡黄連麝香一分蘆薈一分研熊膽一分研右為細末白麵糊丸如黍米大每服十粒薄荷湯下量兒大小加減熊膽天麻丹治風疳羸痩搖頭揉目百脉拘急天麻羌活熊膽蟬殻史君子去殻胡黄連各一兩蘆薈乾蟬半兩酥炙右為細末粳米飲和丸黍米大毎服十粒煎荆芥湯下量兒大小加減天麻丸治肝疳疾風疳由乳母寒温不調乳哺不節肝臓受熱或外感風寒内傷喜怒邪氣未散便以乳兒多成風疳肝者眼之候上膈脹熱痰涎壅滯以致肝熱眼赤翳生眵淚爛弦發痒揉擦昏時雀盲甚至經月眼合亦名疳眼又外證搖頭揉目白膜遮睛眼淚多頭焦髮堅筋青腦熱甲痒筋拳燥渴汗多下痢瘡癬青黛川黄連天麻夜明砂川芎蘆薈五靈脂各三錢防風龍膽草蟬蜕去翅足各一錢全蝎一錢麝香一分蟾頭炙焦三錢右為末猪膽浸糕丸如麻子大每服十丸薄荷湯下皂角膏治小兒風氣攻項下生核子皂角大者一挺燒存性糯米一合炒黒皮草烏頭生二錢黄皮三錢炒黒色右為末毎服不拘多少以井花水調貼如未安須用水精丹取後用調氣觀音散人參散等藥補仍再貼藥與疳藥相間服驚疳附論夫小兒驚疳由心臟實熱所致也襁褓之内氣血未調臟腑細微因其哺乳不時致生壅滯内有積熱不得宣通心神多驚睡卧不穏胸膈煩悶口瘡頰赤靣黄髮枯皮燥多渴乳食漸少久而不痊體瘦壯熱故名驚疳小兒積成驚歌第一襁褓嬰兒骨肉柔週身氣血未通流若還乳積兼驚恐壅滯成疳病可憂第二腹中壅積病徐徐土色形容脾是虚乳食當前嫌不下靣黄肌瘦痛何如第三睡卧昏沉胃積虚胎中受疾實難除更加骨熱三焦渴臟腑虫生脹不舒第四遍身火熱口難言膈熱涎多心更煩多是因傷諸毒物致令疾苦有根源第五春夏纔過倐至秋行遲體軟病仍留髮枯頰赤皮膚燥日久難痊孰怨尤第六皮燥筋青髮更黄肝家受病實難當再加嘔吐驚風作縱有名醫少妙方第七驚多心熱口生瘡啼呌喉亁氣不揚風癎若添鼻下赤脾疳形狀更堪傷第八渾身冷汗苦難收靣赤那堪脉更浮忽𤼵高聲驚欲起乍昏乍醒幾時瘳方青黛丸治小兒驚疳肌膚羸痩心神煩熱口鼻疳􅉶宜服青黛細研牛黄細研蘆薈細研硃砂細研雄黄細研犀角屑真珠末胡黄連已上各一分蟾酥一粒杏仁大研入夜明砂半分微炒𤓰蔕半分龍腦半分細研乾蟾一枚燒灰蟬殻七