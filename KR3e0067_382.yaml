為末用棗肉和丸如菉豆大以粥飲化三丸服藿香湯下用青熱衣蓋兒蟲當自出量兒大小加減雄黃丸治小兒蛔疳出蟲雄黃牛黃硃砂麝香青黛夜明砂各一錢右都細研如粉以水化蟾酥為丸如菉豆大每服以茶下三丸當有蟲出史君子丸治小兒蛔疳出蟲史君子一分雄黃牛黃一錢麝香一錢蟾酥一錢熊膽一分右都研為末用軟飯和丸如麻子大如小兒疳極者先用桃栁湯浴兒後以粥飲下三丸又方鶴虱半兩胡黃連半兩檳榔半兩研入乾蟾半兩熊膽半兩研入右為細末每服於空心以暖水下一字服藥後殺蟲有如馬尾數十條出便差三嵗以上即服半錢蟾酥丸治小兒蛔疳蟲毒腹脹青筋急滿日漸枯瘦食物則下不長肌肉或時蟲蝕腹內多痛蟾酥一分麝香一分五靈脂一分巴豆去皮心研紙裹壓去油右同研令極細用酒半盞同入銚子內以漫火熬不住手攪候堪丸即丸如黃米大每服以陳橘皮煎湯下三丸空心及晚後服之隨兒大小以意加減定粉丸治小兒疳蛔定粉豬膽各一分右研和為丸如菉豆大每服二丸米飲下治小兒疳蛔右用蜀葵花乾為末炙豬肉蘸與喫有竒功除毒丹治蛔疳不差傳染骨肉者鬼臼一兩苦參青葙子草龍膽半兩硫黃緋絹白礬乾蝦蟇各一分以上並燒灰存性右為細末煉蜜和丸如麻子大每服十粒磨沉香湯下量大小加減青黛丸治小兒蛔疳一切諸疾青黛一分研胡黃連一分鶴虱一分蘆薈一分研硃砂一研右件藥搗羅為末都研令勻以豬膽汁和丸如菉豆大空心以熱水下三丸當有蟲出乾漆散治小兒蛔疳腹肚蟲痛乾漆一錢史君子十四個取肉蕪荑六十枚楝樹皮向東邊取皮厚者日曬乾去粗皮取一兩右為末每服一字二三嵗半錢四五嵗一錢沙糖熟水下一日三服治小兒疳蛔取鸕鷀屎乾研為末炙豬肉蘸與吃有奇功療小兒疳蛔咬心心腹脹滿疼痛黃瘦下寸白蟲單搗醋麻子為末酒調一錢服之甚效乾疳附論夫小兒身體增寒壯熱蝕齒口乾髮豎毛焦皮膚枯燥睡多盜汗乳食雖多肌肉消瘦肢體無力默默少知慧者乾疳也此由乳食不調心脾積熱嗜甘味多熏蒸積滯故令兒日漸尫瘦又謂之熱疳方牛黃丸治小兒乾疳體瘦煩熱眠卧不安牛黃一分研雄黃一分天竺黃一分蘆薈一分胡黃連半兩麝香一錢丁香一分黃連熊膽一分蟾酥半兩蛇蛻皮灰一分青黛一分犀角屑天漿子一分右為末更研令勻以煉蜜和丸如菉豆大以粥飲下三丸日三服量兒大小以意加減天竺黃散治小兒乾疳心脹煩熱眼目赤澀皮膚乾燥夜多盜汗瘦不能乳食天竺黃半兩牛黃一分硃砂一分蘆薈一分雄黃一分蟾頭一分龍腦一錢麝香一錢胡黃連一分犀角屑硃砂木香鈎藤一分甘草一分右為細散都研令勻每服以溫水調下半錢日二服量兒大小以意加減青黛丸治小兒乾疳肌體羸瘦皮毛乾焦發歇寒熱昏昏多睡青黛三分細研牛黃研細蘆薈研細胡黃連硃砂細研麝香細研蛇蛻皮灰龍膽去蘆頭蟾一枚塗酥炙焦黃蟬殼微炒已上各一分雄黃一分右為末都研令勻用麵糊和丸如黍米大每服以粥飲下三丸日三服量兒大小臨時增減福壽保生丸治小兒乾疳肌肉消瘦蘆薈南木香各二兩蓬术蕪荑史君子仁黃連青皮去白砂仁陳皮去白神麯各七錢半右宿蒸飲糊為丸每服三十丸米湯下茵芋丸治小兒乾疳體熱茵芋細辛去苗黃芩去黑心甘草炙龍齒燒灰石膏碎松蘿各三錢杜蘅半兩鉛丹别研一分右為末煉蜜和丸如麻子大一二嵗兒每服三丸米飲下三四嵗五七丸更量兒大小加減青黛散治小兒乾疳肌熱殺蟲青黛别研半兩苦楝根銼三兩黃連去鬚雄黃别研丹砂别研各一分蕪荑仁夜明砂炒大黃炙各半兩麝香一分别研右搗羅為散每服半錢或一錢米飲調下日二服更量兒大小加減如要解苦用蜜水調服蟾酥丸治小兒乾疳乳食不減肌膚日漸羸瘦身體壯熱毛髮乾枯四肢無力蟾酥一分豬膽一枚青黛三分硃砂三分細研麝香一分蟬殼一分微炙去足乾地龍一分微炙蛇蛻皮灰一分龍腦三分右除蟾酥外細研以豬膽化蟾酥丸如粟米大每服以溫水下五丸更研少許吹鼻內量兒大小以意加減牛黃丸治小兒乾疳煩渴壯熱皮膚枯燥日漸羸瘦牛黃半錢細研雄黃一分細研甘草半分炙微赤銼龍腦一錢細研麝香一錢細研黃連一分去鬚蘆薈一分天竺黃一分右為末令勻用糯米飲和丸如菉豆大每服一嵗以粥飲下一丸日三服青黛散治小兒乾疳日久不差骨立形枯諸治無效青黛一分麝香一分蘆薈一分硃砂一分地龍一分微炙夜明砂一分微炒乾蝦蟇灰一分熊膽一分右為細散每服半錢空心以粥飲下更用少許藥吹入鼻中後以桃枝湯看冷熱浴兒衣蓋有蟲子出為效龍齒散治小兒乾疳腹脹急退熱龍齒燒灰龍腦研栝蔞炒白茯苓去黑皮桂去粗皮麝香研各一分蜣蜋三枚去翅足煨焦右為散一二嵗兒每服半錢匕用溫水調下三四嵗一錢空心午後服更量兒大小加減訶梨勒丸治小兒乾疳肌肉消瘦飲食不減寒熱枯瘁心腹脹滿好喫泥土訶梨勒皮搗末三分肉豆蔲去殼一枚搗末青黛細研麝香研蘆薈研熊膽研丹砂研各一分右研令勻用酒煮麵糊丸如黍米大每服三丸至五丸米飲下更量大小加減麝香丸治小兒乾疳肌熱化食壓驚麝香細研一錢青黛研雷丸鶴虱炒貫衆去皮黃連去鬚各一兩巴豆一十四枚去殼油煎研右除麝香青黛巴豆外餘搗羅為末共和研勻用獖豬膽汁浸炒餅和丸如菉豆大每服五七丸空心午後米飲下更量兒大小加減服之蝸牛丸治小兒乾疳面青目澀腦熱鼻瘡眼生障膜毛髮焦黃肌膚羸瘦蝸牛二分燒灰穀精草三分燒灰夜明砂三分微炙乾蟾一枚塗酥炙令焦黃瓜蒂末半兩雄黃一分麝香一分右為末用蒸餅和丸如菉豆大每服以粥飲下三丸日三服量兒大小加減服之胡黃連丸治小兒乾疳瘦弱不能食乳髮竪腦乾肌體柴瘦胡黃連末半兩硃砂三分麝香一分蛇蛻皮一條燒灰波斯青黛三分蟾酥一杏仁大蘆薈三分右為末用獖豬膽一枚取汁酒一盞和藥末都於銚子內熬成膏丸如菉豆大五嵗至六嵗以粥飲下五丸日三服三嵗以下三丸龍腦散治小兒乾疳瘦瘁鼻癢口瘡龍腦蘆薈麝香青黛各别研黃連去鬚青羊肝切焙等分右研細和勻每服半錢或一字吹鼻中及塗口上破積丸治乾疳煩熱化腸胃食滯令兒能食破積聚木香青橘皮去白焙桂去粗皮各一兩吳茱茰湯浸焙乾二兩硼砂醋熬成霜取一錢匕巴豆霜取半錢右為末與硼砂巴豆霜拌勻醋煮麵糊丸如菉豆大每服三丸至五丸早晚食後臨卧一服大便利則減丸數治小兒乾疳面色萎黃肌體羸瘦蘆薈一分龍膽一分去蘆頭青黛半兩細研胡黃連一分牛黃一分麝香一分細研右為末研勻以蒸餅和丸如黃米大每服以粥飲下五丸量兒大小以意加減金蟾丸治小兒乾疳體熱肌瘦蟾頭一枚炙黃連去鬚胡黃連木香各一分大黃銼炒半分右為末粟米飲丸如麻子大每服五丸至十丸米飲下更量兒大小加減蟾酥煎丸治小兒身體寒熱皮毛枯燥飲食雖多肌肉消瘦默默不慧名乾疳乾蟾大者五枚細銼用醇酒五升文火煎爛去骨研羅去滓入蜜四兩銀器內重熬成稠膏胡黃連二兩黃連去鬚二兩麝香研半兩白蕪荑仁炒二兩右為末以前蟾膏和劑丸如麻子大每服十五丸米飲下不拘時候過晬至十嵗以前並冝服大能退疳黃長肌肉牛黃丸治小兒乾疳體熱羸瘦心神煩躁少得眠卧牛黃半兩研硃砂半兩細研水飛過子芩半兩犀角屑半兩麝香右為末都研令勻以糯米飯和丸如麻子大每服用粥飲下三丸量兒大小增減服之胡黃連散治小兒乾疳瘦瘁胡黃連犀角屑白羊肚切焙研細為末各一錢麝香研一錢右搗羅為散每服半錢生地黃汁小半盞調下空心午後服更量兒大小加減黃連丸一名金瓜丸治小兒乾疳身多壯熱黃瘦黃連去鬚黃蘖去粗皮甘草炙青橘皮湯浸去白焙各一分右為末加麝香少許以獖豬膽汁和勻却入膽內盛用綿子繫定於石器內漿水一盞煮漿水減半取出當風處挂一宿去膽皮再研令勻可丸即丸如菉豆大每服五七丸米飲下加至十丸量兒大小加減保童丸治小兒乾疳瘦弱萎黃大黃銼炒一兩黃連去鬚半兩夜明砂炙楝實麵炒各一分右為末煉蜜和丸如豌豆大麝香湯下三丸更量大小加減用之胡黃連散治小兒乾疳飯食如常肌體羸瘦時作寒熱皮毛枯焦默默不慧胡黃連半兩黃連去鬚白蕪荑仁各一兩木香半兩右為末獖豬膽和於盞內坐飯甑中蒸兩度為丸如粟米大每服二十丸米飲下胡黃連丸治小兒乾疳體熱胡黃連黃連去鬚各半兩丹砂研木香各一分右為末用獖豬膽填藥在內取線繫以杖子一條橫於銚子上將藥膽挂上面勿令著銚底用漿水煮一炊時取出入蘆薈麝香各一分細研和勻飯米丸如黍米大每服五丸至七丸米泔溫水下更量兒大小加減用之漏疳附論夫漏疳之病由風邪毒氣客於手陽明之脈攻衝齒間齗肉虛腫膿汁焮痛綿綿不斷久而不差時發時愈故名漏疳方青礬散治小兒漏疳蟲頸骨破青礬燒研黃礬燒研雄黃别研白礬燒研細辛去苗葉各一分莨菪子微炙附子炮製去皮臍苦參藜蘆去蘆頭各一分麝香研甘草炙青黛各研一兩右為散更於乳鉢中研細每用少許傅患處病重者以井華水調半錢空心服之黃銀散治漏疳齗爛宣路不止脣齗癢痛牙齒蚛齲黃連去鬚蒲黃各一兩生薑地黃焙烏頭尖生當歸切焙銅緑細辛去苗葉各二兩莨菪子一分為末粉水銀一錢用棗瓤五枚研令星盡并莨菪子和末右為細散洗淨潄口以手指蘸藥勻傅患處良久溫水潄頻用取效藁本散治漏疳蟲蝕藁本去苗土當歸切焙杏仁湯浸去皮尖半兩右羅為散每用一字綿裹納蟲孔中看蟲孔漸小為效青梃子治漏疳口齒破爛生瘡信砒磁瓦上炙半熟粉霜磁瓦上炙半熟膽礬磁瓦上炒半熟各一分銅緑生胡粉麝香研雌黃研各一錢右為細末鹽水洗潄口次以米飯掌內搓藥成梃子如針頭大置齒縫中蘆薈散治漏疳蟲蝕脣鼻齒牙臭爛蘆薈半兩研麝香研青礬燒研黃礬燒研白礬燒研各一分蝦蟇灰半兩右研為散令勻先以綿拭齗上惡血出即貼藥半錢日三次黃連散治漏疳血出不得食黃連去鬚黃蘖子馬牙硝研各一分白礬燒研一分龍腦一錢右研為散再同研勻每用半錢貼患處龍實散治漏疳蟲蝕有竅龍實龍骨中有之深黃或淡黃土褐色緊掏人舌者白礬燒研蝸牛殼胡粉牛黃各一錢右研為細散每用少許糝貼竅內葵根散治漏疳口瘡葵根切赤小豆土瓜根各一兩麝香研一分右羅為散每用一字貼瘡黑散治漏疳宣露藁本去苗土升麻皂莢不蛀者燒灰存性各半兩石膏一兩半碎右羅為散卧時以手指蘸揩齒上微潄存藥氣兼牢牙去臭普濟方卷三百八十二
