茯苓人參等分右為末二歳服二字一歳一字三歳亦二字四五歳三字新汲水入蜜少許調下蜜水約盞内三分五聖丹治一切逺年近日酒食所傷漸成積塊兼消化冷果食逐五飲服餌消積塊大烏梅巴豆大者各十箇半夏大者用三十箇丁香新好者五十箇右為細末滴水丸如麻子大硃砂為衣小兒兩丸大人毎服三五丸至七丸量虚實加減生薑湯下不計時候紫金丸治小兒大人因驚積聚粘滑毒物在脾胃累曽用藥取不下變成虚中積大人吃食吐逆心腹脹滿夜有虚汗日漸羸瘦蠍梢三十箇犀末銀末硃砂各一錢右為末極細用水麫糊為丸菉豆大用薑棗湯下七丸婦人血氣米飲下五丸至七丸小兒驚疳積體熱困重目不開用黄連甘草桃仁薄荷湯化膩粉一字許一歳以上三歳已下三丸小兒只可一丸二丸浮珠丸子治小兒取積雄黄水飛過硃砂細研膩粉各半錢巴豆五粒去油右和勻以天南星末酒煮糊為丸小兒粟米大大人桐子大用金銀薄荷湯下加減服之磨刀丸取小兒久困驚積滯食急慢驚風積妳不下作燥作熱作吐瀉多呌不睡全蠍硃砂一錢粉霜二錢半夏湯洗七次去涎用七箇右為末巴豆十四箇都研蜜浸蒸餅心為丸入麝香少許丸如菉豆大磨刀石水下一歳一丸看虚實加減服如吐瀉即用驚藥調理不得喫和氣散恐渾身驚氣取積青榴丸㓜㓜新書輕粉炒五錢匕青黛炒三錢匕腦麝各半字重巴豆去心油春冬三十五粒秋夏二十四粒右為末麫糊丸如菉豆大毎服五丸米飲化下五珍丸治酒食積通用青皮去白炒焦黄乾薑炮存性北五靈脂蓬莪术各兩右為末夾和秤藥末一兩用巴豆肉以石壓准去半油秤一錢研細拌和粟米飯丸麻子大每服三五丸米湯下飢飽時服葱湯丸治積神效巴豆二十五粒用水浸一宿五更初去水後去皮殻心膜不去油另研滑石五錢輕粉半錢鷹糞五錢右為末研飯為丸如粟米大週歳已下毎用三丸以上四丸未效再加丸數膈上有涎或吐亦無妨如有蟲用苦楝皮少許甘草二寸煎湯五更初先將化蟲藥服了後用此取下春季燈心湯下夏季蘇鹽湯下秋季蘇湯下冬季葱白湯下初生兒以一粒放口中乳汁下化鉄丹治小兒食積肚硬帶熱渇瀉或嘔皆因飲食無度多飡過飽後即睡得之烏梅八箇取肉巴豆十六粒去殻青皮五錢去瓤陳皮五錢去白右為末米糊丸粟米大毎服七丸米飲下銅鐵亦銷消積丸一名丁香丸治小兒食積口中氣温面黄白多睡及乳積吐乳瀉乳此由啼哭未已以乳與兒停滯不化得之縮砂十二箇丁香九箇烏梅三箇巴豆一箇去油右為細末糊丸如黍米大三歳已上五六丸已下三二丸用温水下無時服凡小兒身温壯熱非變蒸之候大便白而酸臭為胃有蓄冷宜丸藥消下後服温胃藥若身温壯熱大便赤而酸臭為胃有蓄熱亦宜丸藥消下後服凉胃藥無不愈一方用藿香湯下乳後一方加百草霜和匀三味紫霜丸消積聚雄黄三錢硃砂一錢百草霜二錢右為細末飯丸如米大毎服三五丸至十丸煎皂角仁湯下無時兒小者減之一方巴豆七枚代赭石二兩杏仁一錢治乳食不消炊餅和丸温米飲下雄黄丸治取積雄黄三錢鬱金半兩巴豆二十粒去皮出油右為末麫糊丸如蘿蔔子大加減服每五丸空心茶清下追魂散治果子傷積白丁香輕粉官桂去皮各三錢右為末冷水調下半錢睡時服来日取下所傷物用異功散煎紫蘇木𤓰調湯三服和氣木香散治小兒諸般氣積或驚結不通此藥立取下木香末一錢半陳皮二錢巴豆五粒去心膜右將陳皮巴豆用炒黄色只取下巴豆五片餘不用與前木香末同研匀毎服半錢或一字陳米飲下若肚瀉瓦缸内煎香附子湯下大小加減青黛三聖丸治小兒痰涎隔食妳癖驚風消妳食蛔蟲疳積腹痛青黛一分牽牛末二分膩粉二錢右為末麫糊為丸米飲下靈砂丹下虚中積臓腑虚滑泄瀉久經取轉裏急後重久積惡痢暴瀉久不止神效無比通明􅔈砂一錢細研顆塊神砂通明有如墻壁者一分細研右二味滚研極細用蠟半兩先於盞内鎔成汁入去皮巴豆取三七粒全者煎候巴豆紫色為度即漉出巴豆細研入前二味再研匀於黄蠟内三分中取一分再鎔成汁傾藥於内急攪令匀刮出於甆合内收之毎服暴瀉惡痢旋作三丸如菉豆大濃煎艾湯先呷三五口然後吞下水瀉冷水吞下如取積毎服三丸如桐子大濃煎甘草湯放冷吞下臨卧服其久積藥隨積下其小可不動便安飛霜丹理一切虚中積下痢膿血裏急後重臍腹撮痛􅔈砂三分去砂石秤粉霜三錢秤右同研匀用薄紙抝作小紙箱子方濶二寸半深四分許將藥末鋪在箱内冷掘了地坑深三四寸其濶約椀盖得着用火燒令極熱即去燧火惟留熱火三兩梃鋪在坑底置藥箱子在内火上急用甆椀葢坑口周回以細土壅塞無令透煙凡燒須防葢定後火滅頻以手按試椀足熱可燒時須用好熟炭火即不滅燒如兩炊飯久即藥成也如火滅即再裝火燒之及兩炊飯久候椀冷即開椀取出藥燒椀上有藥煙着椀處亦揩下再研令細凡藥得熟自於火上交凝更次入膩粉九錢龍腦一錢再滚研令匀水浸蒸餅心丸如菉豆大大人毎服十丸至十五丸乳香湯下小兒三五丸如有積可一兩日方徐徐利下也治小兒脾積獨科蒜一塊等見分兩香白芷等分右為末將蒜搗爛入臘臙脂等分同白芷蒜同搗成膏子貼小兒臍中用牛角盒兒男用上葢覆臍女用下葢同用然後用無糨粉絹帛勒之待小兒口鼻中出蒜氣香去藥其病自全效驗蘇感丸治小兒氣積痛啼呌利如蠏渤皆由觸忤其氣榮衛不和去臟腑有積下利蘇合香丸感應丸各等分右和丸如粟米大紫蘇湯下二十丸一方淡薑湯空心下滋氣和胃消積縮砂香附湯平胃散右和合毎服一錢蘇鹽湯下多服尤妙治小兒積滯腹脹食傷等疾用芫花未開者及時採取眼㬠乾摘去枝梗用和淡米醋或糠醋浸藥面上醋髙一指隔宿取出控起帶醋於銚内以慢火炒之不住手攪拌水脉斷即以碗器盖之候冷傾出着底焦者不用洗過銚子揩净再炒香熟焙乾為細末却以先浸藥醋打硬糊為丸如粟米大毎服三二十丸米飲下不拘時候一時許再進必剰一兩行即止甚易而無所損若去脾胃停滯即用沙糖水或紫蘇湯下打糊醋須澄清者用或少却添别醋丸時更作一如菉豆大者治大人酒食所傷丸數量患隨虚實服之芫花海藻甘遂大㦸四者皆反甘草服此藥須忌他藥一日臟腑既動當以白粥補之青礞石丸治小兒臟腑積聚脇肋脹硬肌肉消瘦不能飲食一應妳癖食積悉皆治之青礞石木香乾薑各一兩荆三稜煨切枳殻麩炒去瓤皂角去皮醋炙黄去子丁香各半兩巴豆二錢半去殻出盡油取霜右為細末煮神麯糊為丸如黍米大週歳兒毎服十丸温生薑湯送下乳哺後三稜丸治停積不散腹肋脹滿乾噦惡心全不入食荆三稜煨香切木香神麯炒黄陳橘皮去白半夏入生薑四兩同搗成膏炒令黄各一兩右為細末煮麫糊為丸如黍米大毎服二十丸温生薑湯下乳食後磨積褐丸三稜蓬术青皮陳皮香附子木香蘿蔔子炒牽牛子半生半炒神麯麥蘖檳榔各等分右為末糊丸如黍米大蘿蔔湯下丁香脾積丸治一切積氣腹肚堅腹脹不進飲食皂角燒一箇青皮半兩三稜二兩莪术三錢丁香半兩砂仁半兩麥芽三錢炒青黛二錢巴豆三七粒出油右為末烏梅肉搗糊為丸空心飯飲下茶清亦可日進三服丸如麻子大三稜煎丸治虚中有積痛不進飲食三稜莪荗炮各半兩芫花三錢三味同醋煮一夕南木香二錢烏梅肉二錢半丁香二錢右為末醋糊為丸如菉豆大毎服二十丸飯飲吞下亦能退面目浮腫鮓湯丸治虚中堅積外疾氣蠱腹大膨脹遍身浮腫雷丸二錢甘遂二錢粉霜半錢滑石二錢白膳玉一錢輕粉半錢芫花少許製青黛三錢水銀少許右為末爛飯搗成丸如菜子大未週者隨月數與之拌碎不可喂可如雛哺若妳疳金銀薄荷湯下或葱白湯下三歳二十丸疳瘦五十丸滿身浮腫毛髪黄堅用净洗魚鮓煎湯下疳勞腹大湯使如前一日止可兩服不可連進五六歳常服只十五丸自然疎泄利去滯積如未退加一二服積盡而泄自疎但吃白粥補之不可用甘草藥調理則成相反忌甜物一月為妙延胡索散治氣積食積成塊及盤腹氣痛延胡索茴香炒甘草蓬莪荗各三錢右㕮咀毎服一錢水五分煎至三分温服如取後腸中一切冷痛並皆治之塌氣丸治積水驚水飲水多停積於脾肢腫而熱赤小豆陳皮蘿蔔子甘草各半兩木香炮一錢右為末用神麯末煮糊為丸如菉豆大毎服十丸薑湯下麻仁丸破氣消積心腹痞塞並能治之麻仁半兩芍藥八錢大黄一兩枳殻八錢厚朴半兩杏仁半兩右為末蜜丸如菉豆大毎用十丸温水吞下外宣藥治小兒積氣腹大如吹氣塞痞滿郁李仁一錢巴豆烏梅肉一錢皂角炙桃膠二錢朴硝少許檳榔枳殻各一錢右為末煉蜜令熟入藥搗勻丸如棗核様納入糓道荆黄湯治氣閉不通臟腑痞結枳殻大黄荆芥朴硝梔子甘草各等分右為末毎用一錢燈心湯調服立下日與兩三服尅效聖餅子治癖積陳皮十兩巴豆百箇同陳皮妙廣荗炮荆三稜炮香附子炒半兩右為細末打麫糊為丸如菉豆大捻作餅子毎服三十丸温水送下橘皮丸治癖積堅硬不消橘皮二兩巴豆半兩去皮右將橘皮剉碎將巴豆炒令重黄色為度揀去巴豆不用只搗陳皮為細末用軟飯爛研為丸如菉豆大毎服二十丸温淡生薑湯下食前量小兒歳數旋丸大小廣荗潰堅丸治小兒癖積脇腹脹滿發熱咳嗽喘促不思飲食青皮陳皮廣荗木香烏梅三稜炮各一兩大椒巴豆各半兩右為細末麫糊丸如麻子大毎服五七丸温米飲下量兒大小為丸加減服之食逺服六味三稜丸曠明仲云五六箇月小兒未吃食有癖積者保安丸太重只服此六味為佳莪术煨剉三稜煨神麯炒麥蘖炒青皮陳皮右等分為末水煮清糊為丸熟水下丁皮散治小兒脾積疼痛有效丁皮白术茯苓青皮良薑縮砂仁神麯麥蘖甘草真桂心右等分為末燒鹽湯㸃服剪紅丸一名神應丸磨癖積殺諸蟲進飲食神效驗無問男子婦人小兒老㓜看虚實加減服之有孕婦人不可服乾漆剉炒一錢紫芫花炒一錢巴豆七箇去油斑猫七箇去足右為細末米醋打麫糊為丸如桐子大毎服一丸細紗包紅綿繫定剪下来因此立為剪紅丸毎服一丸同後藥服之南木香雷丸荆三稜百部㣲炒廣荗生各半兩貝母檳榔大黄各二兩史君子四十九箇牽牛生半箇右為細末外用皂角肥者一十定搥碎山茵蔯一兩剉苦楝根皮二兩剉水四五碗慢火砂鍋内熬至一小碗以上藥搜和為丸如梧桐子大小兒粟米大晒乾毎服二錢半重各隨後證引子湯送下但服此藥至五更鷄呌服之忌一切腥葷生硬葱蒜油膩之物此方與諸方甚異幸毋忽焉􅀈呷喘急咳嗽煎桑皮湯下取寸白蟲煎石榴湯送下蚘蟲茴蟲沙糖水送下脚氣腫不能行蜜水送下木𤓰湯亦可酒痢酒積百藥煎湯送下大小便不通淡醋湯送下婦人血蠱煎葱白湯送下婦人血脉不行淡醋煎紅花湯送下小兒一切諸證蜜水送下沙糖水亦可腸風下血山梔子煎湯送下食積氣塊諸證亦用温蜜水湯茶湯送下傷飽附論夫小兒傷飽候小兒食不用過飽飽則傷脾脾傷不能磨消食也令小兒四肢沉重身體苦熱面黄腹大是也又小兒食不知飽候小兒有嗜食食已仍不知飽足又不生肌肉其小腹大大便數而多泄亦呼為豁治此腸胃不守故也方檳榔散治小兒傷飽太過脾氣消壅面色赤黄手足俱熱心腹脹悶檳榔枳殻炒㣲黄人參去蘆川大黄各半兩赤茯苓神麯炒㣲黄陳橘皮湯浸去白甘草炙麥蘖各一分右搗粗羅為散毎服一錢以水一小盞入生薑少許葱白二寸煎至五分去滓温服日三四服更量兒大小以意加減服之前胡散治小兒傷飽心腹滯悶不能乳哺前胡檳榔川大黄㣲炒枳殻麩炒去瓤赤茯苓沉香各半兩訶梨勒三分木香甘草各一分右搗粗羅為散毎服一錢以水一小盞入生薑少許煎至五分去滓温服日三四服更量兒大小以意加減赤芍藥丸治小兒傷飽心腹妨悶脇下或痛赤芍藥柴胡去苗赤茯苓訶梨勒皮檳榔各半兩川大黄剉鼈甲各三分桂心木香各一分右為末煉蜜和丸如菉豆大毎服以粥飲下五丸日三四服更量兒大小以意加減大黄丸治少小傷食苦飽卧失衣當風居濕地其為證腹大膨脹時泄困甚如寒熱壯又或如霍亂動作時痢腹出膿血大黄苦參桔梗杏仁芎藭半夏洗黄芩各三分葶藶四分右為末蜜丸如小豆大一丸日進三服白湯下半夏散治小兒吃食太多傷脾即不食吐逆半夏二分生黄葵子防風逺志款冬花桂心前胡乾薑各一兩右並搗為散空心米飲下一錢立效乳母不可服芍藥丸療四五歳兒因食及在胎中宿熱乳母飲食粗惡心苦乳汁不起兒乳不為肌膚心腹痞滿萎黄瘦瘠四肢痿􅂒繚戾服之令充恱芍藥一錢黄耆鼈甲炙人參各四兩柴胡八分茯苓六分甘草乾薑各三分右搗篩蜜丸如豆大毎服五丸日二服忌如常法一方有大黄無黄茋云服一丸一歳以上乳服三丸七歳兒服十丸二服芍藥丸治傷飽羸瘦不生肌肉乳食不化芍藥七分柴胡四分大黄三分桂心一分茯苓乾薑鼈甲各二分右為末蜜丸一歳兒先哺乳吞小豆大三丸日三服木香丸治小兒乳食過度腹中脹滿木香鼈甲醋炙黄牽牛子㣲炒川大黄各半兩赤茯苓一分右搗細羅為末毎服以温漿水調下半錢晚後再服更看兒大小以意増減調胃丸治小兒脾疾腹虚等證丁香半夏各四十九箇巴豆胡椒各四十九箇右為細末棗肉為劑入臼中杵一千五百下為度如粟米大隨湯水送下食後毎服一丸如胸膈不和生薑湯下如脾疾皂子湯下如喘嗽桑白皮湯下治小兒食不知飢飽用鼠屎二七粒燒為末服之普濟方卷三百九十二
