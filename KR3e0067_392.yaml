  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0067_WYG_392-1a, image: WYG0760/WYG0760-0240a.png}
body:
  text: 普濟方卷三百九十二明周王朱橚撰嬰孩癖積脹滿門乳癖附論夫小兒脾胃氣弱保養不慎則令三焦不調乳飲不化聚而成痰流於脅下寒氣乘之遂成癖聚久而不消橫連少腹上至心下按之苦痛肌膚漸瘦面色青黃多睡目澀寒熱往來嘔吐咳嗽故謂之乳癖世呼為妳脾是也小兒乳癖者由乳母食飲無常醉飽過度即乳兒不知樽節小兒脾胃虛嫩不能消化或乳母偏卧一向乳兒不能回轉兒亦睡著母滯偏於脅下因兹結成塊而痛者是也其候面色青黃發渴壯熱吐乳多睡口內生瘡腹脹筋青時或渴飲漸漸黃瘦腹中結塊不散故名乳癖也小兒生下中寒遍身發黃昏睡小便赤黃體微蒸熱此候本因胎熱又因哭不消化遂為妳積所治者先用牛黃散調中飲二藥與服如仍見黃色眼睛直視氣喘魚口手曲拳惡候不治此患先解利後取積次調胃氣無誤矣又云先用惺惺丸次取銀白散調氣方人參丸幼幼新書治小兒乳癖手腳心熱面色青黃不下乳食日漸羸瘦人參去蘆頭生薑切乾炒桂心川大黃銼碎微炒各半兩赤茯苓白术枳殼炒黃去瓤檳榔木香當歸微炒荆三稜微煨銼鱉甲醋炙黃去裙襴右為末煉蜜和丸如菉豆大一歲以粥飲下三丸日三服看兒大小以意加減牽牛丸聖濟總録治小兒妳癖腹脅緊硬時作寒熱白牽牛末二錢粉霜一錢膩粉三錢硇砂研一錢半黃鷹屎末一錢白丁香為末一錢石燕子搗研一錢延胡索大者七枚搗末白麵五錢沒藥研白滑石末各一錢右為細末拌和勻滴水和作餅子先於火上炙乾次入炭火煨熟為度放冷細研更入硫黃一錢同研勻滴水和為丸如菉豆大量兒大小每服三丸至五丸煎栁梅柿湯下臨卧服鱉甲丸聖惠方治小兒乳癖面色黃瘁食乳微少日漸羸瘦鱉甲醋炙黃去裙襴荆三稜微煨銼檳榔各半兩人參去蘆頭赤茯苓白术木香枳殼麵炒微黃去瓤當歸微炒桂心各一分川大黃一兩銼微炒右為末煉蜜和丸如菉豆大每服以粥飲研下三丸日再服以利為度更量兒大小以意加減水銀丸幼幼新書治乳癖積熱發疳水銀結砂一錢硇砂白丁香各半錢腦子輕粉各少許香墨鷹屎巴豆醋煮令乾青黛羅過百草霜黃明膠用蛤粉炒黃色各一錢右為末滴水丸如菉豆大薄荷湯下三五丸量大小加減惺惺丸幼幼新書治小兒虛積及實積乳癖白丁香硃砂各一錢陽起石一分黃鷹屎二錢輕粉一錢麝香少許硇砂一字醋化黃連七分續隨子一百箇去殼出油石燕子五箇醋淬煆七次右為末浸蒸餅丸如黍米大每服三十丸量兒大小加減皂子并蔥白煎湯臨卧服木香丸聖惠方治小兒乳癖不消心腹滿悶木香荆三稜微煨銼檳榔青橘皮浸去白瓤焙人參去蘆頭赤茯苓牽牛子炒草豆䓻去皮各半兩郁李仁一兩浸去皮微炒右為末以醋煮麵糊為丸如麻子大每服以粥飲下三丸量兒大小加減服之硇砂丸聖濟總録治乳癖硇砂礞石粉霜鷹屎無食子荆三稜各用末一錢七分膩粉三字龍腦研一字右同研勻以麵裹煨熟取棗肉和藥丸如菉豆大每服三丸或五丸古老錢湯下量兒大小加減兼治久積次用外貼藥外貼散聖濟總録治乳癖藝薹子末三錢寒食麵一錢半右同研勻用新水調如糊紙上攤貼乳上頻以水潤之聖餅子聖濟總録治虛中挾積并乳癖石燕子末二錢粉霜三錢膩粉硇砂研各二錢白麵四分丹砂研一錢延胡索一分為末鷹屎白研一錢右為末雞子和丸如雞頭作餅子煨灰火內微燒過每服米飲化下半餅子軟金丸幼幼新書治小兒虛積乳癖膩粉二錢蓬砂研皂子大黃連去鬚半錢硇砂研皂子大粉霜半錢黃鷹屎半錢巴豆一枚半生半燒太隂玄精石研半錢右為末再同研勻棗肉和用麵劑裹文武火中煨以麵熟為度去麵取藥旋丸如黃米大每服一二丸甘草薄荷湯下量兒大小加減大黃丸聖濟總録治小兒初生至百日周歲腹內有氣衝心喉及壯熱頭疼嘔逆腹疼寒熱乳癖宜下胎中宿物大黃銼炒一兩丹砂研人參枳殼去瓤麩炒半錢柴胡去苗桂去粗皮各半分木香一分白茯苓去黑皮一分半右為末煉蜜丸如菉豆大每服五丸乳汁下日三服大者加至二十丸大黃丸幼幼新書治小兒乳癖脅下堅硬大便難小便赤川大黃銼碎微炒訶梨勒皮各半兩烏梅肉微炒陳橘皮浸去白瓤焙木香各一分郁李仁浸去皮微炒川朴硝各三分桔梗一分去蘆頭右為末煉蜜和丸如菉豆大一歲兒每服以粥飲研下五丸晚後再服更量兒大小以意加減治嬭癖訶子五箇磨去兩尖密陀僧二錢硫黃輕粉白丁香黑丁香粉霜硼砂各一錢右為末每服半錢男用女兒乳汁化服女用男兒乳汁化下二香散聖濟總録治小兒乳癖密陀僧研硇砂研各三錢硫黃研三錢石燕子一枚搗研白丁香直者四十九枚丁香二十一枚為末膩粉炒二錢匕研右同研勻為細散每服一歲半錢匕二歲一錢匕十歲已上二錢匕用麵湯下如左肋下病卧左邉右肋下病卧右邉至曉取下癖積是驗水銀丸聖濟總録治小兒乳癖脅肋堅硬喘粗時作痛水銀一錢硫黃二錢同研膩粉三錢蜜陀僧二錢搗研硇砂研半錢石燕子搗研二錢巴豆二粒去皮膜心研出油盡右為末研勻白麵糊為丸如黃米太每服三丸煎槐葉湯下乳食後臨卧服更量兒大小加減滴水丸聖濟總録治小兒乳癖黃蘖去粗皮銼輕粉研巴豆十粒去心皮出油盡水銀結砂子半皂子大丹砂研天南星半夏生薑汁浸一宿湯泡去滑焙各一錢右為末再同研勻滴水和丸如菉豆大每服二丸或三丸煎生薑蔥白湯下量兒大小加減服之妙應丸一名應丸治小兒乳癖積聚按之若痛肌膚漸瘦面色黃青方見本門諸癖結脹滿類枳殼丸一名調中丸出幼幼新書治小兒乳癖嘔吐脹滿寒熱枳殼麩炒微黃去瓤木香赤茯苓各半兩人參去蘆頭柴胡去苗各三分桂心一分川大黃一兩銼碎微炒右為末煉蜜和丸如菉豆大每服以溫水化破三丸日三服量兒大小加減治小兒乳癖幼幼新書白丁香黑丁香各二十箇石燕子舶上硫黃寒水石蜜陀僧各三錢膩粉兩箇右為末每服一錢用第二遍米泔水調服即取下病如未下更一服三稜散幼幼新書治小兒乳癖結實不瘥荆三稜炮銼碎赤茯苓當歸洗焙乾鱉甲醋炙黃去裙襴各一兩枳殼麩炒去瓤白术木香各半兩右為細散每服一錢水一盞入生薑七片煎至五分去滓放溫時時與服挨癖丸治乳癖穀癥腹中塊痛代赭石火煆醋淬研十分細青皮去白木香蓬术五靈脂北大黃各三分巴豆壓去油盡一錢右為末醋麵糊為丸麻子大每服二丸食後擦薑泡湯下積氣散聖濟總録治小兒乳癖粉霜研硫黃研各一錢半蜜陀僧研五錢白丁香研二錢荆三稜為末七錢右搗散再研勻每服一錢生薑漿水調下後五更服青靈丸青靈丸聖濟總録治小兒乳癖粉霜丹砂研膩粉各一錢水銀二錢用鉛少許結砂子麝香研半錢青黛二錢巴豆三十粒去皮心膜出盡油研右各細研再同和勻麵為丸如黃米大薄荷湯下五丸至七丸新水亦得三稜散幼幼新書治小兒乳癖結實或有滯惡積不散令兒日漸羸瘦面色萎黃春夏多發不欲食乳荆三稜微煨銼川大黃銼碎微炒檳榔鱉甲醋炙黃去裙襴赤茯苓各半兩枳殼一分麩炒微黃去瓤右為散每服一錢以水一小盞煎五分去滓分為二服日三四服下惡物為效硃砂丸幼幼新書治小兒乳癖壯熱體瘦寒水石龍腦各細研膩粉檳榔末各一錢硃砂半兩細研飛過雄黃細研一錢半右同研令勻煉蜜和丸如菉豆大三二歲兒生薑湯下三丸日再服量兒加減化癖丸幼幼新書治小兒乳癖結塊久不消化巴豆霜半兩膩粉硃砂細研各一錢黃鷹屎一分硇砂雄雀糞各一字右同研如粉用糯米飯和丸如黍米大一歲兒每服空心煎皂莢仁湯下二丸取下惡物為度軟銀丸幼幼新書治小兒乳癖水銀結成砂子白丁香末膩粉各一錢鷹屎末一錢續隨子四十九箇去殼巴豆二十一箇去心膜研略去油右同研勻棗丸如菉豆大一歲一丸溫水下銀白散幼幼新書生胃氣取下後宜服人參茯苓甘草炙白术麩炒白扁豆去皮藿香葉右各等分為末每服一錢紫蘇湯調下如聖散幼幼新書治小兒乳癖發寒熱飢瘦不思飲食日漸黃瘦欲成一切疳硇砂一錢粉霜一字半蜜陀僧半兩大丁香二十一箇白丁香四十箇全者舶上硫黃二錢半右為末每服半錢冷麵湯下日一服正午時見效三歲已上每服半錢三歲已下每服一字一方無大丁香男病女乳女病男乳調後用通膈泄銀粉丸一名木香真珠丸治小兒乳癖潮熱驚涎宿食食作肚痛及治腹脹取虛中積行滯氣方見本門積聚類消堅丸全嬰方治小兒乳癖及下塊嬭消痰退熱膈實取積硇砂輕粉巴豆去油各一錢阿膠炒半兩好墨少許水銀二皂子大結成砂子右為末白飯為丸如小菉豆大三歲三丸皂子泡湯送下食前服一方用倒流水下燒青丸一名煉青丸出幼幼新書治小兒乳癖每至午時作寒熱微有咳嗽脅肋癖硬輕粉二錢太隂玄精研一分粉霜硇砂研各一兩右再同研細水滴和為餅子以文武火燒熟為度再研滴水和丸如黃米大三歲已上每服五丸漿水下三歲已下以意增減或飯飲下錢氏加白丁香真者一字定粉一錢半同研此方至天明取下惡物是效如嬭癖未消盡隔三兩日又一服癖消為度金花散聖濟總録治小兒乳癖神效白丁香真者微炒七十粒丁香十五粒二味為末蜜陀僧研硫黃研黃鷹屎白研各半錢右合研勻每服三歲已下一字三歲已上半錢並用乳汁調臨卧服至來日取下青黑稠粘物即愈未盡再服化癖丸聖濟總録治小兒乳癖肌瘦寒熱脅下硬痛丹砂研生薑切片晒乾為末各二錢巴豆霜一字半硇砂研白滑石研各二錢右同研勻粟米飯和為丸如黃米大每服二丸薄荷湯下嬭食後臨卧服治小兒嬭癖幼幼新書蜜陀僧訶子丁香豆䓻木香各等分右研羅為細末入膩粉少許再研每服一錢半米飲下如不動來日再服立效如神散聖濟總録治小兒乳癖攻脅肋緊痛獨頭蒜一顆研樓蔥一寸研膩粉半錢凌霄花末一錢右同研勻調塗脅肋上硬處用醋麵餅子貼蓋之候口聞蒜氣急用溫湯洗去硫黃散聖濟總録治小兒乳癖硫黃研蜜陀僧别研膩粉研訶梨勒皮為末各一錢右和令勻每服一錢乳汁調下更量兒大小加減又方幼幼新書黑丁香二十箇舶上硫黃半兩白丁香五箇蜜陀僧半兩右為細末如一歲者只一字臨卧服三兩歲者服半錢用乳汁如男兒用左乳汁下女用右乳汁下二丁丸全嬰方治小兒乳癖在於兩脅下或左或右如狗舌之狀令兒面黃腹大潮熱多渴日中咨煎夜間多哭丁香半錢白丁香一兩蜜陀僧輕粉各一錢右為末糊丸如小豆大三歲五丸水下惡物下為效消癖丸聖濟總録治小兒乳癖積塊牽牛子一兩半生半炒皂莢肥者二個燒令煙盡為度巴豆去皮心研出油夏秋半兩春冬一兩右除巴豆外搗末後入巴豆再同研勻用粟米飯丸如菉豆大每服三丸橘皮湯下如常服丸如粟米大茶湯下三丸量兒大小加減又方幼幼新書治小兒乳癖羸瘦危困脅下硬有形寒食麵一錢半汞半錢青礞石末半兩右研令勻以乳汁和分為二十餅子尉汁止以慢火􅏼乾一餅子分為四處為飲食化服四分之一隔日一次服八服取效未能吃得飲食者化如糊舐在口內治小兒嬭癖幼幼新書芫花一兩醋浸三日淨洗大黃半兩為末蒜一斤右研同藥末研爛令勻男左女右用藥塗在乳母手心尉擦癖上時聞患人口中如有藥氣即止立效治嬭癖海上名方丁香二十一粒蜜陀僧生硫黃各半錢右為細末每服半錢大者一錢米飲下隔一宿取黑物效蓬莪荗散聖濟總録治小兒脾胃氣弱乳食