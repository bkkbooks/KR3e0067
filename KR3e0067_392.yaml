痞除熱甘遂甘草炙各二分黄芩大黄各四分右以水二升破鷄子二箇和取白投水中攪令沫上吹去之内藥棗丸合為二服又方㓜㓜新書治小兒患腹中結常壯熱大黄炙煙出鼈甲炙黄茯苓等分右為末蜜丸大豆大飲下日三服量兒加減一方用龜甲鷄子湯肘後方治小兒六七歳心腹堅痞時時寒如瘧服紫丸六十日吐下痞乃堅以此湯一碗去惡物數升遂愈常用之效甘遂七銖甘草炙黄芩各五錢右以水二升鷄子一枚拆開出白投水中熟攪吹去滓内藥煮取一升隨兒大小計可得下合和與之藥無毒下痞未盡更合堅實多者加芒硝細辛半兩大效治小兒痞滿㓜㓜新書用三白草搗絞汁服令人吐逆除胸膈熱疾亦主瘧及小兒痞滿投此草初生無白入夏葉端半白如粉農人候之蒔田三葉草白便秀故謂之三白又方㓜㓜新書除小兒痞滿閃癖用甜藤葉搗傅之積聚附論夫小兒有妳積候但是吐下妳来有臭酸氣此候因兒呌未住母將妳與喫致不消化日久停滯胃冷而至此所治者先用丁香散調胃後下食積牛黄丸取下妳積後下勻氣散補常服健脾散即愈食積候夜間肚㣲作熱或嘔或瀉此因飲食傷飽而更睡至此所治者下食積牛黄丸通下後用勻氣散補常服萬靈丸即愈氣積候面黄白不進食肚㣲病夭矯啼呌此因患諸般氣候久而不安傳歸氣積至此所治者用萬靈丸勻氣散醒脾散健脾散相夾調理即愈脾積候面如土色或滯黄而帶虚連臍下㣲痛肚皮熱飲食減少纔食便言臍上及肚中痛所食不化頭㣲熱此因先食硬物不然冷物所傷在脾所治者先下青金丹取下脾中積後用勻氣散醒脾散萬靈丸即愈虚中積候渾身㣲熱不思飲食日多昏昧抱着時一似睡未覺此候多因端久泄瀉不止而虚得此候所治者先下青金丹通盡肚中積後勻氣醒脾散調理常服萬靈丸保童子丸調理即愈實積候大便不通風毒瘡􅟻喉閉赤顋喉中痰响此因兒子生来飢猛飲食無度至有前件候所治者先用奪命散吐下熱涎後勻氣散醒脾散常服牛黄膏鎮心丸天竺黄散與服即愈小兒積病可醫者凡面上虚腫者是脾之所係脾主身之肌肉故應面故知是脾積其脾係土土無正形故早晚浮腫不定多則早浮其睡則脾不磨上面作腫若病後有此證則是虚中積宜用調脾消積行氣等藥面合地卧是脾積何以合地其受積在脾是冷積何以知之其脾好土故知在脾其冷者屬隂故知傷冷硬食得之宜下食積氣藥兒腹脹其積在肺何以知之其肺主於氣纔當受積其氣不調腹脹滿氣急故知在肺如腹脹先宜調氣後轉轉更宜調氣小便如油其積在心腸何以知之其積受於脾脾當轉心心不受觸則入小腸小腸是心之腑故知在心腸則節其水道小便如米泔油相似也髮黄是積氣傷心心主血脉遍䕃身毛髮被積氣所干則髪黄故知是積傷心宜下空心散及取積藥此人必時復發熱也赤白痢其積在肺受傳大腸及有外傷冷而得何以知之其肺主西方庚辛金其色白後赤則是外邪故知肺傳大腸則為赤白痢也宜取後調氣兩眼黄赤睛青其積在肝何以知之肝主東方甲乙木色青却被積氣所干即黄赤睛青者眼屬五臟肝是其主肺若受積故令眼睛青是肝受積若傳膽其人口苦不要吃宜涼藥退之遍身虚腫其積在臟何以知之為其積曽取後被藥發動即不在臟故出皮膚之間為腫也只宜下取虚中藥積然後補之耳多瀉白糞知受冷積在脾何以知之脾主化受冷積在脾冷滑而瀉白糞故知在脾宜先轉後熱藥補之小兒積病不可醫者六喘急是肺積肺主氣其喘急則肺絶其人當面白全無血色故不可醫也面黑是腎積其人面黑者是腎絶也人當不辨好惡眼直無光只得一日而死也吐熱氣是榮積其不醫者是血絶不可治也血主心心不能管故出熱氣不治耳手脚心生瘡是衛積衛者氣也胃氣不生故手足生瘡若衛絶則氣不囬只得半日也惡心乾嘔是胃積何以不醫胃主化食胃絶則惡吐故不治其人必食乳不化不食亦乾吐嘔面色青黄無血色也瀉久住又瀉是積咬脾爛何以知其脾爛其人當瀉白糞為食不消住了却放糞赤黑而死即知脾爛不可治積病口中氣温面黄白目無精光或白睛多及多睡畏食或大便酸臭者當磨積宜消積丸甚者當白餅子下之以和胃小兒五積為臟氣不行蓄積一處不動故曰積夫心為伏梁在臍上上攻其心下攻胃口脾為痞氣在胃口上横之肝為肥氣在臍之左邉肺為息賁在臍之右畔腎為賁屯在臍下各有變動非食之所成乃氣積也臟屬隂故在一處而不動也小兒有聚謂六腑之氣留聚也腑屬陽陽氣運轉不停故其聚不定一處發兒腹痛積聚之皆候面黄瘦劣嗞咂不生肌肉髮立或肌體浮腫及腹多困多為水氣凡驚中虚積者謂因驚發動是也所下糞青穢凡虚中有積者因傷食而瀉又吐如此漸虚中之積有積而頻頻取轉不着致其積尚伏故亦曰虚中積若驚積取下則糞隨驚青如是實積即糞成塊子凡疳中虚積者因疳病轉瀉虚而疳不退故虚中爾所取下糞裏白色也小兒八種積病多吐多瀉多困多熱是也面腫手脚腫是虚中有積腹脹不思飲食是胃中有積合面吃土炭痢痛大腹中有積面多黑困眼不開脾中有積小便似油脚手腫腎臟中有積渇瀉不止膀胱中有積腹内虚鳴小便赤黄小腸中有積多吐逆不吃食上膈中有積渾身虚腫者脾之有積久取不下號曰虚中積光塌氣候取之肚腫四肢黄色者受水氣須取之水小便如泔肝臟受積此後用取之頭髮黄色者疳勞候欲發此背之積用取之睛黄鼻出水者肺有積乃風疳之候當取之赤白滯痢者此臟腑内久積用取之腸内虚鳴者此氣蟲之候用取之吐逆或日近及氣酸臭可取若已久不可遽取恐作慢脾且調理合地而卧此疳蟲攢心用取之也小兒積病其脉沉實積者小兒忍飡毒食𤓰桃李菓肥滑黏膩之物藴成積聚若小兒肥實宜與葱湯丸取次銀白散補之小兒積病其脉洪大下黑血形瘦行不坐久患積腹急如鼓項軟四肢冷口噤者不食並是死候積有虚有實木香丸虚者少與之實者倍用之小兒消積多用青皮然青皮最能發汗有汗者勿與之凡有積滯須辨虚實虚則補之實則取之古方不問四季令服四味大黄飲子錢氏論小兒當服紫霜丸二者俱不可用况孩兒肥瘦不同長短不同孩兒黑白亦自不同南北方之地不同而又况古今不同豈可一槩而論也大法實者可服進食丸虚肥白者及疳瘦孩兒宜服肥兒丸風積者眼白青孩子壯熱形瘦也疳疾者眼黄肚急大便無禁食積者能食不生肌但腹大耳妳積者乳食過多少時必哭多即嘔吐壯熱是也驚積者大便青眼亦青夜啼宜用妙香丸取大抵取積之法只用巴豆膩粉藥或宣取藥皆可量兒虚實大小壯者一歳五六丸虚者三四丸用鷄子一枚筯頭扎一竅入藥於内塞之煑熟空心連藥與兒吃盡良久取下積臭穢之物只白粥補之此余嘗用取積之藥却以鷄子引入於脾其積取盡子至温補之食大能温益脾産婦吃此可謂良也藥取而食補也方五精丸治一切食積乳積痢此藥内有温胃補脾理氣之劑不損胃氣有積則痢積去則止凡治積痢先服之以去其積縮砂仁五錢木香二錢丁香二錢肉豆䓻三箇麫煨大麯餅生三稜煨莪术煨白茯苓去皮各三分膩粉二錢炒人參去蘆頭白术代赭石火燒醋淬各三錢白薑炮二錢麥芽三錢生百草霜一錢炒巴豆三錢去殻紙搥去油右除巴豆膩粉另研餘味各製為細末再入巴豆百草霜拌勻搗飯為丸大小隨意空心白湯吞下五更服如取積未動早晨再一服乳飯放遲温食免藥食相忤吐逆惡心如止痢食白粥即止湯氏方取虚中積以熟鷄子黄和丸在内與兒食之葢藥取積而食補消積飲治脾胃虚冷不能消化乳食致成積痢及治冷氣疝虚瘧虚積吐利常服調脾進食縮砂仁五錢陳皮去白三錢良薑油炒二錢丁香粉草炙各三錢茴香炒三錢香附子炒去毛麥芽生三稜炮蒼术米泔浸各三錢莪术炮厚朴薑汁炒青皮炒去瓤枳殻煨搥油大麯餅生各三錢右為細末米湯調入燒塩空心服或冬𤓰仁湯下虚中積米湯調下五積丸磨化積滯將巴豆去殻炒藥料仍去巴豆久癖用硇砂厚朴治冷氣加白薑治疝木饅茴香湯入生鹽下消積丸白薑炮肉豆䓻麫裹煨一兩枳殻炮去油三稜炮莪术炮薑黄炮蓽澄茄各五錢百草霜㣲炒陳皮去白粉草炙大黄餅生各三錢巴豆五十粒去油杏仁五十粒去皮尖青油半兩右除巴杏另研外餘為細末如巴杏均勻以清油鎔蠟化開入藥末搗千百杵令勻作一蠟櫃丸合收臨用旋丸空心薑湯下一云凡用蠟丸取其入於腸臟消化積也百當膏治一切積聚心腹疼痛年月深久者皆治之百歳至一歳皆可服丹砂研膩粉黄蠟各半兩水銀陽起石研粉霜研蠍稍炒末鉛同水銀炒結成砂子牛黄鉛霜研龍腦各二錢巴豆肥者二十粒去皮心膜研出油取霜半夏一錢湯浸七次搗羅為細末右件令研極勻鎔蠟并熟蜜少許同和成膏旋如桐子小兒如黍米大毎服三丸至五丸量大小虚實加減吐逆藿香湯下取熱積生薑蜜水下取冷積乳香湯下風涎薄荷湯下便利米湯下磨積丸瑞竹堂治疳積泄瀉荆三稜蓬莪术陳皮青皮神麯麥芽欝金胡黄連雷丸白者史君子肉蘆薈已上各等分香附同三稜莪术青皮陳皮五件一處好米醋煮一晝夜焙乾用右為細末米醋為丸如菉豆大毎服三十丸糯米湯下虚弱加木香虛極加附子疳極加癩蚵蚾肉蘆薈丸㓜㓜新書治驚疳積滯或渇或瀉或熱蘆薈一錢先分二鉢内研史君子不出皮殻蕪荑半錢去皮取仁檳榔一箇胡黄連沉香木香各一錢麝香少許龍膽草硃砂各半錢夜明砂二錢右焙乾末用醋膽丸如桐子大毎服十粒米飲下常服妙龍虎丹㓜㓜新書療虚中積泄痢腹痛後重硃砂膩粉炒粉霜炒礞砂白丁香枯礬炒各一錢定粉炒二錢黄丹硝石硇砂各炒半錢右研勻蒸餅水浸和丸如櫻桃大大人毎服二丸小兒一丸米飲下調中檳榔丸聖濟總録治小兒食疳長肌膚益顔色化宿食治腹脹破積聚和氣檳榔丹砂研阿魏麺裹煨熟代赭石乳香研木香五靈脂炒肉豆䓻巴豆去皮心膜出油盡半兩蟾頭一枚炙焦右研勻細麫和丸如黍米大毎服二丸生薑湯下更量兒大小加減一方有麝香妙香丸治小兒虚中積潮發寒熱心腹脹滿疼痛辰砂一兩牛黄生龍腦麝香各一分金箔十四片粉霜膩粉各一錢蠟二兩巴豆一百二十箇肥者右丸如彈子大量虚實加減龍腦漿水下夜半後服臟虚即以龍腦米飲下毎服三丸如小豆大欲藥勢緩即按令扁疾堅者加至十丸皆以針作數孔以行藥力小兒取積如菉豆大治小兒吐逆尤效此藥最下胸中煩及虚積紫霜丸㓜㓜新書治消渇去積代赭石木香煨乳香肉桂杏仁去皮尖丁香各一錢陳皮一錢半去白肉豆䓻一箇炮右為末煮麫糊丸如菉豆大毎服七丸飯飲下惺惺丸㓜㓜新書治小兒疳勞黄瘦虚中伏積久患赤白痢但是虚中伏積宜用此藥陽起石輕粉粉霜黄鷹條白丁香各一錢硃砂一錢半硇砂一錢水銀砂一錢石燕一箇火煨五次浸淬五度右為細末湯浸蒸餅為丸如梧子大毎服七丸至十五丸用火煆皂角葱白湯下非時服不動臟腑蠟丸子㓜㓜新書治一切積滯瀉痢或累經取轉氣已虚為病未去者大人小兒並宜服之硇砂粉霜辰砂並研膩粉各一分川烏頭去皮生用一兩半取細末青橘皮去白取末一兩黑牽牛取粉一兩巴豆肥者一兩去心膜用鹽四兩同炒乾至紫色去鹽不用又生巴豆去皮乾稱一分去心膜與炒熟巴豆同研極細入前件衆藥末再同研勻右藥末毎一兩用黄蠟二兩先消作汁次投藥末攪令極勻放