  - {type: page-break, offset: 0, content: '', id: KR3e0067_WYG_392-1a, image: WYG0760/WYG0760-0240a.png}
body:
  text: 普濟方卷三百九十二明周王朱橚撰嬰孩癖積脹滿門乳癖附論夫小兒脾胃氣弱保養不慎則令三焦不調乳飲不化聚而成痰流於脇下寒氣乘之遂成癖聚久而不消横連少腹上至心下按之苦痛肌膚漸瘦面色青黄多睡目澁寒熱往来嘔吐欬嗽故謂之乳癖世呼為妳脾是也小兒乳癖者由乳母食飲無常醉飽過度即乳兒不知樽節小兒脾胃虚嫩不能消化或乳母偏卧一向乳兒不能廻轉兒亦睡着母滯偏於脇下因兹結成塊而痛者是也其候面色青黄發渇壯熱吐乳多睡口内生瘡腹脹筋青時或渇飲漸漸黄瘦腹中結塊不散故名乳癖也小兒生下中寒遍身發黄昏睡小便赤黄體㣲蒸熱此候本因胎熱又因哭不消化遂為妳積所治者先用牛黄散調中飲二藥與服如仍見黄色眼睛直視氣喘魚口手曲拳惡候不治此患先觧利後取積次調胃氣無悞矣又云先用惺惺丸次取銀白散調氣方人參丸㓜㓜新書治小兒乳癖手脚心熱面色青黄不下乳食日漸羸瘦人參去蘆頭生薑切乾炒桂心川大黄剉碎㣲炒各半兩赤茯苓白术枳殻炒黄去瓤檳榔木香當歸㣲炒荆三稜㣲煨剉鼈甲醋炙黄去裙襴右為末煉蜜和丸如菉豆大一歳以粥飲下三丸日三服看兒大小以意加減牽牛丸聖濟總録治小兒妳癖腹脇𦂳硬時作寒熱白牽牛末二錢粉霜一錢膩粉三錢硇砂研一錢半黄鷹屎末一錢白丁香為末一錢石燕子搗研一錢延胡索大者七枚搗末白麫五錢沒藥研白滑石末各一錢右為細末拌和勻滴水和作餅子先於火上炙乾次入炭火煨熟為度放冷細研更入硫黄一錢同研勻滴水和為丸如菉豆大量兒大小毎服三丸至五丸煎栁梅柿湯下臨卧服鼈甲丸聖恵方治小兒乳癖面色黄瘁食乳㣲少日漸羸瘦鼈甲醋炙黄去裙襴荆三稜㣲煨剉檳榔各半兩人參去蘆頭赤茯苓白术木香枳殻麫炒㣲黄去瓤當歸㣲炒桂心各一分川大黄一兩剉㣲炒右為末煉蜜和丸如菉豆大毎服以粥飲研下三丸日再服以利為度更量兒大小以意加減水銀丸㓜㓜新書治乳癖積熱發疳水銀結砂一錢硇砂白丁香各半錢腦子輕粉各少許香墨鷹屎巴豆醋煮令乾青黛羅過百草霜黄明膠用蛤粉炒黄色各一錢右為末滴水丸如菉豆大薄荷湯下三五丸量大小加減惺惺丸㓜㓜新書治小兒虚積及實積乳癖白丁香硃砂各一錢陽起石一分黄鷹屎二錢輕粉一錢麝香少許硇砂一字醋化黄連七分續隨子一百箇去殻出油石燕子五箇醋淬煆七次右為末浸蒸餅丸如黍米大毎服三十丸量兒大小加減皂子并葱白煎湯臨卧服木香丸聖恵方治小兒乳癖不消心腹滿悶木香荆三稜㣲煨剉檳榔青橘皮浸去白瓤焙人參去蘆頭赤茯苓牽牛子炒草豆䓻去皮各半兩郁李仁一兩浸去皮㣲炒右為末以醋煮麫糊為丸如麻子大毎服以粥飲下三丸量兒大小加減服之硇砂丸聖濟總録治乳癖硇砂礞石粉霜鷹屎無食子荆三稜各用末一錢七分膩粉三字龍腦研一字右同研勻以麫裹煨熟取棗肉和藥丸如菉豆大毎服三丸或五丸古老錢湯下量兒大小加減兼治久積次用外貼藥外貼散聖濟總録治乳癖芸薹子末三錢寒食麫一錢半右同研勻用新水調如糊紙上攤貼乳上頻以水潤之聖餅子聖濟總録治虚中挾積并乳癖石燕子末二錢粉霜三錢膩粉硇砂研各二錢白麫四分丹砂研一錢延胡索一分為末鷹屎白研一錢右為末鷄子和丸如鷄頭作餅子煨灰火内㣲燒過毎服米飲化下半餅子輭金丸㓜㓜新書治小兒虚積乳癖膩粉二錢蓬砂研皂子大黄連去鬚半錢硇砂研皂子大粉霜半錢黄鷹屎半錢巴豆一枚半生半燒太隂𤣥精石研半錢右為末再同研勻棗肉和用麫劑裹文武火中煨以麫熟為度去麫取藥旋丸如黄米大毎服一二丸甘草薄荷湯下量兒大小加減大黄丸聖濟總録治小兒初生至百日週歳腹内有氣衝心喉及壯熱頭疼嘔逆腹疼寒熱乳癖宜下胎中宿物大黄剉炒一兩丹砂研人參枳殻去瓤麩炒半錢柴胡去苗桂去粗皮各半分木香一分白茯苓去黒皮一分半右為末煉蜜丸如菉豆大毎服五丸乳汁下日三服大者加至二十丸大黄丸㓜㓜新書治小兒乳癖脇下堅硬大便難小便赤川大黄剉碎㣲炒訶梨勒皮各半兩烏梅肉㣲炒陳橘皮浸去白瓤焙木香各一分郁李仁浸去皮㣲炒川朴硝各三分桔梗一分去蘆頭右為末煉蜜和丸如菉豆大一歳兒毎服以粥飲研下五丸晚後再服更量兒大小以意加減治嬭癖訶子五箇磨去兩尖宻陀僧二錢硫黄輕粉白丁香黑丁香粉霜硼砂各一錢右為末毎服半錢男用女兒乳汁化服女用男兒乳汁化下二香散聖濟總録治小兒乳癖宻陀僧研硇砂研各三錢硫黄研三錢石燕子一枚搗研白丁香直者四十九枚丁香二十一枚為末膩粉炒二錢匕研右同研勻為細散毎服一歳半錢匕二歳一錢匕十歳已上二錢匕用麫湯下如左肋下病卧左邉右肋下病卧右邉至曉取下癖積是驗水銀丸聖濟總録治小兒乳癖脇肋堅硬喘麄時作痛水銀一錢硫黄二錢同研膩粉三錢蜜陀僧二錢搗研硇砂研半錢石燕子搗研二錢巴豆二粒去皮膜心研出油盡右為末研勻白麫糊為丸如黄米太毎服三丸煎槐葉湯下乳食後臨卧服更量兒大小加減滴水丸聖濟總録治小兒乳癖黄蘖去粗皮剉輕粉研巴豆十粒去心皮出油盡水銀結砂子半皂子大丹砂研天南星半夏生薑汁浸一宿湯泡去滑焙各一錢右為末再同研勻滴水和丸如菉豆大毎服二丸或三丸煎生薑葱白湯下量兒大小加減服之妙應丸一名應丸治小兒乳癖積聚按之若痛肌膚漸瘦面色黄青方見本門諸癖結脹滿類枳殻丸一名調中丸出㓜㓜新書治小兒乳癖嘔吐脹滿寒熱枳殻麩炒㣲黄去瓤木香赤茯苓各半兩人參去蘆頭柴胡去苗各三分桂心一分川大黄一兩剉碎㣲炒右為末煉蜜和丸如菉豆大毎服以温水化破三丸日三服量兒大小加減治小兒乳癖㓜㓜新書白丁香黑丁香各二十箇石燕子舶上硫黄寒水石蜜陀僧各三錢膩粉兩箇右為末毎服一錢用第二遍米泔水調服即取下病如未下更一服三稜散㓜㓜新書治小兒乳癖結實不瘥荆三稜炮剉碎赤茯苓當歸洗焙乾鼈甲醋炙黄去裙襴各一兩枳殻麩炒去瓤白术木香各半兩右為細散毎服一錢水一盞入生薑七片煎至五分去滓放温時時與服挨癖丸治乳癖穀癥腹中塊痛代赭石火煆醋淬研十分細青皮去白木香蓬术五靈脂北大黄各三分巴豆壓去油盡一錢右為末醋麫糊為丸麻子大毎服二丸食後擦薑泡湯下積氣散聖濟總録治小兒乳癖粉霜研硫黄研各一錢半蜜陀僧研五錢白丁香研二錢荆三稜為末七錢右搗散再研勻毎服一錢生薑漿水調下後五更服青靈丸青靈丸聖濟總録治小兒乳癖粉霜丹砂研膩粉各一錢水銀二錢用鉛少許結砂子麝香研半錢青黛二錢巴豆三十粒去皮心膜出盡油研右各細研再同和勻麫為丸如黄米大薄荷湯下五丸至七丸新水亦得三稜散㓜㓜新書治小兒乳癖結實或有滯惡積不散令兒日漸羸瘦面色萎黄春夏多發不欲食乳荆三稜㣲煨剉川大黄剉碎㣲炒檳榔鼈甲醋炙黄去裙襴赤茯苓各半兩枳殻一分麩炒㣲黄去瓤右為散毎服一錢以水一小盞煎五分去滓分為二服日三四服下惡物為效硃砂丸㓜㓜新書治小兒乳癖壯熱體瘦寒水石龍腦各細研膩粉檳榔末各一錢硃砂半兩細研飛過雄黄細研一錢半右同研令勻煉蜜和丸如菉豆大三二歳兒生薑湯下三丸日再服量兒加減化癖丸㓜㓜新書治小兒乳癖結塊久不消化巴豆霜半兩膩粉硃砂細研各一錢黄鷹屎一分硇砂雄雀糞各一字右同研如粉用糯米飯和丸如黍米大一歳兒毎服空心煎皂莢仁湯下二丸取下惡物為度軟銀丸㓜㓜新書治小兒乳癖水銀結成砂子白丁香末膩粉各一錢鷹屎末一錢續隨子四十九箇去殻巴豆二十一箇去心膜研畧去油右同研勻棗丸如菉豆大一歳一丸温水下銀白散㓜㓜新書生胃氣取下後宜服人參茯苓甘草炙白术麩炒白扁豆去皮藿香葉右各等分為末毎服一錢紫蘇湯調下如聖散㓜㓜新書治小兒乳癖發寒熱飢瘦不思飲食日漸黄瘦欲成一切疳硇砂一錢粉霜一字半蜜陀僧半兩大丁香二十一箇白丁香四十箇全者舶上硫黄二錢半右為末毎服半錢冷麫湯下日一服正午時見效三歳已上毎服半錢三歳已下毎服一字一方無大丁香男病女乳女病男乳調後用通膈泄銀粉丸一名木香真珠丸治小兒乳癖潮熱驚涎宿食食作肚痛及治腹脹取虚中積行滯氣方見本門積聚類消堅丸全嬰方治小兒乳癖及下塊嬭消痰退熱膈實取積硇砂輕粉巴豆去油各一錢阿膠炒半兩好墨少許水銀二皂子大結成砂子右為末白飯為丸如小菉豆大三歳三丸皂子泡湯送下食前服一方用倒流水下燒青丸一名煉青丸出㓜㓜新書治小兒乳癖毎至午時作寒熱㣲有咳嗽脇肋癖硬輕粉二錢太隂𤣥精研一分粉霜硇砂研各一兩右再同研細水滴和為餅子以文武火燒熟為度再研滴水和丸如黄米大三歳已上毎服五丸漿水下三歳已下以意増減或飯飲下錢氏加白丁香真者一字定粉一錢半同研此方至天明取下惡物是效如嬭癖未消盡隔三兩日又一服癖消為度金花散聖濟總録治小兒乳癖神效白丁香真者㣲炒七十粒丁香十五粒二味為末蜜陀僧研硫黄研黄鷹屎白研各半錢右合研勻毎服三歳已下一字三歳已上半錢並用乳汁調臨卧服至来日取下青黑稠粘物即愈未盡再服化癖丸聖濟總録治小兒乳癖肌瘦寒熱脇下硬痛丹砂研生薑切片晒乾為末各二錢巴豆霜一字半硇砂研白滑石研各二錢右同研勻粟米飯和為丸如黄米大毎服二丸薄荷湯下嬭食後臨卧服治小兒嬭癖㓜㓜新書蜜陀僧訶子丁香荳䓻木香各等分右研羅為細末入膩粉少許再研毎服一錢半米飲下如不動来日再服立效如神散聖濟總録治小兒乳癖攻脇肋𦂳痛獨頭蒜一顆研樓葱一寸研膩粉半錢凌霄花末一錢右同研勻調塗脇肋上硬處用醋麫餅子貼盖之候口聞蒜氣急用温湯洗去硫黄散聖濟總録治小兒乳癖硫黄研蜜陀僧别研膩粉研訶梨勒皮為末各一錢右和令勻毎服一錢乳汁調下更量兒大小加減又方㓜㓜新書黒丁香二十箇舶上硫黄半兩白丁香五箇蜜陀僧半兩右為細末如一歳者只一字臨卧服三兩歳者服半錢用乳汁如男兒用左乳汁下女用右乳汁下二丁丸全嬰方治小兒乳癖在於兩脇下或左或右如狗舌之狀令兒面黄腹大潮熱多渇日中嗞煎夜間多哭丁香半錢白丁香一兩蜜陀僧輕粉各一錢右為末糊丸如小豆大三歳五丸水下惡物下為效消癖丸聖濟總録治小兒乳癖積塊牽牛子一兩半生半炒皂莢肥者二個燒令煙盡為度巴豆去皮心研出油夏秋半兩春冬一兩右除巴豆外搗末後入巴豆再同研勻用粟米飯丸如菉豆大毎服三丸橘皮湯下如常服丸如粟米大茶湯下三丸量兒大小加減又方㓜㓜新書治小兒乳癖羸瘦危困脇下硬有形寒食麫一錢半汞半錢青礞石末半兩右研令勻以乳汁和分為二十餅子熨汁止以慢火􅏼乾一餅子分為四處為飲食化服四分之一隔日一次服八服取效未能吃得飲食者化如糊䑛在口内治小兒嬭癖㓜㓜新書芫花一兩醋浸三日净洗大黄半兩為末蒜一斤右研同藥末研爛令勻男左女右用藥塗在乳母手心熨擦癖上時聞患人口中如有藥氣即止立效治嬭癖海上名方丁香二十一粒蜜陀僧生硫黄各半錢右為細末毎服半錢大者一錢米飲下隔一宿取黑物效蓬莪荗散聖濟總録治小兒脾胃氣弱乳食