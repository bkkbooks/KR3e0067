body:
  text: 普濟方卷二百九十八明周王朱橚撰痔漏門牡痔附論夫內經謂飲食自倍腸胃乃腸因而飽筋脈橫解腸澼為痔蓋飽甚則腸胃滿腸胃滿則筋脈橫解故澼而為痔其狀肛邉生鼠乳或癢或痛膿血時下謂之牡痔聖惠云痔肛邉生鼠乳者人臟腑空虛內有積熱不得宣泄流傳大腸之間結聚所成也此皆下元虛冷腎臟勞傷及風邪毒熱在內不散藴蓄日久因兹生疾亦由飲食不節醉飽無度恣食雞肉豬久坐濕地情欲盻著久忍大便是隂陽不和關格壅塞風熱滯氣下衝肛腸故令腸頭生肉如鼠乳或似櫻桃或如大豆時時下血往往出膿亦曰牡痔也方皂莢丸出聖惠方治痔肛邉生鼠乳及大腸疼痛坐卧不得皂莢十梃不蚛肥長一尺者湯浸去皮塗酥炙令黃焦去子黃耆一兩銼枳殼一兩麩炒微黃麝香五錢細研入當歸一兩微銼桂心一兩槐耳一兩微炙槐子一兩微炒附子二兩炮製去皮臍白礬二兩五錢燒灰蝟皮一兩炙令焦黃烏蛇二兩酒浸去皮骨炙令微黃檳榔一兩鱉甲一兩塗醋炙令黃去裙襴川大黃一兩銼碎微炒右為末煉蜜丸和搗五七百杵丸如梧桐子大每日空心及晚食前以溫粥飲下三十丸鱉甲丸出聖濟總録治牡痔肛邉生肉如鼠乳時出膿血鱉甲去裙襴醋炙生乾地黃焙黃連去鬚連翹蝟皮炙焦續斷銼附子炮製去臍槐實炒白礬熬令汁枯各一兩蠐螬炙五枚栝樓去皮黃耆乾薑炮各三分右為細末煉蜜丸梧桐子大每服二十丸食前早晚米飲下取瘥為度治痔有乳結核作渴疼痛風盛熱實一名槐角子丸出本事方皂角醋炙黃耆荆芥川山甲灰炒木香露蜂房蝟皮鱉甲醋炙桔梗芍藥各二錢五分大黃五錢右為細末煉蜜為丸梧桐子大每服三十丸溫湯下食前日三服一方加槐子蝟皮丸出聖濟總録治牡肛邉生鼠乳疼痛寒熱兼痔腸漏蝟皮炙焦槐木耳炙附子炮製去皮臍當歸銼炒赤芍藥桑根白皮銼白礬灰楮根白皮銼各一兩右為末煉蜜丸梧桐子大每服三十丸食前粥飲下雷圓丸一名鶴虱丸治牡痔生鼠乳瘡方見本門痔瘻類槐子丸出聖濟總録治牡痔因醉飽筋脈橫解腸澼成痔每下鮮血槐實微炒三兩蝟皮炙焦當歸切焙附子炮製去皮臍連翹乾薑炮續斷黃耆右為末煉蜜丸梧桐子大每服十五丸空心米飲下日晚再服稍加至三十丸槐白皮膏出千金方治痔疾下部癢痛肛邉肉結如鼠乳腫硬疼痛宜用方見本門諸痔類槐皮膏一方有木鱉仁煮白丸一名玉屑丸治痔疾有頭生於肛邉如鼠乳及生瘡痛癢不止乳下膿血冷疼後重方見大腸門腸風下血類出聖惠方菩薩草三分黃連五分去鬚黃蘗三分銼膩粉一錢白礬五錢燒灰地龍三分微炒麝香三分銼右搗細末入膩粉麝香和勻先以鹽漿水洗痔後以散傳之日三四度用枳殼丸出聖濟總録治牡痔肛邉生鼠乳出膿血枳殼去瓤麩炒防風酒浸一宿去火焙槐花麩炒荆芥穗薄荷甘草炙各五錢右為細末煉蜜丸梧桐子大每服二十丸米飲下不拘時一日三服乳香散出王氏博濟方治牡痔生瘡乳香豬牙皂莢銼鯪鯉甲各二兩箬葉去頭粗鞭四兩銼黃牛角尖長二寸者一對銼蛇蛻一條頭尾全者右入在砂罐子內蓋口泥鹽固濟曬乾用十二斤炭火煆候碧煙出去火放冷取出細研每服二錢七分胡桃一箇取肉細研拌藥空心酒調下喫五服見效天靈膏出聖濟總録治牡痔有頭疼楚不可忍或有瘡漏濕天靈蓋酥炙熏陸香各五錢葵根五錢李根蔥根各一分細研麝香一錢研右為末豬脂或膠水調和如膏攤故紙上貼之一日三易瘥䔧盧膏出聖惠方治痔疾肛邉生鼠乳䔧盧五錢去蘆頭川大黃五錢銼碎黃連五錢去鬚銼楝子十四枚搗碎巴豆三枚去皮心研桃仁十四枚湯浸去皮尖雙仁右以豬脂五合煎二三十沸綿濾去滓放冷以塗痔上當歸餅出聖惠方治牡痔有頭痛楚不可忍當歸四兩杏仁去皮尖雙仁研五錢白芷桂心去粗皮各三兩雲臺子研二兩右三味為末與杏仁雲臺子和勻以醋麵調捻作餅子似錢大坐之藥乾頻以易差可度治大腸久積風毒痔下血不止肛邉生鼠乳疼痛久不瘥出惠良方蝦蟇一枚櫸樹上菌子一箇鰻鯉魚頭一兩黃牛角腮一兩葫荽子一合右為細末水煎白膠香和丸如彈子大於瓶內如燒香法一丸熏下部差石榴散出聖惠總録治牡痔肛邉生鼠乳醋石榴一枚大者黃連宣州者去鬚白礬熬各一兩穀精草五錢炒焦右先石榴割下蓋子去裏面子三分取出一分次將黃連白礬同拍碎入在石榴內却用蓋子掩定濕紙裹膠泥固濟炭火煆赤候冷去泥與榖精草同研極碎入麝香一錢七分空心熱酒調下荆槐散出聖濟總録治鼠乳痔便血疼痛不可忍者荆芥穗槐花炒枳殼麩炒去穰黃連銼各等分右為細末每服二錢七分米飲調下不拘時穿山甲散出直指方治痔肛邉生鼠乳或成瘡痛楚穿山甲㨂取後假尾根盡處一兩炙焦存性鱉甲半兩酒炙挫麝香五分細研右為末每服一錢五分用臘茶半匙夾和沸湯調下防風煎湯調下亦得留滓塗痔又方單用山甲一方無鱉甲黃耆湯下大豆帛方治痔下部癢痛肛邉生鼠乳腫脹突出方見本門脈痔類棗白皮散治牡痔有頭者或出似雞頭狀漸作瘡有惡物不化棗白皮二兩細切酥五錢鯪鯉甲散治牡痔肛邉生鼠乳成瘡痛甚方見本門痔瘻類鱉甲散出聖惠方治牡痔肛邉生鼠乳氣壅疼痛鱉甲去裙襴醋炙三兩檳榔銼二兩右為細末每服二錢七分食前粥飲調下蔥桃湯出聖濟總録蔥根桃葉各一握右切搗以水三升煎數沸去滓入盆內乘洗日三兩度豬蹄灰丸治牡痔生鼠乳肛門癢痛難忍有膿血出不絶豬懸蹄殼熖火上燒灰研一兩水銀三大豆許右先取水銀用蒸棗二枚二次入蹄殼灰和為丸雞頭實大先以鹽湯洗下部內一丸夜卧時再用以差為度礬香膏出聖濟總録治壯痔出膿血疼痛不可忍白礬五錢木香炮搗灰一分右用雞子白調成膏傳之槐子丸出聖惠方治痔疾鼠乳生肛邉煩熱疼痛槐子仁一兩微炒黃芩一兩右為細末水浸蒸餅和丸如梧桐子大每食煎桑葉湯下二十丸虎骨膏出聖惠方治痔疾肛邉生鼠乳癢痛不可忍虎頭骨一兩炙令黃犀角屑一兩右為細末以豬蹄和為膏塗痔上日三五度用之馬蹄灰方出聖濟總録治牡痔􅉶蟲右用馬蹄一兩燒灰研細末以豬脂調塗紙上內下部中日三五易即差治鼠乳痔出肘後方右用蒲黃末空心酒下方寸七日三服一方粥飲下一錢治鼠妳痔右用牛腮燒作灰空心酒服方寸七治痔疾肛邉生鼠乳癢痛不可忍者出聖惠方右用大鯉魚腸三條炙令香以紙裹一條更互尉下部中一炊久蟲當自出又方出聖惠方右用豬牙皂角莢一兩去皮炙令黃搗羅為末以豬脂和丸如棗核大上以赤錫裹一丸內入榖道當下積滯惡血有頭者自消矣又方出聖惠方右用蜘蛛絲纒繫痔鼠乳頭不覺自落赤小豆散治牡痔生鼠乳膿血出赤小豆一兩黃耆銼牡蠣粉赤芍藥白斂黃芩去黑心桂去粗皮附子炮製去皮臍各五錢右羅為散每服三錢七分食前粥飲調下久者溫酒調下牝痔附論夫牝痔者由大腸久虛為風熱留滯腸胃否澀津液不流邪熱之氣上攻肺臟下注肛腸不能宣散故成斯疾也此皆恣食生冷飲酒過度酒食之毒停滯臟腑傳流腸間故令下血生瘡腫疼故名牝痔也又名酒痔也方檳榔散出聖惠方治風氣稽留下部結成牝痔生瘡下血腫痛檳榔銼炒瞿麥穗澤㵼酒浸防風甜葶藶鬲紙炒各五錢藁本去苗土滑石椎碎各五錢木香芫花醋浸炒焦各一兩乾漆炒令煙半分陳橘皮湯浸去白炒郁李仁各五錢去皮右為細散每服一錢匕溫酒調下不拘時日三地榆散出直指方治痔生瘡腫痛地榆黃耆枳殼檳榔川芎黃芩赤芍藥槐花羌活各五錢白斂蜂房炒焦甘草各一兩炙右銼每服三錢水一盞半新米一撮煎服榼藤散出聖惠方治痔下血不止生瘡痛腫榼藤子一兩取仁槐子一合微炒龜甲一兩塗醋炙黃當歸三分銼微炒黃耆一兩銼川大黃一兩銼碎微炒露蜂房三錢微炒蛇脫皮一兩燒灰藁本五錢桂心五錢豬後懸蹄甲七枚炙令焦黃右為細末每於食前以粥飲下二錢鱉甲散出聖惠方治痔下部生瘡腫下血不絶肚痛不止鱉甲一兩塗醋炙令黃去裙襴黃耆一兩銼枳殼一兩五錢麩炒微黃去瓤當歸一兩銼微黃桔梗三分微炒去蘆頭赤芍藥三分槐子二兩微炒桑皮一兩微炒生薑屑五錢焙乾右為細末每於食前以粥飲調下二錢黃耆散出聖惠方治痔下部生瘡腫毒膿血不止黃耆二兩銼赤小豆一兩炒熟附子炮製一兩去皮臍白斂一兩桂心一兩赤芍藥三分槐木耳一兩微炒枳實一兩炒微黃黃芩三分右為細末每於食前以溫粥調下二錢大黃散出聖惠方治酒痔下血如肝肛邊生瘡疼痛因醉飽氣壅即發川大黃一兩銼碎微炒枳殼一兩麩炒微黃去瓤甘草五錢炙微赤銼生乾地黃一兩桑根白皮一兩黃耆一兩銼羚羊角屑一兩當歸一兩赤小豆花一兩右為散每服四錢水一鍾煎至六分去滓不拘時溫服黃耆丸出聖惠方治酒痔風熱壅滯大腸下血疼痛黃耆一兩銼蒺䔧子三分微炒去刺蝟皮一兩炙令黃枳殼二兩麩炒微黃去穰檳榔一兩烏蛻二兩酒浸去骨炙微黃川大黃三分銼碎微炒大麻仁一兩皂角莢子仁五錢炒黃右為細末煉蜜丸梧桐子大每服食前桑根白皮湯下三十五丸赤小豆散出聖惠方治酒痔大腸中久積熱毒下血疼痛赤小豆一兩炒熱黃耆一兩銼白斂五錢桂心五錢赤芍藥五錢黃芩三分生地黃一兩當歸三分銼微炒右為細末每於食前以槐子仁湯調下二錢露蜂房煎出聖濟總録露蜂房槐皮各三兩棟實五十枚桃仁去皮尖雙仁五十枚白芷二兩豬脂一斤赤小豆搗碎一兩右除豬脂外銼碎以醋拌一宿先熬脂令沸下調藥煎候芷赤黑色紙絞銼碎去滓磁瓦盒盛空心溫酒調下一杯許晚再服再以紙裹似棗核大內下部中日二換即差地榆湯出聖惠方地榆銼黃耆細銼枳殼去穰麩炒檳榔銼當歸切焙黃芩去黑心赤芍藥各一兩右為粗末散每服四錢七分水一鍾食前去滓溫服艾葉散治痔下血方見本門諸痔類葛根湯出直指方治酒痔白乾葛枳殼炒半夏製茯苓生乾地黃杏仁各五錢黃芩甘草炙各一分右銼碎每服三錢黑豆百粒薑五片白梅一箇煎服黃耆散出聖惠方治酒痔肛腸痛下血不止黃耆一兩銼赤芍藥枳殼一兩麩炒黃去瓤當歸一兩銼炒微黃槐子仁一兩微炒黃桑雞一兩煆炙白蛇一兩酒浸去皮骨塗醋炙令黃色右為末每於食前煎黃耆湯調下二錢黃耆丸治牝痔下血下及治血痔黃耆細銼枳實去穰麩炒各三兩烏蛇酒浸炙去皮骨當歸切焙蝟皮炙焦赤石脂各二兩右細末煉蜜丸梧桐子大每服二十丸空心酒下日二蝸牛散出聖惠方治痔生瘡腫痛下血不止蝸牛五枚炙令黃蠐螬三枚炙令黃螻蟈三枚炙令黃赤石脂一分白龍骨一分麝香細研一分右為細末每服食前用粥飲調下一錢椿根散出聖惠方治牝痔下血不止疼痛大腸風冷殠椿根銼地榆銼黃耆銼伏龍肝研各一兩當歸切焙三分右為細末每服食前以粥飲調下二錢七治酒痔肛邉生腫痛及下血不止鵝不食草五錢去泥焙乾雞冠花五錢微炙鬱金五錢麝香五錢細研入當歸三分銼微炒右為細末每於食前粥飲調下二錢黃耆丸出聖惠方治酒痔風熱壅滯大腸風冷下血疼痛黃耆一兩銼枳殼一兩去瓤麩炒微黃烏蛇二兩酒浸去皮骨塗酥炙微黃當歸一兩銼微黃皂莢刺一兩炙黃右為細末煉蜜丸梧桐子大每服食前下二十丸皂角子散出聖惠方治牝痔下血日久不止皂莢子仁一百枚麩炒黃槐鵝炙牛角尖屑炙露蜂房炒各一兩右為細末