以軟帛蘸湯尉之通手即淋洗神效散出聖惠方治氣痔槐鵝一兩銼微末炒皂莢子仁五錢微炒丁香五錢右為細末每於食前以粥飲調下一錢治氣痔下血肛邉疼痛出聖惠方夜合葉二兩乾者枳殼二兩麩炒微黃去穰訶黎勒煨二兩用皮右為細末每於食前以粥飲調下二錢又方出聖惠方雞冠花二兩枳殼麩炒微黃去穰臰椿樹皮二兩微炒右為細末煉蜜丸梧桐子大每於食前以黃耆湯下二十丸聖功丸一名雞冠花丸治氣痔下血肛邉疼痛方見大腸門腸風下血類白礬丸治氣痔下血方見本門血痔類必效丸治氣痔脫肛不收或生鼠乳時復時血出久不差者方見本門諸痔類摻藥方治氣痔脫肛良久乃收海螵蛸研染胭脂研各五錢右為末同研勻先以溫湯略拭乾摻藥少許治氣痔下血肛邉疼痛出聖惠方硫黃一兩細研木香一兩末右為細末令勻每服食前以粥飲調下一錢又方出聖惠方地榆一兩銼檳榔一兩右為細末每於食前以粥飲調下一錢又方出聖惠方槐木耳二兩微炒乾薑一兩炮裂銼右㕮咀每服三錢以漿水一鍾煎至六分去滓每於食前溫服又方出聖惠方槐樹雞一兩銼微炒槐花一兩微炒右為細末每於食前以粥飲調下一錢治氣痔右以鯪鯉甲燒一兩存性肉豆蔲仁三箇同為末米飲調下二錢服下血甚者加蝟皮一兩燒入中病即已不必盡劑久痔附論夫久痔者由臟腑久積風熱毒流注於大腸乃成斯疾也復遇下元冷憊腎藏勞傷氣血不調三焦壅塞熱毒流滯而搏於血入於大腸故令下血肛邉腫癢或生瘡瘻連滯經久差而復發故名久痔也方槐子丸出聖惠方療五痔數年不差燥濕痔有雌雄為病苦暴有乾燥腫疼者有崩血無數者有鼠乳附核者有腸中返癢者五三年皆殺人忌飲酒及作勞色犯之即發槐子乾漆熬杉木根皮各四兩茱茰炒秦芁黃芩白斂青木香牡蠣煆龍骨附子炮圓大者雷丸蒺梨子白芷桂心雞舌香各二兩黃耆二兩右為末蜜為丸一服二十丸日三服忌豬肉冷水雞魚蒜生蔥千金翼有丁香茱茰根皮聖惠方有楝樹根皮白無杉根木皮黃耆煉蜜為丸梧桐子大食前粥飲下雷丸丸治五痔瘻血日久衆藥不差者雷丸二兩紫芝白芷紫苑各二兩貫衆五兩秦芁去苗土厚朴去粗皮生薑汁炙各一兩藁本去苗土二兩乳髮灰三兩蟅蟲炒石南炒各五錢豬懸蹄炙焦十枚右為末煉羊脂丸梧桐子大每服二十丸空心煎米飲下日晚再服黃耆膏出聖惠方黃耆一兩五錢銼漏蘆一兩五錢黃蘗一兩五錢銼槐子仁五錢木通一兩五錢銼苦參一兩五錢銼俾骨一兩五錢銼雄黃三分細研虎骨三分搗為末硫黃一兩細研麝香一錢細研蜣蜋末五錢右件藥以臘月豬脂三斤煉諸藥二十餘沸以布擾去滓更入鐺錬一兩沸及以綿絞過以瓷合盛之下雄黃等擾令勻故帛上貼之日兩三度換蟲出即愈矣烏蛇膏出聖惠方治痔疾年月深逺傍生孔竅有頭膿血出瘡癢難忍烏蛇一兩燒灰馬齒一兩燒灰蝟皮一兩燒灰亂髮三分燒灰黃礬三分細研斑貓三分去翅足糯米拌炒黃色杏仁四十枚去皮搗如膏麝香一分研細豬脂一斤臘月的豬牙皂莢一分炙搗末水銀三分少胡粉點水研令星盡右都研極細先煎豬脂候鎔濾出滓入諸藥煎二三十沸欲成時入麝香擾令勻更煎三兩沸入蠟三兩候冷置於瓷盒內每以少許貼於痔一日三二度用之安息香丸治久患腸風痔瘻諸疾安息香一分阿魏半分乳香一錢三味同研丹砂一分雄黃二錢蜜陀僧煆二錢龍腦二錢麝香二錢砒霜一分研細更入菉豆末二錢同研巴豆三粒去皮心膜水一大碗浸一日六度換出細研出油右先將安息香等三味一處入瓷器內用重湯煮或於飯甑上蒸一次再入淨鉢內爛研成膏入諸藥一處搜和丸如菉豆大每服一丸空心服腸風㵼血五痔漏膿血不止或生鼠乳並以好茶下卒心痛生薑湯食積陳麵湯心腹諸氣溫酒婦人心痛血氣當歸酒飲水㵼諸冷痢飯飲􅒻疾桃心湯下治痔瘡久不差者洗藥桃條栁條槐條桑條艾葉荆芥茄根蒼耳根萱草根各等分右每用三兩㕮咀水五碗煎三十沸去渣洗次用貼藥五倍子五箇灰火炮香白芷二錢輕粉二錢黃丹二錢麝香少許右為末研勻瘡乾蔥白汁調搽濕則乾貼之白斂散一名赤小豆散治十年痔如鼠乳膿出下血劇者方見本門牡痔類龍骨丸一名螺皮丸治五痔連年不止兼痔瘻方見本門痔瘻類硃砂丸出聖惠方治久痔有頭疼痛難忍瘡口膿水不絶硃砂三分細研砒霜五錢巴豆一粒去皮心研紙煨壓去油麝香一分細研乳香一分細研阿魏一分麵裹煨麵熟為度安息香一分右為細末以湯浸蒸餅和丸菉豆大每日空心以枳殼湯下一丸不過十日差小槐子丸治大腸積冷久痔不差槐子仁二兩微炒龍骨一兩白礬一兩燒令汁盡硫黃一兩細研枳殼二兩麩炒微黃乾漆一兩搗碎炒令出桑木耳一兩微炙右為細末煉蜜丸搗三二百杵丸梧桐子大每於食前以粥飲下二十丸治痔疾有頭數年不差出聖惠方鰻鱺魚頭一兩炙黃木香一兩麝香一兩細研砒霜一分細研白礬一兩燒令汁盡豬牙皂莢三分炙黃焦粉腳一兩細研右為細末煉蠟為丸蓮子大用綿裹一丸內下部中攪腹內欲轉但且忍之待忍不及即上盆子當下惡物每日用之以痔頭消為度尉方出聖惠方治痔疾有頭多年不差頻發疼痛坐立不得奧黃一分醋石榴皮一分杏仁一分湯浸去皮尖皂莢一分黎蘆一分去頭栁蟲屑三分莽草一分右為粗散以油拌炒令熱綿裹尉痔上五七度差槐子丸一名小槐實丸治五痔十年不差方見本門諸痔類大黃湯治數十年五痔下血如雞肝肛邉結核鼠乳肛中疼痛大黃銼炒五兩滑石三兩五錢芒硝研桑根白皮銼黃芩去黑心杏仁湯浸去皮尖雙仁炒各一兩右搗篩每服一錢七分以酒一盞水一盞棗三枚劈破同煎一盞去滓空心溫服微利一兩行為度未利再服蝟皮散治丈夫婦人五痔年久不差蝟皮一箇燒灰研雄鱉頭三箇燒灰研醋石榴皮地榆枳殼槐花各一兩右除二味燒灰外各細銼一處炒令黑色為末與灰研勻每服二錢七分溫酒調下食前服貫衆散治腸風痔瘻久不差貫衆三兩雞冠花五兩甘草炙一兩烏梅去核炒黃連炒各二兩麝香當門子二箇細研右為細末每服二錢七分米飲調下更分一半藥末以麵糊丸如菉豆大每服二十丸米飲下晚間食前服之白礬散一名大散治久痔腸胃風冷及瘻膿血不止等方見本門腸風下血類榼藤子散治腸風五痔久不差榼藤子燒存性茺蔚子炒各五錢地榆臭椿根蜜炙焦色白礬燒令汁盡各一兩右為細末每服二錢七分溫酒一小盞入麝香一字同調下空心食前服芍藥丸治腸風痔瘻久不差芍藥地龍去土炒大黃銼炒葳靈仙各一兩木鱉子右為細末三分中減一分米醋一盞熬成膏和二分丸如桐子大每服五丸茶清下空心食前服萬金散治久患痔疾椿根銼一兩楝實去核麵炒胡粉炒各五錢藁本去苗土一分臭橘去穰切炒二兩右為細末每服一錢七分熱酒調下半夜時服天明再服後用續隨子不計多少搗為末煎湯淋洗三五黃連丸治痔疾積年不差或腸風㵼血黃連去鬚蕪荑仁榼藤子白礬各一兩皂莢炙去皮子一兩五錢右為細末以粟米糊和丸梧桐子大空心米飲下二十丸日晚再服以瘥為度天雄膏治痔瘡久不差者追風毒去疼痛天雄去皮臍一枚天南星一枚天麻五錢丹砂研一分黃蠟五錢右並生為末丸先用生油少許鎔黃蠟次入諸藥熬成膏每便時用舊綿攤藥貼瘡甚驗獨聖散治年深痔疾不差右用黃土如石者五錢燒令紫色細研末以膩粉一錢藥末二錢五分拌勻臨卧溫酒調下蟲出是見效矣比金散治久痔右用蜀葵花葉夏月收者焙乾為散每服二錢七分溫酒調下五服效熏痔立效方治痔瘻久不差者蛇蛻四兩細煎令碎蟬蛻四兩細煎令碎白礬生研一兩皂莢三挺為末右拌勻分為六貼每用一貼瓷碗內如燒香法盛入桶內燒令煙就上熏之煙盡即止熏痔必效散治痔瘻久不差者鯪鯉甲二兩細銼黃牛角腮四寸細銼鉛丹一兩研乳香一分研右為末拌勻每用三五七如燒香法坐盆器內用板蓋上開竅坐就瘡熏之煙盡即止蜂窠膏治瘻痔纍經熏洗未效者蜂窠燒炙稱五錢研蜒蚰一箇大者研作膏水銀粉稱一錢研鉛丹稱一錢研右將三味和勻入蜒蚰膏內更入麝香半錢七同研令勻每用少許傅瘡槐枝酒方出聖惠方治痔疾數年不差槐枝葉二斗細研槐子仁二升搗碎蒼耳莖葉細銼一斗右件藥入於釜中以水一碩煮取五斗去滓澄清看冷暖入麯末五斤糯米五斗蒸令熟都拌和入甕如法蓋復候酒熟任性溫溫飲之常令似醉久服神效白礬丸出聖惠方治痔疾多年不差下部腫硬疼痛宜服白礬二兩燒令汁盡附子一兩炮裂去皮桑黃一兩銼微炒右為細末以軟飯和丸如梧桐子大每於食前以粥飲下十丸不換金散治腸風痔瘻㵼血久不痊槐實及時採炒臭椿根皮銼暴乾荆芥穗各一兩右為細末每服一錢七分用粟米飲調下年深者服二錢七分日三服槐白丸治腸風痔瘻久不差槐白皮四兩用煮棗肉四兩火上旋塗慢火炙乾絶為度槐花炒白礬燒令汁盡二兩右為末煉蜜丸如梧桐子大每服五十丸米飲湯下空心日服三白礬丸治五痔連年不差及瘻下膿血不止白礬燒灰赤石脂各一兩附子炮裂去皮臍一兩五錢右為末煉蜜丸梧桐子大每服二十丸空心煎乾薑湯下臨晚食前再服黑紙撚方出楊氏家藏方治痔瘻久不差除瘡口內黑肉蜜陀僧煆黃連去鬚瀝青各等分右為末用紙作撚以津唾蘸藥末撚入竅內覺微微癢即住不可盡撚也熏痔方治久痔不差臭椿皮炮乾二兩枳殼去皮三兩蛇蛻五錢右搗篩用一小罐盛以厚紙一張蓋口繫定上剪一小眼子文武火煨熱氣從眼子內出便騎罐熏之如熏得熱痛以燈盞內油塗如此熏三五度立效烏金散治久患痔瘡疼痛不可忍烏驢乳屋上陳煤是也細研陳臘茶末各一分膩粉一字右細末傅痔上乾者以油調塗之一兩次即消治痔疾多年不差下部腫硬疼痛宜服細墨二兩乾薑二兩炮裂銼右為末以軟飯和丸梧桐子大每於食前黃耆枳殼湯下二十丸以差為度神驗熏藥方出聖惠方治痔瘻積年不可忍者鰻鯉魚半斤五月五日採曝乾搗為末蜣蜋三枚為末右件藥取成熟艾和藥末以青布捲之安瓷瓶中著火燒坐向瓶上熏之其蟲及惡汁並出不復再發金針散出御藥院方治久痔及腸下血疼痛諸藥不差者皂莢刺赤紅者炙破故紙杵碎紙上炒香各等分右為細末每服三錢溫酒調下食前服大效丸一名白礬丸治痔疾不差方見本門血痔類乳香散治五痔年深不差乳香二錢沒藥一錢二味同研右為細末用小雞子一枚打開去紅以清拌藥再入雞子殼中以紙封飯甑中蒸熟空心服盡一枚如年深者十數枚安麝香散治逺年痔疾有膿血出行坐不可忍者麝香五分研田螺一箇燒灰研右細研末用蔥湯洗次用藥傅之白玉丹出三因方治久年腸痔下血百藥不效者凝水石不拘多少煆紅研細水飛再入窩中煆右糯米糊丸如梧桐子大陳米飲下五十丸只用一服愈又單方服白梅亦效治痔瘡不問三十年久逺瘡皆可片腦不拘多少點在蝸牛內一宿蝸牛肉化為水以鵝羽蘸瘡右用寒水石為末井花水空心調下時時服半月除根治痔瘡久不差者右用活蜈蚣一二條頭尾足俱全者放於香油中用瓶盛貯線札定瓶口不用七七四十九日久留日數用亦不妨礙如用時但蘸油點痔上不過十餘次即愈石燕散出肘後方治腸風痔瘻三十年不差面色萎黃飲食無味及患臟腑傷重泄㵼暑月常㵼不止及諸般淋瀝久患消渴婦人月不調赤白帶下多年不差應是臟腑諸疾皆治之右用石燕不拘多少淨洗每日空心取一枚放堅硬無油鉢溫水磨服之如彈子大者分三服晚食前再服欲作散搗研為細末水飛過取白汁如泔乳者澄去水曝乾以磁石杵頭粳鐵屑同研候硬入堅瓷鉢內以硬乳捶研每服五分至一錢清飯飲調下溫水亦得此方専治年久腸風等疾頭常服勿令歇服及一月勿歇即愈榼藤子散治痔瘻久不愈右用榼藤子不拘多少為散先以蜜調少許塗瘻瘡上次用溫酒調下一錢七分食前服之硃砂丸治久痔生瘡出血不止白礬五錢雄黃五錢已上三味入瓷盒子內水調蚌粉固口縫外用鹽泥固濟用炭火燒通赤取出放地上去火毒後入下項藥麝香一兩别研穿山甲一兩置瓦上炙令黃赤色肥皂一枚去子焙右件為細末煮麵糊為丸如梧桐子大硃砂為衣每服十丸溫酒下食前服普濟方卷二百九十八
