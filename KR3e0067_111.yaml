  - {type: page-break, offset: 0, content: '', id: KR3e0067_WYG_111-1a, image: WYG0750/WYG0750-0618a.png}
body:
  text: 普濟方卷一百十二明周王朱橚撰諸風門歴節風論夫歴節風之狀短氣自汗頭眩欲吐手指攣曲身體魁瘰其腫如脱漸至摧落其痛如刺不能屈伸蓋因飲酒當風汗出入水或體虚膚空掩護不謹以致風寒濕之邪徧歴闗節與血氣摶而有斯疾也其痛如刺者為寒多其腫如脱者濕多肢節間黄汗出者為風多遍身走痒徹骨疼痛晝静夜發如䖝喫嚙者謂之白虎歴節治法當以温藥觧其風寒濕之毒或用和平劑獨寄生湯亦可也其白虎歴節逰走痒痛如䖝為之吮夫脾主肌肉虚則為痒惟進飲食尚庶幾焉而䖝亦得飲食其間不至於頻囓也書曰若藥弗暝眩厥疾弗瘳似此證候一名厲風須當大作湯丸未可拘以平常淺近之劑歴節風若久不治者令人骨節蹉跌變成癩病不可不知古今不問貴賤往往苦之此是風之毒害者也治之雖有湯藥而並不及松膏松節酒若羇旅家貧不可急辦者服猪湯猶勝不治但於痛處灸三七壯佳方海桐皮散出直指方治歴節走注骨節疼痛獨活水浸焙萆薢水浸焙川芎當歸各三分桃仁去皮焙天麻疎桂牛膝麻黄去節枳殻海桐皮白芍藥川烏去皮臍松節防風杜仲薑製甘草炙各半兩麝香一分虎脛骨一兩酒炙黄右粗末毎服二錢薑五片棗二枚食前煎服川烏頭丸出聖惠方治歴節風疼痛發歇不止川烏頭半兩鹽拌炒令黄去皮臍白花蛇肉一兩酒浸炙㣲黄雄黄半兩研白殭蠶㣲炒天南星㣲炒各一兩麝香研硃砂細研各半兩膩粉一分天麻當歸天雄炮製去皮臍乾蝎㣲炒各一兩麻黄半兩去根節蟬殻一分炒芎藭地龍乳香各半兩右搗羅為散入研了藥更研令細煉蜜和搗三五百杵丸如桐子大每服以温酒調下十五丸雄麝丸出聖惠方治歴節風骨節疼痛變急痺頑安息香五靈脂天麻各一兩半地龍浄三斤全蝎㣲炒雄黄各半兩白殭蠶㣲炒三分麝香一分烏蛇酒浸取肉炙天雄炮去皮臍當歸川烏去皮臍川芎南星炮官桂虎脛骨酒炙黄各一兩川獨活二兩右為末煉蜜為丸桐子大每服十五丸食前温酒下一方有敗龜無地龍忌猪雞魚肉犬酸棗仁散出聖惠方治歴節風疼痛酸棗仁一兩半炒敗龜二兩酥炙令黄羌活二兩虎脛骨二兩酥炙令黄秦艽去苗防風去蘆頭各一兩牛膝一兩去苗芎藭一兩半桂心骨碎補茵芋附子去皮臍枳殻麩炒㣲黄去瓤各一兩當歸一兩半木香一兩右搗羅為散每服以温酒調下二錢空心及晩食前服虎骨丸出聖惠方治歴節風疼痛虎脛骨六兩硼砂一兩以醋浸化以虎骨上塗酥盡為度桂心地龍一兩半炒赤芍藥一兩芫花三分醋拌炒令乾海桐皮剉牛膝去苗各一兩乾蝎三分㣲炒側子炮去皮臍羌活各一兩右搗羅為末煉蜜和搗三五百杵丸桐子大毎服食前以温酒下二十丸或三十丸錫蘭脂丸治風寒客摶血氣凝澁不通歴節疼痛甚者短氣肢節不得屈伸錫蘭脂白殭蠶炒芎藭藿香葉天南星炮白芷甘松去土乳香楓香脂羌活去蘆自然銅醋淬一兩骨碎補去皮毛半兩糯米炒令黒色二兩烏頭新汲水浸一宿去皮臍切焙乾一兩右為末煑糯米粥為丸如桐子大毎服五丸至七丸炒地黄酒下食後卧服茯神散出聖惠方治歴節風手脚曲戾疼痛心神悶亂伏神防風去蘆當歸天雄去皮臍炮麻黄去根節甘草炙芎藭獨活逺志去心丹參桂心酸棗仁焙各一兩右搗篩為散毎服三錢以水一中盞入生薑半分煎至六分去滓毎於食前温服萆薢散出聖惠方治歴節風四肢疼痛不可忍萆薢剉漢防風赤芍藥桂心松節丹參當歸茵芋五加皮側子炮去皮尖牛膝去苗各二兩枳殻半兩麩炒㣲黄右搗粗羅為散每服二錢以水一中盞入生薑半分煎至六分去滓食前温服忌生冷猪魚雞犬肉松脂散出聖惠方治歴節風筋骨肢節疼痛久不瘥松脂五兩桑灰汁一斗煮至五升已來傾入冷水内放凝别用漿水一斗再煑至三升已來又傾入冷水内凝又用清水一斗煑至五升已來又傾入冷水内凝取出乾即同入藥用虎骨脛酥炙令黄天雄炮去皮臍牛膝去蘆各二兩酸棗仁二兩炒薏苡仁三兩羌活二兩白附子炮二兩桂心當歸㣲炒各一兩没藥二兩麝香一錢研右搗羅為散入研藥令勻每服食前以温酒調二錢虎骨散出聖惠方治厯節風手足擡舉不起頑痺不仁虎骨脛二兩酥炙黄海桐皮炒去刺桂心天雄一兩剉麻黄去根節羌活天麻白蒺藜炒道人頭牛蒡子炒各一兩仙靈脾二兩牛膝二兩去苗右搗羅為散毎於食前以豆淋酒調下二錢桂心散治歴節風四肢疼痛筋節不利肉桂二兩去粗皮麻黄去根節海桐皮剉川烏頭黒豆二兩炒五加皮防風去蘆牛膝去苗松節剉道人頭一兩附子二兩去皮臍右搗細為散每服食前以温酒送下二錢羌活湯治歴節風身體骨節疼痛不可屈伸舉動不能羌活去蘆桂去粗皮芍藥熟乾地黄焙葛根剉二兩甘草一兩炙防風去义當歸切焙芎藭各一兩麻黄去根節去末焙二兩右粗搗篩每服五錢水一盞半酒半盞入薑一棗大切同煎至一盞去滓温服空心日午夜卧各一茯苓湯治歴節風手足曲戾言語狂亂赤茯苓去皮防風去义當歸焙白箭乾薑炮甘草炙二兩獨活去蘆逺志去心附子去皮臍炮人參各一兩右剉如麻豆大每服先用水三盞黑豆半匙棗二枚劈破生薑半分煎至一盞半去滓入藥末五錢煎至一盞去滓温服空心午夜卧各一紫桂散出聖惠方治厯節風疼痛不可忍桂心去粗皮防己赤茯苓去黑皮芍藥各四兩人參二兩白术四兩甘草炙剉五兩防風去蘆三錢烏頭炮去皮臍七枚當歸焙一兩右剉如麻豆毎服三錢水一盞酒少許生薑半分同煎至七分去滓温服空心日午臨卧各一服但忌一切發物烏頭丸出聖惠方治厯節風筋攣骨疼不得屈伸烏頭燒存性藿香縮砂去皮炒甘松去土酒浸白芷乾薑炮二兩芎藭天麻當歸切焙一兩雄黄研一分右為末煉蜜如彈子大空心午時臨卧茶酒送下一丸犀角湯出千金方治熱毒流於四肢厯節腫痛方犀角二兩羚羊角一兩前胡黄芩梔子仁麝香各三兩大黄升麻各四兩䜴一升右㕮咀以水九升煑取三升去滓分三服桂心散出聖惠方治厯節風疼痛不可忍肢節無力丹參桂心牛膝去苗附子去皮臍炮當歸赤芍木香萆薢剉麻黄去根節各一兩右搗篩為散每服三錢以水一中盞入薑半分煎至五分去渣每於食前温服忌猪雞犬肉生冷油物赤芍藥散出聖惠方治厯風骨節疼痛四肢徹腫行動無力赤芍二兩附子一兩炮製桂心二兩芎藭當歸二兩漢防己萆薢各一兩桃仁半兩湯浸去皮尖雙仁麩炒黄海桐皮二兩右羅為散毎服五錢以水一大盞入薑半分煎至五分去滓於食前温服忌發物海桐皮散出聖惠方治厯節風身體四肢無力骨節疼痛海桐皮二兩附子三兩炮製麻黄二兩半去根節天麻牛膝去苗各三兩桂心一兩防風一兩半去蘆當歸一兩酸棗仁一兩炒右搗羅為散毎服三錢以水一中盞入薑汁半分煎至六分去滓於食前温服天雄散出聖惠方治厯節風流入腰膝疼痛天雄製獨活桂心當歸各一兩酸棗仁研二兩炒木香一兩乾蝎半兩枳殻半兩製去心麝香一分研右搗細羅為末研入麝香令匀每服食前以温酒調下二錢忌生冷油膩之物猪魚雞犬肉茵芋丸出聖惠方治厯節風疼痛皮折及血出者茵芋狗脊麻黄製各三分丹參五加皮杜仲去粗皮二兩硃砂三分研飛過甘草半兩炙側子一兩炮製右搗羅為末研令硃砂和勻煉蜜丸桐子大每服食前以温酒下二十丸忌羊肉防己湯出千金方治歴節風四肢疼痛如錐刺不可忍者防己茯苓白术桂心生薑各四兩甘草三兩人參二兩烏頭七枚右㕮咀以苦酒一升水一斗煑取三升半一服八合日三夜一常覺焦熱心惚惚然慎勿怪也若不覺復合服以覺為止用烏頭去皮熬令黑乃堪用不然恐毒人宜慎之一方有附子半兩無烏頭一方不用苦酒黄耆湯治歴節風日夜疼痛黄耆四兩防風去乂附子一兩半製芎藭一兩麻黄五兩製浄當歸焙一兩甘草炙半兩芍藥一兩右剉如豆毎服五錢水一盞半入棗二枚去核生薑一分碎煎至一盞去滓温空心日午夜卧各一服人參湯出聖惠方治歴節風疼痛日午發歇不可忍人參二兩白术四兩桂製防己各三兩甘草二兩剉炙烏頭炮製七個防風三分去义赤茯苓去皮二兩右剉如麻豆每服四錢水一盞半生薑三片同煎一盞入醋少許更煎三四沸去滓服日二夜一當覺熱痺未覺加藥末并醋如前煎服覺熱痺即止白术湯出聖惠方治歴節風四肢疼痛不可忍白术防己各三兩甘草二兩炙附子半兩炮製桂去皮人參各三兩當歸焙芍藥各一兩右剉如麻豆毎服四錢以水一盞半生薑三片煎至一盞入醋少許煎三四沸去渣温服當覺體中熱痺未覺加藥末并醋如前法煎服忌一切發物之類麝香丸出聖惠方治厯節風疼痛發歇不可忍麝香研一錢龍腦研半錢木香半兩蠐螬紙褁煨研三枚壁虎研三枚地龍去泥研五條乳香一錢研草烏三枚去皮骨右將草烏木香搗羅為末合研勻為丸如乾入酒少許煑麵糊丸桐子大每服三十丸臨卧乳香酒下透闗散出聖惠方治歴風四肢攣急疹痺疼痛難忍短氣汗出麻黄根五兩天南星半兩炮葳靈仙去土半兩萆薢當歸切焙人參天麻各一兩赤小豆水浸去皮尖焙半升右為末每服半錢或一錢温酒調下食前後臨卧服附子八物湯治歴節風四肢疼痛如搥不可忍者獨活散治厯節風獨活去蘆半兩𤣥參一兩生犀角屑二兩升麻三兩䜴二合惡實根半兩剉生乾地黄半兩剉右為散毎服三錢空心煎米飲調下日二芍藥知母湯出三因方治諸肢節痛身體魁瘰脚腫如脱頭眩氣短吐桂心知母防風各四兩芍藥甘草炙麻黄去節附子二兩炮製右剉為散每服四錢水一盞半薑五片煎七分去滓空心服一方有白术川芎杏仁半夏一方有白术無麻黄名知母湯大棗湯出千金方治厯節風疼痛大棗十五枚附子一枚甘草一尺黄耆四兩生薑二兩麻黄五兩右㕮咀以水七升煑取三升每服一升三日服趂痛丸出仁存方治走疰厯節諸風軟痛卒中倒地跌撲傷損草烏三兩不去皮尖熟地黄南星半夏麴殭蠶烏藥各二兩右為末酒糊為丸如桐子大日乾每服十五丸空心夜卧温酒下如跌撲損傷用薑汁和酒研十數粒塗傷處卒中惡倒地薑汁茶清研十五丸灌下立醒秦艽湯治厯節風骨節疼痛日夜不可忍秦艽去苗土防風各二兩去义黄耆三兩附子去皮臍炮製當歸一兩切焙麻黄去根節焙四兩右剉如麻豆大每服五錢以水一盞半生薑三片同煎至一盞去滓温服之空心併二服臨卧并二服厚覆㣲出汗慎外風防風湯出聖惠方治厯節風週身百節疼痛腰脚痿弱防風二兩去义白术一兩白蘚皮二兩桂一兩三分去粗皮黄耆二兩剉薏苡仁三兩炒右粗搗篩每服四錢水一盞半生薑三片煎至一盞去滓温服日三夜一附子湯治厯節風疼痛日夜不可忍黄耆四兩甘草炙防風半兩去义附子一兩半製去皮臍小黑豆一兩炒麻黄去根節焙六兩右如麻豆大每服三錢以水一盞生薑三片大棗一枚劈破同煎至八分去滓温服之日三夜一一方無小黒豆麻黄散出本亊方歴節無汗宜發汗麻黄一兩一分羌活一兩黄芩三分細辛華隂者佳黄茋各半兩右為粗末每服五錢水二盞煎至八分去滓温服接續三四服有汗慎風一方無黄芩茵芋丸出本亊方治厯節腫滿疼痛茵芋硃砂薏苡仁各一兩牽牛子一兩半郁李仁半兩右細末煉蜜為丸桐子大輕粉為衣每服十丸至十五丸二十丸五更初温水下到晩未利可二三服快利為度白粥將息牛蒡子散出本事方治風熱成厯節攻手指亦作腫麻太甚作攻肩背兩膝遇暑熱