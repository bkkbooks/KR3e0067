池以紙隔領在紙上滓不可使右為細末醋煑薏苡仁粉為丸桐子大用下見藥方浸酒下五六十丸專忌笋芋腥膩發脚氣之物一日三服松節酒方當歸一兩熟地黄一兩松節一兩列節一兩牛膝一兩右為粗末以絹袋盛藥使無灰酒二百盞浸三日方可喫如藥酒一盞服藥即以生酒一盞添入予表弟武東叔年二十餘患厯節風痛不可忍涪城馬東之以此方療之獨活寄生湯治厯節走注骨節疼痛風濕氣毒桑寄生獨活各三兩白芍當歸杜仲製防風熟地牛膝白茯苓細辛秦艽桂心芎藭人參甘草各二兩右㕮咀每四錢水煎至空心服又方出聖惠方治厯節諸風百節疼痛晝夜不可忍者虎脛骨一具塗酥炙令黄右搥碎以絹袋盛用清酒二斗浸五夜隨性多少煖飲之一方用虎頭骨治厯節風出本草方以熊骨煑湯浴之治厯節風四肢疼痛如解落者用松脂二十斤酒五斗漬三七日每服一合日進五六服治骨風腰膝痛行履不得遍身瘙痒何首烏味苦大而有花紋者牛膝味苦酸而平惡龜甲畏白前右二味各剉一斤以好酒一斗浸七夜曝乾於木臼内搗羅為末煉蜜丸桐子大毎服空心食前酒下三五十丸紫白癜風論夫紫癜風之狀皮膚皺起生紫㸃搔之皮起而不痒痛是也此由風邪夾濕客在腠理榮衛壅滯不得宣流藴瘀皮膚致令色紫故名紫癜風白癜風之狀皮膚皺起生白斑㸃是也由肺臟壅熱風邪乗之風熱相併傳流榮衛壅滯肌肉久不消散故成此也肺有壅熱又風外傷於肌肉熱與風交並邪毒之氣伏流於腠理與衛氣相搏不能消散令皮膚皺起白斑故名白癜風也方烏蛇浸酒方出聖惠方治風及白癜紫癜烏蛇六兩酒浸去皮骨炙黄防風去蘆桂心各二兩熟乾地黄四兩白蒺藜二兩去刺炒天麻三兩五加皮二兩羌活三兩牛膝去苗枳殻麩炒㣲黄各三兩右細剉以生絹袋盛以無灰酒二斗於瓷甕中浸封頭七日後開毎日三度温飲一小盞忌毒滑物猪雞肉癜風方出危氏方雄黄硫黄黄號丹蜜陀僧天南星右等分為末先用薑汁擦患處再用薑蘸藥末擦擦後漸黒次日再擦黒散則無事矣四神散治紫白癜風雄黄雌黄硫黄白礬透明者佳右各等分研為末毎用時先浴令通身汗出次以生薑蘸藥擦患處良以熱湯淋洗當日色淡五日除根治皮風紫白癜風赤芍藥當歸苦參各半兩赤土一兩右為細末生猪脂二兩熬油去滓同蜜一兩作一處調藥隔一夜毎日一大匙熱酒調下空心食前後各一服二藥並忌雞鴨無鱗魚豆腐等物治紫白癜風生砒霜白􅈨泥􅈨各一錢右為末用生茄子蒂擦患處先浴後擦玉粉膏出聖惠方治赤癜白癜風硫黄明白􅈨並生用右為末薑汁調茄蒂蘸擦兩三次一方用米醋調塗之一方治風熱生風刺者入黄丹少許以津液調塗傅之洗潄罷臨卧服防風通聖散效速治赤白癜大有神效貝母白部各等分右為細末用薑自然汁調擦癜上硫黄方治赤白癜風詩曰赤癜白癜兩般風附子硫黄最有功薑汁調勻茄蒂擦一擦之後更無蹤白癜用白茄蒂紫癜用紫茄蒂如用藥時先以布擦洗其瘡令損却以茄蒂蘸藥擦一方去附子加礜石專治白癜一方用雞子一枚好醋浸過夜針刺小孔􅅹取清液入砒霜菉豆許和勻將粗布痛擦患處以指㸃藥揩之亦妙一方治紫癜風再入胡粉一分膩粉少許同以栁汁和勻臨卧揩三五遍並瘥硫黄膏治紫白癜風方見厯莭風類治紫白癜風出危氏方用硫黄一兩米醋煑一日海漂硝二個並為細末浴後以生薑蘸藥熱擦謹風少時數次絶根皂角散治諸般癜風方治紫白癜癬汗斑用蒼耳葉勤擦搽三日愈白花蛇散治紫白癜風白花蛇酒浸去皮骨炙一兩麻黄去根節天麻何首烏去黑皮天南星炮白附子炮桂去粗皮萆薢白鮮皮羌活去蘆蔓荆子去皮白殭蠶炒防風去蘆犀角鎊各半兩磁石醋淬研一兩原蠶蛾一分炒右將一十五味搗羅為散入磁石研匀每服二錢食前温酒調下忌熱麵雞猪魚蒜等物酸石榴丸治紫癜風大效酸石榴十顆去皮以瓷盆盛飯上蒸爛絞取汁用之妙梨二十顆去皮核研絞取汁羌活去蘆人參防風去蘆乾薄荷葉各一兩茺蔚子白附子炮苦參犀角鎊烏啄炮製去皮臍右除二味汁外搗羅為末將汁熬成膏和丸桐子大每服二十丸温酒下不拘時候烏蛇散治􅍙麻紫癜風烏蛇酒浸去皮骨防風去蘆羌活去蘆人參𤣥參沙參苦參丹參白附子炮蒺藜子炮去角各一兩右為末每服一錢温酒調下灰藋塗方出聖惠方治紫癜風灰藋不拘多少燒灰用紙襯淋取汁煉金如膏約兩匙許雄黄丹砂膩粉麝香蝦蟆灰石硫黄礬石灰各一錢右將七味同研如粉與鍊了灰藋濃汁攪煎如膏塗之乾即易膏謹以醋潤之代赭丸出聖惠方代赭鐵粉細研各一兩白礬二兩生用右搗研令勻細以水浸蒸餅和丸菉豆大每服不計時候用温蜜酒下二十丸以蜜湯下之亦得硫黄膏治紫癜風硫黄一兩研雄黄三分研白礬一兩研硼砂白附子各半兩附子三分炮製蛇蜕一條右搗羅為末入研了藥令勻用油四兩黄臈二兩先煎油三五沸下臈後入藥末調煎成膏毎取塗摩所患處日三度用之效滌風散治紫癜風防風去蘆䗶稍炒各一兩白花蛇頭二枚酒浸炙右為散毎服一錢温酒調下五倍子膏治紫癜風㸃㸃相連五倍子一分為末膩粉二錢砒霜研半錢右同研勻細以醋調為膏盛以瓷盒每浴罷匀揩患處速着衣慎風乃便洗手羊蹄根塗方出聖惠方治紫癜風羊蹄根自然汁半合生薑自然汁半合石硫黄研如粉四錢右將二汁與硫黄末同研令粘塗患處一日不得洗不過兩上瘥治紫癜風硫黄二兩砒霜少許青黛一兩右細研用布子三五寸無灰酒浸一夜取出令乾再用酒漬濕布子上前三藥擦令勻遍先浴罷用藥布揩令赤為度如是白癜風即不使青黛雄黄散塗方治紫癜風方見别門牡蠣散治紫癜風牡蠣膽礬各半兩右生用為散好醋調摩患處胡桃塗方治紫癜風白癜風初結青胡桃一顆取外皮用石硫黄一皂子許研如粉右先取胡桃皮切研如膏入硫黄末和匀塗之一方有白礬桑枝煎出聖惠方治紫癜風桑枝十斤益母草三斤剉右以水五斗慢火煑至五升去滓入小鐺内熟為膏每夜卧時用温酒調服半合硫黄膏治紫癜風又治白癜風雌黄七分研木蘭皮白术各八分苦參芎藭麻黄去節山茱萸甘草炙狗脊枳實炙各四兩秦芁沙參細辛牛膝白斂人參當歸薯蕷白芷各五分防風附子炮蒼耳子各六分右為散酒服方寸日再漸漸加至二忌生葱芥海藻菘芋猪肉桃李等烏蛇散治白癜風身體痿麻烏蛇三兩酒浸去皮骨白殭蠶炒胡麻子獨活去蘆防風去蘆天麻各二兩烏頭炮製白附子半兩炮細辛去苗葉桂去粗皮枳實麩炒蟬蜕去土天南星一分炮右為細散每服温酒調下二錢不計時候防風湯治風熱薫蒸皮膚白癜防風去蘆地骨皮王不留行山梔子仁炒荆芥穗惡實各一兩炒甘草炙三分人參生乾地黄焙各一兩右粗搗篩每服三錢水一盞入惡實根二寸同煎至七分去滓温服不計時候苦參散出聖惠方治肺臟久積風毒皮膚生白癜苦參剉烏蛇酒浸去皮骨炙各三兩露蜂房㣲炙松脂附子炮製梔子仁木蘭皮各二兩右為細散毎服温酒調下二錢不計時候宜常喫蘿蔔菜勿食雞雀肉忌猪魚大蒜濕麵等一方有防風白斂散出聖惠方治白癜風遍身斑㸃瘙痒白斂天雄各三兩去皮臍炮商陸一兩黄芩乾薑各二兩躑躅花一兩酒拌炒令乾右為細散每於食前以温酒調下二錢又方出聖恵方附子二兩去皮臍凌霄花一兩川烏頭二兩去皮臍防風二兩去蘆露蜂房躑躅花各一兩右細剉以猪脂三斤煎煉看藥黄焦去滓候冷於瓷盒中盛用摩風癜上以瘥為度治白癜風雞子兩枚和殻以米醋三升浸七日取白石硫黄半兩研附子去皮臍生用一枚重半兩者栗米二錢右將後三味搗羅為末以前雞子白調稀糊臨用藥先以葛布揩患處令赤塗之追風丹治白癜風蒼术米泔浸焙何首烏荆芥穗苦參各等分右為細末好肥皂角三片去皮核於磁器内熬為膏丸桐子大每服三十五丸空心酒茶任下忌一切動風之物前大軍庫張提領患白癜風服之愈附子膏出聖惠方療白癜風附子炮天雄炮烏頭炮各三兩防風二兩右切以猪膏三升合煎之先服散白癜上以膏傅之一方無防風治白癜風猪牙皂角四兩草烏頭半兩硫黄白芷各一兩右為末先用薑揩患處如面藥一般洗之又方蛇蜕殻苕箒上扎縳草蒸籠内多年舊竹片麻鞋底用穿過舊者右燒灰篩細敷之立效療白癜風出聖惠方黒油麻一升生地黄五大兩桃仁去皮尖二十枚右先退去油麻皮蒸之日曝乾又蒸之如此九度訖又暴乾搗令極碎後搗地黄桃仁羅之即揔和合少加蜜攪令匀一服一匙日再服和酒喫空喫亦精兼食猪肺尤妙忌蕪荑熱麵猪肉油膩等治白癜出聖惠方紅灰藋五斤茄子根莖三斤蒼耳根莖五斤右並曝乾一處燒灰以水一斗煎湯淋取汁入鐺内煎成膏以瓷盒盛别用好通明乳香半兩生研又入松霜一分膩粉一分相和入於膏内别用煉成黄牛脂二兩入膏内調令匀每用塗摩所患處日三用之人方千金方内見又以石灰松脂酒主之治白癜風不拘逺近用烏雞卵一枚取清先用硫黄碾為末以雞子清調勻用生布一片將藥刷在布上日中暴反覆刷三四次釘布子在板上令不皺候乾收起遇浴罷或動作勞苦汗出之時將布子於患處擦之即愈治白癜風一名草烏散草烏半兩巴豆一分細細切右用米醋和濕以布褁浴罷擦之頻浴為佳石硫黄膏治白癜風皮膚斑白毛髪亦變石硫黄輕粉各一兩半右為細末先以布揩患處令赤醋調藥成膏塗之若作瘡差後再塗苦參膏治白癜風苦參鹽各一分右為末先以酒一升煎至四合入藥二味令勻慢火再煎成膏每用先以生布揩患處令赤塗之治白癜風出徳生堂方詩曰紫癜白癜一般風水銀輕粉最成功搗取生薑自然汁只消一擦便無蹤又方貝母薑天南星右為細末用生薑搗汁出擦之又方出徳生堂方貝母乾薑右等分為末入浴堂内如澡豆洗擦患處甚妙又方出徳生堂舶上硫黄一錢輕粉一字右細末嚼胡桃仁擦患處後蘸藥頻擦即愈又方出徳生堂白附子雄黄右等分為末用巴豆先擦患處濕後蘸藥擦之又方出徳生堂驢尿生薑汁右等分相和洗拭所患處治白癜出千金方平旦手掠取韭頭露塗之最效又方出聖惠方以酒服生胡麻油一合日三稍稍加至五合慎生冷猪雞魚蒜等百日服五斗即瘥又方出千金方取蘿藦草煑汁拭之亦揩令傷滴白汁塗之陸僟云蘿藦一名芃蘭幽州謂之雀瓢郭璞云蔓生斷之有白汁蛇蜕皮方治證同前見本卷白駮門靈水膏治證同前見本卷白駮門又方出千金方以水銀數數拭之令熱即消瘥乃止治白癜風用杏仁去雙仁不去皮尖生用每日早晨爛嚼二七粒於白㸃處揩夜卧再用又方用續隨子葉汁傅白癜面又方用黄脚雄雞脅上血塗患處亦治厯痬風又方用白蒺藜子生搗為末作湯服之羊蹄根方治白癜風遍身花斑並皆治之治白癜風用楸木白皮五斤細剉以水五斗煎取五升去滓慢火上再煎如稠膏用不津器收每取膏摩於所患處日二三上效又方用桑柴灰二斗於大甑内蒸氣溜取釡中湯淋汁熱洗不過五六度瘥治紫癜風用舶上硫黄不拘多少用米醋化開將茄蒂蘸硫黄醋摩擦癜風處一方不用米醋良久以温湯洗去一方細研綿花子搗生薑自然汁半盞浸一時和綿子塗所患處稍止再易此患多春夏發但請驗之一方先以粗布揩患處令傷用麵脂調硫黄末如膏日三度塗變白散治紫癜風用大礬末揉薄荷揾礬末擦患處每澡浴了時用之茄根散治赤白癜風用茄根和雄黄塗之便瘥加減何首烏散治白癜紫癜諸風筋骨疼痛四肢少力眼斷瞳人鼻梁崩塌皮膚疥癬手足皺裂睡卧不稳行履艱難何首烏蔓荆子荆芥穗菊花枸杞子苦參葳靈仙各半兩石菖蒲半兩右為細末毎服三錢蜜茶調下不拘時候何首烏散治肌肉頑麻紫癜白癜風葳靈仙何首烏防風荆芥穗蔓荆子甘草虼蚊草即車前子右等分為末每服一錢酒水任送下治紫癜風蜜陀僧五錢為末自然銅研重節砒研一錢猪牙皂角五錢為末右為末和勻先用熱水揩洗去黒皮抹乾用水調藥薄薄揩拭肉上令入肉日一次晩用一次又方治癜風雄黄三分硫黄三分白􅈨一兩右件藥都研如粉以猪脂調令匀每取塗於患處日三度用之瘥治白癜風右用地麻草煑水汁淋洗四五次立瘥治白癜風以女真葉燒灰淋取汁塗之亦可作稠煎傅之亦作麵膏塗癉瘃殊效兼滅癜疪治白癜厯瘍風取白鴿肉炒服治白癜及厯痬以自然灰重淋取汁和醋先以布揩白癜風破傅之當為創勿怪治白癜風用博落廻和百丈青雞桑灰為末傅之治白癜風用杜蒺藜花隂乾為末每服二三錢飯後以温酒調服治白癜厯痬及風惡疥癬以木連藤汁傅之治白癜風先用粗布揩破用白馬骨連細辛牛膝雞桑破黄荆等分燒為灰淋汁塗之白馬骨生江東似石榴而短小對節白駮論夫白駮者肺風流注皮膚之間久而不去之所致也多生於項面㸃㸃班白但無瘡及不瘙痒不能早療即便侵淫也白駮之病其狀斑駮如癬過於厯瘍但不成瘡爾皆由風熱傅於膚腠脾肺二經不利也方菖蒲醖酒方治白駮舉體斑白經年不瘥菖蒲九節者去鬚節米泔浸切一斤天門冬去心一斤天雄炮去皮臍三兩麻子仁一升生用茵芋去粗莖一兩生乾地黄切焙乾膝炒烟出逺志去心各三兩露蜂房炒一兩苦參一斤黄耆炙剉八兩獨活去蘆石斛去根各五兩柏子仁生用二兩蛇蜕皮長三尺炒天蓼木剉二斤右粗搗篩以水二石五斗煑菖蒲等取汁一石以釀一石二斗􅐕米蒸醖如常法用六月六日細麩於七月七日釀酒酒成去糟取清收於浄器中蜜覆每服四合至五合日二夜更重煑菖蒲並藥滓取湯淋洗所患之處極妙白斂方散治風頭項及面上白駮漸長如癬但白紅色白斂炮當歸切焙附子一兩炮黄芩去黑心乾薑炮天雄各一兩炮製羊躑躅半兩蒸熟焙乾右為散每服半錢至一錢酒調下一方無當歸有商陸名商陸散治面白駮方出聖惠方敝帛蟬頸一用頭箒甑帶脯脂履底蛇皮右等分以月蝕之夕乗蝕時合燒之搗篩以酒服之方寸日二三更以醇苦酒和塗白上以瘥為度忌雞魚猪肉大蒜等物治駮方出聖惠方硫黄一兩硏蛇蜕皮一條燒灰草決明半夏生用檞樹皮各一兩燒灰右搗羅為散以清漆和之薄塗白處欲塗藥時先以巴豆中截摩白處令皮㣲起然後傅藥二三次即愈治白駮傅方出聖惠方雌黄石硫黄研蛇蜕皮一條大者燒灰右同研匀用醋調成以巴豆一粒中截以平處摩令皮起然後傅藥三兩即瘥忌一切血物大蛇皮塗方治面項身體白駮風蛇蜕皮大者燒灰石硫黄研檞皮各二錢燒灰右研令細末以清熟漆調和勿令稠硬薄塗白駮處欲塗藥時先以巴豆一粒中截用平處摩令皮㣲起然後傅藥治白駮方出聖惠方雄黄硫黄附子各二兩去皮臍右搗羅為散研如麵醋調塗之玉粉膏治白駮治白駮風出聖惠方川烏去皮臍硫黄各一兩研右搗羅為散以醋調塗之治頭項面上白駮漸長如癬但不成瘡宜用此方傅出聖惠方用桂去粗皮一兩搗羅為末每用半錢以津唾和傅於白駮之上日三愈治面項身體白駮傅方出聖濟總録用鮎魚一頭約半斤腸肚浄洗後一依鮓法用鹽椒葱粳米飯匀拌即用青荷葉褁作三包各用蒲片繫之如法更用荷葉重褁令大臭爛先以布拭白駮赤次炙鮓包熱熨令汗出以綿衣包無令風所傷蛇蜕皮方治周身白駮漸長似癬但不成瘡用蛇蜕皮一條大者炒熱援厯白駮上時噀唾數百遍棄之田野草中瘥一方燒灰醋調塗上佳靈水膏出聖惠方治面項身體白駮風塗淋方及治厯瘍生用木樹腔中汁栁樹為上將汁於浄鍋煎熱洗淋之乃更搗桂牡蠣末津唾調塗日三夜一隔日淋或以麵脂調傅亦效一方治白癜風無牡蠣鰻鱺魚塗方出聖惠方治頭項面上白駮侵淫漸長如癬狀但即無瘡用鰻鱺魚一頭肥者灸令脂出先洗白駮用物揩拭之令小痛然後用熟魚脂塗一度便愈甚者不過三度鶴膝風論夫鶴膝者病人兩膝腫大痛髀脛枯腊但有皮骨拘攣跧卧不能屈伸是也當服大防風湯使之氣血流暢肌肉漸生自然行履如故也方蛜􅀈丸出衛生家寳方治鶴膝風及腰膝風縮之疾蛜􅀈頸尾生者桃仁生白附子阿魏桂心安息香用研桃仁白芷各一兩乳香没藥各三分巳上用童子小便酒二升炒熟冷出火毒北漏蘆當歸芍藥牛膝羌活地骨皮葳靈仙各一兩右蜜為丸彈子大空心煖酒化下一丸胡楚望博七病風疰手足指節皆如桃李痛不可忍服之悉愈一方無乳香没藥用蜜為丸乾蝎丸出聖濟總録治脚膝風俗名鶴膝風乾蝎頭尾全者炒白芷安息香用胡桃仁同研各一兩桃仁去皮尖䨇仁生附子炮阿魏桂去粗皮各一兩乳香三分没藥三分九味搗研勻共用童子小便五升無灰酒二升銀器内煎熬令稠漏蘆當歸切焙芍藥地骨皮去土葳靈仙去苗土羌活去蘆頭六味同為末各一兩右同杵為丸如彈子大每服一丸空心煖酒化下若有病風注手足脂節腫痛不可忍者服之悉愈大防風湯治鶴膝風大能祛風順氣和血脈壯筋骨除寒濕逐冷氣方見諸風襍治類鶴膝風又名鼔槌風出直指方兩大小腿痩如蘆柴止有膝蓋大者行履不得用小續命湯合一料加萆薢川練子獨活乾木𤓰㕮咀不用生薑用水煎熬於碗底先放麝香少許去滓入碗内服之至數十服後加五積散同煎去滓服瘥一方用紫金皮老酒煎候温常服四聖膏出濟子切問治鶴膝風及諸風疾川當歸没藥大川烏各等分右為末用不蛀皂角二十四個搥碎水煎數沸去滓入鍋再熬成膏入前藥攪匀貼於患處普濟方卷一百十二
