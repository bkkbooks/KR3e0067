  - {type: page-break, offset: 0, content: '', id: KR3e0067_WYG_101-1a, image: WYG0750/WYG0750-0372a.png}
body:
  text: 普濟方卷一百二明周王朱橚撰諸風門風驚邪論夫風邪之狀乍驚乍喜恍惚不寧舉措失常是也蓋心者身之本而藏神今心氣虚則神不寧風邪乘虚而干之故謂之風驚邪也方地黃煎丸出聖濟總録治風驚邪心虚冷熱不調左肋下有氣發即妨脹不能食生地黃汁六升生天門冬汁五升牛髓五合生薑汁七合牛酥五合白蜜五合醇酒二升棗肉膏去核五合以上八味先煎地黃汁并酒五分减二分次下天門冬汁薑汁煎二十沸次下牛髓醇蜜棗膏煎如稀糖次下後散藥黃耆剉石斛去根人參山芋茯神栢子仁别搗研山茱萸桂去麄皮五味子防風去义枸杞子枳殻去穰麩炒厚朴去麄皮生薑汁炙剉白术各半兩乾薑炮半兩赤石脂甘草炙剉各一兩遠志去心細辛去苗葉各一分右除前八味外搗研為末入前煎中攪匀於銀器中重湯煎可丸即丸如梧桐子大每空心早食後温酒下三十丸日再煎服之獨活丸出聖濟總録治風驚邪及一切風肢節不利筋脉拘急頭目旋痛恍惚心忪獨活去蘆頭三分防風去义白茯苓去黑皮各半兩阿膠炙令燥石膏碎研者各三分瑇瑁鎊一兩人參一兩半甘草炙剉半兩天南星炮一兩細辛去苗葉半兩丹砂研二兩白殭蠶炒半兩丁香一分琥珀搗研一兩牛黃研麝香研各一分天麻龍腦研各半兩右為末再同研匀别用安息香二兩半搗碎以酒一升研濾去滓於銀器内慢火熬成膏和前藥了臼中杵三五百下丸如雞頭大每一丸細嚼薄荷茶下不計時甚者加一丸茯神丸出聖濟總録治風驚邪心中恍惚驚悸恐怖精神不樂化痰潤肌清神快氣茯神去木人參遠志去心麥門冬去心焙熟乾地黃焙青橘皮湯浸去白焙甘草炙剉五味子山芋桔梗去蘆頭切焙枳殻去穰麩炒㯽榔生剉各一兩白术桂去麄皮芍藥各半兩右為末鍊蜜和丸如雞頭大每服一丸含化益智太乙丸出聖濟總録治風驚邪及一切風舌强語澁昏迷恍惚化痰金箔一分同丹砂研珍珠一分研丹砂研一兩半同金箔研令匀瑇瑁鎊一兩阿膠炙令燥一兩龍腦研半兩雄黃研琥珀搗研各一兩麝香硏牛黃研各半兩安息香二兩酒研濾去滓入銀器中更用蜜二兩於重湯熬成膏為用右除安息香外各細搗研訖再同研令匀細候熬安息香膏稀稠得所即將前藥入在膏内不住以槐枝攪令得所可丸即丸如梧桐大每服一丸細嚼人參湯下如卒中惡用童子小便化下三丸如中風用酒化下五丸小兒風痰及驚癎以薄荷湯化下半丸鎮心丸出聖濟總録治風驚邪冐鬱煩悶伸欠倦怠化利風涎銀五十片水銀黑錫各半兩同水銀結砂子與銀共研龍齒人參遠志去心麝香研丹砂研犀角鎊牛黃研各半兩虎睛一對酒浸一宿炙微黃佳右為末再同研匀鍊蜜和丸梧桐子大每服三丸荆芥湯下食後臨卧服風引湯一名石散出聖濟録治驚邪風癎厥癲口有涎沫牽引口眼手足少小驚瘛瘲日數十發醫所不治大黃剉炒乾薑燒龍骨各四兩桂去麄皮三分甘草炙牡蠣各半兩凝水石赤石脂白石脂紫石英滑石各一兩半右㕮咀如麻豆毎服三錢水一盞煎至七分去滓温服日再一方有石膏末百日小兒服一合未能者綿沾著口中熱多者日四五服以意消息深師方只龍骨乾薑牡蠣滑石白石五味大丹砂丸出聖濟總録治風痰熱氣安魂定魄鎮心神丹砂研半兩牛黃硏一分金箔二十片研銀箔二十片研龍腦研一分硼砂研琥珀研各一錢甘草炙剉為末犀角鎊為末羚羊角鎊為末各一分右再同研細鍊蜜和丸如雞頭大每服一丸至兩丸熱水嚼服之茯神湯出聖濟總録治風驚調心氣安神志化痰止煩渇茯神去木人參各一兩白蘚皮一分麥門冬去心焙三分枳實麩炒羚羊角屑甘草炙剉龍齒各半兩防風去义三分黃芩去黑心一分右麄搗篩每服三錢水一盞入竹葉十片煎至七分去滓食後臨卧温服追風散出聖濟總録治風驚邪分涎利膈安神鎮心乾蝎去土首尾全者四七枚去爪生用附子炮炒去皮臍烏頭生去皮臍白附子生天南星生各一分丹砂研一錢半麝香研半錢龍腦研半錢半夏生薑汁浸一宿切焙一分右搗研散入龍腦麝香丹砂再同研令匀細入瓷盒中盛毎服半字煨葱白酒調下日二三服漸加至一字覺體麻即减服小兒驚風服半字許桃花散出聖濟總録治諸風驚麻黃去根節天南星炮白附子炮附子炮裂去皮臍烏頭炮裂去皮臍各一兩丹砂研麝香研各一兩乾蝎去土一兩生用右為散每服半錢薄荷温酒調下一切風用葱酒調下小兒每服一字薄荷蜜水調下銀粉丸出聖濟總録治風化痰定心氣粉霜半兩天南星炮一兩半鉛白霜半兩半夏湯洗七遍丹砂研一兩白礬熬令汁枯半兩水銀半兩鉛半兩二味結砂子右為末再和匀用白麵糊為丸如梧桐子大每服五丸薄荷水下小兒丸如麻子大遠志丸出聖濟總録定心忪化風痰治昏虚定神魂遠志去心人參白茯苓去黑皮山芋凝水石研碎各一兩右為末用白麵糊為丸如梧桐子大每服二十丸人參湯下加至三十丸安神散出聖濟總録治風邪丹砂研鐵粉研各半兩白茯苓去黑皮為末一錢右同研令極細每服半錢鵝梨汁調下磨刀水亦得風驚悸論夫風驚悸者以心不足為風邪所乘神魂驚怖不已則悸動不寧其證目睛不轉不能呼是也或因恐懼憂廹致損心氣驚悸者亦緣風邪搏之故耳診其脉動而弱動則為驚弱則為悸不可不察方鹿髓煎丸出聖濟總録治久積風熱發積驚悸氣滿不安四肢虚弱不生肌肉鹿髓五合生天門冬汁三合濾清酒五合牛髓五合無牛髓牛酥一升代白蜜七合棗膏五合生地黃汁一升濾生麥門冬三合濾已上藥八味先煎地黃天門冬汁清酒五分可减二分次内麥門冬汁煎二十沸次内酥髓白蜜棗膏煎如調陽餹傾入銀器或石器中復於重湯上煮攪如調膏即如後傾藥味茯神去木龍骨人參各一兩枳殻去穰麩炒細辛去苗葉防風去义白术石斛去根桂去麄皮芎藭黃耆炙剉五味子各三分甘草炙剉一兩半陳橘皮湯浸去白焙厚朴去麄皮生薑汁炙山芋各半兩山茱萸并子用栢子仁炒各三分枸杞子三分遠志去心黃連去鬚各半兩薏苡仁炒㯽榔剉各三分右除八味為煎外搗羅為末入在煎中和搗令匀丸如桐子大每服二十丸加至三十丸以温酒送下空心日午後夜卧服之薯蕷煎方出千金方薯蕷二十分甘草十四分生地黃十八斤搗絞取汁煎令餘半澤瀉人參黃芩各四分當歸白歛桂心防風麥門冬各三兩山茱萸桔梗芍藥紫苑大豆黃卷乾地黃白术芎藭乾薑蜀椒已上二十味並用搗篩極細大棗八十枚麻子仁研三升麞鹿雜髓鹿角膠八兩桑根白皮五斤忌岡上自出土者大毒近籬屋垣墻溝瀆邊者不用蜜三升右以清酒二斗四升煮桑白皮麻子仁棗得一斗去滓次下地黃汁膠髓蜜煎减半内前諸末併煎令可丸如雞子黃大每服一枚日三稍加至三丸薯蕷丸出千金方治頭目眩冐心中煩鬱驚悸狂癲薯蕷二十八分甘草二十分鹿角膠大黃豆卷桂心各七分乾地黃神麯當歸人參各十分麥門冬防風黃芩芍藥白术各六分柴胡桔梗茯神杏仁芎藭各五分白斂乾薑各三分大棗一百枚取膏右搗細羅為末合白蜜棗膏和丸如彈子大先食服一丸日三服之鎮心丸治熱風驚悸安心久服長年茯神人參龍齒研升麻石膏研黃芩茯苓麥門冬各八分去心銀二百片研虎睛一具炙枳實炙白斂元參芍藥葳蕤甘草炙各六分生薑二分右搗篩蜜和丸每食訖少時以飲服如梧桐子大十五丸日二服之漸加至三十丸不利食海藻菘菜酢蒜麵粘食陳臭等物薯蕷湯出千金方治心中驚悸而四肢緩頭靣熱心胸痰滿頭眩冐如欲摇動者薯蕷麥門冬人參各四兩生地黃前胡芍藥各八分枳實遠志生薑各三分茯苓茯神各六分半夏五分甘草黃芩竹葉各二分秫米三分右㕮咀取江水高舉手揚三百九十下量取三升煮米减一斗内半夏復减九升去滓下藥煮取四升分四服無江水處以千里東流水代之拔手令上頭也秦中無江水涇渭水亦可防風湯出千金方服前湯後四體尚不凉冷頭目眩轉者服之此湯大凉宜長將服藥中小小消息隨冷暖耳仍不除差者依此方防風石膏人參赤石脂白石脂生薑龍骨寒水石茯苓各三分桂心二分紫石一分右㕮咀以水八升煮取三升分三服石膏丸出聖濟總録治中風邪驚悸心不安石膏碎麥門冬去心焙龍齒别研人參升麻元參茯苓去木黃芩去黑心各一兩銀箔一百片與石膏龍齒同研枳殻去穰麩炒三分白斂剉赤芍藥葳蕤各一分虎睛一對炙甘草炙剉半兩右除别硏外搗羅為末和匀鍊蜜和丸如梧桐子大服三十丸米飲下日三金箔十珍丸治心驚悸頭目不清金箔五片銀箔五片丹砂與金銀箔同研一兩珍珠别研琥珀别研瑇瑁鎊犀角鎊各一分硼砂别研龍腦别研各一分牛黃别研半錢人參白茯苓去皮各一兩紫河車二兩茯神去木半兩甘草生剉一兩右除别研外搗羅為末和匀鍊蜜和丸如雞頭實大每服一丸嚼破竹葉湯下食後臨卧服丹砂丸治風虚驚悸心神悶煩睡卧不安丹砂一兩細研水飛鐵粉一兩細研金箔五十片細研銀箔五十片細研人參一兩半去蘆頭茯神二兩秦芁一兩去苗川升麻一兩子芩一兩龍齒木香枳實麩炒微黃各一兩甘草半兩炙微赤剉白蘚皮一兩麥門冬一兩半去心焙右搗羅為末入别研了藥更研令匀鍊蜜和搗五七百杵丸如梧桐子大每服不計時候以荆芥湯下二十丸忌生血等大定心丸治恍惚驚悸心神不安或風邪因虚入臟語言喜忘胸脇痛不得飲食人參桂心各二兩白术防己茯苓乾薑防風大黃茯神桔梗白斂各一兩牛膝十銖遠志三兩去心銀屑六銖右治下篩以蜜丸如梧桐子大先食服五丸日三不效稍稍增之一方無牛膝有茱萸一兩銀屑十銖餘悉同忌生葱酢猪肉桃李雀肉等大竹瀝湯治大虚風氣入腹拘急心痛煩悶恍惚迷惑不知人或驚悸時怖吸吸口乾濇濇惡寒時失精明歷節疼或緩或不攝産婦體虚受風惡寒慘慘憤憤悶心欲絶者并療風痙口噤不開目視如故耳亦聞人語心亦解人語但口不得開項背強反折百脉掣痛悉主之秦芁防風茯苓人參各二兩茵芋烏頭炮黃芩乾薑當歸細辛白术各一兩天雄一枚炮甘草三兩炙防己二兩右㕮咀以竹瀝一斗水五升煮取四升分服一升羸人服五合佳壮人痺可多服也茵芋有毒令人悶亂目花虚人可半兩良風輕者用竹瀝三升水七升小童者竹瀝五升水五升風大劇停水用竹瀝一斗忌海藻酢生菜菘菜桃李雀肉等牛黃丸治風驚悸心風狂亂牛黃一分細研硃砂三分細研天竺黃半兩細硏龍腦一錢細研木香一分白附子一分炮裂犀牛屑半兩天南星一分炮裂􅀈􅖉半分微炒去足鉛霜一分細研人參三分去蘆頭茯神三分天麻半兩防風半兩去蘆頭右搗羅為末入研了藥都研令匀鍊蜜和搗三二百杵丸如菉豆大每服不計時候以荆芥湯下二十丸忌生血茯神湯治風驚五臟大虚驚悸安神定志方茯神防風各三兩人參遠志甘草龍骨桂心羌活各二兩白术一兩細辛乾薑各六兩酸棗一升右㕮咀以水九升煮取三升分三服遠志散治中風心氣不足驚悸言語謬誤恍惚憒憒心煩悶耳鳴遠志黃耆茯苓白者甘草芍藥當歸桂心一方無麥門冬人參各二兩獨活四兩生薑五兩附子一兩右㕮咀以水一斗二升煮取四升每服八合人羸服三合日夜一又一方有羚羊角無附子金箔丸治中風驚悸安神定氣金箔三十片銀箔三十片丹砂與金銀箔同研一兩牛黃别研一分鐵粉别研一兩胡黃連去苗一分鉛霜别研一分天竺黃别研半兩龍齒别研半兩麝香别研一分龍