之令藥與食相遠恐藥相犯少力故也一方治風厥無雌雞血并心肝龍骨湯出聖濟總録治風驚恐神魂錯越不得安定若驚憂怖廹逐或驚失財或激憤惆悵致志氣不樂龍骨遠志去心茯神去木防風去义牡蠣去黑鞭令碎各一兩甘草炙剉半兩右麄擣篩每服五錢以水二盞大棗二枚去核同煎去滓取一盞空心午時各一服日日服之取差茯神丸出聖濟總録治風驚恐志意不定五臟不足甚者憂愁恐懼悲傷不樂忽忽善忘朝差暮發甚則狂眩茯苓去木菖蒲九節者去鬚節用米泔浸切炒乾遠志去心白茯苓人參剉三分牛黃研一分右先將五味擣羅為末然後入牛黃同研再羅鍊蜜為丸如桐子大毎服温酒下二十丸毎食後良久及夜卧時服鐵精散治驚恐忘言或見邪魅恍惚不自覺發作有時或如中風鐵精茯苓芎藭桂心蝟皮炙各三兩右擣下篩以酒服錢五匕日三不知稍增至一錢以上知之為度忌酢物生葱白薇湯出聖濟總録治風驚恐四肢牽掣神志不寧或發邪狂呌妄走見鬼若癲癎狀白薇焙乾細辛去苗葉各一兩半龍齒搗末三兩杏仁去皮尖雙仁炒八十枚右擣篩每服五錢以水二盞煮取八分去滓温服空心午時夜卧各一風熱盛實即入竹瀝少許攪匀服茯神丸主心氣不定五臟不足甚者憂愁悲傷不樂忽忽喜忘朝差暮劇暮差朝發則狂眩加茯神名茯神丸不加茯神為定志丸二分合少可兩度合方菖蒲遠志去心茯苓各二分人參三分右擣篩服方寸匕食後日三蜜和丸如桐子大服六七九日三又得一方加茯神一兩半牛黃五銖為六物茯苓遠志菖蒲各一兩忌酢物羊肉餳豆汁煎治中風驚悸恍惚方見卒中風類鎮心湯出千金方治風虚勞冷心氣不足喜忘恐怖神志不定防風當歸大黃麥門冬各五分此味一云五兩澤瀉大豆卷白歛各四分此味一云三兩菖蒲人參桂心桔梗遠志薯蕷石膏三分紫苑乾薑茯苓各二分一云各三兩白术甘草各十分糯米五合大棗五兩附子茯神各二兩秦芁六分右㕮咀以水一斗二升先煮粳米令熟去滓内藥煮取四升分服八合日三夜一一方不用粳米蜜丸桐子大酒服十丸加至二十丸風恍惚論夫風恍惚者以風邪經於五臟其神恍惚而不寧也蓋五臟處於内神之舎也臟氣充足神正而昌則邪不得入肝臟氣虚損邪能乘之則精神魂魄意無所持守故恍惚不寧也五臟處於内而氣行於外臟氣實者邪不能傷虚則外氣不足邪乘之然五臟心為神肝為魂肺為魄脾為意腎為志若風氣經之是邪干於正故令恍惚也方定心丸治心虚憂愁不樂悸心忪恍惚忘誤神情不寧茯苓去黑皮茯神去木各一兩琥珀另研龍齒阿膠炙令燥牛黃别研珍珠别研犀角鎊龍腦别研麝香别研各半兩天南星牛膽内匱者甘草炙剉各一兩半遠志去心一分金箔三十片為衣銀箔三十片研入藥菖蒲酸棗仁炒天竺黃别研人參各三分虎睛一對酥炙丹砂别研四兩龍膽半分雄黃别研二兩蘇合香二兩安息香二兩同蘇合香以酒一大盞研化澄去沙脚熬成膏右除别研外搗羅為末和匀以安息香膏同鍊蜜為丸如雞頭大每服一丸麝香湯化下早晩食後臨卧服牛黃紫雲丸治恍惚徤忘心神不寧解煩燥清頭目鎮心安神牛黃别研麝香别研龍齒三分丹砂别研三分遠志去心天竺黃别研黃芩去黑心三分甘草炙剉一兩甘菊花擇半兩龍腦别研各一分馬牙消别研半兩茯苓去黑皮一兩銀箔十五片研入藥金箔十片為衣鐵粉别研一兩右為末和勻鍊蜜丸如小彈子大以金箔為衣每服一丸早晩食後荆芥湯嚼下薄荷湯亦可防風散治風虚恍惚多痰暈悶不欲飲食防風半兩去蘆頭茯苓一兩羚羊角屑芎藭各半兩人參三分去蘆頭細辛桂心枳實麩炒㣲黃半夏湯洗七徧去滑各半兩山茱萸天麻各三分龍齒一兩甘菊花甘草炙微赤剉各半兩右搗麄羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服忌羊肉飴湯牛黃散治風恍惚狂亂驚悸牛黃一分細研防風三分去蘆頭白殭蠶半兩微炒硃砂三分細研遠志半兩去心黃連三分去鬚元參川升麻各三分天門冬一兩去心焙犀牛角屑三分天竺黃半兩細研白龍腦一錢細研右搗細羅為散入研了藥都研令匀每服不計時候煎竹葉温水調下一錢忌生血猪肉魚肉等茯神散治風恍惚心神煩亂志意不安或卧驚恐茯神一兩麥門冬一兩半去心焙龍齒二兩黃耆一對剉甘草炙微赤半兩剉石菖蒲人參去蘆頭各一兩防風三分去蘆頭遠志半兩去心熟乾地黃一兩石膏二兩羚羊角屑一兩右搗為麄羅為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候温服羚羊角散治風恍惚妄語多言夜不得寐羚羊角屑黃耆各三分熟乾地黃酸棗仁微炒茯神鐵粉各一兩防風半兩去蘆頭黃連三分去湏麥門冬一兩去心焙黃耆遠志去心甘草炙微赤剉各半兩右擣麄羅為散每服三錢以水一中盞煎至六分去滓不計時候温服良人參丸治心中時恍惚不定者上黨人參鬼臼鐵精牛黃丹砂雄黃大黃菖蒲防風各一兩蜥蜴赤足蜈蚣各一兩枚右為末蜜丸如桐子大用菊花酒服七服日三夜一稍加之合藥勿用青紙忌婦人青衣人喪孝不具足人及濁穢六畜雞犬鼠等見鐵粉丸治風邪驚經五臟令人恍惚坐卧不安鐵粉細研茯神各一兩遠志半兩去心人參一兩去蘆頭防風三分去蘆頭麥門冬一兩半去心焙羚羊角屑桑螵蛸微炒各三分龍齒一兩熟乾地黃一兩硃砂一兩細研水飛過右為末入研了藥令匀鍊蜜和搗三五百杵丸如桐子大每服不計時候以清粥飲下二十丸忌生血丹砂鎮心丸治風驚悸或憂愁思慮心神恍惚狂言煩悶口眼喎斜化痰涎利咽膈丹砂别研一兩牛黃别研龍腦别研麝香别研各一錢鉛白霜别研天竺黃各二錢天麻酒炙二兩人參茯苓去黑皮甘草炙剉各半兩右為末和勻鍊蜜丸如雞頭大每服三丸煎金銀薄荷湯化下食後臨卧服石菖蒲丸治風虚安寢寐鎮心神止恍惚化痰滯石菖蒲遠志去心鐵粉别研丹砂别研各二兩白茯苓去黑皮人參各一兩半防風去义羚羊角鎊各三分金箔五十片三十片入藥二十片為衣右為末和匀鍊蜜丸如梧桐子大每服十五丸至二十丸煎人參湯下早晩食後服粥飲服亦得丹砂煎出聖濟總録治心神恍惚化痰涎利咽膈丹砂别研真珠别硏犀角鎊瑇瑁鎊阿膠炙燥各一兩龍腦别研麝香别研各一錢右為末和匀用安息一兩湯一盞化去粗石入蜜二兩一處於重湯内煮令化然後下前五味末熬成膏候冷方下腦麝末攪勻入甆合内每服一皂子大用温薄荷湯化下丹砂茯神丸出聖濟總録治神志不寧風虚恍惚鎮驚悸補不足丹砂别研茯神去木人參各一兩乾蝎二十一枚全者去毒炒牛黃别研半兩右為末和匀鍊蜜丸如梧桐子大毎服十丸温金銀薄荷湯下人參湯化亦得伏龍肝湯出聖惠方治中風心煩恍惚或腹中痛滿或時絶而復甦取竈心土五升搗為末以冷水八升和之取汁服之口噤者以竹筒灌之得下即愈鹿角散出聖濟總録治諸臟虚邪夜卧恍惚精神不安用鹿角鎊三兩搗羅為散每服一錢匕温酒調下日三服羚羊角散出聖惠方治諸臟虚邪夜卧恍惚精神不安用羚羊角鎊微炒一兩搗羅為散每服一錢匕温酒調下日三服亦治風心煩恍惚腹中痛或時悶絶而復甦豆汁煎治風毒攻心煩燥恍惚方見卒中風類治風恍惚妄語多言夜不得寐出聖惠方用荆瀝毎服一小盞宜類服治風虚心氣驚弱恍惚失常忽嗔恚愁志意不樂出千金方紫石英白石英乾地黃一本無硃砂龍齒附子細辛天雄茯苓人參遠志乾薑白术桂心防風各一兩右治下篩酒服兩方寸匕日三治風虚滿頸項强心氣不定不能食方出千金方茯神麥門冬各四兩人參羌活遠志當歸甘草紫石英五味子各二兩半夏防風黃耆各三兩生薑五兩酸棗三升右㕮咀以水一斗三升煮酸棗取一斗去棗肉餘藥煎取三升半一服七合日三夜二防風湯治風虚肢體微熱恍惚狂言來去無時不自知覺南方支法存所用最得力温和不損人勝於續命越婢風引等湯治脚弱甚良防風麻黄去節秦芁獨活以上各三兩當歸切焙遠志去心甘草炙漢防己人參黄芩川升麻白芍藥以上各一兩半夏三兩湯洗七徧石膏半兩白术一兩真麝香一分别研候湯成後入右剉細用水一斗二升入生薑三兩切片煎濾取四升清者入麝香攪匀分四五服隨病勢加减初服以厚衣覆取微汗相去如人行十里久更服有熱加大黄一兩炒有冷及心腹痛者倍加當歸并加桂三兩即不用大黄今毎服只取麄末五錢匕水二盞入生薑半分同煎至一盞濾去滓澄清者稍熱服不拘時候普濟方卷一百二
