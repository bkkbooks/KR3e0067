body:
  text: 普濟方卷二十三明周王朱橚撰脾臟門脾胃俱虛夫右手關上脈隂陽俱虛者足太隂與陽明經俱虛也病苦胃中如空狀少氣不足少息四逆寒泄注不已名曰脾胃俱虛也方千金大養脾丸出和劑方治脾胃虛弱停寒留飲膈氣噎塞反胃吐食心胸痞滿脅虛脹胸腹刺痛牽引背膂食少傷多言微氣短口苦舌澀惡心嘔噦喜唾咽酸久病泄痢腸胃俱滑或大病氣不復常飲食無味形容憔悴酒後多痰並宜服常服養脾壯氣多進飲食枳殼神麴陳皮去白麥蘖炒茴香白薑炮縮砂去皮肉豆䓻三稜炮茯苓去皮良薑薏苡仁益智去殼胡椒木香白扁豆丁香白术紅豆藿香去梗山藥苦梗炒人參甘草炙蓬术炮右等分為末煉蜜丸如彈子大每服一粒細嚼白湯送下溫酒亦可空心食前常服養益脾胃大進飲食一方名補中養脾治證同前參附大正氣散治男子婦人虛弱及瘧安後體虛眼昏暗加淨枸杞子揀菊花蕊各半兩常服順氣快脾進美飲食附子一箇炮去皮臍人參去蘆木香不見火藿香葉縮砂仁檳榔白术白茯苓益智仁草果仁煨去殼丁香不見火各半兩陳皮去白粉草炙香附子炒去毛肉桂不見火烏藥炒黃枳殼麩炒去麩青皮去白黃耆擘開鹽水浸一宿沉香不見火厚朴薑製各一兩右為細末羅過每服二錢水一盞薑三片棗二枚煎空心服當歸丸補脾安胃調氣止痛治脾虛寒腰重不舉語音沉鼓痢風傷痛便痢無度當歸酸棗仁乾薑各八分芎藭熟地黃天雄各六兩地骨皮黃耆各七兩大棗二十枚吳茱萸五合甘草秦椒葉厚朴秦艽各四兩桂心防風附子白术各五錢右為末蜜丸如桐子大酒服三十丸加至四十丸日再服人參補虛湯出千金方治脾胃俱虛苦肌寒痛方見胃附門胃虛冷類木香頓散治脾胃虛弱停食不化心腹絞痛腸滑自痢嘔吐膨脹木香不見火縮砂仁良薑炒乾薑炮胡椒陳皮去白紅豆取仁草果仁甘草各三錢白豆䓻仁二錢青皮去白三錢右㕮咀每服三錢水一盞半薑三片棗二枚再以銀器盛所煎藥於重湯內再煎至八分空心熱服蓬术煎丸和劑方治脾胃虛弱久有傷滯中脘氣痞心腹膨脹脅下堅硬胸中痞塞噎氣不通嘔吐痰水不思飲食或心腹刺痛氣刺氣急及療食微酒癖血瘕氣塊時發疼痛嘔噦酸水靣黃肌瘦精神困倦四肢少力又治婦人血氣不調小腹㽱痛並皆治之豬胰一具京三稜蓬莪术一味令煮冷透切焙為末各四兩已上二味同豬胰入硇砂熬膏川棟子去枝山藥檳榔枳殼去穰茴香炒附子炮去皮各二兩硇砂五錢右件碾細莪术末入豬胰以膏同醋糊為丸如桐子大每服十五丸生薑湯下婦人淡醋淡湯下不計時候更量虛實加減常服順氣寬中消積滯化痰飲一方鹽湯或溫酒下參苓壯脾丸一名大養脾丸治脾胃虛弱胸膈飽悶脅肋脹滿心腹刺痛反胃吐食口苦吞酸胸滿短氣肢體怠惰靣色痿黃及中焦痞不任攻擊臟腑虛寒不受峻補或病氣衰食不復常稟受怯弱不能飲食及久病泄痢腸胃虛滑並宜服之人參白术茯苓去皮肉桂去粗皮不見火縮砂仁去皮乾薑胡椒麥蘖神麴山藥白扁豆炒右等分為末煉蜜丸如彈子大每服一丸細嚼白湯下溫酒亦可空心食前常服有神養氣和脾補胃進美飲食百一選方阿膠丸治脾胃怯弱食肉食麵及食生果停滯中焦不能尅化致脹滿腹疼嘔惡不食或利或祕悉主之阿魏酒浸化官桂不見火蓬术炮麥蘖炒神麯炒青皮去白蘿蔔子炒白术百草霜三錢巴豆去殼油三七箇乾薑炮一兩右為末和勻用簿糊丸如菉豆大每服二十丸不拘時薑湯送下麵傷用麵湯下生果傷用麝香湯下參苓白术散出和濟方治脾胃虛弱飲食不進多困少力中滿痞塞心忪氣喘嘔吐泄瀉及傷寒咳噫此藥中和不熱久服養氣安神醒脾悅色順正辟邪蓮肉去皮薏苡仁縮砂仁桔梗炒令身黃色各一斤白扁豆薑汁浸去皮微炒一斤半白茯苓人參去蘆白术山藥各二斤右為細末每服二錢棗湯調下小兒量嵗數加減思食調中丸醫方集成治脾胃久弱三焦不調胸膈痞悶肢體倦怠嘔吐惡心飲食減氣道不勻或吐痰水陳麯炒麥蘖炒半夏麯陳皮去白烏藥各一兩檳榔人參各三分木香沉香各五錢白术二兩五錢右為細末蜜調白麵糊為丸如桐子大每服三十丸食前溫米飲送下啓脾丸百一選方治脾胃虛弱氣不升降中滿痞塞心腹膨脹腸鳴泄瀉不進飲食人參白术青皮湯洗去穰神麯炒麥蘖炒陳皮湯洗去白縮砂仁厚朴去粗皮銼薑製一宿炒乾薑炮已上各一兩甘草炒一兩五錢右為末煉蜜丸如彈子大每服一丸細嚼米飲下食前服補脾胃瀉隂火升陽湯出濟生拔萃方羌活一兩升麻八錢柴胡一兩黃耆一兩人參七錢甘草一兩炙黃芩一兩黃連去鬚酒製五錢炒為末為佐石膏少許長長微用過時去之從權蒼术一兩去皮泔浸銼碎稱右件㕮咀每服稱三錢水二盞煎一盞去滓大溫服早飯後午飯前間日服藥前宜減食宜美食服藥訖忌語話一二時辰許及酒濕麵大料物之類恐大濕熱之物服助火邪而愈損元氣也亦忌冷水及寒涼淡滲之物及諸果恐陽氣不能生旺也宜溫食及薄滋味以助陽氣大抵此法此藥欲令陽氣升浮耳若滲泄淡味皆為滋隂之味為大忌也雖然亦有從權而用如見腎水旺及督任衝脈三脈旺盛則用黃蘖知母先洗訖火炒製加之若分兩則臨病斟酌不可久服恐隂氣盛為害也小便赤或澀當利之大便澀當行之亦從權也得利勿再服此雖立食禁如無可食之物一切禁之則衛氣失所養矣亦當從權而食之以滋胃也升陽益胃湯出濟生拔萃方脾胃虛乏怠惰嗜卧四肢不收時值秋燥令行濕熱少退體重節痛口乾舌乾飲食無味大便不調小便頻數不嗜食食不消兼見肺病灑淅惡寒滲滲不樂面色惡而不和乃陽氣不升故也當升陽益胃羌活五錢柴胡三錢獨活五錢防風五錢以其秋旺故以辛溫瀉之人參三兩炙甘草一兩半夏湯洗一兩此一味脈澀者宜用澤瀉二錢不淋勿用黃耆二兩黃連二兩橘皮四錢去瓤茯苓三錢小便不利渴者宜用白芍藥五錢調和秋旺用人參白术芍藥之類及補肺為脾腎虛則肺最受病故因時而補易為力也右㕮咀每服稱三錢生薑五片棗二枚去核水三盞煎一盞去滓溫服早飯後午間服禁忌如前其藥再加至五錢止服藥後如小便罷而病加增劇是不宜利小便當少茯苓澤瀉若喜食初一二日不可飽食恐胃再傷以藥力尚少胃氣不得轉運升發也須薄滋味之食或美食助其藥力益升浮之氣而滋其胃氣也慎不可淡食以損藥力而助邪氣之降沉也可以小益形體使胃與藥得轉運升發慎勿太勞役使復傷若脾胃得安靜尤佳若胃氣稍強少食果以助榖藥之力經云五榖為養五果為助者此也黃耆人參湯出濟生拔萃方脾胃虛必上焦之氣不足遇夏天氣熱盛損傷元氣怠惰嗜卧四肢不收精神不足兩腳痿軟遇早晚寒厥日髙之後陽氣將旺復熱如火乃隂陽氣血俱不足故或熱厥而隂虛或寒厥而氣虛口不知味目中溜火而視物昏昏無所見小便頻數大便難而厥祕胃脘當心而痛兩脅下痛或急縮臍平故圍如繩束之急或則如刀刺腹難舒伸胸中閉塞時顯嘔噦或有痰嗽口沃白沫舌強腰背脾眼皆痛頭疼時作食不下或食入即飽全不思食自汗尤甚若隂氣復在皮毛之上皆天熱之熱助本病也乃庚大腸辛肺金為熱所乘而作當先救元氣理落庚申之不足人參去蘆五錢炙甘草二分白术五分橘皮五分不去白黃耆一錢如自汗過時更加一錢炒麵三分五味子九箇蒼术五分無汗或自汗多更加五分升麻六分麥門冬五分去心當歸二分酒浸黃蘖酒洗三分右㕮咀都作一服水二盞煎至一盞去滓稍熱服食逺或空心服之忌酒食麵大料物類及過食冷物如心飽悶加黃連二分或三分如胃脘當心痛減大寒藥加草豆䓻仁五分如脅下痛或縮急加柴胡二分或三分如頭痛目中溜火加黃連二分或三分川芎三分如頭目不清利上壅下熱加蔓荆子三分藁本二分細辛一分川芎三分生地黃三分如氣短精神如夢寐之間精神無力加五味子九箇如大便澀滯隔一二日不見者致食少食不下血少血中伏火而不得潤加當歸身生地黃各五分桃仁三枚湯洗去皮尖研令麻子仁泥五分如大便通所加之藥勿再服如大便又不快利者勿用别藥少加大黃煨五分不利者非血結祕而不通也是熱則生風其病人必頭風單血藥不可服加之當服黃耆人參湯藥只用羌活五錢防風五錢二味㕮咀以水四錢煎至一盞去滓空心服之其大便必大走也一服便止如胸中氣滯加青皮薄清香可愛者一分或二分并去白橘皮倍之去其邪氣此病本元氣不足惟當補元氣不當瀉之如氣滯太甚或補藥太過或病心有憂滯鬱結之事更加木香二分白豆䓻仁二分縮砂二分或三分與正藥同煎服如腹不痛不惡寒者加芍藥五分黃芩二分却減五味子升陽除濕防風湯出濟生拔萃方主治大便祕滯或裏急後重數至圊而不能便或少白濃或少有血慎勿利之以舉其陽則隂氣自除矣蒼术泔製四兩防風二錢白术一錢白茯苓一錢白芍藥一錢右㕮咀除蒼术切作片子水一碗半煮至二大盞內諸藥同煎一大盞去滓稍熱服空心食前又方出濟生拔萃方治脾胃久衰體重肢節疼痛大便塞小便閉以升陽防風藥治之羌活獨活柴胡升麻一錢防風根截五分甘草根截五分右㕮咀水四中盞煎至一盞去滓稍熱服之即愈益氣湯出濟生拔萃方治白樞判素有脾胃虛損證目痰時作面目睛俱黃小便或黃或白大便不調飲食減少氣短氣上怠惰嗜卧四肢不收六月中目疾作以散肝散下數劑而行疾增劇豫謂大黃牽牛雖能除濕熱而不能經絡下咽不入肝經大黃苦寒重虛其胃牽牛味辛能瀉氣重虛肺本嗽大作蓋標實不去本虛愈甚適當暑雨黃證增劇於脾胃肺中瀉外經中之濕熱防風三分生薑五分蒼术三分茯苓二分澤瀉三分升麻二分此藥能走經除濕熱而不守本故不瀉本臟補肺與脾胃本中氣之虛弱橘皮二分青皮一分人參五分甘草生二分白术二分白芍藥二分此藥皆能守本而不走經者不滋經絡中邪守者能補臟之元氣也五味子三分麥門冬二分人參二分黃蘖一分此藥去時令浮熱濕蒸右件銼如麻豆大都作成一服水二盞煎至一盞去滓稍熱空心服之製半夏天麻白术湯出濟生拔萃方治脾胃證時煩躁胸中不利大便不通以藥利數行復添吐逆食不能停痰喘稠粘湧出不止眼黑頭旋惡心煩悶氣短促上喘無力不欲言心神顛倒目不敢開如在風霧雲中頭痛如椎身重如山四肢厥冷不得安卧蓋因胃氣已損復下兩次則重虛其胃而痰厥頭痛作矣宜服此天麻五分人參五分白术一錢蒼术五分橘皮五分半夏一錢半洗七次黃耆五分澤瀉五分炒麯一錢乾薑三分黃蘖二分大麵蘖麯一錢五分右㕮咀每服半兩水二盞煎至一盞去滓大熱服食前此頭痛苦甚謂之足太隂痰厥頭痛非半夏不能療眼黑頭旋非天麻不能除黃耆甘溫瀉火補元氣人參甘溫瀉火補中益氣二术甘苦溫除濕補中益氣澤瀉茯苓利小便導濕橘皮苦溫益氣調中升陽麴消食蕩胸中滯氣大麥蘖麴寬中助胃氣乾薑辛熱以滌中寒黃蘖大苦寒酒洗以主冬天少火在泉發燥也人參芍藥湯出濟生拔萃方治脾胃虛弱氣促憔悴人參三分黃耆一錢五味子五箇白芍藥一錢炙當歸身三分麥門冬一錢右㕮咀水一盞半煎一盞去滓稍熱服之升陽湯一名黃耆補胃湯治一日大便三四次溏而不多有時泄瀉腹中鳴小便黃黃耆三錢一分甘草二錢升麻六分柴胡三分橘皮三分益智仁三分當歸身三分紅花少許右㕮咀分作二服每服水二大盞煎至一盞去滓稍熱服食前升陽除濕湯出濟生拔萃方治脾胃虛弱不思飲食腸鳴腹痛泄瀉無度小便黃四肢困弱並宜服之陳皮三分升麻柴胡神麴防風各五分蒼术一錢甘草三分羌活五分大麥蘖麵三分如胃寒臍鳴者加澤瀉三錢益智五分半夏五分生薑三片棗三箇同煎至半服之非常腸鳴不用右㕮咀作一服水三盞煎至一盞去滓空腹服益胃湯出濟生拔萃方治頭悶勞動則微痛不喜飲食四肢怠惰燥熱氣短口不知味腸鳴大便微溏黃色身體昏悶口乾不喜飲食黃耆二分甘草二分黃芩三分當歸梢五分蒼术一錢五分陳皮五分升麻五分白术三分人參三分半夏二分益智仁二分右㕮咀作一服水一大盞煎一盞去滓稍熱服食前忌飲食失節生冷硬物酒食麵一方紅花少許名人參益胃湯生薑和中湯出濟生拔萃方治食不下口乾虛渴四肢困倦柴胡二分藁本半分羌活七分升麻三分蒼术一錢黃芩二錢生用酒黃芩二分生甘草二分炙甘草二分橘皮二分人參五分白术五分葛根五分右㕮咀水二盞生薑五片棗二枚擘開煎一盞去滓稍熱服之食前養胃方醫方集成治脾胃虛寒嘔逆惡心腹肋脹痛腸鳴泄瀉或外感寒熱如瘧骨節煩疼並治之不得卧淅淅惡風灑灑惡寒唇口乾面目虛浮不思飲食藿香去梗厚朴薑製半夏湯洗茯苓各一兩人參三分白术五錢甘草二分炙草果五錢附子炮陳皮各三分去白右㕮咀每服四錢以水一盞生薑五片棗子二枚烏梅半箇煎服之常服溫胃消痰下氣除寒疫草豆䓻丸出濟生拔萃方治脾胃虛而心火乘之不能滋榮上焦元氣遇冬腎與膀胱之寒水旺時子能令母實致肺金大腸相輔而來尅心乘脾胃此大復其讎也大勝心不復故皮毛血脈分肉之間元氣已經於外又大寒大燥二氣并乘之則苦惡風寒耳鳴及腰背相引胸中而痛鼻息不通不聞香臭額寒腦痛目時眩不能開腹中微寒水反乘痰唾沃沫食入反出腸痛及胃痛脅下急縮有時而痛腹不能弩大便多瀉而少祕下氣不絶或腹鳴此脾胃虛之極也胸中氣亂心煩不安而為霍亂之漸膈咽不通噎塞極則有聲喘急閉塞或日陽中暖室中稍緩口吸寒風則復作四肢厥逆身體沉重不能轉側頭不可以回顧小便溲而時燥此藥主秋冬寒涼大復氣之藥也草豆䓻仁一錢四分麵裹煨熟用仁吳茱萸八分湯洗去蘆焙乾橘皮八分益智仁八分白殭蠶八分生甘草六分熟甘草六分青皮六分桃仁浸洗去皮尖六分澤瀉一分小便數加減半黃耆八分半夏一錢湯洗神麯四分人參八分薑黃四分麥蘖麵一錢五分炒當歸身六分柴胡二分或四分詳脅下多少用右為細末桃仁另研如泥一處研勻湯浸麵蒸餅為丸如桐子大每服三五十丸白湯送下斟酌加減麯术丸一名椒麯丸治脾氣久虛不進飲食停飲脅痛腹脹滿臟腑虛滑止而復痛痼冷傷寒久不愈神麯白术五兩乾薑官桂辛辣者吳茱萸炒紫川椒各三兩右為細末薄糊丸如桐子大每服三五十丸生薑湯下食前空心服有飲加半夏麯二兩癸亥中豫作數劑自服飲食倍進方用米飲下醫方集成方二神丸治脾腎虛弱食不進泄瀉不止破故紙四兩炒肉豆䓻二兩生右為細末用大肥棗為丸四十枚生薑四兩切片同煮棗爛去薑取棗剝去皮核用肉研為膏入藥和杵丸如桐子大每服三十丸鹽湯下有人進不得食服補脾藥皆不效豫受此方服之頓然能食此病不可全作脾虛蓋腎氣怯衰弱真元衰劣自是不能消化飲食譬鼎釜之中置諸米榖下無火力雖終日米不熟其何能化嘗記服兔絲子淨淘酒浸曝乾日炒數時以酒下十日外飲噉如湯沃雪亦知此理也又方以前方內加木香五錢茴香一兩名四神丸又方以前方內加神麯麥蘖各一兩名四神丸補脾散治脾泄不止食積不消癥瘕塊結大腸滑泄臟腑不利腹痛腸鳴麥蘖三兩炒神麯二兩炒茴香炒草果逐箇用麵裹煨熟厚朴製乾薑炮陳皮各一兩木香生五錢甘草五錢炙右為末脾泄瀉訶子湯入鹽調下二錢脾虛腸鳴氣不和瀉不止炒薑酒調下常服鹽湯點空心食前服黃耆補中湯黃耆一錢人參八分甘草五錢炙白术五錢蒼术五錢陳皮五錢澤瀉三分豬苓三分茯苓三分右㕮咀用水二鐘煎至七分去滓大溫服下和中丸御藥院方治脾胃怯弱隂陽不和三焦氣澀心腹痞悶嘔逆痰甚頭目不清困倦少力飲食減少肌體憔悴肢節煩疼常服中和順氣升降隂陽消痰止嘔長肌起困進美飲食藿香葉去土人參陳皮用巴豆二錢五分炒焦不用巴豆各一兩丁香五錢白术白茯苓去皮半夏湯洗生薑汁浸各二兩右為細末水煮麵糊為丸如桐子大每服五十丸食前煎生薑湯下方用生薑自然汁打糊為丸食後米飲湯下燒胃丸一名八味厚朴丸治脾胃虛冷疼痛泄瀉方見本門脾胃虛冷水榖不化類八味理中丸百一選方治脾胃虛弱胸膈痞脹腹滿時痛身重四肢不舉嘔吐痰水腸鳴泄瀉飲食不化白术四兩川薑縮砂仁麥蘖各二兩人參神麯白茯苓各一兩甘草各一兩五錢右為細末煉蜜丸每服分作十丸薑湯空心嚼下或加半夏麯一兩入鹽點服亦得名八味理中丸養生要藥緩急便得篋中常貯不可無之其丸者得蜜而潤入脾為快溫補為宜若以蕩滌寒邪袪逐冷積則湯為健且免蜜之殢脾也治腹脹善噫食則欲嘔泄澼溏下口乾四肢重好怒不欲聞人聲忘誤喉痺補之出千金方黃連一兩禹餘糧二兩白术乾薑各三兩大麻子五兩桑白皮八兩大棗二十枚右㕮咀以水一斗煮取三升分四服蘇橘丸人參一兩五錢橘紅一兩砂仁一兩紫蘇葉二兩五錢乾生薑七錢甘草七錢五分茯苓一兩五錢右為細末煉蜜為丸每兩分五丸細嚼熱水下一丸治中湯出和劑方治脾胃不和飲食減少短氣虛羸而復嘔逆霍亂吐瀉胸脾心痛逆氣短氣中滿虛膈塞不通或大病瘥後胸中有寒時加咳嗽並宜服之又治大隂傷寒手足溫自利不渴腹滿時痛咽乾其脈尺寸俱沉細人參去蘆甘草炒乾薑炮白术銼青皮炒陳皮洗去白各二兩右為細末每服三錢水一盞半煎至中盞去滓稍熱入鹽點服空心或霍亂氣未禁熱藥者尤宜服之一方若胃脘有寒痰浮於上嘔吐不已者半夏等分丁香減半名丁香溫中湯木香消榖丸御藥院方治脾胃俱虛不能消化水榖胸膈痞悶腸脅時脹連年纍月食減嗜卧口苦無味虛羸少氣又治胸中有寒飲食不下翻胃惡心霍亂嘔吐及病後心虛不勝榖氣或因病氣衰食不復常並宜服之木香五錢青皮洗淨焙乾陳皮洗淨焙乾各四兩桂去粗皮乾薑炮各二兩牽牛八兩半生半熟右為細末水煮麵糊為丸如小豆大每服五十丸加至七十丸米飲日進二服不拘時候加減思食丸御藥院方治脾胃俱虛不消化水榖胸膈痞悶腹脅時脹連年纍月食減嗜卧口苦無味虛羸少氣又治胸中有寒飲食不下反胃翻心霍亂嘔吐及病後心虛不勝榖氣或因病氣衰食不復常並宜服之神麯炒黃大麥蘖各五錢炒黃烏梅四兩乾木瓜五錢切白茯苓去皮揀甘草細銼炒各二兩五錢右為細末煉蜜為丸如櫻桃大每服一丸細嚼白湯下不拘時候如渴時含化一丸生津液進飲食治脾胃虛熱豬皮陳橘皮紅生薑人參䓤白右切擘之合陳米水煮如羮去橘皮空腹服之消食丸和劑方治脾胃俱虛不能消化水榖胸膈痞悶腹脅膨脹連年纍月食減嗜卧口苦無味虛羸少力又治胸中有寒飲食不下反胃翻心霍亂嘔吐及病後心虛不勝榖氣或因病氣衰食不復常並宜服之烏梅去核焙乾乾薑各四兩炮小麥蘖三兩炒黃神麯六兩二錢搗末炒右為末蜜和為丸如桐子大每服十五丸加至二十丸米飲下日進二服不計時一方不用蜜以蒸粟米飯為丸四炒丸瑞竹堂方治脾胃虛弱脾土不能化痰成窠斗停於胸臆飲食既少復遲當以實脾土痰下氣順肉豆䓻一兩用鹽酒浸破故紙同炒乾燥不用故紙山藥一兩酒浸北五味子同炒五味子乾燥不用五味子厚朴二兩去粗皮靑鹽一兩同炒青鹽以出煙為度不用鹽大半夏一兩每箇切二塊木豬苓亦作片水浸炒燥不用豬苓右為細末酒糊丸如梧桐子大辰砂一分沉香一分作二次上為衣隂乾每服五七十丸空心鹽湯下或米湯鹽酒湯下藿香安胃散出衛生寶鑑治脾胃虛弱不進飲食嘔吐不待腐熟藿香丁香人參各二錢五分陳皮五錢右為細末每服二錢水一盞半薑三片煎至七分去滓冷服食前白术六乙湯出和劑方治脾胃不和心腹痞悶脅肋䐜脹口苦無味嘔噦惡心不思飲食靣色痿黃腸虛自痢肌體瘦弱膈氣翻胃白术去蘆六兩甘草一兩炙右為細末每服二錢水一盞煎至八分空心食前服或沸湯點服育神溫胃逐濕消痰不以四時並宜服之蓽澄茄丸出濟生方治脾胃虛弱胸膈不快不進飲食用蓽澄茄不拘多少為細末薑汁煮神麯末糊為丸如桐子大每服七十丸食後淡生薑湯下治脾胃氣虛食即汗出用豬肝一斤薄片於瓦上曝令熟乾搗篩為末煮白粥布絞取汁和衆手丸如梧桐子大空心米飲五十丸日五服又主脾胃氣冷吃食嘔逆下赤白痢如麵糊一方治心腹虛膨手足厥冷或飲過苦澀涼劑晨朝未食先嘔或聞食即吐不思飲思此乃脾胃虛弱用山藥一味銼如小豆大一半銀石器內炒熟一半生用為末米飲調下自獲其功八味湯出醫方集成治脾胃虛寒氣不升降心腹刺痛臟腑虛滑吳茱萸湯洗七次乾薑各二兩炮陳皮木香去皮肉桂丁香人參去蘆當歸各一兩洗焙右㕮咀每服四錢水一盞煎至七分溫服不拘時厚朴湯出濟生拔萃方治脾胃虛心腹滿及秋冬客寒犯胃時作疼痛厚朴一兩薑製橘皮一兩去白甘草炙乾薑各五兩茯苓一兩去皮右粗散每服五錢水二盞生薑三片煎至一盞去滓溫服食前忌一切生冷之物戊火已衰不能運化又加客寒聚為滿痛散以辛熱佐以苦平甘溫以淡泄之持扶胃氣以期平也白术散出宣論治傷寒下後餘熱以藥下之太過胃中虛熱飲水無力也當生胃中津液多服此人參白术木香白茯苓甘草銼炙藿香葉各一兩乾葛二兩銼右為末每服三錢至五錢水一盞煎至五分溫服如飲者多煎與之無時也如能食而渴白虎湯加人參以服之一方用乾薑和中丸治腹寒若脾胃虛弱宜服補胃進食橘紅一錢人參一錢乾木瓜二錢乾生薑一錢炙甘草三錢右為末蒸餅為丸如桐子大每服三五十丸溫水送下食前朴附丸治脾胃久虛腸滑泄臍腹絞痛腸鳴泄瀉肢體無力此藥補益厚朴五兩去粗皮銼散塊附子一兩銼大塊去皮臍生薑不去皮淨洗切片子青州棗一百箇先將四味用水五升一處煮候水盡揀出棗子外將其餘三味焙乾與後藥同為末人參一兩乾薑一兩炮去皮訶子一兩炮肉豆䓻一兩右七味為末將棗去皮核和藥為丸如梧桐子大每服三十丸早晚食前用陳米飲下法製薑附丸治脾胃虛弱香附子炒去皮毛稱一斤米泔水浸秋冬三日春夏一日疾濾出新水洗浸入銀器中水三碗令香附子上有水寸餘次取大蒜二十頭去皮膜取仁鋪在香附子上慢火煮候蒜如糊即用銀匙不住手攪二三百轉以蒜不見而汁乾為度取出候冷每香附子一箇橫切作四五假慢火焙乾冷入後藥神麯六兩炒黃乾薑四兩炒蓽撥丁香胡椒縮砂仁各二兩炒右為極細末湯浸一宿蒸餅為丸如梧桐子大每服五十丸沸湯亦可下不拘時候浸蒸餅待湯以入蒸餅子稍冷用新布裹包裂去水方可用藥如攪難丸少入麵糊為丸不妨更加淨陳皮二兩用鹽水浸焙乾尤妙如寒多加附子二兩桂一兩周馬帥之祖承奉因靖康初自泗州逃難山陽夜行墜古塜中已先有人在矣至晚各散出於塜外得幅紙裹太平錢八十四文紙上有此藥方云江南土下人弱疾當作於脾外脾元壯實則欲啖美健自然無病壯脾有藥曰法製薑附丸先祖甫弛擔即合此藥無日不服一生無病夀八十四祖母安人服之夀九十六母永國夫人服之夀九十八婆婦僕老皆飲食不減壯年甚妙麴蘖湯出十便良方治脾胃虛弱中脘不健飲食遲化麥蘖一斤神麴四兩半夏一兩甘草茯苓二兩陳皮二兩生薑一斤鹽半斤炒右為細末乾淨以瓶盛三五日令氣味調和方用沸湯點服不拘時此方妙處全在陳皮製令渾無藥味方可辟寒湯出十便良方治脾胃弱嘔逆惡心腹脅脹痛茴香三兩髙良薑二兩丁香一分甘草二兩銼白鹽三兩同甘草炒胡椒五錢右為細末每服一錢沸湯點服不拘時候六君子湯出朱集驗方治脾胃虛弱生風多困人參白术茯苓甘草半夏麴沒石子右等分為末水七分盞入冬瓜子少許同煎膠飴丸出十便良方治脾胃虛弱飲食減少易傷難化無力肌瘦乾薑為細末右以白餳銼如櫻桃大以新水浴過入鐡銚子灰火中煨令鎔和薑末如桐子大每服三十粒空心米飲下水沃雪湯出十便良方治脾胃虛腹脹減食甚者成水氣作水治則愈附子四兩去皮臍切作片子小豆四升水一斗煮令收汁揀出附子末之右以生薑自然汁煮糊為丸如梧桐子大每服三五十丸陳皮湯下團參散出衛生寶方治脾胃虛弱冷氣作痛婦人心痛白术切焙縮砂去殼官桂不見火髙良薑沸湯炮三次切焙以上各二兩人參一兩甘草四兩炙草果去皮訶子炮槌取肉去核舶上茴香炒桔梗切細麵炒各一兩神麯一兩五錢陳橘皮四兩去穰右為細末每服一錢鹽少許烏梅一箇沸湯點服蘇脾散出衛生寶鑑方治脾胃虛弱冷食所傷胸膈不快良薑三錢縮砂一兩去殼陳皮八錢去生白白术五錢甘草一兩草果五錢去殼右為細末每服二錢鹽湯點服如加棗薑煎亦佳進食丸出衛生寶鑑方治脾胃久虛飲食減少腸滑或痢肢體乏力精神痿劣並宜服之肉豆䓻仁一分厚朴五錢去粗皮丁香一分木香一分蓽澄茄一分良薑五錢微炒五味子一分生薑三兩去皮切作小塊子右件以前藥味碾為粗末入切生薑同再拌碾或杵成膏取出入密器內淹一宿次日取出焙乾碾為細末煮粟稠粥為丸如梧桐子大每服三五十丸煎生薑橘皮湯或米飲下早晚食前服之日進三服草果厚朴丸出衛生寶鑑方治脾胃虛弱全不思飲食腹痛滑泄腸胃怯薄關節不通此藥去濕厚腸胃固元臟大進飲食充肌膚去酒毒厚朴二兩五錢去粗皮洗切水煮數十沸曝乾杵細以薑等分研細拌和淹兩宿焙乾陳皮一兩浸一日乾稱不去白乾薑五錢炮草果仁二兩紙裹水浸炮令香熟去皮稱白术五錢洗銼麩炒訶黎勒一兩紙裹水濕煨乾取肉稱桂五錢去粗皮每一兩取五錢淨縮砂仁一兩去殼湯炮洗淨去膜稱右為細末水煮麵糊為丸如梧桐子大每服五六十丸空心食前白湯下整脾丸出衛生寶鑑方治脾氣虛四肢倦怠靣色痿黃飲食減少服之補氣益脾元實臟腑長肌肉駐顔色令百病不生陳皮四兩去穰别為末白麵一兩五錢青鹽四兩南木香一兩不見火益智肉一兩青皮一兩去白焙乾稱京三稜一兩炮蓬莪术一兩炮粉草一兩茴香一兩揀去枝梗右件先將青鹽細研同陳橘皮末以水調作稀糊慢火上煎攪數次入白麵熬成膏和前件藥搗千下丸如桐子大每服三四十丸食前鹽湯溫暖酒米飲任吞下胃風湯出衛生寶鑑方治脾胃久冷心腹脹滿腹痛腸鳴不思飲食川芎一兩白术一兩人參五錢白茯苓五錢五味子一兩訶子三箇濕紙裹煨訶黎勒三箇同前法檳榔二箇官桂五錢去皮川乾薑五錢油塗炙陳皮一兩去白薏苡仁一兩微炒神麯五錢麥蘖五錢甘草五錢炙附子一箇去皮炮製去尖切作片右為細末每服二錢水一盞棗子一箇煎七分溫服厚朴溫中湯出衛生寶鑑方治脾胃虛寒心腹脹滿及秋冬客寒犯胃時作痛厚朴一兩薑製陳皮一兩去白炙甘草五錢乾薑七錢炮草豆䓻仁五錢茯苓五錢去皮木香五錢戊火已衰不能運化又加客寒聚為滿痛散以辛熱佐以苦甘以淡泄之氣和胃和痛自止矣右為細末每服五錢水二盞薑三片煎至一盞去滓溫服食前忌一切生冷之物白茯苓陳皮湯一名緩中丸治脾胃虛弱六脈俱絃而指下虛食少而渴不止心痞腹中或痛或窄狹如繩束之急小便不利大便不調精神短少此藥専治大渴不止腹中窄狹而食減少神效出濟生拔萃方白茯苓陳皮乾薑人參各一兩如脈絃腹中急甚加甘草三錢炙秋減薑一半右為末煉蜜為丸如彈子大每服一丸白湯空心下茱萸丸出朱氏集驗治脾胃虛冷嘔逆醋心脹悶不快大效吳茱萸揀淨三兩酒洗焙黑附子五錢炮製去臍官桂二兩蓽撥一兩胡椒一兩蓽澄茄一兩厚朴一兩蕃製乾薑一兩炮右八件杵為細末煉蜜丸如桐子大每服二十丸食前溫米飲下一日三服甚效正脾散出十便良方治大病之後脾氣虛弱中滿腹脹四肢虛浮狀若水氣此藥主之蓬莪术香附子茴香陳橘皮甘草右等分為細末每服二錢煎燈心木瓜湯調下白豆䓻丸出朱氏集驗方補脾胃虛弱飽則心間虛滿白豆䓻炒縮砂仁炒人參白术茯苓去皮丁香白薑炮粉草麥蘖各一兩炒良薑五錢右為末煉蜜丸如彈子大每服三十丸食前人參棗湯調下烏雞煎丸出朱氏集驗方補脾胃虛弱大附子炮去皮臍川當歸各一兩紅椒五錢白茯苓七錢右為細末用烏雞一隻米醋爛蒸合末為丸如桐子大每服五六十丸空心鹽湯溫酒化下參术湯出蘭室神藏方治脾胃虛弱元氣不能縈於心肺四肢沉重黃耆一錢人參五分炙甘草一錢升麻柴胡各三分酒黃柏二分橘皮青皮各五分麴末七分蒼术一錢當歸二錢右㕮咀都作一服水二大盞煎法如常益智和中丸季秋合益智仁一錢二分黃耆人參各五錢炙甘草二錢五分麥門冬麴末當歸身乾生薑橘皮各五錢草豆䓻仁四錢縮砂仁七分桂花紅花一錢五分麥蘖二錢五分黃連一錢生地黃一錢薑黃二分木香二分右為極細末湯浸蒸餅為丸每服二三十丸溫水送下細嚼亦可煮豬肚散暖脾胃治虛冷補臟進飲食生精血附子炮去皮臍乾薑炮陳橘皮去白甘草炙肉桂去粗皮肉蓯蓉酒浸炙縮砂仁茴香炒肉豆䓻麵裹煨髙良薑蓽澄茄各一兩右件為細末每藥五錢用豬肚一枚去脂水洗三五度入藥在內更以蔥白一莖鹽二錢同入豬肚內以線繫定用淡漿水煮令爛為度切作片子任意食之食前脾胃虛冷水榖不化夫損其脾者調其飲食適其寒溫臟腑充實脾胃和平則能推化水榖而無滯若飲食不節寒溫失宜致脾胃氣弱冷氣乘之則不能腐化水榖而四肢身體無所稟養令人噫氣生熱腫脹膨悶壯熱增寒頭疼如瘧也方礞石丸治脾胃虛寒宿食不化攻脅痛磨氣塊取虛積宜服礞石研乾薑炮蓬莪荗煨銼豬牙皂角炮銼為末芫花醋炒焦桂去粗皮大黃蒸熟銼搗碎末京三稜炮銼搗末硇砂木香肉豆䓻各一兩去殼青皮湯浸去白焙墨燒過白豆䓻去皮檳榔各五錢銼丁香訶黎勒皮胡椒各一分巴豆一兩五錢去皮心研出油右除大黃京三稜并研藥外搗羅為末用醋三升飛硇砂於銀器內慢火熬三十沸次入巴豆又熬十數沸又入京三稜又熬五七沸次入白麵二兩無灰酒半升又熬二十沸次入大黃末又熬五七沸下諸末藥用栁枝攪成膏硬軟得所候冷入臼搗一千杵為丸三等或如菉豆大或如麻子或如黃米每服五丸或七丸生薑湯下量臟腑虛實加減婦人心痛醋湯下丁香丸治脾胃虛寒宿食不消丁香硇砂木香桂去粗皮乾漆炒煙出附子炮製去皮臍蓬莪荗煨銼乳香研京三稜煨銼墨大黃銼炒搗末巴豆霜先稱了取霜芫花醋炒焦沒藥研乾薑豬牙皂莢去皮子炙青橘皮湯浸去白焙右除硇砂大黃巴豆霜乳香沒藥外搗羅為末以鹽醋一升化硇砂去滓入銀器中慢火煎之次下巴豆霜勻兩食久次下大黃末熬成膏拌諸藥更入醋煮麵糊和搗一千杵如麻子大每服三丸至五丸溫酒或熱水下得微利佳更量人虛實加減乳香煎丸治脾胃虛寒心腹痞滿宿食不消乳香沒藥丹砂木香沉香蓬莪荗銼煨枳殼去穰麩炒檳榔烏頭各二兩炮製去皮臍硇砂别研水飛狼毒銼醋炒乾漆各一兩五錢炒煙出阿魏一分醋化去砂石麵和作餅炙楝實四兩取子搗末芫花五錢醋炒焦青橘皮三分湯浸去白炒右除搗羅外將乳香沒藥丹砂别研與楝實末同入銀器內釅醋一升慢火熬成膏都入諸藥拌勻丸菉豆大每服十五丸臨卧溫水下五香丸治宿食不消腹脹膨悶丁香木香沉香安息香乳香硇砂丹砂研肉豆䓻去殼桂去粗皮京三稜煨銼當歸切焙陳橘皮湯洗去白焙檳榔銼蓽澄茄各一分附子五錢炮製去皮臍巴豆十粒去皮心研出油右先將安息香乳香硇砂三味細研用少酒浸良久餘十一味搗羅為末將丹砂巴豆與前三味通研令勻酒煮糊為丸如麻子大每服五丸至七丸熱水下薑湯亦可蓽澄茄散出聖惠方治脾胃虛冷食即欲嘔心腹脹悶水榖不消四肢無力蓽澄茄五錢木香五錢肉豆䓻五錢去皮白术五錢檳榔五錢草豆䓻五錢去皮訶黎勒皮五錢肉豆䓻五錢去殼白茯苓五錢乾薑五錢炮製桂心三分枳殼五錢麩炒微黃去穰丁香五錢陳橘皮五錢湯浸去白炒甘草五錢炙微銼厚朴一兩銼去粗皮塗生薑汁炙令香熟右件藥搗羅為末每服三錢以水一盞入生薑半分棗三枚煎至六分去滓食前熱服沉香煎丸治飲食不消噫氣生熱面黃生熱腑臟不調沉香丁香木香胡椒沒藥丹砂别研水飛髙良薑檳榔麵裹煨熟去麵硇砂别研水飛用石器慢火熬乾青橘皮湯浸去白石硫黃各一兩别研水飛阿魏醋浸去砂石麵和作餅炙縮砂去皮吳茱萸陳者湯洗沸沉者各五錢炒巴豆二錢五分去皮心莫出油右除沒藥外搗羅為末與研藥和勻煉蜜丸如菉豆大用瓷盒貯封每服二丸食前臨卧溫生薑橘皮湯下更量虛實大小加減青木香丸治脾胃風勞冷氣木香一兩五錢厚朴去粗皮生薑炙二兩五錢人參芎藭附子炮裂去皮臍羌活去蘆頭桂去粗皮白术枳殼去穰炒檳榔銼甘草炙銼陳橘皮湯浸去白炒吳茱萸各一兩湯浸焙乾炒黃耆銼熟地黃各二兩焙右為末煉蜜為丸如桐子大空心溫酒下二十丸溫脾丸治脾胃氣弱大腹冷則下痢小腹熱則小便難奔響腹滿喘氣虛乏乾嘔不得食溫中消穀療脾氣法麴熬吳茱萸小麥蘖各五合炒熬枳實三枚炙桂心厚朴當歸茯苓各三兩細辛乾薑麥門冬去心人參桔梗附子各二兩炮甘草三兩炙右搗篩蜜和丸如桐子大空心飲服七丸日三服亦可加大黃二兩忌海藻菘菜豬肉冷水生蔥生菜酢物人參柴胡湯治脾胃不調宿食留滯腹脹發熱嘔逆酸水日漸羸瘦柴胡去苖人參白术赤茯苓去黑皮桔梗炒陳橘皮去白焙五味子當歸切焙細辛去苗葉大黃各一兩銼炒半夏一兩湯洗七次去滑炒乾厚朴三兩五錢去粗皮生薑汁炙黃熟桂去粗皮黃耆各一兩五錢銼右粗篩每服四錢水一盞入生薑一片棗子一枚擘破煎取七分去滓空心頓服日晚再服金液丸治脾胃虛寒宿食不消心腹刺痛不思飲食京三稜煨銼蓬莪荗各二兩五錢煨銼丁香皮銼青橘皮陳橘皮各湯浸去白焙白术各二兩桂一兩去粗皮丁香甘草各五錢炙硇砂三錢别研水飛牽牛子三兩炒黑搗末巴豆四錢去皮心膜研出油存性右為末醋煮麵糊為丸如菉豆大每服七丸至九丸食後米飲茶酒熱水任下薰陸香丸治脾胃虛宿食不消脅肋脹滿胸膈不利心腹刺痛不思飲食薰陸香研沉香人參桂去粗皮白术白豆䓻各五錢去皮木香丁香赤茯苓去黑皮莎草根去毛甘草各三兩炙丹砂另研安息