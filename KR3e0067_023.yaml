粗皮生薑汁炙透焙乾半斤乾薑三兩炮烏頭炮製去皮臍蘹香子炒益智去皮縮砂各四兩去皮甘草三兩炙右銼如麻豆大每服二錢水一盞入棗七枚擘開同煎至七分去滓空心溫服一方用生薑五片同煎去乾薑蛤蚧散治脾胃氣攻心痛者蛤蚧一對酒炙乳香木香白茯苓丁香茴香川山甲二錢右為細末每服一錢好溫酒調空心服丹砂丸出王氏博濟方治宿食不消及治厭食遍身黃腫多年不瘥及一切塊積丹砂硇砂麝香各二分雄黃鉛丹各五錢膩粉二錢研巴豆二十粒去皮心膜出油用醋半盞熬成膏右將六味細研以巴豆和勻入白麵滴水丸如菉豆大每服三丸至五丸用水半盞煮一服取出臨卧酒下至晚但微瀉一二行是驗並不瘦損人臟腑木香枳實丸治心氣脹滿食不消化木香五分枳實二兩去穰麩炒赤茯苓二兩去黑皮訶黎勒皮一兩五錢炮人參三分大黃三兩銼炒郁李仁二兩研右為細末煉蜜丸如桐子大每服三十丸空心溫水下小麝香丸治脾胃不和胸膈痞悶飲食遲化麝香五分研丁香皮銼木香益胃去皮甘菘莎草根去毛蓬莪荗各二兩炮製右除麝香外搗為細末入麝香拌勻以水浸炊餅心和丸小豆大每服七丸至十丸嚼破溫熱水下食後服木香餅子出和劑方治脾經虛冷胃脘寒疾胸膈噎痞口淡舌澀心腹撮痛嘔逆宿水脅下疼悶喘滿氣急倦怠少力不思飲食常服寬胸膈散滯氣消痰美飲食縮砂仁一十二兩檀香四兩甘菘五兩洗丁香四兩蓬莪荗十兩木香二兩五錢右為細末别用甘草熬膏為丸每兩作二百五十丸捻作餅每服三五餅細嚼生薑湯下溫酒亦可不拘時殼神丸治脾胃虛冷氣久不順中脘痞悶全不思食停痰嘔逆水榖不化小麥蘖炒陳麴各一兩五錢炒烏梅一兩炒陳橘皮去白焙生薑切焙枳實各五錢去穰麩炒右為末煉蜜丸如桐子大每服三十丸食後米飲下附子溫中丸治脾胃順氣化痰嘔吐噎膈留飲腸鳴食冷泄注辟寒養正氣附子乾薑白术各一兩肉桂甘草各五錢炙良薑七錢右為細末煉蜜為丸一兩作十丸每服一丸細嚼生薑橘皮湯下米飲亦可食前豆䓻湯治脾胃虛冷水榖不化腹內㽱刺撮痛臟腑不調及因冷物傷脾吐瀉不止草豆䓻薄麵裹燒香熟并麵用二兩桂去粗皮陳橘皮四兩湯洗去白甘草四兩炙髙良薑四兩陳粟米二兩炒焦研末右六味搗羅五味為末入粟米末拌勻再羅過每服三錢七淘米清泔一盞半生薑三片棗五枚擘破同煎至八分去滓熱服空心食前磨滯丸治脾胃氣不和宿食不消食已腹痛嘔噦惡心胸膈痞悶大便祕利不定木香青橘皮湯浸去白焙桂各一兩去粗皮吳茱萸三兩湯洗焙乾炒巴豆霜炒五分硇砂醋熬成霜研末一錢右搗羅四味為末與硇砂巴豆霜拌勻醋煮麵糊丸菉豆大每服三丸加至五丸早晚食後臨寢服大便溏痢即減丸數磨脾丸治三焦氣不升降脾臟衰弱胃氣虛滿不思飲食舊榖未消新榖又入脾胃氣弱不能磨化榖氣減耗肌肉瘦癢面目痿黃寒濕結瘀飲氣下流漬傷肝腎足脛虛浮怠惰嗜卧四肢不收此藥服之並不耗氣可以剖判清濁交通上下使脾氣和實而能磨化水榖補骨脂六兩炒令黃焦京三稜一斤大者炮細碾羅取粉四兩用蓽澄茄六兩檳榔四兩木香四兩黑豆一斤湯洗去皮焙乾炒令黃熟細碾羅取粉四兩右為末水煮麵糊丸小豆大每服二十丸溫米飲下不計時候健脾散治脾胃虛冷水榖遲化不能飲食人參白茯苓去黑皮黃耆銼麥蘖各一兩炒黃甘草炙銼麵麯各五錢炒令黃右為末每服二錢匕入鹽沸湯點服不拘時候茴香理中丸治中焦不和脾胃宿冷心下虛痞腸中疼痛嘔吐冷痰飲食不下噫氣吞酸怠惰嗜卧全不思食霍亂吐痢腸鳴不歇手足不和米榖遲化白术人參去蘆乾薑炮甘草各二兩半茴香二兩一方無茴香右為細末煉蜜為丸每兩分作十丸食前用白湯化下嚼服亦可或丸如桐子大服亦可大病新産吐唾不止及新産內虛皆可服亦溫脾胃消痞滿留飲順三焦飲食辟風寒邪氣新法半夏湯出和劑方治脾胃不和中脘氣滯宿寒留飲停積不消心腹刺痛脅肋膨脹嘔吐痰水噫氣吞酸中酒吐酒噦逆惡心頭痛煩渴倦怠嗜卧不思飲食陳皮去白神麯四兩炒草果煨去皮半夏麯各二兩四錢炒乾薑四兩炮丁香皮木香白茯苓各七錢五分甘草四錢五分右為細末每服一錢鹽湯點服不拘時常服溫中破痰開胃健脾消酒進食大應丸治脾胃虛寒宿食不消壯熱憎寒頭目重痛巴豆十五粒去皮漿水一盞煮乾為皮大黃蒸熟一分五靈脂炒青橘皮各五錢湯浸去白焙右為細末麵糊丸如菉豆大每服七丸食後臨卧用生薑湯下棗肉丸出醫方集成治脾胃虛寒腹鳴泄瀉胸膈不快飲食不化破故紙四兩炒木香一兩不見火肉豆䓻二兩麵裹煨右為細末燈心煮棗肉丸如桐子大每服七十丸薑湯鹽湯下半夏飲治脾胃虛弱不能飲食乾噦惡心水榖不化半夏為末生薑汁製作餅炮乾厚朴各二兩去粗皮薑炙人參陳橘皮湯浸去白焙白术各一兩右粗搗篩每服三錢匕水一盞生薑五片棗二枚擘破同煎至八分去滓溫服木香丸治脾胃虛寒宿食不消留滯成塊心腹疼痛木香丹砂各三錢研蓬莪荗煨銼京三稜各一兩煨銼巴豆二十粒去皮心膜出油右為細末醋煮麵糊和丸如豌豆大每服二丸至三丸食後臨卧生薑橘皮湯下丁香丸治脾胃虛寒宿食不消兩脅滿痛丁香丁香皮乾薑炮陳橘皮各一兩湯浸去白巴豆霜五分右搗羅四味為末入巴豆霜拌勻再羅用好酒煮麵糊丸如菉豆大每服五丸至七丸食後溫生薑湯下阿魏丸治脾胃虛寒宿食不消腹脹腹鳴通和五臟阿魏五錢研蠍稍炒搗麝香各一分研硇砂半分研桃仁四十九枚去皮尖雙仁生研右研令勻酒煮麵糊丸如梧桐子大每服二十丸溫酒下不嚼早辰日中臨卧各一服溫白丸治脾胃虛冷一切病半夏二兩湯浸切作片生薑汁浸焙白术一分丁香一分右為末生薑汁煮麵糊丸如梧桐子大每服十丸濃煎生薑湯下食前空心服如腹痛嘔逆食後服丁附丸出楊氏家藏方治脾胃受寒虛冷者嘔吐不止丁香一兩附子炮豆䓻麵裹煨胡椒各五錢右為末蜜丸每服十五丸細嚼橘皮湯下木香乾薑枳术丸出蘭室祕藏方破除寒滯氣消寒進飲食木香三錢乾薑五錢炮枳實一兩炒白术一兩五錢右為細末荷葉燒飯丸如桐子大每服三五十丸溫水下食前半夏湯治脾胃虛冷飲食不化嘔逆多痰半夏白􅈨水煮焙白扁豆各一兩人參枳殼各五錢去穰麩炒右粗搗篩每服二錢七水一盞生薑三片棗一枚擘破同煎至七分去滓溫服不拘時候胡椒丸一名乾薑丸治脾胃虛冷大腸泄瀉飲食不化胡椒一兩烏頭炮製去皮臍乾薑炮赤石脂各五錢右為末麵糊丸如梧桐子大每服十五丸至二十丸空心食前米飲下玄胡丸出德生堂理中焦不和脾胃積冷心下虛痞腸腹中疼痛或飲食過多胸脅逆滿噻噎不通咳嗽無時冷吐冷痰婦人血氣肚腹疼痛癥瘕氣結蟲煩不安玄胡當歸青皮蓬术檳榔雄黃另研木香各一兩三稜二兩右為末水糊為丸如桐子大每服三十丸生薑湯下不拘時小三稜煎丸治宿食不消心腹脹滿吐逆吞酸京三稜蓬莪荗各四兩芫花一兩右同入磁瓶內用米醋五升浸滿封瓶口慢火煨乾取出前二味杵碎仍用餘醋炒芫花微焦並焙乾為末醋煮麵糊丸如桐子大每服三丸至五丸生薑湯下婦人醋湯下一方橘皮湯下厚朴湯治脾胃虛冷氣逆嘔吐不能下食厚朴去粗皮塗生薑汁炙熟三兩人參陳橘皮各一兩去白炒右粗搗篩每服五錢七水一盞半煎至八分去滓溫服治脾胃冷弱腹中積冷脹滿刺痛肘後方右以肥狗肉半斤米鹽豉等煮熟頓喫一兩頓愈治食生冷雜物或寒時衣薄當風或夜食便卧不即消心腹煩痛脹急連日不化方右燒地令極熱即敷薄薦若莞席向臥覆取汗即立愈也普濟方卷二十三
