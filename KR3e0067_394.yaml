body:
  text: 普濟方卷三百九十四明周王朱橚撰嬰孩吐瀉門總論夫小兒吐瀉因傷風冷或傷暑熱或兒啼未定氣息未調以乳乳之逆於上則停胸膈致令嘔吐氣逆於下則傷腸胃致令泄瀉上下氣逆吐瀉俱作若只吐不瀉者逆其吐必有痰發驚者十無一生若只瀉不吐或吐瀉俱發者日久不退亦變陰癎治之當斷其乳輕者周時重者三日須與稀粥服藥速效十全八九或者不信是言小兒以乳妳為本慮其咨煎不肯暫斷殊不知因乳所傷致令此病若以所傷乳乳之如抱薪救火藥何功之有不然則誠難以安痊其間不斷乳服藥得安者蓋輕患也亦有因輕致重夭橫者多矣凡小兒初吐發驚者尚可救治以玉散子青金丹不退珍珠丸急下之次與神寶丹若唇紅焦者琥珀散蓋內熱故也不退必死又云吐妳不止大便不通靣黑氣喘必死不治凡權斷乳候吐瀉定捻去乳少少與之使不再作凡吐瀉服藥須要令飢如服了不得便喫物喫乳則引吐再為害也凡小兒暑月吐瀉冷熱輕重各有治法不可槩用如吐瀉身熱煩渴心懆大便黃沫小便赤少暑瀉也黃龍丸甘露散白虎湯香薷湯五苓散杏仁丸有傷食者必吐瀉酸臭妙丸子下之次益黃散二者不退如小便通利大便白色腸鳴吐瀉多渴少食附香丸參术附散术附膏半硫丸神寶丹防驚其間有糞白腥臭油膩便成疳瀉有久成疳瀉者亦有治法小兒泄瀉傷積而作瀉者初以補藥治不止之時須當下去其積積下其瀉自止下之宜與小沉香煎丸理虛中積甚良多與服之或以小塌氣丸又不下更與三稜煎服切不可以意轉藥恐成滌蕩矣積滯已下與服調胃溫脾藥及既濟丹此乃理積止㵼夏月暴㵼由其臟寒虛滑利泄速與契聖丹如滑不禁進殢腸散次與契聖既濟丹若洞利其瀉不常發作駭人速與殢腸未了次與术附湯稍與遲緩其候必更療瀉之理豈可相待夫自汗不利者由血不榮虛於表也自利無汗者由氣不衛虛於裏也其或有自利亦自汗者榮衛皆虛也凡為人止藉血榮氣衛扶育身體血既不榮氣又不衛裏外不相參上下不升降關竅不開通經絡不調適榮衛不循環臟腑不充實則醫工何以良餌性命何以保持夫水穀不分自利腸胃怯弱自利臟腑不和冷熱相制自利隂陽不調自利榮衛不順自利已上自利皆由氣虛得之初生小兒忽爾自利者與順胃平調隂陽制其冷熱和其臟腑分其水榖生其胃氣則內外充實何泄利有作宜以參苓白术散加以車前瞿麥薑棗同煎更量虛實加減錢氏論篤病訣安去黃承務子二嵗病瀉衆醫止轉瀉十餘日其證便青白乳物不消身涼加哽氣昏睡醫謂病困篤錢氏先以益脾散三服補肺散三服三日身溫而不哽氣後以白餅子微下之又與益脾散三服利止何以然利本脾虛傷食初不與大下惜置十日上實下虛脾氣弱引肺亦虛補脾肺病退即身溫不哽氣是也有所傷食仍下之也何不先下後補曰便青為下臟冷先下必太虛先實脾肺下之則不虛脾更後補之也又云小兒傷於風冷吐瀉醫謂脾虛以溫補之不已後用冷藥冷治之又不已謂本傷風醫亂攻之因脾氣積虛內不能散外不能解至十餘日解證多睡露晴身溫風在脾胃故大便不聚而為瀉當去脾間風風退則痢止宣風散主之後使君丸補其胃然錢氏用宣風散去脾風使君丸補胃雖用有理其治未周錢氏治此病先以益黃散三服補令脾胃氣實蓋宣風散用牽牛檳榔等痢藥先補脾後宣風散去脾風後神實丹使君丸治之此法多愈語人曰錢氏經用宣風其理若何答曰失多矣余所以先用益黃散者譬曰彭祖觀井自繫大木仍以車輪覆其上然後敢觀之為防其虛而無失也多趙不犀鈴轄女四嵗七月中瀉食物不化水榖不分渴少食進退四十餘日召醫或作食或作水瀉疳瀉或用五苓散紫丸子六神丸益黃散并雜藥攻之無效在後見聞食名掩口哭而噦時時煩召余視曰渴飲過多脾胃受濕則水榖不分兼畏食而物不化是脾虛中有積主人曰何知也答曰素問云脾胃受濕則水榖不分孫氏曰脾虛者畏食進退者有積又問曰何治也答曰益黃散紫丸子二藥可主笑曰服多矣答曰譬如聚千夫舉重不如得一烏獲挾萬矢以妄射不如得一逢蒙大抵藥不得其當雖多亦奚以為蓋前醫用藥不知次序連序服不知多少補瀉不知輕重所以無效今用益黃散補一日六服進三日即微食與紫丸子㵼三五次再益黃散補一日六服連進三日喜食瀉止尚有渴以參术散十日安主人問曰久㵼之病何再瀉也答曰經云邪之所湊其氣必虛補其虛而後其病除也今病因食積留滯先補次除所畜之物然後再補之主人曰善醫國學劉傑祕校子年四嵗六月中㵼泄米榖不化數止轉月餘不退召余視之見兒食田雞肉少頃所食肉即從大便中經過遂問莫先食肉否曰近日食物不化并藥丸隨大便中出余曰食廩不藏是門户不守也得守者生失者死此子脾虛之甚余自厯醫未嘗見有經過之食乃失守之病也宜用附子主人曰莫太燥余曰江河欲竭引别𣲖以還流燈燭將殘假他油而再熖此蓋隂之至極須當以陽藥急救之主人聽用余用附子皂心土訶子為丸米湯下一日六服連進三日即大便漸疏食尚未化與术附膏煎冷一日四服病退一半與益黃散頓服一日冷進六服進三日糞稠而米榖化後參术散六神丸前後共治十日安愈主人曰皂心土何意也余曰治病之法須揣本以尋末沂流而討源其所由蓋脾屬土益土附子訶子接助脾氣問曰藥何冷服曰冷服熱不炎上治法出何書余曰若執古法守株待兔也林友編修孫男三嵗六月中㵼利不止視之見瀉糞酸臭妳片不化又有黃水小便赤少知傷熱乳也當斷乳一日服千金丸五苓散即效林惜不肯斷乳服藥三日病增欲以感應丸下益黃散補助林不信自將白术散金粟服三日不效又易一醫以火煆龍骨赤石脂炮木香訶子服三日瀉甚召余曰理當下食斷乳即安今病虛耗亦當斷乳非附子不能起生林大不信至長楫而退至三更驚疼氣急唇口手足俱冷煩渴大㵼乃急召余曰病已後時素問曰夫病以成而後藥之亂已成而後治之譬猶渴而掘井闕而借兵不亦晚乎林漸請試救之余曰還舞為戲則宫室皆動何不止其舞則宫室自定傷乳吐㵼則精神昏憒何不止其乳則吐瀉自止巢氏云小兒霍亂須暫斷乳今當斷乳三日頻與稀粥隨證服附子林從以附子末半錢薑棗煎水中頓冷服半盞至四更又進二服病少減五更與神室丹二服退七分來日依前一服相間神室丹後參术散千金丸三日病除時與少妳調理五日全安林問曰純陽小兒何敢用附子余答云譬賊害良民兵刃不可不用病勢既成毒藥不可不投蓋攻其外邪客氣烏能傷其本哉食陳氏二子大者五嵗腹疼陳陳嘔吐酸臭次者三嵗物不化㵼糞酸臭召余視之並用紫丸子下之益黃散補之主人曰受病不同何用藥同答曰大者腸疼吐酸因食傷也宜下之孫氏云腹內疼成陳來時嘔吐酸如因傷食得瀉補自然安小者泄瀉酸臭亦傷食也法當溫之虛祕方云食㵼重當瀉脾虛用補虛再傷宜再取何患病難除二子瀉補俱安凡有積聚當下即下凡有虛損當補即補隨其虛實而用也出仁存孫氏曰吐㵼才生便惡心乾吐霍亂汗相侵舌唇緋雙眼閉搖頭髮直一如針心悶氣粗而脅動口生白沫命難存來生此候須早理有瘡脾閉命沉沉錢氏論云小兒初生三日內吐瀉壯熱不思乳食大便不消或白色當下之是傷食也後和胃下用白餅子和胃用益黃散主人又云小兒初生三日已上至十日吐瀉身溫涼不思飲食大便青白色乳食不消此上實下虛也若臾兼見肺證主睡露睛喘氣心主驚悸飲水脾主困倦多睡肝主呵欠頓心腎主不語畏明當㵼兒黃藏補脾益黃散主之此上證多病於秋夏也又云秋夏吐㵼五月二十五日已後吐㵼身壯熱此熱也小兒臟腑十分中九分熱也或因傷熱乳食吐乳不止㵼深黃色玉露散主之六月十五日以後瀉身溫似熱臟腑六分熱四分冷也嘔吐冷熱不消㵼黃白色似渴或食乳或不食乳前少服益黃散食後多服玉露散七月七日以後吐㵼身溫涼三分熱七分冷也不消乳多似睡悶多哽氣長出氣睡露睛唇白多噦欲大便不渴食前多服益黃散食後少服玉露散八月十五日以後吐㵼只冷無陽也不能食乳乾噦㵼青褐水當補脾益黃散主之不可下也又云吐瀉爭工廣親北宅四大王宫五太尉病吐㵼不止米榖不化衆醫用補藥薑汁調服六月中服溫藥一日而加喘吐不定錢曰當以涼藥治之所以然者謂傷熱在內也用石膏湯三服并服之衆醫皆曰吐㵼多而米榖不化當補脾何以用涼藥王信衆醫又用丁香散二服前後至日不可服此三日內必服滿身熱飲水吐逆如所言所以然者言六月熱甚伏入腹中而令引飲熱傷脾胃即大吐㵼也醫又行溫藥即上焦亦熱故喘而飲三日當死衆醫不能治復召錢至宫中見有熱證次白虎湯三服更以白餅子下之一日減藥二分二日三日又與白虎湯各二服四日用石膏湯一服旋合麥門冬黃芩腦子牛黃天竺黃茯苓以朱砂為衣與五丸竹葉湯化下熱退而安云馮承務子五嵗吐㵼壯熱不思食錢氏曰目中黑睛少而白睛多靣色㿠白此子必多病靣色㿠白神甚也黑睛腎也睛屬水本怯虛而故多病也縱長成必飢膚不壯不奈寒暑易入脾胃亦更怯虛不可縱酒欲若不保養不過壯年面上常無精神光澤者如婦人之失血也今吐痢不食壯熱者傷食也不可下下之虛入肺則嗽入心則驚入脾則㵼入腎則益虛此但以消積丸磨之為微有食也如傷食甚則下不下則成癖也實在內乃可下之下畢補脾必愈若隨其虛實無不效者又云廣親宫七太尉七嵗病吐㵼是時七月其證全不食而昏睡睡覺而悶亂哽氣乾嘔大便或有或無不渴衆醫作驚治疑故睡也錢曰先補脾後退熱與使君子丸補脾石膏湯退熱次日又以水銀錢硫黃二物末之生薑水調下一字錢曰凡吐㵼五月內九分下而一分補八月內十分補而無一分下此是脾㵼也醫妄治之至於虛損下之即死當只補脾若使君子丸即緩錢又用溫胃益脾藥止之醫者李生曰何食而厄錢曰脾虛而不能食津少即咳逆曰何㵼青褐水曰腸胃至虛冷極故也錢至而愈又凡小兒吐瀉當溫補之余每用理中丸以溫其中以五芩散導其逆連與數服兼以異功散等溫藥調理之往往便愈若以虛損當速生其胃氣宜附子理中丸并金液丹研末煎生薑米飲調灌之惟多乃效胃氣已生手足漸暖隂退陽回然猶􅂒癡即減金液丹一二分增青州白丸子一二分同研加上服以意詳之漸減金液丹加白丸子兼用異功散羌活膏溫白丸鈎藤飲子之類調理至安仍頻與躬雖至危亦於死中救生十得八九與儒門事親書云小兒身熱吐㵼腹滿不進飲食可急牛黃通膈丸過四五行則自愈矣蓋乳食便屬水甚則成濕以治濕法治之用燥藥非也又水瀉不止可用五芩散益元散各停用新水調下二三錢頻服不拘時若暴速注下甚者屬火涼膈通聖亦可治之用者勿輕非深於造化者未易語此又久㵼不止至八九月間變為秋深冷痢泄㵼者清白時撮痛乳癖不化可用養脾丸如黍米大每服二三十丸欲飲米下三日愈益黃散亦可熱湯氏云小兒熱瀉者大便黃而赤或有沫乃臟中有積成因産母飲酒多或生下傷溫藴熱醫者不明但用訶子豆䓻等藥如水洗石既不識證故不辨冷熱用藥又不得法所謂讀方三年而恨無病可治及至治病三年無方可用信乎紙上之語不可全慿一則悟得其理二則求師指迷三則聞見頗多如此方有通透之理不然咫尺千里也雖有治法妙方而不能别其寒溫虛實又安得其理哉宜服黃連等藥小駐車丸亦可服之又冷㵼者乃脾虛受冷至令水榖不化泄㵼注下若依錢氏當以益黃散主之此地古人以此藥為補殊不知今人所稟不同內青皮有吐劫可服又傷食瀉者又名聚腹不宜即補先用食藥或紫霜丸取其積盡然後可補又曰此㵼難止亦不宜補再傷又㵼宜節飲食用進食丸取下積令盡次以錢氏加減益黃散一服可止此切要治法或漢東王先生家寶小兒吐妳説云小兒吐妳有數般是風疾所至則其吐可止也吐妳更夾痰才吐却即生風若止却後其風無止處更入外風則潮心悶胃管後變驚風胃主四肢胃痰涎閉却即搐心主神被外邪所干即驚不定故變驚風也故止主吐即驚風發手足搐搦口眼翻張頭項強舉雖多服各藥亦不能救又小兒吐妳鼻青客風傷肺客風外風也鼻青肺之外應也液間煩躁肺氣逆而為之也身上發熱肺主身之毛皮邪所傷故發熱宜下傷寒藥後平胃氣耳又小兒吐妳唇黑多哭是傷脾須夾痰也唇是脾之外應食所傷故黑其夾痰者脾能生涎故痰衝胃而吐妳食又小兒吐妳身熱其妳成片子者是胃有熱積久則生風也其人四肢生瘡多渴靣黃是也若吐不化夫青水是胃冷其人必靣青唇白是也宜暖胃止之又小兒乳食不化腹急氣逆病證須進塌氣丸二三服不却胸膈却進觀音散二三服但生胃氣藥皆可以意與文之又乳母不忌口食生冷物冷氣入乳則腹變環又不捻除之仍以此乳乳兒冷乳入腹與胃氣相逆則腹脹氣逆肚疼或為㵼亦依前項藥調理如果不退却用羌活膏治之錢氏論云生下吐初生小兒拭小兒口中穢惡不盡咽入喉中故吐木瓜丸主之又曰傷風吐瀉身溫乍涼乍熱睡多氣粗大便黃白色吐嘔乳食不消時咳嗽更有五臟兼見證當煎入藏君臣藥先大青膏後益黃散如先曽下減無下證慎不可下也此乃脾肺受寒不能如食也便王氏子三嵗口吐不㵼自吐數次昏困連日不消大堅實召余曰是本傷食吐逆不合昏困唇紅此疾大逆以妙丸子定吐消琥珀散鎮驚權住妳一日吐定喫物不大便未通主人以為無事更不服藥因與乳多再吐痰乳而復昏困愚曰不可再吐又時時虛氣大便亦不通靣黑氣粗是形氣相失靈祕方云吐妳不止大便不通靣黑氣粗祕死急以珍珠丸下痰食主人曰既吐何不用慢驚藥防之而用涼藥答日本欲生急驚為傷乳食作吐法當溫藥蓋兒大便三日不通唇紅頰赤小便赤皆熱證也故先治食後以涼藥今吐雖定大便首尾五日不通內以四順飲外以蜜導法得通不甚多以宣風散去脾間風再利糞令稀仍困不醒睡散二服困退喜食愚曰雖食而目鮮唇紅廢拭靣目微腫虛氣不悅必欲發驚急以青金丹夀星丸射香餅琥珀散各二服不退乃辭曰萬靈之要所全者形一身之先所存者氣今形氣已失知不久生也主人曰醫人之好利如此後易數醫因驚而卒别一子只吐神昏又一女只一吐聲嗄二子皆三嵗更不可救信乎吐之為害甚也吐哯附論夫小兒吐哯者由乳哺冷熱不調故也兒乳哺不調則停積胸膈因更飲乳哺前後相觸氣不得宣流故吐哯出診其脈浮無苦也又云哯乳與嘔逆不同宜細詳之哯乳飽後哯出者是又云小兒生下有中吐哯妳形候妳不穩而從口角頭流出身微熱口鼻微冷靣目青黃眼慢此候因乳母房室淫泆兒子呌更將乳與喫而隂陽不順兒子胸膈不快喫乳停滯在於胃不消化而冷致此所治者先以睡驚沉飲子夾丁香散與服夾活脾散調理即愈歌曰乳母寒溫不節量致令壅滯在胸堂更加新乳相投觸不得通宣入胃腸此名哯妳須調理診得輕浮尚不膜妨口眼時時動不停吐中時覺乳生腥眼渾青碧生白汗出津津腳似氷氣細元因傷胃冷氣粗却是欲生驚是風從脾宜醫治暖胃和脾氣乃平此候寒熱相勝使然也氣急則是胃實當涼則愈若囟門陷下氣細當生胃氣若渾身熱甚者氣出喘粗若不急治必作又云此候是驚妳衝胃或氣交妳衝脾或是氣妳或是病妳致吐逺聞腥氣與蛜􅖉丸氣細脈沉與調胃散方當歸湯治小兒吐哯當歸黃芩甘草芎藭黃連各一分細辛乾薑各二分半右切以水二升煮取八合服半合日三溫服黃耆湯治小兒吐哯胸中冷氣停結黃耆人參各三分當歸切焙芍藥甘草炙銼芎藭各一兩細辛去苗葉一分右粗搗節每服一錢水七分盞煎至四分去滓分溫二服早晚各一量兒大小加減藿香散治小兒吐哯嘔逆身熱靣青不進乳食藿香一錢半丁香人參白术茯苓神麯匾豆各半錢右為末每服半錢罌粟飲溫調下陳皮煎米飲亦得豆蔲散治吐妳肉豆蔲麵裹炮赤熟去麵為末草果炮去皮各一兩􅒦砂去皮甘草炙肉桂不見火各一錢陳皮半錢去白右為末每服半錢米飲調下麝香湯治小兒吐哯胸膈痞滿乳飲停積麝香研木香人參沉香銼赤茯苓去黑皮各一分丁香半分右粗搗篩每服半錢水半盞煎數沸去滓分溫二服藿香散治吐妳藿香半兩何首烏白扁豆甘草炙糯各等分右為細末半錢用水一小盞入淡竹茹煎至七分臨卧空心服治吐妳腹脹方代赭石麝香巴豆各一分赤石脂杏仁各半兩右為細末蜜圓如桐子大米飲下日三小一丸百日一嵗二丸橘皮湯治小兒吐哯膈上冷方見本門嘔吐類消乳丹治小兒飲乳過多胸膈不快或多吐哯大便妳瓣不消亦宜令乳後常服木香丁香青橘皮炒黃肉豆蔲各半兩牽牛子炒黃一錢右為末滴水和丸如針頭大每服三粒至五粒粘在妳頭上令兒吮之鹽黃散治小兒初生吐不止鹽兩黃米大牛黃兩粟米大研人參白茯苓各一小豆大甘草兩小豆大炙右搗研四味為末丸以乳半合煎三五沸入牛黃末攪勻分減服之小兒哯乳方此證哯哺吐下狀如霍亂甘草炙人參當歸乾薑各一分右為末水一升煮取五分服三日內麝香半分尤佳菖