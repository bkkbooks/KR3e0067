大小加减硃砂丸治小兒乾噦惡嘔吐不定丁香白术天南星生薑汁製一宿炒焙白茯苓去皮人參去蘆頭各一錢右伴為細末蒸餅和丸如黍米大硃砂為衣毎服二十丸煎生薑湯乳食前服枳殻半夏湯治小兒嘔逆枳殻一兩去穰炒半夏一兩湯炮七次右剉水一盞薑五片煎服治小兒吐不定方五倍子二箇一生一熟甘草一握濕紙褁炮過右同為末毎服半錢米泔湯下小半夏湯治嘔吐及風痰水飲半夏薑製五錢茯苓去皮三錢右剉研薑汁入水煎服人參散治小兒嘔吐不止人參一兩為末丹砂半兩研右研匀每服半錢熱米飲調下量兒大小加减肉豆蔲丸治嘔不止諸藥不效者肉豆蔲麫裹煨令香熟為度去麫不用半兩丁香一錢右為末煮白麫糊為丸如芥子大量兒大小加减毎服三五丸濃煎藿香柿葉湯下若大人加丸數亦用此湯加蝎以所煎湯作熟水飲之藿香散治小兒嘔吐不定虚風喘急藿香白附子各等分右同為細末米飲調下一錢草金散治小兒吐逆爛大梔子三箇草烏頭一箇右同藏於小瓶内用泥固濟焼烟盡取出研細毎服一字生薑汁下醒脾散治小兒脾胃滯吐食并一切慢驚風大能醒脾如危困多睡飰飲調下一字至半錢止吐瀉亦效大天南星一箇重二錢以上者硃砂一塊如黄豆大右以天南星熱湯浸七次開臍入硃砂用净薄紙濕裹開地穴深四寸方圍八寸藥仰安穴内地上以黄泥餅盖用泥固臍以炭火於地上焼候火盡冷後取研為細末入腦麝少許煎金銀薄荷湯下一字至半錢治小兒吐逆方薄荷茴香炒各等分右為末生薑自然汁煮麫糊為丸如緑豆大毎服十丸至十五丸用薑湯下不拘時醒脾散治小兒因吐胃虛生風胃氣欲脱人參天南星各等分研右為末旋抄毎服二味各半錢冬𤓰子三七粒水一盞半煎兩茶脚許不拘時通口服以胃氣生為度大人亦治之腦香散治小兒沒藥一錢樟腦一字右為末以藥㸃其舌上靈砂散治五種吐不問冷熱久而不止胃虛生風諸藥俱試不效者以靈砂研作細末米飲調下立效治小兒飲乳後吐逆入腹即出方用蘆節中蟲二枚煮汁飲之狀如小蚕凢小兒嘔逆與哯乳不同哯乳者飽後哯出者是也宜細詳之藿香散治小兒吐神麴藿香各半兩丁香一分見火肉豆蔲一箇右為細末毎服大者一錢小者半錢煎香楠木湯定驚止吐神效治小兒嘔吐逆方取壁錢蟲上錢幕二枚煮汁飲之狀似蜘蛛其幕如錢在闇壁間或呼為壁繭紫朴散治小兒吐逆下膈和胃取厚朴去粗皮以生薑汁炙令香熟為末每服一字或半錢米飲調下温服治小兒吐不定方用乾薑炭火燒及八方研如粉毎服一字至半錢以蜜湯放冷調下立效紫粉丸治小兒吐兼大人用針沙醋浸一夜辟去醋便帶醒炒候并銚子紅色無烟乃止候冷細研更用醋團火燒通赤取冷再研極細以麫糊圓如梧桐子大量兒大小與服粥飲下服訖更啜盞許粥如未定再服大人四十丸一服小兒随大小為丸此藥極神異然吐有多端良方中有數法皆累驗者可參用之治小兒吐止方以香白芷為末每服一字煎茒根湯下淡甘草湯亦得治小兒吐逆方取舊舡上石灰不拘多少為末毎服一字先油滴一㸃在漿内調藥灌下大人每服半錢玉散子治小兒止吐不㵼腹中疾以爛寒水石火煆為末三嵗兒半錢薑水調下大人參丸和脾止吐嘔治㵼青黄止腹痛多啼進乳食方丁香木香白术各半兩藿香一兩半人參二兩右為末煉蜜丸如雞頭子大每服一丸粟飲下籧篨散治小兒初生吐不止故籧篨篾半兩䀋一字牛黄一黒豆大細研乳汁一合右將乳汁煎二味三兩沸去滓調入牛黄服效茯苓散治胃寒嘔吐藿香甘草人參半夏白茯苓丁香陳皮各等分右為末毎服一錢藿香葉三片葱白一寸同煎服温中散治小兒腹脇虚脹嘔吐不納飲食丁香一分訶藜勒皮半両草豆蔲三枚去皮桂心一分陳橘皮三分去白瓤湯浸焙人參半両去蘆頭右件藥搗細羅為散毎服以粥飲調下半錢量兒大小以意加减觀音散治小兒脾胃氣弱嘔吐不痢困不省人參去蘆頭白术冬𤓰子各半両天南星一両炮製入地坑内去火毒用右件㕮咀毎服二錢淡漿水七分白扁豆五粒搥碎同煎至三分去滓温服乳食前土馬騣丸治小兒脾胃挾傷大吐不止青礞石四錢水銀硫黄各三錢細研同水銀結沙子乾漆二錢炒青烟出鐵粉木香各一錢右件為末鎔黄蠟一両半入麻油少許丸如麻子大毎服五丸煎土馬騣湯令沸入醋滴放温送下乳食空丁香平胃散治小兒胃氣虚寒逆上行胸膈不快大吐不定腹脹短氣中滿痞悶附子炮去皮臍尖丁香木香藿香葉去皮沉香枇杷葉生薑􅖗去毛各一分水銀硫黄各分同水銀結沙子肉豆蔲五枚麫褁煨熱草豆蔲仁七枚麫褁煨熱肉桂去粗皮半兩右件為細末煉蜜和為丸每一兩作四十丸毎服一丸生薑棗煎湯化下乳食前救命丸治小兒心膈伏熱停乳食涎霍亂煩懆身體多噦逆不定大吐不時黄蘗輕粉乳香大㦸一兩半漿水煑切焙丁香半両龍腦一分别研粉霜三分别研水銀一兩二錢黒鈆一両二錢水銀研成沙子右件為細末鎔黄蠟一分别研二両入麻油數滴熬和丸如黄米大毎服一嵗兒一丸研生麻油馬齒莧水送下吐逆煎馬齒莧丁香湯下乳食前温胃丸治小兒胃虚氣逆乾噦惡心胸膈痞悶嘔吐乳食丁香二錢肉豆蔲二錢麫褁煨熱木香人參去蘆蓮子心薏苡米炒黄各一錢半右件為細末煑神麯糊為丸如黍米大毎服二十丸温熱水送下乳食前二香丸治小兒胃冷停痰嘔吐不止半夏一錢湯洗去皮硫黄研細丁香木香滑石各錢右件為細末生薑汁煑麫糊為丸如黍子米大毎服二十丸温米飲送下乳食空丁香餅子治小兒胃氣虚寒心腹脹滿噦逆嘔吐昏困少力及泄瀉無度丁香六十枚龍骨一分附子一枚七錢者炮去皮臍尖藿香葉去土一分右件為末滴水為丸毎一両作五十丸揑餅子毎服一餅子煎杉木湯化下不拘時候山薊湯治小兒胃氣怯弱乾噦嘔吐精神昏困乳食全减人參去蘆白茯苓去皮白术甘草炙藿香葉去土各錢半丁香一錢糯米一百粒炒令黄白扁豆三十粒右件為細末毎服一錢煎生薑湯調下乳食前空紫神湯治小兒隂陽不和中脘痞悶涎盛嘔逆吐驚不定藿香藥去土一錢水銀一錢硫黄二錢同水銀結沙子丁香二錢滑石一錢紅麯二錢右件為細末毎半錢乳食前用壁土湯調下養胃散養胃氣快胸膈定噦逆止嘔吐美進飲食丁香藿香去土陳橘皮去白白豆蔲仁縮砂仁各等分右件並為細末毎服半錢煎生薑棗湯調下乳食空三神散治小兒痰乳停積煩渇喜飲嘔吐不定乾葛一両甘草㣲炙三錢半夏湯浸七次去滑一両右件為㕮咀毎服一錢水六分盞生薑三片青竹茹少許同煎至二分去滓放温服乳食空和胃膏治小兒虚嘔吐氣不升降胸膈噎寒漸成驚風人參去蘆頭藿香葉白茯苓甘草炙肉豆蔲麫褁煨熟枇杷葉去毛薑汁蘸炙香舶上硫黄細硏入鉄銑将水銀一處研匀下以微火温之不住手研攤沾在銑上去火候冷取下水銀同硫黄製度已上各一両右將前六味同為細末將硫黄水銀砂子先於乳鉢内研細入諸藥同研匀煉蜜和成膏毎一嵗兒服一丸如梧桐子大薑棗湯下白术散治小兒嘔吐兼治冷痢常服此藥調理三焦大進飲食白术丁香肉豆蔲麫煨陳皮甘草右等分為末白湯調下慢驚沉困冬𤓰子煎湯下若見水即吐進藥不得吐止用棗子㸃藥乾喫凢嬰兒百晬内或嘔吐乳或大便糞青者胃寒脾弱也其證最為難治右用年少婦人乳汁一盞入丁香十枚去穣陳皮一錢磁器内煑十數沸去丁香陳皮稍熱與兒乳食前服嘔吐必止普濟方卷三百九十四
