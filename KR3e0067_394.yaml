body:
  text: 普濟方卷三百九十四明周王朱橚撰嬰孩吐瀉門總論夫小兒吐瀉因傷風冷或傷暑熱或兒啼未定氣息未調以乳乳之逆於上則停胸膈致令嘔吐氣逆於下則傷腸胃致令泄瀉上下氣逆吐瀉俱作若只吐不瀉者逆其吐必有痰𤼵驚者十無一生若只瀉不吐或吐瀉俱𤼵者日久不退亦變陰癎治之當斷其乳輕者週時重者三日須與稀粥服藥速効十全八九或者不信是言小兒以乳妳為本慮其嗞煎不肯暫斷殊不知因乳所傷致令此病若以所傷乳乳之如抱薪救火藥何功之有不然則誠難以安痊其間不斷乳服藥得安者盖輕患也亦有因輕致重夭横者多矣凡小兒初吐發驚者尚可救治以玉散子青金丹不退珍珠丸急下之次與神寶丹若唇紅焦者琥珀散葢内熱故也不退必死又云吐妳不止大便不通靣黒氣喘必死不治凡權斷乳候吐瀉定捻去乳少少與之使不再作凡吐瀉服藥湏要令飢如服了不得便喫物喫乳則引吐再為害也凡小兒暑月吐瀉冷熱輕重各有治法不可槩用如吐瀉身熱煩渴心懆大便黄沫小便赤少暑瀉也黄龍丸甘露散白虎湯香薷湯五苓散杏仁丸有傷食者必吐瀉酸臭妙丸子下之次益黄散二者不退如小便通利大便白色腸鳴吐瀉多渇少食附香丸参术附散术附膏半硫丸神寳丹防驚其間有糞白腥臭油膩便成疳瀉有乆成疳瀉者亦有治法小兒泄瀉傷積而作瀉者初以補藥治不止之時須當下去其積積下其瀉自止下之宜與小沉香煎丸理虚中積甚良多與服之或以小塌氣丸又不下更與三稜煎服切不可以意轉藥恐成滌蕩矣積滯已下與服調胃温脾藥及既濟丹此乃理積止㵼夏月暴㵼由其臟寒虚滑利泄速與契聖丹如滑不禁進殢腸散次與契聖既濟丹若洞利其瀉不常發作駭人速與殢腸未了次與术附湯稍與遲緩其候必更療瀉之理豈可相待夫自汗不利者由血不榮虚於表也自利無汗者由氣不衞虚於裏也其或有自利亦自汗者榮衞皆虚也凡為人止藉血榮氣衞扶育身體血既不榮氣又不衞裏外不相㕘上下不升䧏闗竅不開通經絡不調適榮衞不循環臓腑不充實則醫工何以良餌性命何以保持夫水糓不分自利腸胃怯弱自利臟腑不和冷熱相制自利隂陽不調自利榮衛不順自利已上自利皆由氣虚得之初生小兒忽爾自利者與順胃平調隂陽制其冷熱和其臟腑分其水榖生其胃氣則内外充實何泄利有作宜以参苓白术散加以車前瞿麥薑棗同煎更量虛實加减錢氏論篤病訣安去黄承務子二嵗病瀉衆醫止轉瀉十餘日其証便青白乳物不消身凉加哽氣昏睡醫謂病困篤錢氏先以益脾散三服補肺散三服三日身温而不哽氣後以白餅子㣲下之又與益脾散三服利止何以然利本脾虚傷食初不與大下惜置十日上實下虚脾氣弱引肺亦虚補脾肺病退即身温不哽氣是也有所傷食仍下之也何不先下後補曰便青為下臓冷先下必太虚先實脾肺下之則不虚脾更後補之也又云小兒傷於風冷吐瀉醫謂脾虚以温補之不已後用冷藥冷治之又不已謂本傷風醫亂攻之因脾氣積虚内不能散外不能解至十餘日觧証多睡露晴身温風在脾胃故大便不聚而為瀉當去脾間風風退則痢止宣風散主之後使君丸補其胃然錢氏用宣風散去脾風使君丸補胃雖用有理其治未周錢氏治此病先以益黄散三服補令脾胃氣實盖宣風散用牽牛檳榔等痢藥先補脾後宣風散去脾風後神實丹使君丸治之此法多愈語人曰錢氏經用宣風其理若何荅曰失多矣余所以先用益黄散者譬曰彭祖觀井自繋大木仍以車輪覆其上然後敢觀之為防其虚而無失也多趙不犀鈴轄女四嵗七月中瀉食物不化水榖不分渇少食進退四十餘日召醫或作食或作水瀉疳瀉或用五苓散紫丸子六神丸益黄散并雜藥攻之無效在後見聞食名揜口哭而噦時時煩召余視曰渇飲過多脾胃受濕則水榖不分兼畏食而物不化是脾虚中有積主人曰何知也荅曰素問云脾胃受濕則水榖不分孫氏曰脾虚者畏食進退者有積又問曰何治也荅曰益黄散紫丸子二藥可主笑曰服多矣荅曰譬如聚千夫舉重不如得一烏獲挟萬矢以妄射不如得一逢䝉大抵藥不得其當雖多亦奚以為盖前醫用藥不知次序連序服不知多少補瀉不知輕重所以無效今用益黄散補一日六服進三日即㣲食與紫丸子㵼三五次再益黄散補一日六服連進三日喜食瀉止尚有渇以参术散十日安主人問曰久㵼之病何再瀉也荅曰經云邪之所凑其氣必虚補其虚而後其病除也今病因食積留滯先補次除所畜之物然後再補之主人曰善醫國學劉傑秘校子年四嵗六月中㵼泄米榖不化數止轉月餘不退召余視之見兒食田雞肉少頃所食肉即從大便中經過遂問莫先食肉否曰近日食物不化并藥丸隨大便中出余曰食廩不蔵是門户不守也得守者生失者死此子脾虚之甚余自厯醫未嘗見有經過之食乃失守之病也宜用附子主人曰莫太燥余曰江河欲竭引别𣲖以還流燈燭將殘假他油而再熖此盖隂之至極須當以陽藥急救之主人聽用余用附子皂心土訶子為丸米湯下一日六服連進三日即大便漸疎食尚未化與术附膏煎冷一日四服病退一半與益黄散頓服一日冷進六服進三日糞稠而米榖化後参术散六神丸前後共治十日安愈主人曰皂心土何意也余曰治病之法須揣本以尋末沂流而討源其所由盖脾属土益土附子訶子接助脾氣問曰藥何冷服曰冷服熱不炎上治法出何書余曰若執古法守株待兎也林友編修孫男三嵗六月中㵼利不止視之見瀉糞酸臭妳片不化又有黄水小便赤少知傷熱乳也當斷乳一日服千金丸五苓散即效林惜不肯斷乳服藥三日病増欲以感應丸下益黄散補助林不信自將白术散金粟服三日不效又易一醫以火煆龍骨赤石脂炮木香訶子服三日瀉甚召余曰理當下食斷乳即安今病虚耗亦當斷乳非附子不能起生林大不信至長楫而退至三更驚疼氣急唇口手足俱冷煩渇大㵼乃急召余曰病已後時素問曰夫病以成而後藥之亂已成而後治之譬猶渇而掘井闕而借兵不亦晩乎林漸請試救之余曰還舞為戯則宫室皆動何不止其舞則宫室自定傷乳吐㵼則精神昏憒何不止其乳則吐瀉自止巢氏云小兒霍亂須暫㫁乳今當斷乳三日頻與稀粥隨証服附子林從以附子末半錢薑棗煎水中頓冷服半盏至四更又進二服病少减五更與神室丹二服退七分來日依前一服相間神室丹後参术散千金丸三日病除時與少妳調理五日全安林問曰純陽小兒何敢用附子余答云譬賊害良民兵刄不可不用病勢既成毒藥不可不投盖攻其外邪客氣烏能傷其本哉食陳氏二子大者五嵗腹疼陣陣嘔吐酸臭次者三嵗物不化㵼糞酸臭召余視之並用紫丸子下之益黄散補之主人曰受病不同何用藥同答曰大者腸疼吐酸因食傷也宜下之孫氏云腹内疼成陣來時嘔吐酸如因傷食得瀉補自然安小者泄瀉酸臭亦傷食也法當温之虚秘方云食㵼重當瀉脾虚用補虚再傷宜再取何患病難除二子瀉補俱安凡有積聚當下即下凡有虚損當補即補随其虚實而用也出仁存孫氏曰吐㵼纔生便惡心乾吐霍亂汗相侵舌唇緋雙眼閉揺頭髮直一如針心悶氣粗而脇動口生白沫命難存来生此候須早理有瘡脾閉命沉沉錢氏論云小兒初生三日内吐瀉壯熱不思乳食大便不消或白色當下之是傷食也後和胃下用白餅子和胃用益黄散主人又云小兒初生三日已上至十日吐瀉身温凉不思飲食大便青白色乳食不消此上實下虚也若臾兼見肺証主睡露睛喘氣心主驚悸飲水脾主困倦多睡肝主呵欠頓心腎主不語畏明當㵼兒黄藏補脾益黄散主之此上証多病於秋夏也又云秋夏吐㵼五月二十五日已後吐㵼身壯熱此熱也小兒臓腑十分中九分熱也或因傷熱乳食吐乳不止㵼深黄色玉露散主之六月十五日以後瀉身温似熱臓腑六分熱四分冷也嘔吐冷熱不消㵼黄白色似渇或食乳或不食乳前少服益黄散食後多服玉露散七月七日以後吐㵼身温凉三分熱七分冷也不消乳多似睡悶多哽氣長出氣睡露睛唇白多噦欲大便不渇食前多服益黄散食後少服玉露散八月十五日以後吐㵼只冷無陽也不能食乳乾噦㵼青褐水當補脾益黄散主之不可下也又云吐瀉争工廣親北宅四大王宫五太尉病吐㵼不止米榖不化衆醫用補藥薑汁調服六月中服温藥一日而加喘吐不定錢曰當以凉藥治之所以然者謂傷熱在内也用石膏湯三服并服之衆醫皆曰吐㵼多而米榖不化當補脾何以用凉藥王信衆醫又用丁香散二服前後至日不可服此三日内必服滿身熱飲水吐逆如所言所以然者言六月熱甚伏入腹中而令引飲熱傷脾胃即大吐㵼也醫又行温藥即上焦亦熱故喘而飲三日當死衆醫不能治復召錢至宫中見有熱証次白虎湯三服更以白餅子下之一日减藥二分二日三日又與白虎湯各二服四日用石膏湯一服旋合麥門冬黄芩腦子牛黄天竺黄茯苓以朱砂為衣與五丸竹葉湯化下熱退而安云馮承務子五嵗吐㵼壯熱不思食錢氏曰目中黒睛少而白睛多靣色㿠白此子必多病靣色㿠白神甚也黒睛腎也睛属水本怯虚而故多病也縱長成必飢膚不壯不奈寒暑易入脾胃亦更怯虛不可縱酒慾若不保養不過壯年面上常無精神光澤者如婦人之失血也今吐痢不食壯熱者傷食也不可下下之虚入肺則嗽入心則驚入脾則㵼入腎則益虚此但以消積丸磨之為㣲有食也如傷食甚則下不下則成癖也實在内乃可下之下畢補脾必愈若随其虚實無不效者又云廣親宫七太尉七嵗病吐㵼是時七月其証全不食而昏睡睡覺而悶亂哽氣乾嘔大便或有或無不渇衆醫作驚治疑故睡也錢曰先補脾後退熱與使君子丸補脾石膏湯退熱次日又以水銀錢硫黄二物末之生薑水調下一字錢曰凡吐㵼五月内九分下而一分補八月内十分補而無一分下此是脾㵼也醫妄治之至於虚損下之即死當只補脾若使君子丸即緩錢又用温胃益脾藥止之醫者李生曰何食而呃錢曰脾虚而不能食津少即欬逆曰何㵼青褐水曰腸胃至虚冷極故也錢至而愈又凡小兒吐瀉當温補之余毎用理中丸以温其中以五芩散導其逆連與數服兼以異功散等温藥調理之往往便愈若以虚損當速生其胃氣宜附子理中丸并金液丹研末煎生薑米飲調灌之惟多乃效胃氣已生手足漸煖隂退陽回然猶􅂒癡即减金液丹一二分増青州白丸子壹二分同研加上服以意詳之漸减金液丹加白丸子兼用異功散𦍑活膏温白丸鈎藤飲子之類調理至安仍頻與躬雖至危亦於死中救生十得八九與儒門事親書云小兒身熱吐㵼腹滿不進飲食可急牛黄通膈丸過四五行則自愈矣盖乳食便属水甚則成湿以治濕法治之用燥藥非也又水瀉不止可用五芩散益元散各停用新水調下二三錢頻服不拘時若暴速注下甚者属火凉膈通聖亦可治之用者勿輕非深於造化者未易語此又久㵼不止至八九月間變為秋深冷痢泄㵼者清白時撮痛乳癖不化可用養脾丸如黍米大毎服二三十丸欲飲米下三日愈益黄散亦可熱湯氏云小兒熱瀉者大便黄而赤或有沫乃臓中有積成因産母飲酒多或生下傷温藴熱醫者不明但用訶子豆䓻等藥如水洗石既不識証故不辨冷熱用藥又不得法所謂讀方三年而恨無病可治及至治病三年無方可用信乎紙上之語不可全慿一則悟得其理二則求師指迷三則聞見頗多如此方有通透之理不然咫尺千里也雖有治法妙方而不能别其寒温虚實又安得其理哉宜服黄連等藥小駐車丸亦可服之又冷㵼者乃脾虚受冷至令水榖不化泄㵼注下若依錢氏當以益黄散主之此地古人以此藥為補殊不知今人所稟不同内青皮有吐刼可服又傷食瀉者又名聚腹不宜即補先用食藥或紫霜丸取其積盡然後可補又曰此㵼難止亦不宜補再傷又㵼宜節飲食用進食丸取下積令盡次以錢氏加减益黄散一服可止此切要治法或漢東王先生家寳小兒吐妳説云小兒吐妳有數般是風疾所至則其吐可止也吐妳更夹痰纔吐却即生風若止却後其風無止處更入外風則潮心悶胃管後變驚風胃主四肢胃痰涎閉却即搐心主神被外邪所干即驚不定故變驚風也故止主吐即驚風發手足搐搦口眼飜張頭項強舉雖多服各藥亦不能救又小兒吐妳鼻青客風傷肺客風外風也鼻青肺之外應也液間煩躁肺氣逆而為之也身上發熱肺主身之毛皮邪所傷故發熱宜下傷寒藥後平胃氣耳又小兒吐妳唇黒多哭是傷脾須夹痰也唇是脾之外應食所傷故黒其夹痰者脾能生涎故痰衝胃而吐妳食又小兒吐妳身熱其妳成片子者是胃有熱積久則生風也其人四肢生瘡多渇靣黄是也若吐不化夫青水是胃冷其人必靣青唇白是也宜煖胃止之又小兒乳食不化腹急氣逆病証須進塌氣丸二三服不却胷膈却進觀音散二三服但生胃氣藥皆可以意與文之又乳母不忌口食生冷物冷氣入乳則腹變環又不捻除之仍以此乳乳兒冷乳入腹與胃氣相逆則腹脹氣逆肚疼或為㵼亦依前項藥調理如果不退却用𦍑活膏治之錢氏論云生下吐初生小兒拭小兒口中穢惡不盡咽入喉中故吐木𤓰丸主之又曰傷風吐瀉身温乍凉乍熱睡多氣粗大便黄白色吐嘔乳食不消時咳嗽更有五臟兼見証當煎入藏君臣藥先大青膏後益黄散如先曽下减無下証慎不可下也此乃脾肺受寒不能如食也便王氏子三嵗口吐不㵼自吐數次昏困連日不消大堅實召余曰是本傷食吐逆不合昏困唇紅此疾大逆以妙丸子定吐消琥珀散鎮驚權住妳一日吐定喫物不大便未通主人以為無事更不服藥因與乳多再吐痰乳而復昏困愚曰不可再吐又時時虚氣大便亦不通靣黒氣粗是形氣相失靈秘方云吐妳不止大便不通靣黒氣粗秘死急以珍珠丸下痰食主人曰既吐何不用慢驚藥防之而用凉藥答日本欲生急驚為傷乳食作吐法當温藥盖兒大便三日不通唇紅頰赤小便赤皆熱証也故先治食後以凉藥今吐雖定大便首尾五日不通内以四順飲外以蜜導法得通不甚多以宣風散去脾間風再利糞令稀仍困不醒睡散二服困退喜食愚曰雖食而目鮮唇紅廢拭靣目㣲腫虚氣不悦必欲發驚急以青金丹夀星丸射香餅琥珀散各二服不退乃辭曰萬靈之要所全者形一身之先所存者氣今形氣已失知不乆生也主人曰醫人之好利如此後易數醫因驚而卒别一子只吐神昏又一女只一吐聲嗄二子皆三嵗更不可救信乎吐之為害甚也吐哯附論夫小兒吐哯者由乳哺冷熱不調故也兒乳哺不調則停積胷膈因更飲乳哺前後相觸氣不得宣流故吐哯出診其脉浮無苦也又云哯乳與嘔逆不同宜細詳之哯乳飽後哯出者是又云小兒生下有中吐哯妳形候妳不稳而從口角頭流出身微熱口鼻㣲冷靣目青黄眼慢此候因乳母房室淫泆兒子呌更將乳與喫而隂陽不順兒子胸膈不快喫乳停滯在於胃不消化而冷致此所治者先以睡驚沉飲子夾丁香散與服夾活脾散調理即愈歌曰乳母寒温不節量致令壅滯在胸堂更加新乳相投觸不得通宣入胃腸此名哯妳須調理診得輕浮尚不膜妨口眼時時動不停吐中時覺乳生腥眼渾青碧生白汗出津津脚似氷氣細元因傷胃冷氣粗却是欲生驚是風從脾宜醫治煖胃和脾氣乃平此候寒熱相勝使然也氣急則是胃實當凉則愈若顖門䧟下氣細當生胃氣若渾身熱甚者氣出喘粗若不急治必作又云此候是驚妳衝胃或氣交妳衝脾或是氣妳或是病妳致吐逺聞腥氣與蛜􅖉丸氣細脉沉與調胃散方當歸湯治小兒吐哯當歸黄芩甘草芎藭黄連各一分細辛乾姜各二分半右切以水二升煑取八合服半合日三温服黄耆湯治小兒吐哯胸中冷氣停結黄耆人参各三分當歸切焙芍藥甘草炙剉芎藭各一兩細辛去苗葉一分右粗搗節毎服一錢水七分盞煎至四分去滓分温二服早晩各一量兒大小加减藿香散治小兒吐哯嘔逆身熱靣青不進乳食藿香一錢半丁香人参白术茯苓神麯匾豆各半錢右為末毎服半錢罌粟飲温調下陳皮煎米飲亦得荳蔲散治吐妳肉豆蔲麵裹炮赤熟去麫為末草菓炮去皮各一兩􅒦砂去皮甘草炙肉桂不見火各一錢陳皮半錢去白右為末毎服半錢米飲調下麝香湯治小兒吐哯胸膈痞滿乳飲停積麝香研木香人参沉香剉赤茯苓去黒皮各一分丁香半分右粗搗篩毎服半錢水半盞煎數沸去滓分温二服藿香散治吐妳藿香半両何首烏白扁豆甘草炙糯各等分右為細末半錢用水一小盞入淡竹茹煎至七分臨卧空心服治吐妳腹脹方代赭石麝香巴豆各一分赤石脂杏仁各半両右為細末蜜圓如桐子大米飲下日三小一丸百日一嵗二丸橘皮湯治小兒吐哯膈上冷方見本門嘔吐類消乳丹治小兒飲乳過多胸膈不快或多吐哯大便妳瓣不消亦宜令乳後常服木香丁香青橘皮炒黄肉豆蔲各半兩牽牛子炒黄一錢右為末滴水和丸如針頭大毎服三粒至五粒粘在妳頭上令兒吮之塩黄散治小兒初生吐不止塩両黄米大牛黄兩粟米大研人參白茯苓各一小豆大甘草兩小豆大炙右搗研四味為末丸以乳半合煎三五沸入牛黄末攪匀分减服之小兒哯乳方此證哯哺吐下狀如霍亂甘草炙人參當歸乾薑各一分右為末水一升煑取五分服三日内麝香半分尤佳菖