具細切以淡蒜虀食之令盡若不盡者再食之若腫已入脛至小便澀小腹脹者出千金方右取烏牸牛尿一升日二服消乃止千金翼云羸瘦人二分尿一分牛乳各煮乳結乃服其牛溺當以銅氣取新者為佳純黃者亦可用治腳氣但腫不悶經服利藥法令人渴但腫縱不服利藥亦渴宜利方又取大麻子熬令香利水研取一大升别以三大升水煮一大升赤小豆取一升汁取入麻汁更煎三五沸渴即飲之冷熱任取安穩飢時噉豆亦佳兩利小便止渴消腫大良殼葉及桑白皮熬炙為飲飲之亦良腫盛力弱不堪大藥者取牛乳一小升烏牛尿一小升無烏牛尿用黃牛者亦得和調分三服相去十里久小便大利腳腫即頓消若一劑不除隔一二日更服氣力好者依前服羸弱者每日平旦唯一服六七合以瘥乃止忌雜肉大麻子酒療腳氣上腳腫小腹痺右大麻子一升碎研清酒三升漬三宿溫服隨性兼療頭分補益此一方傳用大良治腳氣腫滿方右大豆一升以水四升煮之令熟去滓取桑根白皮切一大升和豆汁重煎之厚薄如酪布絞去滓空心服日再服治腳紅腫方右取小豆一升和殼楮心一握煮喫三二升即瘥如湯沃雪良方治男子婦人小兒積年腳氣腫痛及腹肚蠱腫痛服之痛止腫消右商陸不以多少切碎腳腫痛用無灰酒煮熟俟酒溫連商陸飲喫如蠱腫同米煮粥喫風引大豆湯一名風引湯専治腳氣足脛胕腫上氣遍身疼脹方見本門腳氣上氣類枳檳散冝春秋服消腫利小便兼補療風虛冷脹不能食方見本門一切腳氣治熱毒攻腳氣腫滿欲死者用好酒煮苦參漬之敗毒散出如宜方専治春月少年有熱坐臥濕地兩腳腫痛人參茯苓去皮甘草炙前胡去蘆川芎羌活獨活桔梗去蘆柴胡去蘆枳殼各等分麩炒右㕮咀薑薄荷煎熱服如蒼术加陳米名倉廪散加地骨皮天麻名羌活散四金丸出如宜方専治濕氣留滯腳腿腫浮早輕晚重草烏生薑八兩研薑同草烏一處交盛一宿蔥六兩同蒼术交盛過一宿蒼术製右為末糊如梧桐子大每服五十丸空心服治風毒腳氣若脛已滿揑之沒指者出肘後方見本門風毒氣類治風毒腳氣脛腫捻之則陷方又方出肘後後方大豆三升水一斗煮取九升納清酒九升又煎取九升稍稍飲之小便利則腫歇也有風引白雞竹瀝獨活諸湯及八分石斛狗脊諸散並别在大方中金牙酒最為治之要今載其方出肘後方蜀椒茵芋金牙菵草乾地黃細辛防風去蘆附子地膚蒴藋升麻各四兩人參三兩羌活一斤牛膝五兩右十四物切以酒四斗漬七日飲二三合稍加之亦治口不能言腳屈至良又有側子酒亦效煨腎散出鮑氏方能治五種腳氣陽毒乾腳氣兩足赤腳骨熱痛頭暈疼痛隂毒風症一處痛骨腫堅如石不可行溫症兩膝下惡瘡膿水不乾嗽喘上沖四肢冷麻沖心證口張目直身急哽不言如中風腎臟證足疼腰硬痛並主之丁香木香檳榔大黃連珠甘遂黑牽牛桔梗等分以雄豬石一副切開入之加川椒鹽蔥頭三個濕紙包煨香熟出火毒細食酒下石腎也三白散出鮑氏方専治腳偏大如柱皮肉不仁時發寒熟陳蘿蔔子地枯蔞即蘿蔔種三白葉生溪澗邊葉如藍頂上三葉白蒼耳大青葉根等分末糊丸每服五十丸空心下又方出朱氏集驗方専治腳以上但腫不消不能行履無名異不以多少一半生用一半火煆如煆自然銅法右生熟半和為細末醋調塗皆如前法敷腫處方得之本州益陽縣坡底歐陽文炳渠本得之異人祕藏三十年今始一傳謹用刋行與衛生君子共之幸毋見方輕藥昔巢君嘗以聖散子方授之東坡先生指江水為盟約不傳人東坡益之乃以傳龎公安常著在方册使巢君之名與此方同為不朽今傳炳之方刋以散施亦使文炳之名與此方相為長久也此係寧鄉米步彭氏刻施本又方治腳氣腫右見用木豆不以多少洗淨煮熟留湯與小七香丸同細嚼以所煮湯下治腳氣腫腹滿虛脹出本草用落鴈木以粉木同煮汁蘸洗治腳氣疼腫殺家蟲風瘙以扶移皮和五木皮煮作湯捋洗腳氣痰壅頭痛附論夫風毒腳氣盛隂陽否膈則氣脈閉塞津液不通水飲停在胸中而結成痰也其後胸腸脹滿身體疼重多唾嘔逆心風痰相引上衝於頭則令頭痛治之宜兼以消風除痰之劑方羚羊角散治腳氣上攻胸膈痰盛頭目眩痛羚羊角鎊白鮮皮黃耆銼白檳榔煨銼山梔子仁各三錢羌活去蘆頭甘草炙銼沃實炒茯神去木桂去粗皮海桐皮銼附子炮製去皮臍大黃銼醋炒郁李仁炒去皮酸棗仁炒麻黃去根節湯煮掠去沫焙獨活去蘆頭芎藭防風去蘆各一兩葛根取粉枳殼麩炒去穰地骨皮車前子炒各三分右為散拌勻空心晚食前溫酒調下二錢至三錢旋復花丸治風毒腳氣壅熱生痰頭項強痛旋復花微炒薏苡仁炒升麻赤茯苓去黑皮地骨皮各一兩白檳榔煨銼五枚前胡去蘆頭微炙防風去蘆芍藥羌活去蘆頭麥門冬去心焙大麻子仁另研如膏馬牙消另研各二兩五錢枳殼去穰麩炒羚羊角鎊白蒺藜炒去角黑參各三錢右為末入馬牙硝大麻仁膏相和煉蜜為丸如梧桐子大食後溫漿水下二十丸日二夜一獨活酒方治腳氣痰壅頭痛喘悶胸膈心背痛獨活去蘆頭山茱茰天門冬去心焙黃耆去蘆甘菊花焙防風去蘆天雄炮製去皮臍側子炮製去皮臍防己白术炒赤茯苓去黑皮牛膝枸杞子焙各三兩磁石生搗研九兩生薑切五兩生地黃七兩貫衆銼捘去黃末二兩右㕮咀以麻豆生絹袋盛以無灰酒五斗浸七日開封初飲三二合漸加常令酒力相接百合湯治風毒腳氣痰厥頭痛百合旋復花去枝葉桑根白皮銼木通銼前胡去蘆頭赤茯苓去黑皮防己檳榔銼天蓼子半夏湯洗去滑焙郁李仁湯浸去皮尖炒另研桃仁湯浸去皮尖雙仁麩炒另研防風去蘆防葵木香陳橘皮湯浸去白焙各一兩右搗篩每服三錢水一盞半入生薑半分