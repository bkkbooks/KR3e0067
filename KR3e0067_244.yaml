body:
  text: 普濟方卷二百四十四明周王朱橚撰脚氣門脚氣腫滿附論脚氣風濕毒氣客摶腎經腎者胃之關也關閇不利則聚水而生病水性就下故令腎氣不化小便不利濕寒之氣下注足脛腫脹不消故謂之脚氣腫滿方牛膝丹參酒治脚氣入冬即苦脚痺弱或筋骨疼不能屈伸皮膚􅍙痺不仁手脚指節腫滿悶或四肢腫腰脛直牛膝丹參薏苡仁砂生乾地黄各半兩五加皮白术各五兩側子炮製去皮臍萆薢赤茯苓防風去蘆各四兩獨活石斛去根各六兩茵芋用葉桂天雄炮去皮臍人參芎藭石南葉炙各三兩細辛去苖葉升麻各三兩磁石煆酒㳯七遍一觔生薑五兩右剉如小豆大用絹袋盛以無灰酒五斗浸一七日蜜封勿令通氣日滿空心取半盞温飲之日五服不飲酒者頻頻少服以知為度風飲湯出金方千専療兩脚疼腫或不仁拘急屈不得行麻黄二兩去節吴茱萸一兩碎獨活二兩秦芁一兩石膏一兩碎杏仁二十枚雙仁去皮碎白术三兩茯苓二兩桂心人參細辛各一兩乾薑一兩半碎防風去蘆防己芎藭甘草各一兩炙附子一兩五錢炮右切以水一斗六升煑取三升分三服取汗佳沉香丸治風毒脚氣上衝臓腑散入四肢虛腫無力雄黑豆一小升圓者淘附子二兩炮製去皮臍吴茱萸湯浸焙炒青橘皮湯浸去白焙各八兩生薑四兩切碎以上五味用葛布作袋盛納大鍋中以水一斗煑令水盡至乾取袋中豆焙乾搗羅為末餘四味並不用更入後藥沉香剉白附子炮肉蓯蓉去麄皮切焙巴㦸天去心各二兩牛膝剉酒浸焙海桐皮剉炙獨活去蘆頭各一兩芎藭澤㵼剉山芋生乾地黄切焙羗活去蘆頭各一兩右除不用四味外搗羅為末拌令匀煉宻和丸如梧桐子大每服二十丸空心以温酒下近晩再服麻黄湯出千金方凡若腫已消仍有此候者急服此湯麻黄去節射干人參茯苓防己前胡去苖枳實各二兩半夏薑製犀角羚羊角青木香橘皮杏仁炮去皮尖棟雙仁炒升麻各一兩生薑五兩獨活三兩吴茱萸一觔右㕮咀以水一斗二升煑取四升分五服相去二十里乆中間進少粥以助胃氣此湯兩日服一劑取病氣退乃止以意消息之若熱盛喘煩者加石膏六兩生麥門冬一升去吴茱萸若心下堅加鼈甲一兩茯苓散治脚氣腫滿赤茯苓去黑皮三兩葶􅐗紙上炒五錢人參防風去蘆甘草炙剉桂去麄皮白术狼毒剉醋炒蜀椒去目并閉口者炒出汗乾薑炮赤小豆炒各一兩大㦸五錢肉蓯蓉酒浸切焙猪苓去黑皮女萎各三分右為散每服一錢温酒調下日二夜一小便利為度沉香大腹皮散出御藥院方能治脚氣腫滿沉重疼痛筋脉不利此證皆由濕氣欝滯經絡所致服之宜通經絡使上下無碍血氣和平腿脚輕利為效沉香檳榔鳥藥木通並剉茴香紫蘇子甘草桑白皮剉並微炒荆芥穂陳皮洗去穰焙乾秤白茯苓去黒皮紫蘇葉各一兩連皮大腹子三兩枳殻麸炒去穰五錢乾木𤓰去穰二兩半右為粗末每服五錢水一盞生薑五片蘿蔔五大片同煎至七分去滓食前温服日進三服十日後一服病愈即止如無蘿蔔子一錢微炒搗碎同煎代之如大便乾燥即服加減神功丸木𤓰丸治乆患脚氣心腹煩滿脚膝浮腫木𤓰切六兩人參二兩桂去麄皮一兩半木香沉香各一兩厚朴去麄皮生薑汁炙陳橘皮湯浸去白焙茈胡去苖各一兩半赤芍藥二兩高良薑一兩檳榔剉三兩吴茱萸湯浸焙炒一兩右搗羅為末煉宻和丸如梧桐子大每服三十丸酒送下不拘時候温服搜風丸出仁存方專治脚氣腫痛大便不通黑牽牛二兩生用檳榔大腹皮青皮皂角木香防風去蘆大黄羗活去蘆枳實川烏烏藥各五錢右為末煉宻為丸如梧桐子大每服五十丸酒下食前茱茰飲治脚氣骽膝腫急腰脾􅍙心煩氣喘呉茱萸醋炒二兩人參赤茯苓去黑皮各三分桑根白皮剉陳橘皮湯浸去白焙大腹連皮剉大黄剉炒細辛去苖葉檳榔剉羗活去蘆頭杏仁湯浸去皮尖并雙仁炒二兩蜀椒去目并閉口者炒出汗三兩右搗篩每服五錢水一盞半生薑五片同煎至八分去滓温服空心食前日再微利為度大腹皮散出聖惠方能治脚氣風毒頭靣脚膝浮腫心腹壅悶大腹皮一兩剉防風五錢去蘆頭羗活五錢桑白皮一兩剉赤茯苓一兩郁李仁一兩湯浸去皮微炒羚羊角三分木通三分剉檳榔一兩枳殻一兩麸炒木香五錢紫蘇莖葉一兩右為散每服四錢以水一中盞生薑半分煎至六分去滓食前温服羚羊角散出聖惠方能治脚氣風毒腫滿心腹痰壅煩燥不能下食羚羊角屑三分桑白皮三分炒獨活五錢枳殻三分麸炒去穰川大黄一兩剉碎半夏五錢湯洗七次去滑前胡一兩去蘆頭木香五錢酸棗仁三分湯浸去皮尖郁李仁一兩湯浸去皮蘆檳榔一兩甘草半兩炙右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時温服羗活丸治脚氣腫滿行步艱難羗活去蘆頭天麻各一兩防己去蘆白殭蠶炒白附子炮牛黄硏各五錢犀角鎊羚羊角鎊丹砂硏各三分雄黄硏三分天南星水煑半日切作片子焙乾三分右為末搗硏煉宻和丸如皂子大每服兩丸不計時候薄荷湯嚼下檳榔湯治脚氣虛腫氣滿不食檳榔剉防己桂去麄皮各一兩麻黄去根節二兩陳橘皮湯浸去白焙一兩半杏仁去皮尖雙仁炒秦芁去苖土附子炮製去皮去臍各五錢葛根根二兩甘草炙剉一兩五錢右剉如麻豆大每五錢水一盞半生薑三片同煎至一盞去滓不拘時候温服犀角丸治風毒脚氣上衝散入四肢虛腫無力犀角鎊二兩檳榔剉白术芎藭羗活去蘆頭人參去蘆赤茯苓去黑皮木瓜防風去蘆牛膝剉酒浸焙石斛去浮皮歹根剉焙各一兩右搗羅為末煉蜜和丸如梧桐子大每服二十丸空心温酒下日晚再服續斷丸治脚氣腫滿不仁屈伸痺攣或上攻心腹脹滿不思飲食續斷黄耆剉杜仲去麄皮炙剉牛膝酒浸切焙懷香子炒羗活去蘆頭白附子炮木𤓰乾者白蒺藜炒棟實去核炒各二兩右搗羅為末酒煑麫糊為丸如梧桐子大每服二十丸膝酒下空心食前服葶藶丸療水氣及脚并虛腫方葶藶子七分生用牽牛子澤膝葉海藻洗去鹽炙昆布如上炙桑根白皮炙甘遂熬椒目郁李仁各三分去皮桂心一分右搗篩蜜和為丸如梧桐子大每服十五丸日再服加至二十丸其藥用桑白皮切五合赤小豆一合通草一兩切以水二升煑取一升下藥忌生葱治脚氣虛腫乾瀉方方出廣南四時攝生論京芎羗活蘿蔔子右等分為散每服二錢先用菉豆一合蒜大者五瓣生薑七片以水同煑罨至爛去薑蒜先喫豆一半後便用豆汁調散次服相去更餘喫豆壓之檳榔散出人活書治脚腫橘葉一大握沙木一握小便半盞酒半盞同以上藥煎右煎數沸調檳榔末二錢食後服茯苓湯治脚氣上攻身體腫滿小便赤澀赤茯苓去黑皮桑根白皮剉防己陳橘皮湯浸去白焙各一兩五錢旋復花五錢杏仁湯浸去皮尖雙仁炒麻黄去根節紫蘇莖葉白术各一兩右搗篩每五錢先以水煑黑豆取汁一盞半入生薑半分同煎至八分去滓温服不拘時候桑根白皮湯治遍身腫小便澀及脚腫烏豆五升桑根白皮切四升二物以水二斗煑取一斗半去滓橘皮二兩大麻子仁一升炒蜀升麻二兩杏仁去皮尖二兩猪苓二兩丹參三兩生薑二兩切右切將七物納前桑皮豆汁中煑取四升朝二服相去如三食久藥消進食食消又更進二服檳榔散出衞生家室方専治脚氣動脚膝腫痛鷄心檳榔十個陳皮一兩去白右為末分作十服煎木瓜湯調下蘇子散出衛生家室方専治脚氣腫疼檳榔子蘇紫蘇子大黃厚朴以上各等分生用右為散每服四錢水一盞半煎至七分服温以利為度未利再服生地黄酒治脚氣腫滿煩疼少力生地黄乾一斤杉木節五兩牛篣一斤去皮丹參二兩牛膝五兩去苖大麻仁八兩防風三兩去蘆頭獨活地骨皮各三兩右剉用生絹袋盛以酒三斗浸六七日每於食前隨性任飲之茯苓散出聖惠方能治脚氣腫滿入小腹相引兩脇妨悶膀胱裏急停積宜水不得宣通時復心憒如醉赤茯苓三分桑白皮三分剉紫蘇莖葉三分漢防己五錢郁李仁一兩湯浸去皮檳榔一兩杏香五錢羚羊角屑五錢紅雪五錢右為散每服四錢水一中盞入半分薑煎至六分去滓不計時候温服芍藥湯治脚氣腫滿胸隔痞塞吐逆不下食赤芍藥防己枳殻去穰麸炒二兩獨活去蘆頭防風去蘆桂去麄皮葛根剉各一兩五錢半夏湯洗去滑姜汁製一兩右搗篩每服三錢水一盞生薑五片同煎至六分去滓空心日午近晚温服萬靈丸治脚氣腿腫破氣消毒紅曲炒白膠香破故紙炒蚕沙炒烏頭炮木别子牽牛半生半熟五靈脂各五錢右為細末蘇木汁麫糊為丸如梧桐子大每服三十五丸温水送下旋復花湯治脚氣腫滿上衝心胸煩悶氣急旋復花犀角鎊各一兩前胡去蘆頭桑根白皮紫蘇莖葉杏仁去皮尖雙仁炒赤茯苓去黑皮各一兩五錢右搗篩每服三錢水一盞生薑三片同煎至六分去滓不拘時候温服丁香湯治風毒脚氣上衝散在四肢虛腫無力丁香陳麴炒令黄沉香剉木香各二兩紫蘇子炒三兩乾木𤓰焙乾五兩呉茱萸浸洗焙乾炒黄一兩右搗篩每服三錢以水一盞煎至七分去滓空心温服近晩再服防己湯治脚氣攣痺或四肢攣腫不可屈伸防己桂去麄皮麻黄去根莭湯煑掠去沬焙各三兩桑根白皮剉炒芍藥各三兩白茯苓去黑皮四兩甘草炙剉一兩五錢右搗篩每服四錢水一盞半入大棗二枚同煎至七分去滓空心日午晚後各一服服訖汗出粉之勿見風冷旋復飲子治脚氣􅍙痺不仁兩脚餒弱脚腫無力重者小腹氣滿胸中痞塞見食即嘔或兩手大拇指不遂或兩脚拇指不遂或小便澀第一療氣滿嘔逆不下食旋復花橘皮各二兩生薑二兩紫蘇莖一握茯苓三兩香豉一升綿裹大棗十枚擘右切以水八升煑取二升四合分三服服後相去十里久日一劑服五劑上氣即下小便澀者加桑白皮四兩慎冷猪肉蒜麫魚粘食如其服此飲二三劑氣下訖即須服大犀角湯服當小便利為度如其胸膈中氣滿者加半夏四兩湯洗待服内氣和脚腫欲消皮膚猶如隔帛者宜服犀角麻黄湯一二劑五日後再服之忌生葱醋物防己散出聖惠方能治脚氣腫滿小便不利喘促不食漢防己五錢赤茯苓三分檳榔一兩桑白皮三分剉木通三分剉猪苓三分去黑皮紫蘇莖葉三分右為散每服四錢以水一中盞入生薑半分葱白二七寸煎至六分去滓不計時候温服大腹皮散出聖惠方能治脚氣腫滿腹脹大小便秘澀大腹一兩檳榔一兩木香五錢木通二兩剉桑白皮二兩郁李仁一兩湯浸去皮炒牽牛子一兩炒右為散每服四錢以水一中盞入生薑半分葱白二七寸煎至六分去滓不計時候温服以利為度除濕丸出揚氏家藏方能治脚氣腫滿疼痛行履艱難大便不通小便赤澀甘遂剉碎炒黑色大㦸剉碎炒黑色威靈仙赤芍藥以上四味各一兩防風去蘆頭五錢白麫五錢乾臙脂一兩右件除白麫臙脂外普為細末次研臙脂同麫諸藥研匀滳水為丸如梧桐子㬠乾沸湯内煑浮漉去再㬠二十丸至三十丸温日水送下或生薑汁浸湯放温送下忌茶食前黑豆丸治脚氣腎脾俱虛皮膚腫滿黑豆一合炒熟桑根白皮炙剉一兩五錢大腹三枚并皮細剉木通陳橘皮去白炒各一兩一分紫蘇莖葉細剉一兩右搗篩每服五錢以水一盞半生薑一分擘破煎至七分去滓空心温服日午近晚各一服甘豆湯出胡氏方専治脚腫此乃脚氣黑豆一兩甘草五錢右同煎湯服之郭鎮廷圭知縣云昔年大學士入闈中多患脚腫至腹則死前後如此者非一人後有施此方服之皆愈盖神方也木通散出聖惠方専治脚氣遍身腫滿喘促煩悶木通一兩剉紫蘇葉一兩猪苓一兩去黑