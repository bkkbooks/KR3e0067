body:
  text: 普濟方卷二百四十四明周王朱橚撰腳氣門腳氣腫滿附論腳氣風濕毒氣客摶腎經腎者胃之關也關閇不利則聚水而生病水性就下故令腎氣不化小便不利濕寒之氣下注足脛腫脹不消故謂之腳氣腫滿方牛膝丹參酒治腳氣入冬即苦腳痺弱或筋骨疼不能屈伸皮膚􅍙痺不仁手腳指節腫滿悶或四肢腫腰脛直牛膝丹參薏苡仁砂生乾地黃各半兩五加皮白术各五兩側子炮製去皮臍萆薢赤茯苓防風去蘆各四兩獨活石斛去根各六兩茵芋用葉桂天雄炮去皮臍人參芎藭石南葉炙各三兩細辛去苖葉升麻各三兩磁石煆酒㳯七遍一斤生薑五兩右銼如小豆大用絹袋盛以無灰酒五斗浸一七日蜜封勿令通氣日滿空心取半盞溫飲之日五服不飲酒者頻頻少服以知為度風飲湯出金方千専療兩腳疼腫或不仁拘急屈不得行麻黃二兩去節吳茱萸一兩碎獨活二兩秦芁一兩石膏一兩碎杏仁二十枚雙仁去皮碎白术三兩茯苓二兩桂心人參細辛各一兩乾薑一兩半碎防風去蘆防己芎藭甘草各一兩炙附子一兩五錢炮右切以水一斗六升煮取三升分三服取汗佳沉香丸治風毒腳氣上衝臟腑散入四肢虛腫無力雄黑豆一小升圓者淘附子二兩炮製去皮臍吳茱萸湯浸焙炒青橘皮湯浸去白焙各八兩生薑四兩切碎以上五味用葛布作袋盛納大鍋中以水一斗煮令水盡至乾取袋中豆焙乾搗羅為末餘四味並不用更入後藥沉香銼白附子炮肉蓯蓉去粗皮切焙巴戟天去心各二兩牛膝銼酒浸焙海桐皮銼炙獨活去蘆頭各一兩芎藭澤㵼銼山芋生乾地黃切焙羌活去蘆頭各一兩右除不用四味外搗羅為末拌令勻煉密和丸如梧桐子大每服二十丸空心以溫酒下近晚再服麻黃湯出千金方凡若腫已消仍有此候者急服此湯麻黃去節射干人參茯苓防己前胡去苖枳實各二兩半夏薑製犀角羚羊角青木香橘皮杏仁炮去皮尖棟雙仁炒升麻各一兩生薑五兩獨活三兩吳茱萸一斤右㕮咀以水一斗二升煮取四升分五服相去二十里久中間進少粥以助胃氣此湯兩日服一劑取病氣退乃止以意消息之若熱盛喘煩者加石膏六兩生麥門冬一升去吳茱萸若心下堅加鱉甲一兩茯苓散治腳氣腫滿赤茯苓去黑皮三兩葶􅐗紙上炒五錢人參防風去蘆甘草炙銼桂去粗皮白术狼毒銼醋炒蜀椒去目并閉口者炒出汗乾薑炮赤小豆炒各一兩大戟五錢肉蓯蓉酒浸切焙豬苓去黑皮女萎各三分右為散每服一錢溫酒調下日二夜一小便利為度沉香大腹皮散出御藥院方能治腳氣腫滿沉重疼痛筋脈不利此證皆由濕氣鬱滯經絡所致服之宜通經絡使上下無礙血氣和平腿腳輕利為效沉香檳榔鳥藥木通並銼茴香紫蘇子甘草桑白皮銼並微炒荆芥穗陳皮洗去穰焙乾稱白茯苓去黑皮紫蘇葉各一兩連皮大腹子三兩枳殼麩炒去穰五錢乾木瓜去穰二兩半右為粗末每服五錢水一盞生薑五片蘿蔔五大片同煎至七分去滓食前溫服日進三服十日後一服病愈即止如無蘿蔔子一錢微炒搗碎同煎代之如大便乾燥即服加減神功丸木瓜丸治久患腳氣心腹煩滿腳膝浮腫木瓜切六兩人參二兩桂去粗皮一兩半木香沉香各一兩厚朴去粗皮生薑汁炙陳橘皮湯浸去白焙茈胡去苖各一兩半赤芍藥二兩高良薑一兩檳榔銼三兩吳茱萸湯浸焙炒一兩右搗羅為末煉密和丸如梧桐子大每服三十丸酒送下不拘時候溫服搜風丸出仁存方專治腳氣腫痛大便不通黑牽牛二兩生用檳榔大腹皮青皮皂角木香防風去蘆大黃羌活去蘆枳實川烏烏藥各五錢右為末煉密為丸如梧桐子大每服五十丸酒下食前茱茰飲治腳氣腿膝腫急腰脾􅍙心煩氣喘吳茱萸醋炒二兩人參赤茯苓去黑皮各三分桑根白皮銼陳橘皮湯浸去白焙大腹連皮銼大黃銼炒細辛去苖葉檳榔銼羌活去蘆頭杏仁湯浸去皮尖并雙仁炒二兩蜀椒去目并閉口者炒出汗三兩右搗篩每服五錢水一盞半生薑五片同煎至八分去滓溫服空心食前日再微利為度大腹皮散出聖惠方能治腳氣風毒頭靣腳膝浮腫心腹壅悶大腹皮一兩銼防風五錢去蘆頭羌活五錢桑白皮一兩銼赤茯苓一兩郁李仁一兩湯浸去皮微炒羚羊角三分木通三分銼檳榔一兩枳殼一兩麩炒木香五錢紫蘇莖葉一兩右為散每服四錢以水一中盞生薑半分煎至六分去滓食前溫服羚羊角散出聖惠方能治腳氣風毒腫滿心腹痰壅煩燥不能下食羚羊角屑三分桑白皮三分炒獨活五錢枳殼三分麩炒去穰川大黃一兩銼碎半夏五錢湯洗七次去滑前胡一兩去蘆頭木香五錢酸棗仁三分湯浸去皮尖郁李仁一兩湯浸去皮蘆檳榔一兩甘草半兩炙右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時溫服羌活丸治腳氣腫滿行步艱難羌活去蘆頭天麻各一兩防己去蘆白殭蠶炒白附子炮牛黃研各五錢犀角鎊羚羊角鎊丹砂研各三分雄黃研三分天南星水煮半日切作片子焙乾三分右為末搗研煉密和丸如皂子大每服兩丸不計時候薄荷湯嚼下檳榔湯治腳氣虛腫氣滿不食檳榔銼防己桂去粗皮各一兩麻黃去根節二兩陳橘皮湯浸去白焙一兩半杏仁去皮尖雙仁炒秦芁去苖土附子炮製去皮去臍各五錢葛根根二兩甘草炙銼一兩五錢右銼如麻豆大每五錢水一盞半生薑三片同煎至一盞去滓不拘時候溫服犀角丸治風毒腳氣上衝散入四肢虛腫無力犀角鎊二兩檳榔銼白术芎藭羌活去蘆頭人參去蘆赤茯苓去黑皮木瓜防風去蘆牛膝銼酒浸焙石斛去浮皮歹根銼焙各一兩右搗羅為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下日晚再服續斷丸治腳氣腫滿不仁屈伸痺攣或上攻心腹脹滿不思飲食續斷黃耆銼杜仲去粗皮炙銼牛膝酒浸切焙懷香子炒羌活去蘆頭白附子炮木瓜乾者白蒺藜炒棟實去核炒各二兩右搗羅為末酒煮麵糊為丸如梧桐子大每服二十丸膝酒下空心食前服葶藶丸療水氣及腳并虛腫方葶藶子七分生用牽牛子澤膝葉海藻洗去鹽炙昆布如上炙桑根白皮炙甘遂熬椒目郁李仁各三分去皮桂心一分右搗篩蜜和為丸如梧桐子大每服十五丸日再服加至二十丸其藥用桑白皮切五合赤小豆一合通草一兩切以水二升煮取一升下藥忌生蔥治腳氣虛腫乾瀉方方出廣南四時攝生論京芎羌活蘿蔔子右等分為散每服二錢先用菉豆一合蒜大者五瓣生薑七片以水同煮罨至爛去薑蒜先喫豆一半後便用豆汁調散次服相去更餘喫豆壓之檳榔散出人活書治腳腫橘葉一大握沙木一握小便半盞酒半盞同以上藥煎右煎數沸調檳榔末二錢食後服茯苓湯治腳氣上攻身體腫滿小便赤澀赤茯苓去黑皮桑根白皮銼防己陳橘皮湯浸去白焙各一兩五錢旋復花五錢杏仁湯浸去皮尖雙仁炒麻黃去根節紫蘇莖葉白术各一兩右搗篩每五錢先以水煮黑豆取汁一盞半入生薑半分同煎至八分去滓溫服不拘時候桑根白皮湯治遍身腫小便澀及腳腫烏豆五升桑根白皮切四升二物以水二斗煮取一斗半去滓橘皮二兩大麻子仁一升炒蜀升麻二兩杏仁去皮尖二兩豬苓二兩丹參三兩生薑二兩切右切將七物納前桑皮豆汁中煮取四升朝二服相去如三食久藥消進食食消又更進二服檳榔散出衛生家室方専治腳氣動腳膝腫痛雞心檳榔十個陳皮一兩去白右為末分作十服煎木瓜湯調下蘇子散出衛生家室方専治腳氣腫疼檳榔子蘇紫蘇子大黃厚朴以上各等分生用右為散每服四錢水一盞半煎至七分服溫以利為度未利再服生地黃酒治腳氣腫滿煩疼少力生地黃乾一斤杉木節五兩牛篣一斤去皮丹參二兩牛膝五兩去苖大麻仁八兩防風三兩去蘆頭獨活地骨皮各三兩右銼用生絹袋盛以酒三斗浸六七日每於食前隨性任飲之茯苓散出聖惠方能治腳氣腫滿入小腹相引兩脅妨悶膀胱裏急停積宜水不得宣通時復心憒如醉赤茯苓三分桑白皮三分銼紫蘇莖葉三分漢防己五錢郁李仁一兩湯浸去皮檳榔一兩杏香五錢羚羊角屑五錢紅雪五錢右為散每服四錢水一中盞入半分薑煎至六分去滓不計時候溫服芍藥湯治腳氣腫滿胸隔痞塞吐逆不下食赤芍藥防己枳殼去穰麩炒二兩獨活去蘆頭防風去蘆桂去粗皮葛根銼各一兩五錢半夏湯洗去滑薑汁製一兩右搗篩每服三錢水一盞生薑五片同煎至六分去滓空心日午近晚溫服萬靈丸治腳氣腿腫破氣消毒紅曲炒白膠香破故紙炒蠶沙炒烏頭炮木别子牽牛半生半熟五靈脂各五錢右為細末蘇木汁麵糊為丸如梧桐子大每服三十五丸溫水送下旋復花湯治腳氣腫滿上衝心胸煩悶氣急旋復花犀角鎊各一兩前胡去蘆頭桑根白皮紫蘇莖葉杏仁去皮尖雙仁炒赤茯苓去黑皮各一兩五錢右搗篩每服三錢水一盞生薑三片同煎至六分去滓不拘時候溫服丁香湯治風毒腳氣上衝散在四肢虛腫無力丁香陳麴炒令黃沉香銼木香各二兩紫蘇子炒三兩乾木瓜焙乾五兩吳茱萸浸洗焙乾炒黃一兩右搗篩每服三錢以水一盞煎至七分去滓空心溫服近晚再服防己湯治腳氣攣痺或四肢攣腫不可屈伸防己桂去粗皮麻黃去根莭湯煮掠去沫焙各三兩桑根白皮銼炒芍藥各三兩白茯苓去黑皮四兩甘草炙銼一兩五錢右搗篩每服四錢水一盞半入大棗二枚同煎至七分去滓空心日午晚後各一服服訖汗出粉之勿見風冷旋復飲子治腳氣􅍙痺不仁兩腳餒弱腳腫無力重者小腹氣滿胸中痞塞見食即嘔或兩手大拇指不遂或兩腳拇指不遂或小便澀第一療氣滿嘔逆不下食旋復花橘皮各二兩生薑二兩紫蘇莖一握茯苓三兩香豉一升綿裹大棗十枚擘右切以水八升煮取二升四合分三服服後相去十里久日一劑服五劑上氣即下小便澀者加桑白皮四兩慎冷豬肉蒜麵魚粘食如其服此飲二三劑氣下訖即須服大犀角湯服當小便利為度如其胸膈中氣滿者加半夏四兩湯洗待服內氣和腳腫欲消皮膚猶如隔帛者宜服犀角麻黃湯一二劑五日後再服之忌生蔥醋物防己散出聖惠方能治腳氣腫滿小便不利喘促不食漢防己五錢赤茯苓三分檳榔一兩桑白皮三分銼木通三分銼豬苓三分去黑皮紫蘇莖葉三分右為散每服四錢以水一中盞入生薑半分蔥白二七寸煎至六分去滓不計時候溫服大腹皮散出聖惠方能治腳氣腫滿腹脹大小便祕澀大腹一兩檳榔一兩木香五錢木通二兩銼桑白皮二兩郁李仁一兩湯浸去皮炒牽牛子一兩炒右為散每服四錢以水一中盞入生薑半分蔥白二七寸煎至六分去滓不計時候溫服以利為度除濕丸出揚氏家藏方能治腳氣腫滿疼痛行履艱難大便不通小便赤澀甘遂銼碎炒黑色大戟銼碎炒黑色威靈仙赤芍藥以上四味各一兩防風去蘆頭五錢白麵五錢乾胭脂一兩右件除白麵胭脂外普為細末次研胭脂同麵諸藥研勻滳水為丸如梧桐子晒乾沸湯內煮浮漉去再晒二十丸至三十丸溫日水送下或生薑汁浸湯放溫送下忌茶食前黑豆丸治腳氣腎脾俱虛皮膚腫滿黑豆一合炒熟桑根白皮炙銼一兩五錢大腹三枚并皮細銼木通陳橘皮去白炒各一兩一分紫蘇莖葉細銼一兩右搗篩每服五錢以水一盞半生薑一分擘破煎至七分去滓空心溫服日午近晚各一服甘豆湯出胡氏方専治腳腫此乃腳氣黑豆一兩甘草五錢右同煎湯服之郭鎮廷圭知縣云昔年大學士入闈中多患腳腫至腹則死前後如此者非一人後有施此方服之皆愈蓋神方也木通散出聖惠方専治腳氣遍身腫滿喘促煩悶木通一兩銼紫蘇葉一兩豬苓一兩去黑