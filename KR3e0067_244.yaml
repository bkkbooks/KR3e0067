榔雞心者半生半炒共一兩青橘皮湯浸去白焙一兩桑根白皮銼炒三分木香五錢右為散每服二錢熱酒調下氣實者三錢不計時候木香湯治風毒攻心悶氣狂躁咽燥口乾氣欲絶或祕澀青木香二兩大黃銼炒一兩生黑豆皮二兩紅雪另研一兩右除紅雪外並粗搗篩每用五錢水一盞半煎至八分入紅雪三錢去滓不拘早晚分溫二服如人行八九里當下燥糞烏豆湯治腳風氣毒攻心心悶倒仆失音不語困甚者烏豆一升淘以水四升煮取二升去豆用汁苦竹葉一握桑根白皮二兩銼大腹皮七枚銼右先將豆汁浸藥一宿明旦同藥煎至七分去滓分溫二服如人行四五里再服已死者斡開口灌之亦愈及炙腳心者七壯男左女右四物湯治腳氣衝心服通利藥後宜服此方甘草炙銼陳橘皮湯浸去白焙各二兩蔥白七莖赤小豆揀三合右銼如麻豆以水五盞煎至二盞半去滓分溫三服空心早晚食前服療腳氣心煩不下食牛乳一小升杏仁四十九枚去皮尖雙仁炒為末橘皮一兩切生薑一兩切右合煎取八合空心頓服令盡虛人或微利亦無妨昔有人服驗檳榔散出聖惠方専治腳氣衝心煩悶不識人檳榔一兩木香五錢蘹香子五錢微炒右為散每服三錢童子小便一中盞煎至六分去滓不計時候溫服木香散出聖惠方治腳氣衝心煩悶臍下氣滯宜服此木香五錢檳榔一兩木通一兩銼右為散每服四錢以水一中盞入生薑半分蔥白七寸煎至六分去滓不計時候溫服半夏湯出聖惠方専治腳氣衝心煩悶氣急坐臥不安半夏湯洗七遍切焙二兩桂去粗皮一兩五錢檳榔三分銼右搗篩每服三錢水一盞入生薑半分同煎至七分去滓溫服以微利為度吳茱茰湯一名木瓜葉茱茰湯出聖惠方専治腳氣衝心煩悶腹脹氣急欲死者吳茱茰以湯洗焙乾炒五兩木瓜切作片曝乾二兩檳榔銼二兩右搗篩每服五錢水一盞半入竹葉一握同煎至八分去滓溫服以快利為度一方用生薑煎服如人行十里再進一服或汗或吐或瀉即瘥一方無竹葉治腳氣腫心煩悶亂不識人出肘後方右大豆二升水三升濃煮汁頓服半升未定更服半升即定木瓜湯一名茱茰湯能治腳氣風濕毒氣攻心煩悶手足脈絶方見本門本類半夏湯治腳氣衝心煩悶氣急坐臥不安半夏湯洗去滑切焙一升檳榔七枚右㕮咀如麻豆大以水七升煮取二升去滓分溫二服每如人行四五里一服麻仁湯治腳氣衝心上氣大小便澀小腹急痛大麻仁微炒赤小豆各一兩右以水七升煎取二升半去滓分溫三服隔兩日更一劑檳榔湯治腳氣攻心煩滿及腳膝浮腫白檳榔一枚生搗取末一錢七分生薑汁少許右以童子小便二合相和煎一沸微溫頓服一方用溫酒合和服大腹湯治腳氣攻心煩滿及腳膝浮腫大腹皮銼四枚杏仁湯浸去皮尖雙人拍碎一十枚右以童子小便一盞半同煎八分去滓分溫二服空心食前吳茱茰湯治腳氣攻心欲死者吳茱茰四升淡竹葉切一升右以水一斗煮取二升去滓分五服兼主上氣腹滿大快比加檳榔四十枚服之更快尋常氣滿日服一劑檳榔七枚合皮碎橘皮一兩厚朴及吳茱茰各二兩生薑四兩水三升煮取一升二合分二服此湯性溫消脹療腳氣兩腳腫滿暴破衝心衆醫不瘥小便三大升黍穰三大升右相和煮三五候時浸腳日三四度極神效其藥令盆中盛下著火暖之如池甕法周回四塞然後浸腳捋使汗出立效茱茰湯治腳氣毒氣上攻心手足脈絶服此十愈七八又治腳氣入腹困悶欲死腹脹喘急風濕䏩膞腰腳不能舉動一名茱茰丸吳茱茰一升湯洗木瓜二枚去尖去穰切焙乾右以水一斗三升煮取三升分三服如人行十里久再進一服或吐或汗或㵼便愈若服得下治此甚易但鑽擊熱悶人耳此方起死神驗如無木瓜取吳茱茰一味煎服亦效一方加青木香犀角二味尤妙三因方以此二味用酒糊為丸名茱茰丸如梧桐子大每服五十丸至一百丸酒飲任下或以木瓜入青鹽五錢研為膏以牛膝浸酒任下浸腳礬石湯治腳氣衝心白石二兩又以漿一斗五升煎三五沸浸足良用清水亦可治腹臟間虛冷氣腳氣衝心心下結硬者悉治之取陳皮一斤和杏仁五兩去皮尖炒加少蜜為丸每日食前飲下三十丸又捋腳方右搗烏麻碎水煮漬大驗治若身腫氣攻心者以生豬肉去皮以漿洗令兩枚中壓去汁細切作膾蒜虀啖之日二頓下氣除風治腳氣衝心右取茱茰生薑汁飲之甚良驅風丹専治逺年近日不問隂陽二症腳足腫痛不可忍川烏一兩生用不去皮尖大者破作四邊小者破作二邊銼如穀子大用麻油煎令黃色勿焦去油焙草烏四兩擇雞心者生用不去皮尖每個破作二片擇白淨者用心黑者不用銼如彀子大二兩用油製川烏法二兩用鹽一兩拌勻和水微淹著浸三夜一日一度漉轉候日數足取出去水再用乾鹽一兩同炒俟乾去鹽勿令焦本法用滷汁浸三晝夜去滷汁炒乾用無滷汁鹽代地龍四兩置隂潤處紗帕裹定輕捶節去土取用不必更杵雞心檳榔一兩銼焙赤小豆一兩擇去菉豆黃豆何首烏一兩銼焙乾木瓜一兩銼焙右為細末用黃子醋一碗好頭麵五錢煮糊為丸如梧桐子大每服三十丸空心麝香冷鹽酒吞下不用溫酒服訖不可便食熱物或服藥後覺遍身麻木不可因其麻木棄而不服恐是丸數過多或食熱物太早仍忌香萊茵陳豆豉一切動風毒物杉木節湯治腳氣入腹衝心或心脅有塊毒勝痰逆痞滿喘急汗流搐搦昏悶上視咬齒甚至垂絶不知人宜此藥以救急杉木節一大升橘葉一升無葉以皮代大腹子七個連皮銼碎右以童子小便三升煎取一升半分二服若一服得快利停後服治腳氣衝心煩悶亂不識人用白檳榔子二箇為末分三貼空心暖小便五大合調服日再服治風毒腳氣上衝心煩悶絶出本草以陸英煎取湯入少酒可浴之妙治腳氣攻心出本草以狗肝作生薑醋進之當泄勿復之治腳氣衝悶洗腳漬腳湯出本草以糜穰一石納釜中多煮取濃汁去滓納椒目一斗更煎十餘沸漬腳三兩度如冷溫漬洗瘥治腳氣衝心出本草以木瓜一顆嫩者去子煎服之普濟方卷二百四十四
