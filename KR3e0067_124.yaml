body:
  text: 普濟方卷一百二十五明周王朱橚撰傷寒門訣下太陽脈病證治法三十九證震甲結胸之病項且強其形亦如柔痙狀邪結胸中俯仰難陷胸丸子除悽愴震乙頭疼發熱惡寒時表未解而反下之痞鞕心胸成硬痛陷胸湯用亦相宜震丙結胸傷寒六七日脈緊而沉心下堅熱實按之如石硬陷胸湯劑更宜煎震丁傷寒熱結十餘日水在胸中脅下淤頭汗微微心有熱陷胸湯下悉能除震戊汗出復下大便難渴而舌燥又無眠日晡潮熱從心下少腹堅來五六天痛滿連臍不可近氣虛腹內更相煎陷胸湯劑須臾進餌下能教重病痊震已脈滑而浮熱尚淺按之心下痛還同除非小陷胸湯主此證名為小結胸震庚宜汗反將泠水噴劫之其熱腹中傳肉上粟起或煩渴文蛤五苓散可煎熱先在表旋歸裏裏實寒邪痞結胸痛鞕心中無熱證陷胸三物有竒功外無熱時斂入裏陷胸治之猶未止白散飲調與服之結消熱下病即已震辛太少之陽併病時頭眩項強亦無期心胸痞結非宜汗當刺大椎肝肺俞震壬婦人中風七八日發熱表邪還惡寒經水適來傳裏候脈遲脅滿礙胸間身涼讝語結胸狀邪熱應知血室干當刺期門泄肝氣更宜消息瀉之安震癸寒熱中風發有時經期遠斷竟違期熱入血室渾如瘧可與柴胡湯主之離甲七日發熱微惡寒却教肢節更疼煩雖疑心下猶存結加桂柴胡和解安離乙汗下曽經五六日小便不利渴煩時寒熱往來胸脅滿柴胡乾薑與桂枝離丙頭汗惡寒為在表心胸鞕滿裏傳推明醫好辨隂陽證識得柴胡表裏宜離丁嘔而發熱小柴胡妄下還防熱結無心下滿時成硬痛陷胸湯劑與之蘇離戊蒸蒸發熱辨隂陽不與柴胡可較量但是滿而不痛者宜煎半夏瀉心湯離己漐漐汗出作有時心中痞滿更如斯乾嘔短氣表方解十棗湯煎治裏宜離庚痞拘心下按之濡脈在關浮熱反虛實熱虛邪須辨識大黃黃連瀉心除離辛心下痞時復惡寒應從內熱表虛看瀉心湯中加附子因陽攻痞自能安離壬下之成痞瀉心湯不解還教渴飲漿口燥煩加溲不利五苓之藥效非常離癸汗解之後胃不和心胸痞􅀈噫難磨腹中下利雷鳴響益胃瀉心薑療瘥兊甲誤下之人利數行水穀不化腹中鳴滿胸痞鞕加乾嘔胃弱心煩痞轉增下之益甚非為熱胃中鞕是氣虛膨正宜甘草瀉心療內補隂虛表亦清兊乙心下􅀈時利不止理中復與證還添石脂餘糧湯最妙後利須從小便參兊丙汗吐下後猶不解噫氣不除心下堅痞硬而虛和胃氣旋復代赭石湯煎兊丁下後不可桂枝湯汗出而喘亦同方麻杏甘膏偏主療除邪有法用之良兊戊外證未除數下之熱而遂利裏虛為痞鞕表裏俱不解桂枝人參湯最宜兊己汗下惡寒痞膈間桂枝解表最宜先大黃攻痞黃連佐加入瀉心湯內安兊庚汗出傷寒熱勿瘳心中痞鞕裏當求嘔而下利猶兼吐須用柴胡大者投兊辛項頭不痛脈微浮氣上攻心痞鞕憂當吐胸寒宜瓜蒂能除喘息利咽喉病人脅下素有痞連在臍傍痛引腹腹痛因引入隂筋此名臟結邪相觸兊壬吐下之時表裏煩惡風燥熱口中乾數升水飲猶然渴白虎加參療可安兊癸傷寒大熱若無多口燥心煩渴奈何背上惡寒猶有表人參白虎自當和坎甲脈浮發熱身無汗麻黃湯療頗能除渴而欲飲無他證白虎五苓亦可袪坎乙太少陽傳項強時心中痞鞕自難舒慎無妄下詳其證當刺大椎肝肺俞坎丙太陽少陽來合病自利黃芩湯主之嘔者黃芩加半夏生薑陽下治偏宜坎丁傷寒有熱在胸中腹痛都緣邪氣攻嘔吐黃連湯可用隂陽升降始能通坎戊傷寒八九日來深風濕頭煩痛怎禁體重不能自轉側桂枝附子飲宜斟坎己大便􅀈時小便利滲津發汗兩非宜桂枝附子湯除桂更加白术效尤竒坎庚風濕相摶骨節煩屈伸掣痛苦艱酸甘草附子湯煎下固衛風邪即便寬坎辛傷寒之脈浮而滑表熱邪傳在裏寒白虎湯煎除內外益氣散熱自能安坎壬傷寒脈結代而還悸動心中不自寬真氣內虛邪更甚炙甘草劑便平安陽明脈病證治法四十四證木甲不吐不下心煩憂胃中鬱熱如蒸油隂陽之氣無偏勝調胃承氣湯可投木乙汗後脈遲不惡寒身重氣短潮熱還大便巳鞕腹中滿大承氣飲下之寬木丙惡寒多汗體微燒外未解來熱不潮可與小承調胃氣通時腹滿病須消木丁不轉失氣未可攻腹中燥糞熱難容大便鞕少飲水噦小承氣飲服之通木戊傷寒不便十餘日日晡潮熱發邪言獨語真如見鬼狀直晴更覺識人難怵惕尋衣微帶喘脈弦者活澀歸天大承氣下追其熱一服利時止後煎木己陽明之病汗何多津液焦枯外泄過讝語小承湯味入胃中燥鞕亦能和木庚陽明讝語熱而潮食反不能燥屎焦便鞕有時能食者亦宜逐結大承調木辛燥屎難容在胃中讝語汗出此為風表虛裏實證昏亂承氣湯煎大者通木壬三陽合病要分清汗下還須别重輕腹滿身重難轉側不仁讝語屬陽明微塵面垢少陽證遺尿乃是太陽經手足逆冷兼自汗除非白虎保安寧木癸二陽併病發潮熱手足汗流大便難太陽證罷下之愈承氣湯宜大者餐火甲脈浮而緊口中乾喘熱緣何不惡寒發汗反教生讝語燒針煩􅏥更無眠下之又恐虛其胃客氣乘虛膈不寬舌上胎生何法治梔子䜴湯吐後安火乙渴欲飲水口舌乾中焦客熱燥而煩人參白虎湯宜治潤燥除邪病始痊火丙脈浮發熱渴飲漿小便不利客膀胱豬苓湯利下焦熱用瀉之時必得康火丁脈若浮來更帶遲裏寒表熱更何疑下利清榖知寒甚四逆湯溫用却宜火戊陽明病下外有熱手足溫而不結胸心下懊憹飢不食好將梔子䜴湯攻火己病在陽明發熱潮大便溏時小便調胸脅鞕滿邪猶在服了柴胡病自消火庚脅滿而嘔大便難更看舌上白胎瘢柴胡湯主通津液胃氣因和汗濈然火辛脈弦浮大辨隂陽短氣不通脅滿張嗜卧鼻乾不得汗一身面目悉皆黃溲難潮熱時加噦耳後耳前腫刺芒十日若教浮脈續便當速用小柴湯火壬脈但浮時無裏證表邪猶合用麻黃不尿腹滿猶加噦關格之病入膏肓火癸發汗小便自利者津液內竭不可攻自欲大便猶有鞕土瓜豬膽密導通土甲陽明病若得遲脈汗出多而微惡寒未解之時宜發汗桂枝湯下表和安土乙脈浮無汗屬陽明表實還教喘不停發汗麻黃湯可用熱邪解散病安寧土丙陽明頭汗身無汗際頸而還渴引漿瘀熱發黃溲不利定當速餌茵陳湯土丁症在陽明蓄血間雖然屎鞕便非難若教黑色邪傳裏抵當湯速下之痊土戊陽明下後覺心煩初鞕後溏仔細看若果胃中有燥屎大承氣散下之安土己日晡發熱如瘧狀審看內外更詳之脈實大承氣湯下脈浮發汗桂枝宜土庚下後不便六七日煩熱腹滿痛相纒是知燥屎宿食故可與大承氣劑煎土辛小便不利大便難微熱時時喘不眠宿食胃中猶燥結大承氣劑下之寬土壬食穀不受嘔更饒茱萸湯劑始能調服湯愈甚緣何故當易别方理上焦土癸惡寒汗出太陽經渴而發熱屬陽明渴如不止邪傳裏津液調和用五苓金甲趺陽脈澀更兼浮脾約胃強津液留大便難時小便數麻仁潤燥最相投金乙三朝發汗猶不解發熱蒸蒸入胃間調胃承氣湯煎服胃中邪熱下之安金丙傷寒腹脹熱邪招吐後緣知在上焦此是熱邪傳入胃調胃承氣亦能消金丁若吐若下若發汗小便因數大便堅表邪入裏脾約候小承氣湯病即痊金戊傷寒得病六七日大便鞕時小便利裏實心滿可攻之大承氣湯為要劑金己目不了了晴不和微熱便難實更多此是內邪危惡證大承氣劑急消磨金庚陽明發熱汗尤多津液將枯可奈何入府之邪攻更急大承氣劑下之瘥金辛發汗不解腹滿痛邪傳入臟急須攻大承氣劑下府熱潤燥除積有竒攻金壬腹滿不減實熱堅若教時減又為寒大滿大實可除下承氣湯宜大者煎金癸少陽合病與陽明脈滑而數宿食癥少陽脈勝陽明負大承氣劑泄其經水甲脈浮而數邪傳裏六七日來大便難喜飢消穀并瘀血抵當湯下即能痊水乙傷寒七八日身黃其色渾如橘子囊小便不利腹微滿便宜速下茵陳湯水丙傷寒發熱要消詳瘀在胃中身必黃梔子蘖皮湯可療除邪解散效非常水丁傷寒發熱瘀在裏表濕身黃甚法消赤小豆湯除濕熱麻黃加入與連翹少陽脈病證治法一證紀甲未經吐下脈沉緊脅滿往來寒熱時乾嘔邪傳半表裏柴胡湯劑正相宜太隂脈病證治法三證母甲太隂之病脈浮時發汗還當用桂枝在表之邪隨汗散四肢煩痛頗相宜母乙自利不渴太隂病中焦寒在理當溫臟中須識因寒故用藥之時四逆純母丙誤下因成腹痛時桂枝加芍最相宜若教大實當除下桂枝大黃湯主之少隂脈病證治法二十三證天甲少隂發熱脈何沉其病當宜在表尋邪氣未深微發汗麻黃附子細辛斟天乙少隂得病二三日附子麻黃甘草湯邪未深時無裏證和榮益衛散之良天丙心煩之候更無眠寒極須從變熱看黃連阿膠湯與服扶隂散熱便能安天丁少隂得病口中和其背惡寒問炙科附子湯煎寒可散隂消陽助起沉疴天戊身體疼痛手足寒浮沉細向脈中看脈浮可汗沉寒甚便與溫經附子煎天己病利頻多血與膿桃花湯用有神功下焦不約裏寒甚扶氣散寒益胃中天庚少隂腹痛四五日小便不通內結深下利頻頻便膿血桃花湯效莫沉吟天辛少隂吐利病難任手足寒邪厥泠侵煩躁陽爭將欲死茱萸湯可散沉隂天壬少隂下利喉咽痛脅滿心煩邪內傳可與豬膚湯散熱調隂益胃自能痊天癸二三日病少隂傳咽痛時將甘草煎不愈更尋何法治選慿桔梗妙湯瘥人甲少隂之病入咽中言語聲難瘡在嚨苦酒煎湯頻潄咽解煩除熱有神功人乙病來相摶少隂中咽痛寒邪客氣沖半夏湯煎頻咽服可將此法再旁通人丙少隂主水自調和寒不能禁下利多惟有白通湯可用散寒溫裏病當瘥人丁乾嘔而煩下利并厥逆無脈要醫明白通湯內加豬膽暴出脈死微續生人戊真武湯煎制水氣少隂證治問元因四肢沉重兼腹痛小便不通自利頻嘔加生薑除附子下利去芍用薑辛咳者却須收逆氣乾薑五味細辛溫有時小便還通利便減茯苓恐滲津人己手足厥逆利清榖面赤身熱不惡寒隂盛格陽脈微絶通脈四逆治之安面時赤色加蔥用腹痛除蔥用芍酸咽痛去芍加桔梗嘔者生薑二兩寬便教利止脈不出去梗加參亦霍然人庚少隂四逆肢不溫有時泄下還腹痛小便不通或咳悸四逆散煎即可用再加乾薑五味子止咳下利主治共悸者導氣加桂枝小便不利茯苓送腹痛加附用補虛薤白煮湯療下重人辛少隂下利六七日咳而乾嘔更無眠心煩口渴知其熱滲泄豬苓湯治痊人壬少隂得病二三日口燥咽乾急下之邪未深時熱已甚大承氣劑用之宜人癸少隂自利色純青口燥咽乾藴熱蒸心下邪乘猶自痛大承氣劑療之平地甲少隂之病六七日腹滿不便速下宜熱壅陽明勝腎水大承氣劑效偏竒地乙少隂之病脈沉沉外症未形何處尋四逆湯煎宜急療溫中即可散邪隂地丙欲吐不能手足寒胸者實者吐之寬膈間痰飲成乾嘔四逆湯溫始得安厥隂脈病證治法十九證乾甲蛔厥其人靜復煩此為胃弱臟中寒蛔聞食臭時當吐溫臟烏梅圓下安乾乙脈滑而厥可消詳有熱之時在裏藏白虎湯煎除內熱手足厥逆炙之良乾丙手足厥寒脈細微除非四逆入當歸陽虛隂弱須生助願得良醫辨病機乾丁厥逆其人內久寒散寒始得助陽還當歸四逆辛溫味加入薑萸病即安乾戊大汗出時熱不去四肢拘急痛難當惡寒下利厥而逆散寒復陽四逆湯乾己內外雖分汗下餘陽虛隂勝總無殊因而厥泠亡津液四逆回陽病可除乾庚胸中實結滿而煩厥泠雖飢不可餐脈乍緊時邪內陷須當瓜蒂吐之安乾辛厥而心悸水猶停入胃還教下利并欲治厥時先治水茯苓甘草劑偏靈乾壬咽喉不利吐膿血寸脈沉遲手足寒麻黃升麻湯主治裏虛便泄治尤難乾癸傷寒本自寒下者復因吐下更增寒寒格之時食即吐芩連薑參等分煎坤甲下利清榖內有寒身熱不解外增煩汗出而厥陽虛甚通脈四逆湯可餐坤乙利亡津液熱傷氣氣虛後重轉難通堅腎厚脅還散熱苦寒主治白頭翁坤丙下利腹滿身疼痛裏有寒時表未通四逆湯煎利可止身疼更與桂枝攻坤丁下利而渴欲飲漿有熱在內要參詳白頭翁湯服之愈散鬱涼中作主張坤戊下利還將讝語并就中燥糞辨分明此為胃實腸虛症良劑之中選小承坤己下利之後却更煩按而心下亦非堅乘虛客熱胸中滿梔子䜴湯吐即安坤庚嘔而脈弱邪傳裏裏若虛時小便多身熱微微還見厥急煎四逆救沉疴坤辛乾嘔之時吐沫涎更兼頭痛上攻煎散寒溫裏茱萸劑治得其方亦可痊坤壬嘔而發熱用柴胡此證多由胃氣虛怫鬱諸經并表裏良醫審視莫模糊霍亂脈病證治法六證霍甲惡寒而利脈猶微利止須知血已虧四逆加參兼益血臨時消息可施為霍乙頭疼發熱隂陽半欲飲不飲辨機關熱重當煎五苓散寒多急與理中圓霍丙吐利止時內自和身疼猶是表邪多外臺有語汗之愈當用桂枝湯療瘥霍丁發熱惡寒汗出時上吐下利裏虛為四肢拘急厥而泠四逆湯煎主治之霍戊既吐且利小便利脈微欲絶大汗漬內寒外熱恐亡陽救之速投四逆劑霍己吐下之餘津液微汗出而厥脈如絲通脈四逆加豬膽陽虛欲絶好為之隂陽易勞復脈病證治法六證勞甲隂陽差易病其人少氣強交體重身熱上沖胸頭不舉隂中小腹急難容拘攣膝脛難舒展兩眼生花亦暗瞢餘毒薰蒸詳此症燒裩散服有竒功勞乙大病新瘥又復勞枳實梔子䜴湯熬宿食還加大黃用或解或下辨分毫勞丙瘥後傷寒還發熱小柴胡可去其疴脈浮汗解沉實下消息合宜無太過勞丁傷寒瘥後致脾虛腰下腫緣水氣淤牡蠣澤瀉散主治利其小便病能除勞戊喜唾應知胃上寒猶疑瘥後有邪干胃間津液須溫潤咽下理中丸便寬勞己傷寒解後面羸瘦少氣吐而逆氣拘竹葉石膏湯主治和調胃氣熱方除傷寒棺墓總例歌括木土棺墓上知尸臨墓下土金歸二木棺無氣止金水尸中有命隨火水氣前逢命者金火尸中有氣微水火棺中生有氣尸棺下木金危水火命前逢氣可土木逢之不可推墓棺上多應死尸棺下救應遲金土尸來木上病人危困不須疑尸向棺頭金木位患家猶自好求醫傷寒棺墓起例假令戊寅人甲子日得病前進三辰加至司天上見子是少隂腎之經當日行土運水氣微邪受病係天字號下第一證其脈浮緩其證腰腳沉重病甲巳日差是氣墓無邪其證濕寒又如乙亥日已生人病司天在亥司地在寅從邛上將已數到司天見丑字即大隂證也又將日干加人命已上數到司天見辛字壬字號下藥傷寒手三隂三陽運氣從午至亥假令甲午日病是手少隂經甲土運午是大氣歌云土火乙庚疾大減先干後差乙未日病是手太陽經乙屬金運未為金氣歌云金見丁辛先汗後差丙申日病是少陽經病屬水運身是火氣歌云水火命前逢氣可先汗後差丁酉日病是手陽明經丁屬水運酉為金氣歌云木風火熱氣和清戊戌日病是太陽經戊屬火運戌為火氣歌云火乙丁先汗後差己亥日病是手厥隂經己屬土運亥為火氣歌云土火乙庚疾大減傷寒足三隂三陽運氣從豫至巳假令甲子日病是足少隂經甲屬土運子為水運歌云土水甲巳從來道乙丑日病是足太隂經乙屬金運丑為土氣歌云金土丁壬汗似蒸丙寅日病是足少陽經丙屬水運寅為木氣歌云水木元來號甲丁丁卯日病是足陽明經丁屬木運卯為土氣歌云木土丙辛之日差戊辰日病是足太陽經戊屬火運辰為水氣歌云水火氣前逢命者己巳日病是足厥隂經己屬土運巳為木氣歌云土木逢之不可推又棺墓例假令乙化金陽明金一尸重併又甲化土太陽水命墓相刑傷寒汗差總例歌括金見丁辛大乙丁丙己木水乙己并戊壬土水大丙己水土原來號用丁土水甲己從來道金土丁壬汗作蒸木土丙辛之日差火金己己汗如傾水金甲戊言文汗木火乙戊不差爭土火己庚疾大減金木安康在丙庚金燥水寒中土濕木風火熱氣和清此是加臨安愈訣莫與迷入取次輕傷寒汗差起例假令戊戌入庚子日病是少隂司天將本命庚子日午起伍子元建歌云乙庚之歲戊為頭從寅順行至本命戊土是丙戌是小腸屬火逢水汗出第三日是壬寅與本命戌是三合小差第五日甲辰相沖第七日丙午相沖丙是水運見汗足太陽膀胱經腎與膀胱為合故足少隂與少隂與足太陽為表裏從目內眥上頭連於風府分為四道下項并正别脈上下六道以行於背與身為經太陽經為諸陽主氣或中寒邪必發熱而惡寒緣頭項腰脊是太陽經所過處今頭項痛身體疼腰脊強其脈尺寸俱浮故知太陽經受病也傷寒證識字號用藥歌訣甲子司天午人病還向甲子加人􅒛後千數到本司天破字號下第一證常將日干加人􅒛數到司天便見應看其十字那箇字尋號輪著支上定假令甲子日亥生人􅒛酉陽明證木字號第二證乙字用藥調胃承氣湯主之男逆傳經一日酉陽明經陽明第二證木字號下乙字號藥承氣湯主之二日甲少陽火紀字號下第一證甲子號藥小柴胡湯主之三日未太隂土母字號下第二證乙字號藥桂枝湯主之四日午少隂大人字號下第二證癸字號藥承氣湯主之五日已厥隂木坤字號下第八證辛字藥柴胡湯六日辰太陽水日字號下第七證庚字號藥桂枝湯主之女順傳經一日未太隂土母字號下甲字藥桂枝湯主之二日申少陽火紀字號下甲字藥柴胡湯主之三日酉陽明金木字號下丙字藥承氣湯主之四日戍太陽水武字號下丁字號藥調胃承氣湯主之五日亥厥隂木乾字號下戊字藥四逆湯主之六日子少隂火天字號下己字藥桃花湯主之傷寒運氣相尅病證衰旺歌氣旺人衰應不死人旺氣衰必定凶火水尅人原是吉人􅒛尅出寅時一刻或三刻差假令木􅒛上見丙丁屬心小腸相火受病火臨其輕見戊己脾土受病土臨其輕也上見甲乙肝膽木受病木臨其輕也運用十干起則君火不當其位也餘皆放此四時傷寒傳證例假令丙寅生人丙戌日得病丙辛是水運戌是太陽丙為水氣係天符日其病難愈當日足太陽司天前三辰司地是巳丑乃丑為隂支從子上將丙寅數到司天戌上是少隂君火證第二日受病二日傳至亥足厥隂木前證少隂君火乃厥隂木生少隂君火為母生子宜補脾㵼脾而愈三日傳至戌足太陽水前少隂大水尅火客勝主為賊邪其日雖因不死從初病戌日至第三日是戌子為火運子為火氣為水不能尅火一水不能尅三火也四日傳至酉足陽明土少隂火生胃土宜補心而愈五日傳至申足少陽木少隂火生膽木宜補肝㵼脾六日傳至未足太隂土少隂火生太隂脾土宜補脾而愈七日傳至午少隂腎水少隂火第七日至壬辰木運水氣為水生火水尅火為中半之道其人雖不死火困而已八日傳至巳厥隂心包絡火兩火相逄為此十二日合辰日差又汗差例假令乙化金陽明金見丁辛至第四日或第八日汗差又甲化土太陽寒水甲子日汗第三日見已亦有汗氣天非常運尅氣時無災若氣來尅運必須忙若逄尸絶井丘墓必定難逃此度殃此是先賢真妙訣後人學者仔細詳傷寒三丘五墓歌命前一殺是三丘斯人得病不須憂命後一殺是五墓相逄必定淚交流但將五子元中建又逄棺槨墓休囚日神但無尸棺墓醫人病療得無休注云戊己辰戍丑未為墓甲乙寅卯為庚申辛酉為棺尸棺居墓上日尸居棺下日對沖是又云寅卯辰為三丘丑為墓此例用五字元建從寅上順行至司上見木為棺金為尸尅人命者此為棺中有鬼谷必但以二字皆是辰却告風府一穴是督脈陽維之會在項後髮際二寸入筋宛宛中不可炙針入四分留三呼此二穴陽維之會非太陽經也太陽經穴夾項後髮際大筋外亷陷中名曰天桂不針此者桂枝已主太陽病故也足少陽膽經與膽為合故足厥隂與足少陽為表裏起於目外皆絡於耳分為四道下缺盆循於脅并正别脈六道上下主經營百鄭流氣三部故病人胸脅痛而耳黃帝針經邪在肝則兩脅痛又曰膽脹脹者脅下痛口中苦善太息或口苦咽乾或往來寒熱而嘔其脈尺寸俱弦者知少陽經受病也足少隂腎經脈起於小指之下斜趣足心行者入跟中上至股內復㿌貫腎絡膀胱直行從腎上貫肝鬲入肺中繫舌本傷寒熱氣行於藏流於少隂之經少隂主腎腎惡燥故渴而引飲又經發汗吐下已後藏府空虛津液枯竭腎有餘熱亦渴故病人口燥舌乾而渴其脈尺寸俱沉者知少隂經受病也足太隂脾經為三隂之首其肺有於脾胃絡於嗌喉故交入腹滿而嗌乾尺寸俱沉細者知太隂經受病也足厥隂肝經厥者盡也靈樞曰玄為左足之厥隂戌為右足之厥隂兩隂俱盡故曰厥隂夫隂盡為晦隂出為朔厥隂盡為義也其脈循隂器而止絡於舌本也脈弗營則筋急則引舌與卯故唇青舌卷而卯縮凡病人煩滿而囊縮其脈尺寸俱微緩者知厥隂經受病也帝日氣口何以獨為五藏主岐伯曰胃者水榖之海六府之源口也五味入口藏於胃以養五氣氣口亦太隂也是以五藏六府之氣味皆出入胃變見於氣口右手關前一分氣口之位人迎氣口屬太隂肺之經而黃帝乃云人迎亦胃脈何也在手關前一分者人迎之位挾喉嚨兩旁者人迎之穴人迎之位屬手大隂肺之經人迎之穴屬陽明胃之經故素問云人迎亦胃脈也右手關前一分人迎之位大溪穴足少隂腎之經男子以右腎為命門女人以右腎為命門三十六難曰命門者精神所舍原氣所係男子藏精女人繫胞主生死之要病人有命門脈者活無者死仲景云少隂病手足逆冷發熱者不死脈不至者灸太溪七壯故傷寒必診太溪以察其腎之盛衰也太溪穴足內踝後根骨上動脈陷中衝陽穴足陽明胃之經人受氣於穀穀入胃乃傳於五藏六腑皆受氣為榮濁者為胃榮行脈中衛行脈外隂陽相貫如環無端胃為水穀之海主稟四時皆以胃氣為本是謂四時之變病死生之要會故傷寒必疹衝陽以察胃氣之有無也衝陽在足跗上五寸骨間動脈上去陷谷三寸仲景云太陽病初服桂枝湯反煩不解者先刺風府却與桂枝湯後其證尚自汗發熱惡寒脈尚寸浮尺弱而反煩為邪痺在陽維經故可先針風池一穴是少陽陽維之會在項後髮際陷中是針入一寸一分穴在乳上脘下筋骨近腹處是也凡婦人病法當針期門不用行子午法恐纒藏膜引氣上但下針令病人吸五吸停針良久徐徐出針此是平寫法也凡針期門必寫勿補可肥人二寸瘦人寸半深足陽明胃經脾與胃為合故足太與足陽明為表裏從鼻來於鼻絡於目下咽分為四道并正别脈六道上下行腹綱維於身蓋諸陽在表陽明主肌肉絡於鼻故病人身熱目疼鼻乾不得卧其脈尺寸俱長者知陽明經受病也穴在臍下一寸五分氣海二寸名丹田三寸名關元關元是小腸募足少隂任脈之會針入八分留三呼㵼五吸炙亦良然不及針普濟方卷一百二十五
