body:
  text: 普濟方卷二百三十五明周王朱橚撰勞瘵門總論夫骨蒸殗殜復連尸疰勞疰蟲疰毒疰熱疰冷疰食疰鬼疰等皆曰傳尸者以疰者疰也病自上疰下與前人相似故疰其變有二十一種或三十六種或九十九種大略令人寒熱盜汗夢與鬼交遺泄白濁髮乾而聳或腹中有塊或腦後邉兩有小結核連復數箇或聚或散沉沉默默咳嗽痰涎或咳膿血如肺痿肺癰狀或腹下利復羸瘦困乏不時積月纍年以至於死死後乃疰易傍人乃至滅門者是也更有蜚尸遁尸寒尸喪尸疰尸謂之五尸及大小附著等證不得知所苦無處不惡乃挾諸鬼邪而害人以三因權之內非七情所忤外非四氣所襲雖若麗乎不內外因奈其證多端傳變遷移難以推測故自古及今愈此病者十不得一所謂狸骨獺肝天靈蓋銅鑑鼻徒有其説未嘗見效唯膏肓崔氏炙穴若早炙之可活幾半晚則不濟也病者憎寒發熱自汗靣白目乾口苦精神不守恐畏不能獨卧其傳在肝病者憎寒發熱靣黑鼻燥忽忽喜忘大便苦難或復泄㵼口瘡其傳在心病者憎寒發熱靣青唇黃舌本強不能咽飲食無味四肢羸瘦吐涎沫傳在脾病者憎寒發熱靣赤鼻白乾燥毛折咯嗽喘氣時吐白涎或有血線傳在肺病者憎寒發熱靣黃耳輪焦枯筋骨痠痛小便白濁遺瀝胸痛其傳在腎所謂勞蒸者二十四種隨證皆可考尋毛折髮焦肌膚甲其蒸在皮外人覺熱自反惡寒身熱瞤劇其蒸在肉髮焦鼻衄或復尿血其蒸在血身熱煩燥痛如針刺其蒸在脈爪甲焦枯眼昏兩脅急痛其蒸在筋版齒黑燥大杼酸疼其蒸在骨背膂疼痛胻骨酸􅤙其蒸在髓頭眩熱閟口吐渴涎眼多眵淚其蒸在腦男子失精女子白淫其蒸在玉房乍寒乍熱中脘與膻中煩悶其蒸在三焦小便赤黃凝濁如膏其蒸在膀胱傳道不均或泌或泄腹中雷鳴其蒸在小腸大腹隱痛右鼻乾疼其蒸在大腸口鼻乾燥腹脹睡卧不安自汗出其蒸在胃口苦耳聾脅下痛其蒸在膽裏急後重肛門澀閉其蒸在回腸小腹㽱痛筋脈縱緩隂器自強其蒸在宗筋眼昏淚下時復眩暈躁怒不常其蒸在肝舌焦黑氣短躁悶灑灑淅淅其蒸在心唇乾口瘡胸腹悶滿畏寒不食其蒸在脾咳嗽喘滿咯痰吐血聲嘶音逺其蒸在肺耳輪焦枯腳氣酸疼起居不得其蒸在腎情想不寧無故精泄白物綿綿而不舉其蒸在右腎心主胞絡心膈噎塞攻擊痛疼俯仰煩寃其蒸在膈諸證雖曰不同其根多有蟲囓其心肺治之不可不絶其根也外臺祕要病源云夫蒸有五一曰骨蒸其根在腎旦起體涼日晚即熱煩躁寢不能安食都無味小便赤黃忽忽煩亂細喘無力腰疼兩足逆冷手心常熱蒸盛傷內即變為疳食人五臟二曰脈蒸其根在心日增煩悶擲手足出翕翕思水口唾白沫卧即浪言或驚恐不定脈數蒸盛之時或變為疳臍下悶或暴利不止三曰皮蒸其根在肺必大喘鼻乾口中無水舌上白小便赤如血蒸盛之時胸滿或自稱得疰熱兩脅下脹大咳徹背連脾疼眠寐不安或蒸毒傷臟口內唾血四曰肉蒸其根在脾體熱如火煩躁無汗心腹鼓脹食即欲嘔小便如血大便祕澀蒸盛之時或體腫目赤寢卧不安五曰內蒸亦名血蒸所以名內蒸者必外寒而內熱把手附骨而熱盛其根在五臟六腑其人必因患後得之骨肉自消飲食無味或皮燥而無光蒸盛之時四肢漸細足趺腫起大凡男女傳尸之病心胸滿悶背轉疼痛兩目不明四肢無力雖欲寢卧卧不得寢者膂急膫痛膝腦痠痛多卧少起狀如佯病每至平旦精神尚好日午後四肢微熱靣無顔色喜見人過常懷忿怒才不如意又便多嗔行立腳弱夜卧盜汗夢與鬼交或見先亡或多驚悸有時咳嗽雖思飲食不能多餐死在須臾精神尚好或時微利兩脅虛脹口燥鼻乾常多粘唾有時唇赤有時欲睡漸成沉羸猶若涸魚不得死矣其病變狀多端考其原先從腎起初受之氣兩脛痠疼腰背拘急行立腳弱腎已受矣次傳其心心受其氣夜卧必驚或多怔悸心懸汲汲夢見先亡有時盜汗飲食無味口內生瘡心常煩熱惟欲眠卧朝輕夕重兩頰口唇悉皆紅赤如傅胭脂又時手足五心皆熱心皆受已次傳於肺肺初受氣咳嗽少力有時氣喘卧則更甚鼻口乾燥不聞香臭或時聞朽腐物氣憒憒欲吐肌膚枯燥時或刺痛或似蟲行乾皮細起狀如麩片肺既受已次傳於肝肝初受氣兩目􅉩􅉩靣無血色常欲顰眉眼視不逺目睛乾又時赤痛或復睛黃朝暮騰常常合眼眠卧不熟肝既受已次傳於脾脾初受氣兩脅虛脹食不消化又時㵼利水穀生蟲有時肚痛腹脹雷鳴唇口焦乾或生瘡腫毛髮乾聳無有光澤或時上氣擡眉喘氣痢赤黑汁至此候者將死證矣大凡此疾良由祖先積孽殺害過多或有命債殃及後世或淪沒惡趣未應解脫為人之後不為釋寃不為薦福或患此而亡傳染是疾以希資救又其家人久不營葬不時祭祀山水衝注狐狸穿犯幽宅不寧出而為􅑂遞成相傳傳染不已傳尸非惟一門相染而成也人之氣血衰敗臟腑虛弱中於鬼氣因感其邪遂成此疾其候咳嗽不已或胸膈妨悶或肢體疼痛或肌膚消瘦或飲食不入或吐利不定或吐膿血或吐鮮血動至一二升或嗜水漿或好歌詠或愛悲愁或發癲歇或便溺艱難或因酒食而遇或因風雨而來或問病弔喪而得或朝走暮遊而逢或因氣聚或因血行或露卧於田野或偶會於園林傳惹斯疾傳尸者須知三尸九蟲何也三尸者名在後論九蟲者煙蟲寸白胃蟲人皆可治之其餘六蟲有六代行在後人若受一蟲此人死後兄弟子孫骨肉親屬綿綿相傳以至滅族凡疾始覺精神不美氣候不調切戒慎酒色調節飲食如或不然妄言邪師或言鬼􅑂以至不起慎之戒之尸蟲遊食日辰及治法大扺六蟲一旬遍遊四穴轉流周而復始已具六代法中自立春一日後食起三日一食五日一醉歸于所歸穴大醉五日故五日蟲醉可以下藥及灸其三日蟲食切不可妄有醫治蟲在人身中一蟲可占十二穴六蟲在人身中共遊七十二穴上旬十日從心至頭遊四穴中旬從心至臍遊四穴下旬從臍至足遊四穴上旬可先服藥後灸所遊穴其蟲頭上向若下火灸蟲如紫蠶苗出在汗中更服藥取之以蟲盡為度便服補藥永得安耳中旬其蟲所遊穴中頭向下亦服藥取之不灸也恐蟲覺晤永難取蓋此蟲性已通靈務在精審勿令有悟可也觀尸蟲色知病淺深凡明醫知者先知毒氣與蟲並行攻人臟腑遇陽日長雄蟲遇隂日長雌蟲因先食臟腑脂膏故其色白次食血肉血肉盡故其蟲黃赤次食精髓故其蟲紫色精髓盡故其蟲黑色傳入腎中病人方死若求醫士曉通病源先取其蟲視其理自知輕重其蟲如白色可二十日服藥補之其蟲如黃赤色可六十日服藥補之其蟲如紫黑色此疾已極可百二十日服藥補之十中可保一二雖不能為一身除害亦可為子孫除害矣服藥仍須一載之中刻意調攝亦可痊平如此得命可為再生也又云蟲頭赤者食患人之肉其病可治頭口白者食患人之髓其病難治雖不得斷則不傳子孫矣六代傳病及諸蟲形狀凡治病之道要須藥病相應神效仍在㵼實補虛調治臟腑方得痊愈故三尸九蟲種種靈異莫令知之或似蜣蜋或似紅線馬尾或似蝦蟆形或似刺蝟或似鼠行或如爛麵或有足無頭或有頭無足或化精血歸在亢陽之內種種形類實難辨之淺學之流難施及劑誤醫甚多枉死不少或則取蟲不補或則學淺妄傳皆是徒費資財通無去病之理遂致夭折豈不悲哉出危氏方此蟲在人身中如嬰兒之狀背上毛長二寸此蟲變動形如鬼在人臟腑中此蟲形如蝦蟆變動在人臟腑中上三蟲在人身中染著之後或大或小令人夢寐顛倒魂魄飛揚精神耗散飲食漸減形容漸羸四肢痠痛百節勞倦憎寒壯熱背膊拘急腦與頭痛口苦舌乾靣無顔色鼻流清涕虛汗常多行步艱難眼睛多痛其蟲過丙丁日食起醉歸心腧穴中四穴輪轉周而復始大醉可醫矣取蟲出後補心當瘥第二代并尸蟲形狀遊食日治法第二代為覺勞病謂傳受此疾已覺得病覺病者患乃自知夜夢不解與亡人為伴侣醒後全無情思昏惰似醉神識不安所嗜食味輒成患害或則氣發動風所加四體不和心胸滿悶日漸羸瘦骨節乾枯或嘔酸水或則醋心唇焦口乾鼻塞腦痛背膊酸疼虛汗常出腰膝刺痛知此疾狀早須醫治失時致傷命出危氏方此蟲形如亂髮可長三寸或似守宫此蟲形如蜈蚣在人臟腑中此蟲形如蝦在臟腑中上三蟲在人身中令人氣喘唇焦口乾咳嗽憎寒心煩壅滿毛髮焦落氣脹吞酸津液漸衰次多虛竭鼻多清水四肢將虛臉赤靣黃皮膚枯瘦腰膝無力背脊痠痛吐血唾膿語聲不利鼻塞腦痛胞膈多痰重者心悶吐血強倒在地不能自知其蟲遇庚辛日食起歸肺腧中四穴輪轉周而復始大醉可醫矣炙取蟲後補肺當瘥第三代病并尸蟲形狀遊食日治法第三代為傳尸勞病傳受病人自得之日漸羸瘦頓改容顔日日憂惶夜夜恐懼不遇良醫就死不逺出危氏方此蟲形如蚊蟻在人身中俱遊臟腑此蟲形如蜣蜋在人身中俱遊臟腑此蟲形如刺蝟在人三焦上三蟲在人身中令人三焦多昏日常思睡嘔吐苦汁或吐清水粘涎腹脹虛鳴卧後多驚口鼻生瘡唇黑靣青日漸消瘦精神恍惚魂夢飛揚飲食不消氣咽氣乾汗出如油目昏多淚其蟲遇庚寅日食起醉歸厥隂穴中四穴輪轉周而復始大醉可醫矣取其蟲出後補隂當瘥第四代病并尸蟲形狀遊日治法出危氏方此蟲形如亂絲在人臟腑中此蟲形如豬肝在人臟腑中此蟲形如蛇在人臟腑中上三蟲在人身中令人臟腑虛鳴嘔逆腸中痃癖氣塊憎寒壯熱肚大筋生腰背疼痛或虛或瘦㵼痢無時行履困重四肢憔悴時氣上喘口苦皮乾飲食過多要喫酸醎之物其蟲遇戊巳日食起醉歸脾腧穴中四穴輪轉周而復始大醉可醫矣取出蟲後補脾當瘥第五代病并尸蟲形狀遊食日治法出危氏方此蟲形或有足無頭或有頭無足此蟲形如鼠在人身中俱遊臟腑此蟲形如精血變動在人臟腑或在陽宫上三蟲在人身中令人多怒氣逆筋骨拳變四肢解散靣黑靣青憎寒壯熱腰背疼痛起坐無力頭如斧斫眼睛時痛翳膜多淚背膊刺痛力憊身羸手足乾枯卧著床枕不能起手足似中風四肢頑麻腹內多痛眼見黑花忽然倒地不省人事夢寐不祥覺後遍體虛汗其蟲遇甲子日食起醉歸肝腸穴中四穴輪轉周而復始大醉可醫矣取蟲出後補肝當瘥第六代病并尸蟲遊食治法此蟲形如馬尾有兩條一雌一雄此蟲形如鱉在人臟腑此蟲形如爛麵或長或短上三蟲在人身中居於腎臟透連脊骨令人思食是物要餐身體尫羸腰膝無力髓寒骨熱四肢枯乾眼見火生或眼多黑暗耳內虛鳴隂濕燥癢冷汗如油夢與鬼交小便赤黃醒後昏沉臍下結硬或奔心胸看物如艷心腹悶亂骨節疼痛其蟲遇丑亥日食起醉歸腎腧穴四穴輪轉周而復始大醉可醫矣蟲出後補腎填精當瘥取蟲防護法先令病人家用好紙糊一密室不留些罅隙尋志誠人過遞以安息香水灑了過遞人之身又以雄黃雌黃塗其鼻孔耳眼唇上安排鐵鉗一箇布巾一幅用香油二斤以鍋盛頓微煎令沸仍用高桶一箇以好石灰在桶內生布巾蓋桶口却服取蟲藥五更初一服五更三點一服服藥後腹中疼痛如刀斧劈不妨至已牌必須下蟲或取下臭穢如膠漆或吐㵼膿血癥塊皆於灰桶中其蟲或從汗出紫蠶苖狀或於耳鼻口中出或小便中出異般形狀不止一也或青黑或黃紅大者急用鐵鉗取於油內煎當日將油紙裹蟲入瓦􅎆內石灰填實埋棄於深山逺僻處免致再染人患人衣服床席並皆棄去醫人吩咐藥後亦須逺去論論曰夫勞瘵一證為人之大患凡受此病者傳變不一積年疰易甚至滅門可勝嘆哉大抵合而言之曰傳尸别而言之曰骨蒸殗殜復連尸疰勞疰蠱疰毒疰熱疰冷疰食疰鬼疰是也夫疰者疰也自上疰下病源無異是之謂疰又其變則有二十二種或三十六種或九十九種又有所謂五尸者曰蜚尸遁尸寒尸喪尸注尸是也其名不同傳變尤不一感此疾而獲安者十無一二也大凡五臟所傳皆令人增寒發熱其證狀各異有如傳之於肝則靣白目枯口苦自汗心煩驚怪傳之於心則面黑鼻乾口瘡喜忘大便或祕或泄傳之於脾則面青唇黃舌強喉哽吐涎體瘦飲食無味傳之於肺則靣赤鼻白吐痰咯血嗽喘毛枯傳之於腎則靣黃耳枯胸滿胻痛白濁遺瀝又有二十四種勞蒸者亦可因證驗之蒸在心也少氣煩悶舌必焦黑蒸在小腸也腹內雷鳴大腸或祕或泄蒸在肝也目昏眩暈躁怒無時蒸在膽也耳聾口苦脅下堅痛蒸在腎也耳輪焦枯腰腳痠痛蒸在右腎也情意不定泄精白絮蒸在肺也喘嗽咯血聲音嘶逺蒸在大腸也右鼻乾疼大腸隱痛蒸在脾也唇口乾燥腹脅脹滿畏寒不食蒸在胃也鼻口乾燥腹膨自汗睡卧不寧蒸在膀胱也小便黃赤凝滑如膏蒸在三焦也或寒或熱中脘膻中時覺煩悶蒸在膈也心胸噎塞疼痛不舒蒸在宗筋也筋脈縱緩小腹隱痛隂氣自強蒸在回腸也肛門祕澀傳道之時裏急後重蒸在玉房也男子遺精女子白淫蒸在腦也眼眵頭眩口吐濁涎蒸在皮也肌膚鱗起毛折髮焦蒸在骨也版齒黑燥大杼痠疼蒸在髓也肩背疼倦胻骨痠疼蒸在筋也眼昏脅痛爪甲焦枯蒸在脈也心煩體熱痛刺如針蒸在肉也自覺身熱多不奈何四體瞤動蒸在血也毛髮焦枯有時鼻血或復尿血詳諸病證大略如斯若究其根惟心肺受蟲囓禍之甚也治法先宜去根次須攝養亦有早炙膏肓崔氏穴而得愈者若待其根深蒂固而治之則無及矣平時得三五方用之頗驗謾録於左以為備治論曰傳尸勞者骨蒸之病流傳五臟也其證殗殜半卧半起旦即醒然午後微蒸情常不悅心多驚悸夜即盜汗夢與鬼交兩頰紅赤唇如血色欲醒不得眠欲食不能食或喘氣咳嗽心胸滿悶背體煩疼兩目精明四肢無力脊膂拘急膝脛痠疼兩脅虛脹時或微利鼻口乾燥漸至尫羸雖死在須臾精神尚爽是其候也治之若緩猶如水涸不覺其死近世以來童男室女丈夫婦人月水不調臍腹冷痛五心煩熱醫者一見便作骨蒸勞證治之病者聞之莫不驚駭殊不知人本無勞證皆緣稟受怯弱血氣不足治之不得其法用藥不善遂成此疾且多以紫胡地骨皮青蒿知母藕節龞甲紫苑麥門冬為退熱之劑已服之後熱雖漸退未久復來醫者便究本原不詳醫書所謂虛熱語再用前件等藥愈進而血氣愈虛疾勢已甚矣况前藥性冷必傷脾胃日復一日不思飲食以致腸胃滑泄肢體瘦悴以致不救此乃柴胡等藥悮之矣深可憐憫蓋柴胡等藥乃傷寒表肝之劑若血氣虛者非所宜服向來必用方中亦曽言之但其辭文隱而難曉今明言其略庶幾易知若受病之人未曽服前件藥尤為易治已曽服後倘或過多真氣表盡難以收救宜服宜神飲凡患骨蒸之人坐卧居處不宜傷冷亦不得傷熱冷甚則藥氣難通兼之脹滿食不消化或膈氣上熱甚則血脈擁塞頭眩目疼唇乾口燥心胸煩悶渴欲飲水此等皆是將息過度之狀深可誡也將養之法須寒溫得所先熱而脫先寒而著若背傷冷即令咳嗽若手足傷熱即令心煩若覆衣裳後即眠卧盜汗若覆衣過薄即心腹脹滿所以飲食不限時節寧可少食保無宿注數數進之助藥勢也必須以軟易消故也不宜生硬恐損胃氣致不消也此皆以易消食之為瘥骨蒸之病無問男女忌房室舉動勞作有所不宜陳臭酸鹹粘食不消牛馬驢羊大小二豆豬魚油膩酒麵瓜果野鳥之屬葵笋蒜蕨及生冷等並不得餐自必平復一月以後乃漸開也大略如此觸類而長之此病宜餐煮飯鹽䜴豆醬薑蔥韭枸杞苜蓿苦菜地黃牛膝並須煮爛食之候病稍退恐肌膚虛弱可時食乾鹿脯治諸疾藥性出拔粹方實熱黃芩黃連黃蘖大黃氣烏梅秦艽柴胡血青蒿鱉甲蛤蚧小麥牡丹皮肺鼻乾烏梅天門冬紫苑麥門冬皮白舌吐血石膏桑白皮膚昏昧氣睡牡丹皮氣遍身氣熱悶促鼻乾人參黃芩梔子大腸口鼻孔乾痛大黃芒硝脈唾白浪語脈絡溢脈緩急不調生地黃當歸心舌乾黃連生地黃血髮焦地黃童子小便當歸桂心小腸下唇焦赤茯苓生地黃木通脾唇焦芍藥木瓜苦參肉食無味而嘔煩躁不安芍藥胃舌下痛石膏粳米大黃芒硝葛根肝眼黑川芎當歸前胡筋甲黑川芎當歸膽眼白赤色柴胡栝蔞三焦乍寒乍熱石膏竹葉腎兩耳焦生地黃寒水石石膏知母腦頭眩悶熱地黃防風羌活髓髓沸骨中熱天門冬當歸地黃骨齒黑腰痛足逆變且食臟龞甲地骨皮牡丹皮當歸生地黃肉肢細跌腫臟腑俱熱石膏黃蘖胞小便赤黃澤㵼茯苓沉香滑石生地黃膀胱左耳焦澤㵼茯苓滑石凡此諸蒸皆熱病後因食肥肉油膩及房酒犯之而成久蒸不除變成勞瘵即死矣勞瘵附論勞瘵之證非止一端其始也未有不因氣體虛弱勞傷心腎而得之又有外感風寒熱濕之氣先為瘧疾以致咳嗽寒邪入裏失於調治不能保養過於房勞傷於飲食久而成勞瘵之後其為證者令人肌肉羸瘦毛皮乾枯寒熱盜汗遺泄白濁或腹中有塊或腦後兩邊有小結核或聚或散或咳嗽痰涎或咳唾膿血及傳變則為二十四種或三十六種或九十九種又有所謂五尸者其名狀雖不同傳變雖不一其實所傷不過五臟諸方所載皆云有蟲嚙心肺間治法先當去然後調養五臟至若傳尸一證名骨蒸殗殜復連尸疰勞疰蟲疰毒疰冷疰食疰鬼疰是也如勞瘵多是血氣虧損多因輕病時發汗通利差誤所致或感六氣成咳嗽末解散先服補藥竟成久咳復以房勞恣飲強食變為寒熱只宜服平補之藥又有能倍食肉思食者名曰傳尸亦有滅門者其藥雖有天靈蓋紫河車狐肝獺爪麝香等自未及用世云有鬼依其身有蟲蝕其臟婦人多病此蓋於産後閉經而傳之耳方木香蛤蚧丸出直指方治勞瘵久嗽聲乾骨痿瘦瘁蛤蚧一對尾全者洗淨酥炙生鱉甲去裙醋炙乾白茯苓川芎當歸北五味子牛膝各七錢半綿黃芪柴胡知母貝母雞心檳榔明阿膠炒酥巴戟酒浸去心曬桃仁酒浸去皮尖各五錢木香三錢肉豆䓻三箇生秦艽洗羌活生髮紙燃火燒存性破故紙炒各三錢右細末煉蜜丸彈子大每服一丸煎棗湯空心嚼下參芪散出直指方治勞瘵嗽喘咯血耳焦潮熱盜汗柴胡當歸明阿膠炒酥黃芪蜜炒白茯苓川芎半夏製貝母去心枳殼製北桔梗秦艽洗甘草焙各五錢人參北五味子羌活防風杏仁水浸去皮欵冬花桑白皮炒各三錢五分生鱉甲去裙米醋炙黃紫苑茸右粗末每服二錢五分薑棗煎食後少頃服沉香鱉甲散治勞瘵身痛方見虛勞門虛勞類凝神飲子出仁存方治勞瘵憎寒發熱口乾咽燥自汗咳嗽唾血瘦劇倦乏人參去蘆當歸去尾白芍藥白茯苓去木黃芪去蘆白术半夏麯五味子熟地黃甘草川芎蓮肉大麥門冬去心桔梗以上各等分右為粗末每服四錢用水一盞半烏梅棗子各一箇煎至七分去滓服如嗽加阿膠虛極胸滿者加木香濕紙煨沉香亦得不思食加扁豆一方無川芎桃仁煎出直指方治勞疰傳尸骨蒸倦弱大川椒出汗生犀角當歸續斷各一兩桃仁去皮炒鱉甲醋炙黃各一兩五錢白礬煆豬牙皂角蛤蚧一雙去頭足洗酥炙安息香蘇合香雄黃各一分麝一錢右為末煉蜜和丸如梧桐子大每服二十丸米飲下或用真川椒泡湯下虎牙丸出直指方治勞瘵瘦悴咳嗽聲啞骨痿殺下瘵蟲紫河車一具即男子胎衣水洗淨酒醋再折洗用童便並好酒煮爛麝五分鹿茸七錢五分酒炙黃狗頭取肉四兩童便並酒煮爛大紅川椒去合口并子以黃捍紙托之就放於熱爐內頻撥去油頓地上蓋一宿一兩五錢生鱉甲一枚去裙醋浸一宿又醋一盞仰盛慢火炙令醋盡桃仁水浸去皮秦艽洗木香明阿膠炒酥各五錢雄黃安息香生髮紙燃火燒存性各二錢五分虎頭關骨酒浸二宿炙焦一兩五錢右為細末以紫河車狗肉杵粘為丸桐子大每服七十粒月首五更空心米湯下午時又服如無胎衣以雄豬肚代用修事同治勞疾出百一選方虎糞內骨一錢人骨為最獸骨次之殺虎大腸用著亦可用青蛇腦小豆許或菉豆許同酥塗炙色轉為度無蛇腦只酥炙亦得天靈蓋三錢酥炙黃為末鱉甲極大者酥炙黃為末一兩九肋者妙青蒿取稍三四寸細判六兩安息香五錢桃仁一分去尖研為末絹篩過麝香一錢别研檳榔一箇别研細末豉三百粒蔥白二十一根打破童子小便半升東引桃桞李桑枝各七莖粗如筋頭大各七寸細銼楓葉二十一片如無亦得初不曽用右先將青蒿桃桞李桑枝楓葉豉以官升量水三升煎至半升許去滓入安息香天靈蓋虎糞內骨龞甲桃仁與童子小便同煎取汁去滓有四五合將檳榔麝香同研均調作一服早辰溫服以被蓋覆出汗恐汗內有細蟲以帛子拭之即焚此帛相次須㵼必有蟲下如未死以大火焚之並棄長流水內所用藥切不得令病人知日後亦然十來日後氣體復元再進一服依前焚棄至無蟲止此藥如病者未極可以取安已極俟其垂死則令下次已傳染者服之先病者不可救後來斷不傳染袁州寄居五節郎李應本相州法司嘗以吏役事韓似夫樞密兵火後忽於宜春見之云從嶽侯軍得官今間居於此從客問其家事澘然淚下曰應先有兒寒女三人長子因買空宅無人所居之室忽覺心動背遂感勞疾垂殆傳於其次室女長子既死女病尋極繼又傳於第三子證候一同應大恐即禱於城隍每月設麵飯以齋雲水兾遇異人且許謝錢三千萬數日因往市中開元寺前有一人衣羽士服自稱貧道踵足而呼曰團錬聞宅上苦傳尸勞貧道有一藥方奉傳同入寺中問其姓名不答曰投云云應即假筆書之道人言欲過湖南應留之飯云已喫飯了欲贈之錢云有盤纒臨行又言此藥以天靈蓋虎糞內骨為主切須子細尋覔青蛇腦如無亦可服藥前一日須盛享城隍求為隂助應曰既求於神何必用藥道人曰不然即揖别西去應以事頗異敬如其言治藥既成設五神位各具飲饌十品如待賔客以享城隍又别列酒食以犒隂兵仍於其家設使者一位於病榻之前服藥食頃臟腑大下得蟲七枚色如紅爊肉而腹白長約一寸濶七八分前鋭後方腹下近前有口身之四周有足若魚骨細如針尖而曲已死試取火焚之以鐵火筯札刺不能入病頃減後又服一劑得小蟲四枚自此遂安今已十年肌體悅澤不復有疾道人後竟不來此方傳之樞密之孫韶州使君希道蠟杏湯出醫學切問治逺年日近勞疾柴胡桔梗甘草各一錢老鼠刺根黃芩茴香炒鶯粟殼去蒂穰蜜炙胡椒各二錢烏梅黃蠟杏仁欵冬花各一錢右以新瓦瓶盛水三四碗安藥在內密封慢火煨熟睡至四更暖服一盞喫盡用好酒三四碗再煨滓再服亦如前婦人加當歸男子加人參吐血加阿膠北五味子再生丹治一切勞證黃瘦虛損諸藥不能治者此藥大效沉香八錢五分木香五錢檳榔五錢大茴香一兩鹽炒小茴香一兩鹽炒木通穿山甲一兩酥炒全蝎一兩微炒通草一兩燈草五錢頭紅花二錢五分右為細末甘草膏子為丸如梧桐子大每服三四十丸酒鹽湯空心服乾物壓之雄麝丸出直指方治勞瘵殺瘵蟲下惡物雄黃雌黃青黛乾代赭石煆醋淬硃砂研細各二錢五分大蝦蟆一箇酒炙黃安息香阿魏酒浸研用各二錢男子天靈蓋酥炙黃二錢麝五分川巴豆肉肥者十粒略去油右為細末軟粳飯頭揉和杵丸如桐子大每二十粒桃仁十四箇去皮研煎湯月初五更空心下治瘦出本