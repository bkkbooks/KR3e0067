秋三服一年五服勞蟲并盡病若在上先吐若在下先利皆出黑蟲如髮及似馬尾一方有東向桞枝無蔥白五枝散一名青桑枝飲出醫方集成取勞蟲方青桑枝桞枝石榴枝桃枝梅枝各七莖每長四寸許青蒿一小握右用童子小便一升蔥白七莖去頭葉煎及一半去滓别入安息香阿魏各一分再煎至一盞濾去滓調辰沙末五分檳榔末一分麝香一字分作二服調下五更初一服五更三點時一服至巳時必取下蟲色紅白者可救青黑者已傳入臟不治見有所下即進軟粥飯溫暖將息不可用性及食生冷毒物合時須擇良日不得令貓犬孝服穢惡婦人見之危氏方名青桑枝飲有鬼臼赤箭各五錢凡傳尸者必須先服此藥取下蟲然後隨證調治亦不可一槩用如初取下蟲色已黑縱服妙藥亦無補也然猶不使傳他人一方無石榴皮藍汁方出直指方殺瘵蟲惡蟲皆化為水生藍青葉研取自然汁一大盞雄黃枯白􅈨安息香紅硬降真香末各五分麝少許右以雄黃等同研入藍青汁內月初五更空心服此方通治蟲毒解諸毒潤神散出三因方治勞瘵憎寒發熱口乾咽燥自汗皮劇煩躁人參黃芪淡竹葉甘草炙桔梗麥門冬各等分右為末每服二錢水一盞煎七分不以時自汗大小麥同煎溫服治勞疾木香二兩麻黃二兩陳皮杏仁艾各四兩右用好酒一瓶入藥瓶中浸一箇月日進二盞空心服薤白散治久患咳嗽肺虛成勞瘵及吐血咯血等患鱉甲炙二兩鹿角膠三分甘草一兩炙阿膠炒一兩右為散每服三錢用水一盞入薤白一莖長二寸同煎至六分食後􅎔卧先嚼薤次服藥一日三服專治勞瘵杏仁一升去皮尖小童小便冬浸五日夏浸三日取出新水淘淨後用胡桃仁四十九箇湯浸去皮蜜養人參一兩白􅈨五錢右熬成膏丸如彈子大每服一丸噙化食後服豬肚丸出御藥方治男子肌瘦氣弱咳嗽漸成勞瘵白术牡蠣燒各四兩苦參三兩右為細末以豬肚一箇煮熟研成膏和丸如梧子大每服三四十丸米飲下日三四服神效瘦者服即肥莫測其理穎昌李薦方叔其子得效施人亦屢應明目丹出百一選方治勞瘵硇砂硼砂雄兔糞三味各等分右為末用生蜜為丸如梧子大每服七丸甘草一分捶破新水半盞揉甘草濃汁吞下每服日須初一以後十五以前五更時令病人坐起須預戒令不得作聲息氣服之作聲即不效或怕水冷微溫不妨每合藥時必於八月十五日三更前合如急要服則就每月十五日以前月明依合勿令婦人雜人雞犬貓畜見合時與服時倘過人不得作聲切記切記治蟲解勞悅澤肌膚去勞熱檳榔一兩五錢龍膽一兩乾漆五錢右為細末煉蜜和丸如梧桐子大每服十丸至十五丸熟水吞下治患勞人燒香法出本草玄參一斤甘松六兩右為末蜜一斤和入瓶內封閉埋窨十日却取出用炭六兩燒又用蜜六兩再入瓶內埋五日取出燒常令病人聞香氣其病自愈治勞病錦文大黃半斤血竭五錢五分為末右用酸醋五升用砂鍋內煮令醋乾同血竭為末煉蜜為丸彈子大空心服男子青木香湯下婦人當歸紅花酒送下柴胡散出經驗良方治邪入經絡體疲肌熱兼治伏暑柴胡四錢甘草右為細末每服二錢水一盞煎至八分食後熱服冬潤肺春夏解勞傷老幼者可服治勞氣用小芥子三升搗末絹袋盛酒三浸之蜜七日去滓溫服半升漸至一升半得方便合忌如法藥神傳膏出本事方治勞瘵吐血妄行用剪草一斤婺台州皆有惟婺州者可用狀如茜草又如細辛淨洗為末入生蜜一斤和為膏以銀石器盛之不得犯鐵器九蒸九曝一日一蒸曝病人五更起向東坐不得語用匙挑藥如粥服之每服四匙良久用稀粟米飲壓之藥冷服粥亦不可大熱或吐或下皆不妨如久病肺損咯血只一服愈尋常咳嗽血妄行每一服時神效有一貴人其國封病瘵其尊人嘗以此方示之九日而藥成前一夕病者夢人戒令翌日勿令服藥次日將服之為屋土墜器中不可服再合既成又將服為貓覆器又不可食又再作未就而是人卒矣此藥之異如此若小小血妄行一啜而愈或云是陸農師夫人鄉人艾孚先嘗親説此事渠後作大觀本草亦取入集中但人未識不苦信爾太上延年方勝追魂散出華陀中藏經方治勞瘦垂死方人參杏仁去皮尖天靈蓋一兩炙椒一分去目微炒出汗桞桃心一小握柴胡一兩右用童子小便一升末一兩煎令熟空心日午各服五日效神仙奪命丹出楊氏家藏方釣傳尸勞蟲石燕子一枚火燒令紅醋淬候冷母丁香一錢五分水磨雄黃二錢酒蠟五錢鱉血一蛤蜊殼右件為細末將酒蠟鱉血同化開為膏子次入餘藥和成劑丸如菉豆大每用一丸裝在鈎子繫上鈎緋線一丈二尺再用絲線少許褁纒藥丸令患人先喫糕兩口後用一服此藥吞下良久線動用力拽出急以鐡鉗投熱油內急煎五月五日日未出時合藥不得人見治一切男子勞蒸傳尸流連鬼注夜夢不祥精原流出氣虧損小便頻數忽黃忽赤喫食減少心躁不安身上肉忽覺枯瘦靣色乍青乍黑乍赤乍白變異不定精神不足多困劣大腑傷熱一切勞候百般病證并治之脈氣洪大亦可喫出楊子建萬全獲命方黃連肉豆䓻當歸各四銖麻黃去根天靈蓋酥炙焦色鱉甲醋炙各五錢杏仁虎骨酥炙茯苓去毛貝母去心沉香木香羌活牡丹皮去心桔梗前胡去毛荆芥穗各一分細辛三銖右杵骨藥三件為末所餘藥為散每服一兩以童子小便一碗半於新瓷瓶內煉之四靣以粳火燒煉取一盞半至雞鳴時空心去滓熱喫臨藥熟時更入蔥頭五枝同煉內有天靈蓋虎骨鱉甲等依法修製杵羅如飛塵所餘衆藥等只粗羅為主散却盡底相滚令勻然後煎煉服餌留滓焙乾為末炒熟麵相滚滴水丸如梧桐子大食後熟湯下三十丸神授散出危氏世醫得效方治諸傳尸勞氣殺蟲右用川椒二斤擇去子并合口者炒出汗為末每服二錢空心米湯調下須痺暈悶少頃如不能禁即以酒糊丸如梧桐子大空心服三五十丸昔人嘗與病勞婦人交婦人死遂得疾遇一異人云勞氣已入臟遂令急服二斤其病當去如其言服之幾盡大便出一蟲狀如蛇遂安續有人服之獲安濟者多矣治膏肓勞嗽喘滿成瘵出永類鈴方真蘇合香丸四兩通明雄黃二兩黑錫炒灰禾五錢右辰日取東引桃枝二尺四寸桞枝一尺二寸東引石榴根六寸捶碎水熬二盞至一盞復熬至半盞瓦器中煎之乳鉢中將前三藥旋入藥汁中搗千餘杵分作三十丸朱砂末二錢麝香少許為衣曝乾薑湯嚼下乾嚼亦可却服助藥嗽甚者合香只二兩次以黑錫作細末每服五錢五更初炙豬肉焦喫助之又補以青蒿鱉生嘉禾散等分烏梅薑棗煎服一月愈夏貴公熏勞法出永類鈴方好雄黃三錢茜草二錢欵冬花二錢玄參三錢百部三錢艾葉一錢信石五分雌黃五分雷丸厚朴作末以香爐有蓋者封止留一小孔出煙患人以紙塞鼻以口吸其煙久則飲少許清米飲日三次蟲死嗽愈加百部蕪夷仁蘇木熔爉和攤紙上貴公在蜀作宣撫甚祕寶之以膏肓之疾藥不能及熏之有效治勞瘵出永類鈴方聖濟總録三月四日取桃葉五升熟搗脫衣避風密室中坐其上從旦至暮尸蟲悉出又方出永類鈴方空心食棐子百箇諸蟲悉化為水又方出永類鈴方桃仁去皮研膏煮汁如米作稀粥空心日二服又方出永類鈴方又用桃葉搗汁服又方出永類鈴方酸石榴皮東引無根水濃煎初更服天明蟲下稀粥補之治傳尸勞疾羸瘦者右以鱉甲一箇燒令黃色篩末酒服方寸七日二治瘦瘁咳嗽骨蒸勞瘵止渴去熱風出本草方見虛勞門虛勞渴類主勞嗽骨蒸久積羸弱成瘵者出本草以溫州白乾薑一物漿水煮令透心潤溫濕取出焙乾搗篩陳廪米煮飯飲丸如桐子大一服三五十丸湯酒任用其效如神治瘦病骨蒸羸瘦虛弱四肢少力方見食治門食治五勞七傷類治瘦病咳嗽骨蒸羸弱助血方見虛勞門虛勞咳嗽類崔氏炙穴崔氏丞相炙勞治外臺祕要崔相家傳方及王寶臣經驗方悉編載然皆差設毗陵郡有石刻最詳豫取諸本參校成此一書比石刻方極為委曲依此治人未嘗不驗往往一炙而愈豫在宜成久病虛弱亦用此而愈唐中書侍郎崔知悌序夫含靈受氣稟之於五行攝生乖理降之以六疾居岐黃廣記蔚有舊經攻炙兼行顯著斯疾骨蒸者亦名傳尸生謂殗殜亦稱復連亦曰無辜丈夫以癖氣為根婦人以血氣為本無問少長多染此病嬰孺之流傳注根若其為狀也髮乾而聳或聚或分或腹中有塊或腦後兩邊有小結多者乃至五六或卧出盜汗夢與鬼交雖目視分明而四肢無力上氣食少漸就沉羸縱延時日終於盡豫者忝洛州司馬嘗三十日炙活一十三人前後瘥者數踰二百至於狸骨獺肝徒聞曩説金牙銅鼻罕見其能未若此方扶危濟急非止單攻骨蒸又别療氣療風或瘴或勞或邪或癖或患其狀甚廣炙活者不可具録略陳梗概又恐傳受訛謬以誤將來今故具圖形狀庶令覽者易悉使所在流布頗用家藏末假外請名醫旁求上藥還魂返魄何難之有遇斯疾者可不務乎取穴法先兩穴令患人平身正立取一細繩蠟之勿令展縮順腳底貼肉堅踏之男左女右其繩前頭與大拇指端齊後令當腳跟中心向後引繩循腳肚貼肉直上至曲中折橫絞截斷又令患人解髮分兩邉令見頭縫自𩕄門平分至腦後乃平身正坐取向所截一頭令與鼻端齊引繩向上至循頭縫至腦後貼肉垂下循脊骨引繩向下至繩盡處當脊骨以黑點記之黑點不是炙處又取一繩子令患人合口將繩子按於口上兩頭至吻却鈎起繩子中心至鼻柱根下如此便齊兩吻截斷將此繩展令直於前來脊骨上墨點橫量取平勿令高下繩子先中摺當中以墨記之却展開繩子橫量以繩子上點墨正壓脊骨上墨點為正兩頭取平令無高下於繩子兩頭以白圈記白圈是炙穴以上是第一次點二穴次二穴令其人平身正坐稍縮臂膞取一繩繞項向前雙垂與鳩尾齊鳩尾是必岐骨人有無心岐骨者至雙胸前兩岐骨下量取一寸即是鳩尾也即雙截斷却背翻繩頭向項後以繩子中停取心正令當喉嚨結骨上其繩兩頭夾項雙垂循脊骨以墨點之墨點不是炙處又取一繩子令其人合口橫量齊兩吻截斷還於脊骨上以墨點橫量如法繩子兩頭以白圈記之白圈處是炙穴以上是第二次點穴過前共四穴同時炙日則各七壯至二七壯纍炙至一百壯或一百五十壯為妙候瘡欲瘥又依後法再炙二穴又次二穴以二次量口吻繩子於第二次雙繩頭盡處墨點上當脊骨直上不堅點令繩中停中心在墨點上下繩盡頭以白圈兩穴白圈是炙處以上是第三次點兩穴調之四花穴炙兩穴各百壯三次共六穴各取離日各取離日量度訖即下火唯須三月三日艾最佳疾瘥百日內慎飲食房室安心靜處將息各一月後覺不瘥復初穴上再炙圖形於後闕凡骨蒸之後所起辨驗有二十二種並依上項炙之出濟生方一胞蒸小便赤黃二玉房蒸男遺尿失精女月漏不調三腦蒸頭眩悶熱四髓蒸覺髓沸熱五骨蒸齒黑六筋蒸甲焦七血蒸髮焦八脈蒸急緩不調九肝蒸或時眼前昏眩十心蒸舌焦或瘡或時胸滿悶十一脾蒸唇焦折或口瘡十二肺蒸口乾生瘡十三腎蒸耳乾焦十四膀胱蒸右耳焦十五膽蒸眼目失光十六胃蒸舌下痛十七小腸蒸下泄不禁十八大腸蒸右鼻孔疼痛十九三焦蒸乍寒乍熱二十肉蒸别人覺熱自覺冷二十一皮蒸皮肉蒸雞皮起二十二氣蒸變身壯熱不自安息用尺寸取穴法出濟生方凡孔穴尺寸皆隨人身形大小須男左女右量手指中心一節兩橫絞中心為一寸艾炷大小法出濟生方凡艾炷須令腳根足三分恐覆孔穴不備穴中經脈火氣不行即不能抽邪氣引正雖小兒必以中指取穴為凖取艾法出濟生方端五日日未出於艾中以意求其似人者輒採之以炙殊有效幼一時見一書中云爾忘其何書也艾未有真似人者於明暗間茍以意命之萬法皆妄無一真者此何疑耶用火法出濟生方黃帝曰松柏柿桑棗榆桞竹等木火用炙必害肌血慎不可用凡取火者冝敲石取火或水晶鏡子於日得者太陽火為妙天隂則以槐木取火亦良治勞瘵膏肓肺腧穴每穴各炙丸壯仍依蟲醉日各穴腧穴多炙為妙炙後百日忌煎焞生冷熱物毒食仍戒房事避風寒減喜怒安心靜處將息若一月猶覺未瘥於初穴上再炙炙勞病方出瑞竹堂方從下數至第三根短筋稍尖上炙二寸炷男左女右又於項後數下至第三脊溝點穴炙隨病人年紀幾十歲即炙幾十炷炙勞瘵方膏肓二穴可以回生或肚臍相對取背脊骨正對炙有驗艾炷亦不可多骨蒸傳尸之病乍寒乍熱有時脣赤或頰赤并痢血多唾欲得食或不欲食兩脊脈常急患人多咳盜汗以指按捻脊膂四邊肉有時心胸脹滿氣急黃瘦膂中肉盡遂即著床胸前自動脊膂兩邊肉盡炙療即難如炙候胸前肉動非是炙法如看病人是病更不須選離日即將病人於五道頭日午時炙炙七壯若先知其病又緩即取離日午時大吉欲炙覆病人靣向下著地取撅肋頭以病人大拇指自捻著展中指直向脊骨指頭脊膂中肉小筋上點記從點記處向上至耳下尖頭即中尖屈繩從初點處向上還當脊膂點繩所到記之更又在屈繩從元點記處向上還凖前點記一邊點四處兩邊俱點總八處各須去脊骨逺近一種并須上下相當下從撅筋上至耳根取直其八處一時下火艾炷如棗核大堅實作炙了即以灰三匝圍坐處便歸家不須回顧禁麵生冷肉時忌色及雜食平復後任依常未平復有若犯重發即不可復療神素師炙骨蒸咳法當頭耳孔橫量相離三寸許相當炙有穴日炙三壯至第八日炙二七了第三椎上第二椎下男取左手女取右手頭指依兩指頭東西炙日一七壯至第八日各炙五十壯復五日日各炙十五壯脛取繫鞋橫大文量至膝可口亞骨切下中分當脛骨外日炙一七壯滿第八日日炙滿三十五日了當背上皆男左女右取頭指取腕文當指當頭炙日七壯至第八日滿百壯婦人肚脹月節不通取左手頭指當臍量至下腹當指頭炙日七滿三百壯膈上午後炙膈下午前炙又炙法立腳於繫鞋處橫文以手四指於文上量脛骨外逼脛當四指中節按之有小穴取一縷麻刮令薄以此麻緩繫上炙令麻縷斷男左女右患多愈指掌穴出經驗濟世方治勞疾用紙條比病人手自中指末盡手掌第一橫文又益之以半是為一掌半將此一掌半紙條斷而為二去一半不用以此紙條自病人項後第一捶骨當中比向下至紙條盡處以墨記之此是高下也臍心穴出經效濟世方治冷病人跣足於平地上正立用木杖子自地比至臍心截斷竹杖用此杖却自後比至杖盡處以墨記之此亦是定高下也取寸法出經效濟世方治取病人中指中節外紋為一寸切不可用內紋也指掌穴用一寸點兩穴臍心穴用一寸二分點兩穴皆於元墨記處相去一寸及一寸二分非謂兩旁各一寸及一寸二分也凡此指掌并取寸皆男左女右比之每穴炙七十壯至百壯後凡百忌慎百許日第一椎又非大椎大椎再第一椎上陷中也如無醫者此方立效凡風寒之氣客於中滯而不能發故瘠不能言及喉痺失聲皆風邪所為也入臟皆殺人凡尸厥而死脈動如故此陽脈下墜隂脈上爭氣閉故也針百入三分補之以龜突墨彈丸將水和服又針足中指頭去甲如韭葉又針足大指甲下內側去甲三分一法以癸亥夜二更六神皆聚之時解去下體衣服於腰下兩旁微陷處針炙家謂之腰眼直身半立用筆點定然後上床合面而卧每灼小艾炷七壯勞蟲或吐出或㵼出即時平安斷根不發更不傳染令病人偃卧用皮紙條浸濕自項高骨直貼至尾脊骨看何處一點先乾乃穴也以筆點記炙二十一壯此腰眼穴俗言不可炙為明堂經不載是不然蓋所謂即腧也出永類鈴方呪法斷伏連解法右先覓一不開口葫蘆埋入地取上離日開之煮取三匙脂粥內其中又剪紙錢財將向新冢上使病兒靣向還道背塜坐以紙錢及新綜圍塜及病人使匝别將少許紙錢圍外與五道將軍使人一手捉葫蘆一手於坐旁以一刀穿地即以葫蘆一手於穿地及坐葫蘆上使一不病人捉兩箇鎖拍病人背呪曰伏連伏連解伏連伏連不解刀鎖解又呪曰生人特地上死鬼特地下生人死鬼即各異路呪訖令不病人即擲兩鎖於病人後必取二鎖相背不背更取擲取相背止乃還勿反顧又取離日令病人騎城外車輒靣向城門以水三升灰三重圍病人又作七箇不翻餅於五道將軍呪曰天門開地户閉生人死鬼各異路今五離之日放捨即歸呪訖乃還莫回頭此法大良按摩法療骨蒸方右患殗殜上於却切下於攝切等病必瘦脊骨自出以壯丈夫屈手頭指及中指夾患人脊骨從大椎向下盡骨極揩復向上來去十二三回然以中指於兩畔處極彈之若是此病應彈處起作多頭可三十餘頭即以墨點上記之取三指大青竹筒長寸半一頭留節無節頭削令薄似劔煮此筒子數沸及熱出筒籠墨處按之良久以刀彈破所角處又煮筒子重角之當出黃白赤水次有濃出亦有蟲出者數數如此角之令惡物出盡乃即除當目明身輕也普濟方卷二百三十五
