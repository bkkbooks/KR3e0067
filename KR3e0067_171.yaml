body:
  text: 普濟方卷一百七十一明周王朱橚撰積聚門息賁附論凡積氣在右脅下覆大如杯者肺積也氣上賁衝息有所妨名曰息賁此本心痛傳肺肺當傳肝肝以春適王而不受邪復賁於肺故結為積久不已令人灑浙寒熱喘咳發肺癰以春甲乙得之所以然者肺主氣外合於皮毛今肺氣留積故有寒熱喘咳肺癰之病方半夏湯治肺積息賁咳嗽半夏湯洗去滑切片焙乾桑根白皮炙銼細辛去苖葉前胡去蘆頭各一兩半桔梗炒甘草炙銼貝母去心柴胡去苖人參訶梨勒白术各一兩右粗搗篩每服三錢水一盞棗三枚擘破生薑半分拍碎煎至七分去滓服食後夜卧各一服桃仁煎丸治息賁氣右脅下結硬如杯心腹脹痛不能飲食胸膈壅悶咳嗽喘促桃仁三兩湯浸去皮尖雙仁細研以酒三升同硇砂煎成膏硇砂一兩半不夾石者細研鱉甲一兩塗酥炙令黃去裙襴川烏頭半兩去皮臍銼碎鹽拌炒令黃紫菀半兩去苖土豬牙皂莢半兩去皮塗酥炙令焦黃防葵半兩木香三分檳榔三分乾薑半兩炮裂銼右為細末入桃仁硇砂煎蜜鎔和丸如桐子大每服食前生薑湯下十五丸防己湯出聖濟總録治肺積息賁下氣防己大腹取皮去子用各一兩半郁李仁湯去皮大麻仁炒檳榔銼陳橘皮湯浸去白焙桑根白皮銼炙訶梨勒微煨去核各一兩甘草炙銼半兩右除郁李仁麻仁外粗搗篩再同搗勻每服三錢匕入薑片數分拍碎以水一盞煎八分去滓溫服空心午時各以利為度紫苑散出聖惠方治息賁氣在右脅下結聚脹痛喘促咳嗽紫苑一兩去苖土吳茱萸半兩湯浸七遍焙乾微炒白术半兩鱉甲一兩塗醋炙令黃去裙襴當歸半兩桂心半兩檳榔半兩郁李仁一兩湯浸去皮微炒枳實半兩麩炒微黃右為粗散每服三錢水一盞生薑半分煎至六分去滓不拘時候溫服枳實丸出聖惠方治息賁氣腹脅脹硬咳嗽見血痰粘不利枳實半兩麩炒微黃木香半兩檳榔半兩訶梨勒皮半兩甜葶藶半兩隔紙炒令紫色赤茯苓半兩五味子半兩甘草半兩炙微赤銼杏仁一兩湯浸去皮尖雙仁麩炒微黃右為細散每服三錢水一中盞煎六分去滓不拘時候溫服大腹皮散出聖惠方治息賁氣腹脅脹滿急咳嗽坐卧不安大腹皮五枚赤茯苓一兩前胡一兩去蘆頭訶梨勒皮半兩檳榔半兩木香一兩漢防已半兩桃仁一兩湯浸去皮尖雙仁麩炒黃川大黃一兩銼碎微炒右為粗散每服三錢水一中盞生薑半分煎六分去滓不拘時候溫服三稜丸出聖惠方治息賁氣右脅下結聚成塊喘咳胸痛嘔吐痰涎靣黃體瘦荆三稜一兩炮銼碎醋拌炒令黃川大黃二兩銼碎微炒附子一兩炮裂去皮臍鱉甲一兩半塗酥炙令黃去裙襴檳榔一兩訶梨皮二兩木香一兩桃仁一兩湯浸去皮雙仁麩炒微黃吳茱萸半兩湯浸七遍焙乾微黃右為細末以酒煮麵糊和搗三二百杵丸如桐子大每服食前生薑湯下二十丸枳實木香丸治肺積息賁上氣枳實去穰麩炒二兩木香陳橘皮湯浸去白焙人參海藻水洗去鹹焙葶藶紙上炒令紫色各一兩芍藥銼丁香各三分右為末棗肉和丸如桐子大每服二十丸用炒豆煎湯下空心日午夜卧各一服漸加至三十丸檳榔散治息賁氣胸膈妨實右脅下堅急上氣咳嗽檳榔一兩赤茯苓三分赤芍藥三分石茱萸三分荆三稜三分訶梨勒皮三分郁李仁一兩湯浸去皮微炒青橘皮三分湯浸去白瓤焙右為粗散每服三錢水一中盞生薑半分煎六分去滓不拘時候溫服牛蒡子散治息賁氣令人喘咳心腹脹滿脅下疼痛牛蒡子一兩微炒木香一兩當歸一兩荆三稜一兩炮銼碎吳茱萸半兩湯浸七遍焙乾微炒檳榔半兩川大黃一兩銼碎微炒鱉甲二兩塗酥炙令黃去裙襴右為粗散每服二錢溫酒調下食前服生薑橘皮煎湯下亦得木香丸治息賁氣胸膈悶腹脅堅急四肢不和食少無力木香一兩鱉甲一兩半塗酥炙令黃去裙襴桂心一兩吳茱萸一兩半湯浸七遍焙乾微炒訶梨勒皮一兩半檳榔一兩半枳實一兩麩焙微黃牽牛子三兩微炒右為細末以酒煮麵糊和丸如桐子大每日空心溫酒下三十丸息賁湯治肺之積在右脅下大如覆杯久久不愈灑灑寒熱氣逆喘咳發為肺癰其脈浮而毛半夏湯洗七次吳茱萸湯洗桂心各二兩半人參甘草炙桑白皮炙葶藶炒各二兩半右銼為散每服四錢水一盞半薑七片棗二枚煎七分去滓食前服一方無人參此病患者急炙看脈有力咳嗽而脅下痛者則以十棗湯下之却用息賁湯調理其效尤速枳實湯治肺積息賁上氣胸滿咳逆枳實去瓤麩炒木香檳榔銼甘草炙銼吳茱萸湯浸焙乾炒葶藶紙上炒令紫色各半兩杏仁湯浸去皮尖雙仁炒三分右粗搗篩每服三錢水一盞生薑一分拍碎同煎至七分去滓溫服空心食前日三桑白皮湯治肺積息賁上氣脹滿咳嗽涕唾膿血桑白皮銼麥門冬去心焙各一兩半桂去粗皮十兩半甘草炙銼半兩陳橘皮湯浸去白焙豬牙皂莢酥炙去皮各一兩右粗搗篩每服三錢水一盞入生薑半分拍碎煎至七分去滓溫服空心晚食前各一芫花煎丸治息賁氣結塊在右脅下疼痛芫花一兩半醋拌炒令乾為末硇砂一兩不夾石者細研用米醋二斤同芫花末焚成膏鱉甲一兩半塗酥炙令黃去裙襴荆三稜一兩銼微炒青橘皮一兩湯浸去白瓤焙右為細末入芫花硇砂煎中入小蒸餅和為丸如桐子大每服食前生薑湯下十丸皂莢丸治肺積息賁上氣皂莢二挺不蛀者酥炙去皮子銼桂去蘆皮乾薑炮貝母去心右等分搗籮為末煉蜜和丸如梧桐子大每服空心日午生薑湯下十五丸加至二十丸五靈脂丸治肺喘久而息賁五靈脂二兩半木香半兩馬兜鈴去殼炒一分葶藶一分右為細末棗肉和丸如桐子大每服二十丸生薑湯下日三服脾惡濕腎惡燥如硫黃附子鍾乳煉丹之類皆剛劑用之人以取陽補接真氣則可若云補腎正所惡者古人製方益腎皆濕潤之味正補腎經也近世盛行香茸丸可補腎經亦有數方具後推氣散治右脅下大如杯久不已令人灑淅寒熱喘嗽發腫壅始由心病傳肺肺當傳肝肝乘王而不受邪氣留於肺結而為積其脈結澀謂之息賁枳殼炒桂心各半兩甘草二錢片子薑黃半兩右為細末每服二錢薑湯調服熱酒亦得不拘時候大棗丸治證如前葶藶橘皮桔梗右等分為細末熟棗肉為丸如桐子大每服三十丸米飲湯下治息賁氣喘咳心膈不利出聖惠方訶梨勒皮一兩郁李仁一兩湯浸去皮微炒研木香一兩右為細末入郁李仁研令勻每服不計時候以生薑湯調下二錢肺之積息賁丸出試效方治右脅下覆大如杯久不已令人灑浙寒熱喘嗽發肺癰厚朴薑製八錢黃連去鬚炒一兩三錢乾薑炮一錢半桂去皮一錢巴豆霜四分白茯苓去皮一錢半另末人參去蘆二錢桔梗一錢紫苑去苗一錢半白豆蔲一錢川烏頭炮裂去皮一錢川椒炒去汗一錢半荆三稜炮一錢天門冬一錢陳皮一錢青皮半分右件除巴豆霜茯苓旋入外為末煉蜜丸如梧桐子大每服二丸一日加一丸二日加二丸漸加至大便溏再從二丸加服煎淡生薑湯下食逺周而復始積減大半止服秋冬加厚朴半兩通前稱一兩三錢減黃連七分只用六分加減息賁丸出試效方仲夏合其積為病寒熱喘嗽氣上奔脈澀失精又云血氣滯則短氣血凝澀則寒熱則氣分寒血分熱治法宜益元氣泄隂火滯氣削其堅也川烏頭一錢乾薑一錢半人參二錢厚朴八分黃連一兩三錢紫苑一錢巴豆霜四分桂枝三錢橘皮一錢半青皮七分川椒炒去汗一錢半紅花少許茯苓一錢半桔梗一錢白豆蔲一錢荆三稜一錢半天門冬去心一錢半右件為細末湯浸蒸餅為丸如梧桐子大初服二丸一日加一丸二日加二丸加至大便微溏利為度再從二丸加服煎生薑湯送下食前忌酒濕麵五辛大料熱物之類及生冷物賁豚附論夫腎之積名曰奔豚發於小腹上至心下若豚走之狀上下無時久不愈令人喘逆發骨痿少氣以夏丙子日得之何以言之脾病傳腎腎以傳心心以夏適王王者不受邪腎欲復脾脾不肯受故留結為積故知奔豚以夏得之也奔豚氣者是腎之積也起於驚恐憂思所生若驚恐則傷神心藏神也憂思則傷志腎藏志也神志氣積於腎而氣上下遊走如豚之奔故曰奔豚其氣乘心若心中踊踊如車所驚如人所恐五臟不定食飲輒嘔氣滿胸中狂癡不定妄言妄見此驚恐奔豚之狀也若氣滿支心心下悶亂不欲聞人聲休作有時乍差乍劇翕翕短氣手足厥逆內填結痛溫溫欲嘔此憂思奔豚之狀也診其脈來觸祝觸祝者病奔豚也腎脈微急沉厥者奔豚也其足乃收不得前後皆從驚得之腎間有膿故也外臺祕要云師曰病如奔豚者氣從小腹起上衝喉咽發作欲死復還生皆從驚恐得之腎間有膿故也師曰病有奔豚有吐膿有驚怖者火邪此四部病者皆從驚恐得之火邪者桂枝加龍骨牡蠣湯主之若新亡財為縣官所捕迫逐驚恐者療用鴟頭鉛􅀈千金方有飛鴟鉛丹丸主癲癎瘈瘲此意相近鉛􅀈解為馬排木一云即羚羊角所言奔豚者病人氣息逆喘迫上如豚奔走之狀奔豚湯主之方治奔豚氣出直指方木饅豆乾者四兩銼先以皮入銚子炒次下豆并炒黃色茴香二兩炒右為細末每服二錢空心酒調服沉香石斛湯出聖濟總録治腎臟積冷奔豚氣攻少腹疼痛上衝心胸脅沉香銼石斛去根陳麯炒各一兩人參赤茯苓去黑皮五味子微炒巴戟天去心炒桂去粗皮白术芎藭各三分木香肉豆蔲仁各半兩右粗搗篩每服三錢水一盞薑三片棗三枚擘煎至六分去滓食前熱服七氣湯療憂勞寒熱愁思及食飲隔塞虛勞內傷五臟欲絶奔氣不能還下心中悸動不安桔梗二兩人參三兩一方二兩芍藥三兩茱萸七合枳實五枚炙黃芩二兩一方三兩乾薑三兩一方二兩桂心三兩一方二兩乾地黃三兩一方二兩橘皮三兩甘草三兩一方二兩炙半夏三兩洗一方一斤右以水一斗煮取三升去滓分三服忌海藻菘菜羊肉餳生蔥豬肉蕪荑等千金無桂心橘皮桔梗有厚朴栝蔞蜀椒木香硫黃丸出聖惠方治腎積頻發小腹急脹疼痛唇口青黑木香硫黃研青橘湯浸去白焙乾薑炮桂去粗皮沉香銼肉豆䓻去殼蘹香子炒附子炮裂去皮臍銅青研檳榔銼各一兩右將九味搗籮為末與别研二味和勻搗研糯米飯為丸如梧桐子大每十丸蘹香酒下加至二十丸一方無沉香木香檳榔散出聖濟總録治積病不散結伏奔豚發即上衝心胸令人喘逆骨痿少氣木香檳榔煨銼沉香銼磁石醋洗煅訶黎勒去核蘹香子炒芎藭白芷炒牡蠣煅各半兩桂去粗皮陳橘皮湯浸去白焙各三分右搗籮為散每服二錢炒生薑鹽湯調下木香湯出聖濟總録治一切風及腎臟奔豚氣上衝心胸悶亂木香一兩青橘皮湯浸去白焙白芷炒蘹香子炒沉香銼桂去粗皮蓬莪术焙炒杉木節各半兩枳殼去瓤麩炒木瓜焙各三兩右搗籮為散每服二錢炒生薑鹽湯下神效丸治疝氣奔豚嬰孩溺祕疝氣因何得邪風在腎經流傳并血聚如此漸成形冷氣結在臟因兹小腹疼本經無别法踈利藥通靈芫花半兩醋浸炒木香檳榔三稜各半兩炒茯苓青皮全蝎附子炮硇砂桂各二錢半右將硇砂用水浸磁盞內沉去泥土留湯平頭頓成膏子粳醋打糊為丸如菉豆大每服三十丸空心溫水送下沉香丸出聖惠方治奔豚氣小腹積聚疼痛或時上攻心胸壅悶沉香半兩阿魏半兩以少麵和鎔作餅子炙令黃木香一分桃仁半兩湯浸去皮尖雙仁麩炒微黃吳茱萸一兩湯浸七遍𢜳乾微炒檳榔半兩蘹香子半兩青橘皮一分湯浸去白瓤焙蛜􅖉一兩生用硇砂三兩不夾石者細研以湯一盞化澄去滓取清內銀器中煎成霜研右件藥為末入硇砂令勻以酒煮麵糊和丸如梧桐子大每服食前以薑鹽湯下二十丸蘹香子丸出聖濟總録治腎臟久積氣膀胱虛脹上攻膨滿疼痛蘹香子三兩微炒為末水米醋二斤熬如餳附子炮裂去皮臍一兩青橘皮湯浸去白焙木香狼毒炒當歸切各焙三分阿魏研以酒一斤煎取半硇砂一兩半研沸湯化澄煎取霜入阿魏煎中同熬如餳入蘹香煎攪勻自然銅煨醋淬研各一兩半右除煎研外搗籮為末同入煎內和搗丸如梧桐子大每服十五丸至二十丸空心溫酒下木香賺氣丸出醫學切問方治奔豚痃癖心氣腹滿兩脅刺痛牽引腰背屈伸不利茴香一兩炒木香檳榔香附子各一兩三稜莪术各三錢蓽澄茄良薑亦用巴豆炒青橘皮半兩巴豆五枚炒去巴豆右為粗末每服三錢水一盞煎至七分空心熱服奔豚湯療虗勞五臟氣乏損遊氣歸上上走時若羣豚相逐撞撞時氣來便如作驚夢精光竭不澤隂痿上引小腹疼痛靣乍熱赤色喜怒無常耳聾目視無精光葛根八兩乾煮生李根切半夏洗各一斤人參芍藥各三兩當歸甘草炙各三兩桂心五兩生薑二斤右以水二斗煮得五升溫服八合日三不知少增至一升日三忌羊肉餳生蔥海藻菘菜等賁豚茯苓湯療虛氣五臟不足寒氣厥逆腹脹滿賁氣走衝心膈發作氣欲絶不識人氣力羸瘦小腹起騰踊如豚子走上走下馳往馳來寒熱拘引隂氣手足逆冷或煩熱茯苓四兩甘草炙生葛八兩當歸芎藭各二兩生薑五兩人參李根白皮切半夏湯浸斤各一右切以水一斗二升煮取五升服一升日三夜二忌羊肉餳海藻菘菜酢等物賁豚湯出指南方療賁氣上衝胸腹痛往來寒熱甘草炙芎藭當歸黃芩各二兩芍藥三兩半夏湯洗生薑各四兩生葛五分甘李根白皮斤切一右以水二斗煮取五升去滓溫服一升日三夜二服忌海藻菘菜羊肉餳等甘李根散出聖惠方賁豚氣臍腹脹痛翕翕短氣發作有時四肢疼痛甘李根二兩銼吳茱萸半兩湯浸七遍焙乾微炒半夏一兩湯浸七遍人參一兩去蘆頭附子一兩炮去皮臍桂心一兩當歸一兩銼微炒乾薑半兩炮銼檳榔一兩右為粗散每服三錢水一中盞煎至六分去滓不拘時候溫酒調下二錢木香湯治積氣不散久脹于臍腹間發似豚狀賁上衝心木香桂去粗皮各三兩赤茯苓去黑皮檳榔甘草炙半兩桑根白皮銼各一兩半陳橘皮湯浸去白焙紫蘇莖葉一兩右粗搗篩每服三錢水一盞入生薑半塊棗一枚拍破煎至七分去滓溫服空心日午近晚各一服李根皮湯治賁豚氣衝心吸吸短氣發作有時李根白皮銼焙八兩半夏湯洗七遍焙七兩乾薑炮桂去粗皮各四兩赤茯苓去黑皮人參甘草炙各二兩附子一兩炮裂去皮臍右㕮咀如麻豆大每服五錢水一盞半煎至八分去滓溫服郁李仁丸治賁豚氣從小腹奔衝上心昏亂嘔吐痛甚木香一兩郁李仁去皮生用三兩沉香銼檳榔銼桂去粗皮青橘皮去白焙附子炮裂去皮臍蘹香子炒各一兩右為末煉蜜為丸如梧桐子大蘹香子或薄荷酒下二十丸一日三服臍下有塊一月永除木香丸治賁豚氣上衝胸膈壓氣木香丁香白豆蔲去皮肉豆蔲去殼兩各半沉香三分吳茱萸醋浸一宿炒令黃色各半兩麝香别研二分青橘皮浸去白焙一分右除麝香外搗籮為末入麝香研勻用硇砂煎獖豬膽汁和丸如梧桐子大每服溫酒下二丸奔豚湯治從小腹衝心胸咽喉發病如豚奔狀上下無時久不治病喘逆發則欲死由脾病傳腎腎當傳心心乘王而不受邪氣留於腎而為痺積其脈沉結謂之賁豚甘郁李根皮乾薑各一兩一分當歸川芎甘草黃芩各二兩半夏炮四兩右銼為散每服四錢水一盞半薑五片煎至七分去滓服一方用乾葛無乾薑茴香金鈴丸治奔豚氣金鈴子一兩每箇銼作四片用殭蠶半兩去絲嘴同炒令香熟去殭蠶不必用茴香微炒馬藺花吳茱萸湯洗七次炒令香熟食茱萸酒浸炒令香熟山茱萸青皮陳皮已上各一兩右為細末酒糊丸梧桐子大每服三五十丸溫酒鹽湯下食前服醫學發明名茴香練實丸有芫花一兩醋炒糊丸量虛實加減以利為度療奔豚氣從下上者湯方甘李根白皮切五兩生葛五兩半夏五兩洗黃芩二兩桂心二兩芍藥三兩人參二兩生薑五兩右以水一斗二升煮取五升去滓溫服日三服夜二服忌羊肉餳生蔥奔豚湯療手足逆冷胸滿氣促從臍左右起鬱冒者甘草四兩炙李根白皮切葛根各一斤黃芩三兩桂心栝蔞人參各三兩芎藭一兩右以水一斗五升煮取五升去滓溫服一升日三夜二忌海藻菘菜生蔥赤茯苓散治奔豚氣從小腹起上至心下妨脹壅悶胸中短氣坐卧不安一方七氣湯赤茯苓一兩半大腹皮半兩銼檳榔半兩桂心一兩髙良薑半兩銼訶黎勒皮一兩吳茱萸半兩湯浸七遍焙乾微炒牽牛子一兩微炒右為粗散每服三錢水一中盞煎至六分去滓不拘時候稍熱服微利兩三行為度一方無檳榔桃仁丸治腎虛積氣桃仁湯浸去皮尖雙仁炒二兩以溫酒二升煎成膏木香去粗皮青橘皮湯浸去白焙蘹香子炒各半兩乾薑炮一分檳榔銼分右搗籮六味為末入桃仁煎丸如梧桐子大每服十五丸至二十丸空心溫酒下七寶丸出聖濟總録治奔豚氣上衝脅肋㽱痛丁香沉香銼硇砂湯浸白攄澄入陳麯同煎成膏丸諸藥各半兩蒺藜子炒去角木香各三兩附子炮製去兩皮臍一麝香一分研右除煎外搗研為末用前煎和丸如梧桐子大每服十丸炒生薑酒或炒生薑黑豆小便下桃仁散出聖惠方治奔豚氣上攻心胸喘悶脹滿桃仁一兩湯浸去皮尖雙仁麩炒黃研入牽牛子一兩微炒檳榔半兩青橘皮半兩湯浸去白瓤焙蘹香子一兩微炒木香半兩郁李仁一兩湯浸去皮微炒右為散研入桃仁郁李仁令勻每服不拘時候溫酒調下二錢硇砂煎丸出聖惠方治奔豚氣在小腹積聚成塊發歇疼痛硇砂三兩不夾石者細研以酒醋各一斤慢火熬令成膏附子一兩炮銼去皮臍桃仁一兩湯浸去皮尖雙仁麩炒微黃研入吳茱萸半兩湯浸七遍焙乾微炒防葵三分銼碎醋拌炒令黃木香三分檳榔三分右為細末入桃仁令勻硇砂煎中入少蒸餅和丸梧桐子大每服食前以溫酒下十五丸檳榔丸出聖濟總録治腎積氣賁脈從小腹上衝心昏亂嘔吐疼痛檳榔一兩半煨半生木香微炒半兩吳茱萸湯洗焙安息香研各一分桂去粗皮青橘皮去白麩炒各半兩右為細末以豬膽二十枚水煎如餳和前六味末搗二千下丸如小豆大每服空心嚼破七丸暖酒下天雄丸出聖濟總録治奔豚氣上下攻走疼痛天雄生去皮臍一兩桃仁去皮雙仁炒微黃蘹香子炒桂去粗皮蜀椒去目汗合口炒出汗乾蠍炒各半兩右為末用狗裏外腎并膽細切就器中以無灰酒一斤煎成膏加藥末為丸如梧桐子大每服二十丸空心生薑鹽湯下木香丸出聖濟總録治賁豚氣臍腹左右堅硬橫連如臂若弓弦急痛木香鱉甲去裙襴醋炙訶黎勒皮桂去粗皮各二兩吳茱萸湯浸焙炒一兩半牽牛子二兩炒右為末煉蜜丸如梧桐子大每服三十丸溫酒下加至四十丸苦練丸出聖濟總録治奔豚及小腹痛不可忍者苦練茴香各一兩黑附子一兩炮去皮臍右用酒三斤煮酒盡為度曝乾或隂乾搗為細末每一兩藥末入全蝎十八個玄胡五錢丁香十五個共為末酒糊為丸如梧桐子大每服百丸空心酒下如痛甚煎當歸入酒大效奔氣湯一名茱萸湯出千金方療卒厥逆上氣氣入兩脅心下痛滿淹淹欲絶此謂奔豚病從卒驚憂怖得之氣從下上上衝心胸臍間築築發動有時不療殺人甘草炙人參各三兩吳茱萸半夏洗各一斤生薑一斤桂心三兩右切以水一斗煮取三升分三服此藥須預蓄得病便急合服忌海藻菘菜生蔥羊肉千金方桂心五兩甘草三兩治奔豚氣在心胸逆滿悶亂出聖惠方半夏二兩湯浸七次去滑桂心一兩半人參一兩去蘆頭吳茱萸半兩湯浸七次焙乾微炒檳榔一兩甘草半兩炙微赤銼右為散每服二錢水一中盞煎至六分去滓不拘時候稍熱服蘹香檳榔散出聖濟總録治奔豚氣成塊上衝腹脅滿痛蘹香子炒檳榔銼荆三稜煨銼木香一分青橘皮湯浸切鹽炒去白各半兩右搗籮為散每服二錢熱湯調服不拘時撞氣丸出聖濟總録治腎藏氣發攻心動築人心腹面黑悶欲絶及諸氣奔豚喘甚婦人傷冷血氣發攻心等症急用此鉛二兩赤石脂為末二兩木香為末二兩麝香研一兩右將鉛於銚子內慢火炒令乾入赤石脂末急手炒轉莫令煙起以水微噴之慢火再炒令乾傾于淨地坑子內以盞子覆之候冷取出細研如麵次入諸藥相和研之以粟米飲丸如雞頭每服用二丸研破熱酒浸之頓服或下氣或通轉即愈如祕不通每一丸入玄明粉半兩如氣滿胸膈服藥皆吐即以炒豆尉令氣下便服此藥無不驗食氣湯出百一選方散寒氣亦治奔豚茴香炒丁香各半兩良薑三兩麻油炒甘草三錢炙白豆䓻仁二錢右為細末每服二錢入鹽少許沸湯調下食前服療卒傷損食下則覺胸膈痛栗然水將下生李根一兩細銼麥門冬一斤去皮人參桂心甘草炙各二兩右㕮咀以水一斗煮取三升分三服忌海藻菘菜生蔥治奔豚氣逆上衝心滿悶臍腹虛脹出聖惠方檳榔一兩訶黎勒皮一兩木香一兩吳茱萸三分湯七遍焙乾微炒牽牛子二兩微炒右為細散每服一錢以溫酒一合童子小便一合相入和調下不拘時候服檳榔散出聖濟總録治奔豚氣衝心滿悶檳榔銼訶黎勒皮煨去核各二兩牽牛子微炒三兩吳茱萸陳者湯洗焙乾炒一兩半右搗籮為散每服一錢童子小便半盞空心調服不過三服效如患隂陽二毒傷寒及腳氣亦可服四味丸出聖濟總録治久積奔豚氣時攻膀胱切痛蜀椒去目及閉口炒出汗蘹香子炒附子炮裂去皮臍肉蓯蓉酒浸切焙各一兩右為末煉蜜丸如梧桐子大每服十五丸空心溫酒下磁石散出聖濟總録治奔豚冷氣上衝昏亂四肢軟弱不收磁石燒醋淬研肉豆蔲去殼木香檳榔銼各一兩右搗研為散每服三錢匕以生蔥一莖細切熱酒投調下牡蠣賁豚湯療賁豚氣從小腹起憧胸手足逆冷牡蠣三兩熬桂心八兩李根白皮切一斤甘草三兩炙右切以水一斗七升煮取李根皮得七升去滓內餘藥再煮取三升分五服日三夜再忌生蔥海藻菘菜療手足逆冷胸滿氣促從臍左右起鬱冒者伏出雞頭卵殼中白皮黎木灰麻黃去節紫苑各等分右搗篩作丸散隨宜酒服十丸如梧桐子大者方寸療三十年喉中結氣咳逆立瘥亦可水煮為湯以意分之吳茱萸飲出聖濟總録治腎臟久積成奔豚氣小腹急疼發即不識人吳茱萸湯洗焙乾桃仁湯浸去皮尖雙仁各一分黑豆半兩右同炒以黑豆熱為度同童子小便一升浸少頃煎至六分去滓分三服空心日午夜卧各一三神煎出聖濟總録治賁豚氣上衝心腹桃仁去皮尖雙仁四兩湯浸研細取汁三升荆三稜煨銼二兩鱉甲去裙襴醋炙三分右搗二味為末先煎桃仁汁至二升次下藥末不住手攪良久更入好醋一斤同煎如餳以瓷合收每服半匙空心好酒下茯苓桂甘湯出直指方治臍下悸動咳而奔豚茯苓二兩甘草半兩桂心一兩右銼細每服四錢棗一枚用甘泉水一盞半煎一盞溫服治奔豚氣上下衝走悶亂面青出聖惠方甘李根皮二兩銼吳茱萸二兩湯浸七遍焙乾微炒生薑二兩炒乾右為粗散每服一錢水一中盞煎至六分去滓不拘時候熱服治奔豚氣出百遍方訶黎勒檳榔雞心者各四個右兩箇半炮帶性兩箇半只生用並㕮咀分四服用水二大盞入新紫蘇三十葉苦陳者添十葉煎至八分遇發時半飢半飽服急時不拘時候沉香湯出聖濟總録治腎積化氣沉香黃耆人參各三分蘹香子炒附子炮裂去皮臍甘草木香桂去粗皮烏藥石斛去根五味子炒巴戟天去心陳橘皮湯浸去白焙髙良薑各半兩牛膝酒浸切焙半分右銼碎麻豆大每服三錢水一中生薑一分拍碎煎七分去滓溫服空心日午前各一服棗子酒出仁存方治奔豚氣右用斑蝥一枚去足頭翅好肥棗一枚擘開去核安斑蝥在內用濕紙包文武灰中煨熱去斑蝥不用將棗子細嚼熱酒送下空心服之治奔豚氣一名茱萸平胃散出百一選方右以醋酒各三分盞煎吳茱萸十餘粒候三兩沸用調平胃散三錢空心服此藥有功效但不能去根治奔豚氣上下衝走悶亂面青出聖惠方檳榔三枚搗籮為末生薑半合右件藥以童子小便一大盞微燒過入前藥二味攪令勻分為三服如人行五六里進一服須臾下利為效桂枝加桂湯出指南方治奔豚氣官桂五分芍藥三分甘草二兩右為粗末每服五錢水二盞薑五片棗一枚煎一盞去滓服腎之積奔豚丸出試效方發於小腹上至心下若豚狀或下或上無時久不已令人喘逆骨痿少氣及治男子內結七疝女人瘕聚帶下厚朴薑製七錢黃連去鬚炒五錢白茯苓去皮同木二錢川烏頭炮半錢澤㵼二錢苦練酒煮二錢胡玄索一錢半全蝎一錢附子去皮二錢巴豆霜四分菖蒲二錢獨活一錢丁香半分肉桂去皮二分右除巴豆霜茯苓另為末旋入外為細末煉蜜為丸如梧桐子大初服二丸一日加一丸二日加二丸漸至大便溏再從二丸服淡鹽湯送下食前周而復始病減大半勿服秋冬加厚朴半兩通前一兩二錢如積勢堅大先服前藥不減于一料中加燒存性牡蠣三錢㿗疝帶下病勿加解鈴丸出楊氏家藏治奔豚氣疼痛手足拳縮不可忍者茴香一兩用青鹽一兩研細同炒炒和鹽用蝎稍一分去毒炒蓬莪术用紙數重褁油內蘸燈上燒過銼碎一兩右件為細末酒煮麵糊為丸如梧桐子大每服三十丸溫酒鹽湯送下空心食前服奔豚湯出千金方治氣奔急欲絶者吳茱萸一升石膏人參半夏芎藭各三分桂心芍藥生薑各四分生葛根茯苓各十分當歸四分李根皮一斤右十二味㕮咀以水七升清酒八升煮取三升分三服木香散出聖惠方治奔豚氣上衝心胸悶亂臍腹脹痛飲食轉嘔木香一兩青橘皮半兩湯浸去白瓤焙檳榔一兩白术半兩沉香一兩蘹香子半兩木瓜三分焙乾桂心一兩蓬莪茂半兩杉木節半兩右件藥搗細羅為散每服不計時候以溫酒調下二錢治奔豚伏梁氣及內外腎釣并藿亂轉筋以椒葉和艾及蔥研以醋湯拌罾並得一方以椒葉搗傅外煎水洗腳息積附論內經謂病脅下滿氣逆二三歲不已病名曰息積夫消息者隂陽之更事也今氣聚脅下息而不消積而不散故滿逆而為病然氣不在胃故不妨于食特害于氣而已其法不可炙刺宜為導引服藥藥不能獨治者蓋導引能行積氣藥力亦藉導引而行故也導引法療厥逆上氣氣攻兩脅心下痛滿右以兩手拇指壓無名指本節作拳按捭趺坐扣齒三十六屏氣二十一息咽氣三口再屏息再咽如是三則以氣通為效遇子午卯酉時則行然按摩導引之法甚多隨意行之皆不必拘此法方化氣湯出三因方治息積癖于腹脅之下偏脹膨滿不妨飲食鐵藥不能取轉及治心脾疼痛嘔吐酸水丈夫小腸氣婦人脾血氣一切氣逆胸膈噎悶縮砂仁桂心木香各一分甘草炙茴香炒丁香皮青皮炒陳皮生乾薑蓬术炮各半兩胡椒沉香各一錢一字右為末每服二錢薑蘇鹽湯調下婦人醋湯調下桔梗丸治息積脅下氣逆妨悶歲久不已桔梗銼碎枳實麩炒鱉甲去裙襴醋炙人參當歸切焙白术乾薑桂去粗皮吳茱萸湯洗焙乾炒甘草炙各三分大麥蘖炒一兩右搗籮為末煉蜜和丸如梧桐子大每服二十丸溫酒下日再服漸加至三十丸沉香丸治息積脅下氣逆妨悶喘息不便呼吸引痛沉香銼桂去粗皮檳榔煨銼各二兩人參訶黎勒皮青橘皮湯浸去白焙白术荆三稜煨銼木香各三兩右九味搗籮為末煉蜜和丸如梧桐子大每服二十丸橘皮湯下漸加至三十丸每日二服白术丸出宣明論治息積脅下妨悶喘息氣逆呼吸引痛不已白术枳實麵炒桂去粗皮各一兩半人參二兩桔梗銼炒陳橘皮湯浸去白焙甘草炙一兩右搗籮為末煉蜜和丸如梧桐子大每服二十丸溫酒下不拘時日三服赤茯苓湯治息積脅下氣逆滿悶妨脹赤茯苓去黑皮一兩半大腹銼半兩髙良薑一兩吳茱萸湯洗七次焙乾炒三分訶黎勒皮煨去核陳橘皮湯浸去白焙各一兩半右粗搗篩每服三錢匕水一盞煎至七分去滓空心溫腹日晚再服理氣丸出仁存方治脅下滿氣逆不妨于食連年不已由風寒之邪客于衛氣伏留不散聚于膜外所以不妨于食謂之息積由出入之息以感疾也橘紅一兩桔梗桂心檳榔各半兩木香杏仁去皮尖各一分右為末煉蜜丸如梧桐子大每服薑湯下二十丸未知加至三十丸檳榔散治息積脅下氣逆滿悶檳榔銼訶黎勒煨去核各二兩陳橘皮浸去白焙三分吳茱萸陳者淘七遍焙乾炒一兩半右粗搗籮每服五錢匕水一盞半煎至八分去滓溫服空腹日二服磨積丸出三因方治腸胃因虛氣癖于肓膜之外流于季脅氣逆息難竭日頻年醫所不治久則榮衛停凝一旦敗濁潰為癰膿多致不救胡椒一百五十粒木香一分全蝎十枚去毒一用蝎尾右為末粟米飯丸如菉豆大服十五日橘皮湯下陳橘皮湯治息積脅下氣逆滿悶陳橘皮湯浸去白焙乾吳茱萸陳者水淘七次炒乾各一兩半右粗搗篩每服三錢匕水一盞入鹽少許煎七分不拘時去滓溫服積聚心腹脹滿附論夫臟腑不和則血氣留滯而成積聚藴結氣不宣通與臟氣相傳故令人心腹脹悶煩滿短氣若為寒邪所并則傳于腑隂陽相擊而致心腹疼痛甚則泄利也方木香三稜丸治胸膈痞悶腹脹滿脅肋痛食飲遲化四肢困倦嘔逆惡心口苦無味積滯冷物不思飲食癥瘕疣癖堅硬氣塊並宜服之小兒傷食服之其效如神木香丁香砂仁紅豆薑屑炒甘松水洗良薑厚朴