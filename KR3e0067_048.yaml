body:
  text: 普濟方卷四十八明周王朱橚撰頭門頭風白屑論夫頭生白屑不問冬夏令人瘙癢世呼為頭風此本於肺熱也肺為五臟之蓋其氣上衝頭項寒則腦液下而多鼻涕肺熱則薰蒸而多白屑復以風熱鼓作故癢而喜搔旱蓮子草十斤搗絞取汁二升桐木白皮四兩松葉防風芎藭白芷辛夷仁藁本沉香秦芁商陸犀角屑青竹皮細辛杜若牡荆子零陵香各二兩甘松天雄白术升麻柏木白皮風香脂各一兩生地黃十斤搗絞取汁五升烏麻油四升馬脂一升熊脂二升豬脂一升搗絞蔓菁子油一升棗根白皮三兩右除脂油外並細銼以蓮子地黃汁入瓷瓶內浸一宿取出與豬脂油同入大鍋內微火煎候白芷黃色膏成去滓貯入不滲器中先洗髮令清淨候乾用藥塗摩明旦取桑白皮二兩銼以水一斗五升煮取一斗放溫洗髮每夜塗藥一次又方蓮子膏出聖惠方治頭風白屑長髮令黑蓮子草一斗二升松葉桐樹白皮各二兩防風去蘆頭芎藭白芷辛夷藁本零陵香沉香秦芁商陸犀角屑青竹茹細辛杜若牡荆子已上各二兩甘松香白术天雄去皮臍柏樹白皮楓香已上各一兩生地黃汁五升生油四升馬鬐膏一升熊脂二升蔓荆子油一升右細銼以蓮子草汁地黃汁浸藥一宿用脂膏油等微火煎三上三下以白芷色黃焦膏成濾去滓於瓷器中貯之每用時取棗樹根白皮銼三升以水一斗煮取五升去滓俟沐頭了然後塗膏熱摩入肌肉甘松膏出千金方治頭中風癢白屑甘松香丁香白芷澤蘭桑白皮桑寄生大麻苜蓿杏仁牡荆子辛夷仁芎藭防風莽草各一兩零陵香吳藿香細辛蜀椒各二兩竹葉松葉柏葉各半升胡麻油臘豬脂各一升烏雞肪鴈肪各一兩右㕮咀以酢漬一宿內油膏中微火煎三上三下白芷色黃膏成去滓塗頭上日二夜一髮生龍腦膏出聖濟總録治頭風癢白屑長髮令黑龍腦沉香白檀香蘇合香雞舌香零陵香丁香甘松木香藿香白芷白附子細辛當歸芎藭天雄辛夷甘菊花烏喙防風蔓荆實杏仁湯浸去皮尖秦椒去目及閉口各一兩烏麻油五升右除油外並細銼以新綿裹內鍋中入油同煎候白芷黃色膏成濾去滓以瓷合收旋取以手摩頭頂髮際松脂膏出聖惠方白芷天雄莽草躑躅花各一兩秦芃獨活烏頭炮裂辛夷仁甘松零陵香沉香牛膝木香各三兩松葉杏仁湯浸去皮尖研藿香葉莎草根甘菊花蜀椒去目并閉口者芎藭各二兩白檀香一兩右除杏仁外並細銼以醋三升都入瓷瓶內浸一宿取大鐺用生麻油一斗與藥同以微火煎候醋氣盡膏成去滓貯入不津器中每日三度勻塗髮根生髮膏出千金方治頭中風癢白屑蔓荆子附子細辛續斷零陵香皂莢澤蘭防風杏仁藿香白芷各二兩松葉石南各二兩莽草一兩馬鬐膏豬脂松膏各二斤熊脂三斤右㕮咀以清醋三升漬藥一宿旦以馬鬐膏等微火煎三上三下以白芷色黃膏成以澤髮長髮膏出聖惠方治頭白屑風癢蔓荆子附子去皮澤蘭防風杏仁去皮零陵香藿香芎藭天雄辛夷各一兩沉香二兩松脂白芷各三兩馬鬐膏松葉切熊脂各一兩生麻油四斤右以苦酒漬一宿以脂等煎緩火三上三下白芷色黃膏成去滓濾收貯塗髮頭風癢并白秃白屑膏烏喙莽草細辛續斷石南葉辛夷皂莢澤蘭白术防風白芷各二兩柏葉竹葉切各一斤豬脂生麻油七斤右以苦酒漬一宿以油脂煎候白芷色黃膏成濾捩收以塗頭髮先洗後用之一方有松葉塗頂膏出聖惠方治頭風癢白屑烏喙去皮生用莽草石南細辛皂莢去皮子續斷澤蘭白术辛夷防風去蘆頭已上各二兩柏葉二斤松葉二斤豬脂四斤右細銼以酒一升浸一宿漉出以豬脂煎藥焦黃膏成去滓沐髮了以塗之妙菊花湯出千金方治頭風白屑滿頭菊花獨活去蘆頭茵芊防風去皮細辛去茵葉蜀椒去目并合口者皂莢杜蘅莽草桂去麻各半兩右為末每用一兩煮湯沐頭治頭風白屑經久不瘥時時瘙癢方出聖惠方甘菊花桑根白皮附子去皮臍藁本松葉蓮子草蔓荆子零陵香桑寄生已上各三兩右細銼每用五兩以生絹盛用桑柴灰汁一斗煎令藥味出冷熱得所去藥袋沐頭避風不過五七度瘥防風荆芥散出聖濟總録治諸風及沐髮未乾致頭皮腫癢多生白屑荆芥穗莎草根去毛各半兩甘草炙銼三兩半甘菊花揀半兩白芷羌活去蘆頭防風去乂各三兩芎藭一兩右為細散每服一錢匕茶酒任調不拘時蔓荆實膏一名集香油出聖惠方治頭風白屑頭癢髮落頭旋妨悶蔓荆子三合香附子三十個北地者佳附子零陵香羊躑躅花旱蓮子各一兩葶藶子一兩半以七味細銼綿裹故鐡精半斤碎用用生鐵亦可右麻油一大斤浸七日取以塗髮油乾旋添藥氣盡易一方無香附子常用梳頭若髮稀及秃落入鐡精二兩於油中旋取塗治頭風髮落或頭癢腫白屑無問老少出聖惠方蔓荆子一升碎防風三兩寄生三兩秦椒一兩大麻仁一升白芷四兩右切以水一斗五升去滓以洗三四度差加芒硝一升亦妙豬椒根湯出千金方治肺勞熱不問冬夏老少頭生白屑瘙癢不堪蓋肺為五臟之蓋其勞損傷肺氣衝頂致使頭癢多生白屑搔之隨手起人多患此皆從肺來世呼為頭風也豬椒根三兩麻黃根防風二兩細辛茵芋各一兩右㕮咀以水三斗煮一斗去滓溫以沐頭龍腦丸出聖濟總録治諸風白屑長髮令黑白龍腦二兩用鼎盛水五升入龍腦拌糯米十粒石灰泥固濟鼎口文火煮半日候冷取出研如粉真珠二兩先用大紙二張以皂莢津漬過為貼成之又用綿裹定入栗糖五斗安瓶中蒸一晝夜撚破即如粉乾丹砂二兩如芙蓉者研如粉并雄黃粉同銀鍋中用醋三升以文火煮一復時出之却以溫水淘去醋味曝乾雄黃一兩研如粉琥珀一兩右和勻內留二兩每夜臨卧潄口了揩齒咽津餘六兩再用白麵四兩作餅子紙二張褁煨熟取出研細與前藥六兩煉蜜和搗丸如梧桐子大每日空心取兩丸含化咽津後飲溫酒三五合若四十以上更加白龍骨一兩研如粉以水飛過曝乾綿裹蒸一飯久次入桑螵蛸一兩煨熟搗末并前末同以煉蜜丸治頭風白屑生髮白令黑方浮木子五升末識以九月九日已前採餘時搗末去子鐡精四兩零陵香丁香子二兩右細切絹袋盛用麻油二升漬經二七洗頭乾每日塗之沐頭湯出聖惠方治肺勞熱不問冬夏老少頭生白屑瘙癢不堪蓋肺為五臟之蓋其勞損傷氣衝頭頂致使頭癢多生白屑搔之隨手起人多患此皆從肺來世呼為頭風也大麻子秦椒各三升皂莢屑五合右熟研內泔中一宿漬去滓木匕攪百遍取撈乃用沐頭髮際更别作皂莢湯濯之然後傅膏天麻餅出聖濟總録治諸風頭多白屑天麻芎藭白芷各五兩右為細末煉蜜和勻每一兩分作三十餅每一餅細嚼茶酒任下不拘時治白屑五苓散二兩半縮砂三五粒黃丹一錢炒黑焦色右為細末和勻井花水一大盞朝東清晨服之立效治頭風白屑出聖惠方附子三兩去皮臍生用桑根白皮半斤銼蔓荆子八兩右都搗碎以水一斗二升煮取七升濾去滓室中沐頭又方白芷五兩細銼雞子三枚去殼川芒硝三兩右以水七升先煎白芷取四升濾去滓停少冷內雞子及硝攪令勻密室中洗頭治風屑及燥癢無時出本事方香白芷零陵香各等分右為末乾糝於頭上候三五日後箆去再傳三二次終世不生治頭癢搔之白屑起大麻仁三升搗碎秦椒二升右搗內泔汁中漬之一宿明旦濾去滓溫水沐髮乾用後方白芷一斤雞子三枚芒硝一升三味以水四升煮取三升去滓停少冷內雞子清及硝攪令調更溫令熱分為三度澤頭覺頭癢即作洗之不過三度永除治肺勞熱不問冬夏老少頭生白屑出千金方用蜀椒二升以水煮取汁沐髮良又方出聖惠方用桑灰汁沐頭去白屑神良一方葶藶子煮湯以沐即愈昨葉何草方出聖惠方治頭風白屑用瓦松曝乾燒灰淋汁熱洗頭不過五七度又方治患頭上白屑用搗山豆根為末油浸塗小兒用乳汁調塗楮實方出肘後方治頭風白屑如麩糖用堅實楮木作枕六十日上易新者治風屑極燥癢無時此乃氣虛風邪侵於皮表而生焉須用此藥治之出醫方大成用藜蘆根不拘多少為末先洗頭須避風好最後未至十分乾時用藥糝定須用藥末入髮至皮方得緊縳之兩日夜次日全無亦不燥癢如尚有些少可再用一次效治髮洗頭白屑不生用水蘇燒作灰淋汁以煮汁洗頭令髮香白屑不生又收乾釀酒及漬酒常服之佳雞子沐湯出聖惠方治頭風搔之白屑起用新生烏雞子三枚以沸湯五升揚之使溫破雞子內中攪令勻分為三度沐令髮生去白屑風癢治頭風白屑出聖惠方用荆子一斤以水一斗煮至五升去滓稍熱洗頭一云蔓子又方出聖惠方用蠶砂燒灰淋取汁熱暖洗頭又方出聖惠方用烏羊糞燒灰淋取汁熱暖洗頭又方出聖惠方用牛蒡子并葉搗絞取汁令稍稠卧時塗頭至明即以皂莢湯洗之又方出聖惠方用羊蹄根爆乾搗羅為末以羊膽汁調揩塗頭上永除根白鴿方主頭極癢不痛生瘡用白鴿屎五合以好醋和稀膏煮三兩沸日三二上傅之效又方出永類鈴方以川椒皂角火麻子漬水作湯沐髮去白屑去風屑出本草以豹頭骨燒灰沐頭治頭風白屑生髮出本草以結殺樹花香油傅頭結殺樹生西國去白屑出本草方以熊脂腦髓作油摩頭治頭風風屑出本草方以驢頭汁洗之白秃論夫蟯之為害因血氣虛乘風上則能生瘡疽癬瘑疥無不為也瘡痂不去而癢鬢髮秃落無復生榮是為白秃杜蘅膏一名松脂膏出千金方治白秃及癰疽百瘡杜蘅雄黃研木蘭皮銼礬石研大黃銼附子炮製去皮臍石南葉秦艽去土真珠苦參水銀松脂各六兩豬脂去膜右先將草藥搗羅為末次將石藥及水銀合研如粉方熬豬脂松脂化下諸藥文武火煎令稠以新羅濾去滓磁合收貯每用先以泔漿水洗頭淨後塗藥方木蘭皮膏出聖惠方治白秃及百瘡木蘭牡荆子秦芁去苗附子去皮臍生用川大黃石楠苦參已上各一兩白礬真珠末雄黃水銀松脂已上各半兩細研至水銀星盡右先以木蘭皮等七味細銼醋拌勻經宿用錬子豬脂二升於鍋中煎令附子等焦黃為度以綿濾去滓後入白礬等五味更煎三五味數沸離火候冷於瓷合中盛日三度塗之五味子膏一名蛇床子膏出千金方治白秃髮落生白痂終年不瘥五味子肉蓯蓉切焙松脂蛇床子逺志去心各三兩兔絲子五兩以酒浸一宿焙雄黃研雞糞白雌黃白蜜各一兩豬脂二斤右先將草藥搗羅為末次將石藥雞糞再研令如粉下豬脂松脂入鍋中同熬化後用諸藥文火煎稀稠得所以新綿去渣瓷合盛每用先桑柴灰汁洗頭令淨後塗藥不過三次髮生防風丸出聖濟總録治白秃髮落防風去乂黃連去鬚生乾地黃焙各四兩蔓荆實九兩柑皮焙一兩半葳𬎼二兩半茯神三兩半去木大黃銼炒甘草炙銼各二兩右為末煉蜜丸如梧桐子大每服二十丸空心粥飲下升麻膏聖濟總録治白秃髮落升麻薺苨莽草各二兩白芷一兩防風去乂三兩蜣蜋四枚另研馬鬐脂熊脂豹骨髓各半斤右先將草藥搗為末次將三味脂熬消後下諸藥以文火煎令稀稠得所綿濾去滓磁合盛每用先以泔漿洗頭淨塗藥王不留行湯出千金方治白秃及頭靣久瘡去蟲止痛王不留行桃東南枝東引茱萸根皮各五兩蛇床子牡荆子苦竹葉蒺藜子各三升大麻仁一升右㕮咀以水二斗半煮取一斗洗瘡日再并療癰疽妬乳月蝕瘡爛皆治之松瀝煎方出千金方治頭瘡及白髮不生松瀝七合丹砂研二兩雄黃研取精二兩水銀研黃連各一兩礬石一兩燒一方無礬有鉛粉一兩燒右搗散內瀝中攪令調以塗之先以泔洗髮令淨及瘡令無痂然後傅藥日三後當作膿膿乾更洗塗藥如此三度作膿訖以甘草湯去藥毒可十度許洗即瘥治白秃瘡出十便良方烏頭术半兩生用硫黃半兩細研膩粉一分狗糞一兩白色者研巴豆一分生去皮研右同研令勻以生油調搽先用熱米泔洗又以熱漿水洗又以生甘草水洗淨然後剃却髮刮去痂令赤色便塗揩之令入肉便以故帛包裹兩日一上三上即驗後冬瓜皮燒灰細研油調塗之即髮生常如治白秃瘡白礬枯松脂膩粉五倍子黃丹一方用蜜陀僧右為末調柏油和香油調藥搽瘡上桃皮湯出聖濟總録治白秃髮落沐髮方桃皮去粗黑色者銼三兩麵豉炒研各半兩白米研一合右以水一斗煮取八升去滓放溫沐頭每日用之桃皮膏出聖濟總録治白秃髮落桃皮去粗黑者一兩銼以水一斗煮取五升去滓先溫喫半盞餘留洗頭䜴半兩炒研白麵炒半兩右先以桃皮汁洗頭却并喫訖後以水調豉麵末傅之治秃瘡黃蜀葵花大黃黃芩各等分右為細末好清油調搽治秃方桞細枝一握去皮水銀大如三豆白莢一挺碎右用醋煎如餳以塗之水銀膏出聖惠方治白秃瘡水銀一兩黃連二兩去鬚細墨一兩右先以黃連墨搗為散用不著水豬脂和水銀同研令墨盡用塗瘡上神效烏羊膏出直措方治頭白秃瘡及惡瘡獖豬糞臘月收取燒灰半兩檳榔二錢雄黃一錢右為末先以麻油調和鴨子清約大小作圓餅溫覆頭上引蟲不可熱復不得動頭待十分癢忍不得令人急手揭起次用苦楝根煎湯淋洗拭淨後摻藥乾則麻油輕粉調抹秃頭藥楝樹子經霜火煉作灰糙礬各重半兩火上煉右研為細末搽瘡上治白秃方出聖惠方黑豆一合炒令微黃乾桃花一兩右為散以臘月豬脂調塗瘡上用綿子裹勿令見風治􅀢􅀢頭白瘡豬筒骨𢃄髓紫草右用香油熬藥焦色去藥入白礬輕粉在內搽瘡即生髮治白秃瘡裹鹽荷葉藤瓤右銼碎水煎濃汁洗三五度治秃頂方出千金方用蕪菁子為末以酢和傅之日三又方出千金方用麻子三升熬焦為末以豬脂和塗之髮生為度治秃無髮者方出千金方用黑椹二升內罌中日曝三七日化為水洗瘡上三七日髮生神效治白秃方出肘後方右用羊肉濕脯炙令香及熱速搭上不過三四度癢勿搔之生肉亦得又方出肘後方療白秃用新破豬肚去糞乘熱速搭上須臾蟲出瘥蟲若不盡更作取令無蟲若癢慎勿搔當縳兩手日中卧午後去之又方出肘後方用皂莢湯淨洗乾拭然後以陳久油滓塗之日三麻油亦可又方用煮桃皮汁飲之并洗頭外臺祕要有麵鼓和以傳一方用花為末和豬脂封上又方用麴豆䜴兩種治下篩酢和傅上麴一作麵一方以米泔淨洗用醋和傅之又方用大黑豆炒令焦為末和臘月豬脂熱暖匙抄封上遍即裹著勿見風一方髑髏骨大豆各燒為末等分豬脂和如泥塗之必效治秃瘡方用童子小便暖洗之揩令血出取白鴿糞五合熬末和釅醋令稠塗之即瘥一方先以米泔淨洗用醋和傅治秃方取三月三日桃花開口者隂乾與桑椹等分搗末豬脂和以灰汁洗後塗藥治刺黎用百年屋下燕窠泥同奄翁窠為末麻油調先用米泔洗透用刀子剃去皮血出不妨用紙挹乾傅藥或乾傅亦可龍粉散用乾地龍為末入輕粉麻油調傅之白秃頭方用麻油膩粉調抹又方用雄豬膽斗半入法醋以雞羽傅掃藜蔞散治秃瘡貫仲一兩藜蔞三錢漏蘆三錢右為細末先洗淨瘡乾擦上候乾油調塗又方用藜蘆為末以臘月豬膏和塗之五月漏蘆草燒作灰作膏和塗先用鹽湯洗乃傅又方用先洗淨好花椒末不拘多少調傅三五次效又方治白秃瘡及髮中生癬用取熊白傅之治白秃用白鴿糞搗細羅為末先醋米泔洗了傅之立瘥治大小秃刺黎溜膿用獨核肥皂去核用砂糖填滿中放巴豆二枚麻繩扎定鹽泥固之火煆青煙起存性去泥入檳榔末輕粉五七分研勻用香油調傳先用熱湯炮灰汁洗淨再溫水洗去軟帛挹乾傅藥一宿便見效傅後不須再洗治癩頭用白膠香真珠麻油煎沸切入蔥白黃丹先用清湯洗不拘多少傅療秃瘡用取虎膏傅之苦楝膏治大人小兒瘡秃及惡瘡用苦楝皮燒灰以豬脂調傅之治㿐頭熱紅餅瘡方用生艾白芷大腹皮連根蔥各等分煎湯洗以生藍青葉入些生艾搗細蜜水為膏傅亦治惡瘡治頭秃用五靈脂白礬白芷青黛好草烏各一分為末麻油調傅決效散治風癢頭瘡貫衆三兩白芷一兩右為細末油調塗之細辛膏治頭瘡有蟲變成白秃一名白屑膏方見本門頭風白屑類療白秃方羊蹄草根獨根者勿見風日及婦人雞犬以三年醋研和如泥生布拭瘡令赤以傅之治秃瘡法黃連木香百部各一兩南椒二銖右為細末更入麝香少許輕粉一錢砒硫黃水銀各三銖於乳鉢內研令細以生油塗瘡藥末傅之百部散出揚氏家藏方治大人小兒秃瘡金毛狗脊去毛黑狗脊蛇床子炒馬兜鈴根各一兩硫黃秦芁百部各半兩右件為細末生麻油調塗瘡上治秃瘡出本草以象肉燒灰和油塗之治濕癬白秃出本草以馬齒莧煎為膏塗之若燒灰傅之亦良主頭瘡白秃出本草可煎白芨汁傅之治白秃瘡出本草以糞藍煎湯洗之治白秃瘡出本草用山豆根不拘多少以水研傅瘡上治髮秃落出本草以馬鬐膏塗頭上治白秃生髮出本草以白馬脂五兩傅瘡上稍封之治白秃瘡出本草以駁白不乏者尿數數暖洗之十遍瘥治頭瘡白秃出本草以馬尿洗之治頭極癢不痛出瘡出本草用楸葉根不拘多少以搗絞汁塗之治頭瘡白秃殺蟲及治腫毒出本草以莽草與白蘝赤小豆為末雞子白調如糊塗之并各腫毒乾即更易治頭瘡白秃出本草取雞窠中草和白頭翁草灰豬脂傅之赤秃論夫諸陽脈皆在於頭風熱乘之則陽邪熾盛發於頭皮腦絡之間細瘡遍密赤色有汁癢痛浸淫乃至髮落方旱蓮汁出聖濟總録治赤秃髮落塗方旱蓮草三兩鐡粉一分右先將旱蓮草搗絞取汁次入鐡粉研令極細入合中每用先以泔漿洗頭次塗之牛羊角灰出千金方治赤秃髮落塗方牛羊角等分燒灰右研如粉以豬脂調傅之一方無羊角馬蹄灰出千金方治赤秃髮落塗方用馬蹄燒灰研如粉用臘月豬脂調塗之椹汁方出千金方治赤秃髮落方用黑椹一斗磁瓶中密封於北簷下埋之一百日即變為水每用淨洗頭次塗髮即生一方桑灰汁洗頭令淨搗椹傅之日中曝頭睡楸葉汁出聖惠總録方治赤秃髮落塗方用楸葉一兩搗絞取汁傅之治秃髮復生出海上方用香油水各和一半以銀叉攪之使油水相入擦傅頭上髮則復生又方用取狗乳塗之治頭赤秃方出千金方用搗黑椹子取汁每服一中盞日三服又方出聖惠方用豬毛燒灰細研以豬脂和傅之又方出聖惠方用油磨錢衣塗之即生普濟方卷四十八
