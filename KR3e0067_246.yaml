方右每夜用鹽塗擦腿膝至足甲淹少時却用熱湯泡洗昔有人得腳氣諸方不效得此方常洗不再發蘸腳椒湯出聖濟總録専治腳氣攣腫腰絡不隨蜀椒六升未經蒸者用生紬作袋十二枚每枚長九寸納椒入袋中實築之仍拴袋口右將椒袋納釜中以酸漿水四斗五升入鹽二升煮五七沸用淨瓦甕子一口可容五斗者將所煮椒袋一枚及一半煮取汁乘熱入瓦甕中候其湯冷暖通腳即以腳入甕踏椒袋上蘸仍以湯頻頻從骭靣淋之若甕中椒袋覺冷即換釜中熱者其湯或冷亦換釡中熱湯其使了湯并椒袋却用釜中以微火溫之當令熱亦須於密室中勿令風吹若兩腳覺髀牽風如蟲行頭項肢體皆有汗出腹中鳴此是氣下即止若汗後覺心氣悶可取冷飯吃三五口以鹿脯下之若覺微利皆是病壯通泄也若未愈即隔日或三日取舊湯袋等依前法踏蘸還以得汗及腹鳴為度其蘸腳湯只可離腳靣三四寸不可過踝宜食酥蜜薑湯并鹿肉治腳氣發過心膈悶者宜用此方出聖濟總録右取新磚兩口鑿中心作孔如毬子大勿令透過即將炭火燒令通紅用米醋潑之便納蜀椒於磚孔中以物蓋上看溫暖即去襪以腳踏磚上立愈一方以甕盛椒水下著火暖之懸板為橋去湯二寸許以腳踏板柱腳以綿絮密塞勿令泄氣若疲即出入被以粉摩之一食久更入甕常令甕下火不絶勿使湯冷如此消息不過七日得伸展并腫亦消麻黃裹足方出聖濟總録能治久蘊風濕足多冷麻隱痛難行夜常轉筋如風所吹此皆是腳氣之候右以麻黃二斤銼碎炒令極熱以帛纒裹二足不得透氣良久腳上有汗候麻黃溫不用却著綿夾襪勿令風吹如此三五次永除病根爐子法右掘地爐子一個濶一尺二寸掃拭令置新磚半頭在爐中心用細莖炭十斤燒令通赤候炭消及一半為度取去炭用釅醋四升同白馬通八斤和成泥密封地爐子四圍俱遍將藥丸一粒置磚上伸腳踏之被蓋覆三二時辰汗盡方出腳然後用藥淋洗淋洗藥三節通方出聖濟總録石楠節杉木節茵芋蒴藋原蠶沙麻黃根松木根萆麻根煮絮灰柳蟲糞右各三兩細銼用水一斗五升煮至一斗乘熱淋洗附子散出聖濟總録専治腳氣連腿腫滿久不瘥附子一兩去皮臍生用右為散用生薑汁調如膏塗腫上藥乾再塗以腫消為度蒴藋薰蒸方治腳氣筋攣不能行及乾痛不腫日漸枯瘁或腫滿緩弱右取蒴藋三斤和根葉銼長二三寸穿地作一坑靣闊一尺以柴截置於坑中燒令微赤灰火淨以蒴藋布坑四邊側布一行正布一行次以故氊蓋坑口候蒴藋萎更著新者一二斤坑傍鋪薦席坐以杉木板置於坑底以腳踏板上薰之以綿衣覆腳周遍勿令氣出如射人熱甚開歇片時還納腳於坑中其四邊或有熱處即隨熱處著蒴藋布之如病人困即止安穩暖臥以綿衣蓋勿令露風飽食以補之三五日一薰重者不過三五薰即瘥又方出聖惠方専治腳氣腫滿大效右以黑驢糞三斗鹽四兩相和拌令溫即於甑上蒸一炊久取炊湯淋濃汁稍候熱氣定即淋蘸腳切宜避風又方出聖惠方萆麻葉二斤右件藥細銼和勻每分為四度以水三斗煮取二斗去滓看冷暖於避風處淋蘸桑葉煎出聖濟總録専治腳氣曽用諸方蘸腳後宜服白桑木用生白椹者採取軟條或帶葉者亦得細銼一石右納大釡中以水一石煎至五斗更旋添水五斗以慢火煎令常沸再減至五斗去滓澄清納淨釡內更煎至二斗濾去滓納鍋中慢火熬膏約至二升如稠餳即止傾入通油瓷甕內收藏每日空心取一匙須含化咽之如嘔逆不下亦可和粥食之服至一七日當覺四肢通暢頻頻泄氣以後兩腳或腫勿怪乃得藥力病瘥之候也金牙散方見本門風熱腳氣類専治腳氣牛膝酒一名側子浸酒方専治腳氣濕痺不仁腳弱不能行常服方見諸痺門風濕痺類治腳氣上生風毒瘡腫疼痛宜此淋蘸方出聖惠方槐白皮二兩桑枝三兩苦參二兩蒴藋二兩黃蘖三兩白礬一兩為末右銼以水一斗煮至六升去滓下白礬末冷熱得所密室中淋洗瘡上治腳氣腳上生風毒瘡腫不瘥宜用藥敷之方出聖惠方地骨皮二兩苦參三兩槐根白皮三兩蛇床子二兩鹽一兩羊蹄根三兩右細銼和勻分為二度以漿水五碗煎至五七沸去滓看冷暖漸漸洗之後以故帛淹乾得後散子一方敷前散治腳氣腳上生風毒瘡腫不瘥宜用藥敷之方出聖惠方蠶炒二兩杏仁一兩膩粉五錢右先於銚子內炒蠶沙杏仁令焦黑搗細羅為散入膩粉研令勻漸漸敷瘡上不過三五度瘥又方出聖惠方菘菜花一兩赤小豆一兩五錢黃連二兩右搗細羅為散旋旋敷瘡上又方出聖惠方爛蜆子殼一兩五錢黃連一兩馬齒莧菜三分右搗羅為細散頻敷瘡上效腳氣浸法出仁存方専治痛不可忍者正宜用此小便或自己者或童子者尤好右暖令溫用二馬桶浸二腳桶口用紙單之類隔其氣膝痛者用高桶浸至膝為妙冷則再溫牛膝散一名硼砂牛膝三物散専治腳氣不能食方見本門腳氣上氣類附子膏一名神明膏専治腳氣風毒疼痛及緩弱無力方見本門風濕腳氣類薰洗方石楠葉左纒藤一名鷺絲藤荆芥蔥沙木右不拘多少水五升煎至三升先剪去患腳指甲用藥水在盆內將腳閣在盆沿上以布綿遮圍薰令汗出通手於腿上淋洗至腳足存出指頭候水冷方連指頭洗更先一靣用晚蠶沙一升於銚內炒熱候揩腳乾了起身立將銚內蠶沙傾在地上却將患腳踏在熱沙上如此三五次立效薰洗方治腳氣黃耆一兩蛇床子一兩木通一兩五錢防風五錢莾草二兩荆芥二兩右為粗末濃煎湯極滚沸閣在桶上薰令通手時即洗之須是露出指不可洗烏頭銼散淋洗腳氣川烏頭生官桂川椒各一兩蔥二莖右為銼散水一斗煮五升乘熱蒸氣先薰後以衣覆之勿泄氣後可通手淋泄洗石楠湯治淋泄腳氣大戟川烏頭炮去皮臍頑荆葉草烏頭生去皮尖杜仲銼炒斷絲川練子肉川椒去目石楠葉藳本去土焙右各等分㕮咀每用一兩五錢水五升煎三五沸乘熱薰淋洗泄拭乾勿令見風七寶散出楊氏家藏方専治經絡寒濕腿臂作痛屈伸不能此藥舒筋止痛散風去濕晚蠶沙微炒一升蛇床子炒一升肉桂去粗皮荆芥穗乾荷葉以上三味各三兩藳木去土一兩五錢川烏頭炮去皮臍一兩鷺鷀藤散出楊氏家藏方専治淋泄腿膝疼痛鷺鷀藤蘇方木右件各等分㕮咀入定粉少許每用一兩水五碗煎數沸乘熱洗薰候通手即洗薰腳氣法出楊氏家藏方用薦茭草一大把須是夫妻床上舊者銼作短假置在舊大酒瓶內用火燒之以患腳在瓶口上薰腳心久而腳腿上汗盛出立效防風浴湯出掦氏家藏方専治風濕腳氣氣血凝滯皮膚粗澀不自潤澤荆芥穗四兩苦參地骨皮白牽牛赤小豆以上四味各三兩白蒺藜炒去刺防風去蘆頭白殭蠶炒去絲嘴香白芷萆麻葉杉木蒴藋葉以上七味各二兩木鱉子一兩微炒令焦黃色當歸洗焙獨活去蘆頭吳茱茰湯洗七味以上三味各一兩右件為細末每用五錢水四碗入連根蔥白五莖擘開同煎至五七沸傾出入朴硝末二錢重攪勻先薰候通手淋洗如神湯出朱集驗方能治一切風寒暑濕瘴諸般腳氣張定馬家本金毛狗脊去毛吳茱茰生用連核木鱉子去殼各一兩山茱茰生用連核右㕮咀分作四次每用水五碗煎數沸乘熱薰後去滓淋洗治風毒腳氣遍身冷方出廣南四時攝生論蕓臺子天南星烏頭右等分為散以薑汁調塗腳心覺體暖便洗之膏貼方出永類鈐方皂角木鱉草烏南星肉桂乳香沒藥右醋熬成膏貼腳心或加大黃川椒牡丹皮吳茱茰當歸巴豆白芷醋酒浸一宿以不入水豬脂慢火上煎令藥色變黃勿令焦黑去滓依法成膏日三四度炙摩之又方出永類鈐方用生薑汁調草烏末亦可治腳痛成瘡出本草先銼水蓼煮湯令溫熱得所頻頻淋洗候瘡乾自安腳氣春夏防發附論夫風腳毒氣春則由輕夏則彌盛入秋漸可至冬自歇凡春夏霖雨不節土地卑濕濕熱之氣從地而起上蒸至腳膝體虛之人易入風毒故春夏可宣泄風氣以防腳氣動也方側子酒出聖濟總録専治腳氣春夏盛發入秋腫消氣定但苦腳弱不能屈伸皮膚不仁當以服此側子半生半炮獨活去蘆頭丹參五加皮炙薏苡仁各三兩人參蜀椒去目閉口者炒出汗茵芋葉各一兩金牙碎綿裹磁石碎石碎綿裹各八兩牛膝切焙石斛去根節各四兩芎藭乾薑炮天雄炮製去皮臍石膏碎桂去粗皮當歸切焙各一兩五錢白术萆􅐺防風去苖熟乾地黃水茱茰生用白茯苓去黑皮細辛去苖葉各二兩右㕮咀如麻豆大可用生絹袋盛入淨器中清酒七斗漬之秋冬七日春夏五日量人性飲之日五六服常令酒力相續以唇痺為度若丈夫素有冷者加孔公蘖子鍾乳等多用三五兩少用一兩其人有虛熱去熟乾地黃加生乾地黃五兩服此酒須臾炙三里穴風市穴伏兔穴以泄毒氣補泄石斛丸出聖惠方専治腳氣肝腎臟久積風虛每遇春夏動發腳膝煩疼心胸滿悶膀胱攻心腹虛脹筋脈拘急神思昏沉大小腸祕澀宜預服石斛一兩去根節牛膝五錢去苖萆􅐺五錢銼附子五錢炮製去皮臍芎藭五錢羚羊角屑五錢天麻五錢海桐皮五錢銼桂心五錢乾蝎五錢微炒沉香五錢山茱茰五錢白蒺藜五錢微炒去刺酸棗仁五錢微炒補骨脂五錢微炒五加皮五錢當歸五錢川大黃二兩碎銼微炒枳殼一兩麩炒微黃去瓤乾生地黃一兩檳榔二兩鹿茸五錢塗酥炙令微黃色去毛獨活五錢郁李仁一兩湯浸去皮微炒右為細末煉蜜和搗三五百杵丸如梧桐子大每於食前以溫酒送下三十丸沉香散出聖惠方専治腳氣春夏方發或肝腎風虛脾氣乏弱但覺昏悶不欲飲食宜服之沉香三分木瓜一兩乾者防風五錢去蘆頭羚羊角屑五錢桂心五錢熟乾地黃一兩訶梨敕皮一兩人參五錢去蘆頭牛膝三分去苖酸棗仁五錢微炒白茯苓三分石斛一兩去根節黃耆三分附子一兩炮去皮臍白术三分羌活五錢甘草五錢炙微赤銼右為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服羌活散出聖惠方専治風毒腳氣春夏預防發動宜服疏風利氣心腹壅悶腳膝煩疼羌活一兩黃耆五錢銼赤茯苓五錢生乾地黃三分羚羊角屑一兩杜心五錢赤芍藥五錢酸棗仁五錢微炒當歸五錢枳殼一兩麩炒微黃去穰木香五錢芎藭五錢川大黃一兩銼碎微炒防風五錢去蘆頭檳榔五錢甘草五錢炙微赤銼右為散每服四錢水一中盞入生薑半分煎至六分去滓食前溫服枳殼散出聖惠方専治腳氣春夏防發或稍心腹壅悶腳膝煩疼大腸不利小便赤少枳殼三分炒令微黃去穰木通五錢銼五加皮五錢獨活五錢黃芩五錢羚羊角屑五錢川大黃一兩銼碎微炒赤芍藥一兩紫蘇莖葉三分赤茯苓三分甘草五錢炙微赤銼檳榔一兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓每於食前溫服犀角散出聖惠方専治腳氣春夏防發稍覺風壅氣滯臟腑不通心煩神悶腳膝時疼犀角三分大黃一兩銼碎微炒木通三分銼檳榔一兩茈胡一兩去蘆頭川升麻三分枳殼一兩麩炒微黃去穰黃芩三分獨活三分赤芍藥三分芎藭三分甘草五錢炙微赤銼右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服牛膝湯治先患腳氣恐夏月發動常服牛膝酒浸切焙白茯苓去黑皮防風去蘆芎藭各六兩人參桂去粗皮獨活去蘆頭附子炮製去皮臍各五兩甘草炙銼當歸切焙各四兩磁石二十兩煨醋淬七次研細杏仁十五粒去皮尖雙仁炒右銼如麻豆大每服五錢水一盞半生薑一棗大生地黃汁一合同煎至一盞去滓空心日午溫服檳榔散出聖惠方専治腳氣春夏防發宜服此疏風調氣檳榔一兩獨活五錢赤茯苓五錢枳殼一兩麩炒微黃去瓤沉香五錢羚羊角屑五錢川大黃一兩銼碎微炒芎藭五錢甘草五錢炙微赤銼右為散每服四錢以水一中盞入生薑半分煎至六分去滓食前溫服大腹皮散出聖惠方専治風毒腳氣春夏防發宜服疏風利氣大腹皮一兩銼木香五錢訶梨勒皮三分羚羊角屑五錢川大黃一兩銼碎微炒枳殼一兩麩炒微黃去穰獨活五錢前胡三分去蘆頭赤茯苓一兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓不食前服木瓜散出聖惠方専治腳氣肝腎風虛防春夏發動心腹氣脹筋脈不利腰腳無力胸膈痰滯不思飲食木瓜皮一兩乾者檳榔一兩桑白皮一兩銼紫蘇莖葉三分木香五錢半夏五錢湯浸去滑七次枳殼三分麩炒微黃去穰羚羊角屑三分防風五錢去蘆頭右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服效木香散出聖惠方専治腳氣春夏預防發動令人心悶煩壅木香一兩訶梨勒皮二兩檳榔三兩右為散每服不計時候以童子小便一小盞牛乳一合生薑汁一匙同煎三五沸每服食前調下二錢以快利為度一方不用童子小便用烏牛尿一盞煎服如無牛尿以水代之老幼皆可服木瓜飲治腳氣夏月可服生木瓜二枚去皮穰切碎以水五升煮至二升半去滓收貯白术二兩搗羅為末右每服用白术末三錢以木瓜汁一盞入生薑一棗大煎至七分去滓空心溫服日三服腳臭汗方黃蘗皮二錢黃連黃丹白礬飛蛤粉微炒各二錢龍腦少許右碾為極細末將足洗淨亮乾以軟綿撲藥末在足上三五次永無臭氣治腳汗方杜礬光粉天竹黃右各等分為末摻之治腳汗白礬乾葛等分右二味為末每用五錢水三碗煎十數沸熱洗逐日一次經三五日自然無臭也又方治腳汗右用楊花著襪內或如綿絮入腳內尤佳普濟方卷二百四十六
