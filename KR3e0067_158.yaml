右為細末生薑汁麵糊為丸如梧桐子大生薑湯下每服一二十丸食後柴胡湯治咳嗽久不瘥柴胡延胡索百合枳殼去穰麩炒麻黃去根節欵冬花炒天雄炮去皮臍各一兩半桂去皮黃連去鬚一兩半地榆貝母十五枚去皮尖雙仁炒黃黃芩去黑心各半兩旋復花炒三分杏仁十五枚去皮尖雙仁炒黃代赭石一兩五錢右銼如麻豆每服三錢以水一盞煎取七分去渣溫服空心食前五愈散療五臟咳積年劇則上氣不得卧喉中如有物醫所不療桂心細辛乾薑白苑甘草炙各三分蜀椒代赭通草欵冬花芫花炒各三分伏龍肝牡蠣各三分熬右搗篩以飴糖和之搗令調和如棗核一丸含之稍稍咽其汁盡復含令胸中熱為候不知以意加之其久重病者晝夜二十餘丸若一歲咳者一月愈十歲咳者百日愈忌海藻菘菜生蔥生菜等物欵冬花丸療三十年上氣咳嗽欵冬花六分桂心四分紫苑六分杏仁四分去皮尖雙仁炒細辛六分附子二兩炮藜蘆四分乾薑六分甘草六分炙防風八分芫花六分炒川椒八分研野葛四分去心右搗篩蜜和丸如梧桐子大每服三丸稍加日三服忌生蔥辛醎醋豬肉冷水海藻菘菜生菜狸肉等一方十四味有茯苓忌酢百合散治久咳嗽胸中氣不利百合一兩紫蘇三分炒桑根白皮一兩銼紫苑三分去苖上甘草半兩炙赤銼欵冬花三分貝母三分煨微黃杏仁半兩湯浸去皮尖雙仁麩炒漢防己三分人參三分去蘆赤茯苓麻黃一兩去根節桔梗半兩去蘆頭右為散每服五錢水一大盞生薑半分棗三枚煎五分不拘時溫服桑白皮湯治男子婦人患咳嗽桑白皮紫苑一兩桔梗一兩半夏半兩薑汁製人參一兩知母半兩薑製貝母半兩阿膠一兩炒南星半兩薑汁製甘草半兩鍾乳粉一兩木香一兩右為末每服半兩水二盞入生薑五片棗一枚煎至八分去滓下鍾乳粉一錢或半錢調勻熱服蛤蚧丸治久肺氣咳嗽涕唾稠粘上氣喘急蛤蚧一對全用塗酥炙黃漢防己半兩貝母半兩煨黃甜葶藶半兩隔紙炒紫色桑白皮一兩銼蟬殼半兩豬苓半兩去黑皮赤芍藥半兩陳橘皮三分湯浸去白穰人參去蘆頭半兩甘草一分炙赤銼五味子半兩右為末煉蜜和搗五七百杵丸如梧桐子大每於食後溫粥飲下三十丸貝母湯治諸嗽久不瘥貝母去心薑製半日焙黃芩生用乾薑生各一兩陳皮五味子各一兩桑白皮半夏柴胡桂心各半兩木香甘草各一分右為粗末每服五錢水一盞半杏仁七箇去皮尖碎之生薑七片同煎七分去渣熱服黃師文云戊申冬有姓蔣者其妻積年嗽製此方授之一服瘥以此治諸嗽悉皆愈之人參湯治逺年咳嗽麻黃去節杏仁去皮尖各一兩甘草四兩桑白皮北五味子罌粟殼陳皮各半兩麥門冬去心三錢北紫苑一兩人參四兩阿膠七錢右為末每服二錢水一盞杏仁七粒去皮尖同煎七分空心服鹿角膠煎治久肺氣咳嗽鹿角膠四兩搗碎炒令黃赤茯苓一兩紫苑一兩去苖土紫蘇子二兩炒貝母一兩煨黃百合一兩上六味搗羅為末杏仁湯浸一兩去皮尖雙仁炒研生地黃汁五合生薑汁三合白蜜八兩牛酥五合右藥都一處與地黃汁等相和攪勻於銀器內以慢火煎成膏每於食後含半棗大咽津蛤蚧丸治久咳嗽蛤蚧一對雌雄頭尾全者酥炙人參半兩半夏湯洗七次切焙一分杏仁湯浸去皮尖雙仁蜜拌炒黃研一兩栝蔞大者二枚去皮子取肉蒸酥熟研阿膠炙燥半兩青橘皮湯浸去焙一分乾棗煮熟去皮核研二兩右件研搗羅為末合研勻入生蜜少許和丸如梧桐子大每服十丸糯米飲或熟水下空心臨卧服阿膠散治久咳嗽阿膠炙燥人參杏仁湯浸去皮尖雙仁炒甘草炙銼黃蓍半炙半生銼紫苑去苖炒桔梗銼微炒桑白皮炙銼各一兩右為散末每服用胰子一枚蔥白三寸細切糝藥二錢入鹽花少許濕紙褁煨熟細嚼溫酒下空心服乳石散治久咳嗽鍾乳粉欵冬花去梗甘草炙銼各半兩杏仁湯浸去皮尖雙仁微炒研桂去粗皮各一兩栝蔞一枚去皮子用肉白礬枮半兩不蛀皂莢一梃炙去皮子以上三味同杵爛新瓦上攤暴乾右搗前五味以三味同為細散每服二錢溫湯調送下八仙湯治久患氣嗽發即奔喘坐卧不安喉中氣欲絶馬兜鈴桑根白皮桔梗二兩半麻黃去根節湯煮掠去沫焙白茯苓去黑皮柴胡去蘆陳橘皮湯浸去白焙各三兩杏仁湯浸去皮尖雙仁一百枚右銼如麻豆每服五錢以水一盞半煎取八分去渣溫服頻服兩三劑瘥香䜴丸療三十年咳嗽上氣短氣久冷五臟客熱四肢煩疼飲食減少時有發甚不能行步夜不得睡多夢香䜴四分熟杏仁三分去皮尖雙仁炒紫苑二分桂心三分甘草八分炙乾薑二分細辛三分吳茱茰二分右搗篩蜜和丸如梧桐子大每服四丸日三服含嚼咽汁亦佳忌海藻菘菜生蔥生菜七星散一名川椒丸療三十年咳嗽肌體虛羸不思飲食川椒桑根白皮芫花根皮欵冬花紫苑代赭細辛伏龍肝各一兩右為散取作七分聚如扁豆大以竹筒口當藥上吸咽之令藥入腹中先食訖即服藥悉在炙肉中仰卧㕮咀日三服三日不瘥復作七分聚以臠肉炙令熟展轉以藥聚上令藥悉在肉中仰卧㕮咀吞汁令藥力悉皆從咽中下藥既吞盡食肉在後凡所療治皆不及此食肉便愈若不愈復如前法必愈乃止羊肉皆可用忌生菜延年方不用椒與芫花餘皆同蜜陀僧丸出聖惠方治積年肺氣咳嗽蜜陀僧二兩用綿裹以羅蔔煮之一炊時銀箔五十片黃丹一兩炒令黃菉豆粉半兩膩粉半兩胡粉半兩炒令黃金箔五十片葛粉半兩右為末煮棗肉和丸如梧桐子大每臨睡時綿裹一丸含化咽津海藻丸治積年肺氣咳嗽氣奔海藻三分湯浸去醎味麥門冬一兩半去心焙昆布三分湯浸去醎水乾薑半兩炮裂銼細辛半兩文蛤半兩桂心半兩川椒半兩去日閉口者炒去汗右為末煉蜜和搗三五百杵丸如大棗大不計時候以綿裹一丸含咽紫苑丸出御藥院方治逺年近日咳嗽痰涎不利紫苑去土欵冬花去梗白前各二錢半甜葶藶炒右為末煉蜜丸如梧桐子大每服四五十丸食後生薑湯下枇杷葉丸一名紫苑膏治肺熱久嗽身如炙肌瘦悴成肺勞服之未終劑而愈枇杷葉木通欵冬花紫苑杏仁桑白皮各等分大黃減半右各如常製為末蜜丸如櫻桃大食後臨睡服一丸朱氏集驗方云昔有婦人患肺熱久嗽身如炙肌將成肺勞服之未終劑而愈白前湯祕要方云肺氣嗽經久將成肺痿其狀不限四時冷熱晝夜嗽常不斷唾白如雪細沫稠粘喘息氣上乍寒乍熱發作有時唇口喉舌乾焦亦有時唾血者漸覺瘦悴小便赤顔色青白毛聳此亦成蒸有此狀者冝以白前等七味服之兼有麻黃等十味丸桑白皮等十味煎又云肺經氣嗽久有成肺癰者狀與前肺痿不多異但唾悉成膿出無多少病此者以白前湯加半夏五兩黃耆三兩以水一升煮取二升六合於麻黃丸中加黃耆五兩苦參六兩芍藥三兩於桑白皮煎中加黃芩切三升共桑白皮地骨皮同煎又加水三升同煎忌羊肉餳等并一切醎酸等物服之有效白前三兩桑白皮三兩生地黃一升茯苓五兩地骨皮四兩麻黃二兩去節生薑六兩右藥切以水八升煮取二升六合去渣加竹瀝五合分四服溫服食後晝夜三分一覺得力重各服五六劑忌醋蕪荑又依前白前等七味湯雖服覺可根本未除冝麻黃等十味丸服之麻黃二兩去節白前二兩桑白皮六兩射干四兩白薇三兩百部五兩乾地黃六兩地骨皮五兩橘皮三兩右件搗羅蜜和丸煮桑皮飲下之初服十丸日再服稍加至十五丸丸如梧桐子大本欠一味忌蕪荑又凡病在膈上者宜飽滿而在夜肺既居上此是病在上已晝夜服丸夜無憑凖宜合桑白皮汁等十味煎每夜咽之桑白皮切一升地骨皮切三升已上用水七升煎取七分汁去渣澄清生地黃汁五升生門冬汁二升生薑汁一升竹瀝三升生葛根汁三升白蜜一升牛酥三合大棗膏一升右先微火上取生地黃汁以下生葛根汁以上和煎減半時乃內桑白皮等二物汁和煎之三分減一再用酥蜜棗攪之勿停手得如稠飴狀取成訖置别器中服之每夜欲卧之時一胡桃大含之細細咽汁稍加至雞子大欲晝日間丸服亦得忌蕪荑欲飲氣嗽經久不已漸成水病其狀亦不限四時晝夜嗽不斷遇諸動嗽物便致因劇甚者乃至雙眼突出氣則欲斷汗出大小便不利吐痰涎洟沫無復窮限氣上喘息睂目浮腫不得平復有如此者宜合細辛等八味湯葶藶子十五丸服之細辛半夏洗桂心桑白皮各五兩乾薑當歸各四兩芒硝六兩杏仁六合去尖雙仁研右切以水九升煮取三升去渣內芒硝分溫三服每服如行人十里久當得快利後好將息經三日合丸服之忌生蔥菜羊肉餳丸方葶藶子六合熬細辛五味子各五兩乾薑當歸各四兩桂心人參丁香大黃商陸根各三兩橘皮四兩桑白皮六兩皂莢肉二兩炙大腹子檳榔各二十枚麻黃二兩去節右搗篩蜜和丸煮桑白皮飲下初服十丸日再服稍加至十五丸如梧桐子大若利則減否則加以大通滑為度時時得鴨湯溏亦佳忌生蔥生菜又依前細辛等八味湯葶藶子十六味丸不覺可漸成水病仍復如前若更加大小便閉澀頭目身體浮腫亦合大乾棗二味丸服之大棗六十枚劈去核葶藶一升熬杏仁一升去皮尖雙仁研右搗令如膏可作丸如硬燥不相著細細下蜜作丸還以桑白皮飲下之初七二八日丸再復稍稍加之以大便通為度病重者時令鴨湯飲下亦佳亦有以前三味煮湯服之又依前大棗等三味丸服雖覺氣暫歇然病根深固藥力微弱且停服大棗丸合碗豆丸五味細細下之蕩滌宿病巴豆二十枚研去心皮杏仁一百枚去皮尖雙仁研葶藶子六合熬大棗六十枚劈去核牽牛子五合熬右藥合搗一如前大棗丸法還以桑白皮飲下之服三四丸日再稍加利即減祕即加以大便調為候病甚時時飲鴨湯亦佳忌蘆笋野豬肉治三十年咳嗽出千金方細辛欵冬花防風紫苑各三兩藜蘆二兩川椒五合右取藜蘆先著銅器中次紫苑次細辛次欵冬花次椒以大棗百枚間著諸藥以水一斗二升微煮令汁盡出棗曝令燥雞鳴時服半棗不知明旦服一棗以胸中溫為度若強人欲嗽吐者可稍增服之便吐膿囊裏結吐後勿令飲食咳愈止藥藥勢靜乃食不爾令人吐不已平肺散治久年咳嗽神效御米殼四兩碎蜜水和炒黃烏梅肉一兩半人參各一兩貝母去心百合各半兩右為末每服三錢水一盞煎至七分食後臨卧熱服蘆筒散治年深久咳嗽鍾乳石枯白礬官桂去粗皮甘草炙各二錢佛耳草人參去蘆頭各三錢右為細末每服半錢夜抄在手內竹筒子吸咽後用清茶送下頻用三五服見效皺肺丸出百一選方治久嗽姚年連判嶽傳欵冬花人參五味子紫苑白石英微帶青色者右等分為末羯肺一具杏仁半斤去皮尖水煮肺爛為度去筋膜末與杏仁同研極細和衆藥後丸得成丸如梧桐子大陰乾每五七十丸至百丸不妨糯米飯飲下食後臨卧服一方有鍾乳粉扁豆散出經驗良方治久嗽或暴感咯血成肺痿吐白涎胸膈滿悶白扁豆五錢炒枇杷葉去毛皮半夏去皮臍生用人參各二錢半白茅根七分半右水三升生薑半片煎至一升入檳榔末一錢和勻分作四服不拘時候一方無白茅根阿膠散治久咳嗽及勞嗽阿膠二兩如無以黃明膠四兩代並炒人參半兩杏仁二十粒去皮尖雙仁炒微黃黃蜀葵花欵冬花各一兩甘草炙銼二分右為散每服二錢空心熱糯米飲調下晚食前再服木乳散出聖惠方治久嗽不瘥皂角樹白皮二兩塗酥炙黃貝母一兩炒微黃枳殼一兩麩炒去穰百合一兩麻黃一兩去根節甘草半兩炙微赤銼右為散每服三錢以水一盞入生薑半分煎至六分去渣溫服日進三四服紫蘇子丸治久咳嗽上氣不瘥紫蘇子一兩五味子一兩蘿蔔子一兩炒桑白皮一兩銼皂角三兩去黑皮塗酥炙黃甜葶藶二兩隔紙炒紫色右為細末蜜和搗二三百杵丸如梧桐子大每服以棗煮粥飲下二十丸日三四服川椒丸治積年咳嗽川椒一兩去目微炒芫花皮一兩去土代赭一兩細研桑白皮一兩銼欵冬花一兩紫苑一兩去苖土右為細末用煮熟精羊肉研爛和丸如梧桐子大每服以溫粥飲下二十丸定喘寧肺丸治男子女人久患咳嗽肺氣喘急倚息不得睡卧纍年不瘥漸至面目浮腫並宜治之半夏南星青黛白礬枯各一兩信半兩右為細末用生薑水麵糊丸如菉豆大每服十丸漸加至二十丸用茶清放冷送下清音丹出經驗良方治久年嗽聲乾人參二錢半桔梗知母玄胡索各半兩甘草四錢右為末煉蜜丸如龍眼核大綿裹卧時置口中使之自化異功散治久咳嗽陳粳米一升生薑半斤搗自然汁浸焙乾厚朴去粗皮塗生薑汁蜜炙二兩訶梨勒煨三枚小者檳榔銼一枚甘草半兩半生半炙銼右為末每服一錢米飲調下食後欵冬花散治久咳嗽欵冬花去梗阿膠炒各一兩天南星銼炒三分枳實炒一分甘草炙銼半兩右為散每服三錢水一盞煎至六分食後臨卧溫服欵冬花煎出千金方治新久咳嗽欵冬花乾薑末紫苑各三兩五味子一兩芫花一兩熬令赤右以水一斗煮三味取三升半去渣內芫花乾薑末加蜜二升合投湯中令調於銅器中微火煎令稠每服半棗許日三服麻黃湯出古今録驗治三十年寒冷嗽遂上氣麻黃八分去節蜀椒四分炒出汗細辛三分藁本二兩杏仁五十枚去皮尖雙仁研碎右切以水七升煮取三升分為三分服日三服忌生蔥菜麻黃湯出集驗良方治久患肺氣嗽發時奔喘坐臥不得并喉中呀呻欲絶方麻黃去節杏仁去皮尖雙仁研紫苑各三兩柴胡橘皮各四兩右切以水六升煮取二升半去渣分三分服一劑不瘥頻兩三劑一方無紫苑用乾紫蘇葉柏子仁丸出聖惠方治久嗽肌體虛羸不思飲食宜服此方柏子仁五靈脂一兩甜葶藶一兩隔紙炒令黃蝦蟇頭一枚燒灰杏仁一兩去皮尖雙仁炒右為細末煉蜜和丸如梧桐子大每服以溫粥飲下三十丸至聖真人全功飲出聖惠方治久新咳嗽痰盛氣喘肺痿瘦悴不能坐卧服藥無效者服之功減如年深日久連進取效欵冬花二兩去梗淨炒罌粟殼刮去皮淨肉并去蒂二兩用蜜少許陳皮一兩甘草一兩右四味一處微炒為粗末每服三錢水一盞入生薑三片烏梅二箇煎至八分去渣臨卧服之忌鹽醋酒麵酢等物神功散治久咳嗽雄黃欵冬花甘草肉桂各等分右為細末入雄黃勻每服半錢吸內咽喉中不拘時候金不換散出仁存方治男子女人肺胃虛寒久喘不已喘促滿悶咳嗽涎盛血脹滿腰背倦痛或虛勞冷嗽唾紅涎逺年近日一切喘嗽疾諸立效罌粟殼半兩製杏仁製甘草各三錢枳殼四錢右每服三錢水一盞半薑三片烏梅半箇煎七分去渣臨卧溫服杏仁散治多嗽金邦美傳杏仁去皮尖用半夏湯泡天南星生用甘草生用右等分為粗末每服四錢水一盞半棗二箇薑七片煎七分食後服杏參膏治咳嗽久而不已者人參杏仁去皮尖胡桃去皮柿霜去皮右將杏仁胡桃擂細入熟蜜用人參柿霜為丸彈子大每服一丸薑湯送下人參煎治積年咳嗽人參一兩􅌝􅌣取肉搗碎酥蜜各二兩右調勻盞子盛於飯上蒸九度每服一匙溫水化下日三服香䜴湯治三十年咳逆上氣咽喉如水雞鳴或唾膿血不能療者香䜴三升炒川椒一升炒出汗研乾薑一斤豬肪半斤右搗篩內肪藥中以水五升合䜴等物熟煎每二合服之大效紫苑煎丸療咳嗽積年不瘥者胸膈乾痛不利必效紫苑一兩杏仁四十九枚去雙仁皮尖炒酥一大合蜜一大合右紫苑杏仁合另搗先煮酥蜜攪令和內紫苑杏仁研破塊煎十餘沸藥成出置瓷器中每日空腹服一彈丸細細含之忌酒麵及豬肉等物甜葶藶丸治積年咳嗽肺氣不利喘急宜服此方自死黃一兩貝母一兩煨微黃亂髮半兩燒灰甜葶藶一兩隔紙炒紫右為末鎔蠟和丸如半棗大每夜綿裹一丸含咽下治嗽不瘥方出千金方兔屎四十九粒碙砂二分胡桐律一分右三味蜜丸如梧桐子大每服三十丸以粥飲下日三服吐冷物盡即瘥訶子飲治久嗽語聲不出訶子去核一兩杏仁一兩泡去皮尖通草二錢半右每服四錢水一盞半煨生薑切五片煎八分去渣溫服芫花煎治新久嗽芫花乾薑各二兩白蜜二升右為末內蜜中相和微火煎令如糜每服如棗核大一枚日三夜一以知為度欲利者多服以治冷飲嗽又治嗽者以水五升煮芫花取三升去渣內薑加蜜合煎如糜服之貝母丸治久嗽貝母去心炒紫色四兩欵冬花三兩紫苑去苖二兩右為末煉蜜和丸如梧桐子大每服三十丸食後生薑湯下香䜴丸治三十年咳嗽上氣方見本門咳嗽上氣類黑金散治久咳嗽喘息豬蹄合子黑者四十九箇水洗淨天南星大者一枚銼欵冬花帶水半兩右用瓶子一箇放鋪豬蹄合子在內上以南星肉蓋之合了鹽泥赤石脂固濟火煆白煙出為度候冷取出入欵冬花末并麝香一合龍腦少許同研每服一錢食後煎桑根白皮湯調下若年少即用生犀角中年即用羚羊角末各兩半代豬蹄合子療治咳嗽積年不瘥者胸膈乾痛不利必效出聖惠方莨菪二分以水淘去浮者水煮令牙出焙乾炒令黑色酥一雞子大大棗七枚右鐺中煎令酥盡取棗去皮食之日二治嗽不止者米殼一兩蜜炒黃甘草半兩炙五味子半兩半生半熟右為細末每服三錢水一盞杏仁七枚去皮尖同煎七分臨臥食後服治久咳諸藥不效北螺青一錢細研黃蠟一錢燈頭燒灰杏仁四十枚去皮炒右用軟柿一枚入藥在內用紙十數重包煨香熟臨睡時服治久咳嗽連四五十聲不止出千金方白蜜一斤生薑二斤取汁右先稱銅銚知斤兩訖內蜜復稱知數次內薑汁以微火煎薑汁盡惟有蜜斤兩在止旦服如棗大含一丸日三服禁一切雜食一方用熟湯調下阿膠飲一名膠䜴治久咳嗽經年不瘥者阿膠炙燥一兩用黃明膠人參二兩右為散每服三錢䜴湯一盞入蔥白少許同煎三沸放溫遇嗽時呷三五呷依前溫暖備嗽時再呷之療延年久咳不瘥豬腎一具去脂膜椒二十八顆開口者右取腎一顆上作十四孔每孔內椒兩顆內了二十八顆以水緩煮令熟割破細切噉之令盡有效治三十年久嗽方出千金方右用百部根二十斤搗取汁煎如飴服一方寸匕日三服又外臺方和飴一斤煎成以粥飲調下孫師方以白蜜二升更煎五六沸服三合白散子出三因方治年久咳嗽不愈者右用附子二枚煨熟新水浸一時久去皮臍焙乾為末每服一錢白砂蜜二錢水一盞煎七分通口服治久嗽上氣一二十年不瘥出本草右用伏翼塗翅足燒焦為末米飲調服即飛鼠又方出危氏方治榖氣素壯人久嗽即效罌粟殼一味淨去筋膜蜜炙為末每服用蜜湯下又方出危氐方治羸弱久嗽屢效右九尖拒霜葉為末用魚鮓蘸服又方出危氏方治久嗽漸成癆瘵右鳳尾草為末用魚鮓蘸服效又方出本草右用雌雞卵中白皮主久嗽結氣以麻黃紫苑和服之立效菜蔔方治積年上氣咳嗽多痰喘促唾膿血右用萊蔔子一合研煎湯食前服之又方出本草治老嗽右以鴝鵒或作羮食之亦得或搗為散白蜜和丸得治上件病取臘月臘日得者良有效非臘日得者不堪用黑馬蹄香散治久嗽方見哮厄類馬屁勃丸治久嗽右馬屁勃不拘多少細末煉蜜為丸如梧桐子大每服二十丸湯送下又方療咳嗽積年不瘥者胸膈乾痛不利右取莨菪子三指許吞咽之日五六度療人久嗽欲死右取厚榆皮削如指大去黑刻令如鋸長尺餘內喉中頻出入吐膿血即愈又方一名皂莢丸治咳嗽久不瘥神驗及治上氣時時唾濁右用皂莢五梃不蛀者去黑皮塗酥炙黃為末煉蜜和丸如梧桐子大每於食後用桑白皮湯下十丸一方以大棗膏和湯下又方一名吞煙法出聖惠方右用欵冬花一兩為細末煉蜜和丸如半棗大以綿裹一丸含咽津日四五服一方以火燒令煙出口含取煙咽之治諸嗽不已逺年日久桃仁炒杏仁炒知母貝母桑白皮右等分每服三錢水一盞煎至七分去渣服食後百部煎治咳嗽久不已生百部汁生地黃汁生薑汁蜜生百合汁如無以藕汁代各一盞棗四兩去皮核右熬成膏每服一匙麥門冬熟水一盞化開空心日午臨卧各一服治嗽不止方一名紫苑湯出百一選方兼治痰嗽喘急紫苑欵冬花各五錢百部二錢半右為散水一盞生薑三片烏梅一箇煎至七分去渣酒服食後臨卧煎服又欵冬花渣無風處點火吸咽一方不用酒治咳嗽欵冬花石膏即寒水石火煆薄荷桂皮右等分為細末用蘆筒吸進夜服忌酒胡椒煎炒醎等物治老嗽出本草取故茅屋上塵多年煙火者不用茅拂取上塵和石膏欵冬花婦人月經衣服帶為末以水和塗於茅上待乾內竹筒子中燒一頭以口吸之入咽喉數數咽之無不瘥也治久嗽不愈肺間積虛熱久則成瘡故嗽出膿血曉夜不止喉中氣塞胸膈噎痛出本草蛤蚧阿膠生犀角鹿角膠羚羊角各二兩右除膠外皆為屑次入膠分四服用河水三升於銀石器中慢火煮至半升濾去渣臨卧細細呷之後服盡其渣再槌都作一服水三升煎至半升如前服若病人久虛水當遞減張刑部子臯病久田樞密施送此方遂愈杏仁湯出朱氏集驗方治積年咳嗽阿膠蛤粉炒罌粟殼蜜炙白礬杏仁去皮尖右等分四味粗末三錢水一盞薑三片棗一枚蔥白三寸煎六分臨臥少頃喚醒始服此藥治久嗽方欵冬花蘂人參北五味子紫苑桑白皮或加胡桃肉杏仁松子别研各等分右成末煉蜜作膏入生薑自然汁少許時時含化以潤之杏仁膏出衛生家寶方治久嗽不止肺氣滿急獖豬胰一箇研杏仁半兩去皮尖蕤仁半兩去殼貝母半兩為末右爛研細用新瓦瓶盛以黃蠟一分蓋面上於甑上蒸令熟逐時服之訶子飲治久嗽語聲不出訶子三兩去核生薑一兩煨熟燈心半兩右一處每服五錢用水一升煎取半升空心隨意服之阿膠飲子出聖惠方治榮衛俱虛久嗽不止發熱自汗氣短忪倦怠食少人參白术當歸乾地黃芎藭芍藥甘草麥門冬五味子桑白皮茯苓各半兩阿膠一兩右搗篩為飲子每服五錢以水一盞半薑五片同煎至七分去渣溫服不拘時薑餳煎出必效方治咳嗽多年不瘥者胸膈乾痛不利生薑五兩餳半斤右二味取薑刮去皮如棗子切之置餳中微火煎薑使熟服之普濟方卷一百五十九
