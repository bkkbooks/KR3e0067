body:
  text: 普濟方卷一百五十九明周王朱橚撰咳𠻳門冷𠻳論夫形寒飲冷内外合邪因而客之則為肺𠻳𠻳主氣外合皮毛其經還循胃口故内外得寒皆能傷之而為冷𠻳其後呼吸氣寒口如飲氷雪嘔唾冷沫胸中急痛晝夜甚得温止遇寒即發是也方五味子湯治肺感寒咳𠻳不止五味子炒人參黄耆剉阿膠炒令燥桂去粗皮乾熟地黄焙各半兩紫苑去苖土乾薑炮製杏仁湯浸去皮尖雙仁炒各一兩白术紫蘇葉各一分半右為散每服三錢氷一盞煎七分去滓温服不拘時日三服中和湯治肺有寒風痰壅咳𠻳麻黄去節杏仁去皮尖炒紫蘇子炒赤茯苓去皮柴胡去蘆陳皮去白各半兩欵冬花三分細辛甘草炙馬兜鈴各一分右㕮咀每服二錢水一盞煎七分去渣温服肺寒湯治肺胃虚寒咳𠻳痰盛呀呷有聲嘔吐停飲咽喉乾痛上氣喘滿目寒浮自汗惡風語聲嘶破皆寒中冷心下悸動噦逆惡心全不入食欵冬花紫苑去土甘草炙桂心去粗皮麻黄去節五味子杏仁湯浸去皮尖炒半夏湯煮焙乾各二兩細辛去苖葉一兩乾薑炮二兩右為散每服三錢水一盞生薑五片大棗三枚同煎七分去渣温服不計時候欵冬花散治寒壅相交肺氣不利咳𠻳喘滿胸膈煩悶痰實涎盛喉中吁呻鼻塞清涕頭目眩暈肢體倦疼咽嗌腫痛欵冬花去梗知母桑葉洗焙各十兩半夏湯洗七次薑汁製甘草各二十兩麻黄去節根阿膠碎炒如珠子杏仁去皮尖麩炒貝母去心麩炒各二十兩右為末每服二錢水一盞姜三片煎七分去渣食後一方用桑白皮無葉加味理中湯治胃肺俱寒咳𠻳不已甘草半夏炙茯苓生薑不炒白术橘紅細辛北五味子人參各等分右㕮咀每服三錢薑水一盞薑棗煎食前服曾經解利者通用胡椒理中丸治寒𠻳冷痰吐白涎沫續續不止不能飲食治肺虚感寒氣不通宣咳𠻳喘急胸膈氣悶不進飲食嘔吐涎水欵冬花去梗胡椒蓽撥陳皮乾薑甘草良薑細辛去葉各二兩白术二兩半右為末蜜丸如梧桐子大每服十丸温湯米飲任下不拘時酒下亦得杏仁煎出千金方治冷氣鼻中不利杏仁五合五味子欵冬花各三兩紫苑乾薑各一兩桂心三兩甘草四兩麻黄一斤右以水一斗煮麻黄取四升諸藥為末又内膠飴半斤白蜜一斤合用汁中攪令相得煎如飲先食服如半棗許日三服不知加之知為度橘皮湯療春秋傷寒秋夏冷濕咳𠻳喉中作聲上氣不得下頭疼陳皮紫苑麻黄去根杏仁當歸桂心甘草黄芩各等分右㕮咀每服五錢水煎乾薑湯治冷𠻳乾薑二兩炮製紫苑去苖土半兩麻黄去節二兩杏仁去皮尖雙仁麩炒三十枚甘草炙剉一兩五味子半兩右㕮咀如麻豆每服五錢水一盞半煎八分去渣温服日三華盖散治肺感寒邪咳𠻳上氣胸膈煩懣脊背俱急聲重鼻塞頭昏目眩痰氣不利呀呻有聲喘促不得睡卧不出者紫蘇子炒赤茯苓去皮桑白皮炙陳皮去白杏仁去皮尖炒麻黄去根節各一兩右為末每服二錢水一盞煎七分去渣温服食後隨意加製半夏及生薑煎亦得温肺湯治冐寒咳𠻳清涕自流麻黄不去節杏仁不去尖甘草生用桂枝微炒去皮薑炮各半兩五味子細辛去葉各一兩右㕮咀每服二錢水一盞半薑五片葱白五寸煎七分熱服阿膠湯治冷𠻳阿膠炒令燥五味子麻黄去節陳橘皮湯浸去白焙各一兩甘草炙杏仁湯浸去皮尖雙仁炒各半兩右為散每服三錢水一盞生薑三片煎至七分去渣温服不拘時候五味子湯出三因方治夏秋之交皮膚為寒濕所薄寒氣内坼咳𠻳晝夜不已陳皮二兩麻黄去節甘草炙杏仁去皮尖麩炒五味子白茯苓各一兩右為末每服三錢水一盞煎七分去渣帶熱服食後臨卧日三服一方有桂半兩加減麻黄湯辣桂甘草炙各半兩杏仁五十枚去皮尖微炒白研陳皮半夏製各兩半右細剉拌和杏仁每三錢紫蘇三葉薑四片煎服細辛散治肺寒咳𠻳喘滿細辛去苖葉甘草炙剉五味子各三兩赤茯苓去黑皮乾薑炮製三分右為散每服二錢沸湯㸃服日三服五辛丸出醫學切問治寒𠻳聲音不出丁香胡椒蓽撥良薑桂心各等分右為細末入炒鹽少許薑汁煮糊為丸雞頭子大每服三丸含化或細嚼熱水下亦得五抝湯治感寒咳𠻳肺氣喘急麻黄不去節杏仁不去皮甘草生用荆芥穂各等分桔梗一錢右生薑三片同煎温服咽喉痛甚者煎熟加厚朴梢少許一方去桔梗荆芥用半夏枳實等分四順散治肺寒咳𠻳乾薑炮製甘草炙剉陳橘皮湯浸去白穰焙杏仁湯浸去皮尖雙仁炒别研右各等分除杏仁外搗羅為末杏仁再研勻每服一錢以沸湯㸃服空心食前日三服鍾乳湯出余居士選竒方治虚冷𠻳痰盛等症鍾乳粉半夏炮天南星炮各一兩滑石三錢别研右將半夏南星為細末和鍾乳粉滑石令勻每服三錢生薑十片水二盞煎至八分食前温服如受虚熱人以此藥下黒餳丹五十丸或四神丹二十粒無不效者更有酌量紹興劉駐泊名汝翼客中逺年近六十素虚弱服此取效理中丸一名順味丸出直指方補肺止寒𠻳人參乾薑白术甘草炙各等分右為末煉蜜丸彈子大每一丸加炒阿膠五味子煎服金不換丸出經騐良方治大人小兒經久寒𠻳化痰天南星半炮半生半夏半炮半生白礬半炮半生皁角半燒半生去皮右等分為末生薑汁煮糊為丸每服二十丸淡薑湯送下杏仁丸治冷𠻳呼吸氣寒嘔吐冷涎胸中不利急痛杏仁一升去皮尖雙仁炒黄生薑一斤去皮切片曝乾陳橘皮湯浸去白焙五兩右為末煉蜜和丸如梧桐子大每服二十丸至三十丸温酒送下不拘時候又方出宣明論治諸寒𠻳麻黄四兩官桂一兩䗶一錢右為末以䗶同煎每服一二錢温服薑飴煎一名含化膏出千金方治冷𠻳乾薑炮裂三兩為細末膠飴一斤右拌勻以瓦器盛置飯上蒸令極熟每服一棗大含化嚥津日五夜三川薑丸出經效濟方治寒𠻳右用川薑炮過為細末鎔餳為丸如彈子大含化之得於郭英達云其效如神後用之果然温脾湯出百一選方治肺寒氣咳𠻳聲重多涕發喘麻黄去節一兩五味子杏仁去皮尖炒甘草炙桂各半兩右每服三錢水一盞薑五片煎七分去渣食後服又一方用陳皮去桂名益肺散喘甚加馬兜鈴桑白皮夏月減麻黄壬子年春時行此疾姚知縣克温名延衮去浙東得此方二服即愈因以見傳家間患此者服之皆驗鍾乳散出朱氏集驗方治寒𠻳不止鍾乳粉人參阿膠炒右等分為末糯米飲下參芎湯治男子婦人一切虚症冷𠻳人參川芎甘草炙白术白茯苓芍藥白豆䓻炒當歸酒浸焙黄耆蜜炙肉桂去皮各半兩罌粟殻蜜炙五味子各一兩右每服三錢生薑三片棗二枚水一盞半煎八分去渣空心服湘中黄應名三世用之有效欵肺散出王氏博濟方治寒濕相交咳𠻳不止胸膈悶亂痰涎併多麻黄二兩去根節炒貝母去心炒桑白皮各一兩炒剉柴胡一兩半去蘆炒杏仁一兩去皮尖炒欵冬花一兩去塵炒糯米一兩右七味新好者杵為末每服一二錢水一盞煎七分温服不計時候平肺湯出本草治寒𠻳平肺氣人參五味子黄耆白茯苓杏仁桂各一兩麻黄二錢右並剉碎每服二錢以水一盞煎至七分食後臨臥細熱呷五味子湯出朱氏集驗方治寒𠻳益脾五味子胡桃肉各一兩半生薑五兩去皮甘草杏仁各一兩右將五味子四味於鉢中爛研加甘草末再研令得所入甆合中取沸湯調服加人參尤妙治冷𠻳以櫚木煮汁熱服治上氣冷𠻳以欄藤根煮服之熱𠻳論夫熱𠻳之狀𠻳而少涎由邪熱熏於焦客於肺經使津液内燥𫝊於咽嗌喉嚨不利隨其呼吸而咳𠻳也肺主於氣氣為陽陽盛則生熱也皆臟腑不調經絡痞澁邪尅於焦道不利痰食積聚胸中煩滿故令咳𠻳也方清肺飲治肺上熱咳𠻳前胡荆芥桑白皮炒甘草炙枳殻製各三分知母貝母去心炒薄荷赤茯苓北桔紫蘇阿膠炒杏仁去皮天門冬去心焙半兩右剉每服三錢薑三片烏梅半箇食後煎服清肺丸治心肺伏熱咳𠻳煩悶有涎痰喉中介介咽嗌不利氣不宣暢並宜服之木香青黛研蛤粉前胡人參去蘆頭黄連各半兩桔梗微炒枳殻麩炒去根薄荷半夏湯洗七次天南星各一兩大黄生牽牛微炒各二兩右為細末滴水和丸如梧桐子大每服五十丸食後生薑湯下麥門冬煎治暴熱咳𠻳心胸煩悶口苦乾燥上焦壅滯並宜服之生門冬汁四合生地黄一升酥三合生薑汁白砂糖三合白蜜五合貝母二兩微炒黄五味子二兩赤茯苓二兩射干一兩半杏仁二兩湯浸去皮尖雙仁㣲炒研入膏右先搗羅貝母等四味末入麥門冬汁杏仁膏等於銀鍋内都攪令均以慢火煎成膏收不津器中不計時候取一茶匙含化嚥津天門冬丸治肺氣暴熱咳𠻳心胸不利或時煩喘天門冬去心焙二兩射干桂去粗皮𤣥參逺志去心各半兩黄耆剉三分杏仁去皮尖雙仁㣲炒栝蔞根百部紫苑去苖土馬兜鈴各一兩右為末煉蜜和搗三二百杵丸如梧桐子大每服二十丸温水下不拘時候四五服百部丸治肺氣熱𠻳胸膈煩悶百部黄耆剉杏仁去皮尖雙仁㣲炒各一兩天門冬去心焙栝蔞根各五兩桂去粗皮一兩一分𤣥參二兩半紫苑去苖土馬兜鈴紫蘇幷莖各四兩右為末煉蜜和丸如梧桐子大每服十五丸食後煎烏梅生甘草温湯下百部湯治熱咳𠻳氣滿喘急百部百合桑白皮根剉柴胡去苖枳殻去穰麩炒木通剉各一兩赤芍藥郁李仁去皮炒赤茯苓去黑皮各三兩甘草炙剉半兩右為散每服五錢水一盞半生薑一片棗三個水煎至七分去渣温服不拘時候地黄湯治咳𠻳大便不通生熟地黄焙三分麻黄去根節煎掠去末焙黄芩去黒心升麻赤茯苓去黑皮龍膽去土大黄剉炒黄連去鬚桑白皮根剉炒各半兩甘草炙剉一分右為散每服三錢水一盞煎至七分去渣服以利為度紫苑散治暴熱咳𠻳氣促背膊勞痛飲食減少紫苑一兩去苖土麥門冬一兩去心川升麻木通一兩半炒子苓一兩前胡一兩半去蘆土赤茯苓二兩甘草三分炙赤剉貝母一兩炒微黄大腹皮一兩右為散每服五錢水一盞入生薑半分煎六分去渣不計時候温服栝蔞丸治風熱咳𠻳痰涎壅盛頭目不利鼻塞不通栝蔞一大枝剉去節天南星炮半夏湯洗七次細辛去葉土防風去蘆頭當歸洗焙寒水石白礬各半兩右件除栝蔞外餘七味為末入在栝蔞内用紙數幅𦂳裹於飰上蒸兩次後再於新瓦上焙乾碾為細末醋糊為丸如菉豆大每服三十丸生薑蜜湯送下食後柴胡散治肺暴熱大便不通時咳𠻳喘息促急柴胡一兩去苖甘草半兩炙赤剉桑白皮一兩剉鱉甲一兩醋炙黄去裙襴梹榔一兩旋覆花半兩川大黄二兩剉炒桔梗一兩去蘆右為散每服五錢水一盞入生薑半分煎五分去渣放温不拘時候服之金沸散治上壅熱𠻳聲重方見本門傷風咳𠻳類阿膠丸治咳熱止𠻳阿膠炒令燥三分丹砂研半兩硇砂研一分人參三分甘草炙剉半兩龍腦硏三錢右為細末煉蜜和丸如梧桐子大每服一丸含化不拘時候華盖湯治上喘咳𠻳兼治膈熱一名華盖散桑白皮剉陳麴炒桔梗炒各一分人參百合各三分甘草炙剉杏仁去皮尖雙仁炒各半兩右為散每服二錢水一盞煎六分食後温服一方用半夏半兩阿膠丸治風熱去涎利膈鎮心順肺阿膠炒令燥三分人參赤茯苓去黒皮各半兩天南星虀汁煮輭切焙二錢丹砂另研一兩甘草炙剉半兩龍腦另研二錢右搗研令細再同丹砂龍腦研勻煉蜜和丸如梧桐子大小兒一丸大人兩丸食後細嚼荆芥湯下牛黄丸潤心肺止咳𠻳解風熱牛黄半兩人參赤茯苓去黒皮各一兩半蛤蚧酥炙一分阿梨勒皮三兩杏仁湯浸去皮尖雙仁另研一兩甘草生一分右為末煉蜜䗶同丸如雞頭實大每服一丸含化嚥津生地黄煎治心肺暴熱咳𠻳不止生地黄汁五合生薑汁