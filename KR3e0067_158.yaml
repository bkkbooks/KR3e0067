body:
  text: 普濟方卷一百五十九明周王朱橚撰咳嗽門冷嗽論夫形寒飲冷內外合邪因而客之則為肺嗽嗽主氣外合皮毛其經還循胃口故內外得寒皆能傷之而為冷嗽其後呼吸氣寒口如飲氷雪嘔唾冷沫胸中急痛晝夜甚得溫止遇寒即發是也方五味子湯治肺感寒咳嗽不止五味子炒人參黃耆銼阿膠炒令燥桂去粗皮乾熟地黃焙各半兩紫苑去苖土乾薑炮製杏仁湯浸去皮尖雙仁炒各一兩白术紫蘇葉各一分半右為散每服三錢氷一盞煎七分去滓溫服不拘時日三服中和湯治肺有寒風痰壅咳嗽麻黃去節杏仁去皮尖炒紫蘇子炒赤茯苓去皮柴胡去蘆陳皮去白各半兩欵冬花三分細辛甘草炙馬兜鈴各一分右㕮咀每服二錢水一盞煎七分去渣溫服肺寒湯治肺胃虛寒咳嗽痰盛呀呷有聲嘔吐停飲咽喉乾痛上氣喘滿目寒浮自汗惡風語聲嘶破皆寒中冷心下悸動噦逆惡心全不入食欵冬花紫苑去土甘草炙桂心去粗皮麻黃去節五味子杏仁湯浸去皮尖炒半夏湯煮焙乾各二兩細辛去苖葉一兩乾薑炮二兩右為散每服三錢水一盞生薑五片大棗三枚同煎七分去渣溫服不計時候欵冬花散治寒壅相交肺氣不利咳嗽喘滿胸膈煩悶痰實涎盛喉中吁呻鼻塞清涕頭目眩暈肢體倦疼咽嗌腫痛欵冬花去梗知母桑葉洗焙各十兩半夏湯洗七次薑汁製甘草各二十兩麻黃去節根阿膠碎炒如珠子杏仁去皮尖麩炒貝母去心麩炒各二十兩右為末每服二錢水一盞薑三片煎七分去渣食後一方用桑白皮無葉加味理中湯治胃肺俱寒咳嗽不已甘草半夏炙茯苓生薑不炒白术橘紅細辛北五味子人參各等分右㕮咀每服三錢薑水一盞薑棗煎食前服曾經解利者通用胡椒理中丸治寒嗽冷痰吐白涎沫續續不止不能飲食治肺虛感寒氣不通宣咳嗽喘急胸膈氣悶不進飲食嘔吐涎水欵冬花去梗胡椒蓽撥陳皮乾薑甘草良薑細辛去葉各二兩白术二兩半右為末蜜丸如梧桐子大每服十丸溫湯米飲任下不拘時酒下亦得杏仁煎出千金方治冷氣鼻中不利杏仁五合五味子欵冬花各三兩紫苑乾薑各一兩桂心三兩甘草四兩麻黃一斤右以水一斗煮麻黃取四升諸藥為末又內膠飴半斤白蜜一斤合用汁中攪令相得煎如飲先食服如半棗許日三服不知加之知為度橘皮湯療春秋傷寒秋夏冷濕咳嗽喉中作聲上氣不得下頭疼陳皮紫苑麻黃去根杏仁當歸桂心甘草黃芩各等分右㕮咀每服五錢水煎乾薑湯治冷嗽乾薑二兩炮製紫苑去苖土半兩麻黃去節二兩杏仁去皮尖雙仁麩炒三十枚甘草炙銼一兩五味子半兩右㕮咀如麻豆每服五錢水一盞半煎八分去渣溫服日三華蓋散治肺感寒邪咳嗽上氣胸膈煩悶脊背俱急聲重鼻塞頭昏目眩痰氣不利呀呻有聲喘促不得睡卧不出者紫蘇子炒赤茯苓去皮桑白皮炙陳皮去白杏仁去皮尖炒麻黃去根節各一兩右為末每服二錢水一盞煎七分去渣溫服食後隨意加製半夏及生薑煎亦得溫肺湯治冒寒咳嗽清涕自流麻黃不去節杏仁不去尖甘草生用桂枝微炒去皮薑炮各半兩五味子細辛去葉各一兩右㕮咀每服二錢水一盞半薑五片蔥白五寸煎七分熱服阿膠湯治冷嗽阿膠炒令燥五味子麻黃去節陳橘皮湯浸去白焙各一兩甘草炙杏仁湯浸去皮尖雙仁炒各半兩右為散每服三錢水一盞生薑三片煎至七分去渣溫服不拘時候五味子湯出三因方治夏秋之交皮膚為寒濕所薄寒氣內坼咳嗽晝夜不已陳皮二兩麻黃去節甘草炙杏仁去皮尖麩炒五味子白茯苓各一兩右為末每服三錢水一盞煎七分去渣帶熱服食後臨卧日三服一方有桂半兩加減麻黃湯辣桂甘草炙各半兩杏仁五十枚去皮尖微炒白研陳皮半夏製各兩半右細銼拌和杏仁每三錢紫蘇三葉薑四片煎服細辛散治肺寒咳嗽喘滿細辛去苖葉甘草炙銼五味子各三兩赤茯苓去黑皮乾薑炮製三分右為散每服二錢沸湯點服日三服五辛丸出醫學切問治寒嗽聲音不出丁香胡椒蓽撥良薑桂心各等分右為細末入炒鹽少許薑汁煮糊為丸雞頭子大每服三丸含化或細嚼熱水下亦得五拗湯治感寒咳嗽肺氣喘急麻黃不去節杏仁不去皮甘草生用荆芥穗各等分桔梗一錢右生薑三片同煎溫服咽喉痛甚者煎熟加厚朴梢少許一方去桔梗荆芥用半夏枳實等分四順散治肺寒咳嗽乾薑炮製甘草炙銼陳橘皮湯浸去白穰焙杏仁湯浸去皮尖雙仁炒别研右各等分除杏仁外搗羅為末杏仁再研勻每服一錢以沸湯點服空心食前日三服鍾乳湯出余居士選竒方治虛冷嗽痰盛等症鍾乳粉半夏炮天南星炮各一兩滑石三錢别研右將半夏南星為細末和鍾乳粉滑石令勻每服三錢生薑十片水二盞煎至八分食前溫服如受虛熱人以此藥下黑餳丹五十丸或四神丹二十粒無不效者更有酌量紹興劉駐泊名汝翼客中逺年近六十素虛弱服此取效理中丸一名順味丸出直指方補肺止寒嗽人參乾薑白术甘草炙各等分右為末煉蜜丸彈子大每一丸加炒阿膠五味子煎服金不換丸出經驗良方治大人小兒經久寒嗽化痰天南星半炮半生半夏半炮半生白礬半炮半生皂角半燒半生去皮右等分為末生薑汁煮糊為丸每服二十丸淡薑湯送下杏仁丸治冷嗽呼吸氣寒嘔吐冷涎胸中不利急痛杏仁一升去皮尖雙仁炒黃生薑一斤去皮切片曝乾陳橘皮湯浸去白焙五兩右為末煉蜜和丸如梧桐子大每服二十丸至三十丸溫酒送下不拘時候又方出宣明論治諸寒嗽麻黃四兩官桂一兩蠟一錢右為末以蠟同煎每服一二錢溫服薑飴煎一名含化膏出千金方治冷嗽乾薑炮裂三兩為細末膠飴一斤右拌勻以瓦器盛置飯上蒸令極熟每服一棗大含化咽津日五夜三川薑丸出經效濟方治寒嗽右用川薑炮過為細末鎔餳為丸如彈子大含化之得於郭英達云其效如神後用之果然溫脾湯出百一選方治肺寒氣咳嗽聲重多涕發喘麻黃去節一兩五味子杏仁去皮尖炒甘草炙桂各半兩右每服三錢水一盞薑五片煎七分去渣食後服又一方用陳皮去桂名益肺散喘甚加馬兜鈴桑白皮夏月減麻黃壬子年春時行此疾姚知縣克溫名延衮去浙東得此方二服即愈因以見傳家間患此者服之皆驗鍾乳散出朱氏集驗方治寒嗽不止鍾乳粉人參阿膠炒右等分為末糯米飲下參芎湯治男子婦人一切虛症冷嗽人參川芎甘草炙白术白茯苓芍藥白豆䓻炒當歸酒浸焙黃耆蜜炙肉桂去皮各半兩罌粟殼蜜炙五味子各一兩右每服三錢生薑三片棗二枚水一盞半煎八分去渣空心服湘中黃應名三世用之有效欵肺散出王氏博濟方治寒濕相交咳嗽不止胸膈悶亂痰涎併多麻黃二兩去根節炒貝母去心炒桑白皮各一兩炒銼柴胡一兩半去蘆炒杏仁一兩去皮尖炒欵冬花一兩去塵炒糯米一兩右七味新好者杵為末每服一二錢水一盞煎七分溫服不計時候平肺湯出本草治寒嗽平肺氣人參五味子黃耆白茯苓杏仁桂各一兩麻黃二錢右並銼碎每服二錢以水一盞煎至七分食後臨臥細熱呷五味子湯出朱氏集驗方治寒嗽益脾五味子胡桃肉各一兩半生薑五兩去皮甘草杏仁各一兩右將五味子四味於鉢中爛研加甘草末再研令得所入瓷合中取沸湯調服加人參尤妙治冷嗽以櫚木煮汁熱服治上氣冷嗽以欄藤根煮服之熱嗽論夫熱嗽之狀嗽而少涎由邪熱熏於焦客於肺經使津液內燥傳於咽嗌喉嚨不利隨其呼吸而咳嗽也肺主於氣氣為陽陽盛則生熱也皆臟腑不調經絡痞澀邪尅於焦道不利痰食積聚胸中煩滿故令咳嗽也方清肺飲治肺上熱咳嗽前胡荆芥桑白皮炒甘草炙枳殼製各三分知母貝母去心炒薄荷赤茯苓北桔紫蘇阿膠炒杏仁去皮天門冬去心焙半兩右銼每服三錢薑三片烏梅半箇食後煎服清肺丸治心肺伏熱咳嗽煩悶有涎痰喉中介介咽嗌不利氣不宣暢並宜服之木香青黛研蛤粉前胡人參去蘆頭黃連各半兩桔梗微炒枳殼麩炒去根薄荷半夏湯洗七次天南星各一兩大黃生牽牛微炒各二兩右為細末滴水和丸如梧桐子大每服五十丸食後生薑湯下麥門冬煎治暴熱咳嗽心胸煩悶口苦乾燥上焦壅滯並宜服之生門冬汁四合生地黃一升酥三合生薑汁白砂糖三合白蜜五合貝母二兩微炒黃五味子二兩赤茯苓二兩射干一兩半杏仁二兩湯浸去皮尖雙仁微炒研入膏右先搗羅貝母等四味末入麥門冬汁杏仁膏等於銀鍋內都攪令均以慢火煎成膏收不津器中不計時候取一茶匙含化咽津天門冬丸治肺氣暴熱咳嗽心胸不利或時煩喘天門冬去心焙二兩射干桂去粗皮玄參逺志去心各半兩黃耆銼三分杏仁去皮尖雙仁微炒栝蔞根百部紫苑去苖土馬兜鈴各一兩右為末煉蜜和搗三二百杵丸如梧桐子大每服二十丸溫水下不拘時候四五服百部丸治肺氣熱嗽胸膈煩悶百部黃耆銼杏仁去皮尖雙仁微炒各一兩天門冬去心焙栝蔞根各五兩桂去粗皮一兩一分玄參二兩半紫苑去苖土馬兜鈴紫蘇並莖各四兩右為末煉蜜和丸如梧桐子大每服十五丸食後煎烏梅生甘草溫湯下百部湯治熱咳嗽氣滿喘急百部百合桑白皮根銼柴胡去苖枳殼去穰麩炒木通銼各一兩赤芍藥郁李仁去皮炒赤茯苓去黑皮各三兩甘草炙銼半兩右為散每服五錢水一盞半生薑一片棗三個水煎至七分去渣溫服不拘時候地黃湯治咳嗽大便不通生熟地黃焙三分麻黃去根節煎掠去末焙黃芩去黑心升麻赤茯苓去黑皮龍膽去土大黃銼炒黃連去鬚桑白皮根銼炒各半兩甘草炙銼一分右為散每服三錢水一盞煎至七分去渣服以利為度紫苑散治暴熱咳嗽氣促背膊勞痛飲食減少紫苑一兩去苖土麥門冬一兩去心川升麻木通一兩半炒子苓一兩前胡一兩半去蘆土赤茯苓二兩甘草三分炙赤銼貝母一兩炒微黃大腹皮一兩右為散每服五錢水一盞入生薑半分煎六分去渣不計時候溫服栝蔞丸治風熱咳嗽痰涎壅盛頭目不利鼻塞不通栝蔞一大枝銼去節天南星炮半夏湯洗七次細辛去葉土防風去蘆頭當歸洗焙寒水石白礬各半兩右件除栝蔞外餘七味為末入在栝蔞內用紙數幅緊裹於飰上蒸兩次後再於新瓦上焙乾碾為細末醋糊為丸如菉豆大每服三十丸生薑蜜湯送下食後柴胡散治肺暴熱大便不通時咳嗽喘息促急柴胡一兩去苖甘草半兩炙赤銼桑白皮一兩銼鱉甲一兩醋炙黃去裙襴檳榔一兩旋覆花半兩川大黃二兩銼炒桔梗一兩去蘆右為散每服五錢水一盞入生薑半分煎五分去渣放溫不拘時候服之金沸散治上壅熱嗽聲重方見本門傷風咳嗽類阿膠丸治咳熱止嗽阿膠炒令燥三分丹砂研半兩硇砂研一分人參三分甘草炙銼半兩龍腦研三錢右為細末煉蜜和丸如梧桐子大每服一丸含化不拘時候華蓋湯治上喘咳嗽兼治膈熱一名華蓋散桑白皮銼陳麴炒桔梗炒各一分人參百合各三分甘草炙銼杏仁去皮尖雙仁炒各半兩右為散每服二錢水一盞煎六分食後溫服一方用半夏半兩阿膠丸治風熱去涎利膈鎮心順肺阿膠炒令燥三分人參赤茯苓去黑皮各半兩天南星虀汁煮軟切焙二錢丹砂另研一兩甘草炙銼半兩龍腦另研二錢右搗研令細再同丹砂龍腦研勻煉蜜和丸如梧桐子大小兒一丸大人兩丸食後細嚼荆芥湯下牛黃丸潤心肺止咳嗽解風熱牛黃半兩人參赤茯苓去黑皮各一兩半蛤蚧酥炙一分阿梨勒皮三兩杏仁湯浸去皮尖雙仁另研一兩甘草生一分右為末煉蜜蠟同丸如雞頭實大每服一丸含化咽津生地黃煎治心肺暴熱咳嗽不止生地黃汁五合生薑汁