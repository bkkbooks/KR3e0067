去子五靈脂各一兩巴豆霜一分阿魏五錢麩裹煨右為末煉蜜丸菉豆大每服五丸生薑湯下未效再服牽牛子丸治臟腑壅滯心腹氣悶宿食不消腰脇疼痛大腸祕澀牽牛子十兩取末六兩木香五錢青橘皮湯浸去白焙五錢檳榔五錢右為末與牽牛子末和勻煉蜜杵丸梧桐子大每服二十丸食前温酒下一方醋糊為丸米飲下薑湯亦可治大便難醬清三升麻油二升葱白三寸右合煮令黑去滓待冷頓服一方不用醬清葳靈仙丸治年髙氣衰大便祕結黄耆蜜炙枳實葳靈仙各等分右為末蜜丸梧桐子大每服五七丸薑湯熱水下一方用防風忌茶大黄通格丸黑牽牛大黄木通各五錢各另取末右闕摩臍方治大便不通腹脹杏仁湯浸去皮尖雙仁者三七枚生用葱白三莖去鬚禁切鹽一分右研如膏每服取如酸棗大許塗手心摩臍上三百轉須臾即利不止以冷水洗手即定腸結方治病後津液燥少大便不通猪膽一枚取汁沙糖少許糯米二合燒灰存性研細右研如膏以少許入下部立通治大便不通或熱結或風閉及婦人産後大便不通皂筴二挺去皮炙令黄為末白梅肉五枚蜜少許右將白梅肉與蜜拌和皂角末如棗大以綿裹引内下部中須臾即通穿腸湯治大便七八日不通服諸藥未效者猪膽一枚取汁蜜二兩膩粉一錢右煮可丸入膩粉捏如中指長内下部立通濡臟湯治大便不通六七日腹中有燥糞寒熱反廹短氣闕汗腹滿生葛根二錢猪膏二錢大黄一兩右㕮咀水五升煎二升去滓入膏煎三沸澄清强人頻服瘦人再服亦治大小便不通猪膽導方治大便六七日不通奔氣上衝用雄猪膽一枚繫口頭内下部漸解開頭倒瀉入肛門須臾即通利枳殻丸治大腸結實枳殻麩炒去穰川大黄剉炒川芒硝各一兩右為末煉蜜丸梧桐子大食前生薑湯下三十丸治大便卒不通澀結吳茱萸生五十粒梔子十四枚川朴硝一兩右水一大盞煎至六分去滓下朴硝空心分三服治上氣大便祕澀杏仁五兩去雙仁皮尖熬印成鹽三兩乾薑三兩右搗篩以醬汁和之令稀稠相得可長一寸餘如指大兩頭尖仍以薄綿裹之於風日中曝令少乾内下部中時時易之不過一易即有惡物下氣上即定亦下食内藥痛時忍少頃如深内少頃亦不甚痛急出時物即出待痛定之後即得便利特出膿及惡物多大便不澀停之治大便不通菖蒲石鹽末各一兩右相和取半匙和烏麻脂少許綿裹内下部即通治大便難醬清烏梅右將醬清漬烏梅灌下部中又方桑根白皮榆根白皮各一握右㕮咀水三升煮取一升半分三服又方猪脂一兩葵子一兩五錢右將葵子為末猪脂和丸毎服十丸温水服一方水三升煮取一升空心服又方葵子牛酥各一升猪脂亦可右水四升煮葵子取一升内酥煮一沸待冷分作二分又方葵子汁乳汁右等分和服之立出一方單用葵根汁生服治大便祕塞不通猪膽羊膽右用猪羊膽闕灌三合許令深入即出矣出不盡須臾更灌一方加冬葵子汁和之妙又椒䜴湯五升和猪膏三合灌之佳臨時易可得即用之又無灰濃酒半升鹽三錢煉成如上法紫蘇麻仁粥順氣滑大便男婦皆可用體虚之人風祕結燥服之皆得力紫蘇子麻子仁各不拘多少右研爛水濾取汁煮粥食之風科集驗方許學士云常有一貴人母年八十四歲或腹痛頭疼惡心不能食藥醫家供補脾進食治風清頭目藥疾數月益甚懇予辦之予曰悞矣此老人風祕臟腑壅滯聚膈中則腹脹惡心不喜食至顛頭痛神昏如得臟腑暢諸疾悉去予進蘇麻粥而氣洩下結糞十餘塊少間通利諸證悉除牛黄散治上焦積熱臟腑祕結大黄一兩白牽牛頭末五錢右為末有厥冷用酒調下三錢無厥冷手足煩蜜湯調下小提盆散治大便燥結服轉藥久不通竈突墨一錢滄鹽三錢右研勻竹筒吹一錢肛門内立透治大便不通當歸香白芷各等分右為末每服二錢温米飲湯調下葱白散治老人及虚人大便不通葱白三莖阿膠一片右以水煎葱候熱不用却入阿膠鎔開温服一方用蜜二匙鎔服又以酢和葱封臍通吳内翰母夫人曽服得效黄耆湯治年髙老人大便祕澀綿黄耆陳皮去白皮各五錢右為末每服三錢用大麻仁一合研爛投取漿一盞濾去滓於銀石器内煎候有乳起即入白蜜一大匙再煎令沸調藥末空心食前服祕甚者不過兩服愈常服無祕澀之患此藥不冷不燥其效如神一方用枳殻五錢蜜兑法治閉結腸熱及肛塞腫縮生瘡蜜三合猪膽汁二枚右以蜜入猪膽汁在内煎如飴以井水浸冷候凝撚如指大長三寸塗油納下部立通活人書單用蜜一方入皁角末在人斟酌用之一方入薄荷末代皁角用尤好又或偶無蜜只嚼薄荷以津液調作挺用之一方無猪膽治大便不通猪糞猪羊膽右以葦筒著膽縛一頭内下部入二寸灌之八錢立下治人有腸結之患天麻十兩蒺藜子一鎰緩火熬焦熟右先安置天麻於瓶中上用火焰過蒺藜子葢内外便用三重紙葢並繫從巳至未時又出蒺藜子再入熬炒準前安天麻於瓶内用炒過蒺藜子於中依前葢又隔二服時後出如此七徧瓶盛出後用布拭上氣汗用刀劈剖焙之細剉搗用御風草修事法亦同天麻提盆散治大便祕澀服藥轉取不通者滄鹽版塊三錢屋簷爛草節七箇右為末研勻每用五分至一錢竹筒吹在肛門内寸深立效潤腸橘皮丸降氣潤腸調和五臟並治三焦氣壅大便祕澀老人虚弱服不損氣及治風祕橘皮一方用橘紅杏仁去皮尖雙仁麩炒黄各等分右為末煉蜜丸梧桐子大每服五十丸空心温水下一方米飲下牽牛散治大便祕澀牽牛子半生半炒檳榔生剉各五錢右為末每服三錢生薑湯調下未利良久熱茶投疏利為度大豆麩方治諸風濕痺筋攣膝痛胃中積熱口瘡煩燥大便祕澀大豆黄麩炒熟搗末一开酥五錢右研勻不拘食前後温水調下一匙甘遂散治大便祕澀不通甘遂一兩炒木香一分右為末每服一錢温酒調下不拘時荆芥散治大便不通無問新久癃悶不通小腹急痛肛門疼腫荆芥穗一兩大黄二兩並生用右為末每服二錢生薑蜜湯調下未通再服商陸煮豆方治大便不通商陸乾者大㦸剉炒一分右㕮咀水四升棗十枚去核煎一升半黑豆半合煎水盡乾取黑豆初吞三粒稍加之以通利為度滑石散治大便不通腹脹氣急妨悶滑石三兩細研手足指甲翦患人自身者燒灰研極細各分二貼右取滑石末每貼水一盞半煎八分去滓調勻指甲灰空心辰時服粉糖丸法大腸壅結不通膩粉五分沙糖如彈丸大一塊右研令勻丸梧桐子大每服五丸臨卧温水下皂莢散治大便不通猪牙皂莢去皮酥炙五錢蒺藜子炒去角五錢右為末每服一錢鹽茶湯調下大黄丸治大便不通大黄剉炒五兩大麻仁研二兩右為末煉蜜丸梧桐子大每服十丸食後熱水下治肛門肺熱閉塞不通腫縮生瘡蜜乾薑末右和丸如指大導下部姚云欲死者蜜三升微火煎如餳投冷水中令凝丸如指大長三四寸導之良一方水四升蜜三升煎熟冷灌下部又常服蜜煎五合大黄芒硝丸治大便暴閉不通氣悶絶大黄六兩芒硝五兩一方用朴硝右先切大黄水四升煮取二升去滓入芒硝頓服之須臾利如良久不覺以熱飲投之一方為末每服二錢温米飲調下治乾糞塞腸癥腸脹痛不通毛桃花一兩濕者麵三兩右和麵作餛飩熟煮空腹食之日午後服如雷鳴當下惡物得效治大便旬日不通鼠糞二枚白膠香半棗大右為末水和如棗核大油塗内穀道中良久便通又方膩粉一分黄丹一錢右為末每服一錢粥飲調下治臓腑壅塞心腹氣悶宿食不消腰脇疼痛大腸祕澀牽牛子一斤炒搗取末十兩青橘皮三兩去白湯浸焙為末右都令勻杵和蜜丸如梧桐子大每服十五丸至二十丸食前温酒下生薑湯亦可治大便不通用白礬石如指大導下部佳又方用漢瓜蒂七枚綿裹内下部如非時醬瓜亦得治卒大便祕澀不通用削瓜葅如指大導下部中即效又方用蜜和燕屎内大孔中即通又方蜜一升水四升煮熟冷灌下部中治大便難用桃皮三升水五升煮取一升頓服一方水服桃花方寸匕無花白皮亦得又方桃葉取汁服亦佳又方用車前子及葉常服良治脹滿不通用獨頭蒜燒熟去皮以綿裹内下部中氣立通及乾薑鹽杏仁搗丸導之並佳巴豆丸治寒癖宿食久飲飽不消大便不通用巴豆仁一升擣酒五升煮三日三夕後合酒微火煎令可丸如胡豆大欲取吐下者服二丸一方巴豆一粒去皮油心膜粳米飯二十粒丸如菉豆大温水下三丸蜜劑方一名霹靂箭治大便久秘攻不透肺熱應肛門熱閉塞生瘡用蜜不拘多少慢火熬令作劑稀則粘手硬則脆稀稠得所堪作劑搓如棗核大粗如箸長一寸許蘸油内于肛門中坐良久自透或加減少許一方可丸六七寸内肛門中到身向上頭下少時取痒即通加鹽相合亦可如用草烏頭末相合亦可鹽則軟堅潤燥草烏末則祛寒消結可隨證隂陽所宜用之治虚人並老弱人虚祕用大麻仁不計多少研細用水濾取麻飲以米相和煮粥或煮蘿蔔食之一方水調服又方常煮子汁飲蜜五合常服亦妙熟湯濾汁服亦可蜜煎藥治大便不通用明黄蠟不拘多少油少許鹽少許撚作錠子放入肛門治大便祕澀不通用牽牛子半生半熟為末每服二錢煎薑湯調下如未通時再服及熱茶投之量虚實無時候加減服治大便不通氣奔欲死用烏梅十枚置湯中須臾去核為丸如棗大内下部少時即通治大腸久冷祕用葳靈仙蜜丸梧桐子大於一更内生薑清米飲下十丸至二十丸治大便澀結用陳皮不去白酒浸煮至軟焙乾為末復以温酒調服二錢為妙一方以米飲湯調下治大便秘澀不通用蜣蜋不拘多少去翅足為末熱酒調下一錢治卒大便不通祕澀用綿裹鹽丸作三丸如手指大内下部中一方用食鹽和苦酒傅臍中乾即易敷藥治閉結至急昏不知人用生大螺螄三枚以鹽入殻内生搗碎置病者臍下一寸三分用寛帛緊繫之即大通未效烏桕木三寸研井水服亦效就多研爛咽下亦可治大便不通用烏桕木一寸許擘破以水煎取小半盞服之立通甚效去燥糞用生薑削如小指長二寸鹽塗内下部中立通治下部閉不通用蒴藋根一握搗汁水和絞去滓强人服一升數用之並治脚氣治大便卒澀結不通用羊蹄根一兩剉水一大盞煎取六分去滓温頓服治天行熱祕腸内結用胡麻油熱服一合取利為度熟油損聲令體重生油殺蠱摩惡瘡治大便祕結積熱不通名獨棗湯用黑腰棗三枚劈開去核以水銀粉於棗核中塞滿濕紙裹煨用生葱茶清嚼下一方以棗汁送下又方用麻線縛定水一盞煮棗熟細嚼熱湯下一方丸梧桐子大薑湯服五丸一方麵裹煨熟為末煎湯調服亦效附子散治大便冷祕用附子一枚炮製去皮臍削去外面留中心如棗大碾為末蜜水調下一錢土瓜根用内方治大便不通亦治小便用土瓜根搗汁少許水解之竹筒傾内下部即通𤣥明粉散治大便不通用𤣥明粉五錢每服二錢將冷茶磨木香入藥温服即通郁李仁粥方治大便不通用郁李仁一兩去皮細研分兩服煮薄粥一椀臨熟時下郁李仁煮三兩沸傾出空心服即通未通再服以通利為度羚羊角飲治健忘多驚大便難口中生瘡羚羊角鎊一兩人參一兩胡黄連五錢赤茯苓去黑皮羌活去蘆附子炮去皮臍梔子仁炒牡丹皮黄芩去黒皮麥門冬去心炒薔薇根皮大黄炒各一兩防己二兩甘草炙三分右㕮咀每服五錢水二盞生薑半塊拍破鹽䜴四十粒煎一盞去滓更入淡竹瀝少許攪勻食前温服秦芁湯治大腸虙瘕祕澀秦芁去苖一兩五錢防風去蘆一兩一錢枳殻去穰麩炒一兩桂去粗皮三分檳榔炮剉一兩一錢牽牛子生搗一錢獨活去蘆頭一兩朴硝細研一兩五錢湯成旋下右㕮咀每服三錢水一盞煎至七分去滓加朴硝末半錢更煎兩沸食前温服日三檳榔丸出聖濟總録治腸胃受熱氣不宣通瘕聚沈虙腹脇脹滿大便祕澀檳榔剉大黄剉炒各二兩枳殻去穰麩炒二兩大麻仁研桃仁去皮尖雙仁麩炒研青橘皮湯浸去白焙木香各一兩右除桃仁麻子仁外為末同研勻煉蜜丸梧桐子大每服二十丸温水送下日二服以知為度一方無青橘皮大黄飲出聖濟總録治小腸移熱於大腸腹脇脹滿瘕聚祕澀大黄剉絹裹淬三度焙乾炒澤瀉黄芩去黑皮心剉甘草炙剉各一兩右㕮咀每服三錢水一盞半煎八分去滓空心温服晩再服三黄湯出聖濟總録治虙瘕大便祕澀大黄剉炒一兩五錢芒硝研黄芩去黒心各一兩梔子仁七枚甘草炙剉五錢右除芒硝外㕮咀每服三錢水一盞煎七分去滓入芒硝五分煎三沸温服食後臨卧檳榔丸出聖濟總録治大腸受熱瘕聚沈虙祕澀不通檳榔炮剉一兩大黄剉炒二兩木香五錢陳橘皮湯浸去白焙一兩牽牛子二兩内一兩生為末一兩炒熱另為末右將四味成末入牽牛子末和為丸煉蜜於臼内塗酥杵丸梧桐子大每服三十丸空心温酒下潤腸丸出醫方集成治發汗利小便亡津液大腸秘老人虚人皆可食肉蓯蓉酒浸焙二兩沈香别研一兩右為末用麻子仁汁打糊為丸梧桐子大每服七丸空心用米飲下潤腸丸出東垣試效方治脾胃中伏火大便祕澀或乾燥祕塞不通全不思食及風結祕血結祕皆令閉塞也以潤燥和血疎風自然通麻子仁一兩桃仁去皮尖一兩羌活五錢大黄煨五錢當歸尾右除麻仁桃仁另研如泥外搗羅為末五上火煉蜜丸如梧桐子大每服三十五丸空心白湯下如病人不大便為大便不通而滋其邪盛者急加酒製大黄以利之如血燥而大便不行者加桃仁酒製大黄如風結燥大便不行加麻子仁大黄如風結澀而大便不行者加皂角仁大黄秦芁以利之如脈澀覺身有氣澀而大便不通者加郁李仁大黄以除之如寒隂之病為結閉而大便不通者以局方中半硫丸或加煎附子乾薑湯冷與之其病雖隂寒之證當常服陽藥補之若大便不通者亦當服之與一服藥微通其大便不令閉結乃治大法若病人雖是祕結或是隂寒之證其病煩燥脈實堅亦與陽藥中少加苦寒之藥以去熱燥燥止勿加如隂燥欲坐井中者其二腎脈必按之虚或沈細而遲此易為辨耳如有客邪之病亦從權加藥以去之活血潤燥丸出東垣試效方治大便風祕不通常燥結當歸一錢防風三錢羌活一兩大黄一兩濕紙裹煨桃仁二兩湯泡去皮尖麻仁三兩五錢二味另研入藥皂角仁燒灰存性去皮一兩五錢其性得濕則滑得滑則燥結自除用之勿悮右除麻仁桃仁另研外為末同拌勻煉蜜去沫為丸如梧桐子大每服五十丸三兩服後日久不能結燥也以磁器内盛紙封之無令見風升陽瀉濕湯出東垣試效方治膈咽不通逆氣不通裏急大便不行青皮二分甘草四分槐子二分黄耆一錢黄蘗三分升麻七分生地三分熟地黄三分當歸四分桃仁二錢蒼术五分右㕮咀如麻豆大作一服另研桃仁如泥一處同煎水二盞煎一盞去滓稍熱食前服麻黄白术散出東垣試效方治大便不通三日一遍小便黄赤渾腫面上及腹猶甚其色黄麻木身重如山沈困無力四肢痿軟不動舉動喘促吐清水吐噦痰唾白沫如膠時燥熱發欲去衣須臾而過振寒項額冷如冰額寒猶甚頭旋眼黑目中溜火冷淚鼻不聞香臭小腹急痛當臍有動氣按之堅硬而痛麻黄不去節五錢桂枝三分杏仁四枚吳茱萸草豆蔲各五分厚朴三分炒麵五分升麻二分柴胡三分白术三分蒼术三分生甘草一錢澤㵼四分茯苓四分橘紅二分青皮一分黄連一分酒製黄耆三分人參三分甘草炙一分猪芩三分黄皮一分右㕮咀分作二服水二盞半先煎麻黄令沸去沫再入諸藥同煎至一盞去滓稍熱食遠服此證宿有風濕熱伏於榮血之中其木火乘於陽道為至盛元氣短少喘為陽火傷於四肢痿在腎水之間乃所勝之病今正遇冬寒得時乘其肝木又實其母肺金尅火凌木是火大勝必大復其證葢恐欠多嚏鼻中如有物不聞香臭目視䀮䀮多悲健忘小腹急痛通身黄腹大脹面目腫猶甚食不下痰唾涕有血目眥瘍大便不通只二服皆已驅風丸出朱氏集驗方治大便不通或年高風祕皂角七挺炮按水兩椀巴豆四十九粒去殻心膜枳殻一兩右以皂角挼水煮乾為末去巴豆不用炒枳殻為末入木香五錢蜜丸如梧桐子大空心白湯下三十丸順氣丸出宜如方治大腸每祕澀即諸風病發或諸闕發大黄五兩半生半熟車前子檳榔麻仁炒牛膝酒浸郁李仁湯浸去皮兔絲子酒浸蒸山藥各二兩山茱萸防風右為末蜜丸梧桐子大茶湯米湯任下此藥補益通利疎風順氣治丈夫婦人膈上虛弱燥熱肺腑痰壅調三焦開胃口大小便祕結不通及腸風等疾神功丸出普濟本事方人參五錢阿梨勒生用一兩大黄蒸一兩麻仁八錢右為末除出麻仁研為膏次入前藥煉蜜丸如梧桐子大每服二十丸空心茶酒任下枳殻丸出濟生方治腸胃風氣壅盛大便祕澀皂角一挺去黒皮炒枳殻製炒大黄炒羌活木香淨陳皮白芷桑白皮右為末蜜丸梧桐子大每服七十丸空心米飲或薑湯下三和散方見三焦腑門三焦脹類治七情氣結五臟不通脾胃不和大便祕澀金液湯出如宜方治臟寒大腸挾冷結滯硫黄凈揀去沙石十兩研細飛過用磁盒盛水和赤石脂以鹽泥封固候乾地内先埋一小罐盛水令滿置盒在上再以泥封固以慢火養七日七夜候足頂上加火一片煅之候冷取出研為末右藥末一兩用蒸一兩湯浸去藥水和為丸如梧桐子大每服三十丸多至百丸温米飲下空心服又宜麻仁杏仁煎湯下如大腸乾燥宜蜜導法方見孾孩大小便淋澀門大便不通類正真丹余居士選竒方治老人氣虚滿悶大便祕澀連日不通不敢服藥下者宜服此硫黄一兩研陳皮五錢去白五靈脂一分右先搗陳皮次搗五靈脂硫黄同搗勻麵丸如梧桐子大每服五十丸食前米飲下和血通經湯出東垣蘭室方靈壽縣長董監軍癸夘冬大雪時因公到真定忽有大風氣暴至闕親張耘夫求醫診候得六脈俱弦甚急按之洪實有力其證手足攣急難明其狀大便祕澀面赤而熱此風始至於身也四肢者脾也以風寒傷之則搐極而攣閉乃風淫未深而寒在外也内經曰寒則筋攣正謂此也本人素飲酒内有實熱乘於腸胃之間故大便祕澀而面赤熱内則乃手足陽明受邪外則足大隂脾之經受寒之邪乃以桂枝甘草根以却其寒邪而挼其急搐又以黄栢之苦寒滑以瀉實而潤燥急救腎水使以升麻葛根以升陽氣行手足陽明之經不令遏絶更以桂枝辛熱入手陽明之經為引用潤燥復以芍藥甘草専補脾氣使人不受風寒之邪而退木邪専益肺也加人參以補元氣為之補佐加當歸身去裏急而和血升麻一錢葛根一錢當歸身一錢人參一錢桂枝二錢芍藥五分甘草根炙一錢黄栢酒製二錢右剉麻豆大煎法如常令煖房中近火摩其手一服乃愈化積滯通大腸方楊子建䕶命方芫花一兩牽牛一兩鱉甲醋炙五錢狼毒製如前獨活大黄薄切醋煮乾羌活牡丹皮去心桔梗當歸牛膝荆芥穗各一兩半夏三錢右件依法修製芫花狼毒二味木臼中杵羅為末所餘諸藥合一處杵羅為末後總合一處相滚令芫花狼毒與衆藥末拌勻每服二錢匕土器内煎葱湯調下大橘皮丸出十便良方治大便祕厚朴一兩橘皮一兩杏仁一兩三錢右為細末煉蜜和丸如梧桐子大每服五七十丸非時米飲下神效丸出衛生家寶方治大便秘黄梔子隔年者大黄炮甘草各等分右碾羅細末煉蜜和丸如梧桐子大每服三十丸畧秘者用白湯下秘甚者以煎橘皮湯下之食前服五仁丸出澹寮方治大便祕澀可以常服杏仁酒浸去皮尖麵炒令黄取淨一兩細研郁李仁湯浸去皮尖取淨一兩細研栢子仁揀淨一兩細研酸棗仁湯浸去皮取淨一兩細研大麻子仁曬令乾用板子盛住上以磚一片壓定輕輕以手摩磚則皮自脱取未脱者再摩之揀凈一兩細研右五味再合研令極細以水浸蒸餅為丸梧桐子大每服五十丸空心米飲吞下通祕散出十便良方治風秘大便澀香白芷不拘多少炒乾右為細末每服二錢蜜少許温米飲調下連進二服食前香术丸出余居士選竒方治腹脹痛臟秘蒼术一兩厚朴薑汁炙一兩陳皮一兩生好硫黄二兩用蘿蔔煎沸湯洗三二次右搗羅為末浸蒸餅糊為丸如梧桐子大每服三五十丸日二服米湯下麻仁丸出直指方調三焦潤五臟治大便不通年髙老人宜服白檳榔半煨半生車前子羌活去蘆木香各一兩肉桂去粗皮山茱萸兔絲子酒浸一宿另研為末枳殻去穰麩炒防風去蘆頭及乂山蕷各一兩五錢麻仁另搗研大黄半蒸半生郁李仁去皮另搗碎各四兩右為細末共研和勻煉蜜丸梧桐子大每服十五丸至二十丸温水吞下臨卧服通腸丸出十便良方治大腸結不通厚朴製為末猪胰各等分右用猪胰研和如梧桐子大每服三十丸生薑湯下四順飲子出十便良方治大便不通面目身熱口舌生瘡上焦胃悶時欲得冷此三陽氣壅致大腸熱結脉氣洪大大黄赤芍藥甘草當歸各等分右為粗末每服五錢水一盞半煎一盞温服潤腸丸出衛生寶鑑方治胷膈痞悶大便澀滯麻子仁二兩五錢研極細桃仁五錢當歸尾五錢生甘草三錢枳實五錢麩炒大黄酒煨一兩五錢白芍藥五錢木香二錢陳皮三錢升麻五錢檳榔二錢人參三錢右件除麻仁桃仁外搗為末却入麻仁桃仁泥子和勻蜜丸如梧桐子大每服七八十丸温水食前服治大便不通出本草研麻子相和為粥食治大便不通十日至一月出本草用冬葵子三升水四升煮取一升去滓服不差再服又方出危氏方用枳實皁角等分為末飯糊為丸米飲下枳實湯出濟生方治腹脹發熱大便祕澀脈多洪數此名熱脹枳實去穣麩炒五錢厚朴薑製炒一兩大黄酒蒸三錢甘草炙三錢桂心不見火二錢五分右㕮咀每服四錢水一盞半生薑五片棗三枚煎至七分去滓温服不拘時候嘔者加半夏一錢小黄耆丸出十便良方治大腸風熱大便祕澀及五痔結核防風一兩黄耆二兩川芎五錢皁子仁一錢枳殻一錢右為細末煉蜜和丸如梧桐子大每服三十丸不拘時候米飲下麻仁丸出楊氏家藏方治大便祕澀麻仁一兩另研杏仁去皮尖麵炒二錢枳實去穰麩炒五錢白芍藥五錢黑牽牛一兩七錢右為細末滴水為丸如梧桐子大每服五十丸温熱水送下食前麻子仁丸出三因方治太陽脉浮而澀浮則胃氣强澀則便數浮澀相搏大便則堅其脾為約大便堅小便利而不渴麻子仁五兩炒芍藥八兩枳實麩炒八兩大黄蒸一斤厚朴薑汁炒五錢杏仁去皮尖炒另研五兩五錢右為末煉蜜丸梧桐子大每服二十丸温水下未知加至五十丸一方麻仁一兩五錢杏仁三錢大黄一兩枳實芍藥厚朴各五錢此依局方上本是漢方合用大黄枳殻一斤正得合一兩厚朴當用四兩杏仁用六錢一方麻仁一兩二錢五分芍藥一兩乃均製合理用當以理推治大腸氣祕壅熱結澀出本草牽牛子微炒搗取其中粉一兩桃仁麩炒去皮尖取末五錢右以熱蜜和丸如梧桐子大温水服三二十丸不可久服亦行脾腎氣故也導引法養生方云偃卧直兩手捻左右脇除大便難腹痛腹中寒口内氣鼻出氣温氣咽之數十病愈普濟方卷三十九
