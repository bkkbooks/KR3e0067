治法熱者三黄湯冷者金液丹宿食者脾積丸風祕者脾約麻子丸氣不下䧏者枳殻桔梗湯然而大腸與肺為表裏大腸者諸氣之道路闗焉熱則清利冷則温潤積聚者抉其壅邪鬰者疎其風又當流行肺氣也諸有裏熱法當通利然大便難下腸頭熱腫而墜重者也更有熱有瘀血挾氣而血在下焦也當用黄連黄芩大黄輩下之於内以炒阿膠炒枳殻百藥煎為佐多入濃蜜並烏梅同煎薑一錢四五片亦可凡通利大便若用大黄巴豆等藥而大便不通隂陽闗格水火不升降故也有熱者來復丹用三黄薄荷泡湯下無熱者養正丹夾神保丸橘皮湯煎下儒門事親書云大便燥結戴人過曹南省親姨表兄病大便燥澀無他證常不敢飽食則大便極難結實如鐵石或三五日如圊眼前星飛鼻血出肛門連廣腸痛痛極則發昏服藥則病轉劇烈巴豆芫花甘遂之類皆用之過多則困瀉止則腹燥如此數年遂為藥性暴急不服但卧病待盡戴人過因診其兩手脉息俱滑而有力以大承氣湯下之繼以神功丸麻子丸等藥使食菠蓤葵菜及諸羊血作羮百餘日充肥親知見駭之嗚呼粗工不知燥分四種燥於外則皮膚竭渴燥於中則精血枯涸燥於上則脣鼻焦乾燥於下則便苦結閉夫燥之病為是陽明化也水液衰少故如此然可下之當擇藥用之巴豆可以下寒甘遂芫花可以下濕大黄朴硝可以下燥内經曰辛以潤之鹹以耎之周禮曰以滑養竅老人臟腑祕澀不可用大黄老人津液少所以臟腑祕澀更服大黄以瀉之津液皆去定須再祕甚於前只可服寛潤大腸之藥更用槐花煎湯淋洗亦效更有老人發熱而大腸祕澀或因多服丹藥脾胃虚弱氣化不行遂為臟腑積熱須用神保丸得通瀉一行熱亦即退有人因時疾瘥後祕塞不通遂致夭命大不可輕之凡大便不通皆因用滑膩之物及冷水致不通也病後面黄者即大便難内經謂小腸移熱於大腸為慮􅂒夫小腸者受盛之官化物出焉大腸者𫝊道之官變化出焉二者皆以𫝊化為事今也小腸受熱移於大腸則隂氣盛而津液耗津液既不能滑利故糟粕内結沈伏而為虙瘕結聚腸間菀結大便祕澀是也方痢聖餅子治年老人大便祕澀草菓去皮石菖蒲去毛白茯苓麻黄去根節厚朴獨活枳殻麩炒藿香白术細辛洗去葉吳茱萸去梗甘草炙木猪苓去皮蒼术浸良姜去蘆防風去蘆頭赤芍藥附子炮去皮臍藁本去蘆柴胡澤瀉半夏製各等分右㕮咀每服三錢水一盞半薤白二條擘破煎至八分去滓食前空心稍温服老人小兒量以加減用之忌生冷油膩之物京三稜丸治痃癖注氣刺痛大便祕澀京三稜木香當歸桂去粗皮肉蓯蓉酒浸切焙牛膝去苖葉浸切焙羌活去蘆芎藭赤芍藥防風去蘆枳殻去穣麩炒白术各五錢檳榔生剉郁李仁去皮尖雙仁另研如膏大黄剉炒各一兩右除郁李仁外為末與郁李仁同研勻煉蜜杵丸梧桐子大每服二十丸空心米飲或温酒下以利為度茱萸湯治脹滿閉塞不下方見本門大小便不通類大黄丸轉氣治百病川大黄二兩剉炒木香乾薑炮剉赤芍藥白术芎藭羌活桂心檳榔郁李仁浸浸去皮炒右為末入巴豆研令勻煉蜜丸梧桐子大每日空心或夜卧時以温茶下三十丸至五十丸以利為度如要快瀉良久以熱茶投之搜風潤腸丸治三焦不和胷膈痞悶氣不升降飲食遲化腸胃燥澀大便祕硬沈香檳榔木香青皮去穣陳皮去穣京三稜蘿蔔子炒槐花炒商殻麩炒去穣枳實麩炒去穣木通各五錢郁李仁一兩去皮右為末煉蜜丸梧桐子大每服五六十丸食前煎木瓜湯下常服滋潤腸胃導化風氣一方有大黄無木通米飲湯送下大黄丸調利胷膈祛逐壅滯推陳致新疎風順氣川大黄剉炒檳榔大麻仁郁李仁湯浸去皮尖炒各二兩牛膝去苖芎藭枳殻麩炒去穰獨活防風去蘆桂心桃仁各一兩湯浸去皮尖雙仁麩炒右為末煉蜜為丸梧桐子大每服三十丸空心生薑湯下大五柔丸治臟氣不調大便不通和榮衛利九竅消穀益血大黄芍藥枳實蓯蓉葶􅐗甘草黄芩牛膝各一兩桃仁一百枚杏仁四十枚右為末蜜丸梧桐子大每服三丸日三加至二十丸酒下導水丸下劑大黄二兩黄芩二兩滑石四兩黑牽牛四兩另取頭末加後項藥甘遂一兩去濕熱疼痛泄水消腫滿久兩則加依法製用白芥子一兩去徧身走注疼痛朴硝一兩退熱散腫毒止痛久旱則加郁李仁一兩散結滯通闗節潤腸胃行滯氣通血脉樟栁根一兩去腰腿沉重右為末滴水丸梧桐子大每服五七十丸或加至百臨卧温水下潤腸湯一名當歸潤燥湯治大便閉燥不通升麻二錢生地黄二錢大黄炒三分紅花三分麻仁一錢桃仁一錢與麻仁另研了入煎右㕮咀作一服水三盞先拌藥濕煎一盞去滓食前熱服一方有黄蘗無紅花麻仁丸出儒門事親書郁李仁去皮另研大麻子仁另搗二味各六兩大黄二兩五錢半生半熱檳榔五錢乾山藥防風去蘆枳殻炒各七錢五分羌活木香各五錢五分右為末入另搗藥攪勻煉蜜丸梧桐子大每服二十丸至三十丸温水下食後加牽牛滑石亦妙大黄飲子出聖惠方治身熱煩燥大便不通骨節急痛川大黄濕紙裹煨五錢杏仁去皮尖畧炒五錢梔子仁五錢川升麻五錢枳殻浸去穰炒五錢生地黄一兩人參二錢五分黄芩二錢五分甘草炙二錢五分右㕮咀每服三錢生薑五片䜴二十一粒小烏梅一枚煎服一方用枳實勻氣丸治津液燥少腸胃挾風大便祕澀氣不勻麻仁另研二兩人參一兩訶梨勒皮一兩枳殻去穰麩炒一兩桂皮去粗皮一兩木香一兩五錢郁李仁湯去皮另研三兩白檳榔三兩大黄炙三兩右為末入麻仁等膏再研勻煉蜜丸梧桐子大每服三十丸加至五十丸温熟水下不計時枳殻湯治大腸壅結不通腹脇脹滿膨悶不下食枳殻去穰麩炒一錢甘草炙剉一錢大腹皮剉三錢牽牛子一兩百合一兩赤茯苓