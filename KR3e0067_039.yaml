body:
  text: 普濟方卷三十九明周王朱橚撰大臟腑門大小便不通論夫脾胃大小腸膀胱者倉廩之本營之居也名曰氣能化糟粕轉味而出入者也葢營受水穀之真精榮衛之根源大小腸膀胱得以變化皆營為之本是以小腸為受盛之官水穀初未分也及其化物歸於膀胱而為溺轉於大腸而為糟粕必曰氣化則能出矣或隂陽之氣不平寒熱相勝或氣實塞而不通或氣虚損而為洩或燥而急或熱而祕皆隂陽不和之病也治此不槩以寒熱為法寒劑蕩滌熱劑乾燥反傷和氣耗其津液若闗格不通三焦約病專以榮衛之否塞乳後便難與夫老者祕澀之病又以津液不足止可滑以利之潤以滋之茍蕩以駃劑則糟粕不通真氣受弊不可不知也闗格大便不通謂之内闗小便不通謂之外格二便俱不通為闗格也由隂陽氣不和榮衛不通故也隂氣太盛陽氣不得營之曰内闗陽氣太盛隂氣不得營之曰外格隂陽俱盛不得相營曰闗格闗格則隂陽之氣痞結腹内腹滿氣不行於大小腸故闗格而大小便不通也又風邪在三焦三焦約者則小腸痛内閉大小便不通曰不得前後而手足寒者為三隂俱逆三日死也診其脉來浮牢且滑直者不得大小便也大小便難者由冷熱不調大小腸有遊氣在於腸間搏於糟粕小便不得氣流故大小便難也診其尺脉滑而浮大此為陽干於隂其人苦小腹痛滿不能尿尿即隂中痛大便亦然也方茱萸湯出千金方治腹脇脹滿闗格大小便不通吳茱萸湯浸洗去涎曝乾微炒大黄剉炒當歸切焙桂去粗皮赤芍藥甘草炙剉芎藭各三兩人參細辛去苗葉各四兩桃白皮去粗皮一握乾薑一兩炮雄黄三分真珠末五錢與雄黄同研右將十一味㕮咀每服三錢水一盞煎七分去滓下雄黄真珠末一字酒半盞更煎三沸空心服之一方作丸梧桐子大每服三十丸生薑橘皮湯下無雄黄木香散治下焦熱大小便不通氣脹滿悶木香三分黄芩去黑心三分木通剉炒三分陳橘皮湯浸去白焙三分冬葵子研一兩瞿麥穗一兩檳榔五錢赤茯苓去黑皮五錢茅根五錢右㕮咀每服五錢水一盞半煎八分去滓温服治大小便難腹肚脹滿短氣荆芥一兩芎藭一兩蒲黄一兩當歸剉炒一兩桂心一兩䗪蟲三十枚炒川大黄二兩剉炒甘草五錢炙剉桃仁四十枚湯浸去皮尖雙仁麩炒右為末煉蜜為丸梧桐子大每服三十丸主薑葱白湯下不拘時茯苓丸治大小便不通赤茯苓去黒皮五兩芍藥五兩當歸切焙五兩枳殻去穣麩炒五兩白术五兩人參五兩大麻仁三兩大黄剉三兩右為末煉蜜丸梧桐子大每服十五丸至二十丸空心煎茅根湯下大黄湯治中焦熱實閉塞闗格不通吐逆喘急大黄剉炙炒五錢前胡去蘆頭五錢半夏湯浸七次炒五錢人參五錢黄芩去黑心五錢赤茯苓去黑心五錢木香五錢檳榔剉五錢右㕮咀每服五錢水一盞半生薑五片煎八分去滓温服芍藥湯治大小便難臍腹妨悶赤芍藥五錢羌活五錢桂心五錢川大黄剉炒一兩郁李仁湯浸去皮炒一兩川芒硝一兩檳榔一兩大麻仁二兩右為末煉蜜為丸梧桐子大每服三十丸空心服温水下茯苓湯一名大黄散治大小便不通心腹滿悶不能可過赤茯苓三兩桑根白皮剉三兩瞿麥穗二兩大黄剉炒二兩榆白皮剉二兩防葵去蘆二兩麻子仁研如膏二兩右㕮咀每服五錢水一盞半煎一盞去滓入芒硝末五分更煎二沸空心温服日晩再服牽牛子丸治下焦結熱腸胃燥澀大小便不通黑牽牛淘洗令淨炒令氣透便取出攤令冷取末二兩青橘皮焙去白用一兩桑根白皮剉炒一兩芍藥焙一兩栝蔞根一兩木通剉一兩陳橘皮焙並白用一兩右為末煉蜜杵和丸梧桐子大每服十丸十五丸加至二十丸茶酒任下白术散治大小便難腹脇脹滿氣急白术一兩牽牛子炒一兩木通一兩川大黄剉炒一兩檳榔一兩川朴硝一兩陳橘皮五錢去白焙右㕮咀每服四錢水一盞煎至六分去滓空心温服滑石湯治大小便俱不通滑石一兩五錢茅根三分車前子三分天門冬去心焙一兩冬瓜穰一兩莨菪子浸去浮者煮令芽出曝乾微炒一兩右㕮咀每服五錢水一盞半煎至一盞去滓食前温服日三治大小便氣壅不利脹滿闗格不通木通剉一兩川朴硝一兩郁李仁湯浸去皮炒一兩車前子一兩黄芩五錢瞿麥花五錢右㕮咀每服四錢水一盞煎六分去滓温服大黄散治闗格不通妨悶大小便祕澀大黄剉二兩桂去粗皮三分冬瓜子炒一兩滑石研三兩朴硝生鐵銚子炒乾刮下紙裹於黄土内窨一宿取出研細三兩五錢右先將前三味為散更與滑石朴硝同研勻細每服二錢濃煎白茅根湯空心調服至晩再服黄芩湯治大小便不通黄芩去黑心二兩赤芍藥三兩白茅根三兩大黄生用三兩瞿麥穗右㕮咀每服五錢水一盞半煎一盞去滓入朴硝末五分更煎二沸空心温服甘遂散治氣痞心腹脹喘促大小便不利甘遂煨牽牛子炒續隨子去殻葶藶子大㦸各等分右為末每服五分濃煎燈心湯空心調下服利水為度治大小便不通大黄煨牛蒡子炒羌活獨活滑石各等分右為末用熱水調下空心服即便利五宣散治大小便不通行滯氣瞿麥木通甘草虎杖滑石各等分右為㕮咀每服二錢水一盞燈心數莖煎七分臨卧服車前子湯治大小便俱不通車前子五兩生用木通剉四兩黄芩去黒心三兩郁李仁湯浸去皮尖雙仁三兩右將前三味搗篩與郁李仁拌勻每服五錢水一盞半煎一盞去滓入朴硝末五分更煎二沸食前温服日三榆白皮湯治大小便俱不通榆白皮甘草炙剉各一兩五錢滑石三兩桂去粗皮一兩右㕮咀每服四錢水一盞半煎一盞去滓食前服日三木通湯治大小便不通木通剉二兩大黄剉生用滑石麻子仁一合研如膏右㕮咀與麻子仁拌勻每服五錢水一盞半煎一盞入芒硝末五分更煎二沸空心服之治大小便不通腹脅堅脹蒸下部方蓮葉三兩葱三七莖并用鬚去葉切皂角一挺炙剉生薑一兩切右以漿水一斗二升煮十餘沸并滓分兩度而旋旋盛入小口磁缸中坐缸上蒸冷即易之未通即傾藥於桶斛中添熱水坐蘸下部即通大黄散出肘後方治風冷氣入小腸忽痛堅急如吹狀大小便不通或小腸有氣結聚如升大腸起名為闗格大小便不通川大黄剉炒苦參剉貝齒燒灰滑石各一兩右為末每服二錢葵根湯下不計時候温服一方無大黄掩臍方一名葱豆湯出危氏方治大小便不通連根葱二三莖生薑一塊𢃄土者淡豆豉一十一粒鹽二匙右同研爛捏作餅子烘熱掩臍中以帛紥定良久氣透自通不然再換一劑一方搗碎為末米湯下治諸大小便不通海金沙芒硝朴硝麝香各等分右為末白湯調服大便不通者加巴豆一粒黄連散治大小便祕澀壅熱累効黄連二兩川大黄二兩好醋炒黄芩一兩甘草炙一兩右為末每服二錢食後温水調下芒硝湯出千金方治闗格不通脬腹妨悶大小便不通芒硝研二兩五錢冬葵子炒三合滑石碎三兩右㕮咀每服五錢水一盞半煎一盞去滓入芒硝末五分更煎二沸空心温服一方無滑石芫花丸治大小便不利芫花炒滑石研各五錢大黄剉炒三分右為末煉蜜丸梧桐子大每服二十丸葱湯下治大便不通滑石二兩葵子一兩榆白皮一兩右為散煮麻子汁一升半取二匕服二服即通治大小便不通乾薑鹽杏仁右等分搗導之治大小便闗格不通腹腸喘急出聖惠方水銀一分膩粉一分滑石一分右為末研令水銀星盡每服葱湯調下一錢治大小便祕結出經驗良方水銀豆大一塊研細巴豆二粒去殻膜硫黄三塊如豆大右研為膏作一劑塗於臍内良久才通即便去藥治大小便難腹中有燥糞寒熱煩迫氣短汗出腹脹方見本門大便祕澀不通類濡藏湯門治大小便難出聖惠方木香五錢青黛五錢麻油二合右水一大盞同煎令水盡惟有油去滓分三二服冬葵根汁方治大小便不通生冬葵根洗淨二斤搗羅取汁三合生薑四兩搗羅取汁一合右攪勻分作二服空心一服有頃再服盡即通一方不用生薑治大小便闗格不通出聖惠方胡椒二十粒搗研川朴硝五錢右水一大盞煎胡椒至六分去滓入硝更煎一两沸候温服又方出聖惠方膩粉一錢生麻油一合右相和空心服之治大小便闗格不通肚脹氣築心悶絶出聖惠方蜀葵花一兩搗爛麝香五分研右水一大盞煎至五分去滓服之無花即取根擘破用之推車散出本事方治大小便祕經月欲死者推車客七箇土狗七箇如男病推車客用頭土狗用身如女子病土狗用頭推車客用身右用新瓦上焙乾為末用虎目樹皮向南者濃煎汁調只一服愈治卒闗格大小便並不通支滿欲死二三日則殺人出肘後方苦酒硝等分右和塗臍上乾即易又方出肘後方甘遂二銖貝齒二枚右搗下以三合漿水盡服之須臾即通紫金沙散治大小便不通用紫金沙不拘多少蜂房蒂七枚搗為末每服一錢温酒調下土馬騣凶鬯匕湯治大小便不通右用土騣馬不拘多少走水淘火上用新磚煅過為粗末每服二錢水一盞煎至七分温服猪脂酒方出千金方治大小便不通用冬葵子微炒一兩搗篩用水二盞煎一盞去滓入人乳汁半合和勻空心服之髮灰散出肘後方治大小便不通及便血用亂髮一兩洗淨燒灰為末細研每服三錢温水調食前日三以通利為度冬葵子湯治大小便不通用冬葵子微炒一兩搗篩用水二盞煎一盞去滓入人乳半合和勻空腹服之治卒大小便不通出家藏經驗方用鹽以紙裹燒投水中服之一方以鹽實臍内即通又以和苦酒傅臍又以水三升煮鹽三合使沸適寒温竹筒灌下部又方用含硝石吐出水治大小便闗格閉塞出聖惠方用蔓菁子油一合空腹服之即通通後汗出勿恠治大小便闗格不通肚腹氣築心閉絶出聖惠方用烏桕樹東面白皮隂乾為末如五七日不通熱水調下二錢如急用火上焙乾為妙鐵脚丸一名皂筴飲治大小便闗格不通經三五日者出聖惠方用不蛀皂角燒灰研細粥飲調下三錢一方用皂角炙去皮子為末酒糊或煉蜜丸梧桐子大每服三十丸酒下温水亦得一方皂角燒置桶内薰其後部即通治大小便不通出千金方用葵子末一升青竹葉一把水二升煮五沸飲服又方出千金方用榆白皮切一升葵子一升水五升煎取二升分三服又方出千金方用甑帶煮取汁和蒲黄方寸匕日三服治大小人大小便不利腹大且堅出經驗良方用故衣多垢者切一升水三升煮取一升分三服治老人虚大小便不通一名琥珀散出經驗良方用真琥珀研如粉人參湯調下亦治心痛老人虚大便不通葱白三寸水煎熟不用葱入阿膠一片於葱湯内鎔開温服吳内翰母曾服得效治闗格大小便不通脹滿欲死兩三日則殺人出肘後方用芒硝二兩紙裹三四重炭火燒之令内一升湯浸服當先飲湯一升已吐出乃服之治卒闗格大小便不通支滿欲死及旬日一月日不得大便出千金方用葵子二升水四升煮一升服内猪脂如雞子大一丸彌佳貼臍膏用甘遂為細末以生麵調為糊攤紙上糝末在上塗臍中及塗臍下便處另煎甘草水温涼隨意服之以通為度甘遂散出危氏方治大小便不通及腹滿氣急用甘遂二兩赤皮者為末煉蜜二合和勻每一兩重分作四服日進一服蜜水下未知日二服漸加之一方用二兩為散分五服熟水下如覺心下煩得微利日一服治大小便不通用羊屎燒薰鼻又主中惡心腹刺痛又方用搗葱白以醋和封小腹上又方用茱萸角枝斷取如手第二指中節含之立下又方用雄䑕糞两頭尖者傅臍中立效又方用莧實末五錢分二服新汲水調下又方用礬細研末令患人仰卧置礬末於臍中滿用新汲水滴之候覺冷透腹内即自然通若曾灸即於原灸盤上用