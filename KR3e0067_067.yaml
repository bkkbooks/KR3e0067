body:
  text: 普濟方卷六十八明周王朱橚撰牙齒門蟲蝕牙齒論字書謂風從蟲蟲以風化蓋手陽明支脈入於齒其經虛損骨髓不榮風邪乘之攻入於齒毒氣與濕相搏而生蟲故云蟲蝕牙齒也其狀齒根有竅或作疼痛甚則搖動宣露浮腫作殠世俗亦呼為蚛牙夫牙齒蟲者是蟲蝕牙齒而令疼痛也皆牙齒根有孔穴蟲居其內蝕一牙齒盡又度蝕餘牙齒也方牢牙膏治齒疳蝕齒及脣鼻風疼齒腫宣露豬脂五兩羊脂二兩野駝脂一兩黃蠟三分半鹽炒半兩雄黃研一兩茛菪子炒一分丁香二十枚白芷半兩黃蘖去粗皮熬青木香三分細辛去苗葉一分蜀椒去目及閉口炒出汗桂去粗皮半分松節一分沉香半兩乳香研半兩麝香研一兩芎藭三分藁本去苗土三分當歸銼焙半兩升麻三分莎草根半兩甘草炙半兩右為細散入研藥重細研如麵然後取三般脂煎鎔入藥匙攪勿住手待至欲凝即膏成以瓷器貯之臘日合妙當於靜處勿令雞犬婦人見之每取少許傅齒上良礬石散治牙齒疼痛風齲蟲出挺出搖落者白礬熬枯藜蘆去蘆頭防風去乂細辛去苗葉乾薑炮白术蜀椒去目及閉口者炒出汗蛇床子微炒附子炮裂去皮臍甘草炙銼右為細末濕酒調三錢熱潄冷吐勿咽汁日三兩次為粗末酒煎亦佳細辛散出和劑方治風蚛牙疼牙齗宣爛牙齒動搖腮頷浮腫皆能治之紅椒去目炒鶴虱牙皂蓽撥古方治牙疼為要藥縮砂去殼各半兩荆芥去梗細辛去苗各一兩白芷草烏各二兩右為細末每用少許於痛處擦之有涎吐出不得吞少時用溫酒潄口頻頻擦之立有神效七香散出聖濟總録治風蚛牙疼及牙宣蔓荆實去皮荆芥穗地骨皮防風去乂莎草根炒去毛白芷各一分草烏頭三枚麝香研少許右為散每用三錢水一盞煎沸熱含冷吐升麻散余居士選竒方専治風蚛牙疼齒根動搖升麻各等分川椒等分右為細末每用少許擦患處良久潄口若甚者用沸湯調二錢乘熱潄涎去立愈又方出海上方治風蚛牙疼草果蟬殼地松白殭蠶蜂房牛膝荆芥細辛各等分右銼碎用水一碗煎至半碗去滓稍熱潄至溫少停吐去再潄誤咽不妨神效治牙齒風蚛疼痛聖濟總録烏頭炮裂去皮臍芎藭甘草炙銼地骨皮細辛去苗葉白芷髙良薑各等分右為散揩於痛處出涎以溫水潄三五度即瘥乳香膏出御藥院方治蟲蛀牙齒疼痛去蟲止痛乳香雄黃細辛淨皂角炙存性各一錢莽草麝香各半錢右為細末鎔黃蠟和成錠子看蟲竅大小塞在竅內止用少許綿紙裹之有津即吐誤咽不妨食後或臨臥蓽撥散出海上方治風蛀牙疼不可忍者名曰當面笑良薑蓽撥白芷細辛蜂窠鶴虱各三錢右為細末以擦之如牙蛀用飯一粒摻藥含之即效芎藭散療心虛寒口氣臭衝人又蟲齒芎藭八分白芷七分甘草五分炙桂心四分杜蘅四分當歸五分右搗篩為末以酒和方寸匕服之日二蝦蟆散出聖惠方治牙齒蚛痛有蟲蝦蟆端午取一枚燒灰青黛半兩細研柑子皮半兩微炙乾薑半兩麝香一分細研薑黃半兩細研右都研令細每用綿裹內蟲孔中以瘥為度治蛀牙疼出本事方川烏草烏各一個白附子半兩附子臍尖三七個硃砂少許别研右為末每服二錢酒水各半盞同煎至七分候冷服臨臥時服不得再喫熱物治風蛀牙疼細辛蓽撥草烏頭良薑胡椒各等分右為㕮咀白水煎熱潄口效麝香散出聖惠方治牙齒蚛痛日夜不止齒齗爛臭麝香雄黃白礬燒灰石膽川升麻各一分右搗細羅為散綿裹一字內蚛孔中并以乳汁調少許塗齒齗爛處治牙齒中有蟲痛不可忍出聖惠方硇砂雄黃石灰炒令黃色蝦蟆頭燒灰以上四味各一分巴豆五粒去皮心紙裹壓去油右先研巴豆如麵糊次入諸藥細研以水浸蒸餅和圓如菉豆大有蚛孔者以新綿裹一粒置於蚛孔中有涎即吐却其痛立止如要牙落者輕以刀子撥破牙根令血出取圓子一粒研揩在齒根下一宿即落也附子丸出聖濟總録治久患牙疼及齒蚛附子一兩去皮臍生用胡椒蓽撥黃蠟各一分右為末鎔蠟和丸如桐子大每用綿裹一丸以患牙咬之如蚛安在蚛竅內治牙齒風蚛疼痛出聖濟總録豬牙皂角炙去皮子露蜂房炒蜀椒去目并合口炒細辛去苗葉等分右為散每服一錢水一盞煎沸熱含冷吐不拘時治蚛牙有孔疼痛出聖濟總録巴豆一粒去皮炒石亭脂少許研乾薑少許為末麝香研少許右為細末鎔蠟和丸如芥子大每用綿裹一丸內蚛孔中赴筵散出醫方集成治風牙蚛牙攻腫疼痛晝夜不止痛不可忍腫臥不安牙齗宣露動搖欲脫或腮頷浮腫齗爛血出並能療之良薑去蘆草烏去皮細辛去土葉荆芥去梗右各二兩碾為末每用少許於痛處擦之有涎吐出不得吞咽良久用溫鹽湯灌潄其病即止常使揩牙用腐炭末一半相和止牙宣辟口氣永無牙疾雄黃散治蟲牙痛雄黃二錢乳香沒藥各一錢麝香半錢右為細末鎔黃蠟為丸安在牙蟲蝕竅中蓽撥散出海上方治風蛀牙疼鶴虱良薑蓽撥草烏各等分右為末用青鹽碾細逐漸拌勻每用少許於疼處擦之有涎即吐出用溫水灌潄即愈藥汁不可咽又方名聚寶散出海上方治蚛牙一切風蛀疼不止者防風荆芥蜂房有蛹者佳烏梅各等分右煎熟乘大熱潄吐出勿咽冷再熱潄之一方無防風經驗方陳氏云此方余少年用之見效又方出海上方石膏煆末八錢白芷白茯苓各二錢半鼠尾細辛右等分和勻臨睡盥潄用手指點揩牙根患處即愈蝎附散出淡氏方治風蚛牙疼腫癢動搖牙齗潰爛宣出血口氣等疾蝎稍七枚不去毒附子臍蜈蚣頭去嘴毒川烏頭尖各二箇右為末先用竹杖刺痛牙齗處次以紙撚絍藥一粟米許在痛處甚者不過三兩次效一方以水蘸藥揩患處開口瀝涎出以溫水潄之治血風蛀牙出危氏方雄黃乳香各一錢研如粉麻黃半錢白芷一字右為末先以荆芥穗咬住痛處口涼去之次用皮紙撚津濕之點藥少許隨痛塞耳內鶴虱丸出直指方治蟲蝕齒痛豬牙皂角三枚川椒一錢半生明礬鶴虱各一錢右為末蒸飯為丸如麻子大納於孔中有涎吐之巴豆圓出聖惠方治牙齒蟲蝕有蚛孔疼痛不可忍巴豆一枚醋煮令熱去皮硫黃一字麝香一字右都研令勻消黃蠟和圓如粟米大綿裹一丸內蚛孔中白礬丸出聖惠方治牙齒被蟲蝕有蚛孔疼痛牙齒根朽爛白礬灰黃丹各一錢蝙蝠糞二十粒巴豆一粒微炒去皮右同研細以軟粟米飯和圓如粟米大晒乾凡有蛀蚛孔疼痛不可忍者以圓於痛處咬之立定韭子圓出聖惠方治牙齒有蚛疼痛甚者韭子一兩乳香一分雌黃一分乾蝎半兩右搗羅為末消黃蠟成汁和圓如彈子大即以瓷瓶子內先著炭火燒一圓用紙蓋以筆管引煙出薰牙蚛孔處其蟲盡出或將藥瓶於水碗中安著其蟲盡下撲在水中青鹽散出聖濟總録治牙齒蛀蚛牢牙祕精補益潄咽青鹽龍骨生各四兩濕雞頭一升以青鹽拌一宿炒令通黑右為散平旦及臨臥先潄口令淨以藥散如常揩齒揩良久以溫酒潄咽烏頭散出王氏博濟方治風蚛牙疼烏頭二枚一炙用一生者去皮臍乾薑生用去皮甘草二味各用一棗子大右為散每用半字含水搐鼻左疼搐右右疼搐左瘥為度乳香丸出聖濟總録治蚛牙疼痛不可忍者乳香研胡椒阿魏各等分右為末煎皂莢子膠和丸如菉豆大每用紙裹一丸安在蚛牙內吐涎以瘥為度蜂房湯出聖濟總録治牙齒痛有蟲蜂房一枚炙碎擘豉四十九粒蜀椒去目并合口二七粒右水二盞半煎十餘沸去滓熱含冷吐此藥若有腫尤易見效蜀椒湯出聖濟總録治牙齒蟲疼痛蜀椒去目并閉口者桂去粗皮各一兩白礬燒灰半兩右搗篩每用三錢水一盞煎三五沸去滓熱含冷吐瘥為度立止散出聖濟總録治風牙疼肥皂莢去皮子取肉草烏頭不去尖各一兩乳香研一錢右為末薄麵糊丸梧桐子大用一丸入蚛孔中涎出即吐治風蛀牙齒疼出海上方草烏頭槐花蓽撥右等分碾為末每用半錢蘸擦痛處用醋湯潄之掃痛丸出經驗方治風蚛牙疼引太陽穴痛川烏半兩炮鶴虱一兩焙乾良薑一兩以青鹽半兩炒右為末風牙痛刀上燒鹽同前藥擦蛀牙痛白梅肉同前藥丸塞之細辛散出海上方治蛀牙細辛草烏尖乳香各等分右為細末鎔黃蠟為條用時就火丸塞孔中良久效無孔即咬於痛處有涎即吐之鉛白霜散出宣明論方治牙齒腐蝕氣臭出血及口瘡鉛白霜銅緑白礬枯等分右細研乾貼患處良久溫漿水潄之小兒不消潄之蜂房散出直指方治蟲蛀牙痛真殭蠶蜂房炒二件各等分樟腦半之右為末皂角肉按濃漿煮少頃和作小圓塞痛處治牙被蟲蝕有蚛孔痛不可忍方出聖惠方豬牙皂莢一挺川椒七粒莽草葉七片右搗羅為末以棗肉和圓如黍米粒每用一丸以綿裹內蚛孔中痛定後去藥乳香散傳信適用方治牙疼蛀蚛風虛上攻連腦疼痛乳香一分補骨脂炒半兩右搗研為散每用少許揩疼處有蛀眼則用軟飯和藥作錠子塞蛀孔中其痛立止傳信方云豫昔患此諸藥不效唯此方最妙麝香散出聖濟總録治蟲蝕牙齒片片自落麝香石膽各一分右為散每用一字摻傅患處日三以瘥為度地龍丸出十便良方治牙齒蟲痛乾地龍末三分麝香研一分右和勻鎔蠟丸如麻子大每有牙蟲孔即以一丸內之候藥發熱蟲死立瘥一方治牙齒宣露挺出不出蠟每用一字摻於齒根下白處散出聖濟總録治一切風蚛牙痛不可忍者砒霜鉛丹各一分右先取砒研細入青蔥稍內輕輕扎定次入桿草內如縳粽子樣以草火燒透取砒如金色一錠子次取鉛丹同研勻細每用時以燈心點藥一米許入於耳內左則左用右則右用二白丸出聖濟總録治齒痛蚛孔白殭蠶炒白礬熬枯各半兩右為細末以臘月豬脂丸內於蚛孔中莽草散出千金方治齒有孔不得食靣腫莽草七葉豬椒附根皮長四寸者七枚右㕮咀以漿三升煮取一升滿口含倦即吐却日二三度信效散一名麝香散出宣明論治風熱上客陽明之經牙齒疳蝕齗宣腐殠血出色黃氣腐注悶動搖疼痛作發有時兼解金石一切毒藥上好醎土不拘多少麝香真好者少許右熱湯淋取汁去滓用清汁銀石器中熬煮刮下再與麝香同研勻摻於瘡上以紙貼神效乳香膏出百選方治蚛牙痛孔有蟲不可忍光明白礬枯過滴乳香各等分右為細末熔蠟量多少和膏旋丸看蚛牙孔子大小填之其痛立止神效又方入染胭脂少許和令深桃花色只作散遇牙痛用一匙以指揩擦良久用溫鹽湯潄口又方以飯和丸青鹽散出百選方治風蚛牙疼痛不可忍每用少許揩牙患處吐涎及咽津不妨青鹽四兩川烏頭二兩去尖劈碎如骰子大右乾鍋內用熟炭火煆候煙出盡存性取出埋地內三日碾細揩患處如煆時以木杖子攪之不得犯鐡却將一盞蓋乾鍋子口上或用瓷罐子煆亦可每揩藥先用荆芥湯潄口揩了亦然治風蚛等牙出經驗良方象斗子五個以青鹽在內火煆鹽袋內皂角一條火煆存性右為細末先用荆芥湯潄訖却以前藥就痛處搽之去涎日三五次治風蛀牙疼不可忍腮頰浮腫出海上方莽草芫花右等分水煎十餘沸通口灌風涎壅出即效治蟲蚛牙痛川巴豆肉三枚明乳香一錢右同研鎔蠟圓麻子大每服一丸塞孔危氏方云有紅川椒無川巴豆肉又方一名椒豆膏出朱氏集驗方治蚛牙疼痛紅川椒末一錢大巴豆肉一粒右研細蒸飯圓如麻子大以薄綿包塞孔昔有人蚛牙痛不可忍號呼之聲徹于四鄰用藥不效有道人獻此方用之即安治牙蛀痛方出直指方蠶紙燒存性真殭蠶炒各等分右為末鎔傅良久鹽湯潄口金針丸治蟲牙疼不可忍骨碎皮乳香右為末麵糊為丸如豆大塞蟲牙孔莽草散出聖惠方治牙齒蟲蝕有蚛孔莽草半兩山椒皮一握右搗羅每用三錢以酒水各半盞煎五七沸去滓熱含冷吐治蚛牙疼痛一名定痛散出肘後方用附子一枚生去皮臍搗為末鎔蠟如粟大每服用綿裹一丸內蚛孔中蟲出一方為末用生薑調擦患處良久溫鹽湯盥潄治蟲牙齒出千金方以莨菪子三合如無蔥子韭子亦得以青錢七文燒令赤取小口罌子令可口含得者將錢內罌子中取一撮許茛菪子安錢上令炮吒聲仍與半合許水淋令氣上從罌出將口令氣莫出用薰齒冷復更作取三合藥盡為度非止蟲齒得瘥或風齒齲齒中病悉主之口中多津即吐之一方為末內孔中以蠟封之或粒內之亦可又方出千金方用白楊切一升水三升煮取一升含之又方出肘後方用米醋一升煮拘杞根白皮一升取半升含之蟲立出又方出衛生家寶方取桃仁少許以叉頭穿向燈上燒之煙出經少時吹滅即內入口安蟲齒上咬之不過五度六度一方作胡桃仁又方出千金方用地龍置石上著一撮鹽須臾化為水以麵展取却待凝厚取以內病齒上又以皂莢去皮塗上蟲即出又方出千金方用䋃麻子燭燼研以井水塗之又方出千金方以黑羖羊脂茛菪子各等分先燒鐡鋤斧鑿令赤內其中煙出以布單覆頭令煙氣入口薰之治蛀牙腫痛出華陀中藏方用不蛀皂角一錠去皮子却用巴豆每有皂子處安巴豆一粒用鹽泥固濟燒灰研為細末用剜耳子抄少許填入蛀牙治蛀牙出仁存方用乳香如小豆大安痛牙上燒銅筯令熱碎香上令溶立止又方出仁存方用茄席燒灰為末擦痛牙上又方出仁存方用三奈子為末以藥鋪在紙上捲作筒於燈上燒著便吹滅乘熱煙和藥吹在鼻內其痛即止治風蚛牙疼亦治暴赤眼并頭目昏痛用鵝不食草不拘多少紙裹焙乾碾為細末先滿含水一口然後搐鼻隨病左右搐之若不含水恐藥搐入咽喉治頭目加川芎或加全蝎各少許治風蚛牙疼出危氏方用馬夜眼上以刀兒薄起一片子插在所患牙縫中或咬在痛處瀝出風涎即止不可咽一方如粟米大綿裹內蟲孔中永斷根源治牙有蟲而痛出經驗良方用韭葉連頭根淨洗爛擂同人家械板土泥和勻擦於痛處腮上用紙貼之一時頃取下細細蟲兒在於泥上可以除絶病根砂糖丸出經驗良方治牙痛蛀牙用礦石灰出山石灰未化者用砂糖為丸塞入蛀孔立效殺牙蟲方一名雄黃散治牙齒被蟲蝕有蚛孔疼痛用雄黃研細以棗膏為丸塞牙孔中却燒鐡箆烙之或研細以左右疼處以剜耳子送入耳中一方雄黃末入麝香研傅痛處治蛀牙疼出海上方用天蓼根搗碎隨蛀孔大小為丸綿裹塞之連換四次除根不可咽此汁又方出海上方用韭菜子碗蓋火燒之却以竹箬捲一小角兒通蛀處如下牙蛀則用韭子濃煎頻頻灌潄其蟲自出又方出海上方治蛀牙淡豆豉一粒捻令軟以麝香少許為丸於蛀牙內疼即止亦可除根又方治蛀牙徐克安云余家乳婢若此三日不食亟研碎用之數蟲浮水面痛止而食用鏡面草一名螺厭面草生於石縫者佳每用半握滴麻油二點入鹽半捻挪碎如左牙疼納右耳右牙疼納左耳就行用泥作餅貼成耳門悶其藥氣仍側臥泥耳一兩時方去泥取草擲於水碗中其蟲三色浮水面久者黑其次褐色新者白須是午後牙正疼時用之甚佳一方焙此草為末和麻油輕粉傅頭瘡立愈治風蛀牙疼方出海上方用大黃切作數片燒存性為末紗綿裹盛塞入蛀孔中即效如孔小以鵝毛管輕輕吹入一方燒灰傅疼處立愈治牙蛀痛不可忍出聖惠方嚼熏陸香咽其汁立瘥治風蛀牙疼夫風蚛牙疼久不愈者用針扎巴豆一枚於燈熖上燎煙末及盡存性於牙窩根盤上薰之即愈治風蛀牙痛方出直指方用蜘蛛殼一箇揉軟以薄包塞痰吐出治塞牙疼方出直指方用米醋煮川椒入蜂房蘸軟撚塞一方煎潄禁語言又方出直指方用蠶紙燒存性擦少時鹽湯潄口治牙蛀痛方出直指方取鶴虱為末擦良久鹽湯洗口杏仁膏出海上方治風蛀牙痛用鐡刺杏仁清油燈上煙薰乘熱認定病牙以杏仁拓之又復薰拓七次絶不疼但其病牙逐時落去斷根治牙齒蚛孔疼痛及有蟲蛀用莽草不拘多少為末擦五七次蟲即無一方綿裹內蚛孔中有痛處咬之低頭吐津勿咽疼痛便止一方用葉煎汁含潄吐之治蟲食齒根內黑出直指方燒腐棘針取瀝傅之十遍雄黃末傅之即愈治蟲蝕齒根齒黑者用松木灰揩之雄黃末塗齗上百日神效治蛀牙有孔疼出聖惠方用啄木鳥舌尖綿裹於痛處咬之治風蛀牙疼方一名聖蟾散用蟾蜍裹生絲綿乾剪二分長絍入痛牙根裏忌熱物片時一方蟾蜍熱湯化開新綿少許蘸藥粟米大塞痛處取牙蟲方用針尉鈎兒一箇尖上點香白芷末引出鈎蟲取之治齒蟲痛出肘後方用腐爛棘針二百枚即日棗樹棗朽落地者以水二升煎取一升含之日四五度即瘥取蟲牙法出德生堂治風腫蟲蛀動搖不安一於三伏內用赤馬肉一塊或白者懸空於靜室候其生蛆弔下者收拾起於熱瓦上焙乾碾為末每用竹篾蘸一小點放痛牙上咳嗽一聲即落一方出瑞竹堂治牙疼骨有蟲用天仙子不拘多少以瓦器小者盛天仙子燒煙將竹筒著牙引煙薰牙疼處其蟲即死疼立住永不再發治牙齒被蟲蝕有蚛孔疼痛方出聖惠方用藜蘆為末以松脂和如粟米大每用一丸內蟲孔中立瘥又方出聖惠方用溫生蟲一枚綿裹於疼蚛處咬之勿令患人知立瘥又方出聖惠方取蜂窠蒂綿裹於疼處咬之八仙散治風蚛牙疼良薑瓜蒂蓽撥草馬胡椒漢椒殭蠶青鹽右各為末等分和勻先灌潄後以藥輕手揩痛牙了合口少時涎即吐每日早晚兩次用之治一切風蚛齒痛其齒上忽偏傍腐朽生竅宜用黑神丸羌活巴豆麝香地龍細辛各一分用巴豆一粒漢椒同為細末合研成膏飯為丸如菉豆大以綿裹安於牙蟲孔處椒鹽散治齒蟲痛川椒白鹽蜂房右件銼碎等分每服二錢以井水蔥白煎熱含冷吐治牙有蚛孔出本草以松脂少許咬牢不落蟲自死治蚛牙蛀齒出本草用藤黃點之便落治風蚛牙出本草以郁李根煎湯涼含之治牙齒蚛孔疼痛及有蟲出本草用莽草為末綿裹內蚛孔中或於痛處咬之低頭吐津勿咽疼痛便止殺齒蟲出本草以雄黃末和棗塞牙間治牙齒蟲痛出本草以海桐皮煮含潄之治牙齒有蟲者出本草取松根片子許大內孔中當自爛落咒齒痛出十便良方用紙一張隨大小方停握作七重取三寸釘一枚於屋栿或梁右先杵羌活地龍二味却入麝香於乳鉢內同研令極細再入軟豉心以丸得為度每粒丸如菉豆大以一丸安痛處穴中搜風散治風蚛牙疼蓽撥細辛升麻胡椒各半兩右為細末每一耳幹點搽痛處有蚛竅用棗肉丸塞之有涎多吐用鹽湯潄之烏頭散大定風蚛疼痛不可忍兼開牙關消齗頰腫硬川烏頭香白芷各半兩蒼术細辛各一兩右揀擇好者搗羅為細末每用半錢揩在患疼痛處合口多時吐涎治齒痛風蚛疼痛方出衛生家寶方細辛白芷草烏各等分右為細末用藥揩向齒痛處霎時以鹽湯潄口立止治蟲蛀牙痛方出朱氏集驗方紅川椒三錢明乳香一錢右同鎔蠟丸麻子大每用一丸塞孔中治風蚛牙華陀中藏經方用大北棗一枚劈開去核入和皮巴豆一粒却揑擱於溫火上炙令焦黑如乾浮炭樣取放地上良久碾為細末以紙撚尖托少許入蚛牙竅內不過五次七次絶根又方出海上方上當紙中心釘之下釘之時先吸南方氣一口默咒南方赤蟲子故來食我齒釘在栿梁上永處千年紙每咒念患人咳一聲及吸一吸下釘捶如是七咒即七吸七捶釘其齒即效齘齒論夫齘齒者是腫中而齒相切也皆由血氣虛風邪客於牙車筋脈之間因喘息而風邪動引其筋脈故上下齒相切也方升麻散出聖惠方治風邪客於牙車睡令齘齒川升麻半夏防風藁本各半兩杏仁一分酸棗仁一分細辛白芷芎藭各一分右為散每用一錢以裹常含咽津羌活散出聖惠方治睡中齘齒羌活地骨皮防風酸棗仁蔓荆子杏仁以上各一兩生地黃三兩右為散每用半兩以水一大盞酒一盞煎至一盞去滓食後溫服治睡中齘齒方出聖惠方用蜜取患人臥蓐下塵一捻內口中勿令知之即瘥齒齘腫論足陽明之脈起於鼻交額中旁約太陽之脈下循鼻外入止齒中手陽明之脈其支者從缺盆直入上齶貫頰下入齒縫中若其經虛風熱所襲傳流齒牙攻注齗肉則致腫癢甚者與齗間津液相摶化為濃汁或血宣而不已方地骨皮丸治風齒齗腫痛有血地骨皮白芷防風赤芍藥升麻各半兩柴胡生地黃大黃黃芩枳殼芎藭知母萎蕤檳榔細辛甘菊花藁本牽牛子犀角各半兩馬牙硝黃連甘草各一兩右為末煉蜜丸如梧桐子大食後夜臥熟水下三十丸以利為度甘露飲子治男子婦人胃中客熱口氣齒齗腫悶宣露心中多煩飢不欲食喜眠睡又咽喉中有瘡並皆治之黃芩天門冬枇杷葉甘草生乾地黃枳殼麥門冬山茵陳熟地黃石斛各等分右為粗末每服五錢水一大盞煎至七分去滓溫服食後若齒齗宣露腫悶煎藥潄之冷熱皆可極效丸方治療風齒腫苦參大黃黃芩枳實各六分地骨皮六分玄參黃連各八分右搗篩蜜為丸食後少時以漿水服一十五丸再服至二十丸增減自量之忌蒜麵豬肉郁李根散治齒齗腫痛郁李根川椒柳枝槐枝茛菪子薔薇根右為粗散每用四錢水一大盞煎至七分去滓熱含冷吐黃芩湯治千金腫及蟲蝕黃芩甘草當歸細辛各一兩蛇床子桂心各一兩右為粗末每用五錢以酸漿二盞煎十餘沸去滓熱潄冷吐青龍散治陽明經風熱齒腫痛甘白芷川芎盆硝細辛各半兩青黛三錢薄荷葉二錢右為細末以指蘸藥擦齒腫處吐津誤咽不妨不計時候傅藥退腫朱集驗方天花粉白芷赤大豆鬱金荆芥薄荷各等分右日乾為末蜜水調塗痛處槐白皮散治齒齗風連腮腫痛槐白皮枸杞根附子防風芎藭各一兩川椒一百粒右為散每用三錢以水一大盞煎至七分去滓熱潄冷吐地黃膏治風齒牙齗腫痛熱毒上攻頭面腫生地黃汁當歸白芷細辛鹽花右為末地黃汁銀器中慢火熬成膏臨時塗患處日三五度黑鶴散治牙齒腫痛宣露有血牢牙揩齒烏髭髮青鹽四兩血餘荆芥地骨皮皂莢右入瓦罐子內鹽泥固濟用炭火煆煙青為度候冷出藥細研每用半錢揩齒良久溫水潄之當歸散治血氣不調風毒攻注齒齗腫悶生瘡時有膿血或齒漏久而不愈當歸牛膝各一兩細辛丁香木香各半兩右為細末每用指蘸於齒齗病處吐津咽津不妨柳豆散治齒齗風腫去齒根下熱毒赤小豆黑豆柳枝地骨皮柳蠧木右為散每用四錢水一盞煎七分去滓熱潄冷吐不拘時洛石散硃砂龍骨各一錢甘草寒水石片腦一分右研勻極細每用少許於牙齗肉上徐徐貼用誤咽無妨石膽散治齒齗腫痛生瘡或欲成疳乍瘥乍發石膽梧桐淚蟾酥各半兩輕粉半錢右為細末每用食後臨臥傅半字於患處貼吐津咽無妨細辛散治齒痛齗腫癢風攻體疼痛不可忍細辛川芎香白芷甘松各一兩右為細末每用半錢揩牙痛便止或大痛不定以藥二錢入好雄黃半錢生川烏頭末半錢拌少少揩之良以鹽湯潄柳枝湯治齒齗腫連耳腦腫疼垂柳枝槐白皮桑白皮白楊皮各一握右細銼每用半兩以水一大盞煎至七分去滓入鹽一錢攪勻熱含冷吐細辛散治齒齗連頷腫疼頻發動無時細辛露蜂房槐枝鹽花右為散每用五錢以水一大盞煎至七分去滓熱含冷吐消毒散治大人小兒唇口并齒齗有瘡腫疼痛殠氣及一切惡瘡晚蠶蛾五倍子蜜陀僧右等分為散每用少許摻貼一方乾傅瘡上有津吐去杉葉湯療風牙腫杉葉芎藭細辛各二分右切以酒四升煮取二升半稍稍含之取差勿咽之蜀椒散治風牙齗疼痛腫不可忍蜀椒豬牙皂角右為散每用半錢綿裹置疼處咬之良久涎出立效治牙根腫方松葉二把鹽一合右以酒三升煮取一升含之又方治齒齗痛不可食生果生地黃桂心右藥合嚼令味相得而後咽之莽草散治齒齗連頷腫疼頻發無時莽草獨活各二兩右細銼分為五度每用水二大盞煎至一盞去滓熱含冷吐治齒根腫方出千金方用馬齒莧一把淨洗嚼之即日可瘥一方昔有人食蟹多齒間肉壅出時汪極相好食動風物及性嗜蟹亦患此有道人教服此藥而愈用生地黃汁一碗用豬牙皂角數錠於火上炙令極熱蘸地黃汁令盡將為末傅壅肉上即消縮又用朴硝為末傅壅肉上即消尤快五倍膏治牙腫連喉立效用五倍子研細冷水調傅於頰外屢驗治齒熱痛齗腫出危氏方用川升麻煎湯潄咽解毒治牙熱痛齗腫有汁出危氏方用局方消風散傅貼後以朴硝敷其上擦之立效治熱毒風攻頭面齒齗腫痛不可忍用牛蒡根一斤熟搗絞取汁入鹽花一錢於銀器中熬成膏每用塗齒根下重者不過三五度獨活丸治齒齗腫膿出疼痛獨活防風黃芩零陵香芎藭細辛當歸各半兩沉香雞舌香升麻甘草各一兩右為末鎔蠟和丸如小豆大用綿裹一粒於痛處含化咽津消盡即再用普濟方卷六十八
