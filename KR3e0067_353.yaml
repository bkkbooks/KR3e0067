以扶虛也退熱則柴胡黃芩解肌則紫蘇乾葛滋腸則麻人枳殼助陽則乾薑良薑其間採托雖未備古人之理然而甘辛為陽酸苦為陰皆不越古人之意婦人産後亡血過多故令鬱冒其脈微嘔不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故但頭汗出所以謂産婦忌汗出者亡陰血陽氣獨盛故當汗出陰虛不復所以便堅而嘔不能食也方可用小柴胡湯加生乾地黃主之方人參湯治産後傷寒頭痛項強壯熱惡寒身體煩疼寒壅咳嗽鼻塞聲重人參赤茯苓去黑皮當歸切炒前胡去蘆頭羌活去蘆頭芎藭銼白术柴胡去苗枳殼去穰麩炒桔梗甘草炙獨活去蘆頭各一兩右粗搗篩每服三錢匕水一盞生薑三片薄荷五葉煎至七分去滓溫服不拘時候前胡散出聖惠方治産後傷寒頭目疼痛四肢煩熱心胸滿悶不欲食飲前胡三分去蘆頭石膏二兩麻黃一兩去根節葛根銼人參去蘆頭黃芩芎藭枳實麩炒微黃赤芍藥甘草炙微赤銼半夏湯洗七遍去滑桂心已上各半兩右為散每服四錢以水一中入生薑半分䜴五十粒蔥白五寸煎至六分去滓稍熱頻服以微汗為效半夏散出聖惠方治産後傷寒咳嗽咽喉不利四肢煩疼半夏湯洗七遍去滑人參去蘆頭桔梗去蘆頭赤芍藥細辛白术桂心陳橘皮湯浸去白穰焙甘草炙微赤銼已上各半兩前胡去蘆頭半兩麻黃一兩去根節杏仁三分湯浸去皮尖雙人麩炒微黃右為散每服四錢以水一盞入生薑半分煎至六分去滓不拘時候溫服桂心散出聖惠方治産後傷寒頭目四肢俱疼心胸煩熱桂心一兩石膏二兩麻黃去根節三分荆芥三分赤芍藥三分葛根三分柴胡一分去苗芎藭半兩人參去蘆頭半兩細辛去苗半兩甘草一分炙微赤銼右為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓溫服如人行五七里再服以得汗出為度桂枝湯治産後傷寒頭目昏痛體熱煩悶夫産後血氣俱弱邪氣易襲藏於膚腠之間與正氣相摶則令頭痛體疼發熱惡寒是為産後傷寒之證汗下之方比常用之冝輕不可一槩也桂枝去粗皮麻黃去根節煎掠去沫焙前胡去蘆頭芍藥柴胡去苗人參當歸切炒甘草炙芎藭石膏各一兩右粗搗篩每服三錢匕水一盞生薑三片棗二枚煎至七分去滓溫服不拘時候前胡湯治産後傷寒發熱頭疼體痛咳嗽痰壅前胡麻黃柴胡人參桔梗芎藭細辛枳殼甘草半夏右粗搗篩每服三錢匕水一盞入生薑一棗大切煎至七分去滓溫服不拘時候麻黃散出聖惠方治産後傷寒三日已前頭項腰脊俱痛發汗不出煩躁者麻黃一兩去根節桂心三分杏仁半兩湯浸去皮尖雙人麩炒微黃白术三分人參三分去蘆頭厚朴三分去粗皮塗生薑汁炙令香熱甘草半兩炙微赤銼乾薑半兩炮裂芎藭三分附子三分炮裂去皮臍右為散每服四錢以水一盞入生薑半分棗三枚煎至五分去滓稍熱服以衣覆取微汗如人行五七里未汗即再服前胡散出聖惠方治産後傷寒咳嗽心胸不利背煩疼前胡三分去蘆頭杏仁半兩湯浸去皮尖雙仁麩炒黃桂心半兩細辛半兩人參三兩去蘆頭麻黃三分去根節赤茯苓三分甘草一分炙微赤銼白术三分赤芍藥半兩右為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓溫服不拘時候小柴胡加生地黃湯出濟生拔粹方治産後往來寒熱而脈弦者少陽也柴胡二兩黃芩七錢半人參五錢半夏一兩半銼甘草七錢半大棗三枚生地黃梔子枳殼麩炒各五錢右銼細每服一兩水煎服葛根散出聖惠方治産後傷寒三日前頭疼惡風寒熱葛根一兩銼麻黃一兩去根節桂心三分甘草三分炙微赤銼細辛三分赤芍藥三分柴胡一兩去苗石膏一兩厚朴一兩去粗皮塗生薑汁炙令香熱右為散每服四錢以水一中盞入生薑半分煎至六分去滓稍熱服之如人行五七里再服以微汗為度白术散出聖惠方治産後傷寒四肢拘急心腹滿悶頭痛壯熱白术芎藭赤芍藥附子炮裂去皮臍桂心各三分青橘皮湯浸去白穰焙三分厚朴一兩去粗皮塗生薑汁炙令香熱石膏一兩半甘草一分炙微赤銼右為散每服四錢以水一中盞入生薑半分煎至六分不計時候去滓稍熱服石膏湯治産後傷寒時行溫熱惡風頭痛體痛鼻咽乾心膈煩滿寒熱往來咳嗽痰壅石膏二分黃芩去黑心一兩半前胡去蘆頭二兩半葛根二兩半升麻桑根白皮銼荆芥穗各一兩半赤芍藥柴胡去苗各二兩半右粗搗每服三錢水一盞生薑三片䜴十粒同煎至七分去滓溫服不拘時候羚羊角飲治産後傷寒壯熱胸膈煩悶渴燥羚羊角屑前胡去蘆頭人參桂去粗皮大腹皮銼芍藥蘆根洗銼甘草炙當歸切焙各一兩右粗搗篩每服三錢匕水一盞生薑三片棗二枚煎至七分去滓溫服不拘時候柴胡當歸湯治産後傷寒喘急煩躁或戰而作寒陰陽俱虛不可汗下此宜主之柴胡三兩白术二兩人參甘草炒川當歸芍藥五味子木通各一兩右銼散每服四錢水一盞半生薑四片棗二枚煎至七分去滓服不拘時候日進二三服荆芥湯治産後傷寒頭目昏痛咳嗽痰壅肢節疼痛荆芥穗麻黃去根節煎掠去沫焙乾薑炮五味子石膏甘草炙人參芍藥各一兩右粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時候麻黃湯治産後傷寒咳嗽痰壅氣短麻黃去根節煎掠去沫焙前胡去蘆頭白前甘草炙貝母去心桑根白皮銼杏仁去皮尖雙人麩炒當歸切炒各一兩右粗搗篩每服三錢匕水一盞生薑三片蔥白三寸煎至七分去滓溫服細辛散出聖惠方治産後傷寒虛煩頭疼四肢骨節俱疼細辛半兩桂心一兩赤芍藥三分前胡一兩去蘆頭石膏二兩半葛根三兩銼黃芩半兩甘草半兩炙微赤銼右為散每服三錢以水一中盞入生薑半分蔥白五寸䜴五十粒煎至六分去滓不計時候溫服以微汗為度梔子散出聖惠方治産後傷寒煩熱不解大小便澀梔子仁半兩犀角屑三分赤芍藥三分黃芩半兩柴胡一兩去苗川大黃一兩半微炒銼甘草半兩炙微赤銼木通一兩銼右為散每服四錢以水一中盞入生薑半分煎至六分不計時候去滓溫服人參散出聖惠方治産後傷寒胸膈痰壅嘔逆四肢煩熱人參一兩去蘆頭丁香半兩前胡一兩去蘆頭半夏半兩湯洗七遍去滑甘草半兩炙微赤銼桂心半兩訶黎勒皮三分厚朴一兩去粗皮塗生薑汁炙令香熟右為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服療産後感風傷寒咳嗽多痰唾粘甘草六分苦梗六分欵冬花四分生麥門冬生地黃各十二分蔥白一握䜴二合舊名方無蔥白與䜴右㕮咀水二升煮取八合去滓食後分二服芍藥湯治産後傷寒肢體疼痛乾嘔頭昏煩躁潮熱赤芍藥葛根各一兩銼麻黃甘草石膏人參當歸右粗搗篩每服三錢匕水一盞煎至七分去滓不拘時候溫服竹葉湯治産後傷寒煩躁迷悶熱渴頭痛淡竹葉半兩切人參芍藥黃芩麥門冬去心焙石膏甘草炙各一兩右粗搗篩每服三錢水一盞生薑三片棗二枚煎至七分去滓溫服不拘時候枇杷葉散出聖惠方治産後傷寒嘔噦不止虛煩渴燥枇杷葉半兩去毛微炙麥門冬去心三分厚朴半兩去粗皮塗生薑汁炙令黃熱葛根三分銼陳橘皮湯浸去白穰人參去蘆頭各三分甘草半兩炙微赤銼右為散每服四錢以水一中盞入生薑半分煎至六分去滓溫服不拘時麥門冬散出聖惠方治産後傷寒頭痛身體如火心胸煩躁麥門冬一兩去心赤芍藥黃芩梔子仁犀角屑各三分石膏二兩甘草半兩炙微赤銼右為散每服四錢以水一中盞入生薑半分蔥白五寸䜴五十粒煎至六分去滓稍熱頻服微汗出為度羚羊角湯出肘後方治産後時行兼邪氣似瘧者羚羊角鱉甲炙各六分知母甘草炙各二兩香䜴五合牡蠣一兩右以水五升煮取一升八合去滓分五服近用殊有效小柴胡湯治産後傷寒時氣發熱惡風頸項強急胸滿脅痛嘔逆煩渴寒熱往來大小便不利或骨肉煩熱傷寒過經不解或差後勞復百節疼痛柴胡去苗四兩黃芩去黑心人參甘草炙半夏湯浸去滑各二兩半右粗搗篩每服三錢匕水一中半入生薑五片棗二枚煎至八分去滓溫服不拘時候射干散出聖惠方治産後傷寒經數日後胸中煩悶咽喉噎塞不能飲食射干半兩川升麻三分人參三分去蘆頭陳橘皮三分湯浸去白穰焙甘草半兩炙微赤銼右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服羌活散出聖惠方治産後傷寒心膈煩躁肩背強硬四肢拘急煩疼羌活三分石膏一兩麻黃一兩去根節甘草一分炙微赤銼赤茯苓桂心芎藭赤芍藥葛根白术黃芩細辛已上各半兩右件藥搗羅為散每服四錢以水一中盞入生薑半分蔥白五寸䜴五十粒煎至六分去滓稍熱服微汗出為度桂藥散出衛生家寶方治産後如傷寒候寒熱不調心驚頭昏體虛四肢無力飲食全不思産中所犯並宜服沒藥一分研官桂半兩當歸三分生用右為末每服一大錢炒蔥白酒下日三服三物黃芩湯大全良方治婦人草蓐中風傷寒四肢苦煩熱頭痛與柴胡湯後頭不疼但煩者方見本門前産後諸疾類千金三物黃芩湯陽旦湯大全良方治婦人産後傷風十數日不解頭微痛惡寒時時有熱心下堅乾嘔汗出桂枝芍藥各三兩甘草炙黃芩各二兩右㕮咀每服三錢水一盞薑三片棗二枚煎至七分去滓溫服無時候自汗者去桂加炮熟附子一枚渴者去桂加栝樓根三兩下利者去芍藥加乾薑三兩心下悸者去芍藥加茯苓四兩虛勞裏急者正陽旦湯主之煎時入膠飴為佳若脈浮緊無汗發熱者莫與也普濟方卷三百五十三
