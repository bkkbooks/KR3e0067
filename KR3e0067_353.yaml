body:
  text: 普濟方卷三百五十三明周王朱橚撰産後諸疾門虛汗附論夫虛汗不止者由陰氣虛而陽氣加之裏虛表實陽氣獨發於外故汗出也血為陰産則傷血是為陰氣虛也氣為陽其氣實者陽加於陰故令汗出而陰氣虛弱不復者則汗出不止也凡産後血氣皆虛故多汗也因之遇風則變為痙縱不成痙則虛乏短氣身體柴瘦唇口乾燥久則經水斷絶由津液竭故也方牡蠣散出聖惠方治體虛汗出心煩食少四肢羸弱牡蠣一兩龍骨一兩黃耆一兩銼白术當歸銼微炒桂心芎藭熟乾地黃五味子各半兩人參三分去蘆頭白茯苓三分甘草一分炙微赤銼右為散每服三錢水一中盞生薑半分棗三枚煎六分去滓不拘時溫服隱居羊肉湯出肘後方治虛汗乏氣不欲飲食氣血卒結顛倒悶亂羊肉三斤芎藭一兩甘草炙一兩芍藥二兩當歸二兩生薑五兩右以水一斗五升煮肉取九升去肉內諸藥煮取三升分溫三服大效一方云大補虛損有黃耆三兩人參二兩甘草湯治産後血虛汗出不止甘草炙三分當歸切焙人參各一兩芎藭一兩桂去粗皮三分芍藥一兩半生乾地黃焙四兩羊肉一斤去脂切碎水四大碗煮取汁三碗去油澄清右除肉外粗搗篩每服三錢匕肉汁一盞煎至七分去滓溫服不拘時黃茋湯出便産須知治産後汗出血虛為風邪所搗若兩手拭不及者不可治或産後汗不止因陰虛而得又遇風邪發為此疾一方有甘草一名延夀湯黃茋白术防風熟地黃牡蠣粉白茯苓麥門冬各等分右㕮咀每服四錢水一盞半紅棗二箇煎大半盞服茯苓湯治産後虛汗不止心悸恍惚怵愓多驚白茯苓去黑皮一兩半甘草炙黃一兩芍藥銼炒一兩桂去粗皮一兩麥門冬去心焙一兩當歸切炒一兩黃耆一兩半銼右搗篩每服五錢匕水一盞半生薑半分切棗二枚擘煎至八分去滓服不拘時黃耆飲子出聖惠方治産後體虛瘦四肢少力不思飲食心神虛煩汗出口乾黃耆銼人參去蘆頭生乾地黃五味子麥門冬去心當歸各一兩牡蠣一兩半燒為粉右細銼和勻每服半兩水一大盞入薤白五莖䜴五十粒煎至五分去滓不拘時分溫二服麻黃根散出聖惠方治産後虛汗不止此陰血裏虛陽氣表實陽加於陰陰虛不復者汗出不止遇風則變為痙或虛乏羸瘦唇口乾燥經水斷絶津液竭也當歸黃耆麻黃根牡蠣煅為粉人參粉草右各等分㕮咀每服四錢水一盞煎至七分去滓溫服一方加小麥二合芍藥湯治産後虛汗不止虛煩憒悶芍藥銼炒一兩當歸切炒三分生乾地黃焙二兩黃耆銼一兩石斛去根一兩白茯苓去黑皮一兩右粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三麻黃根湯治産後虛汗不止麻黃根二兩牡蠣燒黑一兩半黃耆銼一兩人參一兩龍骨一兩枸杞根皮二兩右粗搗篩每服三錢匕水一盞半棗二枚擘破同煎至一盞去滓溫服不計時候白术散出聖惠方治産後體虛汗出四肢乏力腹內疼痛不思飲食白术龍骨當歸銼微炒以上各三分生乾地黃黃耆銼牡蠣粉各一兩右為散每服四錢水一中盞生薑半分棗三枚煎六分不拘時溫服當歸散出聖惠方治産後惡露少汗出多虛無力當歸銼微炒白芍藥木通熟乾地黃牡蠣粉蒼术銼微炒各二兩右為散每服四錢水一中盞生薑半分去滓不拘時溫服附子湯治産後榮血虛損汗出日夕不止形體困怠附子炮裂去皮臍半兩桂去粗皮二兩生乾地黃焙三分芍藥一兩甘草炙令黃一兩右銼如麻豆每服三錢匕水一盞生薑三片棗二枚煎七分去滓溫服不計時石斛湯治産後虛熱汗出不止石斛去根附子炮裂去皮臍切白术銼炒秦芁去苗土桂去粗皮各一兩右銼如麻豆每服三錢匕水一盞小麥五十粒同煎至七分去滓服不拘時療産後風虛汗出不止小便難四肢微急難以屈伸出永類鈴方甘草炙一兩附子半箇炮裂去皮臍桂心芍藥各一兩半右㕮咀每服三錢水一盞生薑四片棗一枚煎至七分去滓空心服忌豬肉冷水生蔥等物地髓湯治産後亡陰血虛汗出不止生地黃焙芍藥當歸切焙芎藭各一兩右粗搗篩每服三錢匕水二盞煎至一盞去滓溫服日三人參散治産後虛汗不止煩熱體痛渴燥引飲人參芍藥銼甘草炙龍膽各一兩右為散每服二錢麝香溫酒調服日三又方出聖惠方治産後虛汗不止當歸黃耆各一兩麻黃根二兩右㕮咀每服三錢水一盞煎至七分去滓溫服撲肌散治汗不止黑附子二錢半炮牡蠣半兩鹽泥煆糯米一兩炒右為末以絹袋盛身上撲之止汗散出永類鈴方治産後盜汗不止凡多汗者皆可服牡蠣煨細研小麥麩炒令黃色右等分研細煮生豬肉汁調下二錢無時服人參湯出永類鈴方治産後諸虛不足發熱盜汗人參去蘆川當歸去頭尾右等分為末以豬腰子一雙去脂膜切小片子以水三升糯米半合蔥白兩條煮米熟取清汁一盞入藥二錢煎至八分溫服不拘時牡蠣散出聖惠方治産後虛汗不止腠理虛踈牡蠣一斤燒研如粉麻黃根四兩右搗羅麻黃根為細末同牡蠣粉拌勻粉汗龍骨散出聖惠方治産後虛汗不止龍骨一兩麻黃根一兩右為散每服二錢不拘時以粥飲下吳茱茰散出聖惠方治産後體虛汗出心煩食少四肢羸弱喜熱惡寒吳茱茰半兩湯浸七遍微炒五味子一兩右搗篩酒二大盞浸半日煎至一盞三分去滓不拘時分溫三服療産後血氣暴虛汗出用淡竹葉湯三合微溫服之須臾再服一方用淡竹瀝又方出便産須知治産後血痢小便不通臍腹痛刺用馬齒莧研取汁三大合如無乾者亦可煮一沸投蜜一匙令停頓服葎草汁方治汗出正赤汚衣名曰汗血皆由大喜傷心喜則氣發血隨氣行婦人産蓐多有此證及膏淋尿血以葎草不拘多少搗取汁二升醋二合空腹服一盞或濃煮汁飲亦治淋瀝尿血桂枝附子湯出千金方治産後虛風汗出不止小便難四肢微急難以屈伸者桂枝三兩芍藥三兩生薑三兩甘草一兩半附子一枚大棗十二枚右㕮咀以水七升煎取三升分為三服佛手散出大全良方治産後血虛勞倦盜汗多困少力咳嗽有痰當歸一兩川芎一兩黃耆一兩北柴胡一兩前胡一兩右㕮咀每服三錢水一大盞桃栁枝各三寸棗子烏梅各一枚薑三片煎至六分去滓溫服如有痰去烏梅又方出聖惠方治産後虛汗不止牡蠣粉一兩人參去蘆頭一兩當歸銼微炒一兩白芍藥一兩麻黃根一兩右件藥搗粗羅為散每服三錢以水一中盞煎至六分去滓不計時候溫服單方出朱氏集驗方治産後虛汗用防風不以多少麩炒赤色為末煎豬皮湯下虛熱附論夫新産之後陰血虛弱失於將理則陽氣偏勝使陰陽不能平均身體煩悶唇口乾燥肢節倦痛是為産後虛熱方柏子仁丸治産後虛熱羸瘦困倦補益柏子仁炒一兩澤蘭葉一兩甘草炙銼一兩當歸切焙一兩芎藭一兩白术半兩白芷半兩桂去粗皮半兩細辛去苗葉半兩防風去蘆一兩半人參牛膝去苗酒浸切焙麥門冬去心焙各一兩半生乾地黃焙石斛去根各一兩厚朴去粗皮生薑汁炙銼半兩稿本去苗土半兩蕪荑半兩附子炮裂去皮臍乾薑炮各一兩右粗末煉蜜和丸如梧桐子大每服三十丸溫酒或米飲下不拘時候柴胡湯治産後虛熱久不解漸成勞氣柴胡去苗一兩生乾地黃焙一兩附子炮裂去皮臍一兩當歸切焙一兩人參一兩芎藭一兩黃耆一兩芍藥一兩肉蓯蓉去粗皮切酒浸焙一兩石斛去根一兩右銼如麻豆每服二錢匕水一盞入生薑三片棗一枚擘同煎至七分去滓溫服不拘時候芍藥湯治産後虛熱骨節煩倦瘦瘁芍藥銼一兩牡丹皮一兩人參一兩芎藭一兩半乾薑炮半兩白茯苓去黑皮一兩甘草炙一兩白薇一兩麥門冬去心焙一兩熟乾地黃焙一兩右粗搗篩每服二錢匕水一盞煎至七分去滓溫服不拘時候地黃湯治産後虛熱不解煩倦無力困瘁熟乾地黃焙一兩附子炮裂去皮臍一兩當歸切焙一兩人參三分柴胡去苗三分一方用一兩白茯苓去黑皮三分芎藭三分芍藥三分肉蓯蓉切酒浸焙一兩黃耆銼一兩右粗搗篩每服二錢匕水一盞煎至七分去滓溫服不拘時候桂心湯治産後虛熱狀似勞氣瘦瘁無力桂去粗皮一兩黃耆銼一兩芎藭一兩當歸切焙半兩赤芍藥銼一兩半甘草炙一兩人參一兩附子炮裂去皮臍半兩右粗搗篩每服二錢匕水一盞入生薑三片棗一枚擘破同煎至七分去滓溫服不拘時候當歸湯治産後血虛肢體壯熱煩悶困瘁不食當歸切焙一兩半黃耆銼一兩半芍藥一兩半桂去粗皮一兩芎藭一兩甘草炙一兩人參一兩柴胡去苗葉一兩右粗搗篩每服二錢匕羊肉汁一盞同煎至七分去滓溫服不拘時候香䜴湯治産後虛羸肌肉枯瘁肢體虛弱豉半兩豬腎一隻去脂膜作四片當歸切焙半兩蔥白三莖切人參半兩桂去粗皮半兩白粳米淘一合右將當歸人參桂粗搗篩每服三錢匕水三盞入豬腎蔥白豉米煎取一盞半去滓空心日午臨卧溫服芍藥湯治産後虛熱煩悶瘦瘁芍藥一兩知母半兩甘草炙一兩桂去粗皮一兩黃芩去黑皮一兩人參一兩生乾地黃焙三兩黃耆銼二兩右粗搗篩每服二錢匕水一盞煎至七分去滓溫服不拘時候蜀漆湯出千金方治産後虛熱往來心胸中煩悶滿骨節疼及頭痛壯熱晡時輒甚又似微瘧蝭母知母也二兩芍藥二兩蜀漆葉一兩甘草炙一兩黃芩一兩桂心一兩生地黃一斤黃耆五兩右切以水一斗先煎地黃取七升去滓下諸藥煮取二升半分三服湯療寒熱不損人忌如常法芍藥湯出千金方一名桂心牡蠣散療産後虛熱頭痛身體發熱腹中拘急疼痛白芍藥五兩生乾地黃五兩黃芩二兩千金翌云若通身發熱方加黃芩桂心三兩牡蠣五兩右㕮咀每服五錢水一盞半煎至一盞去滓溫服一方治産後頭疼食後服腹痛食前服此方不傷損人無毒八仙湯治煩悶煩悶者虛熱也血氣有陰陽臟腑有虛實實則生熱虛則生寒常服溫補藥而積溫成熱致發煩渴名曰客熱經下少而煩熱血熱也煩滿短氣者虛熱也煩渴而嘔吐痰熱也妊娠煩燥者子煩也産後口乾煩渴心下悶痞者氣虛也煩悶之疾八仙湯主之赤茯苓麥門冬知母前胡半夏麯各二錢右㕮咀每服三錢水一盞入甘草三寸煎至七分空心熱服獨聖湯治煩熱麥門冬烏梅去核右㕮咀等分用水一碗煎至八分露一宿清晨服之無憂散出華陀中藏經方治産後發熱琥珀一兩研生地黃半斤切右將地黃於銀器中炒煙盡合地上出火毒乳鉢內研為末每一兩琥珀末二錢和勻用童子小便與酒中半調下一錢日三服薤白湯出朱氏集驗方治産後胸中煩熱逆氣薤白二兩半夏二而甘草二兩人參二兩栝樓根一兩麥門冬半兩右㕮咀水一斗三升煮四升分五服熱甚加知母一兩虛渴附論産後虛渴者血虛內亡津液故也血為隂隂虛則陽勝勝則生熱虛熱熏蒸津液內涸咽乾口燥故令渴而引飲也凡婦人産後一二日漸熱口乾可用新汲水調玉燭散或水調甘露散服亦妙勿作虛寒治之煩渴者本起於腎虛而或飲之所發也膀胱為津液之腑宣行陽氣上蒸於肺化水液滋潤五臟調養骨髓其次為肌膚為血肉上為涕淚下為溲溺陽無陰而不降陰無陽而不升陰陽阻隔氣血不交遂令發渴或耽嗜酒肉多食辛辣好食熱麵恣性荒淫將養失理耗損津液好酒虛氣積於肺熱氣聚於脾脾經受熱腎水乾枯故成渴疾治之宜與獨聖湯主之方地黃當歸湯治産後血虛煩渴飲食不進熟乾地黃焙赤石脂各二兩當歸切焙术占斯地榆黃連去鬚白茯苓去黑皮各一兩天雄炮裂去皮臍黃耆銼各一兩半黃芩去心半兩桑耳紫葛銼麻黃去根節各一兩半右粗搗篩每服五錢匕水一盞半入生薑三片同煎至八分去滓溫服乾地黃湯治