燥不生剛燥生若犯胃氣則晝夜譫語喜忘小腹滿小便赤利属抵當湯證也傷寒胃實譫語宜下之婦人熱入血室譫語者不可下也雖然婦人傷寒與男子治法不同男子先調氣女子先調血此大畧之詞耳要之脈𦂳無汗名傷寒脈緩有汗為傷風熱病脈洪大中暑脈細弱其證一也假如中暍用白虎胃實用承氣豈必調血而後行湯耶仲景傷寒論所以不分婦人者良亦在學者皆可隨病扵男子藥證中以意選用也夫婦人惡寒者亦有陰陽二證發熱而惡寒者發於陽也無熱而惡寒者發扵陰也發於陽者宜解表發於陰者宜温裏陽脈必浮數陰脈必沈細又有汗後利後惡寒及背惡寒已上疾證不復繁引嘗治一婦人但惡寒别無他證六脈平靜遂用敗毒散而安此藥能去表中風邪故也經云惡寒家慎不可過當覆衣被及近火氣寒熱相搏脈道沈伏愈令病人寒不可遏但去被撤火兼以和表之藥自然不惡寒矣婦人惡寒尤不可近火寒氣入腹血室結聚針藥所以不能治矣新産婦人有三病一者病痓二者病鬱冒三者大便難亡血復汗寒多故令鬱冒又曰産婦人鬱冒其脈微弱不能食大便堅所以然者血虚而厥厥而必冒冒家欲解必大汗出以此觀之鬱冒為虚寒可知矣又或少陰病下利止而頭眩時時自冒者又為死證盖謂其虚極而脱也觀其鬱冒幸勿忽焉産婦傷寒或婦人傷寒可得聞與曰傷寒三百九十七條一百一十三方此張氏截然之筆削也於某證則有某藥曷嘗以男子為别哉要之月事來産前産後男子所無請發眀其藴以解世俗之惑盖婦人發熱惡寒經水適來經曰熱除續生寒熱而胷滿譫語者是則邪氣結扵胷膈隨其實而取之傷風經曰續生寒熱發作似瘧而經水適㫁者是則血結不行當以小柴胡湯散之所謂治之而愈者此也經曰如傷寒發熱經水適來晝醒暮譫如見鬼状是裏無留邪氣隨血行所謂不治自愈者此也前吐血方血歸條併扵犀角地黄湯桃仁承氣湯抵當湯丸之類言之詳矣抑産前産後治将何擇焉曰産前安胎産後消瘀於是遵依條例斟酌輕重而調理之安胎者何桑寄生阿膠縮砂烏藥他如桂枝半夏桃仁大黄墮胎入燥熱等輩則不可輕用也消瘀者何川芎蒲黄赤芍藥生地黄為要藥他如内補攔住敗血之劑則不可輕進也朱氏以阿膠桑寄生人參茯苓白术等為細末糯米飲調劑為孕婦安胎以紅花一分官桂芍藥甘草半夏薑棗同煎為解散表消瘀以葱白生薑大劑濃汁為産前發散以小柴胡湯去半夏和解熱入子宫郭稽中路枳殻防風甘草半夏㸃服主之大便秘澀以蜜道一法真可活人然則産婦證治觀之可以問津索塗矣雖然知安胎則不可不調氣知消瘀則不可不扶虚枳殻香附陳皮以調氣也當歸川芎黄耆人參以扶虚也退熱則柴胡黄芩解肌則紫蘇乾葛滋腸則麻仁枳殻助陽則乾薑良薑其間採摭雖未補古人之經然而甘辛為陽酸苦為陰皆不越古人之意姑存之篇末以便學者之觀覽云男子婦人傷寒仲景治法别無異議比見民間有婦人傷寒方書稱仲景王叔和為之序以法考之間有可取疑非古方特假聖人之名以信其說寡婦之病自古未有言者惟倉公傳與褚澄略而論及言寡婦者孟子正謂無夫曰寡是也如師尼孀婦獨陰無陽欲男子而不可得是以懨懨成病也易曰天地絪緼萬物化醇男女媾精萬物化生孤陽獨陰可乎夫既處閨門慾心萌而不遂致陰陽交爭乍寒乍熱有類瘧疾乆則為勞又有經閉白淫痰逆頭風膈氣痞悶面䵟疲倦等證皆寡婦之病証其脈獨肝脈弦出寸口而上魚際究其脈候其疾皆血盛而得經云男子精盛則思室女人血盛則懷胎觀其精血思過半矣方桂枝紅花湯出大全良方治婦人傷寒發熱惡寒四肢拘急口燥舌乾經脈凝滯不得往来桂心桂枝亦可二兩芍藥二兩甘草三兩紅花二兩右㕮咀每服五錢水一盞半薑四片棗六箇煎七分去渣温服良乆冄服汗出而解黄芩芍藥湯出活人書療婦人傷寒口燥咽乾腹滿不思飲食黄芩白芍白术生乾地黄各一兩右㕮咀每服半兩水一盞煎七分去渣温服寒則加生薑當歸湯出活人書治婦人傷寒喘急煩躁或戰而作寒隂陽俱虗不可下柴胡白术人參甘草赤芍藥當歸各二兩五味子木通各半兩右㕮咀每服半兩水一盞半生薑四片棗二枚煎八分去渣熱服㵼心三黄湯出大全良方治婦人傷寒六七日胃中有燥屎大便難煩躁譫語目赤毒氣閉塞不得通川大黄䑕尾黄芩鷹爪黄連等分右為粗末每服四錢水一盞煎至八分去滓温服取微利如目赤睛疼宜加茯苓嫩竹葉㵼肝之餘氣増損理中丸大小陷胷湯丸不愈者宜與之人參白术栝蔞牡蠣各二兩甘草炒三兩乾薑炮一兩半枳實炒二十四箇黄芩去枯一兩右為末煉蜜為丸如弹子大湯一盞煎服不歇與之不過五六胷中豁然矣用藥神速未嘗見也渴者加栝蔞根汗者加牡蠣無枳實用枳殻亦可桂枝加芍藥當歸湯出拔萃方治婦人傷寒脈浮頭腫自利腹中切痛不可忍桂枝芍藥當歸各一兩右剉細每服一兩水煎服荆芥散出濟生拔萃方二三日後經水復行前證俱退宜小柴胡湯一料加荆芥穂五錢右用枳實麩炒去穰五錢為粗末同小柴胡湯法防風湯出濟生拔萃方三二日後宜正脾胃之氣兼除邪蒼术四兩防風三兩當歸一兩羌活一兩半右為粗末水煎服麻黄加生地黄湯出濟生拔萃方治婦人傷寒脈浮而𦂳頭疼身熱惡寒無汗發汗後恐熱入血室麻黄二兩半桂枝一兩甘草半兩杏仁二十五箇去皮生地一兩右剉細每服五錢水煎服小柴胡加葛根湯出濟生拔萃方治婦人傷寒太陽經𫝊表証仍在而自利併陽明也柴胡一兩甘草六錢大棗二枚人參二錢黄芩去枯三錢生薑三分葛根三分右剉細毎服一兩水煎服桂枝加附子紅花湯出濟生拔萃方治婦人傷寒頭痛