可作丸子吞下又方出直指方治婦人傷寒嘔逆血繼而齒縫皆流血不止開口川椒四十九粒右用法醋一大盞同煎臨熟入白礬少許𠻳口含在口中少頃吐出冄啜𠻳而含之又方出本草治婦人傷寒得病雖差未滿百日不可與交合為隂陽之病必筋脈拘急手足拳欲死丈夫病名為隂易婦人病名為陽易速當下之可痊滿四日不可療宜令服此乾薑四兩右為末湯調連服以衣被出汗方解手足神安而愈熱入血室附論夫傷寒熱入血室何以明之室者屋室也謂可以停止之處人身之血室者榮血停止之所筋脈拘㑹之處即衝脈是也衝脈者竒經八脈之一脈也起于腎下出于氣衝足陽明經之血朝㑹于此男子則運行之女子則上為乳汁下為血水内經曰任脈通衝脈盛月事以時下者是也王冰曰隂靜海滿而去血謂衝脈盛為海滿也即是觀之衝是血室可知矣傷寒之邪婦人則隨經而入男子由陽明而傳以衝之脈與少隂之絡起于腎女子感邪太陽隨經便得而入衝之經並足陽明男子陽明内熱方得而入也衝之得熱血必妄行在男子則下血讝語在婦人則經水適來陽明病下血讝語此為入血室者斯概言男子不止謂婦人而言也婦人傷寒經水適来與經水適㫁者皆以經氣所虚宫室不閟邪氣得乗虚而入針經有言曰邪氣不得其虚不能獨傷人者是矣婦人熱入血室有須治而愈者有不須治而愈者又各不同也婦人發熱中風惡寒經水適來得之七八日熱除而脈遲身凉和骨脇下滿如結胷狀讝語者此為熱入血室當刺期門隨其實而瀉之與其婦人中風七八日續得寒熱發作有時經水適㫁者此為熱入血室其血必結故始如瘧状發作有時小柴胡湯主之者是須治而愈者也婦人傷寒發熱經水適來晝則明了暮則譫語如見鬼状者此為熱入血室無犯胃氣及上二焦必自愈是不須治而愈者也讝語為病邪之甚者何不須治而愈耶且胷脇滿如結胷謂是邪氣留結于胷脇而不去者必刺期門隨其實而瀉之寒熱如瘧發作有時者是血結而不行者須小柴胡湯散之既胷有留邪必須治之可也若發熱經水適來晝日明了夜則譫語此則經水既来以裏無留邪但不妄犯熱隨血散必自愈經曰血自下者愈故無犯胃氣及上二焦自愈所謂妄犯者謂恐以譫語為陽明内實攻之犯其胃氣也此無胷脇之邪恐刺期門犯其中焦也此無血結恐與小柴胡湯犯其上焦也小柴胡湯解散則動衛氣衛出上焦動衛氣是犯上焦也刺期門則動榮氣榮出中焦動榮氣是犯中焦也脈經有曰無犯胃氣及上二焦豈為藥不謂針耶此其是與方小柴胡湯一名參湯出衛生寳鑑治婦人傷風七八日續得寒熱發作有時經水適㫁此為熱入血室其血必結故使如瘧状日晡特甚如見鬼神亦治産後惡露方來忽時㫁絶柴胡八錢半夏二錢黄芩人參生乾地黄甘草各三錢右剉每服五錢水盞半薑三片棗二枚煎八分去渣温服一婦人病傷寒熱遇夜則見鬼状所患六七日忽胷塞涎響如引鋸牙闗𦂳急瞑目不知人疾勢極微召予視曰得病之初曽阻月經来否其家云經方來病作而遂得經一二日發寒熱晝雖靜夜有鬼祟從昨日来不省人事予曰此熱入血室仲景云婦人中風發熱熱入血室制以柴胡加生地黄湯服之而熱除不汗而自解矣乾薑柴胡湯出永類鈐方治婦人傷寒經脈方来初㫁寒熱如瘧狂言見鬼柴胡四兩桂枝一兩半栝蔞根牡蠣乾薑甘草各一兩右㕮咀每服五錢水盞半煎至七分去滓温服初服微煩再服汗出而愈海蛤散出活人書治婦人傷寒血結胷膈揉而痛不可撫近者宜服之凡治血結胷法當針期門仲景無方此方疑非仲景然其言有理姑存焉海蛤滑石甘草各二兩芒硝一兩右為細末每服二錢鷄子清調下小腸通利則胷膈血散膻中血聚則小腸壅小腸既壅則膻中血不流行宜此方小便利血數行更宜桂枝紅花湯發其汗自愈又治婦人傷寒三五日七八日月經當行或經水纔去作寒熱譫語見鬼日輕夜甚此乃熱入血室右四物加柴胡煎如不退用小柴胡湯入生地黄煎服小柴胡加牡丹皮湯出拔萃方治婦人傷寒身熱脈長而弦属陽明少陽往來寒熱夜躁晝寧如見神状經水適斷熱入血室大實滿者桃仁承氣湯實者宜服此柴胡二兩黄芩七錢半人參二兩半夏六錢大棗三枚甘草七錢半生薑七錢半牡丹皮二兩右剉細每服一兩生薑一同煎甘草芍藥湯出拔萃方治婦人傷寒凡陽標病汗解表除邪熱内攻熱入血室經水過多無滿實者甘草芍藥生地黄川芎四味各一兩右剉細每服一兩水三盞煎至一盞半去滓入櫚灰五錢調匀温服不止者刺隠白乾地黄湯出活人書治婦人傷寒差後猶有餘氣不調之遺熱乾地黄一兩大黄黄連黄芩柴胡白芍藥甘草各兩半右㕮咀每服四錢水一盞半煎七分去滓温服取溏三黄丸出危氏方治婦人傷寒棄衣而走不避親疏妄言罵語右即以三黄丸别研辰砂為衣新汲水下十丸効未効再服牛黄膏治熱入血室發狂不認人者牛黄二錢半朱砂鬰金各二錢腦子甘草各一錢牡丹皮二錢右為細末煉蜜為丸如皂子大新汲水化下紫苑湯治婦人熱入血室身熱發作有時咳痰脇下痛嗜臥不食紫苑一兩續斷炙熟地黄桔梗各二兩五味子竹茹赤豆甘草桑白皮各一兩右九味以水七升煮取六升去滓再煮取三升温服一升生地黄湯治婦人熱入血室其血不止者生地黄續㫁白术各一兩甘草紫菊葉各半兩右五味以水三升煮取一升五合去滓温服五合霍亂附論夫嘔吐而利者名霍亂也原疾之起皆由腸胃虚冷飲食逆度觸胃氣風冷使隂陽不和清濁相干致令揮霍變亂也或先心痛而吐者或先腹痛而利者或吐利俱作或頭痛身體壮熱而脈浮洪者或陽氣暴絶而手足逆冷而脈息微絶者治之當分其隂陽察其虚實辨其冷熱觀其脈息熱者凉之冷者温之以平為期凡霍亂吐利熱多而渴者五苓散寒多不飲水者理中丸吐利已汗出而厥四肢拘急不解脈微欲絶者通脈四逆加猪膽汁湯夏月中暑霍亂煩渴四肢逆冷服即効丸霍亂之脈得浮洪者易治微遲者并氣短者難治方訶子散治老幼霍亂吐利一服取効及治九種心痛并心腹冷痛不可忍者訶子甘草厚朴乾薑草果仁陳皮良薑茯苓神麯麥芽各等分右為細末每服二錢候發刺痛不可忍用水一盞煎七分入鹽服急則鹽㸃甘草㵼心湯治婦人霍亂嘔逆吐涎沬醫反下之心下即痞當先治其涎沬可服小青龍湯涎沬止次治其痞甘草四兩乾薑黄芩各三兩黄連一兩半夏半斤大棗十二枚右㕮咀以水一斗煮取六升分六服加减理中丸治霍亂臨時亦可治男子人參白术乾薑甘草各一兩右為細末煉蜜為丸每兩作五丸取湯和一丸服之吐多利少者取枳實三枚炙去穣四破水三升煮取一升和一丸服之吐少利多者加乾薑一倍吐利乾嘔取半夏半兩泡洗去滑水二升煮取一升和丸服若疼痛不可堪者水三升煮棗三枚取一升和丸服若吐利太劇轉筋者以韭汁洗外腎從胷至足踝勿逆即止若體疼微汗腹中寒取附子一枚炮去皮四破以水二升煎一升和服一丸吐利悉止脈下出體猶冷者可服諸湯補之四逆加猪膽汁湯治吐已下㫁汗出而厥四肢拘急不解脈微欲絶者甘草二兩乾薑三兩附子一枚生猪膽汁半合右㕮咀每服五錢水三盞煮至二盞去滓内猪膽汁分作兩次温服其脈即來香薷散治臓腑不調飲食不節或食腥鱠生冷過度起居不節或露卧濕地或當風取凉而風冷之氣歸於三焦傳於脾胃得冷不能消化水穀致令真邪相干腸胃虚弱因飲食變亂於腸胃之間便至吐利心腹疼痛霍亂氣逆有先心痛而吐者或先腹痛而利者有吐利俱發者有發熱頭痛體疼而復吐利虚煩者或但吐利心腹刺痛者或轉筋拘急疼痛者或但嘔而無物出者或四肢逆冷脈微欲絶者或煩悶昬塞欲死者姙婦霍亂吐利能主之香薷葉四兩白扁豆厚朴各二兩右㕮咀每服半兩水一盞酒一分慢火濃煎至六分去渣冷水浸冷頻服無時候連進二三服効一方加黄連四兩用薑汁炒令黄色名黄連香薷散如搐搦加羌活煎胡椒湯治霍亂吐利胡椒四十九粒緑豆一百四十七粒右為細末木𤓰煎湯調下二錢又方治霍亂困篤取用童女月經衣和血燒灰酒服方寸匕普濟方卷三百十八
