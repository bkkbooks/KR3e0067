body:
  text: 普濟方卷三百十八明周王朱橚撰婦人諸疾門血風體痛附論夫婦人血風身體骨節疼痛者由體虚氣血不調為風冷所侵故也其狀風邪在於皮膚肌肉厯於骨節與正氣相擊故令疼痛也方當歸湯出聖恵總録治婦人血風身體百節痛疼乍寒乍熱經脈不利日漸羸瘦當歸焙黄耆牛膝酒浸焙枳殻麩炒芎藭羌活去蘆人參附子炮裂去皮臍芍藥木香檳榔桔梗炒牡丹皮去心沈香甘草炙地骨皮半夏薑汁製炒各一兩桂心柴胡二兩蓬术煨一兩半熟地黄焙二兩橘紅一兩半荆芥穂鼈甲去帬邉醋炙各二兩右㕮咀每服三錢水一鍾生薑三片棗二枚葱二寸煎至七分去滓温服馬鞭草散治婦人血攻肢體疼痛或覺麻痺乍寒乍熱飲食减少並皆治之馬鞭草去梗荆芥穂北柴胡烏梅肉各二兩枳殻白芷羌活白芍藥各一兩秦芁烏藥麻黄木香各半兩當歸川烏炮甘草各一兩右㕮咀每服三錢水一鍾生薑三片棗二枚葱白二寸連鬚煎至七分日午臨睡温服常服無時有孕亦可服虎骨散出聖恵方治婦人血風攻注肢體疼痛虎脛骨一兩半酥炙黄桂心一兩芎藭一兩牛膝一兩去毛海桐皮二兩羌活半兩當歸一兩炒天麻一兩附子一兩炮裂去皮臍骨碎補一兩没藥一兩琥珀一兩木香半兩麝香一分研入右為細末研令勻每服二錢不拘時温酒調服芎藭散治婦人血風身體疼痛心胷壅滯少思飲食川芎一兩赤茯苓赤芍藥酸棗仁炒三錢細辛羌活桂心當歸木香牛膝各三錢枳殻甘草各半兩右㕮咀每服三錢水一鍾薑三片煎至七分去滓不拘時服一方名大芎散羚羊角散出聖恵方治婦人血風身體疼痛手足無力心神煩悶羚羊角屑酸棗仁炒乾地黄檳榔各一兩五加皮防風赤芍藥各三分甘草半兩骨碎補炒當歸海桐皮川芎各三兩右為細末每服二錢温酒調服一方為散每服三錢水一鍾煎至六分稍熱服一方加生薑三片煎服茯神湯出聖濟總録治婦人血風頭目昏眩身體疼痛怔忡躁煩手足心熱兼治傷寒茯神去木蔓荆子赤茯苓枳殻麩炒各二兩麻黄去節一兩半防風黄芩芎藭石膏羌活去蘆獨活甘草炙各一兩右㕮咀每服三錢水一盞生薑五片薄荷五葉煎八分去滓熱服牛膝散出聖恵方治婦人血風攻注身體疼痛發渴不止四肢無力牛膝一兩附子三分炮裂去皮臍萆薢三分五加皮三分丹參三分當歸一兩炒桂心一兩海桐皮一兩芎藭一兩枳殻一錢麩炒仙靈脾三分甘草半兩炙右㕮咀每服三錢水一鍾薑三片煎七分去滓不拘時熱服海桐皮散出聖恵方治婦人血風身體疼痛骨節發熱作渴不止海桐皮桂心白芷當歸炒漏蘆羚羊角屑川芎各一兩赤芍藥半兩没藥木香檳榔川大黄煨各半兩右為細末每服二錢不拘時温酒調服當歸散出聖恵方治婦人血風身體疼痛筋脈拘急當歸半兩炒虎脛骨半兩酥炙附子半兩炮裂去皮臍桂心半兩水蛭半兩炒羚羊角屑半兩防風去蘆萆薢各半兩牛膝半兩川芎半兩琥珀三分研細羌活半兩右為細末每服二錢豆淋酒不拘時調服骨碎補散治婦人血風身體疼痛腰足無力骨碎補海桐皮芎藭仙靈脾側子各一兩當歸白蒺藜炒去刺羌活桂心木香桃仁湯泡去皮尖雙仁炒枳殻各三分麩炒右為細末每服一錢豆淋酒不拘時調服何首烏散出聖恵方治婦人血風身體疼痛手足麻痺腰骻沈重牽拽不隨何首烏羌活當歸羚羊角屑赤箭附子炮裂去皮臍桂心赤芍藥芎藭各三分牛膝一兩防風半兩威靈仙一兩右為細末每服二錢豆淋酒不拘時調下琥珀丸出聖恵方治婦人血風身體百節疼痛琥珀麒麟竭敗龜板炙地龍炒當歸檳榔各一兩安息香硃砂水飛過木香没藥各三分雄黄半兩水飛過麝香一分别研右為細末研令勻煉蜜搗二三百杵丸如菉豆大每日空心酒下二十丸晚又一服鼈甲散出聖濟總録治婦人血風攻注百節疼痛或因打撲瘀血不散遇天陰雨冷四肢痠痛諸般風滯經水不通等疾鼈甲醋炙虎骨酒炙各三兩漏蘆當歸炒桂心炙川芎各半兩天雄炮裂去兩皮臍一羌活一兩牛膝酒浸焙没藥各一兩右為細末一服二錢温酒調服鼈甲散治婦人血風身體疼痛胷脇脹滿心煩熱躁筋脈拘急經水不利虚勞等疾鼈甲去帬邉醋炙大黄炒羌活硝石枳殻麩炒當歸炒芎藭吳茱萸同黒豆炒去豆不用檳榔煨牛膝酒浸焙各半兩右㕮咀每服三錢水一鍾薑五片煎至七分去滓不拘時温服芎藭湯出聖濟總録治婦人血風攻注身體疼痛頭目昏眩口苦舌乾多困少力時發寒熱之症芎藭芍藥牡丹皮各一兩羌活甘菊花防風甘草炙各二兩柴胡半夏薑汁製作餅子曝乾各一兩右㕮咀每服三錢水一鍾生薑三片薄荷五葉煎七分去滓温服羌活散出聖濟縂録治婦人血風勞倦身體百節疼痛疾羌活一兩附子一枚炮裂去皮臍牡丹皮芍藥海桐皮當歸焙桂心蒲黄各半兩右為末每服一錢温酒調下日三五服治婦人血風渾身疼痛脾寒骨蒸馬鞭草柴胡秦芁當歸乾漆炒去烟為度青蒿子荆芥甘草各等分右㕮咀每服三錢水酒各一鍾半烏梅半箇桃栁枝三寸薑棗煎八分温服羌活散治婦人血風身體骨節發歇疼痛羌活三分桂心三分敗龜板三兩塗酥炙令黄骨碎補道人頭三分虎脛骨二兩酥炙黄没藥三分地龍三分炒紅花子三分炒右為細末每服二錢不拘時温酒調服没藥羌活散治婦人血風四肢疼痛不思飲食没藥研羌活桂心山茱萸赤芍藥牡丹皮附子炮裂去皮臍各半兩右為細末每服二錢温酒調下若病甚者用童子小便生地黄汁半盞同前藥煎至八分温服愈痛丸治身疼腰痛姙娠亦如之續斷杜仲炒斷絲山藥川芎獨活狗脊火燎去毛酒浸一宿焙乾萆薢酒浸焙乾急用不浸各等分右為細末酒糊為丸梧桐子大每服五十丸空心塩酒下孕婦阿膠湯送下腰痛者有腎經虚損風冷乗之而疼者有勞役過多而疼者有飽食而臥此則成腰脊重而疼者腎有濕也但陽病難免陰病則腰痛之病此因腎氣不足宜服愈痛丸姙娠腰痛者損勞腎傷動其候風寒所侵血氣相搏婦人腸繫胞絡腰疼孕難安保愈痛丸主之産後腰間所苦既産而有所損耗腎經氣血暴傷風邪得入因而留滯故令腰疼宜服愈痛丸芍藥知母湯出大全良方治諸節痛疼身體魁肥脚腫如脫頭眩失氣温温欲吐者服之桂心知母防風各四兩芍藥甘草麻黄去節泡附子炮各三兩右㕮咀每服四錢水一鍾半薑五片煎至七分去滓空心服一方用白术川芎杏仁半夏羌活散出聖濟總録治婦人血風身體發歇疼痛羌活去蘆桂心没藥虎脛骨酥炙骨碎補去毛紅花子炒各一兩右㕮咀為細末每服二錢不拘時温酒調服羌活當歸散出聖濟縂録治婦人血風身體發歇疼痛羌活當歸焙白茯苓桂心没藥虎脛骨酥炙骨碎補去毛酒浸焙紅花子各一兩右為散每服二錢空心温酒調下仙靈脾散出聖恵方治婦人血風身體疼痛不止仙靈脾虎脛骨酥炙附子一兩炮裂去皮臍躑躅花二兩醋炒防風一兩去蘆牛膝右為細末每服一錢不拘時温酒調服當歸没藥散出大全良方治婦人血風血氣腹脇刺疼筋攣骨痺手足麻木皮膚瘙痒當歸五靈脂炒没藥各一兩右為末醋糊丸如梧桐子每服三十丸空心薑湯送下四生丸出大全良方治婦人血風骨節疼痛臂擡舉不起足行履不得半身頑麻白殭蠶炒地龍去土白附子五靈脂草烏去皮尖各等分右為細末米糊為丸梧桐子大每服二十丸茶酒任下或作末酒調半錢亦可何首烏丸出經驗濟世方治婦人血風乆虚風邪停滯手足痿緩肢體麻痺皮膚瘙癢並五痔下血何首烏一斤赤白各半芍藥二兩赤白各半右為細末煮麵糊和丸如梧桐子大一服三四十丸空心米飲送下血風走疰附論夫婦人體虚受風邪之氣隨血而行或淫泆皮膚卒然掣痛遊走無有常處故為走症也加減小續命湯主之方牛膝散出聖恵方治婦人血風走疰腰脚疼痛不可忍牛膝一兩虎脛骨二兩酥炙赤芍藥一兩琥珀一兩桂心一兩當歸一兩炒芎藭没藥麒麟竭各一兩乾漆二兩炒去烟防風一兩木香半兩地龍半兩炒酸棗仁一兩炒生乾地黄一兩羌活一兩右為細末每服一錢不拘時酒調温服海桐皮湯治婦人血風攻疰四肢無力勞倦頭目昏眩背項拘急骨節疼痛海桐皮桂心木香天麻人參羌活去蘆獨活去蘆牛膝酒浸焙金毛狗脊石斛去根黄耆防風去蘆鼈甲去裙邉醋炙萆薢麻黄去節各三分右為散每服三錢水一鍾薑二片煎至八分去滓少熱服如傷寒頭疼壮熱入葱白煎兩服汗出愈獨活湯出聖濟縂録治婦人血風攻疰脚膝虚腫或上焦不利獨活去蘆桂心芎藭白术防風去蘆茵芋人參枳殻麩炒海桐皮甘草炙半兩薏苡仁一兩附子炮裂去皮臍麻黄去節滚水泡赤茯苓牛膝酒浸微焙三分右㕮咀每服三錢水一盞薑半分煎七分不拘時温服骨碎補散出聖濟縂録治婦人血風攻注身體疼痛手足􅍙痺筋脈拘急或時寒熱經脈不調骨碎補一兩乳香一兩没藥一兩半青橘皮湯泡去白一兩半木香一兩甜𤓰子炒一兩乾漆炒去烟一兩半自然銅醋煅七次一兩木鼈子去殻一兩半蒼术米泔水浸炒一兩半乾薑炮芫花醋浸一日炒焦血竭各一兩右為末醋糊為丸如梧桐子大每服七丸空心温酒調下醋湯亦可日三服天麻散出聖濟縂録治婦人血風毒氣内外走注皮膚骨節寒熱疼痛燥澀麻木不仁者並皆服之天麻芎藭羌活防風去蘆當歸焙蒺藜炒去刺桂心白附子炮全蠍炒天南星炮烏頭炮裂去皮枳殻麩炒地骨皮各半兩麻黄去節半兩麝香少許半錢右為細末每服一錢薄荷湯調不拘時服枳殻羌活散治婦人血風攻疰四肢麻木瘙癢如有蟲行或肌肉赤腫疼痛肩背拘急神情倦怠枳殻麩炒二兩羌活去蘆牡荆實人參一兩半防風二兩甘草一兩牡丹皮二兩半芎藭芍藥白茯苓白芷各二兩細辛當歸各一兩右為末煉蜜和丸如彈子大一服一丸滚白湯細嚼呷之漏蘆散治婦人血風走注疼痛無常漏蘆當歸三分桂心地龍炒去土防風羌活白芷没藥各半兩牛膝三分虎脛骨酥炙一兩甜𤓰子半兩敗龜板一兩醋炙右為細末每服二錢不拘時調服當歸散治婦人血風攻疰百節疼痛皮膚虚腫筋脈拘急或生病丙穩禾疹寒熱不時飲食無味當歸焙延胡索蒲黄炒川芎赤芍藥生地黄焙澤蘭葉天麻地榆醋炒桂心滑石各一兩蓬术煨一兩右為末每服二錢温酒調下或薄荷茶清下如手足卒冷氣血奔心痛薑酒下麝香没藥散治婦人血風攻疰毒氣遊走肢體疼痛麝香一分没藥半兩敗龜板酒炙二兩牡丹皮芍藥骨碎補一兩麒麟竭枳殻麩炒各半兩當歸焙甜𤓰子炒各一兩虎脛骨酒炙二兩自然銅醋煅七次半兩右除麝香没藥外為散和勻每服一錢豆淋酒調下日三服没藥散出聖恵方治婦人血風走注肢節疼痛發歇來往不定没藥乳香芎藭當歸桂心漏蘆木香各半兩琥珀白芷地龍炒去土各三分麝香安息香各一分右為細末研令勻一服一錢温酒調服琥珀散治婦人血風走注疼痛往來發歇琥珀當歸川大黄各三分桂心牛膝各一兩没藥麒麟竭延胡索防風羌活乾漆羚羊角屑各半兩右為散每服一錢酒調服雄黄散治婦人血風走注疼痛雄黄半兩烏蛇二兩酒浸去皮骨炙地龍半兩炒蛜􅀈半兩生用麒麟竭半兩赤箭半兩附子半兩炮裂去皮臍桂心半兩没藥半兩木香半兩麝香一分白芥子半升右為細末研令勻每服一錢酒調服地黄散治婦人血風走注氣冷不調四肢麻木頭目浮腫生地黄牛膝酒浸蒲黄炒川芎當歸桂心劉寄奴延胡索烏頭炮裂去皮臍白芍蓬术煨各一兩右為末每服二錢酒調服虎骨散出聖恵方