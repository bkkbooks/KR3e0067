分三服數數服之盡服合之嘔止乃停取㣲汗有熱减桂心一兩忌生葱一方葛根二兩橘皮甘草湯出肘後方治嘔噦不止病源伏熱在胃令人胸滿則氣逆氣逆則噦若大下後胃氣虛冷亦令致噦也甘草一兩炙橘皮三兩升麻半兩生薑三兩右以水三升煮取一升盡服之日三四作當止忌海藻菘菜麥門冬飲子治嘔逆麥門冬去心蘆根人參各一兩右以水六升煮取二升七合去滓分温五服徐徐服常用有騐又方右飲生薑汁三二合大良又方右枇杷葉去毛煮飲之作粥亦佳又方右研油麻煮菉豆令爛取半升許以手掌大蝟皮燒作灰篩之内豆中和食蘆根飲治傷寒後嘔噦反胃乾嘔不下食生茅竹根竹茹各三兩生薑四兩大棗十二枚右㕮咀先將舊草鞋一隻净洗以水煮汁澄清毎服三大錢藥水一盞半煎至七分去滓服人參訶子㪚出王氏博濟方治傷寒氣不順食嘔胷不和有時洩㵼人參乾葛地黄厚朴各二分去皮丁香一分訶子七枚荳蔲一箇去殻皮右為細末以水一盞末二錢入生薑棗同煎至五分熱服橘皮竹茹湯出活人書治嘔逆橘皮二兩竹茹一升甘草三兩炙人參半兩半夏一兩湯洗右剉如麻豆大毎服五錢生薑六片棗一枚以水二大盞煎至一盞去滓温服日三服金匱方無半夏橘皮乾薑湯出活人書治噦橘皮通草乾薑炮桂心各二兩人參一兩甘草半兩右剉麻豆大毎服四錢水一盞煎至六分去滓温服日三服奪命沈香㪚出王氏博濟方治傷寒嘔逆結痞心胷真氣虚弱脉息沈細正氣補元沈香一兩舶上茴香青橘皮去穣胡椒蓽澄茄川練子陳橘皮去穣各一兩右為細末如患者但得心頭有氣未斷亦可服之二錢葱白三寸劈破入酒并童子小便各半盞同煎至六分放温和滓服患沉重者不過三服氣正脉生傷寒咳逆論夫咳逆者多重或水積於肺而心痞或連咳不已而氣逆或喜笑過多而氣逆或嚥飲錯喉而氣搶或急食乾物而氣塞皆能作咳逆之聲也呼謂之吃忒是也皆氣不得下為火熱托之而使上至咽喉中噎而止也人或以紙撚鼻因嚏而止或詐寃盜物因恐而止或鼻聞香調氣而止皆抑之駭之調之而使氣下也千金以喘嗽咳逆上氣者為病肺脉㪚者是心火形於肺金也心之肺謂之死隂死隂之属不過三日死以其形見乎損傷故也此説甚優易老謂渇逆者火熱奔急上行而肺隂不内何其當哉故便閉者大承氣湯下之便軟者㵼心湯主之也又論隂症咳逆云夫陽症咳逆者胃熱失下也隂氣先絶陽氣後亦將竭火獨炎上逆出隂氣而為欬逆隂症者内已伏隂隂氣太甚腎水擅權肝氣不生胃大已病丁火又消所謂逰行相火寒邪迫而萃集於胸中亦欲盡矣故令人發熱大渇引飲并去盖覆病人獨熱若他人按執之身體肌肉骨髓血脉皆寒此火即無根火也故用丁香乾薑之類熱藥温胃其火自下咳逆方止非若凉膈㵼心以治陽症自上而下㵼退心火隂氣乃生隂症咳逆從嘔噦而生胃寒嘔噦不已渴逆繼之仲景有傷寒咳逆上氣脉㪚者死謂其形損故也少隂渇逆者失下也隂消将盡陽逆上行使隂不内也謂之惡候或兼以舌彎語言不正而反昏胃與咽喉痛者少隂也速下之宜大承氣湯若陽極脉微将盡者不宜下宜㵼心湯養隂退陽而已不如用㵼心湯凉膈去硝清肺亦可若飲水過多心下痞而渴逆者五苓㪚主之别無惡物是也歌曰咳逆皆因胃有寒此名惡候古今傳橘皮半夏并薑附不瘥依方灸乳邊橘皮乾薑湯半夏生薑湯羌活附子㪚是也不瘥即灸之婦人屈乳頭向下盡處骨間丈夫乃乳小者以一指為率男左女右艾炷如小豆許三壮䧟中有動脉是穴症治論云嘔噦手足逆冷者用小橘皮湯嘔噦胷滿虛煩不安大橘皮湯又歌曰小柴胡主陽家噦或用陳皮與竹茹腹滿須㸔前後部猪苓承氣莫相拘有陽症咳逆者小柴胡湯橘皮竹茹主之前後部乃大小便也前部不利調胃承氣湯陽明中風脉弦浮小便難潮熱而噦者小柴胡加茯苓湯咳逆俗謂之噫古人謂之噦盖胃氣本虚吐下大過或復與之水發其汗胃氣虛逆噫噦生為病勢至此極矣雖然咳逆出於噦寒固也其有水挾寒氣擊摶而成者則茯苓半夏逐水主噫官桂丁香下氣禦寒又有熱氣擁欝氣不得通者也小柴胡湯加生薑自有條列惟是噦而腹滿不得小便或後部不通此為真病雖有神醫亦末如之何易簡論傷寒咳逆為篤症他病見之亦然以半夏生薑湯主之又方丁香柿蔕煎湯調蘇合香丸大抵咳逆不可不止救藥是水氣乗肺亦主噫逆為咳當以表水裏治之方勻氣㪚出濟生拔萃方治隂症咳逆川烏頭大者三箇炮製去皮臍右為細末毎服二錢黑豆二十一粒沙糖雞頭子入水煎成熟細細飲之治傷寒心下虛噎不下服諸藥不效者右用石蓮子肉一兩為末毎服二錢白湯下治傷寒塞噎不住枳殻陳皮各等分右剉水一大碗煎至七分温服肉荳蔲湯出本事方治傷寒汗後吃噎肉荳蔲一箇石蓮肉炒茴香各一分丁香半分人參半兩枇杷葉五片拭去毛炙右剉細用水四盞生薑十片煎二盞去滓空心温分二服良薑湯出本事方橘皮良薑桂枝當歸各一兩麻黄半兩杏仁二十甘草一分㯽榔三箇右為末用水四盞姜十片棗十枚同煎至二分去滓下㯽榔末更煎三服一盞未已再作一劑易老云傷寒吃噎不止是隂陽氣升降欲作汗升之不下故胃氣上逆為吃噎無休止宜此方又方出本事方枳殻半兩木香一錢右為細末毎服一錢白湯調下一方出肘後方治傷寒咳噫不止嘔逆不定丁香一兩柿蔕一兩右焙乾搗末人參煎湯下數升無時服加味柿蔕湯出徳至堂治傷寒發熱噫逆氣噎虛煩不得睡卧熱多小柴胡湯加乾柿蔕七個煎依柴胡湯飲子為妙渇熱生料五苓散加乾柿蔕七個柴胡一錢同煎無大熱體虛氣不調噫逆者止用人參半兩加柿蔕一十五個水一盞半煎至