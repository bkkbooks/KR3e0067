葱白五寸豉一百粒煎至八分去滓食後温服犀角湯出聖濟總錄治傷寒後心臓虛熱滿口生瘡犀角鎊𤣥參各一兩胡黄連甘草炙剉各五錢右麄搗篩毎服五錢水一盞半竹葉二七片煎至半盞去滓食後温服蒺藜㪚出聖濟總錄治傷寒後脾壅唇口常有瘡蒺藜子炒去角白扁豆炒各一兩右搗羅為㪚毎服一錢如茶㸃服不拘時地黄煎出聖濟總錄治傷寒心熱口舌生瘡生地黄汁三合蜜五合右攪勻慢火煎如稠餳毎服半匙含化徐徐嚥津不計時大青飲治傷寒後口生瘡咽喉腫塞大青去根一兩呉藍半兩去根石膏研一兩芍藥一兩右搗篩毎服三錢用水一盞入葱白鹽䜴各少許煎至六分去滓食後臨卧温服升麻六物湯出活人書治口瘡赤爛升麻梔子仁各錢半大青杏仁黄芩各等分右為末以水一盞半葱白三莖煎至八分去滓温服療傷寒熱病口瘡出本草右用黄蘖皮削去上粗皮取裏好處薄削以崖水漬之一宿唯欲令濃含其汁良久吐更含若胸中熱有瘡時飲三五合尤佳聖恵方同方煎十餘沸濾去滓候温含傷寒吐血論夫傷寒吐血者熱在陽經邪盛於表應汗不汗熱毒入深結於五臓遂成瘀熱熏於上焦熱隨氣行併入胃中胃得血則滿悶氣逆故吐血也歌曰皆因邪熱中三陽當汗醫家失料量熱毒入深留五臓故成吐血可驚惶言當汗失汗也返致熱毒入深故吐血也瘀血盛者抵當丸輕者桃仁承氣湯兼服犀角地黄湯症治論三黄㵼心湯蘖皮地血㪚大下後寸脉沈遲尺脉不至咽喉不利唾膿血者麻黄升麻湯桂枝吐者其後必吐膿血犀角地黄湯吐血諸陽受熱邪表家不發咎醫家因而熱毒流於臓地血三黄劑可嘉諸陽受熱其邪在表當汗不汗致使熱毒入臓積瘀於内遂成吐血盖傷寒失汗則邪熱化為惡血藴毒不除亦能蒸腐其血凡眼閉目紅神昏語短心忪痛悶眩冒迷忘漱水躁煩嘔吐喘促驚狂譫語鼻􅀈吐紅脊冷足寒骨熱膚開四肢厥逆多汗頑痰胷脇小腹滿急大便黒而微利小便多而不禁此等皆瘀血症也男女切有此血脉婦人傷寒尤多見之以其得病於經水來去之期或受病中間經水適至耳血之為痛大抵夜重日輕或晝明而暮譫語血属隂從其類也前症不必悉具但見三分曉便作血症主張犀角地黄湯小柴胡湯桃仁承氣湯三黄湯凡酌量輕重用瘀血結其抵當湯丸主之以川芎為佐盡大便黒物則佳雖然傷寒略具便難救療况吐血乎凡吐血皆非輕症初病猶可用藥有陸續而來或經㪚時而復吐者斷不可救藥也方藥詳見解題用蘿蔔汁一小盞入新汲水煎茅花主之血熱者黄連阿膠湯症治論用地血㪚蘖皮湯三黄㵼心湯大下後寸脉沈遲尺脉不至咽喉不利唾膿血者麻黄升麻湯此有兩症一陽毒一少隂在陽毒則或用陽毒升麻湯在少隂則或用甘桔湯加生薑汁煮之方伏龍肝㪚出聖恵方治傷寒吐血心煩不食伏龍肝三兩生乾地黄一兩栢葉一兩阿膠一兩搗碎炒令黄燥黄芩一兩黄連一兩去鬚甘草兩半炙微赤剉茜根一兩右為㪚毎服四錢水一中盞煎至六分去滓不計時候温服蒲黄㪚出聖恵方治傷寒瘟病時氣疫毒及飲酒傷中吐血不止面黄乾嘔心煩止血又名蒲黄湯蒲黄􅌝􅌣一作桔梗犀角屑甘草炙微赤剉桑寄生各三兩葛根三兩剉右為㪚毎服五錢水一大盞煎至五分去滓不計時候服一方無􅌝􅌣治傷寒吐血不止出聖恵方伏龍肝甘草炙微赤剉茜根生乾地黄阿膠搗碎炒令黄燥黄芩已上各一兩右為㪚毎服四錢水一大盞入竹茹一分煎至六分去滓不計時候温服子芩㪚出聖恵方治傷寒吐血心神煩悶子芩三分梔子仁五錢逺志一分去心桂心五錢黄連三分去鬚右為㪚毎服四錢水一中盞煎至六分去滓不計時候温服又方一名黄連㪚出聖恵方黄連一兩去鬚荷葉一兩艾葉三分微炒栢葉三分右為㪚毎服四錢水一中盞煎至六分去滓入生地黄汁半合更煎一兩沸不計時候温服聖濟方用黄連一兩半艾葉五錢名黄連湯當歸㪚出聖恵方治傷寒吐血目眩煩悶當歸赤芍藥黄芩伏龍肝阿膠搗碎炒黄燥各一兩乾薑五錢右為㪚毎服四錢水一中盞煎至六分去滓不計時候温服生乾地黄㪚出聖恵方治傷寒心熱及餘毒不退吐血一二升不止生乾地黄一兩黄蘖三分剉黄芩一兩呉藍一兩黄連三分去鬚伏龍肝一兩麥門冬一兩去心右為㪚毎服四錢以水一中盞煎至六分去滓不計時候温服治傷寒心熱不止方伏龍肝一合紅藍花一合亂髮灰五錢右為㪚毎服五錢以水一大盞入竹茹一分煎至五分去滓不計時候温服茅根飲子出聖恵方治傷寒心肺熱因嗽吐血或嘔血宜服茅根三兩犀角屑一兩黄芩一兩桑根白皮二兩竹茹一兩刺薊兩半紫苑二兩洗去苗右為㪚毎服五錢水一大盞煎至六分去滓入生地黄汁一合更煎一二沸不計時候分温三服刺薊㪚出聖恵方治傷寒煩熱吐血不止刺薊一兩赤芍藥兩半茅根二兩麥門冬去心三兩焙犀角屑兩半甘草五錢生用右為㪚毎服五錢水一大盞煎至六分去滓入藕汁生地黄汁各五錢更煎一二沸不計時候分為二服栢葉㪚出聖恵方治傷寒吐血不止青栢葉一兩生乾地黄一兩阿膠一分搗碎炒令黄燥右為㪚水一大盞半煎至一盞去滓别攪馬通汁一合相和更煎一二沸不計時分温三服治傷寒壅極吐血百治不瘥方出聖恵方生地黄汁一中盞川大黄一分剉微炒右為㪚先煎地黄汁三五沸内大黄末調令勻不計時候温服麥門冬湯出聖濟總錄薺苨呉藍甘草炙剉黄芩去黒心茅根生乾地黄焙乾各一兩右麄搗篩毎服五錢水一盞半入豉百粒同煎至八分去滓食後温服地黄湯治傷寒熱病當發汗而不發内有餘熱鼻衂吐血不止面黄大便黒此方主消化瘀血兼治瘡癬熱得大盛以此解之生乾地黄焙芍藥犀角鎊各一兩牡丹皮三分右麄搗篩毎服五錢用水一盞半煎至一盞去滓食後温服有熱如狂者加黄芩三兩其人脉大來遲腹不滿自言滿者為無熱更不用黄芩大黄也犀角湯出聖濟總錄治傷寒吐血不止喜怒如狂熱毒不㪚内有蓄瘀犀角鎊一兩大黄剉炒三分芍藥黄芩去黒心各一兩牡丹皮三分生乾地黄焙一兩半右麄搗篩毎服五錢水一盞半煎至半盞去滓食後温服黄芩湯出聖濟總錄治傷寒吐血心神煩悶黄芩去黒心三分山梔子仁五錢逺志去心一分桂去粗皮五錢黄連去鬚竹茹各三分右麄搗篩毎服五錢水一盞半煎至一盞去滓食後温服三黄湯出聖濟總錄治傷寒後心氣不足吐血衂血及黄疸大黄剉炒黄連去鬚黄芩去黒心各一兩右麄搗篩毎服五錢水一盞半煎至八分去滓食後温服亦可作丸用煉蜜為丸如梧桐子大毎服十五丸白湯下紫河車㪚出聖濟總錄治傷寒吐血煩躁紫河車三分朴硝甘草各半兩生蛤粉一分右搗羅為㪚毎服二錢沙糖新汲水調下不計時候日三服金花㪚出聖濟總錄治傷寒吐血不止欝金甘草炙剉青黛各五錢右搗羅為㪚毎服二錢用鷄子白調下地黄㪚出聖濟總錄治傷寒吐血不止大黄剉炒搗末一兩龍腦研一錢右合研勻毎服二錢用生地黄汁調下人參湯出聖濟總錄治傷寒吐血下血及血汗人參芍藥桔梗剉炒芎藭當歸切焙桂去粗皮甘草炙剉各一兩竹茹三分右麄搗篩毎服五錢水一盞半煎至八分去滓食後温服治傷寒後餘毒不解心臓熱極吐血不止方出聖濟總錄生藕汁二合生地黄汁三合惡實根汁二合刺薊根汁二合蜜一合右相和攪勻毎服三合不計時候頻頻服栢葉湯金匱方治吐血不止者青栢葉三兩乾薑三兩切艾三把右以水五升煮取一升去滓别絞取新出馬通汁一升相和合煎取一升綿裹濾去之温分再服馬通是馬尿汁也一方有阿膠無艾黄土湯出金匱方治吐血下血先便後血此逺血也釜竈下黄焦土半升綿裏甘草炙乾地黄白术附子炮製阿膠炙末黄芩各三兩右切以水八升煮六味取三升去滓内膠令泮分三服忌海藻菘菜蕪荑猪肉桃李雀肉等物治傷寒嘔血而齒縫皆流血不止右用開口川椒四十九粒用法醋大盞同煎令熟入白礬少許漱口含在口中少頃出再啜漱而含普濟方卷一百三十八
