蔥白五寸豉一百粒煎至八分去滓食後溫服犀角湯出聖濟總録治傷寒後心臟虛熱滿口生瘡犀角鎊玄參各一兩胡黃連甘草炙銼各五錢右粗搗篩每服五錢水一盞半竹葉二七片煎至半盞去滓食後溫服蒺藜散出聖濟總録治傷寒後脾壅唇口常有瘡蒺藜子炒去角白扁豆炒各一兩右搗羅為散每服一錢如茶點服不拘時地黃煎出聖濟總録治傷寒心熱口舌生瘡生地黃汁三合蜜五合右攪勻慢火煎如稠餳每服半匙含化徐徐咽津不計時大青飲治傷寒後口生瘡咽喉腫塞大青去根一兩吳藍半兩去根石膏研一兩芍藥一兩右搗篩每服三錢用水一盞入蔥白鹽䜴各少許煎至六分去滓食後臨卧溫服升麻六物湯出活人書治口瘡赤爛升麻梔子仁各錢半大青杏仁黃芩各等分右為末以水一盞半蔥白三莖煎至八分去滓溫服療傷寒熱病口瘡出本草右用黃蘖皮削去上粗皮取裏好處薄削以崖水漬之一宿唯欲令濃含其汁良久吐更含若胸中熱有瘡時飲三五合尤佳聖惠方同方煎十餘沸濾去滓候溫含傷寒吐血論夫傷寒吐血者熱在陽經邪盛於表應汗不汗熱毒入深結於五臟遂成瘀熱熏於上焦熱隨氣行併入胃中胃得血則滿悶氣逆故吐血也歌曰皆因邪熱中三陽當汗醫家失料量熱毒入深留五臟故成吐血可驚惶言當汗失汗也返致熱毒入深故吐血也瘀血盛者抵當丸輕者桃仁承氣湯兼服犀角地黃湯症治論三黃㵼心湯蘖皮地血散大下後寸脈沈遲尺脈不至咽喉不利唾膿血者麻黃升麻湯桂枝吐者其後必吐膿血犀角地黃湯吐血諸陽受熱邪表家不發咎醫家因而熱毒流於臟地血三黃劑可嘉諸陽受熱其邪在表當汗不汗致使熱毒入臟積瘀於內遂成吐血蓋傷寒失汗則邪熱化為惡血藴毒不除亦能蒸腐其血凡眼閉目紅神昏語短心忪痛悶眩冒迷忘漱水躁煩嘔吐喘促驚狂譫語鼻􅀈吐紅脊冷足寒骨熱膚開四肢厥逆多汗頑痰胸脅小腹滿急大便黑而微利小便多而不禁此等皆瘀血症也男女切有此血脈婦人傷寒尤多見之以其得病於經水來去之期或受病中間經水適至耳血之為痛大抵夜重日輕或晝明而暮譫語血屬隂從其類也前症不必悉具但見三分曉便作血症主張犀角地黃湯小柴胡湯桃仁承氣湯三黃湯凡酌量輕重用瘀血結其抵當湯丸主之以川芎為佐盡大便黑物則佳雖然傷寒略具便難救療况吐血乎凡吐血皆非輕症初病猶可用藥有陸續而來或經散時而復吐者斷不可救藥也方藥詳見解題用蘿蔔汁一小盞入新汲水煎茅花主之血熱者黃連阿膠湯症治論用地血散蘖皮湯三黃㵼心湯大下後寸脈沈遲尺脈不至咽喉不利唾膿血者麻黃升麻湯此有兩症一陽毒一少隂在陽毒則或用陽毒升麻湯在少隂則或用甘桔湯加生薑汁煮之方伏龍肝散出聖惠方治傷寒吐血心煩不食伏龍肝三兩生乾地黃一兩柏葉一兩阿膠一兩搗碎炒令黃燥黃芩一兩黃連一兩去鬚甘草兩半炙微赤銼茜根一兩右為散每服四錢水一中盞煎至六分去滓不計時候溫服蒲黃散出聖惠方治傷寒瘟病時氣疫毒及飲酒傷中吐血不止面黃乾嘔心煩止血又名蒲黃湯蒲黃􅌝􅌣一作桔梗犀角屑甘草炙微赤銼桑寄生各三兩葛根三兩銼右為散每服五錢水一大盞煎至五分去滓不計時候服一方無􅌝􅌣治傷寒吐血不止出聖惠方伏龍肝甘草炙微赤銼茜根生乾地黃阿膠搗碎炒令黃燥黃芩已上各一兩右為散每服四錢水一大盞入竹茹一分煎至六分去滓不計時候溫服子芩散出聖惠方治傷寒吐血心神煩悶子芩三分梔子仁五錢逺志一分去心桂心五錢黃連三分去鬚右為散每服四錢水一中盞煎至六分去滓不計時候溫服又方一名黃連散出聖惠方黃連一兩去鬚荷葉一兩艾葉三分微炒柏葉三分右為散每服四錢水一中盞煎至六分去滓入生地黃汁半合更煎一兩沸不計時候溫服聖濟方用黃連一兩半艾葉五錢名黃連湯當歸散出聖惠方治傷寒吐血目眩煩悶當歸赤芍藥黃芩伏龍肝阿膠搗碎炒黃燥各一兩乾薑五錢右為散每服四錢水一中盞煎至六分去滓不計時候溫服生乾地黃散出聖惠方治傷寒心熱及餘毒不退吐血一二升不止生乾地黃一兩黃蘖三分銼黃芩一兩吳藍一兩黃連三分去鬚伏龍肝一兩麥門冬一兩去心右為散每服四錢以水一中盞煎至六分去滓不計時候溫服治傷寒心熱不止方伏龍肝一合紅藍花一合亂髮灰五錢右為散每服五錢以水一大盞入竹茹一分煎至五分去滓不計時候溫服茅根飲子出聖惠方治傷寒心肺熱因嗽吐血或嘔血宜服茅根三兩犀角屑一兩黃芩一兩桑根白皮二兩竹茹一兩刺薊兩半紫苑二兩洗去苗右為散每服五錢水一大盞煎至六分去滓入生地黃汁一合更煎一二沸不計時候分溫三服刺薊散出聖惠方治傷寒煩熱吐血不止刺薊一兩赤芍藥兩半茅根二兩麥門冬去心三兩焙犀角屑兩半甘草五錢生用右為散每服五錢水一大盞煎至六分去滓入藕汁生地黃汁各五錢更煎一二沸不計時候分為二服柏葉散出聖惠方治傷寒吐血不止青柏葉一兩生乾地黃一兩阿膠一分搗碎炒令黃燥右為散水一大盞半煎至一盞去滓别攪馬通汁一合相和更煎一二沸不計時分溫三服治傷寒壅極吐血百治不瘥方出聖惠方生地黃汁一中盞川大黃一分銼微炒右為散先煎地黃汁三五沸內大黃末調令勻不計時候溫服麥門冬湯出聖濟總録薺苨吳藍甘草炙銼黃芩去黑心茅根生乾地黃焙乾各一兩右粗搗篩每服五錢水一盞半入豉百粒同煎至八分去滓食後溫服地黃湯治傷寒熱病當發汗而不發內有餘熱鼻衄吐血不止面黃大便黑此方主消化瘀血兼治瘡癬熱得大盛以此解之生乾地黃焙芍藥犀角鎊各一兩牡丹皮三分右粗搗篩每服五錢用水一盞半煎至一盞去滓食後溫服有熱如狂者加黃芩三兩其人脈大來遲腹不滿自言滿者為無熱更不用黃芩大黃也犀角湯出聖濟總録治傷寒吐血不止喜怒如狂熱毒不散內有蓄瘀犀角鎊一兩大黃銼炒三分芍藥黃芩去黑心各一兩牡丹皮三分生乾地黃焙一兩半右粗搗篩每服五錢水一盞半煎至半盞去滓食後溫服黃芩湯出聖濟總録治傷寒吐血心神煩悶黃芩去黑心三分山梔子仁五錢逺志去心一分桂去粗皮五錢黃連去鬚竹茹各三分右粗搗篩每服五錢水一盞半煎至一盞去滓食後溫服三黃湯出聖濟總録治傷寒後心氣不足吐血衄血及黃疸大黃銼炒黃連去鬚黃芩去黑心各一兩右粗搗篩每服五錢水一盞半煎至八分去滓食後溫服亦可作丸用煉蜜為丸如梧桐子大每服十五丸白湯下紫河車散出聖濟總録治傷寒吐血煩躁紫河車三分朴硝甘草各半兩生蛤粉一分右搗羅為散每服二錢沙糖新汲水調下不計時候日三服金花散出聖濟總録治傷寒吐血不止鬱金甘草炙銼青黛各五錢右搗羅為散每服二錢用雞子白調下地黃散出聖濟總録治傷寒吐血不止大黃銼炒搗末一兩龍腦研一錢右合研勻每服二錢用生地黃汁調下人參湯出聖濟總録治傷寒吐血下血及血汗人參芍藥桔梗銼炒芎藭當歸切焙桂去粗皮甘草炙銼各一兩竹茹三分右粗搗篩每服五錢水一盞半煎至八分去滓食後溫服治傷寒後餘毒不解心臟熱極吐血不止方出聖濟總録生藕汁二合生地黃汁三合惡實根汁二合刺薊根汁二合蜜一合右相和攪勻每服三合不計時候頻頻服柏葉湯金匱方治吐血不止者青柏葉三兩乾薑三兩切艾三把右以水五升煮取一升去滓别絞取新出馬通汁一升相和合煎取一升綿裹濾去之溫分再服馬通是馬尿汁也一方有阿膠無艾黃土湯出金匱方治吐血下血先便後血此逺血也釜竈下黃焦土半升綿裏甘草炙乾地黃白术附子炮製阿膠炙末黃芩各三兩右切以水八升煮六味取三升去滓內膠令泮分三服忌海藻菘菜蕪荑豬肉桃李雀肉等物治傷寒嘔血而齒縫皆流血不止右用開口川椒四十九粒用法醋大盞同煎令熟入白礬少許漱口含在口中少頃出再啜漱而含普濟方卷一百三十八
