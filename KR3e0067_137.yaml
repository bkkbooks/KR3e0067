body:
  text: 普濟方卷一百三十八明周王朱橚撰傷寒門傷寒乾嘔論夫傷寒乾嘔者物無所出也此因邪熱在胃或發汗解後胃中不和尚有蓄熱薫上焦心下痞結故令乾嘔且諸邪氣在胃胃氣上逆皆發為嘔冷即寒痰凝滯嘔出涎沫則津液消鑠獨其氣逆故乾嘔而已極醫者不可不察嘔而無物名乾嘔下利三般属少隂脇痛頭疼并水氣箇中自是少知音少隂下利三症利不止嘔逆無脉乾嘔煩者白通加猪膽汁湯脉微者白通湯裏寒外熱脉微絶或乾嘔者通脉四逆湯乾嘔吐涎沫頭痛者呉茱萸湯得藥而反劇者小柴胡湯汗出頭痛乾嘔者桂枝湯心下有水氣乾嘔發熱者属表小青龍湯身凉而汗出兩脇痛乾嘔短氣心内痞而欬微利不惡寒此表觧裏有水十棗湯下之也膈上有寒飲乾嘔者可温之四逆湯乾嘔而利者黄芩半夏生姜湯大抵熱在胃脘與穀氣并熱氣上薫心下痞結則嘔而無所出焉少隂下利姜附主下利也厥隂吐涎沫呉茱萸湯主涎沫也汗出乾嘔桂枝主自汗也邪去則乾嘔自定矣若夫水氣二症又當以表裏分之發熱咳喘而乾嘔者此則水氣在表與青龍湯不發熱不惡寒脇痛咳利而乾嘔者此則水氣在裏與十棗湯是又不可無别然而表水裏水皆有咳嗽何耶曰水氣乗肺也方葛根湯出聖恵方治傷寒乾嘔煩熱不納飲食葛根一兩剉甘草三分炙㣲赤剉半夏三分湯洗七遍去滑白术一兩黄耆三分剉人參一兩半去蘆頭赤茯苓三分麥門冬一兩陳橘皮半兩湯浸去白穰焙右為㪚毎服四錢水一中盞入生薑半分煎至六分去滓不計時候稍熱服木通㪚出聖恵方治傷寒乾嘔煩悶小便不利木通半兩剉蘆根一兩剉陳橘皮一分湯浸去白穰焙人參半兩去蘆頭葛根半兩剉麥門冬半兩去心右為㪚毎服五錢水三大盞煎至二盞去滓不計時分温五服半夏㪚出聖恵方治傷寒乾嘔不納飲食心神虛煩半夏半兩湯浸七遍去滑陳橘皮一兩湯浸去白穰焙甘草半兩炙微赤剉人參半兩去蘆頭葛根半兩剉麥門冬三分去心枇杷葉半兩拭去毛炙微黄右為㪚毎服三錢水一中盞入生薑半分煎至五分去滓不計時温服枇杷葉㪚出聖恵方治傷寒徃來寒熱胷脇氣滿乾嘔枇杷葉三分拭去毛炙微黄前胡二兩半去蘆頭赤茯苓二兩桂心二分犀角屑一兩㯽榔一兩桑根白皮三分剉赤芍藥一兩半蘆根三分右為㪚毎服四錢水一中盞入生薑半分煎至六分去滓不計時温服藿香㪚出聖恵方治傷寒乾嘔煩亂不下飲食藿香一分麥門冬一兩去心焙桑木耳一分葛根半兩剉枇杷葉半兩拭去毛炙㣲黄人參半兩剉去蘆頭右為㪚毎服三錢水一中盞入生薑半分煎至六分去滓不計時候温服柴胡㪚治傷寒乾嘔不止心胷煩燥四肢熱柴胡一兩半去苗黄芩三分麥門冬一兩去心焙半夏半兩湯洗七遍去滑枳殻一兩麩炒令黄去穰枇杷葉三分拭去毛炙㣲黄甘草半兩炙㣲赤剉人參半兩去蘆頭右為㪚毎服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候温服竹茹飲子出聖恵方治傷寒乾嘔不止竹茹半兩半夏一分湯洗七次去滑甘草一分炙㣲赤剉陳橘皮一分湯浸去白穰焙紫蘇莖葉一分右細剉碎以水二大盞生薑半分煎至一盞去滓不計時候温服二服枇杷葉㪚出聖恵方治傷寒乾嘔煩渇不止枇杷葉三分拭去毛炙㣲黄麥門冬三分去心葛根三分剉人參三分去蘆頭赤茯苓半兩甘草一分炙微赤剉右為㪚毎服三錢水一中盞生薑半分煎至五分去滓不計時候温服一方用白茯苓竹茹㪚出聖恵方治傷寒後煩熱乾嘔竹茹半兩陳橘皮半兩湯浸去白穰焙人參半兩去蘆頭麥門冬半兩去心甘草半兩炙㣲赤剉蘆根半兩剉右為㪚毎服四錢水一中盞入生薑半分煎至六分去滓不計時候温服治傷寒乾嘔不出方出聖恵方茅根三兩陳橘皮二兩湯浸去白穰焙桂心一兩右為㪚毎服四錢水一中盞煎至六分去滓不計時候温服蘆根飲子出聖恵方治傷寒乾嘔不下食蘆根三兩竹茹三兩陳橘皮三兩湯浸去白穰焙右細剉拌令勻毎服半兩以水一大盞入粳米五十粒生薑半分煎至五分去滓温服治傷寒乾嘔心膈煩滿方出聖恵方木通二兩蘆根二兩陳橘皮二兩湯浸去白穰焙右細剉拌令勻毎服半兩水一大盞入粳米五十粒生薑半分煎至五分去滓不計時候温服葛根湯出聖濟總錄治傷寒乾嘔不止葛根剉一兩茯苓去黒皮半兩半夏湯洗七遍炒乾三分白术半兩黄耆三分剉人參一兩麥門冬去心焙一兩甘草半兩炙剉右麄搗篩毎服三錢水一盞生薑半分拍碎棗二枚擘破同煎至六分去滓温服竹茹湯出聖濟總錄治傷寒胃氣虛熱乾嘔不止淡竹茹半兩人參一兩前胡去蘆頭三分甘草炙半兩蘆根一兩葛根三分半夏半兩湯浸七遍切焙乾右剉如麻豆毎服五錢水一盞半入生薑一分拍碎同煎至八分去滓温服不拘時候茯苓湯出聖濟總錄治傷寒脾胃有熱乾嘔煩滿茯苓去黑皮一兩人參一兩半夏湯浸七遍切焙乾麥門冬去心焙各二兩粳米二合甘草半兩炙剉右麄搗篩毎服五錢水一盞半生薑一分拍碎棗三枚擘破竹葉三七片同煎至八分去滓温服日再蘆根湯出聖濟總錄治傷寒心脾虛熱乾嘔煩渇不下食蘆根剉二兩人參一兩半赤茯苓去黒皮一兩甘草炙剉半兩淡竹茹一兩右麄搗篩毎服五錢水一盞半入小麥半匙生薑半分拍碎同煎至一盞去滓温服日再薑橘湯一名小橘皮湯出活人書治傷寒乾嘔不止手足逆冷生薑切焙陳橘皮湯浸去白焙右等分麄搗篩毎服三錢水一盞煎至七分去滓不計時熱服栝蔞實湯出聖濟總錄治傷寒中風五六日已上胷中煩乾嘔栝蔞實一兩柴胡去苗八兩黄芩去黑心三兩甘草炙三兩右剉如麻豆毎服五錢水一盞半煎至一盞去滓温服蘆根飲出聖濟總錄治傷寒熱病乾嘔蘆根剉半兩冬𤓰皮半兩切焙右麄搗篩水三盞煎至一盞去滓分為二服温服之不拘時候人參湯一名大橘皮湯出活人書治傷寒後胃中虛熱乾嘔不下食人參三分生薑切焙半兩甘草炙剉一分陳橘皮去白焙半兩右麄搗篩毎服五錢水一盞半去滓温服一方棗一枚陳橘皮湯出聖濟總錄治傷寒後胃氣虛熱乾嘔不止煩渇陳橘皮去白焙一兩半甘草炙剉半兩枇杷葉拭去毛一兩半姜汁炙粟米三合右粗麄篩毎服五錢水一盞半生薑半分拍碎同煎至一盞去滓温服不計時候半夏湯出聖濟總錄治傷寒乾嘔不下食半夏湯洗七遍切焙乾蘆根淡竹茹人參麥門冬去心焙白茯苓去黒皮各一兩右麄搗篩毎服五錢水一盞半生薑半分拍碎同煎至一盞去滓温服不計時候日再半夏木通湯治傷寒後胃間餘熱乾嘔不止半夏半兩湯浸七遍切焙乾木通剉一兩蘆根剉一兩半柴胡去苗一兩陳橘皮去白焙半兩麥門冬去心焙半兩枇杷葉拭去毛半兩姜汁炙右粗搗篩毎服五錢水一盞半入生薑一分拍碎同煎至一盞去滓食前温服人參煮㪚治傷寒胃氣虛冷乾嘔不止内傷冷煩熱頭疼身不疼痛及氣虛傷寒亦宜服人參一兩芍藥白术各三分陳橘皮湯浸去白焙乾薑炮杏仁湯浸去皮尖雙仁麸炒甘草炙剉枳殻去穰麩炒各半兩髙良薑一分右麄搗為㪚毎服三錢水一盞入生薑五片棗二枚擘破煎至七分去滓熱服併三服以稀粥投之汗出即差人參丸治傷寒風邪在胃乾嘔不止飲食不下人參茯苓去黒皮茯神去木丁香半夏湯浸去滑焙白扁豆各等分右搗羅為細末滴水為丸如梧桐子毎服二十丸生薑湯送下白术飲治傷寒邪熱雖退胃中不和乾嘔不飲甚則吐逆白术蘆根厚朴去粗皮生姜汁炙各一兩枇杷葉去毛炙半兩右麄搗篩毎服三錢水一盞生薑五片煎七分去滓温服不拘時半夏乾薑㪚治乾嘔吐逆吐涎沫半夏乾薑各等分右杵為㪚取方寸匕浆水一升半煎取七合頻服之官局桔梗湯治乾嘔桔梗半夏陳橘皮各一兩枳實半兩右為麄末毎服三錢水一盞生薑五片煎至七分去滓服黄芩湯治乾嘔不利黄芩人參乾薑各三兩桔梗一兩大棗十二枚半夏半升右以水七升煎取三升温分三服傷寒嘔噦論夫傷寒嘔噦者病在足陽明胃之經也足陽明之脉厥而上行即令人氣逆氣逆則嘔噦仲景云嘔多雖有陽明症慎不可下盖為此也又傷寒嘔噦有因熱結胷中邪氣之髙所致有因吐下後虛熱在内及飲水停積所致者証既不同治亦隨異不可不察又傷寒病後胃氣不和此由初受病時毒熱氣盛多服冷藥㵼下及飲冷水病周折後熱勢既退冷氣乃動故使心下堅牢噫噦食臭腹内雷鳴而㵼利此由脾胃氣虚冷故也又云伏熱在胃令人胷滿胷滿則氣逆而噦若大下後胃中虛冷亦令致噦也傷寒噦者俗謂之咳逆者是也䭇近於噦䭇者但胷喉間氣䭇寒不得下通然而無聲也若噦則吃吃然有聲者是也噦者成金也胃受疾故䭇噦也皆謂之疾但輕重有差耳虚寒相搏反飲水令汗大出水得寒氣冷必相搏其人即䭇言胃氣虛竭也傷寒大吐下之後極虛復極汗出者其人外氣怫欝復與之水以發其汗因得噦所以然者胃中兼受寒冷故也又胃中虛冷不能食者飲水則噦即是觀之噦䭇皆胃疾可知矣經曰跌陽脉浮則為氣䭇脉滑為噦此為醫咎責虛取實之過也大抵妄下之後胃虛氣逆則成噦也經曰温家若下之太早則噦本虛攻其熱則噦而陽明病不能食攻其熱必噦諸如此者皆下之後胃虛而噦者也然䭇者正為水寒相搏必曰小青龍湯去麻黄加附子而可矣至於噦者則又熱氣擁欝氣不得通而成者也輕者有和解之症重者有攻下之候經曰有潮熱時時噦與小柴胡即是和解之證也噦復滿視其前後知何部不利利之則愈即可攻下之候也傷寒至於噦則病已極也非若渇煩等輕緩之候如太陽中風以火刼發汗隂陽俱虛竭身體枯燥但頭汗出際頸而還腹滿㣲喘口乾咽爛或不大便久則譫語甚者至噦是言其極也又不尿腹滿加噦者不治是為真病凡若是者雖有神醫術當斯脫絶之候又何以措其手足哉傷寒熱毒氣盛多服凉藥及飲冷水病折已後熱勢既退胃氣乃虛故使胷滿氣逆心腹堅痞必嘔噦也方白术㪚治傷寒後胃虛逆嘔噦不納飲食白术二分訶梨勒一兩用皮髙良薑半兩剉丁香半兩肉桂半兩去皺皮甘草一分炙㣲赤剉桔梗半兩去蘆頭人參半兩去蘆頭陳橘皮半兩湯浸去白穰焙厚朴一兩去粗皮塗生薑汁炙令香熟右搗篩為㪚毎服三錢水一中盞入生薑半分煎至六分去滓不計時候温服茯苓㪚出聖恵方一名赤茯苓湯治傷寒嘔噦心下痞滿胷膈間宿有停水頭眩心悸赤茯苓一兩半夏半兩湯洗七遍去滑陳橘皮一兩湯洗去白穰焙芎藭半兩白术半兩人參一兩去蘆頭右搗篩為㪚毎服三錢水一中盞入生薑半分煎至六分去滓不拘時温服半夏㪚出聖恵方治傷寒後嘔噦心胷不利頭目昏重不下飲食半夏一兩湯浸七遍去滑甘草半兩炙㣲赤剉人參三分去蘆頭枳實半兩麩炒令黄前胡半兩去蘆頭訶棃勒一兩用皮右搗篩為㪚毎服三錢水一中盞入生薑半分煎至六分去滓不計時候稍熱服白荳蔲㪚出聖恵方治傷寒服冷藥過多寒氣傷胃嘔噦不止白荳蔲一兩去皮白术一兩陳橘皮三分湯浸去白穰焙髙良薑半兩剉厚朴一兩去粗皮塗生姜汁炙令香熟甘草一分炙㣲赤剉右搗篩為㪚毎服四錢水一中盞入生薑半分煎至六分去滓不計時候温服陳橘皮㪚出聖恵方治傷寒後胃虛氣逆嘔噦不止陳橘皮一兩湯浸去白穰焙草荳蔲半兩去皮甘草一兩炙㣲赤剉乾薑半兩炮製厚朴一兩去粗皮塗生姜汁炙令香熟右搗篩為㪚毎服三錢水一中盞入生薑半分煎至五分去滓不計時熱服治傷寒後胃