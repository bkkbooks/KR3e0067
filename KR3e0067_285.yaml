兩右藥銼碎用水二大盞煎取一盞三分去滓分溫三服以快利為度芒硝散治發背大小便不通心神燥熱臍腹妨悶方川芒硝二兩川大黃一兩碎微炒梔子仁一兩甘草一兩生銼黃芩一兩右為散每服四錢以水一中盞煎至六分去滓不計時候溫服朴硝丸治癰疽瘡發大小便祕澀不通朴硝研大黃碎炒杏仁湯浸去皮尖雙仁炒研葶藶子微炒各二兩右先以三味為細末入朴硝和勻煉蜜為丸梧桐子大每食後煎黃耆湯下二十丸以通利為度未利再服大黃湯治年未及四十氣血強壯常苦癰疽無定大小便不通五利及治發背上攻於妳一名五利大黃湯大黃銼微炒升麻各二兩黃芩去黑心一兩梔子仁十枚去皮右搗篩每服五錢用水一盞半煎至八分去滓下芒硝一錢空心溫服快利三兩行為度未利再服一方甘草二兩炙內去芒硝導毒丹癰疽大便祕紫草瓜蔞連皮右銼新水煎服或用黑豆一盞入生薑紫蘇煎湯亦得孫真人單煮大黃湯宣熱拔毒大便祕者方可用用錦紋大黃酒浸去皮不拘多少銼如麻豆大煮服快利此要法也治癰疽大便祕方一方獨聖湯治服金石炙􅏼飲酒房勞癰疽痛疼用甘草生一兩銼碎井水濃煎入酒調服能疏導惡物癰疽後補虛羸附論素問云形不足者溫之以氣精不足者補之以味大抵病瘡毒後焮熱痛楚心煩氣壅胸膈妨悶不能飲食所以患瘡毒人須藉飲食滋味以養其精以助其真不日可補安全經云脾為倉廩之官胃為水穀之海主養四旁須用調理進食為上不然則真元虛耗形體尫羸惡氣內攻最難調護可服茯苓開胃散人參內補散嘉禾散仍兼服五香加犀角人參黃耆湯排膿內補十宣散之類是也參术順氣散亦宜服之方加味十全湯老人癰疽後氣血虛飲食不美用黃耆去叉蘆銼令二寸長捶匾以冷鹽湯溫潤蒸三次焙乾銼大地黃先洗焙乾以酒灑飯上蒸十次銼焙乾二味各一兩人參去蘆切焙川芎微炒大當歸去蘆酒洗切去頭尾微炒乾白茯芩去皮切焙粉草炙白芍藥揀有皮者刀刮去皮切焙桂心去粗皮淡者不見火切天台烏藥興隆者可橘紅去白白术米泔浸半日切焙麩炒黃北五味子去梗微炒以上十一味各半兩右㕮咀每服一兩用水一碗生薑五片棗二枚同煎至八分濾去滓取清汁分作二服留滓晒乾碾為細末後常服再用薑棗煎服人參內補散芍藥黃芩去心茯苓粉草一兩半炙桂心不見火人參去蘆各一兩麥門冬去心當歸酒浸去蘆焙熟地黃洗淨焙木香不見火各二兩右為細末每服二錢水一盞薑三片棗一枚煎至八分無時溫服薔薇丸治風濕體氣不能飲食兼癰疽後補虛羸薔薇枸杞根各一斤半食蜜生地黃各十斤右㕮咀先以水煮二根絞取二斛去滓次內地黃煮令爛去滓微火煎令如粥次內蜜和令相得每食後服如彈丸許將理法凡癰疽妄用惡草愈滋其毒不進飲食反害其瘡皆非正法宜如後法將理避風邪少睡卧勿驚憂勿嗔怒徐行動省言語戒閨房絶思慮防觸穢聽好事瘡頻洗藥常服盥潄聞香二便順序擇飲食內充無飢飽失度傅藥運掉屈伸瘡口常加愛護服食法方藕食羮治發背癰疽心煩熱補中養神益氣藕食去皮切五枚蔥白切五莖䜴一合煎汁一升半甜瓜去穰切二枚冬用冬瓜右先以䜴汁煮藕實次下瓜并蔥取熱以五味調和作羮食之日一杏酪粥治發背心肺積風熱解毒煎成濃杏酪一升黃牛乳半升大麥仁三合右先用水煮麥仁并杏酪熱後即下牛乳攪令勻空心食日一豉粥方治發背癰疽解毒去風熱豉二合蔥白切二莖薄荷半兩生薑拍碎三錢鹽花半兩羊髓二兩白米三合右以水三升先煎薄荷生薑至二升却下豉再煎十沸去滓下米煮候粥熟次下髓並鹽攪勻食之日一凝水石膏治發背癰疽毒攻寒熱牛蒡莖長五六寸别煮令熟研白术三合凝水石一兩搗碎絹袋盛右以水三升先煮凝水石至一升半次下牛蒡并术再煎令沸去滓下米煮粥候熟空心食日一石膏粥治發背癰疽頭痛不可忍石膏二兩碎蔥白切二莖䜴半合生薑拍碎三錢半米三合右以水三升先煮石膏至二升次下蔥薑豉再煎至一升半去滓下米煮粥後食之若渴加乾葛根一兩梔子仁粥治發背癰諸熱毒腫梔子仁五枚白米五合右先以水三升煎梔子至二升濾去滓下米煮粥候熟空心食之竹葉粥治發背癰疽諸熱毒腫淡竹葉一兩石膏碎半兩白米三合沙糖一兩右以水三升先煎竹葉石膏至一升半去滓下米候成粥即入糖攪令勻空心食之灸法治癰疽癰疽初發小點一二日間急以大蒜頭橫切如錢貼其中心頓小艾炷灸之五壯而止若形狀稍大以黃稈醮酒全貼認先乾處為筋腳於先乾處灸之或兩處先乾皆灸俱五壯而止又法屈指從四圍尋按遇痛處是根就自重按深入自覺輕快即此炙之更於别處尋灸若或大腫即搗蒜為餅焙乾醮法醋炙熱更換頻更已滅以尉斗火於蒜頭上尉之更換熱餅頻尉如覺患處走散即綿帛覆蓋勿令氣泄俟少間傅藥凡癰疽展大如龜之形且看頭向上下先灸其前兩腳次灸其尾或紅筋走緊而長從盡處灸之須留頭并後兩腳勿灸若灸不惟火氣壅聚彼毒無所走又攻入裏也或辨認不明以白芷三分漢椒桑白皮各一分連根蔥白十根又取新水煎湯入酸醋半盞淋洗少頃其筋自見可以辨認頭尾又法癰疽腫堅硬不破名曰石癰當上灸百壯癰疽發背龜形凡發背如龜形便認龜頭不論左右上下但以腫髙處為頭或有疑即以黃稈紙醮醋掩之先乾處為頭把筆點定男女皆取左右手中指用草比量全紙為度一樣剪草十三片六片安頓在外合作龜背形六片安頓於龜背之內中心安頓三片四片內外各相連合如是則頭尾四足定矣以筆點其尾足抹蒜膏灸之先灸其尾七壯火未滅便灸後一腳七壯火未滅又灸後一腳七壯迤邐如是灸至前兩腳而止須留龜頭莫灸以出毒氣法艾稈實如筯中間大剪剪作艾壯此法合隂陽氣候可用灸之省力療理治癰疽毒開濶不止痛楚殊甚以艾炷四枚圍著所作處同時下火各灸七壯多至一十壯佳骨疽百方療不瘥方於瘡上以艾灸之三日三夜無不愈也治癰疽發背腫毒一切惡瘡皆效用麻皮一條從手臂大曲文中度起牽至中指第二節橫文處為凖引而倍之截斷遂用此凖從結侯處結定雙引兩頭從垂背脊直下取凖頭進處點定此是定髙下也又用小紙條比大拇指上節一寸為凖却將此凖就前來皆定中點定處旁去一寸點一穴灸五壯或七壯十壯若已破灸後三二日或瘡口再就前穴右引一寸點一穴灸五壯或七壯十壯凡此度點穴皆男左女右炙發背凡發背上腫硬疼痛用濕紙貼腫上先乾處是頭碾大蒜八頭入淡豉半合乳香一塊如龍眼大細碾隨瘡大小用竹片作圈子竹片闊二分許隨腫大小頓在瘡上將所碾藥填平鋪艾灸痛處以癢為度然後服白散子貼涼清膏若方腫硬未有頭則當日腫消若已有頭則即時膿潰妙不可言又灸法癰疽有腳以生薑用大黃黃丹法製一夜切為片以艾炷灸之腳自縮矣極妙治一切癰疽灸法才有腫痛不可忍上有白頭如粟粒大一粒至二三日有五七粒不可不急治便將艾炷於粟粒上灸或無粟者但毒氣痛聚更著艾灸覺痛即灸至痛止來日取去瘡痂膿自潰矣尉法速消方癰疽發背已發未結已結未潰急以黃牛明皮膠新水溶令稀稠得所攤在抄紙上貼之良久以軟布二條於釅醋中煮熱互換漉出罨在膠紙上蒸尉直至消散如瘡癢須忍癢不可住尉或破而膿出將盡即止未效再如前將膠紙於瘡上熱醋布依舊尉令膿盡即貫衆湯洗去膠紙用退腫散解毒散沉水膏等類摻傅或用拔毒散隨意急服萬金一醉膏或內消散乳粉托裏散破後以洗瘡方蕩洗發散毒氣治癰疽腫發背及癰癤已潰爛疼痛方用蒸麋穀更遭尉之當即愈一云薔薇殼更炙尉之普濟方卷二百八十五
