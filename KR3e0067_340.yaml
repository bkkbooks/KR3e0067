下忌生冷毒物一方有黃連厚朴散治妊娠下痢日夜頻併臍腹撮痛厚朴三兩吳茱茰三兩甘草蘹香子乾薑陳橘皮各一兩右為細散每服二錢匕煎紫木瓜湯調下食前服白豆冦湯治妊娠下血腹痛腸鳴白豆冦陳橘皮桂去粗皮訶梨勒當歸各二兩枳殼半斤右粗搗篩每服三錢水一盞生薑五片棗二枚劈同煎至七分去滓稍熱服如要丸用好棗漿水煮去皮核細研和丸如梧桐子大以生薑拍碎炒黑色入水煎湯下十五丸石榴皮散治妊娠下痢赤白㽱利腹痛不可忍酸石榴皮三分阿膠一兩地榆皮黃蘖一兩芎藭三分當歸一兩右為細散每服三錢匕薤白粥飲調下不計時候一方用蔥白粥調服厚朴散治妊娠水穀痢厚朴白茯苓訶梨勒各一兩黃連乾薑木香各半兩右搗篩為散每服四錢水一盞入棗三枚煎至六分去滓不計時候稍熱服治妊娠下痢人參黃芩酸石榴皮各三兩樗皮四兩粳米三合右㕮咀以水七升煮取二升半分三服治妊娠患膿血赤滯魚腦白滯臍腹絞痛不可忍者薤白切一升酸石榴皮黃蘖各三兩阿膠二兩地榆四兩右㕮咀以水七升煮取二升半分三服不瘥更作一方無薤白療妊娠下痢赤白腹痛不可忍黃連石榴皮當歸各三兩阿膠二錢熟艾一兩半右用水六升煮取二升溫分三服忌生冷肥􅕹薤白飲子療妊娠下痢赤白腹痛不食薤白切一合當歸地榆各一兩甘草半兩糯米一合右為散以水七升煮取二升去滓溫分三服肉豆冦散治妊娠下痢不可療者及丈夫脾虛滯㵼肉豆冦十枚大者去殼用白麵作麵餅子裹文武火煨木香一兩草豆冦十枚去皮白麵裹煨訶梨勒二十枚甘草一兩蜜炙右為細散每服二錢匕米飲調下食前服阿膠丸治妊娠下痢日夜頻併安胎氣止腹痛阿膠酸石榴皮各半兩黃連一兩當歸肉豆冦各三分右為末煉蜜丸如赤小豆大水飲下十五丸食前服阿膠散治妊娠下痢赤白腹痛不止阿膠當歸各一兩白术三分艾葉酸石榴皮各半兩右搗篩為散每服四錢水一盞煎至六分去滓不計時候稍熱服療妊娠下痢不止黃蘖乾薑赤石脂各二兩酸石榴皮二枚右細切以水八升煮取二升分三服阿膠丸治妊娠下痢膿血不止腹中㽱痛阿膠二兩白术五兩黃連肉豆冦仁各一兩右為末煉蜜和丸如梧桐子大每服三十丸食前溫米飲下治妊娠及産已寒熱下痢黃連一升黃蘖一斤梔子二十枚右㕮咀以水五升漬宿煮三沸服一升一日一夜令盡嘔者加橘皮一兩生薑二兩亦治丈夫常痢一方治中暑挾熱下痢無梔子仁用薑羊脂煎服療妊娠白膿痢腹中冷痛乾薑四兩赤石脂粳米右用水七升煮取二升分溫三服忌生冷肥膩療妊娠痢黃水不絶厚朴黃連肉豆冦右用水二升煮取一升頓服忌如前療妊娠下痢赤白心腹痛小便澀糯米當歸黃耆右細切和調以水二盞煮取二分去滓溫分四服大寧散治妊娠下痢赤白及泄㵼疼痛垂死者黑豆甘草米殼右為粗末都作一服入生薑三片同煎食前服治妊婦下痢膿血及咳嗽膿血名白术湯白术黃芩當歸右為末每服三錢水煎去滓食前服加桑白皮止嗽玉粉丹治妊娠下痢赤白裏急後重努咽脫肛腸解膿血魚腦或因傷寒後餘毒滲入腸間撮痛絞痛石燕真輕粉玄胡索右為細末以雞子為丸如梧桐子大米飲下三丸若不服藥日深子母俱殞其産後并年髙氣血虛極老人皆可服如小兒只一丸效神捷散治妊娠下痢及水㵼不止米穀不消化者菖蒲赤石脂各一兩乾薑半兩右搗羅為散空心米飲調下二錢匕日三黃連湯治妊娠下痢頻併後重裏急黃連黃蘖各三兩白术四兩右粗篩每服五錢匕水一盞半生薑三片煎至八分去滓溫服日三黃連散治妊娠熱痢腹痛煩悶黃連梔子仁當歸右細銼分為三服每服水一盞煎至六分去滓不計時候分溫三服療妊娠臍下刺痛大便血晝夜三五十行根黃大蒜右以根黃為末研蒜作膏為丸如梧桐子大空心粥飲下三十丸日三服一方不用根黃用當歸以芍藥煎湯吞下雞黃散出三因方療妊娠下痢赤白絞刺疼痛烏雞子一枚就頭上開一穴傾去清只留黃黃丹二錢用雞子殼內打令勻裹以黃泥固濟煨取乾為細末右每服二錢米飲調下一服愈者是男二服愈者是女胎前後冷熱痢方無毒者皆可擇用厚朴丸出大全良方治妊娠洞泄寒中乾薑厚朴去粗皮細銼右等分先杵令爛水拌同炒令乾再為末水煮麵糊為丸如桐子大每服五十丸食前米飲下治妊娠下痢肘後方用白楊皮一斤㕮咀以水一大斗煮取二升分三服又方用燒中衣帶三寸為末服之又方右羊脂如碁子大十枚溫酒一升投中頓服三日治妊娠臨産下痢以梔子不拘多少燒存性為細末每服一大杯空心熱水調服甚者連進四五服即止狐灰散治妊娠下痢極甚者不過三五服見效用野狐腸連心肺須臘月收於罐子內以文武火燒取黑灰不得令過火候有青煙出便塞卻竅子勿令透氣候冷取為細末每服二錢米飲調下極甚者一日三服大效三日內頓安如是尋常痢或疼痛立愈治妊娠下痢日夜不止方用烏梅二兩軟者竹串慢火炙令乾焦為細散食前陳米飲調下二錢匕如㵼血加黃連一兩為末治妊娠下痢方用敗龜一枚用米醋炙搗羅為散米飲調下二錢食前服縮胎散治妊娠下痢赤白心腹㽱痛小便澀方枳殼二錢香附子二兩甘草一兩半右為末孕婦未産前日常服如茶點之能縮胎生産絶易須百沸湯點服鶯粟湯治婦人妊娠痢疾裏急後重百藥不效鶯粟殼甘草烏梅右等分㕮咀白水煎服立效療妊娠血痢以阿膠二兩以酒一升半煮取一升頓服大小便祕澀附論夫妊娠大小便不通者由臟腑氣實而生於熱熱者隨停之處則成病也若熱結於大腸則大便不通結於小腸則小便不通若大小腸為熱所結故煩滿而大小便皆不通也又云小腸有熱熱入於內脬熱結甚者令小便不通則心脅小腹氣澀而喘急也陳無則云胎滿逼脬多致小便不利者或心腎氣不足不能使脬冷清濁相干為諸淋病致小便不通名曰轉胞又胎滿尿出不時名曰遺尿治之各有方方檳榔散治妊娠大小便不通心腹脹滿妨悶不欲飲食手足煩熱檳榔赤茯苓大腹皮木通郁李仁北五味各一兩桑寄生甘草苦桔梗各一兩右為粗末每服三錢水一盞煎至六分溫服一方無五味子歸涼節命散治妊娠恣情飲酒或食生果魚羊雞麵毒物致令百節痠疼大小腑祕澀面赤口苦心煩腹脹方見本門煩渴類梔子湯治妊娠大小便不通臍腹脹痛梔子仁一兩半石膏四兩黃芩一兩半澤㵼二兩茈胡一兩半赤芍藥二兩萎㽔一兩半車前草切半兩右粗搗篩每服四錢匕水一盞半淡竹葉十片同煎至八分去滓食前服茈胡通塞湯治妊娠大小便不通下焦熱結茈胡黃芩陳橘皮澤㵼羚羊角各三錢梔子仁一兩石膏一兩大黃銼炒一兩右粗搗篩每服四錢匕水一盞入生地黃一分拍破䜴半分炒同煎至七分去滓食前溫服治妊娠大小便不通熱閉心膈腹脅妨悶妨害飲食大黃木通檳榔各一兩枳殼三錢大腹皮二枚訶梨勒四個半生半煨右為末以童子小便一盞蔥白二寸同煎至六分調下二錢不拘時候車前子湯治妊娠大小便俱不通車前子五兩木通四兩黃芩二兩郁李仁二兩半大黃二兩右粗搗篩每服四錢匕水一盞半煎至八分去滓食前溫服大腹皮散治妊娠大小便祕澀浮腫枳殼大腹皮甘草赤茯苓右為細末每服二錢濃煎䓤白湯下不拘時候冬葵根湯治妊娠大小便不通七八日以上腹脹悶冬葵根車前草木通大黃右粗搗篩每服五錢水一盞半煎至八分去滓食前溫服茅根湯治妊娠大小便不通結悶氣急脹滿欲死茅根滑石車前子大黃右粗搗篩每服四錢水一盞半煎至八分去滓食前溫服木通湯治妊娠大小便不通下部脹滿坐臥不安木通滑石大麻仁大黃右粗搗篩每服四錢水一盞半煎至七分去滓空心溫服白榆皮湯治妊娠大小便不通白榆皮桂甘草滑石右粗搗篩每服四錢水一盞半煎至七分去滓食前溫服冬葵子湯治妊娠大小便不通冬葵子大黃右粗搗篩每服三錢水一盞煎至七分去滓食前溫服冬葵根汁方治妊娠大小便不通生冬葵根生薑各搗汁右和令勻分三服空心日一服未利再服又未利盡三服治妊娠小便不通臍下妨悶虛羸大便祕車前子大黃右為細末每服三錢空心蜜調下葵子湯治妊娠得病六七日以上身熱入臟大小便不利安胎除熱治婦人雙身大小便不利用八正散大作劑料去滑石加葵菜子煎服經曰胱膀不利為癃者小便閉而不通也如八正散加木香取效更捷經曰膀胱氣化則能出焉然後五苓散三五服則愈也治妊娠大小便不通用豬脂如半雞子大碎切以酒半升暖令沸投豬膏內更煎一兩沸分三服食前溫服未通再服治妊娠大小便不利方用甘遂煨令黃搗細羅為散每服不計時候以水調下治大小便赤澀大腹皮枳殼甘草各一錢赤茯苓三錢銼作三服水一盞半煎一盞將郁李仁二錢半去皮尖同煎五七沸空心連服通為度如不通必是大腑熱祕宜服後方枳殼一錢大黃二錢甘草一錢三味為細末作三服濃煎蔥白湯調下雖通小便復澀脹煩熱不得睡臥而反倚息心胞絲戾不得溺者病名轉胞可服八味丸治妊娠大腑祕熱非時腰痛行履不得方杏仁桔梗升麻枳殼前胡各一分大腹皮一兩右為細末每服二錢水一盞二分煎三四沸食後臨臥徐徐去滓服治妊娠小便不利大腑熱小便時水道中疼痛不可勝忍方葶藶子麥門冬知母柴胡茯苓川芎升麻枳殼杏仁各一分冬葵子三銖右細杵羅為末每服二錢水一盞煎取九分食後臨臥去滓吃大腑熱服後方麥門冬升麻大黃杏仁各一分大腹皮一兩右細杵羅為末每服三錢水一盞二分煎取一盞食後臨臥徐徐去滓吃治妊娠通身搔癢漸次面目渾身四肢俱腫心躁不安大小腑祕熱宜服此方吃此藥了小便通盡平復如故更不須吃後面方若上餘分數小便未通即吃後面通小腸方黃芩山梔杏仁前胡升麻知母桔梗大黃枳殼葶藶各等分右細杵羅為末每十錢水一盞蔥白三枝同煎四五沸㵼出去滓溫和食後喫普濟方卷三百四十
