body:
  text: 普濟方卷三百四十明周王朱橚撰姙娠諸疾門熱病附論夫冬時嚴寒觸冐傷之藏于肌骨夏至乃發壯熱又為暑病即熱病也此寒氣藴積發即為病若姙娠遇之多致堕胎非節之氣傷於姙婦熱毒之氣侵損胞胎遂有墜胎漏氣俱害子母之命也方催生湯姙娠熱病六七日極熱損胎或兒死身冷不能自出須用暖胎藥用黒神散不若用催生湯蒼术桔梗橘紅白芷桂心粉草當歸亁姜製朴芍藥半夏川芎枳殻各四兩南木香真杏仁右每服三錢水一盞半姜棗煎大半盞服柴胡散治姙娠熱病骨節煩痛頭疼壯熱若不止則損胎柴胡家葛根知母梔子仁甘草各半兩石膏大青黄芩升麻各三兩右㕮咀每服四錢水一盞葱白三寸煎至六分去滓不拘時温服人參散治姙娠熱氣乘于心脾津液枯少煩躁壅熱口舌亁渇人參麥門冬赤茯苓地骨皮家葛根黄芩犀角屑各三兩甘草半兩右㕮咀每服三錢水一盞煎至六分去滓温服人參黄耆散治姙娠身熱煩躁口亁食少人參黄耆家葛根秦艽麥門冬各二兩知母二分甘草半兩赤茯苓一兩右㕮咀每服四錢水一盞姜三片淡竹葉十四片煎至六分去滓温服大黄飲子治姙娠熱病六七日熱入腹中大小便祕澁煩熱川大黄石膏知母前胡赤茯苓各三分梔子仁甘草黄芩各七兩右㕮咀每服半兩水一大盞生地黄一分煎至六分去滓無時温服黒神散一名烏金散一名肉桂散治熱病胎死腹中此病因母患熱病至六七日以後臟腑極熱熏煑其胎是以致死縁兒死身冷不能自出但服黒神散暖其胎須㬰胎即自出何以知其胎之已死但㸔産母舌青者是其候也及治敗血不散乍寒乍熱桂心當歸芍藥甘草亁姜生亁地黄各一兩黒豆炒去皮二兩附子半兩右為細末每服二錢空心温酒調下一方無附子用蒲黄夫姙娠謂之重身二命係焉将理失宜皆能損胎或熱病熏蒸所致或因頓仆驚恐出入觸及素有㿂瘕積聚壊胎最多候其舌青即知子死養胎論曰面青舌赤母死子生唇青吐涎子母俱斃又有䨇懐二胎或一死一活其候尤難知非臨時審視未易預逆不可不備學也然以黒神散温胎不若補助産母使其氣正免致虚虚之困頓胎自下矣催生湯殊勝黒神散葛根散治姙娠數月胷膈煩躁唇口亁渇四肢壯熱少食葛根黄芩人參萎㽔黄耆麥門冬甘草各等分右㕮咀每服四錢水一盞竹茹一塊如錢大煎至七分去滓温服無時知母散治姙娠煩躁悶亂口亁及胎臟熱知母麥門冬甘草各半兩黄芩子芩赤茯苓各三分右㕮咀每服四錢水一盞煎至七分去滓入竹瀝一合更煎二沸温服一方用竹茹一塊無竹瀝人參飲子治姙娠熱病壯熱頭痛嘔吐不止不食心胷煩悶經云熱病與中暑相似但熱病者脉盛中暑者脉虚人參竹茹家葛根各一兩蘆根二兩麥門冬一兩半知母三分右㕮咀每服四錢水一盞入連根葱白三寸煎至七分去滓温服梔子仁飲子治姙娠熱病斑出黒色小便如血氣急欲絶胎欲落梔子仁升麻石膏生乾地黄各二両黄芩大青各一両右㕮咀每服半両葱白七寸豉四十九粒水一盞煎至五分去滓温服救急有杏仁無地黄石膏一方加青黛無大青又方以陳皮如雞子大酒煮服治姙娠熱病六七日熱入腹大小便秘澁煩熱右以牛糞中水調塗腹上勿令亁縮脾飲解伏熱除煩渇消暑毒止吐痢霍亂之後服熱藥太多致煩躁者宜沉令水冷頓服草菓仁四兩烏梅肉三兩甘草二兩半右㕮咀每服半兩水一碗生姜十片煎至八分浸以熱水温冷任意柴胡石膏湯治姙娠傷暑頭痛惡寒身熱躁悶四肢疼痛項背拘急口舌亁燥柴胡四兩甘草二兩石膏八兩右㕮咀每服二錢水一盞姜五片煎至六分去滓温服若氣虚體冷加人參四兩治姙娠熱病葱白五兩豆䜴一升右以水六升煑取二升分二服取汗葵子湯療姙娠得病六七日以上身熱入臓大小便不利安胎除熱葵子仁二升滑石四兩右以水五升煑取一升去滓取服當下便愈葱白飲出聖惠方治姙娠熱病煩躁口亁小便澁赤治姙娠熱病方以車轄脂酒服半匕一方用水調服半匙又方以青羊屎水調塗腹上勿令亁又方以水服伏龍肝一鷄子大亦可調為泥塗臍下治大熱煩悶方用葛根汁二升分三服如人行五里乆進一服一方水煑葛根服勿用野葛根傷胎又方以焼大棗七枚為末酒和服又方出千金方用槐實焼灰取方寸匕酒和服治姙娠熱病胎死腹中下之用烏鷄一隻去毛細剉以水三升煑取二升去鷄通手用衣帛蘸摩臍下胎自出鹿角湯治姙娠熱病胎死腹中下之用鹿角屑一兩水一碗葱白五莖豆䜴半合同煎至六分去滓温分二服良效一名鹿角散治姙娠得病應服湯藥者先㨶小豆一升細篩鷄子黄和如鵞子大為二餅熟炙先令噉盡食頃乃服餘藥不爾多傷胎治姙娠熱病用水底泥泥心下三寸立愈治姙娠三四月後常時熱躁忽煩悶不識人大腑熱然後喫此方鈎藤桔梗桑寄生麥門冬茯苓知母防風各等分右細搗羅為末每服五錢水一碗煎取八分食後去滓喫連喫一盞亦無妨但大腑熱即可連喫也時氣附論夫四時之間忽有非節之氣如春應暖而反寒夏應熱而反冷秋應凉而反熱冬應寒而反暖非其節而有其氣而一氣之至無人不傷長少雖殊病皆相似者多夾應毒表也言其時普行此氣故云此時氣也姙娠遇之重者致傷胎也方麥門冬散治姙娠五月至十月足患時氣五六日不得汗口亁多喫冷水熱氣上衝喘及悶亂麥門冬知母茅根各一兩石膏三兩葛根𤣥參川升麻甘草赤芍藥麻黄川大黄子芩人參赤茯苓逺志各半兩右搗粗羅為散每服四錢水一盞入淡竹茹一分生姜半分煎至六分去滓不計時候温服秦艽散治姙婦時氣五六日不得汗口亁多喫冷水狂語嘔逆秦艽柴胡各一兩赤茯苓前胡甘草犀角屑家葛根川升麻黄芩各半兩石膏二兩右㕮咀每服四錢水一盞姜半分淡竹茹一分煎至六分去滓無時温服一方加人參又方敗毒散升麻葛根湯皆可用之麻黄散治姙娠五月或七八月卒患時氣煩熱口亁心躁頭痛四體煩疼不得安臥麻黄石膏赤芍藥甘草葛根黄芩麥門冬各一兩柴胡半兩右搗篩為散每服四錢水一盞生薑半分煎至六分去滓不計時候温服逺志散治姙娠時氣五六日未得汗口亁狂語亂見鬼神喫食不得逺志甘草麻黄各半兩麥門冬薯蕷葛根升麻各一兩石膏二兩右搗篩為散每服四錢水一盞入生姜半分煎至六分濾去滓不計時候温服葛根飲子治姙婦時氣煩熱口亁頭痛家葛根麻黄各半兩石膏一兩豉一合白米半合梔子仁六七枚葱白二莖右細切以水二大盞煎至一盞三分去滓無時温服以汗出為效治姙娠時氣頭痛腰背强壯熱升麻青黛前胡梔子仁黄芩各二兩石膏八分家葛根三兩右㕮咀以水五升煎取二升半去滓分為三服浮萍方治姙娠時氣大熱令子不落䕶胎浮萍川朴硝蛤粉藍根各等分大黄微炒右為末水調傅臍上安胎解煩熱極妙一名䕶胎救生散十全方治姙娠患時氣黄芩欝金各一兩白术一分右為末每服一大錢抜藍根少許水一中盞煎至七分服一方地黄水下汗出效未得汗再服即瘥又姙婦患時疾用鷄卵墜井至泥隔宿取出吞之必無虞矣一方無白术消熱飲子治姙婦時氣六七日熱甚大小便不利宜服此川芒硝一兩葵子三兩右以水二大盞煎至一盞三分去滓不計時候分温三服以利為效治姙娠而得時病令胎不傷右以黄芩三兩搗末取鷄子白三枚水和煑攪之吹去沫取三升去滓令分再服不解更作佳伏龍肝方治姙娠時氣身大熱令子不落䕶胎方用伏龍肝研令極細水調塗臍下二寸亁則易差即止亦可清泔水調服或酒調服一方取井水泥塗心下三寸亁則易竹瀝方治姙娠時氣未能服藥且單用右取淡竹瀝一大盞不拘時候分為三服汗出當解治姙娠得時氣令胎不傷方右取鷄子以絹袋盛投井中浸令極冷敲破吞之服六七枚至佳治姙娠六七月感時氣煩熱口亁煩躁頭痛麻黄散主之麻黄一錢赤芍藥柴胡各半錢甘草三分半計二錢三分半剉作二服姜三片水一盞煎八分温服煩渇附論夫足太隂脾之經也其氣通于口手少隂心之經也其氣通于舌若姙娠之人臟腑氣虚榮衛不理隂陽隔絶熱氣乘於心脾津液枯少故令心煩而口亁也姙娠面赤口苦舌亁心煩腹脹者何盖縁恣情飲酒因食桃梨李羊鷄麫魚羶腥毒物至令百節酸痛大小便結澁可歸凉節命散方羚羊角散治姙娠煩躁體熱口亁肢節疼痛少思飲食羚羊角屑黄芩麥門冬人參赤芍藥木通已上各三分柴胡一兩黄耆甘草各半兩右搗篩為散每服四錢以水一盞煎至六分去滓不拘時候温服升麻散治姙娠煩躁熱口亁四肢疼痛喫食減少川升麻柴胡各一兩知母三分梔子仁黄耆甘草黄芩麥門冬枳殻各半兩右搗篩為散每服三錢水一盞入竹茹一分煎至六分去滓不計時候温服赤茯苓散治姙娠心膈氣壅滯煩躁口亁食少赤茯苓黄耆柴胡各一兩紫蘓葉人參陳橘皮大腹皮甘草各半兩前胡三分右搗為散每服四錢以水一盞煎至六分去滓不計時候温服地骨皮散治姙娠煩躁體熱疼痛口亁食少地骨皮黄芩人參黄耆葳㽔麥門冬甘草赤芍藥各半兩柴胡一兩右搗篩為散每服四錢水一盞入生姜半分淡竹葉二七片煎至六分去滓不計時候温服歸凉節命散治姙娠恣情飲酒因食桃李果魚羊鷄麵腥膻毒物致令百節痠疼大小便結澁面赤口苦舌亁心煩腹脹川芎苧根白芍藥麥門冬當歸白术各一兩糯米半合甘草半兩右㕮咀每服四錢水一盞半煎至一盞去滓温服不拘時候一方有荆芥無麥門冬黄連散治姙娠心熱煩躁口亁舌澁多渇黄連瓜婁根地骨皮葳㽔犀角屑黄芩川升麻甘草各一兩右搗篩為散每服三錢水一盞煎至六分去滓不計時候温服治姙娠體熱煩躁口亁喫食減少宜服此方人參葛根黄耆秦艽麥門冬赤茯苓已上各一兩知母三分甘草半兩右搗篩為散每服四錢水一盞入生姜半分淡竹葉二七片煎至六分去滓不計時候温服知母飲治姙娠口亁煩渇上焦壅熱赤茯苓黄芩黄耆各一兩半麥門冬一兩知母一兩甘草一分桑白皮半兩右㕮咀每服四錢水一盞半竹瀝一合同煎不計時候服治姙娠心熱煩躁口亁舌澁多渇梔子仁麥門冬黄耆生亁地黄各三分秦艽一兩甘草一分右搗篩為末每服三錢以水一盞煎至六分去滓不計時候温服瓜蔞子散治姙娠心煩躁熱口亁頭目不利瓜蔞子黄耆枳殻各一兩人參甘草各半兩石膏二兩右搗篩為散每服三錢水一盞入竹葉二七片同煎至六分去滓不計時候温服治姙娠口亁煩渇上焦壅熱黄耆知母地骨皮犀角屑嫩葛各二錢右㕮咀每服四錢水一盞半竹瀝一合同煎不計時候服之治姙娠心熱煩躁口亁舌澁多渇青竹茹一兩麥門冬半兩甘草一錢炙右件藥以水一大盞煎至七分去滓不計時候分温二服霍亂吐㵼附論夫隂陽清濁之氣相干亂於腸胃則為霍亂也但飲食過度觸冐風冷使隂陽不和致清濁相干腸胃虚者受之故霍亂也霍亂者先吐利心腹冷痛則吐利並發有頭體疼痛熱而吐利者亦為霍亂所以然者挾風而有實故也風折亁氣皮膚緻宻故血氣不得宣通致令壯熱風邪乘其經脉氣上衝頭則頭痛風氣入于腸胃則洩利胃逆則吐逆故為吐利也吐利甚者則多煩臓腑虚故也又手足逆冷陽氣暴竭謂之四逆也姙娠之病吐利甚者則傷胎也方白术散治姙娠霍亂吐㵼過多傷冷胎藏不安白术白茯苓豆䓻陳橘皮厚朴各一兩芎藭當歸各三分人參亁姜各半兩右搗篩為散每服四錢水一盞煎至六分去滓不拘時温服人參散治姙娠霍