body:
  text: 普濟方卷三百七十四明周王朱橚撰嬰孩驚風門一切驚風硃砂膏出直指方治驚風涎盛硃砂馬牙硝各二錢川靈脂蘆薈各一錢半麝少許腦一字右研細甘草膏為丸菉豆大箔為衣每服一丸薄荷湯調下生氣散出直指方治諸風踈利後以此調氣丁香二字白术青皮各二錢甘草木香人參右為末每服半錢沸湯點服或用和劑調氣散亦得塗囟法一名塗囟香散出醫方大成治小兒生有風證即用麝香蝎稍薄荷葉蜈蚣牛黃青黛等分右末研勻用棗肉膏調新綿上塗勻火炙暖手頻尉之百日外兒更可用浴體法浴體法出危氏方驚風及傷風不醒漸傳風證僵仆皆可用天麻蝎尾硃砂烏蛇肉酒浸白礬麝香青黛各等分右為末每服三錢水一碗桃枝一握并葉煎十沸溫熱浴背小牛黃丸出幼幼新書治小兒膈熱痰涎稠盛心神不寧睡不安穩煩躁怔忡四體作熱宜服之但痰熱驚風常服有效乾葛一兩甘草一分黃芩一分麝香半字山梔子半兩取仁去皮右為細末入麝香少許和勻如皂角子煉蜜丸常服薄荷湯化下議曰此四證名已述前篇兼載八候續今復舉驚熱并風痰未發隂陽二癎之前醫者即先化痰祛風退熱利驚如此逐病推究殊覺煩難專治其一是故難於療理當推病源於證何憑凡此四證相隨不可缺其一也利其驚則風縱退其熱則痰壅久尋此理未究善書忽一日省悟錢氏宣明論諸方正為此等兒孩病設有痰即壅有熱即閉有風即阻有驚即昏悶沉沉輕藥不能徹散重劑又恐傷害但令其服踈風散宣風散等藥只一二服之間風痰驚熱悉此消去神情欣恱四肢安善雖此藥有似虎狼用之却和順推痰利驚且散風解熱只與一服不移時即可見功效嘗見醫功調治此等證候多是疑惑或進退怯阻若過其時延其日則復傳變自驚作風自風作熱自熱作痰痰涎壅聚或急或慢八候相從反覆傳變遞至發越之時不可得而進此藥蓋能踈風致害及其聚而自散者流入諸經或絡或經或脈故作搐搦引掣等證矣大效踈風方散出幼幼新書治小兒嬰孩驚熱風痰四證聚於胸臆間令兒昏困沉重關竅不通諸脈氣閉所以默默欲食不食欲起倦伏不知其證候者但不經吐利宜與服之立見蘇醒錦紋大黃三錢雞心檳榔二錢舊陳桐皮二錢黑牽牛一分半朴硝一錢右為末二嵗兒服半錢七三嵗一錢匕先用生蜜調就次煎薄荷湯服之不拘時候一方無朴硝風痰在上即吐在下即瀉謂膈上下也一服之間即便安樂未可便投他藥恐相致誤常人治之用腦麝參苓术附香子無擔負之藥似此四證如此和調理也正舌膏出御藥院方治小兒風病搐搦機關不利喫乳難至於不能發聲者此因病作之後風邪客於喉舌間而致此也服之纍效天麻明大者白殭蠶去絲炒大麥蘗薄荷各半兩麝香一錢研好硃砂飛研一分計三錢半入藥半為衣腦子少許右除研者及為末勻煉蜜和丸如榛子大每服一丸薄荷湯化下時時服少許硃砂為衣清心散一名牛黃散出仁存方截風驚方見本明天瘹驚風類星香人參散治小兒驚風人參陳皮各一錢木香一錢南星二錢右㕮咀每服一錢紫蘇薑棗煎服有熱加防風一方不用木香鐵粉丸出御藥院方墜風痰潮搐吐逆咳嗽涎盛水銀鉛二味同結沙子淨稱一分鐵粉天南星各一錢輕粉一錢硃砂一錢右一處研至水銀星盡為度生薑汁麵糊為丸如粟米大每服十五丸生薑湯下名太乙丹已風丹出幼幼新書祛風退熱天竺黃一兩防風一兩鈎藤一兩白殭蠶半兩乾全蝎半兩白附子半兩右為細末煉蜜為丸如雞頭子大每服一粒至二粒薄荷荆芥湯化下金箔膏出醫方妙選治大便不通者金箔十片水銀一分入棗肉少許研硃砂一分雄黃一分鉛霜一分乾蝎為末一分右研為細末鵝梨汁和丸如菉豆大每服二粒至三粒麝香湯化下銀箔丹出醫方妙選治伏熱潮發者銀箔十片續隨子一分去皮青黛一分蘆薈一分胡黃連一分麝香一錢右通研勻細以糯米飯和丸如菉豆大每服一粒至二粒煎薄荷湯下量大小加減白殭蠶丹出醫方妙選治驚風潮搐生痰上喘急宜服之白殭蠶乾全蝎二十箇白附子半兩半夏半兩泡七次已上搗細末用硃砂半兩水飛金箔十片研膩粉一錢研右同拌勻棗肉和丸如黍米大每服七粒至十粒點麝荆芥湯下量大小加減木通散出驗經方能瀉肝風降心火利驚熱山梔二錢大黃一錢羌活二錢木通赤茯苓甘草各一錢右銼紫蘇煎服每一錢七珍丸出直指方治諸風頑麻痰壅盛大小通用細辛五靈脂直殭蠶各一錢半白附子一錢硃砂半錢全蝎四箇右為細末南星生為末煮糊丸麻子大每服五丸薑湯送下透關散出幼幼新書治卒中感厥諸癎小兒驚風涎滿口噤立效硃砂二錢龍腦一錢牛黃一錢膩粉一錢水銀同硃砂研令星盡一錢右同研為細末分作三服用煎薄荷湯調下取出惡物五七日後更一服一月更一服小兒每服一字薄荷湯下口噤者拗開灌之甚妙龍角丸一名大黃丸出幼幼新書逺志牡蠣煆赤大黃二分黃芩四分右為末蜜丸二嵗小兒豆大五丸日再一嵗麻子大成癎者入牛黃一分一方乳汁下三丸量大小以意加減硃砂散出幼幼新書治小兒驚熱和氣硃砂白茯苓人參山藥等分甘草減半半生半熟右為末治驚金銀薄荷湯下和氣米飯下去熱竹茹湯下量大小下一字或半錢或三字天麻神妙丸出幼幼新書治驚風天麻殭蠶各酒浸一宿輕粉蝎炒白附子米泔水浸一夜已上各等分右為末煉蜜丸菉豆大入硃砂麝為衣每服一丸薄荷湯下分金散出幼幼新書治四時驚風大效硼砂馬牙硝各半錢腦麝各一字人參甘草炙各半兩右為細末每服一字四時驚風發動如羊服後口無涎用腦麝冷水下一字開關散出危氏方通關治驚赤蜈蚣一條炙直殭蠶南星炮各一錢麝香一字豬牙皂角三挺燒存性右為末以手點薑汁煎藥少許擦牙或用物引滴入藥兩三點入鼻內涎出自開開牙散出直指方華隂細辛南星朴硝各一錢麝香半錢蝎稍五條右為末以少許用烏梅肉搗末和擦牙並用細辛皂角荆芥末吹入鼻中一字散一名蜈蚣蝎砂散出衛生家寶方截風定搐全蝎褐色者是一箇赤蜈蚣一條並新瓦焙硃砂半錢腦子少許麝少許右為末每服一字薄荷湯調下先以些少用管子吹入鼻中自然通竅一方無腦子撩痰散川烏尖生附子尖生南星尖生半夏生蝎稍各一錢右為末鵝翎點醋入藥攪喉引痰出鎮肝丸治小兒失心驚氣風證全蝎一枚麝香少許酸棗仁一錢腦子一字辰砂一錢右為細末豬心血丸如菜子大每服七丸燈心湯送下治小兒驚風方出本事方茯苓甘草硃砂青黛膩粉右各等分入麝香少許每服一錢蜜水調下抱龍丸出鮑氏方理一切驚風潮搐傷風溫疫身熱昏睡氣粗熱痰實壅嗽中暑沭浴後並宜進此及治痘瘡熱發毒搐并蠱毒中暑冒悶南星四兩臘月醋浸一日夜隂乾如無以生者去皮臍炒熟一方臘月牛膽中隂乾如無生者水浸三日焙用辰砂另研麝香半兩雄黃一分天竺黃一兩右為末煮甘草水和丸指頭大每服一丸溫水化下壯實小兒宜時服控痰散出直指方治風噤先用控痰散吐風涎次與益脾散和胃又辰砂膏利驚即愈或手足拳噤口不開者不治蝎尾銅青各半兩硃砂一錢膩粉一字麝香少許右為末每服一字臘茶清調下先吐風涎然後和胃或後假甘草方吐痰隨輕重用龍腦膏出幼幼新書治小兒驚風搐搦痰壅用在瞪目直視或眼不開口噤四肢或冷或熱大便或祕或泄等證腦子一錢石腦油半兩南星二錢輕粉一錢水銀半兩臘茶一錢酥一塊如棗大同研無星右為末研和為丸如小兒一嵗一丸乳香湯下如不得化破取下惡物後愈神寶丹出幼幼新書治小兒體熱喘粗嗽心忪頰赤大小便不利夜眠不穩滑石膩粉半兩青黛半兩南星十二兩巴豆七百箇右為末麵糊丸如麻子大每一嵗一丸薄荷溫水下如急驚風頭熱足冷口噤面青筋脈抽掣上膈頑涎疾吐甚者加一兩丸煎桃符湯下踈下藴熱涎立便安愈小兒瘡疹後餘毒不解宜服食後一方無巴豆青黛加蝎稍半錢安神丹出醫方集成治兒心神不寧困卧多睡及痰壅塞恍惚不定硃砂人參三錢半南乳香半兩酸棗仁一兩逺志一錢半右為細末蜜丸榛子大金箔為衣每服一丸人參湯化下每兩作三十丸反砂膏出仁存方治驚風痰搐傷風咳嗽南星一兩又同半夏用白水浸三十一日焙乾又同浸焙乾半夏一兩全蝎十二箇天麻半兩硃砂二錢右為末蜜丸如龍眼大每服一丸薄荷湯化下珍珠散一名直丸出仁存方治驚風發搐化痰退熱硃砂一分珍珠末二錢雄黃一分全蝎一錢蟬退七箇右為末每服一字至半錢煎金銀薄荷湯下竹瀝調尤好一方作丸有輕粉不用蟬退粳米飯為丸如粟米大每服二十丸薄荷湯下保生丸一名保生丹一名延壽睡驚丸出楊氏家傳方治小兒胎中驚積盤腸內瘹傴身巡視啼哭不止或潮熱風痰驟成急驚吐瀉日久變成慢驚手腳搐搦哭而鴉聲脾胃虛損不進乳食如能服令小兒永無驚風之疾睡眠安穩乳食增進雖是傷風瘡痘之候服亦能解利寒邪透肌消毒大人手足頑麻運動疼痛睡中驚悸心神不寧以兩丸依方臨睡化下硃砂一分一方用一錢麝香一分一方用一字天南星半兩一方兩半白附子半兩一方用一兩薑汁製蛇含石四箇大者於地上放方不傷十二時爍令通赤紅醋淬七次反字只於反字上用瓦襯如出痰火須先時製下臨時入藥右為細末於重午日修合三五家粽子尖搜為丸如梧桐子大每服一丸薄荷湯磨下若肚疼內瘹荆芥湯磨化入薑汁兩三點調服一方每用一丸蘸竹瀝如膏服不食以乳解送下急風膏出醫方選要治小兒急驚風利胸膈好硃砂半兩天漿子二十七箇乾全蝎二十七箇膩粉一錢青黛一分右都研勻腦子半錢研細用軟飯和丸成膏如皂角子大每服一粒人參荆芥湯下碧霞丹出惠聖方治小兒膈實涎盛者硫黃一分膩粉一分青黛一分硃砂一分水飛巴豆五粒去油右都研勻細滴水和黍米大每服五粒以薄荷湯下一方無硃砂軟飯和丸聖金丹出醫方妙選治小兒痰實潮搐者白殭蠶一兩半夏一兩湯洗七遍焙乾烏蛇頭一枚酥炙令黃已上搗羅為細末青黛一分蟬酥三片如茶葉大鐵器上焙乾右都研勻酒煮麵糊丸如黍米大每服十粒點龍腦湯下量兒大小加減祛風丹一名宜風丸出幼幼新書治潮發盛者服尤佳兼治急驚風頭熱足冷口噤面青筋脈抽掣多痰涎川烏頭一箇大者炮製去皮臍白附子一分天南星一分炮已上搗羅為細末用巴豆五箇去油膩粉一分右再研勻以棗肉為丸如粟米大每服三五粒煎生薑湯冷下量兒大小加減一方薄荷湯下追風丹一名追風丸出十便良方治潮發至困者大川烏頭一箇去皮炮白殭蠶半兩炮白附子一分天南星一分炮右搗為細末煮膠丸黍米大每服十丸溫酒下量兒大小加減一方有乾蝎每服五丸寸金丹出醫方妙選治利下後驚風及心肺中風尤宜服之蛇頭一箇酒浸焙乾赤蜈蚣一條乾全蝎一錢草烏頭去皮麻黃各一錢去節右為細末每服一字抄龍腦一字同溫酒調下量兒大小宜服加減鐵粉散出醫方妙選治小兒驚風或多面赤口乾大便不利尤宜服鐵粉半兩研珍珠一分研鬱金一分研牛黃一分研右拌勻研細每服一字溫蜜湯調下油珠膏出幼幼新書補脾胃潤心肺治氣逆嘔吐風痰作搐石亭脂即生硫黃須明色者滑石各半兩附子去皮半夏去皮南星去皮臍各一錢右為末每服一錢以清虀水半盞滴清油一點如錢大抄藥在油珠上須臾下却去虀水止取油珠藥再服清虀水三四口並空心下候時方與服如乳壅涎痰壅塞眼睛斜視速宜服之生金湯出幼幼新書治小兒生七日後忽患口鼻青微驚胸中冷眼反視生金黑豆大一粒無生用熟全蝎一分茯苓甘草一分灰右水一升煮五合分作八服日五夜三人參丸出幼幼新書鎮心驚人參芍藥甘草各一錢大黃二錢右為末煉蜜丸如麻子大每服一丸米飲下鉛白霜丸出幼幼新書鎮心驚鉛白霜人參茯苓各一錢麝香少許右為末煉蜜丸如青豆大薄荷湯下五丸鎮心丸出幼幼新書治驚硃砂犀角升麻大黃各半兩右為細末煉蜜為丸如菉豆大每服三丸薄荷湯下天麻丸出幼幼新書治小兒驚風天麻全蝎炒天南星去皮白殭蠶直者炒各等分右為細末酒糊丸如麻子大每服十五丸荆芥湯下此藥性溫可以常服永除諸風茯神膏出幼幼新書治小兒驚風蝎稍茯神各半兩白殭蠶一兩硃砂一錢右為末用蜜和為膏每服一皂角子大煎金銀薄荷湯化下撫驚丸出幼幼新書治小兒一切驚風青黛茯苓各二兩天麻四兩蝎半兩右為末蜜丸如雞頭子大薄荷湯化下宣風散出傅氏活嬰方鎮心壓驚利痰解熱人中白一兩麝香一錢蜈蚣一條盆蛸二錢右為細末每用少許鼻內搐膽星丸出直指方鎮心壓驚利痰解熱牛膽南星半兩硃砂防風各二錢麝香一字右用臘月黃牛膽汁和南星末作餅子挂當風處四十日和下項藥末研細浸牛膽皮湯丸如梧桐子大每服一丸井花水調下踈膈丸出宿州陳氏方治驚亦治疳青黛一錢乾蝦蟆燒存性木香一錢檳榔一錢麝香一錢續隨子一錢右為末除青黛麝香續隨子仁三味各為細末共和再研細煉蜜為丸如菉豆大一嵗時每服十五丸米飯送下量兒大小加減丸數延壽散一名雞舌香散出全嬰方治小兒驚搐不定或因驚風已經取下舊病復作雞舌香一粒硃砂半錢五靈脂錢半右為末一嵗半錢糯米泔調飯湯亦可王氏云用雞舌香一錢黃耆一分蜜炙辰砂二錢五靈脂半錢治療同一字散出仁存方治驚風神困不醒方見本門大疾驚風類又方出海上方治驚風不醒用藥不效者蜈蚣蝎稍白附子半錢生半錢熟腦子少許右為細末用每服一字薄荷水調勻吹兩鼻內得睡安小兒驚風殭蠶蝎稍等分天雄尖附子尖一錢右為末每服一字或半錢以薑酒灌之治諸風如吐不止用十一味藿香正氣散吐止後服此藥防風三兩南星三兩金沸草一兩加硃砂少許右用無灰酒調服或用油煎豆腐食後吐痰淨用此藥丹砂散治小兒驚搐丹砂一錢研膩粉一錢蜈蚣一條酒浸炙蝎稍四十九枚炒右搗研為末每服一字七薄荷汁調下犀角散治小兒多驚身體壯熱吐乳不止犀角鎊半兩青黛研牛黃一錢龍膽各一分保命丹腦子一片硃砂一粒全蝎一箇連足殭蠶一箇右為細末以乳調服之立效軟紅膏出醫方妙選治小兒潮搐涎盛者南星一兩生用硃砂半兩水銀一分用真明臘油半盞同研細乾蝎稍四十九枚右一處入龍腦麝香各一錢再研棗肉和於石臼中搗三五百下硬軟得所成膏如皂角子大每服一粒煎薄荷湯下神驗量大小加減萬金丸一名萬金丹出瑞竹堂治慢驚風十無一失蒿節內蟲七月初五日或五日取辰砂輕粉麝香少許一方不用麝右先以辰砂輕粉為末同蒿蟲研勻入麝丸如黍米大每服半嵗一嵗兒一丸二嵗三嵗三丸乳汁下或冷水亦得一方男取生女乳女取生男乳名如聖丸定志丸一名逺志丸出幼幼新書治心氣不定安神志小兒驚風心忪多汗咽乾煩熱逺志去心三兩人參三兩石菖蒲三兩白茯苓三兩右為末煉蜜和丸硃砂為衣每服三十丸米飲下一方加桂一半荆芥湯下搐鼻藥出典藥方蜈蚣一條蝎稍四尾薑製殭蠶七箇直者去嘴生用右為細末用鵝毛管吹入鼻中便打噴嚏三五箇者更有啼哭者可治却用妙齊散等藥治之如無噴嚏者不可治也弄舌散出全嬰方治小兒驚弄舌瀉黃散亦治蛇皮一分牛黃一錢硃砂一錢麝香一字右為末每服一字薄荷湯調下碧雲散出宣明論方治小兒驚風有涎膽礬半兩研銅青一分研粉霜輕粉各一錢右為細末每服一字薄荷湯下中風漿水下如吐多不定煎蔥白湯投之立效小丹砂丸出王氏博濟方治小兒驚積鎮心化涎小丹砂一分研巴豆去皮心膜出油盡三十粒杏仁先炮過後湯浸去皮尖雙仁研五粒右研為末麵糊丸如菉豆大每服一丸薄荷湯下三嵗二丸五嵗三丸如驚伏在內即驚積消盡仍舊藥出如無驚積藥更不下蝎稍丸治小兒胎虛氣弱吐利生風昏困嗜卧潮搐全蝎白附子半兩半夏一兩切片薑汁製焙乾右為末薑汁糊丸如麻子大每服三十丸荆芥湯下更看大小加減服硃砂散出幼幼新書治小兒不喫乳眼目不開手足牽搖此為驚風硃砂龍齒滑石各一分右為細散每服煎竹葉湯放溫調下一字如二嵗以上兒每服半錢殊聖辰砂膏一名保命丸治小兒驚風手足動搖精神不爽一切驚邪狂呌不寧辰砂光明有牆壁者研極細一兩酸棗仁研一兩乳香研各半兩右同研熬為膏每一服兩大豆許煎人參湯化下一方煉蜜為丸棗湯下一方為末如發熱小麥煎湯調下名寧心散虎眼丸出幼幼新書鎮心化涎夜卧不穩夢中驚啼或多虛汗並宜服之硃砂白殭蠶天南星生各一分右為末麵糊丸如菉豆大每服五七丸薄荷湯吞下治驚和氣止瀉痢白术一錢切薄片密略塗紙襯慢火炒甘草半錢生一半炒一半蝎兩箇全用龍腦薄荷葉同炒去之只用蝎右為末止驚金銀薄荷湯下和氣止瀉痢米飯湯下治驚風上吐下瀉吐痰涎方硃砂一錢麝香少許蝎一箇右先研蝎為末後研硃砂麝香極細每服半字茶調下乳汁下亦得瑞紅散出幼幼新書治小兒諸驚硃砂一分蝎稍殭蠶三十箇直者右為末每服一字半錢金銀薄荷湯調下逐一日可常服之鎮心丸出幼幼新書治驚心墜涎半夏十箇硼砂硃砂各一錢為末右半夏以刀切開中心却將硼砂等末摻在內用好瓦一片安半夏却將好醋滴在硼砂等內火炙取乾碾爛用粟米糊為丸如桐子大每服五七丸金銀薄荷湯下珍珠丸出幼幼新書治小兒驚風又名白丸子右研為末用糯米汁為丸如芥子大每服三丸糯米湯下牛黃丸出錢氏方雄黃研一錢牽牛末一錢天竺黃一錢右同研麵糊為丸粟米大每服三丸至五分食後薄荷水下兼治疳消積常服尤佳大者加丸數三聖丸出錢氏方化痰涎寬胸膈消乳癖化驚風療諸癎疳積小兒周嵗之內常服極妙又名小聖丸青黛牽牛末各三分膩粉一分右研勻麵糊為丸黍米大薄荷湯下小黃丸出錢氏方生半夏末巴豆霜一字黃蘖末各三錢右研勻薑汁糊丸黍米大小兒百日者各一丸一周二丸乳汁下妙聖散出錢氏方治小兒驚風潮搐不定者蜈蚣一條蔥汁浸一時焙乾麝香一錢草烏尖四箇薄荷生薑取汁浸一日夜焙乾右以腦子半錢同為末半字蘆管吹鼻搐定為效可兼服諸驚風藥分肢散出宣明論治小兒大人中風口眼喎斜風涎褁心驚天瘹走馬喉閉急驚一切風熱巴豆不去油朴硝半兩川大黃一兩右大黃為末後入巴豆朴硝一處細研用油單包藏如有前患每服半錢熱茶下吐下頑涎立愈如小兒胸喉驚弔等痰先服龍腦地黃膏一服次服此藥一字看虛實加減只是一二服見效不宜頻服如吐瀉不定以蔥白湯調下立效控心丸出仁存方治驚風發熱涎盛喉鳴天南星一箇乾薄荷末一錢大活地龍九條入南星末令涎出取用右用白麵少許為丸如麻子大每服五丸薄荷湯化下治驚風不省用藥無效者出濟世方蝎稍硃砂各半錢地龍二條右為末將地龍水浸取涎和作丸放地龍於舊處煎金銀薄荷湯下鎮心丸出直指方治諸風頑痰喉風纒喉痺北礬火煆枯水飛過直殭蠶米醋浸焙各一兩天南星切片皂角水浸一宿焙二分右為末稀粥糊為丸麻子大每服五丸薑湯下喉風用皂角水研開灌寒水石散出幼幼新書小兒之病多因驚則心氣不行鬱而生涎遂成大疾宜常服利小腸去心熱自少驚涎亦不成疾一名墜痰散寒水石滑石各三兩甘草半兩右以水研如泔漿細研無聲量兒大小暑月冷水調下寒月溫湯調下被驚及心熱坐卧不安者服之即安加薄荷龍腦尤妙南星散一名南星飲出直指方驅風豁痰南星重八九錢以上者用一箇就地上作坑深七八寸用火炙五遍燒令通紅以好米醋半盞灑入坑中即納南星於內以火燒調蜜薑汁入之用盆盛右為末入琥珀全蝎研勻每服半錢薑防風湯調下三黃丸出典藥方治小兒驚風入腸一切咳嗽氣急有痰解三焦積痰身上生瘡及消瘡氣雄黃研鬱金各一錢江子去皮三粒右為細末和勻用飯丸蘿蔔子大每服五丸至八丸十丸薄荷湯下米飲亦得通膈丸大黃牽牛木通各等分右為細末滴水丸如粟粒大每服三十五丸量虛實加減大黃散出幼幼新書大黃芍藥等分右為末豬膽汁調貼之乳香散出幼幼新書治小兒驚風涎溢悶絶慕死宜用亦不吐出涎只此壓發搐甘草乳香各末一錢七右為細末每服半錢或一字童子小便下妙注唇膏出幼幼新書治小兒令永不生風痰症心無驚多紅潤唇臉如丹常服無疳積諸癖疾患白殭蠶一兩去頭足直者為末以薑汁和為餅子於火上炙乾再為末復以汁為餅乾為度硃砂二錢細研用水一碗浸洗三遍去黃色傾紙上候乾研如細粉右同合和研勻煉蜜為膏入瓷合子內貯每用如雞頭大三嵗一丸嚏驚散出危氏方半夏生一錢皂角半錢右為末用豆許以管子吹入鼻立醒開關聖散一名回命散又名聖散子出直指方治驚風弔眼赤足蜈蚣一條中分為兩各用蔥汁浸一夜焙乾全蝎一箇中分為兩片各同左右二味右為末左眼翻左手搐以左藥末入左鼻孔右眼翻右手搐以右藥末入右鼻孔雙眼翻雙手搐兼用之神效不驚圎出鮑氏方治驚風上視氣急枳殼炒黃淡豆䜴等分右為末每服一字或半錢急風薄荷自然汁下慢風荆芥湯下入酒五滴非慢脾風足冷者不治豬牙皂角四挺不灣者去皮白礬半錢右為細末小者一字大者半錢溫湯調下此藥不必大吐但微吐冷涎便醒驚風後瞳人不正阿膠三錢炒人參一錢研為末薄荷湯調下治小兒驚風出濟生拔粹方濟生拔粹白羊頭一箇丁香一兩右同熬至軟令乳母空心盡食之二聖膏一名蟬殼散治小兒眼口喎斜蟬蛻一兩五月五日取東行枝上者寒食日麵一兩右為末釅醋調傳紙攤如膏藥貼患處左斜貼右右斜貼左如口正水洗下一方取七月七日東行枝上蟬退依前法用防風丹出仁存方治驚風神困多睡全蝎白附子各等分右為末蜜丸如龍眼大每服一丸用麝香荆芥湯下南星醒神散出直指方治小兒驚風痰熱天南星不去皮切片生薑切片各等分右用竹籖一條以南星并薑相間插定次用輕粉少許摻南星生薑片間風乾為末每服一字薄荷紫蘇泡湯調下大人服半錢或吐或汗或下即病氣出也奪命散一名礞石散出醫方大成大控風涎不問慢驚風急驚風壅痰寒咽間其響如大潮百藥不能過咽命在須臾醫者技窮以待其盡殊不知世有妙方服此藥後良久藥褁涎出從便下如稠涕膠粘乃藥之神效故也然後隨證用藥調理如無此證不須服一方次服花蛇川烏全蝎蜈蚣等藥治慢驚此藥神驗不動臟不傷真氣青礞石熖硝各一兩右以沙鍋鹽泥固濟炭火煆通赤須待硝盡為灰藥令如金色取出研為極細末煎薄荷膏丸菉豆大每服二丸如急驚風痰壅上身熱如火濃煎薄荷湯入少許調勻溫服之或煎荆芥湯調下如慢驚風脾用南木香煎湯調下然青礞石熖硝古文錢等藥利痰然其性非胃家所好須以木香佐之加青州白丸三粒研為細末用生薑自然汁調若稀入熟蜜調勻微溫服但先用此藥入喉其痰墜下功有萬全奪天地之造原得之聖僧纍纍有驗治小兒驚神不安出本草以虎膽研水服之治大人小兒口噤牙關不開者天南星生末一錢腦子少許右和研用指蘸生薑自然汁蘸藥於左右大牙根上擦之立開治小兒夜驚大人因驚失心方取震肉作脯與食之此畜為天雷所霹死者是也服之神效羚羊角丸出全嬰方治小兒驚風退後諸病之後筋脈緩弱骨氣尚虛脾腎不足五六嵗不能行羚羊角虎脛骨生乾地黃酸棗仁去皮白茯苓各半兩桂心去皮防風當歸黃芪各一分右為末煉蜜為丸如雞頭子大兩嵗一丸白湯化下薏苡散出全嬰方治小兒因驚風及諸病之後手攣不展是肝氣不足內傷風邪薏苡仁三分當歸桂心各一兩酸棗仁去皮甘草防風秦艽去苗各半兩右㕮咀三嵗一錢水半盞煎至三分去滓無時服當歸散出直指方治小兒驚因風及諸病後腳不展指攣縮不伸當歸麻黃各半兩羌活人參杜仲去皮酸棗仁去皮桂心一分右為末一嵗一錢水一盞薑三片煎三分去滓無時服治小兒未滿月受驚似中風欲死者用硃砂以新汲水濃磨汁塗五心上立瘥最有神效小兒浴湯主驚忤出幼幼新書以升麻取葉搗汁作湯浴之治小兒驚方取燕窠與燕屎不拘多少以作湯浴兒療驚邪治小兒被驚方卒驚似有痛處而不知疾狀取雄雞冠血一二嵗每服用少許滴在口中三四嵗如每服取一橡斗子汁滴在口中一日二服治小兒生下即驚方出聖惠方用剪父母指甲燒灰井花水丸麻子大日進三服夜一服亦治客忤一方麵糊為丸全蝎散出直指方治小兒驚風不語通竅豁痰大小通用全蝎七枚各用紫蘇葉包塗蜜炙為細末每服一字薑汁入蜜搜和含化亦治大人風涎一方薄荷葉褁炙同研為末湯下治驚風墜涎出傳氏活嬰方用天南星一箇重一兩酒浸七伏時取出於新瓦上周回炭火炙令乾裂置於濕地上去火毒用瓷器合盛之冷搗末入硃砂一錢每服半錢荆芥湯調下每日空心午時進一二服一方治小兒牙關不開用天南星一箇煨熟紙褁封角不要透氣於細處剪雞頭大一竅子透氣於鼻中牙關立開又方出全嬰方治小兒眼中喎斜以巴豆七粒爛研喎右塗右手心喎左塗左手心內仍採取一葉安手心須臾即正洗去藥并頻抽掣中指立效治小兒驚風出本草用蝎一箇不去頭尾薄荷四葉褁合火上炙令薄荷焦同碾為末作四服湯下大人風涎只一服治小兒驚疾皆因積氣風熱成痰涎驚藥多用硃蝎附性烈力大嬰兒腸胃脆弱多不堪往往致害用逺志去心煎湯隨時飲之辰砂丸治驚風涎潮作及胃熱吐逆不止辰砂另研水銀沙子各一分龍腦麝香半錢天麻一分牛黃半錢蟬蛻去頭足白殭蠶乾蝎一分去毒炒犀角末麻黃去節天南星酒浸七次切焙乾各二分右為末再研勻熱蜜為丸如菉豆大硃砂為衣每服二十丸或五七十丸食後服薄荷湯送下大青膏天麻一分末白附子末生一錢半青黛一錢研麝香一字匕烏稍肉酒浸為末半錢天竺黃一字匕右同再研細末生蜜和成膏每服皂角子大月內兒服米大同牛黃膏溫薄荷水化調下之五嵗已上同甘露飲服之匕謂匙也應服藥多少逐方説不盡並時以意加減也羌活散出直指方散風邪止驚搐退熱解肌羌活粉草天麻生茯苓川芎二錢荆芥穗白殭蠶白术白附子一錢桔梗二錢半防風一錢半全蝎半錢硃砂南星一字右為細末薄荷湯下如傷風鼻塞流清涕蔥白煎湯下咳嗽氣促桑白湯下常服白湯亦可甘露飲出朱氏集驗方治驚風潮熱不退寒水石石膏防風荆芥薄荷甘草各等分右為末每服半錢用井花水下或薄荷湯調下亦可桃花散出朱氏集驗方治驚風潮熱煩悶天竺黃白茯苓硃砂各等分腦麝少許右為末每服一字薄荷湯下一日二服酸棗仁丸出楊氏家藏方治小兒心神不安卧睡不穩常服壓驚邪寧卧睡酸棗仁人參去蘆硃砂研白茯苓去皮珍珠末右件為細末煉蜜為丸每一兩作四十丸荆芥湯化下二嵗以上小兒服一丸食後服透驚散出楊氏家藏方治小兒筋脈拘攣不舒手足軟弱虛羸無力驚風搐之後偏廢不舉常服透經絡活血脈及行步遲慢者天麻酒浸一宿焙乾白附子牛膝酒浸一宿木鱉子去殼研當歸酒浸一宿焙乾羌活去蘆頭六味各半兩地龍去土一分乳香二錢别研硃砂一錢别研沒藥二錢右件為細末次入木鱉子乳香硃砂沒藥研勻煉蜜為九每一兩四十丸每服一丸煎薄荷湯化下溫酒少許同調下定痛散出幼幼新書治小兒筋脈因驚之後觸冒風邪客傳經絡走注疼痛或在手指腿足往來刺痛不可忍者天麻去苗防風去蘆地龍去土白殭蠶去絲嘴乳香研五靈脂去沙石沒藥各等分右為細末次入沒藥乳香同研令勻三嵗兒每服半錢溫酒白湯各一半調下不拘時候服蜈蚣丸出朱氏集驗方治驚風白附子天南星赤腳蜈蚣防風半夏各等分右銼研諸藥掘地一小竅用炭火煆煉約半日尤好地脈透熟入好釅醋在竅八分滿傾諸藥入醋煮之用瓷盆一隻頂上蓋住以泥封四圍至次日一周方取出焙乾碾為末用獖豬心血研同熟蜜為丸不拘丸子大小同薄荷湯下仍量兒大小投藥余年七嵗感患得此方而愈神效難言防風導赤散治小兒初驚生乾地黃川木通防風甘草各等分右生用㕮咀每服三錢水一盞竹葉少許同煎神寧膏後用此藥茯神硃砂各一兩麥門冬去心一兩麝香一分右碾細煉蜜為小餅子每服一餅臨睡同薄荷湯化服一夜一服此二方江州置制使云昨在江州日兒子偶有驚作遂訪一老醫求藥劑服三服遂全愈異而問之渠云三代小兒科家傳只有四五方加減愈人無數且如驚搐多是熱證若首先便用驚風藥白附子全蝎殭蠶川烏之類便成壞證家中驚藥只用導赤散加些防風進一二服導去心經邪熱其搐隨便止次服寧神膏是家傳祕方自後常以二藥救人取效甚多羌活膏祛小兒驚風定驚羌活防風川芎茯苓二錢茯神去木二錢白术白殭蠶薑汁炒各二錢全蝎半錢右為末煉蜜為丸每服菉豆大麥門冬薄荷湯化下防風天麻散治驚風頭疼防風天麻川芎白芷甘草川烏一箇炮麻黃去節右等分為細末蔥蜜湯下薄荷湯亦可如驚搐加全蝎一箇烏蛇肉尾白附子麝香各少許煎湯下無不效者如傷寒加零陵香羌活辰砂丸治小兒伏驚積在內壅併痰涎妳不下及虛中積轉驚辰砂一錢定粉半兩粉霜錢半膩粉一錢麝香少許乳香半字右同研細末用粟米飯和丸如菉豆大揑作餅子慢驚風用微炮令紫色用粟米飲下一丸微利為度錢湯丸治小兒驚積壯熱豬牙皂角灰一錢天南星半錢滑石末一錢輕粉二錢巴豆二十四粒去皮尖硃砂一錢右為細末研以寒食麵糊為丸如菉豆大每服一嵗二丸三嵗三丸煎古錢湯睡時服之睡應丸治驚吐漸止得睡方用之南星白附子青黛硃砂一錢雄黃一錢輕粉一字全蝎金箔三片腦子麝香少許巴豆七粒去殼心膜及油右為末用生薑汁糊為丸鐵鹽粉為衣每服七丸荆芥湯下如常服木瓜湯下如驚風麝香湯下金箔丸治一切驚風麻黃半兩羌活三錢殭蠶三錢南星二錢防風二錢蟬退三十箇去頭足硃砂二錢麝香一錢人參半兩茯苓半兩茯神三錢全蝎半兩山藥三錢逺志去心半錢金箔十片銀箔十片右件為末硃砂麝另研入藥煉蜜為丸如指頭大每服用一丸臨睡薄荷湯下痰多皂角子湯化下蛜􅖉丸治一切驚風心神驚悸夢中佯啼嘻嘆潮熱上蒸驚熱面青風丹火灼手足抽掣搐搦無時形色憔悴茯苓茯神山藥天麻殭蠶炒蟬退防風羌活人參白附逺志去心川芎白芎蟬花三隻荆芥全蝎赭石粉草琥珀珍珠硃砂腦子麝香金箔牛黃另研早伏即紫河車酒浸過各等分右為末用木瓜蒸麵糊為丸煎作錠子如粟米樣硃砂為衣如驚時麝香湯下如尋常鈎藤湯下小蛜􅖉丸治一切驚風手足搖動心神恐悸卧睡不安蛜􅖉蝎雄是白附子米粉硃砂青黛香墨金箔青柳條細茶麝香防風羌活白礬天麻茯神逺志山藥各等分右為末棗肉木瓜同搗爛飯為丸煎作錠子硃砂為衣周嵗一二粒金銀薄荷湯下或麝香湯下聖蠶丸治小兒胃虛生風壯熱精神恍惚痰涎壅塞目睛上視睡卧不安頭痛頰赤多驚恐四肢體倦不思乳食白殭蠶微炒防風去蘆天南星漿水煮五七沸半夏先洗淨用水煮五七沸白附子漿水煮五七沸人參一兩藿香半兩右為細末用麵打簿糊為丸如麻子大周嵗兒每服五七丸用生薑薄荷湯下不拘時候兩三嵗兒可服十五丸餘當以意加減青金丹出傅氏活嬰方治驚風身熱手足搐搦喉中涎鳴心中不快睡卧不安面赤咳嗽口眼喎斜不省人事或天弔角弓反張輕粉天南星滑石青黛各一字巴豆十粒去心皮油膜全蝎十箇辰砂一字蟬退七箇夜明砂半錢天漿子一錢白附子一錢麝香少許一方加天麻酒浸一錢殭蠶一錢半夏半錢或水煮右為細末用麵糊丸如麻子大每服二十丸看大小加減與服如不利更加錢許薄荷湯下痄腮或痰甚蔥白湯下脈壅杏仁湯下如不語急與服之風痰退愈寬熱散治驚風潮熱客忤甘痰等積枳殼一兩大黃二兩朴硝研甘草半兩炙右為末用錫合藏之每服一字薄荷煎湯下茯苓散出傳氏活嬰方治驚風偏搐茯苓牙硝雄黃硃砂各半兩右為末金銀薄荷湯下蝎紅丸出傳氏活嬰方治驚風頑痰上視南星全蝎硃砂膩粉腦子各等分右為末金銀薄荷湯下小驚藥出傳氏活嬰方下痰踈風茯苓茯神山藥蟬退羌活逺志去心殭蠶白术白附子荆芥川芎赭石鐵朵粉硃砂金箔麻黃甘草各等分右為末以木瓜蒸和爛飯搗成丸如粟米大剪成粒子每服用一粒金銀薄荷煎湯化下或以木瓜皂角湯下羌活膏出衛生家寶方治驚羌活五靈脂荆芥穗末青黛蟬殼龍腦薄荷白殭蠶茯苓一錢輕粉半錢天南星右件為末煉蜜為膏每周嵗梅核大一丸薄荷湯化下一日三服與牛黃散相間服牛黃散出直指方治驚風搐搦心經伏涎不作聲悶絶身體強直雄黃一錢研極細地龍半錢去土新瓦上焙乾右二味一處為末每服周嵗半錢已下薄荷酒調下服一稔疾不作凡進此藥一日二服不可多服要快用細赤地龍一條和酒研服防附湯出衛生家寶方治小兒驚風及一切頭風防風一分殭蠶一分白附子一分川芎二分荆芥一分雄黃一錢全蝎七箇硃砂麝香少許右為細末每服半錢用好茶清調下小兒驚風用冬瓜子湯下一日兩服育嬰丸出衛生家寶方治小兒驚風用京墨末不拘多少入雞冠血拌和為丸如菉豆大用生薑薄荷湯吞下每服二三丸不計候治小兒貓鼠驚風出十便良方用雄鼠糞七粒火煆赤於地下去火毒研為細末薄荷湯調服加麝香少許尤佳全蝎散出衛生家寶方治小兒驚風全蝎七箇生薄荷麻黃不拘多少外以線纒定再半夏末少許生薑自然汁同浸少時向火上炙如乾又入薑汁內浸再炙以薑汁盡為度焙乾為末却入後藥附子尖三箇麝香一字真腦子一字右為細末同前藥拌勻煎金銀薄荷湯調下小兒半錢量嵗數虛實加減服之銀箔散出衛生家寶方治小兒驚風白术一兩銼以一合菉豆炙香色乾芍藥一兩白附子半錢以文武火上炮黃地上去火毒人參一兩白茯苓一兩半直殭蠶一分洗去灰炒勿令焦木香一分黃茋一兩白扁豆一兩川升麻一分連葉佳焙乾糯粟米半兩天麻半兩銼如麻子大麵炒黃甘草一分藿香半兩去土生用右為末以好瓷罐盛遇有患依湯使用常服米飲調下小兒半錢數嵗以上加減用慢驚搐搦用麝香飯飲調日進六服急驚定後用陳米飲調下驚吐不止陳米飲調下天柱倒行步腳緩濃米飲下夾驚傷寒發搐搦薄荷蔥白湯調下疳氣常急多渴者百合湯調下赤白痢不思乳食者生薑三片棗五箇陳米一合煎飲調下飲食不知飢飽不長肌肉麥蘖一把炒生薑湯調下暴瀉紫蘇湯木瓜湯調下形神脫語言不正及大人吐瀉藿香湯下二錢牛黃膏出衛生家寶方常服鎮心化驚涎鬱金一錢天南星一錢粉霜一錢巴豆七粒連殼右一處為末麵糊丸如芥菜子大每服周嵗四粒薄荷湯下日二服食後臨睡時服凡小兒驚涎未可與巴豆粉霜等藥恐邪入脾轉不好治且宜服惺惺散涎積不退却進此藥生犀散治驚積潮熱及五心積熱及驚吐或傷乳食服睡不靜常服寧心安神五靈脂一兩豬牙皂角一兩灰黃色芫花一兩醋浸炒焦右三味一處為末次用巴豆六十粒連殼碾如膏用小錢桃葉四十錢入巴豆內一處再研令極勻用醋糊丸如粟米大周嵗四粒食後臨卧薄荷湯下日二服驚吐丁香湯下或淡醋湯下咳嗽皂角子煨軟捶泡湯下白痢甘草薑湯下潮熱薄荷礬石水下驚熱亦用柴胡湯下磨積及癖塊溫水下青州白丸子出錢氏方治小兒驚風大小諸風半夏七兩生天南星三兩生白附子二兩川烏頭半兩生去皮臍右搗篩為細末生袋絹盛一處用井花水攪未出者更以手揉令出如有滓更研再入絹袋內盡為度於磁盆中日照夜露至曉棄水别用井花水攪又照至來日早再換新水攪如此春五日夏三日秋七日冬十日一法四時只浸一宿去水曝乾後如玉片研細以糯米粉煎清粥丸菉豆大每服三五丸薄荷湯下癱瘓風溫酒下並不拘時候服不驚丸出宿州陳氏方治小兒因驚氣而吐逆作搐痰涎壅塞手足掣縮眼睛斜視或睛珠上視或上氣急足脛冷者難愈也枳殼去穰炒黃取末一兩淡豆䜴七分蕪荑仁三錢蝎稍十二尾鹽者去毒右四味同碾為細末醋糊丸如麻子大每服十丸乳汁下清水飲亦得量兒大小輕重加減大凡治驚各因用藥不同外物驚宜鎮之以黃連安神丸若氣動而致驚又宜寒水石安神丸大忌防風丸治風辛溫之藥必殺人何也辛散浮溫熱者也能令風流動風之氣盛故殺人也因驚而泄青色先鎮平以硃砂汁之類勿得用寒涼之藥大禁涼驚丸風木旺必尅脾胃當先實其土後瀉其木閻孝忠編集錢氏方以益黃散補土以其藥有丁香辛熱助火火旺愈虛矣青橘皮瀉肺金丁香辛熱大瀉肺與大腸脾實當瀉子今脾胃虛反瀉子而助火重虛其土殺人無疑矣其風木旺證右關脈洪大掌中熱腹皮熱豈可以助火瀉金如寒水來乘脾土其病嘔吐腸痛瀉痢青血益黃散聖藥也今立一方先瀉火補金是為神治出束垣先生蘭室祕藏方黃耆湯人參炙甘草黃耆右三味皆甘溫能補元氣甘能瀉火內經云熱淫于內以甘瀉之以酸收之白芍藥酸寒能瀉火酸未能瀉肝而大補肺金所補得金土之位火旺火虛風木何由散耶尅土然後瀉風之旺右等分㕮咀白水煎服治小兒暴驚鬼魅寒熱用野獼猴頭煎湯浴之人家飬者不治病不可用神仙聚寶丹出保生集治一切驚風內弔腸肚緊便夜啼發目睛上視手足搐搦角弓反張忽然倒地不省人事係是急慢驚風悉皆治之全蝎二三箇珍珠三錢硃砂五錢防風五錢天麻五錢白附子五錢半夏三錢南星三錢半蟬殼三錢去趐麝香一錢金箔十五片右為末十三味用粟米粥為丸如雞頭子大每服一丸用薄荷湯磨化下如驚風痰實加南星末同研化下如驚風內弔用釣藤湯化下神妙防風散出保生集治小兒一切驚風搐搦諸般惡候並治之防風二錢細辛二錢殭蠶二錢白附子一錢火炮珠砂一錢地龍三錢去土全蝎三錢火炒蟬殼蜈蚣各三錢火煨天麻一錢荆芥一錢木香一錢麝香一錢甘草二錢白芷一錢辰砂二錢人參一錢金箔少許輕粉少許右為細末每兒一字用燈心煎湯調下有痰薑湯下南星丸治小兒驚熱喉中響咬齒牙南星半錢炮天麻半錢酒浸一宿全蝎半錢火炒硃砂麝香少許右為末麵糊為丸每服七丸用金銀薄荷湯送下鎮心丸治小兒涎潮壅盛喘急壯熱膈上涎鳴如服此藥只取下涎藥立隨涎出辰砂半夏生薑汁製取出焙各半兩杏仁去皮尖研出油五分江子三十粒去皮膜去油五分右拌勻和煮陳米粥為丸如芥子大量大小加減每服三五丸生薑薄荷湯溫下利涎消乳痰丸治小兒無痰亦宜常服大半夏半兩切作豆子大用蘿蔔一箇亦切作豆子大用一碗水煮盡為妙神草二錢半去蘆取末二錢右二味乾焙為末生薑自然汁煮麵糊為丸如菉豆大每服二十丸薑湯食後下量大小加減牛黃丸治小兒驚風涎盛右用天南星二兩為末取臘月日牛膽黃牛者良一枚以汁和之却入膽內隂乾為細末入硃砂一錢麝香少許煎甘草水和丸如雞頭子大一嵗半粒熱水下不拘時日進二服墜驚散治小兒驚熱甚至天竺黃鉛霜馬牙硝各等分右為末每服半錢用熱水調下青雲散孩兒咬齒即因驚唇赤饒於面色青睡起有時頻呌喚青雲散下早惺惺石蓮心一錢南星炮殭蠶直者全蝎鉛霜一錢雄黃鬱金皂角煮乾右為末每服一字或半錢用蜜水調下羌活膏出保生集治肝驚壅目直視手足拳攣伸舒立地不得寬筋定搐羌活蝎稍回草即防風天麻神草木瓜當歸紫蘇根麝香一分硃砂白附子半錢右除麝香外細銼用酒浸一宿日慢火焙乾為末入麝香和勻用炒砂糖為膏常服一皂角子大如驚急作搐瘛瘲每服一龍眼大荆芥湯化下先搐鼻後下藥若舌哱連難治玩月散出保生集治小兒驚風搐搦眼目上視此藥搐鼻目視便下搐搦便定但搐鼻如嚏噴可治不爾死也獨角仙一箇竹刀中切作二片輕粉大全蝎一箇酒浸軟竹刀切作二片右用輕粉拌和炙令乾全蝎二片分左右為末入細辛末半錢麝香一豆大研勻成藥記明獨角仙同前法却書藥上各記左右邊每二字男左女右用奪命散出保生集治小兒驚風涎潮搐搦眼上不下喘急急慢驚風並皆治之赤腳蜈蚣一條去足生用瓜葉藜蘆蔥白去鬚一分右為末每發搐用一字吹鼻中琥珀珍珠散出保生集治驚風全蝎殭蠶硃砂輕粉右為末各等分每一字用乳汁調下辰砂妙聖丸治小兒驚風生痰涎時作搐搦壯熱驚掣夜卧不寧牙關緊急麝香川芎羌活天麻當歸膽釀南星半夏湯洗七次煮一伏時各半錢蝎稍殭蠶辰砂一錢半一半入藥一半衣右末拌勻糯米清糊為丸如雞頭子大每服一丸荆芥湯化下如噤口用藥擦牙上衮痰丸治小兒喉中涎響手足瘛瘲目睛上視即急慢驚風證江子半夏硃砂膩粉雄黃鬱金或加南星尤妙右等分為末飯丸如麻子大每服七丸用薄荷湯送下量大小加減服之利痰涎為度未利再服辰砂丸出保生集治驚證嘔逆乳食不下睡卧不寧人參一兩茯苓半兩防風半兩山藥甘草半兩黃耆牙硝三錢麝香三錢硃砂一兩右為末蜜丸每一丸薄荷湯下普濟方卷三百七十四
