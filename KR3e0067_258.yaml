body:
  text: 普濟方卷二百五十八明周王朱橚撰食治門食治霍亂附論夫隂陽不順清濁相干氣射中膲名為霍亂也皆為飽食豚膾復啖乳酪海陸百品無所不餐多飲寒漿眠卧冷席風冷之氣傷於脾胃中諸食結而不消隂陽二氣壅而及戾陽氣欲升隂氣欲降隂陽交錯變成吐利而已百脈昏亂榮衛俱虛冷摶於筋則令轉筋冝以食治之也方訶梨勒粥方治霍亂不止心胸煩悶訶梨勒皮半兩生薑一兩切粳米二合右以水三大盞煎訶梨等取汁二盞去滓下米煮粥不計時候食之高良薑粥方治霍亂吐利腹痛等疾良薑一兩銼粳米二合右以水三大盞煎良薑取二盞半去滓下米煮粥食之蠟粥方治霍亂後氣脫虛羸或㵼不止黃蠟五錢粳米三合細研右先以水煮粳米作粥臨熟次下蠟更煮臨蠟清溫服之食治五噎附論夫五噎者一曰氣噎二曰憂噎三曰食噎四曰勞噎五曰思噎由隂陽不和三膲膈絶津液不利氣不調理之所至也此皆憂恚嗔恐氣結在於心胸不得通變是以成噎冝食治之也方烏雌雞切麵羹方治五噎飲食不下胸中結寒瘦弱無力烏雌雞半隻治如食法白麵四兩桑根白皮三分末赤茯苓三分末桂心末一分右二味末入麵中以水煮桑根白皮湯麵切入䜴中煮熟與雞肉調和一如常法食之羊肉索餅方治五噎胸膈妨寒飲食不下瘦弱無力羊肉四兩炒作臛白麵半斤生薑一合陳橘皮一分湯浸去白焙右以橘皮末及生薑汁和麵作索餅於䜴汁中煮熟入臛食之良黃雌雞臛索餅方治五噎飲食不下胸膈妨寒瘦弱無力黃雌雞一隻去毛腸炒作臛白麵半斤桂心末一分赤茯苓一分末右以桂心等麵和末作索餅於䜴汁中煮入臛食之治氣噎方蜜半斤酥三兩生薑汁一合右相和以微火煎如稀湯每於酒中調一匙服之或空食亦佳桂心粥方治胸膈痰氣壅結食飲不下如似鯁噎桂心三分赤茯苓一兩桑根白皮二兩右細銼以水三大盞煎至二大盞半去滓下粳米二合煮作粥食之治噎病不下食方㫪杵頭細粳半合白麵四兩右相和溶作餛飩於䜴中煮食之治噎不下食方右用崖蜜每於粥中化半匙食之又方右用老牛噍沫如棗許大置稀粥中飲之終身不復噎矣勿令患人知食治反胃嘔吐方粳米粥方治反胃羸瘦四肢婁弱粳米一合淘薤白七莖細切豉二十五粒枳殼去麩為末一分生薑汁半合大棗劈破二枚陳橘皮去白焙乾為末一分右除薤白米外以水三盞先煎除藥至兩盞去渣下薤米與煮以熟為度空腹任意食之羊肚方治反胃食羊肚淨洗一枚陳橘皮湯浸去白切二兩䜴半斤蔥白十菩切鹽少許右將四味貯入羊肚內以繩繫頭煮熟去藥拌將羊肚細切任意食之豬肚羮方治嘔吐豬肚淨洗去脂膜一枚人參一兩陳橘去白細切三分生薑去皮細切一兩蘆根細切半兩右以水一斗煮蘆根至七升去滓次用人參等三味貯在豬肚中以線縫合再用蘆根汁煮令爛熟去藥滓將豬肚細切作羹任意食之餘汁勿棄作三五次欲盡生薑粥方治反胃嘔吐不下食生薑去皮細切研一兩枇杷葉拭去毛炙七片為末右以水二升煎至一升去滓用白粳米一合煮粥更入鹽醬汁五味等空心溫食之人參粥方治反胃吐酸水人參半兩為末生薑取汁半兩右以水二升煮取一升入粟米一合煮為稀粥覺飢食之撥粥方治反胃羸弱身不能動氣泛醋心亦治赤白痢及水痢生薑三兩研取汁白麵四兩右以薑汁和麵作撥粥煮食之羊肉生湯治反胃朝食夜吐夜食朝吐諸藥不差羊肉去脂膜切作生五兩大蒜去皮細研一顆右先將蒜入鹽醋蘸羊生空腹任意食之薄荷餺飥方治反胃朝食暮吐紫薄荷新者一握搗取汁麵四兩右和作餺飥煮熟空腹食之羊肝方治反胃食畢即吐出羊子肝一具切為條磠砂五錢取霜右調和令勻以竹杖穿炙空腹食之一方無磠砂生切羊肚五味調又方右用蝟皮一枚炙令焦為末先以水二盞菉豆煮粥續入蝟皮末一錢和服之又方右用蒼茸不限多少嫩者端午日取煮熟作菜茹食治反胃右用糯米半升裹流水擺取清暴乾燒為末砂糖溶令和旋吃立止食雞子法治反胃飲食不進附子一個炮去皮臍雞子三個右先將附子為粗末同水二碗煮雞子水進為度然後取雞子溫水洗去殼令病者旋食之烏雞法治結腸翻胃飲食入腹經宿則吐食粒不化天南星三個極大者切作三片右以純烏雞一隻去腸并毛內南星在內以繩縛定用紅酒三升煮乾為度去南星不用取雞食以人參末半兩調溫酒送下次用糯米壓之然後以平胃散多加薑棗煎神食治煩熱附論夫心煩者由隂陽更虛隂氣偏少陽氣暴勝故也亦有風熱相摶風毒攻心煩燥昏憒狂言失志宜食治之方生地黃粥方治心膈虛燥煩渴不多飲食小便赤瀝生地黃一合生薑汁半合粳米二合淡竹瀝二合蜜一合右將水煮粥熟下地黃薑汁煮令熟次下蜜并竹瀝攪轉食後良久或臨卧食藕實羹方治煩熱去渴補中養神益氣除百疾令人心神娛暢藕實三兩新嫩者甜瓜皮四兩切蓴菜四兩切右以䜴汁相和作羹調和食之雞子羹方治心下煩熱止渴雞子三枚蓴菜一斤半淡竹笋四兩去皮切右以䜴汁中相和作羹臨熟破雞子投入羹中食之黑豆羹方治壅毒攻心煩燥恍惚黑豆淡竹葉五十片枸杞莖葉五兩切右以水二大盞煮二味取一大盞去滓下枸杞葉煮熟入五味作羹放溫食之寒水石粥方治心下煩熱多渴恍惚寒水石二兩搗碎粳米一合牛旁根四兩切右以水四大盞煎至二盞半去滓下米煮粥食之茯神粥方出聖惠方治心胸結氣煩熱或渴狂言驚悖茯神一兩羚羊角屑五錢粳米二合右搗細羅為麵與米同煮為粥食之藿葉根方出聖惠方治氣壅煩熱或渴藿葉一斤切蔥白一握切右以䜴汁中煮調和作羹食之滑石粥方出聖惠方治膈上煩熱多渴通利九竅滑石二兩碎粳米二合右以水三大盞煎滑石至二盞去滓下米煮粥溫食之酸棗仁粥方出聖惠方治心臟煩噪不得睡卧酸棗仁一兩搗為末粳米二合右煮米作粥臨熟下酸棗仁末半兩攪勻食之玉屑飯方出聖惠方治胸中伏熱心煩燥悶口乾氣逆粱米飯一盞菉豆四兩研右將飯散粉內拌令勻入湯內煮令熟用䜴汁和食之菘菜羮方出聖惠方通利腸胃除胸中煩熱解酒毒右用菘菜二斤煮作羮淡食之作虀食亦妙葛粉粥方出聖惠方治胸中煩熱或渴心燥葛粉四兩粟米半升右以水浸粟米經宿來日漉出與葛粉同拌令勻煮粥食之食治久新咳嗽附論夫五臟六腑皆有嗽而肺最多然肺居四臟之上外合毛皮皮毛喜受風冷故肺獨易為嗽也寒氣客於肺則寒熱上氣喘急汗出胸滿喉鳴多痰唾面目浮腫故謂肺嗽也肝嗽者其狀左脅下痛甚則不能轉側心嗽者其狀嗽而心痛喉中介介如鯁狀甚則咽腫脾嗽者其狀右脅痛瘖瘖引於背甚者則不可轉動則嗽劇腎嗽者其狀腰背相引痛甚則咳逆此皆由風寒冷熱所傷或飲食不節所至冝以食治之也方灌藕方出聖惠方益心潤肺治胸膈煩燥除咳嗽生藕五挺大者生百合二兩生薯藥三兩白茯苓三兩末棗三七枚去皮核生天門冬三兩去心細切麵四兩牛乳二升蜜六合右將百合薯藥天門冬爛研如蜜更取細次入棗肉次入茯苓次右先以酥微炒蔥入粳米二合用水依尋常煮粥令稍稀空心服未差更作黃牛乳亦可豆蔲粥方出聖濟總録治傷寒後脾胃虛冷嘔逆不下食肉豆蔲去殼一枚另作末粳米淨洗二合右先將粳米如常煮作稀粥後下肉豆蔲末攪勻頓服食治虛損羸附論夫血氣者所以榮養身也虛損之人精液萎竭氣血虛弱不能充盛肌膚故令人羸瘦冝以飲食補益也方灌腸方出聖惠方治虛損羸瘦精萎不能飲食冝喫大羊腸一條雀兒胸前肉三兩細切肉蓯蓉半兩細切酒浸附子一錢末乾薑一錢末兔絲子二錢末胡椒末一錢漢椒末一錢糯米二合雞子白三枚右將肉米并藥末和拌令勻入羊腸內令實繫腸頭煮令熟稍冷切作餡子空心食之羊腎饆饠方出聖惠方治下膲虛損羸瘦腰膝疼腫或多小便羊腎兩對去脂膜細切附子五錢炮裂去皮臍搗羅為末乾薑一分炮裂搗末肉蓯蓉一兩酒浸一宿剖去皺皮搗末胡椒一錢搗末麵三兩大棗七枚煮熟去皮核研為膏右將藥并棗及腎等拌和為饆饠饀㳛麵作饆饠以數重濕紙褁於粳火中煨令紙焦藥熟空腹食之良久冝食三兩匙溫水飲壓之藥肉粥方出聖惠方治虛損羸瘦駐顔色或女人産後虛羸等疾羊肉二斤當歸銼微炒白芍藥五錢熟乾地黃五錢黃耆五錢生薑一分切粳米三合右以精肉留四兩細切餘一斤十二兩先以水五升并藥煎取汁三升去滓下米煮粥欲熟入生肉更煮令熟用五味調和空心食之雀兒藥粥方出聖惠方治下元虛損陽氣衰弱筋骨不健雀兒十枚剝去皮毛銼碎兔絲子一兩酒浸二宿曝乾别搗末復盆子一兩五味子一兩枸杞子一兩粳米二合酒二合右搗羅為末將雀肉先以酒燒入水二大盞次下米煮粥欲熟下藥末五錢攪轉入五味調和令勻更煮熟空心食之耆婆湯方出聖惠方主大虛風冷羸弱無顔色酥一斤生薑汁一合薤白三握去鬚切酒三升蜜一升熟油一升川椒三合去目閉口者微炒胡麻仁一升研爛橙葉二掘䜴一升糖一升右先以酒浸一宿絞去滓內酒入銀器中次入酥蜜油糖薑汁等煎令沸下椒橙葉胡麻慢火煎候薤白黃赤色即濾去滓收瓷盒中每日空心燒服一合豬肚方出聖惠方補虛羸乏氣力肥大豬肚一枚淨洗如食法人參二兩去蘆頭乾薑一兩炮裂銼椒半兩去目及閉口者炒去汗蔥白七莖去鬚粳米三合一作白粱米右搗篩入米合和相得內豬肚中縫合勿令泄氣以水五升入鐺內微火煮令爛熟空腹食之次暖酒一中盞飲之一方兼下少飯白蜜煎丸出聖惠方補虛羸瘦弱乏氣力白蜜二升臘月豬肪一升去膜胡麻油半升微熟熟乾地黃末一升右合和以銀器中重湯令可丸下之丸如梧桐子大每服以溫酒下三十丸日三服稍加以知為度久服令人肥充好顔色煎豬肪出聖惠方治大虛羸困極冝服右用豬肪不中者半斤入蔥白一莖於銚子內煎令蔥黃色即止候冷暖如人體空腹服頓服之令盡暖榻卧覆蓋至日晡後乃食白粥稀糜過三日後更宜加服羊肝羮方羊肝一具去筋膜細切羊脊寅肉二條細切麯末一兩枸把根五斤銼以水一十五升煮取四升去滓右用枸把根汁煎前羊肝等令爛入䜴一中盞蔥白七莖切以五味調和作羮服空腹飽食之後三日慎食如上法羊脊羮方治下元久冷反骨蒸羸瘦不下食白羊脊骨一具全者椎碎羊髓兩具碎之羊腎一對右用粱米一合水四升煎骨熟入羊腎一對再煎候熟取去濾過將腎切入蔥白五味如常羮食下米作粥亦可骨汁煮索餅方出聖惠方治虛損羸瘦下焦反冷眼昏耳聾大羊尾骨一條以水五大盞煮取汁二盞半蔥白七莖去鬚切陳橘皮一兩湯浸去白瀼焰荆芥一握麵三兩羊肉四兩細切右都用骨汁煮五七沸去滓用汁少許溲麵作索餅却於汁中與羊肉煮入五味空腹食之羊肉粥方出聖惠方治虛損羸瘦助陽壯筋骨羊肉二斤黃耆一兩銼人參一兩去蘆頭白茯苓一兩棗五枚粳米二合右先將肉去脂皮取精者內留四兩細切餘一斤十二兩以水五大盞并黃耆等煎取汁三盞等去滓入米煮粥臨熟下切了生肉更煮入五味調和空心食之黃耆粥方出聖惠方治虛損瘦弱益氣力除腸風黃耆三兩銼人參一兩去蘆頭白茯苓一兩生薑五錢白粱米三合桑根白皮一兩銼右細銼和勻每用藥二兩以水三大盞入棗五枚煎取一盞去滓下米煮粥空腹食之蓯蓉粥方出聖惠方治久積虛冷陽氣衰微白羊肉四兩切肉蓯蓉一兩水洗切粳米三合鹿角膠炒燥三分蔥白切七莖雞子二枚右以五味汁中煮粥臨熟下膠雞子空腹食之羊腎粥方出聖惠方治虛損羸瘦羊腎一對去脂膜切肉蓯蓉一兩酒浸一宿刮去皺皮切蔥白三莖去鬚切薤白七莖去鬚切粳米一合右先將羊腎及蓯蓉入少酒炒後入水二大盞半入米煮之欲熟次下蔥白薤白煮作粥入五味調和空腹食之羊脊骨粥方出聖惠方治虛損羸瘦乏力益精氣羊連尾脊骨一握肉蓯蓉一兩酒浸一宿刮去皺皮兔絲子一分酒浸三日曝乾别搗末蔥白三莖去鬚切粳米三合右銼碎脊骨水九大盞煎至三大盞去滓將骨汁入米并蓯蓉等煮粥熟入蔥五味調和候熟即入兔絲子末及酒二合攪轉空腹食之蓯蓉羊腎粥方出聖濟總録治腎勞風虛面色黃黑鬢髮焦乾肉蓯蓉一兩五錢酒洗去土羊腎一具去脂膜細切羚羊角屑二兩磁石燒赤醋碎搗爛薏苡仁各三兩右羊腎磁石薏苡仁外銼細為三服每服水二升半煎至二升去滓下磁石薏苡仁各一兩半腎一具煮粥空心任意食之羊腎羮方出聖惠方治羸瘦虛損陽氣衰弱腰疼無力乃令人肥健白羊腎一對去脂膜切肉蓯蓉一兩酒浸一宿刮去皺皮切蔥白二莖去鬚切羊肺三兩切右並於䜴中煮入五味作羮空腹食之黃雌雞粥方出聖惠方治虛損益氣壯筋骨去膀胱積冷補腎氣黃雌雞一隻未周年者制之如法以水五升煮取汁一升杏仁十枚湯浸去皮尖雙仁熟乾地黃三兩銼碎與杏仁同研用酒三合研絞取汁粳米三合右每用雞汁二大盞半和米煮粥欲熟下地黃杏仁等更煮令熟空心食之肉蓯蓉臛方出聖濟總録治臟腑虛損四肢乏弱不欲飲食肉蓯蓉一兩酒浸一宿刮去皺皮蔥白三莖去鬚切糯米糝一兩羊肉三兩右將蓯蓉羊肉細挼和米糝及蔥都依尋常煮法作羮著鹽醋椒醬五味和空腹食之豬肚糜方出聖濟總録治虛損豬肚腎各一具去脂膜人參麥門冬三分去心地骨白皮三兩右除肚腎外細銼用綿裹與肚腎同入水一斗煮熟棄藥取肚腎肉汁中入蔥白一莖細切粳米一升用微火煮熟隨意飲汁食肉補藥羊肝方出聖惠方羊肝細切一具羊脊膂肉細切一條陳麯末三兩枸杞根五兩切以水一斗二升煮取九升去滓右以枸把根汁重煎令沸次入肝肉麯末并蔥䜴汁調和漸煎如稠分作三分空腹食之枸把羮方出聖濟總録治羸瘦虛勞枸把一斤羊腎一對切羊肉三兩切蔥白七莖切右以五味汁煮作臛空腹食之豬腎羮方出聖濟總録治諸虛羸益氣豬腎一對切枸把葉一斤切蔥白十四莖切豬脊膂一條去脂膜切右以五味汁作羮空腹食之雀兒粥方出聖惠方治臟腑虛損羸陽氣乏弱雀兒五隻治如食法細切粟米一合蔥白三莖切右以炒肉次入米一合煮用水二大盞半煮作粥欲熟下蔥白五味等候熟空心食之椒腎羮方出聖惠方治下焦虛損久冷漢椒二十粒去目及閉口者酒浸一宿白麵三兩羊腎一對去脂膜細切右取椒麵內拌勻熱水中下並羊腎煮熟入五味調和作羮空腹食之雞子索餅方出聖惠方治虛損羸瘦令人肥白光澤白麵四兩雞子四兩白羊肉四兩炒作臛右以雞子清溲作索餅於䜴汁中煮令熟入五味臛空腹食之人參煮羊肉法出聖濟總録治勞補益人參一兩枸把白皮三兩肉蓯蓉酒洗去土三分右細銼先以水三升浸藥經兩宿煎之去滓取汁一升細切蔥白一握鹽少許同羊肉半斤䜴一合於藥汁中和勻入羊肚內從五更初煮至平旦細切食之至飽不盡續食之補腎羮方出聖濟總録治勞虛損精氣絶竭羊腎一雙去脂切蔥白一分切生薑一分切右細切羊腎入五味蔥薑如常法作羮食之食紫菊法出聖濟總録治虛勞補益右用正月已後五月已前採黃花紫莖菊葉食之九月內採花隂乾搗末酒粥羮任意食之澤㵼羮方出聖濟總録治虛勞補益右用生澤㵼花葉切五兩以水三升煮至一升半去淨滓下半肚蔥䜴等於汁中煮香熟任意食之老羊肚乃佳薏苡餅方出聖濟總録治虛勞補益右用薏苡仁熟水淘搗羅如作米粉法以棗肉乳汁相拌和作團如蒸餅大依法蒸熟隨性食之夏月用米粉不得留經宿恐酸壞一方同羊肉作羮如常法用蔥䜴等熟食之苣勝粥方出聖惠方治五臟虛瘦羸損益氣力堅筋骨填骨髓右用苣勝子不限多少揀去雜蒸暴各九遍每取二三合用湯浸布裹挼去皮再研水濾汁煎成飲著好粳米煮作粥食之或煎濃飲澆索餅食之甚佳枸把煎方出聖惠方有人頻遭重病虛羸不可平服冝服生枸杞根細銼一斗以水五升煮取一斗五升沉清白羊脊骨一具細銼右以微火煎取五升去滓收瓷盒中每取一合酒一小盞合暖每於食前溫服食治五勞七傷附論夫人有五勞七傷一曰志勞二曰思勞三曰心勞四曰憂勞五曰瘦勞蓋五勞則傷於五臟也凡人憂愁思慮則傷心髮燥而面無精光也形寒飲冷則傷肺氣促咳逆也恚怒氣逆上而不下則傷肝目暗筋骨攣痛也飲食勞倦則傷脾吐逆食少不成肌膚也久坐濕地強力入水則傷腎腰腳重疼行履不任也此則五勞證候也七傷者是傷五臟六神故也肝藏魂肺藏魄心藏神脾藏意與智腎藏精與志此為七神也且五臟以七神而為主主若無臟如人無室臟若無神如室無人以此比之大可知也今言七傷者一曰隂衰二曰精清裏急三曰精少四曰精消陽事不興五曰小便苦數囊下濕痺六曰胸脅苦痛也七曰隂寒兩脛厥此皆臟腑虛損表裏受敵肌虛筋骨不榮故曰五勞七傷之病也冝以食調適之方藥餅方出聖惠方治五勞七傷下焦虛冷小便遺精冝食啖腰腎壯陽道附子一兩炮裂去皮臍神麯三兩炒乾薑一兩炮裂銼肉蓯蓉一兩半酒拌一宿刮去皮炙乾桂心一兩五味子一兩兔絲子酒浸三日暴乾搗為末一兩白麵一升黃牛乳一升半羊髓三兩棗二十枚煮去皮核漢椒半兩去目及閉口者微炒去汗酥二兩蜜四兩右搗羅為散入麵與酥蜜髓乳相和入棗穰熟溲於盆中蓋覆勿冷通氣風半日久即將出更溲令熟擀作糊大麵以上以筋子璲之即入爐𨫼中上下以火煿令熟每日空腹食一所入酵和麵更佳釀豬肚方出聖惠方治五勞七傷羸瘦虛弱獖豬肚一枚洗淨去脂人參一兩去蘆頭杏仁一兩去皮尖研白茯苓一兩陳橘皮半兩湯浸去白穰焙乾薑一分炮裂蕪荑一分漢椒一分去目及閉口者微炒去汗蒔蘿一分胡椒一分黃牛酥一兩糯米五合淘折看肚大小臨時加減大棗二十一枚去核切右搗羅為末每用藥一兩入酥棗杏仁米等相和令勻入肚內以麻線縫合即於甑內蒸令熟切作片空心漸漸食之藥髓餅子方出聖惠方治五勞七傷腎氣虛弱腰腳疼痛小便遺瀝乾薑一分炮裂銼漢椒半兩去目及閉口者微炒去汗桂心一分附子一兩炮裂去皮訶梨勒一分煨用皮縮砂半兩去皮作末蜜一合棗一百枚去核細切羊骨髓五兩白麵二斤黃牛酥三兩右搗細羅為麵入諸物同和餡分為八分以溲麵包褁如常作髓餅入爐上下著火煿則須徹裏過熟氣日空腹食之一所覺腰腎及膀胱暖則止羊腎羮方出聖惠方治五勞七傷髓氣竭絶羊腎一對去脂膜切肉蓯蓉一兩酒浸一宿刮去皺皮生薯蕷一兩羊髓一兩薤白一握去鬚切蔥白半兩去鬚切粳米一合右炒羊腎并髓等欲熟下米并䜴汁中五大盞次下蓯蓉更入生薑鹽等各少許煮成羹食之蘹香角子方出聖惠方治五勞七傷隂菱氣乏蘹香子一兩木香一兩巴戟一兩附子一兩炮裂去皮臍山茱茰一兩豬腎一對去脂膜細切漢椒去目閉口者微炒出汗右搗為末每對豬腎用藥末二錢入鹽溲麵像肝角子樣修製灰內煨令熟薄茶空腹食之羊腎羮方治五勞七傷腎氣不足羊腎一具去脂膜切羊肉三兩嫩枸把葉細切一升蔥白三莖去鬚切粳米五兩生薑切三分右先炒腎及肉蔥白生薑欲熟下水二大盞半入枸杞葉次下米五味等煎作羹食之羊髓粥方出聖惠方治五勞七傷補虛強志益氣羊髓三合羊腎一對去脂膜細切蔥白三莖去鬚切生薑五錢切粳米一合肉蓯蓉二兩酒浸一宿刮去皺皮右以炒腎及蔥薑欲熟入水二大盞半次入米五味等煮作粥食之蔥䜴粥方出聖惠方治五勞七傷體熱喘急四肢煩疼香䜴三合蔥白切半升羊髓一兩鹽花五錢薄荷三十莖右以水三盞先煎蔥白四物十餘沸下䜴汁更煎五七沸去䜴入米二合煮為粥空腹溫服之豬腎羮方出聖惠方治五勞七傷乍寒乍熱背膊煩疼羸瘦無力豬腎一對去脂膜切生地黃四兩切蔥白一握去鬚切生薑半兩切粳米一合右豬腎煮及蔥白欲熟者䜴汁五大盞入生薑下地黃及米煎作羹食之缶雞方出聖惠方治五勞七傷益下元壯氣每服經月餘肌肉充盛老成少年冝服黃雌雞一隻去毛羽腸臟肉蓯蓉一兩酒浸一宿刮去皺皮切生薯蕷一兩切阿魏少許煉過粳米二合淘右先將雞煮爛孹去骨汁下米及雞肉蓯蓉等都煮粥入五味空心食之肉蓯蓉粥方出聖惠方治五勞七傷久積虛冷陽事都絶肉蓯蓉二兩酒浸一宿刮去皺細皮鹿角膠半兩搗碎炒令黃燥為末粳米二合羊肉四兩細切右煮羊肉蓯蓉粳米作粥臨熟下鹿角膠末以鹽醋五味調和作兩頓食之蘿藦菜粥方出聖惠方治五勞七傷隂囊下濕癢蘿藦菜半斤羊腎一對去脂膜切粳米二合右以細切煮粥調和如常法空腹食之羊腎粥方出聖惠方治五勞七傷羸瘦陽氣不足心神虛煩白羊腎一對去脂膜切羊髓二兩白粳米二合右相和煮作粥入鹽椒空腹食之鹿腎粥方出聖惠方治五勞七傷陽氣衰弱益氣力鹿腎一對去脂膜細切肉蓯蓉二兩酒浸一宿刮去皺皮切粳米二合右以水二盞煮米作粥熟下鹿角膠蓯蓉及蔥白鹽椒食之枸杞粥方出聖惠方治五勞七傷庶事衰弱枸杞半斤切粳米二合右以䜴汁相和煮作粥以五味蔥白等調和食之雞肝粥方出聖惠方治五勞七傷隂痿虛弱雄雞肝一具細切兔絲子末半兩粟米二合右以水二大盞半入五味及蔥煮作粥空心食之豬腎羮方出聖惠方治五勞七傷隂痿羸瘦精髓並竭四肢少力豬腎一對去脂膜切枸杞葉半斤切右用䜴汁二大盞半相和煮作粥羹入鹽醋椒蔥空腹食之牛腎粥方出聖惠方治五勞七傷隂痿氣乏牛腎一對去脂膜筋切陽起石四兩布褁粳米二合右以水五大盞煮陽起石取二盞去滓石下米及腎五味蔥白等煮作粥空腹食之煮羊頭蹄方出聖惠方補五勞七傷虛損白羊頭蹄一具草火燒令黃色刮去灰塵胡椒五錢蓽芰五錢乾薑五錢蔥白切半升䜴半升右以水先煮頭蹄半熟內藥更煮令爛去骨空腹適性食之日食一具滿七日且暫止禁冷生醋滑五辛陳臭豬雞等七日治風胎瘦病五勞七傷虛驚悸用白羊頭一枚燖如食法煮令極熟切於䜴汁中五味調和食之食治骨蒸勞附論夫骨蒸之病而多異名為療皆同一體丈夫以勞損為宗婦人以血氣為本起於腎虛所至故云隂氣不足陽必湊之血氣不榮骨髓枯竭腎主於骨以先從骨熱故曰骨蒸又大都此病起於無端不問老小男女皆染斯病嬰孩之流傳注更甚其狀心胸煩滿骨節疼痛頰口乾或寒或熱四肢無力毛髮乾焦咳嗽頭疼精神昏悶多卧少起夢與鬼交驚悸不安時時盜汗毒氣傳及五臟日漸羸瘦冝以食治之方杏仁粥方出聖惠方治骨蒸煩熱咳嗽杏仁五錢浸洗去皮尖雙仁水研取汁生地黃三兩研取汁生薑一分研取汁蜜半匙粳米二合酥半兩右先以水煮作粥次入杏仁等及煮令熟不計時食之牛膝葉羮方出聖惠方治骨蒸勞背膊煩疼口乾狀熱四肢無力牛膝葉四兩龍葵菜四兩地黃葉四兩生薑五錢䜴一合半右先以水五大盞先煎薑䜴取汁二大盞半去薑䜴下牛膝葉等煮作羮入少鹽醋調和食之地黃葉豬腎羮方出聖惠方治骨蒸勞乍寒乍熱背膊煩疼及瘦弱無力生地黃葉四兩切豬腎二枚去脂膜切豆䜴一合蔥白三莖去鬚切生薑一分切右先以水二大盞煎䜴等取汁一大盞半去滓入地黃葉等於汁中煮更入鹽醋米同作羮食之枸把葉根方出聖惠方治骨蒸勞肩背煩疼頭痛不能下食枸杞葉五兩青蒿葉一兩䓤白一握去鬚切䜴一合右先以水三大盞煎䜴取汁一盞五分去䜴下枸把葉等煮作羹調和食之地黃粥方出聖惠方治骨蒸勞瘦日晚寒熱咳嗽唾血生地黃汁三合粳米一合酥半兩右以水一大盞先煮米欲熟入地黃汁次下酥候下熟溫溫食之蔥䜴粥方出聖惠方治骨蒸勞煩熱咳嗽四肢疼痛時發寒熱䜴一合蔥白一握去鬚切粳米二合右以水二大盞半煮蔥䜴取汁一盞半絞去蔥豉入米煮粥不計時候食之酒煮鰻鱺魚方出聖惠方治骨蒸勞瘦及腸風下蟲右用鰻鱺魚二斤治之如法銼作假子入鐺內以好酒三大盞熟煮入鹽醋食之酸棗仁粥方出聖惠方治骨蒸心煩不得眠臥右用酸棗仁二兩以水二大盞半研濾取汁以米二三合煮作粥候臨熟入地黃汁一合更微煮過不計較時候食之食治補益虛損於諸內中蒸煮石英及取汁作食治附論夫石性甚剛猛利而能榮養隂陽逐氣祛風恱澤顔色但服餌有法功效殊常今則煮錬取其精華調品成其法膳可安臟腑用補虛羸者爾方豬肚煮石英法出聖惠方治虛損凡人年四十已下服二大兩四十五十及至六十已上加二兩常用四月以後服之候接秋氣石力下溫其臟補益腰腎得力終無發動白石英二兩以生絹袋盛都縫合人參一兩去蘆頭生地黃二兩切生薑一兩切蔥白七莖切䜴半兩羊肉半斤切豬肚一枚淨洗粳米一合川椒四十九粒去目及閉口者右藥及石英袋並內豬肚中急繫口勿使泄氣以水一斗煮至二升即停出藥肚著盤內使冷然後破之去石英袋訖取肚及汁將作羹服之每年三五度服每服石英依舊餘藥換之分數一依初法釀豬肚方出聖惠方治虛損不足令人肥白恱顔色豬肚一枚淨洗白石英一兩搗碎生地黃一合切饙飯半兩紫石英一兩捶碎與白石英同線褁川椒三十粒去目及閉口者微炒去汗搗末蔥白三莖去鬚切鹽少許右拌和諸藥等內豬肚中以麻線縫定蒸令爛熟取出石英細切任性食之三石豬腎羹方出聖惠方治腎氣不足陽道衰弱紫石英三兩白石英三兩磁石三兩捶碎淘去赤汁豬腎二對去脂膜切肉蓯蓉二兩酒浸一宿刮去皺皮切枸杞半斤切右先將三石捶碎布褁以水五大盞煮石取二盞半去石著豬腎蓯蓉枸杞鹽醋醬五味末等作羹空腹食之三石水煮粥方出聖惠方治隂痿囊下濕或有瘡虛乏無力紫石英四兩白石英四兩磁石八兩捶碎淘去赤汁右捶碎布褁以水五大盞煮取二盞去石下米三合作粥食之其石每日煎用之經三箇月即換之服牛乳方出聖惠方補虛益氣牛乳五升蓽芰末一兩右入銀器中以水三升和乳合煎取三升後收瓷盒中每於食前暖一小盞服之羊肉中蒸石英服餌法出聖惠方治虛損不足右用精羊肉一斤白石英三兩肉切作兩假鑽作一孔內石英著肉中還相合即用荷葉裹又將蠟紙裹後又將布裹於二斗米飯中蒸之候熟即出肉却檢去石英後取肉細切和蔥椒薑等作罨肉空心食之石英水煮粥法治腎氣虛損隂痿周痺風濕肢節中疼痛不可持物白石英二十兩磁石二十兩并捶碎右以水二斗器中浸於露地安置夜即揭蓋令得星月氣每日取水作羹煮粥煎茶湯喫皆用之用却一升即添一升服經一年諸風並差氣力強盛顔如童子蔥䜴湯出聖濟總録治服乳石因食倉米臭肉發動者蔥白一握切䜴一合右以水二升煎至升半去滓作常服䜴湯服可五六劑差煨羊腎方出聖惠方治虛損腳膝無力陽氣不盛補益羊腎一對鍾乳粉一分右取羊腎切去脂膜分為四片摻令勻却合用濕紙褁煨令熟空腹食之白石英粥方出聖濟總録治石發右用白石英五斤搗篩細研三日一乳牛十嵗以上時方養犢而羸瘦者每日稱一兩石英末拌豆與食之經七日即可取乳每每朝空服熱飲一升餘者作糜粥任意食之百無所忌五月上旬起良如急要用則亦不拘此牛糞糞地種菜供服乳人食甚佳一方先研末和牛糞糞地種枸杞牛膝豆菜等食之益人服乳石後將慎紫餺飥方出聖濟總録右用好烏豆任多少煮取濃汁以代水入少鹽和麵仍依常法作餺飥還向此豆汁中熟煮可三七沸溢出則添豆汁勿無水熟即出之任意以豬羊肉菉豆等類臛澆食之或作冷淘食亦得和山芋作餺飥益為佳麵餅方出聖濟總録治乳石發動右用新大麥為麵和肉汁作餅食之大涼麵作栁葉條為羮亦佳大麥和黑豆相拌熟蒸任意食春夏服之良冒熱逺行將大麥作餅食之壓石堅飢油麵餺飥方出聖惠方補虛勞生胡麻油一升折粳米泔清一斤右以微火煎盡泔清乃止出貯之取冷鹽湯二合將和麵作餺飥煮令熟入五味食之益腎氣強陽道出本草右用白羊肉半斤去脂膜切作生以蒜虀食之三日輒一度甚妙令人長脂肉肥白出本草右用猯肉和五味煮食之食治心腹痛附論夫心腹者由寒客於臟腑之間與氣血相摶隨氣上下攻繫心腹而痛臟氣虛邪氣勝停積成疢故令心腹痛也冝食治之方蓽茇粥方出聖惠方治心中冷氣往往刺痛腹脹氣滿蓽茇一分胡椒一分乾薑炮裂銼一分檳榔一分桂心一分粟米三合右搗羅為末以水二大盞米煮粥候熟入藥末三錢攪令勻每日空腹食之桃仁粥方出聖惠方治邪氣攻心腹痛桃仁二十一枚去皮尖生地黃一兩桂心五錢末粳米三合細研生薑一分并地黃桃仁以酒三合研絞取汁右先用水煮米作粥次下桃仁等汁更熟調入桂心末空腹食之高良薑粥方出聖惠方治心腹冷氣往往結痛或遇風寒及喫生冷即痛發動高良薑五錢粳米二合陳橘皮五錢湯浸去白右以水三大盞煎高良薑陳橘皮取汁一盞半去滓投米煮粥空腹食之蓽茇粥方出聖濟總録治心腹冷氣㽱痛妨脹不能食蓽茇一兩胡椒一兩桂去粗皮三分右搗羅為麵每服三錢鹽水一碗半入蔥一握䜴半合先煮蔥䜴熟去滓次下米三合煮粥將熟入前藥末同煮少頃空腹食之高良薑粥方出聖濟總録治心腹積冷結痛高良薑搗為末半兩白米三合右先以水二大升煎高良薑取一升半去滓下米煮熟入五味調和空腹食之吳茱茰粥出聖濟總録治心腹冷氣衝脅肋痛吳茱茰水浸去涎焙乾炒搗末半兩右先用水二升下米入蔥䜴同煮熟後下茱茰末一分并鹽少許空腹食之桃仁粥方治冷氣心腹痛煩悶及治咳嗽氣喘桃仁去皮尖雙仁搗以水一升研取汁粳米三大合右以桃仁汁煮粥空腹食之紫蘇子粥方治冷氣心腹痛煩脹不能下食紫蘇子一合微炒桂心末二錢右搗碎紫蘇子以水二大盞絞濾取汁入米二合煮粥候熟入桂末食之椒麵粥方治久患冷氣心腹結痛嘔吐不能下食蜀椒去目及閉口者一分炒出汗水浸一宿焙乾為末白麵三兩右將椒末於麵內拌勻於䜴汁中煮令熟空腹食之食治腰腳疼痛附論夫腰腳痛者由腎氣不足受風邪之所為也勞傷則腎虛虛則受於風冷與真氣交爭於腰腳疼痛冝以食治之也方食羊蜜方治虛勞腰痛咳嗽肺萎骨蒸熟羊脂五兩熟牛髓五兩白蜜五兩熟豬脂五兩生薑汁五兩生地黃汁五兩右將豬羊脂煎一沸次下牛髓又煎一沸次下白蜜生薑地黃汁微火煎不住手攪膏成貯蜜氣中每服一匙許空腹溫酒調下羹粥中服之亦得若食素者以酥代脂髓加麥門冬汁若不能食或多風者加白术羊臟羊方治虛勞腰腳痛羊肝肚腎心肺各一具湯洗細切胡椒一兩蓽茇一兩䜴一合牛酥一兩蔥白一握細切右先以五味相和以水七升慢火煎取五升去滓和羊肝等并汁皆內羊肚中繫肚口别用絹袋盛之煮熟乘熟出切肚食之旋旋服盡藥汁羊腎餛飩方治腎氣虛損腰腳疼痛五味子一兩山茱茰一兩乾薑炮裂一兩川椒去目及閉口者微炒去汗桂心一兩右搗細羅為麵每日取羊腎一對去脂膜細切入散兩錢木臼內杵如泥作饀用和麵稔作餛飩以水熟煮和汁食之羊脊骨羮方治腎氣虛冷腰腳疼痛轉動不得羊脊骨一具捶碎以水一斗煎取五升羊腎一對去脂膜切羊肉二兩細切蔥白五莖去鬚粟米二兩右炒腎肉斷血即入薑蔥五味然後添骨汁入米重煮成羮空腹食之䜴酒方治下膲風濕腰腳疼痛行履無力䜴二合薤白一握切洗去滑附子半兩炮裂去皮臍杵末川椒五十粒去目及閉口右相和炒至薤熟投於三升酒中更煎四五沸每取一小盞攪粥食之豬腎粥方治腎虛氣勞損腰膝疼行動無力豬腎一對去脂膜切米三合蔥少許薑少許右以䜴汁一升半煮粥入五味并酒調和如常法空腹食之又枸把羊腎粥方治陽氣衰腰腳疼痛五勞七傷枸杞葉一斤羊腎一對細切米三合蔥白十莖右細切加五味煮粥如常法空腹食羊脊骨羮方治腎臟風冷腰腳疼痛轉動不得羊脊骨一具捶碎蔥白四莖去鬚切粳米四合右以水七大盞煎骨取汁四大盞漉去骨每取汁二大盞入米二合及蔥椒鹽醬作羮空腹食之豬肚炙方治下膲風冷腰腳疼痛轉動不得豬肚一枚湯洗酒一升附子半兩炮去皮臍杵末右以椒蔥鹽醬并酒附子末拌和煮亦作肉炙熟空腹食之兼飲酒一兩盞勿令過度生地黃雞方治腰背痛骨髓虛不能久立身重氣乏盜汗少食時復吐利生地黃八兩飴糖五兩烏雞一隻右先將雞去毛皮及腸臟細切地黃與糖相和內雞腹中銅器貯之復置甑中蒸飯熟藥成取食之勿用鹽醋食肉盡即飲銅器中藥汁桂心酒粥方治腎臟虛冷腰腳疼痛不可忍桂心半兩末好酒一升右暖酒和桂心末空腹分為二度攪粥食之梅實仁粥方治腰腳疼痛不可轉側梅實仁半兩研極細米二合右煮米令半熟即下梅實仁相和攪令勻候熟空腹食之婆羅粥方治腎臟風冷腰腳疼痛牛膝一兩去苖銼碎酒浸一宿白麵四兩右將牛膝於麵中拌作婆羅粥煮熟十沸漉出則以熟水淘過空腹頓食之白羊腎羮方治久積虛損陽道虛弱腰腳無力白羊腎一對去脂膜切肉蓯蓉一兩酒浸細切右相和入蔥白鹽醬椒煮作羮如常法空腹食食治脾胃氣弱不下食附論夫脾胃者位居中宫象夫土也土生萬物四藏令口其氣故云人之虛者補之以味味以行氣氣以實志言滋形潤神必歸於食莊子云納滋味百節肥焉脾養肌肉脾胃氣弱即不能消化五榖氣虛弱則腸鳴泄痢既多則諸藏氣竭肌肉消瘦百病輻湊冝以飲食和益脾胃之氣滋潤臟腑養於經脈祛疾之甚可謂上醫故千金云凡欲治病先以食療既食療不愈後乃用藥爾方釀羊肚方治脾胃氣弱不能下食冝食羊肚一枚治如常法羊囱一斤細切食茱茰半兩末人參去蘆頭搗末一兩陳橘皮一兩湯浸去白穰焙胡椒一分末肉豆蔲一枚去湯用末乾薑半兩末生薑一兩切蔥白二十七莖切粳米五合淘鹽末半兩右取諸藥末拌和肉米蔥鹽等內羊肚中以粗線繫合勿令泄氣蒸令極熟分三四度空腹食之和少醬醋無妨羊肝饆饠方治脾胃氣弱不能飲食四肢羸瘦白羊肝一具去筋膜細切肉豆蔲一枚去殼末乾薑一分炮裂末食茱茰一分末蕪荑仁二分末蓽撥一錢末薤白一合切右先炒肝薤欲熟入豆蔲等末鹽湯㳛麵作饆饠爐裏煿熟每日空腹食一兩枚極效蓴羮方治胃氣弱不下食四肢無力漸羸瘦蓴菜四兩鯽魚紙褁燒熟去鱗切四兩陳橘皮湯浸去白生薑一兩蔥白十四莖破羊骨一斤熬汁去骨右先將五味就羊骨汁中作羮空腹食之豆蔲發蒸方治脾胃氣弱食即吐嘔逆草豆蔲仁二枚煨高良薑細銼半兩生薑汁二合羊肉炒臛四兩麵四兩右入麵溲乾即便入黃牛乳調看稀稠得所灌入藕中逐竅令滿即於甑中蒸熟每飯後或臨卧時少少食之鹿髓煎方出聖惠方鹿髓五錢蜜三合酥三合生地黃汁四合杏仁三兩桃仁三兩同杏仁各湯浸去皮尖雙仁研碎以酒浸絞取汁一升右煎地黃杏仁桃仁等汁鹿髓酥蜜煎如稀餳收瓷盒中每取一匙攪粥半盞不計時候食之杏仁粥方出聖惠方治肺氣療虛羸喘息促急咳嗽等杏仁二十一枚湯浸去皮尖雙人研碎以三合黃牛乳絞取汁棗七枚去核粳米二合桑根白皮二兩銼生薑一分切右以水三大盞先煎桑根白皮棗薑等取汁二盞將米煮粥臨熟入杏仁汁更熟五七沸不計時候食之藥棗方出聖惠方治積年咳嗽不差棗七枚擘破酥一雞子大莨菪一錢水淘二遍右鐺中炒令酥盡去莨菪取棗去皮食之良日三五服一方無莨菪藥餅方出聖濟總録治多年肺氣咳嗽羊子肝一枚分為四片麝香末二錢膩粉一錢右和麵褁燒熟空腹食之時以冷水更換浸兩手良久即住來日早晨轉下惡物有蟲如頭髮相似為驗豬方出聖惠方治上氣咳嗽胸膈煩滿氣喘豬􅏬細切一具生地黃搗破六兩餳四兩右先以炒豬􅏬即下地黃薑蔥鹽䜴候熟下湯以瓷器盛每日喫半盞許食豬腎方出聖濟總録治久咳嗽不差豬腎二具每具上作十四孔蜀椒去目及閉口者二十八粒內腎孔中右以濕紙褁煨令勻熟去椒細嚼食之豬􅏬酒方出聖惠方治肺氣咳嗽上氣久不差豬􅏬細切二具大棗去皮核三十枚右以無灰酒三升同浸秋冬七日春夏三日布濾去滓隨意溫服杏仁餳粥方出聖惠方治上氣咳嗽稀餳三合杏仁二兩湯浸去皮尖雙人熬研成膏右相和得所每取一匙攪粥半盞不計時候食之又方出聖惠方生薑汁五合沙糖五兩右煎令相和每服一匙攪粥半盞不計時候食之醍醐方出聖惠方治一切肺病咳嗽唾濃血不止右用真酥不拘多少煉三次取醍醐每服一合差中邪風皮膚瘙癢溫酒調服治咳嗽久不差出聖濟總録右用豬􅏬一具薄切入竹筒於粳火中炮令極熟食飯後喫之治勞瘦溫中補不足咳嗽出本草右用蘿蔔和羊肉鯽魚煮食之食治眼痛附論夫目者肝之官肝藏於血榮養於目腑臟勞傷血氣俱虛不能榮養於目故目暗也若風熱之氣在於臟腑虛實不調故上衝於目則令赤痛久不能差變生膚翳者眼睛上有物如蠅翅是也冝以食療之方竹葉粥方出聖惠方治膈上風熱頭目赤痛目視􅉩􅉩竹葉五十片洗淨石膏三兩沙糖一兩浙粳米二兩右以水三大盞煎石膏等三味取二盞去滓澄清用煮粥熟入沙糖食之豬肝羮方出聖惠方治肝臟虛弱逺視無力補肝豬肝一具細切去筋膜蔥白一握去鬚切雞子三枚右以䜴汁中作羮臨熟打破雞子投在內食之蔓菁子粥方出聖惠方補中明目利小便蔓菁子二合粳米三合右搗碎入水二大盞絞濾取汁著米煮粥空心食之蓮實粥方出聖惠方益耳目聰明補中強志嫩蓮實五錢去皮細切粳米三合右先煮蓮實令熟次以粳米作粥候熟入蓮實攪勻熱食之蒼茸子粥方出聖惠方治目暗耳鳴蒼茸子半兩粳米半兩右搗蒼茸子爛以水二升絞濾取汁和米煮粥食之或作散煎服亦佳青羊肝方出聖惠方右用青羊肝一具細切水煮漉乾以鹽醬醋調和食之立見效又方出聖惠方右用蔥子半升炒熟搗細羅為散每服用一匙以水二盞煎取一盞去滓下米煮粥食之馬齒實拌蔥豉粥方出聖惠方治青肓白翳明目除邪氣利大腸去寒右用熱馬芽實一斤搗為末每服一匙煮蔥䜴粥和勻攪食之馬齒菜作羮粥喫並明目極佳烏雞肝粥方出聖惠方治肝臟風虛眼暗右用烏雞肝一具細切以䜴汁中和米作羮粥食之兔肝粥方出聖惠方治目暗青肓明目右用兔肝一具細切以䜴汁中作粥空腹食之以效驗為度梔子仁粥方出聖惠方治熱發眼赤澀痛右用梔子仁一兩搗為末為四分每服用米三合煮為粥臨熟時下梔子末一分攪勻食之雞頭實粥方出聖惠方益精氣強志意聰明耳目右用雞頭實三合煮令熟去殼研如膏入粳米一合合煮粥空腹食之食治耳鳴聾附論夫耳鳴耳聾者腎為足少隂之經而藏精其氣通於耳耳宗脈之所聚若精氣調和則腎氣強盛五音分時若勞傷血氣兼受風邪損於腎藏而精氣脫則耳聾也血氣不足宗脈則虛風邪乘虛隨入耳中與氣相擊則為耳鳴也方豬腎粥方出聖惠方治腎臟氣憊耳聾獖豬腎一對去脂膜切蔥白二莖去鬚切人參一分去蘆頭末防風一分去蘆頭末粳米二合薤白七莖去鬚切右將藥末并米蔥薤白著水下鍋中煮候粥臨熟撥開中心下腎莫攪動慢火更煮久入五味空腹食之羊腎羮方出聖惠方治耳聾耳鳴羊腎一對去筋膜細切生山芋四兩去皮蔥白一握擘破生薑一分細切右作羮如常法食之空腹飲菖蒲羮方出聖濟總録治耳聾耳鳴如風水聲菖蒲二兩米泔浸一宿銼焙豬腎一對去脂膜及筋細切蔥白一握擘破米淘三合右以水三升半煮菖蒲取汁二升半去滓入豬腎蔥白及五味作羮如常法空腹食人參粥方出聖濟總録治耳聾耳虛鳴人參一合末防風去又為末一分磁石二兩搗碎綿褁豬腎一對去脂膜細切右先將磁石於銀器中以水一斗煮取三升入豬腎及粳米五合如常法煮粥候熟入煎二味更煮數沸空腹服磁石羊腎粥方出聖濟總録治耳聾養腎藏強骨氣益精髓除煩熱磁石半斤搗碎淘三遍綿褁置器中羊腎一對去脂膜研爛米三合右用水五升先煮磁石取汁二升去磁石下羊腎及米煮粥臨熟入酒一合調和如常法空腹食豬腎羮方出聖濟總録治耳聾耳鳴如風水聲豬腎去筋膜細切一對蜀椒去目及閉口者炒出汗三十粒陳橘皮半分洗切右用五味汁作羮空腹服鹿腎粥方出聖惠方治耳聾補腎氣鹿腎一對去脂膜研爛米三合右於䜴汁中五味調和煮粥如常法空腹食磁石腎羮方出聖惠方治久患耳聾養腎臟強骨氣磁石一斤搗碎水淘去赤汁綿褁豬腎一對去脂膜細切右以水五升煮磁石取二升去磁石投腎調和以蔥䜴薑椒作羮空腹服之作粥及入酒並得磁石常用煎之白鵝膏粥方出聖惠方治五臟氣壅耳聾白鵝脂二兩粳米三合右和煮粥調以五味蔥䜴空腹食烏雞脂粥方出聖惠方治耳聾久不差烏雞脂一兩粳米三合右相和煮粥入五味調和空腹食之烏雞脂和酒飲亦佳鯉魚腦髓粥方出聖惠方治耳聾不差鯉魚腦髓二兩粳米三合右煮粥以五味調和空腹食之乾柿粥方出聖惠方治耳聾及鼻不聞香乾柿三枚細切粳米三合右於䜴汁中煮粥空腹食之食治三痟附論夫痟渴者有三般一者痟渴二者痟中三者痟腎若飲水多者小便又少名曰痟渴若喫食多不甚渴小便數消瘦名曰痟中若渴飲水不絶甚者腿膝瘦弱小便渴者有脂液名曰痟腎此蓋由積久嗜食鹹物炙肉飲酒過度皆成痟渴然大寒凝海唯酒不氷明其酒性酷熱物無以喻如此之味酒徒耽嗜不離其口酣醉已後制不由已飲噉無度加以醋醬不擇酸鹹積年長夜酣飲不休遂使三膲猛熱五臟乾燥木石猶且燋枯如何人能不渴治之愈不愈屬在病者若能如方節慎旬日而瘳不自保惜死不旋踵方雖效驗其如不慎者何其所慎者有三一酒二房三鹹食熱麵能慎此者雖不服藥自可無他不知此者縱使金丹玉粒亦不可救矣良可悲夫宜深思之今以飲食調治以助藥力也方羊肺羮方治三痟小便數羊肺一具治如食精羊肉五兩切粳米半合蔥白五莖生薑少許鹽醋各少許右相和依常法作羮飽食之治痟渴飲水不止方黃丹三分􅌝􅌣根一兩末蔥白一握切白麵五兩薤白一握切右黃丹等末水和麵㳛餺飥先煮蔥薤白令爛熟即內餺飥煮之令熟即并汁食之羊骨湯方治痟渴羊脊骨一具連喉者䜴一升白粟米一升薤白一握切右各分作兩處煮每度用水六升煮至三升去滓渴即溫汁量意飲之以差為度杏酪粥方治三痟心熱氣逆不下食杏酪煎極濃一升黃牛乳一升大麥二合折令細滑右依常法煮粥食之入餳沙糖和之更大美也藕實羮方治痟渴煩燥狂言目眩藕實去皮半斤薄荷一握蓴菜半斤右於豉汁中作羮入五味食之煮兔方治痟渴神效兔一枚新桑根白皮半斤細銼右剝兔去皮及腸胃與桑白皮同煮爛熟為度盡力食肉并飲其汁即效麥豆方治痟渴大麥仁半斤菉豆半斤水浸退去皮右淨淘於星月下各貯一鐺中用水二升慢煮熟次取菉豆過麥仁鐺中同煮令爛并汁收在瓷瓶內渴即飲後仍喫三兩匙麥仁緑豆尤妙藕蜜漿方治痟渴口乾心中煩熱并散積血生藕去皮節切錬蜜各半斤右新汲水一升半化蜜令散內藕於蜜中浸半日許渴即量意食藕并飲汁􅌝􅌣根羮方治痟渴口乾心神煩燥􅌝􅌣根生嫩者洗細切冬瓜去瓤細切各半斤右以水六升入鹽䜴半升煎至五升去䜴下前二味入醋作羮分三度食之􅌝􅌣粉方治痟渴右用􅌝􅌣根多取削去皮於新瓦中磨訖以水淘生細絹袋擺如造米粉法曝乾熱渴時冷水調下一錢許服之大效二月三月八月九月造佳用田螺活者要一升水一斗煮至二升不問食前後稍稍飲汁又一方用田螺五升水一斗半浸經宿渴即飲汁每日須一度易水并螺一方用米一合煮作粥食之鹽䜴飲出聖惠方治痟渴右用濃煎鹽豉汁停冷渴即飲之又方出聖濟總録右用粟米炊飯頻食之佳又方出聖惠方右用火麥仁炊飯或煮粥食之佳小麥亦得水淘食之良又方出聖濟總録右用青小豆淨淘煮粥食之和飲食亦得又方出聖惠方右用牛乳飲一小盞馬乳亦得生飲令人利熟飲令人渴蒸鹿頭方治痟渴口乾右用鹿頭一具治如食法蒸熟以醬醋食之黃雌雞粥方治痟渴口乾小便數右用黃雌雞一隻治如食法爛煮取肉隨意食之其餘汁和豉作粥食之亦妙生蘿蔔粥方治痟渴發動無時飲水不足右用蘿蔔五枚搗捩取汁一大盞攪粥作飲頻吃甚有效野雞肉汁方治消渴舌燋口乾小便數右用野雞治如食法以水五大盞煮取三大盞渴即旋取汁飲之肉任性食菉豆汁方治痟渴小便如常右用菉豆二升淨淘用水一斗煮爛研細澄濾取汁於早晚食前各服一小盞如覺小便濃即差胡豆汁方治痟渴右用胡豆二合煮取汁勿用鹽隨意食之粱米粥方治痟渴及吐血心悶右用青梁米半升淨淘粳米亦得以水三升煮稀粥時飲之以差為度爛研取泔飲之亦可葵虀汁方治痟渴心悶右用葵一束洗湯內略煮過别煮粟米汁如常醃虀法候熟渴即飲汁以差為度地黃花粥方治痟渴右用地黃花隂乾搗羅為末每用粟米兩合淨淘煮為粥候熟入末三錢半攪勻更煮令沸任意食之普濟方卷二百五十八
