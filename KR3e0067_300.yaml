滓盛貯每以少許細含化緩咽之升麻飲治脾胃有熱風冷相乘唇腫生核疼痛升麻一前胡去蘆頭犀角鎊各半兩龍膽青竹皮葛根銼各一分薏苡仁甘草炙銼各半兩右粗搗篩每服五錢水一盞半煎至八分去滓食後服獨活散治唇上生惡核腫由脾胃熱壅滯獨活三分川升麻三分沉香三分桑寄生三分連翹三分犀角屑三分漢防己三分川大黃三分銼碎微炒甘草半兩炙微赤銼右為散每服三錢水一中盞煎至六分去滓不計時候溫服治唇生腫核塗貼松脂半兩川大黃一分白斂一分赤小豆一分胡粉一分右為細末以雞子青調塗貼於上薏苡仁湯治風腫在脾唇口瞤動或生結核或為浮腫薏苡仁炒防己赤小豆炮甘草炙各等分右㕮咀每服四錢水一盞半生薑三片煎至八分去滓溫服不拘時候黃連散治脾胃積熱風冷乘之唇腫結核升麻黃連去鬚龍膽各一兩右搗羅為散綿裹如彈子大臨卧以新汲水浸過含化咽津惡實散治唇腫生核惡實炒烏梅去核各半兩甘草炙銼一分右搗羅為散每服三錢童子小便一盞煎至三五沸和乘熱含潄冷吐日三又方治唇生核右用豬屎平量一升投水絞取汁溫服又方治唇生核腫痛如彈牛膝燒灰存性研右先以針刺出惡血次用藥少許以新汲水調塗核上此藥亦治緊唇即瘥以燒灰細研為末摻敷緊唇又方療唇裏忽生丸核稍大右以刀鋒決之令血出瘥手足諸瘡門手足諸瘡方氈礬散治腳爛瘡竹蛀屑氈燒灰紅棗燒灰存性黃丹白礬飛韶粉右等分為末摻之乾瘡散治一切毒氣攻手足指甲生瘡及努肉白礬石膽各半兩同於鐵器內以炭火煨朱紅已上各一兩右為末摻瘡上以綿纒定逐日換一遍妙戊午嵗子安兒右腳大指患努肉每曉夜號呼傅藥三兩上即愈宣連散出直指方一名雙聖散治足上瘡屢得效宣黃連研細蜜陀僧别研等分右和勻每用時先以蔥鹽煎湯洗瘡然後傳藥如瘡乾用少青麻油調塗之治臁瘡尤效一方用黃丹無黃連礬石四物湯出海上名方治手腳瘡癢右煎四物湯研礬石末少許攙入同服再煎滓洗之甚妙龍骨散出百一選方治腳疽并久逺惡瘡他藥不效者右獖豬糞不拘多少新瓦上焙乾入火中燒令通紅取出於瓶罐內窨成灰存性碾為細末每抄五錢用細研白龍骨末抄二錢半輕粉抄二錢半檳榔末抄一錢和令勻先以口含虀水或溫鹽湯洗令瘡淨見內腳以真麻油調藥隨瘡大小傅之未愈再傳不過三五日定安百草膏治腳靣惡瘡如桐油浸淫延蔓及治一切惡瘡不問乾濕痛癢日近年深百藥不瘥右用羊糞二三十粒置瓦上四畔炭火燒煙住火筯鉗於地上以盞覆存性羅成白灰研細以紗片篩去沙土麻油調傳癢入輕粉痛則入麝香少許即效治膝瘡并一切惡瘡痂癢出危氏方河南太守劉勳女病左膝癢華陀視之以繩繫犬後足用刀斬犬腹取膽向瘡口須臾有蟲若蛇從瘡口出即病愈神應散出肘後方治足大指角急為甲所入肉便刺作瘡不可著履靴腳指濕爛婦人有此右用礬石一物燒汁浸取末著瘡中去惡肉生好肉細細割去甲角旬日即瘥此方神效一方加丹砂少許同研摻之鹿粉散治腳上生惡瘡謂下注右用鹿角燒灰為細末入輕粉油調塗瘡上治毒攻手足腫疼痛欲斷出本草右用豬蹄一具合蔥煮去渣內少許鹽以漬之治腳上生瘡出百一選方右用訶子燒灰存性傅之治腳指縫爛瘡出百一選方右撏鵝項鵝掌皮燒灰存性為末傅之一方摻之治腳上鞋履打泡出海上方右用飯粘以紙貼之一夜即愈治手生刺瘡凡男女手指上忽腫漸見如粟粒大已見黃點若不治之害五六月不止甚妨舉動可取桃仁北靣皮一小片去肉皮薄貼黃點上用小艾炷炙黃點三狀隔桃皮炙之然後用豬膽略去汁套指使以紙扎護即愈治草鞋咬腳生瘡右用穿草鞋繩燒灰摻之及清油調塗或用津唾與鼻涕塗治指縫搔癢成瘡有竅出血不止出危氏方右用多年糞桶篾乾燒灰傳即安治手指赤隨月生死右以薤一把苦酒中煮熟出以傳即愈治手足忽生疣目出肘後方右以蒴藋赤子按使壞疣目上塗即瘥治卒手足腫痛出千金方右搗生胡麻油傅之治手足忽生疣目出肘後方右以鹽塗疣上令牛餂之不過三度即瘥真珠散出千金方治手足指逆臚右用真珠一分乾薑二分搗研粉瘡上日三又方出千金方右還坐厠上以指倒將二七下即瘥病緣厠上搔頭所致淨肌散出鮑氏方治一切脛腿手足濕爛瘡枯礬為主次膠香黃丹輕粉及雄黃真清麻油調末傳百般瘡痏一時光滑膚散出危氏方治同前鹿黎用藜蘆亦可剪草赤廷脂硫黃赤色荆芥蛇床黃柏皮白芷枮礬少輕粉洗淨桐油調傅之治一切腳手上忽生中惡瘡久經年月不得安效忽又臨發作時先覺搔癢不可勝忍以指􅎲破肉內皆清水即便發作宜用此方傅之仍喫後方藥以消其根出楊子建萬全護命方五倍子羌活海桐皮木香檳榔黃連莽草細辛當歸各一分室女亂髮一拳大烏蛇水浸一宿去皮骨只使肉候乾用一兩右細銼使臘月豬脂煎取油五兩入衆藥在內煎令焦黃色漉出新綿濾出藥滓不使却將麝香四銖輕粉二十箇麟竭一分黃丹一兩鉢內同研爛如飛塵入在油內重入鐺內再煉以竹筯攪令紫色便傾出以新􅀈器收之非時用搽瘡上但一切過月惡瘡並皆可使若是遍身有此疾候須是喫後方藥以除其根枳殼只使青麻黃去根荆芥穗杜丹皮去心川羌活木香檳榔白蒺藜去刺各一分烏蛇以酒浸一宿去皮骨用酒炙令香黃稱肉一兩使右同杵羅為末每服二錢匕非時以蔥酒調下和滓喫步行足及膝痛方出肘後方以熱水沃之竟日明日便愈治一切男子兩足瘙癢生瘡連年纍不效欲名為腎風瘡者宜喫此方藥仍以後藥傅之出護命方黃茋牛膝各半兩獨活羌活芎防風白附子木香各分白蒺藜一兩去刺右細杵羅為末煉蜜丸如梧桐子大早朝空心鹽湯下三十丸服此藥後仍用後方藥傅檳榔木香白芨防風白芷龍骨麝香各等分右為細末燒蛇退皮一條為灰膩粉十五箇同入乳鉢內更研令勻却用鱔魚一條槌碎百部一兩煎此三件南椒三銖油一兩碎切藥令得所去藥不使只用油搽瘡口却傅藥在油上以油單裹之三日一換每用藥時先用柳枝甘草煮湯熱洗瘡後方使油使藥也荷葉藁本湯出三因方治腳上生瘡浸淫腿膝膿汁淋漓熱腫痛癢乾荷葉四張藁本一分右以銼散以水二斗煎減五六升去滓溫暖得所淋泄乃服煎黃耆湯佳塌氣藁膏出江隂方治下冷上熱之人及跣足履地口舌生瘡及眼痛日久不愈服涼藥越甚吳茱萸桂附子椒子乾薑地龍各一分右件藥為末薑汁調成膏攤如掌大貼火桶子又腳瘡出汗如油藥洗赤芍藥茵蔯荆芥蒼耳薄荷澤蘭蔥根防風蛇床子白芷右等分生用水煎溫淋洗散血仍用瓶斟洗不用履水妙并治婦人血風治熱毒病攻手足腫痛欲脫方出肘後方水煎馬糞汁以漬之治足毒忽發疣出本草取梁米粉鐵鐺熬令赤以衆人唾和塗上厚一寸即消治毒氣攻疰足脛瘡不瘥白术為細末鹽漿水洗瘡乾貼二日一換可以負腫涉險凶年與老小使負糧人不能少之謂之米脯治手足心風腫出本草秦椒鹽末等分醋和傅之良治手足腫及熱瘡出本草以田中螺生研汁傅之治毒攻手足腫痛出本草以蛇煮汁服三合日以三合水漬烏梅令濃納崖密飲之乃可用卒刺手水腫出本草以搗韭及藍置上以火炙熱徹即瘥治指刺手痛出本草以醬清和蜜任多少濕傅之愈有傷手足而犯惡露殺人不可治出本草以薤白爛搗以帛囊之著粳火使薤白極熱去帛以薤傳瘡以帛急裹之冷即昜亦可搗作餅子以艾炙之使熱氣入瘡中水下瘥昔趙子固母年八十左足靣一瘡連大指延外踝以至脛骨一歲輒數發發必兼旬纍月昏暮癢甚微搔移時出血如泉呻吟痛楚痛殆不可忍夜分積漸已明復然每一更藥則瘡轉大而劇百試不驗如是二十餘年淳熙甲辰子固太府窀穸母病大作相對悲泣無計困極就睡夢四神僧默坐一室旁有小榻子固亦坐因而發嘆一僧問其故子固答之以實僧云可服牛黃金虎丹又一僧云硃砂亦可既覺頗驚異試取藥半粒強服之良久腹大痛舉家且悔俄而下礧磈物如鐡者數升是夕瘡但微癢不痛而無血數日已自此遂愈硃砂之説竟不復試子固因圖像僧如所夢者而記其事牛黃金虎丹方出和劑本治中風痰延壅塞用牛黃龍腦膩粉金箔之類皆非老人所宜服今乃取竒效蓋此疾積熱毒於臟腑而發於皮膚嵗久根深末昜蕩滌故假涼劑以攻之不可以常瘡論也神僧之夢蓋誠孝所感出百一選方昔人嚴黃七兩足生瘡臭穢潰爛衆驅逐不得容迹一日至京潛投宿於五夫人祠下夜半遭黃衣吏叱逐一日何人敢以腐穢腳觸汚此間謝曰不幸纒惡疾無處見容冒昧來此紛嚷次夫人抗聲令勿逐且呼使前曰吾授汝方用漏藍子一枚生燒乾為末入膩粉少許并水調塗當效嚴拜謝依而用之果愈類編療毒熱病攻手足腫疼痛欲脫者出本草以豬膏和羊屎塗之亦佳手足凍瘡附論夫經絡氣血得熱則肥澤得寒則凝澀冬時嚴寒氣血凝聚不流則皮肉不溫瘃音竹凍焮赤痛腫而成瘡輕則潰爛重則損壞肢節也又云戴人女僮足有寒痬俗云凍瘡戴人令服舟車丸濬川散大下之其瘡遂愈人或疑之戴人曰心火降則寒消何疑之有方香霜膏治凍瘡重莧瘡香油瀝青黃丹百草霜各等分右先下香油後下瀝青次下百草霜後用黃丹成膏為膏藥貼之雉腦膏出聖濟總録治凍靣凍耳并諸凍瘡久不瘥年年發歇先癢後痛後腫破黃水及血出不止雄雉腦一枚搗爛黃蠟與腦等分清油比蠟減半右同於慢火上熬成膏去滓以瓷器收如靣油逐旋塗摩羊肉湯出聖濟總方治寒凍腫癢羊肉蔥並細切各半斤右二味以水五升煎至三升去滓溫洗日兩三度又方出聖濟總録右用蔥葉一枝細切以水三升煎至二升去滓溫洗日三兩度丹脂散出危氏方治足凍瘡右以黃丹用豬脂調傅豬蹄脂散出德生堂經驗方治爛瘡因凍者右以豬後縣蹄燒研細豬脂和傅亦治小兒粉膠散出海上方治凍瘃瘡右用乾小粉炒焦存性為鎔牛膠調攤紙上貼之好米醋調尤妙如聖散出德生堂經驗方治凍瘡皮膚破爛痛不可忍者右用大黃為細末新水調掃瘡又方出百一選方治凍瘡右用臘月雀腦子燒灰研小油調塗瘡口上一方用雀腦血傅之一方先用茄子根濃煎湯洗以鵲兒腦隨塗之或用茄子莖葉苦者煮湯洗之定痛黃柏四兩去粗皮塗蜜慢火炙令黃色治凍瘡焮赤黃汁出及瘥後瘢䀶疼痛右為細末蜜水調攤軟紙花子上貼患處又方出神效方右用山藥少許於新瓦上磨為泥塗瘡口上治凍瘡不瘥者用熱湯洗之效柏藥散出聖濟總録治凍瘡手足指欲墮及耳欲落柏葉炙乾為末四兩杏仁去皮研四十粒頭髮一拳大鹽半兩研乳香研一分黃蠟一兩油一斤右先煎油沸次下五味藥以髮消盡為度次下黃蠟攪勻瓷器中收先以熱小便洗瘡以綿裛乾後以藥塗即以軟綿裹勿令寒氣浸入每日一洗一換如瘡漸瘥即三四日一換白斂散出聖濟總録治大人小兒凍手皴裂成瘡白斂三分白芨末半兩油麻二合生搗右藥蒸蘆蔔一箇爛研與藥拌勻以酒調成膏先以童子小便洗瘡後塗之牛膠散出聖濟總録治寒凍足跟開裂血出疼痛右以牛皮膠燒灰細研為末以唾調塗之車膏塗方出聖濟總録治手足凍瘡腫爛右以車膏熬令熱塗瘡上又羊脂和蜜調勻塗傳日三兩上橄欖散出海上名方治凍腳瘡右用橄欖核燒存性為末入輕粉油調塗治寒凍手足破裂出聖濟總録右用生薑拍碎二兩以淘飯飲三升和煎至二升乘熱薰洗患處日三五度又方出聖濟總録右以白餳五兩燒灰細研傳瘡上日三五度治手足凍腫爛出聖濟總録右取各瓜藤半斤細銼以水三升煮汁浸洗日三兩度治凍指瘃欲墮出千金方右用馬屎三升以水煮令沸漬半日愈治凍瘡及折傷瘡右用臘月老鼠一箇麻油煎爛攪取油為膏傳瘡亦妙又方出肘後方右用兔髓及腦灰生傅之又治手足凍裂神效又方右用雄芭焦根白者雄赤者雌為末濕則摻之乾則油調又方出楊氏家藏方右以黃柏為細末用乳汁調於瘡口上破者乾摻神效一方用雞子清調塗一方燒存性灰研細經驗方云豫每入冬雙足􅀈瘃艱於穿履祗用蘆蔔茄根藝薹煎湯洗灌其效甚緩今年之作尤甚忽使臣強德中獻是方一夕而愈世間有此妙方可謂萬金良藥惜豫聞之晚可不廣以惠人小膏子出王氏博濟方治凍耳兼療濕瘡丹參一兩黃蠟半兩豉一合蔥白五莖清油三兩右先將油煎三兩沸次入參䜴煎令焦濾去滓然後入蠟勻攪入磁合子內盛每患即塗之三兩上瘥二黃散出家藏經驗方治毒瘡凍瘡黃柏皮黃連右等分為細末並不見火先以甘草湯洗了瘡用藥末二錢輕粉少許生麻油調稀稠得所傅之如瘡濕不用麻油只乾摻之余盛年冬月時耳珠凍瘡爛則瘡成去靨則流血偶吳道人過門扣之用此藥兩日即愈治凍瘡出本草取用秫米嚼傅之治凍瘡出本草以松葉炙傅之佳治凍瘡風濕瘡出本草以柏葉炙傅之治凍瘡出本草用糟浸洗療凍瘡出本草取蒿雀腦塗凍瘡上手足不皸其雀肉極熱能補益人也治腳上凍成瘡腫右用大黃為末煎湯熱洗一月愈治凍腳右用烏頭一枚炮生熟得所為末水洗摻之伐指附論伐指者先腫焮然痛色不黯緣爪甲邉結膿劇者爪皆脫落此謂之伐指病也但得一物冷藥汁泄漬之佳若熱盛服漏蘆及泄漬之傅藥蓋爪者筋之餘筋骨熱盛注於指端故其指先腫熱焮痛結聚成膿甚則爪甲脫落世或謂之淪指又伐甲其實一也此病類於指疽然無藴毒故色不黯黑雖久亦不殺人方漏蘆湯出聖濟總録治伐指筋骨臟腑中熱焮腫痛漏蘆去蘆頭升麻大黃銼炒黃芩去黑心各一兩玄參三分右粗搗篩每服五錢水一盞半竹葉二七片同煎至一盞下芒硝末一錢再煎去滓空心溫服如利去芒硝藍花湯出聖濟總録治伐指腫痛藍花漏蘆去蘆頭大黃銼炒升麻黃芩去黑心各一兩右粗搗篩每服五錢水一盞半竹葉二十片煎至一盞下芒硝末一錢再煎一沸去滓空心溫服如利去芒硝皂霜散治伐指皂角南星拒霜葉草烏右等分為末米醋調傳留口出毒升麻湯出聖濟總録治伐指雖無藴毒筋骨中熱氣尚盛升麻甘草各半兩右細銼以水二升煎去滓下芒硝末半兩攪勻溫浸指上數十遍冷即再暖以瘥為度梔子湯治伐指梔子仁甘草各一兩右細銼以水二升煎至一升半去滓候溫浸指上日三五度瘥草硝散出仁存方治伐指結膿指爪甲脫者右用甘草二兩㕮咀以水五升煮取一升半漬之一方用芒硝亦可煎湯淋洗愈鹽脂湯出千金方治指痛欲脫右用豬脂和鹽煮令消熱內指中一食久住千金翼和乾薑醬蜜塗方出千金方治伐指掣痛手足不可忍醬汁一合蜜一兩右和煎令沸稍熱傳日五七上即瘥一方用醬水醬水漬方出聖濟總録治伐指腫痛右取醬水一升以鹽半兩和煎令沸溫浸患指日三五度瘥一方用醬水調蜜傅之地龍散出仁存方治伐指手指甲頭腫取肉刺右用地龍乾者不拘多少搗羅為細散以豬膏調傅患指日三兩上瘥一方用泥傅之一方無豬膏硇砂膏出千金方治伐指右以唾和白硇砂先搜麵作碗子盛唾次著硇砂如棗許以爪指著中一日即愈麻黃湯出聖濟總録治伐指右用麻黃二兩去根銼以水二升煎至一升半去滓溫浸患指日三五度瘥熱蘸湯出聖惠方治伐指為五臟氣流注十二經脈熱衝手指右以熱湯急蘸五七度次以冷水浸之又復如此三便塗羊膽即瘥未成膿者此方神效或以豬膽盛伐指纒之亦得一用牛膽粟米粉治伐指發症右用粟米粉不拘多少又鐡鐺中熬赤以衆人唾調塗患指厚半寸烏梅醋法出仁齋直指方治伐指手指甲頭腫取肉刺右用烏梅去肉殼只用仁研細米醋調得所入指漬之或和傅之治伐指手指忽腫痛不已者名為伐指右以羊毛雜黃土泥指五分厚內煻灰中煨之令熱可忍泥乾即易不過數度瘥如皮不皺者更為之又方出肘後方治伐指右刺指熱飯中二七遍愈又方出千金方治伐指右以麻沸湯漬之又方出千金方治伐指右取萎黃蔥葉煮沸漬之又方出千金方治伐指右以蜀椒四合水一升煮三沸漬之又方出聖惠方治伐指右先刺去膿血炙魚鮓皮令溫以纒裹固匝痛止便愈又方出傳信適用方治伐指右拒霜葉為末加消風散調塗自散其毒又方治伐指右以黑豆爛嚼敷之或燒灰傅之亦可又方出聖惠方治伐指右用地榆二兩細銼以水三升煎至二升去滓溫浸指冷即再暖又方出聖惠方治伐指發疣右用鹽不拘多少小便調塗患指上以故帛裹之一二日鈹針刺血再塗即瘥又方出聖濟總録治伐指腫痛不可忍右用酒糟不拘多少取晝夜裹之或以瓶子一枚先裝火了入茵子於上以紙裹瓶口作一孔子將指頭入薰瘡效又方出肘後方治伐指甲頭腫取肉刺右新土中蚯蚓和豬脂搗如泥傅之一方無豬脂又方出肘後方右燒鐡令熱勿令赤以灼之又炙指頭痛處七次愈治伐指成癰右用糞堆上蠐螬蟲一箇截頭中一假安患處以艾炙之和麵調圍患處拔毒散出衛生家寶方治毒瘡生於手指赤腫堅硬俗呼為發指徹疼痛不可忍者泥蜂窠粘壁間採之乳香少許研右為末用釅米醋調塗之乾即再上醋痛立止治伐指諺云天蛇風蜈蚣一條火上燒右以煙薰病指一二次即安療伐指出本草右以蠟松膠和將火炙籠伐指即瘥肉刺附論肉刺者生於足指間形如鞕胝與肉相附隱痛成刺由靴履急穿相摩而成方松脂膏出聖惠方治肉刺白膠柏木上者松脂各一兩黃蠟半兩右於火上鎔成膏冷貼用物繫定無食膏出聖惠方治肉刺肥皂莢一梃無食子三枚右燒令煙斷細研以釅米醋於沙盆中别磨皂角如糊和末傅之立效薰硫散出聖惠方治肉刺薰陸香石硫黃右等分同研令勻塗肉刺上以燒叉烙之效楓香脂膏出聖惠方治肉刺豬胰一兩楓香脂一分右先研豬胰令爛次入楓香末和成膏挑剔刺處令淨以藥傅之效一方有白膠香乳香散出聖惠方治肉刺久不瘥松脂乳香各一分右同研細先用針撥破傅之密封繫硇砂散治取肉刺右以硇砂少許和膠香令勻貼之根即出羊腦膏出聖惠方治取肉刺右用刀薄刮之以新酒醅和羊腦傅之一宿常以綿裹包之羊髓亦得又方出聖惠方治肉刺結鞕右用針挑破以雞子白點三兩度即落下又方出聖惠方治肉刺結鞕右用白芥子搗如粉以醋調傅之密封繫經宿揭去自然落下又方出聖惠方右以黑木耳取貼之自消爛不痛宜以湯洗微刮去上者乃用之治手足甲忽然長倒生肉刺如錐痛不可忍喫葵菜自愈治八月九月中刺手足犯惡露腫多殺人出本草以桑枝三條燒灰服之仍取韭白傳瘡上以布帛急裹之若有腫者更作用薤白佳治反腳指間有肉刺瘡出本草以黑虱傅根出之也治肉刺結鞕用羊髓傅之立效甲疽附論足三隂經皆起於足氣血沮而不行潰於指甲之間能成甲疽凡以經絡之所流注非特肌肉之病也故或得於剪甲傷肌或得於中長侵肉或得於步履之不適便血氣沮遏不通故腐潰為疽久則浸淫爛指上引腕膝之間而瘡泡者是已然病在血氣不必治其肉惟塗傳滌濯去惡而除穢及適其行履則愈方蝦蟆散出聖惠方治甲疽皮厚腫痛蝦蟆灰半兩杏仁七枚熬黑研如泥黃連末半分雄黃半錢細研白礬半錢膩粉半分鹿角七寸燒令熱細研麝香半錢細研蚋蛇膽半錢右相和細研以臘月豬脂調如膏先以甘草蛇床槐白皮煎湯洗瘡拭乾傳藥以油單裹外更著綿帛裹之三日其刺肉剩甲皆當自落三日一換豬蹄湯治甲疽及諸癰疽惡瘡有瘜肉豬蹄一隻生者白斂白芷狼牙芍藥各三兩黃連黃芩大黃獨活各一兩右㕮咀如豆先以水三斗煮豬蹄水至一斗二升去蹄後入藥更煮至五升候溫洗瘡日三度白礬散出聖惠方治男女風血毒氣攻手足指甲疽瘡久不瘥努肉裹指甲疼痛出血不定宜用此縮肉乾瘡白礬石膽各半兩麝香一分朱紅一分騏麟竭一分右取白礬石膽於鐡器內一處以炭火煆過入麝香騏麟竭朱紅同研令細用少許乾摻瘡上以帛子纒定日兩度換之白礬散出聖惠方治甲疽白礬燒灰一兩麝香蘆薈蚺蛇膽各半分右研細先以漿水洗瘡乾傅之洗瘡日三兩上瘥為度馬齒散出聖惠方治甲疽墻上馬齒草隂乾一兩木香丹砂研細鹽研細各一分右除丹砂鹽外銼細拌令勻於尉斗內以皮灰火燒火過取出細研即入丹砂鹽末再研勻旋取傳瘡上日三兩度緑硝煎出後治甲疽或因剔甲傷肌或因甲長侵肉遂成瘡腫痛後緣窄靴研損四邉腫焮黃水出浸淫相染五脂俱爛漸漸腳跌泡漿四邉起成火燒瘡日夜倍增醫方所不能療者右用緑礬五兩形色似朴硝而緑色置於鐵上板上聚灰封之囊袋吹令火熾其礬即沸流出色赤如鎔金汁者是真也候沸定汁盡去火待冷取出研為細末似黃色收之先以鹽湯洗瘡帛裛乾用此末傅之或有蟲有黃水當日洗汁斷瘡乾若患痛急即塗少酥令潤每日一遍鹽湯洗灌有膿處常洗使淨其痂乾不須近每洗乾傅藥如初但急痛即塗酥五日即覺上痂漸剝起赤依前洗傳藥十日即瘡漸漸剝盡痂落軟處或更生白癑泡即摘破傅藥自然總瘥張侍郎得此病卧經六十日困頓不可復言京衆醫並經造問皆隨意處方無效驗惟此法得效如神故録之海上方云研細先以黃丹洗瘡拭乾摻於瘡上愈多愈好著藥訖以軟帛寬裹之當日見效若患痛急即以酥少許塗令潤傳藥每日一次鹽湯洗常令淨十日可愈蛇黃散出聖惠方治甲疽蛇脫皮置淨瓷器中以燭焰燒之大著去燭勻燒令焦取一兩用之臭黃一兩緑礬一分燒熟右研如粉以銅盒子貯之先以熱小便二升置於銅鈔鑼中嚼三十枚杏仁吐於小便中攪令相得以瘡却浸之候癢即以銅箆子洗撥去膿血取爛帛裛之候乾還以銅箆子傳散令滿以故帛虛裹瘡指入大襪中每日一洗依前法用每洗待藥軟即撥去藥恐咬落瘡筋切慎房室及運動氣力忌麵蒜酒一切物無妨䕡茹膏治甲疽日夜倍增赤肉生甲邉裹甲者䕡茹黃耆各二兩豬脂一兩右㕮咀如豆苦酒浸一宿與豬脂一處微火上煎取三合絞去柤以塗瘡上日三兩度其赤肉即消散緑礬散出危氏方治甲疽瘡緑礬半兩燒熟蘆薈一錢半香麝一字右研如粉袋絹盛藥納所患處指袋中綿扎定瘥為度蛇黃散出海上方治甲疽腫爛生腳指甲邉赤肉努出時瘥時發又治嵌甲生入肉常血疼痛雄黃半兩生用蛇脫皮燒灰存性一分右同研如粉用先以溫泔洗瘡上軟以尖刀子割去甲角拭乾藥傅上用軟帛褁半日許藥溫即易一日即除痛便止一方用漿水洗淨以橘刺破處淋洗貼藥一方有黃耆無雄黃乳香傳方出海上名方治甲疽努肉褁甲膿血疼痛不瘥乳香研膽礬燒灰研右等分研極細時時傅之大凡此疾須是剔去甲不痛亦愈或已成瘡久不瘥即用此方一方二味燒研末傅之一方用礬燒灰敷瘡鬼針散出千金方治割甲侵肉不瘥右以鬼針草苗搗汁並鼠黏草根和臘月豬脂傅之牡蠣散治甲疽努肉褁甲膿血疼痛不瘥右用牡蠣頭研為末每服二錢研靛花酒調下如癰盛已潰者以末傅之仍更服藥並一日三服烏梅散治甲疽久不瘥努肉癑血疼痛右用烏梅十枚燒灰研為散傳瘡上日三易一方用鹽梅燒灰傅爛搗褁亦可石膽方出永類鈐方治甲疽右以石膽一兩於火上燒令煙盡研末傅瘡上不過四五度立瘥治甲傷損痛不能忍出永類鈐方右用煨蔥白貼患處熟帛扎之立效治甲疽腫爛生腳指甲邉赤肉努出時瘥時發出聖惠方方見本類前䕡茹膏治甲疽瘡出聖惠方右以灰莧濃煮汁著少鹽浸腳一兩日瘥或用乾者及根亦得治割甲侵肉不瘥出海上方用硇砂礬石為末褁之以瘥為候治甲疽瘡不瘥者並甲煎搗之治甲疽甲疽之狀瘡皮厚甲錯剝起是也其瘡赤癢痛恆欲搔之兼有汗出其初皆是風邪折於血氣所生其瘡裡亦有蟲也右用白礬燒灰研細傅之嵌甲方砂糖方出百一選方治嵌甲右用琥珀糖是砂糖熬成小毬兒者燒存性入輕粉麝香麻油調傅指甲嵌入肉者不過一兩日自爛一方治甲傷陳寺丞仲山傳爛去壞肉生好肉無所損神效纍效方出華陀藏中方治嵌甲硇砂一字乳香並研各一錢膩粉半錢橄欖核三個燒存性黃丹一字右為末以生麻油調以鹽湯洗淨拭乾傅之兩日即效乳沒散出百一選方治嵌甲右用雌馬糞三塊各青布一片包了於新瓦上炭火煆存性研為細末每半兩入沒藥十分輕粉十分麝香少許先以蔥椒湯洗拭乾口含甘草漿水吐在瘡上再洗拭淨傅藥濕者乾摻乾者生油調塗初貼一夜極痛不過三日上即去根本昔有人患此二十五年百藥不效一傅而安烏倍散出百一選方治嵌甲草烏頭半兩白牽牛一兩五倍子四兩全者龍骨一分右先將三物捶碎同五倍子炒令焦黑色去三物不用只取五倍子為末瘡乾用麻油調塗濕即乾貼黃連散出百一選方一名白礬散治嵌甲黃連韶粉黃蘖軟石膏煆等分兩右為細末用水洗瘡令淨軟帛子拭乾以新汲水調塗瘡上兩日一易妙用香煙脂散出百一選方一名麝香散治嵌甲侵肉不瘥五倍子燒灰黑存性染胭脂各等分麝香少許右研細摻五倍子生用亦得雄蟬散出百一選方治嵌甲雄黃通明者蟬退三箇酥炙各為細末右研和勻濕者乾摻乾者用津入輕粉少許調塗陀僧散出百一選方治割甲侵肉不瘥白礬飛過蜜陀僧各等分右為末乾摻不定一片帛褁之亦治腳臭一方用硇砂無陀僧摻褁之烏頭方出肘後方治陷甲割甲成瘡連年不瘥川烏頭尖黃蘗各等分右為末洗了貼藥黃耆方治陷甲生入肉常有血疼痛難忍或成瘡日久不瘥者黃耆當歸各等分右為末貼瘡上若有惡肉更研少許硫黃末同貼虀水駐車丸治嵌甲膿出痛不可忍右虀水口噙淨洗却用局方駐車丸研細傅之又方治嵌甲右以五倍子用瓦上炒燋研細以薑汁調傳如瘡濕入少許麵水調傅甚竒妙又方治嵌甲右用乳香為末擦之又方治欲去甲者右用綿逐旋摺入甲內漸漸添之靸起次用剪子去之又方治腳大指頭忽為甲所入肉便刺作瘡不能著履靴方見本門手足諸瘡內神效散名治陷甲生入肉常有血疼痛用蛇皮一條燒存性灰黃一彈子同研以溫漿水洗瘡針破貼藥又方治嵌甲右以鴉嘴膽礬為末搽之又方治嵌甲及靴窄碎成瘡右用枯白礬貼之愈牙縫出血亦然又方治陷甲右以乳香摻之大妙乳香散治嵌甲疼不可忍有妨步履紫藤香半兩半倚骨大者乳香半錢針挑麻油燈上燒存性當半兩錢一枚炭燒通紅醋淬碎輕粉少許癢即多入麝香當門子少許右為末細絹羅過每用少許先以甘草湯洗患處用舊絹拭乾然後傅藥即以燈草裹之立瘥表姪林震父得是方於德清陳宰余平日所收之方不逮此訶子散治嵌甲漬膿經久不瘥訶子三枚燒留性降真香一錢青黛一錢别研五倍子半兩炒黑色右件並為末次入青黛一處研勻先用蔥鹽湯洗淨剪去指甲或挑起指甲用藥乾焙貼縫內或用麻油調傅之膽礬散治嵌甲膽礬一兩入甘羅子烈火煆令白色去火毒一宿麝香一字研細右件同研細先用蔥鹽湯洗患處拭乾傅藥少許皴裂附論夫皴裂者由肌肉虛冬時觸冒於是風冷折手足破故謂之皴裂也丹粉膏治腳踏地不可忍疼麻油四兩黃丹二兩白膠香半兩光粉一兩敗荷二錢為末乳香二錢沒藥半兩右如膏藥煎得所滴水中可丸為度用丸時如鼠糞大傅即生浮皮回神膏治手足皸裂如蒸梨狀雖春夏亦如此生薑汁紅糟豬脂鹽各等分右研爛炒熟擦入皸折內一時雖疼少頃便皮軟皸合三二次擦即安椒鹽湯治手足皴痛芎藭蜀椒二分白芷防風鹽各一兩右㕮咀以水四升煎取濃塗之或豬脂煎更良白艾膏治斷根皸裂右用頭髮一大握桐油一碗於瓦器內熬候油沸頭髮鎔爛入白芷松香末出火攤冷以瓦器收貯不容灰入用百沸湯泡洗皸裂拭乾傅其上或加少水粉豬實散治皴皺脫皮膚豬桃兒土瓜根啇陸右等分為細末每日早晨用少許如常擦患處或用桃仁膏桃仁膏出御藥院方治皴皺脫皮膚右用桃仁不拘多少湯浸去皮尖研如泥同蜜少許一處用溫水化開塗患處後用玉屑膏塗貼玉屑膏出御藥院方治手指面頰肌膚皴澀不澤輕粉定粉各三錢蜜陀僧三錢右為細末用皂角子取白仁以熱漿水浸成膏子調藥稀硬得所塗患處燒髮散出永類鈐方治腳折俗名腳皸右好米作餳糖加麻油煎燒頭髮為灰和勻用水洗淨腳用油澆入瘡縫內馬蹄湯治斷根皸馬蹄下者燒灰貓兒毛燒灰男子頭垢燒灰右和勻清油調塗用絹綿護定休著水極能定疼除根先以蓼根及莖樟木葉湯洗令淨潔黃臘膏出海上方治腳皴裂右用油一兩男子髮同油化濾過髮粗再化黃蠟半兩同煎以油黑為度磁器盛之每用先以熱湯洗去皮藥貼之黃蠟膏出百一選方治冬月手足折裂右用清油半兩盞內慢火煎沸入黃蠟一塊同煎溶入光粉五倍子末少許熬令稠紫色為度先以熱湯洗火上烘乾即用藥傅薄紙貼之其痛立止入水亦不落若合藥入粉多則硬而成塊旋以火炙動挑傅亦不妨一方無五倍子不龜手方出百一選方治手足皸裂如蒸梨狀雖春夏亦如此瀝青二兩黃蠟一兩右煉熬攪勻於器中貯先以熱酒洗令皮軟拭乾將藥以慢火上熬令鎔之傅軟帛蓋定一傅即瘥一云加黃耆防風各一兩黃丹膏治腳折俗名腳皸右用巴豆二十一粒去殼清油二兩煎豆黑色去豆用黃丹一兩半入油慢火熬攪勻作膏煎冬橘葉湯洗淨塗之蠶礬散治腳裂右用出蛾兒蠶繭裝細礬炭火上燒沸候過將繭並礬研細香油調傅之醎虀汁治腳無冬夏常折裂右以醎虀汁三升熱暖浸洗一日兩三次治手足皸裂出百一選方右以五倍子一味為細末先以淨紙拭乾麻油調傅又方出百一選方治手足皸裂右以頭垢傅之即不痛久自合取其膩也又方治斷根皸裂右用臘月鵝膏椒數粒熬過收用時取出傅裂處一方白鵝尾灰搽之又方治皸裂右用無名異為細末真桐油調塗即可下水不痛又方出海上方治腳跟皸裂痛不可忍者右用五倍子為末同牛骨髓調小瓷器埋地中七日取出填縫內即安又方出海上方治腳跟開裂痛不可忍者右用青萍於新瓦上焙乾為末搽之極妙瘡口乾則用油調又方出聖惠方治手足皴劈破裂血出疼痛右用豬脂著熱酒中洗之愼風冷又方出醫方集成治手足皴痛右煮茄子根洗之又方出聖惠方治手足皴裂冬月冒涉凍凌面目手足瘃疼痛右用椒四合水煮去滓漬半食頃出令燥須臾復浸乾塗羊豬髓腦極妙又方出肘後方治手足皴裂血出疼痛若冬月冒涉凍凌面目手足瘃壞及熱疼痛皆治取豬腦髓著熱酒中以洗瘥又方出儒門事親治山野人患手足皸裂右用白芨不拘多少細嚼以塗之有效一方為末水調塗又方治手足皸裂血出痛右用蔥葉萎黃及根煮以漬洗之即瘥又方治冬月手足折裂右用治瘧勝金丸研細清油調傅之又方出聖惠方治人足無冬夏怕皸裂名曰尸腳右用雞糞一升以水五升煮至三升停溫令浸腳半日瘥亦用屎忌踏酒吐及婦人穢血又方出聖惠方治手足皸裂成瘡右羊髓熬成油入黃丹攪勻令凝遍塗之三五上瘥又方出聖惠方治手足皸裂成瘡豬脂五合乾薑末二兩右相合煎四五沸候冷熱得所內指於中浸之又方出聖惠方治手足皸裂成瘡右取蓼子一升以水七升煎五七沸放溫淋數遍即瘥又方出聖惠方治皸裂手指節欲落却令合右用萊州青石作器物者以刀子細刮取末欲落指節相視文縷相當便以石末厚覆其上以帛緊褁之其痛當時定指不過十餘日平復矣又方出聖惠方治皸裂破疼痛右炙松葉尉之兼煮松葉洗之不過三兩度瘥又方出聖惠方治人腳無冬夏常折裂右以煬膠乾故帛貼上又方出聖惠方治涉氷凍面手足瘃壞右以麥並蜀椒濃煮及熱浸洗又煮蔥茱茰浸亦佳一方用麥葉濃煮汁熱洗之亦作麥窠潤肌出衛生寶鑑治手足皴澀皮膚裂開疼痛不能迎風入手足好瀝青四兩白黃蠟八錢乳香二錢右三味於鐡鐺內用文武火熬先下瀝青在鐺內隨手便下黃蠟乳香次入清麻油一二匙候瀝青盞鎔微微熬動放大淨水盆子其旁以攪藥用鐵筯滴一二點於水中試之須凝硬則再入油如硬軟合宜用新綿濾於水中折疊於水中試之揉扯以白為度油鐺旋旋入之勿令軟了以磁器內盛之或油紙褁亦得每用不拘多少先於火上炙裂了口熱却揑合裂處藥亦火上炙軟塗於裂處上用紙少許貼之自然合矣神降散出仁濟直指方治足皮皴桑寄生一小把本地桑根取皮一握白芷黃連等分右煎湯溫和以帛蘸洗候血出盡拭乾傅後藥鷹瓜黃連滿文皂角去皮核燒存性麻竹大蘀燒存性厚黃柏瓜樟葉乾白芷右逐件為末等分麻油調傅自然生皮神效謹勿喫醋治手足皴裂出永類鈐方五倍子白芨阿膠珠等分為末津調得所塗羊髓調尤佳療手足皴裂面出血痛出本草以酒挼豬胰洗並服治手足皸瘃出本草以鷓鴣脂膏塗之令不龜治手足利筋脈出本草以木瓜根葉煮湯湯淋足脛可以已蹶又截其木乾之作桶以濯足尤益五指筋攣附論夫五指攣急者是筋急攣縮不屈伸者筋得風熱則能弛縱得風冷則攣急也方淋蘸防風湯出聖惠方治手脂風冷所傷攣急防風去蘆頭附子去皮枳殼去穰柳蚛末杉木桂心羌活蜂房川椒去目木鱉子仁白芷白礬各半兩細辛三分右細銼每用一兩以水兩大碗入生薑一兩煎至一碗去滓溫蘸手指冷即重暖用之羚羊角散治五指攣急疼痛連臂膞拘急羚羊角屑羌活防風去蘆頭當歸銼微炒芎藭天麻各三分桂心細辛五加皮各半兩附子炮製去皮臍麻黃去根節薏苡仁各一兩右為散細末每服不計時候以溫酒調下二錢附子湯治五指攣急淋蘸手附子去皮臍生用防風去頭枳殼去瓤羌活白芷甘草銼生用蜂房各半兩川椒二兩去目右為散每用一兩以水三大碗入生薑一兩桑枝一握黑豆一合同煎令豆熟去滓看冷暖得所避風淋蘸手足水冷重熱用之芎藭湯治手指傷風冷筋脈攣急川椒去目芎藭各半兩白芷防風去蘆頭乾薑各一分右銼以水二大盞煎令濃濾去滓塗之日五七度瘥普濟方卷三百
