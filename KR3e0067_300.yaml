body:
  text: 普濟方卷三百明周王朱橚撰上部瘡門口麋附論膀胱移熱於小腸膈腸不便上為口麋夫小腸之脉絡心循咽下膈抵胃隂陽和平水糓入胃小腸受之通調氷道下輸膀胱令熱氣厥逆膀胱移熱於小腸胃之水榖不得𫝊輸於下則令腸膈塞而不便上則令生瘡而麋爛也大抵心胃壅熱則必薫蒸於上不可槩以傅藥當求本以治之方柴胡澤㵼湯治腸熱口糜生瘡柴胡去苖澤㵼陳橘皮浸去白焙黄芩去黒心枳實麸炒旋覆花升麻芒硝别研各三兩生地黄一升右除芒硝外㕮咀如麻豆大每服五錢水二盞煎取一中盞去滓下芒硝末半錢食後温服大青丸治口糜生瘡久不瘥及心脾中熱乍發乍退大青去根甘草炙剉枳殻去穰麩炒苦参剉各三分黄連去鬚生乾地黄焙升麻各一兩右為末煉蜜和丸如梧桐子大每服二十丸食後熱水下日二服大黄散治口糜生瘡久不瘥大黄剉碎焼為灰甘草炙剉黄栢炙剉各一兩蜜陀僧研滑石研各一分右為散每用一錢綿裹含有涎即吐升麻丸治口糜生瘡升麻黄連去鬚黄栢炙剉杏仁湯浸去皮尖雙仁各一兩右為末研杏仁如膏煉蜜三兩以藥末并杏仁膏和為丸如彈子大每服一丸含化嚥津紫金散治大人小兒口糜生瘡方見本門口瘡類紫金霜大黄湯治口糜生瘡大黄剉一兩芒硝研黄連去鬚黄栢炙各半兩右搗篩每服三錢水一盞煎至六分去滓入蜜半匙酥少許細呷含嚥柴胡湯出宣明論治口糜生瘡損爛小腸有熱脹滿柴胡去苖地骨皮各一兩右搗篩每服三錢水一盞煎至六分去滓細含嚥之病人熱實者加大黄樸硝可㵼治口瘡糜爛生蜜塗方右用生蜜使頻用塗瘡上三五次即愈一方用大黄一兩切如指頭大以蜜煎五七沸候冷取出每含一塊嚥津治諸人口爛者出危氏方右用巴豆二粒帶皮搗與麵糊為膏貼在顱門上即一夜便可取瘡在顱門上永不發杏仁餅子出三因方一名杏粉膏治口糜生熱瘡以凉藥傅之不愈者杏仁湯浸去皮尖雙仁十四枚别研細膩粉一錢右和研如膏為餅如錢眼大鉛丹為衣先用塩湯潄口含一餅涎出即吐應驗臨卧時細嚼涎出愈一方臨卧𫝊瘡上少頃吐之勿嚥黄蘖散治口糜生瘡黄蘖蜜塗炙乾去火毒白殭蠶直者置新瓦上下以火煆蠶絲斷出火毒右為細散掺瘡及舌上吐涎逆調論云膀胱移熱於小腸膈腸不便上為口糜心胃壅熱水糓不轉下𫝊小腸𨗳赤散去小腸熱五苓散㵼膀胱熱故以𨗳赤散調五苓散主之出衛生寳鑑方胡黄連散出衛生寳鑑方治口糜胡黄連五分藿香一錢細辛三錢宣連三錢右為末每用半錢乾掺口内潄津吐之舌瘡附論舌生瘡者心脾經藴熱所致也盖口属心心者火脾者土火積熱𫝊之脾土二臟俱蓄熱毒不得發散攻衝上焦故令口舌之間生瘡腫痛方升麻煎出千金方舌主心臟熱即應舌生瘡裂破引唇掲赤服洩熱蜀升麻射干各三兩栢葉切一升大青二兩苦竹葉切地黄汁各五合赤蜜八合生𤣥参汁三合生蘆根薔薇根白皮各五兩右㕮咀以水四升煮取一升去滓下𤣥参汁一兩沸次下地黄汁兩沸次下蜜煎取一升七合綿濾取汁安舌上含細細咽之升麻柴胡湯出危氏方治心脾虚熱上攻舌上生瘡舌強頬兩邉腫痛柴胡升麻芍藥梔子仁木通各一兩黄芩大青杏仁去皮尖各三分石膏煆二兩右為剉散每服四大錢水一盞姜五片煎七分去滓食後服日三夜一渣重煎服𤣥参升麻湯出濟生方治心脾壅熱舌上生瘡木舌舌腫或連頬兩項腫痛𤣥参赤芍藥升麻犀角桔梗管仲黄芩甘草各等分右㕮咀每服四錢以水一盞半煎至七分去渣服不拘時一方有姜五片鉛丹膏治舌上生瘡生地黄汁三合蜜三合鉛丹一兩半杏仁去皮尖䨇仁别研如麵七十枚右和一處調勻銀器内煮用槐枝攪不得住手看色紫即成取出每用少許口内含化吐津鳥黄散出仁齊直指方療卒腫舌瘡右用鳥賊魚骨蒲黄等分為末傅舌上良吻瘡附論病源足太隂為脾之經其氣通於口足陽明為胃之經手陽眀為大腸之經此二經並夾於口其腑臟虚為風邪濕熱所乘氣發於脉與津液相摶則生瘡常濕爛有汁世謂之肥瘡亦名驚口瘡口吻瘡者有其瘡發於唇吻之間痛微腫此由脾胃有熱随氣薫發上攻於口唇與津液相摶所致也唇舌焦燥口破生瘡者盖心脾受熱所致也以水浸黄連暖而飲之或用黄連阿膠丸以粳米飲吞下此要藥至於大渇而不可禦合少與竹葉湯熱劑之法無以踰此然此特随幾應變而已就根本論之則水火相濟蠟苓丸為宜也方芎辛丸出千金方治口吻瘡梔子甘草各十分細辛二十分桂心二十分芎藭一兩右為末蜜丸食後服七丸日再服瘥止芎芷丸出千金方治口吻瘡芎藭白芷橘皮桂心棗肉各一兩半右為末蜜和為丸食後服一十五丸又含之以瘥為度此方甚驗芎藭丸治口吻瘡芎藭二兩白芷陳橘皮湯浸去皮白黄連去鬚各半兩右為末煉蜜丸如梧桐子大每服二十丸甘草湯下不拘時亂髮灰散治口吻生瘡及口傍惡瘡亂髪灰黄連去鬚故絮灰各一兩乾姜炮半兩右為散再研勻不拘多少傅瘡上日三五次以瘥為度桑脂散治口吻瘡右用桑條嫩枝於鉄上燒灰作末鵝脂和傅之㯽粉散治口邉生瘡浸滛不效一名立效散㯽榔燒存性輕粉少許右為細末入傅瘡口上立愈一方用蒸飯甑上滴淚調傅之烏金散治口吻瘡右取蜣蜋三枚燒灰細研為散傅之治口吻瘡右用越𤓰為灰傅之治口吻瘡右取經年葵根欲腐者彌佳燒作灰及熱傅之治口吻瘡右用楸白皮濕貼之三四度瘥一方用葉為末傅瘡治吻瘡右用新炊飰了甑及熱以唇口向甑唇上熨之二十七下三兩次瘡止治口吻惡瘡及喉中口舌生瘡右用黄栢以蜜塗炙研羅為末傅瘡上效亦以削如鴨舌含之杏仁散治口吻生瘡杏仁一分湯浸去皮尖䨇仁鉛霜半分麝香少許右先研杏仁令細次入鉛霜麝香研令勻用少許傅瘡上瘥㯽榔散治口吻生白瘡右㯽榔二枚燒灰存性細研傅之妙日三五度治鷰吻方以白楊枯枝鐡上燒取脂及熱傅之又方以木履尾内煻灰中令熱取挂兩吻各二十七遍治吻上鷰口瘡取百家筋頭燒為灰𫝊瘡上治吻上鷰瘡取㭢几上屑燒傅之瘥治小吻瘡又用桑葉研取白汁傅之唇瘡附論濟上方云唇者脾之所主胃者脾之所合其經起於鼻環於唇其支脉絡於脾胃受邪則唇爲之病盖風勝則渇燥勝則乾熱勝則裂氣鬰則生瘡血少則瀋而無色治之之法内則當理其脾外當敷以藥無不效者矣夫脾與胃合足陽明之經胃之脉也其經起於鼻環於唇其支脉入絡於脾脾胃有熱氣發於唇則唇生瘡也方潤脾膏治脾熱唇焦枯無潤生天門冬切生地黄汁一升生麥門冬萎㽔各四兩猪膏三升細辛甘草芎藭白术各二兩黄茋升麻各三兩右㕮咀諸藥苦酒淹一宿綿裹藥臨煎下生地黄汁與諸藥共煎取膏候水氣盡去滓取細細含之白歛膏治唇瘡白歛白芨各一兩黄茋牡丹皮芍藥丁香各一分白蠟三兩麝香另研乳香另研各一分右将白歛等六味為㕮咀用芝蔴油半觔先煎十餘沸下剉藥有焦色以綿濾去滓慢火再煎十餘沸下蠟不住手攪離火候凝盛於磁器中下麝乳攪勻每用少許塗患處日三五上即瘥藁本散治唇瘡生肌藁本去苖土半兩芎藭半兩細辛去苖葉半兩桂去粗皮一分當歸焙乾半兩杏仁湯浸去皮尖雙仁一分雄黄研一分右為細散次入雄黄拌勻𫝊瘡上日三五次硫黄散治唇瘡及𦂳唇瘡久不瘥硫黄研白礬枯研丹砂研水銀麝香研黄栢為細末各一分右研候水銀星盡用臘月猪脂和如泥先拭唇令凈後以膏塗之日三五上即瘥黄栢散治蠒唇黄栢一兩五倍二錢蜜陀僧少許甘草少許右除黄栢外為末水調勻敷於黄栢上火炙三五次炙盡藥末為度將黄栢薄片臨睡貼之天明即愈皆效方療疳䖝蝕唇鼻齒口及餘處石硫黄研乾漆熬文蛤焼作灰右等分絹篩之每用揀胡桃一枚麝香棗核大研和先拭去惡物血等然後傅之日三五倍子散治口唇生瘡五倍子去心中虫槐花擇等分右為細末每用蜜調𫝊唇上如瘡口乾以葱涎調塗之錢脂膏出聖惠方治唇黒腫痛癢不可忍右用大錢四文於石上以臘月猪脂磨取汁塗之又方出千金方右用竹弓彈出惡血取瘥亂蜂膏出千金方治唇黒腫痛癢不可忍右燒亂髪及蜂房六畜毛作灰猪脂和傅之亦治瀋唇治唇生瘡亦治唇𦂳裂破成瘡出千金方右以垢傅之日三度即頭垢或屠家肉案上垢燒灰塗之治唇邉生瘡連年不瘥出聖惠方右以八月藍葉十片絞取汁洗不過三日瘥治唇瘡出聖惠方右東壁上土研傅之瘥又方出聖惠方右胭脂用油調塗之瘥又方出聖惠方見本門口瘡類豆䜴散又方用白石英去皮酥炙赤為末貼瘡上䖝出即瘥又方出聖惠方右用大麻子燒灰為末用井華水調塗唇上治唇瘡及𦂳唇瘡右以鷄子一枚煮熟取白為泥貼瘡上又方出聖惠方右蠏腹底白皮一分燒灰研為末貼之效治瀋唇瘡唇常爛黒腫疼痛不可忍右以鯹魚血磨墨相調塗之一方用膽汁磨墨塗之又方出聖惠方右以白礬熬沸為末和胡粉傅之瘥治唇吻瘡出肘後方右用刮㭢几屑若枯屑火燒以傅之麥荴灰傅之並良又方出聖惠方右取乾蟾蜍焼灰細研傅之黄連散出聖惠方治吻惡瘡黄連一分去鬚乾姜半分炮裂右為細末每用少許𫝊瘡上不過三上瘥一方有膩粉治唇生瘡出千金方右以胡粉傅之治唇生瘡右以晩蠶蛾一分碾為末每取少許傅瘡上瘥海帶散出危氏方治縁唇瘡海帶不拘多少右為散臨卧貼一兩宿瘥唇𦂳附論唇𦂳之候其本與唇瘡同瘡未及瘥熱積在胃復為風濕所摶結令唇發腫瘡𦂳而痛濕潰出黄水久而不愈謂之𦂳唇脉經論足陽明之脉所生病則唇日𦂳者盖陽明胃之脉脥口還唇風熱所客則為𦂳唇之病方書謂𦂳唇亦為瀋唇用酸浆水洗去白痂臨卧㸃緑袍散或如不愈貼赴筵散又不愈貼鉛白霜散則安愈矣方甲煎唇脂治唇裂口臭可先以麻搗泥泥兩口好甆缾容一斗已上各厚半寸曝令乾甘松五兩艾納香苜蓿香茅香各一兩藿香三兩陵零香四兩右六味先以酒一升水五升相和作湯洗香令凈切碎又以酒水各一升浸一宿明旦取一斗五升烏麻油六味内其中微火煎三上三下去滓内上件一口缾中令少許不滿然後取上色沉香三斤雀頭香蘇合香各三兩白膠香白檀香各五兩麝香甲香丁香各一兩右先酒水相和作湯洗香令淨各各别搗碎不用絶細以蜜二升酒一升和香内上件甆缻中令實滿以綿裹缾口又以竹筏交横縳之勿令香出先掘地埋上件油缾令口與地平以香缾合覆油缾上令兩口相當以麻搗泥泥兩缾口際令牢宻可厚半寸許用糠壅瓶上厚五寸燒之火欲盡即加糠三日三夜勿令火絶計糠十二石訖停二日令冷出之别煉蜜八觔煮數沸内紫草十二兩煎數十沸取一莖紫草向𤓰甲研看紫草骨白出之又以綿濾過與煎相和令勻乃内硃砂粉六兩攪令相得少冷未凝之間傾置竹筒中即用紙裹麻纒之待凝冷解開任意用之計此可得五十挺甲煎口脂出千金方治唇白無血色及口臭燒香澤法沉香甲香丁香麝香檀香蘓合香薫陸香零陵香白膠香藿香甘松香澤蘭各六兩右胡麻油五升先煎油令熱乃下白膠香藿香甘松澤蘭少時出火綿濾内甆中入餘種香搗作末以蜜和勿過濕内著一小甆缾中令滿以綿裹口竹十字絡之以小瓶覆大缾上兩口相合蜜泥泥之乃掘地埋油缾令口與地平乃聚乾牛糞燒之一方用糠火燒之七日七夜不湏急滿十二日火尢佳待冷出之即成其缾並湏熟泥勻厚一寸曝乾乃可用順脾養肌散治唇𦂳山芋桂去粗皮白芷甘草白术各一兩人参訶子肉白茯苓黄茋木香各半兩肉豆􅛌兩枚右為細末每服一錢茶㸃熱服食前五福化毒出危氏方治唇舌腫破生瘡煩渇𤣥參洗焙北梗各二兩茯苓二兩半人参半兩馬牙硝枯青黛各一兩甘草七錢半焙麝一字金銀箔各四十片為衣右為細末煉蜜丸如皂子大以薄荷泡湯候冷調下如口臭以生地黄汁調下㵼黄飲子出危氏方治風熱藴於脾經唇燥瀋裂無色方見本門口舌瘡類水銀膏療𦂳唇病源云脾與胃合胃為足陽明其經脉起鼻還於唇其支脉入絡於脾胃脾胃有熱氣發於唇則唇生瘡而重被風邪寒濕之氣摶於瘡則微腫濕爛或冷或熱乍瘥乍發積月累年謂之𦂳唇亦治之水銀熏黄青礬各研苦參各二兩末絳緋方三寸亂髮一鷄子大細辛三兩末右以緋裹髪用麻油一斤蠟二兩先煎苦參細辛以緋髪消盡入水銀石藥及蠟厚膏成收凝定以𫝊上取瘥為度水銀和石藥兩味研令盡入煎之一方有乳香清脾湯出三因方治意思過度藴熱於脾口乾唇燥瀋裂無色方見本門口瘡類石硫黄膏出聖惠方療𦂳唇瘡久不瘥石硫黄研白礬燒硃砂研水銀麝香黄蘖末各一分右和水銀研於瓷鉢中以水銀星盡用臘月猪脂和泥先拭凈然塗之日三五瘥菊花丸出三因方治脾肺氣虚憂思過度榮衛枯耗唇瀋𦂳或口吻生瘡容色枯顇男子精女子血衰悉治之甘菊花枸杞子肉蓯蓉酒浸洗切巴㦸去心各等分右為末蜜丸梧桐子大每服三五十丸米湯下胡粉膏出聖惠方治𦂳唇瘡疼痛不可忍胡粉三分黄連三分去鬚甘草一分炙微赤剉麝香一錢細研右為末用臘月猪脂調令得所每以少許塗於瘡上羗活散出三因方治風濕入脾致唇瞤動掀掲頭疼目眩及四肢浮腫如風水之状羗活三兩茯苓薏苡仁各一兩右為末每服二錢水一盞煎七分入淡竹瀝一匙許再煎服煉蠟合甲煎法出千金方治唇白無血色蠟紫草各一兩右先煉蠟令消内紫草煮少時候看以紫草向指甲研之紫草心白即出之下蠟勿凝即傾搦一合甲煎於蠟中勻攪之訖灌筒中勿觸動候冷凝乃取之便成好口脂也𫝊口靣日三白燈散出千金方治唇𦂳右纒白布作大燈柱如脂安斧刄上燃炷令刄汗出拭取傅唇上日二三度蠐螬散出聖惠方治瀋唇右用乾蠐螬燒末和猪脂臨卧𫝊之一方水服之治𦂳唇橄㰖散出海上方治唇𦂳燥生瘡右橄㰖不拘多少燒灰為細末以猪脂和塗患處一方用核中仁細研傅之立效散出衛生寳鑑方治唇𦂳瘡痛訶子肉五倍子各半兩右為細末乾貼唇上立效杏仁膏治唇破裂口瘡右用杏仁細嚼同猪膏調唇上破處又方治𦂳唇右用自死蝼蛄燒灰傅之又方治𦂳唇右炙松脂貼上取瘥又方治𦂳唇右取蛇皮拭淨燒灰敷之又一方以生油調傅之又方治𦂳唇右火炙蠟貼唇取瘥又方治𦂳唇右以燒鱉甲及頭令煙盡為末傅之日三度又方治冬月唇乾折血出右搗桃仁猪脂和傅之又方治逺行唇口靣皴裂右用煎熟猪脂将行夜常取𫝊靣設行萬里野宿不損又方治唇𦂳右用馬齒莧煮汁洗𦂳唇又方治唇𦂳燥裂生瘡右用猪腎包安腎丸以紙固之煨熟好酒送下臨卧服之如無安腎丸以八味代之妙又方治𦂳唇瘡右用人溺白垽燒研末傅之又方治唇舌忽生瘡右用燒鷄屎白為末以布裹着瘡上含之又方療唇舌忽生瘡右用鷄舌香末以綿裹含之瘥又方治唇𦂳刺薊一兩右搗汁日曝之令濃先刺口唇令血出以藥汁塗之兼療刺風甚驗又方治唇𦂳皂莢末右以少許水調塗之又方治𦂳唇大黄一分右搗爲末每用少許醋調塗又方治𦂳唇右用屠兒肉几上垢燒塗又方療瀋唇𦂳唇及燥裂生瘡靣無顔色一方名青灰散右以青布卷燒炷著斧上取汁塗一方酒服之或猪脂塗或燒灰水調服又方治𦂳唇右取緑礬於熨斗内熬候汁盡研為末醋調塗於鼻子上貼之至來日去却藥安葱白皮瘡上以火炙油木梳熨之不過三上瘥又方治𦂳唇右用亂髪蜂房及六畜毛等分燒灰研為末貼於瘡上若以猪脂和塗亦佳凡口唇開破用藥兩頭封貼却以帛片看損横直加封藥於上再貼上牢住所封藥不令開落仍少言語凡上下腮口唇齒傷或内外横直落破有臭膿取出静處少言語或齒傷且先安齒住痛金井骨在唇下有損不可束縳只擦令平正用黒龍散敷貼綿片貼縳兩肋骨亦然唇生核附論唇生核之候大槩與唇瘡𦂳唇相類然其腫至於生核者盖足陽明與太隂為表裏藏府俱有風熱之氣衝發二經與血氣相摶而為唇腫外復為風冷所乗血氣凝結聚而不散故生核也方防風湯治脾胃藴積熱氣為風冷相摶唇邉生核結硬疼痛防風去皮半兩菊花一兩升麻獨活去蘆頭知母焙黄芩去黒心𤣥參藁本去苖土大黄剉炒梔子去皮前胡去蘆頭桔梗剉甘草炙剉麥門冬去心焙生乾地黄焙各半兩右麄搗篩每用三錢水一盞煎至七分去滓食後服日三升麻散治風熱在脾胃唇腫生核結聚川升麻一兩白歛三分𤣥参三分木通三分剉羚羊角屑三分漏蘆三分射干三分木香三分犀角屑三分川大黄一兩剉碎炒赤黄芩三分枳殻半兩麩炒㣲黄甘草半兩炙微赤剉杏仁三分湯浸去皮尖雙仁麩炒㣲黄右為散每服五錢以水一大盞煎至六分去滓不計時温服松脂膏治脾胃熱毒唇上生結核腫痛松脂一兩白膠香一兩薫陸香一兩蠟一兩當歸末一兩甘草末一兩猪脂一合羊腎脂一合生地黄汁半合右先以慢火煎脂令沸次下松脂白膠薫陸香蠟候銷濾去滓入地黄汁更煎令稠去火然後下藥末和攪令勻貯於甆盒中每用少許塗貼唇上地黄煎治脾風熱唇生核生地黄汁一升生麥門冬去心葳㽔各四兩細辛去苖葉甘草炙芎藭白术各二兩黄耆升麻各三兩右除地黄汁外並剉細以綿裹苦酒浸一宿取出更用猪膏三升煎濾過下地黄汁并綿裹諸藥同煎以膏成水脉盡為度去滓盛貯每以少許細含化緩嚥之升麻飲治脾胃有熱風冷相乘唇腫生核疼痛升麻一前胡去蘆頭犀角鎊各半兩龍膽青竹皮葛根剉各一分薏苡仁甘草炙剉各半兩右麄搗篩每服五錢水一盞半煎至八分去滓食後服獨活散治唇上生惡核腫由脾胃熱壅滯獨活三分川升麻三分沉香三分桑寄生三分連翹三分犀角屑三分漢防己三分川大黄三分剉碎微炒甘草半兩炙微赤剉右為散每服三錢水一中盞煎至六分去滓不計時候温服治唇生腫核塗貼松脂半兩川大黄一分白歛一分赤小豆一分胡粉一分右爲細末以鷄子青調塗貼於上薏苡仁湯治風腫在脾唇口瞤動或生結核或為浮腫薏苡仁炒防己赤小豆炮甘草炙各等分右㕮咀每服四錢水一盞半生姜三片煎至八分去滓温服不拘時候黄連散治脾胃積熱風冷乗之唇腫結核升麻黄連去鬚龍膽各一兩右搗羅為散綿裹如彈子大臨卧以新汲水浸過含化嚥津惡實散治唇腫生核惡實炒烏梅去核各半兩甘草炙剉一分右搗羅為散每服三錢童子小便一盞煎至三五沸和乗熱含潄冷吐日三又方治唇生核右用猪屎平量一升投水絞取汁温服又方治唇生核腫痛如彈牛膝燒灰存性研右先以針刺出惡血次用藥少許以新汲水調塗核上此藥亦治𦂳唇即瘥以燒灰細研為末掺敷𦂳唇又方療唇裏忽生丸核稍大右以刀鋒决之令血出瘥手足諸瘡門手足諸瘡方氈礬散治脚爛瘡竹蛀屑氈燒灰紅棗燒灰存性黄丹白礬飛韶粉右等分為末掺之乾瘡散治一切毒氣攻手足指甲生瘡及努肉白礬石膽各半兩同於鉄器内以炭火煨朱紅已上各一兩右爲末掺瘡上以綿纒定逐日換一遍妙戊午嵗子安児右脚大指患努肉每曉夜號呼傅藥三兩上即愈宣連散出直指方一名䨇聖散治足上瘡屡得效宣黄連研細蜜陀僧别研等分右和勻每用時先以葱塩煎湯洗瘡然後𫝊藥如瘡乾用少青麻油調塗之治臁瘡尤效一方用黄丹無黄連礬石四物湯出海上名方治手脚瘡痒右煎四物湯研礬石末少許攙入同服再煎滓洗之甚妙龍骨散出百一選方治脚疽并久逺惡瘡他藥不效者右獖猪糞不拘多少新瓦上焙乾入火中焼令通紅取出於瓶罐内窨成灰存性碾為細末每抄五錢用細研白龍骨末抄二錢半輕粉抄二錢半㯽榔末抄一錢和令勻先以口含虀水或温塩湯洗令瘡淨見内脚以真麻油調藥随瘡大小傅之未愈再𫝊不過三五日定安百草膏治脚靣惡瘡如桐油浸滛延蔓及治一切惡瘡不問乾濕痛痒日近年深百藥不瘥右用羊糞二三十粒置瓦上四畔炭火燒煙住火筯鉗於地上以盞覆存性羅成白灰研細以紗片篩去沙土麻油調𫝊痒入輕粉痛則入麝香少許即效治膝瘡并一切惡瘡痂痒出危氏方河南太守劉勲女病左膝痒華陀視之以䋲繋犬後足用刀斬犬腹取膽向瘡口湏臾有蟲若蛇從瘡口出即病愈神應散出肘後方治足大指角急為甲所入肉便刺作瘡不可着履靴脚指濕爛婦人有此右用礬石一物燒汁浸取末着瘡中去惡肉生好肉細細割去甲角旬日即瘥此方神效一方加丹砂少許同研掺之鹿粉散治脚上生惡瘡謂下注右用鹿角燒灰為細末入輕粉油調塗瘡上治毒攻手足腫疼痛欲斷出本草右用猪蹄一具合葱煮去渣内少許塩以漬之治脚上生瘡出百一選方右用訶子燒灰存性傅之治脚指縫爛瘡出百一選方右撏鵝項鵞掌皮燒灰存性為末傅之一方掺之治脚上鞋履打泡出海上方右用飯粘以紙貼之一夜即愈治手生刺瘡凡男女手指上忽腫漸見如粟粒大已見黄㸃若不治之害五六月不止甚妨舉動可取桃仁北靣皮一小片去肉皮薄貼黄㸃上用小艾炷炙黄㸃三状隔桃皮炙之然後用猪膽畧去汁套指使以紙扎䕶即愈治草鞋咬脚生瘡右用穿草鞋繩燒灰掺之及清油調塗或用津唾與鼻涕塗治指縫搔痒成瘡有竅出血不止出危氏方右用多年糞桶篾乾燒灰𫝊即安治手指赤随月生死右以薤一把苦酒中煮熟出以𫝊即愈治手足忽生疣目出肘後方右以蒴藋赤子按使壊疣目上塗即瘥治卒手足腫痛出千金方右搗生胡麻油傅之治手足忽生疣目出肘後方右以塩塗疣上令牛餂之不過三度即瘥真珠散出千金方治手足指逆臚右用真珠一分乾姜二分搗研粉瘡上日三又方出千金方右還坐厠上以指倒将二七下即瘥病縁厠上搔頭所致凈肌散出鮑氏方治一切脛腿手足濕爛瘡枯礬為主次膠香黄丹輕粉及雄黄真清麻油調末𫝊百般瘡痏一時光滑膚散出危氏方治同前鹿黎用藜蘆亦可剪草赤廷脂硫黄赤色荆芥蛇床黄栢皮白芷枮礬少輕粉洗净桐油調傅之治一切脚手上忽生中惡瘡久經年月不得安效忽又臨發作時先覺搔痒不可勝忍以指􅎲破肉内皆清水即便發作宜用此方傅之仍喫後方藥以消其根出楊子建萬全䕶命方五倍子羗活海桐皮木香㯽榔黄連莽草細辛當歸各一分室女亂髪一拳大烏蛇水浸一宿去皮骨只使肉候乾用一兩右細剉使臘月猪脂煎取油五兩入衆藥在内煎令焦黄色漉出新綿濾出藥滓不使却将麝香四銖輕粉二十箇麟竭一分黄丹一兩鉢内同研爛如飛塵入在油内重入鐺内再煉以竹筯攪令紫色便傾出以新􅀈器收之非時用搽瘡上但一切過月惡瘡並皆可使若是遍身有此疾候湏是喫後方藥以除其根枳殻只使青麻黄去根荆芥穗杜丹皮去心川羗活木香㯽榔白蒺藜去刺各一分烏蛇以酒浸一宿去皮骨用酒炙令香黄秤肉一兩使右同杵羅為末每服二錢匕非時以葱酒調下和滓喫歩行足及膝痛方出肘後方以熱水沃之竟日明日便愈治一切男子兩足瘙痒生瘡連年累不效欲名為腎風瘡者宜喫此方藥仍以後藥傅之出䕶命方黄茋牛膝各半兩獨活羗活芎防風白附子木香各分白蒺藜一兩去刺右細杵羅為末煉蜜丸如梧桐子大早朝空心塩湯下三十丸服此藥後仍用後方藥傅㯽榔木香白芨防風白芷龍骨麝香各等分右爲細末燒蛇退皮一條為灰膩粉十五箇同入乳鉢内更研令勻却用鱔魚一條槌碎百部一兩煎此三件南椒三銖油一兩碎切藥令得所去藥不使只用油搽瘡口却傅藥在油上以油單裹之三日一換每用藥時先用柳枝甘草煮湯熱洗瘡後方使油使藥也荷葉藁本湯出三因方治脚上生瘡浸滛腿膝膿汁淋漓熱腫痛痒乾荷葉四張藁本一分右以剉散以水二斗煎减五六升去滓温煖得所淋渫乃服煎黄耆湯佳塌氣藁膏出江隂方治下冷上熱之人及跣足履地口舌生瘡及眼痛日久不愈服凉藥越甚吳茱萸桂附子椒子乾姜地龍各一分右件藥為末姜汁調成膏攤如掌大貼火桶子又脚瘡出汗如油藥洗赤芍藥茵蔯荆芥蒼耳薄荷澤蘭葱根防風蛇床子白芷右等分生用水煎温淋洗散血仍用缾斟洗不用履水妙并治婦人血風治熱毒病攻手足腫痛欲脱方出肘後方水煎馬糞汁以漬之治足毒忽發疣出本草取梁米粉鐵鐺熬令赤以衆人唾和塗上厚一寸即消治毒氣攻疰足脛瘡不瘥白术為細末塩漿水洗瘡乾貼二日一換可以負腫渉險㓙年與老小使負粮人不能少之謂之米脯治手足心風腫出本草秦椒塩末等分醋和傅之良治手足腫及熱瘡出本草以田中螺生研汁傅之治毒攻手足腫痛出本草以蛇煮汁服三合日以三合水漬烏梅令濃納崖宻飲之乃可用卒刺手水腫出本草以搗韮及藍置上以火炙熱徹即瘥治指刺手痛出本草以醤清和蜜任多少濕傅之愈有傷手足而犯惡露殺人不可治出本草以薤白爛搗以帛囊之着糠火使薤白極熱去帛以薤𫝊瘡以帛急裹之冷即昜亦可搗作餅子以艾炙之使熱氣入瘡中水下瘥昔趙子固母年八十左足靣一瘡連大指延外踝以至脛骨一歳輒數發發必兼旬累月昏暮癢甚微搔移時出血如泉呻吟痛楚痛殆不可忍夜分積漸已明復然每一更藥則瘡轉大而劇百試不驗如是二十餘年淳熈甲辰子固太府窀穸母病大作相對悲泣無計困極就睡夢四神僧黙坐一室旁有小榻子固亦坐因而發嘆一僧問其故子固答之以實僧云可服牛黄金虎丹又一僧云硃砂亦可既覺頗驚異試取藥半粒強服之良久腹大痛舉家且悔俄而下礧磈物如鐡者數升是夕瘡但㣲痒不痛而無血數日已自此遂愈硃砂之説竟不復試子固因圖像僧如所夢者而記其事牛黄金虎丹方出和劑本治中風痰延壅塞用牛黄龍腦膩粉金箔之類皆非老人所宜服今乃取竒效盖此疾積熱毒於臟腑而發於皮膚嵗久根深末昜蕩滌故假凉劑以攻之不可以常瘡論也神僧之夢盖誠孝所感出百一選方昔人嚴黄七兩足生瘡臭穢潰爛衆驅逐不得容跡一日至京潜投宿於五夫人祠下夜半遭黄衣吏叱逐一日何人敢以腐穢脚觸汚此間謝曰不幸纒惡疾無處見容冐昧來此紛嚷次夫人抗聲令勿逐且呼使前曰吾授汝方用漏藍子一枚生焼乾為末入膩粉少許并水調塗當效嚴拜謝依而用之果愈類編療毒熱病攻手足腫疼痛欲脱者出本草以猪膏和羊屎塗之亦佳手足凍瘡附論夫經絡氣血得熱則肥澤得寒則凝濇冬時嚴寒氣血凝聚不流則皮肉不温瘃音竹凍焮赤痛腫而成瘡輕則潰爛重則損壊肢節也又云戴人女僮足有寒痬俗云凍瘡戴人令服舟車丸濬川散大下之其瘡遂愈人或疑之戴人曰心火降則寒消何疑之有方香霜膏治凍瘡重莧瘡香油瀝青黄丹百草霜各等分右先下香油後下瀝青次下百草霜後用黄丹成膏為膏藥貼之雉腦膏出聖濟緫録治凍靣凍耳并諸凍瘡久不瘥年年發歇先痒後痛後腫破黄水及血出不止雄雉腦一枚搗爛黄蠟與腦等分清油比蠟减半右同於慢火上熬成膏去滓以瓷器収如靣油逐旋塗摩羊肉湯出聖濟緫方治寒凍腫痒羊肉葱並細切各半斤右二味以水五升煎至三升去滓温洗日兩三度又方出聖濟緫錄右用葱葉一枝細切以水三升煎至二升去滓温洗日三兩度丹脂散出危氏方治足凍瘡右以黄丹用猪脂調傅猪蹄脂散出徳生堂經驗方治爛瘡因凍者右以猪後縣蹄燒研細猪脂和傅亦治小兒粉膠散出海上方治凍瘃瘡右用乾小粉炒焦存性為鎔牛膠調攤紙上貼之好米醋調尤妙如聖散出徳生堂經驗方治凍瘡皮膚破爛痛不可忍者右用大黄為細末新水調掃瘡又方出百一選方治凍瘡右用臘月雀腦子燒灰研小油調塗瘡口上一方用雀腦血傅之一方先用茄子根濃煎湯洗以鵲兒腦随塗之或用茄子莖葉苦者煮湯洗之定痛黄栢四兩去麄皮塗蜜慢火炙令黄色治凍瘡焮赤黄汁出及瘥後瘢㾗疼痛右為細末蜜水調攤軟紙花子上貼患處又方出神效方右用山藥少許於新瓦上磨為泥塗瘡口上治凍瘡不瘥者用熱湯洗之效栢藥散出聖濟緫録治凍瘡手足指欲墮及耳欲落栢葉炙乾為末四兩杏仁去皮研四十粒頭髪一拳大塩半兩研乳香研一分黄蠟一兩油一斤右先煎油沸次下五味藥以髪消盡為度次下黄蠟攪勻瓷器中收先以熱小便洗瘡以綿裛乾後以藥塗即以軟綿裹勿令寒氣浸入每日一洗一換如瘡漸瘥即三四日一換白歛散出聖濟緫録治大人小兒凍手皴裂成瘡白歛三分白芨末半兩油蔴二合生搗右藥蒸蘆菔一箇爛研與藥拌勻以酒調成膏先以童子小便洗瘡後塗之牛膠散出聖濟緫録治寒凍足跟開裂血出疼痛右以牛皮膠燒灰細研為末以唾調塗之車膏塗方出聖濟總録治手足凍瘡腫爛右以車膏熬令熱塗瘡上又羊脂和蜜調勻塗𫝊日三兩上橄㰖散出海上名方治凍脚瘡右用橄㰖核燒存性為末入輕粉油調塗治寒凍手足破裂出聖濟總録右用生姜拍碎二兩以淘飯飲三升和煎至二升乘熱薫洗患處日三五度又方出聖濟總録右以白餳五兩燒灰細研𫝊瘡上日三五度治手足凍腫爛出聖濟總録右取各𤓰藤半斤細剉以水三升煮汁浸洗日三兩度治凍指瘃欲堕出千金方右用馬屎三升以水煮令沸漬半日愈治凍瘡及折傷瘡右用臘月老䑕一箇麻油煎爛攪取油為膏𫝊瘡亦妙又方出肘後方右用兎髓及腦灰生傅之又治手足凍裂神效又方右用雄芭焦根白者䧺赤者雌為末濕則掺之乾則油調又方出楊氏家藏方右以黄栢為細末用乳汁調於瘡口上破者乾掺神效一方用鷄子清調塗一方燒存性灰研細經驗方云予每入冬雙足􅀈瘃艱於穿履祗用蘆菔茄根芸薹煎湯洗灌其效甚緩今年之作尤甚忽使臣強徳中献是方一夕而愈世間有此妙方可謂萬金良藥惜予聞之晩可不廣以惠人小膏子出王氏博濟方治凍耳兼療濕瘡丹参一兩黄蠟半兩豉一合葱白五莖清油三兩右先将油煎三兩沸次入參䜴煎令焦濾去滓然後入蠟勻攪入磁合子内盛每患即塗之三兩上瘥二黄散出家藏經驗方治毒瘡凍瘡黄栢皮黄連右等分為細末並不見火先以甘草湯洗了瘡用藥末二錢輕粉少許生麻油調稀稠得所傅之如瘡濕不用麻油只乾掺之余盛年冬月時耳珠凍瘡爛則瘡成去靨則流血偶吳道人過門扣之用此藥兩日即愈治凍瘡出本草取用秫米嚼傅之治凍瘡出本草以松葉炙傅之佳治凍瘡風濕瘡出本草以栢葉炙傅之治凍瘡出本草用糟浸洗療凍瘡出本草取蒿雀腦塗凍瘡上手足不皸其雀肉極熱能補益人也治脚上凍成瘡腫右用大黄為末煎湯熱洗一月愈治凍脚右用烏頭一枚炮生熟得所為末水洗掺之伐指附論伐指者先腫焮然痛色不黯縁爪甲邉結膿劇者爪皆脫落此謂之伐指病也但得一物冷藥汁渫漬之佳若熱盛服漏蘆及渫漬之傅藥盖爪者筋之餘筋骨熱盛注於指端故其指先腫熱焮痛結聚成膿甚則爪甲脫落世或謂之淪指又伐甲其實一也此病類於指疽然無藴毒故色不黯黒雖久亦不殺人方漏蘆湯出聖濟總録治伐指筋骨臟腑中熱焮腫痛漏蘆去蘆頭升麻大黄剉炒黄芩去黒心各一兩𤣥参三分右麄搗篩每服五錢水一盞半竹葉二七片同煎至一盞下芒硝末一錢再煎去滓空心温服如利去芒硝藍花湯出聖濟總録治伐指腫痛藍花漏蘆去蘆頭大黄剉炒升麻黄芩去黒心各一兩右麄搗篩每服五錢水一盞半竹葉二十片煎至一盞下芒硝末一錢再煎一沸去滓空心温服如利去芒硝皂霜散治伐指皂角南星拒霜葉草烏右等分為末米醋調𫝊留口出毒升麻湯出聖濟總録治伐指雖無藴毒筋骨中熱氣尚盛升麻甘草各半兩右細剉以水二升煎去滓下芒硝末半兩攪勻温浸指上數十遍冷即再暖以瘥為度梔子湯治伐指梔子仁甘草各一兩右細剉以水二升煎至一升半去滓候温浸指上日三五度瘥草硝散出仁存方治伐指結膿指爪甲脱者右用甘草二兩㕮咀以水五升煮取一升半漬之一方用芒硝亦可煎湯淋洗愈塩脂湯出千金方治指痛欲脱右用猪脂和塩煮令消熱内指中一食久住千金翼和乾姜醤蜜塗方出千金方治伐指掣痛手足不可忍醤汁一合蜜一兩右和煎令沸稍熱𫝊日五七上即瘥一方用醤水醤水漬方出聖濟總録治伐指腫痛右取醤水一升以塩半兩和煎令沸温浸患指日三五度瘥一方用醤水調蜜傅之地龍散出仁存方治伐指手指甲頭腫取肉刺右用地龍乾者不拘多少搗羅為細散以猪膏調傅患指日三兩上瘥一方用泥傅之一方無猪膏硇砂膏出千金方治伐指右以唾和白硇砂先搜麵作碗子盛唾次着硇砂如棗許以爪指着中一日即愈麻黄湯出聖濟總録治伐指右用麻黄二兩去根剉以水二升煎至一升半去滓温浸患指日三五度瘥熱蘸湯出聖惠方治伐指為五臟氣流注十二經脉熱衝手指右以熱湯急蘸五七度次以冷水浸之又復如此三便塗羊膽即瘥未成膿者此方神效或以猪膽盛伐指纒之亦得一用牛膽粟米粉治伐指發症右用粟米粉不拘多少又鐡鐺中熬赤以衆人唾調塗患指厚半寸烏梅醋法出仁齋直指方治伐指手指甲頭腫取肉刺右用烏梅去肉殻只用仁研細米醋調得所入指漬之或和傅之治伐指手指忽腫痛不已者名為伐指右以羊毛雜黄土泥指五分厚内煻灰中煨之令熱可忍泥乾即易不過數度瘥如皮不皺者更為之又方出肘後方治伐指右刺指熱飯中二七遍愈又方出千金方治伐指右以麻沸湯漬之又方出千金方治伐指右取萎黄葱葉煮沸漬之又方出千金方治伐指右以蜀椒四合水一升煮三沸漬之又方出聖惠方治伐指右先刺去膿血炙魚鮓皮令温以纒裹固匝痛止便愈又方出𫝊信適用方治伐指右拒霜葉為末加消風散調塗自散其毒又方治伐指右以黒豆爛嚼敷之或燒灰傅之亦可又方出聖惠方治伐指右用地榆二兩細剉以水三升煎至二升去滓温浸指冷即再暖又方出聖惠方治伐指發疣右用塩不拘多少小便調塗患指上以故帛裹之一二日鈹鍼刺血再塗即瘥又方出聖濟總録治伐指腫痛不可忍右用酒糟不拘多少取晝夜裹之或以瓶子一枚先装火了入茵子於上以紙裹瓶口作一孔子將指頭入薰瘡效又方出肘後方治伐指甲頭腫取肉刺右新土中蚯蚓和猪脂搗如泥傅之一方無猪脂又方出肘後方右燒鐡令熱勿令赤以灼之又炙指頭痛處七次愈治伐指成癰右用糞堆上蠐螬蟲一箇截頭中一叚安患處以艾炙之和麵調圍患處㧞毒散出衛生家寶方治毒瘡生於手指赤腫堅硬俗呼為發指徹疼痛不可忍者泥蜂窠粘壁間採之乳香少許研右為末用釅米醋調塗之乾即再上醋痛立止治伐指諺云天蛇風蜈蚣一條火上焼右以烟薫病指一二次即安療伐指出本草右以蠟松膠和将火炙籠伐指即瘥肉刺附論肉刺者生於足指間形如鞕胝與肉相附隠痛成刺由靴履急穿相摩而成方松脂膏出聖惠方治肉刺白膠栢木上者松脂各一兩黄蠟半兩右於火上鎔成膏冷貼用物繋定無食膏出聖惠方治肉刺肥皂莢一梃無食子三枚右燒令烟㫁細研以釅米醋於沙盆中别磨皂角如糊和末傅之立效薰硫散出聖惠方治肉刺薰陸香石硫黄右等分同研令勻塗肉刺上以燒釵烙之效楓香脂膏出聖惠方治肉刺猪胰一兩楓香脂一分右先研猪胰令爛次入楓香末和成膏挑剔刺處令凈以藥傅之效一方有白膠香乳香散出聖惠方治肉刺久不瘥松脂乳香各一分右同研細先用鍼撥破傅之宻封繋硇砂散治取肉刺右以硇砂少許和膠香令勻貼之根即出羊腦膏出聖惠方治取肉刺右用刀薄刮之以新酒醅和羊腦傅之一宿常以綿裹包之羊髓亦得又方出聖惠方治肉刺結鞕右用鍼挑破以鷄子白㸃三兩度即落下又方出聖惠方治肉刺結鞕右用白芥子搗如粉以醋調傅之宻封繋經宿掲去自然落下又方出聖惠方右以黒木耳取貼之自消爛不痛宜以湯洗㣲刮去上者乃用之治手足甲忽然長倒生肉刺如錐痛不可忍喫葵菜自愈治八月九月中刺手足犯惡露腫多殺人出本草以桑枝三條焼灰服之仍取韮白𫝊瘡上以布帛急裹之若有腫者更作用薤白佳治反脚指間有肉刺瘡出本草以黒虱傅根出之也治肉刺結鞕用羊髓傅之立效甲疽附論足三隂經皆起於足氣血沮而不行潰於指甲之間能成甲疽凡以經絡之所流注非特肌肉之病也故或得於剪甲傷肌或得於中長侵肉或得於歩履之不適便血氣沮遏不通故腐潰為疽久則浸滛爛指上引腕膝之間而瘡泡者是已然病在血氣不必治其肉惟塗𫝊滌濯去惡而除穢及適其行履則愈方蝦蟆散出聖惠方治甲疽皮厚腫痛蝦蟆灰半兩杏仁七枚熬黒研如泥黄連末半分雄黄半錢細研白礬半錢膩粉半分鹿角七寸燒令熱細研麝香半錢細研蚋蛇膽半錢右相和細研以臘月猪脂調如膏先以甘草蛇床槐白皮煎湯洗瘡拭乾𫝊藥以油單裹外更着綿帛裹之三日其刺肉剩甲皆當自落三日一換猪蹄湯治甲疽及諸癰疽惡瘡有瘜肉猪蹄一隻生者白歛白芷狼牙芍藥各三兩黄連黄芩大黄獨活各一両右㕮咀如荳先以水三斗煮猪蹄水至一斗二升去蹄後入藥更煮至五升候温洗瘡日三度白礬散出聖惠方治男女風血毒氣攻手足指甲疽瘡久不瘥努肉裹指甲疼痛出血不定宜用此縮肉乾瘡白礬石膽各半兩麝香一分朱紅一分騏麟竭一分右取白礬石膽於鐡器内一處以炭火煆過入麝香騏麟竭朱紅同研令細用少許乾掺瘡上以帛子纒定日兩度換之白礬散出聖惠方治甲疽白礬焼灰一兩麝香蘆薈蚺蛇膽各半分右研細先以浆水洗瘡乾傅之洗瘡日三兩上瘥為度馬齒散出聖惠方治甲疽墻上馬齒草隂乾一兩木香丹砂研細塩研細各一分右除丹砂塩外剉細拌令勻於熨斗内以皮灰火燒火過取出細研即入丹砂塩末再研勻旋取𫝊瘡上日三兩度緑硝煎出後治甲疽或因剔甲傷肌或因甲長侵肉遂成瘡腫痛後縁窄靴研損四邉腫焮黄水出浸滛相染五脂俱爛漸漸脚跌泡浆四邉起成火燒瘡日夜倍増醫方所不能療者右用緑礬五兩形色似樸硝而緑色置於鉄上板上聚灰封之囊袋吹令火熾其礬即沸流出色赤如鎔金汁者是真也候沸定汁盡去火待冷取出研為細末似黄色收之先以塩湯洗瘡帛裛乾用此末傅之或有蟲有黄水當日洗汁㫁瘡乾若患痛急即塗少酥令潤每日一遍塩湯洗灌有膿處常洗使淨其痂乾不湏近每洗乾傅藥如初但急痛即塗酥五日即覺上痂漸剥起赤依前洗𫝊藥十日即瘡漸漸剥盡痂落軟處或更生白癑泡即摘破傅藥自然總瘥張侍郎得此病卧經六十日困頓不可復言京衆醫並經造問皆随意處方無效驗惟此法得效如神故録之海上方云研細先以黄丹洗瘡拭乾掺於瘡上愈多愈好着藥訖以軟帛寛裹之當日見效若患痛急即以酥少許塗令潤𫝊藥每日一次塩湯洗常令凈十日可愈蛇黄散出聖惠方治甲疽蛇脫皮置净甆器中以燭㷔焼之大着去燭勻燒令焦取一兩用之臭黄一兩緑礬一分焼熟右研如粉以銅盒子貯之先以熱小便二升置於銅鈔鑼中嚼三十枚杏仁吐於小便中攪令相得以瘡却浸之候痒即以銅箆子洗撥去膿血取爛帛裛之候乾還以銅箆子𫝊散令滿以故帛虚裹瘡指入大襪中每日一洗依前法用每洗待藥軟即撥去藥恐咬落瘡筋切慎房室及運動氣力忌麵蒜酒一切物無妨䕡茹膏治甲疽日夜倍増赤肉生甲邉裹甲者䕡茹黄耆各二兩猪脂一両右㕮咀如豆苦酒浸一宿與猪脂一處微火上煎取三合絞去柤以塗瘡上日三兩度其赤肉即消散緑礬散出危氏方治甲疽瘡緑礬半兩燒熟蘆薈一錢半香麝一字右研如粉袋絹盛藥納所患處指袋中綿扎定瘥為度蛇黄散出海上方治甲疽腫爛生脚指甲邉赤肉努出時瘥時發又治嵌甲生入肉常血疼痛雄黄半兩生用蛇脱皮燒灰存性一分右同硏如粉用先以温泔洗瘡上軟以尖刀子割去甲角拭乾藥傅上用軟帛褁半日許藥温即易一日即除痛便止一方用漿水洗淨以橘刺破處淋洗貼藥一方有黄耆無雄黄乳香𫝊方出海上名方治甲疽努肉褁甲膿血疼痛不瘥乳香研膽礬燒灰研右等分研極細時時傅之大凡此疾須是剔去甲不痛亦愈或已成瘡久不瘥即用此方一方二味燒研末傅之一方用礬燒灰敷瘡鬼針散出千金方治割甲侵肉不瘥右以鬼針草苗搗汁並䑕黏草根和臘月猪脂傅之牡蠣散治甲疽努肉褁甲膿血疼痛不瘥右用牡蠣頭研為末每服二錢研靛花酒調下如癰盛已潰者以末傅之仍更服藥並一日三服烏梅散治甲疽乆不瘥努肉癑血疼痛右用烏梅十枚燒灰研為㪚𫝊瘡上日三易一方用塩梅燒灰傅爛搗褁亦可石膽方出永類鈐方治甲疽右以石膽一兩於火上燒令烟盡研末傅瘡上不過四五度立瘥治甲傷損痛不能忍出永類鈐方右用煨葱白貼患處熟帛扎之立効治甲疽腫爛生脚指甲邉赤肉努出時瘥時發出聖惠方方見本類前䕡茹膏治甲疽瘡出聖惠方右以灰莧濃煮汁着少塩浸脚一兩日瘥或用乾者及根亦得治割甲侵肉不瘥出海上方用硇砂礬石為末褁之以瘥為候治甲疽瘡不瘥者並甲煎搗之治甲疽甲疽之状瘡皮厚甲錯剥起是也其瘡赤痒痛恒欲搔之兼有汗出其初皆是風邪折於血氣所生其瘡裡亦有蟲也右用白礬燒灰研細傅之嵌甲方砂糖方出百一選方治嵌甲右用琥珀糖是砂糖熬成小毬兒者燒存性入輕粉麝香麻油調傅指甲嵌入肉者不過一兩日自爛一方治甲傷陳寺丞仲山𫝊爛去壊肉生好肉無所損神効累効方出華陀蔵中方治嵌甲硇砂一字乳香並研各一錢膩粉半錢橄㰖核三個焼存性黄丹一字右為末以生麻油調以塩湯洗淨拭乾傅之两日即効乳没散出百一選方治嵌甲右用雌馬糞三塊各青布一片包了於新瓦上炭火煆存性研為細末毎半兩入没藥十分輕粉十分麝香少許先以葱椒湯洗拭乾口含甘草漿水吐在瘡上再洗拭淨傅藥濕者乾掺乾者生油調塗初貼一夜極痛不過三日上即去根本昔有人患此二十五年百藥不効一傅而安烏倍散出百一選方治嵌甲草烏頭半兩白牽牛一兩五倍子四兩全者龍骨一分右先將三物搥碎同五倍子炒令焦黒色去三物不用只取五倍子為末瘡乾用麻油調塗濕即乾貼黄連㪚出百一選方一名白礬散治嵌甲黄連韶粉黄蘖軟石膏煆等分兩右為細末用水洗瘡令淨軟帛子拭乾以新汲水調塗瘡上兩日一易妙用香烟脂散出百一選方一名麝香㪚治嵌甲侵肉不瘥五倍子燒灰黑存性染胭脂各等分麝香少許右研細掺五倍子生用亦得雄蟬散出百一選方治嵌甲雄黄通明者蟬退三箇酥炙各為細末右研和勻濕者乾掺乾者用津入輕粉少許調塗陀僧散出百一選方治割甲侵肉不瘥白礬飛過蜜陀僧各等分右為末乾掺不定一片帛褁之亦治脚臭一方用硇砂無陀僧掺褁之烏頭方出肘後方治䧟甲割甲成瘡連年不瘥川烏頭尖黄蘗各等分右為末洗了貼藥黄耆方治䧟甲生入肉常有血疼痛難忍或成瘡日乆不瘥者黄耆當歸各等分右為末貼瘡上若有惡肉更研少許硫黄末同貼虀水駐車丸治嵌甲膿出痛不可忍右虀水口噙淨洗却用局方駐車丸研細傅之又方治嵌甲右以五倍子用瓦上炒燋研細以姜汁調𫝊如瘡濕入少許麵水調傅甚竒妙又方治嵌甲右用乳香為末擦之又方治欲去甲者右用綿逐旋摺入甲内漸漸添之靸起次用剪子去之又方治脚大指頭忽為甲所入肉便刺作瘡不能着履靴方見本門手足諸瘡内神效散名治䧟甲生入肉常有血疼痛用蛇皮一條燒存性灰黄一弹子同研以温漿水洗瘡針破貼藥又方治嵌甲右以鴉嘴膽礬為末搽之又方治嵌甲及靴窄碎成瘡右用枯白礬貼之愈牙縫出血亦然又方治䧟甲右以乳香掺之大妙乳香㪚治嵌甲疼不可忍有妨歩履紫藤香半兩半倚骨大者乳香半錢針挑麻油燈上燒存性當半兩錢一枚炭燒通紅醋淬碎輕粉少許痒即多入麝香當門子少許右為末細絹羅過每用少許先以甘草湯洗患處用舊絹拭乾然後傅藥即以燈草裹之立瘥表姪林震父得是方於德清陳宰余平日所收之方不逮此訶子㪚治嵌甲漬膿經久不瘥訶子三枚燒留性降眞香一錢青黛一錢别研五倍子半兩炒黒色右件並為末次入青黛一處研勻先用葱塩湯洗淨剪去指甲或挑起指甲用藥乾焙貼縫内或用蔴油調傅之膽礬散治嵌甲膽礬一兩入甘羅子烈火煆令白色去火毒一宿麝香一字研細右件同研細先用葱塩湯洗患處拭乾傅藥少許皴裂附論夫皴裂者由肌肉虛冬時觸冐於是風冷折手足破故謂之皴裂也丹粉膏治脚踏地不可忍疼蔴油四兩黄丹二兩白膠香半兩光粉一兩敗荷二錢為末乳香二錢没藥半兩右如膏藥煎得所滴水中可丸為度用丸時如䑕糞大傅即生浮皮回神膏治手足皸裂如蒸梨狀雖春夏亦如此生姜汁紅糟猪脂塩各等分右研爛炒熟擦入皸折内一時雖疼少頃便皮軟皸合三二次擦即安椒塩湯治手足皴痛芎藭蜀椒二分白芷防風塩各一兩右㕮咀以水四升煎取濃塗之或猪脂煎更良白艾膏治㫁根皸裂右用頭髪一大握桐油一椀於瓦器内熬候油沸頭髪鎔爛入白芷松香末出火攤冷以瓦器收貯不容灰入用百沸湯泡洗皸裂拭乾傅其上或加少水粉猪實散治皴皺脫皮膚猪桃兒土𤓰根啇陸右等分為細末毎日早晨用少許如常擦患處或用桃仁膏桃仁膏出御藥院方治皴皺脫皮膚右用桃仁不拘多少湯浸去皮尖研如泥同蜜少許一處用温水化開塗患處後用玉屑膏塗貼玉屑膏出御藥院方治手指面頰肌膚皴澁不澤輕粉定粉各三錢蜜陀僧三錢右為細末用皂角子取白仁以熱漿水浸成膏子調藥稀硬得所塗患處燒髪散出永類鈐方治脚折俗名脚皸右好米作餳糖加蔴油煎燒頭髪為灰和勻用水洗淨脚用油澆入瘡縫内馬蹄湯治㫁根皸馬蹄下者燒灰猫兒毛燒灰男子頭垢燒灰右和匀清油調塗用絹綿䕶定休着水極能定疼除根先以蓼根及莖樟木葉湯洗令淨潔黄臘膏出海上方治脚皴裂右用油一兩男子髪同油化濾過髪粗再化黄蠟半兩同煎以油黒為度磁器盛之每用先以熱湯洗去皮藥貼之黄蠟膏出百一選方治冬月手足折裂右用清油半兩盞内慢火煎沸入黄蠟一塊同煎溶入光粉五倍子末少許熬令稠紫色為度先以熱湯洗火上烘乾即用藥傅薄紙貼之其痛立止入水亦不落若合藥入粉多則硬而成塊旋以火炙動挑傅亦不妨一方無五倍子不龜手方出百一選方治手足皸裂如蒸梨狀雖春夏亦如此瀝青二兩黄蠟一兩右煉熬攪匀於器中貯先以熱酒洗令皮軟拭乾將藥以慢火上熬令鎔之傅軟帛葢定一傅即瘥一云加黄耆防風各一兩黄丹膏治脚折俗名脚皸右用巴豆二十一粒去殻清油二兩煎豆黒色去豆用黄丹一兩半入油慢火熬攪勻作膏煎冬橘葉湯洗淨塗之蠶礬散治脚裂右用出蛾兒蠶繭裝細礬炭火上燒沸候過將繭並礬研細香油調傅之醎虀汁治脚無冬夏常折裂右以醎虀汁三升熱暖浸洗一日兩三次治手足皸裂出百一選方右以五倍子一味為細末先以淨紙拭乾蔴油調傅又方出百一選方治手足皸裂右以頭垢傅之即不痛久自合取其膩也又方治㫁根皸裂右用臘月鵝膏椒數粒熬過收用時取出傅裂處一方白鵝尾灰搽之又方治皸裂右用無名異為細末眞桐油調塗即可下水不痛又方出海上方治脚跟皸裂痛不可忍者右用五倍子為末同牛骨髄調小甆器埋地中七日取出填縫内即安又方出海上方治脚跟開裂痛不可忍者右用青萍於新瓦上焙乾為末搽之極妙瘡口乾則用油調又方出聖惠方治手足皴劈破裂血出疼痛右用猪脂着熱酒中洗之愼風冷又方出醫方集成治手足皴痛右煮茄子根洗之又方出聖惠方治手足皴裂冬月冐渉凍凌面目手足瘃疼痛右用椒四合水煮去滓漬半食頃出令燥須㬰復浸乾塗羊猪髓腦極妙又方出肘後方治手足皴裂血出疼痛若冬月冐渉凍凌面目手足瘃壊及熱疼痛皆治取猪腦髓着熱酒中以洗瘥又方出儒門事親治山野人患手足皸裂右用白芨不拘多少細嚼以塗之有効一方為末水調塗又方治手足皸裂血出痛右用葱葉萎黄及根煮以漬洗之即瘥又方治冬月手足折裂右用治瘧勝金丸研細清油調傅之又方出聖惠方治人足無冬夏怕皸裂名曰尸脚右用鷄糞一升以水五升煮至三升停温令浸脚半日瘥亦用屎忌踏酒吐及婦人穢血又方出聖惠方治手足皸裂成瘡右羊髓熬成油入黄丹攪勻令凝徧塗之三五上瘥又方出聖惠方治手足皸裂成瘡猪脂五合乾姜末二兩右相合煎四五沸候冷熱得所内指於中浸之又方出聖惠方治手足皸裂成瘡右取蓼子一升以水七升煎五七沸放温淋數遍即瘥又方出聖惠方治皸裂手指節欲落却令合右用萊州青石作器物者以刀子細刮取末欲落指節相視文縷相當便以石末厚覆其上以帛𦂳褁之其痛當時定指不過十餘日平復矣又方出聖惠方治皸裂破疼痛右炙松葉熨之兼煮松葉洗之不過三兩度瘥又方出聖惠方治人脚無冬夏常折裂右以烊膠乾故帛貼上又方出聖惠方治渉氷凍面手足瘃壊右以麥並蜀椒濃煮及熱浸洗又煮葱茱茰浸亦佳一方用麥葉濃煮汁熱洗之亦作麥窠潤肌出衛生寳鑑治手足皴澁皮膚裂開疼痛不能迎風入手足好瀝青四兩白黄蠟八錢乳香二錢右三味於鐡鐺内用文武火熬先下瀝青在鐺内随手便下黄蠟乳香次入清蔴油一二匙候瀝青盞鎔微微熬動放大淨水盆子其旁以攪藥用鉄筯滴一二㸃於水中試之須凝硬則再入油如硬軟合宜用新綿濾於水中折疊於水中試之揉扯以白為度油鐺旋旋入之勿令軟了以磁器内盛之或油紙褁亦得每用不拘多少先於火上炙裂了口熱却揑合裂處藥亦火上炙軟塗於裂處上用紙少許貼之自然合矣神降散出仁濟直指方治足皮皴桑寄生一小把本地桑根取皮一握白芷黄連等分右煎湯温和以帛蘸洗候血出盡拭乾傅後藥鷹𤓰黄連滿文皂角去皮核燒存性麻竹大蘀燒存性厚黄栢𤓰樟葉乾白芷右逐件為末等分蔴油調傅自然生皮神効謹勿喫醋治手足皴裂出永類鈐方五倍子白芨阿膠珠等分為末津調得所塗羊髓調尤佳療手足皴裂面出血痛出本草以酒挼猪胰洗並服治手足皸瘃出本草以鷓鴣脂膏塗之令不龜治手足利筋脉出本草以木𤓰根葉煮湯湯淋足脛可以已蹷又截其木乾之作桶以濯足尤益五指筋攣附論夫五指攣急者是筋急攣縮不屈伸者筋得風熱則能㢮縱得風冷則攣急也方淋蘸防風湯出聖惠方治手脂風冷所傷攣急防風去蘆頭附子去皮枳殻去穰柳蚛末杉木桂心羗活蜂房川椒去目木鱉子仁白芷白礬各半兩細辛三分右細剉每用一兩以水兩大椀入生薑一兩煎至一椀去滓温蘸手指冷即重煖用之羚羊角散治五指攣急疼痛連臂膞拘急羚羊角屑羗活防風去蘆頭當歸剉微炒芎藭天麻各三分桂心細辛五加皮各半兩附子炮製去皮臍麻黄去根節薏苡仁各一兩右為散細末每服不計時候以温酒調下二錢附子湯治五指攣急淋蘸手附子去皮臍生用防風去頭枳殻去瓤羗活白芷甘草剉生用蜂房各半兩川椒二兩去目右為散毎用一兩以水三大椀入生薑一両桑枝一握黒豆一合同煎令豆熟去滓看冷煖得所避風淋蘸手足水冷重熱用之芎藭湯治手指傷風冷筋脉攣急川椒去目芎藭各半兩白芷防風去蘆頭乾姜各一分右剉以水二大盞煎令濃濾去滓塗之日五七度瘥普濟方卷三百
