body:
  text: 普濟方卷三百明周王朱橚撰上部瘡門口麋附論膀胱移熱於小腸膈腸不便上為口麋夫小腸之脈絡心循咽下膈抵胃隂陽和平水穀入胃小腸受之通調氷道下輸膀胱令熱氣厥逆膀胱移熱於小腸胃之水榖不得傳輸於下則令腸膈塞而不便上則令生瘡而麋爛也大抵心胃壅熱則必薰蒸於上不可槩以傅藥當求本以治之方柴胡澤㵼湯治腸熱口糜生瘡柴胡去苖澤㵼陳橘皮浸去白焙黃芩去黑心枳實麩炒旋覆花升麻芒硝别研各三兩生地黃一升右除芒硝外㕮咀如麻豆大每服五錢水二盞煎取一中盞去滓下芒硝末半錢食後溫服大青丸治口糜生瘡久不瘥及心脾中熱乍發乍退大青去根甘草炙銼枳殼去穰麩炒苦參銼各三分黃連去鬚生乾地黃焙升麻各一兩右為末煉蜜和丸如梧桐子大每服二十丸食後熱水下日二服大黃散治口糜生瘡久不瘥大黃銼碎燒為灰甘草炙銼黃柏炙銼各一兩蜜陀僧研滑石研各一分右為散每用一錢綿裹含有涎即吐升麻丸治口糜生瘡升麻黃連去鬚黃柏炙銼杏仁湯浸去皮尖雙仁各一兩右為末研杏仁如膏煉蜜三兩以藥末并杏仁膏和為丸如彈子大每服一丸含化咽津紫金散治大人小兒口糜生瘡方見本門口瘡類紫金霜大黃湯治口糜生瘡大黃銼一兩芒硝研黃連去鬚黃柏炙各半兩右搗篩每服三錢水一盞煎至六分去滓入蜜半匙酥少許細呷含咽柴胡湯出宣明論治口糜生瘡損爛小腸有熱脹滿柴胡去苖地骨皮各一兩右搗篩每服三錢水一盞煎至六分去滓細含咽之病人熱實者加大黃朴硝可㵼治口瘡糜爛生蜜塗方右用生蜜使頻用塗瘡上三五次即愈一方用大黃一兩切如指頭大以蜜煎五七沸候冷取出每含一塊咽津治諸人口爛者出危氏方右用巴豆二粒帶皮搗與麵糊為膏貼在顱門上即一夜便可取瘡在顱門上永不發杏仁餅子出三因方一名杏粉膏治口糜生熱瘡以涼藥傅之不愈者杏仁湯浸去皮尖雙仁十四枚别研細膩粉一錢右和研如膏為餅如錢眼大鉛丹為衣先用鹽湯潄口含一餅涎出即吐應驗臨卧時細嚼涎出愈一方臨卧傳瘡上少頃吐之勿咽黃蘖散治口糜生瘡黃蘖蜜塗炙乾去火毒白殭蠶直者置新瓦上下以火煆蠶絲斷出火毒右為細散摻瘡及舌上吐涎逆調論云膀胱移熱於小腸膈腸不便上為口糜心胃壅熱水穀不轉下傳小腸𨗳赤散去小腸熱五苓散㵼膀胱熱故以𨗳赤散調五苓散主之出衛生寶鑑方胡黃連散出衛生寶鑑方治口糜胡黃連五分藿香一錢細辛三錢宣連三錢右為末每用半錢乾摻口內潄津吐之舌瘡附論舌生瘡者心脾經藴熱所致也蓋口屬心心者火脾者土火積熱傳之脾土二臟俱蓄熱毒不得發散攻衝上焦故令口舌之間生瘡腫痛方升麻煎出千金方舌主心臟熱即應舌生瘡裂破引唇揭赤服泄熱蜀升麻射干各三兩柏葉切一升大青二兩苦竹葉切地黃汁各五合赤蜜八合生玄參汁三合生蘆根薔薇根白皮各五兩右㕮咀以水四升煮取一升去滓下玄參汁一兩沸次下地黃汁兩沸次下蜜煎取一升七合綿濾取汁安舌上含細細咽之升麻柴胡湯出危氏方治心脾虛熱上攻舌上生瘡舌強頰兩邉腫痛柴胡升麻芍藥梔子仁木通各一兩黃芩大青杏仁去皮尖各三分石膏煆二兩右為銼散每服四大錢水一盞薑五片煎七分去滓食後服日三夜一渣重煎服玄參升麻湯出濟生方治心脾壅熱舌上生瘡木舌舌腫或連頰兩項腫痛玄參赤芍藥升麻犀角桔梗管仲黃芩甘草各等分右㕮咀每服四錢以水一盞半煎至七分去渣服不拘時一方有薑五片鉛丹膏治舌上生瘡生地黃汁三合蜜三合鉛丹一兩半杏仁去皮尖雙仁别研如麵七十枚右和一處調勻銀器內煮用槐枝攪不得住手看色紫即成取出每用少許口內含化吐津鳥黃散出仁齊直指方療卒腫舌瘡右用鳥賊魚骨蒲黃等分為末傅舌上良吻瘡附論病源足太隂為脾之經其氣通於口足陽明為胃之經手陽眀為大腸之經此二經並夾於口其腑臟虛為風邪濕熱所乘氣發於脈與津液相摶則生瘡常濕爛有汁世謂之肥瘡亦名驚口瘡口吻瘡者有其瘡發於唇吻之間痛微腫此由脾胃有熱隨氣薰發上攻於口唇與津液相摶所致也唇舌焦燥口破生瘡者蓋心脾受熱所致也以水浸黃連暖而飲之或用黃連阿膠丸以粳米飲吞下此要藥至於大渴而不可禦合少與竹葉湯熱劑之法無以踰此然此特隨幾應變而已就根本論之則水火相濟蠟苓丸為宜也方芎辛丸出千金方治口吻瘡梔子甘草各十分細辛二十分桂心二十分芎藭一兩右為末蜜丸食後服七丸日再服瘥止芎芷丸出千金方治口吻瘡芎藭白芷橘皮桂心棗肉各一兩半右為末蜜和為丸食後服一十五丸又含之以瘥為度此方甚驗芎藭丸治口吻瘡芎藭二兩白芷陳橘皮湯浸去皮白黃連去鬚各半兩右為末煉蜜丸如梧桐子大每服二十丸甘草湯下不拘時亂髮灰散治口吻生瘡及口傍惡瘡亂髮灰黃連去鬚故絮灰各一兩乾薑炮半兩右為散再研勻不拘多少傅瘡上日三五次以瘥為度桑脂散治口吻瘡右用桑條嫩枝於鐵上燒灰作末鵝脂和傅之檳粉散治口邉生瘡浸淫不效一名立效散檳榔燒存性輕粉少許右為細末入傅瘡口上立愈一方用蒸飯甑上滴淚調傅之烏金散治口吻瘡右取蜣蜋三枚燒灰細研為散傅之治口吻瘡右用越瓜為灰傅之治口吻瘡右取經年葵根欲腐者彌佳燒作灰及熱傅之治口吻瘡右用楸白皮濕貼之三四度瘥一方用葉為末傅瘡治吻瘡右用新炊飰了甑及熱以唇口向甑唇上尉之二十七下三兩次瘡止治口吻惡瘡及喉中口舌生瘡右用黃柏以蜜塗炙研羅為末傅瘡上效亦以削如鴨舌含之杏仁散治口吻生瘡杏仁一分湯浸去皮尖雙仁鉛霜半分麝香少許右先研杏仁令細次入鉛霜麝香研令勻用少許傅瘡上瘥檳榔散治口吻生白瘡右檳榔二枚燒灰存性細研傅之妙日三五度治燕吻方以白楊枯枝鐡上燒取脂及熱傅之又方以木履尾內煻灰中令熱取挂兩吻各二十七遍治吻上燕口瘡取百家筋頭燒為灰傳瘡上治吻上燕瘡取㭢几上屑燒傅之瘥治小吻瘡又用桑葉研取白汁傅之唇瘡附論濟上方云唇者脾之所主胃者脾之所合其經起於鼻環於唇其支脈絡於脾胃受邪則唇為之病蓋風勝則渴燥勝則乾熱勝則裂氣鬱則生瘡血少則瀋而無色治之之法內則當理其脾外當敷以藥無不效者矣夫脾與胃合足陽明之經胃之脈也其經起於鼻環於唇其支脈入絡於脾脾胃有熱氣發於唇則唇生瘡也方潤脾膏治脾熱唇焦枯無潤生天門冬切生地黃汁一升生麥門冬萎㽔各四兩豬膏三升細辛甘草芎藭白术各二兩黃茋升麻各三兩右㕮咀諸藥苦酒淹一宿綿裹藥臨煎下生地黃汁與諸藥共煎取膏候水氣盡去滓取細細含之白斂膏治唇瘡白斂白芨各一兩黃茋牡丹皮芍藥丁香各一分白蠟三兩麝香另研乳香另研各一分右將白斂等六味為㕮咀用芝麻油半斤先煎十餘沸下銼藥有焦色以綿濾去滓慢火再煎十餘沸下蠟不住手攪離火候凝盛於磁器中下麝乳攪勻每用少許塗患處日三五上即瘥藁本散治唇瘡生肌藁本去苖土半兩芎藭半兩細辛去苖葉半兩桂去粗皮一分當歸焙乾半兩杏仁湯浸去皮尖雙仁一分雄黃研一分右為細散次入雄黃拌勻傳瘡上日三五次硫黃散治唇瘡及緊唇瘡久不瘥硫黃研白礬枯研丹砂研水銀麝香研黃柏為細末各一分右研候水銀星盡用臘月豬脂和如泥先拭唇令淨後以膏塗之日三五上即瘥黃柏散治繭唇黃柏一兩五倍二錢蜜陀僧少許甘草少許右除黃柏外為末水調勻敷於黃柏上火炙三五次炙盡藥末為度將黃柏薄片臨睡貼之天明即愈皆效方療疳蟲蝕唇鼻齒口及餘處石硫黃研乾漆熬文蛤燒作灰右等分絹篩之每用揀胡桃一枚麝香棗核大研和先拭去惡物血等然後傅之日三五倍子散治口唇生瘡五倍子去心中蟲槐花擇等分右為細末每用蜜調傳唇上如瘡口乾以蔥涎調塗之錢脂膏出聖惠方治唇黑腫痛癢不可忍右用大錢四文於石上以臘月豬脂磨取汁塗之又方出千金方右用竹弓彈出惡血取瘥亂蜂膏出千金方治唇黑腫痛癢不可忍右燒亂髮及蜂房六畜毛作灰豬脂和傅之亦治瀋唇治唇生瘡亦治唇緊裂破成瘡出千金方右以垢傅之日三度即頭垢或屠家肉案上垢燒灰塗之治唇邉生瘡連年不瘥出聖惠方右以八月藍葉十片絞取汁洗不過三日瘥治唇瘡出聖惠方右東壁上土研傅之瘥又方出聖惠方右胭脂用油調塗之瘥又方出聖惠方見本門口瘡類豆䜴散又方用白石英去皮酥炙赤為末貼瘡上蟲出即瘥又方出聖惠方右用大麻子燒灰為末用井華水調塗唇上治唇瘡及緊唇瘡右以雞子一枚煮熟取白為泥貼瘡上又方出聖惠方右蟹腹底白皮一分燒灰研為末貼之效治瀋唇瘡唇常爛黑腫疼痛不可忍右以鯹魚血磨墨相調塗之一方用膽汁磨墨塗之又方出聖惠方右以白礬熬沸為末和胡粉傅之瘥治唇吻瘡出肘後方右用刮㭢几屑若枯屑火燒以傅之麥荴灰傅之並良又方出聖惠方右取乾蟾蜍燒灰細研傅之黃連散出聖惠方治吻惡瘡黃連一分去鬚乾薑半分炮裂右為細末每用少許傳瘡上不過三上瘥一方有膩粉治唇生瘡出千金方右以胡粉傅之治唇生瘡右以晚蠶蛾一分碾為末每取少許傅瘡上瘥海帶散出危氏方治緣唇瘡海帶不拘多少右為散臨卧貼一兩宿瘥唇緊附論唇緊之候其本與唇瘡同瘡未及瘥熱積在胃復為風濕所摶結令唇發腫瘡緊而痛濕潰出黃水久而不愈謂之緊唇脈經論足陽明之脈所生病則唇日緊者蓋陽明胃之脈脥口還唇風熱所客則為緊唇之病方書謂緊唇亦為瀋唇用酸漿水洗去白痂臨卧點緑袍散或如不愈貼赴筵散又不愈貼鉛白霜散則安愈矣方甲煎唇脂治唇裂口臭可先以麻搗泥泥兩口好瓷瓶容一斗已上各厚半寸曝令乾甘松五兩艾納香苜蓿香茅香各一兩藿香三兩陵零香四兩右六味先以酒一升水五升相和作湯洗香令淨切碎又以酒水各一升浸一宿明旦取一斗五升烏麻油六味內其中微火煎三上三下去滓內上件一口瓶中令少許不滿然後取上色沉香三斤雀頭香蘇合香各三兩白膠香白檀香各五兩麝香甲香丁香各一兩右先酒水相和作湯洗香令淨各各别搗碎不用絶細以蜜二升酒一升和香內上件瓷缶中令實滿以綿裹瓶口又以竹筏交橫縳之勿令香出先掘地埋上件油瓶令口與地平以香瓶合覆油瓶上令兩口相當以麻搗泥泥兩瓶口際令牢密可厚半寸許用粳壅瓶上厚五寸燒之火欲盡即加粳三日三夜勿令火絶計粳十二石訖停二日令冷出之别煉蜜八斤煮數沸內紫草十二兩煎數十沸取一莖紫草向瓜甲研看紫草骨白出之又以綿濾過與煎相和令勻乃內硃砂粉六兩攪令相得少冷未凝之間傾置竹筒中即用紙裹麻纒之待凝冷解開任意用之計此可得五十挺甲煎口脂出千金方治唇白無血色及口臭燒香澤法沉香甲香丁香麝香檀香蘇合香薰陸香零陵香白膠香藿香甘松香澤蘭各六兩右胡麻油五升先煎油令熱乃下白膠香藿香甘松澤蘭少時出火綿濾內瓷中入餘種香搗作末以蜜和勿過濕內著一小瓷瓶中令滿以綿裹口竹十字絡之以小瓶覆大瓶上兩口相合蜜泥泥之乃掘地埋油瓶令口與地平乃聚乾牛糞燒之一方用粳火燒之七日七夜不須急滿十二日火尢佳待冷出之即成其瓶並須熟泥勻厚一寸曝乾乃可用順脾養肌散治唇緊山芋桂去粗皮白芷甘草白术各一兩人