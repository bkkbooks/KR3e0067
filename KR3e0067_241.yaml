body:
  text: 普濟方卷二百四十一明周王朱橚撰脚氣門一切脚氣附論夫太陽經脚氣病者頭痛目脱項强腰脊連體樞循髀外出外踝之後循京骨至小指外側皆痛者乃足太陽膀胱經為風寒暑濕流注自汗者為風勝無汗疼痛為寒勝熱頑為暑勝重著腫滿為濕勝諸經皆當如此推究太陽經隨四氣發散愈此太陽經脚氣治法方麻黄左經湯治風寒暑濕流注足太陽經手足攣痺行歩艱難増寒發熱無汗惡寒或自汗惡風頭痛暈眩腰重闗莭痛麻黄乾葛細辛白术防已桂心羌活防風甘草茯苓各等分右㕮咀毎服四錢水二盞薑三片棗一枚煎至七分去滓空心服自汗去麻黄加桂芍藥重者加橘皮無汗减桂加杏仁澤㵼所加並等分少陽經脚氣證病者口苦善太息脇痛面垢體無膏澤頭頷目鋭眥痛缺盆并腋下馬刀腫自汗振寒發熱胸中脇肋髀膝外至脛絶骨外踝及諸莭指皆痛者乃是少陽膽經為風寒暑濕流注之所為四氣偏勝例如前説治之冝隨四氣和解少陽經脚氣治法微别於太陽治方貴恭之半夏左經湯治足少陽經為風寒暑濕流注發熱腰脇痛頭疼眩暈嘔吐自汗耳聾驚悸熱悶心煩上氣喘滿肩膝腿痺縱緩不隨半夏湯浸去滑乾葛細辛白术茯苓桂心不見火防風乾薑黄芩小草甘草炙柴胡麥門冬去心各二兩右剉散毎服四錢水一盞半薑三片棗二枚煎七分去滓空心服熱悶加竹瀝喘滿加杏仁桑白皮大黄左經湯治風寒暑濕流注足經使腰脚痺痛行歩艱難涎潮昏塞大小便秘澁腹痛嘔吐或復下利惡聞食氣喘滿肩聳或自汗譫語妄言大黄細辛茯苓防風羌活黄芩前胡枳殻厚朴甘草杏仁右剉散毎服四錢水一盞半薑三片棗二枚煎七分去滓空心熱服腹痛加芍藥秘結加阿膠喘加桑白皮紫蘓小便秘加澤瀉四肢瘡癬浸滛加升麻所加並等分三陽并合脚氣證病者増寒壮熱自汗惡風或無汗惡寒眩暈重者闗莭掣動手足拘攣疼痛冷痺緩縱不隨心燥上氣嘔吐下利皆三陽經中風暑濕其脉浮弦𦂳数大料神秘左經湯治風寒暑濕流注足三陽經手足拘攣疼痛行歩艱難増寒發熱自汗惡風頭眩腰重闗莭掣痛或卒中昏塞小便秘澁或腹痛嘔吐下利惡聞食臭髀腿頑痺緩縱不随熱悶驚悸心煩上氣臍下冷痺喘滿肩息麻黄乾葛細辛厚朴茯苓桂心防已枳殻羌活防風柴胡黄岑小草白薑半夏甘草麥門冬去心各等分右剉散毎服四錢水一盞半生薑三片棗三枚煎至七分去滓空心服有汗加牡蠣白术去麻黄腫滿加澤㵼木通熱甚無汗減桂加橘皮前胡升麻腹痛吐利去黄岑加芍藥附子炮大便秘加大黄竹瀝喘滿加杏仁桑白皮紫蘓所加并各等分凡有此病詳認證状逐一加减無不愈者常服下氣消痰散風濕腿腫退飲食令人不虚加减敗毒散治三陽經脚氣流注脚踝上焮熱腫寒熱如瘧自汗惡風或無汗惡寒羌活獨活前胡柴胡枳殻桔梗甘草人參茯苓川芎大黄蒼术米泔浸各等分右剉散毎服四錢水一鍾半薑三片薄荷二錢煎七分去滓熱服不過二服愈皮膚瘙痒赤疹加蟬蜕煎太隂經脚氣證病者腹滿挾咽連舌系急痛胸膈痞滿循脛骨上膝股内前亷内踝過核骨後連足大指之端内側皆痛者乃足太隂脾經為四氣流注之所為也四氣偏勝並如前説治之各隨其氣所中輕重温散之六物附子湯治四氣流注於足太隂經骨莭煩疼四肢拘急自汗短氣小便不利惡風怯寒頭面手足時時浮腫附子桂心各四兩白术三兩甘草炙三兩防已四兩茯苓三兩右剉散毎服四錢水二盞薑七片煎七分去滓温服少隂經脚氣證病者腰脊痛小指之下連足心循脛骨内踝入跟中上腨内出膕内亷股内皆痛上衝胸咽飢不能食面黒小便淋閉咳吐不已善恐心惕惕若人将捕之状小腹不仁者難治此足少隂腎經宜温散之八味丸治少隂腎經脚氣入腹不仁上氣喘急嘔吐自汗此證最以腎乘心水克火死不旋踵及小腹不仁者速治之牡丹皮澤㵼茯苓各三兩附子桂心各二兩山茱茰各四兩山藥四兩熟地黄八兩右為末煉蜜丸如梧子大毎服五十丸温酒米湯食前送下厥隂經脚氣證病者腰脇偏疼從足大指連足跗上亷上膕内亷循股内隂器抵小腹夾臍諸處脹痛兩脚攣急嗌乾嘔逆飱泄者足厥隂經為四氣流注之所為也四氣偏勝並如前説各隨其氣所中輕重調理之神應養直丹治厥隂肝經為四氣所流注左癱右瘓涎潮昏塞半身不遂手足頑麻語言謇澁頭眩目昏牙闗𦂳急氣喘自汗心神恍惚肢體緩弱上攻頭目下注脚膝縈氣凝津遍身疼痛兼治婦人産後中風角弓反張墮車落馬打撲傷損瘀血在内當歸天麻川芎羌活白芍藥熟地黄各等分右為末蜜丸如鷄子大毎服一丸木𤓰兎絲子浸酒下脚痺薏苡仁浸酒下中風温酒米湯下乳香宣經丸治體虚風温寒濕四氣相搏半身不遂手足頑麻骨莭煩疼足脛浮腫惡寒發熱漸成脚氣肝腎不足四肢攣急遍身攻注或閃打撲跌内傷筋骨及風邪内摶男子疝氣婦人經脉不調常服活血止痛補虚壮筋骨葳靈仙烏藥茴香川棟子牽牛橘皮蓽薢防風各三兩五靈脂乳香各半兩草烏右為末酒糊丸如梧桐子大毎服五十丸鹽酒任下婦人醋湯下食前服四蒸木𤓰丸出危氏方治肝腎脾三經氣虚為風寒温濕搏着流注經絡竭日曠嵗治療不痊凡遇六化更變七情不寕至發動或腫或頑痺及増寒壮熱嘔吐自汗葳靈仙黄茋蒼术烏藥右各半兩以大木𤓰四箇切盖去穰入前件藥仍用盖簽定酒蒸熟三蒸三曬取藥出焙乾為末研𤓰為膏搜和丸如梧桐子大毎服五十丸空心温酒鹽湯任下川膝煎方出危氏方治肝腎虚為風寒濕毒所中流注腿膝歴莭疼痛如錐刀鍜刺不可名状牛膝二兩烏頭十箇右不要見銅鐡器及火與日木臼搗碎牛膝再入石磨中磨為末酒糊為丸如梧子大毎服四十丸用無灰酒一瓶中様木𤓰一箇切作片入瓶中煨木𤓰爛為度用此酒下不拘時候然肝氣惡鐡忌則有之不見火日此好事者妄忌且如烏頭牛膝採時豈一向隂乾也蒼术散治一切風寒暑濕令足膝痛或赤腫脚骨莭間作熱痛雖一㸃能令歩履艱難膝腿臂髀大骨疼痛令人痿躄一切脚氣百用百效蒼术黄蘖各四兩右剉散毎服四錢水一盞煎七分温服日進三四服勝駿丸出醫方集成治元氣不足真氣虚弱及諸寒濕氣進襲手足拳攣脚指連脚面拘急走注疼痛筋脉不伸行歩不隨常服益真氣壮筋骨黒髭鬚滑皮膚一切足弱鶴膝諸風並能治之附子一枚當歸天麻牛膝酸棗仁熟地黄防風各三兩木𤓰乳香各半兩射香一分全蝎木香沒藥羌活甘草炙各一兩右為細末用生地黄三斤洗浄搗爛如泥入無灰酒四升煮爛如膏以前藥和勻杵令堅毎兩作十丸毎服一丸細嚼臨睡酒下地黄膏春夏極多入冬或無地黄只煉蜜為丸如梧桐子大毎服五十丸鹽湯温酒下後加减法㯽榔蓽薢蓯蓉破故紙巴㦸右各一兩内熟地黄當歸各减一兩尤妙如服此藥五七日或半月見效甚速行歩如飛乃名勝駿側子酒治脚氣雖瘥至冬季間常須服此方側子乾薑石斛丹參牛膝甘草防風熟地黄芎藭當歸桂心五味子白术秦芁防已椒獨活山茱茰細辛黄芩茯苓附子右㕮咀絹袋貯以酒三斗五升浸秋冬七日春夏五日一服四合日二細細加之以知為度得食羊鹿麞肉亦得食鷄肉忌海菜菘菜猪肉冷水桃李雀肉生葱生菜蕪荑酢物導氣飲治寒熱脚氣赤腫疼痛心腹膨脹頭面手足浮腫身體腰背疼痛並治之羌活獨活木𤓰薏米青皮陳皮桑白皮大腹皮枳殻梹榔青木香紫蘓甘草大腹子赤茯苓木通右各等分㕮咀毎服四錢水一盞半煎至七分去滓食前服熱者加大黄濕者加蒼术木瓜牛膝丸治寒濕脚氣冷濕下注脚弱無力及腎經虚弱腰膝沉重腿脚腫急筋脉拘攣或時疼痛歩履艱難或更下利日見倦困木𤓰肉蓯蓉石楠根當歸烏藥熟地黄杏仁川牛膝黒牽牛陳皮續㫁赤芍藥右為末酒糊丸如梧桐子大毎服三十丸空心木𤓰煎湯吞下鹽湯亦可未效用羌活木𤓰浸酒或加牛膝温煖一盞許吞下大腹湯治脚氣痺攣寒摶筋脉不能轉側大腹子防已青橘皮紫蘓莖葉木通羌活萆薢地骨皮五加皮芎藭木香訶棃勒皮右搗篩毎服三錢水一盞入生薑半分拍破同煎至六分去滓食前温服日晩再服木𤓰牛藤丸治寒濕脚氣冷濕下注脚弱無力或腫急疼痛兼治婦人血風大固腎氣壮筋骨木𤓰川烏蓽薢茴香羌活青皮青鹽狗脊巴㦸海桐皮右為末入青鹽和勻将前二味搜和為丸硬再入酒杵数千下丸如梧子大毎服五十丸食前鹽酒湯任下术附湯治寒濕脚氣筋骨手足一切疼痛諸疾附子白术人參杜仲甘草官桂川薑當歸牛膝右為麄末毎服半兩水二盞煎至八分温熱服病在上者食後病在下者食前騙馬丹治寒濕脚氣四時疼痛補五臟壮筋骨補精髓駐顔色黑髪鬂健行歩宜常服葫蘆芭破骨皮金剛骨骨碎補甜𤓰子三十粒胡桃仁乳香沒藥自然銅右除自然銅另研外為末醋糊為丸如梧桐子大毎服三十丸温酒送下病上食後病下食前日進三服烏藥丸治筋血不足腰脚緩弱行歩艱辛一切寒濕脚氣並治之沒藥川烏頭山藥天麻牛膝虎骨肉蓯蓉右将木𤓰爛蒸研作糊和藥末如丸不就更用元浸牛膝酒糊搜杵一千或二千下丸如梧桐子大毎服五十丸温酒鹽湯下木香行氣散治脚氣風氣走注風寒濕氣及脚生細黄瘡一切濕瘡止痛去濕除風行氣黄茋桑白皮木通白术木香黒牽牛右剉為末毎一大錢初更時酒調服煎服或作丸子服亦可攢風散專治寒濕脚氣先用此發散麻黄甘草淮烏川蓽薢右㕮咀毎服四錢水一盞煎服不可多進五将丸治寒濕脚氣膝浮腫脚弱沉重不能舉仙靈皮牛膝生木𤓰蓽薢狗脊右除牛膝外四味用米醋浸逐旋入鍋内炒至醋盡為度焙乾為末再以醋同浸生牛膝酒打麵糊為丸如梧桐子大毎服三四十丸冷酒下食前服葳靈仙丸治寒冷脚氣葳靈仙木𤓰牽牛白膠香右為末薄荷糊為丸如梧桐子大毎服三十丸温酒鹽湯調下不拘時候芍藥甘草湯治寒熱脚氣腰疼體痛一方治脚弱無力行歩艱辛及胸膈痞滿氣不升降赤芍藥甘草右用水二升煎至一升日三服不拘時候一方為末白湯調服一名中岳湯一方毎服三錢水一盞半煎至一盞空心食前三服椒𤓰湯治脚氣寒證大生木𤓰真川椒右研二味為丸如梧桐子大毎服四十丸温酒下扶虚用核桃肉煎湯下木𤓰丸治脚氣受濕及脚發轉筋右用木𤓰一箇去皮瓤切下盖入平胃散在内蒸爛後研搗乾為丸如梧桐子大毎服三十丸温酒下或用鹽湯下亦可以此膏貼痛處尤大妙一方用生艾挼葉塞滿合盖竹針定蒸透去艾木𤓰皮研入五積散和丸服皂角膏治寒濕脚氣疼痛不可忍者右用皂角不拘多少炮去皮弦用好釅醋浸三五日後却将皂角洗醋濾去滓用砂礶熬成膏後入蔓荆子并草烏頭胡椒末入朴硝少許却将埋土内去火銷毒四十九日取出脚痛搽之治寒脚氣右用四物湯加小烏沉湯半貼加蓬术二塊如錢大外加木香一兩細剉生薑五片入藥再加甘草少許始用水煎服治患脚氣感受寒濕虚冷之氣右用五積散加木𤓰菖蒲牛膝乳香沒藥煎服甚妙可隨冝加减葫蘆芭丸治一切寒濕脚氣腿膝疼痛行歩無力葫蘆芭破故紙右為末用大木𤓰一枚切頂去穰置藥在内以滿為度復用頂盖之以竹針簽定蒸熟爛研同前未盡藥末和丸如梧桐子大毎服五十丸空心温酒下破故紙丸治寒脚氣疼痛不止破故紙葫蘆芭牛膝舶上茴香肉蓯蓉川續斷杜仲右用艾四兩去枝梗以大木𤓰四斤切作合子去穰净以艾實之用麻線扎定飯上蒸三次爛研和藥為丸如梧桐子大毎服五七十丸温酒鹽湯下一方無蓯蓉金山長老於張顯學甘露寺齊㑹上説此方云梁舅患脚氣曽於天台一僧處傳方用木𤓰蒸艾服之漸安後来住金山日日登歩脚酸重又合服之頗覺輕健勝前日云舒筋丸治寒在經絡腰脚腫疼痛行歩艱難當歸赤小豆地龍甜𤓰子烏藥木𤓰葳靈仙白膠香骨碎補芸薹烏頭海桐皮五靈脂右件為細末酒煮麵糊為丸如梧桐子大毎服十五丸至二十丸温酒鹽湯下日進二服空心食前服換腿丸治脚三隂經虚為風寒暑濕進襲攣痺緩弱上攻胸脇肩背下注脚膝疼痛漸成風濕脚氣行歩艱難足心如火上氣喘急全不進食石楠葉天南星石斛牛膝羌活薏苡仁防風蓽薢黄茋天麻當歸續㫁木𤓰梹榔右為末酒煑麵糊為丸如梧桐子大毎服五十丸空心温酒鹽湯任下有一士大夫舊有脚氣為苦且脾胃弱愚為去黄茋加紫蘓子蒼术川烏桑寄生烏藥杜仲作常服藥遂不發脚氣活絡湯治寒濕脚氣筋骨手足疼痛諸疾白术杜仲牛膝附子甘草人參官桂川薑當歸右件為細末毎服半兩水二鍾煎至八分去滓温熱服病在上者食後服病在下者食前服𫝊於鄂渚林總郎原禮同官数人服之皆效追毒湯治脾肝腎三經為風濕寒熱毒氣上攻隂陽不和四肢拘攣上氣喘急小便閉澁心熱煩悶遍身浮腫脚弱半夏黄耆甘草當歸人參厚朴獨活橘皮熟地黄芍藥枳殻麻黄桂心貝子右為剉散毎服四錢水一盞半薑七片棗三枚煎七分去滓空心温服日三夜一蠲痛乳香丸治寒濕脚氣足下隠痛行歩艱難筋骨疼痛常服使經絡䟽通脚氣不發乳香肉桂茴香川棟子肉青皮陳皮黒牽牛草烏梹榔木香右件為細末用無灰酒煮糊為丸如梧桐子大毎服四十丸温酒或鹽湯食前下芎藭散治寒濕脚氣腫滿疼痛行歩艱難或發或差延引嵗月此方神效川芎右一味為細末毎服二錢取生蘿蔔自然汁一盞用重湯暖温空心調服附子木𤓰丸治寒濕相搏筋骨疼痛行歩艱難夜多小便附子白术木𤓰牛膝五加皮蓽薢防風續斷羌活杜仲薏苡仁熟地黄右件為細末煑麵糊為丸如梧桐子大毎服三十丸空心温酒鹽湯任下蒼术丸治脚氣腰濕痛養腎水順氣踈風蒼术将破故紙同炒訖去故紙只用蒼术右為末醋糊為丸空心酒鹽湯任下年五十以上加沉香一兩木香二兩巴㦸二兩熨痛膏治寒濕客摶經絡四肢骨莭疼痛乾姜大麥右為細末毎服用一兩以童子小便半升同熬成膏稀稠得所趂熱用箆子攤上痛處紙盖以帛子包褁繋之焼新瓦片厚紙包熨藥上令乾透治脚氣及風寒濕痺四肢拘急疼不可踐地用紫蘓二兩杵碎水二升研取蘓子汁煮粳米二合葱䜴椒薑食之風脚門附論内經謂暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂寒暑風濕之氣皆本乎地或履之所以毒易中於足也病從脚起故謂之脚氣又况五臟流注脾與腎肝之經絡皆起足指故有風毒脚氣之病其證或見食嘔吐或腹痛下利或溲便不通或胸中驚悸不欲見明或語言錯妄或頭痛壮熱或身體冷痛轉筋脛腫􅍙痺縱緩其状不一治療不可緩也凡小覺病後漸異即須大怖畏加意急治之緩則氣上入腹或腫或不腫逆滿上氣肩息急者死不旋踵寛者数日必死不可不急治之但㸔心下急氣喘不停或自汗数出或乍寒乍熱其脉促短而数嘔吐不止者死故不可緩也風毒之人體中脉有三品内外証候相似但若脉浮大而緩冝服續命湯兩劑應差若風勝冝作越婢湯加白术四兩若脉浮大而𦂳急冝作竹瀝湯若病人脉微而弱冝服風引湯此脉多是因虚而得之若大虚氣短力乏可作補湯隨病冷熱而用之未愈更服竹瀝湯若病人脉浮大而𦂳駛此是三品之中最惡脉也或沉細而駛者此脉正與浮大而𦂳同是惡脉浮大病在外沉細病在内治亦不異消息當以意耳形容似可而手脚未活且至弱数日之中氣上即便命終如此之脉往往有人得之無一存者急服竹瀝湯勢當令人稍解半日之中不可缺此湯也竹瀝宜多服之若不及服熱輙停在心胷更為人患毎服當使極熱若服竹瀝湯至三劑病及脉勢未拆而苦脹滿可服驚甲湯若湯盡勢不得下可以丸藥助湯下下後更服竹瀝湯輙令脉勢拆氣息粗理便服三十二味八風散佳凡初得病便摩野葛膏日再頑痺脚弱若服竹瀝湯脉勢自拆一如未病時氣力運轉脚未遽能行俟體力充足然後漸漸行歩病重者差後半年始能扶而行耳既覺脉勢差但當勤服八風散如一脚未能輕舉由所治未必全得益更生諸惡失此治方也人有疑摩野葛膏服竹瀝湯恐傷腰脚者知此人無性智不可與醫故也竹瀝湯有三方輕者服前方重者服次方再重服後方風毒相注易病人冝服小金牙散并以少許塗鼻孔中問病困人及新亡人雖强健人亦将服之亦以塗耳鼻乃可臨近亡人及視疾者縫囊袋一寸半貯藥男左女右繋臂上此散服冝從少為治病人尤冝服赤小豆飲冬服側子金牙酒叙命湯治風毒病初得時内藏毒而脉浮緩乆不變此即不治数日而死或十数日而死若得病不即治或發黄或發斑或目赤或下部穿爛者此最急之證即先服叙命湯一劑服葛根麻黄湯下之若故不拆更與叙命湯三劑必差大凡脚氣入腹大便秘不通風毒温濕之氣在内方冝散通之不得其法毒擾臟腑邪毒無所出體成虚弱而病益加雖有叙命散大黄丸之劑應莫能愈必至於流連作變上奔絞痛嘔吐號啼治之唯急進三将軍丸最健若不恃此藥通行用别藥不得其當則立見毒勝痰逆悶絶喘息汗流昏塞搐搦咬齒坐視垂死而已杉節湯亦最妙凡脚氣初得腿弱冝速灸之并竹瀝湯灸訖可服更進八風散無不差者冝急速並用若人但灸而不服散或服散而不灸如此者半痊半死雖得差者或至一二年復更發動得依此法灸之及服散者治十十愈此病輕者一時雖不作惡治之不當根本不除歴乆至於殺人不可不深以為意凡灸八䖏第一風市穴可令病人正身平立垂兩臂直下舒十指掩住兩體便㸃當手中央頭髀大筋上是灸之百壮多少任人輕者不可减百壮重者乃至一處五百壮勿令頓艾三報灸之佳第二伏兎穴令病人累支端正以病人手足掩横膝上支卞傍與曲膝須齊上傍側支際當中央灸之亦可五十壮第三犢鼻穴在膝頸盖骨上際外骨邉平䖏以手案之得接解則是一云在膝頂下近外三骨箕踵中動脚以手按之得屈解是灸之五十壮可至百壮第四膝眼穴在膝頭骨下兩傍陷者腕中第五三里穴在膝頂骨節下一支附脛骨外是一云在膝頭骨莭下三寸長短大小當以病人手支度取穴百壮第六上亷穴在三里下一支一云附脛骨外是灸之百壮第七下亷穴在上亷下一支一云附脛骨外是灸之百壮第八絶骨穴在脚外踝上凡四寸是此諸穴灸不必一頓灸盡壮数可日日報灸之三日之中報令盡壮数為佳凡病一脚則灸一脚兩脚則灸兩脚凡脚弱病皆多兩脚又一方云如覺脚惡便灸三里及絶骨各一兩脚惡者合四處灸之多少隨病輕重大要雖輕不可减百壮不差速以次灸之多多益佳一説灸絶骨最要人有患此脚弱不即治及入腹腹重大上氣於是乃須大法灸雖諸輸及諸管闗節復皆盡灸之并服八風散徃徃得瘥者諸管輸節解法並在第二十九卷中覺病入腹若病人不堪痛不能盡作大灸但灸胸心腹諸穴及兩脚諸穴有得好瘥者凡量一支之法覆手并舒四肢對度四指上中節上横過為一支支有兩種有三指為一支者此脚弱灸以一指為四支也亦依支法存舊法梁丘犢鼻三里上亷下亷解谿大衝陽陵泉絶骨崑崙隂陵泉三隂交足太隂伏留然谷湧泉承山樂骨凡一十八穴舊法多灸百㑹風府五臟六腑輸募頃来灸者悉覺引氣向上所以不取其法氣不上者可用之耳妻偏已减恐不救者悉須灸之其足十指去指竒一分兩足凡八穴曹氏名曰八衝極下氣有效其足十趾端名曰氣端日灸三壮並大神效其八衝可日日灸七壮氣下即止病者非深相委悉慎勿為人灸之慎之慎之以八衝須小作艾炷也方白茯苓湯治風毒脚氣緩弱腰脊急痛臂膊酸疼心煩氣逆脇滿白茯苓石斛肉蓯蓉酸棗仁五味子天雄續斷澤瀉當歸人參白蒺棃羚羊角枳殻五加皮黄茋防風細辛獨活杜仲雲母粉兎絲子甘草熟地黄鹿角膠右為細末将雲母粉兎絲子揉拌勻再羅煉蜜為丸如梧桐子大毎日早晚食前各煎棗湯下二十丸追風毒散治脚氣多熱證䟽風毒羌活鷄心梹榔防風桑白皮郁李仁大黄右剉散毎服三錢黒豆一百粒煎服熱甚大便澁秘更加大黄黒豆飲治一切風寒毒氣腰脚疼痛黒豆㯽榔桑白皮生薑郁李仁右剉如麻豆毎服五錢水一盞半煎取一盞去滓温服不拘時候芍藥丸治風毒脚氣心胸煩悶多痰咳嗽膊臂疼大便澁芍藥木香枳殻梹榔大黄右為末煉蜜為丸如梧桐子大食後温水下三十五丸加至四十丸止滳乳膏治脚手節入風疼痛大蒜滳乳香沒藥白膠香明阿膠右件用好酒一二盞許煎熬使大蒜爛成膏為度次入沒藥酒乾再添用草烏尖二錢草桂二錢並為細末入前藥内一處煎熬和為膏畧候温熱傅上痛處外用皮紙貼下用粗紙揉軟醋淬火烘熱褁定良乆即痒病愈神效不可具述烏頭丸主脚氣皮肉身體諸風烏頭附子廣香梹榔右為末煉蜜為丸如梧子大毎服五丸忌猪肉生服或僅用附子烏頭二味丸如麻子大五丸温酒送下大腹散治風毒脚氣肢節煩疼心神壅悶大腹子紫蘓木通桑白皮羌活木𤓰荆芥赤芍藥青皮川獨活枳殻右㕮咀毎服四錢水一盞薑五片葱白七寸去滓空心温服紫蘓散治風毒脚氣遍身拘急刺痛大小便赤澁不思飲食嘔逆或寒或熱痰惡脚腫紫蘓木通桑白皮茴香羌活獨活荆芥木𤓰青皮甘草大腹子枳殻右㕮咀毎服三錢水一盞薑三片葱白一莖同煎飛歩丸治男子婦人風毒脚氣腫北防風北細辛木𤓰川烏草烏晩蠶沙大焮草蒼耳葉右為末醋糊為丸如梧桐子大空心鹽酒湯吞下三十丸甚效此藥宜久服之白楊皮酒治風毒脚氣手足拘攣右用白楊皮東南西北三尺者取一斤半勿令見風並去皮剉熬令黄赤以清酒一斗内不津器中漬之須宻封頭勿令泄氣冬月二十七日春夏一七日開出飲時量人酒性多少服之日五六服常令酒送下取力相敵取差為度楊皮白色者佳不要近塜墓者以此藥服之最妙鍾乳酒治虚勞風冷損脚疼痛羸痩拘攣弱不能行鍾乳丹參石斛杜仲芎藭當歸附子桂心天門冬牛膝防風黄耆秦艽乾薑山茱茰薏苡仁右㕮咀清酒二斗漬之三日初服三合日再後稍加之以知為度石膏湯治脚氣風毒熱氣上衝頭面赤筋急鼻塞去来時令人昏憤心胸恍惚或若驚悸身體戰慄手足緩縱或酸痺頭目眩重眼枯鼻乾辛熱氣出口中或患味甜諸惡不可名状者石膏龍膽升麻芍藥貝齒甘草鱉甲黄芩橘皮羚羊角當歸右㕮咀以水八升煮取三升分為三服芫花丸治臟虚風毒上攻下注脚氣等芫花巴豆白附子羌活陳皮破故紙牽牛子梹榔右搗羅為末醋煮麵糊為丸如梧桐子大毎食前空心服自五丸加至十丸丈夫艾鹽湯下婦人橘皮湯下麻黄湯治惡毒脚氣痺弱四肢不仁失音不能言毒氣衝心麻黄防風赤茯苓當歸升麻芎藭白术芍藥麥門冬黄芩桂甘草杏仁右麄搗篩毎服五錢水一盞酒半盞入大棗一枚擘破煎至一盞去滓温服日三夜一麻黄湯治風毒脚氣屈伸無力痿痺不仁麻黄防風桂當歸白梹榔黄芩犀角赤茯苓升麻右㕮咀毎服五錢水一盞半棗二枚擘開煎至一盞去滓空心温服不老地仙丹治腎臟風毒輕脚壮筋蓯蓉當歸虎骨牛膝赤小豆蒺䔧川椒川芎血竭萆薢白南星白附子何首烏黄耆防風杜仲羌活沒藥獨活木鱉子地龍茴香乳香右為末酒糊丸如梧桐子大毎服四十丸木𤓰陳皮湯下犀角飲子治解風毒入腰脚暴悶痛生犀角蜀升麻黄芩乾藍漢防己枳實漏蘆白歛梔子仁右以水八升煮二升三合絞去滓分三温服不問食前後忌海藻菘酢淋渫蒴藋湯治風毒脚氣腿膝痿痺赤腫行履不得皮骨如蟲行冝用淋渫茄楷蒴蘆蒺䔧子蒼耳栁木蠧末海桐皮柴胡茯苓皮水紅右剉碎毎用藥四兩水五椀煎取三椀去滓淋渫洗避風冷地仙丹専治風痺脚氣有乆患白癜風去牽牛加枳殻服之得效天仙子川椒木鱉子白膠香五靈脂黒牽牛黒豆赤土草烏當歸右為末同入白膠香木鱉子末用隔年好醋打糊杵千百下丸如梧桐子大毎服十二丸茶清下病甚者頻進酒亦可海桐皮丸治風毒流於脚膝行立不得海桐皮五加皮川獨活防風枳殻杜仲牛膝薏米生地黄右細剉綿褁以無灰酒二升春浸七日冬二七日夏三日毎服三二盃空腹服日三四度常令酒氣醺醮不絶重者不過兩劑又方海桐皮牛膝川芎羌活地骨皮甘草薏米生地黄右用酒浸如前法亦治腰膝痛有效又方治脚氣風氣右以端午日採蒼耳葉畧曬用好酒九蒸九曝細末之打飛羅麵為丸如梧桐子大毎服空心温酒或用木𤓰湯下六七十丸昔有人苦脚氣服此不惟病去且年逾九十行歩如飛治風脚氣右用童子小便兩大瓶用木𤓰皮四兩分在兩瓶内細煎小便百沸脚盆盛頓更替熏之以綿絮盖脚汗旋出即愈不時薫五六次神效木香丸治風毒氣攻手脚緩弱沉重虚腫疼痛木香沒藥附子烏藥蒺䔧子天南星切白附子磠砂木𤓰右先将磠砂研細入木𤓰内濕紙五七重褁煨熟爛研成膏次将餘八味搗羅為末以木𤓰和丸如梧桐子大毎服十丸空心冷酒下一方用川烏半兩炮去皮臍五柔丸治腎虚冷受風兼毒腫脚氣等大黄前胡半夏芍藥蓯蓉赤茯苓細辛葶藶當歸右為末煉蜜搜丸再入臼内搗三千杵丸如桐子大毎服五丸空心米飲下加至七丸以大便通利為度日三梹榔湯治風毒脚氣無力􅍙痺四肢不仁失音毒氣衝心梹榔防風桂當歸赤茯苓犀角屑麻黄右除麻黄外並搗篩毎服先取麻黄末二錢水一盞半煎至十餘沸掠去沫入藥末五錢用大棗三枚拍碎同煎至七分去滓空心温服近晩再服蘆根湯治風毒脚氣昏煩壮熱頭痛嘔吐口乾生蘆根赤茯苓葛根知母麥門冬淡竹葉甘草右為散毎服五錢水一盞半煎至八分去滓食後温服晩再服之效摩傅神明膏治風毒脚氣不仁及緩弱無力附子呉茱茰芎藭白芷蜀椒前胡白术桂當歸細辛防已右搗篩以新綿裹内净器以醋五升浸一宿用臘月猪膏一斗内鍋中煉去筋膜入前酢中與所浸藥以文武火三上三下候變色稀稠得所濾滓拌勻成膏甆器中盛宻封頭毎有患風痺不仁取一手摩之揩摩令入皮膚若多腫即去細辛以牛酥代猪膏亦佳茱茰散治風冷脚痺偏枯半身不遂晝夜呻吟醫所不治呉茱茰乾薑白歛牡荆附子天雄狗脊乾漆薯蕷秦艽防風右治下篩先食服方寸匙日三藥入肌膚滛滛然三日知一月痊附子湯治脚氣風多痿痺筋骨疼痛四肢不仁脚緩弱履地不得者此方治之附子麻黄細辛杏仁芎藭牛膝丹參防風獨活五加皮右剉如麻豆毎服五錢用水一盞半入生薑半分拍破同煎至一盞去滓温服空心日晡午時衣覆微令汗出􅌲羊丸出本草治風氣積滯成脚氣常覺微腫發作或痛茵羊炒薏苡仁各半兩郁李仁一兩牽牛子一兩半右為末煉蜜和丸如梧桐子大毎服二十丸五更薑棗湯下未利加至三十丸以快利為度白粥補之葫蘆丸出仁存方治風毒脚氣章般山曽留耕服之蒼耳五月五日採九蒸九曝取二兩净左纒藤取嫩葉乾秤二兩净葫蘆巴二兩以一兩同海金沙炒赤色去沙不用一兩同去殻巴豆十四粒炒巴豆赤色不用豆右為末醋糊為丸毎服四十九丸鹽湯吞下呉茱茰湯治風毒脚氣呉茱茰湯浸三度焙乾炒右搗篩毎服三錢水一盞半生薑半分拍破同煎至六分去滓食前服日晩再服紫雪方此方主療脚氣毒遍内外煩熱口中生瘡及狂易呌走並善解諸般草熱藥毒發邪熱卒黄等瘴疫毒㽲卒死瘟瘧五尸五注心腹諸疾絞刺切痛蟲毒鬼魅野道熱毒小兒驚瘋癲癎百病最神效方見積熱痼冷門諸熱類金芽散出聖濟總録治脚氣金芽研曽丹研凝礜石研泥褁焼半日丹砂研雄黄研朴硝研寒水石研代赭石研龍骨研犀角研獺肝炙鸛骨炙狸骨炙巴豆去心皮熬大黄野葛皮炙各三分牛黄另研麝香另入升麻桂心附子用生者去皮鬼臼鬼督郵黄環青木香鳶根有草名鳶尾此云鳶根即是鳶尾之根也牡蠣熬蘓合香研另入常山茯苓黄茋知母龍胆各三兩露蜂房玉支草一本作字鬼箭羽徐長卿石長生蜀漆當歸桔梗白薇各一兩蜈蚣二枚炙蜴蜥一枚炙芫青炙地胆炙亭長炙各三十九枚椒四十枚去目及閉口者右各搗為散以湯如桃李許和散三分半或束核服之常患者日再服卒患利吐者服四分匙若以絳袋褁方寸三匙帶之辟諸惡㽲忌食生冷蘆笋生䓤菜猪肉冷水酢物陳臭生血等物合藥用臘月王相日勿令穢汚風見之以蠟紙裹用二年此藥兼治冷熱虚實其功卒不可盡述矣石楠丸出和濟方治風毒脚弱少力脚重生瘡脚下隠痛不能踏地脚膝筋攣不能屈伸項背腰脊拘急不快風毒上攻頭面浮腫或生細瘡出黄赤汁或手臂少力或口舌生瘡牙齗赤爛齒揺髮落耳蟬聲頭眩氣促心腹脹悶小便時澁大便或難服之補益原氣令人筋骨壮健耳目聰明婦人血氣亦可服之不拘時候赤芍藥五加皮三兩萆薢四兩當歸麻黄去根莭陳皮赤小豆各三兩獨活去蘆四兩薏苡仁牽牛炒石楠葉各三兩木𤓰四兩杏仁去皮尖雙仁炒赤二兩大腹皮川芎杜仲剉炒各二兩牛膝去苖二兩右為末以酒浸蒸餅丸如梧桐子大毎服十丸至十五丸二十丸木𤓰湯下早起日中臨卧各一服偏風腫滿服之亦效一方有川椒續斷虎骨酒出本事方治去風補血益氣壮筋骨强脚力虎脛骨真者萆薢山靈脾薏苡仁牛膝熟地黄右細剉絹袋盛浸酒二斗飲了一盞入一盞可得百日婦人去牛膝治一切熱毒氣及風毒脚氣出本草右用大豆和甘草煮湯飲之橘皮丸治一切風毒脚氣喫食不下橘皮一斤以童子小便浸一日次用炭火半秤焼地令赤以酒一升洒於熱土将橘皮舖在地上着盆合一宿時朴硝一斤漿水二升煎令水盡用白茯苓去黒皮四兩右為細末煉蜜為丸如梧桐子大毎服三十丸食後温水下空心米飲下亦可以利為度利多减服治風毒脚氣脛腫捻之則䧟出肘後方右用牽牛子為末蜜丸小豆大毎服五丸薑湯下用利小便即愈亦可用核吞之其子黒色正似桃子核之形市人亦賣之木𤓰丸出海上方治脚氣去風木𤓰一箇小叙命湯去附子為末一兩右以木𤓰去皮穰切下盖入叙命湯末在内蒸爛研搗乾為丸如梧桐子大毎服三四十丸蘓木煎湯温下亦可作膏傅貼痛處尤好一方用川椒末二錢桑枝方出十便良方本方云桑枝性平不冷不熱可以常服療遍體風痒乾燥脚氣風氣四肢拘攣上氣眼暈肺氣咳嗽消食利小便久服輕身明目令人光澤兼療口乾仙經云一切仙藥不得桑煎不服出抱朴子右用桑枝細切一小升熬令香以三大升煎取汁二大升一日服盡無問食前後治脚氣風痺不仁五緩筋急右用熊肉半斤於䜴汁中和薑椒葱白鹽醬作腌酢於空腹食之治風脚弱右用龜殻炙之為末酒調服地龍丸出朱氏集騐方治風脚痛不可忍川棟子肉一兩用巴豆炒不用巴豆全蝎二錢好麵一兩破故紙三錢用斑猫炒不用斑猫茴香二錢半用海金沙一錢炒不用海金沙葫蘆芭二錢半自然銅半兩醋煅净水蛭兩條麝香炒敗龜半兩石薜荔半兩用醋浸一時焙無名異四錢炒梹榔二錢不見火天竺黄半兩紅麯半兩瓦上焼穿山甲四錢炒地龍三錢去土炒古錢十二箇用砂鍋子盛爐内煆成汁醋浸右為細末将乳香一錢沒藥三錢麝香一錢辰砂半兩為衣醋煮麵糊為丸如梧桐子大温酒送下驅風丹出澹寮方治風氣脚逺年近日疼痛腫滿時或發動或患癧癤白虎及筋脉拘攣等證川烏一兩不去皮尖大者破作四邉小者破作兩邉却剉如骰子大用麻油煎令黄色去油焙乾赤小豆一兩擇去菉黄豆草烏四兩鷄用者不去皮臍破作兩邉擇去心中黒者祗取心内白者剉如骰子大以二兩油製如川烏法再同鹽一兩拌和水微淹煑浸三日一夜一度漉轉候日数足取出再用鹽一兩同炒黄色去鹽勿令燋本用滷汁浸三日夜去滷汁炒恐滷汁不常有故以鹽水代之地龍四兩著隂潤處少時用綿紗裹定輕輕羅篩去土取肉不用更秤鷄心梹榔二兩剉焙右為細末用黄酒一大椀好頭麵五錢重煮糊為丸梧子大毎服三十丸空心麝香冷鹽湯下如熱酒食之類俱未可便食庻不大麻木如初服未可多服丸數而後不大麻木可畧増也忌香菜茵陳荳豉及一切動風物橘皮丸出十便良方治脚氣有風人氣不順致生熱而大便秘此藥用不損人進飲食散脹滿調中下氣偏冝脚氣黄橘皮四兩乾生薑一兩右為細末以蜜半斤同熬成膏丸如梧桐子大毎服三十丸生薑湯下食前治風毒脚氣吐宻方出海南四時攝生論方延胡索一兩炮蓬莪茂一兩半蚌粉四兩醋炒右為散炒黒豆令香熱水煎三五沸入薑少許更煎一兩沸取汁調一錢服之治元臟風毒脚氣心腹脹滿方出海南四時攝生論方附子炮京芎當歸桂心木香梹榔陳橘皮蘿蔔子右等分為散内蘿蔔子取仁别研相和更與諸藥再研令匀空心酒調下四生丸出海南四時攝生論方治脚膝骨節毒風行履不得川狼牙黒附子海桐皮天南星右等分生用為末頭醋煮糊為丸菉豆大毎服十丸鹽湯或酒下赤小豆丸出朱氏集驗方赤小豆半生半炒香附半生用半酒炒晩蠶沙半生半炒草烏頭半生半麻油炒右等分加陳倉米三合半生半炒為末酒糊為丸梧桐子大毎服十丸空心茶酒任下乳香應痛丸出朱氏集驗方治脚氣風損神效川烏生用不去皮草烏生用不去皮紅花剉焙當歸酒浸天台烏藥剉焙乾葛剉焙白芍藥洗剉焙蘓木剉生乾地黄洗剉骨碎補燎去毛鷄骨降真香剉金毛狗燎去毛自然銅入銀鍋内炭盖口化為度乳香杵碎用香爐盛火簳篛葉一片虚架在香爐口上約去火二尺許次将乳香置篛葉上候炙鎔瀼用水潤濕小竹箆子炒撥覺瀼定取出候冷研沒藥杵碎酒浸右各一兩為細末用好白酒濃滓一盌好頭麵半兩煮糊丸如梧桐子大毎服三十丸空心温鹽酒下禁忌如前凡脚氣發作先服驅風丹大痛稍愈即間服藥候痛全愈專服此藥必如常嵗毎嵗則痛一月今年服下一料只痛半月二十日明年已發再服一料止痛十数日又明年再服一料則終身不復作矣但脚氣年深背駝腰曲手足攣拳者服前項二藥雖未能卒去病根然亦能免大腫痛此藥不特專治脚氣但是風損皆可服之以上二藥常用微火烘焙恐發潤故也如白虎􅊓癤之類皆可服五生丸出衞生家寶方治脚氣及風氣攻四肢金毛狗脊去毛川烏防風川萆薢蓬莪茂已上各一兩日晒乾右件碾為細末用法醋糊為丸如梧桐子大鹽湯酒空心下治脚氣中虚風出本草右以羊皮去毛作臛食之治風血脚氣疼痛痺踠損痰血痛不可忍出本草右取扶杉木白皮火炙酒浸服之理風消脚氣出本草右以苦竹笋蒸煮食之治脚氣風氣出本草右取鯉魚作鱠與食之效治風毒脚氣及乆積冷腸痔下血出本草右用杜仲葉嫩時採食之亦冝乾末作湯服普濟方卷二百四十一
