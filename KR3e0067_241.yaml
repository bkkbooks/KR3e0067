body:
  text: 普濟方卷二百四十一明周王朱橚撰腳氣門一切腳氣附論夫太陽經腳氣病者頭痛目脫項強腰脊連體樞循髀外出外踝之後循京骨至小指外側皆痛者乃足太陽膀胱經為風寒暑濕流注自汗者為風勝無汗疼痛為寒勝熱頑為暑勝重著腫滿為濕勝諸經皆當如此推究太陽經隨四氣發散愈此太陽經腳氣治法方麻黃左經湯治風寒暑濕流注足太陽經手足攣痺行步艱難增寒發熱無汗惡寒或自汗惡風頭痛暈眩腰重關莭痛麻黃乾葛細辛白术防已桂心羌活防風甘草茯苓各等分右㕮咀每服四錢水二盞薑三片棗一枚煎至七分去滓空心服自汗去麻黃加桂芍藥重者加橘皮無汗減桂加杏仁澤㵼所加並等分少陽經腳氣證病者口苦善太息脅痛面垢體無膏澤頭頷目鋭眥痛缺盆并腋下馬刀腫自汗振寒發熱胸中脅肋髀膝外至脛絶骨外踝及諸莭指皆痛者乃是少陽膽經為風寒暑濕流注之所為四氣偏勝例如前説治之冝隨四氣和解少陽經腳氣治法微别於太陽治方貴恭之半夏左經湯治足少陽經為風寒暑濕流注發熱腰脅痛頭疼眩暈嘔吐自汗耳聾驚悸熱悶心煩上氣喘滿肩膝腿痺縱緩不隨半夏湯浸去滑乾葛細辛白术茯苓桂心不見火防風乾薑黃芩小草甘草炙柴胡麥門冬去心各二兩右銼散每服四錢水一盞半薑三片棗二枚煎七分去滓空心服熱悶加竹瀝喘滿加杏仁桑白皮大黃左經湯治風寒暑濕流注足經使腰腳痺痛行步艱難涎潮昏塞大小便祕澀腹痛嘔吐或復下利惡聞食氣喘滿肩聳或自汗譫語妄言大黃細辛茯苓防風羌活黃芩前胡枳殼厚朴甘草杏仁右銼散每服四錢水一盞半薑三片棗二枚煎七分去滓空心熱服腹痛加芍藥祕結加阿膠喘加桑白皮紫蘇小便祕加澤瀉四肢瘡癬浸淫加升麻所加並等分三陽并合腳氣證病者增寒壯熱自汗惡風或無汗惡寒眩暈重者關莭掣動手足拘攣疼痛冷痺緩縱不隨心燥上氣嘔吐下利皆三陽經中風暑濕其脈浮弦緊數大料神祕左經湯治風寒暑濕流注足三陽經手足拘攣疼痛行步艱難增寒發熱自汗惡風頭眩腰重關莭掣痛或卒中昏塞小便祕澀或腹痛嘔吐下利惡聞食臭髀腿頑痺緩縱不隨熱悶驚悸心煩上氣臍下冷痺喘滿肩息麻黃乾葛細辛厚朴茯苓桂心防已枳殼羌活防風柴胡黃岑小草白薑半夏甘草麥門冬去心各等分右銼散每服四錢水一盞半生薑三片棗三枚煎至七分去滓空心服有汗加牡蠣白术去麻黃腫滿加澤㵼木通熱甚無汗減桂加橘皮前胡升麻腹痛吐利去黃岑加芍藥附子炮大便祕加大黃竹瀝喘滿加杏仁桑白皮紫蘇所加并各等分凡有此病詳認證狀逐一加減無不愈者常服下氣消痰散風濕腿腫退飲食令人不虛加減敗毒散治三陽經腳氣流注腳踝上焮熱腫寒熱如瘧自汗惡風或無汗惡寒羌活獨活前胡柴胡枳殼桔梗甘草人參茯苓川芎大黃蒼术米泔浸各等分右銼散每服四錢水一鍾半薑三片薄荷二錢煎七分去滓熱服不過二服愈皮膚瘙癢赤疹加蟬蛻煎太隂經腳氣證病者腹滿挾咽連舌系急痛胸膈痞滿循脛骨上膝股內前亷內踝過核骨後連足大指之端內側皆痛者乃足太隂脾經為四氣流注之所為也四氣偏勝並如前説治之各隨其氣所中輕重溫散之六物附子湯治四氣流注於足太隂經骨莭煩疼四肢拘急自汗短氣小便不利惡風怯寒頭面手足時時浮腫附子桂心各四兩白术三兩甘草炙三兩防已四兩茯苓三兩右銼散每服四錢水二盞薑七片煎七分去滓溫服少隂經腳氣證病者腰脊痛小指之下連足心循脛骨內踝入跟中上腨內出膕內亷股內皆痛上衝胸咽飢不能食面黑小便淋閉咳吐不已善恐心惕惕若人將捕之狀小腹不仁者難治此足少隂腎經宜溫散之八味丸治少隂腎經腳氣入腹不仁上氣喘急嘔吐自汗此證最以腎乘心水克火死不旋踵及小腹不仁者速治之牡丹皮澤㵼茯苓各三兩附子桂心各二兩山茱茰各四兩山藥四兩熟地黃八兩右為末煉蜜丸如梧子大每服五十丸溫酒米湯食前送下厥隂經腳氣證病者腰脅偏疼從足大指連足跗上亷上膕內亷循股內隂器抵小腹夾臍諸處脹痛兩腳攣急嗌乾嘔逆飱泄者足厥隂經為四氣流注之所為也四氣偏勝並如前説各隨其氣所中輕重調理之神應養直丹治厥隂肝經為四氣所流注左癱右瘓涎潮昏塞半身不遂手足頑麻語言謇澀頭眩目昏牙關緊急氣喘自汗心神恍惚肢體緩弱上攻頭目下注腳膝縈氣凝津遍身疼痛兼治婦人産後中風角弓反張墮車落馬打撲傷損瘀血在內當歸天麻川芎羌活白芍藥熟地黃各等分右為末蜜丸如雞子大每服一丸木瓜兔絲子浸酒下腳痺薏苡仁浸酒下中風溫酒米湯下乳香宣經丸治體虛風溫寒濕四氣相搏半身不遂手足頑麻骨莭煩疼足脛浮腫惡寒發熱漸成腳氣肝腎不足四肢攣急遍身攻注或閃打撲跌內傷筋骨及風邪內摶男子疝氣婦人經脈不調常服活血止痛補虛壯筋骨葳靈仙烏藥茴香川棟子牽牛橘皮蓽薢防風各三兩五靈脂乳香各半兩草烏右為末酒糊丸如梧桐子大每服五十丸鹽酒任下婦人醋湯下食前服四蒸木瓜丸出危氏方治肝腎脾三經氣虛為風寒溫濕搏著流注經絡竭日曠嵗治療不痊凡遇六化更變七情不寧至發動或腫或頑痺及增寒壯熱嘔吐自汗葳靈仙黃茋蒼术烏藥右各半兩以大木瓜四箇切蓋去穰入前件藥仍用蓋簽定酒蒸熟三蒸三曬取藥出焙乾為末研瓜為膏搜和丸如梧桐子大每服五十丸空心溫酒鹽湯任下川膝煎方出危氏方治肝腎虛為風寒濕毒所中流注腿膝歷莭疼痛如錐刀煆刺不可名狀牛膝二兩烏頭十箇右不要見銅鐡器及火與日木臼搗碎牛膝再入石磨中磨為末酒糊為丸如梧子大每服四十丸用無灰酒一瓶中樣木瓜一箇切作片入瓶中煨木瓜爛為度用此酒下不拘時候然肝氣惡鐡忌則有之不見火日此好事者妄忌且如烏頭牛膝採時豈一向隂乾也蒼术散治一切風寒暑濕令足膝痛或赤腫腳骨莭間作熱痛雖一點能令步履艱難膝腿臂髀大骨疼痛令人痿躄一切腳氣百用百效蒼术黃蘖各四兩右銼散每服四錢水一盞煎七分溫服日進三四服勝駿丸出醫方集成治元氣不足真氣虛弱及諸寒濕氣進襲手足拳攣腳指連腳面拘急走注疼痛筋脈不伸行步不隨常服益真氣壯筋骨黑髭鬚滑皮膚一切足弱鶴膝諸風並能治之附子一枚當歸天麻牛膝酸棗仁熟地黃防風各三兩木瓜乳香各半兩射香一分全蝎木香沒藥羌活甘草炙各一兩右為細末用生地黃三斤洗淨搗爛如泥入無灰酒四升煮爛如膏以前藥和勻杵令堅每兩作十丸每服一丸細嚼臨睡酒下地黃膏春夏極多入冬或無地黃只煉蜜為丸如梧桐子大每服五十丸鹽湯溫酒下後加減法檳榔蓽薢蓯蓉破故紙巴戟右各一兩內熟地黃當歸各減一兩尤妙如服此藥五七日或半月見效甚速行步如飛乃名勝駿側子酒治腳氣雖瘥至冬季間常須服此方側子乾薑石斛丹參牛膝甘草防風熟地黃芎藭當歸桂心五味子白术秦芁防已椒獨活山茱茰細辛黃芩茯苓附子右㕮咀絹袋貯以酒三斗五升浸秋冬七日春夏五日一服四合日二細細加之以知為度得食羊鹿麞肉亦得食雞肉忌海菜菘菜豬肉冷水桃李雀肉生蔥生菜蕪荑酢物導氣飲治寒熱腳氣赤腫疼痛心腹膨脹頭面手足浮腫身體腰背疼痛並治之羌活獨活木瓜薏米青皮陳皮桑白皮大腹皮枳殼檳榔青木香紫蘇甘草大腹子赤茯苓木通右各等分㕮咀每服四錢水一盞半煎至七分去滓食前服熱者加大黃濕者加蒼术木瓜牛膝丸治寒濕腳氣冷濕下注腳弱無力及腎經虛弱腰膝沉重腿腳腫急筋脈拘攣或時疼痛步履艱難或更下利日見倦困木瓜肉蓯蓉石楠根當歸烏藥熟地黃杏仁川牛膝黑牽牛陳皮續斷赤芍藥右為末酒糊丸如梧桐子大每服三十丸空心木瓜煎湯吞下鹽湯亦可未效用羌活木瓜浸酒或加牛膝溫暖一盞許吞下大腹湯治腳氣痺攣寒摶筋脈不能轉側大腹子防已青橘皮紫蘇莖葉木通羌活萆薢地骨皮五加皮芎藭木香訶梨勒皮右搗篩每服三錢水一盞入生薑半分拍破同煎至六分去滓食前溫服日晚再服木瓜牛藤丸治寒濕腳氣冷濕下注腳弱無力或腫急疼痛兼治婦人血風大固腎氣壯筋骨木瓜川烏蓽薢茴香羌活青皮青鹽狗脊巴戟海桐皮右為末入青鹽和勻將前二味搜和為丸硬再入酒杵數千下丸如梧子大每服五十丸食前鹽酒湯任下术附湯治寒濕腳氣筋骨手足一切疼痛諸疾附子白术人參杜仲甘草官桂川薑當歸牛膝右為粗末每服半兩水二盞煎至八分溫熱服病在上者食後病在下者食前騙馬丹治寒濕腳氣四時疼痛補五臟壯筋骨補精髓駐顔色黑髮鬢健行步宜常服葫蘆芭破骨皮金剛骨骨碎補甜瓜子三十粒胡桃仁乳香沒藥自然銅右除自然銅另研外為末醋糊為丸如梧桐子大每服三十丸溫酒送下病上食後病下食前日進三服烏藥丸治筋血不足腰腳緩弱行步艱辛一切寒濕腳氣並治之沒藥川烏頭山藥天麻牛膝虎骨肉蓯蓉右將木瓜爛蒸研作糊和藥末如丸不就更用元浸牛膝酒糊搜杵一千或二千下丸如梧桐子大每服五十丸溫酒鹽湯下木香行氣散治腳氣風氣走注風寒濕氣及腳生細黃瘡一切濕瘡止痛去濕除風行氣黃茋桑白皮木通白术木香黑牽牛右銼為末每一大錢初更時酒調服煎服或作丸子服亦可攢風散專治寒濕腳氣先用此發散麻黃甘草淮烏川蓽薢右㕮咀每服四錢水一盞煎服不可多進五將丸治寒濕腳氣膝浮腫腳弱沉重不能舉仙靈皮牛膝生木瓜蓽薢狗脊右除牛膝外四味用米醋浸逐旋入鍋內炒至醋盡為度焙乾為末再以醋同浸生牛膝酒打麵糊為丸如梧桐子大每服三四十丸冷酒下食前服葳靈仙丸治寒冷腳氣葳靈仙木瓜牽牛白膠香右為末薄荷糊為丸如梧桐子大每服三十丸溫酒鹽湯調下不拘時候芍藥甘草湯治寒熱腳氣腰疼體痛一方治腳弱無力行步艱辛及胸膈痞滿氣不升降赤芍藥甘草右用水二升煎至一升日三服不拘時候一方為末白湯調服一名中嶽湯一方每服三錢水一盞半煎至一盞空心食前三服椒瓜湯治腳氣寒證大生木瓜真川椒右研二味為丸如梧桐子大每服四十丸溫酒下扶虛用核桃肉煎湯下木瓜丸治腳氣受濕及腳發轉筋右用木瓜一箇去皮瓤切下蓋入平胃散在內蒸爛後研搗乾為丸如梧桐子大每服三十丸溫酒下或用鹽湯下亦可以此膏貼痛處尤大妙一方用生艾挼葉塞滿合蓋竹針定蒸透去艾木瓜皮研入五積散和丸服皂角膏治寒濕腳氣疼痛不可忍者右用皂角不拘多少炮去皮弦用好釅醋浸三五日後却將皂角洗醋濾去滓用砂罐熬成膏後入蔓荆子并草烏頭胡椒末入朴硝少許却將埋土內去火銷毒四十九日取出腳痛搽之治寒腳氣右用四物湯加小烏沉湯半貼加蓬术二塊如錢大外加木香一兩細銼生薑五片入藥再加甘草少許始用水煎服治患腳氣感受寒濕虛冷之氣右用五積散加木瓜菖蒲牛膝乳香沒藥煎服甚妙可隨冝加減葫蘆芭丸治一切寒濕腳氣腿膝疼痛行步無力葫蘆芭破故紙右為末用大木瓜一枚切頂去穰置藥在內以滿為度復用頂蓋之以竹針簽定蒸熟爛研同前未盡藥末和丸如梧桐子大每服五十丸空心溫酒下破故紙丸治寒腳氣疼痛不止破故紙葫蘆芭牛膝舶上茴香肉蓯蓉川續斷杜仲右用艾四兩去枝梗以大木瓜四斤切作合子去穰淨以艾實之用麻線扎定飯上蒸三次爛研和藥為丸如梧桐子大每服五七十丸溫酒鹽湯下一方無蓯蓉金山長老於張顯學甘露寺齊會上説此方云梁舅患腳氣曽於天台一僧處傳方用木瓜蒸艾服之漸安後來住金山日日登步腳酸重又合服之頗覺輕健勝前日云舒筋丸治寒在經絡腰腳腫疼痛行步艱難當歸赤小豆地龍甜瓜子烏藥木瓜葳靈仙白膠香骨碎補藝薹烏頭海桐皮五靈脂右件為細末酒煮麵糊為丸如梧桐子大每服十五丸至二十丸溫酒鹽湯下日進二服空心食前服換腿丸治腳三隂經虛為風寒暑濕進襲攣痺緩弱上攻胸脅肩背下注腳膝疼痛漸成風濕腳氣行步艱難足心如火上氣喘急全不進食石楠葉天南星石斛牛膝羌活薏苡仁防風蓽薢黃茋天麻當歸續斷木瓜檳榔右為末酒煮麵糊為丸如梧桐子大每服五十丸空心溫酒鹽湯任下有一士大夫舊有腳氣為苦且脾胃弱愚為去黃茋加紫蘇子蒼术川烏桑寄生烏藥杜仲作常服藥遂不發腳氣活絡湯治寒濕腳氣筋骨手足疼痛諸疾白术杜仲牛膝附子甘草人參官桂川薑當歸右件為細末每服半兩水二鍾煎至八分去滓溫熱服病在上者食後服病在下者食前服傳於鄂渚林總郎原禮同官數人服之皆效追毒湯治脾肝腎三經為風濕寒熱毒氣上攻隂陽不和四肢拘攣上氣喘急小便閉澀心熱煩悶遍身浮腫腳弱半夏黃耆甘草當歸人參厚朴獨活橘皮熟地黃芍藥枳殼麻黃桂心貝子右為銼散每服四錢水一盞半薑七片棗三枚煎七分去滓空心溫服日三夜一蠲痛乳香丸治寒濕腳氣足下隱痛行步艱難筋骨疼痛常服使經絡疏通腳氣不發乳香肉桂茴香川棟子肉青皮陳皮黑牽牛草烏檳榔木香右件為細末用無灰酒煮糊為丸如梧桐子大每服四十丸溫酒或鹽湯食前下芎藭散治寒濕腳氣腫滿疼痛行步艱難或發或差延引嵗月此方神效川芎右一味為細末每服二錢取生蘿蔔自然汁一盞用重湯暖溫空心調服附子木瓜丸治寒濕相搏筋骨疼痛行步艱難夜多小便附子白术木瓜牛膝五加皮蓽薢防風續斷羌活杜仲薏苡仁熟地黃右件為細末煮麵糊為丸如梧桐子大每服三十丸空心溫酒鹽湯任下蒼术丸治腳氣腰濕痛養腎水順氣踈風蒼术將破故紙同炒訖去故紙只用蒼术右為末醋糊為丸空心酒鹽湯任下年五十以上加沉香一兩木香二兩巴戟二兩尉痛膏治寒濕客摶經絡四肢骨莭疼痛乾薑大麥右為細末每服用一兩以童子小便半升同熬成膏稀稠得所趂熱用箆子攤上痛處紙蓋以帛子包褁繫之燒新瓦片厚紙包尉藥上令乾透治腳氣及風寒濕痺四肢拘急疼不可踐地用紫蘇二兩杵碎水二升研取蘇子汁煮粳米二合蔥䜴椒薑食之風腳門附論內經謂暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂寒暑風濕之氣皆本乎地或履之所以毒易中於足也病從腳起故謂之腳氣又况五臟流注脾與腎肝之經絡皆起足指故有風毒腳氣之病其證或見食嘔吐或腹痛下利或溲便不通或胸中驚悸不欲見明或語言錯妄或頭痛壯熱或身體冷痛轉筋脛腫􅍙痺縱緩其狀不一治療不可緩也凡小覺病後漸異即須大怖畏加意急治之緩則氣上入腹或腫或不腫逆滿上氣肩息急者死不旋踵寬者數日必死不可不急治之但看心下急氣喘不停或自汗數出或乍寒乍熱其脈促短而數嘔吐不止者死故不可緩也風毒之人體中脈有三品內外證候相似但若脈浮大而緩冝服續命湯兩劑應差若風勝冝作越婢湯加白术四兩若脈浮大而緊急冝作竹瀝湯若病人脈微而弱冝服風引湯此脈多是因虛而得之若大虛氣短力乏可作補湯隨病冷熱而用之未愈更服竹瀝湯若病人脈浮大而緊駛此是三品之中最惡脈也或沉細而駛者此脈正與浮大而緊同是惡脈浮大病在外沉細病在內治亦不異消息當以意耳形容似可而手腳未活且至弱數日之中氣上即便命終如此之脈往往有人得之無一存者急服竹瀝湯勢當令人稍解半日之中不可缺此湯也竹瀝宜多服之若不及服熱輒停在心胸更為人患每服當使極熱若服竹瀝湯至三劑病及脈勢未拆而苦脹滿可服驚甲湯若湯盡勢不得下可以丸藥助湯下下後更服竹瀝湯輒令脈勢拆氣息粗理便服三十二味八風散佳凡初得病便摩野葛膏日再頑痺腳弱若服竹瀝湯脈勢自拆一如未病時氣力運轉腳未遽能行俟體力充足然後漸漸行步病重者差後半年始能扶而行耳既覺脈勢差但當勤服八風散如一腳未能輕舉由所治未必全得益更生諸惡失此治方也人有疑摩野葛膏服竹瀝湯恐傷腰腳者知此人無性智不可與醫故也竹瀝湯有三方輕者服前方重者服次方再重服後方風毒相注易病人冝服小金牙散并以少許塗鼻孔中問病困人及新亡人雖強健人亦將服之亦以塗耳鼻乃可臨近亡人及視疾者縫囊袋一寸半貯藥男左女右繫臂上此散服冝從少為治病人尤冝服赤小豆飲冬服側子金牙酒敘命湯治風毒病初得時內藏毒而脈浮緩久不變此即不治數日而死或十數日而死若得病不即治或發黃或發斑或目赤或下部穿爛者此最急之證即先服敘命湯一劑服葛根麻黃湯下之若故不拆更與敘命湯三劑必差大凡腳氣入腹大便祕不通風毒溫濕之氣在內方冝散通之不得其法毒擾臟腑邪毒無所出體成虛弱而病益加雖有敘命散大黃丸之劑應莫能愈必至於流連作變上奔絞痛嘔吐號啼治之唯急進三將軍丸最健若不恃此藥通行用别藥不得其當則立見毒勝痰逆悶絶喘息汗流昏塞搐搦咬齒坐視垂死而已杉節湯亦最妙凡腳氣初得腿弱冝速灸之并竹瀝湯灸訖可服更進八風散無不差者冝急速並用若人但灸而不服散或服散而不灸如此者半痊半死雖得差者或至一二年復更發動得依此法灸之及服散者治十十愈此病輕者一時雖不作惡治之不當根本不除歷久至於殺人不可不深以為意凡灸八處第一風市穴可令病人正身平立垂兩臂直下舒十指掩住兩體便點當手中央頭髀大筋上是灸之百壯多少任人輕者不可減百壯重者乃至一處五百壯勿令頓艾三報灸之佳第二伏兔穴令病人纍支端正以病人手足掩橫膝上支卞傍與曲膝須齊上傍側支際當中央灸之亦可五十壯第三犢鼻穴在膝頸蓋骨上際外骨邉平處以手案之得接解則是一云在膝頂下近外三骨箕踵中動腳以手按之得屈解是灸之五十壯可至百壯第四膝眼穴在膝頭骨下兩傍陷者腕中第五三里穴在膝頂骨節下一支附脛骨外是一云在膝頭骨莭下三寸長短大小當以病人手支度取穴百壯第六上亷穴在三里下一支一云附脛骨外是灸之百壯第七下亷穴在上亷下一支一云附脛骨外是灸之百壯第八絶骨穴在腳外踝上凡四寸是此諸穴灸不必一頓灸盡壯數可日日報灸之三日之中報令盡壯數為佳凡病一腳則灸一腳兩腳則灸兩腳凡腳弱病皆多兩腳又一方云如覺腳惡便灸三里及絶骨各一兩腳惡者合四處灸之多少隨病輕重大要雖輕不可減百壯不差速以次灸之多多益佳一説灸絶骨最要人有患此腳弱不即治及入腹腹重大上氣於是乃須大法灸雖諸輸及諸管關節復皆盡灸之并服八風散往往得瘥者諸管輸節解法並在第二十九卷中覺病入腹若病人不堪痛不能盡作大灸但灸胸心腹諸穴及兩腳諸穴有得好瘥者凡量一支之法覆手并舒四肢對度四指上中節上橫過為一支支有兩種有三指為一支者此腳弱灸以一指為四支也亦依支法存舊法梁丘犢鼻三里上亷下亷解溪大衝陽陵泉絶骨崑崙隂陵泉三隂交足太隂伏留然谷湧泉承山樂骨凡一十八穴舊法多灸百會風府五臟六腑輸募頃來灸者悉覺引氣向上所以不取其法氣不上者可用之耳妻偏已減恐不救者悉須灸之其足十指去指竒一分兩足凡八穴曹氏名曰八衝極下氣有效其足十趾端名曰氣端日灸三壯並大神效其八衝可日日灸七壯氣下即止病者非深相委悉慎勿為人灸之慎之慎之以八衝須小作艾炷也方白茯苓湯治風毒腳氣緩弱腰脊急痛臂膊酸疼心煩氣逆脅滿白茯苓石斛肉蓯蓉酸棗仁五味子天雄續斷澤瀉當歸人參白蒺梨羚羊角枳殼五加皮黃茋防風細辛獨活杜仲雲母粉兔絲子甘草熟地黃鹿角膠右為細末將雲母粉兔絲子揉拌勻再羅煉蜜為丸如梧桐子大每日早晚食前各煎棗湯下二十丸追風毒散治腳氣多熱證疏風毒羌活雞心檳榔防風桑白皮郁李仁大黃右銼散每服三錢黑豆一百粒煎服熱甚大便澀祕更加大黃黑豆飲治一切風寒毒氣腰腳疼痛黑豆檳榔桑白皮生薑郁李仁右銼如麻豆每服五錢水一盞半煎取一盞去滓溫服不拘時候芍藥丸治風毒腳氣心胸煩悶多痰咳嗽膊臂疼大便澀芍藥木香枳殼檳榔大黃右為末煉蜜為丸如梧桐子大食後溫水下三十五丸加至四十丸止滳乳膏治腳手節入風疼痛大蒜滳乳香沒藥白膠香明阿膠右件用好酒一二盞許煎熬使大蒜爛成膏為度次入沒藥酒乾再添用草烏尖二錢草桂二錢並為細末入前藥內一處煎熬和為膏略候溫熱傅上痛處外用皮紙貼下用粗紙揉軟醋淬火烘熱褁定良久即癢病愈神效不可具述烏頭丸主腳氣皮肉身體諸風烏頭附子廣香檳榔右為末煉蜜為丸如梧子大每服五丸忌豬肉生服或僅用附子烏頭二味丸如麻子大五丸溫酒送下大腹散治風毒腳氣肢節煩疼心神壅悶大腹子紫蘇木通桑白皮羌活木瓜荆芥赤芍藥青皮川獨活枳殼右㕮咀每服四錢水一盞薑五片蔥白七寸去滓空心溫服紫蘇散治風毒腳氣遍身拘急刺痛大小便赤澀不思飲食嘔逆或寒或熱痰惡腳腫紫蘇木通桑白皮茴香羌活獨活荆芥木瓜青皮甘草大腹子枳殼右㕮咀每服三錢水一盞薑三片蔥白一莖同煎飛步丸治男子婦人風毒腳氣腫北防風北細辛木瓜川烏草烏晚蠶沙大焮草蒼耳葉右為末醋糊為丸如梧桐子大空心鹽酒湯吞下三十丸甚效此藥宜久服之白楊皮酒治風毒腳氣手足拘攣右用白楊皮東南西北三尺者取一斤半勿令見風並去皮銼熬令黃赤以清酒一斗內不津器中漬之須密封頭勿令泄氣冬月二十七日春夏一七日開出飲時量人酒性多少服之日五六服常令酒送下取力相敵取差為度楊皮白色者佳不要近塜墓者以此藥服之最妙鍾乳酒治虛勞風冷損腳疼痛羸瘦拘攣弱不能行鍾乳丹參石斛杜仲芎藭當歸附子桂心天門冬牛膝防風黃耆秦艽乾薑山茱茰薏苡仁右㕮咀清酒二斗漬之三日初服三合日再後稍加之以知為度石膏湯治腳氣風毒熱氣上衝頭面赤筋急鼻塞去來時令人昏憤心胸恍惚或若驚悸身體戰栗手足緩縱或酸痺頭目眩重眼枯鼻乾辛熱氣出口中或患味甜諸惡不可名狀者石膏龍膽升麻芍藥貝齒甘草鱉甲黃芩橘皮羚羊角當歸右㕮咀以水八升煮取三升分為三服芫花丸治臟虛風毒上攻下注腳氣等芫花巴豆白附子羌活陳皮破故紙牽牛子檳榔右搗羅為末醋煮麵糊為丸如梧桐子大每食前空心服自五丸加至十丸丈夫艾鹽湯下婦人橘皮湯下麻黃湯治惡毒腳氣痺弱四肢不仁失音不能言毒氣衝心麻黃防風赤茯苓當歸升麻芎藭白术芍藥麥門冬黃芩桂甘草杏仁右粗搗篩每服五錢水一盞酒半盞入大棗一枚擘破煎至一盞去滓溫服日三夜一麻黃湯治風毒腳氣屈伸無力痿痺不仁麻黃防風桂當歸白檳榔黃芩犀角赤茯苓升麻右㕮咀每服五錢水一盞半棗二枚擘開煎至一盞去滓空心溫服不老地仙丹治腎臟風毒輕腳壯筋蓯蓉當歸虎骨牛膝赤小豆蒺䔧川椒川芎血竭萆薢白南星白附子何首烏黃耆防風杜仲羌活沒藥獨活木鱉子地龍茴香乳香右為末酒糊丸如梧桐子大每服四十丸木瓜陳皮湯下犀角飲子治解風毒入腰腳暴悶痛生犀角蜀升麻黃芩乾藍漢防己枳實漏蘆白斂梔子仁右以水八升煮二升三合絞去滓分三溫服不問食前後忌海藻菘酢淋泄蒴藋湯治風毒腳氣腿膝痿痺赤腫行履不得皮骨如蟲行冝用淋泄茄楷蒴蘆蒺䔧子蒼耳栁木蠧末海桐皮柴胡茯苓皮水紅右銼碎每用藥四兩水五碗煎取三碗去滓淋泄洗避風冷地仙丹専治風痺腳氣有久患白癜風去牽牛加枳殼服之得效天仙子川椒木鱉子白膠香五靈脂黑牽牛黑豆赤土草烏當歸右為末同入白膠香木鱉子末用隔年好醋打糊杵千百下丸如梧桐子大每服十二丸茶清下病甚者頻進酒亦可海桐皮丸治風毒流於腳膝行立不得海桐皮五加皮川獨活防風枳殼杜仲牛膝薏米生地黃右細銼綿褁以無灰酒二升春浸七日冬二七日夏三日每服三二杯空腹服日三四度常令酒氣醺醮不絶重者不過兩劑又方海桐皮牛膝川芎羌活地骨皮甘草薏米生地黃右用酒浸如前法亦治腰膝痛有效又方治腳氣風氣右以端午日採蒼耳葉略曬用好酒九蒸九曝細末之打飛羅麵為丸如梧桐子大每服空心溫酒或用木瓜湯下六七十丸昔有人苦腳氣服此不惟病去且年逾九十行步如飛治風腳氣右用童子小便兩大瓶用木瓜皮四兩分在兩瓶內細煎小便百沸腳盆盛頓更替熏之以綿絮蓋腳汗旋出即愈不時薰五六次神效木香丸治風毒氣攻手腳緩弱沉重虛腫疼痛木香沒藥附子烏藥蒺䔧子天南星切白附子磠砂木瓜右先將磠砂研細入木瓜內濕紙五七重褁煨熟爛研成膏次將餘八味搗羅為末以木瓜和丸如梧桐子大每服十丸空心冷酒下一方用川烏半兩炮去皮臍五柔丸治腎虛冷受風兼毒腫腳氣等大黃前胡半夏芍藥蓯蓉赤茯苓細辛葶藶當歸右為末煉蜜搜丸再入臼內搗三千杵丸如桐子大每服五丸空心米飲下加至七丸以大便通利為度日三檳榔湯治風毒腳氣無力􅍙痺四肢不仁失音毒氣衝心檳榔防風桂當歸赤茯苓犀角屑麻黃右除麻黃外並搗篩每服先取麻黃末二錢水一盞半煎至十餘沸掠去沫入藥末五錢用大棗三枚拍碎同煎至七分去滓空心溫服近晚再服蘆根湯治風毒腳氣昏煩壯熱頭痛嘔吐口乾生蘆根赤茯苓葛根知母麥門冬淡竹葉甘草右為散每服五錢水一盞半煎至八分去滓食後溫服晚再服之效摩傅神明膏治風毒腳氣不仁及緩弱無力附子吳茱茰芎藭白芷蜀椒前胡白术桂當歸細辛防已右搗篩以新綿裹內淨器以醋五升浸一宿用臘月豬膏一斗內鍋中煉去筋膜入前酢中與所浸藥以文武火三上三下候變色稀稠得所濾滓拌勻成膏瓷器中盛密封頭每有患風痺不仁取一手摩之揩摩令入皮膚若多腫即去細辛以牛酥代豬膏亦佳茱茰散治風冷腳痺偏枯半身不遂晝夜呻吟醫所不治吳茱茰乾薑白斂牡荆附子天雄狗脊乾漆薯蕷秦艽防風右治下篩先食服方寸匙日三藥入肌膚淫淫然三日知一月痊附子湯治腳氣風多痿痺筋骨疼痛四肢不仁腳緩弱履地不得者此方治之附子麻黃細辛杏仁芎藭牛膝丹參防風獨活五加皮右銼如麻豆每服五錢用水一盞半入生薑半分拍破同煎至一盞去滓溫服空心日晡午時衣覆微令汗出􅌲羊丸出本草治風氣積滯成腳氣常覺微腫發作或痛茵羊炒薏苡仁各半兩郁李仁一兩牽牛子一兩半右為末煉蜜和丸如梧桐子大每服二十丸五更薑棗湯下未利加至三十丸以快利為度白粥補之葫蘆丸出仁存方治風毒腳氣章般山曽留耕服之蒼耳五月五日採九蒸九曝取二兩淨左纒藤取嫩葉乾稱二兩淨葫蘆巴二兩以一兩同海金沙炒赤色去沙不用一兩同去殼巴豆十四粒炒巴豆赤色不用豆右為末醋糊為丸每服四十九丸鹽湯吞下吳茱茰湯治風毒腳氣吳茱茰湯浸三度焙乾炒右搗篩每服三錢水一盞半生薑半分拍破同煎至六分去滓食前服日晚再服紫雪方此方主療腳氣毒遍內外煩熱口中生瘡及狂易呌走並善解諸般草熱藥毒發邪熱卒黃等瘴疫毒㽱卒死瘟瘧五尸五注心腹諸疾絞刺切痛蟲毒鬼魅野道熱毒小兒驚瘋癲癎百病最神效方見積熱痼冷門諸熱類金芽散出聖濟總録治腳氣金芽研曽丹研凝礜石研泥褁燒半日丹砂研雄黃研朴硝研寒水石研代赭石研龍骨研犀角研獺肝炙鸛骨炙狸骨炙巴豆去心皮熬大黃野葛皮炙各三分牛黃另研麝香另入升麻桂心附子用生者去皮鬼臼鬼督郵黃環青木香鳶根有草名鳶尾此云鳶根即是鳶尾之根也牡蠣熬蘇合香研另入常山茯苓黃茋知母龍膽各三兩露蜂房玉支草一本作字鬼箭羽徐長卿石長生蜀漆當歸桔梗白薇各一兩蜈蚣二枚炙蜴蜥一枚炙芫青炙地膽炙亭長炙各三十九枚椒四十枚去目及閉口者右各搗為散以湯如桃李許和散三分半或束核服之常患者日再服卒患利吐者服四分匙若以絳袋褁方寸三匙帶之辟諸惡㽱忌食生冷蘆笋生䓤菜豬肉冷水酢物陳臭生血等物合藥用臘月王相日勿令穢汚風見之以蠟紙裹用二年此藥兼治冷熱虛實其功卒不可盡述矣石楠丸出和濟方治風毒腳弱少力腳重生瘡腳下隱痛不能踏地腳膝筋攣不能屈伸項背腰脊拘急不快風毒上攻頭面浮腫或生細瘡出黃赤汁或手臂少力或口舌生瘡牙齗赤爛齒搖髮落耳蟬聲頭眩氣促心腹脹悶小便時澀大便或難服之補益原氣令人筋骨壯健耳目聰明婦人血氣亦可服之不拘時候赤芍藥五加皮三兩萆薢四兩當歸麻黃去根莭陳皮赤小豆各三兩獨活去蘆四兩薏苡仁牽牛炒石楠葉各三兩木瓜四兩杏仁去皮尖雙仁炒赤二兩大腹皮川芎杜仲銼炒各二兩牛膝去苖二兩右為末以酒浸蒸餅丸如梧桐子大每服十丸至十五丸二十丸木瓜湯下早起日中臨卧各一服偏風腫滿服之亦效一方有川椒續斷虎骨酒出本事方治去風補血益氣壯筋骨強腳力虎脛骨真者萆薢山靈脾薏苡仁牛膝熟地黃右細銼絹袋盛浸酒二斗飲了一盞入一盞可得百日婦人去牛膝治一切熱毒氣及風毒腳氣出本草右用大豆和甘草煮湯飲之橘皮丸治一切風毒腳氣喫食不下橘皮一斤以童子小便浸一日次用炭火半稱燒地令赤以酒一升灑於熱土將橘皮鋪在地上著盆合一宿時朴硝一斤漿水二升煎令水盡用白茯苓去黑皮四兩右為細末煉蜜為丸如梧桐子大每服三十丸食後溫水下空心米飲下亦可以利為度利多減服治風毒腳氣脛腫捻之則陷出肘後方右用牽牛子為末蜜丸小豆大每服五丸薑湯下用利小便即愈亦可用核吞之其子黑色正似桃子核之形市人亦賣之木瓜丸出海上方治腳氣去風木瓜一箇小敘命湯去附子為末一兩右以木瓜去皮穰切下蓋入敘命湯末在內蒸爛研搗乾為丸如梧桐子大每服三四十丸蘇木煎湯溫下亦可作膏傅貼痛處尤好一方用川椒末二錢桑枝方出十便良方本方云桑枝性平不冷不熱可以常服療遍體風癢乾燥腳氣風氣四肢拘攣上氣眼暈肺氣咳嗽消食利小便久服輕身明目令人光澤兼療口乾仙經云一切仙藥不得桑煎不服出抱朴子右用桑枝細切一小升熬令香以三大升煎取汁二大升一日服盡無問食前後治腳氣風痺不仁五緩筋急右用熊肉半斤於䜴汁中和薑椒蔥白鹽醬作腌酢於空腹食之治風腳弱右用龜殼炙之為末酒調服地龍丸出朱氏集驗方治風腳痛不可忍川棟子肉一兩用巴豆炒不用巴豆全蝎二錢好麵一兩破故紙三錢用斑貓炒不用斑貓茴香二錢半用海金沙一錢炒不用海金沙葫蘆芭二錢半自然銅半兩醋煅淨水蛭兩條麝香炒敗龜半兩石薜荔半兩用醋浸一時焙無名異四錢炒檳榔二錢不見火天竺黃半兩紅麯半兩瓦上燒穿山甲四錢炒地龍三錢去土炒古錢十二箇用砂鍋子盛爐內煆成汁醋浸右為細末將乳香一錢沒藥三錢麝香一錢辰砂半兩為衣醋煮麵糊為丸如梧桐子大溫酒送下驅風丹出淡寮方治風氣腳逺年近日疼痛腫滿時或發動或患癧癤白虎及筋脈拘攣等證川烏一兩不去皮尖大者破作四邉小者破作兩邉却銼如骰子大用麻油煎令黃色去油焙乾赤小豆一兩擇去菉黃豆草烏四兩雞用者不去皮臍破作兩邉擇去心中黑者祗取心內白者銼如骰子大以二兩油製如川烏法再同鹽一兩拌和水微淹煮浸三日一夜一度漉轉候日數足取出再用鹽一兩同炒黃色去鹽勿令燋本用滷汁浸三日夜去滷汁炒恐滷汁不常有故以鹽水代之地龍四兩著隂潤處少時用綿紗裹定輕輕羅篩去土取肉不用更稱雞心檳榔二兩銼焙右為細末用黃酒一大碗好頭麵五錢重煮糊為丸梧子大每服三十丸空心麝香冷鹽湯下如熱酒食之類俱未可便食庶不大麻木如初服未可多服丸數而後不大麻木可略增也忌香菜茵陳豆豉及一切動風物橘皮丸出十便良方治腳氣有風人氣不順致生熱而大便祕此藥用不損人進飲食散脹滿調中下氣偏冝腳氣黃橘皮四兩乾生薑一兩右為細末以蜜半斤同熬成膏丸如梧桐子大每服三十丸生薑湯下食前治風毒腳氣吐密方出海南四時攝生論方延胡索一兩炮蓬莪茂一兩半蚌粉四兩醋炒右為散炒黑豆令香熱水煎三五沸入薑少許更煎一兩沸取汁調一錢服之治元臟風毒腳氣心腹脹滿方出海南四時攝生論方附子炮京芎當歸桂心木香檳榔陳橘皮蘿蔔子右等分為散內蘿蔔子取仁别研相和更與諸藥再研令勻空心酒調下四生丸出海南四時攝生論方治腳膝骨節毒風行履不得川狼牙黑附子海桐皮天南星右等分生用為末頭醋煮糊為丸菉豆大每服十丸鹽湯或酒下赤小豆丸出朱氏集驗方赤小豆半生半炒香附半生用半酒炒晚蠶沙半生半炒草烏頭半生半麻油炒右等分加陳倉米三合半生半炒為末酒糊為丸梧桐子大每服十丸空心茶酒任下乳香應痛丸出朱氏集驗方治腳氣風損神效川烏生用不去皮草烏生用不去皮紅花銼焙當歸酒浸天台烏藥銼焙乾葛銼焙白芍藥洗銼焙蘇木銼生乾地黃洗銼骨碎補燎去毛雞骨降真香銼金毛狗燎去毛自然銅入銀鍋內炭蓋口化為度乳香杵碎用香爐盛火簳篛葉一片虛架在香爐口上約去火二尺許次將乳香置篛葉上候炙鎔瀼用水潤濕小竹箆子炒撥覺瀼定取出候冷研沒藥杵碎酒浸右各一兩為細末用好白酒濃滓一碗好頭麵半兩煮糊丸如梧桐子大每服三十丸空心溫鹽酒下禁忌如前凡腳氣發作先服驅風丹大痛稍愈即間服藥候痛全愈專服此藥必如常嵗每嵗則痛一月今年服下一料只痛半月二十日明年已發再服一料止痛十數日又明年再服一料則終身不復作矣但腳氣年深背駝腰曲手足攣拳者服前項二藥雖未能卒去病根然亦能免大腫痛此藥不特專治腳氣但是風損皆可服之以上二藥常用微火烘焙恐發潤故也如白虎􅊓癤之類皆可服五生丸出衛生家寶方治腳氣及風氣攻四肢金毛狗脊去毛川烏防風川萆薢蓬莪茂已上各一兩日晒乾右件碾為細末用法醋糊為丸如梧桐子大鹽湯酒空心下治腳氣中虛風出本草右以羊皮去毛作臛食之治風血腳氣疼痛痺踠損痰血痛不可忍出本草右取扶杉木白皮火炙酒浸服之理風消腳氣出本草右以苦竹笋蒸煮食之治腳氣風氣出本草右取鯉魚作鱠與食之效治風毒腳氣及久積冷腸痔下血出本草右用杜仲葉嫩時採食之亦冝乾末作湯服普濟方卷二百四十一
