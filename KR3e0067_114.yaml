body:
  text: 普濟方卷一百十五明周王朱橚撰諸風門諸風雜治白丸子方出聖惠方治一切風附子半生去皮白附子半生半夏湯洗七次天麻乾蝎生用白花蛇肉令黃甘菊花羌活防風去蘆芎藭桂心去蘆頭白殭蠶生用白蘚皮木香已上各半兩巴豆半兩硃砂一分雄黃一分麝香一分右搗羅為末入硃砂雄黃麝香等研令勻以糯米飯和搗一二千杵丸如梧桐子大用膩粉滚過每服以溫酒下三丸藁本散治一切風治婦人血風丈夫筋骨風腸風痔漏四肢軟弱及小兒急風能療骨節風攻痛疼等并寸口白蟲解傷寒若能常服治諸風氣諸疾藁本赤箭羌活獨活芎藭白蘚皮防風去蘆肉桂去皺皮附子炮製去皮臍續斷五加皮甘菊花麻黃去根節赤芍藥細辛乾蝎一兩半當歸牛膝去苖枳殼炒黃甘草各一兩半右搗羅為散每服以溫酒調下一錢薄荷湯下亦得忌生冷豬雞魚動風物一方無乾蝎追風散出和劑方治年深日近偏正頭痛又治肝臟久虛血氣衰弱風毒之氣上攻頭痛頭眩目暈心忪煩熱百節酸疼腦昏目痛鼻塞身重項背拘急皮膚瘙癢面上遊風狀若蟲行及一切頭風兼治婦人血風攻疰頭目昏痛病皆治之常服清頭目利咽膈消風壅化痰涎川烏去皮防風去蘆川芎洗白殭蠶荆芥去梗石膏甘草白附子炮羌活白芷全蝎微黃天南星炮天麻去蘆地龍半兩乳香研草烏去皮沒藥研雄黃一分右為細末每服半錢入好茶少許同調食後及臨睡服龍麝紫芝煎療一切諸風半身不遂口眼喎斜頭旋耳鳴鼻塞咽乾四肢麻木疼痛痰毒下疰腰膝沉重筋攣骨冷皮膚瘙癢昏迷倦飲食進退行步少力何首烏天麻去苖吳白芷防風去苖羌活甘草炙黑附子炮甘松胡椒良薑藿香葉肉桂川薑一兩麻黃一兩龍腦白檀香零陵香右為細末炒米粉四兩黃色糯米粥入汁白蜜二兩和就作錠子一寸半長每服一錢錠細嚼茶酒下如病重每服三錠子日三服遇仙如意丸出瑞竹堂治諸風疾病及患惡瘡婦人月事不見産後胸中惡物盡皆治之大有效驗白茯苓去皮陳皮去白青皮去穰各一錢丁香木香人參各二錢白术煨白豆蔲仁縮砂仁官桂去皮荆三稜炮石菖蒲炒去毛逺志去心廣茂炮各三錢乾山藥半兩甘草去皮少許香附子三兩牽牛頭末八兩加二右為細末好醋糊為丸如梧桐子大每服一百二十丸看老幼虛實加減丸數臨卧溫水送下凡食不可大飽可食粥五七日忌生冷硬物酒肉魚麵若風疾加地骨皮一兩氣蠱水蠱每服三百丸一服立消此藥微利三五次欲止臟腑熱喫涼水一口便立住後一服甘露散即補之甘露散出瑞竹堂服如意丸後便服此藥即補能分隂陽有大效驗白滑石六兩半澤㵼甘草去皮各一兩人參白术木豬苓去黑皮各半兩右為細末每服三錢白湯調服欲分隂陽蜜和丸如彈子大用湯化如稀麵糊調服之羌活去蘆頭麻黃去根節湯煮掠去沫焙各一兩防風去蘆三錢木香檳榔銼附子炮製去皮臍白术白頭炮製去皮臍草豆蔲和皮陳橘皮湯浸去白焙牛膝酒浸一宿切焙當歸酒浸一宿切焙杏仁去皮尖雙仁生用人參白茯苓甘草芎藭桂去粗皮各半兩右銼如麻豆每服一兩水三盞生薑七片煎至一盞去滓取七分溫服大腸不通加大黃末一錢量老少加減久不通者加至三五錢小腸不通心腹脹加葶藶並滑石末各一錢滑石湯化下上膈壅滯咳嗽氣急加半夏升麻天門冬知母末各二錢服訖衣覆取汗不過三五服差走馬丹出聖惠方治一切風硃砂一兩雄黃一兩硫黃一兩水銀已上四味同研極細墨染紙褁用線繫定取巴豆一斤和皮都搗黏爛以磁盒內巴豆一半鋪底入前四味藥在巴豆中心上又以巴豆蓋之如法固濟候乾入爐中用半稱火煆後火盡取出並巴豆灰與四味藥同研極細更入後藥木香一分天麻一分犀角屑一分白附子一分炮製天南星一分炮製丁香肉桂一分去皺皮麝香一分細研龍腦一分細研藿香一分白花蛇三分酒浸去皮骨炙微黃白殭蠶一分微炒乾蝎一分微炒附子一分炮製去皮臍右搗羅為末與前藥同研令勻用湯浸蒸餅和五七百杵丸如梧桐子大每日空心以溫酒下十丸當取下如魚油惡物一兩碗便是風之根本忌動風物雄黃丸出聖惠方治一切風雄黃牛黃龍腦各一分細研麝香半兩白殭蠶一兩微炒天南星一兩炮製白花蛇二兩酒浸去皮骨炙微黃天麻一兩白附子一兩炮製天雄一兩炮製去皮臍乾蝎一兩微炒半夏半兩湯洗七次去骨蟬殼半兩獨活一兩芎藭一兩膩粉半分犀角屑半兩槐膠一兩右搗羅為散末煉蜜和搗三二百杵丸如豇豆大每服以溫酒嚼下五粒如心煩壅悶驚悸即以荆芥薄荷湯下忌動風物神效無比牛黃丸出聖惠方治一切風牛黃半兩細研硃砂一兩細研水飛過麝香一分細研龍腦一分細研附子一兩半炮製去皮臍羌活一兩白殭蠶一兩半微炒白附子一兩炮製乾蝎一兩全者微炒芎藭一兩天南星炮製當歸一兩桂心一兩木香一兩天麻二兩防風一兩去蘆頭檳榔一兩獨活一兩右搗羅為未入研了藥同研令勻煉蜜和三五百杵丸如櫻桃大每服以薄荷湯研下一丸薄荷蔥茶下亦得花桑枝煎治一切風花桑枝一斤銼海桐皮半斤仙靈脾半斤五加皮半斤牛蒡根半斤已上五味細末以水三斗煮至一斗濾去滓却入鍋中以慢火熬至五升附子去皮臍牛膝去苗天麻羌活桂心萆薢銼羚羊角屑虎脛骨塗酥炙微黃酸棗仁當歸木香乳香檳榔已上各一兩右搗羅為末於前煎中别入好酒二升白蜜五合入銀鍋中熬至三升後下諸藥末以桞木棍攪令勻看稀稠得所即以磁器盛每服空心及晚食前以溫酒調下一茶匙復夀延春丹治未來症候右癱左瘓口眼喎斜半身不遂服此藥並無此病見治者補五臟分隂陽止咳嗽助聲音駐顔色黑髭髮明耳目不忘記添精髓壯筋骨美食去一切風人參二兩白茯苓逺志去心牛膝酒浸杜仲炒絲黃耆菖蒲當歸蒼术泔浸去皮甘菊花地骨皮各一兩天麻半夏製生地黃熟地黃益智仁萆薢酒浸羌活各半兩右為細末酒糊為丸如梧桐子大每服三五十丸空心以溫酒送下迹風順氣丸出聖生堂方順三焦和五臟潤腸胃除風氣又治冷熱壅結津液耗少令人大便閉塞不通及年髙氣弱及有風人大便閉澀尤宜服之大黃五兩半生半熟車前子二兩半檳榔二兩大麻子三兩山藥二兩郁李仁二兩兔絲子酒浸牛膝酒浸木香蓯蓉酒浸白茯苓續斷防風枳殼炒獨活人參白术甘草各一兩右為細末蜜為丸如梧桐子大每服三十五丸加至五十丸溫水送下不拘時侯此方加味補藥在內用之屢驗雙丸子出王氏博濟方治癱瘓一切風疾傷寒等症烏蛇酒浸去皮骨炙天麻蝎稍全者天南星炮原蠶蛾炒犀角鎊羚羊角屑鎊丹砂研藿香葉白檀香零陵香各一兩天雄尖麝香研各半兩牛黃研雄黃研各一兩狐肝一具水煮薄切焙乾别研烏鴉一隻去嘴爪腸肚於磁罐內燒為灰别研羅入諸藥末內用右除别研外搗羅為末與别研者加勻煉蜜和杵三五百下用磁器盛每服二丸薄荷湯下大人如白豆丸大小兒如菉豆大卒患併三服癱瘓中風入膩粉少許水調同藥化下小兒驚風金銀薄荷湯下婦人血風産後中風手足拘攣當歸紅花酒下傷寒豆淋酒下三五丸防風通聖散一名防風湯出儒門事親書治一切風熱怫鬱致氣血壅滯筋脈拘倦肢體焦痿頭目昏眩腰脊強痛耳鳴鼻塞口苦舌乾咽嗌不利胸膈痞悶咳嗽喘滿涕唾稠粘腸胃燥澀便溺淋閟或夜卧寢汗咬牙睡語筋愓驚悸或腸胃怫熱鬱結水液不能浸潤於周身而但為小便多出者或濕熱內餘而時有溏泄者或因忘液而成燥淋閟者或因腸胃燥鬱水液不能宣行於外反以停溫而泄或燥濕往來時結時泄者表之陽和正氣衛氣是也與邪熱相合并入於裏陽似隂而寒戰煩渴者表氣虛故戰裏熱甚故渴或瘧氣久不已者經言邪熱與衛氣并入於裏則寒戰并出于表則發熱并則病作離則病已或風熱走注疼痛麻痺者或腎水真隂損虛心火邪熱暴而僵仆或卒中久不愈者或一切暴瘖不語或語中不出聲或暗風癎病或洗頭風或破中風或諸潮搐并小兒諸疳積熱驚風或斑疹未出與驚風積熱傷寒疫癘不能别辨者或熱甚怫結反出不決者或熱極黑陷將欲死者或大人小兒風熱瘡疥久不愈者或頭生白屑遍身初黑紫白斑駮或白嘴紫赤風刺疥呼為肺風者或成癘風世傳為大風疾者或腸風痔漏并飲酒過熱毒兼解利諸邪所傷及調理傷寒發汗不解或不經發汗頭項身體疼痛者并兩感證兼治産後血液損虗以致隂氣衰殘陽氣鬱甚為諸熱證腹痛喘悶譫妄驚狂或熱極生風而風熱燥鬱舌強口噤筋惕肉瞤一切風熱燥鬱惡物腹滿實痛而昏惑者惡物過多而不止者不宜服兼消風除大小瘡及惡毒兼治墜墮打撲損傷疼痛或因而熱結大小便澀滯不通或腰腹急痛腹滿喘悶者並宜服之通聖散益元散各十錢名通氣防風湯又名雙解散防風半兩石膏一兩川芎半兩滑石三兩當歸半兩焙芍藥半兩生甘草二兩銼炒大黃半兩荆芥穗一分薄荷葉半兩羅淨麻黃半兩去根不去節白术一兩山梔子一分連翹半兩黃芩一兩芒硝半兩盆硝是也桔梗右為細末每服二三錢水一中盞生薑三片煎至三分濾汁溫服無時日三服病甚者服五七錢或得利更妙利後却如常服以意加減無生薑亦得或常服難以煎藥即為極細末溫水調下二三錢或兼涎吐者加半夏半兩生切作片子不可無生薑煎亦得作細末調下凡小兒服大人藥一服分三服透空丸出御藥院方治男子婦人一切諸風頑麻疼痛上攻頭目下腳腰手背顫動香附子藁本藿香葉地龍去土炒川芎白殭蠶炒乾薑炮甘草炙乾蝎天麻去苖各一兩白芷炙七錢天南星生薑製各一兩神麴碎炒二兩半茴香炒麥蘖淨炒各三兩胡椒一兩川烏頭炮製一兩二錢右為末每藥末三兩白麵六水和就丸小彈子大相連排放自空夏月新瓦上發每服一丸細嚼茶酒化下食前服太乙丹出聖惠方治一切風川烏頭生用去皮臍乾蝎微炒白殭蠶生用天麻天南星生用羌活躑躅硃砂細研半兩乳香已上各一兩白附子半兩生用附子去皮臍生用牛黃細研雄黃細研已上各一兩安息香一兩半麝香一分細研白花蛇肉二兩半酒浸炙微黃龍腦半分細研右搗羅為末入研了藥令勻别以麻黃去根節搗碎以酒五升煎至二升去滓入糯米粉一兩更熬成膏次下諸藥杵五七百杵丸如菉豆大以膩粉內滚過令乾每服以溫酒下七丸忌動風物換骨丹出御藥院方療血滯不流衛氣不通風寒濕氣相搏筋血之間內舍偏虛發不遂之病氣感八風血凝五痺筋攣骨痛癱瘓偏枯一切風症並皆治之服之神妙難以言宣槐角子炒黃熟桑白皮去粗皮炙川芎蒼术白芷蔓荆子去蕚人參葳靈仙何首烏防風各二兩五味子硃砂水飛香附子苦參各一兩麝香半兩另研麻黃一斤十兩右將麻黃去根不去節用河水三石三斗三升小斗七升是也熬六斗濾去麻黃澄清再熬至二升半入其餘藥每一兩三錢作一十丸硃砂為衣每服一丸用溫水一盞浸至晚溶化開卧服之神清無睡是藥之驗須臾隔五日服之如中風無汗宜服若體虛自汗服之是重耗津液也若風盛人如密室溫卧取汗太乙散出御藥院方治陽明經虛風邪外入令人口眼喎斜麻木不仁及驚風癎痓手足搐搦不省人事獨活蓁艽並去蘆頭川芎熟地黃乾甘草炒各一兩半銼人參防風當歸並去蘆頭肉桂去粗皮白茯苓去黑皮黑附子炮去皮臍杜仲炒去絲牛膝酒浸一宿白芍藥續斷細辛去苖葉土各一兩右為細末每服三錢水一大盞煎至七分去滓溫服無時蒼耳酒去皮節頭足諸熱風藥性冷不便熱以六月以後收取晒乾至九月銼一大斛煮取四斗漬二大斗麴三度總以米一大斗漬三日如凡釀法將息酘之酒熱日三二服五合凡諸風骨髓中風若差或發瘡瘡差後皮痛膚堅實光恱腳甚便若虛弱羸瘦弱人無問男女加生地黃五大升杏仁一大升去皮尖荆根若子二大升松葉五大升枸杞根五大升杏仁一大升去皮尖荆根若子二大升水三大石别煮牛膝丹參松葉子取六大斗并蒼耳汁總一石漬五斗麴用米二石五斗分四度酘杏仁末煮第一酘飯中下生地黃搗如泥著第二酘飯中下天門冬蒸熟剝去皮搗如泥著第三酘飯中下又大麻子一斗搗碎著第四酘飯中下去皮膚風補虛大良效多頭風者得甘菊花一升漬第五酘糟中下攪之調酒熱大小同服並得餘無禁忌毒魚肉並勿食有藥處可辦無藥處可蒼耳為本如或少三兩物亦得不必俱偹年常釀至三月服極攘衆疾復延齡輕身將漬石斛等藥酒彌佳忌鯉魚蕪荑單釀鼠粘根酒和蒼耳單酒法大治風疼癢止咳嗽消痰癖差疸瘻亦是良藥腳氣人作漬側子等酒彌佳一名牛蒡根草名惡實根又患眼昏頭旋彌甚氣滿背痛取煎蒼耳酒漬此後藥獨活山茱茰天門冬去心黃耆甘菊花防風天雄炮側子炮防己白术茯苓牛膝各四兩枸杞三兩丹參四兩生薑六兩磁石十兩綿褁貫衆三兩生地黃八兩切右切以絹袋盛酒二大斗漬七日溫服一盞日二三服忌豬魚陳臭物除腳氣去酒風忌冷水桃李雀肉鯉魚蕪荑酢石斛散出濟生方治大風四肢不收不能自反覆兩肩疼痛身重脛強急筋腫不能行時寒熱足踹如刀刺痛身不能自任此皆得之飲酒中大風露卧濕地寒從下腰以下冷不足無子精虛衆脈寒隂下濕熱莖消令人不樂恍惚時悲此藥除風輕身益氣眀目強隂令人有子補不足方石斛二分牛膝二分附子炮製去皮臍杜仲各四分柏子仁石龍芮芍藥粉子雲母粉山茱茰澤㵼萆薢兔絲子酒浸防風細辛各二分桂心三分右治下篩酒服方寸以日再隂不起倍兔絲杜仲腹中痛倍芍藥膝中痛倍牛膝眥痛倍萆薢腰中痛倍防風少氣倍柏子仁厥足不能行倍澤㵼隨病所在倍三分亦可為丸以棗膏丸如梧桐子酒服七丸一方無松枝丸風湯治諸風疾天台烏沉香少許香附子甘草陳皮青皮五分木香木通檳榔厚朴桂皮人參藿香白茯苓半夏菖蒲各等分右每服水一盞半生薑三片棗二枚煎八分不拘時通口服滓再煎天仙聖化丹治一切風症川芎防風羌活獨活各一兩胡麻子微炒金毛狗脊去毛苦參去皮豬牙皂角微炒各一兩二錢半銼當歸一兩半荆芥陳者蟬退去土全蝎全者殭蠶直者炒何首烏新者香白芷蒼耳草蒸各半兩右為細末用大楓子二斤去殼爛杵如泥與前和勻用陳皮擂粉粉打糊為丸如梧桐子大每服四十丸加至六十丸如病人面上浮腫眉中癢不止或是風氣攀睛手足拘攣先服此藥一料亦用藥滓送下茶清尤得日進四服空心食後午候臨卧服之或病人四肢麻木手足刺痛腳腿上生瘡服奪命丹一料後服聖化丹藥十日後仍用白薄磁碗打針先於面上放血次入膊後放腿腳上血如遇天道晴明五六日間如此放血一次量病輕重不可放血太多若婦人患病放多不妨天兹奪命丹當歸味甘者佳辣者不用酒微浸洗防風去蘆頭資州順德者佳川芎道地雀腦者入手沉重者餘芎不用羌活皮黑體輕竹節者佳金毛狗脊新者去毛浸軟切獨活形如當歸者佳川者右等分晒乾碾為極細末用新大楓子四斤去殼不用將肉爛杵如泥入前末子藥和勻用陳米飯杵爛和藥為丸如梧桐子大每服五十丸至七十丸病在下煎藥去滓空心送下食後用茶清送下若病在上可空心用茶清送下食後臨睡以煎藥送之日進三四服切忌發風動氣毒物止食白粥白飯大忌房事治一切風疾及眼昏胡麻葳靈仙何首烏苦參甘草石菖蒲右六味各等分研為細末每服一錢溫酒一盞食後臨卧調服之天麻丸出聖惠方治一切風天麻二兩芎藭一兩羌活一兩桂心一兩藁本一兩去苗附子一兩炮製去皮臍防風去蘆頭細辛一兩乾蝎半兩微炒白附子炮製半兩犀角屑半兩牛黃一分細研雄黃半兩細研麝香一分細研龍腦一分細研硃砂一兩細研水飛過右搗羅為末入研了藥都研令勻煉蜜和搗三二百杵丸如梧桐子大每服以溫酒或薄荷湯嚼下十丸如卒中風不語口噤不識人迷悶者研化服之狐肝丸出聖惠方治一切風狐肝一具烏鴉一隻去嘴爪肚腸照乾共狐肝一處入瓶燒為灰天南星半兩炮製天麻一兩藿香一兩白附子一兩炮製烏蛇二兩酒浸去皮骨炙微黃桑螵蛸一兩微炒乾蝎一兩微炒白殭蠶一兩微炒烏藥一兩麝香半兩細研白蒺䔧一兩微炒去刺硃砂半兩細研水飛過牛黃一分細研蟬殼半兩右搗羅為末煉蜜和搗三五百杵丸如菉豆大每服以溫酒下十丸柳枝煎出聖惠方治一切風嫩柳枝三斤牛蒡根五斤已上二味細銼以水五斗煮待牛蒡根爛至二斗以來即去滓澄濾用煎後藥石榴二十顆和皮搗碎如非時即用枝二斤代之生木瓜二顆和皮細切如無生者即用乾者倍用代之桑根白皮五兩如無以桑根細切代之羚羊角屑三兩生薑三兩細切烏雞糞一兩已上六味以煎柳枝汁煎之至五升濾滓入後藥末烏蛇三兩酒浸去皮骨炙微黃天麻一兩羌活一兩防風一兩去蘆頭桂心一兩去蘆頭白蒺䔧一兩仙靈脾一兩附子一兩生去皮臍右搗羅為散入煎中别入好酒二升白蜜一升以慢火熬用栁木棍不住手攪令稀稠得所以磁器盛每服空心及晚食前溫酒調下一茶匙忌毒魚動風物茄子根浸酒方出聖惠方治風利關節治頑麻除痛疼去攣縮強腰膝乾茄子根二斤未著霜者細銼飯上蒸一炊時蒼耳子一升微炒搗碎牛膝一斤去苖鼠粘子一升微炒搗碎大麻子一升微炒搗碎牛蒡根一斤切酥炒黃防風三兩去蘆萆薢二兩晚蠶蛾半升微炒枸杞子半升一半微炒一半生用敗龜二兩酥塗炙微黃搗為末桔梗一兩去蘆頭虎脛骨二兩塗酥炙黃搗為末羌活二兩秦艽二兩去苗附子二兩炒製去皮劑右件藥都細銼以生絹袋盛用好酒三斗浸一磁瓶盛密封經二七日開之開時不得面對瓶口每日空腹日午初夜量力溫服一盞候重者不過一劑差忌毒滑魚肉等物續命煮散出千金方治風輕重皆主之麻黃芎藭獨活防己甘草杏仁各三兩桂心附子茯苓升麻黃細辛人參防風各三兩石膏五兩白术四兩右粗篩下以五方寸匕內小絹袋子中以水四升和生薑三兩煮取二升半分三服日日勿絶慎風冷大良吾嘗中風言語蹇澀四肢嚲曵處此方日服四服日夜服之不絶得愈乳香丸出和濟方治一切風疾左癱右瘓口眼喎斜半身不遂語言蹇澀精神恍惚痰涎壅塞手足嚲曵筋脈拘攣或遍身頑痺走注疼痛腳膝緩弱行步艱辛又治撲傷破損瘀血不散痛不可忍或行路勞損腳膝浮腫疼痛或腎臟風毒上攻面腫耳鳴下疰腳膝沉重並皆治之糯米炒川烏頭炮去皮尖五靈脂去泥土各三兩乳香研白芷銼藿香葉洗天南星炮沒藥研荆芥去皮根赤小豆生骨碎補去毛白附子炮各一兩松脂研半兩香墨煆草烏頭炮去皮臍各五兩右為細末酒煮麵糊丸如梧桐子大每服十丸至二十丸冷酒吞下清茶亦得不拘時忌熱物一時辰黑神丸川芎四箇南星一兩製半夏二錢半薑製天麻半兩炮製防風四兩何首烏四兩米泔水浸一宿去皮甘松四兩洗淨白芷六兩大者川烏半兩炮製過華隂細辛二兩淨甘草二兩炮桔梗四兩桂半兩去皮皂角絃二斤燒灰四兩存性乾薑一兩炮右為細末蜜打糯米粉子為劑用棒捶打一千餘捶勻為丸雞頭大每服二三十丸不拘時候如風疾左癱右瘓口眼喎斜不省人事筋骨疼痛手足戰動芝麻汁或䓤湯送下頭痛暗風茶清下肝腎攻衝脾胃虛弱溫酒下小兒天弔風倒地不醒濃煎薑湯下冷氣攻衝心腹疼痛生薑湯下㵼痢甘草湯下瘧疾烏梅湯下風牙細嚼填牙竅內婦人血氣風當歸湯下小兒驚風加輕粉少許薄荷湯下衝冒霜露不伏水土山嵐瘴氣當噙化常服之立效黑虎丹治諸風神驗蒼术米泔浸七日川烏煨草烏米泔浸去皮煨細辛防風荆芥麻黃兩頭尖金叉石斛天麻川芎白芷甘草何首烏當歸已上各一兩右為細末煉蜜為丸如彈子大每服一丸隨飲自送治男子婦女三十六種風疾眉毛退落冷茶送下腰痛耳聾腎臟風荆芥湯送下遍身紫癜風防風湯送下飲食無味脾胃風皂角子湯送下手心退皮鼓掌風天麻湯送下迎風冷淚肝臟風米泔水送下筋骨疼痛氣不住乳香湯下口眼喎斜蔥湯下指節破裂斷風鹽白湯下心腹脹悶胸膈塞氣風生薑湯下前後倒卧地感厥風生薑湯下發狂吐沫急緩風荆芥湯下五般淋瀝腎患風鹽白湯下資夀黑龍丸一名黑龍丸出簡易方治諸風疾夫風之為病半身不遂口眼喎斜手足拘攣或身殭嚲曵語言蹇澀心頭驚悸其狀多喘各隨所中此由氣血俱虛腠理踈弱風邪外中真氣失守邪正相干而生焉自然銅一斤好者杵碎用生鐡銚子內以炭火一稱漸熖火起聞腥氣又聞似硫黃氣其藥成俟冷取出如藥有五色者即其妙也後安向淨黃濕土上著紙先襯其藥盆子合之不得通風一宿出火毒乳鉢內研細以水淨淘又取濃者三五度淘澄定去清水用新瓦盆內將紙襯著令白乾如黑粉亦同稱六七兩用之候炮製後藥了當却入川烏四兩略炮麻黃三兩去節黑附子炮製烏蛇酒浸一宿去皮骨炙厚朴去皮薑汁煮防風蒼术麩炒川芎陳皮白芷白术炒黃各二兩芍藥一兩半南星半兩吳茱茰兩半右為末與自然銅粉相和勻搗細入煉蜜丸如梧桐子大臘月令甚妙男女中風癱瘓半身不遂起止不能者空心服臨卧豆淋酒下一粒六十日內必差男女患筋骨腰膝疼痛走疰不定坐即刺腰卧即刺背行即入腳跟亦用豆淋酒下須臾以蔥粥一盞投之衣被蓋覆出汗然後更喫一粒必差如或患五七日間未得汗亦如前法服才入口汗即出便安依法服二十日定愈治破傷風頑麻風暗風偏風並用豆淋酒下一粒至二粒即見功效丈夫元臟氣痛臍下掫痛不可忍者以檳榔一箇酒磨一半入生薑自然汁少許同煎五七沸研二粒服之須臾以小麩麥醋拌炒尉臍下便止治痃癖氣發不省搐得兩膝相就用檳榔一箇酒磨一半入生薑自然汁少許同煎五七沸中分破一半生用一半炙黃用酒盞飲非氣非溫但能治腰以上疾若腰以下則藥力不至可服三服而愈一方治腰疾加海桐皮當歸赤芍藥三味各二兩腰以下疾則食前服以上疾則食後服一方有乾蝎炒一兩半服之白花蛇丸出聖惠方治一切風白花蛇肉三兩酒浸炙微黃晚蠶蛾微炒天南星炮製白殭蠶微炒當歸桂心萆薢銼藁本附子炮製去皮臍白附子炮製天麻羌活芎藭防風麻黃去根節已上各一兩右搗羅為末煉蜜和搗三二百杵丸如梧桐子大每於夜臨卧時以熱酒服十丸以衣被厚蓋勿令通風要知藥力行即須臾汗出如無汗即依前再服以汗出為度仍須避風為妙天蓼木煎出聖惠方治一切諸風天蓼木五斤細銼以水三斗煎至一斗濾去滓却熬取五升赤箭獨活防風去蘆頭芎藭仙靈脾牛膝去苗天雄去皮山茱茰巴戟萆薢銼茵芋海桐皮桂心沉香已上各一兩右搗羅為末入白蜜五合相和於銀鍋中慢火熬以栁木箆攪令稀稠得所以磁器盛每服以溫酒調下一茶匙空心及晚食前服陳厚膏出御藥院方治諸風拘攣疼痛麻痺不仁風瘙癢疥癬腹中疼痛積聚並可治之當歸切三兩硃砂研飛細辛去土川芎各二兩天雄二兩二銖附子十二銖如指面大桂去粗皮一兩二銖松脂半斤雄黃三兩二銖乾薑三兩十七銖米醋二升白芷銼細二兩生地黃二斤研取汁豬肪脂十斤去筋膜切作指大右以地黃汁大米醋清丸味一宿并脂合煎之十五沸膏成新綿濾去滓入雄黃硃砂攪令勻凝切忌小兒婦人六畜見之每用少許摩擦患處熱徹為度又治面目黧黑消瘦是心腹積冷酒調半匙日三服病無不愈一方有川烏續治獨命湯出御藥院方治卒暴中風不省人事漸覺半身不遂口眼喎斜手足戰掉語言蹇澀體麻痺精昏亂頭目眩重痰涎併多筋脈拘攣不能屈伸骨節煩疼不能轉側又治諸風服之皆驗若治腳氣緩弱久服得瘥久病風人每遇天色隂晦節候變更宜先服之以防瘖啞麻黃去根節人參去蘆頭黃芩芍藥芎藭甘草銼爁一兩杏仁去皮尖炒黃細切桂各一兩防風去蘆頭一兩半附子炮皮臍去一兩防己白花蛇肉獨活乾蝎各三錢右為粗末每三錢以水一盞半生薑五片煎取一盞去滓稍熱食前服剪刀股丸治一切風白茯苓二兩山芋半兩天麻半兩防風二兩全蝎半兩羌活一兩半川芎一兩甘草二兩麥門冬半兩鐵艷粉二錢半白附子半兩殭蠶二錢半硃砂麝香少許右為細末水調服之或煎飲亦可治風浸酒方出得生堂防風秦艽白茯苓羌活牛膝人參各一兩半夏蠶明淨者一兩鱉甲炙西枸杞各三兩半當歸松節虎骨酥各一兩茄根四兩飯甑上蒸熱右㕮咀作一服用生絹袋盛藥以好酒二大瓶浸之過一十四日後開瓶每日早午晚各飲一盞酒浸以其藥滓曬乾再碾為末酒糊為丸如梧桐子大每服五十丸下不拘時白花蛇散出聖惠方治一切風白花蛇肉酒浸二兩炙微黃白殭蠶一兩微炒麝香一分細研硃砂一兩細研羌活二兩秦艽一兩去蘆附子一兩炮製去皮臍桂心一兩當歸一兩牛膝一兩去苗芎藭一兩萆薢一兩微炒乾蝎一兩微炒防風一兩去蘆頭右搗羅為散入研了藥更研令勻每服以暖酒調下一錢忌生冷雞豬肉等乳香沒藥丸一名通經治絡丹出和濟方治男子婦人一切風氣經絡活血脈治筋骨疼痛手足麻痺半身不遂暗風頭旋偏正頭風小中急風手足疼痛牙關緊急四體軟弱腎臟風毒上攻頭面下疰腰腳生瘡遍體疼酸並宜服之橅芎一百八兩躑躅花炒木鱉白膠香揀淨藿香揀炒白殭蠶洗焙五靈脂揀白芷揀當歸各七十二兩地龍一百四十兩何首烏二百四十四兩葳靈仙洗二百二十二兩草烏頭炒六百四十八兩右為末醋糊丸如梧桐子大每服五丸不可多服食後用薄荷茶下溫酒亦得有孕婦人不可服乳香應痛丸出和濟方治一切風氣左癱右瘓口眼喎斜半身不遂語言蹇澀精神恍惚痰涎壅塞筋骨拘攣或遍身頑痺走疰疼痛腳膝緩弱行步艱難又治打破傷損瘀血不散痛不可忍或路勞傷腳膝浮腫疼痛或腎臟風虛上攻面腫耳鳴下疰腳膝沉重又治偏正頭疼攻疰眼目並皆治之龍骨酒浸一宿焙乾研粉水飛三度晒乾四兩半赤小豆生用蜈蚣六條去尾針以薄荷葉褁煨熟虎骨酥炙焦各六兩白殭蠶炒去絲嘴草烏頭炮去皮尖各十二兩白膠香揀淨過天麻去蘆洗三兩川牛膝酒浸去蘆各三兩全蝎去尾針微炙七十斤川當歸酒浸去蘆頭各三兩乳香研六錢木鱉大仁七十二個别研右為細末用醋糊為丸如梧桐子大每服五丸至七丸泠酒吞下或冷茶清下亦得不計時候忌諸熱物一時辰久此藥但卧睡服尤妙忌溫麵炙煿酢脯發熱動風等物大防風湯出醫藥集成祛風順氣活血脈壯筋骨除寒溫逐冷氣善發寺僧如真師孫遂良紹熙季年患痢後腳疼瘓弱不能行履名曰痢風或兩膝腫大痛髀脛枯臘但有皮骨拘攣跧卧不能屈伸名曰痢風或兩鶴膝風服之氣血流暢肌肉漸生自然行履如故真竒方也川芎撫芎不用附子炮去皮臍各一兩半熟乾地黃洗淨白术防風去蘆當歸洗去蘆酒浸焙乾炒白芍藥黃耆微炙杜仲去粗皮炒絲斷各一兩羌活去蘆人參去蘆甘草炙牛膝去蘆酒浸切微炒各一兩右為粗末每服五錢水一盞半入生薑七片大棗一枚同煎八分去滓溫服空心食前或云四物湯下四斤亦效鐵彈丸出三因方治男子婦人一切風疾無問逺近癱緩中風口眼喎斜言語蹇澀手足戰曳難以稱舉或發搐瘈或如蟲行或失音不語牙關緊急腳不能行身體頑麻百節疼痛精神不爽頭虛煩悶夜卧不安多言胸膈不利口乾眼澀多困少力如破傷風身如角弓口噤不開作汗如油及洗頭風腦重眉梁骨痛卒中不語迷悶兼白癜風遍身癮疹鼻多清涕耳作蟬鳴小兒驚風夭弔搐搦婦人血風手足頑熱夜多虛汗頭旋倒地並皆治之白附子炮沒藥别研虎脛骨酒浸一宿乾炙全蝎去尾刺炒烏頭炮去皮炙麻黃不去節自然銅燒存性醋浸一宿各一兩白花蛇酒浸半兩辰砂别研一分五靈脂一分腦麝一分别研木鱉子二十箇去皮别研不入羅乳香栁木捶碎右為末蜜丸如彈子大用無灰酒一升浸一丸分二十服傷風鼻塞分三十服空心臨卧各一服大風五丸可安大黃丸出聖濟總目治三十六種風大黃銼蔓荆實桂去粗皮麻黃去根節湯煮掠去沫各一兩羌活去蘆芎藭各一兩半防己白附子炮各二兩半雄黃研空青研各半兩膩粉研麝香研各五分白花蛇酒浸去皮骨炙乾三兩右為末煉蜜和丸如梧桐子大每服三十丸溫酒下服訖飲三兩盞以衣覆出汗如膠後每夜七丸四十日愈仙靈脾煎出聖惠方治一切風仙靈脾一斤細切酒七升煮至三升濾去滓入後藥末附子二兩炮製去皮臍肉桂二兩去皺皮赤芍藥牛黃鹿角膠搗碎炒令微燥萆薢銼五加皮酸棗仁石斛去根銼當歸木香乳香已上各一兩右搗為末於銀鍋中入前煎在內次入白蜜五合下諸藥末用慢火熬以柳木箆不住手攪令稀稠得所收入磁器中盛每食前以溫酒調下一茶匙忌豬雞牛黃小烏犀丸出和濟方治諸風筋脈拘急手足麻癢語言蹇澀口面喎斜心怔恍惚痰涎壅滯頭目昏眩肢節煩痛及中風癱緩暗風癎病腎上攻面腫耳鳴下疰腰腳沉重疼痛婦人血風頭旋吐逆皮膚腫癢遍身疼痛天麻去苗二十兩川芎炮去皮臍地榆去苗洗焙玄參洗焙各十兩已上為細末以水少許化蜜同於石鍋內慢火熬攪成稠膏於次冷入後藥浮萍草洗淨焙龍腦薄荷葉去土甜瓜子各十兩生犀鎊硃砂研飛各五兩牛黃研麝香研各一兩龍腦研一兩右為細末與前膏子一處搜和丸如雞頭大每服一丸細嚼清茶下溫酒亦得不計時候龍腦芎犀丸出和濟方消風化痰除心肺邪熱去頭面諸風治偏正頭疼心忪煩鬱面熱目瞤鼻塞腦昏痰壅咳嗽咽膈不利石膏細研川芎各四兩生龍腦别研生犀角各一兩山梔子去皮一兩硃砂研飛各四兩內一兩為衣人參去蘆茯苓去皮用白者細辛去苗甘草炙各二兩阿膠碎炒一兩麥門冬去心三兩右除别研後入外並搗羅為細末煉蜜為丸每服一丸至二丸細嚼茶酒下食後服之即愈牛黃丸出和濟方治卒暴中風眩暈倒精神昏塞不省人事牙關緊急目睛直視胸膈喉中痰涎壅塞及諸癎潮發手足瘈瘲口眼相引項背強直並皆治之方見風癎類十二味牛黃丸消花散出衛生寶鑑治諸風上攻頭目昏痛項背拘急肢體煩疼肌肉蠕動目眩旋暈耳蟬鳴眼澀好睡鼻塞實皮膚頑麻瘙癢癮疹又治婦人血風頭皮腫癢眉稜骨痛旋暈倒痰逆惡心荆芥穗甘草炒芎藭羌活去蘆白殭蠶防風去蘆茯苓去皮用白者蟬殼去土微炒藿香葉去根人參去蘆各二兩厚朴去粗皮薑汁塗炙陳皮去穰洗焙各半兩右為細末每服二錢茶清調下如久病偏風每日三服便覺輕減如脫著沐浴暴感風寒頭痛身重寒熱倦痛用荆芥茶清調下溫酒調下亦得可併服之小兒虛風目澀昏困及急慢驚風用乳香荆芥湯調下半錢不計時侯一方治口眼喎斜半身不遂多因下元虛弱為風所乘先服氣藥次服補劑却用茶清調此吞青州白九子一方無藿香葉防風太白丸出御藥院方治諸風頭旋額角偏痛肢體拘倦痰盛氣壅鼻塞聲重咽膈不利清爽神志解利四時邪氣天麻芎藭各一兩附子炮去皮臍細辛去苗葉各二兩白附子五錢半夏十五兩洗煮焙乾蝎稍炒一兩人參半兩阿膠三分炙令熱燥天南星二十兩寒水石炒熟五十兩白殭蠶炒三兩右搗羅為末水麵糊為丸如梧桐子大每服三十丸生薑湯下不拘時候太白丹出御藥院方治諸風頭目旋暈偏在頭疼肢體拘倦痰盛氣壅鼻塞聲重咽膈不利清爽神志解利四時邪氣天麻芎藭各一兩半蝎稍一兩炒青皮去白木香白殭蠶去絲炒各三兩天南星二十兩炮細辛去土附子炮去皮臍各二兩半夏十五兩湯浸洗去滑切作片子焙乾白附子炮去皮臍各二兩寒水石十兩燒一半為衣右為細末生薑汁麵糊和丸如梧桐子大寒水石為衣每服十丸生薑湯下不拘時候石南湯出千金方治六十四種風注走入皮膚中如蟲行腰脊強直五緩六急手足拘攣癮疹搔之則作瘡風尸身癢卒風面目腫起手不能伸口噤不能言石南乾薑荆芥細辛人參各一兩桂心麻黃當歸芎藭各一兩半焙甘草二兩乾地黃十八銖食茱茰三十銖右㕮咀以水六升酒三升煮取三升分三服大汗勿怪洗浴法椿樹根去皮苦參海桐皮槐花黃柏山梔子地骨皮荆芥虎杖青木香槐樹枝嫩者蔥白右銼碎三兩重水一桶煎至滚沸藥味缸一隻放藥在內湯中用小板一片須要穩人坐其板上外用蘆席或草席圍定勿令熱氣出頂上將被蓋之令患人通身要出汗透如熱氣太猛少揭起被出氣稍溫下手淨洗之溫湯出浴暖處睡然後溫粥補丹食之效大補丹專治男婦人諸般風疾口眼喎斜腳腫痛渾身拘急癱軟半身不遂頭風腳氣下元虛冷無力症並皆治之防風一斤醋煮晒乾為末黑豆一斤炒燥入酒內浸一宿取出晒乾如前炒又入酒浸如是三次晒乾為末川烏半斤不去皮蒼术一斤半泔水浸一宿洗刮去皮淨晒乾為末此黑豆防風蒼术三味一處將紙褁在一處草烏一斤不去皮銼碎用薑汁浸軟搗為泥生薑一斤為泥蔥白一斤右用川烏草烏薑蔥搗碎一用皮紙褁露一宿後入新瓦罐內盛緊褁器口春五日夏三日秋七日冬十日如是日畢取出入前三味末和勻用糯米糊丸如團魚子大許每服一丸臨卧睡時咬破用溫酒吞下薑湯亦可服藥後一切熱物湯酒不可食此藥麻人大忌房事後加人參當歸青黛各四兩寒水石煮散療一切風寒水石石膏滑石白石脂龍骨各八兩桂心甘草炙牡蠣各二兩煆赤石脂乾薑大黃各四兩犀角屑一兩右搗以馬尾羅篩之將皮囊盛之急繫頭挂著髙涼處欲服以水一升煮五沸內方寸匕藥煮七八沸下火澄清㵼出頓服服之每日服亦得百無所忌小兒服之即以意斟酌多少忌生蔥海藻菘菜立效天南星丸出聖惠方治一切風天南星一兩炮製白花蛇一兩酒浸炙微黃附子一兩炮製去皮臍檳榔一兩麻黃一兩去根節硃砂三兩細研乾蝎一兩微炒膩粉半兩右為末煉蜜和丸如梧桐子大每服以溫酒三十丸薄荷湯茶下亦得忌毒滑魚肉動風物又方出聖惠方天麻一兩乾蝎半兩生用天南星半兩生用川烏頭一分生用去皮臍附子半兩生用去皮臍芎藭三分炮細辛半兩炒半夏半兩生用白附子半兩生用白殭蠶三分生用麝香一分細研麻黃半兩去根節右為細末以棗瓤和搗三五百杵丸如菉豆大以膩粉滚過令乾每服以溫酒下三十丸海桐皮酒浸方出聖惠方治風海桐皮五加皮獨活側子炮製去皮臍天麻桂心防風去蘆頭枳殼麩炒微黃去穰杜仲去皺皮炙微黃已上各三兩牛膝五兩去苗薏苡仁六兩生地黃半斤右細銼和勻以生絹袋盛用清酒三斗浸之春夏七日秋冬二七日每日隨性飲一盞常令有酒氣不得大醉至寶丹出和濟方療卒中急風不語中惡氣絶中諸物毒暗風中熱疼痛及火毒山嵐瘴氣毒水毒産後血暈口鼻出血惡血攻心煩懆喘吐逆難産悶塞死胎不下已上諸疾並用童子小便一合生薑自然汁三五滴入於小便內溫過化下三丸至五丸神效又療心肺積熱伏熱嘔吐邪氣攻心大腸風祕神魂恍惚頭目昏眩眠睡不安唇口乾燥傷寒狂語並皆療之生犀角屑研硃砂研飛雄黃研飛生玳瑁屑研琥珀研各一兩麝香研龍腦研各一分金箔半入藥半為衣銀箔研各五十片牛黃研半兩安息香半兩為衣以無灰酒攪澄飛過濾去沙土約得盡數一兩慢火熬成膏右將生犀玳瑁為細末入於藥研勻將安息香膏重湯煮凝成後入諸藥中和搜成劑盛不津器中忙旋丸梧桐子大用人參湯化下三丸至五丸又療小兒諸癎急驚心熱卒中客忤不得眠睡煩躁風涎搐搦每二嵗兒服二丸人參湯下石膏丸出御藥院方治諸風痰涎頭痛目眩旋暈欲倒心忪悸動恍惚不寧神思昏憒肢體倦惰頸項強硬手足麻痺當服除風偏正頭疼石膏别研半夏湯洗七次川芎白附子炮天南星炮菊花揀次天麻白殭蠶炒去絲旋覆花陳皮去白各一兩全蝎炒半兩右為細末生薑汁浸蒸餅為丸如梧桐子大每服五十丸漸加至一百丸食後生薑湯下忌粘滑生硬等物皂角丸出和濟方治風氣攻疰頭面腫癢遍身拘急痰涎壅塞胸膈煩悶頭旋目眩鼻塞口乾皮膚瘙癢腰腳重痛大便風祕小便赤澀及咳嗽喘滿痰唾稠濁語澀涎多手足麻痺暗風癎病偏正頭痛夾腦風婦人血風攻疰遍身疼痛心忪煩躁癮疹癢並宜治之皂角捶碎以水一十八兩六錢浸汁用蜜一斤同熬成膏為用甚妙薄荷葉槐角爁各五兩牽牛子爁二錢甘菊花青橘皮半夏湯洗七遍葳靈仙洗白礬炮過貝母去心炒黃知母各一兩右為末以皂角膏搜和為丸如梧桐子大每服二十丸食後生薑湯下如治痰實咳嗽用蛤粉韲汁湯下手足麻痺用生薑薄荷湯下語澀涎盛用荆芥湯下偏正頭痛夾腦風用薄荷湯下愈風餅子出儒門事親治諸風疾川烏半兩炮製川芎甘菊白芷防風細辛天麻羌活荆芥薄荷甘草灸各一兩右為細末水浸􅔻餅為劑揑作餅子每服三五餅子細嚼茶酒送下不拘時候仙酒方一名竇侍御遇仙酒出衛生家十方治諸風疾并大風偏風牛膝洗淨細切秦艽去裂文桔梗去蘆防風去蘆羌活去蘆細研晚蠶沙淨洗炒已上各二兩牛蒡根一斤去粗皮細切枸杞子二升牛蒡半斤大麻子一升洗淨蒼术一升洗淨去粗皮磁器內蒸熱用右為糯米酒二斗於磁器內浸藥封口第七日開封勿令面近瓶口恐藥氣觸人眼目每服一盞空心服日進三服溫服之忌濕麵魚三月勑送御藥院附靈寶上方更加天麻半斤洗淨枳殼二兩揀淨當歸三兩地黃二兩同前藥浸酒勿令斷絶常令面有酒色甚者不過一斗前監察御史西京留守竇文炳染偏風疾手足拘攣半身不遂蒙恩藥不愈訪求醫到奉仙縣有縣尉李能有此方極有神效名曰仙酒方依方浸酒一斗未服藥時令人扶䇿不能自動飲酒二升能舒手飲酒三升能伸睡飲四升五升全愈此方不敢私隱搜風順氣丸治三十六種風七十二氣去上熱下冷腰腳疼痛四肢無力多睡少食漸漸羸瘦顔色不充黃赤惡瘡下疰口苦無味增寒聳積年癥氣塊丈夫陽事絶斷女人無子嗣久患寒瘧吐逆㵼痢變成勞病百節酸痛初生小兒及百嵗老人皆可服補精駐顔踈風順氣又治大腸祕澀一名順氣丸車前子二兩半白檳榔大麻子仁微炒赤色退殼用郁李仁湯泡去皮另研牛膝酒浸二宿兔絲子酒浸焙乾研作餅晒乾入諸藥用乾山藥各二兩枳殼去穰麩炒防風獨活各一兩錦文大黃五錢半生一半熟一半右為細末煉蜜為丸如梧桐子大每服二十丸酒茶米飲湯送下百無所忌早辰臨卧各一服服經一月消飲二月去腸內諸宿滯三月無倦少睡四月精神強勝五月耳目聰明六月腰腳輕健一年百病皆除老者返少孕婦勿服如服藥覺臟腑微動以羊肚肺羮補之久患腸風便血用藥治之除根如顫語蹇澀及癱瘓授此方隨至平復若酒後老少能餌一服宿食物消盡百病不生無病不治一方陳蔔葡子炒木香二兩茱萸一兩去核一方加山茱萸一方用當歸一方作餅晒乾為泥木香一兩天麻丸治風氣癱緩等疾天麻二兩玄參防風去蘆地榆乾浮萍紫背者洗焙乾薄荷烏頭炮製去皮臍牛膝酒浸切焙各一兩不蚛肥皂莢五梗就地坑內燒成黑灰以磁碗內合定桂半兩細研入諸藥牛黃龍腦各一錢别研入右除别研外搗羅為細末共和勻煉蜜和搗百餘下丸如雞頭大每服一丸溫嚼下小續命湯治卒中風欲死身體緩急口眼不正舌強不能語奄奄忽忽神情悶亂歷觀此湯治諸風不拘病之輕重表裏深淺服之皆驗不令人虛方見中風類烏金煎出聖惠方治一切風黑豆五升桑樹東南枝錢眼內穿得過者三斤銼用生薑半斤切已上三味以水二斗煮至一斗濾去滓放鍋中以慢火熬至三升入後藥末牛膝去苗赤箭附子去皮臍羌活桂心防風去蘆頭木香大麻仁已上各二兩右搗羅為末入前煎中用慢火熬以栁木箆攪勻看稀稠得所於磁器中盛每服空心及晚食前以溫酒下一茶匙忌生冷豬雞毒魚大蒜治風無問新久及偏枯頑痺不仁肢節緩急宜服此浸酒方出聖惠方茵芋狗脊川烏頭炮製去皮臍天麻附子炮製去皮臍各二兩獨活三兩躑躅一兩微黃天雄二兩炮製去皮臍牛膝三兩去苗防風三兩去蘆頭桂心半兩右件藥細搗和勻以生絹袋盛用好酒二斗浸十日每服溫飲一盞日三服以效為度忌生冷毒魚雞狗鵝鴨肉烏頭摩風膏出聖惠方治風頑痺腰腳不遂四肢拘攣并馬墜疼痛不可忍及白癜諸瘡兼腳氣等烏頭附子並生用當歸各二兩羌活細辛桂心半兩防風去蘆頭白术川椒吳茱萸各一兩豬脂一斤臘月者若半得駝脂尤好去脂膜煎脂化去滓放冷右件藥並細切如大豆頭醋微淹之經一宿煎豬脂化去滓內藥慢火煎之候附子黃色即膏成收磁合中有風者頻取摩之宜用衣遮護避風冷金牙酒出千金方療積年八風五疰舉身嚲曳不得轉側行步跛不能收攝又暴口噤失音言語不正四肢背脊筋急腫痛流走不常勞冷積聚少氣乍寒乍熱三焦不和脾胃不磨飲澼結實逆害飲食酢咽嘔吐食不生肌醫所能治之金牙碎米粒用小絹袋盛地膚子無子用薑一方用蛇床子乾地黃蒴藋根附子防風細辛芥草細各四兩蜀椒各四合羌活一斤一方用獨活右㕮咀盛以絹袋用酒四斗於磁缶中清密蓋頭勿令泄氣春夏三四秋冬六七宿酒盛去滓日服一合此酒無毒極可小醉常令酒氣相接不一劑病無不愈又令人肥健酒盡自可加諸藥各三兩惟蜀椒五兩用酒如前勿加金牙也冷加乾薑四兩服此酒勝炙刺治三十諸風嚲曵神驗肘後背急用升麻乾薑各四兩人參二兩石斛牛膝各四兩五兩不用蒴藋根為十四味蘇恭不用地黃為十三味一方用蒺䔧四兩黃茋三兩胡哈用續斷四兩為十一味千金翼用茵芋四兩芥草灌酒出聖惠方除風氣通血脈益精華定六腑眀耳目恱澤顔色頭白更黑齒落更生服藥二十日力勢倍六十日志氣充盈八十日能晝夜百日致神明房中強壯如三十日時能引弩年八十人服之亦當有子病在腰膝藥悉主之天雄二兩生用啇陸根躑躅蜀椒各一兩烏頭一枚大者附子五枚桂心白斂茵芋乾薑各三兩右㕮咀以絹袋盛酒三斗漬春夏五日秋冬七日去滓初服半合稍加至兩三合搗滓為散酒服方寸匕日三以知為度夏日恐酒酸以油單覆之下井中近水冷不酸也一方無啇陸桂心為八味一方無啇陸有牛膝名天雄浸酒方忌生冷雞豬肉豆豉烏藥順氣散出三因方治男子婦人一切風氣攻疰四肢骨節酸痛遍身頑麻頭目眩暈及療卒中風手足癱瘓語言蹇澀筋骨拘攣又治腳氣步履難腳膝軟弱婦人血風老人冷氣上攻胸臆兩肘刺痛心腹膨脹吐㵼腸鳴先宜多服此藥以踈氣道然後隨證投以風藥麻黃去根節陳皮去穰烏藥去木各二兩白殭蠶去絲嘴炒川芎炒枳殼去穰麩炒甘草炒白芷桔梗一兩乾薑炮半兩右為細末每服三錢水一盞半生薑三片棗一枚煎至七分溫服如四時傷寒增寒吐熱頭痛肢體倦怠加蔥白三寸同煎併服出汗見效如閃銼身體疼痛溫酒服遍身瘙癢抓之成瘡用薄荷三葉煎服孕婦不可服常服踈風順氣黑神丸出和濟方治一切風疾及癱瘓風手足顫掉渾身麻痺肩背拘急骨節疼痛兼療婦人血風頭旋眼暈精神困倦牡丹皮白芍藥川芎草烏炮各六兩麻黃去節各四兩赤芍藥甘草各十兩荆芥烏頭八兩何首烏米泔浸切焙十二兩右為細末水糊為丸如雞頭大每服一丸細嚼茶酒任下不拘時婦人血風流注用黑豆淋酒下小兒驚風用金銀湯下傷風咳嗽酒煎麻黃下頭痛蔥下搜風丸一名人參半夏丸出儒門事親治諸風疾人參茯苓南星各半兩蛤粉二兩半夏乾生薑銼白礬銼水石各一兩薄荷半兩藿香一分右為細末水丸如豌豆大每服三十丸生薑湯下之嗅藥下卧丸出瑞竹堂方治一切風疾藿香石藋花黃者人參藜蘆去苖葉取根芍藥穀精草苦丁香石膏研川芎甘草右等分為細末每用三字口噙水左右鼻內搐之作涕為效櫻桃丸治手足一切風疾川烏一隻大者生用去皮羌活一兩麝香五分另研腦子五分另研草烏半錢去皮生用川獨活一兩當歸一兩半去蘆海桐皮一兩半去皮一兩淨葳靈仙一兩半去蘆一兩淨硃砂一兩細研一半為衣一半入藥用右為粗末煉蜜為丸劑如鐵臼內杵二千餘下以不粘口為度丸如櫻桃大硃砂為衣每服一丸細嚼溫酒咽下食前卧服再合寧心丹治一切風白茯苓二兩山藥一兩半防風一兩羌活一兩川芎半兩香附白者二錢殭蠶二錢天麻半兩甘草一兩全蝎二十一枚右為細末煉蜜為丸如梧桐子大每服四十丸用溫酒下或棗湯亦得鐵彈丸治風濕筋骨軟弱癱瘓一切風疾並皆治之乳香沒藥木鱉子白附子虎骨各二兩麝香二錢全蝎三兩麻黃去根節三兩草烏三兩自然銅一兩三錢右為細末用墨汁一錠磨汁為丸一兩作十丸用酒開服黑附子丸治癱瘓中風及婦人血風等疾附子去皮臍生烏頭去皮臍生虎脛骨塗酥炙五靈脂炒防風去蘆桂去粗皮海桐皮銼地龍炮狼毒生去蘆頭用豬血浸一宿炙乾用自然銅煆醋滓七次各四兩右為細末煉蜜丸如雞頭大每服一丸爛嚼溫酒下空心日午臨卧服通明赤丸治中風癱緩并柔風一切風疾烏蛇去頭骨去皮不用麻黃去根節白殭蠶各一兩白附子生用半夏湯浸去滑乾蝎炮天南星附子去皮臍各半兩麝香一分右並生用搗為末以湯浸槐膠研和為丸如大麻子大以生絹袋盛不得置合內亦不得以火焙常服每日空心薄荷酒下三丸微嚼破服覺藥衝煨甘草噙之如中風急以濕薄荷酒磨下五丸或七丸服之小兒中諸風癎或天弔風等以母乳磨一丸或兩丸量力服之天麻防風丸出直指方治一切諸風人參天麻防風各一兩全蝎炒半兩硃砂研雄黃研甘草炙各五分直殭蠶研半兩牛黃一錢麝香右為細末煉蜜為丸如梧桐子大每服二丸紫蘇薄荷湯下洗藥治一切諸風大風殼香白芷荆芥苦參何首烏川椒防風蒼耳草麻黃蔥連根右用水桶煎藥湯取溫暖處浴再煎滓添洗用被蓋覆取汗出不可見風太一丹出傳信適用方治諸風及癱瘓偏風手足頑麻肢節緩弱骨脊疼痛并治頭風偏正頭痛項頸拘急頭旋目暈嘔吐痰水或耳鳴聾閉風痰上盛及療傷寒頭痛不可忍者並宜服之常服消化痰清頭目利胸膈川芎川烏去皮尖草烏去皮尖白芷白附子黑附子去皮臍細辛去葉洗半夏洗天南星洗天麻洗右等分並生用細末如藥二十四兩即入麵二十兩白者同拌勻滴水和丸如彈子大日中照乾每服一粒茶酒任嚼下荆芥薄荷茶亦得如傷寒傷風頭目昏疼用蔥白一莖同嚼熱茶清送下不計時候此藥用之甚妙大聖一粒金丹一名併命出和濟方治男子婦人一切風疾氣血俱虛隂陽偏撩卒暴中風僵仆昏塞涎潮搐搦不省人事失音項強手足嚲曵口眼喎斜癱瘓偏枯半身不遂語言蹇澀舉止錯亂四肢麻痺癲癎倒地目瞑不開涎盛作聲角弓反張目睛直視口噤悶絶牙關緊急風搏陽經目眩頭痛耳內蟬鳴皮膚􅏌搐多困喜睡項強拘急不能四顧腎臟風腳膝疼痛步履艱難遍流注一身屈伸不得此藥無問新久並治之有風疾常服尤佳補益五臟祕固真元通流關節袪除風邪壯筋續骨大效白礬别研枯硃砂别研沒藥别研麝香淨內各半兩五靈脂去石白殭蠶炒去絲白蒺䔧炒去刺各一兩大川烏頭去皮尖大黑附子並炒去皮臍新羅白附子炮二兩各為末右為細末合和用粉煙墨半兩井花水磨下汁搜丸每兩作六丸用金箔二百片為衣窨乾每一丸用生薑半兩取自然汁磨化用無灰酒暖熱半盞同藥溫服量病人酒性多少更喫溫酒一升二升投之以助藥力次用衣被蓋覆使卧汗出為效熱輕者半丸不拘時候葉氏於本方中去麝香增天麻防風乳香減沒藥硃砂白礬各一分餘依本治一切風及頭面諸風皮膚不仁癮疹手足頑麻名萬金丹一法於方前四味減半後六味等分製料服􅀈之法並同如病勢危急不睱求薑酒以白湯磨先擦牙齦牙關寬便可灌藥下即蘇亦名大聖一粒金丹本方中增防風一兩全蝎一分治中風癱瘓流涎不語手足麻痺痛癢不知名大聖鎮風丹一方有殭蠶孕婦不可服龍腦方出聖惠方治一切風龍腦一分細研雄黃半兩細研硃砂一分細研阿膠一分搗砂炒令黃燥丁香一分天南星一分炮製好墨半錠牛黃一分細研天竺黃一分細研右搗羅為末研令勻取三月三日以末蜜和丸如豇豆大每服以熱酒研一丸服之烏頭湯出千金方治八風五尸惡氣逰走心胸流出四肢來往不住短氣欲死烏頭芍藥乾薑桂心細辛乾地黃當歸吳茱茰甘草各二兩右㕮咀以水七升煮取二升半分三服清神散出和劑方消風壅化痰涎治頭目昏眩心忪面熱腦痛耳鳴鼻塞聲重口眼瞤動精神昏憒肢體疼倦頸項緊急心膈煩悶咽嗌不利檀香銼人參去蘆防風去苗各十一兩薄荷去土荆芥穗去土甘草爁各二十兩石膏研四十兩細辛去苖洗焙用五兩羌活去苗一十五兩右為細末每服二錢沸湯點服或入茶末點服亦得食服追風散出和劑方治證與前追風散同白殭蠶去絲嘴炒全蝎甘草荆芥各二兩川烏炮去皮臍防風去蘆頭石膏研各四兩川芎三兩麝香研一兩右為細末每五分好茶調下食後臨卧服常服清頭目利咽膈消風壅化痰涎磁石丸出仁存方治一切癱瘓暗風等疾磁石一兩石燕各一兩石碌半兩並煆醋淬七次雄黃輕粉硃砂牛黃各半兩麝香二錢右細研以好酒磁器內熬之可丸則丸入麝香一處丸如雞頭大每服一丸荆芥薄荷酒化下如是大患風涎暗風昏迷不省者更入輕粉少許白礬半錢研用藥二丸磨盡作一服灌下便安服後便安服後有汗見效三日一服小兒一丸分三服定風餅子出醫方大成治風客陽經邪傷腠理背膂強直口眼喎斜體熱腰寒痰厥頭目疼痛肉瞤筋愓辛額鼻塞及飲酒過多嘔吐痰沫頭目眩暈如坐車船常服解五臟傷寒辟霧障氣爽惠神志諸風不生天麻川烏炮南星炮半夏炮川薑川芎白茯苓甘草防風右等分用生薑汁為丸如龍眼大揑作餅子硃砂為衣每服一餅細嚼薑湯下不以時候但不當生用仍須炮製預服最防風痰一方無防風大省風湯治諸虛風涎潮痰瘚神昏頭暈語澀手足搐搦半身不遂及歷節風痛筋脈攣急川芎半夏防風各一兩甘草炙半兩全蝎去毒三個附子生用皮臍川烏去皮臍木香南星各半兩右銼散每服四錢水一盞半生薑十片煎溫服不拘時候氣虛加沉香氣逆加紫蘇胸膈不利有痰倍加半夏人參頭暈頭痛加天麻半兩全蝎二錢煎熱入麝香熱風左癱右瘓口眼喎斜口噤不能言手足頑麻於本方去附子川烏一方無防風五粒松酒浸方出聖惠方冬十月以法服大治諸風五粒松葉七片並大片麻黃七兩去節防風黃耆獨活炮秦艽各二兩牛膝四兩生地黃一斤芎藭二兩右以無灰清酒四大斗漬春七日冬二十日夏五日取酒服之大有效驗忌如藥法一方無芎藭黃耆有天雄肉桂加味苦參丸治一切風證苦參一斤荆芥半斤何首烏白殭蠶二兩香白芷川芎二兩赤芍藥二兩大黃一兩加白花蛇右為細末麵糊為丸如梧桐子大每服五十丸不拘時候溫茶清下又方出聖惠方白附子一兩炮製白殭蠶乾蝎一兩半微炒蟬殼半兩天麻一兩羌活一兩防風一兩去蘆頭側子一兩炮製去皮麻黃右為末煉蜜和丸如菉豆大以膩粉滚過令乾如中風不語重者以暖酒研下十丸當有汗出即差如常服即空心溫酒下五丸太白丹出聖惠方治一切風鹿角霜半兩磁藥七兩燒令通赤候冷搗羅細研水飛過蛤粉七兩天南星三兩炮製白蒺藜三兩微炒去刺蛜􅀈三兩微炒麝香一兩半細研川烏頭二兩生用去皮臍白花蛇肉酒浸三兩炙微黃右為末入麝香研令勻以麵糊和搗五七百杵丸如雞頭大每服以豆淋酒研下一丸龍腦丸出聖惠方治一切風龍腦一分細研麝香一分細研硃砂半兩細研天南星一分炮製白附子一分炮製半夏一分湯洗七遍去滑甘草一分炙微赤銼附子半兩炮製去皮臍川烏頭一分去皮臍炮製去滑右為末以糯米粥和丸如菉豆大每服以溫酒下三丸獨活酒浸方出聖惠方治八風十二痺獨活四兩石南四兩防風三兩去蘆頭茵芋附子炮製去皮臍川烏頭炮製去皮臍天雄炮製去皮臍桂心一兩半牛膝去苗已上各一兩右細銼以生絹袋盛用好酒二斗漬經七日隨性溫飲一小盞勿令大醉以效為度經效鼠粘根浸酒方出聖惠方治風鼠粘根五斤掘時勿令見風密房內淨洗薄切密甕內隂乾防風五兩去蘆頭附子二兩炮製去皮臍獨活五兩漢防己二兩桂心二兩天麻二兩麻黃二兩去根節生地黃八兩右細銼用生絹袋盛以無灰酒三斗浸之密封春夏七日秋冬二七日開每日空心服日午夜卧各溫飲一小盞桑枝浸酒方出聖惠方治風花桑枝一斤垂栁枝一斤槐枝一斤羌活三兩牛膝三兩去苖黑豆一升炒熟附子三兩炮製去皮臍桂心三兩熟地黃三兩右細銼和勻以生絹袋盛用好酒五斗浸經七日後每日飲前後任性暖飲一二小盞不得令過度但醺醺然長有酒氣為妙忌生冷毒魚豬肉天腦天麻煎出和劑方治一切風及癱緩風半身不遂口眼喎斜語澀涎盛精神昏憒或筋脈拘攣遍身麻痺百節疼痛手足顫掉及腎臟風毒上攻頭面虛腫耳鳴重聽鼻塞口乾痰涎不利下疰腿膝緩弱腫痛生瘡又治婦人血風攻疰身體疼痛面浮肌瘦口苦舌乾頭旋目眩或皮膚瘙癢癮疹生瘡暗風偏正頭疼並皆治之甜瓜子湯洗令淨浮萍草揀洗淨川烏炮去皮臍地魚去苗刮削令淨黑參洗淨焙各五十兩天麻去苗一百兩已上為細末用雪水白沙蠶各一十斤零十兩同化開用絹袋子濾過銀石器內慢火熬成稠膏生龍腦研八兩麝香研四兩右為細末除麝龍外用天烏頭膏和搜令勻放冷入龍麝再搜令勻入臼內搗千百杵搓為錠子每服一皂莢子大與薄荷同嚼茶酒任下不計時候治癱緩風併服見效如破傷風黑豆淋酒下須發汗用煨蔥熱酒併三服常服亦得八風丹出和濟方治諸風及痰熱上攻頭痛面赤目眩旋運鼻塞咽乾頸不利痰涎唾稠濁精神如醉百節疼痛耳內蟬鳴面上遊風口眼蠕動滑石細研天麻酒浸各一兩龍腦研麝香研各一兩白殭蠶微炒白附子炮各半兩半夏白礬製二兩凝水石火燒通赤細研水飛半兩右為細末入研者藥同研勻煉蜜和丸如櫻桃大每服一丸細嚼溫荆芥湯下茶清亦得食後服洗澡藥出御藥院方治淋滯一切諸風燥癢葳靈仙去土藁本去土藿香葉乾荷葉各十二兩零陵香炒茅香各十六兩甘松去土香白芷各八兩右為細末每用二兩生絹袋盛用水二桶約四斗煎三沸放稍熱放無風處淋泄了避風少時常用治遍身瘙癢光潤皮膚如水少時更添熱水斟酌得所使用只令添水藥末不添大辰砂丸出醫藥大成方淸頭目化痰涎利咽膈手足麻木肢節疼痛鼻塞聲重頭昏目眩項背拘急皮膚瘙癢卒生疹癮冒觸風寒服之天麻去苗川芎甘草炙硃砂為衣吳白芷各一兩防風去蘆頭細辛去苗葉土薄荷葉各半兩右為細末煉蜜丸如彈子大硃砂為衣每服一丸細嚼食後生薑湯下茶淸亦得龍腦川芎丸出御藥院方消風除熱化痰消滯通利七竅爽氣清神薄荷去土五兩三錢川芎甘草微炒防風去蘆頭桔梗一兩半龍腦研六錢縮砂仁二錢白豆蔲仁半兩右為細末入研藥勻煉蜜為丸每服二丸細嚼溫茶清送下食後服之每兩可作二十丸防風湯出儒門事親治諸風疾防風麻黃獨活秦艽去苖黃芩石膏當歸去蘆白术各三兩右為粗末入半夏片子令攪勻每服四錢水二中盞入生薑七片煎至一盞去滓取清汁六分入麝香少許帶熱食後服清風散出儒門事親治諸風疾川芎羌活去蘆人參去蘆白茯苓去皮白殭蠶炒蟬殼去土各一兩厚朴去粗皮薑製陳皮去白各半兩右為細末每服二錢茶清調下拒風丸治風客陽經邪傷腠理背膂強直口眼喎斜體熱惡寒痰厥頭目疼痛肉瞤筋惕辛額鼻淵及飲酒過多嘔吐痰沫頭目眩暈如坐車船常服解五臟傷寒爽神志諸風不生南星炮半夏炮各二兩川芎防風羌活獨活藁本細辛各一兩右為細末薑糊為丸如梧桐子大每服三十丸薑湯下食後服之真方白丸子治風可常服永無風疾隔壅之患大半夏湯炮七次白附子洗淨略炮天麻天南星洗淨炮用川烏頭去皮尖炮全蝎去毒炒枳殼去穰炒木香各一兩右為細末生薑自然汁打糊為丸如梧桐子大每服一二十丸食後臨卧茶清熱水送下癱瘓風溫酒下三日服小兒驚風薄荷湯下二丸解語湯治中風客於心脾二經舌強不能言半身不遂口眼喎斜神氣不清一切風氣並皆治之附子炮防風去蘆天麻一方用赤箭酸棗仁炒各一兩羚羊角屑官桂各七錢半甘草炙羌活各半兩右為粗末每半兩水二盞煎八分去滓入竹瀝兩匙再煎三兩沸溫服無時二滓併煎一方專治中風卒失音有赤箭無天麻名桂心散靈寶丹治一切諸風癱瘓傷風等疾川烏去皮尖略炮五靈脂各三兩沒藥一兩半胡椒半兩木香炮乳香研硃砂研麝香各一分和硃砂為衣右前五味為細末擇辰日時取東方井水入乳香末和前藥末為丸如豆大將硃砂麝香為衣每服一粒生薑二片同嚼茶酒任下不拘時如傷風頭痛及胎風荆芥湯下龍腦雙丸治一切風天南星湯浸軟洗切焙半夏湯洗七次去滑切焙各半兩胡粉膩粉各一錢麝香龍腦各一分四味同研白殭蠶酒炒各分二味晒末右研勻稀糯米糊丸如皂子大每服一丸或二丸嚼破溫酒下如急風口噤用青蔥筒子灌於鼻內口立開大效蝎麝白丸子治男子婦人半身不遂手足頑麻口眼喎斜痰涎壅塞及一切風他藥不能治者小兒驚風大人頭風洗腦風婦人血風半夏七兩川烏一兩白附子二兩天南星三兩天麻一兩全蝎五錢防風一兩生麝香五分右為末薑汁糯米糊丸如桐子大每服一二十丸淡薑湯下無時吞下癱瘓風溫酒下三日服一二日當有汗便能舒展經三五日類呵欠是應常服除風化痰治膈壅小兒驚風薄荷湯下三兩丸又方治一切風天麻天南星炮製白附子炮製白花蛇肉酒浸炙微黃附子炮製去皮臍白殭蠶微炒已上各一兩膩粉一分麝香一分右為末研入麝香膩粉煉蜜和搗二三百杵丸如梧桐子大以胡粉滚過每服以溫酒下三丸忌毒滑物又方白附子一兩炮製天麻一兩雄雀糞一兩天南星酒拌炒令黃麝香細研乾蝎微炒水銀已上各一分以小棗穰研令星盡牛黃細研右為末研入水銀令勻以棗穰和丸如菉豆大入膩粉中滚過曬乾每服以溫酒下三丸百靈牛膝煎治一切風不以近逺服之皆效百靈藤五斤細銼以水三斗煎至一斗濾去滓更煎三升牛膝去苖附子去皮赤箭仙靈脾何首烏鹿角膠乳香已上各二兩右為末入煎中别入白蜜五合同熬以栁木箆攪令勻如稀湯上收於磁器中每服以溫酒調下一茶匙空心及晚食前服忌毒滑物七生丸治丈夫婦人三十六種風五般腰疼打撲傷損並入骨疼痛背膊拘急手足頑麻走疰不定筋脈攣縮久患風疾並皆療之地龍去土五靈脂去石松脂去木荆芥去枝梗川烏炮去皮臍天南星炮各一兩草烏炮去皮尖各二兩右為末醋煮麵糊為丸如梧桐子大每服五丸至七服茶湯任下孕婦不可服溫酒送下亦可川芎散治諸風疾川芎荆芥甘菊薄荷蟬殼蔓荆子各二兩甘草一兩炙右為細末茶酒任下二三錢食後服愈風丹出瑞竹堂方治諸風證偏正頭風通聖散四物湯黃連解毒湯各一料加後藥羌活細辛去葉甘菊天麻何首烏薄荷獨活已上各一兩右為細末煉蜜為丸如彈子大每服一丸細嚼不拘時侯茶酒下靈龍丹治一切風疾麝香一兩乳香五兩地龍五兩白膠香七兩烏頭五兩木鱉子十二兩五靈脂四十兩右為極細末酒糊為丸如彈子大每服一丸酒化服之用辰年辰時生人修合防風湯出濟生拔萃方治風寒汗出肩背痛中風小便數而欠者風熱盛使肺氣鬱甚也當㵼風熱以通氣柴胡升麻黃耆各一錢羌活防風橘皮人參甘草各半兩青皮黃蘖白豆蔲已上各二分藁本三兩右㕮咀都作一服水二盞煎至一盞去滓溫服食後氣甚者宜服面白脫色氣短者勿服之小便遺失者肺氣虛也宜安卧飬氣禁勞役以黃耆人參之類補之不愈當清其熱加黃蘖地黃肩背痛不可回顧此手太陽鬱而不行風藥散之如或目痛項強腰似拔上衝羌活勝濕湯及足太陽經不行也以羌活勝濕湯主之羌活勝濕湯出濟生拔粹方羌活一錢獨活一錢藁本防風各半兩蔓荆子三分川芎二分甘草炙五分右㕮咀都作一服水二盞煎至一盞去滓溫服食後如身重腰沉沉然乃經中有濕熱也更加黃蘖一錢附子半錢蒼术二錢如腿腳沉重無力者加酒洗漢防己半錢輕則附子重則川烏頭少許以為引用而行經也如卧而多驚小便淋溲者邪在少陽厥隂亦用太陽經藥更加柴胡半錢如淋加澤㵼半錢此下焦風寒二經合病也腎肝之病同一治焉但在下焦非風藥行經不可也如大便後有白膿或只便白膿者因勞役氣虛傷大腸也以黃耆人參湯補之如裏急頻見者血虛也更加當歸如肺脹膨而喘咳胸髙氣滿而上奔者多加五味子人參次之麥門冬與黃連少許如甚則交兩手而瞀者真氣散加黃連五味子參黃芩桔梗甘草各半錢如耳鳴目黃頰頷腫肩肘臂外後亷痛面赤脈洪大者以羌活防風甘草藁本通經血加黃芩黃連消其腫以人參黃耆益其原氣而如脈緊者寒也或面白善嚏或面色惡皆寒也亦加羌活四味足太陽不用連芩少加附子以通其脈面色惡多恐者更加桂附如便白膿少有衣者氣脫加附子皮如泄加米殼如氣澀者有甘藥補氣安卧不語以飬其氣知母湯出本事方治遊風攻頭目或四肢作腫塊知母一兩麻黃黃耆甘草獨活白术枳殼各半兩右為粗末每服四錢水一盞半牛蒡百粒研碎煎至七分溫日三服覺冷不用牛蒡子苦參丸治一切諸風荆芥防風何首烏蔓荆子葳靈仙菖蒲苦參右煎六味各等分參加一倍㕮咀為細末酒糊為丸如梧桐子大每服三四十丸臨卧鹽湯送下茶清湯亦可别無所忌常服諸瘡疾不生大有神效烏金浸酒方出聖惠方治風黑豆二升緊小者炒熟搗碎防風去蘆頭桂心附子炮製去皮臍羌活已上各二兩熟乾地黃三兩烏雞糞堆者以大麻子取子餵籠七日後一兩右為細銼和勻入於生絹袋中用好酒二斗磁甕子中重湯緩煮候藥甕子內有香氣即止每日三度溫飲一小盞川芎丸消風壅化痰涎利咽膈清頭目治頭痛旋暈心忪煩熱頸強急肩背拘倦肢體煩疼皮膚瘙癢目痛面上遊風如蟲行相似川芎龍腦薄荷葉焙乾各七十五兩細辛洗五兩防風去苗二十五兩桔梗一百兩甘草爁三十五兩右為細末煉蜜搜和每一兩半分作五十丸每服一丸細嚼茶下食後臨卧薄荷煎丸消風熱化痰涎利咽膈清頭目治遍身麻痺百節疼酸頭昏目眩鼻塞腦痛語言聲重項背拘急皮膚瘙癢或生疹及治肺熱口腥脾熱口甜膽熱口苦又治鼻衄唾血大小便出血及脫傷風并沐浴後並服之龍腦薄荷取葉十片防風去苖川芎各三十兩縮砂仁五兩桔梗五十兩甘草炙四十兩重右為末煉蜜丸每服作三十丸每服一丸細嚼茶酒任下加減三五七散治八風五痺癱瘓嚲曵口眼喎斜眉角牽引項背拘強牙關緊急心中憒悶神色如醉遍身發熱骨節煩疼腰膝不仁皮膚瞤動或如蟲行又治陽虛頭痛風寒腦目旋運轉有似舟車之上耳內蟬鳴或如風雨之聲應有風濕痺腳氣緩弱疾並能治之又名大三五七散山茱萸乾薑炮茯苓去皮各三兩附子炮去皮臍三十五箇細辛一斤八兩防風去蘆四斤右為細末每服二錢溫酒調下食前一方天雄細辛各三錢乾薑山茱萸各五錢山芋防風各七錢大醒風湯治中風痰厥涎潮昏運手足搐搦半身不遂歷節疼風筋脈攣急並皆治之南星生八兩防風生四兩附子去皮臍生獨活全蝎微炒甘草生各二兩半右㕮咀每服四錢重水二大盞生薑二十片煎至八分去滓溫服不拘進二服活絡丹治丈夫婦人元臟氣虛婦人脾血久冷諸風溫毒之氣留滯經絡流注腳手筋脈攣拳或發赤腫行步艱辛腰腿沉重腳心弔痛及上衝腹脅脹胸膈痞悶不思飲食衝心悶亂及一切痛風走注遍身痛川芎炮製去皮臍草烏炮製去皮臍地龍去土天南星炮各六兩乳香研沒藥研各二兩二錢右為細末入研藥和勻酒糊為丸如梧桐子大每服二十丸空心日午冷酒送下荆芥亦可追風應痛丸治一切風疾左癱右瘓半身不遂口眼喎斜牙關緊急語蹇澀筋拘攣百骨疼上攻下疰遊走不定腰腿沉重耳鳴重聼膝緩弱不得屈伸步履艱難遍身麻痺皮膚頑厚又婦人血風攻疰身體疼痛面浮肌瘦口苦舌乾頭旋目眩昏困多睡或皮虛瘙癢癮疹生瘡暗風夾腦偏正頭疼並治之葳靈仙狗脊去毛各四兩何首烏川烏炮去皮臍各六兩乳香研一兩五靈脂酒浸淘去沙石晒乾五兩半右為末酒糊為丸每服十五丸加至二十丸麝香溫酒吞下只溫酒亦可食稍空服常服輕身體壯筋骨通經活絡除濕去風孕婦不可服新補菊葉湯治一切風頭目昏眩嘔吐面目浮腫菊花去梗羌活獨活旋覆花牛蒡子甘草各等分每為末每服二錢水一盞生薑三片同煎至七分去滓溫服食後當歸川芎散治風疾一方治壅頭目昏眩痛悶筋脈拘倦手足麻痺兼保護胎氣調和榮衛當歸川芎各半兩甘草二兩黃芩四兩薄荷一兩縮砂一分右為細末溫水調一二錢食後日三服踈風丸治諸風疾通聖散一料加天麻羌活獨活細辛甘草首烏各半兩右為細末煉蜜和丸如彈子大每服硃砂為衣每服一丸細嚼茶調下皂角六一丸出危氏方踈風活血起癱瘓除腳疾烏鬚駐紅顔肌肉不緊實風證切宜此藥服之川芎草烏各一兩天台烏藥二兩烏梅乾癟者去核五十箇豬牙皂角五挺湯泡去皮弦烏豆一升右銼如脂面大用無灰酒釅醋各二浸一宿磁瓦銚內慢火煎乾取出晒焦揀何首烏一味别為末煮膏以六味焙乾碾末以前煮藥餘酒醋及何首烏膏為丸每服三十丸酒下六聖散川芎石膏雄黃乳香沒藥二錢盆硝半兩右為細末噙水搐之亦治眼昏冷淚頭風咽嗌鼻塞語沉一搐牙疼便定拒風丹出和濟方治一切風川芎四兩防風一兩半天麻一兩去蘆甘草一兩銼細辛三錢半蓽撥半兩右為細末煉蜜和丸作杵每服一丸細嚼荆芥湯或溫酒下尋常些小傷風頭痛鼻塞強筋急皆可服然暴喜傷陽暴怒傷隂憂愁不樂氣多厥逆往往多得此疾便涎潮昏塞牙關急緊痛若概作中風證用藥非止不相當多致殺人忽有人一日氣厥牙噤有潮醫者作中風以大通丸三粒下之下數行一夕而亡豫常痛恨每見此證急化蘇合香丸四五粒灌之便醒然後隨其虛實寒熱而調治之無不愈經云無故而瘖脈不至治自己謂氣暴逆也氣復則已審如是雖不服藥亦可得平治作口眼喎斜次則涎潮閉塞左右共灸十二穴者謂聼會頰車地倉百會肩隅曲池風市足三里絶骨髮際大椎風池也依而用之無不立效若病因驚恐肝臟為邪來乘邪陽明之經即胃是也邪盛不畏勝我者又來乘肺肺緣久病氣弱全無德受肝凌侮其病時復頭眩瘈瘲搐掣心胞伏涎久之則害脾氣要當平肝氣使歸經則脾不受尅脾為中州土中四肢一本之事脾氣正則土生金旺則肺安矣今肺不安時覺氣中衝者是侮脾不受侮故有此上衝肝勝則復受金尅故搐弱也以熱藥治之則風愈甚以冷藥治則氣虛也肺屬金金為清化便覺藏腑不調今用中和溫藥抑肝補肺漸可安愈今心忪非心忪也胃之大絡名曰建絡胸膈及兩乳間虛而有疾則動建須時發一陳熱者是其候也服續斷湯茱萸丸獨活散下三方一月而愈思和名醫寓真儀時人少知者後至都下聲名籍甚為醫官政和中度為黃冠終藥珠佩囊續斷湯出本事方治一切風方見風腳疼痛類薯蕷丸出本事方治一切風薯蕷人參逺志防風真珠母紫石英研飛水茯苓虎骨各一兩虎睛銼二味須真者龍齒華隂細辛石菖蒲五味子丹參各一分右為細末煉蜜為丸如梧桐子大每服三十丸至五十丸金銀薄荷湯下食後臨卧一方有砂參獨活散出本事方治一切風川獨活白术白茯苓葳蕤柏子仁甘草各一兩犀角川椒熟乾地黃枳殼官桂各半兩人參右為細末每服二錢水一盞生薑三片棗一箇同煎至七分不拘時候服之生地黃飲子療一切風及偏風發四肢口眼喎戾言語蹇澀其陽不虛人勝於續命湯宜老人服之生地黃汁竹瀝荆瀝以上三味各取汁一升五合羌活防風各二兩蜀附子大者一枚生用去皮八九研重一兩者有神右切內前三味瀝汁中寬火煎取一升五合去滓溫服分二服相去八九里風甚頻服六劑驗不可論特宜老人無問冬夏並同服之無忌隔三日服一劑亦甚佳忌豬肉蕪荑黑神丸治風不計急慢並主之方硫黃硃砂水銀雄黃已上俱半兩細研已上四味先用硫黃雄黃於銚子內銷作汁次下水銀硃砂便攪結為砂子後用磁盒子蓋上鑽一孔子似黃米大即安砂子在內便鹽泥固濟只留孔子放乾先用火半斤去盒子四面四寸已來至熱再圍四面如火放黑氣出盡便用濕紙片子搭上孔子才乾則揑至三十片為度其藥已成後令細研入後藥麻黃去根節一兩天麻半兩白附子一分炮製白殭蠶一分微炒烏蛇三分酒浸去皮骨炙微黃桂心一分乾蝎一分微炒天南星一分炮製天雄一分炮製去皮臍獨活川烏頭一分炮製去皮臍麝香一分細研右為末每石藥一兩管草藥二兩相合令勻煉搗三二百杵丸如豇豆大每服以豆淋酒嚼下三丸忌動風物普濟方卷一百十五
