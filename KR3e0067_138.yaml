令熟赤茯苓各一兩枳殼三分麩炒微黃去穰陳橘皮湯浸去白穰焙一兩右為散每服三錢水一中盞入生薑半分棗三枚煎六分去滓不計時候溫服前胡散治傷寒痰滯嘔逆肢體疼痛心胸不利前胡二兩去蘆頭人參去蘆頭澤㵼赤茯苓各一兩半夏湯洗七遍去滑甘草炙微赤銼各半兩右搗篩為散每服三錢水一中盞入生薑半分煎六分去滓不計時候溫服白术散治傷寒痰滯在胸膈間不散身體壯熱頭目昏沈胃氣不和少思飲食白术甘菊花赤茯苓人參前胡去蘆頭半夏湯洗七遍去滑旋復花已上各三分石膏一兩附子炮製去皮臍大腹皮銼甘草炙微赤銼各半兩右搗篩為散每服三錢水一中盞入生薑半分棗三枚煎六分去滓不計時候溫服旋復花散治傷寒頭痛心膈痰滯壅悶不欲飲食旋復花前胡去蘆頭白蒺䔧去刺微炒紫胡去苗枳殼麩炒微黃去穰桑根白皮銼赤茯苓已上各半兩甘草一分炙微赤銼右粗搗篩為散每服四錢水一中盞入生薑半分煎六分去滓不計時溫服枳實散出聖濟總録治傷寒痰滯胸膈煩熱頭疼不思飲食枳實麩炒微黃柴胡去苖赤茯苓澤㵼前胡去蘆頭半夏湯浸七遍去滑已上各三分甘草半兩炙微赤銼桑根白皮銼犀角屑各半兩右粗搗篩為散每服三錢水一中盞入生薑半分煎六分去滓不計時溫服七氣丸治病人素有心下兩脅結痛者此有久寒也大黃酒洗菖蒲各一兩人參桂柴胡乾薑細辛當歸半夏川椒去日炒茱茰厚朴附子二枚炮右搗篩煉蜜和丸梧桐子大酒或飲下五粒痰癖丸治少陽病脅下痛有停水者芫花苦酒浸熬乾乾薑各一兩色黑者右為末煉蜜和丸如梧桐子大飲服三粒至五粒五味子湯治病人傷中唾血脅下痛身熱不解者五味子紫苑各一兩取茸桔梗續斷竹茹桑根白皮人參知母熟地黃甘草各一兩右水六升煮取三升去滓溫服合日三橘皮湯出活人書治傷寒痰逆惡寒甘草一錢人參二錢陳皮半兩右用青季竹刮上青茹一團薑四片棗一枚水一盞煎至六分去滓熱服柴胡半夏湯出活人書治痰熱頭疼利膈除煩悶手足煩熱榮衛不調肢節拘倦身體疼痛嗜卧少力飲食無味兼治五飲消痰癖柴胡八兩半夏二兩半白术二兩甘草炙人參黃芩麥門冬去心各三兩右銼如麻豆大每服炒五錢水一盞半生薑五片棗一枚煎八分去滓溫服治傷寒後卒胸膈悶痛出本草右用枳實一味銼麩炒黃為末服二錢米飲調下一日二服普濟方卷一百三十九
