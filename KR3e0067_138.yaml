body:
  text: 普濟方卷一百三十九明周王朱橚撰傷寒門傷寒畜血論夫傷寒畜血者如血在下焦結聚而不行畜積而不散者是也血菀於上而吐血者謂之薄厥留於下而瘀者謂之畜血此由太陽隨經瘀熱在裏血為熱所搏結而不行畜於下焦之所致經曰太陽病七八日表症仍在脈微而沈反不結胸其人如狂者以熱在下焦小腹當鞭滿小便自利者下血乃愈抵當湯主之者是也大抵看傷寒必先觀兩目次看口舌然後自心下至小腹以手攝按之覺有滿鞭者則當審而治之如小腹覺有鞭滿便當問其小便若小便不利者則是津液留結可利小便若小便自利者則是畜血之症可下瘀血經曰傷寒有熱小腹滿應小便不利今反利者為有血也太陽病身黃脈沈結小腹鞭小便不利者為無血也小便自利其人如狂者血症諦也皆須抵當湯丸下之陽明病其人喜忘屎雖硬大便反易其色必黑亦是畜血之症畜血於下所以如狂者經謂熱結膀胱其人如狂者是也血瘀於下所以喜忘者內經曰血并於下亂而喜忘者是也二者若有其一則為畜血症明矣畜血之症又有輕重焉如狂者喜忘也皆畜血之甚者須抵當湯丸以下之如外已解但小腹急結者則為畜血之輕也須桃仁承氣湯以利之醫妙者何也在乎識形症明脈息曉虛實知傳變其於形症之明者衆人所共識又何以見其妙必也形症之參差衆人所未識獨先識之乃所以為妙且如病人無表裏症發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者此有瘀血抵當湯主之當不大便六七日之際又無喜忘如狂之症亦無小腹鞭滿之候當是之時與承氣湯下者多矣獨能處以抵當湯下之者是為醫之妙者也若是者何以知其有畜血也其脈浮而數者浮則傷氣數則傷血熱客於氣則脈浮熱客於血則脈數因下之後浮數俱去則已若下之後數去其脈但浮者則榮血間熱去而衛氣間熱在矣為邪氣獨留心則飢邪熱不殺穀潮熱發渴也及下之後浮脈去而數不解者則衛氣間熱去而榮血間熱在矣熱則氣合覆血乃下行胃虛協熱消穀善飢血至下焦若下不止則血得以去泄必便膿血也若不大便六七日則血不得出泄必畜在下焦為瘀血是須抵當湯下之又傷寒留畜惡血內外俱熱昏憒譫語亦有耳聾虛鳴之症與少陽經受病相似如服小柴胡湯不效當以黃連一分赤茯苓半分銼細入燈心煎與之男女通用凡大小産熱入血室小柴胡湯力所不及者於內加五靈脂仍以黃連赤茯苓湯佐之蓋心主血黃連茯苓皆清心涼血之劑所以收功若夫疏利血毒則活人書桃仁承氣湯有餘勇矣方大黃芍藥湯出聖濟總録治傷寒太陽病隨經入裏瘀熱內積畜血喜忘如狂大黃銼炒五錢芍藥牡丹皮犀角鎊生用各一兩生乾地黃兩半右銼如麻豆大每服五錢用水二盞煎至一盞去滓溫服大黃湯出聖濟總録治傷寒內有瘀血大便不利小便急痛大黃銼炒一兩桃仁湯浸去皮尖雙仁麩炒黃研半兩水蛭米炒黃一分木通半兩銼右除桃仁外粗搗篩入桃仁同研令勻每服二錢以水一盞煎至七分去滓溫服不計時候犀角地黃湯治傷寒及瘟病應發汗而不汗內畜為瘀血及鼻衄血也吐血不盡餘血停留致面黃大便黑犀角一兩生地黃八兩芍藥三兩牡丹皮二兩右㕮咀水九升煮三升分三服有熱如狂者加黃芩大黃腹不滿為無熱不可加升麻與犀角性味主治不同何以升麻代之以是知引入陽明也兼治瘡疹大成芍藥地黃湯治傷寒發熱疹出血并有積喜忘如狂鼻衄面黃大便黑者芍藥生地黃黃芩牡丹皮各五錢右以水六升煮取三升去滓溫服一升日三時行本有畜血者腹脅滿如搗傷寒舌腫脹論夫傷寒舌腫脹者病在三隂也太隂之脈連舌本散舌下少隂之脈循喉嚨夾舌本厥隂之脈循喉嚨之後又手少隂心之經其氣通於舌凡此經絡為風熱所乘隨脈至舌熱氣留於血血氣壅故令舌腫脹診其脈數急者是其候也傷寒舌腫者是熱毒傷於心脾也心侯於舌主於血血虛為熱所束又脾之大絡出於舌下若心脾有熱則令舌腫也方大黃散出聖惠方治傷寒心脾熱舌腫川大黃銼碎微炒黃連去鬚各一兩黃芩川升麻黃蘖各三錢甘草半兩生用右為粗散每服四錢水一中盞入黑豆三十粒煎至五分去滓不計時候溫服玄參散出聖惠方治傷寒上焦虛毒氣熱壅塞咽喉連舌腫痛玄參射干黃蘖各一兩右為粗散每服五錢水二大盞煎至五分去滓不計時候溫服治傷寒咽喉閉塞舌根腫痛方出聖惠方蒼耳根兩半銼甘草三錢生銼右為粗散每服五錢水一大盞煎至五分去滓不計時候溫服治傷寒心脾虛熱舌腫方出聖惠方黃蘖一兩甘草三錢生銼右為粗散每服二錢水一中盞煎至五分去滓不計時候溫服治傷寒心脾熱口瘡舌腫咽喉疼痛宜服此方出聖惠方羚羊角屑黃蘖塗蜜炙微赤銼甘草生銼川大黃各半肉銼碎微炒玄參三錢右為細末每服不計時候煎竹葉熟水調下一錢鉛霜散治傷寒心脾壅熱舌腫多吐痰逆鉛霜細研牛黃各一分細研麥門冬一兩去心焙白菊花甘草各半兩炙微赤銼黃連三分去鬚右為細末入牛黃鉛霜同研令勻不計時候以淡竹瀝二合調下二錢如無竹瀝犀角溫水調下亦得龍膽散治傷寒心脾熱多乾舌腫口內生瘡龍膽去蘆頭麥門冬去心焙知母人參去蘆頭柴胡去苗各半兩甘草一分生銼右為細末不計時候磨犀角溫水調下二錢升麻散治傷寒喉中痛舌根腫滿不能轉動此謂心脾熱毒宜先用針當舌中針入五分出血即消後服此藥川升麻車前子川大黃銼碎微炒甘草生用各半兩生乾地黃三兩川朴硝三分右為粗散每服五錢以水一大盞煎至五分去滓不計時候溫服升麻湯治傷寒熱病咽喉壅塞連舌根痛及乾嘔頭痛不下食升麻麥門冬去心焙石膏碎各一兩木通銼黃蘖去粗皮銼青竹茹各半兩玄參前胡去蘆頭各三分朴硝二兩右粗搗篩每服五錢用水一盞煎至八分去滓食後溫服日再乾地黃湯治傷寒心脾虛熱喉中有瘡連舌根腫涕唾不下食生乾地黃焙二兩青竹茹雞蘇赤茯苓去黑皮各一兩麥門冬去心焙各一兩半玄參五分右粗搗篩每服五錢水一盞半煎至八分去滓食後溫服日再犀角湯治傷寒脾肺虛熱毒氣壅塞咽喉連舌根腫滿疼痛犀角鎊屑當歸切焙白芷各一兩升麻甘草炙銼射干杏仁湯浸去皮尖雙仁炒黃各半兩右粗搗篩每服三錢水一盞煎至七分去滓食後溫服馬藺根湯治傷寒喉咽閉塞連舌腫疼小便赤澀馬藺根升麻各一兩瞿麥射干各三分犀角屑木通銼各半兩玄參一兩右粗搗篩每服三錢水一盞煎至七分去滓食後溫服日再木通湯治傷寒熱病喉咽閉塞連舌根腫痛熱毒氣聚於心胸木通銼絡石碎朴硝各一兩升麻犀角屑山梔子仁青竹茹各半兩射干半分桔梗炒芍藥玄參各三分右粗搗每服三錢水一大盞煎至七分去滓食後溫服治傷寒上焦虛熱毒氣壅塞喉咽連舌腫痛方玄參射干當歸切焙各一兩右搗羅為散每服三錢水一大盞煎至半盞許去滓食後溫服日再服治傷寒舌腫口內生瘡此是心脾積熱上衝所致湯方大青升麻大黃銼炒各半兩黃連去鬚一分右粗搗篩每服三錢水一大盞煎至半盞去滓食後溫服治傷寒舌出寸長連日不收名應手方右用梅花片腦為末摻舌上隨手而收用五錢重治傷寒心脾有熱舌本腫痛方見本門前口舌生瘡類地黃煎傷寒咳嗽論夫傷寒咳者蓋咳謦咳之咳俗謂之嗽者是也肺主氣形寒飲冷則傷之使氣上而不下逆而不收衝擊膈咽令喉中淫淫如癢習習如梗是令咳也甚者續續不已連連不止坐卧不安語言不竟動引百骸聲聞四近矣咳之由來有肺寒而咳者有停飲而咳者有邪氣在半表半裏而咳者雖同曰咳而治各不同也內經曰肺之令人咳何也皮毛者肺之客也皮毛先受寒氣以從共合其寒飲食入胃從肺脈上至於肺肺寒則內合外邪因而客之則為咳嗽者是肺寒而咳也傷寒表而不解心下有水氣乾嘔發熱而咳小青龍湯主之少隂病腹痛小便不利四肢沈重疼痛自下利者此為有水氣其人或咳者真武湯加五味子細辛乾薑主之二者是停飲而咳者也雖皆為水飲所作而小青龍湯所主為水飲與表寒相合而咳者真武湯所主為水飲與裏寒相合而咳者又不可不知也傷寒中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或咳者小柴胡湯去人參大棗生薑加乾薑五味子主之少隂病四逆其人或咳者四逆散加乾薑五味子主之二者是邪氣自表傳裏而咳者雖皆為氣傳裏而小柴胡湯所主為陽邪傳裏動肺而咳者四逆散所主為隂邪傳裏動肺而咳者又不可不知也表寒也裏寒也協水飲則必動肺以形寒寒飲則傷肺故也陽邪也隂邪也自表傳裏則必動肺以臟真高於肺故也咳為肺疾治之必發散而可矣而又有不可發汗者經曰咳而小便利者不可發汗發汗則四肢厥逆又曰咳而發汗踡而苦滿腹中復堅茲難逆也又脈散者為心火形於肺金鬼賊相刑必死臨病之側可察之歌曰嗽家嘔喘屬膀胱寒熱毒堅值少陽若是少隂類下利四肢沈重更青涼肺主氣氣逆而不下則嗽熱邪乘之氣則燥鬱寒邪乘之氣則冷滯水飲乘之又與氣搏熱寒水飲皆生痰壅嗽之所從始乎隂陽致法因自條其間水嗽三症不可無辨小青龍湯太陽之表水也十棗湯太陽之裏水也真武湯隂症之水氣也常須知之雖然古人一藥對一病所主安在哉曰水與表寒也今而嗽則小青龍汗之水與表寒相合而嗽則真武湯溫之裏癖合水動肺為嗽焉十棗所以下之也太陽病身熱嗽喘心下怔忡乾嘔微利此水氣在裏小青龍小便不利小腹滿者去麻黃加茯苓發熱惡寒身體痛者只依本方若身涼咳嗽乾嘔微利心下痞滿引脅疼痛為裏有水十棗湯少陽病寒熱往來胸脅鞭滿而痛嗽小柴胡湯或利去人參生薑棗加五味子乾薑少隂病水氣咳嗽四肢痛重腹痛小便不利下利或嘔真武湯加五味子乾薑細辛少隂咳而四逆或腹痛或泄利或悸四逆散加五味子乾薑少隂咳而嘔渴心煩不得眠下利豬苓湯熱嗽金沸草散或唾濃血小柴胡加黃芩生薑煎湯咳嗽頭痛不惡寒身大熱若臍腹亦有熱而作痛者須下之大柴胡湯張氏曰發汗不解腹滿痛者急下之可大承氣湯又曰腹中滿痛此為實大柴胡下之咳嗽中滿而嘔用大半夏湯解利以後胃寒不食則理中湯加橘皮半夏茯苓細辛五味子痰多二陳湯加細辛五味子治嗽通用大橘皮湯下利六七日咳而嘔渴心煩不得眠豬苓湯表未解心下有水乾嘔發熱而嗽小青龍湯小便不利小腹滿者青龍湯去麻黃加茯苓也方射干散治傷寒咳嗽氣促喉鳴乾嗽無唾喉中如硬者射干麻黃去根節麥門冬去心赤茯苓枳殼麩炒微黃去穰各一兩杏仁湯浸去皮尖雙仁麩炒微黃貝母煨令微黃各三分百合二分甘草半兩炙微赤銼右粗搗篩每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服柴胡散治傷寒咳嗽煩熱四肢骨節頭目疼痛柴胡一兩半去苗貝母煨微黃葛根銼赤芍藥黃芩梔子仁各一兩石膏二兩知母杏仁湯浸去皮尖雙仁麩炒微黃各三分右粗搗篩每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服陳橘皮散出活人書治春冬傷寒秋夏冷溫咳嗽喉中鳴聲上氣不得下頭痛方陳橘皮湯浸去白穰焙紫苑去苗土麻黃去根節杏仁湯浸去皮尖雙仁麩炒微黃當歸桂心甘草炙微赤銼黃芩各半兩右八味切以水七升煮取三升分三服不差重合之忌海藻菘菜生蔥一方用薑半分同煎杏仁湯治傷寒肺壅咳嗽上氣喉咽氣逆或惡寒鼻