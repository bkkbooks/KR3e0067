不能飲食夏秋轉甚令人淋瀝或若手足煩躁或瘧病之後餘疾不除朝瘥夕增乍寒乍熱心胸下有癖結及瘧候痰不止或是溫疫或欲作瘧頭項若強或胸膈間痰熱頭痛逆癖飲小兒痞疹脅下癥堅及傷寒後七八日結熱痰積不除久則寒熱頭痛逆害食飲胃中煩躁夜卧苦煩有如溫熱此是熱結不去此方能除熱消飲治寒熱和胃氣利小便胸膈間痰熱留飲小兒壯熱諸癖癥并主之又不令吐下知母大黃各三兩黃芩杏仁炒常山各二分蜀漆甘草各一兩麻黃二兩去節牡蠣六分煆赤右為末丸桐子大米飲下五丸日進三服加至二十丸老小半之小兒以意加減黑丸子幼幼新書治小兒水癖當歸四分細辛附子炮乾薑胡椒各三分鹽䜴二合巴豆十枚去皮炒狼毒炙一分杏仁去皮尖十箇右為末蜜丸胡豆大米飲服三丸日一服取癖丸癖諸血膜包水僻側於脅傍時時作痛惟癖為能發潮熱亦能生寒熱故瘧家中脘多蓄黃水日久而後結癖寒熱不已小兒臟腑和平榮衛調暢則津液自然流通縱使多飲水漿不能為病唯乳哺失調三焦關隔以致水漿停滯腸胃不能宣行冷氣搏之於是結聚成癖輕者用木香丸重者用此方甘遂微炒芫花炒辣桂青皮去白蓬术五靈脂桃仁浸去皮炒木香牽牛半炒半生炒只取節肉各三錢右為細末入去油巴豆一錢研和十分細飛麵糊丸麻子大風乾每服一二錢丸薑蜜煎湯灌下泄後冷粥補仍和胃鱉甲丸幼幼新書治小兒腹痛結聚脅下有癖手足煩熱鱉甲一兩醋炙黃去裙襴川大黃半兩銼微炒柴胡去苖赤茯苓各半兩乾薑一分炮桂心蟅蟲二十枚齊曹十枚右為末煉蜜和丸如麻子大二三歲兒空腹以粥飲下三丸日三服量兒大小以意加減小紫雙丸一名代赭丸治小兒宿食不消積成癖氣兩脅妨悶氣急不能下食腹大脹硬方見本門諸石癖結腹滿類大黃丸治小兒癖氣不消四肢黃瘦時有腹痛方見本門食癥類七味鱉甲丸幼幼新書療小兒痃癖發腹痛不食黃瘦鱉甲醋炙去裙襴郁李仁各八分防葵人參各四分訶藜勒皮七顆大黃四分桑菌三分右搗末蜜為丸大小量之酒飲乳服五丸至十丸聖惠獨治痃氣發動一曰鱉甲防葵大黃郁李仁各半兩人參桑菌各六分訶藜勒三分枳殼丸一名牽牛子丸治小兒癖氣脅肋下妨悶手足微腫並宜服之方見本門諸癖結脹滿類治七八歲兒多睡或時壯熱日加羸瘦身雖不痛有時痢膿嘔逆不食癖氣之候其狀似瘧疾幼幼新書柴胡黃芩各一兩枳殼兩片炒甘草炙知母芍藥各二分大訶䔧勒一箇大者煨取小者二箇右為末水一盞煎服練香丸散幼幼新書治諸癖腸結不思飲食或時吐逆青皮一分白薑甘草訶子各二錢並煆過存性研為末沒藥乳香巴豆霜各一錢另研右為末嘔逆兼瀉不止每服二字米飲調下如要思食消癖入巴豆以稀麵糊為丸如菉豆大每服七丸薄荷湯下日進三兩服量虛實加減用之芒硝紫丸幼幼新書治小兒宿食癖氣痰飲往來寒熱不欲飲食日漸羸瘦芒硝大黃各四兩半夏湯泡七次甘遂各二兩代赭一兩巴豆二百枚去皮膜杏仁一百二十枚湯浸去皮尖右為末别搗巴豆杏仁研如膏旋納藥末搗三千杵令相和合強者內少蜜百日兒服如胡豆一丸過百日至一歲服二丸隨兒大小以意節度當候兒大便中藥出為愈若不出更服之木香丸聖濟總録治小兒氣癖上下左右移動不常木香一分白檳榔銼三分大黃蒸焙銼枳實麩炒各三分附子炮製去皮臍乾薑炮各半分朴硝一兩右為末煉蜜和丸如菉豆大每服三丸至五丸空腹溫湯下更量大小加減防葵丸幼幼新書治小兒癖氣久不消防葵一兩人參桑菌訶勒皮各半兩川大黃三分銼碎微炒郁李仁各半兩湯浸去皮尖微炒右為末煉蜜和丸如麻子大每服以溫酒下五丸二服量兒大小加減服之芫花丸幼幼新書治小兒癖氣堅硬瘦瘁不欲食芫花醋拌炒令乾鱉甲醋炙黃去裙襴川大黃銼碎微炒各半兩荆三稜雄黃細研桃仁湯浸去皮尖雙仁炒半兩右為末煉蜜和丸如粟米大三歲兒每服空心以生薑湯下三丸量兒大小以意增減服之治小兒閃癖身體壯熱煩躁服冷藥冷氣漫心成癖下焦又冷腸結大便難幼幼新書茯苓芎藭鱉甲炙枳殼炙芍藥各二分柴胡四分右切以水一大升三合煎至三合空心為二服去五六里再服忌莧菜治腹肚不調并癖氣久不愈幼幼新書枳實知母牡蠣各六分鱉甲醋炙甘草各四分大黃三分右為末蜜丸如菉豆大粥飲下五丸還魂丸幼幼新書療大人小兒傷寒四五日及數年諸癖結堅心下飲食不消目痃四肢疼咽喉不利壯熱脾胃逆滿腸鳴兩脅裏急飛尸疰邪氣或為驚恐傷瘦背痛手足不仁口苦舌燥天行發作有時風溫及吐惡水巴豆去皮心熬甘草炙硃砂芍藥各一兩麥門冬二兩去心右為末蜜和丸搗三千杵丸如桐子大每服二丸蔥棗湯下小兒二歲已上服如麻子大一丸日二服忌海藻菘菜野豬肉蘆笋生血物燒青丸治小兒諸癖每至午後時作寒熱微有咳嗽脅肋癖硬方見本門乳癖類知母丸幼幼新書治小兒腹痛不調兼癖氣知母六分鱉甲四分炙枳殼三分麩炒去瓤大黃錢二分紙裹煨熟牡蠣三分右為末蜜丸如菉豆大飲下五丸大人以意下服二丁散幼幼新書治小兒諸癖久不消散乍寒乍熱泄瀉無時多渴黃瘦或下痢腹脅有塊如掌癖側石硬揀丁香白丁香沒石子各二錢硫黃密陀僧各三錢右為細末研勻每服一字至半錢白湯調下空心臨卧日二服以消為度大戟餅子幼幼新書治小兒食癖脅下有一塊食不生肌肉大戟半兩勻切作片子以醋浸一宿取出焙乾為末用藥末一錢好麵一錢右滳水和丸捻作餅子如小錢大厚三分𨫼上􅏼熟米飲嚼下一餅兒小減服治大人小兒痃癖氣塊來往疼痛不止又治心氣痛不可忍者白玉赤玉各等分右為細末用水和為丸如桐子大每服三十丸生薑湯下治癖牛蒡子草烏生各等分右為末以雞子清調先用厚絹數重安癖上仍以厚紙包藥餅子安絹上以尉斗盛火尉之更易數餅其積內消又方以食茱茰半升銼細酒煮布包尉癖上冷則又炒頻尉如癖走隨癖尉之療大人小兒癖氣幼幼新書取車下李仁微湯退去皮取仁與乾麵相拌搗之為餅如猶乾和淡水如常搜麵大小一如病人手掌為二餅微炙使黃勿令至熟空肚食一枚當快利如下利更食一枚或飲熟粥汁即利以快利為度至午後利不止即以醋飯止之利後當虛病未盡者量力一二日更進一服以病盡為限小兒亦以意量之不得食酪及牛馬肉無不效但病重者李仁與麵相半輕者以意減之治小兒氣癖幼幼新書用荆三稜汁作羮粥以米麵為之與乳母食每日取一棗大與小兒吃亦得作粥與癎熱食之治小兒十歲已下及新生百日無問癎熱無辜痃癖等皆理之祕妙不可具言大效治小兒閃癖頭髮堅黃瘰􅐇羸瘦用林檎木末以和醋傅上癖移處就傅之治小兒閃癖幼幼新書用蝤蜞煮食之治小兒閃癖大腹痞滿用鸛骨及嘴並煮汁服之亦燒為黑灰飲服治小兒閃癖幼幼新書用苦瓠取未破者令熱解開尉之治小兒痃癖幼幼新書右用質汗出西蕃如凝血蕃人煎甘草松淚柳乳地黃并熱血成之取半匕以水半盞研如稀糊更研硃砂調勻若五歲以下空心只作一服服之得利惡物出如不利隨糞出瘥一二五日大愈量兒大小與之治小兒閃癖右以苦菜葉搗末傅之治小兒閃癖本草右用苦耽苗子研傅之治小兒閃癖本草右用胡瓜葉一歲服一葉以上斟酌與之生挼絞汁服得吐下治小兒閃癖本草右搗苦􅀢葉傅之普濟方卷三百九十一
