body:
  text: 普濟方卷三百九十一明周王朱橚撰嬰孩癖積脹滿門總論夫腹脹由皮脾胃虛氣攻作也實者悶亂喘滿可下之用紫霜丸白餅子不喘者虛也不可下若誤下致脾虛氣上附肺與脾子母皆虛肺主目胞腮之類脾主四肢母氣虛甚即目胞腮腫也色黃者屬脾也治之用塌氣丸漸消之未愈漸加丸數不可以丁香木香橘皮豆䓻大溫散藥治之何以然脾虛氣未出腹脹而不喘可以以散藥治之使上下分消其氣則愈也若虛氣已出附肺而行即脾胃內弱每生虛氣入於四肢面目矣小兒易為虛實脾虛不受寒溫服寒則生冷服溫則生熱當識此勿誤也胃久虛熱多生疸病或引飲不止脾虛不能勝腎隨肺之氣上行於四肢若水壯腎氣浸浮於肺則大喘也此當服塌氣丸病愈後面未紅者虛衰未復故也治腹脹者譬如行兵戰於林寇未出林以兵攻之必可獲寇若出林不可急攻攻必有失當以意漸收之即順也治虛腹脹先服塌氣丸不愈腹中有食積結糞小便黃時微喘脈壯而實時飲水能食者可下之蓋脾初虛而復結有積所治宜先補脾後下之下後又補脾即愈也補肺虛喘腹中有癖不食但飲乳是也當用白餅子下之小兒病癖由乳食不消伏在腹中乍涼乍熱飲水或喘嗽與潮熱時發故飲水過多則當滌脾胃不能傳化水穀其脈沉細益不食脾胃虛衰四脈不舉諸邪遂生羸瘦而成疳矣曹宣得子三嵗面黃時發寒熱不食而飲水及乳不止衆以為潮熱用牛黃丸麝香丸不愈及以止渴乾葛散服之反壯錢氏當下白餅子主之後補脾乃以省積丸磨之此乃癖也後果愈何以故不食但飲水者食伏冷脘內不能消致令發寒熱服止渴藥吐者藥衝脾所也下之即愈食癖者其狀在右脅時復來衝心多驚恐是也宜服進食丸化之乳癖者其形在心時或上下疼痛啼呌時作壯熱此不可取宜用消乳丸疳癖者其狀在右脅下生如木梳子大致令肌肉不生漸成羸瘦或作潮熱及肚大宜取之仍服進食丸痟癖者其狀或在左右脅間致令啼呌亦須取之驚癖者其狀在心頭不動常要驚啼此因小年驚積成塊涎裹成癖伏之於心此病須要礞砂藥方可取之大抵癖病宜服三􅏢蓬荗橘皮巴豆硇砂縮砂烏梅等藥漸磨化不可急取腹脹之狀膨脝䐜脹素問云濁氣上則生䐜脹如鼓之有聲心腹脹滿但名為食不入鼓腹榮衛隔塞鳴息喘粗皆由冷氣所作實鑑云凡冷結在脾因兹腹脹壅滯於脾內不通而外不散痞凝於胃上不降而下不升或乳食過度致傷脾胃胃氣弱則臟腑弱令腹有飽脹二證亦有半虛半實證虛者腹脹不喘泄㵼不食實者朝寬暮急悶亂喘粗半虛半實者喘滿泄㵼或腹脹不喘小便如常皆半虛半實也虛者皆益黃散次塌氣丸導氣丸再益黃散補次妙丸子下再白术散若心腹脹滿大便祕澀煎宣風散送下妙丸子半虛半實者益黃補次妙丸子下再益黃散若腹脹不喘大便如常塌氣丸導氣丸漸漸消之有一等腹脹滿肚大青筋四肢瘦劣謂之疳蠱此病多死癥音真又音呈傷食得之痛刺脅肋心胸煩悶飲食不下吐逆心忪不醫治漸成癥結又曰食結瘕音賈又音加傷血得之心膈鬱悶痛引少腹時或攻築上搶心胸雖不阻食肌肉不生久而不治漸成瘕結又曰血結痞音甫又音匕又音婢傷氣得之心腹膨脹肚大脅滿痛刺往來主左肋面黃肌瘦倦怠無力久而不治漸成痞塊又曰氣塊癖音僻傷積得之其證如腸澼之疾便利無度滑不成糞似痢非痢似蟲在腹肚乾痛上築心胸滿悶久而不治頑結不散腸結成塊有類痞狀以上四證皆作寒熱有如瘧候一般悉由傷及五臟惟痞癖左脅肋塊其氣結聚男女皆在左肋四證大同小異凡治寒熱先以梨漿飲進三服退其寒熱寒熱已消去三五日後方可與服磨痞丸即日日頻頻與服癥瘕之疾只與三稜丸下去積毒以通為度凡疳氣脹疳極脹氣積脹小兒患疳證候皆由虛所傳積乃為母既積已作虛氣傳授遂成疳疾其名數種皆漸所致不可更與通利尤加重候即宜和益消疳調氣治之先與服神功保童丸以至泄氣為快既泄虛氣即散不傷其氣攻效至良應患疳疾便利無故大有功效鎖肚脹急此一證候兒在胞胎中無只由初生七日內有患觸受而成急如水火其作延久漸見加重以致肚青筋撮口不乳其候甚者名脹急其兒感觸邪氣入腹衝心不能自化遂變風候及至成風不可更投疳藥雖然鎖肚撮口不乳其色未變精神未耗者速用下藥以通為度才通便安宜服真珠天麻丸人才生下男女有一證男在三五七女即二四六日竒偶之有數隂陽之顯道者遂感客忤邪正相干亦令兒肚緊青筋噤口不乳此由客情外來致襲其邪隂陽不順胃觸其正初生男女氣脈未定精神未足總皆邪觸上古醫家著述繁雜難窮至要世俗雖有加文理無用灸血氣發生豈因經客若以艾炷即為虛設既受此厄越日移時母泣父啼痛心待斃凡上膈脹中脘脹食傷膨脹者膈與脘上下相承膨與脹輕重自别脘受疾久則痞悶膈則病停鬱結是知膈隱胸膛脘臨脾胃膈者猶隔也有如隔礙脘者管也通即流利二位皆由食傷宿冷眠卧遇風停滯之氣不順於三焦怯弱脈虛傳於五臟所謂脾不磨食胃不化食所以膨脹若於膨脹之時不與消利遂致虛滿又於虛滿不為疏補其氣即攻中脘不化即在上膈既在上膈為疾必作形證傳即為重醫莫容易取愈食傷膨脹服三稜煎丸中脘腹脹服王氏塌氣丸上膈鬱脹服大茱連丸楊氏曰小兒乳哺失調三焦關膈以致水漿乳哺停滯脾胃不能宣行冷氣結聚初則成積久則血膜包水時時作痛或為潮熱或生寒熱及瘧家多於中脘蓄積黃水日久結癖寒熱不已幼幼方曰由脾胃虛冷乳食積滯不能尅化以致血膜頑疾裹積而成癖湯氏曰食癖乳癖疳癖痞癖宜以甘遂芫花莪术三稜巴豆等取之惟驚於取藥中加以南星半夏化痰之劑實者取而後補虛者補而後取補脾則實脾散磨積則消積飲用巴豆去巴豆或硇砂厚朴取積則紫霜丸神妙丸五積丸重者消癖丸痞者塞也結者實也熱氣藴於胸膈之間留飲聚於腹脅之內於是榮衛不能流行臟腑不得宣通由脹滿而至痞結勢使然耳此熱實之證也時或發為壯熱甘遂散主之原小兒癥瘕癖結候五臟不和三焦不調有寒冷之氣客之則令乳哺不消化結聚成癥癖也其狀按之不動有形攻起者癥也推之浮沉者瘕也其弦急牢強或在左或在右者癖也由冷氣痰水食飲結聚所成故云癥瘕癖結也夫小兒寒溫失調飲食不化與臟氣相搏結聚不動名為癥也其食結在腹喜寒四肢灑灑如瘧不能飲食常自隱隱而痛此則食癥也小兒瘕者腹中疼痛無常不定在一處者瘕也小兒結癥成塊者為不慎滋味嘗喫滑膩肥腥羶瓜果胃口不和結實難化癥痞於胸膈之間攻衝榮衛則嘔逆頻頻喘粗眼澀更加頻渴或歸於下部則泄㵼頻並兩脅虛脹便只和脾胃或是疏㵼或則飲食不化漸次成癥凡小兒生下有瘕癖氣有疳蟲攢心氣有胎驚疝氣有抱心吊氣者瘕氣發時橫來左右脅下築痛或吐逆急下鮓湯圓通利後以勻氣散服之疳蟲攢心氣者其後伏面去蟲藥如渴水未住便下塌氣丸夾黃連飲子服之胎驚疝氣者生下多夜啼或吊上腎乃以寬氣藥參苓散治之又用蔥涎膏貼外腎醒後汗出如渴水無時乃以槐角丸又寬氣藥調理二三日亦已通利與勻氣散生下未周嵗見隂腫者此胎中大受極熱或父之傳授先用牛黃丸療之後勻氣散用藝薹子為末冷水調貼之如未退却用寒水石白繕土酸醋調塗乃常吃鬱金甘草牙硝三味為末蜂糖熟水調下諸癖結脹滿方金露丸出湯氏寶書治心腹脹滿癥癖氣塊大如鵝卵者及黃疸朝起嘔逆四肢沉重上氣盤結血氣衝心膀胱兩脅膨脹背連腰痛十種水氣五淋五痔骨蒸頑麻半身不遂眉毛脫落皮膚燥癢常如蟲行手足煩熱夜卧驚悸夢與鬼交年月深逺行成勞病尸蟲鬼疰久不能療及治室女經閉阻滯血脈不通羸瘦憔悴不思飲食人參官桂各半兩紫花术三分炒附子一枚炮去皮臍川烏半兩炮厚朴三分去皮製大黃半兩豬牙皂角二錢去皮菖蒲半兩桔梗去蘆三分乾薑一分炮川椒半兩去合口者柴胡一分吳茱茰半兩白茯苓半兩右為細末别研甜葶藶子半兩巴豆三分去皮膜油續隨子半兩後三味别研得所同前藥味一處麵糊為丸如麻子及菉豆大以意加減十歲兒空心米飲下五丸如覺攪觸為驗升陽補氣湯治小兒脾病發熱防風根三錢羌活一兩半柴胡一錢甘草三分荆子半兩升麻半兩葛根半兩獨活三分黃耆半兩人參三分當歸身三分酒浸陳皮三分黃柏三分酒浸生地黃三分酒洗地骨皮半兩右銼每服三錢水煎去滓溫服牛黃丸幼幼新書治小兒癥瘕百病疳痼腹脹黃瘦發渴不常客忤疳痢及吐逆不定心腹多痛及驚風天釣等症牛黃細研犀角屑各半兩木香當歸微炒各半兩人參去蘆頭川大黃銼碎微炒光明砂細研水飛過檳榔各三分麝香細研鱉甲一兩塗醋炙黃去裙襴代赭二分巴豆以淡漿水大碗煮盡去皮出油别研各一分肉豆䓻二枚去皮杏仁二十枚湯浸去皮尖雙仁麵炒微黃色右為末同研令勻鍊蜜和丸如菉豆大小兒百日已下乳汁下一丸二三歲空心粥飲下二丸胸膈有病吐出臟腑有病即利出惡物為驗後只吃漿水粥一日其利自止五日至十日吃一服永無滯結量兒大小加減服之牛黃鱉甲丸幼幼新書治少小癖實壯熱食不消化中惡忤氣牛黃厚朴薑製炮茯苓桂心芍藥乾薑各半兩鱉甲醋炙香熟麥麵柴胡大黃枳實麩炒芎藭各一兩右為末蜜丸如小豆大日三服以意量之一方有麥門冬無枳實鱉甲丸聖濟總録治小兒癥癖鱉甲醋炙去裙襴犀角鎊丹砂研桂去粗皮各半兩大黃銼炒當歸微焙萆􅐺炒代赭搗研巴豆去皮心膜研如膏各一兩枳殼去瓤麩炒牛黃研麝香研各一分右為末煉蜜和丸如麻子大三四歲兒每服二丸至三丸空心新汲水下瘥即止更隨兒大小加減鱉甲丸幼幼新書治小兒癥癖羸弱不能乳食鱉甲塗醋炙黃去裙襴荆三稜微煨銼川大黃銼碎微炒檳榔郁李仁各半兩湯浸去皮微炒木香青橘皮湯浸去白瓤焙肉桂去粗皮柴胡去苗人參桔梗各去蘆頭防葵各一分右為末煉蜜和丸如菉豆大五六歲兒空心米飲下七丸晚後再服更隨兒大小以意加減木香硇砂煎丸幼幼新書消癥瘕積聚血結刺疼木香大黃炮荆三稜生用巴豆去皮膜不出油用細研之官桂去皮筒子漆炒青橘皮去白蓬莪茂炮附子炮去皮臍乾薑炮各一分香墨一指節大細研硇砂半兩以好醋一盞浸一宿去砂石右將大黃末荆三稜末巴豆等三味同於銀石器內以好醋一升煎一兩沸次入硇砂同熬成膏次入諸藥末和勻再入臼杵千百下為丸如菉豆大每服五丸傷冷食冷酒冷水結聚腹內氣塊痛用乾薑湯或橘皮湯下夾食傷寒白湯下亦得粘食不消或氣塊即用煮麵湯下食牛羊魚鱉肉成氣塊不散用所傷汁下宿酒不消酒下血氣當歸酒下妊娠不服要轉痰茶下加至七丸常服一兩丸鱉甲散幼幼新書治小兒癥瘕壯熱頭痛嘔逆腹痛寒熱頭髮作穗及食癖乳癖氣鱉甲一箇塗醋炙黃去裙襴枳殼麩炒微黃去麩木香川大黃銼微炒荆三稜微煨銼檳榔各半兩人參去蘆頭赤茯苓柴胡去苗各三分桂心一分右為粗散每服一錢以水一小盞煎至五分去滓溫服日三服量兒大小以意加減聖效丹幼幼新書治癖結諸病久不瘥當歸洗焙乾木香好硃砂細研水飛桂心各一兩甘遂慢火煨令黃色用荆三稜炮熟銼鱉甲各半兩塗醋炙黃去裙襴已上搗羅為細末次用麝香㽔仁各一分湯浸去皮别研巴豆三七箇去皮心用好酒煮一宿取别研右同研細用黃蠟六兩慢火鎔化同諸藥攪成膏如黍米大每服未周歲小兒一粒二三歲二粒四五歲三粒六七歲五粒十歲以上七粒溫米飲下乳食後量兒大小加減荆三稜散荆三稜煨銼鱉甲醋炙去裙襴枳殼去瓤大腹子銼陳麵炒麥蘖炒蓬莪茂煨銼厚朴去粗皮薑汁炙訶梨勒皮半生半熟青橘皮去白焙各一分右為散六七歲每服半錢空心米飲調下日三服更量兒大小加減鱉甲丸幼幼新書治少小腹中結堅脅有疹手足煩熱鱉甲醋炙香熟芍藥大黃各三十銖茯苓柴胡乾薑各二十四銖炮桂心六銖蟅蟲齊曹各二十枚右為末蜜丸如梧桐子大服七丸漸漸加之以愈為度馬通粟丸幼幼新書治少小脅下有氣內痛喘逆氣息寒熱羸瘦不食馬通中粟十八銖杏仁紫苑細辛各半兩五味子右為末蜜丸如小豆大每服十丸日三服不愈加至二十丸大茱連丸活幼口議治小兒飲食過度膨脹胸膈上下氣不宣通鬱滯迷悶情思少樂大則作喘強食不化作渴煩躁坐卧不安肢體倦怠腹脅疼痛蓬莪术荆三稜各一分醋炒乾薑炮青皮陳皮並去白木香丁香各二錢緑小細茱茰二錢巴豆二十一粒去殼心膜出油右為末醋糊丸如麻子大每服七丸至十丸大者加服生薑棗子湯下議曰痞鬱結注所因脾胃飲冷食生冷粘成積氣不化滯在胸膈胸膈乃總名却有三腕上下相通滯因冷侵虛處所受弱處所發致疾有因久不尅化成害有由結癖癥瘕積之所由生疳痢吐瀉積之所因作今用此方寬胸膈厚腸胃正氣溫中消磨疳積能止吐瀉進飲食代赭丸治小兒腹中結癖塊痛代赭石研細川大黃各半兩木香五靈脂硃砂鱉甲塗醋炙黃桃仁浸去皮焙辣桂各一分巴豆去油半分右為細末糕糊丸如麻子大風乾每服五丸薑湯下撾脾散治小兒脾癖石燕一對醋蘸七次白丁香一兩定粉三錢人參三錢訶子一對丁香半錢輕粉半兩陀僧二兩舶上硫黃五錢右為極細末每服一錢量兒大小加減大者二日一服小者三日一服早辰米湯調服食乳汁小兒男用女汁麵湯亦可三歲服一字五歲服一錢雙紫丸幼幼新書治小兒身熱頭痛飲食不消腹中脹滿或小腹絞痛大小便不利或重下數起小兒無異疾飲食過度不知自止哺乳失節或驚悸寒熱惟此丸治之不瘥更可重服小兒欲下是其候哺食減少氣息不快夜啼不眠是腹內不調冝用此丸序例中云服紫丸者即前變蒸篇中四味者也云服紫丸不下者服赤丸差駛病重者常用方之中並無赤丸而用硃砂又力緊於紫丸疑此即赤丸也巴豆㽔核仁各十八銖麥門冬十銖甘草五銖甘遂硃砂各二錢蠟八錢牡蠣八錢右以湯熱洗巴豆研新布絞去油别搗甘草甘遂牡蠣門冬下篩訖研㽔核仁令極熟乃內散更搗二千杵藥燥不能相丸更少入蜜足之半歲兒服如荏子一雙一歲二歲兒服如半麻子大一雙三四歲者服如麻子二丸五六歲者服如麻子大二丸七八歲服如小豆二丸九歲十歲大如小豆二丸常以雞鳴時服至日出不下者熟粥飲數合即下丸皆雙出也下甚者飲以冷粥即止芍藥湯治小兒胎中宿熱乳母飲食粗惡辛苦乳汁不起兒乳肌膚心腹痞病萎黃瘦瘠四肢痿躄繚戾服之可令充恱方見本門褐丸子活幼口議治小兒隂陽不和臟腑怯弱乳食不消心腹脹滿嘔逆氣急或腸鳴泄瀉頻併腹中冷痛食癥乳癖痃氣痞結積聚腸胃或祕或利頭面腫滿不思乳食宜療五種疳氣八種痢疾肌肉消瘦氣粗大神色昏憒情意不樂常服散冷熱氣調和臟腑去疳積止瀉痢進乳食生肌肉恱顔色蘿蔔子二兩微炒陳皮去白青皮去白各一兩荆三稜炮一兩黑牽牛一兩半半炒半生蓬莪术炮一兩胡椒半兩木香一分右為細末麵糊為丸麻子大每服三五十丸煎蘿蔔湯下一方加胡黃連半兩苦楝半兩蘿蔔子只使一兩議曰證候不明醫之過也丸散不良士之繆也去醫裁藥審證察候猶若權衡以究標本醫藥純全之道凡調理小兒雜病須究疳證積候乃五臟所傳及至變作他患殊失源流迷而不反所以作疾此方寬腸下氣散結去鬱疳積已作順傳逆傳並皆宜服凡痞癖之氣同根異名作疾有塊皆在左脅男女一同然痞者陽證癖者隂證小兒脾胃不和隂陽氣交錯冷熱相制皆由積之所致故先寒後熱一如其瘧汗出則息若先下却其積熱住不去反增加重而又作腫虛滿頭面凡有是疾醫者不可輕易投砒治之其砒有火毒衝胃三焦作渴飲水停在脾屬四肢亦作浮腫重則致喘煩躁虛悶倦怠不安砒之為藥豈可妄投冝先與服梨漿飲加湯使如法取令寒熱退三五日乃却與三稜丸磨化積毒以利為度去其根本若未通更服已上忌生硬冷物直指方加檳榔五靈脂各一兩吞紫霜丸治疳脹三稜煎丸活幼口議治嬰孩小兒食傷生冷粘膩熱毒等物脾胃積滯久不尅化令肚熱腳冷痞癖寒熱及療癥瘕中脘不和膨脹上膈氣壅心腹不得宣通所以作疾此藥溫良但治諸積滯食不化荆三稜蓬莪术並炮各半兩芫花一分淡豆䜴二三錢鱉甲去裙米醋炙令焦半兩巴豆二十一粒去殼杏仁去皮尖一分炒令赤右前六味一處以米醋一碗煮令乾仍炒起更細截焙為末次入當歸末又入杏仁巴豆淡豆䜴和勻水煮麵糊為丸麻子大每服二十丸生薑湯下大小加減服之此方亦名消痞丸又名化積丸其藥破氣行血和脾開胃一應痞癖癥瘕諸疾氣滯並皆療之夫脾胃者乃飲食有所宜則穀氣消血脈勻肌體壯精神爽有所不利則腸胃瘦面目黃疾病作以是藥固其臟腑胃氣固穀食自然留之脾胃既壯穀食自然磨之若飲食遲化即氣弱飲食不化即氣虛小兒服此初安臟腑次益肌膚三焦既順百脈俱調效驗紅丸子治血膜包水僻側於脅儫時時作痛發寒熱瘧家中脘多蓄黃水日交結癖亦效三稜煨莪术煨芫花桃仁去皮别研杏仁去皮别研硃砂烏梅炒巴豆各等分右為末醋糊丸小菉豆大硃砂為衣米湯空心服七聖丸湯氏寶書治消積滯調脾胃及治小兒食不化成積積不消成癖久而作痛冝服三稜莪术川楝去核陳皮去白青皮去白芫花各等分右以芫花醋浸一夕炒漸乾入三稜莪术同炒又入川楝陳皮青皮同炒焦取為末等分如各半兩杏仁去皮尖别研巴豆二十粒去油膜勻和醋糊丸黍米大一歲二丸臨睡米飲下此二方稍相似不若方中和桃仁與烏梅則尤妙又用蒜蕩脾丸化痰涎一日一服或兩服日用如此服蟹水亦可日間所食之物一夜而化永無疳疾一方可去巴豆别入杏仁代赭丸一名小紫霜丸治少小及大人腹中宿食積成癥癖兩脅妨滿氣息喘急不能食面黃日漸瘦腹大脹除百病幼幼新書代赭丹砂各研大黃各八分青木香五分聖惠用二兩當歸五分聖惠用二兩桂心四分聖惠用二兩巴豆六分去皮心另搗聖惠用半兩犀角屑三分聖惠用二兩右搗篩蜜和丸如梧桐子大小兒量之十歲兒服大豆許二丸六歲者小豆許二丸以下臨時斟酌要瀉病出為度久病日一丸以溏泄而已不在猛瀉忌如常法一方去桂心用杏仁持遂丸幼幼新書治小兒癥瘕脅下堅硬如石四肢黃瘦不欲乳食甘遂煨令微黃㽔仁各一分湯浸去皮研入雄黃細研丹砂石膏各細研水飛過牡蠣燒為粉各半兩麝香半分細研巴豆半分去皮心絹裹盛酒中煮半日取出焙乾右為末與巴豆研令勻煉蜜和丸如黍米大每服以粥飲下一丸日二服量兒大小加減服之大腹子湯幼幼新書治癥癖腹滿小便不利大腹皮一對銼檳榔枳殼麩炒去瓤赤芍藥人參去蘆頭知母陳橘皮湯浸去白各半兩甘遂一分煨令黃右為細末每服一錢水一小盞煎至五分去滓溫服量兒大小加減七味進食丸幼幼新書治乳食不消心腹脹滿壯熱喘粗嘔吐痰逆腸鳴泄瀉米穀不化或下利赤白腹痛後重及食癥乳癖痃氣痞結並皆治之久痢有疾不除或多壯熱或疳積肚痛常服消進飲食永無食癖痞結之疾余常用之效不可具述代赭石燒醋淬研當歸去蘆微焙硃砂研飛枳殼去瓤麩炒木香各半兩麝香細研一分巴豆霜半分右為末入研藥和麵糊為丸如麻子大每一歲服一丸溫米飲下更量虛實加減食後服之白丁香散瑞竹堂治小兒大人癖積白丁香雀兒糞也黑丁香二錢蜜陀僧三錢硫黃一錢訶子皮半錢輕粉半錢木香二錢右為細末每服一錢用乳汁調服女用男乳食男用女乳食調服食前半飢半飽食日三錢棗兒壓之大人米湯空心服牛黃丸幼幼新書治小兒結實乳食不消心腹痛牛黃太山甘遂各半兩真珠六銖杏仁泡去皮尖芍藥黃芩各一兩巴豆十八銖右為末蜜丸一歲兒飲服如麻子大二丸但隨兒大小加減服萬應丸聖濟總録治小兒隂陽氣不順虛痞脹滿嘔逆腹痛成癥瘕癖結等病檳榔二枚銼陳橘皮去白焙青橘皮去白焙各半兩木香黃連去鬚蓬莪茂煨銼桂去粗皮各一分右為末每服一錢匕入巴豆一粒去皮心膜醋煮紫色研杏仁一枚去皮尖燈上燒黑研將前藥末同二味合研勻細用白麵糊丸如粟米大每服二丸食後生薑湯下更量兒大小加減牽牛子丸一名枳殼丸治小兒水癖按之作聲及治癖脅氣下妨悶手足微腫幼幼新書牽牛子炒枳殼去瓤麩炒半兩蘖皮去粗皮炙甘遂桂炒黃去粗皮牡丹皮各一分大黃銼三分右為末煉蜜和丸如菉豆大每服五丸空心服溫湯下量兒大小加減雙參飲子幼幼新書人參胡黃連枇杷葉拭去毛乾葛甘草元參麥門冬右各等分為末每服一錢水半盞煎兩三沸去滓服桔梗枳殼湯治熱氣痞滿膈兩脅按之則痛枳殼去瓤桔梗去蘆兩五錢半夏湯洗黃芩瓜蔞仁黃連去鬚各三錢右銼散生薑麥門冬去心煎服利黃涎沫即安蘆薈丸治小兒脾癖木香肉果丁香各五錢已上三味麵裹煨蘆薈一兩史君子訶子各五錢右為細末煮棗肉為丸如菉豆大每服二十丸空心白湯下日二服量兒大小加減雄鼠粥聖濟總録治小兒癥瘕腹痛脹滿或作塊或皮膚浮腫不能食雄鼠肉五兩切炙陳橘皮去白焙半兩鱉甲醋炙去裙襴荆三稜煨銼郁李仁去皮研各三分生薑切焙半兩右粗搗篩分作三帖每帖以水一升煎去滓取半升入粳米一合加五味煮作粥空心食之知母大黃丸幼幼新書治小兒癥瘕腹痛黃瘦川大黃三分銼碎微炒知母牡蠣煆為粉枳殼麵炒微黃去瓤當歸各半兩微炒鱉甲一兩塗醋炙黃去裙襴右為末煉蜜和丸如菉豆大三四歲兒每服空心以粥飲下五丸晚後再服量兒大小以意加減鱉頭丸幼幼新書治小兒痞氣脅下腹中有積堅痛鱉頭一枚甘皮半兩虻蟲蟅蟲桃仁各十八銖右為末蜜丸服如小豆二丸日三服大便不利加大黃十八銖以知為度聖惠方同但用大黃無甘皮白餅子一名玉餅子錢氏治小兒腹中有癖但飲乳者及嗽而吐痰涎乳食滑石輕粉半夏湯浸七次去涎天南星各一錢為末巴豆二十四箇去皮膜以水一升煮水盡為度右研勻巴豆後入衆藥以糯飯為丸小菉豆大揑作餅子三歲已上三五餅子已下一二餅子煎蔥白湯下臨卧服之人參蘿蔔飲活幼口議治小兒痞癖因食砒藥丸子作渴煩躁頭面浮腫腹肚緊脹喘促坐卧不得肌體羸瘦寒熱尚在白术苦梗甘草炙人參麥門冬去心右等分為末每服一大錢取生蘿蔔汁半盞煎至半候冷與服治小兒癥癖百病疳痼腹脹黃瘦發渴不常客忤疳痢及吐逆不定心腹多痛及驚風天釣幼幼新書硃砂細研杏仁各一分湯浸去皮尖雙仁另研如膏巴豆霜半分鱉甲醋塗炙黃去裙襴犀角各半兩右為末入巴豆杏仁研令勻煉蜜和丸如黃米大百日兒乳汁下一丸三四歲兒薄荷湯下三丸隨兒大小加減服之芫花丸幼幼新書治小兒心下痞痰癖結聚腹大脹滿身體壯熱不欲哺乳芫花黃芩各一兩大黃雄黃各二兩半右為末蜜和更搗一千杵三歲至一歲已下服如粟米大一丸內兒喉中令母與乳若長服消病者當以意消息與服之與服時與乳哺相避真珠丸幼幼新書治小兒痰實結聚宿癖羸露不能飲食真珠半兩麥門冬用一兩㽔仁二百枚巴豆四十枚右為末蜜丸期歲兒服二丸如小豆大一百日兒服麻子二丸漸增以知為度當下病赤黃白黑葵汁下勿絶藥病盡下自止久服使小兒肥白無病已試驗嬰儒方同用丹砂不用真珠奪命散衛生寶鑑治肺脹喘滿胸髙氣急兩肋扇動陷下作坑兩鼻竅張悶亂嗽渴聲嗄不鳴痰涎潮塞若不急治死在朝夕川大黃白牽牛黑牽牛各一兩並半生半炒檳榔一箇右為細末三歲每服二錢蜜漿水調下涎多加膩粉少許利涎為度甘遂散治破結散氣蓋痞者塞也由胸膈熱實腹有留飲其證腸內氣結而脹時或壯熱方見本門痞結類治小兒脾方生牛腦子二匙寒食麵六續二匙獨蒜二塊地骨皮末二匙右為末作膏攤於絹上看脾大小貼之小兒口蒜香為度鼠肉煎幼幼新書治小兒癥瘕羸瘦鼠肉五兩生用鱉甲三分生用甘遂一分末陳橘皮半兩湯浸去白瓤焙右除甘遂末外並銼以水二大盞煎至五分去滓下甘遂末勻攬一二百日兒妳癖一日與服之盡半合二三歲兒一日服盡一合四五歲兒一日服盡二合如利多即少服看兒實虛與服之如是利不止煮大麥麵湯解鼠肉汁作粥服之亦佳木鱉膏貼痞癖木鱉多用去殼獨蒜半錢雄黃半錢右為末杵膏入醋少許蠟紙貼患處千金散瑞竹堂治小兒一切脾積結成硬塊者錦紋大黃不以多少為細末用水醋熬成膏子先以新磚瓦末羅於新磚上將大黃膏子在上於伏日內晝曬夜露總以極乾為末用舶上硫黃官粉各等分右為末和勻每服米飲調下一歲兒服半錢二三歲者服一錢十歲已下服二錢十六七者五錢一服即愈如不愈隔二十日再進一服更不須服切忌生冷濕麵驢馬豬羊雞等肉止可食素粥飯將息至愈切要忌口不然枉服此藥􅌝􅌣湯錢氏􅌝􅌣根末二錢白甘遂末一錢右同於慢火上炒焦黃研勻每服一字煎麝香薄荷湯調下不拘時服塌氣丸錢氏胡椒一兩蠍尾半兩去毒右為末麵糊為丸粟米大每服五七丸至一二十丸陳米飯飲下無時一方有木香一錢又一方胡椒蠍尾各四十九箇大黃膏瑞竹堂治小兒大人脾癖大黃朴硝各等分右為細末同蒜泥和成膏用絹帛攤成膏藥貼於病處其病自消神仙痞丸和濟方治小兒一切痞疾皆因寒溫不調乳哺失節或啖生冷果子粘食等物脾胃微弱不能消化致五臟不利三焦壅滯結塊腹內堅硬如石或發作寒熱有如瘧證不能飲食漸致羸瘦急宜服之斑貓二十箇去頭足翼用糯米半升同炒候米焦黃色為度去米不用巴豆去皮取霜二十粒右先將斑貓碾為細末却入巴豆霜同研令勻用水糊丸如小菉豆大小兒三歲已前每服三丸五更初茶清下更量歲數虛實加減與服治小兒下痢腹大且堅右以故衣帶多垢者切一升水煮取一升分三服又方右以衣中白魚摩腹上亦治隂腫雞殼散全嬰方治小兒腹心胸脅煩滿欲死右以雞子殼燒為末酒調下二歲半錢治小兒氣喉止疼肘後方右用蓬莪茂炮不以多少乘熱搗為末用大一錢酒調下大黃煎肘後方治小兒無故悶癖瘰􅊓或頭乾黃聳或下利乍瘥諸壯熱者右用大黃九兩錦紋新實若微朽即不中用削去蒼皮乃稱搗篩為散以上好米醋三升和之置銅碗中於大鐺中浮湯上炭火煮之火不用猛又以竹木攪藥候任丸乃停於小瓷器中貯三歲一服七丸如梧桐子日再服常以下青赤膿為度若不下膿或下膿少者稍加丸下膿若多丸又須減病重者或至七八劑方盡根本大人小兒以意量之此藥惟下膿宿結不令兒利須禁食毒物食乳者母亦同忌法治小兒癥瘕幼幼新書用煮老鼠肉汁煮粥與食枳實理中丸治虛氣痞塞胸膈留飲聚水腹脅或加脹滿手不可近右四君子湯加枳實去瓤麩炒乾薑炮為末煉蜜丸如菉豆大熱湯化下渴加瓜蔞根下利加牡蠣粉各等分真方五色丸保嬰方治小兒一切所傷痰涎壅塞胸膈不利乳食不消變生癖積脅肋片硬按之痛及治一切急慢驚風發搐痰涎壅塞並宜服之青丸子青黛别研天南星生薑製各半兩巴豆霜半錢紅丸子硃砂水飛半夏湯洗七次薑製合半兩巴豆霜半錢白丸子白附子生寒水石煆各半兩巴豆霜半錢黑丸子五靈脂炒全蠍炒各半兩巴豆霜半錢黃丸子大黃煨鬱金各半兩巴豆霜半錢右件前五色藥各另為細末入巴豆霜半錢同研令勻水麵糊為丸如粟米大每一歲服五丸乳汁送下二三歲兒十五丸五六歲如麻子大每服十五至二十丸溫水薑湯送下食後臨卧日進二服急驚風煎金銀薄荷湯送下慢驚風熬生薑全蠍湯送下不拘時候消積丸保嬰方治小兒一切所傷面黃肌瘦腹脹癖積丁奚頭大腳細雖進飲食不生肌肉腹內作痛下痢腥臭並宜服之常服消化癖積進乳食縮砂仁青皮去盡白陳皮去白廣荗煨銼荆三稜煨銼各半兩巴豆二十一粒去皮膜不去油前五味一處炒黃色去巴豆不用右為細末醋麵糊丸如黃米大每服二三十丸溫米飲湯送下日進二服量兒大小加減服之石膽礬丸保嬰方治小兒面黃肌瘦肚大腹脹癖積塊硬及治大人癥癖積聚服之神效膽礬五錢緑礬五錢右用無油鹽蒸餅一箇約重三兩去頂捥去心裝二礬在內用生麵糊其頂上用文武火燒黃色懸於屋梁上風乾碾為細末又用肥棗三十箇無灰酒一大碗慢火熬成膏子和丸如黃米大每服三十丸加至四五十丸溫米飲送下空心臨卧日進二服如男子婦人服之丸如梧桐子大每服三四十丸生薑湯送下忌一切生硬冷物中滿分消丸試效方黃連枳實麩炒厚朴薑製各半錢生薑薑黃豬苓各一錢橘皮白术甘草各一錢砂仁澤瀉茯苓半夏四錢黃芩一兩二錢右為細末湯浸蒸餅為丸如黍米大每服三五十丸溫水送下食前消痞丸試效方黃連半兩枳實二錢黃芩二錢甘草三分人參四分厚朴七分生薑四分橘皮一分薑草半錢右為細末蒸餅為丸如黍米大每服二三十丸隨乳下六神丹保嬰方治小兒久患脾病面黃肌瘦肚大腹脹或有癖積諸蟲服諸藥不效服之如神蘆薈三錢大檳榔半兩血竭别研半錢史君子另搗極細肉豆䓻各半兩麵裹燒熟去麵不用荆三稜一兩右除荆三稜外為細末用烏雞一箇去肚腸淨將荆三稜裝在肚內縫合煮熟為度不用雞肉只用荆三稜切作片子晒乾同前藥一處為細末棗肉為丸如黃米大每服三五十丸溫米飲湯送下或熬皂角子湯送下亦可空心食前日進二服忌一切等肉冷硬等物磨積丸保嬰方治小兒癥癖塊硬腹脅刺痛不思乳食並宜服之常服消磨癖積每進乳食其效如神荆三稜煨銼廣茂煨銼石菖蒲神麯炒麥蘖炒杏仁湯浸去皮尖麩炒各一兩石緑礬二兩叧研黑牽牛四兩炒熟取頭末二兩右為細末釅醋打麵糊為丸如黃米大每服三四十丸加至五六十丸溫米飲湯送下食後臨卧日進二服忌生硬冷物化癖丸保嬰方治小兒脅下癖積堅硬面色痿黃煩躁發熱口燥咽乾肌肉消瘦不進乳食心腹脹滿胸膈不利並宜服之常服此藥消化癖積寬胸順氣每進乳食大有神效荆三稜煨銼一兩石三稜雞爪三稜廣茂煨木香茯苓去皮各半兩枳殼麩炒去瓤三錢半檳榔青皮去白蓽澄茄萆揆各三錢硇砂另研二錢半枳實麩炒去瓤一兩陳皮去白黑牽牛四兩取頭末一兩青礞石半兩另研香附子炒一兩大黃另取末一兩半右件除大黃末外為細末用米釅醋二升入大黃末同熱成膏子為丸如黃米大每服二十丸漸加至三四十丸乳汁送下或溫米湯亦可量兒大小加丸數空心臨卧日進二服薑䜴湯傅氏保嬰治閃癖走疰脅下疼痛黃瓜葉三片生薑塊淡豆豉十粒右研取汁飲半盞必吐涎如不吐閃癖自然而愈鱉甲豬肚丸衛生寶鑑治癖發熱鱉甲九肋者七錢醋炙黃色青蒿七錢青皮去白半兩枳實麩炒半兩黃連七錢柴胡一兩去苗南木香半兩右為細末猔豬肚一箇去脂盛藥蒸熟同和丸治小兒脾病不瘥如神􅌝􅌣根一兩細辛五錢右為細末好醋調作膏藥於脾上貼之一日次換治小兒悶癖痞滿并瘧取土瓜根及葉搗絞汁服當吐下少進之有小毒故也食癥附論夫絶乳小兒寒溫失調飲食不化與藏氣相搏結聚不動名為癥也其食結在腹喜寒四肢灑灑如瘧不能飲食常自隱隱而痛此則食癥也方木香丸幼幼新書治小兒食癥吃食不得四肢消瘦木香檳榔荆三稜微煨銼當歸銼微炒杏仁湯浸去皮尖雙仁炒黃犀角各一分鱉甲塗醋炙黃去裙襴硃砂細研水飛過代赭各半兩細研巴豆半分去心研紙裹壓去油用右為末都研令勻煉蜜和丸如黍米大三歲兒空心以開水下三丸晚再服量兒大小臨時加減代赭丸幼幼新書治小兒食癥久不消代赭細研巴豆去皮心紙裹壓去油丁香半兩黃連去鬚五靈脂桂心各一分麝香細研膩粉各一錢蘆薈二錢細研右為末都令勻煉蜜和丸如菉豆大三歲兒空心以粥飲下二丸量兒大小以意加減當取下一切惡物為效硇砂丸幼幼新書治積年厭食并治血氣及癥塊硇砂半兩細研青礞石細研穿山甲炙令黃焦磁石燒醋淬七遍搗碎細如粉荆三稜微煨銼乾漆搗碎炒令煙出青石脂細研各一分虻蟲炒微黃去翅足水蛭炒令微黃各五十枚巴豆五十枚去皮心研紙裹壓去油右為末入巴豆都研令勻用軟飯和丸如小豆大每服一丸以燒蒸餅灰湯下一復時候取下惡物若是血氣塊當歸酒下不過五服瘥礞石丸一名三稜煎幼幼新書治小兒食癥或時寒熱四肢黃瘦不欲飲食礞砂慢火燒乾薑炮製為末杏仁去皮尖雙仁麵炒微黃各一分巴豆去皮紙壓去油硇砂各半兩右上五味研令細以米醋一碗煎如膏次用荆三稜微煨銼皂莢去皮塗酥炙黃去子蓬莪荗各一分右三味為末以前所煎膏和丸如菉豆大一二歲兒每服以茶清下一丸兒稍大臨時以意加減及治脾虛夾積時作吐利防葵丸幼幼新書治小兒食癥寒熱羸瘦不能飲食防葵三稜微煨銼各半兩肉豆䓻去皮木香枳殼麩炒去瓤麝香各一兩細研川大黃銼碎微炒鱉甲一兩塗醋炙黃去裙襴右為末煉蜜和丸如菉豆大三歲兒每服以粥飲下五丸日二三服更量兒大小臨時以意加減大黃丸幼幼新書治小兒食癥大腸澀滯心腹妨悶川大黃銼碎微炒赤芍藥大麻仁鱉甲各三分塗醋炙黃去裙襴防葵法麵炒微黃白术青橘皮各一分湯浸去白瓤焙右為末煉蜜和丸如菉豆大三歲兒每早辰以溫水下五丸晚後更量兒大小以意加減一方有木香無青皮治小兒癖氣腹痛四肢黃瘦芍藥丸聖濟總録治小兒食癖本以腸胃氣弱吃食不化結聚不散腹中隱隱成塊按之即痛芍藥大黃炒銼鱉甲醋炙去裙襴麻仁研各三分防葵陳麯炒白术各一分右為末煉蜜和丸如豆大一歲兒每服一二丸三歲至五歲五丸並溫熟水下日再服更量兒大小加減治小兒食癥大腸澀心腹妨悶幼幼新書膩粉一錢乾胭脂一分巴豆霜半分硃砂半兩細研水飛過右研令勻以醋煮麵糊和丸如菉豆大每服空心煎橘皮湯下二丸量兒大小加減服之又方幼幼新書荆三稜煨銼為末五靈脂各半兩巴豆霜半分右研令勻醋煮麵糊和丸如菉豆大每服空心茶清下二丸量兒大小加減服之又方幼幼新書菖蒲末半兩巴豆二十粒去皮研爛以頭醋一盞熬成膏右為末入巴豆膏和丸如菉豆大每服空心以茶清下二丸量兒大小加減服之香朴丸永類方治食傷癥冷逆不升降嘔吐不止胸膈留停積滯不化藿香葉厚朴薑製淨陳皮半夏麯白术白茯苓各一分甘草炙二錢乾