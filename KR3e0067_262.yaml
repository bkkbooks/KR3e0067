惡實炒枳殻去穣麸炒大黄剉碎微炒各一兩右為散每服二錢煎紫蘇湯調下如人行十里再服以利為度枳實湯聖惠方治乳石發動大小腸壅滯不通脇肋妨悶胷膈痰結不下飲食枳實去穰麸炒令黄前胡去蘆頭檳榔剉木通剉各一兩甘草炙半兩大黄一兩半剉炒右粗搗篩每服三錢水一盞入生薑半分煎取六分去渣不計時候温服一方有木香檳榔散聖惠方治乳石發動心躁煩熱痰結不下飲食大小腸壅滯腰背疼重檳榔川芒硝枳殻麸炒去穣川大黄各一兩剉炒甘草半兩炙微赤剉右為細末每服二錢煎竹茹湯調下如人行十里再服以利為度三黄丸聖惠方治乳石發熱大小腸壅滯不通川大黄剉碎微炒黄芩黄連去鬚各三兩右為末鍊蜜丸和搗三二百杵丸如梧桐子大每服不計時候以煖水下四十丸大麻仁飲聖濟總錄治乳石發動致人虛勞下焦有熱骨節煩疼肌急内痞小便不利大便澁難口乾舌燥氣乏少力折石敗熱大麻仁五合研爛絞取汁䜴三合以綿裹作袋子右以水四盞将麻仁研爛絞取汁并䜴袋子與水同煎至二盞去滓分為四服早晨日午晚食前各一夜更一服治乳石發虛勞下焦虛熱骨節煩疼肌肉急小便不利大便數少吸吸少氣折石敗熱出聖濟總錄用大麻子三合研令極爛以水三盞煮至一盞半分二服早晨日午各一治乳石發動大便難腹中堅脹者為積久腹中乾糞不去出聖濟總綠宜銷酥及蜜并石膏末和服令滋潤腹中即下若不下更服大黄朴硝等下之便瘥冷熱熨方千金方若大小便秘塞不通或淋瀝溺血隂中疼痛此是熱氣所致用此法即愈前以冷物熨小腹已次以熱物熨之又以冷物熨之若小便數此亦是取冷所為煖将理自愈乳石發下痢附論夫乳石之性剛猛氣多炎上理之傷温則火轉為熾内煎脾肺苦熱遂成其渴飲水過多則溲腸胃胃得水則吐腸得水則寒而腸雖寒火炎不滅水漸流下而為行潦遂變下痢胃氣虚冷水糓不消在陽則益熱不食在隂則腸鳴而洩也方黄蘗湯出聖濟總錄治乳石發夾時行兼有客熱下血痢止血黄蘗微炙剉碎黄連去鬚石榴皮炙剉碎芍藥各三兩乾薑炮製一兩阿膠炙令燥匀半兩梔子仁十五枚右粗搗篩每服四錢以水二盞煎至一盞去滓温服日再黄耆散出聖惠方治乳石發動熱毒傷胃下痢腹痛黄耆地榆當歸剉微炒各一兩茜根黄蘗各三分犀角屑半兩右為散每服半兩以水一大盞煎至六分去滓稍熱分二服日三四服木香散出聖惠方治乳石發動變下痢赤色腹痛不可忍木香三分黄連去鬚當歸剉微炒地榆剉各一兩甘草炙微赤剉半兩赤芍藥一兩右為散每服四錢以水一中盞煎至六分去滓不計時候稍熱服地榆散出聖惠方治乳石發動煩熱腹痛變為下痢不欲飲食地榆一兩木香半兩葳㽔當歸剉微炒黄芩各三分右為散每服四錢水一中盞煎至六分去滓温服不計時候黄連湯治解散除熱止痢甘草炙升麻各一兩黄連剉三兩䜴五合梔子仁十四枚右切以水三升煮取一升分温服犀角散出聖惠方治乳石發動心神虚煩變為下痢腹痛不思飲食犀角屑木香各半兩地榆一兩赤芍藥黄芩各三分右為散分為六服每服以水一中盞煎至六分去滓不計時候稍熱服白术散出聖惠方治乳石發動多服涼藥過度致脾胃虚冷腹痛下痢不能飲食白术當歸剉微炒陳橘皮用湯浸去白切焙各一兩人參去蘆頭三分木香半兩右為散毎服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服梔子仁湯聖濟總錄治乳石發下痢梔子仁二十一枚人參黄連去鬚甘草炙令赤色剉各二兩右粗搗篩每服四錢用水二盞煎至一盞去滓温服早晨日午晚後食前各一香䜴飲出聖濟總錄名葱白䜴湯治乳石發下痢豉五合葱白一握切乾薑炮製搗末二兩甘草微炙剉搗末一兩右先以水三盞入甘草乾薑二味末各二錢煎至二盞去滓下碎葱白一合䜴一合更煎一盞去滓分為三服早晨日午近晩各一服治癰腫熱盛取冷過多寒中下痢食完出甘草炙乾薑附子炮各六兩蜀椒二百三十枚去汗右切以水六升煮取三升分服之忌如常法黄連湯出聖濟總錄治乳石發白痢黄連去鬚綿裹一兩白蜜一兩童子小便二盞右以水二盞與小便漬藥一宿煎至一盞半去滓分為二服弱人三服早晨日午晚後温服梔子湯聖濟總錄治乳石發赤白痢兼熱煩悶梔子仁十枚薤白一握切䜴一合右以水三盞煎至一盞半去滓分温二服弱人分三服食前服黄連湯聖濟總錄治乳石發下痢黄連去鬚一兩䜴五合外臺秘要方不用豉烏梅取肉十枚右剉碎以水三盞入童子小便一盞薤白三莖拍碎同煎至二盞去滓分温三服空心日午晚後各一粱米湯聖濟總錄治乳石發散已經快利熱尚不退兼痢不斷粱米一合黄連去鬚剉碎三兩右粗搗篩以水四盞煎至一盞分三服去滓食前温服一日令盡治乳石下痢及常服壓石方聖濟總錄用䜴三兩炒令黄香候冷搗篩為末每服二錢冷水調下又方服乾䜴即止多服益佳解乳石痢方聖濟總錄用紫笋茶二兩搗羅為末每服三錢以水一盞煎至七分和滓服之早晨日午晚後食前各一治藥發下痢用乾薑五兩切以水二升煮取一升去滓頓服治熱毒赤白痢用羊肝去膜切以水淘二十遍血盡以粟米飯拌作麫餅以水煮熟漉着漿水中淘之乾漉以羙蒜虀候極飢食之不過三兩頓即瘥解石痢方聖濟總錄用真好芥淡煮濃汁服二三盞重者三服輕者一二服瘥若下痢如寒中者為行止食飲犯熱所致宜速脱衣冷食冷飲冷水洗即瘥服乳石備飲常法附論服乳石者莫急於将適将適之法莫先於飲食有所宜者有所當忌慎者有不可不預偹而防其疾之将然者今特叙之方服乳石之人所宜飲食方出聖濟總錄取猪脂并猪肉可一月三五度食之佳又以水牛頭蹄及白羊頭蹄猪肉作薑䜴隨意食之果實宜食梨柿等凡欲服熱羊肉麫食之類宜先食三五匙冷飯即不妨熱食訖仍速以冷飯壓之行歩釋散乃善服石人有性喜麫嗜酢不能禁慎者宜食冷淡糠酢百沸紫麫及水摸餅即無妨冷韮羹大補時時宜食之又服石人雖可飲酒而不宜多飲酒多則失食味失食味則不能食不能食則令人虚熱虚熱則令石數發惡寒况又損石力為酒能壓石令人風虚腰脚弱若能飲又能食大佳服石忌慎方出聖濟總錄凡服石飲食切忌熱麫白酒陳臭酢漿雞犬羖羊牛肉鮑魚鮑臭魚脯血羹冷酒有灰酒蕎麥小豆胡麻動作切忌乗飢灸灼熱湯沐浴夏月空腹忿恚及過市㕓及喪家并哭泣衝熱忍飢登甚穢厠親不潔婦人蔬菜忌芸薹胡荽荏堇枸杞芥菜大蒜果實忌梅杏桃李藥物忌烏頭附子天雄蒼耳等悉宜消息以取安平且服石将慎至難不能将息不若勿服蓋背折腦裂發乳體腫之疾徃徃因此得之故耳夏月不宜多食猪肉冷水恐腸滑利不止及傷冷飲食不消致成霍亂也服石後将慎紫麫餺飥方出聖惠方取烏豆不拘多少取濃汁代水和麫依常法作麫食還向此豆汁中煑熱乾則添豆汁勿加水候熟入猪羊菉豆等臛食之和此等作麫尤佳水摸餅方出聖濟總錄作餅欲上𨫼時以水塗摸生餅上表裏􅏼之勿食胡餅燒餅等大壅熟故也宜食麫餅方出聖惠方取麫拌如常餅法細切如小豆大以麫於簸中拌令如丸煮熱乾漉出置冷水中又漉出置盤中以粉再拌麫丸内鐺中煮令極熟乗熱任以五味汁及諸肉臛食之大涼補腰脚於藥無犯又方出聖濟總錄取新大麥為麫和肉汁及作餅食甚良凡大麥熟蒸為餅和黒豆相拌食良夏日冒熱逺行食晚失飢石必發動宜作大麥餅将行飢即食之壓石療飢甚妙若覺渴及熱盛慎勿食炙肉羊麞尤惡自死肉性平冷者通食仍勿熱進恐成消渴乳石發諸藥不治者附論乳石發動各有方劑以對病證固有疾勢異常諸藥所不能治者因别叙備用之法方葳蕤酒出聖濟總錄治乳石發動諸藥不效葳㽔升麻薺苨人參各三兩大黄剉炒梔子仁芒硝甘草炙剉各二兩黄芩去黑心葛根剉紫草去蘆頭犀角鎊各四兩銀屑二兩半豬脂臘月者三兩露蜂房五兩大豆浸暴乾炒去皮一合右除豬脂銀屑外搗羅為細末以無灰酒二升宻封浸一宿次将猪脂用好酒一升鍊開以銀屑相和研入前藥酒内更浸一宿毎服取酒一二盞飲之豆䜴酒出聖惠方治乳石發動諸藥不治醇酒一升䜴五合右同煮沸熱澄清旋飲一盞良治乳石發熱困諸藥不效者出聖惠方豬脂五合成鍊者芒硝四分右以水三升入葱白五合切䜴心三合同煮取一升濾去滓下豬脂芒硝二味再煎一沸分五服以瘥為度治乳石發諸藥療不瘥者出聖濟總錄用硝石明白者一塊如杏子大不拘時逐旋含化嚥津普濟方卷二百六十二
