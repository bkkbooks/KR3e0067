body:
  text: 普濟方卷二百六十二明周王朱橚撰乳石門乳石發浮腫附論石發而身體腫者以食飲過温不能勞動致熱氣蓄壅於肌肉不得宣散故也亦有外感風濕内有停水與石勢相薄其氣滯塞致浮腫者然食飲過温不自勞動其為腫也但體熱虚腫而已若風濕停水而發腫則必心中煩滿小便澁不可不辯也方硝石湯出聖濟總録治乳石發動上攻頭面浮腫硝石萆薢防風去义黄連去鬚炒大黄剉炒甘草炙剉各一兩地榆剉羌活去蘆頭桑根白皮剉炒龍骨各一兩半代赭石煨一兩半桂去粗皮剉碎黄芩去黑皮各半兩石韋去毛二兩枳殻去穣麩炒一兩右粗搗篩每服五錢水一盞半入生薑三片同煎至八分去滓温服赤茯苓散出聖惠方治乳石發動心神煩躁悶亂身體面目浮腫喘促坐臥不得赤茯芩澤瀉柴胡去苖漢防風豬苓去黒皮麥門冬去心桑根白皮剉犀角屑紫蘓莖葉子芩木通剉各一兩川大黄一兩半剉炒檳榔一兩半右為散每服四錢以水一中盞入生薑半分葱白二七寸煎至六分去滓不計時候温服防風湯出聖濟總録治乳石發動上衝頭面疼痛浮腫心神恍惚防風去叉當歸切焙澤瀉葳靈仙去土甘草炙剉黄連去鬚虎杖各一兩半石韋去毛天門冬去心焙槐實炒白石脂研地榆各二兩石膏碎三兩生地黄切焙六兩大黄剉炒黄芩去黒心犀角鎊硝石研各一兩右㕮咀每服五錢水一盞半入生薑一分煎至八分温服漢防風散出聖惠方治乳石發動身體浮腫痰結不食腹中滿悶喘息氣阻漢防風赤茯芩木通剉枳殻麩炒去穣各三分桑根白皮剉紫蘇莖葉剉大腹皮剉前胡去蘆各一兩黄芩甘草炙微赤剉半夏湯洗七遍去滑炒半兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓温服日三四服枳殻散出聖惠方治乳石發熱心神煩躁身體赤腫胸中煩悶枳殻麩炒微黄色去穰一兩桑根白皮剉牛旁子微炒川升麻黄芩赤茯苓各一兩石膏二兩漢防風大青沙參去蘆頭麻黄去根節各三分甘草半兩剉用右為散每服四錢以水一中盞入生薑半分煎至六分去滓溫服日三四服茯苓湯出聖濟總録治乳石發腫赤茯苓去黑皮淡竹葉一握切碎白术甘草炙人參枳實去穰麸炒梔子仁各一兩大黄剉炒二兩黄芩去黒心三兩右粗搗篩每服三錢水一盞煎至七分去滓温服升麻湯出聖濟總録治乳石熱發腫初覺壅者升麻大黄剉碎微炒黄芩去黑皮枳實去炒麩芍藥各三兩當歸切焙甘草炙各一兩右粗搗篩每服三錢水一盞煎至七分去滓温服紫雪散出聖惠方治乳石發熱身體微腫頭靣瘡出紫雪二兩川升麻黄芩葳㽔各一兩犀角屑甘草生剉梔子仁各半兩右為散每服四錢以水一中盞煎至六分去滓温服日三四服木通湯出聖濟總録治服石人水氣内積面目腰膝腫硬小便澁木通炙剉桑根白皮炙剉各半兩赤芍藥桔梗剉炒各三兩葶藶子隔紙炒白茅根微炒各一兩右粗擣篩每服五錢水一盞半煎至七分去滓空腹温服日再紫蘓子丸出聖濟總録治乳石風濕外摶水飲内停身面微腫小便澁紫蘓子微炒一合半陳橘皮去心焙杏仁去皮尖雙仁炒防己赤茯苓去黑皮各一兩葶藶隔紙炒三分右各搗羅為末鍊蜜丸如小豆大每服五十丸加至三十丸空心用桑白皮赤小豆煎湯下日再服呉藍散出聖惠方治乳石毒氣攻注皮膚浮腫心神煩躁體熱不得睡臥呉藍漢防風黄芩梔子仁𤣥參犀角屑川升麻白鮮皮甘草生剉各半兩川大黄剉微炒川朴硝各一兩桑根白皮剉三分右為散每服四錢以水一中盞煎至七分去滓温服日三四服芍藥湯出聖濟總録治乳石發熱堅腫芍藥枳實去穰麩炒大黄剉炒升麻各二兩當歸切焙一兩右粗搗篩每服三錢以水一中盞煎七分温服去滓空心食前日午各一服赤茯苓散出聖濟總録治服石人水氣内積面腫赤茯苓去黑心牽牛子炒各一兩半枳殻去穣麩炒陳橘皮去白焙甘草炙各三分右搗羅為散每服二錢如茶㸃服不拘時生麥門冬湯出聖恵方治鍾乳發寒熱胸中壅塞面腫手足煩痛生麥門冬去心微焙一兩豉微炒一合右粗搗篩每服三錢水一盞葱白三莖拍碎同煎至六分去滓空心溫服檳榔湯出千金方凡服散之後忽身體浮腫多是取冷過度所致用檳榔三十枚搗碎水八升煮取二升分再服一方用子搗作末其皮㕮咀以湯七升煮取二升去渣内子末為再服治乳石發動周身患腫不能囬轉者為乆坐不行又不飲酒藥氣滯在皮膚之内血脉不通也出聖濟總錄宜飲酒冷水洗自勞即瘥不能行者遣人扶持強行使支節調暢乃止亦不得過度使反發熱倘發熱者還當洗之治乳石發動四肢面目浮腫者為飲食温久不自勞力藥與正氣相隔也出聖濟總録但飲熱酒冷食自勞及洗浴即瘥治乳石發動腹背熱如杯如盤許大者出聖濟總錄但以冷石隨熱處熨之治乳石發熱腫出本草用夏冰熨之治患丹石發腫出本草以腫處於濕地上卧熨之地熱易之乳石發癰腫附論乳石性本炎悍服者茍将適失度食飲不時致熱毒發泄不擇所出或瘭疽發背或腸癰瘡毒不可勝治間雖有未嘗服石而毒氣潰漏如是者亦以腑臟久蓄熱毒或以胞胎之初禀受石氣其来有自治法當先以疎利之劑散其毒而外施傅貼之術蓋六腑不和而成癰若乳石散動熱氣内乗六腑六腑血氣行於經脉經脉為熱所摶而外有風邪乗之則石壅結血氣否而成癰腫也方無名異膏出聖濟總錄治乳石癰毒發背無名異研没藥研麝香研檀香剉丹砂研沉香剉騏驎竭研乳香研突厥白剉白歛剉白芨剉白芷剉雞舌香研雞骨香研當歸切焙芎藭剉槐枝剉牛膝剉酒浸焙防風去义剉大黄剉炒桞枝剉桑根剉各半兩蠟四兩鉛丹十二兩清油二觔右除油蠟丹及前八味研末外並剉研先熬油令沸下檀香等一十四味剉藥煎候白芷赤黑色絞去滓再煎入蠟鉛丹以桞箆攪候變黑色滳於水中成珠子輭便得所後下無名異等八味研末攪令匀以甆盒盛用故帛塗貼瘡上每日一次換以瘥為度甜菜膏出聖濟總錄治乳石發癰疽瘡止痛生肌甜菜三兩生地黄豬脂各三兩大㦸炒一兩當歸切焙防風去叉半兩續㫁白芷芎藭各半兩甘草炙三分莽草半兩芍藥三分細辛去苗葉大黄炒剉黄耆炙剉杜仲去粗皮酥炙黄芩去黒心各一分蜀椒去月并合口者炒去汗一分右除豬脂外剉碎先熬脂令沸下諸剉藥煎候白芷赤色絞去滓甆合盛每日三五次塗傅瘡上必効膏出聖濟總錄治乳石癰疽發背瘡毒止痛吮膿油一觔鉛丹研一兩麝香研一錢膩粉研蠟各三分楓香脂一兩半丹砂細研半兩鹽半兩白芷剉乳香研當歸炙剉桂去粗皮剉芎藭剉藁本去苖土剉細辛去苖葉剉蜜陀僧研各一兩右先将油煎令沸次下白芷等六味剉藥煎候白芷赤黑色漉出下蠟楓香候鎔盡以綿濾去滓下鉛丹蜜陀僧乳香以桞箆攪煎候變色滴水中成珠子即下鹽丹砂麝香粉等攪匀傾於磁盆内安净土上一宿除火毒用故帛上攤貼日二以瘥為度麥門冬湯出聖濟總錄治乳石發癰疽發背熱渴麥門冬去心焙赤茯苓去黑皮石膏碎生地黄焙升麻人參知母焙山梔子仁芎藭各三分小麥半升黄耆炙剉甘草炙枳實麸炒芍藥各一兩黄芩去黒皮前胡去蘆頭各一兩半右剉如麻豆大每服五錢水二盞入生薑五片棗二枚擘破竹葉十片同煎至一盞去滓温服不拘時黄耆湯出聖濟總錄治乳石發動癰疽内熱大渴黄耆炙剉前胡去蘆頭大黄剉炒各一兩半栝蔞根二兩木通剉黄芩去黒心芍藥赤茯苓去黒皮甘草炙剉知母焙人參當歸切焙升麻生地黄研取汁小麥各一兩右除地黄外粗搗篩每服五錢水二盞竹葉二七片切碎煎至一盞去滓入地黄汁半合再煎沸空心日晚各一服黄耆散出聖惠方治乳石發動生癰腫煩疼壮熱口乾心煩大小便澁滯黄耆剉川升麻黄芩各一兩犀角屑地柏微炙𤣥參赤茯苓當歸甘草生剉枳殻麸炒微黄去穰梔子仁各三分川芒硝一兩半木香連翹各半兩川大黄剉碎二兩微炒右為散每服四錢水一中盞竹葉三七片煎六分去滓温服連翹散出聖惠方治乳石發毒生癰腫煩熱疼痛口乾心煩筋脉拘急頭項強硬連翹黄耆剉川升麻葛根剉地骨皮麥門冬去心犀角屑黄芩各三分木香甘草生用沉香防風去蘆頭各半兩紅雪二兩石膏碎二兩右為散每服四錢水一中盞入竹葉三七片煎至六分去滓温服日三四服犀角丸出聖濟總錄治乳石發動癰疽發背一切毒氣止痛化膿犀角屑一兩大黄切焙黄芩去黒心升麻防風去叉當歸切焙人參黄耆炙剉梔子仁黄連去鬚乾藍甘草炙各半兩巴豆十枚去皮心炒研令細右除巴豆外搗羅為末入巴豆和匀鍊蜜為丸如桐子大每服五丸米飲下快利為度黄耆丸出聖濟總錄治乳石發動癰疽發背一切熱毒及惡瘡黄耆炙剉犀角屑各一兩半黄連去鬚茯神去术當歸切焙防風去义芍藥升麻赤茯苓去黑皮黄芩去黑心甘草炙各半兩木通剉一兩麝香研半分右除麝香外搗羅為末入麝香研和匀鍊蜜為丸如梧桐子大每服二十丸生薑湯下未效加至三十丸淋洗方出聖濟總錄治乳石發熱初欲作腫用石燕子七枚粗搗篩以水三升煮取二升頻淋洗癰腫處以瘥為度若觸穢必不善四體懔懔飲食無味亦可含香丸如不瘳者先服一盞五香湯取微利一行佳則不煩沐浴也治五毒發背出本草用金星草和根凈洗慢火焙乾秤四兩入生甘草一錢搗末分作四服每服用酒一升已來煎三二沸後更以冷酒三二升相和入缾器内封却時時飲之忌生冷油膩毒物五香連翹湯出聖濟總錄治乳石發動癰疽發背諸腫毒及惡核瘰癧連翹去梗木香沉香董陸香研麝香研射干升麻獨活去蘆頭桑寄生剉各三兩丁香一兩木通剉大黄剉各三兩右除麝香外粗搗篩和匀每服五錢水二盞煎至一盞半去滓入竹瀝二分再煎沸温服不拘時忌猪肉蒜生菜宜兎肉五味子湯出聖濟總錄治乳石發為癰疽五味子炒前胡去蘆頭當歸切焙黄耆炙剉人參各一兩小麥一合黄芩去黒心麥門冬去心焙乾各一兩半甘草炙剉三分桂去粗皮升麻各半兩生乾地黄焙一兩右粗搗篩每服五錢以水二盞棗一枚擘破生薑三片煎至一盞去滓温服空心日午各一服犀角散出聖惠方治乳石發作生癰疽心神煩躁口乾肩背拘急四肢疼痛犀角屑三分川升麻黄耆剉𤣥參薺苨麥門冬去心地骨皮木香各一兩甘草一分生用黄芩三分葛根一兩剉川大黄二兩剉炒右為散每服四錢以水一中盞入竹葉三七片煎至六分去渣温服日三四服𤣥參散出聖惠方治乳石發動煩熱生癰腫疼痛𤣥參黄芩葳㽔地骨皮梔子仁連翹各三分紫雪二兩川升麻沉香川大黄各一兩碎微炒犀角屑三分甘草半兩生剉右為散每服四錢以水一中盞入竹葉三七片煎至六分去滓温服日三四服増損當歸湯出聖濟總錄治乳石發為癰疽腫痛煩熱當歸切焙赤茯苓人參前胡去蘆頭黄芩去黑心芍藥甘草炙剉各一兩小麥一合竹葉半兩麥門冬去心焙二兩桂去粗皮半兩右粗搗篩每服五錢以水二盞棗二枚擘破煎至一盞去滓空心日午各一服犀角湯出聖濟總錄治乳石發動初覺皮膚有癤毒恐成癰疽及腑臟壅澁寒熱口乾心煩犀角鎊知母剉各半兩木通剉芍藥升麻薺苨麥門冬去心焙黄芩去黒心甘草炙剉葳㽔各三兩右粗搗篩每服五錢用水二盞煎至一盞下竹瀝半合馬牙硝一錢更煎數沸濾去滓空心温服快利為度未利再服人參湯出聖濟總錄治乳石發動癰疽虚熱人參甘草炙剉黄耆炙剉芍藥各一兩半當歸切焙赤茯苓去黒皮芎藭黄芩去黒心木通剉各一兩右粗搗篩每