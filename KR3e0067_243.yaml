蘆五兩葛皮桂去粗皮半夏四兩乾薑三兩防風一兩去乂甘草二兩右為散每服五錢水一盞半煎至一盞空心温服至日午再服越婢丸療風脚痺弱兼治内極熱則身體精脫腠理開汗大泄厲風氣下焦脚弱麻黄六兩石膏半斤白术四兩大附子一枚生薑二斤大棗十五枚甘草二兩炙右切以水七升先煮麻黄候沸掠去沫内諸藥煮取二升分三服覆取汗一方用附子二枚忌海藻菘菜猪肉冷水桃李雀肉等黒豆煎出聖惠方治脚氣緩弱無力不能行歩黒豆三升附子三兩天雄三兩已上三味用水一斗煮候豆爛熟即出薄切焙乾去豆用豆汁天麻二兩五加皮二兩牛膝二兩葳靈仙二兩右為細末入豆汁中煎稀餳每於食前以温酒調半匙服枳實湯治風毒心腹虚脹脚氣痺弱不能行歩枳實去穰草豆䓻杉木莭大腹青橘皮湯浸去白右為散每服五錢水一盞半入生薑三片煎至一盞去滓食前温服日三三聖散出仁存方治手足拘攣口眼喎斜左癱右瘓骨莭疼痛脚弱無力行歩不正亦服之當歸酒浸肉桂元胡索炒右等分為末每服二錢温酒調下臨卧日進三服除有孕婦人外老幼皆可服湘中黄槐卿父子三世用此藥功效甚多乳煎硫黄散出肘後方治脚氣乆虚緩弱黄牛乳三升硫黄研如粉一兩右先将牛乳煎令减半每服以乳五合入硫黄二錢調和服之服畢厚以衣被卧取汗勿令見風午時日晡各再服一服得汗不用再服若病未痊三五日一服無牛乳羊乳亦可獨活酒出聖惠方治脚氣乆虚脉沉細緩弱附子二兩半獨活去蘆二兩半右剉如麻豆大盛以酒袋内甆瓶中以醇酒五升浸宻封三日後旋取從一合飲之加至半盞長令體中酒氣相接未效再服以差為度栁白皮湯治風氣緩弱疼痺腫滿用栁白皮三升細剉如碁子大以水一石煎取六斗取一小甕子可受一石者内湯甕中以兩木横甕底脚踏其上湯不得過三里穴如此三度即消如浸時使湯常熱佳食栗方一名消脚氣法治脚氣風痺緩弱腎虚腰脚無力右用生栗子每旦二十三顆食之次食猪腎粥佳松葉酒出千金方治脚弱十二風痺不能行服更生散数劑及衆治不得力服此一劑便能行逺不過兩劑愈右用松葉六十斤㕮咀以水四石煮取四斗九升以次釀五斗米如常法别煮竹葉汁以漬米并用饋飯泥釀封頭七日發證飲之取醉得此力者甚衆神效單服松脂散出千金方治一切風及大風脚弱風痺方薫陸法亦同右用松脂三十斤以棕皮袋盛繋頭鐺底布竹木置布袋於上以石五顆壓之下水於鐺中令薄煮之膏浮出得盡以後更二十沸接置於冷水中易袋洗鍋更洗煑如此九遍藥成搗篩為散以麄羅下之用酒服方寸匙初以冷酒調藥入服後飲熱酒行藥以知為度如覺熱即減不減令人大小便秘澁若澁冝食䓤羮仍自不通冝服生地黄汁微取泄利除忌大麻子以外無所忌禁若欲斷根加茯苓與松脂等分蜜和為丸但食淡麵餺飥日兩度只食一小碗勿多食也作餺飥法硬和麵熟接煑五十沸漉出冷水淘更置湯中煑十餘沸然後漉出食之服松脂三十日後即覺有驗兩脚似有水流下是效如恐秘澁和一斤松脂茯苓與棗栗許大酥即不澁服之一百日後脚氣當愈仙經云服松脂一年増夀一年服二年増夀二年及服之十年則増夀十年凡合酒法皆将此藥以綰袋盛之内酒中蜜封頭春夏四五日秋冬七八日皆以浸足為度去滓服酒盡後其滓搗酒服方寸匙日三服盡大法冬冝服酒至立春冝停立效丹出百一選方治脚緩弱及膝弱甚者紹興府戒珠寺一僧病数十年不能行服此藥而愈遂傳此方右以附子用麵褁煨熟去皮臍葱自然汁丸如梧桐子様大每服五十丸空心煎葱白湯酒下喫少頃温粥蒸餅壓之一方用生附子以葱涎和丸温酒鹽湯送下十五丸至二十丸治暴脚軟脚右用赤蓼焼灰淋汁浸以蒸桑葉罯立愈一方煑湯淋洗治暴脚軟疼右用櫸栁根細切如小豆大煮令熟更入菉豆爛煮之為飯每日如此服餌以差為度療脚氣屈弱者田舎貧家無藥者可釀葜及松莭酒皆佳出肘後方右用一斛净洗剉之以水三斛煮取九斗以漬麵又以水二斗煮滓取一斛以積汁釀之如酒發熱沛取飲隨多少若用松節及葉亦凖此法其汁不厭多也患脚氣屈弱積年不能行腰脊攣痺及腹内堅結者服之不過三五劑皆平復如常神效烏附蓯蓉丸治腿無力大壮筋骨人參當歸乳香各半兩沒藥丁香莵絲子各兩半自然銅一兩虎脛骨半兩古老錢十文川牛膝白膠香龍骨木香蓯蓉訶子草麻川烏敗龜五靈脂何首烏川芎五味子赤芍藥黒附子金銀根桑螵蛸各半兩梹榔二錢半縮砂木鱉子川棟子各半兩朱砂二錢半破故紙地龍葫蘆芭巴㦸骨碎補葳靈仙各一兩右為末醋打麵糊為丸如梧桐子大每服三十丸鹽湯送下枳實散治脚氣緩弱上氣痿痺脹滿不能食枳實炒一兩桂心去粗皮二兩白术赤茯苓右為細末每服五錢七空心温酒調服近晩再服豉湯治脚氣緩弱疼痛痺腫滿䜴三升蜀椒一升生薑二斤右以水一斗五升煮一沸貯在小瓮子中著二小木横瓮下脚踏木上湯不過三里穴以故衣塞瓮口勿令通氣微著煻火焼勿令甕冷使湯常熱歇令片時浸脚了急将綿衣盖兩脚令暖勿令見冷風臨卧浸之佳牛膝湯治脚氣手足緩弱膝疼痺上熱下冷或時心悶或嘔吐牛膝萆薢麥門冬赤茯苓黄茋芎藭防風丹參各一兩陳橘皮人參附子獨活桂去粗皮各五兩甘草當歸各四兩杏仁十五枚右剉如麻豆每服五錢水一盞半薑一分拍碎同煎至一盞去滓温服不拘時日三服附子膏治脚氣風毒疼痛及緩弱無力附子二兩呉茱茰川椒各一兩白芷二兩前胡一兩漢防己一兩芎藭白术桂心各一兩當歸二兩細辛一兩右件藥細剉用帛褁以醋二升漬一宿用猪脂三斤慢火煎令藥色黄膏成絞去滓盛甕中每取摩患處嘉和散治脚氣皆因脾胃虧損血虚筋虚因四氣或因飲食而發枇杷葉薏苡仁茯苓人參縮砂仁甘草各一兩杜仲石斛隨風子木香藿香沉香陳皮各二錢糓芽桑白皮白豆蔲青皮各半兩半夏神麯各一錢五味子梹榔各半兩白术一兩丁香半兩右㕮咀姜棗煎療血虚入乾柿一枚煎療氣隔吐逆入韭白煎療胃弱夜乂丸出澹寮方川烏大者二兩切作片子用搥碎大蒜一枚烏豆半兩同煎青鹽一兩蒼术一兩連鬚葱白一束右為細末好糓醋同煎煮豆汁為丸梧桐子大每服三十丸木𤓰鹽酒空心下治乆患脚氣不曽寕息膝筋寒歩履痛右用白术附子木香加倍飲石楠丸数服有神效療乆年脚氣或老年膝疼不能行歩者右用局方术附湯倍用附子加木香一錢水三盞并生薑五片煎取一盞二分去滓送下局方石楠丸五十粒数服立愈或元氣弱者煎前飲子送下震靈丹十粒治脚氣弱患在濕熱風証出指南方以烏藥順氣湯加麻黄白芷主之濕證以金不換并正氣散加茯苓乾薑主之煮肝散出徳生堂方治肝痿脚弱及傷寒手足乾小不隨軟不可行紫苑桔梗蒼术芍藥右為細末每服四錢羊肝半手大竹刀切勿犯水令血散入鹽醋葱薑酒煮熟空心日進三服此藥見其肉生兩日間生及復舊亦東坡先生家藏方得效有名姓者甚多橘紅丸出指南方治膝脛痿弱橘皮不拘多少净去枝梗日晒乾右為末煉蜜丸如梧桐子大每服三十丸薑湯下烏頭剉散出指南方治膝脛痿弱川烏官桂川椒一兩葱二莖右為剉散水一斗煮五升乗熱蒸氣先重以衣覆之勿泄氣候可通手淋渫洗之續㫁丸出指南方治膝脛痿弱洗後覺無力者冝之續斷石楠茵芋各三兩附子半兩地黄三兩右為末酒糊丸梧桐子大每服三十丸食前米飲下大鱉甲散出指南方治膝脚内實腫疼大便不通者冝下鱉甲二兩防風麻黄白术石膏知母升麻茯苓橘皮川芎杏仁人參半夏當歸芍藥甘草萎㽔麥門冬大黄呉茱茰赤小豆各一兩犀角木香雄黄各半兩羚羊角川烏頭貝齒各七个右為粗末每服五錢水二盞薑五片棗一枚韭白一束煎一盞去滓入麝香少許攪匀温服椒仁丸出指南方治膝脛痿弱胸中痞悶小便不通者宜服椒仁商陸橘皮桑白皮等分右細末麵糊為丸如梧桐子大米飲下三十丸以通為度梹榔丸出指南方治服藥之後痿痺漸退但微痛者冝之梹榔芎藭等分右為細末煉蜜丸如桐子大每服三十丸薑湯下以大便通為度鹿茸丸出指南方治嗜慾過甚膝疼熱弱鹿茸五兩乾地黄兎絲子牛膝各二兩萆薢一兩附子半兩乾漆半兩炒煙盡右為細末麵糊丸如梧子大每服三十丸用米飲下黄茋散出指南方治膝脛腫投指按之時時痛痒漸生瘡痬黄茋枳實各一兩土蒺䔧赤小豆各二兩甘草半兩右為細末每服二錢米飲湯下療脚弱出本草右以孔公蘖搗末酒浸飲之治脚弱出本草右以松莭釀酒服之愈脚氣痺攣附論夫脚氣痺攣者由風寒濕三氣并客於外内之間真氣不周故為痺其風氣最多則腫為行痺走無常處其寒多者則為痛痺其濕多者則為著痺冷而無汗濡痺也但隨血脉上下不能左右去者為周痺在肌中或發下上左應右右應左者偏痺也夫痺甚陽氣少隂氣多者令人身寒陽氣多而隂氣少者則但身熱諸痺風勝者易愈在皮間亦易愈在筋骨攣痛者則難痊也乆痺収深令榮衞澁經絡滯則不知痛痒風不可已者足履冷時如入冰腹中股脛煩疼或嘔心煩懸時時汗出目眩悲恐短氣不樂是其候也又風濕着人四肢并體不収不隨入臟便瘖啞四肢緩縱口舌不収攝也其病偏從脚上者盖地土卑温冬月少霜雪山水蒸氣常煨煖令人腠理開受風濕氣其地春風常如細雨或乍冷或小寒風濕深搏不能得泄故多脚弱也亦有端然振寒便發黄者此是風濕氣内搏或是先遇熱後遇寒搏於熱入臟感外寒若此者善使人乾嘔吐逆冬太暖少霜雪名為時行濕氣夫風毒藏入肌肉中至春夏得暴冷濕折之使四肢緩弱體盛多熱者其人則體熱而不隨其脉當浮大而𦂳者是也虚有冷者脉當緩弱遲違為證夫因虚而遇毒者冝先攻其毒毒衰乃療其虚弱挾毒而補其虚則毒甚其要當姑置其虚不得與實甚人等也方石斛酒治風虚滿脚疼痛痺攣不能行石斛五兩丹參五兩防風二兩側子四兩桂心三兩乾薑三兩羌活三兩秦艽四兩芎藭三兩杜仲四兩薏苡仁一升五加皮五兩山茱茰四兩橘皮三兩椒三兩黄茋三兩白前三兩茵芋三兩當歸三兩牛膝四兩鍾乳八兩右切鍾乳搗碎别袋盛繋於大藥袋以清酒四斗漬三日初服三合日再稍加之以知為度忌猪肉冷水生葱一方無防風大竹瀝湯治脚氣痺攣風毒所攻口噤不能語四肢頑痺緩弱攣急疼痛風經五臟恍惚恚怒無常手足不隨竹瀝每服一合獨活一兩赤芍藥一兩桂心半兩防風一兩去蘆麻黄一兩白术一兩葛根一兩細辛一兩茯神二兩漢防己一兩川烏一兩人參一兩黄芩一兩石膏二兩芎藭一兩甘草一兩右為散每服四錢水一巾盞入生薑半分煎至五分去滓入竹瀝煎一二沸不計時候温服一方有茵蕷一方竹瀝煮取四升分六服先未汗者取汗一服相當即卧嘗為人撰門冬煎此方治脚氣大有驗病者須用之小竹瀝湯治脚氣兩足痺攣或轉筋皮肉脹起如腫按之不䧟心中惡不欲飲食或發冷竹瀝每服一合秦艽一兩葛根一兩附子一兩麻黄一兩半防風一兩黄芩一兩防己一兩赤茯苓一兩細辛一兩乾薑一兩炮川升麻一兩杏仁一兩半桂心一兩甘草一兩炙右為散每服四錢水一中盞煎至五分去滓入竹瀝更煎一兩沸不計時候温服取汗金翼方無茯苓杏仁有白术一兩獨活散出聖惠方治風毒脚氣痺攣骨莭痠疼獨活三分附子三分防風半兩去蘆麻黄三分肉桂半兩當歸半兩薏苡仁三分赤茯苓三分牛