body:
  text: 普濟方卷二百四十三明周王朱橚撰脚氣門脚氣緩弱附論夫脚氣緩弱者皆感於毒風所致初得此病多不即覺或先無他病而忽得之或因病後所致始得却甚微飲食嬉戯氣力如故當熟察之其状自膝至脚已有不仁或即痺或滛如蟲所縁或脚指及脛洒洒酸痛或屈弱不能行或微腫及酷冷疼痛或緩縱或不隨遂或攣急或至困能飲食者或有不能者或見飲食而嘔吐惡聞食氣或有物如指發於踼腸脛上上衝心氣者或舉體轉筋或壮熱頭痛或胸中忪悸寝處不欲見明或腸内苦痛兼下者或言語錯亂有妄誤者或眼濁精神昏憒此皆病證若治之稍緩便上入腹或不腫胸脇氣滿便即殺人急者不終月緩者或一二三月初得此病宜速治之不同常病既入臟則難療也方天門冬煎方凡脚氣之疾皆由氣實而死終無一人以服藥致虚而殂故脚氣之人皆不得大補亦不可大瀉終不得畏虚故預止湯不服也如此者皆死不療憂恚思戀喜怒悲歡復隨風濕結氣欬時嘔逆吐食以變大小便不利時洩利重下溺血上氣吐乍寒乍熱卧不安席小便赤黄時時惡夢與死人共食飲入塜神食魂飛魄散筋極則傷肝傷肝則腰背相引難以俛仰氣極傷肺傷肺則小便赤目不明體極則隂痿不起住而不卒骨極則傷腎傷腎則短氣不可乆立隂痛惡寒甚者卵縮隂下生瘡濕痒搔之不欲止汗出此皆為腎病甚者多遭風毒四肢頑痺手足浮腫名曰弱脚一名脚氣醫不能療此皆主之天門冬二升半去心搗壓取令汁盡白蜜三升拘杞根切三斗半净洗水二石五斗煮取一斗三升澄清用酥三升煉生地黄三斗半搗壓如天門冬法麞骨一具研以水一石煮取五斗澄清用右用銅器中微火先煎門冬地黄汁减半乃合煎取大斗二斗下後散藥煎取一斗内銅器中重釡煎令隠掌可丸平旦空心酒服如梧桐子大二十丸稍加至五十丸擇四時王相日合之忌生冷醋滑鷄猪魚蒜油麵蕪荑等散藥如左茯苓柏子仁白术桂心萎蕤菖蒲逺志去心薯蕷人參石斛牛膝杜仲細辛澤瀉獨活蔓荆子枳實炙芎藭黄耆蓯蓉續斷狗脊萆薢白芷巴㦸五加皮覆盆子橘皮胡麻仁大豆卷各二兩甘草六兩炙薏苡仁一升大棗一百枚煑作膏石楠三兩茯神二兩蜀椒一兩汗阿膠十兩炙鹿角膠五兩炙右搗篩内煎中有牛髓鹿髓各加三升大佳小便澁去柏子仁加秦艽二兩乾地黄二兩隂痿失精去萎蕤加五味子二兩頭風去柏子仁加菊花二兩防風二兩小便利隂氣弱去細辛防風加山茱茰二兩腹中冷去防風加乾葛三兩無花須依方合之凡此煎至九月下旬採藥立冬日合而服之至五月上旬止若十二月臘日合者經夏至七月下旬即服之若停經夏不服當壊也女人先換熱者得服冷者勿服忌羊肉餳生菜生葱酢物海藻菘菜桃李雀肉青魚酢等麻黄湯療惡風毒氣脚弱無力頑痺四肢不仁失音不能言語毒氣衝心有人病者但病相當即服此藥麻黄一兩防風二兩大棗二十枚白术茯苓二兩升麻三兩芎藭桂心芍藥黄芩麥門冬去心當歸二兩甘草炙各二兩杏仁三十枚右切以水九升清酒二升合煮取二升半分四服日三夜一覆令小汗粉之莫令見風忌海藻菘菜生葱桃李雀肉酢物獨活湯出千金方第二方獨活四兩乾地黄三兩芍藥二兩葛根二兩桂心二兩生薑五兩麻黄去莭二兩甘草二兩炙右切水八升酒二升煮取二升五合去滓分四服日三夜一忌海藻菘菜葱蕪荑犯之一世不愈或脚弱忌食瓤子蕺菜一方無酒煎厚朴湯出千金方第三方并治諸雜欬嗽逆氣喘嘔半夏七兩洗乾地黄一兩生薑一斤呉茱茰二升一方用三兩芎藭桂心厚朴炙芍藥當歸人參各一兩黄茋甘草炙各三兩右切水二斗煮猪蹄一具取一斗二升去肥肉酒三升三合煮取三升分四服如人行二十里乆更進忌羊肉餳蕪荑葱海藻菘菜風引獨活湯出海上方第四方兼補方獨活四兩人參二兩附子一兩炮大豆二升桂心防風芍藥黄茋乾薑當歸茯苓甘草炙各三兩升麻兩半右切以水九升清酒三升合煮取三升半去滓分四服如相去二十里久更服忌海藻菘菜猪肉冷水生葱酢物八風散療風虚脚氣痺弱蓯蓉八分烏頭二分炮鍾乳粉四分薯蕷續㫁黄茋各四分麥門冬去心四分五味子二分澤瀉四分逺志皮四分細辛四分莵絲子十四分酒浸龍膽秦艽石韋去毛柏子仁牛膝杜仲菖蒲蛇床子山茱茰防風白术乾薑甘草人參各五分石斛天雄各六分乾地黄茯苓蓽薢附子炮右加菊花十二分搗篩酒服方寸匙日三不知加至二匙忌猪肉冷水羊肉餳海藻生菜蕪荑桃李雀肉酢物等内補秦艽石斛散治風温脚弱手足拘攣疼痺不能行脚趺腫膝小腹堅如䋲約氣急如憂恚不能食飲者皆由五勞并七傷腎氣不足受風濕故也此方悉主之石斛附子天雄桂心獨活各一兩天門冬一兩秦艽烏頭人參乾薑當歸防風杜仲各二十銖山茱茰莽草桔梗細辛麻黄前胡五味子各十八銖蜀椒白蕋白术各半兩右治下篩酒服方寸匙日再不知稍増至二匙虛人三建皆炮實人生用風氣者本因腎既得病後毒氣外滿則灸洩其氣内滿則藥驅之當其救急理必如此至風毒消退四體虚弱餘毒未除不可便止長服推陳致新極良此既人情可解無可疑焉側子酒療脚不隨側子四兩生石斛磁石八兩獨活三兩秦艽三兩甘草三兩炙五味子四兩防己三兩桂心三兩丹參三兩蜀椒三兩去汗山茱茰四兩芎藭細辛二兩當歸二兩白术四兩乾薑三兩薏苡仁一升三合右薄切以袋盛清酒四升浸五日一服四合日再漸加至八九合温飲慎生冷猪肉蒜麵其中間覺熱渇得飲豉酒仍須蒸暴之忌海藻菘菜桃李雀肉生葱生菜及醋等物煮散地骨白皮十二分麻黄六分杏仁八分防己二十分黄芩十分細辛五分薏苡仁二十分羚羊角屑八兩茯苓十二分澤㵼六分生石斛二十分人參六分白术十分大黄六分磁石二十分丹參六分犀角屑八分蒺梨子十二分甘草十分桂心六分生薑十二分前胡八分右麄搗篩使極調三兩為一劑以後藥汁二升煮取一升頓服之日服一劑以小便利為度忌海藻生菜生葱桃李雀肉等物小飲子法大棗五枚擘桑根白皮五兩白前二兩橘皮二分右切以水五升煮取二升漿煮前散慎如藥方煮散療脚氣經春夏及秋脚弱或腫氣時上衝心身體痺悶獨活茯苓牛膝漢防己白术黄茋麻黄去莭柴胡各六兩當歸防風橘皮桂心人參各四兩附子三兩生用磁石十六兩碎如豆羚羊角三兩生薑杏仁半夏洗呉茱茰梹榔碎丹參八兩右件不著分兩者自隨時加减餘十七物切如豆粉作三十貼毎貼著生薑一兩合皮細切杏仁十四枚去皮尖碎以水二升煮取七合去滓頓服之日一服或二日一服冷多加呉茱茰半兩熱多加麥門冬半兩大熱以竹瀝一升代水嘔逆食不下加半夏一兩毒悶加木香二分以意消息之患人大便難加大黄半兩脹滿食不消加梹榔三二枚所加藥病痊即止不痊服忌猪肉冷水羊肉餳生葱桃李雀肉酢物又方療諸脚氣弱未至大發尋常服獨活漢防己麻黄去莭茯苓丹參牛膝各六兩磁石十六兩碎黄茋防風人參犀角各六兩呉茱茰八兩升麻青木香桂心各四兩石膏十四兩生薑半夏洗梹榔大者杏仁大黄右将十六物搗切如豆分作三十分和為一服以梹榔三枚生薑二兩合皮切杏仁十四枚去皮尖以水二升三合煑取七合去滓日晩或夜中服之日一服若盛氣時日二服亦可尋常或二日一服或三日一服若患吐逆者加半夏一兩嘔定止大便澁者可去磁石加大黄一兩大便利即停忌生葱酢物羊肉餳等物防己散治脚氣緩弱頑痺心神煩悶言語蹇澁不欲飲食漢防己一兩麻黄一兩去根莭赤茯苓一兩丹參一兩牛膝一兩去苖獨活一兩黄茋一兩防風一兩去蘆人參半兩去蘆頭犀角屑一兩桂心一兩石膏一兩半夏半兩湯浸川大黄半兩杏仁一兩湯浸去皮尖雙仁麩炒微黄桑白皮一兩附子一兩去皮臍枳殻一兩右為散毎服三錢水一中盞入生薑半分煎至六分去滓不計時候温服風緩湯治脚氣弱體痺不仁毒氣上入胸臟中滿塞不通食輙吐味獨活甘草石膏各三兩羚羊角犀角各半兩麻黄防風當歸升麻橘皮呉茱茰桂心半夏鼈甲各二兩枳實一兩生薑六兩大棗二十枚貝齒七枚烏頭一兩右㕮咀以水一斗四升煮取四升一服一升若有少許熱者加乾地黄二兩黒虎丹治脚氣筋骨軟弱歩履不隨白术五加皮肉桂各半兩梹榔黒小豆半升川烏黄茋白茯苓赤芍藥杜仲各半兩附子熟地黄烏藥各一兩生蒼术羌活當歸川牛藤虎脛骨白蒺蔾右為末麵糊丸如梧桐子大毎服五十丸空心酒下天雄散治脚氣緩弱頑痺行立無力天雄半兩𦍑活半兩木香半兩川大黄三分大麻仁三分桂心半兩訶梨勒皮三分枳殻三分青橘皮半兩湯浸去白焙萆薢三分防風三分獨活三分芎藭三分山茱茰二分桑白皮一兩大腹皮一兩漢防己半兩梹榔三分郁李仁一兩右為散毎服四錢水一中盞入生薑半分煎至六分去滓不計時候温服术膏酒治脚氣弱風虚五勞七傷萬病皆主之方生白术青竹蔓荆生五加根生地黄根右白术等五種藥總計得汁九斗五升取糯米一石五斗上小麥麵八斤曝乾為末以藥汁六斗浸麯五日待麵起第一投净淘米七斗令得三十遍下米置净席上以生布拭之勿令不净然後炊之下饋以餘藥汁浸饋調强弱更蒸之待饋上痂然後下於席上調强弱冷熱如常釀酒法醖之甕中宻盖三日然後第二投更淘米四斗一如前法投之三日後即加藥如左桂心甘草白芷細辛防風當歸麻黄芎藭各六兩附子五兩牛膝九兩乾薑一斤五加皮一斤右㕮咀訖三投以米四斗浄淘如前法還以餘汁焼饋重蒸待上生痂置席上調冷熱如常醸法加和上件藥投之三日外然後嘗甘苦得中訖宻封頭二七日乃壓取清酒一服四合再服漸加以知為度温服不得過熱慎生冷醋滑猪鯉魚蒜牛肉等神驗防風湯療脚弱防風二兩獨活二兩黄芩二兩茵芋二兩葛根二兩細辛一兩蜀椒一兩出汗防己一兩桂心一兩芍藥一兩麻黄一兩石膏一兩生薑三兩烏頭三枚茯苓三兩甘草二兩右切以竹瀝一斗煮取四升去滓分六服一日一夜服盡其間可作赤小豆飲有人脚弱先常服竹瀝湯四劑未覺増損作此方後覺得力云脚脉沉細駃在内風者作此湯也忌海藻菘菜酢物冷水生葱菜等防風湯治肢體虚風微痙發熱肢莭不隨恍惚狂言無時不自覺悟南方之僧法存用此多得力温和不損人為勝叙命越婢風引等湯亦治弱甚良防風麻黄秦艽獨活生薑半夏各二兩當歸逺志甘草防己人參黄芩升麻芍藥各一兩石膏半兩麝香六銖右㕮咀以水一斗三升煮取四升一服一升初服後取微汗亦當利兩三行其間相去如人行十里乆更服有熱加大黄二兩先有冷心痛疾者倍用當歸加桂三兩不用大黄一方用白术一兩追毒湯治肝脾腎三經為感風濕寒熱毒氣隂陽不和四肢拘攣上氣喘滿小便秘澁心熱煩悶遍身浮腫脚弱半夏生薑各四兩黄茋甘草當歸人參厚朴獨活橘皮各一兩枳實麻黄乾地黄芍藥各二兩桂心三兩貝子七枚大棗二十枚右㕮咀以水一斗二升煮取三升六合四服日三夜一石斛散治風濕痺脚弱乆服湯虚弱而氣未除手足拘攣痺弱小腹緊急不能食五勞七傷腎氣不足石斛附子獨活去蘆天門冬去心桂去粗皮秦艽去苖土烏頭人參天雄防風去乂細辛去苖杜仲去皮莽草炙各二兩當歸四兩右搗羅為散每服二錢温酒調下日三夜一獨活散治脚氣緩弱頑痺痰壅氣滿心胷悶亂不欲食獨活一兩枳殻一兩天門冬一兩黄茋一兩甘菊花