其菉豆亦須食用沉香散治腳氣疼痛皮膚不仁心胸煩壅不能下食沉香一兩蒺䔧三分酸棗仁三分羌活一兩枳殼一兩桂心三分羚羊角三分赤茯苓一兩防風三分赤芍藥三分附子一兩甘草半兩牛膝一兩檳榔二兩右為散每服四錢水一盞煎至六分去滓食前溫服海桐皮散治腳氣疼痛皮膚不仁筋脈緩弱不能行履海桐皮三分羌活三分羚羊角三分獨活三分防風三分桂心半兩當歸三分赤芍藥三分石斛一兩牛膝一兩赤茯苓三兩酸棗仁三分檳榔二兩生乾地黃一兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓每食前服薏苡仁丸治腰腳走注疼痛此是腳氣冝服之薏苡仁茵芋白芍藥牛膝丹參防風獨活各半兩熟地黃側子一斤桂心橘紅各一兩川芎半兩右為細末煉蜜和丸如桐子大每服三四十丸食前酒下日三服木瓜湯下亦得令人為之失氣者黃帝所謂緩風濕痺也千金云緩弱名緩風疼痛為濕痺大抵此疾不能三五服見效須久服得效唐張文仲云風有一百二十四種氣有八十種唯腳氣頭風上風當須服藥不絶其餘則隨發動臨時消息但有風氣之人春末夏初及秋暮得通泄則不困劇所謂通泄者如麻黃牽牛郁李仁類是亦不必駛利藥也麻黃獨活湯治腳氣皮肉痺痿筋骨疼痛手腳弱緩行步艱難麻黃獨活杏仁丹參附子五加皮細辛牛膝芎藭桑根白皮白殭蠶右銼如麻豆每服五錢水一盞半煎至八分去滓溫服空心食前日再服加減至寶丹專治腳氣止疼痛除風濕石膏當歸檳榔骨碎補月明砂白蒺䔧木瓜紫金皮淮烏白膠香右為末蜜丸如彈子大嚼生薑一塊空心以好酒一盞送下多以酒力取效一方用外應散蒸淋洗一方除紫金皮木瓜加防風小黑豆一方加芍藥一方除紫金皮石膏加白术木香川烏趂痛丸治三十年腳氣發歇疼痛不仁步履艱難鯪鯉甲地龍小蘇根葉惡實五靈脂乳香沒藥甜瓜子皂角刺竹蛀末右為末爛研蒜肉為丸如彈子大每服一丸用熱湯二合磨下食前服思仙續斷丸治肝腎風虛氣弱腳不可踐地腰脊疼痛風毒流注下經行步艱難小便餘瀝此藥補五臟內復調中益精涼血堅筋骨益智輕身耐老思仙木五加皮防風薏苡仁羌活川續斷牛膝萆薢生地黃右為末好酒三升化青鹽三兩木瓜半斤去皮以鹽酒煮木瓜成膏和杵丸如桐子大每服三五十丸空心食前溫服酒鹽湯下膏子少益以酒糊犀角散治腳氣疼痛皮膚不仁心神煩悶不安犀角屑防風羌活秦艽桂心赤芍藥大腹皮白膠檳榔右為末每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服代灸膏治腳氣腫痛不可忍者南星半夏白芷川烏川椒白芨馬藺子乳香沒藥右為細末酒調敷貼疼處乾則以熱水潤濕之日換二次防風湯治風毒腳氣無力痿痺疼痛四肢不仁失音不語及風毒衝心防風大棗桂麻黃當歸檳榔犀角屑赤茯苓右除檳榔外銼如麻豆每服五錢水二盞煎至一盞去滓入檳榔末一錢再煎一二沸溫服不拘時候敗龜散治腳氣及筋骨疼痛敗龜藝薹子白芥子木鱉子自然銅硫黃地龍右為末每用末白麵各一匙頭醋調作餅隨患處大小貼桑根白皮湯治濕毒風氣瘴氣四肢痿痺疼痛不仁桑根白皮防風升麻犀角芍藥檳榔淡竹葉竹瀝右除竹瀝外粗搗篩每服五錢水一盞半煎至七分入竹瀝半合再煎沸去滓溫服空腹日二服川烏丸治腳氣疼不能行步川烏草烏五靈脂土茴香各一兩黑豆四兩炒乾赤土研細百草霜右將前五味藥末一半以赤土細末三分之一同和令勻以米醋糊為丸如梧桐子大又將藥末一半以百草霜末三分之一同和令勻亦以米醋糊為丸如梧桐子大如腳氣以紅丸者十五粒黑丸者五粒並作一服用松莭木瓜赤芍藥煎湯送下食前入少甘草同丸煎如風氣以黑丸十五粒紅丸者五粒同一服茶清下大腹飲治腳初覺風毒攻作腳膝虛腫筋骨疼痛或痿痺不知痛癢或氣喘煩悶冝速服大腹十枚杏仁湯浸各二兩木瓜切焙生薑切片桑根白皮銼各一兩吳茱茰湯浸二分黑豆五升右先將豆并生薑以水五盞煎令浮去豆即將藥搗篩入湯內同煎至三盞去滓空心溫服良久再服取利為度天麻丸治風濕腳氣筋骨疼痛皮膚不仁天麻生用五兩麻黃去根莭十兩草烏炮藿香葉半夏炮白麵炮各五兩右為細末滳水丸如雞頭子大丹砂為衣每服一丸茶酒嚼下日日服不拘時烏頭細辛散治腳氣痛不能行步川烏頭香白芷細辛防風不見日隂乾右各等分並生用為末每用一錢於鞋內鋪以腳踏之妙或用絹囊盛之此方得之於仙超然辰砂丹治足掌疼辰砂一錢生麝半錢蝎稍一錢乳香半錢右用皴皮草烏去皮尖三錢合為末一半入藥一半入醋調煮熟取起和丸如菉豆大每服五十丸空心溫酒下何首烏散治腳氣流注歷莭疼痛腳熱赤皮膚麻木兩腳痺攣何首烏不計多少切作半寸厚以黑豆八合用水同拌令勻就甑內蒸用仙靈脾切牛膝銼各一斤二味用酒浸一宿烏頭去皮臍半斤切入鹽二兩拌炒黃去鹽用右為散每服二錢溫酒調下日三服粥飲亦可調服木瓜丸治腳氣疼青鹽川芎各三兩為大木瓜一枚宣州大者佳右將木瓜先切下大蓋去心穰二藥末安放在瓜內蓋之麻皮纒定用麵固濟慢火燒麵熟為度去麵用瓜藥研極爛以麵糊丸梧桐子大每服二三十丸空心夜臥酒下溫潤不可丸著慢燒和盆烘乾即可丸趂痛丸治腳氣上攻及風毒走注疼痛白芥子甘遂大戟已上三味並為末各一兩半右粗搗用白麵一兩半滳水同和作餅子煿令焦黃黑色細碾為末用醋煮麵糊為丸如梧桐子大每服一十丸冷酒下不得嚼破量虛實加減消毒膏治走注風腳疼痛筋膝拘攣馬牙硝一兩煆草烏頭二枚燒存性右和勻每用三錢以麵和自然薑汁一盞慢慢火同熬成膏及攤於帛上熱貼疼處日二次換之木瓜丸此方治腳氣上痛去濕去風木瓜大者一雙乳香一兩為末右以木瓜去皮穰切下蓋入乳香在內蒸爛研搗乾為丸如梧桐子大每服三四十丸溫酒下亦可以此膏傅貼痛處尤好杜仲湯治腳氣緩弱腫疼痛杜仲去粗皮炙為末三兩生地黃汁三合右將杜仲末以水二盞煎至一盞去滓入地黃汁三合酒二合再煎三五沸溫服空腹近晚各一服又方出海上方治腳掌疼敗毒散五積散右件和勻入乾木瓜十片紫蘇十葉同煎服獨活散貼腳氣止疼痛右用菉豆粉三兩銀石器中慢火炒令黑色再研為細末散用井水調成膏攤絹帛上隨痛處貼之服前趁痛丸腳氣止痛方出醫方大成右用萆麻子七粒去殼研爛如泥同蘇合香丸打碎時貼腳心痛即止又方出醫方大成右用草烏一味以麵酒糟搗爛貼痛處即止如無麵酒糟生薑汁調草烏亦可治腳氣發痛出經驗良方右以時喫煮熱蘿蔔令暖以下其氣米醋調飛羅麵以罨痛處虎骨酒出本草方治腰腳疼痛攣痺不得屈伸及腿膝冷麻左用虎骨一具及脛骨二莖用酥蒸黃捶碎同無灰陳酒三斗密封七日空心晚食溫之隨意飲養腎散治腳氣腎氣虛損腰腿疼痛曲折不能舉動艱難麻痺軟弱全蝎半兩天麻三錢倉术去粗皮一兩草烏二錢黑附子二錢右為末拌勻如腎氣用豆汁酒調一大錢豆用黑大豆并能除去腰腳筋骨疼痛其效如神藥氣所至麻痺少時須臾隨藥氣頓轉如常骨髓中痛用胡桃酒下此藥傷寒中風皆治忠州陳太守云渠前之坊州因暑取涼食瓜至秋忽然右腰腿間疼痛連及膝脛曲折不能遂意右腳難於舉動凡治腰腳藥服之無效兒子云安刑曹在商熙助教處得養腎散方服之才一服移刻舉身麻痺不數刻間腳遂屈伸再一服即康寧文方州監酒年幾四十虛損兩腳不能行走試與此藥初進二錢大腿麻木遂能起立再服二錢小指拇皆麻迤邐可行三服馳走如舊大抵是得此方乾道己丑嵗在卾州都幕府中宋判院審言久病腳膝緩弱不能行傳服數日來謝此疾經年無藥不服得方次日即合二服見效五服良愈今有力能拜起矣後數日又云因浴遍身去薄皮如糊肌骨遂充其效如神治腳氣心痛出百一選方右用乾木瓜研細末煎大腹服之昔姚克溫閣中苦此病數服而腳氣心痛悉愈治腳氣及風寒暑濕四肢攣急冷痛不可踐地出本草風寒類右用好醋一盞皂角五枚捶碎煎成膏子次入乳香末一兩令勻凡有病處將羊毛筆醮藥塗痛處次表紙貼之少許木香散治腳氣緩弱皮肉頑痺肢節疼痛羚羊角鎊陳橘皮湯浸去白焙木香三分萆薢一兩銼車前子半兩牛膝細銼酒浸焙乾杏仁湯浸去皮尖獨活去蘆丹參桂去粗皮杜仲去粗皮銼炒秦艽去苖土各一兩右㕮咀每服三錢水一盞入生薑半分拍破同煎至七分去滓空心溫服日午近晚各一服五加皮丸治腳氣皮膚不仁發渴不止五加皮銼人參吳茱茰湯洗焙乾惡實炒桂去皮檳榔銼三分芎藭赤茯苓柏子仁各一兩厚朴薑汁炙枳殼去穰麩炒郁李仁湯浸去皮研牛膝酒浸切焙各一兩半杜仲去皮炙銼羌活各三兩右為末煉蜜為丸如梧桐子大每服空腹以溫酒下二十丸不飲酒者橘皮湯下治腳氣風腫從足至膝脛腫滿連骨痛右用萆麻葉切蒸薄褁日二三易即消導引法法云銼兩足長舒自從身內氣向下使心氣一作柔和適散然後屈一足安膝下努緊舒一足仰即指向上便急仰服頭不至席兩手足努向前頭項上努挽一時各取勢來去二七遞互亦然去腰腳摶冷血冷風痺日日漸損盡又云覆卧傍視內踵主腰以鼻內氣自㴠自運腳中弦痛轉筋腳酸疼腳痺弱盡去又云舒兩足坐散氣向湧泉可三通氣輒到始收右足屈捲將兩手急捉腳湧泉挽足踏物一時取勢手足用邉力氣向下三七遞不失氣數尋去腎中冷氣膝冷腳疼又云一足屈之足指仰視使急一足安膝頭散心兩足跟出氣向下一手抬膝頭向下急􅟥一手向後拓席一時極勢左右亦然二七去膝脛疼痛又云一足踏地一足向後拓席一時將足向後努兩手偏相向後側身如轉極勢二七左右亦然去足痺疼痛及腰痛普濟方卷二百四十三
