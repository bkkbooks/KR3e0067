其菉豆亦須食用沉香散治脚氣疼痛皮膚不仁心胸煩壅不能下食沉香一兩蒺䔧三分酸棗仁三分羗活一兩枳殻一兩桂心三分羚羊角三分赤茯苓一兩防風三分赤芍藥三分附子一兩甘草半兩牛膝一兩梹榔二兩右為散每服四錢水一盞煎至六分去滓食前温服海桐皮散治脚氣疼痛皮膚不仁筋脉緩弱不能行履海桐皮三分羌活三分羚羊角三分獨活三分防風三分桂心半兩當歸三分赤芍藥三分石斛一兩牛膝一兩赤茯苓三兩酸棗仁三分梹榔二兩生乾地黄一兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓每食前服薏苡仁丸治腰脚走注疼痛此是脚氣冝服之薏苡仁茵芋白芍藥牛膝丹參防風獨活各半兩熟地黄側子一斤桂心橘紅各一兩川芎半兩右為細末煉蜜和丸如桐子大每服三四十丸食前酒下日三服木𤓰湯下亦得令人為之失氣者黄帝所謂緩風濕痺也千金云緩弱名緩風疼痛為濕痺大抵此疾不能三五服見效須乆服得效唐張文仲云風有一百二十四種氣有八十種唯脚氣頭風上風當須服藥不絶其餘則隨發動臨時消息但有風氣之人春末夏初及秋暮得通泄則不困劇所謂通泄者如麻黄牽牛郁李仁類是亦不必駛利藥也麻黄獨活湯治脚氣皮肉痺痿筋骨疼痛手脚弱緩行歩艱難麻黄獨活杏仁丹參附子五加皮細辛牛膝芎藭桑根白皮白殭蠶右剉如麻豆每服五錢水一盞半煎至八分去滓温服空心食前日再服加减至寳丹專治脚氣止疼痛除風濕石膏當歸梹榔骨碎補月明砂白蒺䔧木𤓰紫金皮淮烏白膠香右為末蜜丸如彈子大嚼生薑一塊空心以好酒一盞送下多以酒力取效一方用外應散蒸淋洗一方除紫金皮木𤓰加防風小黒豆一方加芍藥一方除紫金皮石膏加白术木香川烏趂痛丸治三十年脚氣發歇疼痛不仁歩履艱難鯪鯉甲地龍小蘓根葉惡實五靈脂乳香沒藥甜𤓰子皂角刺竹蛀末右為末爛研蒜肉為丸如彈子大每服一丸用熱湯二合磨下食前服思仙續斷丸治肝腎風虚氣弱脚不可踐地腰脊疼痛風毒流注下經行歩艱難小便餘瀝此藥補五臟内復調中益精凉血堅筋骨益智輕身耐老思仙木五加皮防風薏苡仁羌活川續斷牛膝萆薢生地黄右為末好酒三升化青鹽三兩木𤓰半斤去皮以鹽酒煮木𤓰成膏和杵丸如桐子大每服三五十丸空心食前温服酒鹽湯下膏子少益以酒糊犀角散治脚氣疼痛皮膚不仁心神煩悶不安犀角屑防風羌活秦艽桂心赤芍藥大腹皮白膠梹榔右為末每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服代灸膏治脚氣腫痛不可忍者南星半夏白芷川烏川椒白芨馬藺子乳香沒藥右為細末酒調敷貼疼處乾則以熱水潤濕之日換二次防風湯治風毒脚氣無力痿痺疼痛四肢不仁失音不語及風毒衝心防風大棗桂麻黄當歸梹榔犀角屑赤茯苓右除梹榔外剉如麻豆每服五錢水二盞煎至一盞去滓入梹榔末一錢再煎一二沸温服不拘時候敗龜散治脚氣及筋骨疼痛敗龜芸薹子白芥子木鱉子自然銅硫黄地龍右為末每用末白麵各一匙頭醋調作餅隨患處大小貼桑根白皮湯治濕毒風氣瘴氣四肢痿痺疼痛不仁桑根白皮防風升麻犀角芍藥梹榔淡竹葉竹瀝右除竹瀝外麄搗篩每服五錢水一盞半煎至七分入竹瀝半合再煎沸去滓温服空腹日二服川烏丸治脚氣疼不能行歩川烏草烏五靈脂土茴香各一兩黒豆四兩炒乾赤土研細百草霜右将前五味藥末一半以赤土細末三分之一同和令匀以米醋糊為丸如梧桐子大又将藥末一半以百草霜末三分之一同和令匀亦以米醋糊為丸如梧桐子大如脚氣以紅丸者十五粒黒丸者五粒並作一服用松莭木𤓰赤芍藥煎湯送下食前入少甘草同丸煎如風氣以黒丸十五粒紅丸者五粒同一服茶清下大腹飲治脚初覺風毒攻作脚膝虚腫筋骨疼痛或痿痺不知痛痒或氣喘煩悶冝速服大腹十枚杏仁湯浸各二兩木𤓰切焙生薑切片桑根白皮剉各一兩呉茱茰湯浸二分黒豆五升右先将豆并生薑以水五盞煎令浮去豆即将藥搗篩入湯内同煎至三盞去滓空心温服良乆再服取利為度天麻丸治風濕脚氣筋骨疼痛皮膚不仁天麻生用五兩麻黄去根莭十兩草烏炮藿香葉半夏炮白麵炮各五兩右為細末滳水丸如鷄頭子大丹砂為衣每服一丸茶酒嚼下日日服不拘時烏頭細辛散治脚氣痛不能行歩川烏頭香白芷細辛防風不見日隂乾右各等分並生用為末每用一錢於鞋内鋪以脚踏之妙或用絹囊盛之此方得之於仙超然辰砂丹治足掌疼辰砂一錢生麝半錢蝎稍一錢乳香半錢右用皴皮草烏去皮尖三錢合為末一半入藥一半入醋調煮熟取起和丸如菉豆大每服五十丸空心温酒下何首烏散治脚氣流注歴莭疼痛脚熱赤皮膚麻木兩脚痺攣何首烏不計多少切作半寸厚以黒豆八合用水同拌令匀就甑内蒸用仙靈脾切牛膝剉各一斤二味用酒浸一宿烏頭去皮臍半斤切入鹽二兩拌炒黄去鹽用右為散每服二錢温酒調下日三服粥飲亦可調服木𤓰丸治脚氣疼青鹽川芎各三兩為大木𤓰一枚宣州大者佳右将木𤓰先切下大盖去心穰二藥末安放在𤓰内盖之麻皮纒定用麵固濟慢火焼麵熟為度去麵用𤓰藥研極爛以麵糊丸梧桐子大每服二三十丸空心夜臥酒下温潤不可丸着慢焼和盆烘乾即可丸趂痛丸治脚氣上攻及風毒走注疼痛白芥子甘遂大㦸已上三味並為末各一兩半右粗搗用白麵一兩半滳水同和作餅子煿令焦黄黒色細碾為末用醋煮麵糊為丸如梧桐子大每服一十丸冷酒下不得嚼破量虚實加减消毒膏治走注風脚疼痛筋膝拘攣馬牙硝一兩煆草烏頭二枚焼存性右和匀每用三錢以麵和自然薑汁一盞慢慢火同熬成膏及攤於帛上熱貼疼處日二次換之木𤓰丸此方治脚氣上痛去濕去風木𤓰大者一雙乳香一兩為末右以木𤓰去皮穰切下盖入乳香在内蒸爛研搗乾為丸如梧桐子大每服三四十丸温酒下亦可以此膏傅貼痛處尤好杜仲湯治脚氣緩弱腫疼痛杜仲去麄皮炙為末三兩生地黄汁三合右将杜仲末以水二盞煎至一盞去滓入地黄汁三合酒二合再煎三五沸温服空腹近晩各一服又方出海上方治脚掌疼敗毒散五積散右件和匀入乾木𤓰十片紫蘓十葉同煎服獨活散貼脚氣止疼痛右用菉豆粉三兩銀石器中慢火炒令黒色再研為細末散用井水調成膏攤絹帛上隨痛䖏貼之服前趁痛丸脚氣止痛方出醫方大成右用萆麻子七粒去殻研爛如泥同蘓合香丸打碎時貼脚心痛即止又方出醫方大成右用草烏一味以麵酒糟搗爛貼痛處即止如無麵酒糟生薑汁調草烏亦可治脚氣發痛出經驗良方右以時喫煑熱蘿蔔令煖以下其氣米醋調飛羅麵以罨痛處虎骨酒出本草方治腰脚疼痛攣痺不得屈伸及腿膝冷麻左用虎骨一具及脛骨二莖用酥蒸黄搥碎同無灰陳酒三斗宻封七日空心晩食温之隨意飲養腎散治脚氣腎氣虚損腰腿疼痛曲折不能舉動艱難麻痺軟弱全蝎半兩天麻三錢倉术去粗皮一兩草烏二錢黒附子二錢右為末拌匀如腎氣用豆汁酒調一大錢豆用黑大豆并能除去腰脚筋骨疼痛其效如神藥氣所至麻痺少時須臾隨藥氣頓轉如常骨髓中痛用胡桃酒下此藥傷寒中風皆治忠州陳太守云渠前之坊州因暑取凉食𤓰至秋忽然右腰腿間疼痛連及膝脛曲折不能遂意右脚難於舉動凡治腰脚藥服之無效児子云安刑曹在商熈助教處得養腎散方服之才一服移刻舉身麻痺不数刻間脚遂屈伸再一服即康寕文方州監酒年幾四十虚損兩脚不能行走試與此藥初進二錢大腿麻木遂能起立再服二錢小指拇皆麻迤邐可行三服馳走如舊大抵是得此方乾道己丑嵗在卾州都幕府中宋判院審言乆病脚膝緩弱不能行傳服数日来謝此疾經年無藥不服得方次日即合二服見效五服良愈今有力能拜起矣後数日又云因浴遍身去薄皮如糊肌骨遂充其效如神治脚氣心痛出百一選方右用乾木𤓰研細末煎大腹服之昔姚克温閣中苦此病数服而脚氣心痛悉愈治脚氣及風寒暑濕四肢攣急冷痛不可踐地出本草風寒類右用好醋一盞皂角五枚搥碎煎成膏子次入乳香末一兩令匀凡有病䖏将羊毛筆醮藥塗痛處次表紙貼之少許木香散治脚氣緩弱皮肉頑痺肢節疼痛羚羊角鎊陳橘皮湯浸去白焙木香三分萆薢一兩剉車前子半兩牛膝細剉酒浸焙乾杏仁湯浸去皮尖獨活去蘆丹參桂去粗皮杜仲去粗皮剉炒秦艽去苖土各一兩右㕮咀每服三錢水一盞入生薑半分拍破同煎至七分去滓空心温服日午近晩各一服五加皮丸治脚氣皮膚不仁發渇不止五加皮剉人參呉茱茰湯洗焙乾惡實炒桂去皮梹榔剉三分芎藭赤茯苓柏子仁各一兩厚朴姜汁炙枳殻去穰麩炒郁李仁湯浸去皮研牛膝酒浸切焙各一兩半杜仲去皮炙剉羌活各三兩右為末煉蜜為丸如梧桐子大每服空腹以温酒下二十丸不飲酒者橘皮湯下治脚氣風腫從足至膝脛腫滿連骨痛右用萆麻葉切蒸薄褁日二三易即消導引法法云剉兩足長舒自從身内氣向下使心氣一作柔和適散然後屈一足安膝下努𦂳舒一足仰即指向上便急仰服頭不至席兩手足努向前頭項上努挽一時各取勢来去二七遞互亦然去腰脚摶冷血冷風痺日日漸損盡又云覆卧傍視内踵主腰以鼻内氣自㴠自運脚中弦痛轉筋脚酸疼脚痺弱盡去又云舒兩足坐散氣向湧泉可三通氣輙到始収右足屈捲将兩手急捉脚湧泉挽足踏物一時取勢手足用邉力氣向下三七逓不失氣數尋去腎中冷氣膝冷脚疼又云一足屈之足指仰視使急一足安膝頭散心兩足跟出氣向下一手抬膝頭向下急􅟥一手向後拓席一時極勢左右亦然二七去膝脛疼痛又云一足踏地一足向後拓席一時将足向後努兩手偏相向後側身如轉極勢二七左右亦然去足痺疼痛及腰痛普濟方卷二百四十三
