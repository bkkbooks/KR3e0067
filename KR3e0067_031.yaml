子炮裂去皮臍桃仁去皮尖雙仁别研作膏各半兩右除别研外為細末入研藥拌勻酒浸炊餅和丸如梧桐子大每服二十丸溫酒下牛膝丸出聖濟總録治腎臟風冷氣久積臍腹虛脹不消攻擊疼痛腰背相引拘急牛膝去苖酒浸焙五加皮銼巴戟天去心羌活去蘆頭各一兩附子炮裂去皮臍菖蒲桂去粗皮木香各半兩右為細末酒煮麵糊丸如梧桐子大每服三十丸空心溫酒下木香湯出聖濟總録治腎臟風冷氣攻臍腹脹滿疼痛木香桃仁湯浸去皮尖雙仁炒研各半兩蘹香子炒羌活去蘆頭青橘皮湯浸去白穰焙當歸切焙芎藭烏頭炮裂去皮臍各一兩右銼如麻豆大每服三錢水一盞生薑三片棗一枚擘破同煎七分去滓溫服不拘時候沉香湯出聖濟總録治腎臟風冷氣臍腹脹滿攻腰背相引疼痛沉香銼五味子細辛去苖葉防風去又黃耆細銼石斛去根萆薢桂去粗皮各一兩右粗搗篩每服三錢水一盞生薑三片棗二枚擘破同煎七分去滓溫服不拘時候豆蔲丸出聖濟總録治腎臟虛損久積風冷臍腹滿疼痛不止肉豆蔲炮去皮附子炮裂去皮臍蓬莪荗炮天麻酒浸炙各一兩木香檳榔銼乾蠍去土炒各半兩硼砂别研一分右內七味為細末入研藥拌勻酒煮麵糊和丸如梧桐子大每服二十丸溫酒下加味宣風散出直指方治通利腎臟風氣雞心檳榔三個橘皮桃仁浸去皮焙白芷枳殼製各半兩牽牛三兩重半炒半生右為末每服二錢蜜湯調下食前服乾地黃丸治腎家風又益精氣以枸把葉上蟲窠子曝乾為末入乾地黃為丸益陽事腎瀝湯治除風下氣強腰腳明耳目除痰飲理榮衛永不染時氣諸風疾黃耆芎藭茯苓五味子防風澤瀉獨活玄參人參牛膝各六兩麥門冬去心地骨皮各八兩桂心甘草三兩炙丹參五兩右切分作二十四貼著生薑一兩切杏仁十四枚去尖碎以水三升煮一貼取一升去滓澄清取九合頓服每日一貼晚間必氣下心胸空妙十服以後身力不可當常須護惜將養之以飲食補之每年春夏秋冬服一劑勝服腎氣丸二十劑永不患風氣先有諸病自然除差腽肭劑丸出聖惠方治腎臟風虛冷氣溫脾胃思飲食安心志強氣力利腰腳補虛損腽肭臍一兩酒刷炙微黃鹿茸一兩去毛塗酥炙微黃肉蓯蓉一兩浸一宿刮去皺皮炙乾兔絲子一兩酒浸三日曝乾别搗為末陽起石一兩酒煮半日細研水飛過附子一兩炮裂去皮臍蘹香子一兩桂心三分山茱茰三分獨活三分天麻三分乾蠍三分微炒人參三分去蘆頭石斛一兩去根銼芎藭一兩木香一兩補骨脂一兩微炒白术三分萆薢三分熟地黃一兩牛膝三分去苖逺志一兩去心鉛粉一兩細研檳榔一兩硃砂一兩細研水飛過麝香半兩細研右為末入諸研藥令勻煉蜜和搗五七百杵丸如梧桐子大每日空心及晚食前以溫酒下三十丸治腎臟風虛腰膝冷痺眼生黑花耳內虛鳴四肢不舉飲食減少面色青黑楊子建護命方官桂生使附子炮去皮臍防風獨活補骨脂炒牛膝萆薢當歸芎藭山茱茰石斛續斷細辛木香巴戟去心各一分右細杵羅為末煉蜜和丸如梧桐子大空心鹽湯溫酒下四十丸治元臟傷冷及開胃本草附子炮過去皮尖搗羅為末以水二盞入藥二錢鹽及棗蔥薑同煎取一盞空心服去積冷暖下元肥腸益氣酒食無礙腎臟風虛耳鳴附論夫足少隂之經者是宗脈之所聚也其氣上通於耳耳者腎之竅若經脈虛損氣血不足為風邪所乘入於耳脈則正氣否塞不能宣通邪正相擊故令耳虛鳴也方腎瀝湯聖惠方治腎臟風虛兩耳常鳴磁石二兩搗碎水淘去赤汁以帛包之巴戟附子炮裂去皮臍肉桂去皺皮熟乾地黃各一兩沉香石斛去根銼人參去蘆頭白茯苓黃耆銼五味子桑螵蛸微炒澤瀉防風去蘆頭各半兩牛膝去苖山茱茰各三分右為散每服五錢水一大盞用羊腎一對切去脂膜入生薑半分每用磁石包子同煎至五分去滓空心及晚溫服附子散聖惠方治腎臟風虛兩耳常鳴腰背痛強小便多利虛羸無力附子炮裂去皮臍熟乾地黃桂心沉香白龍骨各一兩石斛去根銼五味子杜仲去粗皮炙微黃銼人參去蘆頭續斷牛膝去苖黃耆銼當歸銼微炒木香各三分磁石二兩搗碎水淘去赤汁右為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓食前溫服菖蒲散聖惠方治腎臟風虛耳中常鳴或如風雨聲菖蒲附子炮裂去皮臍桂心熟乾地黃沉香各一兩逺志去心防風去蘆頭人參去蘆頭山茱茰杜仲去粗皮炙微黃銼天麻石斛去根銼黃耆銼各三分磁石二兩搗碎水淘去赤汁以帛包之右為散每服五錢以水一大盞入磁石包子同煎至六分去滓食前溫服肉蓯蓉丸聖惠方治腎臟風虛耳內常鳴肉蓯蓉酒浸一宿刮去皺皮炙冷乾鹿角膠搗碎炒令黃燥各二兩兔絲子酒浸三日曝乾别杵為末熟乾地黃黃耆銼巴戟五味子菖蒲山茱茰牛膝去苖附子炮裂去皮臍澤㵼各一兩防風三分去蘆頭乾薑炮裂半兩銼右為末煉蜜和搗三五百下丸如梧桐子大每日空心以溫酒下三十丸晚食前再服漸加至五十丸腎瀝湯聖惠方治腎臟風虛耳鳴四肢羸瘦小便滑數夜臥多寒喫食減少磁石二兩搗碎水淘去赤汁以帛包之肉蓯蓉酒浸去皺皮微炙附子炮裂去皮臍熟乾地黃桑螵蛸微炒各半兩人參去蘆頭黃耆銼桂心石楠五味子白龍骨白茯苓各三分右為散每服五錢以水一大盞用羊腎一對切去脂膜生薑半分棗三枚每用磁石包子同煎至五分去滓空心及晚食前溫服桑螵蛸丸聖惠方治腎臟風虛耳鳴腰脊強直小便滑數桑螵蛸微炒菖蒲山茱茰續斷五味子各三分磁石二兩燒醋淬七遍搗碎細研水飛過附子炮裂去皮臍肉蓯蓉酒浸一宿刮去皺皮炙令乾薯蕷萆薢沉香蘹香子各一兩右為末煉蜜為丸如梧桐子大每日空心及晚食前以溫酒下三十丸鹿茸丸聖惠方治腎臟風虛耳內恆鳴腰腳疼痛鹿茸去毛塗酥炙微黃巴戟五味子石斛去根銼菖蒲各一兩磁石二兩燒醋淬七遍搗碎細研水飛過天雄炮裂去皮臍桂心各一兩半肉蓯蓉二兩酒浸一宿刮去皺皮炙令乾右為末煉蜜和搗三二百杵丸如梧桐子大每服食前以溫酒下三十丸腎瀝湯聖惠方治腎臟風虛兩耳常鳴附子一兩炮裂去皮臍桂心熟乾地黃人參去蘆頭山茱茰各三分磁石搗碎水淘去赤汁以帛包之肉蓯蓉酒浸一宿刮去皺皮炙令乾各二兩右為散每服五錢以水一大盞用羊腎一對切去脂膜入生薑半分薤白三莖每用磁石包子同煎至五分去滓空心及晚食前溫服羊角湯聖濟總録治腎臟風虛臟氣不足腰痛耳鳴肢體不隨煩倦無力羚羊角鎊鹿茸去皮酒浸炙各三兩五加皮茯神去木各二兩酸棗仁炒枳實去穰麩炒熟乾地黃焙各一兩半右粗搗篩每服三錢先以水三盞煮羊腎一隻取汁至一盞半去腎下藥再煎至一盞去滓空心溫服萬靈丸宣明論治腎臟一切耳鳴腰疼肋骨痛草烏頭炮黑狗脊各三兩仙木一兩赤芍藥五靈脂防風黃耆細辛海桐皮山茵陳骨碎補地龍牛膝何首烏蔓荆子白附子川烏頭巨勝子各八分黑牽牛半兩芫花三分炒青皮御米子炒各二分右為末酒麵糊丸如梧桐子大每服十丸至二十丸溫酒下空心食前補益腎肝丸東垣蘭室方大寒相損止一丸與中寒冬寒心肺表寒喋噴鼻流清涕咳嗽痰涎此藥大寒治目中流火視物昏花耳聾鳴困倦乏力寢汗憎風行步不正二腳欹側臥而多驚腳膝無力腰下消瘦柴胡羌活生地黃炒苦參炒防己炒已上各半分附子一分肉桂一分當歸身三分右件為末熟水為丸雞頭仁大每服五十丸溫水下食前與表寒冬寒心肺寒藥中每服兼一丸須以二藥相兼服之不可單服太陽經嚏藥東垣蘭室方防風二分羌活根三分紅豆少許兩個右件為細末鼻內嗅之牛膝海桐皮煎丸王氏普濟方治腎臟風并腎餘氣時或上攻耳目頭面背膊及流疰手擘腰腳筋絡頑麻疼痛或時無力耳作蟬鳴以至重聽大壯筋骨補元氣牛膝半斤海桐皮半斤二味細銼杵為末用好酒五升於銅石器內熬成膏附子二兩炮去皮臍赤箭二兩川烏頭二兩炮去皮臍川苦楝二兩五加皮一兩虎脛骨四兩塗酥炙令黃色大黃二兩半桃仁二兩去皮尖麩炒黃色赤芍藥一兩肉桂一兩去皮當歸一兩麻黃一兩去根節地龍一兩去土微炒川芎二兩木香獨活沒藥研乳香研防風去蘆骨碎補麒麟竭舶上茴香沉香乾蝎天南星生用各一兩硼砂半兩研水飛過麝香半兩研右件二十九味修事淨同為末再研令勻細後入前膏內和勻再杵三二千下丸如梧桐子大每日空心溫酒或鹽湯下十丸忌生冷油膩毒物等治腎氣虛耳中如風水鳴或如打鐘磬之聲卒暴聾本草以蜀椒和巴豆菖蒲松脂以蠟溶為筒子內耳中一日一易甚神驗普濟方卷三十一
