body:
  text: 普濟方卷三十一明周王朱橚撰腎臟門腎臟虛冷氣攻腹脅疼痛脹滿附論夫腎臟虛冷氣者由腎氣不實下焦久寒陽氣外虛隂氣內積邪冷之氣在於臟腑積稸不散上攻於脾脾虛受乏則脹冷摶於隂經則痛也而又足少隂支脈行於兩脅令腎與脾俱虛為邪冷所攻正氣與邪氣相擊故令腹脅疼痛脹滿也方蓽澄茄散出聖惠方治腎臟虛冷氣攻心腹疼痛或時吐逆兩脅虛脹不思飲食四肢乏力蓽澄茄木香人參去蘆頭肉桂去皺皮肉豆蔲檳榔訶梨勒皮陳橘皮湯浸去白穰焙各一兩丁香􅒦砂去皮乾薑炮裂銼京三稜微煨銼赤茯苓白术各三分附子一兩半炮裂去皮臍赤芍藥甘草炙微赤銼各半兩右搗細羅為散每服不計時候以熱酒調下二錢沉香丸出聖惠方治腎臟虛冷氣攻心神悶亂四肢逆冷腹脅脹滿疼痛喘促嘔吐沉香木香檳榔苦楝子桂心蘹香子當歸銼微炒肉豆蔲去殼桃仁湯浸去皮尖雙仁麩炒微黃阿魏麵裹煨麵熟為度蓬莪荗各一兩丁香乾薑炮裂銼乾蝎微炒吳茱茰湯浸七遍焙乾微炒青橘皮湯浸去白穰焙各半兩硫黃一兩半細研水飛過右為末煉蜜和搗三五百杵丸如梧桐子大每服不計時候以熱酒下三十丸五味子丸楊子建萬金護命方治腎臟虛冷腹脅疼痛脹滿非時足冷隂痿行步無力五味子續斷牛膝酒浸切焙附子炮裂去皮臍桂去粗皮杜仲去粗皮炙銼蘹香子炒白茯苓去黑皮芎藭山芋當歸切焙檳榔銼一方無檳榔用木瓜吳茱茰湯洗焙炒細辛去苖葉青橘皮湯浸去白焙各一兩一方用川椒右為末酒煮麵糊丸如梧桐子大每服二十丸至三十丸空心鹽湯下硫黃丸出聖惠方治腎臟虛冷氣攻腹脅脹滿發渴疼痛足脛逆冷骨節痠疼食少無力硫黃細研硼砂細研蓽澄茄蘹香子補骨脂石斛去根木香丁香肉豆蔲去殼桂心當歸銼微炒檳榔吳茱萸湯浸七遍焙乾微炒各一兩何首烏一兩半麝香半兩細研右為末入研了藥令勻以酒煮麵糊和搗三二百杵丸如梧桐子大每服不計時候以溫酒下十五丸補腎湯出聖濟總録治腎臟虛冷氣攻兩脅下脹小腹急痛胸中短氣磁石水飛研淘去而汁附子炮裂去皮臍各二兩黃耆銼五味子當歸切焙白茯苓去黑皮石斛去根芍藥人參沉香各一兩桂去粗皮一兩半陳橘皮湯浸去白焙三分蜀椒去目并閉口炒出汗枳殼去穰各半兩右㕮咀每服三錢水一盞入生薑一棗大拍碎棗三枚擘破煎至六分去滓食前溫服沉香散出聖惠方治腎臟虛冷氣攻腹脅疼痛或多嘔吐不思飲食兩脅脹滿四肢羸瘦沉香白豆蔲去皮京三稜微炒銼桂心當歸銼微炒木香吳茱茰湯浸七遍焙乾微炒各半兩青橘皮湯浸去白穰焙三兩髙良薑銼附子炮裂去皮臍白茯苓白术各三分厚朴一兩去粗皮塗生薑汁炙令香熟檳榔三錢右為散每服五錢以水一大盞煎至五分去滓不計時熱服蓽澄茄丸出聖惠方治腎臟虛冷氣攻心腹疼痛脅肋脹滿蓽澄茄木香沉香乾蠍微炒白术當歸銼微炒青橘皮湯浸去白穰焙各半兩桂心訶梨勒煨用皮檳榔各一兩蘹香子蓬莪术髙良薑銼各三分右為末煉蜜和搗三二百杵丸如梧桐子大每服以熱生薑酒下二十丸葫蘆巴丸出聖惠方治腎臟氣虛下膲積冷氣攻腹脅脹滿臍下疼痛面色青黑足脛多冷葫蘆巴蘹香子硫黃細研附子炮裂去皮臍各一兩木香桂心當歸銼微炒阿魏研入青橘皮湯浸去白穰焙沉香白豆蔲去殼各半兩桃仁二兩湯浸去皮尖雙仁别研如膏右為末入研了藥令勻用好酒一升半先熬桃仁膏令稠拌和諸藥末搗三二百杵丸如梧桐子大每服不計時候以溫酒下二十丸沉香湯出聖濟總録治腎臟虛冷腹脅疼痛脹滿沉香細辛去苖葉續斷木香芎藭當歸切焙甘草炙銼檳榔銼石斛去根牛膝酒浸切焙枳殼去穰麩炒各半兩右粗搗篩每服三錢水一盞煎至七分空心去滓溫服檳榔散出聖惠方治腎臟虛冷氣攻心腹疼痛兩脅脹滿檳榔蘹香子桂心當歸銼微炒芎藭白豆蔲去皮木香青橘皮湯浸去白穰焙各三分丁香吳茱茰湯浸七遍焙乾微炒各半兩附子一兩炮裂去皮臍右為散每服四錢水一中盞入棗三枚煎至六分去滓不計時候熱服蘹香子丸出聖濟總録治腎臟虛冷氣攻腹脅脹滿疼痛心氣喘悶手足厥冷蘹香子炒木香桂去粗皮檳榔銼桃仁去皮尖雙仁焙研成膏蓬莪荗煨銼各三分青橘皮湯浸去白焙萊蔔子炒附子炮裂去皮臍各半兩厚朴去粗皮生薑汁炙一兩半右搗羅九味為末入桃仁膏研勻以酒煮麵糊丸如梧桐子大每服三十丸空心食前溫酒下蓽澄茄煮散出聖濟總録治腎臟虛冷氣攻腹脅疼痛脹滿煩倦蓽澄茄甘草炙銼人參芍藥各一兩蘹香子炒檳榔銼各三分乾薑炮阿梨勒皮桂去粗皮各半兩右為散每服三錢水一盞煎至七分溫服不拘時蘹香丸出聖惠方治腎臟虛冷氣攻兩脅脹滿腹內疼痛四肢不和蘹香子木香桃仁湯浸去皮尖雙仁别研為膏桂心蓬莪荗檳榔各三分蘿蔔子半兩微炒青橘皮湯浸去白穰焙半兩厚朴一兩半去粗皮塗生薑汁炙香熟右為末以醋煮麵糊和丸如梧桐子大每服不計時候以熱酒下三十丸蘹香子丸出聖濟總録治腎臟冷氣攻腹脅疼痛脹滿蘹香子炒蓬莪荗煨銼楝實煨去核白术訶梨勒皮各一兩丁香一分吳茱茰湯浸焙乾炒半兩桃仁三分去皮尖雙仁研如膏右搗羅七味入桃仁膏研勻煉蜜丸如銀杏大每服一丸溫酒或鹽湯嚼下不拘時異香散出和濟方治腎氣不和腹肋膨脹痞悶噎塞喘滿不快飲食不化噫吞酸一切氣痞腹中刺痛此藥能破癥瘕結聚大消宿冷沉積常服調五臟三焦和胃進食石蓮肉去皮一兩蓬莪术煨京三稜炮益智仁炮甘草炒各六兩青皮去白陳皮去白各三兩厚朴去粗皮薑汁炙二兩右為細末每服二錢水一盞生薑三片棗一枚鹽一捻煎至七分通口服不計時候鹽湯點或溫酒調皆可服木香湯出聖濟總録治腎臟虛冷氣攻腹中疼痛兩脅脹滿木香沉香各半兩青橘皮湯浸去白炒京三稜煨銼各一兩桂去粗皮當歸切炒檳榔銼厚朴去粗皮生薑汁炙各三分右粗搗篩每服三錢水一盞生薑三片棗二枚擘破煎至七分去滓溫服葫蘆巴飲出聖濟總録治腎臟氣冷腹痛嘔逆腹脅脹滿四肢少力不思飲食葫蘆巴白茯苓去黑皮舶上蘹香各一兩肉豆䓻去殼木香附子炮裂去皮臍各半兩沉香三分右㕮咀每服三錢鹽一捻煎至七分去滓溫服空心食前烏頭蘹香子丸出聖濟總録治男子腎氣虛攻腹脅疼痛脹滿烏頭炮裂去皮臍檳榔銼蘹香子銼炒楝實銼炒當歸切炒各一兩木香半兩硼砂研一錢右為末和勻醋煮麵糊丸如梧桐子大丹砂為衣每服二十丸溫酒下不拘時檳榔湯聖濟總録治腎臟虛冷氣攻腹脅脹滿疼痛檳榔生銼木香各半兩菴䕡子桔梗炒各二兩肉桂去粗皮附子炮裂去皮臍各一兩右㕮咀每服三錢水一盞煎至七分去滓溫服巴附丸聖濟總録治腎臟虛冷腹脅脹滿葫蘆巴一兩半附子炮裂去皮臍硫黃研各一兩蘹香子炒三分檳榔銼桂去粗皮各半兩右為末和勻酒煮麵糊丸如梧桐子大每服二十丸至三十丸溫酒或鹽湯下空心日午臨臥服豆蔲飲聖濟總録治腎臟虛冷腹脅脹滿肉豆蔲去殼葫蘆巴蘹香子炒丁香各一兩沉香三分右粗搗篩每服三錢水一盞入鹽少許煎至七分空心食前去滓溫服葫蘆巴丸聖濟總録治腎臟虛冷腹脅脹滿葫蘆巴二兩附子炮裂去皮臍硫黃研各三分右為末酒煮麵糊丸如梧桐子大每服二十丸至三十丸鹽湯送下艾茸丸聖濟總録治腎臟虛冷氣攻腹脅脹滿疼痛木瓜三十枚去皮核作甕子甘菊花為末青鹽研各一斤右將甘菊花并青鹽填滿木瓜甕子內置籠牀內蒸以木瓜爛為度研成膏再入新艾茸二斤搜和作劑丸如梧桐子大暴乾每服三十丸空心食前米飲下燒腎子十便良方治下焦虛冷臍腹撮痛心胸痞脹和元氣進飲食益胃舶上茴香川附子官桂川椒子木香胡椒陳橘皮巴戟乾薑各半兩京三稜一兩右十味杵為末用豶豬腰子一對去筋膜切作片子以末二錢入蔥絲少許鹽半錢溫紙裹煨熟餌訖以酒或粥飯壓之須臾覺臍下暖甚妙羊脊骨湯主腎臟虛冷腰脊轉動不得用羊脊骨一具嫩者捶碎爛煮和蒜虀空腹食之兼飲酒少許妙鹿角屑散主腎臟虛冷腰脊痛如錐刺不能動搖用鹿角屑二兩熬令微黃搗末空腹暖酒服方寸匕日三兩服治腎臟虛冷腰膝無力自覺渾身沉重懶行步無精神氣力小便餘瀝方楊子建萬全護命方萆薢杜仲續斷牛膝石斛狗脊去毛當歸五味子芎藭蓯蓉茯苓附子火炮去皮獨活兔絲子甘草細辛木香官桂各一分右細杵羅為末煉蜜丸如梧桐子大每朝空心鹽湯溫酒任下三十丸治腎臟虛冷內感寒邪睡中交鬼泄精方楊子建萬全護命方萆薢半兩杜仲去皮續斷狗脊去毛芎藭龍骨木香茯苓益智獨活天靈蓋酥炙黃黑色石斛各一分阿魏二錢用稀麵和成團焙令乾使右細杵羅為末煉蜜丸如梧桐子大空心鹽湯溫酒下三十丸留末一半早朝入鹽煎空心去滓喫不要多喫丸藥也病效丸藥止更不喫腎臟冷氣卒攻臍腹疼痛附論夫腎臟冷氣卒攻臍腹疼痛者由腎氣虛弱宿有冷疾或久坐濕地強力入水或食生冷過度觸冒風寒傷於腎經陽氣虗微隂氣獨盛邪正相擊故卒攻臍腹疼痛不可忍也方木香散聖惠方治腎臟冷氣卒攻臍腹疼痛脹滿壅悶木香乾薑炮裂銼蘹香子桂心檳榔桃仁湯浸去皮尖雙仁麩炒微黃雞舌香蓽澄茄青橘皮湯浸去白穰焙各三分右搗羅為細散每服不計時候以熱酒調下一錢阿魏丸聖惠方治腎臟冷氣卒攻臍腹疼痛不可忍阿魏麵包煨麵熟為度别研青橘皮湯浸去白穰焙附子炮裂去皮臍自然銅細研各半兩桂心乾蝎微炒木香檳榔已上各三分桃仁一兩湯浸去皮尖雙仁麩炒微黃别研右搗羅為末以童子小便二升入桃仁阿魏於銀鍋子內以慢火煎令稠入諸藥末和丸如梧桐子大每服不計時候以熱酒下二十丸沉香散出聖惠方治腎臟冷氣卒攻臍腹疼痛不可忍手足逆冷沉香二兩附子炮裂去皮臍肉豆蔲去殼各一兩肉桂去皺皮蘹香子蓬莪荗青橘皮湯浸去白焙阿魏麵包煨麵熟為度各三分右搗細羅為散每服不計時候以溫酒下二錢蛜􅖉散出聖惠方治腎臟虛冷卒攻臍腹疼痛不可忍及兩脅疼痛蛜􅖉三十六枚頭足全掘一地坑子面闊四寸深五寸用炭火五斤燒坑子令通紅便淨去灰土用頭醋一升潑在坑子內候滲乾便勻排蛜􅖉坑子底用一瓷碗蓋之一宿取出蘿蔔子木香各一分胡椒三十粒檳榔一枚肉豆蔲一枚去殼右搗細羅為散每服不計時候以熱酒調下一錢桃仁丸出聖惠方治腎臟氣虛觸冒風寒冷氣卒攻臍腹疼痛桃仁湯浸去皮尖雙仁麩炒微黃附子炮裂去皮臍硫黃細研水飛過蘹香子木香髙良薑銼各三分右搗羅為末用煎醋浸蒸餅和丸如梧桐子大每服不計時候以熱酒下二十丸硫黃丸出聖惠方治腎臟冷氣攻臍腹疼痛兩脅脹悶飲食不下硫黃一兩細研水飛過木香檳榔桃仁湯浸去皮尖雙仁麩炒微黃各半兩青橘皮湯浸去白穰焙蘹香子各三分右搗羅為末醋煮麵糊和丸如梧桐子大每服以熱酒下十丸不計時候服之胡椒丸出聖惠方治腎臟冷氣卒攻臍腹撮痛不可忍胡椒木香沉香桂心蛜􅖉各三分阿魏一分麵裹煨麵熟為度右搗羅為末煉蜜和丸如梧桐子大每服以熱生薑酒下二十丸不計時候服硼砂丸出聖惠方治腎臟冷氣卒攻臍腹疼痛甚者硼砂三分雄黃硃砂黃丹微炒各一分麝香一錢巴豆十枚去皮心研紙裹壓去油右藥都入於乳鉢內順手研半日用煎醋浸蒸餅和丸如