body:
  text: 普濟方卷一百四十四明周王朱橚撰傷寒門傷寒後身體虛腫論夫血氣滋榮外濡於腠理則形體充實傷寒汗下之後血氣不足臓腑虛寒榮衞濇滯津液不通肌肉無以充榮故令身體虛腫若脾與腎臓俱虛不能約制於水水氣流溢於皮膚則變水氣腫滿方黄耆湯治傷寒後身體腫滿心胸壅悶喘促氣滿黄耆一兩枳殻去穣麩炒微黄三分防風半兩桂去麄皮半兩細辛去苗葉半兩白术三分赤芍藥赤茯苓去黑皮三兩當歸切焙半兩右麄搗篩每服三錢水一盞入生薑半分切煎至六分去滓不計時候温服防己湯治傷寒後身體浮腫喘息促小便不利坐卧不安防己三分猪苓去黑皮三分海蛤一兩陳橘皮湯浸去白穣焙一兩木香半兩白术半兩㯽榔剉一兩桑根白皮剉三分赤茯苓去黑皮三分木通剉一兩半紫蘇葉右麄搗篩毎服三錢水一盞入生薑半分切煎至六分去滓不計時候温服木通湯治病後脾腎不足水道不利腰脚浮腫木通剉一兩澤㵼防己桑根白皮炙黄色赤茯苓去黑皮石葦去毛各三分大腹子微煨剉四兩右麄搗篩毎服五錢水一盞半煎至八分去滓食前温服日三防己湯治病後氣虛津液不通皮膚虛滿防己黄耆剉桂去麄皮各一兩半赤茯苓去黑皮三兩甘草炙令赤剉一兩右麄搗篩每服五錢水一盞半煎至七分去滓温服日再服㯽榔湯治傷寒病後脾腎氣虛欲成水病四肢面目浮腫小便澁喘急㯽榔并皮剉五枚防己二兩木通剉碎一兩一分桑根白皮炙令黄色剉一兩陳橘皮湯浸去白焙乾三分呉茱茰水浸一宿炒乾一分郁李仁湯浸去皮㣲炒一兩右麄搗篩每服三錢木一盞半煎取七分去滓温服日三前胡丸治傷寒身體浮腫心胸滿悶不欲飲食前胡去蘆頭一兩旋覆花半兩人參三分訶梨勒皮一兩㯽榔剉一兩木香半兩赤茯苓去黑皮三分陳橘皮湯浸去白穣焙半兩桂去麄皮半兩桑根白皮剉三分郁李仁湯浸去皮尖微炒一兩右搗羅為末煉蜜和搗三二百杵丸如梧桐子大毎服煎生薑棗湯下三十丸日三服郁李仁湯治傷寒後身體洪滿腹堅脹喘急不能飲食郁李仁湯浸去皮尖微炒大黄剉碎微炒各一兩茈胡去苗桑根白皮剉澤㵼赤芍藥猪苓去黑皮桔梗炒麻黄去根節各三分鼈甲去裙襴醋炙赤茯苓去黑皮各半兩杏仁湯浸去皮尖雙仁麩炒微黄右麄搗篩毎服三錢水一盞入生薑半分切煎至六分去滓不計時候温服木香丸治傷寒後遍身洪腫木香肉荳蔲青橘皮湯浸去白焙㯽榔微炒剉各一兩右搗羅為末煉蜜為丸如小豆大毎服空心温酒下二十丸漸加至三十丸治病後虛腫豉五升醇酒一斗右煮三沸及熱頓服不耐酒者隨性服覆取汗五香麻黄湯治傷寒忽發腫或著四肢或在胸背虛腫浮如吹狀亦著頭面唇口頸項劇者偏著脚脛外如軸大而不痛不赤著四肢者乃欲不遂悉皆主之麝香半兩薰陸香鷄舌香各一兩沈香秦艽青木香麻黄防風獨活萎㽔甘草各二兩白薇枳實各二兩右㕮咀以水九升煮取三升分三服覆取汗後摩防己膏傷寒後骨節煩疼附論夫傷寒後骨節煩疼者由津液不足血脈皆虚餘毒客於經絡榮衛澁滯於骨節之間故令骨節煩疼也診三部脈細而遲澁者乃其候也方葛根湯治傷寒後毒氣未解四肢少力骨節煩疼心腹脹滿葛根剉生乾地黄焙羌活去蘆頭桂去麄皮芍藥芎藭麻黄去根節湯煮掠去沫陳橘皮湯浸去白焙木香各半兩甘草炙剉一分右麄搗篩毎服五錢水一盞半入生薑半分拍碎棗三枚擘破同煎至七分去滓空心温服晚食前再服茈胡湯治傷寒後百節疼痛壮熱頭疼茈胡去苗芍藥知母焙桃仁湯浸去皮尖雙仁炒黄木香山梔子仁升麻大青白芷黄芩去黑心各半兩甘草炙剉一兩石膏一兩右麄搗篩毎服五錢水一盞半入生薑半分拍碎同煎至七分去滓食前温服日三茈胡飲治傷寒後骨節疼痛咳嗽不能食口舌乾燥乍寒乍熱唇口生瘡茈胡去苗升麻茯神去禾芍藥犀角鎊百合地骨皮麥門冬去心焙黄芩去黑心人參各半兩鼈甲去裙襴醋煮石膏各一兩甘草炙剉一分右麄搗篩毎服五錢水一盞半入生薑半分拍碎竹葉三七片同煎至七分去滓食前温服日再芍藥湯治傷寒後壮熱骨肉疼痛頭重嘔噦芍藥茈胡去苗赤茯苓去黑心人參麥門冬去心焙藿香葉白芷各半兩生蘆根一兩甘草炙一分右剉如麻豆大毎服五錢水一盞半入生薑半分拍碎同煎至七分去滓空心温服晚食前再服百合湯治傷寒後四肢煩熱骨節疼痛百合知母焙鼈甲去裙襴醋炙茈胡去苗葛根剉桑根白皮剉各一兩右麄搗篩毎服五錢水一盞半煎至八分去滓入生地黄汁一合攪勻食後温服日再茯苓湯治傷寒後骨節煩疼乍起眼暗氣衝胸背上氣滿急白茯苓去黑皮柴胡去苗桔梗炒細辛去苗葉芍藥大腹皮各半兩枳殻去穣麩炒陳橘皮湯浸去白穣焙各一兩杏仁湯浸去皮尖雙仁炒三分甘草炙一分右麄搗篩每服五錢水一盞半入生薑半分拍碎同煎至八分去滓食後温服日再黄耆湯治傷寒後骨節煩疼不欲飲食即氣脹汗出補氣黄耆剉芍藥桂去麄皮麥門冬去心焙五味子前胡去蘆頭白茯苓去黑皮當歸切焙人參各半兩甘草炙一分右麄搗篩毎服五錢水一盞半入生薑半分拍碎棗三枚擘破同煎至七分去滓温服日三防風湯治傷寒後遍身骨節疼痛脚膝無力防風去蘆白术附子炮製去皮臍白蘚皮黄耆桂去麄皮薏苡仁各一兩右剉如麻豆毎服三錢水一盞入生薑半分拍碎同煎至半盞去滓温服日三羌活湯治傷寒後下焦風虛骨髓酸痛腰脚頑痺不能久立日漸消瘦羌活去蘆頭防風去蘆五加皮牛膝去苗酒浸切焙酸棗仁微炒丹參芍藥麻黄去根節湯煮掠去沫焙當歸切焙獨活㯽榔𤣥參堅者木通剉各半兩桂去麄皮黄耆剉各三分右麄搗篩毎服五錢水一盞半煎至七分去滓空心温服日晚再服續斷湯出䕶命方治傷寒熱毒氣攻腎腰背疼痛脊膂强急頭不痛左手尺脈浮微數續斷杜仲去麄皮炙剉羌活去蘆頭麻黄去根節湯煑掠去沫焙芎藭各一兩牽牛一分熟炒右麄搗篩毎服三錢水一盞煎至二沸去滓空心服桂枝芍藥知母湯出金匱方治諸肢節疼痛身體魁瘰脚腫如脫頭眩短氣温温欲吐桂枝四兩芍藥三兩甘草二兩麻黄二兩生薑五兩白术五兩知母四兩防風四兩附子二兩炮右以水七升煑取二升温服七合日三服柴胡散治傷寒壮熱肢節疼痛大小便澁柴胡去苗黄芩去黑心栝蔞根山梔子仁各一兩大黄剉醋炙芒硝各一兩半木香白蘚皮各三分茵蔯蒿半兩右搗羅為細㪚毎服二錢食前新汲水調下神解丸出御藥院治内外所傷骨節疼痛壮熱増寒頭疼身體拘急硃砂研硼砂研黄蠟各等分右鎔蠟和成劑旋丸如菉豆大毎服一丸冷水送下如人行一二里地以熟葱醋粥投汗出解正元散出㧞萃方治傷寒始覺吹凍著四肢頭目百節疼痛急煎此服如人行五里再服或連三服汗出立差若患隂毒傷入退隂㪚半錢同煎或寒冷傷食頭疼氣滿及心腹諸疾服之無有不效退隂散方見婦人諸疾門傷寒類麻黄陳皮甘草乾薑肉桂白芍藥大黄附子呉茱茰半夏各等分皆可製右麻黄加一半茱茰减一半同為末毎服一大錢水一盞生薑五片棗一枚煎七分熱呷出汗以被盖覆汗出愈隂毒不可用麻黄出汗天麻散出王氏博濟方解傷寒渾身壮熱百節疼痛頭昏重面赤氣麄脈息洪大大效天麻三兩烏頭一兩半天南星二兩防風白附子一兩雄黄半兩麝香少許右為細末毎服一字温酒調下併喫三兩服汗出立差橘皮湯永類鈐方治動氣在下不可發汗發之反無汗心中大煩骨節疼痛目瞑惡寒反嘔逆榖不得入净陳皮一兩半甘草半兩炙人參一分竹茹半兩右㕮咀每服四錢水一盞薑三片棗一枚煎空心服活人書加生薑一兩棗子八個作六服傷寒後腰脚疼痛論夫腰者腎之府腎者主水受五臓六腑之精而藏之傷寒病後精血不足腎氣既弱風邪襲虚客搏於足少隂之經留注腰脚凝滯不散故機闗不利為腰脚疼痛亦有宿患腎經風温腰痛因病後下經氣虚而發者各從其症以方治之方羌活散出聖恵方治傷寒後風虛腰脚頑痺骨髓疼痛不能久立羌活防風去蘆頭黄耆五加皮牛膝去苗各二兩酸棗仁微炒丹參桂心赤芍藥麻黄去根節㯽榔當歸木通𤣥參各一兩枳實半兩麩炒微黄右細剉和勻毎服半兩水一大盞入生薑半分煎至五分去滓食前温服服藥訖即以衣覆卧良久即愈麻黄散出聖恵方治傷寒後風毒攻腰脚骨節疼痛麻黄一兩半去根節細辛獨活桂心防風去蘆頭當歸羚羊角屑已上各一兩丹參牛膝去苖萆薢剉黄耆剉各三分磁石二兩搗碎小淘去赤水右為㪚毎服四錢以水一中盞入生薑三片煎至六分去滓食前温服大腹皮散出聖恵方治傷寒肝腎風虚毒氣壅滯大小腸閉澁氣攻腰脚疼痛妨悶大腹皮剉桂心澤瀉赤芍藥各一兩㯽榔木香各半兩木通川朴硝各三分右為㪚毎服四錢以水一中盞入生薑半分煎至六分去滓食前温服牛膝散出聖恵方治傷寒後臓腑虛弱腰脇疼痛瘦痒牛膝去苖石斛去根剉薯蕷赤芍藥杜仲去麄皮炙微黄剉萆薢剉各三分當歸剉微炒熟乾地黄各一兩桑寄生右為㪚毎服五錢水一中盞入酒三合生薑半分煎至六分去滓食前温服服藥後徐步令藥勢行獨活散出聖恵方治傷寒後腎臓風虛脚膝疼痛少力不能步獨活一兩防風三分去蘆頭五加皮三分剉附子一兩炮製去皮臍赤芍藥一兩乾薑半兩炮桂心一兩半牛膝去苗一兩五味子三分杜仲一兩半去麄皮炙微黄剉石斛去根一兩沈香一兩右為散毎服五錢以水一大盞入薑半分煎至五分去滓食前温服桂心散出聖恵方治傷寒後腹脹氣急連腰脚疼痛桂心陳橘皮湯浸去白穣焙白术附子炮製去皮臍當歸木香各半兩㯽榔一兩厚朴去麄皮塗生姜汁炙令香熟半兩右為細㪚毎服食前以酒調下二錢㯽榔丸出聖恵方治傷寒後虚冷腰間有積滯氣流注腰脚疼痛不可忍㯽榔陳橘皮湯浸去白穣焙桂心附子炮製去皮臍赤芍藥各半兩乾薑一分炮製剉牽牛子五兩微炒别杵羅取末二兩半聖濟入糯米百粒同炒米色黄取末三兩右為細末研令勻煉蜜和丸如梧桐子大食前以生薑湯温下三十丸相次以生薑粥飲投之良久當利未利再服聖濟云為㪚入牽牛子末和令勻每服空心温酒調下三錢每服藥了喫少薑粥投良久利下腰間積滯物如不利即加至四錢以利為度名㯽榔散沈香散出聖恵方治傷寒後腰間氣滯流注脚膝疼痛沈香附子半兩炮製去皮臍五加皮各一兩桂心一兩㯽榔一兩枳實半兩麩炒微黄木香半兩大黄一兩剉碎微炒右為細散毎服食前以葱白湯調下二錢葳靈仙散出聖恵方治傷寒後腰脚疼痛葳靈仙一兩半牽牛子二兩微炒陳橘皮三分湯浸去白穣焙厚朴三分去麄皮塗生姜汁炙令香熟呉茱茰半兩湯浸九遍曝乾右為細㪚空心以温酒調下二錢當㵼下惡物治傷寒後肩背拘急腰脚疼痛出聖恵方羌活乾薄荷各一兩木香㯽榔各三分葳靈仙右為細㪚每服食前以温酒調下二錢貼㶸方出聖恵方治傷寒後風氣流注腰脚疼痛坐卧有妨附子生用桂心各半兩呉茱萸一分生用右為末用生薑自然汁調令稀稠得所入銚子内慢火煎如餳攤在臘紙上於痛處貼㶸之芫花散熨方出聖恵方治傷寒後毒氣攻注腰脚疼痛芫花呉茱萸各二兩醋糟八兩右相和令勻於銚子内炒令熟以青布褁於痛處熨之如稍乾以醋拌令潤再炒熨之以痛止為度治傷寒後毒氣傷於經脈即致腰脚疼痛出聖恵方鹿角一隻長三寸截之酒七升右先用鹿角以炭火