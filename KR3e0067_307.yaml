body:
  text: 普濟方卷三百七明周王朱橚撰諸蟲獸傷門蛇傷附論夫蛇火蟲也熱氣炎極為毒至甚五方所出名稱不同惟廣南尤多彼山崇地濕水火蒸欎所生最盛蘄黄之地蛇類稍衆南山有一山居水中當四五月之交群蛇吐毒氣凡髙數丈蒸若雲霧毎至中夏瘴氣盛行亦縁此也凡蛇數不可悉狀其毒極㣲不能殺人者惟花蛇烏蛇故入藥品凡見蛇不言正名但云䖝及地索之類以避之或入山及履深草冝帯雄黄麝香避之蛇入人家者燒羖羊角令烟遍覆即去矣青蝰蛇正緑色喜縁木及竹上與竹木色一種人卒不覺若人入山林中行脫能落頭背上然自不甚囓人囓人必死那可屢肆其毒此蛇無甚極大大者不過四五尺世人皆呼為青條蛇其尾二三寸色異者名矯尾最烈凡見蛇不應言蛇皆言䖝及云地索勿正言其名也惡蛇之類甚多而毒有差劇時四月五月中青蛙三角蒼虺白頭大蜴六月七月中竹狩艾蝮黒甲赤目黄口反釣白蛙三角此皆蛇毒之猛者中人不即治多死又有赤連黄頷之類復有六七種方書不盡記其名水中黒色者名公蠣山中一種亦相似不常聞螫人又有釣虵尾如釣能倒牽人獸入水没而食之又南方有呴蛇人或傷之不死終身伺覔其主雖百人衆中亦直來取之唯逺出百里乃可免爾又有柂蛇長七八尺如舩柂狀毒人必死即削取柂煑汁漬之便瘥凡大蛇多是神不可妄殺之又額上有白色狀如王字者有靈或有角形者此是欲變為龍也但蛇類雖多今皆以青條矯尾白頸艾蝮其毒尤劇大者中人若不即治一日間舉體洪腫皮肉坼爛中者尚可得二三日也青蝰中人立死虺毒急於衆蛇不早療之多斷人手足凡被蛇螫第一禁第二藥無出此二者有全劑雄黄麝香可預辦今凡俗知禁者甚少尋按師術已至困斃惟冝勤事諸藥或經行草路何由皆齎方書故山居者冝令知禁法也又惡蛇螫著人即頭解散者此虵名黒帝其瘡冷如凍凌此大毒惡不治一日即死若頭不散此虵名赤帝其毒小輕瘡上冷不治故得七日死凡蛇傷瘡未愈禁熱食便發治之更當依初被螫法也蝮蛇者形不甚長頭匾口尖頭斑身赤紋斑色亦有青色黒色者人犯之頭腹貼著地者是也東間諸山甚多其毒最烈草中行不可不慎又有一種狀如蝮而短有四脚能跳來囓人亦名為千歲蝮中此必死然其囓人竟即跳上樹作聲云斫木斫木者但營棺具判其不救若云博叔博叔者猶可急療吴音呼藥云叔故也方大黄湯治毒蛇傷牛膝大青草下馬草胡麻草鐡刷草将軍草槐樹頭淡竹葉小青各等分右同搗汁用煮酒調服柤傅瘡口将針破傷處用葱鹽湯洗淨方可傅如無将軍草雄黄少許白礬散出聖恵方治諸毒虵傷解毒白礬熬汁枯研羖羊角燒灰研各半兩乾薑炮一兩射罔一分雄黄麝香研各一兩右為細散用傅瘡上凡虵畏雄黄疑有蛇處於舎下微火燒雄黄蛇並散蛇咬丹治毒虵傷野菊花二錢半麝香二錢香白芷各一錢雄黄二錢右為末用好醋調擦雄黄散治諸毒蛇咬毒氣攻心迷悶雄黄研麝香研乾薑炮為末各半兩巴豆一分去皮心出盡油研右和勻每服一字以新汲水調下纔中便服得利則毒氣微消未利更一二服一方用丹砂椒黄傅方出十便良方治一切毒蛇咬迷悶閉口椒一兩為末蒼耳苗五兩為末生薑汁二合硫黄半兩為末右相和傅之椒香方出聖恵方治毒蛇咬毒氣攻心悶亂方豉四兩椒去目薫陸香各三兩白礬燒灰二兩右以相和爛搗以唾調傅傷處牛角散治蛇螫竅出血凡蛇瘡未愈禁熱食犯此便發治依初螫法出聖恵方猫兒糞三兩嘵灰乾薑一兩剉臰黄一兩牛角䚡二兩燒灰右為散以津唾調𫝊於螫處雄辛散治惡蛇風犬所傷詩曰細辛蓽撥及雄黄好酒研來入麝香不問惡瘡并惡大管教一服便安康右等分為細末每服二錢好酒調下半夏散治蛇咬方麝香雄黄半夏巴豆右等分為末𫝊之麝香散治蛇螫人竅出血凡蛇瘡未愈禁熱食犯此便發治依初螫法麝香一分細研雄黄一分細研半夏一分生用右細研令勻𫝊之即愈蒼耳散治蛇螫人竅出血白礬二兩研大麻葉五兩剉蒼耳莖葉五兩剉右用水一斗煑至六升去滓下白礬末温浸之細辛散治毒蛇所傷方細辛白芷各五錢雄黄二錢右細研令勻入麝香少許每服二錢温酒調服諸般惡毒自散而安如冝方有白芨治諸蛇毒方用男子陰間毛二七枚含之有汁即咽却秘方也中蛇毒勿渡水則痛甚於初螫亦當先存想作大蜈蚣在前已隨後渡若乘船渡不諳法殺人輕粉散治蛇傷舊墨一塊指大燒存性輕粉一盝亂髮一拳大燒存性右為末好酒調服一過便愈柤𫝊咬處雄黄散治蛇咬及惡瘡痛雄黄半夏生乾薑生各等分右為細末貼蛇咬處及惡瘡上石灰散治蛇蟲蜂蠍蚖蛇蜘蛛沙蟲等傷蜈蚣草臰黄石灰各等分右搗為末傅螫處桂香散治諸蛇咬毒氣攻心桂去鹿皮栝蔞根各二兩右為細末以小竹筒盛宻塞帯行卒為毒蛇所傷即傅之此藥療諸蛇毒塞不宻則氣歇不中用二蟲膏治諸蛇咬毒氣攻心迷悶地龍五枚蜈蚣一枚端午日收赤足者右以相和爛搗傅之椒蒜傅方治諸蛇咬痛腫椒合口蒜各等分右用同搗令熟傅之瘥一方用蒜葉硇砂散治諸蛇咬痛腫右以硇砂一兩細研為末以園内生蔞葱就上取却葱角尖傾入硇砂末却以角尖覆一七日掘出葱傾硇砂汁於一張緊薄紙上隂乾每有傷處取錢孔大紙貼之立愈青黛散治蛇毒及一切蟲傷但有少氣可以下藥即活神効不可言倉卒無藥去處以大藍汁一椀雄黄二錢調勻㸃在所傷處并細服其汁無藍澱花青黛代之亦可仍用艾炙咬處椒葫方治蝮蛇毒右取合口椒葫荽苖等分搗傅之無不瘥胡粉散治蝮蛇毒大蒜胡粉右搗和傅之鹿角散治蝮蛇毒猪脂鹿角灰右以和塗之大蒜方治蛇螫人瘡已愈餘毒在内中滛滛痛癢方大蒜小蒜各一升右合搗以熱湯淋汁灌瘡大良一方小蒜汁滓傅上麥門冬散本草治惡蛇咬傷頓仆不可療者及毒氣入腹遍身腫痛右用香白芷為末麥門冬去心濃煎湯調下頃刻咬處出黄水盡腫消皮合仍用此藥滓塗傷處如氣未絶無不活者若傷輕只用辣母籐挼𫝊之更酒調雄黄亦妙以新汲水調下半兩許毒氣自消一方用熱酒調下諸方皆用麥門冬水盖欲先䕶心氣也昔臨川有人以貨蛇藥為業一日方作塲為蝮所囓即時殞絶一臂大如股少頃徧身皮脹作黄黒色遂死有一道人旁觀出言曰此人死矣我有一藥能療但恐毒氣益深或不可治諸君能相與證明方敢為出力衆咸竦踊勸之乃求錢二十文以徃纔食頃奔而至命汲新水觧裹中藥調灌之四體應手消縮良久復故其人能起與未傷時無少異遍拜觀者且鄭重謝道人道人曰此藥不難得亦甚易辦吾不惜傳諸人乃香白芷一物也法當以麥門冬湯調服適來事急不暇姑以水代之吾今活一人可行矣拂袖而去郭邵州沰得其方嘗有鄱陽一醫調一升以杖抉傷者口灌入藥盡覺臍中搰搰然黄水自口出一卒夜直更合為蛇囓腹明旦赤腫欲裂以此飲之即愈薑黄方治諸蛇毒螫人欲死右用乾薑雄黄等分同研用小絹袋盛繋臂上男左女右蛇聞藥氣逆避人螫毒傅之細辛散治蛇咬右用細辛雄黄等分為末津調傅亦可雄黄餅子散治蛇咬欲死方右用雄黄不以多少萵苣汁和作餅子候乾為末毎用少許貼瘡口立愈一方好酒調化服就用藥塗傷處櫻桃散治諸種蛇傷右以櫻桃葉用生薑同擂碎入酒𢷬研服之良滓傅傷處一方無薑服之茜草散治土蛇咬先用蓼草搽於咬傷處後用茜草去根擂碎用井花水調服日進三五服滓傅傷處蛇毒先宻取荇葉當其上穿勿令人見以再覆瘡口上一時着葉當上穿穿即折牙出也又方細辛白芷各一錢碾雄黄一錢研加虎骨麝香雄靈散治毒蛇所傷昏悶欲死者五靈脂一两真者酒洗去砂石乾用雄黄半兩明好者研右為細末每服二錢酒調灌之就以藥末調塗傷瘡口良久再一服神效昔有人被毒蛇傷良久已昏困有老僧以酒調藥二錢灌之遂甦及以藥滓塗咬處良久復灌二錢即愈凡有中其毒者用之無不騐也一方無雄黄白芷散治毒蛇咬右用婦人扎髻繩扎定瘡處如無頭繩麻油繩亦可須用雄黄香白芷末糝之用新汲水調末服之或熱酒送下皆良一方無雄黄单用香白芷末摻服又云諸方皆用麥門冬水盖欲先䕶心氣也地龍散治青蝰蛇螫地龍三條鹽半兩炒右相和研令爛以麵圍毒處傅藥於上須臾化為水不過三兩度雄礬方治蛇傷詩曰忽然被蛇咬雄黄與白礬一時研𫝊上神效不等閒治蛇蟲傷巴豆數粒細研貼瘡蓼汁飲右搗生蓼絞汁飲之少少以滓傅瘡上又挼藍青𫝊之治諸蛇咬痛腫用黒豆葉五两細剉搗𫝊瘡上日四五度用一方唾塗咬處熟嚼豆葉傅之䖟蟲散治蛇螫人竅出血凡蛇瘡未愈禁熱食犯此便發治依初螫法用蝱蟲初食牛馬血者二七枚焼為灰以温水調服之效治蛇螫人竅出血用黒豆五升礪碎分為二分於盆中以水浸過三寸深令浸螫處良久去舊豆著新豆復浸不過三兩易愈兼以豆為末以調服之妙治蛇入口並入七孔中用割母猪尾頭滴血着口中即出并着孔中得治因熱逐凉睡有蛇入口中挽不出毒蛇所傷用以刀破蛇尾入生椒三二粒褁着即出有人伐木倦卧山中遭此得是法遂活此蛇有逆骨慎不可以力㧞之無椒但辛物亦可鷄角散治天蛇傷用鷄子白刷瘡内候痒燒皂角為末糝之治蛇傷毒用繩縳住兩頭以五加皮葉擂爛敷貼又方用烏栢葉擂爛敷貼傷處及葉於口嚼取汁服愈治毒蛇及一切蟲傷但有少氣可以下藥即活神効不可言用貝母為末調酒盡量飲之頃刻酒自傷處為水流出水盡為度却以藥滓𫝊瘡上若所傷垂死但有少氣服此即活一方以貝母末塞瘡口妙不可言蘓韜光寓婺州城外魁星館有人書此方于壁間云此方神効治一切蛇毒所傷方用赤脚大蜈蚣一條瓦上焙乾雄黄巴豆霜各一錢麝香少許右為細末以杏核數箇各磨成一竅去仁填藥在内令滿却以蠟塞竅臨時蠟丸以針挑藥末塗傷處候黄水出即瘥畢後塞其竅一枚可救數人石中黄散治蛇傷槐花頭五倍子去蛀石中黄粉右各等分為末水調塗治蛇傷先用冷水洗後用茱茰二合水一椀研取汁服之将滓傅瘡一方用酒調下油調𫝊治因熱逐凉睡熟有蛇入口中挽不出方用艾炙蛇尾即出若無火以刀周匝割蛇尾截令皮斷乃將皮倒脫即出小品同之七八月中諸蛇毒旺不得洩皆囓草木即枯死名為蛇蚳此物傷人甚於蛇螫即依蛇之螫法療之治蛇入人口并七孔中者方以患人手中指等截三歲大猪尾以噐盛血傍蛇㵼血口中㧞出之治卒為蛇繞不觧方用熱湯淋之無湯令人尿之治蛇囓方用人屎厚塗之帛裹即消治蛇毒方用消蠟注瘡上不瘥更消注之又方用母猪耳中垢傅之牛耳中垢亦可用治蝮蛇毒方令婦人騎度三過又令坐上一方令婦人尿瘡上又方用生麻楮葉合擣以水絞去滓漬之又方用生薑𫝊之乾復易一方以射罔塗腫上血出即愈又方用鷄屎二七枚燒作灰投酒中服之一方用鷄糞白燒灰酒調又方用麫圍上令童男尿著中燒鐵令赤投中冷復燒著之二三度瘥又方用𢷬紫莧取汁飲一升以滓封瘡上以少水灌之又𢷬冬𤓰根以傅之又方用梳中垢如指大長一寸尿和傅之又方用銅青傅瘡上又方用炙梳汗出熨之治蛇傷方用酒研水邉烏桕根喫即活治蛇骨刺人毒痛方用鐡精如大豆許内管中吹内瘡中良亦用鐡粉又方用燒死䑕為末𫝊之治蛇傷用續隨子半生半炒為末酒下三月九箇四月十二箇五月十五箇三服隨月加减治毒蛇尿草木着人似刺劄便腫痛肉爛若手脚着之指節墮脱方用研砒霜和膠漬塗之治蛇毒用秦龜肉可生𢷬罯傅之治蛇傷用蚯蚓乾者熬末用之主蛇中人用刮蠳龜尾以𫝊之便愈枹朴子云蠳龜噉蛇南人皆帯蠳龜尾以辟蛇也治毒蛇囓方用菰蒋草根灰取以封之其草似燕尾者是大効治蛇咬瘡用煖酒洗瘡一日三易辟衆蛇方雄黄生薑乾薑各等分右麄杵以絳囊盛男左女右臂繋之蛇則迸走若被蛇傷即用貼之立瘥又方以雄黄帯之入山林即不畏蛇治蝮蛇瘡用石龍籐絞取汁洗并服其汁亦去蛇毒心悶刀斧諸瘡封之即瘥治蛇咬毒入腹者用取兩刀於水中相磨飲其汁治蛇虺螫人用獨頭蒜酸草擣絞𫝊所傷處治蛇咬瘡用蒜去皮一升𢷬以小便一升煮三四沸通手即入漬損處從早至暮初被咬未腫速嚼蒜封之六七易治毒蛇螫人用𢷬地榆根絞取汁飲兼以漬瘡治蛇咬用堇汁生杵傅之毒即出矣治一切惡蛇所咬命欲臨死方但一切惡蛇所傷先用繩索迎頭繫定不要令毒入臓腑即傷人性命也雄黄一兩碎研麝香半兩右揉取龍腦薄荷自然濃汁一盞入雄黄麝香末在内先用藥汁洗咬處次用雞羽揇藥從瘨腫處掃下入咬處瘡口中只管不住手掃令出盡惡色血所傷之處即不壊爛也候黒血出盡仍用薄荷大藍滓裹定一日一換之治蛇咬毒入腹用水萍搗絞汁飲妙又方用頭醋煑青竹筒合於螫處須㬰黄水沫出即瘥治蛇咬用取胡𤓰傅之數易良又方用五兒齒燒灰傅之治蛇傷毒氣入腹悶絶不知人事用北細辛為末或急用細嚼亦可酒調下以滓傅瘡上尋四畔有紅線路用滓傅趕毒氣出須㬰見瘡上如火㷔起乃毒氣出也治蛇傷方用蒲公英科根作泥貼蛇傷處白麫膏藥封之白芷散治蛇傷用香白芷為末水調下頃刻咬傷處出黄水盡用末水調塗𫝊瘡處如不暇研嚼細傅之亦可治惡蛇所傷用好醋浸鴨觜膽礬末少許塗傷處藥到即愈又方用野藍葉取汁滴傷處又以酒和汁相浸飲一杯妙治蛇咬人用苦蕒搗爛𫝊之治毒蛇氣入腹用麥門冬研細沸湯調下又以仙人掌研汁灌之治白花蛇骨刺腫痛方亦治蛇咬用生逺志𢷬碎酒煎服以滓罨之如無生者乾者亦得治蛇咬用辣母籐五葉者鹽嚼傅之以治蜈蚣螫如神又方出百一選方用生龍腦傅之治蛇傷蝮蛇螫方出百一選方急取蝦䗫爛搗罨痛處極妙仍將絹片輕輕包定藥又以頭垢𫝊傷處妙一方蝦䗫肝塗之一方治蛇螫人牙折入肉中痛不可堪塗之立出一方生蝦䗫一枚爛杵碎𫝊之治蛇毒出聖恵方用黄荆葉袋盛縛瘡腫上一方爛搗帛褁傅腫處又方用閉口椒并葉搗𫝊之止治毒蛇咬用杏仁去皮尖三箇定粉少許合貼傷上治蛇咬出十便良方用取獨頭蒜刀切安在瘡口上艾燒七次去毒治蝮螫人出十便良方急掘地作坎以埋所螫處堅築其上毒則出土中須㬰痛緩乃出徐徐以藥療之治蛇傷蝮螫出肘後方急取娛蚣搗為泥罨在傷痛處極妙仍將絹片輕輕拴定藥又以頭垢傷處𫝊之一方燒蜈蚣末傅瘡上治青蝰蛇螫出千金方用雄黄末傅瘡上沸汁出即愈亦用銅青傅瘡中治蛇咬用燒桑刀塗麝香少許和刀上以烙囓處令皮破即瘥又方用生蚕蛾隂乾為末傅囓處孔中數易之其蛾有生子者妙治蛇螫出聖恵方用狼牙草六月已前用葉已後用根生㕮咀以槲葉褁煻火炮令熱布褁熨冷即易之又方用醋草熟搗以傅螫處仍將膩幞頭褁之數易其醋草似初生短嫩苜蓿苗是治蛇囓人用猪屎熬令焦末藍一把水三升煑取二升投屎攪和以洗之瘥治蛇毒出聖恵方用獨狼牙搗臘月猪脂和以傅毒立瘥又楊炎南行方云六月以前用葉以後用根生㕮咀以槲葉褁之煻火炮令熱用熨瘡上冷即止治青蝰蛇用破烏鷄熱傅之治蝮螫人出肘後方用嚼鹽唾瘡上訖灸三壯復嚼鹽唾上又方出肘後方用蠟及蜜等分於鐺中消令和以無節竹筒著瘡上以蠟蜜灌竹筒令下入瘡中瘥無蜜唯蠟用之亦得又方出肘後方用急尿瘡中乃㧞刀向日閉氣三歩以刀掘地作小坑以熱湯沃坎中取泥作三丸如梧桐子服之取少泥塗瘡上治虺蛇毒用搗葵根𫝊之一方取葵汁服之又方用頭垢傅瘡中又方用搗葎草以傅之立愈治衆蛇螫用常思葉搗取汁飲一升以滓傅瘡上又以鬼目葉傅之止其痛又方出肘後方用搗鬼針草傅上又方出肘後方治蛇螫人瘡已合而餘毒在内或滛滛痛痒用搗大蒜塗之以少塩豉合搗尤佳備急治蛇虺螫人搗蒜絞之飲其汁以滓𫝊瘡上又方用繩縛瘡上一寸許即毒氣不得走便令人以口嗍所螫處取毒數唾去之毒盡即不復痛口嗍小痛無苦狀治蛇咬方五月五日前七日即齋不得食飲酒肉五辛仍先向桑下覔莬葵先知處記之至五月五日中時先以手摸桑木隂一遍仍著上摸索之訖即以口囓取莬葵嚼使熟以唾塗手熟揩令遍五月七日潔齋如後七日内亦不得洗手後有蛇蝎螫者以手摩之即瘥止治土蛙蛇諸蛇傷用婆婆針或葉細擂井水和服滓𫝊甚者不過二三服治諸毒蛇出千金方用塩四兩水一斗煑十沸沸定以湯浸冷易之治蛇咬欲死方出海上名方用蒼耳心爛嚼傅之立効治蛇螫疼痛宜服此方出聖恵方用白礬一兩甘草一两生用為散如蛇螫著之時心頭熱躁眼前昬黒用新汲水服三錢即止如有些小腫氣用白礬鹽漿水萵苣根煎三五沸淋之即除如大叚蛇螫著未及修事藥物用耳塞少許入在螫著瘡口内以釅醋滴在瘡上即止治蛇螫人瘡已合而餘毒在内或滛滛痛痒方出聖恵方用取甲煎塗之神驗蝎螫同用治蛇咬蝎螫出十便良方用燒刀子頭令赤以白礬置上候成汁便熱滴於螫處立愈此極神騐得活者數十人貞元三十二年有兩僧流向鄧州俱為蛇囓令用此法救之傅藥了便愈更無他苦又方出聖惠方治蛇咬毒用苦葫蘆根爛搗𫝊瘡口上立瘥治遭惡蛇所螫出聖恵方用蛇皮貼於傷上灸之引去其毒氣即止一方煎洗三兩度治辟蛇法出肘後方肘後姚氏仙人入山草法辟蛇之藥雖多唯以武都雄黄為上帶一塊秤重五兩於肘間則諸蛇毒物莫之敢犯他人中者便摩以療之帯五蛄黄丸良力丸有蜈蚣故也人入山伐木有大赤足蜈蚣置管中繫腰又有􅀢龜噉蛇帯其尾亦好帶其㖨彌佳禁法中亦有單行輕易者今䟽其數條然皆須受而後行不爾到山路口住立存五蛇一頭乃閉氣以物屈刺之因左廻兩歩思作蜈蚣數千以依身便行無所畏也治蛇螫人瘡已合而餘毒在内滛滛痛痒方出聖恵方用逺志嚼爛以𫝊之并内一片子於螫瘡孔中數數易之又方出聖惠方用鷄子打破頭作孔合著螫處逡巡鷄子黒又換以可為度立効散出朱氏集驗方治蛇傷垂死者鐡蛟龍一名水藕一名金蓮花取根二兩剉片焙乾知母貝母各一兩雄黄半兩天雄一箇生用紫荷車三両大川烏一箇真北細辛右細末用生地黄酒調服即愈如鼻口血來生酒地黄加雄黄丸下如傷風隨脉證用發散藥並服之見瘡口腫不消用針腫處候毒氣出即安如有孕婦人則除天雄少用川烏忌食葷物蕭南仲方屢効治蛇毒取夾蛇龜肉搗置傅傷處亦刮蠳龜尾以傅之其瘡便愈小黒中心拆者無用不可食肉可生搗罯傅治蛇咬瘡以蓼蕎搗傅瘡上預防蛇毒以桂栝蔞為末内着竹管宻塞之帯行中毒即傅之緩乃不救治蛇毒以蚤休根醋摩傅之中虺蛇毒取茺蔚莖汁𫝊之良治蛇毒以野猪齒燒作灰服治蛇咬以梫木葉搗細封之治蛇虫咬用生芋葉和塩研細傅之治蛇䖝咬瘡以感藤葉生研傅瘡上感藤一名甘藤又名甜藤生江南山谷如鷄卯大斫藤斷吹氣出一頭甘汁甘羙如蜜治蛇犬等毒以青黛摩𫝊之治蛇虺螫人以射罔塗螫處頻易治蛇咬以樳木皮葉煑湯洗亦可作屑傅之治蛇含草毒以知時子急服觧之治人被蛇嚙以蜘蛛汁塗之療一切蛇䖝蚕咬以預知子搗𫝊傷上治蛇咬用猪槽中水以浸瘡有効驗治蛇咬方取黒豆葉剉杵傅之日三易良抱朴内篇云相國張公文蔚莊在東都栢坡莊内有䑕狼穴飬四子為蛇所吞䑕狼雄雌情切乃於宂外坋土恰容蛇頭俟其出宂果入所坋處出頭度其回轉不及當腰咬斷而劈蛇腹啣出四子尚有氣置於宂外啣豆葉嚼而傅之皆活治蛇咬毒以雄黄少許末傅之登時愈蛇雖多種唯蝮蛇及青金蛇中人為至急不治一日即死人不曉治之方術者為二蛇所中即以刀急割瘡内投地其肉即如火灸須㬰盡燋而人得活也此蛇七月八月毒盛之時不得囓人其毒不泄乃以牙刺大竹木亦皆焦枯治蛇咬以射罔塗肉四畔漸近瘡習習逐病至骨瘡若有熟膿及黄水出者塗之若無膿水有生血及新傷肉破即不可塗立殺人治蛇咬用苦苣根葉研碎傅傷處苦苣即萵苣也治蛇䖝咬傷瘡痛以烏蘝苺根搗傅并飲其汁良治蛇咬毒悶欲死續隨子七顆味辛温有毒去皮重䑓六分味苦微寒有毒出滁州葉似鬼臼者即是右二味搗篩為末酒服方寸匕兼唾和少許傅咬處立瘥治蛇虫傷搗蒜貼之熟醋浸之經年者良治蛇犬咬毒取黄蘗根研塗之一方研汁服亦得治蛇毒用水蓼葉冷搗傅之若毒入内心悶絞汁服治蛇犬咬以韭搗傅之治蛇咬用荏子葉搗傅之治蛇虎毒諸瘡以莵葵搗汁飲之及塗瘡能觧毒止痛治蛇咬以蚯蚓屎并鹽研傅之治蛇犬等咬以熱尿淋患處治蛇咬犬毒用海根以酒及水磨服𫝊之亦佳療蝮蛇瘡用絡石絞取汁洗之服汁亦去蛇毒心悶治蛇蝎所咬用鈆炙熨之治蛇咬以馬蘭生搗汁服之治蛇咬以苦杖葉搗傅處治蛇毒用獨行根水摩為泥封之日三四立瘥治蛇咬毒食茱茰子一兩為末冷水調分為三服立瘥主蛇虺及虫等螫以蛇芮草取根葉搗傅咬處當下黄水主蛇咬以萬一藤杵篩以水和如泥傅上治青蛙蛇毒急灸瘡中三五壯則毒不行又用雄黄乾薑末射罔和之𫝊瘡治毒蛇所傷五靈脂一兩雄黄半兩同為末以酒調藥二錢灌之昔有人被毒蛇所傷良久之間人已昏困有老僧以酒調藥二錢灌之遂甦即以藥滓塗咬處良乆復灌二錢其苦皆去問之乃此方耳治蛇䖝食飲中得之咽中如有物格不下吐不出心悶煩亂可服馬兠鈴即出又服麝香一錢匕即吐䖝毒治諸毒所傷用青黛雄黄等分同研為末新汲水調下二錢匕治蛇犬虎狼毒惡虫等嚙右以鐡漿凉服之觧毒不入腹内也治蛇虺螫人用茭草根燒灰封之本草云茭草菰根也治蛇虺虫螫右以紫珠煮汁服之治蛇虫咬及毒箭用薺苨根味甘寒搗末以酒服之治蛇傷右用五靈脂為末酒調二錢服仍以少末摻瘡口妙又方右用雄黄為末以猪血調傅治中蛇毒以細辛雄黄等分為末内瘡口三四易之蝎螫附論凡蠍螫人有雌雄之辨雄者痛止一處雌者流散無定世傳禁祝之法雖衆然湯熨塗𫝊之劑亦不可廢也凡蠍五月六月毒最盛時云有八節九節者毒氣彌甚螫人毒勢流行牽引四肢皆痛過一周時方始定也方吹鼻散治蠍螫藜蘆去蘆頭丁香蜀葵花蘂猪牙皂夾酥炙去皮蓽撥各半兩右搗為末每用一字螫左邉吹右鼻螫右邉吹左鼻中一方用麝香蠍螫藥治蠍螫白礬生川烏半夏生乾薑生丹各等分右為細末釅醋調塗螫處効雄黄消毒膏治蠍螫不可忍雄黄信各半兩巴豆三錢白礬生一兩右為細末黄蠟半兩鎔開入藥末銚内攪勻為定子如棗大用時將定子簽於燈熖上炙開滴於螫着處其痛立止雄黄蠟丸治蠍螫不以男女疼痛不可忍者煑酒蠟半兩木鱉子三箇去殻巴豆二七枚去皮雄黄末一錢右件除蠟外研勻化蠟為丸如彈子大用時以火炙磨痛處五月五日或四殺日合之忌見鷄犬婦人蓽撥散治蠍螫卒疼藥未及者蓽撥膩粉蕤人木鱉子各等分右取五月五日午時面南擣為細末修合之時不可令婦人孝子見螫著右邉以少許㸃左眼螫著左邉㸃右眼馬齒塗𫝊方治蠍螫馬齒莧生切大蒜生切二味各半兩共細研乾薑一分不炮為末右一處和勻塗螫處止痛出毒散治蠍螫石榴花艾葉心蜀葵花各等分右搗為末水和塗之五月五日午時取陰乾佳虎骨散治蠍螫卒痛虎頭骨炙板藍子蓽撥各一分右於五月五日午時擣為細末用燈心㸃藥少許於眼大㫮男左女右㸃之神効如卒暴用不必重五日合硇砂散治蠍螫方右取齒中殘飯傅之又猪脂封之又射罔封之硇砂和水塗上愈蜀葵花散治蠍子咬雄黄二錢李子人一錢蜀葵花葉五月五日午時採葉半錢右為末用針於蝎傷疼處撥用藥擦之一上散治蠍螫痛半夏一字生用為細末雄黄一字另研巴豆一箇去皮研如泥右同和匀傅上膩粉散治蠍螫膩粉一錢香墨少許蓽撥少許右擣為散毎用半麥許㸃大眥角男左女右其痛立止五糓方治蠍毒右以五糓燒作灰熱塗之和松脂雄黄燒灰更良作法如甲煎為之熨痛丸治蠍螫雄黄研礬石熬令汁枯各半兩右再同研消蠟和乘熱丸如彈子大以蠟紙收藏遇螫將藥火上炙令熱熨痛處冷又炙熨數次此藥不限年嵗常收用之礬夏散治蠍螫痛不可忍右用白礬半夏等分為末釅醋調貼痛止毒出鈆丹塗傅方出肘後方治蠍螫疼痛不定右用鈆丹半兩細研以醋調塗螫處治蠍螫卒痛藥未及者水洗方出千金方右以新汲冷水若著手足以冷水漬之水微暖則易之著餘處者冷水浸故布搨之小暖則易治蠍螫方出千金方凡蠍有雌雄雄者痛止在一處雌者痛牽諸處若是雄者用井底泥塗之温則易雌者用當瓦屋溝下泥傅之若值無雨可用新汲水從屋上淋下取泥治蠍毒及壁鏡毒人出仁存方右溶化白礬乘熱滴傷處痛止毒出治蠍螫方出千金方用取生烏頭為末唾和傅之一方以頭醋調傅之一方嚼乾薑塗之治蠍螫用研蜘蛛汁𫝊之瘥治蠍螫人痛不止出仁存方用猫兒屎塗傷處日三復易治蠍螫人取半夏用水研塗之立止治蠍毒麻蕡葉搗傅之効麻蕡今人績布者是也治蠍螫人痛不止方用楮樹白汁塗之立瘥治蠍螫出朱氏集驗方用礬石一兩醋半升煎之投礬末於醋中浸螫處井底泥傅治蠍螫出肘後方用醋摩附子傅之治蠍螫出聖恵方用蜀葵花心陰乾為細末唾津調貼一方絞龍葵汁塗之治蠍螫出海上名方以地磨生薑塗之又方出海上名方用南星末醋調擦之治蠍螫出聖恵方用猪脂擦之又以冷水浸之自効治蠍螫人用畫地作十字取上土水服五分匕又方用嚼茱茰以封之立愈又方出聖恵方用深削桂心醋磨塗之立定又方用挼馬莧菜封之瘥又方出十便良方用搗蒜塗之療蠍螫人用温酒以漬之又搗豉作餅如錢大貼螫處以艾灸七壯療蠍螫人用苦李子仁嚼以封之即瘥又方用挼蛇啣取汁以傅之瘥又方用木椀率取此螫處即以木椀合之便瘥又方出肘後方用挼鬼針草取汁傅之即瘥治蠍毒螫人右於五月五日取椿樹上膠捻作塊子以椿葉裹藏淨噐中螫時即取膠就火上微烘於患處熱按之二三次愈又方出聖恵方用射菵草搗封之温酒漬之又射菵汁塗之治蠍螫不以男女疼痛不可忍者出旅舍方用葱白切一片厚二分許置所螫處以艾灸三壯又方出聖恵方用温醋漬所痛處數易之愈須預為温下醋湯方不爾離醋極痛治蠍螫傷詩曰曽聞蠍螫徹心田休候鷄兒呌曉天耳塞調來疼處抹毒除痛定却安然治蠍螫出徳生堂方用酸醋先滴在疼痛處即以膽礬末擦之又方出德生堂方用知母嚼爛吐疼處又方出徳生堂方患者自把口咂或他人咂之徐吐去毒不疼為度治蠍螫出徳生堂方即以前神仙奪命丹一丸磨水塗之立住疼三上無不驗奪命丹方見咽喉門喉痺煩治蠍螫人用石榴花葉及皮爛搗炒令熱封疼上冷即換之又方出聖惠方用黑角梳掌熱炙熨之又方出聖惠方五月五日取蝸牛殻黄色者三七枚為末要用時以醋調塗之甚効又方四月八日五更時取蒼耳陰乾搗為末每用以醋調傅之又方用驢耳垢傅之又方用滴蠟燭熱脂於螫處三兩度易之治蠍螫著手足方用雄黄末少許醋調塗之治蠍螫人用人參嚼以傅痛處立瘥又黄丹塗之瘥又方用温湯浸之良又方用硇砂以水研塗之立愈治蠍螫急作小艾炷於螫處灸煖小便洗烏白散治蠍螫不可忍烏魚骨一兩白礬二錢右同碾極細末每用不拘多少在左壁者左鼻孔内㗜之如在右者右鼻㗜之治蠍螫萵苣子入鹽同嚼貼痛處少時其痛便止治蠍毒以槐枝炮熨之治桑蠍咬人用丁香末蜜調塗之治蠍螫人嚼乾薑塗之治蠍螫以火槽頭横井上立愈治蠍咬以烏頭末少許投醋調傅之治蠍毒以麻葉搗𫝊之良治蠍角法甄立言此蠍毒陰蛇即非蜂蜈蚣之輩自有小小可忍者有經一日一夜不可忍者京師偏饒此蟲遍用諸藥塗傅不能應有竒効以意用竹依作小角留一節長三四寸孔徑四五分若指上可取細竹作之纔令搭得螫處指用大角角之氣漏不嗍胡角不厭大大即嗍急瘥速作四五枝鐺内熱煑取以角螫處冷即換初被螫先以針刺螫處出血然後角之熱畏傷肉以冷水暫浸角口二三分以角之此神驗不可以口嗍毒入腹殺人軌公云灸即瘥以熱角嗍之猶火炙也普濟方卷三百七
