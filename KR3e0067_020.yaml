body:
  text: 普濟方卷二十明周王朱橚撰脾臟門總論夫脾主意脾臟者意之舍意者存意之志也為諫議大夫並四藏之所受心有所意謂之意意之所存謂之志因志而存變謂之思因思而逺慕謂之慮因慮而處物謂之智意者脾之藏也口唇者脾之官脾氣通於口利則能變五穀味矣故云口為戊舌唇為已循還中宫上出頥頰次候於唇下回脾中榮華於舌外主肉內主味脾重二斤三兩扁廣三寸長五寸有散膏半斤主裹血溫五臟神明脾脾主臟營秩祿號為意藏隨節應故曰脾臟營營含意在氣為噫在液為涎脾氣虛則四肢不和五臟不安實則腹脹溺溲不利脾氣虛則夢食飲不足得其時則夢築垣蓋屋脾氣盛則夢歌樂體重手足不舉厥氣客于脾則夢丘陵大澤壞物風雨凡脾臟象土與胃合為腑其脛足太隂與陽明為表其脈緩相于夏王於季夏脾者土也敦而福敦者厚也萬象衆色不同故名曰得福者廣萬物緣根住莖其葉在巔凡蜎蜚蠕動蚑蠷喘息皆蒙土恩德則為緩思則為遲故令太隂緩而遲尺寸不同酸醎苦辛大繆而生五行其時而以各行皆不羣行盡可常服土寒則溫土熱則涼土有一子名之曰金懷挾抱之不離其身金乃畏火恐熱來薰遂棄其母逃於水中為金子而藏火神閉門塞戶內外不通此謂冬時土失其子其氣襄微水為洋溢浸漬其地走繫皮膚面目浮腫歸于四肢愚醫見水真往下之氣虛脾空胃遂居之肺為喘浮肝反畏肺故下沉沒下有荆棘恐傷其身避在一邉以為水流心襄則伏肝微則沈故令脈伏而沈上醫逺占因轉孔穴利其溲便遂通水道甘液下流停其隂陽喘息則微汗出正流肝著其根心氣因起陽行四肢肺氣亭亭喘息則安腎為安聲其味為醎倚生母敗汚臭如星土得其子即成為山金得其母名曰丘矣四時之序逆順之變異也然脾脈獨何主脾脈者土也孤藏以灌四傍者也其善者不可得見惡者何如其來如水之流者此謂太過病在外如鳥之啄者此謂不及病在中太過則令人四肢沈重不舉不及則令人九竅壅塞不通名曰重強脾脈來而和柔相離如雞踐地曰平長夏以胃為本脾脈來實而盈數如雞舉足曰脾病脾脈來堅鋭如雞之啄如鳥之距如屋之漏如水之流曰脾死真脾脈至弱而乍踈乍散色黃青不澤毛折乃死長夏胃微濡弱曰平弱多胃少曰脾病但代無胃曰死濡弱有石者冬病石甚曰今病脾臟營營舍意愁憂不解則傷意意傷則悶亂四肢不舉毛瘁色天死于春足太隂氣絶則脈不營其口脣者肌肉之本也脈弗營則肌肉濡肌肉濡則人中滿而唇反唇反者肉先死甲篤乙死木勝土也脾死藏浮之人緩按之中如覆杯潔潔狀如搖者死六月季夏建未也坤未之間土之位脾王之時其脈太阿阿而緩曰平反得浮大而洪者是心之乘脾母之歸子為虛邪雖病易治反得微澀而短者是肺之乘母為實邪雖病自愈反得弦而長者是肝之乘脾木之尅土為賊邪大逆十死不治反得沈濡而滑者是腎之乘脾水之陵土為微邪雖病即瘥右手關上隂絶者無脾脈也若少氣下利腹滿身重四肢不舉善嘔刺足陽明治陽右手關上隂實者脾實也若腹中伏伏如堅狀大便難刺足太隂治隂脾脈長長而弱來踈去緩再至曰平三至曰離經病四至曰脫精五至死六至命盡足太隂脈也脾脈急甚為瘛瘲微急為膈中滿飲食入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心惠然若無疾大甚為繫仆微大為脾疝氣裹大膿血在腸胃之外小甚為寒熱微小為消疸滑甚為癲癃微滑為蟲毒蚖腸鳴熱澀甚腸癲微澀為內漬多下膿血脾脈摶堅而長其色黃當病少氣其耎而散色不澤者當病足骭腫若水伏黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風扁鵲曰脾有病則色痿黃實則舌本強直虗則多癖善吞注利其實若陽氣壯則夢飲食之類脾在聲為歌在變動為噫在上心為思思傷脾精氣并干脾則飢應在長夏病變於音者取之經恐懼而不解則傷精精傷則骨痠痿厥精時自下則病精是故五臟主藏精者也不可傷傷則守失而隂虛至無氣則死病先發于脾閉塞不通身痛體重一日之胃而腹脹二日之腎少腹腰脊痛脛痠三日膀胱背膂筋痛小便閉十日不已死冬人定夏晏食病在脾日昳惠平旦甚日中時下晡靜素問作日出甚今云日中時者繆也假令脾病東行若食雉兔肉及諸木果實得之不者當以春時發得病于甲乙日也口丸脾病之狀必身重善飢足痿不收素問作善肌肉痿足不收甲乙作苦飢飢內作痿足不收行善瘈腳下痛虛則腹滿腸鳴飱泄食不化取其經足太隂陽明少隂血者脾脈沈之而濡浮之而虗若腹脹煩滿胃中有熱不嗜食食而不化大便難四肢若痺時不仁得之房內日使不來來而頻併脾病其色黃飲食不消腹若脹滿體重莭痛大便不利其脈微緩而長此為可治冝服平胃丸瀉脾丸茱茰丸附子湯春當刺隱白冬刺隂陵泉皆㵼之夏刺大都季夏刺公孫秋刺商丘皆補之又當灸張門五十壯背苐十一椎百壯邪在脾胃肌肉痛陽氣有餘隂氣不足則熱中善飢陽氣不足則有寒有熱皆調其三里有所擊仆若醉飽入房汗出當風則傷脾脾傷則中氣隂陽離别不從故隂以三分後死生脾中風者翕翕發熱形如醉人腹中煩重皮肉潤而短氣也脾水者其人腹大四肢苦重津液不生但苦少氣小便難脾脹者善噦四肢急體重不能衣跌陽脈浮而澀浮則胃氣強澀則小便數浮澀作相摶大便則堅不能更衣汗出不止名曰脾氣弱或五液注下青黃赤白黑寸口脈弦而滑弦則為痛滑則為實即為急實即為踊痛踊相摶即胸脅搶急跌陽脈浮而澀浮即胃氣微澀即脾氣襄微襄相搏即呼吸不得為脾家失度寸口脈雙緊即為入其氣不出無表有裏心下痞堅跌陽脈微而澀微即無胃氣澀則傷脾寒在于膈而反下之寒積不消胃微脾傷榖氣不行食已自噫寒在胸鬲上虛下實榖氣不通為祕塞之病寸口脈緩而遲緩則為陽衛氣長遲則為隂營氣促營衛俱和剛柔相得三焦相得承其氣必強跌陽脈滑而緊滑即胃氣實緊則脾氣傷得食而不消者此脾不治也能食而腹不滿此為胃氣有餘腹滿而不能食心下如飢此胃氣不行心氣虛也得食而滿者此為脾家不治病人鼻下平者胃病也微赤者病發癰微黑者有熱青者有寒白者不治唇黑者胃先病微燥而渴者可治不渴者不可治臍反出者此為脾先落凡人病脈已解而反致微煩者人見病者差安而強與穀脾胃氣尚弱不能消穀故令微煩損穀則愈診得脾積脈浮大而長飢見䐜起與榖爭減心下纍纍如桃李起見於外腹滿嘔泄腸鳴四肢重足脛腫厥不能臥是主肌肉損色黃也脾病其色黃體青失溲直視唇反張爪甲青飲食吐逆體重莭痛四肢不舉其脈當浮大而緩今反弦急其色當黃而反青色者此是木之尅土為大逆十死不治宫音人者主脾聲也脾聲歌其音鼓其志愁其經足太隂厥逆陽明則榮衛不通隂陽翻祚陽氣內繫隂氣外傷則寒寒則虛虛則舉體消瘦語音沈澀如破鼓之聲舌強不轉而好咽唾口禁唇黑四肢不舉身重如山便利無度甚者不可治依源麻黃湯主之又言聲憂懼舌本卷縮此是木尅土陽繫隂隂氣伏陽氣起起則實實則熱熱則悶亂體重不能轉側則語聲拖聲氣深不轉而急此為邪熱傷脾甚則不可治若唇雖萎黃語音若轉可治黃為脾脾合肉黃如鱔腹者吉脾主口唇脣是脾之餘其人土形相比於上宫黃色大頭圓面美肩背大腹好腹胻小手足多肉上下相稱行安地舉足心平好利人不喜權勢喜附人耐秋冬不耐春夏春夏感而生病主足太隂敦敦然脾應日月有虧盈脾小大隨人脣大小上脣厚下脣薄無腭齗脣缺此人脾不正揭聳脣者則脾髙髙則實實則熱熱則季脅痛滿唇垂而大不堅者則脾下下則虛虛則危危則寒而身重不能行步唇堅者則脾堅堅則臟安安則不病脣上下好者則脾端正端正則脾胃和利人無病唇偏舉者則脾偏痛好脹凡人分部中陷必有病主胃陽明為脾之部而藏氣通于內外部亦應而隨之沈濁於內浮清於外若表病外入所部則起起則前一㵼陽後補隂若裏病內出所部則陷陷則前治隂後治陽陽則實熱隂則虛寒寒主外熱主內凡人死生休否則藏神前變形於外人脾前病唇則焦枯無潤若脾前死脣則乾青白漸縮急齒噤不開若夫中等分墓色應之必死不治看色厚薄決判賖促賖則不盈四百日內促則旬朔之間脾病必愈而卒死何以治之曰青黑如拇指厭黑點見顔頰上此必卒死脾絶十二日死何以治之曰冷足腫腹熱臚脹泄利不覺其出時面青目黃者五日死病人著牀心痛氣短脾竭內傷百日復愈欲起倣徨因坐於地其亡倚牀能治此者可謂良又面黃目赤不死黃如枳實死吉凶之色在於分部霏霏而見黑黃入唇必死不出其年其穴在鼻上當兩根是其分部位也若年上不應三年之內禍必應也季夏土脾脈色黃主足太隂脈也其脈本在中封前上四寸之中應在背輪與舌本中封在內踝前一寸大筋裏宛中脈本從中封上四寸是也其脈根于隱白在足大指端內側是也四季之月各餘十八日此為四季之餘日主脾胃黃肉隨病也其源從太隂陽明相格節氣相移三焦寒溫不調四時關格而起則臟腑傷疴隨時受癘陽氣外泄隂氣內伏其病相反若腑虛則隂邪所以頭重頸直皮肉強痺若臟實則陽疫所傷藴而結核起於喉頸之側布毒熱於皮膚分肉之中上散入髮際下胃顳顬隱隱而熱不相斷離故曰黃肉隨病也又云灸肝脾二輪主治丹毒四時隨病當依源補㵼虛實之疴皮肉隨熱則須鎌破薄貼方灸足治疾病無逃矣脾實熱夫脾實則生熱熱則陽氣勝而心胸煩悶唇口乾焦身熱頰疼體重不能轉側足寒頸熱聲沈而心急咽喉痛不利舌本腫強口內生瘡言語謇難涇溲不利腹脅脹滿不得安臥夢見歌樂四肢怠惰診其脈緊實者是脾實之候方治脾熱面黃目赤季脅痛滿出千金方半夏母薑各八兩枳實梔子茯苓芒硝各三兩細辛五兩白术杏仁各四兩生地黃淡竹葉各切一升右㕮咀水九升煮三升去滓下芒硝分三服治脾熱偏一邉痛胸滿脅偏脹出千金方茯苓橘皮澤瀉各三兩芍藥白术各四兩人參桂心各二兩石膏八兩半夏六兩生薑切一升桑白皮根一升右㕮咀以水一斗二升煮三升去滓分三服若須利下加芒硝二兩佳清脾湯出醫方大成治脾實熱病足寒頸腹脹滿煩擾不得臥舌本強體重面黃頭痛右脅滿痛偏脹口苦咽乾唇裂寒熱如瘧茯苓橘皮草果去皮白术各二錢半夏三錢湯洗七次人參桂心白芷甘草炙川芎各二錢右銼散每四錢用水二盞薑七片紫蘇三葉同煎七分去滓服欲通利加大黃略煎清脾湯治憂思過度藴熱於脾口乾唇燥瀋裂無色用香白芷黃耆升麻人參甘草炙半夏洗七次右各等分散每四錢水一盞半薑五片棗二枚小麥三十粒煎七分去滓不拘時服瀉熱湯出千金方治舌本強直或夢歌樂而體重不能行前胡茯苓龍膽草細辛芒硝各三兩杏仁四兩玄參大青各二兩苦竹葉切一升右㕮咀水九升煮三升分三服食後服大黃湯出聖惠方治脾實胸中滿悶腹脅壅脹身熱頰痛咽喉不利大黃銼炒一兩赤茯苓去黑皮三分枳殼去穰麩炒半兩甘草炙銼黃芩去黑心各一兩麥門冬去心一兩半夏洗去滑焙前胡去蘆頸各半兩右粗搗篩每服三錢鹽水一盞生薑一片大棗一枚煎七分不拘時溫服瀉脾赤茯苓湯出聖惠方治脾實熱頭痛胸滿腹脅壅滯不思飲食赤茯苓去皮三分旋覆花半兩大黃微炒石膏碎各一兩桑白皮三分芍藥赤者半兩枳殼去穰麩炒三兩前胡去蘆甘草炙各半兩右粗搗篩