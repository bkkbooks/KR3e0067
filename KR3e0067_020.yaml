子一兩炮裂去皮臍乾薑三分炮裂銼甘草半兩炙微赤銼當歸三分銼微炒厚朴一兩去粗皮塗生薑汁炙令香熟吳茱茰半兩湯浸七遍焙乾微炒右為散每服三錢水一中盞入棗三枚煎六分去滓不計時服訶梨勒丸治脾臟積冷氣攻心腹疼痛不能飲食四肢無力訶梨勒二兩煨用皮人參一兩去蘆桂心半兩乾薑半兩炮裂銼白茯苓一兩木香半兩肉豆蔲三枚去殼胡椒半兩京三稜半兩炮裂附子一兩炮裂去皮臍桔梗一兩去蘆當歸一兩銼微炒檳榔一兩陳橘皮半兩湯浸去白瓤焙厚朴一兩去粗皮塗生薑汁炙令香熟右為散煉蜜和丸梧桐子大每服不計時溫酒下三十丸乳香丸治脾胃冷氣心腹刺痛散滯氣消酒食利胸膈化痰涎和脾胃止冷利乳香研沉香銼沒藥研木香丹砂研枳殼去穰麩炒蓬莪术炮銼烏頭炮裂去皮臍檳榔銼各一兩芫花醋炒令赤狼毒醋炒乾漆炒煙盡各半兩阿魏一分研青橘皮湯浸去分白焙三右為末以碙砂一兩半水飛去砂石楝實肉四兩為末同以好醋熬成膏入前末和勻丸如豌豆大每服十丸或十五丸溫酒或薑湯下沉香丸治脾臟冷氣攻心腹痛不思飲食沉香銼一兩芍藥炒益智仁厚朴去粗皮生薑汁炙銼各三分肉桂去粗皮乾薑炮紅豆蔲去皮白茯苓去黑皮枳殼去瓤麩炒木香當歸切焙檳榔銼附子炮裂去皮臍各半兩甘草銼一分半右為末煉蜜丸梧桐子大每服二十丸炒生薑木瓜鹽湯下不拘時肉豆寇散出聖惠方治脾臟冷氣時攻心腹痛面色青黃常多嘔逆四肢虛肉豆䓻三枚去殼白术半兩木香半兩半夏半兩湯浸七遍去滑丁香半兩青橘皮半兩湯浸去白穰焙蓬莪术半兩附子半兩炮裂去皮臍芎藭半兩當歸三分銼微炒甘草一分炙微赤銼桂心半兩乾薑半兩炮裂銼厚朴一兩去粗皮塗生薑汁炙令香熟右為散每服三錢水一中盞薑半分棗三枚煎六分不計時服阿魏丸出聖惠方治脾臟久積虛冷氣攻心腹脹痛胃氣不和見食即嘔面色萎黃四肢無力阿魏麵裹煨麵熟為度檳榔青橘皮湯浸去白瓤焙胡椒丁香蓽撥白豆冦去皮桂心附子炮裂去皮臍人參去蘆乾薑炮裂銼蓬莪术訶梨勒煨用皮已上各半兩麝香一分細研右為末煉蜜和丸梧桐子大每服二十丸不計時熱酒下戎鹽丸治脾胃寒冷氣攻心腹疼痛痰逆惡心不思飲食寬心胸化留飲戎鹽檳榔青橘皮湯浸去白焙肉桂益智去皮棟實蓬莪术炮各半兩巴豆霜肉豆䓻去殼墨丁香木香胡椒各三錢右為末麵糊丸菉豆大每服二丸食後用生薑湯下更以意加減碙砂煎丸出聖惠方治脾臟冷心腹有積滯氣發歇疼痛胸膈不利兩脅脹滿不能飲食碙砂不夾石者細研半兩阿魏研一分陳麴為木訶梨勒各一兩去核丁香蓽撥附子炮裂去皮臍白芥子蘹香子炒檳榔銼青橘皮湯浸去白焙沉香銼各半兩右自訶梨勒以下同搗為末以好酒一升先煎碙砂次入阿魏同煎五七沸後以綿濾過再熬後下麴末攪令勻慢火熬成膏和諸藥入臼內杵數百下丸如梧桐子大每服十五丸至二十丸食前生薑湯下溫酒亦得一方無沉香丁香散治脾臟冷攻心腹切痛思飲食定嘔治㵼利丁香人參白茯苓去黑皮厚朴去粗皮生薑汁炙京三稜炮裂乾薑炮各半兩吳茱茰湯浸焙乾炒肉豆䓻去殼甘草炙銼各一分蒼术刮去皮三分右搗羅為散每服二錢七空心米飲調下厚朴丸治脾臟冷氣攻心腹多疼痛脅肋虛脹胸膈痞悶痰逆惡心嘔吐水腸泄㵼不思飲食雖食遲化留滯藏腑面色萎黃四肢少力氣出多寒手足逆冷肌體羸瘦厚朴去粗皮生薑汁炙肉豆冦去殼附子炮裂去皮臍各三分髙良薑胡椒桂去粗皮乾薑炮丁香檳榔銼各半兩碙砂通明者研一分巴豆去皮心膜出油取霜一方大棗三十枚烏頭二兩實白者杵碎生薑自然汁慢火同煮令透軟㨂出棗剝去皮核研烏頭不用右除巴豆外搗末合研勻以棗肉膏和劑如硬量加蒸棗肉丸梧桐子大每服五丸至七丸煎陳橘皮木香生薑湯下空心如飲食稍化遲停滯胸膈不計時服附子丸治久病脾臟虛冷飲食不下心腹疼痛面黃浮腫滑泄白利兩脅脹滿附子去皮臍湯浸透切作片子焙一兩木香碙砂洗去砂石熬令熟各半兩右為末以酒一升煮盡焙乾以炊餅末三兩一處和拌滴水丸梧桐子大每服二十丸空心米飲下木香散出聖惠方治脾臟冷氣攻心腹疼痛或吐清水不思飲食木香半兩人參三分去蘆芎藭三分青橘皮一兩湯浸去白瓤焙白木三分肉桂一兩去皴皮附子一兩炮去皮臍當歸三分銼微炒草豆䓻五枚去皮厚朴二兩去粗皮塗生薑汁炙令香熟髙良薑一兩銼吳茱茰半兩湯浸七遍焙乾微炒右為散每服三錢水一中盞煎六分不計時稍熱服紅豆䓻散出聖惠方治脾臟冷氣攻心腹疼痛宿食不消又腹脅脹悶不思飲食紅豆蔲一兩去皮木香半兩當歸三分微炒桂心半兩髙良薑一兩銼芎藭三分訶梨勒半兩煨用皮草豆蔲六枚去皮附子一兩炮裂去皮臍陳橘皮一兩湯浸去白焙白术半兩神麴三分微炒令黃右為散每服三錢水一中盞入棗三枚煎六分不拘時稍熱服蓽撥丸出聖惠方治脾臟久積冷氣攻心腹疼痛面色青黃四肢無力不思飲食蓽撥三分木香半兩桂心半兩白茯苓三分檳榔一兩附子一兩炮裂去皮臍胡椒三分厚朴二兩去粗皮塗生薑汁炙令香熟當歸三分銼微炒乾薑半兩炮裂銼訶梨勒一兩煨用皮人參一兩去蘆頭右為末煉蜜和丸梧桐子大每服不計時粥飲下三十丸丁香丸出王氏漙濟方治脾臟冷氣攻心腹疼痛及女人血氣丁香木香白豆䓻去殼青橘皮湯浸去白焙胡椒蓽撥檳榔麝香别研各一分乳香别研半兩巴豆半兩去皮微炮細研紙裹壓油盡研成霜右將檳榔以上先為末次入餘三味和勻用醋煮麵糊丸黍米大再用砂為衣五丸茶酒任下治元氣用綿灰半錢酒調下十丸心痛煎鹽醋湯下七丸女人血氣當歸酒下五丸此藥大妙服有神效抵聖丸治脾臟冷氣攻心木香半兩丁香二十枚乳香研蒔蘿各一分炒檳榔一枚銼阿魏半分湯化去砂石乾桂去粗皮肉豆䓻去殼蓽撥各半兩巴豆三枚去皮心膜出油盡右為末用粳米飲或飯丸如菉豆大每服三丸至五丸食後生薑鹽湯下如痛服七丸內嚼三丸燒生薑鹽湯下溫酒亦得鹽煎散治脾臟冷氣攻臟腑不調心腹撮痛及下元久冷烏頭水浸三日炮裂去皮臍蘹香子炒附子水浸三日炮裂去皮臍各一兩楝實七枚炮陳橘皮湯浸去白焙二兩乾薑炮一兩木香碙砂去砂石各一錢蓽澄茄半兩右搗為散每服一錢匕水八分鹽煎四分空心和滓溫下參苓散治脾臟氣虛風冷乘之正氣相繫心腹疼痛人參白茯苓去黑皮黑豆黃炒陳橘皮去白薑汁炙各三分京三稜二兩以新水浸冷軟薄切溫杵碎焙乾炒青橘皮去白焙麥蘖炒各一兩木香甘草炙銼各半兩右搗羅為散每服二錢七入生薑鹽少許沸湯點服木香散出聖惠方治脾臟冷氣攻心腹疼痛不可忍木香半兩桃仁三分湯浸去皮尖雙仁麩炒微黃吳茱茰三分湯浸七遍焙乾微炒青橘皮一兩湯浸去白瓤焙檳榔三顆桂心一兩蓬莪术一兩當歸一兩微炒乾薑三分炮裂銼右搗羅為散不計時熱酒調下一錢沉香湯治脾虛不思飲食冷氣攻腹脅四肢少力吐酸水沉香桂去粗皮白豆䓻去皮各一兩青橘皮去白焙一兩半髙良薑檳榔銼吳茱茰湯浸一宿焙乾炒厚朴去粗皮生薑汁炙各二分右粗搗篩每服三錢七水一盞煎六分去滓溫服不拘時鱉甲煎丸治脾臟久積冷氣攻心腹痛脹惡心嘔逆臍下撮痛鱉甲醋炙去裙碙砂不夾石者芫花醋拌炒狼毒碎銼炒乾漆炒煙盡各一兩京三稜炮銼三分巴豆二錢去皮心研細與碙砂用醋一升同熬成膏右除碙砂巴豆外為末巴豆膏同拌勻水煮麵糊丸菉豆大每服一丸食後生薑鹽湯下吳茱茰散出聖惠方治皮臟冷氣攻心腹疼痛不可忍吳茱茰半兩湯浸七遍焙乾微炒髙良薑半兩銼桂心三分厚朴二兩去粗皮塗生薑汁炙令香熟當歸半兩銼微炒木香半兩右為散每服三錢水一中盞煎六分去滓不拘時稍熱服集聖丸治脾胃氣不足風冷乘之與正氣交擊心腹疼痛附子炮裂去皮臍桂去粗皮乾薑炮甘草炙銼各一兩蓽澄茄一分右銼如麻豆每服三錢七水一盞鹽一捻煎七分去滓服吳茱茰丸治脾胃冷氣心腹脹吳茱茰湯浸七遍炒桂去粗皮各一兩陳橘皮湯浸去白焙三分檳榔銼一兩右為末醋煮麵糊丸梧桐子大每服十五丸生薑湯下不拘時煨薑丸出和劑方治本臟虛飲食不化或成癥癖或發心痛冷積水脾結聚疼痛一切冷氣等疾附子碙砂木香生薑各等分右用大附子五十箇各重半兩去皮臍以尖刀剜去心子約容碙砂半錢實之却以附子末麵作餅子裹附子用文武火煨令黃用木香如附子之半同為細末以水為丸如雞頭復以生薑一塊擘作兩片以藥在內溫紙裹煨候令熟白湯嚼空心服吳茱茰湯治脾臟虛冷心腹疼痛用吳茱茰湯浸焙炒三兩每服一分不搗以水二盞入生薑一分切蔥白五寸切同煎八分去滓溫服食前一方用酒煎人參沖和丸出楊氏家藏方治脾經受冷心腹疼痛嘔逆中滿不進飲食兼因傷冷作㵼並皆治之人參去蘆白术大麥蘖炒陳橘皮湯浸去白乾薑炮甘草炙已上各二兩青橘皮湯浸去白神麴先搗細炒香二味各一兩右件為末細煉蜜為丸每一兩作一十九服一丸細嚼濃煎棗湯下食前常服大進飲食消榖散滯每服一丸水一盞煎七分溫服亦得如脾胃虛弱不進飲食大便溏泄不因傷濕者可去青橘皮加肉豆蔲縮砂仁各半兩治中湯出御藥院方治脾胃冷氣胸膈不快腹痛氣不和青皮去白人參去蘆甘草炙白术陳皮去白乾薑炮等分右為末每服三錢水一盞煎七分去滓食前溫服普濟方卷二十
