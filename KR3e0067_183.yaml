聖惠方治上氣腹脹坐臥不得少思飲食前胡去蘆枳殼麩炒微黃色去穰人參去蘆檳榔各一兩陳皮一兩湯浸去白焙紫蘇莖葉一兩甜葶藶隔紙炒紫色甘草炙微赤銼各半兩右為散每服五錢水一大盞生薑半分棗三枚煎至五分去滓溫服日進三四木香散出聖惠方治上氣腹滿煩悶不下飲食木香人參各三分去蘆半夏半兩湯洗七次去滑赤茯苓三分甘草半兩炙赤銼檳榔三分桑根白皮半兩銼陳皮三分湯去白焙桂心半兩枳實半兩麩炒微黃色右為散每服五錢水一大盞生薑半分棗三枚煎至五分去滓溫服日三四服半夏散出聖惠方治上氣腹脹不能下食半夏半兩湯洗七次去滑赤茯苓一兩陳皮三分湯去白焙人參去蘆前胡去蘆各三分紫蘇莖葉一兩木通半兩銼木香半兩白术三分檳榔三分右為散每服五錢水一大盞生薑半分棗三枚去滓溫服不拘時治上氣腹脹滿出聖惠方枳實一兩麩炒黃桂心一兩檳榔一兩右搗羅為末細散每服生薑湯調下二錢日三四服治上氣腹脹滿不下食出聖惠方桑根白皮三兩銼吳茱茰一兩湯浸七次微炒白术二兩右為散每服三錢酒一盞薑半分煎六分去滓溫服頻服之檳榔散出聖惠方治腹內諸氣脹滿檳榔一兩海藻一兩洗去醎味人參一兩去蘆陳皮一兩湯浸去白焙木香半兩芎藭桂心各一兩乾薑半兩炮製銼右為散每服三錢水一盞生薑半分煎至六分去滓每於食前溫服鱉甲散出聖惠方治腹內諸氣脹滿兩脅痛不欲飲食鱉甲一兩醋塗炙黃去裙襴木香半兩陳皮一兩洗去白焙枳實半兩麩炒微黃桂心白术各半兩川大黃一兩銼微炒當歸五分銼微炒右為散每服三錢水一盞生薑半分煎至六分去滓每於食前稍熱服陳橘皮散出聖惠方治腹內諸氣脹腹滿喘促陳皮一兩湯去白焙漢防己半兩赤茯苓檳榔各三分木通銼三分紫蘇莖葉大腹皮銼各一兩木香半兩右為散每服三錢水一盞生薑半分煎至六分去滓溫服不拘時治腹內諸氣脹滿及心胸氣隔不通出聖惠方鹽半斤以麻油二合和之箬片急裹以繩繫之置瓦上燒令通赤冷取出木香一兩訶黎勒二兩煨用皮右為細散每服半錢薑醋湯送下不拘時候大腹皮丸出聖惠方治腹內諸氣脹滿上攻肩背煩悶四肢疼痛不能飲食大腹皮二兩銼桔梗三分去蘆枳殼一兩麩炒微黃去穰白术半兩當歸一兩銼微炒大黃銼碎微炒木香桂心芎藭各半兩右為末煉蜜和搗三二百杵丸如梧子大生薑湯下二十丸不拘時候疏氣丸出聖惠方治腹內諸氣脹滿兩脅妨悶肩背氣壅牽牛子二兩微炒木香桂心各半兩檳榔一兩訶黎勒一兩煨用皮陳皮一兩湯去白焙桑根白皮三分銼郁李仁一兩湯浸去皮微炒右為細末煉蜜和搗百餘杵丸如梧子大每於食前生薑橘皮湯下三十丸以利為度乾漆丸出聖惠方治腹內諸氣脹滿脅下堅硬四肢羸瘦面色痿黃不欲飲食乾漆一兩搗碎炒煙出木香半兩陳橘皮一兩湯去白焙巴豆一分去皮心紙裹壓去油當歸半兩銼微炒乾薑炮製半兩銼右為末入巴豆研令勻煉蜜和搗百餘杵丸如菉豆大每於食前生薑橘皮湯下五丸檳榔丸出聖惠方治一切氣心腹壅脹不能下食檳榔郁李仁湯浸出皮炒各二兩訶黎勒皮生三兩桂心桃仁湯去皮尖雙仁麩炒枳殼麩炒去穰木香各一兩白豆蔲半兩去皮右將桃仁郁李仁同研如膏餘藥為末同研令勻麵糊丸如梧桐子大每服三十丸食前溫酒下治一切氣心腹壅脹不能下食出聖惠方檳榔訶黎勒皮各二兩木香一兩麝香一錢研青橘皮半兩湯去白焙右為末入麝香研勻煉蜜丸如梧子大每服二十丸食前溫酒下青硫丸出聖惠方治一切氣脾腎久冷心腹虛脹臍腹多疼木香硫黃細研肉豆䓻去殼檳榔青皮湯去白焙各一兩右搗羅為末煉蜜丸如梧子大每服空心溫酒下九丸治冷熱氣不和腹中積滯腹脅脹滿不時刺痛大腑不快少思飲食精神不利出護命方人參藿香黃橘皮甘草川芎桔梗牽牛生熟使羌活茯苓草豆䓻大腹皮各一分鱉甲醋炙半兩吳茱茰三銖右件羅為末每服二錢水一盞煎一兩沸空心和滓吃治發氣脹出本草以蕫竹笋蒸煮炒任食上氣不得睡臥附論夫腑臟之氣皆上注於肺肺乃氣所注也若隂陽不調肺氣虛弱邪之所攻則肺脹氣逆胸中痞塞呼吸不利氣奔喘急不得暫息故令不得睡眠也方訶黎勒皮出聖惠方治上氣咽喉窒塞短氣不得睡臥腰背強痛四肢煩疼腹滿不能食訶黎勒皮一兩檳榔三分桑根白皮一兩銼赤茯苓一兩麻黃一兩去根節甘草炙微赤銼半兩枳殼三分麩炒微黃去穰紫苑三分洗去苗土半夏三分湯洗七次去滑杏仁三分湯浸出皮尖雙仁麩炒微黃右為散每服五錢水一大盞生薑半分煎至五分去滓溫服不拘時杏仁散出聖惠方治上氣喘急不得睡臥腹脅有疾氣杏仁半兩湯浸去皮尖雙仁麩炒微黃赤茯苓一兩木香一兩鱉甲一兩塗醋炙黃去裙襴右為散每服五錢水一盞生薑半分燈心數莖煎至六分去滓溫服不計時候五味子散出聖惠方治上氣喘促不得睡臥五味子三分陳橘皮三分湯浸去白焙紫苑一兩洗去苗土貝母三分煨微黃赤茯苓三分杏仁一兩去皮尖雙仁麩炒微黃麻黃一兩去根節麥門冬三分去心甘草半兩微炒赤銼柴胡三分去苗右為散每服五錢水一盞生薑半分煎至五分去滓溫服不拘時候紫蘇子散出聖惠方治上氣睡臥不得攀物而坐唾血不能飲食紫蘇子一兩微炒桑根白皮一兩銼半夏三分湯浸洗七次去滑紫苑一兩洗去苗土人參一兩微炒甘草半兩炙微赤銼麻黃去根節五味子三分乾薑半兩炮製銼細辛三分桂心半兩杏仁三分湯浸去皮尖雙仁麩炒微黃欵冬花五錢射干半兩天門冬三分去心右為散每服五錢水一盞生薑半分煎至五分去滓不拘時候治上氣不得睡臥短氣出千金方陳皮一兩湯去白焙人參一兩去蘆五味子一兩紫蘇莖葉一兩右為散每服五錢水一大盞棗三枚生薑半分煎至五分去滓溫服日三四服一方無棗半夏丸一名鍾乳丸出聖惠方治上氣胸滿晝夜不得臥半夏湯洗去滑薑汁製焙乾芎藭各半兩附子炮製去皮臍半兩蜀椒去目及閉口者炒去汗一分貝母去心微炒桑根白皮銼炒欵冬花去枝梗焙細辛去苗葉各半兩紫苑去苗土焙一兩乾薑炮製半兩鍾乳研一兩杏仁湯去皮尖雙仁研細半兩右先將前十味搗羅為細末與鍾乳杏仁同研令勻煉蜜丸如梧桐子大每服三丸至五丸粥飲下日三服不拘時候杏仁散出聖惠方治上氣喘急不得睡臥杏仁一兩湯去皮尖雙仁麩炒微黃甘草半兩炙微赤銼紫蘇子一兩微炒麻黃一兩去根節天門冬一兩陳橘皮三分去白焙五味子三分右為散每服三錢水一大盞生薑半分棗三枚煎至五分去滓溫服不計時候桂心丸出千金方治發熱氣上衝不得息欲死不得臥桂心半兩白石英麥門冬枳實白鮮皮貝母茯神檳榔仁天門冬各二兩半人參車前子二兩前胡橘皮白薇杏仁各一兩半郁李仁三兩桃仁五分右為末蜜和丸如梧子大以竹葉飲服十丸日二加至三十丸為度竹葉飲出千金方竹葉紫蘇子各升紫苑白前各二兩百部甘草生薑各三分右㕮咀以水八升煮取三升溫下藥盡更作蓽撥丸治上氣倚息不得臥蓽撥昆布洗炒乾吳茱茰湯洗焙微炒葶藶隔紙炒紫色杏仁湯去皮尖雙仁炒研細各一兩右先將前四味搗羅為末與杏仁同研令勻煉蜜和丸如梧子大空心服粥飲下五丸稍加至十丸治上氣急滿坐臥不得用鱉甲炙黃細搗為散燈心同煎食前服一錢食後蜜水下一錢三因神祕湯出永類鈴方治上氣喘急不得臥者淨陳皮桔梗紫蘇人參五味子各等分右㕮咀四錢水煎服直指加檳榔桑根白皮製半夏甘草薑五片煎治肺壅氣喘急不得臥葶藶子三兩炒大棗二十枚用水三升煮取二升汁右味將已炒葶藶子入煮棗汁一處再取一升去滓分作二服併服之瘥普濟方卷一百八十三
