body:
  text: 普濟方卷三百六十六明周王朱橚撰嬰孩唇舌口齒咽喉門牙齒疼痛等疾附論夫牙齒者是骨之所養手陽明足太陽之脈並入于齒若血氣充實則骨髓強盛雖其齒損落猶能更生也若虛弱者血氣衰耗風冷乘之致令齒久不生假令生者或齲或蟲落不能生也小兒齒痛風齲者手陽明太陽之脈並入于齒風氣入其經脈與氣血相摶齒即腫痛濃汁出謂之風齲小兒牙疳齒齲者是齗腐爛也上牙屬手陽明太陽之經燥金為主下牙為足陽明胃經濕土上下是腸胃二經也或積熱于內或因服銀粉芭豆大毒之藥入乳腸胃乳食不能勝其毒毒氣循經而至于齒齗牙縫嫩薄之反內害也可以麝香玉線子治之乳母臨臥常服黃連解毒湯一服牙疳病則愈矣全嬰方云紀全助教子七歲每夜睡中斷牙其絶生業醫者纍與驚藥并靈寶丹及用聖惠方治睡中斷齒密取患人臥薦下塵一捻內口中勿令知之亦不退諸法治之一季無效其妻慮有祟求祝無驗召愚視之則兩耳前微赤疳攻必耳聾微黃驚入腎斷齒睡魂中此子腎經有風腎主骨骨齒也腎有風則齒癢齒癢則咬牙腎屬陰故夜睡中斷齒知驚入腎也紀曰專醫小兒實不曉治願請教益答曰以大戟散一錢豬腎湯調臨睡一服減半次夜更一服退七分後以人牙火煅蝎尾麝香三味豬腎湯調三服全瘥紀曰大戟散何意也答曰大戟㵼其膀胱之腑去腎經風腎與膀胱同腎虛不受瀉故不多服豬腎湯入腎人齒入骨古者用人牙燒灰治豆毒入腎腎旺瘡黑寒顫咬齒者是腎經受毒今用人牙者逐腎經病蝎尾麝香治腎風邪大抵用藥當究其原歸其本素問曰治病必求其本前者所用驚藥乃治其心所以無效故也小兒齒不生者用骨之所終而為髓之所養也小兒有稟氣不足者則髓不能充于齒骨故齒久不生也芎黃散治齒不生齒者由骨之所終髓之所飬稟氣不足則髓不能充于骨故齒久不生川芎乾地黃當歸山藥一名山薯芋白芍藥各一兩沉香半兩粉草三錢右為末溫鹽湯調服半錢用少許揩齒腳亦佳一方無沉香牢牙散搽牙茯苓石膏龍骨各一兩寒水石白芷各一兩細辛三分石燕子大者一枚小者一對右為細末早晚刷牙蟾蜍丸治齒不生一名香附丹沉香一兩檳榔半兩雄鼠糞半兩燒灰大香附子一兩乾蟾半兩燒灰右為細末用羊髓四兩煮爛和成膏如黍米大每服十粒麝香湯下量兒大小加減香附丸治小兒長齒不生香附子大者去皮沉香各半兩檳榔雄雀糞兩頭尖者燒各一分右為末羊髓二兩煮爛和成膏丸如小豆大每服十丸射香湯下治大人小兒生齒神效方用雄雌雞糞各十四顆焙乾同研如粉入麝香少許仍先以針挑破損齒腳下血出將散子傳之年髙者不過二十日生年少者十日不計傷損及少自退落並再生治小兒大人多年牙齒不生用黑豆三十粒牛糞火內燒令研盡細研入麝香少許一處研勻先以針挑不生牙處令血出用末少許揩不得見風忌酸醎物治因落齒不生取牛糞中黑豆二七粒去頭上皮以此豆開處齒注齒根上時時用之即效又方取雄鼠糞二七枚以一糞拭一齒根處盡此上二十一日即生雄鼠屎頭尖一方用雌鼠糞頭圓者治齒久不生取雄鼠脊骨為末傳之即生又方取路傍遺却稻粒于齒落處點三七下其齒自生神效療小兒齒不生用人尿坑中竹木以正旦刮塗之即生含嗽湯治齒痛獨活黃芩芎藭當歸各三分細辛蓽撥丁香各一兩右㕮咀水五升煮取二升半含嗽之食頃乃吐更含之一方有甘草二兩藁本散治卒齒痛藁本白附子川芎莾草各半兩用搗羅為細末次用靑黛蘆薈麝香各一錢細研右研勻每用一字塗揩患處雄黃丸治小兒牙齒黑蛀氣息疼痛雄黃二錢麝香半錢右為末軟飲和為梃子安在牙內治牙疼方用蒼耳子五升以水一斗煮取五升熱含之疼則吐吐復含不過劑愈無子莖葉皆可用之又方用莾草五兩切以水一斗煮水五升含嗽之一日令盡又方用黎蘆末內于牙孔中勿咽汁神良又方用取門下桃撅燒取脂汁少少內孔中以臘固之治小兒齒牙黑蛀氣息疼痛含白馬屎隨左右含之不過三口瘥治裂齒以腐棘針三百枚以水二升煮取一升含嗽之日三五瘥止又方取死曲蟺末傳疼處即止麝香散治小兒唇口臭爛齗宣露麝香雄黃生蘆薈白龍骨各一錢蜜陀僧二錢石膽半兩生乾蟾一個重半兩者入瓶燒存性右研勻令細先用綿子纒筯頭上以鹽礬漿水輕洗過然後貼藥地骨皮散治骨槽風牙齒宣露腫癢浮動疼痛作時或齗爛生瘡兼治大人小兒口瘡地骨皮麥蘖各一兩靑皮一分豬牙皂角半兩右同鹽令勻粗入鍋內燒過再研末每服看患大小用之仍先以鹽漿漱口了糝擦治小兒牙宣齒縫血出苦參末一兩白礬灰一錢右為末一日三次揩牙上立驗也治齒間血出取苦竹葉不以多少濃煎取汁入鹽少許寒溫得所含冷即吐治小兒牙宣常有鮮血不止齒齗臭爛砒黃炒一錢麝香炒半錢右同研細先用紙條子以生油塗之後糝藥末在上少用末剪作小片紙棊子大看大小用插在爛動處治齒血出不止刮生竹茹二兩酢漬之令其人解衣坐乃别令一人含噀其背上二過并取竹茹濃煮取汁勿與鹽適寒溫令漱之終日為度治牙齗宣露出血所以日月蝕未平復時特忌飲食小兒亦然並宜治之用蚯蚓糞水和作稠泥團以火燒之令極赤末如粉以臘月豬脂和傳齒齗上日三即瘥止及治小兒風齲齒痛并蟲食疼痛黑爛治齒間血出用童子小便半升分為三兩次含之冷即吐之治齒根腫痛取松柏槐枝同燒令熱柱病齒孔須臾蟲緣枝出治齒根腫以松葉一握鹽一合好酒三升煎取一升含之治齒根空腫痛困斃獨活四兩酒三升右于淨器中漬之煻火煨令暖稍稍沸得半去滓熱含不過四五度治牙齗疼痛杏仁一百枚去皮尖兩仁者鹽末方寸七右以水一升煮令沫出含之未盡吐却更含不過再三瘥治小兒牙牛蒡子炒香一分乳香一錢右為末入白麵少許溫水調塗治牙根腫痛生地黃獨活各三兩右切以酒漬一宿含之治小兒牙用大硼砂研細水化雞羽掃牙上治齒根腫痛常以白鹽末對齒齗上日三夜二治齒牙根搖欲落用生地黃大者一寸綿褁著牙上嚼咽汁汁盡去之日三咽十日即愈一方用火炙令大熱著木椎碎用綿褁著牙上蝦蟆散治小兒齒痛齲風連腮微腫乾蝦蟆一枚燒灰青黛細研柑子皮細辛白雞糞薰黃各一兩麝香細研乾薑炮裂銼各半分右為散研令勻以薄綿褁少許內齲齒孔中日一易之治小兒風齲齒痛及蟲蝕疼痛黑爛出聖惠方青黛雞糞白燒灰藁本細辛麝香少許細研右為末旋取少許傳于齒上治小兒齒痛風齲連腮微腫出聖惠方白附子藁本細辛芎藭莾草各五分右為散以薄綿褁少許著齲齒上治小兒齲齒風痛及蟲蝕疼痛出聖惠方乾蝦蟆一枚燒灰青黛一分蘆薈半分右同研令細以生地黃汁熬作膏塗齒上治小兒風齲齒痛及蟲蝕疼痛黑爛出聖惠方以郁李根白皮五兩銼水一盞熱含冷吐當蟲出又方用松柏脂揑鋭如錐柱齲孔內須臾齲蟲緣出瘥又方用雞舌香半兩銼水一中煎六分去滓熱含冷出治齲齒出聖惠方用白馬懸蹄切碎可孔塞之不過三度一方用夜眼亦可又方出幼幼新書以皂莢炙去皮子搗末取少許差齒痛止瘥二聖散治小兒風蚛牙疼威靈仙白茯苓去黑皮各一兩右為末每用一錢水一盞醋半盞蔥白一握切煎至六分熱煠冷吐黃龍散治齒齗疳蟲有竅子不合者出幼幼新書龍實龍骨中削之淡黃或淡黃上褐色緊粘人舌者是白礬灰蝸牛殼南䊅牛黃各一錢右為末每用少許貼竅子內時時用之治小兒齒疳蠱􅉶伍倍子炙為末鉛丹研各一分右和勻以綿裹貼齒齗上塗亦得治蟲蝕齒根肉黑方出幼幼新書燒腐棘取脂塗之十遍雄黃末傳即愈者齒黑者以松木灰揩之細末雄黃塗齗百日日再塗之七日慎油豬肉神效治小兒風蚛牙出幼幼新書濃煎郁李仁水含之治牙車急口眼相引舌不轉方出幼幼新書牡蠣熬伏龍肝附子炮去皮礬石燒各等分右為末以白酒和為丸傳其上乾則易之取瘥止治失欠頰車􅀈出幼幼新書消蠟和水傳之立愈四物湯治稟氣不足齒久不生骨髓不生當歸白芍藥地黃川芎等分㕮咀水煎加山茱萸甘草服草龍膽散治牙根宣露草龍膽鈎藤枳殼升麻各等分右件前水日月灌漱之越涎散牙硝白礬枯北細辛各等分右為末揩擦牙上出涎立效法治失欠頰車蹉閃不合用一人以手指牽其頥以漸推之則復入矣推當疾出指恐誤嚙傷人指也治齒蚛方出幼幼新書以擔一條令病人蹲坐橫擔于膝上引兩手尋使極住手伸中指炙中指頭擔上三壯兩頭一時下火病人口誦呪曰噉牙蟲名字鶻莫噉牙莫噉骨大人亦念之治牙根腫痛出幼幼新書扣齒三百下日一夜二即終身不發至老不病齒治痛齒出幼幼新書宜夜向北斗手拓地炙指頭地呪曰蝎蟲所作斷木求風蟲所作炙便休疼痛北斗收即瘥治牙痛出幼幼新書取桑東南引枝長一尺餘大如匙柄齊兩頭口中柱著疼牙上以三姓火炙之呪曰南方赤帝子教我治蟲齒三姓炙桑條條斷蝎蟲死急急如律令大效咽喉等疾附論夫咽喉者肺脾經所主也小兒脾肺有熱藴積上焦薰發喉間故令咽喉赤腫吞吐不利或塞或壅憎寒壯熱咳嗽痰涎是其候也昔人謂藏熱則咽門腫而塞閉豈虛言哉喉痺之病喉中腫塞脾痛水飲不下呼吸有妨寒熱往來得之風熱客于脾肺熏發咽喉小兒純陽尤多是疾若不速治毒邪入心則煩悶懊憹立致危殆歌曰咽喉腫閉肺家殃積熱于中舌有傷風盛氣攻丹腫毒却愁生出腦疳瘡此患先解利宣泄藏腑壓熱調氣即安也人以胃氣為主無問大小兒或有痰實風涎灌心切不可吐惟喉痺别無治法非吐不能生金星丸先當投之痺者隔塞也萬一危亟前藥無效急用官局碧霞丹研細用薄荷自然汁入醋調用雞翎蘸藥送入喉管內徐徐導引得吐出為佳或云碧霞金虎二丹能殺人不可用此大不然小兒馬痺者與喉痺相似亦是風熱毒氣客于咽喉頷頰之間與血氣相摶結聚腫痛其狀從領下腫頰下應喉內痛腫塞水漿不下甚者膿潰毒若攻心則心煩懊悶至死小兒生下中酢腮風壅喉渾身壯熱耳邊連珠赤腫喉中或肉瘤起有此為酢腮喉壅此候本因積熱甚積熱衝上乃如此所治者先微下奪命散略與吐下風涎用勻氣散補又用硃砂膏夾天竺黃散與服又用蔥涎膏貼腮腫處如此調理三日即愈如此惡候恐傳急驚方牛黃散治咽喉項腫啼聲不出牛黃研半分代赭三兩麝香研半錢玄參半兩厚朴去粗皮生薑汁炙三分升麻一兩射干半兩大黃銼炒一兩一分木香三分白术半兩犀角鎊屑三分甘草炙半兩右為細散入研藥和勻一歲至二歲每服半錢以人乳汁一蛤蜊殼許調下空服日一服三歲至五歲以上每服一錢棗湯調下米飲亦得日再升麻湯治小兒咽喉腫塞疼痛方升麻木通川大黃銼微炒絡石葉犀角屑甘草微炙銼各一分石膏三分川朴硝三分右搗羅為粗散每服一錢以水一小盞煎至五分去滓不拘時服量兒大小加減溫服射干散治小兒脾肺壅熱咽喉腫痛射干川升麻百合木通銼甘草炙微赤銼桔梗去蘆頭各一分馬牙硝半兩右為散每一錢以水一盞煎至五分去滓不計時候量兒大小以意加減溫服龍腦膏治小兒風熱咽喉腫痛塞悶生瘡搖頭懆悶蟲咬心痛龍腦半錢玄明粉一錢牛黃少許白礬一分銚子內鍊通煎却磨汁泣乾為度蟬蛻三十個去足炒研末蛇退皮一條長二尺用鐡器上煉燋為度旋除下黑者生者再􅏼須緊按實著鐡器焦後研為末右同爛研入沙糖少許和丸梧桐子大冷水化破一丸服之絳雪散治大人小兒咽喉腫痛氣息難通硼砂少許白礬如皂子大馬牙硝三分硝石四兩黃丹半兩巴豆六枚右粗瓷罐子一個先煨令熱後次第漸漸下藥巴豆逐個打破後有火熖盡更入一個續入蛇蛻皮一條謂之七擒以火養成汁候結硬乃成也每用少許竹筒子吹在患處忌雞犬婦人見唯臘月合之地龍散治小兒生熱咽喉腫痛鬱金用皂角水煮乾甘草炙白殭𧖟地龍各一兩蝎牙硝一兩右為細末每用一錢薄荷湯調下兒小半錢欵冬花丸治小兒咽喉中鳴咳嗽喘急欵冬花甘草炙紫苑去苗皮麻黃去根節煎去沫倍乾各半兩貝母麩炒麥門冬去心倍各三分右為細末錬蜜丸如菉豆大每服三丸至五丸食後米飲下五歲已下以意加之日三服麻黃湯治咽喉腫熱肺脹氣急喉中似有物塞麻黃去根節煎去沫焙乾桑根白皮銼桂去粗皮各半兩大黃生射干杏仁湯浸去皮尖雙仁各一分右粗搗篩每服一錢以水半盞煎三分去滓溫服治熱病口爛咽喉生瘡水漿不得入當歸射干升麻各一兩附子半兩炮去皮白蜜四兩右㕮咀以豬膏四兩先煎之令成膏下著地勿令大熱內諸藥微火煎令附子色黃成絞去滓內蜜復火上令相得成器中令凝取如杏子大含之日三四輒咽之瘥半夏湯治小兒咽喉病不利乳哺半夏二個洗棘荆半升陳者麥門冬半兩人參甘草炙各一兩右㕮咀以水三升煮一升稍稍飲之牽牛散治咽喉中鳴咳嗽痰壅牽牛子炒半生半熟二兩杏仁去皮尖雙仁炒甘草炙吳茱萸湯洗焙乾炒陳橘皮去白焙各一兩右為細末每服半錢空服以沸湯調下微利出惡物即瘥量兒大小加減服升麻湯治小兒喉痛若毒氣盛便咽塞并治大人咽喉不利升麻生薑射干各二兩橘皮一兩右㕮咀以水六升煮取二升去滓分三服玉芝飲子治小兒膈上壅熱唇口生瘡咽喉腫疼甘草銼作半寸許擘破湯浸一日微炒過吳石膏研如粉各四兩山梔子六兩去皮炒令香藿香三分右為細末每服二錢新汲水調下不以老幼加減可服射干湯治咽喉腫痛及風熱上摶于咽喉之間血氣相摶而結腫乳食不下名咽閉方射干川升麻各一兩馬牙硝馬勃各半兩右為末每服一錢水一盞煎至五分去滓溫熱服食後備急丹治咽喉腫疼青黛三兩芒硝二兩白殭蠶一兩甘草四兩右為細末用臘月牛膽汁兒有黃者盛藥其中蔭四十九日多時為妙如些小麥腮喉閉用皂角子研碎以竹筒子吹之咽喉內愈治小兒卒腫毒著咽喉頸壯熱不乳升麻射干大黃各一兩右㕮咀以水一升五合煮取八合一歲分三服不拘時候溫服以滓傅腫上冷更暖以傅大兒以意加之青木香湯療春夏忽喉咽痛而腫兼不利者青木香黃連白頭翁各一兩右㕮咀水五升煮取一升半分溫三服小兒一服一合忌豬肉冷水朴硝散治小兒咽喉舌腫脹咽氣不利朴硝一分衣中白魚炒三牧鹽少許右為末每服以指揾少許在舌上龍石散治大人小兒咽喉腫塞疼痛口舌生瘡上膈壅熱毒生腦子一錢寒水石一斤燒一日朱砂一兩一分飛研右為細末每用少許擦患處咽津無妨小兒瘡疹毒氣攻口齒先用五福化毒丹掃次用此藥擦立愈治小兒咽喉腫痛塞悶方馬勃半兩桑株上螳螂窠一兩燒灰右同研令勻鍊蜜和丸如桐子大三歲以下每服煎犀角湯研下三丸三歲以上漸漸加之治咽中瘡腫萆麻子去皮一枚朴硝一錢研勻右用新汲水調作一服未效再服治咽喉腫痛閉塞白殭𧖟生出絲觜白馬硝各二錢右為末每服半錢生薑汁調下不拘時服得效方凡咽喉之證最急初覺咽喉腫脹痛速宜服此用白殭蠶二味等分為末研生薑水調下一錢不過二服即愈如是噤定牙關用巴豆七粒剝去皮擦巴豆油在四指大四方紙花子上用紅筯斜角卷之却徹去紅筯男左女右簮在鼻孔中存一半外用燈點著外相紙花卷兒頭即時煙透喉中牙關隨手便開以白礬少許吹在喉中壓下熱涎即安此病暴速非其他病之可擬也倉卒害人性命不可不慎白礬散治大人小兒風熱咽喉腫痛及卒然閉塞又治纒喉風急喉閉白礬一兩巴豆二十粒瓶內火煨右為細末每服一字吹入口內或鼻內亦可又一方同熬枯乾去巴豆碾礬令細冷水調灌治懸癰乘熱暴腫長乾薑半夏各等分右末每用少許著舌上又一方白礬鹽等分為末筯頭點少許懸癰上黃蘖湯治咽喉腫脹咽氣不利黃蘖去粗皮蜜炙甘草炙各一分右粗搗篩每一錢以水半盞煎至三四分去滓溫服不拘時苦藥子散治咽喉腫痛苦藥子白殭蠶等分右為末每服半錢白礬水調下量兒大小加減蜂房散治忽腫毒著咽喉露蜂房燒灰白殭蠶各等分右細研每服半錢用乳香湯調下看大小加減治咽中腫垂內不得食以竹筒內口中燒鐡從竹中柱之不過數度愈一方全蝎白薑蟬退紫英右為末入硃砂麝香各一錢研勻燈心湯點服人參羌活散治壯熱涎潮牙關緊急方見本門傷寒類蝎附散治小兒吐㵼日久或大病後生風時發搐搦目睛斜視南星一枚重二兩者打碎附子一枚重七錢者生去皮臍銼已上二味用生薑四兩取汁入好酒一盞于銀石器中同煎令汁盡焙乾為末白附子七枚炮製全蝎七枚去毒用炒代赭石二兩火煅為末辰砂半兩右為細末入腦子麝香各一錢研勻每服一字用酸漿水半盞入麻油兩滴冬瓜子三粒同煎三五沸放冷約一茶腳許調服候少時再服如無漿水并冬瓜子只用薄荷湯調服亦不拘時候中風口噤附論夫小兒中風口噤者是風入頷頰之筋故手足三陽之筋入結頷頰足陽明之筋上于口膚腠虛風冷客于諸筋筋得寒冷則攣急故機關不利而口噤也方犀角散治小兒中風口噤腰背硬強搐搦犀角屑獨活麻黃去根節白附子炮製乾蝎微炒牛黃細研已上各一分天麻半兩天南星半兩炮製射香半兩細研右為散入研了藥都研令勻不必計時候以薄荷酒調下半盞蓋覆汗出立驗量小兒大小加減服之治小兒卒毒腫著喉頸壯熱妨乳煮桃皮汁三升服之治小兒咽喉腫痛塞閉取牛蒡根細銼搗汁漸漸服之治懸癰乘熱暴腫長用鹽末以筯頭張口柱之日五治喉卒腫不可食用韭一把搗熬傳之冷即易之佳又方含荆瀝稍稍咽之又方用好酢口內含之舌瘡亦佳大聖奪命玉雪無憂散玄參管仲白茯苓去皮縮砂甘草炙滑石别研入山豆根川黃連去鬚荆芥穗各半兩硼砂二錢别入研寒水石三兩火煨紅水中淬别入研右為末次入滑石等三味合和勻每服半錢此藥理咽喉塞滯口內生瘡心腹脹滿脾積癥塊解百藥毒如纒喉痺風涎生小兒􅀈嗽妳辨不消化誤咽下呌子魚骨針刺錢等並用藥半錢先抄入口後用新汲水一口咽之任是百毒硬物可令除化立有妙效如要喫巴豆針刺麥糧􅀈針瓷瓦子等諸毒藥毒蟲硬物只用藥半錢與物相拌和喫之用水一口下並無妨礙但是心腹間有礙亦如前法服之潤三焦消五穀除三尸去八邪辟九蟲趂瘟疫專理渴疾除風涎開牙關神效不可具述服者自當知烏翣散治喉嚨者脾胃之候若藏熱喉則腫塞神氣不通生烏翣十兩升麻三兩羚羊角芍藥通草各二兩薔薇根切一升艾葉六銖生者生地黃切五合豬脂二斤右㕮咀綿褁苦酒一升淹浸一宿內豬脂中微火煎取苦酒盡膏不鳴為度去滓薄綿褁膏似大杏仁內喉中細細吞之凡卒喉痺不得語者宜服小續命湯加杏仁一兩尤妙木通湯治小兒喉痺由脾肺藴熱血氣結塞慎勿刺破但此方治之木通銼一分升麻一分大黃銼炒一分麻黃去根節一分犀角鎊一分石膏銼半兩甘草炙一分右粗搗篩每服二錢水一盞煎至七分去滓下朴硝末一錢攪勻再煎二服分溫二服早食後臨臥各一服五歲以上以意加之犀角湯治小兒喉痺咽喉傍腫如瀝子身體壯熱如不作顆結空氣急喉中噎塞即是肺脹此方治之犀角鎊硝二分射干一兩桔梗炒絡石葉升麻甘草炙山梔子仁各一分右粗搗篩每服二錢以水一鍾煎至六分去滓下朴硝末半錢攪勻分溫三服早晨日午臨臥各一服又一方無朴硝有馬牙硝馬牙硝散治小兒喉痺疼痛水漿不下馬牙硝川大黃銼微炒甘草炙微赤銼牛黃細研馬勃各一分右為細末每服半錢以新汲水下不拘時候量小兒大小加減服之羚羊角湯治小兒喉痺痛咽塞不利羚羊角鎊硝一分升麻三分射干白藥各半兩陳橘皮湯浸去白焙各一分右粗搗篩每服一錢以水七分煎至四分去滓分溫二服早晨日午夜臥各一服五歲以上以意加減天竺散治小兒喉痺上焦積熱壅毒天竺黃馬牙硝甘草炙各半兩蛤粉白者二兩丹砂研一分右為細散每服半錢取新汲水揉薄荷相和入龍腦少許量小兒大小湯化服之食後臨臥麻黃湯治小兒喉痺咽喉傍腫喉中噎塞麻黃去根節半兩桂去粗皮一分射干一分杏仁湯浸去皮尖雙仁炒一分右粗搗篩每服一錢以水七分煎至四分去滓食後服之二次白礬散治小兒走馬喉痺白礬煅焙研一兩硝石研雄黃各一兩分研苦參末半兩右為細末每服半錢冷水調下併三服治咽喉涎壅喉痺閉等疾出幼幼新書鬱金大者一個為末輕粉炒一錢巴豆七粒四粒熟三粒生熟者是去油生者生用右和合藥先左研四十九遍後亦向順研令勻次入輕粉每服一字管子吹入喉中奪命散出幼幼新書治小兒喉閉亦治大人朴硝白礬天南星各半兩右為末小兒每服半錢水一鍾同煎二分大人水一鍾藥三錢煎七分一服三物丸一名三物備急丸治喉痺水漿不下備急方見本門前舌腫等疾類治喉痺咽唾不得出幼幼新書用半夏一味十四枚雞子一枚扣其頭如栗大出却黃白內半夏于中內醋令滿極微火上煎之取半小冷飲之即愈療小兒喉痺熱塞升麻五兩切馬藺一合右以水一升煎取二合入少白蜜與兒服之甚良治小兒咽腫喉痺以鯉魚膽二七枚和竈底土以塗咽喉立瘥一作鯇魚膽如聖湯出幼幼新書治喉閉舌頰腫咽喉有血咳嗽膿血甘草炙二兩桔梗一兩右為末每服二錢水一盞煎至七分去滓溫服急切不以時日二三張鋭雞峯方二味等分治小兒喉痺腫痛桂心杏仁各等分右為末綿褁如棗大含咽汁舌下須臾破又一方無杏仁治喉痺卒不得語以酒三合和入乳汁半升分二服治馬喉痺燒馬藺根灰一方寸七燒桑枝瀝汁和服治喉痺咽唾不得含蜀升麻一片立愈用木賊以牛糞餅子火燒每三兩莖才勻著便取出再取燒為末每服一錢冷水研米汁清調下小兒臘茶清調下半錢入口腫破血出即安三日內未得喫粟米粥飯治喉閉出幼幼新書用馬藺子為末每服半錢麥門冬熟水調下一方治小兒卒腫毒著咽喉壯熱妨乳用馬藺子半兩水一鍾煎至半鍾去滓不計時候溫服量小兒大小加減治喉痺獨附煎出幼幼新書取附子一枚去皮蜜塗火炙令乾復塗蜜炙須臾含咽汁愈治喉痺深腫連頰吐氣數者名馬喉痺出幼幼新書以馬􅀈一具水二升煮取一升分三服又方出幼幼新書以馬鞭草根一握勿中風截去頭搗取汁服治咽喉熱腫神氣不通出幼幼新書以臘月豬尾燒末水服之又方出幼幼新書燒牛角末酒服之凡小兒飲乳不快覺以喉痺者亦取此灰塗乳上令兒食乳咽下即差海上方用沙牛角燒刮取灰細研水調亦得又方出幼幼新書熬杏仁令黑含或末服之治喉痺卒不得語出幼幼新書濃煮桂汁服一升亦可末桂著舌下漸咽之良又方出幼幼新書煮大豆汁含之無豆用豉亦佳又方出幼幼新書燒炊箄作灰三指撮水服之又方出幼幼新書用芥子末水和傳之乾則易又方出幼幼新書用商陸苦酒熬令濃熱傳之治小兒喉痺腫痛出聖惠方用露蜂房燒灰以乳汁和一錢服之看兒大小加減不計時又方出聖惠方燒蛇蛻末以乳汁服一錢不計時候治小兒喉痺用葛蔓燒灰水服一錢又方用棘刺燒灰水調服半錢治喉痺以繩纒手大指刺出一大豆以上瘥去小指亦佳刺小指瓜文中出血即差左右刺出血立愈慎酒麵毒物異功散治纒喉風酢腮喉閉及咽喉一切病症盆硝一兩甘草炙六錢訶子肉白殭蠶貫衆馬勃蛇蛻皮點油醋慢火炒黃色各半兩硼砂玄精石各一錢右為末每服用一字以蘆筒子吹咽喉內纒喉風磨刀水調下半錢尋常置舌根下用解毒雄黃丸治纒喉風及急喉痺卒然倒仆失音不語或牙關緊急不省人事雄黃飛鬱金各一分巴豆去油二七個右為末醋煮麵糊為丸如菉豆大用熱茶清下七丸吐出頑涎立便蘇省未吐再服善治纒喉風及走馬喉閉卒死倒地失音不語以至牙關緊硬不知人事如至死者心頭猶熱灌藥不下即以刀針匙幹開口灌之但藥下喉嚨無有不和吐瀉些小無妨及上膈壅熱痰涎不利咽喉腫痛赤眼癰腫一切毒熱並宜服之如小兒患喉嚨赤腫及驚熱痰涎壅塞二丸或三丸量兒大小加減生薑飲治風邪風毒纒喉不語南星略炮半兩生薑四錢橘皮三錢右銼每服三錢紫蘇五葉煎服治纒喉風喉痺牙宣牙癰走馬疳口瘡等用蠶退紙燒存性少入龍腦蜜丸如雞頭大含化小兒減少如牙宣癰腫揩貼齗上如走馬疳加麝香擦貼立愈治小兒急喉閉及纒喉風玄參鼠黏子半生半熟炒為末各一兩右為末新汲水調下立瘥治纒喉風咽中如束氣不得通蛇蛻炙當歸切焙等分右為末溫酒調一錢得吐為良未效再作切忌針灸纒喉風藥以火炊草一大把舂爛用水一鉢衝取汁漱咽中漸寬即下小續命湯入蔓荆子何首烏薄荷荆芥各少許與小續命湯多少相等咽下使一人守之連數服腫消乃退治噎方用酥蜜生薑汁升一微火煎二沸每服兩棗許內酒中溫服之治尸咽語聲不出用酒二合酥一匙薑末一錢和服之日三食後服亦治肺病治噎方以手巾布褁舂杵頭糖拭齒治尸咽喉中癢痛吐之不出咽之不入如中蠱毒方含生薑五十日瘥勾藤散治風熱喉痺勾藤玄參升麻黃芩赤茯苓苦梗甘草山梔子各等分右為末煉蜜為丸如皂角子大每服燈心一子淡竹葉薄荷湯化或細研雄黃調下越涎散鴨嘴膽礬烏梅一個大者去皮用巴豆三粒去殼入紙褁慢火煨去巴豆用右為末用黃秋串根煎吞醋調少許點入口內令含咽少傾必吐出痰治小兒重腭重齗腹痛以蛇蛻炒末傳之效語音不出等疾附論夫心為言肝為語其經屬手少陰足厥陰其氣上通于舌舌者聲之機若稟受之初母懷驚怖則子之心火不足而肝木弱故令機關不利氣不宣揚而語遲甚者有經數歲不能言者蓋咽喉者氣之道路喉掩者聲音之門戶舌者聲之機唇者聲之扇風寒客于喉掩即不能發聲故卒然而失音錢氏云口噤不語失音也孫氏云口開不語音啞也閉目不語卒疾而失音目開不語久病而無聲有口開失音為風邪客于肺肺主聲而通于氣令外邪與真氣相摶真氣虛而邪氣勝故聲不通有因病吐瀉大病之後雖有聲而不能言又能咽藥此非失音為腎怯不能上接于陽故也當補腎地黃丸癎病瘥後不語者為風邪流滯于心絡使心氣不和其聲不發又云寒客于喉掩啼聲以啞人其有驚風盛發因此不作聲者蓋風涎灌于心肺也宜吐之急驚先吐後補驚癎先補後吐吐後再補有慢驚瘥後不語者並與對證驚藥并服通關散自然聲出首尾補助安神膏驚藥擇用之夫腎虛為病不能納諸氣以歸元故氣奔而上咳嗽痰壅或喘或脹髓虛多唾足冷骨痿胸腹百骸俱為之牽制其嗽愈重其氣愈乏其聲愈乾君子當于受病之處圖之可也按錢氏方小兒吐瀉利其小便過多以致脾虛不食錢用益黃散作效數日以後忽爾不語錢知其脾氣巳復腎氣尚虛投以地黃丸益腎相繼數劑于是能言方人參平補湯治腎虛聲不出人參川芎當歸熟地黃洗曬白芍藥白茯苓兔絲子酒漫爛研細北五味子杜仲去粗皮銼薑汁製炒去絲巴戟酒浸去橘紅半夏曲各半兩牛膝酒浸焙白术補骨脂炒葫蘆巴益智仁甘草炙各二錢半石菖蒲一錢半右銼細每服三錢薑五片棗二枚食前煎吞山藥丸七十粒五更頭腎氣開不得咳嗽言語默然再進上藥杏仁煎治咳嗽暴重聲音不出杏仁水浸去皮研膏冬蜜沙糖薑汁各一盞桑白皮去亦炒木通貝母去心各一兩半北味子紫苑茸各一兩石菖蒲半兩右㕮咀以水五升煎半去滓入杏薑糖蜜夾和微火煎取一升半每服三兩日夜服之木通湯治諸風失音木通石菖蒲防風羌活桑螵蛸全蝎直殭蠶炒各三分甘草炙三分圓白南星略炮半兩右銼每服二錢半紫蘇五葉薑五片水煎熱服之荆蘇湯失音通用荆芥蘇葉木通橘紅當歸桂石菖蒲右等分銼水煎四錢服之殭蠶散治小兒失音不語關膈不通精神昏憒殭𧖟半兩羌活一錢麝香半錢右為末三歲半錢薑汁少許調和沸湯浸服又以菖蒲末著舌根上頻用之又方以細辛去苖為末先用皂角一莖去皮淨刷子蘸少水就上刷令珠起然後以指蘸皂角珠點細辛于牙緊處擦之千金湯治小兒失音不語以桂心㕮咀每服一錢水半鍾煎三分去滓無時十歲兒服為末著舌上即語又竹瀝飲之並瘥治氣腸聲沉用心氣湯加枳殼甘草水煎服之金花散治失音亦治喉痺用槐花新瓦上炒香熟三更後床上仰臥隨意食之熱證通用並驗菖蒲丸治受胎其母卒有驚怖邪氣乘心故兒加受母氣心官不守舌本不通四五歲長猶不能言人參石菖蒲麥門冬去心逺志取肉薑汁炒川穹當歸各二錢滴乳香朱砂各一錢細研右為末蜜丸麻子大每服粳米飲下十丸菖陽丹治小兒數歲不語石菖蒲一寸九節逺志去心桂心去皮各一兩人參黃耆酸棗仁炒去皮黃連各半兩右為末鍊蜜丸雞頭子大每服一丸用生薑湯化下不拘時服菖蒲丸治小兒心氣不足五六歲一能言舌本無力發轉不得石菖蒲三錢人參去頭焙半兩丹參三錢麥門冬去心一兩焙稱天門冬去心一兩赤石脂二錢右為末煉蜜丸菉豆大或麻子大溫水下五七丸至一二十丸不計時日三四服取又有病後腎虛不語宜兼服錢氏地黃丸一方加黃連一方無人參芍藥湯治小兒心氣不足舌本無力語遲赤芍藥一兩黃耆銼三分犀角鎊檳榔銼甘草炙各半兩右粗搗篩每服一錢水一小鍾煎至五分去滓量兒大小不計時加減溫服治小兒五六歲不語者為心氣不足舌本無力氣轉不得用赤小豆搗羅為末以酒和塗于舌上即語神效桂菖散治小兒急中卒風失音不語立效一名二物湯桂心去皮一兩石菖蒲一分右為末三歲一錢水半盞煎三分不拘時候若大病之後不語者用豬膽汁調下未語再服一方治風寒邪氣留滯失音無語豬膽汁調菖蒲散治小兒卒然喑啞以菖蒲為丸五歲一錢麻油泡湯調下如卒然不語吐出風涎即瘥用好竹瀝飲之亦治噤口心熱不語粉薑散治小兒急中卒風不語以粉乾薑為末安少許在舌上時時用之立效雞頭丸治小兒諸病後不能語雄雞頭不炙鳴蟬三個炙燋甘草一兩銼炒大黃一兩取實處濕紙褁煨熱當歸去蘆頭三分兩切焙木通半兩黃香切焙川芎逺志去心麥門冬去心焙各三分人參半兩切去頂焙右為細末鍊蜜丸小豆大旦米飲下五丸空心日進三四服兒大者加之九服效雞蟬二物宜求死者用之不可旋殺孫真人所謂殺生求生去生更逺不可不知也犀角地黃散治血證心忪語短胘冒迷忘生地黃四兩淨犀角牡丹皮芍藥右銼每服四錢入桃仁去皮尖七粒煎服如無犀角以升麻代之亦治吐血衄血治桃仁湯治狐惑蟲食其臟唇生瘡其聲啞桃仁浸去皮槐子艾葉各一兩大棗十五枚右用水二中煎至一中半分三次服之治濕證聲啞以不換金正氣散加石菖蒲水煎服如寒證啞加桂少許治之治痰症聲沉以二陳湯加石菖蒲水煎吞白丸子妙治小兒遲語取白勞所踏枝鞭小兒令速語治小兒久不語取百舌鳥主蟲咬炙食之治孩兒語遲用社稷胙酒以少許喫治伏暑發熱汗渴暑入心胞不語以小柴胡湯加茯苓水煎服之普濟方卷三百六十六
