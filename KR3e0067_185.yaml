湯出衛生寶劒治風濕脈浮身腫汗出惡風防己二錢黃耆二錢半甘草炙一錢白术一錢半生薑一錢半大棗一枚破右㕮咀用水三盞煎至一盞半去滓溫分作二服芍藥飲出聖濟總録治風濕痺皮膚􅍙厚肌肉疼痛不可屈伸赤芍藥芎藭各四兩甘草炙三兩附子炮去皮二兩右銼如麻豆每服五錢水一盞半煎至八分去滓溫服不拘時海桐皮湯一名麻黃散出聖惠方治風濕痺不仁肢體疼痛海桐皮丹參桂去粗皮防己各一兩甘草炙麻黃去根節天門冬去心焙各二兩側子炮去皮半兩右銼如麻豆大每服四錢水一盞入生薑五片煎至七分去滓溫服不拘時小金丹蒼术威靈仙五加皮青藤根草烏生薑蔥白各一兩右用生薑蔥搗細將藥拌勻酒漬春夏三秋七冬十日為末酒糊為丸如桐子大每服十五丸二十丸溫酒下透骨通氣騙馬丹附子一個廣木香一錢川烏五錢虎骨五錢草烏三分細辛五錢乳香五錢當歸一兩沒藥五錢川山甲五錢兩頭尖五錢赤芍藥一兩五靈脂五錢右為細末酒和麵糊為丸如豌豆大每服三五丸空心溫酒一盞送下加至十五丸除濕丹治濕氣相搏腰膝腫痛足脛浮腫方見寒暑濕門中濕類舒經湯出德生堂治風濕傷手臂肩背上骨節疼痛手足不能動川羌活甘草各五錢當歸薑黃白术赤芍藥海桐皮各一兩右㕮咀每服五錢水一盞半生薑三片煎至七分去滓食後卧時服側子散出聖惠方治氣血虛風邪濕痺皮膚不仁側子一兩酒浸去皮臍牛膝一兩去苗白薑蠶一兩生天南星一兩生海桐皮一兩銼狼毒半兩醋煮半日切曝乾麝香一分研右為細散入麝香都研令勻每服不計時候以熱豆調酒淋下二錢治風濕痺青滕根三兩防己一兩右㕮咀酒瓶煮徐徐服之天雄丸出聖惠方治風濕痺手足攣急皮膚不仁天雄炮去皮臍麻黃去根節天麻桂心各一兩天南星三分炮羌活一兩雄黃半兩研水飛膩粉半兩乾蠍一兩炒麝香一分研硃砂一兩研水飛過烏蛇二兩酒浸炙令黃去皮骨牛黃一分研右為細末入研藥令勻煉蜜和搗二百杵丸如桐子大每服不計時候以豆淋下十丸萆􅐺丸出聖惠方治濕痺肢體疼痛不能行步亦治五緩六急宜服堅骨益筋養血固髮萆􅐺四兩牛膝酒浸切焙三兩丹參附子炮去皮臍白术枳殼去穰麵炒各二兩右為細末煉蜜和搗丸如梧桐子大每服三十丸溫酒下不拘時候代炙膏出御藥方大附子炮木香吳茱茰炒馬蘭子蛇床子桂心各等分右為細末每藥用半匙白麵半匙以生薑汁同前成膏以方圓三寸紙花子上攤在臍下油紙隔之綿衣裹之自晚至明一傅勝百壯如腰痛腰上貼之效風濕湯治風寒濕痺腰腳痛不能走著床當歸芍藥麻黃去根節白术甘草炒各半兩川烏炮去皮各一兩右為㕮咀每服三錢水一盞半生薑三片煎至七分去滓溫服食前日進三服全蠍乳香散出德生堂方治諸風濕遍身骨節疼痛不可忍者用此藥敷貼即住痛川烏頭生去皮臍馬蘭子各一兩全蠍川山甲炮乳香各五錢蒼术一兩右為細末用白芥子三兩研爛如膏和前藥末以紙攤藥膏敷貼痛處大妙熱甚即去藥再貼上防己湯出聖濟總録治風濕痺脈浮身重出汗惡風防己二兩甘草炙黃耆薄切各一兩白术一兩半麻黃去根一兩右搗篩每服五錢水一盞半入棗二枚擘破生薑三片煎至一盞去滓溫服空心一服夜卧併二服訖用椒蔥湯水浴以生薑酒糊投之汗出慎外風膚中當如蟲行防己飲出聖濟總録治風寒濕痺四肢攣急或身體浮腫防己桑根白皮銼桂去粗皮麻黃去根節各三兩白茯苓去皮黑四兩右搗篩每服五錢水一盞半煎至八分去滓溫服不計時黑弩箭丸出瑞竹堂方治風濕證兩頭尖五靈脂各一兩沒藥别研當歸乳香研各三錢右為細末醋糊為丸如梧桐子大每服十丸至五十丸臨卧溫酒送下忌油膩濕麵孕婦勿服飛步丸治隂陽風濕腳氣手臂舉動不起無問逺近並治之方見腳氣門風濕類養臂散出德生堂方治諸風濕流住經絡因下元虛極腰腿腳膝兩手四肢疼痛下截軟弱無力不能起動者纍用大有神效方見腳氣間門腳氣疼痛類芍藥飲出聖濟總録治風痺身體疼痛惡風赤芍藥麻黃去根先煮焙天門冬去心焙各三兩杏仁去皮尖雙仁炒黃五十枚右搗篩每服五錢水一盞半入生薑一片棗一枚切開煎至八分去滓溫服四物附子湯出千金方治風濕相搏骨節疼痛四肢拘急不可屈伸近之則疼自汗出而短氣小便不利惡風不欲去衣或頭面手足時時浮腫附子三枚桂心四兩白术三兩甘草二兩右㕮咀以水六升煮取三升每服三合微汗愈大汗煩者一服五合體重者加防己四兩悸氣小便不利加茯苓三兩既有附子另加生薑三兩巨勝浸酒方出聖濟總録治風濕痺腳膝無力筋攣急痛巨勝炒一升薏苡仁炒半升生薑一兩地黃一兩右銼令勻細生絹袋貯以酒二斗浸春夏三五日秋冬各六七日每服五合空心臨卧溫服牛膝頭浸酒方治久患風濕痺筋攣膝痛兼理胃氣結聚止毒熱去黑痣面黟潤皮毛牛膝浸酒切焙一斤大豆緊小者炒熟一斤生地黃洗切一斤右拌勻同蒸一鍋傾出絹袋貯以酒三斗浸經宿每服三合至五合空心日中夜卧溫服麻黃散出聖惠方治風濕痺針刺身體不仁汗出短氣不能飲食麻黃三兩去根節芎藭一兩莽草一兩炙當歸一兩銼炒桂心一兩天雄一兩炮去皮臍五加皮一兩杏仁一兩去皮尖雙仁麵炒黃白术一兩右為粗散每服四錢水一中盞入生薑半分煎至六分去滓不計時溫服治濕痺證麻黃半斤只去根甘草當歸各二兩右用河水五碗同煎至一碗半去滓好酒一碗同煎至半碗溫服治風濕痺腳氣痺厥腰腳不遂兼治一切風腳膝之疾麥麵末一斤鹽三斤右蒸令氣餾氊袋盛之以足踏踐袋上冷則易之暖手法針砂四兩硇砂研三錢白礬腳底黑者六錢右同研勻以醋或水拌令濕用油紙裹之盛在袋兒內任意執之冷即再拌蒼耳散治一切風濕痺四肢拘攣右用蒼耳子三兩為細末水一鍾煎去滓分作三服或細末水糊丸如梧桐子大每服五十丸溫酒吞下亦可薏苡仁粥治久風濕痺補正氣除胸中邪氣利腸胃消水腫久服輕身益氣力亦治筋脈拘攣右用薏苡仁一升為末以水作粥空心服亦可三頓食之治久風濕痺筋攣膝痛除五臟胃氣結聚益氣止毒去黑痣面黟潤皮毛右用大豆黃者一升炒令香為末空心暖酒調下一匙治風毒痺厥方右諸家皆用菵草今醫家取其葉煎湯熱含少傾間吐之醍醐方補虛去風濕痺右用醍醐二大兩暖酒一杯和醍醐一匙飲之治風痺及卒中右用生料五積散二錢順元散一錢水一盞半生薑五片同煎至八分去滓少熱服方見寒濕門中寒類側子散治風濕痺皮膚不仁手足無力一名側子湯方見著痺類蛜􅖉散治風濕痺身體四肢不仁一名乾蠍散方見著痺類白花蛇丸治風濕痺皮膚不仁肢節痛疼方見著痺類大八風散治諸緩風濕痺腳弱方巴戟天黃耆桂心細辛天雄萆􅐺蓯蓉牡荆子薯蕷菊花萎㽔山茱茰秦艽黃芩石斛白术礜石一作礬石厚朴龍膽人參蜀椒各半兩附子五味子各十八枚菖蒲茯苓牛膝千金異作干薑烏喙逺志桔梗三十銖芎藭白斂芍藥各六銖右三十二味治下篩酒服半即已三日未驗稍增令微覺一方無桔梗烏頭粥治風寒濕痺麻木不仁川烏頭生為末右以香熟白米作粥半碗藥末四錢同米用慢火熬熟稀薄不要稠下薑汁一恭腳許蜜三大匙攪勻空心啜之溫為住如是中濕更入薏苡仁末二錢增米作一中碗此粥大治手足四肢不隨痛腫不能舉者有此證預服防之左氏云風淫末疾謂四肢為四末也脾王四肢因風邪客于肝則淫脾為肝尅故疾在末殼氣引風濕之藥徑入脾經故四肢得安比湯劑極有力豫常制此方以授人服者良驗越婢湯治風濕疼痛腳弱不能行立麻黃六兩去根節白术四兩石膏半兩大附子一個炮去皮尖甘草二兩炙右為粗散每服四錢水一盞半生薑七片棗子三個同煎一盞去滓溫服取汁此藥大能散風濕風盛麻痺者可服蠲痛丸治風寒濕痺筋骨重疼走注攻刺腰腳無力並宜服之草烏頭四兩去皮尖鹽炒煙天南星二兩生京墨半兩燒破故紙三兩炒沒藥一兩研地龍二兩去土五靈脂二兩炒乳香半兩炒白膠香二兩鎔開潑淨石上冷研右為末醋煮麵糊丸如梧桐子大每服十丸溫酒下漸加丸數服夏英公酒浸飲子治風疾防風細銼萆􅐺羌活秦艽牛膝敗龜虎骨桔梗晚蠶砂炒黃各二兩蒼耳五升去刺捶碎酥炙乾茄根八兩洗銼蒸枸杞子炒五兩右十二味用好酒三斗浸瓶盛封蔽二七日開不得向面恐氣衝頭目每日午時空心及早辰各服一盞常令有酒氣一月除一切風毒濕痺癱瘓等疾神力丸出楊氏家藏方治風寒濕痺四肢拘攣腳膝疼痛客摶經絡筋骨無力及癱緩嚲曵並宜服之牛膝去蘆酒浸焙乾何首烏蓯蓉酒浸焙乾川椒去目閉口炒各二兩木鱉子去殼天南星炮茴香炒防風去蘆萆􅐺附炮去皮臍地龍去上微炒羌活去蘆烏藥金毛狗脊去毛白蒺藜炒去刺黃耆赤小豆覆盆子骨碎補去毛白附子以上十六味各一兩右件為細末酒煮麵糊丸如梧桐子大每服三十丸至五十丸空心溫酒或鹽湯下牛膝丸出楊氏家藏治諸風濕痺四肢拘攣腳膝疼痛腳氣等疾牛膝酒浸宿焙乾川芎肉蓯蓉酒浸宿焙羌活去蘆當歸焙麻黃去根節杜仲去皮薑汁浸銼炒赤芍藥木香沒藥别研乳香别研木瓜附子炮去皮臍萆􅐺大復皮五加皮薏苡仁炒續斷右件等分為細末煉蜜為丸如梧桐子大每服三十丸溫酒送下空心食前石斛丸出楊氏家藏方治風濕客摶經絡筋骨冷疼四肢重痛石斛去根一兩牛膝酒浸宿焙干肉蓯蓉酒浸宿焙干杜仲去粗皮薑汁浸炒各一兩金毛狗脊七錢半去毛木香一兩牡丹皮一兩人參去蘆七錢半黃耆一兩山茱茰七錢半防風去蘆半兩羌活去蘆七錢半川芎半兩檳榔一兩半熟地黃一兩半右件為細末煉蜜為丸如梧桐子大每服五十丸溫酒或鹽湯送下空心食前中行丸出楊氏家藏方治風濕毒氣客摶經絡流注作痛白芍藥五兩甘草三兩炙犀角屑三兩葳靈仙去土一兩右件為細末煉蜜為丸如梧桐子大每服五十丸溫熱水下不拘時候服忌茶六月河中諸熱砂觸主風濕頑痺不仁筋骨攣縮腳疼痛冷風襲癱緩血脈斷絶出本草取乾沙日曝令極熱伏坐其中冷則更易之取熱微通汗然隨病進藥及食忌風冷勞復治風寒濕痺咳逆上氣開心孔補五臟通九竅明目耳出音聲以菖蒲採緊小似魚鱗者治擇一斤許以水及米泔浸各一宿又刮去皮切曝乾揚篩以糯米粥和勻更入熱蜜搜丸梧桐子大絺葛袋盛置當風處冷乾每日以酒飲任下三十丸臨卧更服二十丸久服得效治風濕痺拘攣出本草以柴胡作湯浴之治風氣濕痺膝腳痛出本草用牛膝葉一斤切以米三合令豉汁中相和煮作粥和鹽醬空心食之治風濕瘙癮疹身癢痺出本草用蒴藋作湯浴之亦以酒浸根稍食之治腰腎濕風痺常如水洗者出本草取鰻鱺魚以五味米煮空心食之甚補有濕腳氣人服之良治大風濕痺不得屈伸出本草用赤車使者根以八月九月採之日乾浸酒服治四肢濕痺不得屈伸出本草菖蒲作湯浴之治男子婦人虛濕痺毒風痺痛去男子腰痛浴男女隂去風冷火薀陽事主大風身癢出本草以蛇床子煎浴之即瘥治久風濕痺四肢拘攣骨肉疼痛用伏牛花湯浴之一各隔虎利花導引法養生方去任縱臂不息十二通愈足濕痺不任行腰脊痛又正卧疊兩手著背下伸兩腳不息十二通愈足濕痺不任行腰脊痛痺有偏患者患左壓右足患右壓左足久行手亦如足周行滿十方止又云以手摩腹從足至頭正臥伸臂導引以手持引足注任臂閉氣不息十二通以療痺濕不可任腰脊痛普濟方卷一百八十五
