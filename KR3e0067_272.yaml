body:
  text: 普濟方卷二百七十二明周王朱橚撰諸瘡腫門諸瘡腫附論夫瘡腫以手指從瘡傍按闕者按之色不變膿已結成又按之隨手赤色此亦有膿按之白良久方赤逰毒已息可就赤白色盡處炙斷瘡肉平實久而赤腫自消也凡溻漬瘡腫之法宣通行表發散邪氣使瘡內消也蓋湯水有蕩滌之功瘡腫初生一二日不退四肢者溻漬之腰腹背者淋射之其下部委曲者浴漬之此謂速道腠理通調血脈使無凝滯也且如藥二兩用水二升為則煎取一升半以淨帛或新綿蘸藥水稍熱溻其患處漸漸喜溻淋浴之稍涼則急令冉換慎勿冷用夫血氣得寒則凝澀得熱則淖澤日用五七次病甚者日夜不住或十數次腫消痛止為驗此治瘡腫神良之法也許真君云凡瘡須推究證候消詳苗根走胤不止先看血色鞭用手尉之如紅氣朝可以治黑氣朝其病難治急用藥截之服奪命丹返魂散裡托如痛慢不走胤不破則用膏藥傅之如頭上有瘡兩手足上大指節正傍刺血看之知瘡緊慢如不見血手腕後四指骨上針破浮皮有紅血出可下藥如黑血出不可下藥更於兩肘上四指下針破浮皮血出紅色可下藥黑色不可治闕坐耳對於著骨又念患人低頭用兩大指甲搯定破闕血出可治無血又去頭心用指甲捻著沉處用針刺破浮皮如闕藥在瘡口內用綿花子就血封定疼痛不可忍者其闕出者可以治之痛無汗出血黑色者乃死證也如治闕外人勿入房人來相覷亦不得食蔥韭蒜葷闕麵十日外可得食也又云下利已腫處未消者可除大黃用生地黃及乾地黃隨時也熱漸退餘風未歇者可服五香連翹湯除大黃餘熱未消可傅升麻膏假若失時不消成膿者用火針膏散如療癰法凡痛病喜發四肢其狀赤脈起如編繩急痛狀熱闕喜從腨起至踝亦如編繩故云㾫病也發於腎喜著腋之下皆由久勞熱氣盛為濕涼所折氣結筋中成此病也若不即治其久漬膿亦令人筋攣縮也若不消漬其熱氣不散多作踵病漏蘆湯主之㵼後鋒針數針去惡血氣針㵼其根核傅其小豆末取消為度又用治丹法治之亦用治癰三味甘草散傅之若潰傅膏散如癰法方解毒丸出德生堂方治一切諸毒瘡痍咽喉腫痛貫仲茯苓黃藥子藍根乾薑地黃雄大豆甘草滑石縮砂仁隂地厥薄荷各二兩土馬鬃菉豆粉益智仁寒水石山豆根紫荷車馬屁勃草龍膽白殭蠶炒百藥煎大黃各一兩右各洗淨焙乾為末然後蒸餅丸如小彈子大每一丸細嚼新水送下小兒一丸分作四服熬薄荷湯候冷磨下用銀箔為衣乾地黃丸乾地黃四兩大黃六兩桂心王不留行黃芩麥門冬去心逺志升麻人參甘草炙枳實炙各二兩芍藥茯苓各兩右搗篩蜜和丸如梧桐子大酒服十丸日三加至二十丸常服令人肥健撮毒散治一切硬腫癤丹瘤刃傷湯火燒車輾馬踏等傷之證檳榔山梔子白龍白芨白斂白芥子五靈脂木鱉子右各等分為末如瘡破揾乾貼如腫硬水調掃於瘡上立效如聖散蒼术十六兩去皮防風八兩去蘆白芷八兩細辛五兩去苗川芎十兩川烏八兩草烏四兩右都生為細末善治金刃所傷如覺傷著藥到血定以軟帛牢繫定舊瘡多日不可去瘡痂口噙漿水洗淨揾乾貼三兩上即愈蛇蛟蝎螫漿水洗淨用藥貼一切小蟲傷無口者唾津調藥搭上立愈狗咬著口噙水洗淨用藥乾摻止即愈破傷風初發覺時用藥一錢熱酒一盞調服衣服蓋了如重車行五七里汗出為驗如無汗再服半錢涎出為驗蜘蛛咬傷病重每服一錢半多時汗不出再加藥一錢依前投之涎出為驗蜘蛛咬傷津唾調搽疼處婦人洗頭風用藥一錢酒調服汗出為度腫癤丹瘤其痛處不止新汲水調藥毛翎搽上三兩畨痛即止湯火所傷新汲水調藥揭去死皮掃之魚睛麻根紅絲疔瘡發背搭手疽鬢疽裏外膁瘡覺痛時新汲水調藥塗上用藥一錢酒一盞服之即愈牙痛腫脹者即用藥搽立愈偏夾正腦風噙水鼻內搐之吐水涎出即可立愈如乾癩風遍身麻木常服此藥無不治之若新杖瘡血亦用藥摻上止痛不發其效不可具述此真祕方也復元通氣散出德生堂方治氣不宣流或成瘡癤并掞挫脹脅氣滯不散及癰疽作焮赤初發疼及膿已潰未潰小腸氣腎癰便毒腰疼氣刺腿膝生瘡及婦人吹妳乳癰茴香炒穿山甲蛤粉炒去粉各二兩延胡索去皮白牽牛炒甘草炒陳皮去白各一兩右為末每服一錢熱酒調服不飲酒木香湯調服一方有當歸病在上食後服病在下食前服又方療諸惡腫瘡頭瘡百雜瘡黃連黃柏附子雄黃水銀䔧蘆各一兩胡粉二兩右為末以臘月豬脂一斤和藥調器中急密塞口蒸五斗米下熟出內水銀又研令調密藏之有諸瘡先以鹽湯洗乃傅上無不瘥者又方出瑞竹堂方治瘡腫濕兼下疳者黃連生用輕粉海螵蛸生韶粉蛤粉生橄欖核燒灰黃柏皮各五錢右為末乾貼瘡上愈梔子湯治表裏俱熱三焦不消食身體生瘡或發癰癤大小便不利芒硝湯澄下甘草炙各二兩黃芩知母各三兩大黃四兩别漬梔子七枚右切以水五升煮四味減半下大黃煎至一升八合去滓內芒硝分三服廣濟飛黃散療諸惡瘡腫雌黃白礬石磁石雄黃曽青丹砂各一兩右各細研依四方色以藥置色處曾青東方丹砂南方白礬石西方磁石北方雄黃中央瓦甕二枚以黃泥下冉三過使厚五六分以雌黃屑著下合篩諸藥著上後以半雌黃屑覆上以泥密塗際勿令泄氣上須厚一宿如常點火點火用二年陳蘆作樵中調火以新布沉水覆釜上乾復易九十沸止若日暮七十七沸亦足止大熱一斛米飯頃發出藥細研貼瘡其瘡惡肉青黑乾不復出汗愈無甕以土釜二枚如上法治黃耆湯治一切瘡腫疼痛并冝服黃耆當歸各一兩大黃芍藥各五錢陳皮甘草各三錢炒右為粗末每服五錢水一大盞生薑三片同煎至七分去滓溫服不拘時候當歸散出濟生拔粹方治瘡已破未破赤焮腫疼甚不可忍當歸黃耆栝樓木香黃連各等分右為末水服煎無時如痛而大便祕者加大黃三錢療散發生瘡赤焮及丹走皮中浸淫取赤臼一片燒令赤置酢中搗作細末敷燥更易以瘥為度療瘡腫方用甘蕉根傅之瘥又方治外風入瘡口腫痛用劉寄奴末摻瘡口止痛五黃膏治一切瘡腫大黃黃柏黃芩黃連薑黃各等分右為細末冷水調傅立效丸蟾酥一錢硃砂龍腦麝香五分右為細末用頭首孩兒乳汁為丸如黃米大每服二丸多效癰腫溫酒送下鼻衄芥子湯下心痛小腸氣茴香湯下小便不通雄鼠糞煎湯下㵼血生薑湯下咳嗽同上小兒驚風沙糖水下白痢乾薑湯下傷食隨所傷物下小兒㵼芝麻煎湯走疼走痛茶下噎食米湯下小兒熱風薄荷下遍身疼痛醋湯下人著鬼祟桃李湯下渾身黃腫木瓜湯下大小便不通墨水下産後遍身疼痛小便酒乳香湯下産後發寒熱蜜水下産後發寒煎金銀花湯下胎死不下童子小便荆芥湯下經絡不行酒煎當歸散湯下鼻衄不止口噙水嗅一丸心疼醋湯下臍下虛冷溫酒下渾身虛腫氣不通酒下臍下水氣煎葶藶湯下若四肢冷背強空心酒下三四丸如人行四五里冉服四五丸然後喫鹽蔥白粥後蓋覆出汗立效脾胃不利煎水榖湯下血漏崩火燒蠶子灰冷水下血迷煎血見愁湯下胃虛冷丁香湯下化堅湯出濟生拔粹方治瘡難消又不能作膿者地骨皮一兩木香五錢穿山甲二錢半麝香右為細末溫酒調下及治小兒班疹疳瘡癰腫以米湯調下何首烏散出醫方集成治遍身瘡腫癢痛防風苦參何首烏薄荷各等分右為粗末每用藥五錢水酒各一半共用一斗六升煎十沸熱洗便於避風處睡一覺其痛甚者三日愈內托黃耆散出瑞竹堂方治諸瘡證腫痛黃耆連翹葛根甘草右等分為末每服三錢水一盞半煎至六分去滓食前溫服治腫毒方知母貝母黃柏皮芙蓉葉右為細末在上蜜調傅在下米醋調傅貼瘡腫以山慈菰取莖葉搗為膏入蜜貼瘡口上候清血出效蜀椒方治瘡腫以生椒末麵釡下土末之用大醋和傅烏金散治諸瘡腫用鯽魚一個約重六兩者去腸用柏葉碾細入魚腹內用紙裹數重次用黃泥固濟煆存性候冷碾成細末輕粉一分同勻如瘡乾用麻油調瘡濕乾用治瘡中有風水腫痛祕澀青蔥乾薑黃蘗右同相和煮作湯浸洗之立愈全蝎散治外風入瘡口腫痛全蝎一個白殭蠶一個去絲蟬蛻三個右為末擂生薑自然汁調塗之治腫毒方用帶泥山藥萆麻子糯米為一處水浸研為泥敷腫處即愈二聖散治諸瘡腫淄丹二兩白礬二兩飛右為細末每用乾摻瘡口上後用保生錠子揑作餅子貼之透經丸治熱毒腫瘡大黃二兩黑牽牛二兩五錢半生半熟右為細末用皂角十枚揉碎水煮至熟去滓用汁搜藥和丸如桐子大每服二十丸漸次虛實加至四十丸用溫水送下又方治諸瘡腫用撫芎不以多少煆過入輕粉用麻油調塗如瘡濕乾摻追毒烏金散治瘡內惡肉追毒潰膿巴豆五錢寒食麵一兩右用水和麵作餅子將巴豆包定休令透氣以文武火燒深黑色為細量瘡口乾貼之白芷散治腫毒暑毒水刺腫手背用小烏頭香白芷末水調傅腫處又方治腫毒白礬一兩巴豆二十一個去殼右藥同入銚內滚數沸礬花開豆色黃黑頓冷去豆碾為末用􅓗管吹入喉內即愈治諸瘡腫痛不可忍者出濟生拔粹以葵花根去黑皮搗若稠點井花水少許若不稠不須用水以紙花如膏貼之治諸瘡腫出應驗方以馬牙齒燒作灰和唾調於絹帛上貼之療面目手體生班或癢或瘭子腫起不即治之甚殺人出肘後方用羚羊角燒為灰研令極細以雞子清和塗之極神驗無雞子水和塗之甚妙治熱毒瘡并腫方用家鴨糞以雞子調傅內消治諸瘡癰腫不散者取白藥根搗爛傅貼乾則易之無生者用末水調塗之亦得治諸處皮裏面痛取何首烏以薑汁調成膏痛處以帛子裹之用火炙鞋底尉之妙治瘡腫用象膽以清水和塗瘡腫上并瘥治風癢及諸瘡腫瘑瘡疽癢久不瘥有蟲者煮羊桃洗之佳羊桃多生溝渠陘塹之間少加鹽豉尤妙或用枝葉煮洗亦佳治瘡腫出本草以蒺䔧蔓洗三寸截之以水五升煮取三升去滓納銅器中又煮取一升納小器中如稠糖取傅瘡腫上治手足腫及熱瘡兼治熱毒丹瘡出本草以田螺生研汁傅之牛蒡粥方療瘡腫取牛蒡根三莖淨洗煮令爛於盆中研令細去筋脈汁中即下米煮粥鹹淡任性服一碗甚良無忌食訖含生乾地黃丸如胡桃大除熱補益也穿山甲散出宣明論治一切通氣破瘡腫行膿血穿山甲木鱉子烏龍角各等分俱燒存性右為末每服一錢五分空心熱酒調下至午瘡破膿血便行浴毒湯出御藥院方治諸瘡疼痛堅硬不消及破後膿水不絶惡肉未退好肉不生以乾艾葉半兩用何首烏粗末一兩水一大碗同煎至半濾去滓稍熱洗冷再暖療一切瘡腫及風丹遍身如棗大出本草以雞腸草燒作灰和鹽傅之一方搗汁傅瘡亦可煮作菜食之或取末以豬脂調傅此藥極效五月五日收得者驗治瘡腫未得頭破者三日後出本草取冬葵子一百粒吞之當日瘡頭開摩風膏出瘡科精要治頭靣五發瘡腫疥癬等疾及湯火破傷摩風滅瘢痕白附子白芍藥白茯苓零陵香白芨白斂白芷白檀藿香升麻細辛黃耆甘草杏仁去皮尖各半兩黃蠟六兩腦子一分大栝蔞二栝蔞根一兩芝麻油一斤右凡藥十四味銼油內浸百日於臘日慢木炭火上銀石器內煎至白芷微黃色離火入栝蔞二味著內煮百沸重綿濾去滓再慢火上錬油香下削淨黃臘鎔開為度傾在磁器內收貯上摻腦子密封旋用摩風塗之治瘡腫出本草以蛇莓草㶸之治諸瘡因風致腫出本草以櫟木皮根三十斤銼以水三斛濃煮內鹽一把漬瘡出膿血日為之瘥止將軍鐡篐膏出德生堂方治諸惡毒瘡紅腫突起用藥篐瘡四圍不令滋蔓走疰毒氣南星一兩草烏三錢川烏五錢雄黃三錢大黃一兩鹽霜白梅一兩蒼耳根一兩白芨防風白斂各五錢右為細末先用蒼耳根鹽梅搗爛和餘藥調成膏如乾入醋調得所於瘡四圍用藥作鐡篐塗上止留瘡髙突處藥乾以雞翎蘸水掃之日換二三次大妙治諸瘡腫馬毒瘡出本草以馬齒莧水煮冷服一升及塗瘡上治濕癬白禿以馬齒膏和灰塗之效治緊脣靣腫搗汁塗之冬月乾末水調塗治丹毒發背腫搗傅之不住者以藍靛和之更佳治多年惡瘡搗爛傅之尤良治三十六種風結瘡取馬齒莧一石水二石一釜煮之澄清內蠟三兩熏煎之成膏塗瘡上并服之療毒瘡腫疼號呌臥不得久不瘥者出手集方取獨頭蒜兩顆細搗以麻油和厚傅瘡上乾即易之頃年盧垣侍郎入東畿忽肩上瘡作連心痛悶用此便瘥後李僕射患腦癰久不瘥盧與此方便愈絳得此方傳救數人無不神效治因瘡而腫紅赤皆因中水及中風寒所作其腫入腹則殺人出本草多以桑灰淋汁漬冷復易取愈梅師方同治熱瘡惡腫出本草以青黛摩傅之治瘡腫除膿血生肌膚長筋骨出本草以楸葉搗傅上亦煮湯洗膿血冬取乾葉湯揉用之治瘡腫除血長膚出本草以紫荆木煮汁洗之破棺丹出衛生寶鑑治瘡腫一切風熱大黃一兩半生半熟甘草一兩芒硝一兩右為細末錬蜜和丸如彈子大每服半丸食後溫酒化下童子小便半盞研化之忌冷水如聖散出華陀中藏經中治一切無異色瘡腫消毒并閃肭折傷接骨定痛活養血脈已破者不可用赤小豆一升川烏頭一兩草烏頭一兩炮乳香五錢藝臺子一兩右件同為細末每用一錢入白麵一錢瘡腫用水調稀煮一兩沸放溫攤紙花上貼患處傷折用醋調膏損用黃米粥調可患處大小治之用帛子纒繫或以沙木箆夾五日一換六十日當瘥治結成腫未實潰小便不通者出百一選方以蔥不拘多少碎切入麻油內煎令黑色去蔥不用只收油趂微熱通手逐旋塗上自消蘇龍丸一名神明膏出衛生寶鑑治一切瘡腫傷折摩風止痛酒調一錢服下如有口瘡含化每日塗之或口靣風癬瘙癢遍身瘡疼痛并塗膏摩令熱赤即佳耳鼻中有肉鈴用紙撚子每日一點一月取下久瘡及治小兒瘡瘤湯火傷但是痛處貼著便愈其次等膏可去靣油偏治肺風黑點滅瘢痕出顔色生瓜蔞一個去皮用仁赤芍藥甘草杏仁湯浸去皮尖當歸人參桃仁去皮尖各一分川芎蒼术桑白皮各半兩沉香研極細零陵香藿香各半兩右并細銼以清麻油十五兩浸四十九日候日足先傾出油再以活炭火煉令香熱放冷入諸藥文武火養自曉至昏黑候藥色半焦用生絹濾去滓却入大鵝梨一枚裂取自然汁并黃蠟一兩半麝香一分重煉候油不滚起即成蓋梨汁盡故也入細研生腦子末一分或半分攪勻重後以新綿濾入通油瓷合中所餘藥次滓日再以油六兩煉半日濾出仍却入鵝梨一箇取汁蠟一兩半麝香一錢研用候油不滚起更入腦子半錢細研攪勻濾出取如前法為次等膏貫衆湯出衛生家寶方洗瘡腫不散貫衆不拘多少茱茰三五錢朴硝三五錢右用淡醋半升水二升同煎至二十沸去滓先薰通手洗之消毒犀角散治一切諸般大人小兒瘡癤眼目口舌咽喉臉腫腮結核癰遍身小兒瘡疹疸毒赤㿔三四服快透消毒神效防風八分荆芥三錢半甘草一錢牛蒡子一兩右㕮咀每服三錢水一盞半煎至一盞食後三服靈鼠膏出經驗方治瘡腫去痛以大黃鼠一枚渾用清油一斤慢火煎鼠焦於水上試油不散即以綿濾去滓澄清重拭銚子令淨以慢火煎上件油次下黃丹五兩炒令色變桞木箆子不住手攪令勻再於水上試滴候凝即下黃蠟一兩又熬帶黑色方成膏然後貯於瓷合器中候硬合地上出火毒三兩日傅貼瘡腫去痛而涼瘡癤瘤腫出儒門事親夫大人瘡癤小兒赤瘤腫之疼痛不止內經曰夫諸痛癢瘡痬皆屬於心火可用一呪法禁之法者是心法呪白龍鬼流兮諸毒腫癰瘡膿血甚發痛至心稱念大悲呪三唾毒腫隨手消右一氣念呪三遍用望日月燈火取氣一口吹在瘡腫丹瘤之上右手在瘡上虛收虛撮三次左手不動每一氣念一二遍虛收虛撮三次百無禁忌用之時心正為是此法得於祖母韓氏相傳百餘年用之救人百發百中若不食葷酒之人其法更靈病瘡腫者大忌豬魚兔發熱動風之物此法不得輕侮無藥處可附之諸瘡附論諸瘡雖不能害人然浸淫無巳亦有多年不獲愈者此皆心腎不濟飲食不節腸胃停留以致風毒與血氣相傳凝滯於肌肉之間而發露也其名目療治有異焉凡人體虛感受風熱濕毒之氣發為瘡痛癢焮腫身熱多汗是為惡瘡或生於手足間相對如新茱茰癢痛拆裂搔則黃汁淋漓有孔如窩久而生蟲是為窩瘡或初生如飯粒漸大而有根頭破血流膿出肉反如花開之狀是為反花瘡或初生甚小先癢後痛汁出浸淫濕爛肌肉延至遍身若從口發出流散四肢者輕若從四肢發生然後入口者重是為浸淫瘡或生於兩耳鼻面間及下部諸竅侵蝕筋絡月中則瘡甚月末則瘡衰以其隨月而生是為蝕月瘡小兒耳下瘡亦名月蝕或毒氣攻於手足指拿肉裡指甲疼痛出血瘡中有蟲是為甲蛆瘡或指頭先腫焮熱掣瘡然後於瓜甲邊結膿甚者瓜甲俱脫是為大指或人稟性畏漆見漆則中毒面癢而腫繞眼微赤癢處搔之隨起㾦㿔重者遍身如豆如杏膿焮作痛是為漆瘡或盛夏腠裡易開風熱毒氣轉於皮膚輕者狀如撒粟重者熱汗浸瀆匝匝成瘡曰痱瘡或神心鬱燥遍身發瘡多出膿血赤爛如火曰熱瘡或身觸風寒冷氣以致血澀不行其瘡頑滯不知痛癢經久難瘥曰冷瘡或身發瘡腫非癰非疽非癬非疥狀如惡瘡或瘥或劇曰無名瘡或頭生白團班剝如癬上有白皮久則成痂遂至滿頭瘡中有孔有膿細蟲入裡不痛微癢小長不瘥曰禿瘡或風熱毒流注兩腳生瘡腫爛疼痛步履艱難惟生於膁骨者為重曰膁瘡以其骨上肉少皮薄難愈至有多年無巳瘡曰口開瘡皮爛骨見臭穢可畏者先當取蟲然後傅藥或淫夫龜上生瘡其初發如粟拂之則痛由是出清膿作臼孔侵觸臭爛日漸大痛曰妬精瘡以婦人先有宿精在內或月水未斷與之交接滌穢不前傳氣而作婦人亦有生於玊門者曰隂蝕瘡或滿頰滿項發如豆梅癢而多汁延蔓兩耳內外濕爛如浸淫瘡之狀曰走皮延瘡田野呼為悲羊瘡已上數種名目不同治各有方方療天下雜瘡丹砂雄黃芎藭椒防已各五分龍膽梧桐皮柏皮竹茹桑白皮蜂房蝟皮各四兩蛇蛻皮一具右切以苦酒浸半月微火煎少時乃內蠟月豬脂三斤煎三上三下去滓以傅瘡上并服如棗核大良又方剪草胡礬硫黃白芨紫荆皮各等分班貓少許右為細末入大楓油和勻若病攣身生瘡癢甚者揉之後痛不可忍用此藥再加香油調擦渾身旬日之後肌體妙復加味當歸飲子治瘡癢諸痛癢瘡皆屬心火火鬱則發之當歸生地黃升麻各五錢防風二錢半荆芥穗何首烏各二錢白芍藥柴胡川芎羌活黃耆各三錢紅花蘇木甘草各一錢右㕮咀每服五錢水二盞生薑三片同煎至八分去滓食後臨卧通口服沐浴取微汗效速使血氣通和服之應效何首烏散出楊氏家藏方淋泄諸瘡何首烏威靈仙苦參艾葉荷葉各三兩右件㕮咀用水五升煎數沸乘熱薰病處通手即泄洗如腳氣小腸氣去苦參加蛇床子二兩治諸瘡取鯽魚燒以醬汁和塗之治瘡瘍方石膽丹砂雄黃礬石磁石右用黃堥黃堥即瓦合也治藥於其中燒三日三夜其煙上者以雞羽掃取注瘡中惡肉破骨則盡出即愈嘗謂雄黃治瘡癢尚矣周禮瘍醫凡療瘍以五毒攻之鄭康成注云醫方合五毒之藥即此楊大年筆記其事族人楊嵎年少時有癢生於頰連齒輔車外腫若覆甌內潰出膿不輟吐之楚痛難忍療之百方彌年不瘥人語之依鄭法製藥成注之瘡中少頃齒骨連兩牙潰出遂愈後便安寧信古方攻病之速也作之合黃堥音武若今市中所貨有蓋瓦合也近世合丹藥猶有用黃瓦􅀈亦名黃堥事出於古也麝香輕粉散治血疳瘡隂蝕疳瘡耳疳瘡一切惡瘡皆治輕粉麝香各五分乳香沒藥白礬飛過各一兩右為細末量瘡乾貼五香湯治諸瘡毒氣入腹托裏兼主熱毒氣卒腫痛諸發或結核似癰癤而赤使人頭痛寒熱氣急者數日不除殺人疾速愈後毒或觸犯再腫宜服丁香木香沉香乳香麝香各一兩右為細末每服三錢水一盞煎至六分去滓空心稍熱服嘔者去麝香加藿香一兩渴者加人參一兩大抵專治毒氣入腹煩悶不通者其餘熱渴昏昧口燥咽乾大便硬小便澀者未可與服治諸疾瘡菉豆粉一斤獨顆蒜五十個藜蘆一兩蝸牛一百五個活者右將蒜粉蝸牛一處炒黃色晒乾與藜蘆相合為細末調擦瘡上後用紙花貼定以新汲水時掃勿令乾消毒散治諸般瘡疾大力子四錢荆芥二錢防風四錢甘草二錢右為末每服二錢水煎一盞調服葵花散治一切瘡一名百花散鬱金黃連黃柏梔子仁葵花各等分右為末冷水調成膏貼瘡痛處神效治瘡洗方古大墓多石灰汁夏月行人有瘡者見墓中清水因自洗浴瘡偶愈於是諸病者聞之悉往洗之轉有飲以治腹內疾腹上臍右近下瘡柴胡一錢升麻半分石膏一分當歸梢半分黃芩三分黍粘子二分蘇子半分連翹一分生甘草半分生京三稜五分炒黑色右為粗末作一服水煎去滓服赤豆散赤小豆吳茱茰赤色白膠厚黃柏黃連貝母硫黃糯米焙乾各一分虢丹煆半分右為末麻油輕粉調抹槐枝煎湯先洗後抹苦參散治肺風上攻眉額生瘡苦參藍葉威靈仙去土蔓荆實去皮何首烏荆芥穗胡麻子烏藥挫天麻右等分為散每服二錢食後溫酒調下日三夜二洗瘡苦參荆芥防風露蜂房木鱉子五倍子地骨皮桑白皮白殭蠶右各等分水煎薰洗瘡處佛手散治諸瘡痛不可忍米殼四兩人參六分半川芎陳皮六錢半沒藥乳香二錢半麻黃一兩當歸一兩甘草五錢右為粗末每服三錢水煎服蕪荑散治瘡久不瘥蕪荑藜蘆各一兩薑黃青礬雄黃各一分苦參沙參各三分附子一枚右治下篩先以藍汁洗瘡去痂乾拭傅上小兒一杪久剝去之大人半日才剝再傅不過四三度愈治膿泡諸瘡出應驗方大腹子當歸鬚各一兩全蝎一錢地花椒三錢生硫黃荆芥各三錢蛇床子一兩枯礬少許右為末香油調傅愈風散治風寒暑濕等瘡並皆治之其效如神菊花去枝梗烏頭炮烏蛇炙地骨皮川芎桔梗苦參各三兩草烏炮二兩右為㕮咀每服三兩用好酒一瓶浸七日取出溫服一盞日食三次忌發風等物神祕方一名地黃膏出肘後方療一切瘡已潰者及炙貼之無痂去肉生膿地黃汁一升松脂二兩重薰陸香一兩羊腎脂及牛酥各如雞子大先於地黃汁煎松脂及香令消即內羊脂酥并更用蠟雞子大一時相和暖火煎水盡成膏去滓塗帛貼瘡日一二易故緋一斤亂髮一雞子大許療年深者十餘日即瘥生肉八仙散穿山甲炮白藥子瓜蔞仁大黃木黎槐花白礬山梔子右等分停生用水一大盞煎過舍上迎露日未出面東服之金黃散出御藥院方治諸瘡痬癢極發疼乳香三錢半輕粉一錢白龍骨一兩半瓦粉二兩半滑石二兩黃柏二錢寒水石右同為細末各研令細每用藥少許時乾摻患處用油調之搽亦可聞香散治一切瘡硫黃蛇床子黃連黃柏輕粉大椒右為細末用芝麻油調搽瘡上將手鼻聞香白散子止痛生肌滅般痕牡蠣三兩煆研寒水石一兩半大煆南星炮白殭蠶龍骨已上各三分右細研摻瘡口避風將息勿令見水又蟾蛻為末傅瘡口上瘡藥消風散蔥白十莖細搗豬油去膜搗白礬輕粉水銀各等分右為末調傅之傅瘡如聖散全蝎五錢全者紫荆皮一兩明礬八錢白芨一兩斑貓二錢去翅右碾細末如病人腿腳破裂肉皮潰爛腳底穿心用蔥鹽湯洗瘡口用水調敷患處如乾再用水潤後瘡靨自落其瘡即愈大有神效內托散治男婦人諸般瘡疾兔絲子大力子破故紙朴硝川大黃各五錢右為末每服七錢在上用食前在下食後應露服之如神大效當歸和血散治瘡瘍未發出內痛不可忍及婦人産前産後腹痛當歸二錢沒藥二錢半乳香五分白芍藥三錢右為細末每服一錢水一中盞煎至七分和滓溫服日二婦人酒煎瘡既發不須用瘡瘍者加人參木香婦人加赤芍藥黃蘗散出神效方治鵬窠繳腰等瘡黃蘗白芨白斂各等分黃丹少許右為細末涼水調塗復堅散出濟生拔萃方治瘡太陽夲經獨活五分羌活一錢半防風五分藁夲一錢半調經中血氣黃芩生地黃知母各一錢黃連黃蘗各一錢半俱用酒洗散瘡結聚防風梢五分當歸身連翹各三錢益元氣㵼火於三焦黃耆一錢半人參五分甘草一錢炙生甘草梢五分㵼腎間火補下焦元氣補胃橘皮五分除膀胱留熱漢防己五分酒洗澤㵼丹參桔梗各一錢右㕮咀作三服水三盞浸半日煎至一盞去滓稍熱服將二服滓更作一服服藥後不得飲冷水恐作膿治瘡方出百一選方白礬虢丹飛膠香各五文乳香右同為末用麻油少許輕粉十文同調傅之治瘡巴豆十四粒去殼麻油二兩黃蠟少許輕粉右同煎巴豆焦黑為度去巴豆不用入黃蠟輕粉攪勻如面油搽瘡上治一切瘡出仁存方鹿黎根蛇床各半斤真剪草四兩用雞腸草亦可硫黃三錢右為末入輕粉同研勻麻油調傅小兒以麻油調點在絹衣上著衣七日不解其瘡自愈又方出仁存方雄黃四兩硫黃四兩松糖四兩明礬四兩枯右用好砂合盛硫黃松糖相和著在合內外以赤石脂固濟封口用炭火煆通紅候冷取出入雄黃白礬共為末麻油調傅治諸瘡出應驗方平胃散二兩明礬一兩枯黃丹五錢芙蓉葉一兩末右同為末用蔥川椒煎湯洗以前藥傅之愈殺蟲方出危氏方雞心檳榔一兩黃連穿山甲十個燒存性麝香五分右為末用蠟茶末調塗三五日後用蔥湯洗龍骨散出聖濟總録治髮際瘡初生如黃米大或瘍或痛龍骨烏賊魚骨去甲胡粉各半兩鉛丹一錢炒紫色右研細先用鹽湯洗了貼之日三五上三黃膏出危氏方治一切瘡痛青油三兩煎巴豆二十粒微黑色去巴豆入黃蠟一兩化訖研雄黃硫黃各一錢溫入成膏淨洗抹傳之二三次效疹豆後瘡亦用百合散出聖濟總録治頤頦瘡一名獨骨瘡百合黃蘗各一兩白芨一分萞麻子仁五十粒研右為散用朴硝水和作餅貼之日三五上紅粉散出聖濟總録治粉鈐瘡繞項赤爛多汁密陀僧煆龍骨各五錢胡粉二錢鉛丹一錢炒紫色右研細挹去膿汁用生油調塗日三夜一墨蒜散治諸瘡著白痂復發大蒜鼠屎書墨右各等分為末傅之日三治種種諸瘡不愈出千金方水銀一兩黃連二兩金墨三分右治下篩以不落水豬膏和傅上不過三度瘥神良若欲多作任入水銀大須熟研其藥唯不治金瘡追毒散出宣明論治生瘡發悶吐逆霍亂螺兒青㨂甘草各一兩白礬二錢半右為細末每服一錢新汲水調下立止廽瘡金銀花散出濟生拔萃方治瘡癢痛甚則色變紫黑者金銀花連枝葉銼二兩黃耆四兩甘草一兩右㕮咀用酒一升同入壺瓶內閉口重湯內三兩時辰取出去滓頓服之一方無黃耆大豆飲出肘後方治因瘡中風腰脊腫脹牙關口噤四肢強直以雞屎白一升大豆五升和炒令變色乘熱酒以沃之微煮令豆味出量性飲之覆身出汗勿觸風敷藥合掌散出淡療方治身生瘡百藥不效檳榔五個為末硫黃五錢生者研細末膩粉五分右和勻每服一錢安於手心內油調夜卧時塗外腎不得洗手但擦手令乾可也一二日瘡即愈金粉餅出聖濟總録治髭鬚瘡膿窠鬱金菉豆粉各半兩白斂一分右為末用朴硝水和作餅貼之黃香餅出聖濟總録治鬈毛瘡在頭中初生如葡萄痛不止黃柏一兩鬱金五錢乳香一分右搗研為末用槐花水調作餅於瘡口貼之白龍散出聖濟總録治晴漏瘡目大眥出膿汁有孔龍腦馬牙硝各五分菉豆粉一錢右同研極細用燈心蘸藥點之日四五上敗蹄散出聖濟總録治天柱瘡生脊顀尖上如錢大赤色出黃汁不止驢蹄削二十片燒灰胡粉一分熬麝香少許研右合研末破以醋煮麵糊和成膏塗入已破乾摻青金散治疳瘡等瘡稻粳碌一兩胡椒五分麝香少許右為細末每日一次乾摻在瘡口內苦參丸出如宜方治血熱氣滯皮膚遍身生瘡癢瘙出血苦參八兩淨荆芥穗四兩右為末糊丸如梧桐子大每服四十丸米湯食後吞下治甜瘡出濟生拔萃方以大棗去核實以緑礬火燒微存性研細貼之如瘡乾以小油調塗治久不瘥瘡出海上名方以豬筒骨中髓以膩粉和為劑復納骨中猛火煨香燒出先以溫鹽水浴瘡傅之朱砂透紅丸治瘡蜈蚣一對血竭一錢麝香一錢輕粉一錢蟾酥一錢粉霜一錢朱砂五分右將蟾酥為丸每服三丸至五丸冷酒送下敷瘡藥斑貓七個白礬飛過雄黃研過硫黃各五錢松香黃蠟黃丹各一兩右先用香將斑貓煎熬過次下礬等藥候煎熟下黃蠟化用黃丹便成膏傅之治瘡疱將出用惡實即牛旁子炒冷熟杵為末每服一錢入荆芥二穗水一大盞煎至七分放溫服如瘡疹已出更服尤妙治諸瘡出應驗方牛皮燒灰明礬等分右為末醋調擦破傅上兼明礬一兩酒半鍾煮化服每日服羊蹄草二斤蒼术一斤酒糊丸尤治腎藏風蟬蛻散出危氏方治飲酒後遍身癢如風瘡抓至血出其癢止後痛方見本門諸疥類驅風散出危氏方治瘡紅椒開口者七粒連根蔥頭七個右同煮水淨洗用絹衣浥乾即愈余甲子夏自桂入歸途中為瘡癢所苦暫憩湘山寺遇長老寂翁授此方數日而愈當歸丸出聖濟總録治一切風刺靣上生無名瘡癤因飲酒炙􅘤物得之也當歸四兩青鹽二兩右先以水洗當歸乘潤用青鹽摻遍擱在髙處三日取下去鹽以當歸曝乾為末滴水丸如菉豆大每服二十丸空心溫酒下露蜂房散治大人小兒頭靣上無名瘡黃水不止露蜂房蛇蛻各一枚右同於碗內燒過為灰每看瘡口大小用膩粉少許和勻生油調雞翎掃之二金散治大人小兒蝕透腮頰初生如米豆名金腮瘡雞內金是肚內黃皮焙鬱金右等分為散先用鹽漿盥潄了貼之忌米食吳茱茰湯出御藥院方治風毒瘡久不瘥吳茱茰川烏頭生用不去皮蛇床子桂枝各一兩荆芥穗附子生用去皮各五錢右為粗末每用藥五錢水半碗煎二三沸去滓用綿子蘸藥淋掃患處臨卧頻頻用之後用香白散祕方淨肌散出簡易方治一切瘡癢諸證雄黃北芩大黃海螵硝生硫黃黃柏剪草黃連蛇床子五倍子各五錢右細末用真香油調抹瘡上大有功效石韋散出聖濟總録治玊枕瘡生枕骨上如癰破後如筯頭石韋原蠶蛾炒右等分為散乾貼取瘥治瘡出百一選方用五倍子黃柏二味為末傅之去息內厭黑子用草蒿燒為灰以紙八九重淋取汁和石灰點之治瘡欲似蜂窠瘥而還發方出聖濟總録胡粉朱砂各等分右細研為末以蜜和合塗於瘡上三換之即愈治延皮瘡以木綿樹皮陳者妙將火燒了皮捲入輕粉麻油和合之傅瘡上妙治一切瘡久不結靨及痔漏用生薑連皮切作大片白礬末摻在上火上炙焦枯為末瘡乾唾調塗濕乾貼之紅玊飲子治瘡氣嘔吐惡心不止乾胭脂五分菉豆粉三錢右研勻新汲水調下只一服立止杏仁膏出鮑氏方用杏仁湯去皮尖研細絹綾去滓以輕粉麻油調大人小兒皆神效水沉膏五靈脂白芨右等分為細末用新水調擦在紙花上貼之治冷漏或脅癰或癤毒成漏者明礬一半飛一半生用飛者生肉生者匝膿用一錢半五靈脂揀去砂石十分乾淨另研和合用半錢右用軟皮紙用口唾裁下津唾於藥末內一蘸撚成小紙撚子却用香油一揾濕略乾放於藥末內揾拖過帶藥末撚令實剪作小段子應約瘡大小用每一小段子藥紙撚安入漏瘡孔內如早晨安一個至日午久換一個候內中黃白瘀膿出盡令後當有些小血水出方得膿俟出盡方可住藥自然肉痊可瘡藥檳榔散檳榔海桐皮䔧蘆菖蒲各一兩䕡茹二兩百部一兩雞腸草二兩剪草一兩管仲一兩蛇床子二兩山梔子茜草各一兩右為㕮咀同一處微火炒至焦黃色為度作細末用香油調擦瘡上次入雄黃白膠香為妙瘡藥出御藥院方用粉米不以多少炒存性為細末鵝梨汁調塗害處紙花貼治諸瘡弩肉如蛇出數寸出聖惠方用硫黃細研於肉上薄傅即便縮燥著唾塗烏梅膏出聖惠方治諸瘡中新弩出肉不瘥者以烏梅肉蜜和捻作餅子如錢厚以貼瘡又以燒灰傅之亦佳并治馬疳瘡一方用烏梅屑傅之佳治諸瘡馬勃俗人呼為􅀢勃紫色虛軟狀如狗肺彈之粉出傅瘡用之甚良也治諸般疔腫惡瘡骨疽蛇露身癢瘑疥癬等瘡久不瘥者出肘後方用蛇蛻燒末和水調傅上一方治身體白駮以醋調傅上佳一方燒灰豬脂調傅或只用灰亦可或取皮熟摩瘡上數百遍訖棄皮於草中良治一切瘡出本草以蕪荑和沙牛酪塗之陳者良治時疾熱瘡湯火瘡爛撲損傷折瘀血以小麥麩醋炒貼窨緑雲散一名桑葉散出衛生家寶治肺毒氣瘡如大風疾以桑葉好者淨洗過熱蒸一宿後日乾為末水調二錢匕服一方加防風治損瘡中風者兼凍瘡出肘後方以秦椒用麵作餫飩灰中燒使熱斷使口開封其瘡上冷即易之又法去閉口者水洗麵拌煮作粥空腹吞之以飯壓之重者可再服以瘥為度或取蜀椒五兩水五升煎至四升去滓乘熱漬痛處以瘥為度一方生蜀椒五兩麵合裹椒勿令漏氣分作兩裹於煻灰中燒熟及熱出之刺頭作孔當瘡上引使椒氣射入瘡中冷則易之須臾瘡中出水及遍體出汗即瘥治瘡用慈竹笋籜灰油和塗之妙治諸惡瘡寒熱胸中生瘡以䜴為丸服丹疹搗塗瘑瘡久不瘥炒乾為末以油調傅之並良治小兒頭瘡及婦面瘡以兔絲子絞取汁塗之治頭耳瘡以馬頭骨燒灰傅頭耳瘡治多睡作枕枕之佳治大赫瘡此患急冝防毒氣入心藏出肘後方飲枸杞汁瘥一方炙之以蜣蜋乾者末之和鹽水傅瘡四畔周回如韭葉濶狹者治諸般瘡或爛腳氣瘡膁瘡明礬飛川椒各為末黃蠟輕粉右用柏子油燈盞煎沸入前藥再用黃蠟同煎攪勻成膏却入輕粉如腳氣痛爛瘡先用大蓼煎湯熏洗了挹乾傅藥二次立效又方用見腫消土人又多以生苖葉爛搗貼瘡治疳瘡生身面上汁黃者以葵汁黃者可取根作灰和豬脂塗之其性冷若熟食之亦令人熱悶甚動風氣治瘡中毒以商陸根汁熱布裹尉之冷即易治豌豆瘡以蔓菁根搗汁挑瘡破傅上三食頃根出治諸瘡寒熱毒痺牛馬六畜瘡口生蟲生搗鼠李傅之或和脂塗皆效鼠李子味苦採取日乾九蒸酒漬服三合日再能下血及碎肉除疝瘕積冷氣大良芙蓉傳方出聖濟總録治腮頷腫痛或破成瘡芙蓉葉不拘多少右搗爛傅之以帛繫定日一換療身體及頭悉生瘡取榆白皮炒令黃搗為散以好酒和塗上又以綿褁覆上蟲出即瘥治瘡方出應驗方以絲瓜兒根熬水掃於諸瘡上大涼即愈治久瘡有蟲者出應驗方用柏木節燒油塗之治瘡不能穿者出應驗方用野百合子鹽捶爛傅之佳赤小豆方出朱氏集驗方治善惡瘡疥或赤腫無不愈者用赤小豆七七粒為末傅之愈或以水調傅瘡及四旁赤處落則再傅又方挫散每服二錢水一盞煎服仍用新汲水調藥傅緣赤豆粉粘物既乾難貼揭則用苧根為末和之便不粘此法尤佳仁宗在東宫時常患鮓腮命道士贊能治療取赤小豆七百粒為末傅之而愈中貴任承亮在旁知狀後自患惡瘡頻死尚書郎傅求授以藥立愈問其方赤小豆也久之沿官過豫章或苦脅疽既至五臟醫者治之甚穩承亮曰君得非用小赤豆耶醫驚拜曰某用此活三十口願勿復言有僧發背如爛瓜周鄰家乳婢後疽作用之皆如神其法細末水調傅瘡及四旁赤腫藥落再傅之蛇纒瘡出危氏方以雄黃為末醋調塗仍用酒服丸為蛇傷及蜂蠆蜈蚣毒蟲顛犬所傷皆可用之又方用鏡靣草入鹽搗爛敷瘡頭上立效治諸瘡發歇不止出直指方以凌霄藤并藥煎湯溫洗數次效凌霄傍松柏上生又方出本草治瘡以藎草煮湯洗瘡有效療瘡方出本草用荆木燒取汁傅之瘥當歸黃耆湯出濟生拔粹方治瘡痬臟腑已行如痛不可忍者當歸黃耆地黃川芎地骨皮芍藥各等分右㕮咀水煎如發熱加黃芩如發燥不能卧者加梔子如嘔則是濕氣侵胃倍加白术雞內金散治榖道邊生瘡久不愈者以雞肶胵不拘多少是雞肶內上去下黃皮燒灰最要存性候冷研為極細末每服用一大稔乾貼之如神治急疳口鼻中用沒石子為末吹下部即瘥治疳𧈟食口齒及下部以飛亷蒿燒灰搗篩以兩錢匕著痛處痛甚痛忍之若不痛非疳也下部蟲如馬尾大拘纒出無數十日瘥十日平復治病狀如癩卒不成瘡每旦瘡上退白皮一升許如蛇蛻者出危氏方服雄黃解毒丸三四服安治諸瘡不消已成膿懼針不得破出肘後方取雄雀屎水調塗瘡頭上治雜瘡及滅瘢痕出本草用寒食飯細研傅之白瓷水摩塗之定州者良傅瘡藥出本草治惡瘡以黃藥子四兩為末冷水調傅瘡上乾即旋傅之治惡瘡疥瘡身瘡頭瘡不止出千金方用石澗所生堅小菖蒲一寸九節者為末油調傅一方無油調治爛瘡纍治不可者用杜牛膝并鹽泥搗爛敷患處其肉自有如米顆之狀俱出自愈替針散治破瘡用蛾口繭一個燒灰酒調服即透切不可用兩箇三兩繭兒燒服治漏瘡不乾及瓦疱瘡用紅玉散傅如不效再用㨂紫蘇葉為末摻之尤妙治一切瘡及蠶瘑出本草以鱧腸草搗傅之治因瘡中腰風脊反張牙關口噤四肢強直出本草以鼠頭和尾燒作灰細研以臘月豬脂傅之療燈豆瘡殺一切蟲及治疥癬出肘後方服油麻一升須利即不生白漿大效用青牛溺摩數百度疔腫疔毒瘡肉中突起如魚眼狀赤黑燥痛是寒毒之結變作此疾始作服湯及如丹法瘥一方以白麻油搗傅之治天疱瘡天花粉軟滑石右各等分為末水調搽又方用無名異為細末井花水調傅之愈治諸瘡及腎臟風出應驗方烏藥順氣散一貼枳殼散一貼右和為一貼每天明方醒用銅錢挑一錢舌舔喫如腎臟風入吳茱茰一錢八角茴香末一錢和勻如前服治金瘡灸瘡火燒瘡等方出十便良方蠟如胡桃仁杏子一枚爛搗檳榔一枚薰陸香半合右和搗以豬脂煎即以此藥塗帛上貼瘡此方甚效治諸瘡中風寒水腫犯毒露者出本草以薤白生杵傅之一方用韭治黑瘡出本草以山蛩蟲燒令黑傅之膩粉散出御藥院方治皮膚受風邪發作癢痛諸瘡膩粉二錢䔧蘆末五錢狼毒末三錢右拌勻每用乾擦患處楓香散出御藥院方治諸風毒瘡發癢白屑起楓香脂大黃輕粉各等分右為細末生油調稀搽患處治瘡若專利臟腑非宜也蓋瘡癬為患因內有所藴發在皮膚然只以外藥傅何由得愈用五積散去肉桂麻黃常煎服須自合者如渾身瘡膿水淋瀝去麻黃加升麻大黃名升麻和氣飲治瘡癖出本草以棕木煎湯洗之治蚍蜉瘡出本草用山豆根水研傅之治溪毒瘡出本草用膝枯草挼碎傅之療風水爛瘡出本草以雀醫草煎湯洗浴治療痍滅瘢痕疵方出本草以白􅀈蠶合衣魚鷹屎白等分為末靣膏和塗又方出本草黑雌雞糞傅之療雜瘡出本草以五月五日采蘩蔞曝乾作屑傅之有效治黃水瘡出本草以榲桲皮搗末傅之止黃水煨腎丸出淡寮方治遍身生瘡隂囊兩腳尤甚耳癢目赤等證草烏一兩鹽一兩入水少許作鹹汁浸二宿一日次畨轉切用銚子炒黃赤色為末豬腰竹刀去膜入鹽煨熟竹刀碎研爛入草烏內右二味研勻醋糊丸梧子大大人三十粒小兒五十丸空心鹽酒下黃茋膏藏經驗方治一切瘡癤人參黃茋各三錢當歸五錢香白芷細辛去葉羌活各三錢右件六味銼碎用清油六兩同前藥一處慢火內熬令黃茋微黑為度濾去前藥只用油入沒藥末三錢黃蠟二兩同油攪勻合子盛候冷用門賔林用卿在鄂渚鬢間生癤三四頭雖不甚大其痛徹腦寢食俱廢或曰疽衆藥弗效外醫候迤用此即時疼止遂求得方治瘡出百一選方紅茶大黃一分焙乾小粉焙之炒令青黃色右為細末乾者冷水調濕者乾摻傅瘡藥出淡寮方當歸芍藥各八錢黃茋七錢木香一兩光粉一兩半桑皮一兩半略去粗皮白芷檳榔三錢甘草五錢生用右為末麻油或蠟膏調傅瘡上傳瘡藥出淡寮方全蝎七枚去毒并尾瓜梔子七箇右以麻油煎黑為度去二味入少蠟令如膏子用塗瘡也土硃散出朱氏集驗方治一切瘡土硃虢丹牛皮膠右研細末用好酒煎鎔牛皮膠入此二味和勻澄清喫清藥酒留却傅之瘡上乾又再貼治一切瘡出朱氏集驗方以平胃散用麻油傅之立效五香連翹散出朱氏集驗方治風氣瘡自上而下調之風瀝自下而上雞嘴連翹丁香沉香藿香南木香桑寄生甘草麝香射干右為細末白水煎服食後服又用牛尾蕨根謝姿根又名赤葛根子二味槌碎酒三碗溫服併用洗瘡口潰爛之後亦用此藥洗直要潔淨大惡忌白物豆腐麵白羊白雞白豬一切白物皆忌之如服藥後小便淋瀝用五苓散加葵麥木通煎喫此方得之難用之收效又方出朱氏集驗方䔧蘆羅過三碗生用每以三碗曬將兩碗入硫黃一兩蛇床子三錢輕粉少許斑貓荆芥各五錢大椒三錢右同為末熬麻油乘熱清調臨卧塗疥瘡上次以煎䔧蘆一味入甘草三五十錢同為末每服半錢酒調酉時服名涼肺散大忌炒豆黃菜用之果效聖愈湯出試效方治諸瘡血出多而心煩不安不得眠睡此亡血故也熟地黃三分生地黃三分歸身五分川芎三分黃耆五分人參三分右件㕮咀都作一服水一大盞半煎至一盞去滓少熱服不計時候汗之則瘡已出衛生寶鑑丁巳委子從軍廽住冬月於曹州界以事至州有趙同知謂子曰家舅牛經歷病頭面腫赤前後尤甚疼痛不可忍發熱惡寒牙關緊急涕唾稠粘致飲食難下不得安卧一痬醫於腫上砭刺數四五百餘針腫痛不減其痛益甚不知所由然願君一見遂往診視其脈浮緊按之洪緩此寒覆皮毛鬱遏經絡熱不得升聚而赤腫經曰天寒則地凍水冰人氣去中皮膚緻腠理閉汗不出血氣強肉堅澀當是之時善行水者不能遊泳善穿地者不能鑿凍善用針者亦不能取四厥必待天溫氷釋凍解而水可行地可穿人脈猶是又曰冬月閉藏用藥少而少針石者宜以苦溫之劑溫經散寒則已所謂寒緻腠理以苦發之以辛散之麻黃苦溫發之者也故以為君防辛溫散之者也升麻苦平葛根甘草解肌出汗専治陽明經之邪故以為臣血留而不行則痛以香白芷辛溫當歸身辛溫以和血散滯濕熱人參甘草甘溫白芍藥酸微寒調益氣使托其裏也故以為佐各銼如麻豆大用稱水煮服之以薄衣蓋其首以厚被覆其身卧暖所則經血溫腠理開寒乃散陽氣伸大汗出腫減八九再服去麻黃防風加連翹黍粘子腫痛悉去經言汗之則瘡已信哉或曰仲景言疹家雖身疼痛不可發汗其理何也子曰此説營氣不從逆於肉理而為瘡腫作身疼痛非外感寒耶而作疼痛故戒之不可汗如汗之則痓之也又問仲景言鼻衄者不可發汗復言脈浮緊者當以麻黃湯發衄血自止所説不同願問其故對曰此與瘡家既同且人身血之與汗異名而同類奪汗者無血奪血者無汗令衄血妄行為熱所逼更發其汗反助熱邪重渴液津必變凶證故不可汗也若脈浮則在表緊則寒之邪鬱遏陽不得伸熱伏體中迫血妄行上出於鼻則當麻黃湯散其寒邪使陽氣舒其衄自止又何疑焉或者嘆曰知其要者一言而終不知其要流散無家潔古之學可謂知其要矣托裏溫經湯出衛生寶鑑治寒覆皮膚鬱遏經絡不得伸熱伏榮中聚而赤腫痛不可忍惡寒發熱或相引肢體疼痛麻黃去節二錢半東防風去蘆三錢新升麻四錢葛根三錢吳白芷二錢當歸二錢浙术一錢人參一錢炙甘草白芍藥各一錢半右銼如麻豆大每服稱一兩水三盞先將麻黃令沸掠去沫再下餘藥同煎至一盞去滓大溫服卧於暖處以綿衣覆之得汗而散捨時從證出衛生寶鑑至元壬午有人王伯祿年五十有七右臂膊腫盛上至肩下至手指色變皮膚涼六脈沉細而微脈證俱寒請瘍醫孫彥和視之曰此乃附骨癰開發已遲以燔啓之膿清稀解待日肘再開之加吃逆不絶彥和與丁香柿蒂湯兩服稍變緩待日吃逆尤甚白痢臍腹冷痛腹滿飲食減少時發昏憒於左乳下黑藎處炙二七壯又處乾薑附子木香沉香茴香羌活類藥㕮咀一兩半欲與服或者曰諸痛瘡瘍皆屬心火又當盛暑之時用乾薑附子可乎豫應之曰理所當然不得不然經曰脈細皮寒㵼痢前後飲食不入此謂五虛况吃逆者謂中虛寒極也諸腫瘡瘍皆屬心火是定理也此證內外相反須當捨時從證非大方辛熱之劑急治之則不能愈也遂用之諸證悉去飲食進瘡勢溫膿色正彥和又與五香湯數服月餘平復噫守常者衆人之見知變者賢人之事知常而不知變因細事而取敗者多矣况醫乎守常知變豈可同日而語哉托裏溫中湯出衛生寶鑑治瘡為寒變而內陷者膿出清解皮膚涼心下痞滿腸鳴切痛大便微溏食則嘔氣短促吃逆不絶不得安卧時發昏憒羌活三錢黑附子四錢去皮臍炮乾薑炮三錢益智仁一錢炙甘草二錢丁香一錢沉香一錢木香一錢半茴香一錢陳皮內經曰寒淫於內治以辛溫佐以苦溫以附子乾薑大辛熱溫中外發陽氣自裏之表以為君羌活苦辛溫透關節炙甘草溫補脾胃行經絡通血脈胃寒則嘔吐吃逆不下食益智仁丁香沉香大辛熱以散寒為佐瘡氣內攻氣聚而為滿木香丁香茴香陳皮苦辛溫治痞散滿為使也右㕮咀都作二服水五盞生薑五片煎至一盞去滓溫服無時忌一切冷物治爛瘡出本草以梓樹嫩葉搗傅之連翹散堅湯出試效方治耳不至缺盆或至肩上生瘡堅硬如石動之無根名曰馬刀從手足少陽經中來也或生兩脅或已膿作瘡未破皆治之柴胡一兩二錢連翹五錢歸尾五錢酒製芍藥五錢土瓜根一兩酒炒甘草三錢炙草龍膽二兩酒製四次生黃芩五錢蒼术二錢黃芩七錢酒炒二次黃連三錢酒炒二次廣茂五錢京三稜細銼五錢同廣茂酒製一次微炒乾右見稱另一半煉蜜為丸如菉豆大每服一百丸或百五十丸各稱和勻每服五錢水一盞八分浸半日煎至一盞去滓臥熱服頭腳髙去枕而卧每口作十次咽留一口送下丸子藥服卑卧如常亦緩治之柴胡連翹湯治男子婦人馬刁瘡柴胡五錢黍粘子二錢中桂三分連翹五錢瞿麥穗六錢甘草三錢炙生地黃三錢歸尾一錢五分黃蘗三錢酒製知母五錢酒製黃芩五錢炒右件㕮咀如麻豆大每服稱五錢或三錢水二大盞煎至一盞去滓稍熱服食後時時服之消毒湯治馬刀瘡柴胡二錢連翹三錢歸尾一錢紅花少許甘草一錢生黃芩二錢黃連五分瓜蔞根一錢半黍粘子五分炒黃耆一錢半右件每服稱五錢水二大盞煎至一盞去滓稍熱服食後忌酒濕麵連翹防風湯治皮癢腋下瘡背上瘡耳聾耳鳴麻黃一錢桂枝二分草豆䓻仁一錢歸尾七分紅花少許羌活一錢防風一錢柴胡一錢升麻五分連翹半分桔梗五分甘草五分生地黃五分酒黃芩二錢蒼术一錢右件銼如麻豆大都作一服水二大盞煎至一盞去滓稍熱服之治蟺鞏頭瘡用硝碾為末填於蛤殼內覆在瘡上再用生乾麵封於外候麵乾自落瘡愈黃耆乳香湯治諸瘡疼痛或瘡口膿水不盡去麻黃沒藥乳香黃耆一兩生陳皮麻黃甘草芍藥當歸人參沒藥乳香米殼各等分右為末如膿水不乾薑棗煎服搽瘡藥小草烏小指靣塊挫極碎右以臘月豬膏入少許輕粉量用搽末瘡上丹膏治一切瘡癤虢丹五兩巴豆十粒麻黃二兩方竹桞條各五莭右件油焦下竹桞巴黃四味煎黑色却入虢丹打勻黑為度令冷乳香丸治諸般惡瘡癤乳香五錢穿山甲五錢木鱉子七錢當歸五錢豬牙皂角七錢右除乳香外松枝火燒存性為細末煉蜜為丸如彈子大每服一丸於食前酒化下替針丸治諸瘡􅟻膿水已成即當針開決出陳臭惡瘀則其治也若其惡瘀不出欲針石須當開發用此藥以射出其膿也雄雀糞直者二十一枚陳壞米末一錢硇砂五分右為細末粳米粥丸如粳米樣每用一丸粘在瘡頭上以膏貼之一方有沒藥少許內補散黃耆麥門冬去心川芎當歸茯苓去皮人參五味子各一兩逺志去心甘草炙桂心各五錢右㕮咀每五錢水一盞半薑三片棗三枚煎八分溫服無時通神乳香膏乳香沒藥血蝎蠟黃丹木鱉子二兩膩粉三分烏魚骨二兩不灰木四兩五靈脂二兩海桐皮二兩瀝青四兩麝二錢油八兩熬用熬法皆同一切氣漏麝香丸右祕方無巴豆用蝎止痛破積血生肌肉及血不止麝香一錢乳香一兩巴豆十四箇去皮出油右棗肉同丸任瘡上桞木膏治諸瘡瘥後瘡瘢努肉未消瘰癧風等疾冝貼此桞木皮五斤楸葉五斤木通一斤枳殼一斤皂莢一斤木香三兩右件藥細銼以水八斗煮取汁一斗去滓移於水鍋子中下木香煎至七升去滓又移於小鍋中以慢火煎攪勿住手煉如餳撚成丸即住以油帛裹收之每日塗於帛上貼之取平復為度神效餅子出朱氏集驗方治一切毒瘡山茨五倍子草烏燒存性木鱉子各五錢虢丹三錢右為細末先用雞子作餅熱傅瘡上候冷取出傅藥其上數日間瘡乾連皮脫去瘡乾即用麻油調德安寺有僧靣上生遍幾死一用即安凡諸發即癰疽瘰癧膁瘡湯蕩火燒等疾或有别作一種穢臭氣息不堪聞者最是惡症或已未破或小大皆當作急以治之可用忍冬藤一掘擂細用無灰酒濾汁服之以滓傅瘡之四圍用雲母膏别研亦可煎開大口以護其藥之上俟其瘡膿出便以豬蹄湯等十分淨洗久洗為妙三時辰不妨次用後藥以燻之出淡療方好真降香末楓香末右二味於銚中攪溶丸如彈子大却取香爐一枚衣爐口造紙煙筒一個如燒龍涎香樣慢火爇之謹以煙筒口燻瘡上不拘丸數稍倦暫止然後更燻未出膿者即出已出膿者即乾直俟生肌合口然後止向後有赤腫腳處又再燻大槩欲辟去穢氣也平血飲出淡寮方治遍身生瘡膿血腫脹極痛且癢乾葛白芍藥鬼面真全南者升麻甘草各等分右㕮咀每服四錢重用白水煎服不拘時如對證及藥材得真則功在和氣飲之上魏白虎瘡藥方內經云諸痛癢瘡皆屬於心心受風熱則血脈凝滯而成瘡風多熱少即癢熱多風少即痛風熱相半即癢痛皆因大病後風熱毒不曽宣利畜於血脈遍身生惡瘡兩腿尤甚或攻刺疼痛或晚增寒作膿水每蓋即疼熱痛即疼痛宜服此出傳信適用方烏蛇一條大者細尾小者去頭尾三寸斷用好酒浸三宿去刺與骨皮取好淨肉玄參去蘆頭苦參去木取皮地骨皮去木淨洗甘草細銼白蒺藜炒以新磚二口磨去刺防風去蘆白殭蠶炒斷絲乾蝎川烏已上各五錢草烏半斤肉白者以黑豆一升水煮令草烏都黑惟心中一點白為度切焙一兩黑牽牛半生半炒以二兩取一兩末枳殼去穰炒一兩右件一十三味為細末煉蜜搜成劑入石臼中搗百十下丸如梧桐子大每服二十至三十丸溫酒吞下不拘時候日進三服以利則減不利則加服四生散出淡寮方治上攻下注耳鳴目癢鼻赤齒浮或作口瘡下注隂濕四肢燥癢遍體生瘡及婦人血風瘡白附子沙苑蒺藜黃耆羌活各等分右為細末用豬腰一枚切開去筋膜入藥少許於內濕紙裹炮熟再入藥三錢浸酒調藥併腰子嚼吃令盞底淨盡三五服後或熱用鹽酒調亦可或腰子一分兩次用羊腰豬腰皆可雄豬羊者為妙木香檳榔散出鮑氏方治一切瘡痏濕爛久不治者腳氣濕瘡尤效黃連五錢去麻油艾葉木香檳榔各末一錢五分和上藥添油成膏右茶葉煎湯洗瘡淨帛拭乾上藥略厚傅紙花覆之二三次即可又方出鮑氏方黃連三分密陀僧輕粉少許右為末麻油調傳治皂莢水并惡水入瘡口內熱痛不止出本草以皂莢子燒存性一分沙糖半兩先細研皂莢子令細續入沙糖勻和如膏貼於瘡上治瘡中水出本草用胡粉炭白等分脂和塗孔上水即止治驚瘡血涌出出本草取婦月經衣炙熱尉之治螻蛄瘡出儒門事親千年石灰茜根燒灰右同為細末用小油調雞翎塗治諸瘡黃水出用糖子皮搗末傅之治諸瘡觸犯毒露及毒水覺瘡頑不癢痛當中風水所為身心反張似角了者用鹽豉和麵作碗子蓋瘡上作大艾炷炙一百壯令抽惡水數升舉身覺癢瘡處知痛瘥也治諸瘡瘻及癧瘍風用鰻鱺魚常食之甚驗鰻鱺魚有五色紋者最佳治諸瘡中毒用羊屎燒煙燻之荆芥丸治身上一切瘡右以地黃自然汁熬成膏和荆芥末丸如梧桐子大每三五十丸茶酒任下又方用巴豆三四十粒麻油半盞煎候乾巴豆黑去之不用以油調硫黃輕粉塗之擦令熱為佳普濟方卷二百七十二
