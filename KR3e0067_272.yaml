body:
  text: 普濟方卷二百七十二明周王朱橚撰諸瘡腫門諸瘡腫附論夫瘡腫以手指從瘡傍按闕者按之色不變膿已結成又按之随手赤色此亦有膿按之白良乆方赤逰毒已息可就赤白色盡處炙斷瘡肉平實久而赤腫自消也凡溻漬瘡腫之法宣通行表發散邪氣使瘡内消也盖湯水有蕩滌之功瘡腫初生一二日不退四肢者溻漬之腰腹背者淋射之其下部委曲者浴漬之此謂速道腠理通調血脉使無凝滯也且如藥二兩用水二升為則煎取一升半以净帛或新綿蘸藥水稍熱溻其患處漸漸喜溻淋浴之稍凉則急令冄換慎勿冷用夫血氣得寒則凝澁得熱則淖澤日用五七次病甚者日夜不住或十數次腫消痛止為騐此治瘡腫神良之法也許真君云凢瘡須推究証候消詳苗根走𦙍不止先㸔血色鞭用手熨之如紅氣朝可以治黒氣朝其病難治急用藥截之服奪命丹返魂散裡托如痛慢不走𦙍不破則用膏藥傅之如頭上有瘡兩手足上大指節正傍刺血㸔之知瘡𦂳慢如不見血手腕後四指骨上針破浮皮有紅血出可下藥如黒血出不可下藥更於兩肘上四指下針破浮皮血出紅色可下藥黒色不可治闕坐耳對於着骨又念患人低頭用兩大指甲搯定破闕血出可治無血又去頭心用指甲捻着沉處用針刺破浮皮如闕藥在瘡口内用綿花子就血封定疼痛不可忍者其闕出者可以治之痛無汗出血黒色者乃死證也如治闕外人勿入房人來相覷亦不得食葱韭蒜葷闕麺十日外可得食也又云下利已腫處未消者可除大黄用生地黄及亁地黄随時也熱漸退餘風未歇者可服五香連翹湯除大黄餘熱未消可傅升麻膏假若失時不消成膿者用火針膏散如療癰法凢痛病喜發四肢其狀赤脉起如編繩急痛狀熱闕喜從腨起至踝亦如編繩故云㾫病也發於腎喜着腋之下皆由久勞熱氣盛為濕凉所折氣結筋中成此病也若不即治其久漬膿亦令人筋攣縮也若不消漬其熱氣不散多作踵病漏蘆湯主之㵼後鋒針數針去惡血氣針㵼其根核傅其小豆末取消為度又用治丹法治之亦用治癰三味甘草散傅之若潰傅膏散如癰法方解毒丸出徳生堂方治一切諸毒瘡痍咽喉腫痛貫仲茯苓黄藥子藍根亁薑地黄雄大豆甘草滑石縮砂仁隂地厥薄荷各二兩土馬騌菉豆粉益智仁寒水石山豆根紫荷車馬屁勃草龍膽白殭蚕炒百藥煎大黄各一兩右各洗净焙乾為末然後蒸餅丸如小弹子大毎一丸細嚼新水送下小兒一丸分作四服熬薄荷湯候冷磨下用銀箔為衣亁地黄丸乾地黄四兩大黄六兩桂心王不留行黄芩麥門冬去心逺志升麻人参甘草炙枳實炙各二兩芍藥茯苓各兩右擣篩蜜和丸如梧桐子大酒服十丸日三加至二十丸常服令人肥健撮毒散治一切硬腫癤丹瘤刄傷湯火燒車輾馬踏等傷之証㯽榔山梔子白龍白芨白歛白芥子五靈脂木鱉子右各等分為末如瘡破揾乾貼如腫硬水調掃於瘡上立効如聖散蒼术十六兩去皮防風八兩去蘆白芷八兩細辛五兩去苗川芎十兩川烏八兩草烏四兩右都生為細末善治金刄所傷如覺傷着藥到血定以軟帛牢繫定舊瘡多日不可去瘡痂口噙漿水洗净揾乾貼三兩上即愈蛇蛟蝎螫浆水洗浄用藥貼一切小蟲傷無口者唾津調藥搭上立愈狗咬着口噙水洗净用藥乾掺止即愈破傷風初發覺時用藥一錢熱酒一盞調服衣服盖了如重車行五七里汗出為驗如無汗再服半錢涎出為驗蜘蛛咬傷病重每服一錢半多時汗不出再加藥一錢依前投之涎出為驗蜘蛛咬傷津唾調搽疼處婦人洗頭風用藥一錢酒調服汗出為度腫癤丹瘤其痛處不止新汲水調藥毛翎搽上三兩畨痛即止湯火所傷新汲水調藥揭去死皮掃之魚睛麻根紅絲疔瘡發背搭手疽鬢疽裏外膁瘡覺痛時新汲水調藥塗上用藥一錢酒一盞服之即愈牙痛腫脹者即用藥搽立愈偏夾正腦風噙水鼻内搐之吐水涎出即可立愈如乾癩風遍身麻木常服此藥無不治之若新杖瘡血亦用藥掺上止痛不發其効不可具述此真秘方也復元通氣散出徳生堂方治氣不宣流或成瘡癤并㨛挫脹脇氣滯不散及癰疽作焮赤初發疼及膿已潰未潰小腸氣腎癰便毒腰疼氣刺腿膝生瘡及婦人吹妳乳癰茴香炒穿山甲蛤粉炒去粉各二兩延胡索去皮白牽牛炒甘草炒陳皮去白各一兩右為末毎服一錢熱酒調服不飲酒木香湯調服一方有當歸病在上食後服病在下食前服又方療諸惡腫瘡頭瘡百雜瘡黄連黄柏附子雄黄水銀䔧蘆各一兩胡粉二兩右為末以臈月猪脂一斤和藥調器中急宻塞口蒸五斗米下熟出内水銀又研令調宻藏之有諸瘡先以鹽湯洗乃傅上無不瘥者又方出瑞竹堂方治瘡腫濕兼下疳者黄連生用輕粉海螵蛸生韶粉蛤粉生橄㰖核燒灰黄柏皮各五錢右為末乾貼瘡上愈梔子湯治表裏俱熱三焦不消食身體生瘡或發癰癤大小便不利芒硝湯澄下甘草炙各二兩黄芩知母各三兩大黄四兩别漬梔子七枚右切以水五升煑四味减半下大黄煎至一升八合去滓内芒硝分三服廣濟飛黄散療諸惡瘡腫雌黄白礬石磁石雄黄曽青丹砂各一兩右各細研依四方色以藥置色處曾青東方丹砂南方白礬石西方磁石北方雄黄中央瓦甕二枚以黄泥下冄三過使厚五六分以雌黄屑著下合篩諸藥著上後以半雌黄屑覆上以泥宻塗際勿令泄氣上須厚一宿如常㸃火㸃火用二年陳蘆作樵中調火以新布沉水覆釜上乾復易九十沸止若日暮七十七沸亦足止大熱一斛米飯頃發出藥細研貼瘡其瘡惡肉青黒乾不復出汗愈無甕以土釜二枚如上法治黄耆湯治一切瘡腫疼痛并冝服黄耆當歸各一兩大黄芍藥各五錢陳皮甘草各三錢炒右為麤末毎服五錢水一大盞生姜三片同煎至七分去滓溫服不拘時候當歸散出濟生㧞粹方治瘡已破未破赤焮腫疼甚不可忍當歸黄耆栝樓木香黄連各等分右為末水服煎無時如痛而大便秘者加大黄三錢療散發生瘡赤焮及丹走皮中浸滛取赤臼一片燒令赤置酢中搗作細末敷燥更易以瘥為度療瘡腫方用甘蕉根傅之瘥又方治外風入瘡口腫痛用劉寄奴末掺瘡口止痛五黄膏治一切瘡腫大黄黄柏黄芩黄連薑黄各等分右為細末冷水調傅立効丸蟾酥一錢硃砂龍腦麝香五分右為細末用頭首孩兒乳汁為丸如黄米大毎服二丸多効癰腫温酒送下鼻衂芥子湯下心痛小腸氣茴香湯下小便不通雄䑕糞煎湯下㵼血生姜湯下咳𠻳同上小兒驚風沙糖水下白痢乾薑湯下傷食随所傷物下小兒㵼芝蔴煎湯走疼走痛茶下噎食米湯下小兒熱風薄荷下徧身疼痛醋湯下人着鬼祟桃李湯下渾身黄腫木𤓰湯下大小便不通墨水下産後徧身疼痛小便酒乳香湯下産後發寒熱蜜水下産後發寒煎金銀花湯下胎死不下童子小便荆芥湯下經絡不行酒煎當歸散湯下鼻衂不止口噙水㗜一丸心疼醋湯下臍下虛冷温酒下渾身虚腫氣不通酒下臍下水氣煎葶藶湯下若四肢冷背强空心酒下三四丸如人行四五里冄服四五丸然後喫鹽葱白粥後盖覆出汗立効脾胃不利煎水榖湯下血漏崩火燒蠶子灰冷水下血迷煎血見愁湯下胃虚冷丁香湯下化堅湯出濟生㧞粹方治瘡難消又不能作膿者地骨皮一兩木香五錢穿山甲二錢半麝香右為細末溫酒調下及治小兒班疹疳瘡癰腫以米湯調下何首烏散出醫方集成治遍身瘡腫癢痛防風苦參何首烏薄荷各等分右為粗末毎用藥五錢水酒各一半共用一斗六升煎十沸熱洗便於避風處睡一覺其痛甚者三日愈内托黄耆散出瑞竹堂方治諸瘡證腫痛黄耆連翹葛根甘草右等分為末毎服三錢水一盞半煎至六分去滓食前溫服治腫毒方知母貝母黄柏皮芙蓉葉右為細末在上蜜調傅在下米醋調傅貼瘡腫以山慈菰取莖葉擣為膏入蜜貼瘡口上候清血出効蜀椒方治瘡腫以生椒末麫釡下土末之用大醋和傅烏金散治諸瘡腫用鯽魚一個約重六兩者去腸用柏葉碾細入魚腹内用紙裹數重次用黄泥固濟煆存性候冷碾成細末輕粉一分同勻如瘡乾用蔴油調瘡濕乾用治瘡中有風水腫痛秘澁青葱乾薑黄蘗右同相和煮作湯浸洗之立愈全蝎散治外風入瘡口腫痛全蝎一個白殭蠶一個去絲蝉蛻三個右為末擂生姜自然汁調塗之治腫毒方用帯泥山藥萆麻子糯米為一處水浸研為泥敷腫處即愈二聖散治諸瘡腫淄丹二兩白礬二兩飛右為細末毎用乾掺瘡口上後用保生錠子揑作餅子貼之透經丸治熱毒腫瘡大黄二兩黒牽牛二兩五錢半生半熟右為細末用皂角十枚揉碎水煮至熟去滓用汁搜藥和丸如桐子大每服二十丸漸次虚實加至四十丸用温水送下又方治諸瘡腫用撫芎不以多少煆過入輕粉用麻油調塗如瘡濕乾掺追毒烏金散治瘡内惡肉追毒潰膿巴豆五錢寒食麺一兩右用水和麺作餅子將巴豆包定休令透氣以文武火燒深黒色為細量瘡口乾貼之白芷散治腫毒暑毒水刺腫手背用小烏頭香白芷末水調傅腫處又方治腫毒白礬一兩巴豆二十一個去殻右藥同入銚内滚數沸礬花開豆色黄黒頓冷去豆碾為末用􅓗管吹入喉内即愈治諸瘡腫痛不可忍者出濟生㧞粹以葵花根去黒皮擣若稠㸃井花水少許若不稠不須用水以紙花如膏貼之治諸瘡腫出應騐方以馬牙齒燒作灰和唾調於絹帛上貼之療面目手體生班或痒或瘭子腫起不即治之甚殺人出肘後方用羚羊角燒為灰研令極細以鷄子清和塗之極神騐無鷄子水和塗之甚妙治熱毒瘡并腫方用家鴨糞以鷄子調傅内消治諸瘡癰腫不散者取白藥根擣爛傅貼乾則易之無生者用末水調塗之亦得治諸處皮裏面痛取何首烏以薑汁調成膏痛處以帛子裹之用火炙鞋底熨之妙治瘡腫用象膽以清水和塗瘡腫上并瘥治風癢及諸瘡腫瘑瘡疽癢久不瘥有蟲者煑羊桃洗之佳羊桃多生溝渠陘塹之間少加鹽豉尤妙或用枝葉煑洗亦佳治瘡腫出本草以蒺䔧蔓洗三寸截之以水五升煑取三升去滓納銅器中又煑取一升納小器中如稠糖取傅瘡腫上治手足腫及熱瘡兼治熱毒丹瘡出本草以田螺生研汁傅之牛蒡粥方療瘡腫取牛蒡根三莖净洗煑令爛於盆中研令細去筋脉汁中即下米煑粥鹹淡任性服一椀甚良無忌食訖含生乾地黄丸如胡桃大除熱補益也穿山甲散出宣明論治一切通氣破瘡腫行膿血穿山甲木鼈子烏龍角各等分俱燒存性右為末毎服一錢五分空心熱酒調下至午瘡破膿血便行浴毒湯出御藥院方治諸瘡疼痛堅硬不消及破後膿水不絶惡肉未退好肉不生以乾艾葉半兩用何首烏粗末一兩水一大碗同煎至半濾去滓稍熱洗冷再暖療一切瘡腫及風丹遍身如棗大出本草以鷄腸草燒作灰和鹽傅之一方搗汁傅瘡亦可煮作菜食之或取末以猪脂調傅此藥極効五月五日收得者驗治瘡腫未得頭破者三日後出本草取冬葵子一百粒吞之當日瘡頭開摩風膏出瘡科精要治頭靣五發瘡腫疥癬等疾及湯火破傷摩風滅瘢痕白附子白芍藥白茯苓零陵香白芨白歛白芷白檀藿香升麻細辛黄耆甘草杏仁去皮尖各半兩黄蠟六兩腦子一分大栝蔞二栝蔞根一兩芝蔴油一斤右凡藥十四味剉油内浸百日於臘日慢木炭火上銀石器内煎至白芷微黄色離火入栝蔞二味着内煮百沸重綿濾去滓再慢火上錬油香下削净黄臘鎔開為度傾在磁器内收貯上掺腦子宻封旋用摩風塗之治瘡腫出本草以蛇苺草㶸之治諸瘡因風致腫出本草以櫟木皮根三十斤剉以水三斛濃煮内鹽一把漬瘡出膿血日為之瘥止将軍鐡篐膏出徳生堂方治諸惡毒瘡紅腫突起用藥篐瘡四圍不令滋蔓走疰毒氣南星一兩草烏三錢川烏五錢雄黄三錢大黄一兩鹽霜白梅一兩蒼耳根一兩白芨防風白歛各五錢右為細末先用蒼耳根鹽梅搗爛和餘藥調成膏如乾入醋調得所於瘡四圍用藥作鐡篐塗上止留瘡髙突處藥乾以鷄翎蘸水掃之日換二三次大妙治諸瘡腫馬毒瘡出本草以馬齒莧水煑冷服一升及塗瘡上治濕癬白禿以馬齒膏和灰塗之効治𦂳脣靣腫搗汁塗之冬月乾末水調塗治丹毒發背腫擣傅之不住者以藍靛和之更佳治多年惡瘡搗爛傅之尤良治三十六種風結瘡取馬齒莧一石水二石一釜煮之澄清内蠟三兩熏煎之成膏塗瘡上并服之療毒瘡腫疼號呌臥不得乆不瘥者出手集方取獨頭蒜兩顆細搗以蔴油和厚傅瘡上乾即易之頃年盧垣侍郎入東畿忽肩上瘡作連心痛悶用此便瘥後李僕射患腦癰久不瘥盧與此方便愈絳得此方𫝊救數人無不神効治因瘡而腫紅赤皆因中水及中風寒所作其腫入腹則殺人出本草多以桑灰淋汁漬冷復易取愈梅師方同治熱瘡惡腫出本草以青黛摩傅之治瘡腫除膿血生肌膚長筋骨出本草以楸葉搗傅上亦煮湯洗膿血冬取乾葉湯揉用之治瘡腫除血長膚出本草以紫荆木煮汁洗之破棺丹出衞生寳鑑治瘡腫一切風熱大黄一兩半生半熟甘草一兩芒硝一兩右為細末錬蜜和丸如弹子大毎服半丸食後温酒化下童子小便半盞研化之忌冷水如聖散出華陀中藏經中治一切無異色瘡腫消毒并閃肭折傷接骨定痛活養血脉已破者不可用赤小豆一升川烏頭一兩草烏頭一兩炮乳香五錢芸臺子一兩右件同為細末每用一錢入白麺一錢瘡腫用水調稀煮一兩沸放温攤紙花上貼患處傷折用醋調膏損用黄米粥調可患處大小治之用帛子纒繫或以沙木箆夾五日一換六十日當瘥治結成腫未實潰小便不通者出百一選方以葱不拘多少碎切入蔴油内煎令黒色去葱不用只收油趂㣲熱通手逐旋塗上自消蘇龍丸一名神明膏出衛生寳鑑治一切瘡腫傷折摩風止痛酒調一錢服下如有口瘡含化每日塗之或口靣風癬瘙痒遍身瘡疼痛并塗膏摩令熱赤即佳耳鼻中有肉鈴用紙撚子毎日一㸃一月取下久瘡及治小兒瘡瘤湯火傷但是痛處貼着便愈其次等膏可去靣油偏治肺風黒㸃滅瘢痕出顔色生瓜蔞一个去皮用仁赤芍藥甘草杏仁湯浸去皮尖當歸人参桃仁去皮尖各一分川芎蒼术桑白皮各半兩沉香研極細零陵香藿香各半兩右并細剉以清蔴油十五兩浸四十九日候日足先傾出油再以活炭火煉令香熱放冷入諸藥文武火養自曉至昏黒候藥色半焦用生絹濾去滓却入大鵝梨一枚裂取自然汁并黄蠟一兩半麝香一分重煉候油不滚起即成盖梨汁盡故也入細研生腦子末一分或半分攪勻重後以新綿濾入通油甆合中所餘藥次滓日再以油六兩煉半日濾出仍却入鵝梨一箇取汁蠟一兩半麝香一錢研用候油不滚起更入腦子半錢細研攪匀濾出取如前法為次等膏貫衆湯出衛生家寳方洗瘡腫不散貫衆不拘多少茱茰三五錢朴硝三五錢右用淡醋半升水二升同煎至二十沸去滓先薫通手洗之消毒犀角散治一切諸般大人小兒瘡癤眼目口舌咽喉臉腫腮結核癰遍身小兒瘡疹癉毒赤㿔三四服快透消毒神効防風八分荆芥三錢半甘草一錢牛蒡子一兩右㕮咀每服三錢水一盞半煎至一盞食後三服靈䑕膏出經騐方治瘡腫去痛以大黄䑕一枚渾用清油一斤慢火煎䑕焦於水上試油不散即以綿濾去滓澄清重拭銚子令净以慢火煎上件油次下黄丹五兩炒令色變桞木箆子不住手攪令匀再於水上試滴候凝即下黄蠟一兩又熬帯黒色方成膏然後貯於甆合器中候硬合地上出火毒三兩日傅貼瘡腫去痛而凉瘡癤瘤腫出儒門事親夫大人瘡癤小兒赤瘤腫之疼痛不止内經曰夫諸痛痒瘡痬皆屬於心火可用一呪法禁之法者是心法呪白龍鬼流兮諸毒腫癰瘡膿血甚發痛至心稱念大悲呪三唾毒腫随手消右一氣念呪三遍用望日月燈火取氣一口吹在瘡腫丹瘤之上右手在瘡上虛收虛撮三次左手不動毎一氣念一二遍虛收虚撮三次百無禁忌用之時心正為是此法得於祖母韓氏相傳百餘年用之救人百發百中若不食葷酒之人其法更靈病瘡腫者大忌猪魚兎發熱動風之物此法不得輕侮無藥處可附之諸瘡附論諸瘡雖不能害人然浸滛無巳亦有多年不獲愈者此皆心腎不濟飲食不節腸胃停留以致風毒與血氣相傳凝滯於肌肉之間而發露也其名目療治有異焉凡人體虚感受風熱濕毒之氣發為瘡痛痒焮腫身熱多汗是為惡瘡或生於手足間相對如新茱茰痒痛拆裂搔則黄汁淋漓有孔如窩久而生蟲是為窩瘡或初生如飯粒漸大而有根頭破血流膿出肉反如花開之状是為反花瘡或初生甚小先痒後痛汁出浸滛濕爛肌肉延至遍身若從口發出流散四肢者輕若從四肢發生然後入口者重是為浸滛瘡或生於兩耳鼻面間及下部諸竅侵蝕筋絡月中則瘡甚月末則瘡衰以其隨月而生是為蝕月瘡小兒耳下瘡亦名月蝕或毒氣攻於手足指挐肉裡指甲疼痛出血瘡中有蟲是為甲蛆瘡或指頭先腫焮熱掣瘡然後於瓜甲邊結膿甚者瓜甲俱脫是為大指或人禀性畏漆見漆則中毒面痒而腫遶眼微赤痒處搔之隨起㾦㿔重者遍身如豆如杏膿焮作痛是為漆瘡或盛夏腠裡易開風熱毒氣轉於皮膚輕者状如撒粟重者熱汗浸瀆匝匝成瘡曰疿瘡或神心欝燥遍身發瘡多出膿血赤爛如火曰熱瘡或身觸風寒冷氣以致血澁不行其瘡頑滯不知痛痒經久難瘥曰冷瘡或身發瘡腫非癰非疽非癬非疥状如惡瘡或瘥或劇曰無名瘡或頭生白團班剥如癬上有白皮久則成痂遂至滿頭瘡中有孔有膿細蟲入裡不痛微痒小長不瘥曰禿瘡或風熱毒流注兩脚生瘡腫爛疼痛歩履艱難惟生於膁骨者為重曰膁瘡以其骨上肉少皮薄難愈至有多年無巳瘡曰口開瘡皮爛骨見臭穢可畏者先當取蟲然後傅藥或滛夫龜上生瘡其初發如粟拂之則痛由是出清膿作臼孔侵觸臭爛日漸大痛曰妬精瘡以婦人先有宿精在内或月水未㫁與之交接滌穢不前𫝊氣而作婦人亦有生於玊門者曰隂蝕瘡或滿頬滿項發如豆梅痒而多汁延蔓兩耳内外濕爛如浸滛瘡之状曰走皮延瘡田野呼為悲羊瘡已上數種名目不同治各有方方療天下雜瘡丹砂雄黄芎藭椒防已各五分龍膽梧桐皮柏皮竹茹桑白皮蜂房蝟皮各四兩蛇蛻皮一具右切以苦酒浸半月微火煎少時乃内蠟月猪脂三斤煎三上三下去滓以傅瘡上并服如棗核大良又方剪草胡礬硫黄白芨紫荆皮各等分班猫少許右為細末入大楓油和勻若病攣身生瘡痒甚者揉之後痛不可忍用此藥再加香油調擦渾身旬日之後肌體妙復加味當歸飲子治瘡痒諸痛痒瘡皆屬心火火欝則發之當歸生地黄升麻各五錢防風二錢半荆芥穗何首烏各二錢白芍藥柴胡川芎羌活黄耆各三錢紅花蘇木甘草各一錢右㕮咀每服五錢水二盞生姜三片同煎至八分去滓食後臨卧通口服沐浴取微汗効速使血氣通和服之應効何首烏散出楊氏家藏方淋渫諸瘡何首烏威靈仙苦参艾葉荷葉各三兩右件㕮咀用水五升煎數沸乗熱薫病處通手即渫洗如脚氣小腸氣去苦参加蛇床子二兩治諸瘡取鯽魚燒以醤汁和塗之治瘡瘍方石膽丹砂雄黄礬石磁石右用黄堥黄堥即瓦合也治藥於其中燒三日三夜其煙上者以鷄羽掃取注瘡中惡肉破骨則盡出即愈甞謂雄黄治瘡痒尚矣周禮瘍醫凡療瘍以五毒攻之鄭康成注云醫方合五毒之藥即此楊大年筆記其事族人楊嵎年少時有痒生於頰連齒輔車外腫若覆甌内潰出膿不輟吐之楚痛難忍療之百方彌年不瘥人語之依鄭法製藥成注之瘡中少頃齒骨連兩牙潰出遂愈後便安寕信古方攻病之速也作之合黄堥音武若今市中所貨有盖瓦合也近世合丹藥猶有用黄瓦􅀈亦名黄堥事出於古也麝香輕粉散治血疳瘡隂蝕疳瘡耳疳瘡一切惡瘡皆治輕粉麝香各五分乳香沒藥白礬飛過各一兩右為細末量瘡乾貼五香湯治諸瘡毒氣入腹托裏兼主熱毒氣卒腫痛諸發或結核似癰癤而赤使人頭痛寒熱氣急者數日不除殺人疾速愈後毒或觸犯再腫宜服丁香木香沉香乳香麝香各一兩右為細末毎服三錢水一盞煎至六分去滓空心稍熱服嘔者去麝香加藿香一兩渴者加人参一兩大抵專治毒氣入腹煩悶不通者其餘熱渴昏昧口燥咽乾大便硬小便澁者未可與服治諸疾瘡菉豆粉一斤獨顆蒜五十個藜蘆一兩蝸牛一百五個活者右將蒜粉蝸牛一處炒黄色晒乾與藜蘆相合為細末調擦瘡上後用紙花貼定以新汲水時掃勿令乾消毒散治諸般瘡疾大力子四錢荆芥二錢防風四錢甘草二錢右為末毎服二錢水煎一盞調服葵花散治一切瘡一名百花散欝金黄連黄柏梔子仁葵花各等分右為末冷水調成膏貼瘡痛處神効治瘡洗方古大墓多石灰汁夏月行人有瘡者見墓中清水因自洗浴瘡偶愈於是諸病者聞之悉往洗之轉有飲以治腹内疾腹上臍右近下瘡柴胡一錢升麻半分石膏一分當歸梢半分黄芩三分黍粘子二分蘇子半分連翹一分生甘草半分生京三稜五分炒黒色右為粗末作一服水煎去滓服赤豆散赤小豆吳茱茰赤色白膠厚黄柏黄連貝母硫黄糯米焙乾各一分虢丹煆半分右為末蔴油輕粉調抹槐枝煎湯先洗後抹苦参散治肺風上攻眉額生瘡苦参藍葉威靈仙去土蔓荆實去皮何首烏荆芥穗胡麻子烏藥挫天麻右等分為散毎服二錢食後溫酒調下日三夜二洗瘡苦参荆芥防風露蜂房木鱉子五倍子地骨皮桑白皮白殭蠶右各等分水煎薫洗瘡處佛手散治諸瘡痛不可忍米殻四兩人参六分半川芎陳皮六錢半沒藥乳香二錢半麻黄一兩當歸一兩甘草五錢右為粗末毎服三錢水煎服蕪荑散治瘡久不瘥蕪荑藜蘆各一兩薑黄青礬雄黄各一分苦参沙参各三分附子一枚右治下篩先以藍汁洗瘡去痂乾拭傅上小兒一杪久剥去之大人半日纔剥再傅不過四三度愈治膿泡諸瘡出應騐方大腹子當歸鬚各一兩全蝎一錢地花椒三錢生硫黄荆芥各三錢蛇床子一兩枯礬少許右為末香油調傅愈風散治風寒暑濕等瘡並皆治之其効如神菊花去枝梗烏頭炮烏蛇炙地骨皮川芎桔梗苦参各三兩草烏炮二兩右為㕮咀毎服三兩用好酒一瓶浸七日取出溫服一盞日食三次忌發風等物神祕方一名地黄膏出肘後方療一切瘡已潰者及炙貼之無痂去肉生膿地黄汁一升松脂二兩重薫陸香一兩羊腎脂及牛酥各如鷄子大先於地黄汁煎松脂及香令消即内羊脂酥并更用蠟鷄子大一時相和煖火煎水盡成膏去滓塗帛貼瘡日一二易故緋一斤亂髮一鷄子大許療年深者十餘日即瘥生肉八仙散穿山甲炮白藥子瓜蔞仁大黄木黎槐花白礬山梔子右等分停生用水一大盞煎過舍上迎露日未出面東服之金黄散出御藥院方治諸瘡痬痒極發疼乳香三錢半輕粉一錢白龍骨一兩半瓦粉二兩半滑石二兩黄柏二錢寒水石右同為細末各研令細毎用藥少許時乾掺患處用油調之搽亦可聞香散治一切瘡硫黄蛇床子黄連黄柏輕粉大椒右為細末用芝蔴油調搽瘡上將手鼻聞香白散子止痛生肌滅般痕牡蠣三兩煆研寒水石一兩半大煆南星炮白殭蠶龍骨已上各三分右細研掺瘡口避風將息勿令見水又蟾蛻為末傅瘡口上瘡藥消風散葱白十莖細搗猪油去膜搗白礬輕粉水銀各等分右為末調傅之傅瘡如聖散全蝎五錢全者紫荆皮一兩明礬八錢白芨一兩斑猫二錢去翅右碾細末如病人腿脚破裂肉皮潰爛脚底穿心用葱鹽湯洗瘡口用水調敷患處如乾再用水潤後瘡靨自落其瘡即愈大有神効内托散治男婦人諸般瘡疾兎絲子大力子破故紙朴硝川大黄各五錢右為末每服七錢在上用食前在下食後應露服之如神大効當歸和血散治瘡瘍未發出内痛不可忍及婦人產前産後腹痛當歸二錢沒藥二錢半乳香五分白芍藥三錢右為細末每服一錢水一中盞煎至七分和滓温服日二婦人酒煎瘡既發不須用瘡瘍者加人参木香婦人加赤芍藥黄蘗散出神効方治鵬窠繳腰等瘡黄蘗白芨白歛各等分黄丹少許右為細末凉水調塗復堅散出濟生㧞萃方治瘡太陽夲經獨活五分羌活一錢半防風五分藁夲一錢半調經中血氣黄芩生地黄知母各一錢黄連黄蘗各一錢半俱用酒洗散瘡結聚防風梢五分當歸身連翹各三錢益元氣㵼火於三焦黄耆一錢半人参五分甘草一錢炙生甘草梢五分㵼腎間火補下焦元氣補胃橘皮五分除膀胱留熱漢防己五分酒洗澤㵼丹參桔梗各一錢右㕮咀作三服水三盞浸半日煎至一盞去滓稍熱服將二服滓更作一服服藥後不得飲冷水恐作膿治瘡方出百一選方白礬虢丹飛膠香各五文乳香右同為末用蔴油少許輕粉十文同調傅之治瘡巴豆十四粒去殻蔴油二兩黄蠟少許輕粉右同煎巴豆焦黒為度去巴豆不用入黄蠟輕粉攪勻如面油搽瘡上治一切瘡出仁存方鹿黎根蛇床各半斤真剪草四兩用鷄膓草亦可硫黄三錢右為末入輕粉同研勻蔴油調傅小兒以蔴油調㸃在絹衣上著衣七日不解其瘡自愈又方出仁存方雄黄四兩硫黄四兩松糖四兩明礬四兩枯右用好砂合盛硫黄松糖相和着在合内外以赤石脂固濟封口用炭火煆通紅候冷取出入雄黄白礬共為末麻油調傅治諸瘡出應騐方平胃散二兩明礬一兩枯黄丹五錢芙蓉葉一兩末右同為末用葱川椒煎湯洗以前藥傅之愈殺蟲方出危氏方鷄心㯽榔一兩黄連穿山甲十個燒存性麝香五分右為末用蠟茶末調塗三五日後用葱湯洗龍骨散出聖濟縂録治髮際瘡初生如黄米大或瘍或痛龍骨烏賊魚骨去甲胡粉各半兩鉛丹一錢炒紫色右研細先用鹽湯洗了貼之日三五上三黄膏出危氏方治一切瘡痛青油三兩煎巴豆二十粒微黒色去巴豆入黄蠟一兩化訖研雄黄硫黄各一錢溫入成膏净洗抹𫝊之二三次効疹豆後瘡亦用百合散出聖濟縂録治頤頦瘡一名獨骨瘡百合黄蘗各一兩白芨一分萞麻子仁五十粒研右為散用朴硝水和作餅貼之日三五上紅粉散出聖濟縂録治粉鈐瘡繞項赤爛多汁宻陀僧煆龍骨各五錢胡粉二錢鉛丹一錢炒紫色右研細挹去膿汁用生油調塗日三夜一墨蒜散治諸瘡著白痂復發大蒜䑕屎書墨右各等分為末傅之日三治種種諸瘡不愈出千金方水銀一兩黄連二兩金墨三分右治下篩以不落水猪膏和傅上不過三度瘥神良若欲多作任入水銀大須熟研其藥唯不治金瘡追毒散出宣明論治生瘡發悶吐逆霍亂螺兒青㨂甘草各一兩白礬二錢半右為細末毎服一錢新汲水調下立止廽瘡金銀花散出濟生㧞萃方治瘡痒痛甚則色變紫黒者金銀花連枝葉剉二兩黄耆四兩甘草一兩右㕮咀用酒一升同入壺瓶内閉口重湯内三兩時辰取出去滓頓服之一方無黄耆大豆飲出肘後方治因瘡中風腰脊腫脹牙関口噤四肢强直以鷄屎白一升大豆五升和炒令變色乗熱酒以沃之微煮令豆味出量性飲之覆身出汗勿觸風敷藥合掌散出澹療方治身生瘡百藥不効㯽榔五個為末硫黄五錢生者研細末膩粉五分右和勻毎服一錢安於手心内油調夜卧時塗外腎不得洗手但擦手令乾可也一二日瘡即愈金粉餅出聖濟縂録治髭鬚瘡膿窠欝金菉豆粉各半兩白歛一分右為末用朴硝水和作餅貼之黄香餅出聖濟縂録治鬈毛瘡在頭中初生如葡萄痛不止黄柏一兩欝金五錢乳香一分右搗研為末用槐花水調作餅於瘡口貼之白龍散出聖濟縂録治晴漏瘡目大眥出膿汁有孔龍腦馬牙硝各五分菉豆粉一錢右同研極細用燈心蘸藥㸃之日四五上敗蹄散出聖濟縂録治天柱瘡生脊顀尖上如錢大赤色出黄汁不止驢蹄削二十片燒灰胡粉一分熬麝香少許研右合研末破以醋煮麺糊和成膏塗入已破乾掺青金散治疳瘡等瘡稻糠碌一兩胡椒五分麝香少許右為細末毎日一次乾掺在瘡口内苦參丸出如宜方治血熱氣滯皮膚遍身生瘡痒瘙出血苦参八兩净荆芥穗四兩右為末糊丸如梧桐子大毎服四十丸米湯食後吞下治甜瘡出濟生㧞萃方以大棗去核實以緑礬火燒微存性研細貼之如瘡乾以小油調塗治久不瘥瘡出海上名方以猪筒骨中髄以膩粉和為劑復納骨中猛火煨香燒出先以溫鹽水浴瘡傅之朱砂透紅丸治瘡蜈蚣一對血竭一錢麝香一錢輕粉一錢蟾酥一錢粉霜一錢朱砂五分右将蟾酥為丸毎服三丸至五丸冷酒送下敷瘡藥斑猫七個白礬飛過雄黄研過硫黄各五錢松香黄蠟黄丹各一兩右先用香将斑猫煎熬過次下礬等藥候煎熟下黄蠟化用黄丹便成膏傅之治瘡疱将出用惡實即牛旁子炒冷熟杵為末毎服一錢入荆芥二穗水一大盞煎至七分放溫服如瘡疹已出更服尤妙治諸瘡出應騐方牛皮燒灰明礬等分右為末醋調擦破傅上兼明礬一兩酒半鍾煮化服毎日服羊蹄草二斤蒼术一斤酒糊丸尤治腎藏風蝉蛻散出危氏方治飲酒後徧身痒如風瘡抓至血出其痒止後痛方見本門諸疥類驅風散出危氏方治瘡紅椒開口者七粒連根葱頭七個右同煮水净洗用絹衣浥乾即愈余甲子夏自桂入歸途中為瘡痒所苦暫憇湘山寺遇長老寂翁授此方数日而愈當歸丸出聖濟縂録治一切風刺靣上生無名瘡癤因飲酒炙􅘤物得之也當歸四兩青鹽二兩右先以水洗當歸乗潤用青鹽掺徧擱在髙處三日取下去鹽以當歸曝乾為末滴水丸如菉豆大毎服二十丸空心溫酒下露蜂房散治大人小兒頭靣上無名瘡黄水不止露蜂房蛇蛻各一枚右同於碗内燒過為灰毎㸔瘡口大小用膩粉少許和勻生油調鷄翎掃之二金散治大人小兒蝕透顋頰初生如米豆名金顋瘡鷄内金是肚内黄皮焙欝金右等分為散先用鹽浆盥潄了貼之忌米食吳茱茰湯出御藥院方治風毒瘡乆不瘥吳茱茰川烏頭生用不去皮蛇床子桂枝各一兩荆芥穗附子生用去皮各五錢右為麄末毎用藥五錢水半碗煎二三沸去滓用綿子蘸藥淋掃患處臨卧頻頻用之後用香白散秘方净肌散出簡易方治一切瘡痒諸證雄黄北芩大黄海螵硝生硫黄黄柏剪草黄連蛇床子五倍子各五錢右細末用真香油調抹瘡上大有功効石韋散出聖濟縂録治玊枕瘡生枕骨上如癰破後如筯頭石韋原蠶蛾炒右等分為散乾貼取瘥治瘡出百一選方用五倍子黄柏二味為末傅之去息内厭黒子用草蒿燒為灰以紙八九重淋取汁和石灰㸃之治瘡欲似蜂窠瘥而還發方出聖濟縂録胡粉朱砂各等分右細研為末以蜜和合塗於瘡上三換之即愈治延皮瘡以木緜樹皮陳者妙将火燒了皮捲入輕粉麻油和合之傅瘡上妙治一切瘡久不結靨及痔漏用生薑連皮切作大片白礬末掺在上火上炙焦枯為末瘡乾唾調塗濕乾貼之紅玊飲子治瘡氣嘔吐惡心不止乾胭脂五分菉豆粉三錢右研勻新汲水調下只一服立止杏仁膏出鮑氏方用杏仁湯去皮尖研細絹綾去滓以輕粉麻油調大人小兒皆神効水沉膏五靈脂白芨右等分為細末用新水調擦在紙花上貼之治冷漏或脇癰或癤毒成漏者明礬一半飛一半生用飛者生肉生者匝膿用一錢半五靈脂揀去砂石十分乾净另研和合用半錢右用軟皮紙用口唾裁下津唾於藥末内一蘸撚成小紙撚子却用香油一揾濕略乾放於藥末内揾拖過帶藥末撚令實剪作小段子應約瘡大小用毎一小段子藥紙撚安入漏瘡孔内如早晨安一個至日午久換一個候内中黄白瘀膿出盡令後當有些小血水出方得膿俟出盡方可住藥自然肉痊可瘡藥㯽榔散㯽榔海桐皮䔧蘆菖蒲各一兩䕡茹二兩百部一兩鷄腸草二兩剪草一兩管仲一兩蛇床子二兩山梔子茜草各一兩右為㕮咀同一處微火炒至焦黄色為度作細末用香油調擦瘡上次入雄黄白膠香為妙瘡藥出御藥院方用粉米不以多少炒存性為細末鵞梨汁調塗害處紙花貼治諸瘡弩肉如蛇出數寸出聖惠方用硫黄細研於肉上薄傅即便縮燥着唾塗烏梅膏出聖惠方治諸瘡中新弩出肉不瘥者以烏梅肉蜜和捻作餅子如錢厚以貼瘡又以燒灰傅之亦佳并治馬疳瘡一方用烏梅屑傅之佳治諸瘡馬勃俗人呼為􅀢勃紫色虚軟状如狗肺弹之粉出傅瘡用之甚良也治諸般疔腫惡瘡骨疽蛇露身痒瘑疥癬等瘡久不瘥者出肘後方用蛇蛻燒末和水調傅上一方治身體白駮以醋調傅上佳一方燒灰猪脂調傅或只用灰亦可或取皮熟摩瘡上數百遍訖棄皮於草中良治一切瘡出本草以蕪荑和沙牛酪塗之陳者良治時疾熱瘡湯火瘡爛撲損傷折瘀血以小麥麸醋炒貼窨綠雲散一名桑葉散出衛生家寳治肺毒氣瘡如大風疾以桑葉好者净洗過熱蒸一宿後日乾為末水調二錢匕服一方加防風治損瘡中風者兼凍瘡出肘後方以秦椒用麺作餫飩灰中燒使熱㫁使口開封其瘡上冷即易之又法去閉口者水洗麺拌煑作粥空腹吞之以飯壓之重者可再服以瘥為度或取蜀椒五兩水五升煎至四升去滓乗熱漬痛處以瘥為度一方生蜀椒五兩麺合裹椒勿令漏氣分作兩裹於煻灰中燒熟及熱出之刺頭作孔當瘡上引使椒氣射入瘡中冷則易之須㬰瘡中出水及遍體出汗即瘥治瘡用慈竹笋籜灰油和塗之妙治諸惡瘡寒熱胷中生瘡以䜴為丸服丹疹搗塗瘑瘡乆不瘥炒乾為末以油調傅之並良治小兒頭瘡及婦面瘡以兎絲子絞取汁塗之治頭耳瘡以馬頭骨燒灰傅頭耳瘡治多睡作枕枕之佳治大赫瘡此患急冝防毒氣入心藏出肘後方飲枸杞汁瘥一方炙之以蜣蜋乾者末之和鹽水傅瘡四畔周回如韭葉濶狹者治諸般瘡或爛脚氣瘡膁瘡明礬飛川椒各為末黄蠟輕粉右用柏子油燈盞煎沸入前藥再用黄蠟同煎攪勻成膏却入輕粉如脚氣痛爛瘡先用大蓼煎湯熏洗了挹乾傅藥二次立効又方用見腫消土人又多以生苖葉爛搗貼瘡治疳瘡生身面上汁黄者以葵汁黄者可取根作灰和猪脂塗之其性冷若熟食之亦令人熱悶甚動風氣治瘡中毒以商陸根汁熱布裹熨之冷即易治豌豆瘡以蔓菁根搗汁挑瘡破傅上三食頃根出治諸瘡寒熱毒痺牛馬六畜瘡口生蟲生擣䑕李傅之或和脂塗皆効䑕李子味苦採取日乾九蒸酒漬服三合日再能下血及碎肉除疝瘕積冷氣大良芙蓉𫝊方出聖濟縂録治腮頷腫痛或破成瘡芙蓉葉不拘多少右搗爛傅之以帛繫定日一換療身體及頭悉生瘡取榆白皮炒令黄搗為散以好酒和塗上又以綿褁覆上蟲出即瘥治瘡方出應騐方以絲瓜兒根熬水掃於諸瘡上大凉即愈治久瘡有蟲者出應騐方用柏木節燒油塗之治瘡不能穿者出應騐方用野百合子鹽搥爛傅之佳赤小豆方出朱氏集騐方治善惡瘡疥或赤腫無不愈者用赤小豆七七粒為末傅之愈或以水調傅瘡及四旁赤處落則再傅又方挫散每服二錢水一盞煎服仍用新汲水調藥傅緣赤豆粉粘物既乾難貼掲則用苧根為末和之便不粘此法尤佳仁宗在東宫時常患鮓腮命道士賛能治療取赤小豆七百粒為末傅之而愈中貴任承亮在旁知状後自患惡瘡頻死尚書郎傅求授以藥立愈問其方赤小豆也久之㳂官過豫章或苦脇疽既至五臟醫者治之甚穏承亮曰君得非用小赤豆耶醫驚拜曰某用此活三十口願勿復言有僧發背如爛𤓰周鄰家乳婢後疽作用之皆如神其法細末水調傅瘡及四旁赤腫藥落再傅之蛇纒瘡出危氏方以雄黄為末醋調塗仍用酒服丸為蛇傷及蜂蠆蜈蚣毒蟲顛犬所傷皆可用之又方用鏡靣草入鹽搗爛敷瘡頭上立効治諸瘡發歇不止出直指方以凌霄藤并藥煎湯溫洗數次効凌霄傍松柏上生又方出本草治瘡以藎草煑湯洗瘡有効療瘡方出本草用荆木燒取汁傅之瘥當歸黄耆湯出濟生㧞粹方治瘡痬臓腑已行如痛不可忍者當歸黄耆地黄川芎地骨皮芍藥各等分右㕮咀水煎如發熱加黄芩如發燥不能卧者加梔子如嘔則是濕氣侵胃倍加白术鷄内金散治榖道邊生瘡乆不愈者以鷄肶胵不拘多少是鷄肶内上去下黄皮燒灰最要存性候冷研為極細末毎服用一大稔乾貼之如神治急疳口鼻中用沒石子為末吹下部即瘥治疳䘌食口齒及下部以飛亷蒿燒灰搗篩以兩錢匕着痛處痛甚痛忍之若不痛非疳也下部蟲如馬尾大拘纒出無數十日瘥十日平復治病状如癩卒不成瘡毎旦瘡上退白皮一升許如蛇蛻者出危氏方服雄黄觧毒丸三四服安治諸瘡不消已成膿懼針不得破出肘後方取雄雀屎水調塗瘡頭上治雜瘡及滅瘢痕出本草用寒食飯細研傅之白甆水摩塗之定州者良傅瘡藥出本草治惡瘡以黄藥子四兩為末冷水調傅瘡上乾即旋傅之治悪瘡疥瘡身瘡頭瘡不止出千金方用石澗所生堅小菖蒲一寸九節者為末油調傅一方無油調治爛瘡累治不可者用杜牛膝并鹽泥搗爛敷患處其肉自有如米顆之状俱出自愈替針散治破瘡用蛾口蠒一個燒灰酒調服即透切不可用兩箇三兩蠒兒燒服治漏瘡不乾及瓦疱瘡用紅玉散傅如不効再用㨂紫蘇葉為末掺之尤妙治一切瘡及蠶瘑出本草以鱧腸草搗傅之治因瘡中腰風脊反張牙関口噤四肢强直出本草以䑕頭和尾燒作灰細研以臘月猪脂傅之療燈豆瘡殺一切蟲及治疥癬出肘後方服油麻一升須利即不生白浆大効用青牛溺摩數百度疔腫疔毒瘡肉中突起如魚眼状赤黒燥痛是寒毒之結變作此疾始作服湯及如丹法瘥一方以白麻油搗傅之治天疱瘡天花粉軟滑石右各等分為末水調搽又方用無名異為細末井花水調傅之愈治諸瘡及腎臟風出應騐方烏藥順氣散一貼枳殻散一貼右和為一貼毎天明方醒用銅錢挑一錢舌舔喫如腎臟風入吳茱茰一錢八角茴香末一錢和勻如前服治金瘡灸瘡火燒瘡等方出十便良方蠟如胡桃仁杏子一枚爛搗㯽榔一枚薫陸香半合右和搗以猪脂煎即以此藥塗帛上貼瘡此方甚効治諸瘡中風寒水腫犯毒露者出本草以薤白生杵傅之一方用韭治黒瘡出本草以山蛩蟲燒令黒傅之膩粉散出御藥院方治皮膚受風邪發作痒痛諸瘡膩粉二錢䔧蘆末五錢狼毒末三錢右拌匀毎用乾擦患處楓香散出御藥院方治諸風毒瘡發痒白屑起楓香脂大黄輕粉各等分右為細末生油調稀搽患處治瘡若專利臟腑非宜也盖瘡癬為患因内有所藴發在皮膚然只以外藥傅何由得愈用五積散去肉桂麻黄常煎服須自合者如渾身瘡膿水淋瀝去麻黄加升麻大黄名升麻和氣飲治瘡癖出本草以㯶木煎湯洗之治蚍蜉瘡出本草用山豆根水研傅之治溪毒瘡出本草用膝枯草挼碎傅之療風水爛瘡出本草以雀醫草煎湯洗浴治療痍滅瘢痕疵方出本草以白􅀈蠶合衣魚鷹屎白等分為末靣膏和塗又方出本草黒雌鷄糞傅之療雜瘡出本草以五月五日采蘩蔞曝乾作屑傅之有効治黄水瘡出本草以榲桲皮搗末傅之止黄水煨腎丸出澹寮方治遍身生瘡隂嚢兩脚尤甚耳痒目赤等證草烏一兩塩一兩入水少許作鹹汁浸二宿一日次畨轉切用銚子炒黄赤色為末猪腰竹刀去膜入鹽煨熟竹刀碎研爛入草烏内右二味研勻醋糊丸梧子大大人三十粒小兒五十丸空心鹽酒下黄茋膏藏經騐方治一切瘡癤人参黄茋各三錢當歸五錢香白芷細辛去葉羌活各三錢右件六味剉碎用清油六兩同前藥一處慢火内熬令黄茋微黒為度濾去前藥只用油入沒藥末三錢黄蠟二兩同油攪勻合子盛候冷用門賔林用卿在鄂渚鬢間生癤三四頭雖不甚大其痛徹腦寝食俱廢或曰疽衆藥弗効外醫候迤用此即時疼止遂求得方治瘡出百一選方紅茶大黄一分焙乾小粉焙之炒令青黄色右為細末乾者冷水調濕者乾掺傅瘡藥出澹寮方當歸芍藥各八錢黄茋七錢木香一兩光粉一兩半桑皮一兩半畧去粗皮白芷㯽榔三錢甘草五錢生用右為末蔴油或蠟膏調傅瘡上𫝊瘡藥出澹寮方全蝎七枚去毒并尾瓜梔子七箇右以蔴油煎黒為度去二味入少蠟令如膏子用塗瘡也土硃散出朱氏集騐方治一切瘡土硃虢丹牛皮膠右研細末用好酒煎鎔牛皮膠入此二味和勻澄清喫清藥酒留却傅之瘡上乾又再貼治一切瘡出朱氏集騐方以平胃散用蔴油傅之立効五香連翹散出朱氏集騐方治風氣瘡自上而下調之風瀝自下而上鷄嘴連翹丁香沉香藿香南木香桑寄生甘草麝香射干右為細末白水煎服食後服又用牛尾蕨根謝姿根又名赤葛根子二味槌碎酒三碗溫服併用洗瘡口潰爛之後亦用此藥洗直要潔净大惡忌白物豆腐麺白羊白鷄白猪一切白物皆忌之如服藥後小便淋瀝用五苓散加葵麥木通煎喫此方得之難用之收効又方出朱氏集騐方䔧蘆羅過三椀生用毎以三椀曬將兩椀入硫黄一兩蛇床子三錢輕粉少許斑猫荆芥各五錢大椒三錢右同為末熬麻油乗熱清調臨卧塗疥瘡上次以煎䔧蘆一味入甘草三五十錢同為末毎服半錢酒調酉時服名凉肺散大忌炒豆黄菜用之果効聖愈湯出試効方治諸瘡血出多而心煩不安不得眠睡此亡血故也熟地黄三分生地黄三分歸身五分川芎三分黄耆五分人参三分右件㕮咀都作一服水一大盞半煎至一盞去滓少熱服不計時候汗之則瘡已出衛生寳鑑丁巳委子從軍廽住冬月於曹州界以事至州有趙同知謂子曰家舅牛經歴病頭面腫赤前後尤甚疼痛不可忍發熱惡寒牙闗𦂳急涕唾稠粘致飲食難下不得安卧一痬醫於腫上砭刺數四五百餘鍼腫痛不减其痛益甚不知所由然願君一見遂往診視其脉浮𦂳按之洪緩此寒覆皮毛欝遏經絡熱不得升聚而赤腫經曰天寒則地凍水冰人氣去中皮膚緻腠理閉汗不出血氣强肉堅濇當是之時善行水者不能游泳善穿地者不能鑿凍善用鍼者亦不能取四厥必待天溫氷釋凍觧而水可行地可穿人脉猶是又曰冬月閉藏用藥少而少鍼石者宜以苦溫之劑溫經散寒則已所謂寒緻腠理以苦發之以辛散之麻黄苦溫發之者也故以為君防辛溫散之者也升麻苦平葛根甘草觧肌出汗専治陽明經之邪故以為臣血留而不行則痛以香白芷辛溫當歸身辛溫以和血散滯濕熱人参甘草甘溫白芍藥酸微寒調益氣使托其裏也故以為佐各剉如麻豆大用秤水煮服之以薄衣盖其首以厚被覆其身卧暖所則經血溫腠理開寒乃散陽氣伸大汗出腫减八九再服去麻黄防風加連翹黍粘子腫痛悉去經言汗之則瘡已信哉或曰仲景言疹家雖身疼痛不可發汗其理何也子曰此說營氣不從逆於肉理而為瘡腫作身疼痛非外感寒耶而作疼痛故戒之不可汗如汗之則痓之也又問仲景言鼻衂者不可發汗復言脉浮𦂳者當以麻黄湯發衂血自止所說不同願問其故對曰此與瘡家既同且人身血之與汗異名而同類奪汗者無血奪血者無汗令衂血妄行為熱所逼更發其汗反助熱邪重渴液津必變凶證故不可汗也若脉浮則在表𦂳則寒之邪欝遏陽不得伸熱伏體中廹血妄行上出於鼻則當麻黄湯散其寒邪使陽氣舒其衂自止又何疑焉或者嘆曰知其要者一言而終不知其要流散無家潔古之學可謂知其要矣托裏溫經湯出衛生寳鑑治寒覆皮膚鬱遏經絡不得伸熱伏榮中聚而赤腫痛不可忍惡寒發熱或相引肢體疼痛麻黄去節二錢半東防風去蘆三錢新升麻四錢葛根三錢吴白芷二錢當歸二錢淛术一錢人参一錢炙甘草白芍藥各一錢半右剉如麻豆大毎服秤一兩水三盞先将麻黄令沸掠去沫再下餘藥同煎至一盞去滓大温服卧於暖處以綿衣覆之得汗而散捨時從證出衛生寳鑑至元壬午有人王伯祿年五十有七右臂膊腫盛上至肩下至手指色變皮膚凉六脉沉細而微脉證俱寒請瘍醫孫彦和視之曰此乃附骨癰開發已遲以燔啓之膿清稀觧待日肘再開之加吃逆不絶彦和與丁香柿蒂湯兩服稍變緩待日吃逆尤甚白痢臍腹冷痛腹滿飲食减少時發昏憒於左乳下黒藎處炙二七壯又處乾薑附子木香沉香茴香羌活類藥㕮咀一兩半欲與服或者曰諸痛瘡瘍皆属心火又當盛暑之時用乾薑附子可乎予應之曰理所當然不得不然經曰脉細皮寒㵼痢前後飲食不入此謂五虚况吃逆者謂中虚寒極也諸腫瘡瘍皆屬心火是定理也此證内外相反須當捨時從證非大方辛熱之劑急治之則不能愈也遂用之諸證悉去飲食進瘡勢溫膿色正彦和又與五香湯數服月餘平復噫守常者衆人之見知變者賢人之事知常而不知變因細事而取敗者多矣况醫乎守常知變豈可同日而語哉托裏溫中湯出衛生寳鑑治瘡為寒變而内䧟者膿出清解皮膚凉心下痞滿腸鳴切痛大便微溏食則嘔氣短促吃逆不絶不得安卧時發昏憒羌活三錢黒附子四錢去皮臍炮乾薑炮三錢益智仁一錢炙甘草二錢丁香一錢沉香一錢木香一錢半茴香一錢陳皮内經曰寒滛於内治以辛溫佐以苦溫以附子乾薑大辛熱温中外發陽氣自裏之表以為君羌活苦辛溫透闗節炙甘草溫補脾胃行經絡通血脉胃寒則嘔吐吃逆不下食益智仁丁香沉香大辛熱以散寒為佐瘡氣内攻氣聚而為滿木香丁香茴香陳皮苦辛溫治痞散滿為使也右㕮咀都作二服水五盞生薑五片煎至一盞去滓溫服無時忌一切冷物治爛瘡出本草以梓樹嫩葉搗傅之連翹散堅湯出試効方治耳不至缺盆或至肩上生瘡堅硬如石動之無根名曰馬刀從手足少陽經中來也或生兩脇或已膿作瘡未破皆治之柴胡一兩二錢連翹五錢歸尾五錢酒製芍藥五錢土𤓰根一兩酒炒甘草三錢炙草龍胆二兩酒製四次生黄芩五錢蒼术二錢黄芩七錢酒炒二次黄連三錢酒炒二次廣茂五錢京三稜細剉五錢同廣茂酒製一次微炒乾右見秤另一半煉蜜為丸如菉豆大每服一百丸或百五十丸各秤和勻每服五錢水一盞八分浸半日煎至一盞去滓臥熱服頭脚髙去枕而卧毎口作十次嚥留一口送下丸子藥服卑卧如常亦緩治之柴胡連翹湯治男子婦人馬刁瘡柴胡五錢黍粘子二錢中桂三分連翹五錢瞿麥穗六錢甘草三錢炙生地黄三錢歸尾一錢五分黄蘗三錢酒製知母五錢酒製黄芩五錢炒右件㕮咀如麻豆大毎服秤五錢或三錢水二大盞煎至一盞去滓稍熱服食後時時服之消毒湯治馬刀瘡柴胡二錢連翹三錢歸尾一錢紅花少許甘草一錢生黄芩二錢黄連五分𤓰蔞根一錢半黍粘子五分炒黄耆一錢半右件毎服秤五錢水二大盞煎至一盞去滓稍熱服食後忌酒濕麺連翹防風湯治皮痒腋下瘡背上瘡耳聾耳鳴麻黃一錢桂枝二分草豆䓻仁一錢歸尾七分紅花少許羌活一錢防風一錢柴胡一錢升麻五分連翹半分桔梗五分甘草五分生地黄五分酒黄芩二錢蒼术一錢右件剉如麻豆大都作一服水二大盞煎至一盞去滓稍熱服之治蟮鞏頭瘡用硝碾為末填於蛤殻内覆在瘡上再用生乾麺封於外候麺乾自落瘡愈黄耆乳香湯治諸瘡疼痛或瘡口膿水不盡去麻黄沒藥乳香黄耆一兩生陳皮麻黄甘草芍藥當歸人参没藥乳香米殻各等分右為末如膿水不乾姜棗煎服搽瘡藥小草烏小指靣塊挫極碎右以臘月猪膏入少許輕粉量用搽末瘡上丹膏治一切瘡癤虢丹五兩巴豆十粒麻黄二兩方竹桞條各五莭右件油焦下竹桞巴黄四味煎黒色却入虢丹打勻黒為度令冷乳香丸治諸般惡瘡癤乳香五錢穿山甲五錢木鱉子七錢當歸五錢猪牙皂角七錢右除乳香外松枝火燒存性為細末煉蜜為丸如弹子大毎服一丸於食前酒化下替鍼丸治諸瘡􅟻膿水已成即當針開决出陳臭惡瘀則其治也若其惡瘀不出欲針石須當開發用此藥以射出其膿也雄雀糞直者二十一枚陳壊米末一錢硇砂五分右為細末粳米粥丸如粳米様毎用一丸粘在瘡頭上以膏貼之一方有没藥少許内補散黄耆麥門冬去心川芎當歸茯苓去皮人参五味子各一兩逺志去心甘草炙桂心各五錢右㕮咀毎五錢水一盞半薑三片棗三枚煎八分温服無時通神乳香膏乳香没藥血蝎蠟黄丹木鱉子二兩膩粉三分烏魚骨二兩不灰木四兩五靈脂二兩海桐皮二兩瀝青四兩麝二錢油八兩熬用熬法皆同一切氣漏麝香丸右秘方無巴豆用蝎止痛破積血生肌肉及血不止麝香一錢乳香一兩巴豆十四箇去皮出油右棗肉同丸任瘡上桞木膏治諸瘡瘥後瘡瘢努肉未消瘰癧風等疾冝貼此桞木皮五斤楸葉五斤木通一斤枳殻一斤皂莢一斤木香三兩右件藥細剉以水八斗煮取汁一斗去滓移於水鍋子中下木香煎至七升去滓又移於小鍋中以慢火煎攪勿住手煉如餳撚成丸即住以油帛裹收之毎日塗於帛上貼之取平復為度神効餅子出朱氏集騐方治一切毒瘡山茨五倍子草烏燒存性木鱉子各五錢虢丹三錢右為細末先用鷄子作餠熱傅瘡上候冷取出傅藥其上數日間瘡乾連皮脫去瘡乾即用麻油調徳安寺有僧靣上生徧㡬死一用即安凡諸發即癰疽瘰癧膁瘡湯盪火燒等疾或有别作一種穢臭氣息不堪聞者最是惡症或已未破或小大皆當作急以治之可用忍冬藤一掘擂細用無灰酒濾汁服之以滓傅瘡之四圍用雲母膏别研亦可煎開大口以䕶其藥之上俟其瘡膿出便以猪蹄湯等十分净洗久洗為妙三時辰不妨次用後藥以燻之出澹療方好真降香末楓香末右二味於銚中攪溶丸如弹子大却取香爐一枚衣爐口造紙烟筒一個如燒龍涎香様慢火爇之謹以烟筒口燻瘡上不拘丸數稍倦暫止然後更燻未出膿者即出已出膿者即乾直俟生肌合口然後止向後有赤腫脚處又再燻大槩欲辟去穢氣也平血飲出澹寮方治遍身生瘡膿血腫脹極痛且痒乾葛白芍藥鬼面真全南者升麻甘草各等分右㕮咀毎服四錢重用白水煎服不拘時如對証及藥材得真則功在和氣飲之上魏白虎瘡藥方内經云諸痛痒瘡皆属於心心受風熱則血脉凝滯而成瘡風多熱少即痒熱多風少即痛風熱相半即痒痛皆因大病後風熱毒不曽宣利畜於血脉遍身生惡瘡兩腿尤甚或攻刺疼痛或晩增寒作膿水每盖即疼熱痛即疼痛宜服此出𫝊信適用方烏蛇一條大者細尾小者去頭尾三寸斷用好酒浸三宿去刺與骨皮取好净肉𤣥參去蘆頭苦參去木取皮地骨皮去木净洗甘草細剉白蒺藜炒以新磚二口磨去刺防風去蘆白殭蠶炒斷絲乾蝎川烏已上各五錢草烏半斤肉白者以黒豆一升水煑令草烏都黒惟心中一㸃白為度切焙一兩黒牽牛半生半炒以二兩取一兩末枳殻去穣炒一兩右件一十三味為細末煉蜜搜成劑入石臼中搗百十下丸如梧桐子大毎服二十至三十丸溫酒吞下不拘時候日進三服以利則减不利則加服四生散出澹寮方治上攻下注耳鳴目痒鼻赤齒浮或作口瘡下注隂濕四肢燥痒遍體生瘡及婦人血風瘡白附子沙苑蒺藜黄耆羌活各等分右為細末用猪腰一枚切開去筋膜入藥少許於内濕紙裹炮熟再入藥三錢浸酒調藥併腰子嚼吃令盞底净盡三五服後或熱用鹽酒調亦可或腰子一分兩次用羊腰猪腰皆可雄猪羊者為妙木香㯽榔散出鮑氏方治一切瘡痏濕爛久不治者脚氣濕瘡尤効黄連五錢去蔴油艾葉木香梹榔各末一錢五分和上藥添油成膏右茶葉煎湯洗瘡净帛拭乾上藥畧厚傅紙花覆之二三次即可又方出鮑氏方黄連三分宻陀僧輕粉少許右為末麻油調𫝊治皂莢水并惡水入瘡口内熱痛不止出本草以皂莢子燒存性一分沙糖半兩先細研皂莢子令細續入沙糖勻和如膏貼於瘡上治瘡中水出本草用胡粉炭白等分脂和塗孔上水即止治驚瘡血涌出出本草取婦月經衣炙熱熨之治螻蛄瘡出儒門事親千年石灰茜根燒灰右同為細末用小油調鷄翎塗治諸瘡黄水出用糖子皮搗末傅之治諸瘡觸犯毒露及毒水覺瘡頑不痒痛當中風水所為身心反張似角了者用鹽豉和麺作椀子盖瘡上作大艾炷炙一百壮令抽惡水數升舉身覺痒瘡處知痛瘥也治諸瘡瘻及癧瘍風用鰻鱺魚常食之甚驗鰻鱺魚有五色紋者最佳治諸瘡中毒用羊屎燒烟燻之荆芥丸治身上一切瘡右以地黄自然汁熬成膏和荆芥末丸如梧桐子大毎三五十丸茶酒任下又方用巴豆三四十粒蔴油半盞煎候乾巴豆黒去之不用以油調硫黄輕粉塗之擦令熱為佳普濟方卷二百七十二
