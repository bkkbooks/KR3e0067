五味子半錢同煎傷寒嘔吐論夫傷寒嘔吐嘔者有聲者也俗謂之啘吐出其物也故有乾嘔而無乾吐是以於嘔則曰食穀欲嘔及吐則曰飲食入口即吐則嘔吐之有輕重可知矣傷寒嘔有責為熱者有責為寒者至於吐家則悉言虛冷也經曰太隂之為病腹滿而吐食不下自利益甚時腹自痛又曰胃中虛冷故吐也醫家則不然嘔有熱者有寒者有停飲者有胃腕有膿者皆當明辨之嘔而發熱者柴胡湯主之與其嘔不止心下急鬱鬱微煩大柴胡湯主之者皆邪熱為嘔者也膈上有寒飲乾嘔者不可吐也當溫之與其乾嘔吐涎沫頭痛者吳茱萸湯主之是寒邪為嘔者也先嘔後渴者此為解先渴後嘔者為水停心下此屬飲家是停飲嘔者嘔家有癰膿不須治膿盡自愈是胃脘有膿而嘔者諸如此者雖有殊别大抵傷寒表邪欲傳裏裏氣上逆則為嘔也是以半表半裏症多云嘔也傷寒三日三陽盡三隂當受邪其人反能食而不嘔此為三隂不受邪是知邪氣傳裏者必致嘔也至於乾薑附子湯症云不嘔不渴為裏無熱十棗湯症云乾嘔短氣汗出不惡寒者此表解未和也即此觀之其嘔為裏熱明矣嘔家之為病氣逆者必散之痰飲者必下之嘔家多服生薑此為嘔家聖藥是要散其逆氣也又曰用半夏者以去其水水去嘔則止是要下其痰飲也嘔多雖有陽明症不可攻者謂其逆而未收斂為實也其嘔而脈弱小便復利身有微熱見厥者已為難治蓋謂其虛寒之甚也醫者必審其邪氣之虛實病症之逆順為施藥丸治則當矣歌括曰脈浮有表并虛細嘔吐惡寒無失氣大便堅硬小便清或少或多當自利脈浮者為有表也不可下大抵脈虛細不可下為有表也表症未罷不可下脈虛細王叔和脈微不可吐陽明病屬表可發汗若嘔吐仲景云嘔多雖有陽明症切不可下惡寒者太陽陽明大承氣湯大便堅硬是少隂症宜溫之無失氣者謂不轉失氣也特恐津液還入胃而先硬後溏也每日三四小便清者不在裏也桂枝湯大便堅而小便少不久當利大便也大便堅而小便多其脾約今日再行此津液還入胃中數為熱緩為寒中太陽合病下利腎症之為約又歌曰嘔吐陽明逆氣氣上逆則為嘔吐水穀不下是也傷寒嘔吐有候各有評表邪傳裏裏膿血辨四者而已胃熱脈數或緊必有口粘舌乾煩渴胃熱有火胃寒有水氣右脈弦而遲必有逆冷下食大小便自利之症水氣者先後之症胃寒者若胃脘膿血則腥氣燥氣奔逆上衝經所謂嘔家有癱膿不嘔膈滿怔忡又謂桂枝湯宜服吐者其後必吐膿血是矣大抵嘔吐皆有辨須治自愈咽而出嘔也未下咽而出者吐也吐特甚於嘔耳若槩以嘔有所出與未咽而吐同治所謂乾嘔者獨何耶嘔吐多屬陽明氣逆而上行戒不可下汗灸水藥不入口者逆嘔而脈弱小便自利微熱而厥者虛極難調也生薑嘔家聖藥熱燥者烏梅代之活人書云無陽則厥無隂則嘔嘔者是陽明胃之經足陽明之氣下行今厥而上行故為氣逆則嘔仲景云嘔多雖不大便不可下與小柴胡湯上焦得通津液得下胃氣因和浹然汗出而解大抵嘔症不一各有治法要之小柴胡湯尤相主當耳急與小柴胡湯胸脅滿而嘔日晡發潮熱者柴胡湯加芒硝也若嘔不止心下忡鬱微煩者與大柴胡湯也閉者加大黃大柴胡治嘔最妙為內有積可下故也枳實去噦壓虛氣須是去大黃仲景云嘔多雖有陽明症慎半夏下官局桔梗湯最良亦用枳實耳方具第十七卷古人治嘔多用合病必生薑孫真人云生薑是嘔家聖藥仲景云嘔皆用之太陽與陽明有邪氣下利若不利但嘔者葛根加半夏生薑湯主之胸中有熱胃中虛加腹痛欲嘔者黃連湯主之太陽與少陽合病而自利若嘔者茯苓半夏生薑湯主之金匱論嘔吐穀不得下者小半夏湯小半夏加檳榔湯半夏加橘皮湯皆可選用也嘔而發熱者小柴胡湯主之嘔為水渴者豬苓湯主之先嘔却渴者此為欲解急與之先渴却而嘔者膈停心下此屬飲家仲景云本渴飲水而嘔者柴胡不中與也宜治汗間有水赤茯苓湯主之若少隂而嘔者真武湯去附子加生薑也若有或吐或下後虛煩不時復若嘔者梔子生薑湯主之傷寒差後嘔者有餘熱在胃脘也竹葉湯加生薑主之又云吐有冷熱二症寸口脈數心熱煩渴而吐以有在胃腕故致煩渴而為吐五苓散主之傷寒有表症渴欲飲水水入口即吐者名曰水逆由心經受熱而小腸不利故也宜服五苓散發汗後水藥不得入口為逆若更發汗必吐下不止小半夏加茯苓湯小半夏加橘皮湯主之曽經汗下關脈遲胃中虛冷而吐乾薑黃連黃苓人參湯主之寒多不飲水而吐者理中湯去术加生薑主之少隂病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此由胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也當溫之宜氣逆湯吐利手足逆冷煩燥甚者吳茱萸湯主之若傷寒解後虛羸少氣逆欲吐竹葉石膏湯主之嘔吐而下利有兩仲景云復寒發熱汗出不解心痞硬嘔吐而下利者大柴胡湯下之又有霍亂症霍亂嘔吐而利熱而渴者五苓散寒多不飲水者理中丸或有寒腹滿痛或四肢拘急下利腳轉筋理中湯加附子一枚生用並粗末作湯服之吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之少隂病吐利手足逆冷煩燥欲死吳茱萸湯主之吐利止而身體痛不休者當消息解其外宜桂枝湯仲景大柴胡一症云傷寒發熱汗出不解心中痞和吐而下利者大柴胡主之即非霍亂也吐利已汗出而厥四肢拘急不解脈微欲死者通脈四逆加豬膽湯若夏月中暑霍亂上吐下利心腹撮痛大渴煩燥四肢逆冷冷汗自出兩腳轉筋者宜服香薷散井中浸極冷頻服之乃效香薷散夏月初宜合下以備此症其他藥不能救乃須浸冷併服之效矣方橘皮湯治陽明病嘔吐痰水青黃胸中煩者橘皮甘草炙葛根麥門冬去心一兩半夏四兩切焙竹茹一兩小麥三合右以水七升先煮葛根減二升去上沫內諸藥生薑三兩煮取三升去滓再煮取二升溫服七合和胃丸治陽明病心下痛而嘔吐腹脅滿者以有停水也大黃酒浸甘遂桂枝乾薑白术茯苓芍藥厚朴半夏洗已上各一兩巴豆十粒去皮心研如脂右搗篩入巴豆煉蜜和丸如梧桐子大白飲下兩丸大黃甘草湯出金匱方湯治食已即吐者大黃四兩甘草一兩右以水三升煮取一升分溫再服茯苓澤㵼湯出金匱方治胃反吐而渴欲飲水者茯苓半斤澤㵼四兩甘草桂枝二兩白术三兩生薑四兩右以水一斗煮取三升內澤㵼再煮取二升半溫服八合日三服文蛤湯出金匱方治吐後渴欲得水而貪飲者兼主微風脈堅頭痛文蛤五兩麻黃甘草生薑各三兩石膏五兩杏仁五十枚大棗十二枚右以水六升煮取二升溫服一升汗出愈豬苓散出金匱方治嘔吐而病在膈上吐後思水者解急與之水此並宜服豬苓茯苓白术各半分右杵為散飲服方寸匕日三服藿香湯治傷寒後胃氣未和嘔吐不下食藿香竹茹陳橘皮湯浸去白焙麥門冬去心焙枇杷葉去毛薑汁炙各半兩人參三分右粗搗羅每服五錢以水一盞半入生薑半分拍碎同煎至七分去滓溫服薤白飲治傷寒後脾胃虛冷嘔逆不下食薤白切五莖生薑切一兩附子炮製去皮臍銼一分右以水一盞半煎至七分去滓再煎沸入雞子白一枚攪勻空心溫服薑术半夏湯出保生回車論乾薑二兩炮白术二兩半夏二兩湯浸七次片切焙乾右銼碎如麥豆拉為散每服四錢水一盞半生薑五片同煎至七分去滓溫服日進三服不拘時候普濟方卷一百三十七
