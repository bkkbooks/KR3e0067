所以然者尺中微裏虛表實津液自和當自汗出愈也傷寒心下悸者謂悸動不定也傷寒飲水過多水停心下腎氣乘心則心氣虛弱故為之悸動也此皆由發汗已後又下之津液燥少若內生虛熱熱則飲水水氣停積故心振寒而心下悸也傷寒悸者心忡是也築築踢踢然動怔怔忡忡不能自安者是矣心悸之由不越二種一者氣虛也二者停飲也傷寒二三日悸而煩者小建中湯主之少隂病四逆其人或悸者四逆散加桂五是氣虛而悸者也飲水多心下悸是停飲而悸者其氣虛者由陽氣內弱心下空虛正氣內動而為悸也其停飲者由水停心下心為火而惡水水既內停心不自安則為悸也又有汗下之後正氣內虛邪氣交擊而令悸者與氣虛而悸者則又甚焉太陽病發汗過多其人乂手自胃必心下悸太陽病若下之身重心下悸者不可發汗少陽病不可吐下吐下則悸而驚少陽病不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸是數者皆汗後協邪者與其氣虛而悸者有以異也或鎮固或化散之皆須定其氣浮也又飲水過多水飲不為宣布留心下甚者則悸金匱要略曰食少飲多水停心下甚者則悸飲之為悸甚於他邪雖有餘邪必先治悸何者以水停心下若水氣散則無所不之浸於肺則為喘為咳傳胃則為噦為噎溢於皮膚則為腫瀆於腸間則為利下不可緩之也經曰厥而心不悸宜先治水與茯苓甘草湯後治其厥不爾瀆於胃必作利也厥為邪之深者猶先治水况其邪氣淺者乎醫者可不深究之活人書曰水氣乘心振寒而悸茯苓甘草湯二三日傷寒心悸煩小建中湯發汗臍下悸欲作奔豚自有本條發汗過多心下悸欲得按者桂枝甘草湯發汗出仍發熱心下悸身膶動振振欲劈地真武湯脈結代心動悸炙甘草湯少隂不可發汗汗則譫語此屬胃胃不和故悸小柴胡湯中風往來寒熱或心下悸小柴胡湯欲心下悸悸者怔忡也宜先治水茯苓甘草湯次治其厥自有本條又歌曰心悸三陽症自詳糞堅譫語調胃湯胃旋甘桂膶真武小建中兼炙草湯悸多於停水或陽氣向弱心下虛空正氣內動致之或汗下以後正氣內虛邪氣與之擊搏而然也此蓋心悸而動其與驚陽不同焉太陽病小便利者以飲水多故心下悸小便少者必膀胱裏急也並用五苓散小半夏茯苓湯與之陽明病壯熱往來心下悸小便不利心煩喜嘔小柴胡湯傷風往來寒熱或心下悸小柴胡湯少陽病脈弦細頭痛發熱誤汗之必譫語轉屬胃胃和則愈胃不和則煩悸而大便鞕屬胃調胃承氣湯調胃承氣太峻症治論只用小柴胡湯糞鞕者可加大黃煩燥者可入芒硝些少凡調胃症氣症以法伐之尤為穩當太陽發汗過多其人乂手自按胸心下悸欲得按者桂枝甘草湯太陽病發汗不解仍發熱心下悸頭眩肌體膶動振振欲劈地者真武湯主之或理中湯加茯苓傷寒二三日心中悸而煩與小建中湯經云先煩而後悸者為熱先悸而後煩者為虛惟虛則小建中主之少陽病耳聾目赤胸滿而煩妄加吐下則悸而驚可與小建中湯如有熱即以小柴胡繼之傷寒脈結代心動悸炙甘草湯少隂四逆症其人或悸以四逆散加桂主之心下水氣厥而悸當先治水茯苓甘草湯然後治厥有本條不然水入胃必下利矣傷寒多因吐下或火熏或溫針以致驚陽太陽病若下之胸滿煩驚小便不利譫語身重難以轉側用柴胡牡蠣龍骨湯不可發汗汗多則亡陽風溫脈隂陽俱浮妄用火熏以致發黃劇則驚癎時時瘛瘲經曰一逆常引日再逆促命期合用金匱風引湯方大柴胡湯出聖惠方治傷寒二三日心中悸嘔不止心急鬱鬱微煩者尚未解柴胡二兩去苗黃芩一兩赤芍藥半夏湯洗七遍去滑赤茯苓枳實麩炒令黃檳榔白术已上各一兩右搗粗羅為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服白茯苓散出聖惠方治傷寒裏虛心下悸腹中氣不和檳榔一兩青橘皮半兩湯浸去白穰焙白茯苓半兩厚朴一兩去粗皮塗生薑汁炙令香熟桂心一兩甘草半兩炙微赤銼附子一兩炮製去皮臍右搗篩為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服人參散出聖惠方治傷寒發汗熱不解心下悸頭眩身膶振人參去蘆頭赤芍藥附子炮製去皮臍白术已上各一兩甘草半兩炙微赤銼赤茯苓一兩右搗篩為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服桂心散出聖惠方治傷寒發汗過多其人以手捫心下悸欲得按者桂心甘草炙微赤銼人參去蘆頭白术枳實半兩麩炒微黃右搗粗羅為散每服四錢水一中盞煎至六分去滓不計時候溫服芎藭散出聖惠方治傷寒已得汗其人仍發熱心下悸頭痛目眩心神煩喘芎藭桔梗去蘆頭前胡去蘆頭石膏人參去蘆頭白茯苓麥門冬去心已上各一兩旋覆花半兩枳殼麩炒微黃去穰半兩右搗粗羅為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服甘草散出聖惠方治傷寒脈結代者心下悸也甘草炙微赤銼茯神逺志去心蒼术已上各一兩枳實半兩麩炒微黃右搗粗羅為散每服三錢水一中盞入生薑半分煎至五分去滓不計時候溫服治傷寒未得汗心悸而煩頭目不利宜服此方出聖惠方桂心一兩銼甘草半兩炙微赤銼生薑一分切大棗五枚去核飴糖一兩右件藥水一大盞半煎至一盞次出入飴糖更煎三五沸去滓不計時候分為二服桂枝湯出聖惠方治傷寒水在心下心悸動欲得人按桂去粗皮二兩赤茯苓去黑皮一兩半白术一兩甘草炙銼三分陳橘皮湯浸去白焙半兩右粗搗篩每服五錢以水盞半煎取七分去滓溫服不拘時赤茯苓湯出聖濟總録治傷寒飲水過多心下悸動不定赤茯苓去黑皮二兩陳橘皮湯浸去白焙二兩白术三分半夏湯浸七遍切焙二兩枳殼麩炒去穰半兩人參一兩右