body:
  text: 普濟方卷二十八明周王朱橚撰肺臟門肺痿小便數附論內經曰臟極高於肺又曰真氣奪則虛今肺中冷則肺之真氣不足而其人上虛則無以制下故上為肺痿下為小便數以至吐涎沫而欲咳不能者皆其證也治法當以溫藥和之方白茯苓湯治肺痿小便數甚者吐涎沫欲咳不能者白茯苓去黑皮桂去粗皮附子炮製去皮臍白芍藥各三分補骨脂炒黃耆銼各一兩蜀椒去目及閉口者炒四十顆肉蓯蓉酒浸切焙一兩半右㕮咀如麻豆每服三錢水一盞煎至七分去滓溫服食前臨卧日三黃耆湯治肺痿小便數無力不進食黃耆銼熟乾地黃焙各二兩桂去粗皮白芍藥當歸焙切各一兩麥門冬去心焙一兩半白龍骨甘草炙銼各半兩右搗篩每服五錢水一盞半入生薑五片大棗二枚煎至八分去滓溫服空心食前日三龍骨湯治肺痿小便數漸覺氣弱龍骨黃耆銼肉蓯蓉酒浸切焙各一兩白薇牡蠣煆附子泡製去皮臍各三分甘草炙銼半兩右㕮咀如麻豆大每服三錢水一盞入生薑三片大棗二枚煎至七分去滓溫服空心食前日三五味子湯治肺痿小便數五味子欵冬花去梗桂去粗皮人參各二兩麥門冬去心焙桑根白皮各三兩右㕮咀如麻豆大每服六錢水二盞入生薑和皮五片大棗二枚粳米三十粒煎至一盞去滓溫服空心食前日三熟乾地黃治肺痿小便數熟乾地黃焙芎藭各五兩桂去粗皮人參各三兩桑根白皮二兩右㕮咀如麻豆大每服五錢水一盞半煎至八分去滓溫服三味湯出聖惠方治肺痿多涎唾小便數者此肺已中冷必多頭眩甘草各四兩乾薑炮白芍藥各二兩右㕮咀如麻豆大每服五錢水一盞半煎至一盞去滓溫服不計時肺臟痰毒壅滯附論夫肺臟痰毒壅滯之病其證目眩頭旋胸膈痞滿常多痰唾不思飲食鼻聞腥臭蓋肺主氣居於膈上為四臟之蓋邪熱壅熏散胸膈津液相搏故鬱結成痰也方半夏散出聖惠方治肺臟久積痰毒在於胸膈不散少思飲食半夏一兩湯洗七次去滑木香半兩人參一兩去蘆頭檳榔三分桔梗半兩去蘆頭陳橘皮三分湯浸去白焙前胡一兩去蘆頭赤茯苓二兩桂心半兩旋覆花半兩麥門冬一兩去心枇杷葉三分拭去毛炙微黃細辛三分甘草半兩炙微赤銼枳殼二兩麩炒微黃去穰右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服忌炙煿熱麵豬犬肉等人參防己湯治肺臟壅熱咽喉腫痛頭目昏重惡飲食客熱痰毒大小便閉澀人參半兩防己一兩羌活去蘆頭芎藭檳榔銼連翹天麻玄參防風犀角鎊木香各半兩惡實微炒甘草炙各一兩右㕮咀每服三錢水一盞入生薑三片蔥白一寸煨熱同煎六分不拘時候去滓溫服甘菊花散出聖惠方治肺臟痿毒胸膈壅滯甘菊花人參去蘆頭大腹皮銼半夏湯洗七次去滑木香白术葳靈仙桔梗麩炒微黃去穰肉桂去皺皮訶黎勒皮赤茯苓郁李仁湯洗去皮尖炒甘草炙微赤銼各一兩右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服人參散出聖惠方治肺臟痰毒壅滯氣逆咳嗽不思飲食人參一兩去蘆頭麻黃三分去根節甜葶藶三分隔紙炒令紫色枳殼三分麩炒令黃去穰木通三分炒烏梅七枚用肉微炒桔梗三分去蘆頭紫苑三分去蘆頭桑根白皮三分銼甘草半兩炙微赤銼赤茯苓半兩欵冬花三分右為散每服三錢水一中盞生薑半分煎至六分去滓不計時候溫服旋復花散治肺臟痰毒壅滯頭旋目眩旋復花半兩人參半兩去蘆頭枇杷葉半兩拭去毛炙微黃赤茯苓一兩蔓荆子一兩前胡一兩去蘆頭桔梗防風各半兩去蘆頭甘草半兩炙微赤銼枳殼一兩麩炒微黃去穰半夏三分湯浸七次去滑右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服忌炙煿熱麵射干散楊子建護命方治肺臟積熱饞食辛酸熱毒之物即咽中痿壅射干杏仁去皮尖雙仁炒麻黃去根節煮去浮沫紫蘇子炒羌活去蘆頭甘草桔梗牡丹皮柴胡去苗枇杷葉去毛右等分粗搗篩每服二錢水一盞生薑二片同煎取八分食後臨卧服柴胡湯治肺壅熱痰毒頭眩嘔逆柴胡去苗甘草炙各一兩芎藭獨活去蘆頭羌活去蘆頭貝母去心欵冬花各半兩廣麻去根節桑根白皮銼各一兩半右粗搗篩每服三錢水一盞煎至七分去滓溫服不計時候桑白皮散治肺臟痰毒滯心胸滿悶肩背煩疼不欲飲食桑根白皮一兩銼半夏半兩湯浸七次去滑赤茯苓一兩前胡一兩去蘆頭大腹皮三分銼白术半兩木香半兩甘草炙一分微赤銼川大黃一兩炙微銼碎右為散每服三錢以水一中盞生薑半分煎至六分去滓不計時候溫服前胡湯治肺熱咳嗽痰壅氣喘不安前胡去蘆頭一兩半貝母去心白前各一兩麥門冬去心焙一兩半枳殼去穰麩炒一兩芍藥赤者麻黃去根節各半兩大黃蒸一兩右㕮咀銼如麻豆大每服三錢以水一盞煎取七分去滓食後溫服日二貝母飲治肺臟熱咽喉及口乾咳嗽氣促痰壅貝母去心百合各一兩半紫苑去苗桑根白皮桔梗炒各一兩麥門冬去心焙一兩半大黃蒸七錢半甘草炙半兩右㕮咀如麻豆每服三錢以水一盞煎取七分去渣食後溫服日二潤腸丸治肺壅盛心胸滿悶咳嗽煩喘咽膈痰滯不欲飲食大便多祕桑根白皮銼甜葶藶隔紙微炒防己天門冬去心炒枳殼各半兩麩炒去穰檳榔銼一分牽牛子白者炒香搗羅取細末一兩右為末鍊蜜和丸如梧桐子大每服二十丸煎人參湯下不拘時服木通湯治久嗽肺熱咳唾稠濁胸滿痛悶木通桔梗桑根白皮升麻黃芩去黑心各一兩半牽牛子炒一兩地黃生切三兩右㕮咀如麻豆每服五錢以水一盞半煎取八分去滓溫服日二六神散治肺臟痰毒壅滯人參百合白术山芋白茯苓去黑皮各一兩甘草炙半兩右為散每服二錢白湯點服日三紫蘇子散楊子