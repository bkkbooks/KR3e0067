body:
  text: 普濟方卷一百五十三明周王朱橚撰熱病門熱病心腹脹滿論夫熱病服冷藥及飲冷水過多結在心下故心腹脹痛此為藏虛先有舊癖故也或吐下已後病不解內外有熱亦心腹脹滿此為有實也方檳榔散出聖惠方治熱病心腹脹滿四肢煩悶不欲飲食宜服檳榔白术枳殼麩炒微黃去瓤人參去蘆頭陳橘皮湯洗去白瓤焙麥檗麩炒微黃各一兩川大黃銼碎微炒甘草炙微赤銼各三分右為粗散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服赤芍藥散治熱病心腹脹滿或時疼痛飲食全微宜服赤芍藥柴胡去苖桔梗去蘆頭赤茯苓鱉甲塗醋炙令黃銼去裙欄郁李仁湯浸去皮尖微炒各半兩木通三分銼右為散每服四錢以水一中盞煎至六分去滓不計時候溫服訶梨勒散出聖惠方治熱病心腹脹滿不能飲食四肢羸乏宜服訶梨勒三分去核生用赤茯苓一兩半陳橘皮湯浸去白瓤焙人參去蘆頭白术檳榔各一兩甘草半兩炙微赤銼右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服人參散出聖惠方治熱病出汗後心腹脹滿嘔逆少氣宜服人參去蘆頭木香半夏湯洗七遍去滑甘草炙微赤銼各半兩白术陳橘皮湯浸去白瓤焙各三分右為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服厚朴散出聖惠方治熱病傷冷太過腹脹嘔逆不納飲食宜服厚朴去粗皮塗生薑汁炙令香熟半夏湯洗七遍去滑人參去蘆頭各一兩藿香訶梨勒皮各三分陳橘皮湯浸去白瓤焙甘草炙微赤銼各半兩右為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服柴胡散出聖惠方治熱病得汗後熱不解心腹脹滿宜服柴胡去苖赤芍藥各一兩白术檳榔桔梗去蘆頭甘草炙微赤銼各半兩枳實麩炒微黃去瓤黃芩訶梨勒皮各三分右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服木香丸出聖惠方治熱病得汗後心腹脹滿疼痛宜服木香檳榔訶梨勒皮各一兩桂心桃仁湯浸去皮尖雙仁麩炒研枳殼麩炒微黃去瓤各半兩右為細末鍊蜜和丸如梧桐子大每服以生薑湯下二十丸大建中湯出十便良方治熱自腹中或從背膂漸漸蒸熱日間小劇至夜漸退或寐而汗出小便或赤或白而濁甚則頻數尿精夜夢鬼交日漸羸瘦此由思慮太過心氣耗弱陽氣流散精神不收隂無所使治屬費力芍藥三兩黃蓍逺志當歸澤㵼各一兩半龍骨人參甘草各一兩右為粗散每服五錢水二盞生薑三片棗一枚壁泥少許煎至一盞去滓食前溫服一方以菖蒲代逺志參橘丸出十便良方治熱從腹起上循胸腋繞頸與額初似溫溫漸至大熱發作無時遇飢愈劇中脘不利善食而瘦其色蒼黃肌肉不澤口唇乾燥此由脾氣素弱會因他病差後悮投熱藥入于脾脾熱則消穀引食消肌肉其脈濡弱而病治之橘皮三兩麥子一兩人參一兩右為細末蜜為丸如梧桐子大米飲下三十丸食前服若嗽加五味子一兩熱病咳嗽論夫熱病邪熱客于肺則上焦煩壅其人必飲水水停心下則肺浮肺主于嗽水氣乘之故咳嗽也方前胡散出聖惠方治熱病壯熱咳嗽頭痛心悶宜服前胡去蘆頭川升麻地骨皮杏仁湯浸去皮尖雙仁麩炒微黃各一兩貝母煨微黃紫菀洗去苗土各一兩半石膏三兩半麥門冬二兩去心焙甘草半兩炙微赤銼右為粗散每服五錢以水一大盞入竹葉三七片煎至五分去滓不計時候溫服麥門冬散出聖惠方治熱病壯熱頭痛咳嗽宜服麥門冬一兩半去心焙葛根銼貝母煨微黃各三分紫胡一兩去苖百合川升麻各半兩梔子仁甘草炙微赤銼各一分右為粗散每服四錢用水一中盞入䜴半合蔥白二莖煎至六分去滓不計時候溫服生地黃飲子出聖惠方治熱病毒氣攻肺咳嗽喉中生瘡宜服生地黃切柴胡去苖各二兩川升麻玄參川大黃生用貝母煨令微黃麥門冬去心百合甘草炙微赤銼各一兩右細銼和勻每服半兩以水一大盞煎至五分去滓入蜜一小匙更煎一沸放溫不計時候服郁李仁散出聖惠方治熱病心肺煩熱上氣咳嗽不得睡卧時時渴欲飲水遍身浮腫宜服郁李仁湯浸去皮尖麻黃去根節貝母煨令微黃赤茯苓杏仁湯浸去皮尖雙仁麩炒微黃豬苓去黑皮􅌝􅌣子仁漢防已各一兩桑根白皮一兩半銼右為散每服五錢用水一大盞煎至五分去滓不計時候溫服百合散出聖惠方治熱病心肺熱盛小便黃赤上氣咳嗽宜服百合一兩半杏仁湯浸去皮尖雙仁麩炒微黃木通銼黃芩各一兩麥門冬去心甘草炙微赤銼甜葶藶炒令紫色各三分麻黃去根節紫菀洗去苖土各半兩右為散每服五錢用水一大盞煎至五分去滓不計時候溫服桑白皮散出聖惠方治熱病咳嗽喘息促不得睡卧宜服桑根白皮銼天門冬去心紫蘇莖葉欵冬花皂莢根皮銼川大黃銼碎微炒各一兩木通三分銼甘草半兩炙微赤銼右為散每服五錢以水一大盞煎至五分去滓不計時候溫服麻黃散出聖惠方治熱病咳嗽不止心胸煩悶上氣喘促宜服麻黃去根節前胡去蘆頭紫蘇子各三分大麻仁桑根白皮銼杏仁湯浸去皮尖雙仁麩炒微黃各一兩麥門冬一兩半去心焙甘草半兩炙微赤銼右為粗散每服五錢水一大盞煎至五分去滓不計時候溫服杏仁散出聖惠方治熱病八九日胸滿喘促咳嗽坐卧不安宜服杏仁湯浸去皮尖雙仁天門冬去心川大黃銼碎微炒黃芩各一兩枳殼麩炒微黃去瓤大腹皮銼欵冬花各半兩桑根白皮銼甘草炙微赤銼麻黃去根節各三分右為散每服五錢水一大盞入燈心一撮煎至五分去滓不計時候溫服木通散出聖惠方治熱病胸中煩滿咳嗽不止宜服木通銼紫蘇莖葉赤茯苓貝母煨令微黃桑根白皮銼各一兩梔子仁川升麻杏仁湯浸去皮尖雙仁麩炒微赤枳殼麩炒微黃去瓤各三分右為散每服五錢水一大盞煎至五分去滓不計時候溫服熱病咽喉腫痛論夫熱病咽喉腫痛者是脾肺熱積不散致使然也何者胃為水榖之海通于咽門肺主于氣居于膈上其氣貫于喉嚨邪熱伏留于脾肺故令咽喉腫痛也方射肝散出聖惠方治熱病胸中妨悶咽喉腫痛噎塞不通宜服射干川升麻絡石葉前胡去蘆頭百合枳殼麩炒微黃去瓤黃藥子各一兩杏仁湯浸去皮尖雙仁麩炒微黃甘草炙微赤銼右為粗散每服五錢水一大盞入生薑半分煎至五分去不計時候溫服川升麻散出聖惠方治熱病咽喉腫塞連舌根疼痛及乾嘔頭疼不下食宜服川升麻白藥子前胡去蘆頭石膏各一兩羚羊角屑甘草炙微赤銼各半兩川朴硝二兩玄參麥門冬一兩半去心焙右為粗散每服五錢水一大盞入竹茹一分煎至五分去滓不計時候溫服馬藺根散出聖惠方治熱病咽喉閉塞連舌腫疼宜服馬藺根川升麻玄參各一兩川大黃銼生用射干各三分犀角屑木通銼棘針甘草炙微赤銼各半兩右為散每服五錢水一大盞煎至五分去滓不計時候溫服露蜂房散出聖惠方治熱病咽喉中熱毒閉塞腫痛宜服露蜂房炙甘草炙微赤銼射干川升麻川朴硝玄參各半兩右為粗散每服三錢水一中盞煎至五分去滓不計時候溫服鉛霜散出聖惠方治熱病咽喉腫痛不利宜服鉛霜研硼砂研馬牙硝各一分川升麻黃藥子地龍微炒寒水石研蛇退皮洗為灰太隂玄精石研甘草炙微赤銼牛黃半分研右為細散入研了藥令勻每服水一大盞不計時候以新汲水調下一錢含化犀角丸出聖惠方治熱病心脾虛熱肺氣暴壅喉中腫痛口舌乾燥咽津有妨不下飲食宜服犀角屑黃藥子子芩鬱金川大黃銼碎微炒玄參川升麻甘草炙微赤銼各半兩射干絡石葉各三分馬牙硝各一兩右為末入馬牙硝研令勻煉蜜和搗三二百杵丸如梧桐子大每服不計時候常含一丸咽津含化射干丸出聖惠方治熱病脾肺壅熱咽喉腫塞連舌根痛宜服射干川升麻各一兩硼砂研甘草炙微赤銼杏仁湯浸去皮尖雙仁麩炒微黃細研各半兩䜴心二合微炒右為末入研了藥令勻煉蜜和搗三二百杵丸如彈子大每服含一丸咽津地黃煎出聖惠方治熱病熱毒攻咽喉腫痛舌根生瘡宜服生地黃汁半分牛旁根汁蜜三合黃丹一兩鉛霜一分研杏仁二兩湯浸去皮尖雙仁細研入太隂玄精石半兩研右藥合和令勻入銀器內重湯煮用槐枝子攪不得住看色紫即傾入瓷盒中盛每服不計時候取如小彈子大含咽津治熱病毒氣攻咽喉腫痛宜服出聖惠方太隂玄精石一兩馬藺子半兩為末硼砂一分右都研令細每服不計時候以蜜水調下一錢又方出聖惠方黃藥子地龍各一兩炙微馬牙硝半兩右為細散每服不計時候以蜜水調下一錢木通湯治熱病喉中閉塞疼痛木通銼羚羊角鎊芍藥絡石各一兩升麻二兩射干一兩杏仁湯浸去皮尖雙仁半兩右為粗散每服三錢水一盞入竹葉七片煎至六分去滓食後溫服三日熱病口乾論夫熱病口乾者由熱毒在于脾胃故也口為脾之外候其臟若有積熱則津液枯少故令口乾也方蘆根散出聖惠方治熱病口乾煩熱宜服蘆根二兩地骨皮茅根銼葛根銼黃芩川升麻各一兩甘草三分炙赤銼麥門冬一兩半去心焙右為粗散每服四錢水一中盞入竹茹一分煎至六分去滓不計時候溫服犀角散出聖惠方治熱病毒氣在心脾口乾煩悶宜服犀角屑􅌝􅌣根川升麻寒水石葛根胡黃連生乾地黃各一兩麥門冬二兩去心焙甘草半兩炙微赤銼右為細散每服一錢以新汲水調下不計時候服黃芩丸出聖惠方治熱病心脾壅熱不退口乾煩渴時發躁悶宜服黃芩梔子仁鐵粉細研􅌝􅌣根馬牙硝研寒水石各一兩右為末入研了藥令勻煉蜜和搗三二百杵丸如梧桐子大每服不計時候以溫漿水下三十丸􅌝􅌣丸出聖惠方治熱病心脾積熱致口乾煩渴宜服􅌝􅌣根黃連去鬚茯神各一兩地骨皮鐵粉黃芩各三分桑根白皮銼犀角屑人參去蘆頭麥門冬一兩半去心焙甘草半兩炙微赤銼右為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候小麥湯溫下三十丸生地黃煎出聖惠方治熱病心胸煩熱口乾皮肉黃宜服生地黃汁生􅌝􅌣根汁生麥門冬汁各五合蜜二合酥一兩生藕汁三合右一處相和于鍋中熬令稍稠每服不計時候抄服半匙治熱病餘熱未退口乾煩渴宜服出聖惠方知母石膏各一兩半甘草三分炙微赤銼右為粗散每服五錢以水一盞入糯米五十粒煎至五分去滓不計時候溫服治熱病毒氣未解煩躁壯熱口乾悶亂宜服出聖惠方蔥白五莖拍破䜴二合甘草半兩炙微赤銼右以水一大盞半煎至一盞去滓入生地黃汁生牛蒡汁各二合微暖不計時候分為三服主發熱口乾小便澀出本草以甘蔗去皮盡令喫之咽汁若口痛搗取汁服之又方用葳𬎼五兩煮汁飲之熱病鼻衄論夫熱病鼻衄者心臟傷熱所為也心主血肺主氣肺開竅邪熱與血氣并故衄也方刺薊飲子出聖惠方治熱病頭痛壯熱鼻衄吐血心中緊硬遍身疼痛四肢煩悶宜服刺薊生地黃生麥門冬去心各一兩雞蘇赤茯苓生薑各半兩青竹茹一分右細銼以水三大盞煎至一盞半去滓不計時候分溫三服黃龍湯出聖惠方治熱病鼻衄去五臟熱氣伏龍肝半兩當歸銼微炒甘草炙微赤銼赤芍藥黃芩川朴硝川升麻各三分生乾地黃一兩半右為粗散每服五錢以水一大盞入竹茹一分煎至五分去滓不計時候溫服阿膠散出聖惠方治熱病鼻衄不止此是湯毒傷肺宜服阿膠搗碎炒令黃燥伏龍肝黃芩地骨皮各三分䜴一合蔥白連鬚二莖右細銼令勻都以水一大盞半煎至一盞去滓入生地黃汁二合攪令勻不計時候分溫三服黃芩散出聖惠方治熱病鼻衄不止宜服黃芩川大