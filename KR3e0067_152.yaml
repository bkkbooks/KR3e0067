嘔吐不下食地榆龍骨陳橘皮湯浸去白瓤焙人參去蘆頭酸石榴皮黄芩各一兩厚朴二兩去粗皮塗生薑汁炙令香熟右為細散每服以粥飲調下二錢不拘時候服犀角散出聖恵方治熱病熱毒攻臟腑下利膿血煩渇不止犀角屑黄連去鬚微炒赤芍藥黄芩側栢葉阿膠搗碎炒令黄燥烏梅肉㣲炒甘艸炙㣲赤剉各三分右為散每服以粥飲調下二錢不計時候服治熱病卒痢膿血無度方出聖恵方黄連三兩去鬚龍骨四兩阿膠二兩搗碎炒令黄燥右為細散每服以粥飲調下一錢不拘時候服治熱病熱毒攻腸胃下黄赤汁及爛肉壯熱腹痛方出聖恵方梔子仁三七枚䜴二合薤白一握切右以水二盞煎至一盞去滓不計時候分為二分小品犀角湯治熱毒赤汁及赤如腐爛血及赤滯如魚腦腹痛壯熱諸藥無効黄蘖黄芩各一兩半白頭翁當歸桑寄生甘艸炙各一兩黄連二兩牡犡煆石榴皮各一兩半犀角屑艾葉各半兩右切以水八升煑取三升分三服忌猪肉冷水海藻菘菜一方出肘後方治熱病後下痢膿血不止不能食用白龍骨末米飲調方寸匕服治熱病不解而下痢欲死出本艸以龍骨半斤擣研水一斗煮取五升候極冷稍稍飲得汗即愈熱病後虚勞論夫熱病新差臟腑猶虚血氣未復若食過度喜怒無恒澡浴梳頭言語思慮則寒熱四肢不舉口苦舌乾心煩盜汗不能飲食肢體羸瘦此由勞動太早不能節宜寒熱之氣入于經絡𫝊于臟腑變動多端故成虚勞之候也方鱉甲飲子出聖恵方治熱病後體氣尚虚用力太早遂生寒熱四肢乏力宜服鱉甲塗醋炙令㣲黄去裙襴甘艸炙㣲赤剉各半兩柴胡一兩去苗人參去蘆頭白术各一分䜴一合雄鼠糞七枚㣲炒别研右細剉拌令匀分作二服每服以水二大盞入生薑一分蔥白三莖煎至一盞去滓入研了鼠糞攪匀不拘時候溫服黄蓍散出聖恵方治熱病後體虚成勞氣力羸弱或寒或熱狀如瘧四肢煩悶黄蓍剉陳橘皮湯浸去白瓤焙白术各三分知母桑根白皮各半兩鱉甲塗醋炙令黄去裙襴一兩甘艸一分炙㣲赤剉䜴一合右為散每服五錢以水一大盞入葱白三莖生薑半分煎至五分去滓不計時候溫服柴胡散出聖恵方治熱病後虚勞煩熱四肢疼痛小便赤黄不欲飲食宜服柴胡去苗生乾地黄黄連去鬚地骨皮赤茯苓各一兩枳殻一分麸炒㣲黄去瓤甘艸半兩炙㣲赤剉鱉甲三分塗醋炙㣲黄去裙襴知母半兩右為散每服五錢以水一大盞煎至五分去滓不拘時候溫服虎頭骨散出聖恵方治熱病後虛勞氣發作寒熱乍進乍退頭痛眼睛疼不思飲食虎頭骨一兩半塗酥炙令黄白茯苓白术黄蓍剉柴胡去苖沉香各一兩人參去蘆頭陳橘皮湯浸去白瓤焙各三分麥門冬去心桃仁湯浸去皮尖雙仁麸炒㣲黄各一兩半赤芍藥桂心當歸五味子甘艸炙㣲赤剉各半兩右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服人參散治熱病後虛勞盜汗口苦不得睡卧四肢煩痛舌乾卷澁人參去蘆頭赤芍藥柴胡去根苖白茯苓黄蓍剉牡蠣燒為粉鱉甲塗醋炙㣲黄去裙襴各一兩麥門冬一兩半去心焙甘艸半兩炙㣲赤剉右為麄散每服四錢以水一中盞煎至六分去滓不計時候溫服黄蓍丸治熱病後虛勞四肢無力或時寒熱盜汗心中虛悸不能飲食漸羸瘦黄蓍剉人參去蘆頭牡蠣燒過白术沉香茯神白芍藥木香陳橘皮湯浸去白瓤焙五味子地骨皮鬼箭羽甘艸炙㣲赤剉牛黄細研鱉甲塗醋炙令㣲黄去裙襴各半兩麥門冬一兩半去心焙麝香半分細研右為末入半黄麝香研令匀煉蜜和搗三二百杵丸如梧桐子大每服食前以溫酒下三十丸不飲酒用粥飲下亦得獺肝丸治熱病後虚勞及骨蒸日漸黄瘦四肢羸瘁不思食獺肝㣲炙天靈葢塗醋炙令㣲黄犀角屑各一兩柴胡去苗黄連去鬚枳殻麸炒㣲黄去瓤栢脂細研各三分川升麻半兩金箔細研銀箔細研各五十片牛黄細研麝香細研各半兩右為末入金銀箔牛黄麝香栢脂等煉蜜和搗三二百杵丸如桐子大每服食前以童子小便三合浸䜴取汁下二十丸治熱病新瘥早起及多食復發方用梔子十枚水三升去滓溫服卧令㣲汗若食不消加大黄三兩葛根飲主熱病勞復身體痛天行壯熱煩悶葛根一兩葱白一握䜴半升米一合右先切葛根以水九升煮七升則納葱白更煮取四升去葛根及葱白滓訖則納䜴及少許米煮取三沸並濾去米等滓分四服當有汗出即瘥明旦又更作服忌猪蒜等加減大建中湯治虚勞發熱方見本門心腹滿脹類芍藥散治隂虚發熱芍藥黄蓍甘艸青蒿各一兩半右為粗散末每服五錢水二盞煎一盞去滓溫服普濟方卷一百五十三
