嘔吐不下食地榆龍骨陳橘皮湯浸去白瓤焙人參去蘆頭酸石榴皮黃芩各一兩厚朴二兩去粗皮塗生薑汁炙令香熟右為細散每服以粥飲調下二錢不拘時候服犀角散出聖惠方治熱病熱毒攻臟腑下利膿血煩渴不止犀角屑黃連去鬚微炒赤芍藥黃芩側柏葉阿膠搗碎炒令黃燥烏梅肉微炒甘草炙微赤銼各三分右為散每服以粥飲調下二錢不計時候服治熱病卒痢膿血無度方出聖惠方黃連三兩去鬚龍骨四兩阿膠二兩搗碎炒令黃燥右為細散每服以粥飲調下一錢不拘時候服治熱病熱毒攻腸胃下黃赤汁及爛肉壯熱腹痛方出聖惠方梔子仁三七枚䜴二合薤白一握切右以水二盞煎至一盞去滓不計時候分為二分小品犀角湯治熱毒赤汁及赤如腐爛血及赤滯如魚腦腹痛壯熱諸藥無效黃蘖黃芩各一兩半白頭翁當歸桑寄生甘草炙各一兩黃連二兩牡犡煆石榴皮各一兩半犀角屑艾葉各半兩右切以水八升煮取三升分三服忌豬肉冷水海藻菘菜一方出肘後方治熱病後下痢膿血不止不能食用白龍骨末米飲調方寸匕服治熱病不解而下痢欲死出本草以龍骨半斤搗研水一斗煮取五升候極冷稍稍飲得汗即愈熱病後虛勞論夫熱病新差臟腑猶虛血氣未復若食過度喜怒無恆澡浴梳頭言語思慮則寒熱四肢不舉口苦舌乾心煩盜汗不能飲食肢體羸瘦此由勞動太早不能節宜寒熱之氣入于經絡傳于臟腑變動多端故成虛勞之候也方鱉甲飲子出聖惠方治熱病後體氣尚虛用力太早遂生寒熱四肢乏力宜服鱉甲塗醋炙令微黃去裙襴甘草炙微赤銼各半兩柴胡一兩去苗人參去蘆頭白术各一分䜴一合雄鼠糞七枚微炒别研右細銼拌令勻分作二服每服以水二大盞入生薑一分蔥白三莖煎至一盞去滓入研了鼠糞攪勻不拘時候溫服黃蓍散出聖惠方治熱病後體虛成勞氣力羸弱或寒或熱狀如瘧四肢煩悶黃蓍銼陳橘皮湯浸去白瓤焙白术各三分知母桑根白皮各半兩鱉甲塗醋炙令黃去裙襴一兩甘草一分炙微赤銼䜴一合右為散每服五錢以水一大盞入蔥白三莖生薑半分煎至五分去滓不計時候溫服柴胡散出聖惠方治熱病後虛勞煩熱四肢疼痛小便赤黃不欲飲食宜服柴胡去苗生乾地黃黃連去鬚地骨皮赤茯苓各一兩枳殼一分麩炒微黃去瓤甘草半兩炙微赤銼鱉甲三分塗醋炙微黃去裙襴知母半兩右為散每服五錢以水一大盞煎至五分去滓不拘時候溫服虎頭骨散出聖惠方治熱病後虛勞氣發作寒熱乍進乍退頭痛眼睛疼不思飲食虎頭骨一兩半塗酥炙令黃白茯苓白术黃蓍銼柴胡去苖沉香各一兩人參去蘆頭陳橘皮湯浸去白瓤焙各三分麥門冬去心桃仁湯浸去皮尖雙仁麩炒微黃各一兩半赤芍藥桂心當歸五味子甘草炙微赤銼各半兩右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服人參散治熱病後虛勞盜汗口苦不得睡卧四肢煩痛舌乾卷澀人參去蘆頭赤芍藥柴胡去根苖白茯苓黃蓍銼牡蠣燒為粉鱉甲塗醋炙微黃去裙襴各一兩麥門冬一兩半去心焙甘草半兩炙微赤銼右為粗散每服四錢以水一中盞煎至六分去滓不計時候溫服黃蓍丸治熱病後虛勞四肢無力或時寒熱盜汗心中虛悸不能飲食漸羸瘦黃蓍銼人參去蘆頭牡蠣燒過白术沉香茯神白芍藥木香陳橘皮湯浸去白瓤焙五味子地骨皮鬼箭羽甘草炙微赤銼牛黃細研鱉甲塗醋炙令微黃去裙襴各半兩麥門冬一兩半去心焙麝香半分細研右為末入半黃麝香研令勻煉蜜和搗三二百杵丸如梧桐子大每服食前以溫酒下三十丸不飲酒用粥飲下亦得獺肝丸治熱病後虛勞及骨蒸日漸黃瘦四肢羸瘁不思食獺肝微炙天靈蓋塗醋炙令微黃犀角屑各一兩柴胡去苗黃連去鬚枳殼麩炒微黃去瓤柏脂細研各三分川升麻半兩金箔細研銀箔細研各五十片牛黃細研麝香細研各半兩右為末入金銀箔牛黃麝香柏脂等煉蜜和搗三二百杵丸如桐子大每服食前以童子小便三合浸䜴取汁下二十丸治熱病新瘥早起及多食復發方用梔子十枚水三升去滓溫服卧令微汗若食不消加大黃三兩葛根飲主熱病勞復身體痛天行壯熱煩悶葛根一兩蔥白一握䜴半升米一合右先切葛根以水九升煮七升則納蔥白更煮取四升去葛根及蔥白滓訖則納䜴及少許米煮取三沸並濾去米等滓分四服當有汗出即瘥明旦又更作服忌豬蒜等加減大建中湯治虛勞發熱方見本門心腹滿脹類芍藥散治隂虛發熱芍藥黃蓍甘草青蒿各一兩半右為粗散末每服五錢水二盞煎一盞去滓溫服普濟方卷一百五十三
