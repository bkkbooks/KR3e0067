body:
  text: 普濟方卷五十一明周王朱橚撰面門面皯􅍍論夫皯􅍍之黑點如烏麻班如雀卵稀則碁布密則不可容針皆由風邪客於皮膚痰飲浸漬其形外著或飽食安坐無所作為若養生方所謂積聚不消之病使人面目黎皯是也散之固有常劑若乃塗澤蠲除朝夕從事者又安可已面皯􅍍者由臟腑有痰飲或皮膚受風邪致令氣血不調則致黑皯五臟六腑十二經脈皆上於面夫血之行俱榮表裏又或痰飲積於臟腑風邪入於腠理使氣血不和或澀或濁不能榮於皮膚故變生黑皯若皮膚受風邪外治則瘥若臟腑有痰飲內療則愈也方防風膏治面皯􅍍塗之能令光潤防風藁本辛夷芍藥當歸白芷牛膝商陸細辛蜜陀僧芎藭獨活萎蕤木蘭皮蕤仁杏仁各一兩丁香雞舌香零陵香珍珠屑麝香一分油一斤麞髓鹿髓各一斤牛髓一斤蠟四兩右先將髓以水浸令白取出除珍珠屑麝香外餘藥並銼碎涎將油髓蠟入鍋中熬令銷入諸藥用文火煎之若白芷色黃量稀稠得所以新綿濾去滓方將珍珠屑麝香别研為細末入前汁中熬成膏貯瓷器內臨卧塗面上旦起以溫水洗去避風日妙長春𣪚治風皯粉刺常用光澤面皮甘松藁本藿香白附子細辛廣陵香小陵苓茅香白檀三奈子川芎白芷各二兩白丁香白芨白蘝各三兩瓜蔞根楮實各四兩滑石半斤韶腦半兩牽牛四兩皂角二斤半菉豆一升右為細末加白麵一斤和勻一處後入韶腦再和勻用甚妙治面皯􅍍粉刺及面皮皺方白芨二兩半白术五兩白芷細辛白附子防風白茯苓白石脂土瓜根蕤仁葳蕤白礬蒿本芎藭各一兩半當歸一兩白玉屑琥珀末珍珠末鍾乳粉各半兩右搗羅為細末取雞子白并蜜等分和撚作挺子入布袋盛懸挂門上隂乾六十日後如鐡即堪用再搗研為末每夜用漿水洗面即以面脂調藥塗之經六十日面如新剝雞子治外膏主面皯􅍍白芷白蠟各二兩白附子辛夷防風烏頭零陵香藿香萎蕤各半兩藁本商陸麝香各六錢麻油一合羊脂五合牛脂鵝脂各一升右薄切醋漬浹洽一宿但合煎後白芷色黃膏成以皂莢湯洗面傅之白瓜丸治面皯􅍍令色光白白瓜子仁三兩陳橘皮三分白芷藁本逺志杜蘅車前子當歸雲母粉白石脂各一兩天門冬細辛柏子仁􅌝􅌣根黃丹各半兩右搗羅為末錬蜜和搗三五百杵丸如梧桐子大每服不計時候以溫酒下三十丸治粉滓皯􅍍皴皰及茸毛令面恱澤光潤如十四五時方黃耆白术白蘞萎蕤土瓜根商陸蜀水花鷹屎白防風白芷細辛青木香白附子芎藭杏仁各二兩右為末以雞子白和作挺隂陽石上研取漿水塗面夜塗旦以水洗之細絹羅如粉佳一方無土瓜根玉容𣪚治面上熱刺皯􅍍牽牛一兩香白芷川芎藿香甘松藁本各半兩栝蔞根七錢半楮桃兒豬牙皂角各二兩阿膠細辛各二錢半廣零陵香一兩右為細末每用一錢如洗面藥用早晨晚夕各用一次藿香𣪚治去皯洗髭藿香葉零陵香皂角檀香沉香各一兩香白芷二兩白丁香黃白膠丁香各七錢龍腦二錢半糯米一升右為細末每日如常使用洗髭髮手面百日令光恱澤潤硃砂紅丸子治面色不瑩淨及皯􅍍面黑皺硃砂白术白斂白附子吳白芷白殭蠶木香各半兩鍾乳粉二兩白茯苓蜜陀僧白芨各二錢半右為細末用阿膠半兩熬成膏子入上項藥末一處合成丸如梧桐子大如常用溫水蜜少許磨化開調塗面上次日早晨用溫湯水洗之甚妙洗面去皯􅍍令恱澤方豬胰豆粉四升冬瓜子半斤皂莢五挺細辛白术防風白蘝白芷各二兩商陸三兩右用土瓜根一兩搗絹羅取大豬蹄一具煮令爛作汁和𣪚為餅曝乾再搗為末羅過洗面不過一年光白一方每夜取少許洗手面令光滑玉容𣪚治面上諸皯􅍍及滅瘢痕白附子冬瓜子韶腦各二錢半楮桃兒二錢白殭蠶白蘞鍊成鍾乳粉各半兩白芨一兩半麝香一錢右為極細末用玉漿調稀稠得所臨卧塗患處眀旦溫淡漿水洗去白附子膏治𪒟皯令面恱澤亦治皯􅍍白附子青木香丁香各一兩商陸根一兩細辛三兩酥半斤羊脂三兩蜜陀僧一兩金牙三兩右以酒三升漬一宿煮取一升去滓內酥煎一升膏成夜塗面上旦起溫水洗不得見大風日差又先以內酥羊脂煎成膏入金石蜜陀僧攪令勻盛不津器中夜卧塗之尤佳一方無丁香治面皯􅍍令恱白方出聖惠方雄黃一兩半雌黃一兩硃砂珍珠白芨白殭蠶各三兩白茯苓一兩膩粉半兩蜜陀僧一兩右搗羅為末入研了藥更研令勻細旋取以豬脂面脂等分調攪令勻每先以澡豆漿水洗淨拭乾塗之勿衝風向火鍾乳粉𣪚治皯􅍍去黯子玉女粉白芨各二錢半細辛末輕粉各半錢蜜陀僧一錢半白附子鍾乳粉白斂各二錢右同研勻細用孩兒乳汁調塗患處或溫水調亦得臨卧用次日以溫水洗去豬蹄膏治洗面皯白芷玄豆瓜蔞白芨白斂零陵香藿香鵝梨各等分右用豬蹄一付刮去黑皮切作細片用慢火熬如膏粘用羅子濾過再入鍋內用蜜半盞同梨入藥末一處再熬滴水不𣪚方成以絹濾過臨卧塗面次日漿水洗面沉香膏治面皯􅍍沉香牛黃薰陸香玉屑各三分丁香水銀各一分雌黃鷹屎各半兩先將三味共搗羅為末次將玉屑牛黃雌黃同入乳鉢中研令細入水銀及諸藥同研令極細入白蜜調和令稀稠得所入瓷合中盛每至臨卧時塗面皯􅍍處兼治𪒟皯面蘇合煎治面皯黯蘇合香麝香白附子女菀蜀水花各二兩青木香三兩雞舌香鸕鷀屎各一兩右先取糯米二斗淅炊一斗生用一斗合醇酢用水一斛五斗稍稍澄取汁合得一斛煮並令沸以綿裹諸藥用著沸漿水煎得三升藥熟以澡豆洗皯處令燥以傅皯上日再欲傅藥常以酢漿水洗面然後塗藥塗藥至三四合皯處當小急痛痛處微微剝去便白以漿三四合傅玉屑膏訖再粉之若急痛勿怪癢勿搔之但以粉粉上而按抑癢處滿百日可用脂胡粉取差茯苓膏治面皯􅍍令恱澤光白潤好及皯皴豬蹄兩具白梁米一升白茯苓商陸各五兩萎蕤一兩白芷藁本各三兩右㕮咀用前藥汁三斗并研杏仁一升合煮一斗五升去滓瓷瓶盛貯內甘松零陵香末各一兩入膏中攪令勻綿羃之每夜取塗手面一方用桃仁一升合煮亦治面皯皰白附丹治男子婦人面生黑班點白附子二兩白芨白蘝白茯苓蜜陀僧石脂定粉各等分右為末先用洗面藥洗淨臨卧用人乳汁如無用牛乳或雞子清調如合就用乳將藥末丸如龍眼大窨乾逐旋用漿水磨開傅之一方無石脂治面上皯􅍍班點方白附子一兩白斂白芷蜜陀僧赤茯苓胡粉各半兩右為末每用時先以熱水洗面臨卧時以牛乳和塗之人乳亦可杏仁膏治面皯􅍍塗之令光白潤澤杏仁雄黃瓜子白芷各一兩右除白蠟外並入乳鉢中研令細入油半斤并藥鍋中以文火煎之候稠凝即入白蠟又煎攪勻內瓷盒中每日先塗藥後傅粉大去皯􅍍桃仁澡豆主恱澤去皯􅍍方桃仁一升蕪菁子一兩蓽豆麵二升白术六合土瓜根七合右搗羅為細𣪚却以漿水洗手面白附子治去面皯􅍍白附子香附子白檀馬珂紫檀各兩右為末白蜜和如杏仁大隂乾臨用以水研塗面旦以溫水洗却忌風油七日面色如蓮花治面多皯􅍍皮肉粗澀令人不老方硃砂雄黃各二兩水銀霜半兩黃鷹屎一升上胡椒二兩右細研如粉以面脂和淨洗面每夜塗之以手細摩令熱明旦不發作矣然須五日一洗面塗不過三遍所有惡物一切皆除數倍少嫩慎風日不傳神祕玉容𣪚治面黑皯􅍍皮皺皴方白附子蜜陀僧牡礪白茯苓芎藭各二兩右為末和羖羊乳夜塗面以手摩之旦用漿水洗不過五六度一重皮脫皯瘥矣一方以酥調傅治面皯􅍍永除根本方烏雌雞胡粉膩粉英粉鷹屎白各一兩右藥都細研令勻臨卧時淨洗面於手掌內以津唾調塗面上或早晨用亦得塗却後一日不得洗面不過三五上面色潔白治皯􅍍烏靨令面潔白方馬珂三兩白附子鷹屎白珊瑚各兩右研成粉和勻用人乳調每夜取傅面明旦溫漿水洗之桃花團治面黑令人潔白光恱方桃花二升桂心烏喙甘草各一兩右為末丸如大豆許每服十丸日二服十日易形一方有白附子􅀈瓜杏仁各一兩為七味治面皯􅍍風刺方苦參一斤紅芍藥冬瓜子各四兩玄參二兩右為末每用一匙用手傅面上治面上有班子方大風子膩粉麝香荆芥各等分右為末清晨傅面上治面皯􅍍方雞子二枚胡粉丁香各一兩右先以醋一升浸七日後取雞子白調香粉令勻以漿水洗面傅之佳礬石𣪚治面皯􅍍白礬石硫黃白附子各六銖右為末以酢一盞漬三日夜淨洗面傅之莫見風日慎三七日可如白雪羊乳膏治面上皯􅍍內外兼治甘草二兩白羊乳三升羊􅮋二具右相和一宿先以酢漿洗面水布拭之夜傅藥兩遍明旦以豬蹄湯洗却每夜洗之又方桂心蜜石鹽各等分右為末相和夜調塗之治去皯􅍍方白礬末白丁香鷹糞各等分右為末以唾津調傅羊髓膏治面皯􅍍塗之令光白潤澤羖羊脛骨髓二兩丹砂半兩雞子白二枚右先將髓并丹砂入乳鉢中研令極細以雞子白調和令勻入盒中盛每用時先以漿水洗面後塗之治黑皯令人面色好方白殭蠶黑牽牛細辛各等分右為末如澡豆用之洗面又浴小兒胎穢良治面黑皯􅍍皮皺皴方益母草灰五升落梨灰三升石灰一斗右研於盆內先著石灰上用紙蓋漸入熱水候濕透石灰於紙上留取水五升已來將此水煮稀糯米粥拌前件二味灰作毬於灰火內燒令通赤取去候冷搗羅為末依前將粥拌更燒如此七遍後更以牛乳拌又燒兩遍然後搗羅為末每夜先洗面了以津唾調少許塗之平旦以熟漿水洗面去班皺皯􅍍極妙杏仁膏治面黑皴皺靨黑皯􅍍皶靤粉刺疵痣黃黑不白光淨凡是面上之病皆主之杏仁雞子白各等分右相和如餅煎麵入夜塗面明旦以米泔洗之一方溫酒洗之治粉滓皯􅍍方白蘝十二銖白石脂六銖右搗篩以雞子白和夜卧塗面明旦用井花水洗却治皯􅍍班及去瘢痕方雲母粉杏仁各等分右細研入銀器中以黃牛乳拌略蒸過夜卧時塗面上旦以漿水洗之治面皯􅍍方雞子一枚硃砂末一兩右先研硃砂為末入雞子中封固口與雞卵同令雞伏候雞雛出即取塗面效不過五度一方以白雞腹下伏之如前法取用蓋用雞子令面皮急而光滑丹砂發紅色也治皯令人面皮薄方鹿角尖煎汁乾薑一兩右搗乾薑汁和鹿角汁攪使調每夜先以暖漿水洗面軟帛拭乾取上白蜜塗面以手摩使蜜盡不粘手為候然後塗藥平明還以暖漿水洗之二三日顔色驚人塗藥過不用見風日尤佳治面皯黯方茯苓白石脂各等分右為末和蜜塗之日三除面黑治面黑皯􅍍皮皺皴方杏仁一兩膩粉半兩右以雞子白和勻夜用傅面經宿拭去甚妙治皯􅍍班點兼去瘢痕方桃花杏花各一升右以東流水浸七日相次洗面三七遍極妙一方加當歸治皯􅍍班點方皂策末半升杏仁半兩右都研令細每夜用唾調塗之治面皯􅍍內外兼治方以煉成松脂為末溫酒服三合日三服盡三升無不瘥又方出聖惠方右以白附子為末酒和傅之即落一方以水和塗之亦治面皯皰治人面皯􅍍黑膚色粗陋皮厚狀醜右以羖羊脛骨為末以雞子白和傅之旦以白淨梁米泔洗之日三白如雪治去皯􅍍方右以白殭蠶為細末先以肥皂洗淨面却以藥末傅面洗之良又方右以胡粉黃連二味為末擦之丹砂方治面皯􅍍塗之令光白潤澤右以丹砂一兩研細入蜜少許更研如膏入盒中盛每至臨卧塗面明旦以漿水洗之一方以水和丹砂末服方寸匕男七日女二七色白如雪益母草塗方治面皯􅍍令光白潤澤退皴皺右以益母草灰一斤以醋和為細團以炭火煆七度後入在乳鉢中研細用蜜和勻入盒中每至晚卧時先漿水洗面而後塗之大妙又方以草煮湯洗之一方麵湯和燒七遍洗面用之治面皯黑子方右取李核中仁去皮細研以雞子白和如稀餳塗至晚每以淡漿水洗之後塗胡粉不過五六日有效避風治血皯面皺靨子令人面潤澤有光右取蕪菁子爛研入常用面脂中良又方右用葵菜子以醋浸之揩面令潤澤有光治面多皯􅍍或似雀卵色者右用苦酒漬术常以拭之面即漸漸除之治面皯􅍍黑子方右以雄黃一兩細研入豬脂和每夜塗之效治皯􅍍班方右以蜜陀僧用乳煎塗面佳兼治􅖟鼻皰一方以入乳調塗面每夜用之治面皯􅍍黑膚色粗陋皮厚狀醜方右用杏仁酒浸皮脫搗碎絹袋盛夜取拭面亦治面皯又方用酒浸雞子三枚密封四七日成傅面如白雪治面皯黯方右用桃花冬瓜子各等分搗以蜜和傳面治面黑皯􅍍皮皺皴方羖羊膽牛膽一枚右以醋一合和煎二三沸夜卧塗之治面皯􅍍滅瘢去黑痣方治療皯􅍍攀風黃耆膏整容去風黃耆當歸防風檀香括蔞香白芷各半兩甘松零陵香川芎甘草生乾地黃木香藁本白蘝各一兩赤芍藥杏仁麻油一斤右件藥除油外十六味皆銼碎焙乾入油內熳火熬一伏時去諸藥不用再稱熬若油每一兩入明蠟四錢再於火上化開蠟熬少時用新綿子濾去滓盛於磁器內熬時不得用銅鐡器須銀石器內熬七香嫩容𣪚去風刺皯􅍍黑牽牛一十二兩香白芷零陵香甘松括蔞根各二兩茶子四兩皂角末四兩右件為細末如常用之藁本𣪚治面多皯􅍍風刺藁本黑牽牛黑豆皂角各等分右為細末如燥豆常用之石菖蒲𣪚治面上皯􅍍風刺瘡靨石菖蒲甘草白茯苓淡豆豉皂角右各等分為末卧時以皂角洗面楮拭令極乾用雞子清汁塗面上至明早將此藥澡豆用之五倍子膏治面上風刺皯􅍍漏蘆五倍子黃蘗各一兩右為細末臨卧時蜜調塗如生赤瘡即以香油調傅瑩肌如玉𣪚治有皯點及粉刺之類并去垢膩潤澤肌膚皂角三斤糯米一升六合菉豆楮實子白芨白丁香縮砂升麻各半兩甘松七錢山奈三錢右同為細末和糯米菉豆粉末及皂角末一處攪拌勻用之甚效去皯􅍍出本草以山慈菰根搗塗面上去面皯出本草以孝子衫襟燒灰傅之治面皯出本草以小萍子是溝渠間者為末傅之去面皯出本草以橡斗子中仁碎為粉和大豆澡面良面皯皰論夫面皯皰者生皶皰細起如粟穀狀由風熱相搏而生蓋諸陽在於頭面風熱乘之結而不𣪚故成皯皰養生方説醉不可露卧及飲酒熱未解冷水洗面令人發面瘡也方五香𣪚治皯皰黶􅍍黑赤氣令人面光潤方黃耆白茯苓萎𬎼杜若商陸大豆黃卷各二兩白芷當歸白附子冬瓜仁杜蘅白殭蠶辛夷仁香附子丁香子蜀水花旋覆花防風木蘭芎藭藁本白莢白膠杏仁天門冬土瓜根白术梅肉酸漿水萍各二兩黑豆豬胰二具右治下篩取洗面二十七日白一年與衆别玉屑膏治面皰皯玉屑珊瑚木蘭皮辛夷各一兩半白附子芎藭白芷各一兩冬瓜子仁四兩桃仁半斤商陸半斤牛脂二兩豬脂四兩白狗脂一斤右除玉屑珊瑚及諸般脂外並細銼先於銀鍋中以文火銷諸般脂令鎔後下諸藥同煎三上三下令白芷色黃為度濾去滓下玉屑珊瑚末攪令勻於瓷器中盛每夜塗面神效治面皯方雄黃雌黃光明砂蜜陀僧珍珠硝粉白殭蠶白芨茯苓水銀各等分右研和令勻取少許和豬脂面脂攪令調每夜用澡豆漿水洗去勿衝風火又方以李子仁和雞子白塗則落麝香膏治面皯皰令光白麝香附子當歸芎藭細辛杜蘅白芷芍藥各一兩豬脂一斤右先將豬脂入鍋中化成油餘並銼如小麥大入脂油中以文火煎稀稠得所濾去滓麝香攪令勻傾入瓷合中收每塗藥先以漿水洗面治面皯方芍藥茯苓杏仁防風細辛白芷各一兩白蜜一合右為𣪚先以水銀霜傅面三日始取前件白蜜以和散藥傅面夜中傳之不得向風日向曉任意作粉常用妙每夜先以漿水洗面後傅之枸杞子𣪚治面皰傅面枸杞子白茯苓杏仁防風細辛白芷各一兩右為細𣪚先以膩粉傅面三日即以白蜜一合和𣪚藥夜卧時先用漿水洗面了傅之不得見風日能常用大佳治面上雀子班名皯皰方白蘝生礬石白石脂杏仁各等分右研和雞子白夜卧塗面上旦用井花水洗之治面皯皰令人恱白方括蔞子白石脂雀屎麝香各等分右搗篩别研麝香雀屎白石脂和合取生兔絲苖汁和之如薄泥先用澡豆洗去面上垢膩次以藥塗皯上日夜三四度平旦溫漿水洗之亦治面黑班駮冬葵子𣪚治面皯皰令光白少年氣血盛面皰甚者冬葵子柏子仁白茯苓冬瓜子各等分右搗細為𣪚每服二錢匕溫酒調下食後臨卧服之礬石𣪚治面皯皰令光白礬石白石脂白蘝杏仁各等分右並為𣪚以雞子白調令勻入瓷盒中盛臨卧時先用漿水洗面後塗藥明旦以井水洗之白蘝亦作白藍黃連𣪚治面皯皰令光白黃連一兩木蘭皮三兩大豬肚一隻右將二味搗羅為末內豬肚中縫合口入五斗米瓶內蒸熟取出細切曝乾搗羅為末每服二錢溫水調空心臨卧服麻黃𣪚治面皯皰麻黃甘草杏仁各三兩右搗篩酒下一錢日三服羊乳膏治面皯羊膽膏治面皯皰及産婦黑皰如雀卵色羊膽豬脂三合細辛三分右相和煎成膏每夜塗面旦以漿水洗之亦治令面皮光澤治面皯皰方黃連三兩蛇床子四合右搗末以面脂和塗面日再瘥治面皯皰及産婦黑皰如雀卵色桃花冬瓜仁各一兩右搗為末以蜜調傳之治面皯如雀卵色以羖羊膽一枚酒二升煮三沸塗之日三度瘥浮水膏治面皯皰令光白用水萍曝乾五兩搗羅為末以蜜調和稀稠得所入瓷盒中盛每卧時塗面本草以浮萍搽之亦可飲少許汁良治少年面上起細皰治面皯皰及産婦黑皰如雀卵色皯􅍍班方用白茯苓末蜜和傅之治面皯用桂心石薑末蜜和傅之治面皯皰及産婦黑皰如雀卵色用七月七日取露蜂子於漆碗中以少酒漬取汁重濾過以明粉相和塗之治面皰方生地三斤枸杞根一十斤右先搗枸杞次搗地黃曝乾合篩空心酒服方寸匕日三久服顔如童子此祕方也治男女皰面生瘡方黃連二兩牡蠣三兩右搗羅以粉頻傅之即瘥一方以水和如泥傅之妙治面上皰子方水銀臘月豬脂各一兩右相和熟研令水銀星盡向夜塗之平明拭淨三四度瘥又方鷹糞白半兩胡粉一分右細研以蜜和傅面上治少年面上起細皰方雞子二枚好酒一升右瓷瓶子內盛密封頭候七日取出雞子去殼每夜塗面上旦以溫漿洗之治面及鼻病皶皰木蘭皮一斤梔子仁一斤右搗𣪚食前以漿水服方寸匕日三一方食後用蜜湯下治面􅖟皰方用鸕鷀屎一升為末以臘月豬脂和勻夜傅之亦治皯􅍍治面皯皰年少氣盛用麋脂塗拭面上日再塗之瘥治面上皰方用川大黃末以水調每夜塗之木蘭膏治面皶皰木蘭皮防風白芷辛夷木香牛膝獨活藁本芍藥白附子杜蘅當歸細辛芎藭一兩麝香三錢臘月豬脂二斤右除麝香豬脂外並銼碎先將豬脂入鍋中令銷下諸銼藥以文火煎三上三下候白芷塊子黃色膏成用新綿濾去滓入麝香攪勻稀稠得所瓷盒盛每臨卧時先以溫漿水洗面後塗膏日三次白芷膏治面􅖟皰白芷白附子各三分芎藭防風半兩白丁香蕪夷木蘭皮細辛藁本零陵香松花麝香各一分熊脂三斤右除麝香熊脂外並銼碎入淨器中以酒二升浸一宿先將熊脂入銅鐺中化令銷次下酒中諸藥以文火煎之三上三下候白芷黃色膏成用新綿濾去滓入麝香攪勻稀稠得所瓷盒盛每臨卧時先以澡豆溫漿水洗面後塗膏大效防風𣪚治肺臟風每及過飲成皶皰防風一兩石膏三兩小荆子梔子仁薺苨枸杞子白蒺藜各一兩甘草半兩右為末每服二錢溫水調下食後二服杏仁膏治面􅖟皰杏仁研一兩硫黃研一兩蜜陀僧研半兩硼砂研一錢白鵝脂二兩右除鵝脂外再同研如粉入鵝脂油更研令勻傾入瓷盒子坐煻灰火中養之攪令稀稠得所成膏每臨卧以紙拭皰令乾塗之治卒得面靤方土瓜根水銀胡粉青羊脂各一分右為粉和傅面靤旦以漿水洗之極妙白附子𣪚治面靤癢腫白附子青木香豆豉各二兩麝香三分右為𣪚以水和塗面一方用細辛二兩尤佳白膏治面􅖟疱疥癰惡瘡附子十五枚蜀椒一升野葛一尺五寸右㕮咀以酢漬一宿豬膏一斤煎令附子色黃去滓塗日三治面皰及黑方淳酒三升牛膽羖羊膽各一具右合煮三五沸傅之治面上皶䩅皯𪒟方蒺藜子梔子仁各一斤右搗合如泥以酢漿和如泥臨卧以塗面上日未出便洗瘥雄黃𣪚治面上生細皰瘡方雄黃硝粉水銀各等分右以臘月豬脂和以傅皰上差止治年少氣盛面生疱瘡方薺苨肉桂各二兩右為末以酢漿服方寸匕日一服亦治皯􅍍及滅瘢去黑痣治面􅖟皰皯􅍍方用木蘭皮一斤以三年酢漬令至百日曝乾為末溫酒服方寸匕日三或以漿水服之又以為末傅之治滅瘢治面皯皰及産婦黑皰如雀卵色右雞卵醋浸令壞傅面皯後以漿水洗之治面皯一名杏仁膏治面皯黯令恱白潤好及手皺一名茯苓膏治𪒟皯面一名治白皯􅍍方白附子膏方見面皯􅍍類治面皯皰令恱白潤好及治手皺方治少年面上起細皰方俱見面皯􅍍類以浮萍搽之亦可飲少許汁良也治面黑皯出本草以冬瓜藤燒灰洗之治面皯出本草以乾肺炙食之治面白皯瘢出本草以續隨葉汁傅之又莖中白汁搽人面去皯􅍍甚效面粉皶論夫面皶者是粉刺也面上有皶如米粒此由膚腠受於風邪搏於津脈之氣因虗而作亦由傅胡粉散入虛肌也方治粉刺面生皯􅍍方黃耆白术白蘝葳𬎼各二兩半商陸鸕鷀糞鷹糞各一兩防風芎藭白芷細辛各一兩半木香一兩白附子杏仁各一兩半右為末以雞子白都和作挺子曝乾以漿水研塗面夜傅朝洗之妙治面上粉刺恱澤容顔方硫黃蜜陀僧乳香膩粉白殭蠶杏仁各等分右同研如粉以牛酥調稀稠得所暖漿水洗面了拭乾塗之勿使皂角三五度瘥治面上粉刺及面瘡方黃連粳米赤豆各五分吳茱茰一分胡粉水銀各六分右搗黃連等下篩先於掌中研水銀使極細和藥使相入以生麻油調稀稠得所洗瘡拭乾傳之但是瘡即療神驗一方無胡粉赤膏治婦人面粉皶光明沙四分麝香二分牛黃半分水銀四分雄黃三分右研如粉面脂一升內藥中和攪令勻如傅面脂法香漿水洗塗藥避風經宿粉皶如蔓菁子狀自落大效防風𣪚治面上風刺粉刺防風輕粉荆芥各三分蜜陀僧乳香各一錢右為細末每夜臨卧用藥一錢塗面上以乳汁調傅次日空心用鹽荆芥湯洗之治面上瘢迹一切風刺粉刺雀班方白附子蜜陀僧白茯苓白芷胡粉等分右為細末以羊汁調塗傅至天明漿洗面不過五七次亦治風瘡治面上粉刺及黑皯方硃砂雄黃蜜陀僧各一兩麝香半兩粉霜半兩右研細用面脂調夜卧時勻以塗面至明以溫漿水洗之肥皂圓治男子婦人風刺粉刺雀班面上細瘡南星朴硝各半兩巴豆七枚白梅一兩右為細末和勻將肥皂一箇酌量大小入藥在肥皂內麻線扎定濕紙煨香熟取出入消風𣪚一貼爛搗成膏丸如彈子大每日用之洗欲入諸香隨意加之治風刺粉刺瘡麻子風黑皯等疾方殭蠶白附子白芷藁本各一兩右為末如常面藥洗之五參圓治去酒刺面瘡人參丹參各一錢苦參羅參各一兩右為末用胡桃仁五錢重杵碎為丸如梧桐子大每服三十丸茶湯送下日進三服食後服紅膏治面上粉刺硃砂一兩麝香牛黃各半兩雄黃三分右同研令勻以面脂和為膏勻傅面上避風經宿粉刺自落白斂膏治面粉皶白斂白石脂杏仁各半兩右為末更研極細雞子白調和稀稠得所瓷盒盛每臨卧塗面上明旦以井花水洗之良療面及鼻酒皶方出肘後方珍珠胡粉水銀各等分右豬脂和塗又鸕鷀屎和臘月豬脂塗亦大驗神效傅面旦起以水洗之治粉刺方出百一選方雄黃硫黃蛇床子等分右為細末臨睡洗面了用真酥一字塗之治婦人面上粉刺方滑石半兩黃臘一錢巴豆五箇右每為細末每用少許如常法洗面治婦人頰上瘡瘥後每年不發黃礬石二兩胡粉一兩水銀一兩半右搗篩先以片許豬脂於瓷器內熟研水銀令銷盡更加豬脂并礬石胡粉使粘稠洗面瘡以塗上又别熬胡粉令黃塗膏訖則塗粉數日即瘥治卒病餘面如米粉方白斂杏仁半分雞矢白一分右搗下以蜜和之雜水以揩面良丹砂𣪚治面􅖟如麻子丹砂桃花各五兩先將桃花研令如膏次入砂研極細每服一錢空心井水調下日三服十日白二十日太白小便當出黑汁萱草膏治面粉皶痞㿔萱草花曝乾七兩白蜜二兩右搗羅萱草花極細與蜜調研令勻入瓷盒盛每旦洗面後隨多少塗面上石粟膏治面粉皶痞㿔如麻子石灰二兩粟米二兩右將灰羅細同粟內瓶中以水浸經三日取出如膏爆乾重研如粉以面脂調勻入瓷盒中盛每洗面訖拭塗之治面皯及粉皶右三年大酢二升漬雞子五枚七日當軟如泥去酢㵼著瓷器中以胡粉兩雞子許和研如膏蓋口蒸之於五斗米下熟藥成封之勿泄氣夜欲卧時研塗面皰粉刺上旦以漿水洗面日每如此百日瘥勿見風效亦治粉刺及皯治面及鼻病酒皶方用馬蘭子花杵傅之佳治面粉滓方右熬礬石以清酒和傅之不過三上一方熬汁盡為末酒塗之亦治卒病皶面如米粉又去粉刺又方出聖惠方用生莵絲苖搗汁塗不過三上一方莵絲子汁玉女粉治面上風刺粉刺面皯黑白班駮用益母草不拘多少銼搗晒乾燒灰湯和燒數次與粉相似每用以乳汁調先刮破風刺後傅藥上一方洗面用之又以醋漿水和燒通赤如此五次細研夜卧時如粉塗之治大粉痣方出海上方用黑牽牛為末對入面藥中洗面能去粉痣治粉刺方用茺蔚子燒益母灰為末以面湯溲澆之洗面遍治面上風刺亦治面黃極妙又方以蘖米末共米醋和傅亦使皮膚澤其熱不及麥蘖也又方以蜂子取其未成頭足時炒食之又酒漬以傅面令面恱白治去酒刺面瘡用蜜一兩白丁香一十粒浸在蜜裏早晨夜晚點在面上酒刺自落治鼻􅖟贅子及面上雀兒斑黃丹硼砂巴豆餅藥各二錢右為末入石礦石灰末一匕雞子清調勻酒􅖟用鵝翎刷上雀兒班竹針刺破挑藥點之才覺痛微腫可洗治粉刺面皯黑白班駮右羖羊膽五枚取汁以好酒一斤相和煎令稠以塗面上日三度土瓜膏治面粉皶痞㿔用土瓜根二兩搗為細𣪚以漿水和研成膏入瓷盒中盛每臨卧以漿水洗面塗少許治婦人粉刺面上黑子右以黑牽牛不拘多少以童子小便浸令軟爛研極細先以生薑自然汁塗患處却以藥塗之詰旦用溫酒洗淨甚者不過三次效面體疣目論夫風邪入於經絡血氣凝滯肌肉弗澤發為疣目或在頭面或在手足或布於四體其狀如豆如結筋綴連數十鼠乳相類故謂之疣目方治一切疣贅瘢靨方風化石灰粉爐炭灰桑柴灰各一升砒霜硼砂各一分黃礬半分右將砒霜等三味研令極細入前膏內調令用布揩破塗之似有白痂即以新羅松子油調塗之治疣目及痣等方桑柴灰四升附子兩顆硼砂一分糯米五十粒右搗為末入灰內調令勻每取少許點疣目上即自落兼破一切腫毒要作頭者當急用此藥腫毒即破也治面及身上生疣目方膩粉一兩巴豆一枚右細研以針輕撥破疣目自上點之成瘡自落後用黃連末傅之便乾治去疣目方松脂柏脂右等分合和塗之一宿失去兼治疵痣治面及身上生疣目方用蠟紙一片炙令熱上以硫黃末少許摻令勻緊卷以火燒點疣目上待有沸聲便撥却已去根也治疣目及痣靨子方用糯米五十粒於濕石灰裏埋之以米爛為度用針撥破疣目傅之經宿自落亦治靨子治去疣目方出聖濟總録用豬脂於癢處揩之令少出血即瘥神驗又方出聖惠方用灰二兩以苦酒漬七日滴汁點疣目上即落作小瘡子即瘥亦治疵痣又方出聖濟總録用牛口中涎數塗疣目上自落亦治疵痣又方聖濟總録用艾作炷於疣目上灸之三壯即除又方以鹽塗疣上令牛舐之不過三度又方以屋溜下水塗之效或云以墨塗之不過三度又方以朔藋赤子挼使軟疣目上亦令塗之又方出聖惠方以蜘蛛網絲繞纒之自落良一方叢落間花蜘蛛絲尤良又方以石硫黃揩疣目上六七遍再以醋調塗即瘥亦治疵痣又方每月十五日正中時望中以秃條帚掃疣目上三七遍瘥又方取月盡日平旦井花水月初一日煮作湯竈突北面南自洗呪曰日盡水日初湯竈突北千疣死百疣亡凡七度洗及呪甚妙又方用布紙一張於牀下即以筆點疣下還點紙一下無問多少皆一一點每點即呪曰紙亦𣪚點一遍訖乃深埋點紙於屋漏下久當疣𣪚又方月晦日夜於厠前取故草二七莖别二七過粉疣目上訖呪曰今日月晦疣驚或明日朝乃棄勿反觀之又方取亡人枕若席物拭之亡人近彌易去也又方取七月七日以大豆一合拭疣目上三過訖使病疣目人種豆著南向屋東頭第二霤中豆生四葉以熱湯沃殺疣目便失又方右盜取一酘酒醅以摩疣目上呪曰疣疣不知羞一酘酒醅洗你頭急急如令呪滿七次即自愈又方用杏仁二十枚燒令黑研如膏塗疣目上治疣目耳瘑瘡出本草以烏雞膽日三傅銷黑痣疣贅出本草取浣衣黃灰蒿藜荻三種灰熱水蒸以點之即去不可廣用爛人皮肉桑薪灰功勝浣衣黃灰及炭灰治人面卒得赤黑丹如疥狀不急治遍身即死用燒鹿角末豬膏和塗之療面目身卒得赤班或癢或癮子腫起不即治之甚殺人以羖羊角燒為灰研令極細以雞子清和塗之極神驗無雞子醋和塗之亦妙治面目卒得赤黑丹如疥狀不急治遍身即死若白丹者方取白磁瓦末豬脂和塗之靨痣論夫黑痣者蓋風邪搏於氣血變化所生也夫人氣血充盛則皮膚潤恱不生疵瑕若損則生點痣然黑痣者是風邪變其血氣所致也若生而有之者非藥可治也方三灰煎治疣贅瘢痕疵痣及癰疽惡病等傷其上皮令裁破以藥點之石灰一斗五升溫桑灰四斗柞櫟灰四斗右合九斗五升以沸湯令浥浥調濕內甑中蒸之從平旦至日中還取釡中沸湯七斗就甑三淋之澄清內銅器中煎令至夜酌量餘五斗汁微火徐徐煎取一升洗亂髮團之如雞子大內汁中即銷盡又取五色綵翦如韭葉大量五寸著藥中亦消盡又令不強藥成以白罌子貯之煎時不令婦人小兒雞犬見亦治消諸瘤其血瘤附左右胡脈及懸癰舌本險處不可令消消即血出不止殺人宜詳慎之治去黑子方大丁香江子各等分右以研塗黑處神手膏治專去痣石灰一兩班貓七個右蘸苦竹麻油少許却和勻石灰攪調然後入釅醋少許搜和不拘多少先用刀剔破痣入藥於內塗之糯米膏去靨子石灰木炭灰三錢右件稱勻以水少許調令稀稠得所瓷盞內盛以竹箆子攤平然後㨂好糯米二十粒每粒立種之如蓮蓬樣每粒插一半在灰內以好紙遮蓋盞口無令透氣候四五日取起一二粒著在灰內者若化作粥漿可用米如末化候一二日如取靨子先洗淨過以竹斜削作針燈上燎過其尖稍利先輕手於靨周圍略撥動即以竹針輕批糯米漿汁勻布撥動處靨上不用須臾微有小痛不作膿三數日即作痂勿剝任其自落不作瘢痕其靨自除治去靨方用蕎麥秸一擔不爛者燒灰存性入石灰半斤同灰一齊過冷火滅然後以熱水淋灰窩淋下灰水用鐡器內煮以漆匙攪成膏子於靨上點出或先以草莖刺破亦可又方七白錠治面上靨色并雀班白附子白芨白蘞白芷白殭蠶白茯苓白术各等分右為末以雞子清調作錠子隂乾每用漿水摩傅面上以時換傅七日見效加蜜陀僧治面上黑痣及贅方雄黃硫黃珍珠末白礬蘭茹藜蘆各半兩巴豆三枚右為末都研令勻以黑漆和合如膏於上點之當成痂自落及去面上皯皮中紫點其不耐漆人用雞子白和塗之良治赤疵及黑痣去靨穢乾漆一兩巴豆三枚炭灰雄黃雌黃白礬各一兩右為末都研令勻以黑漆和合如膏於上點之成痂自落及去面皯皮中紫點其不耐漆人用雞子白和之塗良五灰煎治黑子去疣贅石灰朔藋灰桑灰炭灰菌灰各一升右以水溲蒸令氣匝仍取釡中沸淋取清汁五升許於銅器中東向竈煎之不得令雞犬小兒女子穢惡人見膏成凝強如砂糖即堪用量以點之治去痣方糯米一百粒石灰巴豆三粒餅藥少許右入磁瓶同窨三日以竹簽挑粟米許點痣自然蝕落又治去瘢治點痣方硼砂石灰班貓巴豆各等分右用餅藥調每用粟米大點上治黑子及贅方生䔧灰五升生薑灰五升石灰三升半右合和令調蒸之令溜取甑下湯一斗從上淋之盡湯取汁於鐡器中煎減半更慢火煎以雞羽搖中即撚斷藥成欲去黑子疣贅先小用石灰桑灰淋汁熬成膏草莖刺破點新水沃之忌油膩等物治面靨方先以草挺搯斷於靨上劃破俟有些微血出用研銅緑細末貼之三日不洗面瘡痂起自然無了如厚靨或青靨須再貼一遍方盡無瘢䀶治黑痣生於身面上用藜蘆灰五兩水一碗淋灰汁於銅器中盛以重湯煮令如黑膏以針微撥破痣處點之者不過兩次神驗治黯點方用桑灰艾灰各三升以水三升淋之重淋三遍以五色帛內汁中合煎令可丸以傅黯上則爛脫乃以膏塗之兼治疣目甚妙治瘢痣藥用鹻入水熬數沸下好灰調如粥相似入磁器內上鋪白連紙一層用糯米五十粒頓於紙上用物合了放在暖處次日看米如膏點痣用針撥破點上米膏治點靨子方取落梨灰少許淋取灰汁於銅器中重湯煎如黑餳以針微撥破靨子令藥得發動點之大者不過一點治黑子去疣贅方用續隨子熟時碎破之以塗其上便落神效灰煎治疣贅黑疵痣靨穢瘡疽瘜肉結瘤用炭灰三升湯拌令濕徹以熟湯漬令半日後以熱湯淋之稍點湯不得太速下即灰汁不驗候汁下得二三升即內一小鐺中煎一兩沸即别取一兩用風化石灰為佳恐中濕者須熬令極熱內灰汁中和煎以杖連攪之勿住手候如煎餅麵少許細細取成膏急㵼著一瓷器中攪令冷不然須臾乾燥不堪用常候其煎十分至一分堪久停但有傷損肉色須臾變赤黑色痛如火燒狀如炙瘢發痛即肉病凹為效後經二十餘日病自然脫落無瘢痕欲衝風冷逺行貼烏膏亦神效痂亦易落瘡未瘥切忌小豆薑縱有瘢亦不凸出烏膏極妙治赤痣用黑大蒜鱔合血塗之治去痣靨小瘤子方用石灰化鹻各等為細末先以針挑破却用水調藥點上些小在患處三日三上即去如無鹻用麥桿灰竈灰淋水同石灰調依前用一方天色冷溫用治去靨子方亦治血皯面皺用蔓菁子研末入面脂中及去皺治去痣靨用石灰炭火上熬熱放糯米於灰上候米化即將米點之美容膏治遍滿頭面大小諸靨子及身體者料炭灰桑柴灰蕎麥蘸灰各半兩右灰用熱湯淋取一升熬至五分乃用獨角仙一個紅娘子半錢糯米四十九粒石灰一兩右為末將前項灰調汁如麵糊相似在瓷盒內土底埋五七日取出使用取瘢痕靨以針挑破用細竹簽子點之放藥用濕紙揩藥再點至三上見瘢痕時冷水淋洗忌薑醋無血之物如聖膏出楊氏方黑豆梗灰蕎麥秸灰茄梗灰桑柴灰礦灰炭灰右件各等分為末水三碗淋取汁俟淋下再淋兩次慢火熬膏每用少許針刺破靨子傅之治去面上靨子黑痣方右夜以暖漿水洗面以生布揩靨子令痛水研白旃檀香取濃汁塗靨子上旦復以暖漿水洗之次以鷹屎白傅其上亦治黑子治黑靨子及紋刺用石灰水調一盞如稠粥揀好糯米粒全者半置灰中半灰外經宿灰中米色變如水精若人手面上有黑靨子及紋刺先微以針頭撥動置少許如水精者於其上經半日靨汁自出剔去藥不用但不得著水二三日愈治疣痣黑子出本草以諸灰雜石灰熬煎以點之治痣子方出本草用苦菜折之取白乳滴出常點痣子自落治黑痣面皯潤毛髮用大豆黃卷一升炒令香為末空心暖酒下一匙大豆黃卷者乃黑豆芽也普濟方卷五十一
