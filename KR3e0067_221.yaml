壯真元兔絲子牛膝寸截各一兩右於銀器內好酒浸之令酒過藥一寸經五日控乾焙燥搗羅為末將原浸酒煮糊和丸如桐子大每服三十丸空心食前酒下何首烏丸治腳膝壯筋骨烏鬚鬢理風虛悅澤顔色方見本門補虛壯筋骨類四倍丸補益壯腰腳蜀椒去目合口者炒出汗一兩兔絲子酒浸三日别搗二兩萆薢酒浸三宿另搗四兩牛膝洗焙八兩右同為末煉蜜和丸搗五百杵丸如桐子大每服三十丸至五十丸早晚鹽湯或酒任下服之一年行如奔馬香茸丸治精耗血少陽氣衰調榮利腰腳鹿茸麝香沈香山茱萸各等分右為末入麝香研勻煉蜜和丸如桐子大每服空心溫酒鹽湯任下三十丸杜仲丸一名青蛾丸補下元烏鬚壯腳膝進食悅色治腰疼方見本門補虛益髭髮類羊腎丸治下焦虛冷腳膝無力虛弱並能補益以羊腎一箇煮熟和煉成乳粉半大兩空腹食之鹿角丸出王氏傳濟方治風冷補暖壯腰膝明耳目駐顔容近老用煮成角一斤取麋角或鹿角須是殺者不用自死者角每對須要重十斤以上者去腦角寸寸截每五斤以東流水浸四十九日或三七日刷去水積令淨入一大鍋內研大丹大五升取汁黃臘半斤青鹽四兩並碎銼以甜水滿鍋勻沸煮兩伏時如湯耗續添溫湯不得入冷水却須常另煎一鍋湯添只候角軟如薯蕷取出却刷洗令淨却著絹袋子盛扭乾杵為末取煮角汁濾去滓慢火熬成膏充和藥末附子二兩炮去皮臍川巴戟一兩去心用糯米炒牛膝二兩酒浸切焙海桐皮二兩炒破故紙一兩淨淘去浮者炒官桂一兩去皮白殭蠶一兩炒天麻一兩右件八味同為末入一斤角霜同拌更入青鹽二兩研令勻用白砂蜜一斤半角膏一斤同爛勻令蜜熟和為丸再入臼杵二千下仍以半兩真酥塗杵臼候熟衆手丸如桐子大每日空心溫酒下五十丸日午再服烏頭煎丸出王氏傳濟方補元臟虛冷腰膝無力行步難食少筋骨拘急疼痛駐顔益氣川烏頭一斤以大豆煮二伏時以竹刀子切作片子焙乾去大豆不用杵為末青鹽四兩化用成水相和淋成片熬成膏次入下項藥沈香一兩半破故紙一兩虎骨一兩醋炙天麻一兩牛膝一兩炙海桐皮一兩肉豆䓻四枚去殼木香半兩羌活巴戟二兩炒令黃右件十味杵羅為末入膏攪和丸如桐子大每日空心溫酒下二十丸妙又一方不用木香羌活却入舶上茴香炒檳榔各一兩甘草半兩仍更加桐皮牛膝各添一兩天麻加半兩即同前煎法則更佳也硇砂丸出王氏博濟方補元臟虛冷腳膝無力生瘡腫壯筋骨進食硇砂一合去石以好酒一合拌浸去滓熬用大附子半分炮牛膝半兩乾薑二分炮苦參下生吳茱萸生半兩桃仁一兩去皮尖雙仁木香半兩川楝子一分炒右件九味並杵為末將硇砂膏並桃仁同拌和别以爛蒸木瓜去皮研為糊攪成劑為丸如桐子大每日空心酒下三十丸要行氣疾去附子牛膝却入郁李仁牽牛各半兩生為末如要補即依原法用之神仙方出本草治腰膝去風久服延年以兔絲子一斗酒一斗浸良久漉出暴乾再浸以酒浸盡為度每服二錢溫酒下日二服後吃三五七水飯壓之至三七日加至三錢七服之令人光澤三年老變為少主一切風虛理腰腳輕身變白不老出本草用放杖木浸酒服之老人服之一月放杖故以為名也補腰腳令健出本草取女真皮以浸酒服補虛強腰腳益腎出本草以零餘子食之出本草虎骨酒養肝腎調順血氣補虛排邪理腰膝風痺皮膚不仁下注步履艱難久服去健忘益心氣清頭目定神魂虎脛骨一兩酥炙黃茋銼桔梗炒酸棗仁炒茯神去木羌活去蘆石菖蒲逺志去心芎藭牛膝酒浸一宿切焙熟地黃焙萆薢蓯蓉酒浸一宿切焙附子生去皮臍以新汲水浸半日又破作二片換水浸一日焙乾石斛去根各一兩防風去義羚羊角鎊各半兩右銼細以生絹袋盛入醇酒一斗浸之密封瓶口春夏三日秋冬七日每服溫飲一盞日二如服盡添酒五升浸之又服盡取滓焙乾為末每服一錢酒調下或以蜜丸如桐子大每服三十丸空心溫酒下萆薢丸治風冷壯腰膝暖臟腑利血氣補脾腎益氣力萆薢銼牛膝去苗杜仲去皮炒微黃銼酸棗仁炒柏子仁防風去義蘆天麻肉蓯蓉酒浸一宿去皮炙乾桂心補骨脂炒附子炮去皮臍五味子磁石燒醋淬七次搗碎細研水飛過鹿茸熟地黃石斛去根銼巴戟各一兩右為末入磁石研令勻煉蜜和搗三二百杵丸如桐子大每日空心以溫酒下三十丸木瓜丸治腰膝無力四肢倦困腹肋冷疼壯筋力和氣血補暖木瓜宣州者二枚去穰剜作頂子硇砂半兩上絹袋貯在木瓜內羊腎一對研以上用好酒四升銀器內候硇砂盡去袋子熬成膏雄雀一對去毛嘴爪腸肚骨研蓯蓉酒浸一宿切焙二兩附子沈香銼木香蘹香子炒楝實銼炒椒紅青皮去白焙巴戟天葫蘆巴檳榔銼桂去皮各一兩右搗羅一十二味為末以前四味膏和丸如桐子大每三十丸空心鹽酒下熟乾地黃丸治下元虛冷腰腳無力益顔色黑髭鬢補虛損乾地黃二兩牛膝去苗逺志去心巴戟石斛去根銼桂心車前子覆盆子兔絲子酒浸二日暴另搗為末天門冬去心焙何首烏白茯苓黃茋銼鹿茸去毛塗酥炙黃附子炮製去皮臍右為末煉蜜和搗三五百杵丸如桐子大每日空心溫酒下五十丸烏頭煎丸治下元風冷流注腰膝行步不能狀似軟風補益陽氣一名牛膝煎丸烏頭五兩水洗令透軟去皮臍細切用好酒三升熬爛更細研成膏木瓜三枚下面剜去穰核將艾搗末入在瓜內填實蒸令熟爛研牛膝去苗酒浸切焙乾羌活巴戟去心蓯蓉酒浸切焙各一兩半青鹽研青皮去白焙蘹香子炒狗脊去毛萆薢各二兩右搗羅十味為末入前二味膏中和勻丸如桐子大每服三十丸空心溫酒鹽湯任下巴戟丸治骨髓虛憊腰膝無力巴戟去心三分黃茋銼一兩逺志去心牛膝去根酒浸焙乾地黃焙山芋各三分桂去皮五味子附子炮去皮臍各半兩豬腎一對去脂膜破開入椒四十九粒鹽花少許拌勻濕紙裹煨去核細切如糊穰諸藥右搗羅九味為末以豬腎和丸如桐子大每服二十丸溫酒下腎附丸治水臟風冷滯氣耐寒暑暖腰膝羊腎五對附子五兩炮去皮臍鍾乳粉二兩桂心二兩訶梨勒皮二兩赤箭二兩山茱萸二兩薯蕷二兩肉蓯蓉二兩酒浸一宿去皮焙乾兔絲子二兩酒浸三日炮乾另研為末右件為末取羊腎去筋膜批作片子每一片上鋪藥末一重如此重重相隔以盡為度用濕紙裹數重了更用鹽泥重裹入煻灰火煨三炊後久候火氣通透亦不得令焦出藥看作紫黑色即住如腎未熟即重封更煨候得所即搗三五百杵入少水浸蒸餅更搗候可丸即丸如桐子大每日空心服以溫酒下三十丸晚食前再服三日後已覺水臟溫暖麋角丸補暖下元壯腰膝治虛冷氣麋角屑一斤入乳拌勻用銀石器內盛封以大麥六斗蓋各蒸一服時肉蓯蓉二兩酒浸一宿去皮炙乾蘹香子二兩桂心二兩蓽茇二兩木香二兩附子二兩炮去皮臍柏子仁二兩肉豆䓻二兩去殼檳榔三兩右為末煉蜜為丸如桐子大每服空心以溫酒下三十丸羊腎煎丸治下注傷憊腰膝無力四肢無力筋骨疼痛行步艱難羊脊骨一條去筋附子炮去皮臍檳榔銼黃芪枳殼去白炒各一兩沈香銼蜀椒去目合口者炒去汗桂去皮木香右搗羅為末用硇砂二兩飛過法酒米醋各一升同羊脊骨入銀器內文武火熬令酒醋焙燥杵羅為末别用酒作麵糊同前八味藥末和搗丸如桐子大每服二十丸至三十丸空心夜卧溫酒或鹽湯下八神散治四肢體沈重腳膝無力骨髓冷疼壯筋骨明耳目附子去皮臍一兩烏頭去皮臍草烏各二兩并每箇銼作三假同鹽二兩慢火煮一日焙乾用防風半斤以上四味並銼令塊子相似蛇床子莨宕子馬藺子吳茱萸各二兩右同用慢火炒令煙出急傾在淨地上揀取附子防風烏頭等四味杵羅為末散以磁合盛每服一錢空心取井花水面東調下日後漸加三錢補五臟理腰膝腳氣益陽事能消食除腹中冷氣消痃癖出本草以淡菜燒令汁沸出食之多令煩悶目暗可微利即止兔絲子丸出十便良方治腰膝無力壯氣祛風黃魯直説服此藥若覺小壅當以少菊末和湯點服之但兔絲子久服易思欲事切宜戒慎右兔絲子揀去淨不拘多少先入臼如舂殷然後簸揚去塵稗淨用水淘五次去浮者并底沙石控乾酒浸之夏五日冬十餘日控子焙乾右於大碾中碾羅為末取生山藥去皮磨為膏酒煮成糊攪和為丸如豌豆大焙乾每一服空心酒下一百丸無所忌李周侍郎服之年七十六如四五十嵗人朝中最強健屢見服兔絲子人得力有功也普濟方卷二百二十一
