兩鱉甲去裙襴醋炙三分赤茯苓去黑皮三分虎頭骨一兩酒塗炙焦右粗搗篩分為五貼以水三盞煎取一盞下地黃汁一合更煎三五沸去滓分溫二服食後良久相繼服日一貼桔梗湯治寒熱似瘧桔梗銼炒一兩甘草炙半兩知母焙半兩柴胡去苗一兩半大黃銼炒半兩鱉甲去裙襴塗醋二兩右銼如麻豆分為六貼每貼用童子小便二盞蔥白三莖䜴半合浸食頃煎煎取一盞去滓食後分溫二服日一貼虎骨湯出聖惠方治往來寒熱瘧經年不瘥瘦弱及勞瘧虎頭骨塗酥炙黃鱉甲塗酥炙黃去裙襴牡蠣炒為粉桃仁湯浸去皮尖麩炒微黃各三兩香䜴二合炒乾右為末和搗三二百杵丸如梧桐子大每於食前以粥飲下三十丸豬膏丸出聖惠方治瘧寒熱發渴往來不定臘月豬脂二兩獨顆蒜一顆萎蔥一握獨角仙一枚五月五日三家粽子尖右於五月五日五更初於淨房內修合勿令婦人見露頭赤腳舌柱上腭回靣向北搗一千杵為度有患者用新綿子褁一丸如皂莢子大男左女右繫於手臂上砒霜丸出聖惠方治瘧往來寒熱發渴無時砒霜生研一兩天靈蓋一兩生用為末猢猻頭骨一枚燒灰硃砂半兩細研東南桃柳枝各七莖長三寸右取五月五日午時為末取粽子角和丸如梧桐子大男左女右手把一丸豫先嗅之一丸可醫五七人人參湯出聖惠方治瘧寒熱作時靣色黃人參常山各半兩甘草生三分陳橘皮湯浸去白燒乾一分右粗搗篩為末每服五錢水一盞半入茶末半錢燈心五莖煎至七分去滓入酒半盞和勻候溫未發前頓服取吐如未吐再服以痰出盡為度附子丸出聖濟總録治諸瘧寒熱往來附子炮裂去皮臍大黃銼炒各三分常山蜀漆各一分右為末煉蜜和丸如梧桐子大每服三丸米飲下未發一服臨發再一服消石膏出聖惠方治瘧寒熱往來砒黃半兩消石白礬各一兩膩粉一分右細研用醬水一大盞調成稀糊入鐺中以慢火煎又用冷醬水一升候沸即旋添添盡將乾取出曬乾若來日發今日初夜以冷醋湯下一菉豆大來日早晨再一服一日內不得食熱物逐邪丸出聖惠方治瘧往來寒熱發歇無時濕生蟲四十七枚百節蟲四十九枚砒霜三分細研粽子角一七枚右於五月五日日未出時於東南方上尋取兩般蟲去足至午時靣向南都研不令雞犬婦人師僧孝子見丸如小豆大每患者於發前男左女右手把一丸嗅七遍立效常山散出聖濟總録治諸瘧寒熱往來止而復發常山末一兩砒霜研一分丹砂研一錢右研勻入白麵糊和作餅子油內煮焦黑為度再研極細每服半錢夜半令茶清調下丹砂丸出經效濟世治瘧疾寒熱相半者兼治間日瘧丹砂人參各一錢附子一枚半兩者右為末蜜丸如梧桐子大煎竹葉湯吞下二三十丸未發前三服中病則吐或身習習麻木未中病加至四十丸明日發前如發服中病即止己巳嵗七月初十日豫得瘧疾連日發作呻吟宛轉一榻間殆無生意如是者已兩旬平昔號為得效之藥服之已遍略無所知教授龐國器出此方且云今公之病寒熱交戰者蓋陰陽之氣不分也龎安常有治瘧方寒熱相半所謂丹砂丸者公所宜服也其説適契豫心即合此服之二日而即愈矣八月一日公悓記蜜煎主寒熱方蜜五合恆山甘草各二兩右三味取二味㕮咀以水二斗煮取二升去滓內蜜五合溫服七合吐即止不吐更服七合勿與冷水一方用甘草半兩常山甘草湯出肘後方治寒熱日再三發可服常山三兩甘草二兩右切以水四升煎煮一升半分三服相去五里久進一服忌海藻菘菜生蔥生菜一方水酒合煮服又方蜜二合醋八合右調和平旦頓服須臾泛泛然欲吐擲之若意中不盡明旦更服無不大嘔安穩柴胡括蔞根湯治瘧疾往來寒熱引飲方見本門手少陰心瘧類治瘧往來寒熱發渴無時出聖惠方用蜀漆末每服以溫水調下一錢草果飲出御藥院方治寒熱往來煩渴頭痛或寒多少熱方草果子仁四枚人參去蘆頭半兩甘草炙半兩半夏十三枚堅實者薑湯浸洗七次大棗烏梅去核三枚生薑二十一塊右件七味㕮咀用水一大碗煎至一盞去滓五更時溫服七寶銼散出廣南衛生方常山懷中懷乾生用檳榔秦芁洗去土甘草炙右等分為粗末每服藥三錢入桃枝柳枝各七寸烏梅三枚水二盞煎至一盞於未發日前臨卧放極溫冷進一服當發日絶早空心旋煎又溫冷進一服忌熱物半日以上即飲食皆無忌服藥時須是放溫冷細細呷喫療寒熱出本草方以鳬葵搗汁服瘧病發熱身黃小便不利附論夫寒熱凌虐於人名為瘧而發熱小便不利者身必發黃此蓋熱氣不散入於小腸水道既澀故小便不利也方知母湯治瘧病發熱煩渴咽乾口燥身黃怠惰小水澀滯知母地骨皮升麻犀角屑人參麥門冬去心焙柴胡去苗各一兩石膏半兩鱉甲醋炙令黃去裙襴各三兩甘草生銼半兩赤茯苓去黑皮三兩右粗搗每服四錢水一盞半入香䜴五十粒煎至八分去滓不拘時候溫服常山飲出聖惠方治瘧病手足苦煩發熱渴燥通身悉黃小便不利常山柴胡去苗甘草炙微赤銼梔子仁各一兩赤茯苓去黑皮石膏蜀漆鱉甲塗醋炙令黃去裙襴各三兩右粗搗每服五錢水一盞半入竹葉二七片䜴五十粒煎至八分去滓不計時候溫服一方無赤茯苓有烏梅肉三七枚微炒升麻湯治瘧病發熱煩躁身黃靣黃小便不利赤茯苓去黑皮桂去粗皮黃芩去黑心各一兩升麻常山蜀漆甘草炙銼各半兩右粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時候茈胡湯出聖惠方治瘧病大渴煩躁引飲不止身體皆黃小便不利煩熱嘔逆柴胡去苖二兩甘草炙微赤銼半兩知母人參麥門冬去心焙杏仁湯浸去皮尖雙仁麩炒微黃各一兩右粗搗篩每服四錢水一盞煎至六分去滓不拘時候溫服麥門冬湯出聖惠方治瘧病發熱煩躁體黃小便不利令人多驚如有見者麥門冬去心焙犀角屑杏仁湯浸去皮尖雙仁麩炒微黃常山銼甘草炙微赤銼各半兩糯米八十一粒右粗搗篩以水五盞煎至三盞去滓分為五服於發時煎溫服之蜀漆湯治瘧發熱身黃小便不利蜀漆常山人參赤茯苓去黑皮桂去粗皮各一兩右粗搗每服三錢水一盞入生薑五片棗三枚擘破同煎至八分去滓溫服不拘時候常山散治瘧病身黃小便不利常山鱉甲塗醋炙令黃去裙襴升麻赤茯苓去黑皮梔子仁人參各一兩右為散每服二錢溫水調服不拘時分升麻丸治瘧病身黃發熱小便不利升麻二兩常山檳榔各三分鱉甲塗醋炙令黃去裙襴知母生地黃各一兩半右銼如麻豆大每服五錢水一盞半入蔥白三寸䜴三十粒同煎至八分去滓溫服不拘時候常山散治瘧病頭痛發熱身黃色小便不利鱉甲去裙襴塗醋炙令黃甘草生用各一兩冬瓜汁四合車前葉一握無葉收子二合常山半兩右粗搗篩漿水二盞并瓜汁隔宿浸欲發日五更初以急火煎取一盞半去滓分為二服五更一服取抉吐三五度至發時又服亦取吐三五度過時便得喫漿水粥補之茯苓散治瘧病但熱不寒便身發黃小便澀滯赤茯苓去黑皮三兩桂去粗皮麻黃去節甘草炙銼各一兩右為散每服三錢新汲水調服不拘時候常山丸治瘟瘧發熱身靣皆黃小便不利常山赤茯苓去黑皮黃芩去黑心香豉炒乾二合右為末以粟米飲和丸如梧桐子大每服三十丸溫酒下不拘時候茯苓湯治瘧病發病身黃小便不利赤茯苓去黑皮白芍藥瞿麥穗各一兩白术三分右粗搗篩每服五錢水一盞半入蔥白五寸生薑一分拍碎同煎至七分去滓食前溫服普濟方卷二百
