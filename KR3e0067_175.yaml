更研令勻醋煮麵糊和丸如菉豆大每服空心以生薑棗湯下三丸治宿食不消結成堅癥形如杯卵腫硬如石宜服此方巴豆一兩杏仁半兩皂莢二兩硇砂半兩芫花一兩半川烏頭半兩雄黃一分乾漆半兩右件藥為末醋煮麵糊丸如菉豆大每服空心以溫酒下三丸檳榔丸出聖惠方治食不消成癥癖令人四肢乾瘦不欲飲食檳榔二兩半川大黃二兩白术三分枳殼三分木香半兩柴胡一兩鱉甲二兩右件為末鍊蜜和搗三二百杵丸如梧桐子大每於食前以暖酒下三十丸神麴散出聖惠方治食不消化結成癥癖令人羸瘦無力少食神麴一兩桂心半兩甘草一兩大麥蘖一兩乾薑半兩陳橘皮二分右件藥為散每服清粥飲調下二錢日三四服治脾虛不能化穀宿食留滯致成癥癖木香三分蓬莪荗一兩京三稜一兩巴豆二十枚硃砂三分右件藥前三味搗為末入後二味更同研令勻用麵糊和丸如菉豆大每服空心以生薑橘皮湯下三丸王􅀢丸出聖惠方治食不消化腹中結聚癥塊消石半兩硫黃半兩白礬半兩硇砂一分右件藥為末用乾鍋子內文火燒令赤直後乾硬停火候冷取藥置於濕地以土擁之出火毒一日後取出細研為末以粳米飯和丸如梧桐子大每服以醋湯下七丸老少臨時加減治脾虛不能化穀宿食留滯致成癥癖芫花一兩神麴一兩巴豆半兩右件藥都和搗一團用油單裹之旋取丸如菉豆大每服空心以生薑橘皮湯下三丸痃癖不能食附論夫痃癖不能食者由脾胃虛弱為寒氣所乘蓋脾胃者倉廪之官其氣宣通則能傳化糟粕受納水穀痃癖之人是因寒氣久積腹內不能榮養臟腑脾胃既弱邪氣停滯故虛滿而不能食也方桃仁丸主痃癖氣漫心脹滿不下食發即更脹連乳滿頭面閉悶咳氣急者桃仁八分鱉甲枳實白术各六分桔梗檳榔吳茱茰防葵乾薑各五分烏頭三分芍藥四分半紫苑細辛人參橘皮甘草各四分皂莢三分右搗篩蜜和丸如梧子大每服十丸加至二十丸忌海藻菘菜豬肉冷水生菜桃李雀肉等又浸藥酒用下前藥方紫蘇牛膝丹參紫苑橘皮各三兩生薑六兩生地黃四兩香豉三升防風四兩大麻仁一升五合右細切絹袋盛以清酒二斗五升浸三宿後溫一盞用下桃仁丸酒盡更添忌蕪荑白术丸出聖惠方治痃癖氣不能食心脅下滿四肢骨節酸疼白术三分黃耆一兩牡蠣三分人參三分赤茯苓一兩川烏頭二分乾薑半兩赤芍藥三分當歸三分訶梨勒皮三分細辛半兩桂心半兩前胡半兩甘草半兩防葵半兩鱉甲一兩紫苑三分檳榔一兩桔梗半兩右件藥搗羅為末鍊蜜和搗五七百杵丸如梧桐子大每服不計時候以溫酒下三十丸檳榔子丸主腹內痃癖氣滿胸背痛不能食日漸羸瘦四肢無力時時心驚檳榔子龍齒各六分桔梗當歸桂心川烏頭前胡白术乾薑茯神大黃各四分橘皮厚朴各三分甘草鱉甲人參各五分右搗篩蜜和丸如梧桐子大每服十丸米飲下日二服加至十五二十丸酒下忌海藻菘菜豬肉桃李雀肉大醋莧菜生蔥等黃耆丸療風虛汗不能食腹內有痃癖氣滿黃耆鱉甲各五分白术茯苓檳榔子人參各六分白薇桂心橘皮各三分牡蠣乾薑枳實當歸前胡附子各四分右搗篩蜜和丸如梧子大每服十五丸酒下日再服加至二十丸忌桃李雀肉醋物豬肉冷水蔥莧菜等木香丸出聖惠方治痃癖氣腹痛不能食四肢少力宜服木香三分訶梨勒黃耆鱉甲各一兩白术三分赤茯苓一兩桂心三分枳殼一兩陳橘皮當歸檳榔各一兩半五味子三分右件藥搗篩為末鍊蜜和搗三二百杵丸如梧桐子大每服不計時候以溫酒下三十丸療癥癖痃氣不能食兼虛羸瘦四時常服方牛膝肉蓯蓉各六兩生地黃九兩當歸逺志肉白术人參各三兩桂心四兩五味子五兩麴末五合大麥蘖一升五合茯苓六兩右為散空腹服二錢溫酒調下日二服漸加至三服或加半夏二兩生薑煮用檳榔飲下或加麥門冬六兩此方甚宜久服令人輕健忌桃李雀肉生蔥蕪荑醋物牛犬肉療痃癖發即兩脅弦急不能食檳榔子枳實人參白术甘草各六分桔梗五分鱉甲前胡各四分桂心三分龍膽草萎㽔大黃各五兩右搗篩蜜和丸如梧子大每服十丸酒下日二服加至十五二十丸忌海藻菘菜桃李雀肉莧菜生蔥豬肉等桂心丸出聖惠方治痃癖氣不能食腹中痛時嗽四肢少力桂心訶梨勒皮白术厚朴去粗皮塗生薑汁炙令黃熟各一兩半右為末每服二錢炒生薑湯或炒生薑酒調下療痃癖胸背痛時時咳嗽不能食桂心細辛鱉甲白术厚朴橘皮防葵吳茱茰附子乾薑各五分右搗篩蜜和為丸如梧桐子大每服十五丸酒下日二服加至二三十丸忌豬肉冷水桃李雀肉莧菜醋物生菜蔥等半夏湯出聖惠方主腹內左脅痃癖硬急氣滿不能食胸背痛者半夏前胡鱉甲各一兩人參桔梗枳殼吳茱茰各二兩生薑四兩檳榔子十四枚右切以水九升煮取二升七合去滓分三服如人行八九里久服一服忌豬羊肉莧菜一方用枳實無枳殼人參丸出聖惠方治痃癖氣不能食四肢少力人參二兩白术三分枳殼三分陳橘皮半兩桂心三分甘草半兩桔梗半兩乾薑三分右件藥搗篩為末鍊蜜和搗三二百杵丸如梧桐子大每服不計時候以溫酒下三十丸薑棗湯下亦得肉豆䓻散出聖濟總録治痃癖胃中寒癖不思飲食肉豆䓻枳殼各三分蕪荑吳茱茰各三兩髙良薑一兩木香半兩生薑一斤右為散小麥麵裹之以煻灰火煨令麵黃熟去麵取散每服三錢空心服用冷生薑水調下午後再服又方陳橘皮三分附子三分乾薑三分防葵三分吳茱茰三分鱉甲一兩木香三分右件藥搗羅為末鍊蜜和搗三二百杵丸如梧桐子大每服不計時候以生薑棗湯下三十丸檳榔丸出聖惠方治痃癖氣發即兩脅急滿四肢煩悶不能食宜服檳榔一兩枳殼三分桔梗三分人參三分白术半兩桂心半兩柴胡一兩陳橘皮三分川大黃一兩芎藭半兩草豆蔲一兩右件藥搗羅為末鍊蜜和搗三二百杵丸如梧桐子大每服不計時候以溫酒下三十丸桔梗丸療冷痃癖氣發急引膀胱痛氣滿不消食桔梗枳實鱉甲人參當歸白术各四分甘草五分右搗篩蜜和為丸如梧桐子大每服十丸酒下日再服稍加至二十丸忌蔥蒜豬肉莧菜海藻菘菜桃李雀肉等鱉甲散出聖濟總録治腹內痃癖積聚心胸刺痛面無顔色鱉甲去裙襴附子炮製木香白术京三稜煨銼檳榔各三分大黃微炒桂去粗皮髙良薑炒芎藭各半兩右為散每服二錢空心溫酒調服黑神丸出聖濟總録治痃癖不能食心脅刺痛發作有時并膀胱小腸冷滯漆六兩半生用重湯煮半日令香陳麴蘹香子各四兩木香銼細椒紅丁香各二兩檳榔四枚銼右六味搗羅為末用漆和丸彈子大取蘹香子末十二兩鋪蓋隂乾并蘹香收器中養藥及乾乃去蘹香瓷合盛若腎餘氣小腸膀胱痃癖七疝下墜五隔血腸産後諸血漏下赤白並一丸分四服死胎一丸用綿灰酒下難産炒葵子四十枚搗碎酒煎濃汁化下一丸諸疾不過三服人參丸主痃癖氣不能食人參八分白术枳實桂心各六兩橘皮四分甘草桔梗各五分右搗篩蜜和丸如梧桐子大每服十五丸酒下日二服加至二三十丸禁生冷豬肉生蔥桃李雀肉海藻菘菜木香散出聖濟總録治痃癖積聚氣不能飲食及五隔及婦人血氣木香一分蓬莪荗六兩京三稜炮銼益智去皮各二兩陳橘皮四兩甘草三兩右為散每服二錢以食鹽點湯調服不計時候白术湯出聖濟總録治痃癖疼痛不能飲食白术木香益智各一兩京三稜三兩檳榔銼一兩半右粗搗篩每服三錢以水一盞煎至七分去滓不計時候稍熱服京三稜丸出聖濟總録治痃癖急痛不能飲食京三稜五兩搗末以好醋一碗同熬成膏蓬莪荗炮銼益智去皮青橘皮去白各一兩冬用檳榔夏用木香皆一兩半右四味搗羅為末以京三稜膏和丸菉豆大每服二十丸加至三十丸生薑湯下食後服京三稜散出聖惠方治痃癖氣每發痛不能食京三稜三兩微煨銼益智子一兩去皮吳白术一兩木香一兩右件藥搗粗羅為散每服三錢以水一中盞煎至五分去滓不計時候稍熱服普濟方卷一百七十五
