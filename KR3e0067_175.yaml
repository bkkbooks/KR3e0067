body:
  text: 普濟方卷一百七十五明周王朱橚撰積聚門寒癖附論寒癖者有癖積在左脅下遇寒即痛是也此由飲冷過度停積不消能使氣道升降胃臟和調則飲食消化陳寒癖積亦自去矣寒癖之為病是飲水停積脅下痃強是也因遇寒即痛所以謂之寒癖脈弦而大者寒癖也方白术丸出聖濟總録治冷癖氣因服熱藥發熱心驚虛悸下冷上熱頭風嘔逆白术陳橘皮各半兩白芷三分防風芎藭吳茱茰山芋厚朴桂去粗皮大麥蘖乾薑防葵甘草茯神人參各一兩右為末鍊蜜和丸如梧子大每日空心溫酒下二十丸白术丸出聖濟總録治久寒宿癖心腹刺痛痰逆嘔吐飲食不消不利羸瘦白术吳茱茰各一兩桔梗當歸赤茯苓各一兩乾薑二兩桂去粗皮附子細辛生地黃椒甘草各一兩右為末鍊蜜和丸如梧桐子大每服空心溫酒下二十丸桔梗丸出聖惠方治寒癖氣發即脅下痛引膀胱裏急氣滿不下食桔梗一兩枳殼二兩人參一兩鱉甲一兩吳茱茰當歸一兩桂心三分白术一兩大麥蘖一兩半乾薑一兩青橘皮一兩川大黃二兩右件為末鍊蜜和搗三二百杵丸如梧桐子大每服以溫酒下二十丸日三四服千金丸出聖濟總録治寒癖宿滯食飲不消丹參半兩乾薑二兩附子人參戎鹽各半兩半夏一錢半大黃二兩苦參桂去粗皮各半兩石膏二兩巴豆三十枚右為末再同研勻鍊蜜和丸如小豆大每食後溫酒下三丸葫蘆巴豆丸出聖濟總録治寒癖留滯不消葫蘆巴補骨脂各一錢木香蘹香子各一分楝實半兩硇砂研一錢銅緑一錢五靈脂膩粉研各一分草烏頭半兩巴豆二錢右搗研為末用薑蔥汁和丸如豌豆大看虛實炒鹽酒下三五丸空心服白术丸出聖惠方治寒癖氣腹脹不思飲食四肢少力白术一兩甘草半兩厚朴一兩訶梨勒一兩陳橘皮一兩芎藭一兩桂心三分大麥蘖一兩乾薑三分人參三分右件為末鍊蜜和搗三二百杵丸如梧桐子大每服生薑棗湯下三十丸日三四服大沈香煨薑丸出聖濟總録治寒癖積氣疼痛下痢沈香一兩半硇砂木香各半兩附子一枚黑三稜雞爪三稜京三稜青橘皮各半兩右搗研為末酒煮麵糊和丸如小櫻桃大每服用水薑一塊剜作甕子入藥一丸以濕紙褁煨令香熟安地上出去火毒少時細嚼鹽湯下吳茱茰丸出聖惠方治久寒癖積胸脅痞滿心腹堅硬短氣嘔逆手足厥冷腰背引痛吳茱萸一兩附子半兩厚朴白礬人參半夏枳實乾薑炮桂心各三分右為末鍊蜜和丸如梧桐子大每服二十丸空心溫酒下一方有甘草無白礬木香丸出聖濟總録治寒冷癖積虛中積滯及下痢心腹疼痛木香硇砂各半分附子髙良薑胡椒各一分硫黃半分巴豆二十八粒右為末再同研勻用粟米飯和丸如菉豆大每服五丸煎乾柿湯下臨卧服枳實湯出聖濟總録治寒癖飲食不化下虛滿如水狀枳實白术各一兩半夏前胡各二兩桂去粗皮半兩甘草一兩赤茯苓二兩右粗搗篩每服五錢以水一盞半生薑一小塊拍碎同煎至八分去滓溫服空心日午臨卧各一服烏頭丸出聖惠方治寒癖氣結澀不通繞臍切痛宜服川烏頭三分甘草半兩甜葶藶三分川大黃三分芎藭半兩赤芍藥半兩桂心半兩右件藥搗羅為末鍊蜜和搗三二百杵丸如梧桐子大每服不計時候以溫酒下三十丸露宿丸治大寒冷積聚方原本闕方丁香丸出聖濟總録治寒癖積塊丁香沈香附子硇砂各半兩陳橘末三兩右除硇砂陳橘外搗羅為末用木瓜一枚大者破開去穰入硇砂於木瓜內甑上蒸爛次入諸藥末都研看軟硬次入陳橘末為丸如梧桐子大每服五丸茶湯下或酒嚼下如要疏轉可服十丸小兒一丸巴豆丸出肘後方治寒癖積聚巴豆三十枚杏仁五十枚桔梗皂莢藜蘆各二兩右件搗羅為末拌勻鍊蜜和丸如梧桐子大每服食前米飲下一丸日三次欲利者服二丸療腹中冷癖水榖隂結心下停痰兩脅痞滿按之鳴轉逆害飲食方大黃三兩甘草二兩蜜一升棗二十七枚右切以水三升先煮三物取一升七合去滓內蜜再上火煎令煬分再服忌海藻菘菜祕皂莢丸出聖濟總録治寒癖虛冷久積成塊進食化痰解風祕皂莢去黑皮肉蓯蓉酒浸白芷附子各一兩右為末鍊蜜和丸如梧桐子大每服二十丸溫酒熟水任下空心食前服如關膈不利者服此便通快療腹中冷癖水榖隂結心下停冷兩脅痞滿按之鳴轉逆害飲食方大蟾腹中物芒硝一升五合右以水七升煮取六升一時頓服一升若未下更服一升中人七合羸小五合得下者止後好將養之出肘後方治寒癖宿食久飲不消大便祕右用巴豆仁一升清酒五升煮三日三夜研令大熟合酒微火煎成膏丸如豌豆大每服一丸水下欲吐者服二丸治久寒癖積胸脅痞悶心腹堅硬短氣嘔逆手足厥冷腰背引痛右用茱萸八兩消石一斤以酒五升合煮取四升先服一升不痛者止勿再服之下病後好將養之出肘後方又方出肘後方右以大黃八兩葶藶四兩芒硝四兩熬令汁盡熟搗蜜和丸如梧桐子大食後三丸稍增五丸又方出肘後方右用貝母二兩桔梗二兩礬石一兩巴豆一兩去皮心生用搗千杵蜜和丸如梧子大一服二丸病後少少減服又方出肘後方右用茯苓一兩茱萸三兩搗蜜和丸如梧子大服五丸日三服掌中春治肚腹癖積手足厥冷筋骨疼痛尉之自愈針砂三兩硇砂三兩白礬六錢右為細末研勻以砂銚盛酒醋炒熱紙裹再以手帕裹煨冷痛處如極熱略住再尉直至藥無力覺冷方住溫胃丸出聖濟總録治冷癖醋心嘔逆宿食不消中酒後腸臟雷鳴時發腹痛一切虛冷等吳茱茰陳麴陳橘皮白术人參桂去粗皮熟地黃甘草各一兩右為末鍊蜜和丸如梧子大空心米飲下十丸酒癖附論胃弱之人因飲食過多酒性熱使渴而引飲遇氣道否澀酒與飲俱不化停在脅肋結聚成癖其狀按之有形或按之有聲脅下弦急脹滿或致痛悶肌瘦不能食但因酒得之曰酒癖夫酒癖者由飲酒多食魚膾之類腹內痞滿因而成渴又飲水氣與食結聚兼遇寒氣相加所以成癖氣停積成於脾胃脾胃得癖氣不消化故令宿食不消腹內脹滿噫氣酸臭所以謂之酒癖宿食不消也方木香丸出瑞竹堂方治酒食過傷停飲消積寬膈快脾丁香乳香木香麝香安息香沈香各錢半藿香二錢半青橘皮陳皮檳榔訶子皮京三稜蓬莪荗肉豆蔻各一兩桂一兩半細墨半兩豬牙皂莢一兩巴豆七錢右味用陳米四兩與皂莢墨巴豆一處炒令米黃用重紙裹候冷同前藥碾為細末白麵糊為丸如黃米殼大每服五七丸至十丸食後薑湯送下如利服一十五丸利三二行勿多服數大枳殼丸治一切酒食所傷胸膈痞悶脅肋脹滿腹中疼痛飲食不消痰逆嘔吐噫醋吞酸飲食遲化並宜服此百種丸治調順三焦理治痞氣去積聚酒癖癥瘕青皮陳皮神麴蘿蔔子荆三稜蓬莪茂麥蘖各二兩益智仁雷丸各一兩枳實四兩牽牛三兩右為細末水麵糊丸如梧桐子大每服十五丸食後生薑陳皮湯送下鱉甲大黃丸出聖濟總録治宿食酒癖鱉甲大黃吳茱茰各二兩硇砂半兩陳橘皮白术木香肉豆䓻枳殼京三稜各一兩右十味搗羅後六味為末將前鱉甲煎搜和丸如梧桐子大每服二十丸酒飲任下空心服加至三十丸半夏散出聖惠方治酒癖宿食不消胸心脹滿嘔逆不納飲食小便赤黃半夏前胡各二兩白术一兩甘草三錢茵陳枳殼赤茯苓各一兩黃芩兩半當歸三錢右件藥為散每服三錢以水一中盞生薑半分煎至六分去滓不計時溫服大黃桃仁丸出聖惠方治酒癖痰多脅脹氣喘上奔不下飲食大黃桃仁芎藭陳橘皮蜀椒各一兩髙良薑乾薑小草各三分右為細末鍊蜜和搗三百杵丸如梧桐子大每服三十丸粥飲下日三服水銀煎治酒癖食塊痰積及血氣血刺血塊隂陽二毒水銀鉛各半兩膩粉半兩硇砂蓬砂各一兩礞石一分巴豆二粒右除膩粉外合研勻用大棗八枚去核以水調膩粉分填於棗內以濕紙五重逐枚裹之灰火內煨熟去紙并棗皮將棗肉與前藥同研勻每服皂子大一丸安舌上勿嚼用薑棗湯吞下取下積滯效紫金丸出聖濟總録治酒癖食積逐痛氣代赭石末硇砂巴豆霜各一兩木香末丹砂末各二錢七分膩粉礞石各三分右合研勻細以燒粟米飯為丸如小豆大每服二丸冷橘皮湯下雄松散治酒積疸虛勞危困雄黃甘草甘松木香大黃各二錢丁香十枚巴豆十二枚右為細末每服半錢清茶調下至一錢臨卧時服微利米粥理之吳茱茰丸治酒癖久積飲食不消面色萎黃四肢無力宜服吳茱茰三分川大黃三兩小草一兩白术一兩赤茯苓一兩桃仁一兩柴胡一兩右件藥為末鍊蜜和搗三二百杵丸如梧桐子大每服粥飲下三十丸日三服乾薑丸治酒痃癖水不消兩脅脹滿時作嘔吐腹中如水乾薑一兩枳殼一兩陳橘皮三錢葛根一兩白术一兩甘草兩半右為細末鍊蜜和搗三二百杵丸如梧桐子大每服三十丸粥飲下日二服三稜散治酒食所傷脾胃胸膈不快腹腳脹滿嘔吐酸水翻胃脾疼及食積氣塊攻刺腹脅不思飲食日漸羸瘦又治年髙氣弱三焦痞塞常覺妨悶並宜服之蓬莪术益智仁京三稜青皮各二兩白茯苓四兩甘草一兩右為細末每服二錢用水一大盞棗一枚擘破鹽少許同煎至半盞溫服不拘時候常服寬胸利膈消酒食和胃一方為末每服一錢少鹽煎吞感應丸治傷食泄瀉候酸臭出盡即脹止金黃丸治酒積食積諸積面黃疸積硬塊京三稜香附子各半兩澤㵼二錢半巴豆四十九粒黍米粉牽牛各二錢半右為末用梔子煎湯和丸如菉豆大每服三丸至五丸如心痛艾醋湯下七丸海藻丸治酒癖因酒後飲水停留於胸膈之間及兩脅下痛短氣而渴冝服海藻一兩漢防己一兩甘遂半兩吳茱茰一兩川椒一兩甜葶藶一兩芫花一兩右件藥為末鍊蜜和搗三二百杵丸如梧桐子大每服以溫酒下七丸日三服治酒癖食不消化胡椒半兩乾薑半兩馬芹子半兩髙良薑半兩麥蘖半兩陳橘皮一兩右件藥為散每服一錢用􅏬一具薤白七莖細切以熱酒一中盞沃之空心喫盡羅漢丸治一切酒食所傷化痰涎行滯氣消痞痛方見夲門消痰飲丸治酒癖飲酒停痰水食不消化嘔逆不欲聞食氣腹中水聲宜服乾薑一兩赤茯苓一兩半白术四兩枳殼一兩半半夏一兩右件藥為末鍊蜜和搗三二百杵丸如梧桐子大每服以粥飲下三十丸日三四服四神散治酒毒發四肢黃腫積聚成塊行風順氣甜葶藶一兩海藻一兩吳茱茰一兩陳橘皮一兩湯浸右為末每服一錢以水一盞生薑半分棗一枚擘破同煎至六分和滓溫服至妙通神丸治酒癖乾薑知母烏頭各一兩巴豆半兩右搗羅前三味為末入巴豆同研勻以酒煮麵糊丸如菉豆大每服七丸加至十丸臨卧生薑湯下酒癥丸善療男子婦人一切酒食所傷日久成積心腹脹悶不思飲食四肢無力時發寒熱痰涎咳嗽兩脅刺痛頭旋惡心嘔逆不止及酒積停於胃間遇飲即吐久而成癖及肚裏疼每服兩丸食後細嚼燒生薑溫酒送下傷食食後溫水下心氣痛醋湯下不思飲食臨冷水送下量虛實加減丸數常服食後一丸茶酒任下有孕婦人不可服寒食麵半兩神麴三兩雄黃三錢巴豆五十粒右為細末滴水丸如梧桐子大窨乾用穀粳同藥丸一處炒令粳焦為度每服二三丸茶酒任下不拘時候一方有全蝎無神麴丸法同上宜用溫酒在食前服治中酒不醒兼有酒食傷出本草巴豆一粒烏梅二箇丁香三粒胡椒五粒右為細末入飯同杵三二千下為丸如梧子大每服五丸或七丸細嚼生丁香湯下小兒服一丸聖紅丸治酒食過傷心腹疼痛痞悶不消巴豆二十五粒杏仁七十五枚鉛丹一兩半白麵四兩右件先將二味研勻次下丹麵研勻滴水為丸如大豆大每服