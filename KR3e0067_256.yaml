法出本草按何首烏赤者雄白者雌採時乘濕以布帛拭去土淨後用苦竹刀切米泔浸一宿暴乾忌鐡以木臼杵碎搗末酒服一云春採根秋採花九蒸九暴乃可服之何首烏傳云何首烏者順州南河縣人祖名能嗣其父名延秀能嗣長慕道術隨師在山因醉夜卧山野中忽見有藤二株相去三尺餘相交久而方解了乃又交驚訝其異至旦遂掘其根歸問諸人無識者其後有山老忽來示之答曰子既無嗣其藤乃異此物恐是神仙之藥何不服之遂杵為末空心酒服一二錢服數月似強因此常服又加二錢服之經年舊有疾皆痊髮烏容少數年之內即有子名延秀秀名首烏首烏之名因此而得生數子年一百餘嵗髮墨黑有李安期與首烏鄉里親善竊得方服其夀至長因遂敘其事何首烏味甘生溫無毒茯苓為使治五痔及腰膝之病冷氣心痛積年勞瘦痰癖風虛敗劣能長筋力益精髓壯氣駐顔黑髮延年婦人惡血痿黃及産後諸疾赤白帶下毒氣入腹久痢不止其功用不可具述一名野苖二名交藤三名夜合四名地精其五名首烏本出處州江南諸道皆有之苖葉皆有光澤有如桃李葉雄苖赤根逺不過三尺春秋日可採可晾乾去皮為末酒下最良有疾即用茯苓湯和下為使者常杵末新瓷器盛服之忌豬肉血無鱗諸魚觸藥無力此藥形大如拳連珠其中有形鳥獸與山嶽之狀足珍也掘得去皮生喫得味甘甜休良其讃曰神效助道著在仙書雌雄相交夜合晝踈服之去殼日居月諸返老還少變安病軀有緣者遇傳之勿泄最善自如明州刺史李逺傳録經驗何首烏之所出順州南河縣韶州潮州思州賀州廣州及四會縣潘州已上出處為上雍州晉興縣桂州康州及春州勤州髙州循州已上所出次之其仙草至五十年者如拳大號山奴服之一年髭鬚青黑至一百年如碗大號山哥服之一年顔色紅恱至一百五十年如盆大號山伯服之一年齒落重生二百年如一斗栲栳大號山翁服之一年顔如童子及奔馬至三百年如三斗栲栳大號山精服之一年延齡純陽之本體久服成地仙又李因著方録云春末夏中與初秋三時候晴明日兼雌雄採之烈日暴乾散服以酒下良採時盡其根乘潤以布帛拭去泥土勿損其皮密器貯之每月再暴凡服偶日二四六日是服之訖以衣覆汗出導引尤忌豬羊血治百病煆製雲母粉法右以雲母一斤拆開揉碎入一大瓶內築實上浮至水銀一兩封固以十斤炭火煆通赤取出却拌香蔥及紫引翹草二件合搗如泥後以夾絹袋盛於大水磁盆內搖取粉餘滓未盡再添草藥重搗如前法取出粉沉水乾以小木盆一面於灰上印一淺坑鋪紙平傾粉在內直候乾移入火焙之取出細研以麵糊為丸如桐子大遇有病者服之無不效知成都府辛諫議公曽忠患大風衆醫不效遇此道士進得此方治服之有神驗服稀簽法稀音喜蘞音杴稀蘞草俗名火扻草端午日採者固焦六七八月多多採下終不若九月採者其子稈花實氣足尤妙相去其根五寸留葉先以冷熟水淨洗過曝用少酒灑之上甑蒸飯久取曝乾九蒸九曝除其燥性晒乾以皮紙袋盛挂當風處用時碾為細末煉蜜加搗千杵合為丸如桐子每日早食前服五十丸漸加至一百餘丸服了以三兩匙飯壓之只忌白馬肉餘無所忌逮服一兩月後所患或發動是藥搜攪切勿畏之以其能補虛損培元氣最有功一名火輪丹勝於服椒术及何首烏之效服之覺燥即減丸數時以生蜜入生薑煎沸湯點服或水調亦得此草處處有之春生苗其葉似芥菜而狹長莖髙三二尺秋初有花秋莫乃結實苖色赤稈色紫者為上青色者次之須要辨晰認節葉相對其根白枝幹方稜花小而黃向上開其葉青下有金絲絞者乃稀蘞也其根白枝幹圓花色黃而向下開如枃狀葉色深緑者下無金絲絞節與葉不相對者乃鶴蝨也但稀蘞髙於鶴蝨其枝葉形亦略似蒼耳牛膝不可不細辨也諸般風氣痢疾桑株上木耳湯下冷氣痢冷風乾薑湯下軟痺風頑麻風白殭蠶湯下諸風勞氣溫酒或淡鹽湯下奔豚氣膈氣腎餘氣乳香湯下筋骨風邪炒皂莢子湯下血風氣藝臺子湯下久患血痢疾荆芥湯下痾蛔蟲飯飲下一切風疾以人參湯下寸白蟲空心先喫牛肉脯後用飯飲下江陵府節度使成訥進稀蘞丸奏狀載在本草臣有母弟訮年三十一中風床枕五年百醫不差後遇道人鍾針者因覩此患曰可餌稀蘞丸必愈其藥每多生沃壤髙三尺許節葉相對其葉當夏五月以來採收每去地五寸剪刈以溫水洗泥土摘其葉及其枝頭凡九蒸九曝不必太燥但取蒸為度仍熬搗以為末丸如桐子大空心溫酒或米飲下二三十丸漸服至二千丸所患忽加不得憂慮是藥攻之力服之至四千丸必得復故五千丸當復丁壯臣依法修合與弟訮服果如其言鍾針又言此藥與本草所述之功效相異蓋出處盛在江東彼土人呼豬為稀又呼臭為蘞緣此藥如豬臭氣故以為名但經蒸曝其臭氣自泯每常服後須喫飯三五匙壓之五月五日收採者佳張忠定公詠進火杴草方表載在本草及類苑臣聞餐食飲水可作充腸之饌餌松食柏亦成救病之方是以療飢者不假于珍羞愈病者何煩于異術既獲濟時之藥敢陳彼物之形不止管窺輒干天聽臣中謝臣謂四時推運負隂陽者必有可觀萬彚發生吐風土者寧無所益俱承帝力咸荷天休或叨摘採之知願試苦辛之效伏惟陛下慈深憫物道切憂民行百王久墜之文納羣后可言之事以至恩沾兆庶信及豚魚風雨順而災沴不生天地和而黎元盡太宸𠂻不倦聖意難窮臣因聽政之餘備閲古方之祕盡醫民瘼遍討物情唐太宗輕剪龍鬚為思一將宋髙祖碎舂琥珀止慰三軍又焉能病吾皇廣添厯代之寶書甄别三王之所澤咸蘇萬有溥活羣生覆冒久照之方明幽罔間華夏升平之俗造次奚論臣遭逄盛時歌謡景運皇風建極聖慮猶勞不忍緘言常思報國既服唐虞之教尚抒葵藿之忱渺渺羣㳅已遂朝宗之望茫茫列曜更投拱極之誠是以不度僭踰輒形間翰事稍同於葑菲理竊近於芻蕘臣所奏聞者因換當州龍興觀元始天尊玉皇大帝殿基得一小名石彈子內説修養氣術并草藥方二件臣依方差人訪問採覔其草頗有異形金稜銀桿素根紫葉對莭而生蜀號為火杴草莖葉頗同蒼耳不費登髙厯險每常求少獲多急採非難廣收甚易儻厯久服旋見神功誰知至賤之中乃有殊常之效微臣自喫至百服耳目輕明即至千朝髭鬚烏黑筋力頗健效驗多端臣本州右都押衙羅守一曽因中風墜馬失音不語臣與十服其病立愈又大慈寺中知院僧同副正明教大師知嚴年乖七十忽患偏風行履妨廢臣與十服旬日並瘳有玉局化主道士皇甫因上元日與合城奏醮中客眼斜時時吐曝臣與十服立便得差今輒修合一百劑謹差奔番員史元龜奉表奏進臣無任瞻望聖恩激切之至謹奏右藥雖載方册人多易之蓋未知其驗也嵗在壬戌僕見在軍統領官鞏材老而色潤鬚髮如漆飲啖倍人問其年若何答曰六十九再詢何以至是乃云自四十九嵗服火杴每空心溫酒或鹽湯下百五十丸間有疾服他藥甫數日則鬚髮差黃再服是藥數日其黑如初坐間有前武興蔡戎幹晉卿云其先節使亦服此藥三十餘年晚嵗康強步履輕快享年八十一微二子幾失之此方惜乎僕老矣服之苦無近效有客勉僕試即修製服餌何傷也每日早晚共服二百丸治七萬丸服方覺得力當盡此生而不輟則本草所載二公之奏近日二子之言豈欺我哉然不可不書以告人俾知盛年信而服之必收晚年之竒效也服鹽方出肘後方療暴得熱病頭痛目眩并卒心腹痛及欲霍亂痰飲宿食及氣滿喘息久下赤白及積聚吐逆之氣少力顔色痿黃瘴瘧諸風服法如後右取上好鹽先以大豆許口中含勿咽須臾水當滿於口水近齒更用方寸匙抄鹽內口中與水一時咽下不爾或令消盡喉若久病長服者至二三月每旦起先服或吐或安急卒病可服三方寸匙取即吐利如不吐利更加服新患瘧者服即差心腹痛及滿得即吐下亦佳久病每以心中熱為患三五日一服佳任加服取吐利利不損人久服大補豚腎氣五石無有不差之病但憫人不服服不能久取此為瘧方無不瘥又云卒心痛鬼氣宿食不消霍亂氣滿中毒咸煎作湯服一二升後便吐之良治貓鬼野道病歌哭不自由方右以五月五日自死赤蛇燒作灰研令細平旦時用井華水調服一錢一方用臘月死貓兒頭燒灰水調服一錢又方右用臘月豬脂小兒頭髮灰相和熱酒調下一錢致鼠出本草右以蟹用黑犬血灌三日燒之諸鼠畢至又和敗漆火燒之亦至治身有赤疵出本草右常以銀揩令熱久漸漸消治百病長生神仙方出本草右以百草花煮汁釀酒服之異類云鳯剛者漁洋人也每常採百花水漬付泥埋之百日煎為丸卒死者取內口中即活治一切病出本草右以訶梨勒長五寸者帶之昔髙仙芝於大食得訶梨勒其長五寸初置抹肚中便覺服中痛因大利十餘行初以為訶梨勒為祟殆欲棄之後問大食長老乃云此物人帶之一切病消利者出惡物耳仙芝甚為寶貴天寶末被誅遂失所在治五野雞病出本草右以蝦煮食之治百病出本草右以胡麻蒸為末白蜜為丸服之去百疾長生通神出本草右以十月上已日採槐子隨湯使服之槐者虛星之精也治野雞病出本草右以杏仁一兩去皮尖雙仁捶碎水三升研濾取汁液於鐺中煎以杓攪轉在手候三分減二冷呷之不及熟及熟呷之即令人吐治斷酒出本草右取鸕鷀糞灰水服方寸匙一名蜀水花治百病出本草令人身輕右以桃膠角桑灰漬之服百病愈常服令人身輕有若光明在晦夜之地治患人耽睡出本草右搗花榖葉服驗治男子患未可及新差後合隂陽垂至死出本草右取白馬糞五升絞取汁好器中盛停一宿一服三合許日三夜二服醒睡出本草右以酸棗噉之治吃出本草右取鴝鵒炙食之小兒吃者不過一枚差也令人通夜不睡出本草右以瓜蘆木葉作屑煮汁服之一名臯蘆治惡疾目昏不辨人物眉髮自落鼻梁崩倒肌膚有瘡如癬咸應神仙傳出本草右用皂角刺一二斤為灰蒸久晒研為末食時濃煎川大黃湯調一錢零服昔崔言者職𨽻左親騎軍一旦忽得疾雙眼昏咫尺不辨人物眉髮自落鼻梁亦崩倒肌膚有瘡如癬皆為惡疾勢不可救因為洋州觀察歸至駱谷遇一道流自谷中出不言名姓授此一方服一旬日鬢髮再生肌膚悅潤眼愈倍常明傳以此方後却入谷不知所之治諸吃噫出本草右用橘皮二兩湯浸去瓤銼以水一升煎至五合許乘熱更加枳殼一兩去瓤炒同煎之服效麝香散出衛生家寶治運血不歸肝或吐逆或便血服之大安心胃并治傷寒吐及小兒吐此方纍試皆效人參白茯苓芎藭各半兩麝香一錢研藿香葉一分薰陸香二錢辰砂一分丁香一分新者不可見火右為末每服一錢薄荷棗子湯下小兒半錢薄荷蜜湯調下療男子婦人小兒大腹黑血如濃茶色或膿血如淀色若蟲痢者服此又能殺五臟蟲出本草右取側柏葉焙乾為末與川黃連同煎為汁服之大有殊效杏酥法能去風虛除百病出本草右搗杏仁一石以好酒二石研濾取汁一石五斗入好白蜜一斗五升攪勻封於新甕中勿泄氣三十日後看酒上酥出即內瓷器中貯之取其酒滓團如梨顆大置空屋中作格安之候成胎脯狀旦服一枚以前酒和下其酒任性飲之治稷米飯與瓠子同食令冷病發出本草右用黍釅汁飲之即瘥潤肌肉通血脈出本草右服胡桃初日一顆五日加一顆至二十顆止常服之令人骨肉細膩光潤治面目煙悶四肢不健通十三經脈洗五臟惡氣出本草右以惡食作菜常食之令人身輕治人健行出本草右用胡麻油傅兩足繒帛裹之可日行萬里辟痁出本草右以仙人杖煎水服之除寒熱不通之氣出本草右用通草煮汁釀酒妙取汗方出本草右以大甑中蒸土一兩石熱坐卧其上取處熱徹汗出遍身仍隨疾服藥和鼠壤用亦得治一切血氣及一切冷疾去百病久服延年變白不老出本草右取扶芳藤一名漫藤以莖葉細銼煎性冷以酒浸透服昔隋朝稠禪師作青飲進焬帝以止渴又云藤之苖小時如絡石薛荔夤緣樹上三五十年漸大其枝葉繁茂採取無時治霍亂腹中不安消榖理胃氣溫中除邪痺毒氣右五月五日採小蒜曝乾葉主心煩痛解諸毒小兒之丹軫不可久食損人心力黃帝云食小蒜噉生魚則令人奪氣隂核腫求死三月勿食小蒜傷人志性令人通夜不寐右用馬頭骨作枕枕之鹽主殺鬼蟲氣下部慝瘡傷寒熱吐胸中痰癖上心腹卒痛堅肌骨黃帝云食甜瓜竟食鹽成霍亂又主大腸不通右取鹽和苦酒傅臍下乾易愈治一切病患右用預知子日服二七粒患者不過三千粒永差治百病無問傷寒中風􅠲嗽瘕積水腫瘡疥瘰瘧氣急月候不調祕澀氣痢等病右用葳靈仙一味洗浸焙乾為末用好酒和令微濕放入竹筒內牢塞口九蒸九曝如乾添酒重灑以白米飯和丸如桐子大每服二十丸至三十丸湯酒任吞下治百病右單採取菖蒲得緊小似魚鱗者擇一斤許以水及淘米泔浸各一宿又刮去皮切曝搗篩以糯米粥和調勻入蜜搜丸如桐子大稀葛袋盛置當風處令乾於每旦酒飲任下三十丸臨卧更服二十丸久得效治人夜卧讝語右用靈床土果子食之即差濟世丹斑貓一錢去頭翅全蝎一錢去足另研草烏一箇去皮雪膏一兩宿乾另研沉香屑一錢木香一錢巴豆一錢半去皮油蓬莪术二錢炮薑黃二錢丁香一錢粉霜一錢另研草果一錢荆三稜二錢炮磠砂一錢另研三奈子一錢肉豆蔲二錢檳榔二錢香附子二錢甘草二錢炙黃烏藥二錢雄黃一錢另研麝香一錢半另研用好者右二十二味為細末打醋麵糊丸如小桐子大硃砂為衣每服三丸五丸七丸九丸十一丸十三丸十五丸服者只用單數鹽湯送下溫水亦得不損真氣除疾根治百病凡傷心腹疼痛胸膈滿悶不思飲食及癓瘕食積氣塊並皆治之如諸病所傷隨所傷病作引子如酒傷酒下茶傷茶下麵傷麵湯下大小便不通溫水下九種心疼石菖蒲湯下泄㵼不止乾薑湯下赤痢甘草湯下白痢陳米湯下翻胃吐食人參湯下八般痃氣疝氣小茴湯下婦人經病艾醋湯下經閉不通紅花湯下或蘇木湯下小兒內傷滑腸夜起宿食不化生薑湯下婦人赤白帶下黃茋湯下牛馬肉所傷酒汁下上至八十下至童男女周嵗三嵗小兒結病在身此藥並皆治之和脾胃順三焦磨積順氣大有神效小兒常服米飲湯下春秋二時龍帶精入芹菜中人遇食之為病發時手青肚滿痛不可忍作蛟龍病方見諸毒門解毒類獨聖散砒不拘多少右為細末每服一字以新水調下幹開牙關嚾之尋常勿用普濟方卷二百五十六
