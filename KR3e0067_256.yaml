body:
  text: 普濟方卷二百五十六明周王朱橚撰雜治門雜病誠齊先生如神丸㯽榔枳殻皂莢大黄生熟牽牛生熟右各等分為末滳水為丸如梧桐子毎服十五丸病甚者一百丸量虚實老㓜服之孕婦不可服頭痛腦疼川芎薄荷湯下耳鳴腮腫荆芥煎湯下牙齒疼痛細辛煎湯下咽喉腫痛桔梗甘草煎湯下遍身癮疹瘙痒丹毒赤瘤升麻湯下心滿悶疼痛痰結枳實半夏湯下兩脇肋疼痛牽引背痛牡丹皮湯下癥癖積聚痃氣塊蓬术甘草湯下赤白痢裏急裏重小腹疼痛甘草湯下一百丸如裏急後重五十丸腸風痔漏肛門疼痛皂角子破煎湯下膀胱疝氣隂囊腫硬或数便茴香湯下腰脚膝疼牛膝湯下面頭手足浮腫脹滿桑白皮湯下上氣喘急日夜不得卧甜葶藶湯下胎死腹中包衣不下桂心麝香酒下打撲損傷瘀血在内腹脹疼紅花當歸湯下宿食不消嘔吐噎氣丁香湯下麵毒酒毒乾葛湯下大人小児諸般䖝積疼先食焼肉数塊次用苦棟根煎湯下婦人月水不通腹肚疼痛赤芍藥湯下奪命丹没藥半兩别研血竭二錢别研巴豆去皮不去油右前味别研入巴豆搗成丸如梧桐子大毎服一丸苦急心痛木香湯下氣食積陳皮湯下婦人月水不行紅花酒下婦人血瘕當歸酒下丁瘡橘皮水下凉水亦得癰疽腫毒連翹湯下便毒𤓰蔞湯下打撲傷損酒下青金丹治一切諸病川烏頭炮草烏頭炮巴豆去皮油乾姜炮右等分為末酢糊丸如桐子大青黛為衣毎服二丸若疳瘡黄連湯下一切膈氣木𤓰湯下口吐酸水生姜湯下諸風氣防風湯下疥癬姜湯下胸膈内痛杏仁湯下切淋瞿麥湯下大小便血大黄湯下陽毒傷寒麻黄湯下隂毒傷寒葱白湯下夜多小便呉茱茰湯下心熱脹金銀花下肺氣喘息紫蘇湯下胃氣不和鹽湯下溺血塊豉湯下舌上瘡栁枝湯下腸風發五靈脂湯下宿食不消米湯下咽喉痛薄荷湯下瘧疾桃心湯下省目夜明沙湯下暑氣井花水下眼疾米泔水下治癡白木錦花紅木綿花射香少許端午日馬齒菜右為末水調服之崔中丞煉鹽黑丸方食鹽一升搗末内粗磁瓶中實築泥頭固初以糠火焼漸漸加炭火勿令瓶破候徹鹽如水汁即去火其鹽冷即凝破瓶取䜴一升炒焦桃仁一兩和麵炒令熟巴豆二兩去心膜用紙令出油盡右須生熟得所恐熟過則力少生則損人其物製畢各自研搗成熟藥秤量蜜和丸如梧桐子大毎服三丸皆平旦時服天行時氣䜴汁及茶下並得服後多喫茶汁行藥力心痛酒下入口便止血痢飲下初變水痢後便止鬼瘧茶飲下骨蒸白蜜湯調下忌冷漿水合藥乆則丸稍加令大凡服藥後吐痢勿怪服藥一日忌口兩日吐痢若多則煎黄連汁服止之平旦服藥至小食時已來不吐利者或遇殺藥人即更服一兩丸投之其藥冬中合臘月尤佳磁盒子中盛貯以臘紙封之勿令泄氣清和崔能云合一劑可救百人天行時氣卒急諸藥不得又恐過時或在道塗或在村落無諸藥可但将此藥一刀圭即敵大黄朴硝数兩曽試有效冝行於閭里間及使軰若小児女子不可服多被攪百唐方又有藥鹽法出於張文仲唐之士大夫多作之麥門冬湯出㧞萃方治勞復起病人氣欲絶者用之有效麥門冬一兩甘草二兩炙粳米半合右将門冬去心為細末水二盞煎粳米令熟去米約湯一小盞半入藥五錢棗二枚去核新竹葉十五片同煎至一盞去滓大温服不能服者用綿滳口中候漸治小児不能灌注者冝用此綿滴法此方不用石膏以其三焦無大熱也兼自欲死之人陽氣将絶者故不用石膏若加人參大妙魚膽丸治一切病不問年深日近並皆治之却是小児驚風藥方為阮吉苦患眼日乆不差悮以小児驚風藥元㸃在内頓然閃開漸覺光明以此傳眼藥鷄爪黄四兩去毛龍膽草二兩苦參一兩半右水四碗浸一夕當歸一兩洗各入鍋内慢火熬至半碗約濃却濾去滓再入銀器内熬濃就火上入硼砂射腦盆砂各少許用好真者神仙追毒丹大黄芒硝牛蒡各一兩半右為細末煉宻為丸如弹子大用硃砂血竭為衣童子小便温酒下秘方元明粉出本草夫𤣥明妙也𤣥之又𤣥不可言也如何此藥不名丸散却言其粉能為人助顔色駐容隨物性粉乃白也水之性也能方能圓能曲能髙能下此藥上善若水也用火煉乃水火既濟也隂陽混合也為一號曰𤣥明也昔唐𤣥宗問近臣如何得延夀近臣聞華山有一真人姓趙當求其方於是𤣥宗遣使命宣真人至問真人夀命幾何答曰三百六十矣又問真人曰有何法術答曰常服𤣥明粉得其長命更治百病𤣥宗又問終南山劉真人夀多少答曰三百餘矣又曰何至於此答曰只服𤣥明粉得長生又且治百病益精氣不問男女俱可服之孕婦服之安胎定子産婦服之益氣自安令人恱澤開胃磨脾乆服身輕體健延年明目其功不可具述如要煆煉成藥用朴硝依後法製度朴硝五斤用沸湯炮成水定了于鍋釡内将文武火熬成膏子再将竹筒如火筒大擘開兩邉内净潔再将麻皮纒了将鍋内盛膏藥来堅収於竹筒内安定房内地上净䖏二三日出火毒取出竹筒用白炭煆煉一炊時取出藥響白黄色罷于地上出火毒如藥白色上等也黄色中等也黒色傷人終不可服之毎煆出一斤重加甘草細末二兩於食後服二錢任意加减至七日微利取出黄黑物来此是投病根也又云毎日空心服二錢用人參湯下常出黒糞甘草或薄荷湯下或如膿状不痛不倦服至半月漸覺顔色非常快飲食百病皆除右各用引治之法若中毒米湯下茶湯亦得春三月黄茋湯下夏三月附子湯下秋三月赤箭湯下冬三月茯苓湯下骨蒸赤箭子湯下半錢重一切氣腫木香豆蔲湯下飲食過度神麴湯下中生物膾酒下三錢胸膈茶清下天行病黄茋湯下熱病砂糖水下勞病茋湯下白痢茱茰湯下姜湯亦得赤痢甘草湯下虚熱米飲下腰背疼地黄湯下婦人死胎不出葵菜湯下痃辟病續斷湯下氣塊粉草湯下三十六種風荆芥湯下牙痛姜湯下心痛棗子湯下艾酢湯亦可四時傷寒麻黄湯下口瘡赤眼臟燥梔子湯下除手足風心氣舒展熱酒下一錢吐血水生麫下腹肚痛醋湯下産後血氣衝心疼當歸芍藥湯下癰腫諸瘡癬黄茋湯下二十四種冷病白湯下咳𠻳唾痰黄茋湯下瘧疾桃頭湯下採東南者七箇隂毒傷寒附子湯下陽毒傷寒葱白湯下頭旋荆芥湯下無辜瘡吐逆甘草湯下嘔吐不止木𤓰湯下筋轉霍亂木𤓰湯下腹中滿悶姜湯下兩脇脹痛酒調下下原虚冷五靈脂湯下小腸氣疼苦棟子湯下腎餘氣桃仁湯下大小便不通葱白湯下腸風瀉血蒲黄湯下白帶乾姜湯下赤帶甘草湯下紅豆湯下亦得五疳八痢米飲湯下五般膈氣陳米湯下腸風漏血槐花湯下五勞柴胡湯下酒毒酒下五臟反熱杏仁湯下邪氣入腹硃砂湯下瘡蜜水下食勞蠱氣麫湯下骨髓風痛防風湯下風狂麫湯下耳聾鵞管石羔湯下耳内蟬鳴茱茰湯下赤眼疼黄連湯下翳膜秦皮湯下羞明怕日木賊湯下喉痺磨刀水下鬼吹氣麝香湯下鬼魅鬼吹神砂湯下邪氣衝心頭髮焼灰湯下驚産草龍膽湯下脉息不定白豆蔲湯下婦人血氣疼當歸湯下脫肛龍骨湯下經脉不行地黄湯下小児癖塊丁香湯下小児夜啼桃仁湯下喉風飛礬焼湯下盗汗不止木𤓰湯下麻黄根亦可小児驚風薄荷湯下惡瘡入腹白芨湯下小児吐瀉葱白湯下小児腹脹木香湯下小児五疳黄痩不思飲食乳汁不多遍身風疹防風湯下傷積桔梗湯下骨風川牛膝湯下木𤓰湯亦可猪癎病硃砂藿香湯下中風胡桃湯下荆芥湯防風湯亦可丁瘡蜜水下婦人死胎蘿蔔子湯下上盛下虚熱酒下膀胱疝氣茴香湯下兩脇氣攻木香湯下肺氣桃仁湯下宿食不下白湯下上焦熱燥薄荷湯下氣病陳皮湯下腿脚轉筋井花水下水瀉黄茋湯下痰壅烏梅湯下清神湯胡椒二兩川芎半兩甘草一兩右為細末毎服一字用白沸湯調下杜蘅湯主吐百病杜蘅松蘿各三兩𤓰子三七枚右㕮咀以酒一升一合漬一宿去滓分二服若一服即吐止未吐者更服相去如行十里乆冷藥力盡服一升稀糜即定老小用之亦佳治趼方出神效方右以水調白麫稀稠得所糊趼上以紙封之明日便可乾如不曽破者剥去麫便行治人嗜卧喜睡出肘後方右用父䑕目一枚焼作屑魚様和注目皆得不眠兼並取兩目以紗作袋盛帶之治汗不溜痩却腰脚痛并耳聾出本草右以米醋浸荆三稜三四日冬浸六日杵為末醋調和下三錢半治好食生茶右用椒末不拘多少以水糊丸如桐子大茶下十丸服不拘時治雜病方右用枸把子最肥者一升搗破内絹袋置礶中以酒一斗浸乾蜜封勿泄氣三七日毎旦飲之任性勿醉治朝暮連夜不得眠出本草右以新布火炙以熨其目并蒸大豆便用囊盛枕之待枕冷後更易熱者終夜常枕熱豆即愈療人嗜眠喜睡出肘後方右以馬頭骨焼作灰末方寸匙日三夜一温茶湯調和服又方出肘後方右以麻黄木香各五分甘草三分日中南搗末一方寸匙許日三温茶調服治人適他方不服水土與病有異即其状也右用鞋底下土刮取末和水服之療諸疾病方按藥子一物婆羅門胡名般䜹樹子國人名藥子用此藥療病唯須細研勿令麄皆取其中仁去皮用之而今以藥子中仁二枚若卒得吐瀉霍亂蠱毒臍下覺絞痛赤痢心腹脹滿宿食不消蛇螫毒入腹被毒藥箭入腹以煖水二合研碎藥服之如疽瘡附骨疽痛腫丁瘡癰腫者量瘡大小以煖水碎和猪膽封上熱癤腫冷逰腫癬瘡用醋研封蛇惡毛蝎蜈蚣等及沙虱射工用暖水研赤莧和藥封之婦人産後腹中或絞痛及惡露不下痛中瘀血不散杯酒研藥候溫服之帶疾暴下以栗汁研藥温服之齲䖝食齒細削之内孔中立愈其擣末篩着瘡上甚生肌此出本草成方治野鷄病右用枳殻根皮為末毎服方寸匙米湯調下治脫陽證或因吐血大泄之後四肢逆冷元氣不接不醒人事或傷寒新瘥誤與婦人交其證小腹𦂳痛外腎搐縮面黒氣喘冷汗出亦是脫陽證須㬰不救可危先用葱白数莖炒令熱熨臍下用後藥附子一枚五錢許剉八片白术乾姜各半兩木香一分此藥不可限感證不同煆湯使服之一切風疾炒烏豆淬酒下卒中僵倒或醉酒不醒生姜湯研三五粒灌下小児驚風天瘹五種癎疾入京膩粉少許煎金銀薄荷茶下沉寒痼冷生姜湯下一切氣疾茴香湯下頭風暗荆芥湯下咳嗽痰涎半夏湯下肺氣攻衛杏仁湯下瘧疾烏梅湯下水瀉乾姜湯下痢疾甘草湯下脚疾濕氣木𤓰湯下酒傷食積陳皮湯下腸風胡桃湯下傷寒葱䜴湯下時行疫疾山嵐瘴氣不服水圡藁本湯下中毒甘草水研灌下牙痛夜卧含化牙宣噴竅中婦人血風血氣當歸酒下血臟虚冷赤白帶下血淋血暈焼稷櫚灰研細調酒下腰背疼痛渾身勞倦温酒下常服食後茶下此藥本訣傳神聖功效不可盡述孕婦不可服建中湯出易簡方治腹中切痛増損治療各各不同並見於後飲酒人不喜甘者不宜服之此藥與桂皮湯畧同不但加芍藥如官桂之数專治傷寒發熱自汗用桂皮湯以表之桂枝二兩芍藥一兩逺志半兩黄耆半兩右各研細用水二碗煎至八分去滓放冷灌服須㬰又進一服合滓併服如無前藥用桂皮二兩用好酒二升煎至一升候温分作二服灌之又無桂皮用葱連鬚三七莖細剉沙盆内研細用酒五升煮二升分作三服灌之陽氣即囬先用炒鹽熨臍下氣勿令氣冷又無葱白用生薑二七片亦好依前法砂香丸出和劑方治丈夫婦人時疾傷寒解五毒治潮熱積熱及小児驚癎百病等疾並皆治之辰砂飛研九兩巴豆三百一十五粒去皮心膜炒熟細研如麪油龍腦研牛黄研膩粉研麝香研各三分金箔九十片研右各研匀煉黄蠟六兩入沙蜜三分同煉令勻為丸每兩作三十丸解五