防風去叉芍藥蕤仁去皮麥門冬去心焙地骨皮決明子微炒甘草炙各二兩茯神去木三兩右搗篩每服三錢水一盞煎至五七分去滓食後臨卧溫服青葙子散出聖濟總録治胎赤爛日夜澀痛畏日怕風久醫不差青葙子一兩黃連去鬚鬱金梔子仁射干芎藭防風地骨皮各三分甘草一兩右為散每服一錢七分煎防風湯食後臨卧服日三次升麻散出聖惠方治眼胎赤風毒上攻腫痛川升麻一兩黃耆銼一兩犀角屑一兩萎蕤一兩半玄參一兩防風一兩去蘆頭甘草半兩炙黃連半兩杏仁半兩湯浸去皮尖雙仁麩炒微黃右粗搗為散每服三錢水一鍾煎至五分去滓入竹瀝半合更煎一兩沸食後溫服忌炙煿熱物魚肉點眼方出聖惠方治眼胎赤及生瘡怕見風日蜜半斤曽青一分馬牙硝一兩石膽半錢乳香一分𬎼仁一分湯浸去赤皮龍腦一錢麝香半錢右件藥同研如粉先將蜜傾磁瓶內便傾入藥末其瓶口用乾柳木楔子勘定上便以布油單裹口以麻繩緊繫安在鍋內鍋口上安一橫木懸藥瓶不令倒低自平明煮至日午取出候冷去布單楔子以新綿濾過用龍腦一錢細研內在瓶中如有患者以銅筯少少點在眼兩眥若有胞及周迥回赤爛以藥少許塗之神效蘆根飲子治胎風赤爛方見本門暴赤眼類黃連煎出聖惠方治胎赤有障膜睛不見物黃連一兩去鬚蕤仁二兩去赤皮地骨皮一兩青鹽一分古字錢十文曽青半兩細研蜜一斤右搗碎以蜜漬安新磁瓶中以重湯煮一伏時後以綿濾去滓其藥汁復內瓶子中著露地兩宿後每以銅筯取少許點目中日三五度硃砂煎出聖惠方治胎赤兼生翳膜疼痛硃砂一兩細研白蜜半斤黃丹一兩右相和勻入有油磁瓶內用柳木楔子緊塞瓶口又以生布一片油單兩重密裹瓶口勿令透氣便安瓶於大鼎內用一杖子橫著鼎口以繩子繫瓶口懸之用水常致瓶項以文武火煮如鼎內水耗旋添湯勿令冷水從寅煮至酉時住火取出以新綿濾過用白龍腦一錢研入以一新磁瓶盛之常令封之候三五日外用之用銅筯粘藥大如菉豆點之每一伏時祗得一度護睛丸出龍木治胎患內障木香大黃黃芩黑參各一兩射干細辛各半兩右為末煉蜜為丸如梧桐子大食前茶下五丸黃耆飲子出龍木治風赤爛外障黃耆二兩車前子細辛黃芩五味子各一兩防風一兩半右為末以水一盞每服一錢煎至五分去滓食後溫服麥門冬散出聖惠方治胎眼赤腫痛上焦壅熱麥門冬一兩去心犀角屑一兩旋復花川芒硝防風去蘆各一兩甘草半兩炙微赤右搗篩為散每服三錢水一鍾煎至六分去滓食後溫服杏仁膏出聖惠方治胎眼赤腫杏仁湯浸去皮尖用二分秦芄半兩細辛半兩白芷半兩黃柏三分當歸半兩右搗篩為散先以銀器中容豬脂五兩酥三兩入藥煎令藥色赤以綿濾過更煎時取藥於冷處滴如稠膏即離火更研入乳香半兩膩粉半兩急用槐木杖攪令勻入磁盒內盛三五日後取藥不計時候塗於赤處即差傅眼方出聖惠方治眼胎赤腫痛人中白一分郁李仁一分湯浸去皮研膩粉一分定粉一分龍腦一錢鹽緑半分右研細末於磁盒內盛之用蜜少許調勻先淨眼後傅藥少許一宿不得洗却藥夜傅之以差為度黃連丸出聖濟總録治胎赤眥爛黃連去鬚防風去乂各一兩龍腦大黃炒細辛各半兩去苗葉右為末煉蜜為丸如梧桐子大每服二十丸臨卧溫湯下梨汁煎出聖惠方治胎赤眼梨汁絞汁一盞古字銅錢二七文胡黃連二錢青鹽半兩龍腦一錢右先將古銅錢二七枚重重著青鹽隔一重錢放一重鹽疊之填錢孔中入火燒令通紅去灰塵投入前梨汁中浸一伏時去錢將汁煎三五沸以新綿濾入磁瓶內入胡黃連末浸七日去黃連滓內用龍腦末令勻以銅筯點少許在目眥頭洗眼方出聖惠方治眼胎赤及風赤秦皮一兩甘草一兩微炙細辛一兩黃芩一兩防風一兩去蘆右細銼和勻每用藥一兩水二大盞煎至一盞去滓溫服滓洗眼每日三度洗了避風銅青散出聖濟總録治胎赤風赤赤眼年月深遠銅青一錢膩粉一錢龍腦半錢乾地龍一條細研右研令如粉每用半小豆大點眥頭日一兩度蕤仁膏出龍木治眼風胎赤爛𬎼仁去皮半兩研石膽研末一錢膩粉半錢黃蠟半兩右研如粉後以蠟入油少許煎如面脂內藥三味攪成膏每日點兩眼上如小豆大烏梅煎點眼方出聖濟總録治脂赤及風赤烏梅七枚漿水一升青鹽半兩古字銅錢二七枚右先將烏梅入漿水內浸七日次將古錢每一重錢著一重青鹽疊錢重重填錢孔中令滿足將入火中燒赤紅取出去灰塵投入前烏梅漿水磁瓶中盛之用油紙封瓶頭掘地中埋三五日後取出以新綿濾去滓每次用銅筯點少許在目眥頭日三度龍腦膏出聖惠方治胎赤眼方見本門一切眼疾難治類點眼秦皮煎治胎赤兼暈疼痛不可忍秦皮去粗皮一兩黃連去鬚二兩升麻一兩右細銼以水一升煎取二合澄取一合半綿裹銅筯點入眼中日三兩度鉛丹膏點眼方出聖惠方不拘久近胎赤眼鉛丹四兩白蜜四兩杏仁二七枚湯浸去皮尖右先將杏仁研如膏次入鉛丹及蜜更研令極細用絹袋盛入磁瓶內盛之坐在湯中煮如人行三五里許為度去滓臨點時少許井花水於碗中蘸銅筯點少許在目眥頭點眼杏仁膏出聖濟總録治眼胎赤杏仁油半雞子殼許食鹽末一錢右用磁石器著鹽末並杏仁油相和柳枝一握緊束縳一頭研三日色黑又取熟艾如雞子大掘地作坑子置瓦於坑上安艾燒令通氣火盡即成更和令勻常蓋頭每以綿纒杖頭點少許在兩眥頭夜卧時點用甚效點眼胡粉膏出聖濟總録治久患胎赤眼胡粉一兩半蕤仁去皮一兩右先將蕤仁令研爛次下胡粉同研熟又將搗生麻子為燭然著别取豬肪脂於燭焰上燒使脂流下滴入𬎼仁胡粉中更同研令勻如餳以綿纒細杖子頭內藥中乘溫點兩眥頭藥須夜用如冷還放燭焰上暖點眼鹽緑膏出聖濟總録治胎赤痛鹽緑一兩一分蜜半斤右於蚌蛤殼內每於夜卧時於火上炙令暖點目眥頭點眼方出聖惠方治眼胎赤及風赤釅漿水一升青鹽三兩右用熟銅器內貯漿水投青鹽在內浸七日後即鹽緑出以物刮入漿水中數看之又七日外取其水點眼洗眼點鹽於眥中無根妙應膏出聖濟總録治赤眼睫睛赤爛昏暗用蝎虎黑者數枚用一木罐黃泥土安令實蝎虎在罐內不令損傷仍愛護其尾用紙蓋罐口於紙面上著筯引數眼子令出氣後有糞數粒不要糞上一頭黑者只要一頭白者用津唾研成膏塗在眼睫毛周回不得揩拭候來日早次溫漿水洗三次效療胎赤眼出千金方取槐木枝如馬鞭大長二尺作二假齊頭麻油一匙置銅鉢中旦使用童子一人以其木研之至暝令仰卧以塗眼眥日三度差治胎赤眼風赤久赤用銅鏭鑼一尺以下面者一枚石鹽末如杏仁許油脂半雞子許同和取柳枝如筯一握急束齊一頭用研油脂三日狀如墨取熟艾如卵大剜地作小坑子置几於上安艾著火合銅鏭鑼於上其下仍令通氣火盡即盛常蓋頭欲用將綿纒杖子頭點取藥著兩眥頭每夜著即卧蘇六方云頓用甚效點眼方出聖惠方治眼胎赤及風赤用馬牙硝半兩研用臘月豬膽二枚內硝入膽中浸之隂乾以少許龍腦同研點之立效獨聖還睛丸出聖惠方治眼胎赤兼生翳膜疼痛用苦葶藶半斤洗去塵土用木杵臼搗爛如餳糖取醋粟米飯內蒸用布巾中乾捩去水盡少少入臼中與藥同搗令可丸即丸如菉豆大每日早晚食後以溫水下十丸普濟方卷七十二
