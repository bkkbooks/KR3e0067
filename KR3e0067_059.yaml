body:
  text: 普濟方卷六十明周王朱橚撰咽喉門總論夫咽者應五臟六腑往還神氣隂陽通塞之道也喉嚨胞囊舌者並津液五味之氣本也咽門者肝膽之候也其重十兩廣二寸五分胃管長一尺六寸主通五臟六腑津液神氣應十二味若臟熱則咽門閉而氣塞若腑寒則咽門破而聲嘶母薑酒主之熱則通之寒則補之若寒熱調和病不生矣喉嚨者脾胃之候也重十二兩長一尺二寸廣二寸其層圍十二重應十二時主通利水榖之道往來神氣若臟熱喉則腫塞氣不通鳥翣膏止之若腑寒喉則耿耿如物常欲塞癢痺涎唾熱則開之寒則通之不熱不寒依臟調之咽者胃之系喉者肺氣之所通咽以咽物喉以候氣咽喉嚨三者各有所司咽者舌本之根因物之至推而納之以通胃所司者納而不出喉者候氣之呼吸以通肺所司者有出有入嚨者舌下二竅但閉口齒屈舌於上腭則津液滿以通心所司者有出無入風邪客於喉間氣鬱而熱則壅遏而為咽疼熱氣生於肺胃風毒藴隆則腫結而為喉痺尸咽者隂陽不和脾肺壅盛風熱毒氣不能宣通故令尸蟲發動上蝕於喉或疼如𧈟之候也榖賊者榖芒強澀藏於米而誤食之滯於咽門不能傳化故風熱併聚與血氣搏遂令腫刺如喉嗌之生榖賊也胃脘實熱燻炙上焦發為白頭赤根因有咽瘡之證臟腑停寒則氣縮如物窒礙其間亦有喉閉之證若懸癰生於上腭雖不關於咽喉所以暴腫者亦熱氣使然也咽喉懸癰關要所係病不急療皆能殺人凡咽喉病毒氣歸心胸前腫滿氣煩促下部洞泄不止者死候也一十八種喉風證論曰一單蛾風其形圓如小筯頭大生於咽喉關上或左或右關下難治二雙蛾風有兩枚在關喉兩邊亦圎如小筯頭大關下難治三蟬舌風自舌下再生重舌者是四牙耆風牙根上聚成􅟻毒者五木舌風其舌相似煮熟豬舌不能轉動者六舌黃風自舌上腫痛黃色者是七咬牙噤口風近牙窮頭作臖口噤不開者八魚口風如魚吸水者不治九聚毒塞喉風喉關聚毒涎唾稠密發寒熱仍分上下三關破毒下關難治十玄耆蠱毒風上嗌食搶水外腫形如雞卵者十一搶食風一名飛絲毒口中或食腥惡發泡者十二臘頰風腮臉絡腫者是從牙窮頭碎此毒若成須要半月調理十三纒喉風自耳邊過頥下赤色者是也亦有寒熱甚者傷人十四松子風口內滿喉赤如豬肝逆張吞則關閉塞飲食不能者是用藥後口內散點松子樣腫則喉響如雷者不治十五崩砂疳口風自舌上牙齦上下腫赤口內作脹如湯熱牙齦漸爛甚者亦能脫齒十六連珠風自上作毒或初成一箇碎而又作一箇以三五七九箇者是十七蜂子毒或在腮臉癢爛或在喉關舌下作臖如黃金蜂者是十八走疰瘰癧風頸項結核五七箇皮膚赤腫作寒熱者咽與喉會厭與舌此四者同在一門其用各異咽以納氣故咽氣通於天喉以納食故喉氣通於地會厭管乎其上以司開闔掩其咽其食不下掩之其喉錯必舌抵上齶則會厭能閉氣喉矣四者交相為用闕一則飲食廢而死矣故難經言七衡門而會厭之不為吸門及其為病也一言可了一言者何曰火內經曰一隂一陽結謂之喉痺王太僕注云一隂者手少隂君火心主之脈氣也一陽者手少陽相火三焦之脈氣也二火皆主脈並絡於喉氣熱則內結結甚則腫脹腫脹甚則痺痺甚而不通則死矣夫足少隂循喉嚨挾舌本手少隂上挾咽此二者誠是也至於足陽明下人迎循喉嚨足太隂挾咽連舌本手太陽循咽下膈足厥隂循喉嚨之後此數經皆言咽喉獨少陽不言咽喉而內經言一隂一陽結謂之喉痺何也蓋人讀十二經多不讀靈樞經中别一篇具載十一經之正别其文云手少陽之正繞髀入毛際合於厥隂别者入季脅之間循胸裏屬膽散上之肝貫心以上挾咽出頥頷中散於面繫目系合少陽於外者也又手少隂心主之正下淵腑三寸入胸中别屬三焦出循喉嚨出耳後合少陽脘骨之下是手少陽三焦之氣與手少隂心主之氣相合而行於喉嚨也推十二經惟足太陽别下項其餘皆湊於喉嚨然內經何為獨言一隂一陽結為喉痺蓋君相二火獨勝則熱結正絡故痛且速也故曰一言可了者是也故十二經中言嗌乾嗌痛咽腫頷腫舌本強皆君火為之也惟喉痺急速相火之所為也夫君火本猶人火也相火者猶龍火也人火焚木其勢緩龍火焚木其勢速內經之言喉痺則咽與舌在其間耳以其病同是火故不分也世之醫者各詳其狀強立八名曰單乳鵝雙乳鵝單鬪喉雙鬪喉子舌脹木舌脹纒喉風走馬喉痺熱氣上行結纒於喉之兩傍近外腫以其形似是謂乳鵝一為單二為雙也其比乳鵝差小者名鬪喉熱結於舌下復生一小舌子名曰子舌脹熱結於舌中舌為之腫名曰木舌脹木者強而不柔和也熱結於咽頷腫繞於外且麻且癢腫而大者名曰纒喉風喉風喉痺暴死者名曰走馬喉痺此八種之名雖詳若不歸之火則相去逺矣其微者可以鹹耎之而大者以辛散之今之醫者皆知其有藥也如薄荷烏頭白礬殭蠶朴硝銅緑之類也至於走馬喉痺何待此乎其生死反掌之間耳其最不誤人者莫如砭針出血血出則病已昔余以治一婦人木舌脹其舌滿口諸醫不愈以金扉針小而鋭者砭之五七度腫減三日方平計取出血幾至盈斗又治一男子纒喉風表裏皆作腫藥不能下余以涼藥灌於鼻中下十餘行又以拔毒散傅之陽起石燒赤與伏龍肝各等分為細末日以新水掃百遍三日熱始退腫始消又嘗治一貴婦喉痺蓋龍火也隨用涼劑而不可使冷服為龍火宜以人火逐之人火者烹飪之火是也乃使爆於烈日之下於髙堂之上令侍婢携火爐坐藥銚子上使藥極熱不至火沸通口時時呷之百餘次龍火自散此以熱行寒不為熱病扞格也故大抵治喉痺用針出血最為上策但人畏針委曲旁求瞬息喪命凡用針而有針瘡者宜搗生薑一塊調以熱白湯時時呷之則瘡口易合銅人中亦有灸法然痛微者可用病速者恐遲則殺人故治喉痺之火與救火同不容少待經火鬱發之發謂發汗然咽喉中豈能發汗故出血者乃發汗之一端也故願君子毋執小方而曰吾藥不動臟腑又妙於出血若幸遇小疾而獲效不幸遇大病而死矣咽喉病毒氣歸心胸前腫滿氣煩促下部洞泄不止此死候也實熱論一用敗毒散加黃芩半夏連翹倍用桔梗用生薑薄荷煎痰盛者加石膏同煎即效凡服此藥早晨服則午後攻作午後服則子時攻作天明退用針則無此攻作若服此藥後自利即換作虛熱醫後藥不可用服敗毒散後失音即服加減祕傳降氣湯二用生料消風散加玄參全蝎薄荷白水煎服三用前二藥不退用生料洗心散更加一二味去風毒藥為妙四用前二藥不退用防風通聖散立效虛熱論一用雙解散乃升麻葛根湯消風散加玄參黃芩薄荷二用祕傳降氣湯加生薑黃芩三如痰盛用桑白皮湯磨沉香吞養正丹仍用桔梗半夏湯冷木附湯等藥調理又一證上祕下㵼用祕傳降氣湯吞碧雪散附子理中湯如無用桑白皮湯亦可喉痺者毒客於喉間氣結藴積而生熱故喉腫塞而痺痛脈沉者為隂浮者為陽若右手關上脈隂陽俱實者是喉痺之候也亦令人壯熱惡寒七八日不治則死喉痺論夫喉痺者喉裏腫塞痺痛水漿不得入也人隂陽之氣出於肺循喉嚨而上下也風毒客於喉間氣結藴積而生熱故喉腫塞而痺痛脈沉者為隂浮者為陽若右手之關上脈隂陽俱實者是喉痺之候也亦令人壯熱而惡寒七八日不治則死治法先針而後藥可謂急先務矣走馬喉痺之狀勢如奔馬喉間痺痛腫連頰骨壯熱煩滿數數吐氣者是也此蓋脾肺不利熱毒攻衝發於咽喉所致狗咽者喉中忽覺結塞不通如喉痺狀是也隂陽之氣出於肺循喉嚨而上下若風熱毒氣客於喉間氣結藴積而生熱故有結塞之證俗云此疾由誤咽狗毛所致治法亦有將飯與狗分食取瘥者禳去之法也方綘雪散治熱結喉間連頰腫不消心膈煩滿木通銼桔梗銼炒檳榔各二兩枳殼去瓤麩炒犀角鎊各一兩半柴胡去苖升麻木香赤茯苓去黑皮各二兩桑根白皮銼山梔子各四兩桂去粗皮人參各二兩蘇方木五兩訶梨勒去核五枚朴硝研一斤丹砂研一兩麝香研一分右除朴硝丹砂麝香外各細銼以水二斗於銀器內慢火熬至七分以生絹濾去滓再煎至五升下朴硝以栁木箆攪勿住手候稍凝即去火傾入盆中將丹砂麝香末拌令勻瓷器盛之勿令透氣每服一錢或二錢以冷蜜湯調下食後臨卧看老少加減菖蒲湯治喉痺口噤水漿不下風邪恍惚如有神鬼身體強直面目變色菖蒲秦艽去苖土桂去粗皮禹餘糧煆醋淬人參當歸切焙甘草炙銼附子炮裂去皮臍黃芩去黑心逺志去心防風去義龍骨各半兩赤石脂芎藭赤芍藥赤茯苓去黑皮防己各一兩半右銼如麻豆大每服二錢匕水一盞煎至七分去滓空心日再服乾喉風出危氏方朴硝川烏當歸牛膝各五錢麝香腦子各半錢硼砂荆芥薄荷甘草蛤粉各五錢全蝎七箇去毒右為末用清泔調春用菘菜汁調夏黃麥汁調如不能吞用豆腐切如棊子塊蘸藥入口內含化或新艾汁調下立效治咽嚨痛及喉痺並宜服之出本草以通草煎服之磨亦得急即含之治喉痺腫痛出本草取荔枝花皮根共十二分以水一升煮取六合去滓含之細細咽汁瘥治喉痺出本草以天雄炮含之又方出本草以無患子研內喉中立開開關潤喉蓬萊雪出危氏方梅花腦子生麝香各一字硼砂三錢朴硝五錢已上别研薄荷葉百葉煎全蝎去毒防風去叉粉草各五錢已上别研明乳香沒藥各三錢蒻葉或蘆葉盛火尉别研右為末每服少許以匙挑乾摻咽間及瘡上如在關下摻舌上並旋旋咽下仍用薄荷桔梗甘草煎水噙潄或用生薄荷研自然汁調成膏入口噙化亦妙奪命無憂散一名玉屑無憂散治纒喉風咽喉疼痛風涎壅滯口舌生瘡心腹脹脾積癥塊小兒妳癖誤吞骨硝硬塞不下熱勝喉閉涎滿氣急或悶亂不省人事並療之寒水石三兩煆元參去蘆貫衆去蘆滑石研縮砂仁去殼黃連去毛茯苓炒黃甘草炙山豆根荆芥各半兩生用硼砂三錢右為細末每服一錢乾摻舌上後以新水咽下不拘時任是百毒硬物可以除化如喫巴豆杏仁石頭鐡札麥糖棘針瓷瓦子等物及諸藥毒火毒亦可用此藥每服半錢能潤三焦消五榖除三尸去八邪除百毒趕瘟疫專醫渴疾其效如神魯直號金臺玉簡方龍腦散出聖惠方治馬喉痺頰咽痛白龍腦細研牛黃細研犀角屑羚羊角屑馬牙硝細研元參沉香硃砂細研甘草炙微赤銼已上各一分川升麻半兩硼砂一錢細研右除龍腦牙硝搗篩為散每服三錢匕水一盞竹葉七片煎至六分去滓溫入龍腦牙硝一錢攪令勻細含咽利咽湯治喉咽諸疾桔梗枳殼牛旁子荆芥甘草升麻元參大黃紫蘇人參各等分右㕮咀每服五錢水二盞煎服生犀丸治熱衝喉間連頰腫痛吐氣煩滿犀角鎊枳殼去瓤麩炒射干海藻洗去鹹焙升麻各一兩杏仁湯浸去皮尖雙仁研百合胡黃連蒺藜子炒各三分白附子炮半兩右為末鍊蜜丸如彈子大每服一丸綿裹咽津不計時龍腦丸治喉咽連頰頷腫日數深逺咽津液熱發渴疼痛龍腦研升麻甘草馬牙硝研各一分元明粉研三分麝香研石膏碎大黃銼黃耆銼各一分生地黃二兩絞取汁右除地黃汁外搗羅為末以地黃汁和如乾更入鍊過蜜少許為丸如小彈子大用綿裹含化咽津日四五次不計時治纒喉風腫痛黃芩五錢酒浸升麻麻黃荆芥薄荷防風各一錢黍粘子炒四錢生井草一錢半瓜三稜三錢炒黑大黃三錢煨右㕮咀以水一碗煎至七分去滓稍溫服食後隨咽之大硼砂散治喉閉咽腫瘡痛水米難下硼砂茯苓甘草各半兩馬牙硝盆硝朴硝薄荷葉各一兩殭蠶二兩蛇蛻皮一條右為細末臘月牛膽汁和成膏穰在腦內髙懸隂乾每用一錢綿裹咽津金消丸治咽喉痺痛不能喘息水漿不得入鬱金銼馬牙硝研甘草銼山梔子去皮大黃銼栝樓根各二兩元參白礬硼砂研各一分右研為末鍊蜜和丸如雞頭實大每用一丸綿裹含化咽津天門冬丸治馬喉痺咽喉腫痛唇焦舌乾腮頰連腫天門冬去心焙元參惡實炒各一兩百藥煎紫蘇葉各半兩甘草炙銼兩半人參硼砂研龍腦研各一分右為細末鍊蜜和丸如皂角子大每服一丸食後臨卧細嚼溫熟水下橘皮湯治馬喉痺勢如奔馬腫痛煩滿數數吐氣陳橘皮湯浸去白焙青竹茹生地黃切焙黃芩去黑心白术山梔子各三兩赤茯苓去黑皮二兩桂去粗皮一兩芒硝研湯成下右除芒硝外粗搗篩每服三錢匕以水一盞入生薑半分拍碎棗二枚劈破煎至五分去滓下芒硝末一錢匕攪勻溫服食後日三仙方奪命丹出德生堂方治纒喉風木舌脹雙單乳鵝喉閉或誤吞雞魚骨刺竹木簽刺一切咽喉急症白茯苓密陀僧炒黃色紫河車各一兩白殭蠶直者貫衆淨縮砂仁甘草莭各一兩烏魚骨去皮各二錢半麝香一字右細末却入麝香研勻同蒸餅包白麵蒸熟四兩和藥汲新井水丸如豌豆大蛤粉為衣放乾十年不壞每服一丸用瓦器研碎新水半盞浸一茶時化開用匙挑藥徐滴入喉中勿急用取藥盡為度木通散出聖惠方治喉痺心胸氣悶咽喉妨塞不通木通銼赤茯苓川芒硝前胡去蘆頭桑白皮各二兩銼羚羊角屑川升麻川大黃各一兩半銼碎微炒馬藺根一兩右為粗散每服三錢以水一中盞煎至六分去滓不計時候溫服治喉痺咽喉腫痛上焦風熱痰唾不利出聖惠方射干白藥各三分絡石甘草生銼黃蘖各一兩白礬灰半兩天竺黃細研馬牙硝細研各二兩川升麻一兩半右為細散同研令勻每服以新木綿裹二錢含咽津取喉中涎出危氏方草烏尖殭蠶紫具根啾唧紅椒白礬山豆根皂角各等分右為末用霜梅拌藥為丸如指頭大含化一丸取下涎然後用鹽湯灌潄吐出不可吞開喉關出危氏方薄荷山豆根各五錢麝香腦子各半錢朱砂三錢甘草青鹽川烏各五錢右為末每服半錢臘月內菘菜汁夏黃麥浸水或葛水調如涕唾稠粘用芭蕉水調下或蜜丸指頭大含化搶食風出危氏方桔梗川烏草烏防風甘草大青根各五錢全蝎七箇去毒紫河車五錢右為末每服用水一盞連根蔥一根紅椒七粒燈心七莖同煎三四沸食後熱服不安再用酒一盞入茱茰五粒同煎少時熱服之未效用蕉湯調下如落心肺間刺痛用宣利藥下如久不治則變為飛絲癆毒能傷人命龍腦破毒散出御藥院方治不測急慢喉痺咽喉腫塞不通盆硝研細四兩白殭蠶微炒去觜為末稱八分甘草生用稱八分青黛稱八分馬勃末三錢蒲黃半兩腦子一錢麝香一錢右研令勻細用瓷合子收如有病證每用藥一錢用新汲水小半盞調勻細細呷咽如有喉痺即破出血便愈如不是喉痺自然消散也若是諸般舌脹用藥半錢以指蘸藥擦在舌上下咽津如是小兒一錢作四五服亦如前法用並不計時候生銀丸治口乾咽腫喉頰脹痛人參半兩丹砂研鉛霜研馬藺根朴硝研升麻各一分硼砂研三錢龍腦研一錢右為末和勻鍊蜜為丸如皂子大每服一丸含化咽津射干湯治喉痺腫不通疼痛不下飲食并諸毒發動射干當歸切焙一兩升麻半兩白芷一兩甘草炙銼犀角鎊杏仁湯浸去皮尖雙仁炒各半兩右粗搗篩每服三錢匕以水一盞煎七分去滓溫服日三忌海藻菘菜禹餘糧湯聖濟總録治喉痺若胃中虛飢狀少氣不足以息四逆泄注腹脹喜噫食則欲嘔泄癖溏口下乾四肢重好怒不欲聞人聲診其脈右手關上隂陽俱虛者脾胃虛也禹餘糧煆醋淬大麻仁桑根白皮各二兩銼碎乾薑炮一兩黃連去鬚半兩白术一兩棗十枚焙取肉右粗搗篩每服三錢匕水一盞煎至五分去滓溫服食後日三服如聖勝金鋌出和濟方治證服餌與後如聖勝金鋌同品味少異朴硝四兩川芎一兩硫黃細研一兩半貫衆二兩薄荷葉荆芥穗嫩茶各半兩右為末裂生蔥自然汁攪和為鋌服藥湯使如後方同簡易如聖勝金鋌法同治喉痺并時疫毒桔梗甘草升麻連翹黍粘子防風酒製黃芩各等分右㕮咀每服五錢水煎細咽如聖勝金鋌出和濟方治急喉閉纒喉風飛揚單蛾雙蛾結喉重舌木舌腮頷腫痛屢經用藥不能吞水粥又方見前硫黃研川芎薄荷葉去枝梗臘茶川烏炮硝石研生地黃各二兩右為細末以生蔥汁搜和為鋌每服先用新汲水灌潄吐出次嚼生薄荷五七葉微爛用一鋌同嚼極爛以井水咽下甚者連進三服即愈重舌腮腫先服一鋌次以一鋌安患處便消冒暑伏熱不省人事生薄荷水調研一鋌灌下即蘇行路常噙一鋌即無暑熱之患口舌生瘡不能合口并食熱物如上法服訖用水灌潄嚼薄荷十葉如泥吐出再以水灌漱嚼藥一鋌噙口內聚涎裹之如涎滿方吐出如此服三鋌便能食遇食酒醋鹹酸酢脯炙煿喉中生炮須掐破吐血方著薄荷數葉以一鋌同嚼井花水吞下沙淋小便出血用車前草七葉生薑小塊研爛水調去滓嚼藥一鋌以水送下分隂陽去風熱化血為涎化涎為水常𢃄隨身備急一鋌可活一人小兒只服半鋌一方去川烏貫衆以嫩茶代臘茶射干丸治喉痺腫塞射干一兩䜴一合杏仁湯浸去皮尖雙仁炒芎藭犀角屑各半兩升麻一兩甘草炙半兩右為末錬蜜和丸如小彈丸大每服一丸含化咽津日可三五服瘥忌海藻菘菜七聖散治馬喉痺咽頰腫痛吐氣不快白礬二錢馬牙硝五錢硝石一兩鉛丹三錢硼砂一錢蛇蛻半條巴豆兩枚去殼右先研白礬牙硝硼砂三味入罐子內次入硝石消次摻鉛丹於上面只用平瓦一小片蓋火燒成汁便用竹片子夾蛇蛻攪五七度又入巴豆更攪五七度取出候冷研為散如小可咽喉腫痛咽津無礙及口瘡口乾摻一匙或大假喉痺及馬喉痺或腮頰生瘀肉侵咽喉即乾摻半錢安穩仰卧其喉癰睡處自破立瘥療喉痺急疼妨悶不通方馬藺根切一升升麻三兩瞿麥三兩射干十兩犀角二兩屑通草二兩元參二兩右切以水八升煮取二升去滓細細含咽一日令盡得破膿慎熱麵炙肉蒜黃芩湯聖濟總録治喉痺胸滿噎塞不通黃芩去黑心升麻射干木通銼各三分甘草炙銼犀角鎊各半兩右以水粗搗篩每服五錢匕以水二盞煎至一盞去滓下芒硝一錢匕細溫呷如神散治咽喉一切急患不得開白礬白殭蠶炒藜蘆元參去皮核炒雄黃各三錢乳香一匙右為細末和勻每一匙分兩鼻內搐之口含水及舌下擦嚏出涎立效硼砂散出和濟方治大人小兒患喉痺閉塞不通腫痛生瘡語聲不快風壅痰毒鼻衄出血山藥六斤生腦子研七兩牙硝生一十四兩麝香研四兩甘草硼砂生各十二兩右為細末每服半錢如茶點服金鎖匙出醫學切問方凡人卒中喉痺口噤咽喉腫痛木舌重舌者以此藥治之豬牙皂角去皮煨大黃草烏鬱金南星各四錢巴豆五箇去心不去油右為末生薑自然汁調半錢許以鵝毛拂入喉中已死者用竹管吹入須臾醒然後用藥半錢薑汁調喫吐瀉為驗南星防風散出百一選方治風壅腮頷腫內生結核纒喉風等疾當歸二錢焙乾天麻三兩生用白殭蠶焙乾南星湯浸淨搗細薑汁製焙乾豬牙皂角去黑皮焙乾三錢防風生用不見鐵器各半兩右為末每服二錢水一盞薑三片入荆芥少許同煎至七分溫服食後日進三服忌發風毒物如腫不散者加透明雄黃三錢同前藥一通為末煎服二砂丸治喉痺咽塞熱痛沙參丹砂研硼砂人參元參丹參各等用右為末鍊蜜丸如雞頭實大食後臨卧含化一丸犀角湯出聖惠方治馬喉痺喉中連頰焮腫犀角鎊甘草炙銼升麻各半兩射干桔梗炒馬藺根銼各三分右粗搗篩每服三錢匕水一盞入竹葉七片煎至七分去滓入馬牙硝末二錢匕攪令勻細細呷服玉液丸治毒氣壅塞咽喉不利頰頷連腫百藥煎一兩麝香研朴硝各半錢丹砂二錢研龍腦研甘草末各一錢右各研為末再同研勻細以水浸蒸餅心為丸如梧桐子大丹砂為衣隂乾含化犀角散出聖惠方治喉痺氣隔胸滿咽腫犀角屑馬藺根射干枳殼麩炒微黃去瓤甘草各一兩生用馬牙硝一兩半右為散每服三錢水一中盞入竹葉二七片煎至六分去滓不拘時候稍溫含咽碧雪散出仁存方治一切壅熱咽喉閉腫不能咽物口舌生瘡舌根強言語不正腮項痛腫蒲黃青黛硼砂焰硝甘草各等分右為細末每服手指捻摻喉間咽津或水下頻頻用之治咽喉諸疾朴硝二兩甘草一兩蒲黃薄荷各半兩青黛三錢右為細末每服用一字摻口內通氣湯出聖濟總録治喉痺氣隔胸滿咽腫生膿犀角鎊半兩射干桔梗馬藺研各三分甘草炙銼半兩右粗搗篩每服三錢匕以水一盞入竹葉七片煎至七分去滓下馬牙硝一錢同攪令細細溫呷又開喉關方出危氏方南星半夏川烏草烏甘草各五錢右為末用米醋煎成膏傅毒上宣利方出危氏方巴豆三七枚去殼雄黃鬱金豬牙皂角大黃各五錢右為末飯丸如菉豆大每服七丸五更三點以冷茶清吞下如未利再下四五丸治咽喉閉疙疸堵塞不通氣水米難下至危者出御藥院方牽牛四兩半生半熟用鼠粘子一兩防風七錢半甘草生用枳殼麩炒去瓤各半兩右為細末每服五錢沸湯點下不拘時候治喉痺及喉中熱塞以車轄燒令赤投酒中乘熱飲之治喉痺出本草以紫硃煮汁服治喉痺出本草取橡斗子中仁碎為粉微熬水服一二匕一匙散一名如聖散治喉痺氣塞不通飲食不下者并咽喉作疼如乳鵝聲雄黃一分别研蝎稍七枚白礬生研藜盧各二錢豬牙皂角七錢右為末每用一匙吹入鼻中即時吐出頑涎為愈神效一方無蝎稍亦治得時氣纒喉風纍用救人萬無一失治喉痺出百一選方大青魚膽新瓦上焙乾去膜取末蛇蛻皮去沙磁碗內燒灰研令極細白藥子新瓦上焙乾各一錢白殭蠶直者去絲嘴新瓦上焙乾白礬礦銚內飛過存性各一兩右為細末再以乳鉢和研勻每半錢吹八咽喉立愈若病輕以多年白鹽梅肉細切入前藥同搗勻丸如雞豆大每服一丸含化咽津如白梅乾硬用湯浸軟取肉細切用通關散出直指方白礬枯直殭蠶南星生藜蘆各一分右為末以小管挑一字吹入鼻中吐痰喉通如聖丸出王氏博濟方治纒喉風及喉痺大黃末一分蝸牛二七枚白礬末陳白梅皮馬勃各一分右於五月五日午時用白梅皮蝸牛同研和丸如楝實大如患者開口不得即以水磨用竹管子吹下入喉中立瘥如輕者以綿裹含化一丸治馬喉痺頰咽痛五倍子半兩黃蘖半兩銼川升麻三分甘草一分炙微赤銼右為散每服三錢匕水一小盞煎至四分去滓不計時候溫服一捻金散傳信適用方治喉閉欲死及治喉痛全蝎微炒川鬱金白殭蠶去絲嘴炒甘草炙各半兩地龍八錢右為細末入麝香少許每一字吹入喉內舌根不數次即愈治咽喉痛傳信適用方百藥煎去黑皮硼砂甘草白礬生用右等分為細末每服一錢食後調飲細細呷之奪命散治咽喉膽礬牙硝甘草青黛各一錢右每用少許將蘆管吹喉中立效龍腦丸出聖濟方總録治纒喉風龍腦一分丹砂一錢芒硝半兩麝香半錢右細研為末用鯉魚膽汁和丸如菉豆大鼻兩孔各塞一丸良久牙關開涎出瘥消毒寬喉散出御藥院方治急慢喉痺咽喉閉塞腫痛或舌本強硬滿口生瘡馬牙硝朴硝各六兩青黛半兩寒水石生四兩右為極細末每服二錢濃煎薄荷湯點勻熱漱咽喉內令吐悮咽不妨不計時候日用三五次銅青丸一名千金丸出百一選方不問隂陽閉如急病內外腫塞輒至不救用之能起死治纒喉風車前草嫩者半兩銅青二錢大黃牙皂各半兩右為末以白梅肉同研成膏每兩作十五丸用時以薄綿裹含出涎兩日後則難開矣牛膽膏一名佛手散出存仁方治鎖喉風神效青黛一錢殭蠶半兩去絲朴硝一兩研甘草二錢半生右為末用臘月黃牛膽安藥在內當風挂百日再入研麝香少許每服半錢或調服或研碎吹於喉中一方不用牛膽作散筒吹喉內一方不用麝香一方各等分殭蠶散一名三白散出仁存方治喉痺殭蠶一條馬勃拳大者瓦上焙成末白礬皂子大生天南星一箇炮右為末大人一錢小兒半錢生薑自然汁調下一方無馬勃白梅丸出仁存方治喉痺及腫痛白梅二十三箇取肉白礬一錢甘草末生萆麻四十九粒去皮右同研勻和丸如雞豆大以綿裹之含化粉香散出瑞竹堂方吹乳鵝即開白礬三錢巴豆二粒去皮輕粉少許麝香少許研右於鐵器上飛白礬沸入巴豆在上礬枯去巴豆不同細末三味合吹喉啞瘴咽喉乳鵝方出瑞竹堂方雄黃五錢研鬱金五錢白礬二錢半生用研膽礬半錢右為極細末以竹筒吹入喉中立能言語治喉痺乳鵝喉風硼砂明礬膽礬芒硝硃砂各等分同為末右為細末吹喉中羅青散出瑞竹堂方治咽喉單雙乳蛾及治心肺積熱上攻咽喉腫痛閉塞水漿不下或喉癤重舌木舌腫脹並宜服蒲黃五錢羅青研盆硝各三錢甘草二錢右為細末每服一錢冷蜜水調下細細咽之吞不下雞翎蘸藥喉內掃之立效一方砂糖和丸每兩作五十丸每服一丸或噙化亦可烏龍膏治急喉閉纒喉風皂角七挺捶碎水五升桵汁去滓草烏頭銼天南星銼大黃銼一兩右並入皂角水內煮取二升濾去滓不用再熬成膏入新磁器內候微凝入朴硝末一兩攪勻候冷入白殭蠶末一兩收之如用以半匙頭甘草湯或茶清化下灌入口內立愈如乾以好酒調之不拘時候又方鴨觜膽礬銅青輕粉胡粉明礬右各一字薑茶半錢逐旋和以新汲水調呷咽之如吐即愈奪命筯頭散治急喉閉咽喉腫滿堵塞氣不得通欲死者真膽礬草烏各四錢緑礬六錢雄黃二錢右為細末每服一筯頭點上咽喉內急吐涎末立應次以大黃甘草等分俱為粗末每服三錢水一盞半煎至一盞去滓化乳香一粒溫服滌去滓毒恐其再發一方加白礬二錢玉鑰匙治風熱喉痺及纒喉風焰硝一兩半硼砂半兩腦子一匙白殭蠶一錢右為末研勻以竹筒吹半錢許入喉中立愈雄黃散治纒喉風喉閉先兩日胸膈氣緊取氣短促忽然咽喉腫痛手足厥氣閉不通頃刻不治巴豆七粒三生四熟生者去殼研熟者帶殼研火燒存性乾桑黃茹二片雄黃一塊皂角子大透明者細研鬱金一枚蟬肚者研為末右再研勻每服半字茶清少許下如口噤咽塞用小竹管納藥吹入喉中須臾吐利即效一方無乾桑黃茹玄參丸出聖濟總録治纒喉風聖惠方玄參白殭蠶白礬生用各一分甘草生用半分右為細散用鯉魚膽汁和丸如赤小豆大每服十丸食後溫服生薑湯下日三服開關散出王氏博濟方治走馬纒喉風及喉痺硝石六兩鉛丹四兩白礬砒霜各半兩右細研用瓷罐子一箇先入硝石二兩鋪底次下砒霜又入硝石二兩方下白礬更入硝石二兩方下鉛丹後用圓瓦一片蓋口於淨地上用方磚一片襯藥罐子以炭火五斤煆令通赤罐子固濟鎔成水以炭條子攪令徹底勻方去火放冷於地上經宿打罐子取藥研如粉患者用筯頭蘸冷水惹藥深點咽喉內漸漸咽津至甚者不過三兩度點伏龍肝散治喉痺伏龍肝半兩白礬煆過白殭蠶直者炒甘草生各一分右為散每服一錢匕如茶點服吐出涎立效未吐更一服治喉痺方蛇蛻白梅白殭蠶甘草各等分右為末綿裹含化咽津四聖散出德生堂治咽喉口齒喉閉乳鵝荆芥穗牛蒡子炒碾細紫河車各三錢大黃六錢大實者再加用右㕮咀每服五錢水一盞煎八分食後臨卧時先潄後咽如聖湯出旅舍方治痰去熱利咽喉治咽中有瘡咽物不下及咳嗽咯血肺痿痰唾氣促并小兒瘡疹毒攻咽喉腫痛桔梗一兩甘草生一兩牛蒡子炒一兩麥門冬半兩右為細末沸湯調細細服入竹葉煎尤妙龍麝丹治纒喉風白礬飛過雄蛇蛻於髙處凡於屋上樹枝或籬壁上者是雄蛇一兩火煆過用硼砂半兩研麝香半錢另研右研勻用牛蒡子自然汁為餅子如錢大以紅綿包噙化如牛蒡子汁稀入糊少許治喉閉方豬牙皂角二錢燒存性葛根粉一錢末茶二錢乾荷葉一錢半右為細末吹入喉中即愈治喉痺咽喉腫痛上焦風熱痰唾不利烏蛇皮燒灰白梅微炒甘草生銼各一錢桂心半分右為細末每服以新綿裹二錢含咽津立通一捻金散治咽喉方銅緑黃蘖香白芷各等分右為極細末入麝香少許每用一字吹入喉中如聖丸治九種咽喉殭蠶南星馬屁勃各等分右為細末用鹽梅生薑汁為丸如彈子大噙化又方殭蠶百葉煎大黃各等分右為細末鹽梅為丸如彈子大噙化通後補助紫蘇藿香甘草各等分右銼散每服四錢水煎空心服治喉痺大黃朴硝白殭蠶各等分右為細末水煎量虛實以利為度吹喉散治喉痺腫硬水漿不下白礬半兩半夏巴豆各七枚右鎔白礬銼半夏巴豆在汁中候乾研細吹入喉中地龍膏治纒喉風活地龍白頸者五條白梅肉二箇朴硝二錢右同研成膏挑入喉中含化一捻金散治乳蛾及風熱上攻咽喉腫痛直殭蠶去絲嘴三條薑汁浸濕炙黃色防風鼠尾者去義二錢明礬三錢研右為細末用竹筒吹入喉內立愈治喉痺豬牙皂角蜜塗炙香别研白礬一分研雄黃半兩研右和勻以濃茶少許調一字安舌上漸咽下有涎即吐之如牙關緊急點一字如齒藥用之治纒喉風青礬白礬雄黃各半兩右同研細以天南星三兩為末四味同和臘月用牛膽汁調勻捻成餅子隂乾要用時取少許為末白梅肉為丸如雞豆大外用綿裹含口中勿令咽下候汁流咽喉以吐風痰盡為度治急喉腫閉藜蘆瓜蒂雄黃右等分為末吹入鼻中蓋通關竅也半夏桂甘湯治冷證無陽咽疼喉閉辣桂甘草焙半夏製右等分銼碎每服三錢水一盞煎半盞冷少呷山豆根方治熱閉山豆根射干升麻各等分右㕮咀用井水二盞同煎至一盞去滓通口時時呷之又喉閉方牙硝五錢胭脂半錢鹽梅屑一錢右同研以雞羽送入解毒雄黃丸治纒喉風急喉卒然倒仆失音不語牙關緊急不省人事膈熱涎盛咽喉腫痛赤眼癰腫一切毒熱諸證華陀云其證先兩日氣緊驀然咽痛發腫或手足厥霎時氣閉不通多死也雄黃飛鬱金各一分巴豆去皮膜出油十四箇右為末醋糊丸菉豆大熱茶清下七丸吐出頑涎立蘇未吐再服如未至死心頭尚溫灌藥下喉即活吐瀉無妨小兒喉嚨赤腫驚熱痰涎壅塞服二三丸量大小用一方作散茶清調下如喉閉不開用筒吹入得吐則醒比金丸治喉痺鉛白霜半兩青黛一兩甘草半兩右為末醋糊為丸如雞豆大含化咽津痰出立效胡黃連散治咽喉中壅塞如核連頰腫痛胡黃連一分升麻半兩鉛霜研一分右除鉛霜外搗羅為散再同和勻每服半錢匕綿裹含化咽津日三五度不計時候凝水石散治纒喉風卒然喉痺急如奔馬喉頰俱腫名走馬喉痺凝水石甜硝各半兩並用無油瓷合盛火煆通赤合於地上出火毒一宿白殭蠶麩炒黃研如粉一兩右同研勻每取少許摻咽喉中病甚每服二錢匕溫水調下若牙關緊急只於鼻中吸入奪命散治急喉風等證枯白礬南硼砂豬牙皂角皮弦㨂去各等分右為細末吹喉中痰出即愈治喉痺明礬膽礬各二錢半馬牙朴硝一錢右為細末用竹筒吹入喉中手扯住鼻孔一時牙關緊急吹入鼻孔中又方豬牙皂角二錢半硼砂五倍子各一錢右為末用醋蜜調鵝翎點入口中繳出痰白礬散出聖惠方治喉痺氣悶白礬硼砂馬牙硝各半兩右於瓷合子盛用鹽泥固濟候乾以炭火煆令通赤取出細研用紙一兩重勻攤置於濕地上以物蓋之一宿出火毒後再細研為散用半錢內於竹管中吹之喉內須臾即通如是咽門腫只以箆子抄藥點於腫處咽津即瘥馬牙硝散出聖惠方治喉痺氣欲絶馬牙硝硝石硼砂已上各半兩右以瓷瓶子內盛用鹽泥固濟候乾以慢火煆成汁良久取出候冷於地坑子內先以甘草水灑後用紙三重裹藥以土蓋之三宿出火毒後取出細研為散每服半錢用箆子抄內咽中咽津更以竹管吹入喉中瘥硝石散出聖惠方治喉痺熱毒氣盛痛硝石白礬砒霜各半兩右同細研於瓷合中盛鹽泥固濟候乾炭火中燒令通赤取出向地坑中三日出火毒細研如粉咽喉腫閉處點少許便破治咽喉牛膝根糯米用四十九粒碾碎為末右用水二盞煎服或生用乾用俱妙如治便毒以帶皮生薑米醋調傅之治喉中毒百發百中及咽喉一切疾出衛生寶方皂角略炮去土髙良薑各等分右為末搐鼻或已甚先須含香油一口不可吞就後搐之如已結成候少頃要令濃血隨油而出輕者只含水如前法一用管子吹入喉中涎出愈神效不可言治喉痺出本草以牛角燒灰為末酒服方寸匕又方出本草取黃蘖根以水研汁含之保安散治喉內結核不消石膽硼砂右研細每用竹筒吹之或以筯頭蘸之去涎散出危氏方草烏鴨嘴青膽礬各等分右為末先用釅醋煮皂角調鵝翎刷傅赤腫處開口流出涎即將綿毬一指頭大以綿線繫定蘸前藥末吞咽至腫毒處即抽出凡如此一二次其毒即破開口流出去盡涎血却以後合瘡口藥點上停久溫鹽水灌潄後進食亦可合瘡口藥方用白礬黃丹麝香等分為末以筯調點瘡口上千金療喉舌諸疾方松子苦芥子右搗以苦酒和貼上金鎖匙出仁存方治咽喉腫塞雄黃末半錢巴豆一粒去油右作一服生薑自然汁調灌下或吐或下皆愈一方細研每遇急患不可下藥者用有口酒瓶裝入點火一炷燒之候煙起將瓶嘴入一邉鼻中用紙覆瓶口熏之立聖膏出百一選方治纒喉風巴豆齊州半夏各三七粒右將半夏輕捶每粒分作四片巴豆剝去心膜銀銅石器內米醋三碗文武火熬盡醋為度用清醋微洗過研為膏子每患纒喉風喉痺或癎疾用一挖耳以生薑自然汁一茶腳化下甚者灌藥少時吐出惡涎如魚凍相似立愈極有神效治喉風皂角燒灰飛鹽右為末向喉內吹之一二次必效用淨水漱之治咽喉紫舌脹元明粉白礬各等分右為細末吹在口內立效吹喉散治喉痺乳蛾喉風明礬二兩膽礬五錢右研細吹患處立效治喉痺方青礬半兩研杜牛膝草秋冬用根二寸春夏用心梗右同研看患處以筆蘸少許令吐膿血涎沫即愈礬硝散出朱氏集驗方治急喉痺纒喉風兼主重舌咽喉腫塞軟瘡白礬半兩飛過朴硝一錢飛過右細研為末摻入口中其效如神或搐鼻中一方銅筯點腫處再點瘡如穿硬則用針治急喉腫閉藜蘆豬牙皂角右等分為末吹入喉中立應丸一名如聖散出十便良方治纒喉風急喉閉南星一箇刮去皮一方炮地埋出火毒一夜白殭蠶七箇右挖南星心空作孔子入蠶於內濕紙褁文武火煨熟取出等分為末粥飲丸如桐子大如不丸只用綿裹藥末吞之亦便如開口不得塗齒上亦妙又為末每一匙以生薑汁調下如開喉不得以小竹管劈開口灌之涎自出小可只塗於唇上後用大薑一塊略炙過含之一方用蜜薑汁調藥將鵝毛蘸藥繳口內有涎吐出鹽礬散一名玉珍散出經驗良方治喉中乳鵝漸長塞喉者及治懸喉癰垂長咽中妨悶白礬煆為末鹽炙等分右研細用筯頭頻點乳鵝上即焦硬而愈切不可挑破後有根時再發治急喉閉出經驗良方馬屁勃即灰菰焰硝各一兩右為末每用一字許吹入喉內吐涎血出立愈治走馬喉閉出朱氏集驗方白殭蠶半兩炒甘草一錢生右為末每服一錢生薑汁調下涎出立愈治纒喉風出朱氏集驗方白礬銅緑右等分為末用一字鼻內搐之又方出海上名方生川烏頭尖膽礬右等分為末每服一匙酒半鍾調服如口不開即灌之二聖散出濟生方治纒喉風急喉痺鴨嘴膽礬二錢半白殭蠶去絲嘴半兩右為細末每服少許以竹管吹入喉中立愈殭蠶散一名開關散出仁存方治喉風急喉痺白殭蠶直者去絲嘴焙明白礬半飛半生用右等分為末每服一錢取生薑自然汁濃調咽下小兒入新薄荷少許同薑汁研更加生蜜少許同調半錢服藥後不可飲湯水解藥力住膈上少時也一方白梅和丸皂子大綿裹入喉涎出愈一方蜜丸含化神效方出三因方治喉閉熱腫語聲不出荆芥穗别為末萆麻生去皮研各等分右入生蜜少許丸如皂子大以綿裹含化急則嚼化一法用朴硝不用荆芥治喉痺方牛蒡子六分馬藺八分右搗為散空心暖水調服方寸匕漸加至一匕半日再服勝金散治咽喉卒腫喉痺戎鹽一兩青黛半錢右同研勻每服半錢匕或一字用小筒吹入咽喉咽津效治喉痺方出聖惠方白礬燒令汁枯研白附子搗末各等分右研令勻塗在舌上咽津有涎即吐之煙方出聖惠方白殭蠶三七枚直者乳香一分右為末每服一錢匕香爐上燒開口令煙熏入喉中涎出效療喉痺急疼妨悶不通方射干當歸各三兩右切以水三升煮取一升稍稍含之吐去更含升麻散出聖惠方治喉痺腫熱痛悶川升麻一兩馬藺子二兩右搗細為散每服以蜜水調下一錢治喉閉立效方出聖惠方蝸牛七枚白梅子三枚取肉右同爛研綿裹如棗核大含咽津即通治咽喉牙關緊閉出醫方集成用巴豆去殼以紙包巴豆肉用竹管壓出巴豆油在紙上以此紙作撚子點燈吹滅以煙熏入鼻中即時口鼻涎流牙關開矣一方用熱煙刺入口內即出涎或瘀血普濟方卷六十
