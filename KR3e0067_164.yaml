body:
  text: 普濟方卷一百六十五明周王朱橚撰痰飲門一切痰飲桔梗湯一名半夏湯除痰下氣治胸膈脅脹滿寒熱嘔噦心下堅痞短氣煩悶痰逆惡心或吐涎沫飲食不下亦治順陰陽消痞滿消酒化痰桔梗十兩細碎微沙半夏十兩洗七次薑製陳皮十兩去白枳實五兩麩炒赤黃右為細末每服三錢水一盞生薑五片煎至七分去滓溫服無時一方用烏梅一箇煎出危氏方桂苓甘露飲出衛生家寶方治痰涎止咳嗽調臟腹寒熱嘔吐流濕潤燥令人氣順胃和平及療水腫泄利不止桂半兩人參半兩茯苓一兩白术一兩甘草一兩葛根一兩石膏一兩寒水石一兩澤瀉一兩藿香葉半兩木香二錢半滑石右為細末每服三錢白湯調下或新水生薑湯亦可飛礬丹出百一選方化痰神效飛過枯礬二兩北礬絳礬尤佳如無只用通明南礬白殭蠶一兩半一兩生半兩熟米醋浸一宿天南星一兩切作片子用皂角柳水浸一宿來日就銚子熬看以水盡為度半夏一兩生薑製一宿右同為細末薑汁糊為丸如梧桐子大亦得每服十五丸至二十五丸生薑湯下亦治喉閉用薄荷二葉新汲水浸少時嚼薄荷吞藥以水送下如咽不得即以十五粒搗細用皂角水調灌下即開又治小兒急慢驚風牙關緊閉不可開者亦用皂角水調塗牙齦上入喉即活神仙化痰丸出百一選方亦治風祕甚效天南星四兩丁香一兩橘紅二兩半夏四兩同南星二味生薑皂角各四兩水五升同煮水盡去薑及皂角不用右為細末白水麵糊和丸如梧桐子大每服三十丸生薑湯下食後服下痰丸出百一選方橘紅四兩白术一兩半半夏一兩薑製天南星二兩炮右為細末薑汁煮麵糊為丸如梧桐子大每服四十丸薑湯下不拘時快活丸出危氏方常服消食化痰養生之家不可缺韓侔子髦方枳殼一兩半炒桂一兩桔梗二兩半夏湯洗七次二兩右為末薑汁糊丸如梧桐子大每服二十丸薑湯食後下日進一二服此藥消痰塊寬胸膈美飲食滚金丸出百一選方治痰積中脘眩瞑吐嘔頭疼惡心時吐酸水乾薑一兩不炮真橘皮一兩天南星一兩生用半夏一兩熱湯洗右先用生薑一兩不去皮搗爛製半夏南星末作麵却用餘藥共一處以生薑自然汁為丸如梧桐子大又以雄黃少許為衣不拘時候薑湯下三五十丸臨卧服尤佳一方無半夏滌痰丸出瑞竹堂治男子婦人逺年日久積聚痰涎或飲酒食後吐唾日久面黃飢瘦皮膚枯澀眼無神光又治偏正頭風如一月服三五服至老無風癱之疾豬牙皂角一兩依皂角製法枳殼二兩五錢一兩半火炒一兩生用黑牽牛二兩末好皂角不蟲蛀老損者一十兩水浸一宿去皮弦火炙黃色取淨末二兩五錢右件用朴硝五錢井花水泡開不用滓末澄清硝水為丸如梧桐子大每服五十丸臨卧井花水下量人虛實加減丸數服之治痰涎氣急杏仁知母貝母甘草各等分右銼每服三錢水一盞糯米一撮煎至八分去滓溫服四七湯出危氏方治七情氣鬱結聚痰涎狀如破絮或如梅核在咽喉間咯不出咽不下並治中脘痞滿痰涎壅盛上氣喘急半夏五兩茯苓四兩紫蘇葉二兩厚朴三兩右銼散每服四錢水一盞薑七片棗一枚煎八分不拘時候若因思慮過度陰陽不分清濁相干心氣不足小便白濁用此藥下清青白丸子最效婦人惡阻尤宜服之一名厚朴半夏湯一方又用半夏五兩人參官桂甘草各一兩生薑煎服名七氣湯大治七氣并心腹絞痛然藥味太甜恐未必能止疼順氣一方治七情所傷中脘不快氣不升降腹脅脹滿用香附子炒半斤橘紅六兩甘草一兩煎服尤快好事者謂其耗氣則不然蓋有是病服是藥茯苓丸一名指迷茯苓丸出危氏方本治臂痛其指迷方中云有人臂痛不能舉手足或左右時復轉移由伏痰在內中脘停滯脾氣不流行上與氣搏四肢屬脾脾滯而氣不下故上行攻臂其脈沉細者是也後人為此臂痛乃痰證也但治痰而臂痛自止如婦人産後發喘四肢浮腫遂用此藥而愈半夏二兩茯苓一兩枳殼半兩去穰麩炒風化朴硝一分右為末薑汁糊丸如梧桐子大每服三十丸生薑湯下風化朴硝時未易成但以朴硝撒在竹籃中少時成水置當風處即如芒硝刮取用亦可昔有人為痰所苦夜間兩臂覺有人抽牽兩手戰灼至於盞茶亦不能舉隨服隨愈痰藥方多立見功效者未有如此神效人之氣脈常欲周流以衛護榮養其身也凡一日一夜呼吸出入計一萬三千五百息血行於身八百一十度周流不息五十度而復大會如環無端焉是以習禪者趺坐究意觀想學仙者吐納引導按摩其知道者不為血氣所使所反所以運其血也其或喜怒哀樂不中節起居飲食失其常皆令營衛否齟氣血敗濁為痰為涎為飲諸證生焉結狀於胸膈則眩暈忪忡悸戄癃閉否膈喘嗽氣急停滯於關節則筋脈攣急肢節疼痛手足嚲曳寒熱往來三者同原而異治痰則伏於包絡隨氣上浮客於肺經因喘發涎則伏於脾原隨氣上嗌口角流出唯飲則生胃腑為嘔為吐宜詳甄别也治痰飲冷氣上衝胸膈滿悶吐逆不下飲食出聖惠方甘草一兩炙微赤銼桂心二兩半夏一兩湯洗七次去滑右為散每服三錢水一中盞薑半分煎至六分去滓不拘時溫服治心下有水不散胸中痰飲不能下食宜服此方出聖惠方白术一兩澤瀉二兩半夏一兩湯洗七次去滑右為散每服三錢水一中盞薑半分煎六分去滓不拘時溫服治痰飲胸膈不利宜服此方一名天南星九出聖惠方半夏三兩天南星二兩白礬灰一兩右先以半夏天南星二味醋漿水煮一日曬乾搗羅為末研入白礬灰令勻以蒸餅和丸如梧桐子大每服不計時以生薑湯下二十丸日三服倍术丸出直指方治五飲酒癖一曰留飲停在心下二曰癖飲水在兩脅下三曰痰飲水在胃中四曰溢飲溢在膈上五臟間五曰流飲水在腸間動搖瀝瀝有聲皆因飲酒冒寒或飲水過多所致及痰飲膈間虛滿留滯痰飲食即惡心常欲吐逆腹中時鳴脅下多悸轉側有聲小便不利水漬胃中大便溏泄肢體煩倦不思飲食乾薑半斤炮肉桂半斤去皮白术一斤右為末煉蜜為丸如梧桐子每服二十丸溫米湯下加至三十丸空心日二服一方加附子除乾薑肉桂玉塵散出百一選方治大人小兒痰實咳嗽氣促喘滿咽膈不利天南星去皮半夏各用湯洗七次切片焙桑白皮自採土下者桔梗各等分右為粗末每服三錢水一盞半生薑如錢大七片煎至八分去滓溫服不拘時候一方加五味子各等分人參枳殼湯出御藥院方治消痰利膈下氣潤腸胃消導一切氣人參一兩去蘆頭枳殼一兩麩炒去穰陳皮三兩去白半夏二兩半湯洗七次右㕮咀作一劑每用藥二兩半一服水二大盞半先揚水二百一十遍生薑一錢匕熬至六分去滓食後溫服如大便祕加白蜜少半匙再熬蜜消服之茯苓湯一名甘草湯出三因方治心疼不行鬱而生涎胃脅支滿目眩胸中有痰氣也茯苓四兩桂心三兩白术三兩甘草二兩炙右為散每服四大錢水一盞半煎至七分去滓溫空心服小便利則愈或嘔痞眩悸以半夏五兩茯苓三兩每服四大錢薑七片煎或半夏一味薑十片煎亦良病人臍下有悸涎盛而眩與五苓散痰迷心孔如癲癎狀與紅丸子辰砂衣煎橘葉湯濃煎下一名小鎮心丹大半夏湯出御藥院方治痰飲及脾胃不和半夏二錢半陳皮二錢半白茯苓二錢半去皮右㕮咀生薑二錢半細切水二鍾半煎一盞去滓臨卧溫服如熱痰加甘草少許胃不和去甘草加陳皮白礬丸出仁存方治停痰宿飲風氣上攻胸膈不利半夏一兩白礬半兩為末香附一兩皂角水浸透右為末生薑自然汁糊丸如桐子大每服三四十丸薑湯下葉氏清壺丸出簡昜方治痰飲半夏一斤天南星半斤神麴半斤右為末生薑自然汁和餅焙乾每麴四兩入白术枳實四兩丸如梧桐子大每服五十丸薑湯下枳實半夏湯出淡潦方治痰飲停積頭目昏重嘔噦惡心胸膈痞悶咳嗽氣塞項背拘急半夏一兩橘紅一兩枳實半兩右㕮咀加生薑煎服一方每服四錢生薑十片水一盞煎七分溫服橘皮二兩天南星四兩草果子四兩炮去皮右㕮咀每服四錢薑二十片水二盞煎一盞去滓食前空心服玉液散出御藥院方治胃虛有痰咳嗽嘔逆不思飲食煩燥惡心半夏十兩湯洗七次生薑一兩細切去皮陳粟米一兩揀淨右同焙乾研為末每服二錢水二盞薑三片同煎六分溫服不計時候一方無生薑煎控涎丹出仁存方治凡人忽患胸背手腳頸項腰胯隱痛不可忍連筋骨牽引鉤痛坐卧不寧痰飲停積胸腹結為塊喘滿不安痛連胸脅時時走易不定俗醫不曉謂之走注便用風藥及灸針皆然無益又疑是風毒結聚欲為癰疽亂以藥貼亦非也此乃是痰涎伏在心膈上下變為此疾或令人頭痛不可舉或神意昏倦多睡或飲食無味痰唾稠粘夜間喉中如鋸聲多流睡涎手腳重墜冷氣脾脈不通誤認為癱瘓亦非也凡有此疾但以是藥不過數服其疾如失甘遂紫大戟去皮白芥子真者各等分右為末煮糊為丸如梧桐子大曬乾食後臨卧淡薑湯或熟水下五七丸至十丸如痰猛氣實加丸數不妨其效如神以下利去痰飲為愈天香飲子出百一選方宿砂仁三兩天南星四兩湯洗香附子四兩擦淨右㕮咀每服四錢生薑十五片水二盞煎至八分食前服或用薑糊丸亦得神仙墜痰丸出瑞竹堂治痰壅胸痞氣腠此藥下痰黑牽牛一斤取頭末四兩皂角無蟲蛀者去皮弦酥炒黃色去子淨一兩六錢生白礬一兩二錢右為細末清水為丸如梧桐子大每服三五十丸漸加至百丸空心調酒下看病輕重病重者五日十日一服病輕者半月一月一服永無癱瘓之疾神聖餅子出瑞竹堂治痰及一切頭風豬牙皂角一錢炮存性淨末玄胡索一錢淨末青黛半錢研右為細末滴水為丸如梧桐子大揑作餅子曬乾每服用一餅新水化開男左女右仰面用葦筒鼻內灌之口咬銅錢一十五文待涎出頭風更不再發神术丸出直指方治痰飲妙茅山蒼术一斤米泔浸一宿去皮切作片焙乾為末大棗十五枚煮取肉研旋入麻漿拌和藥生麻子半兩水二盞研細取漿右為末丸如梧桐子大晒乾每服五七十丸空心溫湯下三倍丸出御藥院方治溫中下氣胸膈痞悶止痰逆嘔吐腹脅脹痛半夏三兩生薑製青皮二兩去白木香一兩右為末生薑汁麵糊為丸如梧桐子大每服三十丸不拘時生薑湯下小半夏湯出千金方治病心腹虛冷遊痰氣上胸膈脅滿不下食逆者半夏一斤生薑一斤橘皮四兩右㕮咀以水一斗煮三升分三服若心中急及心痛內桂心四兩若腹滿痛內當歸三兩羸瘦者及老人尤宜服之一方用人參二兩仲景無橘皮人參三仙丸出醫方集成治中脘氣滯胸膈煩滿痰涎不利頭目不利天南星生去皮半夏沸湯泡七次與天南星各五兩碾為細末用生薑汁和不可太軟但手揑得聚為度灘在篩內用楮葉蓋之令黃色曬乾收之須是五六月內做麴如醬黃法香附子五兩略炒於磚上磨去毛右用南星半夏麴餅子二兩淨香附子一兩同為細末水煮麵糊和丸如梧桐子大每服二十丸食後臨卧生薑湯送下人參化痰丸傳信適用方治痰右以半夏大者切四塊先以湯浸七遍却以蘿蔔切作大片拌勻用水慢火煮直候嘗其味不襲人方止焙乾去蘿蔔不用入人參等分為末水浸蒸餅丸如梧桐子大生薑湯下食後服玉粉丸出拔萃方治氣痰咳嗽脈澀面白氣上喘促酒淅寒熱悲愁不樂南星一兩湯洗半夏一兩湯洗橘皮二兩去白右為細末湯􅔻餅和丸如梧桐子大每服三十丸人參生薑湯食後下局方中桔梗湯亦可橘皮茯苓丸出經效濟世方降氣消痰寬膈和胃進美飲食去濕利水橘皮半斤去穰候乾稱四兩為末取生薑汁和為餅子曬乾白茯苓三兩枳實半兩微炒右為細末麵糊為丸如梧桐子大每服五六十丸溫熟水食後下白术丸出拔萃方治痰食咳嗽脈緩面黃肢體沉重嗜卧不起腹脹而食不消局方中防己丸亦可南星一兩湯洗半夏一兩湯洗白术一兩半右為細末湯浸蒸餅和丸如梧桐子大每服五七十丸薑湯食後下吳仙丹一名茱苓丸治痰飲上氣不思飲食小便不利頭重昏眩白茯苓赤者亦可吳茱萸湯泡去末各等分右為末煉蜜和丸如梧桐子大每服三十丸不拘時候熟水下酒飲亦可常子正中丞苦痰飲每啖餐食飽或晴陰變率同十日一發頭痛背寒嘔吐酸汁即數日伏枕不食如千金大五飲丸之類皆不效宣和初為順昌司祿於太守蔡公安持達道席上得此方服之遂不再見每遇飲啖過多腹滿服五七十丸三兩時便旋已作茱萸氣酒飲隨小水而去前後痰藥甚衆無及此者梅揚卿方只將茱萸酒浸三宿以茯苓細末拌之乾每服百餘粒湯酒任下療痰飲頭痛往來寒熱方恆山一兩雲母粉二兩右為散熟湯服方寸匕吐之止若吐不盡更服生蔥生菜深師方用雲母半兩橘皮半夏湯出仁存方治脾胃弱好食酸冷寒痰停積嘔逆惡心涎唾稠粘或積吐粥藥不下手足逆冷目眩身重又治傷寒時氣欲嘔不嘔欲吐不吐昏憒悶亂或飲酒過多中寒停飲喉中涎聲乾嘔不止痰壅唌嗽久不已者常服養液潤燥解肌熱止嗽陳皮七兩去白半夏七兩煮右銼散每服三錢生薑十片水二盞煎至一中盞去滓溫服不拘時候兩滓併煎大人參半夏丸出宣明論治化痰墜涎止嗽定喘或風痰酒痰茶痰食痰一切痰逆嘔吐痰厥頭痛或風氣壅頭目昏眩或耳鳴鼻塞咽膈不利心腹痞悶筋脈拘急體倦麻痺不知疼痛常服宣通氣血清利頭目調和臟腑美進飲食方見咳嗽門痰嗽類川芎丸治膈上有痰川芎二兩細碎慢火焙熟川大黃二兩蒸令極熟右為末用不蛀皂角五七挺溫水揉盡絹濾去滓瓦器內熬成膏和丸如菉豆大每服十五丸生薑湯下小兒三丸化痰涎方明礬一兩枯過白殭蠶半兩去頭腳絲右為末研生薄荷令爛為丸如菉豆大每服二十丸薄荷湯下日三服一方治風氣膈上痰飲右用不開口苦瓠湯煮三五沸以物裹尉心上膈法製白半夏治觸冒感寒咳嗽消飲化痰壯脾順氣右用上好半夏湯洗七遍去臍輕焙乾再洗如此七遍用濃米泔浸一日夜取出控乾每半夏一兩用白礬一兩半研細溫水化浸半夏上淹水兩指許頻攪冬月放暖處五日夜取出輕焙乾用鉛白霜一錢溫水化又浸一日夜通七日盡取出再用漿水於慢火煮勿令滚候漿水極熟取出控乾放銀石或磁器內存貯每服一兩粒細嚼溫生薑湯下食後一法依前製成半夏每一兩用白礬水少許浸半夏細飛硃砂末淹一宿飲乾焙用依前法可用生薑汁清焙用搜飲丸右用木瓜一箇切下頂作罐兒去穰用生白礬半夏麴等分為細末填在木瓜內却用原頂蓋定用麻縷劄縳於飯甑上炊兩次爛研以宿􅔻餅為丸不拘多少但和得聚即止如梧桐子大每服三五十丸生薑湯下不拘時候一方治積聚痰飲不下食嘔逆及腹內諸疾右以續隨子研碎酒服之不過三顆當下惡物赤石脂散治痰飲盛吐水無時節病源為冷飲過度遂令固冷脾胃虛羸不能消食飲食飲入胃皆變成冷水反吐不停者赤石脂三斤右搗下篩服方寸匕日三酒飲並可稍稍加至三匕服盡三斤則終身不吐水又不下利補五臟令肥健有人素患痰飲諸藥不瘥惟服此一斤則愈或薑湯調服亦可天南星九治痰飲右以天南星不拘多少先燒一地坑令通紅以酸醋潑之置南星於內物覆其上又以泥土泥合勿令泄氣經一夕取出去赤皮為末再以半夏末以薑汁為糊丸南星如梧桐子大每服三四十丸食後生薑湯下製半夏法右用齊半夏二斤河水洗七遍白礬二斤為末用醋漿水三碗同入磁甕中浸用退皮濕柳棒折二寸粗長二尺一根攪一十遍候四十日嘗試如不戟喉方成取出用布袋盛沉至井底十日取出㬗乾每服一兩粒生薑湯嚼下或細細嚼服亦得二賢湯治痰以橘皮為主須用真洞庭陳者溫水浸去其內穰白取紅一斤甘草鹽各四兩水五碗慢火煮焙乾搗為細末點服又古方用陳橘紅四兩炙甘草一兩為末湯點服以治痰極有驗世醫但知用半夏南星枳實茯苓之類何足以語王璆使君外舅莫強中服之腹痛利下物數塊如鐵彈子臭不可聞舊時食後胸滿之疾豁然頓愈弔痰膏右用皂角二斤水五碗煎至一碗去滓淨一碗內再熬成一鍾於煻灰上用紙倒膏在紙上用半夏醋煮過成膏子入皂角膏內和勻明礬三兩末同和入松楊柿搗為丸如彈子大噙化一方治痰壅嘔逆心胸滿悶不下飲食右用厚朴一兩塗生薑汁炙令黃為丸非時粥飲調下二錢一方治主胸中伏熱下氣清痰下食右陳皮半兩熬作末如茶法煎呷之一方治胸膈壅滯去痰開胃右用半夏淨洗焙乾搗羅為末以生薑自然汁和為餅子用濕紙裹於慢火煨令香熟水兩盞用餅子一塊如彈子大丸入鹽半錢煎取一盞溫服能去胸膈壅逆大壓痰毒及治酒食所傷其效神驗治痰潤心肺右用貝母為末沙糖為丸含之嗽自止半星丸出經效濟世方右以南星半夏各四兩為末爛薑半斤研搗銼半星為丸以楮葉裹縛却於草中罨之如治麴法候乾去皮入香附子四兩為末薑汁麵糊為丸如梧桐子大每服三四十丸食後生薑湯下生犀丸出肘後方治痰清目進飲食右以川芎十兩緊小者粟米泔浸三日取出切片子日乾為末作兩料每料入麝香香腦各一方生犀半兩重湯煮蜜搗為丸如小彈子大茶酒嚼下一丸痰加硃砂半兩膈壅加牛黃一丸水飛鐵粉一分頭目昏眩加細辛一分口眼歪斜加炮天南星一分烏巴丸出經驗良方治胸膈間久年頑痰為害積成痰氣面目青白色無時浮腫全不進食遍身疼痛夜間上壅不得睡卧往來寒熱手足疼痛不能轉側前後用南星半夏黑錫靈砂不計服數墜之則不下取之則不出此是痰母堅滯宜用此藥須臾利下頑痰如魚凍如未利再服此藥洞利可卜終身無痰疾矣大烏梅肉三兩巴豆五粒去皮殼膜右用水二碗於瓦石器內將烏梅慢火煮爛候水稍乾入巴豆在內將竹箆攪直候如乾糊方住火攤冷研爛就丸如菉豆大每服七丸九九二十一丸或十五丸薑湯下治膈壅風痰用半夏不拘多少酸漿浸一宿溫湯洗五七次去惡氣日中曬乾搗為末漿水搜作餅子日乾再為末入生腦子一錢研勻以漿水和作丸如雞頭大紗袋盛通風處陰乾每服一丸煎好茶或薄荷湯下祛風丸出衛生家寶方有人味喜鹹酸飲酒過多色欲無戒作成痰飲聚於胸膈滿則嘔逆惡心涎流一臂麻木升則頭目昏眩降則腰腳疼痛深則左癱右瘓淺則蹶然倒地此藥寬中祛痰搜風理氣和血駐顔延年益壽半夏四兩生薑四兩一處拌作餅隂乾白礬一兩生用荆芥四兩去土槐角子一兩麩炒黃陳皮一兩去白硃砂一兩水飛半入藥半為衣右為細末用四兩生薑汁麵糊為丸如梧桐子大每服三十丸生薑湯或皂角子仁湯送下早晚臨卧一服韻薑餅子出楊氏家藏方溫中降氣破飲逐痰療酒食過傷肢體怠惰除口氣爽心神如酒病尤宜服之半夏四兩為末生薑汁搜和作餅子焙乾為末再用薑汁和焙如此三遍為度檀香一兩半生薑一斤切作片子以青鹽二兩研細同淹一宿於日中曬乾如無青鹽只用食鹽杏仁湯洗去皮研成膏二兩右為細末用白麵二兩蜜水煮糊入杏仁在內搜和以印子脫諸花樣如錢大每服一二錢細嚼沸湯送下參橘丸出朱氏集驗方壯脾進食消飲下痰人參二兩神麵二兩半夏二兩炮七次縮砂仁二兩麥蘖二兩白茯苓四兩去皮橘紅一斤去白用生薑一斤同搗曬乾右為細末薑汁打糊為丸每服五十丸薑湯下熟水亦得平胃丸出朱氏集驗方平胃消痰平胃散四兩半夏四兩薑製好棗一百枚燈心草一小把右水一大碗煮候棗爛去燈心草用棗去皮核取肉為丸如梧桐子大每服五十丸薑湯下安脾散出朱氏集驗方白术白豆䓻仁炒香附子炒人參甘草右等分白湯點服平肺散出楊氏家藏方用獖豬肉四兩起薄作三片以皂角三寸將水浸後撚去水用膩粉二錢擦入肉內以濕紙裹煨至五更時爛嚼以淡薑湯或桑白皮煎湯下至日午瀉下痰涎是病根也白术湯保命集方治痰潮上如湧水久不可治者白术白茯苓半夏各等分右為末每服半兩病大者水二盞生薑煎至一盞取清調神麴末二錢頓服之病甚者下玉壺丸一百丸大效永除根枳殼湯出保命集方治久痰胸膈不利者多上焦發熱枳殼三兩麩炒去穰桔梗三兩黃芩一兩半右同銼每日早用二兩半水三盞煎至二盞勻作三服午時一服申時一服臨卧時一服三日七兩半藥盡服生半夏湯半夏丸出保命集方治因傷風而痰作喘逆兀兀欲吐惡心欲倒已吐加檳榔三錢半夏一兩湯洗切雄黃三錢研右同為末生薑汁浸􅔻餅為丸桐子大生薑湯下小兒丸如黍米大天麻丸出保命集方天麻一兩半夏南星雄黃少許右以白麵二兩滴水為丸如桐子大每服五十丸至百丸煎淡水令沸下藥煮十餘沸漉出食前生薑湯下玉粉丸出保命集方治痰結咽喉不利語音不出半夏五錢洗草烏一錢炒桂一錢灸右用為末生薑汁浸􅔻餅為丸如雞頭大每服一丸至夜含化多歲不愈者亦效加減黃連解毒丸出海上居士祕方治肺痿壅熱下寒氣胸膈不利痰涎食飲不欲脛酸腿困行步艱難膈痛咽乾便溺赤黃陰痿腿膝困倦常服愈效黃連半兩當歸二錢半芍藥二錢大黃一兩黃芩一兩滑石二兩黑牽牛一兩頭末微炒右為細末水丸如豆大每服四十丸百沸湯送下食逺臨卧忌酒乾薑胡椒等物人參前胡散出御藥院方治痰氣客於上焦嘔吐胸中痞悶不欲飲食頭目昏眩並皆治之前胡二兩去苗人參二兩紫蘇葉二兩赤茯苓二兩陳皮半兩不去白半夏半兩湯洗切甘草半兩木香半兩枳殼半兩麩炒去穰右為粗末每服三錢水一大盞半生薑七片同煎至一盞去滓溫服不拘時候病愈即止服濟生導痰湯出醫方集解治一切痰涎壅盛或胸膈留飲痞塞不通半夏四兩湯洗七次去滑天南星一兩炮去皮枳實一兩去穰麩炒赤茯苓一兩去皮橘紅一兩去白甘草半兩炙右為㕮咀每服四錢水一盞薑十片煎至八分食後溫服半夏利膈丸出德生堂化痰墜涎定喘止嗽除嘔逆痰厥頭疼風氣之證白术一兩人參一兩白茯苓一兩白礬一兩滑石一兩貝母一兩天南星一兩半生白附子二兩生半夏三兩炮洗木香一兩右為細末水糊為丸如梧桐子大每服三五十丸生薑湯無時下四倍丸出德生堂治諸痰證多驗兼療手臂背疼痛木香一兩陳皮二兩茯苓四兩半夏八兩洗炮右為末生薑汁打糊為丸如梧桐子大每服五七十丸溫酒無時下辰砂化痰丸出德生堂治風氣上攻頭目昏眩痰涎壅盛心神不定此藥主之白礬半兩飛過辰砂半兩研飛南星一兩炮半夏三兩洗炮用生薑汁和作餅子曬乾為末右為末生薑汁打糊為丸如梧桐子大以硃砂為衣每服二十五丸生薑湯食後服小兒三二丸生薑薄荷湯下消痰丸出德生堂治痰壅為患牽牛取頭末四兩一半炒一半生槐角子半兩青皮半兩半夏一兩湯洗七次焙乾皂角一兩肥不蛀者去皮子炒黃色右為末生薑麵糊丸如小豆大每服二十丸加至三十五丸卧後生薑湯下三生丸出德生堂治氣痰壅上不升降胸膈悶塞不通皂角一斤去皮子牽牛二斤頭末白礬半斤蘿蔔子半斤炒青木香半斤右為末煮蘿蔔水麵糊為丸如梧桐子大每服三五十丸溫水食後臨卧服大便下痰方見效半夏利膈丸出德生堂治風痰酒痰茶痰食痰氣痰諸痰為苦致令手臂肩背胸膈俱痛吐出痰如結核黑色腥臭者此藥主之牽牛取頭末四兩肉一半炒皂角二兩不蛀肥者去皮子酥炙檳榔一兩麵煨齊州半夏一兩製青皮二兩去皮槐角子半兩炒右細末生薑打麵糊為丸如梧桐子大每服三十丸至五十丸生薑湯或溫水食後服醉鄉寶屑傳信適用方能寬中化痰治嘔吐惡心醒酒醉後雅宜隨意服之陳皮四兩縮砂四兩紅豆一兩六錢甘草二兩四錢生薑一斤已上並㕮咀鹽一兩丁香一錢銼白豆䓻仁一兩半巴豆八粒不去殼用鐡線穿定右九味同用水煮焙乾去巴豆不用消飲丸利膈下痰散飲去滯半夏一兩湯洗七次陳皮半兩焙青皮半兩焙枳實半兩去穰麩炒乾葛半兩焙生薑半兩炒右為細末薑糊為丸如梧桐子大每服五七十丸茶酒任下親戚沈開祖方余今常服之小黃丸化痰止涎除濕和胃氣胸中不利黃芩一兩乾薑一錢半白术五錢半夏五錢湯洗薑汁製澤瀉二兩黃茋三錢陳皮三錢去白青皮三錢去白右為細末湯浸鉦餅為丸如菉豆大每服三五十丸食逺溫水送下一方無青陳皮黃芩利膈丸除胸中熱利膈止痰生黃芩一兩炒黃芩一兩南星三錢半夏半錢黃連五錢枳殼三錢白术二錢陳皮三錢澤瀉五錢白礬半錢右件為細末湯浸􅔻餅為丸如梧桐子大每服三五十丸溫水食逺送下忌酒濕麵半夏湯治痰飲不利胸膈痞悶不思飲食半夏麴一兩神麴一兩微炒麥蘖半兩炒甘草二兩生薑六兩去皮濕紙裹慢火煨熟切作片子爛研同上四味揑作餅子杏仁一兩半丁香半兩焙陳皮鹽四兩炒右為細末每服一二錢沸湯點之消飲丸茯苓三兩乾薑三兩炮白术八兩枳實半兩炒右為末煉蜜丸如梧子大每服十五丸米飲下溫肺丸治脾胃不和胸膈停痰嘔吐惡心吞酸噫醋心腹痞滿咳嗽不止頭目昏痛白术一兩丁香一分乾薑一兩炮半夏二兩湯浸七遍生薑汁浸一宿焙乾右件同搗羅為末生薑汁煮麵糊和丸如菉豆大每服二十丸生薑湯下腹痛食前嘔吐逆食後生犀半夏丸治心肺疼熱盛氣促咳嗽生犀屑半兩入磁臼中搗為細末白茯苓一兩去皮半夏一兩用生薑四兩去皮細切同搗令爛製作餅桂心七錢半右件為細末以生薑自然汁煮麵糊為丸如菉豆大每服三十丸生薑人參湯下食後生薑橘皮丸升降滯氣消飲去痰溫中散寒快膈美食陳橘皮一斤去白生薑一斤洗薄切片神麴二兩微炒右件同為細末麵糊為丸如梧桐子大每服五七十丸至百丸米飲熟水送下食後無問長幼皆可服聖金丸治停痰宿飲上喘咳嗽嘔逆頭痛全不入食半夏用生薑自然汁浸兩宿取出切成片子新瓦上焙乾威靈仙淨洗去根土焙乾稱右件各三兩為細末用不蛀皂角五七定河水一碗揉皂角為汁濾去滓用銀石器內熬成膏和上件藥丸如菉豆大每服七丸至十丸生薑湯下空心日午臨卧各一服至一月飲食增進為驗忌茶梅膏丸化痰止咳嗽定喘消停飲烏梅四兩巴豆十四枚去殼用水三碗同烏梅一處煮水盡留巴豆七粒同烏梅肉研為膏白礬一兩生用半夏二兩湯洗七次焙乾葶藶子一分炒欵冬花一分皂角一分炒黃去黑皮稱馬兜鈴一分人參一分去蘆頭右件為細末入膏子內圓如菉豆大每服五七丸用生薑湯送下食後服如喘促痰嗽煎桑白皮蘿蔔湯下生半夏丸化痰利膈尤治嘔半夏一兩湯洗七次檳榔一錢丁香一錢右為細末生薑自然汁煮薄糊為丸每服三十丸食後薑湯吞下一法小銚內泄令熱傾入盞內小匙挑服仍啜其汁咽之壞痰丸治痰涎壅盛服藥未退頭重心煩飲食不下硇砂二大分寒水石半兩猛火燒透赤好酒內淬五七次取出定粉一大分水銀二大分將定粉於盞內與水銀同研旋旋滴水冷研令似乳汁用蜜陀僧一大分半夏半兩熱酒洗一度薑汁浸一宿用龍骨一分右件七味為末生薑自然汁煮麵糊為丸如菉豆大研好硃砂度過每服一丸至二丸生薑龍腦水下不嚼人參半夏丸墜痰化涎半夏一兩生薑四兩取汁先以湯洗半夏七遍浸三日後於日內晾乾切作片子焙乾用北礬一兩研赤茯苓一兩去皮天南星半兩生用人參二錢半右件五味同杵為細末篩羅以蒸餅水浸過却用紙裹煨熟為丸如菉豆大每日空心夜卧用淡生薑湯下十五丸開胃口薑棗湯下風涎皂角一寸薑三片蘿蔔三片同煎湯下開胃丸子出護命方人參一兩半夏半兩薑汁製煮右為末以京棗肉丸如梧桐子大非時熟水下十五丸丁香半夏丸出十便良方溫益肺胃思進飲食治咳嗽嘔吐胸膈痞滿消痰飲癖止心嘈煩半夏二兩白术一兩丁香一分右搗羅為細末以薑汁煮麵糊為丸如桐子大每服二十丸用薑湯下一名溫白丸服蒼术法出十便良方北方常服化痰消堅殺蟲豫患癖飲三十年多嘈雜痰飲上潮即吐有時急飲酒半杯即止蓋合此證也因讀巢氏病源論酒瘕云飲酒多而食穀少積久漸瘦其病常思酒不得酒則吐多唾不復能食胃中有蟲使然名為酒瘕此藥治之要之須禁酒即易治不禁無益也豫平生有二疾一則臟腑下血二則膈中停飲下血有時而停飲則無時始因年少時夜坐為文左向伏几是以飲食多墜向左邊中夜以後稍困乏必飲兩三杯既卧就枕又向左邊側睡氣壯盛時殊不覺三五年後覺酒止從左邊下漉漉有聲脅痛飲食殊減十數日必嘔數升酸水暑月止是右邊身有汗微微常潤左邊病處絶燥遍訪名醫及海上方服之少有驗間或中病止得月餘復作其補則如天雄附子礬石其利則如牽牛甘遂大戟備嘗之矣豫後復度之已成癖囊如潦水之有科臼不盈科不行水盈科而行也清者可行濁者依前停滯蓋下無路以決之也是以積之五七日必嘔而去少寬數日復作脾土惡濕而水則流濕莫若燥脾以勝濕培土以填科臼則疾當去矣於是悉屏諸藥一味服蒼术三月而疾除自此一向服數年不吐不嘔胸膈寬快飲食如故暑月汗周體而身涼飲亦當中下前此病處少汁目亦多昏眩其後燈下能書細字皆蒼术之力也其法蒼术一片去皮切末之用生香麻油半兩水二盞研濾取汁大棗十五枚爛煮去皮核研以麻油勻研成稀膏搜和入臼熟杵丸如梧桐子大乾之每日空腸用溫湯吞之五十丸增至一百丸二百丸忌桃李雀􅀈初服時必膈微燥但以茅术制之覺燥其進山梔極有力亦自然不燥也山梔數用山梔子一味乾之為末沸湯點服故知多坐不可伏在一邊時或行動亦消息之法參蘇飲出如宜方治陰陽痞膈氣結凝痰為熱木香半兩枳殼半兩桔梗半兩甘草半兩炙陳皮半兩製蘇葉七兩乾葛七兩半夏七兩製前胡七兩人參七兩茯苓七兩右㕮咀薑七片棗六枚煎熱多痰稠鼻塞宜金沸草散金沸草散出鮑氏方治有熱多頭目昏重痰涎壅塞大便堅而燥荆芥四兩旋蕧花三兩前胡三兩麻黃三兩甘草一兩半半夏一兩半赤芍藥一兩半細辛一兩半五味子一兩半杏仁一兩半右為散每服三錢薑三片棗一枚煎大半夏湯出如宜方治氣鬱生痰聚結不散腸間漉漉有聲及反胃嘔吐半夏製人參四錢右㕮咀薑七片一方入蜜煎亦治膈間支飲蘇子降氣湯出如宜方治虛陽上攻痰涎壅盛氣不升降上盛下虛方見喘門喘類青靈丸出如宜方治老人元氣衰弱痰氣上攻睡卧不安靈砂青州白丸子右薑汁糊為丸薑湯下又以靈砂一兩丁香木香胡椒各半錢為末杵丸如菉豆大每服六十丸薑湯下名靈砂丹八味丸出如宜方治腎虛不能自養邪水溢上吐多痰唾牡丹皮三兩茯苓三兩澤瀉三兩山茱萸四兩山藥四兩附子三兩桂三兩熟地黃八兩右末蜜丸如梧桐子大每服十五至二十五丸溫酒空心日二服四磨湯出如宜方治七情鬱滯痰氣上壅喘急聲促人參檳榔沉香烏藥等分右用水磨濃共煎三五沸服蜜煎主寒熱出千金方蜜五合恆山二兩甘草二兩右三味取二味㕮咀以水一斗煮取二升去滓內蜜五合溫服七合吐即止不吐更服七合勿與冷水一方用甘草半兩又方出千金方蜜二合醋八合右二味調和平旦頓服須臾腹內嘈雜苦意中不適明旦更服無不大嘔安穩星砂丸出永類鈴方溫中化痰兼化宿滯生冷果實夏月可配消暑丸南星四兩洗焙良薑四兩焙砂仁一兩右細末薑自然汁煮麵糊丸如梧桐子大薑湯下又方只用南星砂仁二味玉壺丸出朱氏集驗方治一切痰疾大半夏二十五兩雪白南星一十五兩右二件用野外地上清潔水滿浸逐日換水浸五日將半夏切作兩片南星大者切作六片中者切作四片再逐日換水浸五日足每五兩研細末生白礬一兩添半夏南星則亦添礬却用井水浸須令水滿只此水浸一月日取半夏或南星嘗看以不麻為度如尚麻更浸候不麻漉起曬乾用和腳下水浸礬碾細收之每服七兩入全蝎七箇炒白附子二錢半為末炒甘草二錢和勻用炊餅乾末二兩半用生薑半斤研取自然汁煮炊餅末和為丸如梧桐子大或乾添些白湯為丸每服二三十丸隨意咽下亦可此藥不問是何證候痰涎作壅或有異證風證小兒驚癎之類應手而愈多服之無妨勿拘二三十丸之説以薑白湯將藥咽下皆可無病人咽服二三十丸再加永無痰症半夏湯出朱氏集驗方痰飲南星四兩半夏四兩生薑半斤皂角二定右以白水淹過藥一寸許同煮乾仍用溫水浴過銼片日乾為末入丁香縮砂各半兩甘草一兩半入熟粟米半斤空心沸湯點服煮浮丸出朱氏集驗方治痰壅眩暈南星生半夏生防風天麻麵生右等分滴水為丸如梧桐子大先煮湯令沸滚方下藥四五十丸煮一二滚藥浮取漉出用薑湯吞下不拘時候玉液湯出朱氏集驗方治痰疾半夏用揀好者不拘多少湯洗白淨切作片如紙薄用右每服半兩水二盞薑三十片慢火煎至七分濃磨沉香水一盞傾入藥內再煎兩沸食後臨卧服玉浮丸出朱氏集驗方治痰吐頭痛極妙天南星一錢半削去皮半夏一錢半陳皮一錢去白白术一錢茯苓一錢附子一錢去皮臍右件各生為末用生麵隨多少拌勻生薑自然汁丸如梧桐子大用滚湯煮熟次用藥現成湯加生薑自然汁下二十丸不拘時候白术丸出朱氏集驗方治痰飲以久服多服而後效白本八兩半夏二兩湯泡七次赤茯苓二兩去皮乾薑二兩肉桂二兩去皮枳殼二兩麩炒右為細末生薑自然汁煮麵糊為丸如梧桐子大服多至二十丸日三服赤茯苓湯出朱氏集驗方治停飲於胸胃怔忡不已赤茯苓一兩去皮半夏一兩泡茯神一兩去皮陳皮一兩麥子一兩沉香兩半甘草兩半檳榔兩半右㕮咀每服三錢水一盞薑五片煎七分空心服取效神效白术丸出衛生家寶方治壅喘嗽不下飲食半夏八兩湯泡洗七次去滑神麵六兩右為細末生薑自然汁和作餅子以紙裹當風處候乾用麵一兩白术一兩同為末生薑自然汁丸如梧桐子大每服三十丸薑湯下無時四金丹出衛生家寶方治風痰壅咳嗽不已桔梗一兩炒防風一兩白礬一兩枯雄黃半兩研右為末水浸蒸餅丸如雞頭子大每服一粒綿裹含化硝礬丸出衛生家寶方治痰涎壅結咳嗽咽痛白礬焰硝各等分右為細末鐵鍋子內按實以生茶葉數片蓋之火煆通紅伏火為度茶葉旋添直待伏火却連鍋子入地坑一宿取出為細末糯米粥為丸如梧桐子大硃砂為衣每服三丸薑湯送下食後臨卧服化痰丸出衛生家寶方治痰涼膈止嗽治頭眩天南星生用半夏生用薄荷葉人參茯苓白礬右等分為細末生薑汁麵糊為丸如梧桐子大每服三十丸生薑湯下食後服煮朴丸出衛生家寶方治諸痰疾和中止嗽厚朴十二兩去皮稱細切天南星六兩取大者捶碎大棗六兩拍破半夏六兩皮細者捶碎右四味用生薑一片切作薄片貯銀石器內水高藥三寸許慢火煮一日旋添水煮熟焙乾燥再入白术六兩人參三兩大香附子六兩青橘皮六兩並為細末用神麴煮糊為丸如梧桐子大食空臨睡生薑湯送下吞四十粒鐵刷丸出衛生家寶方化痰實寬利胸膈清頭目降氣止嗽去停飲圓淨半夏四兩湯浸洗七次焙乾稱緊實檳榔四顆右為細末生薑自然汁煮麵為稀糊丸如菉豆大每服三十丸淡薑湯吞下食後臨卧服小兒服七丸或别小丸亦得導氣丸出衛生家寶方治痰涎壅盛降氣逐風半夏二兩用皂角五定挼汁浸一宿控乾切作片子南木香半兩赤茯苓一分紫蘇葉半兩白附子一分右為細末水煮麵糊為丸如梧桐子大食後每服三十丸生薑湯下不拘時生胃丹出朱氏集驗方生胃氣消痰沫開結寬膈進食粟米四兩溫水浸透炊作飯火焙氣垂熟用生薑自然汁和濕再乾如是製七次人參一兩粉天南星二兩薑汁浸一宿次日再用生薑汁和紙拌黃土泥裹南星曬乾黃泥用慢火煨半日泥焦乾為度候冷取出南星入藥白术三兩茯苓三兩陳皮一兩白豆䓻仁一兩縮砂仁一兩麥蘖一兩炒半夏麴一兩青皮一兩蓽澄茄一兩石蓮肉一兩南木香三錢右件精㨂製同為細末米粉糊為丸如菉豆大每服五六十丸薑湯下食前服妙應丸出永類鈴方治老人一切虛寒痰癖積塊攻脹疼痛附子一箇七錢重去皮臍剜作罐子硇砂三錢用水一盞在泥盆中火上熬乾稱木香七錢半破故紙一兩炒蓽撥一兩右以飛過硇砂末分在附子罐內却用所剜附子末蓋口以水和白麵褁約半指厚慢火煨令黃熟去麵同木香等為末將煨過熟黃麵醋調煮糊為丸如菉豆大每服二十丸食後薑湯下如神湯出朱氏集驗方治痰證嘔吐連日不效半夏子炒神麴不拘多少炒黃色去半夏留神麴丁香右用三味水一盞半煎至八分其藥自然成濃汁不妨通日服其疾即止用此藥下養正丹甚效治痰飲下水腫及痰瘧出本草以接骨木根皮煮汁服之當利下及吐不可多服治攝痰涎出本草以益智仁含之佳除痰止渴令人不睡出本草以決明葉火炙作飲甚香下痰出本草以風痰母煎灸之治嘔心逆膈痰唾用蓮子乾者六枚炒令黃色為末以熟水半盞調服即止又方用糟笋節中水汁和乳并牛乳飲之治胸心痰飲傷寒熱病瘴瘧須吐者以鹽末一大匙和暖湯送下須即吐不快明旦更服甚良法也導引法養生方云左右側卧不息十二通療痰飲不消又有餘病右側卧有飲病左側又有不消氣排之左右各十二息療痰飲普濟方卷一百六十五
