body:
  text: 普濟方卷一百九十四明周王朱橚撰水病門水腫胸滿氣急附論內經論水病謂其本在腎其末在肺又曰肺為喘呼腎為水腫氣否滿塞於胸中故有胸中滿急之證蓋由腎虛既成聚水之病上攻於肺布葉舉在於胸背者胸中之附也防己丸治水氣腫滿肺氣喘急咳嗽脹滿悶坐臥不得喉中作聲心胸痞滯防己白前五味子紫苑去苗土各半兩馬兜鈴桑根白皮去皮陳橘皮浸焙去白各一兩甘草炙銼一分杏仁五十枚浸炒去皮尖雙仁右搗羅為末煉蜜和丸梧子大每服十五丸至二十丸溫生薑湯下不拘時候澤㵼丸治水氣腿股腫滿喘促咳嗽坐臥不得澤㵼芫花炒郁李仁炒去皮尖牽牛子炒去頭末防己苦葶藶炒各一錢滑石研大戟炒各三分銼海蛤研甘遂炒檳榔銼各半兩右搗羅為末煉蜜和丸梧桐子大每服二十丸食前煎陳皮湯送下茯苓杏仁煎療氣忽發滿胸急者茯苓四兩杏仁四兩製去皮尖橘皮三兩右切以水九升先煮諸藥取三升去滓內竹瀝生薑汁蜜等和攪微火煎取四升一服四合日再夜一忌海藻菘菜酢物十聖丸治水病喘氣上氣消腫脹大戟炒桑白皮炒切甘遂炒甜葶藶紙上炒巴豆去皮心炒各半兩續隨子去皮檳榔銼烏頭去皮臍細慢火炒令焦黑煙出為度各一分杏仁去皮心雙仁炒三分牽牛子炒二兩三分右為末蜜丸如雞頭大每服一丸生薑湯化下更量病勢加減療氣忽發滿腹急者方豬腎一具生破去膜桑根白皮五兩茯苓四兩澤漆葉三兩防己三兩澤㵼三兩橘皮三兩大豆三升淨郁李仁一升碎甘遂三兩煮右切以水一斗三升先煮豬腎桑根白皮澤漆葉大豆取八升去滓內餘藥煎取二升七合分為三服忌醋物甘遂湯出聖惠方治水腫胸滿氣急上喘大小便澀甘遂炒一兩半赤茯苓去皮郁李仁浸去皮尖研黃芩去心杏仁去皮尖雙仁炒各二兩澤㵼陳橘皮浸去白炒乾澤漆微炒各二兩右搗篩每服五錢水三盞煎至一盞半去滓分溫三服一方煎桑根白皮湯調下末一錢以利為效療氣忽發心滿胸急者桑白皮四兩橘皮三兩茯苓四兩杏仁三兩甘遂澤㵼三兩黃芩四兩赤小豆一升右切以水九升煮取二升半分三服忌酢物一方甘草三兩又方青羊腎一具桑根白皮四兩茯苓四兩橘皮三兩李根白皮四兩黃耆三兩玄參三兩生薑四兩右切以水九升煮取二升七合分三服忌酢物黃耆丸出聖濟總録治水氣消腫定喘黃耆銼甘遂炒青橘皮浸焙去白麥蘖大戟炒陳橘皮浸去白焙陳麴炒各半兩右為末煉蜜丸桐子大煎木通桑根白皮湯下苦葶藶丸出聖濟總録治水氣喘滿小便赤澀腰腿浮腫不得眠臥苦葶藶四兩三分紙上炒杏仁三分浸去皮尖炒右搗羅五味為末與二味研者和勻煉蜜丸桐子大每服二十丸食後煎橘皮湯下日再煎紫蘇湯下亦可郁李仁湯出聖惠方治水腫胸滿氣急郁李仁浸去皮尖炒桑根白皮炙赤小豆炒各三兩紫蘇一兩半橘皮二兩茅根切四兩右搗篩每服五錢水三盞煎至一盞去滓溫服葶藶散出危氏方治因飲水漿多感冷濕胸腹脹滿瀝咯有聲喘急氣促面色黃芫花炒赤甘遂大戟黑牽牛炒取為末右各等分為末每服一錢先將紅棗十枚煎湯一盞調溫再單飲棗湯送下平旦服病不除明日更服加半錢利後稀粥自養但服加味控涎丸方見喘急茯苓湯治水腫胸中氣滿喘急赤茯苓去皮杏仁去皮尖雙仁炒各四兩陳橘皮浸去白炒二兩右搗篩每服五錢水三盞煎至一盞去滓溫服日再服隨小便下療氣忽發滿胸急者大棗三十枚打破右以水四升煮取二升內蜜和調不得過甜不過酸稍含咽之水腫咳逆上氣附論內經謂腎為水腫肺為喘呼氣逆不得臥蓋腎主水肺主氣虛不能制水水氣脹滿上乘於肺肺得水而浮故上氣而咳嗽古方有曰腫從水起上氣而咳名曰白水其病在肺烏腎丸出聖惠方治水氣腫滿咳逆上氣烏腎半兩蛤蚧一對塗酥微炒木通半兩漢防己半兩檳榔半兩大戟三分陳橘皮三分海藻半兩炒洗去醎木香半兩當歸半兩銼碎微炒郁李仁三分湯浸去皮尖微炒續隨子一分海蛤半兩細研肉桂半兩去皺皮赤茯苓半兩赤芍藥半兩右為末煉蜜和丸如小豆大每日五更初以桑根白皮湯下三十丸大白前湯出聖濟總録治水咳逆上氣通身洪腫短氣脹滿晝夜臥不得喉中鳴大小便不通不下食而不甚渴白前一兩半紫苑去土二兩半夏湯洗七遍去滑焙乾二兩銼生澤漆根微炒一兩右四味搗篩每服五錢水一盞半煎至一盞去滓入內後藥桂去皮一兩半人參三分白术赤茯苓去皮各二兩葶藶散治十種水氣喘急坐臥不得小便淋澀方見十類神助散褚證漢防己散出千金方治水腫上氣漢防己澤漆葉石葦澤㵼各五兩白术桑根白皮丹參赤茯苓橘皮通草各三兩郁李仁五合右治下篩為粗散以水一升煮三因方取八合去滓頓服一日三取小便利為度大棗散出聖濟總録治遍身浮腫脹上氣不得臥大小便澀先服大棗散後服海蛤丸後三年不得食肉入房不爾病必重發治陽中風下利嘔逆短氣不惡寒熱汗出發作有時頭痛心痞硬引脅下痛兼下水腫腹肋脹并酒食積腸垢積滯痃癖腎積畜熱極痛塵氣久不已或表之正氣與邪熱并邪熱并甚於裡熱極以隂及寒表氣入裡陽氣極深脈將絶并風熱燥甚結於下焦大小便不通實熱腰痛芫花炒一分甘遂炙半分大戟去皮一分右搗羅為散每服一錢以大棗十枚水一盞半煮棗二十沸去滓棗調藥空心頓服當利勿止勿止三服後服海蛤丸人實更加服隨實虛加減海蛤丸出聖濟總録海蛤别研赤茯苓去皮各一兩狼毒三分桑根白皮炙銼玄參微炙各一兩膩粉半兩薏苡仁陳橘皮浸炒去白防己葶藶炒研杏仁湯浸去皮尖雙仁炒各一兩右除海蛤外搗羅為末同海蛤再研勻煉蜜丸如小豆大每服空心用橘皮湯下三十丸日三服五日後覺齒癢即住藥齒腫口瘡即是瘥候白前湯出聖濟總録治水咳逆上氣通身浮腫短氣脹滿晝夜倚壁不得卧其喉中水雞聲白前十兩三分紫苑去土一兩半半夏洗七遍三兩澤漆根炒秳蔞一枚去皮白术一兩桂去皮一兩半人參乾薑各半兩吳茱茰浸一宿炒二兩右搗篩每服用五錢水三盞入棗二枚生薑一塊拍破煎至一盞半去滓分二服當小便利或微溏腫即減防己湯出聖濟總録治水氣咳逆上氣四肢浮腫坐臥不安防己半兩桑根白皮銼木通銼赤茯苓去皮各一兩澤漆郁李仁浸去皮炒甜葶藶各半兩隔紙炒紫色陳橘皮浸去白焙二兩右搗篩每服五錢水一盞半棗四枚擘破同煎至七分去滓食後溫服黃耆湯治水氣面浮咳嗽氣促黃耆三分柴胡去苖赤芍藥炒赤茯苓去皮各半兩陳橘皮浸去白焙麥門冬去心焙惡實炒甘草炙各三分右搗篩每服三錢水二盞煎至七分去滓溫服不拘時候治水氣浮腫咳逆上氣宜服此方甜葶藶三分隔紙焙杏仁湯浸去皮尖雙仁半兩炒微黃赤芍藥半兩秦芁半兩去皮漢防己半兩麻黃半兩郁李仁半兩桑根白皮半兩甘草半兩右篩為散每服三錢以漿水一盞煎至六分去滓溫服日三四服杏仁散出聖惠方治水氣腫盛咳逆上氣小便赤澀杏仁一兩湯浸去皮尖雙仁炒微黃茅根一兩半赤茯苓一兩陳橘皮一兩湯浸去白桑根白皮二兩郁李仁二兩湯浸去皮微炒澤漆葉二兩川芒硝一兩木通一兩右為散每服四錢水一鍾入生薑半分煎至五分去滓空心溫服如人行十里當下黃水一二升為效鯉魚湯出聖濟總録治水腫腹大喘咳胸滿不得臥鯉魚一箇重三斤去鱗腸肚桂去皮紫苑去苖土各二兩防己黃芩去黑心硝石研如粉人參各二兩右除魚搗篩先用東流水五升煮魚令爛熟去魚內藥末五錢匕煮赤小豆一合大棗三枚擘生薑三片候豆熟去滓溫服日三夜一治水腫咳逆上氣坐臥不得宜服此方出聖惠方甜葶藶一兩隔紙炒令紫色橘皮一兩湯浸去白焙甘遂半兩炒微黃牽牛子一兩炒微黃郁李仁半兩湯浸去皮微炒右搗羅為末煉蜜和丸梧桐子大每服煮赤小豆飲及大麻子飲下七丸日三服以大小便利為度又方出聖惠方海蛤一兩細研甜葶藶一兩隔紙炒紫色漢防己一兩銼杏仁三分湯浸去皮尖雙仁炒微黃甘遂一兩炒令微黃桑根白皮一兩銼右搗為末以棗肉和搗三二百杵丸梧子大每服於食前煎以大麻子湯下七丸白前湯治水咳逆上氣身體浮腫短氣脹滿晝夜倚壁不得臥咽中作水雞鳴白前紫苑半夏大戟各三兩右㕮咀以水一斗浸一宿明旦煮取三升日三服水腫小便澀附論水氣小便澀者由榮衛不調經絡否澀脾腎虛弱使水氣流溢於皮膚四肢腎與膀胱有熱故也凡此二經俱主於水流行於小腸入脾為小便也今熱氣在於臟腑水行則澀故令小便澀海蛤丸主下氣水苦小便澀腫氣妨悶食昆布洗橘皮赤茯苓漢防己海蛤研郁李仁桑根白皮澤漆炙檳榔杏仁各四分去皮尖雙仁研大黃六分葶藶二十分微炙熬令黃右搗篩蜜丸梧子大每服十五丸日二服加至二十五丸以小便利為度忌熱麵冷滑大酢海蛤丸出聖濟總録治水腫腹滿四肢黃瘦喘促小便澀海蛤二兩研木香訶梨勒皮防己厚朴去粗皮生薑汁炙旋覆花各一兩白檳榔銼鱉甲去裙爛醋浸炙郁李仁去皮研各一兩半桂去皮半兩右為末煉蜜丸桐子大每服二十丸煎大腹皮湯送下之海蛤丸出聖惠方治大腹水腫四肢洪滿小便澀少海蛤一兩研甜葶藶一兩隔紙炒令黃色赤茯苓一兩去皮桑根白皮一兩銼郁李仁一兩湯浸微炒防己一兩銼陳橘皮一兩湯浸去白甘遂半兩炒微黃右搗羅為末别搗葶藶如泥內藥末中和勻煉蜜和丸二三百杵丸梧子大每服二十丸以粥飲下日三四服又方出聖惠方檳榔一兩牽牛子一兩微炒赤茯苓一兩桑根白皮一兩銼甜葶藶一兩隔紙炒黃色漢防己半兩右為末别搗葶藶如泥內藥末中和搗三二百杵丸梧子大每服二十丸粥飲下日三服以瘥為度漢防己散出聖惠方治水氣四肢腫滿上氣滿喉中喘急小便祕澀漢防己一兩木通一兩桑根白皮一兩銼赤茯苓一兩甘草半兩銼炙微赤大腹皮半兩銼牽牛子二兩微炒右搗羅為散每服三錢以水一中盞入生薑半分蔥白七寸煎至六分去滓不計時候溫服商陸丸出聖惠方治水腫利小便消脹滿宜服商陸一兩川芒硝半兩甘遂一分微炒黃川大黃半兩銼碎微炒芫花半兩醋拌炒乾蕘花半兩微炒右為末煉蜜和搗三二百杵丸梧子大每服食前粥飲下三丸以利為度蘧麥散出聖惠方治水氣面目腿膝硬小便赤澀蘧麥一兩滑石一兩漢防己一兩川大黃一兩銼微炒川芒硝一兩右為散每服三錢水一中盞煎至六分去滓不計時候溫服又方出聖惠方木通二兩銼桔梗一兩去蘆頭赤芍藥一兩甜葶藶一兩桑根白皮一兩右為散每服五錢水一大盞煎至五分去滓不計時候溫服大戟散出聖惠方治水氣腫滿大小便澀壅宜服大戟一兩湯浸去白微炒陳橘皮一兩湯浸去白商陸一兩銼木通一兩銼蘧麥一兩銼右為散每服三錢水一盞煎至六分去滓空腹溫服如未通即良久再服水銀丸出聖惠方治水氣腹脹促小便澀水銀一兩乳鉢內研令星盡甜葶藶一兩用隔紙炒令紫色椒目半兩微炒出汗浮萍草半兩滑石二兩右為末研入水銀令勻煎皂莢子膠和丸梧子大每服十五丸蔥湯下日三服香蘇散出衛生寶鑑治水氣虛腫小便赤澀陳皮一兩去白防己木通紫蘇葉各半兩右為散每服二錢水二盞生薑三片同煎六分去滓溫服食前日二治水氣小便澀身體虛腫宜服此方出聖惠方搗桕皮一兩木通一兩銼檳榔一兩右為細末每服二錢粥飲下不計時候塗臍膏出得生堂治水腫小便絶少地龍生者炒研豬苓針硝煆紅存性右各一兩為末擂蔥涎研成膏傅臍中約一寸髙以闊絹帛縳定出小便多為度日二更入甘遂同為末尤妙治水氣小便澀喘息促四肢無力宜服此方沙牛尿一斗訶梨勒皮半斤搗末右先以牛尿於銅器中煎至二升入訶梨末熱令硬軟得所丸如梧子大每服茶酒任下三十丸日三服當下水及惡物為效治水氣洪腫澀方出聖惠方芫花根一兩銼炒右為末每服空心以溫水調下一錢得小便大利瘥治水腫煩渴小便赤澀方冬瓜白瓤不限多少右以水煮令熟和淡食之治水氣遍身腫小便赤澀方甜葶藶二兩隔紙炒令紫色右搗如膏煮棗肉和丸梧子大三十丸煎桑根白皮湯下日三四服之治氣喘促腫浮小便澀用杏仁一兩去皮尖熬研和米煮粥極熟空心喫二合千金翼治小便不利膀胱水氣流滯用浮萍晒乾為末服方寸匕日一二服良蠱病附論內經謂脾風傳之腎病名曰疝瘕少腹膀胱寃熱而痛出白一方名曰蠱夫脾受風邪傳於腎經邪熱內爍其情不守久而弗治適以喪己志也水之精為志志既喪則情從之左傳謂惑以喪志為蠱者如此大沉香尊重丸方治蠱腹滿水腫遍身腫病滿氣逆嘔噦喘急小便赤澀大便不調一切中滿下虛危困病證其效不可盡述滑石三錢沉香丁香人參檳榔車前子葶藶各二錢青皮白牽牛枳實炒木通各四錢胡椒木香海金沙蝎尾去毒茯苓肉蓯蓉各一分蘿蔔子六錢炒白丁香一錢半别研郁李仁湯浸去皮一兩二分右為細末生薑自然汁打糊為丸如豌豆大每服二十丸生薑湯下不拘時候日進三服忌鹽魚菜肉麵食單服米粥常治水蠱用尊重丸為正散腫丸為副日各二服如蠱脹髙腹肚有些小青筋腫少脹多者單服此藥一方加陳皮無價散治諸般蠱氣青皮陳皮桑白皮炒豬苓車前子焙澤㵼續隨子甜葶藶炒樟栁根大戟白牽牛末甘遂川椒木香木通去皮銼郁李仁各等分右件為末每服三錢用䓤白二根切水二盞煎至五分和滓溫服檳榔散治男子婦人蠱氣及下元腿膝虛腫檳榔白茯苓白附子白术芫花蓬术大戟甘遂黑牽牛巴戟青皮荆三稜肉桂茴香各等分右為末每服一錢用樟栁根煎湯調服一更前後取腳上水二更煎升麻湯下取面上水三更煎赤小豆湯下取手上水四更煎桑白皮湯下取肚中水五更煎茶酒下取膜中水治蠱證茯苓二兩茯神二兩豬苓一兩乾山藥三兩人參白酒麯半兩神麯半兩麥門冬半兩牽牛半兩頭末乾生薑二兩右樟栁根去皮淨咀作片子水浸一宿天明換水煮乾爛就搗研晒乾與前藥料對半一同分兩為末生薑汁蔥頭自然汁打糊為丸梧子大每服三十丸或四五十丸不拘時候拓腫神應丸男子婦人諸腫蠱毒肚脹如鼓脾癖癥瘕氣塊上喘氣急咳嗽倚息不得睡服諸藥得自祕傳用之三稜莪术青皮各一兩乾漆燒一兩芫花七錢半大戟一錢碙砂一錢巴豆去殼取霜研一錢右前藥和一處用好米醋一大碗慢火淬乾為度取出晒乾碾為末醋糊為丸作如梧子大每服四五十丸用生薑湯五更空心下隨用椒目六兩白蘿蔔子半斤炒香熟用手帕盛藥尉患身上俱腫處如冷則再取出炒熱仍尉至再至三直至小大便行後方住尉如去大便後要住溫稀粥一盞補即止肉蓯蓉丸治蠱病小腹寃熱而痛便溺出白肉蓯蓉去皮酒浸焙白茯苓去皮黃耆銼澤㵼五味子龍骨牡蠣火煆研當歸切焙各一兩右為末煉蜜丸梧子大每日服三十丸須溫服酒下空心日午臨臥各一服萬安丸治蠱病大黃雷丸木香各兩一苦葶藶樟栁根各半兩黑牽牛白牽牛各一兩半檳榔七箇右為末每服五錢用熟蜜五錢酒一盞調服空心食前大建中湯出宣明論治蠱病小便腹急脹痛便溺失精溲而出白液黃耆銼逺志去心當歸去蘆頭澤㵼各三兩銼焙芍藥炒人參龍骨甘草各二兩右銼如麻豆大每服五錢匕水二盞生薑三片棗二枚劈破煎至一盞去滓溫服不拘時候澤㵼丸治蠱病小腹寃熱而痛精氣不守溲便出白澤㵼銼補骨脂炒巴戟天去心五味子焙石斛去根芍藥人參甘草右為末煉蜜丸梧子大每服三十丸溫酒或鹽湯下空心日臨臥合一服乾地黃丸治蠱病精氣不守便溺出白小腹寃熱而痛熟地黃焙半兩鍾乳粉半兩龍骨兔絲子酒浸一宿别搗磁石火煅醋淬七遍芍藥黃芩去黑心各一兩右為末酒煮麵糊為丸桐子大每服二十丸溫酒或鹽湯下空心日晚無憂散出儒門事親治腹肚蠱脹大便不利木香半兩白术半兩桑白皮陳皮木通銼黃耆各半兩銼官桂半兩一方用胡椒療氣忽發滿胸急者方豬腎一具去脂膜桑根白皮五兩茯苓四兩澤漆葉三兩防己三兩澤㵼三兩橘皮三兩大豆三升半郁李仁一升碎甘遂三兩煮右切以水一斗三升先煮豬腎桑根白皮澤漆葉大豆取汁八升去滓內餘藥煎取二升七合分為三服忌酢物又方甘遂炒一兩半赤茯苓去皮郁李仁浸去皮尖研黃芩去黑心杏仁去皮尖雙仁炒各二兩澤漆葉二兩陳橘皮浸去白焙二兩澤㵼微炒二兩右搗篩每服五錢水三盞煎至一盞半去滓分溫二服一方用朴硝一方煎桑白皮湯調下末一錢以利為效療氣忽發滿胸急者桑白皮四兩橘皮四兩杏仁三兩甘遂三兩澤㵼三兩黃芩四兩赤小豆一升右切以水九升煮取二升半分三服忌酢物一方甘草三兩又方青羊腎一具桑根白皮四兩茯苓四兩橘皮三兩李根白皮四兩黃耆三兩玄參三兩生薑四兩右切以水九升煮取二升七合分三服忌酢物黃耆丸出聖濟總録治水氣消腫定喘黃耆銼甘遂炒青橘皮浸焙去白麥蘖大戟炒右為末煉蜜丸桐子大煎木通桑根白皮湯下苦葶藶丸出聖濟總録治水氣喘小便赤澀腰腿浮腫不得眠臥右為末量人虛實施入黑牽牛半生熟各二兩為細末斟酌多少用每服二錢燈心湯調下食前仙方萬安散治男子婦人不論老幼一切沉深積塊氣水蠱食蠱小腸膀胱豚疝氣遍墜木腎腳氣十隔五噎翻胃吐食脾痛氣喘嗽痰飲咳嗽肺脹吐血咯血淋齒者瘢瘡癬腸風㵼血婦人赤白帶下經脈不調或後或前血崩中漏下惡積聚黑牽牛五兩生熟各半熟黃色不用焦黃雷丸三箇生用大黃二兩生用管仲三兩檳榔三兩生用右各為細末每服四錢重者五錢用沸湯浸至明調服畢細嚼生薑三片過藥一時刻取下病源各隨所傷如亂絲馬尾或如血蠱或如蛇蝦蟆之類各種樣不齊此藥不動真氣四時著病皆可服之十嵗者分作二服老幼衰弱臨時加減忌魚腥三五日治男子婦人蠱氣及下元腿膝虛腫豬苓茯苓漢防己木通陳皮各等分右為末每服四錢水一盞半用燈心十莖同煎至七分去滓溫服如服四服小便通為驗權水丸治男子婦人通身蠱脹不能動作南康蛤粉一兩豬苓半兩澤㵼半兩真平胃散一兩右為末同平胃散蛤粉和勻用大蒜連皮灰火煨香熟搗爛和搜丸梧子大每服三十丸至五十丸用溫水送下日三服忌腥冷物濕麵四炒丸出危氏方治氣血滯腹內蠱脹如鼓坐臥喘急不安枳殼四兩去瓤切作兩指靣大塊四處一一兩用蒼术炒去蒼术一兩用蘿蔔子兩同炒黃去蘿蔔子一一兩用乾漆一兩炒黃去乾漆末一兩用茴香兩同炒去茴香止用枳殼為細右用芫花同炒蒼术等四味同水二碗煎至一碗去滓煮麵糊丸梧桐子大每服五十丸食後米飲下中經丸治蠱脹虛腫滿不思飲食神麯炒乾薑炮各一兩麥蘗炒一兩吳茱茰半兩湯洗七次焙乾右為細末麵糊為丸梧桐子大每服三十丸溫酒送下食前日進三服磁石丸治蠱病少腹熱痛精液出白右搗羅為末煉蜜丸梧子大每服三十丸鹽湯下空心臨臥各一服苦蒿梨丸治水蠱氣苦蒿梨木香蘿蔔子各等分右為細末酒糊為丸梧子大每服三二十丸空心溫酒送下朱砂守病丸專治久積一切蠱氣返食證人言一兩巴豆去皮燒熟一兩芫花一兩醋炙右為細末如皂子大每服三丸空心一盞溫酒送下治蠱脹用皂角尖用香二兩重宣瀉五六次後香綿散生漆滓一兩半春蠶綿三兩重麝香五錢右以漆滓放在鐵鍋炒做灰綿用剪細入此鍋同漆滓炒作灰用碾末後將麝香入用飯飲湯調下好酒亦得香木枳殼丸治蠱脹枳殼芫花各等分右用釅醋浸芫花透將醋再煮枳殼爛擂芫花末丸桐子大每服數丸溫白湯送下治蠱用雞尿醴酒調服之消蠱湯出直指方治氣作蠱脹但腹滿而四肢頭靣不腫紫蘇莖葉縮砂肉豆蔲生枳殼青皮陳皮三稜蓬术檳榔辣桂白豆蔲仁蓽澄茄木香各一分半夏製蘿蔔子生各一分半甘草炙一分半右銼每服三錢薑棗煎服石燕子丸治婦人男子氣蠱血蠱之疾石燕子四個煆木通大戟海金沙石韋苦楝根豬苓海藻扁竹茴香白牽牛海蛤瞿麥通草延胡各半兩右為細末燈心竹葉打麵糊為丸梧子大每服五十丸用燈心竹葉湯送下食前奪命方丹治氣蠱勞蠱血蠱筋蠱水蠱麝香一錢半大黃生用五錢黑牽牛半兩甘遂二錢澤㵼半兩香附子半兩右為細末每服一錢用白樟栁根汁半盞無灰酒半盞調藥末頓熱空心服之服藥後忌生人三日不可食魚腥鹽漿濕麵發氣等物六十嵗以上十五嵗以下只可服半貼大便取下惡物香棗丸出瑞竹堂方治蠱氣滿病蠱有十種用苦丁香為細末用熟棗肉為丸每服三十丸煎棗湯送下空心服三服必愈治蠱氣方用環腸草不拘多少晒乾水煎利小便為度五蠱丸出聖濟總録治百病及諸色蠱雄黃椒目炒莽草真珠研巴豆去油盡芫花醋浸炒焦鬼臼礬石燒令汁枯藜蘆去蘆頭微焙獺肝各一分蜈蚣一寸附子炮製去皮臍半兩斑貓去翅足炒十枚右為末煉蜜丸如小豆大瓷合蜜收每食後服一丸如未效增一丸以利為度當有蟲出形狀不可具載蟲下後七日內切宜將攝凡人服此藥一劑蟲出不損百病盡除勿食五辛又蛇毒甚者合五蠱丸未及且以大豆漬酒絞汁服半升差又酒服桔梗角末方寸匕日三服中毒甚不能服斡口開與之藥下心頭當悶煩須臾即蘇如此服七日後宜食豬脾臟補養今所録蛇蠱方在卷末者緣蛇毒狀似水病治之且謂水藥不驗楊香所傳他仙徒都先生神方一十五首皆治之且謂水藥不驗蛇蠱次之餘方世人無有傳者楊黁云曾有親識患水病洪腫滿狀頃刻必死旦服此藥至暮獲安息不忍棄其滓以絹囊盛之凡煎防己湯須用臼鐺於火中合之燒令通赤揩磨取淨免有油膩又於藥名二十味中各取一字合成四句歌之庶使年久不忘胡牽犀藶海漢茯戟通桑青黃訶射白郁橘紫防榔紫蘇煮散出聖濟總録治水氣紫蘇葉防己去皮桑根白皮切白术銼碎各等分右為散如茶法煎三兩沸齊熟即去白术加甘草功如前方所説又有蛇毒蠱狀與水病相似四肢如故小便不堪澀但腹急腫而蠱脹不下食凡醫多誤作水氣治之宜細詳審當服太上五蠱丸枳殼丸出衛生寶鑑方治久患五隔氣積噎塞氣血結滯腹脹成蠱身瘦靣黃肚急如鼓兼治脾積食蠱厚朴去皮一斤同大黃二兩生薑四兩棗五十枚川烏一兩以水煮棗爛為度只用厚朴枳殼麩炒去穰右為末每服厚朴八錢枳殼二錢入定粉三錢膩粉二錢同碾令勻每服半錢熱米飲調下日進三服不計時候日三取服重者不過五日遂下惡物瘀血為應次以和脾胃藥補之木香丸出楊氏家藏方治氣蠱腹脹方見本門水氣心腹鼓脹類五味木香丸消脹丸出楊氏家藏方治蠱脹推氣退腫法麴四兩炒乾薑一兩肉桂去皮一兩㽔仁三十粒去皮巴豆二十五粒去皮木香一兩陳橘皮去白一兩檳榔半兩縮砂一兩黑牽牛一小升用無灰酒半升浸一宿取出焙乾右件為細末用獖豬肚一枚淨洗將前件牽牛盛在內用無灰酒五升慢火煮之酒盡肚爛取出於臼中搗極爛和前藥末一處杵為丸如菉豆大每服五十丸空心日午臨臥溫酒送下更量虛實加減之蘿蔔子丸出楊氏家藏方治蠱氣脹滿四肢虛腫浮上氣喘急小便祕澀蘿蔔子四兩炒令黃雷丸二兩炒黃白附子一兩半去黑皮檳榔半兩陳橘皮去白二兩葛根三兩炒黃右件為末酒煮糊為丸如菉豆大每服十丸至三十丸橘皮湯空心送下又周益公隂德録治蠱腫祕方永類鈐方用膽礬水一鍾用信州蒲州明亮如翠璃似鴨嘴者用米醋煮製勝針鐵矣蓋膽礬亦銅之精液以其味辛酸補肝膽利脾胃皆佐以君臣之藥安魂魄消水腫此妙方也得者當如珍寶之故老嘗授以疏順飲即二十四味流氣飲加減咽下沉香丸治水氣縮砂飲出朱氏集驗方治氣脹氣蠱等病如神蘿蔔子自然汁浸縮砂炒乾或用蘿蔔汁浸數日炒乾亦可右以縮砂為細末每服一大錢米飲調下治蠱病出本草用薺花根搗末以飲服方寸匕立差水蠱附論夫水蠱之狀膜脹皮膚粗黑搖動有聲此由脾腎氣虛濕氣淫溢久不瘥則害人如蠱之毒故謂之水蠱也無比丸出聖濟總録治水蠱通身腫滿京三稜煨銼牽牛子膽礬研檳榔銼芫花醋浸炒各一兩膩粉一分續隨子硇砂研木香各半兩珠粉研三分大棗三十個湯內略煮過去皮核取肉爛研右除膽礬硇砂棗肉外同搗羅為細末用釅醋二大升先下硇砂膽礬棗肉於銀石器內煎五七沸次下諸藥末一處攪勻慢火候可丸如豌豆大每服十丸丈夫溫酒下婦女醋湯下檳榔丸治蠱病檳榔郁李仁各一兩續隨子甘遂各半兩炒黃䕡茹樟栁根黑牽牛大黃各一兩木通海金砂各半兩滑石一兩右為細末麵糊為丸梧子大每服三十丸溫酒送下如瀉白粥補之常服只十丸至十五丸忌鹽醋油醬油膩生冷麵粉忌半年中隔丸出聖濟總録治水蠱腹脹消腫滿痞氣芫花醋浸炒黃甘遂炒黃為末大戟炒各一兩澤㵼銼青橘皮湯浸去白木香各半兩硇砂研乳香研各一兩巴豆去皮膜出油研二十枚右搗研為末煉蜜和丸如菉豆大每服三丸至五丸溫酒下檳榔丸治水蠱檳榔郁李仁各一兩樟栁根黑牽牛大黃各一兩木通海金砂各半兩滑石一兩右為細末麵糊為丸梧子大每服三十丸溫酒下如瀉白粥補之常服只喫十丸至十五丸忌鹽醋油醬油膩生冷麵半年瓠瓤煎方出聖濟總録治水蠱遍體洪腫用瓠瓤一枚以水二升煮一炊頃去滓煎堪丸即丸如小豆大每服米飲下十丸取小便利利後作小豆羮食之勿飲水楮枝煎方治蠱病水腫用楮枝銼半升以水五升煎至二升半去滓取汁入黑豆末半升煎成膏每服一匙空腹服之一方加細桑枝同煎分氣散出聖濟總録治水蠱腹腫利小便甘遂炒商陸銼炒白牽牛炒各半兩檳榔銼一枚木香一分白丁香研五十個膩粉研一錢右搗研為散每服半錢匕溫酒調下實者加至一錢匕大黃湯大黃銼炒一兩半麥門冬去心焙三分甘遂微炒茅根銼黃連去鬚各一兩貝母炮去心三分右粗搗篩每服二錢匕水一盞煎至七分去滓溫服瞿麥湯出聖濟總録治水腫腹脹滿急小便不通縱有而黃赤瞿麥穗車前子滑石碎茅根銼甘遂微炒苦參右等分搗篩每服三錢匕以水二盞煎至七分去滓溫服三日以利為度海蛤丸出聖濟總録治水蠱腹脹喘嗽似水氣海蛤燒灰半兩滑石研凝水石研各一兩白丁香研五十五個膩粉粉霜各一分右一處杵勻麵粉糊和餅子以濕紙褁燒熟搗羅為末薄麵糊和丸如菉豆大溫酒下二十丸經驗白术散治水蠱氣蠱病白术一兩苦葶藶一兩川山甲五錢蛇退一條全黑牽牛末二兩土牛兒一個燒土坑火內焙乾右件為末每服三錢好酒調下葶藶湯出聖濟總録治水蠱身體洪腫喘滿葶藶紙上炒令黃紫色搗末一兩右以水二盞入葶藶五錢匕大棗十枚擘破同煎至一盞去滓分為二服以利為度後服葶藶丸葶藶丸葶藶子三兩炒令紫色牽牛子炒一兩半海藻洗去醎炒一兩澤漆一兩昆布洗去醎炒一兩豬苓去皮一兩右搗羅為末煉蜜和丸小豆大每服米飲下十五丸再稍加至二十丸治積年水蠱宜服此方出聖惠方大戟半兩炒銼甘遂半兩甜葶藶半兩巴豆十四個炒熟去皮尖油赤小豆四十五粒右為細末以煮棗肉和丸梧子大每服空心粥飲下三丸當日便利水為效結水湯治水蠱內腫即冷外腫即熱氣急無力黃連去鬚大黃銼碎炒各二兩甘遂微炒葶藶炒紫色各一兩右搗篩每服二錢水盞半煎至七分去滓溫服日二椒目丸出聖濟總録治水蠱遍身洪腫椒目炒去汗牡蠣煆各二兩葶藶二兩甘遂二兩右等分為末煉蜜和丸如小豆大每服米飲下十丸取利二後服白米粥食之治水蠱木香黑牽牛炒飛麵炒黃色各四兩白牽牛炒四兩右為細末用年深米煎湯和丸作成餅子約計如錢大每服一餅子用陳皮湯送下食前日進二服忌魚雞麵等物水銀丸治大腹水蠱堅硬如石宜利小便方水銀一兩以煮棗肉研令星盡川芒硝一兩甜葶藶五兩炒紫右件藥相和搗一千杵丸梧子大每服空腹服十丸粥飲下差後食牛羊肉自補稍飲之治腫腹重大動搖有水聲皮膚黑色名曰水蠱宜服此方青蛙二枚乾者塗酥微炙螻蛄七枚乾者炒苦葫蘆半兩炒右為細末每日空心以溫酒調下二錢不過三服差鼠尾草丸出肘後方治水蠱亦治卒大腹水病鼠尾草馬鞭草各五斤右用水五斗煮取二斗去滓煎成膏為丸小豆大以輕粉為衣每服米飲下三丸至六丸禁肥肉生冷勿食治腹大動搖作水聲皮膚粗黑似腫狀名為水蠱出肘後方白茅根一大把切小豆三升赤者右件以水二升煮取乾去茅根食豆水隨小便下又方出聖惠方用鬼扇搗絞取汁服如雞子即下水更服取水盡如渴研麻子汁飲之為良又方出肘後方治腹脹大動搖作水聲皮膚黑名水蠱巴豆九十粒去心皮炒黃杏仁九十個去皮尖炒令黃右搗和服如小豆大一枚以水下為度勿飲酒佳忌野豬肉蘆笋又方用兹彌草三十斤水三石煮取一石去滓更湯上煎令可丸服此如皂莢子三丸至五六丸水隨小便去即飲糜粥養之惡實丸出聖濟總録治水蠱身體洪腫用惡實微炒一兩為末麵糊和丸梧子大每服十丸米飲下勿嚼破主腫腹動搖作水聲皮膚黑名曰水蠱巴豆九十粒去心皮熬黃搗丸如小豆大小下一丸以利為度勿飲酒治水蠱出百一選方用商陸根赤者杵爛貼臍心以絹繫縳定病自小水而出去商陸有二種白者不可用一方用生薑搗和取汁調五苓散取下惡水即愈二聖散一名二氣散治水氣蠱脹滿白牽牛黑牽牛各三兩右為末用大麥麵四兩同一處為燒餅臨臥用茶一盞下降氣為效治水蠱腹脹出百一選方右取加味散四桂散細末等分和勻依法煎服紹興術士朱蓑衣名甫苦此疾醫者只令服加味散久之不效葛丞相授此法即安治水蠱出本草用山豆根末酒下二錢普濟方卷一百九十四
