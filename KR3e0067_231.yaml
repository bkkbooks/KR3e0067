body:
  text: 普濟方卷二百三十一明周王朱橚撰虛勞門虛勞咳嗽附論夫虛勞咳嗽者以肺傷胃弱榮衛衰微氣不溫充故也肺主氣為五臟之華蓋其脈循環胃口肺臟勞傷令人胸肶皆微痛驚悸煩滿咳嗽上氣或唾膿血寒熱潮作面赤口乾偏卧喜汗不能飲食肌膚消瘦是也方人參補肺散一名人參保肺湯出御藥院方治五勞七傷咳嗽氣喘不接痰涎稠黏骨蒸熱一切風疾熱證人參柴胡當歸芍藥桑白皮知母白术川芎黃耆地骨皮石膏滑石寒水石荆芥穗紫苑各二錢半白茯苓去皮黃芩連翹大黃山梔子仁薄荷各半兩甘草桔梗各一兩以上并生右為散每服三四錢水一盞生薑三片煎至七分去滓溫服漸加至五七錢進三四服無時泄者去大黃同人參半夏丸服葶藶丸治勞嗽頭虛腫大便不通葶藶子淨洗曝乾漿水浸半日布內盛蒸一炊久取曝乾搗末郁李仁洗淨湯浸去皮研防己等分銼右研令勻煮棗肉和丸如赤小豆大每服十五丸煎糯米飲下百勞煎出十便良方治虛勞嗽旦輕夕重憎寒壯熱少喜多嗔忽進或忽退靣色不潤積漸少食右將杏仁一兩以童子小便二斤用小口垍瓶一隻浸杏仁七日㵼出去小便以溫水淘過研如泥别取一垍瓶以小便三升煎之如膏以好白麵糊和如梧桐子大每服十五丸食後臨卧以熟水下驅勞湯治虛勞咳嗽喘急涕唾稠黏心膈滿悶秦芁去苗土五錢柴胡去苗五錢白茯苓去黑心皮五錢鱉甲去裙襴醋酷炙五錢貝母去心欵冬花紫苑去苗土地骨皮杏仁湯浸去皮尖雙仁研各一兩人參麻黃去根土去全節木皮訶梨勒皮三枚半夏薑浸三日湯洗切焙各一兩右粗搗篩每五錢水一盞半入生薑五片同煎至八分去滓溫服阿膠丸治虛勞咳嗽發熱羸瘦阿膠炙令燥熟地黃焙山羊各一兩羚羊角屑柏子仁研茯苓去皮地骨皮五味子百合各五錢丹參逺志去心麥門冬去心焙人參各一兩蛤蚧蜜炙一對右為末煉蜜和丸如彈子大每服一丸水八分煎至六分放溫時時細呷服食後夜卧各一蛤蚧散出楊氏家藏方治虛勞咳嗽咯血潮熱盜汗不思飲食蛤蚧一對蜜炙人參去蘆百部去心欵冬花去枝紫苑茸各五錢貝母阿膠蛤粉炒鱉甲醋炙肉桂去粗皮炒柴胡去蘆黃耆蜜炙甘草杏仁湯浸去皮尖半夏生薑各一兩右為末每服三錢水一盞半生薑三片煎至一盞不拘時溫服肉桂雖去風寒有熱人不宜服則當改用細辛經效阿膠丸出濟生方治勞嗽并嗽血唾血阿膠蛤粉炒生地黃洗卷柏葉銼炒山藥炒銼大薊根雞蘇各一兩柏子仁炒别研人參茯苓去皮百部去心逺志去心甘心水煮防風去蘆麥門冬去心各五錢五味子一兩右為細末煉蜜為丸如彈子大每服一丸細嚼濃煎小麥湯或麥門冬湯咽下一方無茯苓百部逺志加味人參紫苑散出直指方治虛勞咳嗽人參北五味子紫苑茸陳橘皮貝母去心紫蘇葉桑白皮炒白茯苓各一兩杏仁去皮尖甘草炙各三分加川芎半夏麯各一兩阿膠炒酥五錢右為粗末每服三錢薑七片棗二枚烏梅一箇食後煎服補肺散出聖惠方治虛勞咳嗽氣喘乏力喫食全少坐卧不安人參去蘆頭桂心鍾乳粉白石英細研水飛對麥門冬去心焙五味子熟乾地黃白茯苓各一兩乾薑五錢製炒黃耆三分鹿角膠二兩炒令黃燥甘草三分炙微赤銼右為散每服不計時候煮薑棗粥飲調下二錢寧肺湯出楊氏家藏方治榮衛俱虛發熱自汗肺氣喘急咳嗽痰唾人參去蘆白术當歸去蘆熟地黃川芎白芍藥甘草炙麥門冬去心五味子桑白皮白茯苓去皮各五錢阿膠一兩􅑕粉炒右㕮咀每服四錢水一盞薑五片煎七分溫服大寧嗽湯出直指方治勞嗽諸嗽通用之神效北五味子茯苓桑白皮紫蘇細辛橘皮枳殼製杏仁去皮煎阿膠炒酥甘草炙罌粟殼去筯蕊截碎蜜酒炒熟各一分半夏製二分右為散每服三錢薑五片棗二枚烏梅半箇食後煎服勞嗽多加川芎地骨皮丸治虛勞咳嗽喘滿食少脅痛時發寒熱地骨皮白檳榔煨銼桔梗炒麥門冬去心焙茯神去木百合訶梨勒人參甘草炙銼各一兩熟地黃焙赤芍藥各二兩右為末煉蜜和丸如梧桐子大每空服煎黃耆湯下二十丸日三服訶梨勒散出聖惠方治虛勞咳嗽或時寒熱不得眠卧訶梨勒用皮鱉甲各一兩塗醋炙令黃去裙襴枳殼五錢麩炒微黃去瓤白茯苓一兩紫苑五錢去苗土柴胡去苗黃耆各一兩銼杏仁湯浸去皮尖雙仁麵炒微黃甘草各五錢炙微赤銼百合酸棗仁各一兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓不拘時候溫服忌莧菜參芎歸湯出直指方治虛勞少血津液內耗心火自炎燥熱乘肺咳嗽咯血及血不榮肌動輒毛寒咳嗽當歸川芎白芍藥各一分人參半夏製橘皮赤茯苓阿膠炒細辛北五味子甘草各一分右為散每服三錢薑四片棗二枚煎服保命丸治積勞咳嗽日久不輕自汗口中無味蛤蚧一枚如丈夫患用雄者腰上女人患用雌者腰下截酥炙欵冬花木香不見尖杏仁去皮尖童子小便浸一復時握乾蜜炒天麻乾地黃熟煮如黑餳另焙半夏湯浸丁香五錢五味子右為末煉蜜丸如梧桐子大每服食後生薑湯下十五丸至二十丸一方無天麻半夏丁香白茯苓散出聖惠方治虛勞咳嗽心胸壅悶白茯苓前胡去蘆頭人參去蘆頭黃耆銼訶梨勒皮各一兩麥門冬去心焙杏仁湯浸去皮尖雙仁麩炒微黃紫苑陳橘皮湯浸去白瓤焙各三分甘草炙微赤銼五錢右為散每服三錢以水一中盞入生薑汁半分煎至六分去滓不計時候溫服仙人肢丸出宣明論治逺年勞嗽不問寒熱痰涎喘滿先服松花膏子過多服此藥無不效人參沙參玄參紫圑參丹參白术牡蠣知母甘草各二兩蛤蚧一對頭尾全用河水洗淨文武火酥炙黃色右為末用麻黃一斤去根枸杞子三斤熬成膏丸如彈子大磁盒內盛臨卧煎生薑自然汁化下一丸小兒量嵗加減人參鱉甲散治冷熱虛勞肌熱盜汗喘嗽困乏柴胡茸前胡人參秦芁漢防己木香茯苓桔梗白术各五錢鱉甲一箇去裙襴醋炙右為細末每服二錢酒炙豬腦子少許同和别以熱酒調下食前衣蓋汗出效男用母豬女用雄豬鱉甲湯治虛勞咳嗽胸滿氣急發熱羸瘦鱉甲去裙襴醋炙黃柴胡去苗杏仁湯浸去皮尖雙仁麩炒欵冬花桃仁湯浸去皮尖雙仁麩炒甘草炙銼貝母去心知母焙各一兩皂莢去皮子酥炙一兩右粗搗篩每服三錢水一盞入小麥五十粒烏梅一箇煎七分去滓溫服紫苑散出聖惠方治虗勞咳嗽涕唾調黏漸覺羸弱紫苑去苗土黃耆銼白茯苓欵冬花生地黃白前杏仁湯浸去皮尖雙仁麩炒微黃桑白皮甘草五錢炙微赤銼右為末每服四錢以水一中盞入生薑半分煎至六分去滓不拘時候溫服五味子散一名紫苑湯出聖惠方治虛勞咳嗽胸中寒熱短氣不足方見本門虛勞上氣類紫苑丸出聖惠方治虛勞咳嗽胸隔不利骨節疼痛飲食無味紫苑三分去苗土前胡一兩去蘆頭麥門冬一兩五錢去心焙桔梗五錢去蘆頭鱉甲一兩五錢炙令黃去裙襴白芍藥三分貝母煨黃五錢百合三分甘草五錢炙微赤銼右為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以生薑湯下二十丸忌莧菜天門冬丸出聖惠方治虛勞咳嗽喘促心煩天門冬二兩去心焙欵冬花五味子人參去蘆頭白茯苓貝母煨炒黃甘草炙微赤銼蘿蔔子酥拌炒令香各一兩熟地黃一兩右為末煉蜜和搗二三百杵丸如彈子每服以綿裹一丸常含咽津陳橘皮丸出聖惠方治虛勞咳嗽腹脅妨悶大腸氣滯肢節煩疼陳橘皮二兩湯浸去白穰焙檳榔一兩柴胡一兩五錢去苖訶梨勒皮白芍藥紫苑各一兩去苗土川大黃二兩銼微炒杏仁一兩湯浸去皮尖雙仁麩炒微黃木香五分右為煉蜜和搗三二百杵丸如梧桐子大每服食前粥湯下三十丸蠟煎散楊氏家藏方治虛勞久嗽痰多氣喘或咯膿血杏仁去皮尖雙仁者炒黃另研人參去蘆乾山藥貝母去心麥門冬去心白茯苓去皮甘草炙百合去苗黃明鹿角膠炙如無以阿膠代各等分右㕮咀將杏仁别研拌勻每服三錢水一盞入黃臘皂角子同煎至七分食後溫秦芁飲一名秦芁散出王氏博濟方治虛勞咳嗽不止時發寒熱涕唾稠濁秦芁去苗土柴胡去苗貝母去心焙桔梗炒各一兩甘草炙銼三分訶梨勒煨用核一兩五錢陳橘皮湯浸去白焙麻黃去根節各一兩右粗搗篩每服三錢用童子小便一盞入烏梅一箇同煎至七分去滓溫服空心食前服溫金散出三因方治積勞咳嗽喘悶咯痰中有血甘草黃芩桑白皮防風各一兩杏仁二十七粒製人參茯神各五錢麥門冬二錢五分右以前五味用米泔浸一宿曬乾次入人參茯神麥門冬三味同為細末每服三錢蠟一豆大水煎食後服一方無人參松花膏出宣明論方治三二十年勞嗽預于九月間宣利一切痰涎肺積喘嗽不利防風乾生薑野菊花芫花拘杞子甘草蒼术黃精右為末取黃精根熬成膏子和藥末丸如彈子大每服細嚼一丸冷水化下臨卧不喫夜飯服藥一粒紫菀湯治虛勞咳嗽腸鳴滑泄紫菀去土五錢柴胡去苗一兩附子炮製去皮臍五錢蒼术米泔浸一宿切片焙乾赤芍藥各一兩肉豆蔲去殼人參各五錢右銼如麻豆每服三錢水一盞煎至六分去滓不拘時溫服柴胡飲治虛勞咳嗽氣喘頰赤心忪煩躁兩脅脹悶肌瘦少力不思飲食柴胡去苗五錢白术赤茯苓去黑皮枳殼去穰麩炒鱉甲去裙襴醋炙各五錢知母切焙犀角屑各一分右粗搗篩每三錢水一盞煎至半盞去滓溫服早晨日午夜卧各一服七味湯治虛勞發熱咳嗽柴胡去苗厚朴去粗皮薑汁炙各二兩甘草炙桂去粗皮麻黃去根節陳橘皮湯浸去白焙半夏為末薑汁和作餅焙乾各一兩右粗搗篩每服三錢水一盞入生薑三片棗二枚同煎至七分去滓溫服蛤蚧丸出聖惠方治虛勞咳嗽及肺壅上氣蛤蚧一對頭尾全者塗醋炙令黃貝母煨微黃紫苑去苗土杏仁各一兩湯浸去皮尖雙仁麩炒微黃鱉甲三兩塗醋炙令黃去裙襴皂莢仁炒令焦黃桑白皮各一兩銼右為末煉蜜和搗三二百杵丸如梧桐子大每服以棗湯下二十丸日三四服忌莧菜蛤蚧丸出三因方治積勞久嗽失音蛤蚧一對去口足溫水浸去膜刮去血脈用好醋炙訶子煨去核阿膠炒熟地黃麥門冬細辛甘草炙各五錢右為末煉蜜丸皂子大每服一丸含化不拘時候服欵冬丸治虛勞喘嗽靣目浮腫葶藶馬兜鈴南星半夏枯礬欵冬花佛耳草各等分右為細末水糊為丸如梧桐子大每服二十丸生薑胡桃湯下食後日進二服蛤蚧湯治虛勞咳嗽痰唾不利喘急胸滿呀呷有聲飲食不進蛤蚧酥炙去爪一對人參一兩杏仁湯浸去皮尖研五兩白茯苓甘草炙銼四兩桑白皮米泔浸一宿銼焙一兩右粗搗篩每服三錢水一盞入生薑同煎至六分去滓溫服空心夜卧各一鹿髓煎出聖惠方治虛勞傷中脈絶筋急肺痿咳嗽鹿髓半升生蜜酥各二兩生地黃汁四合杏仁二合湯浸去皮尖雙仁以酒一中盞浸研取汁桃仁右先以桃仁杏仁生地黃等汁於銀鍋內慢火煎令減半次下鹿髓酥蜜同煎如餳每於食後含化一茶匙補肺散出夲事方治勞嗽桑白皮熟地黃各二兩人參紫花黃耆五味子各一兩右為末每服三錢水煎入蜜少許食後四君子湯加秦芁黃蠟煎服二黃丸治勞嗽青黛二錢辰砂雌黃雄黃白礬信石各一錢并生用右并為末淡豉百粒湯浸去皮研成膏為丸如菉豆大每服三丸至五丸臨卧茶清下秦芁湯治虛勞喘嗽寒熱盜汗秦芁去苗土甘草炙銼各一兩桂去粗皮柴胡去粗皮當歸切各五錢右粗搗篩每服三錢水一盞入生薑三片烏梅並棗各一枚劈破同煎至七分去滓溫服紫艽散出聖惠方治虛勞上氣咳嗽不止紫芁去苗土白茯苓各一兩