加竹葉一兩切黃耆湯治虛勞少氣羸困無力小便頻數不能飲食黃耆銼二兩白芍藥去心焙桂去粗皮當歸切焙各一兩麥門冬一兩五錢去心焙龍骨熟乾地黃各一兩甘草炙各五錢右粗搗篩每服三錢水一盞生薑半分拍碎棗二枚擘破同煎至六分去滓食前溫服治虛勞盜汗虛翕少氣冝服此方出聖惠方黃耆一兩銼五味子五錢白茯苓一兩白术一兩五錢熟乾地黃一兩牡蠣一兩五錢燒為粉天門冬一兩去心甘草五錢炙微赤銼右為散每服四錢以水一中盞入棗三枚煎至六分去滓食前溫服鹿角膠散出聖惠方治虛勞少氣羸損鹿角膠搗碎炒令黃燥肉蓯蓉酒浸一宿去皺皮炙乾各二兩熟乾地黃三兩黃耆銼當歸各一兩五錢麥門冬二兩五錢去心焙石斛去根五味子一兩右為散每服食前以生薑棗湯下二錢溫酒下亦得芍藥湯治虛勞少氣脅下妨悶腹中拘急小腹疼痛心中驚悸咽乾唇燥面無顔色芍藥黃耆銼桂去粗皮各一兩甘草炙乾薑炮各五錢乾熟地黃一兩焙阿膠炒燥五錢右粗搗篩每服五錢水盞半煎至一盞去滓下飴糖少許再煎一二沸食前分溫二服夜卧再服枸杞湯治虛勞骨肉酸疼吸吸少氣小腹拘急腰背強痛心中驚悸咽乾唇燥面無顔色飲食減少憂愁嗜卧枸杞根銼黃蓍銼各三分甘草炙銼麥門冬去心焙桂去粗皮各半兩粳米一兩右粗搗篩每服五錢水一盞半生薑一分拍碎煎至一盞去滓空心服夜卧再服麻仁湯治虛勞少氣骨莭熱痛大麻仁五兩枸杞葉五兩乾薑炮一兩桂去粗皮半兩甘草炙銼三兩右粗搗篩每服三錢以水一盞煎取半盞去滓空腹溫服腎瀝湯出千金方治虛勞羸乏咳逆短氣四肢煩疼腰背引痛耳鳴面黧黯骨間熱小便赤黃心悸目眩羊腎一具桂心一兩人參澤㵼五味子甘草防風芎藭地骨皮黃蓍當歸各二兩茯苓玄參芍藥生薑各四兩磁石五兩右㕮咀以水一斗半先煮羊腎取一斗去腎入藥煎取三升分三服可常服之廣濟方治虛勞百病者無人參甘草芎藭當歸芍藥生薑玄參有蓯蓉三兩牛膝五加皮各二兩胡洽治大虛傷損夢寤驚悸上氣肩息腎中風溫小腹裏急引腰脊四肢常苦寒冷大小便澀利無常或赤或白足微腫或昏僻善忘者無澤㵼防風黃蓍玄參磁石地骨皮有黃芩一兩麥門冬乾地黃逺志各三兩大棗二十枚崔氏治腎臟勞虛所傷補益者無芎藭玄參磁石地骨皮有黃芩逺志各二兩乾地黃三兩麥門冬四兩大棗二十枚治五勞六極八風十二痺補諸不足者無澤㵼甘草五味子防風芍藥生薑玄參地骨皮有附子牡丹皮各一兩乾地黃一兩半蔓荆子菖蒲桑螵蛸各二兩經志録治腎氣不足無所聞者無澤㵼甘草五味子防風黃蓍芍藥生薑玄參地骨皮有附子牡丹皮蔓荆子各一兩乾地黃三兩大棗十五枚名羊腎湯近效方除風下氣強腰腳明耳目除痰飲理榮衛永不染時疾諸風者無當歸芍藥磁石有獨活牛膝各一兩半麥門冬二兩丹參二兩為粗散都分二十四貼入生薑一分杏仁十四枚水三升煮取一升又方出千金方大棗二十枚桑白皮六兩黃蓍蓯蓉五味子防風秦艽巴戟天澤㵼人參桂心薯蕷丹參逺志茯苓細辛牛膝各三兩石斛生薑各五兩杜仲磁石各八兩􅗑羊腎一具切去脂以水一斗五升煮取一斗三升右㕮咀內腎汁中煮取三升分三服相去如人行五里再服填骨萬金煎出千金方治虛勞少氣寒疝裏急腹中喘逆腰脊痛方生地黃二十斤取汁肉蓯蓉甘草阿膠各一斤麥門冬乾地黃二斤乾薑茯苓桑根白皮桂心各八兩人參桔梗五味子附子各五兩石斛一斤五兩牛髓三斤白蜜十斤清酒四斗麻子仁三升大棗百五十枚當歸十四兩乾漆十一兩蜀椒四兩右先以清酒二斗六升內桑根白皮麻子仁棗膠為刻識之又加酒一斗四升煮取至刻絞去滓內蜜髓地黃汁湯入銅器煎內諸藥末半日許令可丸入大甕盛飲吞如彈丸一枚日三若夏月暑熱煮煎轉味可以蜜地黃汁和諸藥成末為丸如梧桐子大每服五十丸不瘥加至三十丸普濟方卷二百三十一
