body:
  text: 普濟方巻四百八明周王朱橚撰嬰孩諸瘡腫毒門王爛瘡夫小兒臟腑有熱熱薰皮膚外為濕氣所乗則變生瘡其熱偏盛者其瘡發勢亦盛初生如麻子須臾漸大汁流潰爛如湯火所灼故名王爛瘡也方赤芍藥散治小兒王爛瘡一身盡如麻子有膿汁乍痛乍痒或時壯熱方見本門惡瘡類治小兒王爛瘡用蘿蔔根燒灰傅之佳秫米散治小兒王爛瘡及惡瘡秫米竹篠等分右燒灰細研為末以田中禾下水調之黄連散治小兒王爛瘡初患一日肉色變二日皰漿出或四畔時赤漸若漿匝身即不可療其狀如湯火宜速用此藥黄連末胡粉各一兩右細研令匀以生油塗之治小兒王爛瘡四交道中土竈下土右各等分為末傅之亦治夜啼治小兒王爛瘡初起皰漿似火燒瘡宜用此方桃仁湯浸去皮右搗令細以麵脂和塗之又方用吳茱萸酒煎汁塗之又方用赤地利搗末以酥和塗之又方用燒艾灰傅之如瘡亁即以生油調塗之又方用燒牛屎傅之亦可滅瘢痕亦治瘭瘡頭面身體生瘡夫小兒臟腑熱盛氣衝發皮膚而外有風濕折之與血氣相摶則生瘡其狀初赤起㾦㿔後及至膿汁或瘥或發生身體或生頭面隨處皆有也方大黄湯治小兒上下生瘡芍藥黄連黄芩各三兩苦參八兩大黄二兩蛇床子一升黄蘗五兩菝葜一觔右㕮咀以水二斗煮取一斗以浸浴兒吳茱萸散治小兒頭面風瘡及身上或如麻豆多痒吳茱萸炒赤小豆薰黄研入鴿糞㣲炒各半兩葶􅐗子子㣲炒用藜蘆各一分皂莢燒灰一錢白礬灰半兩右羅為散以生油旋調塗瘡上以瘥為度漏蘆散治小兒頭面身體生赤瘡濕痒黄水不止漏蘆當歸㣲炒黄蘗黄連去鬚各一分五倍子一兩燒令烟盡麝香一分研細膩粉二錢研入右羅為散入研了藥更研匀毎用時先煖鹽漿水洗瘡令净拭亁以生油調稀稠得所塗於瘡上如亁處即不再塗餘濕赤處即更塗之以亁為度藥後不得洗之苦參湯治小兒頭面身體上下生瘡不瘥苦參八兩地榆黄連王不留行獨活艾葉各五兩竹葉二升右㕮咀以水三斗煮取一斗浴兒瘡上亁傅黄連散治小兒三五月内頭面瘡起身體大熱升麻柴胡石膏各六銖甘草當歸各十一銖大黄黄芩各十八銖右㕮咀以水四升煮取二升分服日三夜一量兒大小用之青砂散治小兒身體頭面諸瘡青黛硃砂硫黄研水銀以棗穰研令星盡各半兩胡粉赤小豆各一分右拌匀研細毎用少許以生油膩粉調塗患處治小兒頭面身體生瘡累醫未效宜用此方貼之吳茱萸半兩㣲炒川大黄一兩膩粉一分麝香一分細研龍膽一兩去蘆頭右羅為散以生油調塗瘡上日二用之黄連散治小兒頭面身體生瘡熱盛黄連去鬚黄蘗胡粉各一兩苦參二兩水銀一兩與胡粉相和㸃水少許研令星盡右羅為散入水銀胡粉研匀如瘡在面上以面脂和塗之如在頭上及身上以生油塗之黄蘗散治小兒頭面身體生瘡熱痛黄蘗一兩水銀半兩苦參三兩黄連一兩去鬚右羅為散以猪脂和攪入乳研水銀星盡毎使先用泔酒洗瘡令净拭亁傅之日三上效黄連散治小兒頭面身體生熱瘡黄連一兩去鬚蛇床子二兩㣲炒黄蘗二兩胡粉半兩炒令黄色右羅為散若頭上身上生瘡以生油調如泥塗之若面上生瘡以猪脂和塗之蕪荑散治小兒頭面及身體生瘡久不瘥瘙痒殺蟲蕪荑三兩㣲炒葶藶子一兩㣲炒白礬一兩燒令汁盡吳茱萸半兩㣲炒右羅為散以生油調塗日二用之雄黄散治小兒身體生瘡皮膚赤痛瘙痒雄黄三分細研白礬半兩燒令汁盡井鹽一分莽草半兩右羅為散以生油調塗日三用之胡粉膏治小兒頭面身體生瘡久不瘥胡粉水銀與胡粉相和㸃少許水研令星盡白松脂各一兩猪脂二兩右先將松脂猪脂入鐺中煎成膏以綿濾過入水銀胡粉攪令匀日二塗之瘥黄連湯治小兒頭面身體生瘡出黄膿水黄連二兩去鬚甘草二兩苦參五兩栁枝并葉一握右細剉和匀毎用三兩以水五升煮至三升去滓着冷熱洗浴即愈黄連散治小兒頭面身體生瘡水出黄連一兩去鬚胡粉甘草各三分右羅為散以臈月猪脂和如膏塗於故帛上貼之日二換又方豆豉一合炒令焦黄蘗一兩右羅為散毎用先以熱灰汁洗瘡令净拭亁傅之黑豆散治小兒頭面身體生瘡黑豆大麻仁各二兩右羅為散著竹筒内横挿熱灰火中以銅器承受當有汁出取之令汁盡便塗瘡即愈又方用榆白皮一兩炙令焦羅為散以醋和塗之以綿覆之蟲出為度或以猪脂和塗之又方用黄黍米一升炒令黑焦羅為散以蜜水調和塗之又方用赤地利半兩搗羅為末以水浸梔子濃汁調塗之又方用膩粉以葱汁和塗之又方用兎絲子二兩搗令碎以水五升煎取三升去滓看冷煖洗之治小兒頭面身體生瘡赤腫焮痛用地榆八兩細剉以水一斗煮至五升去滓適寒温洗浴瘡日三效治小兒頭面身體有惡氣數起生瘡用豆豉炒令焦搗羅為末毎用先煮桃葉湯洗令净拭亁傅之治小兒頭面身體生瘡肉突出方用烏梅肉㣲炒搗羅為末傅瘡上效治惡瘡生頭面用貝母南星等分用湯泡七次研為細末入土砂少許亁則清油調搽濕則亁摻治年少氣盛面生皰瘡用麋角脂塗即瘥治小兒面上忽生瘡黄水出用鯽魚頭燒灰末和醬清汁傅日易之治小兒徧身瘡皰用茅香花桃葉同煮浴之令合諸香甚竒妙尤勝集驗黄連胡粉膏治小兒頭瘡月蝕瘡口邊肥瘡瘑瘡身體卒生惡瘡黄連二兩胡粉水銀研入各一兩右搗為散相和水銀研令相得傅瘡上縱黄汁引成瘡亦以粉之即瘥一方用白礬一兩燒蛇床子一兩末入用亦甚妙至耳邊到項上並用一方以猪脂調之治小兒身上生赤疵方用馬尿洗日四五度治小兒身上有赤黑疵以針父脚中取血貼疵上即消又方用狗熱屎傅之皮自卷落苦參湯小兒遍身生瘡宜用此方洗浴苦參大黄赤芍藥各一兩黄蘗蛇床子各二兩菝葜四兩右件㕮咀毎用一兩水三升煎至十餘沸去滓通手洗之治一切滿身手足爛痛鷹爪黄連為末用水調塗碗内覆碗又用艾烟薫過令亁刮下輕粉少許草烏燒存性黄柏皮各等分右為末臘油煎香調搽累有神效治小兒面上生瘡子純出膿消瘢法急以真酥潤之頻潤為佳纔有瘡痂急割去更潤之痂硬不落有礙生肉遂成瘢子此理昭然人多不知反謂剥早成瘢誤也防風散治小兒身瘡防風胡粉各一錢半川芎荆芥牛蒡子連翹各一兩右為細末毎服二錢水一小盞煎五分去滓空心服風丹加薄荷湯下又方用連翹煎下四君子湯蠳螋繞腰腹成瘡附論凡蠳螋蟲長一寸許身有毛如毫毛長五六分脚多而甚細居屋壁之間其逰走處遇人影則尿之人隨所尿著影處人身即應之生瘡人病之者多著腰瘡初生之狀匝匝起初結㾦㿔小者如黍大者如麻豆漸染生長濶繞腰腹生膿汁成瘡也方治小兒蠳螋瘡用燕窠土研細以猪脂和傅之治小兒蠳螋瘡繞身用蒺藜葉搗傅之無葉用子亦可又方用敗蒲扇以水煮濃汁塗之又方用藊豆葉搗爛塗之又方用生甘草搗末傅之又方用鹿角燒灰細研以酒和塗之水磨亦可又方用道邊蒲席燒灰細研傅之又方用槐白皮半觔細剉以醋二升浸半日以醋洗之日五六度又方用赤小豆搗末以醋和塗之瘥亁再塗小兒以水和又方用大麥爛嚼傅之日上三次瘥又方用梨子嚼汁塗之亁則再塗之梨葉亦可又方用栗子爛嚼傅之又方用扁竹汁傅之又方用生白礬細研以生葱汁調厚塗之伐指附論夫小兒伐指者其指先腫焮熱痛其色不黯然後方始爪甲結膿極者爪甲脫也亦名伐甲亦名糟指亦名土灶夫爪筋之餘也由筋骨熱盛氣澁不通故結腫生膿而指甲脫也方治小兒伐指腫痛方用麻黄三兩搗碎以水二碗煎至一碗乗熱畧浸指于中日十餘遍即愈治小兒伐指逆腫方用雜毛和黄土作泥泥指上令厚五分内煻火中煖之令㣲熱可忍候泥漸漸亁即易不過二三度即愈又方用猪脂和曲蟮研傅之數易之又方用取梅核中仁熱搗以醇苦酒和傅之已瘥即止一方入麻黄三兩又方用梁上塵鐵鍋中熬赤以人唾和之傅上令厚一寸即消又方用小便和鹽作泥厚裹之數易即瘥更用鑱針刺血出最妙疿瘡附論夫盛夏之月小兒膚腠開易傷寒熱寒熱毒氣搏於皮膚則生疿瘡其狀如湯之潑輕者匝匝如粟粒重者熱浸漬成瘡因以為名人呼為疿子也方龍腦散治小兒盛夏月因汗腠理開疎風熱毒氣客之則生疿瘡其狀如湯之沸或紛紛如粟粒呼為疿子甚者磨破經效龍腦研黄蘗末各半兩白麫臘茶葉各二兩右同研令細毎用新綿揾藥撲於瘡上破即傅之以瘥為度一方有赤石脂半兩一名赤石脂散葛粉散治小兒夏月疿瘡及熱瘡葛粉三兩甘草生一兩石灰一兩炒右羅為末以綿揾撲於瘡上以瘥為度滑石散治小兒體熱疿瘡滑石末三兩白礬灰一兩棗葉四兩右羅為末先以温漿水洗瘡後取藥傅之即瘥又方胡粉半兩白龍腦一錢右細研先用棗湯洗後以散摻一方用棗葉治小兒疿瘡熱破痛不止亁藕節二兩生麻油三合右先搗麻油如膏後下藕節末和别入生蜜稀稠得所塗於瘡上不過三五度療小兒熱疿以兎絲莖挼煮湯浴兒湯火瘡附論夫小兒被湯潑火燒者初時慎勿以冷物井下泥及尿并蜜塗搨之其熱氣得冷即却深搏至骨爛入筋也所以人中湯火筋脈攣縮者良由此也方羊骨膏治小兒火燒瘡敗壊羊髓一觔柏白枝生地黄蛇銜草黄芩梔子仁苦竹葉各一兩右細剉先於鐺中煉羊髓令沸次下諸藥同煎候地黄色黑為度以綿濾去滓傾於甆器中候冷塗於瘡上日數度用之白膏方治小兒湯火瘡白松脂白蘝白芨定粉各半兩乳香一分清油二合黄蠟一兩右羅為末先以油入甆鍋内用慢火熬令香下黄蠟令鎔次下諸藥末不住手攪熬成膏以瓷盒盛候冷日三四度塗之大麻膏治小兒卒被湯潑火燒苦劇者大麻子仁一合柏白皮白芨甘草梔子仁各一兩右剉以猪脂一觔熬黄色為度以綿濾去滓盛於甆盒中候冷日三度塗之一方用生地黄無梔子仁生地黄膏治小兒湯潑火燒赤痛生地黄柏白皮苦竹葉甘草各一兩右細剉以猪脂一觔煎令地黄色黑以綿濾去滓盛於不津器中候冷日三度塗之治小兒火燒湯潑百草霜黄丹茶末蛤粉各等分右為細末用新水調搽治小兒湯火瘡柏葉梔子仁各一兩胡粉半兩右羅為末以羊髓五合入鐺中於㣲火上化之後下諸藥末不住手攪熬成膏盛於不津器中候冷塗之以瘥為度又方白礬燒灰二兩梔子三七枚燒灰煙盡為度右細研為散以鷄子白調塗之又方柏白皮半觔研細右以猪脂五兩入銚子内與柏白皮同煎焦黄色取下綿濾去滓内入甆盒中候冷塗之又方用丹參搗末以羊脂和傅之又方用死鼠一枚以清油一觔煎令黑焦去滓日三度塗之又方用榆白皮嚼熟塗之又方用梔子仁以水浸汁日五六度塗之又方用􅌝􅌣根去土燒灰研細以鷄子白和塗之又方用栁白皮細剉半升以猪脂一觔相和煎候栁皮黑去滓放冷日二塗之又方用雄黄末以醋調塗之又方用浮萍草搗末以温水調塗之又方凡初被湯火所傷便取狗毛碎剪消膠和之遍塗於瘡上以帛封之自封以至痂落更不易之亦不痛甚良又方用新牛糞取汁塗之又方用粟米熬令焦投水中却漉出爛研傅之效又方用黍煮粥以鷄子白和傅之又方用乳頭香水研薄荷塗之又方治小兒卒破湯潑用牛皮膠以漿水同入瓷器内慢火煨令化厚塗之立瘥又方用煮生大豆汁塗瘥無斑一方黑豆濃煎汁塗又方用窑中新磚瓦末經雨濕者磨取末麻油塗調傅又方用蛤蜊殻燒成灰細研如粉以臈月猪脂調如無猪脂以麻油亦可疼即止其瘡即亁磁石散治小兒湯火傷用景鎮甆器不拘多少打碎埋土内炭火鋪上經一宿取出放地上出火毒碾為末入黄丹水調傅患處治小兒不覺墜火上用醋和泥傅之即無痕黄金散治小兒湯燙火燒破瘡大有神效燒破重者不過三上立效白芨四兩碾為細末苦参二兩右二味同研匀如有湯火燒燙破瘡上用新井花冷水調成膏敷貼燒破上用毛盖之如無毛羊絨盖之第三日用小油潤去痂再三重不過三上立效治小兒湯火瘡用大豆水煮取汁塗上易瘥無斑瘑瘡附論夫小兒瘑瘡者由風濕搏於血氣所成多著手足節腕間匝匝然搔之痒痛浸滛呼之為瘑以其瘡有細蟲如瘑蟲故也方蛇床子散治小兒瘑瘡及濕癬蛇床子附子雄黄細研吳茱萸白礬苦參各一分右搗羅為末傅瘡上日三用之螺殻散治小兒蝸瘡痒痛螺殻一兩爛者亂髮燒灰龍膽草末胡粉各半兩右細研為散以油脚調塗之水銀膏治小兒瘑瘡及疥癬惡瘡水銀白礬蛇床子黄連去鬚各四兩右除水銀外搗羅為散以臈月猪脂七兩入和研至不見水銀膏成傅瘡神效治小兒濕瘑瘡胡燕窠一枚取大寛抱子餘處不用右細羅為散毎使時先以水煎甘草入鹽少許作湯温温净洗瘡拭亁以散傅之三兩上便瘥若患惡瘡以醋用帛裹之日二易當愈治小兒瘑瘡及疥癬苦參三兩右為末以蜜和塗之治小兒亁瘑濕瘑疥癬用棗根皮葱白搗如膏以猪脂和塗治小兒久瘑瘡及疥癬内黄水汁出用羊蹄草搗爛以白蜜和絞取汁塗之治小兒瘑瘡用桃爛搗以醋和塗之白秃瘡附論夫小兒白秃瘡者由頭上白㸃斑剥初似癬面上有白皮屑乆則生痂成瘡遂至偏頭洗刮除其痂頭皮有瘡孔如筋頭大裏有膿汁出不痛而有㣲痒其蟲甚細難見九蟲論云是蟯蟲動作而成此瘡乃至自小及長大不瘥頭髮秃落故謂之白秃瘡也方皂莢散治小兒白秃瘡瘥而復生皂莢二挺燒灰黄芩硃砂細研麝香細研黄丹炒檳榔各一分白芨半兩亁薑一分燒灰右搗羅為末以濃醋調塗之甚者不過三上瘥松脂膏治小兒白秃瘡及諸癬松脂半兩天南星川烏頭去皮臍膩粉各一分杏仁一兩浸去皮尖清油二兩黄蠟一兩右搗羅為末先取油蠟入於甆器内以慢火鎔之後下諸藥末和攪令匀熬三五沸膏成候冷塗瘡上日再用之又方蕪荑豆䜴各一分川椒二十粒去目右搗如泥以陳醬汁調塗之又方栁葉枝一握水銀半兩以唾研令星盡皂莢一挺去皮子右細剉以醋一升煎至令濃去滓再熬成膏下水銀攪匀以甆盒盛之日二塗之野葛膏治小兒白秃瘡無髮苦痒野葛末猪脂羊脂各一兩右藥同煎三五沸攪令勻濾去滓盛於瓷器中候冷塗之不過三上瘥黑豆瀝方治小兒白秃瘡及疳頭髮連根作穂脫落髮不生者黑豆三合苣勝子三合訶梨勒皮一兩右為末以油水拌令勻内在竹筒中用亂髮塞口以煻火燒瀝取膏盛取不津器中毎使時先以米泔皂莢洗净然後塗之日二用十日内髮生矣又方巴豆十枚去皮心研紙裹壓去油鹽一塊如栗子大麻油一合右藥都入乳鉢内研如膏日三度塗之瘥治小兒白秃瘡痛痒不瘥赤桑根桃花三月三日取未開者隂亁各一兩右羅為散以臈月猪脂和如膏毎使時先以桑柴灰净洗拭亁塗之瘥黄蘗散治小兒白秃瘡髮落苦痒黄蘗末薰陸香各一兩右細研以生麻油調稀稠得所塗之亁即更塗不過三四度即瘥治小兒白秃瘡馬藺根一兩炒藜蘆半兩去蘆頭炒令焦右為末毎用時先以泔清净洗瘡拭亁傅之鯽魚方治小兒白秃瘡鯽魚一尾重三兩去腸肚以亂髪填滿濕紙裹燒存性右為末用生麻油調傅先以虀水洗拭亁後用藥以猪脂調亦可治小兒白秃瘡髮不生用蔓菁子川烏頭等分燒灰細研以生油和塗之治小兒白秃髮不生瘡有汁出或無汁亁燥痛用鷄子七枚用黄以銅器中急火熬令亁細研傅之治小兒白秃瘡用東引楝樹枝皮剉碎搗羅為末以猪脂和傅之又方用梁上塵五兩細研毎用時先以皂莢湯温温净洗拭亁傅之又方用芫花搗末以臈月猪脂和塗之又方用雄鷄糞白細研以陳醬汁調傅之又方用熊脂五兩鎔令消塗之又方用瓦青衣細研以油調塗之又方用醋泔洗頭後淋蕎麥灰汁再洗之又方用葵根燒灰細研傅之又方用蛇蛻皮燒灰細研猪膏調傅又方用大蒜研令爛傅之又方用牛糞塗之又方用苦葶藶子㣲炒搗如膏傅之又方用桑白皮為末醋調傅之如聖散治小兒白秃瘡痂痒不可忍立效生白礬瀝青末各一兩輕粉二錢半右三味同研匀先用葱白槐枝熬湯洗瘡净絹帛揩亁糝藥在上再用小油調搽三五上髮自然生出神效療秃瘡取虎膏塗之治小兒白秃髪不生汁出燥痛以陳香薷濃煮汁少許脂和胡粉傅上瘻瘡附論夫小兒瘻瘡者由風熱邪氣客於經絡使血氣否澁初生作細瘰癧形如梅李核或如箭簳或圎長長者至五六分不過一寸或二三相連時發寒熱潰膿血不止者謂之瘻也是五臟六腑之氣不和致血氣不足而受寒熱邪氣所為也然瘻者有鼠瘻螻蛄瘻蚯蚓瘻螬蠐瘻今各以一方治療之也方丹砂膏治小兒諸瘡久不瘥作瘻孔疽瘻丹砂半兩細研雄黄細研苦參各一兩川大黄黄連去鬚䕡茹各一兩白礬灰細研莽草各半兩右細剉用煉過猪脂二觔於鐺中煎藥候紫色以綿濾去滓入丹砂等二味以栁木箆攪令匀瓷盒盛塗於瘡上毎日換之妙一方有雌黄無苦參烏蛇散治小兒諸般瘻瘡久不瘥烏蛇肉炒黄蒺藜子三分曲頭棘針亂髮燒灰各半兩馬齒莧三分墻上者雄黄細研一分緋帛燒灰半兩右羅為散以酒調内瘡孔中以瘥為度夜明沙散治小兒久瘻移易三數處皆生瘡孔者夜明沙一兩白殭蠶乳香臈面茶各半兩右細羅為散傅於瘡上以瘥效赤小豆散治小兒一切瘻出膿水項強頭疼四肢寒熱赤小豆一合炒熟白蘝露蜂房燒灰各一兩蛇蛻皮二寸燒灰右細羅為散毎服以粥飲調下半錢量兒大小加減服之治小兒諸瘻穿穴成瘡痛不可忍者馬齒莧八兩槲樹白皮三兩麝香三錢細研杏仁三兩去皮炒黑研如膏右除麝香杏仁外細剉以水五升煎至一升濾去滓澄清入麝香杏仁相和令勻更煎令稀稠得所以甆盒盛毎使塗於故帛上貼日二換之又方用牛糞堆上赤茵一名朝生暮落花亁者搗末傅瘡上立效又方用亁楸葉搗羅為末以生油調傅之又方用塜中石灰細研傅之厚著之良又方用煉成松脂末填瘡孔令滿日三用之效又方用霜下匏花曝亁末傅之又方用桑根燒灰傅之并燒烏羊角作灰相和傅之又方用煉成松脂末并髮灰生黄丹傅之備急若患漏瘡頭盡開出膿夜復合者用大附子一顆内鯽魚腹中炭火上燒灰以研末傅之更搗蒜封之良諸漏瘡方百日兒屎蜜器封五日取塗之惡核漏瘡並戒怒氣不然核大漏則水多漏瘡方真龍骨蜂房炙黄各二錢黄丹炙五倍子降真香節枯髏骨一塊各一錢右為細末傅之疣目瘡附論夫小兒疣目者由附着肉生如麥豆大與肉色無異俗謂之疣子即疣目也亦有三數箇相聚而生者割破裏狀如筋而强㣲有血而續後又生此多由風邪客於皮膚血氣變化所成故亦有藥治之亦有法術治之而並得瘥此疾多生手足上方治小兒疣目桑柴灰四升以湯淋取汁入砂盆煎如餳附子二枚去皮臍生用􅔈砂一分研入糯米五十粒右羅為末煎調令勻毎取少許㸃疣目上即自落兼治黑痣又方桑柴灰一作桑皮艾灰各三升右藥以水五升淋之又重淋三徧以五色帛内汁中合煎令消㸃少許於疣目上則爛脫矣又方用糯米五十粒於濕石灰裏埋之以爛為度用針撥破疣目傅之經宿自落又方用硫黄細研以醋調塗疣目上六七度又方用松脂柏脂搗末以石灰汁調㸃少許於疣目上自落又方用七月七日以大豆一合拭疣上三遍即令病人自種豆於南屋東頭第二流中豆生四葉以熱湯浴之瘥又方用石灰以醋漬六七日取汁㸃疣目上小作瘡即愈又方用蜘蛛絲纒疣目即落又方用杏仁燒令黑研膏塗之又方用牛涎數塗疣上自落又方用針及小刀子决目四面令似血出取患瘡人瘡中汁黄膿傅之莫近水三日即膿漬根動脫落治小兒徧身如魚目無膿謂之疣目瘡東坡謂之征虜瘡用升麻一味剉煎百沸却入蜜一二匙以甆器内盛之用鵝翎拭瘡上諸瘡附論夫小兒傷濕血氣壅滯則生瘡多有父母妳子不好潔净衣褥不與頻換洗滌或尿屎穢惡連日不洗亦能浸漬而生瘡天氣温和頻與澡洗更衣名曰外宣亦不須服藥小兒不得已服藥此乃下策將養合宜何病可侵更令乳哺有節勿令過飽其身乃如藥樹此養生之理也凡小兒甜瘡久不愈者俗呼為香瘡是也多在面部兩耳前一法令母口中嚼白米成膏子以塗之不過三上則愈矣小兒并母皆忌鷄猪魚兎酒醋動風發熱之物如治疳指亦同此法凡人自孩提以至弱冠潮熱發瘡只是疳氣使然盖疳蟲耗其精髓蝕其肌膚體虚膚空疳熱流注遂至徧身熱瘡發渇無已須用猪肚黄連丸主治仍以大腹皮苦參白芷煎湯浴之蘆薈丸肥兒丸二藥夾和佑之可也方甘草芍藥湯治小兒火灼瘡一身盡如麻豆或有膿汁乍痛乍痒甘草芍藥白蘝黄芩黄連黄蘗苦參各半兩右為末以蜜和傅之日二夜一亦可作湯洗之水銀膏治大人小兒一切瘡不識者神效方水銀甘草黄蘗黄連松脂膩粉土蜂窩等分右取水銀放掌中以唾碎為青泥入瓦碗中以生油和餅研生絹濾如稀餳和藥末再研如稠餳先以温水洗瘡布拭亁塗之治一切無名瘡此藥搽之立效聞香散治一切瘡硫黄蛇床子黄連黄蘗輕粉川椒等分右為細末以芝麻油調搽瘡上將手鼻内聞香馬莧散治小兒諸瘡久瘻不瘥馬齒莧墻上者烏蛇肉酒浸一宿焙各一兩蒺藜半兩曲頭棘針燒灰亂髮灰緋帛燒灰各半兩右搗羅為末毎用量瘡大小用白酒調以帛子貼瘡上生肌散治小兒角腫生瘡及諸瘡口不合真地骨皮五倍子甘草各生黄蘗黄連炒等分右為細末亁糝瘡上以麄末用沸湯泡蘸洗亁處津調傅傅瘡藥剪草宣連苦參各等分右為細末洗了次用麻油輕粉調傅治小兒一切毒瘡并痘風瘡大黄鬰金甘草右等分為細末以臈月猪脂熬沸濾去滓入明礬末攪匀放冷搽生料四物湯治血熱徧身生瘡腫痒及脾胃常弱不禁大黄等藥冷劑宜服之生亁地黄赤芍藥川芎當歸洗去蘆黄芩減半防風各等分右㕮咀水煎去滓大小以意加減忌酒麫猪羊肉豆腐洗疳瘡用甘草節香白芷五倍子煎湯洗之備急治小兒疳濕瘡用艾葉一兩水一升煮取四合分三服瘥千金云艾葉切五升以水一斗煮汁取一升半分三服治小兒面湮瘡俗云銀瘡者是母受胎之日食酸辣及邪味過度多生此瘡用白藥煎半兩白礬二錢為末小油調搽神效治刀傷成瘡用鼔槌草根即鬼箭草根取出不見水去土剉碎搗更入鹽同搗忌銅鐵器傅之治火灼瘡此候乃血氣熱肌熱而又傷熱其狀似火疱先起疱而次黶成瘡宜服牛黄散仍用傅之一名疱瘡黄連苦參等分右為末加輕粉和糝患處洗瘡方棗葉無葉用根菊花各一握右煎湯用猪膽水湯和浴次用煎藥亁糝之仍服牛黄散無不瘥者治無辜瘡毒用黄連大柏為末以芭蕉汁調敷用留口搽瘡加輕粉有汁加黄丹煆麝香各少許和勻亁糝治小兒疳濕瘡用鐵衣著下部即瘥治小兒疳瘡用猪脂和胡粉傅之五六度又方用麻子嚼傅之日六七度又方用羊膽二枚和醬汁於下部灌之猪脂亦佳治濕瘡用濃煮地榆汁洗浴毎日二度又方春用栁條荆芥夏用棗葉槐枝秋冬用苦參頻浴身安外宣無病治甜瘡用大棗去核實以緑礬火燒㣲存性研細貼之如瘡亁小油塗之治胎毒瘡方治一歳二歳内滿頭延及遍身生瘡皆因在胎中父母恣情交合所致名曰胎蛆經久不瘥先用化毒丹消毒飲服之却用父小便以鵞翎刷洗瘡上青黛為細末亁糝效治小兒口瘡兼治臍風瘡久不瘥用五月五日蝦蟆炙杵末傅瘡上即瘥又治小兒蓐瘡月蝕瘡癰疽節毒未破者用猪脂和傅之療小兒面上瘡痘子瘢法用黄明膠慢火炙為末温酒調服一錢七出者服之無瘢未出服之瀉下又治小兒火燒瘡㓕瘢痕黄明膠小鷄翎掃之治小兒諸瘡用燒卵殻研和猪脂傅之治小兒尿灰瘡及臍瘡久不瘥用伏龍肝和鷄子白塗之臍中瘡以末傅之治小兒尿灰瘡用大黑豆皮熟嚼傅之治小兒風瘡久不瘥用燒薊根節末以傅之治小兒蓐瘡用澤蘭心嚼傅之治小兒火灼瘡一名瘭漿瘡一名火爛瘡用酒煎茱萸拭亁治小兒患風瘡久不瘥用當歸末傅之治小兒蓐瘡兼治白秃瘡用燒葵根末傅之香粉散治諸瘡久不瘥用白膠香半兩碾末輕粉二錢研和猪脂調傅或猪筒骨髓白膠亦治大風即是松脂鎔煉投冷水中為末水調空心常服治小兒急黄并爛瘡用赤小豆取汁冷洗不過三度瘥能令人美食末與鷄子白調塗熱毒癰腫瘥通氣健脾胃治小兒吐逆止鼻紅并瘡壁錢蟲右滴汁傅鼻中及瘡上并傅瘻瘡治刀傷成瘡用真降香為末糝之如未尋得鼓槌草根用汁同降香為末傅之連翹散治驚瘡煩躁焦啼大能清心解熱久服則瘡自然輕減也防風羌活連翹荆芥甘草赤芍藥梔子蟬蛻黄連等分右為散毎服用燈心薄荷生地黄同煎當歸散治驚瘡顔色清淡川芎當歸白蒺藜白芷甘草人參荆芥穂防風羌活等分右為散毎服用鈎藤勾子同煎烏犀膏治一切驚熱瘡疾元參荆芥大黄等分右為末煉蜜為丸如指頭大毎服用一丸薄荷湯下神異一擦光治小兒諸瘢疥白秃瘡肥爛瘡痒痛如水流者神效白芷四兩硫黄三兩白礬枯一兩樟腦一兩右為細末小油調成膏於瘡擦之再擦如此上三五次尅日見效患者用之誠不負一擦光之名也用猪膏亦妙先以皂莢葱白熬湯洗净後上藥柴胡通經湯治小兒項側有瘡堅而不潰名曰馬刀瘡柴胡連翹當歸尾各二分紅花少許黄連五分黄芩生生甘草鼠粘子桔梗荆三稜各二分右件㕮咀麻豆大都作一服水二大盞煎至一盞去滓稍熱服食後忌苦藥泄大便乳香膏治小兒煉銀瘡水浸徹或遍身瘡痂癬痒並皆治之世俗亂傅小兒煉銀瘡搽之入腹信勿謬也明瀝青黄蠟各一兩芝麻油四兩右三味一同煉開綿濾去滓入後項藥黄丹另研枯白礬研各一兩乳香半兩另研沒藥二錢半研輕粉二錢右五味一同研令入於前三味厯青蠟油擡於地上不住手攪令成膏子如硬再入小油少許鎔開熬五七沸搽於煉銀瘡癬上一日搽兩三上大有神效香瓣散一名香瓣瘡一名月耳瘡一名浸淫瘡此藥治小兒耳邊身面上胷項上浸徹黄水到處成瘡其效如神荆芥一兩半小棗子一十箇二味燒灰存性羖羝羊鬚一兩碗内燒存性枯白礬二錢半另研細右件三味同研極細再入輕粉一錢半調研匀毎用少許小油調搽重者不過三上立效立效散治小兒大人粘瘡浸徹經年不效枯白礬黄丹飛過各一兩白膠香另研一兩右件三味一同研匀極細先用葱白荆芥熬湯洗净揩亁上藥後用小油調搽三五上即瘥黄柏皮散治小兒頷頥生瘡赤爛與亁糝之不問脾虚驚熱並可服之白皮枯白礬朴硝等分右為末搽患處即安治風瘡不可療者用真厚朴依燒瀝油法燒油搽一抺便用些香油抺瘡上治小兒腹瘡以葛粉裛之妙治小兒脚􅂒如有瘡取蠟濃煎塗之主小兒醋瘡以産死婦人塜上草作浴湯洗之不過三度佳取時勿回顧治小兒酢瘡以仙人草煮湯浴之搗傅之亦可酢瘡頭小大硬者此瘡或有不應瘥而瘥者當汁毒入腹必危可預飲冷藥防之兼用此藥洗瘡諸蟲咬傷方治小兒蛇咬白礬甘草等分右搗羅為末如蛇咬著心神熱燥眼前暗黑用新汲水調下半錢如有腫赤用白礬鹽漿水萵苣根等水煎三五沸淋洗即腫氣自消如大叚蛇咬著未及修合藥用耳塞少許入在咬著處瘡口内以釅醋一滴滴在瘡口痛即止又方合口椒蒼耳苗各一兩右藥和搗傅之又方一名椒䜴散生椒三兩去目豆䜴三合炒黒焦右搗羅為末以津調㸔多少傅之立定又方用逺志嚼令爛傅之并内瘡孔中又方用白芷為末亁糝患處次用井水調白芷末傅之治小兒蠍螫用半夏以水研塗之立止又方用桂心水磨傅之又方用亁薑爛嚼𫝊之又方用大蒜研令爛塗之治小兒蜈蚣咬頭垢苦參末各一兩右用研令勻以酒和塗之又方用桑白皮汁塗之又方用蝸牛活者生研厚塗之又方用薑自然汁煎作濃膏入白礬末少許調厚塗之又方用麻油燈薰患處次用鷄屎塗之良治小兒蜘蛛咬棗葉柏葉五月五日取生鐵衣等分右搗羅為末以生油和如膏先火炙瘡然後塗咬處神效又方雄黄一分麝香半分右細研以藍汁一大盞攪令勻㸃咬處立效又方五加皮一兩半夏四兩右藥燒灰研細以醋和塗之又方用生鐵上衣醋研濃汁塗之又方用菝葜苗一握搗如泥傅之又方用白殭蠶末以津和調傅若有絲出盡瘥矣又方用雄黄末以葱汁調厚塗之又方用生白礬末一兩以醋調成膏厚塗之又方用驢溺及乳以物盛傅之瘡亦取驢溺處臭泥傅之亦佳治小兒卒被諸蜂蠆螫露蜂房白礬各半兩右搗羅為末以水煎如膏厚塗螫處效治小兒卒被狗咬用乾葛搗羅為末傅瘡上更濃煎葛汁與兒飲之又方用熱牛屎塗之立瘥又方用黄蠟鎔灌瘡中效又方用葱搗取汁毎服半合日三服之又方用地龍糞封之毛出即瘥又方用杏仁湯浸去皮搗爛傅之不三五度效治小兒卒被猫兒爪及咬損痛方用剪刀草搗取汁塗之治小兒被鼠咬痛成瘡不能愈者一二次愈用猫尿塗於患處治犬咬癲犬瘡發者能殺人用韭葉挼傅患處及令服韭汁數日雄黄散治蛇蠍蜈蚣所傷痛不可忍貼之立愈雄黄另研生半夏川烏尖亁薑各等分右為細末亁搽痛處如痛不止用釅醋調搽其痛立止蠍螫南星散治蠍螫蜈蚣所傷痛不可忍蓽撥三錢半半夏生二錢半南星生一錢半白礬生一錢雄黄二錢右為細末用一捻就痛處搽之釅醋調貼之立效靈聖散治大人小兒風狗咬破瘡犬吠所傷其效如神天南星生防風去蘆等分右二味研為細末先用葱白槐枝熬湯洗净乾貼瘡口上日用二度上膏藥葢之普濟方卷四百八
