body:
  text: 普濟方卷三百六十八明周王朱橚撰嬰孩傷寒門傷寒附論夫小兒未能冒涉霜雪乃不病傷寒也大人解脫之久傷於寒冷則不免耳然天行非節之氣其亦得之有時行疾疫之年小兒出腹便患斑者也治其時行節度故如大人法但用藥分劑少異藥較少耳傷寒者冬時嚴寒而人觸冒之寒氣入於腠理摶於血氣即寒熱頭痛體痛謂之傷寒其兼驚者是熱乘心心主血脈小兒心神易動為熱所乘故發驚其大便不通是寒於氣而生熱熱流入大腸故燥澀而不通其咳嗽者邪在於肺肺主氣傷寒邪氣先客皮膚隨氣入肺故令嗽重者有膿血也其自汗者陽虛受邪陰氣又虛邪氣又乘於陰陰陽俱虛不能津液所以汗出也其餘熱往來是邪氣與正氣交爭正氣勝則邪氣却散故寒熱俱歇若邪氣未盡者時干於正氣正氣為邪氣所干則壅否還熱故餘熱往來不已其嘔者是胃氣虛熱乘虛入胃得熱則氣逆故嘔也其渴者是熱入臟臟得熱則津液竭燥故渴也其鼻衄者是熱摶於氣而乘於血血得熱則流散發從鼻出也夫小兒傷寒得之與大人無異所異治者兼驚而已又多因夾食而得仲景云冬受寒毒之氣即發者為傷寒其寒毒藏於肌骨之間至春而發者為瘟病至夏而發之者為熱病又以冬氣溫春氣寒夏氣冷秋氣熱謂之時氣萬全方云熱病傷寒溫病時氣傳變無異也凡時氣者四時之間有不正之氣也為春應暖而反寒夏應熱而反冷秋應涼而反熱冬應寒而反溫非其時有其氣其氣傷人則頭疼壯熱咳嗽氣粗煩渴心躁恍惚驚悸傳變與傷寒無異俗呼謂天行者是也辨三陽受病訣詩云足太陽膀胱經頭疼腰脊痛項強轉筋難面赤心煩躁尿清熱惡寒足陽明胃之經潮熱時微汗譫言臥不安尿紅多糞結飲水舌咽乾足少陽膽之經來往發寒熱苦口連唇舌耳重脅胸疼嘔吐喉中噎辨三陰受病訣詩云足太陰脾之經胸滿腹䐜脹疼因冷氣攻大便常自利噎嘔實難通足少陰腎之經心煩但欲寐或渴或自利欲吐吐難通惡寒多恐悸足厥陰肝之經飢來不欲食食則吐蛔蟲渴瀉心間疼四肢冷似風其間有陰極發躁陰證似陽學者當以脈别之諸數為熱諸遲為寒無如此最驗也小兒有隂證者即變為慢驚今列陰證庶幾識之小兒傷寒候診其脈來一投而止者便是得病一日假令六投而止者便是得病六日其脈來洪者易治細微者難治也小兒傷寒可醫者七鼻內清水鼻者是肺之外應傷寒故外風吹著身皮毛及髮皆主於肺故令外傷流出清水身寒毛立後則身熱躁呌口朝乾耳冷汗出傷寒者是邪氣傷其正氣正氣軟弱則不能主於身被邪氣攻出故為汗汗出多則冷面黃無力後若不止則體虛生風宜補實之鼻塞傷寒是外邪氣肺所受則正氣在肺邪氣傷正氣則滯榮衛不通故乃鼻塞是發後更與通關藥耳解面赤傷寒是傷氣及邪氣入腹其肺當旺不肯受邪肺若受患其初傳心則心氣虛故令面赤日中則口乾夜間不卧隂陽相克可用涼藥服之吐白水何以吐白水其傷寒受在於胃氣胃邪所傷胃弱則吐白水若吐食則入脾瘥後須變身黃脾胃俱象土故色黃宜早暖脾胃耳兩眼黃赤傷寒是先受在脾其色黃次傳在肝主眼故邪傷於肝故共脾邪入之故令眼黃赤宜以洗肝後發汗耳小便黃赤傷寒者寒氣傷肺肺虛故不受於心心實傳腑心以小腸為腑受邪則滯榮氣則赤後則尿如血通小便後取之不可醫者六傷寒面黑者不治傷寒氣傷皮膚本入肺肺傳腎腎主水水屬北方其色黑復傳心心屬火其水大能克火故令面黑不治耳傷寒大小腸痛不治其傷寒受在肺肺以大腸為腑臟不能受倒傳出一藏不再傳入心則火克金心以小腸依為腑故大小腸痛耳傷寒忽作鴉聲不治此是傷寒邪氣傷肺肺主聲肺被邪傷絶則聲出不迥如便作鴉聲是肺絶也傷寒呌聲不出不治此是傷寒入腎失解腎氣絶不能作聲即死耳傷寒糞黑不治何以瀉黑血糞其傷寒邪傷肺肺絶不能行血其血黑色從大腸中下如死鵝鴨血一般即死如無大便赤黑不妨却是熱盛宜與涼藥耳傷寒爪甲黑不治爪黑者傷寒傳肝其邪勝正氣絶肝主筋及主諸爪甲肝絶則不能榮於爪甲者故為死之形也右件其傷寒皆是邪氣傷於臟腑滯其血氣則寒熱血脈亂不能飲食其頭疼面赤者則是陽毒其面青不語多哭身寒是為陰毒凡傷寒三日前宜汗三日後宜轉又云陰毒宜回陽先與熱藥後方汗陽毒宜解先與涼藥後與汗之取轉亦此説三日前汗三日後轉此大略之言耳有初得便宜轉者有得之三兩日宜汗者不可拘此傷寒外證一見眼睛黃赤及鼻塞遍身壯熱口鼻出清水非時冷汗加之咳嗽氣閉毛起小便如粉汁此皆是傷寒候傷寒候如覺面帶黑色大小腸乾痛上吐下㵼氣又刺痛耳內膿及眼生浮膜皆惡候也凡治傷寒須辨表裏不分汗下差誤古人曰桂枝下咽陽盛即斃承氣入胃陰盛乃亡孫真人云汗下相反其害甚速如魚出水若蛾入湯傷寒有表證有裏證有半在表有半在裏有表裏兩證俱見有無表裏證在表宜汗在裏宜下半在表半在裏宜和解表裏俱見兩證參詳無表裏證大柴胡湯下審驗汗下吐證者千金云陽盛陰虛汗出即死下之當愈陽虛陰盛下之即死汗出即愈身熱增寒汗出陽虛宜汗身熱潮熱汗出陰虛宜下調經論云陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒似此别之不汗強汗津液枯竭而死合汗不汗竅閉悶絶而死不下強下洞泄不禁而死合下不下腫脹煩亂而死惡寒者不當風而憎寒惡風者不當風而憎寒皆屬表又云大法春宜汗秋宜下發熱惡寒身體痛而脈浮凡傷寒發表須當隨輕重而汗有發汗者有和解者兼四時發汗亦自不同春不可大發汗以陽氣尚弱可用小柴胡湯之類冬不可發汗者以陽氣伏藏不問傷寒病數用桂枝麻黃各半湯或得少汗而解或無汗自解病勢甚者不拘此夏月天氣大熱而脈洪大宜正發汗不可用麻黃桂枝熱性藥須是桂枝麻黃加黃芩石膏知母升麻夏月有桂枝麻黃證不加黃芩輩服之轉助熱氣發黃斑太陰脈浮少陰發熱亦須發汗脈經云汗不出不至足者死熱病得汗大熱不去者死脈沉數細熱寒少脈微虛煩腹間有動氣衄血壞病已發汗吐下不解為壞病不惡寒反惡熱手掌心并腋下濈濈汗出胃中乾燥糞結聚潮熱大便硬小便如常腹滿而喘或讝言脈浮而滑或心胸連臍腹大段注悶腹中痛坐臥不安冒悶喘急極者不候他證便下之凡大便祕妨悶恐尚有表證者亦少少飲小承氣湯微解之不可過多令大泄也若失下則氣血不通四肢便厥醫人不識反疑是陰厥復進熱藥禍如反掌不可不察陽明病自汗若發汗小便自利不可下宜蜜導通法脈浮惡寒脈虛不轉失氣是腹中動氣也大便堅鞕小便少未可攻之恐津液還入胃必先硬後溏也小便如常乃可攻之當問其小便日幾行若利小便日三四行今日再行故大便不久出今為小便數少以津液還當入胃故大便不久必通也王氏云傷寒有承氣之戒又問轉藥孰緊答曰大承氣湯最緊小承氣湯次大柴胡湯又次之仲景治法蕩滌熱皆用湯液不可用丸子孫真人云服大承氣湯得利瘥後不可服補藥熱氣得補復留使下之是重困也凡病人非大渴不可與冷水若小渴口燥咽乾小小呷滋潤之若大渴煩躁能飲一升者與半升隨力量多少但減一半若不與則無由作汗乾燥煩喘而死者多矣但莫令足意飲也若大汗將來躁渴甚者足意飲之勿疑常見人因渴飲水而得汗見小渴遂強與之致停飲心下滿結喘而死者亦多矣其熱脈數尚可作汗而解者出於幸也胸膈痞滿痰壅塞噎脈浮或滑並宜瓜蒂散吐之虛人當吐不敢吐宜枳實散壓氣毒痰水過則毒入胃乃可微吐枳實散枳實為細末每服半錢米飲調下驗陰陽二厥者各自不同陽厥者微厥却發熱若陰厥却不發熱四肢逆冷惡寒脈微而細大小便滑泄又一法陽厥手掌中心溫熱陰厥俱冷驗表裏兩證俱見者傷寒表證當汗裏證當下不易之法也發表攻裏本自不同甘遂神丹不可合飲桂枝承氣安可並進假令病人脈浮而大是表證當汗其人發熱煩渴小便赤却當下此皆表裏俱見五苓散主之假令傷寒不大便六七日頭痛有熱者是裏證當下其人小便清者知不在裏仍在表當須發汗此是兩證俱見即未可下宜與桂枝湯假令病人心不滿口燥不欲食大便堅脈沉細是裏證當下頭痛汗出微惡寒手足冷却當汗此兩證俱見者仲景所謂半在表半在裏是也小柴胡湯主之假令病表證未除而醫數下之遂陽熱而利利不止心不痞硬仲景謂之表裏不解桂枝人參湯主之假令本太陽病醫反下因而復痛是有表復有裏仲景用桂枝加芍藥湯痛甚者桂枝加大黃又云太陽病桂枝證醫反下之利不止脈促者表未解而汗出者葛根黃連湯主之凡小兒單受傷寒與升麻惺惺散小柴胡湯如大便堅或焦黃洗心散四順散八正散兼瘡豆皆可服如夾食傷寒法當以紫丸子遂食後與加減惺惺散果有食方可用如無食證欲利大便宜湯液利之若時行瘡豆兼有豆證未可用丸子下之宜與消食藥隨證調理如夾驚傷寒與紅龍散紅連散紅綿散紅桃散鎮驚藥更與傷寒正方中對證擇用之三傷寒詩驗夾驚傷寒頰赤身多熱心煩又畏寒唇紅微有渴驚哭睡難安驗夾食傷寒頭疼并腹痛嘔逆又咨煎臟腑腥酸臭蒸蒸熱不眠驗單受傷寒咨煎多困倦身熱燥皮膚鼻內流清涕頭疼嗽喘粗馬詹都巡孫男二歲夾驚傷寒潮熱大便堅忽吐數口發驚召醫視之見吐而驚搐便認為慢驚用溫驚藥治之三日病色危余曰兒本傷寒因熱盛欲發急驚偶因傷乳吐數口發搐看見兒舌白唇紅大便黃實目青身熱吐出酸臭此食癎也煎四順飲送下紫丸子瀉數行主人曰因吐生驚豈可雙下瀉藥答曰不入虎穴安得虎子况此病是食熱證不以下藥瀉熱無由驚定主人聽用瀉數行後以青金丹二服驚搐小定并琥珀散三服病退一半來日仍舊驚搐目鮮面赤唇紅小便少赤與洗心散驅風膏琥珀散各二錢病除主人以為事更不服藥余曰病未全除血氣盛則當再發矣後五日果發搐再為驅風膏琥珀散洗心散治之安愈此兒名曰再生林友編修孫男二歲夾驚傷寒召醫視之五日忽發驚搐用珍珠丸下痰愈而復作召余視之曰兒本傷寒有下證為失下熱不去故驚搐也余以調胃承氣湯瀉數行與琥珀散驚搐遂定後有潮熱發時氣粗昏困大便焦黃絶熱退則連聲咳嗽氣粗涎盛嗽退仍舊潮熱如此五日調理未退林友問此何病也答曰諸書皆不言嗽退而熱熱退而嗽古人立法止説大綱要之隨機應變不可膠柱調瑟也今此子餘邪流入心肺二臟相傳故曰熱退而嗽嗽退而熱經曰七傳者死間臟者生此乃七傳當死經曰七傳者心傳肺肺傳肝肝傳脾脾傳腎腎傳心一臟不再傷故言七傳者死也可喜者是秋八月肺旺受心之邪衰兼食而不瀉尚可療救問曰何治法曰對證潮熱來時與小柴胡湯大柴胡湯各加黃連黃連能瀉心乃瀉其強也咳嗽來時與補肺散參杏膏潤肺散補肺者恐心傷肺故補其弱也錢氏云瀉其強而補其弱果愈主人曰兒病雖安願聞其理答曰以斧伐薪可謂必克矣然不偱其理則斧可缺薪不可破以藥對病可謂必安矣然不偱其證則藥不效病不得愈今二證交互嗽熱相形當分證而治之主人曰善哉全嬰論云張氏二子大者十三小者十歲俱患頭疼發熱召余視之曰大者當汗小者當下主人曰所苦正同何異治也答曰大者病在表小者病在裏所以異治也即各與藥翌日俱安主人曰何知在表裏也答曰大者頭疼發熱但惡寒緣陰邪頗盛知病在表法當汗之小者頭疼潮熱不惡寒緣陽邪頗盛知病在裏法宜下經云陽盛隂虛下之當愈陽虛陰盛汗之即安汗與麻黃湯下與調胃承氣湯丁松秀才二女大者十五小者十三俱患頭疼大者不熱面青鼻塞小者頭疼不熱面紅鼻乾召余視曰大者瓜蒂散小者通頂散並吹鼻即安主人曰受病無殊用藥何異答曰孫氏云頭疼鼻塞因中寒濕頭疼鼻乾因受風熱今大者頭疼不熱面青鼻塞為中寒濕詢之病因沐頭倉公論曰沐頭未乾而臥則厥頭疼至肩瓜蒂散吹鼻出清水并溫水調服令吐涎未全退惺惺散加川芎小者頭疼不熱面紅鼻乾為風在腦詢之未病之前目青多眥肉多瞤動通頂散吹鼻令涕噴則可以知消息矣却并以朴硝水調敷頂𩕄之上若未全退則又服消風散俱安主人曰小兒疾雖痊瘥然而其理則某未聞也余答曰鼻出清水者去其寒濕之病吹鼻噴涕者去其風熱又病同藥異之説豫故引素問云陽病治陰陰病治陽退熱以寒藥退寒以熱藥實病虛之虛病實之知斯道者用則必中小兒傷寒證候止議三種乃為正要有正受夾驚夾食前述傷寒並用脫甲散其病既分三種須當究論輕重鼻塞小便赤咳嗽關竅不通壯熱面紅頭疼體重渾身手足俱熱凡治小兒正受傷寒及感寒邪傷風諸證宜服人參羌活散小便赤色或心神不寧病在表裏之間或再發散宜與小柴胡湯一二服凡治小兒夾驚傷寒神困昏悸頭疼氣粗宜服王氏薄荷散及防風散凡小兒夾食傷寒即先與微利次與脫甲散或人參羌活散下之紫霜丸為上取微利為度大抵小兒傷寒不可重表亦不可重下設重表重下用藥過分令兒虛乏困重即成壞證難療凡小兒傷寒雖無多事須是認證分明應傷寒傷風只可表惟有夾食宜下之凡夾食傷寒腳微冷似有積證相類但此等傷寒自是不同不可不問知其端的然後次第進藥仍丁寧病家令避風濕與忌生冷勿令強力無恣飽餐恐勞胃氣其病再復且醫家調理即須審度有無瘡疹時行及左右鄰舍有無此患者若或有之亦不妨事但解表藥與服不可妄投驚藥餘無恙矣惟有壞證蓋由前人用藥不當撥亂陰陽故致為壞或因觸受風邪故致為壞或因強力食毒故致為壞或因冷濕傷於經絡故致為壞壞則極難治凡小兒傷寒候惟有咳嗽一證不為容易若有此證宜服人參枳實湯尅效萬一不可攻擊善醫者察之為良也傷寒是寒氣客於皮膚寒從外摶於血氣腠理閉密藴積在內不得外泄以致頭痛壯熱體疼所以須解其皮膚令腠理開津液為汗發泄其氣則熱歇凡嬰孩傷寒不可燥藥發汗蓋孩子一向藏府燥熱以燥藥發汗汗乃心液熱極傷心必厥厥則難治也若以性寒湯藥陽受於冷冷熱相擊孩子一向驚呌不睡熱衝於腦頭縫開張皮膚及四肢汗出如油手足或熱或冷多狂癲驚痙即不可治也小兒身微熱咨􅵤吐乳鼻塞咳嗽此候因母抱兒子當風處吹著背俞至此所治者當日下天麻散二服朱砂膏二服其患即愈不得誤動臟腑傷寒變遂夾驚夾食中風所中傷寒各説有一因依根原各别下藥有殊如調理上件傷寒傳變吐不止大小便不通大渴耳內膿出身上生斑點赤心狂眼直鼻口乾燥死候不治嬰孩小兒單傷寒者渾身壯熱鼻流清涕身上寒毛起咳嗽欲喘宜用解傷寒紅綿散三二服間調胃氣進乳食觀音散一二服如有餘熱未退睡裏多驚須進七寶輕清丹三二服調胃氣觀音散三二服尋常風壅發熱鼻涕痰嗽煩渴惺惺散主之咽喉不利痰實咳嗽鼠黏子湯主之頭額身體溫熱大便黃赤腹中有熱四順散連翹飲三黃丸主之頭額身體溫熱大便白而酸臭者胃中有食積雙丸主之小兒無異痰惟飲食過度不能自節心腹脹滿身熱頭痛此雙丸悉治之小兒身體潮熱頭目碎痛且心神煩躁小便赤大便祕此熱劇也洗心散調胃承氣湯主之頭疼發熱而偎人寒者此傷寒證也升麻湯主之無汗麻黃黃芩湯有汗者升麻黃芩湯皆要藥也小兒尋常不可過服涼藥胃冷蟲動其證與驚相類醫人不能辨往往復進驚藥加麝腦之類遂發吐胃虛而成慢驚者多矣小兒須有熱證方可踈轉仍慎用丸子藥利之當以大黃川芎等㕮咀作湯液以蕩滌藴熱蓋丸子巴豆乃攻食積耳問小兒傷寒瘟疫者為何答曰神氣雖完性情未定衣裳不擇厚薄或恣情脫而著嬌縱不常生冷任意或過餐寒食之物因此致患頭疼寒促發熱增寒或飲多尚渴或虛汗連連精神咨􅵤因綿綿用藥須精審其根源察病表裏仍看脈體未可便下切須要知虛實消停藥分切在意處方治之小兒傷寒形候亦分數類有兼驚夾實氣驚溫壯痰三證一兼驚者因患驚風三日治得驚退第四日至五日忽有嗽息粗大面色恍惚變動無時口渴不止急且治脾宜下麥湯散平胃丸附子散萬萬記之不用冷藥恐氷却脾氣伏熱不退二挾實者本因孩兒肥實喫食無度傷飽而閉塞其胃氣其候嘔逆一見唇紅面赤便問曾吐嘔逆無如已曾吐嘔逆必須頭痛或瀉不止乃用鮓湯丸通利後勻氣散夾麥湯散服之驚氣者本因氣膨脹咳嗽咽喉中涎響心間煩躁臟腑疼痛夢中虛驚烏犀膏滚涎次下麥湯散及大驚丸相夾服兩日後方下鮓湯丸通利一二日氣行後常服醒脾平胃湯藥如傷寒後或遍身生黑黯血所謂蘭斑形證不可用藥三溫壯者亦渾身微熱面紅常困睡微汗因客風吹著毛竅冷氣急鼻塞大體與變蒸相似只用麥湯散紅綿散治之亦安小方脈論傷寒皆因三陰三陽受病緣未辨東西不能言語雖即遍身壯熱四肢不任其狀多喘難為識候凡傷寒與諸熱疾皆同奈諸熱不生呻吟惟傷寒呻吟眉聚是也宜服煎散茅先生小兒初受傷寒候歌小兒傷寒身壯熱面赤唇紅眼黃赤身上寒毛初凛凛更兼冷汗潤汪汪鼻中清涕涓涓滴小便如粉又如漿上喘鼻塞將加嗽口乾嘔逆是尋常看有諸般難治療别為章句好推詳參茅先生小兒傷寒死候歌傷寒吐不止便溺更難通汗後發熱渴耳中瘡潰膿身生斑黑點鼻血出傾筒咳嗽四肢厥心狂下所攻體軟睡不窹腹脹喘聲雄手足心熱痛此候命須終又傷寒死候歌小兒傷寒面色黑耳內有膿聲噎塞氣逆吐瀉轉加增大腸乾泄浮眼極醫士精神還更昏千萬歸泉休廢力玉訣小兒傷寒歌候鼻多清涕肺傷風寒氣相傳鼻不通壯熱脈浮生內熱發驚涎盛轉加膿此患先與治風後與下涎次調胃氣也玉訣小兒傷風候歌鼻塞傷風肺受寒喘咳驚啼卧不安頰赤口乾頻發熱吐㵼邪攻臟腑傳此患先與解熱後下風涎次平胃氣故無誤也石壁經三十六種正傷寒候歌傷寒初得渾身熱惡哭多啼無喜悅眼紅臉赤類驚風鳳髓經一句云只看眼急似驚風却被醫人道驚熱但須涼膈莫令渴渴便飲水無休歇若將三黃散子服汗出身輕便無熱夫風邪寒入肌體汗閉熱氣內藴致使煩躁而多渴喘嗽汗不得泄發熱不止若服冷藥太甚則使汗不出而作别症也須先出汗次涼膈方愈若不然則慢脾慢驚緣此得之小兒目急壯熱上氣喘嗽面赤先與解表散喫後用南星丸退風熱如不退將三黃散與喫小兒傷寒惡風惡寒者必偎人藏身引衣密隱是為表證可為取其汗也惡熱內實者必出頭露面揚手擲足煩渴燥糞掀衣氣粗是為裏證可略與踈利也至若頭額冷手足涼口中氣冷面色黯淡大便瀉青此是陰病裏虛當以溫藥救其裏也舉是三者汗下溫之法可以類推矣發汗用桂枝麻黃各半湯加黃芩解肌用香蘇散加乾葛通利四順清涼飲微利人參敗毒散溫裏理中湯厥冷甘草乾薑湯尋常感冒惺惺散或參蘇飲傷風發熱人參羌活散或天麻防風丸壯熱者升麻葛根湯潮熱者生犀散小柴胡湯加大黃小便不通者導赤散五苓散甘露飲表裏俱熱加表裏俱見之證洗心散主之咳嗽則人參潤肺散加紫蘇夾食則異香散紫霜丸輩然亦視小便或赤或白可以知裏熱之有無或清或濁可以知裏熱之輕重幼而嬰孩則以虎口指紋之紅色驗之長而童孺則一指按其三關據左手人迎之緊盛者斷之所謂七十二證其證某方皆無越張朱格例將不過小小分劑而中病則止也夫小兒傷寒與大人不同何也小兒奇經未盛精神未全八脈皆虛七神尚弱語言不正喜怒不節性情未定非食穀味專於精神也真牙未生變蒸尚在豈不異於大人哉設令小兒十歲已上卒暴身壯熱惡寒四肢冷或耳􅍠冷鼻中熱氣或為㿀疹也與傷寒表證相似胎氣始發自內之外與傷寒表證同治者誤也當作小㿀瘡治之小兒傷寒身熱頭痛面赤者在表也粗氣腹滿小便赤澀者在裏也小兒形後雖有汗下之病未及五歲可以視聽未可脈别故不行於診五歲已上穀氣漸實可以脈别浮沉遲數表裏寒熱察色聽聲而得其全故云小異大同也辨小兒傷寒一口熱二口中醋氣三妳癖不消四腹中疼痛也十二件傷寒雜證頭疼體痛是傷寒鼻塞或流涕是傷寒喉內喘息是傷寒兩手脈洪數是傷寒頰赤眼澀是傷寒身上寒毛起是傷寒口鼻出水是傷寒眼赤黃是傷寒口乾澀者是傷寒咳嗽者是傷寒山根赤色是傷寒噴嚏是傷寒凡傷寒發熱之初不問大人小兒急須表汗次即當發散然調理須在一晝夜得熱退乃保無虞今之醫者多不用麻黃但初用惺惺散羌活散之屬此乃常法致有失三五日熱不除入於經絡摶於血氣傳變多證或作驚風漸至危篤傷生之命可不慎乎小兒傷寒當辨其證即投解肌湯三服汗透而熱漸輕次用人參羌活散或渴間以白虎湯次用參茋等藥夫斑毒有二證有溫毒發斑有熱毒發斑因冬月觸冒寒熱毒之氣至春始發熱毒發斑因夏觸冒暑毒發汗已經汗下熱即發大抵斑毒四時感於乖戾之氣或未發汗下熱毒不散表虛裏實血澀不行故遍身發出斑瘡及癮疹如錦紋巢氏云發斑不可用表藥夫陽毒傷寒者蓋言陽氣勝而為毒害其脈浮大而數身重頭疼面赤有斑斑如錦紋狂言見鬼咽喉腫痛下痢膿出血五日可治七日不可治也方加減惺惺散治小兒傷寒無汗頭疼發熱惡寒并天行熱氣致生豆瘡不快煩躁昏憒或出瘡豆身疼體熱者蒼术茅山者川芎細辛羌活防風白芷瓜􅌣根甘草赤芍藥桔梗麻黃去節荆芥當歸薄荷右等分為末沸湯調下半錢或作飲子水煎亦可羌活散治大人小兒四時傷寒熱病時行疫癘山嵐瘴瘧早晚中露霧及暴中風寒並宜服之不論陰陽證候老幼虛實服之使無變動汗出即安川羌活獨活柴胡去蘆水洗前胡去蘆川芎桔梗白茯苓削术防風各一兩細辛去苗葉好者官桂甘草炙各半兩枳殼湯浸去瓤細切焙乾麩炒一兩右為細末每服三錢水滿盞薑三片棗二枚同煎八分和滓熱服連三服汗出便安小兒看多少加減服并乳下一喫如路行不及煎白湯點熱酒亦可人參散治大人小兒傷寒候神聖方人參荆芥甘草防風乾葛肉桂五加皮桔梗川芎柴胡陳皮芍藥各半兩麻黃一兩去節依法製右為細末每用一錢水一盞入烏梅一枚煎六分服常服出汗熱進三二服大黃飲治小兒壯熱實滯不去寒熱往來微驚悸方見諸熱門壯熱類人參羌活散治傷寒發熱及煩渴痰實咳嗽小兒寒邪溫病時疫瘡疹頭疼體痛潮熱羌活白獨活柴胡去蘆川芎人參去蘆甘草炙白茯苓各一兩前胡桔梗地骨皮天麻酒浸焙各半兩枳殼一兩去穰炒右㕮咀每服一錢水半盞薑一片薄荷一葉棗子半枚煎至三分大小加減瘡疹未發之前亦可服一方作細末大效人參枳實湯治傷寒後氣不和順喘急咳嗽胸膈鬱塞日夜頻悶神困力乏不思飲食仍治虛痰煩滿頭目昏暈但是傷寒感冷咳嗽並宜服之枳實四箇米泔浸去穰麩炒桑白皮甘草炙半夏湯泡七次仍切以薑汁浸白茯苓欵冬花五味子阿膠麩炒細辛各半兩去葉人參一分麻黃去節