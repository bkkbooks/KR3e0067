壯熱心煩氣麄驚悸天麻白附子全蝎去足殭𧖟炒去絲嘴大黄炮麻黄去節甘草炙蘇木炒硃砂一方不用南星炮右各等分為末每服半錢綿少許水半盞煎三分麥湯散治夾驚夾實傷寒氣急嗽聲滑石石膏知母貝母麻黄杏仁炒製研甘草甜葶藶薄紙盛炒人參地骨皮去骨各等分右為末每服一錢小麥二十粒煎湯下涎盛氣促桑白皮湯下梨漿餅子治小兒傷寒驚搐治風下涎輕粉半兩鐵粉荆芥穗辰砂臘茶各一錢郁李仁七箇出油粉霜半錢牽牛二十七箇微炒腦麝少許右為末錬蜜為餅子加減用梨汁薄荷湯化下三十六種白附子散治夾驚傷寒白附硃砂各三分全蝎一分半黒附子炮去皮臍雄黄羗活各半兩石膏七錢半麻黄一兩去節腦麝隨意别入研右為末每服半錢一字薄荷臘茶湯下有熱再服麥湯散治小兒蒸伏熱傷寒欬嗽嚏噴體熱面赤麻黄去節滑石甘草杏仁去皮尖大黄蒸地骨皮芍藥北葶藶子右各等分為末每服半錢一錢或一字小麥薄荷湯下薄荷散治夾食傷寒熱極生風頭疼壯熱嗽涎鼻塞及時行瘡豆已發未發皆可服薄荷葉半兩羗活全蝎麻黄去節甘草各半錢殭𧖟天竺黄白附子炮各一分右為細末每服一錢水半小盞煎至三分加竹瀝少許妙一方為末薄荷茶清調下孩兒一字二三歳半錢白霜丸治小兒驚風傷寒四五日未得汗揺頭揚手上竄多啼呌不睡喫水不休鈆白霜硃砂馬牙硝人參天竺黄甘草炙各半兩山梔子一兩右為末鍊蜜為丸如桐子大每服一丸冷熱蜜湯化下没石子膏治驚胃氣虚弱吐後手足搐搦眼下及唇青者不進飲食是夾驚傷寒没石子三箇生用人參訶子炮白术各二錢丁香五七箇甘草炙半兩香附子三十七箇去皮右為末匀煑猪肚研丸如桐子大不進飲食白术湯下鐵刷散治夾驚傷寒麻黄去根節一兩甘草炙半分細辛半兩石膏葶藶青皮各一分杏仁十一箇右為末如小兒傷寒三二日壯熱不曾調理外風把定關竅傷寒面黄白色壯熱微渴此是傷寒候三五日内心臓熱面赤唇紅多燥壯熱熱極生涎即為驚也元初傷寒傷風為傷寒此候為夾驚傷寒也如此患先下異攻散二服紫蘇木𤓰湯煎服後以此藥半錢水一盞薑三片煎至四分温服頭面微有汗解傷寒不退如壯熱煎勝金散如壯熱後多睡更煩躁口乾手足冷此是外風把定關竅用綿煎散一服發汗汗出關竅通只用異攻二服和氣更服此藥解傷寒迴陽散治小兒夾驚傷寒蒼术一兩米泔汁浸一宿甘草炙半兩白术炮半兩陳橘皮去白半兩木香大附子炮了去皮科各一分右為末每服一大錢用塩湯空心㸃服看形候下之紅綿散治小兒夾驚傷寒吐逆躁悶熱渴夜啼不睡常服温平鎮心不凉過一日或六七日間進一服不妨全蝎人參白茯苓天麻各等分麻黄半兩去節大辰砂一錢右為細末將辰砂細研一同和匀每服一小錢少許薄荷葉同煎十沸温服天竺黄散治小兒傷寒退驚涎白殭蠶鬱金蟬退甘草炙天竺黄山梔子等分右為末每服半錢金銀薄荷煎湯下治小兒夾驚傷寒渾身壯熱涎盛發搐搦蝎七箇荆芥麻黄去節白礬白附子各一錢蘇木少許右為細末每服一錢水一盞煎至五分服之金蓮散治嬰孩小兒潮熱傷寒夾驚連翹山梔子去殻甘草炙防風蟬殻洗去土令淨各等分右為末每服嬰孩一字二三歳半錢四五歳一錢水一藥注或半銀盞煎十數沸温服千金丸治小兒夾食夾驚夾風傷寒微轉硃砂末一錢膩粉一分射香半錢全蝎白丁香各七箇末右為和匀白飯為丸如蘿蔔子大薄荷湯下一歳三丸綿煎散治傷寒退熱麻黄一兩去節天麻紫蘇天南星油煎赤色彊蚕各半兩右為末小兒傷寒驚風有些子壯熱面赤沉困頭疼不進飲食用水一盞藥半錢綿一片薄荷湯調下睡時更煎鐡刷散一服夾驚傷寒無驚只是傷寒二日進二服一方無麻黄紫散子治傷寒通利夾驚發汗用紫散子但是傷寒身熱急服如是積刼服經驗銀液丸天麻一兩生川芎半兩鐡粉三分上色者硇砂一錢右為末入腦麝各少許同研每服一字半錢金銀薄荷湯下併二服汗自出紅蓮散治小兒夾驚咳嗽氣急體熱驚悸和順瘡豆硃砂二錢麝香一字腦子少許南星一兩薑汁浸一夕煑乾皂角水一盞浸一夕煑乾荆芥水一盞浸一夕煑乾再焙右為末三歳兒抄一字薄荷湯調下一方用天麻一錢紅龍散治小兒夾驚傷寒額赤氣粗睡卧不安及治驚熱小便不通服之海金砂半兩生硃二錢腦麝各半字桂府滑石一兩半右為末燈心湯調下三歳兒一字紅桃散治小兒夾驚傷寒頭疼壯熱涎潮驚悸多哭氣麄心煩及治氣壅膈節不通石膏寒水石一兩腦麝各半字右為末燈心湯調下大小加減服之勝金散治小兒傷寒熱驚風麻豆疼疹潮熱天南星一兩白附子半兩雄黄二錢右為末每服一錢水一盞䓤白三寸同煎三分作三度與作三服無惜散治夾驚傷寒浮萍紫背者一錢犀角屑半錢鈎藤鈎三七箇右為末每服半錢蜜水調下連三服出汗為度後常服亦佳普濟方卷三百六十八
