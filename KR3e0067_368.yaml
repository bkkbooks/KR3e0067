每服三錢水一盞煎至八分去滓酌兒大小加減温服大青龍湯治太陽中風脉浮𦂳發熱惡寒身疼痛不汗出而煩躁者宜用若脉微弱汗出惡風不可服及治傷寒脉浮緩身不疼乍輕乍重少陰證者麻黄三兩去節桂枝一兩去皮甘草炙一兩杏仁二十箇去皮尖大棗五枚生薑一兩半石膏如半雞子大右㕮咀水一盞煎至七分去滓每服三錢汗出為度量大小加減五味子湯治傷寒喘促脉伏而厥人參一分杏仁一分去皮尖炒五味子半兩麥門冬一分去心橘皮一分生薑一分棗子五箇右為飲子水一盞煎至七分加減服小柴胡湯治太陽病十日以去脉浮細如嗜臥者外已解設胷滿腹痛宜服傷寒五六日中風徃來寒熱胷脇苦滿黙黙不欲食心煩喜嘔或胷膈燥而不嘔或渴或腹中痛或脇下痞硬或心下悸小便不利或不渴身微熱或咳者宜服血弱氣虚腠理開邪氣因入與正氣相摶結於脇下邪正分爭徃來寒熱休作有時臓腑相連其痛必下邪髙痛下故使嘔也宜服傷寒五六日身熱惡風項强脇下滿手足温而渴宜服傷寒五六日頭汗出微惡寒心下滿不欲食大便硬脉細者為陽發結必有表復有裏也脉沉亦在裏也汗出微陽微假令純陰結不得復有外證也悉在裏此為半在表半在裏也脉雖沉緊不得汗非少陰病所以然者陰不得有汗今頭汗出故知非少陰也宜服設不了了得糞而解陽明病發潮熱大便溏小便少胷脇滿宜服陽明病脇下硬滿不大便而嘔舌上白者冝服陽明中風脉弦浮大而短氣促腹滿脇下及心下痛久按之氣不通鼻乾不得汗嗜臥一身及目悉黄小便難有潮熱而嘔身前後腫過十日脉續浮宜服傷寒温疫身體壯熱頭痛項强腰脊四肢疼痛脇下牢滿乾嘔逆不能飡食及病瘥後徃來寒熱痰實嘔逆肌體羸瘦倦怠少力活人書云身熱不渴往來寒熱小柴胡加桂閻氏云小柴胡治瘡豆甚驗柴胡二兩黄芩人參甘草炙各三分半夏一兩半泡生薑三分大棗十枚右為飲子加減煎服孫兆改名黄龍湯近世此藥盛行患傷寒不問表裏陰陽皆令服之甚誤矣此藥傷寒論雖主數十證其間有二證不可服有五證最的當服之必愈不可服者有二證一者因渴飲而嘔二者身不温熱當識此二證明矣可服者五證一者身熱心中逆或嘔逆二者寒熱徃來三者潮熱四者心煩脇下滿或渴或不渴五者傷寒已瘥後更發熱此五證但有一證更勿疑便可服之必瘥餘證候仔細參詳合證及脉後相當方可用不可一槩用也世人但知小柴胡湯治傷寒不問何證便服之反有所害縁此藥稍寒也唯此五證按而行之庶無失也不可不察也本方更有加減法雖不在此五證内用之亦効今亦載於此若胷中煩而不嘔去半夏加人參括蔞根各一兩腹中痛去黄芩加芍藥三分極効常時腹痛亦療脇下痞硬去大棗加牡蠣一兩若心悸小便不利去黄芩加茯苓一兩若不渴外有微熱去人參加桂枝三分温覆微汗愈若咳𠻳去人參大棗加五味子半兩乾薑半兩元祐二年時行無大小皆咳𠻳服此皆愈常時上壅痰實只依本分臨臥食後服甚効赤白痢中藥無如此驗蓋痢多因伏暑此藥極解暑病凡傷寒之人審是暑不問是何候連進數服即解一方治傷寒發渴鼻衂加生地黄右㕮􅀈每服二錢水半盞生薑三片棗子二枚煎至二分去粗温服温病中暑熱甚宜服葛根橘皮湯治小兒冬寒未即病至春積寒所折不得發至夏得熱其寒解冬瘟始發肌中班爛癮疹如錦紋而咳心悶但嘔清汁者宜服葛根橘皮杏仁去皮尖炒知母黄芩麻黄甘草炙各半兩右㕮咀白水煎加減服大黄散治小兒陽毒傷寒未解熱結在内恍惚如狂大黄一兩桂心三分甘草木通大腹皮各一兩芒硝七兩桃仁二十一粒去皮尖麩炒右為末白水煎服通利為度清神散治小兒傷寒無汗咳𠻳身熱無時潮熱鼻中塞一名惺惺散方見本門傷風類和解湯治小兒四時感冐寒邪壯熱煩渴鼻塞多涕驚悸自汗肢節疼痛及膚瘡豆已發未發者皆可服羗活防風川芎人參各一兩乾葛川升麻輕者甘草微炒各半兩右為麄末每服三歳兒一錢水一小盞生薑半片棗子少許同煎五分去滓服不拘時量大小加減柴胡散治小兒傷寒壯熱頭疼體痛口乾煩渴石膏黄芩甘草赤芍藥葛根各一兩麻黄去根節柴胡去苗各半兩右為散三歳兒每服一錢水一小盞入生薑少許葱白三寸豉二十四粒同煎至五分去滓温服不拘時汗出為效量大小加減白术湯治小兒傷寒頭痛肌熱喘麄白术人參麻黄去根節甘草炙剉葛根剉藿香去根桔梗炒各半兩右麄擣篩每服一錢水半盞煎至三分去滓不計時候温服石膏湯治小兒傷寒頭痛肌熱喘麄石膏碎一錢白术半兩麻黄去根節桔梗炒甘草炙水萍暴乾杏仁湯浸去皮雙人各炒一分右為麄擣篩每服一錢水半盞葱白少許煎至三分去滓温服不拘時候黄芩湯治小兒傷寒體熱面赤口乾或咳𠻳黄芩二兩去黒心麻黄一兩去根節桂心去麄皮甘草炙石膏碎芍藥各半兩杏仁十枚湯浸去皮尖雙人炒右七味麄搗篩每服一錢水半盞生薑三片煎至二分去滓量兒大小加減七物黄連湯治夏月傷寒四肢煩疼發熱其人喜煩嘔逆滿劇如禍祟寒熱相摶故令喜煩黄連茯苓黄芩芍藥葛根各一兩甘草炙一兩六錢小麥三合右㕮咀以水七升煮取三升冷分三服不能一升煮可稍稍服之湯熱乃臥藥去毒氣服湯之後胷中熱及咽喉痛皆瘥其明日後煮一劑如法服之此湯無毒但除熱下氣安病人小兒服者取三分之一以水四升煮得二升稍稍服乳香丸治小兒百日内患傷寒壯熱速宜療之鏵鉄一斤燒令通赤以水二斗淬之如此三七遍煎取二停更入柳葉七片淬而又用胡油麻二十一粒松栢葉二七枝牙硝乳香各一分金箔白芥子二七粒右並搗為末蜜丸如彈子大以青物褁一丸如燒香法薫兒雙足微有汗出便瘥紅綿散治嬰孩小兒單傷寒及夾驚傷寒麻黄去節焙全蝎炒甘草炙蘇木炒大黄用濕紙褁炮令熟切焙天麻生白附子各一錢右為末每服嬰孩兒一字二三歳半錢四五歳一錢水一藥注或半錢銀盞綿臙脂些子同煎十數沸如無綿臙脂只此用綿少許褁藥在内如前法煎須候綿帶紅色去綿與服前胡散治小兒傷寒邪熱四五日不除者前胡一兩甘草炙半夏湯洗七遍桔梗黄芩柴胡去苖人參去蘆頭各半兩右為細末每服一錢水一盞入薑三片棗一枚同煎至五分去滓温服一方加地骨皮無黄芩雙丸治小兒身熱頭痛食飲不消腹脹滿或心腹疼痛大小便不利或下重數起未瘥可再服小兒蒸後哺食減少氣息不快夜啼不眠是腹内不調並宜用此丸下之巴豆六十枚去皮心膜研新布絞去油日中晒之白如霜甘遂半兩硃砂一錢研甘草一兩一分炙牡蠣煅赤取净二兩𬎼核取仁四兩半研麥門冬湯洗去心二兩半右麥門冬甘草甘遂牡蠣四味為細末入巴豆硃砂𬎼仁合和搗二千杵更入蜜少許搗和極熟旋丸半歳兒服如半麻子大一二歳者服如麻子大一枚分一雙三四歳者服如麻子大二丸五六歳者服如大麻子大二丸七八歳者如小豆大二丸十歳微大於小豆二丸常以雞鳴時服如至日出時不下者熱粥飲服數合投之即下藥丸皆雙出也下利甚者濃煎冷粥飲便止解肌散治小兒傷寒壯熱地骨皮㯽榔芍藥當歸各半兩甘草炙石膏各一分麻黄去節用湯浸洗一錢右為末每服半錢水一盞煎至六分温服細辛散治小兒大人頭疼及傷寒壯熱頭風明目細辛石膏何首烏各一分川烏頭川芎乾薄荷各半兩蝎十四箇右為末用薄荷茶調下一錢服之三黄散治小兒傷寒五六日壯熱心躁口乾煩渴大小便難川大黄半兩炒剉麥門冬半兩去心焙石膏一兩細研川芒硝黄芩甘草各一分炙微赤剉黄連一分去鬚右為散每服一錢以水一小盞煎至五分去滓量兒大小分减頓服以利為度丹參湯治小兒卒寒熱不休不能服藥苦參莽草丹參桂心各三兩菖蒲半斤雷丸一升蛇麻子右以水二斗煑三五沸適寒温以浴兒避眼及陰雷丸浴湯治小兒忽寒熱雷丸二十枚大黄四兩黄芩一兩苦參石膏各三兩丹參二兩右㕮咀以水二斗煮取一斗半浴兒避眼及陰浴訖以粉粉之勿厚停一宿復浴解肌湯治傷寒發熱心煩躁渴透肌散毒麻黄半兩去節各用三錢人參半兩川芎半两芍藥半兩前胡一分獨活半兩右㕮咀每服一錢水半盞生薑一片薄荷一葉煎至三分去滓三歳以下一歳以上一服作二服一名人參羗活散藿香正氣散治傷寒發嘔藿香葉厚朴製半夏製甘草炙蒼术米泔浸一宿炒陳皮各等分右㕮咀每服二錢水半盞薑三片棗半枚煎至二分去滓服大柴胡湯治陽明病外證身熱汗出而不惡寒但惡熱宜服陽明病脉遲頭眩𤼵熱小便難此欲發疽必小腹滿宜服陽明病脇下硬滿大便秘而嘔口燥宜服陽明病中風其脉浮大短氣心痛鼻乾嗜卧不得汗一身盡黄小便難有潮熱而噦宜服傷寒三日少陽受病口乾燥目眩宜服少陽病脇下堅滿熱乾嘔不食徃來寒熱若未吐下其脉沉緊宜服少陽病若已吐下發汗讝語者宜服少陽中風兩耳無所聞目赤胷中滿而煩不可吐下吐下則悸而驚宜服少陰病時時惡寒悶不欲厚衣者宜服少陰病利清水色青者心下必痛口乾燥宜服傷寒六日陽脉澁隂脉弦常腹中急痛宜服傷寒六日下之胷滿煩驚小便不利讝語一身不可轉側宜服傷寒發熱汗出不解心下痞硬嘔吐不利傷寒十餘日熱結在裏徃來寒熱及陽明病汗出讝語腹中滿痛并陽明少陰合病下利脉滑而數傷寒六七日目中不了了睛不和無表裏證大便難身微熱七八日脉浮數病人煩熱汗出觧後又如瘧狀日晡發潮熱脉滑者宜服之柴胡二兩枳殻半兩麩炒一作枳實黄芩大黄半夏炮赤芍藥各一兩右㕮咀生薑棗煎加減服之竹葉石膏湯治傷寒觧後虚羸少氣嘔逆欲吐及虚煩似傷寒身熱煩躁頭不疼脉不急數兼治中暑渴煩吐逆脉數者淡竹葉半錢甘草半兩炒石膏四兩半夏三兩麥門冬二兩人參半兩右㕮咀入粳米加減服嘔者加生薑兩半水煎服之知母麻黄湯治傷寒瘥後或十數日半月二十日終不惺惺昏沉似失精神言語錯繆又無寒熱醫者或作鬼祟或作風疾多治不瘥或朝夕潮熱額赤或有寒熱似瘧都是發汗不盡餘毒在心包絡間所致知母一兩半麻黄去節甘草赤芍藥黄芩各半兩桂枝半兩夏月減半右㕮咀泉煎加減服連進三服温覆令微汗若心煩不得眠欲飲水當少少與之令胃中和即瘥未汗再服一法小柴胡牛黄清心丸尤佳龍膚散治小兒傷寒瘟疫身熱昏睡氣粗風熱痰實壅𠻳驚風潮搐中暑冐悶天南星牛膽製者如無只依紅連散内製用八錢雄黄甘草各半錢天竺黄二錢硃砂麝香各一錢右為末三歳兒一字薄荷湯調下中暑煩悶雪水調下陽毒升麻湯治小兒一二日變成陽毒或已下之後變成陽毒腰背痛煩悶不安面赤狂言狂走或下痢或見鬼脉浮大數發斑如錦紋咽喉痛下膿血並宜服之升麻三分犀角屑射干黄芩甘草各等分人參右㕮咀水煎併進三服温覆手足汗出則解未效再服防風蒼术湯治小兒邪氣在表惡風惡寒有瘡疹未出可解表發斑疹宜服防風半兩蒼术石膏各一兩甘草炙半兩川芎黄芩各二錢半右為麄末每服二錢生薑三片薄荷七葉水煎日二人參湯治小兒傷寒外證身熱脉浮人參麻黄去根節赤茯苓去黒皮乾葛剉甘草炙各半兩右麄搗篩每二錢水一小盞入葱白少許同煎至六分去滓分温二服栝樓根散治小兒傷寒壯熱頭痛煩渴栝樓根半兩苦參一分剉人參去蘆頭一分寒水石半兩甘草一分炙微赤剉石膏半兩右為麄散每服一錢以水一小盞煎至五分去滓不