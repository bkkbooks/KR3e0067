通去皮節各一兩右銼散水一斗煮取五升時時服一升即利琥珀湯治脬轉小便不利煩悶琥珀大黃銼炒滑石碎一兩車前子車前葉各一兩右粗搗每服二錢匕水一盞蔥白半分拍碎煎至七分去滓溫服不拘時通草湯治脬轉不得小便雀糞半合車前子滑石各四兩通草一作木通芍藥各二兩右㕮咀以水七升煮取三升服五合日三先食前得立愈琥珀湯治脬轉臍下急滿或因霍亂而得琥珀研一兩阿膠炙燥半兩别搗蔥白切二七莖車前子三兩右先用水五盞煎蔥並車前子至三盞濾去滓次下膠末候消次又下琥珀末煎過分作三服不拘時候溫服治脬轉不得小便川大黃一兩銼炒琥珀一兩細研車前葉二兩右為散每服四錢水一中盞入蔥白三莖煎至六分去滓不拘時溫服又方亂髮燒灰三兩滑石二兩川芒硝右細研令勻用白皮桃一箇搗以水絞取汁二升不拘時以汁一小盞調下二錢芍藥湯治脬轉小便不利赤芍藥車前葉木通各一兩右細銼每服五錢匕水一盞半煎至一盞去滓溫服滑石湯治脬轉小便不通八九日丈夫婦人皆治滑石碎一兩寒水石碎一兩一方用石膏冬葵子半兩右粗篩搗每服五錢匕水一盞半煎八分去滓食前溫服蔥白湯治膀胱小便卒暴不通小腹脹急氣上衝心悶絶欲死此由暴氣乘膀胱或從驚憂氣無所伸鬱閉而不通流氣衝脬系不止陳皮三兩葵子一兩蔥白二莖右銼散水五升煮取二升分三服洗方治脬轉小便不通先用良薑蔥頭紫蘇葉各一握右煎湯密室內薰洗小腹外腎肛門留湯再添蘸綿洗以手撫於臍下拭乾綿被中仰坐腳自舒其氣次用蜀葵子二錢半赤茯苓赤芍藥白芍藥各半兩右銼散每服三錢煎取清汁再暖乘熱蘇合香三丸并青鹽一錢食前溫服蒲黃散治膀胱不得小便經三日困篤欲死蒲黃滑石各一兩右搗羅為散每服二錢匕雞子清調下一方用溫酒調服一方用水治脬轉欲死及失溺方吸芥真琥珀一兩蔥白十四莖右取豆醬清和竈突中黑如豆大內隂孔中立愈治脬轉不得小便方右以水四升煮取三升入蔥白琥珀末溫服一升日三服大利亂髮散治忍小便不時起便脬轉大小便不得四五日困篤欲死無脈服此瘥滑石二兩亂髮三兩燒灰右二味搗篩取生桃白皮一斤熟煮以水合絞得汁二升以汁服散方寸匕日三服即愈但淋者取亂髮三兩燒灰滑石五兩合搗為散服方寸匕一方有鯉魚齒一兩無桃白皮治脬轉不得小便雞子一枚去白取黃以溫水調服之不過三服秦芃湯治脬轉不得小便秦芃不拘多少去苖土右粗搗篩每服五錢水一盞半煎至一盞去滓溫服車前飲治脬轉不得小便急卒車前草一握去根洗銼右以水三盞煎至二盞去滓分三服連併服不拘時一方用子一升水一斗煮取四升分四服治飽食後或忍小便或走馬忍小便或大走及入房皆致轉脬臍下急滿不通治之用以亂頭髮急纒絞如拳火燒為末醋四合二方寸匕服之訖即炒黑豆葉蹲坐上治脬轉小便不得用阿膠三兩水二升煮七合頓服又方用䜴五合以水三升煮數沸頓服之又方用連枷關燒灰水服之又方用筆頭燒灰服之又方燒死蜣蜋二枚末水服之又方內白魚子莖孔中又方用酒和豬脂雞子大頓服之又方用麻子煮取汁頓服之治脬轉小便不能通用炒鹽半斤囊盛尉小腹治忍小便脬轉用爪甲燒灰水服之治小便久致脬轉取杻土塵三指撮以水服之治小便久致脬轉以蒲黃裹腰背令頭至地三度通一方取蒲黃服方寸匕日三服良治卒小便不通及脬轉方炙桑螵蛸搗為末米飲服之方寸匕日三服良治脬轉不得小便用蒲席捲人倒立令頭至地三反則通脬囊治法凡尿不在脬中為脬屈僻津液不通以蔥葉除尖頭內隂莖孔中深三寸微用口吹之脬順津液大通即愈普濟方卷四十二
