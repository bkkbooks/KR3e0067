body:
  text: 普濟方卷四十二明周王朱橚撰膀胱門總論夫膀胱者主腎也耳中是其候也腎合氣於膀胱者津液之府號水曹椽名玉海重九兩二銖左回疊積上下縱廣九寸受津液九升九合兩邊等應二十四氣鼻孔在外膀胱漏泄黃帝曰夫五腑各一名各一形腎乃獨兩何也岐伯曰膀胱為腑有三處腎形應腑有二處臟名一腑名二故五臟六腑也一説腎有左右而膀胱無二今用當以左腎合膀胱右腎合三焦左手關後尺中陽絶者無膀胱脈也病苦逆冷婦人月水不調至月即閉男子失精尿有餘瀝刺足少隂經治在足內踝下動脈是也右手關後尺中陽絶者無子户脈也病苦足逆寒絶産帶下無子隂中寒刺足少隂經治隂左手關後尺中陽實者膀胱實也病苦逆冷脅下邪氣相引痛刺足太陽經治陽在足小趾外側本節後陷中右手關後尺中陽實者膀胱實也病苦小腹滿引腰痛刺足太陽經治陽病先發於膀胱者背膂筋痛小便閉五日之腎小腹腰脊痛脛酸一日之小腸脹一日之閉塞不通身痛體重二日不已死冬雞鳴夏晡一云日西膀胱病者小腹偏重而痛以手按之則欲小便而不得肩上熱若脈陷及足小趾外側及脛踝後皆熱若脈陷取委中膀胱脹者小腹滿而氣癃若腎前受病傳於膀胱腎冷不則遺溺厥氣客於膀胱則夢遊行腎應骨密理厚皮者三焦膀胱厚粗理滿皮者三焦膀胱薄腠理踈者三焦膀胱緩急皮而無毫者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也扁鵲云六腑有病徹面形腎膀胱與足少隂太陽為表裏膀胱總通於五臟所以五腑有臟即應膀胱有疾即應囊傷熱則小便不通膀胱急尿苦黃赤傷寒則小便數淸白或潑石水根在膀胱四肢小其腸大也骨不絶治齒黃落十日死膀胱實熱夫左手尺中神門以後脈陽實者足太陽經也病苦逆痛腰中痛不可俯仰面腫目黃口舌燥咽腫痛體重四肢氣滿小腹偏痛胞轉不得小便頭眩痛煩滿脊背熱強體名曰膀胱實熱也內經曰膀胱不利為癃者以此方赤茯苓散出聖惠方治膀胱熱腹脹小便不通口舌乾燥咽腫不利赤茯苓瞿麥各一兩射干半兩子芩桑螵蛸微炒漢防己羚羊角屑川升麻川大黃銼微炒大青木通銼各三分右為散每服三錢水一盞煎六分去滓不拘時溫服葵子湯出永類鈐方治膀胱實熱腹脹小便不通口舌乾燥咽腫不利赤茯苓去皮豬苓去皮冬葵子枳實麩炒瞿麥木通去節黃芩車前子炒滑石甘草炙各等分右㕮咀每服四錢水一盞薑五片煎至八分不拘時去滓溫服榆皮散出聖惠方治膀胱實熱小便赤澀榆白皮銼車前子葵根木通瞿麥白茅根黃芩各三分桑螵蛸微炒赤茯苓各一兩右為散每服三錢水一盞生薑半分同煎至六分去滓食前溫服大黃散出聖惠方治膀胱實熱腹脹滿小便不利川大黃銼微炒冬葵子瞿麥各一兩黃芩赤茯苓去皮紫蘇莖葉檳榔木通白茅根銼各三分右為散每服三錢水一盞生薑半分煎六分去滓食前溫服梔子散出聖惠方治膀胱實熱小腹煩悶小便不利梔子仁石膏二兩白茅根一兩銼赤茯苓一兩犀角屑一兩木通一兩銼黃芩一兩甘草半兩銼右為散每服五錢水一盞淡竹葉二七片生薑黃半兩煎至七分去滓食前溫服忌炙煿熱麵豬苓散治膀胱實熱小便不通腰腹重痛煩躁豬苓防己梔子仁各一兩滑石車前子檳榔大黃生銼各二兩右為散每服二錢水調下或水一盞煎至七分溫服梔子仁湯一名㵼脬湯出千金方治膀胱實熱小便不通煩悶不解腰脊痛舌乾咽梔子仁二兩石膏四兩赤茯苓去黑皮知母炒各二兩生地黃淡竹葉各切半升芒硝一兩右㕮咀如麻豆大每服四錢匕水一盞煎至一盞去滓溫服一方入蜜煎服漢防己散出聖惠方治膀胱實熱小便不通漢防己一兩海蛤半兩滑石一兩葵子半兩豬苓半兩去黑皮瞿麥半兩右為散每服食前濃煎木通湯調下二錢瞿麥飲治膀胱實熱小便不通壅閉煩躁瞿麥黃芩甘草木通銼各一兩葵根洗銼車前子各半兩右為散每服四錢匕水一盞半煎至一盞去滓溫服檳榔飲治胞囊實熱溲便癃閉日夜不通檳榔羚羊角大黃銼各半兩甘草炙銼赤茯苓去黑皮防己各二兩右為散每服五錢匕水一盞半煎至一盞去滓溫服升麻散出千金方治膀胱熱小便不通舌咽腫升麻大青各三兩射干元參黃蘖去粗皮薔薇根白皮各四兩右㕮咀如麻豆大每服五錢匕水一盞半煎至一盞臨熟入蜜一匙打勻去滓服一方下蜜更煎兩沸細細令咽名升麻煎石膏湯治膀胱實熱小便癃閉舌燥飲引煩悶石膏生梔子去皮赤茯苓去黑皮甘草炙木通各一兩右為散每服三錢匕水一盞煎至七分去滓溫服車前子散治膀胱利小便解悶熱車前子海金沙井泉石滑石碎各一兩葶藶紙上炒一分右為散每服二錢匕蜜熱調下未利再服一方治小便不通用新汲水調下滑石湯出千金方治膀胱急熱小便黃赤滑石八兩子芩三兩車前子冬葵子一升榆白皮四兩右㕮咀以水煮取三升分三服抵聖丸治膀胱熱多因天氣發熱外腎腫脹赤痛大便澀而飲水按之臍腹痛者續隨子薏苡仁郁李仁茵芋白牽牛各等分右為末滴水丸如梧桐子大每服五丸以靈祕散下黃昏時服五更利下惡穢之物一方用香薑散咽靈祕散宣連二兩去鬚細銼小塊生薑四兩銼如菉豆大右拌勻密器收貯經宿於銀石器內慢火同炒至黃燋去黑薑不用㨂取黃連為末每服二錢空心淡茶清調吞下抵聖丸兼金丸出二大方治膀胱臍腹上下兼肋脅痛疼便燥欲飲水按之痛者大黃八錢濕紙褁煨硝石桂心甘草各四兩桃仁四十枚去皮尖細研右為末煉蜜丸如梧桐子大每服五七十丸空心米飲送下婦人血閉疼痛亦宜服之坎離丸滋腎水補下元不足去膀胱積熱知母一兩黃柏黃連各等分右為末水丸如梧桐子大食前溫水送下五十丸芒硝散治膀胱熱結不通芒硝另研半兩赤茯苓去黑皮末一兩右為末研和勻每服二錢匕水一盞調下心煩熱燥者冷蜜水下治膀胱實熱腹脹小便赤澀水氣流腫出聖惠方取浮萍草乾細羅為散每服食前蔥白湯調下一錢一方治胞轉不得小便冷水調下二錢治膀胱積熱小便赤澀不快麥門冬去心山梔子子芩茯苓升麻麻黃去根各一分通草四銖右細杵羅為末每服二錢水一盞煎八分食後徐徐熱服治膀胱虛熱下砂石澀利水道出本草以故甑蔽燒灰研食前溫酒調下一錢匕膀胱虛冷附論右手尺中神門以後脈陽虛者太陽經也病苦腳中筋急腹中痛引疼腰背不可屈伸轉筋惡偏枯腰痛外踝後痛肌肉振動耳聾忽不聞惡風颼颼作聲小便利多項背尻痛小便不禁尿多白色面黑脛酸兩脅脹滿名曰膀胱虛冷也內經曰膀胱不約為遺溺龍骨丸出千金方治膀胱腎冷坐起欲倒目眩中氣不足骨痿龍骨柏子仁乾地黃甘草防風各五分禹餘糧白石英桂心黃耆茯苓各七分五味子羌活人參附子各六兩山茱茰元參芎藭各四分磁石杜仲乾薑各八分右為末蜜丸如梧桐子大空心酒服三十丸日加至四十丸石斛散出聖惠方治膀胱虛冷兩脅脹滿腳脛多疼腰強痛小便滑數石斛一兩去根銼附子一兩炮去皮臍五味子三分澤㵼三分當歸三分微炒牛膝三分去苖白茯苓三分沉香三分人參去蘆三分桂心三兹分石石三兩搗碎水淘去赤汁黃耆半兩肉蓯蓉一兩酒浸去皺皮微炒蘹香子三分枳實三分麩炒微黃右為散每服三錢水一盞生薑半分煎至五分去滓食前溫服蓽澄茄丸出聖惠方治膀胱虛冷氣腹脅脹滿腰腳冷痛面色多黑體重無力蓽澄茄一兩安息香木香一兩肉桂一兩半去粗皮附子一兩炮製去皮臍當歸半兩銼微炒補骨脂蘹香子各一兩沉香檳榔肉豆蔲青皮浸去白皮微炒吳茱茰湯浸七遍焙乾微炒桃仁各半兩浸去皮尖雙仁麩炒右為末酒煮麵糊和搗三二百杵丸如梧桐子大每服食前以溫酒下二十丸腎瀝湯出聖惠方治膀胱及腎臟虛冷小便色白稠濁日夜無度恆腰脅疼痛肉蓯蓉一兩酒浸一宿刮去皺皮炙乾漢椒去目及閉口者微炒出汗五味子各半兩附子一兩炮乾薑半兩炮人參去蘆黃耆澤㵼芎藭牛膝去苗各三分當歸半兩石斛三分去根銼磁石二兩搗碎水淘去赤汁以帛包桂心半兩右為散每服五錢水一盞用羊腎一對切去脂膜每用磁石包子及入棗三枚煎至五分去滓食前溫服杜仲散出聖惠方治膀胱虛冷氣攻注腰胯疼痛杜仲一兩去粗炙微黃銼附子一兩炮製去皮臍石斛三分去根檳榔當歸銼微炒牛膝去苗桂心丹參去蘆木香白茯苓青橘皮浸去白皮焙蘹香子各三分右為散每服三錢水一盞生薑半分煎至六分去滓食前溫服鹿茸丸出聖惠方治膀胱虛冷面色萎黑小便不禁腰胯酸疼兩脅脹滿不能飲食肌膚消瘦鹿茸去毛塗酥炙微黃肉蓯蓉酒浸去皺皮微炙附子各一兩炮裂去皮臍桑螵蛸半兩微炙石斛一兩銼蘹香子鍾乳粉研入白龍骨沉香各一兩兔絲子一兩半磁石一兩半木香一兩右為末研藥合勻以酒炙麵糊丸如梧桐子大每服以溫水下二十丸漸加至四十丸空心及晚食前服黃耆丸出聖惠方治膀胱及腎臟久虛積冷上焦煩熱小便滑數如米泔黃耆乾地黃土瓜各一兩元參栝蔞根白龍骨菝􅌝銼牡蠣各一兩燒為粉人參二分去蘆桑螵蛸三分微炒五味子一兩沉香一兩右為細末煉蜜和搗三五百杵丸如梧桐子大每服食前以粥飲下三十丸韭子丸出醫方集成治膀胱腎冷小便白濁滑數日夜無度赤白脂煆韭子炒川牛膝酒浸去蘆土牡蠣煆覆盆子酒浸附子炮去皮臍桑螵蛸酒炒鹿茸酒蒸焙肉蓯蓉酒浸龍骨生各一兩雞肶胵燒灰沉香不見火半兩右為細末酒糊為丸如梧桐子大每服七十丸空心鹽湯溫酒任下一方無牡蠣治膀胱冷咳唾則有血喉喘息出千金方羊腎一具人參元參黃耆桂心芎藭甘草各三兩茯苓四兩地骨皮生薑各五兩白术六兩右㕮咀以水一斗二升先煮羊腎減三升去腎下藥煮取三升去滓分為三服韭子散出聖惠方治膀胱虛冷小便白濁滑數日夜無度韭子一兩微炒赤石脂一兩土瓜根一兩狗脊一兩牛膝一兩去苗牡蠣二兩燒為粉黃耆一兩銼附子一兩炮製去皮臍鹿茸一兩去毛塗酥炙肉蓯蓉一兩酒浸一宿刮去皺皮炙令乾右件藥搗細羅為散每服食前以溫酒調下二錢桑螵蛸散出聖惠方治膀胱虛冷小便滑數色如泔澱桑螵蛸一兩微炒赤石脂二兩補骨脂二兩微炒狗脊三分萆薢一兩白龍骨二兩韭子三分微炒鹿茸二兩去毛塗酥炙肉蓯蓉四兩酒浸一宿去皺皮炙兔絲子三兩酒浸三日曝乾别杵為末右件藥搗細羅為散每服食前以溫酒調下二錢乾地黃散出千金方治膀胱虛冷小便數漏精稠厚如米白泔乾地黃焙三分赤雄雞腸兩具雞肶胵兩具桑螵蛸炒牡蠣煅龍骨煅黃連去鬚各一兩白石脂肉蓯蓉酒浸焙赤石脂各五分右搗篩八味雞肶胵并雞腸中密縫於甑內蒸令熟銼碎焙乾搗羅為末每服二錢匕溫酒調下磁石散治膀胱虛冷飢不欲食面色痿黑腰脅疼痛磁石二兩搗碎水淘去赤汁黃耆一兩杜仲去粗皮炙微黃白石英二兩細研入白茯苓一兩白术一兩當歸銼微炒一兩沉香一兩右件藥搗篩為散每服五錢以水一大盞入生薑半分棗五枚煎至五分去滓食前溫服沉香散出聖惠方治膀胱虛冷氣攻腰間及腹脅疼痛沉香一兩木香三分桃仁三分湯浸去皮尖雙仁者麩炒微黃蓽澄茄三分桂心三分附子一兩炮裂去皮臍蘹香子三分白蒺藜三分微炒檳榔一兩右為散每服二錢食前生薑熱酒調下菝􅌝散治膀胱虛冷小便滑數其色白濁菝􅌝二兩土瓜根一兩黃耆一兩白龍骨一兩煅牡蠣