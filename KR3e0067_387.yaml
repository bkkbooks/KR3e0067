量兒大小加減四通湯治小兒痰壅結實桔梗炒半兩大黃炒半兩陳橘皮湯浸去白焙紫苑去苗土各一分右粗搗篩每服一錢水八分煎至四分去滓食後溫服日再服更量大小加減半夏丸治風痰壅盛咽膈不利半夏五兩白礬枯過一兩二錢半人參一兩右為末生薑自然汁糊為丸如粟米大每服二十丸食後臨睡薑湯下人參飲治小兒百日已來痰實人參半兩右粗搗篩每服一錢水半盞入生薑一片煎至三分去滓分溫三服量兒大小加減奪命散治控下風痰全活危急青礞石一兩搗碎𦦨硝一兩和入銅鍋內硬炭火煆紅硝盡為度候藥冷如金色取出研令細右為末每服一錢急風薄荷汁入蜜調下涎痰自大便出狀如稠沸次服退熱截驚等劑慢風木香入少蜜煎湯調下涎即墜入腹中次服花蛇川烏等劑滚金丸治一切痰飲涎唾胸滿嘔逆南星四兩生枳殼一兩麩炒右為末棗汁糊為丸如菉豆大每服二十丸金銀箔為衣薄荷湯下靈白丸治風痰上壅以靈砂青州白丸子各一十粒薑蘇湯化開服效蕩皮丸治痰壅咳嗽久嗽不宜卒止先須調氣用參蘇飲祕傳降氣湯並加人參五味子烏梅桑白皮紅棗斟酌用一方蘇子降氣湯加上藥煎服辰砂半夏丸治小兒肺壅痰實咳嗽喘急胸膈痞滿心神煩悶痰涎不利呀呷有聲方見本門咳嗽類治小兒上氣昏壅口內多涎喉中痰實脣口生瘡咽喉腫痛頭面赤色脣皮焦裂大腑祕小便赤宜服此方甘草麥門冬去心升麻羌活石膏柴胡去苗旋覆花各半兩山梔一兩大黃炮熟麻黃去根各一錢右為細末每服一錢半水一盞薄荷二莖生薑一片同煎取八分食後去滓熱服兒小者服一錢長生圎治小兒痰實氣壅寬胸下氣補脾胃木香半兩檳榔枳實各一兩丁香半夏各三錢全蠍二十箇肉豆䓻縮砂仁各三錢右為末糊丸如黍米大一歲五十丸米飲下空心服利膈丸治風盛痰實喘急咳嗽風氣上攻皂角不蛀肥者去皮子塗酥炙黃二兩黑牽牛四兩半生半炒槐角子半兩青皮去白半兩半夏湯洗七次焙乾一兩右為細末薑汁麵糊和丸如黍米大每服十五丸至二十丸生薑湯送下治小兒痰痞以慈母枝葉炙黃香作飲服之治大人小兒不進乳食和氣去痰用人參四兩半夏一兩生薑汁浸一宿曝乾為末麵糊丸如菉豆大每服十丸食後生薑湯送下喘附論夫喘急者心肺之不安也巢氏云肺氣有餘即喘咳上氣若為風冷所加即氣聚於肺肺脹胸滿氣虛也肺主氣氣為陽為衛心主血血為隂為榮皆由榮衛運行失度隂陽虛實不調形寒飲冷不避乳食飢飽不停內則傷於肺外則傷於皮毛上不得下降下不得上升中不得中消則令關膈不通氣道不利邪客肺經痰停胃脘與氣相逆肺脘壅隘故喘急鳴息又有傷寒身熱喘急肺脹胸滿者是表不解小青龍湯麻黃杏子湯又嗽喘者時多涎唾久則面目腫也郁受鹽稅孫男三歲病涎極盛喉中牽涎之聲喘急有一醫治之兒涎壅如大人中風之狀喘急目直自汗身冷傷寒論云喘急直視譫言者死死生在頃刻之間可喜者能食而脈數其口中氣溫遂對主人曰非大吐利不能取效主人曰用何藥對曰冝用輕粉十錢雞子清為膏盡灌之主人畏而不用愚曰惜不吐利稍遲即死譬之韓信用兵先臨死地不戰則死若戰則勝可不戰而守死乎又况投機之會間不容髮當是之時不忍袖手待也主人聽服少時即吐良久即瀉皆頑涎稠粘而出喘定神清以參术散琥珀散即安梅氏子三歲目直青鮮痰盛喘急驚恐不常召愚視曰心虛則多驚膽虛則多恐蓋心氣虛則生寒寒則隂氣盛隂氣盛則血脈虛少精神散失加之喘急目青汗出身冷噎氣不回金木相刑心氣不守當發驚癎不可治也主人曰諸書皆不言死病何遽云不治也答曰盧氏云喘急目青者七傳之病經云七傳者死通真子云喘急不回肺絶也汗出身冷心絶也此二臟相尅故知生不久也主人怒别後易數醫果驚癎而卒喘急證候小兒有因驚暴觸心肺氣虛發喘有寒傷肺氣壅盛發喘有感風咳嗽肺虛發喘有因食醎醝傷肺氣發虛痰作喘有食毒熱物冒觸三焦肝肺氣逆作喘喘與氣急同出異名别之輕重疾究兩端喘即口開隘於胸臆氣急即取息短滿心神迷悶甚即加之喘促不得傳變宜速降下寬中補肺利膈化痰調氣即愈惟有驚喘暴急肺肝熱亂停積不散金火相剋逆而不順錯亂血脈擊觸臟腑速治乃瘳緩即加重重即傳變方犀角地黃膏天門冬麥門冬各去心白茯苓茯神生地黃洗前胡柴胡人參元參甘草炙川芎天麻防風羌活右等分為末煅金墨一梃留性煉蜜丸如芡實大金箔為衣每服一粒薄荷湯化下大效雄硃化痰定喘丸治小兒因驚發喘逆觸心肺暴急張口虛煩神困雄黃硃砂各一錢研蟬蛻全蠍炒地龍白殭蠶天南星白附子輕粉半錢右為末麵糊為丸如麻子大每服三十丸薄荷茶清送下食後服定喘飲子天麻防風羌活甘草炙人參苦梗白术川芎半夏麴右等分㕮咀每服二錢水一小盞入麥門冬十四粒同煎去滓食後溫服八味理中丸治小兒心脾肺不和息數脈急上下不順中膈痞滿胸臆鬱隘坐卧煩悶神情不樂飲食不下人參甘草炙白术乾薑枳實麩炒白茯苓五味子去梗桑白皮去赤皮右等分為細末煉蜜為丸如小指大每一丸淡豆䜴五粒水一小盞煎至半去豉通口服無時麻黃湯治少小卒肩息上氣不得安此惡風入肺亦治咳逆上氣喘促不得安卧麻黃四兩甘草一兩桂心五寸五味子半升半夏生薑各二兩右㕮咀以水五升煮取二升百日兒服一合小大節度服之便愈一方用蜜煎服無價散治風熱喘促悶亂不安俗謂之馬脾風者辰砂二錢半輕粉半錢甘遂一錢半麩裏煮焙乾右為細末每服一字用溫漿水少許上滴小油一點抄藥在上沉下去腳以灌之立效治小兒哮喘黃丹砒霜右各生用為末用棗肉為丸如麻子大每服三丸臨卧冷茶清下治暴喘俗傳為馬脾風大小便硬宜急下用牛黃散奪命散後用白虎湯下之麻黃升麻湯治小兒寒鬱而喘喉鳴腹中鳴腹滿鼻流清涕脈沉急而散數麻黃草豆蔲仁各一錢半益智仁一分半厚朴二分甘草一分當歸尾升麻麴末各半分吳茱萸二分柴胡一分蘇木半分紅花少許黃芩生一分全蠍二箇右㕮咀如麻豆大分作二服每服水一大盞煎至七分去滓稍熱服食逺忌風寒微有汗乃效定喘丸治痰喘麻黃去節三錢杏仁去皮尖炒半錢甘草豬膽汁炙三錢梔子三錢右為末煉蜜為丸如菉豆大桑白皮湯送下雞清膏治小兒涎鳴喘急服藥不退者氣實可用用無雄雞子一箇取清入輕粉抄十錢拌和銀器盛湯瓶上頓熱下之次用珍珠丸等普濟方卷三百八十七
