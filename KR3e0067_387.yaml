body:
  text: 普濟方卷三百八十七明周王朱橚撰嬰孩咳嗽喘門總論夫咳者謦咳之咳俗謂之嗽肺主氣形寒飲冷傷之使氣上而不下發而不收衝擊咽膈令喉中淫淫如癢習習如梗而咳也甚者連連續續不止坐卧不安引動百骸聲聞內外矣皮毛者肺之候也皮毛受之寒氣從入合內外邪客之為嗽也楊氏曰肺為嬌臟外主一身之皮毛內為五臟之華蓋形寒飲冷最易得寒燥氣鬱蒸最易生熱為其易為冷熱而成咳嗽痰塞胃脘氣逆不下衝擊動肺與夫肺實肺虛皆能壅痰而發嗽也其證感風者鼻塞聲重停寒者涕清怯寒挾熱則焦煩受濕為壅滯瘀血則肺間腥悶停水則心下怔忡或實或虛痰之黃白唾之稀稠可知也治嗽之法肺脈實為氣壅內熱宜清利行之肺脈濡散為肺虛宜補肺以安之其間久嗽曽經解利以致脾胃虛寒飲食不進則用溫中助胃加以和平治嗽之劑調理然諸氣諸痰嗽喘之類惟用枳殼為佳此藥不獨寬中且最能行氣氣下則痰下他證自平矣嗽者肺感寒八九月間肺氣大旺病嗽者其病必寒實非久病也其證面赤痰盛法當以葶藶丸下之若久者不可下也十一月十二月嗽者乃傷風咳也風從背脊第三椎肺愈穴入也當以麻黃湯汗之有熱證面赤飲水涎熱咽喉不利者宜兼甘桔湯治之若五七月間其證身熱痰盛唾粘者以𥚹銀丸下之有肺盛者咳而後喘面腫欲飲水有不飲水者其身即熱以瀉白散瀉之若傷風咳嗽五七日無熱證而作嗽者亦葶藶丸主之後用化痰藥有肺虛者咳而哽氣時時長出氣喉中有聲此久病也以阿膠散補之痰盛者先實肺後以𥚹銀丸微下之涎退即補肺如上法有嗽而吐水或青緑水者以白祥丸下之有嗽而吐痰涎乳食以白餅子下之有嗽而咯膿血者乃肺熱食後服甘桔湯久嗽者肺亡津液阿膠散補之若痰實不甚喘而面赤時飲水者可𥚹銀丸下之治嗽法盛即下之久即補之更量虛實以意增損東都藥鋪杜氏七歲自十月病嗽三月未止始得嗽而吐痰內外風寒肺病嗽而吐痰風在中故也宜以麻黃輩發散後用涼藥壓之即愈時醫與鐵粉丸半夏𥚹銀丸諸法下之其肺即虛而嗽甚至春三月間尚未愈召錢氏診候面青而光嗽而喘促哽氣時長出氣錢氏謂病困十有八九所以然者面青而光肝氣旺也春三月者肝位也肺衰之時也嗽者肺之病自十一月至三月久即為虛痿又脾土肺之母也復為肝勝此為逆也故嗽而喘促哽氣長出氣也錢急與瀉青丸瀉之後與阿膠散實肺次日面青而不光錢又補肺而嗽如前錢又瀉肝瀉肝未已又加肺虛脣白如練錢曰此病必死不可治也何者肝大旺而肺虛肺病不得其時而肝勝而今三瀉肝而肝病不退三補肺而肺證猶虛此不久生故言死也此證病於秋者十救三四春夏者十難救一果大喘而死京東轉運使李公孫八歲病嗽而胸滿短氣醫者言肺經有熱用竹葉湯牛黃膏各二服治之三日加喘錢氏曰此肺病不足有寒邪即使喘滿當補肺脾勿服涼藥李曰醫已用竹葉湯牛黃膏錢曰何治也醫曰退熱退涎錢曰何熱所作曰肺經熱而生嗽嗽久不除錢曰本虛而風寒所作何熱也若作肺熱何不治其肺而反調心蓋竹葉湯牛黃膏治心藥也醫有慙色錢治愈咳嗽者肺之病也肺主氣應於皮毛肺名五臟華蓋小兒感於風寒客於皮膚入傷肺經微者咳嗽重者喘急肺傷於寒則嗽多痰涎喉中鳴急肺傷於暖則嗽聲不通壅滯動息上氣喘者隂氣在下陽氣在上諸陽氣浮無所依從故咳嗽上氣喘也久必發驚癎百日內見十難一生凡傷寒傷暖二者久則咳嗽上壅咯唾紅痰或黃痰皆肺有熱亦吐臭痰稠涎及血皆肺熱久則虛而痰更盛若咳嗽不已傷於陽脈則有血血與風相隨而行痰嗽極甚傷血肺氣與津液相摶藴成膿血皆肺虛損有一等十歲上下久嗽痰如瘡泡中黃膿之狀者必死不治又有傷風得嗽名胃嗽因兒啼哭乳壅結不散衝於心肺結積於胃脘即嗽是名胃嗽以珍珠丸下之後服治嗽藥王芮知縣紹興庚戌九月孫男新生五十餘日病嗽召醫皆言醫書稱百日內而嗽者不治勉強用藥一醫作傷冷嗽用惺惺散并麻黃等藥發散一醫用化痰丸潤肺散欵冬花散一醫用比金丸逐痰共治半月無效其證氣粗涎盛時嘔吐來時百十聲方退退後驚悸多團自汗招愚視曰未百日喘久肝肺皆虛况顛腫驚哭皆惡候也愚用補肺散益黃散天麻散日各二服三日吐汗皆除亦不甚困但嗽而涎盛愚曰今脾肺已實當去痰即可主人曰前醫已用比金丸逐涎愚曰前醫用比金丸無效者蓋脾胃虛弱用之無效今脾胃已實主人曰豈可動利也愚曰伏虎當道不以攻擊則致傷人痰塞咽喉不以吐下則能害命主人從此以比金丸一服少時即吐痰嗽喘減半再以益黃散補肺散天麻散日各二服來日與虎珀散痰散漸退更以一字金杏仁膏人參丸共治半月平愈後十二月內又一男生五十餘日時吐乳作口瘡腹熱氣粗召醫視之不識謾以洗心散瀉青丸并南星諸化痰等藥不效其證嗽聲不絶氣粗涎盛乳涎從口鼻中壅出潮作神昏愚曰兒百日內嗽古書不治况痰實甚此證危急主人曰惟先生治之愚曰就此時急止風痰主人曰初生嬌嫩難以治愚曰臨淵不可以得魚終日待兔過而發矢不可以得獸若坐失其機會有害也主人聽以小青丸一服琥珀散三服當夜至三更涎下睡來日與欵冬散琥珀散人參丸參杏膏治之至五日安愈瘡不復治是胎熱發過無恙顧元秀女才三歲嗽久不退因吐驚潮歇不能食脣齒焦燥大便堅實身熱進退時復昏憒因召愚曰此證不治蓋見兒面色異常面失色五臟敗矣色者神之所榮臟者神之所倚故神去而臟敗臟敗則色異常知不久生也素問云五臟已敗其色夭必死矣又加之脈微而身熱是脈不應病難經曰脈不應病病不應脈是為死病主人怒而不信易醫以定人生丸止吐蛇頭丸治驚四通飲利大便病退而不昏主問曰他醫用藥何有效答曰夫膏火之將竭必光暗而後明明止則滅果復作而卒元氏子五歲咳癔一醫治之五日不退其妻曰前子五歲病咳癔服藥著灸無效五日心疼氣絶而卒今子與前病同如之何召愚視之素問云癔為寒所生萬全方云咳癔者氣逆上也肺主氣氣為寒邪所折即氣不能宣通於脾脾胃復為邪冷所衝使隂陽二氣相擊所以咳癔也但無慮即時便安元愕然愚用木香肉豆蔲濃煎熱服半盞於是即定主人曰何效之速也愚曰木香順氣肉豆蔲所以治癔又加之以熱服去寒所以立效咳嗽屬肺肺所主氣外屬皮毛腠理凡諸牙兒嬰兒日夜切與保持毋令風吹腦𩕄背腠致使肺受寒邪咳嗽不已作熱多痰若被風吹即日感受次第傳之五臟虛處即所任入蓋初生兒氣微易得傳變良由頓動五臟有傷和氣五臟不和三焦不順故有傳變是以我生於一腎水也腎主虛邪生我在五脾土也脾主食吐逆虛痰四肢唇口我剋於三肝木也肝主風癲癎眼目尅我則二心火也心主驚恐悸頑涎血脈䑏臉其嗽傳受或吐或嗽痰涎或厥冷或恐悸至眼目兩眶黑紫如被物傷成腫發癎古人云久嗽成癎謂藥力不及候已傳過難以療理預當告之儒門事親書誤中涌法張板村鹿子春一小兒八歲夏月病嗽羸甚戴人欲涌之小春以為兒幼弱懼其不勝少難之一日因飲酒家人與之酒傷多乃大吐吐定而嗽止蓋酒味苦屬涌劑子春乃大悟戴人之言也咳嗽附論夫小兒咳嗽者由風寒傷於肺也肺主風候之皮毛而俞在於背小兒解脫風寒傷於皮毛隨氣入於肺肺感微寒則咳嗽也故小兒恆須令背暖夏月亦須用單背襠背冷得嗽月內可治百日外嗽者十中一兩人瘥矣方疹後咳嗽最未易治加減方出永類鈐方人參白术炒白茯苓桔梗防風淨細辛枳實炒欵冬蘂杏仁炒五味子粉草炙製半夏升麻右各等分生薑桑白皮煎服治百日內咳嗽出如宜方宜天南星末薑汁調傅𩕄門又宜人參消風散薑汁調傅𩕄門此病蓋因乳母鼻氣吹成竹瀝湯出千金方治小兒出胎二百日許頭身患小瘡治護小瘥復發五月中忽小小咳嗽微溫和治之因變癎一日二十遍發四肢縮動背脊􅀈䠷眼閉須臾氣絶良久復蘇已與常治癎湯得快吐下經日不發爾後單與竹瀝汁稍進一日一夕合進一升許發時小疏明日與此竹瀝湯得吐下發便大折其半猶稍稍與竹瀝汁竹瀝五合黃芩三十銖木防己羚羊角各六銖大黃二兩白术六銖一作白蘚茵芋三銖麻黃白薇萆薢甘草各半兩右㕮咀以水二升半煮取藥減半納竹瀝煎取一升分服二合相去五里久進一服一方無萆􅐺五味子湯出千金方治小兒風冷入肺上氣逆面青喘迫咳嗽晝夜不息食則吐不下五味子當歸各半兩麻黃乾薑桂心人參紫苑甘草各六兩細辛欵冬花各二銖大黃一兩半白术六兩右㕮咀以水二升半煮取九合去滓兒六十日至百日一服二合半一百日至二百一服三合其大黃别浸一宿下一方無欵冬花大黃有棗三枚菖蒲丸出千金方治小兒暴嗽及積風寒冷嗽兼氣逆喘菖蒲烏頭杏仁礬石細辛皂莢各六銖欵冬花乾薑桂心紫苑各十八銖蜀椒五銖吳茱萸六合右為末蜜丸如梧子大三歲兒米飲服五丸量兒大小以意加減暴嗽數服便瘥貝母散出聖惠方治小兒咳嗽心胸痰壅咽喉不利少進乳食貝母炒微黃桔梗去蘆馬兜鈴百合欵冬花半夏湯泡七次乾薑漢防己麻黃去根節已上各一分甘草半兩炙杏仁半兩湯浸去皮尖雙仁麩炒黃色用右為散每服一錢以水一小盞入生薑少許煎至五分去滓溫服日三五服量兒大小以意加減盆硝丸出聖濟總録治小兒哽氣咳嗽痰熱盆硝馬牙硝甜硝鉛白霜丹砂續隨子青黛白礬燒汁盡膩粉各一錢龍腦麝香各一字右並細研為末粳米飯為丸三歲已上如雞頭實大三歲已下如梧桐子大兩三箇月兒如小豆大一丸並用茶湯送下紫苑湯出直指方治小兒喘嗽紫苑茸貝母真蘇子微炒北桔梗陳皮杏仁水浸去皮尖焙黃麻黃去根莭半夏麴赤茯苓桑白皮炒甘草微炙等分右銼細每服一錢薑三片紫蘇三葉并嫩梗水煎服紫苑湯出千金方治小兒中冷及傷寒暴嗽或上氣咽喉喘逆或鼻塞清水出紫苑杏仁黃芩當歸甘草橘皮青木香麻黃桂心各六銖大黃一兩右㕮咀以水三升煮取九合去滓六十日至百日兒一服二合半一百日至二百日兒一服三合杏仁湯出聖濟總録治小兒一切咳嗽解寒壅杏仁生去皮尖雙仁知母焙貝母去心欵冬花仙靈脾麻黃去根節人參甘草炙赤茯苓去黑皮元參右粗搗每服一錢水七分煎至四分去滓溫服如傷寒嗽入蔥白鹽豉煎更量大小加減百部飲出全嬰方治小兒咳嗽喘急日夜不得睡目鮮如突出之狀百部生薑各八錢細辛三錢甘草炙二錢貝母白术五味子各二錢桂心四錢麻黃二錢右為末每服三錢水半碗煎至三分去滓無時服阿膠丸出全嬰方治小兒久嗽肺虛氣粗有痰惡心不食阿膠一兩糯米一合拌炒不用米甘草炙蛤粉炒漢防己杏仁去皮麩炒欵冬花香白芷馬兜鈴各半兩乾薑一兩右為末煉蜜丸如雞頭大每服一丸水煎服一方有乾葛無乾薑加味半夏茯苓湯治痰嗽半夏麴二兩茯苓一兩半陳皮五味子各一兩人參北細辛羌活桔梗去蘆葶藶炒各一兩右銼生薑桑白皮煎服九寶湯治一切嗽北薄荷葉紫蘇大腹皮麻黃去根節肉桂去皮桑白皮炙杏仁去皮尖甘草炙右㕮咀薑棗煎服有痰加半夏人參枳實湯出直指方治感冒嗽喘胸滿痰滯人參一分枳實製桑白皮炒半夏製赤茯苓五味子細辛淨桔梗麻黃去根節阿膠炒甘草炙各半兩右銼散每服一錢薑三片紫蘇三葉水煎服丸治喘嗽不論肺實肺虛可汗可溫可下藥中須