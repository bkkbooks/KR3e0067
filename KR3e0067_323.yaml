炒前胡去蘆甘草炙人參各一兩木香半香右銼如麻豆大每服三錢水一盞煎至七分去滓日午臨卧溫服羌活湯出聖惠方治婦人風虛勞冷身體瘦瘁頭目昏眩氣滯血澀臍腹疼痛羌活去蘆獨活去蘆芎藭當歸細辛去蘆枳殼去穰麩炒柴胡去苖附子炮製去皮臍木香赤茯苓各一兩去皮右銼如麻豆大每服三錢水一盞生薑一片棗一枚擘破煎至七分去滓空心日午臨卧溫服延胡索散出聖惠方治婦人血虛氣弱風冷搏於臟腑致成勞損體瘦無力飲食減少臍腹多痛肢節拘急延胡索白术當歸銼碎微炒桂心赤芍藥芎藭各一兩附子二兩炮製去皮臍木香琥珀各二兩桃仁一兩湯浸去皮尖雙仁麩炒微黃右為末每服三錢水一中盞入生薑半分煎至六分去滓食前溫服人參湯出聖濟總録治婦人風虛勞冷筋脈拘急肢體煩疼氣滯血澀腸胃不和人參牛膝酒浸切焙羌活去蘆頭獨活去蘆白芷黃蓍銼芍藥當歸酒浸切焙天雄炮裂去皮臍各一兩右銼如麻豆每服三錢水一盞生薑三片棗一枚擘破剪至七分去滓空心日午臨卧溫服川烏頭丸出本草治婦人血風虛冷月候不調或即腳手心煩熱或頭面浮腫頑麻川烏頭一斤油鹽各四兩銅銚內炭火炒不住擾候如桑根色遂施出於新瓦上去不裂者去皮臍尖五靈脂去土石揀淨四兩生右為細末更入臼中或乳鉢內令勻後將蒸餅水浸開却將水漸漸臼中和杵直待丸得即丸如梧桐子大空心溫酒或鹽湯下二十丸忌動風物治風血冷氣出本草用煮雞蘇汁服之大五石澤蘭丸出千金方治婦人風虛寒中腹內雷鳴緩急風頭痛寒熱月經不調繞臍惻惻痛或心腹痞堅逆害飲食手足常冷多夢紛紛身體痺痛榮衛不和虛弱不能動搖及産後虛損並宜服此鍾乳禹餘糧紫石英甘草黃蓍各一兩半石膏白石英蜀椒乾薑各一兩澤蘭二兩二銖當歸桂心芎藭厚朴柏子仁乾地黃細辛茯苓五味子龍骨二兩半石斛逺志人參續斷白术防風烏頭各十三銖山茱茰紫苑各一兩白芷藁本蕪荑各十八銖右為末蜜和丸如梧桐子大酒服二十丸加至三十丸一方有陽起石二兩吳茱萸湯出醫方集成治婦人臟氣本虛宿挾風冷胸膈滿痛腹脅㽱刺嘔吐惡心飲食減少身面虛弱惡寒戰栗或泄痢不止少氣羸困及因而生産臟氣暴虛邪冷內勝宿疾轉甚並皆治之桔梗去蘆防風去苖乾薑炮細辛去蘆半兩熟乾地黃三分吳茱萸湯洗七遍微炒二兩右為粗末每服三錢水一盞煎至八分細濾去滓熱服空心食前加減吳茱茰湯出醫方大成治證與吳茱萸湯同此方極妙防風乾薑當歸丹皮桂心茯苓甘草麥門冬半夏桔梗細辛茱萸各等分右為粗末每服四錢水一盞半煎七分去滓食前熱服治風血積冷以忍冬藤浸酒服之與鬼交通夫人稟五行精攝秀氣而生臟腑神氣交養若陰陽調和則臟腑強盛風邪鬼魅不能傷之若攝理失莭而血氣虛衰則風邪乘其虛鬼邪干正凡婦人與鬼交通者由臟腑虛神不守故鬼氣得為病也其狀不欲人見如有對峙時獨言笑或時悲泣是候也脈息遲伏或如雀啄皆為遇鬼邪也又脈來綿綿不知度數而顔色不變亦是此候也方殺鬼雄黃丸治婦人與鬼交通雄黃一兩細研丹砂一兩細研雌黃一兩細研羚羊角屑蕪荑虎頭骨菖蒲鬼臼鬼箭白頭翁石長生蒼术馬懸蹄豬糞各半兩右為細末以羊脂蜜臘和搗為丸如彈子大每服一丸當患人户前燒之别離散治婦人風虛與鬼交通悲思喜怒心神不定楊柳樹上寄生一兩白术一兩桂心半兩茵芋半兩天雄半兩炮裂去皮臍薊根半兩菖蒲半兩九節者細辛半兩附子半兩炮裂去皮乾薑各半兩醋煮炒右為細末散每服一錢食前溫酒調下硃砂散治婦人風虛與鬼交通悲笑無恆言語錯亂心神恍惚睡卧不安硃砂一兩細研水飛過鐵粉一兩牛黃一分虎睛一對炙微黃雄黃半兩龍骨半兩為末蛇蛻一尺燒炙麝香一分右同研極細每服一錢以桃符煎湯調下不計時候茯神散治婦人風虛與鬼交通妄有所見聞言語亂雜茯神一兩半亦作茯苓人參石菖蒲赤小豆半兩右㕮咀每服三大錢水一盞煎六分去滓食前溫服一方加茯苓桃仁丸治婦人與鬼魅交通辰砂檳榔當歸桃仁各三分麝香水銀一分棗肉研令星盡阿魏麵裹煨沉香各五分右為細末煉蜜為丸如梧桐子大空心桃仁湯吞下十丸辟瘟丹治證同前虎頭骨二分硃砂雄黃雌黃鬼臼各一分皂莢蕪荑仁鬼箭藜蘆右件生為末煉蜜為丸如彈子大囊盛一丸男左女右繫臂上又用一丸當病人户前燒之一切邪鬼不敢近太乙神精丹蘇合香丸皆可用也治婦人與邪物交通獨言笑悲思恍惚者用雄黃末一兩以松脂二兩溶和虎爪捻令如彈丸夜內火籠中燒著令女人侵坐其上被急自蒙唯出頭耳一次未差不過三劑過自斷也又雄黃一兩人參一兩五味子一升防風一兩右搗篩清旦以井水服方寸匕三服瘥治婦人夢與鬼交者用鹿角為末三指一撮和清酒服即出鬼精兼治漏不斷又方以安息香和臭黃合為丸燒熏鬼交永斷普濟方卷三百二十三
