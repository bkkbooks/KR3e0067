半分煎至六分去滓每於食前溫服白豆蔻散治産後臟腑氣虛兩脅脹滿不思飲食四肢無力白豆䓻去皮人參去蘆頭桂心各半兩半夏湯浸七遍去滑半兩白术陳橘皮湯浸去白瓤焙乾各一兩枳殼三分麩炒微黃去瓤甘草一分炙赤銼右搗粗羅每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服厚朴散治産後兩脅脹滿胸腹妨悶不下飲食厚朴一兩去粗皮塗生薑汁炙令香熟赤茯苓人參去蘆頭當歸銼微炒訶梨勒皮陳橘皮湯浸去白瓤焙各三分甘草一分炙微赤銼右為粗散每服四錢以水一中盞入生薑半分棗二枚煎至六分去滓不計時候溫服白聖散治産後腹大堅滿喘不能卧樟柳根三兩大戟一兩半甘遂一兩半右為細末每服二三錢熱湯調下取大便宣利為度此藥主水氣之勝藥也桂心散桂心當歸銼微炒各一兩乾薑炮裂銼芫花醋拌炒令乾木香各半兩右搗細羅為散每服食前以熱酒調下一錢治産後腹脹腫疼不可忍用鼠粘根煮為飲一服即愈治産後膨脹氣不通轉用麥糵為末酒調二三錢服之漸通匠勝湯治産後腹脹滿悶嘔吐不定者何答曰敗血散於脾胃脾受之不能運化精微成腹脹胃受之則不得受納水榖而吐逆醫者不識以尋常治脹止吐藥療之病與藥不相干轉更傷動正氣疾愈難治但服必瘥赤芍藥半夏湯洗切碎澤蘭葉人參去蘆頭陳皮去白各一錢甘草炙一錢生薑半兩右為粗末用水一碗同煎至兩盞去滓溫熱分二服治産後亂吃物早非特腹脅脹滿飲食不快當歸鱉甲以醋少許化硇砂少許用炙黃色各一兩桔梗細辛厚朴羌活木香芎藭檳榔各一分草豆蔻去皮半兩藿香三銖半夏二銖右為細末每服三錢水一盞生薑二片同煎取九分空心和滓喫治産後雖甚通利但心腹滿悶脅脹咳嗽不食大便不通眼澀行坐心腹時痛白术當歸桑白皮大黃各三兩細辛桂心各二兩生薑四兩右㕮咀以水二升煎一升分三服當得微利即止大黃産後不可輕用此緣病熱不得已也身體腰腳疼痛附論産後遍身疼痛者蓋由産後百節開張血脈流散遇氣弱則經絡分肉之間血多留滯纍日不散則骨節不利筋脈急引故腰背不得轉側手足不能動搖身熱頭痛也若以傷寒治之則汗出而筋􅀈動惕手足厥冷變生他病但以趁痛散治之若腰腳痛者蓋腎主腰腳女人腎位繫於胞産則勞傷腎氣損動胞絡虗未平復而風冷客之冷氣乘腰故令腰痛也若寒冷邪氣宿滯背脊則痛久未已後忽有娠必致損動蓋胞絡屬腎腎主腰故也方趁痛散治産後身痛氣弱血滯骨節不利筋脈急引牛膝當歸桂心白术黃耆獨活生薑各半兩甘草薤白各一分右㕮咀每服半兩以水三盞煎至盞半去滓食前服陳無擇評曰趂痛散不特治産後氣弱血滯兼能治太陽經感風頭痛腰背痛自汗發熱若感寒傷食憂恐驚怒皆致身疼發熱頭痛况蓐勞之證尤甚趂痛散皆不能療不若和劑局方五積散入醋煎用却不妨又方加桃仁能治腰疼逐敗血袪風濕加桑寄生半兩尤佳杜仲散治産後傷虛腰間疼痛四肢少力不能飲食杜仲去粗皮炙微黃色銼碎熟乾地黃附子炮裂去皮臍萆薢銼牛膝去苗銼木香石斛去根銼各一兩桂心續斷各半兩五味子三分當歸銼微炒芎藭各三分右為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓食前服石斛散治産後虛損腰間疼痛四肢無力氣血不和石斛去根銼丹參附子炮裂去皮臍延胡索熟乾地黃枳殼麩炒黃去瓤芎藭桑寄生各一兩續斷當歸銼微炒各三分桂心三分牛膝去苗一兩半右為末煉蜜和搗五七百杵丸如梧桐子大每服食前以溫酒或生薑湯下三十丸杜仲酒治産後臟虛腰間疼痛肢節不利杜仲去粗皮炙微黃銼二兩桂心丹參當歸菴䕡子芎藭牛膝去苗桑寄生附子炮裂去皮臍熟乾地黃銼各一兩川椒半兩去閉口及目微炒右細銼以生絹袋盛用好酒一斗瓷瓶中浸經七日密封後開取每日空心及午食前溫飲一盞牡丹湯治産後腰痛沉重舉動艱難牡丹皮柴胡去苗犀角鎊杜仲去粗皮銼炒當歸切焙桂銼去皮枳殼去瓤麩炒檳榔煨銼丹參桔梗銼炒郁李人湯浸去皮尖各一兩右粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時候人參湯治産後虛冷氣血不和腰痛人參當歸切附子炮裂去皮臍檳榔生銼桂去粗皮甘草炙厚朴去粗皮塗生薑汁炙鬼箭羽各一兩乾薑炮木香各半兩右銼如麻豆大每服三錢水一盞煎至七分去滓溫服不拘時候赤芍藥散治産後血氣壅滯攻刺腰間疼痛赤芍藥三分延胡索桂心芎藭當歸銼微炒牡丹桃仁湯浸去皮尖雙人麩炒各半兩牛膝去苗川大黃銼微炒各二兩枳殼麩炒微黃去瓤半兩右為散每服四錢以水一中盞入生薑半分煎至五分次入酒二合煎三二沸去滓食前溫服療産後風冷腰痛不可轉者腎經繫於胞脈腎主腰也獨活川芎桂心芍藥續斷生薑桑寄生各六分當歸防風各八分右㕮咀以水三升煮取一升去滓空心分二服牛膝散治産後敗血不散攻刺腰間疼痛日夜不止牛膝去苗川大黃銼碎微火炒各一兩桂心赤芍藥各三分羚羊角屑劉寄奴芎藭當歸銼微炒桃仁湯浸去皮尖雙人麩炒微黃各半兩右為散每服四錢以水一中盞煎五分次入酒二合更煎三二沸去滓食前溫服沒藥散治産後餘血未盡攻腰悶疼痛沒藥牛膝去苗桂心琥珀赤芍藥菴䕡子桃仁湯浸去皮尖雙人麩炒微黃狗脊去毛各一兩當歸銼微炒半兩右為細散每服食前以溫酒調下二錢仙靈脾散治産後血氣攻刺腰間疼不可忍仙靈脾牛膝去苗當歸銼微炒各三兩鬼箭羽地龍炒令黃沒藥桂心威靈仙骨碎補各半兩右為細散每服食前以溫酒調下二錢丹參丸治産後虛損氣血不和腰痛難忍丹參銼續斷當歸切焙牛膝去苗酒浸切焙桂去粗皮鬼箭羽銼各一兩沒藥用醋少許化開半兩琥珀右除沒藥外並為末入沒藥拌勻煉蜜和丸如梧桐子大每服三十丸以溫酒下不計時候續斷飲治産後腫重痛不可轉側續斷芎藭桂去粗皮生乾地黃焙黃耆細銼芍藥黃芩當歸去粗皮右粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時候芎藭湯治産後腰痛沉重夫産後腎氣不足或惡露所出未盡遇風寒客搏皆令氣脈凝滯留注於腰邪正相擊故令腰痛也芎藭牛膝去苗酒浸切焙當歸切炒萆薢銼桂去粗皮桃仁湯浸去皮尖雙人炒芍藥各一兩右粗搗篩每服三錢水一盞入生薑三片棗二枚擘破同煎至七分去滓溫服不拘時候芍藥湯治産後氣血凝滯腰重痛赤芍藥延胡索當歸切焙枳殼去瓤麩炒牛膝去苗酒浸炒石斛附子炮裂去皮臍各一兩右銼如麻豆大每服三錢水一盞入生薑三片棗二枚擘破同煎至七分去滓溫服不拘時候附子丸治産後腰疼不可忍附子炮裂去皮臍人參當歸切焙熟乾地黃焙桂去粗皮延胡索威靈仙去苗土各一兩右搗羅為末煉蜜為丸如彈子大每服一丸細嚼溫酒下胡桃茶亦得不拘時候當歸散治産後腰痛不能轉側壯熱汗出身體急強當歸銼微炒骨碎補牛膝去苗赤芍藥琥珀桃仁湯浸去皮尖雙人麩炒微黃芎藭各一兩右為細散食前以豆淋酒調下二錢生地黃湯療産後三日患腰疼腹中餘血未盡并手腳疼不下食生地黃汁一升芍藥甘草各二兩丹參四兩蜜一合生薑汁半合右切以酒三升煮取一升去滓內地黃汁并蜜薑汁微火煎一二沸一服三合日二夜三利一兩行中間進食與藥更進服熟乾地黃散治産後氣血凝滯攻腰痛熟乾地黃焙三兩當歸切炒一兩半細辛去蘆葉三分甘草炙銼吳茱茰湯浸焙乾炒半兩芍藥各一兩右搗羅為散每服二錢溫酒調下不拘時候羚羊角散治産後腰痛舉動不得羚羊角鎊紅藍花牛膝酒浸切焙銼各二兩桂去粗皮芍藥各一兩生乾地黃焙四兩右粗搗羅每服三錢水一盞煎至七分去滓溫服不拘時候治婦人産後遍身疼痛腰背不得轉側手足不得動搖身熱頭疼若作傷寒醫遲則變生他病及婦人女子遍身疼痛腳不能動牛膝酒浸炒當歸去蘆白术黃耆蜜炙肉桂不見火獨活去蘆頭右各等分㕮咀每服三錢水一盞半薑五片薤白七寸煎七分去滓熱服敗醬散療産後虛冷血氣流入腰腿痛不可轉或痛引腹中如錐刀所刺及疼痛敗醬當歸各八分川芎芍藥桂心各六分右㕮咀以水二升煮取八合空心分溫二服忌蔥一方有延胡索北五味各等分無芍藥入酒煎或水酒同煎當歸黃耆湯治産後失血過多腳腰痠疼轉側不得壯熱汗出氣短心怔身強當歸銼焙黃耆細銼芍藥各二兩生薑切焙五兩右粗搗篩入作八服每服水二盞半煎至一盞去滓溫服楮實丸治一切風勞冷氣女人冷血氣産後腰痛等證楮實一斤炒牛膝酒浸切焙乾薑炮各一兩右搗羅為末煉蜜和丸如梧桐子大每服食前空心酒下二十丸生薑湯療産後餘血不盡血流入腰腳疼痛胸滿氣急兩脅痛方見本門惡露不盡類治腹中惡露不除身強痛方用生薑三斤㕮咀以水一斗煮取三升分為三服當下惡血治産後腰痛起動不得方萆薢官桂石斛茯苓兔絲子芎藭山茱茰當歸胡蘆芭炒各一分牛膝一兩右杵羅為細末每服三錢水一盞入鹽少許同煎三四沸空心和滓熱喫羊肉杜仲湯治産後腰痛􅠲嗽羊肉四斤杜仲紫苑當歸桂心白术各三兩五味子細辛欵冬花人參厚朴芎藭附子萆薢甘草黃耆各二兩生薑八兩大棗二枚右㕮咀以水二斗半煮肉取汁一斗五升去肉內藥煎取三升半去滓分五服日三夜二雙俱散治産後腰痛石菖蒲一兩當歸半兩右為末每服三錢空心熱酒調下普濟方卷三百五十一
