body:
  text: 普濟方卷六十九明周王朱橚撰牙齒門齒風腫痛論齒風腫痛者齒根虛浮牙齒疼痛或遇呼吸風冷其痛愈甚則齗䐬腫赤乃至動搖此蓋手陽明經虛風其客脈流注齒間故為齒風腫痛之患也夫手陽明之支脈入於齒齒是骨之所終髓之所養若風冷客於經絡傷於骨髓冷氣入齒根則齒痛也若蟲蝕齒而痛者齒根有孔穴蟲在其間則針灸不差若傅藥則蟲死其痛乃止也方雄黃丸治風齒腫痛雄黃丹砂麝香桂各一分檳榔鹿茸乾薑防風天南星黃耆白茯苓半夏白附子白殭蠶各一分右為末鍊蜜和丸如梧桐子大服十丸空心酒下梧桐淚散治足陽明經虛風熱所襲傳流齒牙攻注齗內則致腫結妨悶甚者與齗間津液相摶化為膿汁宜用此藥梧桐淚石膽黃礬蘆薈各半兩硃砂細辛當歸牛膝川芎各二錢半亂頭髮灰麝香各一錢川升麻半兩右為細末先以甘草湯潄口後用藥少許傅之如常用少許揩齒去風退熱消腫化毒牢牙永無宣露血疳之疾清上防風散治上焦不利風熱攻衝氣血鬱滯牙齒悶痛肉虛腫鼻塞聲重頭昏目眩並皆治之防風細辛薄荷葉各一兩川芎獨活荆芥天麻甘草白檀白芷各半兩片腦子一錢右同為細末入腦子再研勻細每服二錢淡茶清調勻稍熱潄冷吐不拘時候如頭暈目昏牙齒腫悶用熱清茶調三錢食後服亦得細辛散治久患風牙疼痛疳𧈟細辛羌活藁本當歸附子牛膝木香甘草各半兩皂莢礬石各少許右為散常用揩牙永瘥升麻散治陽明經有熱攻注牙齒腫痛踈風毒升麻細辛防己枳殼各一兩羌活大腹子郁李仁大黃牽牛麻仁各三兩右為末煉蜜和丸如梧桐子每服三十丸食前溫酒下地黃散治風熱攻注陽明齒痛齗腫或血出宣露地黃防風細辛薄荷葉地骨皮藁本各一兩莽草葉荆芥穗當歸各半兩右為粗末用四錢水一盞半煎一盞去滓微熱潄口冷即吐不拘時地骨皮湯治牙齒風腫地骨皮白楊皮細辛各一兩鹽二錢蒼耳生地黃蜀椒杏仁二十枚右為粗末每服五錢以水一盞半煎入地黃汁半合煎至一盞去滓熱潄冷吐日三五度酒煎亦佳白礬湯治齒痛風腫搖動發作不時兼蛀牙白礬乾薑藜蘆蛇床子各一分甘草細辛各半兩蜀椒防風半兩右搗篩每用二錢以酒一盞調勻煎三五沸熱潄冷吐齒落盡欲令生每日含潄不食鹽則生此方甚良祕之一方加附子半兩升麻湯治一切風齒疼痛升麻細辛甘松防風露蜂房甘草各一兩地骨皮雞酥葉四兩右為粗末每服三錢水一盞同煎七分溫潄冷吐應痛散治陽明有風熱攻注牙齒疼痛細辛白芷升麻各三錢南硼砂川芎鉛白硝龍腦各一錢麝香半錢右為細末頻擦牙痛處吐津誤咽無妨不拘時候莽草散治風壅熱氣上攻齒齗浮腫或連頰亘痛或宣露血出莽草川升麻柳枝槐角子鶴虱地骨皮藁本槐白皮各等分右㕮咀每服一兩水一碗入鹽少許煎七分去滓熱含冷吐日三次升麻地黃散治風氣上攻牙齒疼痛齗腫連腮頰緊急升麻生地黃地骨皮青鹽川芎各半兩皂角細辛槐角子半兩右為細末少許揩齗上有涎吐了誤咽不妨雄黃散治諸般風腫牙疼雄黃細辛青鹽石膏良薑蓽撥麝香胡椒各等分右為極細末早晚擦於牙上潄三五次吐了再擦其痛處即止蜀椒散治牙疼及頭牙齗風腫口急不開面目虛腫蒴藿五兩蜀椒一兩吳茱萸獨活烏賊魚骨桃膠各一兩桂心半兩酒一合右切以水二升煮取八合投蒴藿汁及酒更煎取一小升去滓含之就病處日三以瘥為度附子湯治牙齒風痛不得安睡附子防風細辛獨活甘草各三分莽草芎藭半兩右為粗末用五錢水二盞煎十餘沸去滓熱潄冷吐日三五度蜀椒湯治頭面風口齒疼痛不可忍蜀椒莽草雀李根獨活各二兩細辛芎藭防風各一兩右㕮咀以酒二升半煮三五沸去滓含之冷吐更含之勿咽汁一方有白术無蜀椒如齒齗間血出用生雀血塗之便愈白牙升麻散治風牙疼痛及齒齗腫硬不消川芎升麻藁本石膏白芷各一兩細辛六錢皂角一兩右為末紗羅三度每用刷牙蘸藥少許刷牙用溫水潄小至寶丸治風牙病荆芥防風何首烏威靈仙蔓荆子菖蒲苦參各二兩右為細末煉蜜為丸如彈子大每服一丸細嚼茶酒送下驅風散治風牙疼細辛草烏各一兩蝎稍五錢荆芥穗防風各一兩半升麻半兩沒石子一兩右為末擦患處莽草散治風牙疼莽草一兩白芷三分細辛一兩半芎藭半兩升麻一兩荆芥穗一兩半右為散揩齒良久以鹽湯潄口香芎湯治骨槽風壅齒痛不可忍或牙齒動搖并口內生瘡者芎藭羌活細辛防風莽草郁李仁各半兩右為粗末每用五錢以水一盞半煎三五沸熱潄冷吐立妙一方有桃李仁治風蚛牙疼不可忍者白芥子胡椒白殭蠶草烏頭七枚乾蝎七枚乳香一塊右為末每用真酥調少許如膏點在疼處蒴藿湯治風齒腫疼及頭面腫痛口急不開蒴藿桂桃膠蜀椒吳茱萸烏賊魚骨各一兩右銼每用五錢以水一盞煎十餘沸去滓更入酒半盞又煎十餘沸熱潄冷吐蜀椒湯治風齒痛不可忍莽草細辛菖蒲牛膝枳壳各半兩蜀椒三十粒右銼如麻豆大以水三盞煎三五沸熱潄冷吐巴豆丸治一切風齒疼痛巴豆胡椒髙良薑烏頭桂各一分麝香少許右為細末煉蜜和丸如梧桐子大以棉裹置於痛處咬之勿咽津液露蜂房散治齒風腫痛露蜂房豬牙皂角川椒荆芥鶴虱細辛各等分右為㕮咀煎一二沸灌潄去涎即愈一方米醋煎一二沸冷潄涎去即愈芎藭湯治風齒疼腫及口臭芎藭當歸獨活細辛白芷各一兩右為粗末每用五錢以水一盞煎至七分去滓熱含冷吐如此三五次治風齒及蚛牙疼痛不可忍狼牙草根柳蛀屑茛菪子槐枝半兩皂莢一分右細銼和勻分為三度每度以漿水二大盞煎七分去滓熱含冷吐蛇蛻皮散治風齒疼痛不可忍蛇蛻皮蠶沙柳枝吳茱萸槐枝各一兩右細銼每服五錢水一大盞煎七分盥潄稍熱含之冷吐效獨活酒治風牙齒疼痛獨活莽草細辛各半兩附子防風各半兩右細銼以酒一升半煎至一升熱潄冷吐一方無防風郁李酒治齒風腫痛呼吸風冷其痛愈甚齗䐬腫赤郁李根細辛椒半兩槐白皮柳白皮右細銼每用藥一兩酒升半煎三五沸去滓熱潄冷吐蓽撥散治諸陽氣虛風攻牙齒疼痛不論寒熱嚼物隱痛蓽撥苦參防風升麻各一兩藁本半兩右為散每用三錢水一盞煎六七沸熱潄冷吐石燕子散治齒牙風冷疼痛及齒齗不密固石燕子茯苓細辛寒水石香白芷各一兩右為細末入研藥勻每用藥半錢以指蘸擦牙齗上合口少時後用溫鹽湯微潄一兩口存藥性食後或日用一兩遍升麻散治陽明經受風邪入齒牽引牙䐬疼痛不止升麻香附子細辛莽草各等分右同為細末用三錢水一盞煎至七分去滓熱潄冷吐日用三四度定痛散治牙風疼立效華隂細辛川烏頭香白芷各一兩乳香二錢右為末每用少許擦牙痛處有涎吐之須臾以鹽水灌潄濟生方除白芷川烏用全蝎草烏潄毒散治風熱攻注牙齒疼痛久而不愈細辛薄荷葉荆芥穗地骨皮右為粗末每用七錢水二盞煎至一盞半去滓食後溫潄冷吐川椒散治風牙腫疼露蜂房去土殭蠶淨川椒去子茄蒂各等分右並燒灰存性入鹽擦之去涎即愈荆芥湯治風熱齒痛荆芥薄荷升麻細辛右等分為末每服二錢以沸湯點潄口含咽并用擦牙草烏頭散治風牙疼痛兩頭尖七個草烏頭七個全蝎七個殭蠶七個去頭足右為細末用指點擦於痛處唾津勿咽然後潄之吐出又方蓽撥細辛良薑白礬右為細末和勻一半於牙痛處擦之須臾有稠涎出盡覺生清液用溫水潄之濕生蟲丸治風齒疼痛濕生蟲一枚胡椒一顆巴豆一枚去皮右先研胡椒細次下巴豆濕生蟲研令勻用軟飯和丸如菉豆大以綿裹一丸咬之良久涎出逐漸吐立效一方丸米大內蟲孔中痛立止效驗不可名狀草烏頭散治一切風齒疼痛飲食艱難揩擦草烏頭二枚炮膽礬研細辛各一錢去苗葉右為細末每用一字以指頭擦有涎吐之皂莢湯出聖濟總録治諸風齒疼痛皂莢一挺去皮子炙令黑色銼露蜂房一枚劈碎鹽一分右銼分三貼以漿水一盞煎十餘沸去滓熱潄冷吐殭蠶散治風壅牙疼薑黃藁本白芷各等分右為細末每以少許揩牙疼處用鹽水盥潄立刻見效杏辛散出海上方治風腫杏仁十個去油細辛焙乾十匙雄黃别研十匙右為末男左女右搐鼻中妙又方出海上方草烏尖皂角炒黃道人頭各等分右為末揩痛處鹽湯潄之草烏散治牙疼并牙踈又治風腫牙疼極效草烏四個緊小如鳥啄者不去皮全蝎二個胡椒三十粒右同為細末揩牙出涎即以荆芥湯灌潄微覺麻少頃即定槐白皮散治齒風疼痛不止槐白皮地骨皮各一兩松節三兩銼右為散每用五錢以漿水二中盞煎五七沸去滓熱含冷吐皂莢散出聖惠方治齒風蚛疼痛不可忍皂莢炒黃焦荆芥胡椒各一兩右為末每用三錢以水一大盞煎至七分去滓熱含冷吐皂莢丸治齒風疼或蟲痛不可忍根下有孔豬牙皂角二挺去皮子漢椒七枚去目莽草半兩右為末以棗肉和丸如芥子大每用一丸內蟲孔中有涎即吐却芎附湯治齒疼痛芎藭二兩附子炮裂去皮臍右為末每用三錢水一盞煎至八分去滓熱潄冷吐治熱毒風攻牙齒疼痛附子燒灰一枚礬石燒灰一分右為細末每用少許揩齒瘥逡巡散治風牙疼痛不拘新久一服立效髙良薑一塊約二寸全蝎一枚瓦上焙乾右為末以手指蘸藥如齒用藥須擦熱用俟須臾吐出少涎以鹽湯潄口大妙亦治腮頰腫痛勑局周含鮑子明常患風牙腮頰腫痛甚不能忍豫以此方投之出涎數口即愈此藥亦係丐者所傳疑丐者是異人一方先用酸漿水潄牙細辛散常用去風蟲不蛀茄蒂晒干燒灰細辛各等分右和勻擦之治齒風連面疼痛不可忍者細辛一兩黑豆一合右熬豆令熟然後以好酒二大盞同煎至一大盞去滓熱含冷吐治頭面風口齒疼痛不可忍用雞屎白燒灰以綿裹置齒痛處咬之又以傅齒根亦可一方以醋漬煮含之又方出千金方治齒痛用煮枸杞汁含之又方出千金方含驢尿須臾止治風熱上攻齒痛余頃任淮西幕府己酉冬被檄來和州至含山縣齒痛大作忽於刀鑷人處得草藥一捻許以湯炮少時冷暖隨意以手揩蘸藥水浥痛處即定明日若人去余因傳得其方後以治人多效用皺面地蔥子即本草稀蘞又名地菘者霜後收之每用少許湯泡又云即是鶴虱但本草别有鶴虱及細考沈存中筆談專辨地菘云其子名鶴虱余之所用正此物也又季誠方用鶴虱一枚濯置齒中髙堅云以醋煎鶴虱潄口其痛立定尤妙治風齒敗口臭用芎藭含之大蒼散治牙床風腫每用大蒼术切作兩片於中穴一孔入鹽實之濕紙裹燒略存性取出研細以指揩之去風涎即愈以鹽湯潄口治牙疼并牙疏又治風腫牙疼極效用獨子肥皂去子以青鹽實之用紙裹水浸潤入火燒存性更入生樟腦子十五枚同研細揩之又方出海上方用生薑一塊破開入巴豆肉一粒濕紙裹慢火煨香為度去巴豆切薑為末揩之於疼處竒妙一方猴薑熟用川巴豆紙壓去油却以新綿少許裹巴豆在內隨蚛孔大小加減用綿塞蚛牙中其痛立止用三次蚛牙自落妙不可言專治風腫氣腫牙疼及風蛀牙痛有苦牙疼者百藥不效用此馬敏叔説一村媪苦牙痛百藥不效用此即愈用天蘿即生絲瓜一個小者擦鹽火燒灰存性成末擦上痛處腫處涎盡即愈右乃嚴月軒家傳屢效之方自患此證一試而無不效若以水調藥灰掩傅腫腮上尤妙前有此方治蛀牙據月軒此物大能去風若蛀牙則不效治齒牙疼用豬牙皂角不拘於灰火內煨過銼碎用蔥白漿水同熬去滓乘熱潄冷吐之立止治風齒疼頰腫出肘後方用獨活酒煮熱含之一方銼碎以水二大盞煎至一盞去滓熱含冷吐亦治齒風宣露治療牙風取東墻下朽骨削之如疼牙齒許大於炭灰中煨燒令熱於所痛處齧之冷即易之治風牙疼痛方用木鱉子去殼細磨稀調上患處治風牙疼痛方用胡絲饅頭草將鹽少許於掌心揩碎擦之即愈風齒疼痛頰腫及治血出不止用菵草五兩水一斗煮取五升熱含吐之一日盡又酒煮獨活熱含之治患牙壅腫疼用敗毒散加荆芥穗石膏防風桔梗大黃煎服後服防風通聖散更加石膏芒硝防風全蝎大黃煎服治風蚛牙頥頰腮腫痛用芭蕉自然汁一碗煎及八分乘熱潄牙腫處潄盡即止凡是風牙用之必愈頥頰腫而痛者風牙也頥頰不腫只牙齗腫痛蚛牙也治風蛀牙疼方及治熱風頭痛用杏仁燒令煙盡去皮以亂髮裹之咬於所患齒下其痛便止薰諸蟲出并風便差重者不過再服薰之即效槐枝散治牙齒腫痛牙齗宣露氣臭齒挺出時發疼痛常用去疳牢牙細辛去土川芎白芷各一兩蝎稍生二錢半右為細末每用半錢擦在牙疼處有涎即吐誤咽無妨早辰臨臥日用一兩遍治風氣攻注牙齒腫痛華陀中藏經方藁本剪草細辛右等分為粗末每服三錢水二大盞煎至一盞半以下乘熱潄之過後微覺痛少頃自止一方治一切風腫牙寒濕腦風項筋急牙摧齦脫麻黃三兩柴胡半兩羊腦骨灰三錢羌活根一錢半當歸半錢白芷桂枝細辛各半錢蒼术升麻各一錢半右為末極細潄口指擦牙疼處立止立應散出楊氏方治風蚛牙疼楊梅根皮厚者一兩去粗皮川芎麝香少許别研右件為細末研勻每用一字先含溫水一口次用藥於鼻內搐之涎出病止為妙救急療齒風痛出本草取蒼耳一握以漿水煮入鹽少許潄之治牙齒痛上攻腫痛獨活地黃右二味各三兩為末每服三錢水一盞煎和滓溫服臥時再用治口齒風疳𧈟血以槐白皮煎漿水煮含之腎虛齒痛論夫齒者骨之精華骨乃腎之所主外板則為齒內床則為牙人腎氣強則齒自堅腎氣衰則齒必病且手陽明大腸之脈入於齒灌注於牙倘風寒壅熱之氣鬱滯心胸衝發於口則齒為之病矣輕者為宣露齗頰浮腫重則為疳𧈟齲脫之證也亦有腎虛氣壅齒痛宣露當進補腎藥隨證治之足少隂經虛氣血不能榮養骨髓故因呼吸風疼或潄寒水則令齒痛而不已方沉香延齡散治風牙腎虛牢牙補腎生津液沉香川芎生地黃藁本零陵香砂仁人參熟地黃防風沒石子荆芥藿香片腦木香石膏地骨皮白蒺藜桂心母丁香檀香白芷杜蒺藜炒去刺石菖蒲以上各半兩當歸天麻訶子細辛何首烏枸杞子青鹽甘松乳香龍骨槐角子香附子以上各七錢半露蜂房一兩蓽撥二錢柳枝四兩炒膽礬一錢半石燕子五個火煆海浮石一兩麝香一錢右為細末早晚擦牙鹽湯潄然後咽之無食子散治腎虛齒痛揩齒黑髭無食子乾馬齒莧蓮子草石榴皮巨勝子生地黃柳皮取白羌活去蘆頭訶梨勒皮牛膝生薑皮生胡桃皮白芷各一分皂莢一挺不蚛者去皮炙青鹽右銼如麻豆大瓷瓶子盛密蓋泥封頭炭火燒令赤候冷取出搗羅為散更以濕紙攤用盆蓋一復時出火毒每用柳枝湯潄口畢揩齒雞腸草散治腎虛齒痛揩齒烏髭鬢駐顔雞腸草白礬碎訶梨勒蘹香子旱蓮子晚蠶沙青鹽茜根皂莢各一兩麻粉半兩右除礬并青鹽蘹香蠶沙外各銼長半寸用磁瓶一枚開口入諸藥在內紙筋鹽泥固濟以炭火半斤煆盡火放冷取出研如粉早晨食後夜臥揩三兩次少頃潄口天雄散治腎虛齒痛天雄炮裂去皮臍當歸切焙細辛去苗葉附子炮裂去皮臍甘草炙銼乾薑炮生地黃切焙苦參䔧蘆各半兩去苗右為細末揩貼齒痛處日三五上勿咽津每藥盡即以水潄地黃散治腎虛齒痛烏髭鬢揩齒升麻銼一兩訶梨勒搗二枚白鹽花半分麻籸末第一𥚹打者四合生地黃丹砂一兩細研臨燒時以沙牛糞汁調之免飛上粟饋一大合右拌勻以淨沙瓶中盛密封泥裹隂乾以炭火七斤燒炭盡取藥細研為末每欲用先以生薑一塊爛嚼吐却以左手指揩三五遍就點藥揩十數遍含津不吐兩手取津塗髭髮待辛辣定則咽之兼治腳氣腸風莽草散治腎虛齒痛揩齒烏髭益夀延長莽草生薑乾薑豬牙皂角生地黃絲子胡麻子右各四兩銼如麻豆大入磁瓶內鹽泥固濟火煆一日後入地一尺一寸深埋三復時取出露三夜不得著日氣研為細末用如齒藥法揩牙地黃丸治腎氣虛食冷熱物齒疼痛生地黃切焙一兩白茯苓去黑皮防風去叉獨活去蘆頭枸杞子山芋各半兩右為細末鍊蜜丸如梧桐子大空心煎棗湯下十丸至十五丸三枝散治腎虛齒痛槐枝柳枝桑枝晚蠶沙青鹽麻籸右銼如麻豆大鹽泥固濟一罐子曝乾後入諸藥在內開口於地坑子內四面炭火簇燒令通赤時用柳枝攪撥轉燒令勻煙盡去炭火用濕紙三五重蓋罐口候冷出藥研為末瓷合盛每日揩齒日久良勝金散治腎熱上攻牙齗浮腫牙齒疼痛或腎原虛冷牙齒搖動或赤腫痛風牙蟲牙並皆治之用老生薑十兩切作錢薄攤箕內冷水淘次用砒霜一錢重細研拌薑錢令勻留少許砒放鎔銀乾沙鍋子內砒拌生薑於上按令緊用新瓦一片蓋鍋內烈炭火煆令煙盡傾於盆內盞子合定存性要成黑炭不可白却蓽撥全蝎華隂細辛胡椒右焙乾薑炭亦為細末拌勻每用手指點少許如黑豆大揩牙齗上閉口候有涎沫即吐出立效茈胡湯治腎虛牙齒齗腫膈上熱茈胡枳殼黃連厚朴右搗篩每用五錢水二盞煎至一盞去滓食後分二服麝香散治腎虛齒痛揩齒麝香小豆麵蜀椒青鹽右為末用揩齒後以溫水潄之治腎虛齒痛揩齒硫黃甘松右等分為細末百沸湯泡熱潄口神效治腎虛髓少齒痛生地黃川芎各一兩右以煎湯漬齒根無拘時骨碎補散治腎虛氣攻牙齒血出牙齗癢痛揩齒用骨碎補炒黑色二兩為細末於潄後揩齒根下良久吐之臨臥再用咽津不妨治老人牙疼因腎氣虛弱或因用涼藥擦牙所致用肥皂一枚去核入鹽在內用鐡線扎合以鹽泥固濟火煆黑末擦牙治蚛牙用蟾蜍眉酥和牛酥摩傅腰腹并隂囊治腎腰冷助陽氣以吳茱萸苗汁調加減牙藥麝香散治腎氣虛弱夫齒者乃骨之所終髓之所養也若腎氣實則骨髓堅固齒無病矣緑礬石膽五倍子訶子皮何首烏龍骨藿香葉甘松各四錢縮砂仁細辛白茯苓零陵香百藥煎青黛龍腦生地黃麝香各半兩右為細末入研藥勻如常法用少許用刷牙蘸藥刷牙齒上合口少時後用溫水潄口吐之每日早用齒齗宣露論夫牙齒雖為骨之所終髓之所養得齗肉而固濟可以堅牢今氣血不足揩理無方風邪襲入客於齒間則令肌寒血弱齗肉縮落漸至宣露齗肉腐爛永不附著齒根也方升麻散治牙齒宣露齗肉腐爛升麻防風藁本細辛白芷地骨皮露蜂房木香甘松丁香沉香柳枝心右為散以一錢患處貼齒齗上咽津以差為度茜根散治齒齗宣露口臭血出茜根升麻甘松牛膝銼細辛羌活硫黃槐白皮皂莢鹽花芎藭地骨皮各一分右細銼同入瓶子內燒勿令煙盡取出去火毒後搗研為散揩齒甚妙雞舌香散治牙齒宣露口臭血出不能飲食雞舌香當歸青葙子乾薑菖蒲莎草根木香青黛梧桐淚棘刺右為散每用綿裹半錢含化咽津更於患處齒齗貼一方無青葙子有細辛玉池散治風蚛牙疼瘇癢搖動牙齒齗潰爛宣露出血口氣等疾悉能治地骨皮香白芷川升麻防風細辛川芎槐花當歸藁本甘草各等分右為末每用一字許揩牙或齒痛即取二錢水一盞半合生薑三片煎至一盞稍溫漱候冷吐之殊效或用金沸草散薰潄佳一方有刺蒺藜白牙藥真珠散治齒齗宣露牙黃黑不白真珠白檀石膏烏魚骨白石䕟浮石各半兩硃砂香白芷川升麻川芎各二錢半右為細末每用少許以指蘸藥擦牙合口良久吐津後溫水潄口地黃散治口齒宣露𧈟蝕腫癢生地黃牛膝地骨皮升麻羌活芎藭藁本細辛各一兩梧桐淚右為散先用溫鹽湯淨潄次用藥揩了更不潄早起臨臥治大人小兒牙疳宣露輕者枯礬青黛銅緑生朴硝甚者緑礬蘆薈麝香龍骨血蝎各少許右以虀水溫潄然後用藥傅貼紅綿散治牙齒宣露疼痛并齒浮動柳絮麝香紫石英凝水石海蛤龍腦丹砂白石英右為散每服半錢揩牙良久潄口不計時候獨活散清頭目發散風熱治陽明經不利邪毒攻注牙齒齗肉虛浮宣露根下動搖又治偏正頭痛漸漸攻注眼目或發疼痛視物不明其藥功效不可具述川芎獨活羌活防風各半兩細辛荆芥鄆薄生地黃各三錢右為粗末每服三錢水一盞煎至八分去滓溫服食後日三二服細辛湯治風牙腫疼宣露細辛升麻芎藭荆芥穗木通各半分莎草根莽草半兩右為粗末每用五錢水一盞煎七分熱潄冷吐日三兩次白楊皮湯治牙齒宣露白楊皮地骨皮防風細辛蔓荆子杏仁生地黃右銼如麻豆每用五錢以水二盞煎至一盞去滓留八合入酒一盞更煎三五沸熱潄冷吐即差地黃散治風齒血弱齗肉縮漸至宣露生地黃莽草生薑乾膝豬牙皂莢萆麻子絲子各四兩右入瓶內以黃泥固濟火煆一日後入地一尺二寸深窖却三伏時取出合子盛露三夜不得見日氣搗羅為散如齒藥用之防風湯治齒根出露搖動疼痛防風蔓荆子細辛川升麻地骨皮赤茯苓芎藭右銼和勻每用半兩以水一大盞酒一盞煎至一盞去滓熱含於患處冷即吐含盡為度日二盡此一劑瘥矣梧桐淚散治齒齗腫悶宣露出血梧桐淚川芎細辛白芷各半兩生地黃青鹽寒水石右為細末每用二錢水一盞入柳枝黑豆少許同煎至七分去滓熱潄冷吐日三二服芎藭散治牙齒浮腫宣露鮮血不止芎藭梧桐淚石律防風白芷莽草各一兩右為散每用半錢揩牙鹽湯潄之常用齒藥牢牙去風冷蚛蝺宣露不問老少用之甚妙槐枝柳枝皂莢鹽四兩降真香白膠香各半兩右同入磁瓶內黃泥固濟粳火燒一夜候冷取出研細用如常法一方無降真香白膠香三因方出謂石佛庵主年七十餘云祖上多患齒疼脫落此方效數世牢牙散治牙齒宣露瓜蔞根白芷雞舌香白檀香麝香右為散每用半錢揩牙誤咽無妨芎藭散治齒齗宣露疳蟲蝕芎藭木香乳香丁香各一分鹽半兩右為散每用少許患處傅貼日三五上即差細辛散治牙齒浮腫宣露疼痛細辛荆芥莽草升麻各一兩梧桐淚半兩右為粗末用五錢水二盞槐枝十數莖鹽二錢同煎令濃熱潄冷吐地黃散治牙齗宣露癢疼血出生地黃細辛皂莢各一兩白芷一兩右入磁瓶內以紙泥固濟暴乾用炭火燒令煙盡取出放冷研令極細次入白殭蠶末一分甘草末二錢再研令勻早晨或臨臥以少許揩牙齗良久溫水潄口松節湯治牙齒宣露腫癢松節細辛蜀椒梧桐淚右銼如麻豆用五錢水二盞煎十餘沸熱潄冷吐以差為度一方用酒煎藁本散治牙齒風齗腫宣露膿出氣臭藁本升麻皂莢各半兩石膏一兩半右為散臨時以手指蘸藥擦齒上微潄藥氣行即愈蜜陀僧散治牙齒齗宣露腫悶生瘡或有膿血蜜陀僧雄黃石膽麝香右為細末每用少許乾貼患處吐津誤咽不妨不計時候治齒齗宣露以蚯蚓屎水和為泥火燒令極赤研之如粉臘豬脂和傅上日三永差一方同入瓷瓶內黃泥固濟粳火煨燒一夜候冷取出研細用如常法揩牙三因方謂石佛庵主年七十餘云祖上多齒疼脫落此方效數世用之齒白齊密乃良多也治齒痛宣露涎血臭氣川芎竹葉鹽少許細辛右水三盞煎兩煎熱含潄冷吐海蛤散治牙齒宣露海蛤硫黃乾膝右更入麝香少許研為散先用淨帛拭患處以藥傅之有涎吐青黛散治牙齒宣露青黛樺皮蝦蟇右於乳鉢中研令細每用少許傅齒宣露處立驗有津吐之雞舌香散治風冷乘於齒間發熱疼痛口氣宣露雞舌香麝香射干右搗羅為散入麝香再拌和勻每用少許揩牙良久湯潄之牛膝散治齒齗宣露風癢牛膝細辛右為散更於乳鉢中細研傅宣露處日三五上即驗用蠟和圓如蓮子大以綿裹一丸痛處咬之白殭蠶散治風毒壅滯齒齗虛腫出血宣露疼痛白殭蠶麝香右研令勻每用少許揩齒良久荆芥湯稍熱潄口冷吐出治牙齒齗宣露有膿血出及小兒蟲疳齗葶藶梧桐淚各半兩右為散於患處摻之即差一方治熱毒上攻宣露出血齒痛齗腫亦治舌出血百草霜鹽右各等分研細乾擦舌上其血自止治牙宣明礬黃連右為末候睡著擦牙上驅毒飲治熱毒上攻宣露血出齒齗腫痛不可忍者用屋遊即瓦上青苔不拘多少洗淨煎湯澄清入鹽一小匕放溫頻潄之治牙宣出百一選方用赤芍荆芥同為細末揩齒上以荆芥湯潄治牙宣牙癰用蠶退紙不計多少燒灰存性揩入口瘡則用乾摻齒縫血出不止以紙絍子蘸乾用蟾酥少許傅血出處立止小薊散治牙齒宣露出血用百草霜小薊根附子炒去毛真蒲黃各五錢為末揩牙齒上立愈治軸車開不可合用天南星末生薑汁調傅綿縳合一宿愈去風也又法一人以手指牽其頥以漸推之則復入矣推當疾出其指恐嚙傷又法飲大醉睡中搐鼻嚏自正蚺蛇膏治牙露用蚺蛇膏和麝香末傅之治齒齗宣露每旦捻鹽內口中以熱水含潄齒百遍不過五日齒即牢密治牙宣熱爛用羊蹄草含化即可治牙痛有血臭氣用地骨皮不拘多少煎湯潄畢咽之又治上膈咯血并骨蒸癆麝香散治熱多寒少牙露肉齗脫血出齒動欲落大作疼痛妨食忤涼少忤熱多麻黃根草蔲生地黃益智當歸升麻熟地黃骨灰黃連人參麝香漢防己右為細末用溫水潄口淨擦之其痛立止膏香膏治大人小兒齒齗損爛及走馬疳麝香豬牙皂角白礬水銀苦楝根緑礬蜜陀僧膩粉黃蘗右件為末用無灰酒三升熬成膏患者先淨潄口塗之久患者取藥一匙砒霜末各一錢半和勻使絶妙齒痛牙齗宣腫方香附子乳香細辛防己荆芥各三錢右搗羅為細末早上揩痛處如大假痛時即煎防風湯先須潄盥了多著藥擦之一日三次每次一飯久為佳牙宣出永類鈴方當歸尾黃竹葉右同鹽潄牙動牙宣血出淨香附子薑汁同浸晒乾為末擦之牙藥紫金散解風熱潄積壅去口氣上牙宣揩牙白療齗腫及一切疼痛處右用生大黃不拘多少入罐子煆存性碾為細末早晚用少許擦之溫水潄口大有竒效路鈐梁園材云都下一家專貨此物兩宫常以數千錢來買其門如市鄰人咸訝其不曽見修製之功密叩厥子遂得是方治牙齒宣露用蘩蔞燒灰以揩齒宣露然燒灰減力不若乾作末有益矣治牙齒宣露以蚺蛇膽和麝香末傅之齒間血出論夫邪熱潛在上流傳於手陽明之支脈入於齒頭面有風而陽明脈虛氣挾熱乘虛入齒齗摶於血則令齒齗虛腫甚者齒間出血蓋性得溫則宣流故也方烏金散治齒齗血出及腫癢風冷疼痛槐白皮豬牙皂角威靈仙生乾地黃酸石榴皮何首烏青鹽各一兩細辛升麻各半兩麝香右共研為細末將諸藥并麝同研令勻每用半錢揩牙良以溫湯潄口如早作齒藥用尤妙一水調藥半錢塗在紙上於牙齒上貼之三兩次即愈柳枝散治齒齗血出柳枝桑皮槐枝皂莢丹砂生地黃麝香凝水石小薊根右搗研為細散每用揩齒良雄黃麝香散治牙齒腫爛出血雄黃銅緑枯礬血竭麝香輕粉黃丹黃連各一錢右為細末每服少許隨病大小傅上角蒿散治齒痛宣露血出不止角蒿細辛升麻各半兩地骨皮牛膝各一分右藏瓶內燒灰存性搗羅為散每用一錢摻濕紙上患處貼當歸湯治酒醉牙齒涌血出亦治齒風痛當歸礬石桂心細辛甘草各一兩右㕮咀以漿水五升煮取三升含之日五六夜三二次一方無細辛水煎亦可治牙宣血出藁本零陵香甘松三奈荆芥右水煎潄之如刷牙用砂鍋末治齒齗間出血喫食不得黃連白龍骨馬牙硝各一兩白礬龍腦一錢右搗為散研入龍腦令勻每用半錢傅齒根下龍骨散治齒齗血出不止白龍骨生地黃乾薑曲頭棘刺白礬右搗羅為末每用半錢傅齒齗處即差生肌桃花散治牙齒內血出并有竅眼時時吐血寒水石粉硃砂甘草腦子右為細末每用少許乾捻有竅處龍腦散治牙齒疼痛間血出去口氣辟風冷龍腦蔓荆實細辛升麻各一兩右為細散入龍腦拌勻每用半錢揩牙良久溫湯潄口鬱金散治齒出血鬱金白芷細辛右等分為末擦牙仍以竹葉竹皮濃煎入鹽少許含咽或炒鹽傅治牙宣出血明白礬乳香麝香少許右同研細輕手擦良久鹽湯盥潄神效散治牙縫血出草烏頭青鹽皂莢各一分右入瓦器內燒灰存性每用一字揩齒立效生地黃湯治齒齗血出生地黃大豆柳枝右將豆及柳枝炒焦以無灰酒四盞沃之即下地黃根煎五六沸去滓熱潄冷吐治齒齗血出不止方乾地龍末白礬灰麝香末右同研令勻於濕布上塗藥貼於患處一方治齒齗間津液血出不止細辛二兩甘草一兩右㕮咀以醋二升煎取一升日夜旋含之及熱尤良大勝散治齒衄蒲黃螺兒青各等分右為細末每用少許擦患處少待用溫鹽水潄之荆槐散治牙宣出血或痛槐枝荆芥穗右等分為末擦牙仍前點服胡粉散治牙出血不止胡粉麝香半錢右同研細散臨臥淨揩牙潄口訖乾貼兼能牢牙治齒齗間津液血出不止用礬石一兩燒水三升煮取一升先拭血乃含之已後不用朽人牙齒根落不用之可也又方治齒根血出用苦竹葉濃煮與鹽少許溫熱得所含之冷即吐一方無鹽又方治齒出血不止用刮生竹皮二兩苦酒浸之令其人解衣坐使人含噀其背上三過仍取竹茹濃煮汁勿與鹽使微溫含潄之竟日為度治酒醉牙齒涌血用燒釘令赤拄血孔方止治酒後口齒有血出用枸杞為末煎湯潄之然後吞下立止根亦可靈芝散治出血齒痛用川五靈芝以米醋煎汁含咽治齒疼齗間出血極驗用鹽末每夜厚封齒齗上有汁瀝盡及臥其汁出時仍叩齒勿住不過十夜疼血止更久尤佳長忌豬肉油菜等又方用食茱萸遇齒痛酒煎含之治牙疼肉爛血出不止用草烏頭大者去皮臍髙良薑等分為散先用溫鹽湯潄口了揾藥少許揩齒涎出立效凡齒宣露多是疽及蝕用角松灰夜塗齒上齗間使滿勿使食油菜三度即差食油菜即發并桂心常忌沙糖乾棗又方出肘後方每日早捻東牆衣口中暖水含扣百遍常為勿脫不五日宣齒即牢固良驗凡齒痛病皆由月蝕飲酒慎之為妙治齒縫忽然血出不止方用梧桐淚半兩研羅為末貼齒縫如血出不定再貼神效治齒浮動齗腫出血方用屋下塵煤細羅為散揩傅齒根下又方出聖惠方用燒銅筯烙血出處以白礬灰傅之治大人牙宣出血極多用消毒散加大黃赤芍藥當歸生地黃等分同煎服仍敷貼前藥或以綿紙蘸藥塞牙縫中二妙圓治齒衄巴豆蓽澄茄七枚右研爛為細末綿裹左齒痛納之左耳右齒痛納之右耳齒縫出血方齒縫出血不止他藥不能治者鹽注之素問云鹽勝血故也蘭室寶鑑用門冬煎湯潄之亦良又方治齒縫出血蓋上實下虛也八味丸服之而愈治牙齒出血及走馬疳右用頭髮䬣􅨋用剃面刀子細切銚內慢火炒存性為末治齒縫多血以鹽湯常潄即已益齒止血良驗治齒齗間津液血出不止用苦竹茹四兩以醋漬一宿含之一方用酒治齒縫中血出以紙絍子蘸乾蟾酥少許於血出處按立止骨槽風乳香蓽撥散專治牙疼骨槽風天麻防風荆芥穗草烏頭蓽撥細辛川烏頭紅豆盆硝各一錢乳香沒藥官桂各半錢麝香少許右為細末每用一惟或半錢口含溫水鼻內嗅之左右用玉池散治牙濃血變骨槽風者及骨已出者此方張龍圖傳之藁本升麻防風細辛白芷川芎甘草節當歸槐花獨活各等分右為末每服三錢生薑三片水一盞煎七分溫潄服之無不效如意湯治骨槽風走馬牙疳及洗金瘡荆芥穗防風薄荷葉白芷黃柏黃連地骨皮貫仲各等分右為粗末水煎潄去骨槽風出孫真人瘡科論除疳瘡諸毒牙癰方硃砂雄黃磁石石膽礬石右各等分入磁合鹽泥塗燒兩日夜置淨地出火毒兩日細末雞羽蘸傅瘡惡肉朽骨損牙俱出而愈梧桐淚散治骨槽風痛齗腫齒疏梧桐淚槐樹根白薔薇根垂柳稍李樹根右為粗散每用半兩水二大盞煎至一盞去滓熱含冷吐生肌散枯白礬白蘚皮黃蘗白芷各等分右為末先以如意湯潄畢上此藥神效地骨皮散治骨槽風牙齒宣露腫癢浮動疼痛不時或齗爛生瘡及大人小兒口瘡地骨皮麥糵各一兩豬牙皂莢半兩青鹽右入鍋炒搗羅為散每用先以鹽漿水潄口摻擦即愈潄口沉香散治牙槽熱毒之氣衝發齒根腫痛成瘡或差或發並宜服之香附子沉香升麻華隂細辛各一兩右為細末每用二錢水一大盞同煎至三兩沸去滓溫潄冷吐誤咽不妨不拘時候日用三四次地黃膏治骨槽風痛齗腫齒宣露齒根挺出時膿血不止生地黃梧桐淚白礬各半兩麝香一分右為極細末與生地黃汁相和勻於銀器中以文武火慢慢煎成膏臨時以藥於齒齗上塗之有津即咽每用一匙食後臨卧一方治牙癰腫塞口噤而不能開附子黃連礬石一兩右為末內口中有如口噤不能開者須用銀筯撬開將藥以蘆管細細吹入咽喉中即蘇醒治骨槽風牙疼腫用桔梗為末棗瓤和丸如皂子大綿裹咬之腫則荆芥湯潄之治骨槽風熱牙齒疼痛不可忍滿口牙齒俱動宜用此方去熱毒後喫齒痛方細辛羌活荆芥穗防風大黃繭草川芎各一分右為細末每服三錢以熱湯調熱含冷吐如此使兩三次後喫後方茵陳散治骨槽風熱及一切牙齒疼痛至坐卧不穩痛不可忍麻黃荆芥穗升麻黃芩羌活獨活牡丹皮薄荷連翹茵陳射干大黃殭蠶半夏各一分細辛半分牽牛一分右細杵羅為末每服三錢水一盞先煎湯熱下藥末攪一攪急㵼出食後臨卧和滓熱服普濟方卷六十九
