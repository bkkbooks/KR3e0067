甘草二兩芍藥六兩右㕮咀以水八升煮取三升去滓內糖八兩煮二服分三服後用黃耆人參各二兩名黃耆建中湯治肺寒損傷氣咳及涕唾鼻塞語聲嘶塞喘憊止氣嗽通聲棗肉三升研作膏杏仁一升熬研為酥生薑汁白糖白蜜生百部汁各一升右和合微火煎常攪約一炊久下之細細溫清酒服二合日二一方有甘草五加皮團參黃耆散治肺虛熱咳嗽氣急胸中煩悸支體倦痛口燥咽乾情思不樂多唾涎沫或有惡物肌瘦發熱減食嗜臥並宜服之好人參好黃耆各二兩甘草一兩右為細末每服二錢水一盞煎至六分加生薑三片棗肉一枚同煎溫服不拘時平肺湯治肺虛有熱黃耆一兩芍藥一兩半半夏一兩一錢人參甘草各半兩右為細末每服四錢以水一盞半加生薑五片棗二枚餳一塊煎至八分去滓溫服食後金露散出十便良方平順肺氣人參白术五味子各三分甘草一分右為細末每服二錢不以時白湯點下益肺散出十便良方調益肺胃收斂榮衛糯米炒阿膠黃耆各一分右為細末每服二錢以鹿角膠煎湯調下非時鍾乳圓出十便良方治肺虛寒嗽不已鍾乳粉二兩人參白术乾薑甘草各二兩紫苑欵冬花各一兩右為末蜜和丸如彈子大每服一丸含化利肺湯出濟生拔萃方脈中少有力浮則似止胸中元氣不及是也人參麥門冬沉香白豆䓻五味子益智丁香川芎各等分右㕮咀每服七錢用水一盞半生薑三片煎至八分去滓溫服食後欵冬花膏出楊氏家藏方治肺氣虛寒咳嗽不止痰唾併多或吐血勞嗽並皆治之欵冬花紫苑百部已上三味各一兩人參去蘆頭甘草炙白术三味各一兩乾薑二兩炮右件為細末煉蜜丸每一兩作一十五丸每服一丸含化食後臨臥補肺湯出炮氏方治肺虛寒逆滿上咽中悶塞寒從背起口如含霜言無聲音舌本乾吐沫唾血不能食欵冬花一兩桂心一兩桑白皮四兩人參一兩紫苑茸一兩白石英一兩五味子一兩半麥門冬二兩鍾乳一兩半右為散每服四大錢薑五片棗三枚米一撮煎食前初病時右肩臂膊痛無主持不能舉動汗多出肌肉瘦不能正臥臥則痛甚經言汗出偏沮使人偏枯豫思內經云虛與實鄰決而通之又言留瘦不移節而刺之使經絡通和血氣乃復又言陷下者灸之為陽氣下陷入隂中肩膞時痛不能運動以火導之火引而上補之溫之也上證皆冝灸刺謂皆先刺十二經井穴四月十二日於右肩臂上井穴內先針後灸六七壯至瘡發微於枯瘦處添肌肉汗少出肩臂微有力至五月初八日再炙肩井次灸尺澤穴各二十八壯引氣不行與正氣相接次日臂膞又添氣力自能動搖矣時值仲夏暑熱微盛以清肺飲子補肺氣養脾胃定心氣清肺飲子出衛生寶鎰方天門冬去心三分麥門冬去心三分人參四錢甘草二錢生白芍藥五錢陳皮去白二錢半黃芩二錢升麻柴胡甘草炙黃蘗汗多加黃耆三錢右件㕮咀都作一服水二盞煎至一盞去滓溫服食後審平湯出衛生家寶方治肺氣不足寒邪留滯上氣喘急咳嗽無時人參木香半夏生用阿膠炒成珠子瓜蔞連子炒熟紫苑洗淨各一錢五味子一兩炒欵冬花去皮梗真紫蘇子苦葶藶銼一錢陳皮去白半兩甘草炙桂心乾薑炮製一兩右為粗末每服稱半兩用水二大盞入薑十片慢煎至半盞去滓放溫細細呷不拘時候八物湯出保命治集方心肺虛損皮聚而毛落血脈虛損婦人月水愆期宜益氣和血白术人參黃耆茯苓川芎熟地黃當歸芍藥各等分右粗末每服五七錢水一盞煎至七分去滓食後溫服治肺虛寒出本草以覆盆子取汁作煎為果仍少加蜜或熬為稀湯點服治心肺虛熱并虛勞客熱出本草取麥門冬作膏熟水飲利肺氣和中明目止痛出本草用薺尼􅀢蒸切作羮粥食之虀爼亦得潤肺出本草以枇杷子食之潤肺治氣出本草取苧麻汁煮粥食之澤膝湯出本草治肺咳上氣脈沉者澤膝三斤以東流水五升煮取一斗五升然後用半夏半升紫參生薑白煎各五兩甘草黃芩人參桂各三兩八物㕮咀之內澤膝汁中煎取五升每服五合日三至夜盡服療丈夫心肺中虛風乃客熱膀胱間連脅下時有氣妨皮膚瘙癢癮疹飲食不多日漸瘦損常有憂愁心忪少氣出本草此方春生莎草苖及花隂乾入冬採根切貯於風涼處有患前病者取苖二十餘斤銼以水二石五升煮取一石五升於浴斛中浸身令汗出五六度浸兼浴其肺中風膚癢即止每歲四時常用則癮疹風永差其心客熱膀胱間連脅下氣痛每日憂悶不樂兼心忪者取根二大斤煮熟令香以生絹袋盛貯於三大斗無灰清酒中浸之春三月浸一日即堪服冬十月後即七日近暖處乃佳每空腹服一盞夜三四服之常令酒氣相續以醉為度若不飲酒即取根十兩加桂心五兩蕪荑三兩和搗為散以蜜為丸搗一千杵如桐子大每空腹以酒及薑蜜湯飲汁等下二十丸日再服漸加至三十丸以差為度助肺氣去胃家風消穀不化者出本草以魴魚和芥子醬食之治肺病用丹黍米作粥飲食之丹黍米是肺之穀肺病宜食之普濟方卷二十六
