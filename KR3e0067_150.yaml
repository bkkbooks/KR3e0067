大作一服或脾積七十為丸服藥煎水送下去臟腑一二行溫稀粥阻住㵼痢加肉豆䓻煎一方鄉村無藥處薑蔥豆䜴煎湯熱服被蓋汗出即愈無汗再服汗後避風半日度瘴發汗青散出千金方治傷寒嫩色惡寒發熱頭疼項強體疼麻黃三兩半桔梗細辛吳茱萸防風白术各一兩烏頭乾薑蜀椒桂心各一兩六錢右搗篩溫酒服方寸匕溫覆取汗止若不得汗汗少不解復服如法若得汗足如故頭疼發熱此為內實當服駃豉丸若雚氏丸如得頭重者可以二大豆許內鼻孔中覺癢涕出一日可三四度必愈兼辟時行病升麻消毒散出德生堂方專治天行瘟疫毒氣上攻頭目耳項俱腫等證其證因傷寒感冒瘟疫不正天行毒氣成大頭之病增寒壯熱先從耳前後微腫疼痛逐漸發腫連咽喉頭項赤腫名曰大頭風又名洗頭雷風等風腫病者形貌變異大頭大如栲栳其病傳染諸人如醫卜僧道切不可貪財恐藥染疾患者之家亦當戒慎如瘟疫與小兒痘瘡證避忌不得煎灼燒炙魚肉及房色血糞厭穢宜潔淨房舍灑掃焚香禱告神天祈福保安豫初聞之頗似可笑留京都既久屢曽親見而存心正㕮咀水煎服若急汗熱服以薑投之若緩汗溫服而不用湯投之也脈浮而不解者先急後緩脈沈而不解者先緩後急九味羌活湯不獨解利治雜病有神中風行經者加香附子中風祕塞者加大黃風熱濕并三者合而成痺等證各隨十二經上下內外寒熱溫涼四時六氣加減補㵼用之煉蜜作丸亦可加生地黃兩半治兩感傷寒如神用豆淋酒煎治破傷風太陽經傳裏傷寒胸中有熱胃有邪氣傳陽明本也腹中痛欲嘔者熱在內也宜黃連湯甘草黃連乾薑人參各七錢半大棗三枚右銼細每服五錢水煎服發熱惡寒自汗脈緩發熱惡風無汗脈緩此二證易老元用桂枝二麻黃一湯後亦改用九味羌活湯無論有汗無汗悉宜服之治傷寒唇緊用鱉甲及頭燒灰作末傅之治傷寒大熱悶心煩用槐木子燒存性為末酒服方寸匕治汗不溜瘦却腰腳并耳聾用荆三稜米醋浸夏月浸四日冬月浸六日杵為末醋湯調下三錢治汗後迷亂者用敗扇燒為末和粉身上法發汗法出活人書凡發汗欲令手足俱周濈濈然一時許為佳不欲如水淋漓服湯中病即已不必盡劑然發汗須如常覆腰以上厚衣覆腰以下蓋腰以上淋漓而腰以下至足心微潤病終不解凡發汗病證仍在者三日內可二三汗之令腰腳周遍為度一法無藥處可用兩手指相交緊叩腦後風府穴向前禮百拜汗出自解出神效方蔥白爛研二兩生薑細切一兩豉一合搗碎細茶末二錢右先以水二盞煎蔥并薑至一盞半次下豉煎少時即入茶末去滓頓服厚衣蓋覆取汗茵陳丸治瘴氣時氣及黃病痎瘧等方茵陳梔子仁鱉甲炙芒硝各二兩大黃五兩豉五合熬令香常山杏仁去皮尖雙仁炒各三兩巴豆一兩去心皮熬右搗篩蜜和為丸初得時氣三日內平旦飲服每服一丸如梧桐子大如人行十里久或吐或汗或利如不吐及不利不汗更服一丸五里久不吐利汗則以熱飲投之老小以意量減黃病痰癖時氣傷寒痎瘧小兒驚熱欲發癎服之無不瘥者療瘴特神驗有人赤白痢者服之亦差春初有宿熱依上法服之取吐利當年不憂熱病忌莧菜蘆笋野豬肉生蔥生菜一方出肘後方治時氣垂死破棺用大錢百文水一斗煮取八升內麝香當門子郁李子二味稍稍與飲至盡或汗或吐和解散出傳信適用方治感風中暑感寒表裡未辨頭痛惡心發熱煩疼不進飲食常服正氣除寒邪辟瘟疫不問老小皆可服蒼术洗淨厚朴製桔梗去蘆頭甘草炙神麯炒麥蘖炒川芎陳皮去白炒赤茯苓各四兩藿香葉柴胡去蘆頭當歸洗赤芍藥半夏麯各二兩前胡洗去户一兩右為粗末每服四錢水一盞半薑三片棗一箇煎至七分去滓服不拘時候桃葉湯出本草治辟瘟疫薰身法用水一石煮桃葉取七斗以厚鋪席自圍衣被蓋上安桃葉湯於牀簀下乘熱自薰停少時當汗汗遍去湯待歇束粉之并炙大焦則愈陳廩邱蒸法經云連發汗不出者死者可蒸如中風法以問張苗苗曽有疲極汗出卧單簟中冷但苦寒倦四日凡八日過發汗不出燒地排葉蒸之則得大汗被中傅粉極燥便瘥後用此發汗得出蒸法者燒地良久掃除法大可以水灑取蠶沙若桃葉柏葉粳及麥麩皆趣用易得者牛馬糞亦可用但臭耳取桃葉欲落時可多收乾之以此等物著處令厚二三寸布席坐上溫覆用此汗出若過熱當審細消息大熱者重席汗出周身便止濕粉乏勿令過此法治時氣瘴疫用柏木枝取社中西南上木東南枝不以多少暴乾搗羅為末以水調下一錢匕日三四服去心腹煩熱天行瘟瘴以水磨陳家白藥服之時氣疫癘論夫人居天地之間稟氣於隂陽氣和則安氣盩則病故一歲之內節氣不和寒暑乖候皆為疫癘之氣感而為病故名疫癘其狀無問長少率皆相似俗又名天行其病與時氣溫熱等病相類治各隨其證以方制之又詩曰四時疫癘會應難老幼調停總一般夏責於心冬責腎季脾秋肺與春肝又論云疫癘春感清升麻葛根湯解肌湯夏感寒理中湯麝香湯半夏桂甘湯秋感熱白虎加蒼术湯發黃疸者茵陳五苓散冬感暖而病曰冬溫萎㽔湯四時通用敗毒散升麻菖根湯土無正行因火而名當隨其症而取之方牛黃七寶膏治傷寒時疫熱毒暑病心胸痞塞或發黃斑狂躁迷悶及久經取轉不效溫毒滯積潮熱牛黃龍腦麝香半錢硃砂二錢半輕粉以上并研白麵各半兩寒水石燒通赤三兩半右同研勻滴水和作二十丸每服一丸澄清水化小兒半丸不拘時候聖散子治傷寒時行疫癘風溫濕溫不問隂陽兩感表裡未辨或外熱內寒外寒內熱頭項腰脊拘急痛發熱惡寒肢節疼痛嘔逆喘咳鼻塞身重及食飲生冷傷在胃脘滿悶腹肋脹痛心下結痞手足逆冷腸鳴泄㵼水穀不消時自汗出小