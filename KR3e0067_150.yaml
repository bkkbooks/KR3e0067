乾嘔逆煩渴麻黃去節肉桂去粗皮蒼术去皮川大黃乾葛石膏山梔子去皮各一兩半木通瞿麥甘草川芎各一兩前胡川烏頭炮去皮藿香各半兩右為粗末每服二錢水一盞入林擒糝十糝數片新者亦得煎至七分去滓稍熱服不拘相次再服蓋覆汗出為度一方有當歸柴胡石膏散一名柴胡升麻湯出劑方治時行瘟疫壯熱惡寒頭痛體疼鼻塞咽乾心胸煩滿寒熱往來痰實咳嗽涕唾稠粘赤芍藥柴胡去苗石膏研前胡去苗乾葛各五十兩升麻二十五兩黃芩桑白皮各三十七兩半荆芥穗三十七兩右為粗末每服二錢水一盞薑三片豉十餘粒同煎七分去滓熱服小兒分三服更量大小加減不拘時候玉屏風散出人存方治腠理不密易感風寒頭昏眩甚則痛項強肩背拘急噴嚏不已鼻流清涕接續不斷經久不愈氣虛人不宜發散常服效方見兩感傷寒門雜治類同三味黃茋湯五積交加散出永類鈴方治內感風寒上膈藴熱及作痎瘧生料五積散人參敗毒散二料各等分右和勻每服四錢水一盞薑五片棗三枚煎至七分溫服無時香芎散出百一選方治風傷感寒發散表邪香附子炒去皮六兩川芎銼藁本去蘆四兩橘皮去白各二兩甘草一兩半炙右為細末每服三錢水一盞生薑三片煎至七分溫服無時香芎散出傳信適用方治感寒風傷鼻塞頭痛及時行瘟疫老幼皆可服香附子炒去皮六兩川芎香白芷甘草炙各二兩藿香葉四兩石膏研如粉三兩右同為細末每服一大錢熱茶調下不拘時候一方熱酒下蔥豉湯治疫癘始得頭疼壯熱蔥白二莖細切䜴一合蜀椒四十九粒去目并閉口炒出汗右粗搗篩以水三大盞煎至二盞去滓頓服汗出差未愈更煎服七物赤散治傷寒辟毒氣疫病丹砂炮熱研烏頭炮製去皮臍各二兩細辛去苗葉羊躑躅乾薑炮製研白术切炒各一兩栝樓一兩半右搗羅為散每服半錢匕溫酒調服汗出解不解增至一錢匕普濟消毒飲子出誡神方時毒治驗泰和二年先師以進納監濟源稅時四月民多疫癘初增寒體重次傳頭面腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭天行親戚不相訪問如藥之多不救張縣丞始亦得此病至五六日醫以承氣加藍根下之稍緩翌日其病如故下之又緩終莫能愈漸至危篤或曰季明之留心於醫可請治之遂命診視具説其由先師曰夫身半以上天之氣也半身以下地之氣也此邪熱客於心肺間上攻頭目面為腫盛以承氣湯下之㵼胃中之實熱是誅罰無過殊不知毒氣結于上焦也遂處方用黃苓黃連味苦寒㵼心肺間熱以為君橘紅苦平玄參苦寒生甘草甘寒㵼火補氣以為臣連翹鼠粘子薄荷葉苦辛平板藍根味苦寒馬勃白殭蠶味苦平散腫消毒定喘以為佐新升麻柴胡苦平行少陽陽明二經不得伸桔梗味辛溫為舟楫不令下行共為細末半用湯調時時服之半蜜為丸噙化之服盡良愈因嘆曰往者不可追來者猶可及凡他所有病者皆書方以貼之全活甚衆時人皆曰此方天人所制遂刋於石以傳永久黃芩黃連各半兩人參三錢橘紅去白玄參生甘草各一錢連翹黍粘子三錢板藍根馬勃各一錢白殭蠶炒七分升麻七分柴胡二錢桔梗二錢右為細末服餌如前法或加防風薄荷川芎當歸身㕮咀如麻豆大每服五錢水二盞煎至一盞去滓稍熱時時服之食後如大便硬加酒煨大黃二錢或三錢以通利之腫勢甚者冝砭刺之雙解散出朱氏集驗方解四時傷寒疫癘風溫濕溫不問隂陽二證表裏未辨發熱惡寒頭疼項強腰背拘急肢節疼痛嘔吐喘嗽鼻塞聲重目睛疼眩煩躁引飲往來寒熱已經汗下病熱愈甚用藥錯誤壞證惡候及不伏水土山嵐氣瘧疾婦人血虛發熱凡室女小兒老人並宜用之人參白术茯苓升麻各一兩乾葛白芍藥甘草各二兩半陳皮不去白二兩香附子炒去毛二兩紫蘇葉二兩半右㕮咀每服三錢水一盞生薑五片棗二枚煎至七分通口服如要出汗加蔥白三寸淡豉十四粒連投二三服略以被覆汗出立效不拘時候如春夏加藁本白芷各一兩此藥乃四君子湯升麻湯香蘇散合為一四君子湯主氣升麻湯解肌散退熱解表香蘇散助二藥之表裏此藥性稍涼有熱者宜服之居南方瘴地或冬多愆陽當併服助效若體怯有寒及壞證已虛者恐亦難用大抵有虛寒人只服人參多亦能助寒有虛熱人只服白术多亦能增熱此藥有乾葛升麻香附子之類性寒為多自當審之加減參蘇飲出後生家室方治時氣瘟疫四時傷寒頭痛壯熱惡風無汗香附子一兩炒去毛陳皮一兩浸去穰甘草炙三分紫蘇一兩去梗麻黃一兩去節蒼术半兩清米泔浸三宿去皮乾稱桔梗一分去蘆頭右為粗末每服四錢水一盞煎至七分去滓溫服不拘時候神應散出朱氏集驗方治四時瘟疫傷寒茯苓甘草黃芩地骨皮右各等分白水煎服不過數服而愈宣和間王煥疫疾神以王有隂德以此方授之蒼术散出朱氏集驗方截四時傷寒瘟疫蒼术半斤炒麻黃一兩半去節杏仁二兩去皮尖炒甘草二兩炙右為細末每服四錢沸湯調服不拘時候升麻葛根湯出經驗良方治大人小兒時氣瘟疫頭痛發熱肢體煩疼及疹瘡疹已發疑二之間並宜服之今人妄議升麻乾葛根有寒涼之性不宜服餌謹按本草升麻上品上藥味甘平解百毒辟瘟疫瘴癘邪氣治小兒風聲時氣熱疾風壅癰腫豆瘡鬼附啼泣葛根中品之上藥也味甘平主消渴身熱嘔吐療傷寒中風頭痛解肌發表出汗解酒毒芍藥味苦最平益氣通順血脈強五臟補腎氣又能治風補勞甘草上品之藥也四者合和何寒之有故并述之升麻葛根白芍藥甘草各等分右為粗末每服三四錢水一盞半煎至一盞去滓稍熱服日二三服以病身清涼為度小兒量歲數加減服一方加桂順解散出楊氏家藏方解傷寒瘟疫身體壯熱頭疼項強四肢煩疼惡風無汗蒼术麻黃去節等分右㕮咀每服二錢水一盞入蔥白薑溫服柏枝湯出經驗良方治天氣不和瘟疫流行可預備之以柏樹東向葉乾搗為末或湯或酒服一錢神效治天行時氣瘟疫出本草以臘雪水溫服之解瘟病發熱出本草取生葛搗汁飲之時氣雜病方梔子仁湯治時氣頭面赤腫鬱金枳殼升麻各一兩梔子仁牛蒡子大黃各一兩右為末每服三錢蜜水調下葛根牛蒡子湯治時氣大頭病葛根管仲甘草鹽豉牛蒡子各一兩右為細末每服三錢用水調下此疾近代患者傳染多致夭枉治之者少得方法只云大熱使然不知亦有虛實表裏治之者汗下吐不同大抵與傷寒頗類其中亦有可針鎌砭血射出者亦有日久而敗爛出膿者其間變易多端不可不愼所宜時候也治大頭病兼治疫瘴方歌曰出神效方人間治疫有仙方一兩殭蠶三大黃薑汁為丸如彈大芫花調蜜便清涼又方出神效方以砭針刺腫處出血立效治時氣出神效方馬牙硝寒水石黍粘子鬼臼川大黃鬼箭草各等分腦子少許右為細末用井花水調用雞翎掃在腫處有風涼處坐金露散治時氣熱毒黃蘖一兩白芨白蘝雄黃各一錢半寒水石生一兩半右為細末無根水調以紙花子貼或刷亦妙人參葛根湯治時表不解壯熱惡寒人參乾薑銼白芍藥桔梗炒各一兩甘草炙銼木香各半兩麻黃去根節一分右粗篩每服三錢匕水一盞煎至七分去滓熱服併三兩服溫覆出汗資壽清膈湯一名真湯出簡昜方專一發散四時不正之氣及傷寒未分證候瘡疹欲出未出並宜服之又療脾寒似瘧潮熱往來壯如蒸兩耳黯唇青面色黧黑口苦舌乾四肢倦怠飲食無味苦桔梗荆芥穗薄荷葉乾葛甘草節瓜蔞根牛蒡子各等分右並無炮製為粗末每服三錢水一盞煎至七分去滓不拘時候日進三五服萬金散解時氣傷寒和表裏大效桔梗川芎前胡蒼术枳殼蜀椒六兩甘草三兩右㕮咀每服三錢水一盞半薑五片煎至八分熱服併進三服汗出即愈檳榔湯出經驗方少府監韓正彥嘗暴得疾手足不能舉諸醫皆以為中風針刺臂腿不知痛孫兆以為時氣令服此湯乃愈檳榔不拘多少右為細末用三錢匕生薑三片乾紫蘇七葉陳皮去白者十片水一盞煎至六分去滓稍熱服神效散出衛生家室方治四時傷寒時氣蒼术麻黃去節稱甘草右等分為粗末每服五錢水一大碗煎至半碗去滓溫服兩服滓再煎作一服不拘時候安即住治一切天行出本草取白藥研如麵漿水一大盞空腹頓服之便仰卧一食頃候心頭悶亂或惡心腹內如車鳴刺痛良久當有吐利數行勿怪欲服藥時先令煮漿水粥於井中懸著待冷若吐利過度即喫冷粥一碗止之不喫即困人主天行時氣出本草用含水藤葉煮汁服之治時行病起合隂陽埀死者出本草以白馬屎絞汁溫服之或煮粥溫服之最良治天行時氣出本草以千金藤煎服療時疫隂囊及莖熱瘡出本草以羊屎煮汁灌之乃煮黃柏等洗之治時氣出本草以蜆糟煮食之良治時氣不和以葈耳舉家服之治春夏天氣不和以䜴蒸炒以酒漬服之至佳主時行病後食勞出本草取飯籮燒灰服方寸匕米飲調下普濟方卷一百五十一
