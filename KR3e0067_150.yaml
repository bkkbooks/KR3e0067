body:
  text: 普濟方卷一百五十一明周王朱橚撰時氣門時氣令不相染易論凡時行溫疫皆四時不正之氣感而病者長少率相似病苟不辟除多致傳染宜有方術預為之防又云此病皆因歲時不和溫涼失節人感乖候之氣而生病則病氣轉相染易乃至滅門延及外人故須預服藥及為方術以治之方麻黃散出聖惠方治時氣相染易者即須回避將息飲食之類不得傳食但一受病全家不安有此相染麻黃去根節桔梗去蘆頭桂心乾薑炮製銼防風去蘆頭川大黃銼碎微炒各三分川烏頭炮製去皮臍吳茱萸湯浸七遍焙乾微炒川椒去目及閉口者微炒去汗各一分右為散每服空心以溫酒調下二錢烏頭散出聖惠方治時氣轉相染易不止川烏頭炮製去皮臍獺肝酒浸微炒各一分川升麻川大黃銼碎微炒川朴硝細研各三分龍腦半分細研柴胡二分去苗右為散入龍腦朴硝同研令勻每服空心以溫酒調下一錢雄黃丸出聖惠方治時氣轉相染易乃至滅門傍至外人無有不著者雄黃一兩細研赤小豆炒熟丹參鬼箭羽各二兩右為末煉蜜和丸如梧桐子大每服空心以溫水下五丸可與病人同牀傳衣不相染也硃砂丸出聖惠方治時氣轉相染著延及外人不敢視者硃砂細研水飛過雄黃細研水飛過赤小豆炒熟各二兩人參去蘆頭鬼箭羽各一兩右為末鍊蜜和丸如小豆大每服空心以溫水下五丸可與病人同牀傳衣不相染也治時氣熱毒令不相染易出聖惠方豆豉一升伏龍肝三研細童子小便三中盞右相和煎取一中盞半去滓分為三服每平旦一服令人不著瘴疫治時氣溫毒令不相染易出聖惠方右於正月取東行桑根粗如指者長一寸以硃砂塗之懸於門上又令人帶之一方無硃砂敗鱉散出聖濟總録辟時氣溫疫令不相染敗鱉酥炙半兩梔子仁大青羚羊角鎊芍藥馬牙硝前胡去苗紫苑去苗各一分右粗篩每服五錢以水一盞半煎至八分去滓溫服食前服絶瘴散出聖濟總録辟時氣疫癘麻黃去節桂去粗皮升麻細辛去苗乾薑炮白术附子炮製去皮臍防己防風去叉桔梗蜀椒去目并閉口炒出汗芎藭右為細末每服二錢空心溫服酒調下一方用烏頭赤小豆丸出聖惠方辟傷寒溫疫瘴令不相染方見本門瘴疫類鬼箭羽丸同五味治溫疼氣出本草以蚺蛇肉作鱠食之辟癘方出本草正月之節食五辛以辟癘氣服一日薑辟溫湯辟時病溫癘甘草大黃各二兩皂莢一錢並生用右細銼用水二􅊦煎至一盞去滓空心熱服至晚下惡物為效真珠散一名辟溫病散出聖濟總録治辟溫疫癘真珠研桂去粗皮各一分雞子二枚去殼炒令黑色研貝母去心半兩杏仁湯浸去皮尖雙仁炒三分右為末再同研勻歲旦溫酒調下一錢若歲中人多病者可旦望服之如遇時行病即不拘時候效一方無杏仁羌活湯出聖惠方治時疫更相傳染宜預服但一切人間得病氣無有不著病已前宜喫此方羌活去蘆頭桂去粗皮芎藭牡丹皮柴胡去苖桔梗炒升麻荆芥穗玄參甘草炙銼麻黃去根節木香各一分吳茱萸湯浸焙乾炒一錢牽牛炒半兩右粗搗篩每服五錢以水一盞半煎至八分去滓溫服不計時候蒼耳散出聖惠總録治辟溫疫癘真珠研桂去粗皮各一分雞子二枚去殼炒令黑色研用蒼耳重午日採暴乾三兩搗羅為散每服二錢空心井華水調下辟時行瘟疫癘瘴出千金方用蕪菁不限多少搗取汁立春後遇庚子日闔家大小各溫服一二􅊦流金散出千金方辟瘟疫時氣方見本門瘴疫類雄黃散五味同燒木法出千便良方凡胃中暑熱時或久雨以蒼术合皂莢燒辟溫疫邪溫氣辟溫病出本草用菘菜切如粟酒服方寸日三匕辟五年溫雌黃丸出聖濟總録辟溫疫去百惡雌黃研雄黃研龍骨蝟皮龜甲鯪鯉甲各二兩虎骨羖羊角鎊芎藭各二兩空青半兩研樗雞七枚真珠三兩研右為末再同研勻鎔蠟和丸如彈子大正旦户前燒一丸男女左右繫一丸於臂上遇時行亦依此用辟溫疫時氣塗傅出千金方雄黃二兩研丹砂研菖蒲切鬼臼各一兩右為末同研勻以水調塗五心及額上鼻中耳門辟溫甚驗辟溫丸出聖濟總録治傷寒疫癘傳染及頭目昏重項膂拘急胸膈不通玄參炒五兩蒼术炒三兩芎藭炒白芷炒羌活去蘆頭生用甘草炙銼烏頭炮製去臍各安息香一分龍腦麝香各半分研右除腦麝外搗羅為細末入腦麝拌勻粟米粥為丸彈子大隂乾紗袋盛安近火處每服一丸時疾生薑蜜水磨下隂毒面青用熱水磨下調中丸出聖濟總録辟四時疫癘非節之氣大黃五兩銼炒麻仁别研枳殼去瓤麩炒白茯苓去黑皮芍藥前胡去蘆頭黃芩去黑心各一兩右搗研為末煉蜜和丸如梧桐子大每服十五丸食後飲下微利為度日晚卧服之佳屠蘇酒一名屠蘇飲出千金方嵗旦辟疫氣令人不染溫病及傷寒大黃桔梗蜀椒各汁五銖白术桂心各十八銖烏頭六銖菝葜卜二銖一方用虎杖一兩一錢無菝葜右㕮咀絳袋盛以十二月晦日中懸沉井中令至泥正月朔日平曉出藥置酒中煎數沸於東向户中飲之屠蘇酒待三朝還滓置井中能仍嵗飲可世無病當家內外有井皆悉著藥辟溫氣也一方有防風一兩粉身散出千金方辟溫病常用芎藭白芷藁本右研下篩內和米粉粉身殺鬼燒藥方出千金方辟溫氣雄黃丹砂雌黃各一斤羚羊角蕪荑虎骨鬼臼鬼箭羽野丈人石長生猳豬屎馬懸蹄各三兩菖蒲青羊脂白术各八兩蜜蠟八升右為末以蜜蠟和丸如彈子許朝暮及夜中户前微火燒虎杖頭殺鬼丸辟溫方出千金方虎杖頭五兩硃砂雄黃雌黃一兩半鬼臼白莢蕪荑各一兩右為末以蜜蠟和丸如彈子大絳袋盛繫臂上男左女右懸屋角晦望夜半中庭燒一丸辟溫殺鬼丸出千金方董百鬼惡氣雄黃雌黃各二兩羚羊角虎骨各七兩龍骨龜甲鯪鯉甲蝟皮各三兩樗頭十五枚空青芎藭真珠各五兩東門上雞頭一兩右為末羊蠟二十兩并和丸如彈子大正旦門户前燒一丸帶一丸男左女右辟百惡宿弔喪問疾家各吞一丸小豆大天隂大霧日燒一丸於牖前佳赤散出千金方辟溫疫氣傷寒及熱病藜蘆躑躅花各一兩牡丹皮皂莢各一兩六錢附子桂心真珠各六兩細辛乾薑各十八銖右為末內真珠合治之分一方寸置絳囊中帶之男左女右著臂自隨覺有病之時便以粟米大內著鼻中又酒服一錢覆取汗日三服當取一遍汗斷溫病令不相染著出千金方以汲水瓶一長七寸溫著病人卧席下良又方出千金方以繩度所著户中壁屈即絶斷之主天行時氣鬼魅邪精等出本草以瓶香燒之治溫病令不相染出千金方用桃樹中蟲屎末之以水調服方寸匕又方出千金方用新布袋盛赤豆一升內井中三日出舉家服二七粒一方男十枚女二十枚又方出千金方用松葉為末以酒服方寸匕日三服辟五年溫又方出千金方常以七月七日合家男吞大豆七枚女吞小豆二七枚向日亦佳一方合家向日吞赤小豆二七枚斷瘟疫轉相染著及至滅門延及外人無收視者出千金方赤小豆鬼箭羽鬼臼雄黃各二兩右為末以蜜和服如小豆一丸可與病人同床傳衣治溫病令不相染出千金方用新布袋盛大豆一升內井中一宿出服七枚一方用黑豆治溫疫出千金方用藥子二枚末水服之又方名辟溫方出千金方用白蜜和上色硃砂粉一兩以太歲日平旦大小勿食向東方立吞服三七丸如麻子勿令齒近之并七小枚投井中終身勿忘此法剛繁辟溫病粉身散常用方芎藭四兩藳本逺志白术各四兩米粉一斗研右搗篩四物為散和米粉粉身若欲多時加藥增粉用之干敷散一名干散出肘後方主辟瘟疫惡疾令不相染著氣方肘後作敷干抱朴子作敷下附子一枚一分者炮製細辛乾薑麻子研柏實各一分右為散正旦舉家以井華水各服方寸匕服藥一日十年不病二日二十年不病三日三十年不病受師法但應三日服歲多病三日一服之忌豬肉殺鬼丸胡洽延年方雄黃硃砂研鬼臼鬼督郵雌黃馬兜鈴皂莢炙虎骨阿魏桃白皮菖蒲石流黃研各五兩甲香白膠香各一兩羚羊角屑蠟蜜八斤煉右搗篩十六味蠟蜜和丸如彈子大往辟溫處燒之殺鬼去惡若大疫家可燒并帶行忌生血物羊肉餳治時疾疫出肘後方用馬蹄末屑二兩絳囊帶之男左女右蘇合香丸出鮑氏方凡入溫疫家先令開啓門户以大鍋盛水二斗於堂心用二十丸煎其香能散疫氣久病者各飲一甌後醫者却入診視不致相染辟時疫不相染方出千便良方以冬至前後取沙牛膽將小顆黑豆著向內又不得傾膽水出任令滿以綿繫於當風處候乾收之若遇時疫動即朝起取膽內豆子七箇井華水服之即不相染或云服則明目兼療內障眼辟妖法出千便良方李畋該聞集云爆竹辟妖氣鄰人有仲叟家為􅀢所祟擲瓦石開户牖不自安叟求禱之以佛經報謝而妖祟彌盛畋謂其叟曰翁日夜於庭落中若除夕爆竹數十竿叟然其言爆竹至晚寂然安遂伏度瘴散出肘後方辟山瘴惡氣若有黑霧鬱勃及西南溫風皆為疫癘之候麻黃椒各五分烏頭三分細辛乾薑各八分防風桔梗桂右搗篩為末平旦酒服一錢研辟諸毒惡氣冒霧行宜服辟天行疫癘出肘後方雄黃丹砂巴豆礬石附子乾薑右各等分搗為末蜜丸平旦向日吞一丸如胡麻子大九日止令無病常用溫病散出肘後方真珠肉桂各一分貝母熬雞子白熬黃黑各三分右搗為末嵗旦服方寸匕嵗中多病可用朔望服之有病即愈人服者當可大效一方有杏仁趙煮膏方出肘後方大黃附子細辛乾薑桂各一兩巴豆八十枚去殼右搗細苦酒漬之宿臘月豬膏二斤煎至三上三下絞去滓密器貯之初覺勃色便熱服如梧桐子大一丸不差又服亦可火灸以摩身體數百遍佳并治賊風走逰皮膚並良可預合之一方椒一兩單行方術出肘後方用西南社中柏東南枝取暴乾為末服方寸匕立差一方酒服又方出肘後方取正月上寅日搗女青屑三角絳囊貯繫户上大吉又方出肘後方取正月朔望日及七日吞麻子大豆各二七枚投井中又以附子二枚小豆七枚令女子投井中又方出肘後方取冬至日雄赤雞作臘立春煮食盡勿分他人又正月一日取東行桑根大如指懸門户上又令帶之一方長七寸用丹塗又方出肘後方右埋鵲於門前斷溫病令不相染著出肘後方取斷髮繩長七寸盜著病人卧席下辟溫疫邪濕氣出本草以皂莢合蒼术燒之又方出聖惠方右熬豉雜米酒漬服之又方出肘後方柏子仁細辛穄米乾薑三分附子一分右為末酒服方寸匕日服三服服十日又方出肘後方用鯽魚密置户下勿令知之又方出肘後方用麥蘖和穄米乾薑又云麻子可作三種服之治入瘟疫之家出三田方以雄黃末濃塗兩鼻清油亦可嚼蒜亦可飲酒更佳即不傳染與病人同床亦不相染初洗面後及卧時點之凡病家自生惡氣聞之即入上泥丸遂散百脈而成死病宜以紙撚探鼻嚏之為佳如以雄黃點鼻則自不聞氣并辟惡夢神良剛繁大青消毒散治天行三日外至七日不歇內熱令人更相染著大青乾葛梔子各四兩香豉八合熬綿褁芒硝三兩生乾地黃一升切右切以水五升煮諸藥味取二升五合去滓下芒硝分三服忌蕪荑酒蒜等物一方有石膏八兩務成子螢丸主辟疾疫惡風氣百鬼虎狼蛇虺蠆諸毒五兵百病盜賊凶害皆避之螢火鬼箭削去皮羽蒺藜各一兩雄黃雌黃礬石二兩羖羊角煆竈灰鐵錘柄八銖燒黑各二兩半右搗篩為散以雞子黃并丹雄雞冠一具和之如杏仁大作三角絳囊盛五丸帶臂仍更挂户上辟魔法出千便良方斗門方辟魔以雄黃一塊帶頭上妙辟溫疫出本草以艾納香燒之辟瘟疫出本草以臘月鼠向正旦朝所居處埋之去惡氣除病疫出本草以兜木香燒之去溫氣出本草以臘月夜令人持椒井傍無與人語納椒井中溫服此水辟惡去瘟疫病出本草以狐尾燒之或以雄狐屎燒之在木石上者是也黃龍湯出本草療瘟病垂死以空罌塞口內糞倉中積年得汁其汁甚黑而苦服之欲死即差主天行時氣宅舍怪異出本草降真香並燒悉驗仙傳云燒之或引鶴降醮星辰燒此香甚為第一度籙燒之功力極驗治瘟疫出木草五月一日取冢上土及磚石以瓦器中盛埋之著門外階下合家不患時氣又正月朝早將物取冢頭古磚一塊懸大門斷一年無時疫辟天行時疾出本草取釣樟莖葉置門上辟瘟疫法用熬豉和白术浸酒常服之一方無术用白米治斷瘟疫用上等硃砂一兩研以白蜜和丸如麻子大常以太嵗日平旦一家大小勿食諸物面向東立各吞三七丸永無疫氣辟天行瘟病及蛇蟲可將預知子帶之驅瘟癘用豹皮寢之法導引法出聖濟總録養生方云常以雞鳴時心存日滚神名三遍辟百邪正鬼令人不病瘟東海神名阿明南海神名祝融西海神名巨乘北海神名禺強又存念心中氣赤肝氣青肺氣白脾氣黃腎氣黑氣出周其身又兼辟邪鬼欲辟衆邪百鬼常存心為炎斗煌煌光明則百病諸邪不敢干之可以入瘟疫之中時氣勞復論夫時氣病新差血氣尚虛津液未復復以勞動便成病焉若言語思慮則勞傷於神梳頭澡洗則勞傷於力未堪勞而強勞之則生熱熱氣既還入經絡復為病者名曰勞復又病新差脾胃尚虛穀氣未復若食肥肉魚膾餅棗栗之屬則未能消化停積在於腸胃使脹滿結實因更發熱復為病者名曰食復病新差後但得食糜粥寧少食令飢慎勿飽不得他有所食雖思之勿與之也計日傳久可漸食羊肉白糜若美汁雉鹿肉不可食及豬狗肉也新差後常卧愼勿早起梳頭洗面非但體勞亦不可多言語用心使意勞復凡此皆令人勞復故督郵顧子獻得病已差未痊詣華敷視脈曰雖差尚虛未得復陽氣不足愼勿勞事餘勞尚可女勞則死當吐舌數寸其婦聞其夫差從百餘里來省之經宿交接中間三日發熱口噤臨死舌出數寸而死病新差未滿百日氣力未平復而以房室者略無不死有士蓋正者病愈後六十日已能行射獵以房室即過於向死者凡熱病房室名為隂陽易之病皆難治多死近者有一士大夫小得傷寒瘥已十餘日能乘馬行來自謂平復以房室即小腹急痛手足拘攣而死凡時病差後未滿五日食一切肉麵者更發又因時病差後新起飲酒及韭菜病更發時病新差後食生魚鮓下利必不止時病新差食生菜令顔色終身平復時病所差汗解飲冷水者損心胞令人虛不復時病新差食生棗及羊肉者必膈上作熱蒸時病瘥食犬羊等肉者作骨中蒸熱時病新瘥食魚肉與瓜生菜令人身熱一作腫時病新差食蒜膾者病發必致大困方鼠矢湯療患天行熱病差後勞復頭痛如初病者雄鼠屎三七枚熬湯成下乾薑二兩梔子十四枚擘蔥白一升豉八合右切以水三升煮取一升七合去滓內鼠屎末分溫二服服别相去如人行六七里微汗內消不利忌如前法枳實湯出活人書治患數日復勞復者枳實三枚炙梔子十四枚擘蔥白切一斤香豉半升鼠屎三枚右以水一斗煎至二升五合分溫三服别去如人行六七里進一服內消不利忌如藥法人參散出聖惠方治時氣後勞復虛熱四肢沈重或半起半卧氣力虛羸宜服人參去蘆頭一兩甘草炙微赤銼一兩石膏二兩赤茯苓二兩半夏湯洗七遍去滑一兩前胡去蘆頭一兩知母一兩黃芩二兩小麥一合竹葉一握右細銼和勻每服半兩以水一大盞入薑三片煎至五分去滓不計時候溫服鱉甲飲子出聖惠方治時氣後勞復發寒熱進退鱉甲塗醋炙令黃去裙襴前胡去蘆頭人參去蘆頭甘草炙微赤銼各三分生薑一分豉心一分蔥白七莖雄鼠糞十四枚右細銼和勻每服半兩以水一大盞煎至五分去滓不計時候溫服梔子仁散出聖惠方治時氣後數日已解勞復發者宜服梔子仁一兩蔥白十二莖豉一合雄鼠糞十四枚甘草半兩炙微赤挫麻黃一兩去根節枳殼一兩麩炒微黃去瓤右㕮咀令勻每服半兩以水一大盞煎至五分去滓不計時候溫服有微汗便愈治時氣熱氣解後復發頭痛如初病者宜服此方出聖惠方雄鼠糞三七枚杵末石膏二兩細研葛根二兩銼梔子仁半兩蔥白七莖豉二合右細銼和勻每服半兩以水一大盞煎至五分去滓不計時候熱服未汗再服陳橘皮散出聖惠方治時氣差後起早及食多勞復宜服陳橘皮一兩湯浸去白釀焙甘草半兩炙微赤挫雄鼠糞一兩豉一合檳榔一兩右為末每服三錢以水一中盞煎至六分去滓不計時候溫服豉心散出聖惠方治時氣後飲食過多脈候實數復發如初豉心二合雄鼠糞二七枚白术一兩川大黃二兩銼碎微炒梔子仁一兩木通二兩銼右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服蘆根飲子出聖惠方治時氣病差後勞復發熱嘔吐不下食蘆根二兩竹茹二兩人參二兩去蘆頭生薑二兩石膏四兩細研陳皮一兩湯浸去白瓤右銼和勻每服半兩以水一大盞煎至五分去滓不計時候溫服鼠矢湯出聖惠方治天行勞復兼治時氣後勞復身體疼痛壯熱雄鼠糞五枚兩頭尖去豉半合外臺作一升梔子仁五枚外臺作二十枚擘枳實五枚麵炒黃外臺作殼三枚中破一方用枳右銼碎以水一大盞半煮取一盞去滓分溫三服不計時候相次服外臺方五升水煮取二升四合分三服相去如人行十里久若覺大便澀加大黃三兩薄荷粥方出聖惠方治時氣勞復四肢煩疼宜服薄荷一握阿膠一兩杵碎炒令黃燥川升麻一兩豉心一合右細銼和勻以水兩碗煮去滓以粳作稀粥服厚覆取汗治時氣新差起早勞復及飲食過多復發欲死出聖惠方以鱉甲三兩醋塗炙令黃焦去裙襴搗羅為散每服三錢以粥飲調下不計時候服外臺方燒為末服方寸匕忌莧菜又方取所食物燒作灰細研每服以粥飲調下二錢治天行差後勞發此病復發或因起動勞役或因飲食稍多或因言語過分或緣視聽不節或為動轉不常皆成此復若復甚者乃至不救劇於初得病時不可以復發而生輕易勞復狀一如傷寒初有如此者冝合蔥白等七味飲服之漸覆取汗蔥白連鬚切一升乾葛切六合新豉一合紙褁生薑切二合生麥門冬去心六合乾地黃六合勞水八升此水以扚揚之一千過右藥用勞水煎之三分減二去滓分溫三服相次如人行八九里如覺欲汗漸覆之與傷寒無異又依前蔥白等七味飲服之得可但遇寒溫將息以取安穩若不覺可宜合萎㽔等五味飲子服之萎㽔五兩切蔥白切一斤豉心一升綿褁粳米三合碎研雄鼠屎七枚末右藥以水七升煮取汁去滓內粳米屑煮米爛訖內鼠屎末攪勻頓服覆被安卧取汗差治天行病差後凖常合漸健能行履遂過限不堪起動體氣虛羸每覺頭痛唇口乾乍寒乍熱發作有時或雖能行動運轉然每作時節有前狀者名天行不了有此宜合地骨白皮等五味飲子白薇等十味丸方細服之地骨白皮三兩白蜜三合知母三兩麥門冬五兩去心竹瀝一升右藥切知母以上和麥門冬然後以水六升煮取二升去滓內竹瀝蜜攪調分溫三服相去如人行十里久如覺虛不能空服頓盡欲間食服亦佳兼主傷寒又若服前地骨皮等五味飲子不可雖可不能全退宜合白薇等十味丸白薇三兩知母四兩地骨皮三兩乾地黃六兩麥門冬五兩去心甘草四兩炙蜀椒三兩萎蕤三兩橘皮二兩人參三兩右藥細切合搗篩絹羅為散蜜和丸梧桐子大初服以飲下十五丸日再服稍加至三十丸服經三數日後自候腹中若覺熱則食前服如不能以空飲下藥宜合烏梅等四味飲下前丸忌菘菜海藻蕪荑等烏梅散烏梅十枚萎蕤五兩生薑五兩白蜜一合右切以水六升煮三味取二升去滓內白蜜攪調細用下前丸水冷暖以意斟酌縱不下丸但覺口乾渴則飲之麻黃散治溫病差愈食復病麻黃十分去節大黃十五分炙附子一分炮厚朴二分炙苦參六分石膏六分碎綿褁烏頭六分炮右七味搗篩以苦酒米汁和服方寸匕日三夜二服麻子一升豉一升綿褁牡鼠屎七十二枚右三味以水五升煮取二升半分溫三服立愈試之有神效大黃丸大黃一兩蒸之二斗米下巴豆五十枚去心皮熬桂心二分硝石三分煮無者以芒硝代之乾薑二分炮右五味搗篩四味别搗巴豆令如泥令合和以蜜更搗二千杵丸如梧桐子壞一丸湯服之但熱在膈上當吐膈下當利預作粥如服他吐下丸法服藥兩食頃不吐下以熱飲動之若不得吐下可更服一丸半此藥壯人可二丸此藥優於他吐下藥丸故冝大小不多冷粥解之若有瘡綿挺如指蜜和一丸塗挺頭旦內瘡中晡出之不瘥更作溫病不得大便服之得下佳宿食不消亦服之飛户遁漿服半丸日一應須臾止心腹脹滿痛服一丸瘧者依發日宿勿食清晨服一丸若壯人服二丸得吐下忍飢過發時乃食婦人産後血結中奔走起上下或絶産無子或月經不斷面目青黃服半丸小兒淋瀝寒熱臚脹大腹不欲食不生肌三四歲如麻子日服一丸六七嵗服二丸如此三十日心腹諸病差小兒半之愈大良忌野豬肉蘆笋生蔥治時氣病起諸勞復方出肘後方用乾蘇葉一把水五升煮取二升盡服之無乾者生亦可用加生薑四兩豉一升又方出肘後方用濃煮甘皮服之蘆根亦佳竹葉湯治天行後寒熱牽勞下腹四肢沈重或一卧一起氣力羸弱竹葉一把小麥一升甘草一兩炙石膏二兩研茯苓二兩半夏一升洗去滑前胡二兩知母二兩黃芩二兩人參二兩生薑四兩大棗三十枚擘右十二味切以水六升煮竹葉減四升去滓內藥煮取三升分三服忌海藻菘菜醋物羊肉餳等物勞多而復發方出肘後方燒取篩末服方寸匕良治時氣病起諸勞方葛氏肘後備急方凡得病毒愈後百日之內禁食豬犬羊肉并腸血及肥鮮油膩乾魚則必大小痢下則不可復救又禁食胡蒜韭薤生菜蝦鱔等食此多致復發則難治又令到他年數發也粉三升以暖水和服之厚覆取汗治溫病勞復及食勞出本草以人屎燒灰酒服方寸匕主天行勞復出本草以故繳腳布洗汁飲帶垢者良治溫病食勞出本草以杏仁五兩酢二升煎取一升服之取汗差治篤病新起早勞食飲多致復欲死方出本草用水服胡粉少許治天行勞復以故膩頭布浸取汁暖服一方用頭上垢多時收者治交接勞復卵腫腹中絞痛便欲死出本草刮青竹皮一升以水三升煮五沸絞頓服時氣瘴疫方茵陳散出聖惠方治時氣瘴疫頭痛壯熱心如火煎面目黃黑四肢沉重不得睡卧子芩黃連去鬚各半兩秦艽去苖知母川芒硝土瓜根川大黃銼碎微炒茵陳梔子仁各一兩大青赤芍藥各一兩右為散每服不計時候以新汲水調下三錢須臾便喫白粥飲半大盞以次喫蔥茶一碗腹中稍覺轉動下利額上似微潤即以衣蓋取汗解差硃砂散出聖惠方治時氣瘴疫辟毒硃砂細研川烏頭炮製去皮臍各二兩細辛乾薑炮製銼躑躅花酒拌炒令乾白术􅌝􅌣根各半兩右為散每服不計時候以溫酒調下二錢厚覆汗出差老君神明白散出聖惠方治時氣瘴疫方見本門頭痛類五味同時氣瘴疫諸方出聖惠方右以艾炙病人牀四角各一壯勿令知之治溫瘴出本草治寒熱發歇不定煩渴頭疼心躁用杜董枝葉搗爛以新酒浸絞汁服之吐出惡涎甚效赤散方出聖惠方治時氣瘴疫牡丹一兩細辛半兩皂莢去黑皮塗醋炙微黃去子一兩桂心乾薑炮製銼附子炮製去皮臍真珠躑躅花醋拌炒令乾各半兩右為散初覺頭強惡寒便以少許內鼻中吸之嚏為候相次以溫酒調服二錢厚覆取汗愈雄黃丸出聖惠方治時氣瘴