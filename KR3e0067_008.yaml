body:
  text: 普濟方卷八明周王朱橚撰運氣圖太陽寒水司天太陰濕土在泉中見太宫土運歲土太過氣化運行先天太宫下加太陰太過而加同天符又土運臨戌是謂歲會氣之平也平土之歲命曰備化之紀氣協天休德流四政五化齊修其氣平其性順其用高下其化豐滿其政安靜其候溽蒸其令濕其類土其應長夏其穀稷其果棗其實肉其蟲倮其畜牛其物膚其色黃其味甘其音宫其數五其在人也其臟脾其主口其養肉其病痞此歲運所主也天地之氣上見太陽左間厥陰右間陽明故天政所布其氣肅下見太陰左間少陽右間少隂故地氣靜而其令徐水土合德上應辰星鎮星其榖玄黅寒臨太虛其政大舉陽氣不令澤無陽焰則火發待時少陽中治時雨乃涯止極雨散還於太陰雲朝北極濕化乃布澤流萬物寒敷於上雷動於下寒濕之氣持於氣交民病寒濕發肌肉痿足痿不收濡㵼血溢歲半之前天氣太陽主之太陽有本標之化寒政大舉熱氣時應者天氣得中也歲半之後地氣太陰主之太陰之化從本雨濕甚者地氣之應也寒化六溫化五是為正化之日倮蟲育鱗蟲靜是為歲物所宜燥毒不生鱗蟲不成其味醎其氣熱是為地氣所制平土之歲本不資化源運與地氣臨於戌歲土氣盛先資化源以助於水所謂抑其氣運扶其不勝無使暴過而生其疾也食玄黅之榖以全其真避歲之虛邪以安其正以苦熱調上以苦溫調下運土在中亦以苦溫調之運同寒之化宜燥熱治之常也初之氣自癸酉年大寒日申初至是歲春分日午初凡六十日八十七刻半主位太角木客氣少陽火中見土運少陽中治行春令地氣遷氣乃太溫草乃早榮民乃厲溫病乃作身熱頭疼嘔吐肌腠瘡瘍宜治少陽之客以醎補之以甘瀉之以醎耎之歲榖宜玄間榖宜豆則火不為邪二之氣自春分日午正至小滿日辰正凡六十日有奇主位少徵火客氣陽明金中見土運金土相和大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜治陽明之客以酸補之以辛㵼之以苦泄之嵗榖宜玄間榖宜黍則燥不為邪三之氣自小滿日已初至大暑日卯初凡六十日有奇主位少徴火客氣太陽水中見土運天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歲榖宜玄間榖宜稷則寒不為邪四之氣自大暑日卯正至秋分日丑正凡六十日有奇主位太宫土客氣厥陰木中見土運歲土得位風氣居之風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白宜治厥隂之客以辛補之以甘緩之歲榖宜黅間榖宜稷則風不為邪五之氣自秋分日寅初至小雪日子初凡六十日有奇主位少商金客氣少陰火中見土運火能生土土能生金氣位相和陽復化草乃長乃化乃成民乃舒法宜調少陰之客以醎補之以甘瀉之以酸收之歲榖宜黅間榖宜豆則熱不為邪終之氣自小雪日丑正至大寒日戌正凡六十日有奇主位太羽水客氣太陰土中見土運氣與運符會地氣正濕令行陰凝太虛埃昏郊野民乃慘悽寒風以至反者孕乃死宜治太陰之客以甘補之以苦瀉之以甘緩之歲榖宜黅間榖宜麻則濕不為邪是氣也不可犯涼司氣以涼故也歲寒雖平或有邪氣則中執法經曰中執法者其病速而危也厥陰風木司天少陽相火在泉中見少啇金運歲金不及氣化運行後天上角與正角同諸同正歲氣化運行同天厥陰在上左間少陰右間太陽故天氣擾而其政撓少陽在下左間陽明右間太隂故地氣正而其令速風生高逺炎熱從之雲趨雨府濕化乃行風火同德上應歲星熒惑其榖蒼丹間榖言太宫太羽者其耗文角品羽風燥火熱勝復更作蟄蟲來見流水不氷熱病行於下風病行於上風燥勝復同所謂邪氣化日也風化八清化四火化二所謂正化度也毛蟲靜毛蟲育是乃物所宜介蟲耗毛蟲不育寒毒不生是乃地氣所制然木為天氣火為地氣金運在中地氣勝運運化勝天其化不絶天氣虛地氣盈宜資化源以助木氣兼贊歲運無使邪勝嵗半之前天氣厥陰主之厥陰以中氣為化當是時風從火化者天氣之和也若風淫所勝則太虛埃昏雲物以擾寒生春氣流水不氷民病胃脘當心而疼上肢兩脅膈咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉病本於脾診在足衝陽之脈法宜平以辛涼佐以苦辛以甘緩之以酸㵼之歲半之後地氣少陽主之少陽之化從本若火淫於內則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便法宜治以醎冷佐以苦辛以酸收之以苦發之歲運之化金不及是謂折收氣乃後生氣乃揚長化合德火政乃宣庶類以蕃其氣揚其用躁切其化兼所不勝夏有光顯鬱蒸之令則冬有嚴凝整肅之應若夏有炎爍燔燎之變則秋有氷雹霜雪之復其眚自西其病內舍膺脅肩背外在皮毛復則寒雨暴至陰厥且格陽反上行頭腦户痛延及顛頂發熱甚則心痛治宜以酸調和中初之氣自甲戌年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位太角木客氣陽明金中見金運氣與運通居於木位與厥陰交司而行春令金木氣齊寒始肅殺氣方至民病寒於右之下宜治陽明之客以酸補之以辛瀉之以苦泄之歲榖宜蒼間榖宜黍是氣也司氣以涼用涼無犯二之氣自春分日酉正至小滿日未正凡六十日有奇主位少徵火客氣太陽水中見金運金水相得寒不去華雪水氷殺氣施化霜乃降谷草上焦寒雨數至陽復化民病熱於中宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歲榖宜蒼間榖宜稷三之氣自小滿日申初至大暑日午初凡六十日有奇主位少徵火客氣厥隂木中見金運火勝金金勝木其化不絶天政布風乃時舉民病泣出耳鳴掉眩宜治厥隂之客以辛補之以酸瀉之以甘緩之歲榖宜蒼間榖宜稷四之氣自大暑日午正至秋分日辰正凡六十日有奇主位太宫土客氣少隂火中見金運又值在泉少陽交司之時溽暑濕熱相薄爭於左之上民病黃疸而為胕腫宜治少陰之客以醎補之以甘瀉之以酸收之歲榖宜丹間榖宜豆五之氣自秋分日已初至小雪日卯初凡六十日有奇主位少啇金客氣太陰土中見金運之金得位與土相和其化燥濕更勝沉陰乃布寒氣及體風雨乃行宜調太陰之客以甘補之以苦瀉之以甘緩之歲榖宜丹間榖宜麻終之氣自小雪日卯正至大寒日丑正凡六十日有奇主位太羽水客氣少陽火中見金運畏火司令陽乃大化蟄蟲出見流水不氷地氣大發草乃生人乃舒其病溫厲宜治少陽之客以醎補之歲榖宜丹間榖宜豆六氣之常也歲寒之化天氣勝者陽明復之地氣勝者太陽復之其治各以其勝復法少陰君火司天陽明燥金在泉中見太羽水運歲水太過氣化運行先天水運臨子是謂歲會氣之平也平水之嵗命曰靜順之紀藏而無害治而善下五化咸整其氣明其性下其用沃衍其化凝堅其政流演其候凝肅其令寒其類水其應冬其榖豆其果栗其實濡其蟲鱗其畜彘其色黑其味醎其物濡其音羽其數六其在人也其藏腎其主三陰其養骨髓其病厥此歲運之化也天地之氣上見少陰左間太陰右間厥陰故天政所布其氣明下見陽明左間太陽右間少陽故地之氣肅而其令切交司之氣以寒交暑天地之氣以熱加燥雲馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其榖丹水火寒熱持於氣交而為病始熱病生於上清病生於下寒熱相犯而爭於中民病咳喘血溢血泄鼽衄眥目赤嚏瘍寒厥入胃心痛腰痛腹大嗌乾腫上蓋火為天氣金為地氣水運在中熱化二寒化六清化四正化度也羽蟲靜介蟲育歲物之宜也毛蟲耗羽蟲不生地氣制之也燥熱相加天氣盈地氣虛歲有平水不取化源唯抑運氣資其歲勝無使暴過而生病也食丹白之榖以全其真氣食間氣之榖以辟虛邪味宜醎寒調上以酸溫安下運同地氣宜以溫熱化歲半之前天氣少陰主之少陰有本標之化其應寒熱得中歲半之後地氣陽明主之陽明以中氣為化其應溫燥相半當其時而至者為平非其時而至者為淫初之氣自乙亥年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位太角木客氣太陽水中見水運氣與運同以居木位水木相和奉少陰之政而行春令地氣遷燥將去寒乃始蟄復藏水乃氷霜降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜治太陽之客以苦補之以醎㵼之以苦堅之以辛潤之歲榖宜丹間榖宜稷則寒不為邪是氣也用寒遠寒無犯司氣之寒二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣厥陰木中見水運水木相得陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱宜治厥陰之客以辛補之以酸瀉之以甘緩之歲榖食丹間榖食豆則風不為邪三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位少徴火客氣少陰火中見水運火居火位歲水間之天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜治少陰之客以醎補之以甘瀉之以酸收之歲榖食丹間榖食豆則熱不為邪四之氣自大暑日酉正至秋分日未正凡六十日有奇主位太宫土客氣太陰土中見水運土居其位溽暑至大雨時行寒熱互至民病寒熱嗌乾黃疸鼽衄飲發宜治太陰之客以甘補之以苦瀉之以甘緩之歲榖食白間榖食麻則濕不為邪五之氣自秋分日申初至小雪日午初凡六十日有奇主位少商金客氣少陽火中見水運畏火臨暑反至陽乃化萬物乃生乃長乃榮民乃康其病溫歲水制之其病乃微宜治少陽之客以醎耎之歲榖食白間榖食豆則火不為邪終之氣自小雪日午正至大寒日辰正凡六十日有奇主位太羽水客氣陽明金中見水運水當其位以金相和燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連小腹而作寒中地將易也宜治陽明之客以酸補之以辛㵼之以苦泄之嵗榖食白間榖食黍則燥不為邪是嵗也水氣之平由於歲會為行令邪或中之民有持久之病經所謂中行令者其病徐而持也太陰濕土司天太陽寒水在泉中見少角木運歲木不及氣化運行後天委和之紀曰上宫與正宫同諸同正歲氣化運行同天此言天氣平也天地之氣上見太陰左間少陽右間少陰故地氣上騰而其政肅下見太陽左間厥陰右間陽明故天氣下降而其令寂陰専其政陽氣退辟大風時起原野昏霧白埃四起雲奔南極寒雨數至物成於差夏濕寒合德上應鎮星辰星其榖黅玄故陰凝於上寒積於下寒水勝火則為氷雹陽光不治殺氣乃行民病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急清化熱化勝復同邪氣化度也雨化五風化三寒化一正化度也歲物所宜則倮蟲靜鮮蟲育地氣所制則羽蟲耗熱毒不生故有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之也間榖命太徵太商者蓋土為天氣水為地氣土勝水天氣盈地氣虛宜取化原以平氣益其歲氣無使邪勝食黅玄之榖以全其真食間氣之榖以保其精以苦燥之溫之甚則發之泄之則濕氣外溢肉潰皮拆而水血交流必贊其陽火令禦甚寒從氣異同少多其判也歲半之前天氣太陰主之太陰所至其令濕若濕淫所勝則沉陰旦布雨變枯稿民病胕腫骨腫陰疸陰疸者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎診在足太溪之脈法宜平以苦溫佐以甘辛以汗為效而止所謂丁丑歲其化上苦溫也歲半之後地氣太陽主之太陽所至其令寒若寒淫於內則凝肅慘栗民病少腹控睪引腰脊上衝心痛血見嗌痛頷腫法宜治以甘熱佐以苦辛以鹹㵼之以辛潤之以苦堅之歲運之化木不及是謂勝生生氣不正化氣乃揚長氣自平收令乃早涼雨時降風雲並興草木晚榮蒼乾凋落物秀而實膚肉內充其氣斂其用聚其動綏戻拘緩其發驚駭化其兼所不勝春有鳴條律暢之化則秋有霧露清涼之政春有慘悽殘賊之勝則夏有炎暑燔爍之復其眚東其病內舍胠脅外在關節復炎暑流火民病寒熱瘡瘍痱疹癰痤法宜調以辛溫初之氣自丙子年大寒日已初至是歲春分日卯初凡六十日八十七刻半主位少角木客氣厥陰木中見木運歲木當位地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相薄雨乃後民病血溢筋絡拘強關節不利身重筋痿宜調厥陰之客以辛補之以酸㵼之以甘緩之歲榖宜黅間榖宜稷則風不能為邪是氣也司氣以溫無犯二之氣自春分日卯正至小滿日丑正凡六十日有奇主位太徵火客氣少陰火中見木運火氣當位大火正物承化民乃和其病溫厲盛行遠近咸若溫蒸相薄雨乃時降宜調少陰之客以醎補之以甘瀉之以酸收之歲榖宜黅間榖宜豆則熱不為邪三之氣自小滿日寅初至大暑日子初凡六十日有奇主位太徵火客氣太陰土中見木運木生火火生土其化順天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿宜治太陰之客以甘補之以苦㵼之以甘緩之歲榖宜黅間榖宜麻雖有邪濕不能為害四之氣自大暑日子正至秋分日戌正凡六十日有奇主位少宫土客氣少陽火中見木運地氣交司畏火臨溽蒸化地氣騰天氣否塞寒風曉暮蒸熱相薄草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以醎補之以甘瀉之以醎耎之歲榖宜玄間榖宜豆雖有火邪不能為害五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位太啇金客氣陽明金中見木運金氣得位慘令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠宜治陽明之客以酸補之以辛瀉之以苦泄之歲榖宜玄間榖宜黍則燥不為邪終之氣自小雪日酉正至大寒日未正凡六十日有奇主位少羽水客氣太陽水中見木運水當其位寒大舉濕大化霜乃積陰乃凝水堅氷陽光不治感於寒則病人關節禁固腰脽疼寒濕持於氣交而為疾也宜治太陽之客以苦補之以醎㵼之以苦堅之以辛潤之歲榖宜玄間榖宜稷則寒不為邪此六氣之常也歲氣之交濕勝則有厥陰之復寒勝則有太陰之復其治各以其勝復之法少陽相火司天厥陰風木在泉中見太徵火運嵗火大過氣化運行先天太徵上臨少陽是謂天符之年平火之歲命曰升明之紀正陽而治德施周普伍化均衡其氣高其性速其用燔灼其化蕃茂其正明曜其候炎暑其令熱其類火其應夏其榖麥其果杏其實絡其蟲羽其畜馬其色赤其味苦其物脈其音徵其數七其在人也其藏心其主舌其養血其病瞤瘛此運之化也天地之氣上見少陽左間陽明右間太陰故天氣正而其政嚴下見厥陰左間少陰右間太陽故地氣擾而其令撓風乃暴舉木偃沙飛炎火乃流陰行陽化雨乃時應火木同德上應熒惑歲星其榖丹蒼歲氣之化火化七風化三正化度也羽蟲靜毛蟲育歲物所宜也倮蟲耗清毒不生地氣制之也歲半之前天氣少陽主之少陽所至為炎暑其令暄者少陽之正也歲半之後地氣厥陰主之厥陰所至為風府風從火化者厥陰之令也風熱慘布雲物沸騰太陰橫流寒乃時至涼雨並起民病寒中外發瘡瘍內為泄滿聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變是歲火為天氣木為地氣風火相值其氣専其化淳又遇火運統之運與天符火化升明先取化源抑其運火贊其金氣則暴過不生苛疾不起歲宜醎寒調其上以辛涼調其下以甘和其中滲之泄之積之發之運同風熱宜多寒化治之當也初之氣自丁丑年大寒日申初至是歲春分日午初凡六十日八十七刻半主位少角木客氣少陰火中見火運氣與運同地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣怫於上血溢目赤咳逆頭疼血崩脅滿膚腠中瘡宜調少陰之客以醎補之以酸收之歲榖宜丹間榖宜豆二之氣自春分日午正至小滿日辰正凡六十日有奇主位太徵火客氣太陰土中見火運濕土勝火反鬱白埃四起雲趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳嘔吐瘡發於中胸嗌不利頭疼身熱昏憒膿瘡宜治太陰之客以甘補之以苦瀉之以甘緩之歲榖宜丹間榖宜麻三之氣自小滿日已初至大暑日卯初凡六十日有奇主位太徵火客氣少陽火中見火運歲火當位上為天符下為司氣天政布炎暑至少陽臨上雨乃涯民病熱中聾瞑血溢濃瘡咳嘔鼽衄渴嚏欠喉痺目赤善暴死是歲火氣平若有水氣承之即不至橫暴經曰相火之下水氣承之元則害承乃制是也宜調少陽之客以醎補之以甘瀉之以醎耎之歲榖宜丹間榖宜豆是歲也司氣以熱用熱逺熱四之氣自大暑日卯正至秋分日丑正凡六十日有奇主位少宫土客氣陽明金中見火運金土相得涼乃至炎暑間化白露降民氣和平其病滿身重宜調陽明之客以酸補之以辛瀉之以苦泄之歲榖宜蒼間榖宜黍五之氣自秋分日寅初至小雪日子初凡六十日有奇主位太啇金客氣太陽水中見火運火本勝金水反制之寒氣為客陽乃去寒乃來雨乃降氣門乃閉剛木早凋民病寒邪君子周密宜調太陽之客以苦補之以醎㵼之以苦堅之以辛潤之歲榖宜蒼間榖宜稷終之氣自小雪日子正至大寒日戌正凡六十日有奇主位少羽水客氣厥陰木中見火運火木同德而行順化地氣正風乃至萬物反生霧霿以行其病關閉不禁心疼陽氣不藏而咳宜治厥陰之客以辛補之以酸㵼之以甘緩之歲榖宜蒼間榖宜稷是歲天符為執法火氣自若有邪氣則中執法民有急卒之病經所謂中執法者其病速而危也陽明燥金司天少陰君火在泉中見少宫土運歲土不及氣化運行後天歲運之氣化上見陽明左間太陽右間少陽故天氣急而其政切下見少陰左間太陰右間厥陰故地氣明而其令暴陽専其令炎暑盛行物燥以堅淳風乃治風燥橫運流於氣交多陽少陰雲趨雨府濕化乃敷燥極而澤其為氣清熱之氣持於氣交風化清化勝復同是謂邪氣化度也清化九雨化五熱化七是謂正化度也金火合德其在天也上應太白熒惑其在物也歲榖白丹間榖命太徵者歲物所宜則羽蟲育地氣所制則介蟲耗寒毒不生其耗白甲品羽蟄蟲乃見流水不氷民病咳嗌塞寒熱發暴振栗癃悶清先而徑毛蟲乃死熱後而暴介蟲乃殃然金為天氣火為地氣火能勝金土運間之其邪乃微天氣微虛宜資其化源以助金氣兼安其運土無使受邪食白丹之榖以安其氣間榖以去其邪歲宜以醎以苦以辛汗之清之散之運同清氣宜多地化治之常也歲半之前天氣陽明主之燥淫所勝則木晚榮草乃晚生筋骨內變民病左胠脅痛寒清於中感而瘧大涼革候咳腹中鳴注泄鶩溏名木斂生菀於下草焦上首心脅暴痛不可反側嗌乾面塵腰痛目昧眥瘍瘡痤癰病本於肝診在足太衝之脈法宜平以苦溫佐以酸辛以苦下之歲半之後地氣少陰主之熱淫於內則焰浮川澤陰處反明民病腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛項腫惡寒發熱如瘧少腹中痛腹大法宜治以醎酸佐以甘苦以酸收之以苦發之歲運之化土不及紀曰卑監是謂減化化氣不令生政獨彰長氣整雨乃愆收氣平風寒並興草木榮美秀而不實成而粃也其氣散其用靜定其動瘍涌分潰癰腫其發濡滯其化兼所不勝四維有埃雲潤澤之化則春有鳴條鼓折之政若四維發振拉飄騰之變則秋有肅殺霖霖之復其眚四維其藏脾其病內舍心腹外在肌肉四肢復則收政嚴峻名木蒼凋胸脅暴痛下引少腹善太息氣客於脾食少味治宜以甘和調中初之氣自戊寅年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位少角木客氣太陰土中見土運氣與運同風不勝濕地氣遷隂始凝氣始肅水乃冰寒雨化其病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋宜治太陰之客以甘補之以辛瀉之以甘緩之歲榖宜白間榖宜麻雖有濕邪不能為害是氣也司氣以涼用涼無犯二之氣自春分日酉正至小滿日未正凡六十日有奇主位太徵火客氣少陽火中見土運二火同治陽乃布民乃舒物乃生榮厲大至民善暴死宜治少陽之客以醎補之以甘瀉之以醎耎之歲榖宜白間榖宜豆雖有火邪不能為害三之氣自小滿日申初至大暑日午初凡六十日有奇主位太徵火客氣陽明金中見土運火生土土生金下生上天政布涼乃行燥熱交合燥極而澤民病寒熱宜治陽明之客以酸補之以辛瀉之以苦泄之歲榖宜白間榖宜黍雖有燥邪不能為害四之氣自大暑日午正至秋分日辰正凡六十日有奇主位少宫土客氣太陽水中見土運土運得位太陽居之寒雨降民病暴仆振栗譫妄少氣嗌乾引飲及為心疼癰腫瘡瘍瘧寒之疾骨痿血便宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歲榖宜丹間榖宜稷雖有寒邪不能為害五之氣自秋分日已初至小雪日卯初凡六十日有奇主位太啇金客氣厥陰木中見土運客氣勝運春令反行草乃生榮民乃和宜調厥陰之客以辛補之以酸收之以甘緩之歲穀宜丹間穀宜稷雖有風化不能為邪終之氣自小雪日卯正至大寒日丑正凡六十日有竒主位少羽水客氣少隂火中見土運氣能生運陽氣布候反溫蟄蟲來見流水不氷民乃康平其病溫宜治少隂之客以醎補之以苦潤之以甘㵼之以酸收之嵗榖宜丹間穀宜豆雖有熱邪不能為害此乃六氣之常也蓋嵗寒之交天氣勝則有少陽之復地氣勝則有太陽之復治者宜各以其勝復法治之太陽寒水司天太陰濕土在泉中見太商金運歲金太過氣化運行先天天地之氣上見太陽左間厥陰右間陽明故天氣肅而其政肅下見太陰左間少陽右間少隂故地氣靜而其令徐寒臨太虛陽氣不令寒政大舉澤無陽𦦨則火發待時少陽中治時雨乃涯止極雨散還於太陰雲朝北極濕化乃布澤流萬物寒敷於上雷動於下水土合德上應辰星鎮星其榖玄黅歲氣之化寒化一清化九雨化五正化度也倮蟲育歲物所宜也鱗蟲不成燥毒不生地氣制之也寒濕之氣持於氣交民病寒濕發肌肉痿足痿不收濡瀉血溢是歲水為天氣土為地氣木中金運土能勝水天化為虛金運統之土生金金生水以下生上天化雖虛氣運相生其邪乃微宜先資化源以取天氣之虛抑其運金扶其木氣無使暴過而生其疾食玄黅之榖以全其真避虛邪之氣以安其正歲宜以苦熱調上以甘熱調下以辛溫調中運同寒濕以燥熱化治之常也淫勝之氣歲半之前天氣太陽主之若寒淫所勝則寒氣反至水且冰血變於中發為癰瘍民病厥心痛嘔血血泄鼽衄善悲時眩仆運火炎烈雨暴乃雹胸腹滿手熱胕攣腋腫心淡淡大動胸脅胃脘不安面赤目黃善噫嗌乾甚則色炲渴而欲飲病本於心診在手神門脈法宜平以辛熱佐以甘苦以醎耎之以甘㵼之後地氣太陰主之若濕淫於內則埃昏巖谷黃反見黑至陰之交民病飲積心痛頭痛喉痺陰病血見少腹痛腫不得小便病衝頭痛目似脫項似拔腰似折髀不可以曲膕如結腨如别法宜治以苦熱佐以醎淡以苦燥之以淡泄之歲運之化金太過者紀曰堅成是謂收引天氣潔地氣明陽氣隨陰治化燥化其政物以司成收氣繁布化洽不終其化成其氣削其政肅其令鋭切其德霧露蕭飋其動暴折瘍疰其變肅殺凋零其病喘喝胸憑仰息其化兼其所勝故曰歲金太過燥氣流行肝木受邪民病兩脅下小腹痛目赤痛眥瘍耳無所聞肅殺過甚則體重煩寃胸痛引背兩脅滿且痛引少腹甚而喘咳逆氣肩背皆痛下連股膝髀腨胻足皆病收氣峻則病暴痛胠脅不可反側咳逆甚而血溢診在足太衝脈其治悉以辛溫調中初之氣自己卯年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位少角木客氣少陽火中見金客氣勝運地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭疼嘔吐肌腠瘡瘍宜治少陽之客以醎補之以甘瀉之以醎耎之歲榖宜玄間榖宜豆雖有火邪不能為害二之氣自春分日子正至小滿日戌正凡六十日有奇主位太徵火客氣陽明金中見金運氣與運同大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜治陽明之客以酸補之以辛潤之以苦泄之歲榖宜玄間榖宜黍雖有燥邪不能為害是氣也無犯司氣之涼三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位太徵火客氣太陽水中見金運水勝火天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歲榖宜玄間榖宜稷雖有寒邪不能為害四之氣自大暑日酉正至秋分日未正凡六十日有奇主位少宫土客氣厥陰木中見金運木勝土金反制之又遇太陰交司風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉痿足痿注下赤白宜治厥陰之客以辛補之以酸收之以甘緩之歲榖宜黅間榖宜稷雖有風邪不能為害五之氣自秋分日申初至小雪日午初凡六十日有奇主位太啇金客氣少陰火中見金運歲運得位客火勝之陽復化草乃長乃化乃成民乃舒宜調少陰之客以醎補之以甘㵼之以酸收之歲榖宜黅間榖宜豆雖有熱化不能為邪終之氣自小雪日午正至大寒日辰正凡六十日有奇主位少羽水客氣太陰土中見金運土生金金生水其化順地氣正濕令行陰凝太虛埃昏郊野民乃慘悽寒風以至反者孕乃死宜治太陰之客以甘補之以苦瀉之以甘緩之歲榖宜黅間榖宜麻雖有濕邪不能為害此六氣之化也是歲天氣勝者太隂復之地氣勝者厥陰復之其治皆如勝復之法厥隂風木司天少陽相火在泉中見少羽水運歲水不及氣化運行後天天地之氣上見厥陰左間少陰右間太陽故天政擾而其政撓下見少陽左間陽明右間太陰故地氣正而其令速風生高遠炎熱從之雲趨雨府濕化乃行風火同德上應歲星熒惑其榖蒼丹間榖言太啇者其耗文角品羽風燥火熱勝復更作蟄蟲來見流水不氷熱病行於下風病行於上風燥勝復行於中雨化風化勝復同邪氣化度也風化三寒化一火化七正化度也風化為司天苦化在泉玄化為司運柔化清化為間氣灼化為居氣其在物也毛蟲靜羽蟲育是為歲物所宜介蟲耗寒毒不生是為地氣所制然歲寒天化虛地化盈宜資化源以助天氣之木化源雖虛水運在中水能生木邪乃微也必贊其運水無使邪勝以辛涼調上以醎寒調下畏火之氣無妄犯之歲半之前厥陽主之若風淫所勝則太虛埃昏雲物以擾寒生春氣流水不氷民病胃撓當心而痛上肢兩脅隔咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉病本於脾診在足衝陽之脈其法平以辛涼佐以苦甘以甘緩之以酸瀉之歲半之後少陽主之若火淫於內則𦦨明郊野寒熱更至民病注泄赤白少腹疼溺赤甚則血便其法治以醎冷佐以苦辛以酸收之以苦發之歲運之化水不及紀曰涸流是謂反陽藏令不舉化氣乃昌長氣宣布蟄蟲不藏土潤水泉減草木條茂榮秀滿盛其氣滯其用滲泄其動堅止其發燥稿其主埃鬱昏翳其病痿厥堅下其化兼所不勝四維有湍潤埃雲之化則不時有和氣生發之應四維發埃昏驟注之變則不時有飄蕩振拉之復其眚北其藏腎其病內舍腰脊骨髓外在溪谷喘膝皆以苦和調中初之氣自庚辰年大寒日巳初至是歲春分日卯初凡六十日八十七刻半主位少角木客氣陽明金中見水運金勝木水運間之寒始肅殺氣方至民病寒於右之下宜治陽明之客以酸補之以辛瀉之以苦泄之歲榖宜蒼間榖宜黍二之氣自春分卯正至小滿日丑正凡六十日有奇主位太徵火客氣太陽水中見水運氣與運同寒不去華雪水氷殺氣施化霜乃降谷草上焦寒雨數至陽復化民病熱於中宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歲榖宜蒼間榖宜稷是氣也無犯司氣之寒三之氣自小滿日寅初至大暑日子初凡六十日有奇主位太徵火客氣厥陰木中見水運氣運之水制火而生木故天政布風乃時舉民病泣出耳鳴掉眩宜治厥陰之客以辛補之以酸㵼之以甘緩之歲榖宜蒼間榖宜稷四之氣自大暑日子正至秋分日戌正凡六十日有奇主位少宫土客氣少陰火中見水運溽暑濕熱相爭於左之上民病黃痺而為胕腫宜治少陰之客以醎補之以甘瀉之以酸收之歲榖宜丹間榖宜豆五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位太啇金客氣太陰土中見水運客土刑運燥濕更勝沉陰乃布寒氣及體風雨乃行宜治太陰之客以甘補之以辛瀉之以甘緩之歲榖宜丹間榖宜麻終之氣自小雪日酉正至大寒日未正凡六十日有奇主位少羽水客氣少陽火中見水運歲運得位而合畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病溫厲宜治少陽之客以酸補之以甘瀉之以醎耎之歲榖宜丹間榖宜豆此六氣之化也歲之交天氣勝者則有陽明之復地氣勝者則有太陽之復觀其勝復者各以其法治之少陰君火司天陽明燥金在泉中見太角木運歲木太過氣化運行先天熱化為天氣柔化為左間蒼化為司氣故天政所布其氣明辛化為地氣藏化為右間故地氣肅而其令切寒交暑熱加燥雲馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其榖丹白水火寒熱持於氣交而為病熱病生於上清病生於下寒熱相犯而爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上其為化也熱化二風化八清化四是為正化度也其在物也羽蟲靜介蟲育是乃歲物所宜毛蟲耗濕毒不生是乃地氣所制歲氣之交火在天金在地火勝金天氣盈地氣虛木運助火天氣太盈其盈為勝宜於年前先取化源以平火氣必抑其運木資其歲勝無使暴過而生其病食白丹之榖以全真氣食間氣之榖以辟虛邪歲宜醎以耎之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之運同天運以寒清化故曰其化上醎寒中酸涼下酸溫藥食宜歲半之前少陰主之熱淫所勝則怫熱至火行其令民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衄嘔嚏溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨脹而喘咳病本於肺診在手尺澤脈法宜平以醎寒佐以苦甘以酸收之歲半之後陽明主之燥淫於內則霿霧清瞑民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外及熱法宜治以苦溫佐以甘辛以苦下之歲運之化木太過紀曰發生是謂啓陳土踈泄蒼氣達陽和布化陰氣乃隨生氣淳化萬物以榮其化生其氣美其政散其令條舒其動掉眩顛疾其德鳴靡啓拆其變振拉摧拔其病怒其化兼其所勝故歲木太過風氣流行脾土受邪民病飱泄食減體重煩寃腸鳴腹支滿甚則忽忽善怒眩冒顛疾化氣不正生氣獨治雲物飛動草木不寧甚而搖落反脅疼而吐甚診在足衝陽之脈其治宜以酸涼初之氣自辛巳年大寒日申初至是歲春分日午初凡六十日八十七刻半主位太角木客氣太陽水中見木運歲運當位寒水居之地氣遷燥將去寒乃始蟄復藏水乃氷霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歲榖宜丹間榖宜稷雖有寒邪不能為害二之氣自春分日午正至小滿日辰正凡六十日有奇主位少徵火客氣厥陰木中見木運氣與運同陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱宜治厥陰之客以辛補之以酸瀉之歲榖宜丹間榖宜稷雖有風化不能為邪三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位少徵火客氣少陰火中見木運火居火位木化資之天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜治少陰之客以醎補之以甘瀉之以酸收之歲榖宜丹間榖宜豆雖有熱邪不能為害四之氣自大暑日卯正至秋分日丑正凡六十日有奇主位太宫土客氣太陰土中見木運土居其位溽暑至大雨時行寒熱互至民病寒熱嗌乾黃疸鼽衄飲發宜治太陰之客以甘補之以苦瀉之以苦緩之歲榖宜丹間榖宜麻雖有濕化不能為邪五之氣自秋分日寅初至小雪日子初凡六十日有奇主位少啇金客氣少陽火中見木運木生火畏火臨暑反至陽乃化萬物乃生乃長乃榮民乃康其病溫宜治少陽之客以酸補之以甘瀉之以鹹耎之歲榖宜白間榖宜豆雖有炎邪不能為害終之氣自小雪日子正至大寒日戌正凡六十日有竒主位太羽水客氣陽明金中見木運金勝木燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連少腹而作寒中地將易也宜治陽明之客以酸補之以辛瀉之以苦泄之嵗穀宜白間穀宜稷雖有燥邪不能為害此六氣之交熱氣勝者必有太陽之復燥氣勝者必有少陽之復為法太陰濕土司天太陽寒水在泉中見少徵火運歲火不及氣化運行後天濕化為天氣丹化為司氣灼化為居象故地氣上騰陰専其政而其政肅醎化為地氣動化為左間清化為右間故天氣下降陽氣退避而其令寂大風時起原野昏霿白埃四起雲奔南極物成於差夏濕寒合德黃黑埃昏流行氣交上應鎮星辰星其榖黅玄間榖命太角者寒化雨化勝復同邪氣化度也雨化五火化二寒化六正化度也陰凝於上寒積於下寒水勝火則為氷雹陽光不治殺氣乃行倮蟲靜鮮蟲育是為歲物所宜羽蟲不成熱毒不生是為地氣所制故有餘宜高不及宜下有餘宜晚不及宜早氣之化也民氣亦從之其病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急是歲濕土在上寒水在下土能制水天氣盈地氣虛宜取化源以平土氣益其歲寒無使邪勝食玄黅之榖以全其真食間氣之榖以保其精歲宜以苦燥之溫之甚者發之泄之不發不泄則濕氣外溢肉潰皮拆而水血交流必贊其陽火令禦甚寒運異寒濕其化宜少用燥熱故曰其化上苦熱中醎溫下甘熱藥食宜也歲半之前太隂主之濕淫所勝則沉陰且布雨變枯稿民病胕腫骨痛陰疸陰疸者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎診在足太溪之脈法當平以苦熱其濕上甚則熱治以苦溫佐以甘辛以汗為效而止歲半之後太陽主之寒淫於內則凝肅慓慘民病少腹控皋引腰脊上衝心痛血見嗌疼額腫法宜治以甘熱佐以苦辛以醎瀉之以辛潤之以苦堅之歲運之化火不及紀曰伏眀是謂勝長長氣不宣藏氣仄布收氣自政化令乃衡寒清數舉暑氣乃薄承化物生生而不長成實而稚過化已老陽氣屈伏蟄蟲早藏其氣鬱其用暴其動彰伏變易其發痛其病昏惑悲忘其化兼所不勝夏有炳明光顯之化則冬有嚴肅霜寒之政若夏有慘悽凝烈之勝則不時有埃昏大雨之復其眚南其藏心其病內舍膺脅外在經絡故曰歲火不及寒乃盛行長政不用物榮而下凝慘而甚則陽氣不化乃折榮美民病胸中痛肢滿兩脅痛膺背肩脾間及兩臂內痛甚則屈不能伸髖髀如别復則大雨且至民病鶩溏腹滿食飲不下寒中腸鳴泄注腹痛暴攣痿痺足不任身其法悉以醎溫調中初之氣自壬午年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位太角木客氣厥陰木中見火運風木得位地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相薄雨乃後民病血溢筋絡拘強關節不利身重筋痿宜調厥陰之客以辛補之以酸瀉之以甘緩之歲榖宜黅間榖宜稷雖有風化不能為邪二之氣自春分日酉正至小滿日未正凡六十日有奇主位少徵火客氣少陰火中見火運君火自居其位不司氣化是謂灼化大火正物承化民乃和其病溫厲盛行遠近咸若熱濕蒸相薄雨乃時降宜調少陰之客以醎補之以甘瀉之以酸收之歲榖宜黅間榖宜豆雖有熱化不能為邪三之氣自小滿日申初至大暑日午初凡六十日有奇主位少徵火客氣太陰土中見火運歲火當位濕化鬱之天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿宜治太陰之客以甘補之以苦瀉之以甘緩之歲榖宜黅間榖宜麻雖有溫邪不能為害四之氣自大暑日午正至秋分日辰正凡六十日有奇主位太宫土客氣少陽火中見火運氣與運合畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相薄草木凝煙濕化不流則白露隂布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以醎補之以甘瀉之以醎耎之歲榖宜玄間榖宜豆雖有火邪不能為害是氣也無犯司氣之熱五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位少啇金客氣陽明金中見火運運與位同慘令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠宜調陽明之客以酸補之以辛瀉之以苦泄之歲榖宜玄間榖宜黍雖有火化不能為邪終之氣自小雪日卯正至大寒日丑正凡六十日有奇主位太羽水客氣太陽水中見火運水當其位而能勝火寒大舉濕大化霜乃積陰乃凝水堅氷陽光不治感於寒則病人關節禁固腰脽痛寒熱持於氣交而為疾也宜調太陽之氣以苦補之以醎瀉之以苦堅之以辛潤之歲榖宜玄間榖宜稷雖有寒化不能為邪此六節之氣也氣交之化天氣勝者則有厥陰之復地氣勝者則有太陰之復各以其復法治也普濟方卷八
