body:
  text: 普濟方卷二百九十明周王朱橚撰癰疽門便毒附論夫腎為作強之官所藏者志也男女大欲不能以直遂其志故敗精摶血留聚中途而結為便毒矣夫人腳腿與小腹合縫之間精氣所出之道路也或觸景而動心或夢泄而不泄既不得偶合隂陽又不能忘情息念精與血交滯其不為腫結也幾希便毒處所上不在腹下不在腿介乎兩間之中是也嘗怪世俗無知才覺有便毒證狀必以為熱氣所攻每每薄衣露足遂使寒邪乘之熱氣轉不得散日復一日敗精宿血愈聚而愈結焉不思一身宗筋上絡於舌本下聚於隂器筋得寒則急急則縮甚至傴僂而不獲伸於斯時也百藥並陳亦難責效况復從事於寒涼者乎治法散寒利熱泄其腎邪活其血脈是為捷徑外此老人氣滯亦或有之方連翹湯治便毒腫結連翹獨活川升麻射干木通桑寄生赤茯苓甘草炙各七錢半大黃生用木香乳香沉香各五錢右銼細每服三錢水一盞半慢火煎服復元通氣散治便毒初發用此方穿山甲酒浸炙焦二兩天花粉酒浸一宿焙白芷舶上茴香炒白牽牛末炒延胡索擦去皮南木香當歸甘草炙各一兩青木香半兩右為細末每服二錢溫酒調食前服不飲酒南木香煎湯下治㾫毒胡椒十二個燒過五分樺皮一兩燒過五分穿山甲一兩蛤粉炒皂角針一兩炒山梔子一兩炒乳香半兩沒藥半兩甘草半兩右為細末每服二錢溫酒調下食前服雙解湯治便毒內藴熱氣外挾寒邪精血交滯腫結疼痛辣桂川大黃白芍藥澤瀉牽牛炒去末桃仁去皮尖乾各一兩甘草五分右為粗末每服三錢水一盞半薑五片食前服日兩服先小便快熱從小便出後大便利皆是調毒治便毒大黃黃連枳殼甘草穿山甲右㕮咀為飲子酒水各半盞煎十分濃露一宿次早空心服上半日不可喫食便忌熱物免吐又方黃苽蔞大黃芒硝甘草節右用水二盞煎至八分空心服調理甚妙威靈仙散治發背便毒威靈仙貝母白芷甘草右㕮咀每服半兩酒水煎服治男子婦人便毒驗如神殭蠶七個炒去絲大黃一兩麝香二字硝少許右為細末好煮酒調和必要起五更服之如過動即可如不過再用一服已成膿者小便去之未成即散千金托裏散治便毒惡瘡一服取效如經三五日已成結腫核連進二三服為妙腫則先用烏龍膏貼之蛇床子炒牡蠣煆甘草節生用大黃各二兩右㕮咀每服五錢水一盞酒半盞隔宿煎露一宿次早五更服如大便實加大黃入藥後令下去二三行臟腑病隨藥去治便毒絶妙胡桃五個苽蔞一個樺皮少許右燒存性為末酒調空心下治便毒腫痛雄黃乳香各二錢五分黃柏一錢右為細末分作兩服以新水調傅自平又方治便毒大黃明礬胡桃肉各等分右同研為末丸如彈子大空心不喇口細嚼一丸好酒送下忌煎炒熱火物退毒飲治便毒腫結川山甲半兩蘸法醋炙焦木豬苓三錢法醋微炒右為末每服二錢食前老酒調下次以法醋煮肥皂研膏傅之妙治便毒木鱉子一兩去殼甘草節一兩右為末好酒一碗煎之熱服貝母丸治便毒瘰􅊓有效貝母皂角子各半斤右為細末用皂角半斤銼碎搓揉濃水濾過作膏子和藥末丸如梧桐子大每服五七十丸早晨酒下凡便毒證服二藥不效可服五香連翹湯十竒內補散治便毒并治癰腫未有頭必效方用牛蒡子一半炒一半生碾為末空心酒調服愈單用牛蒡根傅之亦可又方用班貓七個去頭翅足為細末入海金沙半匙酒調露一宿早空心服忌食至午飯小便中見毒方用粥調理甚妙此方多效治便毒用楮桃三十二個酒煮服大病不禁二服無膿者隨氣自散皂角膏治便毒癰疽等用皂角一條用尺以上者捶碎法醋煮爛研成膏傅之屢效膠方治便毒初發用水膠以水溶開塗傅若便毒已大而軟則用魚鰾膠於熱湯中煮軟乘熱研爛傳之或要換藥以熱湯洗去治便毒用紫背草研醋調傅之治便毒初發用生薑一大塊米醋一合薑蘸醋磨取千步峰泥敷臖作處即效千步峰即人家行步地上有高塊者是治􅂒氣即􅗢􅊓血餘一兩燒灰研為細末即人髮錦紋大黃一兩麵褁煨過豬牙皂角三錢右半為㕮咀半為末先以㕮咀用水一盞半煎至七分却入好酒二盞去滓調前件藥末空心服之前藥分作三服又方知母一兩貝母去心一兩右各為細末紅酒調下飲醉為妙更以酒調藥塗患處治􅗢方穿山甲蚌粉同炒右為末麻油輕粉調傅石霜膏風化石灰百草霜等分右為末以酒醋調鵝毛順手掃起治􅗢方亦治便毒用大乾芭蕉葉尉斗內燒存性為末麻油輕粉打和傅􅗢留頭以軟紗貼換易三次或散或破無痕一方法醋生薑自然汁調傳破毒散治便毒橫痃已成未成隨即消散應效如神滑石末三錢班貓炒去頭翅足三個為末右二件和勻分作三服空心食前一日服畢少用茶湯調下毒氣但從小便中出如小便疼痛濃煎車前子木通燈心澤瀉湯頓服即已治便毒傳藥毒潰時用白芨沒藥乳香血竭為末摻效一醉散治疽􅗢貝母香白芷右等分為末酒服次飲酒醉為妙酒醒而病去矣又方煎犀角飲子調五苓散服癤附論夫癤者由風溫冷氣搏於血結聚所生也人運役勞動則陽氣發泄因而汗出遇冷溫氣搏於經絡血得冷折則結澀不通而生癤腫結如梅李也又云腫一寸二寸為癤也其不消而潰者即宜捻去其膿至清血出若膿汁未盡其瘡合者則更發也其著於頷頸腋下若膿不盡多變成瘻也方生乾地黃丸治熱毒瘡癤腫硬生乾地黃二兩川大黃一兩碎銼微炒赤芍藥赤茯苓甘草生銼王不留行遠志去心桂心川升麻黃芩麥門冬去心焙人參去蘆頭各一兩右為細末煉蜜和搗三二百杵丸如梧桐子大不計時以溫水下三十丸防風當歸散治諸般瘡癤等毒熱瘡防風半兩甘草節半兩赤芍藥半兩綿黃蓍半兩當歸半兩白芷半兩左纒藤半兩皂角刺半兩肉桂隂證用一兩陽證用半兩大黃陽證用半兩隂證用一錢右㕮咀水四碗砂瓶內煎至兩碗入好酒一碗再煎一碗放溫作數起服內皂角刺左纒藤加衆藥五倍漏蘆散治熱毒癰癤漏蘆一兩木通三分銼川升麻一兩半赤芍藥一兩黃芩一兩半桑根白皮三分銼枳殼一兩麵炒微黃去穰甘草三分炙微赤銼右為散每服四錢水一中盞煎至六分去滓溫服日三四服硝石散治瘡癤初生熱毒始結疼痛妨悶川硝石三分紫檀香半兩甜葶藶一分莽草一分白藥一分川大黃半兩生用白斂半兩右為細散以漿水旋調稀稠得所塗於腫上乾即易之以熱退消為度乳香膏治軟癤乳香半兩細研膩粉一分油一兩黃蠟半兩松脂一分蜜陀僧一分細研右藥先取油煎蠟松脂乳香洋後下粉蜜陀僧調和成膏看大小用帛上攤貼日二換之大黃散治熱毒生癤五臟壅滯及發背初欲結腫川大黃一兩銼碎微炒梔子仁半兩黃芩川升麻各一兩甘草半兩炙微赤銼右為散每服四錢水一中盞煎取六分去滓不計時候溫服得快利為度胡粉散治熱毒惡癤及諸瘡腫胡粉黃連去鬚水銀與胡粉同研令星盡各一兩糯米十粒赤小豆十四粒右為細末以麻油和諸藥并水銀調令勻薄塗之治軟癤雖出水熱痛不止方赤小豆四十九粒乳香半分粉半兩右為細散先去膿水後貼藥末三兩上效水調膏治軟癤一切腫毒黃皮白斂甘草右等分為細末水和少蜜調貼之用井水佳治軟癤赤腫疼痛不可忍方天靈蓋一枚塗酥炙令微黃麻鞋底一雙多年故者燒灰右為細末以油和塗之治軟癤熱毒不散疼痛不止方食草豬糞冬瓜皮等分燒灰右為末先用鹽漿水洗了以生油調塗以差為度治軟癤乾生薑末銅青右等分和勻香油調傳留口子先用䓤椒湯洗淨軟拭乾傅之來日便愈神效又方生椒末釡下土各等分右醋和調之千金方有麵末又方狗頭骨藝臺子各等分右為末醋和傅之石灰散治瘡腫軟癤立效乾薑石灰等分右爛搗入清油相和揑作餅子罨在瘡腫上治軟癤荆芥銅緑等分右為細末豬骨髓調塗治癰癤結腫赤熱者方用水磨半夏塗之燥便復塗治軟癤熱毒不散疼痛不止方以麻油四兩熬亂髮如雞子大成膏入烏貓兒糞末一分調勻塗於緋帛上貼之又方用鯽魚取蒿柴火燒令燋搗羅為末入生油調貼於癤上一方治骨疽腫熱未破已破或膿不已用銅器煮焙乾焦為末脂油調傅治軟癤用建茶盞搗羅為細末油調傅之又方用枳殼大者一枚剜去穰令空地上磨令口平以調麵糊搽四唇霑在癤上自破膿溜出盡更無瘢䀶治瘡癤已結未結赤腫者用大天南星一個陳者為細末生麵與南星等分生薑自然汁調塗腫處熱腫者只用水調不用麵一方加薄荷汁塗治軟癤屢安再作者用桑螵蛸燒灰存性麻油調傅又方一名呼膿開口膏用雀抱卵殼燒灰存性為末入輕粉少許麻油調傅此物難得只以雞子抱退殼如上法用亦可一方用烏雞圓卵殼燒灰存性為末以綿蘸入瘡口頻易治軟癤用螺螄殼燒灰真麻油調塗又方用椑樹上自起薄皮火炙乾為末麻油調傅治癤子方凡癤無頭者吞葵子一枚不得多服又方以燒葛蔓灰封上自消一方牛糞灰封之亦佳又方用鼠粘根葉貼之又方用水雀屎傅之治瘡瘍諸熱毒疱軟癤及停耳名二白散用風化石灰不以多少雞子清拌勻和作彈子大日乾火煆研為細末凡瘡癤初結清油調傅已破乾摻若停乾令患者側卧患耳向上摻藥以乾為度次日患者以爪爬去耳內藥再用藥末摻不過二三次退愈治瘡腫軟癤立效用瀝清不以多少瓦銚中火溶帶性碾為細末用天南星磨水調藥塗瘡立效治軟癤不作頭及癰腫未有頭用茅針濃煎和酒服茺蔚子治癤子已破用益母搗傅瘡妙治軟癤用黃米粉米於鐵器內炒黃色以新汲水調勻塗瘡上用紙乾貼不再撲可待自落治軟癤用覆盆子葉微炒為末油調紙花貼獨珍膏治軟癤諸熱毒疱瘡用五倍子炒焦為末油調紙花貼一方水調塗仍入麻油數點療熱腫癤􅀈膠數塗一日十數度即差療小兒癤子尤良每用神效五葉湯治遍身熱癤及瘡瘍等用五葉草不拘多少水煎三五沸作浴湯洗之治癰癤方每覺有痛疼似作癤癰或發寒熱便宜用生粉草節大橫紋者尤妙不炙不焙只用日釃為末以酒調煮熟去滓稍熱服連進數服為妙蜞針法癰癤不拘老少初發熱腫即以井邊淨泥傅之有一點先乾處即瘡正頂以大筆管安其上却用馬黃蜞一條安其內頻以冷水灌之蜞必吮其腫血出毒如毒大蜞小須用三四條方見效蜞必死以水救活若血不止藕節上泥止白茆花亦佳治惡癰癤腫破用胡堇草搗篩與松脂乳香花桑柴炭亂髮灰同熬如彈丸大如有其病以熱酒磨一彈丸服之其疼痛立止治瘡癤癰腫熱腫以大黃末水調傅之治癰癤以甘蕉根搗傅之效治瘡癤腫毒以車螯殼燒灰二度各以醋煆搗為末又甘草等分酒服以醋調傅腫上妙治諸癰腫發背及癰癤已潰爛疼痛用薔薇殼更炙尉之即愈諸瘡口不合附論夫諸瘡腫皆是風邪熱毒所為若重觸風寒則冷氣入於瘡令血澀不行其瘡則常有膿水不知疼癢經久則瘡口不合也方降真香散治惡瘡封閉瘡口降真香木香騏驎竭白芷白斂黃連去鬚黃蘗各半分右生搗為細末不計時候用傅瘡口即差斂瘡散軟滑石花蘂石雞內金各半兩白斂二錢半號丹煆滴乳香各一錢白芨三錢半右滑石花蘂石炭燒通紅碗覆泥地一復時為細末次入餘藥末研和乾摻神效騏驎竭散治諸癰破成瘡口膿帶清薄宜用合瘡口長肌肉方騏驎竭一兩炒令紫色生人骨一兩燒灰人牙是也古銅末三分鴿糞一合乾為末右藥都細研如粉貼之如瘡口深作紙絍子引散入瘡口裏面候肉生即合瘡口桃花散治諸瘡口不合生肌藥赤斂炒白斂炒黃柏炒已上各三錢輕粉一錢右為細