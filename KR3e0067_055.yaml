body:
  text: 普濟方卷五十六明周王朱橚撰鼻門總論夫肺為五臟華盖開竅於鼻肺氣和則鼻亦和肺感風冷則為清涕為齆為息肉為不聞香臭肺實熱則為瘡為痛膽移熱於腦則濁涕不已謂之鼻淵惟證候不同故治療亦異肺為氣之主通竅於鼻鼻者清氣出入之道路也隂陽升降氣血和平則一呼一吸榮衛行焉其或七情内蠧六氣外傷則清濁不分泥丸汨亂諸證迭起矣夫血之與氣相隨而行若臟腑生熱乗於血氣故熱氣廹血妄行自鼻孔出謂之衂熱則津液中乾冷則髓涕流注若風冷隨氣乗於鼻腦則津液交涕不能自收謂之流涕肺為風寒所傷津液冷滯鼻氣不宣香臭不聞於是壅作鼻齆冷氣停聚肺血隂凝歲月淹延轉加壅結於是變生息肉或風邪入鼻搏於正氣邪正相擊或氣結叠道不通則為鼻痛或氣血壅滯上焦生熱邪熱之氣留伏不散則為鼻瘡以上數證七情六氣皆當究其感受之原用藥有序痊愈可期執方無權迄未有所濟也此外更有濕䘌一證鼻爛汁臭下部生瘡鼻衂名酒食衂或隨車馬打撲傷損致血淖溢發為鼻衂名折傷衂簡易方鼻證歌云肺之開闔鼻為之升降陽隂總在斯鼻觀故為清氣道主聞香臭内和宜清涕鼻洞肺傷風腦冷常常出濁膿經脉壅時還上衂鼻生息肉久為齆六滛外至情中鬱飲食不莭并勞役遂令清濁不能分隨氣上行還壅塞若致泥丸泪亂時諸證變生非止一鼻頭㣲白知亡血酒赤瘰肺風熱時行衂血二三升龍骨止之真妙訣鼻塞氣息不通附論夫鼻塞氣息不通者以肺感風寒其氣摶結不得宣快窒塞既甚而息不能出入也巢氏謂息肉生長致氣窒塞不通盖有未嘗生息肉而氣息不通者宜析而治之肺氣通於鼻其若臓為冷風所傷故鼻氣不通成齆也為冷氣結聚搏於血氣則生肉冷氣盛者則息肉至窒塞不通也方蜀椒湯治鼻塞氣息不通蜀椒去目及閉口者炒出汗半兩乾薑炮一分附子炮裂去皮臍半兩肉桂去麄皮一分山芋三分細辛去苖葉半两石斛去根一分山茱茰半兩麻黄去根節白附子炮甘草炙各半兩杏仁五十粒去皮尖雙仁炒研右剉如麻豆大毎服二錢水一盞煎七分空心去滓温服桞金散治肺熱鼻塞涕濁利細辛白芷與防風羗活川歸半夏藭桔梗陳皮􅀢苓軰十般等分咀和同二錢薄荷薑煎服氣息調勻鼻貫通辛夷湯治肺氣不利頭目昏眩鼻塞聲重咯嚀稠粘辛夷去毛甘菊花去皮節呉白芷川藭前胡去蘆頭薄荷葉去土石膏白术生乾地黄赤茯苓去皮陳橘皮去白已上各一兩甘草炙二兩右為麄末毎服五錢水一盞煎至半盞去滓温服食後日三服芎藭散治外傷風冷鼻塞氣息不通閉悶芎藭檳榔人參去蘆頭赤茯苓杏仁湯浸去皮尖微炒已上各等分白术麻黄去根節肉桂去皮郁李仁湯浸去皮尖㣲炒甘草炙微炒等分右為散毎用五錢水一大盞生薑二錢作同煎至七分去滓食後温服通鼻膏一名辛夷膏治鼻塞窒香臭不聞妨悶疼痛或腦戸受寒濃涕結聚白芷芎藭通草各十八銖當歸細辛莽草一方作薫草辛夷各二十銖右㕮咀以苦酒漬一宿以不中水猪肪一升煎三上三下以白芷色黄膏成去滓綿沾棗核大内鼻中三日小品加桂心十八銖醍醐散治傷風鼻塞聲重川烏炮去皮臍撫芎甘草白芷各二兩川芎一兩細辛半兩龍腦薄荷一兩半右為細末毎服一大錢葱白茶清湯調下薄荷湯亦得人參湯治肺風上攻鼻塞不通人參白茯苓去黒皮黄芩去黒心陳橘皮湯浸去白炒麻黄去根節羗活去蘆頭各半兩蜀椒去目及閉口者炒出汗半兩右麄搗篩每服三錢水一中半煎至七分去滓食後温服人參丸出御藥院方治肺風上攻鼻塞不通人參防風去蘆細辛去苖葉黄耆剉沙參木通剉甘菊花右為末煉蜜和丸如梧桐子毎服十丸温水下日再當歸膏一名合膏治鼻塞不利不聞香臭出聖惠方當歸切焙地薫草木通一作通草細辛去苖葉㽔仁研各三分芎藭白芷各半兩右細剉以羊髓四兩同内銀石器中入諸藥微火煎三上三下候白芷黄色膏成去滓傾入合中澄凝毎以小豆大綿裹塞入鼻中日三先患熱後鼻中生赤爛瘡以黄芩梔子代當歸細辛通闗散出御藥院方治腦風鼻息不通不聞香臭或鼻流清涕多啑肩項拘急頭目昏痛風腑怯寒原蚕蛾丸上炒黄白附子製苦參益智去皮蒺䔧子炒出角乾薄荷各一兩增損防風通聖散出御藥院方治肺氣不和鼻不利黍粘子桔梗桑白皮紫苑茸已上各半兩荆芥穗四兩甘草二兩已上各生用右麄末防風通聖各一半和勻毎服八錢水一盞半生薑五片同煎去滓温服食後補肺杏仁煎治肺傷寒氣欬𠻳唾痰聲重鼻塞氣息不通杏仁去皮尖雙仁二兩研棗肉煑去皮核一升白蜜酥半兩生薑汁各半兩餳一升右合和於銀石噐中㣲火煎攪候熟毎服一匙頭温酒調下食後服皂莢散出聖惠方治鼻塞不通皂莢炙去皮并子細辛去苗葉辛夷蜀椒去目及閉口者炒出汗附子炮裂去皮臍各一分右為散毎以少許吹入鼻中用半錢綿裹塞鼻中亦得木通丸出聖惠方治鼻塞氣息不通不聞香臭并有息肉及鼻齆木通剉細辛附子炮裂去皮臍已上各一兩右為末煉蜜和丸如棗核大毎夜臨卧内一丸於鼻中差蓽澄茄丸出御藥院方治鼻塞不通蓽澄茄半兩薄荷葉三錢荆芥穗一錢半右為細末糖霜蜜和丸如櫻桃大毎服一丸時時噙化嚥津菖蒲散一名皂角散治鼻窒塞不通不得喘息出聖惠方菖蒲皂角炙去皮子各一兩右為散毎服一錢綿裹塞鼻中仰卧少時治鼻中窒塞氣息不通者皆已有内柱柱若不出終不能差餘藥雖暫通利旋復長生宜服此方出聖惠方白雄犬膽一枚地膽二十枚右先搗羅地膽為細散内犬膽中以䋲繫定三日乃於日出時令病人西首卧日中以鼻孔向日傍人以故筆粘藥塗入鼻孔中一日一度至五六日當覺鼻柱裏近眼痛此是欲落更復三四傅之漸漸嚏之即落取將捐於四通道上柱落後急以綿塞之慎風鐺墨散出危氏方治鼻窒塞氣息不通亦治乆患鼻瘡膿極臭者鐺墨半兩即百草霜為散毎服二錢温水調下槐葉湯出聖惠方治鼻窒塞氣息不通槐葉一兩以水三盞煑取二盞去槐葉下葱白二寸豉一合更煎五七沸去滓分温三服不拘時治鼻窒塞不通兼治衂血出聖惠方小薊一把水三升煑取一升去滓分服曽有人隂冷漸漸冷氣入隂囊腫滿恐死夜疼悶不能眠煑大薊根汁服之立差一方為末酒調服禦寒湯東垣先生蘭室方治寒氣風邪傷於皮毛令人鼻擁塞咳𠻳上喘黄耆二錢人參半錢炙甘草三分黄栢二分欵冬花黄連各一分防風羗活各三分佛耳草升麻半錢白芷三分蒼术七分陳皮五分右㕮咀都作一服水二大盞去滓稍熱服治鼻塞出本草用燒麻鞋灰吹鼻中立通一名千里馬即麻鞋也治酒後熱毒鼻塞身熱利大小腸以水芹葉搗絞取汁服之治鼻塞出本草以乾柿三枚細切粳米三合豉少許煎粥空心食之鼻塞不聞香臭論夫鼻有生息肉不知香臭者亦有無息肉而不知香臭者生息肉不知香臭已列方劑此始論鼻塞不聞香臭葢鼻之窒塞或冷風乗肺或肺經壅熱冷熱固異其塞則一皆肺臟不和氣不宣通故也治塞者當審其冷熱方欵冬花丸治鼻不聞香臭欵冬花檳榔剉百合麥門冬去心焙桔根炒天門冬去心焙地骨皮羚羊角鎊貝母大黄剉炒黄芩去黒心山梔子仁防風去蘆杏仁去皮尖雙仁麵炒各二兩人參一兩郁李仁去皮炒用二兩山芋茈胡去苖各一兩半百部甘草炙苦參各一兩桑根白皮剉旋復花各四兩牛黄研木香各半兩蛤蚧一對全者酥炙右為末煉蜜丸如梧桐子大毎服二十丸至三十丸食後温漿水下蓯蓉丸治頭旋鼻塞不知香臭肉蓯蓉酒浸一宿切焙山芋各一兩澤㵼石斛去根石鐘乳研成粉五味子兎絲子酒浸别搗細辛去苗葉蛇牀子炒續斷鹿茸去毛酒浸炙防風去蘆甘菊花秦艽去苖土黄耆剉乾薑炮栢子仁别研各三分右除别研搗羅為末同和勻煉蜜丸如梧桐子大毎服二十丸空心温酒下日再不飲酒棗湯下服藥三日後炙百㑹穴三七壯即貼如神膏如神膏箆麻子去殻杏仁去皮尖芎藭石子塩防風去蘆松脂各一分蠟半兩油一觔右先入油於銀器中次將諸藥作麄散入油中㣲火上煎成膏濾去滓次瓦器盛毎用約大小貼之日一換防風湯一名木通散治鼻塞不聞香臭出聖惠方防風去蘆半兩梔子去皮七枚升麻一兩石膏碎三兩麻黄去根節三分桂去麄皮半两木通剉一兩一分右麄搗篩毎服三錢水一盞煎至七分去滓空心温服日再排風散治鼻塞不通不聞香臭或生息肉生瘡防風去蘆秦艽去苖土山芋呉茱茰湯浸焙炒天雄炮裂去皮臍各一兩羗活去蘆頭半兩右為散毎服二錢空心温酒調下天門冬丸治鼻不聞香臭天門冬去心焙白茯苓去黒皮各五兩人參枳實甘草炙各三兩㯽榔剉二兩右為末煉蜜丸如梧桐子大毎服二十丸食後漿水下日再暑月以牛乳下通項散治鼻塞不聞香臭出聖惠方滑石研胡黄連末各一分𤓰蔕為末七枚麝香研半兩蟾酥研一錢右同研勻毎以少許吹入鼻中即差百部散治肺實鼻塞不聞香臭百部二兩欵冬花貝母去心白薇各一兩右為散毎服一錢米飲調下芎藭散治鼻塞不聞香臭芎藭辛夷各二兩細辛去苖葉三分木通剉半兩右為散毎以少許綿裹塞鼻中温即易之五七日差通草膏出濟生方治鼻齆氣息不通不聞香臭并有息肉通草一作木通細辛附子炮裂去皮各等分辛夷一錢右為末蜜和綿裹少許内鼻中一方無辛夷𤓰蔕散出聖惠方治鼻塞不聞香臭𤓰蔕䔧蘆各分右為散毎以一錢裹綿塞鼻中日三易一方狗膽汁和綿裹塞鼻中灌鼻蒺藜汁方出聖惠方治鼻塞多年不聞香臭清水出不止取當道車碾過蒺藜一把搗以水三升煎取煎先仰卧使人滿口含飯取一合汁灌鼻中使不過再度大嚏必出一兩箇息肉似赤蛹蟲一方黄連等分同煎治鼻不聞香臭多年日近者用三五日便能聞香臭出本事方用生葱一味三截早用葱管中截晩用葱管末稍一截塞入鼻中令透裏方得離澤通氣東垣先生蘭室方治鼻不聞香臭羗活獨活防風升麻葛根各二錢麻黄不去節一錢如冬日加之川椒一錢蒼术三錢炙甘草二錢黄耆四錢香白芷每服秤半两水二大盞生薑三片棗二枚葱白三寸同煎至一盞去滓稍熱服食逺忌一切冷物風寒凉處坐卧行立温肺湯東垣先生蘭室方治鼻不聞香臭眼多眵淚升麻黄耆丁香各二錢葛根羌活炙甘草防風根各一錢麻黄不去節四錢右為麄末分作二服水二盞葱白二握同煎至一盞去滓稍温食後服温衞湯東垣先生蘭室方治不聞香臭目中流火氣寒血熱冷淚多臍下冷汗多痿弱黄耆蒼术升麻知母柴胡羗活各一錢陳皮青皮黄連木香各三分人參炙甘草香白芷防風黄栢澤瀉各半錢當歸身一錢半右都作一服水二盞煎至一盞去滓食前温服晴明服之温衞補血湯東垣先生蘭室方治耳鳴鼻不聞香臭口不知五榖味氣不快四肢困倦不収行歩欹側毛髮脱落食不下膝冷隂汗𢃄下喉中吤吤不得卧口乾舌乾喘不息頭不可囬顧項筋𦂳脊痛頭旋眼黒頭痛欠啑升麻四分柴胡稍人參熟甘草橘皮桔梗二分半牡丹皮蒼术王𤓰根吳茱茰各二分當歸身二分半生地黄白术黄栢各一分黄耆一錢二分丁香二箇藿香分半地骨皮三分桃仁葵花生甘草半錢右㕮咀都作一服水二大盞煎至一盞半去滓食前稍熱服治鼻塞不聞香臭出本草取大棗十五枚去皮核萆麻子三百顆去皮二味和搗綿裹塞鼻日一度易三十餘日聞知香臭齆鼻論夫鼻和則知香臭夫鼻為肺之竅非能自和也必肺氣流然後鼻為用而香臭可知若心經移熱於肺致肺臓不和則其竅亦無以宣逹故為齆此内經所謂心肺有病則鼻為之不利者也或風冷傷於臓腑而邪氣乗於太隂之經則其氣藴積於鼻而津液壅塞鼻氣不通故不知香臭鼻塞而為齆也方羚羊角丸出聖惠方治鼻齆窒塞不通氣息羚羊角屑一两連翹漢防己麥門冬去心焙薯蕷㯽榔茯神已上各二分白蘚皮人參去蘆頭羗活細辛白芷當歸黄耆剉防風去蘆頭旋覆花枳殻麵炒㣲黄去瓤以上各半两右為末煉蜜和搗三五百杵丸如梧子大每於食後以温水下三十丸茯神散治肺氣壅塞鼻齆不聞香臭茯神去木一两半山芋人參各三两赤茯苓去黒皮防風去蘆防己各一两半山茱茰一两半蜀椒去目并合口者炒出汗一两甘菊花桂去麄皮細辛去苖葉芎藭貫衆白术米泔浸一宿剉碎炒各一两一分乾薑炮一两甘草炙一两半右為散每服二錢空心温酒調下日再黄耆散治齆鼻順肺氣四時服食黄耆剉人參防風去蘆防己桔梗炒芍藥黄芩去黒心生乾地黄焙澤瀉石南葉紫苑白术米泔浸一宿剉桂去麄皮甘草炙牛膝酒浸一宿切焙赤茯苓去黒皮各三两右為散每服一錢温酒調下如要丸煉蜜丸如梧桐子大每服二十丸温酒下芎藭散出直指方治鼻塞為齆芎藭㯽榔麻黄去節肉桂防己木通細辛白芷石菖蒲各一分木香川椒甘草焙各半分右剉每服三錢入生薑三片紫蘇葉少許水煎服山茱茰丸治齆鼻山茱茰菊花大黄剉炒各一两一分獨活去蘆頭二分甘草炙剉一两防風去蘆一两秦艽去苗土一两半蔓荆實去白皮一两梔子去皮炒一两附子炮裂去皮臍三分朴硝三两三分右為末煉蜜丸如梧桐子大每服二十丸空心温水下老人亦宜服姙娠去附子加細辛半分甘遂丸出湯上方治鼻齆及鼻塞不聞香臭甘遂通草細辛附子等分右為末以白雄犬膽和為丸如棗核大綿裹内鼻中辛熱涕出四五聲瘥亦治息肉一方無甘遂有甘草用羊膽汁丸一方用為末名甘遂散一方蜜丸無甘遂綿裹少許塞鼻中赤龍散治鼻齆大抵鼻者由肺主氣於鼻上榮頭面若上焦壅滯風冷客於頭腦則氣不通冷氣停滯摶於津液膿涕結聚則鼻不聞香遂成齆也龍腦半錢研𤓰蔕十四枚黄連二錢赤小豆三十粒右為細末研勻臨卧以菉豆許吹入鼻中出水愈通頂散出眞指方治鼻齆𤓰蔕䔧蘆各一分皂角肉半分麝少許右為末吹些少入鼻中雄黄散出真指方治鼻齆雄黄半錢𤓰蔕二枚緑礬一錢麝少許右為細末少吹入鼻中亦治息肉雄黄丸出聖惠方治齆雄黄研一錢甘草炙剉附子炮裂去皮臍細辛去苗葉各一分右為末用羊膽汁和丸如棗核大以綿裹内鼻中移時出惡物即瘥一方用狗膽和丸細辛丸一名甘草丸出聖惠方治齆鼻不聞香臭宜塞鼻中細辛去苗葉甘草炙木通剉附子炮裂去皮臍各一分右為散以羊膽汁和如棗核大塞鼻中一方用白雄犬膽和丸服之黄白散出醫方集成治鼻齆息肉鼻痔等證𤓰蔕一錢明礬一錢雄黄半錢華隂細辛一錢右為末以雄犬膽汁和丸綿包塞鼻中一方為末搐入鼻中治齆鼻中結肉出聖惠方青甜𤓰蔕二枚晒乾為末雄黄半錢細研麝香半錢細研右都研令勻用時先將指甲搯破鼻中肉然後貼藥在指上用之又方出聖惠方治鼻齆用炙皂莢為末如小豆大以竹筒吹入鼻中又方出聖惠方用乾薑末蜜和塞入鼻中吹亦佳亦治衂血又方用鐡鏁磨石取末以猪脂和綿裹内之經日肉出瘥塞鼻𤓰蔕散出聖惠方治齆鼻不聞香臭窒塞氣不宣通用𤓰蔕一分為散以半錢綿裹夜卧塞鼻中旦即去之先令病人伏面用新汲冷水淋至枕上後用藥一方以少許吹入鼻中又方出聖惠方用𤓰蔕白礬等分為末以猪膽和如棗核大綿裹塞鼻中經日再易之以瘥為度又方以馬新屎汁仰頭含滿口灌鼻中細辛散一名𤓰丁散治齆鼻不聞香臭方見本門鼻生息肉類斷齆法出十便良方治鼻齆極甚如息肉者右取雄鷄腎一對于脬前肉令與腎銖两等䜴七粒並於新丸上焙乾研為細末又以鷄中髓和了安在鼻中前引出蟲子忌隂人鷄犬鼻中生息肉論夫鼻者肺之竅鼻和而知香臭風寒若客於肺經則鼻氣不利致津液壅遏血氣摶結附著鼻間生若贅疣有害於息故名息肉方雄黄散治鼻中息肉摶鼻雄黄研細辛去苖葉木通剉㽔仁研皂莢炙刮去皮并子各一分白礬煆過半两礬石黄泥包煆過半两䔧蘆炙地膽𤓰蔕地榆洗去泥土䕡茹各三分巴豆去皮膜十粒炒黄右為散煎細辛白芷湯和塗傅息肉上以膠清和塗之亦得取瘥為度治息肉方出直指方甘遂明礬煨硃砂雄黄雌黄䔧蘆𤓰蔕等分右為末清蜜調𫝊如鼻齆二藥通用羊肺散出醫方集成治鼻中息肉肺氣塞壅不聞香臭羊肺一具薄切去筋膜炙令乾木通剉半两一作通草白术米泔浸一宿剉碎炒黄四两乾薑炮製肉蓯蓉酒浸一宿切焙芎藭各半两右為散每服一錢匕食後米飲調下日二一方以水調藥灌入肺中煑熱細切焙乾為末每服二錢取鼻痔全蝎一錢巴豆五粒去油丁香五粒白丁香五粒即瓦雀糞螺青一匙右為末用𤣥武膏藥鎔開入上件藥捜丸如龍眼核大臨卧用一丸安鼻内其鼻痔肉化爛了𤣥武膏藥方見膏藥門二丁散治鼻中生息肉丁香七箇赤小豆粟米各七粒苦丁香七箇石膏少許右研為細末竹筒吹入鼻中自消了鼻不聞香臭亦可吹之或有偏頭風亦可吹用消鼻痔出本事方此方緊如欲穏慢可用前方𤓰蔕炒甘遂各四錢枯白礬炒螺青炒草烏尖炒各半錢右為末用真麻油捜和成劑令硬些子不可爛旋丸如小豆大入鼻中令逹痔上其痔化為水肉皆爛下每日一次妙真珠散出聖惠方治鼻中瘜肉不通真珠白礬一作礬石桂心細辛各一两木通半两一作通草右為細散每服半錢綿裹内鼻中日三易之一方無桂心礬石散出聖惠方治鼻孔中息肉不得通礬石䔧蘆各六錢𤓰蔕二十枚附子二錢右共搗篩合和以水竹管吹藥如小豆許入鼻中以綿絮塞鼻中日再以愈為度占今録驗加葶藶半两赤龍散出儒門事親治鼻中肉螻蛄赤龍𤓰苦丁香各三十箇苦葫蘆子不以多少麝香少許右為末用紙撚蘸藥末用之青金散出儒門事親治鼻息肉閉塞疼痛芒硝青黛各半錢乳香没藥各少許右為細末鼻内㗜之礬石丸治鼻生息肉礬石熬令汁枯四两木通剉細辛去苖葉各半两丹砂研一分右為末和勻麺糊為丸如小豆大每用一丸綿裹内鼻中一日一易取下息肉則止一方蜜和丸撚綿如棗核沾散如小豆并綿納鼻中羊躑躅丸出聖惠方治鼻塞鼻中生息肉不通利羊躑躅白礬礬石細研各半两肉蓯蓉一分右為細末以青羊脂和綿裹如棗核大内鼻中日夜四五度換之以漸消爛即瘥通草散出海上方治鼻中生息肉不通利通草半两礬石真珠各一两右為末撚綿如棗核大取藥如小豆著綿頭内鼻中日三易之一方有桂心細辛各一两同前搗末和使之取鼻痔出本事方巴豆十二箇去殻陽起石三十箇石蓮心三十箇右為末每服半匙許搐入鼻中又用綿塊子蘸藥塞入鼻中其痔肉化爛出吹鼻散出本事方治鼻中息肉及黄疸及暴得黄疾苦丁香即𤓰蔕十四箇赤小豆丁香各十四箇右慢火焙乾為末入腦子少許口内先含水次將小竹管吹藥入鼻中半盞茶時末盡為度候頭疼痛時取下地膽膏出聖惠方治鼻中息肉閉塞不通腫大㸃令消生地膽細辛去苖葉白芷右等分先搗羅白芷細辛為散次將地膽壓取汁和成膏用少許塗傅息肉上取消為度亦單以地膽汁於竹筒中盛當上灌之即消無生者酒煑汁用之治鼻痔白礬火飛𤓰蔕各一錢細辛少許右為細末入麝香少許每用一匙貼在鼻内痔上一日三次不過三日即愈治鼻痔明礬一两萆麻七粒鹽梅五箇去核右為一處入麝香少許搗杵為丸綿子包塞鼻内令著息肉候化清水出四邊自然玲瓏其息肉自下治鼻中瘜肉漸大氣息不通妨悶出聖惠方䔧蘆三分去蘆頭搗為末雄黄細研雌黄細研各一方右同研令勻每用時以蜜調散用紙撚蘸藥㸃於息肉上每日三度則自消化又方細辛釡底墨右研為末水調方寸匕用紙撚蘸藥塗在息肉上每日三度𤓰丁散一名細辛散出直指方治鼻有息肉不聞香臭此藥傅之即化黄水㸃滴至盡不三四日遂愈不復作𤓰丁即𤓰蔕細辛右等分為末以綿裹如豆許塞鼻中須㬰即通鼻中息肉俗謂之鼻痔無不效富次津曽患此疾息肉已垂出鼻外以此取效地龍散一名蚯蚓散出聖惠方治鼻中息肉地龍去泥沙一分猪牙皂莢一挺右燒灰羅細先洗鼻肉令净以蜜塗之傅藥少許在内出清水盡即息肉自除胡粉膏治鼻中息肉不通胡粉炒白礬燒令汁盡等分右為末用青羊脂和成膏以少許塗傅息肉上治鼻中息肉并鼻衂出海上方用炙蝟皮為末綿裹塞之三日治鼻中息肉不聞香臭出聖惠方用燒礬石末以面脂和綿裹著鼻中數日息肉隨落又方用狗頭骨灰方寸匕苦丁香半錢研細吹鼻中瘜化為水一方細碾灰狗脂和貼之又方出危氏方用黄栢苦參㯽榔等分研末猪脂調傅又方出直指方用青黛槐花杏仁研傅𤓰蔕膏出聖惠方治鼻中息肉不聞香臭用陳𤓰蔕一分為末以羊脂和成時少許傅之一方為末少吹鼻中必消如此三四度或以綿裹末塞鼻中地膽汁出肘後方治鼻中息肉不通利用生地膽一枚取汁塗息肉上一宿得消無生者搗乾為末酒漬傅之雄黄散治鼻中息肉用雄黄五两置砂鍋中以醋煑三復時取出薄醋先夜露曉収三度細研如粉每二錢温水調下日再不出半月息肉自出神効治鼻塞息肉不通以細辛末少許吹入鼻中自通治鼻中息肉黒靨用青蒿燒灰和石灰淋汁熬為膏㸃息肉黒靨又方出聖惠方用蜣蜋十枚内青竹筒中以刀削去竹青油單裹筒口令宻内厠坑中四十九日取出曝乾入麝香少許同研細為散塗息肉上當化為水導引法治鼻息肉云端坐直腰以鼻内氣以右手捻鼻除目暗淚若出徐徐閉目吐氣鼻中息肉耳聾亦能除又云東向坐不息三通以手捻鼻两孔治鼻中息肉又方出聖惠方用釡底墨細篩水服之三五日瘥輕黄散出衞生寳鑑方治鼻中息肉輕粉一分杏仁湯浸去皮尖分及雙仁者一雌黄半两麝香少許右件四味净乳鉢内先研杏仁如泥輕粉雌黄麝香同研極細勻磁合子合定每有患者不問年深日近夜卧用骨筯子或竹㸃粳米大在鼻瘜肉上隔一日夜卧㸃一次半月見効雄黄散出朱氏集驗方治鼻痔雄黄北細辛各一錢麝香少許右三味為末搐入鼻中又方出朱氏集驗方用人中白新瓦上火逼以温湯調服即止又方出朱氏集驗方用好香墨濃研㸃入鼻中欝金散出朱氏集驗方治鼻中息肉欝金猪牙皂角各一两右用水同浸一宿火煑透欝金爛為度去皂用留欝金焙乾次用北細辛半两同為末入麝香碙砂各一錢拌勻煉蜜為丸如芥大食後煎茶下十丸治鼻生息肉出朱氏集驗方狗頭骨化灰碙砂加少許毎朝搐半錢息肉化為水治鼻中息肉鈴用丁香末以綿包内鼻中鼻痛論夫九竅氣所通也或塞之斯痛矣况鼻之為竅肺氣以時而出納若肺受風邪與正氣相搏熱氣加之不得宣通則為出納者窒矣其竅既窒而氣之鼓作無已所以乾燥而痛也方五參散治風熱塞壅鼻乾痛腦悶頭重不知香臭人參沙參丹參𤣥參苦參山芋茯神去木各一两半獨活去蘆頭細辛去苗葉麻黄去根節木通剉羚羊角鎊防風去蘆白蘚皮各一两一分山茱茰甘菊花芎藭各一两右為散每服三錢米飲調下早晩各一服没藥散出聖惠方治風冷摶於肺臓上攻於鼻則令鼻痛没藥研一分烏蛇酒浸去皮骨炙半两乾蠍天南星炮雄黄别研當歸切焙白附子炮丹砂别研牛黄别研胡黄連白芷麝香别研丁香炒甘草炙桂去麄皮各一分右除别搗羅為散再同研勻每服半錢温酒調下早晩食後服羚羊角湯治肺風面色乾白鼻燥塞痛羚羊角鎊桂去麄皮白茯苓去黒田皮細辛去苗葉麻黄去根節防風去蘆防己杏仁去皮尖雙仁炒研麥門冬去心焙各一两右麄搗篩每服三錢水一盞煎至七分去滓温服白蘚皮湯治肺受風面色枯白頰時有皮膚乾燥鼻塞乾痛此為虗風白蘚皮麥門冬去心焙白茯苓去黒皮白芷各一两半桑白皮切石膏碎各二两細辛去苖葉杏仁去皮尖雙仁炒研各一两半右粗搗末篩毎服三錢水三盞煑大豆三合取汁一盞去豆下藥煎至七分去滓早晩食後臨卧温服秦艽湯治因高聲呼吸冷風或因哀哭傷氣或飲食熱氣所衝皆致傷肺使氣喘促皮膚風痒四肢痠疼鼻塞乾痛秦艽去苖土石膏碎甘草炙桑白皮根剉升麻大黄剉砂各一两枳殻去瓤麸炒葛根各三分右粗搗篩每服三錢水一盞入淡竹葉半合煎至七分去滓温服桑白皮湯治肺壅氣促四肢痠疼鼻塞及痛桑根白皮切升麻甘草炙秦艽去苗土大黄剉砂各一两半石膏碎葛根各三两右粗搗篩每服五錢水一盞半入竹瀝一合煎至一盞去滓早晩食後臨卧温服治鼻壅塞全蝎四箇去頭足川芎二两燈心二錢乳香半錢右為末用紙撚子臨睡蘸藥入鼻内打嚏噴三五箇即瘥治鼻塞眼昏疼痛腦悶出聖惠方用苦葫蘆子碎以醇酒半升浸之夏一日冬七日少少内鼻中一方用童子小便浸之油塗方出聖惠方治鼻塞乾痛用生油一盞常以鷄羽掃塗鼻中内外酥亦得治鼻氣方出海上名方右以石亭脂以紫色為上紅色次之黄色勿用先研令極細再滴水數㸃和研半日許臨卧隨多寡以冷水調勻痛擦患處明早浣去用之半月可絶除根治卒食物從鼻中縮入腦中介介不出出肘後方以牛脂若羊脂如指頭大内鼻中以鼻吸取脂湏臾脂着物與脂俱出鴈鴨脂亦可用白芷散出直指方治鼻痛杏仁去皮水浸焙細辛白芷各一錢全蝎四箇焙右為末麻油調傅治鼻痛出聖惠方右以杏仁五两去皮壓取油塗之即瘥又傅塗出澹寮方右用上品硫黄為末冷水調傅鼻上夜間用傅免妨見人也普濟方卷五十六
