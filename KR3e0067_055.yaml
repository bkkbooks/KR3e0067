body:
  text: 普濟方卷五十六明周王朱橚撰鼻門總論夫肺為五臟華蓋開竅於鼻肺氣和則鼻亦和肺感風冷則為清涕為齆為息肉為不聞香臭肺實熱則為瘡為痛膽移熱於腦則濁涕不已謂之鼻淵惟證候不同故治療亦異肺為氣之主通竅於鼻鼻者清氣出入之道路也隂陽升降氣血和平則一呼一吸榮衛行焉其或七情內蠧六氣外傷則清濁不分泥丸汨亂諸證迭起矣夫血之與氣相隨而行若臟腑生熱乘於血氣故熱氣迫血妄行自鼻孔出謂之衄熱則津液中乾冷則髓涕流注若風冷隨氣乘於鼻腦則津液交涕不能自收謂之流涕肺為風寒所傷津液冷滯鼻氣不宣香臭不聞於是壅作鼻齆冷氣停聚肺血隂凝歲月淹延轉加壅結於是變生息肉或風邪入鼻搏於正氣邪正相擊或氣結疊道不通則為鼻痛或氣血壅滯上焦生熱邪熱之氣留伏不散則為鼻瘡以上數證七情六氣皆當究其感受之原用藥有序痊愈可期執方無權迄未有所濟也此外更有濕𧈟一證鼻爛汁臭下部生瘡鼻衄名酒食衄或隨車馬打撲傷損致血淖溢發為鼻衄名折傷衄簡易方鼻證歌云肺之開闔鼻為之升降陽隂總在斯鼻觀故為清氣道主聞香臭內和宜清涕鼻洞肺傷風腦冷常常出濁膿經脈壅時還上衄鼻生息肉久為齆六淫外至情中鬱飲食不莭并勞役遂令清濁不能分隨氣上行還壅塞若致泥丸泪亂時諸證變生非止一鼻頭微白知亡血酒赤瘰肺風熱時行衄血二三升龍骨止之真妙訣鼻塞氣息不通附論夫鼻塞氣息不通者以肺感風寒其氣摶結不得宣快窒塞既甚而息不能出入也巢氏謂息肉生長致氣窒塞不通蓋有未嘗生息肉而氣息不通者宜析而治之肺氣通於鼻其若臟為冷風所傷故鼻氣不通成齆也為冷氣結聚搏於血氣則生肉冷氣盛者則息肉至窒塞不通也方蜀椒湯治鼻塞氣息不通蜀椒去目及閉口者炒出汗半兩乾薑炮一分附子炮裂去皮臍半兩肉桂去粗皮一分山芋三分細辛去苖葉半兩石斛去根一分山茱茰半兩麻黃去根節白附子炮甘草炙各半兩杏仁五十粒去皮尖雙仁炒研右銼如麻豆大每服二錢水一盞煎七分空心去滓溫服桞金散治肺熱鼻塞涕濁利細辛白芷與防風羌活川歸半夏藭桔梗陳皮􅀢苓輩十般等分咀和同二錢薄荷薑煎服氣息調勻鼻貫通辛夷湯治肺氣不利頭目昏眩鼻塞聲重咯嚀稠粘辛夷去毛甘菊花去皮節吳白芷川藭前胡去蘆頭薄荷葉去土石膏白术生乾地黃赤茯苓去皮陳橘皮去白已上各一兩甘草炙二兩右為粗末每服五錢水一盞煎至半盞去滓溫服食後日三服芎藭散治外傷風冷鼻塞氣息不通閉悶芎藭檳榔人參去蘆頭赤茯苓杏仁湯浸去皮尖微炒已上各等分白术麻黃去根節肉桂去皮郁李仁湯浸去皮尖微炒甘草炙微炒等分右為散每用五錢水一大盞生薑二錢作同煎至七分去滓食後溫服通鼻膏一名辛夷膏治鼻塞窒香臭不聞妨悶疼痛或腦戶受寒濃涕結聚白芷芎藭通草各十八銖當歸細辛莽草一方作薰草辛夷各二十銖右㕮咀以苦酒漬一宿以不中水豬肪一升煎三上三下以白芷色黃膏成去滓綿沾棗核大內鼻中三日小品加桂心十八銖醍醐散治傷風鼻塞聲重川烏炮去皮臍撫芎甘草白芷各二兩川芎一兩細辛半兩龍腦薄荷一兩半右為細末每服一大錢蔥白茶清湯調下薄荷湯亦得人參湯治肺風上攻鼻塞不通人參白茯苓去黑皮黃芩去黑心陳橘皮湯浸去白炒麻黃去根節羌活去蘆頭各半兩蜀椒去目及閉口者炒出汗半兩右粗搗篩每服三錢水一中半煎至七分去滓食後溫服人參丸出御藥院方治肺風上攻鼻塞不通人參防風去蘆細辛去苖葉黃耆銼沙參木通銼甘菊花右為末煉蜜和丸如梧桐子每服十丸溫水下日再當歸膏一名合膏治鼻塞不利不聞香臭出聖惠方當歸切焙地薰草木通一作通草細辛去苖葉㽔仁研各三分芎藭白芷各半兩右細銼以羊髓四兩同內銀石器中入諸藥微火煎三上三下候白芷黃色膏成去滓傾入合中澄凝每以小豆大綿裹塞入鼻中日三先患熱後鼻中生赤爛瘡以黃芩梔子代當歸細辛通關散出御藥院方治腦風鼻息不通不聞香臭或鼻流清涕多喋肩項拘急頭目昏痛風腑怯寒原蠶蛾丸上炒黃白附子製苦參益智去皮蒺䔧子炒出角乾薄荷各一兩增損防風通聖散出御藥院方治肺氣不和鼻不利黍粘子桔梗桑白皮紫苑茸已上各半兩荆芥穗四兩甘草二兩已上各生用右粗末防風通聖各一半和勻每服八錢水一盞半生薑五片同煎去滓溫服食後補肺杏仁煎治肺傷寒氣咳嗽唾痰聲重鼻塞氣息不通杏仁去皮尖雙仁二兩研棗肉煮去皮核一升白蜜酥半兩生薑汁各半兩餳一升右合和於銀石器中微火煎攪候熟每服一匙頭溫酒調下食後服皂莢散出聖惠方治鼻塞不通皂莢炙去皮并子細辛去苗葉辛夷蜀椒去目及閉口者炒出汗附子炮裂去皮臍各一分右為散每以少許吹入鼻中用半錢綿裹塞鼻中亦得木通丸出聖惠方治鼻塞氣息不通不聞香臭并有息肉及鼻齆木通銼細辛附子炮裂去皮臍已上各一兩右為末煉蜜和丸如棗核大每夜臨卧內一丸於鼻中差蓽澄茄丸出御藥院方治鼻塞不通蓽澄茄半兩薄荷葉三錢荆芥穗一錢半右為細末糖霜蜜和丸如櫻桃大每服一丸時時噙化咽津菖蒲散一名皂角散治鼻窒塞不通不得喘息出聖惠方菖蒲皂角炙去皮子各一兩右為散每服一錢綿裹塞鼻中仰卧少時治鼻中窒塞氣息不通者皆已有內柱柱若不出終不能差餘藥雖暫通利旋復長生宜服此方出聖惠方白雄犬膽一枚地膽二十枚右先搗羅地膽為細散內犬膽中以繩繫定三日乃於日出時令病人西首卧日中以鼻孔向日傍人以故筆粘藥塗入鼻孔中一日一度至五六日當覺鼻柱裏近眼痛此是欲落更復三四傅之漸漸嚏之即落取將捐於四通道上柱落後急以綿塞之慎風鐺墨散出危氏方治鼻窒塞氣息不通亦治久患鼻瘡膿極臭者鐺墨半兩即百草霜為散每服二錢溫水調下槐葉湯出聖惠方治鼻窒塞氣息不通槐葉一兩以水三盞煮取二盞去槐葉下蔥白二寸豉一合更煎五七沸去滓分溫三服不拘時治鼻窒塞不通兼治衄血出聖惠方小薊一把水三升煮取一升去滓分服曽有人隂冷漸漸冷氣入隂囊腫滿恐死夜疼悶不能眠煮大薊根汁服之立差一方為末酒調服禦寒湯東垣先生蘭室方治寒氣風邪傷於皮毛令人鼻擁塞咳嗽上喘黃耆二錢人參半錢炙甘草三分黃柏二分欵冬花黃連各一分防風羌活各三分佛耳草升麻半錢白芷三分蒼术七分陳皮五分右㕮咀都作一服水二大盞去滓稍熱服治鼻塞出本草用燒麻鞋灰吹鼻中立通一名千里馬即麻鞋也治酒後熱毒鼻塞身熱利大小腸以水芹葉搗絞取汁服之治鼻塞出本草以乾柿三枚細切粳米三合豉少許煎粥空心食之鼻塞不聞香臭論夫鼻有生息肉不知香臭者亦有無息肉而不知香臭者生息肉不知香臭已列方劑此始論鼻塞不聞香臭蓋鼻之窒塞或冷風乘肺或肺經壅熱冷熱固異其塞則一皆肺臟不和氣不宣通故也治塞者當審其冷熱方欵冬花丸治鼻不聞香臭欵冬花檳榔銼百合麥門冬去心焙桔根炒天門冬去心焙地骨皮羚羊角鎊貝母大黃銼炒黃芩去黑心山梔子仁防風去蘆杏仁去皮尖雙仁麵炒各二兩人參一兩郁李仁去皮炒用二兩山芋茈胡去苖各一兩半百部甘草炙苦參各一兩桑根白皮銼旋復花各四兩牛黃研木香各半兩蛤蚧一對全者酥炙右為末煉蜜丸如梧桐子大每服二十丸至三十丸食後溫漿水下蓯蓉丸治頭旋鼻塞不知香臭肉蓯蓉酒浸一宿切焙山芋各一兩澤㵼石斛去根石鐘乳研成粉五味子兔絲子酒浸别搗細辛去苗葉蛇牀子炒續斷鹿茸去毛酒浸炙防風去蘆甘菊花秦艽去苖土黃耆銼乾薑炮柏子仁别研各三分右除别研搗羅為末同和勻煉蜜丸如梧桐子大每服二十丸空心溫酒下日再不飲酒棗湯下服藥三日後炙百會穴三七壯即貼如神膏如神膏箆麻子去殼杏仁去皮尖芎藭石子鹽防風去蘆松脂各一分蠟半兩油一斤右先入油於銀器中次將諸藥作粗散入油中微火上煎成膏濾去滓次瓦器盛每用約大小貼之日一換防風湯一名木通散治鼻塞不聞香臭出聖惠方防風去蘆半兩梔子去皮七枚升麻一兩石膏碎三兩麻黃去根節三分桂去粗皮半兩木通銼一兩一分右粗搗篩每服三錢水一盞煎至七分去滓空心溫服日再排風散治鼻塞不通不聞香臭或生息肉生瘡防風去蘆秦艽去苖土山芋吳茱茰湯浸焙炒天雄炮裂去皮臍各一兩羌活去蘆頭半兩右為散每服二錢空心溫酒調下天門冬丸治鼻不聞香臭天門冬去心焙白茯苓去黑皮各五兩人參枳實甘草炙各三兩檳榔銼二兩右為末煉蜜丸如梧桐子大每服二十丸食後漿水下日再暑月以牛乳下通項散治鼻塞不聞香臭出聖惠方滑石研胡黃連末各一分瓜蒂為末七枚麝香研半兩蟾酥研一錢右同研勻每以少許吹入鼻中即差百部散治肺實鼻塞不聞香臭百部二兩欵冬花貝母去心白薇各一兩右為散每服一錢米飲調下芎藭散治鼻塞不聞香臭芎藭辛夷各二兩細辛去苖葉三分木通銼半兩右為散每以少許綿裹塞鼻中溫即易之五七日差通草膏出濟生方治鼻齆氣息不通不聞香臭并有息肉通草一作木通細辛附子炮裂去皮各等分辛夷一錢右為末蜜和綿裹少許內鼻中一方無辛夷瓜蒂散出聖惠方治鼻塞不聞香臭瓜蒂䔧蘆各分右為散每以一錢裹綿塞鼻中日三易一方狗膽汁和綿裹塞鼻中灌鼻蒺藜汁方出聖惠方治鼻塞多年不聞香臭清水出不止取當道車碾過蒺藜一把搗以水三升煎取煎先仰卧使人滿口含飯取一合汁灌鼻中使不過再度大嚏必出一兩箇息肉似赤蛹蟲一方黃連等分同煎治鼻不聞香臭多年日近者用三五日便能聞香臭出本事方用生蔥一味三截早用蔥管中截晚用蔥管末稍一截塞入鼻中令透裏方得離澤通氣東垣先生蘭室方治鼻不聞香臭羌活獨活防風升麻葛根各二錢麻黃不去節一錢如冬日加之川椒一錢蒼术三錢炙甘草二錢黃耆四錢香白芷每服稱半兩水二大盞生薑三片棗二枚蔥白三寸同煎至一盞去滓稍熱服食逺忌一切冷物風寒涼處坐卧行立溫肺湯東垣先生蘭室方治鼻不聞香臭眼多眵淚升麻黃耆丁香各二錢葛根羌活炙甘草防風根各一錢麻黃不去節四錢右為粗末分作二服水二盞蔥白二握同煎至一盞去滓稍溫食後服溫衛湯東垣先生蘭室方治不聞香臭目中流火氣寒血熱冷淚多臍下冷汗多痿弱黃耆蒼术升麻知母柴胡羌活各一錢陳皮青皮黃連木香各三分人參炙甘草香白芷防風黃柏澤瀉各半錢當歸身一錢半右都作一服水二盞煎至一盞去滓食前溫服晴明服之溫衛補血湯東垣先生蘭室方治耳鳴鼻不聞香臭口不知五榖味氣不快四肢困倦不收行步欹側毛髮脫落食不下膝冷隂汗𢃄下喉中吤吤不得卧口乾舌乾喘不息頭不可回顧項筋緊脊痛頭旋眼黑頭痛欠喋升麻四分柴胡稍人參熟甘草橘皮桔梗二分半牡丹皮蒼术王瓜根吳茱茰各二分當歸身二分半生地黃白术黃柏各一分黃耆一錢二分丁香二箇藿香分半地骨皮三分桃仁葵花生甘草半錢右㕮咀都作一服水二大盞煎至一盞半去滓食前稍熱服治鼻塞不聞香臭出本草取大棗十五枚去皮核萆麻子三百顆去皮二味和搗綿裹塞鼻日一度易三十餘日聞知香臭齆鼻論夫鼻和則知香臭夫鼻為肺之竅非能自和也必肺氣流然後鼻為用而香臭可知若心經移熱於肺致肺臟不和則其竅亦無以宣逹故為齆此內經所謂心肺有病則鼻為之不利者也或風冷傷於臟腑而邪氣乘於太隂之經則其氣藴積於鼻而津液壅塞鼻氣不通故不知香臭鼻塞而為齆也方羚羊角丸出聖惠方治鼻齆窒塞不通氣息羚羊角屑一兩連翹漢防己麥門冬去心焙薯蕷檳榔茯神已上各二分白蘚皮人參去蘆頭羌活細辛白芷當歸黃耆銼防風去蘆頭旋覆花枳殼麵炒微黃去瓤以上各半兩右為末煉蜜和搗三五百杵丸如梧子大每於食後以溫水下三十丸茯神散治肺氣壅塞鼻齆不聞香臭茯神去木一兩半山芋人參各三兩赤茯苓去黑皮防風去蘆防己各一兩半山茱茰一兩半蜀椒去目并合口者炒出汗一兩甘菊花桂去粗皮細辛去苖葉芎藭貫衆白术米泔浸一宿銼碎炒各一兩一分乾薑炮一兩甘草炙一兩半右為散每服二錢空心溫酒調下日再黃耆散治齆鼻順肺氣四時服食黃耆銼人參防風去蘆防己桔梗炒芍藥黃芩去黑心生乾地黃焙澤瀉石南葉紫苑白术米泔浸一宿銼桂去粗皮甘草炙牛膝酒浸一宿切焙赤茯苓去黑皮各三兩右為散每服一錢溫酒調下如要丸煉蜜丸如梧桐子大每服二十丸溫酒下芎藭散出直指方治鼻塞為齆芎藭檳榔麻黃去節肉桂防己木通細辛白芷石菖蒲各一分木香川椒甘草焙各半分右銼每服三錢入生薑三片紫蘇葉少許水煎服山茱茰丸治齆鼻山茱茰菊花大黃銼炒各一兩一分獨活去蘆頭二分甘草炙銼一兩防風去蘆一兩秦艽去苗土一兩半蔓荆實去白皮一兩梔子去皮炒一兩附子炮裂去皮臍三分朴硝三兩三分右為末煉蜜丸如梧桐子大每服二十丸空心溫水下老人亦宜服妊娠去附子加細辛半分甘遂丸出湯上方治鼻齆及鼻塞不聞香臭甘遂通草細辛附子等分右為末以白雄犬膽和為丸如棗核大綿裹內鼻中辛熱涕出四五聲瘥亦治息肉一方無甘遂有甘草用羊膽汁丸一方用為末名甘遂散一方蜜丸無甘遂綿裹少許塞鼻中赤龍散治鼻齆大抵鼻者由肺主氣於鼻上榮頭面若上焦壅滯風冷客於頭腦則氣不通冷氣停滯摶於津液膿涕結聚則鼻不聞香遂成齆也龍腦半錢研瓜蒂十四枚黃連二錢赤小豆三十粒右為細末研勻臨卧以菉豆許吹入鼻中出水愈通頂散出真指方治鼻齆瓜蒂䔧蘆各一分皂角肉半分麝少許右為末吹些少入鼻中雄黃散出真指方治鼻齆雄黃半錢瓜蒂二枚緑礬一錢麝少許右為細末少吹入鼻中亦治息肉雄黃丸出聖惠方治齆雄黃研一錢甘草炙銼附子炮裂去皮臍細辛去苗葉各一分右為末用羊膽汁和丸如棗核大以綿裹內鼻中移時出惡物即瘥一方用狗膽和丸細辛丸一名甘草丸出聖惠方治齆鼻不聞香臭宜塞鼻中細辛去苗葉甘草炙木通銼附子炮裂去皮臍各一分右為散以羊膽汁和如棗核大塞鼻中一方用白雄犬膽和丸服之黃白散出醫方集成治鼻齆息肉鼻痔等證瓜蒂一錢明礬一錢雄黃半錢華隂細辛一錢右為末以雄犬膽汁和丸綿包塞鼻中一方為末搐入鼻中治齆鼻中結肉出聖惠方青甜瓜蒂二枚晒乾為末雄黃半錢細研麝香半錢細研右都研令勻用時先將指甲搯破鼻中肉然後貼藥在指上用之又方出聖惠方治鼻齆用炙皂莢為末如小豆大以竹筒吹入鼻中又方出聖惠方用乾薑末蜜和塞入鼻中吹亦佳亦治衄血又方用鐡鎖磨石取末以豬脂和綿裹內之經日肉出瘥塞鼻瓜蒂散出聖惠方治齆鼻不聞香臭窒塞氣不宣通用瓜蒂一分為散以半錢綿裹夜卧塞鼻中旦即去之先令病人伏面用新汲冷水淋至枕上後用藥一方以少許吹入鼻中又方出聖惠方用瓜蒂白礬等分為末以豬膽和如棗核大綿裹塞鼻中經日再易之以瘥為度又方以馬新屎汁仰頭含滿口灌鼻中細辛散一名瓜丁散治齆鼻不聞香臭方見本門鼻生息肉類斷齆法出十便良方治鼻齆極甚如息肉者右取雄雞腎一對于脬前肉令與腎銖兩等䜴七粒並於新丸上焙乾研為細末又以雞中髓和了安在鼻中前引出蟲子忌隂人雞犬鼻中生息肉論夫鼻者肺之竅鼻和而知香臭風寒若客於肺經則鼻氣不利致津液壅遏血氣摶結附著鼻間生若贅疣有害於息故名息肉方雄黃散治鼻中息肉摶鼻雄黃研細辛去苖葉木通銼㽔仁研皂莢炙刮去皮并子各一分白礬煆過半兩礬石黃泥包煆過半兩䔧蘆炙地膽瓜蒂地榆洗去泥土䕡茹各三分巴豆去皮膜十粒炒黃右為散煎細辛白芷湯和塗傅息肉上以膠清和塗之亦得取瘥為度治息肉方出直指方甘遂明礬煨硃砂雄黃雌黃䔧蘆瓜蒂等分右為末清蜜調傳如鼻齆二藥通用羊肺散出醫方集成治鼻中息肉肺氣塞壅不聞香臭羊肺一具薄切去筋膜炙令乾木通銼半兩一作通草白术米泔浸一宿銼碎炒黃四兩乾薑炮製肉蓯蓉酒浸一宿切焙芎藭各半兩右為散每服一錢匕食後米飲調下日二一方以水調藥灌入肺中煮熱細切焙乾為末每服二錢取鼻痔全蝎一錢巴豆五粒去油丁香五粒白丁香五粒即瓦雀糞螺青一匙右為末用玄武膏藥鎔開入上件藥搜丸如龍眼核大臨卧用一丸安鼻內其鼻痔肉化爛了玄武膏藥方見膏藥門二丁散治鼻中生息肉丁香七箇赤小豆粟米各七粒苦丁香七箇石膏少許右研為細末竹筒吹入鼻中自消了鼻不聞香臭亦可吹之或有偏頭風亦可吹用消鼻痔出本事方此方緊如欲穩慢可用前方瓜蒂炒甘遂各四錢枯白礬炒螺青炒草烏尖炒各半錢右為末用真麻油搜和成劑令硬些子不可爛旋丸如小豆大入鼻中令逹痔上其痔化為水肉皆爛下每日一次妙真珠散出聖惠方治鼻中瘜肉不通真珠白礬一作礬石桂心細辛各一兩木通半兩一作通草右為細散每服半錢綿裹內鼻中日三易之一方無桂心礬石散出聖惠方治鼻孔中息肉不得通礬石䔧蘆各六錢瓜蒂二十枚附子二錢右共搗篩合和以水竹管吹藥如小豆許入鼻中以綿絮塞鼻中日再以愈為度占今録驗加葶藶半兩赤龍散出儒門事親治鼻中肉螻蛄赤龍瓜苦丁香各三十箇苦葫蘆子不以多少麝香少許右為末用紙撚蘸藥末用之青金散出儒門事親治鼻息肉閉塞疼痛芒硝青黛各半錢乳香沒藥各少許右為細末鼻內嗅之礬石丸治鼻生息肉礬石熬令汁枯四兩木通銼細辛去苖葉各半兩丹砂研一分右為末和勻麵糊為丸如小豆大每用一丸綿裹內鼻中一日一易取下息肉則止一方蜜和丸撚綿如棗核沾散如小豆并綿納鼻中羊躑躅丸出聖惠方治鼻塞鼻中生息肉不通利羊躑躅白礬礬石細研各半兩肉蓯蓉一分右為細末以青羊脂和綿裹如棗核大內鼻中日夜四五度換之以漸消爛即瘥通草散出海上方治鼻中生息肉不通利通草半兩礬石真珠各一兩右為末撚綿如棗核大取藥如小豆著綿頭內鼻中日三易之一方有桂心細辛各一兩同前搗末和使之取鼻痔出本事方巴豆十二箇去殼陽起石三十箇石蓮心三十箇右為末每服半匙許搐入鼻中又用綿塊子蘸藥塞入鼻中其痔肉化爛出吹鼻散出本事方治鼻中息肉及黃疸及暴得黃疾苦丁香即瓜蒂十四箇赤小豆丁香各十四箇右慢火焙乾為末入腦子少許口內先含水次將小竹管吹藥入鼻中半盞茶時末盡為度候頭疼痛時取下地膽膏出聖惠方治鼻中息肉閉塞不通腫大點令消生地膽細辛去苖葉白芷右等分先搗羅白芷細辛為散次將地膽壓取汁和成膏用少許塗傅息肉上取消為度亦單以地膽汁於竹筒中盛當上灌之即消無生者酒煮汁用之治鼻痔白礬火飛瓜蒂各一錢細辛少許右為細末入麝香少許每用一匙貼在鼻內痔上一日三次不過三日即愈治鼻痔明礬一兩萆麻七粒鹽梅五箇去核右為一處入麝香少許搗杵為丸綿子包塞鼻內令著息肉候化清水出四邊自然玲瓏其息肉自下治鼻中瘜肉漸大氣息不通妨悶出聖惠方䔧蘆三分去蘆頭搗為末雄黃細研雌黃細研各一方右同研令勻每用時以蜜調散用紙撚蘸藥點於息肉上每日三度則自消化又方細辛釡底墨右研為末水調方寸匕用紙撚蘸藥塗在息肉上每日三度瓜丁散一名細辛散出直指方治鼻有息肉不聞香臭此藥傅之即化黃水點滴至盡不三四日遂愈不復作瓜丁即瓜蒂細辛右等分為末以綿裹如豆許塞鼻中須臾即通鼻中息肉俗謂之鼻痔無不效富次津曽患此疾息肉已垂出鼻外以此取效地龍散一名蚯蚓散出聖惠方治鼻中息肉地龍去泥沙一分豬牙皂莢一挺右燒灰羅細先洗鼻肉令淨以蜜塗之傅藥少許在內出清水盡即息肉自除胡粉膏治鼻中息肉不通胡粉炒白礬燒令汁盡等分右為末用青羊脂和成膏以少許塗傅息肉上治鼻中息肉并鼻衄出海上方用炙蝟皮為末綿裹塞之三日治鼻中息肉不聞香臭出聖惠方用燒礬石末以面脂和綿裹著鼻中數日息肉隨落又方用狗頭骨灰方寸匕苦丁香半錢研細吹鼻中瘜化為水一方細碾灰狗脂和貼之又方出危氏方用黃柏苦參檳榔等分研末豬脂調傅又方出直指方用青黛槐花杏仁研傅瓜蒂膏出聖惠方治鼻中息肉不聞香臭用陳瓜蒂一分為末以羊脂和成時少許傅之一方為末少吹鼻中必消如此三四度或以綿裹末塞鼻中地膽汁出肘後方治鼻中息肉不通利用生地膽一枚取汁塗息肉上一宿得消無生者搗乾為末酒漬傅之雄黃散治鼻中息肉用雄黃五兩置砂鍋中以醋煮三復時取出薄醋先夜露曉收三度細研如粉每二錢溫水調下日再不出半月息肉自出神效治鼻塞息肉不通以細辛末少許吹入鼻中自通治鼻中息肉黑靨用青蒿燒灰和石灰淋汁熬為膏點息肉黑靨又方出聖惠方用蜣蜋十枚內青竹筒中以刀削去竹青油單裹筒口令密內厠坑中四十九日取出曝乾入麝香少許同研細為散塗息肉上當化為水導引法治鼻息肉云端坐直腰以鼻內氣以右手捻鼻除目暗淚若出徐徐閉目吐氣鼻中息肉耳聾亦能除又云東向坐不息三通以手捻鼻兩孔治鼻中息肉又方出聖惠方用釡底墨細篩水服之三五日瘥輕黃散出衛生寶鑑方治鼻中息肉輕粉一分杏仁湯浸去皮尖分及雙仁者一雌黃半兩麝香少許右件四味淨乳鉢內先研杏仁如泥輕粉雌黃麝香同研極細勻磁合子合定每有患者不問年深日近夜卧用骨筯子或竹點粳米大在鼻瘜肉上隔一日夜卧點一次半月見效雄黃散出朱氏集驗方治鼻痔雄黃北細辛各一錢麝香少許右三味為末搐入鼻中又方出朱氏集驗方用人中白新瓦上火逼以溫湯調服即止又方出朱氏集驗方用好香墨濃研點入鼻中鬱金散出朱氏集驗方治鼻中息肉鬱金豬牙皂角各一兩右用水同浸一宿火煮透鬱金爛為度去皂用留鬱金焙乾次用北細辛半兩同為末入麝香碙砂各一錢拌勻煉蜜為丸如芥大食後煎茶下十丸治鼻生息肉出朱氏集驗方狗頭骨化灰碙砂加少許每朝搐半錢息肉化為水治鼻中息肉鈴用丁香末以綿包內鼻中鼻痛論夫九竅氣所通也或塞之斯痛矣况鼻之為竅肺氣以時而出納若肺受風邪與正氣相搏熱氣加之不得宣通則為出納者窒矣其竅既窒而氣之鼓作無已所以乾燥而痛也方五參散治風熱塞壅鼻乾痛腦悶頭重不知香臭人參沙參丹參玄參苦參山芋茯神去木各一兩半獨活去蘆頭細辛去苗葉麻黃去根節木通銼羚羊角鎊防風去蘆白蘚皮各一兩一分山茱茰甘菊花芎藭各一兩右為散每服三錢米飲調下早晚各一服沒藥散出聖惠方治風冷摶於肺臟上攻於鼻則令鼻痛沒藥研一分烏蛇酒浸去皮骨炙半兩乾蠍天南星炮雄黃别研當歸切焙白附子炮丹砂别研牛黃别研胡黃連白芷麝香别研丁香炒甘草炙桂去粗皮各一分右除别搗羅為散再同研勻每服半錢溫酒調下早晚食後服羚羊角湯治肺風面色乾白鼻燥塞痛羚羊角鎊桂去粗皮白茯苓去黑田皮細辛去苗葉麻黃去根節防風去蘆防己杏仁去皮尖雙仁炒研麥門冬去心焙各一兩右粗搗篩每服三錢水一盞煎至七分去滓溫服白蘚皮湯治肺受風面色枯白頰時有皮膚乾燥鼻塞乾痛此為虗風白蘚皮麥門冬去心焙白茯苓去黑皮白芷各一兩半桑白皮切石膏碎各二兩細辛去苖葉杏仁去皮尖雙仁炒研各一兩半右粗搗末篩每服三錢水三盞煮大豆三合取汁一盞去豆下藥煎至七分去滓早晚食後臨卧溫服秦艽湯治因高聲呼吸冷風或因哀哭傷氣或飲食熱氣所衝皆致傷肺使氣喘促皮膚風癢四肢痠疼鼻塞乾痛秦艽去苖土石膏碎甘草炙桑白皮根銼升麻大黃銼砂各一兩枳殼去瓤麩炒葛根各三分右粗搗篩每服三錢水一盞入淡竹葉半合煎至七分去滓溫服桑白皮湯治肺壅氣促四肢痠疼鼻塞及痛桑根白皮切升麻甘草炙秦艽去苗土大黃銼砂各一兩半石膏碎葛根各三兩右粗搗篩每服五錢水一盞半入竹瀝一合煎至一盞去滓早晚食後臨卧溫服治鼻壅塞全蝎四箇去頭足川芎二兩燈心二錢乳香半錢右為末用紙撚子臨睡蘸藥入鼻內打嚏噴三五箇即瘥治鼻塞眼昏疼痛腦悶出聖惠方用苦葫蘆子碎以醇酒半升浸之夏一日冬七日少少內鼻中一方用童子小便浸之油塗方出聖惠方治鼻塞乾痛用生油一盞常以雞羽掃塗鼻中內外酥亦得治鼻氣方出海上名方右以石亭脂以紫色為上紅色次之黃色勿用先研令極細再滴水數點和研半日許臨卧隨多寡以冷水調勻痛擦患處明早浣去用之半月可絶除根治卒食物從鼻中縮入腦中介介不出出肘後方以牛脂若羊脂如指頭大內鼻中以鼻吸取脂須臾脂著物與脂俱出鴈鴨脂亦可用白芷散出直指方治鼻痛杏仁去皮水浸焙細辛白芷各一錢全蝎四箇焙右為末麻油調傅治鼻痛出聖惠方右以杏仁五兩去皮壓取油塗之即瘥又傅塗出淡寮方右用上品硫黃為末冷水調傅鼻上夜間用傅免妨見人也普濟方卷五十六
