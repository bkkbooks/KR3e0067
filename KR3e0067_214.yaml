信效散専治五淋檳榔麵煨三錢或五錢赤芍藥一兩右為末每服三錢水一大盞煎至七分去滓熱服一方加燈心五莖煎空心服倒換散治無問新久癃閉不通小腹急痛大黃荆芥右各另為末每服一二錢溫水調下臨時加減治結成腫實未潰小便不通者用蔥白不拘多少碎切入麻油內煎令黑色去蔥不用只收油起微熱通手逐旋塗上自消車前子散出經驗良方治諸淋閉澀不通者大抵諸淋腎與膀胱熱也腎與膀胱為表裏俱屬於隂水水入小脬中行於陰為小便也腎氣不通於陰水液之道路膀胱為津液之府津液內溢流於腎水道不通停積於脬腎熱而氣澀故水道不利小便澀故謂之淋其狀小便數而出少小腹引臍急痛又有石淋氣淋血淋行證殊異主療不同今以治之車前子滑石各一兩右為末米飮調下半錢食前日三服一方塗臍四畔約四寸水和調妙服亦可二神散出直指方専治諸淋急痛黃色海金沙七錢半滑石半兩右為細末每服二錢半多用燈心木通麥門冬草新水煎入蜜調下白薇散出危氏方専治血淋熱淋白薇擇良者芍藥各等分右為末每服二錢酒調下立效或加檳榔治五淋真定器火燒存性研為細末一兩生熟地黃末各一兩右每抄定器末一錢地黃各半錢煎木通湯調下不拘時候服神效治五淋用石決明去粗殼研細如有硬如石者即添杉木節為末用熱水調七錢七分治小便淋瀝或有或無用大蒜一個紙包煨過露一夜來日空心用新水送下苦杕散治沙淋諸淋每溺時器中剝有聲痛楚不堪用杜牛膝淨洗碎之凡一合用水五盞煎耗其四而留其一去滓以麝香乳香少許研調服又用單酒濃煎下亦可乳石散治血淋及五淋等韓安伯參議名元修尊人冒患此疾數日痛楚不可言服之遂愈右煉乳香中夾石者研細以米飲下或麥門冬湯調下每服以飢飽適中時服空心亦可治淋用生續斷絞取汁服之是馬前根治氣腫關格不通小便淋結臍下妨悶無痛用滑石八分研水麵以水五大合和攪頓服又蝦蟇小者有毒人小便祕澀臍下疼痛至死者以生䜴一合投新水半碗浸令水濃頓飲之愈理淋方用赤小豆三合慢火炒肉為末煨蔥一莖細銼暖酒調二錢溫服男女人熱淋並療治疥淋用石灰汁洗之自好治五淋用燕尿取末以冷水服五錢旦服至食時當尿尿石出治淋疾以雲母溫水和服三錢治淋渴用石鍾乳搗節篩白練裏之合諸藥草漬酒服透格散治五種淋疾勞淋血淋氣淋熱淋石淋及小便不通至甚者一名消石方用消石一兩不夾泥土雪白者生研為細末每服二錢諸淋各依湯便如後勞倦虛損則發小便不出小腹急痛葵子末煎湯下痛後便須服補虛丸散血淋小便不出時時下血疼痛滿急熱淋小便赤色淋瀝不快臍下急痛並用冷水調下氣淋小腹滿急尿後常有餘瀝木通煎湯溫調下石淋莖內痛尿不能出內引小腹急脹疼痛尿下沙石令人悶絶將藥末先入鍋子內隔紙炒至紙焦為度再研令細用溫水調下小便不通瞿麥湯下諸淋並只以冷水調下並空心下先調使藥消散即服之更以湯送下服調藥末效者服此立愈一方血淋山梔子仁煎湯調下熱淋小便赤黃芩煎湯調下氣淋滑石湯下沙淋桑白皮煎湯下利五淋治不眠療齁用榆白皮陰乾後焙杵為末每日朝夜用水五合末二錢煎如膠服瘥又方用烏石丸煎汁冷服之并止小便治五淋小便赤少莖中疼痛用冬麻子一升杵研濾汁二升和米三合煮粥著蔥椒及熱煮空心服之治諸淋用馬莧飲汁服之治淋用繁縷草滿兩手握水煮服之又方取牛耳中毛燒取半盞水服瘥一方用尾燒灰服又方取石首魚腦中枕骨燒為末飲下水服亦可治小便不利膀胱脹水氣流腫及胞轉方用水上浮萍曝乾為末服方寸日三地髓湯治五淋小便不利莖中痛欲絶用牛膝濃煎汁飲極效酒煎亦可一方以根煮服之一方槌破每兩用水二盞煎至一盞去滓一日五服有葉朝議親人患血淋流下小便盆內凝如狗溺久而有變如鼠但無足耳百治不瘥遇一村醫言服此藥雖未愈而血色漸淡久乃復舊後十年其病再作又服此藥瘥矣經驗方陳氏云豫在臨汀妻黨方守夷吾以其編類集要方見示遂刋於郡齊後卾渚得九江守王南強書云老人久苦此淋疾百藥不效偶見臨汀禁要方中用牛膝者服之而愈乃致謝云常聞郡邸有苦此者再試亦驗因檢本草自載牛膝治小便不利莖中痛欲死却用酒煮取飲今再拈出表其神效治五種淋及淋下血二升者用苧麻根兩莖切碎以水一碗半煎取半碗頻服即通大妙一方用砂石水調下髮灰散治白淋大小便不通以亂髮燒灰水服之又方治咳嗽五淋大小便不通小兒驚癎止血鼻衄以髮燒灰吹內立已治乳右發動小便淋瀝不通心神悶亂兼治氣淋用船底青苔如半雞子大以水一大盞煎五分去滓溫服日三四服酸漿酒方治小便不通氣滿悶及治卒患諸淋遺淋瀝不止小便赤澀疼痛用酸漿草一握研取自然汁與醇酒相拌和服立通不飲酒用甘草三寸生薑一棗大銼同研用井花水五分盞濾取汁和服亦得療莖中淋有石方取雞屎白半斤曝乾熬令香搗篩為末散酒服酩酊日三服到一二日當下石便當於器中尿石下為驗又療淋澀所不能療者神方取葛上亭長折斷腹腹中有白子如小米長二三分取著白板子上陰乾燥一二日藥成若有人患十年淋服三板八九年以還服二板服時以水著小杯中如棗許納藥杯中半食頃以瓜甲研當令扁扁見如水中仰頭令人㵼入咽喉中勿令近牙近則著牙齒間不盡得入咽之也藥雖微小下喉自覺至下焦淋所有頃藥作大煩急不可堪者飲麥乾飯汁藥性即止也若無麥乾飯汁但水亦可耳老小服三分一曰藥當下淋疾如膿血連連爾石去者或如指頭或青或黃男女服之皆水道去并療婦人産生後餘疾積