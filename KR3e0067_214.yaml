body:
  text: 普濟方卷二百十四明周王朱橚撰小便淋祕門小便淋祕附論夫熱結中焦則為堅下焦則為溺血令人淋閉不通此多是虛損人服大散下焦客熱所為亦有自然下焦熱者且自小可善候之凡氣淋之為病溺雖澀常有餘瀝石淋之為病莖中痛溺不得卒出膏淋之為病尿似膏自出勞淋之為病勞倦即發痛引氣衝下血淋之為病熱即發甚則尿血治之皆與血淋同凡人候鼻頭色黃小便難也醫經曰膀胱不利為癃不約為遺尿又云膀胱者州都之官津液藏焉氣化則能出矣人之有生將理失宜役用過度勞傷腎經藏熱熱留膀胱流入脬藏遂成淋病腎藏有寒寒積膀胱注於脬藏小便頻數或遺尿而不禁遂成淋病治之宜辨其寒熱熱者清利之寒者溫補之諸淋所發皆腎虛而膀胱生熱也水火不交心腎氣鬱遂使陰陽乖舛清濁相干蓄在下焦故膀胱裏急膏血沙石從小便道出焉於是有欲出淋瀝不斷之狀甚者積寒其間則令人悶絶矣大凡小腸有氣則小便澀小腸有熱則小便痛痛者為血淋不痛者為尿血敗精結者為砂精結敗者為膏金石結為石揣本揆原各從其數也熱劑之法並用流行滯氣疏利小便清解邪熱其餘調平心火此三者之綱領心清則小便自利心平則血不妄行最不可姑息用難氣得補而愈脹血得補而愈澀熱得補而愈盛水竇不行加之穀道閉遏未見其有能生者也雖然腎熱虛弱囊中受寒亦有挾冷而小便淋澀者其狀先寒戰而後泄便蓋冷氣與正氣交爭冷氣勝則寒戰而成淋正氣勝則寒戰解而得便溺也有胞系轉戾證臍下急痛小便不通凡強忍小便或尿急疾走或飽食忍尿飽食走馬忍尿入房使水氣上逆氣迫於胞故屈戾而得舒張也胞落即殂腎主水膀胱為之府水儲於膀胱而泄於小腸實相通也然小腸獨應於心者蓋陰不可以無陽水不可以無火水火既濟上下相交此榮衛所以流行而水竇間闔所以不失其司耳惟夫心腎不濟陰陽不調故內外關格而水道澀傳送失度而水道滑熱則不通冷則不禁其熱甚者小便閉而絶無其熱微者小便難而僅有腎與膀胱俱虛客熱乘之故不能制水水挾熱而行澀焉是以數起而溺有餘瀝腎與膀胱俱冷內氣不充故胞中自滑所出多而色白遇夜而盛愈多若夫下焦蓄血其與虛勞內損則便溺自遺而不知下焦虛寒不能溫制水液則便溺欲出而不禁是皆心不與腎交通故或冷或熱而滑澀隨之矣嘗以清利行之如赤茯苓麥門冬燈心車前子之類是也心氣虛小便滑利以溫和益之如乳香益智巴戟人參之類是也醫學發明云三難曰脈有太過有不及有陰陽相乘有覆有溢有關有格何謂也語曰關則不得小便格則吐逆關者甚熱之氣格者甚寒之氣是關無出之由故曰關也格無入之理故曰格也雖然關以前者陽之動也脈當見九分而浮天九也過者法曰太過減者法曰不及遂上無為溢為外關內格此陰盛之脈也關以後者陰之動也天也脈當見一寸而沉地十也過者法曰太過減者法曰不及遂入無為覆為外關內格此陽乘之脈故曰覆溢是其真藏之脈人不病而死也注曰寒在胸中遏絶不入熱在下焦壅塞不便內經云人迎大四倍於氣口名曰關關則不得小便格則吐逆夫小便者是太陽膀胱所主長生於申申者西也西者金也故金能生水金者肺也肺中伏熱水不能生是絶小便之源也人輔相天地膀胱之源自頭項下至於足故曰陽中之陽如渴而小便不通者不得降是也聖人立法皆用清燥金之正化氣薄之藥茯苓豬苓澤㵼琥珀燈心通草車前子瞿麥扁蓄之類皆為淡滲之藥能泄肺火而清肺金滋水之化源也若熱在下焦是絶其流而溺不泄也須用氣味俱厚陰中之陰藥治之昔者長安有大賈王善小便不通漸成中滿腹大堅硬如石壅塞之及復腳堅脹破裂出黃水雙睛凸出晝夜不得眠飮食不下痛苦不可名狀趙亷甫蕭文尉輩諸子求治隨往病家果病人之苦平昔未曽見問因受病之源始病不渴近添嘔噦唾以大盤藥緘示之遍示名題治中滿利小便滲泄之藥悉偹平生不經見者亦多急難措手乃辭歸從夜至旦耿耿不寐窮究其意理忽記素問有云無陽則陰無以生無陰則陽無以化又云膀胱者州都之官津液藏焉氣化則能出矣至病小便癃閉是無陰而陽氣不化者也凡謂小便之藥皆淡味滲泄為陽是氣藥陽中之陰非地方之寒水陰之中陰所化者也此乃奉養太過高粱積熱損北方之陰腎水不足膀胱腎之室久而乾涸小便不化火又逆上而為嘔噦非隔上所生也獨為關非格病也蓋此老人日熱在下焦損塞不便須治關格之法今病內關外格之病悉具死在旦夕且下焦未易愈隨先治其北方寒水兼進大苦寒氣味厚藥黃柏知母桂為引用丸如桐子大滚湯下二百丸少時來報須臾如刀刺前陰火燒之痛溺出如暴泉湧出卧具皆濕床復沉流顧盻之間腫脹消散凡大人小兒病沙石淋及五種淋澀癃閉并臍腹痛益元散主之以長流水調下蓋因熱在膀胱燥其津液故俗謂冷淋者天下之通弊也五花散減桂加益元散名淡滲散方琥珀茯苓丸治膀胱經積熱以致小便瀝閉淋澀琥珀另研細滑石用桂府者研細知母去皮頭黃柏去粗皮蛤粉赤茯苓去皮川木通去皮當歸澤㵼去頭各二兩人參山梔子仁赤芍藥白术豬苓去皮黃連大黃黃苓瞿麥扁蓄木香右為末同琥珀滑石蛤粉和均滳水和丸如桐子大每服四錢早辰空心用溫白湯送下引水散治小水祕澀不快或不通石燕海馬海蛤滑石琥珀赤茯苓川木通通草澤㵼豬苓車前子微炒茴香瞿麥穗扁蓄忘憂根木香白丁香越桃炒係山梔子仁苦葶藶紙襯炒鬼棘針各一兩右除石燕海馬外各一兩同為粗散每服五錢水一盞半燈心三十莖同煎取清汁八分入麝香一匙拌勻放溫食前服麝香少許亦可地膚子湯出三因方能治下焦熱結小便赤黃不利數起出少莖痛或血出瘟病後飮熱及霍亂後當風取涼過度飮酒房勞及行路冒熱冷飮逐熱熱結下焦及藥石熱動關格小腹堅脬脹如斗諸如此淋悉皆治之地膚子三兩一作草知母五錢研黃芩五錢切豬苓五錢切瞿麥五錢炒枳實五錢研升麻五錢通草五錢切葵子五錢研海藻洗淨五錢右㕮咀以水一斗煮取三升分三服大小便皆閉者加大黃三兩女人房勞腎中有熱小便難不利小腸痛脈沉細加豬腎一具若加腎可用水一斗半先煮腎取一斗汁然後納藥煎一方不用枳實一方用生薑煎忌食甘草通草湯出危氏方専治諸淋通草二兩切王不留行五錢切葵子二兩研茅根二兩切桃膠二兩瞿麥二兩炒當歸身一兩切蒲黃一兩研滑石一兩研甘草炙半夂右㕮咀每服四錢水一盞半薑五片煎八分去滓溫服不拘時候石韋散治腎氣不足膀胱有熱水道不通淋瀝不宣出少起數臍腹急痛蓄作有時勞倦即發或尿如豆汁或便出沙石當歸身瞿麥麵葵子脂石韋木通稍白芍藥生白术飛滑石王不留行炙甘草各等分右為末每服二錢煎小麥湯調下食前日二三服一方治百種淋密淋熱淋勞淋小便澀脬中滿小腹急痛當歸水煎服十味滑石湯出聖惠方専治患淋來積年比醫治不能得痊或治十日一發即有可時今年因病更頻數至二十日來不止滑石冬葵子瞿麥脂石韋各五分蒲黃陳橘皮芍藥白茯苓一方用赤茯苓芒硝子芩右搗篩為散空腹煮飮子服方寸日二服漸加至一大鍾忌熱麵炙肉醋蒜等一方粥飲服飮子方桑白皮白通草百合白茅根十枝新者右調銼以水四升煮取二升去滓溫下散藥口乾渴含服之亦得潦淋散石韋大蟲魄滑石茯苓全當歸芍藥黃芩冬葵子亂髮三團瞿麥右為散服方寸匕日二服忌酒麵炙肉油膩蒜鱠酢及忌熱物沉香琥珀散治諸淋澀不通皆可服琥珀屑忘憂根白通草小茴香大扁蓄木通梢血竭滑石海金沙木香各半兩右為粗末每服一兩水二盞半燈心一把竹葉十片連根蔥白三枝同煎七分去滓溫服空心食前如便塊加大黃五錢水道澀痛加山梔子五錢淋血加生地黃一兩暴流水更加極驗海金沙散治五淋澀痛澤㵼五錢研滑石研水飛豬苓五錢切海金沙五錢研脂石韋淨桂肉一錢去皮白术甘草赤茯苓芍藥右為末每服三錢水一盞燈心同煎七分空心溫服參耆湯治心虛客熱乘之小便澀數而瀝赤茯苓三分半生乾地黃二分半綿黃耆二分半桑螵蛸二分半地骨皮二分半人參二分半北五味子二分半甘草炙二分半右銼散每服三錢井水一盞煎臨熱入燈心二十一莖去滓溫服療淋方茯苓打碎切地骨皮生甘草切去稍黃芩前胡各二兩生薑切去皮麥門冬青竹葉五十片蒲黃各等分右切以水九升煮取二升六合去滓分為三服服别相去如人行七八里忌熱麵油膩海藻菘菜酢物療治諸種淋榆皮打碎車前子各二兩冬瓜子一升鯉魚齒二十個桃膠白通草去稍切地麥各二兩瞿麥一兩右㕮咀以水一斗煮取三升分三服日三療治五勞七傷八風十二痺勞結為血淋熱結為肉淋小便不通莖中及小腹痛不可忍者滑石研水飛桂心木冬葵子炒研細王不留行通草一方作木通車前子各二分甘遂石韋右為散以麻子飮五合和服方寸匕日三尿沙石出效一方加白榆皮三分五淋散治膀胱有熱水道不通淋瀝不宣臍腹急痛或尿如豆汁便如沙石淋膏尿血並宜服山茵蔯二兩去根淡竹葉洗去泥木通稍赤茯苓飛滑石炙甘草赤芍藥山梔子各等分右㕮咀每服三錢水一盞煎服一方加當歸除木通滑石曽有人淋而至血片痛甚空心鹽湯吞雞蘇丸及觀其方用藥有理八正散治小便赤澀或癃閉不通及熱淋血並宜服之大黃麵瞿麥穗木通飛滑石大扁蓄各等分車前子微炒研山梔子酒焙研甘草右為末入燈心同前小兒少少與之療治黃膽後小便淋瀝方豬腎白茯苓瞿麥穗車前子微炒研黃芥各等分椒目川澤㵼地膚子右㕮咀水二斗煮車前取一斗六升去滓下豬腎煮取一斗三升去腎下藥煮取三升分三服石韋湯治氣壅關格不通小便淋結臍下悶石韋研細末徐長卿切研細茅根節木通稍冬葵子炒研細滑石研水飛瞿麥穗生檳榔右㕮咀如麻豆大每服五錢七分水一盞半煎七分去滓下䃼硝末一錢煎溫服空心食前日二療治諸種淋方葵根去泥洗淨茅根節石首魚頭夾炙甘草切去稍通草稍貝子大麻根右㕮咀以水一斗二升煮取五升分五服日三夜二亦治石淋病琥珀散治五淋滑石研水飛琥珀屑木通全當歸廣木香鬱金大扁竹各一兩右為末每服三五錢用蘆葦葉同煎食後日三服導赤丸治心腎氣鬱膀胱有熱小便淋痛及諸熱壅滯生乾地黃切研細木通稍山梔子炒研細赤茯苓赤芍藥飛滑石生大黃各一兩右為末煉蜜丸桐子大每服二十丸食後前導赤散送下熱水亦得榆皮湯治療淋瞿麥二兩炒防葵一兩切榆白皮一兩研葵子一兩研滑石二兩一方四兩甘草一兩一方二兩炙黃芩一兩一方二兩右切以水一斗煮取三升分二服忌海藻菘菜一方無防葵海金沙散治小便淋瀝及下焦濕熱氣不施化或五種淋疾癃閉不通木通稍瞿麥穗炒研細滑石細研白通草各兩半杏仁酒浸去皮麩炒黃一兩右為末每服五錢水一盞半燈心二十莖同煎七分去滓食前溫服又治痛方滑石研水飛白术切研細貝母白茯苓川通草各一兩右為散酒服日二服十日瘥治淋疾用石燕子七個搗黍米粒大新桑根白皮三兩銼如豆粒同拌勻分作七貼用水一盞煎一貼取半去滓溫服空心午前至夜各一服五淋散治腎氣不足膀胱有熱水道不通淋瀝不宣出少起多臍腹急痛蓄作有時勞倦即發或尿如豆汁或沙石或淋如膏或熱淋便血並皆治之山梔仁赤芍藥