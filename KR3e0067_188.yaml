心熱吐血不止出聖惠方用生葛根汁半大升頓服一方用葛粉新汲冷水調服治吐血不止用管仲研細同生薑汁炒糖並花水調下立效散出十便良方治吐血及鼻衄不止右以伏龍肝二兩新汲水一大盞淘取汁入蜜一匙攪勻服之一方以水煎服治吐血不止出聖惠方生藕汁二合刺薊汁十合右件藥合攪令勻入生蜜一匙調和令細呷之治吐血不止右蘆荻外皮不拘多少燒作黑灰勿令白為末入蚌粉少許細研麥門冬熟水調下一錢或二錢三服可救一人治吐血不定用川大黃一兩搗羅為散每服一錢以生地黃汁一合水半盞三五沸服之不拘時候吐血口乾附論夫吐血口乾者由臟腑虛竭榮衛不理隂陽隔絶陽虛於上故身體虛熱胸中否澀則口乾也方石膏散出聖惠方治心胸煩熱吐血不止口舌乾燥頭疼石膏麥門冬去心各二兩甘草半兩炙微赤銼黃芩川升麻生乾地青竹茹􅌝􅌣根葛根各兩一右為散每服三錢以水一中盞煎至六分去滓不計時候放溫服杏仁散出聖惠方治心肺客熱吐血唇口乾燥杏仁湯浸去皮尖雙仁麩炒微黃赤茯苓黃連去鬚梔子仁黃芩川大黃銼碎微炒各一兩桂心半兩􅌝􅌣三分右為散每三錢以水一中盞煎至六分去滓不計時候溫服犀角散出聖惠方治心肺壅熱上焦不利吐血口乾犀角屑黃芩人參出蘆頭生乾地黃麥門冬去心􅌝􅌣各一兩甘草半兩炙微赤銼杏仁二兩湯浸去皮尖雙仁麩炒微黃右為散每服三錢水一中盞煎至六分去滓不計時候服生地黃煎出聖惠方治肺熱吐血口乾心躁生地黃汁一升生薑汁一合白蜜五合生麥門冬汁三合酥五合白沙糖三兩杏仁二兩浸去皮尖雙仁爛研右煎成膏不計時候半匙含化咽津傷胃吐血附論傷胃吐血病者因飲食過度傷胃或胃虛不能消化致翻嘔吐逆物與氣上衝蹙胃口決裂所傷吐出其色鮮紅心腹絞痛白汗自流名曰傷胃吐血方除濕湯出三因方治胃脘著濕鬱於經絡血溢作衄或脾不和濕著經絡流入胃吐血茯苓乾薑各二兩甘草炙白术各一兩右銼散每服四大盞水煎服頭疼加川芎二錢兼止浴室中發衄加味理中湯出醫方大成治飲食過度傷胃不化致嘔吐其色鮮紅或心腹絞痛自汗名曰傷胃吐血人參乾薑炮白术各一兩乾葛甘草各半兩右銼散每服三錢水一大盞煎不據時候溫服去乾葛加川芎治鼻衄理中脘分利隂陽安定血脈雞蘇散出聖惠方治勞傷或飽食氣逆致卒吐血不止雞蘇葉莖黃耆銼甘草生用阿膠搗碎炒黃燥各一兩乾薑炮製銼艾葉各半兩右為散每服三錢以水一中盞煎至五分去滓入赤馬通汁一合攪令勻不計時候溫服五聖湯出聖濟總録治飲食傷肺吐血並嗽血木香蜜陀僧螼殼去足甘草炙銼各半兩黃眀牛膠兩片將一片酥炙一片生銼右粗搗篩每服三錢水一盞煎至五分去滓食後良久溫服理中湯出三因方能止傷胃吐血者以其功最理中脘分利隂陽安和血脈方證廣如局方但不出吐血證學者當自知之人參白术甘草炙白薑炮炙等分右銼為散每服四錢水一盞煎七分去滓不以時服或只煮乾薑甘草湯飲之亦效方有官桂去粗皮用白术丸出指南方治傷胃吐血白术十兩乾薑黃耆人參伏龍肝各三兩右為細末煉蜜丸如梧桐子大每服三十丸米飲下普濟方卷一百八十八
