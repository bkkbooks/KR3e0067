body:
  text: 普濟方卷二百八十二明周王朱橚撰癰疽門總論經云黄帝問於岐伯曰癰疽何以别之岐伯答曰榮衛稽留於經脉之中則血澁不行衛氣壅遏而不通故生大熱熱盛則肉腐為膿然不能䧟於肌膚骨髓不為燋枯五臟不為傷損故命曰癰黄帝曰何為疽岐伯答曰熱毒熾盛下䧟肌膚骨髓皆燋枯内連五臟血氣痼竭當其病下筋骨良肉無餘故命曰疽疽者其上支已夭堅如牛領癰者其上皮薄已澤此其候也黄帝曰善然五臟不調則致癰久患消渇之流亦多發癰疽之疾岐伯曰喜怒不測飲食不節隂氣不足陽氣有餘榮衛不行血氣不通而熱相搏乃發為癰疽凡服乳石之人常須小勞怡悦神思夫乳石之氣隨開而行遇閉而止止則血脉凝澁瘡疣生焉或不遂志欲加之以怫鬱憂憤蓄積貪恣驕狠飢飽勞逸負恃之變遂致血氣夭結固而為病論云夫隂陽藴結臟腑為之積聚血氣凝澁榮衛為之壅滯陽滯於隂則生癰隂滯於陽則生疽癰疽之生有内有外内則生胷腹腑臟之中外則生膚肉筋骨之表凡此二毒發無定處而有常名夫壅滯之本者始於血老不作汗肉陳不脫垢蒸氣不能外逹留積遂成内熱所為也夫癰疽生膿水之成非天降非地出蓋積微所成也凡癰疽癤腫纔萌之時並湏以湯水注射之欲治此疾先須辨識定其淺深究其根源療之必愈熱發於皮膚之間是以浮腫根小至過二三寸者為癤也六腑積熱騰出外肉之間其發暴盛腫皮光軟侵展廣大為癰也五臟風毒積熱攻焮於肌骨風毒猛暴初出一頭如㾦㿔形白燋枯觸之應心者疽也癰起於六腑浮逹易理若燎原之火外潰膚肉疽生於五臟沉澁難治若陶室之燧内消骨髓癰則易治唯難将息而遲瘥疽則難療易得痊復癤與癰初生並宜炙之為其氣本浮達以火導其熱令速暢也疽則宜烙不宜炙為其氣深湏達其源也又已盛是膿慎勿可炙則湏針烙方能瘥也凡瘡癤生於外皆由内熱所致當要服藥以下之終湏外療以求瘥服藥所以助療法也夫治癰疽湏以湯液䟽其内針烙疏其外然則癰疽有虛有實虚則補之實則瀉之有實熱者易治虚寒虚邪熱多者難愈腫起堅硬膿稠者為實腫下軟慢膿稀者為虚盖病者多為方法而無次叙臨時倉皇何能辨於此疾淺深是以斃也凡癰疽瘰􅊓不問虛實寒熱皆由氣鬰而成經云氣宿於經絡與血俱澁而不行壅結為癰不言熱之所作而後癰者此乃因喜怒憂思有所鬱而成也此屬内因又有熱被風冷搏之血脉凝滯不行熱氣壅結而成亦有隂虚陽氣凑襲寒化熱熱盛則肉腐為膿此屬外因寒熱風濕所傷而成也又服丹石及炙煿酒􅔇温床厚被所致或盡力房室精虚氣竭所致者此屬不内外因所傷而成之也如是但隂陽不平有所壅結皆成癰疽而此二毒發無定處當脉别之洪浮滑數則為陽微沉緩濇則為隂隂則熱治陽則冷治癰疽之疾二十餘証熛發石發巖發蜂窠發蓮子發椒眼發連珠發竟體發有膓癰内發腦發背發眉發顋頷發肺癰腎癰妳癰臍癰臀發腿發外有手發足發穿當發鬚癰𤓰瓠發大率隨病淺深分證内外便行施治不可遲緩毋致孔洪方為妙手凡癰疽始作便有發熱惡寒或有痛處脉浮而緊是欲為癰疽非傷寒之候也經言五臟不調致疽六腑不和生癰一曰瘭疽急者二三日殺人緩者十餘日殺人二曰癰疽急者十餘日殺人緩者一月死三曰緩疽急者一年殺人緩者数年死四曰水疽所發多在手足數年猶可療疽有數十種若如此千般發癰之疾所發緩地不殺人所發若在險地宜令即外消一為腦户二為舌本三為𤣥癰四為候節五為胡脉六為五臟擊八為兩乳九為心鳩尾十為兩手魚十一為膓屈之間十二為小道之後十三為九孔十四為兩腨膓十五為神主之舍一本云主客之舍凡十五處不可傷而況於癰乎若癰發此地遇良醫能不及大膿者不救致大膿害及矣黄帝曰願聞癰疽之形與其期日岐伯曰癰疽之極十八腫又癰疽發咽名曰猛疽猛疽不療則血化為膿為膿不瀉塞咽半日死其化膿者瀉已則含豕膏無冷食三日而已一云無食發於股胻名曰股脫疽其状不甚變而癰腫膿撙骨不急療三十日死髀内曰股股外曰髀膝上股下骨稱曰股胻也發於脇名曰改訾訾者女子之疾也久之其状大癰膿其中乃有生肉大如赤小豆療之方剉連翹草及根各一斤以水一斗六升煮令竭取三升即强飲厚衣坐釡上令汗出至足已發於尻者名曰兌疽其狀赤堅大急療之不療三十日死發於脛者名曰兎囓其狀赤至骨急療之不療害人發於足上下者名四淫其状大如癰不急療百日死又發於眉及臑者名曰疵疽其状赤黒急療之此令人汗出至足不害五臟癰發四五日逆焫之上灸百壮石子當碎出也不出可益壮又石癰者始發皮際相親著不赤頭不甚堅微痛熱熱漸自歇便堅如石故謂之石癰難消又不可得自熱縱愈皆百餘日也又發癰兩頭牽而傍推無根者又不痛結筋非癰也發癰状如蛇雖極大此肉瘤非癰也腫一寸至三寸癤也三寸至五寸癰也五寸至一尺癰疽也一尺至三尺名曰竟體疽腫成膿九孔皆出諸氣憤鬱不遂志欲者多發此疾癰及疽血瘤䑕乳石癰結筋瘰􅊓皆不可就針角針角少不及禍者又發於腋下堅赤者名曰米疽療之用砭石欲細而長踈啟之塗以豕膏六日已勿裏其癰堅而不潰者為馬刀挾纓急療之太素經曰頸前曰纓發於股隂者名曰赤弛不急療六日死在兩股之内不可療一云六十日死發於膝者名曰疵疽其狀大癰色不變寒熱而堅勿石石之死湏其柔色異乃石之者生冷不熨之柔乃破之凖例破之也又諸癰腫之發於節而相應者不可療太素經云膿入節開故不可療也又發於陽者百日死又發於隂者三十日死丈夫陽器曰陽婦人隂器曰隂又發於踝者名曰走緩疽其狀肉色不變數石其輸數而止其寒熱不死冷石熨其所由之又發於足傍者名曰癘疽其状不大初從小指發急療之去其黑不消輙益不療百日死傍云足外側也又發胷者名曰井疽状如大豆三四日起不早療下入腹入腹不療十日死太素經云寒熱不去十日死又發於足指者名曰脫疽其状赤黒死不療不赤黒可療療不衰急斬去之得活不去者死又發於膺者名曰疳疽其状如糓實𤓰蔞常苦寒熱急療之去其寒熱不療十日死死後出膿又發於頸者名曰夭疽其状大而赤黒不急療則熱氣下入淵腋前傷任脉内薰肝肺十餘日死太素經云項之前曰頸也凡五臟六腑膜中府隠隐而痛者肺疽也上肉微起者肺癰也中府在雲門下一寸六分乳肋間動脉疾手䧟中是臣闕隠隠而痛者心疽也心上肉微起者心癰也臣闕一穴在鳩尾下一寸是期門隠隠而痛者肝疽也上肉微起者肝癰也期門二穴在第二肋傍一寸半直上兩腋旁章門隠隠而痛者脾疽也上肉微起者脾癰也章門在季肋端一名長手一名肋宛京門隠隠而痛者腎疽也上肉微起者腎癰也京門二穴在期下五分是中管隠隠而痛者胃疽也中管一穴在名太倉最上管下一寸天樞隠隠而痛者大膓疽也上肉微起者膓癰也天樞二穴在臍是兩傍各二寸中丹田隠隠而痛者三焦疽也上肉微起者三焦癰也丹田一名石門一名精室一名命門一穴在臍下二寸關元隠隠而痛者小膓疽也上肉微起者膓癰也闗元一名液門在臍下三寸右驗其人所患依據此審定癰疽淺深病從何臟腑發先曽食乳石又驗其氣虚實参詳而療之背面九處不可患瘡第一入髪際為玉枕亦為舌本第二項頸節第三為崇骨第四大椎為五臟第五脊骨兩邊肺俞穴第六夾脊骨兩邊脾俞及肺俞穴第七脊骨兩邊腎俞二穴第八後心鳩穴第九鳩尾骨穴正面五處不可患瘡第一喉骨為垂膺第二當胷前為神舍第三為心鳩尾第四當兩乳穴第五臍下二寸為膓之間側面三處不可患瘡耳下近耳後牙車尖中䧟中為喉脉一穴當膊下一穴為眉骨承山上三寸一穴腨膓凡患人目中赤脉從上下貫瞳子者一脉一年死二脉二年死若脉下者藥之必瘥又曰患人面忽有赤色多貫上下如脂有赤色從額上下至鼻又黒色出額上大如指及連鼻上至眉又有赤色垂者並為死候不可藥夫癰疽破潰之後其形狀有逆有順眼白精黒而眼小一惡也不能下食納藥而嘔食不知味二惡也傷痛渇甚三惡也髆項中不便四肢沉重四惡也聲嘶色脫唇鼻青黒面目四肢浮腫五惡也煩躁時嗽腹痛渇甚泄利無度小便如淋六惡也膿血大澁焮痛尤盛膿色敗臭不可近之七惡也喘麄氣促恍惚嗜卧八惡也未潰先黒久䧟面青唇黯便沔者九惡也更有氣噫痞澁咳𠻳自冷自汗無時瞪目耳聾恍惚驚悸語言顛錯皆是惡證動息自寧飲食知味一善也二便利調二善也神彩精明語聲清朗三善也膿潰腫消色鮮不臭四善也體氣和平五善也五善見三則吉諸惡見四必危若五善併至則善無以加九惡駢臻則惡之劇矣病者脉𢾗身無熱反洒淅惡寒若有痛處皆發其癰腫欲知有膿無膿以手掩上若熱者為膿不熱者無膿此亦大類說也若脉不數不熱而痛者蓋發於隂也不疼尤是惡證不可不知凡熱盛脉數即用漏蘆并單煮大黄等湯不甚熱脉緩弱只投五香連翹湯其他依四節八事次序便推三因以用其藥未有不全濟也診其脉浮數而洪𦂳者其瘡腫䑁作常身熱煩渇飲食知味此乃六腑不和大則為癰小則為癤其勢雖急投以凉劑亦多全活若診其脉沉細而伏或沉𦂳而數初發之瘡其微或無瘡頭身不發熱而内燥體重煩疼情緒不樂胷膈痞悶食不知味或惡聞食氣五臟不調為疽属隂盖癰癤則属腑故發之浮而淺其勢雖急而作毒緩疽則属臟毒氣内蓄之深勢雖緩而反急若瘡疽之人膿血大泄脉滑數者難治也凡瘻膿多或如消泔脉滑大散寒熱發渇者治之無功也若患肺瘡者咳𠻳膿血脉見洪滑治之難全矣大凡診脉見浮數應當發熱而反惡寒雖頭項拘急四肢煩痛或復戰慄渴甚者但有痛處欲發瘡腫也浮數之脉應發熱其不發熱而反惡寒者瘡疽之謂也脉洪大者瘡疽之病進也如瘡疽結膿未成者宜下之膿潰之後脉見洪大則難治若自利者不可救治也仲景曰脉數不時見則生惡瘡也又曰肺脉俱數則生瘡也診諸瘡洪數者裏欲有膿結也瘡腫膿潰之後而煩痛尚未全退者診其脉洪滑麄散難治也以其正氣虚而邪氣實也瘡腫之病診得芤脉膿潰後易治以其脉病相應也若瘰􅊓結腫診得牢脉者不可内消也瘡疽之人得實脉宜急下之以其邪氣與臟腑俱實故也弦洪相摶外𦂳内熱欲發瘡疽也瘡腫潰後得濇脉無妨也瘡腫脉短真氣短也瘡腫之病脉來細而沉時直者裏虚而欲變證也潰後脉微而勻舉自瘥也凡諸瘡腫潰後其脉濇遲緩者皆易愈以其脉候相應是有胃氣也瘡腫得沉脉邪氣沉瘡腫脉虚宜托裏和氣養血也瘡腫得軟脉補虚排膿托裏大扺瘡家沉遲濡弱皆宜托裏瘡腫脉促亦急下之大凡瘡腫之病脉促結者難治而況見代脉乎凡瘡疽腫大按之乃痛者膿深也小按之便痛者膿淺也按之不甚痛者未成膿也若按之即復者有膿也不復者無膿也非也必是水也若發腫都軟而不痛者血癅也發腫日漸増長而不大熱時時牽痛者氣癅也結微腫久而不消後亦成膿此是寒熱所為也畱積經久隂生陽寒化為熱以此潰必多成瘻凡療癰疽以手掩其上大熱者膿成自軟也若其上薄皮剥起者膿淺也其腫不甚熱者膿未成也若患瘰􅊓結核寒熱發渇經久不消者其人面色痿黄被熱上蒸已成膿也至於臟腑膓胃内瘡内疽其疾隠而不見目既不見手不能近可以診其脉而辨之有患胃脘癰者當候胃脉人迎者胃脉也其脉沉細者氣逆則甚甚則熱聚胃口而不行胃脘而胃癰也若其脉洪數者膿已成也診脉遲𦂳膿雖未成已有瘀血也急宜治之不則邪毒内攻腐爛腸胃不可救矣肺癰疾萌則可救膿已成則必死不可不慎也久𠻳膿如粳米粥者不治嘔而止者自愈也癰疽發背俗以腫痕所至為暈非真暈也暈於瘡口之傍如紅筋之狀纔見暈則非美證矣一暈二暈以至三暈尚可措手若四暈五暈是臟腑藴受銳毒斷斷難醫凡五子曰夜半五丑曰鷄鳴五寅曰平旦五夘曰日出五辰曰食時五巳曰禺巾五午曰日中五未曰映五申曰晡時五酉曰日入五戍曰黄昏五亥曰人定五此日時遇疾病者皆不起也夫治癰疽發背腦發鬚發髩發頥發筋發腰發腿發或發於四肢或婦人妳癰不問男女一見有此疾者皆可即便用此法灸之無不安愈其法先令病人以肘凭几竪臂腕要直用篾一條自臂腕中曲處男左女右貼肉量起直至中指尖處截斷為則不量指甲却用竹杠一條令病人脫衣騎定令身正直前後用兩人扛起令脚不着地又令二人扶定勿令僵卧却将前所量臂腕篾從竹杠坐處尾骶骨盡處直向上貼脊背量至篾盡處為則用黒㸃定此只是取中非灸穴也却用薄篾作則子量病人中指節相去兩横紋為則男左女右截為一則就前所㸃記處兩邊各量一則盡處即是灸穴兩穴各灸五壮或七壮止不可多灸不問癰生何處並用此法灸之無不愈者一云可視發疽發於左則灸右發於右則灸左甚則左右皆灸盖此二穴心脉所過處凡癰癤皆心火留滯而生灸此則心火流通即是安愈可以起死救危有非常之效屢試屢驗矣素問云諸痛痒瘡皆属於心又云榮氣不和逆於肉裡乃生癰腫榮者血也心能行血心滯則血為之不行故逆於肉裡而生癰腫灸此穴使心火調暢血脉流通愈於服藥多矣又法初覺皆有㸃白粒并赤腫先從背脊骨第二節下陷中兩旁相去同身寸各一寸五分名肺俞穴此穴宣泄背上諸陽熱氣兩處可灸七壮止同身寸法取男左女右中指頭比此近掌横紋為三寸對折㸃定從脊骨㸃定處横量兩頭盡處是穴大抵人年四十已上最宜炙此其背永無癰瘡之苦凡在癰疽初作不論腫赤濶狭可依後論墨圍津潤一二日覺毒勢盛便以獨頭蒜切作片薄如錢様安置毒上以艾炷不論壮數炙之惟多為妙人皆以謂熱極不可復炙殊不知本寒邪所傷艾火攻散迺善本皮血化熱盛皮肉之間不能外泄皮膚頑厚漸逼入内警如强盗入室廹近於主主力且弱以兵鬭之不若開門與出乃順所以灼艾火攻特破其肌則邪毒無所容留而真氣不耗炙則任其潰乃調膿排痛如錐刀所刺壞肉壞筋而膿從骨間出既傷臟膜此不復治付之無可奈何雖人老壮亦用施治或處於僻鄉無藥可贖或居貧乏無力可得不問貧富貴賤均可施治但頭上瘡及項以上見瘡不可就瘡頂上輕意炙之反生大禍但可以騎竹馬取穴法及足三里穴炙之多獲其效凡蒜餅上炙者本草名萌又名蒜味辛温有毒主散癰腫不宜多食然假火勢以行藥力或有炙去不用只以艾炷安毒上便炙此法可施治頑疽痼發之類必假火熱攻令速潰大扺用葫善决若有赤腫紫黒或有惡腫葫法施治至妙炙癰疽發背其炙法正在不痛者炙至痛痛者炙至不痛或有炙而痒者大抵初炙即痛毒氣方聚漸次相攻作痛無疑皮肉既傷又有灼艾時間或作痒令人􅎲其旁者又有初炙而不痛者毒氣内陷病人昏倦惡腐不散多壮不痛又云痒者炙至不痒痛者炙至不痛仍服追毒排膿次乃外傅消腫内外兼治又云癰疽不可不痛又不可太痛悶亂不知痛者為難治若諸瘡經乆不瘥變成瘻者宜用硫黄一塊可瘡口大小安之别取少許硫黄於火上燒用釵尖挑起取陷㸃硫黄令著三五遍取膿水乾瘥為度若其發背初生即宜土餅炙法炙之初覺背上有瘡痛痒頗異認是發背即取淨土水和捻作餅子徑一寸厚二分貼著瘡上以艾作炷炙之一炷一易餅子其瘡粟米大時可炙七壮其瘡如錢許大日夜不住炙以瘥為度疳瘻惡瘡諸醫不驗取蠐螬剪去兩頭安瘡口上以艾炙之七炷一易不過七枚無不效者又法用乞火婆中炙之同前法累驗之神效人皆秘之往往父子不𫝊凡發背皆發出自膓胃流入五臓漸流多脚氣為主或有先服乳石并熱肉􅔇房室過度皆作此疾縱身不曾服乳石先代服亦有此病或有下痢人服􅔇過度亦有患者請依後方萬不失一發背一覺有腫即湏審脊根硬軟如硬頭一㸃白繞四邊紫黒氣時掣痛憎寒不食状若天行此石癰知是此状即湏當上灸百壮艾炷大如䑕屎許大凡發背初亦一㸃白四邊赤色漸漸長大或盃盞并椀許大四邊生飯漿小小瘡如粟米許大亦時時抽掣痛此兩状皆是死病十日内堪醫十日以外不濟就中冬月得此病即延得三五日其發背初覺即湏當頭灸二十一壮如盃許大即五花灸之各二十一壮即服牛蒡草子括蔞葛粉第三服犀角湯瀉之不然服犀角丸亦得大效也忌梨鯉魚􅔇酒肉漿水粥凡癰疽發背初生如黍粟粒許或痒或痛覺似有即用湯火淋射兼貼藥熁之經一兩日不退湏當上灸之一二百壮如菉豆許大凡灸後却似焮痛經一宿乃定即火氣下徹腫内熱氣被火導之隨火而出也若能於瘡頭四邊相去各一寸已來更花灸尤妙其瘡若知痒即宜隔豉餅灸之其豉餅湏以椒薑鹽葱相和爛搗揑作餅厚薄如三錢已來當瘡頭豉餅上灸之若覺大熱即微取起少頃再安只灸七壮而已䜴餅若乾更換新者尤佳瘡苦痛即湏苦灸仍壮數惟多為妙若是疽即不宜灸夫疽初生形如􅂒㿔頭白燋枯氣本深沉治者既不精辨即便灸之或癰癤成膿之後即便灸之皆能害人初灸三壮不覺痛者為上肉已夭其下膿深及至數壮之後焮痛必倍為熱氣益盛膿伏内攻之火灼其外轉増毒甚不可不知也頭維在額角髪際本神旁一寸承光在頭上五處穴後二寸半神庭在髪際直鼻上承泣在目下七分直瞳子陷中是絲竹空在眉後陷中膺䆫在胷下一寸六分兩乳中腦户在枕骨上强間後一寸半風府在腦後髪際一寸大筋旁穴之中瘖門在頂後髪際宛宛中脊中在第十一椎節下間三陽絡在臂上夭脉溝止一寸下闗在耳前動脉是也耳中耳門禁不灸人迎在頸大脉應手陕結喉旁通五臟石門在臍下三寸女子禁不灸伏兔二穴在臍上六分地五㑹在足小指次指末節後間去陜豁旁一寸五分以上據鍼經並禁不可灸或於上出瘡癤亦不得便灸且以諸方法及湯水注射并用諸藥熁之若已成膿即湏炙烙出之為其内已有膿縱針烙出之即並無妨大扺膏粱之人既得斯疾於心有怯一毫冷藥斷不肯服殊不知毒氣方盛之時外被敷藥閉其毫孔内服温藥助其毒氣致冷之氣無路發越内攻臟腑傾人性命急如反掌古人云癰瘡未破毒攻臟腑一毫熱藥斷不可用癰瘡已破臟腑已虧一毫冷藥亦不可用此先後之要訣也内托散又名萬金散又名托裏散五香連翹湯沉麝湯甚者追毒丹又名神仙萬病解毒丸及漏蘆湯已上皆宣熱散毒之藥既炙之後毒氣有路而出服藥之後使毒氣不傷臟腑然後玩味方論或命醫者商確疾證依法調治亦未晚也若有煩熱口燥咽乾大便秘難六脉沉實而滑或洪數有力便可投之以漏蘆湯大黄等藥或追毒丸為宣熱㧞毒之計或有瀉證醫者不可便歸咎於藥以為張本之計殊不知患癰疽之人每有泄㵼皆是要候若疑似間但服内托散次五香連翹湯沉麝湯五七之後繼之以國老膏萬金散牛膠飲子忍冬酒柞木散黄礬丸逺志酒之類皆可選用以為破敵之需已上諸方不冷不熱不問老幼少壮隂陽虚實冷熱多服為妙自有竒功凡癰疽始作皆湏以大黄等藥極轉利之既利之後病人當自知之勿以困苦為念若曰與其腹背潰爛臟腑焦枯膿血流漓孔穴穿空備諸惡而死不若利而死況有生道哉古聖賢立法率用五香連翹漏蘆等湯道路貧苦恐不能及即單煮大黄甘草作湯以利之湏排日不廢直至膿潰漸有生意即服黄耆等藥排膿止痛今外臺備矣世醫不學蔽以妄意不逹標本皆曰瘡發於表豈可轉利死者比比良可悲夫一初覺得背疽之疾便合服内托散又名乳香萬金散後來方免變證口舌無瘡此藥但可服十數止便以騎馬法炙之或用隔蒜法炙之亦可即合繼服五香連翹湯此藥如大便寛快内熱既退即便住服若一二日之後大便再閉湏再服之要取利毒氣至盡然後住服亦須看病人虚實量其輕重而進藥一癰破後多服排膿内補散無嘔逆用酒調下有嘔逆木香湯下又若癰疽破後當終始服餌不可輟一癰疽初作之時便要著艾既灸之後便宜用麥飯石膏四圍塗傅以護其根脚不可使開中心却要留癰口如錢大使毒氣出如癰漸小隨其大小傅之直候疽破膿潰之後口收只有徑寸許用神異膏貼傅却住用麥飯石膏癰疽纔破有口便合用猪蹄湯洗其初連日洗五日後間日洗欲安之際三日一洗一癰疽既破膿血潰多五七日後方可用神異膏貼若根脚小五日後貼如濶大湏七日十日後可貼傅一癰口將收之際最忌用急澁歛口之藥只宜用神異膏貼多見昧者破此一叚不過病者厭於将理醫者急於獲利不思毒氣發泄未盡其疾再來人命自此不救癰疽將安之際宜多服加味十全湯以補其氣血庶使肌肉易生故也一前後病疽之人多是先發渴而後背疽作或有背疽安而後發渇疾因此不救者甚多若有渇疾之人宜専服加減八味丸能使渇疾安疽疾不作若驟得背疽之疾既安之後不問有無渇證宜常服加減八味丸此藥非時可以度絶渇疾之将來亦且大能滋益氣血生長肌肉使精神强健此乃累試之驗忍冬丸亦妙又名鷺鷥藤一前方湏是居于州縣及有力之家方得及之若居僻鄉及無力之人只可用鷺鷥藤酒一名忍冬草此一方終始服餌候其疽破即以神異膏貼之然神異膏所用藥材皆非貴細難得之藥前後用此百發百中一嘔逆有二證一證謂初發時不曽服内托散熱在心一證有氣虚脾氣不正而嘔當仔細審察病證參酌用藥若是因熱而嘔者外證心煩身熱癰作痛即是伏熱在心合用内托散服三兩服即止不可多服若是氣虚而嘔其證心不煩熱遇早便嘔或聞穢氣而嘔早辰宜服嘉禾散如有寒熱宜服家傳不換金正氣散仍五更初兼服山藥丸以補腎凡瘡家皆用宣利去其毒根蕩滌陳莝假如神仙追毒丸六味車螯散五香連翹湯千金漏蘆湯用藥無過此法更當詳辨禀賦强弱臨時加減大抵治瘡要法湏是臓腑堅而不秘通而不泄則真氣不耗邪無所留如治秘結神功麻仁丸最妙謂如老人腸胃虛精液耗便秘不利精神昬濁服之必安可以類推凡瘡潰之後尚覺虛熱可與五香湯内加犀角末黄蓍人参之類大便秘小便赤可與五香湯加大黄朴硝大抵癰疽不可舎五香湯假如治瘡温藥必有桂以通血脉理疎不足宣導百藥冷藥必用地黄補五臓内傷不足通血脉益氣力填骨髓長肌肉作湯除熱萬金散一方用乳香菉豆粉二味乳香消諸癰腫毒菉豆壓熱下氣消腫解乳石服至一兩則香透徹瘡孔中出二味真良藥也氣血聞香則行聞臭則逆大抵瘡多因榮氣不従逆肉理鬱聚為膿稍得香味血行氣通必無凝滯多服連翹湯萬金散秘𫝊金粉散凡瘡家本自腥穢又加臭惡因而相觸反成大患毒氣入胃令人咳逆古人用香可謂有理且如飲食之中調令香美益其脾土養其真元可保無虞凡癰疽之疾初服頭藥失序或不曽服内托散又無藥宣得内毒致令熱毒衝心經咽喉口舌生瘡甚至生紅黑菌變證甚速難於醫療合預備琥珀犀角膏治之向曾有人因疽而生此證醫者以為心臟絶盡皆設辭退醫進此藥一日而安當先服犀角散防有此證又熟視詳審俟其潰熟膿透於外其勢盈盈欲出只用替針丸自瘡頭咬開不半日許其膿自出切不必用針刀也腎脉虚甚當用補藥而有牴誤處如用鹿茸附子之藥是抱薪救火如用平補之藥腎氣猝難平復若俟河之清向曾有人苦疽疾正生此一證諸醫無䇿愚云昔嘗聞一名醫講論凡人遇五更初腎氣必開若一語言咳𠻳口唾即腎復合遇腎開時進一服平補藥其功效勝尋常服峻補之藥十數服愚以此䇿獻之遂選用山藥丸所用皆平補腎氣全無僣燥偏重之藥依此法而進詳以告病者與其侍傍之子弟如法而服三日而醫者診脉已平復矣凡疽疾之人腎脉虚弱未可使如古人之論以為不可治者有人痼冷虚弱危困如其法而用藥可謂用力寡而收功倍矣無比山藥丸方見虚勞羸痩類如是病人氣弱不進飲食合服嘉禾散如贖到見成散子每五兩宜加人參丁香木香沉香白豆䓻仁各二錢重昨曽有人苦疽疾醫者用藥失序久而不瘥因致虛弱全不飲食愚欲進嘉禾散而諸醫争言内有丁香發熱不可用殊不知治疽之藥丁香預其一況有因怒氣而發疽今嘉禾散中所用之藥盡平和益脾胃降氣者辨論不勝遲遲數日服他藥無效卒後用之而病人方能進食自此已後遇早晨住服他藥必進嘉禾散一服疾安而後已方見隔噎門夫膿腫之生於外者由熱毒之氣藴結於内也蓋腫于外有生頭者有漫腫者有皮厚者有皮薄者有毒氣深者有毒氣淺者有宜用温藥貼熁者有宜用凉藥貼熁者有可以乾換其藥者有可以濕換其藥者深淺不同用藥亦異是以不可不辨也若瘡腫初生似有頭者即當貼温熱藥引出其毒熱火就燥之義也于四畔赤焮處𢷬生藥貼熁之折伏其熱勢驅逐其邪惡撲火之義也夫生寒藥勢氣力精全性味雄健或有療者不本物理皆通用藥草膏之類有勢力微欲使尪瘠者敵其勇夫不亦難乎又有粗工不審逆從用寒藥敷貼趂逐邪毒復入於内歸於肝心十死八九矣大扺敷貼之藥欲消散腫毒血脉疎通寒熱逆從斷其去就焉湏不可執方無權安能散於鬱結不成膿乎其腫皮厚者以故軟帛或以花紙塗藥貼熁之待其藥乾換其皮薄者即用踈紗或薄紙塗藥貼熁之其藥未乾即當換之若是膿潰之後即貼温肌生肉膏藥要在逐臭腐排惡汁取死肌生良肉全藉温熱膏劑之力也切勿用寒凉之藥水調貼之夫脉喜温而惡寒若著冷氣過理即血滯難瘥矣濟生方嵇論治法云金人大定間有遇異人𫝊狗寳丸得之者以獻之偽主其後嵇乃事偽朝以外科奉御療将士金瘡有功金主以其本賜焉嵇治瘡凡癰疽疔漏皆以狗寳丸為第一義先投狗寳丸半時次投熱葱粥以助之後被盖覆病者使汗出周流則毒勢隨汗而解若汗不出則不可療矣汗罷則瘡之陷者必起散者必聚以烏龍膏傅其腫若腫之外有赤暈者則以解毒散傅之凡傅藥必以自外向裏塗之看正瘡大小凡正瘡之上不許加分毫藥每日隨證服五香連翹湯并十竒散菉豆粉等藥大率以狗寳丸為先以烏龍膏解毒次之而服餌之藥則隨藥氣隂陽虛實而用之空心服加減八味丸以助元氣俟瘡潰以針决去放膿訖然後以乳香膏傅正瘡之上若尚有未盡膿則于膏藥當中且剪一路以通膿水欲盡以生肌散敷瘡口仍以乳香膏覆之更不湏剪破膏藥乳香膏一日一換候瘡口初合即便不換膏藥以烏龍膏之功在于消腫解毒散之功在于收暈暈收即不湏用解毒散而烏龍膏直候瘡潰敗膿出盡然後已癰發背者皮薄腫髙多大椒眼數十粒疽發背者皮膚頑硬状如牛頭之皮二證皆宜灼艾癰成膿則宜針其鍼宜用馬衘鐵為之形如薤葉樣兩面皆利可以横直裂開五六分許取去毒血覺便輕湏先炙而後裂可服神仙追毒丸利去毒根次服排膿托裏藥調治疽成膿則宜烙可用銀笓大二寸長六寸上燒令赤急手熨烙毒上得膿利為效亦服神仙追毒丸排膿托裏藥調治凡療癰疽用針炙㸃烙其功甚大嘗有一婦病癰在背之左髙大而熟未破之間有醫者云可烙彼時有一老成人云凡背之上五臟俞穴之所繫膈膜之所近烙之不得其法必致傷人醫答曰但宜淺而不宜深宜横入而不宜直入恐傷破膜子宜下而不宜上恐貯膿血得此訣儘無妨也于是燒鐵火筯烙之肉破膿出如湍水自此而愈當時直是恐人非劊子手者不能為之烙後真有神效若不能識生熟淺深上下横直之要妙不若不烙之為愈陳日華云世人于瘡癤始發輙用針炙十死八九盖毒方殷以火助之宜其危也聞烙之功却大方其已熟未潰之時用鐵一烙極是快事方扇火欲着時誠是恐人予久聞此深知其功于臨時猶且顫悸況於未曽經得効之人乎烙後膿水流通者百無所忌名曰熟瘡只忌鷄肉恐瘡突開穴口宜向下要膿水流通仰則倒貯然須是熟于用烙者識淺深知穴道審生熟非其時則所出者皆是生血當其時則出黄膿瘀肉予見人烙瘡者甚多用尖針烙者不得法用平圗頭者甚妙盖要孔血通透尖針頭細其名易合徒爾嚇人針出復合未必為功惟用平圗如鎻衡緯鋋之類乃妙即烙得通不得治者便用法傅之不能保養瘡口必合口合則不能必其效用牛膝根之法亦為妙也治癰癤不問老幼少壮初發癰腫興作便用灸針亦是開門放出毒氣之一端也療癰疽諸般瘡癤欲愈必痒及療腎臟濕痒妙方鹽之功甚傳予一日脾上生一癤以火烙之作效數日瘡口欲合四邊痒甚不可忍令人以絹帛蘸湯熨洗甚快快定復痒再熨再痒三熨覺倦醫者云凡洗熨最損人氣血每見病疽之後被痒洗熨隨至眩絶是時予痒併作醫者取鹽一撮于瘡上揉擦便覺瘡内外清凉少定作一般美快更不復痒嗣後偶炙瘡臨可作金櫻子痒甚取鹽擦之其效如初痒甚則重擦隨其輕重不覺損人鹽入瘡口亦無妨害嗣後身體或有痒處亦以鹽擦隨即除去且復佳甚世人多有于瘡癤初發時用油鹽以亟擦之令熱遂結聚不成亦此意也癤初發時取五更未語之唾以手替抹亦是一法腎藏濕痒無法可治亦用鹽擦得效此親試也夫癰疽者頭少腫處多出膿不快者宜針烙膿未盛以前不可不以諸藥貼熁救療以安病者之心膿成即當棄藥從針烙也既至膿成即當决意不可疑懼痛頃刻之間以至内潰古今同弊斯疾十有八九深識之士當斷去就夫患癰疽已成結腫湏有出處藥之無不針針無不瘥未有不針不刺而瘥者針刺及時而不瘥者夫痛之極也衆熱聚攻膏膜為之腐爛肌肉為之敗潰内通貫臟腑若不針烙決潰熱毒無從而出膿瘀無從而洩或過時不針即反攻于内内既消敗欲望其生豈可得乎則針烙取瘥實為良法疑而不决為必死之患或隠諱此藥或懼痛不針此神奪其識死期將至癰則皮薄宜針疽則皮厚宜烙古法無烙惟有針刺烙即火也亦謂之燔針刼刺以其有刼病之功也今用烙法多瘥殊穩妙于鉄針法本用鉄烙法當用火針如似火筯磨頭令尖如棗核圍滑用燈焰燒湏臾火作照數蘸油燒令赤皆湏近下面烙之一烙不透即再烙之令透若其攻稍廣即湏散烙數處並令透則氣踈逹膿水易出不假按仰實者撚髪為絍虚者以紙為絍塗引膿膏藥絍之兼以膏藥貼之常令開潤勿令急燥若其人羸瘠勿頓出膿徐徐令出癰疽廣大膿多者懼一時之痛不肯四畔多不針烙唯開兩三處而已欲望早愈不亦難乎常見有開腫者不審淺深所烙或當時無膿經宿方潰或下針不出别處生頭或㧕搸焮動益加損痛真氣轉傷經云病淺針深則氣血伏沉病深針淺則毒氣不洩反為大癰也如務求速瘥腫内餘膿及膿未盡便令瘡合後必再發諸發腫都輭而不痛者即便宜針烙若發於背者即湏用水角乃得痊愈凡􅓼癰疽發背腫髙堅硬膿稠焮盛色赤者用水角陷下肉色不變輭慢稀者不用水角角法于寛静室中不當風處平實地掘一小坑口稍濶于瘡腫深一尺以下去此坑二尺外又為一坑子口闊三四寸傍穿兩坑令相同灌水並令去坑面二寸于地上要背下先鋪油單三兩重辟地氣即以席薦東西鋪坑口兩畔令患者以瘡合坑上無令偏側腰間布氊褥務令安穏則得久角角口兩畔以繒帛遮擁兼盖覆水坑口勿令通泄熱被水引下滲地中卧一炊久為度于滯膿血並洩角中熱盛者日夜三四遍腫氣不侵每日或兩度亦得候其毒解熱退水角中間以痛醫昧於深理就施針艾尤不能精用水角則太早以火攻則稍遲何者疽之萌生而用水角則内熱毒畏冷逼之却入腠理皮肉堅厚毒氣内堅肉變為膿以致内潰深可哀也疽之已成而乃火攻則火毒相擊令人煩悶加其虚憊可不慎乎或富貴之人遭遇此疾多貯水銀以為水角尤妙用水銀法揀穏實地穿一坑口稍闊於瘡腫處深可四五寸先於坑中布紙五六重襯水銀諸餘鋪設一依前方其水銀多至一升已来如無只三五合亦得今之名外科者多是膠柱不善變通立性麄率惟以針刀為快始用毒藥塗擦其外内施冷藥以虚其胃外以塗藥閉塞毛竅致使毒氣無從所出内外交攻血氣溷亂則正氣愈虧邪氣滋盛其瘡腫臖根脚散濶而患者疼痛昏迷恣其所措毒勢爛漫却云痛者易療操心剛很輕視人命以規微利却以軟言慰諭病者殊不興念人之痛楚頃刻難堪反以毒藥痳癡好肉務施刀剪云去蠧肉如此為醫與屠劊何異哉言至於此惻然寒心故善惡之證全在醫之工拙所致患者忌作勞呌怒嗜欲飲食如乾濕麫炙煿煎炒醃物法酒生冷油膩牛羊鷄鵝魚並不可食性熱者發熱冷者損脾胃毒者發病皆當戒之病者之房深戒有腋氣之人并有孕婦人月經現行婦人孝子僧道毋令入房房内常令洒掃潔淨焚好香氣方使血氣流暢易得安愈合藥之時亦忌此等見之又忌見鷄犬猫畜諸癰疽附論夫癰疽瘡腫之作者皆五臟六腑蓄而不流則皆有矣非獨因榮衛壅塞而發者也其行也有處其主也有歸假令發於喉舌者心之毒發于皮膚者肺之毒發于肌肉者脾之毒發于骨髓者腎之毒發于下者隂中之毒發于上者陽中之毒發于外者六腑之毒發于内者五臟之毒故内曰壞外曰潰上曰從下曰逆發于上者得之速發于下者得之緩感于六腑則易治感于五臟則難瘳也又近骨者多冷近膚者多熱近骨者久不愈則傳氣成漏成蟲則多痒少痛或先痒後痛生漏則多痛少痒或不疼不痒内虚外實者多痛少痒血不止則多死膿疾潰則多生方藤黄飲子治一切癰疽瘡腫金銀花黄耆防風川烏羗活大黄赤芍藥薄荷連翹麻黄當歸石膏黄芩桔梗白术白茯苓各四兩荆芥甘草各三錢山梔子半兩人參七錢半滑石六錢芒硝一錢右為麄末毎服半兩水二盞生薑三片或白水煎服大内塞排膿散治發背癰疽經年痊後復發此因風火或結氣内經脉閉塞至夏月以来出攻於背久不治腫聚作膿血為瘡内漏山茱萸五味子茯苓乾姜各六錢甘草石斛人參桂心芍藥巴㦸天麥門冬乾地黄蓯蓉逺志各八兩當歸石韋芎藭各四兩附子二分地膽兎絲子三分右末酒服方寸匕日三夜一外䑓秘要有瞿麥一云地麥膚子無地膽稍加之常服終身不患癰癤乾地黄丸凡壮熱人能常服之終身不患癰疽令人肥悅乾地黄五兩芍藥甘草桂心黄耆黄芩巴㦸天括蔞根逺志各二兩石斛當歸大黄各三兩人參一兩天門冬蓯蓉各四兩右為末蜜丸如桐子大酒服十丸日三加至二十丸李根皮散治癰疽發背及小小瘰􅊓曽有人患骨從瘡中出兼有三十餘癰癤服此散瘥李根皮一升括蔞根半夏各五兩通草白歛桔梗厚朴黄芩附子各一兩甘草當歸各二兩葛根三兩桂心芍藥各四兩芎藭六兩右治下篩酒服方寸匕日三瘡大困者夜再服之狗寳丸一名寸金丸二名返䰟丹三名再生丸四名追命丹五名延夀丸六名來甦丸七名知命丸八名得道丸若有患瘡身未爛者與三丸服之嚥下便活如口噤斡開牙闗研下三丸灌之下咽喉中立生此方善治發背腦疽癰疽癰腫偏身附骨腫痛先覺時飲入口中煩渇發熱發寒四肢沉重身體壮熱瘰􅊓疔瘡普皆治之蟾酥二錢狗寳一而金頭蜈蚣七箇頭尾全用羊酥炙黄色膩粉雄黄没藥南乳香各一錢狗膽不乾者用之麝香一分粉霜黄蠟各三錢烏金石一錢􅔈砂半兩頭首兒孩兒乳一合黑金膽一箇乾者用之右同為末除黄蠟乳汁二味熬成膏子同為丸如菉豆大小兒如芥子大小每服一丸病重者加至三丸用白丁香七箇研爛調新汲水送用衣服盖出汗為度大叚疼痛無頭瘡腫不過三服立效已後只喫白粥常服十宣散留頭與四邊以後烏龍膏貼之一方有鉛白霜排膿内塞散治大瘡熱退膿血不止瘡中肉虚疼痛楊氏家藏云名内補散治癰疽瘡癤未成者服之即散已結就者服之速潰敗膿自出惡肉自去疼痛頓減飲食如常不生嘔吐諸般惡疾一名内補防風散防風茯苓白芷桔梗逺志甘草人參芎藭當歸黄耆各一兩厚朴二兩桂心二分附子二枚赤小豆五合酒浸熬右治下篩酒服方寸匕日三夜一温酒米湯調下一方每服三錢不拘時候氣實并少壮人去附子一方無茯苓附子赤小豆逺志名十全内補散所用藥惟人參當歸黄耆加二兩外餘各一兩為末温酒調下日夜各數服以為妙服至瘡口合更服為佳所以補前損杜後患也不飲酒人濃煎木香湯下然不若酒熱之勝也已後只喫白粥常服十宣散留頭與四邊以搨烏龍膏貼之一方有鉛白霜木香搨腫湯治諸瘡疽如發腫焮増長熱痛木香犀角大黄梔子仁升麻黄芩黄連射干黄蘖白歛甘草炙朴硝紫檀羚羊角各一兩右㕮咀入生地黄汁五合如無用生乾地黄五兩剉碎和勻每用藥五兩水一斗煎至七升入麝香五錢淨帛蘸藥熱搨腫上日兩三度冷再換荆芥散治一切癰疽不問發肩背作臖疼痛並宜服此疾便消散其效如神荆芥薄荷山蜈蚣老翁髪天花粉茹荑茹片敗荷心川白芷赤芍藥猪牙皂角切炒以上各等分淮烏大者一個煨紅内消倍其數甘草每十五文入一文喜甜加用右為末毎服二錢薄荷茶清調下欲快利用酒調效若服經日未見效恐是凉藥澁血可加當歸羗活如熱重雄黄酒調乳癰加萱草根研汁調其餘候只用酒下不則麥門冬去心煎湯亦可但較緩耳敷藥諸般疽發腫赤痛不可忍未成覺散已成覺破用至瘡口合而止荆芥和根剉碎赤芍藥大栢皮土當歸山大黄白芨赤歛白歛寒水石煨或炒草烏各等分土白芷天南星赤小豆商陸根即中榕根剉片子右為末生地黄自然汁調角四畔或苦虀根汁腫用商陸根研汁未潰則滿體塗上或有尖起處則留出瘡口萬金膏治癰疽發背互發瘰􅊓隂毒痛不能忍並治或有腫毒侵内沉伏者吸毒於外川烏草烏白芷黄栢皮藁本荆芥蟬退肉桂白蠶赤小豆乳香没藥蠶沙天花粉右等分為末薄荷汁和蜜調塗患處以紙掩住或姜汁地黄汁調搽皆可如乾用地黄汁薄荷汁皆可刷濕木通散凡内消先用此藥退潮止渇觧熱以升麻葛根湯表散後服此藥木通瞿麥荆芥薄荷白芷天花粉甘草赤芍藥麥門冬去心生乾地黄山梔子車前子連翹各等分右剉散每服二錢燈心地黄煎熱潮加淡竹葉煎温服上膈食後下膈空心老人氣虚者宜加當歸羗活李嗣立五香連翹湯治一切積熱惡核瘰􅊓癰疽惡瘡發背乳香甘草木香沉香各七錢半連翹去蒂射干即扁蓄根云當門子升麻黄茋生去皮蘆木通去節桑寄生人治此疾如無真者可倍用升麻代之獨活已上各七錢半今舖中只是前胡或土當歸不可用只用羗活妙丁香去枝梗不見火半兩麝香一錢半另研右為粗末每服三錢水一盞煎至七分去滓温服銀器煎尤妙如無銀銚用磁噐入銀一片或釵鐶之類同煎其中無大黄多服無妨大便秘者加大黄七錢半外科精要云服此二日後與漏蘆湯相間服之一方有大黄無黄耆一方加藿香本方原有竹瀝芒硝恐泥者不能斟酌故缺知者自加又一方無丁香五香連翹湯治疽作二日後宜以此藥之去五臟毒氣神效桑白皮無好者寧缺之木香連翹沉香黄耆升麻木通各七錢半麝香獨活各七錢半丁香乳香另研大黄剉炒甘草各半兩右㕮咀每服四錢水一大盞煎至八分去滓温服乾地黄丸治虚熱消瘡癤乾地黄四兩大黄六分芍藥王不留行茯苓甘草逺志麥門冬人參升麻黄芩各三兩桂心六兩右為末蜜和丸如桐子大酒服十丸日三加至二十丸一方枳實三兩一方無甘草逺志麥門冬人參升麻黄芩神祕陷脉散黄耆人參并去蘆川當歸酒洗去蘆川芎赤芍藥粉草地骨皮五加皮忍冬葉橘紅各一兩乳香没藥並另研各半分右為粗末每服三錢水一盞酒半盞煎至一盞去滓不拘時温服排膿内補散治發背瘡潰後因飲食有傷調攝不到發熱不住用以退熱一名梔子黄芩湯漏蘆連翹山梔仁黄芩去心防風石韋如無用桑白皮甘草生犀角屑人參去蘆苦參去蘆白茯苓去皮各二錢半黄耆一兩去蘆右為粗末每服四錢水一中盞煎至六分去滓温服竹葉黄耆湯治癰疽發背煩渇及一切惡瘡淡竹葉二兩生地黄八兩黄耆當歸川芎甘草黄芩去心芍藥人參麥門冬去心半夏湯洗石膏各三兩右為粗末每服五錢水一盞半竹葉五片生姜五片煎至一盞去滓温服外臺秘要有大棗三十枚擘五香連翹湯如有不用五香曰七味連翹湯沉香藿香葉木香各一兩麝香一字另研丁香一兩射干獨活寄生草升麻各一兩甘草炙一兩大黄一兩半連翹一兩右七味㕮咀和前五味勻每服五錢水一鍾半煎至一鍾去滓温服取利為效未利再服食前方内五香為粗末另研普濟方卷二百八十二
