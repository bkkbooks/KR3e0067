body:
  text: 普濟方卷四百二明周王朱橚撰嬰孩痘疹門緫論夫天行豌痘瘡自西漢以前經方不載或云建武中於南陽征虜所得呼為虜瘡次而大小兒相繼傳染為受虜之疫氣故也後世明醫經方始說痘瘡斑疹盖小兒瘡痘是托質成形在胎食母血穢出腹啼聲才落則嚥下血穢同胎糞而下唯血穢之氣存因腹寒時氣或積潮熱熱運動穢氣入於五臟其毒當出穢氣入肝與淚相感則為水泡色澤微青以應肝之象旺在寅卯入心與汗相感則為斑子色𢃄深紅以應心之象旺在己午入脾與涎相感則為疹子色赤黄淺以應脾之象旺在辰戍丑未入肺與涕相感則為膿泡色白而肥以應肺之象旺在申酉腎主色黒腎在下不受穢氣瘡痘不透即變黒色以應腎之象旺在亥子候如小兒寅夘時發潮熱来日依時三日亦然盖肝旺扵寅夘因潮熱而運動肝氣故隨臟而出必知水泡也如己午時發潮熱来日依時必出斑子也若辰戍丑未時内見㸃發熱又過一時復作者必知出疹子也如申酉時作潮熱本属肺臟来日却在寅夘時發熱不依次第必知膿泡水泡相雜而出餘皆倣此推之在下不受穢氣唯氣内虚多歸於腎變黒色難經日諸陽皆㑹於頭素問云春陽上升故知先出於頭面也瘡痘者是小兒大難不可不為詳審也錢氏云面燥腮赤目胞亦赤呵欠煩悶乍凉乍熱咳𠻳噴嚏手足稍冷丸下之復惡寒不已身冷出汗耳骫反熱者死何以然腎氣太旺脾虚不能治故也下後身熱氣温欲水者可治以脾能勝寒去濕熱也冝觧毒不可妄下下則内虚多歸於腎若能食而痂頭焦起或未焦而喘實者可下身熱煩渇腹滿而喘大小便澀面赤悶亂大吐此當利小便不差者宣風散下之若五七日痂不焦是内發熱熱氣蒸於皮中故不得焦痂也冝宣風散導之用生犀磨汁觧之使熱不生必着痂矣瘡疹由内相勝也惟斑疹能作搐疹為脾所生脾虚而肝旺乘之來勝土熱氣相繫動於心神心喜為熱神氣不安因搐成癎斑子為心所生心生熱熱則生風風属於肝二臟相傳風火相争故發搐治之當㵼心肝補其母括蒌湯之主瘡黒而忽㵼便膿血并痂脱者順水糓不消者逆何以然且瘡黒属腎脾氣本強或舊服補脾藥脾氣得實是脾可制之令瘡入腹化膿血㵼下外痂脱落是脾强腎退即病出而安也米糓及㵼乳不化者是脾虚不能制腎故自泄也此必難治睦親宫一大王病瘡疹始用一李醫又召錢氏錢留抱龍丸三服李以藥下之其疹稠宻盛見大驚曰若非轉下則為逆病王曰李已用藥下之錢曰瘡疾始出來有他證不可下也但當用平和藥頻與乳食不受風冷可也如瘡疹三日不出或出不快即微發之發之不出即加藥加藥不出即大發之大發後及脉平無證者即瘡本稀不可更發也有大熱則當利小便小熱者當觧毒若出快勿發勿下故止用抱龍丸治之瘡痂若起能食者大黄丸下之㵼一二行即止今先下一日瘡痘未能出盡而稠宻甚則此俱難治也縱欲安其病有三一者疹二者癰三者目赤李不能治經三日黒陷急召錢氏錢氏曰幸不發寒而病未困也遂用百祥丸為君以牛李膏為佐各一大服五日間瘡復紅活七日而愈盖黒者歸腎也腎旺勝脾土不能尅水故脾虚寒戰則難治所用百祥丸者以㵼膀胱之腑盖以腑若不實則藏自不盛何以不㵼腎曰腎主虚不受㵼以二服不効即加寒而死四大王宫五太尉因墜鞦韆發驚搐醫用發熱藥治之不愈錢曰本急驚後生大熱當先退其熱以大黄丸玉露散惺惺丸加以牛黄龍麝解之不愈至三日肌膚尚熱錢曰更二日不愈必發斑瘡盖熱不能出也他醫初用藥發散發散入表表熱而斑生本初驚時應用利藥下之今發散乃逆也後二日果斑出以必勝散治之七日愈當睦親宫十太尉病疹衆醫治之王曰疹未出属何臟腑一醫言胃大熱一醫言腹寒不退一醫言在母腹中有毒錢氏曰若言胃熱何以乍凉乍熱若言母腹中毒發属何臓也醫曰在脾胃錢曰既在脾胃何以驚悸醫無對錢曰夫胎在腹中月至六七則已成形食穢液入兒五臓食至十月滿胃脘中至生之時口有不潔産母以手拭净則無疾病俗以黄連汁壓之方下臍糞涎穢此亦母之潔餘氣入兒臓本先因微寒入而成瘡疹未出五臓皆見病証内一藏受穢多者乃出瘡疹初欲病時先呵欠煩悶驚悸乍凉乍熱手足冷面腮燥赤咳𠻳時連此五臓證具也呵欠煩悶肝也時發驚悸心也乍凉乍熱手足冷脾也面白顋煩赤𠻳嚏肺也惟腎無候以在腑不能食穢故也凡瘡疹乃五臓毒若出歸一證則肝水泡肺膿泡心斑脾疹惟腎不入毒穢而無諸毒瘡黒者故腎由不慎風冷而不飽内虚也又用抱龍丸数服愈以其别無他候属未發出則見五臓證已出則歸一臓也傷寒男體重面黄女赤喘急憎寒口中氣熱呵欠煩悶項急瘡疹則兩顋赤燥多噴嚏悸動昏倦四肢冷復寒當發散之治疹宜温平有大熱者觧毒陳氏方論云小兒在胎之時乃母五臓所養成形也其母不畏禁忌恣意所欲加添滋味好啖辛酸或食毒物其氣摶於胎胞之中所以小兒在胎胞之時受得此毒名曰三者五臓六腑穢液之毒發為水泡瘡二者皮膜筋肉穢液之毒發為膿水泡瘡三者氣血骨髓穢液之毒發為膿血水泡瘡三毒既出發為疹痘子母湏當慎口即不可食葱韮薤蒜酒醋塩醤獐兎鷄犬河海䖝魚等物世俗未曉将謂發舉往往不顧其後悮傷多矣凡療瘡疹先分表裏虚實不分則無治如表裏俱實者其瘡易出易靨如表裏虚實者其瘡易出難靨已出未出之間或㵼渇或腹脹或氣促皆謂之裏虚速與十一味木香散治之以和五臓之氣已出未出之間其瘡不光澤不起發根窠不紅謂之表虚速與十二味異功散治之以表六腑之氣已出未出之間其瘡不光澤不起發根窠不紅或腹脹或㵼渇或氣促是表裏俱虚也速與十二味異功散送下七味肉豆䓻丸治之以助五臓六腑表裏之氣始出一日至十日渾身壮熱大便黄稠是表裏虚實也其瘡必光澤必起發必肥滿必易靨不致損傷也發熱口乾煩渇不止者切不可以冷水及蜜紅柿西𤓰等冷物食之不可妄投清凉飲消毒散等藥恐冷氣内攻濕損脾胃則腹脹喘滿寒戰嚙牙則難治咬牙者齒槁者乃血氣不榮即不可妄作熱治之痘瘡見㸃不快皆言毒氣壅盛妄謂其熱以藥宣利觧散致令臓腑受冷榮衛澀滯則血氣不能充貫皮膚飢肉有瘡不起發不充滿不結實不成痂故多痒塌煩躁喘渇而死皆因宣利觧散之過縱有生者必罕矣大抵天地萬物遇春而生發至夏而長成乃陽氣薫蒸故得長成今瘡疹之病腑臓調和則血氣充實自然易出易靨盖因外常和暖内無冷氣之所由也異功散能除風寒濕痺調和隂陽滋養氣血使瘡痘易出易靨不致痒塌小兒纔覺傷風身熱未明是與不是瘡疹便冝發散可服四味升麻葛根湯如瘡疹始出日至五七日之間雖身熱或腹脹足稍冷者不冝也或身熱㵼渇驚悸腹脹熱汗出者不冝升麻葛根湯以上四證宜以十一味香散治之如㵼水糓或㵼白色或㵼淡黄色者煎十一味木香散送下七味肉豆䓻丸治之㵼止住服不止多服若頻㵼多津液内耗血氣不榮其瘡雖起發亦不能靨如身温腹脹嚙牙喘渇者難治縁水糓去多津液枯竭而欲飲水不止者湯散真氣故多性温平能和表裏通行津液清上實下扶隂助陽之藥也善治小兒腹脹㵼渇其效如神不能盡述如四五日大便者可用肥嫩猪表一塊以淡白水浸火煑軟熟取出切如豆大或皂子大與兒食之令臓腑滋潤便瘡痂易落百無滯礙切不可妄投宣㵼藥恐内虚瘡毒入裏傷兒真氣如六七日身壮熱不大便其脉𦂳盛與三味消毒散微得利即住小兒神氣軟弱瘡疹自初出兩三日至十三日當忌外人恐有卒暴風寒穢惡之氣觸兒瘡疹凢遇經者作三次出大小不一等頭面稀少眼中無根窠紅肥滿光澤重者一齊並出如蠶種灰白色稠宻泄㵼身温足冷輕變重犯房屋不忌口先曽㵼飲冷水餌凉藥重變輕避風寒常和暖大便稠初根出圖闕窠圖闕圗活倒已陷圖闕靨圖闕圗圗若身反發熱煩渇者宜服六味人参麥門冬散治之如不愈者只服七味人参白术散若痘瘡欲靨已靨之間忽不能靨腹脹煩渇不可與水蜜若與者轉渇而死急十一味木香散救之若痘瘡欲壓已靨之間頭温足指冷或腹脹㵼渇氣促者不可與水蜜與者死速煎十二味異功散救之痘瘡十日至十一日當靨不靨其身不壮熱悶亂不寧卧則哽氣煩渇嚙牙急煎十二味異功散更加木香當歸以救隂陽表裏若與水蜜西𤓰等冷物者殺之太速十二日十三日瘡痂已落其瘡瘢猶㸃或凹或凸肌肉尚嫩不可澡浴不冝食炙􅏼物及不宜食五辛五味并有毒之物恐熱毒熏於肝膈眼目多生翳障若不依此當為兒孫終身之患用兩味糓精草散治之若身壮熱經日不除則無他證六味柴胡麥門冬散治之熱退者住服如不愈只服七味人参白术散極妙若身壮熱大便堅實或口舌生瘡咽喉腫痛皆是餘毒未盡四味射干鼠粘湯治之如不愈者七味人参白术散主之若風熱咳𠻳咽膈不利三味桔梗甘草防風湯治之如不愈者七味人参白术散主之若涕唾稠粘身熱鼻乾大便如常小便黄赤十六味人参清膈散治之如不愈只服七味人参白术散立効若痰實壮熱胷中煩悶大便堅實卧則喘急五味前胡枳殻湯治之黄帝問曰飲有隂陽何也好飲冷者水雪不知寒好飲熱者沸湯不知熱岐伯對曰陽盛隂虚飲冷不知寒隂盛陽虚飲湯不知熱治之柰何如陽盛則補隂木香散加之以丁香官桂隂盛陽虚異功散加之以木香當歸每一兩藥共加一錢小兒痘瘡首尾不冝與水喫若悮與之瘡靨之後其痂遲落或身生癰腫若鍼之成疳蝕瘡血水不絶甚則面黄唇白以治難愈者何也盖脾胃属土外主身之肌肉秪緣飲水過多濕損脾胃摶於肌肉其脾胃肌肉虚則津液衰少則榮衛澀滯榮衛澀滯則氣血不能周流凝結不散故瘡痂遲落而身生癰腫若有小渇者六味人参麥門冬散治之如不愈者只服七味人参白术散極妙若身熱大渇者七味人参白术散治之如不愈者只服十一味木香散如腹脹渇者或㵼渇者或足指冷渇者或驚悸渇者或身温渇者或身熱面㿠白色渇者或寒戰渇不止者或氣急咬牙渇者或飲水轉渇不已者已上九證即非熱乃脾胃肌肉虚津液衰少故也宜服十一味木香散治之如不愈者更加丁香官桂多煎服丁香攻裹官桂發表其表裏俱實則瘡不致痒塌喘渇死矣小兒瘡疹已靨未愈之間五臓未實肌肉尚虚血氣未得平復忽被風邪傅於膚腠之間則津液澀滯故成疳蝕瘡也冝用施黄散綿蠒散等藥治之乆而不痊者潰骨傷筋以致殺人治瘡痘法十二事驚瘡第一小兒因傷寒時氣運動瘡痘欲出身熱忽發驚搐心生熱熱則生風風属於肝二臓相争故驚搐也凡身壮熱鼻尖及手稍冷忽發搐者此非驚是豆搐也其驚搐則諸處皆執有驚定後熱不退者三兩日必出瘡痘再出亦同右用驅風膏導亦散不退洗心散琥珀散涎盛利驚丸瘡欲出第二小兒因傷寒時氣頭瘡壮熱憎寒咳嗽氣粗呵欠嚏噴大小便如常瘡痘未分或目澀肚疼者右用升麻湯惺惺散羗活散黍粘散防風湯小柴胡湯夏月白虎湯甘露散擇用之夾食吐逆洩㵼發熱上氣丸豆䓻丸四君子湯白术散相間惺惺散瘡痘損攻目第三瘡痘欲出先攻目赤腫不開次出瘡豆不甚紅活有痰者即有安者湏損眼目右用調肝散護目生銀丸并珍珠丸化痰宜更對證用藥豆毒生癰第四瘡豆正出或豆後餘熱不去必生癰腫或毒攻眼目或從瘡跡中再出濃泡者是豆毒未盡大便焦黄或堅實者右用四順飲利三兩次并鼠粘湯夏月白虎湯時時多服之瘡痘肚疼第五瘡痘正出微紅無事忽因傷食肚疼呌哭者右用消瘡丸不退觧毒丸微微逐倉次益黄散即安活人書云切不可用巴豆元子藥下之紫藥乃攻食積今有此肚疼證用之不妨若慮其下之恐因肚疼變動瘡痘縮伏第六瘡痘正出大便如常或堅實或焦黄忽憎寒戞齒者是痘毒縮伏多作此證右用大㦸散前病若退隨證更發瘡痘如不退者死瘡痘吐㵼第七瘡痘正出吐㵼不食忽憎寒戞齒者瘡必黒陷喉中涎喘盖兒先受風冷血氣虚弱即藥此證難治多死右用益黄散甚者金液丹食前服若吐㵼定後斯證平復方可用發瘡痘藥即有安者必生癰腫大小便澀第八瘡痘盛出身熱煩渇腹脹而喘大小便澀面赤悶亂右用八正散四順飲不退宣風散瘡痘入眼第九瘡痘盛出熱毒氣攻則斑瘡入眼多食毒物亦爾若覺眼腫或赤痛多淚時與開看睛無瘡即不害若有瘡赤腫者右用四順飲每日食後一服常令微利毒消平愈不爾害目解利瘡痘第十瘡痘已出盡身凉喜食大小便如常者右用四順飲子利三兩次後不生别病如失觧利恐赤眼癰腫鼻衂下痢疥癩数證内皆不能免也痘瘡發驚十一瘡痘出後身熱不退時復揺頭手顫必發驚搐右用抱龍丸驅風膏琥珀散熱盛四順飲八正散鼠粘湯白虎湯不退無比散盖痘毒所作也若㵼有此證者多死瘡痘作痢十二瘡痘欲安不曽傷食有肚疼者是痘毒大盛氣血凝結腹中不散久必作膿血痢右用四物湯加罌粟皮大便堅實或㵼焦黄或熱或不熱有肚疼者四順飲若㵼白酸臭傷食肚疼者先益黄散後觧毒丸令微利再益黄散瘡痘避忌者十腋中狐臭氣俗呼猪狗臭是也房中淫泆氣新房之氣是也婦人經候氣并諸般血腥臭惡醉酒葷腥氣聞醉氣痘毒畜入兒飲酒痘毒發出硫黄蚊藥氣并毒藥之氣硫黄發之氣赤目觸之疾痛難差口麝香臊穢氣疫汗蒸濕氣錢氏云左右有胡荽酒辟汗氣悮燒頭髪氣并魚骨諸般臭氣及柴煙入口鼻内葱蒜韭薤氣及烹炮煎煮油烟等氣溝糞濁惡氣孫真人云胡荽酒辟諸般惡氣出以上皆不可犯令兒變動不可不忌盖親厯騐也或曰有田舎小兒任之自然犯之者都無變動何也盖貴賤有異禀受不同也凡出瘡痘首尾不可出風宜於虚爽處坐卧寒温得所忌動風物食白魚野味頻與稀粥易能安愈應瘡痘才欲着痂即用酥蜜面油不住潤之可掲則掲遲則瘡硬成瘢㾗治痘痕面靨蜜陀僧末水調夜塗明日洗去平復瘡痘可畏者十不食多渇渇㵼不食益黄散白术散不㵼不食白粟湯杏甘湯戞齒噤牙能令痘子陷伏是腎旺也治法在前憎寒困倦能令痘子縮伏是脾虚也治法在前煩躁體熱揺頭者欲生風候治法與大小便同吐逆洩㵼食不化益黄散正出井豆後大便膿血金粟膏桃紅丸食作黒坑内無膿血或黒色泡或光瘡前作黒孔多大小便澀四順飲八正散三黄丸玉漿散癰塊壅腫痘毒變甜口臭蝕牙唇口鼻牙落者死喘急痰盛桔甘湯生銀丸珍珠丸無比散聲啞氣噎或正出盛或痘後有此證多死嚥藥食腹中鳴者亦死以上是瘡痘惡證首尾可畏也除此之外皆不妨内犯其一二者但飲如舊雖因重醫救有可生之理如飲食减平日一半者死有飲食如舊内犯其三四亦死舌黒或鼻有氣黒並不治瘡已出而譫語者為惡證瘡成餅搭黯惨不發其聲焦啞不治兩眼閉而黒睛濛昧無光不治面腫鼻陷目開頻嚙齒者不治頭面腫大瘡盡爪破或臭不可邇或脚冷如鐵並不治瘡小黒而焦風攻唇項腫硬或胷髙而突並不治小兒諸病但見兩眼無睛光黒睛無運轉白眼無鋒芒如魚眼猫眼之状箇箇不治或神藏於内但外若昏困者無妨其有病䔍而眼中神氣不脫者猶可以活眼者五臓六腑神氣之所聚神氣已脫脉雖僅存亦未能保論瘡痘約日訣小兒瘡痘與傷寒相類或安或危或見或隠皆六七日之間歸證明矣凡瘡欲出先發熱輕者三四日次者五日逺者不過七日此約法也一日太陽轉膀胱二日陽明傳胃三日少陽傳膽四日太陽轉脾五日少隂𫝊腎六日厥隂𫝊肝七日還經𫝊遍五臓六腑故七日而止也又有小兒因傷寒至七日後或已汗或未汗或吐下後熱不除此毒氣盛而未發熱毒入謂發於皮膚成斑者壮如蚤蚊所嚙赤斑十生一死黒斑十死一生及有胃熱發黄者體如橘色不利者死又有成隠疹或白泡者此皆傷寒熱毒不除多變此疾也辯瘡疹諸證聞人氏云瘡痘之熱與諸熱似是而非若同而異此病之所以能感人也凡小兒瘡痘其初不免乎發熱然必雜見四臓之證呵欠煩悶時作驚悸乍凉乍熱手足冷多睡面赤痰𠻳打嚏惟腎無證耳若他病之熱種種不同如手足稍微冷發熱惡寒而無汗面色青惨而不舒左額之青紋者傷寒熱也手足稍微温發熱有汗面赤而光者傷風熱也目皰腫而右額有青筋發熱而頭額腹肚㝡甚或兼嘔吐腹疼者傷食熱也面色青紅額正中有青紋手心有汗時作驚悸手絡脉微動而發熱者此驚熱也身熱而倍能食唇紅頰赤大小便秘脅下汗者此風熱也又有潮熱者發歇有時壮熱者一向熱而不已如懵然不分一槩調治鮮不敗事諸熱失治皆能作瘡痘者盖病有初異而後同者要當早為之所宜瘡痘之毒藴伏在裏非熱蒸則無自而出是以古書云熱蒸三日而斑生往往其間已見瘡痘之證今也不問傷寒傷風傷食之熱與夫驚熱風熱潮熱壮熱之類乆而不去内外感發則所藴瘡痘之毒亦能乘間而出用藥者既先知熱之所以異又能慮熱之不觧亦将為瘡痘之證斯可謂之良工矣嘗觀傷寒有胃爛發斑温毒發斑二者其初均發熱也方其熱作之初孰謂其有發斑之證邪熱然則諸熱失治而能為瘡痘者斯言信矣挾熱而吐利者不可誤投燥藥藴瘡痘證而先發搐者不可遽投驚藥云諸痛癢瘡皆出於心今瘡痘之出雖四臓各有證要之心實為之主毒氣始作未行之間忽發驚搐是毒氣自心經而出也苟不以内外證辨明之不為瘡痘防備之便用銀粉腦麝青黛等藥則心寒而肌歛毒氣内陷往往瘡痘之初似驚風發搐者多毎見悮服寒藥而死者氣絶之際或隠隠斑出已無及矣盖心竅一寒則毒氣閉伏表裏不透又况心主一身之血心寒則血凝而不行瘡子欲出不可得也且瘡痘發驚必有他證相雜又有小兒平居安樂素無疾苦而忽爾作搐者必是瘡痘尤當審諦但用發散毒氣如惺惺散升麻湯紅綿散兼快氣利小便等藥服之雖未能即效决不致敗事待其熱氣得洩心神亦自安矣或有風寒與内熱相摶而致此者則各有其證治之亦如前法但加勻氣藥為妙張氏云瘡痘氣勻即出快盖氣勻則榮衛無滯治寒亦去矣然驚惟平肝利小便最為第一小兒臓腑先有伏熱而適外感風寒或内傷生冷以治隂陽相推發作腹疼或腹中作塊攻擊若手足稍及尻隂俱冷而腹中硬痛者是瘡疹證無疑矣更叅以其他證候尤為詳審但與平和勻氣無發散藥為妙苟不知此便投巴豆大黄輩戕賊胃氣使毒氣不能宣發立致危殆其間縦有能發見者往往中道而廢為倒靨為陷㐲歸不救古人立升麻湯治小兒瘡痘嘗思古之人意盖治瘡痘之常不治瘡痘之變何也未有斑㸃之前均發熱者常也已結痂疕之後均有餘熱怫欎而肌表未清凉者亦常也是以升麻湯方状云治瘡疹未發已發未發者謂未見斑㸃之前已發者謂已作痂疕之後此升麻湯所以為治瘡疹之常也若夫斑㸃既見與夫痂㾃未結其候千變萬化治法當隨時變通非定論之可拘如傷寒之變異不一也當此之際安可執一藥以應無窮之變哉且升麻湯所用之藥不過凉肌散觧表而已未見斑㸃之前已結痂疕之後則可以凉肌可以觧表古人䖏方之意如此曷甞令用之於瘡疹正作之時耶令昧者不能究此既見斑㸃尚令兒服餌致肌寒表弱陷伏而危殆多矣升麻葛根湯按和劑方瘡痘已發未發者皆可服世俗習為常談不問小兒虚實冷熱自首至尾率多用之甚者方發而不快既發而復陷亦以升麻湯為常施之劑其為害可勝嘆哉何者葛根觧表升麻差寒小兒氣盛熱多服之猶可以消毒萬一内虚胃弱則以水寧不虧損胃氣水凝血脉而瘡疹轉為之逆陷乎夫古人所謂未發者方身熱尚疑似之時也所謂已發者既透㣲欲成痂之候也曷嘗以發而不快與發而復陷為可用升麻哉若不辯明殊恐世俗相傳致死者半矣又况人之齒牙大熱或者相習變陷不透者不問虚實一槩用之其害則猶甚於妄用升麻之不審也盖瘡痘變陷有因外感風寒而壓之者治法則當觧散寒邪有内氣太實榮衛不得調暢而出不快者治法則當流行氣脉安可既曰氷冷直用人牙遂使小兒服之欎悶氣啞迨其發出稠疊異常往往待斃而不救矣曷不用紫草黄耆川芎甘草輩為愈哉始末日数有定熱蒸三日則紅斑生紅斑生至足心為齊不拘多少重者遍身輕者數粒而已紅斑生血泡起如豆在肌膚之上故以痘為名焉血泡結痂疕方為愈也紅㸃既陷慎不可用升麻湯寒肌多致害人已見而出遲者用紫草飲子胡荽酒如證候平和者勿妄服藥惟愛䕶安養之紅㸃出齊之後作血泡七日結膿窠結定七日悉成痂疕此皆大畧之言耳病人虚實不可一切拘以日數且古人云熱三日而生斑今有熱七日或數日而方生者亦有熱二三日而即生者自紅斑出齊之後當盡成血泡若血泡之中又尚有紅斑㸃相雜亦不可拘定日數待其皆作血泡為齊如紅斑出齊生血泡血泡七日結膿泡膿泡七日結痂疕此乃榮衛調和内外無諸傷犯方能如期或正作之際遇風候卒變遲速因而失其序又豈可拘以日數哉其當結膿泡而不結者是毒氣彌盛而不斂用猪尾膏以觧猪尾膏是治毒氣太過血泡脹起不結膿窠已成不結痂疕熱極毒熾恐復入於心令兒昏悶而死故也非若外感風寒而倒靨内虚吐㵼而陷伏者之比出不快者數證不同不可不辨假如紅斑出齊之後當漸成血泡血泡成膿泡膿泡結痂㾃而愈也若紅斑已見三四日而反不出者乃毒氣内陷其証危殆切不可妄發及妄下發之則為斑爛下之則為虚脫凡小兒藴毒在内遇冬温或春夏暄熱腠理蒸欎遂出為瘡痘若正發之際忽天氣大寒毒氣伏而不出精神昏冐面青發熱或譫語妄言當此合用觧肌表出之藥如紫草蝉脫發散兼温養如法血散之類感寒證畢備者凡和觧發散之劑皆可酌量用之又有紅斑方出或内虚或因犯胃氣臓腑自利虚弱不食遂陷而不出者冝用温裏之藥甚者雖硫黄薑附靈砂伏火丹砂等亦可用大抵用藥治病或冷或熱所以救一時之不及不可拘以常制或将成血泡之際一半尚是紅斑㸃者此毒氣發越未透故也當此必不能乳食大便如常者冝半温裏半助養之劑其或内虚甚而生寒大便利者冝理中薑附輩以温之裏則氣不消削則不伏䧟矣又有内實之人皮厚肉宻毒氣難於發越至服大黄梔子乾葛石膏之類而得平順者或有適當炎月觸冐暑邪煩躁喘急大渇昏迷而發作不快用白虎石膏湯抱龍五答之類而得安静者此皆臨病識證隨時審諦不可執泥也大凡平居安樂則心神調暢氣體和平一旦有病則隂陽偏勝盛衰不同瘡痘已出而不能遍勻者前人治法唯透肌觧毒而已肌透毒觧既無壅塞之患則自然出勻冝必勝散快毒丹紫草飲胡荽酒之類出太盛而面黄大便色黒煩躁喘渇或腹脹者此為有瘀血在裏冝犀角地黄湯及治瘡疹中䘏血吐血毒氣彌盛者若太盛之際不能觧利則其害尤速如抱龍丸至寳丹生犀磨汁紫雪之類皆可選而用之若大便秘實小便不赤黄恐外熱而内寒又當别求治法甞觀傷寒邪在裏則不可妄發汗邪在表則不可妄下瘡痘之不可妄發妄下者尤甚於傷寒雖然治瘡疹之家有云非微汗則表不觧非微下則裏不觧者何也此說微汗則在表熱方熾斑㸃未見之先微下則在病之始及病之末裏熱壅實之際何甞於瘡痘正發作之時而輙施汗下哉盖妄發之則成斑爛妄下之則成虚脫不可不審如治傷寒法表和裏病下之則死表病裏和汗之則愈下之則死亦此理也非微汗則表不觧者何瘡痘之源雖是藴毒然必因天氣暄暖或感冐風寒及諸熱不觧然後斑生方其發熱未見之時得微汗觧散則雖為瘡痘其熱亦輕此所以言非微汗則表不觧也盖其證身痛頭疼鼻壅痰涕咳嗽面目赤色皮膚𦂳而脉數者皆熱極之故當此之際毒氣亦不輕若得微汗少觧則可以折其方来之勢升麻湯等主之如斑㸃已出則慎不可用又有因服發散藥邪毒之氣隨汗作白珠子或出小紅瘡應手而觧者不可不知也非微下則裏不觧者何病有始有中有末三者不同不可一槩用藥且身熱脉數大便秘而膓脹此熱毒壅遏未見形伏者當微下之非微下則熱不感此是始者熱在裏班未出之時也若斑㸃隠隠在肌膚中者是已發越在表冝用平和輕快勻氣藥此毒氣已在表瘡正發時則不妄下也又有結膿窠痂疕之際脉尚洪数能食面大小便秘此表證已罷裏有熱毒冝微利之大抵臓腑有熱往往利大小便者以其主出而不内故也大便如常者胃中主腐熱水糓大膓主𫝊送已化之物此平虚察實冷熱之處盖飲食進退則知人糓氣之虚實大便滑澀又知人臓腑之冷熱今大便如常則是其中平和無過冷過熱之患不必温補亦不可妄攻撃然則大便如常是出瘡痘者之順也病勢有遲速用藥當度其冝可速則速可緩則緩凢瘡痘非合下證但當以平和藥扶持之乳食調養之避風寒以温之如已見三五日而尚未快出者可微發之微發不出則加藥加藥又不出無他證者則是瘡本稀不可更發也今人才見發之不出往往便下使其人内虚欲出者因利而不出已出者為陷伏為倒靨變壊歸腎以脾土弱而腎水反勝故也錢氏論以百祥丸下膀胱毒則脾土再實瘡痘復黜之與其下膀胱毒於黒厭之後莫若保脾土於未下之先則不下為愈縱下之而愈亦有三證一疹癬二痘癰三目赤故前人論曰斑㸃未見藴熱壅盛毒在臓腑冝預下之又牛黄丹證云瘡痘出定大便不通膿汁不乾者可下之以此觀之當下是病之始未出之前及病之末已出定之後非正出之時可下也大抵用藥治病能隨證渗泄斯為良法至於或用下藥者實出於不已如傷寒有承氣之戒皆慎之至也雖然有當下證而不即下者又為失下之患所貴乎細審詳耳有可下證者瘡疹出得太盛當結膿泡痂疕而不結者此是毒氣内外貫注若不速觧毒氣内入攻心為害極大治法冝猪尾膏其不結膿泡痂疕反能食而喘腹脹譫語大便者當以承氣湯下之如熱甚而渴面赤悶亂大小便澀或大吐者合利其小便通闗散主之或瘡疹已出膿汗不生而便不通者冝牛黄丹或瘡疹證未見斑㸃胃熱潮作粗腹脹大便秘驚悸煩渇脉沉滑而数者此是毒盛而不得泄亦當用藥下之則内無滯塞榮衛升降其勢将次出此皆合下證也有發出有温出有觧毒者盖病有輕重善治者令重者輕輕者安和仲景論治傷寒冝隨證渗泄是也但身熱煩躁脉促喘滿有瘡疹證而斑不見其熱未退者以麻黄湯發之若斑㸃才見即止後服此謂表發而出之也或禀受怯弱脾胃虚冷大便自利而手足厥逆者炮乾薑炙甘草湯益黄理中輩可選而用之此温使之自出也或瘡痘正出有毒入大腹下利黄赤膿血身熱而渇者以薤白湯三黄熟艾湯觧之此觧其大毒而使之自出也於斯三者或發或温或觧其毒不可不審而用之也有令大便過者有當温者有當下者盖瘡疹傷寒傷食等病身有熱者如大便六七日不通湏令潤過非取其峻快也然亦當以外證叅之如仲景論陽結隂結期十四日十七日方劇若其人不膓滿不裏急後重則亦不必攻之今六七日令潤過者得氣道升降則無壅遏之患緣小兒脆弱身熱而大便不通者則易實大便自利者則易虚惟令得所最為要法其有忽然唐㵼者湏與理中湯丸輩温之又有出得正盛喘促腹滿小便赤掌心及腋下有汗或譫語而大便不通者當投小承氣之類以下之下後瘡子紅活諸證悉退者更不湏再服也已利而瘡痘出則不可再利者飲食滋味雖能益人失之太過亦能害人况烈毒慓悍之藥在已下之後其可再用乎但當其未出因熱勢太盛曽利臓腑令瘡痘既出則是内無壅滯明矣縱其熱尚熱熾但當觧毒切不可更用通利等藥盖實實虚虚古人之深戒雖然苦使果合再利亦當更用但小其劑可也大熱當利小便小熱當觧毒者大熱謂身熱脉實大小便秘津液燥而渇氣滿于胷中能食而不結膿泡痂疕當此之際懼其變生他疾故利小便使心火有所導引則雖不用冷藥熱亦自减去矣瘡痘不至熱過不為冷悮甚為良法小熱觧毒之說謂小熱不觧大熱必生利其小便則膚損氣故但可觧毒而已利小便之藥導赤散為上觧毒之劑如玳瑁湯獨聖散如聖紫草湯犀角飲皆可選而用之誤服熱藥則損目服冷藥則夭傷者盖五臓平和能相資助一有太過不及則病從而生今瘡疹者是表俱熱而發出或助之以熱藥則其勢太過輕為咽喉癰瘍之疾甚則熱盛生風風熱之毒炎上不已無不害目者或抑之以冷藥則脾土無温暖之氣腎水反勝為黒靨為陷伏遂至夭傷不可不戒有正瘡痘疹有膚者臓腑不同表裏有異膚疹瘡痘分别淺深六腑属陽有熱則易出是以作膚疹一出則遍滿肌皮之上如疿瘡細泡子見而便沒其所受氣淺故也五臓属隂有熱則難出其為瘡痘者肌肉血脉之間必先發紅斑而後如痘故名瘡痘其所受氣深故也大抵暴熱而便出者必膚疹乆熱而難出者必瘡痘膚疹非正瘡痘也傷寒熱毒發泡瘡泡相似者傷寒熱邪在表未能作汗不汗熱欎於肌膚故發泡瘡色白或赤如火丹頭作瘭漿白膿者輕根下紫色隠隠有肌肉者重甚者五内七竅皆有之其形亦如痘小兒肌肉嫩薄尤多此證非正瘡痘也小柴胡加連翹麥用生地黄及薑棗煎服冬温發斑温毒發斑者活人書云冬温暖觸冐寒氣至春始發病初在表或已汗或未汗表證未罷毒氣未散故發斑黒膏主之又冬月温暖人感乖戾之氣冬末即病至春或被積寒所折毒氣不得泄至天氣暄熱温毒始發則肌斑爛病丙穩禾疹如錦紋欬而心悶但嘔清汁葛根橘皮湯主之小兒常多此證醫人不識妄亂調治寧不敗事此亦非正瘡痘也經云痒為虚痛為實内快外痛為外實内虚外快内痛為内實外虚又云諸寒為痛今瘡痘若身痛者是發作之時皮膚厚肉理宻或為外寒相搏故也投以勻氣去寒觧肌透毒之劑為妙不必外此而他求也身痒有二證一則氣血不足其痒為虚活血散或四君子加黄茋枳殻主之一則不能食淡以致發痒蝉蜕一物湯主之瘡痘作痒深為可慮能調和愛䕶勿令有此乃為上策瘡毒入大腸者當發作之時其人或臓氣自脫或因腹寒藥傷動致令瘡毒陷入腸㵼下如豆汁或便膿血或便黒汁顴赤如錢口内臭氣唇焦目閉加腹脹者必死之證當早用實脾暖胃劑救之得大腸秘固瘡痘紅活亦死中求生也攻咽疼者心胃熱上攻於咽乾澀而疼如兼口舌生瘡齒浮齦腫者冝甘露飲水漿不下者紫雪㝡妙如聖湯抱龍丸消毒飲皆可選而用之已上證候湏能熱臓腑方可用如上焦雖熱却覺小便清大便溏薄飲食不進者當以清上温下藥調和之治入目方法心熱盛則生肝風肝主目熱毒熏之故目患治以凉肝丸洗以秦皮散或因食毒物睛突出者冝仙靈皮散暴赤腫痛者冝導赤散患半年一年餘者冝蝉蛻散成醫者冝𤓰蔞散葳靈仙散目睛疼痛者冝􅀢萍散生痘瘡者冝大黄散貼之赤脉睛者冝羚羊角丸昏暗者冝金花散已上各隨證用之面青為逆者瘡痘以心血為主身熱煩躁驚悸面赤皆心經形見也所以面赤者為順今反見青色不與病相應安得不謂之逆當更察他證隄防之徧身發青紫紋此由外感風寒與内熱相拒故也瘡痘之出盖熱邪内外蒸發其有當熱作之時忽遇天氣大寒熱毒方運出而暴寒折之外寒為内熱拒而不得入内熱為外寒閉而不能出毒氣壅於肌皮之間如癮疹如痣㸃或青或紫俚俗云鬼捻青者是也往往壮年出者皮膚厚肉理宻尤多此證冝用透肌散牛旁殭蚕散紫背荷葉殭蚕散却寒肌温透表之劑可選用也状如蚊虫所囓而色黒者何此榮血不能流行内外毒氣壅遏欲散而未散故也瘡痘属熱血熱血和則其色如丹砂如雞冠若毒凝血聚則遂成黒色有此證者甚為危困其人必大小便秘喘急煩躁冝用山梔子湯宣毒膏治黒瘡子無此散荘氏云斑瘡倒靨而黒色者謂之鬼瘡子冝獖猪尾血調腦子最佳猪尾血調腦子證其人自利不食者難用不可不審既出而腹脹者有二證一則隂陽不和一則毒氣陷伏入裏瘡痘正作熱毒既盛則必生煩渇或飲冷過多或悮投凉劑熱為冷所激欲出而不能冷熱相拒毒不發越故令腹脹甚者氣喘發厥瘡白而無血色多至不救急當以温中藥踈逐冷氣散則腹脹自消昧昧者莫不又用藥宣㵼致令重因且傷於冷者必不能食大小便利腸中虚鳴此傷冷隂陽氣不和也若毒氣陷伏入裏者但用温平觧毒快氣之劑如人齒散活血散之類大抵毒氣陷伏又有他證相雜或煩躁大渇或大小便秘或啼哭不止萬一腹脹而目閉口中如爛肉臭者其證為大惡小便赤澀心腸脹滿者伏熱在胃則中有所隔上為心氣不降小便澀少而赤下為隂氣不升腹中脹滿董氏用四聖散發出其毒得胃中熱散則邪氣自然氷釋詳其藥味紫草發散黄茋養瘡痘觧毒枳殻和氣寛中木通導心氣而利小便又以甘草調和之出遲而朝夕啼哭者何凡人五臓和平則精神安静有病則不然今瘡痘是五臓藴毒當内外䒱欎發作之時朝夕啼哭者由神不安舍察其毒氣在表在裏若虚若實隨紫草飲子等觧利之或有不問虚實便以胡荽酒洒之葡萄酒飲之又火煆人齒酒調服之施之虚者猶庶幾焉若其人盛實則禍害至矣熱毒之氣湏㬰貫注耳目口鼻咽喉閉塞大便堅秘小便如血是調欎毒不散毒氣無所從出反攻臓腑瘡凹而不起遂成倒靨當此之際不能觧利至於斃者多矣是陽盛熱熾無隂氣以感之也如猪尾膏犀角地黄湯玳瑁湯皆可選而用也得毒氣觧散榮衛流通瘡子将自出矣且初覺頭痛發熱或兼微寒煩躁咽痛者冝升麻湯如聖湯瘙痒或癮疹者冝荊芥湯面赤黄大便澀小便少而或嘔者冝小柴胡湯不惡寒但煩躁而渇作赤斑㸃者冝竹葉石膏湯犀角飲子大便難通者冝四順飲子如譫語昏迷者冝承氣湯或大便自利赤黄而渇者冝三黄熟艾湯黄連觧毒湯中病即止不必盡劑也斑爛者當發散而不發散則毒氣閉塞喘促悶亂不當發散而悮發散則熱毒隨陽氣暴出徧身皮肉如爛此不善表之過也治法冝調脾進食令大便得所安養榮衛生肌觧毒則無目赤咽痛口瘡吐衂等證觧之不至於冷調養不至於熱方為良法斑爛作膿痛甚者用亁黄土羅細末傅之輕者則研芒硝猪膽汁調塗勿令動著直候疕自落大叚不能眠卧者用麥麩襯之又有因發表過甚外為斑爛而内虚陽氣不守作臓寒自利此又急當救裏冝理中豆蔲之類臓腑既平則觧外亦不可緩也膿汁不乾者出得太盛便淋漓不可著席疼痛者用乾黄上羅末傅之欲不作瘢痕者火煆乾牛糞研細以綿撲之大叚甚者麸襯卧證渗洩大抵榮衛流通則神宇清快昧者不知見其朝夜啼哭或以為心熱或以為腹疼妄亂投藥以致冷藥偏勝變生他證可不審哉煩躁虚煩不得睡者調䕶瘡痘當審次序盛作之時必冷心火有所導引苟或不然毒氣已出而未盡遂生煩躁冝以生黒痘煎湯令徐徐飲之渇者常冷飲可以觧散熱毒召復隂氣抱龍丸生犀磨汁等皆可選用甚者新汲水調砂糖少許飲之又有津液不足虚煩不得眠者活人書酸棗仁湯㝡佳或吐或㵼而不能食者有冷熱二證吐而不渇㵼而手足冷面色青白此冷證也益黄理中輩主之既吐且渇雖㵼而手足心熱面帶赤色居處喜冷此熱證也五苓散竹葉石膏湯加橘皮等主之不食亦有虚實之異脾胃怯弱精神慢而不食者為虚當温養之身熱中滿渇而不食者為實則清利之便血或下黒糞睡不醒者瘡痘雖是藴毒而發所以為之運行者實血也今大便下血是裏毒大盛或下黒糞者其理亦同加之睡不醒者證候為甚惡盖一身之血心為之主便血下黒糞而又睡不醒則是心之神昏矣犀角地黄湯抱龍丸小柴胡加生地黄等主之當下當補不同者瘡子半出半未出此裏毒未盡也若其人大便不通喘急腹脹煩躁作渇譫言不安者當急下之盖毒氣彌盛内外皆熱當令大便稍稍潤過若其人適苦自利四肢厥冷腹脹發噦者以裏氣虚也冝薑附理中輩急救之一則言當下者恐毒氣太盛昏悶而死故也一則言當救裏者恐裏虚胃氣脫絶故也虚實之證相反投藥之際可輕易耶欎毒不散者瘡痘之初斑㸃猶未見惟當用平和藥如升麻湯惺惺散鼠粘子湯如暑月熱盛當藉之以芭蕉葉為佳陷伏倒靨者内虚不能發出謂之陷伏外感風寒或被惡氣衝觸而不出者謂之倒靨然有始末輕重不同若一槩用藥必致夭横瘡痘以出斑㸃為始血泡為中結膿窠痂疕為末且斑㸃之始熱毒方運出亦有陷伏亦有倒靨者若外感風寒肌竅閉塞血凝而不行必身疼四肢微厥斑㸃不長或變黒色或青紫癮疹此為倒靨也冝温肌發散如紫草蝉退人齒殭蚕紫背荷葉之類温散寒邪然後熱氣復行則其斑自出矣若胃虚而不能副榮衛者出而復沒斑㸃白色或黒色其人必不能乳食大便自利或嘔或厥皆胃虚而不能出謂之陷伏也冝用温中之劑今其胃暖榮衛復行則當自出矣冝理中湯丁香煑散之類甚至薑附硫桂亦可用血泡為中者是紅斑出齊之後其状如豆起於肌皮之上乃未結膿泡痂疕之前證也血泡七日當結膿窠痂疕當此或風寒乘襲而為倒靨或胃虚吐利而為陷㐲者治之亦如前法又有房屋等雜氣觸犯而然者當用猪甲蒼术乳香胡荽等法熏觧之良方腦子猪血酒治毒氣入臓而不出黒陷而耳尻反熱者瘡痘惟腎無證以其不納穢故也當其發作之初及血泡之際一身俱熱而尻耳自凉此即腎之平證也盖尻耳皆属於腎今一旦黒陷是變壊歸腎使尻耳亦為熱其證為大逆錢氏立論用百祥丸凡㵼膀胱謂邪既衰脾土復旺身熱氣温欲飲水者可治以脾能勝腎寒去而温熱也百祥丸之意即活人書論厥隂傷寒土敗急用承氣湯皆是不得已而用之僥倖十救一二而已瘡黑有逆順者大凡黒靨陷伏本是逆證然亦有順者謂脾強可以勝腎雖黒靨而忽㵼膿血痂皮者為順此必舊服補脾藥故今脾氣得不衰毒雖入腹皆㵼出也經云脾病則五臓危今脾土既盛他悉無慮矣黒靨而逆者謂脾虚不能制腎乳食不消水榖雜下脾虚受毒四臓皆因而危殆然古人方病在腑者易治在臓者難治瘡黒乃變壊入臓雖得脾胃強盛是亦九死一生之證耳既出而狂呌喘呼者瘡痘已出熱毒自裏而逹外狂呌喘呼者臓腑熱躁而無津液也五臓皆熱無隂氣以和之故令陽獨盛於上為狂呌為喘呼冝犀角地黄湯抱龍丸竹葉石膏湯之類更看大小便何部不利利之則平熱盛則去愈難其證大便不通小便如血或為癰瘡身上破裂者瘡痘本因熱而出熱勢甚則其出愈難盖熱盛則榮衛為之閉塞毒氣枝蔓裏毒盛者大便不通小便如血表毒盛者或為癰瘡身上破裂此由不善觧利之故救之之法冝犀角地黄湯小柴胡加生地黄湯四順飲牛黄散紫雪之類可選而用之不結痂疕者血泡既成當結膿窠痂疕而愈當結而不結者由内外極熱毒氣散漫無隂氣以斂之古方以宣風散導之生犀磨汁以觧之或飲之以水調砂糖當隨手而愈然用砂糖不可失之太早恐使瘡子入目切冝忌之誤以巴豆丸下之則内虚而熱不陽盖腸胃有熱而湏蕩滌者冝湯液之劑飲食成疾而湏下者冝丸子藥今瘡子有合下證誤用巴豆丸藥則徒損胃氣熱毒反得以深入其勢愈不除或致便膿血為癰疽為腫毒變生證用藥者當知之百祥丸證瘡黒紫而乾陷者以百祥丸下之不黒者慎勿下然陷下有数種當以外證叅詳感風寒而黒陷者冝温散之内虚自利而黒陷者冝温服之誤下之後毒氣入裏而黒陷者冝温養而表出之被雜穢惡氣衝觸而黒陷者冝熏觧之若失藴毒至重内外蒸欎不結痂疕大便秘腹脹而黒陷者當以百祥丸㵼膀脫經毒服之身温欲飲水者可治是脾強勝腎陷者當復百矣若加以寒戰身冷汗出耳凥反熱者死猪尾膏證虚汗實汗皆汗也虚熱實熱皆熱也瘡熱倒靨亦有虚實之不同可不分析而辨正之哉如瘡痘始發或斑㸃或血泡未結痂疕之隙因久不食或自利或感風寒至不能出者雖名倒靨則温冝之其或心煩狂躁氣喘妄言如見鬼神大小便秘渇而能食毒盛而倒靨者此證為實與前諸證霄壤相逺冝猪尾膏又有血泡六七日當結膿窠痂疕而不結者是毒氣盛實心火獨燥當退冝用猪尾膏曽用之進一服隨手結痂疕神速特異以意思之人過寒暄不常之時脫着衣服必先呷冷水一二口即不感冐者是心凉腠理閉而歛則風寒不能侵也今用猪尾膏正以血能歸心引腦子以凉之心凉則毒氣消釋榮衛流通於是血泡結膿窠膿窠結痂疕而餘證自退矣如傷寒厥隂證上敗木賊以承氣湯下之脾間毒去則脾上和水升火降寒熱作而大汗觧猪尾膏之意得心竅既通熱毒觧散則氣和神甦自結痂疕盖當結而不結者恐毒氣復入於裏昏悶而死故也以此言之瘡痘至血泡欲作膿泡之際毒氣已盡在外矣昧者見斑㸃之後血泡出遲便用猪尾膏殊不知毒氣未出而使心胃寒凉則毒氣内閉殺人甚速然則猪尾膏藥是實熱證候方可用也纔結痂疕即以真酥潤之用手􅎲辟或剥去又更潤之稍遲則乾硬深入肌肉經乆方脫遂成瘢痕此理昭然人多不時反謂剥落早則成瘢痕何其誤也然既剥去之後却不許早見風冷湏當愛護其或不能剥去而又出風太早以致成瘢痕者宻陀僧水調塗之蒺䔧散鷹矢白散馬齒莧散青金散皆可選而用也瘡痂起而能食者人身以安徤為當及有疾病則精神氣血為之不安况小兒瘡痘自斑㸃發見至結痂疕日数雖有遲速之不同其精神氣血勞耗多矣大率瘡痘既起則中氣暴虚多不能食必藉参苓軰調養之其間或有瘡痂起而能食者是胃中宿有藴熱故也盖胃熱則榖消所以能食其人更大便秘或大便難當用三黄丸利之否則恐胃熱不去欎為口臭齒腐生風之證流散四肢則發為癰疽瘡腫之毒是說也惟善治未病者知之然亦有一等脾胃素壮實者自爾能食大便亦不至有秘結之患此又不可不知也病後觧利當觀虚實者禀受有虚實病後亦有虚實不可一槩論瘡疹後當湏觧利此世俗通論然觀虚可也但小兒禀受既實榮衛充壮病後有熱者冝多觧利其證大便難小便赤能食而渇大叚熱甚者冝大黄散留熱在胃嘔吐而口舌生瘡或下利黄赤者冝黄連散煩渇而小便少者冝五苓散餘熱温壮齒疼或腫者冝甘露飲咽疼者冝抱龍丸如聖湯肝有熱毒多怒呌而不眠者冝調肝散大腸下血疼痛者冝牛蒡散三黄熟艾湯生痘癰者冝小柴胡加生地黄湯犀角地黄湯無熱證者但當隨時安養而已或其人所禀表弱瘡痘既出之後榮衛大虚坐立振揺大便不秘小便不赤飲食甚不進者冝冐愛散異功散雙和湯之類以扶持之候其飲食如故起居稍勝榮衛既充然後㣲微觧利至虚之人不必觧也嘗見虚怯小兒不應觧利而強與觧利遂為寒中為下利生病多端餘毒作嘔吐者脾胃主納而不出大小膓主出而不納瘡疹後嘔吐者是餘毒在胃也然有冷熱之不同如心煩作渇食乳甚急聚滿于膈中然後吐出如射其人必面色帶赤手足心熱居䖏喜冷此熱吐也如乳食水漿隨吐面色青白手足冷大小便自利此冷吐也熱吐者竹茹湯五苓散竹葉石膏湯加橘皮之類主之冷吐者益黄散理中湯丸主之要之病後餘毒多是熱邪其間冷證十有一二也病後忽遍身青黒色手足瘛瘲口噤聲如鋸者此中風也小兒瘡痘方愈榮衛正弱忽作前項證候者由節令氣交八方不正之風乘虚中入冝和劑風散二錢入蝉蛻末一錢分為三服投生薑薄荷汁及酒各数㸃温侵之連二三服當時稍汗或作癮疹或再出膚疹而愈京師醫官宋鑑甞用此無不愈者或小續命湯去桂附加荆芥亦可用也病後非時發搐搦者一則心熱留而不去熱盛生風風火相搏其人必喉中有痰目直視面上赤引飲居處喜冷冝導赤散抱龍丸小柴胡加生地黄之類一則病後多食胃弱不能勝榖謂之食蒸發搐其人必潮熱大便酸臭秘泄不調或嘔吐腹疼冝紫霜丸小承氣湯輩利之用藥之際要在加審作痘癰結核腫毒氣留蔵經絡故於肌肉虚處或闗節動揺處偏盛而成癰又或既平之後失於觧利餘毒盛外不得泄於皮膚内不得入於臓腑既不得入於臓腑聚而不去遂為之癰如毒氣淺者結核腫毒瘡癤而已甚者其頭項胷脇手足肢節盡焮腫作痛治法惟小柴胡加生地黄最妙如升麻湯消毒飲犀角地黄湯皆可選而用也病後目翳忌用㸃藥者何瘡痘毒氣之為目翳盖自蔵而逹外治之之法但活血觧毒而已活血不至於熱觧毒不至於冷五臓平和則翳當自去或誤用㸃藥則是非徒無益而又害之可不慎之耶病後大小便不通或便膿血者此由失觧利之後熱氣併於小腸則小便不通併於大腸則大便不通如前後部俱不通者熱勢甚四順飲承氣湯五苓散導赤散之類可選而用之其有熱毒流入大腸而便膿血者牛黄散犀角地黄湯黄連觧毒湯三黄丸等酌量用之餘毒咳𠻳脇痛者經云左右者隂陽之道路左右两脇之謂也瘡疹後咳𠻳脇疼由餘毒左右隂陽之氣不能升降也脇居身之左右隂陽二氣之所行也脇病是氣不能升降之故但觧毒氣毒氣去真氣行所苦自平赤茯苓湯小柴胡加五味子桔梗枳殻等療之餘毒作煩渇者心胃二經受邪熱故也五苓散竹葉石膏湯黄連散燈心散主之天氣暄熱即與踈利膿泡之後亦當踈利者經云言上工治未病嬰兒童子雖虚實不同畢竟純陽當瘡痘未出之先或遇天氣暄熱當與疎利庶幾發作之日其勢必輕又膿泡之後毒氣太盛未結痂疕能食而大便秘面赤引飲者亦當踈利之踈利之說非是轉下不必用峻藥也如三豆飲子升麻湯消毒飲導赤散之類是也用藥不可執一前軰言老人之病必先助火以其隂盛而陽微當預温之治小兒則曰當先㵼火謂其陽多而隂少湏用導引勿令生熱然或有老人而實㓜而虚者此又當隨時變通又五實當㵼謂身熱脉大大小便不利能食悶皆為五實之證五虚當補謂身寒脉細不食前後利汗出為五虚之證或曰用利藥者候大小便秘而利則利之愈用温藥者候大小便利而温則温之愈二者合利而利合温而温也其或外證合利大小便已自利何必利外證合温大小便既自秘何必温大抵治病最嫌隂陽偏勝善用藥者但令隂陽不偏則是常有生意又况小兒臓腑嬌脆易熱易實尤難調和所以用藥不可執一也用緩慢藥致害人者病有外同而内異者又有病中遇天時節令變遷因而感異氣者又有病中氣血不定宿有藴蔵之疾隨之發動者其證未易辨用藥之際湏當識切病源但欲治熱熱去而不冷治冷冷去而不熱則無不愈者治風以治風藥治温以治温藥治氣皆然今人不究病源因一槩用不急之藥如四君參苓之類其意止欲逃差悮爾殊不知縱令病勢滋蔓誤人極多要之用和緩之藥亦各從其類而和緩耳何常謂不切病情而從和緩也醫疊元戎夫斑之為病皆由子在母腹中時漫漬食母血穢藴而成毒皆太隂濕土壅滯君相二火之所作也因小兒真氣既盛正氣又正邪無所容或因天寒或因傷表或因傷裏斑由是而生焉治當何如外者外治内者内治中外皆和其斑自出至於惡寒者發之表大熱者奪之渇者清之大便秘結者下之小便不通者利之驚者安之泄者分之可以執一為哉大抵傷寒同治最為髙論隨經用藥不可闕假令五日以裏諸病與斑疹不能别辨者不可疑作斑疹必湏發之但各從其所傷應見治之皆不妨斑出若強發之其變不可勝数矣前人言首尾俱不可下者何也曰首不可下者為斑未顯於表下則邪氣不得伸越此脉證有表而無裏故禁首不可下也尾不可下者為斑毒已顯於外内無根蒂大便不實無一切裏證下之則斑氣逆陷故禁尾不可下也有如所言煖盖覆不令通風以其斑未出或身表凉而惡寒或天令寒而惡令温煖盖覆不令通風也斑若已出身熱天暄何必用盖覆而不使之通風後人執此二句首尾俱不敢下温煖不令通風不知天令之所加人身之所感致使悮人多矣大抵前人之言隨時應變以其所可者而言之後人不知其變故執常而不移也噫首尾俱不可下者以其始終臓腑元無凝滯也若有一切裏證及大便結者安得不下温煖不使之通風以其發在冬時故如此也若發在夏時斑雖未出亦不用如此也斑之用藥大率以脉為主浮中沉之胗平舉按之候察其虚實定其中外則可以萬全矣未顯斑證所用之藥外服升麻湯主之内服枳實丸主之大便要枳木丸主之傷冷者温之神應丸主之惡寒者發之冝防風蒼术湯表大熱者奪之此表者通言三陽也陽盛則氣必上行言奪者治法不令上行也渇者清之大渇白虎湯小渇凉膈散大便秘結者下之桃仁承氣湯四順飲子柴胡飲子等方選用察其在氣在血小便不通者利之導赤散八正散之類當求上下二焦何經而用之驚者安之凉驚丸重者㵼青丸泄者分之寒則異功散四君子湯熱則澤㵼茯苓湯已顯斑證所用之藥出不快化毒湯出太多犀角地黄澤㵼地骨皮鼠粘子湯咽不利桔梗甘草鼠粘子湯煩者桔梗梔子甘草湯脉不利紫草甘草枳殻湯太陽出不快荆芥防風甘草湯陽明出不快升麻加紫草湯少陽出不快連翹防風湯四肢出不快防風芍藥甘草湯瘡疹輕重候凡未出而發搐者是外感風寒之邪内發心熱之所作也當用茶粉下觧毒丸犀角地黄湯主之一發便宻如針頭形勢重者合輕其表而凉其内連翹升麻湯若斑已發宻重微喘飲水者有熱證用去風藥微下若出不快清便自調知其在表不在裏當微發散升麻葛根湯若清乾黒陷不大熱大小便澀則是熱在内煎大黄湯下宣風散若身表大熱者表證未罷不可下若斑疹已出見微熱小便不利入正散若已發後有餘毒未散復有身熱瘡腫之類當用茶粉下觧毒丸瘡疹已出後有聲音者乃形病氣不病也未出先聲音不出者乃形不病而氣病也若瘡疹出而聲音不出者是形氣俱病也當清其肺氣冝用八風湯并凉膈散去消大黄亦可孫氏云痘疹證初發或身熱或不熱或驚掣狂躁呌哭煩躁或自汗或譫語或呵欠煩悶神昏或嘔吐皆因五臓虚實不同身熱後切冝避風又有便發搐者此是熱毒在經絡未得發越不必治搐只發散痘毒痘出搐便住不可不知大概以出得快為尚如出後或被厭抹以致黒凹者急用参花茋白芍藥糯米藥或用酒噴催䟎起透不可忽視古人治法有云未出冝踈利有云已出不可踈轉有云首尾不可轉以余觀之不可轉説為是經驗方論云予見鄉中近年已来小兒患丹疹痘瘡甚多醫士用固陽湯真武湯薑附湯四逆湯及歸茸三連湯獨雄湯熱藥治之名曰貼出服者多誤甚為痛惜予暇日因遍觀古今經驗方論並無用熱藥治之之說如湯民望論未甞不用附子熱藥但有其證而用之如陳文中小兒及幼方異功一料内止用附子一錢今之醫士不問虚熱虚實之証但見瘡痘黒見或不紅活或出参差便投熱藥可見其非此又不可全咎於醫士乃病家父母之心聞進熱藥甚喜用凉劑甚不安必服熱藥實無再生之期此乃醫士病家互相為誤若不畧具古昔聖賢用藥論證誠恐訛𫝊有誤後世謹按素聞云少陽客勝則丹疹外發及為丹疹属乎少陽三焦相火素聞獨明瘡疹者少陽相火之所為也俗呼曰斑疹傷寒又曰諸痛痒瘡瘍皆属心火豈有寒乎故治丹疹痘瘡與治傷寒時氣同法當先推天地寒暑之冝察氣運盛衰之理小兒禀性躁急氣體充實冝服辛凉禀性和緩氣體怯弱冝服辛温两手脉浮大可服辛凉两手脉遲緩可服辛温如辛凉之劑防風通聖散凉膈散之類是也辛温之劑升麻葛根湯和觧散之類是也聖恵方云江南春夏時行疫癘多作斑疹此由熱毒氣勝故也毒氣未散而表已虚熱氣乘虚入於皮膚所以發斑病丙穩禾疹用黄芩大青梔子石膏朴硝犀角大黄主之又熱病發斑表虚裏實亦用石膏大黄龍膽草黄芩主之湯民望論小兒瘡疹之候乃天行時氣熱不能觧藴積於胃而胃主肌肉其熱氣夾毒氣藴積於胃毒氣薰發於肌肉状如蚊子所囓乃成斑毒也亦用安斑散四聖散主之黒者化毒散川山甲散主之其痘瘡漸黒而陷大便不固四君子湯加黄耆肉豆蔲若大㵼四肢厥冷加附子主之又云瘡疹之疾不問輕重當用䕶目免致豆瘡入眼而生翳障若生翳决明丸羗活蝉蛻散糓精草主之朱舉議活人書云斑疹有三證一證冬時大温至春為寒氣所折温毒不得泄發而為斑葛根橘皮湯主之一證下之早熱氣乘虚入胃故發斑白虎加人参或加萎𬎼名化斑湯主之一證下之遲熱留胃中亦發斑服熱藥過多亦發斑調胃承氣湯主之陳文中云凡豆瘡方覺未出之時其證類傷寒之状若瘡痘二三日始見微出如粟米大或黍米大或如菉豆大似水珠光澤明净者又痘瘡四五日大小不一根窠紅活六七日肥滿紅色八九日長足肥滿瘡蠟色並不湏服藥若痘瘡四五日稠宻陷頭灰白色㵼渇者木香散救之如不效服肉豆蔲丸止其㵼泄若六七日身温氣促口乾肚脹足指冷者或八九日後寒戰悶亂腹脹煩渇氣急咬牙冝木香肉桂如不效服異功散若豆瘡十三日當靨其身或熱或不熱悶亂不寧卧則哽氣腹脹泄㵼寒戰咬牙冝用異功散加當歸木香主之十二三日瘡痂漸落其痂盤黯或凹或凸肌肉尚嫩兒與乳母切忌辛辣有毒之物恐傷眼目為兒終身之疾如是傷目榖精草散主之若瘡疹収靨之後身熱不除别無他證麥門冬散柴胡散主之若身熱大便堅口舌生瘡咽喉腫痛皆是餘毒未除鼠粘子湯主之若風熱咳𠻳咽膈不利甘桔湯主之若痘瘡痒搔抓成膿血淋漓緣氣衰肌肉虚故也冝敗草散主之仍服木香散加丁香肉桂同煎依方救療萬無一失辨認瘡痘斑疹丹毒證治不同醫者詳察正痘瘡董氏曰初出如紅㸃遂旋起脹形如豌豆而結膿窠方結痂㾃而愈癮疹即麻子王氏曰有熱則易出一出遍於肌膚之上如疿瘡細泡子見而便沒楊氏曰赤疹遇清凉而後消白疹遇温暖而後滅傷寒熱毒發泡瘡胡氏曰乃熱在表而失汗熱毒蒸發其瘡色白或赤如丹頭帶白膿者輕根下紫色在肌肉者重重非痘瘡也斑毒蚊迹楊氏曰陽證誤投温藥或失汗下陽毒内熱蒸溽外廹毒氣入胃令人發斑其證昏憒闗前脉洪大先紅後赤多見於胷腹輕則如疹子重則如錦文紅者易治黑者難救蚊踈陽脉不洪病人自静先紅後黄多在手足之間乃蚊迹也丹毒楊氏曰赤浮肌肉變易五色逰走遍體辨認瘡痘於所載皆以耳冷凥冷中指冷驗之或中或否當以耳後有紅脉赤縷為的董氏曰冝以紅紙捻㸃清油照心胷間必有小紅㸃如粟起乃痘證也謝氏曰忽然發搐但無痰潮不惡惟惡熱腹痛則腹先出眼澁則眼先出熱輕痘亦輕熱重身熱不出直候身凉方出痘疹論云痘疹之後有三五日遍身粟生咳𠻳耳尖冷毛寒肌慢眼澁不開作寒欲以温暖覆之者初覺之時當用薄荷散微微發汗次進調中散二方見瘡疹已出未出門瘡即自愈服薄荷散汗未出者亦服調中散即汗出漸漸觧若作寒熱其脉反遲者進脫齒散方見瘡疹出不快門或患者寒熱不定目澀耳鼻冷此邪毒不傳諸臓便攻皮膚而作或出遲者亦服脫齒散凡有三五日鼻中壅咽喉不利咳𠻳目赤毛焦肌膚𦂳脉洪大而数此應疹痘之候順者冝煎薄荷散發汗則瘡毒自出或鼻中壅咽喉不利目赤額紅脉不甚洪大者亦是瘡疹之候皆冝服脫齒散瘡出如白珠子或出紅小瘡子乃是觧也或鼻壅唇焦脉細面色痿黄時變毒色皮膚慢吐清涎者亦是疹子之候此皆醫人誤下凉藥太多致令瘡難發凡瘡毒血氣順脾温則易發若服凉藥過多則血澀氣弱脾冷則瘡毒泄遂變惡候此候亦服薄荷散脫齒散若面青氣麤大小便不通瘡毒未發冝進滑石散方見瘡疹出不快門中如大小便不通利則服脫齒散次觀色候調治或有面色赤是瘡疹候若赤而後青為逆候也或患数日面色青或痿黄四肢微冷上喘坐涎手足搐縮以三焦氣壅血脉凝滯氣不得相容當用薄荷散發泄瘡毒小兒初得病便驚狂身熱汗出問之身不増寒并不惡風脉洪数者皆當下之覺得有此證疹痘未發之前當服當歸散方見瘡疹未見乃可踈利門或有先頭疼口鼻出熱氣増寒壮熱胷膈痞噎生涎心逆作渇不足指冷口作臭氣两手脉弦而或微脾脉弦数者此因尖肌傷寒邪熱當發赤疹及有患頭疼身不大熱口鼻有熱氣咽喉乾痛口頰生瘡两目如火熱耳尖手足稍冷两手脉洪大後三二日必作渇面赤時作増寒心逆口作毒氣目忽如朱色亦是伏疹之候亦當去邪毒藥湏用大黄湯蕩之不可用巴豆水銀輕粉此等不惟無去熱毒之理反有傷於臟腑也或覺已結於皮毛之間後微以出慎不可利或誤利之則瘡毒反沒畜伏心間邪入肺中瘡毒内壊而死者若瘡疹既出太盛實竇膿水者却當以大黄藥微利餘毒如未發毒疹已前曽經利者即不用大黄藥但以觧熱藥除其敗毒多有愚俗禁服藥餌只望巫祝不以藥泄利瘡毒致令大小便不通停熱毒於臓腑攻衝眼鼻咽喉腫塞口舌壊爛束手受死及有疹證只進凉藥或調氣藥恣其所指既疹豆已出之後又獲猛利用藥既失疾勢以壊雖扁鵲無門救療所以時人不能盡其天年又按扁鵲治疹痘之法覺有疹痘之證先用油麻劑方見瘡疹初出門觧四肢極熱如服藥了良乆就卧少時服大黄散利者亦不必服此嬰兒服此頗有益或有未經觧利而瘡痘毒已發者服觧必聖散或升麻散發散二方見瘡疹已出未出門傅齊養生必用方同若瘡毒在肌膚之四日隠隠不發則急用紫草飲子方見瘡疹初出門與聖惠同至数服則瘡疹出凡瘡疹未發前當用黄蘖膏方見瘡疹愛護面目門聖惠方目塗两頰眼目之間乃續用胡荽酒方見瘡疹初出門噴背上四肢令速發出也若瘡未出及雖出而躁渇者冝服甘草散方見瘡疹大盛門以少觧利熱毒即住若瘡出遲亦當服紫草飲子大人鍼两腕硯子骨間或灸一壮亦助發出疹痘毒氣若已發則不必用之如瘡候未作膿心膈躁睡不安者服青黛散黒豆汁二方見瘡疹未見乃可踈利門若瘡毒出盡後冝服黄芩散以觧餘毒若嘔吐則服此嘔吐自定若赤口有瘡自下利者服黄連散或瘡疹出後煩喘小便不利者冝進燈心湯三方並見瘡疹後觧餘毒門若瘡疹煩喘甚者即用麻黄湯方見瘡疹大盛門或咽喉痛并𠻳則加入麝香其有服冷藥太過咳𠻳手足冷脉遲者煎炮乾薑炙甘草各四錢水一升二合服之其或下利赤黄膿血及渾身熱當與薤白湯方見瘡疹便膿血門觧去惡積便差有疹痘安便攻動眼生翳膜腫脹者皆因肝臓敗熱停留所致也切忌用㸃藥唯冝利脾觧肝熱毒仍於眼邉上貼恊藥以散毒氣當服𬎼仁散若生翳障重者兼宻蒙花散量力服食二方並見瘡疹入眼門翳膜退則止凡有時氣天行瘡痘者則急預服豆湯則不發瘡方見如前黒豆汁是或發瘡而目赤行熱氣泡瘡身疼壮熱則當以桂枝及去節麻黄黄芩各半两為末量大小一二錢暖水調下覆令汗出又以葛根散觧肌出汗方見瘡未凡疹已出門凡身疼壮熱頭痛若不小汗無中表散大便久秘毒氣藏伏心腹脹滿不與微利無由釋去邪毒切在消息若痘瘡已出者不可發表更増瘡爛若發膿痛甚者即用乾净黄土羅細為末傅之仍数数食蜜若瘡勢稍輕者則用川芒硝以猪膽汁調塗瘡上勿令動着直候瘡痂落有大叚瘡發不通卧蓆者用麥麩簟卧将息如瘡作漿戴白膿者其毒輕或紫黒色隠隠在肉裏者其毒重重者五臓咽喉肌肉皆有瘡大便澀出膿者死舌黒鼻有黒氣者死其或疹痘未出已前熱毒内逼目瞪上竄驚呌有如驚風者此乃瘡欲出之候若誤認為驚風調治毒氣内畜邪熱不泄乃死或有惡瘡既出譫語不正皆是惡候更以冷藥觧利則使聲音瘡疹一沒乃死或用燥藥太過咽喉腫痛猛發鼻血喘𠻳而死或瘡作白泡忽然畜入臓腑漸作紫黒無膿日夜煩悶者服此化毒散方見瘡疹倒靨門其毒氣當從手足心出乃差此五死一生之候若便血瘡壊無濃者十死不治候大熱瘡毒頓出然後依証調治理有患瘡痘毒瘡不出者一法以地黄雄黄令飲然不可太多太多則反有所損或飲啜熱乳積於腑臓者當熱用藥療乳母嬰兒孩童之性陽盛而隂微臓腑隂陽氣稍差逆大小便多不順利自扁鵲太倉公論療嬰孩藥性有可餌者皆先知節氣隂陽治之利臓腑則病勢漸辭也儒門事親書云凡小兒瘡泡癮疹麸瘡丹熛等疾如過火運勝熒惑亂行之者不可便用升麻散觧之升麻湯味辛性愠内經曰積温而成熱是謂重火止可以辛凉之劑觧之如遇平者可以辛温盖平者無事便同水化然便冝審察病甚者亦可以辛温但發散之後便以凉膈加當歸及白虎湯玉露散煎服之更甚者觧毒湯調胃散下之古人云斑疹泡首尾拘不可下皆悮矣豈不聞揚湯止沸不如釜底抽薪内經曰五寅五甲之嵗多發此病者盖明相火之所為也又曰少陽客氣勝丹疹外發又曰諸痛痒瘡瘍皆属心火主太闗又調百端之起皆自心生豈可便用辛温發散乎致熱勢増劇漸成臓毒下血咬牙發搐大熱明矣如白虎湯加人参凉膈加當歸桔梗勿問秋冬但見瘡疹用之神良凢小兒泡癮疹麸瘡丹熛斑毒之後臓毒下血内經曰少陽客氣勝則丹熛瘡疹發于外也盖餘熱不觧故臓毒下血治以黄連觧毒湯白虎湯凉膈散臨証選而用之所謂白虎舊說秋冬勿用皆誤也但此證便用之盖其証属相火故也大人亦同普濟方卷四百二
