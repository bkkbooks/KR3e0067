body:
  text: 普濟方卷二百三十六明周王朱橚撰勞瘵門骨蒸附論夫骨蒸病有五種一曰骨蒸其根在腎早起則體涼日晚則熱躁四肢不安飲食無味小便赤黃忽忽煩亂喘促無力腰背多疼兩足逆冷手心長熱蒸盛過傷則內變為疳蝕人五臟二曰脈蒸其根在心日增煩悶擲手出足翕翕思水多唾白沫睡即浪言驚恐不安其脈浮數蒸盛之時或變為疳臍下脹痛或利不止三曰皮蒸其根在肺大喘短氣鼻口俱乾舌上色白小便如血蒸盛之時胸滿注熱兩脅下脹咳嗽胸背疼痛眠卧不安蒸毒傷肺即唾血也四曰肉蒸其根在脾體熱如火煩躁無汗心腹脹鼓食即欲嘔小便如血大便祕澀蒸盛之時或身腫目赤眠卧不安五曰內蒸亦名血蒸所名內蒸者必外寒而內熱以手拊骨而內熱者其根在五臟六腑其人必因熱病後得之骨肉自消飲食無味或皮躁而無光蒸盛之時四肢無力足跌腫起又有二十三蒸者一胞蒸小便黃赤二玉房蒸男則遺瀝漏精女則月經不調三腦蒸頭眩悶熱四髓蒸髓沸熱心昏五骨蒸齒黑十心蒸舌乾十一脾蒸內焦十二肺蒸鼻乾十三腎蒸兩耳乾焦十四膀胱蒸右耳偏焦十五膽蒸眼白色無事常驚十六胃蒸舌下痛十七小腸蒸下焦熱尿即痛十八大腸蒸鼻右孔痛十九三焦蒸生病乍熱乍寒二十肉蒸肌肉消瘦二十一氣蒸即喘息氣二十二皮蒸在筋皮蒸即筋皮攣縮二十三遍身蒸體氣熱凡諸蒸患多因熱病後食牛羊肉油膩或酒或房事觸犯而成此疾久蒸不除多致危篤必須早療也方治五蒸方夫蒸者乃附蒸熱毒之氣皆是死之漸庸醫不識熱毒形狀或妄稱神祟以相疑或致使蒸盛變為疳致死者今具各方于後一曰骨蒸出千金方用芒硝水服方寸七日再服亦可搗苦參蜜和為丸如梧子大一服七丸日再以米飲送之無忌以體輕涼為度二曰脈蒸苦參青葙各二兩艾葉甘草各一兩炙右切以水四升煮取一升半分為三分用羊胞盛之以葦筒灌下部中若不利取芒硝一方寸匕和冷水合和服之再服忌海藻菘菜三曰皮蒸急與芒硝一兩以水一升半和分為三服三日服止訖以冷水浸手以尉脅間及腋下并胸上及痛處亦可舉臂指炙側腋下第三筋間腋下空中七壯立止四曰肉蒸用大黃一兩半切如小豆大以水一升浸一宿明旦絞取汁服五合許微利即止若熱不定亦可服芒硝一方寸七日三以涼體為度五曰內蒸出肘后方所以言內者以外寒內熱附骨也根在五臟六腑之中必因患後得之骨肉自消飲食無味皮燥而無光蒸作之時四肢漸細足膚腫者用石膏十兩研如乳粉法用和服方寸七日再以體涼為度加減青蒿丸治男子婦人一切勞疾骨蒸風氣此藥一名杏仁丸治瘦二名木香丸能治尸注鬼氣九種心痛及蟲咬心痛三名犀角丸治時行熱疾瘟疫四名龍腦丸治小兒無辜㾂痢五名萬病丸治一切虛傷六名丹砂丸治毒邪痃癖氣等七名青蒿丸治男子婦人一切勞若常帶行山林曠野坑穽冢墓前後鬼神不敢近被毒蛇惡物所傷爛嚼一丸傳之立效青蒿心三枚細切童子小便三大斗生地黃三挺竹刀切搗東引桃枝半握細搗碎一二兩甘草四兩炙以上五味用新甕子一口以小便浸七日和小便并前件藥煮三五百沸漉出藥曬乾搗羅為末然後將小便清入釜中以桑柴火煉之以箆攪勿住手三斗小便煉至三升用不津器盛將和後藥杏仁桃仁并去雙仁及皮尖炒令黃桔梗萎㽔枳殼麩炒去穰大黃焙升麻蒼术炒一方用白术白茯苓去黑皮地骨皮甘草炙天靈蓋酥炙一兩無虎骨代貝母去心蕪荑炒當歸切焙黃耆銼桂去粗皮陳橘皮去白焙厚朴去粗皮薑汁炙防風去叉檳榔不得近鐡器吳茱萸湯浸炒丹砂别研麝香别研各一兩木香二兩五錢犀角屑一兩五錢羚羊角屑二兩一分右為細末用前小便煎和勻入臼搗五百下如末粘可入煉蜜和丸如梧桐子大每食後溫水下三十丸疾重日再服通三焦安五臟四時常服永無虛勞之疾時行瘴瘧常不能害上氣咳嗽無問涕唾并乾嗽嗽後有血此名肺熱熱毒氣壅轉成鼻塞聲破胸中結痛若不速除當成肺痿勞瘦服此藥五兩其病乃平手足熱如火口生瘡舌爛夜夢不祥口中􅉶齒牙痛咽痺服五兩瀝子根本從大腸出如朽筋爛肉又如蝦蟆衣櫻桃結異腥臭者右瘰􅊓當發不治根本必攻五臟狀如藤蘿繞木榮枯不相捨令頸項破損必死服此數兩當效若患時氣頭痛欲死身熱大小便祕澀復不識人不下食新汲水下五十丸即瘥丈夫婦人曽服熱藥過度近雖藥盡氣力猶有往往發來衝人頭靣致眼痛昏熱心胃躁煩口臭生瘡溫水下二丸不過一二兩嬰孩無辜病與大人勞病同為在胎中傷精血致令唇口焦乾或㵼或利腹中漸結眼中生膜服之可愈若孩子漸大準大人例服之女人月經不均或前或後多少不定青黑色雜或凝或散漸成勞瘦服一二兩當愈春加龍膽龍骨柴胡去苗黃連去鬚略炒各一兩夏加知母石菖蒲麥門冬去心白茯苓去黑皮各一兩秋加訶梨勒皮秦艽旋覆花各一兩冬加滋腎藥如山藥黃柏沙蒺藜之類龍膽丸治骨蒸熱病諸勞瘴毒多痰氣促頭痛口乾目澀少食漸漸羸瘦龍膽三兩柴胡去苗秦艽去苗土萎㽔升麻百部枳實去穰麩炒玄參旋覆花馬蔸鈴百合紫苑射肝木香防風去叉黃芩去黑心梔子仁大黃銼炒栝蔞實沙參貝母去心消石研凝水石茵蔯蒿石膏碎知母切焙青蒿欵冬花麥門冬去心各一兩焙右為末煉蜜丸如梧桐子大每服三十丸米飲或酒下亦得生地黃煎丸出聖惠方治骨蒸勞疾煩熱口乾頰赤咳嗽寒熱盜汗四肢乾瘦宜服牛膝四兩去苗生乾地黃汁一升青蒿汁一升生薑汁一合童子小便三升生乾地黃四兩桃仁三兩去皮尖研如膏同前藥六味於石鍋子內慢火熬令爛研取汁去滓入蜜半斤更熬如膏川大黃一兩銼碎微炒龞甲二兩塗醋炙令微黃去裙襴赤茯苓三分胡黃連三分犀角屑知母枳殼麩炒微黃去穰龍膽去蘆頭木香黃芩地骨皮桔梗去蘆頭桑根白皮銼赤芍藥當歸各二分麝香五錢細研秦艽一兩去苖柴胡一兩去苗右為末入麝香研令勻用前搗和五七百杵丸如桐子大每服食前以溫酒下三十丸清粥飲下亦得忌炙􅏼油膩麵莧菜鱉甲湯治男子女人骨蒸皮肉消瘦靣色萎黃不思飲食多咳嗽涕唾稠骨節疼痛憎寒壯熱心腹脹坐卧不安發如瘧狀女人血風一切勞疾龞甲去裙襴醋炙令黃三兩秦艽去苖土三兩紫苑去土一兩五錢柴胡去苗三兩訶梨勒皮煨一兩五錢牡蠣煅麻黃去根節犀角屑知母切焙升麻甘草炙梔子仁檳榔銼木香當歸切焙桔梗炒桑根白皮銼大黃炒黃連去鬚桃仁炒人參桂去粗皮萎㽔芎藭各一兩右粗搗篩每服三錢水一盞棗一枚劈烏梅一箇生薑三片同煎三五沸去滓稍熱服不拘時候獺肝丸出聖惠方治骨蒸勞熱體瘦煩疼宜服獺肝一兩微炙麝香一兩細研犀角屑五錢牛黃一分細研龞甲一兩塗醋炙微黃去裙襴天靈蓋三分塗酥炙令微黃阿魏一兩麵裹煨麵熟為度雄黃三分細研木香五錢龍膽五錢去蘆頭黃連三分知母三分柴胡一兩去苗地骨皮三分赤芍藥五錢麥門冬一兩五錢去心焙甘草五錢生用白术五錢黃芩五錢赤茯苓三分川升麻五錢硃砂三分細研檳榔三分右為末研了藥令勻煉蜜和搗三二百杵丸如梧桐子大每服不計時候以清粥飲下三十丸忌莧菜青蒿丸治童子室女骨蒸熱成勞不思飲食食即無味身苦疼陽熱傳盛靣色多赤青蒿銼四兩甘草銼一兩桃仁杏仁各二兩去皮尖雙仁以上用童子小便五升瓷瓶盛入藥於內磚搘其底以粳頭火燒一夜取出桃杏仁别研如泥别入芍藥知母天靈蓋炙車前子紫苑去土各一分萎㽔當歸切焙枳殼去穰麩炒生地黃焙檳榔銼黃連去鬚秦艽去苗土京三稜煨銼柴胡去苗續斷各一分獺肝炙五錢麝香犀角生用屑一兩右除前四味外為末和桃杏仁同搗一二千下旋入所煎小便濕搗一二千杵如鞭入熟蜜一兩五錢更搗衆手為丸如梧桐子大不計時候每日熟水下三十丸咳嗽加貝母五錢婦人月經不通加牡丹延胡索各一分五心煩躁加地骨皮茯神羚羊角初患未傳諸藏酒下四服即愈腹中有塊及痃癖惡寒頭痛靣黃色毛髮焦枯服畢便愈豬肚黃連丸出聖濟總録治骨蒸虛勞傳尸肺痿咳嗽不止因羸瘦壯熱或即憎寒腹內冷脹四肢煩疼飲食無味頭疼口乾涕稠唾粘渴不止者獖豬肚一具童子小便煮令熟細切搗為末知母蕪荑仁炒各二兩紫苑去苗二兩百部銼焙令乾檳榔煨桔梗炒蒼术米泔浸切焙大黃銼微炒鱉甲去裙襴醋浸炙黃芩去黑心人參貝母去心柴胡去苗地骨皮龍膽去蘆頭白茯苓去黑皮黃耆銼各一兩黃連去鬚右一十九味搗羅為末煉蜜為丸如梧桐子大每服空腹溫酒送下二十丸加減黃耆建中湯出經驗方治男子婦人五勞骨蒸者試用神效白术白茯苓桔梗各三錢人參一錢五分秦艽北柴胡防風白芍藥甘草當歸去尾澤㵼生地黃熟地黃地骨皮肉豆䓻煨檳榔宿砂仁各五錢豬苓四錢黃耆右為散每服三錢水一盞半煎溫服不拘時候老人更加黃耆一兩或為末蜜湯調服臨期斟酌青蒿丸出聖惠方治骨蒸熱勞肺痿咳嗽傳尸瘦病盜汗痿弱四肢疼鬼氣癖塊方見婦人諸疾門熱勞類鱉甲煎丸一名青蒿龞甲煎丸出王氏博濟方治虛勞骨蒸早晚煩熱寢食不安五心熱悶百節痠疼鱉甲去裙襴醋炙柴胡去苖各二兩甘草炙銼杏仁去皮尖雙仁炒桔梗當歸切焙地骨皮人參赤芍藥各一兩木香桂去粗皮各五錢黃連胡黃連各一分麝香别研二錢酥三兩蜜三兩右一十六味除麝香酥蜜外搗羅為末用青蒿一斤童子小便五升好酒一升熬青蒿至二升去蒿入酥蜜再熬成膏候冷入藥末麝香同和丸如梧桐子大每服十五丸至二十丸溫酒或米飲下日三服治骨蒸癘疾瘟疫出聖濟總録寒熱瘧病五尸九注心腹絞痛惡毒鬼魅一切熱毒腳氣悶亂攻衝煩熱口生瘡狂易呌走及解諸毒兼金石草藥熱毒發黃躁熱疼痛一切熱病方金十五兩銀十五兩寒水石石膏磁石滑石各三斤以上四石藥同搗碎後以金銀共六味一處以水一石煮取一斗去金銀并石滓入後藥末木香一兩犀角鎊五兩丁香四兩沉香五兩甘草炙八兩升麻玄參各一兩右除前六味外用水三斗煮取一斗絞去滓淨與前藥汁相和即內蜀硝五升細研入藥汁慢火同煎手不住攪之可有一斗餘即投於盆器內盛欲凝內水飛丹硃末三兩麝香末一兩一分同研如粉和勻蓋之二日成霜雪曝乾以新合或餅內蜜封盛貯之有病即取強人服一錢冷水和服以意隨人強弱增損之腳氣病或曽服金石藥發動毒悶者水和服五分服乾即仰卧以物搘腰令高使藥向胸腹間若患眼赤熱痛者以冷水和之點服大小皆初著微微痛少時淚出自定日三五次夜用亦如之無不效口內生熱瘡含如杏核許令消細細咽之乃止治骨蒸有蟲相傳不絶宜服此方出聖惠方蓬莪茂三分龞甲三兩塗醋炙微黃去裙襴柴胡一兩五錢去苗紫苑三分去苗土桂心一兩當歸一兩蜈蚣一枚赤足者炙黃去頭足蜴蜥一枚炙黃去頭足班貓二十枚糯米拌炒令黃去翅足桃仁四十九枚去皮尖雙仁麩炒微黃川大黃一兩銼碎微炒檳榔一兩右細羅為散每服空腹以清粥飲下一錢服後穩卧將息小便中赤有病根下或蟲物出如未應隔日再服忌莧菜麥門冬湯治心中煩熱唯欲露體覆之即煩悶驚悸心忪面無色忘前失後婦人患血風氣者多成此疾乃心蒸之狀麥門冬去心焙龍齒逺志去心茯神去木防風去叉地骨皮去土各三兩人參甘草炙黃羚羊角屑石膏各三兩紫石英一兩右各銼如麻豆大每服三錢以水一盞半入棗兩枚煎取半盞去滓溫服未瘥再服以瘥為度甚益心力曽經吐血者服之尤佳若畏石藥不用紫石英茯苓湯治心蒸若心驚悚栗男子因讀書損心氣思慮過損心吐血心煩多忘失精神或體癢瘙風癬或胸中氣滿白茯苓去黑皮麥門冬去心焙欵冬花獨活去蘆頭檳榔銼各六兩桂去粗皮防風去叉防己各五兩甘草炙四兩枳殼去穰麩炒四兩地骨皮去土十兩右銼如麻豆大每服五錢以水二盞先煎山澤銀取水一盞半入藥并生薑半分切大棗三枚劈破同前取一盞去滓服早晚各一服烏梅丸治諸骨蒸久不瘥烏梅肉炒知母焙各一兩雞舌香紫苑去苗土赤芍藥大黃蒸三度焙黃苓去黑心細辛去苗葉各一兩一分桂去粗皮白礬枯栝樓根焙各五錢右為末煉蜜丸如梧桐子大每服空腹米飲下二十丸日二一方有雞骨無雞舌香犀角丸出聖惠方治骨蒸勞疾羸瘦晚即靣赤手足痠疼口乾肚熱犀角屑一兩獺肝一兩微炒柴胡一兩去蘆頭地骨皮一兩龞甲一兩塗醋炙令黃去裙襴枳殼一兩麩炒微黃去穰人參一兩去蘆頭柏脂一兩黃耆一兩銼甘草一兩生用天靈蓋一兩五錢塗酥炙令黃右為末煉蜜和搗三二百杵丸如梧桐子大每服食前以溫童子小便下三十丸忌炙􅏼熟麵莧菜麥煎散治少男室女骨蒸婦人血風攻注四肢口臭肌熱盜汗赤茯苓當歸乾漆生龞甲酥炙常山大黃煨柴胡白术生地黃石膏各一兩甘草五錢右為末每服三錢小麥五十粒水煎食後卧時服若有虛汗加麻黃根一兩骨蒸之候男子因五勞七傷或因肺壅或因瘴瘧之後患痃癖婦人因産後虛勞漏汗寒熱或月閉不通無問男子婦人病後餘熱不除或為勞復小兒閃癖病並緣此十候所致因漸瘦損初著盜汗即寒熱往來漸加咳嗽靣色白兩頰赤如燕脂色團團如錢許大左卧右出若脣口非常鮮赤則結重若加吐痢百無一生服此仍得不著後人青葙子六月六日採知母黃連去毛大黃梔子仁栝蔞常山萎㽔苦參皮各二分甘草炙蜀漆各五分洗右搗篩蜜和丸如梧桐子大飲服五丸漸加至十五丸日再以知為度因至和忌豬肉熟麵蔥蒜生菜海藻菘菜龍腦丸治骨蒸熱勞羸瘦靣色痿黃嘔逆上氣煩悶氣喘急日晚便劇不能飲食方見本門骨蒸羸瘦類柴胡湯治骨蒸熱勞柴胡去苗一兩胡黃連五錢紫苑去土知母各三分龞甲小者半斤小便浸一宿醋炙天靈蓋醋炙一兩秦艽去苗土一兩甘草炙黃五錢杏仁去皮尖雙仁炒一兩地骨皮三分右粗搗篩每服二錢水一盞入青蒿少許同煎至七分露天處安一夜平旦去滓空腹溫服龍膽丸治骨蒸身熱手足煩心中躁羸瘦漸漸不食龍膽一兩一分黃連去鬚黃蘖去粗皮炙大黃銼微炒赤芍藥人參山梔子仁甘草炙各一兩黃芩去黑心三分右為末煉蜜丸如梧桐子大食後米飲下十五丸日午再服一方無大黃麥門冬飲治心蒸心中煩躁手足熱疼欲露其體驚悸及咽乾虛渴靣色萎黃失前忘後婦人血氣衰弱傳此疾麥門冬去心焙乾二兩白茯苓去黑皮人參龍腦逺志去心焙各二兩甘草炙一兩防風去叉地骨皮去土各三兩羚羊角鎊末一兩右銼如麻豆大每服五錢以水二盞入山澤銀一分棗二枚劈破同煎取一盞去滓分溫二服若大患煩熱渴躁者入淡竹瀝一合煎服若曽經吐血亦治天靈蓋飲子出聖惠方治骨蒸四肢疼痛筋脈拘急寒熱進退發如瘧日漸痿黃不能飲食宜服天靈蓋五錢塗酥炙微黃搗為末鱉甲五錢塗醋炙微黃去裙襴搗為末桃仁十枚去皮尖雙仁湯浸麩炒令微黃柴胡五錢去苗知母五錢青蒿五錢甘草一分生用豉心半合蔥白二莖并鬚右細銼拌勻用童子小便三大盞從午浸至來日五更煎取一盞去滓食前分溫二服服訖衣蓋卧至日出良久審著手十指節間有毛如藕絲燒之極臭毛色白者必瘥黑者難救忌莧菜生地黃飲子出聖惠方治骨蒸身勞煩熱四肢疼痛小便赤黃宜服生地黃二兩柴胡一兩去苗蔥白五寸切香豉五錢甘草五錢生用生薑五錢杏仁五錢湯浸去皮尖雙仁麩炒微黃地骨皮五錢赤芍藥五錢右細銼和勻每服五錢以童子小便一大盞煎至五分去滓不計時候溫服天靈蓋散治骨蒸勞心膈煩滿身體壯熱唇口乾小便赤頭痛羸瘦宜服天靈蓋一兩塗酥炙微黃柴胡一兩去苗桑根白皮一兩銼鱉甲一兩塗醋炙令黃去裙襴知母麥門冬一兩去心青蒿一握銼甘草三分久微炙銼右搗篩為散每服五錢以童子小便一大盞入桃桞嫩枝各一握長七寸散䜴五十粒生薑半分蔥白二莖煎七分去滓食前分為二服忌莧菜桃枝飲子出聖惠方治骨蒸勞瘦體痛煩熱宜服嫩桃枝一握莖長七寸柳枝一握莖長七寸豉心半合甘草三分生用生薑五錢蔥白一寸七枝韭白三莖青蒿二兩右細銼以童子小便二大盞煎至一大盞三分去滓不計時候分溫三服鐡粉丸出聖惠方治骨蒸勞體瘦寒熱宜服鐡粉二兩獺肝一具微炙安息香三分鬼督郵一兩白术三分木香二分柴胡一兩去苗胡黃連二分右為末煉蜜和搗三二百杵丸如梧桐子大每於食前以粥飲下二十丸鱉甲豬肝丸治骨蒸唇紅頰赤氣粗口乾遍身壯熱多虛汗大腸祕澀小便赤黃飲食全少方見虛勞門虛勞潮熱類麥門冬煎出聖惠方治骨蒸勞身體常熱羸瘦皮毛乾枯生麥門冬汁青蒿汁生地黃汁各二升童子小便三升桃仁大者二兩湯浸去皮尖雙仁麝香一錢細研硃砂一錢細研右以三味汁與小便用慢火同煎稍稠即下研了桃仁麝香硃砂等更熬令稀稠得所如膏每服不計時候以清粥飲調下一匙忌羊血柴胡煎丸出聖惠方治骨蒸勞頰赤口乾心神煩悶體瘦發渴寒熱童子小便三升甘草一尺二寸雄鼠糞四十九粒桃柳枝各一握長三寸豉心半升糯米一合蔥韭白各一掘右細銼入小便內煎至三升去滓更煎如稀餳以柴胡一斤搗羅為末入前藥煎中和搗三二百杵丸如梧桐子大每於食前以溫酒下三十丸溫水下亦得地黃煎主婦人丈夫血氣勞骨蒸日漸瘦悴生地黃汁三升甘草三兩炙末豉豆一升蔥白切一升牛酥半斤藕汁三升白蜜一升右以小便六升煮蔥豉等取二升絞去滓次下地黃藕汁更煎取三五沸下酥蜜攪勿住手候似稀餳以器貯之每服一匙漸至三匙成煎桑枝熬煎湯調和服之尤妙桃仁湯亦良地骨皮湯治五蒸地骨皮白茯苓去黑皮麥門冬去心焙柴胡去苗各一兩五錢赤芍藥甘草炙令赤各一兩右粗搗篩每服五錢水一盞半煎至一盞去滓食後分溫二服鱉甲湯治男子婦人骨蒸勞氣肌體羸瘦四體無力頰赤面黃五心煩躁困倦心忪或多盜汗腹脅有塊不欲飲食鱉甲去裙襴醋炙柴胡去苗各三分桔梗炒甘草炙黃各二兩五錢秦艽去苗土一兩青蒿二兩用童子小便浸一宿焙乾微炒右粗搗篩每服三錢水一盞入烏梅一箇拍破同煎至六分去滓食後溫服治骨蒸熱出千金方取人屎乾者燒令外黑水中澄清每旦服一小升薄晚小便服一小升以瘥為度既長服新作大坑燒二升夜以水三升漬之稍稍減服小便用童子者佳一方以人尿灰酒服方寸匕青蒿煎出聖惠方治骨蒸勞氣四肢羸瘦疼痛青蒿切一斗童子小便一斗麝香二錢細研阿魏一兩麵裹煨令麵熟為度細研桃仁五兩去皮尖雙仁湯浸麵炒微黃細研天靈蓋二兩塗酥炙微黃搗末右先將青蒿於小便中煮取五升研絞去滓即下諸藥末熬成膏瓷合中每於食前以粥飲調下半匙天靈蓋出聖惠方治骨蒸勞神效天靈蓋一兩五錢以童子小便一升煮令小便盡炙乾地骨皮一兩五錢麥門冬二兩五錢去心焙鐡粉二兩赤茯苓一兩五錢黃連二兩去鬚右為末煉蜜和搗三二百杵丸如梧桐子大每服於食前煎麥門冬湯下二十丸團魚丸出經驗良方治骨蒸潮熱咳嗽貝母前胡知母杏仁柴胡各等分團魚二箇右前藥同團魚煮候魚熟提起團魚除去魚頭不用取肉連汁食之却將前藥焙乾為末就用團魚裙甲及骨更煮一盞和藥為丸如梧子大每服三十丸煎黃耆湯空心下病安仍服局方黃耆益損湯補理須用市店中自死團魚阿魏散出聖惠方治骨蒸勞熱四肢煩疼大便祕澀無問逺近宜服阿魏一分麵裹煨麵熟為末川大黃五錢銼碎微炒檳榔一兩木香一分桃仁三分湯浸去皮尖雙仁麵炒微黃右細羅末散研麝香一錢和桃仁更研令勻每服食前用青蒿汁半合生薑汁半合童子小便三合都過調下二錢每於食前服以糖利為度黃連煎出聖惠方治骨蒸勞熱心神煩躁口乾眼澀咳嗽宜服黃連一兩去鬚紫苑一兩洗去苗土甘草三分炙微赤銼青葙子一兩天靈蓋二兩五錢塗酥炙令微黃右細羅為散以童子小便五大盞浸一宿慢火熬煎每服不計時候以粥飲調下一茶匙忌豬肉地骨皮散出仁存方治骨蒸地骨皮黃耆人參鱉甲酒浸炙生用甘草各等分右㕮咀每服三錢以水一盞生薑三片棗子一箇煎至七分去滓空心卧時服地仙散出經驗方治骨蒸肌熱一切虛煩北地骨皮防風各一兩人參雞蘇甘草各二錢五分右為細末每服二錢水一盞生薑三片淡竹葉三五葉一同煎至七分去滓溫服青蒿散治虛勞骨蒸咳嗽聲嗄皮毛乾枯四肢倦怠夜盜汗時作潮熱飲食減少日漸瘦弱天仙藤龞甲醋炙香附子炒去毛桔梗去蘆前胡去苗秦艽青蒿各一兩烏藥五錢甘草一兩川芎二錢五分右為末每服二錢水一盞薑三片棗一枚煎食後服柴胡梅連散一名前胡散出瑞竹堂方治骨蒸勞久而不痊三服除根效如神及五勞七傷虛弱皆治胡黃連柴胡前胡烏梅各三枚右㕮咀每服八錢童子小便二盞豬膽一箇豬骨髓一條韭白五分煎至一盞去滓無時服治骨蒸出危氏方有人患勞瘵兩年諸藥不效一日無肉味腹痛不可忍又恐傳染移在空房候其自終經停三日覺腹痛氣息將絶思肉味之美忽有人惠雞子三枚病人俯仰取火低頭取瓦銚煎熟吹火屢燃屢滅鼻如有礙將熟間忽嚏噴一聲有紅線一條自鼻中出抽約二尺長趍下瓦銚中病人知是怪物即用碗覆盡力燒火不住其銚欲裂方住火開銚視之乃小蟲一條頭目皆具已煅死如鐡線樣即以示其家人棄之於江其病即安地仙散出危氏方治骨蒸肌熱一切虛勞煩躁生津液地骨皮二兩防風去蘆一兩甘草五錢麥門冬去心一兩右銼散每服三錢水一盞生薑五片煎不拘時候服香豉飲出聖清細録治骨蒸腫氣每至日晚即惡寒壯熱頰赤不下食日漸瘦香豉一分生地黃一兩蔥白三莖右細銼相和以童子小便二盞半浸一宿平旦煎至八分去滓分溫二服空腹日午服一方有甘草炙二兩青蒿丸出聖惠方治骨蒸體熱發渴寒熱宜服青蒿一斤取萊曝乾搗羅為末桃仁一斤湯浸去皮尖麵炒令黃研爛甘草五兩生搗羅為末右以童子小便三斗於瓷甕中盛於粳火上煎令如稀餳却傾於銅器中下藥又於粳火上煎以桞木枝攪之看稀稠得所候可丸即丸如梧桐子大以粗踈布袋盛之每日空心溫童子小便下三十丸日晚再服大黃丸出聖惠方治骨蒸勞兩脅下有閃癖漸上攻心食少不消化腹內積聚不散黃瘦久困冬痢或大便祕澀小便赤黃宜服川大黃二兩銼碎鱉甲三兩塗醋炙令黃去裙襴右為末以釃醋二升入鐺中先煎令稠下藥末更煎之以柳木枝攪勿住手候可丸即丸如梧桐子大宜空腹及晚食前以粥飲下九丸漸加至十丸以溏利下濃血爛肉為度唯得食煮飯蔥煎汁下生薑而已此外不得食之老小以意加減忌莧菜治骨蒸勞心煩不得眠卧出本草用酸棗仁二兩水二大盞半研絞取汁下米二合煮粥候熟下地黃汁一合煎煮過不計時候食之天靈蓋丸出聖惠方治骨蒸勞顔色憔悴不思飲食四肢急強翕翕發熱宜服此方人頭骨三大兩炙麝香一小兩右搗篩和更搗一千杵丸如梧子大一服七丸日再服以粥飲下若胸前青筋出者以針刺看血色未變黑者服藥七日必瘥每日午時更服後丸一服皂莢丸出聖惠方治骨蒸傳尸鬼氣取皂莢并樹白皮及棘刺五七片各燒為末水淋取汁更於灰上再淋如此五遍即煎成霜取二兩入麝香三分同研用軟飯和丸如小豆大每服空心以溫酒下七丸㵼下勞蟲即愈如未利即加丸數服之以利為度黃瓜丸出聖惠方治骨蒸勞熱皮膚乾燥心神煩熱口乾小便赤黃以熟黃瓜一枚頭上取破去穰納黃連末二兩却以紙封口用大麥麵裹文火燒令麵黃熟為度去麵研為丸如梧桐子大每於食後以溫水下二十丸治骨蒸勞瘦弱并傳尸勞宜服此方出聖惠方取三年桃樹一株并根打去泥土勿洗及枝葉等細銼以水三石煮取一石即澄濾去滓土還將藥汁重煎至三斗再濾去滓更煎令稠可丸即丸如梧桐子大每日空心以溫水下三十丸晚食前再服地黃飲出直指方治骨蒸勞咯血用生地黃搗汁入薑汁少許服之以熱退為度或利則止一方入白粥內攪勻空心服治骨蒸極熱出本草用雄黃一兩和小便一升研如粉乃取黃理石一枚方圓可一尺以炭灰燒之三食頃極熱灑雄黃汁於石上恐大熱不可近宜著一片薄氊置石上令患人脫衣坐石上令停以衣被圍繞身勿令藥氣泄出經三五度瘥小便用童子者佳療骨蒸鬼氣出肘後方取童子小便五大斗澄過青蒿五斗八九月採帶子者佳細銼相和納大釜中以猛火煎取三大斗去滓淨洗釜中乾再㵼汁安釜中以微火煎可二大斗即取豬膽十枚相和煎一大斗半除火待冷以新瓷器盛每於服時取甘草二三兩熟炙搗末以煎和搗一千杵為丸空腹粥飲下二十丸漸增至三十丸止治骨蒸出聖惠方用天靈蓋如梳大炙令黃碎以水五升煮取二升分三服起死神效方主骨蒸病小便方取三歲童子小便五升煎取一大升以三匙蜜和為兩服中間如人行二十里服此以後每自小便即取服之仍取中者去前後病輕者二十日病重者五十日二十日以後當有蟲蚰蜒兒其蟲在身當處出俱痊去人五步聞病人小便臭者無不瘥五蒸湯出梭萃方凡勞病宜隨各經虛實內外淺深用藥加減治之甘草一兩炙茯苓三兩人參二兩竹葉二把乾地黃葛根各二兩知母黃芩各二兩石膏五兩碎粳米二合右吺咀以水九升煮取二升半分三服亦得以先煮小麥水乃煮藥忌海藻菘菜蕪荑大醋一方有麥門冬治一切男子精虛骨熱漸次積成勞蒸其病上焦壅熱脣口乾焦下部無力兩足冷忽非時乍寒乍熱六腑傷熱小便數忽時黃赤色先宜喫解上膈方次喫退腎邪益正氣方後常喫解骨槽勞熱方若人得此病須戒斷酒色一二年合藥對當不輒服餌然後方得安枕緣骨蒸勞病不同臟腑客疾易為服餌并得安枕此骨蒸之病熱毒疾在骨槽之間却因精虛不能主持血氣而熱毒之氣蒸鬱骨槽相次傳入臟腑成大病者也所下之藥分毫不得令動水臟若所服藥稍有一味傷動水臟即臟腑不能載涼藥而骨槽之熱不可解也出楊子建萬全護命方治初骨蒸上焦氣壅利上膈方出子建萬全護命方麻黃鱉甲醋炙各五錢杏仁去尖紫苑柴胡茯苓地骨皮去心貝母去心各一分黃芩三銖沉香二銖前胡二分去毛右細杵羅為末每服二錢水一盞生薑一片同煎二沸便㵼出食後臨卧去滓熱喫治一切男子骨蒸其勞氣相次傳入臟腑先次喫前靣方漸喫此去腎邪正元氣散若上膈熱滯盛丸喫更妙出楊子建萬全護命方續斷萆薢杜仲去皮巴戟去心茯苓羌活天靈蓋酥炙黃色黑色川芎木香鱉甲醋炙各一分麝香二分右細研羅為末了方入麝香同研令勻細研蜜丸如梧桐子大每旦空心鹽湯下三十丸治骨蒸勞熱攻擊上焦靣上熱燥下部無力唇口生瘡口無味精神不守輕喫熱物醎物即惡心思吐睡中涎溢忽肌肉帶黑色宜服此方出子建萬全護命方前胡去皮柴胡去皮荆芥蕙地骨皮龞甲醋炙杏仁去尖麻黃去根黃芩貝母去心牡丹皮去心木香秦艽羌活蔓荆子各一分胡黃連四銖右杵細羅為末每二錢水一盞生薑一片同煎一二沸㵼出食後臨卧時熱服蘆根湯出指南方治骨蒸發熱蘆根麥門冬赤茯苓橘皮各五錢地骨皮二兩右為粗末每服五錢水二盞薑五片煎一盞去滓服澤㵼湯出指南方澤㵼半斤白术防風石膏赤茯苓各一兩右為散每服五錢水二盞去滓溫服兔絲散出指南方兔絲子酒浸透五味子各一兩生乾地黃三兩右為末米飲調下二錢食前服礜石丸出指南方礜石火煅通赤五錢旋覆花桂去皮取心枳實麵炒去穰人參各五兩乾薑芍藥白术各一兩五錢厚朴去粗皮薑製炙吳茱萸芫花炒橘皮各四兩甘遂炒一分茯苓細辛去苗大黃濕紙褁煨各四兩烏頭炮去皮四兩右為末煉蜜和丸杵三五百杵如桐子大每服五丸米飲下未知漸加走馬散出鮑氏方治骨蒸勞氣秦艽洗鱉甲酥炙當歸知母黃連青蒿子藳本茯苓柴胡各一兩右為末以桃桞枝蔥白各一握酒水童便各一盞烏梅生薑棗各七箇煎去滓每服飲子半盞下藥末二錢早晚空心服神驗柴胡散華陀中藏經方治大人小兒骨熱夜間如蒸甚者只十數日見效土柴胡不以多少去蘆洗淨炙黃不以太焦亦不須銀州者右為末每服二錢水一盞入地骨皮指頭大二片子同煎至七分食後溫服如虛瘦即空心服補藥食後煎下數服時時如水飲之鱉甲散出衛生家寶方治男子婦人骨蒸勞疾久虛人不可服鱉甲醋炙大黃濕紙煨香赤茯苓常山醋煮柴胡醋浸一宿焙乾茯苓當歸去蘆乾漆炒青煙為上白术生熟地黃石膏各一兩甘草五錢蜜炙右為粗末每服二大錢入小麥五十粒水一盞半煎至一盞去滓服日進三服常救人有驗如盜汗加麻黃根一兩蘭臺散出衛生