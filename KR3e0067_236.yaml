服五錢水一盞半生薑如一棗大拍破棗二枚劈破同煎八分去滓食前服白前散治骨蒸肺痿咳𠻳涕唾如膠胸背煩熱白前桑根白皮炙剉麥門冬去心焙各一兩五錢旋覆花五錢木通剉炒二兩甘草炙剉一兩治骨蒸肺痿咳𠻳方白蜜熟羊脂切熟羊髓熟猪脂生薑汁地黄汁各三升右依次第下鐺中慢火煎不住手攪熬至四分減一即止貯宻器中遇食羮中着一兩匙日三四服皂莢丸治骨蒸肺痿咳𠻳咯膿血病重者皂莢一挺長一尺炙黄去皮子白錫一兩生薑五錢乾棗七枚去核右除錫外細剉入酒以一升煑取半升去滓每食後溫服二合天門冬湯治骨蒸肺痿咳𠻳氣逆喘急唾不出唇漸漸羸瘦天門冬去心焙三兩升麻黄芩去黒心前胡去蘆頭各一兩五錢甘草炙一兩右麤搗篩每服五錢水一盞半入蘆根三莖竹葉三片煎至一盞去滓分溫二服空腹食後各一甘草散出聖恵方治骨蒸肺痿心中煩熱宜服甘草一兩炙微赤剉黄芩一兩麥門冬三兩去心焙右搗麤羅為散每服三錢以水一中盞煎至六分去滓不計時候溫服治肺痿骨蒸咳𠻳上喘呀呷有聲方青羚羊肺一具煑熟去筋膜薄切焙乾茛菪子米醋浸日中曝乾微炒右為末煉蜜丸如梧桐子大每服七丸空心米飲下漸加至十五丸以知為度麥門冬飲治骨蒸肺痿四肢煩熱不能食口亁渴方見本門骨蒸煩渴類秦艽扶羸湯出醫方集成治肺痿骨蒸已成勞𠻳或寒或熱聲瘖及體虚自汗四肢怠惰不美飲食柴胡去苗二兩人參去蘆鼈甲米醋炙秦艽當歸洗焙各一兩地骨皮一兩五錢半夏湯洗七次紫苑茸甘草各一兩右㕮咀每服四錢水一盞薑五片烏梅大棗各一枚煎七分去滓食後溫服骨蒸羸瘦附論夫骨蒸羸瘦不問男女皆因血氣不調五勞七傷心胸滿悶背膞煩疼目睛不明四肢無力寐卧不安脊膂急痛膝脛痠疼多卧少起状如佯病每早晨如無病者午時已後即四體微熱靣頰赤黄喜見人過常懐忿怒少不稱意即大嗔急行即脚弱夜卧盗汗夣與鬼交時或驚悸有時咳𠻳脇肋虚脹大腸微利鼻口乾燥常多粘唾漸漸羸瘦飲食日減以至死在須臾精神亦爽皆其證也方柴胡丸治骨蒸熱勞手足心煩悶背膊痠痛四肢沉重食少肌膚日漸黄瘦柴胡去苗胡黄連龍膽桃膠乾者升麻茯神去木黄芩去黒皮地骨皮生亁地黄芍藥大黄剉炒知母焙剉麥門冬去心焙甘草炙剉龍齒犀角鎊𤣥參山梔子去皮桔梗炒各三兩五錢丹砂二兩别剉入藥右為末拌匀煉蜜和丸如梧桐子大每服三十丸空心熟水送下生犀角散出危氏方治骨蒸肌瘦頰赤口亁日晚潮熱夜盗汗惡心煩躁及大病瘥後毒不解犀角鎊地骨皮秦艽去蘆麥門冬去心枳殻煨去穣柴胡去鬚茯苓去皮赤芍藥桑白皮去赤黄茋去蘆蜜炙人參去蘆龞甲醋炙知母各等分大黄煨右剉散每服三錢陳青蒿一根煎桃枝亦可及治小兒疳病熱似骨蒸者及久病後或虚後時作潮熱并瘧疾有痰加半夏熱輕去大黄加黄芩青蒿丸治骨蒸勞體瘦咳𠻳氣急者日漸枯瘁青蒿四兩童子小便浸七日曝亁龍膽秦艽去苗土黄芩去黒心杏仁湯浸去皮尖雙仁炒黄木香麻子仁研車前子兎絲子酒浸别搗末各五兩獨活去蘆頭栢子仁研各三兩山茱萸三兩右為末煉蜜和丸如梧桐子大每服三十丸食前溫湯下益母草煎丸治骨蒸勞瘦益母草一觔洗曝亁青蒿半觔去根桃枝一尺長者一握已上三味細搗以小便一斗於鍋中煎至三升濾去滓用柴胡五兩去苗丹砂三分天靈葢一枚曝亁别酒煑搗為末龞甲酒炙去裙襴二兩甘草炙剉一兩麝香研五錢桃仁去皮尖雙仁炒研五兩右除煎外七味搗研為末用益母草煎和丸如梧桐子大空心烏梅湯下三十丸漸加至四十丸初服若覺心熱減丸數如不熱依法服服後便以四五匙軟飯壓之龍膽丸出聖恵方治骨蒸羸瘦煩悶短氣喘息鼻脹日晚節發龍膽黄連去鬚各一兩梔子去皮十枚苦參一方無苦參大黄剉炙黄芩去黒皮芍藥青葙子枯樓根芒硝别研各五錢右為末拌匀煉蜜丸如梧桐子大每日空心食前米飲下二十丸日二服微利為度一方為散飲服方寸七名龍膽散芍藥湯治骨蒸羸瘦背膊煩疼頭痛寒熱不能下食芍藥地骨皮各三分柴胡一兩去苗甘草炙剉五錢石膏碎一兩當歸切焙三分龞甲醋浸炙黄一兩白术一兩右麤搗篩每服五錢水一盞半煎至一盞去滓分溫二服空心食後各一治骨節間積熱漸成黄瘦出本草用大黄四錢童便五合煎至四合空心分作二服如人行四五里再服獺肝丸治骨蒸羸瘦日晩即顔色不定手足痠疼口乾壯熱獺肝炙一兩五錢犀角鎊前胡去蘆頭升麻各一兩枳殻去穣麫炒一兩一方用枳實栢樹上脂研五分一方用松脂天靈葢酥炙黄一兩三分甘草炙剉五分右為末煉蜜丸如梧桐子大每服空腹以童子小便下二十丸日二服一方獺肝六分松脂甘草各五分犀角等五味各四分以小便浸豉汁下忌海藻菘菜生葱麫韭炙肉魚粘食陳臭等物龍膽丸治骨蒸羸瘦經久不瘥邪熱留連龍膽一兩一分黄連去鬚黄芩去黒心人參梔子仁黄蘖厚者去麤皮白芍藥甘草炙各一兩右八味搗羅為末煉蜜和丸如梧桐子大粥飲下十五丸空心夜卧各一以知為度地骨皮湯一名七味地骨皮散方出聖恵方治骨蒸羸瘦少力或熱或寒背膊痛口亁小便赤黄地骨皮一兩芍藥一兩五錢桑根白皮剉一兩五錢茅根一兩五錢甘草炙剉一兩柴胡去苗一兩五錢石膏碎三兩五錢右七味麤搗羅為末煉蜜和丸如梧桐子大每服二十丸食前人參湯下日二服地骨皮散出醫方集成治骨蒸壮熱肌肉消瘦少力多困夜盗汗地骨皮秦艽柴胡枳殻知母當歸龞甲醋炙黄右等分為末每服五錢水一盞桃桞枝頭各七箇薑三片烏梅一箇煎服枳殻丸治骨蒸勞瘦飲食不思枳殻去瓤麸炒一兩五錢白术人參甘草地骨皮各一兩杏仁湯浸去皮尖雙仁炒一兩五錢右六味搗羅為末和匀煉蜜為丸如梧桐子大每服二十丸食前米飲送下柴胡湯治骨蒸肺痿咳𠻳寒熱多涕宜服方見本門骨蒸肺痿類秦艽龞甲散出衞生寳鑑治骨蒸肌肉消瘦唇黄頰赤困倦盜汗地骨皮柴胡各一兩秦艽知母當歸各五錢龞甲一兩醋炙去裙襴右為麤末每五錢入烏梅一箇青蒿同煎臨卧空心各一服青蒿丸治骨蒸羸瘦青蒿切細一觔阿魏别研一兩天靈葢塗醋炙黄為末一兩桃仁一升湯浸去皮尖雙仁炒黄研右四味先以小便一斗煑青蒿至五升絞去滓即下餘藥候成膏可丸如梧桐子大每服十五丸空心溫酒下日晩再服漸加至三十丸生地黄飲治骨蒸及脚氣每至晩間増寒壮熱靣頰赤不食日漸羸瘦生地黄細切二兩甘草炙剉三兩葱白細切二莖童子小便一升右四味同煎至半升去滓溫分三服相去一時計服之治骨蒸勞瘦方見食治門食治骨蒸類治骨蒸熱積漸黄瘦右将黄連四分碎切以童子小便用三大合浸經宿微煎三四沸去滓食前分兩服如人行四五里再服治丈夫婦人勞瘦右用青蒿細剉水三斗童子小便五升同煎二升半去滓入器中熬成膏丸如梧桐子大空心服臨卧以溫湯吞下二十丸治諸結節筋骨煩甘草一錢右搗為末每日取小便三合甘草末一錢攪令為散服之骨蒸咳𠻳紫苑散出聖恵方治傳尸骨蒸復連殗殜肺氣咳𠻳一名紫苑湯紫苑去苗土桑根白皮炙剉桔梗炒續斷各一兩五錢赤小豆一合甘草炙剉五味子各兩一生亁地黄酒洗切焙一兩五錢右八味麤搗篩每服五錢以水一盞半入青竹茹弹子大煎至一盞去滓食後溫服良久再服若熱甚加麥門冬去心一兩石膏一兩五錢天門冬丸出聖恵方治骨蒸勞氣潤心肺止咳𠻳天門冬去心焙三兩五錢桑根白皮剉炒白茯苓去黒皮各三分杏仁湯浸去皮尖雙仁麸炒甘草炙貝母去心炒各一兩右六味搗羅為末煉蜜為丸如弹子大每服一丸綿裹含化津嚥煎麥門冬湯嚼下亦得不拘時候服治骨蒸勞瘦出經騐良方及久𠻳不愈者常服直至取効為度石膏一觔不用方解石者以細紋如棗針者良打碎粉甘草一兩右為細末重羅過如麫溫湯調服日夜三四服之普濟方卷二百三十六
