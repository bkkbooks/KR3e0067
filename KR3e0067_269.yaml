body:
  text: 普濟方卷二百六十九明周王朱橚撰符禁門總論夫上古移精變氣祝由而已黄帝官能有唾癰祝病之任周官瘍醫掌祝藥劀殺之齊以祝為治首迺知祝禁之術治病良法仁政先務也夫血氣者人之神不可不謹養養失其道則百病縁虛而入試觀易坎為血卦血為大赤則血流行精神潛運於其中是故心藏神血舍神神全則氣旺氣旺則血脈和通疾無自生逮其嗜欲汨昏思慮攻耗外邪襲虛而投隙精神氣血離守而交戰須臾之間變態百出齊人謂桓公之病公則自傷鬼鳥能傷公蓋言神仙受也於此不有至正之法祛其邪雖藥石其如病何況言為心聲書為心盡以夫精神交感寓於符祝聞聲盡之間若微而至妙若麤而甚精豈特神仙道家之陳迹也是以持受之道欲齋戒致一俾外物不得而蹈其舍然後能役使鬼神呼召風雲蹈火入水曽無焚溺則施諸治病為餘事苟為不然神不守徒區於聲音顔色且口道術在是猶象龍致雨蓋亦難矣然則同為符祝用之有應否者特在於正與不正之異耳今故載其術而冠以持受之法使學者得於聲畫之間而究其所以然者是乃神之微也道經云法禁者古聖前師格範也清以鎮濁伏直樞偽以善去惡以正祛邪上師真淨流慈而法呪神靈稟徳宗先氣整天殃殄滅仰穹䖍祝信士消百苦疼痠相念高真幽祚息千端苦横路丁步斗印手挐紋叩齒鳴鈐符丹呼吸仗一吹真正氣併去邪雄憑兩辨信誠香蠲除困厄呪巫法禁唯要精請誠悲聖慈真人恭可動持禁總法附論夫上古有祝由之法移精變氣推其病由而祝之則病無不愈今之書禁即其遺文焉制而用之存乎法推而行之存乎誠示之以心畫其莫如符攻之以説禬則莫如祝指掌之間執持有目則謂之印五者備矣舉而措之施諸治法何道而不可哉語病之由當原其本氣何由而平病何由而生真有所戲邪有所襲皆生諸病祝由之理祝此而已謂夫彼受於邪由精神不守所致故在我者當專心誠意以持之欲致其誠心先齋戒事以神明其徳然後秉印用符兼以詛祝而為持禁之道真定以勝邪其應如神矣苟非其誠道不虛行𫝊不云乎至誠如神其斯之謂與法持禁齋法凡欲學禁先知五戒十善八忌四歸皆能修治此者萬神助禁法乃行五戒者一曰不殺二曰不盜三曰不淫四曰不誣妄五曰不飲酒嫉妬十善者一濟扶苦難二行路見骸骨及鳥獸死者皆埋之三欽重鬼神四不行殺害起慈憫心五不憐富憎貧六行平等七不重貴輕賤八勿食酒肉五辛九不淫聲色十調和心性不乍嗔乍喜八忌者一忌見死屍二忌見斬血三忌見産乳四忌見六畜生五忌見喪孝哭泣六忌抱小兒七忌共女人同牀八忌與閑人論法四歸者一不得著穢汚不潔淨衣服二不得惡口咒詛罵詈三不得共人語詐道稱聖四不得飲酒食肉殺害無道如違犯者則神通不驗矣又云不得穢處誦禁文不得與不信人行禁不得向人説禁法不得穢汚手執禁文不得與閑人詛戲不得輕説神明不得嗔罵人及六畜不得乗車馬有此滿三事則禁道行能不犯者其禁大驗辟穢汚方若履城邑者用之竹葉十兩桃白皮四兩栁白皮四兩右三味以水一石二斗煮之一沸去滓浴身百穢消除又辟瘟瘴瘡若能常用此湯澡浴身益佳惟不可洗目紫微王夫人勅水洗目得清淨法呪曰濁不汚形死不妨生摩掌㽔目三遍令我長生青龍在吾左白虎在吾右朱雀在吾前𤣥武在吾後神禁勅水除塵垢急急如律令解穢水禁曰東流之水滑如苔中有主君與三台某甲穢汚蕩除急急如律令受禁法神仙經曰陽道强堅而易隂陽應言不言神明相聖人閉口萬物可藏迴轉青白改易隂陽應言不言神明相轉應語不語神明相與故萬法閉口藏身之禁萬法流行五藏神明衆人遊戲而我獨住衆人浩浩而我獨靜衆人言説而我獨黙此行禁之道畢矣仙經曰凡受禁之法當先齋戒百日精心不行淫慾惟得清靜沐浴著鮮淨衣口常不出惡言罵詈清思淨念勿生異想一如前章仍更七日之中閉口不共人語乃可受之正月一日三月三日五月五日七月七日九月九日三年之中三遍於此月受之并一心持齋戒不犯則行禁其驗如神正月一日受法正月一日平旦寅時清淨澡潄在無人清淨之處著鮮潔衣不得令人輒見燒衆名香正向東禹步三匝勿迴轉長跪讀啓度文曰上啓三師神童玉女天醫太醫盧醫諸師太上老君諸仙神王日月五星二十八宿北斗三台諸神官屬諸大神王咸知弟子某甲受持符禁之法願超拔衆生苦難除毒消邪辟却奸惡萬事如勅急急如太上老君律令都受禁文曰想東方木禁在吾肝中想南方火禁在吾心中想西方金禁在吾肺中想北方水禁在吾腎中想中央土禁在吾脾中想左青龍右白虎前朱雀後𤣥武天師禁駕無事不苦東王公西王母道吾禁有隨當止急急如太上老君律令説完誦所得禁文各三遍禮一十二拜仍更七日勿共人作一言及惡罵詈等語七日勿洗手面三月三日受法三月三日平旦寅時至東流水上正面向東立端心正意讀前啓度文如正月法并啓江河四瀆一切水官四海大龍王願知弟子某甲受持禁法願大神王立契訖誦所得禁文各六遍禮九拜五月五日受法五月五日正中午時在靜處燒香正面向南立讀啓度文訖誦所得禁文各三遍禮十二拜七月七日受法七月七日雞鳴丑時在靜處燒香正面向西立讀啓度文訖誦所得禁文各三遍禮七拜九月九日受法九月九日人定亥時在靜處正面向北立盆盛水口銜刀啟讀度文投香火長跪誦所得禁文各三遍禮九拜此五日法用一如正月者惟所向方位及禮拜不同耳太白仙人受法四月一日齋戒至八日立道場四面垂旛蓋燒香燃燈啓醮五方五帝五方禁師五方吞精啖毒夜乂神王願知弟子某甲受持禁法呪訖誦所得禁文各三遍七日齋戒同刀受禁法候初雷發時舉目看雷右手把刀以左手磨之呪曰助我行禁帳聲如雷吼萬毒伏閉氣待雷聲盡訖七日齋戒不出言一本云候初雷時見有物隨便把取唱言聲如雷萬邪皆怖畏待雷聲盡乃棄之一云口銜刀手持大斧磨之言口如毒手如毒聲如雷吼云云神仙王受禁法候燕初來時仰頭看之以手按地云口如毒以燕去不見乃止此等潔淨齋戒一如正月無别乃至七日不洗手天帝太乙受禁法初受禁時在寂靜無人之處敷在設案燒香正面向北方閉口並足正立左手持刀依式思存青龍在左白虎在右朱雀在前𤣥武在後北斗七星覆頭上柄指前次思東治大禁師願持兵萬石趙侯驃騎大將軍蘇平南公八部將軍七十二禁師陳師趙師直符小吏值日童子䕶值今日不得以左為右以前為後若有倒錯即依使者法律科罪之急急如律令如此隂念三遍然後禹步三匝至香火前叩齒三遍呪曰東方青龍銜水來南方赤龍銜水來西方白龍銜水來北方黒龍銜水來中央黄龍銜水來悉投杯中三台三台此水非常水洗除天穢地穢三十六穢某甲身穢盡除之急急如律令三遍呪訖以水洗目并噴噀四方上下餘水自飲之洗腹内令浄想又讀前啓度文然後長跪誦所得禁文各三遍訖禮四方各再拜即成神驗刀子水盆不得用曽經酒肉五辛者又一法正月一日東方明星出時淨浴在清靜無人之處白茅為席置坐設案燒香火鍾盛水井花水洗面目正面東向並足立先舉左手呼青龍次舉右手呼白虎前行呼朱雀後行呼𤣥武訖依前左持刀次第思神師曰符禁同法更無别法也若欲受符印者以帛若袋子盛桂著左手指勾之而擎水鍾閉氣禹步依法次第呪請有效也七星受呪法正月一日三月三日五月五日七月七日九月九日先以香湯淨浴取東流水以未經用瓦器盛之乃誦所得禁文呪一遍受人自洗浴於曠野無人之處以淨草為坐以瓦器盛水七盞作七星形北向云謹啓七聖真君弟子某甲願持禁法㫁邪鬼惡毒之氣救理人民伏願降真氣流布臣身令臣所行符禁應聲除差應手除愈次第飲前件水各少許餘洗手不得手捻不淨之物即有大驗黄帝越禁受法凡受符禁者皆清靜齋戒百日不得死亡産乳房室三年之中三度正月一日三月三日五月五日七月七日九月九日以上五日夜靜衆星之下置神坐設案燒香鍾盛水持淋刀北面叩齒捻三師目次第思神訖禹步三匝長跪讀啓度文又誦所得禁文三遍神驗水鍾不得用曽盛酒肉五辛者臨欲越時朱書帛素上左手持之捻目除隂誦呪之欲行禁時閉氣朱書白素紙上右手持之捻目隂誦呪之雜受禁法正月一日日未出寅時三月三日辰時五月五日午時七月七日申時九月九日戌時一云午時正月受一年用三月受一春用五月受一夏用七月受一秋用九月受一冬用右毎年常依所受之法不得飲酒肉食五辛芸堂乳酪酥蜜心懐憫念願救䕶一切生靈不作艱難不貪財物但作此心下口即差萬不失一受法用前月日先以清淨井花水沐浴上下衣服一切鮮淨清齋七日至其日先以井花水澡浴漱口燒香禮五方五帝各五拜訖正面向東燒香端立淨器盛井花水置傍誦所得禁文各二七遍訖口含水仰噀五方或取洗手面訖向東方吸青氣想入口中七吸次向南方吸赤氣次向西方吸白氣次向北方吸黒氣次吸中央黄氣皆作七吸入腹想更五方禮各五拜訖後作兩月持齋戒得禁想不得作一切諸惡行受訖即成禁法器物不得用曽經盛酒肉五辛者凡欲勅水思神法向月建王氣立先叩齒三下噓吸閉氣存思左目為日右目為月思東方甲乙木配肝為青龍次思南方丙丁火配心為朱雀次思西方庚辛金配肺為白虎次思北方壬癸水配腎為𤣥武次思中央戊巳土配脾為麒麟皆須向月建王氣思之在水中思得氣訖神童玉女在左右便思日氣在水中便三右營水三噓呪曰水在井中為井水在碗中為碗水神師呪水為神水水入腹中為直水水咽喉開大服下流膀胱交集衆邪滅萬病盡令出今月值符某甲齊水持符入其身中治所患處今有效信急急如律令服解穢符勅水洗萬穢呪謹請汚官諸神湔浣濁夫人解除百穢天下之穢地上之穢産生之穢疾患之穢牢獄之穢死喪之穢葬送之穢道路之穢忻顔下鼻口舌目耳門十指𤓰甲脛膝踝五臟六腑腸胃肝肺百萬之穢皆隨水出云謹請勅藥厨六人海水二人佐水為洗撤右千汚萬穢皆停速去身體清淨直氣補處急急如太上𤣥都律令勅解穢符呪曰仙人沐浴氣芳芳洗蕩隂穢書消亡急急如律令普救方解穢符十一道千金翼禁法大例用禁大例誦禁文必不得出聲令自耳聞聲若聞之名為呪即禁法不行行之無益慎之受禁之時不得令人畜等一切見之見之即不成受法時刀及水盆皆不得用曽經酒肉五辛者神仙經曰對治禁萬病擊同數逢水難土王擊之逢鬼難桃湯擊之逢刀難陽精擊之逢虎難五常氣擊之逢土難木王擊之萬病擊同類對治皆持刀持桃持火持水持繩持藥持符持㦸持弓持箭持弩持食持坐持粉持意持神持想持氣持書持石持土持鹽持幡持脂持肉持血持麵持金持玉持印故其法皆禁擊之所須用禁之法有請有告有祭有害善神即飲食祭之住之惡鬼即剋之却之有殺有畏有愛有喜有惡有死有走有住有滅有故對治用時各各條例仙經曰用禁有六法一牙齒禁存意氣至牙齒二營目禁開一目閉一目三意想禁存意以去想諸疾以除四捻目目禁謂手上一十五目五氣道禁謂吹呼呵嘘嘻呬六存神禁存諸神在以食醮祭之感天靈祭至又鳴天鼓叩齒之法是也凡人為請療疾出門三步呪曰天殺皇皇地殺正方千鬼萬神誰復敢藏飛步一及百鬼滅亡急急如律令若治病人家先當解穢即作五龍水法手