四指捻天井目第五指塞鬼道諸厭鍊召制鬼神禳兵却陣諸所伏物皆用心訣朱烏目以第指捻死人喉大指捻朱雀目第五指捻鬼目請召阿羅魔令人鬭亂之事能厭口舌欲起即起欲伏即伏隨師曰訣生人喉主厭官禁奴婢逃走禳兵攻陣所有盜賊生人厭禱呪咀所有謀成功議胡入成功伏百姓戒陣防禦盜口舌上凡欲行常訣依召請兵行事如用知有驗如無作法從行無也䕶身法附論夫人處昭鬼處㝠當以誠信自為然後可行苟信不先誠則明有人非幽有鬼責未可保其往也故欲禁鬼邪先按鬼目欲免人患先捻生人喉則彼不能為害矣所有人喉鬼目大在本圖攻説之文今列于後法䕶身禁法以下普出千金翼呪曰諾諾睪左帶三星右帶牢天翻地覆九道皆塞使汝失心從此迷惑以東為西以南為北人追我者終不可得明星北斗却閉千里六甲反張不避禍殃乗車追我折其轅軸乗馬追我掩其兩目步行追我腫其兩足揚兵追我刀反自伏明星北斗却敵萬里追我者息覔我者死牽牛織女化為江海急急如律令又法太乙真人曰凡欲逺行避難若為惡人迫逐危厄之中出門禹步三匝乃去可以消災追我者迷惑五乗旋轉道還惡人欲來侵己者逆而却之氣今日東方青毒南方赤毒西方白毒北方黒毒中央黄毒五毒之氣今日某甲無道道欲來侵吾吾披太乙神符厯行四海乗風駕雲使有限㑹某甲懐惡逆之心殘賊患良不肯休止五毒之氣并力收攝付與地官莫令某甲復懐惡賊心害之意應事了命言切千百等急急如律令若逢寃家惡人法先却三步捻生人喉又以左足大指攝地呪曰北斗神君來滅惡人斬截寃家某甲頭送上天門急急如太上老君魁罡律令又法惡人欲來侵害者先閉氣三噓黙呪勿令人聞呪曰頭戴朱雀足履𤣥武左佩青龍右佩白虎吾來到處百惡悉走吾有天丁力士惟殺惡鬼逺近千里急急如律令自防身禁鬼法出某甲左青龍孟章甲寅右白虎監兵甲申頭上朱雀陵光甲午足下𤣥武執明甲子脾為貴子央甲辰甲戌急急如律令右此一法凡是學人常以且久黙誦令熟莫使聲出若有縣官口舌軍陣危險厄難之處四方興工動土殃禍之氣或入他邦未習水土及時行疫但以晨夜數數存念誦之勿忘若弔喪問病臨尸凶禍之家入門一步誦一遍出門三步誦一遍皆先叩齒三通并捻鬼目又法凡行山澤晨夜恐怖之處使人鬼惡物不相干忤呪曰人皆濁我獨清人皆去我獨停人皆極我獨丁人皆枯我獨榮人皆破我獨成天長地久我與并依文昌遊心星登太𤣥昇紫庭飲甘露食陽精佩日月體安寧乗三鳯駕羽英監藏擇久天仙公以􅽔刑急急如律令千金翼掌訣法神醫普救方同天師曰若欲脩之先持齋戒一如正月法斷葷菜忌房室先取龍骨烏頭附子犀角各一兩以水三斗煮取二斗周身澡浴有餘者翌日用洗手面訖以盆盛水燒香禹步三匝口銜對北面長跪密讀前啓度文誦所得禁文各三遍一依正月戒忌即成驗矣天師曰得吾法者上士昇仙下士延年非賢勿𫝊殃子孫又受禁法呪曰女口噙艾一日誦七遍七日止凡禁病大例禁一切病先須口嚼楊枝去口中穢氣又嚼鹽乃呪唾之若返一切口味者燒牛糞灰淋汁取飲嗽服此除腹中諸穢并作解穢符水之法還得清淨此是掌訣解穢法也凡游行有人間有所犯穢者一皆如之凡欲行禁須捻鬼目若與男禁捻左手目若與女禁即捻右手目一云男子行禁捻左手目女人行禁捻右手目并逐四時王相正面向月建正心定意閉氣三捻目左營目順天道即成禁法用神效左營目者開左目閉右目右營目者開右目閉左目是也凡禁訖須解禁法假令禁虎須存作獅子捻虎目解之還存作虎一云男畨捻左手虎目女畨捻右手虎目若欲禁狗存作虎捻狗目若欲解之還存作狗以此例倒觸數長之皆須效此大指第一節是生人蛇虎頭若有惡人侵犯己身罵詈不止者緩即捻之急即閉氣押之左營目惡人怒即止也若不止即押喉向官府門亦如之一百步外預作之乃入官官見嗔欲禁虎蛇亦依此法即虎蛇避人人莫畏見之也大指第二節是生人蛇虎喉若惡人罵詈不止與人緩者閉氣捻之急即押之左營目令彼喫訥不能言也第二指第一節是蛇虎目治虎蛇瘡閉氣捻之己身與他人同若見蛇虎便捻之急則瞋怒而押之第二指第二節是鬼目欲見鬼去鬼繫鬼皆捻之急則閉氣搯之左營目九氣則鬼神立至矣呼即去吸即來治病捻之第二指第三節是生人目欲藏身醫己與人爭鬭及在深山曠野皆須捻之以伏衆人之言急則閉氣搯之左營目人不見己也第三指頭甲下是蜂蝎及百鳥飛禽之目若人被蜂蝎螫捻之左營目五氣即解之若不少差搯蝎目及人天二道并捻掌心即差第三指第一節是地獄治鬼目若欲禁諸神鬼不令來去閉目向王閉氣五十息捻之急即左營目搯之第三指第二節下是天獄目欲禁鬼却鬼攝鬼殺鬼皆向王閉氣捻之急則搯之左營目若為鬼魅所著或惡夢厭鬼捻之第三指第三節是䑕目一名天地獄治鬼目若主鬼住神皆向王閉氣五十息捻之左營目第四指次甲下是蚊子蚤虱之目欲除之閉氣捻之第四指第一節是狗目欲禁狗令不咬人及治狗瘡閉氣捻之第四指第二節是都監目一名神督目都監領一切諸神都管一切諸神都管一切諸鬼欲召鬼神問其意向王閉氣五十息捻之左營目鬼神立至矣第四指第三節是鬼目一名蛇胎欲行考鬼令鬼住問鬼急捻之問氣出入山澤畏逢蛇口禁不得開矣第五指頭是大心欲求天神向王閉氣搯之神自感格大住第五指第一節是游師目第五指第二節是天師目第五指第三節是三師目此皆是初學符禁法時向王閉氣捻之九十息左營目啓請即有神驗矣掌中一理是鬼道欲誅符破壙㫁鬼魍魎惡氣伐神木皆向月建閉氣五十息搯之左營目神驗凡欲呪勅符皆須捻㫁鬼道使鬼常欽之掌中一理一名鬼舍亦名地軸一名左都監鬼道目欲誅符破廟除社公社地或召諸鬼神須有問及治病并欲解鬼皆欲搯左都監目鬼立至矣若田野中宿搯地軸令鬼賊及神皆不敢近人若入神屋止宿恐怕不安搯鬼舍即不厭鬼夢掌中一理斜紋食地食地上一紋名天紋下一紋名人道若入山澤畏虎狼向王閉氣搯手虎口中即不來若已逢井搯之令虎狼閉口不開第四指第一節名左金堂若趨事就利搯之萬倍第三指第一節名玉堂若欲求顯達搯之必遂意第二指第一節亦名玉堂欲求官搯之又曰此掌訣直月閉氣左營目搯之無呪文也禁病則皆須禹步誦禁文捻而用之急則值而搯之禁男用左手禁女用右手禁手之用勿失左右也禹步法移步左右足前後不同凡欲作法必取三光氣又禹步然後作法驗矣三光者日月星禹步者或三步七步九步不定若欲三光氣者極晴明日向兩脚並立先所願事隨意多少小呪之然後取禹步三步也所欲也步時先舉手取太陽光氣口吸之至三步畢微微息出三步者從立處兩過移兩脚始成一步三步即是六過移脚也向日光禹步時左脚先移右脚後移若向月星二光禹步時並右脚先移左脚在後也但步數不同耳若向星禹步時須滿九步者向日三步更足六步耳三三步合九步也星者即是北斗七星也步星尤在至誠所以須九步也於日月中或用三步或所用七步呪願及閉氣方法並如日中作也受三光氣時日必須明亮好晴日也日是陽月與星是隂又左是陽右是隂是故受日氣時左脚先移受月星氣時右脚先移又向星禹步作九步時既長久若一氣不得度是三步作一閉氣則九步即三過閉氣也呪願並須三過又須識北斗下三台星男識免刑厄女識免産厄問曰雖云兩過移兩脚成一步猶求可狀云何釋曰先兩脚正並立先舉左脚進住次舉右脚就左脚處正齊並立此猶未一步次第二又先舉左脚進住次舉右脚就左脚住方始成一步也如此六過雙移兩脚成三步此是步法也被人所禁解之法先捻生人喉呪曰煒煒煌煌天有九柱地有九梁北斗七星為我除殃青龍在前白虎在後青龍飲汝血白虎咬汝喉頭破腦裂汝死不擇日急急如律令被人禁即却解之法噴之行頭及天公亦是吾師坐頭及天公亦是吾師眠臥及天公亦是吾師却看天師欲作禁吾解千禁萬惡若欲禁吾反自著急急如律令凡人行處不安穏疑有恐怖之事即以氣噴之拒便以禁呪曰急令辟惡除鬼制不祥衆邪消盡魍魎逃亡神符宣流以知夫惡當我者死值我者亡急急如律令凡行經神廟及㫁虎狼呪吾為天地祭酒當為天地頭戴日月身佩北斗急急如律令禁惡人鬼火法呪曰吾是𤣥皇之孫太上之子口含聖真神氣符與東西百鬼隨吾驅使吾東向一唾九木折南向一唾八火滅西向一唾金剛缺北向一唾流水絶道氣流布隨吾所説急急如律令禁賊盜法夫欲出行先畫地為壇房中六尺庭中六步野外六十步置十二辰位身居甲地自呼名某乙今欲出往某處征討時神保佑於我吉昌三言訖大呼青龍下呪曰六甲九章天圓地方四時五行青赤白黄太一為光向前開道蚩尤辟兵青龍俠舉白虎承衡熒惑光引辟除不祥北斗誅罰除凶去殃五神導我周游八方當我者死向我者亡欲惡我者反受其殃吾受北斗之孫今日出行乗青龍出天門入地戸遊隂中履華蓋去冠予賊楯刀弓㦸弩見我推伏莫敢當禦急急如律令禁賊法唾此惡賊欲來狂圖某甲者或從東方青帝來或從南方赤帝來或從西方白帝來或從北方黒帝來或從中央黄帝來欲來傷害人者令其任事莫成拔劍自刺拔箭自射吾於四道開通盜賊伏匿五兵推折蜂蛇莫動犬尾辟側百步莫令相傷吾禁五方惡賊仗吾手下不得浪行急急如律令呪童子令説鬼法夫書禁有祝法能令童子説鬼姓名印用山字用符用斗下符即神應之或寓諸童子或得之病者自稱其鬼宗姓名曽不能隨其情夫鬼處於幽不可以形見而童子能得之者以無知為知也無知則無不知夫是以見不見之形其㡬於道乎呪法太上老君禁神三呼三吸以取其真東方青帝木中精南方赤帝朱雀行西方白帝白虎身北方黒帝乗船行中央黄帝黄龍聲吾有其禁知天神蓋不自發身歸誠日南施禁火精日北旋禁五帝動經吾三禁莫敢不來神道神名鬼道鬼字蟲道蟲名魅道魅字偷名賊字高山騰蛇下山騰蛇高山之﨑下山之峻或在天上或在人間河伯將軍五道修羅十二神將登明君天魁君傳送君小吉君勝光君太乙君天崗君太衝君功㑹君大吉君神后君速送速送汝名不得久停急急如律令右取清水半升以刀子攪水誦此呪三七遍與小兒飲之朱書前件録於小兒膊下膝作下少時召鬼並來小兒自見二問之道所作鬼所抄取姓名發遣如癲法與過所遣之如上說也度符請啓神言先上香呪畢以筆指口鳴鼓呪曰謹請東方青帝老君來下纒吾筆謹請南方赤帝老君來下纒吾筆謹請西方白帝老君來下纒吾筆謹請北方黒帝老君來下纒吾筆謹請中央黄帝老君來下纒吾筆指天天清指地地寧指鬼鬼死指人人生急三切如太上老君律令請五方水度符謹請東方青龍真氣入吾水中謹請南方赤龍真氣入吾水中謹請西方白龍真氣入吾水中謹請北方黒龍真氣入吾水中謹請中央黄龍真氣入吾水中謹請五方五龍真氣入吾水中吾水非常之水煮桃作湯吾刀非常之刀七星傍甲吾口非常之口内含魁剛水在江中名曰江水水在井中名曰井水水在吾碗中名曰清淨神水水在吾口中名曰太上老君解穢之水五水噀山山裂噀地地裂噀人人生噀鬼鬼滅急急如律令灑水言噓係天師陽平等二十四化真氣臣某弟子自稱道號某嶽真人某先生以今月今日今時奉為某家弟子度某符隨符言之度神符呪曰日出東方光曜表裏行符勅水出於老子老子行符吾所使東九夷從符行南八蠻從符起西六戎捉鬼軍北五狄破鬼營中三秦從符所攝急急收錄一鬼不去斬付北嶽天有三皇地有五嶽某所行符自有法則非常無真當符者死值符者亡一鬼不去斬付魁剛急急如律令又曰符主東方木折南方火滅西方金缺北方水竭中央土裂符主天清地裂人生鬼滅急急如律令噀水三口度神符主符啓請謹請虛無值符值符事三十六人從吾符行謹請太清值符值事歳值符值事今月今日今時值符值事各三十六人從吾符行保其家弟子三災度脱急急如律令噀水三口又曰天圓地方六律六章神符燒身災厄消亡符謹奉行急急如律令禁鬼邪法附論夫人之神氣安寧則邪不能干及其衰弱鬼邪凌犯其致病也使人悲喜不常語言失度或飲酒而好居靜室或不飲食而嗜睡或目暝不開或黙黙不言皆其候也若此非藥石可除宜以符呪袪之訣法千金翼禁邪病凡鬼邪著人或啼或哭或暝或笑或歌或詠稱先王姓名今人癲狂有此狀者名曰鬼邪惟須遣之伏鬼乃差治之法於正發時使兩人捻左手鬼門鬼市兩人捻右手如左手法鬼門者掌中心是鬼市者腕後厭處是伸五指挐手力則厭處是腕後者大指根兩節中間是一捻之後不得暫動二鬼出去不得伏鬼又不得太急若太急則捻人力盡力盡則手動手動則鬼出亦不得太緩太緩則不制鬼惟須以意消息令緩急所復使兩人投挍子刺兩肩井中緩急如鬼門市法以鬼伏為限若不伏稍稍急刺若伏則稍輕刺之病人是丈夫肥壯者則急刺之量人强弱消息不意若校尖刺以布物裹之勿令傷亦須誦呪必誠伏如狀貌中有四伏狀不伏相罵下情求首叩頭求去遣一人捉鬼師自問鬼之姓名住何州縣鄉里年幾眷屬伴侣幾人又問來意又所作為何事來一依病人口筆冩之若其神伏叩頭求去不敢更住者且停刺肩井等依其所作備覔發遣之須食須金銀車馬則彩畫人人馬像金銀線帛隨其形貌悉畫作之絹帛以白紙作金以梔子染之若是逺來之鬼須給過所者赤即遣之即目早發遣或待後發遣亦得送鬼之時須桃符一板長七寸濶二指綜綖一條長七寸以朱書板上著年號月朔日子鬼之鄉里姓名年幾從人須數告五道大神河伯將軍上件鬼某甲等在我家中作如此罪捉獲正身所索之物並已具給發遣速出去不得久停久住急急如律令勅水逐鬼法習習詳詳便生水光值符使者住立水傍真正補虛邪氣消亡吾左手捉鬼右手持鉞斧斬死鬼急急如律令禁唾惡鬼法吾從狼毒山中來饑食真珠渴飲武都戎鹽一把淨水一盂口含五毒常與唾居但老君之唾唾殺飛鳬唾河則竭唾水則折唾左徹右唾表徹裏銅牙鐵齒嚼鬼兩耳速去千里不得留止急急如律令普濟方卷二百六十九
