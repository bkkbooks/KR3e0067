body:
  text: 普濟方卷二百四十九明周王朱橚撰㿗疝門隂腫痛附論夫隂痛者由腎氣虛損為風邪所侵氣流入於腎經與隂氣相擊真邪交爭故冷隂痛但冷者則痛挾熱則腫也隂腫者由風熱客於腎經流於隂腎虛不能宣散故至腫也隂卒腫痛者蓋亦由腎氣虛弱暴邪氣傳入隂中冷熱相搏故卒然而虛也痛甚則邪勝邪勝則熱勝熱勝則腫皆卒然而作也方沉香散治隂卒腫痛不消發歇疼痛沉香丹參赤芍藥白蒺䔧微炒枳殼麵炒微黃去瓤赤茯苓去皮各三分檳榔一兩右為散每服三錢水一盞煎六分去滓食前溫服木香散治隂卒腫痛攻注腹脹滿悶木香防風去蘆頭各半兩赤茯苓去皮檳榔各一兩牡丹澤㵼郁李仁湯浸去皮微炒各三分右為散每服二錢溫酒調下一方無郁李仁丹參散治隂卒腫脹或疼痛丹參檳榔各一兩蘹香子青橘皮去白各半兩右為散每服二錢溫酒一盞調下食前服之治隂忽疼痛桃仁湯浸去白尖雙仁麩炒微黃苦楝子蘹香子沒藥各一兩右為散每服食前熱酒調下二錢桂枝加味湯治外腎弔痛自左乳根如蜘蛛絲許吊縮外腎拘攣不得屈伸其脈沉弦緊澀右以桂枝湯加澤㵼川烏炮青鹽茴香等分薑棗服之再用炮附子葫蘆巴酒炒川棟肉炒茴香炒四味等分為末酒煮獖豬腰子去筋膜研細入酒少許為丸如梧桐子大酒下四五十丸食前服宣胞丸治外腎腫痛黑牽牛一兩半生半熱青木香一兩斑貓七箇用青木香炒香用五箇班貓川木通一兩炒右為末用酒糊為丸如梧桐子大每服三十丸酒送下鹽湯亦可治隂風冷所傷疼痛出聖惠方白蒺䔧微炒去刺附子炮製去皮臍蘹香子微炒右等分為散每服食前以酒調下二錢治隂痛不可忍出聖惠方硇砂一兩細研安於照字上堀一坑子燒令通赤後著頭醋一大盞已來澆在坑子內便安照子著裏面盆蓋用四面擁之二七日取出刮取􅗠砂細研木香一分末肉豆蔲末一分右都細研糯米飲和丸如梧桐子大每服煎蘹子湯下七丸相次三二服取瘥又方出聖惠方銅緑苦楝樹向陽根銼木香已上各等分右為末煮麵糊和丸如梧桐子大不拘時溫酒下五丸又方出聖惠方苦棟子三兩附子炮製去皮臍􅗠砂以酒熬成膏各一兩右為末以􅗠砂膏和丸如菉豆大不拘時溫酒下五丸雞糞礬散出聖惠方治隂腫雞糞礬火前茶龍牙草各三分右為散雞子清調塗腫處日三易之雞翎散出聖惠方治隂卒腫雞翎六莖燒灰蛇牀子一兩炒右為散每服一錢溫酒調下如左邉腫即取雞右翎右邉腫取左翎姚方無蛇牀子治腫大如升右用蛇牀子末和雞黃敷之又方治外腎偏大腫痛右用大黃末醋調塗乾即易之塗傅方治隂卵卒腫痛桂去粗皮一分右為末稀麵糊調塗腫處頻易以效為度一方水調塗黑豆尉方治久坐卑濕忽隂囊虛腫氣上築右以米醋炒黑豆青布袋盛尉心腹更以椒蔥湯淋泄淨腰胯厚衣蓋下部然後服諸藥竹皮湯出危氏方治交接勞後隂囊痛入腹中右刮竹青皮一升以水三升煮一半去滓分三服立愈治腫大如升右用馬齒莧搗汁塗之治蚯蚓吹腎囊腫右用鹽湯洗以炒鹽包尉痛處治外腎腫硬右拈衣草為末用津唾勻於內握揉溫熱烚痛處即安治隂腫出本草右用梁上塵醋和塗之治卒外腎偏疼出肘後方右用皂莢和皮為末調敷之良海藻丸出聖惠方治虛勞損腎隂疼痛海藻一兩洗肉蓯蓉三分酒浸去皮炙乾牡蠣方木香牛膝去苗硫黃研各五錢蘹香子沉香天雄炮製去皮臍各三分右為末入硫黃都研令勻煉蜜和搗五七百杵丸如梧桐子大每服食前溫酒下三十丸鹽湯亦得冬青湯治腫不下冬青葉小蘗甘草右等分煎湯五升瓶盛湯浸三兩時必下神效方治腎囊腫大右用黑牽牛一兩淨炒黃色香熟為度次將舶上硫黃研末拌牽牛須要入內不見硫黃將牽牛紙襯放地上一宿碾末用宿蒸餅糊為丸每日空心鹽湯下三十丸量證加減茴香理中丸雄黃散出聖惠方専治隂腫大如升核痛不可忍用雄黃一兩碎研綿裹甘草一兩生切用水一斗煮取二升以洗之忌海藻菘菜千金用礬石二兩肘後用礬石二兩治隂冷漸漸冷氣入隂囊腫滿恐死日夜疼悶不得眠以取生椒擇之令淨以布帛裹著凡囊令厚半寸須臾熱氣大通日再易之取消差一方兼治虛勞隂腫冷痛礬石丸出肘後方專治隂中痛礬石二分大黃一分熬甘草木右用綿裹如棗以導之取瘥治腎囊腫大出經驗良方淡豆䜴二兩斑毛四十九箇去頭足茴香一兩炒右為散酒糊為丸梧桐子大每服三十丸鹽酒送下治卒隂痛如刺汗出如雨出千金方小蒜韭根楊栁根各一斤右合燒以酒灌之及熱水氣蒸之即愈滲濕湯出海上方治隂腫痛蒼术製乾薑白术白伏苓陳皮甘草各一兩右㕮咀薑棗煎空心服吳松坡嘗有此疾右邉囊腫光而微疼始服㵼腎之藥其腫痛愈甚續服腎著湯一料而全愈蓋此證因濕氣得之愈利則愈虛也腎著湯見易簡方滲濕湯下注大意去濕之劑也一方出海上方專治腎囊腫痛用八角茴香一兩用鹽合炒香熱和鹽分十服細嚼無灰酒送後服茱萸內消丸三兩分作十服空心服治隂痛方出千金方甘草石蜜右等分為末和乳塗之男子隂腫如斗大核痛人所不能治者出肘後方右用蕪菁根搗傅之有人隂冷冷氣漸入隂囊腫滿恐日夜痛悶兼治虛勞隂腫大如升核痛又方醋和熱灰尉之出聖惠方用搗莧菜根傅之又方出千金方用釡月下土雞二白和傅之一方車前子為末飲服之又方出千金方用醋和麵炙令熱尉之又方出千金方用炙大蘇根汁服一升日三下過三即愈治腎囊腫痛用先以生料五苓散煎七分去相熱服後以青木香丸一貼用斑貓去頭翅一處微炒帶香黃色去斑貓將藥丸又用鹽槎丸子後煎五苓散一貼加吳茱萸同煎至七分去滓送下前青木香丸服藥後如小便時用手托起隂囊小便了然後放下已上二方孫威儀用效治男子隂腫以荏子其葉搗和醋封之女人綿裹內三四易治卒隂腎痛以燒牛糞末和酒傅之乾即易治隂囊墜腫氣痛以槐皮煮汁淋之雄黃洗方治男子隂腫核痛不能療者方方見本門隂疝腫縮類馬鞭草散出肘後方專治男子隂卒痛腫右用搗蕪菁根同馬鞭草傅並良蚯蚓散治隂腫痛右為水擂甘草調蚯蚓糞塗雞糞散出肘後方專治男子隂卒腫痛右用竈中黃土末以雞子黃和傅之蛇床子末和雞子黃傅之亦良療男女隂腫右以綿裹生大豆已搗者內之治男子隂腫大如升核痛不能治者出海上方右搗馬鞭草塗之立效療隂腫出海上方右以鐡精松傅之蟾心方治外囊大心中爆燥隂下濕癢右吳茱萸煎湯熏洗即愈或以茱萸末置熱水洗亦可治虛勞隂腫痛皮癢出聖惠方右以桃仁去皮尖熬末酒服彈丸許不過三服即瘥療惡毒痛者隂卵或偏著一邉療急攣痛牽小腸痛不忍右以茴香草搗取汁飲一升日三四服又取滓傅腫失笑散出濟生拔粹方治腎腫用荆芥穗一兩朴硝二兩為末蘿蔔同煎湯淋洗豬肝法治隂囊癢搔痛悶右用豬肝炙熱內隂中當有蟲著肝治偏腫出儒門事親茴香甘遂右各等分為末酒調二錢食前服又方出儒門事親治偏腫巴戟去心川棟炒茴香右等分為末溫酒調二錢服食前治隂痛不可忍出儒門事親吳茱茰二兩湯洗七遍焙乾微炒檳榔一兩茴香一兩右為末醋糊為丸熱酒下十丸食前服治隂癢痛用車前子以水三升煮三沸去滓洗癢痛處即瘥法導引法養生方云兩足指向下柱席兩湧泉相枯坐兩足跟頭兩膝頭外扒手玄前向下盡勢七通去勞損隂膝冷小腸氣附論甲乙經曰少腹控睪引腰脊上衝心肺邪在小腸也又曰小腸病者小腹痛腰脊控睪而痛夫小腸者連睪系屬於脊貫肝肺絡心系其經虛不足則風冷乘間而入邪氣既盛則有厥逆之症其氣上衝肝肺客冷散於育結於臍控引睪丸上而不下痛引少腹甚則衝於心胸蓋其經絡之所系屬然也方救生丹出御藥院方治男子婦人小腸元氣上攻心腹痛並男囊偏腫痛消積聚補丹田荆三稜三兩乾漆二兩半炒煙盡廣茂硃砂各二兩川茴香破故紙炒各一兩葫蘆炒川苦楝巴戟紅豆􅒦砂仁海蛤當歸半夏湯洗七次􅗠砂沒藥馬藺花炒芫花醋炒黃色已上各半兩水蛭一錢炒煙盡蛤蚧一箇酥炙附子一兩半炮去皮臍紅娘子二錢粳米同炒粳米黃色去粳米不用右為末醋麵糊和丸如梧桐子大每服三五丸空心食前溫酒下鹽煎散治小腸氣吊腹中成陳刺痛治風症益智仁白芷白乾薑炮茴香炒甘草炙天台烏藥去心香附淨各一兩青皮一兩半檳榔麻黃去節川芎枳殼製各半兩右共為末每服二錢鹽少許水煎食前服􅗠砂丸治控睪小腸氣痛硇砂一兩别研細水飛蓬莪茂炮銼棟實麩炒丁香蓽澄茄肉豆蔲去殼炮檳榔附子炮製去皮臍巴戟天去心青橘皮湯浸去白焙蘹香子炒木香各半兩右除􅗠砂外搗羅為末以酒一升先取􅗠砂并飛􅗠砂水一盞同熬及一升入諸藥再熬頻攪候得所丸如梧桐子大每服二十丸空心溫酒下加至三十丸木香導氣丸治男子小腸肚疼一切氣積以補下元虛冷脾胃不和並皆可服大有神效木香乳香丁香八角茴香川楝子去核破故紙葫蘆巴荆三稜香附子甘草各一兩杜仲半兩右為末酒糊丸如梧桐子大每服三十丸至五十丸空心溫酒下鹽湯亦可日進三服延胡索丸一名煉隂丹治小腸受寒控睪小腹隂器下墜腫脹卵核偏大堅硬疼痛不可忍延胡索青橘皮湯浸去白焙海藻湯洗去鹽焙乾葫蘆巴切昆布湯洗去鹽焙乾馬藺花蘹香子炒棟實肉炒各一兩木香半兩巴戟酒浸切焙一分一作大戟右為末入􅗠砂阿魏安息香三味各一分以醋二升化開去泥土以重湯煮之令成膏和丸菉豆大每服二十丸燒綿灰酒下空心食前服一方入麝香一錢沒藥一分一方無葫蘆巴走馬茴香丸出德生堂經驗方治男子積年傷憊久冷及小腸疝痃氣疾方見積熱痛冷門痼冷類復元丸出朱氏集驗方治釣腸病川棟子二十五箇銼肉作五分一分茴香炒一錢一分陳皮炒一錢一分黑牽牛炒二錢一分神曲炒一錢一分巴豆炒五分除去巴豆破故紙二錢代用右為細末煮少麵糊為丸取江水井水塘水田水圳水合煮湯吞下空心服丁香丸治控睪上而不下痛引少腹小腸受寒丁香木香狼毒蜀椒去目并閉口炒出汗各一兩附子炮製去皮臍芍藥桔梗炒乾薑炮各半兩細辛去苗葉一兩半右為末煉蜜和丸如梧桐子大每服三十丸食前炮蘹香子酒下通氣散治小腸疝氣腰腹牽引疼痛及感風寒或因勞動腰痛並婦人吹妳心氣脾痛瘡􅟻已潰未潰悉治有功穿山甲銼碎用蛤粉炒脹去粉二兩重白牽牛二兩炒玄胡索去皮陳皮去白淨炒厚朴去皮甘草炙各一兩木香一兩半不見火船上硫黃二兩炒黑牽牛半兩炒右為細末每服二錢空心溫調下病在上者食後化生丸治小腸疝氣痛上引腰臍身不能直木香三錢半不見火檳榔生用三稜煨茂木煨川楝子肉煨陳皮芫花醋炒清皮各半兩巴豆十粒去皮右陳皮青皮同巴豆炒黃去巴豆不用為細末麵糊丸桐子大空心溫酒鹽湯任下三十丸乳香丸治小腸受邪睪丸控引上下臍腹痛丹砂研胡椒楝實麩炒去核當歸切焙木通銼馬藺子炒各半兩􅗠砂研海蛤各一分蘹香子炒一兩右為末用乳香一分研細以酒煮糊和諸末藥丸如桐子大每服二十丸溫酒或鹽湯下亦得空心食前三茱丸治小腸氣疼山茱萸石茱萸炒吳茱萸炒金鈴子去核炒青皮去白炒船上茴香炒馬藺花炒小兒胎髮煆存性各一兩右為末酒糊丸如桐子大每服三五十丸鹽湯酒下此藥復州史君親服得效蕩疝丸治小腸疝氣上而不下疼川楝子炒茴香炒破故紙炒各五錢青皮去皮牽牛頭末陳皮去白各三錢廣茂炮木香各四錢右為末酒糊丸如梧桐子四十丸空心溫酒下鹽湯丸治小腸久積寒氣築痛青皮去白肉桂去皮乾薑炮各一錢五分茴香炒南木香益智仁川烏炮各五分甘草炙少許右㕮咀每服四錢水一大盞鹽一捻煎七分空心服加味通心飲治腎與膀胱實熱小腸氣痛小腸不通瞿麥穗木通去皮莭梔子去殼黃芩連翹甘草枳殼去瓤川楝子去核各等分右為散每服五錢水一盞半燈心二十莖車前草五莖同煎空心溫服玉藥丹治小腸氣疼痛不可忍欲絶青木香七錢半茴香蝎梢陽起石􅗠砂湯化去土火氣令淨硫黃研細各半兩白礬生二錢半黑附子炮去皮臍一兩右同為末酒糊丸如梧桐子大於疾發時稱新綿二錢半燒灰與藥十五丸同研熱酒調下甚者加至二十丸即時氣定不上攻須臾即愈久有此疾日服十丸半月後小便中當有如桃膠即疾根除矣吳茱萸散治小腸疝氣牽引臍腹疼痛腰曲不伸吳茱萸湯洗炒過半兩楝實四十九枚沉香半兩巴豆半兩雜令微破三味同炒後入棟實黃焦色去巴豆茱萸不用將楝實去核用木香馬藺花蘹香子炒各一分右除巴豆茱萸不用外搗羅為散每服二錢炒蔥酒調下空心夜臥發時服木香丸治小腸受寒氣控睪牽痛木香一兩石南肉蓯蓉酒浸切焙别為末菖蒲牛膝酒浸切焙别為末蘹香子炒棟實炒各二兩右除蓯蓉牛膝二味别作末外搗羅以酒三升熬蓯蓉牛膝成膏和藥丸如梧桐子大每服三十丸空心食前以紙裹蔥白一寸煨熟溫細嚼溫酒下蘹香子丸治小腸受邪痛引小腹蘹香子炒蓽澄茄川棟子炒各一兩木香一兩葫蘆巴青皮各三錢半檳榔一錢半右為末酒糊丸如梧桐子大四十丸蔥酒任下二茱丸出華陀中方專治小腸氣痛石吳茱萸各一兩金鈴子取肉并皮一兩青皮去瓤船上茴香馬藺花三味各等分右逐味於銀銚內炒令香為末酒糊丸如梧桐子大每疾作鹽酒下三五十丸年久不瘥者五七服可除根本七珍丹治小腸疝氣一疾下部冷疾木香知母焙小茴香鹽炒陳皮去白枳殼去瓤川楝子甘草右等分為末煉蜜丸如梧桐子大每服三十五丸空心鹽酒下木香散治小腸受邪控睪痛牽木香馬藺花各半兩棟實巴豆各三十枚去皮同楝石炒候黑色去巴豆用棟實右除巴豆不用外搗研為細散每服二錢煎蔥酒調下鹽湯亦可空心食前服金鈴丸出華陀中方治小腸氣立愈黑牽牛青皮去白良薑各等分川楝子半兩舶上茴香半兩玄胡索一兩右為末生薑自然汁煮麵糊丸如梧桐子大硃砂為衣每服三十丸燒綿灰浸酒下不拘時喝起丸出瑞竹堂方專治小腸氣又腰痛蓽薢杜仲酥炒去絲葫蘆巴生芝麻炒破故紙炒小茴香已上各一兩鹽水浸一宿胡桃仁三兩湯去皮右將胡桃為末同前五味藥末丸如梧桐子大每服三五十丸空心鹽湯鹽酒亦可沉附湯出直指方治腎虛無陽小腸氣痛頭額小腹外腎時冷兼治濕證附子生一錢沉香辣桂蓽澄茄甘草炙各半錢香附子一錢炒右銼為一服薑七片空心煎服川楝散治膀胱小腸氣痛臍下撮疼上衝心腹面色痿黃腳下隱痛四肢倦怠不思飲食夜多旋溺外腎瘙癢方見本門詣疝類茴香楝實丸一名控引皋丸出衛生寶鑑治控睪證主小腸甲乙經云小腸病結於腰上而不下痛衝心肺所系也茴香炒楝實麩炒去核石茱萸陳皮馬藺花醋炒各一兩芫花醋炒半兩右為末醋麵和丸如梧桐子大每服三十丸至二十丸空心酒溫下食前服大蒜丸治一切小腸氣腎囊大川楝子取肉炒破故紙炒黑牽牛炒熟各二兩玄胡索一兩半青木香南木香練細青香右用大蒜每瓣內夾巴豆一粒火內煨熱大蒜令香去皮巴豆只用大蒜料藥用大蒜者十頭擂細如前藥末丸如梧桐子大每服四五十丸用鹽酒送下空心食前木香散出百選方治小腸氣方木香青皮去白玄胡索土茴香炒馬樣兒新瓦上焙乾右等分為末每服炒二錢空心溫酒調服忌滯氣食物如豆腐雞鴨子濕麵薺菜病愈任意食無害楝實散治腹受邪控而不睪上而不下疼川楝子四兩切作片巴豆甘草各一兩青鹽二錢半小茴香二錢半炒右將楝實與巴豆一處炒川楝黃色不用巴豆前三味一處為末一分溫酒空心調下治小腸氣或走氣陳皮蒼术破故紙木通牽牛右等分水二盞煎一盞去渣再煎如或走氣去故紙枳殼一同煎空心冷服立愈祕傳茴香湯出德生堂經驗方治男子小腸心腹痛下元久冷婦人血氣刺痛等疾早辰常服大妙蒼术二斤半甘草炙十二兩茴香炒一斤半乾薑十二兩鹽七兩後和藥再碾右為末每服一匙沸湯調服不拘時兼治小兒脾疳泄㵼一捻金散出朱氏集驗方治奔肫小腸諸氣痛不可忍玄胡索川楝子炒全蝎炒舶上茴香炒各一兩附子半兩去皮臍生用右為末每服二錢痛作時熱酒調下甚者不過再服神效五復丸治小腸奔豚疝氣膀胱偏墜青木香丸海藻丸消疝丸內消丸安腎丸右前藥以母子大班貓七箇小者十四箇去翅頭足與丸子藥同炒以藥微裂為度承熱為丸合封一日夜去班貓用復元通氣散空心鹽湯或酒調送丸子五十丸立效立安丸治小腸氣攻腹作疼川椒淡豆豉各一分七十粒巴豆十粒去殼油班貓六箇去翅右為末醋糊為餅子用米醋一碗將餅子煮醋乾搜和丸如菉豆大每服十五丸空心冷鹽水下更量虛實加減丸𢾗服治小腸氣痛不可忍者出醫大成烏藥搗碎用酒浸一宿髙良薑茴香船上者各一兩青皮去皮二兩右為末每服二錢偶發時熱酒調下又方杏仁一兩船上茴香一兩蔥白焙乾兩同為末酒調嚼胡桃咽下治小腸氣痛撞腹靣青唇黑欲死者出本事方木香一兩茵陳芫花甘遂各等分右為末每服二錢水一盞煎七分去滓溫服服此藥後應犯甘草藥皆不得喫恐與甘遂相反故也其藥甚妙緣處方理屢有效驗又方出本事方川楝子茴香川烏炮破故紙各等分各炒令黃色右焙乾為末酒糊丸如梧桐子大每服二十丸鹽湯溫酒任下忌生冷動氣一切毒物沉香內消丸出德生堂經驗方治小腸疝氣隂囊腫大或左右偏腎結核疼痛難忍下元虛冷久而不愈者並主之沉香木香各半兩葫蘆巴酒浸小茴香炒各二兩右為細末酒糊為丸如梧桐子大每服五十丸空心鹽酒鹽湯任下治小腸下部氣疾藥力雖微其功甚大大茴香全蝎胡椒吳茱萸分停右為末每服一錢食前溫酒忌熱物治小腸氣八角茴香四兩川椒金鈴子蟬蛻各四兩右為末酒糊為丸每服三四十丸鹽湯送下治小腸氣疾青木香丸石刻安腎丸走馬小茴香丸茱萸內消丸右四味各三貼用斑貓四十九箇去子翅足與前藥一爐炒微黃色去其班貓不用只用四味藥每早空心下五十丸鹽酒木香湯送香殼𣪚出宣明論治小腸氣臍腹攪痛急隂股中疼悶不省人事舶上茴香用鹽炒枳殼各一兩沒藥半兩右為末每服一錢溫酒下不拘時併二三服如神散出衛生家寶方治丈夫婦人小腸氣塊從小腸起至心膈間痛不可忍及口吐清水蛤粉五錢燒過甘草五錢乾葛一兩右為末每服二錢沸湯點服極妙治小腸氣出本事方木香一兩天南星良薑與天南星同用炒令赤色各五錢右為末每服二錢無灰酒一盞煎七分入鹽少許空心連滓熱服香蝎散出瑞竹堂方治小腸疝氣隂囊腫痛乳香蝎梢各一錢右為末每服一錢水一盞煎七分入鹽少許空心連滓熱服川楝茴香散一名金鈴散治小腸疝氣疼痛方見本門諸疝類治小腸氣出經驗良方全蝎梢七箇於懷中頓時候暖為末玄胡索五錢川楝子五箇燒存性右為末以酒調下半飢飽服之即愈失笑散出直指方治小腸氣痛及諸血痛心腹膠痛婦人血痛欲死十餘日百藥不驗川五靈脂蒲黃隔紙微炒加延胡索各等分右為末每服二錢酒半盞水半盞煎七分食前服血痛臨熟入醋少許一方止用釃酒一合熬藥成膏水一盞煎七分熱呷服或不加延胡索神砂一粒丹治一切厥心痛小腸膀胱痛不可止者附子鬱金薑紅各一兩右為末醋麵和丸如酸棗大以硃砂為衣每服一丸男子酒下婦人醋湯下服罷又服散子治小腸下部氣疾藥力雖微其功甚大右用山果子只紅糖毬不拘多少連核晒乾為末却加入大茴香半斤小茴香半斤三味為細末用好酒調服之如腰痛者加胡桃肉細嚼送下立效小茴香丸治小腸氣腹痛茴香胡椒等分右為末酒糊丸如梧桐子大每服五十丸空心溫酒下治小腸氣痛全蝎茴香炒黃各一兩右為末醋糊丸如梧桐子大如發時每服五七十丸溫酒下食前治小腸氣連臍腹脅肋疼痛川烏頭一兩炮製去皮臍銼如麥豆大川楝子半兩搗碎右和勻每服二錢水酒各半盞煎七分去滓溫服治小腸氣枳殼麵炒去瓤舶上茴香各一兩右為末每服三錢發時空心熱酒調下治逺年小腸氣醫不瘥方硫黃舶上茴香炒令黃不可犯銅鐵器各等分右為末每服五錢用熱酒調空心服永除根木香散茱萸揀四箇桃仁一百二十粒右同炒香熱去茱萸不用只將桃仁去皮尖蔥白十寸細銼沙盆內爛研銀銚炒香熟用酒二盞浸作一服熱喫汗便解奪命丹治逺年日近小腸疝氣偏墜搐痛臍下脹痛以致悶及外腎腫硬日漸滋長隂間濕癢㧓之成瘡癬並皆治之一名星斗丸吳茱萸一斤去枝梗淨四兩酒浸四兩醋浸四兩鹽湯浸四兩童子小便浸各一宿焙乾澤㵼二兩去灰土切作粗片酒浸一宿右為末酒糊丸如梧桐子大每服五十丸空心鹽酒或鹽湯下飛黃丹治小腸疝氣疼痛右用帶毛雀兒取去腸肚將金絲礬細研裝於雀兒肚腹內滿縫合用桑柴灰緩煨燒成灰緩為細末空心時用無灰酒調下任惡心入鹽少許年逺者每服二枚近者只一枚纍效治小腸氣疝氣疾小茴香二兩蔥白三兩細切一處炒乾用破故紙二兩澤㵼一兩新瓦上一處不用澤㵼右為末每服溫酒調下食前服治小腸走氣作痛上氣衝心便墜搐痛小茴香一兩斑貓七箇右將班貓同茴香炒黃色却不用班貓將茴香為細末入鹽炒酒送下青木香丸全蝎延胡丸治小腸氣痛最良此人多患昔有賣此藥者其門如市延胡索用鹽炒一兩全蝎日乾生用一分右為末每服一錢食前溫酒調下亦治心痛不飢飽醋湯下一名奪命散二聖丸治丈夫元氣小腸氣撮痛者右用乾漆一兩為末濕漆一兩先將濕漆入銚子內煎熬如一食飯間巳來住火與乾漆末一處拌和丸如半皂策子大每服一丸溫酒吞下無時如元氣小腸膀胱氣痛牙關緊急者開牙關溫酒化一丸灌下之必安怕漆人不可服龍麝散治小腸氣右用錢子地龍一箇揩去上面泥土用麝香當門子與地龍等分為細末平分兩服用無灰酒調下治小腸氣八角茴香茱萸等分右用鹽少許將香萸炒令冷空心嚼細溫酒送下通聖散出衛生家寶方治小腸氣痛不可忍桃仁六兩去皮尖􅗠砂一兩五錢去砂石研右生為末每服一錢煎生蔥酒調下一服立止更不再發治小腸氣右用胡椒四十九粒巴豆三粒同炒熱去巴豆不用若如小腸氣發時將胡椒一粒空心細嚼熱湯送下又方五苓散一貼茴香一撮約一錢重右件用連根蔥一莖燈心三十莖水一盞半煎七分小便過即效又加些鹽下導利散出海上名方治小腸氣痛不可忍者右每服用五苓散一貼燈心三十莖酒兩盞煎一盞稍放溫服之用被蓋臥小便過立效加連鬚蔥三頭煎治小腸氣出海上名方右用酒蒸五苓散入少許燈心下青木香丸一百粒治小腸氣疼出百一選方右用曾煆金銀甘鍋子捶碎碾令極細每服一錢用熱酒調下空心服又方出百一選方治至危殆者灌下即愈右用海水團用炭火燒存性灰熱酒調下如無烏賊魚用腸亦可各半散出十便良方治小腸氣小便不利右以室女或婦人退髮燒灰茴香為末右二件各炒一錢以無灰熱酒調下如神名五斗安神各半散又方出百一選方右用肥皂獨賢者四十九箇燒存性為細末再研如麵粉用陳米飯爛研如膏子丸如梧桐子大每服四十丸用茴香煎湯下一方治疝氣細末熱酒調下去鈴丸治疝氣小腸氣常服安腎實脾右用杜茴香一斤以老生薑二斤取自然汁浸茴香至一夜約薑汁盡入茴香以好青鹽二兩同炒赤隨取出焙燥碾羅為末無灰酒煮糊丸如梧桐子大每日空心食前服三十丸溫酒米飲任下此藥專實脾胃蓋以其有鹽引入下部遂大治小腸疝氣服之屢屢有效尋常治疝氣藥多是踈導久而未有不為害者惟此藥用薑汁專一發散而無踈導之害所以為妙也郭廷圭知縣云舊苦此疾歲不下五七發服此藥一料病根遂除今已十五六年不作治小腸氣久年痼疾一服見效出仁存方右用蘿子一兩以大斑貓七箇去頭翅足入內同炒焙令香以紙裹定候冷去斑貓不用為末酒糊丸約如梧桐子大每服十丸炒薑湯吞下食前木賊散出瑞竹堂方治小腸疝氣木賊不拘多少去節先用鍋子燒熱下木賊炒右為末空心熱酒調下沸湯調服亦可星斗丸一名吳茱萸丸出朱氏治小腸疝氣痛吳茱萸二兩酒浸二兩醋浸二兩童子小便浸二兩米泔浸或鹽炒右藥分作四處浸一日至二日漉出晒乾碾為細末用生蘿蔔剖開皮作蓋子取肉空將此藥末粧在內蓋了用線扎定甑內蒸熟令爛同和為丸空心溫酒下鹽湯亦得大有神效如遇無蘿蔔時以澤㵼代之用一兩茱萸四錢一處和丸一方煮麵糊為丸空心下治小腸疝氣腫不止鼠粘子不拘多少銀器內炒黃右為末每服五錢熱酒調下揉動煨棗方出直指方治小腸氣痛不可忍右用斑貓一箇去頭足并翅入棗中線繫濕紙包置於慢火中煨令香熟去斑貓空服食棗以桂心蓽澄茄共煎湯送下葫蘆巴散出直指方治小腸攻刺右用葫蘆巴一兩炒為末每服二錢茴香炒紫後用熱酒沃蓋定取酒調下治小腸氣右用血師一兩米醋一升以火燒血師通赤淬入滴醋中以淬竭為度搗羅麵用湯調下一大錢即瘥如神矣血師一名代赭石立神丹治小腸氣右用香附子不拘多少去毛炒再去毛用無灰酒煮好盡銼碎為細末薄酒糊丸如梧桐子大每服二十餘丸或三十丸空心日午鹽湯或酒下蔥白尉方治小腸脹小便難不急治則殺人方見小便淋瀝門小便不通類芫花方治小腸氣攻小腹疼痛芫花醋炒焦木通銼青橘皮去白切胡椒大黃煨銼辣桂去粗皮各半兩右為末酒煮麵糊丸如小豆大丹砂末為衣每服十丸至十五丸空心食前生薑熱酒服三茱丸出危氏方治小腸氣外腎腫痛服之病自泄氣中出川楝子一兩用斑貓十四箇好者摘去翅嘴同炒赤色去斑貓黑牽牛一兩炒熟青皮青鹽茴香微炒各三兩山茱萸吳茱萸食茱萸各二兩破故紙一兩七錢炒香熟右為末醋麵糊丸如梧桐子大每服三五十丸先喫炒桃仁十五箇以酒或鹽湯下空心食前炒茴香酒下亦得周仲舉苦腎癰服此藥得效巴戟散治小腸疝氣巴戟天去心棟實取肉麵炒木香蘹香子炒附子炮製去皮臍各一兩右為散每服二錢空心溫酒調下棟實散同前棟實取肉麵炒蘹香子炒荆三稜煨銼蓬莪荗煨銼各等分右為散每服一錢蔥調下治小腸氣川楝子一對麵糊燒沒藥二錢乳香八角茴香舶上茴香各三錢當歸二錢右㕮咀好酒煎空心服又方紅曲末菴䕡末香附末橘核末右件熱酒調空心服降真丸治小腸氣發動附子去皮臍生青橘皮湯浸去白木香芎藭各等分右為末濃糯米飲丸如梧桐子大每服七丸生薑湯下日三白术散治小腸氣白术棟實取肉各二兩青鹽一分右細銼慢火炒黑色留性搗羅為散每服二錢熱酒調日三治小腸氣由小腸內疼痛忽衝入兩肋忽攻腰背小便黃赤忽即不通大腑祕熱其痛難忍悶絶欲死宜喫此方一名桃仁膏出護命方舶上茴香一兩五錢炒桃仁一兩炒熱去皮尖并雙仁者右先杵茴香一味為細末却入桃仁在內重杵令細爛每服三錢熱暖蔥酒調下和滓非時喫氣壯盛者服三錢救痛散出衛生家寶方治小腸疝氣築心疼痛不可忍者木香煨肉豆蔻麵裹煨各五錢荆三稜煨茴香炒馬藺花醋炒金鈴子去核稱各一兩右為末每服一大錢熱酒調下如痛時服之立效鱉甲煎丸出衛生家寶方治小腸氣發不可忍并急淋此藥極有應驗鱉甲三兩用水浸三日三夜去裙米醋蘸炙令脆為末桃仁一百粒湯去皮尖炒黃細研硇砂湯化去石煎成霜稱三分已上三味用釅醋四升炒盆中慢火熬成膏更入後藥厚朴去皮生薑汁炙陳皮去白神麯炒肉桂去皮各一兩肉豆䓻四箇檳榔二兩柴胡去苗五錢右後七味為末再溫前膏和丸桐子大每服二十丸至三十丸以細切生蔥熱酒下忌生冷油膩濕麵抵聖碧霞丹出衛生家寶方治男子小腸疝氣諸藥不效者茴香炒川楝子去皮核全蝎糯米炒去足稍刺北亭去石銅緑研阿魏研青皮硫黃玄胡索葫蘆巴炒右等分為末煨蔥研為丸菉豆大每服七丸煨蔥熱酒下立效附子散出衛生家寶方治小腸疝氣絶妙附子一兩炮去皮尖臍胡椒半兩川楝子十箇炒去核舶上茴香馬藺花半兩酒半盞煮乾右件為末空心溫酒調下一錢服軟痃丸治丈夫小腸氣攻刺及脅肋下成塊堅硬不消婦人本血刺血塊攻疰衝心疼痛不可忍者􅗠砂一兩五錢飛研白礬三分飛研硫黃一兩飛研細硃砂一兩飛研細陽起石一兩用冷水浸七日出研麵細當歸五錢附子二兩生去皮臍茴香一兩木香三分煨丁香一分右為末酒糊丸如菉豆大每服三五丸煨生薑溫酒下神仙導氣散治小腸氣發作疼痛不可忍者并腳氣等疾甘遂二兩五錢木香一兩五錢銼碎右件入水二升一處文武火熬令乾為細末每服二錢用豬腰子一隻入藥末在內以濕紙裹煨熱細嚼溫米飲下臨卧一更量虛實加減忌甘草三日橘核𣪚治寒濕腰痛小腸氣壯筋骨暖下元五靈脂去砂石用醋少許炒乾延胡索破故紙茴香鹽炒黃色菴閭草去梗用生黑牽牛生用橘核已上七味各一兩棠毬子四兩生用俗名為山果子川楝子去核五錢研生用右件為細末每服二錢熱酒調下不拘時候如聖散治小腸疝氣發作無時疼莫能忍牛膝一兩酒浸一宿焙乾肉蓯蓉一兩酒浸一宿焙乾葫蘆巴五錢巴戟五錢去心南木香五錢不見火日晒乾破故紙五錢微炒桂心五錢不見火乾山藥五錢蓽澄茄五錢川附子一兩炮去皮臍切作骰子塊川烏頭五錢炮去皮尖切作骰子塊黑牽牛五錢蚖青三十個川楝子一兩每個作四片酒煮數十沸焙乾右將川楝子川附子川烏頭同黑牽牛蚖青於銀器中慢火炒令黃色火不可緊去牽牛蚖青只將附子烏頭川楝同前藥為細末酒糊為丸如桐子大每服五十丸至百丸空心溫酒或鹽湯下華亭人朱其姓為吳興稅官日傳此方云妙凡有氣疾皆能治之木香飲治小腸氣痛詩訣曰小腸氣痛腰先曲無淚呌啼空眼哭口乾腳冷上唇乾額上汗珠濕漉漉川楝子十個巴豆七粒炒令土黃色去巴豆入茴香五錢玄胡索五錢南木香二錢史君子三錢右為末米飲調下大人小兒皆用髮灰酒治小腸切痛屬小腸病元豐中丞相王邵公病小腹痛不止聖旨宣差太醫攻治終是不效丸藥之至熟硫黃附子五夜叉丸用之不瘥駙馬張都尉令取婦人油頭髮燒作灰酒服二錢即時痛除尋氣丸治小腸疝氣偏墜疼痛甘遂二錢炒石燕子䳄雄各一箇斑貓三箇去翅足炒右為末酒煮麵糊為丸如菉豆大每服三丸麝香溫酒送下空心食前臨卧服忌熱物一時忌甘草一日神效胡桃酒治小腸氣及婦人外癰右以好胡桃一枚火內燒成炭細研以薄酒熱調下絶妙胡桃丸治小腸氣胡桃肉浸去皮研核焙為末破故紙大棗煮去皮核焙二味為末右件等分拌勻以蜜和丸如梧桐子大食前溫酒下四五十丸一方為散每服二錢酒調下食前服普濟方卷二百四十九
