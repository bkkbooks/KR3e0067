參各三分蒴藋切一斤石南秦艽川升麻茵芋白蒺䔧蛇床子白礬枳殼各一兩右細銼都以水七斗煎至五斗去滓於溫室中洗浴令汗出避風冷秦艽丸出聖濟總録治肺風熱皮膚瘡癬瘙癢秦艽烏蛇酒浸去皮骨炙苦參枳殼去瓤麩炒升麻黃芩去黑心防風去義各一兩半惡實二合大黃銼炒二兩右為細末煉蜜和丸如梧桐子大每服三十丸食後以溫漿水送下藁本散出聖濟總録治遍身瘙癢如蟲行藁本去苗土白花蛇酒浸去皮骨炙各三分人參三分枳殼去穰麩炒防風去義葳靈仙各半兩防己一分右為細散每服一錢以食後溫酒或荆芥湯下天麻丸出聖濟總録治風客皮膚瘙癢麻痺天麻附子炮製去皮臍芎藭白附子生用烏藥各一兩荆芥穗八兩龍腦别研麝香别研各一錢右除别研外為細末拌勻煉蜜丸雞頭大每服一丸空心臨卧溫酒嚼下治風熱皮膚瘙癢出聖惠方白术二兩蒴藋黃連二兩白礬半兩黃芩二兩細辛一兩芎藭一兩茵芋一兩右件藥細銼以水二斗煮取一斗去滓旋旋分暖二升洗之日二三莽草湯出聖濟總録治風皮膚􅍙麻疼痛瘙癢淋洗方莽草藁本去土桔梗去蘆炒地榆穀精草枳殼去穰麩炒生乾地黃洗切焙各一兩蜂窠一枚大者細切右㕮咀每用三兩水一斗煎至八分乘熱淋患處天麻散出聖惠方治風瘙身體無處不癢或生瘡腫天麻防風去蘆白殭蠶微炒凌霄花微炒躑躅微炒各半兩枳殼麩炒微黃去穰茺蔚子各三兩白蒺䔧一兩微炒去刺右為細散每於食前荆芥湯調下二錢烏蛇散出聖惠方治風熱客於皮膚遍身瘙癢烏蛇二兩酒浸去皮骨微炙玄參秦艽去苗赤箭各一兩乾蝎微炒麻黃去根節豬牙皂莢炙黃枳殼麩炒微黃去穰各半兩右細羅為散每服不計時候以溫酒調下二錢丹參散出聖濟總録治風瘙癢搔之成瘡丹參苦參升麻各一兩黃芩去黑心防風去義各半兩枳殼去穰麩炒烏頭炮製去皮臍各一兩右為細末煉蜜為丸如梧桐子大每服三十丸食後溫漿水下防風湯出聖濟總録治風瘙癢如蟲行或麻痺不仁淋洗方防風去義益母草苦參各三兩蒺䔧子炒五兩荆芥穗蔓荆實各二兩枳殼去穰麩炒二兩右㕮咀每用三兩水一斗煎至八升乘熱淋洗患處療舉體痛癢如蟲行齧齒上癢時搔則皮脫作瘡千金方蒺䔧三升碎蛇床子二升茺蔚子一升防風五兩大戟一斤大黃二兩礬石三兩熬右㕮咀以酒四升水七升煮取四升去滓內礬石三上火燒用帛拭身上差止一方無大黃風瘙粉方出聖惠方治風瘙癢皮膚生㾦㿔搔之成瘡芎藭白芷麻黃根各四兩藿香三兩䔧蘆二兩雷丸半斤篩粉四升右合和常用芒硝湯拭疹上兼用粉身葳靈仙散出聖惠方治脾肺風毒攻皮膚瘙癢或生瘡癬葳靈仙去土防風去義羌活去蘆甘草炙各一兩紫參半兩荆芥穗一分右為細散每服二錢以蜜湯調下不拘時服天麻散出聖濟總録治熱毒風攻遍體瘙癢癮疹皮膚􅍙痺肢節疼痛大腸不利天麻防風去義羌活去蘆甘菊花各二兩甘草炙銼一兩杏仁去皮尖雙仁炒令黃二兩右為細散每服三錢以空心蜜酒調下日一再服天門冬丸出聖濟總録治風熱皮膚瘙癢病丙穩禾疹生瘡如水疥粟粒方見風㾦㿔類拓洗方出千金方治風癢腫瘡癢在頭面大黃芒硝各四兩黃連六分莽草二分一作甘草二兩黃芩八分蒺䔧子三合右㕮咀以水七升煮取三升去滓下硝以帛染拓洗日一度勿令近日五白散出聖濟總録治皮膚風癢晝夜不止白附子炮白殭蠶炒白蒺䔧炒白鮮皮各一兩白花蛇酒浸去皮骨炙三兩右為細散每服三錢以空心臨卧溫酒調下四生丸出聖濟總録治皮膚風癢瘡癬􅍙麻冷脾熱毒癰癤草烏頭半兩白殭蠶炒苦參黑牽牛各一兩並生用右為細末酒煮麵糊丸如梧桐子大每服十五丸溫酒下日三服枳殼散出聖濟總録治風皮膚瘙癢麻痺枳殼去穰麩炒二兩苦參蒺䔧子炒去角蔓荆實各一兩右為細散每服二錢以溫酒調下不拘時荆芥散出聖濟總録治風瘙癢搔之成瘡荆芥穗麻黃去根節湯浸煮掠去沫焙乾羌活去蘆獨活去蘆各等分右為細散每服二錢臘茶或溫酒調下食後臨卧服治風瘙癢不可忍者方出聖惠方烏蛇二兩酒浸去皮骨炙微黃枳殼三分麩炒黃去穰乾荷葉半兩右為細散每服不計時候用溫蜜酒調下二錢苦參丸出風科集驗方治肺風皮膚瘙癢或生癮疹疥癬寇宗奭云有人遍身熱細疹癢痛不可忍者連胸脛臍腹及近隱皆然涎疾亦多夜不得睡苦參一斤皂莢去皮並子捶碎二斤以水一斗浸揉取濃汁濾去滓熬成膏右搗苦參為細末皂莢膏和丸如梧桐子大每服三十丸荆芥薄荷酒下一方無荆芥薄荷酒下治遍身風熱細疹癢痛雄黃丸治風身體如蟲行方方見大風癩病類蟬蛻方肘後方治風客皮膚瘙癢不止蟬蛻薄荷葉各等分右為末酒調一錢每日三服一方有蜂房無薄荷葉枳殼湯出聖濟總録治風瘙癢用枳殼去瓤麩炒三兩粗搗篩每服三錢以水一盞煎至七分去滓溫服茱萸方出肘後方治患風瘙癢痛方用茱萸三升清酒五升和煮取汁一升半去滓以汁暖洗一方治風瘙癮疹用帛染汁拭病上一方治皮肉癢痛加水五升依前和煮微暖洗之立止治風癢皮中風虛出千金方枳實三升松葉切一升獨活蓯蓉黃耆秦艽各四兩丹參蒴藋各五兩右㕮咀以酒二斗浸六宿每服二合日二稍加之治中風煩熱皮膚瘙癢出聖惠方見本門風熱類治風腫癢出本草以栁枝皮煮湯洗之治風瘙皮肌惡癢出本草用六英煎湯入少酒浴之良治風瘙皮膚癢出本草以及己煎汁浸洗除風癢出本草以接骨木作湯浴之治風癢出本草以蒺䔧葉煮水浴之治風瘙疥癢出本草以半天河水溫洗之半天河水在槐樹間者治遍身風癢生瘡疥出本草以茵陳不計多少煮濃汁洗之立瘥八味散出聖濟總録治遍身瘡疥皮破肉痛或瘙癢膿水塗方方見諸瘡腫門諸疥類普濟方卷一百七
