body:
  text: 普濟方卷七明周王朱橚撰運氣圖少隂君火司天陽明燥金在泉中見太宫土運歲土太過氣化運行先天天地之氣上見少隂左間太隂右間厥隂故天政布其氣明下見陽明左間太陽右間少陽故地氣肅而其令切交司之氣寒交暑天地之氣熱加燥雲馳雨府濕化迺行時雨迺降金火合德上應熒惑太白其穀丹水火寒熱持於氣交而為病始熱病生於上清病生於下寒熱互作而爭於中民病欬喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰病腹大嗌乾腫上迺歲化之常候其氣至與不至然後可名其病是歲火為天氣金為地氣火能勝金天氣盈地氣虚然中見土運天氣生運運生地氣二氣相得地氣雖虛邪勝亦微天氣既盈化源為實當於年前大寒初先取化源使之適平取化源者平火氣也歲宜食白丹之穀以全真氣食間氣之穀以辟虚邪醎以耎之調其上甚則以苦發之以酸收之而安其下甚則以苦泄之運同地氣當以温熱化歲半之前天氣少隂主之少隂之化本熱而標隂當是時本標之化應寒熱相半無或偏勝者天政之平地或熱熱所勝沸熱火行其政民病胸中煩熱嗌乾右胠滿皮膚痛寒熱欬喘大雨且至嘔血血泄鼽衂嚏嘔溺色變甚則瘡瘍胕腫肩背臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘􅠲病本于肺診其尺澤脈絶者死不治其法平以醎寒佐以苦甘以酸收之歲半之後地氣陽明主之其化不從標本而從乎太隂之中氣當其時燥濕兼行而無偏勝者陽明之化也或燥臥淫所勝則霜霧清瞑民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾而塵身無膏澤足外反熱其法治以苦温佐以甘辛以苦下之運土大過是謂敦阜之紀雨濕流行腎水受邪民病腹痛清厥意不樂體重煩寃甚則肌肉萎足痿不收行善瘈脚下痛飲發中滿食減四肢不舉變生得位藏氣伏化氣獨治之泉涌河衍涸澤生魚風雨大至土潰鱗見于陸病腹滿溏泄腸鳴下甚而太谿絶者死不治其治宜以苦熱所謂歲寒之藥食宜也初之氣始于癸亥歲十二月中氣大寒日寅初終於是年二月中氣春分日子初凡六十日八十七刻半主位太角水客氣太陽水中見太宫充之風寒濕三氣奉少隂之政而行春令地氣遷燥將去寒始遷蟄復藏水廼氷霜復降風廼至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍且治太陽之客以苦補之以醎㵼之以苦堅之以辛潤之開發腠理致津液通氣也食丹穀以全真氣食稷以辟虛邪雖有寒邪不能為害二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣厥隂木同德中見土運以奉少隂行舒榮之化時令至此陽氣布風迺行春氣以正萬物應榮寒氣時至民迺和其病淋目瞑赤氣鬱於上而熱宜治厥隂之客以辛補之以酸㵼之以甘緩之食丹穀以全真氣食稻以辟虛邪雖有風邪不能為害三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位少徵火客氣少隂火中見土運天政之所布正時令至此大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜治少隂之客以醎補之以甘㵼之以酸收之食丹穀以全真氣食豆辟虛邪雖有邪熱不能為害四之氣自大暑日酉正至秋分日未正凡六十日有奇主位太宫土客氣太隂土運與氣同名為司氣溽暑至大雨時行寒熱互作民病寒熱嗌乾黄癉鼽衂飲發宜治太隂之客以甘補之以苦㵼之以甘緩之食白穀以全真氣食麻以辟虛邪雖有濕邪不能為害五之氣自秋分日申初至小雪日午初六十日有奇主位少商金客氣少陽火中見土運客火運事畏火臨暑反至陽迺化物迺生榮民迺康其病温宜治少陽之客以醎補之以甘㵼之以醎軟之食白穀以全真氣食豆以辟虛邪雖有火邪不能為害終之氣自小雪日午正至大雪日辰正六十日有奇主位太羽水客氣陽明金中見土運土能生金金能生水三氣相得而行順化燥令之行餘火内格民病腫於上欬喘甚則血溢寒氣數舉則霿霧翳病生皮腠内舎於脅下連小腹而作寒中宜治陽明之客以酸補之以辛潤之以苦㵼之食白穀以全真氣食黍以辟虛雖有燥邪不能為害然初氣終三氣天氣主之勝之常也四氣盡終地氣主之復之常也若歲半之前司天少隂之氣勝者必有太陽之復若在泉陽明之氣勝者必有少陽之復其復皆在歲半之後觀其氣勝之早晚以騐復氣之遲速各以勝復之法治之有勝則復無勝則已太隂濕土司天太陽寒水在泉中見少商金運歲運不及運化運行後天上見太隂左間少陽右間少隂故地氣上騰隂專其政而其政肅下見太陽左間厥隂右間陽明故天氣下降陽氣退辟而其令寂大風時起原野昏霧白埃四起雲奔南極寒雨數至寒濕合德黄黒埃昏流行氣交上應鎮星辰星其穀𤣥間穀命太角者物成於差夏有餘宜髙不及宜下有餘宜晚不及宜早土之利氣之化民氣亦從之故隂凝於上寒積於下寒水勝火則有氷雹陽光不治殺氣迺行民病寒濕腹滿身腫憤胕腫痞逆寒厥拘急是歲土為天氣水為地氣土能勝水天氣盈地氣虛然中見金運天氣生運運生地氣三氣相得而行順化邪氣亦為司天之氣為有餘天氣之盈當取化源之實者平土氣也歲宜食黅𤣥之穀以全其真食間氣之穀以保其精以苦熱治其上以甘熱治其下以酸和調其中所以燥之温之甚則發之泄之不發不泄則濕氣外溢肉潰皮折而水血交流必贊其陽火令禦甚寒少商之運與寒化同宜以熱化此藥食宜也然太隂司天之氣標既同其化從本其氣常主歲半之前當其時雨以時至者天政之和而為雨化若濕淫所勝即沈隂且布雨變枯槁民病胕腫骨痛隂痺隂痺者按之不得腰脊頭項痛時弦大便難隂氣不用飢不欲食欬唾則有血心如懸病本于腎診其足太谿脈絶者死不治其治平以苦熱佐以酸辛以苦燥之以淡泄之歲半之後地氣太隂主之其化從本從標當是之時寒温適中者本標之化皆應也若寒淫於内則凝肅慘慄民病少腹控睾引腰脊上衝心痛血見嗌痛領腫其法治以甘熱佐以苦辛以醎㵼之以辛潤之以苦堅之金運不及是謂從革之紀其運凉熱寒夏有光顯鬱蒸之令則冬有嚴凝整肅之應若夏有炎爍燔燎之變則秋有氷雹霜雪之復火氣勝則炎火迺行民病肩背膂重鼽嚏血便主下收氣迺後寒氣復則寒雨暴至民病隂厥且格陽反上行頭腦户痛延及𩕄頂發熱口瘡甚則心痛初氣始於甲子年大寒日已初終於乙丑年春分日卯初凡六十日八十七刻半主位太角木客氣厥隂木中見金運風清同化上奉太隂而行春令時令至此地氣遷寒迺去春氣正風迺來生布萬物以榮民氣條舒風濕相薄雨迺後民病血溢筋絡拘強關節不利身重筋痿宜治厥隂之客以辛補之以酸㵼之以甘緩之食黅穀以全真氣食稻以保其精雖有風化莫能為邪二之氣凡六十日有竒主位少微火客氣少隂火中見金運歲金四及以少徴同又遇火當其位君火之氣務以德化故大火正物承化民迺和其病温癘火至逺近咸若濕蒸相摶雨迺時降法當治少隂之客以醎補之以甘㵼之以酸收之食黅穀以全其真食豆以保其精雖有火化莫能為邪三之氣自小滿日寅初至大暑時子初凡六十日有奇主位少徴火客氣太隂土中見金運天政布雨迺時降寒迺隨之民病身重胕腫腦腹滿宜治太隂之客以甘補之以苦㵼之以甘緩之食黅穀以全其真食麻以保其精雖有濕邪莫能為害四之氣自大暑日子正至秋分日戌正凡六十日有奇主位太宫土客氣少陽火中見金運地氣始騰天氣否隔氣寒風曉暮蒸熱相薄草木凝煙民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以醎補之以甘㵼之以醎耎之食𤣥穀以全其真食豆以補其精雖有火邪不能為害五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位少商金客氣陽明金中見金運金居金位與歲運同歲之司氣也是為素化金氣至此秋氣治慘令已行寒露下霜迺早降草木黄落寒氣及體民病皮勝君子所居宜以周密其法宜治陽明之客以酸補之以辛㵼之以苦泄之食𤣥穀以全其真食黍以保其精雖有司氣之凉莫能為邪是氣也藥食無犯司氣之凉則無害終之氣自小雪日酉正至大寒日未正凡六十日有奇主位太羽水客氣太陽水中見金運水居水位與金相得以行順化冬迺正故寒大舉濕大化霜迺清隂迺凝水堅氷陽光不治民感於寒則病關節禁固腰脽痛寒濕持於氣交而為疾病其治宜治太陽之客以苦補之以醎㵼之以苦堅之以辛潤之食𤣥穀以全其真食稷以保其精雖有寒化莫能為邪是氣之勝復各候其至若太隂氣勝厥隂必復之太陽氣勝太隂必復之其勝常在歲半之前其復常在歲半之後有勝則復無勝則否少陽相火司天厥隂風木在泉中見大羽水運歲水太過氣化運行先天相火在上左間陽明右間太隂故天氣正而其正嚴厥隂在下左間少隂右間太陽故地氣擾而其令撓風迺暴舉木偃沙飛炎火迺流隂行陽化雨迺時應火木同德上應熒惑歲星其穀丹蒼風熱慘布雲物沸騰太隂横流寒迺時至凉雨並起民病寒中外發瘡瘍内為泄滿聖人遇之和而不爭往復之作民病寒熱瘧泄聾鳴嘔吐上怫腫色變是歲陽為天氣隂為地氣天氣盈地氣虚當取火之化源然水運在中火氣自抑不必取也唯宜抑其運水則暴過不生苛疾不起歲宜以醎寒調上以辛温調下以醎温調中滲之泄之清之發之觀氣寒温以調其過運異風熱少用寒化食宜同法歲半之前相火主之相火之康其化從本火淫所勝則温氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黄赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍欬唾血煩心胸中熱甚則鼽衂病本於肺診在手天府之脈其法平以醎冷佐以苦甘以酸收之以苦發之以酸復之歲半之後厥隂主之厥隂之氣不從標本而從乎少陽之中氣當其時風從火化二氣得中其化和也若風淫于内地氣不明平野昧草迺早秀民病灑灑振寒善伸數欠心痛肢滿兩脇裏急飲食不下膈咽不通食則嘔腹脹善噫得後與氣怏然如衰身體皆重其法宜治以辛凉佐以苦甘以甘緩之以辛散之氣交之中水運統之太過之水紀曰流衍寒氣流行邪害心火民病身熱煩心躁悸隂厥上下中寒譫妄心痛寒氣早至上應辰星甚則腹大脛腫喘欬寢汗出憎風大雨至埃霜䑃鬱齊土化也診在手神門之脈其法調以醎温初之氣自乙丑年大寒日申初至是歲春分日午初凡六十日八十七刻半主位太角木客氣少隂火中見水運木火相加以奉司天少陽而行春令地氣遷風勝迺摇寒迺去候迺大温草木早榮寒來不殺温病迺起其病氣復於上血溢目赤欬逆頭痛血傷脇滿膚腠中瘡其法宜治少隂之客以鹹補之以甘㵼之以酸收之歲穀宜丹間穀宜豆二之氣自春分日午正至小滿日辰正凡六十日有奇主位少徵火客氣太隂土中見水運火土相加上見少陽火反鬱白埃四起雲趨雨府風不勝濕雨迺零民迺康其病熱鬱於上欬逆嘔吐瘡發於中胸嗌不利頭痛若昏潰膿瘡其法宜治太隂之客以甘補之以苦㵼之以甘緩之歳榖丹間榖麻三之氣自小滿日已初至大暑日卯初凡六十日有奇主位少徵火客氣少陽火中見火運火居火位下氣迺正天政布炎暑至少陽臨上雨迺涯民病熱中聾瞑血溢膿瘡欬嘔鼽衂嚏欠喉痺目赤善暴死不治其法宜治少陽之客以鹹補之以甘㵼之以鹹耎之嵗穀宜丹間穀宜豆四之氣自大暑日夘正至秋分日丑正凡六十日有竒主位太宫土客氣陽明金中見水運土金水相得其鬼神秋氣正涼迺至炎暑間化白露降民氣和平民病滿身重宜治陽明之客以酸補