霜寒上見太陽名為上雨故赫曦之紀日上羽與正徵同其收齊其病痓天氣形運歲運既鬱則火發待時其治宜發之經所謂火發之也初之氣自丁卯年大寒日寅正至是歲春分日子初凡六十日八十七刻半主位少角木客氣少陽火中見火運歲之司氣名曰丹化地氣遷氣迺大温草迺早榮民迺厲温病迺作身熱頭痛嘔吐肌腠瘡瘍宜治少陽之客以酸補之以甘㵼之以鹹耎之歲穀宜𤣥間穀冝豆是氣也用熱無犯以司氣熱故也所謂運熱逺熱者加此二之氣自春分日子正至小滿日戌正凡六十日有奇主位太徵火客氣陽明金火運統之火雖當位而陽明之清與天氣寒水相得故大凉反至民迺慘草迺遇寒火氣遂抑民病氣鬱中滿寒迺始宜治陽之客以酸補之以辛㵼之以苦泄之嵗穀宜𤣥間穀宜黍三之氣自小滿日亥初至大暑日酉初凡六十日有竒主位太徵火客氣太陽水中見火運火當其位天政布寒氣行雨迺降民病寒反熱中癰疽注下心熱瞀悶不治者死宜治太陽之客以苦補之以鹹㵼之以苦堅之以辛潤之嵗穀宜𤣥間穀宜稷四之氣自大暑日酉正至秋分日未正凡六十日有竒主位少宫土客氣厥隂木中見火運風濕交爭風化為雨迺長迺化迺成民病大熱少氣肌肉萎足痿注下赤白宜治厥隂之客以辛補之以酸㵼之以甘緩之嵗穀宜黅間穀宜稷五之氣自秋分日申初至小雪日午初凡六十日有竒主位太商金客氣少隂火中見火運氣與運同而君火不司氣化所謂居氣為灼化也時令至此陽復化草迺長迺化迺成民迺舒法宜調少隂之客以鹹補之以苦㵼之以酸收之嵗穀宜黅間穀宜豆終之氣自小雪日午正至大寒日辰正凡六十日有竒主位少羽水客氣太隂土中見火運土居水位地氣正濕令行隂凝太虚埃昏郊野民乃慘悽寒風以至反者孕迺死宜治太隂之客以甘補之以苦㵼之以甘緩之嵗穀宜黅間穀宜麻此治六氣之常也嵗半之前有勝氣者嵗半之後必有復氣水勝則太隂必復土勝則厥隂必復其治各依其勝復之法厥隂風木司天少陽相火在泉中見少宫土運歲土不及氣化運行後天卑監之紀上角與正角同諸同正歲氣化運行同天風行於上左間少隂右間太陽天氣擾而其政撓火行於下左間陽明右間太隂地氣正而其令速風生髙逺炎熱從之雲趨雨府濕化迺行風火同德上應歲星熒惑其穀蒼丹間穀言太商者其耗文角品羽風燥火熱勝復更作熱病行於下風病行於上風燥勝復形於中運同正角不資化源惟贊其運氣無使邪勝歲宜以辛凉調上醎寒調下以甘和調中歲半之前天氣厥隂主之厥隂所至為風府風淫所勝太虛埃昏雲物以擾寒生春氣流水不氷民病胃脘當心而痛上肢兩脇膈咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉蟄蟲不去病本于脾診其足衝陽脉絶者死不可治其法平以辛凉佐以苦甘以甘緩之以酸㵼之歲半之後地氣少陽主之少陽所至為炎暑火淫于内則𦦨明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便其法宜治以醎冷佐以苦辛以酸收之以苦發之土不及曰卑監之紀是謂減化化氣不令生政獨彰長氣整雨迺愆收氣平風寒並興草木榮美秀而不實成而粃也風化盛行四維有埃雲潤澤之化則春有鳴條皷折之政若四維發振拉飄騰之變則秋有肅殺霖霪之復飄揚而甚民病飱泄霍亂體重腹痛筋骨繇併肌肉瞤酸善怒藏氣舉事蟄蟲早附咸病咸中復則收政嚴峻名木蒼雕胸脇暴痛不引少腹善大强蟲食甘黄氣客於脾黅糓迺減民病食少失味蒼穀迺損是歲上臨厥隂木氣傷脾民病飱泄治以甘和調歲運也初之氣自戊辰年大寒日已初至是歲春分日卯初六十日八十七刻半位少角木客氣陽明金土運統之以奉厥隂之政而行春令金土交司清化行寒始肅殺氣方至民病寒於右之下其法宜治陽明之客以酸補之以辛㵼之以苦泄之歲穀宜蒼間穀宜黍則燥邪無害二之氣自春分日卯正至小滿日丑正凡六十日有竒主位太徵火客氣太陽水中見土運濕寒合徳以行舒榮之化寒不去華雪水氷殺氣施化霜迺降名草上焦寒雨數至陽復化民病熱於中其法宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歲榖宜蒼間榖宜稷則寒邪不能為害三之氣自小滿日寅初至大暑日子初凡六十日有竒主位太徵火客氣厥隂木中見土運木火同徳土運統之土化不及風化兼行天政所布風迺時舉民病泣出耳鳴掉眩其法宜治厥隂之客以辛補之以酸㵼之以甘緩之歲榖宜蒼間榖宜稷則風邪無害四之氣自大暑日子正至秋分日戌正凡六十日有竒主位少宫土客氣少隂火中見土運土居其位上臨少隂溽暑至濕熱相薄爭於左之上民病黃癉而為胕腫宜治少隂之客以醎補之以甘㵼之以酸收之歲榖宜丹間榖宜豆則熱邪無害五之氣自秋分日亥初至小雪日酉初凡六十日有竒主位太商金客氣太隂土中見土運氣與運同司氣為黅化燥濕更勝沈隂迺布寒氣及體風雨迺行宜治太隂之客以甘補之以苦㵼之以甘緩之嵗穀宜丹間榖宜麻則濕邪無害是氣以凉用凉無犯所謂用凉逺凉也終之氣自小雪日酉正至大寒日未正凡六十日有竒主位少羽水客氣少陽火中見土運火土相得畏火司令陽迺大化蟄蟲出見流水不氷地氣大發草迺生人迺舒其病温厲法宜治少陽之客以酸補之以甘㵼之以鹹耎之嵗穀宜丹間穀宜豆則火邪無害治之常也嵗寒大法風勝則有陽明之復火勝則有太陽之復其治各以勝復之法少隂君火司天陽明燥金在泉中見太商金運歲金太過氣化運行先天堅成之紀日上徴與正商同又經言太商下加陽太過不加同天符盖天符為執法平金之化也命曰審平之紀收而不爭殺而無犯五化宣明其氣潔其性剛其用散落其化堅斂其政勁肅其候清切其令燥其類金其應秋其穀稻其果桃其實殻其蟲介其畜鷄其物外堅其色白其味辛其音商其數九其在人也在藏為肺在竅為鼻在體為皮毛在病為欬此歲運為主也天地之氣上見少隂左間太隂右間厥隂是以天政所布其氣明下見陽明左間太陽右間少陽是以地氣肅而其令切二歲交司之氣以寒交暑是歲天地之氣以熱加燥雲馳雨府濕化迺行時雨迺降金火合德上應熒惑太白其穀丹白水火寒熱持於氣交而為病始熟病生於上清病生於下寒熱爭於中民病欬喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上歲半之前天氣少隂君火主之少隂有本標之化寒熱得中則其氣和歲半之後地氣陽明燥金主之陽明不從標本而以中氣為化燥濕相半則其化平是歲平金而無勝復不取化陽唯贊歲勝折其鬱氣無使暴過而生其病調其上以酸温安其下以辛温調其中食白丹之穀歲宜以醎寒以全真氣食間氣之穀以辟虛邪運同地氣化宜多用温熱司氣以凉用凉逺凉此其道也初之氣自己巳年大寒日申初至是歲春分日午初凡六十日八十七刻半主位少角木客氣太陽水中見金運氣寒燥三氣奉少隂之政以行春令地氣遷燥將去寒迺始蟄復藏水迺氷霜復降風迺至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍此太陽之客也法宜以苦補之以醎㵼之以苦堅之以辛潤之歲穀宜丹間穀宜稷迺無寒邪之害二之氣自春分日午正至小滿日辰正凡六十日有奇主位太徵火客氣厥隂木中見金運風火燥同奉少隂之政以行舒榮之化木火相得陽氣布風迺行春氣以正萬物應榮寒氣時至民迺和其病淋目瞑目赤氣鬱於上而熱此厥隂之客也法宜以辛補之以甘緩之歲穀宜丹間穀宜稷迺無風邪之害三之氣自小滿日已初至大暑日卯初凡六十日有奇主位太徵火客氣少隂火中見金運天政之所布也火居火位大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作欬喘目赤冝治少隂之客以醎補之以甘㵼之以酸收之歲穀宜丹間穀宜豆迺無熱邪之害四之氣自大暑日夘正至秋分日丑正凡六十日有奇主位少宫土客氣太隂土中見金運土得其位與金相和奉陽明之令而行順化溽暑至大雨時行寒熱互至民病寒熱嗌乾黄癉鼽衂飲發此太隂之客也法宜以甘補之以苦㵼之以甘緩之歲穀宜白間穀宜麻迺無濕邪之害五之氣自秋分日寅初至小雪日子初凡六十日有奇位太商金客氣少陽火中見金運歲金雖得位而客氣少陽用事畏火臨暑反至陽迺化萬物迺生迺長迺榮民迺康其病温宜調少陽之客以醎補之以甘㵼之以醎耎之歲穀宜白間榖宜豆迺無火邪之害終之氣自小雪日子正至大寒日戌正凡六十日有奇主位少羽水客氣陽明金中見金運金氣相符與水相得而為平氣亦歲之司氣故燥令行餘火内格民病腫於上欬喘甚則血溢寒氣數舉則霧霿翳病生皮腠内舍於脇下連少腹而作寒中宜治陽明之客以酸補之以辛㵼之以苦泄之歲穀宜白間穀宜稷迺無燥邪之害是氣也司氣以凉用凉無犯是謂治也太隂濕土司天太陽寒水在泉中見少羽水運歲水不及氣化運行後天涸流之紀日上宫與正宫同是歲天氣平又少羽下加太陽不及而加同歲㑹凡歲㑹為行今此運化亦平也諸同正歲氣化運行同天歲運既平命曰靜順之紀藏而勿害治而善下五化咸整其氣明其性下其用沃衍其化凝堅其政流演其候凝肅其令寒其類水其應冬其穀豆其果栗其實濡其蟲鱗其畜彘其色黒其味醎其音羽其數六其在人也其藏為腎其主二隂其養骨髓其病厥此歲運之主也天地之氣上見太隂左間少陽右間少隂故地氣上騰而其政肅下見太陽左間厥隂右間陽明故天氣下降而其令寂隂專其政陽氣退辟大風時起原野昏霧白埃四起雲奔南極寒雨數至物成於差夏濕寒合德黄黒埃昏流行氣交上應鎮星辰星其穀黅𤣥故隂凝於上寒積於下寒水勝火則為氷雹陽光不治殺氣迺行民病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急故有餘宜髙不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之間穀命太徴太商之穀歲氣既平不取化源惟折其水鬱之氣無使邪勝食黅𤣥之穀以全其真食間氣之穀以保其精歲宜以苦熱調上以苦熱調下以苦和調中燥之温之歲半之前天氣太隂主之太隂所至為雲雨其化從本當其時多行雨濕化者太隂之政也歲半之後地氣太陽主之太陽所至為寒霧其化從本標當其時寒氣至而熱氣應者地氣之平也初之氣自庚午歲大寒日亥初至是年春分日酉初凡六十日八十七刻半主位少角木客氣厥隂木中見水運木當其位水運充之奉太隂之政而行春令地氣遷寒迺去春氣至風迺來生布萬物以榮民氣條舒風濕相薄雨迺後民病血溢筋絡拘强關節不利身重筋痿宜治厥隂之客以辛補之以酸㵼之以甘緩之歲穀用黅間穀用稷迺無客風之害二之氣自春分日酉正至小滿日未正凡六十日有奇主位太徵火客氣少隂火中見水運奉太隂之政以行舒榮之化大火正物承化民迺和其病温厲盛行逺近咸若濕蒸相薄雨迺時降宜治少隂之客以醎補之以甘㵼之以酸收之歲榖用黅間穀用豆迺無客熱之害三之氣自小滿日申初至大暑日午初凡六十日有奇主位太徵火客氣太隂土中見水運天政所布濕氣降地氣騰雨迺時降寒迺隨之感於寒濕民病身重胕腫胸腹滿宜治太隂之客以甘補之以苦㵼之以甘緩之歲穀用黅間穀用麻迺無濕邪之害四之氣自大暑日午正至秋分日辰正凡六十日有奇主位少宫土客氣少陽火中見水運火土相得奉太陽之令畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相薄草木凝煙濕化不流則白露隂布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以醎補之以甘㵼之以醎耎之嵗穀用𤣥間穀用稷迺無熱邪之害五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位太商金客氣陽明金中見水運慘令巳行寒露下霜迺早降草木黄落寒氣及體君子周宻民病皮腠宜治陽明之客以酸補之以辛㵼之以苦泄之嵗穀用𤣥間穀用黍迺無客燥之害終之氣自小雪日夘正至大寒日丑正凡六十日有竒主位少羽水客氣太陽水中見水運寒大舉濕大化霜迺積陰迺凝水堅氷陽光不治感於寒則病人關節禁固腰脽痛寒濕持於氣交而為疾宜治太陽之客以苦補之以鹹㵼之以辛潤之嵗穀用𤣥間穀用稷迺無客寒之害是嵗水土雖睦而運化不及濕邪害人經云中行令其病徐而持也少陽相火司天厥隂風木在泉中見太角木運歲木太過氣化運行先天太角下加厥隂太過而加同天符為熱法平木之化也命曰敷和之紀木德周行陽舒隂布五化宣平其氣端其性隨其用曲直其化生榮其政發散其候温和其類草木其物中堅其應春其穀麻其果李其實核其蟲毛其畜犬其色蒼其味酸其音角其數八其在人也其藏肝其主目其養筋其病裏急支滿此歲運所主也天地之氣上見少陽左間陽明右間太隂故天氣正而其政嚴下見厥隂左間少隂右間太陽故地氣擾而其令撓風迺暴舉木偃沙飛炎火迺流隂行陽化雨迺時應火木同德上應熒惑歲星其穀丹蒼風熱參布雲物沸騰太隂横流寒迺時至凉雨並起民病寒中外發瘡瘍内為泄滿聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變歲半之前天氣少陽主之少陽之至為炎暑其化從本當其時火化盛行風氣之候迺和歲半之後地氣厥隂主之厥隂所至為風府其化不從標本而以中氣為化當其時風從火化者厥隂之中也是歲運化既平不取化源唯贊所不勝則暴過不生苛疾不起歲宜以醎寒調上以辛凉調下以酸和調中滲之泄之清之發之運同風熱宜多寒化司寒以温用温逺温治之常也初之氣自辛未年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位太角木客氣少隂火中見木運木火相得運當其位以奉少陽之政而行春令地氣遷風勝迺摇寒迺去候迺大温草木早榮寒來不殺温病迺起其病氣怫於上血溢目赤欬逆頭痛血崩脇滿膚腠中瘡宜治少隂之客以醎補之以甘㵼之以酸收之歲榖宜丹間穀宜豆則熱不為邪二之氣自春分日子正至小滿日戌正凡六十日有奇主少徴火客氣太隂土中見木運風濕之氣奉畏火之政以得舒榮之化火反鬱白埃四起雲趨雨府風不勝濕雨迺零民迺康其病熱鬱於上欬逆嘔吐瘡發於中胸嗌不利頭疼身熱昏憒膿瘡宜治太隂之客以甘補之以苦㵼之以甘緩之歲穀宜丹間穀宜麻則濕不為邪三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位少徵火客氣少陽火中見木運火當其位與木運之氣相得天政布炎暑至少陽臨上雨迺涯民病熱中聾瞑血溢膿瘡欬嘔鼽衂渴嚏欠喉痺目赤善暴死宜治少陽之客以醎補之以甘㵼之以醎耎之歲穀宜丹間穀宜豆則火不為邪是歲木氣適平不至横暴四之氣自大暑日酉正至秋分日未正凡六十日有奇主位太宫土客氣陽明金中見木運凉迺至炎暑間化白露降民氣和平其病滿身重宜治陽明之客以酸補之以辛㵼之以苦泄之歲穀宜蒼間穀宜黍則燥不為邪五之氣自秋分日申初至小雪日午初凡六十日有奇主位少商金客氣太陽水中見木運陽迺去寒迺來雨迺降氣門迺閉剛木早凋民避寒邪君子周密宜治太陽之客以苦補之以醎㵼之以苦堅之以辛潤之歲穀宜蒼間穀宜稷則不為邪終之氣自小雪日午正至大寒日辰正凡六十日有奇主位太羽水客氣厥隂木中見木運大角下加厥隂之時運與氣符其化和平又居水位水木相得其化迺順地氣正風迺至萬物反生霿霧以行其病關閉不禁心痛陽氣不藏而欬氣有所承不能無侮所謂邪中執法也經曰中執法者其病速而危宜治厥隂之客以辛補之以酸㵼之以甘緩之歲穀宜蒼間穀宜稷則風不為邪此一氣以温用温無犯是謂至治陽明燥金司天少隂君火在泉中見少徵火運歲火不及氣化運行後天伏明之紀曰上商與正商同言天氣平也六元正紀曰少徵下加少隂不及而加同歲㑹言歲運平地諸同正歲氣化運行同天上見天氣平下見運火平火氣之平命曰升明之紀正陽而治德於周普五化均衡其氣髙其性速其用燔灼其化蕃茂其正明曜其候炎暑其類火其應夏其穀麥其果杏其實絡其蟲羽其畜馬其色赤其味苦其物脉其音徵其數七其在人也其藏心其主舌其養血其病瞤瘛此歲運所主也天地之氣上見陽明左間太陽右間少陽故天之氣急而其政切下見少隂左間太隂右間厥隂故地氣明而其令暴陽専其令炎暑盛行物燥以堅淳風迺治風燥横運流於氣交多陽少隂雲趨雨府濕化迺敷燥極而澤其榖白丹間榖命太徵者其耗白甲品羽金火合徳上應太白熒惑清熱之氣持於氣交民病欬嗌塞寒熱𤼵暴振慄癃閟清先而勁毛蟲迺死熱後而暴介蟲迺殃歲運之化熱氣兩化勝復同所謂邪氣化日也燥化四熱化二所謂正化日也歲半之前天氣陽明主之陽明以中氣為化其當燥熱相半者陽明得中也歲半之後地氣少隂主之少隂有本標之化當其時未熱得中者少陽之氣和也歲火傷平不資化溽惟安運氣無使受邪歲宜以苦小温調上以醎寒調下以醎温調中食白丹之穀以安其氣食間氣之穀以去其邪運同熱氣宜多天化治之常也初之氣自壬申年大寒日已初至是歲春分日卯初凡六十日八十七刻半主位太角木客氣太隂土中見火運風濕三氣同陽明之政而行春令地氣遷隂始凝氣始肅水迺氷寒雨化其病中熱脹面目浮腫善眠鼽衂嚏欠嘔小便黄赤甚則淋宜治太隂之客以甘補之以苦㵼之以甘緩之歲穀宜白間穀宜麻迺無濕邪之害二之氣自春分日卯正至小滿日丑正凡六十日有奇主位少徴火客氣少陽火中見火運三火相符以行舒榮之化陽迺布民迺舒物迺生榮厲大至民善暴死是歲火氣平厲雖至民亦無害宜治少陽之客以醎補之以甘㵼之以醎耎之歲穀用白間穀用豆迺無火邪之害是氣也司氣以熱用熱無犯三之氣自小滿日寅初至大暑日子初凡六十日有奇主位少徴火客氣陽明金中火見火運金居火位天政布凉迺行燥熱交和燥極而澤民病寒熱宜治陽明之客以酸補之以辛㵼之以苦泄之歲穀用白間穀用黍迺無燥邪之害四之氣自大暑日子正至秋分日戌正凡六十日有奇主位太宫土客氣太陽水中見火運寒熱之氣下奉少隂之令寒雨降病暴仆振慄譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便宜治太陽之客以苦補之以醎㵼之以苦堅之以辛潤之歲穀用丹間穀用稷迺無寒邪之害五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位少商金客氣厥隂木中見火運春令反行草迺生榮民氣和宜調厥隂之客以辛補之以酸㵼之以甘緩之歲穀用丹間穀用稷迺無風邪之害終之氣自小雪日酉正至大寒日未正凡六十日有奇主位太羽水客氣少隂火中見火運少徴與少隂相加火氣符㑹而為行令陽氣布候及温蟄蟲來見流水不氷民乃康平其民病温宜治少隂之客以醎補之以甘㵼之以酸收之歲穀用丹間穀用豆迺無熱邪之害是歲氣運適平若有邪氣則中行令中行令者其病徐而持也普濟方卷七
