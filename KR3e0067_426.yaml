  text: 普濟方卷四百二十六明周王朱橚撰本草藥性異名玉石部一名硃砂作末名真朱丹砂豆砂朱砂雲母砂光明砂土砂馬牙砂石砂無重砂玉屑一名白玉緣玉烏玉玉泉一名玉札玉液瓊漿一名雲珠雲華雲英雲液雲母雲沙隣石石鍾乳一名公乳蘆石夏石竹乳一名羽羽澤青白生者名馬齒礬礬石黄黑者名雞屎礬礬有五種青礬白礬黄礬黑礬綘礬消石一名芒硝芒硝朴硝一名硝石馬牙硝生硝滑石一名液石共石脱石畨石石膽一名畢石黑石碁石銅勒空青曾青禹餘糧一名白餘糧太一餘糧太一餘糧一名石腦白石英黄端白稜名黄石英赤端名赤石英青端名青石英黑端名黑石英紫石英青石脂赤石脂黄石脂白石脂一名白符黑石脂一名石涅石墨白青緑青石中黄子無名異菩薩石婆娑石緑礬柳絮石扁青雄黄一名黄食石石黄薰黄一名光明鹽戎鹽石鹽馬齒鹽食鹽井鹽青鹽臭鹽白鹽黑鹽柔鹽駿鹽赤鹽一名石硫黄赤色者名石亭脂青色者號冬結石半白半黑名神騖石土硫黄雌黄水銀一名汞石膏一名細石金屑一名生金銀屑一名朱砂銀靈砂一名二氣砂水銀粉一名汞粉一名𤣥石䖍石磁君磁石四面吸鐵一觔者名延年沙四面吸鐵八兩者號續未石四面吸鐵五兩者號曰磁𤣥石一名𤣥水石䖍石緑鹽凝水石一名白水石寒水石凌水石陽起石一名白石石生羊起石孔公孽一名通石殷孽一名姜石蜜佗僧一名没多生鐵精一名鐵熱淬鐵水刀煙鐵漿秤錘鐵華粉生鐵鐵粉鐵落一名鐵液鋼鐵柔鐵石腦一名石餄餅理石一名立制石肌石珊瑚石蠏一名浮石長石一名方石真理石土石馬衘礪石一名磨石石花一名乳石桃花石光明鹽一名石鹽石牀一名乳牀逆石膚青一名推青推石馬腦太隂𤣥精石鹽精車轄伏龍肝釡月中墨一名釡臍墨石灰一名惡灰希灰煆石石煆礜石一名青分石立制石固陽石白礜石大白石澤乳食鹽鼠鄉砒霜鍾墨􅓀砂一名北亭砂狄鹽金丹一名鈆華黄丹鉛一名錫鉛粉錫一名鮮錫今化鈆作胡粉也定粉東壁土赤同屑錫銅鏡一名白鑞銅青井底䖢代赭一名須丸血師赤土石燕戎鹽一名胡鹽大鹽鹵醎漿水井華水菊花水地漿臘泉水半天河一名竹籬頭水熱湯白堊一名白善冬灰一名䔧灰青琅玕一名石朱自然銅金牙銅鑛石銅弩牙金星石銀星石特生礜石一名蒼礜石鼠毒握雪石一名化公石石腦梁上塵土陰蘖一名土乳車脂釭中膏鍜竈灰淋石方解石一名黄石方石礞石一名青礞石姜石麤黄石井泉石蒼石一名蒼礜花蕊石一名花乳石石蠶石腦白磁瓦烏古瓦不灰木氣砂蓬砂一名鵬砂鈆霜右文錢蛇黄一名重樓莵竹雞格救窮黄精鹿竹垂珠筆菜萎㽔仙人餘糧苟格馬箭白及飛英根名氣精太陽之草黄芝菖蒲一名菖陽􅀢韭溪蓀蘭蓀一名節華日精女節女華女莖更生周盈傳延菊花陰成苦薏珠子菊囘蜂菊羊歡草地薇蒿茶苦蒿三月名玉英六月名容九月名金精十二月名長生已上用各月寅日收人參一名人銜鬼葢神草人微土精血參一名山薊山薑山連山介术天蘇山精乞力伽陽枹薊馬薊术陶一名顛勒華者名􅀈休顛棘天門冬浣草蘠藶虋冬滿冬虋地門冬筵門冬滛羊食管松蘼虋冬門冬淫羊藿無不愈百部牛膝一名百部甘草一名蜜甘美草蜜草蕗草蘦大苦國老地黄一名地髓芐芑浮水者天黄半沉半浮者人黄沉下者為地黄菟絲子一名兔蘆菟縷唐䝉玉女赤網菟纍女蘿一名益母益明大扎真蔚茺蔚子欝臭草萑䕌苦低草負擔夏枯草逺志一名棘苑葽繞細草葉乃小草木香一名蜜香一名女萎熒地節玉竹萎㽔馬薰委萎青黏黄芝防葵一名䔧葢房兹爵離農果利茹方葢柴胡一名地薰山菜茹草茈薑爾雅云一名藐干葉名芸蒿一名羊韭愛韭馬韭羊耆麥門冬禹葭禹餘糧虋冬忍冬忍陵不死藥僕壘隨脂獨一名羗活旡青䕶羌使者胡王使者獨揺草青木香一名五香一名五木一名周麻一云升麻是落新婦根也升麻又謂之雞骨升麻一又名落新婦一名當道芣苢蝦蟆衣牛遺勝寫馬寫牛舌草車前子一名山芋玉延土藷諸薯薯蕷山羊修脆兒草藷薏苡仁一名解蟸屋菼起實贑音􅗰珠澤瀉一名水㵼及瀉芒芉鵠瀉蕍藛龍膽一名陵游俗呼為草龍膽又有山龍膽細辛一名小辛細辛石斛一名林蘭􅀢生杜蘭石遂又一鍾名水斛麥斛雀脾一名穀菜白草苦菜鬼目草又有蔛菜巴㦸天一名三蔓草不凋草白蒿一名蘩皤蒿也蓬蒿㳺胡旁勃赤箭一名離母鬼督郵合離草獨揺菴䕡子一名蔑菥大蕺馬辛大薺菥宜子老薺狗薺荖實蓍實赤芝一名丹芝青芝一名龍芝黑芝一名𤣥芝白芝一名玉芝黄芝一名金芝紫芝一名木芝芮芝瑞草也芝卷栢一名萬歳豹促求股交時藍實爾雅名葴一名石鯪石蹉略石明石領石懸石耐冬石血絡石石龍勝木連地錦地噤滂藤薜荔土豉藤長春藤木連滕龍鱗薜荔黄連一名玉連攴連一名胡窮香果馬銜芎藭京芎芎藭雀腦芎葉苖名薇無蘼蕪葉色茳蘺苖也鄿茞蘼蕪一名旁通屈人止行茨生蒺䔧子犲羽升推即䔧據千蒺䔧詩云牆有茨不可掃也防風一名銅芸茴草百枝屏風蕳根百蜚一名戴糁戴椹芰草黄耆獨脂百本王孫又一種名白水蓍赤水蓍木蓍肉蓯蓉一名肉松容一名蒲釐花黄細若金粉香蒲黄苖也俗名蒲槌滓謂之蒲萼香蒲一名睢醮香茅甘蒲菖蒲菁蒲臭蒲續斷一名龍豆属折接骨南草諾藤槐馬薊漏蘆一名野蘭莢蒿根名鹿驪老公花鬼麻木䔧蘆營實一名􅂒薇􅂒麻牛棘牛勒薔靡山棘一名麥句姜蝦蟆藍豕首天門精玉門精彘顱蟾蜍蘭覲天門精莃薟豨首鹿活草天蔓精地松天蕪精茢薽豕首大鞠蘧麥劉􅖓草一名馬蹄决明蔞蒿子薢茩芵茪䔖决明子闗西謂之薢茩又石决明丹參一名糿蟬草赤參逐馬