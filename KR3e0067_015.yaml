body:
  text: 普濟方卷十五明周王朱橚撰肝臟門肝壅頭目不利附論夫頭者諸陽之㑹也眼者肝之竅也臟腑壅滯隂陽不和風熱摶於諸陽之經攻於肝臟則上衝於目而入於胸則頭目不利也方前胡丸出聖恵方治肝臟壅熱心胸煩燥頭目不利多渇體熱前胡三分去蘆頭枳殻五錢麩炒㣲黄去瓤黄芩三分沙参三分去蘆頭犀角屑三分蔓荆子三分梔子仁三分􅌝􅌣根一兩車前子三分麥門冬一兩去心焙川升麻一兩甘草五錢㣲炒剉右為細末煉蜜和搗一二百杵丸如梧桐子大每於食後温漿水下二十丸升麻丸治肝臟壅熱心膈燥恍惚頭目不利升麻一兩茯神一兩羚羊角屑一兩柴胡一兩梔子仁一兩黄連五錢去鬚麥門冬一兩去心焙牛黄一分細研如粉龍骨一錢細研如粉甘草五錢炙微赤剉硃砂一兩細研水飛過右為細末入牛黄等同研令勻煉蜜和搗二三百杵丸如梧桐子大每服食後煎竹葉湯下十五丸忌猪肉羊血石膏散治肝臟壅熱上攻頭目不利心煩口乾石膏二兩枳殻一兩麩炒㣲黄去瓤甘菊花一兩黄芩一兩麥門冬一兩去心前胡一兩去蘆頭地骨皮一兩羚羊角屑一兩甘草一兩炙微赤剉右為散每服三錢水一中盞煎至六分去滓每於食後温服忌炙煿等羚羊角散治肝臟壅熱頭目不利胷膈燥煩體痛羚羊角屑一兩柴胡一兩去苗石膏二兩赤芍藥一兩車前子一兩川大黄一兩剉細㣲炒甘草一兩炙㣲赤剉黄芩一兩去腐右為末每服三錢水一中盞煎至六分去滓每於食後温服大黄丸治肝臟壅熱心膈不利煩悶頭目昏眩川大黄一兩剉碎㣲炒枳殻一兩麩炒㣲黄去瓤甘草炙㣲赤剉五錢麥門冬三分去心焙羚羊角屑三分川升麻三分生地黄三分犀角屑三分右為細末煉蜜和搗百餘杵丸如梧桐子大每於食後煎竹葉湯下二十丸忌酒熱麫等柴胡湯治肝臟壅熱上攻頭目不利四肢拘倦柴胡去苗一兩五錢石膏碎二兩黄芩去黑心赤芍藥甘草各一兩右粗搗篩每服三錢水一盞煎至六分去滓食後温服肝風冷轉筋附論夫轉筋者肝臟氣虚風冷搏於筋故也手足之三隂三隂之筋皆起於手足指而並絡於身若血氣不足隂陽虚五方風冷邪氣中於筋随所中之處筋則轉動故為之轉筋也方木𤓰丸治肝風冷轉筋入腹手足厥冷木𤓰五顆大者附子炮裂一兩去皮臍青橘皮木香各五錢桂心一兩訶梨勒皮一兩煨人参五錢去蘆頭肉荳蔲五錢去殻厚朴五錢去粗皮塗生薑汁炙白术一兩髙良薑五錢剉鹽二兩濕紙裹燒令通赤右為末切木𤓰頭去却瓤内諸藥末以截下木𤓰盖却以竹釘籖定於甑中蒸爛熟木臼中入軟蒸餅相和搗可丸如梧桐子大每服不計時以生姜下三十丸白荳蔲散治肝風冷轉筋四肢厥冷白荳蔲一兩去皮髙良薑一兩剉青橘皮三分湯浸去白瓤焙木𤓰一兩沉香一兩當歸三分剉㣲炒甘草炙㣲赤五錢桂心三分右為散每服四錢水一盞煎至六分去滓不計時熱服忌雞猪魚蒜雞舌香散治肝風冷兩脚轉筋攣急疼痛雞舌香一兩白荳蔲五錢去皮木香五錢木𤓰一兩吴茱茰一分湯浸七遍焙乾㣲炒青橘皮五錢湯浸去白瓤右為散每服四錢水一中盞生薑半分煎至六分去滓熱服不拘時候桂心散治肝臟風冷轉筋不止桂心一兩草豆蔲一兩去皮附子一兩炮裂去皮臍丁香五錢㯽榔五錢木𤓰一兩右為散每服四錢以水一中盞生薑半分煎至六分去滓不拘時候熱服忌猪魚肉毒等髙良薑湯淋蘸方治肝虚冷轉筋不止髙良薑三兩木𤓰二枚杉木節五兩川椒一兩去目蒴藋五兩蓼葉五兩右細剉以水一斗五升煎取八升去滓入醋半升攪令勻及熱内於杉木桶中淋蘸兩脚亷以綿揾藥汁裹轉筋處立止椒桂湯治肝虚轉筋入腹悶絶體冷一名木𤓰散雞糞一合㣲炒肉荳蔲一分去殻胡椒一錢桂心五錢木𤓰三分右為粗散每服四錢水一中盞生薑半分煎至六分去滓不拘時熱服附子散治肝虚風冷所搏轉筋不止附子炮裂去皮臍沉香桂心各一兩木𤓰髙良薑各一兩五錢右為散每服四錢水一中盞煎至六分去滓不拘時候熱服忌雞猪毒魚大蒜等治肝風虚轉筋入腹方出聖恵方右以雞糞白者為末每服一錢以熱酒調下食鹽治肝臟氣虚風冷搏於筋徧體轉筋入腹不可忍右以熱湯三斗入鹽半斤稍熱漬之極效劉禹錫𫝊信方出本草甘少府治脚轉筋兼暴風通身水冷如癱瘓者取蠟半斤以舊帛淨絹並得闊五六寸㸔所患大小加减闊狹先銷蠟塗於帛上看冷熱但不過燒人便乗熱纒脚仍須當脚心便韈脚得冷即更易之治心躁驚悸如覺是風毒兼裹兩脚心治脚轉筋用獨頭蒜一箇口嚼一半於所患腿脚上揉擦一半用水送下即愈肝風筋脉抽掣疼痛附論夫肝藏血與筋合肝氣和則氣血强盛以行於筋膜故骨正筋柔氣血皆從若肝臟氣虚不能容飬則為風邪所侵搏於筋脉榮衛凝泣闗節不通令人筋脉抽掣疼痛以至眩悶口眼偏邪皆其證也方獨活湯出聖濟總録治肝氣虚弱風邪外侵搏於筋脉流入經絡筋脉抽掣疼痛獨活去蘆頭萆薢細辛去苖葉人参酸棗仁㣲炒牛膝去苗切酒浸焙附子炮裂去皮臍羚羊角鎊赤芍藥黄芩去黑心茵芋去粗莖麻黄去根節煎掠去抹焙防已肉桂去粗皮甘草㣲炙剉各一兩右剉如麻荳每服三錢水一盞生薑三片棗三枚煎至五分去滓入竹瀝一合煎兩沸温服不拘時候天麻丸出聖恵方治肝臟風筋脉抽掣疼痛身强語澁肢節不利天麻二兩芎藭一兩天南星三分炮裂附子三分炮裂去皮臍酸棗仁一兩㣲炒烏蛇二兩酒浸炙㣲黄去皮臍桑螵蛸三分㣲炒槐膠一兩麝香一兩細研當歸五兩剉㣲炒乾蝎五錢㣲炒獨活一兩蔓荆子一兩硃砂五錢細研右為末煉蜜和搗三二百杵丸如菉荳大每服薄荷熱酒下十丸不拘時薏苡仁散聖恵方治肝臟風毒流注筋脉抽掣急痛頭目眩悶四肢無力薏苡仁一兩羌活一兩防風一兩去蘆頭漢防已一兩桑根白皮一兩剉當歸一兩剉㣲炒甘草一兩炒㣲赤剉桂心一兩天麻一兩赤茯苓一兩芎藭一兩酸棗仁一兩㣲炒右為散每服三錢水一中盞生薑半分煎至六分去滓不計時温服忌生冷猪雞毒魚肉濕麫栢子仁散聖恵方治肝臟風上焦虚熱脇下堅滿闗節疼痛筋脉抽掣栢子仁一兩羗活一兩枳實一兩麩炒㣲黄前胡一兩去蘆頭赤茯苓一兩細辛一兩甘草五錢炙㣲赤剉五加皮一兩赤芍藥一兩桂心一兩白蒺藜一兩㣲炒去刺防風一兩去蘆頭右為散每服三錢水一中盞生薑半分煎至六分去滓不拘時温服麻黄散聖恵方治肝臟心神煩四肢拘急筋脉抽掣疼痛麻黄二兩去根節石膏二兩芎藭二兩天䧺二兩炮裂去皮臍當歸一兩剉㣲炒甘草一兩炙㣲赤剉赤芍藥一兩桂心一兩牛膝一兩去苗防風一兩去蘆頭杏仁一兩湯浸去皮尖雙仁麩炒㣲黄羚羊角屑一兩右為末每服三錢水一盞生薑半分煎至六分去滓不拘時温服側子散聖恵方治肝臟風筋脉抽掣疼痛不止側子一兩炮裂去皮臍赤箭一兩酸棗仁一兩㣲炒海桐皮一兩芎藭三分漏蘆三分桂心三分五加皮三分仙靈脾三分牛膝三分去苗木香三分枳殻五錢麩炒㣲黄去瓤右為細末每服一錢温酒調下不拘時候昇秀九出聖濟總録治肝受風邪筋脉抽掣疼痛烏啄五兩炮裂去皮臍㯽榔三兩防葵槐膠酒化為膏牛膝酒浸焙各三分萆薢㣲炒澤㵼木𤓰去皮子切焙續随子去皮别研如膏各一分右除槐膠續随子搗羅為末再拌勻煉蜜和丸如梧桐子大空心食前温酒下三十丸以知為度天麻湯出聖濟總録治肝臟風毒流注四肢拘急筋脉抽掣百節麻身體疼痛頭目昏眩天麻獨活去蘆頭酸棗仁炒薏苡仁防風去叉各一兩赤茯苓去黒皮芎藭羚羊角屑鎊甘草㣲炒剉肉桂去粗皮麻黄去根節煎掠沫各五錢右粗搗篩每服三錢水一盞入薄荷少許同煎至六分去滓食後温服枸把子湯出聖濟總録治肝氣攻注遍身筋脉抽掣疼痛四肢無力枸杞子海桐皮白芷苦参防風去义甘草炙剉肉桂去粗皮麻黄去根節煎掠去沫焙牛膝切酒浸一宿焙各一兩酸棗仁各五錢右粗搗篩每服三錢水一盞生薑二片同煎至七分去滓温服不拘時候牛膝酒一名薏苡仁浸酒方治肝風筋脉抽掣疼痛肢節不利方見本門肝風筋脉拘攣類茯神丸出聖濟總録治肝風筋脉抽掣疼痛不得屈伸恍惚多忘或時恐怖茯神去木一兩逺志去心人参白殭蠶㣲炒各三分白附子㣲炮乳香别研一兩當歸剉炒五錢右搗研為末煉蜜丸如梧桐子大每服二十丸温酒下不拘時漸加丸數芎藭散出聖恵方治肝臟風筋脉抽掣背膊疼痛芎藭三分麻黄三分去根節丹参三分酸棗仁一兩㣲炒側子三分炮裂去皮臍茯神三分防風三分去蘆頭甘菊花三分甘草炙㣲赤剉三分右為末每服三錢水一盞煎至六分去滓不拘時温服忌猪肉毒魚大蒜等物羚羊角散出聖恵方治肝臟風筋脉抽掣疼痛不得睡卧羚羊角屑一兩防風一兩去蘆頭赤茯神一兩白蘞一兩獨活一兩附子一兩炮裂去皮臍桂心一兩麻黄一兩去根節酸棗仁三分㣲炒右為細末每服不拘時温酒調下一錢酸棗仁散出聖恵方治肝臟風四肢筋脉抽掣疼痛不欲食酸棗仁三分㣲炒薏苡仁三分人参三分去蘆頭黄松節三分剉五加皮三分茯神三分羗活三分桂心三分枳殻五錢麩炒㣲黄去瓤右為細末每服不拘時温酒調下一錢補骨脂湯出聖濟總録治肝臟風冷毒氣攻注筋脉抽掣疼痛及一切寒之病補骨脂炒莾草肉桂去粗皮附子炮裂去皮臍乾薑炮各一兩乾蝎去土㣲炒一分右剉如麻豆每服二錢水半盞入酒半盞葱白二寸鹽少許同煎至六分去滓食前熱服卒轉筋者熱酒煎服肝風毒流注入脚膝筋脉疼痛附論夫肝主於筋而藏於血臟腑和平榮衞調適表裏充實則邪不能侵也若肝氣乆虚腎臟衰冷則風邪乗虚乃攻摶於筋脉流注脚膝故令疼痛也方海桐皮散出聖恵方治肝臟風毒流注脚膝筋脉拘急疼痛不可忍海桐皮一兩剉附子炮裂去皮臍赤箭桂心牛膝去苗防風去蘆頭石斛去根剉獨活各五錢當歸三分剉㣲炒仙靈脾酸棗仁微炒羚羊角屑芎藭木香五加皮赤芍藥細辛各五錢㯽榔一兩枳殻五錢麩炒㣲黄去瓤甘草一分炙赤剉右為散每服四錢以水酒各半中盞煎至六分去滓於食前温服忌猪魚酒蒜等物酸棗仁散出聖恵方治肝臟風流注腰脚疼痛筋脉不利行立無力酸棗仁一兩半㣲炒獨活半兩牛膝一兩去苖萆薢半兩桂心一兩仙靈脾一兩山茱茰半兩芎藭半兩赤箭一兩甘菊花半兩海桐皮半兩虎脛骨一兩塗醋炙令黄羚羊角屑半兩骨碎補半兩側子一兩炮裂去皮臍桑寄生半兩木香半兩麝香一分細研入右為細散研入麝香令勻每服二錢温酒調下食前服豆淋酒側子丸出聖恵方治肝臟風毒流注脚膝筋脉拘急疼痛及四肢緩弱無力行履不得黑豆一升炒㣲熟入酒五升煎二三十沸濾過去滓煎令稠側子三分炮裂去臍皮石楠葉牛膝去苖防風去蘆頭石斛去根剉肉桂去皺皮萆薢剉麻黄去根節羗活海桐皮剉赤茯苓茵芋獨活天麻當歸剉㣲炒各半兩烏蛇一兩酒浸去皮骨炙令㣲黄右為細散以黑豆煎和搗一二百杵丸如梧桐子大每服食前温酒下三十丸忌猪肉毒魚等一名石楠丸有附無側子野葛膏出聖恵方治肝臟風毒流注脚膝筋脉攣急疼痛野葛剉蛇啣犀角屑川烏頭去皮臍桔梗去蘆頭茵芋防風去蘆頭川椒去目乾薑各二兩巴荳三十粒去殻川升麻細辛當歸附子去皮臍羗活川大黄䧺黄研如粉各二兩右藥細剉似酒五升漬藥一宿以不水猪膏五斤以前藥同於鐺中炭火上煎之令藥色變黄又勿令燋黑成膏絞去