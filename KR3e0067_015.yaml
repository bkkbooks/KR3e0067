body:
  text: 普濟方卷十五明周王朱橚撰肝臟門肝壅頭目不利附論夫頭者諸陽之會也眼者肝之竅也臟腑壅滯隂陽不和風熱摶於諸陽之經攻於肝臟則上衝於目而入於胸則頭目不利也方前胡丸出聖惠方治肝臟壅熱心胸煩燥頭目不利多渴體熱前胡三分去蘆頭枳殼五錢麩炒微黃去瓤黃芩三分沙參三分去蘆頭犀角屑三分蔓荆子三分梔子仁三分􅌝􅌣根一兩車前子三分麥門冬一兩去心焙川升麻一兩甘草五錢微炒銼右為細末煉蜜和搗一二百杵丸如梧桐子大每於食後溫漿水下二十丸升麻丸治肝臟壅熱心膈燥恍惚頭目不利升麻一兩茯神一兩羚羊角屑一兩柴胡一兩梔子仁一兩黃連五錢去鬚麥門冬一兩去心焙牛黃一分細研如粉龍骨一錢細研如粉甘草五錢炙微赤銼硃砂一兩細研水飛過右為細末入牛黃等同研令勻煉蜜和搗二三百杵丸如梧桐子大每服食後煎竹葉湯下十五丸忌豬肉羊血石膏散治肝臟壅熱上攻頭目不利心煩口乾石膏二兩枳殼一兩麩炒微黃去瓤甘菊花一兩黃芩一兩麥門冬一兩去心前胡一兩去蘆頭地骨皮一兩羚羊角屑一兩甘草一兩炙微赤銼右為散每服三錢水一中盞煎至六分去滓每於食後溫服忌炙煿等羚羊角散治肝臟壅熱頭目不利胸膈燥煩體痛羚羊角屑一兩柴胡一兩去苗石膏二兩赤芍藥一兩車前子一兩川大黃一兩銼細微炒甘草一兩炙微赤銼黃芩一兩去腐右為末每服三錢水一中盞煎至六分去滓每於食後溫服大黃丸治肝臟壅熱心膈不利煩悶頭目昏眩川大黃一兩銼碎微炒枳殼一兩麩炒微黃去瓤甘草炙微赤銼五錢麥門冬三分去心焙羚羊角屑三分川升麻三分生地黃三分犀角屑三分右為細末煉蜜和搗百餘杵丸如梧桐子大每於食後煎竹葉湯下二十丸忌酒熱麵等柴胡湯治肝臟壅熱上攻頭目不利四肢拘倦柴胡去苗一兩五錢石膏碎二兩黃芩去黑心赤芍藥甘草各一兩右粗搗篩每服三錢水一盞煎至六分去滓食後溫服肝風冷轉筋附論夫轉筋者肝臟氣虛風冷搏於筋故也手足之三隂三隂之筋皆起於手足指而並絡於身若血氣不足隂陽虛五方風冷邪氣中於筋隨所中之處筋則轉動故為之轉筋也方木瓜丸治肝風冷轉筋入腹手足厥冷木瓜五顆大者附子炮裂一兩去皮臍青橘皮木香各五錢桂心一兩訶梨勒皮一兩煨人參五錢去蘆頭肉豆蔲五錢去殼厚朴五錢去粗皮塗生薑汁炙白术一兩髙良薑五錢銼鹽二兩濕紙裹燒令通赤右為末切木瓜頭去却瓤內諸藥末以截下木瓜蓋却以竹釘籖定於甑中蒸爛熟木臼中入軟蒸餅相和搗可丸如梧桐子大每服不計時以生薑下三十丸白豆蔲散治肝風冷轉筋四肢厥冷白豆蔲一兩去皮髙良薑一兩銼青橘皮三分湯浸去白瓤焙木瓜一兩沉香一兩當歸三分銼微炒甘草炙微赤五錢桂心三分右為散每服四錢水一盞煎至六分去滓不計時熱服忌雞豬魚蒜雞舌香散治肝風冷兩腳轉筋攣急疼痛雞舌香一兩白豆蔲五錢去皮木香五錢木瓜一兩吳茱茰一分湯浸七遍焙乾微炒青橘皮五錢湯浸去白瓤右為散每服四錢水一中盞生薑半分煎至六分去滓熱服不拘時候桂心散治肝臟風冷轉筋不止桂心一兩草豆蔲一兩去皮附子一兩炮裂去皮臍丁香五錢檳榔五錢木瓜一兩右為散每服四錢以水一中盞生薑半分煎至六分去滓不拘時候熱服忌豬魚肉毒等髙良薑湯淋蘸方治肝虛冷轉筋不止髙良薑三兩木瓜二枚杉木節五兩川椒一兩去目蒴藋五兩蓼葉五兩右細銼以水一斗五升煎取八升去滓入醋半升攪令勻及熱內於杉木桶中淋蘸兩腳亷以綿揾藥汁裹轉筋處立止椒桂湯治肝虛轉筋入腹悶絶體冷一名木瓜散雞糞一合微炒肉豆蔲一分去殼胡椒一錢桂心五錢木瓜三分右為粗散每服四錢水一中盞生薑半分煎至六分去滓不拘時熱服附子散治肝虛風冷所搏轉筋不止附子炮裂去皮臍沉香桂心各一兩木瓜髙良薑各一兩五錢右為散每服四錢水一中盞煎至六分去滓不拘時候熱服忌雞豬毒魚大蒜等治肝風虛轉筋入腹方出聖惠方右以雞糞白者為末每服一錢以熱酒調下食鹽治肝臟氣虛風冷搏於筋遍體轉筋入腹不可忍右以熱湯三斗入鹽半斤稍熱漬之極效劉禹錫傳信方出本草甘少府治腳轉筋兼暴風通身水冷如癱瘓者取蠟半斤以舊帛淨絹並得闊五六寸看所患大小加減闊狹先銷蠟塗於帛上看冷熱但不過燒人便乘熱纒腳仍須當腳心便襪腳得冷即更易之治心躁驚悸如覺是風毒兼裹兩腳心治腳轉筋用獨頭蒜一箇口嚼一半於所患腿腳上揉擦一半用水送下即愈肝風筋脈抽掣疼痛附論夫肝藏血與筋合肝氣和則氣血強盛以行於筋膜故骨正筋柔氣血皆從若肝臟氣虛不能容飬則為風邪所侵搏於筋脈榮衛凝泣關節不通令人筋脈抽掣疼痛以至眩悶口眼偏邪皆其證也方獨活湯出聖濟總録治肝氣虛弱風邪外侵搏於筋脈流入經絡筋脈抽掣疼痛獨活去蘆頭萆薢細辛去苖葉人參酸棗仁微炒牛膝去苗切酒浸焙附子炮裂去皮臍羚羊角鎊赤芍藥黃芩去黑心茵芋去粗莖麻黃去根節煎掠去抹焙防已肉桂去粗皮甘草微炙銼各一兩右銼如麻豆每服三錢水一盞生薑三片棗三枚煎至五分去滓入竹瀝一合煎兩沸溫服不拘時候天麻丸出聖惠方治肝臟風筋脈抽掣疼痛身強語澀肢節不利天麻二兩芎藭一兩天南星三分炮裂附子三分炮裂去皮臍酸棗仁一兩微炒烏蛇二兩酒浸炙微黃去皮臍桑螵蛸三分微炒槐膠一兩麝香一兩細研當歸五兩銼微炒乾蝎五錢微炒獨活一兩蔓荆子一兩硃砂五錢細研右為末煉蜜和搗三二百杵丸如菉豆大每服薄荷熱酒下十丸不拘時薏苡仁散聖惠方治肝臟風毒流注筋脈抽掣急痛頭目眩悶四肢無力薏苡仁一兩羌活一兩防風一兩去蘆頭漢防已一兩桑根白皮一兩銼當歸一兩銼微炒甘草一兩炒微赤銼桂心一兩天麻一兩赤茯苓一兩芎藭一兩酸棗仁一兩微炒右為散每服三錢水一中盞生薑半分煎至六分去滓不計時溫服忌生冷豬雞毒魚肉濕麵柏子仁散聖惠方治肝臟風上焦虛熱脅下堅滿關節疼痛筋脈抽掣柏子仁一兩羌活一兩枳實一兩麩炒微黃前胡一兩去蘆頭赤茯苓一兩細辛一兩甘草五錢炙微赤銼五加皮一兩赤芍藥一兩桂心一兩白蒺藜一兩微炒去刺防風一兩去蘆頭右為散每服三錢水一中盞生薑半分煎至六分去滓不拘時溫服麻黃散聖惠方治肝臟心神煩四肢拘急筋脈抽掣疼痛麻黃二兩去根節石膏二兩芎藭二兩天雄二兩炮裂去皮臍當歸一兩銼微炒甘草一兩炙微赤銼赤芍藥一兩桂心一兩牛膝一兩去苗防風一兩去蘆頭杏仁一兩湯浸去皮尖雙仁麩炒微黃羚羊角屑一兩右為末每服三錢水一盞生薑半分煎至六分去滓不拘時溫服側子散聖惠方治肝臟風筋脈抽掣疼痛不止側子一兩炮裂去皮臍赤箭一兩酸棗仁一兩微炒海桐皮一兩芎藭三分漏蘆三分桂心三分五加皮三分仙靈脾三分牛膝三分去苗木香三分枳殼五錢麩炒微黃去瓤右為細末每服一錢溫酒調下不拘時候升秀九出聖濟總録治肝受風邪筋脈抽掣疼痛烏啄五兩炮裂去皮臍檳榔三兩防葵槐膠酒化為膏牛膝酒浸焙各三分萆薢微炒澤㵼木瓜去皮子切焙續隨子去皮别研如膏各一分右除槐膠續隨子搗羅為末再拌勻煉蜜和丸如梧桐子大空心食前溫酒下三十丸以知為度天麻湯出聖濟總録治肝臟風毒流注四肢拘急筋脈抽掣百節麻身體疼痛頭目昏眩天麻獨活去蘆頭酸棗仁炒薏苡仁防風去叉各一兩赤茯苓去黑皮芎藭羚羊角屑鎊甘草微炒銼肉桂去粗皮麻黃去根節煎掠沫各五錢右粗搗篩每服三錢水一盞入薄荷少許同煎至六分去滓食後溫服枸把子湯出聖濟總録治肝氣攻注遍身筋脈抽掣疼痛四肢無力枸杞子海桐皮白芷苦參防風去義甘草炙銼肉桂去粗皮麻黃去根節煎掠去沫焙牛膝切酒浸一宿焙各一兩酸棗仁各五錢右粗搗篩每服三錢水一盞生薑二片同煎至七分去滓溫服不拘時候牛膝酒一名薏苡仁浸酒方治肝風筋脈抽掣疼痛肢節不利方見本門肝風筋脈拘攣類茯神丸出聖濟總録治肝風筋脈抽掣疼痛不得屈伸恍惚多忘或時恐怖茯神去木一兩逺志去心人參白殭蠶微炒各三分白附子微炮乳香别研一兩當歸銼炒五錢右搗研為末煉蜜丸如梧桐子大每服二十丸溫酒下不拘時漸加丸數芎藭散出聖惠方治肝臟風筋脈抽掣背膊疼痛芎藭三分麻黃三分去根節丹參三分酸棗仁一兩微炒側子三分炮裂去皮臍茯神三分防風三分去蘆頭甘菊花三分甘草炙微赤銼三分右為末每服三錢水一盞煎至六分去滓不拘時溫服忌豬肉毒魚大蒜等物羚羊角散出聖惠方治肝臟風筋脈抽掣疼痛不得睡卧羚羊角屑一兩防風一兩去蘆頭赤茯神一兩白蘞一兩獨活一兩附子一兩炮裂去皮臍桂心一兩麻黃一兩去根節酸棗仁三分微炒右為細末每服不拘時溫酒調下一錢酸棗仁散出聖惠方治肝臟風四肢筋脈抽掣疼痛不欲食酸棗仁三分微炒薏苡仁三分人參三分去蘆頭黃松節三分銼五加皮三分茯神三分羌活三分桂心三分枳殼五錢麩炒微黃去瓤右為細末每服不拘時溫酒調下一錢補骨脂湯出聖濟總録治肝臟風冷毒氣攻注筋脈抽掣疼痛及一切寒之病補骨脂炒莾草肉桂去粗皮附子炮裂去皮臍乾薑炮各一兩乾蝎去土微炒一分右銼如麻豆每服二錢水半盞入酒半盞蔥白二寸鹽少許同煎至六分去滓食前熱服卒轉筋者熱酒煎服肝風毒流注入腳膝筋脈疼痛附論夫肝主於筋而藏於血臟腑和平榮衛調適表裏充實則邪不能侵也若肝氣久虛腎臟衰冷則風邪乘虛乃攻摶於筋脈流注腳膝故令疼痛也方海桐皮散出聖惠方治肝臟風毒流注腳膝筋脈拘急疼痛不可忍海桐皮一兩銼附子炮裂去皮臍赤箭桂心牛膝去苗防風去蘆頭石斛去根銼獨活各五錢當歸三分銼微炒仙靈脾酸棗仁微炒羚羊角屑芎藭木香五加皮赤芍藥細辛各五錢檳榔一兩枳殼五錢麩炒微黃去瓤甘草一分炙赤銼右為散每服四錢以水酒各半中盞煎至六分去滓於食前溫服忌豬魚酒蒜等物酸棗仁散出聖惠方治肝臟風流注腰腳疼痛筋脈不利行立無力酸棗仁一兩半微炒獨活半兩牛膝一兩去苖萆薢半兩桂心一兩仙靈脾一兩山茱茰半兩芎藭半兩赤箭一兩甘菊花半兩海桐皮半兩虎脛骨一兩塗醋炙令黃羚羊角屑半兩骨碎補半兩側子一兩炮裂去皮臍桑寄生半兩木香半兩麝香一分細研入右為細散研入麝香令勻每服二錢溫酒調下食前服豆淋酒側子丸出聖惠方治肝臟風毒流注腳膝筋脈拘急疼痛及四肢緩弱無力行履不得黑豆一升炒微熟入酒五升煎二三十沸濾過去滓煎令稠側子三分炮裂去臍皮石楠葉牛膝去苖防風去蘆頭石斛去根銼肉桂去皺皮萆薢銼麻黃去根節羌活海桐皮銼赤茯苓茵芋獨活天麻當歸銼微炒各半兩烏蛇一兩酒浸去皮骨炙令微黃右為細散以黑豆煎和搗一二百杵丸如梧桐子大每服食前溫酒下三十丸忌豬肉毒魚等一名石楠丸有附無側子野葛膏出聖惠方治肝臟風毒流注腳膝筋脈攣急疼痛野葛銼蛇銜犀角屑川烏頭去皮臍桔梗去蘆頭茵芋防風去蘆頭川椒去目乾薑各二兩巴豆三十粒去殼川升麻細辛當歸附子去皮臍羌活川大黃雄黃研如粉各二兩右藥細銼似酒五升漬藥一宿以不水豬膏五斤以前藥同於鐺中炭火上煎之令藥色變黃又勿令燋黑成膏絞去