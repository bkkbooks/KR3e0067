中用盖子合了竹簽定之飯上蒸三四次爛成膏子每服三五匙地黄酒化下生地黄汁半盞無灰上醖二盞和之用一中盞煖熱化膏本事方云有人患此病自午後發黄昏時定予曰此患必先從足起經言十二經絡各有筯惟足少陰之筯自足至頂大抵筯者肝之合也日中至黄昏天之陽陽中之隂也又曰陽中之隂肺也自離至兊隂旺陽弱之時故靈寳卑法云離至乾腎氣絶而肝氣弱肝腎二臟受隂氣故發於是時予授此方二服而愈烏頭丸出聖濟總録治肝筯急轉筯舒展不能草烏頭用鹽水浸三日取出洗切麩炒令麩焦去麩用荆芥穂各八兩右為細末别用宣州木𤓰二枚炊熟去皮瓤入前藥杵令勻用酒煮麫糊丸如梧桐子大每服三十丸加至五十丸食前木𤓰湯下日三薏苡仁湯治肝虚筯脉不利腹急筯見脇肋脹滿薏苡仁防風去义肉桂去粗皮當歸切焙各一兩酸棗仁炒二分白茯苓去黑皮海桐皮萆薢各五錢芎藭二錢右㕮咀如麻荳大每服三錢水一盞半煎至八分去滓温服不拘時候治筯骨攣急本草用秫米一石麯三十觔和地黄一觔茵陳蒿一觔炙令黄依釀酒法服之栢子仁丸出聖恵方治肝虚寒筯急腹滿指脹面色青黄背膞酸疼羸痩無力栢子仁黄耆剉白茯苓去黒皮楮實覆盆子五味子附子炮裂去皮臍石斛去根酸棗仁炒鹿茸酥炙去毛肉桂去粗皮白术沉香剉枳實麩炒熟乾地黄焙各二兩右為末煉蜜和搗二三百杵丸如梧桐子大每服三十丸空心及晩食前忌生冷油膩活湯一方白茯苓散治肝臟風筯脉成疹腹肋急痛口眼偏斜四肢疼痛聖恵方羌活去蘆頭白术麻黄去根節煮掠去沫焙側子炮裂去皮臍丹参當歸剉炒防風去义萆薢羚羊角鎊屑各三分白茯苓去黑皮肉桂去粗皮各五錢右剉為麻荳每服三錢水一盞生薑三片煎至七分去滓温服不拘時候茯苓湯治肝氣不足筋脉急見心腹壅滯左脇妨脹不思飲食白茯苓去黑皮前胡去蘆頭白术鱉甲塗醋炙黄去裙襴沉香剉黄耆剉各一兩肉桂去粗皮枳實麩炒黄各五錢生乾地黄五味子各三分右搗篩每服三錢水一盞生薑三片煎至七分去滓温服不拘時忌莧菜搓滚舒筯法用大竹筒長一尺許兩頭通一杖子穿過以䋲繫兩頭於坐椅上每坐則以脚踏竹筒上以脚搓滚之勿計功程兩日便覺骨寛暢試猛伸脚足與常日差逺不越兩月病筯當伸治結筯本草以杓打人上身結筯二下筯散矣筯極附論夫筯極者主肝也肝應於筯筯與肝合肝有病從筯而生又曰以春遇風為筯痺痺不已復感於邪内舎於肝陽氣入於内隂氣出於外若出於外為風風虚則筯虚筋虚則喜悲其色青蒼見於眼下若傷寒則筯不能動十指甲皆痛好轉筯其源以春甲乙日傷風風在筯為肝風也若陽氣内發發則筯實實則好怒肝傷熱則欬欬則脇下痛不可轉動又脚下滿痛故曰肝實風也筯絶不治九日死何以知之手足爪甲青黑呼罵不息者是也筯應足厥隂厥隂氣絶則筯急厥隂者肝脉也與筯合聚於隂氣而脉絡於舌本脉不榮則筯急筯急則引卵縮舌卷則筯先絶於庚日篤辛日死方羌活散出聖恵方治筋極風冷所傷攣痺不仁宜服羌活天麻各一兩芎藭三分酸棗仁㣲炒一兩鹿角膠一兩搗碎炒令黄燥五加皮二分薏苡仁麻黄各一兩去根節萆薢剉羚羊角屑人参去蘆頭白附子炮裂各三分牛膝一兩去苗秦芃三分去苖烏蛇肉酒浸炙令黄肉桂去粗皮各一兩羚羊角茵芋各三分側子一兩炮裂去皮臍地骨皮栢子仁各三分防風一兩去蘆頭右搗羅為細散每服空心及晩食前以豆淋酒調下一錢桑枝酸棗仁煎出聖恵方治筯極身體拘急四肢疼痛行履不得宜服酸棗仁三兩一半炒令熟一半生用羚羊角屑一兩海桐皮二兩剉羌活二兩仙靈脾赤箭各一兩萆薢一兩剉杜仲一兩去粗皮炒虎脛骨一兩半塗酥炙黄防風一兩去蘆頭石斛一兩半去根剉牛膝去苗巴㦸附子炮裂去皮臍木香生乾地黄各一兩蜜四兩真酥一兩桑枝一握長一尺剉右除酥蜜桑枝外搗羅為散用清酒七升煎桑枝令色㣲黄去桑枝後入藥末更煎一二十沸次下酥蜜煎成膏子㸔稀稠得所磁合盛每服食前以温酒調下一茶匙天䧺丸出聖恵方治筋極身體拘急脇下多痛不可轉動指節筯脉不利方見本門筋虚極類五加皮散出聖恵方治筯極肢節拘急攣縮疼痛五加皮茵芋防風去蘆頭各一兩天南星五錢炮裂白花蛇二兩酒浸炙黄取肉天䧺炮裂去皮臍白殭蚕㣲炒乾蝎㣲炒各一兩蜂兒五錢㣲炒桂心三分酸棗仁一兩㣲炒當歸三分麻黄一兩去根節甘草五錢炙㣲赤剉乾薑五錢炮裂剉右搗羅為細散每於食前以煖酒調下一錢地黄丸出本事方治筯極養血熟乾地黄十分頑荆一分山茱茰五分黑狗脊炙地膚子白术乾漆蠐螬乾之炙天䧺車前子各三分萆薢山芋澤㵼牛膝各一兩右為細末煉蜜和杵如梧桐子大每服五十丸空心臨卧温酒下羚羊角散出聖恵方治筯極四肢拘急頭頂強直爪甲多青脇肋脹痛宜服羚羊角屑五加皮各一兩防風三分去蘆頭酸棗仁一兩炒赤茯苓當歸桂心各三分桃仁三分湯浸去皮尖雙仁炒黄枳實五錢麩炒黄芎藭㯽榔各三分甘草五錢炙赤剉右搗篩為散每服四錢以水一中盞生薑三片煎至六分去滓温服不拘時候黄耆散出聖恵方治筯極則筋急多怒口乾熱燥不已宜調脉解煩黄耆剉酸棗仁炒各二兩桂心一兩石膏三兩木通剉赤芍藥各三兩黄芩柘白皮剉羚羊角屑各一兩右粗搗羅為散每服四錢水一中盞煎至六分去滓温服不拘時候乾地黄丸治筯極益筯骨除四肢疼痛方見本門筋虚極類肝實極方丹参散出千金方治筯實極則兩脚下滿而痛不得逺行脚心如割筯㫁打痛不可忍者丹参三兩芎藭杜仲續㫁地骨皮二兩乾地黄當歸通草升麻麥門冬禹餘糧麻黄各一兩十八銖甘草桂心一兩六銖生薑切炒乾焦牡蠣各二兩五錢右為散以絹袋子盛二方寸七以井花冷水二升煮袋子煮取一升頓服日二地黄煎出千金方治足厥隂經有餘筋實極足下滿痛四肢筋急地黄生取汁六升天門冬生取汁三升醇酒一升生薑取汁白蜜鹿髓牛膝棗煮去皮研成膏各三合石斛去根黄耆剉各一兩茯神去木一分半枳殻炒去瓤芎藭各三分甘草一兩炙已上六味並搗為末右先將地黄天門冬酒三物用慢火煎减半次下薑汁酥髓再煎减半次下棗膏蜜煎如稠糖候小冷内石斛等六味藥末於銅器中重湯上熬勿住手攪候可丸即取出丸如梧桐子大每服三十丸温酒下空心食前日三服煎藥須用銀石等器地黄煎出千金方治筋實極手足爪甲或青或黄或黑烏黯四肢筋急悶滿生地黄汁三升生葛汁生𤣥参汁各一升大黄升麻各二兩麻黄梔子仁犀角各三兩石膏五兩芍藥四兩右㕮咀以水七升先煮七物取二升去滓次下地黄汁煎一兩沸次下葛汁煎至三升分二服日再黄耆湯治筋實極多怒口乾煩躁不定調筋止怒定氣黄耆剉芎藭白柘皮無刺者剉一兩半白术木通剉炒黄芍藥各二兩肉桂去粗皮甘草炙剉各一兩石膏碎四兩右搗篩每服三錢水一盞棗二枚去核竹葉七片煎至七分去滓温服空心一服日晩再服羚羊角湯治筋實極頭頂强急多怒嗌乾爪甲青脇肋脹痛羚羊角鎊屑五加皮剉酸棗仁炒各一兩防風去叉赤茯苓去黑皮芎藭當歸切焙㯽榔剉肉桂去粗皮桃仁湯浸去皮尖雙仁麸炒黄各三兩枳實麩炒黄甘草炙剉各五錢右搗篩每服三錢水一盞生薑三片煎至七分去滓温服不拘時候犀角地黄湯出三因方治筋實極欬而兩脇下痛不可轉動脚下滿不得逺行脚心痛不可忍手足爪甲青黑四肢筋急悶生地黄犀角鎊各一兩乾葛𤣥参梔子仁升麻各三分大黄五錢蒸芍藥一兩五錢右判為散每服四錢水一盞煎至七分去滓不拘時服惡寒體痛加麻黄頭疼加膏煎半兩五加皮湯濟生方治筋實極欬則兩脇下痛不可轉動脚下滿不得逺行脚心痛不可忍手足𤓰甲青黑四肢筋急煩滿羗活去蘆頭羚羊角鎊赤芍藥防風去义五加皮洗秦艽去蘆枳實去瓤麩炒甘草各五錢右㕮咀每服四錢水一盞半薑五片煎至八分去滓温服不拘時候橘皮通氣湯出千金方治筋實極則欬欬則兩脇下痛甚則不可轉動橘皮四兩白术石膏五兩細辛當歸桂心茯苓各三兩香豉一升右㕮咀以水九升煮取三升去滓分三服筋虛極人参酒一名烏麻酒治筋虚極則筋不能轉十指𤓰皆痛數轉筋勞房或病未平復入房傷氣筋絶舌捲唇青隂縮胻脉疼急腹中絞痛或便欲絶不能飲食好悲思四肢嘘吸脚手拘攣出千金方人参防風茯苓細辛秦椒黄耆當歸牛膝桔梗各一兩五錢乾地黄丹参薯蕷鍾乳礬石各三兩山茱茰芎藭各三兩白术麻黄各二兩五錢大棗三十枚五加皮一升生薑切炒乾烏麻碎各二升右㕮咀鍾乳别以小袋子盛清酒二斗半浸五宿温服三日再不知随意增進一本無烏麻用杜仲一兩五錢蓯蓉丸治肝經風虚筋極急痛壯筋骨肉蓯蓉酒浸焙切兎絲子酒浸焙切牛膝酒浸焙切白术細辛去苗葉何首烏去黑皮炒續㫁枸把子巴天㦸去心山芋菖蒲車前子菊花補骨脂炒逺志去心地骨皮覆盆子熟乾地黄焙右等分為末煉蜜和丸如梧桐子大每服三十丸空心食前酒下天䧺丸治筋虚極善悲色青感於寒濕則筋不能動十指皆痛天䧺炮裂去皮臍一兩肉桂去粗皮羗活去蘆頭當歸切焙五加皮剉天麻芎藭各三兩酸棗仁炒陳橘皮酒浸去白焙續㫁石斛去根赤茯苓去黑皮鹿角膠炒令燥薏苡仁牛膝酒浸焙切木香㯽榔剉各一兩右為末煉蜜和杵三百下丸如梧桐子大每服三十丸荆芥酒下食前温服五加皮酒出千金方治筋虚極筋痺好思顔色蒼白手足拘攣五加皮一斤薏苡仁八兩枳刺二斤大麻仁三斤猪椒根皮丹参八兩乾薑芎藭五兩桂心當歸甘草三兩天雄秦椒白鮮通草四兩右㕮咀以絹袋盛清酒四斗漬春夏四日秋冬六七日初服六七合稍稍加以知為度牛膝湯治筋虚極筋縮不能轉腰脊不能伸苦痛或為脚氣者牛膝酒浸切焙防風去叉甘李根皮炙剉丹参前胡去蘆頭石斛去根各二兩半杜仲去粗皮塗酥炙秦芃去苗土續㫁鱉甲去裙襴醋炙各一兩五錢陳橘皮湯浸去白焙一兩大麻仁搗研五錢旋入右除大麻仁外粗搗篩每服五錢用水一盞半煎五七沸去滓下麻仁少許更煎至一盞分二服空心一服食後再服木𤓰散醫方大成治筋虚極好悲思脚手拘攣伸動縮急腹内轉痛十指甲痛數轉筋甚則舌捲卵縮唇青面色蒼白不得飲食木𤓰去穣虎脛骨酥炙五加皮洗當歸去蘆酒浸桑寄生人参酸棗仁炒栢子仁炒黄耆去蘆各一兩甘草炙五錢右㕮咀每服四錢水一盞半薑五片煎至七分去滓温服不拘時候乾地黄丸出聖恵方治筋虚極益筋骨除四肢疼痛熟地黄二兩焙酸棗仁炒研一兩栢子仁研山茱茰牛膝酒浸切焙各一兩右為末煉蜜和杵二三百下丸如梧桐子大每服三十丸空心食前温酒下沒藥散治筋虚極骨冷干冒邪氣走注疼痛没藥研虎骨躑躅花各一兩附子炮裂去皮臍烏頭炮裂去皮草烏頭剉炒各五錢右除没藥研外用酒一升浸一宿焙乾將虎骨以酥别炙同搗羅為末并没藥和勻每服一錢温酒調下白术湯治筋虚脬轉急滿白术木通細剉炒各二兩梔子仁黄芩去黑心赤茯苓去黑皮各一兩榆白皮炙剉一兩五錢右粗搗篩每服五錢水一盞半煎至一盞去滓分二服空心一服食後一服人参湯治筋虚極脬轉臍下急痛或因霍亂或因服藥吐利過度而得者人参厚朴去粗皮生薑汁炙各一兩五錢白术二兩蓼子一握莖葉乾者右粗搗篩每服五錢以水一盞半入葱白一寸煎至一盞去滓分二服空心一服日晚一服治筋絶右熬蟹腦足髓内瘡中筋即續普濟方卷十五
