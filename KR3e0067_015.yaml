中用蓋子合了竹簽定之飯上蒸三四次爛成膏子每服三五匙地黃酒化下生地黃汁半盞無灰上醖二盞和之用一中盞暖熱化膏本事方云有人患此病自午後發黃昏時定豫曰此患必先從足起經言十二經絡各有筯惟足少陰之筯自足至頂大抵筯者肝之合也日中至黃昏天之陽陽中之隂也又曰陽中之隂肺也自離至兊隂旺陽弱之時故靈寶卑法云離至乾腎氣絶而肝氣弱肝腎二臟受隂氣故發於是時豫授此方二服而愈烏頭丸出聖濟總録治肝筯急轉筯舒展不能草烏頭用鹽水浸三日取出洗切麩炒令麩焦去麩用荆芥穗各八兩右為細末别用宣州木瓜二枚炊熟去皮瓤入前藥杵令勻用酒煮麵糊丸如梧桐子大每服三十丸加至五十丸食前木瓜湯下日三薏苡仁湯治肝虛筯脈不利腹急筯見脅肋脹滿薏苡仁防風去義肉桂去粗皮當歸切焙各一兩酸棗仁炒二分白茯苓去黑皮海桐皮萆薢各五錢芎藭二錢右㕮咀如麻豆大每服三錢水一盞半煎至八分去滓溫服不拘時候治筯骨攣急本草用秫米一石麯三十斤和地黃一斤茵陳蒿一斤炙令黃依釀酒法服之柏子仁丸出聖惠方治肝虛寒筯急腹滿指脹面色青黃背膞酸疼羸瘦無力柏子仁黃耆銼白茯苓去黑皮楮實覆盆子五味子附子炮裂去皮臍石斛去根酸棗仁炒鹿茸酥炙去毛肉桂去粗皮白术沉香銼枳實麩炒熟乾地黃焙各二兩右為末煉蜜和搗二三百杵丸如梧桐子大每服三十丸空心及晚食前忌生冷油膩活湯一方白茯苓散治肝臟風筯脈成疹腹肋急痛口眼偏斜四肢疼痛聖惠方羌活去蘆頭白术麻黃去根節煮掠去沫焙側子炮裂去皮臍丹參當歸銼炒防風去義萆薢羚羊角鎊屑各三分白茯苓去黑皮肉桂去粗皮各五錢右銼為麻豆每服三錢水一盞生薑三片煎至七分去滓溫服不拘時候茯苓湯治肝氣不足筋脈急見心腹壅滯左脅妨脹不思飲食白茯苓去黑皮前胡去蘆頭白术鱉甲塗醋炙黃去裙襴沉香銼黃耆銼各一兩肉桂去粗皮枳實麩炒黃各五錢生乾地黃五味子各三分右搗篩每服三錢水一盞生薑三片煎至七分去滓溫服不拘時忌莧菜搓滚舒筯法用大竹筒長一尺許兩頭通一杖子穿過以繩繫兩頭於坐椅上每坐則以腳踏竹筒上以腳搓滚之勿計功程兩日便覺骨寬暢試猛伸腳足與常日差逺不越兩月病筯當伸治結筯本草以杓打人上身結筯二下筯散矣筯極附論夫筯極者主肝也肝應於筯筯與肝合肝有病從筯而生又曰以春遇風為筯痺痺不已復感於邪內舍於肝陽氣入於內隂氣出於外若出於外為風風虛則筯虛筋虛則喜悲其色青蒼見於眼下若傷寒則筯不能動十指甲皆痛好轉筯其源以春甲乙日傷風風在筯為肝風也若陽氣內發發則筯實實則好怒肝傷熱則咳咳則脅下痛不可轉動又腳下滿痛故曰肝實風也筯絶不治九日死何以知之手足爪甲青黑呼罵不息者是也筯應足厥隂厥隂氣絶則筯急厥隂者肝脈也與筯合聚於隂氣而脈絡於舌本脈不榮則筯急筯急則引卵縮舌卷則筯先絶於庚日篤辛日死方羌活散出聖惠方治筋極風冷所傷攣痺不仁宜服羌活天麻各一兩芎藭三分酸棗仁微炒一兩鹿角膠一兩搗碎炒令黃燥五加皮二分薏苡仁麻黃各一兩去根節萆薢銼羚羊角屑人參去蘆頭白附子炮裂各三分牛膝一兩去苗秦芃三分去苖烏蛇肉酒浸炙令黃肉桂去粗皮各一兩羚羊角茵芋各三分側子一兩炮裂去皮臍地骨皮柏子仁各三分防風一兩去蘆頭右搗羅為細散每服空心及晚食前以豆淋酒調下一錢桑枝酸棗仁煎出聖惠方治筯極身體拘急四肢疼痛行履不得宜服酸棗仁三兩一半炒令熟一半生用羚羊角屑一兩海桐皮二兩銼羌活二兩仙靈脾赤箭各一兩萆薢一兩銼杜仲一兩去粗皮炒虎脛骨一兩半塗酥炙黃防風一兩去蘆頭石斛一兩半去根銼牛膝去苗巴戟附子炮裂去皮臍木香生乾地黃各一兩蜜四兩真酥一兩桑枝一握長一尺銼右除酥蜜桑枝外搗羅為散用清酒七升煎桑枝令色微黃去桑枝後入藥末更煎一二十沸次下酥蜜煎成膏子看稀稠得所磁合盛每服食前以溫酒調下一茶匙天雄丸出聖惠方治筋極身體拘急脅下多痛不可轉動指節筯脈不利方見本門筋虛極類五加皮散出聖惠方治筯極肢節拘急攣縮疼痛五加皮茵芋防風去蘆頭各一兩天南星五錢炮裂白花蛇二兩酒浸炙黃取肉天雄炮裂去皮臍白殭蠶微炒乾蝎微炒各一兩蜂兒五錢微炒桂心三分酸棗仁一兩微炒當歸三分麻黃一兩去根節甘草五錢炙微赤銼乾薑五錢炮裂銼右搗羅為細散每於食前以暖酒調下一錢地黃丸出本事方治筯極養血熟乾地黃十分頑荆一分山茱茰五分黑狗脊炙地膚子白术乾漆蠐螬乾之炙天雄車前子各三分萆薢山芋澤㵼牛膝各一兩右為細末煉蜜和杵如梧桐子大每服五十丸空心臨卧溫酒下羚羊角散出聖惠方治筯極四肢拘急頭頂強直爪甲多青脅肋脹痛宜服羚羊角屑五加皮各一兩防風三分去蘆頭酸棗仁一兩炒赤茯苓當歸桂心各三分桃仁三分湯浸去皮尖雙仁炒黃枳實五錢麩炒黃芎藭檳榔各三分甘草五錢炙赤銼右搗篩為散每服四錢以水一中盞生薑三片煎至六分去滓溫服不拘時候黃耆散出聖惠方治筯極則筋急多怒口乾熱燥不已宜調脈解煩黃耆銼酸棗仁炒各二兩桂心一兩石膏三兩木通銼赤芍藥各三兩黃芩柘白皮銼羚羊角屑各一兩右粗搗羅為散每服四錢水一中盞煎至六分去滓溫服不拘時候乾地黃丸治筯極益筯骨除四肢疼痛方見本門筋虛極類肝實極方丹參散出千金方治筯實極則兩腳下滿而痛不得逺行腳心如割筯斷打痛不可忍者丹參三兩芎藭杜仲續斷地骨皮二兩乾地黃當歸通草升麻麥門冬禹餘糧麻黃各一兩十八銖甘草桂心一兩六銖生薑切炒乾焦牡蠣各二兩五錢右為散以絹袋子盛二方寸七以井花冷水二升煮袋子煮取一升頓服日二地黃煎出千金方治足厥隂經有餘筋實極足下滿痛四肢筋急地黃生取汁六升天門冬生取汁三升醇酒一升生薑取汁白蜜鹿髓牛膝棗煮去皮研成膏各三合石斛去根黃耆銼各一兩茯神去木一分半枳殼炒去瓤芎藭各三分甘草一兩炙已上六味並搗為末右先將地黃天門冬酒三物用慢火煎減半次下薑汁酥髓再煎減半次下棗膏蜜煎如稠糖候小冷內石斛等六味藥末於銅器中重湯上熬勿住手攪候可丸即取出丸如梧桐子大每服三十丸溫酒下空心食前日三服煎藥須用銀石等器地黃煎出千金方治筋實極手足爪甲或青或黃或黑烏黯四肢筋急悶滿生地黃汁三升生葛汁生玄參汁各一升大黃升麻各二兩麻黃梔子仁犀角各三兩石膏五兩芍藥四兩右㕮咀以水七升先煮七物取二升去滓次下地黃汁煎一兩沸次下葛汁煎至三升分二服日再黃耆湯治筋實極多怒口乾煩躁不定調筋止怒定氣黃耆銼芎藭白柘皮無刺者銼一兩半白术木通銼炒黃芍藥各二兩肉桂去粗皮甘草炙銼各一兩石膏碎四兩右搗篩每服三錢水一盞棗二枚去核竹葉七片煎至七分去滓溫服空心一服日晚再服羚羊角湯治筋實極頭頂強急多怒嗌乾爪甲青脅肋脹痛羚羊角鎊屑五加皮銼酸棗仁炒各一兩防風去叉赤茯苓去黑皮芎藭當歸切焙檳榔銼肉桂去粗皮桃仁湯浸去皮尖雙仁麩炒黃各三兩枳實麩炒黃甘草炙銼各五錢右搗篩每服三錢水一盞生薑三片煎至七分去滓溫服不拘時候犀角地黃湯出三因方治筋實極咳而兩脅下痛不可轉動腳下滿不得逺行腳心痛不可忍手足爪甲青黑四肢筋急悶生地黃犀角鎊各一兩乾葛玄參梔子仁升麻各三分大黃五錢蒸芍藥一兩五錢右判為散每服四錢水一盞煎至七分去滓不拘時服惡寒體痛加麻黃頭疼加膏煎半兩五加皮湯濟生方治筋實極咳則兩脅下痛不可轉動腳下滿不得逺行腳心痛不可忍手足瓜甲青黑四肢筋急煩滿羌活去蘆頭羚羊角鎊赤芍藥防風去義五加皮洗秦艽去蘆枳實去瓤麩炒甘草各五錢右㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候橘皮通氣湯出千金方治筋實極則咳咳則兩脅下痛甚則不可轉動橘皮四兩白术石膏五兩細辛當歸桂心茯苓各三兩香豉一升右㕮咀以水九升煮取三升去滓分三服筋虛極人參酒一名烏麻酒治筋虛極則筋不能轉十指瓜皆痛數轉筋勞房或病未平復入房傷氣筋絶舌捲唇青隂縮胻脈疼急腹中絞痛或便欲絶不能飲食好悲思四肢噓吸腳手拘攣出千金方人參防風茯苓細辛秦椒黃耆當歸牛膝桔梗各一兩五錢乾地黃丹參薯蕷鍾乳礬石各三兩山茱茰芎藭各三兩白术麻黃各二兩五錢大棗三十枚五加皮一升生薑切炒乾烏麻碎各二升右㕮咀鍾乳别以小袋子盛清酒二斗半浸五宿溫服三日再不知隨意增進一本無烏麻用杜仲一兩五錢蓯蓉丸治肝經風虛筋極急痛壯筋骨肉蓯蓉酒浸焙切兔絲子酒浸焙切牛膝酒浸焙切白术細辛去苗葉何首烏去黑皮炒續斷枸把子巴天戟去心山芋菖蒲車前子菊花補骨脂炒逺志去心地骨皮覆盆子熟乾地黃焙右等分為末煉蜜和丸如梧桐子大每服三十丸空心食前酒下天雄丸治筋虛極善悲色青感於寒濕則筋不能動十指皆痛天雄炮裂去皮臍一兩肉桂去粗皮羌活去蘆頭當歸切焙五加皮銼天麻芎藭各三兩酸棗仁炒陳橘皮酒浸去白焙續斷石斛去根赤茯苓去黑皮鹿角膠炒令燥薏苡仁牛膝酒浸焙切木香檳榔銼各一兩右為末煉蜜和杵三百下丸如梧桐子大每服三十丸荆芥酒下食前溫服五加皮酒出千金方治筋虛極筋痺好思顔色蒼白手足拘攣五加皮一斤薏苡仁八兩枳刺二斤大麻仁三斤豬椒根皮丹參八兩乾薑芎藭五兩桂心當歸甘草三兩天雄秦椒白鮮通草四兩右㕮咀以絹袋盛清酒四斗漬春夏四日秋冬六七日初服六七合稍稍加以知為度牛膝湯治筋虛極筋縮不能轉腰脊不能伸苦痛或為腳氣者牛膝酒浸切焙防風去叉甘李根皮炙銼丹參前胡去蘆頭石斛去根各二兩半杜仲去粗皮塗酥炙秦芃去苗土續斷鱉甲去裙襴醋炙各一兩五錢陳橘皮湯浸去白焙一兩大麻仁搗研五錢旋入右除大麻仁外粗搗篩每服五錢用水一盞半煎五七沸去滓下麻仁少許更煎至一盞分二服空心一服食後再服木瓜散醫方大成治筋虛極好悲思腳手拘攣伸動縮急腹內轉痛十指甲痛數轉筋甚則舌捲卵縮唇青面色蒼白不得飲食木瓜去穰虎脛骨酥炙五加皮洗當歸去蘆酒浸桑寄生人參酸棗仁炒柏子仁炒黃耆去蘆各一兩甘草炙五錢右㕮咀每服四錢水一盞半薑五片煎至七分去滓溫服不拘時候乾地黃丸出聖惠方治筋虛極益筋骨除四肢疼痛熟地黃二兩焙酸棗仁炒研一兩柏子仁研山茱茰牛膝酒浸切焙各一兩右為末煉蜜和杵二三百下丸如梧桐子大每服三十丸空心食前溫酒下沒藥散治筋虛極骨冷干冒邪氣走注疼痛沒藥研虎骨躑躅花各一兩附子炮裂去皮臍烏頭炮裂去皮草烏頭銼炒各五錢右除沒藥研外用酒一升浸一宿焙乾將虎骨以酥别炙同搗羅為末并沒藥和勻每服一錢溫酒調下白术湯治筋虛脬轉急滿白术木通細銼炒各二兩梔子仁黃芩去黑心赤茯苓去黑皮各一兩榆白皮炙銼一兩五錢右粗搗篩每服五錢水一盞半煎至一盞去滓分二服空心一服食後一服人參湯治筋虛極脬轉臍下急痛或因霍亂或因服藥吐利過度而得者人參厚朴去粗皮生薑汁炙各一兩五錢白术二兩蓼子一握莖葉乾者右粗搗篩每服五錢以水一盞半入蔥白一寸煎至一盞去滓分二服空心一服日晚一服治筋絶右熬蟹腦足髓內瘡中筋即續普濟方卷十五
