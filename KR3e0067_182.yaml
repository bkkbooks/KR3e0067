body:
  text: 普濟方卷一百八十二明周王朱橚撰諸氣門一切氣推氣丸出危氏方治三焦痞塞氣不升降胸膈脹滿大便祕澀小便赤黃大黃陳皮檳榔黃芩枳實小者去穰右為細末煉蜜為丸如梧子大臨卧溫熱水下一百丸更量虛實加減生薑湯自然汁煮糊丸養氣丸醫方集成治一切氣疾調脾胃進飲食理虛滑㵼痢白术丁香各半兩厚朴刮去皮同生薑同杵碎焙乾各等分大麥蘖微炒蘖淨白豆䓻去皮稱肉神麴炒茴香微炒各一兩甘草好者炙訶子炮去皮川乾薑炮若無麩薑亦可各半兩右為細末麵糊和丸如菉豆大每服三十丸或五十丸食前人參湯下青娥丸出仁齋直指方治氣滯不散兼治腰痛胡桃二十箇去皮殼蒜四兩熬膏破故紙酒浸炒八兩杜仲十六兩去皮薑汁浸炒右為細末蒜膏為丸每服三十丸空心溫酒下婦人淡醋湯下常服壯筋骨活血脈烏髭鬚益顔色一方無蒜香橘湯出仁齋直指方治七情所傷中脘不快腹脅脹滿香附子炒半夏製橘紅各二兩甘草炙三分右銼為散每服三錢薑五片棗二枚煎服桔梗枳殼湯直指方治諸氣痞結滿悶桔梗三兩製枳殼二兩甘草炒半兩右銼為散每服水盞半薑五片煎至半盞溫服橘皮一物湯直指方治諸氣攻刺及感受風寒暑濕初證又凡酒食所傷中脘滯滿嘔吐吞酸右用陳橘皮洗淨新汲水煎服分心氣飲直指方治憂思鬱怒諸氣痞滿停滯通利大小便紫蘇莖三兩半夏製枳殼製各一兩半青皮去皮陳橘紅大腹皮桑白皮木通去節赤茯苓南木香檳榔蓬莪术煨麥門冬去心桔梗辣桂藿香各一兩香附一兩甘草炙一兩三分右銼為散每服三錢水一盞薑三片棗二枚燈心十莖煎七分不拘時服昔日瘴瘧經年虛腫腹脹食不知飽以此藥吞溫白丸初則小便數次後則大便盡通其病頓愈調降湯出百一選方升降氣治壅人參黃耆蜜炙陳皮去白白芍藥白茯苓甘草各等分右為粗末每服三錢水一盞半煎至八分去滓通口服不拘時候有痰加半夏生薑清頭目加川芎氣壅加蘇子煎服導氣丸出百一選方治虛陽上攻氣滯不快上盛下虛膈痰壅食咽乾不利咳嗽中滿喘急氣粗臍腹膨脹滿悶虛煩微渴引飲及頭目昏眩腰痛腳弱四肢倦怠此藥專治腳氣上攻中滿急下元虛冷服藥不瘥者飲之立效木香三兩蓽澄茄四兩橘皮一兩研生薑一兩同研成麵牽牛一兩取研末右為末麵糊丸如梧子大每服三十丸蘿蔔湯下食後服萬和散百一選方治男子婦人一切氣刺氣悶氣脹食傷風悶亂臭及中毒積滯兩脅臍下四肢攻注宿有氣疾心腹痞塞嘔吐不思飲食傷風悶亂臭出青水夜多盜汗漸成瘦弱腸滑水㵼不止等疾茴香炒蘿蔔子生官桂去粗皮蓬莪术濕紙裹煨各一兩香白芷一兩半陳皮一兩一分去稂大麥蘖一分乾薑三分煨甘草三分一兩炙白术米泔浸一宿桔梗半兩三稜三兩半用濕紙裹煨牽牛子炒過熱不妨半兩右為細末每服一錢水八分至六分和滓稍熱服或棗煎為湯點服亦得婦人血氣入當歸少許心痛炒茴香酒調下中毒熱酒調下小兒久㵼不止及㵼後傷動胃氣不思飲食瘦悴並以一錢棗半枚水五分至四分熱服舒筋散治血脈凝滯經絡拘攣肢節疼痛行步艱難此藥和血化氣玄胡索當歸官桂右等分為末每服二錢溫酒調下食前服一方加橘皮丸順氣散此藥能溫內外但內外感寒脈遲細沈伏手冷毛髮恂栗傷寒裏證之類大啜三兩杯當手足溫或汗乃愈治氣極效一切氣通血絡及氣虛痰盛不得睡卧并脾胃冷停痰作痛烏頭二兩天南星附子並炮各一兩木香半兩右為粗末每服三錢水一盞半薑七片煎至八分稍熱服昔紹熙辛亥耿侍郎微中服此而愈後唐仲舉因胃風濕手足緩弱略不能動伏枕已三日欲轉側須數人扶掖甚以為慮子令服此只三服次日履地脫然復元通氣散治諸氣澀閉耳聾頭疼腹癰瘡疽無頭一切刺痛和血內消瘡腫柴胡去白桂去粗皮桃仁去皮尖雙仁麩炒黃木香吳茱茰湯洗微炒乾薑炮製銼細辛去毛葉桔梗銼赤茯苓去黑皮芎窮各三分大黃銼炒二兩右為末煉蜜和搗五七百杵丸如梧桐子大每於食前以溫酒送下一十丸漸加至二十丸復元通氣散治氣滯不通肢節煩痛半身不遂口眼喎斜語言蹇澀諸風諸氣陳皮青皮去白各二兩白藥子一兩半半兩炒廣木香半兩甘草一兩八錢半生半熟江米五錢川山甲一兩三錢酥炙牡蠣燒半兩乳香半兩另研白殭蠶五錢右為末每服三錢酒調下病上食後病下食前如大便燥後服通氣丸一塊氣丸官桂半兩沈香四錢玄胡索半兩江子一兩去殼油蓬术半兩火炮錫灰四兩京三稜一兩炮去皮薑黃半兩南木香四錢香附子一兩醋浸砂仁半兩枳實半兩黑牽牛頭末半兩大麥芽四兩使江子炒史君子半兩去皮陳皮一兩去白檳榔半兩枳殼半兩蘿蔔子一兩江子炒青皮一兩半大黃半兩醋煮雷丸半兩白豆䓻半兩唐毬一兩半川烏二錢半火炒芫香一兩酒浸炒丁香半兩皂角斤半去皮醋浸胡椒一兩右為末酒糊丸如桐子大善治諸般病每服五錢七丸各隨湯次送下婦人一切血氣當歸酒下血崩燕子泥湯下小兒脫肛艾湯下小兒妳脾橘皮湯下小兒驚風一歲一丸薄荷湯下白痢薑湯下小兒脾積史君子豬膽蘆薈湯下赤痢甘草湯下一切吐逆生薑湯下心膈膨脹新水下下元冷好酒下風熱閉塞大小便不通井花水煎豆粉湯下婦人經脈不通紅花當歸酒下赤白帶下蔓荆子湯下血紅當歸酒下産前産後吳茱茰一兩重酒一升煎至二沸下血塊氣血等生薑橘皮入醋少許煎下常服者淡薑湯下小女經脈不通紅花當歸酒下男子小腸氣茴香湯下大忌有孕婦人不可服之忌一切熱物咳嗽烏梅湯下腰疼牽牛湯下傷寒蔥白湯下當歸順氣飲子治氣鬱不通咳嗽痰涎飲食無味久而飢瘦非脾熱之所然乎當以和中順氣大黃甘草各五錢人參去蘆芍藥當歸去土各一兩芒砂三錢枳殼去穰麩炒四錢右㕮咀作一服水二大甌煎至一大甌去滓空心溫服久病咳嗽潮熱將牛黃宣毒丸一百丸與當歸飲子同服沈香降氣丸木香半兩青皮去白陳皮去白枳殼去稂麩炒蓬术炮京三稜炮雞爪三稜炒桂半兩牽牛炒石三稜煨沈香半兩神麴一兩麥蘖一兩茯苓一兩去白半夏一兩洗丁香三錢右為末醋糊為丸如桐子大每服五十丸用生薑橘皮湯下不拘時候氣藥黃茋蒼术升麻各半兩人參陳皮神麴澤㵼各三錢甘草黃蘖酒浸當歸身麥門冬葛根各一錢青皮三個五味子四十五個右㕮咀分作五服水一盞煎至七分去滓稍熱服二香丸治積滯氣祕心腹刺痛中滿壅嗽南木香丁香青皮浸去白稂橘紅草果仁肉豆䓻生蓬术炮乘熱碎研縮砂仁各七錢半五靈脂香潤者另研用半兩右為細末用川巴豆肉半兩研如泥漸入藥末研和白麵稀糊丸麻子大候乾每服三丸加至五七丸生薑湯下壅嗽紫蘇薑煎湯下木香分氣飲調中快氣治心腹刺痛升降隂陽烏藥二兩木香不見火半兩甘草半兩陳皮一兩洗淨附子二兩去毛土一兩半淨枳殼一兩去稂半兩縮砂一兩去皮右㕮咀每服四錢水一盞半煎至八分去滓服降氣湯治虛陽上攻氣滯不快上盛下虛膈壅痰實咽乾不利咳嗽痞滿喘急氣粗腹臍膨脹滿悶虛煩微渴引飲頭目昏眩腰疼腳弱四肢倦怠腹肚㽱刺冷熱氣㵼大便祕澀壅滯不通肢體浮腫有妨飲食及治腳氣上攻中滿氣急更有下元虛冷并尊年氣虛之人素有上壅之患服補不得者用之大便祕者用此下黑錫養正丹等藥少年氣盛大便祕上壅脾胃素壯者此藥下神攻丸三黃丸治上壅咽疼者先用降氣湯下不效則服甘桔湯下用生甘草桔梗等分加荆芥數穗白水煎服半夏五兩一錢前胡去蘆甘草爁川當歸厚朴去粗皮薑汁拌炒各二兩肉桂去皮陳皮各三兩右為㕮咀并紫蘇子五兩微炒碾破須得真正細而香者共為八味每服四錢水一盞半生薑五片棗一枚煎至八分去滓不拘時候服如無真紫蘇只服參蘇飲亦佳凡人中風中氣痰飲腫滿並治之白芷一兩紅內消半兩木香半兩山慈姑一兩焙乾右為末每服二大錢空心鹽湯點服余鄉曲有一老醫數世習醫凡婦人氣疾唯慿此藥百發百中家有十口只以此藥養家治心腹惡氣用艾葉俗間亦生搗葉取汁飲之紅豆䓻丸出聖濟總録治一切氣飲食不消紅豆䓻去皮縮砂仁檳榔訶黎勒炮去皮木香藿香葉各一兩陳橘皮去白炒二兩胡椒一分蘹香子炒香一兩半蓽澄茄右為末以酒煮麵糊為丸如梧桐子大每服十丸空心食前薑湯送下麝香丸出聖濟總録治一切氣逆胸膈痞悶中脘不快痰癖留滯嘔吐惡心肢體倦怠不思飲食麝香細研丹砂細研木香厚朴去粗皮生薑五錢同搗乾肉豆䓻去殼各半兩檳榔末二兩乳香細研一兩半夏湯洗七次去滑别搗末用二兩丁香一分桂去粗皮三分右除半夏末搗研為細末再同研令勻將半夏末以生薑自然汁同煮為膏和丸如桐子大每服十五丸以陳橘皮湯下空心食前服之木香丸出聖濟總録治一切氣消食木香丹砂研硫黃研硇砂研各一分檳榔銼半兩肉豆䓻三枚半夏將水煮令透洗淨朗乾巴豆各一兩去心膜爛研出油盡右搗研和勻水浸蒸餅為丸如梧桐子大每服二丸溫棗湯下大人小兒以意加減桂心丸聖濟總録治諸氣疾及産後氣疾桂心去粗皮當歸銼焙赤芍藥延胡索炒芎窮各一兩硇砂半兩米醋五升生乾地黃炒一兩芫花根一升採洗了碎銼冬月右先以醋煮芫花根三分減二分去根入硇砂慢火煎又減半夏諸藥末為丸如雞頭子大産後血暈煩悶童子小便煎赤馬通磨下一丸産後血敗腰腳痛腫生薑童子小便磨下血氣衝心痛薄荷汁熱酒磨下血氣腹脹痛生地黃汁同熱磨下平常血氣蔥酒磨下引氣丸出聖濟總録治一切滯氣丹砂研安息香研麝香研各一分乳香研一兩白芥子三百六十粒炒大戟末一錢七分牛黃研半錢七分牽牛末一錢七分五靈脂研沒藥研各一兩班貓二十七枚去頭翅足研巴豆七粒去皮研出油右同研令勻用紅米飯為丸如麻子大臨時隨意湯使下藿香湯出聖濟總録治諸氣不調胸膈痞滯升降不勻藿香葉厚朴去粗皮生薑汁炙各一兩青橘皮湯浸去白焙甘草炙銼各三分桂去粗皮半兩乾薑炮枇杷葉炙去毛各一分右粗搗篩每服三錢水一盞入薑三片棗二枚劈煎至六分蜀椒丸出聖濟總録治諸氣積聚堅牢心腹脹痛蜀椒去目及閉口者炒出汗半兩人參半夏湯浸七次去滑菖蒲川山甲炮熟括􅌣根各二兩青皮四兩甘草三兩半炒一半生一半陳皮四兩右為細末每服二錢熱酒送下瘡無頭者津液調塗檳榔附子湯治積年患氣發作有時心腹絞痛忽然氣絶腹中堅實醫所不治腹胃有蟲檳榔大者四七次附子一枚甘草柴胡三兩生薑八兩橘皮半夏一升桂心當歸枳實各二兩右㕮咀以水一斗煮取三升分三服五日一劑服三劑七傷湯治諸氣和脾胃消宿飲治刺痛及治産後血氣不順疼痛益智一兩陳皮甘草鹽炒桔梗各三兩木香薑屑甘松各半兩荆三稜炮切廣茂炮各三兩青皮一兩半麥蘖炒黃五兩薑黃三錢右為末每服二錢點湯鹽下食前日進三服産後多先預備此湯啓中丸治三焦氣逆胸膈膨脹痞滿消宿飲進食南青皮黑牽牛半生半炒廣茂煨半夏各一兩生右為細末醋糊為丸如桐子大每服二十丸溫酒下食後日進二服檳榔丸治氣胸膈進飲食沖飲食沖飢膚療心腹疼痛消宿食酒飲停痞滯悶檳榔大者三枚牽牛三兩半生半麩炒甘草三兩陳皮去白二兩乾薑炮三兩青皮去白二兩右為細末醋糊丸如大豆大每服二十丸茶酒任下婦人心腹疼醋下男子茴香湯下溫中丸溫