小兒室女吼喘之患其效尤著切不可謂薄荷冷紫蘇耗氣麻黃發散不肯多服蓋病有主對服之不妨時間感冒頭重鼻塞或流清涕或作咳嗽並冝服此藥惟虛勞自汗人不可服之一方以降氣湯加川芎細辛桔梗茯苓共一十二味名大降氣湯治法一同老人氣虛上壅當間以生附加生薑等分煎臨熱以藥汁濃磨沈香再煎一沸服之為尤穩當若腳氣入腹大便祕澀不任冷藥者當用降氣湯咽養正丹以溫利之詳見養正丹方中腳氣之證人多不識若作他病治之入腹攻心為禍甚速千金論見食嘔吐或腹痛下痢或大小便祕或胸衝悖不欲見光明或精神昏憒言語錯亂或熱或冷轉筋或腫或不腫或背腿頑脾或緩縱變急或小腹不仁皆腳氣之證凡小覺有此急須治之稍緩則氣上入腹胸脅逆滿喘急自汗及嘔吐者皆不可治今人患腳氣者多因氣實而死終無服藥致虛而殂故腳氣人不得大補亦不得大㵼切不得最虛預止湯藥冝服降氣湯間以茱茰湯用檳榔二兩橘紅茱茰木瓜紫蘇各兩半㕮咀每服四錢薑十片煎服仍多服石南丸并木瓜湯以大便利為效此數藥用之極驗更於養正丹方中互言之矣然只以備緩急之需如經受病却當詳備常服消痰飲散滯氣進飲食體虛痰喘加人參一錢北五味子七粒鹽梅一箇杏仁七粒去皮尖紅棗二枚煎虛煩加知母人參每料各一兩此方本出千金異石紫蘇子湯昔湘東王患腳十年困篤一日得此方遂安然要真紫蘇子須人家自種葉有花真紫色者若店中所買皆紫蘇不佳治風順氣湯以紫蘇一升微炒杵以生絹袋盛內於三斗清酒中浸三宿少少飲之治冷熱不和不思飲食或腹痛梔子川烏頭各等分右為末以酒糊丸如梧桐子大每服十三丸生薑湯下如小腹氣痛炒茴香蔥酒任下二十丸治氣病厚朴四兩去皮細銼酒浸一宿煮乾焙破故紙一兩微炒大茴香一兩鹽炒去鹽右為末酒糊丸每服二十丸空心酒送下保壽丸治一切氣疾消酒化食杏仁去皮尖蘿蔔子麥蘖神麴各四兩右為細末用大蒜搗為丸如梧桐子大每服三四十丸熱水任下通逐邪氣淋染方海上名方紅色海蛤一兩川烏頭一兩川山甲一兩麩炒黃色如左壅者用川山甲左邊前後二爪右壅取右兩爪右為細末每服三錢生薑自然汁調得所傳在腳心用綿子扎定又以水數升煎數沸噓曲䐐內次用衣被蓋身出汗氣腥臭為度也治氣客於脾胃病癢蟬蛻等分蜂房炙過右為細末酒調一錢匕日二三服四磨飲子出簡易方溫中下氣沈香烏藥南木香火略煨枳殼去穰麩炒各等分右用溫湯水磨服銼碎水煎亦可檳榔丸療一切氣妨悶不能食檳榔七箇芍藥五分枳實七枚炙人參五分大黃六分青木香六分桂心四分右搗篩蜜為丸空心服如梧桐子大二十丸再服漸加二十五丸微泄為度忌生菜熱麵炙肉蒜粘食生蔥等物賁豚湯治氣奔急欲絶者吳茱萸一升石膏人參半夏芎藭各三分桂心芍藥生薑各四兩李根皮一升㕮咀以水七升清酒八升煮取三升分三服木香三稜丸出宣明論治一切氣悶胸膈痞滿榮衛不和吐酸水嘔逆惡心飲食不化脅肋疼痛無問久新青木香破故紙茴香黑牽牛甘遂荆三稜蓬莪术大戟川練子芫花葫蘆巴巴戟各一兩巴豆去皮不出油三分縮砂一兩半陳米三合將巴豆同處炒黑右用好醋二升除縮砂仁木香餘藥入醋中浸一宿入鍋煮盡醋為度乾為細末醋糊為丸如菉豆大每服五七丸食後加減看虛實隨湯下寬中丸專治男子婦人一切氣疾寬胸進食消痞化積諸般停滯肚腹疼痛不止木香五錢三稜蓬术青皮陳皮檳榔桔梗縮砂仁人參當歸各一兩右為細末和勻用酒為丸如桐子大米湯薑湯送下縮砂丹一名大縮砂丸出經效濟世方消積溫中順氣風疾利膈胸傷冷腹痛嘔吐㵼泄及消飲進食天南星四兩湯浸洗七次焙乾高良薑四兩一方用乾黃土炒縮砂仁一兩右為細末生薑自然汁煮麵糊為丸如梧桐子大每十五丸擦生薑湯送下不拘時候夏月多食生冷尤冝服大溫白丸出經效濟世方治恚怒忿鬱三焦氣滯咽喉噎塞脅肋膨脹心腹疼痛上氣奔喘反嘔吐不欲飲食及飲酒過度噫酸惡心氣脈閉澀痰飲不散胸腹中痞短氣痛徹背膂霍亂吐痢手足逆冷順氣溫中宣通壅得效生薑二十兩去皮洗淨切作片子橘皮二兩去稂右銼爛晒乾入白术一兩茯苓七錢甘草炒黃半兩搗為末煉蜜為丸如彈子大每服一丸沸湯嚼下空心服升降氣六一湯出經效濟世方香附子去粗皮炒五兩藿香葉一兩右為細末一日沸湯點服九氣湯出信傳通用方治諸般氣疾久服舒暢經絡香附子炒去毛甘草一兩炙薑黃一分甘松一分山藥半兩木香五分蓬莪术一錢炮縮砂仁五錢右為細末每服二錢入鹽沸湯點服不拘時候一方加益智仁一分五辛寬膈湯出楊氏家藏方調順三焦升降滯氣久寒疾冷心痛刺痛脅肋脹滿嘔吐惡心噫酸吞醋困倦減食揀丁香檀香桔梗陳皮去白各一兩縮砂仁炒川乾薑炮甘草炙各三兩白鹽二兩半炒另研入右為細末入鹽令勻每服二錢沸湯點服一方有胡椒半兩木香青皮丸治精所傷喉如梅核破絮青皮六錢陳皮枳殼枳實三稜炮蓬术火炮檳榔麥蘖砂仁神麴香附火炮白豆䓻木香半夏益智仁蓽澄茄右為細末酒糊為丸如梧桐子大每服五六十丸薑酒茶湯下不拘時十補脾散治下氣消痰調血理氣半夏二兩乾薑白术陳皮青皮當歸香附子各一兩人參甘草木香各半兩右為末每服五錢水一盞半薑五片棗一枚煎至一盞去滓溫服不拘時硇魏丸治脾元氣弱久積隂冷心腹脅肋脹滿刺痛面色青黃肌體瘦弱怠惰嗜卧食少多傷噫氣吞酸噦逆惡心腹中虛鳴大便泄利胸膈痞塞飲食不下嘔噎霍亂體冷轉筋及五膈五噎痃癖積聚翻胃吐食久痛久痢硇砂水淨去石炒三兩胡蘆巴一兩半木香沈香各半兩陳皮乾薑當歸川芎厚朴茴香胡椒砂仁甘草大附炮各四兩白术青鹽五味一兩半阿魏半兩醋化好酒五升好醋五升好蜜十兩細麵二斤丁香右為末用銀石鍋內入酒醋蜜先下丁魏鹽三味并麵同煎稠和粘便下藥味半斤以米更煎如稀糊漸漸入藥末煎得所熄火取出更入乾藥末搜和成劑搗杵為丸如梧桐子大每服十五丸二十丸嚼破薑酒湯下空心忌羊血豉汁一塊氣丸蓬术醋煮青皮去白青木香京三稜灰炒陳皮去白薑黃丁皮甘草檳榔牽牛巴豆用大麥一升生同炒色不須去油各一兩右為細末用糊丸如菉豆大每服二十丸至三十丸空心冷湯下或酒亦可小兒五七丸孕婦勿服忌熱茶湯木香分丸木香二錢半廣茂炮甘松青皮去白陳皮去白三稜炮砂仁丁香二錢半檀香一錢五分香附子四錢炒甘草一兩半藿香二錢半右為細末煮蒸餅為丸如桐子大每服十丸食後細嚼生薑湯下丁沈煎丸丁香四錢沈香一錢白檀三錢木香二錢丁香三錢甘松四錢白豆蔲二錢藿香三錢蓽澄茄二錢肉豆䓻一雙縮砂仁三錢三奈子龍腦少許麝香少許右為細末重羅過用甘草膏子為丸如黍米大每服三丸含化亦滴湯送下木香快氣散治胸膈不快白豆䓻二兩去皮甘草五錢炒縮砂仁四兩去皮丁香四兩木香二兩附子一斤去毛厚朴乾炙一斤青橘皮四兩去稂右為末每服二錢生薑二片鹽少許沸湯點服不拘時候木香如意丸治證同前木香丁皮丁香各三錢不見火青木香一兩枳實枳殼麩炒青皮一兩去穰小薑黃三錢陳皮去白大黃五錢黑牽牛四兩頭末二兩炒巴豆一兩去殼不去油小茵陳三兩皂角五定去皮弦大麥蘖六兩用豆肉炒芽麥文武火候豆焦赤為度用紙包裹一夜次早揀去巴豆不用以麥蘖和前藥一處為末右以水二碗煎至一碗取汁打糊為丸如梧桐子大每二十丸熱水送下七氣湯治證同前香附四兩木香片薑石菖蒲甘草陳皮縮砂仁白术烏藥各一兩右為㕮咀水一盞半煎至七分去柤溫服不拘時候或為末沸湯調服亦可丁香煎丸治證同前丁香一錢沈香二錢藿香二錢附子二錢檀香三錢砂仁三錢豆䓻二錢茯苓三錢桂花三錢桂枝二錢官桂三錢甘草四錢人參二錢黑墨一錠橘皮一錢射香少許百藥煎三錢蓽澄茄二錢茯苓香二錢三奈三錢甘松二錢丁皮三錢右為細末用甘草一斤作膏子韶腦盞內盛之封合用即服之厚朴湯治氣患發熱頭疼氣急全不思飲食厚朴陳皮半夏茯苓蒼术白术草果藿香南星芍藥黃茋粉草砂仁各等分人參少木香少官桂少右每服薑五片水二盞棗子二箇煎至一盞食前服破氣散木香一兩蓽澄茄二兩香附四兩薑黃二片砂仁二兩枳殼甘草豆䓻各二兩右為末沸湯調服如用甘草煎膏子為餅嚼服神仙一塊氣治男子婦人痞尿不通氣血凝滯下元虛寒四肢腫滿或疝氣攻衝四肢腹肋刺痛川大黃生四兩白牽牛生三錢黑牽牛生三錢巴豆去皮五錢右為細末麵糊丸空心薑白湯下每服一丸紫蘇飲治舊氣積服南木香一錢大腹皮半錢紫蘇葉一錢半夏一錢桔梗一錢五分枳殼一錢半陳皮一錢半甘草五分右為末生薑三片水一大盞半煎七分去滓溫服滓再煎熱加柴胡一錢磨積拓氣丸出德生莖方治中焦氣滯胸膈痞悶飲食遲化嘔惡氣不升降痃癖癥瘕腹內膨脹痛疼婦人血氣之證皆治之沈皮香附子廣茂半夏麥蘖雷丸京三稜川椒神麴枳殼各半兩木香三兩蘿蔔子四兩炒另研陳米一升巴豆七錢半去殼末一處搗勻黃色黑色為度去皮巴豆不用只以陳米與前藥一處用之右為末以蘿蔔五七箇熬水和藥丸如桐子大每服二十五丸加至三十丸用溫白米湯送下食前服血竭丸治一切氣塊刺痛莫夜即作不可忍因氣中傷冷所致昔人常因不恱食柑自後遂若心腹痛久之腹中結塊遇痛時往往悶絶經時才蘇服此二藥一月除根鱉甲去裙醋炙半兩人參半兩當歸去毛一兩木香半兩青皮去白一分沒藥血竭研檳榔各一分枳實炒三稜各半兩半夏二錢生用右為末醋煮稀糊為丸菉豆大每服十丸白湯下不計時大腑利時則止若未利加至五十丸以利為度須服此藥令氣塊消去不可驟然多服須是積久消磨每日只一二服覺得氣消不痛却服後藥補氣之劑人參黃茋當歸各半兩白术木香青皮陳皮甘草各半兩右㕮咀三錢水一盞生薑三片煎七分不拘時遇氣痛時服每服加枳實數片普濟方卷一百八十二
