body:
  text: 普濟方卷一百四十一明周王朱橚撰傷寒門傷寒兩感論夫兩感傷寒者一日巨陽與少隂俱病頭痛口乾煩滿而渇二日陽明與太隂俱病則腹滿身熱不欲飲食譫音占多言也言妄語三日少隂與厥隂俱病則耳聾囊縮厥逆水漿不入不知人事即難治也何者臓腑表裏同受其邪五臓内傷六腑閉塞隂陽交争榮衛不行如是之後三日乃死夫傷寒兩感初得一二日不得汗又吐下不得其人四肢沈重心神昏悶手足厥逆心中煩躁渇欲飲水頭疼増寒壯熱或即吐逆腹脇疼痛轉加困重不得睡卧隂陽交併不可救療如此症候當觀其形症善惡察其受病淺深而行拯療亦可差也歌曰兩感膀胱對少隂頭疼口燥大而沈胃脾肝膽二三日脈症䨇傳准例尋又論三傷寒惟兩感不治兩感者半属於隂半属於陽臓腑俱受病也一日太陽少隂俱病則頭疼口乾燥煩滿而渇脈大而沈二日陽明太隂俱病則身熱鼻乾譫語腹滿不食脈長而沈三日少陽厥隂俱病則耳聾囊縮厥冷水浆不入脈弦而沈或三日而彊或六日而仆張氏無治法但曰兩感病俱作治有先後發表攻裏本自不同雙鍾以意斟酌謂如下利不止身體疼痛急先救其裏與四逆湯如不下利但身體疼痛急先救其表與桂枝湯此為治有先後其達權識變之論也謝復古釋張氏治先後之説亦以為陽先受病在乎表則先解表隂先受病在乎裏則先救裏是亦一意然先表者裏不可緩先裏者表亦不可緩也與方人參散出聖恵方治兩感傷寒一兩日不得汗脈沈遲心中煩悶毒氣相傳隂陽交併人參去蘆頭川大黄剉碎微炒各一兩附子炮製去皮臍乾薑炮製剉訶梨勒皮各三分㯽榔半兩右為粗散毎服五錢以水一中盞入生薑半分煎至六分去滓不計時候熱服良久喫熱粥投之以助藥力桂心散出聖恵方治兩感傷寒頭疼身熱心胸悶亂宜服發表桂心前胡去蘆頭甘草炙微赤剉皂莢灰厚朴去粗皮塗生薑汁炙令香熟各一兩右為細散每服不計時候生薑湯調下二錢頻服汗出為度解表散出聖恵方治兩感傷寒毒氣傳受隂陽交併附子炮製去皮臍麻黄去根節各一兩乾薑半兩炮製剉薄荷一分右為麄散毎服五錢以水一大盞煎至五分去滓不計時候熱服衣盖汗出四逆湯出十便良方治兩感傷寒隂陽二毒交併身體手足厥逆心中熱悶强語三部脈微細宜急救之乾薑三分炮製剉附子炮製去皮臍桂心各一兩甘草半兩炙㣲赤剉右為粗散每服五錢以水一大盞煎至五分去滓不計時候熱服良久喫熱粥以助藥力汗出為度附子散出聖恵方治兩感傷寒徧身疼痛腦目疼悶心胸煩熱四肢沈重附子一兩炮製去皮臍桔梗去蘆頭防風去蘆頭桂心羌活乾薑炮製剉黄耆剉厚朴去粗皮塗生薑汁炙令香熟各一兩甘草半兩炙微赤剉右為散毎服五錢以水一大盞煎至五分去滓不計時候熱服良久喫熱粥投之衣盖取汗治兩感傷寒不得汗頭疼心胸不利出聖恵方人參去蘆頭赤茯苓芎藭枳殻麸炒微黄去穰厚朴去粗皮塗生姜汁炙香熟用桂心各半兩訶梨勒皮呉茱茰一分用湯浸七遍焙乾微炒右為細散毎服三錢以水一中盞入生薑半分棗二枚煎至五分去薑棗不計時候和滓稍熱服良久喫熱粥投之衣盖取汗麻黄㪚出聖恵方治兩感傷寒内實氣逆不順皮肉乾燥麻黄去根節川大黄剉碎微炒訶梨勒皮桂心羌活赤芍藥桔梗去蘆頭各半兩甘草三分炙微赤剉麥蘖一兩炒令微黄右為細散每服二錢以水一小盞煎至五分不計時候和滓温服治兩感傷寒三兩日不得汗悶亂目張四肢逆冷心腹堅硬大便不通方出聖恵方牽牛子二兩生擣取末一兩川大黄半兩剉製微炒乾薑炮製剉蓬莪桂心各一兩右為細散入牽牛子末同研令勻毎服用水一中盞入生薑半分葱白三莖豉四十九粒煎至六分去滓調下二錢取利為度治兩感傷寒沈重救急有效宜預合此方出聖恵方硫黄細研水飛過硝石細研如粉各五兩皂莢十挺不抖者去黒皮塗酥炙令黄燋去子右先将皂莢槌碎用十二月雪水一升浸兩日熟挼以生絹濾取汁和前件硫黄硝石硬軟得所入甆瓶内盛封瓶口不得通風背隂處掘地二尺深埋瓶從正月一日至十五日取出太濕即更隂乾三兩日即以新炊飯爛研相和丸如菉豆大毎服不計時候以葱茶下五丸如是食毒即先轉㵼後服之治兩感傷寒四肢厥冷急宜服此方出聖恵方附子半兩燒半黒芫花半兩醋拌炒令黄黒色皂莢半兩去黒皮塗酥炙黄燋去子右為末同豉心一合湯浸細研如膏入藥末和丸如梧桐子大毎服不計時候用去根節麻黄湯下十丸如人行五里一服以汗出為度三聖散出聖恵方治兩感傷寒昏沈迷悶燥渇頭疼漸加沉重天靈盖一枚白色者塗酥炙令黄苦參三兩甘草一兩剉炙微赤右為細末毎服不計時候以熱酒調下一錢葱术散出傳信適用方治不别隂陽二症染患淺深凡時氣行瘟疫及尋常風吹雨霎頭目昏重四肢熱倦行步少力骨節疼痛悉皆治之蒼术洗净一斤葱連根鬚洗净一斤麻黄不去節四兩甘草二兩炙右将葱术入臼中杵令葱涎相入盆中堅捺令熱冬間半月春夏五七日取出鍋中炒葱葉過焦逐旋篩出以术乾為度次入麻黄甘草為末毎服二錢水一盞薑三片棗二枚煎七分去滓熱服如要出汗連進二三服以衣盖之常服解諸勞倦行路緩急取為先務菖蒲飲子出徳生堂治四時傷寒不問兩感頭疼發熱増寒咳嗽七日内外皆可服病在上則吐在表則汗下則泄其病即解並皆治之川芎猪苓去黒皮藁本净柴胡去蘆菖蒲乾葛甘草桑白皮各半兩右㕮咀如法修製毎服五錢水盞半生薑三片同煎八分去滓温服滓再煎如要出汗者加連鬚葱白一根同煎一方無生薑二和散出經効濟世方治調適隂陽和養榮衛心胸痞悶飲食不進凡傷寒隂陽不分服之氣正藿香葉香附子去皮右等分為粗末毎一錢水二盞煎至六分去滓温服不計時候又方出肘後方右用虎杖治大熱煩躁止渇利小便壓一切毒暑月和甘草煎色如琥珀可愛嘗之甘美入瓶内置井中令冷徹入白甆器及銀器中收貯似茶啜之時人呼為冷飲子又且美於茗能破女子經後不通𢷬以酒浸常服有孕人勿服破血烏术散楊氏家藏方治感冒風寒濕氣不問隂陽二症皆可服之烏藥川芎杜白芷各十兩青皮四兩半蒼术七兩甘草一兩半紫蘇香附子各十兩陳皮五兩右為細末白湯㸃無時服主傷寒傳諸蔵表裏名為兩感方余居士選竒方木猪苓乾地黄地骨皮茯苓麥門冬人參各二兩小麥一升桑白皮二兩右六味剉作六貼每貼以水三升葱頭七個小麥桑白皮煎减半内一貼煎減一升分二貼口苦面腫夜睡狂語並宜服之又方余居士選竒方人參茯苓茱茰四分木猪苓桂心六分蕪荑八分白术四分茵蔯十分甘草四分右為末煉宻丸如彈子大熟水研一丸無時服來甦散廣南衛生方治四時傷寒不問隂陽二症表裏不分並宜服之香附子一斤炒陳橘皮半斤不去白紫蘇葉一斤去梗蒼术一斤炒甘草五兩炙右為粗末毎服二錢水一盞煎至七分去滓温服不拘時候日可二服荳蔲散出王氏博濟方治兩感傷寒結胸壮熱惡寒飲食不下大小膓閉塞隂毒惽沈下水結撮痛四肢逆冷心煩不省人事食後結聚心下逆滿坐卧不得宜服此肉荳蔲二枚麻黄去根一分木香一分呉白术一分呉茱茰一銖附子八銖炮去皮乾薑二銖炮桂心三銖蛜蜥五個礬朱炒令黄去其硃訶梨勒二枚炮㯽榔二枚當歸一分青橘皮二七片茯苓去皮八銖白术川烏生去皮臍良薑剉麻黄不去節天麻去苗呉茱茰生用葛根乳香另研川椒去子并閉口者全蝎生用當歸各一兩去苗川薑生用半兩右為粗末入乳香勻炒十錢痛甚者加至十五錢同細鹽一處炒如極熱用熟絹袋内貯藥熨烙痛處不拘早晩頻用為效如藥冷即再炒一次用畢其炒藥不用薏苡仁㪚治濕傷腎不養肝肝自生風遂成風濕流注四肢筋骨或入左肩髃肌肉疼痛漸入左指中薏苡仁一兩當歸酒浸人參川烏炮川芎白术羌活桂心防風去蘆茵芋炒麻黄去根節乾薑炮獨活甘草炙各半兩右為細末毎服二錢空心臨卧酒調下日三服徐神翁神效地仙丹治筋骨疼痛打撲傷損仙木湯送下除寒濕進飲食神效川烏一個去尖草烏五個去尖荆芥去枝半兩蒼术一兩米泔浸一宿炒白芷半兩自然銅一字研地龍没藥各半兩研乳香半錢研萵苣種黄𤓰種稍𤓰種木鼈子各一錢半兩錢二文右為細末醋糊丸如梧桐子大毎服十丸食後酒送下虎骨丸治經絡凝澁骨節疼痛筋脈攣急遇隂寒愈痛南乳香别研沒藥另研赤芍藥熟地黄虎脛骨醋炙黄當歸各一兩血竭五錢右為末用木𤓰一枚切破去子入乳香在内以麻縷定勿令透氣好酒二升煮至酒盡取木𤓰去皮研如泥更入熟蜜少許杵和為丸如梧桐子大毎服三十丸病在上食後在下食前温酒下治骨節疼痛煩不得屈伸近之則痛短氣得汗出或欲腫者附子二兩桂心四兩白术三兩甘草二兩右用水六升煮取三升分三服汗出愈治卒得胸痛瘥而復發者右取薤根五斤搗絞汁飲之立止加減當歸飲子治肩忽疼防風當歸柴胡生地黄大黄各一兩半芍藥人參黄芩各一兩甘草一兩二錢黄連五錢滑石六兩右為散以白水煎服無時活絡湯治風濕臂痛諸藥不效者此方専主之白术薄切一兩當歸净洗薄切乾秤羌活净洗去蘆切乾獨活净洗甘草炙川芎各半兩右剉散毎服三大錢水一盞半薑五片慢火煎至一盞去滓温服並滓不拘時候一方川蒼术切炒川白芷各二兩為末毎服二錢酒調下趂痛丸治腰臂痛五靈脂赤芍藥各半兩川烏一箇沒藥四錢麝香一錢右為末酒糊丸空心温送下葉氏方十味剉散治中風血弱臂痛連筋及骨舉動艱難此藥亦補心益血養筋生力附子三兩炮去皮臍當歸去土洗切黄耆炙白芍藥各二兩茯苓防風去蘆白术各一兩半肉桂去粗皮一兩不見火川芎不見火熟地黄洗净用好酒熬令乾焙之各七錢半右修製了再秤㕮咀每四錢水一大盞薑八片棗三枚擘開煎七分去滓通口服食後臨睡日三服温覆厚衣将養去黄耆熟地黄用當歸去蘆净洗乾焙白芍藥川芎白术人參生附子白茯苓桂心川獨活防風甘草細剉毎三錢薑八片水一盞半煎八分去滓食前服除寒邪益血氣名川獨活湯製地黄法須洗净以好酒浸令乾焙之五靈脂散治臂脾痛五靈脂荆芥穂防風羌活甘草節獨活穿山甲骨碎補草烏各五錢麝香少許右為末用温酒調下臨卧服如渾身損痛加没藥木香酒調下空心服芎活湯治水飲停蓄注於絡脈發為臂痛皆因脾土有虧平日多飲水浆不能傳化所致川芎半夏湯洗白茯苓獨活陳皮枳殻去穰炒各半兩白术甘草各一分三物小陷胸湯治傷寒實結胸無熱症者桔梗微炒貝母去心各三分巴豆去皮心熬黑研如脂一分右除巴豆外𢷬羅為散入巴豆各研勻每服强人半錢羸人減之並温熟水調服病在膈上必吐在膈下必利不利進熱粥一杯利不止進冷粥一杯身熱皮粟不解欲引衣自覆若以水潠之洗之益令熱却不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法葶藶湯治傷寒結胸心下痛如石堅硬小便不利葶藶子隔紙炒三分㯽榔剉半兩桑白皮炙剉三分杏仁湯浸去皮尖雙仁者炒大黄剉醋炒各半兩朴硝三分右粗𢷬篩毎服五錢水一盞半煎至八分去滓食前温服増損理中丸治傷寒下後虚氣不理毒復上攻毒氣相搏結於胸中不得下者毒已入胃胃中不通毒還攻上心中結滿厥逆欲絶心脹胸髙手不可近當先理其氣人參白术甘草炙剉栝蔞根剉牡蠣熬枳實去殻麩炒赤茯苓去黑皮一方有黄芩無赤茯苓一兩乾薑炮一兩半右𢷬羅為末煉蜜丸如彈子大每服一丸熟水化下不歇再服不過五六丸胸中豁然一名枳實理中丸陷胸青龍湯治傷寒結胸毒氣内盛手足逆冷腹脹喘息急大便不通牽牛子微炒一兩半人參三分陳橘皮湯浸去白焙半兩桂去粗皮㯽榔剉各一分大黄剉醋炒半兩朴硝半兩右粗𢷬篩每服五錢水一盞半入生薑半分擘碎同煎至七分去滓食前温服大黄桔梗湯治傷寒熱病飲水結胸硬滿大黄剉醋炒二兩桔梗炒一兩甘草炙剉朴硝各半兩右粗𢷬篩毎服五錢水一盞半煎至七分去滓食前温服大金鍼丸治温傷寒結胸氣逆手足厥冷嘔逆不定陽起石研不灰木阿魏研各半兩杏仁二十五枚去皮尖雙仁者研巴豆二十五枚去皮心膜不出油研右𢷬研為細末用軟粟米飯為丸如小彈丸大毎服一丸用鍼穿燈焰上燒烟絶為末生薑米飲調服以利為效泥金丸治結胸傷寒心下痛按之實鞕木香丁香大㦸甘遂麸炒各一分膩粉三錢紫苑去土三錢硫黄兩皂子大㯽榔大者一枚剉附子炮製去皮臍一枚巴豆三十粒去皮心膜用胡餅麪裹慢火燒熟去麪不用黑牽牛三錢半生半炒水銀沙子三錢右各𢷬研為末再和令勻煉蜜為丸如小鷄頭大㸔虚實毎服一丸爛嚼燒生薑一塊子同嚥下藥不得嚼大㦸散治傷寒結胸轉下不除者大㦸炒甘遂炒各一兩膩粉半兩硫黄研一分水銀盞子内與硫黄同研作沙子半兩右𢷬研為末再同研勻每服二錢温浆水調下越桃丸治傷寒結胸逐利熱毒越桃桃花暴乾各一分大黄生剉半兩白牽牛取末五兩欝金二錢丹砂研一錢巴豆霜研五錢郁李仁去皮研一兩右𢷬研為末滴水丸如小豆大毎服一丸蜜水下陷胸㪚治傷寒結胸伏陽在裏心下堅硬按之則痛前胡去蘆頭甘遂麩炒甜葶歴隔紙炒大黄剉微炒馬牙硝研各一兩杏仁湯浸去皮尖并雙仁麩炒一兩右𢷬研為末毎服一錢生薑蜜水調下更㸔虛實加減宣毒丸治傷寒結胸心下堅硬白牽牛炒大黄剉各一兩滑石朴硝續隨子去皮煮研半兩郁李仁去皮炒研半兩甘遂麩炒大㦸麩炒一分右𢷬為末煉蜜和丸如彈子大㸔虚實以龍腦蜜水化下一丸大通散治傷寒結胸及瘡疹後毒氣攻心涎嗽喘急甘遂麩炒一分生地黄一兩與甘遂同搏焙乾㯽榔剉二枚麥蘖微炒半兩鉛白霜研一分右𢷬研為末㸔虛實用龍腦浆水調下半錢金鍼丸治傷寒隂氣結伏在内胸膈虛痞或痛不可忍者不灰木二錢陽起石阿魏各一錢白丁香丹砂研乳香膩粉各一錢半硫黄二分巴豆去皮膜出油二十七粒右同研勻細糯米粽子和丸如桐子大毎服五丸至七丸丁香湯下不拘時候膈毒丸治傷寒結胸心下堅痛郁李仁去皮尖黒牽牛炒大㦸甘遂各一分牛黄研乳香研各一錢麝香研龍腦研各半錢右𢷬研為末同再研勻用白麪糊和丸如梧桐子大毎服七丸煎燈心麥湯下臨卧服聖餅子治傷寒結胸甘遂大㦸去皮各半兩黒牽牛生用一兩半輕粉一錢粉霜一錢水銀一錢入硫黄一錢結沙子巴豆去皮醋煮黄十四枚右先将前三味為末入白麪五錢水和作餅子文武火煨焦黄再為末後入四味拌勻水和為丸如菉豆大揑作餅子毎服三餅茶湯下宣風丸治傷寒結胸熱氣藴蓄大黄末牽牛子末郁李仁去皮研各半兩巴豆一分去皮膜油煠研右再同研勻煉蜜為丸如小豆大㸔虛實生薑蜜水下一丸至二丸金黄散治傷寒結胸心下堅滿黑牽牛末大黄末各一錢欝金末胡黄連末各半錢右作一服入膩粉一錢新水調下傷寒後四五日結胸宜可服或吐或㵼或汗出即愈桔梗枳殻湯桔梗微炒枳殻麸炒甘草炙右等分毎服五錢水一盞半加生薑三片煎至七分去滓服或不用生薑亦可痰多加半夏生薑有熱加黄芩治傷寒陽症結胸死無可藥者出經驗良方右用蛐蟮即蚯蚓十五條乾者擂爛蜜半盞冷水半碗灌服若無蜜沙糖亦妙三黄湯出危氏方治傷寒隂症下之太早致心下痞按之軟其脈闗上浮者主之若表未解未可攻宜先隨風寒二症投桂枝麻黄湯表解已即服此方三因方大黄蒸黄連黄芩各等分右剉為散毎服五錢沸湯二盞熱漬之一時夕去滓分二服暖服或汗出惡寒加附子别煎汁入一合同服尅效交泰聖餅子出衛生家寳方治傷寒結胸脈浮不可下下之必死宜用治之巴豆十四粒黄連七寸連皮用右為末用津唾和成膏填入臍下以艾炷其上腹中有聲其病去矣不拘壮數病去為度纔灸了便以温湯浸手帕拭之恐生瘡一方加大黄末一錢治結胸脇秘結方枳殻滑石各二兩甘草一兩右㕮咀毎服三錢用臭冬橘葉七片同煎温服連進三服即解治傷寒十餘日熱氣結於胸中往來寒熱不定宜服出聖恵方柴胡去苗枳實麩炒微黄赤芍藥半夏湯洗七遍去滑黄芩各三分甘草半兩炙微赤剉桔梗一兩去蘆頭右為散毎服五錢以水一中盞入生薑半分棗二枚煎至六分去滓不計時候温服半夏湯出聖恵方治傷寒三四日不能卧但欲起胸中結熱煩悶脈洪大者半夏三分湯洗七遍去滑黄芩三分乾薑半兩炮製剉赤茯苓三分人參三分去蘆頭甘草半兩炙微赤剉黄連一錢右為散毎服三錢以水一中盞入棗二枚煎至六分去滓不計時温服前胡散出聖恵方治傷寒五日後熱結胸氣不散湯飲難下腹脹悶宜服前胡一兩去蘆頭當歸半兩剉碎微炒川大黄剉碎微炒羌活㯽榔三分桔梗去蘆頭各一兩郁李仁一兩湯浸去皮尖微炒右為散毎服四錢以水一中盞煎至六分去滓不計時候温服大黄散出聖恵方治傷寒十餘日熱氣結於胸中往來寒熱頭痛宜服川大黄剉碎微炒柴胡去苗川朴硝赤芍藥黄芩各一兩枳實麩炒微黄虎掌微炒各三分右為散毎服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服治傷寒結胸氣噎塞煩悶宜服此方賺胸㪚出十便良方枳實麩炒微黄桂心各一兩右為散毎服以温水調下二錢不計時候治傷寒結胸内有瘀血大便不利小腹滿急宜服出聖恵方桃仁半兩湯浸去皮尖雙仁麩炒微黄水蛭炒令微黄䖟蟲炒令微黄各一分川大黄一兩剉碎微炒右為散毎服一錢以水一小盞煎至五分去滓不計時候温服桔梗散出聖恵方治傷寒結胸不下飲食四肢煩勞宜服桔梗去蘆頭桑根白皮剉鼈甲塗醋炙令黄去裙襴人參去蘆頭赤茯苓各一兩木香㯽榔各半兩赤芍藥白术各三分右為散毎服四錢以水一中盞入生薑半分煎至六分不計時候温服牛膝散出聖恵方治傷寒結胸腹中㽲痛心下硬如石按之煩悶宜服牛膝去蘆大黄剉碎微炒鼈甲塗醋炙令黄去裙襴郁李仁湯浸去皮尖微炒各三分桂心附子炮製去皮臍甘草炙微赤剉白术各半兩右為散毎服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服恒山湯出聖恵方治傷寒結胸煩滿喘息稍急湯飲不下宜服恒山甘草生用各一分蜀漆犀角屑各半分右剉為㪚以水一大盞煎至五分去滓不計時候頓服須臾當吐為效木香散出聖恵方治傷寒熱結不散胸中痞滿欲成結胸宜服木香二分赤茯苓紫蘇莖葉各三分旋復花陳橘皮湯浸去白穰焙㯽榔各半兩右為散毎服四錢以水一中盞煎至六分去滓不計時候温服人參丸出聖恵方治傷寒結胸心膈燥悶宜服人參去蘆白术甘草炙􅌝􅌣根赤茯苓牡蠣燒為粉各一兩犀角屑半兩右為末煉蜜和丸如梧桐子大不計時候以粥飲送下三十丸鼈甲丸出聖恵方治傷寒結胸煩悶熱毒氣結聚不㪚宜服鼈甲一兩塗醋炙令黄去裙襴甘草半兩炙微赤剉防葵訶梨勒皮人參去蘆頭桂心白术川大黄剉碎炒郁李仁湯浸去皮尖微炒各三分右為末煉蜜和丸如梧桐子大不計時候以温生薑湯下三十丸芍藥散出聖恵方治傷寒結胸心下結硬煩悶腹脹宜服赤芍藥訶梨勒皮鼈甲塗醋炙令黄去裙襴人參去蘆頭黄芩木香郁李仁湯浸去皮尖微炒已上各三分白术桂心枳殻麩炒微黄去穰當歸剉炒已上各半兩杏仁一兩湯浸去皮尖雙仁麸炒微黄右為散毎服五錢以水一中盞入生薑半分煎至六分去滓不計時候温服赤茯苓丸出聖恵方治傷寒心中堅硬兩脇脹滿欲成結胸宜服赤茯苓桔梗去蘆頭赤芍藥鼈甲塗醋炙令黄去裙襴牛膝去苖枳殻麩炒微黄去穰五味子五加皮柴胡去苗桂心川大黄剉碎微炒已上各三分右為末煉蜜和丸如梧桐子大不計時候以温生薑湯下三十丸硃砂丸治傷寒心中硬痛不可忍或腹脹滿欲成結胸宜服硃砂一兩細研水飛過桃仁一兩湯浸去皮尖雙仁麩炒微黄别研如膏麝香一分細研右同研令勻煉蜜和丸如梧桐子大不計時候以温生薑湯送下二十丸太乙丹治傷寒結胸心下痞硬不通禹餘糧醋淬𤣥精石金星石銀星石陽起石紫石英白石英甘鍋石磁石火煅醋淬七遍礞石消石硫黄各一兩研丹砂乳香膩粉各半兩研阿魏二錢巴豆去皮生用杏仁湯浸去皮尖雙仁各七十二粒右𢷬研細羅為末糯米飯和丸如彈子丸大毎服一丸麩炭火上燒存性入膩粉一錢蜜水化下吐㵼脚轉筋伏隂厥逆生薑蜜水化下黄連梔子湯出濟生拔萃方治傷寒汗下後熱結胸中大便㣲澁小便赤者黄連大黄梔子黄芩各五錢右剉細毎服一兩水三盞煎服桔梗連翹湯出濟生拔萃方治傷寒汗下後熱結胸中者桔梗連翹黄芩各一兩薄荷甘草川芎各五錢梔子一個右剉細毎服一兩水三盞煮至一盞去滓温服治結胸糖炙法出衛生家寳方右以氷糖不拘多少置病人胸上其糖乾再塗病愈則止仙茅丸出王氏博濟方治結胸傷寒及惡候者大效仙茅一分貫衆半兩黒附子半兩炮去皮臍蓽撥一分巴豆半兩去皮心甘草少許乾薑半兩右為細末麪糊和丸如梧桐子大下結胸生薑棗湯下一丸如五七日病者更打破一丸同前湯使下如常式傷寒只冷浆水下如轉後須用順氣散表藥服之汗出即差治傷寒結胸隂症渾身手足俱冷并冷汗出胸前結伏噎塞不通大便虛冷須是隂症方可喫此藥出䕶命方草豆蔲乾薑黄橘皮川芎羌活桂心細辛各一分熟牽牛炒半夏各三銖右為細末毎服三錢七分空心熟湯調下治傷寒後寒熱已退腹中餘一塊疼痛不可勝忍忽走在腿面上痛宜服此方出䕶命方黄芩牡丹皮桑寄生羌活荆芥穂射干芍藥桃仁牽牛麻黄去根各一分連翹半兩官桂半分右為細末毎服二錢半食後熟湯調下増損理中丸出活人書太隂下之胸滿硬諸結胸宜服此人參白术各一兩甘草乾薑各一兩半黄芩半兩枳實二兩右為細末煉蜜和如彈子大沸湯化一丸稀涎散出危氏方治結胸膈作為寒熱飲食减少猪牙皂角圓白半夏各一兩右剉為㪚毎服三錢水一盞半煎至七分去滓温服入咽便吐去涎即愈普濟方卷一百四十一
