body:
  text: 普濟方卷一百四十一明周王朱橚撰傷寒門傷寒兩感論夫兩感傷寒者一日巨陽與少隂俱病頭痛口乾煩滿而渴二日陽明與太隂俱病則腹滿身熱不欲飲食譫音占多言也言妄語三日少隂與厥隂俱病則耳聾囊縮厥逆水漿不入不知人事即難治也何者臟腑表裏同受其邪五臟內傷六腑閉塞隂陽交爭榮衛不行如是之後三日乃死夫傷寒兩感初得一二日不得汗又吐下不得其人四肢沈重心神昏悶手足厥逆心中煩躁渴欲飲水頭疼增寒壯熱或即吐逆腹脅疼痛轉加困重不得睡卧隂陽交併不可救療如此症候當觀其形症善惡察其受病淺深而行拯療亦可差也歌曰兩感膀胱對少隂頭疼口燥大而沈胃脾肝膽二三日脈症雙傳準例尋又論三傷寒惟兩感不治兩感者半屬於隂半屬於陽臟腑俱受病也一日太陽少隂俱病則頭疼口乾燥煩滿而渴脈大而沈二日陽明太隂俱病則身熱鼻乾譫語腹滿不食脈長而沈三日少陽厥隂俱病則耳聾囊縮厥冷水漿不入脈弦而沈或三日而強或六日而仆張氏無治法但曰兩感病俱作治有先後發表攻裏本自不同雙鍾以意斟酌謂如下利不止身體疼痛急先救其裏與四逆湯如不下利但身體疼痛急先救其表與桂枝湯此為治有先後其達權識變之論也謝復古釋張氏治先後之説亦以為陽先受病在乎表則先解表隂先受病在乎裏則先救裏是亦一意然先表者裏不可緩先裏者表亦不可緩也與方人參散出聖惠方治兩感傷寒一兩日不得汗脈沈遲心中煩悶毒氣相傳隂陽交併人參去蘆頭川大黃銼碎微炒各一兩附子炮製去皮臍乾薑炮製銼訶梨勒皮各三分檳榔半兩右為粗散每服五錢以水一中盞入生薑半分煎至六分去滓不計時候熱服良久喫熱粥投之以助藥力桂心散出聖惠方治兩感傷寒頭疼身熱心胸悶亂宜服發表桂心前胡去蘆頭甘草炙微赤銼皂莢灰厚朴去粗皮塗生薑汁炙令香熟各一兩右為細散每服不計時候生薑湯調下二錢頻服汗出為度解表散出聖惠方治兩感傷寒毒氣傳受隂陽交併附子炮製去皮臍麻黃去根節各一兩乾薑半兩炮製銼薄荷一分右為粗散每服五錢以水一大盞煎至五分去滓不計時候熱服衣蓋汗出四逆湯出十便良方治兩感傷寒隂陽二毒交併身體手足厥逆心中熱悶強語三部脈微細宜急救之乾薑三分炮製銼附子炮製去皮臍桂心各一兩甘草半兩炙微赤銼右為粗散每服五錢以水一大盞煎至五分去滓不計時候熱服良久喫熱粥以助藥力汗出為度附子散出聖惠方治兩感傷寒遍身疼痛腦目疼悶心胸煩熱四肢沈重附子一兩炮製去皮臍桔梗去蘆頭防風去蘆頭桂心羌活乾薑炮製銼黃耆銼厚朴去粗皮塗生薑汁炙令香熟各一兩甘草半兩炙微赤銼右為散每服五錢以水一大盞煎至五分去滓不計時候熱服良久喫熱粥投之衣蓋取汗治兩感傷寒不得汗頭疼心胸不利出聖惠方人參去蘆頭赤茯苓芎藭枳殼麩炒微黃去穰厚朴去粗皮塗生薑汁炙香熟用桂心各半兩訶梨勒皮吳茱茰一分用湯浸七遍焙乾微炒右為細散每服三錢以水一中盞入生薑半分棗二枚煎至五分去薑棗不計時候和滓稍熱服良久喫熱粥投之衣蓋取汗麻黃散出聖惠方治兩感傷寒內實氣逆不順皮肉乾燥麻黃去根節川大黃銼碎微炒訶梨勒皮桂心羌活赤芍藥桔梗去蘆頭各半兩甘草三分炙微赤銼麥蘖一兩炒令微黃右為細散每服二錢以水一小盞煎至五分不計時候和滓溫服治兩感傷寒三兩日不得汗悶亂目張四肢逆冷心腹堅硬大便不通方出聖惠方牽牛子二兩生搗取末一兩川大黃半兩銼製微炒乾薑炮製銼蓬莪桂心各一兩右為細散入牽牛子末同研令勻每服用水一中盞入生薑半分蔥白三莖豉四十九粒煎至六分去滓調下二錢取利為度治兩感傷寒沈重救急有效宜預合此方出聖惠方硫黃細研水飛過硝石細研如粉各五兩皂莢十挺不抖者去黑皮塗酥炙令黃燋去子右先將皂莢槌碎用十二月雪水一升浸兩日熟挼以生絹濾取汁和前件硫黃硝石硬軟得所入瓷瓶內盛封瓶口不得通風背隂處掘地二尺深埋瓶從正月一日至十五日取出太濕即更隂乾三兩日即以新炊飯爛研相和丸如菉豆大每服不計時候以蔥茶下五丸如是食毒即先轉㵼後服之治兩感傷寒四肢厥冷急宜服此方出聖惠方附子半兩燒半黑芫花半兩醋拌炒令黃黑色皂莢半兩去黑皮塗酥炙黃燋去子右為末同豉心一合湯浸細研如膏入藥末和丸如梧桐子大每服不計時候用去根節麻黃湯下十丸如人行五里一服以汗出為度三聖散出聖惠方治兩感傷寒昏沈迷悶燥渴頭疼漸加沉重天靈蓋一枚白色者塗酥炙令黃苦參三兩甘草一兩銼炙微赤右為細末每服不計時候以熱酒調下一錢蔥术散出傳信適用方治不别隂陽二症染患淺深凡時氣行瘟疫及尋常風吹雨霎頭目昏重四肢熱倦行步少力骨節疼痛悉皆治之蒼术洗淨一斤蔥連根鬚洗淨一斤麻黃不去節四兩甘草二兩炙右將蔥术入臼中杵令蔥涎相入盆中堅捺令熱冬間半月春夏五七日取出鍋中炒蔥葉過焦逐旋篩出以术乾為度次入麻黃甘草為末每服二錢水一盞薑三片棗二枚煎七分去滓熱服如要出汗連進二三服以衣蓋之常服解諸勞倦行路緩急取為先務菖蒲飲子出德生堂治四時傷寒不問兩感頭疼發熱增寒咳嗽七日內外皆可服病在上則吐在表則汗下則泄其病即解並皆治之川芎豬苓去黑皮藁本淨柴胡去蘆菖蒲乾葛甘草桑白皮各半兩右㕮咀如法修製每服五錢水盞半生薑三片同煎八分去滓溫服滓再煎如要出汗者加連鬚蔥白一根同煎一方無生薑二和散出經效濟世方治調適隂陽和養榮衛心胸痞悶飲食不進凡傷寒隂陽不分服之氣正藿香葉香附子去皮右等分為粗末每一錢水二盞煎至六分去滓溫服不計時候又方出肘後方右用虎杖治大熱煩躁止渴利小便壓一切毒暑月和甘草煎色如琥珀可愛嘗之甘美入瓶內置井中令冷徹入白瓷器及銀器中收貯似茶啜之時人呼為冷飲子又且美於茗能破女子經後不通搗以酒浸常服有孕人勿服破血烏术散楊氏家藏方治感冒風寒濕氣不問隂陽二症皆可服之烏藥川芎杜白芷各十兩青皮四兩半蒼术七兩甘草一兩半紫蘇香附子各十兩陳皮五兩右為細末白湯點無時服主傷寒傳諸藏表裏名為兩感方余居士選竒方木豬苓乾地黃地骨皮茯苓麥門冬人參各二兩小麥一升桑白皮二兩右六味銼作六貼每貼以水三升蔥頭七個小麥桑白皮煎減半內一貼煎減一升分二貼口苦面腫夜睡狂語並宜服之又方余居士選竒方人參茯苓茱茰四分木豬苓桂心六分蕪荑八分白术四分茵蔯十分甘草四分右為末煉密丸如彈子大熟水研一丸無時服來蘇散廣南衛生方治四時傷寒不問隂陽二症表裏不分並宜服之香附子一斤炒陳橘皮半斤不去白紫蘇葉一斤去梗蒼术一斤炒甘草五兩炙右為粗末每服二錢水一盞煎至七分去滓溫服不拘時候日可二服豆蔲散出王氏博濟方治兩感傷寒結胸壯熱惡寒飲食不下大小腸閉塞隂毒惛沈下水結撮痛四肢逆冷心煩不省人事食後結聚心下逆滿坐卧不得宜服此肉豆蔲二枚麻黃去根一分木香一分吳白术一分吳茱茰一銖附子八銖炮去皮乾薑二銖炮桂心三銖蛜蜥五個礬朱炒令黃去其硃訶梨勒二枚炮檳榔二枚當歸一分青橘皮二七片茯苓去皮八銖白术川烏生去皮臍良薑銼麻黃不去節天麻去苗吳茱茰生用葛根乳香另研川椒去子并閉口者全蝎生用當歸各一兩去苗川薑生用半兩右為粗末入乳香勻炒十錢痛甚者加至十五錢同細鹽一處炒如極熱用熟絹袋內貯藥尉烙痛處不拘早晚頻用為效如藥冷即再炒一次用畢其炒藥不用薏苡仁散治濕傷腎不養肝肝自生風遂成風濕流注四肢筋骨或入左肩髃肌肉疼痛漸入左指中薏苡仁一兩當歸酒浸人參川烏炮川芎白术羌活桂心防風去蘆茵芋炒麻黃去根節乾薑炮獨活甘草炙各半兩右為細末每服二錢空心臨卧酒調下日三服徐神翁神效地仙丹治筋骨疼痛打撲傷損仙木湯送下除寒濕進飲食神效川烏一個去尖草烏五個去尖荆芥去枝半兩蒼术一兩米泔浸一宿炒白芷半兩自然銅一字研地龍沒藥各半兩研乳香半錢研萵苣種黃瓜種稍瓜種木鱉子各一錢半兩錢二文右為細末醋糊丸如梧桐子大每服十丸食後酒送下虎骨丸治經絡凝澀骨節疼痛筋脈攣急遇隂寒愈痛南乳香别研沒藥另研赤芍藥熟地黃虎脛骨醋炙黃當歸各一兩血竭五錢右為末用木瓜一枚切破去子入乳香在內以麻縷定勿令透氣好酒二升煮至酒盡取木瓜去皮研如泥更入熟蜜少許杵和為丸如梧桐子大每服三十丸病在上食後在下食前溫酒下治骨節疼痛煩不得屈伸近之則痛短氣得汗出或欲腫者附子二兩桂心四兩白术三兩甘草二兩右用水六升煮取三升分三服汗出愈治卒得胸痛瘥而復發者右取薤根五斤搗絞汁飲之立止加減當歸飲子治肩忽疼防風當歸柴胡生地黃大黃各一兩半芍藥人參黃芩各一兩甘草一兩二錢黃連五錢滑石六兩右為散以白水煎服無時活絡湯治風濕臂痛諸藥不效者此方専主之白术薄切一兩當歸淨洗薄切乾稱羌活淨洗去蘆切乾獨活淨洗甘草炙川芎各半兩右銼散每服三大錢水一盞半薑五片慢火煎至一盞去滓溫服並滓不拘時候一方川蒼术切炒川白芷各二兩為末每服二錢酒調下趂痛丸治腰臂痛五靈脂赤芍藥各半兩川烏一箇沒藥四錢麝香一錢右為末酒糊丸空心溫送下葉氏方十味銼散治中風血弱臂痛連筋及骨舉動艱難此藥亦補心益血養筋生力附子三兩炮去皮臍當歸去土洗切黃耆炙白芍藥各二兩茯苓防風去蘆白术各一兩半肉桂去粗皮一兩不見火川芎不見火熟地黃洗淨用好酒熬令乾焙之各七錢半右修製了再稱㕮咀每四錢水一大盞薑八片棗三枚擘開煎七分去滓通口服食後臨睡日三服溫覆厚衣將養去黃耆熟地黃用當歸去蘆淨洗乾焙白芍藥川芎白术人參生附子白茯苓桂心川獨活防風甘草細銼每三錢薑八片水一盞半煎八分去滓食前服除寒邪益血氣名川獨活湯製地黃法須洗淨以好酒浸令乾焙之五靈脂散治臂脾痛五靈脂荆芥穗防風羌活甘草節獨活穿山甲骨碎補草烏各五錢麝香少許右為末用溫酒調下臨卧服如渾身損痛加沒藥木香酒調下空心服芎活湯治水飲停蓄注於絡脈發為臂痛皆因脾土有虧平日多飲水漿不能傳化所致川芎半夏湯洗白茯苓獨活陳皮枳殼去穰炒各半兩白术甘草各一分三物小陷胸湯治傷寒實結胸無熱症者桔梗微炒貝母去心各三分巴豆去皮心熬黑研如脂一分右除巴豆外搗羅為散入巴豆各研勻每服強人半錢羸人減之並溫熟水調服病在膈上必吐在膈下必利不利進熱粥一杯利不止進冷粥一杯身熱皮粟不解欲引衣自覆若以水潠之洗之益令熱却不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法葶藶湯治傷寒結胸心下痛如石堅硬小便不利葶藶子隔紙炒三分檳榔銼半兩桑白皮炙銼三分杏仁湯浸去皮尖雙仁者炒大黃銼醋炒各半兩朴硝三分右粗搗篩每服五錢水一盞半煎至八分去滓食前溫服增損理中丸治傷寒下後虛氣不理毒復上攻毒氣相搏結於胸中不得下者毒已入胃胃中不通毒還攻上心中結滿厥逆欲絶心脹胸髙手不可近當先理其氣人參白术甘草炙銼栝蔞根銼牡蠣熬枳實去殼麩炒赤茯苓去黑皮一方有黃芩無赤茯苓一兩乾薑炮一兩半右搗羅為末煉蜜丸如彈子大每服一丸熟水化下不歇再服不過五六丸胸中豁然一名枳實理中丸陷胸青龍湯治傷寒結胸毒氣內盛手足逆冷腹脹喘息急大便不通牽牛子微炒一兩半人參三分陳橘皮湯浸去白焙半兩桂去粗皮檳榔銼各一分大黃銼醋炒半兩朴硝半兩右粗搗篩每服五錢水一盞半入生薑半分擘碎同煎至七分去滓食前溫服大黃桔梗湯治傷寒熱病飲水結胸硬滿大黃銼醋炒二兩桔梗炒一兩甘草炙銼朴硝各半兩右粗搗篩每服五錢水一盞半煎至七分去滓食前溫服大金針丸治溫傷寒結胸氣逆手足厥冷嘔逆不定陽起石研不灰木阿魏研各半兩杏仁二十五枚去皮尖雙仁者研巴豆二十五枚去皮心膜不出油研右搗研為細末用軟粟米飯為丸如小彈丸大每服一丸用針穿燈焰上燒煙絶為末生薑米飲調服以利為效泥金丸治結胸傷寒心下痛按之實鞕木香丁香大戟甘遂麩炒各一分膩粉三錢紫苑去土三錢硫黃兩皂子大檳榔大者一枚銼附子炮製去皮臍一枚巴豆三十粒去皮心膜用胡餅麵裹慢火燒熟去麵不用黑牽牛三錢半生半炒水銀沙子三錢右各搗研為末再和令勻煉蜜為丸如小雞頭大看虛實每服一丸爛嚼燒生薑一塊子同咽下藥不得嚼大戟散治傷寒結胸轉下不除者大戟炒甘遂炒各一兩膩粉半兩硫黃研一分水銀盞子內與硫黃同研作沙子半兩右搗研為末再同研勻每服二錢溫漿水調下越桃丸治傷寒結胸逐利熱毒越桃桃花暴乾各一分大黃生銼半兩白牽牛取末五兩鬱金二錢丹砂研一錢巴豆霜研五錢郁李仁去皮研一兩右搗研為末滴水丸如小豆大每服一丸蜜水下陷胸散治傷寒結胸伏陽在裏心下堅硬按之則痛前胡去蘆頭甘遂麩炒甜葶歷隔紙炒大黃銼微炒馬牙硝研各一兩杏仁湯浸去皮尖并雙仁麩炒一兩右搗研為末每服一錢生薑蜜水調下更看虛實加減宣毒丸治傷寒結胸心下堅硬白牽牛炒大黃銼各一兩滑石朴硝續隨子去皮煮研半兩郁李仁去皮炒研半兩甘遂麩炒大戟麩炒一分右搗為末煉蜜和丸如彈子大看虛實以龍腦蜜水化下一丸大通散治傷寒結胸及瘡疹後毒氣攻心涎嗽喘急甘遂麩炒一分生地黃一兩與甘遂同搏焙乾檳榔銼二枚麥蘖微炒半兩鉛白霜研一分右搗研為末看虛實用龍腦漿水調下半錢金針丸治傷寒隂氣結伏在內胸膈虛痞或痛不可忍者不灰木二錢陽起石阿魏各一錢白丁香丹砂研乳香膩粉各一錢半硫黃二分巴豆去皮膜出油二十七粒右同研勻細糯米粽子和丸如桐子大每服五丸至七丸丁香湯下不拘時候膈毒丸治傷寒結胸心下堅痛郁李仁去皮尖黑牽牛炒大戟甘遂各一分牛黃研乳香研各一錢麝香研龍腦研各半錢右搗研為末同再研勻用白麵糊和丸如梧桐子大每服七丸煎燈心麥湯下臨卧服聖餅子治傷寒結胸甘遂大戟去皮各半兩黑牽牛生用一兩半輕粉一錢粉霜一錢水銀一錢入硫黃一錢結沙子巴豆去皮醋煮黃十四枚右先將前三味為末入白麵五錢水和作餅子文武火煨焦黃再為末後入四味拌勻水和為丸如菉豆大揑作餅子每服三餅茶湯下宣風丸治傷寒結胸熱氣藴蓄大黃末牽牛子末郁李仁去皮研各半兩巴豆一分去皮膜油煠研右再同研勻煉蜜為丸如小豆大看虛實生薑蜜水下一丸至二丸金黃散治傷寒結胸心下堅滿黑牽牛末大黃末各一錢鬱金末胡黃連末各半錢右作一服入膩粉一錢新水調下傷寒後四五日結胸宜可服或吐或㵼或汗出即愈桔梗枳殼湯桔梗微炒枳殼麩炒甘草炙右等分每服五錢水一盞半加生薑三片煎至七分去滓服或不用生薑亦可痰多加半夏生薑有熱加黃芩治傷寒陽症結胸死無可藥者出經驗良方右用蛐蟺即蚯蚓十五條乾者擂爛蜜半盞冷水半碗灌服若無蜜沙糖亦妙三黃湯出危氏方治傷寒隂症下之太早致心下痞按之軟其脈關上浮者主之若表未解未可攻宜先隨風寒二症投桂枝麻黃湯表解已即服此方三因方大黃蒸黃連黃芩各等分右銼為散每服五錢沸湯二盞熱漬之一時夕去滓分二服暖服或汗出惡寒加附子别煎汁入一合同服尅效交泰聖餅子出衛生家寶方治傷寒結胸脈浮不可下下之必死宜用治之巴豆十四粒黃連七寸連皮用右為末用津唾和成膏填入臍下以艾炷其上腹中有聲其病去矣不拘壯數病去為度才灸了便以溫湯浸手帕拭之恐生瘡一方加大黃末一錢治結胸脅祕結方枳殼滑石各二兩甘草一兩右㕮咀每服三錢用臭冬橘葉七片同煎溫服連進三服即解治傷寒十餘日熱氣結於胸中往來寒熱不定宜服出聖惠方柴胡去苗枳實麩炒微黃赤芍藥半夏湯洗七遍去滑黃芩各三分甘草半兩炙微赤銼桔梗一兩去蘆頭右為散每服五錢以水一中盞入生薑半分棗二枚煎至六分去滓不計時候溫服半夏湯出聖惠方治傷寒三四日不能卧但欲起胸中結熱煩悶脈洪大者半夏三分湯洗七遍去滑黃芩三分乾薑半兩炮製銼赤茯苓三分人參三分去蘆頭甘草半兩炙微赤銼黃連一錢右為散每服三錢以水一中盞入棗二枚煎至六分去滓不計時溫服前胡散出聖惠方治傷寒五日後熱結胸氣不散湯飲難下腹脹悶宜服前胡一兩去蘆頭當歸半兩銼碎微炒川大黃銼碎微炒羌活檳榔三分桔梗去蘆頭各一兩郁李仁一兩湯浸去皮尖微炒右為散每服四錢以水一中盞煎至六分去滓不計時候溫服大黃散出聖惠方治傷寒十餘日熱氣結於胸中往來寒熱頭痛宜服川大黃銼碎微炒柴胡去苗川朴硝赤芍藥黃芩各一兩枳實麩炒微黃虎掌微炒各三分右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服治傷寒結胸氣噎塞煩悶宜服此方賺胸散出十便良方枳實麩炒微黃桂心各一兩右為散每服以溫水調下二錢不計時候治傷寒結胸內有瘀血大便不利小腹滿急宜服出聖惠方桃仁半兩湯浸去皮尖雙仁麩炒微黃水蛭炒令微黃虻蟲炒令微黃各一分川大黃一兩銼碎微炒右為散每服一錢以水一小盞煎至五分去滓不計時候溫服桔梗散出聖惠方治傷寒結胸不下飲食四肢煩勞宜服桔梗去蘆頭桑根白皮銼鱉甲塗醋炙令黃去裙襴人參去蘆頭赤茯苓各一兩木香檳榔各半兩赤芍藥白术各三分右為散每服四錢以水一中盞入生薑半分煎至六分不計時候溫服牛膝散出聖惠方治傷寒結胸腹中㽱痛心下硬如石按之煩悶宜服牛膝去蘆大黃銼碎微炒鱉甲塗醋炙令黃去裙襴郁李仁湯浸去皮尖微炒各三分桂心附子炮製去皮臍甘草炙微赤銼白术各半兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服恆山湯出聖惠方治傷寒結胸煩滿喘息稍急湯飲不下宜服恆山甘草生用各一分蜀漆犀角屑各半分右銼為散以水一大盞煎至五分去滓不計時候頓服須臾當吐為效木香散出聖惠方治傷寒熱結不散胸中痞滿欲成結胸宜服木香二分赤茯苓紫蘇莖葉各三分旋復花陳橘皮湯浸去白穰焙檳榔各半兩右為散每服四錢以水一中盞煎至六分去滓不計時候溫服人參丸出聖惠方治傷寒結胸心膈燥悶宜服人參去蘆白术甘草炙􅌝􅌣根赤茯苓牡蠣燒為粉各一兩犀角屑半兩右為末煉蜜和丸如梧桐子大不計時候以粥飲送下三十丸鱉甲丸出聖惠方治傷寒結胸煩悶熱毒氣結聚不散宜服鱉甲一兩塗醋炙令黃去裙襴甘草半兩炙微赤銼防葵訶梨勒皮人參去蘆頭桂心白术川大黃銼碎炒郁李仁湯浸去皮尖微炒各三分右為末煉蜜和丸如梧桐子大不計時候以溫生薑湯下三十丸芍藥散出聖惠方治傷寒結胸心下結硬煩悶腹脹宜服赤芍藥訶梨勒皮鱉甲塗醋炙令黃去裙襴人參去蘆頭黃芩木香郁李仁湯浸去皮尖微炒已上各三分白术桂心枳殼麩炒微黃去穰當歸銼炒已上各半兩杏仁一兩湯浸去皮尖雙仁麩炒微黃右為散每服五錢以水一中盞入生薑半分煎至六分去滓不計時候溫服赤茯苓丸出聖惠方治傷寒心中堅硬兩脅脹滿欲成結胸宜服赤茯苓桔梗去蘆頭赤芍藥鱉甲塗醋炙令黃去裙襴牛膝去苖枳殼麩炒微黃去穰五味子五加皮柴胡去苗桂心川大黃銼碎微炒已上各三分右為末煉蜜和丸如梧桐子大不計時候以溫生薑湯下三十丸硃砂丸治傷寒心中硬痛不可忍或腹脹滿欲成結胸宜服硃砂一兩細研水飛過桃仁一兩湯浸去皮尖雙仁麩炒微黃别研如膏麝香一分細研右同研令勻煉蜜和丸如梧桐子大不計時候以溫生薑湯送下二十丸太乙丹治傷寒結胸心下痞硬不通禹餘糧醋淬玄精石金星石銀星石陽起石紫石英白石英甘鍋石磁石火煅醋淬七遍礞石消石硫黃各一兩研丹砂乳香膩粉各半兩研阿魏二錢巴豆去皮生用杏仁湯浸去皮尖雙仁各七十二粒右搗研細羅為末糯米飯和丸如彈子丸大每服一丸麩炭火上燒存性入膩粉一錢蜜水化下吐㵼腳轉筋伏隂厥逆生薑蜜水化下黃連梔子湯出濟生拔萃方治傷寒汗下後熱結胸中大便微澀小便赤者黃連大黃梔子黃芩各五錢右銼細每服一兩水三盞煎服桔梗連翹湯出濟生拔萃方治傷寒汗下後熱結胸中者桔梗連翹黃芩各一兩薄荷甘草川芎各五錢梔子一個右銼細每服一兩水三盞煮至一盞去滓溫服治結胸糖炙法出衛生家寶方右以氷糖不拘多少置病人胸上其糖乾再塗病愈則止仙茅丸出王氏博濟方治結胸傷寒及惡候者大效仙茅一分貫衆半兩黑附子半兩炮去皮臍蓽撥一分巴豆半兩去皮心甘草少許乾薑半兩右為細末麵糊和丸如梧桐子大下結胸生薑棗湯下一丸如五七日病者更打破一丸同前湯使下如常式傷寒只冷漿水下如轉後須用順氣散表藥服之汗出即差治傷寒結胸隂症渾身手足俱冷并冷汗出胸前結伏噎塞不通大便虛冷須是隂症方可喫此藥出護命方草豆蔲乾薑黃橘皮川芎羌活桂心細辛各一分熟牽牛炒半夏各三銖右為細末每服三錢七分空心熟湯調下治傷寒後寒熱已退腹中餘一塊疼痛不可勝忍忽走在腿面上痛宜服此方出護命方黃芩牡丹皮桑寄生羌活荆芥穗射干芍藥桃仁牽牛麻黃去根各一分連翹半兩官桂半分右為細末每服二錢半食後熟湯調下增損理中丸出活人書太隂下之胸滿硬諸結胸宜服此人參白术各一兩甘草乾薑各一兩半黃芩半兩枳實二兩右為細末煉蜜和如彈子大沸湯化一丸稀涎散出危氏方治結胸膈作為寒熱飲食減少豬牙皂角圓白半夏各一兩右銼為散每服三錢水一盞半煎至七分去滓溫服入咽便吐去涎即愈普濟方卷一百四十一
