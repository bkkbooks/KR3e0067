烏頭蛀損瘦薄者不堪使蒜丸子治寒多熱少良薑厚朴附子各三銖右為末大蒜丸於發日絶早煎烏梅湯勻作三服早食前令服盡溫瘧附論夫溫瘧與寒瘧安分溫瘧得之冬中於風寒寒氣藏於骨髓之中至春則陽氣大發邪氣不能出因遇大暑骨髓鑠肌肉消釋腠理發泄因有所用力邪氣與汗偕出此邪氣先藏於腎其氣先從內出之於外如是則隂虛而陽盛盛則病矣陽衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧瘧先寒而後熱者此由夏傷於大暑汗大出腠理開發因遇夏氣淒滄之小寒寒迫之藏於腠理皮胃之中秋傷於風則病成矣夫寒者隂氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱病以時作名曰寒瘧先傷於風而後傷於寒故先熱而後寒亦以時作名曰溫瘧夫病瘧六七日但見熱者溫瘧也方麻黃湯治溫瘧初發身熱頭疼不可忍臨醒時即寒栗戰動不定逡巡便醒宜服此方須是先熱後寒方喫此藥麻黃去根節煎掠去沫焙羌活去蘆頭丹皮去心獨活去蘆頭梔子去柴胡去苖桔梗銼炒升麻荆芥穗大黃銼炒半夏洗去滑焙木香知母焙黃芩去黑心各半兩右粗搗篩每服三錢水一盞入生薑三片同煎取七分去滓未發時服一方有牽牛無木香為細末同煎臨發壯熱時和滓喫須是用初發熱時服仍是食後喫發了已寒即更不要喫待第二服發熱時喫也名麻黃羌活散常山丸療溫瘧常山烏梅肉熬豉天靈蓋炒各六分硃砂蜀漆大黃知母各四分右搗篩蜜和丸如桐子大空心以溫酒下二十丸至三十丸日三服並未發前服不吐利忌生蔥菜生血等物恐成骨蒸常山湯療溫瘧潮潮羸瘦欲成骨蒸常山三兩車前葉一握甘草二兩炙獼猴骨三兩炙天靈蓋一兩燒作灰末烏梅肉二兩驢糞汁三合右切以水六升煮五味取三升去滓下糞汁天靈蓋分三服微吐不利忌生蔥生菜海藻菘菜麵粘食等物一方無驢糞汁知母鱉甲湯療溫瘧壯熱不能食知母鱉甲炙地骨皮各三兩竹葉切一升石膏四兩碎常山二兩右切以水七升煮取二升半去滓分三服忌蒜豬肉莧菜生蔥菜麻黃飲子治溫瘧煩悶麻黃一兩去根節牡蠣粉一兩蜀漆半兩甘草半兩犀角屑半兩知母半兩右銼以水二大盞煎至一盞半去滓分為三服一日服盡桂枝芍藥湯治瘧寒熱大作不論先後此太陽陽明合病也謂之火爭寒作則戰動經曰熱勝而動也發熱則必汗泄經曰汗出不愈知為熱也陽盛隂虛之證當實內治外恐久而傳入隂經也桂枝三錢黃蓍知母石膏芍藥各一兩右為末每服七錢至半兩水煎如藥服之寒熱轉大者則知太陽陽明少陽三陽合病也宜桂枝湯黃芩湯和之松蘿湯治溫瘧熱渴體痛松蘿半兩烏梅肉炒梔子去皮各半兩升麻三分鱉甲去裙襴醋浸炙黃半兩右搗粗篩每服三錢水一盞入茶末半錢煎至七分去滓未發前空心服常山湯治溫瘧常山銼半兩鱉甲去裙襴醋浸炙黃甘草生銼炙各一兩車前草一握切成片子三合右粗搗篩每服三錢用漿水一盞浸藥一宿當發前一日以急火煎取七分去滓溫服竹葉恆山湯治溫瘧壯熱微寒溫瘧之候也壯熱後如覺微寒或戰瘧依時手足冷少時便壯熱亦有手足煩熱乾嘔者痎瘧先大寒後大熱者並主之尤宜乳下小兒亦可淡竹葉一握恆山三兩切小麥一升右用水五升漬一升明旦煮取二升溫分三服忌生蔥菜恆山飲出聖惠方治溫瘧煩悶恆山半兩甘草半兩生用冬瓜汁一升用生者煎汁亦可右銼以冬瓜汁浸宿早晨煎五六服去滓分為二服空心一服發前一服得吐瘥治溫瘧方用牡蠣和杜仲為末蜜丸每服三十丸令人靣光永不時氣溫水下又方取當歸煮汁飲瘧發作無時附論夫微氣一日一夜大會于風府則腠理開開則邪入作病作當其時隂陽相并隨其所勝故生寒熱其動作皆有早晏者若臟腑受邪內外夫守邪氣妄行所以休作無時也方硃砂丸出聖惠方治瘧寒熱發作不定體瘦不能食硃砂一分細研麝香一分細研恆山銼川升麻苦參銼猢猻腦蓋炙微黃鱉甲塗酥炙黃烏梅肉微炒柴胡去苖虎頭骨醋塗炙黃烏貓糞燒炙驢軸垢木香白术川大黃銼微炒地骨皮各半兩巴豆三分去皮心熬黃别研如膏紙褁壓去油右為末入研藥令勻煉蜜和搗三五百杵丸如梧桐子大空心服溫水下四丸漸喫冷茶半碗良久吐痰涎後便煎熱茶下二丸得吐利便效虎頭骨散出聖惠方治瘧發作無時寒熱不定虎頭骨一兩塗酥炙黃牡蠣三分炒轉色地骨皮一兩柴胡一兩去苖鱉甲一兩塗酥炙去裙襴知母一兩桂心半兩朴硝一兩右為散每服五錢水一盞煎至五分去滓食前溫服取下痰結為度天靈蓋丸出聖惠方治瘧發作無時經久不瘥天靈蓋一兩猢猻頭骨一兩硃砂一分研細雄黃一分細研麝香一分研菉豆粉一分砒霜一兩細研虎頭骨一兩右為末入後五味研勻五月五日午時靣南粽子尖和劄一剪刀還內過七遍丸如桐子大每服發前以青絹裹一丸繫男左女右臂上一丸可治七人第七人冷醋湯下狐膽丸出聖惠方治瘧寒熱發作無時砒霜硃砂各半兩麝香阿魏各一分狐膽一枚菉豆粉黃丹各一分右細研勻端午午時用粽子尖和丸如桐子大空心及發前冷醋湯下二丸忌食熱物桃奴丸出聖惠方治瘧發作無時節猢猻頭骨一兩生用巴豆一分去皮砒霜一分細研野杖人花一分桃奴向陽枝上半兩斑蝥一分炒微黃右為末於端午日午時合以飯和丸如桐子大令患人手把一丸時時顧示仍男左女右於手背上緋帛繫一丸虎睛丸出聖惠方治瘧發無時不定寒熱甚者虎睛一枚生搗細末臘月豬血少許硃砂一分研阿魏一分細末右研勻取端午日合粽子尖七枚和丸如黍粒大男左女右綿裹一丸砒霜丸出聖惠方治瘧發作無時者不定寒熱砒霜一兩阿魏一分雄黃三分硃砂一分並細研右於端午日午時用糯米飯和丸菉豆大去發一時辰綿裹三丸男左女右塞耳中如惡發茶清下三丸當吐靈砂丹出聖惠方治瘧發作無時經久不瘥硃砂半麝香二錢蝙蝠糞五十豆右研細用軟糯米飯和丸菉豆大未發時暖水下十丸必效方出聖惠方治瘧無問新久發作無時黃丹四兩麵塵一兩右取五月五日午時面東不語研搗獨蒜和丸雞頭實大男左女右於背上錦帛繫一丸欲發時醋湯下之百瘥方出聖惠方治瘧無問新久發作無時恆山末一兩葎草一握去兩頭姓名勒夢秋冬月乾採亦得右以淡漿水二盞浸藥於星月下上橫一刀經宿明早晨煎取一盞去滓空腹分二服如人行七八里再服當快吐痰午後漸食粥又方出聖惠方用青皮一兩燒灰研細未發前溫酒調下一錢正發時又服一錢恆山湯出肘後方治瘧發作無常心下煩悶恆山二兩甘草炙一兩半䜴五合綿裹右切以水六升煎去滓取二升再服當快吐仍節飲食忌海藻菘菜生蔥菜大效五丁飲子出海上方治瘧發作重者白豆䓻五箇每箇分作五塊生薑切如皂子大作二十五塊京棗五箇每箇分五塊半夏二十五箇甘草五寸每寸分作五塊右通作一百二十五塊於未發前一日至晚作一劑水二碗煎一碗去滓再燒兩糞滚作三服夜露中庭至四鼓暖過熱吃一服再於曙色分時吃一服次至天曉吃些粥若稍空更吃一服便去睡極效藥餛飩出衛生方良薑吳茱萸胡椒各一分右為細末豬脾一條銼作臛加五味炒之一半滚藥一半不滚並作餛飩有藥者以墨點之餘者吞下無藥者嚼下亦一服效普濟方卷一百九十八
