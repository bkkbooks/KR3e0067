烏頭蛀損瘦薄者不堪使蒜丸子治寒多熱少良薑厚朴附子各三銖右為末大蒜丸於發日絶早煎烏梅湯勻作三服早食前令服盡温瘧附論夫温瘧與寒瘧安分温瘧得之冬中於風寒寒氣藏於骨髓之中至春則陽氣大發邪氣不能出因遇大暑骨髓鑠肌肉消釋腠理發泄因有所用力邪氣與汗偕出此邪氣先藏於腎其氣先從内出之於外如是則隂虚而陽盛盛則病矣陽衰則氣復反入入則陽虚陽虚則寒矣故先熱而後寒名曰温瘧瘧先寒而後熱者此由夏傷於大暑汗大出腠理開發因遇夏氣淒滄之小寒寒迫之藏於腠理皮胃之中秋傷於風則病成矣夫寒者隂氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱病以時作名曰寒瘧先傷於風而後傷於寒故先熱而後寒亦以時作名曰温瘧夫病瘧六七日但見熱者温瘧也方麻黄湯治温瘧初發身熱頭疼不可忍臨醒時即寒慄戰動不定逡廵便醒宜服此方湏是先熱後寒方喫此藥麻黄去根節煎掠去沫焙羗活去蘆頭丹皮去心獨活去蘆頭梔子去柴胡去苖桔梗剉炒升麻荆芥穗大黄剉炒半夏洗去滑焙木香知母焙黄芩去黒心各半兩右粗搗篩每服三錢水一盞入生薑三片同煎取七分去滓未發時服一方有牽牛無木香為細末同煎臨發壯熱時和滓喫湏是用初發熱時服仍是食後喫發了已寒即更不要喫待第二服發熱時喫也名麻黄羗活散常山丸療温瘧常山烏梅肉熬豉天靈葢炒各六分硃砂蜀漆大黄知母各四分右搗篩蜜和丸如桐子大空心以温酒下二十丸至三十丸日三服並未發前服不吐利忌生葱菜生血等物恐成骨蒸常山湯療温瘧潮潮羸痩欲成骨蒸常山三兩車前葉一握甘草二兩炙獼猴骨三兩炙天靈葢一兩燒作灰末烏梅肉二兩驢糞汁三合右切以水六升煮五味取三升去滓下糞汁天靈葢分三服㣲吐不利忌生葱生菜海藻菘菜麵粘食等物一方無驢糞汁知母鼈甲湯療温瘧壮熱不能食知母鼈甲炙地骨皮各三兩竹葉切一升石膏四兩碎常山二兩右切以水七升煮取二升半去滓分三服忌蒜猪肉莧菜生葱菜麻黄飲子治温瘧煩悶麻黄一兩去根節牡蠣粉一兩蜀漆半兩甘草半兩犀角屑半兩知母半兩右剉以水二大盞煎至一盞半去滓分為三服一日服盡桂枝芍藥湯治瘧寒熱大作不論先後此太陽陽明合病也謂之火爭寒作則戰動經曰熱勝而動也發熱則必汗泄經曰汗出不愈知為熱也陽盛隂虚之證當實内治外恐乆而傳入隂經也桂枝三錢黄蓍知母石膏芍藥各一兩右為末毎服七錢至半兩水煎如藥服之寒熱轉大者則知太陽陽明少陽三陽合病也宜桂枝湯黄芩湯和之松蘿湯治温瘧熱渇體痛松蘿半兩烏梅肉炒梔子去皮各半兩升麻三分鼈甲去裙襴醋浸炙黄半兩右搗粗篩每服三錢水一盞入茶末半錢煎至七分去滓未發前空心服常山湯治温瘧常山剉半兩鼈甲去裙襴醋浸炙黄甘草生剉炙各一兩車前草一握切成片子三合右麄搗篩毎服三錢用浆水一盞浸藥一宿當發前一日以急火煎取七分去滓温服竹葉恒山湯治温瘧壯熱㣲寒温瘧之候也壯熱後如覺㣲寒或戰瘧依時手足冷少時便壮熱亦有手足煩熱乾嘔者㾬瘧先大寒後大熱者並主之尤宜乳下小兒亦可淡竹葉一握恒山三兩切小麥一升右用水五升漬一升明旦煮取二升温分三服忌生葱菜恒山飲出聖恵方治温瘧煩悶恒山半兩甘草半兩生用冬瓜汁一升用生者煎汁亦可右剉以冬瓜汁浸宿早晨煎五六服去滓分為二服空心一服發前一服得吐瘥治温瘧方用牡蠣和杜仲為末蜜丸毎服三十丸令人靣光永不時氣温水下又方取當歸煮汁飲瘧發作無時附論夫㣲氣一日一夜大㑹于風府則腠理開開則邪入作病作當其時隂陽相并隨其所勝故生寒熱其動作皆有早晏者若臟腑受邪内外夫守邪氣妄行所以休作無時也方硃砂丸出聖惠方治瘧寒熱發作不定體痩不能食硃砂一分細研麝香一分細研恒山剉川升麻苦參剉猢猻腦盖炙㣲黄鼈甲塗酥炙黄烏梅肉㣲炒柴胡去苖虎頭骨醋塗炙黄烏猫糞燒炙驢軸垢木香白术川大黄剉㣲炒地骨皮各半兩巴豆三分去皮心熬黄别研如膏紙褁壓去油右為末入研藥令勻煉蜜和搗三五百杵丸如梧桐子大空心服温水下四丸漸喫冷茶半碗良乆吐痰涎後便煎熱茶下二丸得吐利便効虎頭骨散出聖恵方治瘧發作無時寒熱不定虎頭骨一兩塗酥炙黄牡蠣三分炒轉色地骨皮一兩柴胡一兩去苖鼈甲一兩塗酥炙去裙襴知母一兩桂心半兩朴硝一兩右為散每服五錢水一盞煎至五分去滓食前温服取下痰結為度天靈盖丸出聖恵方治瘧發作無時經乆不瘥天靈盖一兩猢猻頭骨一兩硃砂一分研細雄黄一分細研麝香一分研菉豆粉一分砒霜一兩細研虎頭骨一兩右為末入後五味研勻五月五日午時靣南粽子尖和劄一剪刀還内過七遍丸如桐子大每服發前以青絹裹一丸繫男左女右臂上一丸可治七人第七人冷醋湯下狐膽丸出聖恵方治瘧寒熱發作無時砒霜硃砂各半兩麝香阿魏各一分狐膽一枚菉豆粉黄丹各一分右細研勻端午午時用粽子尖和丸如桐子大空心及發前冷醋湯下二丸忌食熱物桃奴丸出聖恵方治瘧發作無時節猢猻頭骨一兩生用巴豆一分去皮砒霜一分細研野杖人花一分桃奴向陽枝上半兩斑蝥一分炒㣲黄右為末於端午日午時合以飯和丸如桐子大令患人手把一丸時時顧示仍男左女右於手背上緋帛繫一丸虎睛丸出聖恵方治瘧發無時不定寒熱甚者虎睛一枚生搗細末臘月猪血少許硃砂一分研阿魏一分細末右研勻取端午日合粽子尖七枚和丸如黍粒大男左女右綿裹一丸砒霜丸出聖恵方治瘧發作無時者不定寒熱砒霜一兩阿魏一分雄黄三分硃砂一分並細研右於端午日午時用糯米飯和丸菉荳大去發一時辰綿裹三丸男左女右塞耳中如惡發茶清下三丸當吐靈砂丹出聖恵方治瘧發作無時經久不瘥硃砂半麝香二錢蝙蝠糞五十豆右研細用軟糯米飯和丸菉豆大未發時煖水下十丸必効方出聖恵方治瘧無問新久發作無時黄丹四兩麫塵一兩右取五月五日午時面東不語研搗獨蒜和丸雞頭實大男左女右於背上錦帛繫一丸欲發時醋湯下之百瘥方出聖恵方治瘧無問新久發作無時恒山末一兩葎草一握去兩頭姓名勒夢秋冬月乾採亦得右以淡浆水二盞浸藥於星月下上横一刀經宿明早晨煎取一盞去滓空腹分二服如人行七八里再服當快吐痰午後漸食粥又方出聖恵方用青皮一兩燒灰研細未發前温酒調下一錢正發時又服一錢恒山湯出肘後方治瘧發作無常心下煩悶恒山二兩甘草炙一兩半䜴五合綿裹右切以水六升煎去滓取二升再服當快吐仍節飲食忌海藻菘菜生葱菜大効五丁飲子出海上方治瘧發作重者白豆䓻五箇每箇分作五塊生薑切如皂子大作二十五塊京棗五箇毎箇分五塊半夏二十五箇甘草五寸毎寸分作五塊右通作一百二十五塊於未發前一日至晩作一劑水二碗煎一碗去滓再燒兩糞滚作三服夜露中庭至四鼔煖過熱吃一服再於曙色分時吃一服次至天曉吃些粥若稍空更吃一服便去睡極効藥餛飩出衛生方良薑吳茱萸胡椒各一分右為細末猪脾一條剉作臛加五味炒之一半滚藥一半不滚並作餛飩有藥者以墨㸃之餘者吞下無藥者嚼下亦一服効普濟方卷一百九十八
