body:
  text: 普濟方卷一百九十八明周王朱橚撰諸瘧門足厥隂肝瘧附論夫經謂足厥隂肝瘧在經則令人腰疼小腹滿小便不利如癃状非癃也數便意欲恐懼氣不足腹中悒悒在藏則令人色蒼蒼然太息其狀若死者俱刺足厥隂盖足厥隂之脉循隂氣客之則小腹滿小便不利也肝為将軍之官智謀出焉故病則恐懼不足也蒼蒼者肝之色也宜察其經絡臟腑而治之治肝瘧顔色蒼蒼顫掉氣喘積年不瘥鼈甲丸等方主之方鼈甲丸一名烏梅丸出千金方治肝瘧色蒼蒼顫掉氣喘乆不瘥者如死或乆熱勞㣲動如瘧鼈甲去裙襴醋浸乆蜀漆葉烏梅取肉炒常山剉知母焙各一分甘草㣲炒細辛去葉苦參萎蕤各半兩香䜴一各㣲炒石膏半兩研右為末煉蜜丸如梧桐子大每服十丸未發前米飲下臨發再服烏梅丸出聖恵方治肝瘧乆不瘥烏梅取肉酒浸㣲炒常山剉各一兩知母犀角鎊屑丹砂别研龍骨别研升麻䜴桂去皮甘草剉㣲炒桃仁湯浸去皮尖雙仁麫炒過各半兩虎頭骨醋炙鼈甲去裙襴酥炙黄一兩右為極細末再同研匀煉蜜和搜成劑於净石臼中搗至二三百下杵然後作丸如梧桐子大每服二十丸空心温酒吞下晚食前再服蜀漆丸出聖恵方治肝瘧顔色蒼蒼顫掉氣喘變成勞瘧積年不瘥蜀漆烏梅取肉㣲炒常山剉各半兩鼈甲去裙襴醋炙石膏研各一兩䜴一合甘草剉㣲炒知母苦參剉麝香細研桃仁湯浸去皮尖雙仁麫過各半兩右為末同硏令勻煉蜜和搗二三百杵丸如桐子大空心温酒下二十丸晚食前再服粥飲下亦得知母湯出聖恵方治肝瘧上焦壅滯心煩頭疼寒熱不止肌肉消瘦不下食知母地骨皮升麻各一兩鼈甲同前犀角鎊屑麥冬人參柴胡去苖石膏各一兩甘草生剉半兩虎頭骨酥炙過一兩半右麄搗篩每服四錢水一盞入香豉五十粒煎至六分去滓温服不計時候木香犀角丸治肝瘧木香犀角鎊屑羚羊角鎊屑各一兩半升麻甘草炙各二兩元參堅者猪苓去皮滓炙㯽榔各二兩鼈甲酥炙豉炒五兩右為細末煉蜜和丸如梧桐子大温酒或米飲下三十丸分服體熱即去甘草㯽榔加大黄五兩烏梅飲治肝瘧小便不利如癃烏梅取肉山梔子各半兩知母一兩芍藥木通剉生地黄升麻各二分右㕮咀如麻豆每服五錢水盞半煎至一盞去滓下朴硝一錢食後未發前温服分二服大柴胡湯出旅舎備要方治瘧病寒熱嘔逆脉弦小𦂳間日頻旦發作無時及傷寒熱結在裏腹滿譫言煩渴大小便澁幷痰氣寒熱方柴胡去苗八兩芍藥黄芩各三兩半夏二兩五湯七次枳殻實炒去穰半兩大黄二兩右為散每服五錢水二盞半薑五片棗三箇同煎至兩盞去滓帯熱頓服半夏湯出衛生家寳方治瘧疾及暑毒消痰逐飲半夏湯泡七次白茯苓青皮去白陳皮去白枳殻去穰炒桔梗炒各一兩右為剉散每服三錢水一盞半生薑十片煎至七分温服手少隂心瘧附論夫心瘧者内經謂令人煩心甚欲得清水反寒多不甚熱刺手少隂是也葢心為神舎邪不可干邪氣干之故煩心其欲得清水者以心火内熱故也其反寒多不甚熱者内熱而外寒故也治宜通心經利邪熱則愈方甘草湯出千金方治心熱為瘧不止或止後熱不渴乍來乍去令人煩心甚欲飲水反寒多不甚熱者甘草一兩蜀漆三兩常山鼈甲各四兩石膏五兩香䜴一合梔子烏梅各三枚竹葉切升二右㕮咀以水九升煮取三升分三服柴胡栝蔞根湯出衛生寳鑑方治瘧而發渴者方見夲門發渴類大黄丸出聖恵方治心瘧發歇不定川大黄半兩炙剉肉炒常山一分香豉四十九粒砒霜細研一分鼈甲酥炙麝香一錢研細硃砂一分研細右為末入後三味研令勻醋煮麫糊和丸如梧桐子大每服食前用桃仁冷醋湯下二丸忌食熱物熊膽丸出聖恵方治心瘧砒霜研半分丹砂研麝香研雄黄研熊膽各二分右以熊膽和丸如菉豆大發日空心冷水下二丸臨發時再服一丸皆以冷飲嚈或當日便止或大作乃差如欲吐即以煖水下之當吐出痰涎麝香丸出聖恵方治心瘧砒霜一分麝香一分金箔三十片黄丹一分炒令紫色硃砂一兩右細研令勻用粳米飯和丸如梧桐子大男左女右中指上節用緋帛褁繫一丸發前以冷醋湯下一丸忌食熱物常山丸出聖恵方治心疼瘧常山别搗治一兩桃仁取陳者去雙仁炒和皮搗細一兩鉛丹八錢細研豉一合炒令可碎乾净手捻勻别搗右研為末煉蜜和再搗千杵丸梧桐子大每服十五丸雞鳴空心酒下欲發時再服十五丸其日不得梳洗發過方可飲食一方桃仁湯下硃砂丸出聖恵方治心瘧光明砂半兩研細常山一兩杏仁十枚湯浸去皮尖雙仁炒㣲黄右為末研入硃砂令勻煉蜜和丸如梧桐子大未發前粥湯飲下十五丸欲發時再服足太隂脾瘧附論夫足太隂之經脾之脉也脾經之瘧令人不樂好太息不嗜食多寒熱汗出病至則嘔嘔已乃寒寒則腹中痛熱則腸中鳴鳴已汗出故謂之太隂瘧又名脾瘧方木香丸治脾瘧木香附子炮去皮臍大黄剉炒厚朴去粗皮薑汁炙人參各一兩芍藥桂去粗皮荆三稜煨獨活去蘆頭乾薑炮羗活去蘆芎藭甘草炙各半兩陳皮湯去白炒㯽榔剉各二兩右為細末煉蜜丸如梧桐子大每服三十丸未發温水下日三一方以前藥十五味為末磁噐盛之宻封臨服加牽牛末二分同藥末一兩同研勻煉蜜為丸如梧桐子大心腹脹滿一切風勞冷氣臍下刺痛口吐清水白沫醋心痃癖氣塊男子腎臟風毒攻刺四體及陽毒脚氣目昏頭痛心間嘔逆及兩脇堅滿不消卧時橘皮湯下三十丸以利為度此後每夜二十丸女人血利下血痛刺積年血塊胃口逆手足心煩熱不思飲食薑湯下三十丸取利每美夜更服二十丸小兒五嵗以上疸氣腸胃氣喘空心温湯下五七丸小者減丸數服丸胸腹飽悶不消脾泄不止臨卧温酒下取利食毒癰疽發背山嵐瘴氣說覺頭痛背膊拘𦂳便宜服之快利為度若常服此藥可以不染瘴疾凡瘴氣皆因脾胃實熱所致常以凉藥解膈上壅熱并以此藥通利稱善此丸夲治嵐瘴及温瘧大效李敦裕以此方刻石於大庾嶺得効者不可勝數昔人嘗有擁兵過漳者軍人皆感瘧用此治之應時患愈江南時值嵗發温瘧以此藥服之其効如神皆以得快利為度又記凡乆瘧服藥訖乃灸氣海百壮又灸中脘三十壮尤善又加肉荳䓻六枚去根止瀉方用青蒿湯治脾瘧寒熱善嘔多汗治鬼瘧内藥鼻中立效方出聖恵方天靈盖猢猻頭骨臰黄細研阿魏乳香藜蘆去蘆頭黄丹各七分麝香一錢細研右為末研令勻以醋煮麫糊和丸如豇豆大欲發前先以綿裹一丸用内鼻中瘥麝香丸出聖恵方治鬼瘧發動無時節寒熱不定麝香細研硃砂研細各三分砒霜細研恒山剉鼈甲塗酥炙黄去裙虎頭骨酥炙㣲黄甘草生用川大黄生用各半兩右為末研入前三味令勻五月五日以粽子和丸如梧桐子大臨欲發時以温酒下三丸得吐瀉為度輔正丸出聖濟總録治鬼瘧天靈盖酥炙砒霜研丹砂研麝香研虎頭骨酒炙鉛丹研猢猻頭骨酒炙菉豆粉各半兩右為細末用粟米飯和丸如梧桐子大每服一丸未發前新汲水下或以手握之有孕婦不得食小兒只可半丸以菉豆湯下其藥以五月五日合靣東搗之虎睛丸出聖濟總録治鬼瘧虎睛一對酒浸炙丹砂研麝香研雄黄研砒霜研安息香入胡桃仁和研阿魏研天靈盖酥炙各三分右為末用燒餅和丸如小豆大每服用一丸未發前男左女右手把之一丸可療十人丹雄丸出聖濟總録治鬼瘧丹砂炒一錢膩粉三錢巴豆七粒去皮心膜去油乳香研麝香研雄黄研砒霜研各半錢右為末水浸炊餅心為丸如梧桐子大每服一丸發前新汲水下萬安丸出聖濟總録治鬼瘧虎頭骨酒炙三兩藜蘆六兩雄黄研鬼臼天雄炮裂去皮臍蕪荑炒皂莢酥炙去皮子各一兩右除雄黄外為末入研者雄黄和勻煉蜜丸如彈子大令患者頭上戴一丸立瘥若除伏屍於房四角燒四粒疫氣於牀前燒一粒甘草烏梅各等分右㕮咀每服半兩水盞半薑五片棗二枚同煎至七分不拘時候寒多者加乾薑附子熱甚者止加柴胡瘴瘧加檳榔所加者各等分一方加人參一方熱多者加石膏生熱飲子一名交加飲子出十便良方治脾寒脾經受冷時發寒熱及升降隂陽治瘧疾辟瘴氣方見夲門乆瘧類半夏散出御藥院方治足少隂瘧嘔吐半夏湯洗去滑為末生薑汁和并暴乾再為末右同研勻每服二錢温酒一盞調下未發日頓服知母丸治瘧疾脾寒知母貝母草菓仁甘草鼈甲酥炙九炙常山用淡豆䜴一合米醋一升同煎乾下用䜴細切常山右等分為細末煉蜜為丸如梧桐子大每服三十丸當發日入麝香酒送下仍用後藥助氣除桂建中湯黄耆兩半白芍藥一兩甘草二錢半右為末每服三錢水盞半生薑棗子入餳糖少許再煎化空心服常山丸出經効濟世方治脾瘧由熱氣内傷不洩故脾瘧令人病腸中熱痛外寒腸中轉鳴汗出治一切瘧疾常山一兩剉甘草半兩剉炒㣲赤知母一兩䜴一合麝香一分細研鼈甲一兩塗醋炙令黄色先去裙襴右為末與麝香末和勻煉蜜為丸如桐子大於未發前温下二十丸臨發再服已試極驗人參散治脾瘧人參甘草炙各一分陳皮湯浸去白焙半兩烏梅五枚去核焙草荳䓻七枚去皮右剉為末每服五錢濕紙裹定熟水盞半生薑棗大拍碎棗二枚擘破磁器内煎一盞去滓未發前温服㯽榔湯治脾瘧寒熱㯽榔剉青橘皮湯浸去白焙前胡白术菝葜各一兩右搗篩每服三錢水一盞煎至七分未發前去滓温服橘皮散治脾瘧陳橘皮湯浸去白焙常山乾漆炒出煙桂去粗皮各三分牡蠣燒赤一分右為末散每服三錢未發前温酒下三服必瘥硫黄丸治脾瘧無問逺近阿魏研安息香入胡桃穰研萊菔子各三錢炒蕪荑仁㣲為末炒三分右為細末煉蜜丸如菉豆大每服二十丸未發前温水下得吐為瘥後作少蒜虀下餺飥食之仍以白芥子用紗囊盛男左女右繫於臂常山丸治脾熱為瘧或不渴熱氣内傷不瀉令人病寒腹中痛腸中鳴汗出常山三兩甘草半兩知母鼈甲各一兩右為末蜜丸如桐子大未發前温服十丸臨發前時服一服正發一服辰砂丸出宣明論治一切脾胃虚弱熱邪毒者信砒甘草各一錢硃砂二錢大豆四十九粒右為末滴水和丸分作四十丸服發日日欲出時桃仁湯下忌熱物厚朴湯治脾瘧不思食厚朴去粗皮生薑汁炙三兩半夏為末薑汁作焙乾汁作一兩陳橘皮湯洗去白焙二兩右麄搗篩每服三錢水一盞生薑三片棗一枚擘破煎至七分去滓空心日午臨卧各一服能截脾寒五月五日脩合用大蒜不以多少搗爛次入礬紅拌勻為圎眼大每服一丸大蒜湯送下薑橘散一名十棗湯出𫝊信通用方治脾及諸瘧右真橘皮不拘多少去白細切曝㣲乾以生薑自然汁浸過陳皮一指許銀器内重湯煮乾焙為末每服三錢用隔年青水棗十枚水一盞煎至半盞以此藥通口服以棗下之於發日先一時辰服之不過兩服而止後再一服不拘老少孕婦皆可用服草菓平胃散出危氏方治脾虚作瘧不問寒熱先後飲食不進以生料平胃散四兩加入草菓大腹皮㯽榔青皮各二兩剉碎相和勻每服五錢水一盞半薑三片棗二枚煎七分空心多服取効半夏散治脾瘧方見本門足隂腎瘧類草菓飲治脾寒草菓常山㯽榔甘草少許黒豆各等分右㕮咀水二盞煎一盞去滓露一宿空心未發前一日温服歘火丹治脾寒淡豉二兩信二錢雄黄五錢硃砂三錢右為末用蒸餅量多少搗和為丸如梧桐子大每服五十丸隔發一時用冷水送下忌熱物濕麫發毒等物三五日呉茱萸湯出楊子建䕶命方治脾熱寒瘧非時發作肌肉黄痩食減腸泄腸痛大腑不調呉茱茰煉洗焙炒乾芎藭鼈甲去裙襴酥炙