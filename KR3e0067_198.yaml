body:
  text: 普濟方卷一百九十八明周王朱橚撰諸瘧門足厥隂肝瘧附論夫經謂足厥隂肝瘧在經則令人腰疼小腹滿小便不利如癃狀非癃也數便意欲恐懼氣不足腹中悒悒在藏則令人色蒼蒼然太息其狀若死者俱刺足厥隂蓋足厥隂之脈循隂氣客之則小腹滿小便不利也肝為將軍之官智謀出焉故病則恐懼不足也蒼蒼者肝之色也宜察其經絡臟腑而治之治肝瘧顔色蒼蒼顫掉氣喘積年不瘥鱉甲丸等方主之方鱉甲丸一名烏梅丸出千金方治肝瘧色蒼蒼顫掉氣喘久不瘥者如死或久熱勞微動如瘧鱉甲去裙襴醋浸久蜀漆葉烏梅取肉炒常山銼知母焙各一分甘草微炒細辛去葉苦參萎蕤各半兩香䜴一各微炒石膏半兩研右為末煉蜜丸如梧桐子大每服十丸未發前米飲下臨發再服烏梅丸出聖惠方治肝瘧久不瘥烏梅取肉酒浸微炒常山銼各一兩知母犀角鎊屑丹砂别研龍骨别研升麻䜴桂去皮甘草銼微炒桃仁湯浸去皮尖雙仁麵炒過各半兩虎頭骨醋炙鱉甲去裙襴酥炙黃一兩右為極細末再同研勻煉蜜和搜成劑於淨石臼中搗至二三百下杵然後作丸如梧桐子大每服二十丸空心溫酒吞下晚食前再服蜀漆丸出聖惠方治肝瘧顔色蒼蒼顫掉氣喘變成勞瘧積年不瘥蜀漆烏梅取肉微炒常山銼各半兩鱉甲去裙襴醋炙石膏研各一兩䜴一合甘草銼微炒知母苦參銼麝香細研桃仁湯浸去皮尖雙仁麵過各半兩右為末同研令勻煉蜜和搗二三百杵丸如桐子大空心溫酒下二十丸晚食前再服粥飲下亦得知母湯出聖惠方治肝瘧上焦壅滯心煩頭疼寒熱不止肌肉消瘦不下食知母地骨皮升麻各一兩鱉甲同前犀角鎊屑麥冬人參柴胡去苖石膏各一兩甘草生銼半兩虎頭骨酥炙過一兩半右粗搗篩每服四錢水一盞入香豉五十粒煎至六分去滓溫服不計時候木香犀角丸治肝瘧木香犀角鎊屑羚羊角鎊屑各一兩半升麻甘草炙各二兩元參堅者豬苓去皮滓炙檳榔各二兩鱉甲酥炙豉炒五兩右為細末煉蜜和丸如梧桐子大溫酒或米飲下三十丸分服體熱即去甘草檳榔加大黃五兩烏梅飲治肝瘧小便不利如癃烏梅取肉山梔子各半兩知母一兩芍藥木通銼生地黃升麻各二分右㕮咀如麻豆每服五錢水盞半煎至一盞去滓下朴硝一錢食後未發前溫服分二服大柴胡湯出旅舍備要方治瘧病寒熱嘔逆脈弦小緊間日頻旦發作無時及傷寒熱結在裏腹滿譫言煩渴大小便澀並痰氣寒熱方柴胡去苗八兩芍藥黃芩各三兩半夏二兩五湯七次枳殼實炒去穰半兩大黃二兩右為散每服五錢水二盞半薑五片棗三箇同煎至兩盞去滓帶熱頓服半夏湯出衛生家寶方治瘧疾及暑毒消痰逐飲半夏湯泡七次白茯苓青皮去白陳皮去白枳殼去穰炒桔梗炒各一兩右為銼散每服三錢水一盞半生薑十片煎至七分溫服手少隂心瘧附論夫心瘧者內經謂令人煩心甚欲得清水反寒多不甚熱刺手少隂是也蓋心為神舍邪不可干邪氣干之故煩心其欲得清水者以心火內熱故也其反寒多不甚熱者內熱而外寒故也治宜通心經利邪熱則愈方甘草湯出千金方治心熱為瘧不止或止後熱不渴乍來乍去令人煩心甚欲飲水反寒多不甚熱者甘草一兩蜀漆三兩常山鱉甲各四兩石膏五兩香䜴一合梔子烏梅各三枚竹葉切升二右㕮咀以水九升煮取三升分三服柴胡栝蔞根湯出衛生寶鑑方治瘧而發渴者方見夲門發渴類大黃丸出聖惠方治心瘧發歇不定川大黃半兩炙銼肉炒常山一分香豉四十九粒砒霜細研一分鱉甲酥炙麝香一錢研細硃砂一分研細右為末入後三味研令勻醋煮麵糊和丸如梧桐子大每服食前用桃仁冷醋湯下二丸忌食熱物熊膽丸出聖惠方治心瘧砒霜研半分丹砂研麝香研雄黃研熊膽各二分右以熊膽和丸如菉豆大發日空心冷水下二丸臨發時再服一丸皆以冷飲嚈或當日便止或大作乃差如欲吐即以暖水下之當吐出痰涎麝香丸出聖惠方治心瘧砒霜一分麝香一分金箔三十片黃丹一分炒令紫色硃砂一兩右細研令勻用粳米飯和丸如梧桐子大男左女右中指上節用緋帛褁繫一丸發前以冷醋湯下一丸忌食熱物常山丸出聖惠方治心疼瘧常山别搗治一兩桃仁取陳者去雙仁炒和皮搗細一兩鉛丹八錢細研豉一合炒令可碎乾淨手捻勻别搗右研為末煉蜜和再搗千杵丸梧桐子大每服十五丸雞鳴空心酒下欲發時再服十五丸其日不得梳洗發過方可飲食一方桃仁湯下硃砂丸出聖惠方治心瘧光明砂半兩研細常山一兩杏仁十枚湯浸去皮尖雙仁炒微黃右為末研入硃砂令勻煉蜜和丸如梧桐子大未發前粥湯飲下十五丸欲發時再服足太隂脾瘧附論夫足太隂之經脾之脈也脾經之瘧令人不樂好太息不嗜食多寒熱汗出病至則嘔嘔已乃寒寒則腹中痛熱則腸中鳴鳴已汗出故謂之太隂瘧又名脾瘧方木香丸治脾瘧木香附子炮去皮臍大黃銼炒厚朴去粗皮薑汁炙人參各一兩芍藥桂去粗皮荆三稜煨獨活去蘆頭乾薑炮羌活去蘆芎藭甘草炙各半兩陳皮湯去白炒檳榔銼各二兩右為細末煉蜜丸如梧桐子大每服三十丸未發溫水下日三一方以前藥十五味為末磁器盛之密封臨服加牽牛末二分同藥末一兩同研勻煉蜜為丸如梧桐子大心腹脹滿一切風勞冷氣臍下刺痛口吐清水白沫醋心痃癖氣塊男子腎臟風毒攻刺四體及陽毒腳氣目昏頭痛心間嘔逆及兩脅堅滿不消卧時橘皮湯下三十丸以利為度此後每夜二十丸女人血利下血痛刺積年血塊胃口逆手足心煩熱不思飲食薑湯下三十丸取利每美夜更服二十丸小兒五嵗以上疸氣腸胃氣喘空心溫湯下五七丸小者減丸數服丸胸腹飽悶不消脾泄不止臨卧溫酒下取利食毒癰疽發背山嵐瘴氣説覺頭痛背膊拘緊便宜服之快利為度若常服此藥可以不染瘴疾凡瘴氣皆因脾胃實熱所致常以涼藥解膈上壅熱并以此藥通利稱善此丸夲治嵐瘴及溫瘧大效李敦裕以此方刻石於大庾嶺得效者不可勝數昔人嘗有擁兵過漳者軍人皆感瘧用此治之應時患愈江南時值嵗發溫瘧以此藥服之其效如神皆以得快利為度又記凡久瘧服藥訖乃灸氣海百壯又灸中脘三十壯尤善又加肉豆䓻六枚去根止瀉方用青蒿湯治脾瘧寒熱善嘔多汗治鬼瘧內藥鼻中立效方出聖惠方天靈蓋猢猻頭骨臰黃細研阿魏乳香藜蘆去蘆頭黃丹各七分麝香一錢細研右為末研令勻以醋煮麵糊和丸如豇豆大欲發前先以綿裹一丸用內鼻中瘥麝香丸出聖惠方治鬼瘧發動無時節寒熱不定麝香細研硃砂研細各三分砒霜細研恆山銼鱉甲塗酥炙黃去裙虎頭骨酥炙微黃甘草生用川大黃生用各半兩右為末研入前三味令勻五月五日以粽子和丸如梧桐子大臨欲發時以溫酒下三丸得吐瀉為度輔正丸出聖濟總録治鬼瘧天靈蓋酥炙砒霜研丹砂研麝香研虎頭骨酒炙鉛丹研猢猻頭骨酒炙菉豆粉各半兩右為細末用粟米飯和丸如梧桐子大每服一丸未發前新汲水下或以手握之有孕婦不得食小兒只可半丸以菉豆湯下其藥以五月五日合靣東搗之虎睛丸出聖濟總録治鬼瘧虎睛一對酒浸炙丹砂研麝香研雄黃研砒霜研安息香入胡桃仁和研阿魏研天靈蓋酥炙各三分右為末用燒餅和丸如小豆大每服用一丸未發前男左女右手把之一丸可療十人丹雄丸出聖濟總録治鬼瘧丹砂炒一錢膩粉三錢巴豆七粒去皮心膜去油乳香研麝香研雄黃研砒霜研各半錢右為末水浸炊餅心為丸如梧桐子大每服一丸發前新汲水下萬安丸出聖濟總録治鬼瘧虎頭骨酒炙三兩藜蘆六兩雄黃研鬼臼天雄炮裂去皮臍蕪荑炒皂莢酥炙去皮子各一兩右除雄黃外為末入研者雄黃和勻煉蜜丸如彈子大令患者頭上戴一丸立瘥若除伏尸於房四角燒四粒疫氣於牀前燒一粒甘草烏梅各等分右㕮咀每服半兩水盞半薑五片棗二枚同煎至七分不拘時候寒多者加乾薑附子熱甚者止加柴胡瘴瘧加檳榔所加者各等分一方加人參一方熱多者加石膏生熱飲子一名交加飲子出十便良方治脾寒脾經受冷時發寒熱及升降隂陽治瘧疾辟瘴氣方見夲門久瘧類半夏散出御藥院方治足少隂瘧嘔吐半夏湯洗去滑為末生薑汁和并暴乾再為末右同研勻每服二錢溫酒一盞調下未發日頓服知母丸治瘧疾脾寒知母貝母草果仁甘草鱉甲酥炙九炙常山用淡豆䜴一合米醋一升同煎乾下用䜴細切常山右等分為細末煉蜜為丸如梧桐子大每服三十丸當發日入麝香酒送下仍用後藥助氣除桂建中湯黃耆兩半白芍藥一兩甘草二錢半右為末每服三錢水盞半生薑棗子入餳糖少許再煎化空心服常山丸出經效濟世方治脾瘧由熱氣內傷不泄故脾瘧令人病腸中熱痛外寒腸中轉鳴汗出治一切瘧疾常山一兩銼甘草半兩銼炒微赤知母一兩䜴一合麝香一分細研鱉甲一兩塗醋炙令黃色先去裙襴右為末與麝香末和勻煉蜜為丸如桐子大於未發前溫下二十丸臨發再服已試極驗人參散治脾瘧人參甘草炙各一分陳皮湯浸去白焙半兩烏梅五枚去核焙草豆䓻七枚去皮右銼為末每服五錢濕紙裹定熟水盞半生薑棗大拍碎棗二枚擘破磁器內煎一盞去滓未發前溫服檳榔湯治脾瘧寒熱檳榔銼青橘皮湯浸去白焙前胡白术菝葜各一兩右搗篩每服三錢水一盞煎至七分未發前去滓溫服橘皮散治脾瘧陳橘皮湯浸去白焙常山乾漆炒出煙桂去粗皮各三分牡蠣燒赤一分右為末散每服三錢未發前溫酒下三服必瘥硫黃丸治脾瘧無問逺近阿魏研安息香入胡桃穰研萊蔔子各三錢炒蕪荑仁微為末炒三分右為細末煉蜜丸如菉豆大每服二十丸未發前溫水下得吐為瘥後作少蒜虀下餺飥食之仍以白芥子用紗囊盛男左女右繫於臂常山丸治脾熱為瘧或不渴熱氣內傷不瀉令人病寒腹中痛腸中鳴汗出常山三兩甘草半兩知母鱉甲各一兩右為末蜜丸如桐子大未發前溫服十丸臨發前時服一服正發一服辰砂丸出宣明論治一切脾胃虛弱熱邪毒者信砒甘草各一錢硃砂二錢大豆四十九粒右為末滴水和丸分作四十丸服發日日欲出時桃仁湯下忌熱物厚朴湯治脾瘧不思食厚朴去粗皮生薑汁炙三兩半夏為末薑汁作焙乾汁作一兩陳橘皮湯洗去白焙二兩右粗搗篩每服三錢水一盞生薑三片棗一枚擘破煎至七分去滓空心日午臨卧各一服能截脾寒五月五日修合用大蒜不以多少搗爛次入礬紅拌勻為圎眼大每服一丸大蒜湯送下薑橘散一名十棗湯出傳信通用方治脾及諸瘧右真橘皮不拘多少去白細切曝微乾以生薑自然汁浸過陳皮一指許銀器內重湯煮乾焙為末每服三錢用隔年青水棗十枚水一盞煎至半盞以此藥通口服以棗下之於發日先一時辰服之不過兩服而止後再一服不拘老少孕婦皆可用服草果平胃散出危氏方治脾虛作瘧不問寒熱先後飲食不進以生料平胃散四兩加入草果大腹皮檳榔青皮各二兩銼碎相和勻每服五錢水一盞半薑三片棗二枚煎七分空心多服取效半夏散治脾瘧方見本門足隂腎瘧類草果飲治脾寒草果常山檳榔甘草少許黑豆各等分右㕮咀水二盞煎一盞去滓露一宿空心未發前一日溫服歘火丹治脾寒淡豉二兩信二錢雄黃五錢硃砂三錢右為末用蒸餅量多少搗和為丸如梧桐子大每服五十丸隔發一時用冷水送下忌熱物濕麵發毒等物三五日吳茱萸湯出楊子建護命方治脾熱寒瘧非時發作肌肉黃瘦食減腸泄腸痛大腑不調吳茱茰煉洗焙炒乾芎藭鱉甲去裙襴酥炙