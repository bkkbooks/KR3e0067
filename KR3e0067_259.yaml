body:
  text: 普濟方卷二百五十九明周王朱橚撰食治門食治水腫病附論夫腎主於水脾胃俱主於土土性尅水脾與胃合胃為水榖之海若胃虛不能傳化使水氣滲溢經絡浸漬腑臟脾得水濕則病不能制於水故氣獨歸於腎三膲不㵼經絡閉塞水穀溢於皮膚而令腫也冝以食治之方赤小豆羮方出聖惠方治水氣腹大臍腫腰痛不可轉動赤小豆五合桑根白皮三兩銼白术二兩鯉魚一頭三斤洗治如常右水一斗都一處煮候魚熟取出魚盡食之其豆亦冝喫勿著鹽味其汁入蔥白生薑橘皮入少醋調和作羮食之甚效鯉魚粥方出聖惠方治水腫利小便鯉魚一頭重可一斤去腸淨洗商陸二兩銼赤小豆三合紫蘇莖葉二兩右於淨鍋內著水五大盞都煮候魚爛熟空腹食之其汁入蔥白生薑橘皮及少醋調和作羮食之其豆亦冝喫甚妙海蛤索餅方出聖惠方治水腫海蛤搗研如麵一兩甘遂三分為末絹羅如麵郁李仁湯浸去皮微炒研末一兩一分右以桑根白皮一兩用水二升煮如嫩即加乾棗三十枚擘破同煮取一升去滓取入前件藥和如作索餅法煮令熟看冷暖得所空腹服食須臾快利小便甚多勿怪黑豆粥方出聖惠方治水氣利小便除浮腫黑豆半升桑枝銼半升構枝銼半升右以水五大盞煮取二大盞去滓每取汁一盞入米一合煮作粥空心食之又方出聖惠方鯉魚一頭重可一斤去鱗腸肚淨洗赤小豆半升淘令淨冬麻子半升水研濾取汁一升右先以水四大盞煮魚豆欲熟入麻子汁更煮十餘沸出魚空腹食之其豆汁并冝食之又方出聖惠方商陸汁三合生薑汁一合生地黃汁三合右相和煎三五沸每取二合攪粥半盞空心食之羊肉臛方出聖惠方治水腫羊肉細切三兩商陸去皮切半斤右先以水三大盞煮商陸至二升去滓下肉煮入蔥䜴鹽等作臛如常法任意食之商陸赤者有毒慎不可用白雞湯方出聖濟總録治腹大水腫利小便白雞一隻赤小豆一升右治如食法以水三升煮豆并雞候熟之食其汁稍飲令盡麻子粥方出聖惠方治風水腹大臍腫腰痛不可轉動亦治腳氣腫暴咳嗽小便澀痛虛勞補益冬麻子搗取汁半升粳米三合右以麻子汁和米入薑蔥䜴椒等煮作稀粥空腹食之又方出聖惠方郁李仁一兩半搗却以水和取汁薏苡仁二合右以郁李仁汁煮薏苡仁作粥空腹食之未愈更作餅子方出聖濟總録治水氣面及腹微腫及未曽服藥者郁李仁湯浸去皮炒熟二兩甘遂酥炒令熟三分右搗羅為末用大麥麵一兩藥末一兩水和作餅子濕紙褁煨熟空腹服食須臾快利即止商陸粥方出聖濟總録治水氣右用商陸去皮銼二兩以水三升煮取一升去滓入以細粟米一合煮成粥空腹食之微利為度燒冬瓜方出聖濟總録治卒腫滿身面皆洪大右用黃土厚泥冬瓜火燒令熟去土食之豬肝方出聖濟總録治浮腫脹滿不下食心悶腳氣腫右用豬肝一具切作胾臠著蔥䜴薑椒鹽等令乘熱食之腳氣腫細切豬肝水洗拭乾大蒜食之良治腳腫氣轉上入腹垂死方出聖惠方右用赤小豆一升淘令淨以水三升煮熟去豆取其汁浸腳即重暖用之其豆食之亦妙治十腫水病不差垂命方出聖惠方右用猯豬肉半斤細切以粳米三合水三升入蔥䜴及椒薑作粥每日空腹食之又方出聖惠方右用青頭鴨一隻剝去毛足頭及腸洗淨和粳米煮之令熟著五味薑蔥豉任意食之治水氣浮腫小便澀方出聖惠方右用鯉魚一頭重一斤者治如食法煮令熟取汁入以冬瓜蔥白作羮食之一日盡再作食治水氣浮腫腹脹小便澀方出聖濟總録右用水牛蹄一隻治如食法煮熟銼碎作羮空心腹食之水牛皮細切蒸熟薑醋食之亦可食治腳氣附論夫腳氣者晉魏已前名為緩風古來無腳氣名後以病從腳起初發因腫滿故名腳氣耳又有不腫而緩弱者行即卒倒漸至不仁毒氣隂上攻心便至危困急不旋踵寬延嵗月然即緩風毒氣得其總稱矣此病狀證尤多經方備證今冝以食治之方橘皮粥方出聖惠方治腳氣心胸壅悶氣促不食陳橘皮一兩湯浸去白焙紫蘇莖葉一兩大腹皮子三枚桑根白皮一兩生薑三分切粳米二合右細銼以水三大盞煮取一盞半去滓下米煮粥空心食之郁李仁粥方出聖惠方治腳膝痺氣大便風澀郁李仁二十一顆湯退去皮研如膏粳米三合淨揀淘蜜一合生薑搗汁半合右以水一升煮粳米令熟次入郁李仁薑蜜等空腹食之如食不盡即候日中再食之檳榔粥方治腳氣喘悶大腸壅澀白檳榔熟水磨一顆粳米淨淘一合生薑汁半合蜜一合右以水半升煮米令熟次下蜜并檳榔生薑等汁同煮為粥空腹食之蓯蓉羮方出聖濟總録治丈夫久積虛損陽氣衰腰腳疼痛無力肉蓯蓉溫水洗去圡細切一兩白羊腎一對去脂膜切蔥白七莖擘羊肺二兩切右入五味汁作羮空腹食之炙肚方出聖濟總録治下膲風冷腰腳疼痛豬肚一枚治如食法切為臠酒半升蔥白七莖切細右以五味醬等拌炙熟空腹食之鯉魚羮方出聖惠方治腳氣衝心煩懆言語錯謬鯉魚一頭治如食法蓴菜四兩蔥白二合右調和䜴汁作羹食之一方服蔥白馬齒莧方出聖惠方治腳氣頭面浮腫心腹脹滿小便澀少馬齒莧洗淨四兩粳米一合醬汁半合右以水三大盞先煮粳米次下馬齒莧候菜熟入醬汁調和食之日冝一次鹿蹄方出聖惠方治腳氣風冷濕痺四肢攣急腳痛不得踐地鹿蹄一具淨洗銼碎牛膝葉銼碎半斤右以豉汁五升先煮鹿蹄令熟次入牛膝葉及蔥白五寸拍破兼入椒薑末各一錢同煮至二升調和旋旋食之牛膝粥方出聖惠方治風濕下注腰膝無力疼痛牛膝葉切一斤粟米五合右以䜴汁中相和煮作粥入少五味調和空腹食之恐食不盡兩度食之紫蘇子粥方出聖惠方治腳氣浮腫脹滿不下食及小便不通紫蘇子三合粳米一合右以水三大盞研取汁去滓入淨淘粳米一合煮粥初熟時入豉椒薑各少許攪和空腹食之生栗子方出聖惠方治腳氣腎虛腰腳無力冝喫右用栗子不限多少布袋盛懸令乾每日平明喫十有餘顆次喫豬腎粥佳獖豬肝方出聖惠方治腳氣上衝入腹右用獖豬肝一具去脂膜細切以蒜虀五味調和空心食之如食不盡分為三兩遍食亦得又方出聖惠方右用水牛犢子頭蹄治如食法蒸令極熟停冷任性食之豉心方出聖惠方治風毒腳氣膝脛攣急骨節痛右用豉心五升九蒸九曝以酒一斗半浸經宿每取用一小盞攪粥食之楮皮粥方出聖惠方治腳氣右用楮白皮微炙細切三升以水三升煎取一升半即去滓澄清入白粳米一合淘淨煮粥空心服食治五淋附論夫五淋者石淋勞淋血淋氣淋膏淋是也此皆由腎虛而膀胱熱也腎虛則小便數膀胱熱則水澀淋瀝下宣故謂之淋也小便數又多者此由下膲虛冷故也腎主水與膀胱為表裏腎氣衰不能制其津液脬內虛冷水不下禁故令小便數而多也冝以食治之方酥粥方出聖濟總録治小便淋痛真酥一兩白茯苓二兩搗如麻子粒大滑石三兩搗如麻子粒大生薑一兩濕紙褁灰火煨蔥白三七莖去鬚葉細切右先以水四升煮後四味至二升以生絹濾去滓取清更入漿水一升粟米三合淨淘煮作粥候粥將熟方入酥攪勻取熟空心任意食之生地黃粥方出聖惠方治小便出血磣痛生地黃汁二合蜜三合車前子葉取汁三合米一合右先以水一大盞半煮成粥次入諸藥汁及蜜更煎三兩沸分為二服粟酥粥方出聖惠方治小便不通粟米一升淨淘酒一升酥無好酥以熟油一兩代之蔥白一握細切右漿水五升煮粟米為粥將熟下酒并酥蔥更煮取熟令病人空服恣意食之或腹痛無害但行三五十步即通為效青頭鴨羮方出聖惠方治小便淋瀝澀少疼痛青頭鴨一隻淨去毛并腸肚骨等細切萊蔔子四兩須細切冬瓜去皮穰細切四兩蔥白四兩細切右濃煎豉汁二斗煮鴨肉候熟入冬瓜等三味更煮取熟更入鹽醋空心任意食之車前子葉羮方出聖惠方治熱淋及小便出血莖中痛車前子葉擇取一斤細切蔥白一握細切粟米三合淘淨右以豉汁五升煮令沸先下米煮熟次下車前子葉蔥白和作羮入少鹽醋空腹食之或煮為粥亦得葵菜粥方治諸淋小便赤澀莖中疼痛葵菜擇取葉并嫩心三斤細切粟米三合淨淘蔥白去鬚葉一握細切右以水五升先煮葵菜至三升絞去葵菜取汁下米并蔥白更入濃煎䜴汁五合同煮為粥空心頓食之不盡分為兩度一日取盡冬麻子粥方治五淋小便澀少疼痛冬麻子二合葵子一合米三合右研二味以水二大盞淘絞取汁和米煮粥著蔥白熟食之良真酥粥方一方漿水粥治熱淋小便不便真酥一兩粟米三合淨淘淡漿水三升右以漿水煮米作粥候粥將熟下酥更煮取熟適寒溫空腹恣意食之冬瓜羮方治五淋小便疼痛壯熱腹脹氣悶冬瓜去皮穰一斤細切蔥白一握細切冬麻子一升先研碎右以水三升漉麻子成漿生絹濾取汁煮冬瓜蔥白作羮候熟入少許鹽醋空心食之青小豆方治小便不通淋瀝青小豆半升冬麻子三合搗碎以水三升淘絞取汁陳橘皮一分末右以冬麻子汁煮橘皮及豆令熟食之鳬葵粥方治熱淋小便不利鳬葵擇取葉二斤細切即水中荇葉也粟米半升淨淘右先用鹽豉汁五升煎令沸下米煮十餘沸下鳬葵煮作粥空心任意量多少食之蔥白粥方治小便不通蔥白去鬚葉一大握細切爛研生布絞取汁白粳米兩合淨淘又青粱米亦得右以水二升半煮米作粥候粥將熟下蔥汁更煮取熟空心溫食之良久即通榆皮索餅方治淋小腹結痛小便不通榆皮去粗皮細切二兩白麵四兩右以水二升煮榆皮至五合絞去滓取汁和麵作索餅於濃煎鹽豉汁中熟煮空心食之續以熟蔥茶投之粳酥粥方治久淋不差冝食真酥三合蕪荑仁微炒别搗末三錢半右先取白粳米半升淨淘量水多少煮粥候熟下酥并蕪荑末攪勻任意食之食不盡分作兩度葡萄煎方治熱淋小便澀少磣痛瀝血葡萄絞取汁五合藕汁五合生地黃汁五合蜜五兩右相和煎如稀餳每於食前服二合黃雌雞肉粥方治膀胱虛冷小便數不禁補益五臟黃雌雞一隻去毛腸臟粳米一升黃耆一兩銼熟乾地黃一兩銼右同煮令極熟去藥及劈去雞骨取汁并肉和米煮粥入鹽醬一如食法調和空腹食之作羹及餛飩任意食之亦得生薯藥羮方治下焦虛冷小便多數瘦損無力生薯藥半斤切薤白半斤去鬚切右於豉汁中煮作羹如常調和食之治小便羮方生山芋半斤削去皮薤白一握切右以豉汁煮羔入五味如常法空腹食一方有小豆葉嫩者可無薤白食之治小便數下膲虛冷方羊肺細切一具羊肉切四兩右入五味作羮空腹食之一方去羊肉治小便數下膲虛冷方右用生山芋半斤削去皮拍碎慢火煎酒二升候酒正沸下山芋入鹽椒蔥白空腹食之小豆葉羮方治小便數多右用小豆葉一斤細切於豉汁中煮調作羮食之小便數方出聖惠方右用雞腸菜一斤豉汁中入五味煮羹食之治小便赤澀臍下急痛右用牛犢蹄煮熟熱吃甚利小便食治一切痢疼附論夫一切痢者由榮衛不足腸胃虛冷冷熱之氣乘虛入胃客於腸間腸虛即泄也此皆由飲食生冷脾胃虛弱不能制其水榖故糟粕不結聚而變為痢也冝以食治之方豬肝方出聖濟總録治冷勞下痢膿血瘦怯不能食獖豬肝一具水洗去筋膜令淨切作栁葉片鱉甲去裙襴米醋慢火炙一兩柴胡去毛三分甘草半兩炙銼烏梅肉半兩炒人參半兩白术三分胡黃連一兩乾薑炮半兩陳橘皮湯浸去白半兩訶梨勒炮去核半兩蕪荑炒半兩右除肝外搗羅為末將肝與藥末拌和令藥在肝上即旋串慢火炙令香熟空腹食之如渴即將藥末煎湯服亦得效炙肝散方出聖惠方治積冷氣痢下膿血肌瘦不能飲食豬肝一具去筋膜木香半兩人參去蘆頭半兩白术半兩黃連去鬚微炒半兩乾薑炮裂銼半兩訶梨勒煨用皮半兩陳橘皮湯浸去白焙半兩蕪荑半兩烏梅肉三分微炒右搗細羅為散將肝切作片子以藥末一兩摻令勻即旋以串子炙令香熟空腹食之如渴即煎人參湯溫服之食羊肉方出聖惠方治勞傷泄痢暖腰腹縮小便精羊肉八兩切作餡肉蓯蓉微炒二錢半蒔蘿末半兩乾薑炮裂二錢半附子炮裂去皮臍細切半兩胡椒一錢蓽撥一錢訶梨勒炮去核一錢蕪荑微炒半兩白麵五斤右搗羅八味為末以肉并藥末等相和拌勻分作四劑每劑以麵褁之撮合微拍令扁用濕紙褁入煻灰火中煨令熟空心食之以飽為度羊脂粥方出聖惠方治赤白痢久不差困劣煩渴甚者羊脂一兩豬脂一兩黃牛脂三兩蔥薤每五莖切去鬚生薑一分切蒔蘿末一錢漢椒去目及閉口者微炒搗末半錢右先將脂等與蔥薤生薑同炒次用水入粳米三合煮成粥入蒔蘿椒末攪勻空腹頓食之六味鱠方出聖濟總録治冷痢白如鼻涕臍腹切痛不可食鯽魚去鱗切鱠十兩乾薑炮一分蓽撥一分陳橘皮湯浸去白焙一分胡椒炒一分蒔蘿一分右除魚外為細末先將豉汁八合煎令熟次入藥末五錢再攪和煮乘熱空心頓服豬肝饆饠方出聖惠方治冷勞氣痢瘦甚豬肝一具勿著水去脂膜切作栁葉片子乾薑炮裂一兩蕪荑微炒一兩陳橘皮湯浸去白炒令淡黃色一兩訶梨勒炮去核二錢縮砂仁二錢右除豬肝外搗羅為末糝肝片上拌令勻用麵褁作饆饠以三重濕紙褁安於煻灰火中煨取熟空心飽食之黍米粥方出聖惠方治諸痢不差黍米二合蠟一兩羊脂一兩阿膠一兩搗碎炒令黃燥為末右煮黍米作稀粥臨熟投阿膠蠟羊脂攪令消空腹食之粳米飲出聖濟總録治冷痢寒結不散日夜無度倉粳米淨淘控乾四合薤白七莖羊腎脂五兩豉用水四升煎取去滓澄清右熬腎脂煎薤白令熟入䜴汁與米同煮空腹食之蠟薤餅方出聖惠方治赤白痢及水痢白蠟一兩一分雞子三枚取黃薤白五莖細研白麵三兩右以雞子黃與薤白麵等調作餅子用蠟代油煎取熟空心食之豬子餅方出聖濟總録治脾胃氣虛下痢瘦弱豬子肝一葉蕪荑研一分胡椒為末一分乾薑炮為末半兩右薄起肝糝三味藥麵褁更以紙褁水濕慢灰火中煨熟去麵空腹食之食羊肉方出聖濟總録治休息痢羊肉去筋膜取精者薄切令作片子四兩胡粉半兩胡黃連半兩大棗煮去核并皮二十顆右除羊肉外先研棗如泥却别碾胡黃連作末并胡粉一處和棗作團以濕紙包裹於糖火煨令乾熟取出搗羅為末每服三錢半勻糝羊肉片子中將濕紙褁煨令香熟食之不過三服效阿膠碁子方治泄痢阿膠炙燥為末一兩乾薑炮裂為末半兩薤白煮爛細研七莖右以麵五兩拌薄切如碁子大熟煮空腹食少入五味調和亦得赤石脂麵方治冷痢不止赤石脂細研半兩雲母粉半兩麵五兩右以水拌和切作條子熟煮分兩服食之著鹽醋椒蔥亦得羊肝􅥪子方治水痢羊肝細切五兩蕪荑微炒少許薤白細切七莖右入少五味以白麵褁依食作􅥪子候熟空心食之胡椒餛飩方治氣痢胡椒半兩乾薑半兩訶梨勒皮四枚右搗羅為末取精羊肉四兩細切和藥以麵褁作小餛飩子煮熟空腹食之以飽為度粥飲方治諸痢疾水泄霍亂并泄血後困頓不識人冝補虛正氣黃耆細切二兩人參一兩米二合右銼二味如麻豆大以水三升同煎取二升去滓下米煮粥服之鯽魚鱠方治赤白痢小鯽魚一斤如常作鱠法蒜醋少許椒薑鹽少許右先將魚切作薄片以蒜虀椒薑鹽拌和食之不用别物兼之一方熟煮蒜虀空心食之大蒜雞子方治休息痢大蒜剝去皮二顆雞子二枚右先將蒜於鐺中取雞子打破沃蒜上以盞子蓋候蒜熟空腹食之下過再服撥粥方治赤白痢休息氣痢久不差者薤白一握去鬚細切白麵四兩蔥白一握去鬚細切右和麵調令勻臨湯以筯旋撥入鍋中熟煮空腹食之附子粥方治冷痢飲食不下附子一分炮裂去皮臍乾薑一分炮裂銼右為細末每日空腹煮粥內藥二錢食之以差為度粳米粥方治脾胃氣弱食不消化痢下赤白不止粳米二合麯末一兩微炒右煮粥空腹食之亦主小兒無辜痢葛粉飲方治血痢日夜百餘行冝服葛粉二兩蜜一合右以新汲水二中盞攪令勻空腹分兩度服之羊肉食方治水痢注㵼羊肉去皮膜六兩煮熟倉米淘淨炒香搗末三兩右薄切羊肉以倉米末拌摻隨意食不拘時羊腎方治赤白痢羊腎一對去膜淨洗切細如小豆大白麵三兩右羊腎以白麵拌和同煮入豉鹽醋等候熟空心頓食之木耳粥方治赤白痢兼治腸胃滑白木耳洗細切二兩白粳米淘淨三合右相和以䜴汁煮粥任下蔥椒鹽等空腹食之蔥粥方治赤白痢蔥切細二莖粳米淘淨三合右以水熟煮將溫空腹食之小麥麴粥方治赤白痢不止脾胃氣虛弱食不消右用水和麴麥煮作粥空心食之亦治小兒無辜痢任加減多少食之薤粥方治脾胃虛冷下白膿痢及水榖痢薤白銼七莖粳米淨淘三合右相和煮粥任下椒薑等攪勻令熟空腹食之鯽魚方治赤白痢鯽魚肉薄切六兩作鱠粳米二合右和鱠五味作粥空心食之豬子肝方出聖惠方治脾胃氣虛兼下痢瘦弱日夜不記行數一方無蕪荑用縮砂仁二兩豬子肝一具去筋膜切作栁葉片子蕪荑微炒碾作末二錢半右取肝以蕪荑末摻令勻以麵褁入煻灰火中煨令熟去麵只取肝空心頓食之水㵼冷勞氣痢細切醋煮熟蕪荑末調和空心食之治水痢不差方出聖惠方右用林檎十顆以水一大盞煮取六分去滓每服用一合攪粥食之良陳米湯方出聖濟總録治吐痢後大渴飲水不止右用陳倉米淘淨三合以水二升半煎至六分空心時食之日晚再煎食雞子餅方出聖濟總録治水痢臍腹疼痛右用雞子三枚打去殼醋炒熟入麵少許和作餅子樣炙熟空腹食之乾薑餅子方出聖濟總録治冷痢㵼不止食物不消右用乾薑炮為末一兩以麵五兩拌和作餅子燒熟時空腹食之炙肝散出聖濟總録治氣痢右用訶梨勒皮一兩分為三服搗羅為末取羊肝批開作片子勿使相離以藥末入肝葉中炙熟食之以疾差為度羸瘦加蕪荑末少許相和食治五痔諸疾附論夫痔疾有五若肛邉生肉如鼠妳出孔外時時膿血者名牡痔若肛邊腫痛生瘡者名牝痔亦名漏痔若肛邊有核腫痛及寒熱者名腸痔若因便而清血隨出者名血痔若大便難肛邉生瘡癢痛出血者名脈痔此五者中於風寒之氣或房室不莭或醉飽過度勞於氣血而經脈流溢滲入腸間衝於下部之所致也冝以食治之方黃耆粥方治五痔下血不止黃耆一兩細切粳米二合右以水二盞煎黃耆取一盞半去滓下米煮粥空腹食之又方出聖惠方蒼耳苖葉一斤細切粳米三合右於䜴汁中入米煮粥少鹽蔥白空腹食之作羹亦可牛脾粥方出聖濟總録治諸痔臘月牛脾細切一具米三升右每月牛脾三兩米三合煮粥食之牛脾一具盡即差桑耳粥方出聖惠方治痔病下血不止桑耳四兩米三合右以水三升煎桑耳取汁二升去滓著鹽椒蔥投入米煮粥空腹食之又方出聖惠方杏仁一兩湯浸去皮尖雙仁研入水一大盞絞汁粳米二合右杏仁汁中投米煮作粥空心食之野豬肉方出聖惠方治久患腸風下血肛門疼痛右用野豬肉二斤切作炙臠入椒鹽蔥白串炙令熟於空腹食之馬齒菜粥方出聖濟總録治腸風五痔熱血血痢右用馬齒菜每日作虀食之及下米作粥淡食一方用馬齒菜二大握粳米三合折細治五痔及煞諸蠱方出聖惠方右用鰻鱺魚治如食法切作片以鹽椒蔥白調和炙至熟食之治五痔瘻瘡方出聖惠方右用鴛鴦一隻治如食法煮令熟細切以五辛和食或作羮亦妙治五痔下血不止肛腸疼痛方出聖惠方右用野狸一隻去皮腸胃及骨薄切片著少麵并椒生薑蔥白鹽醋調和炙熟食之或作羮食皆效又方出聖惠方右用鴝鵒一隻去毛腸肚炙令熟食之作羮亦得又方出聖惠方右用木槿花半斤新者於䜴汁中入椒鹽醋蔥相和細煮令熟空腹食之又方右用篇竹葉半斤切入䜴汁煮作羮少鹽醋椒薑蔥白共調和空心食之治野雞痔下血不止肛邊疼痛方出聖惠方右用鯉魚一頭治如食法細切作鱠以蒜醬鹽醋共食之桑耳羮臛方出聖濟總録治諸痔右用桑耳不拘多少取作羮臛調和令羮熟空腹隨粥飯食之糯米粥方出聖濟總録治肺痿勞嗽胸膈痛大便祕澀糯米淨淘二合檳榔炮銼搗取末一分大麻子兩合郁李仁湯浸去皮研成膏一分右先研大麻子令爛以水三升與大麻仁攪勻生絹濾取汁煮糯米作粥將熟入檳榔末郁李仁膏攪勻空心食之牽牛粥方出聖惠方治大便壅澀面目虛腫水氣及四肢牽牛子炒熟搗取末半兩别取生者搗取末半兩同研勻旋用白粳米淘淨三合生薑細磨二錢右先用水三升煮粥次入熟炒牽牛末五錢半并入薑攪勻空心食須臾轉下滯物檳榔粥方出聖濟總録治大腸風祕風毒下注腳膝煩疼檳榔水磨盡一枚真酥半匙生薑自然汁半盞右相和以白米煮粥入蔥薤白更煮數沸入前三藥同煮至熟空心頓服食未利晚食前再作胡荽餅方出聖惠方治腸風㵼血胡荽淨擇五兩作虀胡餅三枚市買者右以胡餅褁胡荽食之不用别喫物一兩服血止麻子粥方出聖濟總録治腸風祕結大麻子半斤附子二兩炮裂去皮臍别搗末右將麻子淘淨暴乾搗羅為末每服二兩水一升半研勻細布絞取汁入附子末一錢再相和粟米一合同煮粥空心食不得用漆匙烏梅粥方出聖濟總録治腸風下血煩渴烏梅捶碎碎顆粟米淘淨少許右以水八合浸一宿去烏梅取汁煮粥每日空腹頓食之糯米粥方治大便祕澀右用水三升研麻子生絹濾取汁煮米作粥空心時食之桃花麵方治大便不通燥結腸內脹痛新桃葉二兩半或用乾者四兩搗末白麵半斤右水和勻薄切如常食煮熟空心淡食之至午時腹中鳴當下惡物三五日內忌熱毒炙煿食治吐血方撥刀麵方治吐血生地黃汁五合生薑汁一合雞子五枚取白右和白麵作撥刀煮熟入鹽椒醋蔥等調和如常食之蠟酥煎方治肺損吐血紫黑色不止黃蠟先鎔令銷傾入水內拔去滓酥四兩牛乳四兩右同和於銚內煎以栁木箆攪勻傾入瓷盒內每服一匙含化不拘時候白蜜飲治吐血白蜜二兩生地黃汁一升右攪勻用銀石器慢火煎至半升放極冷再於重湯內溫頓食之大豆汁方治吐血救急右用大豆五合以水煮濃汁一升去滓溫飲之不拘定時候飲醋方治吐血鼻衄心煩悶右用好醋一大盞煎令溫旋服三服呷即止若悶絶不省人事令人含醋噀面數次以開眼為度眼不開者難治食治蛔蟲方檳榔粥方出聖濟總録治蛔蟲檳榔生用五枚酸石榴根皮東生者洗銼半升右粗搗篩分作三度用每度以水一升半煎至一升絞去滓用粟米一合淨淘煮為粥平旦乘飢頓食得快蟲出為效菉豆汁方出聖濟總録治蛔蟲菉豆三升水五升煮爛絞取汁二升右先取麻仁汁一半煎微溫後入菉豆汁一升同攪更煎微溫欲服時先喫炙羊肉乾脯一片吐滓只咽津五七度頓服藥汁須臾或吐或利即其蛔蟲自消若未盡更服棟根粥方出聖濟總録治蛔蟲心痛右用苦棟根洗去土取皮細銼半斤都以水二升半用慢火煎至八合絞去滓以粟米三合淨淘量水多少并合棟根汁同煮為稠粥隔宿不食平旦頓食之即蛔蟲可盡下食治飴粥方粥食理治方米雖一味造粥多般色味罕新服之不厭須記逺取淨甜之水細别粟米之精山藥粟黃蜀黍紅粳白糯牟仁蔥白生薑拌麵菜虀右皆可煮粥故粟米百種用一旦令色味新更改換翻騰做粥溫熱調停香異味竒神清意樂喜則氣緩治粥為身命之源飲膳可代藥之半酒餳食治方治膈氣噎食胃翻吐逆羸瘦焦枯飲食不下已上患症頃於大定歷見斯疾用局方隔氣寬中等湯散日品三服每以服藥之後人行五里令喫白餳三塊再行五里令飲正酒一杯如此日以三服味於餳酒代食助藥和氣理虛由此痊安者十餘人矣酒粥食治方醫之治病妙育多門從所好之庶唯弗倦至若酒調散藥斟酌溫稀一飲而終别停酒下藥或酸若水嗽而綏以餳糖熱渴及寒冷飲與熱服隨意丸子數多而難咽粥食和吞辛鹹之湯散難服救從所欲醫者意也智用臨時又有食前食後間隔移時勿令食藥同餐混其藥力譬如飲酒飢飽有殊空心一盞力超食後之三食後三杯不代飯前之一病之深久減日損虛治者戒之單食白粥方粥雖用米製造由人食作民天利害非細米粗水苦灰銚浮粳水米不停沸烹太猛米餘則火短水廣則過熬作之者不明食之者生惱又方治膈氣噎食胃翻吐逆羸瘦焦枯飲食不下右用烏雌雞一隻治如食法以生地黃一斤切餳糖一二升內腹內急縛銅器貯甑中蒸五升米熟須臾即取出食肉飲汁勿噉鹽三月三度作之神良并可止盜汗食治養老附論夫安身之本必須於食救病之道唯慿於藥不知食冝者不足以全生不明藥性者不能以除病故食能排邪而安臟腑怡神養性以資血氣故為人子者不可不知此道也是故君父有疾即先命食以療之食療不愈然後命藥故孝子須深知食藥二性也論曰人子養老之道雖有水陸百品珍羞每食必忌於雜五味相撓食之不已為人作患是以食啖鮮者務令簡少飲食當令節儉若貪味傷多老人腸胃虛薄多則不消膨脹短氣必致霍亂夏至已後秋分之前勿進肥濃美臛酥油乳酪則無他慮矣所以老人多疾者皆由少時春夏取涼食飲太冷其魚鱠生菜生肉腥冷之物多損於人直冝斷之唯乳酪酥蜜恆宜溫之而食此大利益老年若卒多食之亦令人腹脹泄痢可漸食之每日常冝淡食勿食太鹹物方牛乳法出聖惠方凡牛乳性平補血脈益心長肌肉令人身體康強潤澤面目光恱志氣不衰故為人子者當須供之以為常食一日勿闕恆使恣意充足為度此物勝肉逺矣補虛養老以藥水飲取乳服食鍾乳一斤上好者細研人參三兩去蘆頭甘草五兩炙微赤銼熟地黃三兩黃耆三兩杜仲三兩去皺皮肉蓯蓉六兩白茯苓五兩麥門冬四兩去心薯蕷六兩石斛三兩去根銼右搗細羅為散以水三斗先煮粟米七升為粥內散一兩攪令勻和少冷水與水渴牛飲之令足不足更飲水一日餘時患渴可飲清水平日一取牛乳服之生熟任意牛須三嵗已上七嵗已下純黃色者為上餘色者為下其乳恆令犢子飲之若犢子不飲者其乳動氣不堪服也慎蒜豬魚生冷陳臭其乳牛清潔養之洗刷飲飼須如法用心著之烏麻散方耐老駐顔右用烏麻任多少以水拌勻勿使太濕蒸令氣遍下俟曝乾又蒸又曝往返九遍乾搗去皮作末空服以熟溫水或酒調下二錢晚食前再服漸漸不飢久服可不老耐寒暑食治妊娠附論夫凡初有妊娠四肢沉重不多飲食脈理順時是欲有胎如是經三二日便覺不通則結胎也其心中憒憒頭目眩四肢沉重懈怠不能執作惡聞食氣欲噉酸鹹果實多卧少起是謂惡食其至三月已上皆大劇吐逆不能自勝舉有如前候者便依此飲食將息既得食力體強增盛足以養胎子母安健也方鯉魚湯方治妊娠胎臟壅熱不能下食心神燥悶鯉魚一頭長一尺者治如食法生薑一兩切豆豉一合蔥白一握去鬚切右以水五升煮魚等令熟空腹和汁食之一方加糯米煮之鯉魚粥方治妊娠內傷動腹裏㽱痛冝服安胎鯉魚一頭重一斤去鱗鬛腸胃細切苧根二兩乾者淨洗銼糯米五合右以水三碗先煎苧根取汁二碗去滓下米并魚煮粥入五味空腹食之豉湯方治妊娠傷寒頭痛豉一合蔥白一握去鬚切生薑一兩切右以水一大盞煮至六分去滓分溫二服阿膠粥方治妊娠下血阿膠半兩炙黃為末龍骨末一分艾葉末一分右用糯米二合入藥以水煮作粥空腹食之糯米阿膠粥方治妊娠胎動不安糯米三合阿膠一兩搗碎炒令黃燥搗為末右先煮糯米作粥臨熟下膠末攪勻食之烏雌雞肉粥方妊娠安胎及治風寒濕痺腰腳痛烏雌雞一隻取肉糯米三合右切雞肉於䜴汁中和米煮粥入鹽椒蔥白空腹食之或作羹及餛飩索餅食之亦得丹雄雞肉索餅方養胎臟及治胎漏下血心煩口乾丹雄雞一隻取肉切作臛白麵一斤右溲麵作索餅和臛任意食之鹿角末豉湯方治妊娠損動下血苦煩滿豉一合鹿角末一分右以水一大盞煮豉取汁六分內鹿角末攪勻分為二服地黃粥方治妊娠下血如故名曰漏胎胞乾胎斃生地黃汁三合糯米三合右煮糯米作粥臨熟下地黃汁攪調令勻空腹食之竹瀝粥方治妊娠恆苦煩悶此名子煩冝喫淡竹瀝三合粟米三合右以水煮米作粥臨熟下竹瀝攪令勻停冷食之單飲竹瀝三二合亦佳治妊娠損動腹痛方右用冬麻子二合搗碎以水一大盞煎至七分去滓分溫二服治妊娠腰痛方右用黑豆二合以酒二大盞煮取一盞去滓食前分溫三服麥門冬粥方治妊娠反胃嘔逆不下食生麥門冬去心淨洗切細研爛絞取汁一合白粳米淨淘二合薏苡仁揀淨去土一合生地黃肥者四兩淨洗切細研爛取汁三合生薑汁一合右以水三盞先煮粳米薏苡仁二味令百沸次下地黃麥門冬生薑汁相和煎成稀粥空心溫服如嘔逆未定晚後更煮食之鹿頭肉粥方出聖濟總録治妊娠四肢虛腫喘急脹䐽鹿頭肉半斤蔓荆實去土一兩高良薑半兩蘹香子炒香令熟半兩右除鹿肉外搗羅為末每服四錢半先以水五盞煮鹿肉候水至三盞去肉下白米一合同藥末候米熟下少五味調和得所分作三次服一日食盡雞臛方出聖濟總録治妊娠四肢虛腫喘急兼嘔逆不下食黃雌雞一隻去頭足皮毛腸胃等洗淨去血脈於沸湯中掠去腥水髙良薑一兩桑根白皮揀淨銼一兩半黃香銼揀一兩右後三味與雞同煮候雞熟去藥取雞留汁將雞細擘去骨將汁入五味調和入雞肉再煮令滋味相入了隨性食之不計早晚食不妨别服藥餌鯉魚羹方出聖濟總録治妊娠傷動胎氣不安鮮鯉魚一頭治如食法黃耆銼炒半兩當歸切焙半兩人參半兩生地黃半兩蜀椒揀十粒炒生薑一分陳橘皮湯浸去白一分粳米一合右銼八味令勻細內魚腹中用綿褁合以水三升煮魚熟將出去骨取肉及取魚腹中藥同為羹下少鹽醋熱啜汁喫效苧麻粥方出聖濟總録治妊娠胎不安腹中疼痛冝常食生苧麻根一兩洗淨煮取汁二合白糯米二合大麥麵一合陳橘皮浸去白炒半兩末右一處以水煮似常作粥稀稠得所熟後方入鹽花少許平分二服空腹熱食之陳橘皮粥方出聖濟總録治妊娠冷熱氣痛連日不可忍陳橘皮湯浸去白焙一兩苧麻根刮去土曝乾一兩高良薑末三錢白粳米㨂淨半合右除粳米外搗羅為散每服五錢半先以水五盞煎至三盞去滓入粳米半合鹽一錢煮作常式粥食之空心一服至晚更一服小豆飲出聖濟總録治妊娠漏胎血盡即子死赤小豆半升蜀椒去目及閉口炒出汗十四枚烏雌雞一隻治如食法右以水二升煮雞豆椒令熟取汁時時飲之未差更作服之䜴心粥出聖濟總録治諸種瘦疾往來寒熱豆豉心二合以百沸沸泡細研茈胡去葉三錢末桃仁湯浸去皮尖研三十枚極細右先將豆䜴心桃仁二味以白米三合水三盞似常式煮粥候欲熟時入茈胡末三錢攪勻食之半夏撥刀方出聖濟總録治初妊娠惡阻擇食痰逆服諸湯藥皆無效半夏以湯洗七遍後以生薑汁半盞煮半夏令汁盡再炒乾一兩人參半兩右為末入小麥麵六兩以水挼作圓子切如撥刀以新生雞子二枚去殼湯內煮旋以筯剔破入蔥薤白各三五莖擘破以鹽醬調和候湯沸下撥刀煮令熟任意分三次熱食之山芋麵方出聖濟總録治妊娠惡阻嘔逆及頭痛食物不下生山芋一尺於沙盆中研令盡以葛布絞濾過苧麻根一握右研勻入大麥麵三兩和溲細切如碁子法於蔥薤羹汁內煮熟旋食之又方出聖濟總録木瓜一枚大者切蜜二兩右以水一處煮令木瓜爛於沙盆內細研入小麥麵二兩攪令勻入薄桿切為碁子每日空心用白沸湯煮將半盞和汁淡食之蔥粥方出聖濟總録治妊娠數月未滿損動蔥三莖糯米三合右以蔥煮糯米粥食之效如産後血運用之亦效雞子羮出聖濟總録治妊娠胎不安雞子一枚阿膠炒令燥一兩右以清酒一升微火煎膠令消後入雞子一枚鹽一錢和之分作三服相次服蘇麻粥出鮑氏方治子煩悶甚蘇子三錢半大麻仁去殼淨半兩右研極細水煮粥大便和煩自去食治産後附論夫妊娠十月既足百骨皆坼肌肉開解然後能生百日之內猶名産母時人將謂一月便為平復豈不謬乎若飲食失莭冷熱乖理血氣虛損因此成疾藥餌不和更增諸病今冝以飲食調治庶為良矣方益母草汁粥方出聖惠方治産後虛勞血氣不調腹肚結痛血運昏憒心熱煩燥不多食益母草汁二合生地黃汁二合藕汁二合生薑汁半合蜜二合白粱米一合水淘研令細右先以水一大盞煮米作粥次下諸藥汁更煎三兩沸每服喫二合日三服鯽魚熟鱠方出聖惠方治産後虛冷下痢腹痛食少鯽魚二斤作鱠蒔蘿陳橘皮去穰焙蕪荑乾薑炮胡椒五味等分搗羅為末右煎豉汁中煮鱠臨熟合冝下料味調和空心食之地黃粥方出聖惠方治産後瘀血及癥結疼痛無力生地黃汁二合生薑半兩取汁粳米三合右以米作粥臨熟入二味汁攪和令勻空心食之冬麻子粥方出聖惠方治産後腹中積血及中風汗出益氣肥健利小便冬麻子一合以水研取汁三升薏苡仁一合搗碎粳米二合右用冬麻子汁煮二味作粥空心食之粟米粥方出聖惠方治産後血氣虛弱不能下食粟米三合羊肉半斤去脂膜㨂取四兩細切右以水五大盞下米羊肉同煮欲熟入鹽醋椒蔥更煮粥令熟空心食之豬心羮方出聖惠方治産後中風血氣驚邪憂恚悖逆豬心一枚切蔥白一握去鬚細切右以豉汁鹽椒米同作羮食之鯽魚粥方出聖惠方治産後赤白痢臍下痛不下食鯽魚肉一斤粟米三合别煮粥右用濕紙裹煨熟去骨細研候粥熟下魚入鹽醋調和空心食之豬蹄羮方出聖惠方治産後虛損少乳豬蹄一具切粟米三合右一如常法入五味作羹食之豬肝羮方出聖惠方治産後乳不下閉悶妨痛豬肝一具粟米三合右一如常法作羮粥空心食之薤白粥方出聖惠方治産後赤白痢腰臍痛薤白一握切粟米二合右作粥空心食之治産後虛羸無力腹肚冷痛血氣不調頭中風冷汗出不止方出聖惠方右用白羊肉一斤細切調和作腌臘及羹空心食之治産後風怯瘦病五勞七傷心虛驚悸方出聖惠方右用爛煮羊頭於䜴汁中入五味調和空心食之治産後下痢腰痛方出聖惠方右用艾葉搗粗羅為末如常作餛飩空心服之羊肉粥方出聖濟總録産後七日後冝喫白羊肉去脂膜兩細切四粳米淨淘三合生地黃汁三合桂去粗皮末一分右以水煮肉并米熟後入地黃汁并桂末令得所以五味調和空心任意食之冬瓜撥刀方出聖濟總録治産後血壅消渴日夜不止冬瓜研取汁三合小麥麵四兩地黃汁二合右溲和如常麵切為撥刀先將麞肉四兩細切用五味調和煮汁熟切漉去麞肉取汁下撥刀麵煮令熟不拘多少任意食之龜肉臛方出聖濟總録治産後乳汁不下龜肉洗切二兩羊肉洗切三兩麞肉洗切三兩右水不拘多少入五味煮作臛食之黃雌雞飯方治産後虛羸補益黃雌雞一隻去毛腸肚生百合淨洗擇一顆白粳米飯一盞右將粳米百合入在雞腹內以綿縫定用五味汁煮雞令熟開肚取百合粳米飯和雞汁調和食之雞肉食之亦妙黃雌雞羮方治産後虛損黃肥雌雞一隻治如食法粳米半升蔥白五莖切右依常法以五味調和為羮任意食之脯雞糝方治産後心虛忿悸遍身疼痛黃雌雞一隻去毛頭足腸胃淨洗以小麥兩合以水五升煮雞半熟即取出雞去骨蜀椒去目及閉口炒汗出取末一錢柴胡去苖二錢乾薑末五分粳米三合右先取水煮雞及米令爛入蔥薤椒薑柴胡末等次入五味鹽醬煮取熟任意食之豬肚羮方治産後積熱勞極四肢乾瘦飲食不生肌肉豬肚一枚洗淨先以小麥煮令半熟取出肚細切另安一處黃耆銼碎半兩人參三分粳米三合蓮實銼碎一兩右以水五升煮豬肚入人參黃耆蓮實候爛去滓藥并肚澄其汁令清方入米煮將熟入蔥白五味調和作粥任意食之鮑魚羮方治産後乳汁不下鮑魚肉切細半斤麻子仁别研一兩末香䜴别研半合蔥白切細三莖右先取鮑魚肉以水三升煮熟後入麻仁䜴蔥白等煮作羮任意食之豬蹄粥方治産後乳不下母豬蹄一隻治如食法以水三盞煮取二盞去蹄骨王瓜根洗切木通銼碎漏蘆去蘆頭各一兩右除豬蹄汁外粗搗篩每服三錢以煮豬蹄二盞先煎藥至一盞半去滓入蔥䜴五味等并白米一合半合作粥任意食之滑石粥方治産後小便不利淋瀝滑石半兩别研瞿麥穗一兩粳米三合右以水三升先煎瞿麥取二升半濾去滓將汁入米煮如常粥熟入鹽少許蔥白三寸方入滑石末煮令稀稠得所分作三度食之豬蹄羮方治産後乳汁不下母豬蹄淨洗銼兩隻木通銼作寸假一兩半右先將木通以水五升煎取四升去木通和豬蹄入五味如常煮法煮熟作羹任意食之又豬蹄羮方治産後乳無汁豬蹄洗銼一具粳米淨淘一合右水不拘多少以五味煮作羮任意食之作粥亦得豬腎臛方治産後風虛勞冷百骨節疼身體煩熱豬腎一對去脂膜薄切羊腎一對去脂膜薄切右以五味并蔥白豉臛如常食之不拘時生藕汁方治婦人蓐中好食熱麵酒肉變成渴燥生藕汁半盞生地黃汁半盞右相和溫暖分為三服茯苓粥方治産後無所苦欲睡而不得睡白茯苓去黑皮取末半兩粳米二合右以米淘淨煮粥半熟即下茯苓末粥熟任意食之必得睡也燒豬肚方治婦人産後赤白痢腰腹㽱痛不能下食豬肝四兩蕪荑末一錢右以豬肝薄切糝蕪荑末於肝葉中五味調和以濕紙裹三五重煻灰火煨熟去紙食之一方用麵裹紫莧粥方治産前後赤白痢紫莧葉細切一握粳米三合右以水先煎莧葉取汁去滓下米煮粥空心食之立差鯽魚羮方治産後乳無汁鯽魚一斤蠐螬五枚右依常煮羮食後食之牛肉羮方治産後無乳汁右用牛鼻肉洗淨切小片以水煮爛後入五味如常作羮法任意食之鹿肉臛方治産後無乳汁右用鹿肉洗切四兩水三碗以五味煮肉作臛任意取食之生藕汁飲出聖濟總録治産後惡血不利壯熱虛煩生藕汁半盞地黃汁半盞淡竹葉一握切以水一盞半煎取半盞蜜一匙右同煎沸熟溫分三分日二夜一藥茶方蔥豉茶方出聖惠方治傷寒頭痛壯熱蔥白三莖去鬚豉半兩荆芥一分薄荷三十葉梔子仁五枚石膏三兩搗碎茶末三錢紫笋茶上右以水二大盞煎取一大盞去滓下茶末更煎四五沸分二度服薄荷茶方出聖惠方治傷寒鼻塞頭痛煩燥薄荷三十葉生薑一分人參半兩去蘆頭石膏一兩搗碎麻黃半兩去根右銼先以水一大盞煎至六分去滓分二服點茶熱服之硫黃茶方出聖濟總録治宿滯冷氣及止㵼痢硫黃三錢細研紫笋茶三錢末訶梨勒皮三錢右相和令勻以水依常法煎茶稍熱服之石膏茶方出聖惠方治傷寒頭疼煩熱石膏二兩搗末紫笋茶碾為末右以水一中盞先煎石膏末三錢煎至五分去滓點茶服之槐芽茶方治腸風右用嫩槐芽採取蒸過火焙如作茶法每旋取碾為細末一依前茶法不計時候服一小盞兼療諸風極有效蘿摩茶方出聖惠方治風及氣補暖右用蘿摩葉夏採蒸熟如造茶法火焙乾每旋取碾之為末一依前茶法不計時候服皂莢芽茶方出聖惠方治腸風兼去臟腑風澀右用嫩皂莢芽採蒸過火焙乾如造茶法每旋碾為細末一依前茶法不計時候服入鹽花亦佳石楠芽茶方出聖惠方治風補暖右用嫩石楠芽採蒸熟火焙如造茶法每旋取碾為細末煎潑如茶服治好食生茶出本草方右用川椒末不限多少以糊丸如梧桐子大茶下十許丸食治五臟方調五臟理經脈助脾氣消食出本草右用白魚煮炙於蔥醋中重煮一兩沸食之亦可和豆䜴作羮頓食惟新鮮者好經宿者不堪食令人腹作冷生疾或淹或糟藏皆可時人好作餅炙食之初時少動氣久亦不損人也補五臟益筋骨和脾胃多食之冝人不毒亦不發疾出本草方右用鯮魚作鮓食之尤佳曝乾甚香美補五臟出本草方右用鮫魚作鱠食之補五臟出本草方右用牛肚醋煮食之利五臟六氣出本草方右用白豆嫩葉作菜食之安五臟平三焦溫中出本草方右用牛髓以酒送之久服增年治五臟除氣出本草方右用藥以乳及水煮服之主五臟補七傷填骨髓大補益氣力出本草方右用黃狗肉空腹食之通利五臟下少氣出本草方右用白梅未乾者常含一枚咽其津治五臟虛損久病罷療人出本草方右用鰻鱺魚和五味以米煮食之暖五臟六腑之氣出本草方右用陳廪米炊之以甕中水浸令酸食之安五臟益精強志倍力輕體不老久久益佳右用蓬虆以四五月候甘實成採之暴乾搗篩水服三錢半主五臟不足傷中氣絶利益十二經脈血氣右用蓮子蒸熟食之良安中利五臟右用苜蓿煮和醬食之作羹亦得治五臟邪氣右用水牛酥飲之解煩去睡調理腑臟止嘔噦白人膚體右用漿水作粥薄暮啜之粟米新白者佳普濟方卷二百五十九
