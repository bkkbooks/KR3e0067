盛之頓在鍋隔湯熬煎令薑汁盡焙乾為末每服二錢生薑甘草少許煎湯調下或用糕糊小丸薑湯下三十丸入煆白礬少許同丸亦得一方出肘後方治風痰鬱金一分藜蘆十分右各為末和令勻每服一匙用溫漿一盞先以少漿水調下餘者水嗽口都服便以食壓之瓜蒂散出肘後方吐法宜用辨上部脈有下部脈無上部脈有下部脈無其人當吐不吐者死何謂下部無脈此所謂木鬱也飲食過飽填塞胸中胸中者太陰之分野經云氣口反大于人迎三部食傷太陰故曰木鬱逹之吐者是也瓜蒂赤小豆各等分右為細末每服一錢溫漿水調下以吐為度若其兩手尺脈絶無不宜便用此藥恐損元氣令人有氣不復止是胸中窒塞悶亂不通以指探去之如不得吐者以物探去之得吐則已如食不去用此藥去之消痰丸出御藥院方治風勝痰實喘滿嗽風氣上攻黑牽牛四兩半生半炒槐角子青皮去白各半兩半夏湯洗七次焙乾一兩皂角不蛀肥者去皮弦塗酥炙黃色二兩右件五味為細末生薑麵糊和如小豆大每服十五丸至二十丸食後生薑湯下治風痰出本草取白殭蠶七箇直者細研以薑汁一茶腳溫水調灌之瓜蒂散出經驗良方治風涎暴作氣塞倒卧或有涎用諸藥化不下者用甜瓜蒂一名苦丁香晒乾為細末每用一二錢七加輕粉一七以水半合調勻灌之候良久涎自出如涎未出含砂糖一塊下咽涎即出一方不加輕粉如吐多困即咽麝香湯一盞即止中金丸出王氏慱濟方治風化痰辟邪養正益津液潤肌膚大進飲食延年補氣右用蒼术不拘多少以長流水浸七日逐日一度换仍以竹刀旋削去粗皮切作片别用無灰酒浸一宿酒可于术上浮二指許候滲酒盡焙乾為細末煉蜜和丸如梧桐子大每服早辰茶酒任下三二十丸忌桃李雀鴿白附子散治大人小兒虛風呵欠止吐化痰白附子炮天南星炮各半兩黑附子炮去皮臍一分右為細末每服二錢水一盞薑五片慢火煎六分不拘時小兒一錢水一盞薑三片慢火煎不住手攪勻至小半盞分為三服漢防己散治風化痰利胸膈除頭目旋眩令思飲食漢防己一兩羚羊角屑人參去蘆頭桂心芎藭各三分半夏半兩湯洗七遍去滑赤茯苓三分旋覆花防風去蘆頭白术細辛麥門冬去心各半兩枳殼三分麩炒微黃甘草半兩炙微赤銼赤芍藥羌活各三分右為散每服三錢水一中盞入生薑半分煎至六分去滓不計時候溫服白术丸主除風痰積聚胃中冷氣秋發動令人嘔吐食或吐清水飲食減少不作肌膚白术五分白芷三分乾薑石斛各六分五味子細辛橘皮厚朴炙桂心防風茯苓甘草各四分右搗篩蜜和丸如梧桐子大每服十丸飲下日二加至二十丸忌桃李雀肉生蔥海藻菘菜酢物一方有人參五分半夏利膈丸出醫方集成治風痰壅甚頭疼目眩咽膈不利涕唾稠粘胸中煩滿酒癖停飲嘔逆惡心脅下急痛腸中水聲神思昏憒心忪靣熱止嗽化痰防風去蘆頭半夏湯洗七遍去滑各一兩右為末以白蜜和搗百餘杵丸如梧桐子大每服不計時候以荆芥薄荷湯下十丸秦芁散出聖惠方治風痰心昏恍惚不能言語痰涎流溢秦芁去苖一兩常山一兩半人參不去蘆頭羚羊角屑甘草生各一兩右為散每服三錢以水一中盞入大麻子五十粒煎至七分去滓空心溫服良久當吐未吐再服生朱丹出御藥院方治諸風痰甚頭痛目眩旋運欲倒肺氣鬱滯胸膈不利嘔噦惡心恍惚健忘頸項強直偏正頭痛靣目浮腫筋脈拘急涕唾稠粘咽喉不利常服清神爽氣白附子炮製去皮臍石膏燒通紅放冷各半斤龍腦一匙朱砂一兩二錢半為衣右為細末燒粟米飯為丸如小豆大朱砂為衣每服三十丸食後茶酒任下祛涎丸出楊氏家藏方治風痰上攻頭目昏痛旋運欲倒嘔噦惡心恍惚健忘神思昏憒肢體煩疼頸項拘急頭靣腫癢手足難舉或時麻痺天南星四兩半夏九兩半白附子二兩六錢川烏頭七錢半右並生為末用生絹袋盛以井花水揉洗澄濾有滓再更研入袋擺洗盡瓦盆中日晒夜露每至曉澄去宿水别換井花水攪勻晒春五日夏秋七日冬十日去水晒乾如玉片方入後諸藥劔脊烏稍蛇白花蛇各酒浸一宿去皮骨焙乾稱一兩重白殭蠶炒去絲嘴全蝎微炒去毒一兩天麻川芎各二兩右為細末生薑汁煮麵糊和丸梧桐子大飛研細硃砂一兩麝香末二錢為衣風乾密器中盛之每服三十丸食後煎生薑薄荷湯下四神丸出經驗良方治手足頑麻痰涎壅盛頭昏眩肩背拘急極效大天麻天南星各湯洗淨防風去蘆各一兩薄荷葉半兩右為細末酒煮薄麵糊為丸如菉豆大每服二十丸煎荆芥生薑湯下退痰丸出聖濟總録治風痰壅盛每日早辰多喜嘔吐人參赤茯苓去黑皮乾薑炮半夏湯洗七遍去滑各一兩右為末以粟米飯和丸如梧桐子大每服二十丸空心生薑湯下日午再服通頂散出御藥院方治風痰旋運頭目大痛及偏正不定發作神志昏憒或冒風寒鼻塞聲重藜蘆去苖土半兩躑躅花去土一錢藿香葉去土二錢右為細末每用紙撚蘸藥鼻內嗅不拘時芎辛湯出十便良方治膈痰風厥頭目昏痛鼻塞身重肩背拘急不思飲食芎藭半兩細辛去苖土一錢甘草炙一錢半右為粗末每服二錢水一盞煎至七分去滓不以時溫服一方加薄荷七片治中風痰壅不能治者出經驗良方豬牙皂角肥實者炮刮去皮絃及子二片玄胡索七個青黛二錢右為細末每用一匙新汲水調成稀糊令患者仰卧男左女右將藥入病人鼻內覺藥到喉少酸令患者坐却令咬筆管一枝滴涎盡為度鐡刷湯出聖濟總録治風痰胃中有寒嘔吐痰涎胸滿氣逆附子五枚炮令微裂地上以盞子覆冷取出去皮臍半夏湯洗七遍去滑切麩炒一兩木香半兩右銼如麻豆每服二錢匕以水一盞入生薑一棗大拍碎大棗三枚擘破同煎至七分去滓空心食前溫服皂莢煎丸出聖惠方治風墜痰踈利臟腑皂莢一斤肥好不蛀者以水洗去塵用河水五升煮令軟攪濾取汁入銀鍋內熬成膏葳靈仙暖水浸過削去其茸不用其根冷水淘三五度令淨暴乾搗細羅取末四兩薄荷乾杵細羅取末一兩右二味藥末相合入皂角煎和搗三二百杵丸如梧桐子大每服不計時候以荆芥湯下二十丸半夏丸出聖惠方治風痰脾胃冷氣吐逆不止飲食不下半夏一兩湯洗七遍去滑微炒白礬二兩燒令汁盡乾薑半兩炮製銼右搗羅為末研勻用蒸餅和丸如梧桐子大每服不計時候煎生薑湯下十丸每服三十丸亦得隨病輕重酌量加減稀涎散治風涎潮塞上隔氣閉不通方見卒中風類乳香半夏丸出御藥院方治風痰除咳嗽清頭目半夏湯洗七次焙乾三兩天南星虀汁煮熟一兩白礬枯一兩右各修製訖同為細末水浸蒸餅和丸如梧桐子大每服五十丸生薑湯下不拘時候星附湯出百一選方全蝎一錢炒附子炮去皮臍天南星炮洗去灰各一兩右為粗末每服三錢水二盞薑十五片煎至七分去滓澄清冷服溫服亦得三生丸出本事方治中脘風痰涎飲瞑眩嘔吐酸水頭疼惡心半夏二兩南星白附子各一兩右並生為末滴水為丸如梧桐子大以生麵滚衣陰乾每服十丸至二十丸生薑湯下天南星丸治風痰氣厥頭痛嘔吐痰涎天南星用虀汁煮軟切作片子焙半斤芎藭三兩香墨燒研半兩右為末以白麵糊為丸如梧桐子大每服二十丸荆芥湯下不拘時候生薑湯下亦可治膈上風熱常覺有痰一名風痰散出十便良方皂角二挺半不蛀者湯浸剝去皮子晒乾一挺燒作黑灰一挺燒作白灰半挺塗酥炙令黃搗羅為末蠟靣茶半斤生碾為末附子半兩炮製去皮臍搗羅為末右都研令勻不計時候以生薑湯調下半錢又方白礬三兩燒令汁盡乳香半兩白附子一兩炮製搗羅為末右都研令勻以水浸蒸餅和丸如梧桐子大每于食前以溫酒下十丸壞痰丸出御藥院方治風痰利咽膈破積滯散疼痛止咳嗽皂角割去黑皮酥炙黃色去子枯白礬各半斤右為細末水浸蒸餅為丸如梧桐子大每服三四十丸食後生薑湯下或溫水下亦可靈砂白丸子出醫方集成治氣虛弱痰氣上攻風痰壅塞嘔吐不已靈砂青州白丸子末各一兩各研人參去蘆乾薄荷葉白茯苓去皮白礬枯過南星泔浸一伏時焙乾各三十兩半夏洗七次為末生薑汁搗和作麯六十兩右為末用生薑汁煮麵糊和丸如梧桐子大每服二十丸生薑湯下食後如痰盛躁熱薄荷湯下皂白丸出御藥院方治諸風痰酒痰茶痰食痰頭痛目眩旋運欲倒手足頑麻痰涎壅并一切諸病天南星生三兩半夏生七錢白附子生二兩生薑二斤取汁皂角二斤肥者去皮子以水浸一宿三次約水一斗煮藥川烏頭半兩去皮臍右㕮咀以皂角同煮乾為細末以生薑汁煮麵糊為丸如梧桐子大每服三十丸食後生薑湯下但他藥所不能療者此藥並皆主之常服寬利胸膈涎美飲食不生一切風痰大有神效導痰散治中風癱瘓胸膈有痰涎不利此藥服後微微吐之枯白礬半兩殭蠶一兩右為細末每服一錢生薑湯調下良久吐頑涎為效未吐再進不拘時候治風痰出本草圖經用芎藭蜜和作指頭大丸欲寢服之殊佳碧琳丹出王氏慱濟方治痰涎潮盛卒中不語備急大效生碌二兩出信州石碌是也淨洗于乳鉢內研如粉以水飛過去砂石攤于紙上晒乾硇砂一兩以水化去砂石潑清入碌石粉於新白器內慢火熬令乾右取辰日辰時靣向辰位上修合再研勻入麝香一分又同研細煮糯米粥和丸如彈子大陰乾如卒中者每丸作二服用薄荷酒磨下癱瘓并一切風疾用朱砂酒磨下如犯藥毒亦同前法服之候吐出濃涎青碧色并㵼下惡物為驗合時于淨室內無令婦人四足見忌動風毒物常服一丸可分作六服空心服後用少食壓下千金丸出王氏慱濟方踈風下涎消逐痰積朱砂半兩臼研如粉水磨雄黃三分别研如粉膩粉三分秋冬只用半兩生半夏末三分右件藥一處再同研勻用生薑去皮切作塊子如櫻桃大先入藥末石臼內旋入薑塊同搗約可丸得即丸如梧桐子大每服一丸至兩丸吐風痰出本草以梨作漿服之一方治風痰用緑青揀上色精好者先搗下篩更用水飛過至細及再研治之如風痰眩悶取二三匕同生龍腦三四豆許研勻以生薄荷汁合酒溫調服偃卧須臾涎自口角流出乃愈治風痰出肘後方用蘿蔔子為末溫水調一匙頭良久吐出涎沫如是攤瘓風以此吐後用緊踈藥服踈後服和氣散差一方水研服吐風痰一方出肘後方治膈壅風痰用半夏不計多少酸漿浸一宿溫湯洗五七遍去惡氣日中曝乾搗為末漿水搜餅子日中乾之再為末每入生腦子一錢研勻漿水濃腳丸雞頭大紗袋盛通風處陰乾每一丸好茶或薄荷湯下治風涎潮塞氣不得通用皂角一兩生白礬半錢膩粉半兩為末水調灌之到咽吐涎即愈利膈丸出王氏慱濟方治三焦氣不順胸膈壅塞頭目昏眩涕唾痰涎精神不爽用牽牛子四兩半熟不蛀皂角塗酥灸二兩為末生薑自然汁煮糊為丸如梧桐子大每服二十丸荆芥湯下治一切風痰風霍亂食不消大便澀出肘後方用訶梨勒三枚搗取末和酒頓服三五度良茯苓湯主風痰氣發嘔吐欠呿煩悶不安或吐痰水者茯苓三兩人參生薑橘皮白术各三兩右以水五升煮取一升五合去滓溫分三服中間任食忌犬醋桃李雀等肉四生丸治風順氣化痰逐飲生半夏生南星生白礬南康蚌粉各一兩右為末用糊為丸如梧桐子大每服三十丸生薑湯下食後玉芝丸出永類鈐方治風壅痰實頭目昏眩咳嗽煩滿不利嘔吐惡心神思昏憒心忪面熱痰唾稠黏右為細末用生薑自然汁打麵糊為丸如梧桐子大每服二十丸如要踈風痰加至四五十丸食後生薑湯下葉氏分涎湯出易簡方治風痰留滯膈問虛滿食即惡心咽吻上喘涎唾不利服此順陰陽消痞悶醫方大成陳皮去白新羅揀參半夏湯洗七次令軟每箇切四片薑汁浸一宿天南星去外皮濕紙包灰火煨香熟出各等分枳殼去瓤微炒苦梗去蘆各等分右銼米粒大每服二錢水一盞半生薑十大片同煎至半盞去滓候通口旋呷徐徐咽下食後臨卧服了高枕仰卧治風痰不下荆芥四兩白礬一兩半生槐角生二兩陳皮半夏各二兩半右為末水糊為丸如梧桐子大每服四十丸生薑湯送下導痰丸專患痰氣服此藥免患中風之疾黑牽牛生用頭末三錢白礬生用一錢豬牙皂角生用二錢半夏少許南星少許右為細末冷水和丸如梧桐子大每服五六十丸五更用溫茶湯下水煮金花丸出濟生拔粹方治風痰咳嗽其脈弦靣青四肢滿悶便溺祕澀心多躁怒南星一兩生用半夏一兩生用天麻五錢雄黃二錢白麵三兩右為細末滴水為丸每服五十丸至百丸煎漿水沸下藥煮令浮為度漉出淡漿水浸另用生薑湯下或通聖加半夏及局方中川芎丸防風丸皆可用也南星散出直指方治風氣動痰發嗽天南星一兩枳殼製細辛各半兩木香甘草炙各一分右㕮咀每服三錢薑七片慢火熟煎服療風痰飲氣逆滿惡心不能食人參二兩枳實炙白术各三兩生薑四兩桂心一兩半右切以水五升煮取一升五合分溫三服之忌桃李雀肉生蔥治風痰膈氣嘔吐水者宜服此方防風一兩去蘆頭枳殼半兩麩炒微黃去瓤白附子前胡一兩去蘆頭陳橘皮一兩湯浸去白瓤焙半夏湯洗三兩人參生二兩天南星生用一兩半白茯苓去皮白术一兩白礬生滑石貝母各一兩右為細末麵糊為丸如梧桐子大每服三十丸食後生薑湯下一方有木香一兩玉芝徐老丸出御藥院方治除風壅消痰利咽膈進飲食調五味天南星乾薑各半兩半夏白礬大黃各一兩細蛤粉二錢牽牛四兩黃蘗一兩半右為細末水丸如小豆大每服一二十丸食後溫水下日三服常服化痰消食順氣調血令人徐老或已衰老或一切風氣或患喉結愈宜服之或除腸垢積物者可漸加至三五十丸以意消息或滑泄忌牽牛大黃并孕婦此外更忌天南星半夏皆不可服大利膈丸出拔粹方治風痰實喘滿咳嗽風氣上攻牽牛四兩生用半夏湯洗皂角去皮弦酥炙各二兩木香半兩青皮去白二兩槐角一兩炒檳榔大黃各五錢右為細末生薑麵糊為丸每服五十丸生薑湯下治風痰氣壅發即頭旋嘔吐不下飲食宜服此方前胡一兩去蘆頭半夏半兩湯洗七遍去滑枳殼二分麩炒微黃去瓤旋覆花防風去蘆頭枇杷葉拭去毛炙微黃陳橘皮湯浸去白瓤焙白术各半兩右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服一方有赤茯苓甘草錦朱丸出御藥院方治膈痰風厥頭目昏痛眼黑旋運怔忪惡心驚悸恍惚夢寢不安漸致成冒昧不知人事乳香研朱砂研白礬灰研皂角子炮製為末鐡粉研各一兩半夏麯二兩鉛白霜研右為細末生薑汁麵糊和丸如菉豆大每服十五丸至二十丸生薑湯下驚悸語澀金銀湯下或荆芥湯下檳榔利膈丸出御藥院方治風上攻痰實喘滿咳嗽檳榔麵褁煨熟銼一兩皂角不蛀肥者去皮子酥塗炙槐角子半兩青橘皮湯浸去瓤稱各二兩齊州半夏湯浸洗七次切焙乾黑牽牛四兩半生半炒丸濃煎生薑湯吞下不嚼二烏丸出華陀中藏經方治風痰眩運川烏頭草烏頭各四兩青鹽四兩黑豆半升右用水二升同煮四味水耗即以溫水添之候川烏頭半軟四破之更煮以透爛為度去皮同煎烏頭並黑豆于石臼或水臼內搗令極爛不見日星即就丸乾即以煮藥水添濕同搗煮時留一盞以下水以備添勿令煮乾也丸如梧桐子大每服三二十丸鹽酒任下食前七生丸出衛生家寶方治風盛及頭風一切痰涎天南星半夏川烏草烏地龍不去土川芎白殭蠶已上各一兩右並不去皮臍生用為細末以蕎麥麵打糊為丸如梧桐子大蛤粉為衣每服七丸淡茶湯送下不以時候漸加至十丸十五丸白龍丹出王氐慱濟方治上焦風壅化痰涎利胸膈逐風祕雷丸末二錢甘遂末三錢牽牛一兩杵取米六錢不用再羅者龍腦少許粉霜四錢輕粉四錢入白麵少許三味同研令勻細滴水和餅子于慢火內煨令熟放冷再研令細右件同為細末研令入青州棗取肉煮熟和為圓如菉豆大每服五十丸溫漿水下如一切風癎驚搐涎滯並以漿水下七丸或二七丸如小兒痰熱及渴不止煩疼但頻少與服自然消除大人風氣壅盛上焦不利最宜服此更在臨時酌其加減靈砂丹出楊氏家藏方治痰壅滯結集成癖上攻頭目昏痛眩運目暗耳鳴肢體煩倦項背拘急手足戰掉肌肉瞤動麻痺不仁及一切風痰積飲悉皆治之皂角不蛀肥實者去皮弦子二斤用河水三升生薑自然汁半升搗皂角取濃汁濾去滓干銀石器內慢火熬成膏天南星生用半夏湯洗去滑白附子生用白礬枯四味各四兩朱砂一兩半研如粉豬牙皂角肥實者去皮弦塗酥炙赤色稱二兩右件同為細末入朱砂同研勻將皂角膏子搜和丸如梧桐子大别用硃砂為衣每服三十丸生薑湯下食後如積年經久痼冷痰疾加附子四兩去皮臍生用五生丸主風痰頭旋臂痛嘔吐咳嗽等證天南星薑汁浸乾焙半夏洗去滑附子去皮天麻白附子白礬枯六味各一兩硃砂别研右為細末生薑汁作糊為丸如梧桐子大硃砂為衣每服三十丸食後薑湯下天麻白术丸出楊氏家藏方治風濕痰飲食攻衝頭目昏暈重痛咽膈壅滯不利及一切痰飲悉皆主之天麻去蘆白术天南星炮半夏湯洗淨白附子炮川芎白殭蠶炒去絲嘴寒水石煆過薄荷葉去根赤茯苓旋覆花已上十一味各等分右件為細末以生薑自然汁煮麵為丸如梧桐子大細研雄黃為衣每服四十丸溫生薑紫蘇湯送下食後白附子化痰丸出楊氏家藏方治風痰積于膈胸頭疼目暈半夏湯洗七次生薑自然汁製天南星炮石膏細辛去葉土白殭蠶炒去絲嘴白茯苓去皮肉桂去粗皮白附子炮川芎上九味各三分香白芷一分麝香一錢别研右件為細末同麝香研勻取生薑汁煮麵糊為丸如桐子大每服三十丸食後熟水送下木乳丸出楊氏家藏方治風痰上盛咳嗽連聲唾出稠黏皂角去皮弦子焙乾天南星生用半夏湯洗七次焙乾白附子生用晉礬生用已上五味各一兩右件為細末用生薑自然汁煮麵糊為丸如梧桐子大每服二十丸三十丸濃煎生薑湯下食後臨卧青金丹出楊氏家藏方治風涎壅嗽咽膈不利晉礬生三兩半夏生三兩焰硝二兩天南星生用一兩右件為細末生薑自然汁煮麵糊為丸如梧桐子大青黛為衣每服二十丸生薑湯下食後天麻半夏湯出衛生寶鑑方治風痰內作胸膈不利頭旋眼黑兀兀欲吐上熱下寒不得安卧天麻一錢半夏一錢柴胡七分黃芩酒製炒五分橘皮去白七分甘草炙五分白茯苓去皮五分黃連三分前胡五分右件銼如麻豆大都作一服水二盞生薑三片同煎至一盞去滓溫服食後忌酒濕麵生冷物防風丸出經驗方治風壅氣澀痰涎不利言語蹇澀大腸燥結神昏氣濁防風秦芁石斛丹參薏苡仁已上各三分前胡去苖陳橘皮刮去白皮杜仲去粗皮炙香切附子炮製去皮臍已上各半兩桂三分取有味者不見火大麻仁一兩微炒别研右為末入麻仁研勻煉蜜丸如梧桐子大每服食前溫酒下二十丸隨病勢加減槐角利膈丸出衛生寶鑑方治風勝痰實胸膈及喘滿咳嗽皂角一兩酥炙去皮弦子半夏半兩槐角半兩炒牽牛一兩半以上藥為末生薑汁打麵糊為丸如梧桐子大每服三十丸食後生薑湯下溫服良愈治一切風痰胸膈不利涕唾膠粘上焦壅滯喉中不快出護命方麻黃去根荆芥穗杏仁去尖木香當歸黃苓羌活芍藥柴胡去毛大黃炮熟各一兩半夏二銖牽牛半兩右為細末每服二錢水一盞生薑一片同煎取八分食後喫紅散子出護命方治一切風痰倒卧昏悶并小孩子一切風痰半夏薑汁煮一百沸四銖白附子附子炮去皮臍細辛乾蝎用生薄荷三兩碎切同炒令乾去薄荷不使藿香白殭蠶去絲天南星川芎羌活防風各一分右細杵羅為末入輕粉二十箇硃砂靈砂各三銖麝香龍腦各二銖同研令勻薄荷湯下半錢小兒一匙又方出衛生寶鑑方治風痰心昏恍惚不能言語痰涎流溢薺苨半兩防風半兩去蘆右以水一大盞煎至七分去滓入生薑汁半合空心溫分二服八風丹出十便良方治體虛有風痰涎壅盛頭目昏重口眼牽引靣若蟲行及癱瘓諸風並宜服之附子川烏頭草烏頭白附子半夏天南星香白芷天麻川芎朱砂細辛已上十一味各半兩生用麝香一錢右並為細末入白麵五兩一處研勻水和為丸每一兩作一十二丸陰乾每服一丸細嚼茶清或溫酒送下食後臨卧十珍丸出楊氏方治諸風掉運痰厥頭旋項背拘急肢體疼痛麻木不仁草烏頭八兩一半生去皮臍尖一半炮天南星五兩三錢河水浸三日炮縮砂仁一兩肉桂川芎防風白芷桔梗各二兩七錢細松煙墨二兩燒存性麻黃七兩右件為細末煉蜜丸每兩分作三十丸每服一丸食後細嚼茶酒任意三倍湯出十便良方治風消痰理手足戰掉去諸風極效天南星四兩防風二兩甘草一兩右件並生用銼如麻豆大勿令為末每服稱重三錢以水二盞生薑二十片同煎至一盞去滓服不計時候日二三服利膈丸治風盛痰實喘滿嗽風氣上攻出御藥院方牽牛四兩生槐角子一兩炒皂角去皮酥炙半夏洗各二兩青皮一兩木香一兩右為細末生薑麵糊為丸桐子大每服四五十丸水下防風飲子出十便良方治風痰氣發即頭旋嘔吐不食防風人參橘皮各二兩白术茯神各三分生薑四兩右為粗散每取五錢以水一盞半煎取八分服日三四服忌醋麵等治暴患痰飲不省人事者出經驗良方用生麻油一盞灌入喉中須臾逐出風痰立醒然後隨證用藥白殭蠶散出肘後方治風痰方見破傷風類治風痰鼻榻以萆麻不拘多少去皮擘為二片用黃連等分捶碎二件用水一處浸七宿後空心日午臨卧時只用浸者水吞一片水只旋添勿令乾服兩月後喫大蒜豬肉試驗如不發動便是效也若發動時依前法再服直後不發如只膇脹用針出毒物纍有神效普濟方卷一百四
