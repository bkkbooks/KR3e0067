body:
  text: 普濟方卷三百十六明周王朱橚撰婦人諸疾門中風夫中風者虛風中於人也風是四野八方之氣常以冬至之日自坎而起候其八方之風從其鄉來者主長養萬物若不從其鄉來者名為虛賊風害萬物人體虛者則中之當時雖不即發停在肌膚後或重傷於風前後沓因體虛則發於臟腑俞俞皆在背中風多從俞入隨所中之俞乃發病婦人血氣虛損故令中風也當察口眼開闔以别重輕涎沫有無以明證治如眼開口閉手足不開涎不作聲者可治如眼閉口開聲如鼾睡遺尿者死風中之人虛微則中微虛甚則中甚其候或心中恍惚精神悶亂或暴不知人涎液不收或口眼喎斜或語言謇澀或身體強直或肢體不利皆中風之證也凡中風角弓反張風痺手足不隨偏枯口噤口眼喎斜風眩頭痛血風心神驚悸癲狂骨節疼風血風走注瘙癢癮疹風疾痰腳氣腰痛諸疾要察脈之虛實辨證之冷熱相人之強弱入臟入腑在經在絡而施治大抵先宜順氣然後治風萬不失一蓋有中風中寒中暍中痰中氣皆能令人涎潮昏塞如中風若作中氣治之十愈八九中氣若作中風治之十無一生所以疑惑之間不問中氣中風首以蘇合香丸五積散加麝煎如中痰則參蘇飲如中寒則有理中湯如中暍則有白虎湯如的然見得是中風如三生飲木香煮散排風續命引大小竹瀝大八風湯至寶丹牛黃清心丸辨其冷熱虛實而投之未有不安者也然此積疾襲久非一日所能致今人服藥便責無效其責醫者亦速矣正宜大劑久服方有其效尋古治中風方續命排風越婢等悉能除去而千金多用麻黃令人不得慮虛凡以風邪不得汗則不能盡也然此治中風無汗者為宜若治汗者更用麻黃則津液轉使脫反為害大中風自汗仲景雖處以桂枝湯至於不住發搐口眼瞤動遍身汗豈勝對治當此之時獨活湯續命煮散復榮衛却風邪不可闕也夫婦人臂痛筋脈攣急不能屈伸遇寒則劇由肝虛為風寒邪氣流于血脈客于經絡搏於筋筋不榮乾急而痛其脈緊細宜服柏子仁丸舒經湯若臂痛不能舉或左或右時復轉移一臂由脘伏痰脾氣滯而不行上與氣相搏四肢皆屬于脾脾氣滯而氣不下上攻於臂故痛其脈沈細宜服茯苓丸控涎丹脾脈絡胃挾咽連舌本下心之别脈系舌本今心脾二臟受風邪故舌強不得語也喉嚨者氣之所以上下也會厭者音聲之户舌者聲之機唇者聲之扇風寒客于會厭之間故卒然無音皆由風邪所伏故謂之中風失音不語經云醉以當風使人發瘖宜服神仙解語丹偏風口喎者是體虛受風風入于挾口之筋也足陽明之筋上挾于口其偏虛風因虛而乘之使其筋偏急不調故令口喎僻也方木香煮散出大全良方治左癱右瘓并有風濕諸藥不效常服調氣進食寬中羌活麻黃去節一兩防風三分白术陳皮黑附子炮草豆蔲連皮煨杏仁去皮麩炒南木香檳榔牛膝大川烏炮人參白茯苓川芎當歸甘草桂心半兩右㕮咀每服四錢重水一大盞半生薑五片煎至八分去滓熱服大便不通加大黃心腹脹加葶藶滑石膈上壅滯咳嗽氣促加半夏川升麻天門冬知母繆安人年六十五六忽然中風不省人事無汗有痰已辦後事衆醫以為不可治也召僕診之六脈浮溢關此風脈也先投參蘇飲六服先寬氣下痰次之以木香煮散而愈又享十年之夀牛黃散出聖惠方治婦人中風精神冒昧舉體不仁心胸不利疾狀如醉牛黃半兩細研龍腦一分細研雄黃半兩細研麝香一分細研硃砂一兩細研蟬殼一分天南星一分炮白附子半兩炮側子半兩炮去皮臍烏蛇肉一兩酒浸炙微黃白殭蠶一分微炒桑螵蛸一分微炒芎藭一分防風半兩去蘆羚羊角屑半兩赤箭一兩紫葛半兩乾蠍一分微炒甘菊花一分犀角屑半兩麻黃半兩去根節蔓荆子一分天竺黃一分細研茵芋半兩牛膝半兩去苗當歸半兩藁本一分右搗細羅為散入研了藥都研令勻每服不計時候以薄荷溫酒調下二錢龍腦散出聖惠方治婦人中風身強口噤四肢不利言語蹇澀精神昏憒龍腦牛黃雄黃鉛霜各三錢鐵粉一兩硃砂一兩麝香三分上各細研天南星半兩炮裂天麻一兩麻黃一兩去節莽草三分白殭蠶半兩微炒乾蠍半兩微炒白附子半兩炮裂桂心半兩烏蛇肉一兩酒拌炒黃防風半兩去蘆柏子仁半兩蟬殼半兩微炒獨活半兩白膠香半兩仙靈脾半兩天雄半兩炮去皮臍桑螵蛸半兩微炒羚羊角屑半兩甘草半兩炙阿膠三分搗炒黃研碎右搗細羅為散入研了藥令勻每服不計時候以薄荷酒下一錢保安丸一名萬靈丸出御藥院方治婦人産前産後三十六種冷血風半身不遂手腳疼諸疾並宜服之赤茯苓去黑皮白芍藥牡丹皮各三分沈香食茱萸各一分人參去蘆頭桂去粗皮當歸洗切焙牛膝酒浸吳白芷木香藁本去蘆川芎麻黃去根節細辛㨂淨黑附子炮去皮臍蘭香葉炙銼甘草炙銼寒水石煆防風去蘆桔梗去蘆頭蟬殼炙銼馬鳴退生乾地黃一兩右為末煉蜜和丸如小彈子大每日空心用溫酒化下一丸療八風十二痺癥瘕乳中風淋血聚并治胎不安子死腹中不過三丸生下死胎胎衣不出一丸便出産前産後痢并赤白帶下并嘔逆鎮心痰氣煩滿一丸産前産後腹心㽱痛繞臍下如刀刺相似者一丸便止入難月便一日一丸至産下不覺疼痛産前傷寒中風體如板者熱煎麻黃湯化下一丸立效經脈不通或赤白帶下吃食無味瘦惡乍寒乍熱面赤唇焦手足煩疼遍身黑點生血斑者一切並服此藥悉愈每服一丸細嚼空心溫酒下烏犀散出聖惠方治婦人中風筋脈攣急四肢疼不能行履神思昏悶言語蹇澀烏犀角屑一兩赤箭三分附子三分炮去皮臍防風三分去蘆羌活三分芎藭三分羚羊角屑三分五加皮三分獨活三分牛膝三分去苗黃耆半兩細辛半兩赤茯苓半兩麻黃半兩去根節赤芍藥半兩當歸三分銼微炮枳殼半兩麩炒黃生乾地黃一兩道人頭一兩甘草一分右件藥搗篩為散每服四錢水酒各半盞生薑半分薄荷三七葉煎至六分去滓不拘時候溫服丹砂丸出聖惠方治婦人中風心神冒悶言語蹇澀四肢拘急口眼喎斜辰砂一兩細研水飛過牛黃一分雄黃一分龍腦一分西甘石半兩麝香一分天竺黃一分鉛霜一分已上並細研犀角屑半兩天麻半兩羚羊角屑半兩烏蛇肉酒拌炒黃乾蠍半兩微炒桑螵蛸微炒白附子炮製香附子獨活麻黃去根節防風去蘆頭各半兩狐肝炙令黃右為末入研了藥令勻煉蜜和搗三五百杵丸如梧桐子大每服不計時候豆淋酒下七丸牛黃散出聖濟方揔録治婦人中風身強口噤四肢不利精神昏冒形如醉人牛黃一分研麝香一錢研雄黃半兩鉛霜一分研丹砂研天南星炮製天麻酒浸炙乾附子各半兩炮麻黃去根節煎去沫焙桂去粗皮白殭蠶炒乾蠍去上炒防風去蘆頭獨活羌活當歸切炒各一兩右除研藥外搗羅為散入研藥再研勻每服一錢生薑薄荷酒調下不拘時日三服天雄湯出聖濟總録治婦人中風筋脈拘急肢體疼痛言語不利精神冒悶天雄炮製去皮臍前胡去蘆頭芎藭枳殼去穰麩炒細辛去苗葉黃芩去塵皮茯神去末羌活去蘆頭獨活去蘆頭防風去叉桂香去粗皮甘草炙麻黃去根節煎掠去沫焙芍藥一兩右銼如麻豆每服三錢水一盞煎至七分去滓溫服三日羚羊角湯出聖濟總録治婦人中風筋脈攣急肢體疼痛行履艱難神思昏冒語言不利羚羊角鎊芍藥枳殼去穰麩炒生乾地黃切焙桂去粗皮麻黃去根節煎掠去沫焙黃耆五加皮銼牛膝酒浸切焙獨活去蘆頭羌活去蘆頭附子炮防風去叉一兩酸棗仁白殭蠶炒右銼如麻豆每服三錢水一盞薑三片薄荷五葉煎七分去滓溫服羌活散出聖惠方治婦人中風筋脈拘急肢節痠疼言語蹇澀頭目不利羌活去蘆頭天麻酒浸焙乾芎藭蔓荆子去皮羚羊角鎊白附子桂去粗皮薏苡仁柏子仁研如膏牛膝酒浸切焙烏蛇肉酒浸去骨炒當歸切焙各一兩蟬退一分炒麝香一錢研酸棗仁半兩研右除麝香外搗羅為散入麝香研令勻每服一錢豆淋酒下日三服附子散出聖惠方治婦人中風筋脈拘急四肢疼痛言語蹇澀心胸不利附子三分炮製去皮臍當歸一兩微炒芎藭一兩前胡一兩去蘆枳殼去穰一兩麩炒黃黃芩一兩細辛三分白鮮皮茯神羌活杏仁湯浸去皮尖雙仁麩炒黃桂心漢防己麻黃各一兩去根節甘草右為散每服四錢水一中盞薑半分煎至六分去滓不計時候溫服狐肝丸出聖惠方治婦人中風卒倒眼黑頭疼胸膈多痰言語蹇澀心神恍惚皮膚頑麻狐肝一具臘月者老鴉一隻去嘴爪翅尾狐肝同入於罐內燒令煙盡隂地上候冷細研天麻一兩天南星一兩半炮製白附子炮製烏蛇酒拌炒黃乾蠍微炒蟬殼微炒晚蠶蛾微炒白殭蠶各一兩硃砂半兩細研牛黃一分細研麝香一分細研右為末入研了藥令勻煉蜜和搗三五百杵丸如梧桐子大每服不計時候以豆淋酒下七丸至十丸白薇丸出濟生方治手足搐搦痰涎壅盛不省人事多因虛七情所感而生先將蘇合香丸溫酒化開多服後服此白薇紫石英火煆醋淬七次琥珀别研白芍藥桂心不見火川續斷酒浸防風去蘆山茱萸取肉當歸去蘆酒浸柏子仁炒川烏炮去皮尖牡丹皮去木各一兩木香不見火半兩麝香别研半錢右為末生薑自然汁打米糊丸如梧桐子每服七十丸空心食前溫酒或米飲下防風散出聖惠方治婦人中風言語蹇澀肢節疼痛皮膚不仁口面喎戾防風去蘆羌活當歸銼微炒天南星炮製白殭蠶微炒半兩天麻麻黃三分去根節桂心半兩芎藭半兩烏蛇肉半兩酒拌炒黃桑螵蛸半兩微炒硃砂一分細研入麝香一分研入右為散入研了藥令勻每服不計時候以溫酒調一錢續命煮散出大全良方治風氣留滯心中昏惰四肢無力口眼瞤動或時搐搦亡失津液渴欲引飲能扶榮衛去虛風自汗及産後中風自汗宜服之防風獨活當歸人參細辛葛根芍藥川芎甘草熟地黃半夏逺志去心荆芥穗各半兩桂心七錢右㕮咀每服五錢水一盞生薑三大片煎至七分去滓溫服不拘時候汗多不止者加牡蠣粉一分半柏子仁丸出大全良方柏子仁乾地黃各二兩茯苓枳實去穰麩炒覆盆子炒北五味子附子炮石斛去根切酒蒸炒鹿茸酸棗仁炒桂心沈香黃耆各一兩蜜水炙右為細末煉蜜為丸如梧桐子大空心酒下三十丸烏蛇丸出聖惠方治婦人中風牙關緊急手足頑麻心膈痰涎壅滯烏蛇肉一兩炒黃半夏半兩湯洗七遍生薑半兩去皮同搗炒天麻一兩白附子一兩炮裂烏犀角屑半兩殭蠶半兩微炒天南星一兩炮裂乾蠍半兩微炒麻黃半兩去根節獨活半兩當歸半兩銼碎微炒晚蠶沙半兩微炒麝香一分研右為末煉蜜和丸如梧桐子大每服不計時候溫酒下七丸羚羊角湯出聖濟總録治婦人中風不語心悶恍惚四肢不舉風熱壅滯羚羊角一兩鎊麻黃去根節煮去沫焙三兩黃茋去心一兩防己一兩赤芍藥一兩半羌活去蘆頭一兩白鮮皮一兩杏仁去皮尖雙仁炒兩半葛根銼一兩石膏碎三兩馬牙硝研二兩甘草銼炙一兩右粗搗篩每服五錢水一盞半煎取一盞去滓溫服日二服澤蘭丸出濟生方治女子血實七情所感卒然手足搐搦狀類癎證却不可作癎治之先多以蘇合香丸酒服却投此立效當歸去蘆酒浸澤蘭葉琥珀别研羚羊角鎊别研牡丹皮去木防風去蘆一兩麝香别研半錢安息香酒炙煮去砂生地黃赤芍藥各一兩鐵粉橘紅各半兩右為末煉蜜和丸如梧桐子大每服七十丸空心食前溫酒或米飲下排風湯出大全良方治男子婦人風虛濕冷邪氣入臟狂言妄語精神錯亂及風肝風發則面青心悶吐逆嘔沫脅滿頭眩重耳不聞人聲偏枯筋急曲拳而臥心風發則面赤翕然而熱悲恐嗔怒口張呌喚脾風發則面黃身體不仁不能行步飲食失味夢寐倒錯與亡人相隨肺風發則目白咳唾膿血上氣奄然而極腎風發則面黑手足不隨腰疼難以俯仰痺冷骨疼諸證令人心驚志意不定恍惚多忘服此湯安心定志聰耳明目通臟腑諸風疾入五臟等症並宜服之白鮮皮白术白芍藥桂心川芎當歸防風杏仁去皮尖麩炒甘草各二兩白茯苓麻黃獨活各三兩右㕮咀每服三錢水一盞半生薑四片煎至八分去滓溫服無時候昔有一婦人年四十四五其證説話氣短足弱難行口內含霜七十日內三次經行遇行則口冷頭目眩暈足冷則透心冷痛每行則口中冷氣若不相續有時鼻中熱面赤翕然而熱身體不仁手足不隨冷痺骨痛有時悲傷夢與前夫相隨心驚志意不定恍惚多忘却能食僅一年許醫者投熱藥則面翕然而熱氣滿胸中窒塞悶絶投冷藥則瀉又一醫以十全大補湯服之則發煩躁心驚而跳醫者以雙和湯服之則覺得面上與腹中甚如火燂心愈驚欲吐郤不吐大腑祕裏急後重因診之六脈弦緩喜見於春此是可治之候遂與喻山人降氣湯八服次日診之脈差有力云服藥之後覺鼻中熱心煩悶絶齒噤與參蘇飲八服黃連丸一兩許越三日云服藥之後覺其疾如故與茯苓補心湯服之皆無效因以脈證評之只有排風湯甚對或曰何以見得是曰此證一能食飲此風飢也二七十日三次經行此是榮經有風血得風散也三頭目眩暈此肝風也四面赤翕然而熱悲傷此心風也五身體不能行步夢與前夫相隨此脾風也六手足不隨腰痛難以俯仰冷痺骨疼此腎風也有此諸候令人心驚志意不定恍惚多忘真排風湯證也或曰風脈當浮今脈弦緩微弱恐非風也曰風無一定之脈大抵此證虛極生風排風湯所有之藥有十全大補湯料亦有平補之意却遂供十服越三日有效脈亦差勝只是心中如煙生似有微熱大便拘祕再與排風湯十服兼牛黃清心丸皂角丸助之越三日云服前藥一二日諸證悉除只是弱不能行步支持因與祕傳降氣湯十服云夢裏虛驚大便滑泄如食傷與五積散數服加人參鹽煎兼感應丸即愈後皆無恙上重頭眩不能久立久坐再與排風湯則脫然安以此知要依古法不可杜撰意度處方羌活散出聖惠方治婦人中風四肢緩弱身體疼痛言語蹇澀精神昏亂羌活一兩羚羊角屑二分桂心半兩赤箭三分細辛三分防風三分去蘆當歸三分銼微炒赤芍藥半兩茯神一兩麻黃三分去根節甘草半兩炙微炒黃芩二分右為散每服四錢以水酒各半中盞煎至六分去滓不計時服加減小續命湯出大全良方治卒暴中風不省人事漸覺半身不遂口眼喎斜手足戰掉語言蹇澀肢體麻痺精神昏亂頭目眩重痰涎併多經脈拘攣不能屈伸骨節煩疼不得轉側及治諸風服之皆驗若治腳氣緩弱久服得瘥久病風人每遇天色陰晦節候變更宜預服之以防瘖啞麻黃去根節防己人參去蘆黃芩桂心甘草白芍藥川芎杏仁附子炮半兩防風一兩半右㕮咀每服五錢水一盞半薑七片棗二枚煎至七分去滓不計時候服取汗隨人虛實與患輕重有人腳弱服此劑得瘥精神恍惚加茯苓逺志骨節煩疼有熱者去附子倍芍藥心煩多驚者加犀角半兩骨間冷疼者倍用桂附嘔逆腹脹者倍人參加半夏一兩躁悶大便澀者去附子倍芍藥入竹瀝一合煎服臟寒下痢者去防己黃芩倍附子一兩加白术一兩一方有白术無杏仁一方無芎藭杏仁止十味延年無防風遺失便利産後失血老人小兒用麻黃桂心甘草各二兩一法治或歌或哭或笑語無所不及用麻黃三兩人參桂枝白术各二兩無附子防風生薑有當歸一兩自汗者去麻黃杏仁加白术腳弱加牛膝石斛各一兩身疼痛加秦芁一兩腰疼痛加桃仁杜仲各半兩失音加杏仁一兩春加麻黃一兩夏加黃芩三分秋加當歸四兩冬加附子半兩小風引湯出大全良方治左癱右瘓素有風濕常服調氣進食寬中防風獨活細辛川芎北五味子白茯苓人參白芍藥白术甘草右㕮咀每服三錢水一盞薑三片杏仁五箇去皮尖鎚碎同煎至七分去滓溫服如加麻黃蓯蓉附子當歸羚羊角六味等分即大風引湯羌活湯出聖濟總録治婦人中風言語蹇澀筋脈拘急肢體緩縱羌活去蘆赤茯苓去黑皮芎藭防風去叉當歸切焙麻黃去根節煎去沫焙烏頭炮裂去皮臍桂去粗皮各二兩石膏研細辛去苗葉各一兩右銼如麻豆每服三錢水一盞生薑三片棗二枚擘破煎七分溫服三日藿香散出聖惠方治婦人中風言語蹇澀心膈痰涎不利四肢時有抽掣宜服藿香白附子炮裂白殭蠶微炒天南星炮裂乾蠍微炒桑螵蛸微炒各半兩麻黃三分去根節膩粉一分研入半夏半兩湯洗七次以生薑半兩去皮同搗爛炒乾麝香一分研入右為散入研了藥令勻每服不計時候生薑酒調下一錢麻黃湯出大全良方治婦人中風一切風證麻黃去根節煎掠去沫焙乾防風去義人參去蘆黃芩去黑芍藥赤者杏仁去皮尖雙仁炒芎藭甘草炙各一兩附子一枚炮裂去皮臍右銼如麻豆每服五錢水一盞半入生薑半分切煎取七分溫服日三服當歸湯出聖濟總録治婦人中風不能語不知痛處拘急不得轉側當歸二兩切焙麻黃去節煎去沫焙六兩桂去粗皮芎藭二兩黃芩半兩去黑心乾薑一兩炮杏仁去皮尖雙仁炒四十粒石膏三兩甘草二兩炙右粗搗篩每用六錢水三盞煎取一盞半去滓溫服神仙解語丹出大全良方治心脾經受風言語蹇澀舌強不轉涎唾溢盛及療淫邪搏陰神內鬱塞心脈閉滯暴不能言白附子炮石菖蒲去毛逺志去心甘草水煮稀天麻全蠍洗晒炒羌活南星牛膽釀如無只炮各一兩白殭蠶一兩炒木香半兩右為細末煮麵糊丸如梧桐子大入辰砂為衣每服二十丸至三十丸生薑薄荷湯吞下無時候