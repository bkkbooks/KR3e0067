body:
  text: 普濟方卷三百九明周王朱橚撰折傷門總論夫諸脈從肉諸筋從骨骨三百六十有五聨續纒固手所以能攝足所以能步凡厥運動罔不順從若乃倉卒之際墜墮倒仆折傷蹉跌患生不測詎可殫舉究圖療治小則消腫而舒攣大則接筋而續骨各有方劑存焉凡從高墜下傷損腫痛凡墜墮傷損腫痛輕者在外塗傅可已重者在內當導瘀血養肌血宜察淺深以治之若傷損惡血不散脈者血之腑血行脈中貫於肉理環周一身因其肌體外固經隧內通乃能流注不失其常若因傷折內動經絡血行之道不得宣通瘀積不散則為腫為痛治宜除去惡瘀使氣血流通則可復完也傷折腹中瘀血者因髙墜下倒仆攧撲氣血離經不得流散瘀在腹中速宜下之遲則日漸瘀滯使人枯燥色不潤澤痿瘁血瘕之病骨節損折肘臂腰膝出臼蹉跌須用法整頓歸元先用服麻藥使不知痛然後可用手凡腳手各有六出臼四折骨手有六處出臼四折骨手腳亦三處出臼手掌根出臼其互交骨相鎖或出臼則是銼出鎖骨之外須是搦骨相鎖骨不歸窠或出外則須搦入內或出內則須搦入外方歸窠臼若只用手拽斷難入窠十有八九成痼疾也手六出臼四折骨手臂出臼此骨上段是臼下段是杵四邉筋脈鎖定或出臼亦銼損筋所以出臼此骨須拽手直一人拽須用手把定此間骨搦教歸窠看骨出那邉用竹一片夾定一邉不用夾須在屈直出夾才服藥後不可放定或時又用拽屈拽直此處筋多喫藥後若不屈直則恐成疾日後曲直不得肩胛上出臼只是手骨出臼歸下身骨出臼歸上或出左或出右須用舂杵一枚小凳一箇令患者立凳上用杵撑在下出臼之處或低用物墊起杵長則墊凳起令一人把住手尾拽去一人把住舂杵令一人抱住患人放身從上坐落骨節已歸窠矣神效若不用小凳則用兩小梯相對木棒穿從兩梯股中過用手把定木棒正稜在出臼腋下骨節蹉跌之處放身從上墜下骨節自然歸臼矣腳六出臼四折骨或腳拔上交􅀈處出臼用一人拽去自然手摸其骨節或骨突出在內用手止從此骨頭拽歸外或骨突向外須用力拽歸內則歸窠若只拽不用手整入窠內誤人成疾腳大腿根出臼此處身上骨是臼腳根是杵或出前或出後須用一人手把住患人身一人拽腳用手盡力搦歸窠或是銼開又可用軟綿繩從腳倒弔起用手整骨節從上墜下身直其骨便自歸窠背脊骨折法凡銼脊骨不可用手整頓須用軟繩從腳弔起墜下身直其骨便自歸窠未直則歸窠須要墜下待其骨直歸窠然後用大桑皮一片放在背皮上杉皮兩三片安在桑皮上用軟物纒夾定莫令屈用藥治之腳手骨被壓碎者須麻藥與服或用刀割開甚者用剪去骨鋒便不衝破肉或有粉碎骨者與去細骨免見膿血之禍然後用大片桑白皮以二十五味藥和調糊藥糊在桑白皮上莫令差錯三日一洗莫令臭穢用藥治之又切不可輕易自恃有藥便割剪便弄須要詳細審視當行則行尤宜仔細或頭上有傷或打破或刀傷骨碎用藥糊角縛不使傷風切須記之用藥治傷則用糊藥封角切須不可使風入乳腫其血自消散不攻瘡口正骨金瘡須看脈候始知傷痛臟腑致命處一觀其脈虛促危矣傷處淺命脈虛促亦為後慮傷至重命脈和緩永無慮也脈有虛實有去來有疏密或被傷臟脈不死者必關脈實重則勿慮或傷至死處其關脈無别脈洪大則難醫如用兩件藥後脈不轉動急急住藥若脈漸漸隨藥轉此則可治無慮或出血甚者脈不要洪大只要平正重實其血不曽出者亦無惡血在內者其脈洪大不要疏密亦不進退來去恐其變凶看傷脈每與內科脈不同或傷內或致命或難醫處被傷者命脈便已去矣此等切勿治之攧撲傷損或被傷入肺者縱未即死二七難過左脅下傷透內者腸傷斷一半可醫全不可治小腹下傷內者證候繁多者脈不實重者老人左股壓碎者傷碎破隂子者血出盡者肩內耳後傷透於內者皆不必用藥打攧及樹木壓遍身痛者打攧樹木壓或自高處攧下者此等傷皆驚四肢五臟必有惡血在內專怕惡心先用清心藥打血藥及通大小腸藥次第先服臨服童子小便入藥內立效專用大小腸泄利恐隘塞利害之甚清心藥加前方通利大小腸藥服自然俱通無悶煩無惡血害心以次用止痛藥服之即止接骨附論夫正骨續筋方法備急非虞斷筋折骨之疼喎訛閃肭禆止相當覆塗之藥綿纒水溫淨息永通玄府開舒汗隙藥歸腫散痛消血脈旋流布周榮衛省身愛力以時中養氣痊平餘月而已接骨手法下頦骨脫落法令人低坐用一手帕裹兩大拇指插於病人口裏內外捏定大斗根往左布上下搖動令病人咽唾一口往下送之入臼腮外用膏藥貼之再用一手帕往上兜之內服沒藥乳香散痛者黃耆散忌硬物十數日缺盆骨損折法令病者正坐提起患人胳膞用手揣捏骨平正用乳香消毒散敷貼以軟絹掩如拳大兜於腋下上用一薄板子長寸濶過半軟紙包裹按定止用鷹爪長帶子拴縛定七日換藥內服烏金散定痛疼腫破消後次伸舒起指以後骨可如舊肩胛骨脫落法令患人服烏頭散麻之仰臥地左肩脫落者用左腳登定右肩落者右腳登用軟絹如拳大抵於腋窩內用人腳登定拿病人手腕近肋用力倒身扯拽可再用手按其肩上用力往下推之如骨入臼用軟綿捲如拳大㼭於腋下用消毒散敷貼內服降聖丹痛者黃耆散三日一換藥定痛腫消換膏藥貼之常以伸舒起指演習如舊臂膊骨傷折法令患人正坐用手拿患人胳膊伸舒揣捏平正用消毒散敷貼外用薄板片紙裹之絹縛定內服接骨烏金散痛者乳香黃耆散二七日定可換藥依前扎縛痊可為妙胳膊骨傷折法令患人正坐用手按捏止依前法用藥扎縛凡病人手面於仰看可為妙肋肢骨折損法令患人服烏頭散麻之次用手按捏骨平正用乳香消毒散數貼服之導滯散并復元活血湯下之以利為度再用接骨烏金散降聖丹調治後用膏藥貼之以後骨可如舊胯骨脫落法令病人服烏頭散麻之仰卧倒看比兩腿膝蓋高者磋在下也一手拿定腳腕右蹉在下往上動搖送之若蹉在上往下伸舒扯拽如骨入臼再用比雙腳根齊用走馬散貼內服降聖丹沒藥乳香散如疼定腫消用膏藥貼之後次演習行步腿脛傷折法令病人仰臥倒比根齊恐胯骨出臼用手拿病人膝下一手拿腳腕伸舒扯拽腳根對齊如骨折處再用手按捏骨平正用消毒散敷貼外用長板子紙包裹絹帶子扎縛裏外用磚靠定勿令腿搖動腳頭抵正二七日方可換藥時輕手解開用蔥椒湯軟絹揾洗再敷藥用銅匙柄穿帶子勿令腿動以後伸舒演習行步膝曲蓋損破骨法令病人正坐用一竹篾圈比膝蓋大小上用軟紙纒圈如皮破者用玉真散敷貼破處并敷貼藥用紙篾圈絹帶子縛定內服烏金散黃耆散如不破者五七日一換如破者待瘡口成膿香油潤起用蔥椒湯洗軟絹揾洗再用敷貼藥定疼痛腫消常以演習行步方得完全臁韌骨傷折法令病人正坐一手拏病人膝下一手拿腳腕用力伸舒扯拽捏骨平正如皮破者玉真散貼之上用敷貼藥外用薄片紙包裹絹子扎縛過三五日待瘡口成膿香油潤起用蔥椒湯揾洗上用生肌散并太乙膏貼之後扎縛留瘡口恐有膿血出內服烏金散加味通聖膝下軟衣㼭之如太破者二七日一換藥用磗裏外靠定勿令腿動痊可為妙破傷骨折法如破傷折骨服烏頭散麻之如骨折簽出皮者用銅匙柄挑起皮皮披如舊用玉真散敷貼如骨折低者往上擡之如骨折髙者往下按之揣捏骨平正用油搽皮膚或蜜亦可用敷藥乾糝揾洗用生肌散并太乙膏貼之初服導滯散下之後服止痛祛風藥方并接骨藥托裏散調治如皮破骨折者髓血相混成膿接不正以後次演習行步終不得定完成全腳腕蹉跌出臼法令病人正坐倒一手拿病人腳腕一手拿腳大扯拽搖動按捏骨入臼平正用走馬散敷貼外用長片板子絹帶縛於腳腕并小腿上恐腳不正用軟衣㼭之內服降聖丹乳香散以後行步演習痊可為妙用麻藥法凡攧撲損傷骨肉疼痛整頓不得先用麻藥服待其不知痛處方可下手或服後麻不倒可服蔓陀羅花及草烏五錢用好酒調些少與服若其人如醉即不可加藥被傷有老有幼有無力有血出甚者此藥逐時相度入用不可過多亦有重者若已見麻不倒者又旋添些更未倒又添酒調服少許已倒便住藥切不可過多去惡血法凡攧撲刀傷石傷諸般傷損至重者皆先服清心藥次服清小便藥三服去血藥被傷者血未結打從瘡口中出或結在內用藥打入大腸時即泄出或被打破攧破木壓惡血未積者用藥打散四肢或歸臟腑者或歸上膈者打從口中吐出或歸中膈打入大腸泄出先用此急救次服止痛藥即二十五味藥中加減用用藥加減法凡傷有淺深隨其吉凶用藥如折骨者則用後二十五味接骨方治之再加自然銅白芷乳香沒藥川芎各五錢立效若傷臟腑用清心藥加川芎當歸赤芍藥各二錢或肚腸傷破加白芷五錢同後清心藥服或被傷浮腫不通加皂角黃柏皮半兩入紫金皮散內傅之或頭破傷風亦用紫金皮散加皂角黃柏皮傅之立退或筋斷接骨者用二十五味加續斷半兩或諸處傷痛不止者仍用二十五味加川芎五錢或惡血汚心不下用後清心藥加大黃枳殼五錢或氣觸痛加木通丁香藿香三錢同二十五味服之凡加減末者加末散者加散其餘只依本方不用加減孕婦攧撲傷損先用安胎藥後用二十五味接骨去草烏川芎餘依本方又用藥加減方凡損若不折骨不碎骨則不可用自然銅於藥內除去無痰涎不用半夏老人有傷者骨脈冷每加當歸川芎川烏木香丁香人參五錢去白芍藥生地黃此亦二十五味內加減老人服此或傷臟腑者不問老少如有血并痰從口中出者清心藥加丁皮川芎半夏入二十五味內同服腿腫角血或皮冷加乾薑五錢入退腫藥內糊腫上腫及血自然退散或皮膚熱者加黃蘖皮皂角五錢入腫藥內角處自然退用藥湯使法凡藥皆慿湯使所使方先但用清心藥煎後用童便一盞同服或止痛重傷者則用薑湯燈心湯調二十五味藥服之薄荷湯亦可凡傷或刀傷及損內臟腑恐作煩惱悶崩血之患如折骨者用薑湯酒服接藥傅之如骨碎破重打重攧重木石壓者皆用先服湯使法末並用酒服如輕攧撲損傷則用薑酒調下二十五味藥立效凡碎進頸骨用手巾一條繩一莖繫在坊上捶下來以手巾兜縛頦下於後腦穀縛接繩頭却以瓦􅎆一箇五六寸髙看碎捽入淺深斟酌髙低令患人端正坐於其􅎆上令伸腳坐定醫用手揉擦平正説話不覺猝然以腳一踢踢去􅎆子如在左用手左邉掇出在右右邉掇出又一法令患人卧牀上以人捺其頭雙足踏兩肩即出凡左右兩肩或攧墜失落若腦骨義出在前可用布袋腕繫在前如出在後腕繫手在背後若在摺向右疣右出左疣骨即入接左摸右髻接右摸左髻凡背上被打傷處帶黑單調肉桂末貼熱腫用一黃散血不出內疼痛者乳香沒藥酒調一黃散貼却不破血藥凡手㬹腕骨痕掤直拽出藥用手擡起手㬹腕以患人手本身膝頭墊定醫用手於頸項肩處按下其骨還臼用藥敷貼若手腕失落或在上在下用手拽身伸却便手撚住方可貼藥夾縛若手㬹骨出用大椅橫番向上醫用足踏定將病手在橫椅校曲入腕內以文書貼定平穩用絹兜縛兜時要手向上若手盤出臼不可牽伸用衣服向下承住用手撙按入臼搖三次腳用夾縛下用襯夾凡手骨出向右則醫以右手拔入骨出向左則左拔之一伸一折搖動二三次凡手與腳骨皆有兩筋前一筋斷可治若皆斷不可治凡手足骨斷者中間一坐縛可帶緊兩頭放寬些庶氣血流蔭又法腫若如截竹斷却要兩頭緊中間帶寬便益血氣聚斷處又手盤出向下將掌向上醫用手撙損動處將掌曲向外用夾向背一片長托在手背後向西面一片短在掌按處向小指一片長在指曲處向大指一片短在髙骨下三度縛去却貼藥凡兩手臂骨打斷有碎骨跌斷骨無碎骨凡手指打碎用油潤以薄笋籜管定看冷熱用一黃散或黑龍散貼之凡腰骨損斷先用門扇一片於斜一頭令患人覆睡以手捍上下用三人拽伸醫以手按損處三時久却用貼藥病人渾身動作一宿至來日患處無痛却可自便左右畨轉仍用通貼藥若前後不便聽其施溺更用內外住痛神授乳香散在後凡臂􅀈左右跌出骨者右入左左入右用腳踏進如跌入內令患人盤腳按其肩頭用膝旅入雖大痛一時無妨却用貼藥從緩仰卧用手捺襯再加貼藥喫藥未可畨卧大動後恐成損腰腿傷全用酒佐通氣血藥凡胯骨從臂上出者用三二人捉定腿拔伸仍以擦送入如在襠內出者則難整凡腳骨傷甚難整凡兩腿左右或打或跌者多用蔥打斷者不用薑蔥以手法整其骨左上於前右於後以手拽正七分不拽五分整定用貼藥後以松皮夾縛縛時先縛中坐後縛上下外用副夾竹繩若上下有腫痛無慮五日方可解外縛約一七方可轉動解外縛未可換藥仍渾用消服藥凡辨腿胯骨出以患人比並之如不粘膝便是出向內如粘膝不能開便是出身凡腳盤出臼用人以腳從腿上踏一搬雙手一撙搖二三次以藥夾凡膝蓋或左右損斷用手按直用貼藥夾一月若腫痛須用針刀去血却敷貼用夾或外脛踝骨兀折左右腳盤用腳踏直或針患處却敷貼喫住痛藥不得令冷若膝骨跌出臼牽合不可大曲直則不見其骨積曲亦然可半直半曲以竹篐住以帛縛之凡胸前跌出骨不得入令患人靠實處立用兩腿踏患人兩腳却以手於其肩掬起其胸脯其骨自入用藥封縛亦在隨機應變凡胸脯有拳捶傷外有腫內有痛外用貼藥內服化血藥如刀傷可用刀安骨定皮合口外用貼藥糝口內用喫藥凡胸骨肋斷先用破血却用黃雲膏貼胸脅傷血作不通用生菉豆汁生薑自然汁和服以一壯力在後擠住自吐出其血也凡腸出可以病手搭在醫肩背隨其左右􅀈起以熱油潤瘡口整入腸打噴嚏一箇却用桑白皮為線打曲針向皮內縫合後內用斷血合口藥固濟用絹袋縛定再貼絹上再縛若秋冬間有此證先用斷血合口後用狗子一隻割取狗口皮貼瘡口割候封藥聨口用若腹上有損針鼻大以燈火照之腸中有氣射燈證不可治又法腸出弔起病人手用醋煎山豆根汁服一口至二口却以針於病人頸上一刺腸自入凡腸上必有熱黑紫斑及有曲縫痕者以腸也如上有膏一重黃一重肉更用胰子肉出也腸若出不割如實是膏不得入可割除須詳辨認凡拔伸捺上紙布絹軟物單正仍拔伸當近在骨損傷不得前去一節骨上仍拔伸相度左右骨有正拔者有斜拔者撙捺在手便法快要皮骨相就正平整拔要相度難易或用一人二人已上彭氏口教骨者可用肥株去皮弦子膜以童便煮生薑一味打爛入飛羅麵加入前獨活八味打和用紙布絹片却用前正副夾須仔細整頓其骨緊縛後看上下腫痛消者方可換藥仍服住痛藥且貼了此肥株一畨便如鐵鉗牢者宜斟酌日子看有無動作方可換藥凡斷筋骨者先用手尋採傷處整頓其筋如前方貼藥及藥用正副夾正用杉皮副用竹片凡骨斷皮破者不用良薑肉桂止用蔥汁調貼或損在內可用童便薑蔥生油和通藥服如通以過只用順血上氣藥餘血在腹作脹更進前藥無事一方用損藥仍看病人虛實若斷骨皮不破整其骨先用貼藥加良薑肉桂在貼藥內以蔥汁調塗凡皮破骨差出爻拔伸不入撙捺皮相近三分用快剮刀割開此捺入骨不須割肉內自碎了以可入骨骨入用黑龍散傅貼瘡四旁腫處留瘡口用風流散填之若不破用黑龍散敷貼之用風流破者用血出用力整時最要快便凡骨碎看本處平正如何大抵骨低是不曽損左右骨髙骨定損要拔伸捺平用藥敷貼束縛要平正捺了曲處時時曲轉便活處不強凡敷貼用板子一片就板子上將皮紙或油單紙攤黑龍散在上移在損處皮肉有碎骨後來皮肉自爛碎骨自生若破斷皮肉用風流散填塗用線縫合用黑龍散敷貼凡腦骨傷碎輕輕用手撙捺平正若皮不破用黑龍散敷貼皮若破用風流散填塗瘡口用絹帛包不可見風著水恐成破傷風如水及風入腦成破傷風必發頭疼則難治急用玉真散貼服凡腦骨傷碎在硬處可治若傷太陽穴不可治如在髮際須剃去髮用藥內入看皮破不破依上用藥服或填若欲洗只可用熟油洗髓出多用腦麝末掩凡腦及兩角後摺或兩眉有傷可治眼睛傷不突瞳人不碎可治頭頂心有損傷難治搓衮舒筋法道人詹志水者信州人初應募為卒𨽻鎮江馬軍二十二歲因習驍騎墜馬右脛折為三困頓欲絶軍帥命舁歸營醫救鑿出敗骨半年稍愈扶杖緩行骨空處皆生獨腳生筋攣縮不能伸既落軍籍淪於乞丐經三年遇朱道亦舊在轅門問曰汝傷未復初何不醫救對曰窮無一文豈能辦此朱曰正不費錢但得大竹管長尺許鑽一竅繫以繩挂于腰間每坐則置地上逢足搓衮之勿計工程久當有效詹用其説兩日便覺骨髓寬暢試猛伸足與日差逺不越兩月病筋悉舒與墜時等又頃見丁子章以病足卒故作轉軸腳踏用之其理正同不若此為簡便無力者立可辦也方紫金丹治打傷損骨折川烏炮草烏炮各一兩五靈脂木鱉子去殼骨碎補威靈仙金毛狗脊自然銅醋淬七遍防風各五分地龍去土烏藥青皮去白穰陳皮去白茴香各半錢乳香沒藥紅娘子麝香黑牽牛各半錢餘糧石微炒右為細末醋麵糊丸梧桐子大每服十丸至二十丸溫酒送下病在上食後服病在