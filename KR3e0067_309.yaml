丸温酒下無時一半末木𤓰酒調下敗龜散治折傷定痛接骨敗龜醋炙去帬重一兩沒藥研桂去麤皮自然銅煅醋淬七遍研當歸切焙骨碎補去皮炒白芷防風去义各半兩右為散每服二錢温酒調下不拘時日二米殻散米殻三錢當歸乳香沒藥血竭甘草川芎已上各一錢半半兩錢火燒七次醋淬一箇右為粗末每服三錢用好酒一大盞煎至七分去滓温服接骨散并治惡瘡金絲水蛭半錢每箇三截瓦上去氣透為度没藥三錢研細銅錢用半兩者取三文或五文燒紅醋淬細末金頭蜈蚣一箇金色自然銅半兩燒紅醋淬研為細末用之乳香一錢研為細末用之右為細末以津調半錢塗患處止痛如出膿先用粗藥末少許油少半匙同研勻再入少半匙再勻又入前藥接骨散半錢用銀釵子打成膏以雞翎掃在瘡瘇處痛立止天明一宿自破如打折骨頭并損傷可用接骨散五分加馬兠鈴末五分酒一大盞熱調連滓温服之立即定疼如不折立止疼痛以食前後藥又外用後藥貼一方無沒藥接骨藥陳爛麻根兩把羊耳朶一對亂絲一握多者更妙右取肥松節劈碎約量多少先放三兩根新瓦上以藥同在上燒存性研為末如生再燒研更加五靈脂半兩如疼入乳香少許和藥如茶褐色為度用布條子約纒一遭先攤小黄米粥勻上撒末勻纒定折處上又用帛三五重上又用竹簟子纒勒𦂳慢得中約二日換上一次再後五日換一次又七日換上一次如此無不接者接骨丹半夏二兩南星四兩木鼈子一兩燒去皮紅豆半兩沒藥自然銅炒各一兩右為細末生薑汁四兩同醋打麪糊二錢塗處俾正綿裹之温熱令汗孔開而藥力入接骨傅藥牛皮膠生薑自然汁各二十文重先將生薑自然汁入銚内火頓熱入膠在汁内鎔開打令勻如稀糊入沒藥白芨白蘞草烏頭官桂各二十文重右為細末同入前藥汁内打勻先用葱湯洗患處却傅藥用綿帛扎定如覺熱行則藥効硃砂膏治攧撲刀傷接骨臘月豬脂五兩黄蠟半斤已上洗煎鈆丹羅自然銅四兩研蜜陀僧四兩研硃砂研右用新鐺鼎先鎔脂次下蠟停冷再下蜜陀僧鈆丹硃砂自然銅緩火仍煎入水中不散取出鼎放冷處用栁箆攪勻㵼入甆器内不住手攪至凝丸如彈子大且用笋皮之類襯之極冷方收凢傷碎骨者大石壓碎骨者先用此藥化開然後夾定用此藥服之須作小丸如梧桐子大每服十丸葱酒送下或傷損深者撚成條子入孔中淺者用油單紙貼之甚者凳裹木夹之如藥方散再覺病痛更一服痛即止又痛甚者貼之即止赤芍藥丸治打傷筋骨或閃肭或傷損折疼痛不可忍芍藥一兩用赤的好乳香半錢接骨木半兩乃蒴藿也川當歸一兩川芎自然銅各一兩右為末用黄蠟四兩鎔入前藥末攪令勻候温軟衆手丸龍眼大每服一丸以好無灰酒一盞浸開服之痛絶便止若大傷碎折先整骨用後藥貼了然後用此藥表裏兩攻無不效也此後一方是一副不可分開治打破傷損接骨方川烏草烏各一兩右為末用薑汁調作掩子貼損處又將綿縛定良黒豆散治傷疼痛雄黒豆一兩桑條東枝剉碎一兩粟揳剉碎一兩以上三味用醋拌醋拌於瓮器炒存性右搗碎為散每服三錢熱酒調連進三服後用八骨散八骨散治筋骨損折虎骨醋炙龍骨碎研牛骨雞骨炙狗骨炙兎骨炙豬骨炙羊骨炙楓脂香研自然銅火燒醋淬二七次右各等分搗研為散每有傷處糝藥在瘡上用黄米粥勻攤帛上裹瘡口用帛裹輕繩縛之接骨散米殻一兩去頂蜜炒黄色麻黄一兩乳香一錢半當歸一錢半甘草芍藥各三錢半右為細末酒煎熬至七分和滓温服病上食後病下食前接骨方好綿灰無油頭髮灰各一錢乳香一錢木鼈子去殻去油一錢麝香少許南水蛭不用糯米於瓦上炒黄為度右為末作一服好酒下驗病上下服之能飲酒者大醉亦可只一服不許二服雞鳴散治内外攧傷損骨當歸鬚赤芍藥大黄各五錢降真蘇木甘草只少許右㕮咀水二盞煎七分去滓食前温服加小便治打撲傷損接骨方川烏草烏白殭蠶半夏南星桂去粗皮右各等分為末取生薑自然汁并釅醋各半調藥稀稠得所就綿上攤勻裹痛處如乾再將醋并薑汁潤如藥落再換或傷損甚者用藥了以杉木板夾定此藥用後止痛然後服藥當歸去蘆煨乾稱乳香研細右各等分為末每服二三錢酒調下接骨知母方治筋骨傷折知母焙貝母去心白芨白蘞桂去粗皮乳香研各半兩右為細末用好酒調如糊攤藥在新帛子上裹所傷處三五日一換接骨烏金散半兩錢一百足醋淬碎錦文水蛭半兩炒烟盡水使不利南乳香一錢另研麝香一錢自然銅醋淬研半兩右為細末每服半錢自然汁生薑温酒少許同服之如損在腰上食後服之腰下食前服如筋骨無傷藥即吐出無忌一方有没藥烏金散治骨接水蛭一兩炒黄自然銅三兩碎研内將一兩生用一兩炒水竹青半兩炒灰硝黄半兩二味同燒灰乳香三錢右為末每服一錢或半錢小兒一字入麝少許熱酒送下神效㸃金丹即筋骨藥蒼术紅麪末香附子白芷草烏各一兩右為末水糊為丸如雞頭大每服五丸用酒或茶鹽送下不可多服恐麻人接骨服藥蘇枋松節黒角節者各半兩自然銅乾鍋内煆沒藥乳香滴乳香各一錢右各細末和勻每服二錢無灰酒下服罷便用刷牙子灌潄恐刺若骨損甚者先以木夾定次服藥一服止痛二服骨有聲三服完如入臼接骨敷貼藥出濟生拔萃方天南星四兩木鼈子三兩沒藥半兩官桂一兩乳香半兩右為細末生薑一斤去皮取自然汁入米醋少許白麪為糊同調攤紙上貼傷處以綿繫之用箆子箆住麻索子纒五仙丸出聖濟摠録治傷折筋骨自然銅四兩火燒醋淬二次大栗一百枚去皮生用黒豆一升湯浸去皮白桑柴灰二升接骨木灰一升右一處大臼内搗一千下取細入煉蜜再搗丸彈子大每服一丸温酒嚼下不拘時服接骨敷貼方以石楠葉碾為末用大活鯽魚一箇從脊破開去盡粗骨滿裝楠末於内濕紙裹煨熟去紙將魚帶藥熱貼於損處用直性木夾定扎縛隨即接之接骨藥出儒門事親書半兩錢醋蘸燒碎為末麝香少許自然銅各一錢右為極細末如在上食後服如在下食前服三錍頭嚼丁香一枚乳香一粒無灰酒一小盞如不折其藥反出罷其痛不可忍勿凝待一日如骨未接再服如前老者十餘日少者不過五七日治骨折傷損法方活蝦蟇一箇活鯽魚一箇杜牛膝根洗浄小粉炒焦黄右搗爛下小粉和成如泥患處用一層䕶之後搽前藥夾板縛夹定仍服諸藥定痛一字散何首烏草烏各二兩乳香沒藥各一兩右為末每一字鹽酒調日進二服筋骨藥草烏一兩蒼术五兩青皮白芷各二兩右為末麪糊丸如鷄頭大每服三丸温酒送下走馬散出醫方大成治接骨定痛詩曰青栢乾荷葉皂角并碎補此藥最為强止痛絶為良栢葉生少許荷葉生皂葉生多用或肥皂骨碎補去毛右各一兩為末於跌處揣定骨入元以杉木板子量大小以紙襯於杉内生薑調藥如糊攤就紙上貼骨斷處以繩縛定夾外更以熟絹纒之莫令骨動三日或七日開看以葱湯洗不可令水大熱若無動再貼藥復夾七日除七日換藥貼如痛甚加沒藥少許貼一方有白及接骨禁聲膏肉桂不見火為末牛皮膠截碎馬屁勃擦末獨核肥皂右用生薑自然汁添少水煎膠化擂之却入馬屁勃肥皂擂為稀膏離火畧温入桂在内再擂細攤紙上須用紙背貼患處不用藥貼痛甚者熱貼㣲痛者温貼上用油紙包貼外用帛縛第二三日取下刮舊藥貼生薑汁熬熱再貼如此二三次平復皮上必有生熱瘡用薄荷甘草白及為末調傅接骨丹出衛生家寳方治筋骨折損自然銅生用别研川楝子剉碎黒牽牛炒川烏頭生用各等分右為末酒糊丸如梧桐子大每服五丸至七丸傷損在上食後服傷損在下食前服日進二服敲雞散水蛭半兩炒麝香少許半兩錢十文醋蘸淬七次金色自然銅半兩醋蘸淬右為細末先以湯洗用竹木夾定後復服藥每用半字好酒調下多用則吐不受服藥約人行二十里則完常以鷄敲折頸骨畧與此藥治隔宿殺雞視之傷處如絲繞誠可信矣接骨膏烏魚骨燒烟盡木鼈子去皮油一兩白芨一錢白蘞一兩右為細末新水調為膏攤夾紙上貼損處上用竹片夾定内服乳香沒藥自然銅各等分古老銅一錢燒赤醋淬七次酥為度右為細末每服二錢温酒調下接骨丹純黄絲一兩燒灰虎骨一兩燒存性古銅錢一兩火煆醋淬數十次錢酥為度鼈甲一兩燒灰存性右為末用淬錢醋煮糊為丸每一兩作二十四丸以朱砂為衣每服一丸用熱酒嚼下隨病上下服之效接骨藥吴茱萸官桂厨屋内弔用剪剪下勿令犯手芥子右等分為末以六錢煉蜜一兩為丸用生薑四兩擂汁入無灰酒内化服須一時喫盡若作兩次喫在後必成擁節不平服藥後須忌飲酒一月仍以杉木夾縛即効四骨散治一切折了腿肐膊骨節龍骨虎骨豹骨穿山甲右等分入乳香沒藥少許一處為細末用黄米麵糨攤在細稀稀布上藥末糝上先將折處理料的正却用藥貼在患處用火烤濕氊一匝又用竹薜四下薜住後用帶子或細索拴牢三五日看有不著處從頭再捏遍其藥貼上即時不疼十數日接住一方有乳香沒藥治攧骨折傷方麻皮糯米黒豆粟子無粟殻亦得右等分燒灰為末酒調服效接骨散百一選方治打撲傷損折筋骨出者須要揣接骨歸元位然後服此藥用半兩古文錢不拘多少以鐵線貫之用鐵匣盛以炭火煅通紅盌盛好酒米醋各半升鐵鈐開匣取錢於酒醋口淬再淬盡去酒醋以温水淘數多尤妙恐火毒不盡令患啞焙乾研極細入乳香沒藥水蛭等分同為細末每服半字或一字生薑自然汁調藥次用温酒平服若不傷折即時嘔吐若傷折則藥徑下纒繳如金線絲如弓上之力神效驗初服忌酒三日一方無水蛭有麝香昔王丞相在東府時施此接骨藥極有效驗草烏敷貼藥草烏菉豆粉白膠香右等分為末煎牛皮膠調藥攤紙上貼痛處接骨藥草烏末一兩吴茱萸一兩白麵二兩炒右為末和勻米醋脚調敷損處沒藥自然銅散出危氏方治折骨傷筋痛不可忍當歸沒藥各半錢自然銅一錢火煅醋淬為末又用水飛過右為細末以酒調服仍以手摩痛處衍義云有人養折翅鷹飼以自然銅散遂飛去神授散一名接骨散一名鈆粉散當歸洗浄焙為末鉛粉各半兩蓬砂二錢右研細末令勻濃煎蘇枋汁調服一大七若損在腰以上先食淡麪半盌然後服藥在腰以下即先服後食仍頻頻呷蘇枋汁别作糯米粥入藥三錢拌勻攤紙上或絹上封裹傷處如骨碎則用竹木夾定損處却以藥傅貼或衣物包之其妙如神内翰之子椊為豫州倉官嘗以治一庾人婁度當下黒血數升而安治跌折手足傅貼方跌傷先服前方神授散次用此方傅貼損處麪四兩天南星三兩半為末生薑四兩取汁同和右先將杉木板夾定損處却以藥傅貼外用紗帛包裹内翰之子椊為豫州倉官嘗以治一庾人婁度其妙如神小接骨散治打撲閃肭損骨牡蠣一兩洗青蛤粉一兩木鼈子仁五錢骨碎補散治折骨乳香沒藥各一錢半骨碎補一兩燎去皮右為細末和勻分作三服用童便調下酒亦可外仍以後藥敷貼正骨散治傷折骨損疼痛主活血止痛正骨續筋木賊去節三兩廣黄一兩半甘草三兩右為末每服五錢熱酒調下須先整骨夾端正然後服散亦可接骨散治傷折筋骨木炭半斤火燒醋蘸三度白絲三兩燒灰自然銅一兩火燒三度醋淬研右為細末每服一錢煎木𤓰酒調病甚損傷折骨者服椑訖裹了次服沒藥丸沒藥丸沒藥丹砂研牛膝酒浸焙乾羅為末各一兩右研勻麵糊丸如梧桐子大毎服二十丸木𤓰湯下日一服午間服之五日後漸减丸數烏金石散治傷折骨烏金石糓精草小地黄右為細末用好陳醋加菉豆粉少許入銅器内熬成稀糊住火入藥末和勻稍添火熬滚隨時攤紙上患處貼之候患處覺冷其疼即止内損血不出者以銀杏去殻好酒熱調服乳香接骨散治折骨條肉桂二兩去粗皮研乳香沒藥為末各一兩右拌勻用黄米煮稠粥量瘡大小剪紙花子攤粥在上然後將藥糝在粥上熱搭在瘡處如脚脛折把脚拽直用藥少頃不疼脚癢時以水濕帛子瀝乾裹著藥餅子上用熨斗火熨不癢為度接骨丹茴香一錢五靈脂一兩右為細末另研乳香為細末於極痛處糝上用小黄米黄粥塗了後又用二味藥末糝於上再用帛子裹了用木椑子椑了少壯人二日効老者五六日効敷貼方木鼈子七枚去殻研自然銅末二錢右用生薑自然汁半盞麵五匙同研熬成膏攤紙上先用杉木節火焮草煎湯傾盆中將損處待熱氣熏候温洗之然後貼藥上散神仙立效散治骨頭内損接骨如神半兩錢自然銅各等分右各用火煅醋淬七次以酥為度去火毒為細末將患所折骨處用軟舊衣片或帶亦得襯裹外用杉木板一寸許活者數片周圍裹了外用帯縛須是實急得所太急則縛住血脈恐藥不行每用一字用生薑自然汁少許調在藥注内或手心内令患人服之即用無灰酒一盞送下一服定疼二服接骨三服平復却更用本類後烏金散調理治打撲傷損骨折芥菜子炒一兩夜合樹即合歡也去粗皮取白皮剉碎炒令黄㣲黒色四兩右為細末酒調臨夜服粗渣罨瘡上扎縳定神效越州人謂之烏顆樹一方葱白砂糖相等爛研傅之立止仍無瘢痕黄蘗散一名白皮膏治打撲傷損筋骨折及上跌撲疼痛黄蘗一斤半夏半斤右為細末每用半兩生薑自然汁調如稀糊以鵝翎傅之用紙靨貼如乾再傅折先用絹帛封縛次用杉木扎定良乆痛止即癢覺熱乃是血活即得筋骨復舊輕者三五日即愈重者不過旬月乾頻上薑汁尤佳蘇緯光云用全在生薑接骨方半兩錢十二文火煅麝香少許治攧傷折骨鼠糞糯米炒黄色碾細為粉末右用好醋調為膏以笋箬攤之貼下疼不可忍後即愈再貼接骨丹用頭髮一塊洗浄燒灰乳香好酒調下大効接骨藥不問骨節疼痛用粟米熟鐵陳葱好醋同鉢内炒烟用碗覆之存性外敷貼内喫卓氏膏療折跌腕蹻以附子四枚生用去皮切以煉成豬脂一斤以三年苦酒漬三宿以脂膏煎三上三下膏成欲傅時以木七摩之或攤貼處日一易亦療卒中風口禁頸項强又方治攧骨折傷用蘇枋搥碎常煎服或以童子小便或熱酒調麻皮灰服之皆良烏金散接骨以黒豆二兩桑柴十根鋪黒豆再同以火燒候桑柴已過取二味灰為末次入麝香少許每服二錢酒調下白膏子治接骨用牡蠣少許為末用糯米粥調塗其上即用杉木板夾即愈治骨折及墜馬用銅末調酒服之佳接骨神効一字散用蚵蚾蟲一名土鼈子一名異名生不拘多少用紙裹放鍋上焙乾為末每服一字好酒調下熱服亦可不可太多續骨方一名煨葱方一名仁存方兼治腦四肢骨碎及打傷瘀血不止治指拇并爪甲因傷擘裂用葱一束布袋盛釜中懸煮熟取出截去根白以葱青衆手乘熱擘開内涎就於傷處頻貼以骨接不痛為度如骨碎難接用糯米粉熱湯搜和成餅乳香糝之加盫上方煨透乘熱搥䓤碎貼患處一方炒熱罨傷處接骨方以芷可作草屩者以刀近根割去待其長新生者割収之焙乾為末或擣傅之以軟帛扎定効治攧骨折傷方用生韭自然汁服碗許其惡血從大便中下治折骨用水蛭新瓦上焙乾為細末熱酒調下半錢食頃痛可再服痛止便將折骨藥封次以物夾定直候至効療凡脫折折骨諸瘡腫者或當風或多用扇中風發痓口禁頭項强身中急痛者用竹瀝飲三二升若已口禁者以物發内之忌冷飲及酒竹瀝卒燒難得可合束十許枝併燒中央兩頭承取収之療骨折接令如故不限人畜取古錛上柯魯切下母郎切温器也銅錯取末擣以絹篩和少酒服之亦可食物和服之不過兩方寸匕以來任意斟酌之治四肢碎破及筋傷蹉跌方用生魚熱擣以敷折上日三易又方生鼈熟搗傅折上日三易又方取活鼠破其腹背及熱以傅之愈又去鼠五藏傅之良一方熟搗以敷折上日三易凡跌撲傷損骨者用黄牛角炙焦刮去末須去焦者取二錢以好酒調下上損食後服下損食前服左傷用左角右傷用右角此法因同老王千戶在餘干州鎮平以箭射折周霸都腿即以此藥服之三五次接上完復予目見之後用果効接骨方用豆粉炒將葱白生薑擂爛再同於銚内炒熱敷冷則換跌折肢體并攧撲損傷筋骨折者以肥皂炒枯為末用旋煮糯米糕同擣為膏子敷貼患處以杉木片綁縛仍酒調肥皂末一捻許咽下即時接上治傷出腸肚在外不破不傷肚者以鍼穿桑根白皮縫合其患可痊如無桑白皮用絲線縫合亦得也如不入以手剥肋腸自入也又方治人頭骨斷不傷氣喉食喉外隨時用物繫住用正三二日其骨自接仍隨證以藥治之治跌骨㫁用白及一味為末酒調服神効又云其功不减自然銅與五銖錢接骨丹治攧撲傷折錢五十文炭火煅醋淬碎半兩乳香半兩透明者五靈脂半兩羊脛骨炭半兩右為末每服半錢蜜調成膏以酒化開服之次喫獨栗三兩箇止可一服次進烏金散烏金散傷折接骨如神桑白皮一兩焙剉獨栗連殻切焙一兩炒自然銅一兩煅淬研羊脛炭二兩右為末每服二錢無灰酒調下日三服傷折在上食後服在下食前服止痛方乳香沒藥鹽炒當歸火煨紫金皮醋炒白芷劉寄奴黒牽牛右等分依前大接骨方煅製傷痛不止者先服此即止又方麻黄三兩内去一兩節甘草三錢右為末每服五錢匕整骨了熱酒下令醉補骨脂丸接骨止痛生肌肉續筋脈補骨脂炒香乳香别研自然銅燒紅酒淬七遍石亭脂别研續斷酒浸木鼈去殻取肉别研上六味烏雄雞一隻去毛皮腸肚内皆不用只取血并骨入藥烏鼈一枚刳去腸胃如無只使鼈甲代之亦可也右件鼈或鼈甲和雞血骨就砧上刴爛令極細烈焙乾為末料與前藥末等分拌和勻酒煮麵糊為丸如梧桐子大每服五十丸加至一百丸温酒鹽湯任下不拘時候又方乳香沒藥蘇木川芎當歸血竭赤小豆石南藤紫金皮小含笑花葉白茅根又縛傅藥南星黄蘗皮赤小豆右用薑黄末生薑汁調傅又方治骨折敗龜版一箇百孔已上不妨火煅白為度生薑肥大者自然汁右碾龜殻為末入乳香勻用藥末一合浸少時煮粥研細入薑汁更研方用前藥兩匙入研勻再於瓦内蒸令極熱上骨折處仍先用葱湯洗令骨内熱筋骨活絡方可敷之候乾再換三五度即瘥又方用苧根竹根切片無灰酒一盞整骨了日進三服又方用雄蟹殻不拘多少用水蛭去兩頭尖同蟹殻炒焦黄盡去水蛭研殻為末熱酒調連盡三服畢喫白湯䬣􅨋一碗不用鹽不問寒暑被盖取汗為度又方用木鼈子肉細磨水調抹之彭氏黒龍散治傷損筋骨碎斷差爻每用先洗葱湯藥水淋洗整拔平正看熱令用薑汁或紙或帛隨大小裹貼有破留口别用飲藥如骨斷碎斟酌夾縛三日一次淋洗換藥不可去夾以待骨續如刀箭獸齕成瘡壞爛擦踐腫痛用薑汁和水調貼有破留口川山甲六兩丁皮六兩當歸二兩百草霜枇杷葉畧用皆一字右為細末薑汁和水調貼又方用川烏一箇先將好臘糟入紫油缸内次用糟盫了蓋定有患取此川烏如梧桐子大用飯三五粒為丸冷水下糟抹患處桃紅散出永類鈐方貼傷折筋骨腫痛草烏三箇去皮見血者不可用飛羅麪半斤國丹三錢貝母半兩天南星半兩右為細末生薑自然汁調貼如作潮熱茶清調貼如皮破見血者去草烏恐壞皮肉若輕者血聚以蘿蔔葉研罨患處帛縛之治胷脇諸骨傷斷出永類鈐方右以黄雲膏木菖蒲炒常紅用内消如腫加生者五兩即何首烏白芷生用風加一兩赤芍藥生二兩痛亦加土獨活生三兩常用為末温熱酒調塗諸損敷貼出永類鈐方當歸三兩白芷三兩肉桂半兩薫陸香沒藥各一兩右為末薑汁調白芷一味自佳歐陽氏貼損出永類鈐方白芷赤芍藥南星天花粉木臘葉牡丹皮少許右為末薑汁調貼彭氏風流散出永類鈐方石膏十箇泥固濟火煅白礬飛二兩枇杷葉少許松脂黄丹各一兩右為末傷經乆者藥水洗後用瘡乾用油調傅新破傷忌風濕治損折骨活血住痛虚弱及經乆未安出永類鈐方附子八分炮澤蘭一兩川椒去目及第二重皮炒半兩放冷甘草半兩當歸川芎獨活各半兩白芷一兩川烏八錢右為細末細嚼生薑酒調如刀傷不用酒骨斷皮不破加乳沒浸酒調體弱傷損氣痛茴香薑酒調看虚實每服加少烏末腦上有傷頭痛不止荆芥川芎各半兩白芷一兩蓽澄茄二錢為末熱酒調治傷損筋折骨先用趂痛散止痛出永類鈐方川獨活川五靈脂别研乳香别研白芷北茴香各一兩防風百草霜沒藥各半兩浄生地黄二兩半赤芍藥二兩杜白芷三兩桔梗草烏二錢小麥汁煮透去皮尖焙右為細末每一大錢煨葱頭或炒松節薑酒調下接骨散出永類鈐方治諸傷筋折腫痛服之住痛消腫白芍藥二兩破故紙炒一兩自然銅醋淬沒藥别研羊脛骨炭各一兩白茯苓骨碎補去皮各一兩川烏炮木鼈去殻并油煨各半兩虎骨隨多少醋煮别研右為末每一大錢依前湯使調下燒羊脛骨炭法四五月収麻羊糞用茆一層又加糞一層盡意燒之存性合了煙令作炭先辦薑汁童便候炭成將入汁内淬曬乾為末筋骨散出永類鈐方治新舊損除痛壯筋骨生地黄赤芍藥當歸石南藤各二兩杜白芷骨碎補炒去毛各三兩五靈脂肉桂山桂皮荆芥穂各一兩桔梗四兩川烏雄黒豆煮去皮四兩草烏製半兩右為末薑汁和酒調婦人風損痺痛煨葱酒調下接骨續筋住痛生血周心竹𫝊甚神祕之内加玉真散二味又勝諸方出永類鈐方乳香沒藥自然銅醋淬七次南木香生地黄熟地黄川羌活川芎當歸防風南星松嫩心去皮粉側柏葉醋煮加倍用草烏數箇製去皮尖痛加作五七箇柘木火中煨存性作炭右前藥各等分側柏柘炭加一倍用細末生薑自然汁調下或蜜丸如彈子大生薑和酒調細嚼之神效接骨丹出衛生寳鑑治男子婦人老㓜筋折骨撲損及治寒濕脚腿疼或一切惡瘡疼痛不止南乳香沒藥南白膠蜜陀僧四兩另研香白芷紅豆大豆赤芍藥當歸水洗三遍𤓰子仁水蛭已上各等分自然銅火燒過令通紅醋淬紅燒如銀為度用之右為細末黄蠟為丸如彈子大每服一丸用黄米酒一盞煎開和滓温服年少者又一服老者加添服病在上食後病在下食前此藥内自然銅水蛭𤓰子加桂花川練子茴香為細末酒麪為丸如桐子大每服十五酸石榴湯送下食前日進二服治小腸如神一切臍腹疼痛並皆治之此藥功效不可具述神仙透骨丹出永類鈐方骨㫁八分可用此藥當歸四兩川獨活三兩乳香白膠半兩鎔過用製生熟地黄各一兩自然銅醋淬半兩側柏葉四兩酒蒸焙肉桂半兩石南藤二兩右為細末糯米糊彈子大國丹為衣每一丸炒松節或畨降節酒下看損上下服亦可如梧桐子大每三十丸藥加松條節好土珠荆芥桔梗各二兩脚氣入骨痛木𤓰浸酒黒豆炒烟起浸酒小紅丸出永類鈐方治諸傷勞損踒折筋骨風濕攣拳壯筋骨活經絡生氣血川烏何首烏蒼术蛇牀子五靈脂白膠香赤小豆牛膝當歸各製浄一兩乳香二錢酒糊丸如菉豆大每服三十丸酒下大紅丸出永類鈐方治證同上不問新舊經年諸損傷孕婦勿服赤白芍藥兼用一斤何首烏一斤焙川烏頭一斤七兩炮當歸七兩骨碎補麥製一斤牛膝十兩淨北細辛八兩青桑灰三斤或不用赤小豆二升自然銅二兩醋淬細末醋丸梧子大信州朱為衣每服二十丸温酒下黒神丸出永類鈐方治證同上白斂一斤白及四兩當歸四兩白芍藥剉南星六兩川烏三兩骨碎補製八兩牛膝九兩百草霜半兩赤小豆一升右為末醋糊丸如桐子大湯使同上一方加細辛或白鮮皮接骨散出百一選方治折傷黄狗頭骨一箇湯去毛便以泥皮去之炭煅過去泥為末官桂末牡蠣亦泥固火煅右三味各為細末每用狗頭末五錢入牡蠣末三錢桂末二錢並抄以糯米粥鋪絹帛上糝藥在粥上裹損傷處大段折傷者上更以竹片夾之少時即痒不可抓之輕以手拍三兩日效治四肢骨破及筋傷蹉跌及踠折出本草以水二升䜴三升漬之攪取汁飲之及止心悶治腕折骨痛不可忍出本草用火麻根及葉搗取汁三升飲之非時即煮乾麻汁服亦同主撾打瘀血心腹滿氣短皆効麻根即今人績布麻種子也療骨出本草取虎頭為末水服方寸匕治筋骨疼痛出本草用馬接脚皮并續筋金稜藤三味洗淨去麄皮焙乾等分搗羅為末温酒調服二錢匕續筋即葍旋根也普濟方卷三百九
