水二盞煎至一盞去滓温服日三不過二劑薔薇根散治口瘡經年歇發飲食艱難薔薇根剉蜀椒去目并閉口炒出汗四十九粒右為散以漿水二盞煎五七沸去滓熱含冷吐滑石散治口瘡滑石膽礬各一兩右研為末每用一錢七以綿裹含吐津生姜煎治口瘡疼痛生姜取汁一盞白沙蜜三兩右同煎十餘沸因瓷器盛時熟水調一匙頭含嚥之麝香散出聖惠方治口瘡吻瘡久不瘥麝香少許人中白一錢右研細蜜丸綿裹如菉豆大含之嚥津一方研勻塗瘡上一方有膩粉無麝香二物散治口瘡白姜蠶黄連各等分右為末臨卧掺口内赴筵散治口瘡五倍子蜜陀僧各等分右為細末先入漿水潄過乾貼一方用陀僧醋調灌潄不可嚥牛蒡子散出聖惠方治口瘡久不瘥牛蒡子一兩微炒甘草一兩炙㣲赤剉右為散每服三錢水一中盞煎至六分去滓稍熱細細含嚥含化雌黄丸出聖惠方治口瘡炙痰涎久不瘥雌黄一分細研蟾酥半分右相和以瓷器盛於飯甑内蒸一炊熟久候冷看得所丸如粟米大綿裹一丸含嚥津蟾酥丸出聖惠方治口瘡久不瘥蟾酥半分麝香半分右研為丸如粟米大用綿裹一丸含之有涎即吐秦芄散治虗勞口瘡久不瘥秦艽去苗土柴胡去苗各一兩右為末每服三錢割猪肝三兩片用酒煮之去肝取酒調藥温十服當愈胡粉散出聖惠方治口疳瘡神秘含胡粉一兩牛黄一兩右相和安銚子中於暖灰上研令勻少少含之瘥山李子煎丸出聖惠方治口中疳神秘含之山李子根一名牛李子薔薇根野外者良右細剉五升以五斗煎半日已來汁於銀器中盛重湯煮如無銀器銅器亦得看稀稠得所即於瓷器内盛每取少許含嚥之以瘥為度醤醋油熱麵大約不宜食内如患發背重湯煎令極稠和如膏以帛塗之瘡上神效昔襄州軍事栁岸妻竇氏患口疳十五年齒盡落齗亦斷懐不可近用此方遂瘥治口瘡時方口瘡刺發呌聲連銅碌麝香一處研乾捻将來頻擦上不過二貼便安然秘𫝊降氣湯治虚熱上壅口瘡出危氏方右用生姜蘇葉煎食前吞黒錫丹每服二十粒胡粉膏治口瘡右用胡粉一兩炒研酥調如膏每含如杏仁大嚥津神聖膏危氏方一名茱萸膏治下冷口瘡及咽痛右吳茱萸去浮者一兩為細末酸醋一大盞調熬成膏後入地龍末半兩桑枝攪勻臨卧時先用葱椒湯洗足拭乾用藥厚塗兩脚厎心以帛子繋定次日必减未减再塗初生小兒亦可用一方用天南星末醋調塗脚心男左女右蟾酥線治口瘡海上方云治上下㬽生瘡不可食者右用蟾酥二片以水半盞浸化為水更入牛黄末一錢攪勻以絲線五十條就藥中浸一宿隂乾每取一條含吐津海上方云以紅線取蟾酥隂乾寸剪口中噙少時惡涎出即愈豆豉散出聖惠方治口瘡唇瘡及舌生瘡胸膈疼右用豆䜴四兩炒搗羅為末每用綿裹一錢含之日五七次一方浸一宿炒研塗之乾蟾散治口瘡右用乾蟾酥炙一枚搗研為末綿裹半錢含吐津馬牙硝散治口瘡右用馬牙硝一兩為末每含一錢嚥津日三五度一方樸硝㯽榔散出肘後方治口瘡白瘡右用㯽榔剉為散每服半錢塗舌及唇上蒲黄散出海上方治口瘡用蒲黄一両每用一錢傅口舌上嚥之一方為末乾摻之楸木汁方治口瘡右用楸木白汁五合每服一匙頭含嚥一方用濕皮貼之瘥薺苨煎治口瘡右用薺苨三十枚以薄綿裹酒煮二十沸許出取每含一枚良久嚼嚥之日三五度升麻含汁方治口瘡右用升麻不拘多少含一塊嚥津蘘荷根湯治口瘡右用蘘荷根二兩細剉分為三分每分水二盞煎三五沸去滓熱含冷吐鉛霜散出聖惠方治大人小兒卒患口瘡右用鉛白霜研細不拘炙炒取少許傅痛處一兩度即瘥治口中瘡久不瘥入腦中並生瘡右用角蒿灰傅之一宿知二宿瘥有汁塗之不得嚥也治口瘡牙痛右用華隂細辛根辣者為末𫝊之獨勝散出簡昜方治口瘡右用宿砂仁不拘多少火煆為末掺即愈一方用殻治久患口瘡右用蜀椒閉口者以水洗之以麫拌煮作粥空心服之三五匙飯壓之再服瘥治滿口生瘡疼痛不止出海上方右用透眀鴨嘴黒膽礬碾極細每一字乾掺瘡上有涎勿嚥就涎灌潄口内吐之再用温塩水盥潄口凈一方用銀銚子内煆通赤地上出毒一夜細研每取少許𫝊瘡上吐漿水清涎甚者一兩上便瘥一方以膽礬一塊用白沸湯泡開口中含潄一夕可瘥治口内熱瘡右用古文錢二十文燒令赤投酒中服之立瘥治久患口瘡出肘後方右用生附子為末醋麫調男左女右貼脚心日再換一方用姜汁調治口瘡右用生半夏為細末醋調貼脚心中大有神效治口肥瘡出千金方右用熬竈上飯令焦末傅之治口内生肉毬臭惡自己惡見有根綿長三五寸餘如釵股吐毬出以飯食了却吞其綿以手輕揑痛徹於心困不可言出經騐良方右用水調麝香一錢三日驗熝糟落口右用青桑葉擂細水調潄之松葉亦可治口瘡及嚥吻瘡出肘後方右用白楊梅漿水煎和塩含之一方取嫩枝鐡上燒取汁塗一作枮枝治口鼻生瘡出本事方右用好生姜一塊臨睡時細嚼含睡不得開口出氣眠着不妨睡覺嚥下治口中靣上瘜肉轉大出千金方右以刀决潰去濃血即愈半夏散出得命集方治少隂口瘡若聲絶不出者是風寒遏絶陽氣不伸也半夏一兩製桂心一字草烏頭一字右同煎一盞水分作二服其效如神乳香散出保命集方治赤口瘡乳香没藥各一錢白礬飛半錢銅緑為細末掺用口瘡赤爛方出仁齊直指方用青蜜浸黄栢一宿取汁含嚥治大人小兒口瘡出𫝊信用方用杏仁去皮尖爛研入輕粉成膏口中嚼閉口少時灌潄用冷水潄吐出取下爛肉便安勿嚥下没藥散出保命集方治白口瘡没藥乳香雄黄各一錢輕粉半錢巴豆霜少許右細末乾掺治一切丈夫久患口瘡不效宜服此方孕婦不可服别有方見下出䕶命方荆芥穗羗活獨活防風半夏芍藥當歸大黄連翹木香殭蠶去絲牡丹皮去心麻黄去根山梔子各一分牽牛二兩右細杵羅為末滴熟水丸如梧桐子大食後臨卧熟湯下三十丸不轉加至四十丸至五十丸以轉為度既轉後平常只可喫二十丸以利脑膈也平常喫减大黄一味此藥治一切風熱候神驗不可具説服此藥後仍喫後靣藥滿瘡口生肌方木香沉香麥門冬去心貝母各一分甘草各四銖右為細末每服二錢食後以水一小盞煎一沸和滓喫紫金膏出䕶命方治口瘡連年累月不效痰涎滿口飲食不快宜用此方立便見效乳糖四兩膽礬八銖研碎右以水一碗半煉乳糖膽礬二味成汁取一碗已來傾出放冷以新垍器收之以筋挑兩三滴着在痛處瘡口内停待片時吐出熱涎立便安效紅芍藥散出衛生寳鑑方心病口瘡紫桔紅蒼三錢四兩五服安康右件紫蘓桔梗紅芍藥蒼术各等為細末羊肝四兩批開掺末三錢用麻纒定火内燒令熟空心食之大效白湯送下赴筵散出宣明論治口瘡不已者蜜陀僧黄栢青黛各等分右同研為細末每用乾掺於瘡上不過三二日即便愈治口瘡出肘後方薔薇根避風打却上土剉煮濃汁温含冷昜煎亦得嚥亦不妨速效散出大術方治男子婦人小兒口瘡吴茱萸赤芍藥右等分為粗細末每於臨卧先用粗末二大匙沸湯泡淋洗腿脚拭乾以細末二錢米醋調勻攤兩脚心用軟紙貼定再以帛子繋之抸明再易則愈治口瘡出海上方訶子黄栢燒存性入輕粉麝香掺之嚥亦不妨一方出鮑氏方治口瘡目赤鼻衂黄栢皮黄連大黄末爲末貼足心睡五更口苦效用水調貼一方出鮑氏方治輔車開不可飲冷大醉睡中㗜鼻􅀈則自正用南星末生薑汁調𫝊帛縳合一宿愈去風也蜜蘖法出東垣蘭屋方治口瘡久不愈者黄蘖不計多少真者蜜塗其上炙黄色右件極為細末乾掺上臨卧忌醋醤塩治口瘡出如宜方五倍子黄栢為末傅之黄連胡椒等分為末掺之舌上腫硬宜百草霜塩等分井花水調𫝊腫硬出血海螵消蒲黄等分為末𫝊清脾湯出如宜方治口瘡黄茋白芷升麻人參甘草炙半夏製各等分右㕮咀每服姜五片棗二枚煎食後服一方入小麥一十粒煎治口瘡立效出危氏方用生薑自然汁潄口數次涎出而效貼足方出危氏方右以茱萸為末水調𫝊足心效最宜治小兒口瘡昔服藥者一貼而愈治口内熱瘡出本草以青錢含之治口瘡出本草以蠶退紙不計多少燒成灰乾𫝊瘡上治口瘡出本草取蠐螬截頭筋翻翻過拭瘡效治口瘡出本草取樸硝含之治口瘡及口齒一切疾用五倍子為末掺之所患處有涎即吐出便可飲食治口中有瘡出本草以黄栢皮醋清含之即愈治口瘡出本草以蜜浸大青葉含之治口瘡出本草以溜師蜜含之治急疳口鼻生瘡者有用没石子為末吹下部即瘥治口瘡久不瘥者亂頭髪㣲露蜂房蛇蜕皮右三味各燒灰略存性為末每服三錢温酒調治中靣上瘜肉轉大麻骨一條燒烟吸入喉中即去治口中瘡右用乾薑炮為末水調臨卧塗手脚心来日即安法神驗法出東垣蘭屋方治口瘡無問久新夜間将二丸以歴𦂳左右交手揉三五十次但遇睡覺行之如此三五度因濕而生者一夜愈久病諸般口瘡三二夜愈加鼻流清涕者歴之二丸揉之数夜可愈内經云膀胱移熱於小腹膈腸不便上口為麋昜老五苓散與導赤散相合而飲之普濟方卷二百九十九
