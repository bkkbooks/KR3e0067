水二盞煎至一盞去滓溫服日三不過二劑薔薇根散治口瘡經年歇發飲食艱難薔薇根銼蜀椒去目并閉口炒出汗四十九粒右為散以漿水二盞煎五七沸去滓熱含冷吐滑石散治口瘡滑石膽礬各一兩右研為末每用一錢七以綿裹含吐津生薑煎治口瘡疼痛生薑取汁一盞白沙蜜三兩右同煎十餘沸因瓷器盛時熟水調一匙頭含咽之麝香散出聖惠方治口瘡吻瘡久不瘥麝香少許人中白一錢右研細蜜丸綿裹如菉豆大含之咽津一方研勻塗瘡上一方有膩粉無麝香二物散治口瘡白薑蠶黃連各等分右為末臨卧摻口內赴筵散治口瘡五倍子蜜陀僧各等分右為細末先入漿水潄過乾貼一方用陀僧醋調灌潄不可咽牛蒡子散出聖惠方治口瘡久不瘥牛蒡子一兩微炒甘草一兩炙微赤銼右為散每服三錢水一中盞煎至六分去滓稍熱細細含咽含化雌黃丸出聖惠方治口瘡炙痰涎久不瘥雌黃一分細研蟾酥半分右相和以瓷器盛於飯甑內蒸一炊熟久候冷看得所丸如粟米大綿裹一丸含咽津蟾酥丸出聖惠方治口瘡久不瘥蟾酥半分麝香半分右研為丸如粟米大用綿裹一丸含之有涎即吐秦芄散治虗勞口瘡久不瘥秦艽去苗土柴胡去苗各一兩右為末每服三錢割豬肝三兩片用酒煮之去肝取酒調藥溫十服當愈胡粉散出聖惠方治口疳瘡神祕含胡粉一兩牛黃一兩右相和安銚子中於暖灰上研令勻少少含之瘥山李子煎丸出聖惠方治口中疳神祕含之山李子根一名牛李子薔薇根野外者良右細銼五升以五斗煎半日已來汁於銀器中盛重湯煮如無銀器銅器亦得看稀稠得所即於瓷器內盛每取少許含咽之以瘥為度醬醋油熱麵大約不宜食內如患發背重湯煎令極稠和如膏以帛塗之瘡上神效昔襄州軍事栁岸妻竇氏患口疳十五年齒盡落齗亦斷懷不可近用此方遂瘥治口瘡時方口瘡刺發呌聲連銅碌麝香一處研乾捻將來頻擦上不過二貼便安然祕傳降氣湯治虛熱上壅口瘡出危氏方右用生薑蘇葉煎食前吞黑錫丹每服二十粒胡粉膏治口瘡右用胡粉一兩炒研酥調如膏每含如杏仁大咽津神聖膏危氏方一名茱萸膏治下冷口瘡及咽痛右吳茱萸去浮者一兩為細末酸醋一大盞調熬成膏後入地龍末半兩桑枝攪勻臨卧時先用蔥椒湯洗足拭乾用藥厚塗兩腳砥心以帛子繫定次日必減未減再塗初生小兒亦可用一方用天南星末醋調塗腳心男左女右蟾酥線治口瘡海上方云治上下㬽生瘡不可食者右用蟾酥二片以水半盞浸化為水更入牛黃末一錢攪勻以絲線五十條就藥中浸一宿隂乾每取一條含吐津海上方云以紅線取蟾酥隂乾寸剪口中噙少時惡涎出即愈豆豉散出聖惠方治口瘡唇瘡及舌生瘡胸膈疼右用豆䜴四兩炒搗羅為末每用綿裹一錢含之日五七次一方浸一宿炒研塗之乾蟾散治口瘡右用乾蟾酥炙一枚搗研為末綿裹半錢含吐津馬牙硝散治口瘡右用馬牙硝一兩為末每含一錢咽津日三五度一方朴硝檳榔散出肘後方治口瘡白瘡右用檳榔銼為散每服半錢塗舌及唇上蒲黃散出海上方治口瘡用蒲黃一兩每用一錢傅口舌上咽之一方為末乾摻之楸木汁方治口瘡右用楸木白汁五合每服一匙頭含咽一方用濕皮貼之瘥薺苨煎治口瘡右用薺苨三十枚以薄綿裹酒煮二十沸許出取每含一枚良久嚼咽之日三五度升麻含汁方治口瘡右用升麻不拘多少含一塊咽津蘘荷根湯治口瘡右用蘘荷根二兩細銼分為三分每分水二盞煎三五沸去滓熱含冷吐鉛霜散出聖惠方治大人小兒卒患口瘡右用鉛白霜研細不拘炙炒取少許傅痛處一兩度即瘥治口中瘡久不瘥入腦中並生瘡右用角蒿灰傅之一宿知二宿瘥有汁塗之不得咽也治口瘡牙痛右用華隂細辛根辣者為末傳之獨勝散出簡昜方治口瘡右用宿砂仁不拘多少火煆為末摻即愈一方用殼治久患口瘡右用蜀椒閉口者以水洗之以麵拌煮作粥空心服之三五匙飯壓之再服瘥治滿口生瘡疼痛不止出海上方右用透眀鴨嘴黑膽礬碾極細每一字乾摻瘡上有涎勿咽就涎灌潄口內吐之再用溫鹽水盥潄口淨一方用銀銚子內煆通赤地上出毒一夜細研每取少許傳瘡上吐漿水清涎甚者一兩上便瘥一方以膽礬一塊用白沸湯泡開口中含潄一夕可瘥治口內熱瘡右用古文錢二十文燒令赤投酒中服之立瘥治久患口瘡出肘後方右用生附子為末醋麵調男左女右貼腳心日再換一方用薑汁調治口瘡右用生半夏為細末醋調貼腳心中大有神效治口肥瘡出千金方右用熬竈上飯令焦末傅之治口內生肉毬臭惡自己惡見有根綿長三五寸餘如叉股吐毬出以飯食了却吞其綿以手輕揑痛徹於心困不可言出經驗良方右用水調麝香一錢三日驗熝糟落口右用青桑葉擂細水調潄之松葉亦可治口瘡及咽吻瘡出肘後方右用白楊梅漿水煎和鹽含之一方取嫩枝鐡上燒取汁塗一作枮枝治口鼻生瘡出本事方右用好生薑一塊臨睡時細嚼含睡不得開口出氣眠著不妨睡覺咽下治口中靣上瘜肉轉大出千金方右以刀決潰去濃血即愈半夏散出得命集方治少隂口瘡若聲絶不出者是風寒遏絶陽氣不伸也半夏一兩製桂心一字草烏頭一字右同煎一盞水分作二服其效如神乳香散出保命集方治赤口瘡乳香沒藥各一錢白礬飛半錢銅緑為細末摻用口瘡赤爛方出仁齊直指方用青蜜浸黃柏一宿取汁含咽治大人小兒口瘡出傳信用方用杏仁去皮尖爛研入輕粉成膏口中嚼閉口少時灌潄用冷水潄吐出取下爛肉便安勿咽下沒藥散出保命集方治白口瘡沒藥乳香雄黃各一錢輕粉半錢巴豆霜少許右細末乾摻治一切丈夫久患口瘡不效宜服此方孕婦不可服别有方見下出護命方荆芥穗羌活獨活防風半夏芍藥當歸大黃連翹木香殭蠶去絲牡丹皮去心麻黃去根山梔子各一分牽牛二兩右細杵羅為末滴熟水丸如梧桐子大食後臨卧熟湯下三十丸不轉加至四十丸至五十丸以轉為度既轉後平常只可喫二十丸以利腦膈也平常喫減大黃一味此藥治一切風熱候神驗不可具説服此藥後仍喫後靣藥滿瘡口生肌方木香沉香麥門冬去心貝母各一分甘草各四銖右為細末每服二錢食後以水一小盞煎一沸和滓喫紫金膏出護命方治口瘡連年纍月不效痰涎滿口飲食不快宜用此方立便見效乳糖四兩膽礬八銖研碎右以水一碗半煉乳糖膽礬二味成汁取一碗已來傾出放冷以新垍器收之以筋挑兩三滴著在痛處瘡口內停待片時吐出熱涎立便安效紅芍藥散出衛生寶鑑方心病口瘡紫桔紅蒼三錢四兩五服安康右件紫蘇桔梗紅芍藥蒼术各等為細末羊肝四兩批開摻末三錢用麻纒定火內燒令熟空心食之大效白湯送下赴筵散出宣明論治口瘡不已者蜜陀僧黃柏青黛各等分右同研為細末每用乾摻於瘡上不過三二日即便愈治口瘡出肘後方薔薇根避風打却上土銼煮濃汁溫含冷昜煎亦得咽亦不妨速效散出大術方治男子婦人小兒口瘡吳茱萸赤芍藥右等分為粗細末每於臨卧先用粗末二大匙沸湯泡淋洗腿腳拭乾以細末二錢米醋調勻攤兩腳心用軟紙貼定再以帛子繫之抸明再易則愈治口瘡出海上方訶子黃柏燒存性入輕粉麝香摻之咽亦不妨一方出鮑氏方治口瘡目赤鼻衄黃柏皮黃連大黃末為末貼足心睡五更口苦效用水調貼一方出鮑氏方治輔車開不可飲冷大醉睡中嗅鼻􅀈則自正用南星末生薑汁調傳帛縳合一宿愈去風也蜜蘖法出東垣蘭屋方治口瘡久不愈者黃蘖不計多少真者蜜塗其上炙黃色右件極為細末乾摻上臨卧忌醋醬鹽治口瘡出如宜方五倍子黃柏為末傅之黃連胡椒等分為末摻之舌上腫硬宜百草霜鹽等分井花水調傳腫硬出血海螵消蒲黃等分為末傳清脾湯出如宜方治口瘡黃茋白芷升麻人參甘草炙半夏製各等分右㕮咀每服薑五片棗二枚煎食後服一方入小麥一十粒煎治口瘡立效出危氏方用生薑自然汁潄口數次涎出而效貼足方出危氏方右以茱萸為末水調傳足心效最宜治小兒口瘡昔服藥者一貼而愈治口內熱瘡出本草以青錢含之治口瘡出本草以蠶退紙不計多少燒成灰乾傳瘡上治口瘡出本草取蠐螬截頭筋翻翻過拭瘡效治口瘡出本草取朴硝含之治口瘡及口齒一切疾用五倍子為末摻之所患處有涎即吐出便可飲食治口中有瘡出本草以黃柏皮醋清含之即愈治口瘡出本草以蜜浸大青葉含之治口瘡出本草以溜師蜜含之治急疳口鼻生瘡者有用沒石子為末吹下部即瘥治口瘡久不瘥者亂頭髮微露蜂房蛇蛻皮右三味各燒灰略存性為末每服三錢溫酒調治中靣上瘜肉轉大麻骨一條燒煙吸入喉中即去治口中瘡右用乾薑炮為末水調臨卧塗手腳心來日即安法神驗法出東垣蘭屋方治口瘡無問久新夜間將二丸以歷緊左右交手揉三五十次但遇睡覺行之如此三五度因濕而生者一夜愈久病諸般口瘡三二夜愈加鼻流清涕者歷之二丸揉之數夜可愈內經云膀胱移熱於小腹膈腸不便上口為麋昜老五苓散與導赤散相合而飲之普濟方卷二百九十九
