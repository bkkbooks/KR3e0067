body:
  text: 普濟方卷二百九十九明周王朱橚撰上部瘡門頭瘡附論夫諸陽之脈皆上於頭頭為陽陽為表陽盛則表熱若人體虛腠理開泄為風邪所客風之與熱摶於氣血則澀留於皮膚故令頭生瘡也方黃連檳榔散治秃頭瘡黃連為末用麻油輕粉調得所攤於艾中作一團燒煙碗覆其上薰之續再加艾薰用細辛蒺藜炒去刺麻黃去節雞心檳榔當歸鬚先乾地黃川芎赤芍藥川獨活牽牛微炒取末蒼朮炒桑白皮炒枳殼製甘草微炙等分右銼散每服三錢入黑豆七十粒紫蘇五葉薑五片同煎服如大便祕加些生地黃次用貝母膏傅瘡松脂膏出聖惠方治頭瘡經年月久不瘥松脂三分黃連三分去鬚川大黃半兩水銀一兩半黃芩一兩苦參一兩銼蛇床子一分白礬半兩洗令汁浸胡粉半兩合水銀入少水同研令星盡右為末用臘月凍了豬脂調令稀稠得所每日傅瘡上大效貝母膏出仁齋直指方治禿頭瘡貝母三錢半半夏生南星五倍子白芷厚黃柏苦參各二錢半雄黃一錢䝞丹煆一錢半右為細末初用蜜水調傳兩三次後只乾摻先以蜂房白芷苦參大復皮荆芥煎湯薰洗拭乾即用藥或有留滯不瘥以好膏藥貼皂連散出仁齋直指方治頭瘡滿尺皂角去弦核一錢黃連淨半兩赤色白膠香三錢五倍子三錢蛇床子一錢黃丹煆二錢輕粉半錢右細末先用柳枚煎湯洗後摻用黃連半兩蛇床子一分晒乾為末麻油輕粉調傅雌黃膏出聖惠方治頭上生瘡及一切惡瘡諸藥治不瘥者宜服雌黃一兩黃連一兩半去鬚苦參一兩礬石半兩細研䕡茹一兩芥草半兩硃砂一兩細研右先細銼四味以臘月豬脂一斤慢火同煎三上下去滓下研了藥不住手攪令成膏入瓷合中盛每用少許塗於瘡上雞黃散治頭瘡不問逺年日近水龍亮搗細黃丹白礬三味等分一處燒過炭牛皮另燒雞子清元藥一處燒硫黃生用右為酸虀汁燒熱洗去瘡靨盡了香油調傳之加味平胃散出百一選方治一切惡瘡頭上瘡右平胃散入膩粉清油調傳之甚妙油漆膏治頭瘡黃柏川黃各二錢輕粉一貼明礬一錢飛漆滓二錢半右香油半碗共浸漆滓二宿後入三味通浸五宿却入輕粉搽頭瘡脂粉膏治頭中惡瘡胡粉水銀白松脂各二兩臘豬脂四兩右將豬脂合松脂煎却以水銀胡粉合研塗上又漆小兒頭靣瘡一方加黃連二兩更禿瘡膩粉膏出聖惠方治頭瘡年月不瘥杏仁二兩湯浸去皮尖炒令黃黑色豉二兩微炒膩粉一分硫黃半兩細研右先搗杏仁豉如泥即入膩粉硫黃同研令勻先以蔥鹽湯後以生油調塗之麻油膏出仁齋直指方治頭痺頭腦頭枕後生正者為腦側者為痺輕浮白浮石燒存性為末右麻油輕粉調雞羽刷上勿用手按即漲或用黃牛糞於瓦上焙乾加之尤好亦治頭􅗢䕡茹膏出聖惠方治頭瘡經年月不瘥黃連四兩去鬚右為末以烏麻油調如膏若小兒先以泔清洗之大人即以泔清皂莢洗之然後塗藥不過三上即瘥螵蛸散出瑞竹堂方治頭上生瘡俗曰􅀈瘡絶妙方海螵蛸一錢白膠香輕粉各半錢右將海螵蛸白膠香羅入輕粉再研細敷貼先用清油潤瘡摻摻藥只一上可二上麝香散出十便良方治頭生惡瘡生牛皮燒灰半兩燕窠土燒赤半兩麝香半錢右都細研令勻以生油調日二三度塗之笋粉散出肘後方治頭上瘡右大笋殼燒灰存性加輕粉生油調傅之露蜂散出聖惠方治頭瘡及諸般瘡露蜂房白狗糞各半兩右並燒為灰細研以蜜和塗之立瘥苦練散治頭瘡苦練子十四枚杏仁右都燒令煙盡搗為末入膩粉半錢更研令以生油調塗三五上瘥熊膽膏出聖惠方治熱毒上攻發赤根白頭瘡於頂上宜用此方龍膽一分去蘆頭為末熊膽一分研細右同研令勻以生油調日可兩三度塗之治頭爛瘡出仁齋直指方右用燕窠取抱子處土搗末摻先白芷大腹皮煎湯洗拭後摻治頭瘡出海上名方右用杏仁燒灰傅之治人頭靣患􅊓瘡右用蛇蛻皮熱以磨之數百度令熱乃棄又方不蚛皂莢燒灰右用為末以生油調塗之又方鯷魚鱗炙令黃焦右為末每用時先以水洗瘡又方使君子燒令焦右為末以生油調塗之又方出十便良方䜴一升右以米醋二升浸三宿以布絞取汁於鐺內慢火熬成膏洗瘡挹衣乾去痂塗之白禿瘑並宜用之治頭極癢不痛生瘡方出十便良方鵓鴿糞五合右以好醋和稀膏煮三兩沸日二三上塗之治頭瘡乍發乍瘥赤蚚疼痛方竹葉一片燒灰右為末雞子白和勻日三四上塗之治頭瘡經久不瘥方出十便良方梁上塵一兩細研右用時先以皂莢湯洗瘡拭令乾以生油調塗之又方蝦蟆頭燒灰三枚右為末用生油調塗之又方右用牛角尖燒灰為末以生油調塗之治頭瘡雞肫黃炒取油和粉傳之鳥龍膏出余居士選竒方不蛀皂角一挺燒灰存性為末杏仁八枚濕紙黃丹五文纍炒右為細末輕粉拌勻用麻油調傅治頭瘡及諸熱瘡用醋少許和水淨洗去痂再溫水洗挹衣百草霜總研入膩粉少許生油調塗立愈羚羊角飲子出王氏傳方治丈夫婦人風毒攻衝頭靣生瘡虛腫等羚羊角犀角羌活檳榔人參各一分當歸一分右已上藥銼碎略焙杵細分作四貼每用水一升煎至四合分作兩服空心臨卧分服其每貼兩服滓更用水半升煎至七分又作一服喫之溫服苦參丸治肺毒邪熱頭靣生瘡生疥癬並宜服之苦參右一味為細末粟米飯為丸如桐子大每服五十丸空心溫米湯送下又頭瘡方出仁齋直指方黃連為末用麻油輕粉調得所攤於碗中將艾一撮燒煙碗覆其上薰之續再加艾薰用又方出仁齋直指方穿山甲􅑕粉同炒右用麻油輕粉調傅癩頭瘡出危氏方先用本人小便燒稱錘令紅投於小便中方與洗瘡皮皆去然後以帛拭乾用歷青五文細研用油魚三箇以盞燒成油調滴青塗之三日效決效散治風癢頭瘡管仲三兩白芷一兩右為細末油調塗之治頭瘡出海上名方乾地黃為細末入輕粉麻油調傳之治頭瘡出本草以大筍殼葉燒為灰量瘡大小用灰調生油傅入少膩粉佳治頭耳瘡出本草以白馬頭骨燒傳傅之治頭上一切惡瘡及禿瘡諸藥不瘥者用鯽魚一頭長五寸留鱗開去腸胃入頭髮令滿即以濕紙數重裹之燒為灰入雄黃一分同研令細用臘月錬了豬脂和更研令勻先以泔清洗瘡拭乾塗之日三兩上自瘥用麻油調亦得口舌瘡附論口為脾之門舌為心之官嘗五味布五藏心之别脈係於舌根脾之絡脈係於舌兩傍而終於舌本三經為四氣所中舌痺卷不言七情所鬱則舌腫不能語至如心熱則舌破生瘡肝壅則出血如湧閉則白胎如雪此舌之為病也口則又稍不然蓋熱則口苦寒則口醎虛則口淡脾冷則口甜宿食則酸煩燥則澀乃口之津液通乎五藏藏氣偏勝則味應乎口或勞鬱則口臭凝滯則生瘡生瘡者夜不可失睡晝不可就寢違此必甚唇乃全屬於脾唇有病則多宜隨證以治胎脾也齒乃骨之餘腎主營飬呼吸之户也故腎衰則齒豁精盛則齒堅又手陽明大腸脈入於牙齒灌於大腸壅則齒亦浮腫虛則宣露挾風則上攻靣目疳匿蚛則􅀈禹切蟲也為脫為痔皆當隨證治之喉者候也咽者咽也咽接三管以通胃故以之咽物喉通五藏以係肺故以之候氣氣喉穀喉皎然眀白人諸藏熱則腫寒則縮皆使喉閉風燥亦然五藏久咳則聲嘶聲嘶者喉破也非咽門病若咽腫則不能吞乾則不能咽多咽飲啖辛熱或復嘔吐咯傷咽係乾枯之所致也自與喉病不同又有懸癰暴腫閉塞喉嚨亦如喉閉但懸癰在上㬽及關下俗謂之鶯翁又謂之蛾聚俗語聲訛須以後一十八種證辨之方茯神丸治積年口舌瘡諸方不瘥茯神一兩白术一兩旋覆半兩􅒦砂蜜去皮三分大黃煨銼半兩芍藥半兩桂去粗皮三分郁李仁湯浸去皮一兩人參半兩大麻仁别研二兩枳殼去三麩炒分訶梨勒去核一兩厚朴去粗皮銼薑汁炙一兩白檳榔銼三分白鮮皮銼半兩陳橘皮湯浸去白焙一兩地骨白皮銼半兩右為末煉蜜和丸如梧桐子大每服二十丸空心粥飲下加至三十丸蘆薈散治口舌生瘡蘆薈半兩丹砂研一分丁香一分麝香半分牛黃研半分蟾酥半兩角蒿灰研半兩瓜蒂二十枚羊蹄花半兩乾蝸牛研三枚熊膽研一錢細辛去苖葉一分馬牙硝研三分白礬灰研半分右為散先以頭髮裹指於溫水內蘸揩之軟帛裛却膿水取少許藥末摻瘡上或輕可即去蟾酥蘆薈有病大小以意加減用之玄參散出聖惠方治口舌生瘡連齒齗爛玄參三分川升麻三分獨活三分麥門冬三分去心黃芩三分黃柏三分川大黃三分銼碎微炒梔子仁三分前胡三分去蘆頭犀角屑三分甘草三分炙微赤銼右為散每五錢以水一大盞煎至五分去滓不計時候溫服之犀角湯出御藥院方治口舌生瘡犀角屑三分羚羊角屑三分丹砂研三分黃耆銼半兩大黃銼一分升麻半兩生乾地黃焙一兩射干一分玄參三分天門冬生者去心焙一兩甘草炙銼一兩右粗搗篩每服三錢水一盞煎至六分去滓食後溫服桂心散出千金方治心脾胃中客熱口舌乾焦生瘡桂去粗皮半兩赤茯苓去黑皮三分黃連去鬚梔子仁杏仁去皮尖雙仁研各半兩黃芩去黑心甘草炙銼大黃銼炒各三分苽蔞根半兩薔薇根切三分右為散食後以溫漿水調下二錢日三服一方有枳實無梔子蘆薈散出聖惠方治口舌上瘡久不瘥蘆薈二分土益緑三分胡粉三分真珠末半兩波斯鹽緑半兩蝸牛殼半兩炒令黃色青黛半兩黃連半兩去鬚麝香一指細研右為細散都研令勻先用甘草湯嗽口洗瘡以帛裛乾然後摻藥於上或以蜜和丸如雞頭實大含之亦得有涎吐之麝香散出御藥院方治斷頰口舌生瘡麝香一分浮香半錢定粉一錢半檳榔生銼一枚蜜陀僧半兩白龍骨一錢半鳥曽骨去皮微炙黃一錢半寒水石燒赤三錢半黃丹慢火微炒一錢右為細末每用少許乾上瘡處有津即吐咽無妨不計時候日三五次上麝香丸出聖惠方治口舌瘡亦爛宜含化麝香一分細研杏仁三分湯浸去皮尖雙仁川升麻三分黃芩三分浮萍草三分零陵香三分甘草三分生用寒水石三分黃連三分去鬚右為末煉蜜和丸如彈子大每每取一丸綿裹含化咽津升麻泄熱散出聖惠方治心脾藏熱應口舌生瘡破裂唇蹇赤色川升麻一兩射干一兩半黃柏一兩半銼大青一兩甘草一兩炙微赤銼玄參二兩黃芩犀角屑三分黃連一兩去鬚右為散每服四錢水一中盞入苦竹葉三七片煎至五分去滓入地黃汁一合攪令勻食後溫服升麻散出仁齋直指方治心脾有熱口舌破裂生瘡升麻玄參川芎生地黃洗晒麥門冬各半兩大黃黃連淨黃芩甘草焙各三錢右銼碎每服三錢薑棗煎食後服瀉黃飲子出濟生方治風熱藴於脾經唇燥折裂口舌生瘡白芷升麻枳殼黃芩防風半夏石斛各一兩甘草半兩右㕮咀每服四錢水一中盞薑五片煎八分去滓溫服不拘時候五參丸治口乾舌上生瘡玄參沙參丹參苦參人參秦芄去苗土各一兩乾薑炮半兩酸棗一兩右為末蜜丸如梧桐大每服二十丸加至三十丸米飲下不拘時升麻湯治口舌生瘡升麻一兩大青去根二分射干三分黃柏去粗皮一兩玄參三兩山梔子仁半兩薔薇根銼三兩右粗搗篩每服五錢水二盞入竹葉七片煎至一盞去滓入蜜少許地汁一合更煎三五沸徐徐含咽麝香散治口舌生瘡麝香研一分乾蝦蟆燒灰研一兩黃柏去粗皮炙銼一兩甘草炙銼三分母丁香一分甜瓜蒂一分石膽研一兩右為散臨卧以一錢摻舌上有涎吐出硼砂丸出仁齋直指方治口臭口乾口舌瘡寒水石燒紅十兩硼砂二兩腦射各一錢馬牙硝枯四兩甘草浸汁熬膏二兩右為細末甘草膏搜丸麻子大含化咽升麻散出聖惠方治口舌生瘡連頰腫痛川升麻半兩芎藭一分防風半兩去蘆雞腸草三分大青一分甘草半兩炙微赤銼右為散每用半錢於瘡上貼一可三五度瘥先於瘡腫處針出惡血用鹽湯煠後貼藥神效升麻散出和濟方治上膈壅毒口舌生瘡咽喉腫痛升麻赤芍人參洗桔梗去蘆乾葛各一兩甘草右銼散每服四錢水一盞半生薑五片煎溫服不拘時候一方加薄荷黃芩效永類鈐方云有黃連大黃玄參麥門冬萍草丸出仁齋直指方治舌瘡腫浮萍草黃柏並末杏仁青黛等分輕粉右為末煉蜜丸如皂子大以綿裹含有涎吐之防風散治口舌生瘡防風去稍一兩龍膽一兩生地黃切焙二兩沉香銼半兩升麻半兩右為散每用二錢入鹽少許沸湯調勻指齒含咽便睡青黛散出聖惠方治口舌生瘡青黛一錢細辛一分黃柏一分銼地骨皮一分蜜陀僧一分右細羅為散每取少許貼於瘡上有涎即吐之晚蠶蛾散治口舌生瘡齒動半枚燒灰研晚蠶蛾末二錢乾蟾益母草半兩人中白半錢皂礬半錢右細研為散先以綿纒手指以溫漿水洗去白皮摻藥於瘡上日三五次碧雪出危氏方治一切壅熱咽喉腫閉不能咽物口舌生瘡舌根緊言語不正腮項腫痛見咽喉喉痺類緑雪散出楊氏家藏方治舌上生瘡銅青松白霜右件等分為細末每用少許乾摻舌上柳花散出御藥院方治口舌生瘡玄胡索一兩黃柏去粗皮黃連各半兩蜜陀僧别研三錢青黛三錢别研右為細末每用傳瘡上有津即吐之卧用陀僧散治口舌瘡不瘥蒲黃黃藥子各半兩蜜陀僧黃柏甘草各一兩炙右為細末乾貼口瘡上浮萍煎膏出聖惠方治口生瘡久不瘥浮萍草一兩川升麻一兩黃柏一兩甘草一兩半生用右細銼和勻以豬脂一斤同於銀鍋中以文火煎至半斤濾去滓成膏每服半匙含化咽津升麻煎出千金方治膀胱熱不已口舌生瘡咽腫方升麻四兩玄參四兩薔薇根白皮四兩射干四兩大青黃柏各三錢蜜七合右七味㕮咀以水七升煎取一升五合去滓下蜜更煎四五沸細含咽之薔薇根散出聖惠方治口舌瘡及中腦皆生瘡薔薇根皮四兩黃柏二兩銼川升麻二兩生乾地黃五兩右為散每服五錢水一中盞煎至五分去滓溫含咽玊芝飲子出精要方治膈熱口舌生瘡咽喉腫痛甘草各二兩藿香葉一兩石膏水飛山梔子仁各一兩右為末每服一錢以新水調下大青湯治咽喉唇腫口舌糜爛疳惡口瘡大青葉升麻大黃銼炒各二兩生地黃切焙三兩右為粗末每服二錢水一盞煎至六分去滓溫服微利止白芷散治口舌生瘡久不瘥白芷末二錢銅碌一錢白薑蠶四枚乾胭脂半錢右為末每用少許雞翎子掃瘡有涎吐之不得咽津犀角散出精要方治口舌生瘡咽喉腫痛熱毒時氣升麻桔梗甘草炙各一兩牛蒡子炒四兩右為㕮咀每服三錢水一盞入竹葉五七片煎至七分汁細細熱嗽溫即咽之其滓熱掃項腫上雞蘇丸出德生堂方治頭目昏眩口舌瘡上焦有熱常服噙化大妙薄荷葉一片甘草四兩桔梗四兩川芎二兩右為細末錬蜜為丸如龍眼大每一丸噙化不拘時候蜜陀僧丸治口舌生瘡蜜陀僧研細石膽細研白蜜各一兩生地黃一斤搗絞取汁右合和令勻以竹筒盛於飯上蒸候泣乾即主以飯為丸如梧桐子大每服含化一丸有涎即吐出鬱金散治口舌瘡鬱金半兩生礬生研一分鉛霜研一分檳榔銼半兩右為散每用半錢熱水調下食後日二服消毒散醫方集成治口舌生瘡兩唇腫裂晚蠶蛾五倍子密陀僧各一兩右為末每用少許乾傅瘡上有津唾之烏星散永類鈐方治虗壅上攻口舌生瘡草烏一箇南星一箇生薑一塊右為末每用二錢臨卧時以好醋調作掩子貼手腳心黃芩丸出聖惠方治口舌生瘡黃芩一分五倍子一分蟾酥半分右為末煉蜜和丸如雞頭實大每取一丸含吐津以瘥石膽丸出聖惠方治口舌瘡腫石膽三錢黃柏一分蟾酥少許右同研令細以麵糊和丸如皂莢子大每度取一丸用水化破以箆子取少許塗於瘡上日夜三兩度瘥膩香散旅舍方治口舌唇吻等瘡黃柏蜜炙一錢膩粉麝香各少許右研勻貼之日三四易治口中及舌生瘡本草爛銼黃柏含之治口舌生瘡胸膈疼痛本草用焦豉細末含一宿便瘥黃柏丸聖惠方治口舌瘡腫痛不止黃柏末一兩蟾酥黃丹一分右為末端午日午時合用蒸餅和丸如菉豆大綿裹一丸夜後含有涎即吐之鉛霜散聖惠方治口舌瘡鉛霜一分龍腦半錢滑石一分右為細散每用少許貼於瘡上有涎即吐神驗蝦蟆散聖惠方治口舌久生瘡含藥取瘥兼治疳瘡赤背蝦蟆二分塗酥炙微焦地龍三分微炒麝香一錢右為細末每取少許含有津勿咽之蝦蟆地龍端午日者良赴筵散旅舍方治心脾勞熱口舌生瘡或赤或白不下飲食廣土即赤土荆芥朴硝各一兩右同研勻新汲水調服一錢小兒少少與麻仁丸治連綿飲酒咽喉爛口舌生瘡大麻仁一升黃柏二兩右為細末蜜丸如芡實大每一粒含化生地黃膏治口舌瘡腫生地黃藍青葉各等分右為入蜜杵細每服半兩井水咽下一方井水煎食後服黃柏煎治口舌生瘡赤腫疼痛黃柏一兩銼烏豆一升右水二升半煎至五合去滓入寒食餳一兩蜜一兩龍腦少許更煎稀稠得所不計時候常含半匙白草散治口舌生瘡或咽喉痛者甘草五文白礬十文右為細末含化咽喉痛亦以之含化丸治口舌瘡爛不瘥黃丹一兩蜜一兩右相和瓷盞入盛坐在水銚子內慢火煮一炊久用綿濾過却入瓷盞內再煮如麵糊藥成丸如酸棗子大每取一丸綿裹含咽津日三四度含之又方右取蟾酥和以綿惹日晒乾剪半寸含之有涎即吐出或牙疼即咬之立瘥赴筵散治舌上口瘡不能食銅碌半兩研香白芷一兩末右拌勻摻舌上溫醋嗽立愈兼金散出鈐類治藴毒上攻口舌生瘡細辛黃連各等分右先用布帛醮水洗淨患處摻藥其上涎出即愈蒺藜子散治口常有瘡舌乾燥蒺藜子炒去角扁豆炒各三兩右搗羅為散如茶點喫黃丹膏出聖惠方治口舌生瘡黃丹半兩舍上黑煤半兩細研右入蜜調用瓷盞之以文武火飬候成膏塗瘡上立效金粉丸治口舌生瘡久不瘥菉豆粉半兩蓽撥半兩右搗羅為末糯米粥為丸如菉豆大先用冷水嗽口後化一丸咽無妨雞黃散治口舌有瘡日有蟲食雞內金焙乾好黃連焙乾右為末麻油調傳妙蟾礬散出聖惠方治口舌生瘡膽礬一分乾蟾一分炙右研為末每取小豆大摻在瘡上良久用新汲水五升潄水盡為度又方出聖惠方治口及舌上生瘡爛右研桑樹取白汁先以髮拭口次塗之瘥又方出聖惠方治口舌生瘡右用蝸牛殼細研塗瘡上有涎即吐之不過三兩上驗又方出仁齋直指方治口舌瘡右用大豆根銼細含咽踐末摻傳即山豆根又方出聖惠方治口中及舌上生瘡爛右用牛膝酒清含潄之無酒者空含亦佳一方單用好酒含之即愈又方出肘後方治備急口中及舌生瘡日久不瘥入腦中並生瘡三年以上不瘥者又用薔薇根濃煮汁含潄之又稍咽之用根皮枝葉日三夜一又方潄出吐不須咽𢾗次即愈一方每用一匙頭以水二盞同煎至六分去滓熱含冷即吐之又方出聖惠方治口舌生瘡右用石膽少許含之瘥定齋濯足法出簡易方治下虗上壅口舌生瘡右用白礬為末湯化以濯足即愈治飛系入口令人口舌間生泡此最可危出海上方右細嚼紫蘇葉白湯咽下效即愈貼臍散出楊氏家藏方治元藏氣虗浮陽上攻口舌生瘡吳茱萸醋炒香熟半兩乾薑炮半兩木鱉子五枚炒右為細末每用半錢冷水調以紙靨貼臍薄荷煎出永類鈐方治口舌生瘡痰涎壅塞咽喉腫痛薄荷一斤取頭末二兩半縮砂仁半兩取末二錢腦子半錢别研川芎半兩取末一錢甘草半兩末一錢右末入腦子和勻鍊蜜成劑任意咽嚼一方無腦子有桔梗口舌生瘡出海上名方杏仁七箇去皮尖輕粉少許同嚼吐涎即愈治上焦有熱口舌咽中生瘡有膿血桔梗一兩甘草二兩右為末每服二錢水一盞煎至六分去滓溫服食後細呷之亦治肺􅀢甘露飲出入宜方治口舌生瘡牙宣心熱枇杷葉石斛甘草炙生地黃黃芩麥門冬去心各等分㕮咀水煎食後服加味龍石散治口舌生瘡時時血出咽喉腫塞疼痛妨悶寒水石燒四兩硃砂飛研二錢馬牙硝枯一錢鉛白霜半錢硼砂半錢腦子二錢半或加甘草末二錢右研極細每用少許乾摻患處吐津悮咽了不妨龍石散出和濟方治大人小兒上膈壅毒口舌生瘡咽喉腫塞疼痛妨悶每用少許摻貼患處咽津小兒瘡疹毒氣攻口齒先用五福化毒丹掃後仍再用此藥摻貼立愈硃砂研飛二兩半寒水石燒赤二斤生腦子研二錢半右為末每日五七次用夜卧摻貼妙涎喉散出仁齋直指方治三焦大熱口舌生瘡咽喉腫塞神思昏悶並能治之蒲黃一兩盆硝八兩青黛一兩半右用薄荷汁一升將盆硝青黛蒲黃一處用磁罐盛慢火熬令乾研細每用一字或半錢摻於口內良久出涎吞之不妨或喉中腫病用筒子入藥半錢許用力吹之無不立效一無蒲黃治口上瘡右用好墨研塗口瘡附論口瘡者由心脾有熱氣衝上焦薰發口舌故作瘡也又有胃氣弱穀氣少虗陽之發而為口瘡者不可執一而論當求其所受之本也凡患口瘡及齒禁油麵酒醬酸酢醎膩乾棗瘥後仍須慎之若不久慎尋及再發難瘥薔薇根角蒿為口瘡之神藥人不知之凡大人小兒口瘡唇緊用酸漿水洗去白痂臨卧貼赴筵散如不愈貼鉛白霜散必愈矣應驗方論云一男子病口瘡纍年上至咽嗌下至胃脘皆痛不致食熱物一漏一泄一汗十去其九次服黃連解毒湯不十餘日皆釋方薔薇膏治口瘡多年不瘥風熱上攻薔薇根郁李根水楊皮牛蒡根並宜切各一斤蒼耳一升露蜂房生地黃切升麻當歸研切各一兩地骨皮白芷石膽研各半兩熟銅粉研麝香研各一分右先將前六味細切二斗煎至五升葛布絞去滓次入地黃升麻當歸地骨皮白芷再煎煎至二升綿濾去滓慢火又煎成膏乘熱下後三味研藥攪令勻瓷器盛每含如彈丸大吐津玄參煎治熱毒發動口瘡心煩燥生玄參汁生葛汁各三升銀十兩寒水石搗末石膏搗末滑石搗末磁石搗醋淬七遍末各一斤升麻羚羊角鎊犀角鎊甘草銼各二兩藝消一斤牛黃研為細末二兩右除鋌銀玄參生葛藝消牛黃外並粗搗篩以水三斗煎銀寒水石石膏滑石磁石以汁二斗去滓别以水五盞煎升麻羚羊角甘草至二盞去滓與玄參並生葛汁一處再煎如稀錫然後下藝硝攪勻傾入瓷器中盛却入牛黃末再攪取勻停冷黃黑色每取兩大匙入蜜一合和勻分四服熱湯調下不拘時候升麻飲治口內生瘡齒內爛升麻黃連去鬚羚羊角鎊玄參黃芩去黑心麥門冬去心焙葛根銼大黃銼羌活去蘆頭防風去叉甘菊花各半兩人參三分甘草炙銼知母各一分右粗搗篩每服三錢水一盞煎至七分去滓溫服食後一方有牛蒡子無人參薔薇根散治口數生瘡連年不瘥薔薇根一兩去浮土黃芩三分地骨皮三分桔梗三分去頭白斂三分川大黃三分銼碎微炒鼠李根白皮三分赤芍藥三分續斷三分黃柏三分銼黃蓍三分銼葛根三分石龍芮三分苽蔞根一兩右為細散每服一錢以米飲調下日三四服燒肝散治口瘡久不瘥茵蔯蒿犀角屑石斛去根白术柴胡去苖淨各半兩芍藥紫參桔梗銼炒防去叉桂去粗皮吳茱萸湯浸三焙炒人參白蕪荑各一分右為散每五錢用白羊肝五兩細切去筋膜入蔥白莖細擘相和濕紙三五錢重褁慢火燒熟空腹頓服米湯下乳香含化丸治舌瘡久不瘥乳香麝香白膠香黃丹細辛川升麻垢膩頭髮生乾地黃燒灰皂莢燒灰雄黃青鹽已上各一分白蜜半兩蠟半兩右為末先以油三合入頭髮煎令化用綿濾過再煎油令熱下黃蠟次下諸藥末煎令稠可丸如雞頭實大每服一丸以綿褁含化咽津薔薇湯出千金方治