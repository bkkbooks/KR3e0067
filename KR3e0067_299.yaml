body:
  text: 普濟方卷二百九十九明周王朱橚撰上部瘡門頭瘡附論夫諸陽之脉皆上於頭頭爲陽陽爲表陽盛則表熱若人體虚腠理開洩爲風邪所客風之與熱摶於氣血則澁留於皮膚故令頭生瘡也方黄連㯽榔散治秃頭瘡黄連為末用麻油輕粉調得所攤於艾中作一團焼煙碗覆其上薰之續再加艾薫用細辛蒺藜炒去刺麻黄去節雞心㯽榔當歸鬚先亁地黄川芎赤芍藥川獨活牽牛微炒取末蒼朮炒桑白皮炒枳殻製甘草微炙等分右剉散每服三錢入黑豆七十粒紫蘇五葉薑五片同煎服如大便秘加些生地黄次用貝母膏傅瘡松脂膏出聖惠方治頭瘡經年月久不瘥松脂三分黄連三分去鬚川大黄半兩水銀一兩半黄芩一兩苦參一兩剉蛇床子一分白礬半兩洗令汁浸胡粉半兩合水銀入少水同研令星盡右爲末用臘月凍了猪脂調令稀稠得所每日傅瘡上大效貝母膏出仁齋直指方治禿頭瘡貝母三錢半半夏生南星五倍子白芷厚黄栢苦参各二錢半雄黄一錢䝞丹煆一錢半右爲細末初用蜜水調𫝊兩三次後只乾掺先以蜂房白芷苦参大復皮荆芥煎湯薫洗拭乾即用藥或有留滯不瘥以好膏藥貼皂連散出仁齋直指方治頭瘡滿尺皂角去弦核一錢黄連净半兩赤色白膠香三錢五倍子三錢蛇床子一錢黄丹煆二錢輕粉半錢右細末先用柳枚煎湯洗後掺用黄連半兩蛇床子一分晒乾為末麻油輕粉調傅雌黄膏出聖惠方治頭上生瘡及一切惡瘡諸藥治不瘥者宜服雌黄一兩黄連一兩半去鬚苦参一兩礬石半兩細硏䕡茹一兩芥草半兩硃砂一兩細研右先細剉四味以臘月猪脂一斤慢火同煎三上下去滓下研了藥不住手攪令成膏入甆合中盛每用少許塗於瘡上鷄黄散治頭瘡不問逺年日近水龍亮搗細黄丹白礬三味等分一處燒過炭牛皮另焼鷄子清元藥一處焼硫黄生用右為酸虀汁焼熱洗去瘡靨盡了香油調𫝊之加味平胃散出百一選方治一切惡瘡頭上瘡右平胃散入膩粉清油調𫝊之甚妙油漆膏治頭瘡黄栢川黄各二錢輕粉一貼明礬一錢飛漆滓二錢半右香油半碗共浸漆滓二宿後入三味通浸五宿却入輕粉搽頭瘡脂粉膏治頭中惡瘡胡粉水銀白松脂各二兩臘猪脂四兩右将猪脂合松脂煎却以水銀胡粉合研塗上又漆小兒頭靣瘡一方加黄連二兩更禿瘡膩粉膏出聖惠方治頭瘡年月不瘥杏仁二兩湯浸去皮尖炒令黄黒色豉二兩微炒膩粉一分硫黄半兩細研右先搗杏仁豉如泥即入膩粉硫黄同研令匀先以葱塩湯後以生油調塗之麻油膏出仁齋直指方治頭痺頭腦頭枕後生正者爲腦側者為痺輕浮白浮石焼存性為末右麻油輕粉調鷄羽刷上勿用手按即漲或用黄牛糞於瓦上焙亁加之尤好亦治頭􅗢䕡茹膏出聖惠方治頭瘡經年月不瘥黄連四兩去鬚右為末以烏麻油調如膏若小兒先以泔清洗之大人即以泔清皂莢洗之然後塗藥不過三上即瘥螵蛸散出瑞竹堂方治頭上生瘡俗曰􅀈瘡絶妙方海螵蛸一錢白膠香輕粉各半錢右将海螵蛸白膠香羅入輕粉再研細敷貼先用清油潤瘡摻摻藥只一上可二上麝香散出十便良方治頭生惡瘡生牛皮焼灰半兩鷰窠土焼赤半兩麝香半錢右都細研令勻以生油調日二三度塗之笋粉散出肘後方治頭上瘡右大笋殻燒灰存性加輕粉生油調傅之露蜂散出聖恵方治頭瘡及諸般瘡露蜂房白狗糞各半兩右並燒為灰細研以蜜和塗之立瘥苦練散治頭瘡苦練子十四枚杏仁右都燒令煙盡搗為末入膩粉半錢更研令以生油調塗三五上瘥熊膽膏出聖惠方治熱毒上攻發赤根白頭瘡於頂上宜用此方龍膽一分去蘆頭為末熊膽一分研細右同研令匀以生油調日可兩三度塗之治頭爛瘡出仁齋直指方右用燕窠取抱子處土搗末掺先白芷大腹皮煎湯洗拭後掺治頭瘡出海上名方右用杏仁燒灰傅之治人頭靣患􅊓瘡右用蛇蛻皮熱以磨之數百度令熱乃棄又方不蚛皂莢燒灰右用為末以生油調塗之又方鯷魚鱗炙令黄焦右為末每用時先以水洗瘡又方使君子燒令焦右為末以生油調塗之又方出十便良方䜴一升右以米醋二升浸三宿以布絞取汁於鐺内慢火熬成膏洗瘡挹衣乾去痂塗之白禿瘑並宜用之治頭極痒不痛生瘡方出十便良方鵓鴿糞五合右以好醋和稀膏煮三兩沸日二三上塗之治頭瘡乍發乍瘥赤蚚疼痛方竹葉一片燒灰右為末鷄子白和勻日三四上塗之治頭瘡經久不瘥方出十便良方梁上塵一兩細研右用時先以皂莢湯洗瘡拭令乾以生油調塗之又方蝦蟆頭燒灰三枚右爲末用生油調塗之又方右用牛角尖燒灰為末以生油調塗之治頭瘡鷄肫黄炒取油和粉𫝊之鳥龍膏出余居士選竒方不蛀皂角一挺焼灰存性為末杏仁八枚濕紙黄丹五文累炒右為細末輕粉拌勻用麻油調傅治頭瘡及諸熱瘡用醋少許和水净洗去痂再温水洗挹衣百草霜緫研入膩粉少許生油調塗立愈羚羊角飲子出王氏傳方治丈夫婦人風毒攻衝頭靣生瘡虚腫等羚羊角犀角羗活㯽榔人參各一分當歸一分右已上藥剉碎略焙杵細分作四貼每用水一升煎至四合分作兩服空心臨卧分服其每貼兩服滓更用水半升煎至七分又作一服喫之温服苦参丸治肺毒邪熱頭靣生瘡生疥癬並宜服之苦参右一味為細末粟米飯為丸如桐子大每服五十丸空心温米湯送下又頭瘡方出仁齋直指方黄連為末用麻油輕粉調得所攤於椀中将艾一撮焼煙椀覆其上薫之續再加艾薫用又方出仁齋直指方穿山甲􅑕粉同炒右用麻油輕粉調傅癩頭瘡出危氏方先用本人小便燒秤錘令紅投於小便中方與洗瘡皮皆去然後以帛拭亁用歴青五文細研用油魚三箇以盞燒成油調滴青塗之三日效决効散治風痒頭瘡管仲三兩白芷一兩右為細末油調塗之治頭瘡出海上名方乾地黄為細末入輕粉麻油調𫝊之治頭瘡出本草以大筍殻葉燒為灰量瘡大小用灰調生油傅入少膩粉佳治頭耳瘡出本草以白馬頭骨燒𫝊傅之治頭上一切惡瘡及禿瘡諸藥不瘥者用鯽魚一頭長五寸留鱗開去腸胃入頭髪令滿即以濕紙數重裹之燒為灰入雄黄一分同研令細用臘月錬了猪脂和更研令勻先以泔清洗瘡拭乾塗之日三兩上自瘥用麻油調亦得口舌瘡附論口為脾之門舌為心之官嘗五味布五藏心之别脉係於舌根脾之絡脉係於舌两傍而終於舌本三經為四氣所中舌痺卷不言七情所鬰則舌腫不能語至如心熱則舌破生瘡肝壅則出血如湧閉則白胎如雪此舌之爲病也口則又稍不然盖熱則口苦寒則口醎虚則口淡脾冷則口甜宿食則酸煩燥則澁乃口之津液通乎五藏藏氣偏勝則味應乎口或勞鬰則口臭凝滯則生瘡生瘡者夜不可失睡晝不可就寝違此必甚唇乃全属於脾唇有病則多宜随證以治胎脾也齒乃骨之餘腎主營飬呼吸之户也故腎衰則齒豁精盛則齒堅又手陽明大腸脉入於牙齒灌於大腸壅則齒亦浮腫虚則宣露挾風則上攻靣目疳匿蚛則􅀈禹切虫也爲脫為痔皆當随證治之喉者候也咽者嚥也咽接三筦以通胃故以之嚥物喉通五藏以係肺故以之候氣氣喉糓喉皎然眀白人諸藏熱則腫寒則縮皆使喉閉風燥亦然五藏久咳則聲嘶聲嘶者喉破也非咽門病若咽腫則不能吞乾則不能嚥多咽飲啖辛熱或復嘔吐咯傷咽係乾枯之所致也自與喉病不同又有懸癰暴腫閉塞喉嚨亦如喉閉但懸癰在上㬽及關下俗謂之鸎翁又謂之蛾聚俗語聲訛湏以後一十八種證辨之方茯神丸治積年口舌瘡諸方不瘥茯神一兩白术一兩旋覆半兩􅒦砂蜜去皮三分大黄煨剉半兩芍藥半兩桂去粗皮三分郁李仁湯浸去皮一兩人參半兩大麻仁别研二兩枳殻去三麸炒分訶棃勒去核一兩厚樸去粗皮剉薑汁炙一兩白梹榔剉三分白鮮皮剉半兩陳橘皮湯浸去白焙一兩地骨白皮剉半兩右為末煉蜜和丸如梧桐子大每服二十丸空心粥飲下加至三十丸蘆薈散治口舌生瘡蘆薈半兩丹砂研一分丁香一分麝香半分牛黄研半分蟾酥半兩角蒿灰研半兩𤓰蒂二十枚羊蹄花半兩乾蝸牛研三枚熊膽研一錢細辛去苖葉一分馬牙硝研三分白礬灰研半分右為散先以頭髮裹指於温水内蘸揩之輭帛裛却膿水取少許藥末掺瘡上或輕可即去蟾酥蘆薈有病大小以意加减用之𤣥参散出聖惠方治口舌生瘡連齒齗爛𤣥参三分川升麻三分獨活三分麥門冬三分去心黄芩三分黄栢三分川大黄三分剉碎微炒梔子仁三分前胡三分去蘆頭犀角屑三分甘草三分炙㣲赤剉右為散每五錢以水一大盞煎至五分去滓不計時候温服之犀角湯出御藥院方治口舌生瘡犀角屑三分羚羊角屑三分丹砂研三分黄耆剉半兩大黄剉一分升麻半兩生乾地黄焙一兩射干一分𤣥参三分天門冬生者去心焙一兩甘草炙剉一兩右粗搗篩每服三錢水一盞煎至六分去滓食後温服桂心散出千金方治心脾胃中客熱口舌乾焦生瘡桂去粗皮半兩赤茯苓去黑皮三分黄連去鬚梔子仁杏仁去皮尖䨇仁研各半兩黄芩去黑心甘草炙剉大黄剉炒各三分苽蔞根半兩薔薇根切三分右為散食後以温漿水調下二錢日三服一方有枳實無梔子蘆薈散出聖惠方治口舌上瘡久不瘥蘆薈二分土益緑三分胡粉三分真珠末半兩波斯塩緑半兩蝸牛殻半兩炒令黄色青黛半兩黄連半兩去鬚麝香一指細研右爲細散都研令勻先用甘草湯𠻳口洗瘡以帛裛乾然後掺藥於上或以蜜和丸如鷄頭實大含之亦得有涎吐之麝香散出御藥院方治斷頬口舌生瘡麝香一分浮香半錢定粉一錢半梹榔生剉一枚蜜陀僧半兩白龍骨一錢半鳥曽骨去皮㣲炙黄一錢半寒水石燒赤三錢半黄丹慢火㣲炒一錢右為細末每用少許乾上瘡處有津即吐嚥無妨不計時候日三五次上麝香丸出聖惠方治口舌瘡亦爛宜含化麝香一分細研杏仁三分湯浸去皮尖雙仁川升麻三分黄芩三分浮萍草三分零陵香三分甘草三分生用寒水石三分黄連三分去鬚右為末煉蜜和丸如彈子大每每取一丸綿裹含化嚥津升麻洩熱散出聖惠方治心脾藏熱應口舌生瘡破裂唇蹇赤色川升麻一兩射干一兩半黄栢一兩半剉大青一兩甘草一兩炙㣲赤剉𤣥参二兩黄芩犀角屑三分黄連一兩去鬚右為散每服四錢水一中盞入苦竹葉三七片煎至五分去滓入地黄汁一合攪令勻食後温服升麻散出仁齋直指方治心脾有熱口舌破裂生瘡升麻𤣥参川芎生地黄洗晒麥門冬各半兩大黄黄連净黄芩甘草焙各三錢右剉碎每服三錢姜棗煎食後服瀉黄飲子出濟生方治風熱藴於脾經唇燥折裂口舌生瘡白芷升麻枳殻黄芩防風半夏石斛各一兩甘草半兩右㕮咀每服四錢水一中盞薑五片煎八分去滓温服不拘時候五参丸治口乾舌上生瘡𤣥參沙参丹参苦参人参秦芄去苗土各一兩乾姜炮半兩酸棗一兩右為末蜜丸如梧桐大每服二十丸加至三十丸米飲下不拘時升麻湯治口舌生瘡升麻一兩大青去根二分射干三分黄栢去粗皮一兩𤣥参三兩山梔子仁半兩薔薇根剉三兩右麄搗篩每服五錢水二盞入竹葉七片煎至一盞去滓入蜜少許地汁一合更煎三五沸徐徐含嚥麝香散治口舌生瘡麝香研一分乾蝦蟆焼灰硏一兩黄栢去粗皮炙剉一兩甘草炙剉三分母丁香一分甜𤓰蒂一分石膽研一兩右為散臨卧以一錢掺舌上有涎吐出硼砂丸出仁齋直指方治口臭口乾口舌瘡寒水石焼紅十兩硼砂二兩腦射各一錢馬牙硝枯四兩甘草浸汁熬膏二兩右為細末甘草膏搜丸麻子大含化嚥升麻散出聖惠方治口舌生瘡連頬腫痛川升麻半兩芎藭一分防風半兩去蘆鷄腸草三分大青一分甘草半兩炙㣲赤剉右為散每用半錢於瘡上貼一可三五度瘥先於瘡腫處針出惡血用塩湯煠後貼藥神效升麻散出和濟方治上膈壅毒口舌生瘡咽喉腫痛升麻赤芍人参洗桔梗去蘆乾葛各一兩甘草右剉散每服四錢水一盞半生薑五片煎温服不拘時候一方加薄荷黄芩効永類鈐方云有黄連大黄𤣥参麥門冬萍草丸出仁齋直指方治舌瘡腫浮萍草黄栢並末杏仁青黛等分輕粉右為末煉蜜丸如皂子大以綿裹含有涎吐之防風散治口舌生瘡防風去稍一兩龍膽一兩生地黄切焙二兩沉香剉半兩升麻半兩右為散每用二錢入塩少許沸湯調勻指齒含嚥便睡青黛散出聖惠方治口舌生瘡青黛一錢細辛一分黄栢一分剉地骨皮一分蜜陀僧一分右細羅為散每取少許貼於瘡上有涎即吐之晩蠶蛾散治口舌生瘡齒動半枚燒灰研晩蠶蛾末二錢乾蟾益母草半兩人中白半錢皂礬半錢右細研為散先以綿纒手指以温漿水洗去白皮掺藥於瘡上日三五次碧雪出危氏方治一切壅熱咽喉腫閉不能嚥物口舌生瘡舌根緊言語不正腮項腫痛見咽喉喉痺類緑雪散出楊氏家藏方治舌上生瘡銅青松白霜右件等分為細末每用少許乾掺舌上柳花散出御藥院方治口舌生瘡𤣥胡索一兩黄栢去粗皮黄連各半兩蜜陀僧别研三錢青黛三錢别研右為細末每用𫝊瘡上有津即吐之卧用陀僧散治口舌瘡不瘥蒲黄黄藥子各半兩蜜陀僧黄栢甘草各一兩炙右為細末乾貼口瘡上浮萍煎膏出聖惠方治口生瘡久不瘥浮萍草一兩川升麻一兩黄栢一兩甘草一兩半生用右細剉和勻以猪脂一觔同於銀鍋中以文火煎至半觔濾去滓成膏每服半匙含化嚥津升麻煎出千金方治膀胱熱不已口舌生瘡咽腫方升麻四兩𤣥参四兩薔薇根白皮四兩射干四兩大青黄栢各三錢蜜七合右七味㕮咀以水七升煎取一升五合去滓下蜜更煎四五沸細含咽之薔薇根散出聖惠方治口舌瘡及中腦皆生瘡薔薇根皮四兩黄栢二兩剉川升麻二兩生乾地黄五兩右為散每服五錢水一中盞煎至五分去滓温含嚥玊芝飲子出精要方治膈熱口舌生瘡咽喉腫痛甘草各二兩藿香葉一兩石膏水飛山梔子仁各一兩右為末每服一錢以新水調下大青湯治咽喉唇腫口舌糜爛疳惡口瘡大青葉升麻大黄剉炒各二兩生地黄切焙三兩右為粗末每服二錢水一盞煎至六分去滓温服微利止白芷散治口舌生瘡久不瘥白芷末二錢銅碌一錢白姜蠶四枚乾胭脂半錢右為末每用少許鷄翎子掃瘡有涎吐之不得嚥津犀角散出精要方治口舌生瘡咽喉腫痛熱毒時氣升麻桔梗甘草炙各一兩牛蒡子炒四兩右為㕮咀每服三錢水一盞入竹葉五七片煎至七分汁細細熱𠻳温即嚥之其滓熱掃項腫上鷄蘇丸出徳生堂方治頭目昏眩口舌瘡上焦有熱常服噙化大妙薄荷葉一片甘草四兩桔梗四兩川芎二兩右為細末錬蜜為丸如龍眼大每一丸噙化不拘時候蜜陀僧丸治口舌生瘡蜜陀僧研細石膽細研白蜜各一兩生地黄一斤搗絞取汁右合和令勻以竹筒盛於飯上蒸候泣乾即主以飯為丸如梧桐子大每服含化一丸有涎即吐出鬰金散治口舌瘡鬰金半兩生礬生研一分鉛霜研一分梹榔剉半兩右為散每用半錢熱水調下食後日二服消毒散醫方集成治口舌生瘡兩唇腫裂晩蠶蛾五倍子宻陀僧各一兩右為末每用少許乾傅瘡上有津唾之烏星散永類鈐方治虗壅上攻口舌生瘡草烏一箇南星一箇生姜一塊右為末每用二錢臨卧時以好醋調作掩子貼手脚心黄芩丸出聖惠方治口舌生瘡黄芩一分五倍子一分蟾酥半分右為末煉蜜和丸如鷄頭實大每取一丸含吐津以瘥石膽丸出聖惠方治口舌瘡腫石膽三錢黄栢一分蟾酥少許右同研令細以麫糊和丸如皂莢子大每度取一丸用水化破以箆子取少許塗於瘡上日夜三兩度瘥膩香散旅舍方治口舌唇吻等瘡黄栢蜜炙一錢膩粉麝香各少許右研勻貼之日三四易治口中及舌生瘡本草爛剉黄栢含之治口舌生瘡胷膈疼痛本草用焦豉細末含一宿便瘥黄栢丸聖惠方治口舌瘡腫痛不止黄栢末一兩蟾酥黄丹一分右為末端午日午時合用蒸餅和丸如菉豆大綿裹一丸夜後含有涎即吐之鉛霜散聖惠方治口舌瘡鉛霜一分龍腦半錢滑石一分右為細散每用少許貼於瘡上有涎即吐神驗蝦蟆散聖惠方治口舌久生瘡含藥取瘥兼治疳瘡赤背蝦蟆二分塗酥炙㣲焦地龍三分㣲炒麝香一錢右為細末每取少許含有津勿嚥之蝦蟆地龍端午日者良赴筵散旅舍方治心脾勞熱口舌生瘡或赤或白不下飲食廣土即赤土荆芥朴硝各一兩右同研勻新汲水調服一錢小兒少少與麻仁丸治連綿飲酒咽喉爛口舌生瘡大麻仁一升黄栢二兩右為細末蜜丸如芡實大每一粒含化生地黄膏治口舌瘡腫生地黄藍青葉各等分右為入蜜杵細每服半兩井水嚥下一方井水煎食後服黄栢煎治口舌生瘡赤腫疼痛黄栢一兩剉烏豆一升右水二升半煎至五合去滓入寒食餳一兩蜜一兩龍腦少許更煎稀稠得所不計時候常含半匙白草散治口舌生瘡或咽喉痛者甘草五文白礬十文右為細末含化咽喉痛亦以之含化丸治口舌瘡爛不瘥黄丹一兩蜜一兩右相和甆盞入盛坐在水銚子内慢火煮一炊久用綿濾過却入甆盞内再煮如麵糊藥成丸如酸棗子大每取一丸綿裹含嚥津日三四度含之又方右取蟾酥和以綿惹日晒乾剪半寸含之有涎即吐出或牙疼即咬之立瘥赴筵散治舌上口瘡不能食銅碌半兩研香白芷一兩末右拌勻掺舌上温醋𠻳立愈兼金散出鈐類治藴毒上攻口舌生瘡細辛黄連各等分右先用布帛醮水洗浄患處掺藥其上涎出即愈蒺藜子散治口常有瘡舌乾燥蒺藜子炒去角扁豆炒各三兩右搗羅為散如茶㸃喫黄丹膏出聖惠方治口舌生瘡黄丹半兩舎上黒煤半兩細研右入蜜調用甆盞之以文武火飬候成膏塗瘡上立效金粉丸治口舌生瘡久不瘥菉豆粉半兩蓽撥半兩右搗羅爲末糯米粥為丸如菉豆大先用冷水𠻳口後化一丸嚥無妨鷄黄散治口舌有瘡日有蟲食鷄内金焙乾好黄連焙乾右為末麻油調𫝊妙蟾礬散出聖惠方治口舌生瘡膽礬一分乾蟾一分炙右研為末每取小豆大掺在瘡上良久用新汲水五升潄水盡為度又方出聖恵方治口及舌上生瘡爛右研桑樹取白汁先以髪拭口次塗之瘥又方出聖恵方治口舌生瘡右用蝸牛殻細研塗瘡上有涎即吐之不過三両上驗又方出仁齋直指方治口舌瘡右用大豆根剉細含嚥踐末掺𫝊即山豆根又方出聖惠方治口中及舌上生瘡爛右用牛膝酒清含潄之無酒者空含亦佳一方單用好酒含之即愈又方出肘後方治備急口中及舌生瘡日久不瘥入腦中並生瘡三年以上不瘥者又用薔薇根濃煑汁含潄之又稍咽之用根皮枝葉日三夜壹又方潄出吐不湏嚥𢾗次即愈一方每用一匙頭以水二盞同煎至六分去滓熱含冷即吐之又方出聖惠方治口舌生瘡右用石膽少許含之瘥定齋濯足法出簡易方治下虗上壅口舌生瘡右用白礬為末湯化以濯足即愈治飛系入口令人口舌間生泡此最可危出海上方右細嚼紫蘇葉白湯嚥下效即愈貼臍散出楊氏家藏方治元藏氣虗浮陽上攻口舌生瘡吳茱萸醋炒香熟半兩乾薑炮半兩木鱉子五枚炒右為細末每用半錢冷水調以紙靨貼臍薄荷煎出永類鈐方治口舌生瘡痰涎壅塞咽喉腫痛薄荷一斤取頭末二兩半縮砂仁半兩取末二錢腦子半錢别研川芎半兩取末一錢甘草半兩末一錢右末入腦子和勻鍊蜜成劑任意嚥嚼一方無腦子有桔梗口舌生瘡出海上名方杏仁七箇去皮尖輕粉少許同嚼吐涎即愈治上焦有熱口舌咽中生瘡有膿血桔梗一兩甘草二兩右為末每服二錢水一盞煎至六分去滓温服食後細呷之亦治肺􅀢甘露飲出入宜方治口舌生瘡牙宣心熱枇杷葉石斛甘草炙生地黄黄芩麥門冬去心各等分㕮咀水煎食後服加味龍石散治口舌生瘡時時血出咽喉腫塞疼痛妨悶寒水石焼四兩硃砂飛研二錢馬牙硝枯一錢鉛白霜半錢硼砂半錢腦子二錢半或加甘草末二錢右研極細每用少許乾掺患處吐津悮嚥了不妨龍石散出和濟方治大人小兒上膈壅毒口舌生瘡咽喉腫塞疼痛妨悶每用少許掺貼患處嚥津小兒瘡疹毒氣攻口齒先用五福化毒丹掃後仍再用此藥掺貼立愈硃砂研飛二兩半寒水石焼赤二斤生腦子研二錢半右為末每日五七次用夜卧掺貼妙㳄喉散出仁齋直指方治三焦大熱口舌生瘡咽喉腫塞神思昏悶並能治之蒲黄一兩盆硝八兩青黛一兩半右用薄荷汁一升将盆硝青黛蒲黄一處用磁罐盛慢火熬令乾研細每用一字或半錢掺於口内良久出涎吞之不妨或喉中腫病用筒子入藥半錢許用力吹之無不立效一無蒲黄治口上瘡右用好墨研塗口瘡附論口瘡者由心脾有熱氣衝上焦薫發口舌故作瘡也又有胃氣弱糓氣少虗陽之發而為口瘡者不可執一而論當求其所受之本也凡患口瘡及齒禁油麵酒醤酸酢醎膩乾棗瘥後仍湏慎之若不久慎尋及再發難瘥薔薇根角蒿為口瘡之神藥人不知之凡大人小兒口瘡唇𦂳用酸浆水洗去白痂臨卧貼赴筵散如不愈貼鉛白霜散必愈矣應驗方論云一男子病口瘡累年上至咽嗌下至胃脘皆痛不致食熱物一漏一泄一汗十去其九次服黄連解毒湯不十餘日皆釋方薔薇膏治口瘡多年不瘥風熱上攻薔薇根郁李根水楊皮牛蒡根並宜切各一斤蒼耳一升露蜂房生地黄切升麻當歸研切各一兩地骨皮白芷石膽研各半兩熟銅粉研麝香研各一分右先将前六味細切二斗煎至五升葛布絞去滓次入地黄升麻當歸地骨皮白芷再煎煎至二升綿濾去滓慢火又煎成膏乗熱下後三味研藥攪令勻瓷器盛每含如彈丸大吐津𤣥參煎治熱毒發動口瘡心煩燥生𤣥參汁生葛汁各三升銀十兩寒水石搗末石膏搗末滑石搗末磁石搗醋淬七遍末各一斤升麻羚羊角鎊犀角鎊甘草剉各二兩芸消一斤牛黄研為細末二兩右除鋌銀𤣥参生葛芸消牛黄外並麄搗篩以水三斗煎銀寒水石石膏滑石磁石以汁二斗去滓别以水五盞煎升麻羚羊角甘草至二盞去滓與𤣥参並生葛汁一處再煎如稀錫然後下芸硝攪勻傾入甆器中盛却入牛黄末再攪取勻停冷黄黒色每取兩大匙入蜜一合和勻分四服熱湯調下不拘時候升麻飲治口内生瘡齒内爛升麻黄連去鬚羚羊角鎊𤣥参黄芩去黒心麥門冬去心焙葛根剉大黄剉羗活去蘆頭防風去叉甘菊花各半兩人參三分甘草炙剉知母各一分右粗搗篩每服三錢水一盞煎至七分去滓温服食後一方有牛蒡子無人参薔薇根散治口数生瘡連年不瘥薔薇根一兩去浮土黄芩三分地骨皮三分桔梗三分去頭白歛三分川大黄三分剉碎㣲炒䑕李根白皮三分赤芍藥三分續斷三分黄栢三分剉黄蓍三分剉葛根三分石龍芮三分苽蔞根一兩右為細散每服一錢以米飲調下日三四服燒肝散治口瘡久不瘥茵蔯蒿犀角屑石斛去根白术柴胡去苖净各半兩芍藥紫参桔梗剉炒防去叉桂去粗皮吴茱萸湯浸三焙炒人参白蕪荑各一分右為散每五錢用白羊肝五兩細切去筋膜入葱白莖細擘相和濕紙三五錢重褁慢火燒熟空腹頓服米湯下乳香含化丸治舌瘡久不瘥乳香麝香白膠香黄丹細辛川升麻垢膩頭髮生乾地黄焼灰皂莢焼灰雄黄青塩已上各一分白蜜半兩蠟半兩右為末先以油三合入頭髮煎令化用綿濾過再煎油令熱下黄蠟次下諸藥末煎令稠可丸如鷄頭實大每服一丸以綿褁含化嚥津薔薇湯出千金方治