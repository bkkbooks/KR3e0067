body:
  text: 普濟方卷一百九明周王朱橚撰諸風門大風癩病論大凡癩病皆是惡風及犯觸忌害得之初覺皮膚不仁或淫淫若痒如蟲行或目前見物如垂絲或瘾疹輙赤黒此皆為疾之始起便急療之斷米榖肴鮭專食胡麻松术輩最善也夫病之生多從風起當時㣲發不以為害初入皮膚之裏不能自覺或流通四肢潜於經脈或在五臓乍寒乍熱縱横脾腎蔽諸毛孔腠理壅塞難通因茲氣血精髓乖離久而不療令人頑痺或汗不流泄手足酸疼針灸不痛或在面目習習變變或在胸頸状如蟲行或身體遍痒搔之生瘡或身面腫痛徹骨體或頑如錢大狀如蛇毒或如梳或如手錐刺不痛或青黄赤黒猶如腐木之形或痛無常處流移非一或如酸棗或若懸鈴或似繩縛拘急難以俛仰手足不能摇動眼目流腫内外生瘡小便赤黄尿有餘瀝面無顔色恍惚多忘其間變狀多端毒蟲若食人肝眉睫隨落若食人肺鼻柱崩倒或鼻生息肉塞孔氣不得通若食人脾即語聲變散若食人腎耳鳴啾啾或如雷鼓之音若食人筯脈支節隨落若食人皮肉頑痺不覺痒痛或如針錐所刺名曰刺風若乗風走於皮肉猶若外蟲行復有食人皮肉徹外從於頭面即起為皰肉如桃核小棗從頭面起者名曰順風從兩脚起者名曰逆風令人多瘡猶如癬疥或如有魚鱗或痒或痛黄水流出初起之時或如榆莢或如錢孔或青或白或黒或黄變易無定或起或滅此等皆癩之兆又云風起之由皆是冷熱交通流於五臓徹人骨中虚風因濕和合蟲生便即作患論其所犯多因用力過度飲食相違房室太過毛孔既開冷熱風入五臓積於寒熱之風交過通徹流行諸脉急者即患緩者稍逺所食穢雜肉蟲生日久冷熱至甚暴蟲遂多食人五臓骨髓及於皮肉筯節久久皆令壞散名曰癩風若其欲療先與雷丸等散服之出蟲見其蟲行青赤黒黄白等諸色之蟲與藥療者無差然癩名不一木癩者初得先當落眉睫面目痒如復生瘡三年成大患急療之愈不療患成火癩者生瘡如火燒瘡或斷肢節七年落眉睫急療可愈八年成疾遂難療金癩者是天所為也負功得祟初得眉落二年食鼻鼻柱倒難療土癩者病身體塊磊如雞子彈丸許此病宜急療之六年成大患十五年不可療水癩者先得水痼因節㽞停風觸發動落人眉鬚急療之經年病减如蟋蟀在人身體内百節頭皆欲血出三年難療麫癩者蟲出如麫舉體艾白難療薫藥可愈多年難療白癩者班駁或白或赤眉鬚隨落亦可療之多年難療疥癩者狀似癬瘙身體狂痒十年成大患可急療之風癩者風從體入或手足癩瘡風冷痺癡不療二十年後便成大患急療之愈蚼癩者得之身體沉重狀似風癩可療之至久積嵗成大患疾速療之酒癩者酒醉卧黍穰上因汗體虛風從外入落人眉鬚令人惺懼養生禁忌云醉酒卧路不幸生癩也又云魚無鰓不可食食之令人五月發癩疾又云癩風即經所載癘風也癩之名非一證狀多端不出五種風生五種蟲是黄風生黄蟲青風生青蟲赤風生赤蟲白風生白蟲黒風生黒蟲四蟲猶可措手惟黒蟲未必能療吁此惡疾也瘡荼毒乍寒身體魁㿔手足指脱眼爛鼻塌齒豁唇翻顔色枯黄眉鬚堕落頑痺痛痒不能屈伸病症之惡莫甚乎此然此雖出於風必有所致大率多因嗜欲無度勞動氣血熱發汗出遭冷濕外風遂致濕氣與榮衞相干衞氣挾邪則肌肉不仁榮氣泣濁脈路瘀熱故遍身傷潰變壊人形千金所謂自作不仁極猥之業雖有悔言而無悔心固應如是亦有傳染觸犯而得者此則不謹之所招也人有斯疾切須忌塩及一切口味幽隐林泉屏棄世務蚤蚤救療庶為全人治法以踈風殺蟲逐惡血輩為之宣通謹勿用補此風從頭起而下者順從足起而上者逆順則易逆則難又當識此余於直指後集癧節方論見之大寒大熱不得行淫多致風癩或久病尫羸癈其肢體也三因方云凡治大風須推其所因凡因風寒熱濕勞逸飲食與夫傳染不可濫施散寒濕清熱調和氣血逈然不同若例以㵼風藥治之則失其機要矣昔見一僧得病狀如白癩卒不成瘡但每旦起白皮一升許如蛇䖻醫者謂多啖炙煿所致與局方觧毒雄黄丸三四服而愈豈非得其因治之耶方水銀膏治大風疾雲母石紫石英鵝管石花蘂石𤣥精石井泉石石鍾乳寒水石代赭石骨石或云金星石金牙石銀牙石各等分右為細末將輕粉水銀各七錢細研入藥同研不見水銀星後用清油調於避風處搽之日二次七八日藥透牙痛出臭涎一二碗出盡用黄連貫衆各一兩煎湯𠻳之如腹痛用三黄丸下若有癧痺不仁用麻黄木鱉子防風當歸等分煎服得汗即安搽藥後有他病證變動者隨證用方藥治大風疾塗傳方出聖濟總録磁石煆醋淬𤣥精石研禹餘粮煆醋淬礜石研代赭煆金星石研水銀銀星石研各一兩以上八味再用塩泥固濟以四斤熱火簇定赤取出乗熱研膩粉二味同於潑椀内研令無星子各半兩右每用前藥末二錢及水銀膩粉二錢研大麻子三合麻子油一兩半生絹取汁調塗身體以藥末盡為度鋪油單襯卧以被覆出汗及轉下惡物為度未轉再塗轉即服後補藥異切散出聖濟總錄治大風疾塗藥轉後服補藥天麻酒浸焙赤箭松黄鬼臼安息香研羗活去蘆頭欵冬花楓香脂研天蓼花細辛去苗葉防風去蘆蔓荆實去乳皮藁本去苗土牛膝切焙甘草炙剉乳香研天門冬去心焙麥門冬去心焙丹砂研萆薢木香虎骨酒炙當歸切焙天南星炮乾蝎炒烏蛇酒浸去皮骨炙麻黄去根節雄黄研附子炮製去皮臍芎藭白殭蚕直者炒桂去粗皮雞舌香研各半兩地骨皮去土白花蛇酒浸去皮骨各半兩右𢷬研為散入雲母粉六兩研和匀每服一錢半臘茶或米飲調下日一二服治大風神效方黄耆當歸酒浸各二兩麝香一錢大風子肉十兩炒香去殻草烏炮五靈脂川芎生防風生没藥烏藥赤芍藥萆蔴子炒去殻枸杞根甘草湯煮皮乳香葳靈仙何首烏生赤土信州蒺藜去刺蒸伏時酒拌晒乾炒熟地黄洗晒大黄生黒牽牛水沉者用浮者不用各四兩胡麻同胡麻沉者用浮不用獨活羗活蔓荆子炒木鼈子去殻白芷牛旁子炒赤石脂研如粉荆芥苦参用糯米泔浸一兩晒乾剉石菖蒲九節者去皮毛用桑條蒸去桑條不用以上各一兩白花蛇身上有方勝尾上有脚甲夏浸一宿春秋各三宿取皮用桑柴火焙如此三次後用炒瓶盛埋地中三宿出火氣不用皮骨取肉研碎黒烏蛇製同白殭蚕一兩去絲炒黄全蝎一兩首尾全地龍一兩白頸去泥天麻二兩炒右煎藥一處製為末内藥各製為末將浸蛇酒煑白米飯擂碎作糊丸桐子大每服四十丸至五十丸日進三服待半月病發在外然後服大黄散令過一二行再服前藥忌一切動風諸物及房事止可食淡粥如瘡破重者加天雄少許黒龍丹出聖濟總錄治大風癩石硫黄别研雄黄别研丹砂别研魯青别研白石英别研紫石英别研水銀七味各半兩將丹砂硫黄雄黄末㸃醋與水銀同研令水銀盡為度金箔二十片與前七味同研匀太隂𤣥精石消石入細桑枝二三寸同熬為計冷用馬牙硝熬乾用白礬燒冷計用鉛丹胡粉白𤣥精至此同研各半兩以上藥石以下十四味入藥瓶内後法燒天南星酒煑切炒白附子酒煑切炒白花蛇酒浸去皮骨燒白殭蠶炒蝎稍炒天竺黄别研天麻酒煑切焙麻黄去根節煎掠去沬焙鹿胎虎骨醋炙敗鱉醋炙蟬蜕㣲炒羚羊角鎊􅙈角鎊木香麴研炒麥蘖炒輕粉麝香研各半兩右除天南星以下一十九味搗羅為末外前硫黄以下十四味用燒藥次瓦罐子内六一泥固濟大乾以先研𤣥精石至胡粉六味末平分一半布在罐子内次入硫黄至金箔八味在中又盡𤣥精石等末在上别入金箔二十四片藥上葢定後以六一泥固濟㽞半寸許不要泥合縫就净室中掘地坑面廣二尺二寸深如藥罐子二寸又於爐中心掘一孔入銅罐滿著水坐藥罐在上不得令藥水蘸温用火一片罐五寸垂胎養三復時畢出藥方治泥合縫又加火三片仍舊去罐逺近亦三復時至滿日平明用火五斤簇藥罐子燒令通赤一食頃便去火用灰培罐子上用温土窨葢令實至來日平明取出藥細研用重熱帛帶温包藥置於净新温土内培窨三日復時每夜三次細洒水於土上常以大盆合葢候出火毒日足别宻縫以夾絹帶貯藥於銀器石器中用水二斗甘草一斤𢷬為末上垂藥袋不得致底煮一復時取出焙乾再研如粉與後十九味草藥末同研匀用蒸棗肉丸如櫻桃大每服一丸用苦参黄連浸酒三合磨下治一切毒氣風豆淋酒下半丸日二夜一其煮藥甘草水有瘡痍疥癬風熱毒聚淋洗即瘥應癱瘓角弓反張身有癖痺急風渾身瘙痒走注疼痛破傷等風服訖葢覆出汗徧身癖腫不散皮灰酒驚癎煎金銀湯腸風㵼血煎荆芥湯小兒天癩煎薄荷酒湯相觧磨一丸分五服小兒夜啼驚悸研丹砂水磨一丸分八服仍以半丸用緋帶子男左女右繫在臂上九江散出千金方治二百六十種大風及白癜風當歸七分石南六分附子躑躅秦艽菊花乾薑防風雄黄麝香丹砂斑猫各四兩蜀椒連翹鬼翦羽石長生知母各八分鬼臼各十一分人参王不㽞行石斛天雄烏頭獨活防己莽草各十二分水蛭百枚蜈蚣二條蝱蟲地龍各十枚右諸蟲皆去足翅熬炙令熱為散以酒服方寸匕其病入髪令髪白服之百日愈髪還黒換肌散出衛生寳鑑治大風疾年深久不能愈以至面毛堕落鼻梁崩顱腫破不至逾月取效如神白花蛇三兩酒浸一宿黒烏蛇三兩酒浸一宿地龍去土二兩當歸細辛香白芷各一兩天麻二兩蔓荆子葳靈仙荆芥穗甘菊花苦参紫参沙参木賊沙苑蒺藜石灰木炙甘草天門冬赤芍藥九節菖蒲定風草何首烏胡麻子炒黄川芎草烏頭蒼术浸去皮木鱉子以上各三兩右為細末每服五錢匕酒調下食後酒多為妙烏蛇丸出聖濟總錄治大風癩疾若復脈斷指節零落脚下有瘡語聲嗄不可治如未此病宜服烏蛇一具酒浸去皮骨取肉三兩檀香剉丁香茜根剉紫葛剉防風去蘆苦参獨活去蘆頭沙参去蘆頭梔子仁酸棗仁生用槐子炒白芷附子炮製去皮臍藁本去苗土羚羊角鎊蒼术剉炒犀角羖羊角防己桃膠生用萆薢蕪夷仁炒栝蔞根剉秦艽烏藥剉各三分桑根白皮剉三兩木通剉一兩半右𢷬為末煉蜜丸如赤小豆大毎服空心温酒下十丸至十五丸日二不飲酒薄荷槐白皮湯下如要速瘥宜用後湯下藥桑枝湯出聖濟總録治大風癩疾下藥桑枝栁枝槐枝枸杞根黄荆根羚羊角鎊各一兩右並生用剉如麻豆大每用藥五錢以水一盞半煎取七分去滓下前丸服一月必覺四肢皮膚痒痛不可忍但宜飲酒睡不得搔抓仍飲食避外風如有汗必腥臭及有蟲從皮膚中出如面塵或如馬尾頭髪内或如綿絲尖或如麩片頭黒身白形色不定但痒之後仔細看之或從小便中出或從泄利中出者大效此疾少退終身禁房事及急忌動風物時以苦参湯洗浴須換新衣其舊衣並床薦等並禁之治大風瘡草烏木鱉子白膠香五靈脂白芷烏藥麻黄桔梗枳殻天麻防風白芍藥黄耆各一兩半虎骨甘草一兩半大風子二斤黒神散消風散烏沉湯當歸各一兩半片腦五錢麝香一錢烏蛇二條川芎何首烏各一兩半大黄一兩通聖散一兩半右為末煉蜜為丸毎服二十丸温酒吞下不拘時候婁金丸治大風癩疾方見諸風雜治茯苓丸出聖濟總錄治諸癩膿潰體虗氣熱榮衞不清風鼓於脈白茯苓去黒皮石斛各一兩半人参蒺藜子羚羊角枳殻五加皮各一兩酸棗仁五味子各一兩半雲母粉二兩莵絲子酒浸一宿另𢷬焙三兩黄耆防風細辛獨活杜仲去皮炙一兩鹿角膠二兩㯽榔天雄一枚續斷剉焙二兩澤㵼當歸焙兩半熟乾地黄焙三兩甘草炙