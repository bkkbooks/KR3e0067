麻黄去節以上各一兩蔓荆子防風白芷葳靈仙各一兩右為細末用藥三錢栁桃枝各一把水五升同煎臨卧熱洗忌五辛物犀角丸出聖濟總録治一切大風瘡烏犀角梢一兩升麻黄芩去黒心防風去蘆人参當歸切焙黄耆剉乾薑炮黄連去鬚甘草剉梔子仁各半兩大黄煨剉一兩巴豆去皮心炒硏三十枚右為末煉蜜和杵丸如桐子大每服三丸温湯下以利三兩行為度不利以意加之百神散出聖濟總録治一切癩病風瘙瘡癬徧身瘙痒百節疼痛眉毛墮落皆爛耳聾四肢痿痺天雄炮裂去皮臍附子炮裂去皮臍茵芋炙躑躅細辛去苗葉烏頭炮裂去皮臍乾薑炮菖蒲甘草炙石南葉各一兩防風去蘆白术獨活去蘆頭各一兩右為細散每日空心温酒下四錢日再服莽草散出聖惠方治風身體如蟲行莽草剉炙一兩細辛人参去蘆頭芎藭甘草炙凌霄花白蒺藜㣲炒去刺當歸麻黄半兩去根節杏仁湯浸去皮尖䨇仁麩炒黄黄耆剉防風各一兩去蘆頭天麻一兩半右為散每用藥一分水一大盞煎至五分去滓不計時候温服又取此藥二兩用苦参五兩白礬五兩桃栁枝各五兩水一石二斗同煎至七斗布濾去滓暖室中浴浴後宜服煎散雄朱散出直指方治大風雄黄朱砂滑石阿魏雌黄雷丸炒藜蘆炒硫黄生犀角屑各三錢半芫青蟲斑猫虫各去翅足糯米炒透各二十四個黒皂莢剉焙七錢半右為細末每服三錢早晨温酒調下明日再服丹参散出聖濟總録治大風癩疾丹参剉炒令黄六兩蒼术剉四兩葳靈仙去苖土仙靈脾𤣥参人参各二兩沙参一兩紫参一兩甘草一兩生剉羌活去蘆頭三兩獨活去蘆頭一兩黄芩去黒心半兩右為散食後温熱水調服三錢卧時再服若幸無瘡口不斷瞳人鼻梁不塌服之一月便瘥茵芋酒出聖惠方治大麻風疾茵芋烏頭炮製去皮臍天雄炮製去皮臍附子炮製去皮臍川椒去日及閉口者㣲炙出汗躑躅醋伴炒令乾乾薑炮桂心防風去蘆頭石南葉炙莽草各一兩㣲炙右為細末以生絹袋盛以清酒壹斗伍升浸之至七日滿後每日空心及夜卧時煖一小盞服防風散出聖惠方治風在頭面胃間如虫行或頭眩目中淚出防風一兩去蘆頭天雄炮製去皮臍細辛烏頭炮製去皮臍朱砂細硏乾薑炮製莽草㣲炙白蒺藜炙附子炮製去皮臍人参去頭當歸各半兩右為細散每服不拘時候以温酒調下一錢莽草丸出聖惠方治風皮膚瘙痒如虫行頭目旋悶莽草烏蛇各二兩酒浸去皮骨炙黄天麻川升麻蟬殻炒細辛赤茯苓附子炮製去皮臍芎藭甘草各一兩炙蛜􅖉半兩炙麝香二分研右為細末麝香同研令匀煉蜜為丸如桐子大每服食前以温酒下十五丸白殭蠶丸出聖濟方治大麻風白殭蠶炒蛇蜕燒灰皂莢刺燒灰蝦蟆燒灰防風去蘆薄荷根剉茵陳根剉蜥蜴炙蘭香根剉腰大皮灰皮中子灰各半兩右除為灰五味外搗羅為末拌和令匀用烏蛇卵為丸如梧桐子大每服二十丸空心酒下一無蛇卵用烏蛇肉為末酒煎如糊為丸亦得烏蛇丸出聖惠方治大風皮膚生瘡腫瘙痒肢節疼痛心膈壅烏蛇酒浸去皮骨炙𤣥参沙参去蘆頭人参去蘆頭五加皮防風去蘆頭苦参剉虎脛骨酥炙天麻敗龜酥炙羚羊角屑各一兩右為末用皂角十挺以水二升揉汁去滓煎似稀餳和藥末搗丸如桐子大每服食後以温水下三十丸白花蛇散出聖惠方治大風疾皮肉變改眉鬚欲落白花蛇五兩酒浸去皮骨炙露蜂房炙薯蕷炙各二兩苦参二兩半剉防風去蘆頭丹参梔子人参秦艽𤣥参白蒺藜㣲炙去刺獨活各一兩右為細散每日空心用温酒調下二錢晩食前再服天南星丸出聖惠方治毒風久四肢週身如虫行搔之不觧天南星天麻白附子炮羌活白殭蠶炒槐角生用槐實各半兩炒麻黄去根節犀角屑各二兩右為末别入膩粉一分研令勻煉蜜為丸如桐子大每服不拘時候以温酒下十五丸麻子湯出千金方治大風四肢週身攣急風行在皮膚身勞强服之可已又治精神䝉昧者秋麻子三升浄擇水漬一宿防風桂心生薑石膏碎綿煨橘皮各二兩麻黄三兩竹葉葱白各一節香䜴一合右㕮咀先以水二斗半煑麻子令極熱濾去滓取九升别煑麻黄沸掠去沫内諸藥汁中煑取三升去滓分三服空心服當微汗出以粉塗身極重者不過三兩劑輕者一兩劑即瘥有人患大風賊風刺風加獨活三兩比之小續命湯準當六七劑一方加細辛仍忌葱菜紫参散出聖濟方治痺肺風毒攻面皮膚生瘡成大風疾紫参防風去蘆蘹香子炒苦参何首烏炒去黒皮葳靈仙去苗土天麻各一兩烏蛇白花蛇二蛇同酒浸七日和骨炙各三兩丹參卷柏各一兩蒼术去皮炒三斤右搗羅為末更用胡麻子不計多少先蒸熱後入鍋炒焦為末每胡麻子一斤入藥末三兩一䖏拌勻每服三錢温蜜水調下日三服喫藥三日後覺渾身疼是效仍不可住藥日三服天雄散出聖惠方治大風癩疾癱癕骨内疽百節痛眉落身體㿇㿇痛痒目痛煩燥耳聾齒齲痔瘻天雄炮製去皮臍細辛去苗土烏頭炮製去皮臍莽草炙乾薑各一兩石楠炙菖蒲防風去蘆各二兩白术獨活去蘆頭各三兩右為末空腹温酒調下三錢日日一服一方名千金散雄黄散出聖惠方治大風疾肌肉欲壞有虫雄黄硏阿魏麵褁煨令麵熟為度滑石朱砂研藜蘆去蘆頭白歛犀角屑紫石英各半兩細研水飛過雌黄一分研雷丸三分研右為細散入研了藥都研令勻取端午日或三元日或午日及六月六日預合之每服空心以煖酒調下二錢服藥後或覺心逆不得便吐吐即藥無功服藥後虫必出甚驗如未應次日再服忌生血物野狸肉治風皮膚瘙痒恰如虫行出聖惠方蒺藜子白礬各三兩蛇床子躑躅花蒴􅀢子凌霄花苦参大㦸大川黄芫蔚子各二兩右剉以水五升酒三升相和煎取三升去滓次入白礬末更煎三五沸以磁器盛之旋用塗於痒處百畏丸一名丹砂丸出聖惠方治一切癩疾丹砂研水銀桂末乾薑末烏頭末菖蒲末蜀椒末藜蘆末柏子仁各研一兩右再同研勻先用醇酒二升於銅器中熬令减半次下諸藥末并膏更添醇酒二升攪令得所丸如桐子大每服三十丸薄荷茶下三日服漸加丸數三十日眉髪復生又三十日復本也一方入漆五合熬攪勻為丸隂乾每日空心及晩食前用荆芥槐白皮湯下二丸赤箭丸出聖惠方治大風疾赤箭赤桂茵芋地骨皮烏蛇各五兩白楊皮十兩去皮以上剉細末以水五斗於釡内煑至一斗濾去滓澄清再煎成膏和後藥用防風去蘆頭天麻青蒿末各五兩右為末以煎成膏和丸如桐子大每服食前以荆芥湯下十丸枳殻丸出聖惠方治熱毒風腫頭面痒如虫行枳殻麩炒黄天門冬各一兩半焙獨活黄連防風去蘆頭白蒺藜炒去刺苦参各一兩烏蛇二兩酒浸去皮骨炙黄苗桂一分右為末煉蜜為丸如桐子大每服不計時候以温水下三十丸治身體瘙痒或生瘾疹如虫行浴方出聖惠方芫蔚子白蒺藜羊桃根苦参漏蘆各五兩蒴􅀢蒼甘莖葉各一斤塩三合栁枝條半斤右剉以水一石煮七斗去滓飽食看冷煖浴浸之當汗出水稍冷便出宜避風不過三次效八葉湯出三因方淋渫大風瘡桑葉荷葉地黄葉皂角葉芎葉蒼甘葉何首葉菖蒲葉右等分晒乾燒存性為末入滚水洗手面身體大風惡疾瘡痍荼毒膿汁淋漓眉髪墮落手足指脱痺痛痒顔色枯槁鼻塌眼爛齒掀唇掲病證之惡無越於斯負此病者百無一生猶且愛戀妻子不能㤀者利不仁之行死而無悔深可悲傷凡遇此疾切須戒塩及一切口味公私世務悉宜屏八仙丹出御藥院方治大風癩病白附子天麻升麻丹参葳靈仙細辛赤箭各一兩蜈蚣一對炙去頭足右同為細末每用一兩八錢藥末用淘净胡麻子一升重五兩炒令香熟入藥末同搗令極細煉蜜為丸分作十丸每日食後米湯嚥下一丸日進三服服之十日或一月或兩月筋骨疼痛是其驗也比至有驗且忌出入行動醉仙散一名換肌散出衞生寳鑑治大風疾遍身瘾疹瘙痒麻木亦治毒氣藴積攻衝瘍潰胡麻子牛蒡子枸杞子蔓荆子各半兩四味一䖏同研白蒺藜苦参苽蔞根防風各半兩右為細末每用十五錢末入輕粉一處拌勻每服一錢清茶調下煎甘草貫衆湯潄晨午夕各一服後五七日先於牙縫内出臭黄涎渾身疼痛次後利下膿血病根乃去八寳散治風癩皮頑癬久不差者效藿香破故紙大腹皮梹榔雄黄輕粉硫磺枯白礬各一兩右為細末麻油調擦日上数次痒則擦之普濟方卷一百九
