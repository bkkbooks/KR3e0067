body:
  text: 普濟方卷二百八十四明周王朱橚撰癰疽門諸癰疽牡蠣大黃湯牡蠣木香大黃煨各等分右㕮咀每服五錢水一盞半煎至七分春夏露溻一宿於雞鳴時服之冬月於暖處放一宿婦人重身者勿服此藥快利三兩行便勿服又方專治癰疽發背一切惡瘡裏托散消內補散不用溫藥且易合親服有效黃耆三兩白芍藥二兩甘草一兩右為粗末每服四錢以水一盞半煎至八分通口服無時截毒散治發背癰疽未有赤腫大痛穿山甲合蛤粉炒焦取甲一兩木香半兩白丁香一分右為細末每服二字瓜蔞酒調下不拘時候檳連散治癰疽瘡腫未潰已潰皆可傅檳榔黃連各半兩穿山甲大者十片燒存性右為末先點好茶以翎毛刷過瘡仍以茶清調藥傅瘡上如熱甚則以雞子清調傅膿已潰則用長肌藥未快則用替針丸如見瘡口後用此藥數次了却用萬金膏貼之候膿盡惡肉潰即用生肌散一方乳香膏奪命散川大黃一兩牡蠣燒半兩龍腦服時用一字右細末每服三錢好酒三盞煎至二盞放冷入片白腦子半字分三次服以利為度追毒信效丸治諸惡瘡疽腫毒悶痛活血回瘡明信砒鉛丹各半兩菉豆粉一錢右研化蠟一錢一字油五點為丸如大麥大絍瘡內先用溫漿水洗了絍瘡後上白玉膏寒水石焙作粉便是也穿山甲散治癰疽諸痛未有頭者穿山甲一兩炒天花粉二兩白芷二兩右為細末每服二錢用酒調下追膿散治癰疽未破用此藥潰爛膿水乾快乳香半兩研巴豆十個去殼微帶油雄黃半兩研右細末每用少許貼在軟處又方加麝香少許用蒸餅為丸作小錠子夜明砂膏潰腫排膿夜明砂一兩辣桂半兩乳香一分右細末入乾砂糖半兩研和井水調傅膏星烏散治癰疽已結未作冗潰大南星草烏頭辣桂等分右末用酒或醋調傅軟白紙貼未冗再用斂毒散傅四圍收毒南星赤小豆白芨等分右末井水調附四圍軟帛貼上蚣蝎散治癰疽瘡口小而硬貼膏藥膿不出是為風毒所勝用赤足蜈蚣一條去頭足全蝎三枚實全尾者並皆用木香一錢右為細末用時先以豬蹄湯洗疽了以帛挹乾去毒每用一字摻於膏藥錢上堆瘡口貼其效如神每用神異膏合先量疽大小塗在紙花上了却用此藥摻於膏藥上要使先到瘡口故也如瘡口開闊不硬勿用若是風邪所搏即煎連根蔥白五莖次入白紙末半兩少頃濾清淋洗明日又洗仍服不換金正氣散皂刺散治癰疽等患宣毒排膿首初便服紫黑色皂角刺連皮瓜蔞等分北五靈脂減半右銼細每服四錢酒二大盞煎至六分入乳香少許溫皂角刺能宣毒萬金一醉膏治癰疽發背宣𨗳惡核腫腦痛背已潰未潰排膿托裏婦人乳癰皆治之一名萬金湯瓜蔞一箇去皮碎研甘草生粗末半兩沒藥水中研二錢半右用紅酒三大碗同於銀器內煎取其半分兩服溫服之在上食後服患在下食前服重者再劑以瘥為度出血或出黃水是效又加當歸白芷并明乳香更要宣毒加紫皂角刺一分一方名栝蔞酒如大便不利可間服拔毒散方見前生薑甘桔湯治癰疽諸發毒氣上衝咽喉胸膈窒塞不利北桔去蘆頭一兩甘草生生薑各半兩右銼細每服三錢井水煎服托裏黃耆湯治癰疽發背發髭發鬢發眉發腦婦人妳癰等定痛去毒瓜蔞黃耆各半兩甘草炙二錢右分作兩服每服水一盞半酒半盞煎至一盞去滓溫服如已作膿加皂角刺少許未作膿止依正方替減丁香丸草烏尖硇砂白丁香堅者右為末酸醋調點將破者令速潰但有急則無如刀為快蜞針一法亦妙斂瘡口散治癰疽發背無問男子婦人先多服五香連翹湯𢾗服導去惡物須詳老少壯弱多少用藥次服托裏散𢾗帖又次服內補十宣散不計服𢾗外用四圍散貼中間留小孔不得以藥塗盡須留小孔出氣其四圍藥散如左天南星去皮天花粉各三錢芙蓉葉四錢右為末用靈脂芭蕉雞子清傅赤腫加黃皮若腫不消痛不住及要收口用桃紅散桃紅散白芨石膏煆黃丹炒右三味為末乾貼之又方烏梅燒灰赤石脂牡蠣右同為末蜂糖調傅射膿丸治諸瘡癤膿水已成即當針開決出陳臭惡瘀若其惡瘀不出欲針石須當針開發用此藥以射出其膿砒霜半錢白礬灰一錢黃丹一字右為末麵糊為丸撚作錠子每用貼瘡頭欲出處以膏藥貼之自潰癰疽瘙瘭惡瘡妙方生髮燒存性三分皂莢刺燒帶生二分白芨一分右細末乾摻或井水調傅皂莢刺能行諸藥神仙黃礬丸此藥止痛疼不動臟腑亦治癰疽發背毒瘡諸般惡瘡皆效一名黃蠟丸白礬一兩用明亮好者研黃蠟半兩黃色好者鎔開右和丸如梧桐子大每服十丸漸加至二十丸熟水或溫酒送下未破則內消已破則便合加服金石發動致疾更用白礬末一兩匙頭以溫酒調下亦三五服效有人遍身生瘡狀如蛇頭服此一效他方雖稱竒驗服近百粒方有力此藥能防毒氣內攻蓋能護膜也不可忽其淺近漏瘡用油髮灰和雞內金末外塞於始終服半斤瘡愈後服之尤佳不問老幼皆可服之服至一兩以上無不作效一方治蛇咬只溶化白礬乘熱滴傷處痛即止毒氣即趂出立見效要知白礬大解毒也屢試神效活人不可概舉忍冬酒治癰疽發背初發時便當服此不問疽發何處發眉發頥或頭或項或背或腰或脅或婦人乳疽癰或在手足服此效仍兼以麥飯石膏及神異膏塗傅妙若鄉村或之無得藥材者虔心服之忍冬藤生取一把以藥入砂盆內爛研入餅子酒少許生酒尤佳調和稀稠得所塗傅四圍中心大留一口泄其毒氣其藤只用五兩木槌微微槌不可犯鐵器大甘草節一兩生銼右入砂瓶內以水二碗用文武火慢慢煎至一碗入無灰好酒一大碗再煎十數沸去滓為三次溫服一日一夜連進喫盡如病勢重一日一夜要兩劑服至大小腸通利則藥力到沈內翰云如無生者只用乾者但不及生者力大而效速又木蓮木葉四十九片揩去毛研細酒解溫服功與忍冬草不相上下又龍鱗薜荔一握細研以酒解汁溫服亦能瀉下惡物去根本忍冬藤凌冬不凋故名其藤左繞附樹延蔓或在園圃墻籬之上藤方而紫葉似薜荔而清故又名左纒藤二月開花五出微香蒂紅色花初開則色白經一二日則色黃故又名金銀花又名鷺鷥藤又名金叉股又名老翁鬚善治癰疽發背尤勝紅內消又大治五腫飛尸以滓去腫毒洗藥神硝散蛇床子二兩為粗末朴硝一兩研右和勻每服用三錢重水一碗煎三五沸去滓通手洗摻後末合瘡口牡礪地黃膏治癰未破腫痛大黃一兩為末牡蠣鹽泥固濟煆赤出火毒一宿研令極細取末稱二兩右用生地黃研取自然汁調塗乾用地黃汁刷濕已上各方治癰未破腫痛破後塗角畔餘腫臨時詳酌更換用之一方單用大黃為末苦酒和貼亦可一方毛疊菜又名驅風草治諸般癰癤惡瘡貯耳其草葉梗皆有白毛開白花子先緑而後紅顆中有穰子更治風毒腳氣先煮沸水一盆盛出入藥候冷淋洗腳腫消痛住大有功效黑鉛酒方治發背及諸癰毒并發腦疼痛侵潰黑鉛一斤甘草三兩微炒右用酒一斗著空瓶之傍先以甘草置在酒瓶內然後鎔鉛投在酒瓶中却出酒在空瓶內取出鉛依前鎔後投如此者九度并甘草去之只使酒冷病者飲醉寢即愈治癰疽發背及腦疽不論年逺日久新近諸般惡瘡冷漏股瘡七八月收自落地茄子花去蕚不用又八九月收黃蜀葵花去心蕚不用右並曝乾等分為細末每服用口先含漿水洗瘡令淨以軟帛挹乾却以此藥乾摻若稍覺赤腫硬痛時用漿水調藥如稀糊以鵝翎掃所患處用紗帛子護定如腦疽不須洗只以軟帛拭去膿血乾摻每日一易三次神效忌豬肉魚鮓濕麵雞羊鵝油炙􅏼煎炒毒物五十日陳氏經驗方云余每念世人以疾病為苦而庸醫嗜利偶有名方必乘人之急邀求無厭不稱其欲則反以致害富者固以不堪況貧者而遭此故余遇有名方必務廣傳若貴若賤皆得良藥無有疾苦余今得一治發背瘡藥甚簡而有神效勿外藥材易得而生輕慢之心其妙有不可言者余在臨安散施約救五六十人又在金陵散施救濟百餘人知其有神效聖功敬録此方鏤板傳之四海願皆得此藥悉救病苦如有掩藏此方及毁壞者明神誅殛普願同志廣而傳之此跋不知誰氏所作但觀其辭切切然則所傳必有自而所施必有效余既得之不敢不廣其傳以成美志云一名妙勝散如聖散治惡瘡背腦疽寒癰吹妳打撲損傷一名皂針散甘草一兩半生半熟皂角針刺三錢燒存性古為細末每服三錢酒調下無時如熱甚即以此下雄尖丸此方屢試有竒效甚者服至數升無害藤黃煮酒散治癰疽腫瘡深附骨在腹雖腫皮膚不熱顔色危惡或瘻或疳婦人妳一切血氣不和留畜胳􅭫攣皮於筋骨不能行步鷺鷥藤莖葉乾用二兩花尤妙生地黃乾者一兩右為粗末酒四升和入大瓶內油紙竹葉牢封瓶懸釡內煮二三百沸香熟後冷就瓶紗濾出酒每服一盞日三夜一溫涼隨時順意服宣毒一醉膏瓜蔞一箇去皮老翁鬚一兩半焙右銼酒水等分同煎少頃入開口正川椒四十九粒臨熟又入乳香沒藥末少許任意服宣毒方斑貓一枚只去翅好大棗一枚去核包裹斑貓一入豬腎中線紫青竹葉重包濕紙褁煨熟去斑貓右空心喫豬腎溫酒下癰疽毒入臟腑嘔吐惡食方甘草焙半兩丁香三錢半右銼每服二錢水煎入麝少許溫服仙靈散治癰疽腫毒傅藥收腫斂毒排膿滑蘭搝皮末紫具草搗右同搗酒調為膏傅或密水調亦好滑蘭把毒紫具散血或單用紫具草亦效川烏散癰疽初發急用川烏螟蛉窠土等分右細末法醋調傅未結則散已結則潰收毒外消膏斂瘡一名內消膏黃明牛皮膠以長流水半升溶開一兩虢丹再煎栁枝急攪五六沸一兩重右候冷收入磁合以雞羽攤於瘡上留口如未破傅腫自消保安妙貼散治癰疽發背腫毒透明硫黃為細末喬麥麵各二兩右用井花水調和作餅焙乾收下要用時再末之入乳香少許井水調厚傅瘡上如乾以雞羽蘸新水潤之內托散治發腦發鬢發髭乳癰癰疽腫毒惡瘡發背內潰及諸惡毒衝心嘔逆作吐或心疼三兩服見效托裏止痛解煩渴退虛熱一方香粉散如此至瘡愈方歇痛則不痛不痛則痛神驗一名粉乳托裏散菉豆粉一兩研乳香一分銀器內慢火炒以手指候攪可撚急傾在紙上用扇搧冷研令細入菉豆粉一方用一而乳香坐水中研細右同研極細每服二錢至三錢惡癰惡瘡並用濃煎甘草湯候溫調臨卧服一切癰疽發背內潰及諸惡毒氣內行衝心煩嘔極為惡候用新汲水調下一錢水不須多唯欲在膈上內托毒氣使不內攻日進三兩服可救一命兼治打撲損傷諸般內損蛇蟲咬傷溫酒調下空心服若些小即內消大損則敗血自大腸去矣凡癰疽膿血出未收斂間常須服之一方乳豆膏治癰疽腫癤疼痛用菉豆只取肉一兩乳香竹葉裹尉斗尉一分為末酒調傅傘紙調乾則再傅續後換消腫排膿藥一方或瘡已沉晦用當歸一錢辣桂二錢煎湯調下仍以加味不換金正氣散為佐小兒豆瘡陷入粉乳散能救之瘰􅊓攻心嘔悶通治凡有癰疾宜先多服此藥一日至三日連進十數服可免變證使毒氣出外服之稍遲毒氣攻衝臟腑漸作嘔吐後來遂多致咽喉口舌生瘡黑爛生􅌲名曰心氣絶飲食藥餌無由可進如瘡發三五日之後此藥但可間服當别用藥以治之楊氏家藏方言有人因鼻衄初愈不曾表汗餘毒在經絡背發大疽自背下連腰脅腫甚堅如石色極紫黑醫以涼藥傅之中夜大嘔及連進此藥三四服嘔遂止既而瘡潰出赤水淋漓四十日而愈又有患瘰􅊓者痛過輒嘔亦止近見有人病疽醫者不肯用此藥恐傷脾胃愚故引楊氏之言以解世人之惑祕方白梅散治一切無名癰癤腦癰乳癰及小兒軟癤未成者散已成者小未潰者破未愈者定排膿止痛去舊生新其效如神萬金不換一應毒物休食立效鹽白梅火燒存性研為細末輕粉少許不可多無亦得右細末用真香油濃調翎毛蘸抹如成膿未潰中心留些休抹通氣抹至膿盡不妨頻抹為妙背癰腿癰皆可用黃茋丸清心內固綿黃耆人參各半兩右細末入真生龍腦一錢研細用生藕汁和丸菉豆大每用三十丸溫熱水下加至四十丸日三服生肉神異膏治癰疽壞爛諸瘡發毒雄黃五錢滑石焙用右為末洗後摻瘡上外用綿子覆蓋相護凡洗後破爛者用此貼之治癤毒及癰疽發背初作時貼散立效一名芙蓉散闕右為細末生薑自然汁調如膏傅瘡腫四面留一小竅出毒氣乾則易之其冷如氷痛止腫散毒氣盛者加南星末等分五香連翹湯凡惡核瘰􅊓癰疽惡瘡腦背或炙後更服亦妙青木香三分桑寄生二分沉香一兩雞舌香去頂一分木通一兩生黃耆一兩麝香二錢大黃一兩酒浸乳香藿香川升麻連翹各半兩右為細末每服四錢水一大盞煎至七分任性服略踈通或即取下惡物然後服內托散之類則毒勢易散不為深害亦有隨即消散者此藥早服為佳地黃煎補虛除熱散乳石去癰癤痔疾用生地黃隨多少用三搗三壓取汁令盡銅器中湯上煮勿蓋覆令泄氣得減半出之布絞去滓碎結濁滓穢再煎令如餳丸如彈丸許酒服日三枸杞煎治虛勞輕身益氣一切癰疽用枸杞三十箇銼葉生至未落可用莖葉落至未生可用根以水一石煮取五斗去滓旋將滓更入釡與水依前煮五斗并前為一斛澄清去渣釡中煎取二斗許更令小銅鍋子煎令稍稠如餳止或磁器盛重湯煮更好每日早朝服一合半日再初服一合漸加二聖散治癰疽發背隂匿處通身有數十癰者用乾牛糞燒灰治下篩以雞子白調塗之乾復易若已結膿使聚長者方用括蔞根為末以苦酒和傅上燥復易赤小豆亦佳一方蔞根燒存性為末酒服之牛膠飲截癰疽惡瘡發險處服之如毒氣不攻於內可從外靣傅之用牛膠通明好者淨洗乾稱四兩為凖用酒一碗入膠重湯煮令膠鎔透攪勻傾出更浸酒隨意飲盡若能飲者以醉為度不能飲者亦用酒煎却浸以白湯飲盡為佳此法活人甚多一方不用酒以湯泡膠一方攤紙上隨瘡大小貼之國老膏治一切癰疽腫毒由服金石炙􅏼酒色而成者初發即預期飲之能令毒不內攻功效不可具述一名獨聖湯用大橫紋粉草二斤捶碎河水浸一宿揉成漿汁濃去盡筋滓再用密絹濾過銀石器內慢火熬成膏以磁器收入每服一二匙無灰酒浸化白湯亦可曽復燥藥丹劑亦解之雖微利無妨卧時一服五更一服取下惡物效一方以山泉溪澗長流水一小碗徐蘸水慢火炙水盡為度稱一兩為粗末醇酒三碗煎二碗空心服活血消毒遠志酒治一切癰疽發背癤毒惡候浸大死血隂毒在中則不痛服之即覺痛有憂怒等氣積而內攻則痛不可忍傅之即不痛或藴熱在內熱如火逼手不可近傅之即清涼或氣虛血冷潰而不斂傅之即斂若七情內鬱不問虛實寒熱治之凡隂毒在中者不覺痛故傅之即覺痛也用逺志不以多少泔浸洗去土捶去心為末酒一盞調藥末三錢遲頃澄清飲之以滓傅病處潁川韓大夫家纍世用此救人其驗如神又方治癰疽發背初發時更當服此不問疽生何處發眉發頥或頭項或背腰或脅或婦人乳癰或在手足用木連四十九片揩去毛研細酒解溫服功與忍冬草不相上下先服忍冬酒後服此又方用龍鱗薜荔一握細研以酒解汁溫服亦能利下惡物去其根本又方用紅內消不限多少納磁瓶中入水用文武火濃煎臨入無灰好酒與藥汁相半再煎數十沸去滓時時服之留滓焙乾為細末酒浸麵糊丸如梧桐子大空心溫酒服下三十丸為疾退常服之藥蓋力輕故也藥産建昌良茱萸散治癰疽結未成餅氣凝滯腫結成塊者用茱萸微炒為細末雞子清調塗病處神效輕者宜用此方若受重者既消而再來一方不用雞子清以醋和塗或醋和小蒜或薑亦可凡癰疽覺見稍大及發背初作及不問老少一名樊針正法以井邊淨泥傅瘡頂上看其瘡上有一點乾處即是正頂先以大筆管一箇安於正頂上却用大馬蜞一條安其中頻以冷水灌馬蜞當吮其正穴膿血出毒散是效如毒大蜞小須三四條方見功腹傍黃者力大若吮著正穴蜞必死用水救活其瘡即愈纍試甚效去毒之一端也若血不止以藕節上泥止白茅花亦妙馬蜞又名黃蜞本草名水蛭吳內翰備急方云其姪祖仁一日忽覺背病初腫後益大用此治之逮晚即安治癰疽惡瘡毒腫赤白遊軫用五毒草根醋磨傅瘡上亦搗莖葉傅之恐毒入腹亦煮服之效勝金方治發背發腦及癰疽熱癤惡瘡等以臘月頭銼入瓶內密封久愈佳塗帛上後封之熱痛者得藥如氷頻換瘥冦宗奭治丹毒發於背及一切癰腫金星草根葉一分用酒一大盞煎汁服不惟下所服石藥且毒去瘡愈如不欲酒將新汲水調二錢服以知為度癰疽宣毒方用黑牽牛去皮取仁入豬腎中線扎濕紙包熱火灰內煨香熟候冷溫酒嚼下又方治癰疽發背一切瘡腫未結成者服之內消已結成者服之易潰兼減痛疼一名金銀散用老翁鬚草一名金銀花忍冬草鷺鷥藤水楊藤左纒花五出而白微香蒂帶紅色野生延蔓花與葉生搗暖酒調服無花只用葉酒和葉烘暖可傅瘡蜀葵膏治癰疽腫毒惡瘡黃蜀葵花用鹽摻收入磁器密封經年不壞患處傅之自平自潰蜀葵子炒碎入宣毒藥中尤驗一方冬葵子為末以酒調之一方無花根葉皆可涌泉膏治癰疽軟而瘡頭不破或已破而瘡頭腫結無膿用斑貓去頭足翅焙為末揉和蒜膏如小豆許點在膏藥中瘡準口處放之少頃膿出即去藥或用緑礬真雀糞少許用餅藥調一點傅瘡頭軟處亦破須四圍塗藥護之神授香附湯治癰腫結硬聚毒作痛夷堅志云時康祖事夷廣德張王神授方一名蜀聖散用香附杵去皮用生薑汁浸一宿晒乾末每一錢半米飲調下或紫蘇甘草煎湯調下進數服腫硬自消有膿即出毒氣散治癰疽瘡腫方以紅茂草採根葉焙乾搗羅為末冷水調貼治癰疽熱毒用糯米三升㨂去粳米入瓷盆內於端午前四十九日以冷水浸之一日兩度換水輕以水淘轉逼去水勿令攪碎浸至端午日取出隂乾生絹袋盛挂通風處旋取少許炒令焦黑碾為末冷水調如膏藥隨大小褁定瘡口外絹白包定更不要動直候瘡愈若癰疽毒瘡初發才覺焮腫赤熱急以藥膏貼之明日揭看腫毒一夜便消治諸癰疽發背或發乳房初起微赤以黃蘖末雞子白塗之又方以豬蹄兩隻通草六分以綿褁和煮作羮食之治癰疽痔􅂒惡瘡及小兒丹方以蠐螬為末傅上梅師方療癰發背初覺未成膿者或在胸乳房初起微赤不急治之即死速消方以苧根葉熟搗傅上日夜傅勿已消腫拔毒七寶散治癰疽止痛用乾荷葉心當中如錢片不計多少為粗末每用三匙水二碗慢火煎一碗半放溫淋揩乾以太白膏傅沈遇明一方治癰疽止痛消毒一名二妙散荷葉一兩藁本半兩右為細末如前用太白膏用寒石飛過用臘月豬脂調成膏隨瘡大小用薄紙攤貼之治癰疽已有瘡眼未出膿痛不可忍用此藥絍即膿出用巴豆一箇去皮膜不去心油鹽䜴十四箇口中含去皮令軟同研爛入真麝少許如難丸入少稀糊揑作餅或如鼠糞尖或丸子臨時看瘡口絍之只以紙撚子送入藥便不用紙撚子須臾必痛忍之良久膿遂出治癰疽發背腎癰妳癰一切瘡腫等疾生於險處者一名鹿木散用鹿撲在處人取其業搗汁投溪潭中以醉魚江西人謂之魚酩草紹興人謂之鹿木臘中取根搗銼為㕮咀每服用三四大錢無灰酒一大碗煎至七分滓空心食前帶熱服忌蔥醬酒等煎時不得犯銅鐵器病深者日進三四服並不用膏藥貼無問男子婦人癃老幼小逺年近嵗體虛氣實一切腫瘡凡在身者種類殊異悉皆治之已潰膿自出未潰毒自消不耗真原不動臟腑入少甘草石薜荔同煎尤佳有娠婦人不可服治發背癰疽只吃白煮蘿蔔不以多少腫散為度極有神效治癰疽發背有人患腎大小便皆祕以明淨牛皮炭火上燒成灰研極細每服五錢以米飲調下服至二兩許下穢惡物癰腫遂消不復出膿凡瘡腫皆可服不拘多少以臟腑通利為度治癰瘡疽痔瘻惡瘡用桐皮水煎傅之治諸癰腫發背及癰癤已潰爛疼痛用夜合煎膏消癰腫并續筋骨治凡患癰疽惡瘡出黯血不止者取地骨皮不拘多少淨洗先刮上面粗皮留之再刮取細白穰取粗皮同地骨一處煎湯淋瘡上令膿血淨以細穰貼之立效有一朝士腹脅間病疽經歲不瘥人燒骨皮傅之初淋取出血一二升其家人輩懼欲止病者曰疽似少寬更淋之以至五升許血漸淡遂止以細穰貼之次日結痂遂愈白膏藥治癰疽惡瘡發背附骨癰等瘡用􅒝麻子去皮研為泥旋攤膏藥貼之消腫散毒治癰疽癤毒膿水不出用芙蓉花煮水竹筒令熱即以水竹筒吸於癰孔上即時吸出其膿一方用芙蓉葉或小瓢代竹筒用麝香散白礬明者不拘多少焙過略存性出火毒右細研入黃丹如桃花色即止却多入麝香如治疾後膿水出之不已用此藥乾摻合入瘡口家豬散凡破諸瘡肉厚處當先廣封四面不可擦破氣泄有久患癕疽諸腫毒與疽生脛間及一切無名惡瘡百藥罔效經年不差或骨疽一名脛瘡深爛青黑四邊堅強中央膿血惡汁出百藥治不差汁潰好肉處皆腫亦有碎骨從中出者可溫赤龍皮湯洗夏月日日洗冬月三日四日一洗潰肉多者可時傅白䕡茹散須令日三四傅後常傅家豬散得稍差後用取豬矢燒作灰下絹篩似粉填敗瘡中令滿汁出晚去更傅常傅須差若更生青肉復著白䕡茹散如前法粢米粉方療諸癰發背及乳方用熬粢粉令黑雞子白和之以塗練上貼癰小傅練上作小口氣令散燥復易又方用釡底土搗取散以雞子中黃和塗之加少豉稱和以五月葫及少鹽佳療發背癰腫熱焮已熱者即出膿未熟者自然消除用牛蒡根嫩者洗去土勿令見風細切一大升以水三大升煮令爛絞去滓更盛於瓷器中重湯煎之使如稀糊以塗爛帛貼腫上熱則易之草烏頭散治腫毒癰疽未潰令內消已潰令速愈一名退熱散取草烏頭用水調雞羽掃腫上有瘡者先以膏藥貼定無令著瘡初塗病人覺冷如氷瘡乃不痛昔有人病瘡腫頗甚以此塗之坐中便見皮皺稍稍而消神明膏治癰疽瘡癤毒腫無頭疼痛或有數煩熱氣毒軟癤以五靈脂不拘多少微炒為末新水調塗於故緋絹上貼之消癰腫以白斂二分藜蘆一分為末酒和如泥貼上日三良一方醋和治癰疽痔瘻瘡及小兒丹以水煮棘根汁洗之治羊疽瘡有蟲癢以附子八分藜蘆二分為末傅之蟲自然出疽瘡骨出用黃連牡蠣各二分為末先鹽酒洗後傅若發疽於十指端及色赤黑甚難療若骨疽積年出汁不瘥熬末膠粘傅瘡上及破生鯉魚以㩉之如炊頃刮視有小蟲出更洗傅藥蟲盡則便止丹癰疽發浸淫進長用鹿角桂雞屎别搗燒合和雞子白和塗乾復上癰已有膿當使壞方用吞薏苡子一枚勿多又方以苦酒和雀屎塗癰頭上如小豆大即穿治熛疽凡熛疽者肉中忽生一黤子如豆粟劇者如梅李大或赤或黑或白或青其壓有核核有深根應心小久四面悉腫疱黯􅀈紫黑色能爛壞筋骨毒入臟腑久則不治蓋不可不慎也治之之法須以快刀著壞肉處皆割之亦燒鐵令赤烙赤三上令焦如炭亦炙黯炮上百壯為佳早春酸摹葉薄其四面防其長也飲葵根汁犀角汁升麻汁拆其熱內外療醫丹毒發也治背疽如火熱痛取野地乾人糞下土井水調塗如水透五臟治新發癰疽取髙腳地銅盤用水小滴搗取汁熬成膏用紙貼三二即如結聚多日必多貼或服治疽瘡以千年石灰四兩棗木匙一張燒灰為細末貼瘡口上茜根燒灰用小油調治癰疽用紅蓼葉以口嚼酓之勿令隔手一應癰疽等瘡用大葉草透骨草牛藤草搗細用麵欠傅之托裏藥內加減法發背丁腫膿潰前後虛而頭痛者加五味子恍惚不寧者加人參茯神虛而發熱者加地黃栝蔞根潮熱者加柴胡地骨皮利者加厚朴膿多者加當歸川芎痛甚者加芍藥乳香肌肉遲生者加白斂官桂有風邪者加獨活防風心驚悸者加丹砂口目瞤動者加羌活細辛嘔逆者加丁香藿香葉痰多者加半夏陳皮治癰疽以惡實子吞一枚出癰疽頭淋洗法療癰疽敗爛水不絶黃耆當歸白斂敗醬甘草各二兩黃芩川芎赤芍藥各一兩半右銼碎以水九升煎至三升去滓洗瘡百遍以帛挹乾乾即傅膏藥如痛甚以豬蹄汁煮藥佳若夏月以大黃二兩半黃連一兩半同煎此方神甚藿香托裏散當歸升麻葛根白殭蠶藿香連翹山梔子甘草木通牛蒡子各三錢大黃黃耆茵陳􅜰麥各五錢右㕮咀每服一兩重酒水煎去滓溫服瘡在下空心服瘡在上食後服如一二日宜蒜切錢片當頭炙無蒜錢代若痛炙至不痛不痛炙至痛三四日則不宜炙如一二日宜銀器內煎芝麻油一斤十餘沸入好酒二碗煎分作五服日夜服之又宜內托散如一二日宜大黃水煎服得利為度有熱者用之如常喜服丹石炙􅏼之人宜粉草節熬膏臨卧服五更服如二三日宜逺志洗淨為末酒調清服仍調濃傅瘡上熱則涼痛則止又宜炙足三里穴如三四日已用前法合用香藥透達經絡宜五香連翹餘無熱去大黃如已潰血熱宜十竒散虛冷未潰亦服蓋未潰不可用熱藥已潰用熱藥不可用涼藥如癰疽人有證為難治宜隨證治之渴治渴泄治泄汗治汗宜黃茋白术小麥等麒麟竭散大治發癰疽毒瘡至妙麒麟竭研赤茯苓為末沒藥研甘草節捶碎各一兩老天蘿子一箇連皮切破新者二箇右用蜜一兩無灰酒二升於銀石器中煎天蘿子甘草莭至三盞分三服調前藥如曽服金石毒發先喫豬羊血方得服藥如不曾服金石藥只是氣結更不必用豬羊血却以天蘿子酒調併進三服其瘡自穿痛立止未成膿者即自消散已穿後又進三服候膿化取下積熱毒如魚涎並不動臟腑殊聖膏治一切癰疽腫毒不消蝸牛二箇細研瓜蔞穰彈子大五塊為末黃蜀葵花葉皆可為末用二錢右用蜀葵花搗汁以前藥末和研稠粘塗瘡上留口日三換元方云三日效退用一日見效化毒散治癰疽惡瘡毒發背腦疽及婦人妳癰等疾背隂草生於深岸大澤及山谷小澗中背隂之地葉似香需金銀藤即忍冬花藤右各用一大握銼碎入酒一升同煎至一升去滓再投熱酒一升攪勻分二服放溫服以所煎滓塗瘡上藥到即便痛止未成者即消已成者即收斂穿潰至妙五白散治癰疽發背熱成赤腫及穿不瘥婦人妳癰等疾香白芷白鮮皮白芨白薇白斂各等分右為末每三錢入乳香末一字新水調服併塗瘡上出蟲膏癰疽敗及骨疽用自死蝦蟆一枚頭髮一把以豬膏一斤半分二服煎之消盡下之欲冷內鹽一合攪和以膏著瘡中日一易蟲出盡愈又方瘡口已成大窟桑白皮一分當歸半分右為末乾摻外用艾葉蘸蜜水研細塞口桑白散治瘡口有熱攻焮作痛赤爛淫汁桑白皮新者一兩苦參槐花天花粉晒各半兩右杵細末乾摻仍煎苦參桑白皮湯蕩洗癢者加檳榔輕粉五香連翹湯志寧載在易簡偹為癰疽全功審其治法要在宣熱拔毒托裏排膿其方縱不落連翹增丁香投之亦大驟宜先行發散有川芎香黃散及白芷大黃等分細末蜜醋調傅赤腫痛處蜜湯亦得一日一換差次則拔毒圓明礬一兩枯為末蠟丸桐子大每服三十丸無灰酒下定毒不走托裏則有審香散川升麻商陸根大黃各半兩黃降真吳薑黃明白礬研飛各一分右為細末溫水調服腫處便覺徹骨涼冷其腫立消已破去白礬未破用白礬治一切癰疽腫毒已破未潰抽風內消神效無比治癰疽急服此藥腫癤尤易見效或新或陳瓜蔞一箇連殼穰銼碎入平椒十粒去目閉目者不用生甘草五寸銼乳香三塊皂子大用無灰酒三大盞煎至一盞澄清溫服一兩立效大車鰲散大戟芫花菊花檳榔漏蘆已上各半兩大黃黃芩各三分輕粉一錢右為末每二錢入車鰲一錢輕粉一錢和勻五更初芥菜湯調下如人行五里久取下惡物三四行止自住少壯者加一錢小車鰲散車鰲輕粉甘草大黃各等分右為細末和勻作一服用瓜蔞一箇酒一碗同煎空心調下前藥神效膏治癰疽一切毒瘡竈灰汁即是餅藥蠣殼灰篩細糯米舂白右先將瓦盆在日裏曝要得少溫仍將一把灰一把米層層撒在瓦盆內其灰米上約留半寸入餅藥就把在日裏曝灰米發變如角黍然時或添餅藥在日曝如用藥時取上件藥以淡餅藥調之入鉢中研成膏用手傅在瘡上以早為上如瘡方發腫時便可傅藥才乾便傅以消散為效不可中輟其腫又移在别處再以藥仍前傅之才移便是作效如瘡已聚膿血則藥傅四畔只留其頭使之血出亦以盡瘡口合為度其瘡口或反膚有破損處千萬不可傅藥不可忍如婦人小兒只宜用清水或十分淡餅藥調之或以信紙先安在瘡上然後藥傅紙上更宜斟酌無日則以火代之先用餅藥在溫火上薰熱既入米灰則不可用火薰百花散治一切癰疽及諸惡瘡黃蜀葵花七枚乾者黃蘖半兩厚者去粗皮黃連去鬚二錢山梔子三枚去殼鬱金一枚右為細末每用藥末五錢許即入白芨末一錢和勻井花水調如腫未成頭即用芘子傅藥於腫處以薄連紙蓋之腫消紙落或未消即再用藥如已有頭以紙條子傅藥放寬圍之漸次圍近使毒氣不外侵生肉如欲别用藥蝕頭亦周圍用藥條圍之撮膿盡以真麻油調不入白芨以雞毛掃瘡口如大即入白芨更用桃奴末一錢正名桃梟乃是桃實著枝不落經冬不用者正月採用麻油調量瘡口大小煎拆熟青絹早晚蘸藥貼瘡上候瘡平即止治小兒軟癰尤妙如患㿌瘡止用五味藥新汲水調攤連紙上臨卧時貼兩三次見效大黃湯宣熱拔毒孫真人單煮大黃一味服取快利後人增二味效著如神大黃一兩木鱉仁半兩甘草節二錢半每服三錢入少酒煎五香連翹湯木香沉香三分丁香半兩連翹去心獨活三分或用羌活炒射干升麻黃茋木通桑寄生最治此疾如無倍升麻右為細末每服三錢煎至七分入銀少片同煎此李氏方無大黃者多服不妨與漏蘆湯間又陳無擇方同前加乳香蒸大黃一兩每服四大錢水二盞煮半空心熱服未利再進利下惡物為度千金漏蘆湯漏蘆連翹黃芩白斂枳殼去穰麩炒升麻甘草炙麻黃一兩去根節大黃一兩半炒朴硝一兩研後入右為末每服二錢薑三片薄荷三葉水一盞煎空心溫服利下惡物為度又方名絡石飲採葉并根約一蘿淨洗樁取自然汁二碗每汁八分蜜二分取性飲之滓傅瘡一宿消去已潰即可出本草神效木香散治瘡難消不能作膿痛不止地骨皮一兩去皮木香半兩穿山甲一錢炙黃麝香一字右為細末酒調下三錢及小兒㿀後生癰米湯調下效如神止痛膏治脂癰痛徹骨髓腳根腫痛泥蜂窠作窠於壁門螟蛉窠也擡持下間有之乳香少許右同碾勻用新冷水調塗之痛立止一方用釅醋調療蜂窠癰用黑蜂窠調泥法醋傅之才乾又傅癢而不痛立效右方得之循州謝推官雷仲渠家三世施此藥鄉人言是獲登第之報治諸腫毒欲作癰疽者用赤小豆末以水和塗便可消散毒氣今人往往用之有效治癰疽以蚌珠煮汁洗之主解毒癰疽神效以叉子股萬州者佳用草莖以水煎服療患毒癰疽或連隂脾疼痛急攣牽入小腹不可忍一宿則殺人用茴香苗葉搗取汁一升服之日三四用其滓以貼腫上冬中根亦可用此外國方永嘉以來用之起死神效治一切癰疽及發背用白冬瓜一二斗許大冬月收為菜壓去汁蜜煎代果遇患處者削一大塊置瘡上熱則易之分散熱毒氣甚良治初患瘡發背脅間未辨癰疽者若陽滯於隂即為癰隂滯於陽即為疽癰即皮光赤疽即皮肉紋起不澤以葫柴皮者切作片子厚一分覆之用艾炙如痛炙至不痛如不痛炙至痛初覺即便炙無不效者仍審度於正中心貼葫炙之世人往往忽略此瘡初見其瘡小不肯炙惜哉治癰疽生臭惡肉以白䕡茹為散傅之看肉盡便停但傅諸膏藥若不生肉又傅黃耆散惡肉仍不盡者可以漆頭赤頭䕡茹為散用半錢匕和白䕡茹散叄錢匕合傅之瘥治金石藥發動作癰疽渴疾以菩薩石用水磨服之治癰疽初發速用即安鯉魚灰酸醋調傅又方獨蒜細研麻油調厚傅乾即換愈治石癰無膿者生商陸根研傅頻換又方狼拔子出泉州一二粒挫細酒下利三行愈或只用水下治臀疽乳香田螺研勻又方破故紙炒熟研細酒下治癰疽以紫具殼燒煆為灰傅之治癰疽以紫荆木煮汁服之地黃膏治一切癰疽兼治毒蟲所傷石膏火煆藿香葉蚌粉香白芷雄黃研右等分同為細末以生地黃自然汁調稀稠塗瘡上四圍留瘡頭已破者亦留瘡口勿塗乾即再傅之藥厚以新水潤之其效如神神效膏治癰疽發背熱毒氣結腫痛堅硬上疼痛木通銼甘草炙當歸炙銼白芷防風去蘆細辛去苗葉梔子仁黃連去鬚黃芩去鬚鉛丹六兩垂栁枝銼二兩蠟半兩清油一斤右除丹蠟油外碎銼先以油內浸藥一宿於火上煎候白芷赤黑色絞去滓冉煎即下丹蠟栁箆攪後變黑色滴水中成珠子軟硬得所瓷合盛故帛攤貼日二次以瘥為度治諸疽附骨癰根在臟腑歷節腫出丁腫惡脈諸毒皆瘥露蜂房亂髮蛇皮右三味合燒灰酒服寸匕日三普濟方卷二百八十四
