body:
  text: 普濟方卷二十五明周王朱橚撰脾臟門脾胃不和不思飲食夫內經言榖氣通於脾蓋虛則能受也脾胃之為倉廩者如此若其氣不和則腸內虛滿不能飲食治宜調其飲食適其寒溫則病可已方神仙快活丸治婦人男子脾胃不和氣不升降腹脹腸鳴翻胃吐食嘔吐酸水不思飲食心腹痞悶水榖不消漸成泄痢酒食所傷小兒妳癖桂花二錢木香丁香青皮陳皮各一分官桂蓽澄茄肉果一分砂仁四錢良薑白果白芷二分甘松四分廣芩稜四分檀香一分沉香一分茯苓六分香附子五分麝香益智六分大椒十一箇紅杏四箇藿香一兩右為末甘草膏子為丸捻作丁香餅子又方蒼术四兩炒黑色牽牛八錢京三稜一兩一錢蘿蔔子八錢皂角二定去皮弦皂角子仁二名右為細末白麵糊為丸如梧子每服十丸先嚼餅子一箇後將藥隨唾津咽下十分味沉香透腸湯出德生堂脾胃不和中寒上氣脅肋脹滿心腹㽱痛痰逆惡心或時嘔吐飲食減少十膈五噎痞塞不通噫氣吞酸口苦失味主之白术二兩香附炒人參縮砂仁各一兩丁香炙麥蘖肉豆蔲煨白豆蔲木香青皮各半兩甘草炙一兩半半夏湯泡七次二錢半藿香厚朴薑汁炒各七錢半神麯炒草果各二錢半沉香陳皮各七錢半右㕮咀每服四錢水二大盞薑三大片棗一枚煎至八分去滓熱服一方加茯苓去肉豆蔲木香散溫脾胃消食和氣乾木瓜焙五兩益智去皮桂去粗皮草豆蔲去皮乾薑炮髙良薑厚朴去粗皮生薑汁炙各一兩甘草麥蘖神麯炒各三分生薑一斤取自然汁丁香沉香各一兩鹽一升右搗羅十四味為散研細入生薑自然汁并鹽拌勻瓷器盛每服二錢匕沸湯點服木香煮散出御藥院方治脾胃不和不能飲食心胸痞悶口淡無味及解傷寒調順中焦木香人參白茯苓去黑皮半夏湯洗七次炒白术厚朴去粗皮各一分將厚朴入生薑一分同搗炒乾乾薑炮桂去粗皮枳實麩炒去瓤甘草炙銼各半兩陳橘皮湯洗去白焙乾一兩檳榔銼一枚草豆蔲去皮二枚訶梨勒煨去核五枚右㕮咀每服三錢匕水一盞煎七分去滓熱服不拘時候大腸湯治脾胃虛飲食不和大腹銼神麯炒厚朴去粗皮生薑汁炙木香銼各一兩肉豆蔲去皮乾薑炮人參白茯苓去黑皮青橘皮湯洗去白焙桂去粗皮訶梨勒炮取皮大麥蘖微炒半夏湯洗七遍去滑焙乾各半兩京三稜炮銼一兩半右㕮咀每服三錢鹽水一盞入生薑三片棗二枚擘破同煎至七分去滓稍熱服木香丸出宣明論和脾胃寬胸膈消痰逆嘔吐進益美食官桂乾薑各半兩木香一分大黃蓬荗芫花醋拌濕炒下枳殼去穰陳皮一作紅皮半夏二兩牽牛半斤取末四兩茴香炒巴豆四個右為末滴水為丸如小豆大每服三二十丸溫水送下紫蘇丸治脾胃不和痰唾嘔逆臍腹撮痛心胸痛悶調臟止瀉紫蘇葉桂去粗皮赤茯苓去黑皮縮砂仁去皮甘草炙銼各二兩沉香銼人參桔梗炒青橘皮湯浸去白焙陳橘皮湯浸去白焙各二兩胡椒半兩右為末煉蜜和丸如彈子大每服一丸炒生薑鹽湯嚼下沉香丸治脾胃氣不和心腹㽱痛不能飲食沉香銼厚朴去粗皮生薑汁炙桂去粗皮益智去皮炒白术青橘皮湯浸去白焙桔梗炒各一兩五味子一兩一分炒附子炮製去皮臍乾薑炮甘草炙銼各半兩右粗搗篩每服二錢鹽水一盞入生薑三片同煎至七分去滓稍熱食前服木香丸出聖惠方治脾胃不和腹脅脹滿時有㽱痛不思飲食木香一兩桂心一兩芎藭一兩附子一兩炮製去皮臍川大黃一兩銼微炒檳榔一兩乾薑一兩炮製銼郁李仁一兩湯浸去皮微炒牽牛子二兩半微炒香橘皮一兩湯浸去白穰焙羌活一兩右為末煉蜜和搗三五百杵丸如梧桐子大每服空心以生薑橘皮湯下二十丸髙良薑散治脾胃不和飲食減少腹中虛鳴髙良薑一兩半陳橘皮去白焙二兩肉豆蔲去殼乾薑炮製厚朴去粗皮薑汁炙銼五味子甘草炙銼白术吳茱茰湯洗焙乾炒各一兩神麯炒半兩右搗羅為細散每服二錢陳米飲調下半夏飲治脾胃不和不能飲食見食吐逆半夏生薑汁炒黃乾薑炮各一兩棗肉焙附子炮製去皮臍青橘皮湯浸去白焙各半兩陳橘皮湯浸去白炒紅豆蔲去皮各一分木香半分草豆蔲去皮二枚牡丹皮當歸切焙木香京三稜炮推研各一分青橘皮湯浸檳榔銼一兩半夏半兩别搗末生薑自然汁和為餅焙乾同杵枳實去穰麩炒各半兩右為末煉蜜和丸如梧桐子大每服三五十丸空心食前鹽湯送下白术丸治脾胃不和不能飲食白术銼厚朴生薑汁炙銼蒼术去粗皮炒各半斤蕪荑四兩青橘皮去白焙甘草炙銼附子炮製去皮臍各三兩乾薑炮製各二兩右為末煉蜜和丸如雞頭實大每服一丸空心米飲嚼下進食方一名進食散治脾胃不和不思飲食虛冷嘔逆方見本門脾胃氣虛弱不能飲食類八味煮散治脾胃氣虛不能飲食厚朴去粗皮生薑汁炙銼麥蘖炒各二兩吳茱茰湯洗焙乾炒人參桂去粗皮蕪荑微炒陳橘皮湯洗去白焙各一兩蓽撥半兩右搗羅為散每服二錢鹽水一盞入生薑三片一枚擘破同煎至六分去滓空心溫服七寶湯治脾胃不和腹中刺痛胃逆氣冷不能飲食草豆蔲五枚麵裹煨熟去麵及皮白茯苓去皮人參各一兩腹皮銼四枚訶梨勒炮去核五枚半夏二分湯浸洗五度生薑汁浸一宿去薑炒黃甘草炙銼半兩右粗搗篩每服三錢鹽水一盞入生薑三片棗二枚擘破同煎至七分去滓溫服沉香湯治脾胃不和虛滿不能飲食沉香銼蘹香子炒青橘皮去白炒胡椒蓽澄茄楝實陳橘皮去白焙各一兩右粗搗篩每服三錢蔥白三寸擘破入酒童子小便各半盞同煎至七分去滓溫服若氣甚虛弱脈息沉細不過數服氣脈正生了脾丸和脾寬胸膈消痰逆止嘔吐進益美食石燕子一枚燒紅醋焠七次舶上黃一兩白丁香七錢丁香七錢淨木香五錢史君子去殼一兩陳皮五錢右用三稜一兩㕮咀用巴豆五錢淨炒豆三稜焦黃為度去巴豆不用同煎藥為細末醋煮大黃末為丸如梧桐子大晒乾每服四十丸空心用隨意湯下小兒如黃米大每服一百丸見黑糞為妙健中丸治脾胃不和不能飲食白术厚朴去粗皮生薑汁炙各二兩木香訶梨勒去核肉豆蔲去皮芎藭各一兩右為末煮棗肉和丸如梧桐子大空心米飲送下三十丸草豆蔲湯治脾胃氣冷熱不和進食和氣草豆蔲去皮人參陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙各一兩甘草炙銼桂去粗皮各半兩右粗搗篩每服三錢鹽水一盞入生薑三片同煎至六分去滓食前溫服和胃丸治脾胃冷熱不和不能飲食胸膈滿悶痰唾吐逆及一切氣疾甘草生銼髙良薑生各二兩藿香葉桂去粗皮丁香皮炙各二兩右為末煉蜜和杵三二百丸如櫻桃大每服一丸鹽湯嚼下空心服厚朴湯治脾胃不和化癖氣調中臟及心下怑愌厚朴去粗皮四兩生薑二兩用杵隂一二日焙乾陳橘皮湯浸去白焙三兩白术四兩烏藥浸湯銼炒甘草炙銼各二兩右搗篩每服二錢鹽水一盞入生薑三片大棗二枚擘破同煎至七分去滓溫服之白豆蔲丸治脾胃不和不能飲食白豆蔲去皮一兩白术乾薑炮各三分右為細末煉蜜和丸如梧桐子每服二十丸煎薑棗湯下空心食前調中丸出御藥院方治脾胃不和內挾濕燠煩燥發渴不思飲食頭目昏眩小便不清胸膈痞悶脅肋膨脹赤茯苓豬苓並去皮陳皮去穰白术桔梗澤瀉黃芩大黃桂去粗皮各一兩枳殼麩炒去穰木通各一兩半葛根半夏湯洗滑石各二兩黑牽牛生用六兩右為細末水煮薄麵糊為丸如桐子大服三五十丸溫水送不拘時調中益氣湯出濟生拔萃方夫脈弦洪緩而沉按之中指下得時一澀其證四證滿悶肢節煩疼難以屈伸身體沉重煩心不安忽肥忽瘦四肢懶倦口失滋味復難舒伸大小便清利而數或上飲下便或大便澀滯不見一二日一見夏月餐泄米榖不化或便後見血見白膿胸滿短氣咽膈不通或痰嗽稠粘口中沃沫食入反耳鳴耳聾目中流淚視物昏花努肉紅線熱壅頭目不得安臥嗜臥無力不思飲食升麻三分黃耆一錢甘草五分蒼术五分木香或一分或二分氣不轉運者加之人參五分有嗽者去之柴胡二分二味為氣不足胃氣與脾氣下溜乃補上氣從隂引陽橘皮三分如腹中氣不得通運者加二分右件銼如麻豆大作一服水二盞煎至一盞去滓帶熱服宿食稍盡服之寧心絶思藥必神效蓋病在四肢血脈空服在旦是也如是顯熱燥是下元隂火蒸蒸發也加生地二分黃蘗三分如大便虛不得或大便了而不了腹常逼迫皆血虛血澀也加當歸身如身體沉重雖小便數多亦加茯苓二分蒼术一錢澤瀉五分黃蘗三分時暫一從權而祛濕也不可常用兼足太隂也病其脈如胸中故顯濕熱相合而生煩亂如胃氣不和加湯洗半夏半錢生薑三片有嗽加生薑生地黃二分以製半夏之毒痰厥頭疼非半夏不能除此足太陽經所作也一方作足太隂經也如無以上證只服黃耆一錢炙甘草半錢柴胡三分人參有嗽者除蒼术半錢黃柏二分酒洗橘皮如腹中氣不轉運更加一分木香一分或二分無此證者勿加止用橘皮二錢升麻三分二味為上氣不足胃氣與脾氣不弱乃補上氣從隂引陽右銼如麻豆大依前煎服如兼燥熱加黃柏二分生地黃二分如無以上證只服前藥如夏月加白芍藥三分春月腹中痛尤宜加如惡熱而渴或腹痛加白芍藥半錢生黃芩二分惡寒腹中痛加中桂三分去黃芩謂之桂枝芍藥湯亦如芍藥湯中加之同煎如冬月腹痛不可用芍藥蓋太寒之藥也只作乾薑三分半夏五分以生薑少許製之如秋冬月胃脈四道為春脈所逆脅下太陽脈二道而反上行病名曰厥逆其證氣上衝咽不得息而喘息有音不得臥用吳茱茰半錢或一錢半湯洗去若觀厥氣多少而用之亦於前藥中作一服服之如夏月有此證為大熱也此病四時為寒熱溫涼也法宜用黃連酒洗酒黃柏酒知母各等分研為細末熟湯為丸如梧桐子大每服一百丸白湯送空心不令胃中停留以美肉食早膳壓之治飲食勞倦所得之病乃虛勞七損證也常以甘溫平之甘多辛少是其治也小獨聖丸出和劑方治脾胃不和飲食多傷心腹刺痛嘔噦惡心噎唾吞酸乾噫食臭腹脅脹滿不思飲食巴豆連皮稱半兩去皮心炒熟三錢研硇砂研飛一兩肉桂去粗皮一兩半夏湯洗七次丁皮舶上者烏梅去核乾薑炮當歸去蘆三稜煨搗碎各半兩右為細末入巴豆硇砂勻水煮麵糊為丸如麻子大每服三丸至五丸溫水下食後服常服化滯氣利胸膈少逆消食人參煮散出和劑方治脾胃不和中脘氣滯心腹脹痛不思飲食宿寒留飲停植不消或因飲食過度內傷脾氣嘔吐痰逆寒熱往來或時汗出又治腸胃冷濕泄瀉注下水榖不分腹中雷鳴脅肋虛滿黑燎傷寒隂盛四肢逆冷人參四兩青皮去白十二兩甘草炙十兩乾薑炮六兩芍藥一斤三稜煨搗碎十二兩丁香皮六兩茯苓去皮蒼术去皮各半斤右為末每服二錢水一盞生薑五片棗三箇同煎至七分食前空心溫服脾不磨方脾虛不磨塞心胸腹滿肚脹如物攻但將五膈煎三服可送尋常小理中傷脾方病後傷脾胸膈滿老人強食氣必短更兼可食惡心來草果寬中煎一碗右病後傷脾經令人胸膈氣短用寬中散二帖草果二箇炭火炮銼水二大盞薑十片煎八分去滓作四服分氣紫蘇飲出醫方集成治男子婦人胸膈噎塞腹脅疼痛氣促喘急心腹膨脹飲食不思嘔逆不止五味子去梗洗桑白皮多銼陳皮去白淨洗桔梗銼草果仁大腹皮甘草炙各二斤茯苓三斤右㕮咀為粗末稱二十斤淨入揀嫩枝葉乾紫蘇十五斤搗碎同一處拌勻每服四錢水一大盞薑三片入鹽少許煎至七分去柤空心食前常服和胃進食沉香磨脾散出醫方集成治脾胃虛冷心腹膨脹嘔逆惡心不思飲食或吐痰水沉香人參各二錢半丁香七錢半藿香葉去土一兩檀香甘草炙木香白豆蔲仁縮砂白术肉桂去皮烏藥各半兩右㕮咀每服三錢水一盞薑三片鹽一捻煎八分溫服一方有半夏無白术蟠蔥散出仁存方治男子婦人脾胃虛冷氣滯不行攻築心腹連脅肋刺痛胸膈痞悶背膊連項拘急疼痛不思飲食時或嘔逆霍亂轉筋腹疼泄㵼膀胱氣刺痛小腸及外腎腫痛及治婦人血氣攻刺癥瘕塊硬帶下赤白或發寒熱胎前産後惡血不止臍腹疼痛一切虛冷不思飲食並宜服之延胡索三兩蒼术米泔浸一宿去之甘草炙各半兩茯苓白者去皮蓬术三稜煨青皮去白各六兩丁皮縮砂去皮檳榔各四兩肉桂去粗皮乾薑炮各二兩右為末每服二錢水一盞連根蔥白一莖煎七分空心食前稍熱服之進食散出醫方集成治脾胃虛冷或食生冷或飲食不節或因思慮傷動沖和之氣胸膈痞塞腹中怠惰全不進食痰逆惡心大便溏泄半夏麯肉豆蔲麵裹煨草果仁髙良薑銼炒麥蘖炒附子炮去皮臍厚朴去皮薑汁炒丁香陳皮去白各一兩人參去蘆青皮去白甘草炙各半兩右㕮咀每服四錢水一盞半薑五片棗子一枚煎至七分去滓溫服不拘時小理中湯出和劑方治脾胃不和中寒上衝胸脅逆滿心腹㽱痛飲酒過度痰逆惡心或時嘔吐心下虛脹膈塞不通飲食短少短氣羸困溫水逐水去濕又治腸胃冷濕泄瀉注下水榖不分腹中雷鳴霍亂吐利手足厥冷胸脾心痛逆氣厥氣並治之蒼术米泔浸焙五兩生薑五斤甘草生用十兩鹽炒十五兩右銼碎同碾淹一宿焙乾碾為末每服一錢沸湯點空心服棗湯出和劑方治脾胃不和乾嘔惡心腹脅脹滿不美飲食棗去核一斤生薑洗切五兩甘草炙銼三兩右拌勻用盆器盛貯以布蓋淹一宿焙乾搗為末每服一錢入鹽少許沸湯點服常服健脾胃進飲食三倍湯出永類鈐方治脾胃不和胸滿悶飲食不化嘔逆惡心或霍或嘔吐心腹刺痛腸鳴泄瀉水榖不分草豆蔲一兩去皮用肉甘草二兩銼碎生薑五兩和皮切作片子鹽五兩炒右件入瓷器內淹一宿焙乾為末沸湯點服每服二錢不拘時候丁香大丸子出楊氏家藏方和脾養胃溫酒食降氣快膈人參去蘆頭丁香木香白豆蔲仁甘草炙陳橘皮乾薑炮薑黃縮砂仁神麯炒麥蘖炒各半兩紫蘇葉一兩右件為細末煉蜜為丸每一兩作十丸每服一丸熱湯化下食前服沉香養胃丸出楊氏家藏方益脾養胃助氣溫中進飲食療吐利藥性和平不燥但是脾胃虛弱諸疾悉宜服之沉香半兩木香半兩縮砂仁一兩半丁香白术肉豆蔲麴裹煨香熟人參去蘆頭甘草炙乾薑炮已上各一兩右件為細末煉蜜為丸每一兩作一十丸每服一丸或二丸細嚼熟水不拘時候白术茯苓丸出楊氏家藏方治脾胃不和胸膈痞悶心腹脹滿乾噦噫酸飲食不化腸鳴泄瀉酒癖停積嘔吐痰沫頭目昏運白术六兩赤茯苓去皮乾薑炮肉桂去粗皮半夏湯洗七遍枳實去穰麩炒肉豆蔲麵褁煨香人參去蘆頭各二兩右為細末用神麯碾糊為丸如梧桐子大每服五十丸生薑湯下不拘時治胃氣不和飲食減少腹脅脹多飱泄舶上黃不以多少淨去沙石右細研千百遍令如飛塵蒸餅丸如梧桐子大空心米飲下四十丸助脾氣令人能食以魴魚作膾食之作美食益人其功與鯽同通心經益脾胃出本草以紫蘇葉并莖煮飲食二香養胃丸出楊氏家藏方治脾胃不和心下虛痞不思飲食嘔吐痰逆嗌氣吞酸口苦無味嗜臥體重腹脅刺痛丁香一分木香一分陳橘皮去白益智子縮砂仁甘草炙肉桂去粗皮檳榔肉豆蔲麵裹煨熟已上七味各半兩青橘皮去白四錢乾薑炮三錢右件為細末煉蜜為丸每一兩作一十丸每服一丸或二丸細嚼熱湯送下食前雙棗湯出楊氏家藏方治脾胃不和胸膈不快飲食停滯氣升降腹脅脹痛嘔逆惡心並宜服之香附子去毛八兩青橘皮去穰麩炒六兩甘草炙半兩右件為細末每服二錢二枚水一盞煎至七分或入鹽點亦得健脾散出楊氏家藏方治脾胃不和心腹疼痛嘔逆惡心陳橘皮去白七兩髙良薑五兩炒乾薑三兩炮右件為細末每服二錢水一盞生薑三片棗二枚同煎至八分熱服不拘時白豆蔲散出楊氏家藏方治脾胃不和中脘痞悶氣升降痰逆惡心不思飲食沉香三分縮砂仁炒白豆蔲微炒乾生薑已上五味各一兩木香人參去蘆頭白术去皮白茯苓去皮丁香已上五味各一兩右件為細末每服二錢水一盞入鹽一捻生薑三片煎至七分熱服或用鹽湯點亦得食前薑棗丸出楊氏家藏方安和脾胃美進飲食治中脘不快嘔吐無時乾生薑一斤大四斤去核溫酒拌勻焙乾陳橘皮去白一兩右件為細末别用一斤生薑一斤切作片子同煮爛不用生薑只將去皮核取肉和前藥末丸如梧桐子大每服一百丸溫米飲送下空心食前香术散出楊氏家藏方和脾胃養三焦美飲食化痰飲破滯氣木香人參去蘆頭白术白茯苓去皮草豆蔲仁陳橘皮去白肉桂去粗皮枳殼去穰麩炒已上八味各半兩細辛去葉土神麯各二兩炒訶子六枚煨去核右件為細末每服三錢水一盞生薑三片鹽少許同煎至七分熱服空心豆蔲煮散出楊氏家藏方健脾和胃治嘔逆惡心不思飲食草豆蔲仁白术白茯苓去皮已上三味各二兩髙良薑三兩炒白豆蔲仁人參去蘆頭甘草炙三味各半兩丁香陳橘皮去白木香三味各一分右件為粗末每服四錢水一盞半烏梅一枚煎至一盞去滓空心食前溫服草果飲子出楊氏家藏方溫脾養胃順氣消飲生津液美飲食草果子仁烏梅肉焙紫蘇葉去土赤茯苓去皮厚朴去粗皮生薑汁製炒乾陳橘皮去白甘草炙肉桂去粗皮人參去蘆頭右件各等分㕮咀每服四錢水一盞半生薑三片同煎至一盞去滓溫服不拘時候建中丸出楊氏家藏方健脾溫胃去停寒進飲食厚朴去粗皮生薑汁製白茯苓去皮吳茱茰湯洗五遍火炒黃白术銼碎炒黃神麯炒黃小麥蘖炒黃乾薑炮已上七味各一兩肉豆蔲半兩麵裹煨香人參去蘆頭半兩木香一分右件為細末煮棗肉為丸如梧桐子大每服十丸生薑湯下食前丁香五辛丸出楊氏家藏方溫中暖胃止吐逆進食消痰丁香木香乾薑炮已上三味各一兩胡椒一兩半夏二兩湯洗七次右件為細末生薑自然汁麵糊和丸如梧桐子大每服三十丸至五十丸生薑湯下不拘時候補真丸出危氏方大抵不進飲食以脾胃之藥治之多不效者亦有謂焉人之有生不善攝養房勞過度真陽衰虛炊火不溫不能上蒸脾土沖和失而布中州不運是致飲食不進胸膈痞塞或不食而脹滿或已食而不消大腑溏此皆真火衰虛不能蒸藴脾土而然古云補腎不如補脾余謂補脾不若補腎腎氣若壯丹田火上蒸脾土脾土溫和中焦自治膈開能食矣葫蘆巴炒附子炮去皮臍陽起石川烏炮去皮兔絲子淘洗酒蒸沉香不見火别研肉豆蔲麵裹煨肉蓯蓉酒浸焙五味子去枝梗各半兩鹿茸去毛酒蒸焙川巴戟去心鍾乳粉各一兩右為末用羊腰子二對治如食法蔥椒酒煮爛入少酒杵糊為丸如梧桐子大每服七十丸空心食米飲鹽湯任下榖神丸出膽療方啓脾進食榖芽四兩擇減榖約取三兩淨却為末入薑汁鹽少許作餅子焙乾粉草略炙縮砂仁白术去蘆麵炒各一兩右為細末鹽點服建脾散出膽療方消食化氣飲食不快服之良驗病後進食亦可生薑一斤切片鹽二兩淹半日焙醋取四兩神麯炒麥蘖洗炒陳皮去白草果仁甘草各二兩或減甘草右為末點煎任意草豆蔲散出王氏博濟方治脾胃氣不和霍亂不止酒食所傷兼療脾泄能和一切冷氣乾薑一兩炮白术一兩炮黃訶子一兩炮去核用五味子三分甘草三分炮陳橘皮湯浸去穰切炒二兩草豆蔲和皮一兩厚朴一兩去皮用薑三兩取汁浸炙候汁盡為度右件八味依法修事了杵羅為末每服二錢霍亂冷米飲下酒傷以酒調下或脾痛不可用者炒生薑酒下三錢餘即如湯點服白豆蔲散出王氏博濟方治脾胃氣不和止脾泄瀉痢白豆蔲一兩用仁一半生一半熟枳殼半斤去穰以漿水煮軟麵炒香即住當歸一兩洗了銼碎肉桂三兩銼去皮橘皮三兩炒去白研訶子二兩去穰半生半熟右件六味杵為末每服一錢水一中盞薑棗同煎至七分稍熱服如要丸用好棗漿水煮去皮核細研為末如梧桐子大以薑擘碎炒黑色入水煎湯下十五丸七傷散出衛生家寶方開胃養氣進食人參白术黃耆蜜水塗炙山芋白茯苓粟米微炒去殼甘草已上各一兩炙右為細末每服二錢水一盞薑棗同煎至七分如大故不思飲食加白扁豆一兩蒸用名八珍散此方溫平不熱每有傷寒瘧疾中暑得差之後以此調脾日三四服十日外飲食倍常崇土散出朱氏集驗方治脾土虛弱腎水無畔易致腹滿腹疼時有泄瀉之證皆宜服之白术一兩切大片以黃土半兩水一碗煮一餉慎洗去泥焙丁香三錢生用人參半兩黃泥裹煨乾薑一兩黃泥裹煨十分乾草果半兩黃泥裹煨乾去皮縮砂連皮二兩黃土炒少時去皮粉草半兩黃泥裹煨乾去土銼右為細末每服三錢沸湯調服日空心三錢或用伏龍肝煎湯尤妙此方係杭州傳來服之屢有效五補散出朱氏集驗方五臟先補於脾脾土實而飲食自進病證不生脹亦不作平胃不燥製厚朴炒淨陳皮去白炒茴香去土石炒丁香皮不見火益智仁去皮炒縮砂仁炒神麯炒甘草炙良薑銼碎炒桔梗去蘆肉桂去皮不見火木香等分右為細末鹽湯點下一日三服或用薑三片鹽少許煎服亦得厚朴湯出朱氏集驗方治脾胃不和冷瀉腹痛生薑厚朴棗肉各一兩已上用水一碗煎乾入粟米粥半盞用杵為餅子貼壁上候乾取下焙乾併後同碾服縮砂仁炒良薑草果仁炒甘草炙白术訶子炮各半兩肉桂二錢半右氣實加青皮半兩虛加陳皮半兩細碾為末每服三錢入燒鹽少許空心沸湯點服快脾散出家藏經驗方治脾胃不和嘔吐酸水飲食減少甘草二十兩炙草果子十兩不去皮生薑四十兩鹽十五兩右為細末先以生薑切作片子餘藥銼碎同鹽一處和盫一宿焙乾碾為細末每服二錢不拘時候沸湯點服秀王府常用之與他處方不同和中散出衛生家寶方補脾胃解勞倦退熱止嘔消痰進食輕健四肢人參一兩去蘆白茯苓一兩去皮白术一兩黃耆一兩去蘆甘草半兩微炒白扁豆半兩薑汁浸一宿蒸過去皮焙乾微炒木香一分煨藿香葉半兩去梗縮砂仁半兩半夏一兩湯洗七次右為細末每服二大錢水一盞薑五片棗一枚去核煎至六分稍熱服不計時候四倍丸出十便良方壯脾胃去寒濕治泄瀉療吐逆除心腹痛進飲食人參去蘆一兩甘草二兩乾薑四兩白术八兩右為末煉蜜丸如梧桐子大空心食前溫米飲服一百丸和中丸出十便良方治脾胃不和寒氣積聚飲食減少肢體倦怠良薑四兩烏梅肉白茯苓甘草蒼术各一兩乾薑神麯小麥蘖茴香一兩半右為細末煉蜜和丸如彈子大每服非時以米湯嚼下一粒厚朴健胃湯出十便良方和脾胃化痰涎止逆不思飲食好厚朴二兩半夏一兩京棗二兩去核甘草一兩半丁香半兩生薑切焙乾一兩半右件藥為㕮咀攪勻每服二錢生薑一小塊劈破棗一枚水一盞半煎至七分去滓溫服不計時四君子湯出易簡方治大人小兒脾胃不和中脘痰飲大病之後宜服此味但味甘恐非快脾之劑常服宜減甘草一半增損之法見於方後人參茯苓白术各一兩甘草半兩右㕮咀每服四錢水一盞薑七片棗一箇煎六分去滓不拘時候一方加橘紅等分名異攻散尤宜病後調理一方去人參加官桂等分甘草減半名甘桂湯治停飲目眩一方去甘草加枳殼橘紅半夏等分名六君子湯専治素有痰飲胸膈痞悶