熟銼二兩厚朴去粗皮生薑汁炙令黑色四兩右九味搗維八味為細末用陳橘皮膏和丸如梧桐子大每服二十丸溫酒下不嚼陳米飲下亦得空心食前服附子丸出聖惠方治脾胃氣虛弱肌體羸瘦食不消化不能飲食附子一兩炮製去皮臍桂心三分厚朴二兩去粗皮塗生薑汁炙令香熟甘草一分炙微赤銼當歸三分銼微炒小麥麴二兩微炒令黃川椒二兩去白及閉口炒出汗右件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大不計時候以薑棗湯下二十丸忌生冷油膩犬肉團參丸治脾胃氣虛肌體羸瘦團參白术山芋棗焙乾為末陳倉米炒黃色各一兩甘草炙一分草豆蔲去皮半兩右為細末煉蜜丸如櫻桃子大米飲下一丸日三服山芋丸治脾胃氣虛弱肌體羸瘦補不足進飲食山芋銼一兩五味子淨揀三分黃耆細銼一兩白术三兩人參一兩右為細末煉蜜為丸如梧桐子每服二十丸或三十丸溫米飲下食前服香柿丸治脾胃氣虛弱靣黃肌瘦小便頻數臍腹疼痛不能飲食沉香銼蘹香子炒各二兩厚朴去粗皮五兩附子去皮臍生用蜀椒取紅各二兩右除紅椒沉香蘹香子外二味用漿水六升青鹽三兩生薑三兩切作片子同於銅鍋中煮令水盡暴乾入紅椒沉香蘹子搗羅為細末以水浸炊餅和丸如梧桐子大每服三十丸空心溫酒下蜀椒丸治脾胃氣虛弱多困羸瘦靣黃口淡不思飲食蜀椒去目及閉口者十兩厚朴去粗皮十兩以生薑汁炙令香熟附子炮製去皮臍銼碎二兩鹽花十兩右以水一斗於銀器內以文武火熬候水盡為度焙乾同杵為末煉蜜并糯米粉同為糊和丸如梧桐子大每服二十丸溫酒空心服如大腸滑泄生薑米飲下椒朴丸出德生堂治脾胃虛冷不思飲食或發虛腫或日漸羸瘦四肢衰倦吐利無節應脾虛候爿皆可服蜀椒去目并閉口者厚朴去粗皮生薑汁炙透蘹香子炒青鹽淘去沙去淨各二兩右以水二升煮令乾焙燥搗羅為末麵糊丸如梧子大每服三四十丸空心溫米飲下及鹽湯下病深者日三服諸方集多載椒朴丸有加附子者有加乾薑之類者皆不快捷此方精要與病相當如神慎勿增他藥余中表許君病脾逾年通身黃腫不能起全不嗜食其甥為本道轉運使日遣良醫治之都不效有傅主薄傳此方服十許日漸安自爾常服肌膚充實嗜飲美食兼人靣色紅潤年六十餘日行數十里強力如少年凡藥之中病處人多不惻看不上靣自有竒功多因增益他藥却致不驗此難可以意度也一方治通身黃腫不能起全不食服之愈粟附丸治脾胃氣虛弱四肢倦怠肌體瘦弱臟腑受濕大便頻全不飲食陳粟米一升附子一兩共得兩枚者右同於鍋銚內入水煮令附子透取出附子切作片子焙乾又别取陳粟米半升水淘令淨控乾文武炒令香熟同附子碾為末却取元煮附子者粟米粥同和丸如梧桐子大每服三十丸至五十丸陳橘皮湯下空心食前羊肉補真丸出楊氏家藏方治脾胃久虛榮衛氣澀精神昏悶肌體羸弱全不入食羊肉炙乾者十兩當歸洗焙白术神麴炒三味各二兩丁香茴香炒肉豆蔲麵裹煨香縮砂仁乾薑炮肉桂去粗皮已上六味各一兩糯米半升炒黃右件為細末次入羊肉末拌勻湯浸蒸餅為丸如梧桐子大每服三十丸至五十丸溫米飲下不拘時候建脾丸出楊氏家藏方治脾胃久虛心腹疼痛脅肋脹滿臟腑溏泄停飲食不消惡心嘔逆咳嗽上氣乾噦涎沫口苦無味肢體羸困全不思食丁香甘草各半兩肉豆蔲麵裹煨香細辛去葉土附子炮去皮臍肉桂去粗皮吳茱茰湯洗七次微炒乾薑炮已上六味各一兩厚朴去粗皮生薑汁製二兩右件為細末煮粟米飯為丸如梧桐子大每服五十丸米飲送空心食前治脾胃腸癖出本草以野蒿煮令熟醬醋食之脾胃壅熱嘔噦附論夫脾氣壅實胃有熱則陽氣盛陽氣盛則胸膈滿痰飲積聚則成嘔噦此皆氣力強盛之人肌膚充滿脾胃之中久多積熱致上焦不利故令嘔噦也方枇杷葉散出聖惠方治脾胃氣壅痰滯嘔噦見食即吐枇杷葉一兩拭去毛炙微黃色木通半兩前胡半兩去蘆頭人參一兩去蘆頭麥門冬一兩去心麻心半兩犀角屑半兩赤茯苓三分陳橘皮半兩湯浸去白穰焙右件藥搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服麥門冬散出聖惠方治脾胃壅嘔噦不下食縱食良久即吐麥門冬二兩去心赤茯苓一兩人參一兩去蘆頭半夏一兩湯洗七遍去滑淨陳橘皮半兩湯浸去白穰焙茅根二兩銼甘草半兩炙微赤銼前胡半兩去蘆頭枇杷葉一兩拭去毛炙微黃右件藥搗篩為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服陳橘皮散出聖惠方治脾胃壅熱嘔噦煩渴不下食陳橘皮一兩湯浸去白穰焙羚羊角屑半兩麥門冬三兩去心人參一兩去蘆頭澤㵼半兩紫蘇散一兩右件藥搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服又方出聖惠方陳橘皮一兩湯浸去白穰焙人參一兩去蘆頭葛根一兩蘆根一兩銼麥門冬一兩去心枇杷葉半兩拭去毛微炒右件藥細銼和勻每服半兩以水一大盞入生薑半分煎至六分去滓不計時候分溫二服蘆根飲子出聖惠方治脾胃積熱胸膈煩壅嘔噦不下食蘆根二兩半麥門冬二兩去心人參一兩去蘆頭黃耆一兩淡竹茹一兩陳橘皮一兩湯浸去白穰焙右件藥細銼和勻每服一兩以水一大盞半入生薑三片煎至一盞去滓入蜜一匙生地黃汁半合更煎一兩沸不計時候分溫三服茅香散出聖惠方治脾胃壅熱嘔噦煩渴不止茅香花三分蘆根一兩銼麥門冬三分去心赤茯苓三分甘草半兩炙微赤銼枇杷葉三分拭去毛炙黃右件藥搗篩為散每服三錢以水一中盞入生薑半分竹茹一分糯米五十粒煎至六分去柤不計時候溫服人參飲子出聖惠方治脾胃壅熱氣滿不能食縱食嘔噦人參去蘆頭前胡去蘆頭一兩生薑半兩粟米半合薤白七莖豉半合右件藥細銼和勻都以水二大盞煎至一盞二分去柤不計時候溫三服蘆根散出聖惠方治脾胃壅熱嘔噦不能下食心神煩亂蘆根二兩銼人參一兩去蘆頭甘草半兩炙微赤銼麥門冬去心茯神一兩右件藥搗篩為散每服三錢以水一中盞入生薑半分煎至六分去滓入生地黃汁半合更煎一兩沸不計時候溫服之治脾胃壅熱嘔噦不下食心膈煩燥宜服此方出聖惠方糯米半合水淘生研菉豆水淘生研半合生薑三分研炙蜜一合新汲水五合右件藥細和研濾取炙入蜜調令勻不計時候分為三服普濟方卷二十五
