body:
  text: 普濟方卷一百六十三明周王朱橚撰喘門總論夫五臟皆有上氣喘咳但肺為五臟華蓋百脈取氣于肺喘既動氣故以肺為主病者右手寸口氣口以前脈隂實者手太隂經肺實也肺必脹上氣喘逆咽中塞如欲嘔狀自汗皆肺實證若氣口以前脈虛者必咽乾無津少氣不足以息此乃肺虛氣乏也夫諸氣者皆屬于肺諸喘者亦屬于肺是以人之一呼一吸謂之息呼吸之間脾受其氣通乎榮衛合乎隂陽周流一身無過不及然後權衡得其平矣將理失宜六淫所傷七情所感或因墜墮驚恐渡水失跌仆飽食過傷動作用力遂使臟氣不和榮衛失其常度不隨隂陽出入以成息促迫于肺不得宣通而為喘也診其脈滑手足溫者生脈澀四肢寒者死數者亦死謂其形損故也亦有痰停胃脘痰與氣搏肺道壅塞亦令上氣夫有肺虛挾寒而喘者有肺實挾熱而喘者有水氣乘肺而喘者有驚憂氣鬱肺脹而喘者又有胃絡不和喘出于陽明之氣逆真元耗損喘生于腎氣之上奔如是等類皆當審證而主治之肺虛肺寒必有氣乏表怯冷痰如氷之證法當溫補如官桂阿膠之類是也肺實肺熱必有壅盛胸滿外鬨上炎之狀法當用清利如桑白皮葶藶之類是也水氣者漉漉有聲怔忪浮腫與之逐水利小便如小半夏茯苓湯五苓散輩驚憂者惕惕悶悶引息鼻張與之寬中下氣如四七湯桔梗枳殼湯輩陽明之氣下行令逆而上行古人以通利為利如分氣紫蘇飲指迷七氣湯加半夏二陳湯加縮砂施之為當真陽虛憊腎氣不得歸元固有以金石鎮墜助陽接真而愈者然亦不可峻驟且先與安腎丸八味丸輩否則人參煎湯下養正丹主之雄黃麻黃馬兜鈴漢防己雞內金諸品非不主喘也如前治法大要究其受病之源至若傷寒發喘表汗裏下腳氣喘滿疏導收功此則但療本病其喘自安然喘有利下而愈者亦有因㵼而殂者喘有數年沉痼而復瘳者亦有忽因他疾大喘而不救者汗出髮潤喘者為肺絶身汗如油喘者為命絶直視讝語喘滿者不治諸有篤疾正氣欲絶之時邪氣盛行多壅逆而為喘然則喘之危惡又安可以尋常目之婦人産後喘急為病尤亟因産所下過多榮血暴竭衛氣無所生獨聚于肺故令喘急謂之孤陽難治治法當推所感詳虛實冷熱治之縱是得愈必年年遇此時必發喘急者有之千金云治肺熱悶不止胸中喘急客熱往來欲死不堪服藥此可以治胸中喘用桃皮芫花各一升二物以水四升煮取一升半去滓以布蘸汁薄胸中再蘸再薄即效凡上喘中滿酸心腹脹時作聲痞氣上下不能宣暢叔和云氣壅三焦不得昌也可用獨聖散吐之次用導水禹功散輕㵼三五行使上下無礙氣血宣通並無壅滯後復平胃散五苓散益元甘露散分隂陽利水道之藥則愈矣喘方團參丸出簡易方治五臟相乘榮衛失度不能隨隂陽出入以成呼吸故氣經于臟不能受納諸氣促迫上併于肺壅管溢而氣爭則喘桑白皮銼炒團參各三兩人參白术杏仁去皮尖炒麥門冬去心桂心陳皮訶子炮去核附子炮去皮臍大腹皮銼炒檳榔銼炒芫花炒澤㵼枳實麩炒吳茱茰半夏麴各半兩右為末薑汁糊為丸如梧桐子大每服二十丸食前米飲下未效漸加至三十丸紫蘇子湯出危氏方治憂思過度邪傷脾肺心腹膨脹喘促煩悶腸鳴氣走漉漉有聲大小便不利脈虛緊而澀紫蘇一兩一方用紫蘇子大腹皮草果仁半夏湯浸洗七次白术枳實去穰炒人參甘草炙各半兩厚朴去皮薑汁製木香不見火陳皮木通右銼散每服四錢水一盞薑三片棗二枚煎至七分服不拘時杏參飲出濟生方治因墜墮驚恐渡水跌仆疲極筋力喘急不安人參桑白皮橘紅大腹皮檳榔白术訶子麵裹煨取肉半夏湯泡七次桂心不見火杏仁去皮尖炒紫菀洗甘草炙右等分㕮咀每服四錢水一盞半生薑五片入紫蘇葉七葉煎至七分去滓溫服不拘時候玉華散出直指方治咳嗽上喘調順肺經清利咽膈安和神氣甜葶藶焙香桑白皮炒天門冬去心馬兜鈴半夏製紫菀杏仁去皮尖貝母炮百合人參各半兩百部甘草炙各一分右銼散每服二錢半薑四片大棗三枚服一方無生薑煎神祕湯出直指方治水氣作喘陳皮北梗紫蘇人參五味子檳榔桑白皮炒半夏製甘草炙各等分雄黃丸出直指方治喘雄黃研白礬煆木香生葶藶各一分馬兜鈴去殼雞內金淡豆䜴各三錢半信砒絳芒營者研生用一錢半右各取實分數並細末研米漿煮糊為丸如胡椒大每服五丸清茶稍冷臨卧送下至七丸次日飲食勿用熱菉豆生嚼解砒霜毒加減㵼白散出拔萃方治隂氣在下陽氣在上咳嗽喘促桑白皮一兩甘草五錢陳皮五味子人參各五錢地骨皮七錢青皮二錢白茯苓一錢右㕮咀每服四錢水一盞半入粳米十粒煎至一盞去滓食後服之加味控涎丸出危氏方治風熱上壅或中脘停留水飲喘急及四肢浮腫腳氣入腹平常腹中痰熱諸氣結聚服之得利則效大戟芫花甘遂甜葶藶巴豆各一兩去殼黑牽牛三兩炒去頭尾白芥子炒二兩右為末米糊為丸粟米大每服三七丸清茶送下或溫水亦可服後莫可服甘草藥及熱水五味子湯出直指方治寒熱喘北五味子杏仁橘紅各一兩麻黃去節一兩半甘草炙生乾薑辣桂各半兩右粗末每服二錢半蘇三葉煎服肺虛加炒阿膠喘甚加馬兜鈴五味子湯百一選方治肺虛寒理喘下氣去痰飲務觀郎中姊發喘嗽諸藥皆不瘥得此三服遂愈乾薑炮半兩甘草炙半兩陳皮去白三分桂茯苓五味子各一兩右銼為散每服五錢水一大盞煎至六分熱服麥門冬湯出三因方治嘔逆上氣喘急咽喉不利止逆下氣麥門冬去心一兩一錢半夏製六錢人參一分甘草炙一分粳米二錢大棗右為粗散每服四錢水三盞棗三個煎至六分去滓空心服之五味子湯出百一選方治寒喘橘皮三兩去白甘草一兩半炙麻黃四兩去根節杏仁二兩炒去皮尖真北五味子二兩重右為粗末水一盞半藥末二錢煎七分去滓通口服不拘時如喘甚加藥末入馬兜鈴桑白皮同煎夏月減麻黃一兩無不效者昔日髙申之每苦喘疾發甚時非此不能治祕方黃丸子出簡易方治消痰定喘雄黃研雌黃研各一錢山梔七枚去皮菉豆四十九粒信砒少許右為末麵糊和為丸菉豆大每服兩丸生薄荷清茶臨卧之時送下神祕散一名神祕湯出三因方治定喘嗽補心腎下氣阿膠三兩三分炒雞䏶胵一兩半白仙茒半兩米泔浸三宿晒乾炒團參一分右為末每服二錢糯米飲空心下八寶丹出朱氏集驗方治痰實發喘雄黃雌黃朱砂信砒並生用白礬飛過菉豆粉生黑豆生巴豆去油皂角炙去黑皮各一錢右為細末煮糊為丸如菉豆大磨刀水下一丸至三丸四磨湯出濟生方治七情傷感上氣喘息妨氣不食人參檳榔沉香天台烏藥右各濃礬水和作七分盞煎三五沸稍溫服或下養正丹黑錫丹杏參散一名杏參湯出和劑方治上氣喘滿咳嗽倚息不能卧除痰下氣胸脅脹滿神思昏憒並宜服之杏仁桃仁並麩炒去皮尖桑白皮蜜炙三度泔浸一宿控乾各一兩人參一兩右為末每服二錢水一盞薑三片棗一箇煎至七分服不拘時五靈丸出直指方治肺喘久不愈漸成息賁木香半兩馬兜鈴去殼炒葶藶微炒各一分川五靈二兩半右為細末煉蜜為丸如梧桐子大每服二十丸杏仁二枚捶碎薑三片煎湯下一方棗肉為丸人參丸治喘人參二錢半苦葶藶炒五兩南星三錢半夏三兩右為細末生薑自然汁麵糊為丸如黍米大每服五十丸薑送下漸加亦可小兒減數服之坎離湯出朱氏集驗方専定喘蓽澄茄石菖蒲各半錢白术茯苓杏仁各一錢甘草半夏泡七次紫蘇子各二錢右為末水一盞半煎不用薑二黃丸出濟生方治停痰在胃喘息不通呼吸欲絶雌黃雄黃各一錢右研末羅極細鎔黃蠟為丸如彈子大每服一丸半夜時候熱煮糯米粥乘熱以藥投在粥內攪轉和粥喫之棗杏丸出朱氏集驗方治喘大棗五十箇去核葶藶黃者二兩微炒杏仁三兩去皮尖右搗細末取棗肉研成膏為丸如梧桐子大每服三十丸桑白皮湯下當令人大便鴨溏不妨杏參散出仁存方治喘氣息桃仁杏仁並去皮尖炒人參知母貝母桑白皮米泔浸蜜炙三度右等分為末每服二錢水一盞薑三片棗一枚煎七分食後服菖蒲煎治肺中風喘鳴肩息菖蒲欵冬花紫菀人參桂心各等分右為細末煉蜜和丸皂子大每服一丸煎糯米飲化下紫參湯散出拔萃方治形寒飲冷傷肺喘促痰涎不得安卧米殼二兩蜜炮黃色麻黃桔梗五味子甘草炙紫參各一兩右為細末每服四錢水煎臨卧服神祕湯出拔萃方若病人不得卧卧則喘者喘者水氣逆上乘于肺肺得水浮使氣不通流其脈沉大宜服之橘皮洗生薑紫蘇葉或用子人參桑白皮炒各半兩右㕮咀以水三升煎至一升去滓分作三服溫用一方有白茯苓木香各二錢指迷方以五味子湯加去桑白皮玉蟬散出仁存方治氣發喘坐卧不得人參萆麻葉霜桑葉各半兩訶子肉半兩鍾乳粉一兩右搗羅細每服二錢溫糯米粥飲調下每于食後服之理氣丸治氣不足動便喘促逺行久立皆不任汗出鼻乾心下急痛苦悲傷睡卧不安杏仁去皮尖麩炒研别桂枝去皮各一兩益智去皮乾薑炮各二兩右為末蜜丸如桐子大以鍾乳粉為衣每服三十丸空心米湯送下宣肺湯出百一選方治喘細辛甘草各一兩防風二兩去蘆麻黃四兩不去根節右㕮咀每服三錢水一盞半煎至七分去滓溫服天南星散出本事方定喘南星半夏青皮並炒令黃白礬煆各等分右為末每服一錢好北棗去核入藥在內細嚼咽下治久患肺氣喘急至妙用杏仁去皮尖二兩童子小便浸一日一換夏月一日三四換浸半月取焙乾研爛極細每服一棗大丸薄荷一葉蜜一雞頭大水一中盞同煎取七分食後溫服甚者不過一劑瘥永不發動忌腥棗杏丸一名大乾棗三味丸治喘方見咳嗽門久咳類出仁存方大黃散出肘後方治大熱行極及食熱餅竟欲飲水過多衝咽不即消仍以氣呼吸喘息方瘥大黃乾薑巴豆各等分右為末每服半錢若得吐下即愈五礬散治喘并痰嗽一名炙肝散五倍子白礬右各等分為末和勻每服三錢以生豬肺火上炙熟蘸藥末細嚼喫食後服一方用生豬肝蘸藥亦可漢陽公庫兵黃六者舊苦此病百藥不效于嶽陽路上遇一道人傳此方兩服病不復發杏仁散治喘馬兜鈴一兩杏仁一兩去皮尖炒右為末每服三錢水一盞煎至七分去滓食後服之定喘飲子訶子肉三肉麻黃四兩不去節右為粗末每服四錢水二盞煎至一盞二分去滓入好臘茶一錢再同研至七分通口不拘時候臨卧服之尤佳立如神效老幼可服一方加人參二兩名訶參散本方只兩味如神湯治喘茒根一握生銼臨時取生者妙桑白皮右等分用水一碗煎至八分一服即止甚者三服竹葉橘皮湯治大走馬及奔趂喘乏便飲冷水因得上氣發熱方竹葉三斤橘皮三兩右件藥以水一斗煮取三升濾去滓分為三服令三日服一劑神祕方治喘右以豬爪甲二枚燒灰細研入麝香當門子一枚同研臘清茶調下故錦散治喘右燒故錦一寸燒灰清茶調服神效􅌝蔞散治喘右用􅌝蔞二箇入明礬一塊如棗子大入􅌝蔞內燒煆存性為末將蘿蔔爛煮蘸藥末服之汁過口藥盡病除大黃散治肺喘右用川大黃為末以新水調下踈鑿飲子治下氣定喘導涎消腫人參木通半夏附子炮草果仁木瓜秦艽檳榔杏仁赤茯苓連皮橘紅各一兩厚朴一兩半木香甘草各半兩右㕮咀每服半兩水一盞半生薑七片煎至八分去滓服不拘時加減滲濕湯出朱氏集驗方先用靈砂合來復丹服若只丹服靈砂則祕合則通次用後藥嫩蒼术三錢炒白术三錢赤茯苓四錢丁香縮砂仁木瓜神麯綿薑陳皮草果厚朴製炒各三錢甘草二錢半右前㕮咀薑棗煎厲端明得喘疾醫下痰疏導之藥引客邪腎經而兩足并外腎發腫有僧云此脾腎虛用此則大小便自流利妙方出鮑氏方治喘息諸方治不效者代赭石煆末一兩牡蠣粉一兩皂角去皮尖一兩貝母半兩右為末每服二錢韲水入麻油一二點調下葶藶丸出本事方定喘急肺積苦葶藶一兩當歸肉桂白蒺藜乾薑川烏頭吳茱茰鱉甲大杏仁茯苓人參各半兩檳榔一兩右為細末煮棗肉和杵如梧桐子大每服二三十丸薑棗湯下日進三四服不拘時候皺肺丸貝母炒知母秦艽阿膠炒欵冬花紫菀茸百部去心糯米炒各一兩杏仁去皮尖别研四兩右為末將羊肺一箇先以水灌洗看容得水多少即以許水更添些煮杏仁令沸濾過灌入肺中繫定以糯米泔煮熟研細成膏搜和前藥末杵數千下丸如梧桐子大每服五十丸食前桑白皮湯下三分茶出儒門事親茶二錢蜜二兩蕎麥麵四兩右以新水一大碗約打千餘數連飲之飲畢良久下氣不可停人喘自止妙矣葶藶散出仁存方治氣喘滿急腹脹不得卧苦葶藶炒搗細一兩桑白皮一兩陳皮去白一兩右為末每服三錢水一盞棗兒二箇煎至七分去滓服之人參胡桃湯一名觀音散出直指方治胸滿喘急不能睡卧方見咳嗽門痰嗽類神應丹出危氏方治肺氣喘息晨夕不得睡卧不問久新一服見效砒石一兩菉豆六兩右同煮以豆爛為度取出砒石入黃丹一兩同研爛用紙做捲五七重如豆筒又入砒石黃丹以黃埿固濟復燒紅為度又入黃丹一兩麵四分為丸如粟米大又以黃丹二兩為衣每服二粒新井花水下得效即止真應散出三因方治逺年喘氣急不能眠卧百藥無效者右白石英四通明者以生絹袋盛用雄豬肚一箇以藥入線縫定煮熟取藥出再用豬肚一箇如前法煮三煮了取藥出控乾研為末以官局欵冬花散二錢更以桑白皮二寸生薑三片棗二箇水一盞半煎至七分通口服豬肚亦可喫只不得用醬醋椒薑等調和治喘急妙方北五味子大甘草等分為末右用生薑自然汁調安在手心喫葶藶散出濟生方治過食煎煿或飲酒過度致壅喘不得卧及肺癰咽燥不渴濁唾腥臭甜葶藶炒桔梗去蘆􅌝蔞子川升麻薏苡仁桑白皮炙葛根各一兩甘草炙半兩右㕮咀每服四錢水一盞半生薑五片煎至八分去滓食後溫服㵼肺湯出御藥院方治肺氣逆上甚防己陳皮湯浸去穰桔梗去蘆頭赤茯苓杏仁湯浸去皮尖生用半兩苦葶藶二錢半右㕮咀每服一錢水一盞半同煎至六分去滓食後溫服日進二錢或三服亦可黃牛散出仁存方治肺熱脈滑大氣急喘滿大黃一兩白牽牛二兩右為末蜜水調二錢立止又用皂角膏為丸亦可半夏湯出仁存方治定喘下痰半夏一兩甘草三錢皂角炙去皮子半兩右㕮咀每服三錢水一盞半生薑三片煎至七分去滓食後溫服治痰喘方出百一選方右以胡桃肉三箇薑三片是夜服之湯咽下即睡自旦嗽上喘亦不作神驗如此未瘥再嚼胡桃并薑如前數且飲湯勿行動就枕即愈定喘化涎出肘後方右用豬蹄甲四十九箇洗淨控乾每個指甲內半夏白礬各一字入磁罐子內封閉勿令煙出火煆赤去火細研入麝香一錢人有上氣咳嗽喘急用糯米飲下小兒半錢至妙芫花散出百一選方治實喘肺氣脹喘急心胸滿若氣虛而喘者不可服芫花不以多少醋浸一宿取出醋炒令黑焦為細末大麥麴一方作麵右等分和拌極勻以濃煎栁枝酒調下立定一方不用酒水煎食後服之葶藶湯出朱氏集驗方治肺壅氣喘急不得睡卧飲食不進右用葶藶子三兩炒令黃搗為細末以水三升煮大棗三十枚得汁一升內藥中每服如棗大煎取七合頓服一方大人分三服小兒分四服治氣喘痰盛右以檳榔為末湯調下木防己湯出本草方療人膈間肢滿其人喘滿心下痞堅面黧黑其脈沉緊得之數十日吐下即愈用大防己二兩石膏二枚雞子大碎綿裹桂心二兩人參四兩四味以水六升煮取二升分再服虛者便愈實者三日復發汗至三日復不愈者宜去石膏加芒硝三合以水六升煮三味取二升去滓內芒硝分再服微下利則愈禁生蔥孫思邈療遺溺小溲澀亦用三物木防己湯葶藶散治上氣喘急遍身浮腫方見咳嗽門咳嗽不得卧類四七湯出直指方治驚憂氣遏上喘半夏製二兩半茯苓二兩厚朴製一兩半紫蘇葉一兩右㕮咀每服三錢半生薑七片棗二枚煎服五味子湯出活人書治喘促脈浮而厥者五味子半兩人參麥門冬杏仁橘皮去白生薑各二錢半棗兒三枚破右㕮咀以水二盞煎至一盞去滓分作二服用之玉液散出指南方治喘團參川芎茯苓官桂知母杏仁葶藶柴胡半夏各一兩麻黃石膏橘皮白术各一兩訶子羌活秦艽甘草各半兩右為粗末每服五錢水二盞薑五片棗一枚煎一盞去滓溫服平肺湯出指南方天門冬馬兜鈴百部各半兩右為粗末每服五錢水二盞煎至一盞去滓溫服定喘餅子出衛生寶鑑方纍經神驗芫花醋浸一宿炒黃桑白皮炒吳茱茰炒陳皮去白已上各一兩白牽牛半生半炒取末二兩馬兜鈴一兩寒食麵三兩右件五味先杵為末細入牽牛頭末共麵再拌勻羅過滴水為丸如櫻桃大揑作餅子取熱灰半碗在鐣內同餅子熱每服一餅嚼爛煎馬兜鈴湯下夜卧服之如患人心頭快加上一餅至明微痢下神效婦人有胎者不可服平氣散出衛生寶鑑方治盛則為喘己未嵗初秋三日奉詔至六盤山至八月中霖兩時承上命治不憐吉吳元帥夫人年逾五十身體肥盛因過飲酒及鐘乳腹脹喘滿聲聞舍外不得安卧大小便澀滯氣口脈大兩倍于人迎關脈沉緩而有力豫思霖雨之濕飲食之熱濕熱大盛上攻于肺神氣躁亂故為喘滿邪氣盛則實實者宜下之故制平氣散以下白牽牛二兩半生半炒熟取用頭末青皮三錢去白大黃七錢雞心檳榔三錢陳皮半兩去白內經曰肺若氣上逆急食苦以泄之白牽牛苦寒瀉氣分濕熱上攻為喘故以為君陳皮苦溫體浮理其肺氣青皮苦辛散肺中滯氣為臣檳榔辛溫性沉重下痰降氣大黃苦寒蕩滌滿實故以為使右為末每服三錢煎生薑湯一大盞調下無時一服減半再服喘愈止有胸膈不利煩熱口乾時時咳嗽以加減瀉白散主之加減瀉白散出衛生寶鑑方桑白皮一兩地骨皮五錢知母去皮五錢青皮去白二錢陳皮三錢細黃芩三錢桔梗五錢甘草炙三錢右件銼如麻豆每服五稱水二大盞煎至一盞去滓食後溫服數服良愈華陀云盛則為喘減則為枯活人書云發喘者氣有餘也凡看文字須要會得本意盛而為喘者非肺氣盛也喘為氣有餘者亦非肺氣有餘也氣盛當認作氣衰有餘當認作促肺氣果盛又為有餘當清肅下行而不喘以其火入于肺衰而不足為喘焉故言盛非言肺氣盛也言肺氣中之火盛也言有餘者非言肺氣有餘也言肺中火有餘也故瀉肺以苦寒之劑非瀉肺中之火實補肺氣用者不可不知蘇子降氣湯出如宜方治喘虛陽上攻喘促當歸甘草厚朴製前胡各二兩陳皮製桂各二兩蘇子半夏各五兩右㕮咀薑棗煎杏仁膏治氣喘促浮腫小便澀右用杏仁一兩去皮尖熬研和米煮粥極熱空心喫二合人參散若猶覺停滯在心胸膈中不利者方見咳嗽門咳嗽上氣唾膿血類獨聖散又名必效散得效定喘右用訶子大者為末每服一錢糯米飲調下治卒上氣喘息鳴息便欲絶用人參末服之日五六服治喘殊妙右用露蜂房一枚須取似盞大者燒灰存性入白丁香七粒即雄雀糞每服一錢半濃煎人參湯調下立止不拘時候喘嗽論夫五臟者皆稟于肺若肺氣虛為風冷所乘使經絡否澀氣不宣通則肺壅脹則氣逆則心胸滿塞故令咳嗽喘急也夫肺為五臟六腑之華蓋主行氣于皮毛形寒飲冷則傷于肺肺一受邪安能統攝諸氣氣亂胸中而疾生焉重則為喘輕則為嗽喘之為病由痰實而氣不散上激咽喉哮呷作聲咯不出咽不下憧憧而急渴渴而數張口擡肩搖身輥肚嗽之為疾病由氣急而痰隨上浮風生喉靨淫淫如癢習習如硬涕唾稠濃聲音重濁甚則續續不已坐卧不安諸方定喘嗽皆以三物拗湯為主麻黃散冷杏仁下氣甘草和中故也九寶湯一方于中皆增六品深有理焉本草云麻黃久服令人虛患喘人無時而發此方中有肉桂實表不致亡陽薄荷桑皮清利膈道紫蘇陳皮大腹寬和氣宇造化精深政如千金方小續命湯用麻黃佐肉桂云久服不令人虛亦此意也方神效散治老幼喘嗽神效杏仁去皮尖炒一兩半甘草炙旋覆花各三兩白术蓮肉去皮心射干米泔浸前胡御米略炒百合水浸去沫白扁豆略炒川芎各三兩人參白茯苓各四兩神麴炒五兩桑白皮炒乾葛桔梗各六兩右為細末每服二錢水一盞生薑三片棗一個煎至七分食後溫服知母茯苓湯出醫方大成治肺痿喘嗽否塞往來寒熱自汗方在肺臟門肺痿類調降湯出直指方治喘嗽枳殼製一兩半夏製北梗青皮陳皮真蘇子檳榔茯苓葶藶隔紙炒各半兩木香白豆蔲仁縮砂仁紫蘇葉各二錢半甘草炙三分右銼散每服三錢薑五片食前服神應丹出御藥院方治諸逺年喘嗽麻黃一十斤走水洗淨去土爛搗用河水四擔浸一宿砂鍋熬至二擔去滓栝蔞大者一個皂角二定去皮絃并子貝母炒去心桑白皮去土紫蘇子欵冬花桔梗知母各二兩已上八味搗爛入前麻黃汁內熬至一半去滓澄取清汁再熬成調膏白茯苓去皮阿膠杵碎炒為末稱入藥拌勻各二兩紫菀洗去土天麻人參去蘆三味為末各一兩右件十四味以藥末搜和前膏杵熱為丸如小彈大每服一丸溫虀汁化開臨卧飲之便去枕仰卧不許久坐如不得睡乃藥之效也此治嗽較慢如治喘不以新久如神服此藥三服後似見痢一般平肺湯出簡易方治肺氣上壅喘嗽痰實寒熱往來咽乾口燥陳皮一兩半夏洗七次苦梗炒薄荷各七錢紫蘇烏梅去核紫菀知母桑白皮蜜炒杏仁炒五味子罌粟殼蜜炒各七錢半甘草炙半兩右為粗末每服三錢生薑三片水煎六分食後溫服加味白术散出危氏方陳皮半夏人參白茯苓白术甘草炙山藥炮各二兩白扁豆製一兩半縮砂桔梗炒石蓮肉薏苡仁各一兩右銼散治喘嗽每遇飲酒必發生薑桑白皮煎服效杏蘇飲出直指方治上氣喘嗽浮腫紫蘇葉二兩五味子大腹皮烏梅肉杏仁去皮尖各一兩半陳皮北梗麻黃去節桑白皮炒阿膠炒各三分紫菀甘草炒各一兩右㕮咀每服三錢薑五片煎服參蘇半夏湯出御藥院方治咳嗽痰涎咽膈不利喘滿氣不宣通人參桂去粗皮甘草炙木香各一兩五味子桑白皮炒陳皮去白白术紫蘇葉半夏薑製各二兩右為末每服五錢水一大盞半生薑十片煎至八分去滓食後溫服定肺湯出直指方治上氣喘嗽紫菀茸北五味子橘紅杏仁去皮尖略炒真蘇子炒桑白皮炒半夏製枳殼製各等分右為末每服三錢薑五片紫蘇五葉食後煎服八仙丸治喘嗽神效棗三個去核紙裹巴豆慢火燒煙盡天南星炮一兩半夏洗小皂角炙黃去皮子甘草炒欵冬花白礬枯各半兩巴豆七個杏仁三十五個去皮尖炒右為細末醋糊為丸如梧桐子大每服二三十丸溫菜虀汁下喘嗽細嚼燒蘿蔔栗子生薑湯下五靈蟬退丸出本事方治年久近日喘嗽蟬退一兩去頭足五靈脂半兩生砒生用半兩雄黃生杏仁去皮尖各半兩輕粉一兩淡豆豉四十九粒馬兜鈴一兩生右件除輕粉研為末用生薑荸薺自然汁合粉藥丸如龍眼大每服一丸臨卧細嚼生薑湯送下忌毒人參蛤蚧散出濟生拔萃方治三二十年間肺氣上喘嗽咯唾膿血滿面生瘡遍身黃腫悉皆治之亦治肺痿咳嗽及肺壅咽燥蛤蚧一對全者以河水浸五宿逐日換水淨浸去腥氣酥火炙香熟甘草炒紫杏仁