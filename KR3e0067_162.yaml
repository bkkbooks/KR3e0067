每服五錢水一盞半生薑三片肥烏梅一箇拍碎煎至七分去滓溫服不拘時臨卧服尤妙安神散治痰涎喘𠻳乆不愈欵冬花佛耳草各三錢鍾乳石白礬甘草生各一分右為末每服二錢水一盞入蠟少許煎至七分和滓溫服食後每日二錢郁李仁丸治水氣乗肺動痰作喘身體㣲腫方見咳𠻳門咳𠻳面目浮腫類辰砂半夏丸治大人小兒肺壅痰實咳𠻳喘急胸膈痞滿心忪煩悶痰涎不利呀呷有聲半夏湯炮葶藶别研杏仁去皮尖别研各半兩五靈脂硃砂别研各一兩右將五靈脂半夏為細末却入杏仁葶藶硃砂末攪勻生薑汁打糊為丸如梧桐子大每服二十丸食後蘿蔔湯下葶藶散出宣明論治肺氣喘滿痰𠻳睡卧不安不思飲食苦葶藶蛤蚧粉各三錢桑白皮山梔子人參各五分荆介穗薄荷葉赤茯苓桔梗杏仁去皮尖甘草已上各半兩右為末每服三錢水一大盞生薑三片煎至六分去滓食後溫服參蘇溫肺湯治形寒飲冷傷肺喘𠻳煩心胸滿氣不得動暢人參紫蘇葉甘草各五錢肉桂五味子木香各四兩陳皮白术各六錢半夏姜製白茯苓去皮各半兩桑白皮一兩右為麄末每服五錢水一盞半生薑三片煎至八分去滓大溫服食後如冬寒每服中加不去節麻黄半錢先洗去沫下諸藥九寳湯出澹寮方治老人小兒婦人室女素有喘疾過寒暄不常發則連綿不已喘𠻳哮吼夜不得睡麻黄薄荷陳皮各一兩官桂紫蘇杏仁去皮尖桑白皮甘草大腹子連皮各半兩右㕮咀每服三錢水一盞半生薑三片烏梅半箇煎至六分去滓専心服餌其効甚著或入童子小便尤佳感冐鼻流清涕亦効病各有主對不可疑其發散耗氣之説惟虚勞自汗不當用之一方罌粟殻二箇去頂人參少許救生丹治大人小兒呴喘咳𠻳其効如神䝞丹馬牙硝人言各一錢細研一各夜露七宿用甜葶藶隔紙炒桑白皮半兩杏仁去皮尖半兩雞膍胵十个右為細末同煎三味和勻棗肉為丸如梧桐子大每服七丸臨卧清茶下紅椒丸出危氏方治虚勞喘𠻳眩暈靈砂一兩細研人參木香大香附子杵浄大紅椒去合口并子焙出汗各半兩右為末糕糊丸如麻子大每服二十丸空心橘皮湯下胡椒半夏丸治虚寒喘𠻳冷痰不止半夏乾薑各一兩胡椒丁香各一分右為細末生薑自然汁煮薄糊為丸如梧桐子大每服三十丸細嚼乾柿湯食後送下鍾乳丸出危氏方治喘𠻳痰涎稠粘晝夜不止不得坐卧逺年近日並皆治之滑石半兩鍾乳粉見成者一兩南星炮切片生薑製右為末煮乾柿去蒂核搗細搜藥為丸如梧桐子大每服四十丸薑棗煎湯下氣弱人更服養正丹百花膏出濟生方治喘𠻳不已或痰中有血欵冬花百合蒸焙右等分為細末錬蜜為丸如龍眼大每服一丸食後臨卧細嚼薑湯嚥下噙化尤佳杏仁煎出濟生方治久患肺喘咳𠻳不得已睡卧不得服之即愈杏仁去皮尖胡桃肉右等分為細末研成膏錬蜜少許丸如彈子大每服一丸或二丸食後臨卧細嚼用薑湯嚥下人參湯亦可生薑煎服亦可寜神散一名寜肺散方見咳𠻳門五臟諸咳𠻳類雌黄丸出聖恵方治咳𠻳喘急雌黄一分雄黄一分杏仁七枚湯浸去皮尖雙仁炒㣲黄色右為末以蟾酥為丸如粟米大以燈心煎湯每服三五丸送下治喘𠻳上氣華陀中藏經方蒲頽葉治一切肺喘劇甚者効如神焙碾為末米飲調服二錢匕併服取瘥氣味清香其實酸澁夏紅可食核如棗核類山茱茰揀葉皆白者用江西謂之盧都子七七散余居士選竒方治喘𠻳長皂莢三條去黒皮破開兩邊去子一莢入巴豆十粒一莢入半夏十粒一莢入杏仁十枚用生薑汁製杏仁麻油製巴豆蜜製半夏右件一處火炙黄色碾為細末每服用一字安在手掌中臨睡用生薑汁調舌㸃喫立有神効雄黄丸余居士選竒方治喘𠻳雄黄雌黄信各一錢巴豆五粒半夏半兩湯浸七次右搗末糊為丸如椒子大每服五丸臨睡茶清下忌熱物小兒加減與服之四寳丸出仁存方治喘𠻳化痰知母貝母欵冬花白礬枯右等分為末以稀糊丸如梧桐子大甑上蒸過每服二十丸食後薑湯送下千金丸出仁存方治證同前南星半夏各一兩白礬一兩半枯右以生𤓰蔞一個去子入藥在内濕紙裹煨熟取出為末再用生白礬一兩將𤓰蔞穣汁并𤓰蔞仁研細同丸如梧桐子大每服十五丸用淡薑湯下臨卧服之一方出仁存方治喘𠻳雄黄雌黄信石黄丹右等分用鯽魚一箇去膓肚洗浄量魚大小入藥在内令滿以線縳定鹹埿固濟用炭三斤燒紅候冷取出研細末浸蒸餅為丸菉豆大臨卧沙糖水下三五丸小兒一二丸每夜只一服化痰延夀丸海岳居士秘方治痰喘中滿咽喉作聲或中風偏枯不能行歩並宜服之香附四兩炒南星一兩炮半夏四兩漿水浸枳殻二兩麩炒去穰白礬半兩黒牽牛頭末四兩炒㣲黄商陸一兩右為細末酒打麪糊為丸如梧桐子大每服五六十丸生薑湯送下食逺臨卧服之𠻳加人參一兩喘加紫參一兩甜葶藶丸出聖恵方治一切喘𠻳不瘥甜葶藶一兩隔紙炒令紫色人參三分去蘆頭赤茯苓三分蛤蚧一對頭尾全酥炙㣲黄杏仁一兩湯浸去皮尖雙仁炒右為細末以棗肉和丸如梧桐子大每服三十丸日進三四服以粥飲下控痰良方出直指方治喘𠻳通用䝞丹白礬各二兩右以錢王塼剜一大孔先入䝞丹以白礬葢頂用炭一斤煆至火盡礬枯丹黒出火毒研細煮調麪和丸如麻子大每服十五丸沸湯泡生薑汁送下諸頑痰迷塞關竅不通聲音不出以三十丸研末入全蝎少許用自然薑汁下澄取清者調灌須㬰吐痰立愈凡喘促胸膈膨湃寸脉急數須從權吐之中滿内實而喘者與解毒雄黄丸二黄丸衛生家寳方治喘𠻳哮呷氣急雌雄雄黄三錢雌黄三錢信砒一錢馬兠鈴三錢重杏仁七粒去皮尖右件研細將皂角五條不蛀者搥碎挼取汁一盞熬成膏子和藥安乳鉢内燒皂角烟熏過丸如蘿蔔子大每服三丸臨卧虀水送下小兒一丸孕婦不可服一夜只一服喘退不可服也治感冐寒喘𠻳久不瘥或身有煩熱其脉弦𦂳者澹寮方小柴胡湯加桑白皮北五味子薑棗煎服治喘𠻳右用陳橘皮一兩水浸去穰細切用巴豆十粒去殻同橘皮炒令十分赤色傾在桌子上㨂去巴豆須浄盡不用巴豆擣橘皮為末每服二錢水飲調下臨卧時服逺年二三服或㵼一兩行不妨以溫粥補之忌食毒物哮論夫治哮𠻳者一名䶎齁涎在咽喉間令人喘𠻳不寜甚者揺身滚肚上氣喘急頭汗身冷或時發作多由小年冷水驚恐所致也方青金丹治天南星一兩人參二錢半半夏一兩半欵冬花三錢杏仁二兩去皮尖螺青半錢百藥煎二兩五味子五錢殭蠶二个白礬半錢訶子五錢皂角一兩右為細末薑汁糊為丸如梧桐子大每服二十丸臨卧茶清送下忌生冷膩熱之物日三服黄明膠散出本事方治十六般哮𠻳黄明膠一兩炒馬兠鈴仁甘草各一兩半夏薑汁浸三日重一两杏仁去皮尖一两人參半两右為末每服一大錢水一盞隨病湯使煎至七分臨卧後服心𠻳面赤或汗流加乾葛煎一方白芷肝𠻳眼中淚加烏梅一箇糯米十四粒煎脾𠻳不思飲食或惡心入薑三片煎胃𠻳吐通吐醍酸水蚌粉煎肺𠻳上氣喘急入桑白皮煎膽𠻳令人不唾用茶半錢調膈𠻳咳出痰丸塊生薑自然汁調嚥下勞𠻳入秦艽末同煎冷𠻳天曉時𠻳甚加葱白同煎血𠻳連頓不住當歸生薑一方棗産後𠻳背髀疼痛甘草一寸黄蠟少許煎黎𠻳涕唾稠黏烏梅生薑煎氣𠻳吐痛脹滿青皮去白煎熱𠻳夜甚蜜一匙葱頭白煎哮𠻳聲如拽鋸入半夏二個煎腎𠻳時復三兩聲入黄蓍白糖煎已上十六件哮𠻳病依法煎服無不効驗青金丹一名定喘寜肺丸治齁𠻳方見咳𠻳門久𠻳類内金丸出仁存方治呴喘雞内金二十一箇信石二錢半黄丹半兩右各研細露星七宿再入白牽牛末半兩葶藶末半兩半夏二錢半共為末蒸棗肉取膏為丸如麻子大露星二宿硃砂為衣每服七丸臨卧冷清茶送下金粟丹一名雄黄解毒丸出經驗良方雞冠雄黄研令極細欝金各二錢半巴豆十四粒去殻膜壓令油盡右為末醋煮麪糊為丸如粟大津唾嚥下或茶清下大人十丸小兒量其大小與服見効治逺年近日哮𠻳妙方出本事方砒一錢麪一錢海螵蛸一錢右為末水調作餅子慢火炙黄再研令細毎服一字用井花水調一大鍾呷空心服良久吐出為度小兒加減與之忌食毒物紫金丹出本事方治喘信石一錢半研淡䜴一两水潤去皮研成膏右以䜴丸如菉豆大每服七丸至十丸冷淡茶清下臨卧只一服後不可喫一應湯水之類今以信八分䜴一兩每服二十丸一法二件成膏搽盌内艾熏入生硃末丸有一夙疾婦人患十年遍求醫者皆不効忽有一道人貨此藥漫贖一服是夜減半數服頓愈遂多金丐得此方予屢用以救人特為神異鬼哭丹一名䜴破丸出經驗良方治䶎齁亦能治瘧白信石一錢白砒霜者良不用黒者寒水石四錢右各研為細末取端午日三五家粽角極薄切用建盞盛粽一過用寒水石鋪一過却信石鋪之如後用粽角用前法鋪之如鋪盡仍將粽子葢却用淡䜴冷水㣲浸取濃汁滴于盞内用乳搥搗錬成丸取劑左右心盛藥丸如大粟米大每服大人止服五丸五嵗後止三丸周嵗已上止一丸瘧痰未發前五更東流水化下水䶎鹹篛燒灰調沸湯候冷吞下食䶎茶篛燒灰調沸湯冷下或冷蠟茶清下老䶎用半夏五粒生薑一大塊同擂自然汁吞下永逺不發古老飲出仁存方治魚哮𠻳古老錢白梅肉各七箇右水一大盞浸二宿每服一茶脚許空心服良久吐出惡物鯽魚丸出家藏經驗方治肺經久受邪氣𠻳喘急初發則寒從背起冷如氷雪漸漸喘促氣不相續痰涎壅塞咯吐不出坐卧不得莫可支吾兩肩聳竪曲背弩目困憊欲絶宜服或未効再服即愈其効如神右用鯽魚重一斤者不去鱗膓只于肚下近頭處開一孔入信石一塊重一錢令深入在内却以魚入竹筒内外用青蒿搗埿固濟候乾火煆竹筒通紅候冷出埿取魚去燒不過者研細入蚌粉三錢研得所丸如菉豆大硃砂為衣每服四丸或五六丸沙糖冷水下臨卧服之忌熱物一方喘正急時宜服不可多過丸數欲試此藥先用猪肺一枚吹脹入數粒于肺脘内頃刻漸痿方表其効千金丸治哮呴呴藥千兩金丸竒神仙留與故人知一兩雄黄雞冠色半兩明信煆如灰一兩𤣥精龜背様雌黄一兩最相宜一兩鵞管如雪色二兩明霜火上飛二兩蛤蚧巴豆炒去了殻兒六十枚同炒去豆只用粉荷葉乳為極細末浥糕調糊莫令稀丸如菉豆顆兒大每服七丸用冷虀小兒服時嵗加減喫了忌酒三日期喉如拽鋸聲鳴響審問莫與藥差池此藥家𫝊百餘載且莫輕𫝊寳秘之紅㪚子治諸呀呷有聲睡卧不得右土硃不拘多少極為細末米醋調時時進一二服治一切􅀈齁右用處州磁器不以多少打碎碾為細末如齁發時每用二三錢用手指頭㸃津液醮藥㸃舌上嚥下即効黒馬蹄香散治哮呴右用馬蹄香焙乾研為細末每服二三錢如正發時用淡醋調不少時刻吐出痰涎為驗馬屁勃丸治哮呴方見咳𠻳門久𠻳類白前方出肘後方主久患呀呷咳𠻳喉中作聲不得睡卧右取白前搗為末溫酒調二錢服治久哮右用梧桐子一連紙包濕放在火煨取出安地上出火氣為末空心井花水一盞送下痰出即愈治哮喘𠻳右以大南星切作片香油煎至黒色研末睡覺細嚼嚥茶清𠻳口不語之治吼喘咳𠻳病脾胃寒不思飲食面色黄羸痩古人名為肺脹今人却做胸喉大黄黒白二牽牛等分修合成就更加㯽榔為末名為奪命因由冷漿調下便時休免得胡針亂灸治齁喘出朱氏集驗方右用苦丁香三個為末水調細呷吐出稠痰即愈治䶎齁永類鈐方白礬半兩煆天南星半兩炒至烟起巴豆半錢去皮油甘遂二錢半末右作末和匀每服大人一錢小兒半錢薑片夾嚼燈心湯臨卧一服尋常華葢散打和參蘇飲服婦人九寳湯和清肺湯加芎歸煎服寮齁出本草方右取榆白皮隂乾後焙杵為末每日朝夜用水五合末二錢煎至如膠服瘥治齁䶎及吐風涎右用石莧與甘草同煑服治喉中呀呷有聲不絶右以不蛀皂角燒灰存性碾細以生薑自然汁調一錢許于掌中旋旋舌䑛之普濟方卷一百六十三
