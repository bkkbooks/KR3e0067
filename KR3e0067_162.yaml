每服五錢水一盞半生薑三片肥烏梅一箇拍碎煎至七分去滓溫服不拘時臨卧服尤妙安神散治痰涎喘嗽久不愈欵冬花佛耳草各三錢鍾乳石白礬甘草生各一分右為末每服二錢水一盞入蠟少許煎至七分和滓溫服食後每日二錢郁李仁丸治水氣乘肺動痰作喘身體微腫方見咳嗽門咳嗽面目浮腫類辰砂半夏丸治大人小兒肺壅痰實咳嗽喘急胸膈痞滿心忪煩悶痰涎不利呀呷有聲半夏湯炮葶藶别研杏仁去皮尖别研各半兩五靈脂硃砂别研各一兩右將五靈脂半夏為細末却入杏仁葶藶硃砂末攪勻生薑汁打糊為丸如梧桐子大每服二十丸食後蘿蔔湯下葶藶散出宣明論治肺氣喘滿痰嗽睡卧不安不思飲食苦葶藶蛤蚧粉各三錢桑白皮山梔子人參各五分荆介穗薄荷葉赤茯苓桔梗杏仁去皮尖甘草已上各半兩右為末每服三錢水一大盞生薑三片煎至六分去滓食後溫服參蘇溫肺湯治形寒飲冷傷肺喘嗽煩心胸滿氣不得動暢人參紫蘇葉甘草各五錢肉桂五味子木香各四兩陳皮白术各六錢半夏薑製白茯苓去皮各半兩桑白皮一兩右為粗末每服五錢水一盞半生薑三片煎至八分去滓大溫服食後如冬寒每服中加不去節麻黃半錢先洗去沫下諸藥九寶湯出淡寮方治老人小兒婦人室女素有喘疾過寒暄不常發則連綿不已喘嗽哮吼夜不得睡麻黃薄荷陳皮各一兩官桂紫蘇杏仁去皮尖桑白皮甘草大腹子連皮各半兩右㕮咀每服三錢水一盞半生薑三片烏梅半箇煎至六分去滓専心服餌其效甚著或入童子小便尤佳感冒鼻流清涕亦效病各有主對不可疑其發散耗氣之説惟虛勞自汗不當用之一方罌粟殼二箇去頂人參少許救生丹治大人小兒詬喘咳嗽其效如神䝞丹馬牙硝人言各一錢細研一各夜露七宿用甜葶藶隔紙炒桑白皮半兩杏仁去皮尖半兩雞膍胵十個右為細末同煎三味和勻棗肉為丸如梧桐子大每服七丸臨卧清茶下紅椒丸出危氏方治虛勞喘嗽眩暈靈砂一兩細研人參木香大香附子杵淨大紅椒去合口并子焙出汗各半兩右為末糕糊丸如麻子大每服二十丸空心橘皮湯下胡椒半夏丸治虛寒喘嗽冷痰不止半夏乾薑各一兩胡椒丁香各一分右為細末生薑自然汁煮薄糊為丸如梧桐子大每服三十丸細嚼乾柿湯食後送下鍾乳丸出危氏方治喘嗽痰涎稠粘晝夜不止不得坐卧逺年近日並皆治之滑石半兩鍾乳粉見成者一兩南星炮切片生薑製右為末煮乾柿去蒂核搗細搜藥為丸如梧桐子大每服四十丸薑棗煎湯下氣弱人更服養正丹百花膏出濟生方治喘嗽不已或痰中有血欵冬花百合蒸焙右等分為細末錬蜜為丸如龍眼大每服一丸食後臨卧細嚼薑湯咽下噙化尤佳杏仁煎出濟生方治久患肺喘咳嗽不得已睡卧不得服之即愈杏仁去皮尖胡桃肉右等分為細末研成膏錬蜜少許丸如彈子大每服一丸或二丸食後臨卧細嚼用薑湯咽下人參湯亦可生薑煎服亦可寧神散一名寧肺散方見咳嗽門五臟諸咳嗽類雌黃丸出聖惠方治咳嗽喘急雌黃一分雄黃一分杏仁七枚湯浸去皮尖雙仁炒微黃色右為末以蟾酥為丸如粟米大以燈心煎湯每服三五丸送下治喘嗽上氣華陀中藏經方蒲頽葉治一切肺喘劇甚者效如神焙碾為末米飲調服二錢匕併服取瘥氣味清香其實酸澀夏紅可食核如棗核類山茱茰揀葉皆白者用江西謂之盧都子七七散余居士選竒方治喘嗽長皂莢三條去黑皮破開兩邊去子一莢入巴豆十粒一莢入半夏十粒一莢入杏仁十枚用生薑汁製杏仁麻油製巴豆蜜製半夏右件一處火炙黃色碾為細末每服用一字安在手掌中臨睡用生薑汁調舌點喫立有神效雄黃丸余居士選竒方治喘嗽雄黃雌黃信各一錢巴豆五粒半夏半兩湯浸七次右搗末糊為丸如椒子大每服五丸臨睡茶清下忌熱物小兒加減與服之四寶丸出仁存方治喘嗽化痰知母貝母欵冬花白礬枯右等分為末以稀糊丸如梧桐子大甑上蒸過每服二十丸食後薑湯送下千金丸出仁存方治證同前南星半夏各一兩白礬一兩半枯右以生瓜蔞一個去子入藥在內濕紙裹煨熟取出為末再用生白礬一兩將瓜蔞穰汁并瓜蔞仁研細同丸如梧桐子大每服十五丸用淡薑湯下臨卧服之一方出仁存方治喘嗽雄黃雌黃信石黃丹右等分用鯽魚一箇去腸肚洗淨量魚大小入藥在內令滿以線縳定鹹埿固濟用炭三斤燒紅候冷取出研細末浸蒸餅為丸菉豆大臨卧沙糖水下三五丸小兒一二丸每夜只一服化痰延夀丸海嶽居士祕方治痰喘中滿咽喉作聲或中風偏枯不能行步並宜服之香附四兩炒南星一兩炮半夏四兩漿水浸枳殼二兩麩炒去穰白礬半兩黑牽牛頭末四兩炒微黃商陸一兩右為細末酒打麵糊為丸如梧桐子大每服五六十丸生薑湯送下食逺臨卧服之嗽加人參一兩喘加紫參一兩甜葶藶丸出聖惠方治一切喘嗽不瘥甜葶藶一兩隔紙炒令紫色人參三分去蘆頭赤茯苓三分蛤蚧一對頭尾全酥炙微黃杏仁一兩湯浸去皮尖雙仁炒右為細末以棗肉和丸如梧桐子大每服三十丸日進三四服以粥飲下控痰良方出直指方治喘嗽通用䝞丹白礬各二兩右以錢王磚剜一大孔先入䝞丹以白礬蓋頂用炭一斤煆至火盡礬枯丹黑出火毒研細煮調麵和丸如麻子大每服十五丸沸湯泡生薑汁送下諸頑痰迷塞關竅不通聲音不出以三十丸研末入全蝎少許用自然薑汁下澄取清者調灌須臾吐痰立愈凡喘促胸膈膨湃寸脈急數須從權吐之中滿內實而喘者與解毒雄黃丸二黃丸衛生家寶方治喘嗽哮呷氣急雌雄雄黃三錢雌黃三錢信砒一錢馬兜鈴三錢重杏仁七粒去皮尖右件研細將皂角五條不蛀者捶碎挼取汁一盞熬成膏子和藥安乳鉢內燒皂角煙熏過丸如蘿蔔子大每服三丸臨卧虀水送下小兒一丸孕婦不可服一夜只一服喘退不可服也治感冒寒喘嗽久不瘥或身有煩熱其脈弦緊者淡寮方小柴胡湯加桑白皮北五味子薑棗煎服治喘嗽右用陳橘皮一兩水浸去穰細切用巴豆十粒去殼同橘皮炒令十分赤色傾在桌子上㨂去巴豆須淨盡不用巴豆搗橘皮為末每服二錢水飲調下臨卧時服逺年二三服或㵼一兩行不妨以溫粥補之忌食毒物哮論夫治哮嗽者一名䶎齁涎在咽喉間令人喘嗽不寧甚者搖身滚肚上氣喘急頭汗身冷或時發作多由小年冷水驚恐所致也方青金丹治天南星一兩人參二錢半半夏一兩半欵冬花三錢杏仁二兩去皮尖螺青半錢百藥煎二兩五味子五錢殭蠶二個白礬半錢訶子五錢皂角一兩右為細末薑汁糊為丸如梧桐子大每服二十丸臨卧茶清送下忌生冷膩熱之物日三服黃明膠散出本事方治十六般哮嗽黃明膠一兩炒馬兜鈴仁甘草各一兩半夏薑汁浸三日重一兩杏仁去皮尖一兩人參半兩右為末每服一大錢水一盞隨病湯使煎至七分臨卧後服心嗽面赤或汗流加乾葛煎一方白芷肝嗽眼中淚加烏梅一箇糯米十四粒煎脾嗽不思飲食或惡心入薑三片煎胃嗽吐通吐醍酸水蚌粉煎肺嗽上氣喘急入桑白皮煎膽嗽令人不唾用茶半錢調膈嗽咳出痰丸塊生薑自然汁調咽下勞嗽入秦艽末同煎冷嗽天曉時嗽甚加蔥白同煎血嗽連頓不住當歸生薑一方棗産後嗽背髀疼痛甘草一寸黃蠟少許煎黎嗽涕唾稠黏烏梅生薑煎氣嗽吐痛脹滿青皮去白煎熱嗽夜甚蜜一匙蔥頭白煎哮嗽聲如拽鋸入半夏二個煎腎嗽時復三兩聲入黃蓍白糖煎已上十六件哮嗽病依法煎服無不效驗青金丹一名定喘寧肺丸治齁嗽方見咳嗽門久嗽類內金丸出仁存方治詬喘雞內金二十一箇信石二錢半黃丹半兩右各研細露星七宿再入白牽牛末半兩葶藶末半兩半夏二錢半共為末蒸棗肉取膏為丸如麻子大露星二宿硃砂為衣每服七丸臨卧冷清茶送下金粟丹一名雄黃解毒丸出經驗良方雞冠雄黃研令極細鬱金各二錢半巴豆十四粒去殼膜壓令油盡右為末醋煮麵糊為丸如粟大津唾咽下或茶清下大人十丸小兒量其大小與服見效治逺年近日哮嗽妙方出本事方砒一錢麵一錢海螵蛸一錢右為末水調作餅子慢火炙黃再研令細每服一字用井花水調一大鍾呷空心服良久吐出為度小兒加減與之忌食毒物紫金丹出本事方治喘信石一錢半研淡䜴一兩水潤去皮研成膏右以䜴丸如菉豆大每服七丸至十丸冷淡茶清下臨卧只一服後不可喫一應湯水之類今以信八分䜴一兩每服二十丸一法二件成膏搽碗內艾熏入生硃末丸有一夙疾婦人患十年遍求醫者皆不效忽有一道人貨此藥漫贖一服是夜減半數服頓愈遂多金丐得此方豫屢用以救人特為神異鬼哭丹一名䜴破丸出經驗良方治䶎齁亦能治瘧白信石一錢白砒霜者良不用黑者寒水石四錢右各研為細末取端午日三五家粽角極薄切用建盞盛粽一過用寒水石鋪一過却信石鋪之如後用粽角用前法鋪之如鋪盡仍將粽子蓋却用淡䜴冷水微浸取濃汁滴于盞內用乳捶搗錬成丸取劑左右心盛藥丸如大粟米大每服大人止服五丸五嵗後止三丸周嵗已上止一丸瘧痰未發前五更東流水化下水䶎鹹篛燒灰調沸湯候冷吞下食䶎茶篛燒灰調沸湯冷下或冷蠟茶清下老䶎用半夏五粒生薑一大塊同擂自然汁吞下永逺不發古老飲出仁存方治魚哮嗽古老錢白梅肉各七箇右水一大盞浸二宿每服一茶腳許空心服良久吐出惡物鯽魚丸出家藏經驗方治肺經久受邪氣嗽喘急初發則寒從背起冷如氷雪漸漸喘促氣不相續痰涎壅塞咯吐不出坐卧不得莫可支吾兩肩聳竪曲背弩目困憊欲絶宜服或未效再服即愈其效如神右用鯽魚重一斤者不去鱗腸只于肚下近頭處開一孔入信石一塊重一錢令深入在內却以魚入竹筒內外用青蒿搗埿固濟候乾火煆竹筒通紅候冷出埿取魚去燒不過者研細入蚌粉三錢研得所丸如菉豆大硃砂為衣每服四丸或五六丸沙糖冷水下臨卧服之忌熱物一方喘正急時宜服不可多過丸數欲試此藥先用豬肺一枚吹脹入數粒于肺脘內頃刻漸痿方表其效千金丸治哮詬詬藥千兩金丸竒神仙留與故人知一兩雄黃雞冠色半兩明信煆如灰一兩玄精龜背樣雌黃一兩最相宜一兩鵝管如雪色二兩明霜火上飛二兩蛤蚧巴豆炒去了殼兒六十枚同炒去豆只用粉荷葉乳為極細末浥糕調糊莫令稀丸如菉豆顆兒大每服七丸用冷虀小兒服時嵗加減喫了忌酒三日期喉如拽鋸聲鳴響審問莫與藥差池此藥家傳百餘載且莫輕傳寶祕之紅散子治諸呀呷有聲睡卧不得右土硃不拘多少極為細末米醋調時時進一二服治一切􅀈齁右用處州磁器不以多少打碎碾為細末如齁發時每用二三錢用手指頭點津液醮藥點舌上咽下即效黑馬蹄香散治哮詬右用馬蹄香焙乾研為細末每服二三錢如正發時用淡醋調不少時刻吐出痰涎為驗馬屁勃丸治哮詬方見咳嗽門久嗽類白前方出肘後方主久患呀呷咳嗽喉中作聲不得睡卧右取白前搗為末溫酒調二錢服治久哮右用梧桐子一連紙包濕放在火煨取出安地上出火氣為末空心井花水一盞送下痰出即愈治哮喘嗽右以大南星切作片香油煎至黑色研末睡覺細嚼咽茶清嗽口不語之治吼喘咳嗽病脾胃寒不思飲食面色黃羸瘦古人名為肺脹今人却做胸喉大黃黑白二牽牛等分修合成就更加檳榔為末名為奪命因由冷漿調下便時休免得胡針亂灸治齁喘出朱氏集驗方右用苦丁香三個為末水調細呷吐出稠痰即愈治䶎齁永類鈐方白礬半兩煆天南星半兩炒至煙起巴豆半錢去皮油甘遂二錢半末右作末和勻每服大人一錢小兒半錢薑片夾嚼燈心湯臨卧一服尋常華蓋散打和參蘇飲服婦人九寶湯和清肺湯加芎歸煎服寮齁出本草方右取榆白皮隂乾後焙杵為末每日朝夜用水五合末二錢煎至如膠服瘥治齁䶎及吐風涎右用石莧與甘草同煮服治喉中呀呷有聲不絶右以不蛀皂角燒灰存性碾細以生薑自然汁調一錢許于掌中旋旋舌舐之普濟方卷一百六十三
