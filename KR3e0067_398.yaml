body:
  text: 普濟方卷三百九十八明周王朱橚撰嬰兒下痢門疳痢附論夫小兒疳痢者由乳哺不節生冷過度傷於脾胃冷熱相摶致臟腑不調久而不瘥即變諸疳若大腸虚弱水穀不化下痢無度是為疳痢其證靣色萎黄肌體羸瘦盜汗壯熱皮毛焦枯嗜好酸醎心腹虚脹痢下藴瘀日夜無度是也方熊膽散治一切疳痢熊膽研雄黄研青黛研丹砂研各半兩甘草炙一兩黄礬燒令枯細辛去苗葉莨菪子炒各半兩蘆薈研龍膽當歸焙白礬燒令汁盡蟬蛻炒蝦蟇炙焦各三分麝香研黄連去鬚黄蘗去皮各一兩右為散六十日至百日孩子毎服一字一二歳半錢三四歳一錢並米飲調下早晚食前各一服大疳丸治小兒痢疳羸瘦黄礬枯緑礬各一兩膽礬二錢乾蝦蟇一枚去腸肚炙莨菪子葶􅐗炒各一分蝸牛四枚已上七味入在瓶内鹽泥固濟候乾火燒通赤取出研為細末胡黄連一分生蝸牛研三枚麝香研丹砂研雄黄研牛黄研各一分熊膽研訶梨勒皮細辛去苗葉各二分青黛半錢右為末和令勻燒粟米飯和丸如麻子大毎服三丸至五丸薄荷湯下不拘時服量兒大小加減麝香丸治小兒疳痢不止體瘦食少腹痛羸弱麝香細研硃砂細研蘆薈細研雄黄細研母丁香鶴蝨白礬灰蜜陀僧細研沒藥龍膽去蘆頭地龍㣲炒熊膽細研各一分蟾酥一錢艾葉半兩炒黄肉豆䓻半兩去殻黄連去鬚定粉㣲炒各半兩右為末入研了再研令勻以麫糊和丸如菉豆大毎服以粥飲下三丸日三服量兒大小加減蘆薈丸治小兒五疳八痢腹内積滯堅硬如石肚大筋青面黄羸瘦寒熱往來目澀口臭牙齦爛黒出血常服長肌退黄殺疳蟲進飯食消積滯青皮去穰陳皮去白荆三稜石三稜半兩史君子檳榔蓬术神麴炒麥蘖各一兩胡黄連一兩半熊膽半兩木香蘆薈南星各半兩蕪荑二錢半雷丸三錢炒右為細末麫糊丸如麻子大毎服三十丸米湯送下食前服熊膽丸治小兒疳痢氣痢腹大肌瘦常服熊膽研胡黄連夜明砂炒青黛研黄連去鬚各一錢肉豆䓻一枚去殻蘆薈一分研龍腦一錢研蟾頭一枚酥炙麝香三錢研史君子一分去殻丁香半分無食子一分右為末粟米飯為丸如菉豆大毎服七丸至十丸米飲下日三服青金丹治小兒驚風諸疳諸痢病疳瘠黄疸喘粗有氣者或下蟲數合無不即瘥肥壯無疾用之有益青黛研三分雄黄研胡黄連末各二分丹砂研膩粉熊膽温水化白附子為末蘆薈研各一兩麝香研半兩蟾酥水銀各皂子大鈆霜研龍腦研各一錢右同為末入乳鉢内再研令勻用獖猪膽一枚取汁熬過浸蒸少許為丸如黄米大暴亁一歳可服二丸量大小増減驚風諸癎先以一丸温水化鼻中令嚏戴目者當自下瘈瘲亦定更用薄荷湯下諸疳米粥飲下變蒸寒熱薄荷湯下諸瀉痢米飲下疳蚘咬心揀實煎湯下鼻下赤爛口齒疳蟲口瘡等乳汁研塗病疳眼雀目白羊子肝一枚竹刀批開内藥肝中以麻縷纒米泔煮令熟空腹服乳母常忌毒魚大蒜鷄猪肉治疳最佳肥兒丸治小兒五疳八痢隂陽氣不順虚痞腹脹嘔逆腹痛瀉痢消化乳癖積聚肥退面黄瘦殺蟲安胃進飲食此藥應有小兒疳病累服藥未效者不問虚實便與數服即安檳榔用麫裹煨熟去麫剉焙陳皮去白青皮去白胡黄連宣連去鬚㣲炒白蕪荑炒史君子煨去皮肉豆䓻如檳榔法煨人參去蘆夜明砂㣲炒赤芍藥龍膽草右等分為細末麫糊為丸如蘿蔔子毎服三五十丸同紫蘇木𤓰湯下瀉痢米飲下不計時候日二三服更量兒大小加減青黛散治小兒疳痢脊膂如鋸眼口鼻痒自咬指甲頭髮亁燋下部急痛青黛細研雄黄硃砂俱細研附子炮製去皮臍藜蘆去蘆頭胡黄連細辛麝香細研白礬灰黄礬莨菪子水淘去浮者水煮令芽曝乾炒令㣲焦已上各一分右都研令勻毎服以粥飲下半錢早晨晚後各一服量兒大小加減木香丸治小兒疳痢日夜不止體瘦乏力不能飲食木香蟬殻㣲炒去足肉豆䓻去殻黄丹㣲炒硃砂細研夜明沙㣲炒各一兩赤石脂細研半兩黄連半兩㣲炒去鬚田父一枚燒灰蝸牛二十枚炒㣲黄麝香一錢細研右羅為細末入研令勻湯浸蒸餅和丸如菉豆大毎服以温粥飲下五丸日三服量兒大小加減厚朴丸治小兒疳痢嘔逆厚朴去粗皮薑汁炙三分龍骨白石脂各半兩白茯苓去黒皮人參各三分陳橘皮去白焙一分當歸焙三分肉豆䓻一枚去殻烏梅肉炒乾木𤓰各半分右為細末煉蜜為丸如麻子大毎服五七丸煎薑棗湯下食前服史君子丸治小兒五疳瀉痢肌膚黄瘦多困好喫泥土五心常熱煩渇引飲夜多虚汗史君子去殻麫裹煨木香無食子各五枚赤芍藥蘆薈研各一分肉豆䓻去殻檳榔煨各一枚黄連去鬚麒麟竭研麝香研各一分右為細末粟米飯丸如麻子大毎服五丸至十丸米飲下不拘時服夏秋宜常服蘭香散治小兒一切疳痢蘭香人糞白狗糞蝦蟇白礬蜘蛛蚯蚓蝸牛子八味並燒灰蘆薈研右為散以葦管斜批吹少許入鼻中及齒上更以蜜和塗紙上貼之蘆薈丸治小兒疳痢四肢羸瘦腹脹鼻痒皮膚乾燥下痢不恒蘆薈雄黄各細研沒石子蛇蛻皮燒灰丁香熊膽蟬殻㣲燒去足蟾酥研已上各一分麝香黄連半兩㣲鬚去炒右為細末煉蜜丸如米大毎服以粥飲下三丸别研一丸吹鼻中量大小加減龍骨丸治小兒疳痢日夜無度肌體羸瘦龍骨半兩雄黄麝香硃砂各一錢俱細研橡實半兩蝸牛二十枚炒㣲黄牛黄細研白土青黛各一錢訶藜勒一分煨用皮右羅為細末入研令勻用麫糊和丸如菉豆大毎服以粥飲下五丸日三服量兒大小加減龍骨湯治小兒三歳已上疳痢口瘡身體手脚心熱龍骨一兩黄連去鬚黄蘗去粗皮炙地榆炙各三分白頭翁乾薑炮當歸焙醋石榴皮白术各半兩右麄搗篩一二歳毎服半錢水半盞薑三片同煎至三分去滓分温二服早晚食前各一服量兒大小加減口瘡取蘆薈赤地利末傅之下部生瘡取蚦蛇膽黄連麝香等分為末塗傅之一方有髙良薑沉香煎治小兒疳痢黄瘦焦枯壯熱脹滿沉香丁香酸石榴皮各二分木香肉豆䓻去殻訶藜勒炮去核無食子縮砂仁各三分史君子去皮半兩右為末煉蜜調成膏毎服一豆大米飲化下熊膽丸治小兒疳痢脾胃虚冷乳食不化臍腹疼痛熊膽一分附子一枚炮製去皮臍巴豆七枚去皮心研紙裹壓去油定粉一兩炒㣲黄黄丹二兩醋炒令紫色砒霜一錢細研亁薑一分煨裂硫黄一錢細研訶藜勒一分煨用皮右為末湯浸蒸餅和丸如黄米大毎服以冷水下二丸量兒大小加減切忌熱物定命丸治小兒疳痢青黛研三分烏蛇皮骨酒炙一分白附子一枚亁蠍炒七箇膩粉研一分獨角仙去足炙一枚棘剛子去殻七枚麝香研一分右為末用豶猪膽汁丸如黍米大毎服三丸早晨晚後各一服温水下金髓丸治小兒急疳痢不止或膿或血或青或黄髮結或穂或墮落鼻乾咬指好喫土炭金牙一分烏頭生去皮臍半兩肉豆䓻去殻一枚訶梨勒煨去核二枚石中黄如無禹餘糧代麝香研丹砂研各一分黄連搗末用鷄子一枚取清和末併餅炙乾一兩右搗研為末煉蜜丸如菉豆大毎服五丸空心米飲下日晩再服量大小加減胡黄連丸治小兒氣疳痢下痢腹脹胡黄連蝦蟆炙蝸牛研訶黎勒皮各半兩蛇蛻炙青黛研麝香各一分木香一兩右為末用米飲為丸如菉豆大毎服三五丸米飲下蟲出為度至聖丸治小兒疳痢腹脹肌瘦泄瀉不止史君子二十枚去殻肉豆䓻一枚去殻丁香陳麴炒雄黄研熊膽研各一分麝香研半錢訶藜勒皮一錢右為末白麫糊和丸如菉豆大毎服十丸米飲下乳食前服量兒大小加減香橘丸治小兒疳痢冷熱不調水穀不化史君子二兩訶子肉五錢神麴麥芽甘草炙厚朴各五錢薑汁炒陳皮三錢木香二錢半右為細末煉蜜丸米湯化下水蓼丹治血痢疳瘦蛇蛻皮燒灰鷄頭殻燒灰存性各一兩胡黄連硃砂水蓼各半兩已上搗羅為末次用蘆薈牛黄各一分粉霜一錢並各研極細右為細末軟飯和丸如黍米大毎服五粒至七粒麝香湯下量大小加減不拘時候神聖散治小兒疳痢腹大口亁四肢羸弱下痢不止亁蝦蟇一枚五月五日􅌈者去肚腸獨顆蒜一顆搗研川椒半兩去目已上二味入蝦蟇腹中用著大麥麫餅裹燒令燋黄色搗羅為末麝香一錢龍腦半錢蘆薈一分硃砂一錢雄黄二錢右與前藥同研為散毎服以粥飲調下半錢日三四服量兒大小加減服之百中湯治小兒疳痢樗皮炙黄連去鬚枳殻炒蕪荑各半兩生薑一分豉半兩葱白三莖右細剉以水五合浸經宿平旦煎取三合量兒大小空腹服之初服經日昏沉後漸漸甦未全效更作一劑熱渇與竹􅅹飲之阿膠丸治小兒一切痢久成疳阿膠炙燥白龍骨黄連去鬚白石脂鷄屎白炒一方用鷄屎礬胡粉炒赤茯苓去黒皮各一兩右為細末煉蜜丸如麻子大毎服米飲下三丸食前服更量兒大小加減丹砂丸治小兒五疳八痢丹砂青黛共研各一分丁香半分肉豆䓻去殻一枚無食子一枚麝香研一錢亁蝦蟇去頭足酥塗炙一枚右為末麫糊丸如黄米大毎服三丸空心米飲下胡黄連丸治小兒疳痢皮毛焦身體羸瘦喜食酸醎心腹脹發熱胡黄連一分芎藭蓬莪荗煨青橘皮去白焙各半兩亁薑炮一錢荆三稜三錢煨陳橘皮去白炒半兩右為末毎抄一錢入巴豆十粒去皮心膜入冷油内慢火煎墨色研細煮醋麵糊丸如黍米大一歳一丸薄荷湯下二肝丹地膽草漏蘆菖蒲一寸九節煮各一兩胡黄連地榆各半兩已上搗羅為末次用鷄肝猪肝一兩鹽炒少許同上諸藥和煮肝右為石臼中搗一二百下成膏丸黍米大毎服十粒麝香湯温下乳食前服量兒大小加減青黛散治小兒疳痢下部痒青黛蟾灰各一分赤石脂半兩訶藜勒皮一兩煨胡粉炒黄連去鬚炒麝香細研各一分右搗為散毎服以乳汁調下半錢日三四服量兒大小加減桃皮散治小兒疳痢赤白及一切痢并下部濕􅉶桃白皮炙半兩黄連去鬚胡粉炒赤茯苓去黒皮各一兩一方用白茯苓黄蘗去粗皮各半兩丁香七粒右為散毎服半錢米飲調下早晚前服量大小加減豆䓻丸治小兒疳痢及吐不吃乳食四肢瘦弱肉豆䓻去殻一枚木香半兩丹砂研人參訶藜勒煨去核麝香研各一分右為末用米飲丸如麻子大毎服三丸空心米飲下日再服更量大小加減龍齒散治小兒疳痢或口内生瘡龍齒半兩丁香一分黄連去鬚胡粉炒赤茯苓去黒皮各半兩枳殻去瓤麩炒一分右為散毎服半錢粥飲調下食前服量兒大小加減牛黄一錢亦得有鮮血加蕪荑一分肉豆䓻丸肉豆䓻去殻一枚訶藜勒炮去核三枚黄連去鬚一錢赤石脂研一錢木香一分蟾頭薑汁炙一枚右為末用蝸牛肉研為丸如黍米大焙亁毎服三丸至五丸粥飲下食前服六神丸治小兒疳痢羸瘦飲食減少及肚瀉并驟瀉丁香木香肉豆䓻去殻各半兩三味同麩裹慢火煨蘆薈研一兩史君子去殻訶藜勒各半兩右為末棗肉為丸如菉豆大毎服三丸至五丸米飲下空心服一方不用棗肉爛飯為丸蓋飯引入脾也驟瀉不已用金星丸等推去滯調理脾胃黄連木香丸治小兒疳痢無常色黄連去鬚木香各半兩麝香研一錢定粉一分狗肝一具切蝦蟇一枚切右為末將狗肝蝦蟇用酒三升煮爛至一升去滓煎成膏丸前末如菉豆大毎服三丸空心米飲下更量兒大小加減莨菪丸治小兒疳痢面黄體瘦盗汗壯熱心腹虚脹皮毛焦枯莨菪子醋浸一宿炒一兩木香胡黄連蘆薈研各一錢訶藜勒皮二枚肉豆䓻大者一枚右為末用粟米飯和丸如黄米大毎服五丸至十丸空心米飲下鼈甲散治小兒疳氣腹脹泄痢小便赤澀鼈甲醋炙去裙襴訶藜勒木香赤茯苓去皮蒼术米泔浸焙一兩牽牛子炒一兩半右為散食前温水半盞日再服