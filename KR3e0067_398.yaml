body:
  text: 普濟方卷三百九十八明周王朱橚撰嬰兒下痢門疳痢附論夫小兒疳痢者由乳哺不節生冷過度傷於脾胃冷熱相摶致臟腑不調久而不瘥即變諸疳若大腸虛弱水穀不化下痢無度是為疳痢其證靣色萎黃肌體羸瘦盜汗壯熱皮毛焦枯嗜好酸醎心腹虛脹痢下藴瘀日夜無度是也方熊膽散治一切疳痢熊膽研雄黃研青黛研丹砂研各半兩甘草炙一兩黃礬燒令枯細辛去苗葉莨菪子炒各半兩蘆薈研龍膽當歸焙白礬燒令汁盡蟬蛻炒蝦蟇炙焦各三分麝香研黃連去鬚黃蘗去皮各一兩右為散六十日至百日孩子每服一字一二歲半錢三四歲一錢並米飲調下早晚食前各一服大疳丸治小兒痢疳羸瘦黃礬枯緑礬各一兩膽礬二錢乾蝦蟇一枚去腸肚炙莨菪子葶􅐗炒各一分蝸牛四枚已上七味入在瓶內鹽泥固濟候乾火燒通赤取出研為細末胡黃連一分生蝸牛研三枚麝香研丹砂研雄黃研牛黃研各一分熊膽研訶梨勒皮細辛去苗葉各二分青黛半錢右為末和令勻燒粟米飯和丸如麻子大每服三丸至五丸薄荷湯下不拘時服量兒大小加減麝香丸治小兒疳痢不止體瘦食少腹痛羸弱麝香細研硃砂細研蘆薈細研雄黃細研母丁香鶴蝨白礬灰蜜陀僧細研沒藥龍膽去蘆頭地龍微炒熊膽細研各一分蟾酥一錢艾葉半兩炒黃肉豆䓻半兩去殼黃連去鬚定粉微炒各半兩右為末入研了再研令勻以麵糊和丸如菉豆大每服以粥飲下三丸日三服量兒大小加減蘆薈丸治小兒五疳八痢腹內積滯堅硬如石肚大筋青面黃羸瘦寒熱往來目澀口臭牙齦爛黑出血常服長肌退黃殺疳蟲進飯食消積滯青皮去穰陳皮去白荆三稜石三稜半兩史君子檳榔蓬术神麴炒麥蘖各一兩胡黃連一兩半熊膽半兩木香蘆薈南星各半兩蕪荑二錢半雷丸三錢炒右為細末麵糊丸如麻子大每服三十丸米湯送下食前服熊膽丸治小兒疳痢氣痢腹大肌瘦常服熊膽研胡黃連夜明砂炒青黛研黃連去鬚各一錢肉豆䓻一枚去殼蘆薈一分研龍腦一錢研蟾頭一枚酥炙麝香三錢研史君子一分去殼丁香半分無食子一分右為末粟米飯為丸如菉豆大每服七丸至十丸米飲下日三服青金丹治小兒驚風諸疳諸痢病疳瘠黃疸喘粗有氣者或下蟲數合無不即瘥肥壯無疾用之有益青黛研三分雄黃研胡黃連末各二分丹砂研膩粉熊膽溫水化白附子為末蘆薈研各一兩麝香研半兩蟾酥水銀各皂子大鉛霜研龍腦研各一錢右同為末入乳鉢內再研令勻用獖豬膽一枚取汁熬過浸蒸少許為丸如黃米大暴乾一歲可服二丸量大小增減驚風諸癎先以一丸溫水化鼻中令嚏戴目者當自下瘈瘲亦定更用薄荷湯下諸疳米粥飲下變蒸寒熱薄荷湯下諸瀉痢米飲下疳蛔咬心揀實煎湯下鼻下赤爛口齒疳蟲口瘡等乳汁研塗病疳眼雀目白羊子肝一枚竹刀批開內藥肝中以麻縷纒米泔煮令熟空腹服乳母常忌毒魚大蒜雞豬肉治疳最佳肥兒丸治小兒五疳八痢隂陽氣不順虛痞腹脹嘔逆腹痛瀉痢消化乳癖積聚肥退面黃瘦殺蟲安胃進飲食此藥應有小兒疳病纍服藥未效者不問虛實便與數服即安檳榔用麵裹煨熟去麵銼焙陳皮去白青皮去白胡黃連宣連去鬚微炒白蕪荑炒史君子煨去皮肉豆䓻如檳榔法煨人參去蘆夜明砂微炒赤芍藥龍膽草右等分為細末麵糊為丸如蘿蔔子每服三五十丸同紫蘇木瓜湯下瀉痢米飲下不計時候日二三服更量兒大小加減青黛散治小兒疳痢脊膂如鋸眼口鼻癢自咬指甲頭髮乾燋下部急痛青黛細研雄黃硃砂俱細研附子炮製去皮臍藜蘆去蘆頭胡黃連細辛麝香細研白礬灰黃礬莨菪子水淘去浮者水煮令芽曝乾炒令微焦已上各一分右都研令勻每服以粥飲下半錢早晨晚後各一服量兒大小加減木香丸治小兒疳痢日夜不止體瘦乏力不能飲食木香蟬殼微炒去足肉豆䓻去殼黃丹微炒硃砂細研夜明沙微炒各一兩赤石脂細研半兩黃連半兩微炒去鬚田父一枚燒灰蝸牛二十枚炒微黃麝香一錢細研右羅為細末入研令勻湯浸蒸餅和丸如菉豆大每服以溫粥飲下五丸日三服量兒大小加減厚朴丸治小兒疳痢嘔逆厚朴去粗皮薑汁炙三分龍骨白石脂各半兩白茯苓去黑皮人參各三分陳橘皮去白焙一分當歸焙三分肉豆䓻一枚去殼烏梅肉炒乾木瓜各半分右為細末煉蜜為丸如麻子大每服五七丸煎薑棗湯下食前服史君子丸治小兒五疳瀉痢肌膚黃瘦多困好喫泥土五心常熱煩渴引飲夜多虛汗史君子去殼麵裹煨木香無食子各五枚赤芍藥蘆薈研各一分肉豆䓻去殼檳榔煨各一枚黃連去鬚麒麟竭研麝香研各一分右為細末粟米飯丸如麻子大每服五丸至十丸米飲下不拘時服夏秋宜常服蘭香散治小兒一切疳痢蘭香人糞白狗糞蝦蟇白礬蜘蛛蚯蚓蝸牛子八味並燒灰蘆薈研右為散以葦管斜批吹少許入鼻中及齒上更以蜜和塗紙上貼之蘆薈丸治小兒疳痢四肢羸瘦腹脹鼻癢皮膚乾燥下痢不恆蘆薈雄黃各細研沒石子蛇蛻皮燒灰丁香熊膽蟬殼微燒去足蟾酥研已上各一分麝香黃連半兩微鬚去炒右為細末煉蜜丸如米大每服以粥飲下三丸别研一丸吹鼻中量大小加減龍骨丸治小兒疳痢日夜無度肌體羸瘦龍骨半兩雄黃麝香硃砂各一錢俱細研橡實半兩蝸牛二十枚炒微黃牛黃細研白土青黛各一錢訶藜勒一分煨用皮右羅為細末入研令勻用麵糊和丸如菉豆大每服以粥飲下五丸日三服量兒大小加減龍骨湯治小兒三歲已上疳痢口瘡身體手腳心熱龍骨一兩黃連去鬚黃蘗去粗皮炙地榆炙各三分白頭翁乾薑炮當歸焙醋石榴皮白术各半兩右粗搗篩一二歲每服半錢水半盞薑三片同煎至三分去滓分溫二服早晚食前各一服量兒大小加減口瘡取蘆薈赤地利末傅之下部生瘡取蚺蛇膽黃連麝香等分為末塗傅之一方有髙良薑沉香煎治小兒疳痢黃瘦焦枯壯熱脹滿沉香丁香酸石榴皮各二分木香肉豆䓻去殼訶藜勒炮去核無食子縮砂仁各三分史君子去皮半兩右為末煉蜜調成膏每服一豆大米飲化下熊膽丸治小兒疳痢脾胃虛冷乳食不化臍腹疼痛熊膽一分附子一枚炮製去皮臍巴豆七枚去皮心研紙裹壓去油定粉一兩炒微黃黃丹二兩醋炒令紫色砒霜一錢細研乾薑一分煨裂硫黃一錢細研訶藜勒一分煨用皮右為末湯浸蒸餅和丸如黃米大每服以冷水下二丸量兒大小加減切忌熱物定命丸治小兒疳痢青黛研三分烏蛇皮骨酒炙一分白附子一枚乾蠍炒七箇膩粉研一分獨角仙去足炙一枚棘剛子去殼七枚麝香研一分右為末用豶豬膽汁丸如黍米大每服三丸早晨晚後各一服溫水下金髓丸治小兒急疳痢不止或膿或血或青或黃髮結或穗或墮落鼻乾咬指好喫土炭金牙一分烏頭生去皮臍半兩肉豆䓻去殼一枚訶梨勒煨去核二枚石中黃如無禹餘糧代麝香研丹砂研各一分黃連搗末用雞子一枚取清和末併餅炙乾一兩右搗研為末煉蜜丸如菉豆大每服五丸空心米飲下日晚再服量大小加減胡黃連丸治小兒氣疳痢下痢腹脹胡黃連蝦蟆炙蝸牛研訶黎勒皮各半兩蛇蛻炙青黛研麝香各一分木香一兩右為末用米飲為丸如菉豆大每服三五丸米飲下蟲出為度至聖丸治小兒疳痢腹脹肌瘦泄瀉不止史君子二十枚去殼肉豆䓻一枚去殼丁香陳麴炒雄黃研熊膽研各一分麝香研半錢訶藜勒皮一錢右為末白麵糊和丸如菉豆大每服十丸米飲下乳食前服量兒大小加減香橘丸治小兒疳痢冷熱不調水穀不化史君子二兩訶子肉五錢神麴麥芽甘草炙厚朴各五錢薑汁炒陳皮三錢木香二錢半右為細末煉蜜丸米湯化下水蓼丹治血痢疳瘦蛇蛻皮燒灰雞頭殼燒灰存性各一兩胡黃連硃砂水蓼各半兩已上搗羅為末次用蘆薈牛黃各一分粉霜一錢並各研極細右為細末軟飯和丸如黍米大每服五粒至七粒麝香湯下量大小加減不拘時候神聖散治小兒疳痢腹大口乾四肢羸弱下痢不止乾蝦蟇一枚五月五日􅌈者去肚腸獨顆蒜一顆搗研川椒半兩去目已上二味入蝦蟇腹中用著大麥麵餅裹燒令燋黃色搗羅為末麝香一錢龍腦半錢蘆薈一分硃砂一錢雄黃二錢右與前藥同研為散每服以粥飲調下半錢日三四服量兒大小加減服之百中湯治小兒疳痢樗皮炙黃連去鬚枳殼炒蕪荑各半兩生薑一分豉半兩蔥白三莖右細銼以水五合浸經宿平旦煎取三合量兒大小空腹服之初服經日昏沉後漸漸蘇未全效更作一劑熱渴與竹􅅹飲之阿膠丸治小兒一切痢久成疳阿膠炙燥白龍骨黃連去鬚白石脂雞屎白炒一方用雞屎礬胡粉炒赤茯苓去黑皮各一兩右為細末煉蜜丸如麻子大每服米飲下三丸食前服更量兒大小加減丹砂丸治小兒五疳八痢丹砂青黛共研各一分丁香半分肉豆䓻去殼一枚無食子一枚麝香研一錢乾蝦蟇去頭足酥塗炙一枚右為末麵糊丸如黃米大每服三丸空心米飲下胡黃連丸治小兒疳痢皮毛焦身體羸瘦喜食酸醎心腹脹發熱胡黃連一分芎藭蓬莪荗煨青橘皮去白焙各半兩乾薑炮一錢荆三稜三錢煨陳橘皮去白炒半兩右為末每抄一錢入巴豆十粒去皮心膜入冷油內慢火煎墨色研細煮醋麵糊丸如黍米大一歲一丸薄荷湯下二肝丹地膽草漏蘆菖蒲一寸九節煮各一兩胡黃連地榆各半兩已上搗羅為末次用雞肝豬肝一兩鹽炒少許同上諸藥和煮肝右為石臼中搗一二百下成膏丸黍米大每服十粒麝香湯溫下乳食前服量兒大小加減青黛散治小兒疳痢下部癢青黛蟾灰各一分赤石脂半兩訶藜勒皮一兩煨胡粉炒黃連去鬚炒麝香細研各一分右搗為散每服以乳汁調下半錢日三四服量兒大小加減桃皮散治小兒疳痢赤白及一切痢并下部濕􅉶桃白皮炙半兩黃連去鬚胡粉炒赤茯苓去黑皮各一兩一方用白茯苓黃蘗去粗皮各半兩丁香七粒右為散每服半錢米飲調下早晚前服量大小加減豆䓻丸治小兒疳痢及吐不吃乳食四肢瘦弱肉豆䓻去殼一枚木香半兩丹砂研人參訶藜勒煨去核麝香研各一分右為末用米飲丸如麻子大每服三丸空心米飲下日再服更量大小加減龍齒散治小兒疳痢或口內生瘡龍齒半兩丁香一分黃連去鬚胡粉炒赤茯苓去黑皮各半兩枳殼去瓤麩炒一分右為散每服半錢粥飲調下食前服量兒大小加減牛黃一錢亦得有鮮血加蕪荑一分肉豆䓻丸肉豆䓻去殼一枚訶藜勒炮去核三枚黃連去鬚一錢赤石脂研一錢木香一分蟾頭薑汁炙一枚右為末用蝸牛肉研為丸如黍米大焙乾每服三丸至五丸粥飲下食前服六神丸治小兒疳痢羸瘦飲食減少及肚瀉并驟瀉丁香木香肉豆䓻去殼各半兩三味同麩裹慢火煨蘆薈研一兩史君子去殼訶藜勒各半兩右為末棗肉為丸如菉豆大每服三丸至五丸米飲下空心服一方不用棗肉爛飯為丸蓋飯引入脾也驟瀉不已用金星丸等推去滯調理脾胃黃連木香丸治小兒疳痢無常色黃連去鬚木香各半兩麝香研一錢定粉一分狗肝一具切蝦蟇一枚切右為末將狗肝蝦蟇用酒三升煮爛至一升去滓煎成膏丸前末如菉豆大每服三丸空心米飲下更量兒大小加減莨菪丸治小兒疳痢面黃體瘦盜汗壯熱心腹虛脹皮毛焦枯莨菪子醋浸一宿炒一兩木香胡黃連蘆薈研各一錢訶藜勒皮二枚肉豆䓻大者一枚右為末用粟米飯和丸如黃米大每服五丸至十丸空心米飲下鱉甲散治小兒疳氣腹脹泄痢小便赤澀鱉甲醋炙去裙襴訶藜勒木香赤茯苓去皮蒼术米泔浸焙一兩牽牛子炒一兩半右為散食前溫水半盞日再服