散治小兒下痢後津液減少臟腑虛躁煩渴引飲及治諸病煩渴飲無度不止烏梅肉微炒半兩白茯苓乾木瓜各一兩右為粗散三歲每服一錢水一小盞入生薑一片煎至五分去滓不計時候量大小加減一方無生薑治小兒渴痢方用搗冬瓜汁飲之脫肛附論夫肛門者大腸之候若小兒大腸虛冷久痢不已偃氣於下裏急後重或致用力則氣下墜故令肛門脫出是為下痢脫肛之病難經曰出者為虛入者為實楊氏曰惟實則溫溫則內氣充而有所蓄惟虛則寒寒中肥瘠內氣之虛實何如耳凡治脫肛先以溫湯洗軟漸漸納入及小兒啼呌弩氣久痢不止風邪襲虛亦有此證全嬰方云王伯廣教授子三嵗肛腸脫出經旬不入但連聲而哭自用千金方鱉頭灰散并數法不效召愚視之先以冷水淨洗用澀腸散擦於腸頭上以絹帛揉入之從此如舊又一兒四嵗亦脫肛出主人心急以手揉因指甲傷破流血腫痛狀若紅柿經三日不入召愚視之亦用水洗以澀腸散頓糝於上至三五日皺而癢脫落黑皮腸小自然而入方蛇床子散治小兒脫肛洗藥蛇床子藜蘆槐白皮苦參蕪荑仁白礬右為散每用半兩水三升煎取一升密室中洗肛門一日一度仍傅後方黃耆散治小兒脫肛洗後黃耆炒三分附子去皮臍生用桑黃蜜炙熟各一兩白礬燒灰半兩右為散以新綿扼藥傅之更以手按入腸頭蕪荑丹治小兒久痢頻併大腸虛冷肛門脫出白蕪荑一兩微炒鱉甲一兩塗酥炙去裙襴蝸牛皮一兩炙黃磁石一兩煆醋蘸七次細研水飛黃連半兩去鬚微炒蚺蛇膽半兩右為細末用軟飯和丸如黍米大每服十粒粥飲下量兒大小加減乳食前服蚺蛇膽丸治小兒痢後腸頭脫出蚺蛇膽湯浸軟一枚烏梅焙乾七枚蕪荑仁炒研黃連去鬚一兩右為細末以蚺蛇膽和搗如硬加煉蜜少許和丸如麻子大每服三丸至五丸米飲下日三服更量兒大小加減地榆散治小兒因患瀉痢後脫肛不得收地榆炒乾薑炮當歸焙縮砂仁各一分右為散每服半錢生薑蜜少許和熱酒調下日三服龜頭散療小兒久痢脫肛東壁土五分龜頭一枚炙焦五色龍骨五分卷柏四分右搗散以粉傅之按內之即瘥一方無壁土卷柏鱉頭丸治小兒積冷久下痢後餘脫肛不瘥腹中冷肛疼痛不得入死鱉頭二枚炙焦一方用鱉甲小蝟皮一枚炙令焦磁石四兩桂心三兩右為末煉蜜丸如大豆大三歲至五歲服五丸至十丸日三服兒大加之粥飲下妙應散治小兒久痢大腸虛冷肛門脫出莨菪子半兩淘去浮者炒令黑色天台烏藥半兩已上搗羅為末次入白麵一分龍腦半錢右都拌勻每服一字蜜湯調下乳食前服龍骨散治大腸虛弱肛門脫下龍骨訶子炒各一分沒石子大者一枚粟殼去穰醋炒一錢右為末白湯調服仍用蔥白湯薰洗令軟以手按上又用新磚一片燒紅以醋澆之氣上即用腳布疊數重壓定使磚氣上透不可過熱令病者以臀坐於布上如覺布溫逐漸減之以腸得溫熱為度一方有赤石脂用米飲調下治小兒脫肛莨菪子炒橡實五枚蔓陀羅一枚右為末乾糝在上以手按入續令嚏噴更不脫下黃連丸治小兒久痢腸頭挺出黃連一兩去鬚微炒蚺蛇膽半兩蕪荑一兩微炒右為末用軟飯和丸如菉豆大每服以粥飲下五丸日三四服量兒大小加減治小兒久痢後大腸頭脫出不進訶子炮赤石脂龍骨各等分右為末臘茶少許和藥糝腸頭上絹帛揉入甚妙又治痢米湯送下黃連丸治小兒脫肛黃連去鬚黃蘗去粗皮炙各半兩右為末煉蜜和丸如麻子大每服五丸至七丸早晚食前米飲下量兒大小加減鱉頭散治小兒脫肛鱉頭一枚燒灰存性莨菪子炒三分右為散先以新磚一片燒赤以醋半升潑之候冷熱得所即糝磚上坐之三兩次即瘥一方每空腹以粥飲調下半錢大小加減二金散治小兒久痢大腸虛冷肛門脫出龍骨一兩龜一枚活者塗酥炙黃右為細末每用一字至半錢乾貼肛門上按內之一方用龜頭瓜蔞丸治初病脫肛鼻梁青筋唇白齒根焦黃久病兩頰先赤唇焦多啼哭黃瓜蔞一枚白礬半兩右將白礬入瓜蔞內固濟火煆為末米糊丸每服三十丸米湯送下五倍子散治小兒脫肛五倍子地榆訶子各等分右為細末每服半錢米飲調下空心服量兒大小加減赤石脂散治小兒因痢後躽氣下推出肚門不入赤石脂伏龍肝各等分右為細末每服半錢傅腸頭上每日三上用附子散治小兒大腸虛冷肛門脫出多因下痢得之宜以藥傅附子生去皮龍骨各一兩右搗羅細散每用一錢傅在肛門上按令入頻用之以瘥為度又方黑狗脊荆芥各一兩右以水二升煎令沸先噓後洗立效治小兒脫肛久不瘥雀糞半兩乾薑一分炮右羅為散每服一錢白麵半匙同溲作餺飥煮熟入鹽醋少許每日早晨一服量兒大小加減服之治小兒下痢肛腸下脫久不瘥方用大蜘蛛濕紙裹燒焦存性入麝香少許同研細先用溫湯淋洗肚邉軟帛扼乾糝藥傅之立效一方治卒脫肛者無麝香更燒桑葉薰治痢頻脫肛黑色生殼方用巴豆殼燒灰芭焦自然汁煮入朴硝少許洗軟用真清油點三滴放三角白礬煆過研爛真龍骨少許同研糝肛頭用芭蕉葉托上勿令使出入令大兒抱定治大腸虛肛門出洗方用香附子荆芥皂角煎水洗又方以蔥湯洗令軟用芭蕉葉托上又方用五倍子朴硝大腹皮煎水洗以赤石脂末糝在芭蕉葉上托入貼方用萆麻子四十九粒研爛水調作餅子貼𩕄頭頂上收上即洗之水聖散子治脫肛不收用浮萍草不計多少杵為細末乾貼患處紫蕺膏治臟熱肛門脫出用紫背蕺一大握又以魚腥草擂爛如泥先朴硝水洗糝肛門用芭蕉葉托入却用藥於臀下貼坐自然致入抵聖散治小兒腹中虛痛肛門脫出用五倍子不計多少為末煉蜜調入如膏攤油紙上貼之托入一方入茶少許糝腸頭上絹帛揉入一方糝患處一物襯手揉入切忌喫發風毒物治男子婦人小兒脫肛用乾蝦蟇皮一片瓶中燒煙薰治小兒因痢肛門脫以鐵精粉一方磨刀水洗之亦效一方煮水洗之治小兒五歲以下脫肛以紫堇草汁半合子許調散和酒令服之亦宜忌食生冷陳倉米等又方一名收肛散治小兒脫肛用團魚頭不拘多少燒灰存性入麝香一錢為細末糝在肛上一方無麝香用鱉魚頭甲灰取粉撲之治腸頭作癢即是有蟲用生艾苦楝根煎湯薰洗敗毒散治風邪入大腸脫肛用敗毒散一貼加陳米煎服或噤口不食加石蓮肉煎桑葉方用黃皮桑􅀈取葉三升煎帶溫以布盛罨小兒肛門輕手按入次用門臼中細塵綿蘸撲之治脫肛法用蒲黃一兩豬脂二兩煉和成膏塗腸頭上即縮入又方治小兒痢脫肛用白龍骨末傅肛門腸頭上不過三上瘥治瀉痢後脫肛用陳槐花不拘多少為末陳米飲下治小因痢後軀氣下推出肛門不入方用細墨末每服以溫酒調下一字日三服又方用鱉頭一枚炙令焦為末以米飲調下半錢一方用馬蘭花半兩搗細散以漿水先洗拭乾糝藥末半錢於故綿紙上按入每日用之以瘥為度又方用生鐵二斤以水三碗煮取一碗候冷暖得所洗之立瘥治小兒大腸虛冷脫肛方用莨菪子一兩炒令黑色為末先以暖水淨洗乾拭塗藥半錢却內入腸不過三上不出便以藝薹子熟研為末一錢以醋調塗糊餅上炙乾加減與食之又方用女萎五兩燒薰下部三五上瘥釣腸丸治脫肛及諸痔下膿不止白礬緑礬訶子苦瓜蔞炒枳殼炒白附子製南星生雞冠花炒附子去皮半夏蝟皮破瓶內燒存性胡桃肉不油者燒存性右各等分為末麵糊丸如麻子大每服二十丸空心送下又方用水楊栁根煮水薰洗用馬恰葉托上木鱉子丸治小兒久痢腸滑脫肛沉香二錢枳殼半兩麩炒五靈脂半兩微炒木鱉子連殼稱半兩去殼用右件前三味為細末次入木鱉子同研細醋煮麵糊為丸如黍米大二歲每服三十丸醋調茶清送下乳食前服龍骨散小兒久痢脫肛宜服龍骨赤石脂訶子煨去核白术枳殼麩炒去穰已上各等分右件為細末每服一錢溫米飲調下乳食前服歸腸散治小兒腸虛脫肛橡斗子半兩蜜炙黃木賊半兩燒灰留性右件為細末每服一錢陳米飲調下乳食前服治小兒脫肛先用麻油湯熱薰患處候溫旋洗之即以五倍子細末多糝軟手揉入切忌食發風等毒物又勿令為外風所傷治小兒脫肛血痢以榼藤子燒灰服普濟方卷三百九十八
