body:
  text: 普濟方卷四十九明周王朱橚撰頭門眉髯髭總論夫足太陽血氣盛則眉美足少陽血氣盛則髯美足少隂血氣盛則髮美手陽明血氣盛則髭美夫經絡所至不同血氣各有所屬眉髯髮髭率本於經絡之血氣或黑或紺或黃白以知盛衰蓋氣在人猶水之津也髭髮猶津之有滲也津之膏澤而滲隨之則髭髮本血氣可知矣烏髭髮論髮本於足少隂髭本於手陽明二經血氣盛則恱澤血氣衰則枯稿容貌之間是以賁飾則還枯稿為悅澤法烏可廢方烏鬚髮方黃藥四兩苖香一兩川棟子兔絲子肉蓯蓉川牛膝白芍藥白茯苓杜仲石斛熟地黃威靈仙地骨皮枸杞子乾山藥生地黃五味子山茱茰麥門冬蓮花蘃生雞頭肉藿香當歸胡蘆巴川芎澤㵼白术人參巴戟黃耆羌活菖蒲獨活黃連廣木香沉香吳茱茰各半兩右為末醋糊為丸如梧桐子大每服五十丸空心溫酒送下沉香延齡散出德生堂治烏髭髮牢牙益精氣沉香另研木香檀香香附子白芷龍骨甘松川芎生地黃蓽撥升麻防風當歸何首烏藁本青鹽炒人參石膏白茯苓白蒺藜杜蒺藜海浮石藿香熟地黃細辛丁香荆芥穗菖蒲槐角子白殭蠶天麻桂心露蜂房炒黑各三錢半麝香半錢栁枝五寸右為末每日早晚先刷淨牙後蘸藥刷五七十遍多為上刷染髭髯何首烏母丁香白茯苓地骨皮白芷熟地黃川百藥箭甘草膽礬無以礬代之生地黃當歸升麻貫芎細辛訶子肉寒水石沒石子各五錢青鹽二錢半右遇庚辰日修合為末朝夕不問次數蘸之刷上下牙將津一半咽了一半掠於髭髯如無膽礬以礬代之花白百日可黑微白者四十日如漆此藥大壯斤骨補下元明目暖水臟黑髭鬢鉛梳子方出聖惠方鉛十兩鍚三兩二味同銷為汁去滓令淨沒石子二枚訶藜勒皮二枚婆羅勒四枚硫黃十分細研酸石榴皮磁一分緑礬針砂半兩醋炒熟地黃半兩燒令黑烏油麻一合炒焦茜草根一兩銼胡桃瓤半兩右為末先銷鉛為汁取諸藥一斗入鉛錫中以栁木箆攪令勻更傾入梳模子中就俟冷取出開齒修治如法將餘藥於鐺中以水煮梳子三日三夜若水耗即當以熱水添之日滿取出淨洗拭乾以故帛數重裹三五日以熱皮子襯手梳之一百下如烏色每梳洗用皂莢水洗淨候乾即梳之得法染鬚方出危氏方右用針砂不拘多少用水淘洗以淨為度用栁枝半寸長數根於銅銚內炒過却用好米醋浸一宿次日再炒以栁枝成炭為度於地上攤冷另放八件打和為末當歸甘松石膏滑石各一錢橡斗子一兩酸榴皮三錢母丁香白檀香各一錢另收各色為末生麝少許沒石子三個訶子四個去核百藥煎三錢白芨一錢右用針砂一匙白芨二匙八件末半匙餘者少許一處合和好米醋調成膏子塗於髭鬚之上荷葉緊包定勿寬慢次日早洗去即用此胡桃淨肉研爛成油撚放上則光軟五方中此方最勝牢牙黑髭鬢又名長春系包散金絲礬緑礬川芎膽礬一方用信細辛白茯苓訶子肉川百藥煎沒石子酸石榴皮五味子川椒縮砂仁各一兩五右為細末入麝香少許臨睡先洗牙了再以牙刷蘸刷牙後津再蘸藥抹鬢次日洗刷牙烏髭鬢法荆芥一兩羌活半兩膽礬半兩青鹽半錢訶子半錢沒石子半錢防風一兩百藥煎一兩川椒半錢香白芷一錢右為末每日刷牙浸髮鬢功效如神加石膏一兩青礬半錢染髮髭令黑方出聖惠方沒石子烏藥雞腸草蓮子草青胡桃皮酸石榴皮馬齒莧青鹽熟乾地黃東南栁枝皮銼已上各一兩獖豬鬃五兩剪如半豆長麝香一分細研右都搗用蜜水和為劑以舂大麥麵裹入瓷罐子內盛用鹽泥固濟候乾更泥三度為妙後用熟灰十斤燒罐子令黑焰盡冷之取出入麝香研如粉以生薑自然汁調如稀餳遇寅日染之良澤蘭膏治生髮黑不白細辛續斷皂莢石南草澤蘭厚朴烏頭白术莽草蜀椒二升杏仁半升去皮右切以酒漬一宿以錬成豬脂四斤銅器中向東炊竈中煎三上三下膏成絞去滓拔白者以辰日塗藥皆出黑髮十日效黑髭揩齒散蓮子草雞腸草熟乾地黃馬齒莧醋石榴皮海鹽青胡桃皮沒石子已上各一兩丁香半兩川升麻半兩末麝香一分細研右為末用舂大麥麵為餅子裹入瓶內密蓋口不令透氣燒通赤候冷搗細羅為散麝香丁香升麻同研令勻每日早晨及夜卧時常用揩齒一月後甚有神效立馬烏出御藥院方定粉瓦粉朴硝鉛白霜已上各三錢蜜陀僧龍骨各半錢輕粉三錢韶腦半兩花減六錢玉霜一兩三錢右為細末先用白土黃丹傅過髭髮後候乾將前項藥水調再上髮鬢上用紙裹後少時其髭便黑用新水洗過黑髭鬢立驗一烏方出聖惠方地黃花紫古子花龍葵花青胡桃瓤紫蜀葵花麥藍子小麥地中生者蓮子草酸石榴大者一枚已上並用綿襄隂乾母丁香訶梨勒皮香墨已上各一兩右為末錬蜜和為丸如彈子大每服一丸用酒一盞研調空心漸漸服令盡盞中酒乃咽之如吃得三盞酒服三丸五盞服五丸以醉為度便見效也忌蘿蔔及五辛掠髭鬢方出瑞竹堂白檀香一錢白香芷一錢三奈子三錢麵火燒熟為度滑石研零陵香二錢青黛研一錢百藥煎一錢另研白芨一錢甘松一錢去土右為細末用漿水一大盞藥末一錢磁器內盛如法蓋覆勿令灰塵墮落早晨用洗畢掠之十數日有驗用盡再添漿藥末黑髭髮一醉烏方出聖惠方訶梨勒十枚磨兩頭透生地黃汁一升沒石子一兩搗末緑礬半兩細研醋石榴三枚大者取汁碙砂一分細研右都入於瓷瓶內用二味汁浸蜜封口勿令透氣四十九日後取出其訶子狀黑梅子至夜臨卧時含一枚咽津到晚爛嚼以酒一中盞下之良久更喫酒一兩盞投之至醉其髭髮即三兩日自黑更三兩日再服之轉妙忌生蔥蘿蔔大蒜等一方有硫黃一錢無沒石子桂心丸治髭髮枯稿桂去粗皮旱蓮子草香白芷菊花旋復花巨勝子蓽澄茄牛膝酒浸切焙一兩右為末煉蜜和丸如梧桐子大每服三十丸鹽湯下不拘時丁香煮散出德生堂治烏髭髮掠頭鬢光黑母丁香一錢沒石子二個川百藥煎一錢半甘松一兩針砂醋炒一錢半白芨二錢半新釘子一個訶子皮二錢山奈子一錢右為細末水一大碗煎至七分用小瓶盛貯用鐵釘浸在藥水內油紙蓋護勿令塵土入內三日後臨卧用掠髮鬢每早以溫水洗去黑光長春丸出德生堂治烏髭髮地骨皮熟地黃各十兩訶子皮白芷桂心杏仁去皮尖各一兩川椒淨二兩旋復花一兩右各不犯銅鐡器止於木臼內搗細為末煉蜜丸如梧桐子大每服五十丸空心酒下忌蔥蒜黑髭揩齒方出聖惠方鯉魚一頭可盛得藥者去腸肚不洗生地黃八兩竹刀細切訶梨勒皮二兩茜草根一兩鹽一兩胡麻子三合沒石子一兩酸石榴皮一兩右都細銼內入魚腹中以濕紙三重裹上又以鹽泥紙密封裹用磚襯魚炭十斤燒令煙盡候冷取出細研每夜先以生薑一小塊子揩齒微覺熱使此藥揩之良愈不要與潄如白者三七日內從根下黑黃者七日內便黑忌蘿蔔蔥蒜等染鬚鬢藥母丁香七個沒石子五個百藥煎半兩訶子半兩扁柏半兩生鐡半兩香白芷半兩何首烏半兩右碾為粗皮末用漿水浸七日蘸水搽鬚鬢染髭髮令黑永不白方出聖惠方婆羅勒生鐡屎捶碎母丁香訶梨勒皮蓮子草草豆冦黃連去鬚蜜陀僧已上各一兩右為末用清漿水一升相和即內入瓷瓫中以蠟紙密封頭不令水入即於近宅渠中深泥下埋滿百日取出先以麵漿水洗髭髮令淨乾了然後用梳藥令離根半寸已來其藥即自入肉內勿以手把仍不得著肉即洗不落正塗藥時須口中含牛乳候口中黑即吐却更含白乳了後以故紙裹髭髮經一宿次用麵漿水洗澤然後出入一染已後永黑不白也隨意所食只忌大蒜若不含牛乳即令齒黑永無洗處烏頭藥儒門事親沒石子石榴皮乾荷葉另搗已上一兩五倍子訶子皮百藥煎金絲礬緑礬另研旋點諸藥右為細末炒熟麵五匙入好醋打麵糊和藥末再塗髭髮又用荷葉封裹後用皮帽裹之三五時間洗淨甚黑若便要黑光用豬膽漿水澤洗如鴉翎烏髭藥出百一選方蛤粉八兩海螵蛸韶粉黃丹各一兩膩粉半錢杏仁八個石灰礦二兩乳香一塊皂子大右各為末和勻將髭先用皂角湯洗過不可見油看白髭有多少加減使用河水調藥如稀糊黃昏時箆子塗在髭上將荷葉作片子蓋之以片帛包繫定至三更後用溫湯洗去更將少胡桃肉撚髭上烏髭借春散出御藥院針砂先炒令赤投醋中浸一宿再炒令乾大麥麵蕎麥麵三味各炒半匙右先以漿水洗髭髮令極淨用醋調上件三味煮糊熱塗在髭髮上用荷葉封裹上更帛裹須卧時用次日除去以溫漿水洗淨再待晚用次下藥塗沒石子百藥煎五倍子何首烏當歸各等分右為細末每用半匙投入大麥麩蕎麩各半匙頭醋調煮成糊臨卧塗髭髮上依前用荷葉封裹次日早晨用溫漿水洗淨可黑兩箇月天麻丸出王氏傳濟方潤顔色烏髭鬢天麻二兩木香元參地榆烏頭炮製去皮臍附子炮裂去皮臍各半兩血竭一錢右為末用白砂糖一盞河水一盞一處熬沸去沫熟蜜和藥丸如小豆大每服二十丸空心木香酒下烏金散訶子十箇藁本一錢川百藥煎一兩沒石子五箇母丁香十五箇新釘子三箇針砂一兩醋炒七次右除釘子外餘藥俱為細末水一大碗煎熬至大半碗磁器內盛之將前項釘子放於藥內更宿早晚掠髮百日如漆烏髭鬢方出傳信適用方烏賊魚膏韶粉黃丹蛤粉蜜陀僧五味等分細研輕粉少許石灰少許右藥和勻湯調稀稠得所箆子塗髭鬢上用荷葉包貼荷葉先於熱湯內泄過髭鬢亦須先淨洗方可塗藥治烏髭髮掠頭德生堂地黃花紫葵花黑牽牛花紫鼓子花桑椹酸石榴皮母丁香各等分右用瓶盛一處封口三日後用掠鬚髮治口齒百疾兼黑髭鬚揩齒方出聖惠方馬齒莧墻上生者隂乾了一斤及盛時採採時不得令雞犬孝子女人畜生見合藥時亦復避之生乾地黃一斤牛膝四兩去苖苣勝四兩鹽三兩皂莢五挺不蚛肥大者去皮子東引桃栁枝各一握川升麻四兩右各細銼訖以新平底鐵鐺中先下皂莢次下桃栁枝次下升麻次下牛膝次下馬齒莧次下巨勝鹽花地黃訖取一新瓦盆子蓋鐺以鹽泥固濟切須牢密即於盆底上鑽作三個竅子以出隂氣從寅時以文火燒以小瓦子於竅上蓋之候隂氣盡即速泥之直燒至戌時方可武火燒至亥時後停火放冷明旦開之其色如鴉羽其香馥人藥乃成矣便以新瓷瓶盛之密封要用旋取出細研用栁木枝點藥再三精意揩齒悉令用遍即閉口良久待藥力入牙齒內然後潄口但能每日旦暮揩之一月內髭鬢黑潤異常黑髭方出聖惠方蓮子草沒石子酸石榴皮馬齒莧胡桃皮生乾地黃青鹽已上各一兩右為散用大麥麩作餅納入罐口子中以炭火燒待罐子內黑煙絶即住火候冷取出細研為末每日早晨夜間兩度揩齒極妙烏髭鬢揩牙法出聖濟總録升麻一兩訶梨勒二枚去核為末白鹽花半分栗饙飯一合麻籸末四合取第一遍作者生乾地黃十二分肥者細切丹砂一兩研以水臨燒時調之右拌勻於淨砂瓶中盛密封頭遍泥隂乾入爐中畔以炭火周圍燒半時辰收之研為末每用揩牙法欲使藥時先用生薑一塊如杏仁大爛嚼須臾即吐却滓以左手揩三五遍就濕點藥末揩十數遍含津不得吐以兩手取津塗髭鬢待辛辣定細細咽此藥兼治腳氣腸風駐顔益氣若能勤行一生白髭鬢一百日即黑花者五十日黑用藥二十日便見效若能空心三遍用食後用之效尤速烏頭藥出御藥院訶子皮當歸各一兩一錢沒石子一兩一錢五倍子半兩百藥煎一兩三錢酸石榴皮一兩右末以大麥麩蕎麵各半兩針砂一兩六錢先用二麵醋調熬成糊入針砂調勻先用溫漿水皂角洗淨髮後上針砂麵糊藥擦過後用前件烏頭藥一兩如使不黑麵調藥遍擦髮上用荷葉包裹一宿用溫漿水淨洗為度每針砂八兩醋浸五宿炒乾碾為細末地黃丸出聖濟總録治烏髭髮方生地黃汁一升生薑汁五升苣勝子熟乾地黃焙旋覆花乾椹子各一兩右除二味汁外搗羅為末先將前二味汁用銀器煎熟看稀稠將藥末和丸如彈子大每服夜飲酒半酣後含化一丸駐顔變髭髮令黑方出聖惠方蓮子草半斤杏仁一斤湯浸去皮尖雙仁麩炒微黃熟乾地黃一斤右件各藥相和搗一萬杵色當如漆即丸如梧桐子大每日空心溫酒下三十丸晚再服之久服髭髮如漆忌生蔥蘿蔔大蒜等黑髭髮方出聖惠方天門冬一斤去心研熟乾地黃一斤右為末煉蜜和搗三五百杵丸如梧桐子大每食前以酒任下三十丸神效忌生蔥蘿蔔大蒜等又方出聖惠方生地黃二斤洗淨搗取汁茜根一斤右將茜根細銼以水五大盞微煎研絞取汁更將滓再研煎如前三度取汁入銀鍋內與地黃汁緩火煎熬如膏以磁器盛之每日空心服以溫酒調半匙服一月日髭髮如漆忌生蔥蘿蔔大蒜等黑髭髮方出十便良方又用黃丹三十兩入磁瓶中以泥固濟四靣厚一寸放乾以馬糞火養一百日出之細研為末以棗瓤和丸如芡實大每夜含一丸六十日黑矣又方出千金方用烏麻子三斤九蒸九曝為末以棗膏和丸如梧桐子大每日早晨以溫水下五十丸晚再服之久服佳黑髮方垂楊栁柏苓兒訶子皮青胡桃皮南烏枝各四兩胡桃油一大杓右為末用新汲水三大碗用表裏白磁瓶一個將藥連水裝封在內閉半月日臨卧早晨梳掠至三十日黑烏髭方白石脂二錢半輕粉五帖蜜陀僧二錢紅礬一錢半石灰三錢半右細研末用水調塗傅髭鬚隨即便變黑挽白令黑方出聖惠方蓮子草一升母丁香半兩鈇生一兩砒梨勒一兩東引槐枝灰一兩菴摩勒一兩右為散與蓮子草汁相和令勻每欲用時先點藥於髭髮根下然後塗藥避風於後白即變黑永不變也其藥於瓷瓶中盛埋在土中常令軟嫩稍似乾即難用如較乾入少蜜和用之亦得丁砂散出瑞竹堂掠髭髮大訶子一箇母丁香十五箇百藥煎一錢針砂少許醋炒七次高茶末一錢右為細末用水一大碗熬數沸不去滓收淨磁器內每夜臨卧溫漿洗淨髭髮用藥水掠之次早溫漿水洗淨百日其髭髮黑藥內更浸一新釘尤妙婦人亦可用訶子散出瑞竹堂烏髭髮訶子二個去核沒石子三兩百藥煎三兩金絲礬一兩半研針砂二兩用醋一碗磁器浸三日炒七次研右將蕎麵入針砂打糊先夜將針砂抹在頭上用荷葉包到天明用溫漿水洗淨次夜將藥末四味調入針砂糊內用生薑一大塊捶碎再加些少輕粉一處調勻抹在頭上用荷葉包到天明用溫漿水加點清油在內洗淨其髮黑且潔潔鬢葳仙油出海上方葳靈仙去莖側柏葉二枝豬牙皂角三莖黃蘗皮一片如手指大牽牛二十五粒右細銼以絹囊盛細瓫中入香油浸用除垢去膩潔鬢長髮烏髭方出聖濟總録晚蠶沙一升麻粹心七兩大栝蔞一枚去穰肥皂莢一挺青鹽三兩半右以磁罐子一箇盛藥鹽泥固濟頂上留一眼子出煙用炭十斤燒黑青煙絶後令取出入苦參末五兩同搗羅為末每洗潄及臨時用一錢揩牙烏髭鬢方風化石灰五錢花減五錢黃丹一錢定粉一錢蜜陀僧一錢右合勻水調煨熱塗之勿犯肉洗之立效散出德生堂治烏髭髮針砂五兩醋炒五次另研極細川百藥煎三兩沒石子七箇白芨一兩訶子肉二兩右為細末和勻再研極細如泥臨卧先用漿水洗淨後用荷葉熬水濾淨調藥看多少用塗髭髮上荷葉貼住絹帛拴漿水洗去為諸方冠後塗鬚根出白色再用煎藥常用胡桃油潤之尤妙五白玉粉散出德生堂大灰即石灰煆紅草節槐栁條碎切炒二兩五錢生蛤粉一兩九錢鉛粉九錢半土粉四錢七分輕粉二錢半右為細末如前法洗淨却用溫水或茶水調藥塗上如前方貼裹勿令通風次早用皂莢水洗轉白如漆換髭法出聖惠方黑獖豬鬃灰一兩一方獖豬糞灰一兩沒石子七枚酥炒黑焦酸石榴皮末四錢母丁香末三錢旱蓮子末四錢右都研令極細每用時藥末一匙生薑汁少許旋折栁枝子攪如稀膏别以新栁枝子點藥所貴者閇却孔子點後三日不出用皂莢水洗即生黑者烏髭揩牙藥反白為黑出百一選方萆麻子四十九粒生乾地黃一兩龍骨半兩細辛一分青鹽半兩右用大瓜蔞一個開一竅子去瓤以上件藥填瓜蔞內將元蓋蓋定紙封鹽泥固濟晒乾火煆青煙出為度取出存性研為細末早晚揩牙良久用溫酒咽下用之四十九日外見效治髭揩牙出聖惠方燕子一枚雄者泥鰌魚一枚槐蘂子一兩狼把草一兩酸石榴瓤三枚右搗作一團安於瓦罐子內以紙漬鹽泥固濟罐子候乾先以慢火微薰徹後用炭十斤燒令通赤候冷取出細研如常作齒藥用之若用經一月已來白者皆黑生長髮令黑有黃白者皆黑黃耆當歸獨活芎藭白芷芍藥莽草防風辛夷仁乾地黃藁本蛇銜各一兩薤白切半升烏麻油四升半馬鬐膏二升右切以微火煎三上三下白芷黃膏成去滓洗髮訖後塗之烏雲散出御藥院方訶子五箇去核百藥煎八錢川沒石子一錢輕粉少許右為細末與炒蕎麵同前藥末各依等分相和每使用水為糊稀稠得所依前塗上用荷葉封裹烏龍髓出百一選方漢防己緑礬各一兩當歸二兩桑椹子一百箇大紫黑者右以罐盛用麻油十二兩浸以紙數重緊扎定罐口於甑上蒸飯熟為度取出埋地下窨一百日用以染鬚大妙染髭方出百一選方沒石子母丁香杏仁胡桃瓤各等分右以針砂劄於燈熖上燒過存性同研為末如用時以漿水或薤水洗髭令淨拭乾撚藥在上每一次用黑兩月黑錫散出百一選方治烏髭鬢黑錫一斤鎔成汁入桑柴白灰十兩同炒令錫盡為度又入青鹽四兩再炒候冷為末瓷瓶封地埋五日取入下藥升麻細辛各一兩訶子四兩右炒黑色同煎後藥末一處拌勻揩牙藥用百日自然黑如要急用每日揩牙用好酒灌潄只一月見效絶妙烏髭方訶子三兩百藥煎二兩五倍子二兩沒石子二兩已上為末右用針砂八兩重米醋浸五日五夜取出炒略紅用米醋打蕎麥麵為糊先將髭髯以皂角水洗去油膩次將針砂與蕎麥麵同和為糊敷上用荷葉包裹過一夜明日取出却用前藥再用蕎麥麵為糊敷上即黑染髭黑方聖濟總録蕎麵針砂醋炒為末各二錢右先用醋和將洗髭後用藥塗畢外用荷葉裹之約於一更時却洗去再用後方無食子訶梨勒皮各二兩右為术每用二錢大麥麵醋和漿調塗髭外荷葉包晚洗去烏髭方旱蓮子沒石子荷葉活豬鬃右等分將鬃銚內炒後入餘藥並焦黑存性為灰以栁枝自然汁調拔白即蘸水入藥擦白者根穴妙一醉散德生堂方治烏髭髮枸杞子蓮子心槐角子生地黃各四兩右用好酒一斗浸春五夏三秋七冬十日飲一盞七日後飲盡一大醉見效換髭法聖惠方酸石榴皮三兩細銼白蜜三兩硫黃一兩細研緑礬一兩細研右相和入瓶子中從今年十二月埋之至來年十二月內取出用塗髭髮甚良烏髭鬢常用揩牙藥出百一選方青鹽一兩别研杏仁二兩去皮尖熟乾地黃洗淨旌德烏頭各一兩右為粗末將􅌝􅌣去蒂頂并瓤入藥在內以麻線扎定用蚯蚓糞固濟厚半寸以上隂乾或有小裂縫再糞泥合將熱炭一燒候煙出未盡一二分間用黃土覆之至冷取藥為末每日揩牙或臨睡更以津咽之尤妙黑髭方出聖惠方生乾地黃五兩皂莢三挺不蚛者炙黃焦酸石榴皮三兩硫黃一兩右為末內一瓷瓶中於炊飯下蒸一炊久用蜜和丸如酸棗大每夜後用生薑汁浸一丸揩齒二七日髭鬢皆黑倒流油烏髭三聖膏出御藥院方酸石榴皮子皆用新胡桃連青皮用新柿子青者連蒂用右各等分用鐡杵臼內搗爛如泥用一寸口新磁罐子黑錫三斤拍作小錢大葉子及生牛乳同拌前藥令勻罐口上用木拍子油絹密封上用粗麻線扎之日內晒令極乾於馬糞內埋之如用時先以溫漿洗淨以膽皮盛臨卧指蘸藥撚之忌生蔥生蘿蔔大蒜撚時須自下撚之其黑自下至髭根一方用生胡桃皮生石榴皮生柿子皮先將生石榴刮去內瓤子㨂丁香好者裝滿通稱分兩然後却將胡桃皮柿子皮與所裝石榴丁香勻分晒乾同為細末用生牛乳和勻盛於錫盒內或瓷器內密封之埋於馬糞內一十日取出將白綿一條撚緊點些膏子於綿中待藥力行至兩頭皆黑徹者是藥成也如不黑再於糞內埋數日取出如法染髭名三青膏烏雲散御藥院方針砂二兩醋一升蕎麵右前二味入鐵銚內同煎十數沸入蕎麵八錢為糊稀稠得所塗上髭髮用荷葉包或用手帕裹一時辰以來溫水洗淨次用烏雲散治烏頭出儒門事親酸石榴五倍子芝麻葉各等分右同杵碎用絹袋盛之於鐵器內水浸掠髮自黑烏鬚方針砂半兩炒紅醋蘸三五次蕎麵半兩川百藥煎一兩右用荷葉熬醋水調為膏子熱搽抹上用荷葉封裹又用手帕護之至天明溫水洗之黑烏鬚髮針砂百藥煎白芨各等分右砂淘淨銅鐵器中炒紅入另藥水調搽荷葉包之一醉散治黑髮槐子四錢旱蓮花四分生地黃半兩右為細末無灰酒一瓶將藥投酒內密封之浸二十日取酒飲一醉後覺來鬚髮盡黑恐人不信將白雞犬喂試之白毛羽皆變為黑雞犬也揩牙烏髭方聖濟總録皂莢懷州者十條生薑自然汁地黃自然汁右以二汁和勻旋刷皂莢於火上炙以汁盡為度碾細為末入青鹽拌勻逐日如齒藥用黑髭方出聖惠方麻姑八兩搗令碎鹽花二兩肥生地黃一斤右搗絞取地黃汁和前件藥於鐺中熬令乾以蓋子覆之取炭末如鹽泥泥之燒通赤候冷搗羅為末常用揩牙了令藥少時吐却便喫薑茶一碗欲得速見微效平明午後各一度揩之即先從眉黑一月內皆變黑矣染鬚髮方出千金方胡粉三兩石灰六兩絹篩熬令黃右為末以榆皮作湯和之如粉先以皂莢湯洗髮極淨不得令有膩氣即曝乾夜卧以藥塗髮上合勻訖取桑葉相綴著頭巾上遍以包髮一夜至旦取醋漿熱暖三遍淨洗髮又醋泔熱暖洗髮又取生胡麻苖搗取汁三升和水煮一二沸淨濾以濯髮訖又用油湯濯之百日黑如漆一用雞子白和藥塗一方用漿和溫夕卧塗訖用油衣包裹明日洗去便黑大佳塗髭鬢御藥院方瀝青白膠各一兩右為末一處用紙撚煙燻瓦盆取煤同胡桃瓤研成膏塗髭髮尤妙染髭髮令黑永不白出聖惠方生麻油二升乾瓦松一斤半右於油中煎瓦松焦即出細研為散却令入生麻油內浸之塗髭髮甚妙換髭髮出聖惠方碙砂一兩酸石榴一兩右將碙砂內在石榴中心却蓋封定盛於瓷瓶中埋於馬糞內三七日取出用洗之妙又方出聖惠方胡桃根皮一稱蓮子草十斤右碎銼入瓷甕內以水五斗浸一月去滓釡中熬至五升入藝薹油一斗以慢火同煎取五升收貯瓶內染頭時先用炭灰汁洗後用藥塗之訖即上用牛蒡葉包裹上便用油絹子裹如此五七日即黑常夜洗塗之為妙染鬚髮方出聖惠方用鹽湯洗沐後以生麻油和蒲葦灰傅之一作治白秃又方出千金方用生麻油漬烏梅常用傅頭良倒流油烏髭髮神方出百一選方大訶子十六個濕紙裹慢火煨熟取皮碾末用糯米粥飲調塗在尉斗內用麻油四兩燈心二十四條點無風處合尉斗在上四邊略通煙頻挑燈煤盡油為度候冷用刀刮下又燈上燒胡桃肉二十箇存六分性桃仁八十箇如胡桃燒更入百藥煎二錢同研針砂半兩醋一盞浸一宿盡醋入乾生薑四兩同研入諸藥末再研極細要滋潤如膏恐硬多入胡桃磁合內收如用洗髭淨乾搽上藥以手指撚勻皂紗軟帛拭之兩上如漆光色一月可再染之得法染鬢方出危氏方用針砂以井水淘淨濾乾醋浸炒黑為末入百藥煎少許先一日將蕎麥粉各半調和打為糊塗在鬢上以蓮葉包裹更以絹巾兜定次早用肥皂洗淨後再用訶子五錢好雄沒石子一箇醋炒為末百藥煎少許又以蕎麥粉醋調作稠糊依前封裹黑如漆一方加真膽礬或入生麝香烏髭鬢揩牙藥出百一選方用不蛀皂角切作小假長寸許鎔黑鉛令銷成水投皂角炒如炭不可太過恐成灰取出候冷研細入鹽少許逐日早晚兩次揩牙已白者三四摘則變黑者便不白胡桃膏出御藥院方用新小胡桃三枚和皮搗細用乳汁二盞於銀石器內文武火熬竹箆子攪成膏每用時淨洗髭髮以筆蘸點髭髮上烏髭藥方一名還春膏出百一選方右針砂五兩揀出粗大片不使只以細者水澄過去泥沙晒焙乾以醲酸米醋浸數日後入銚內炒令針砂通紅為度傾地上蓋以盞復出火氣磁罐密收遇要使時約髭多寡抄令一錢或二三錢碾細和蕎麥麵相等又以濃醋調令得所重湯打作稠糊第一夜臨卧先以皂角溫湯洗去髭上油膩次用竹箆二枚挑藥連根搽髭厚藥不損皮肉惟恐塗之不厚仍先以沸湯煮軟荷葉相視髭厚薄剪作片子壓在粗紙箔中滲乾才使藥塗遍了即以所剪荷葉覆之令周密又用帛包繫恐汚衣被亦要護荷葉不走作也次早起來以溫湯欵欵洗之白者已黃黃者黑矣使皂角澡頭未洗靣不妨但不可自使手染恐指黑亦須耐煩第二夜再上藥又四五日前以訶子不拘多少銚內使麻油煎以黑色為度取出用熟爐灰逐日換沁盡油臨時用皂角水洗淨焙乾為細末又以訶子去核亦不拘多少麥麩同炒急手攪動令訶子赤色為度取出去盡麩碾為細末兩味訶子各使淨砂罐子盛每使看髭多寡使一錢或半錢并百藥煎細末同煎二次重樣訶子各等分又使小麥麵如三味藥多少以淘白米第二次泔調重湯煮如先夜糊厚薄搽髭並依上法染三五次後却以兩夜藥併作一處同調打糊亦得每日用胡桃油潤之治烏髭不老用施化石灰礦四分真蚌粉二分鉛粉二分黃丹一分同為末臨卧以皂角湯洗髭令水調藥連根均傅取蒸軟荷葉包裹以帛傅外至早浣去頻研核桃松子油滋之神妙治頭不白換髭方出聖惠方用刮老生薑皮一大升於鐺中以文武火煎之不得令過沸其鐺惟得多油膩者尤佳更不須洗刷便以薑皮置中密固濟勿令通氣冷一精細人守之色未分便須煎之緩不得令火急如其人稍疲即換人看火一復時即成置於磁鉢中極細研之李云雖旦復時若火勻即至日西藥成也使時先以小物點取如麻子大先於白鬢下點藥後援之以手指撚之令入肉第四日黑者當自生神效治髮黑用羊屎方書多用近人取次內鮮魚腹中瓦缶固濟燒灰以塗髭髮令易生而黑甚效蒼术丸出未集驗烏髭鬢駐顔色壯筋骨明耳目除風氣潤肌膚久服令人輕健用蒼术不拘多少用米泔水浸三日逐日換水候滿日取出刮去黑皮切作片子曝乾用慢火炒令黃色細搗末每一斤末用蒸過茯苓半斤煉蜜為丸如梧桐子大空心卧時溫熟水下十五丸别用术末六兩甘草末一兩拌和勻作湯點之下尤妙忌桃李雀蛤兩三日又方出十便良方用收自己亂頭髮洗淨乾每一兩入椒五十粒泥固封入爐大火一煆如黑糟細研酒服一錢匕髭髮長黑一方燒灰用頭垢和丸服又方出本草用蓬藟笮取汁合成膏塗髮不白食其子令人好顔色又方出本草用覆盆子笮取汁合成膏塗髮不白食其子令人好顔色治髮藥用風化石灰一斤用細栁條一寸長四十九根用粗栁條三根將石灰栁條一同於砂鍋內慢火炒粗栁條不住攪炒細栁條如炭黑用夾紙鋪於地上將石灰攤上隔一宿去火氣用瓦粉半斤官粉四兩土粉四兩同為末用新水調塗鬚上以荷葉封裹次日洗去如漆一撚膏出危氏方烏髭鬚用酸石榴結成時就枝上將石榴開一小孔傾水銀於中却將元皮封之以麻皮纒定用牛糞泥封了候經霜摘下傾出以豬膽皮裹指醮撚白髮即黑一方用黃蠟封固放留一月取用以雞內金蘸藥染髭黑髭鬚方用蜒蚰四十九條入磁器內研京墨水食之次於馬糞內埋藏一月取出以白絲頭試染如即黑到尾再入馬糞內埋之待數日再取出試之性緩然後撚染髭鬚庶使不黑皮膚治頭不老澤臘澤飾髮出肘後方用青木香白芷零陵香甘松澤蘭各一分用綿裹酒漬再宿內油裏煎再宿加臘澤斟量硬軟即火急煎著少許胡粉胭脂訖又緩火煎令粘去滓作挺以飾髮神效治烏髭髮出得生堂用臘月宰下黑牛膽裝槐角子在內拴住不拘牛膽大小挂在屋內隂乾一月日每日早晨服五三箇溫水下染髭髮出聖惠方用八九月經霜桐葉兼子多收搗碎蒸之以生布絞取油先以泔洗頭淨後塗此油熟揩經一宿取蜀葵桿燒灰淋汁澤之一月十度用之永黑不變也又方出聖惠方用鏵鐵打作四十九片如碁子大燒令赤即將水淬之又更燒淬如此四十九遍即將鐡入竹瀝中浸三日後用梳撚髭髮便黑甚妙變髭髮駐顔揩齒散出聖惠方蓮子草端午日取破麻布多年者右銼碎內於瓷瓶中以鹽泥固濟大火燒半日候冷取出仍於鐡臼中搗為散每日常用揩之旋有黑者生黑髭髮方柏葉松葉各四兩丁香沒石子各二兩右為末錬蜜和搗三二百杵丸如梧桐子大每日空心以溫酒下三十丸夜卧時以豉湯下三十丸拔白令髭鬢生黑良日出千金方正月四日二月八日三月十二日四月十六日五月二十日六月二十四日七月二十八日八月十九日九月二十五日十月十日十一月十日十二月十日右以上日並陸機法須早晨拔之永不白一方以日正午時拔之當日忌飲酒食五辛一拔黑者更不變又方出聖惠方正月五日十三日二月八日十八日三月三日四月五日二十二日五月五日十五日六月十四日二十四日七月十八日二十八日八月九日十九日九月八日十八日十月十三日二十三日十一月十日十二月十六日右以上日月並於午時前拔此方甚妙依法用之自驗也凡拔白髮即先以水於石上磨丁香汁候投缺急手傅於毛孔中生黑髮矣神仙紫金膏出余居士選竒方生薑半斤和皮細銼皂角四兩不蛀者銼細細辛去葉土一兩香白芷一兩銼右件搗爛為膏用河水調和得所用鐡銚子將豬脂擦銚內方入藥以碗蓋定用濕紙條塞碗縫然後用紙筋泥固縫不令出氣慢火養一伏時以手按碗足上常以通手為度取研細入磁器收每用杖子挑藥少許於白髮處熱擦令染即摘去白髭用藥再擦內熱即止後生黑者不變白染髭髮方出余居士選竒方石灰新者黃丹􅀈腦等分用桑柴灰汁調傅候乾了即用溫水洗後用胡桃松子研細傅之即黑也詩曰祕傳海上神仙訣妙奪人間造化機白髮變成黑髮去晚年化作少年歸烏髭藥方出余居士選竒方針砂一兩用酸醋炒乾訶子一兩用麻油炒焦色為度去核瞿麥麵二兩右三味同為末如染髭時用醋調成膏於大陽中略頓稍熟為度臨睡時淨洗髭傅藥向髭鬢上厚上藥不妨用油單紙包定令勿透氣次日用米泔水煮溫洗髭則黑如漆矣洗了用核桃松子油潤之絶妙立聖散出余居士選竒方烏鬢髮乙卯年曽南仲云頃見零陵一人是鬢髮已白後三年再來其黑如漆叩之一道人教其用橡斗子實之以鹽燒存性細研早晚用曽用之十年今五十五鬢髮無白者而齒且牢五聖不老散一名五聖還童散出衛生家實方不蛀皂角五十挺刮去黑皮沒石子二對熟乾地黃焙洗蛇蛻二條火燒成灰胡桃肉二十斤白鹽十二兩川棟子碙砂青鹽地龍去土香白芷酸石榴皮川百藥煎黑牽牛細辛葳靈仙烏賊魚骨各三兩除皂角外並為粗末用粳醋四升同浸皂角藿香葉當歸仙靈脾各二兩一錢為末依次鋪蓋所浸皂角上安之右先以粗藥末入醋攪拌勻皂角了以後五味蓋之浸四五日每日翻皂角一二遍用重物壓盆恐醋浸藥不著日足不用他藥只將皂角用桑柴熟火炙令稍乾再於醋內浸再炙至醋盡焙乾碾羅為細末每藥一兩用麝香一錢和勻每早晚兩次以刷牙蘸上下齒每處擦五七十擦或手指蘸藥亦得遇有津液旋咽更不潄口如用藥約一月外若有髭鬢白者逄寅日摘去如再生出者有黑白漸次摘換盡出黑者此藥有神妙不可細述一曰明目二曰去頭風三曰補腎四曰牢牙五曰烏髭鬢換髮一方有蟬蛻變白散出衛生家寶方齒藥大能烏髭大將石榴一箇用鐵釘四十九箇劄勻三日取出釘入丁香數日取出用黃土固濟令乾用炭火二斤煆炭盡為度候取出細辛二兩生用豬牙皂角二兩刮去皮蘸鹽水炙寒水石三兩炭火煆右為細末更入腦麝香少許揩牙候藥行方潄口臨卧揩牙勿潄取口中涎擦白髮烏髭揩牙藥出衛生家寶方苦參半兩青黛一兩如螺色青者青鹽半兩右先以苦參為末次研青黛又研青鹽一處拌和勻早晚無時作牙藥揩牙徐俟少時潄之荆南劉天夫年七十餘知漢州陛辭日神宗怪其髭鬢黑對此方遂録進呈神妙烏髭方出衛生家寶方每用酸石榴一箇於上勻釘小鐵釘四十九箇遇夜安頓在露地或屋上至曉即收在屋下勿令見日色露三夜畢取去釘子每一釘竅內塞一丁香每取出一箇釘便塞丁香用紙裹石榴以好米醋和黃泥固濟石榴頓在風道略乾以炭火簇燒令通紅火多為度取出炭火移在一淨地上候冷取去泥淨取燒過者石榴碾為細末早晚擦牙須令擦得牙齒熱以得藥力行至千春永無白鬢更無蚛牙若靑春人用此藥一世更無白者如摘白鬚後以生薑汁擦即生黑者變白為黑方出衛生家寶方針砂醋煮訶子麵炒黑色去核用皮五倍子為末百藥煎為末各二錢蕎麵一錢無時則用麥麵亦可右用蕎麥麵同前四味醋煮為稀稠得所先淨洗髭鬢了揩拭令極乾然後用藥塗染却用荷葉包裹不黑再染一兩度自黑換白髮方出衛生家寶方吳白芷菊花旋覆花桂心白茯苓巨勝子各三分蓽澄茄牛膝各二分覆盆子蓮花鬚隂乾各一分右為末酒煮糊丸桐子大空心酒下三十丸午時更進二十丸服時須喫酒或飲引動藥力乃妙一月見效白者初碧漸變黑色此藥兼治一切風疾若欲試藥驗但將蒸餅裹藥飼犬一月即變黑矣忌蘿蔔羊肉生蔥正月初四日二月初六日三月十二日四月十六日五月二十一日六月二十四日七月二十一日八月十五日九月十六日十月十三日十一月初四日十二月初七日遇以上日並不宜服冀州李鑑郎中四十二嵗頭髮遍白忽於山中遇老人授此方依法服食至赴闕時六十九嵗更不生白髮兩鬢如漆遂進此方烏髭石燕散出衛生家寶方香附子半斤用生薑一斤取自然汁浸三宿候香附子透焙乾炒焦碾生乾地黃二兩焙乾石燕子一對醋淬碎碾青鹽二兩半明淨者石榴皮三兩炒乾細辛二兩焙乾皂角七條不蛀者燒存性麝香少許另研右為細末入麝香火勻臨睡揩齒不可語話次早以溫湯潄之不過一月如漆矣烏金散出楊氏家藏方牢牙烏髭將石榴皮生乾地黃槐白皮青鹽何首烏豬牙皂角各一兩升麻末半兩細辛末半兩麝香四錢别研右件先以醋石榴皮等六件銼碎用瓷瓶一箇入藥在內鹽泥固濟留一竅子出煙火煆令赤候煙盡為度研細次入升麻細辛麝香研和令勻每日早晚常用揩牙盥潄再黑膏出楊氏家藏方烏髭胡桃一枚捶碎殼取全肉於新瓦中心安頓四邊著慢火逼漸漸蔟火令近時撥轉胡桃令裏外焦黑放地上令冷定粉一分右件一處研如膏用小瓷合收之每用少許先塗在白髮根上方用鑷子摘髭急用手擦藥入白髭竅內後次即出黃髭若三四次用終身不白每摘一髭如此用一遍黑鉛散出楊氏家藏方烏髭鬢明目牢齒牙用黑鉛半斤大鍋內鎔成汁旋入桑條灰栁木攪令成沙冷以熟絹羅為末每日早晨如常擦齒牙後用溫水潄在盆子內取用其水洗眼治諸般眼疾髭黃白者用之皆變黑色也染髮鬚白令黑方出肘後方酸漿煮豆染之黑如漆色烏髮鬚出本草方以胡桃瓤和胡粉為泥拔去白鬚髮以內孔中其毛皆黑染髮仙方出本草方以胡桃青皮壓油和旃檀香塗髮色如漆染鬚髮方出本草方以鉛丹煎膏染之烏髭髮出本草方用蘩蔞為虀食之染髭髮令永黑出本草方以鐵爇及熱末凝塗之變毛髮出本草方以石榴花并葉乾之為末和鐡丹服之一年變毛髮色黑如漆鐵丹乃飛鐡為丹也烏髮髭出本草方以訶梨勒燒灰乾傅立效能染髭髮變黑染髭髮出本草方以活東與青胡桃上皮和為泥染之不變活東科斗蟲也婦人塗髮令黑方出本草方以芭蕉汁塗之黑髮方出本草方用藝薹子壓取油傅頭令頭髮長黑染髮出本草方用金櫻花和鐡粉研拔白髮傅之再出黑者亦可染鬚染鬚至黑出本草方以針砂研和沒石子染鬚至黑染髮方出本草方用大麥針砂沒石子等末染之令髮黑烏髭鬢七效方出本草方以小雌雞一對别處各養喂不得令食蟲并雜物只與烏麻油一拌并與水喫使雞長大放卵時専覷取出先放者卵收取及别處更放卵絶却收先放者細研好硃砂一兩了擊破卵巔些些作竅入砂放卵內安置用紙粘損處數重候乾用後放者卵一齊令雞抱候雞子出為度其藥在卵內自然結實打破取出爛研如粉用蒸餅丸如菉豆大不計時候酒下五七丸不惟變白亦愈疾矣長生不飢黑毛方出本草方取早藕食之令人體潤毛髮不白久服成仙出本草方以玉井水服之黑鬚髮雜修養書云正月一日取五香煮以浴令人至老鬚髮黑徐錯云道家謂青木香為五香一云修道家多以此浴當是其義也普濟方卷四十九
