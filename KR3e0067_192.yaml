牽牛末三錢相滚作一服滳熟水丸如桐子大非時蔥湯下為一服治水心受水氣喫藥取轉了宜喫此逺志散以補之將此藥對硫黃丸服人參逺志去心藿香肉豆䓻川芎各一分右細杵羅為末每服二錢水一盞煎三沸空心去渣滓任意服治脾受水氣傳之與腎蓋五行受病變化多端不獨傳其所勝此腎之所以受水也然五行受病又不獨傳其所勝天下萬物之理亦有同氣相求各從其類者故脾土之虛不能制水或流歸於腎注於腎者脾之酸水也腎既受之不能無病此世人患水病先從脾以傳之於腎此其土邪入於水治之不可后時牽牛四兩醋熬二兩焙乾二兩生使續斷乾薑吳茱茰豆䓻川芎檳榔各一分椒目二銖半夏二銖右件藥味先牽牛一味為細末所餘衆藥另作一處杵羅為末每服牽牛末三錢半衆藥末二錢相滚作一服食後以蔥湯調下取水未盡停待兩三日更取一度若踈轉不利不快第三服加衆藥末作二錢半牽牛末作四錢滚為一服以快為度取水盡喫後方藥以補之面不腫腹不脹是為取水盡也此方治脾腎受水氣水氣轉盡了後服此藥以補之山茱茰吳茱茰白术巴戟去心川羌活黃橘皮草豆䓻去皮肉豆䓻乾薑木通草牽牛醋煮焙乾使檳榔各一分川芎半兩半夏二銖椒目一銖右細杵羅為末每服二錢水一盞煎取九分空心去滓喫又煉蜜丸梧桐子大早朝空心米湯下四十丸若作散子不用椒目茯苓琥珀丸治水氣乘肺遍身浮腫中焦痞隔氣不升降咳嗽喘促小便不利赤茯苓去木漢防己二味各一兩半陳橘皮去白一兩三錢苦葶藶揀令淨稱三兩半紙煨紫蘇揀淨一兩真琥珀别研一兩郁李仁揀淨稱一兩半湯浸去皮杏仁湯浸去皮尖及雙仁者麩炒一兩一分右件將前三味為細末後五味各研為膏同前藥拌勻煉蜜為丸如梧桐子大每服三十丸煎人參湯送下不拘時候海蛤湯治水氣肢體腫滿元氣不足發動遍身壯熱小便不通海蛤澤㵼木豬苓去皮木通去皮滑石淨桑白皮葵采子七味各一兩右件為細末每服二錢水一盞入燈心十根通草二寸煎至七分溫服食前治水氣王尚之提刑傳云武義縣方已治數人甚妙黃顙魚一個菉豆一合許大戟澤㵼黑牽牛生木通檳榔桑根白皮大黃濕紙裏煨熟用乾漆炒甘遂麩炒令黃榆根白皮右件各等分為細末每藥末二兩煉蜜為丸分作四圓每服一丸臨用冷荆芥茶清嚼下忌鹽百日并甘草三日郁李仁丸出永類鈴方治水氣乘肺動痰作喘身體微腫葶藶隔紙炒杏仁去皮尖防己郁李仁炒去皮尖真蘇子陳皮赤茯苓各半兩右為末煉蜜丸桐子大每服四十丸食後紫蘇湯下方出如意方如積久水攻頭面目氣急腰已上俱浮腫宜用麻黃一兩甘草一兩㕮咀水煎空心用服汗出即愈治水氣虛腫風瘙肌膚惡癢出本草用陸英取湯入少酒浴之妙陸英乃朔藋也治水氣血氣心疼出本草以青魚魫用醋摩服之治水氣腳氣方最急用其法出本草以赤小豆五合葫一頭生薑一分並碎破商陸根一條切同水煮豆爛湯成適寒溫去葫等細嚼豆空腹食之旋汁令盡腫立消便止下水氣濕疸利小便以鴨跖草和赤小豆煮服治水氣出本草以葶藶二兩以物盛甑上蒸令熟即搗萬杵若丸得如梧桐子大不須蜜和一服五丸漸加至七丸以得微利即住不可多物令人不堪矣食若氣發又服之得利氣下定即停此方治水氣無比蕭駙馬患惟服此得瘥下水氣用赤小豆花煮一頓服之治熟氣水氣以牛肝和腹內百葉作生薑醋食之去水以木苗作飲服甚香美下氣以烏臼子炒作湯服治水氣利小便除浮腫用鯉魚一頭重一斤治如食法修事食之桑煎療水氣肺氣癰腫風氣以桑條二兩用大稱大兩一物細切如豆以水一大升煎取二大合如欲得多造準此增加先熬令然煎每服肚空時喫或茶湯或美粥每服半大升亦無禁忌也下水以紫藤作煎如糖服之療水及斷利以櫸樹皮煮汁服之治水氣浮腫右以白菖六兩取汁半合和酒半升看大小相度與服當利下水瘥十珍散治水氣芫花醋浸焙赤茯苓桑白皮炒澤㵼葶藶炒黑牽牛炒各三錢川椒并目二錢甘遂雄黃大戟各一錢右為末頭夜不曉食五更溫酒下三錢匕小利愈須審度其腫先從足起倍葶藶先隂腫倍澤㵼先服腫倍牽牛先腹腫倍川椒先口腫倍大戟先手腫倍桑皮先脅腫倍甘遂先頭腫倍芫花先腰腫倍茯苓先腎腫倍雄黃並照元兩加至如在先小便不通者先服通小便方通病不退用此更須審度病體強弱久近冷熱不可輕投十珍散治水氣消腫神妙第一巴豆玄參乾漆青皮右每服一錢菉豆湯下氣腫用白斂赤小豆茜草為末雞子白調塗主氣水惡瘡腫用水紅花草煎湯浸之佳治水氣用蘿勒生食之蘿勒北人呼為爛者香又俗呼為西王母菜又方用烏臼木方停一寸劈破以水一盞半煎取汁小半盞服之立效不用多喫其功神聖又方用蓽麻子去皮研令熟水解得三合清旦一頓服之盡日中當有青黃水下水飲附論夫水之與飲同出而異名也人惟脾土有虧故平日所飲水漿不能傳化或停於心下或聚於脅間或注於經絡或溢於膀胱往往因此而致病矣孰為氣血痰涎能生諸疾而水飲之不能為恙乎惟水與飲漉漉有聲為喘為咳為嘔為泄為痞隔為脹滿為眩運為怔忪為寒熱為堅痛為浮腫為多唾為短氣為體重氣為飲隔痞滿腹鳴骨痛冷痛冷痺水氣滯於經絡血脈不行四肢洪腫則曰血分凡此等類皆水之所由作也據病驗證可不究其所受之原乎然則療治之將何先曰能以表裏虛實訂之斯得矣表有水者其身熱嗽喘怔忪嘔微利青龍湯汗之而愈裏有水者其身涼嘔嗽痞滿引脅痛硬十棗湯下之而安虛者脈虛心腹滿而濡當以安腎丸為主加青皮香丸方見水腫少許以行之實者脈實心腫滿而硬當以青木香丸為主用五皮散加枳殼以道之方見浮腫尋常水氣心下怔忪大半夏茯苓小半夏茯苓湯散輩通用可也然而瘧家多積黃水或於心下停潴或於脅間結癖為辨為能生寒熱所以瘧劑多用常山蓋水在上焦則吐之水不在於上焦則常山亦能破其癖而下其水也其水腫證候亦此種類也桂苓湯出直指方治血分前證辣桂赤茯苓當歸川芎赤芍藥檳榔蓬莪术京三稜蒼术桑白皮炒大腹皮瞿麥穗青皮陳皮甘草炒各半兩葶藶炒香大黃濕紙褁煨炒各一分右銼散每服三錢薑五片煎服調榮飲出直指方治瘀血留沸血化為水四肢浮腫皮腫肉腫名曰血水分華隂細辛莪术辣桂赤芍藥延胡索當歸川芎白芷檳榔大腹皮桑白皮瞿麥穗赤茯苓陳皮葶藶炒香大黃煨各一錢甘草炙一分半右銼散每服三錢薑四片食前服續斷飲出直指方治血分如前延胡索當歸川芎牛膝川續斷辣桂赤芍藥白芷五靈脂炒羌活各一分赤茯苓牽牛炒取末半夏製甘草炙各一分半右銼散服三錢薑四片食前煎服加味枳术湯出直指方治氣為痰飲所阻隔心下堅脹名曰氣分歌云氣分中滿并胞脾三者雖殊皆此類胞脾氣實中滿虛氣分痰飲兹為異關尺微遲寸遲澀兩處推求病端的隂氣不通則骨寒陽氣不通身冷據隂氣前通痺不仁陽氣前通惡寒濕隂陽相得氣乃行氣轉即散分虛實實則失氣虛遺尿腹滿脅鳴何以療心下堅大似旋盤桂附术湯為最妙枳殼製白术紫蘇莖葉辣桂陳皮去白檳榔北梗木香五靈脂炒各一分半夏製茯苓甘草右銼每服三錢生薑四片煎服芎夏湯出直指方逐水利飲通用川芎半夏製茯苓各一兩青皮陳皮去白枳殼各半兩製白术甘草各一分炒右銼散每服三錢薑五厚片煎服川芎半夏能逐水也喘加去節麻黃嗽加炒桑白皮嘔加生薑半夏泄加蒼术白术痞隔加枳殼桔梗腹脹滿加縮砂白豆蔲眩運加半夏南星怔忪加白茯苓寒熱疼痛下其癖浮腫體重滲其濕餘以類推桂术湯出直指方治氣分前證辣桂三兩白术麻黃去根細辛去苗土甘草炒各二兩枳殼製乾薑炮各一兩半右銼散每服三錢煎服平肺湯出直指方肺與腎皆以至隂積水喘嘈嗽咳蓋水乘之方見諸喘門嗽類小青龍湯出直指方治表不解有水氣發熱乾嘔怔忪咳嗽喘微利方見咳嗽門不得卧類十棗湯出直指方治表不解裏有水身涼汗出乾嘔短氣微嗽微利心下痞滿引脅硬痛方見痰飲門支飲類枳术丸出寶命集方治胸膈痞悶有飲枳殼白术右末糊丸梧子大每日服三十丸至五十丸溫湯下治冷熱久澼實痞不能飲食心下虛滿如水狀方出千金方前胡生薑茯苓半夏各四兩甘草枳實白术各四兩桂心二兩右㕮咀以水八升煮取三升分三服諸腫附論夫腎者主水脾則主土土惟尅水脾與胃俱相為表裏胃為水穀之海今胃虛不能傳化水氣使水氣滲液經絡浸漬腑臟脾得水濕之氣加之則病脾病則不能制水故水氣獨歸於腎三焦不㵼經絡閉塞故水氣溢於皮胃而令腫也其狀目裏上微腫如卧起之狀頸脈動時咳股間冷以手按腫如隨手而起如物裹水之狀口苦舌乾不能伏偃偃則咳清水不能卧卧則驚驚則咳甚小便黃澀是也消水腫歸氣飲子治面虛腫浮四肢腫大甚者入腹脅致胸滿氣喘微嗽餐食睡卧不能只消六服盡退腫蘇葉連嫩枝一兩二錢大腹皮三錢川木通四錢薑皮茯苓皮陳皮桑皮桔梗地骨皮茯苓五加皮麥門冬甘草五味子草果各二錢分為六服右每服七八錢用水二鍾薑三片煎至八分食前臨卧日進連滓四服服腫消藥盡六服全安大忌生冷油膩酒醋醎雞鴨子麵食硬飯蔬菜等物只喫白粥十日半月二十日宜若不忌口其疾後作甚之防風散出直指方治風腫皮粗麻木不仁或時疼痛麻黃去節牽牛炒甘草炙各一分半杏仁去皮尖防風半夏製芍藥辣桂白芷防己當歸川芎羌活獨活檳榔各一分右銼每二錢薑四片蘇三葉煎服分氣補湯出醫方集成治心鬱氣結發為體浮腫上氣喘急大腹皮炒香附子炒去毛白茯苓桔梗各一兩木通甘草炙川芎前胡青皮炒枳殼去白穰炒白术各三分細辛去苖木香各半兩右㕮咀每服四錢水一盞薑三片棗一枚同煎食前服茯苓散一名檳榔散出醫方集成治諸般氣腫等疾芫花醋拌炒澤㵼郁李仁甜葶藶漢防己各二錢半陳皮去白半兩瞿麥半兩白檳榔半兩藁本二錢半滑石三分大戟炒三分白茯苓半兩右為末每服一錢取桑白皮煎湯濃空心調下取下碧緑水如爛羊脂即差如未盡隔日又服腫消如故不用服忌鹽百日效一方無白茯苓紅豆散出危氏方緊皮丁香木香各三錢縮砂紅豆白薑桂皮陳皮青皮桔梗胡椒各五錢右末每服二錢秋石湯調下赤小豆湯出醫方集成治血氣俱熱遂生瘡疥變為腫滿或煩渴小便不利赤小豆當歸去蘆炒商陸澤㵼桑白皮炙連翹仁赤芍藥漢防己木豬苓去皮澤漆各半兩右㕮咀每服四錢水一盞薑三片煎八分溫服熱甚加犀角加味腎氣膏出醫方集成治腎虛腰腫小便不利附子炮二兩白茯苓去皮澤㵼山茱茰取肉淨山藥炒車前子酒煮牡丹皮各一兩去木官桂不見火川牛膝去蘆酒浸熟地黃各半兩右為末煉蜜為丸梧桐子大每服七十丸空心米飲下食前氣寶丸治腰脅俱病如抱一甕肌膚堅硬按之如鼓兩腳腫滿曲膝仰卧不能屈伸自頭至頸中瘠瘦露骨一切氣積食積并腳氣走注大便祕結寒熱往來如傷寒並服之黑牽牛大黃一兩半檳榔青皮去白穰各一兩炒南木香羌活川芎陳皮炒茴香炒當歸各半兩右為末用皂角膏丸梧桐子大每服五七十丸生薑燈心煎湯下雄黃神金散出宣明論雄黃澤㵼椒目減半大戟巴戟茯苓去黑皮甘遂芫花醋五升浸一百炒葶藶一兩糯米和炒半熟去米不用桑白皮各一兩右為末發時加減一分空心用甘遂花水調下每服一錢加至五錢以利為度忌鹽醋生冷毒物油膩血物從腳腫根在心加葶藶從肚腫根在腹加椒目從隂腫根在胸加澤㵼從面腫根在肺加桑白皮從心腫根在肋加雄黃從肢腫根在脾加甘遂從口腫根在小腸加巴戟從腰腫根在腎加大戟從四肢腫根在胃加茯苓從膝腫根在肝加芫花木香丸治退脹消腫木香三錢檳榔二錢半枳實一兩枳殼半兩蘿蔔子一兩黑牽牛一兩白豆蔲一兩檀香半兩甘草一兩右為末醋糊為丸如黍米每服四十丸用淡薑湯下蔥白膏蔥青白切半升菘菜子半升葶藶半升炒蒴藋切半升莾草一兩切青木香二錢丹參切半升生蛇銜半升蒺梨子一升炒右以豬肪五升煎之三沸令水氣竭去滓傅痛處大丸出三因方治通身腫滿及痰氣食積傷寒感風脾氣潢泄羌活白术各半兩陳皮木通去皮黃耆去蘆桑白皮各三分木香一分黑牽牛五兩炒五兩生右為末蜜丸如彈子大每治風痰散腹脅壅滯清頭目濃煎生薑湯下飲食傷下赤白痢煎棗湯下小便不利燈心湯下傷寒蔥茶下如未快用稀粥投之用熱茶亦可須七日後方可服已得㵼急欲止之投白粥即自止婦人産前並服之既服此藥須住他藥三日及不得喫生冷葷腥及滋味等物一日只軟飯淡粥可也次日早進千金散千金散藿香甘草炙神麯炒乾薑炮茯苓各一兩人參桂心各半兩陳皮厚朴製各二兩右為末每服二錢水一盞薑三片煎至七分鹽一捻通口服神祕湯出微生寶録治喘嗽吐痰腫滿脾肺虛損陳皮生薑紫蘇茯苓人參木香桑白皮各等分右㕮咀水三升煎至一升去滓大溫分作三度服鱉甲湯出聖濟總録治水氣面目浮腫因虛勞腳氣所致鱉甲去裙襴醋炙焦二兩桃仁七枚湯浸去皮尖人參柴胡去苖當歸切焙枳殼去穰麩炒各二兩甘草炙半兩白檳榔煨二枚右粗搗篩先用小便二盞浸藥三錢經半日煎七分去滓溫服以瘥為度婦人病狀同者加牛膝半兩蔥白膏方出千金方蔥白菘菜子葶藶子葫藋根蒺梨子丹參各半兩豬膏五升右㕮咀煎膏法去滓用之蒺梨子湯出千金方凡虛熱石淋當因中冷濕傷飢熱聚在裏變成熱及水病腫滿腹大脹及大小便不利腫如皮紙盛如日光如老蠶色堅腫如石水出此皆腎熱虛損強取風隂濕傷脾胃故也治之法內宜依方服諸利小便藥外以此湯洗四肢竟以蔥白膏傅之别以豬蹄湯洗蒺梨子赤小豆蔥心青皮各一升菘菜子三升葫藋五升巴豆一枚合皮熬右㕮咀以水二斗煮取八升以淋洗腫處豬蹄湯出千金方治體腫發熱因勞損熱盛當風露臥腫方豬蹄一雙葫藋三升蒺梨一升碎葶藶五合黃蘗五兩右㕮咀以水一斗煮取三升冷浴日三郁李仁散出經驗良方治腫滿不利小便郁李仁陳皮檳榔茯苓白术各一兩甘遂五錢右為末每服二錢薑煎棗湯調下食前服茯苓蘇子丸出三因方治面腫小便澀心腹脹滿茯苓蘇子杏仁去皮尖各二兩橘皮去白防己葶藶隔紙炒各一兩一分右為末蜜丸如小豆大以桑白皮湯下一二十丸食後服無礙丸出衛生寶鑑治脾病橫流四肢腫滿及心腹脹滿喘不得臥大腹皮二兩木香半兩蓬莪荗京三稜檳榔郁李仁各一兩右為末炒麥蘗為丸梧桐子大每服二三十丸生薑湯下不拘時候一方無郁李仁尤佳紫金丸出危氏方白薑香附子炒去毛紫金皮石菖蒲去蘆毛青木香針砂時煆紅右各等分細末米糊為丸用三丸第二商陸根湯下第三赤小豆常喫用好酒吞下小女麴散療利後虛腫水腫者服此藥小便得利上腫亦消女麴一升生用乾薑細辛椒目附子炮去皮臍桂心各一兩右為末散酒服方寸匕不知服二三匕日三産後虛滿者大良忌豬肉生蔥生菜中軍侯黑丸出千金方治膽玄水從頭面至腳腫頭眩痛身虛名曰玄水體腫大小便澀芫花三兩巴豆八分杏仁五分桂心桔梗各四分右為末煉蜜丸如胡豆大每日三丸稍增得利即止大戟散出經驗良方男子用藥治脾元虛憊心水氣腫滿紅牙大戟炒主脾甜葶藶炒主脾黑牽牛半生半熟主腎續隨子炒去壳主肺甘遂炒去心右各用一兩觀其五臟病症量病加藥加一兩共二兩並為末煎燈心湯五更初面東服一錢用藥之時相老少虛實加減至天明其水下三五次其腫即消却用生蔥薑煮粥止之隔日服平胃散補貼如體虛不堪再下者只可用前藥麵糊為丸三日一服二十丸謂之磨化丸屢效食忌如後女人用此方出經驗良方治證同前芫花醋浸瓦炒七次牽牛黑者半生半炒各等分右為末醋煮麵糊為丸如梧桐子大每服三十丸相虛實茶清下咽五更初面東方服天明其水即下用前法粥藥補之婦人止用二味用手撩有窟深者可醫忌生鹽油醬豉麵醋羊鵝等毒食生冷只可喫精肉如飲食鹽炒鹽食之以少為貴不食猶好服之日須忌以甘草木香丸出直指方木香青皮黃連橘紅各一錢胡椒一錢半右為末入巴豆肉不用去油一錢麵糊丸椒大每服三四丸薑湯下大便利腫自消未利再服停積痢滯通用枳殼丸出經驗良方治遍身黃腫外腎亦腫枳殼炒香附子炒去毛茴香微炒蘿蔔子微炒各等分右為末煮麵糊為丸如梧桐子大煎橘葉湯空心服下黃水即安每五七十丸桑根白皮飲療脾胃水氣面目手足胕腫胃脘堅腹滿短氣不能動搖桑根白皮切二升桂心一尺生薑三兩人參右切以水三升煮桑白皮得一升絞去滓內桂心等各飴一十兩煮之竭得七合消息更服須臾當下不盡復一升忌生蔥吹鼻散治身面四肢浮腫殺蟲去鼻中瘜肉隂黃黃疸及暴急黃瓜蒂丁香各七枚小豆七枚右為末黑豆粒於鼻中少時黃水出瘥摩膏出千金方治表久腫病須按方內外攻之可一槩除生商陸一斤煎可得二升右和煎令黃去滓以摩腫亦可服少許並塗以紙覆上燥輒傅之不過三日瘥羊胃湯治久病羸瘦不生飢肉水氣在脅下不能食四肢煩熱羊胃一枚切白术一升切右用水二斗煮取九升服一升日三三日盡更作兩劑乃瘥忌李桃雀肉等治心下有水出肘后方白本三兩澤㵼五兩右銼以水三升煎取一升半分服黑龍丸治食氣遍身黃腫喘而不得食心胸滿悶白角去皮子醋炙黃為末一錢巴豆七枚去皮油右為末用醋及好黑土為末丸如麻子大每服三丸橘皮湯下一日添一丸以知為度如常服清酒毒治腹脹忌油膩果子大豆煎出千金方治男子女人新久腫病風氣入腹婦人新産上則風入臟腑中如馬鞭者噓吸短氣咳嗽宜用大豆一斗淨揀以水五升煮取一斗五升澄清內罈中以一斗半美酒內中更煎取九升夜宿勿食平旦一服三升溫覆取汗兩食頃當下去風氣腫退慎風冷服之十日可全愈若急不可待遂急合服腫不盡退加之腫差更服三服倘若十分差勿服病中亦可任飲之使酒氣相接腫差后渴慎勿多飲又方出千金方用楮皮枝葉一大束切煮取汁隨多釀酒但飲醉為佳不過三四日腫少退瘥后可常服之一方用楮椒枝葉又方出千金方用鯉魚長一尺五寸以尿漬一宿平旦木箆從口貫至尾微火炙令熟去皮宿勿食空腹頓服之不能者分再服勿與鹽香附子出經驗良方治酒腫及腫脾虛發腫用香附子淨洗去皮毛用酸米醋煮焙乾嚼一二十粒久之敗水漸從小便利去腫退仍能飲食體壯勝前委有神功如憚咀嚼醋煮香附子焙乾為末醋糊丸服亦可一方用皂角五片銼同煮生蘿蔔汁水吞服難服晾乾為末醋糊丸服亦可一方用皂角五片銼同生蘿蔔十分吞服難丸加乾宿蒸餅丸一方用大附子童子小便浸一宿一日一夜取出換童尿又浸一日一夜以生絹袋擦去皮於臼中細麵糊米醋為丸如桐子大每服七十丸煎湯飲下治腳氣水腫膹伅用釣樟栁煎服并將皮煎湯洗瘡痍風瘙疥癬又方用豪豬取其肚燒乾和肚屎用之搗細末每朝空心溫酒調下二錢有患水病鼓脹者服此藥豬肚一箇瘥桑椹方治水腫水不下則滿溢若水下則虛竭還脹十無一活用桑椹子并心皮二件先將心皮細切以水二斗煮取一斗去滓入桑椹重煮五升以好糯米五升釀為酒每服一升若腫遍有所起者出肘后方以水和灰塗之燥腹更塗又方出肘后方用赤小豆麻子合搗以傅腫上又方出肘后方用削或桐木煮取汁漬之并飲下少許加小豆妙又方出肘后方用煮豉汁飲之以滓傅腳治一切腫方用紅藍花熟橘搗取汁服之不過再三服便愈多服更妙若腫而大喘者亦宜進此藥治水病瘥后口中乾燥熱瘡出方用鐵鐺中著水一小斗煮金器不問多少煎取二小升出金取金水著病人口中含良久應欲言語有要事方可吐勿咽之改藥氣背腫方出危氏方以煉石塗之立瘥大棗湯出本事方治四肢腫滿以白术三兩㕮咀每服半兩水一盞半大棗三枚拍破同煎至九分去滓溫服日三四服不拘時候烏梅醋法出危氏方治手指甲頭腫用烏梅捶碎去核肉只取仁研米醋入鹽以指浸之自愈治面目手足有微腫常不能好者出千金方用楮葉切二升以水四升煮取三升去滓內米煮作粥食如常食勿絶冬則預取葉乾之凖法作粥周年永差忌生冷一切發物抵聖丸出楊氏家藏方治男子婦人頭面手足虛腫以苦葶藶不計多少於火上隔紙炒過杵為細末棗肉為丸如小豆大每服十丸煎麻子湯下食前日進三服五七日小便腫消為效如喘嗽煎桑白皮湯下忌生冷醋滑物及鹽須另丸一等小丸兒與小兒服看大小加減服煎棗肉湯下夏月飲紅白酒后食冷麵但覺胸中不快次日手背面皆浮腫服五子五皮飲送紅丸子見效後多服紅丸子尤妙又方凡體腫從足始轉上入腹豬肝一具細切先布綟更以醋洗蒜虀食亦可也如頓服食不盡作三兩頓食香薷丸出千便良方療暴水風水氣水腫或瘡中有水通身皆腫甘香薷一斤白术七兩右搗术下篩濃煮香薷取汁和术為丸飲服如梧子十丸日夜四五服利小便夏取花葉合用忌桃李雀肉青魚酢等物加減五苓散出朱氏集驗方治水疾木豬苓白茯苓白术板桂各七錢澤㵼一兩南木香丁香沉香檳榔各三錢白豆䓻二錢半右為細末每服一錢半煎白樟栁空心溫點服如要取水加甘遂半錢在藥內利三五次又當以勻氣藥服下止之但凡治腫三日兩日又一服之取三二次水必去矣續用勻氣藥調理治腫之法無出此也勻氣之藥或烏沉湯勻氣內去甘草者蓋緣治腫藥內有甘遂相反故也服時須濃煎燈心木通湯下點服為妙不要甘遂利小便亦甚穩更量虛實用之大要看尺脈腫盛而尺脈如絲或洪浮按之無根者皆不可下此藥外臺云脈大者生小者死叔和云氣浮大得延生沉細應當死沉香大腹皮湯出朱氏集驗方治腫沉香陳皮良薑附子丁香白豆蔲川芎草豆蔲仁各半兩厚朴大腹各一兩炙白术二兩半右細銼為散每服三大錢水一盞半生薑七片煎至八分去滓食前通口服信庵趙魯公母雍國夫人腫三十年后在襄陽得此藥服半月愈之沉香附湯出朱氏集驗方治腫病大凡腫病因積水而得先用涼藥稍效而腫再作小便不利到此束手蓋涼藥利小便藥性寒而小便愈不通也小便不利則中焦下焦氣不升降為寒氣所結滯故水凝而不通但用沉香附湯附子一隻生去皮臍切成片右用生薑十數片水三盞煎至八分次用沉香濃磨二錢許加入藥再煎二沸去滓空心服如此則小便自通喘自去矣屢試效驗即服三五十隻附子無礙男子婦人皆可服生料五苓散出直指方去水退腫澤㵼銼二十五兩豬苓去皮赤茯苓去皮白术去蘆各一十五兩桂去皮一十兩右為末每服二錢熱湯調下不拘時又治瘀熱在裏身發黃疸濃煎茵陳蒿湯下食前服但病發渴及中暑引飲亦可用水調下服小兒加白术末少許如發虛熱加黃耆人參末少許治胃水四肢腫滿方出千金方豬腎一具茯苓四兩防己橘皮玄參黃芩杏仁澤㵼桑白皮各二兩豬苓白术各三兩大豆三升右十二味㕮咀以水一斗八升煮豬腎大豆澤㵼桑白皮取一斗澄清去滓餘藥煮取三升分三服若嗽加五味子三兩凡服三劑間五日一劑常用有效泄水丸右料加芒硝半兩商陸半兩為末水丸依前服如小豆大每服五十丸水下胡椒宣氣丸治浮腫厚朴薑汁製用巴豆六粒破開外殼厚朴四兩炒熟去豆用薗頭蘿子一兩羌活一兩藿香半兩木香一兩生用一兩同蘿子十四箇拌炒止擇七箇全者用右為末用蒜磨水打糊為丸以菉豆大每服三十丸用燈心棗湯下用木通湯下亦得不拘時候寸氣丸治脾腎氣虛腎水流溢四肢作腫大蒜五枚剝去皮碎附子一大隻去臍切作塊赤小豆揀五兩右同於砂鍋內用水五升煮取乾為度水三升漸添至五升只取附子為末餘不用却入後藥白花啇陸根半兩車前子二錢半沉香二錢木香三錢右件同附子薏苡仁末煮糊為丸如梧桐子大每服五十丸薏苡仁湯下空心日進三服其效如神平胃散治腫病不進飲食蘿蔔子一盞白水煎候清汁煎平胃散右每服二錢以煎蘿蔔子汁一盞加薑棗煎至七分仍入蘿苖一捻同煎服此方纍有神效胃苓丸治腫平胃散五苓散右各一貼用大蒜蒸熟丸藥胃苓二藥五十丸煎木通湯吞下磁石丸治諸氣腫大有妙效羌活陳皮去白木香澤㵼附子炮去皮臍焙乾檳榔白术赤茯苓去皮肉蓯蓉訶子炮去皮用官桂去皮黃耆研為細末桑白皮另杵為末稱鱉甲醋炙令黃烏頭炮磁石能引鐵者醋碎十遍細研水飛過為度橘紅右件等各半兩為末用羊腎子或豬腎子去脂膜生研細和末再杵一二千下如硬再入酒糊丸如梧子大焙乾空心日午溫酒下二十丸至三十丸切忌房事并鹽及諸毒物須至百日內治酒遍身黃腫方五靈脂一兩右為末入麝香少許研令勻飯丸小豆大每服十丸用米飲吞下防風湯治四肢節解如墮脫腫按之皮陷頭眩短氣溫溫悶亂欲吐者方防風白术知母桂心各四兩芎藭芍藥杏仁甘草各三兩半夏生薑各五兩右十味㕮咀以水一斗煮取三升分四服日三夜一古方無半夏杏仁芎藭用附子治腫氣以秦荻黎子為末和釅醋封腫如乾再易日數次以差為度治腫氣以韭杵極爛灸熱拓瘡上便愈以馬齒燒灰唾和緋帛貼腫上根出治腫氣用拳參五月採搗末淋煠去浮腫用破黍莖穗提掃煮取汁浴之有人虛肥積年氣上如水病面腫腹不腫以楮葉八兩下水一斗煮取六升去滓內米煮粥喫治浮腫下水兼惡毒腫搗芫花茺蔚苗絞汁服之白术湯治脾虛浮腫橘皮大腹皮茯苓生薑皮各半兩白术一兩右為細末每服三錢米飲下銀珠丹治正水大便利者硫黃四兩火煆過銀珠右研極細麵糊丸如桐子大每服三十丸米飲下大豆散出指南方治利水大豆一升炒香白术二兩右為細末每服三錢溫米飲下普濟方卷一百九十二
