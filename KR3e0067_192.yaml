body:
  text: 普濟方卷一百九十二明周王朱橚撰水病門風水附論夫內經言腎者牡臟也腎生水故也人勇而甚勞則腎汗出既出復感於風內不得入於臟腑外不得越於皮膚客於玄府行於皮裏傳於肢體本之於腎名曰風水其脈自浮其外證骨節疼痛而惡風且身腫如褁水之狀頸脈動時刻按之隨手凹者是也金匱方云脈浮而洪浮則為風洪則為風氣相傳身體洪腫汗出乃愈惡風者為風水不惡風者小便通利上焦有塞其口內多涎此為黃汗二者之證不可不察大豆散出三因方治風氣通身大腫眼合不得開絶氣骨節疼惡風自汗其脈浮大豆杏仁清酒各一升麻黃木防己各四兩生薑七兩半夏六兩防風豬苓各四兩澤㵼黃耆烏頭各三兩甘遂甘草各二兩右㕮咀以水四斗四升煮豆取一斗去內豆藥及酒合煮取七升七服日四夜三小便快利流通為度腫消停藥不必盡劑若不利小便者加生戟一斤葶藶二兩紙炒香無不快利深師方無豬苓澤㵼烏頭半夏甘遂及甘草甘草似不當用而用之却效非人情所可測也大豆茯苓散出千金方治風水腫大豆三升茯苓白术防風橘皮半夏生薑各五兩鱉甲當歸防己廣黃豬苓各三兩大戟一兩葵子一升桑根白皮五升以水二斗煮一斗去滓內煎右㕮咀納前藥汁中煮取五升每服八合一日三服去如人行十里久麻黃煎出千金方治風水通身腫欲裂利小便麻黃茯苓澤㵼各四兩防風澤漆白术各五兩杏仁大戟清酒各一斗黃耆豬苓各三兩獨活八兩大豆二升水七升煮取一升右㕮咀以豆酒及水一斗合煮取六升分六七服一日一夜令盡當小便極利為度防風散出聖惠方治風水腫通身皮膚欲裂宜利小便防風去蘆豬苓去皮澤㵼赤茯苓麻黃去節澤漆各一兩白术一兩半大戟一兩微炒黃耆一兩獨活一兩杏仁一兩湯浸去皮尖雙仁麩炒微黃右為散每服五錢水一大盞入煮赤小豆汁一合煎至五分去滓溫服每日早辰服良久當小便極利不利晚再服之大腹皮散出聖惠方治風水身體虛浮腫發歇不定肢節疼痛上氣喘促大腹皮銼桑根白皮銼芎藭各三兩漢防己羌活青橘皮湯浸去白焙檳榔川大黃碎微炒一兩甘草半兩微炒銼桂一兩右為散每服五錢以水一大盞煎至五分去滓不計時溫服大豆湯出聖濟總録治風水舉身腫滿短氣欲絶黃耆一兩杏仁去皮尖雙仁炒二兩防風去蘆白术銼各一兩半防己麻黃去根節赤茯苓去黑皮甘草炙各一兩右粗搗篩每服五錢先用水三盞煮豆一合取熟去豆入酒一合與藥同煎至一盞去滓溫服日三當下小便愈蒼术飲出聖濟總録治風水頭重面腫蒼术米泔浸切炮乾杏仁去皮尖雙仁炒赤茯苓去黑皮桑根白皮各一兩半商陸根二兩半連皮大腹四枚嫩楮枝切三合右㕮咀如麻豆大每服五錢水一盞半煎至一盞去滓食前溫服日三防己散治風水面腫骨疼惡風喘急防己赤茯苓去皮桑根白皮羌活去蘆頭各一兩蒼术米泔浸一宿焙郁李仁去皮尖各一兩半右㕮咀如麻豆大每服五錢水一盞半煎至一盞去滓溫服不拘時候日三楮白皮散治風水毒氣遍身腫滿楮白皮二兩銼桑白皮三兩銼陳橘皮一兩焙去白穰紫蘇葉三兩豬苓三兩去皮木通二兩銼右為散每服五錢水一大盞入生薑半分煎至六分去滓不計時候溫服麻黃散治風水遍身腫滿骨節痠疼惡風腳腫皮膚不仁麻黃二兩去根節石膏二兩白术二兩附子二兩炮漢防己二兩桑根白皮二兩銼右為末每服五錢水一盞半入棗三枚生薑半分煎至五分去滓不計時候溫服赤小豆散治風水腹臍俱腫腰不轉動一名服食法赤小豆一升桑根白皮三兩銼白术三兩生薑三兩切鱧魚二斤去鱗腹肚陳橘皮三兩湯浸去穰右細銼一斗都煮令熟出魚量力食之兼食小豆勿著鹽便以任性下之漢防己散治風水面腫脈浮而緊者漢防己桑根白皮銼蒼术銼炒郁李仁去皮尖羌活以上各一兩右為散每服五錢水一大盞至五分去滓溫服如人行十里再服之麻黃湯治風水身體面目盡浮腫腰背連引髀股滿不能食麻黃三兩去根節桂去皮二兩甘草一兩炙附子二兩去皮臍右㕮咀如麻豆每服三錢水一盞半生薑棗大拍碎同煎至一盞去滓溫服日三防己湯出金匱方治風水脈浮為在表其人或頭靣汗出表無他病但腰下痛防己白术銼各二兩甘草炙一兩黃耆三兩半右粗搗篩每服三錢水一盞半生薑棗大拍碎棗二枚同煎至七分去滓溫服如喘加麻黃二兩去根節身腫胃中不和加桂二兩去粗皮心下久寒加細辛二兩去苖葉服訖厚衣覆取汗則愈越婢湯出聖惠方治風水惡風舉身悉腫脈浮不渴自汗而無大熱麻黃二兩去根節甘草炙一兩石膏碎一合白术四兩右粗搗篩每服三錢水一盞半生薑一片棗三枚同煎至一盞去滓溫服日再如惡風加附子一枚咳嗽肺脹加半夏一兩橘皮湯出聖濟總録治風水遍身腫陳橘皮一兩湯浸焙去白楮白皮一兩半炙銼桑白皮二兩半銼紫蘇子炒二兩右粗搗篩每服三錢水一盞半生薑一棗大拍碎同煎至一盞去滓溫服日三椒目丸出聖惠方治風水面腫小便澀椒目一兩半一漢防己一兩半硝石二兩杏仁去皮尖雙仁炒黃右為細末煉蜜和丸如桐子大每於食前煎桑根湯下十五丸甘遂丸治風水黃疸體大如囊面目皆腫隂如斗正如霜瓜甘遂二兩熬葶藶子一升熬杏仁五十枚去皮尖雙仁熬巴豆四十枚去心皮熬右下篩蜜和丸如大豆一服三丸飲下當吐不知可至五丸禁野豬肉蘆笋治瘡中有風水腫疼祕澀青蔥葉乾薑黃蘗右相和煮作湯浸洗之立愈治風水腰腿腹臍俱腫不可轉動出聖惠方郁李仁三兩湯浸去皮尖水研取汁三升薏苡仁二合右以郁李仁汁煮薏苡仁作粥每日空腹一服治風水通身腫欲裂小便澀出千金方用薑石燒令赤納黑犍牛尿中乘熱服一升日二方單服牛尿一合瘥鯉魚方治鯉刺在肉中風水腫痛者用鯉魚睛燒作灰傅瘡中汁出即可治風水臍腹俱腫腰不可轉動出聖惠方用鼠粘子二兩微炒搗細為末每服以暖水調下二錢日三四服商陸酒療風水腫癥癖酒癖用商陸根一斤薄切以淳酒二斗漬三宿服一升量小者減半升日三服療風水毒氣遍身腫方殼皮三兩橘皮一兩桑根白皮五兩紫蘇生薑各四兩大豆二小升右切以水九升煮取一升絞去滓分為四服其藥必須暖不過三劑必當瘥百日來唯禁犬酢療諸蒼中風水腫出本草以薤生搗熟塗上或煮之服治患寒熱毒風水虛脹出本草即取水獺一頭剝去皮和五臟骨頭尾等炙令乾杵末水下方寸匕日二服十日瘥治人素為物所傷及有諸蒼觸犯毒水覺瘡頑不癢痛當中有風水所為身必反張似角弓出本草以鹽豉和麵作碗子蓋瘡上作大艾炷灸一百壯令抽去惡水數升舉身覺癢瘡處知痛瘥也治風水腹大臍腰腫痛不可轉動出本草以冬麻子半升碎水研濾取汁米二合以麻子汁煮作粥著蔥椒薑豉空心食之石水附論夫腫從內起堅塊四肢浮腫名為石水其根在膀胱蓋腎主水歸膀胱內膀胱者州都之官津液藏焉氣化則能出矣今腎虛則膀胱氣弱膀胱氣弱則不能氣化而隱氣不通水液停結於臍腹間故其證胸腹鼓滿按之如石脅下脹痛其脈沉遲身體發熱四肢頭目皆腫也聖惠云尺脈微大亦為石水腫起臍已下以至小腹垂然上至胃腕則死也澤漆湯澤漆五兩桑白皮六兩射干湯浸黃芩赤茯苓白术各四兩澤㵼防己各三兩右㕮咀每服五錢以水三盞烏頭一合煎至二錢內藥同煎至七分去滓空心日三服一方無烏頭以水三盞煮大豆一撮至一盞半去滓豆下藥末三錢煎至七分去滓溫服日二夜一服之效豬皮湯一名白术散出聖惠方治石水四肢細瘦腹滿濁腫大肚如懷娠中心方悶食即氣息楮白皮炙銼桑根白皮銼防己銼各一兩半澤漆莖葉炙銼半兩射干白术赤茯苓去皮各一兩大豆炒半兩右粗搗篩每服五錢水二盞去滓溫服日三夜二一方有檳榔一兩無大豆牽牛子丸出聖惠方治石水腹脹坐臥不得小便澀少牽牛一兩京三稜一兩炮陳橘皮三分焙訶梨勒皮一兩川大黃三兩銼微炒吳茱茰半兩湯浸七遍焙乾炒甘遂一兩煨令微黃鱉甲二兩醋炙黃去裙襴右為末煉蜜為和搗三二百杵如桐子大每服於食前生薑橘皮湯下十丸以利為度海蛤丸出聖濟總録治石水四肢細瘦腹獨腫大海蛤研三分葶藶隔紙炒桑根白皮各一兩切赤茯苓去皮一兩郁李仁湯浸去皮陳橘皮湯浸去白穰焙各半兩防己半兩右為末煉蜜丸如小豆大每日服二十丸漸加至三十丸米飲下早晚各一服桑根白皮湯出千金方治石水四肢細瘦腹腫心中妨滿食即喘急桑根白皮銼澤漆炙銼各三兩防己銼射干白术楮白皮炙銼大豆各一兩右粗搗篩每服五錢水二盞煎至一盞去滓溫服日三夜一海蛤丸出聖惠方治石水臍腹妨悶身體腫滿大小便不利喘促海蛤一兩研細漢防己半兩桂心半兩木通一兩銼牽牛子一兩微炒白术半兩甘遂半兩煨令微黃右為末以棗肉和搗三二百杵丸桐子大每服濃煎香葇湯下二十丸以利為度不利再服鱉甲丸出聖惠方治石水鱉甲去裙襴醋炙訶梨勒皮銼炒右為末醋煮麵糊和丸如桐子大每服二十丸生薑橘皮湯下以利為度桑根白皮散出聖惠方治石水四肢瘦腹大胸中滿悶食即喘急桑根白皮一兩銼漢防己一兩澤漆二兩赤茯苓二兩紫蘇莖葉一兩右為散每服四錢以酒一大盞入炒焦熟黑豆五十粒煎至五分去滓不計時候溫服甜葶藶丸出聖惠方治石水腹堅漸大四肢滿腫甜葶藶二兩隔紙炒紫色川芒硝三兩椒目二合微炒出汁水銀一兩以棗肉收研令星盡用漢防己一兩海蛤一兩右為末研入水銀令勻煉蜜和搗三二百杵丸如桐子大每服三十丸以粥飲下日三四服桑白皮湯治膀胱石水四肢瘦腹腫桑白皮穀白皮澤漆葉各三升大豆五升右㕮咀每服五錢水一盞半煎至八分服檳榔散出聖惠方治石水病腹膀胱緊急如鼓大小便澀檳榔末半兩甘草一分炙銼生薑一兩桑根白皮一兩半銼商陸一兩切右除檳榔外用水二大盞煎取一大盞去滓五更初分作二服每服調下檳榔末一分至平明當利如未利即再服之杏仁丸出聖濟總録治石水四肢瘦腹腫杏仁湯浸去皮尖雙仁炒苦瓠取膜微炒各一兩右為末煮麵糊和丸如小豆大每服十丸米飲下日三服水利為度治水鼓石水腹脹身腫用把鼠一枚剝皮細切煮粥空心喫之頻食三兩度瘥治腹堅腹脹滿世號石水用白石英十兩明淨者捶如大豆大以瓷瓶盛用好酒二斗浸以泥固封瓶口以馬糞及粳火燒之長令酒小沸從卯至午即令住火日可三度暖中盞飲之如不飲酒即隨性少食之其白石英可更一度用也椒仁丸治石水椒仁甘遂麩炒焦黃續隨子去皮研郁李仁去皮研牽牛子炒令極熟五靈脂附子炮去皮臍吳茱茰湯浸七次玄胡索木香各半兩芫花醋浸一宿麩炒石膏火煆紅細研如粉各一兩信砒膽礬各一錢巴豆六十粒取霜右為末麵糊丸如菉豆大每服十丸生薑湯下皮水附論夫肺主於皮毛腎主於水虛則水妄行流溢於皮膚故令身體面目悉腫按之沒指而無汗也復如故不滿亦不渴四肢重而不惡風是也脈浮者名皮水也桑根皮散治皮水頭面四肢浮腫心胞不利喘促煩悶大小便澀桑根白皮一兩銼炒杏仁一兩去雙仁炒陳橘皮一兩湯浸去白甘遂一兩煨令微黃澤㵼一兩赤茯苓一兩黃芩半兩赤小豆一升水五升煮取二升右為散每服三錢以小豆汁一中盞煎至六分去滓五更初溫服如人行十里當利如未利即再服漢防己散治皮水腫如褁水在皮膚中四肢習習然動漢防己一兩黃耆一兩銼桂心一兩赤茯苓二兩甘草半兩炙銼桑白皮一兩銼右為散每服五錢以水一大盞煎至五分去滓溫服日三服木香丸治皮水身體面目悉浮腫木香一分乳香一分硃砂半錢研甘遂半錢炒微黃檳榔二枚一生一炮熟苦葫蘆子一分炒右為末以爛飯和作四十九丸用麵褁於銚子內以水煮熟令患人和汁吞之以盡為度從早晨服藥至午時其小便即下計數行水盡自止加味越婢湯治水皮方見風水類木防己湯療皮水如腫氣在皮膚中四肢俱動木防己三兩黃耆三兩桂心三兩茯苓六兩甘草二兩炙右切以水六升煮取二升分再服忌海藻菘菜生蔥酢物五皮散治皮水四肢頭面悉腫按之沒指其腹如鼓不喘不渴脈亦浮心腹膨脹上氣促急堅並治妊娠胎水大復皮桑白皮茯苓皮生薑皮陳皮右㕮咀每服四錢以水二盞煎至七分去滓熱服日二三服更磨木香水同煎尤好如大便不通者加烏桕木根皮等分同煎極效五皮散局方用五加皮地骨皮此方及出中藏經用陳皮桑白皮乃有功於脾肺所以多效或加附子皮其説亦有理大小便不通又加烏桕木根皮等分更加蘿種根尤妙小便不順加豬苓皮一方加白术磨沉木香入此藥活人頗多昔於江市見一婆子患腫疾服此藥和縣寶女患此但脈沉細此方加附子皮及復元丹有效又有一人腹腫小腑不快兼素有白濁便多之患不流通而腫聚前藥加豬苓皮亦取效不可輕忽三因方加木香磨水煎者却反不驗尤不可曉常服忌油膩物切不可服㵼水藥或云添五加皮亦得蓋欲腫從水道去故也陳世德云太學諸生姚子大劉亨叔並患此病勢可畏服之而安又方取服牛溺啇陸羊肉􅋯及香柔煎等如肢體腫滿其千水丸諸大方在别卷若止皮膚小腹內稍腫者服諸發汗藥得汗便瘥然慎護風寒為急若腹腫大下之不去便針臍下二寸入數分令水出孔合須臾減乃止若皮膚頑痺以羊脂塗上炙手及熱摩之即退水癥附論夫水癥者由經絡痞澀水氣停聚在於腹內大小腸下利所為也其病腹內有結塊堅強在兩脅間膨脹滿遍身腫所以謂之小癥水癥者由經絡痞澀水氣停聚在於心下腎經又虛不能宣利溲便致含水氣結聚而成形瘕在心於腹之間抑按之作水聲但欲飲而不用食遍身虛腫是也水癥丸療水腫大腹礬石熬躑躅花細辛半夏洗七次梨盧丹參承露各十分承露是落葵也巴豆十枚去心皮苦參雄黃大黃芒硝大戟各十分烏頭二十分炮狼毒十分野葛二分右搗篩蜜和藥成以置腫上并服如黍米大三丸日三欲取下者服五丸禁食生魚生菜肥肉海藻丸出聖惠方深師療癥水胸腹內牢強通身腫不能食海藻一兩洗水銀一兩椒目一兩芒硝葶藶一兩炒大黃一兩甘遂一兩炒桂心一兩附子一兩炮茯苓一兩大戟一兩松羅一兩乾薑一兩巴豆三十枚去皮心炒杏仁三十枚去皮尖炒右下篩蜜和小豆大服二十丸日三不知稍稍加之忌肉大酢生蔥蘆笋白礬丸出聖惠方治水癥腹大腫硬小腸不通白礬半兩燒令湯浸躑躅花半兩酒炒曝乾細辛半兩梨蘆半兩去蘆頭半夏半兩湯浸洗七遍去滑丹砂半兩細研水飛過苦參半兩銼巴豆半兩製紙褁去油雄黃半製半兩研川芒硝一兩川大黃半兩細銼炒大戟半兩銼碎微炒川烏頭半兩炮去皮臍狼毒半兩醋拌右為細末煉蜜和搗三二百杵丸如黍米大空心以溫水下五丸以通利為度木香丸出聖惠方治水癥腹內堅脹喘促大小便澀木香三分甘遂半兩生用青橘皮湯浸半兩去白焙膩粉一分蘿蔔子半兩水銀半兩入少煮棗肉研令星盡防己二分澤㵼三分巴豆一分去皮心研紙褁壓去油瞿麥半兩右為末以糯米飯和丸如菉豆大每服空心以木通湯下三丸鱉甲散出聖惠方治水癥心下痞堅上氣喘急眠臥不安大腸祕澀鱉甲一兩半塗酥炙令黃去裙襴桑根白皮二兩銼訶梨勒皮赤茯苓大腹皮各一兩半吳茱茰半兩湯浸七遍炒乾郁李仁半兩湯浸去皮微炒川大黃一兩半銼炒右為散每服五錢水一大盞煎至五分去滓溫服如人行四五里再服治水癥出本草用萆麻子水研二十粒服之吐惡沫加至三十枚三日一服瘥則止水氣附論夫腎主水腎虛則水妄行肺主氣肺虛則胃氣不能循環水之與氣留滯皮膚令身體四肢腫故名水氣腫也桑皮飲出直指方治肺間積水頭面浮腫桑白皮炒青皮陳皮檳榔枳殼當歸赤茯苓青木香川芎石韋炙去毛羌活各一兩牽牛炒末半夏製葶藶炒香甘草炙各一分半右銼每服三錢薑四片煎服神仙祕訣丸治水氣浮腫黃疸病每件稱來一兩宜酸皮青皮及陳皮三稜巴豆五靈脂大黃神麯并烏梅大戟芫花用甘遂葶藶杏仁淡豆䜴搗羅為細炒煙微醋糊為丸便是劑年深所患黃腫肚皮却似筲箕內傷飲食冷傷脾坐處偎墻傍濕此藥華山碑記食勞酒疸偏宜神仙祕術甚希竒服了頓除積氣右為㕮咀炒煙微起為細末醋糊為丸如菉豆大每服七丸量虛實加減五更生薑湯送下百物所傷仍用傷物湯下忌甘草諸藥湯蘿蔔子飲出醫方大藏治水病浮腫蘿蔔子半兩生赤茯苓半兩去皮牽牛末炒葶藶炒香甘草炙各四兩半夏製川芎銼檳榔煨銼青木香辣桂青皮陳皮白色商陸各三分右㕮咀每服三錢水一盞薑四片不飢不飽煎服檳榔丸出聖濟總録治水氣第一日空心先服檳榔丸一丸日中後服枳實湯一服次日亦然第三日空心臨臥服萬靈丸各一服第四日早晚服水銀丸一服其病當於大小便俱利則喫煮赤小豆如渴不可飲水當服白术湯然後常服鹿茸丸檳榔煨銼牽牛子半生半炒葶藶隔紙炒各一兩惡實木香青橘皮去白湯浸郁李仁去皮尖炒白茯苓去皮枳殼不去穰防己各半兩大黃紙褁灰中煨令香熟一分右為末煉蜜和丸如桐子每服四丸空心煎桑根白皮湯下枳實湯出聖濟總録