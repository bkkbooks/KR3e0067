咀一兩水煎食後槐子散出保命集方槐子黄芩木賊蒼术各等分右為細末茶清調下食後人參消風散出如宜方治風上攻頭目昏痛耳鳴目眩鼻塞肉瞤拘急方見風頭疼類治諸風作熱痰頭目眩暈出如宜方南星四兩防風二兩甘草一兩右㕮咀每服五錢水一盞半薑十片煎服面上如蟲行加全蝎治頭眩令好顔色出本草以菊花茯苓合為丸以成煉松脂和每服如雞子一丸治頭眩暈經久不差四體漸羸飲食無味好食黄土蒼术三斤去皮毛研為末麴三斤右二味酒和丸如梧桐子大暴乾米飲送下二十丸日進三服忌桃李雀蛤等主中風頭眩心肺浮熱手足無力筋骨煩言語似澁一身動搖以烏驢頭一枚燖洗如法蒸令極熟細切更於豉汁内煮着五味調㸃少酥食之效膈痰風厥頭痛論夫膈痰風厥頭痛者謂膈上有痰氣不下行復感風寒痰相結其氣厥逆上攻於頭故令頭痛也亦有數歲不已連腦痛者葢風寒在於骨髓也故云膈痰風厥頭痛其脈伏而時見若手足寒冷至節則死夫厥逆頭疼者頭痛齒亦痛數嵗不已是也葢腦為髓海係於頭齒為骨餘屬於腎因犯大寒寒氣内著骨髓髓以腦為主腦逆故令頭痛齒亦痛也方牛黄鐵粉丸治風痰氣厥頭痛心胸壅喘滿惡心牛黄研一錢鐵粉研一兩半水銀砂子半夏生天南星炮膩粉研一分粉露研二錢丹參研三分乾蝎去土炒一分白附子生半兩右為細末拌勻煮棗肉和丸如梧桐子大每服五丸至七丸生薑湯下卧服金犀丸治風痰氣厥攻擊頭痛痰逆惡心退風壅化痰金箔三十片犀角鎊一兩龍腦研一錢麝香研一分丁香一分丹砂研水飛二兩天南星炮一兩半夏二兩洗去滑天麻半兩白礬枯一兩右為細末拌和勻再研者火棗肉丸如梧桐子大每服十五丸溫薑湯下芎藭湯治胸膈風痰氣逆厥上攻頭痛嘔吐痰飲芎藭獨活去蘆旋覆花防風藁本去苗土細辛去苗葉蔓荆子各一兩石膏碎甘草炙各一兩右麤𢷬篩毎服三錢生薑二片荆芥三穂水一盞同煎至七分去滓食後稍熱服犀角半夏丸治風痰攻衝頭痛利咽膈和胃氣進飲食去風氣犀角鎊生木香桔梗剉炒各半兩天麻人參各一兩半夏洗去滑二兩半丹砂細研檳榔煨剉青橘皮浸去白焙各三分右為細末拌和令勻生薑自然汁煮麪糊和丸如梧桐子大每服十五丸加至二十丸淡薑湯下不計時天南星丸治風虚痰頭目旋暈肢節拘急天南星半兩炮裂華隂細辛半兩附子半兩去皮臍防風半兩去蘆白附子半兩炮裂芎藭半兩天麻一兩半夏半兩湯洗七遍去滑旋覆花半兩右為細末薄糊為丸如豌豆大每服三十丸至五十丸荆芥薄荷湯下不計時候附子散治痰厥頭痛胸滿短氣嘔吐白沫飲食不消附子半兩炮去皮臍前胡半兩去蘆半夏半兩湯洗七遍去滑枳殻半兩麩炒微黄去瓤檳榔半兩石膏二兩杵碎芎藭半兩人參半兩去蘆右細散和勻每服四錢水一盞生薑半分煎至五分去滓不計時温服乳香散治風痰攻擊頭痛惡心胷膈煩滿咽乾多渴乳香一兩以生薑自然汁一盞煑乳香令軟於乳缽内研細濾去滓入麪少許銀器内慢火熬成膏鐵粉研水飛一兩半夏洗七次焙二兩鉛白霜研一兩丹砂研水飛一兩皂角根白皮剉二分天南星半兩生用右為細末拌和再研勻以乳香膏和丸如梧桐子大毎服十五丸加至二十丸生薑薄荷湯下食後服麝香天麻丸治風痰氣厥頭疼目眩旋暈四肢倦怠精神不爽眠睡不寧天麻酒浸一宿焙防風去义芎藭各一兩甘菊花三分天南星一枚重一兩者先用白礬湯洗七次然後用水煑令軟切作片子焙乾麝香研二錢右為末拌勻煉蜜丸雞頭實大每服一丸細嚼荆芥湯下不拘時化痰丸治風痰氣厥頭痛利胸膈進飲食半夏湯浸去滑别𢷬二兩天南星炮白附子炮丹砂研各一兩檳榔煅剉半兩丁香一分右為細末以生薑自然汁煑前半夏末作糊和丸如梧桐子大毎服十五丸加至二十丸薑湯下不計時葱白湯治冷熱膈腋發時頭痛悶亂欲吐不得者葱白二十莖烏頭甘草真珠恒山各半兩桃葉一把一作枇杷葉右㕮咀水酒各四升和煮取三升去滓内珠每服一升吐即止防風散治痰厥頭痛防風一兩去蘆甘菊花一兩牛蒡子一兩微炒白附子一兩炮裂前胡一兩去蘆石膏二兩細研水飛過右為散每食後以生薑茶清調下二錢石膏丸治痰厥頭目眩心膈不利石膏二錢細研水飛過甘菊花二兩附子一兩炮裂去皮臍防風一兩去蘆枳殻一兩麩炒微黄去瓤郁李仁一兩湯浸去皮尖微炒右為末煉蜜和𢷬三二百杵如梧桐子大每於食後及夜臨卧時以温水下二十丸導痰湯治一切痰厥頭目旋暈或痰飲留積不散胸膈痞塞脇肋脹滿頭痛吐逆喘急痰嗽涕唾稠粘坐卧不安飲食不思半夏湯泡七次四兩天南星炮去皮橘紅去穰麪炒枳實去瓤麩炒赤茯苓去皮各一兩甘草炙半兩右㕮咀每服四錢水二盞生薑十片煎至八分去滓温服食後一方無甘草玉露丸出王氏博濟方治風痰氣厥攻擊頭痛胸膈不利嘔逆食少半夏湯洗七次為末薑汁和作餅子焙白附子炮天南星炮各二兩龍腦研一分白礬研一分右以前三味搗羅為末研入白礬腦子令勻煮薑汁麪糊為丸如豌豆大毎服二十丸食後薑湯下菊花散治風痰氣厥頭昏眩菊花一兩白附子炮三分枳殻去瓤麪炒三分防風去义甘草炙一分右為散每服二錢以臘茶清調服不拘時候白附子丸出經效濟世方治風虚痰盛頭目昏眩天南星生天麻半夏湯洗七遍川烏頭生去皮臍白附子生用右等分為細末入腦麝少許瓷盒内閉一兩宿清水丸如梧桐子大硃砂為衣每服五七粒加至十粒食後茶清或薑湯下服時微以齒碎之靈砂丹出仁存方治痰飲頭痛南星炮半夏炮白附子炮白礬各一兩牙皂半兩右為末别研皂角膏丸如梧桐子大毎服三十丸硃砂為衣食後薑湯下天南星丸治風痰壅盛胸膈不利攻擊頭痛天南星炮白附子炮半夏漿水浸三日切焙各一兩木香一分右為末生薑汁和丸如菉豆大毎服十丸食後生薑湯下順元散出醫方大成治體虚痰氣不順頭目眩暈南星一兩炮川烏頭附子各半兩木香二錢半右㕮咀每用三錢水一盞薑十片煎熱服治痰厥頭痛宜吐之方出聖恵方茶木四錢人參蘆頭一分燈心一大束右以水一盞煎至五分去滓温服如人行五里未吐再服治卒頭痛如破非中冷又非中風是胸膈中痰氣上衝所致名厥頭痛吐即差療方出聖恵方釡下墨四錢附子三分炮右為末以冷水服方寸匕當吐愈一方有桂心一分忌猪肉冷水等物又方出聖惠方常山四分甘草半兩右切以水七升煑取三升每服一升不吐更服亦可内蜜半升忌生葱生菜海藻菘菜治痰厥頭痛方出聖恵方旋覆花一兩牛蒡子一兩微炒右為細散不計時候以臘麪茶清調下一錢又方出聖惠方附子半兩生用半夏半兩生用右為散每用一錢以水調如膏用紙着大小塗藥貼在太陽穴上藥乾疼止立驗治痰厥頭痛及治卒頭痛如破非中冷乂非中風以梅實十箇取内鹽二錢酒一中盞合煎七分去滓非時温服吐即住烏頭梅亦可山芋丸治厥逆頭痛及齒痛骨寒山芋天雄炮裂去皮臍硫黄研白茯苓去粗皮五味子磁石煅醋淬五七遍熟乾地黄焙各兩右為末酒煑麪糊為丸如梧桐子大每服二十丸至三十丸食前温酒下附子湯治風寒内著骨髓上連於腦頭痛齒痛附子炮裂去皮臍桂去粗皮五味子白茯苓去黒皮石膏煅人參補骨脂炒各一兩右剉麻豆大每服三錢水一盞煎至七分去滓温服椒附丸治厥逆頭痛齒骨痛寒蜀椒去目并閉口炒出汁一分附子炮裂去皮臍一兩木香炮細辛去苗葉各半兩右為細末酒煑麪糊為丸如梧桐子大每服二十丸空心日午臨睡溫酒下三五七散一名大三五七散治厥逆頭痛方見風頭眩類丁未十月中范天騋之内素有脾胃之證時顯煩躁胸中不利大便不通因乗寒出外晚歸又為寒氣怫鬱悶亂大作火不能伸故也疑其有熱服疎風丸大便行其病不减将其藥再服七八十丸大便復見兩三行元證不瘳増添吐逆食不能停涕唾稠粘湧出不止眼澁頭旋惡心煩悶氣短促上喘無力以言心神顛倒兀兀不止目不敢開如在風雲中頭苦痛如裂重如山四肢厥冷不得安卧先師料前證是胃氣已損復下兩次重虚脾胃病名曰痰厥頭痛與半夏白术天麻湯治之半夏白术天麻湯出試效方天麻半錢半夏一錢半黄茋半錢人參半錢白术一錢蒼术橘皮澤㵼茯苓各半錢炒麴一錢麥蘖麪二錢乾薑二分黄蘖二分此頭痛苦甚為足太隂痰厥頭痛非半夏不能療眼黒頭旋風虚内作非天麻不能除其苗謂之定風草獨不為風所動也亦治内風之神藥也内風者虚風是也黄茋甘溫㵼火補元氣實表虚自汗人參甘溫益氣㵼火補中二术俱苦甘温除濕補中益氣澤㵼茯苓利小便導濕橘皮温益氣調中升陽麴消食蕩胃中滯氣大麥蘖寛中助胃氣乾薑辛熱以滌中寒黄蘖苦寒酒製以療冬天少陽在泉發躁也右㕮咀毎服半兩水二大盞煎至一盞去滓帶熱服之再服而愈石膏散出衞生家寳方治痰熱畜於胸中嘔吐上熱頭痛石膏一兩研天麻防風大青白附子殭蠶去絲嘴炒令赤羌活已上各半兩麝香一分别研甘草一分炙右件為末香豉一合湯浸軟碾細和藥杵一千下丸如彈子大微火焙乾毎服一丸細嚼煎薄荷湯下八風丹出楊氏家藏方治體虚有風痰壅盛頭目昏重口眼牽引面若蟲行及癱緩諸風並宜服之附子去皮臍川烏頭去皮臍草烏頭去皮尖白附子半夏天南星香白芷天麻去苗川芎細辛去土葉已上十味各半兩並生用硃砂半兩别研麝香一兩别研右件並為細末入白麪五兩一處研勻水和為丸毎一兩作一十二丸隂乾每服一丸細嚼茶清或温酒送下食後臨卧十珍丸出楊氏家藏方治諸風掉運痰厥頭旋項背拘急肢體疼痛麻木不仁草烏頭八兩一半生去皮臍尖一半炮天南星五兩三錢河水浸三日炮縮砂仁二兩肉桂去粗皮川芎防風香白芷桔梗去蘆頭炒已上五味各二兩七錢麻黄去根節七兩細松煙墨二兩燒研右件為細末煉蜜為丸每一兩作三十丸每服一丸嚼細茶酒下食後拒風丸出楊氏家藏方治風虚痰厥頭痛旋暈如在舟車之上天南星二兩炮半夏二兩浸洗七次切焙藁本去土細辛去葉土防風去蘆羌活去蘆獨活去蘆川芎已上六味各一兩右件為細末生薑汁糊為丸如梧桐子大毎服三十丸生薑湯下食後蓽撥散出楊氏家蔵方治年深頭風痰厥嘔吐惡聞人聲頭不能舉目不能開蓽撥不以多少右為細末每服一大錢茶調下仍搐少許鼻中食後大芎辛湯出如冝方治氣虚痰飲腎氣諸厥頭痛及頭暈舉頭似屋宇旋轉如在舟中此有虚風痰三證附子烏頭天南星乾薑炮川芎細辛甘草各等分右㕮咀薑五片茶芽煎食後服一方去附子乾薑甘草加石膏白芷韮汁丸如梧桐子大嚼生葱茶下名七生丸治八般頭風諸厥頭疼如體虚痰腎諸厥頭痛服大芎辛湯無效宜黒錫丹普濟方卷四十七
