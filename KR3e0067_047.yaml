body:
  text: 普濟方卷四十七明周王朱橚撰頭門風腦旋論夫風腦旋者以氣虚體怯所禀不充陽氣不能上至於腦風邪易入與氣相鼓致頭暈而旋也又有胸膈之上痰水結聚復犯大寒隂氣逆上風痰相結亦令頭旋方旋覆花湯出聖濟總録治熱毒風上攻頭旋欲倒或嘔吐不止惡見日光不思飲食旋覆花前胡去蘆菊花防風去义羌活去蘆熟乾地黄焙杏仁去皮尖雙仁炒令黄色各一兩元參白殭蠶炒黄芩去黑心白术半夏為末薑汁製作餅炮乾藁本去苗土甘草炙剉當歸切焙人參赤茯苓去黑皮各一兩右麤𢷬篩毎服五錢水一盞半生薑五片煎至八分去滓食後温服蔓荆子散出聖惠方治風頭旋暈悶起則欲倒蔓荆子三分赤箭半兩細辛半兩麥門冬一兩去心焙地骨皮半兩石膏一兩黄芩三分防風三分去蘆羚羊角三分枳殻三分麪炒微黄去瓤芎藭三分茯苓三分甘菊花三分甘草半兩炙微赤剉半夏三分湯浸七遍去滑右麤𢷬羅為末每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服忌熱麵飴糖羊肉療熱風頭旋心悶衝風起即欲倒方麥門冬去心山茱茰茯苓苦參各八分地骨皮薯蕷人參蔓荆子沙參防風芍藥枳實大黄各六分甘菊花龍膽各四兩右𢷬篩蜜丸每食訖少時以蜜水服如梧桐子大二十丸日二漸加至三十丸自愈忌酢物熱麵炙肉禁猪肉魚粘食漢防已散出聖惠方治上焦風痰上攻頭目旋暈心神煩亂宜服漢防己一兩羚羊角屑三分人參三分去蘆荆芥三分芎藭三分半夏半兩湯浸七遍去滑赤茯苓三分旋覆花半兩防風半兩去蘆前胡一兩去蘆細辛半兩麥門冬一兩去心焙枳實三分麪炒微黄甘草炙半兩微赤剉右麤𢷬羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服忌飴糖羊肉逺志散一名天雄散出聖惠方治風頭旋眼暈如似屋轉起即旋倒者方見風頭類甘菊花散出聖惠方治風頭旋忽忽如醉痰逆不下飲食甘菊花三分天麻一兩石膏二兩芎藭三分獨活三分防風三分去蘆白术三分茯苓一兩杏仁半兩湯浸去皮尖雙仁麪炒微黄羚羊角屑三分杜若三分黄芩三分甘草半兩炙微赤剉右麤𢷬羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服麝香天麻丸出聖濟總録治風頭旋目黒肩背拘急恍惚忪悸肢節疼痛宜服麝香研一錢半天麻天南星炮白附子炮羌活去蘆赤茯苓去黒皮乾蝎去土炒丹砂研防風去义桂去粗皮蝉蛻洗炒各一兩半烏蛇酒浸去皮骨炙二兩鉛霜研一分右除研者外𢷬羅為末再同研勻煉蜜和丸如梧桐子大每服二十丸溫酒下荆芥湯亦得不拘時候芎菊散出聖濟總録治諸陽受風頭目旋暈目視昏暗肝氣不清芎藭甘菊花擇各一兩羌活去蘆三分防風去蘆三分細辛去苗葉白殭蠶炒各三分草决明旋覆花擇蟬蛻洗焙各一錢蜜蒙花擇天麻荆芥穗甘草炙各半兩右為細散每服二錢水一盞煎至七分食後温服湯㸃亦得摩頂細辛膏治風旋頭細辛三兩當歸三兩桂心三兩天雄二兩去皮臍生用白芷一兩半芎藭一兩半乾薑一兩烏頭二兩去皮臍松栢枝四兩生地黄五斤取自然汁硃砂一兩細研猪肪三斤右𢷬篩如麻豆大以生地黄汁浸一宿先將猪肪銷去筋膜下火停冷下地黄汁并浸者藥同煎合白芷黄色去滓入硃砂末用栁木箆不住手攪令凝收於瓷合内用頭頂上甚效菊花丸治風頭旋目暈欲倒胸中痰逆兼治筋骨疼痛甘菊花擇枸杞子擇天麻酒浸切焙獨活去蘆木香芎藭防風去义羌活去蘆天竺黄研赤茯苓去黑皮蔓荆子去皮藁本去土各等分右為細末煉蜜和𢷬三百杵如梧桐子大每服十丸荆芥湯下不拘時候旋覆花丸治肺脾風痰上攻心膈煩滿頭目旋暈不納飲食旋覆花半兩枳殻二兩麩炒微黄去瓤石膏二兩川升麻半兩前胡一兩去蘆防風一兩羚羊角屑三分赤茯苓三分黄芩三分白蒺蔾三分微炒去刺川大黄三分剉碎微炒甘草半兩炙微赤剉右𢷬羅為末煉蜜和𢷬三二百杵丸如梧子大每於食後煎竹葉湯下三十丸羚羊角湯治熱毒風上攻頭旋目暈耳内虚鳴或身體癮疹麻痺羚羊角鎊二兩菊花三兩防風去义羌活去蘆前胡去蘆藁本去苗葉元參黄芩去黒心杏仁去皮尖雙仁炒令黄色菖蒲甘草炙剉各一兩右麤𢷬篩每服五錢水一盞半煎至八分去滓食後温服療頭面熱風頭旋眼濇項筋急强心悶腰脚疼痛上熱下冷健忘方肉豆蔲十枚去皮人參犀角屑枳實炙各六分黄連白术大黄各八分甘草炙苦參旋覆花各四兩㯽榔仁十顆右𢷬篩蜜丸如梧桐子大以酒飲服二十丸漸加至三十丸日三服無問食前後服之不利及忌生菜熱麪蕎麥酒蒜猪肉海藻菘菜桃李雀肉等蛇蛻飲治頭旋悶發即欲倒蛇蛻去土炙皮二兩蚱蟬去頭翅足炙四十枚柴胡去苗沙參赤芍藥葛根各一兩石膏碎杏仁去皮尖雙仁炒令黄各三分麻黄去根節三分牛黄如大豆粒十枚研湯調下右除牛黄外麤𢷬篩每服五錢水一盞半煎至八分入蜜竹瀝牛黄各少許更煎三兩沸去滓温服療風邪氣未除發即心腹滿急頭旋眼暈欲倒方芎藭獨活防風白术杏仁去皮尖研枳實炙各二兩茯苓三兩生薑四兩羚羊角屑黄芩各一兩右切以水九升煑取三升分為三服日三忌桃李雀肉并蒜大酢麪等白术散治風頭旋心胸不利白术一兩前胡一兩去蘆頭防風三分去蘆頭枳殻二分麩炒微黄去瓤赤茯苓一兩蔓荆子三分甘草半兩炙微赤剉半夏半兩湯浸七遍去滑芎藭三分右麤𢷬為散每服三錢以水一中盞入生薑半分煎至六分不拘時候温服前胡散冶上焦風痰頭旋目暈不欲飲食前胡一兩去蘆頭白术一兩防風一兩去蘆枳殻一兩炒微黄去瓤茯神一兩細辛半兩蔓荆子三分半夏七分湯浸七遍去滑甘草半兩炙微赤剉右麤羅為散每服三錢以水一中盞入生薑半分薄荷七葉煎至六分去滓不拘時候温服芎藭散出聖惠方治頭風旋發則心腹滿拘急眼暈欲倒芎藭三分獨活半兩防風半兩去蘆赤茯苓三分杏仁半兩湯浸去皮尖麩炒白术半兩枳殻三分麩炒微黄去瓤黄芩半兩羚羊角屑半兩右麤搗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服獨活散治風頭旋手足厥逆身體疼痛心亂反倒如癲發歇無恒方見風頭眩類羚羊角散治一切頭旋手足因體虚風邪乗於陽經上注於頭面遂入於腦亦因痰水在胸膈間犯大寒使陽氣不行痰水結聚上衝於頭則令頭旋方見風頭眩類荆芥丸出聖濟總録治風頭旋目痛眩肢拘急手足少力荆芥穗四兩細辛去苗葉芎藭白殭蠶炒各一兩天麻一兩半羌活去蘆頭防風去义蒺蔾子炒去角二兩右為末煉蜜丸如鷄頭大毎服一丸食後細嚼荆芥茶下温酒亦得羚犀湯出聖濟總録治暗風頭旋眼黒昏眩倦怠痰涎壅盛骨節疼痛羚羊角榜石膏碎甘草炙剉旋覆花紫苑去苗土已上各一兩右麤𢷬篩每服三錢水一盞入生薑一棗大拍碎煎至七分去滓食後温服人參丸出聖濟總録治風頭旋目眩痰逆惡心胸膈痞滯欬嗽痰逆喘滿嘔逆不欲飲食人參甘草炙剉白术旋覆花微炒各一兩麥門冬去心焙前胡去蘆枳殻去瓤麩炒各二兩右為細末以湯浸炊餅和丸如梧桐子大每服二十丸食後温生薑湯下川風散出聖濟總録治風頭旋目暗昏眩肢節疼痛手足麻木上膈壅滯或發寒熱荆芥穗芎藭防風去义獨活去蘆甘草炙剉右為散每服二錢水一盞入生薑三片薄荷三葉煎至七分去滓温服山茱萸散出聖惠方治風頭旋目疼體痛防風山茱萸川芎甘菊花細辛天雄炮山藥各半兩右為細末每服二錢温酒調食前服十便良方無天雄防風丸出聖濟總録治風頭旋目眩肩背拘急發熱惡寒肢節疼痛防風去义甘草炙各一兩羌活去蘆半兩獨活去蘆桔梗去蘆炒半兩芎藭白芷各三分右為末煉蜜丸如櫻桃大每服一丸食前後荆芥湯嚼下芎藭散出聖濟總録治風頭旋眼目昏花痛眩暈倦怠心忪芎藭人參前胡去蘆白殭蠶防風去义天麻蔓荆子右為散每服二錢食後温酒調下白蒺蔾丸出聖濟總録治風頭旋目暈痰逆蒺蔾子去角炒旋覆花擇皂莢去皮子燒灰惡實炒各一兩龍腦研二錢麝香研一錢菊花擇二兩右為細末煉蜜和𢷬三百杵丸如雞子大每服一丸細嚼温酒下食後服白术飲出聖濟總録治風邪在胃頭旋不止復加嘔逆白术厚朴去粗皮薑汁炙甘菊花半兩人參白芷防風去义一兩右㕮咀如麻豆大每服五錢水一盞半生薑五片煎至一盞去滓食前温服松香散出聖濟總録治風頭旋肩背拘急肢節疼痛鼻塞耳鳴面赤咽乾心忪痰逆眼見黒花當風淚出松實去殻白芷當歸研焙芎藭甘草炙各三兩甜𤓰子洗一升右為散每服二錢食後以荆芥薄荷茶清調下防風飲専療風痰氣發即頭旋嘔吐不食防風人參橘皮各二兩白术茯神各二兩生薑四兩右切以水六升煑取三升去滓分温四服中間任食一日令盡忌大醋桃李雀肉蒜麪等物貼頂膏出聖濟總録療頭風悶亂鼻塞及頭旋眼闇皆主之萆麻去皮杏仁去雙仁皮尖石鹽芎藭松脂防風右等分先𢷬石鹽以下四種為末别𢷬萆麻杏仁相次訖即臘紙裹之有病者先灸百會三壯訖刮去黒毛使净作一帛貼子裁大於灸處塗膏以貼兩三日一易之其瘡於後即爛破膿血出及帛貼之似爛柿蔕出者良一方用脂兼前六物相和一方無防風天雄散一名大五七散治風頭旋口喎目痛耳聾方見風頭眩類逺年療頭風旋不食食則吐方前胡三兩白术防風枳實炙茯神各三兩生薑四兩右㕮咀以水六升煎取二升濾去滓分温三服忌桃李雀肉酢等秦芁飲子吐方療心虚感風頭旋心忙痰飲令心悶惛惛惚惚不能言語宜微吐痰此候極重秦艽常山人參羚羊角屑各三兩生甘草三兩右切以水六升煑取二升絞去滓分溫二服日一再如人行四五里久進一服取吐不利忌生菜生葱熱麪蕎麥猪肉魚海藻菘菜祛痰丸出聖濟總録治風頭旋痰逆惡心咽膈不利天南星生半夏生赤茯苓去黒皮乾薑炮陳橘皮湯浸去白焙各等分右為細末稀麪糊丸如梧桐子大毎服三十丸加至四十丸温米飲下不拘時候䲭頭丸出聖惠方治風頭旋每發眩暈䲭頭一枚炙令黄莒茹一兩白术一兩川椒去目及閉口者微炒出汗右為末煉蜜和𢷬三五百杵丸如梧桐子大每服食前以温酒下二十丸藿香散出本事方治風頭旋目暈痰逆惡心不思飲食藿香葉零陵香莎草根炒去毛各等分右為散毎服二錢臘茶清調下日三松花浸酒方出聖惠方治風頭旋腦皮腫痺右用松花并臺春三月取五六寸如鼠尾者不計多少蒸細切一升用生絹囊貯之以酒三升浸五日每服空腹煖飲五合晩食前再服乾薑方治頭旋眼眩右以乾薑為末熱酒調一錢服立效蟬殻方出聖惠方治風頭旋腦右用蟬殻二兩微炒為末非時温酒下一錢治頭風頭旋聖惠方右用九月九日菊花暴乾取家糯米一斗蒸熟用五兩菊花末搗拌如常醖法多用細麪麴為良侯酒熟即壓之去滓每一小盞服止逆湯𫝊信適用方治頭目旋暈吐逆葢胃冷生痰致有此疾累用效川乾薑二兩炮甘草一兩炙赤剉右㕮咀為麤末每服四五錢用水二盞煎至八分食前熱服化風丸楊氏家藏方治風氣上攻頭目旋暈項背拘急鼻塞不通神思不爽藁本去土川芎荆芥穗細辛去葉土甘草炙草烏炮去皮尖香白芷七味各一兩右件為細末湯浸蒸餅為丸每一兩作一十丸硃砂為衣隂乾每服一丸細嚼茶清送下食後芎辛煎楊氏家藏方治風熱上攻肌肉瞤動頭暈旋運鼻塞聲重桔梗二兩微炒川芎一兩甘草七錢微炙防風半兩去蘆細辛去葉土一