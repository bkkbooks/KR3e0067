body:
  text: 普濟方卷三百二十九明周王朱橚撰婦人諸疾門崩中漏下附論夫婦人崩中漏下者由勞傷血氣衝任之脈虛損故也衝脈為經脈之海皆起於胞內而手太陽小腸之經也手少隂心之經上為乳汁下為月水婦人經脈調適則月水依時若勞傷衝任氣虛不能制其經脈血非時而下淋瀝而不斷謂之漏下也蓋肝為血之府庫恚怒勞役一或傷之肝不能藏血於宫宫不能傳血於海所以崩中漏下漏下者淋瀝不斷是也崩中者忽然暴下乃漏證之甚者也其狀或如豚肝或成五色與血俱下又或如泔涕如爛瓜如豆汁如藍靛是也至有純黑如墨水與血相雜亦有純下瘀血者此皆衝任虛損恚怒勞役之過致傷於肝而然也久久不止頭暈眼花加之怔忡驚惕恐怖面肌瘦虛煩口乾臍腹冷痛吐逆不食四肢虛困甚則為脹為腫診其脈寸口脈弦則為減大則為芤減則為寒芤則為虛寒虛相摶其脈為革主半産漏下又尺寸脈虛者漏血漏血脈浮者不可治治之之法調暢衝任鎮住血海溫和歸於有用內養百脈外為月事自無崩中漏下之患矣五臟皆稟血氣血虛淋瀝漏下致五臟傷損五臟之色隨血同下若五臟皆虛損者則其色亦各隨血下診其尺􅍺急而弦大風邪入少隂之經女子漏下赤白不止胍小虛滑者生􅍺小緊實者都近死也至於又漏血下赤白或下血數升脈急疾者死遲者生也崩中五色隨崩俱下其狀白崩形如涕赤崩如紅藍汁黃崩形如爛瓜青崩形如藍靛黑崩形如豆汁與敗血相雜而下也婦人白崩者是勞傷胞絡而氣極所為肺主氣氣極則肺虛冷也肺臟之色白虛冷勞極其色與胞絡之間穢液相挾崩傷而下為白崩也夫婦人崩中者由臟腑傷損衝脈任脈血氣俱虛故也衝任之脈為經脈之海血氣之行外循經絡內榮臟腑若無傷損則隂陽和平而氣血調適經下依時若勞動過多致臟腑俱傷而衝任之氣虛不能約制其經血故忽然暴下謂之崩中暴下診其寸口脈微遲尺脈微絃寸口脈微寒在上焦但吐爾今尺脈微絃如此即小復痛引腰脊痛者必下血也夫漏下者血寒之極所致若謂以血熱致崩而用涼藥誤矣每用嵗丹作效始進三五粒而未愈再進十粒尤未愈服至四五十粒差愈服至百粒方乃作效此嵗丹之力也然嵗丹之性全恃火力如水寒成氷血寒成塊血得溫則流散四肢氷得日則烘消成水血凝得丹而流暢火之力也大抵醫者意也以意醫之所以作效儻或凝而未散即用先進陽起石丸服之二日未效却進歲丹庶無可疑者也又有室女二七天癸當至而未至近十八九左右方行者有卒然暴下漸至淋瀝不止有若崩漏者却又不宜服前藥也惟當以四物湯加香附子煎血色鮮而不止者挾熱也宜去熟地黃加生地黃煎臨病之際又在乎審處之下部出血不止謂之崩中穢液常流謂之帶下崩中失血多因衝任虛損榮道受傷得之冷帶雜下多因下焦不固內挾風冷得之崩中者投以當歸川芎香附諸黑藥之屬血暫止而終不止帶下者投以熟艾餘糧牡蠣海螵蛸之類帶暫歇而終不歇者經曰衛氣者所以溫肌肉充皮膚肥腠理司開闔衛氣若虛則肌肉不溫皮膚不充腠理不肥而開闔失其司耳况胃為血海水液會焉胃者中央之土又所以主肌肉而約血水也衛氣與胃氣俱虛則肌弱而膚空血之與水不能約制是涓涓漏巵休作無時而不暫停矣然則調之止之不可不加意於固衛厚脾之劑此桂枝附子湯以之固衛而人參白术茯苓草果木香以之厚脾二者俱不可闕也病人耆好炙􅘤亦有協熱而下血者此則黃連丸輩所不可無肺絡脈微亦主帶下此則草果白术雖可燥水仍須以阿膠佐之若夫帶之為患出於風冷停宿官桂乾薑細辛白芷先與散其寒邪然後為之封固所貴擇之精而用之審云一應婦人大小産及諸下血新差未得經久遽觸房事皆作崩中漏下二帶之疾又有月事久閉才得一通下部為風邪所摶致使敗瘀出而未盡亦作崩中漏下黃水或粉紅滲漏無時其崩中下血不止者震靈丹三粒陳米并香附煎湯食前送下又方人參白术炮乾薑炒甘草製半夏縮砂香附木香等分薑棗煎服又方圓半夏銼碎以薑汁和麵捏餅包裹炙令香熟去麵取半夏末之糯米稀糊丸麻子大每服五十丸芎歸湯沉香降氣湯各半食空送下此皆止血之勝藥儒門事親書論云凡婦人血崩或乍及四十已上因悲哀太甚致然內經曰悲哀太甚則心系急心系急則肺火降而上焦不通熱氣在中故經云血崩下心系者血山崩也如久而不愈則面黃肌熱瘦弱慎不可以熱治之蓋血得熱而散故禁之宜以當歸等藥治之凡婦人年五十以上經血暴下婦人經血終於七七之數數外暴下者此乃內經所謂火主暴崩亦因暴喜暴怒憂愁驚恐致然慎勿作冷痛治之如下峻熱藥治之必死止宜黃連解毒湯以清上更用連殼棕毛以滲其下然後用四物湯玄胡索散涼血和經之藥仁齋直方論云素問隂虛陽隂摶謂之崩此即血得熱則宣流之意也四物可以助生津枳殼散可以抑陽其間更以茯苓二陳湯和之使隂陽兩得其平血自循於經絡矣若夫衝任不固下元久虛以致血無關鎖則用參湯加當歸木香咽下震靈丹為妙治漏血不止新傷胎及産後餘血不消作堅使胞門不閉淋瀝惡血經踰日月不止者未可以諸斷血湯宜且與牡丹丸散等待血涼堅凝後所患淋瀝便自止亦漸消少也此後有餘湯斟酌煎服此乃可作諸主治耳婦人産後去血多傷胎去血多崩中去血多金瘡去血多拔牙齒去血多未止心中懸虛心悶眩日月角重目暗耳聾舉頭便沉悶欲倒宜且煮大當歸芎藭各三兩以水四升煮取二升去滓分二服即定展轉續次合諸湯治之方地榆散出聖惠方治婦人崩中漏下不止地榆一兩銼伏龍肝一兩半白茯苓一兩柏葉一兩微炒蒲黃一兩白芍藥一兩甘草半兩炙微赤銼鹿角膠一兩搗碎炒令黃燥當歸三分銼微炒桂心半兩芎藭三分乾薑半兩炮裂銼漏蘆一兩蟹瓜二兩微右件藥搗粗羅為散每服三錢以水一中盞入竹茹一分煎至六分去滓每於食前溫服柏葉散出大金良方治婦人崩中漏下不問年月逺近漸加黃瘦四肢無力腹內疼痛不思飲食柏葉續斷川芎當歸生乾地黃龜甲一作鱉甲各一兩半禹餘糧二兩半阿膠赤石脂牡蠣地榆艾葉鹿茸各一兩右為末每服二錢食前粥飲調下一方有丹參如鹿茸數煉蜜丸如桐子大每服三四十丸空心溫酒吞下或沸湯下禹餘糧散出聖惠方治婦人崩中漏下不止漸加羸瘦四肢煩痛禹餘糧二兩燒醋洗十七遍甘草三分炙微赤銼赤石脂二兩龍骨二兩芎藭三分白芍藥三分附子一兩炮裂去皮臍熟乾地黃一兩乾薑半兩炮裂銼當歸一兩微炒桂心半兩右件藥搗細羅為散每於食前以粥飲調下二錢黑金散出醫方大成治婦人血氣虛損經服不調崩中漏下鯉魚皮乾薑炮破故紙黃牛角䚡棕櫚皮亂髮各一兩烏賊魚骨熟乾地黃當歸洗焙木賊各半兩右銼碎拌勻入在瓷瓶內鹽泥固濟候乾以炭火五斤煆令通赤煙盡取於土內埋令冷取出研細每服三錢入射香少許米飲空心下斷下湯出楊氏家藏方治衝任氣虛崩中漏下經脈不調每遇月候將行臍腹腰腳先痛漸減飲食四肢乏力及帶下三十六疾悉能療之人參去頭烏賊魚骨燒灰當歸洗三味各二兩熟乾地黃烍焙一兩艾葉醋炒一兩阿膠蛤粉炒成珠子七錢半乾薑半兩炮右㕮咀每服五錢水一盞半煎至七分去滓溫服食前補宫丸出楊氏家藏方治婦人諸虛不足久不妊娠骨熱形羸崩中帶下並不宜服之鹿角霜白茯苓香白芷白术烏賊魚骨白薇白芍藥牡蠣煆山藥各等分右為末麵糊丸桐子大每服五十丸米飲空心送下鹿茸散出聖惠方治婦人崩中漏下不止虛損羸瘦鹿茸二兩去毛酥炙微黃鱉甲一兩塗醋炙令黃去裙襴烏賊魚骨一兩炙黃白龍骨一兩續斷一兩熟乾地黃一兩肉蓯蓉一兩半酒浸一宿刮去皺皮炙乾白芍藥一兩白石脂一兩右件藥搗細羅為散每於食前以粥飲調下二錢治婦人崩中漏下不止羸乏宜服此方出聖惠方烏賊魚骨一兩燒炭芎藭三分熟乾地黃一兩乾薑半兩炮裂銼當歸二兩銼微炒阿膠三分搗碎炒令黃燥艾葉一兩微炒右件藥搗粗羅為散每服三錢以水一中盞煎至五分去滓入酒一合更煎一兩沸每於食前溫服治崩漏出危氏方右用四物湯一兩人參二錢茱萸一錢每服半兩棗煎服食前五六服寒熱腹痛皆退崩漏未止續服後熟附丸當歸一兩川芎一兩赤石脂半兩煆木賊去節半兩熟附子半兩龍骨半兩煆右為末醋糊丸如梧子大每服六十丸或五十丸米飲吞下曽記一婦人年五十已上經斷七年忽然經行遂成崩漏發熱腹痛兩月不差余診其脈虛細疾數余令服此數劑而愈阿茄陀丸出大全良方胡椒紫檀鬱金茜根小蘖皮乃山石榴皮也右等分為細末滴水丸如桐子大阿膠湯化下二丸方論云若經候過多遂至崩漏色淡如水但得溫則煩甚者至於昏悶其脈數小者為順洪大者為逆此由隂衰為邪熱所搏致傷衝任血得熱則流散譬如天氣暑熱則河水沸溢陽傷於隂令人下血當補其隂宜服阿茄陀丸小薊湯小薊湯出大全良方治陽傷於隂令人下血前所謂天暑地熱經水沸溢當用此藥小薊葉洗切研取汁一盞生地黃汁一盞白术半兩銼右入水一盞煎至一半去滓溫服或用小薊莖葉黑金散治婦人血氣虛損經事不調多因氣滯不散月水過多崩中漏下不止香附子一兩香白芷三錢蓮蓬殼十個糊刷二個敗棕亦可右為細末每服二錢用米飲調下或霹靂酒亦得不拘時候右四味通要炒焦黑留性滋榮丸出危氏方治勞傷過度致傷臟腑衝任氣虛不能約制或暴下崩中或下鮮血或瘀血連日不止淋瀝不斷形羸氣劣倦怠困乏並皆治之赤石脂海螵蛸側柏右為末醋糊丸梧桐子大每服三十丸飯飲送下空心日三服神效一方為細末每服二錢用熟飯飲調下日三服名滋血湯治婦人崩中漏下久不差宜服方出聖惠方白芍藥槲葉烏賊魚骨右件藥搗細羅為散每於食前以粥飲下一錢生地黃湯出聖惠方治崩中漏下日去數升生地黃細辛等分右㕮咀以水一斗煮取六升服七合久服佳治崩漏下血用益智去皮炒過為細末食前米飲調下二錢立止一方用鹽米飲調下一方用益智子末酒調皆愈加減四物湯出濟生方治室女二七天癸至亦有當時未至而後至者有卒然暴下淋瀝不止有若崩漏者失血過多變生諸證悉宜服之川當歸川芎熟地黃白芍藥香附子等分右㕮咀每服四錢水一盞半生薑五片煎至七分去滓食前溫服如血色鮮而不止者去熟地黃加生地黃煎延齡護寶丹出保慶集治婦人血臟虛損經候過多每行時暴下不可禁止因成崩中連日不斷致五臟空虛失色黃瘦崩竭暫止日少復發不耐動搖小勞輒劇此藥但澄心服必有大效禹餘糧石二兩燒醋洗十七遍人參桂赤石脂紫石瑛研杜仲去粗皮銼炒熟乾地黃續斷桑寄生吳白芷芎藭當歸銼炒逺志去心金叉石斛去根銼炒白茯苓去皮阿膠炒牡蠣燒五味子艾葉炒已上各一兩右同為細末煉白沙密和丸如桐子大每服四五十丸溫粥飲下空心食前增損禹餘糧丸出千金方治女人勞損因成崩中狀如月經來去多不可禁止積日不斷五臟空虛失色黃瘦崩竭暫止少日復發不耐動搖小勞輒極治法且宜與湯未宜與此丸也發時服湯減退即與此丸若是疾久可長與此方禹餘糧龍骨人參桂心紫石瑛烏頭寄生杜仲五味子逺志各二兩澤㵼當歸石斛蓯蓉乾薑各二兩蜀椒牡蠣甘草各一兩右為末密丸桐子大空心酒下十丸漸加至二十丸日三服一方無乾薑涼血地黃湯出臍生拔萃方治婦人血崩不止腎水隂虛不能鎮守包絡相火故血走而崩也生地黃半錢當歸尾半錢黃連黃蘗知母藁本川芎升麻各二分柴胡川羌活防風各三分黃芩炙甘草二分細辛荆芥穗蔓荆子各一分紅花少許右㕮咀都作一服水三盞煎至一盞去滓稍熱服空心食前牛角䚡散治婦人崩中下血不止牛角䚡二兩燒灰白礬二兩燒汁盡橡實一兩木賊一兩芎藭一兩右件藥搗細羅為散不計時候以熱酒下二錢治室女血崩不以冷熱皆可服荆芥蓮房殼等分各燒作灰右為細末每服二錢空心米飲調下治崩中泄血無度經年淋瀝并黃瘦骨立白芷牡蠣龍骨芍藥赤石脂阿膠當歸川芎鱉甲烏賊骨人參各六分艾葉四分乾地黃八分訶子四分乾薑黃耆各五分右為細末空心酒調服方寸七大牛角中仁散治積冷崩中去血不止腰皆痛四肢沉重虛極牛角一枚燒續斷乾地黃桑耳白术赤石脂礬石乾薑附子龍骨當歸各三兩人參一兩蒲黃防風禹餘糧各二兩右治篩以溫酒未食服方寸匕日三不知稍加治崩中下血出血一日即斷或月經來過多及過期不來者服之亦佳方吳茱莄當歸各三兩芎藭人參芍藥牡丹桂心阿膠生薑甘草各二分半夏八兩麥門冬一升右㕮咀以水一斗煮取三升分為三服治崩中泄血無度經年淋瀝并黃瘦骨立芍藥白芍黃耆龜甲川芎烏賊骨各八分生乾地黃牡蠣五色龍骨乾薑各十分桂心六分附子五個炮右為細末空心酒調方寸匕婦人崩中無問近久悉皆治之伏龍肝一斤小薊根桑寄生續斷地榆艾葉各三分阿膠當歸赤石脂厚朴各二兩生薑五兩右切以水一斗煮取三升絞去滓分作三服忌如常法白芍藥散治婦人崩中下血不斷淋瀝連年不絶黃瘦白芍藥一兩牡蠣粉一兩熟乾地黃一兩白术三分麒麟竭三分柏子仁三分烏賊魚骨一兩炙黃附子一兩炮裂去皮臍桂心一兩黃耆一兩銼龍骨一兩右件藥搗細羅為散每於食前以溫酒調下二錢治婦人忽暴崩中下血不斷或如雞鴨肝者方小薊根六兩當歸阿膠續斷青竹茹芎藭生地黃八兩地榆釡月下土各四兩絹裹馬通一升赤帶用赤馬白帶用白馬右㕮咀以水八升和馬通汁煮取三升分三服不止頻服三四劑未全止續服後續斷丸續斷甘草地榆鹿茸小薊根丹參各三十銖乾地黃三兩半芎藭赤石脂阿膠當歸各一兩半柏子仁一兩一作柏葉龜甲秦牛角䚡各三兩銼炒令黑右為末蜜丸桐子大空心以酒服十丸日二後加至三十丸十灰丸治崩中下血不止錦灰黃絹灰馬尾灰艾葉灰藕節灰蓮蓬灰油髮灰赤松皮灰棕櫚灰蒲黃灰右等分為細末用醋煮糯米糊為丸如桐子大每服七十丸加至一百丸空心米飲送下十灰散治下血不止錦片木賊棕櫚柏葉艾葉乾漆鯽鱗鯉鱗血餘當歸右逐味火化存性各等分為末和合入射香少許溫酒調服柏子仁湯出齊生方治婦女憂思過度勞傷心經心主於血心虛不能維持諸經之血亦能致崩中下血之患當歸去蘆酒浸芎藭茯神去木小草阿膠銼蛤粉炒成珠鹿茸燎去毛酒蒸焙柏子仁炒各一兩香附子炒去毛二兩甘草炙半兩川續斷酒浸一兩半右㕮咀每服四錢水一盞半薑五片煎至七分去滓空心食前溫服金華散出大全良方治婦人血室有熱崩下不止服溫劑不效者延胡索瞿麥穗當歸乾葛牡丹皮各一兩石膏二兩桂心别為末三分蒲黃半兩葳靈仙三分一方加薑二片煎右為細末每服二錢煎至六分空心溫服日二服一方用蔓荆子生薑各半兩擂爛炒小酒煎服凡血崩之疾亦有隂陽冷熱之不同不可一概用藥僕常療一婦人崩漏暴下諸醫投薑桂附子等藥服之愈甚召余診之六脈緊數遂用此藥兼局方就雞蘇丸數服即安本事單用黃芩者亦此意也鹿茸丸出醫方大成治經候過多其色瘀黑甚者崩下吸吸少氣臍腹冷極則汗出如雨尺脈微小由衝任虛衰為風冷客乘胞中氣不能固可灸關元柏壯在臍下正中三寸鹿茸燎去毛酥炙赤石脂禹餘糧製各一兩艾葉一方無艾葉柏葉附子炮各半兩熟地黃洗焙當歸續斷各二兩右為細末酒糊為丸如桐子大空心溫酒下三十丸一法用蜜丸亦可伏龍肝散出大全良方治忽崩中血不止結作血片如雞肝色碎爛芎藭十二分阿膠青竹茹各八分續斷地榆小薊根各十分當歸六分生地黃伏龍肝各十二分右用水九升煮取三升去滓分作三服先服此藥後服補藥丸子阿膠鱉甲川芎當歸赤石脂丹參各六分甘草鹿茸各五分龍骨十一分龜甲十分續斷地榆四分烏賊骨八分右為末煉蜜丸如桐子大空心酒下二十丸日二服常煮小薊汁服之尤佳一方阿膠丸用鱉甲芎藭續斷鹿茸各五分龍骨一兩半地膽四分烏魚骨八錢丹參六錢龜甲十分右為末醋麵糊為丸如桐子大每服三十丸艾湯下日進三四服伏龍肝散出聖惠方治婦人崩中下血不止繞臍搊撮疼痛或時心煩伏龍肝一兩細研麒麟竭半兩地榆一兩銼棕櫚二兩燒灰龍骨一兩當歸一兩銼微炒白芍藥二兩熟乾地黃一兩禹餘糧二兩燒醋洗十七遍右件藥搗細羅為散不計時候以溫酒調下二錢伏龍肝散治婦人血崩不止或作片者芎藭一錢地榆薊根伏龍肝各七錢青竹茹八錢右為細末每服三錢水二盞半煎至一盞溫服不拘時再服前阿膠丸艾煎丸出拔萃方治崩傷淋瀝小腸滿痛常服補榮衛固經脈方見本門月水不調類琥珀散出大全良方治崩暴下血赤芍藥香附子大者荷葉枯男子髮皂莢水洗當歸去蘆頭鬚洗淨焙乾棕櫚炒焦存性烏紗帽是漆沙頭巾取陽氣衝上故也右等分除棕外其餘並切粗片新瓦上煆成黑炭存性三分為細末每服三五錢空心童子小便調下如人行十里再進一服即止如産後血去多加米醋京墨麝少許大率治血崩先用此譬如治痢有積不先去之徒服斷下藥一時暫止久則毒氣愈深甚至危殆血崩乃經脈錯亂不循故道淖溢妄行一二日不止使有積瘀之血凝成窠臼更以藥澀任轉見增劇宜先以五積散加醋煎一二服次服靈脂散及順氣藥去故生新自能平治五靈脂散出大全良方治婦人血山崩及治犬夫脾積氣右用好五靈脂炒令煙盡為末每服一錢溫酒調下此藥兼能解藥毒及蛇蠍蜈蚣咬塗傷處立愈每一服三錢水酒童子便各半盞煎至八分通服各抽刁散治産後有病服三服散惡血或心腹脅肋脹痛不可忍者或只用童子小便尤佳或中風即入草烏頭半錢重同煎亦治腸風下血如不能飲酒者煎烏梅柏葉湯調下怒煩口乾渴者加蒲黃炒減半用一方燒存性霹靂酒調下然此藥氣惡難喫燒之存性極妙一方治婦人經血不止加當歸兩片酒一鍾與藥末同煎服昔親戚黃守正卿為和劑局日內子凌夫人忽苦此疾危殆百藥不動偶得此方旋即安愈奇效四物湯治有熱久患血崩當歸頭尾用熟乾地黃洗焙白芍藥大川芎半兩大艾葉阿膠蛤粉炒如珠子黃芩出爛者各半兩右銼散每服四錢水一盞半薑五片煎空心溫服有一醫療血崩㕮咀藥鋪市藥其方則四物湯加阿膠大艾也就鋪分作八服又向鋪索黃芩半兩加在藥內鋪家問醫者曰此藥何為加黃芩醫曰非汝所知吾與此藥正以黃芩為主夫心主血血得熱則行得寒則止病者一服而愈服盡八服至今無恙兩見數婦血崩症亦類此醫乃以黃連解毒湯加大艾治之不效是又當量其虛實用之阿膠散治婦人崩中下血經七八日不定或作血片或如豆汁腹內㽱刺疼痛阿膠一兩搗碎炒令黃燥訶梨勒皮一兩乾薑三分炮裂銼密陀僧半兩細研附子三分炮裂去皮臍棕欄二兩燒灰補骨脂三分微炒右件藥搗細羅為散不計時候以熱酒調下二錢千金散治婦人血崩不止熟地黃一兩生地黃乾刺薊蒲黃各半兩芍藥當歸川芎各一兩右為粗末每服四錢酒一盞半煎至七分去滓溫服食前日進三服密陀僧散治婦人血山崩下過多不止黃瘦臍腹痛痞阿膠碎炒一兩破故紙炒七錢乾薑炮七錢密陀僧一兩棕皮燒灰二兩訶子皮一兩二錢右為末每服三錢五錢熱酒調下濃煎艾湯亦得當歸湯治崩中血虛羸方當歸芎藭黃芩芍藥甘草各二兩生竹茹二升右㕮咀以水一斗煮竹茹取六升去滓內諸藥煎取三升半分三服忌勞動嗔怒禁百日房事丹參酒治崩中去血及産後餘疾方丹參艾葉地黃忍冬地榆各五斤右銼先洗臼以水浸三宿出滓煮汁黍米一斛炊飲釀酒酒熟酢之初服四合後稍添之狼牙散治婦人崩中下血不止心胸虛悶狼牙草三兩訶梨勒皮三分白芍藥三分白术三分黃耆三分銼右件藥搗粗羅為散每服三錢以水一中盞煎至六分去滓不計時候溫服治崩中去血積時不止起死方肥羊肉三斤乾薑當歸各三兩生地黃二升右㕮咀以水二斗煮羊肉取一斗三升下地黃汁及諸藥煮取三升分四服即斷尤宜羸瘦人服之當歸散治婦人血崩不止者四十嵗已上亦可服當歸一兩龍骨一兩燒赤香附子一兩炒棕毛灰半兩右為末每服四錢空心酒飲湯下忌油膩雞豬魚兔等物半夏丸治吐血下血崩中帶下喘急痰嘔中滿虛腫亦消宿瘀百病通用用圓白半夏刮淨槌扁以生薑汁調和飛白麵作軟餅包掩半夏慢火炙令色黃去麵取半夏為末米糊丸如菉豆大用三四十丸溫熱水下治女子血崩及産後血不止月經來多取細椿木棍一大握東引者洗之以水一大升煮分再服便斷亦止帶下白崩以芎歸湯加南木香下震靈丹治婦人血海敗以佛尼降真二兩銼碎每服水一大碗煎至半碗空心連進二服四仙丸治崩中夫崩中者由勞傷過度使臟氣俱傷衝任俱虛不能攝飬致思慮過度而為之崩産後血為經血經血既傷臟氣既損不能將養不慎勞役早則生虛體不任逺使經血暴下謂之崩凡崩中帶下而别無所若宜與鶴頂丸主之苦小腹急滿痛者難治內有瘀血也故切勿止之止則復滿愈加不可治宜先與四仙丸後與鶴頂丸既崩而淋瀝不斷血弦於內也以四仙丸去其血然後鶴頂丸治之桃仁去皮尖當歸大黃醋浸炙水蛭石灰炒各一兩右為末醋糊為丸梧子大每服三十丸空心醋湯下二氣丸治漏下者因氣損耗故衝任之脈因此虛矣以致經不得依時淋瀝不絶為之崩及産後諸疾俱由是也鶴頂丸俱宜服之妊娠漏下血者名曰胎漏月經忽行蓋血養胎非時而行皆氣衰而不能納在經也如便來有如經或因傷動而漏下乃服二氣丸鶴頂丸止之不止則胞乾子損矣艾葉一兩醋浸一宿煮乾為度阿膠半兩銼炒令沸右為細末醋糊為丸梧桐子大每服五十丸空心粟米湯下鶴頂丸治帶下之證有三未嫁之女月經初來尚未曽止或浴之以冷或熱而扇或當風此室女病帶下之由有家之婦隂陽過多即傷胞絡風邪乘虛而入胞經觸冷遂使穢液與血水相連此婦人帶下之由産後帶下由亡血失氣傷動胞絡門開而外風襲肌體虛冷風入冷風兼熱氣相連故成液而下冷則多白而熱則多赤冷熱相交赤白俱下鶴頂丸治之艾葉一兩醋半盞煮乾為末牡蠣一兩三錢鹽泥煆赤石脂一兩半醋淬七次吳茱莄湯淋泡數次乾薑一兩半炮裂龍骨一兩鹽泥煆當歸七錢半酒浸附子半兩炮去皮右為細末醋糊丸梧桐子大以赤石脂為衣每取五十丸用艾葉鹽湯烏梅煎服空心下治婦人血崩屢效方出大全良方當歸白芍藥乾薑棕櫚各等分右各煆存性碾為細末稱過醋湯調以有節朱筯在四十九轉食前服之仍與炒黑香附子丸當歸散治血崩當歸白芍藥香附炒棕毛灰五錢右各等分為末米飲湯調下食前一方無棕毛灰當歸湯治婦人下血不止腹痛當歸焙半兩柏葉一兩薤白六莖切禹餘糧三分煆醋淬三遍研末右先將三味㕮咀如麻豆大每