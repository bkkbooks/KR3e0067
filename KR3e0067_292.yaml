治氣毒瘰癧結腫未潰者令內消方出聖惠方槲白皮銼三斤丁香一兩末麝香細研半兩右以水五斗於大釡中先煮爛槲皮至一斗去滓更以慢火熬成膏後入丁香等二味攪令勻收於瓷器內食前以溫酒調下半匙天靈散出聖惠方治氣毒瘰癧遍項及流注脅腋下有頭疼痛天靈蓋一兩帶血色者以茅香水洗五七次塗酥炙令黃虎脛骨一兩塗酥炙令黃右為散以空心蔥酒調下三錢晚食前再服又方出聖惠方蝸牛子二十枚生去殼炒微黃薄荷一兩乾者丁香半兩右為末煉蜜丸如桐子大食前荆芥湯下三十丸治瘰癧腫硬如石疼痛五靈脂二兩熬膏皂莢十枚不蛀者去黑皮塗酥炙去子右搗皂角末以五靈脂膏和丸如桐子大早晨以薄荷湯下九夜臨卧以溫酒下十丸又方出聖惠方皂角針一兩燒灰槲白皮末一兩右同研令細食前以溫酒調下二錢治氣癧用赤腳馬蘭搗細塗患處治氣瘰癧出聖惠方右用皂莢一斤不蚛者去皮子塗酥炙令黃色搗羅為末以精羊肉半斤細切研如糊下藥末相和圓如梧桐子大每於食前以皂莢刺搗碎煎湯下十五丸服此藥一月即有大驗熱毒瘰癧附論夫熱毒瘰癧者由人臟腑俱實氣血充盛內有積熱不得宣通熱毒之氣流於項腋之間搏於肌肉而生故謂之熱毒瘰癧也方玄參散出聖惠方治熱毒瘰癧癰腫疼痛宜服此散熱毒除根玄參連翹知母當歸雄黃細研牽牛微炒黑豆炒熟黃芩犀角赤芍藥空青荏子礬石泥褁燒半白細研各三分地膽一分以糯米拌炒黃為度去翅足斑貓一分以糯米拌炒以米黃為度去翅足右為散入研了藥令勻空心以溫酒下一服一錢三五服後小便出爛肉為度連翹散出聖惠方治肝膈熱毒氣盛攻項腋生瘰癧腫痛心神煩悶背胛急疼四肢不利連翹漏蘆知母桂心黃芩玄參甘草炙微赤各三分木通銼柴胡去苗大黃微炒朴硝各一兩右為散每服四錢以水一盞煎至六分去滓每服於食前溫服以利為度紫參丸出聖惠方治熱毒瘰癧腫痛未成者內消已破者行膿紫參苦參丹參連翹各二兩膩粉麝香别研各三錢滑石二兩半右為末用玄參一斤搗碎以酒三碗浸三日去滓皂角子三百枚煨熟搗末用玄參酒熬皂子末成膏和前藥如桐子大每服一丸黃耆湯下日加一丸至患人歲數止日減一丸瘡自乾有結內消治熱毒結成瘰癧日夜疼痛出聖惠方甘草炙微赤一兩犀角屑一兩半黑豆炒熟一兩麝香半兩細研斑貓半兩以糯米拌炒米黃為度去翅足右為末煉蜜和丸如桐子大空心以米飲下七丸服後覺瘡痛即住藥其病當從小便出却於盆子內看之若小便澀即服木通散木通散出聖惠官效方木通一分銼葵子一分滑石一兩右為散以䓤白湯調下一錢日三四又方出聖惠方斑貓一分以糯米拌炒米黃為度去頭足翅預知子一兩犀角屑一分水蛭一分微炒黃色黑豆一百粒炒熟虻一分炒令微黃去頭足翅右為末以酒煮麵糊和丸如黍米大大人每日空心以酒下五丸小兒二丸雄鼠糞丸出聖惠方治熱毒瘰癧結硬不消雄鼠糞二十一粒研菉豆粉一錢膩粉一錢斑貓二十一枚去頭翅足以糯米拌炒米黃為度右相和研令勻以冷水和丸如小豆大空心以酒下二十丸兩日後再服即病根並出地膽散出聖惠方治熱毒瘰癧內消地膽一分去頭足翅以糯米拌炒令黃為度滑石半錢朴硝一分熬令汁盡右為散空心以米飲調下半錢服後覺小便中下惡物即減地膽少許十日見效又方出聖惠方雞子一枚斑貓二十一枚去頭足翅以糯米拌炒黃為度膩粉一錢右雞子去黃留白入二味藥在內以紙蓋蒸兩炊久取出丸如小豆大每日五更初以溫酒下五丸當㵼出病根如服未效即日更服治熱毒瘰癧瘡腫疼痛冝服此方出聖惠方顆鹽一分微炒黃丹半兩微炒白礬一分燒令汁盡黃蘗一分銼白斂一分右為散每先用溫鹽漿水洗瘡令盡淨拭乾以雞子清調塗於帛上貼之山豆根方出仁齋直指方治咽喉上膈熱毒患瘰癧者常含汁咽下仍服之山豆根紫蘇葉右用細銼煎湯臨臥服之解毒方治瘰癧四畔紅腫多汁為熱證小黑豆二合紫蘇一兩薑七片右用銼細煎湯食後服治熱毒瘰癧內消方斑貓十枚去頭頸翅足糯米同炒令黃色大青一兩銼微炒右為散食前溫酒調一錢又方皂莢二百粒不蚛湯浸經宿用炒令黃搗末杏仁一百粒湯洗去皮尖雙仁微炒黃為度末搗膏糊為丸用蜜和右同研令勻煉蜜和丸如桐子大食前以粥飲下三十丸斑貓散治熱毒瘰癧斑貓三枚拌糯米炒令黃色去頭翅足滑石一分右為散分為兩股空心糯米飲調下如人行十里每服如覺小腸澀即煎黑豆湯服須臾小腸內取下爛肉片子即瘥未愈隔日再服大薊根散治熱結瘰癧用薊根一斤搗為散每服用藥三錢匕食後酒湯調下日再服瘰癧有膿附論夫瘰癧者結風於內積熱在肝榮衛不和胸隔壅滯毒熱相摶流注於筋脈結聚而成也初得即覺項邉磊磊狀若連珠面色萎黃皮膚壯熱久而不療毒熱上蒸則成膿也按內經謂榮氣不從逆於肉理乃生癰腫蓋榮氣逆則血鬱鬱則熱氣聚而為膿瘰癧之疾亦猶是也熱氣內結搏聚在肝肝主筋肝藏血久不差故熱聚於血血腐而為膿在於頸腋腫結相連有如梅李實者是也方神應膏治瘰癧已破瘡口浸引膿水不絶及治一切惡瘡貼之去惡肉好肉自生白芨白斂當歸桂去粗皮各一分附子一枚半兩者去皮臍乳香半兩東南槐枝栁枝各二條各長七寸銼鉛丹三兩巴豆三分去皮研清油六兩右各銼細於石器內先下油與白芨等煎令焦黃以白綿濾去滓入鉛丹巴豆慢水熬藥成膏先以水一碗投藥入水其藥直入水中如珠為度後刮下入瓷器內收貯每用少許量核大小塗貼黃耆丸治瘰癧結腫生膿黃耆銼木香漏蘆玄參枳殼醋炒微黃去白犀角屑桔梗去蘆頭牛蒡子微炒大黃微炒各一兩右為末煉蜜和丸如桐子大空心及晚食前以米飲下二十丸鱉甲散治瘰癧出膿血不止冝服此消死肉散毒氣使癧子轉動寬軟鱉甲一兩用醋塗炙令微黃去裙襴桑螵蛸五枚微炒狼毒三兩醋拌炒黃蟅蟲五枚微炒磁石三兩細研水飛過雄黃一兩細研麝香一錢細研右為散入研了藥再研勻每日空心日午近夜各一服米飲調下一錢枳殼丸治瘰癧結腫穿穴生膿枳殼麩炒微黃去白玄參漏蘆大黃微炒營實牛蒡子微炒各一兩黃耆露蜂房半兩微炒右為末煉蜜和丸如桐子大每服不計時候米飲下三十丸連翹丸治瘰癧結核於頸腋下內生癰潰方見本門寒熱類白斂丸治瘰癧結腫有頭膿水不止白斂黃耆銼木香枳殼微炒玄參烏蛇酒浸去皮骨炙色黃各一兩斑貓十四枚去頭足翅以糯米拌炒令米黃為度右為末煉蜜和丸如桐子大每服空心逐日及晚食前米飲下十丸蜂房膏治瘰癧生頭膿水不絶疼痛露蜂房一兩蛇蛻皮半兩玄參半兩黃耆二分杏仁一兩湯浸去皮尖雙仁研亂髮如雞子大黃丹五兩右細銼用麻油一斤先煎髮及杏仁候髮消盡即以綿濾去滓下黃丹以栁木萞不住手攪候熬成膏即傾於瓷合中盛旋取塗於帛上貼之連翹散治瘰癧熱腫內敗生膿連翹犀角屑黃耆銼各一兩木通銼半兩漏蘆一分杏仁一兩湯浸去皮尖雙仁麩炒微黃色玄參半兩右為散每服三錢以水一盞煎至六分去滓食前溫服紫金膏出聖濟總録治瘰癧已破膿水不止栁枝三十條各長四寸槐枝同上麻黃六兩青者是乳香别研沒藥研柏脂各一分右為末先熬油令沸入槐栁枝煎令黑色去枝不用次入麻黃等熬成膏每用油紙攤塗之地膽丸出聖惠方治瘰癧成瘡有膿貼藥後服此地膽去頭足翅糯米拌炒米黃為度斑貓去頭足翅糯米拌炒米黃為度芫青一枚糯米炒令黃去頭足牛黃别研一兩生豆黃三十枚右為末豆黃再研勻煉蜜為丸如桐子大每服一丸空心茶下後更服尋常補益丸散去毒散出聖濟總録治瘰癧毒氣鬱結成膿發泄不止巴豆一兩去散薄荷末二兩皂莢末二兩麝香研二錢鯽魚一箇去腸肝右研勻四味入在魚肚內泥固濟以炭火五七斤燒存性候冷取出細研每服一錢匕用荆芥臘茶調下日三服蜂房散出聖濟總録治瘰癧貼瘡露蜂房蜜塗丈火炙令青色半兩羊屎四十九枚燒白色皂角一挺燒煙盡右同研和勻洗瘡口乾用此藥貼之後可服血竭散血竭散出聖濟總録治瘰癧已破膿水不止者血竭炒研一分大棗二十枚青州者燒為灰生乾地黃焙半兩别拌為末右同研如麵别取枳殼末三錢用水一盞煎至四分去滓調下散子半錢五更時服良久覺腹痛但只以枳殼飲之即自止有惡物從小便出為效豆牛子散出聖惠方治瘰癧頭多經久不瘥膿血不止疼痛豆牛子麝香半錢細研右都細研如粉以津唾調貼之薄荷丸出聖惠方治瘰癧結成顆塊疼腫穿潰膿水不絶不計逺近皆瘥薄荷一束如碗大隂乾皂莢十挺長一尺二寸不蚛者去黑皮塗酥炙令黃右搗碎以酒一斗浸經三宿取出曝乾更浸三宿如此取酒盡為度乾為散以軟飯和丸如桐子大每服食前黃耆湯下一十丸小兒減丸服之鼠灰散出聖惠方治瘰癧膿水不絶宜貼蛇腹中鼠一枚燒灰蝦蟇一枚燒灰右為末用生油調攤於帛上貼之日一度換之罐灰散出聖濟總録治瘰癧瘡口膿血不止用糞堆裏破瓦罐兒洗淨於竈掘坎安在坑中燒二日令捻得碎細研乾摻瘡上紫金散出聖濟總録治瘰癧方破用檳榔不拘多少端正者為細末先以溫漿水洗瘡以軟帛拭乾油調塗日三上用時看多少治瘰癧穿破作膿冝服此方出聖惠方用五月六月麥麴堆上生出菌子七枚熟搗先以米泔淨洗瘡拭乾貼日二度換之治有瘡口膿血出者用狸肉作羹如法食之水紅花飲出聖濟録方治瘰癧腫核結梗不消及膿汁旁穿不瘥用水紅花不拘多少一半炒用一半生用粗搗篩每服二錢水一盞煎七分去滓溫服食後臨卧日三好酒調亦可服單方治瘰破與未破及膿血淋漓其效如神牡蠣不拘多少放於新瓦上以三斤炭煆令灰盡取八兩為細末甘草二兩右諸藥勻拌每服二錢食後以建茗同點日二服忌魚酒酢醬油鹽海味等此病多有人父子相傳至死如服此藥定並不疼痛亦無吐痢又方用牡蠣不拘多少火煆為末以糊丸如桐子大每服二十丸連翹煎湯吞下生肉方臘月豬脂松脂煮過收水上白者黃蠟煮過收淨潔者右各二兩用清麻油五六兩漫火熬成膏先將溫水洗去舊藥拭乾用紙剪一大團子塗藥在上蓋瘡上如癢不得動此生肉故也一日一次換藥切戒毒物輕肌散出鮑氏方治瘰癧上痛化惡膿血寒熱煩燥肢筋無力困倦虛渴飲食少進山茨菰即塗燈花何首烏蝦􅀈蝍甘草各三分生地黃半兩獨行竹一兩去安莖右為散每二錢薄荷七葉煎服活膿散出鮑氏方治瘰癧膿不快肢節疼痛煩熱口乾防風當歸人參川芎各半兩金星草五葉羌活甘草各三錢右為末每一錢酒下日三服若痛甚麥門冬湯下若紫赤色以羽刷上瘰癧毒赤腫刷四圍內托散出鮑氏方治瘰癧未出膿服內托裏止痛催破川烏炮一兩茯芩桔梗白蒺藜炒半兩大腹五箇獨活白芷甘草各半兩右為散以酒下二錢日二服秦皮散出鮑氏方治瘰並治一切惡毒秦皮三兩􅀢草二兩細辛苦參半兩黃連黃芩一兩大黃三分當歸右為粗末每一兩水煎去滓通手日一洗之碧油五枝膏出鮑氏方治瘰癧發毒出膿血瘀肉止痛桃枝栁枝桑枝槐枝皂角枝右前件各一握銼細麻油十兩煎至八分淨入明礬半錢乳血竭半兩黃丹四兩右都用漫火再熬成膏地上出火一宿用時化開攤片帛上大人小兒貼之收膿已破皆用未破不用瘰癧寒熱附論夫瘰癧者由風熱毒氣壅滯於胞膈之間不得宣通而摶於肝肝主筋故令筋搐結而腫多生於頸腋之間浮於筋皮之中有結核纍纍相連大小無定其初發之時熱毒腫結故令寒熱也方曽青散出千金方治寒熱瘰癧及鼠瘻曽青荏子礬石附子各半兩括蔞根露蜂房當歸防風芎藭黃耆黃芩狸骨甘草各半兩細辛乾薑各一兩斑貓芫青各五枚右治末篩以酒服一方匕日再連翹丸出聖惠方治瘰癧結腫不散欲成膿致寒熱不退連翹大黃炒沉香薰陸香牛蒡子炒黃耆枳殼麩炒黃各一兩玄參羌活赤芍藥升麻芎藭黃芩占斯各三分紅鹽一分波斯者皂莢子仁四十九粒炒微黃右為末煉蜜和丸如桐子大每於食後溫水下射干連翹湯出聖惠方治瘰癧寒熱射干連翹玄參赤芍藥木香升麻山梔子前胡去蘆當歸切焙甘草炙銼各一兩大黃銼炙二兩右為粗搗篩每服三錢匕水一盞煎至七分去滓入芒硝少許食後溫服日再服曽青散出聖濟總録治寒熱瘰癧曽青研附子炮裂去皮臍礬石熬令汁枯研細荏子各半錢當歸切焙狸骨酥炙甘草炙皮各二兩細辛去苗葉乾薑露蜂房炙各一兩斑貓同芫青炒芫青各五枚去頭足翅用糯米拌炒去米不用右研為散每服一錢匕空心溫酒下栝蔞子散出聖惠方治瘰癧初腫疼痛寒熱四肢不寧栝蔞子微炒皂子仁微炒牛蒡子微炒連翹牽牛子微炒何首烏大黃炒梔子仁甘草生銼白螺殼漏蘆各一兩右為散每服食前溫酒調下二錢木通丸出聖惠方治癧結腫身體寒熱心胸壅滯敗醬三分大麻仁一兩大黃二兩炒赤芍藥三分犀角屑三分黑豆一兩炒熟去尖昆布一兩洗去醎末木通一兩銼玄參一兩連翹一兩升麻一兩右為末煉蜜和丸如梧子大食後漿水下二十丸沉香散出聖惠方治瘰癧寒熱結腫疼痛心胸壅滯沉香桑寄生射干升麻連翹各三兩大黃一兩半炒防風薰陸香藿香各三分麝香一分研細右為散入麝香研勻每服四錢水一盞煎至六分去滓溫服日三四漏蘆湯出聖濟總録一名知母湯治瘰癧初結發寒熱漏蘆去蘆連翹木通桂去粗皮犀角屑黃芩去黑心茈胡去苗玄參大黃銼炒知母各等分右粗搗篩每服三錢匕水一盞煎至八分去滓下朴硝半錢匕攪勻須空心臨臥服以快利為度土瓜根散出聖濟總録治寒熱瘰癧土瓜根去土連翹龍膽黃芩去鬚苦參括蔞實微炒大黃微炒芍藥木香右等分搗散食後臨卧溫酒調下一錢匕日三服石燕丸出聖惠方治瘰癧結腫寒熱疼痛心腹煩壅石燕一枚細研真珠一錢麩金石三分細研木香井泉石續隨去皮各三分檳榔一兩郁李仁一兩湯浸去皮微炒右為末同研令勻煉蜜和丸如桐子大每於食後以米飲十丸下旱蓮子丸出丸氏方治少長臟氣不平憂思驚恐抑鬱結聚及外傷風寒燥熱飲食結成百毒瘰癧發作寒熱遍於項腋凡久近悉主之旱蓮子連翹子威靈仙何首烏蔓荆子三稜醋浸濕紙包煆赤芍藥各一兩木香二兩大皂角二挺刮去皮酥炙無酥以羊脂炙右為末糊丸梧子大建茶清下三十丸或五十丸日三服小兒量與之食後服玄參散出聖惠方治癧初生結腫發渴寒熱玄參枳殼麵炒微黃去白木通獨活各一兩犀角屑半兩大黃一兩微炒杏仁一兩湯浸去皮尖雙仁麩炒黃右為散每服三錢水一盞煎至六分去滓溫服日三兩木香消毒湯出聖濟總録治瘰癧寒熱煩悶木通大黃生各半兩竹葉乾者一分連翹一兩獨活去蘆半兩梔子仁十分右粗搗篩每服三錢水酒童子小便共一盞煎七分去滓溫服狸頭散千金方有治療寒熱瘰癧連翹土瓜根龍膽苦參黃連栝蔞芍藥常山皮各一兩狸頭骨一枚右搗下篩酒服五分匕日三忌豬肉冷水一方無狸頭連翹丸出聖濟總録治瘰寒熱結核在頸腋之下堅頭連翹玄參木香升麻各一兩大黃蒸半兩昆布去醎味焙二兩枳殼去穰炒一兩半大麻仁微炒别研一兩右搗研為末煉蜜和丸如桐子大每服十五丸食前米飲下加至二十丸一方作散空心米飲調下一錢射干丸出聖濟總録治瘰癧惡寒壯熱久則必成瘰瘻方見木門瘰癧久不差類白斂散出聖惠方治瘰癧生於腋結腫寒熱宜用貼白斂半兩甘草玄參木香赤芍藥大黃各半兩右為散以醋調為膏貼於患上乾即易之治瘰癧初起未破作寒熱出危氏方木鱉子二分去殼磨草烏半兩磨蔥白連根用蚯蚓糞如木鱉子等分右真米醋磨木鱉子草烏二味入蚯蚓糞蔥白調勻傅癧上扯紙條貼之須流通氣孔療寒熱瘰癧散狸骨五兩半分烏頭七分炮黃連七分右搗下篩先食以酒服一錢匕日三忌豬肉冷水玄參湯出聖濟總録治瘰癧寒熱先從頸腋諸處起者玄參三斤細研磁石三斤內燒令赤醋淬七遍細研水飛過右以生絹袋盛酒三斗浸六七日每服一盞空心臨卧溫服治寒熱瘰癧方出聖濟總録用狸頭一枚酥炙搗為散每服一錢空心米飲調下烏犀湯出聖濟總録治初患瘰癧皮肉寒熱赤腫犀角一錢惡實炒各三兩沉香三分麝香研半錢丁香半兩玄參三分大黃銼炒木通銼射干連翹各等分右粗搗篩每服五錢匕水一鍾半煎至八分去津空心溫服瘰癧久不瘥附論夫風熱毒氣藴積臟腑攻於筋膜則結為瘰癧其疾毒氣所感深者則衝發肌肉不得消散或成瘡孔膿水不絶或飲食觸犯或外因風冷所傷日久月深醫藥無效遂令久不瘥也此疾尤忌憂思恚怒氣血勞傷食寒冷方貫衆湯出聖濟總録治頸生瘰癧已針瘡尚不差者貫衆一兩半烏蛇酒浸炙去皮骨一兩連翹生乾地黃焙各二兩鶴虱炒一兩杏仁湯浸去尖雙仁炒桑根白皮銼各二兩白斂一兩葳靈仙去苗土一兩半白芨一兩半大腹皮二兩延胡索一兩半黃耆銼一兩半黃連去蘆一兩甘草炙一兩木占斯二兩右為末搗篩每服五錢匕水一盞半入生薑五片煎至八分去滓食後溫服狼毒散出聖惠方治瘰癧久經年月膿水不時發焮腫狼毒銼醋拌鼠李根皮沉香連翹薰陸香雞舌香詹糖香丁香各一兩薇銜三分斑貓二十枚以糯米炒黃去頭玄參三分昆布三分洗去醎味右為散食前以荆芥湯調下一錢麝香膏出聖惠方治瘰癧久經年月成瘻瘡者麝香雄黃半兩細研連翹恆山側子昆布狼毒黃耆敗醬各半兩斑貓三十枚蝦蟇灰一兩細研右細銼以臘月豬脂一斤半於淨鐺中煎十餘沸去滓下諸藥以漫火煎攪候黃耆黑色綿濾去滓收以瓦合中後下麝香雄黃蝦蟇灰調令勻每用故帛上塗貼日三兩度換之立應散治癧久不愈者方見本門諸癧類射干丸出聖濟總録治風熱毒癧久不瘥惡寒壯熱勞動轉甚漸成瘻射干昆布去醎味海藻洗醎味各一兩木香黃芩去黑犀角屑各三分芍藥連翹白斂各半兩大黃銼二兩玄參一兩一分烏蛇酒浸去皮骨二兩右為末煉蜜丸如桐子大食後溫酒下十五丸丸出聖惠方治癧久不瘥沉注脅腋衝破皮肉膿血不止斑貓一分糯米拌炒令米黃為度去頭足麝香一分細研水蛭一分微炒令黃芫青一分糯米拌炒米黃為度去頭足甘草半兩炙煆赤銼黑豆一兩炒熟大黃一兩微炒烏蛇二兩酒浸去皮骨炙微令黃右為末入麝香研令勻煉蜜和丸如菉豆大空心以米飲下三丸如未覺加至五丸小便中當出爛肉為效如小便較澀以溫水調滑石末一錢服之丁香丸出聖濟總録治癧久不瘥或已破膿血甚者母丁香生半兩蒼耳苖炒一兩青箱子生皂角仁各半兩甜葶藶半炒半生一兩厚朴去粗皮薑汁一兩炒丹砂研半兩一分藥為衣一分入右為末棗肉為丸如菉豆大丹砂為衣每服十丸至十五丸粟米飲下日三服漏蘆湯出聖濟總録治癧久不瘥將欲破者漏蘆洗焙半兩海藻洗焙半兩連翹一兩沉香銼半兩山梔子仁一兩一分丹參玄參各一兩右粗搗篩每服三錢匕水一盞半煎至八分去滓溫服何首烏散出聖濟總録治瘰癧久不差何首烏去黑皮半兩黃耆細銼半兩皂莢酥炙去皮子薄荷各一兩蛇蛻皮焦灰半兩龍腦研一錢麝香研一錢右為末煉蜜如桐子丸大每服十丸薄荷湯下不拘時候犀角散出聖濟總録治瘰癧久不差犀角屑鎊蕪荑生斑貓炒一兩牽牛子炒黑豆各一兩生用麝香研龍腦研各一兩右除龍腦麝香外為細散再入研藥拌勻每服一錢匕熱酒調下空心服服藥後再飲酒一盞投之下惡物為度七神丸出聖惠方治瘰癧數年不瘥根株漸大流注四肢斑貓三十枚去頭足翅糯米拌炒米黃為度露蜂房半兩燒灰蛇蛻皮一條燒灰蝟皮一兩燒灰麝香三分細研雄黃半兩研細硃砂三分細研水飛過右為末入研了藥令勻煮棗肉和丸如桐子大空心糯米飲下七丸如腹內覺有小痛及增寒即減兩丸百日之內瘥硼砂散出聖惠方治瘰癧經久不瘥硼砂一兩斑貓三十枚糯米拌炒米黃為度去頭足翅乾漆足一兩搗碎炒令黃色水馬三七枚去足炒黃白芷半兩滑石一兩桂心半兩右為散空心以米飲調下一錢晚食前再服麒麟竭膏出聖惠方治瘰癧久穿穴傷風冷膿水不住冝用暖肌生肉麒麟竭一分白斂黃連檳榔丁香龍骨各一分麝香一錢細研右為末入乳鉢內便研令勻用野駝脂調如膏塗於帛上貼之日二用之六神散出聖濟總録治瘰癧久不瘥皂莢刺薄荷昆布洗去醎味海藻洗去醎味連翹各半兩白莢子五十枚燒灰右為細末每服二錢匕茶調下食後臨卧服地柏散出聖惠方治瘰癧經數年不瘥地柏半兩炒令微黃玄參三分升麻一兩牛蒡子一兩炒犀角一兩右為散食前溫水調下一錢治瘰癧經年不瘥諸藥無效者宜服此方出聖惠方蛇蛻皮一條燒灰露蜂房一兩燒灰蝟皮一兩細研二十枚糯米拌炒米黃為度去頭足翅麝香一兩細研右令細煉蜜和丸如桐子大每食前皂莢子仁湯下七丸必效散出瘡科精要治久患瘰癧不效斑貓四十箇去頭翅巴豆十箇去皮心膜白檳榔一箇麝香半錢南硼砂二錢半輕粉一錢右同研極細取雞子清二箇去黃調藥勻却傾在雞子殼內濕紙數重糊定無令透氣生飯甑內與飯一處蒸飯熟取藥曝乾研細末用時相度虛實虛人每服半錢實人每服一錢並用炒生薑酒下五更初服藥至平明取下惡物如覺小腹內疼痛更用萆麻子燒灰入沒藥等分同研細用茶調下一錢便入大腸其取下惡物如爛肉老鼠兒及新成卵內雀兒是藥效婦人有胎不可服紫金散出瘡科精要治瘰癧久不痊者枯白礬半兩砒霜一錢石膽半兩黃丹二錢右為細末糯米飲粥和丸如桐子大揑作餅子爆乾如瘡破者研為末摻於瘡上如不破者炙三壯炷如麥大安藥餅子於火盤上後用水沉香蓋之去根平復勝金膏出聖濟總録治瘰癧久不瘥黃連去鬚蚛粟子去殼甘草根銼黃蜀葵花龍骨各半兩白芨一分右為細末取榆窠上紅蟲稱三兩半候乾同為末更入粉霜三錢同研勻每用藥三錢匕入膩粉少許取雞子清調攤帛上先以口濕漿水洗淨揾乾貼之隔日易連翹湯出聖濟總録治瘰癧諸方不瘥連翹犀角鎊青箱子蔓荆實黃耆銼各等右粗搗篩每服三錢匕水一盞煎至七分去滓溫服空心食前服破毒雄黃丸出危氏方治癧久作不愈寒熱往來項筋攣急已破未破可服之惡物自小便中來通明雄黃顆塊大硃砂各二錢斑貓二十八箇去皮翅用糯米炒黃水銀三錢右先以斑貓為末續以雄黃硃砂為末再入水銀細研合和用雞子清和糯米稠糊為丸菉豆大每服二七丸米飲或溫酒下如惡物未見半日再一服聖惠方有膩粉無斑貓治癧積年癧惡瘡疳瘡軟癤膿出及多年瘡根蝕肉腫痛不可醫者俱用此出聖惠方青黛砒霜硼砂麝香各一兩粉霜一錢右入乳鉢內細研以麵糊丸如小麥粒大若瘡有頭即入瘡口中以麵糊紙蓋頭須臾藥發痛後至五七日出却瘡根便用生肌膏藥封之甚效桃紅散出聖濟總録用血竭須真好者如無以深色胭脂代之為細末以自津唾調日夜頻塗瘡成靨即用浴毒湯洗之紫紅散出聖濟總録治瘰已成漏瘡歲久不愈信砒一錢礬石二錢鉛丹三錢右用瓷罐子先入砒次入礬次入鉛丹蓋之鹽泥固濟炭火煆煙盡至紫色取出以紙襯於地上一時辰出火毒研細先以溫水洗淨瘡挹乾取藥少許以生蜜調塗日夜五六次塗至五七日瘡漸斂紫黑色即用前桃紅散敷之浴毒湯出聖濟總録黃柏去粗皮黃連去鬚甘草銼黃芩去黑心各二兩大豆一合柏枝一把截如指莭長右粗搗篩每用三四匙以水二升煎至一升乘熱淋洗日三四次候洗下瘤子即用平肌散敷之平肌散出聖濟總録黃狗頭骨燒灰鱗鯉甲燒灰各一錢亂髮一團脂大燒灰右研勻如瘡口已乾用自津唾調濕敷之日三四次瘡即平愈一方無鱗鯉甲治癧經年不瘥常出膿血疼痛不止宜服此方出聖惠方斑貓一分糯米拌炒米黃為度去頭足翅羚羊角屑一兩麝香一分細研甘草一兩炙微赤右為末用軟飯和丸如菉豆大空心以荆芥湯下七丸蝪蜥丸治瘰癧久不瘥出膿水腫痛日夜不已方見本門赤瘰癧治瘰癧腫硬疼痛久不瘥宜用此出聖惠方硼砂蜜陀僧斑貓雄雀糞各一兩右為末用軟飯和丸如麥粒大曝乾內入瘡孔中用麵糊帛貼之五六日自落烏雞丸出聖濟總録治癧久不瘥烏雞卵一枚錦貝子半兩右將錦子入雞卵內用濕紙蓋頭七重再用泥固濟火煆過後入地坑內出火毒一宿取出研細入雄黃半兩麝香一錢同細研煉蜜丸菉豆大空心蜜水下五丸不過五服效異效散出聖濟總録治癧結核久不瘥芫青四十九枚麒麟竭一兩右同藏於瓶中存性燒過地上出火毒研細每半錢米飲調下加至一錢匕內消方一名必揵丸出仁齋直指方治癧久不瘥及治大人小兒瘰癧內消斑貓一分糯米炒去頭足翅薄荷葉三分右為末烏雞子清和丸梧子大空心茶清下二丸午時候服三丸臨卧服四丸次日空心服五丸臍下痛小便取下惡物為效如小便祕喫蔥茶少許花葉散出仁存方治瘰漏瘡惡瘡婦人妳癰痛與不痛多年不瘥並治之黃蜀葵十五朵去蒂桑葉二十五片右窨乾為末入乳香半分研勻每用少許瘡乾麻油調塗瘡濕乾摻治久年癧但未定交合項者皆可服出百選方用鯽魚二箇三寸大者開去腸肚不去鱗巴豆不拘多少填魚腹內滿為度麻皮纒定用煉熟黃泥褁了曬七分乾用三二斤炭火煆過魚藥同研極細陳米飲和丸菉豆大每服二粒或三粒陳米飲下日二三服加少麝香一方忌羊肉動風物治瘰癧久不瘥者出肘後方用生玄參搗碎敷之日三次易之木鱉膏出仁齋直指方治瘰癧經久發歇無已及膿血淋漓並皆服之用木鱉仁二箇厚紙裏去油研碎以烏雞子調和磁盞盛之甑內蒸熟每日食後喫一次服之半月自然消靡治癧腫痛時久不瘥用狸頭蹄骨等用酥塗炙令黃搗為散每日空心米飲調下一錢治瘰經久不瘥用斑貓一枚去翅足微炙以漿水一盞空服之或用蜜水調下重者不過七枚差治瘰癧腫硬疼痛時久不瘥出聖惠方用蝙蝠端午日收之燒灰細研如是翁癧即無頭母癧即有頭尖含水洗之以紙絍之絍藥於瘡孔中不過三五度即瘥若是翁即蜜陀僧末少許以麵糊調之即內消治瘰癧年深日久不瘥潰爛膿血作臭穢者用五丁草俗名貓兒眼睛連根采取不計多少亦不切碎盛入砂石鍋內澆滿冷水煎熬極爛順手不住攪轉乾則再添水至熬化成稠膏入全蝎數箇再熬撈去粗渣如膏藥馨香為度傾入磁罐埋土中留口出火氣為度以紅帛攤貼患處兩三日自落不過三兩次即愈比及上藥先以艾炷於瘡四圍排灸之痛極至不痛為度膿血流出用軟物揾乾淨然後前膏塗之治瘰癧久不瘥用臘豬膏塗之普濟方卷二百九十二
