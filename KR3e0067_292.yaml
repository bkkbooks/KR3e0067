body:
  text: 普濟方卷二百九十二明周王朱橚撰瘰癧門瘰癧結核附論論曰瘰癧結核者由風熱毒氣藴積肝經攻注筋脈鬱而不散故項腋之間結聚成核或如梅棗或如珠顆纍纍相連其證令人乍寒乍熱頭項強痛四肢不安心神煩燥蓋毒氣與血氣相搏則榮衛不和使之然也其浮於皮膚之中未著肌肉可以藥內消之若腫硬堅甚不可消之則以藥外化為膿及血令其潰散則易愈也方五香散出聖惠方治心膈久積熱毒肝氣留滯致項生瘰癧結核沉香木香薰陸香各一兩麝香一分細研丁香羚羊角屑子芩赤芍藥玄參當歸犀角屑甘草地骨皮各三分連翹升麻麥門冬去心大黃微炒黃耆銼各一兩右為散入麝香研令勻每服三錢水一盞入蘆根五寸生薑半分煎至六分去滓不計時溫服瘰癧結核黃耆七分玄參八分連翹人參升麻青木香茯苓蒼耳子甘草炙朴硝桂心各四兩大黃麥門冬去心五分羚角屑鼠粘子苦參各九分右為末搗蜜丸如桐子大酒下十丸日夜三四漸加至二三十丸以知為度忌生冷豬肉海藻菘菜鮓生蔥蒜陳臭等物連翹湯出聖濟總録治男女長少瘰癧結核在項腋下項強背痛連翹玄參木香昆布去醎焙乾枳殼去瓤炒犀角鎊各一兩半茈胡去苖甘草炙銼黃芩去黑心沉香銼當歸切焙木通銼芍藥升麻右粗搗篩每服五錢匕水二盞入生薑一片棗二枚拍碎栁枝二寸長一握細銼煎至一盞去滓溫服空心日午夜臥各一服琥珀膏出聖惠方治頸項瘰癧初起如梅子腫結硬強漸若連珠或穿穴膿潰流汁不絶經久難瘥漸成瘻疾並治之琥珀一兩細研丁香木香各三分桂心半兩硃砂細研木鱉子去殼一兩當歸白芷防風去蘆木通各半兩黃丹七兩垂桞枝松脂二兩麻油一斤二兩右先用琥珀丁香桂心硃砂木香五味為末其餘藥並細銼以油浸一宿於鐺中以慢火煎候白芷焦黃漉出次下松脂末濾去滓再澄清油却安鐺中慢火熬下黃丹以栁木枝不住手攪令黑色滴水中成珠不散看硬軟得所入琥珀等末攪勻於瓷器內盛用時看大小用火脅紙上勻攤貼不上數箇立效永不發烏蛇丸出聖惠方治瘰癧結成顆核腫疼痛不散或破為膿水不絶此方立效烏蛇三兩酒浸去皮骨炙微黃犀角屑玄參昆布洗去醎味甘草炙微赤枳殼麩炒微黃天麻各三分郁李仁湯洗去皮微炒各三分連翹牛旁子微炒大黃微炒黃耆銼漏蘆各一兩班貓一分以糯米拌炒米黃去頭足翅右為末煉蜜和丸如桐子大每服不計時候以清米飲下二十丸不過數次效五香湯一名香連翹湯出醫方大成同治一切積熱結核瘰癧癰疽瘡癤等立見大效沉香一分連翹射干寄生無以升麻代獨活一作羌活木通升麻大黃蒸各三分乳香一分麝香一錢半丁香二分甘草二分青木香一分右㕮咀每服四錢水一盞煎七分空心熱服以利惡毒為度本方有竹瀝芒硝隨熱輕重當日添減丹參膏出聖惠方療惡肉惡核瘰癧風結諸腫丹參蒴藋各二兩秦芁獨活烏頭白芨牛膝菊花防風各一兩􅀢草葉躑躅花蜀椒各半兩白术一兩右切以苦酒二升浸之一宿豬膏四斤俱煎之令酒竭勿過焦去滓以塗諸疾上日五度塗故布上塗貼之此膏亦可服得大行即須少服一方有漢防己無防風升麻散治瘰癧結聚顆塊成瘡上攻頭項疼痛升麻玄參敗醬犀角屑虎杖紫葛桑根白皮甘草炙微赤各一兩連翹大黃微炒各二兩紅雪每服一錢湯成下右為散每服四錢以水一盞煎至六分去滓不計時候溫服犀角丸治瘰癧結核犀角屑吳藍黃芩去黑心山梔子仁巴豆去心皮炒研出油各半兩升麻黃耆銼防風去叉甘草炙各三分大黃生銼一兩半連珠草一兩右為末煉蜜和桐子大每服三丸米飲下未利加至六七丸取利為度三黃丸治瘰癧腫毒結成惡核大黃銼炒當歸切焙各一兩梔子仁一分茈胡去苗三分黃連去須黃芩去黑心桂去粗皮赤茯苓去黑皮乾薑炮芍藥各半兩右為末煉蜜丸如小豆大每服十丸空心溫酒日三取微利更以意增減犀角丸治惡核瘰癧犀角鎊木香各一分硼砂研水飛一錢白茯苓去黑皮乾薄荷皂角去皮子酥炙大黃銼炒各一兩何首烏原蠶蛾天麻各一兩右為細末用生羊肉柏香細切研成膏和丸如黍米大每服七丸茶清下不拘時丹參膏治惡肉惡核瘰癧初腫丹參炙銼白芨各三兩升麻蒴􅀈根各一兩半獨活去蘆頭防己連翹白斂玄參杏仁去皮尖雙仁各一兩右為細切以生地黃汁一升淹浸一宿鐺內微煎十沸入豬膏四升微煎一炊久膏成滓用摩病處日二三度班貓丸治瘰癧結核腫硬相連如珠顆頭項肩背煩疼班貓一分赤黑斑點者佳去頭翅足炒過令香豬牙皂角一分去黑皮黃蛇蛻皮半兩微炙烏蛇一兩半酒浸去皮骨炙令微黃天南星半兩炮製去皮露蜂房二兩燒灰大黃三分微炙麝香一分研葳靈仙半兩右為末入麝香研勻煉蜜和丸如桐子大空心以粥飲下十丸至辰巳間病下如蝦蟇衣及諸惡物丹參湯療惡肉核瘰癧諸風氣結聚腫氣諸病並治之蒴􅀈丹參各二兩甘草炙秦芁獨活烏頭炮牛膝各一兩躑躅花蜀椒各半兩去汗右切以水八升煮取三升溫服一升忌海藻菘菜豬肉冷水連翹丸出危氏方治瘰癧結核未破或破者薄荷二斤絞取汁新者好皂角一挺水浸去皮絞取汁以上二味一處銀石器內熬成膏候用青皮不去白連翹半兩陳皮一兩不去白黑牽牛一兩半半生半炒右為末用前膏子丸如梧桐子每服三十丸煎連翹湯下食後服服之十日見效一方黃連煎湯下四香飲出聖濟總録治氣癧結核未破者丁香木香沉香銼乳香各一兩枳實去穰麩炒一兩青橘皮湯浸去白一兩焙陳橘皮湯浸去白焙半兩右粗搗篩每服三錢匕水一盞煎三四沸去滓食後溫服日三連翹散出聖濟總録治惡核腫痛瘰癧連翹何首烏米泔浸一宿焙乾薄荷各一兩麝香研半錢升麻惡實炒白茯苓去黑皮蛇蛻皮酒浸炙各半兩右為散每服一錢匕食前後溫酒調下日三犀角散出聖濟總録治男女瘰癧結核犀角鎊人參鹿角鎊白斂各一兩糯米一合赤茯苓男用白女用赤各去皮一分斑貓三十枚右為細散合研令勻看大小斟酌與服每服二十以上二錢匕十歲以上一錢匕並以蜜二匙水二鐘同煎至一盞先以滑石末調二錢匕後調此散夜臥時服至明小便內取下惡物三五日一服取瘥為度白斂散出聖惠方治瘰癧結核根源深固腫硬疼痛白斂三分黃連去鬚大黃黃芩莾草赤石脂赤芍藥各三分右為末以雞子白旋調塗於故帛上貼之燥即易之一方有吳茱茰五香散出宣明論治一切惡瘡瘰癧結核無首尾及諸瘡腫用之沉香木香雞舌香各一兩薰陸香麝香各三錢連翹一兩半右為末細研每服二錢水一盞煎至六分不計時候玄參湯治惡核瘰癧風結玄參升麻獨活連翹子各三兩木防己菊花各一兩右切以水八升煮取三升分服一升日三內消丸出聖濟總論治瘻癧初結纍纍如梅李核日漸不消則破壞頸腋人參玄參丹參何首烏細銼苦參各一兩右為末别用皂角一十挺以麻繩接續穿留索子頭盛在缸內掘地埋餅子留口用童子小便浸三七日如值雨下即蓋勿令著水候日足取出以水洗挂隂處令乾用薄荷四兩酒一升童子小便半升共前皂角同浸一宿取出煎五七沸傾出以手按取汁細布濾去滓入藥末一分在汁內用文武熬成膏末二分入龍腦麝香各半錢同研勻丸如梧桐子大每服二十丸空心日午臨臥時薄荷茶湯下白斂膏出聖濟總論治瘰癧息肉結硬白斂莽草外臺祕要作甘草玄參木香芍藥大黃生各一兩右為末旋取以醋和如膏塗帛上貼之乾極即易內消丸出瘡科精要治瘰癧結核熱毒鬱滯服之內消青皮不去白陳皮各二兩牽牛半斤取頭末二兩薄荷半斤皂角半斤不蚛者去粗皮及子捶碎水一斗煮軟揉汁去滓熬成膏右將青皮陳皮末并牽牛末和勻用煎膏子和丸如菉豆大每服三十丸食後荆芥茶清溫水皆可下紫威散出聖濟總論治項上瘰癧如棗李核大者先服紫威凌霄花是海藻洗去醎焙瞿麥穗牡蠣煆研成粉左顧者真甘草炙各一兩右為細末每服一錢半匕食後白湯調下日三神妙散出聖濟總録治瘰癧腫痛成瘡牽牛子炒半生半熟青橘皮湯浸去白焙梔子仁玄參地骨皮右等分為散每服二錢匕空心糯米飲調下次日服後牛犀丸牛犀丸出聖濟總録消毒化結聚犀角鎊半錢龍腦研半分麝香研半分紅娘子二十枚斑貓二十一枚去頭足翅同紅娘子豆麵炒焦右為細末用豆麵糊丸如菉豆大每服一丸空心日午夜臥臘茶放溫下服至十日加至二丸除淡飯燒鹽外餘並一應肉食切忌治瘰癧結核腫硬疼痛出聖惠方斑貓十四枚去頭足翅糯米拌炒令米黃為度雄鼠糞二十枚微炒右同研令細入膩粉二錢更研以菉豆麵入新汲水和丸如菉豆大每服空心以麝香酒下三丸覺腹內痛便以硝石末一錢用酒一小盞煎一沸溫服投約一炊久大小便當有如雀卵汁一合以來下者是效冝服藥補之雄黃丸雄黃細研硃砂細研麝香細研細辛人參去蘆各半兩右為細末入研了藥令勻煉蜜和丸如菉豆大每服於食前以酒溫下三丸螺子丸出聖惠方治瘰癧結核小螺子一十八枚去尖微炒斑貓二十一枚去頭足翅炒令黃雀兒糞六十三枚白色者微炒麝香一錢研細右為末入麝香研令勻以好豉一合爛搗研和丸如菉豆大每日空腹以蔥茶下五丸治瘰癧結核不散膩粉一錢研精羊肉二兩切細乾薑一錢銼凌霜花取白微炒一兩右為散入膩粉都拌勻以濕紙褁三五丸重火煨熟取出作一服喫了以溫酒下仍含生薑一片恐吐卧時服至二更取下惡物五日一般服治瘰癧結核外貼令膿自出方出聖惠方膩粉研一分粉霜研一分砒霜研一分燕山糞一分微炒斑貓一分右研細末用臘月豬脂調勻每用小豆大安癧子上用麵糊紙封定至六七日有膿水下至半月膿自出速用生肌散貼之麝香散出御藥院方治瘰癧結核腫硬不消疼痛麝香半錢研枳殼二錢半麩炒去瓤白丁香二兩右為細末每服二錢用溫酒半盞調勻食後日進一服皂角丸治瘰癧滿項不破及結核腫者好皂角子一升玄參連翹各一兩右用水五升砂鍋內慢火煎水盡為度每服㨂取好皂角子軟者三粒食後臨臥時細嚼津下硬者搗爛蜜和如榛子大含化半月必瘥忌酒麵熱毒物治瘰癧結核人參甘草炙乾薑白蘝各四分右搗篩酒服方寸七日三忌海藻菘菜治瘰癧結核腫痛令黃內消方硃砂研細膩粉粉霜細研各二兩右同研令勻用雞子白和丸如梧桐子大於五更初煎蔥湯下三丸良久當利如未利再服之治瘰癧結核不散出聖惠方雄鼠糞小者是皂角針銼炒黃各一兩槲白皮十兩水八升煎取三升右為末每服用藥末一錢五更初暖藥汁一盞調服服後便臥良久當有大吐如未吐更進一服至日出病如蝦蟆相似吐盡為效與溫粥食之消毒塗方出聖濟總録治風熱結硬腫赤疼痛及腮項下腫結成核大黃二兩景天五兩護火草是也右同搗爛塗於患處乾即再敷大蒜膏出聖濟總録治瘰癧結聚大蒜三枚搗爛麝香研半錢右和勻敷於帛上貼一日二易旋搗最好又方出聖惠方麝香一錢研細鯽魚兒二十枚長一寸者去腸肚每魚一枚腹內入和皮巴豆一粒右入瓶子中以泥封漸漸以火燒令通赤候冷取出入麝香同研為散每日空心以溫酒調下半錢良久以熱酒投之逐下惡物每日常服下盡惡物其病自消治項上結核出海上方地骨皮榆白皮右不以多少挫碎煎湯洗之大效丸出聖濟總録治瘰癧一切結核斑貓一枚黑豆七粒生茅者右同破為丸如菉豆大每服五丸茶清下小兒一丸此方用之大效