殼二兩半右為末煉蜜丸如彈子大每服一丸細嚼米飲食前下日進二服魚鮓湯治痢下五色膿血或如爛魚腸並無大便腸中絞痛不可忍呻吟呌呼聲聞於外輕霜研輕粉硃砂硇砂白丁香各一錢乳香半錢巴豆二七枚右為末蒸棗肉為丸嬰孩三丸如粟米大二三嵗四五嵗如麻粒大每用三四丸並旋花煎鮓湯吞下仍間服調胃藥此證緑久積而成故小兒多有之艾薑丸治濕下痢膿血腹痛婦人下血乾艾葉四兩川白薑一兩右為末醋煮麵糊丸桐子大每服七十丸食前溫米飲下烏梅丸治痢下膿血食不消化烏梅肉二分黃連二兩艾葉二兩乾薑一兩甘草一兩炙右搗羅為末煉蜜和丸如梧桐子大每服以粥飲下三十丸日三四服治痢下膿血用薤白於醋中煮令熟飽食即止玉粉丹治虛中積止膿血痢撮痛裏急後重膩粉三錢玄胡索三錢粉霜三錢定粉半兩石燕子一個半右件先杵石燕子玄胡索為末入乳鉢內共粉霜輕粉定粉三味同一處研如粉面取雞子清丸如豌豆大每服三丸至五丸溫米飲食前或臨卧及年老虛弱妊娘産人皆可服之粥飲下五丸或令下一丸如麻子大小兒量大小夜卧溫米飲下五七丸見漸大或十丸忌油膩粘滯等物斂腸丸治下痢膿血木香一錢地榆二錢酸石榴皮二錢罌粟一兩半右件為細末煉蜜為丸如彈子大每服一粒陳米泔一盞煎六分食前食戊巳丸治腸胃虛滑下痢無度膿血相雜甘草木香罌粟殼烏梅赤芍藥右等分為末每服二錢空心米飲下地榆芍藥湯治瀉痢膿血及至脫肛蒼术八兩地榆卷柏芍藥各三兩右㕮咀每服一兩水一大盞半煎至一半溫服之病退藥止止膿便用白石脂和厚朴為末用米汁飲止之治下痢膿血出本草用蠟和松脂杏仁棗肉茯苓等分合成丸食後服五十丸如梧桐子大久痢附論夫久痢不瘥則榖氣日耗腸胃損傷濕氣散溢肌肉浮腫以胃土至虛故也蟲因虛動止蝕於膈則嘔逆煩悶下蝕腸則肛門瘡爛久而不瘥變成疳𧈟或下赤汁水血相半腥不可近是謂五臟俱損而五液雜下此為難治方龍骨湯治新久瀉痢龍骨桑白皮赤石脂天雄厚朴麻黃各一兩半白芷黃芩黃連地榆桂去粗皮當歸木香白术訶梨勒肉豆䓻二枚右銼如麻豆大每服三錢匕水一盞入生薑一棗大切煎至六分去滓溫服茯苓丸治久痢不止脾胃虛弱食飲不消化腹鳴㽱痛白茯苓三分陳麴一兩赤石脂三分黃連一兩人參半兩附子半兩黃蘗乾薑當歸龍骨各三分甘草半兩炙右搗羅為末煉蜜和丸如桐子大每服二十丸以米飲下不拘時候附子湯治暴下積日不注及久痢附子一枝石榴皮一具阿膠二兩龍骨甘草芍藥乾薑黃連各一兩黃芩半兩粳米三合右㕮咀以水八升煮取三升分三服下痢丸治數十年痢下氣消榖令人能食夏月長將服之不霍亂大麥蘗法麴各一升烏梅二升半附子乾薑黃連黃蘗桂心各三兩蜀椒半兩吳茱茰四兩右為末和丸如梧子大食後服十丸日三加至二十丸三食三服亦至四十丸一方用當歸無黃蘗名麴蘗丸烏梅丸治諸痢久下烏梅三百枚乾薑黃連各十兩當歸蜀椒各四兩細辛附子桂心人參黃蘗各六兩右為末以苦酒漬烏梅一宿去核蒸五升米下别搗如泥盤中攪令勻相得蜜和搗二千杵丸如梧子大食前服十丸日三服稍增至二十丸米飲下麴蘗丸治下痢數年不止消榖下氣補虛羸桂去粗皮附子黃連當歸陳麴乾薑麥蘗各一兩吳茱茰蜀椒烏梅肉各一兩半右搗羅為末煉蜜和丸如梧桐子大每服二十丸米飲下加至四十丸一方粟米糊丸馬藺子散療赤白痢腹內疼痛并久水榖痢色白如甘澱悉主之極重者不過三四日即瘥馬藺子一升地榆根皮八分厚朴炙八分熟艾赤石脂一升龍骨茯苓十分當歸十三分右搗篩為散一服方寸匕加至四五匕日再夜一白飲服烏梅丸治久痢諸藥不瘥數十年者消榖下氣補虛烏梅肉黃連乾薑吳茱茰各四兩桂心二兩當歸二兩蜀椒一兩半右為末蜜丸如梧子大食後服十丸日三米飲下七味散治久痢日久不瘥黃連八分龍骨二分赤石脂三分厚朴二分甘草一分烏梅肉二分阿膠三分右治下篩漿水服二方寸匕日再小兒一錢七羊脂煎治諸久痢不瘥羊脂白蠟黃連末一升酢七合蜜七合烏梅肉二兩亂髮末一升右內銅器中火上煎之攪可丸如梧桐子大飲服三十丸利聖散子治丈夫婦人逺年近日赤白休息等痢當歸去蘆乾薑各二兩黃柏皮甘草枳殼御米殼各四兩右搗粗散每服三錢水一盞薤白一條擘碎煎至八分去滓食前稍溫服老人小兒加減服之忌生冷油膩之物地榆丸治久痢不止地榆一兩龍骨赤石脂無食子熟艾各半兩黃蘗三分橡實殼炒半兩右搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲下不拘時候加味四君子湯治久患痢疾服藥已多而疾不愈治痢多是攻擊臟腑之藥轉覺難安宜用輕清和氣之藥即愈人參白术白茯苓川芎黃耆甘草罌粟殼右各等分銼散每服三錢水一盞半生薑三片棗二枚烏梅一箇煎溫服厚朴湯治三十年久痢不止厚朴乾薑阿膠各二兩黃連五兩艾葉石榴皮各三兩右㕮咀以水七升煮取二升分再服御米湯治久患痢疾或赤或白臍腹㽱痛裏急後重發渴無時日夕無度及下血不已厚朴十兩罌粟殼白茯苓甘草各五分人參乾薑各三分半右㕮咀每服三錢水一盞半生薑三片大淮棗三枚烏梅一箇煎至一盞去滓空心食前通口服如年老及七十八十嵗每服二大盞小兒每服一錢半為率量兒加減腹痛加木香赤多加黑豆狗頭骨丸治久患下痢臍腹㽱痛所下雜色晝夜不止或其人久虛頓下腸垢胃之惡痢其脈微弱赤石脂敗龜乾薑各半兩肉豆䓻附子各一兩狗頭骨一兩右為末醋糊丸如梧桐子大每服五七十丸米飲空心下一方膿出甚者去附子蜜陀僧丸治久痢蜜陀僧白礬陽起石伏火砒伏龍肝赤石脂各半兩右搗令細入瓶中鹽泥固濟以文火養三日後煆令通赤候冷重研極細水浸蒸餅和丸如梧桐子大每服三丸煨生薑湯下空心日午夜卧服治一切冷氣積年氣痢茛菪附子乾薑陳橘皮桂心厚朴右各等分為末以白麵糊丸溫湯送下食前藥性氣甚溫熱發用解之溫脾湯治痢久赤白連年不止及霍亂脾胃冷食不消積熱大黃四兩人參甘草乾薑各二兩附子一枚右㕮咀以水八升煮取二升半分三服臨熟下大黃須大轉瀉者當用此方一方用桂心無甘草雲母散治三十年注痢骨立痿黃腸滑不瘥雲實五合龍骨三兩附子女萎各二兩白术二兩半右為末以蠟煎熬用丸藥如梧桐子大每服五丸日三不過五六服瘥一方無白术用棗肉為丸粥飲下椒艾丸治三十年下痢所食之物皆不消化或青或黃四肢沉重起即眩倒骨肉消瘦兩足逆冷痛中熱苦筋轉起上須扶隂無食子蜀椒三百粒烏梅二百枚熟艾一升乾薑三兩赤石脂二兩右椒薑艾下篩一斗米上蒸令飯熟去核內薑椒末合搗二千杵蜜和丸如梧桐子大服十丸日三服不瘥加至二十丸加黃連一升溫水下木香散治隔年痢不止木香半兩黃連炒半兩罌粟殼半兩生薑半兩甘草一兩炙右為細末入麝香少許研勻陳米飲下二錢治血痢尤竒四續散治久下痢赤白不止吳茱茰乾薑阿梨勒皮白礬灰各半兩右搗羅為末醋煮麵糊為丸如梧桐子大每服十丸粟米飲下食前服一方有當歸無礬石每服五錢水煎服名茱茰湯治膿血痢天仙散治腸虛久痢天仙子鉛丹各二兩大棗三十枚訶梨勒皮一兩赤石脂半兩訶梨勒散治久痢不止沉困怠惰訶梨勒木香黃連地榆各半兩吳茱茰炒一分右搗羅為細散每服三錢匕沸湯調下食前服虛積丸治久痢不瘥將變𧈟硫黃水銀二兩巴豆各一兩礞石硇砂各半兩右藥同研細以好醋和令勻得所先作一地坑如茶盞大深四指烈火煆通赤去灰火去醋紙襯攤藥在內碗蓋上焙一宿取出候乾麵糊為丸如小豆大每服二丸或三丸生薑棗湯送下治諸久痢不瘥羊脂阿膠蠟各二兩黍米二升右合煮作粥一服令盡即瘥乾薑湯治積年痢因毒腸極滑醫所難藥乾薑黃蘗阿膠酸石榴皮炒各一兩右粗搗篩每服三錢匕水一盞煎至七分去滓不拘時服不差更作老小亦良羸者稍稍服之一方無黃蘗用黃連秦皮丸治下赤連年秦皮鼠尾草薔薇根右等分㕮咀以水潦煎去滓銅器重釡煎成丸如梧桐子大每服五六丸日二稍增瘥止亦可濃汁服半升辰砂丹治冷熱不調赤白毒痢久不瘥者朱辰砂信明砒粉霜各半兩右研極細鎔蠟七錢油七點為劑油紙褁旋丸如小豆大小兒如菉豆大每服一丸甘草水冷下食前金星鱔散治久痢金星鱔白礬鉛丹各半兩右搗羅為散每服二錢匕米飲調下食前龍骨丸治久患滑泄下痢龍骨一兩白礬灰半兩鉛丹一分右搗羅為末麵糊丸梧桐子大每服十丸蠟茶清送下茯苓散療下痢三十年茯苓乾薑黃連等分右搗篩為散蜜和丸如梧桐子大飲服之一日漸增至百丸苦痢劇者加龍骨附子炮仍令等分一服十丸漸增之以知為度當歸湯療三十年下痢止諸痛方當歸一兩生薑八兩大棗二十枚右以水四升煮取二升半分三服不瘥復作之治下赤連年方地榆鼠尾草各一兩右㕮咀以水二升煮取一升分二服如不止取屋塵水清去滓一升分二服療下血二十年若不止重服即愈一方為末粥飲調下二錢乾薑散治一切赤白痢久不瘥乾薑榆白皮各一兩右搗羅為散每服二錢空心食前溫米飲調下抵聖丸治諸般痢多年不瘥日夜百十行不止治泄痢久不止生薑砂糖各一分右以三重濕紙褁煨五更初都作一服以蠟茶嚼下薑莧方治久痢不止或赤或白馬齒莧生薑二兩右和勻用濕紙褁煨熟不拘多少細嚼米飲咽下痢止腹痛不可忍者良薑芍藥右等分為末薑鹽飲湯調下三靈散治久痢腸胃俱虛肛門自下龍骨半兩木賊二錢半右為末每服半錢乾摻候少時以手托上黑豆湯治赤白痢服諸藥不瘥黑豆半升甘草一兩半右綿褁以漿水三升煎至一升去滓溫二服治七八十老人患疾痢不斷兼不能飲食治積久二十年常下痢用赤松皮切一斗為散麵粥和一升服之日三服即效服一斗永瘥三十年痢麴末酒治久冷痢不純白者由積卧冷處經久病發遂令脾胃俱冷日夜五六十行大小腹痛不可忍凡白痢屬冷赤痢屬熱用好麴末五升微熬令香溫清醇酒冷熱和麴末一升空腹頓服之日三服若至食時搗蒜一升令至熟下薑椒末調和如常食之法惟須稠勿加鹽以水和麴二升作蒸餅極爛煮之乾漉熱內蒸蒜虀臼中相和一頓食之少與餘良至飢時仍準前食麴末酒比至瘥來少食餘食以此法治不過兩日無有不瘥治久痢赤白水楊柳嫩葉右搗攪取汁一升日二服大效作㕮咀煎服亦可黑神散治腸滑久痢神妙無比酸石榴一枚右搗為散每服用酸石榴皮一瓣以水一盞煎湯調下二錢匕久瀉亦治之又療冷熱不調或滯或水赤白清黃者搗汁服之亦佳豆䓻散治脾虛腸鳴久痢不止腹痛不能食大豆䓻一枚入乳香三十塊在內以麵裹煨熟右為末每服一錢米飲調下草蒿方治冷熱久痢右草蒿秋冬用子春夏用苖搗絞汁服治久赤白痢用黃雌雞子醋煮熟空腹食之黃連膏治久痢纍醫不瘥用黃連一兩為末以雞子白和為餅炙令如紫肝色杵為末以漿水三升慢火煎成膏白痢加酒半盞同煎每服半合溫米飲調下食前服一方治赤痢為丸每服三十丸米飲服之治久痢勞痢用乾薑茛菪焦炒見煙麵糊為丸白飲空心下十丸極效治久下痢經時不止者此休息痢用牡狗骨炙令黃焦搗飲服方寸日三治痢久不瘥用乾棗和丸光粉燒服治久痢及疳痢困重方用樗白皮不限多少取土際不用見根及風細切搗如泥捻作餛飩如棗大勿令過熱煮吞七枚重者不過七服皆空肚忌油膩熟麵等物神授散治久痢不瘥用陳石榴焙乾為細末米湯調下三四錢人患二三十年或三兩月不等者百藥不效此藥一服便住不可以草方輕視治痢疾久病諸藥不效用豬臟熟煮薄切空心喫又調平胃散服之即愈忌熱物蚺蛇膽方治諸痢久不斷體瘦神昏多睡坐則閉目食不下用大蛇膽大如豆二枚煮通草汁研膽以意多少飲之塗五心并下部治諸痢日久者二服效乾薑一兩地榆二兩甘草一兩熟黑豆一兩右為細末每服三錢食前水煎和滓服異香散治憂鬱氣滯不散腹中膨滿刺痛下痢不止蓬莪茂益智仁甘草京三稜各六兩青皮陳皮各三兩石蓮肉一兩厚朴二兩右銼散每服二錢水一盞薑三片棗一枚鹽一捻煎七分通口服硃砂丸治赤白痢不瘥硃砂一分蛤粉半兩巴豆一分硫黃一分烏頭末半分麝香半錢砒礵半分右都細研令勻用煮棗肉和丸如黍米大每服不計時候以飲下三十丸白礬丸治赤白痢不止白礬鉛丹各二兩右研令極細用粟米飲和為丸如梧桐子大每服三丸空心米飲下白术散治久赤白痢不止腹中疼痛白术一兩附子一兩龍骨二兩黃連一兩阿膠二兩赤石脂三兩乾薑一兩地榆二兩當歸一兩右搗細羅為散每服不計時候以粥飲調下二錢龍骨丸治久赤白痢不止腹痛不食當歸三分芎藭半兩龍骨三分地榆一兩赤石脂三分艾葉三分沒石子三分黃蘗三分橡實半兩右搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以粥飲下二十丸烏賊魚骨丸治久赤白痢日夜無數痛不可忍烏賊魚骨三兩樗根皮三兩亂髮三兩雀兒糞一兩代赭二兩龍骨二兩白石脂二兩右搗羅為末醋煮麵糊和丸如梧桐子大每服不計時候以粥飲下二十丸代赭丸治久赤白痢日夜無數腹痛不可忍代赭一兩黃蘗一兩黃耆一兩半龍骨一兩赤石脂一兩艾灰一兩狗頭骨灰一兩右搗羅為末煉蜜和丸如梧桐子每服不計時候以粥飲下二十丸木香散治久赤白痢臍腹㽱痛木香三分附子一兩半黃連一兩當歸一兩吳茱茰半兩厚朴三兩右搗篩為散每服三錢以水一盞煎至五分去滓不計時候稍熱服附子散治久赤白痢腹痛不止附子一兩黃連一兩訶梨勒一兩乾薑一兩甘草一兩密陀僧一兩右搗細羅為散每服不計時候以粥飲調下三四錢厚朴散治久赤白痢腹內冷痛白多赤少宜服厚朴一兩木香三分黃連一兩吳茱茰半兩乾薑半兩當歸三分右搗羅為散每服不計時候以粥飲調下二錢神效硃砂丸治久赤白痢不瘥日夜度數無恆硃砂定粉粉霜巴豆各一分右藥同研如麵用水浸蒸餅和丸如菉豆大空心以冷水調二宜湯下二丸抵黃丸治久患赤白痢硫黃半兩蜜陀僧一分白礬灰半兩寒水石二兩右都研為末以麵糊和丸如菉豆大每服以冷水下五丸黃連龍骨丸治久赤白痢不瘥羸困黃連三分龍骨三分白礬一兩胡粉三分右搗羅為末煉蜜和丸如梧桐子大每服不計時候以粥飲下二十丸樗樹皮散治久赤白痢不止樗樹皮一兩甘草一分川椒五十粒右以水一盞浸一宿煎去滓中盞內七分食前宜溫服薑附丸治久赤白痢不瘥赤烏腳四兩附子一兩乾薑一分右搗羅為末用醋煮麵糊和丸如菉豆大每服以粥飲送下十五丸紫笋茶散治久赤白痢不差紫笋茶一兩蠟月狗頭骨一兩半右藥同細研令勻每服不計時候以粥飲調下二錢橡實散治久赤白痢日夜不止橡實一兩乾薑一兩右搗篩羅為散每服不計時候以粥飲下二錢椒麴粥治久冷痢或痢或不痢間但腰腹患苦冷用上等新蜀椒三升用醋經宿漬之以麵三升和椒一升緊拌煮作粥空腹頓服之加豉蔥豉鹽任性調和不瘥更作以瘥為度不過三升椒即愈北方不但治冷大治諸虛損勞極有所益久當自知耳又方用黃蘗三兩微炙銼搗羅為末煨獨頭蒜仁熟搗丸如梧桐子大每服不計時候以粥飲下二十丸又方右用鼠尾草花搗末每服不計時候以粥飲調下一錢治久赤白痢及水瀉方川烏頭一枚右以黑豆半合入水同煮黑豆熟為度取黑豆同研爛丸每服五丸米飲下乾潦丸治一切痢久醫不瘥乾漆砒霜硃砂已上各一分麝香半分巴豆十枚右都研如麴以軟飲和丸如麻子大每服不計時候以新汲水下一丸丁香丸治一切年久下痢立效母丁香三分麝香一分砒霜一分巴豆四十九枚右都研為末以粟米飯和丸如菉豆大空心以冷水下一丸忌食熱物又方雄黃胡粉硝石蜜陀僧各半兩右細研如粉以軟飲和丸如梧桐子大每服食前以粥飲下十丸治赤痢逺年不瘥鼠尾草秦皮薔薇根槲樹皮已上各一兩右搗羅為散每服食前以粥飲調下二錢黃連丸治諸痢不瘥黃連一兩烏梅肉一兩半亂髮三兩右搗羅為末用蜜二兩半煉熟入蠟一兩醋二合半脂一兩煎令蠟化入前藥末於銅器中重湯熬令可丸即丸如梧桐子大每服三十丸空心米飲下茛菪丸治痢疾時久不瘥變種種痢兼脫肛釅醋二升茛菪子一升青州棗一升右以醋煮二味為膏候可丸如梧桐子大每服二十丸粥飲食前下蕪荑丸治久痢不瘥有蟲兼下部脫肛蕪荑黃連炒二兩蚺蛇膽半兩右為末煉蜜丸如梧桐子大每服三十丸杏仁湯下日再服香粟散治久新痢疾罌粟殼二兩地榆木香陳皮乾薑甘草各半兩右件為粗末每服三錢水一盞棗一枚同煎至一盞去滓食前通口服粟煎散治久痢不瘥或赤或白瘀血作片後重疼痛日夜無度罌粟殼十個蜜炒甘草三寸手擘破炙黃右件為粗末每服三錢用水一盞半入粟米一撮同煎至一盞去滓空服斷下散治久新血痢日夜無度乾薑地黃當歸赤芍藥川芎罌粟殼黃連槐花右各等分為粗末每服三錢水一盞半入粟米一撮同煎至一盞去滓溫服五竒湯治久患痢疾不問赤白並皆治之訶子二箇生用木香一塊肉豆䓻二箇甘草一寸草豆蔲二枚右五味同搗羅為細末每服二錢米飲調下不拘時候白术散若其人久下痢之後卒然身體足脛面目浮腫小便反快切其脈而虛此為脾肺虛則不能漸運諸氣脾虛則肌肉空踈氣無所歸橘皮大腹皮茯苓生薑皮各半兩白术一兩右為細末米飲調下三錢香茸丸治日久冷瀉乳香三錢鹿茸半兩肉豆䓻一個右為細末陳米飲丸每服五十丸空心米飲下治下痢久不瘥腸垢已出用烏梅二十個水一盞煎取六分去滓食前服治療久痢脫肛不止用女萎切一升燒薰之治久痢或疳用葎草乾蔓搗篩量多少管吹榖道中不過三四次瘥若神治丈夫久痢用淡菜煮食之任意治久痢不瘥單用醋林子搗為末酒調下一錢服之甚效治久患下部冷久痢腸腹下白膿用燒磚令溫取尉及坐之並瘥但取堅石燒暖用之非别溫石也一方用古磚熱燒之以物褁上坐之入秋小腹多冷者亦用此治患痢不問赤白膿血腹痛用懸鉤根皮濃煮服之治久痢用枯蟬燒灰服之治久痢勞痢用狗頭骨燒灰用乾薑茛菪焦炒見煙麵糊為丸如梧桐子大白飲空心下數丸極效治水殼痢久不瘥用厚朴三兩黃連二兩銼水三升煎取一升空心服治久痢不瘥腹內常惡者用薤但多煮食之治白痢經年不愈者右用爛煮好羊肉入鹽食之或用碎米作糝羔食之亦瘥羊肉不可大肥普濟方卷二百十二
