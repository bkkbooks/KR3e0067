body:
  text: 普濟方卷一百三十四明周王朱橚撰傷寒門傷寒發豌豆瘡論凡傷寒熱毒內盛多發皰瘡者以病人裏實表虛故也裏實則毒氣不能內消表虛故乘虛發於肌肉而成瘡也其病大小形如豌豆其色或白或赤若頭作瘭漿戴白膿者其毒則輕若紫黑色作根根在肌肉裏者其毒則重甚者周匝遍身五內七竅皆有也夫表虛裏實熱毒內盛攻於臟腑餘氣留於肌肉遂於皮膚毛孔之中結成此瘡重者匝遍其身狀如火瘡若根赤頭白則毒輕若色紫黑則毒重其瘡形如豌豆亦名豌豆瘡脈洪數者是其候也方黃連飲子治傷寒毒氣未散發豌豆瘡黃連一兩去鬚糯米一合寒水石三兩右搗篩以水二大盞煎至一盞半去滓不計時分溫服大青散治傷寒壯熱頭痛發瘡如豌豆遍身大青梔子仁川大黃銼碎微炒犀角屑川升麻甘草炙微赤銼以上各一兩右為散每服五錢以水一大盞煎至五分去滓溫服不計時治傷寒熱毒未解欲生豌豆瘡發熱疼痛宜服解肌出汗方葛根一兩銼石膏一兩麻黃一兩去根節黃芩半兩赤芍藥半兩桂心半兩甘草半兩炙微赤銼右搗為細散每服不計時以暖酒調下二錢併三服衣蓋取汗治傷寒病發豌豆瘡未成膿初覺冝服出聖惠方黃連一兩去鬚右搗碎以水一大盞煎至六分去滓不計時候溫服便消不成膿也又方出聖惠方用好蜜遍磨瘡上亦可以蜜煎升麻摩之并數數服之又方出聖惠方木香半兩右搗碎以水一大盞煎至六分去滓頓服之治傷寒發豌豆瘡欲出宜服甘草一兩炙微赤銼右搗碎以水一大盞煎至六分去滓任食前後細細服之以防瘡出如已出即不服又方出聖惠方用清油一小盞服之即不生又方出聖惠方牛乳四兩酥一兩右先暖乳令微沸即下酥酥消盡便服空心頻頻溫服即不生治傷寒病壯熱頭痛發瘡遍身如豌豆獖豬膽一枚右以醋半小盞合膽汁煎一沸放溫為一服不計時治傷寒白頭瘡四邉赤腫欲發豌豆瘡出聖惠方麻黃一兩去根節川大黃一兩銼碎微炒右銼和勻每服半兩水一大盞煎至五分去滓不計時溫服治傷寒發豌豆瘡未作膿方一名青黛一物湯出聖惠方用青黛一兩細研以新汲水調下一錢不計時石膏湯出聖濟總録治傷寒天行壯熱頭痛發瘡如豌豆石膏碎二兩柴胡去苗虎杖各一兩知母焙半兩芍藥一兩山梔子仁三分右搗篩每服五錢水一盞半煎至八分去滓溫服參麻湯出聖濟總録治傷寒熱病生豌豆并皰瘡煩渴昏迷元參一兩升麻三分犀角鎊半兩乾藍葉一兩甘草炙銼三分右搗篩每服五錢水一盞半入蔥白三寸豉一百粒同煎至一盞去滓溫服日二二黃湯出聖濟總録治傷寒天行熱病毒氣稍盛生豌豆并皰瘡煩躁昏迷大黃銼炒半兩黃芩去黑心麥門冬焙去心芍藥各一兩甘草炙三分銼大青半兩右搗篩每服五錢水一盞半煎至八分去滓溫服治傷寒發豌豆瘡四邊赤腫方出聖濟總録胡荽一握生地黃一兩右細切搗絞汁空心頓服一盞許升麻湯出聖濟總録治傷寒熱毒氣盛發瘡如豌豆升麻半兩大黃銼碎微炒一兩黃連去鬚甘草炙銼各三兩山梔子仁一兩右搗篩每服三錢水一盞煎至七分去滓溫服日二犀角湯出聖濟總録治傷寒熱毒氣盛發瘡如豌豆犀角鎊二兩麻黃去根節黃連去鬚各半兩木香一兩右搗篩每服五錢水一盞半煎至八分去滓溫服大青湯出聖濟總録治傷寒天行壯熱頭痛發瘡如豌豆遍身大青一兩山梔子仁犀角鎊各半兩右搗篩每服三錢水一盞入豉一百粒煎至七分去滓溫服牡丹湯出聖濟總録治傷寒熱毒發瘡如豌豆牡丹皮山梔子仁黃芩去黑心大黃銼炒木香麻黃去根節右等分銼如麻豆大每服三錢水一盞煎至七分去滓溫服良化毒湯出聖濟總録治傷寒發斑豆瘡欲出甘草微炙一兩黃連去鬚微炒一兩右銼如麻豆大每服五錢水一盞半去滓溫服不計時內消散出聖濟總録治傷寒熱病欲生豌豆瘡毒未出令不成用墨一分以酒二合磨令頓服之紫草飲出聖濟總録治傷寒熱病生皰瘡煩躁迷悶用紫草并根細銼二兩搗篩每服三錢水一盞煎至七分不計時溫服竹葉湯治傷寒時氣發瘡如豌豆煩悶苦竹葉切小麥各二兩石膏碎三兩右搗篩每服五錢水一盞半煎至一盞去滓溫服不計時龍腦丸出聖濟總録治傷寒時疾發豌豆瘡及赤瘡子未透心煩狂躁氣喘妄語或見神鬼用龍腦一錢細研旋滴豬心血和丸如雞頭實大每服一丸紫草湯化下少時心神便定得睡瘡復發透依常將息安黑散子出聖濟總録治傷寒熱病初出豌豆瘡三五箇便服此令瘡不出用臘月豬糞以新砂瓶子盛瓦蓋口炭火燒令通赤取出安地上出火毒入乳鉢研細每服一錢空心新汲水調下紫草湯出聖濟總録治傷寒發斑疹豆瘡紫草荆芥惡實等分右搗篩每服三錢水一盞煎至七分去滓溫服晉中書令王珉傷寒身驗方用樺皮濃煮汁冷飲主傷寒時行熱毒瘡特良今之豌豆瘡也治傷寒發豌豆未成膿出千金方用芒硝以豬膽相和塗瘡上立效痂落無痕仍用黃土抹上良木香散出活人書治瘡煩痛者青木香一兩薰陸香􅈨石丁香各一兩麝香半兩右㕮咀以水四升煮取一升半分兩服熱毒盛者加犀角一兩無犀角以升麻代病輕者去􅈨石神驗治豌豆瘡初發覺欲作者方出千金方用煮大黃五兩服之愈傷寒鼻衄論夫傷寒劫者鼻中血出者是也雜病衄者實熱在裏傷寒衄者實熱在表何以言之病原曰凡人肝藏血肺主氣開竅於鼻血得熱則散隨氣上從鼻中出則為衄是雜病者實熱在表世經曰傷寒脈浮緊不發汗因致衄者宜麻黃湯傷寒不大便六七日頭痛者熱實小承氣湯其小便清者知不在裏仍在表也當須發汗頭痛者必衄宜桂枝湯以此觀之是傷寒衄者責其表熱也千金翼曰吐血有三種一曰肺疸二曰傷胃三曰內衄既吐血家謂之內衄其鼻中出血者可謂之外衄是經絡之血妄行也經絡熱盛陽氣擁重迫血妄行出於鼻則為衄經曰其人發煩目瞑劇者心衄衄乃解所以然者陽氣重故也又曰陽盛則欲衄陰虛小便難言衄為經中陽盛煩傷寒肺浮鼻中燥口燥但欲潄水不欲咽者是欲衄也經曰陽明病口乾鼻燥能食者則衄又有不應發汗而強發汗因致衄經曰十陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治是也衄家雖為邪熱在經而又不可發汗經曰衄家不可發汗發汗則頭上陷脈緊急直視不能言不得眠前云桂枝湯麻黃湯治衄者非治衄也即是發散經中邪氣耳若邪氣不得發散擁成於經逼迫於血則因致衄也即非桂枝麻黃湯專治衄也太陽病脈浮緊發熱身無汗自衄者愈是經中之邪隨血而散則解矣故知衄者不得桂枝湯麻黃湯發散之也衄者若但頭汗出身無汗及汗出不至足者死黃帝云此不治之疾臨病之際審而治則不失矣歌曰太陽發衄病將解衄後仍將脈審詳有汗脈浮須用桂緊而無汗用麻黃桂即桂枝湯也麻黃即麻黃湯也太陽病自衄及服諸表藥後自衄者為欲解也有汗脈浮再用桂枝湯無汗脈緊再與麻黃湯脈微者犀角地黃湯又黃芩芍藥湯茅花湯衄而渴欲飲水入即吐先服五苓散次竹葉湯少陰證無緣有血少陰證但厥而無汗強發之必動血動血者死或出口鼻或耳目也是謂下厥上竭聖濟總録論云傷寒鼻衄者由熱氣盛血液妄行蓋心主血肝則藏之肺主氣鼻則通之心肝為熱邪所傷血則隨氣行所以隨鼻出也昔人謂陽盛則衄者蓋陽盛則熱盛熱盛則宜衄故傷寒太陽證衄血乃解謂是故也至於陰病則不宜衄蓋陰證自無熱安得而衄故少陰病但厥無汗強發之必動血從口鼻耳目出者是謂下厥上竭為難治也歌曰陽明口燥若頭疼水不下咽得衄血瘀血停留定發狂病家外證無寒熱陽明身熱頭疼鼻衄脈微者犀角地黃湯外證無寒熱者必發狂此瘀血停留也輕者犀角桃仁承氣甚者抵當湯取盡黑物為度方茅花湯出聖濟總録治傷寒衄血不止茅花一把右銼碎以水三盞煎濃汁一盞分二服無花以根代之一方加燈心竹茹湯出聖濟總録治傷寒鼻衄不止青竹茹黃芩去黑心各一兩蒲黃伏龍肝各半兩右粗搗篩每服五錢水一盞半煎至八分去滓下藕汁一合攪勻食後溫服犀角湯出聖濟總録治傷寒鼻衄不止頭面俱熱犀角鎊大青甘草炙各三分升麻雞蘇莖葉小薊各一兩黃芩去黑心芍藥各一兩半生乾地黃焙朴硝各二兩右㕮咀如麻豆每服五錢水一盞半煎至八分去滓溫服阿膠湯出聖濟總録治傷寒鼻衄不止此是陽毒攻腦阿膠炙令燥黃芩去黑心各一分蔥白五寸連鬚豉一百粒乾艾葉炒半兩右細銼分作二服每服用水一盞半煎至七分去滓下生地黃汁一合攪勻食後溫服黃芩湯出聖濟總録治傷寒鼻衄不止黃芩去黑心梔子仁大黃銼炒蒲黃荆芥穗各半兩右銼如麻豆大每服三錢水一盞半煎至八分去滓溫服不拘時金黃散出聖濟總録治傷寒鼻衄不止鬱金甘草炙各一兩黃藥子黃蘗去粗皮各一兩右搗羅為細散每服二錢冷水調下不拘時以止為度鈎藤散出聖濟總録治傷寒頭痛壯熱鼻衄不止鈎藤桑根白皮銼馬牙硝各一兩梔子仁甘草炙各三分大黃銼炒黃芩去黑心各一兩半右粗搗篩每服三錢水一盞竹葉三七片煎至六分去滓下生地黃汁一合攪勻食後溫服竹茹湯出聖濟總録治傷寒鼻衄不止青竹茹雞子大一團生地黃半兩拍碎右以水一盞半煎至八分去滓食後溫服羚羊角湯出聖濟總録治傷寒肺熱鼻衄不止羚羊角鎊犀角梔子仁麥門冬去心焙紫苑去苖毛各三分牛黃研元參各一分黃耆人參甘草炙各半兩赤茯苓厺黑皮一兩右搗粗篩每服五錢水一盞半煎至八分去滓食後溫服日二前胡湯出聖濟總録治傷寒內熱鼻衄痰壅吐逆前胡去蘆頭甘草炙白术陳橘皮湯浸去白焙大腹皮各三分赤茯苓去黑皮旋覆花桔梗炒各半兩半夏湯浸七遍一分右搗粗篩每服五錢水一盞半生薑一棗大拍碎煎至八分去滓食後溫服髮灰散出聖濟總録治傷寒鼻衄不止亂髮一團如碗大燒成灰麝香研錢半右同研極細每服一錢新水調下又取少許吹鼻中立差四生飲治傷寒衄血心胸煩滿生地黃汁三合生藕汁二合生蘇薊汁一合生薑汁半合白藥子一分細末右和勻於銀石器中微溫食後分二服升麻湯出聖濟總録治傷寒鼻衄不止頭痛壯熱升麻雞蘇莖葉芍藥各一分青蒿犀角鎊各半兩芒硝三分右粗搗篩每服五錢水一盞煎至六分去滓下地黃汁一合食後溫服地黃飲出聖濟總録治傷寒鼻衄生地黃汁二合蜜二合右攪勻頓服加減柴胡湯出經驗良方治傷寒鼻衄柴胡去蘆八錢半夏薑製二錢半黃芩去黑心人參去蘆甘草炙三錢加生熟地黃共半兩右㕮咀每服二錢水一盞半生薑二片棗一枚煎至七分去滓溫服大人倍加煎服滑石湯出本事方治傷寒衄血右用滑石末不拘多少飯丸如桐子大每服十丸微嚼破新水咽下立止只用藥末一錢以飯少許同嚼下亦得老幼皆可服湯晦叔云鼻衄者當汗不汗所致其血青黑時不以多少乃得止且服溫和藥以調其榮衛才見血鮮急服此藥止之血溢湯治少陰病氣厥發衄者黃藥二兩甘草炙一兩右以水三升煮取一升去滓溫分兩服治傷寒鼻衄肺間有餘熱故也血因熱自行不止用此方牡蠣二兩半石膏一兩六錢右治下篩酒服方寸匕日三四亦可蜜丸如桐子大用治大病差後小勞便鼻衄者苦參湯治鼻衄苦參三分黃連二兩梔子二七枚擘破大黃一兩地黃生乾一兩右切以水五升煮取二升半去滓分兩服吾期年已療數十人無不差者都下地黃難得無使門冬亦差忌蕪荑豬