body:
  text: 普濟方卷九十二明周王朱橚撰諸風門中風失音不語附論夫喉嚨者氣之所出上下也會厭者音聲之門户其氣宣通則聲音無所阻礙若風邪摶於會厭則氣道不宣故令人失音入臟則不能語矣千金方云風寒之氣客於中滯而不能發故瘖不能言及喉痺失音皆風邪所為也入臟皆能殺人故附之於治風方之末凡尸厥一厥而死脈動如故此陽脈下墜隂脈上爭氣閉故也針百會入三分補之炙尉兩脅下又竈突墨彈丸大漿水和服之又針足中指頭去甲如韭葉又刺足大指甲下內側去甲三分方羚羊角湯出聖濟總録治中風失音手足不遂羚羊角鎊芎藭細辛去苖葉木香防風去義麻黃去節獨活去蘆頭當歸酒浸切焙附子去皮臍炮裂桂去粗皮天麻各一兩右銼如麻豆每服三錢匕水一盞煎至七分去滓溫服不拘時候一方加羌活用酒煎服名天麻散薑附湯出聖會方治中風失音不語氣厥無脈手足拘攣乾薑炮附子炮製去皮臍甘草炙桂心去粗皮當歸酒浸焙白术細辛去蘆葉各一兩麥門冬去心焙二兩杏仁去皮尖雙仁炒研一兩右銼如麻豆每服三錢匕水一盞煎至七分去滓溫服加獨活無杏仁名附子散大續命湯出千金方治肝屬風卒然瘖啞及五臟偏枯賊風黃柏八兩桂心乾薑芎藭各二兩黃芩當歸各一兩石膏四兩杏仁三十枚荆瀝一升右㕮咀以水一斗先煮麻黃兩沸掠去沫下諸藥煮取四升去滓又下荆瀝煮數沸分四服能言未瘥後服小續命湯舊無荆瀝今增之其效如神一方有甘草又方出千金方治大風經藏奄忽不能言四肢重曵皮肉痛癢不知獨活麻黃各二兩芎藭防風當歸葛根生薑桂心茯苓附子細辛甘草各一兩右咀以水一斗二升煮取四升分五服老小半之若初得病便自大汗者減麻黃不汗者依方上氣者加茱萸二兩厚朴一兩乾嘔者倍加附子一兩啘者加橘皮二兩若胸中吸吸少氣者加大棗十二枚心下驚悸者加茯苓一兩熱者可除生薑加葛根初得風未須加減便且作三劑停四五日以後更候視病虗實平論之行針依冗炙之又方出千金方治與前大續命湯同宜産婦及老小等並可麻黃芎藭各三兩乾薑石膏人參當歸桂心甘草各三兩杏仁四十枚右咀水一斗煮取三升分三服外臺名續命湯治風冷失音咽喉不利凡此中風又有竹瀝諸湯甚多此用藥雖少而效將治大患此劑不差更應服之出肘後方木通乾薑茯苓各一兩防風桂心石膏各二兩麻黃一兩半白术半兩杏仁三十枚附子一兩右為細末煉蜜和丸如豆大每服七丸漸增加之羌活人參湯治中風失音不語羌活去蘆頭二兩半人參二兩附子炮製去皮臍一枚桂心去粗皮獨活去蘆頭三分菖蒲切半兩甘草炙二兩右銼如麻豆每服五錢匕水一盞入荆瀝竹瀝地黃汁共半盞同煎至一盞去滓溫空心日後午夜卧各一服治中風筋脈拘急腰背強直失音不語出聖惠方黑鉛霜半兩水銀半兩與鉛同結炒子細研天南星半兩炮製白附子半兩炮製犀角屑半兩硃砂半兩細研牛黃一分研右為末入研了藥更研令勻用軟飯和丸如菉豆大每服不拘時候以消梨汁下五丸四逆湯治卒中風不能言厥逆無脈手足拘急者山茱萸細辛乾薑甘草炙三兩麥門冬一升去心右㕮咀水七升煮取二升分為四服忌海藻菘菜生蔥菜治若卒中冷聲嘶啞者甘草一兩桂心二兩五味子二兩杏仁三十枚生薑八兩右㕮咀水七升煮取二升為服飲之地黃湯治中風失音不語神效一名生地黃汁飲子生地黃汁淡竹瀝各半兩獨活去蘆頭一兩附子炮製去皮臍半兩右將二味銼如麻豆每服三錢七以水一盞入竹瀝地黃汁少許同煎一盞溫服空心日午夜卧各一服竹瀝湯治中風失音不語昏沉不識人竹瀝荆瀝梨汁各二兩陳醬汁半合右相和煎一兩沸冉濾一遍令溫細灌入口中口噤斡開灌之生附子白术湯治中風濕昏悶恍惚脹滿身重手足緩縱漐漐自汗失音不語便利不禁附子去皮臍乾薑各半兩白术一兩甘草一分炙右為散每服四錢水一盞半煎七分去滓食前服柏子仁酒柏子仁生研二兩雞糞白炒二兩桂心去粗皮生薑不去皮切一兩右粗搗篩共炒令焦色乘熱投酒六升候冷去滓每服七分一盞空心日午夜卧服一方有黑豆無生薑獨活散治中風失音不語四肢強直獨活防風去蘆頭秦艽去蘆用荆芥穗白术葛根銼附子炮製去皮臍各一兩桂心甘草微炙赤銼各半兩右為散每服四錢水一中盞薑半分煎至六分去滓不拘時候溫服羌活湯治中風失音不語羌活去蘆頭一兩半甘草炙半兩人參半兩附子炮製去皮臍一枚荆瀝竹瀝生地黃汁右將前四味銼如麻豆每服五錢七分以水一盞入三􅟢汁瀝共半盞煎至一盞去滓溫服日夜三一方加防風二兩治卒不得語方用酒五合和人乳汁中半分為三服芥子膏治中風卒不得語方見風走疰疼痛類竹豆湯治中風失音不語青竹葉碎如算子四十九莖烏豆二升右以水八升相合和煮令豆爛去滓冉煎取一升每服二合灌之或口噤不開者即斡口灌紫桂散治中風失音不語方見急風類大豆煎方治中風失音不語大豆緊小者二升洗淨生薑汁一合右先用水五升煮豆至二升絞去豆入薑汁慢火煎如稀膏空心食後夜卧時各用一七細細含咽甚者用竹瀝二合調服菖蒲飲治中風失音立效菖蒲石上者一分桂心去粗皮一兩右粗搗篩每服二錢七水一盞煎至七分去滓溫服不拘時治風冷失聲咽喉不利用燒馬勒銜鐵令赤內一升苦酒中破一雞子合和飲之治卒失音濃煮大豆汁如膏少少含咽津服無豆用豉煮汁飲之亦可荆瀝飲子治中風失音不語手足轉動不得荆瀝三合竹瀝三合蜜一七生葛根汁二合右件藥相合令勻不拘時候溫服二合烏金煎治中風失音不語煩熱頭痛黑豆二升淨淘過羌活二兩獨活二兩荆芥一兩右為末先以水五大碗煮黑豆令爛去豆取汁入諸藥末慢火煎十餘沸次漸入無灰酒一升煎好為膏盛於瓷器中每服不拘時候以溫酒調下半匙頭白􅈨丸治卒中風不語失聲噎不出白􅈨生研陳橘皮去白炒桂去粗皮各一兩右為末棗肉和丸如彈子每服一丸化津咽下不拘時候獨行散治失音出經驗良方用槐花瓦上炒令香熟放地上出火毒三更後上仰卧隨意服亦治咯血治中風失音研韭汁服之治卒風不得語出肘後方銼榖枝葉酒煮熟皮中沫出隨多少飲之即楮枝也桂心方出千金方治中風失音方見中風類治卒失音聲噎不出出肘後方用橘皮五兩水三升煮取一升去滓頓服傾合服之又方出肘後方濃煮苦竹葉服之瘥治風冷失聲咽喉不利出肘後方搗蘘荷根酒和絞汁飲之不拘時候溫服半盞一方用根二兩以酒一大盞服之取涎丸治中風不語咽喉聲如拽鋸口中涎沫方見中風類通關散出指迷方治失音不能言由風邪客於脾經上入關機者舌本也又關隔不通其人精神昏憒失忘白殭蠶炒半兩羌活一分麝香半錢右為末每服二錢先以薑汁少許調勻以沸湯浸放溫服之以真菖蒲末時時著舌根下桂心散出聖惠方治中風失音不語桂心一兩羌活二兩防風一兩去蘆附子一兩炮製去皮臍赤箭一兩羚羊角屑一兩酸棗仁一兩甘草半兩炙微赤銼右件藥為散每服四錢以水一中盞煎至五分去滓入竹瀝一合更煎一兩沸不計時候溫服治卒不得語方以苦酒煮苽子傅頸一周以衣包一日一夕乃解即差獨活湯出經驗濟世方治中風不語獨活一兩銼酒二升煎至一升次用大黑豆炒熟將藥酒熱投蓋良久每服三合灌未差冉服烏藥散出朱氏集驗方治中風不語老人虛人可用也烏藥附子一枚天雄一隻沉香大塊各一兩甘草右入鉢磨各一錢病勢稍重用水一碗薑十片煎半碗空心服氣中加木香半錢無氣加人參半錢治失音出本草右桂末著舌下漸咽汁治中風失音方出本草右取桂以淨水三升煎取一升服取汗治失音不語風病者出本草以針頭刺手心令痛即語男左女右治中風失音并一切風候出本草以白殭蠶七枚為末用酒調方寸匕立效治失音不語出本草以車家雞棲木作灰服一升立效治卒失音出本草右用生大豆一升青竹算子四十九枚長四寸濶一分和水煮熟豆去算子將豆與汁服之日夜二服差治風卒不語口偏者出本草右熬雞糞如豆淋酒法絞取汁溫酒服之甚效治卒暗風失音不語者出本草以生梨搗汁一合頓服之日冉服止治中風失音出本草用桂心一兩去粗皮近身體懷之至兩時辰許為末分為二服每服用水二盞煎取一盞服之差大妙聖惠方同治感風不能言出本草以黃耆防風煮湯數斛置床下薰之昔唐許胤宗初仕陳為新蔡王外兵參軍時有柳太后感風而不能言脈沉而口噤胤宗曰既不能下藥宜湯氣薰之藥入腠理周時可差乃造此湯數斛置床下氣如煙霧其夕便得語藥力薰其效如此治中賊風口偏不能語者取茱萸一升清酒一升和煮四五沸冷服之半升日進三服得少汗差治中風卒不能語用白芥子研細以醋熬成膏傅頭一周以帛包之一日一夕乃差中風舌強不語附論夫中風舌強不語者蓋脾脈絡胃夾咽連舌本心氣所通令風邪客摶則氣脈閉塞不利所以舌強不能舒卷有害於言語也又云中風不得語者由心脾感受風邪故也脾脈絡於胃夾咽連舌根散於舌下心之别脈系於舌本入二經俱為風毒所傳故令舌強不得語也方羌活湯治中風舌強不得語手足舉動不得羌活去蘆一兩羚羊角鎊半兩麻黃去根節先洗掠去沫焙用一兩防風去人半兩獨活去蘆頭半兩旋復花炒一兩人參白茯苓去皮一兩當歸切焙麥門冬去心龍齒摶各半兩杏仁湯退去皮尖雙仁炒一兩右㕮咀每用藥十錢匕以水三盞煎取半去滓溫分三服空心日午夜卧各一天麻散出聖惠方治中風不能語四肢強天麻乾蝎微炒各一兩烏蛇二兩酒浸炙黃去皮骨天南星炮製白殭蠶微炒乾薑炮製銼人參去蘆頭各三兩白附子一分炮製天雄炮製去皮臍檳榔芎藭各半兩麻黃一兩去根節右為散每服不計時候以熱酒調下一錢頻三服以厚衣蓋汗出為度牛黃丸出聖惠方治中風舌強不語骨節拘急飲食不得翕翕發熱形神如醉牛黃半兩細研白附子炮製銼乾薑炮製銼麝香半兩細研芎藭桂心各三分天麻白殭蠶微炮附子炮製去皮臍羌活各一兩南星半兩炮製烏蛇二兩半酒浸炙黃去皮骨右為末入研了藥令勻煉蜜為丸如梧桐子大每服不拘時候以薄荷酒下十丸黃芩湯一名小續命湯治中風舌強不得語靣赤欲絶身體緩急目視不停及治中風冒昧不知痛處拘急不得轉側遺矢便利偏宜産後失血出千金方黃芩去黑心桂心去粗皮芎藭人參防風去義防己甘草麻黃去根節先煎掠去沫焙芍藥白术各半兩附子炮製去皮一枚右銼如麻豆每用六錢匕以水三盞入生薑大棗三拍碎煎取一盞半去滓溫服空心臨卧各一服少汗出為度附子湯治中風舌強不得語附子炮製去皮臍細辛去苖葉各三分麻黃去根節煎掠沫焙用一兩半芎藭白蘚皮茯神去木杏仁湯退去皮尖雙仁炮羌活去蘆頭防己桂去粗皮甘草炙各二兩右銼如麻豆每服藥十錢匕以水三盞入生薑大棗三拍碎煎取一盞半去滓分三服空腹併二服相去如人行五里更一服羚羊角湯治中風舌強不語手足拘急發歇有時羚羊角鎊麻黃去根節防風去義升麻桂去粗皮芎藭薏苡仁各一兩羌活去蘆頭杏仁去皮尖雙仁炮各二兩右㕮咀每服五錢匕水一盞入木通竹葉煎至七分去滓溫不拘時服桑枝飲子出聖惠方治中風不語桑枝一握束引黑豆一合布袋盛與藥略煮三兩沸獨活一兩生薑一分羌活一兩右㕮