body:
  text: 普濟方卷一百八十明周王朱橚撰渇利附論夫渇利者飲隨小便是也由少服乳石及熱盛時房室過度致令腎氣虚耗下焦生熱熱則腎燥燥則渇盖腎氣虚不能專制水液故飲隨小便也其病變多發癰疽以其内熱而小便故也小便利則津液竭津液竭則經絡澁經絡澁則榮衛不行而熱氣留滯故成癰疽也前胡湯出聖濟總録治痟渇利有熱小便澁前胡去蘆頭生乾地黄焙大黄剉炒各一兩黄芩去黑心梔子仁升麻芍藥栝樓根石膏碎各三分麥門冬去心焙一兩一分桂心去粗皮一分枳實去瓤麩炒甘草炙各半兩右㕮咀毎服四錢水一盞半入生地黄一分切碎同煎至八分去滓食前温服日三竹葉湯出千金方治渇利虚熱引飲不止消熱止渇竹葉切二升地骨皮生地黄切各一升栝樓根石膏各八分茯神一作茯苓萎𬎼知母生薑各四兩生麥門冬一升半大棗三十枚右㕮咀水一斗二升煮取四升分四服調中湯治腎虚熱渇小便多除風濕理石毒止小便去皮膚瘡升麻甘草炙菝葜各四兩元參知母漏蘆各五分茯苓三分牡蠣煆枳實炙黄連各六分右為末飲汁服方寸匕日再服以瘥為度忌猪肉海藻菘菜酢物竹葉散出千金方治下焦虚熱上炎肺胃渴飲而利竹葉切三升甘草三兩栝樓根生薑各五兩麥門冬茯苓各四兩大棗三十枚小麥地骨皮各一升右㕮咀先以水三升煮小麥取一升去滓澄清取八升去上沫取七升煮藥取三升分三服石膏湯出聖濟總録治渇利虚熱引飲不止消熱止渇石膏四兩地骨皮二兩栝樓根三兩半茯神去木知母焙萎𬎼各二兩右㕮咀毎服四錢水二盞竹葉二十片生地黄半分切生薑三片棗二枚擘破同煎至一盞去滓温服日三枸杞根飲出聖濟總録治常食熱麵炙煿諸乾燥物及服補熱藥因熱酒衝肺日乆即患痟渇飲水無度小便旋利心中熱悶煩燥枸杞根皮菰根李根白皮葛根四味並洗切各二兩甘草炙一兩牡蠣炒二兩石膏碎五兩右㕮咀毎服五錢水一盞半煎至八分去滓不拘時温服栝樓散治腎虚熱渇小便利栝樓茯苓各一分元參四分枳實炙六分苦參粉甘草炙橘皮各三分右為末空腹以漿水服方寸匕日再服忌海藻犬酢菘菜地黄丸出千金方治面黄手足黄咽中乾燥氣短脈如連珠除熱止渇利補養生地黄汁生栝樓根牛羊脂三升白蜜四升黄連一斤為末右合煎令可丸如梧桐子大米飲服五丸日二加至二十丸若苦冷而渇瘥即宜别服温藥麥門冬湯出聖恵方治渇利麥門冬去心焙白茯苓去黒皮各四兩栝樓根地骨皮各五兩甘草炙三兩右㕮咀毎服四錢先以水二盞入小麥一匙竹葉二七片生薑半分棗二大枚擘破同煎至一盞半去滓下藥末煎八分食前去滓温服三日枸杞湯出千金方治渇而利者枸杞枝葉一斤黄連甘草栝樓根石膏各三兩右㕮咀水一斗煮取三升分五服日三夜二劇者多合渇即飲之栝樓散出千金方治渇利日飲水數斗小便頻數方見本門痟中類厚朴湯出聖濟總録治三痟渇飲水無度小便隨之肌肉痟瘦人參一兩牡蠣煆厚朴去粗皮姜汁炙各三兩右㕮咀毎服五錢水一盞半煎至八分去滓不計時候温服黄耆散出聖濟總録治三痟渇疾肌膚瘦弱飲水不休小便不止黄耆剉桑根白皮剉細各一兩葛根剉二兩右為散毎服三錢撏猪湯澄清調下不拘時石菖蒲散出聖濟總録治渇日夜飲水隨飲即利石菖蒲一兩栝樓根二兩黄連去須半兩右為散毎服三錢新汲水調下食後臨卧服栝樓根煎出聖濟總録治渇利生栝樓根去皮細切十斤黄牛脂碎切一合半鍋内慢火煎令消蘆去滓右先水三㪷煮生栝樓根煎至一㪷用生絹絞去滓取汁納牛脂攪令勻再納鍋中慢火煎不住手攪令水盡候如膏狀即止扵瓷盒中宻盛毎日食後温酒和如雞子黄大服之日三服雞肶胵出聖濟總録治渇利飲水下咽即利為膀胱有熱名曰渇利一名雞内金丸方見本門膈須類小豆汁出聖濟總録治渇利小豆不以多少右水煮熟搗爛細布絞取汁毎服一盞不拘時頻服即瘥又方出千金方竹根右濃煮汁飲之瘥止又方胡麻右熬令變色硏淘取汁飲半合日可三四服不過五升即瘥治小便卒太數復非淋一日數十過令人瘦出肘後方末中水猪脂如雞子一枚右多承取肥汁盡服之不過三劑即瘥又方羊肺一具右以作羮納少肉和鹽豉如食法任意進之不過三具瘥又方豉一升右納扵鹽中綿裹之以白礬好者半斤置綿上令蒸之三㪷米許時即下白礬得消入豉中出曝乾搗末毎服方寸匕菝葜飲出聖濟總録治痟渇小便數少方見本門肺痟類鹿兔煎出澹寮方治三痟渇利神藥常服禁遺精止白濁延年兔絲子北五味子各五兩白茯苓三兩半並如元兔丹法製度鹿茸一兩半鹽酒浸炙右為末生地黄汁搜和為丸如梧桐子大毎服五十丸空心鹽湯下黄耆丸出聖濟總録治痟渇小便數少虚極羸瘦黄耆剉鹿茸去皮酥炙各二兩牡蠣煆一復時土𤓰根黄連去鬚白茯苓去黑皮各一兩人參一兩半右搗羅為末硏令細煉蜜為丸梧桐子大毎服三十丸用首烏湯下地骨皮飲治痟渇日夜飲水不止小便利地骨皮剉土𤓰根剉栝樓根剉蘆根剉各兩半麥門冬去心焙二兩棗七枚去核右㕮咀毎服四錢水一盞煎至八分去滓温服不拘時茯苓丸出千金方治渇小便數貝母六分一本作知母茯苓栝樓根各四分鉛丹一分雞肶胵中黄皮十四枚右細末飲服方寸匕日三瘥後常服尤佳常服不絶則去鉛丹以蜜丸之用麥飲下一方無貝母用貝齒元兔丹出三因方治三痟渇利神藥常服禁遺精止白濁延年兔絲子酒浸通軟乗温研焙乾别取末十四兩白茯苓三兩五味子酒浸别為末秤七兩乾蓮肉三兩右為末别碾山藥末六兩將所浸酒餘者添酒煮糊搜和得所搗數千杵丸如梧桐子大毎服五十丸米湯下空心食前服一方用天花粉五味子湯下温酒鹽湯亦可脚膝無力木𤓰湯下梅花湯出三因方治三痟渇利神效糯榖旋炒作爆聲桑根白皮厚者切細等分右用秤毎一兩許水一大碗煮取半碗渇則飲下不拘時麥門冬湯出衛生寳鑑治痟渇日夜飲水不止飲下小便即利麥門冬去心焙黄連去須乾冬瓜各二兩右為末毎服三錢水一盞煎至七分去滓温服痟腎小便白濁附論夫痟腎小便白濁如脂者此由勞傷扵腎腎氣虚冷故也腎主水而開竅在隂隂為小便之道脬冷腎損故小便白而如脂或如麩片也痟渇飲水過多乆則滲漏脂膏脫耗精液下流脬中與水液渾濁隨其小便利下膏凝故謂之痟渇小便白濁也肉蓯蓉丸出聖濟總録治痟渇尿脂小便如泔肉蓯蓉去皺皮酒浸切焙地骨皮澤㵼五味子巴㦸天去心當歸切焙各一兩磁石煆醋淬七遍人參赤石脂各一兩半韮子炒白龍骨甘草炙剉牡丹皮各一兩熟乾地黄焙一兩禹餘糧煆三分桑螵蛸炙四一枚右為細末煉蜜丸如梧桐子大毎服二十丸以牛乳下日三黄耆丸出聖恵方治痟腎小便白濁四肢羸瘦漸至困乏宜服黄耆剉黄連去鬚熟乾地黄牡礪燒為粉鹿茸去毛茶酥炙㣲黄各一兩白茯苓土瓜根龍骨元參五味子人參去蘆頭桑螵蛸㣲炒各三兩麥門冬二兩去心焙菝葜半兩剉右為細末煉蜜和搗五七百杵丸如梧桐子大毎扵食前以清粥飲下三十丸辰砂妙香散治渇證小便澁數而瀝兼有油濁茯苓茯神去木山藥炮逺志水浸去心焙黄耆各一兩人參甘草炙桔梗各半兩木香辰砂别硏各三錢麝香一錢右為細末毎服二錢加辰砂少許用茵陳煎湯調下日三服或用燈草茯苓煎湯下葶藶丸出聖濟總録治痟渇下冷小便濃白如泔嘔逆不下食葶藶子慢火炒别搗如膏一兩半枳殻去瓤麩炒桂去粗皮羚羊角鎊白茯苓去黒皮柴胡去苗鼈甲去裙襴醋浸炙防風去皮兔絲子酒浸兩宿乾炒别搗牛膝去苗安息香各三分陳橘皮湯浸去白焙一兩右為細末煉蜜和劑酥塗杵搗勻熟丸如梧桐子大毎服三十丸空腹酒下黄耆散出聖恵方治痟渇腎虚心神煩悶小便白濁黄耆剉麥門冬去心茯苓龍骨栝樓根熟乾地黄澤㵼白石脂桑螵蛸㣲炒各一兩甘草三分炙㣲赤剉右為散毎服四錢水一中盞入生薑半分棗三枚煎至六分去滓毎扵食前温服腎瀝湯出聖濟總録治痟渇小便白濁如脂白羊腎一具去脂膜切黄耆剉杜仲剉炒五味子生薑切各一兩半生乾地黄焙一兩人參半兩棗五枚去核磁石三兩搥碎綿裹右除羊腎磁石外剉碎分為二劑先水四升煎腎與磁石外二升去腎然後下諸藥再煎取八合去滓分二服食前服金牙石湯出聖濟總録治痟渇小便濃濁如麵汁此為腎冷金牙石搗碎研厚朴去粗皮塗生薑汁炙熟石菖蒲各一兩半貝母硏去心一兩烏梅去核㣲炒葶藶子炒别搗如膏各三分桂去粗皮髙良薑兔絲子酒浸兩宿曝乾後㣲炒别搗各半兩右先搗八味為粗末次入金牙石再硏勻毎服三錢水一盞入棗三枚去核煎七分去滓早晩食前温服銀錫丸出神效方治飲水百盃尚猶未足小便如油或如杏色水銀四錢錫二錢用水銀研成砂子牡蠣蜜陀僧知母貝母各一兩黄丹半兩紫花苦參栝樓根右為細末男子用不生兒猪肚一箇納藥婦人用獖肚一箇線縫之新瓦一合繩繫一兩遭米一升更用栝樓根末半斤却扵新水煮熟取出放冷用砂盆内硏爛就和為丸如猪肚丸法用之服此藥三五日小便大出毒歸扵下十日永除根本此方屢試屢騐真妙劑也黄連丸出聖恵方治痟腎小便滑數心神煩燥白濁方見本門痟中類兔絲子散出聖恵方治痟腎小便多白濁或不禁兔絲子酒浸三日曝乾别搗為末肉蓯蓉酒浸一宿刮去皺皮炙乾黄連去各一兩磁石半兩燒赤醋淬七遍碎硏蒲黄一兩半㣲炒雞肶胵中黄皮一兩半㣲炒五味子一兩右為末入硏了藥令勻毎扵食前以清粥飲調下二錢鹿茸丸出聖恵方治痟腎小便滑數白濁將欲沈困宜服鹿茸去毛塗酥炙㣲黄肉蓯蓉酒浸一宿刮去皺皮炙乾各一兩半黄芩土瓜根人參去蘆頭各三分雞肶胵十枚㣲炒兔絲子三兩酒浸三日曝乾别搗為末右為末煉蜜和搗三五百杵丸如梧桐子大毎扵食前以清粥飲下三十丸山茱茰丸出聖濟總録治痟渇飲水極多肢體羸弱小便如米泔腰膝冷通諸藥不能治者土瓜根剉苦參龍骨細研各一兩半山茱茰栝樓根剉各一兩半右先搗五味次入龍骨再硏勻用生栝樓汁和劑酥塗杵搗勻熟丸如梧桐子大毎服三十丸食後煎白茅根飲下日三逺志丸出三因方治心腎虚煩渇引飲胸間短氣小便自利白濁泄遺人參白茯苓川薑炮各半兩逺志去心薑汁製炒牡蠣煆取粉各一兩右為末用蓯蓉一兩酒熬成膏丸如梧桐子大毎服五十丸糯米湯下桑螵蛸丸出聖恵方治痟腎小便白濁乆不瘥桑螵蛸㣲炒兔絲子酒浸三日曝乾别搗為末黄連去鬚各一兩熟乾地黄二分山茱萸右為末煉蜜和搗三二百杵丸如梧桐子大毎扵食前煎大麥飲下三十丸鐡粉丸出聖恵方治痟腎心肺熱極羸痩乏力口乾心煩小便如脂鐡粉一兩細研生地黄三兩雞肶胵三兩㣲炒牡蠣三兩燒為粉黄連一兩去右為末入硏了藥令勻煉蜜和搗三二百杵丸如梧桐子大不計時候以粥飲下三十丸一方無生地黄用乾地黄以酥塗杵熟為丸鐡粉丸出聖濟總録治痟渇臓腑枯燥口乾引飲小便如脂鐡粉研水飛過乾秤再研黄連去鬚各三兩雞肶胵隂乾五枚炙熟牡蠣炒研如麩二兩右先搗二味為細末再與鐡粉牡蠣硏勻煉蜜和劑以酥塗杵熟搗丸如梧桐子大毎服三十丸食前煎粟米飲下漸加至四十丸天雄散出聖恵方治痟腎小便滑數白濁心神煩燥白石脂三分露蜂窠㣲炙天雄各半兩炮製去皮臍右粗搗都以水二大盞半入棗五枚煎至一盞去滓食前分温三服黄耆散出聖恵方治痟腎小便滑數白濁令人羸瘦宜服五味子黄耆剉各半兩雞肶胵一兩㣲炙右件粗搗都以水三盞煎至一盞半去滓食前温三服黄連丸出聖恵方治痟渇飲水不知休小便中如脂舌乾口渇黄連去鬚栝樓根各三兩右為末生地黄汁和劑石臼内用木杵酥塗搗勻熟丸如梧桐子大毎服三十丸食後牛乳下日二一方以麥門冬硏汁和丸熱水下蠟苓丸出危氏方補虚治濁止渇潤膓婦人血海冷白帯白滛白濁黄蠟雪白茯茯去皮各四兩右茯苓為末溶蠟和丸弹子大毎服一丸不饑飽時細嚼下棗湯亦可加减八味丸出危氏方治腎水枯竭不能上潤心火上炎不能下濟煎熬而生心煩躁渇小便頻數白濁隂痿弱飲食不多肌膚漸漸如削或腿腫脚先瘦小宜降心火生腎水其煩渇頓止熟地黄大者先焙乾切酒蒸七次焙乾稱二兩真山藥㣲炒一兩山茱茰去核取肉焙乾秤一兩肉桂去粗皮忌見火取末半兩澤瀉水浸切酒潤蒸一次牡丹皮去骨白茯苓去皮為末飛過取沈者各八錢真北五味子畧炒别為末一兩右為末煉蜜丸如梧桐子五更初莫言語時温酒鹽湯下三十五十丸午前及晩間空腹再服此方用真北五味子最為得力服此不惟止渇亦免生癰疽乆服永除渇疾氣血加壯一曰或先患癰疽纔覺作渇即當服此或有癰疽而無渇證亦宜以預防蓋患癰之人多扵欲發未發之際作渇而不可救患渇之人多患癰而命終故不可不服此藥也外科精要云有一貴人病疽疾未安而渇作諸醫盡用木瓜紫蘇烏梅人參茯苓百藥煎等生津止渇之藥服多而渇愈甚後用此方三日渇止又云一士大夫病渇療累嵗不安一名醫使服此八味圓下半載而疾痊因疏其病源云今醫多用醒脾生津止渇之藥誤矣服此降其心火生其腎水則渇自止矣磁石湯一名腎瀝湯出聖濟總録治痟腎小便白濁如凝脂形體羸瘦磁石六兩别搗如米粒分為二十貼毎用煎時取一貼綿裹黄耆細剉人參五味子各一兩半杜仲去粗皮炙剉熟地黄乾焙各二兩右除磁石外粗搗篩分為二十貼先用水三盞羊腎一隻切作四片去筋膜與磁石一貼同煎至二盞去磁石羊腎下藥末更同煎至一盞半去滓温服兩服之茯兔丹一名元兔丹治三痟渇通用亦治白濁方見本門渇利類治白濁不問老少年深者或有夜夢走洩遺瀝澁痛或赤或白皆酒色過度上盛下虚心火上炎肺金受克口舌乾燥漸成痟渇睡卧不安四肢倦怠男子赤白濁婦人赤白帯下五心熱燥不問老少逺年近日先服此藥一月出鄭氏家𫝊濁渇方人參黄耆蓮肉去心茯神白茯苓麥門冬北五味各一兩甘草黄芩地骨皮車前子各半兩右㕮咀毎服二錢白水煎又加五苓散去桂名百叚錦散又方此藥去根不可連用服盡前藥方可用此出鄭氏家𫝊渇濁方人參茯苓枯白礬白龍骨逺志去心黄耆各一兩龍齒雞頭子帯殻家韮子炒老松糖溶净五味子牡蠣煆各二兩木香沈香各半兩桑螵蛸鹽水炒半兩右為末煉蜜丸如梧桐子大毎服三十丸空心鹽湯下兼服後藥桔梗炒薏苡仁炒乾葛人參白茯苓蓮肉去心各一兩白术甘草白扁豆炒黄耆蜜炙當歸各半兩桑白皮麥門冬去心半夏麯百合乾薑炮山藥炒五味子杏仁去皮尖木香丁香白芷神麯各一兩右㕮咀毎服二錢薑三片棗一枚煎至七分空心服治濁白茯苓老松皮雞頭子蓮肉各等分右為細末用金櫻膏為丸毎服三十丸鹽湯或酒任下又方人參白茯苓花龍骨牡蠣胡桃肉各等分右為細末煮羊腎為丸毎服三十丸鹽湯或酒任下大凢痟渇之證皆由腎氣虚敗肺主氣而心主血血枯脈燥心火上炎腎水下流乃至天在上而地在下以為否卦今水火不升降若服冷藥一時快意其慮愈甚水愈竭而火愈大火壅結燥若不成癰則津液枯而衰弱遂成難理之疾此證方書甚多要不得泥執在人活用之水陸二仙丹大治男子夢遺白濁腰膝酸疼雞頭子和殻為末右用金櫻膏為丸如梧桐子大空心鹽湯下二十丸孫氏存仁方金櫻同為末用酒糊丸又云男子用乳汁丸尤妙補方定心志安神除煩人參琥珀麥門冬去心黄耆蓮肉當歸鹿茸各一兩肉蓯蓉白茯苓逺志犀角鎊沈香硃砂各五錢木香一錢右為末空心鹽酒湯調下支感丹出鄭氏家傳渇濁方治白濁遺精兔絲子酒炙白茯苓各五錢秋石一兩右為末百沸湯一盞井花水一盞為隂陽和煮糊為丸鹽酒湯下金鎻丹出鄭氏家𫝊渇濁方治白濁白茯苓茯神各二兩逺志一兩炒去心牡蠣四兩炒五花龍骨一兩半右為末糯米丸空心鹽湯下羊腎丸出鄭氏家𫝊渇濁方治白濁妙甚第三隻用本事云申酉時腎開宜進此藥大雞頭二兩一分家韮子牡蠣煆各二兩半夏木猪苓赤者同半夏炒毎各三兩右為末爛煮羊腎去膜同藥末為丸如梧桐子大入麝香一錢或硃砂為衣瓦器盛之毎服二十粒煎猪苓湯吞下治赤白濁出鄭氏家傳渇濁方人參黄耆茯苓龍骨白石脂煆牡蠣煆各一兩栝樓根桑螵蛸各半兩右為末糊丸如梧桐子大毎服三十丸鹽湯下治白濁小便頻數夢遺不禁出鄭氏家𫝊渇濁方牡蠣龍骨白礬白茯苓秋石人參黄耆各一兩右為末糊丸如梧桐子大毎服三十丸空心鹽酒湯下治元陽虚極小便如脂出鄭氏家傳渇濁方蒼术茴香川烏川楝子川椒龍齒牡蠣破故紙各一兩同炒赤右為末糊為丸空心鹽湯下毎服三四十丸治白濁出鄭氏家傳渇濁方免絲子酒煮一日焙乾巴㦸去心酒浸煮破故紙炒鹿茸山藥赤石脂五味子各一兩右為末酒糊丸空心鹽湯下又方出鄭氏家𫝊渇濁方石菖蒲甘草炙各半兩人參當歸赤茯苓五味子紫苑去蘆栢子酸棗仁各一兩橘紅川芎細辛麥門冬去心各半兩右㕮咀毎服入蜜一匙同煎至七分不拘時温服三摶丸出鄭氏家傳渇濁方人參五味子黄耆蜜炙各一兩白礬龍骨五倍子罌粟殻川楝子炒茴香牡礪煆熟地黄澤㵼牡丹皮木鱉子各半兩右為末煉蜜丸梧桐子大毎服三十丸鹽湯酒任下補骨脂丸同前方治夢遺益智仁二兩去殻青鹽五錢炒川巴㦸一兩去心補骨脂一兩净洗龍骨一兩火煆右為末羯羊腎子去膜并硬心子細切入瓦盆内煮爛如泥量入藥末搜和盆内杵百下丸如梧桐子大毎服百丸鹽米湯下凢渇濁必先㸔為何證有濁無渇先服百叚錦散後用白羊腎丸及沈苓丸如有渇先須治渇先用三神湯既减却與之議定方可沈香散次用珍珠丸除其渇白羊腎丸除其濁方可用龍鳯瓦斷其根百叚錦散出鄭氏家𫝊渇濁方五苓散清心蓮子飲右二方依方製等分打合赤濁則除肉桂用生薑蓮子同煎毎日二服此藥常服不害白羊腎丸出鄭氏家𫝊渇濁方半夏猪苓各二兩右將半夏净洗同剉猪苓同炒褐色為度却用半夏為末煮酒羊肉外腎硏爛同杵為丸却猪苓為末入磁瓶内養毎五七十丸温水服或猪皮煎温湯空心下沈苓丸出鄭氏家𫝊渇濁方白茯苓半斤去皮净猪苓五兩右將茯苓剉成大塊猪苓為皮片瓦器用煮以猪苓沈為度取白茯苓以蠟丸如弹子大毎服用小瓦瓶煮清粥候沸却下一丸攪勻空啜服沈香散出鄭氏家𫝊渇濁方方見本門痟渇類珍珠丸出鄭氏家𫝊渇濁方生珍珠一兩麝香龍腦人參天花粉乾葛白茯苓甘草紫草各一兩硃砂黄連各半兩右為末酒糊丸如雞頭子大毎服用麥門冬湯細嚼咽下含化為妙渇濁藥味總栝出鄭氏家傳渇濁方牡蠣用紙包定用鹽拌黄泥固濟大火煆過紅後令取出泥鋤窟約一尺埋三宿却取研入家韮子焙乾大半夏用沸湯泡七次或煮復時取出合半生熟大者切作三片用猪苓炒赤色去猪苓用紙包入土埋三宿用雞頭子水淘去泥沙鍋乗以好酒煮一日或酒可若多酒煮乾収起其餘諸藥只依本法羊腎丸只要麝香為衣不用硃砂亦可大凢渇濁先用秘𫝊降氣數服用清心蓮子飲服一月却兼服羊腎丸及八味丸之屬凢治此病動取二月三月甚者半年凢渇濁俱有者八味丸玉真丹和服五味子丸出經騐良方治禀賦弱小便數亦不禁五味子四兩熟地黄六兩肉蓯蓉八兩兔絲子酒浸蒸二兩右為末酒煮山藥末為糊丸如梧桐子大毎服二三十丸米飲送下痟渇後成水病附論夫脾土也土氣弱則不能治水痟渇飲水過度脾土受濕而不能有所制則泛溢妄行扵皮膚肌肉之間聚為浮腫脹滿而成水也五臓六腑皆有津液若臓腑因虚實而生熱者熱氣在内則津液竭少故渇也夫渇數飲其人必眩背寒而嘔者因利虚故也診其脈心脈滑甚為善渇其人乆病變或發癰疽或為水病也紫蘇湯出聖恵方治痟渇後徧身浮腫心膈不利紫蘇莖葉桑根白皮剉赤茯苓去黒皮各一兩羚羊角鎊檳榔剉各三分木香桂心去粗皮獨活去蘆頭枳殻去瓤麩炒各半兩郁李仁湯浸去皮尖炒二兩右㕮咀毎服四錢水一盞生薑半分切煎至八分去滓温服不拘時赤茯苓湯出聖恵方治痟渇後頭面脚膝浮腫胃虚不能下食心胃不利或吐逆赤茯苓去黒皮紫蘇子白术前胡去蘆頭人參各一兩陳橘皮湯浸去白焙桂心去粗皮木香檳榔剉各三分甘草剉炙半兩右㕮咀毎服三錢水一盞半生薑半分拍碎棗二枚擘破煎至一盞去滓温服不拘時防己丸出聖恵方治痟渇瘥後津液枯竭身體虚浮欲成水病防己猪苓去黑皮郁李仁湯浸去皮尖炒杏仁去皮尖雙仁炒各一兩半栝樓根赤茯苓去黒皮葶藶紙上炒桑根白皮剉各二兩白术三分右為細末煉蜜丸如梧桐子大毎服二十丸空腹漿水下但服腫消小便快為度􅜰麥湯出聖濟總録治痟渇欲成水氣面目并膝脛浮腫小便不利瞿麥穂滑石澤㵼各半兩防己三分黄芩去黒心一分桑螵蛸炒十四枚大黄剉炒二分右㕮咀毎服三錢水一盞煎至七分去滓空心温服良乆再服猪苓散出聖恵方治痟渇後四肢浮腫小便不利漸成水病猪苓去黒皮人參各三分木通剉一兩一分黄連去須一兩半麥門冬去心焙栝樓根右為細末毎服一錢温漿水調下日三以瘥為度茯苓散出聖恵方治痟渇後數飲嘔逆虚羸欲成水病赤茯苓去黒皮栝樓根麥門冬去心焙各一兩半升麻一兩桑根白皮剉二兩陳橘皮湯浸去白焙三分右為細散毎服一錢清水調下日再葶藶丸出聖恵方治痟渇後成水病浮腫甜葶藶一兩隔紙炒令紫色杏仁湯浸去皮尖雙仁麩炒㣲黄一兩栝樓子一兩漢防己一兩右為末煉蜜和搗三百杵丸如梧桐子大毎服煎赤猪苓湯下三十丸日三四服蘿蘇散出聖恵方治痟渇後變成水病令作小便出蘿蔔子三兩炒令黄紫蘇子三兩㣲炒右為細散毎服煎桑根白皮湯調下二錢日三四服痟渇後虚乏附論夫乆病痟渇之人榮衛不足筋骨羸劣肌膚痩瘁故病雖瘥而氣血未復乃為虚乏又有縁少服乳石而痟渇者病後津液虚竭經絡否澁亦令虚乏須防癰疽之變救治之法所不可忽黄耆丸出聖恵方治大渇後上焦煩熱不退下元虚乏羸瘦無力小便白濁飯食漸少黄耆剉肉蓯蓉酒浸一宿刮去縐皮炙冷乾鹿茸去毛塗酥炙㣲黄各一兩人參去蘆頭枸杞子白茯苓澤㵼附子炮製去皮臍禹餘糧燒醋淬三徧細研巴㦸桂心牡丹皮五味子龍骨赤石脂各三分熟地黄二兩乾甘草半兩炙㣲赤剉地骨半兩磁石一兩半燒赤淬七徧搗碎細研麥門冬二兩去心焙牡蠣三分燒為粉右為末令勻煉蜜和搗五七百杵丸如梧桐子大毎服三十丸食前用清粥飲下地黄生薑煎出聖濟總録治痟渇後四肢羸弱氣虚乏生薑汁一升生地黄汁五升蜜二斤綿濾過生麥門冬汁三升牛脛骨内髓一升茯神去木甘草炙石斛去根黄連去須各四兩栝樓根五兩五味子㣲炒知母炒人參當歸切炒焙丹參各二兩肉蓯蓉酒浸切焙三兩除前五味子外茯苓等一十一味搗羅末地骨皮剉二升胡麻仁二升萎𬎼剉五兩生竹根剉三兩右先水一㪷五升煮地骨皮等四味至水四升絞去滓下麥門冬地黄汁再煎五六沸却下蜜髓薑汁再煎至七升為膏稀稠得所入前件藥味和為丸如梧桐子大不拘時竹葉湯下三十丸蓯蓉丸出聖恵方治痟渇後氣乏體羸腿脛細瘦肉蓯蓉酒浸切焙黄耆剉牛膝去苗酒浸切焙車前子萆薢白茯苓去黑皮地骨皮黄連去須檳榔煨各一兩半山芋兔絲子酒浸别搗蒺莉子炒去角人參白芍藥各一兩一分澤㵼桑螵蛸炒各一兩枳殻去瓤麩炒三分生乾地黄炒二兩右為末煉蜜丸如梧桐子大毎服三十丸空心粟米飲下填骨煎出千金方治痟渇後虚乏白茯苓去黒皮兔絲子酒浸焙别搗山茱茰當歸切焙各二兩半肉蓯蓉三兩酒浸切焙大豆炒去皮三合石韋去毛一兩三分牛膝酒浸切焙巴㦸天去心麥門冬去心三兩三分五味子人參逺志去心各三兩半桂去粗皮一兩三分附子炮製去皮臍石斛去根各三兩半作石膏右為末用生地黄生栝樓根各三斤搗取絞汁以銀石器慢火煎减半然後納藥并下白蜜十兩牛髓五兩再煎令如糜丸如雞子黄大米飲下日三藥末不必盡入惟㸔稀稠得所甚佳一方無逺志肉蓯蓉散出聖恵方治大渇後下元虚乏日漸羸痩四肢無力不思飲食肉蓯蓉酒浸一宿刮去縐皮炙令乾麥門冬去心白石英細研黄耆剉牡蠣燒為粉磁石搗碎水淘去赤汁各一兩熟乾地黄二分白茯苓牛膝去苖附子炮製去皮臍五味子人參去蘆頭續斷各三分白芍藥桂心萆薢剉地骨皮各半兩右為散毎服用獖猪腎一節切去脂膜先以水一大盞半煎至一盞去滓入藥五錢生薑二分韮白三節煎至五分去滓毎扵食後温服鍾乳丸出聖濟總録治痟渇後虚乏鍊成鍾乳粉續斷熟乾地黄焙石韋去毛山茱茰蛇床子甘草剉炙牛膝酒浸切焙各一兩杜仲去粗皮剉炒三兩三分天雄炮製去皮臍半兩逺志去心一兩三分肉蓯蓉酒浸切焙防風去义石斛去根赤石脂各一兩三分右為細末煉蜜丸如梧桐子大毎服三十丸温酒下茯神煮散出千金方治虚熱四肢羸乏渇熱不止痟渇補虚茯神萎㽔各四兩生石斛黄連栝樓根丹參各五兩甘草炙五味子知母人參當歸切焙各三分大麥蘖炒七合半肉蓯蓉去皮切細酒浸三日取出焙乾秤四兩右件㕮咀毎服五錢水一盞半煎至一盞去滓食前温服磁石散出聖恵方治大渇後虚乏羸瘦小便白濁口舌乾燥不思飲食磁石二兩半搗碎水淘去赤汁熟乾地黄二兩麥門冬一兩去心桑螵蛸三分㣲炒黄耆三分剉人參三分去蘆頭桂心三分白茯苓三分五味子三分甘草一分炙㣲赤剉龍骨三分萆薢半兩剉右為散毎服用獖猪腎一節切去脂膜以水二大盞煎至一盞去滓入藥五錢生薑半分去滓温服晩食前再服石斛散出千金方治大渇後虚乏脚弱小便數石斛去根剉肉蓯蓉酒浸刮去縐皮炙乾各一兩麥門冬二兩去心焙白蒺莉半兩㣲炒去刺甘草半兩炙㣲赤剉乾薑三分炮製剉桂心半兩熟乾地黄三兩續斷一兩黄耆三分剉右為散毎服四錢水一中盞煎至六分去滓食前温服鹿茸丸出聖恵方治大渇後虚乏小便滑數腿脛無力日漸羸瘦鹿茸去毛塗酥炙令乾肉蓯蓉酒浸一宿刮去縐皮炙乾桑螵蛸㣲炒各三兩附子炮製去皮臍五味子白龍骨白蒺藜㣲炙去刺各一兩黄耆剉石斛去根剉兔絲子酒浸三日曝乾别搗為末各一兩半右為末煉蜜和搗三二百杵丸如梧桐子大毎服三十丸空心及晩食前清粥飲下白术散出危氏方治胃虚發渇白术一兩人參白茯苓右為末毎服七錢水一盞半煎至七分服乆渇之後多有腫疾仍頻服復元丹數服鉛丹散一名廣連散治痟渇羸瘦小便不禁方見本門乆渇類牛膝丸出十便良方治痟渇不止下元虚損腎經竭牛膝酒浸切焙五兩生地黄汁五兩右牛膝為末入地黄汁夜浸晝復浸汁盡為度煉蜜丸如梧桐子大空心温酒下三十丸乆服壯筋骨駐顔黑髪渇利後成癰疽附論夫渇利者為隨飲即小便也由少時服乳石乳石熱盛房室過多致令腎氣虚耗下焦生熱則腎燥則渇也今腎氣已虚又不得制扵水液故隨飲即小便也以其病變但發癰疽以其内熱故小便利小便利則津液竭津液竭則經絡澁經絡澁則榮衛不行而熱氣留滯故成癰疽也强中之病者莖常興盛不交精液自出也痟渇之後即作癰疽皆由石熱凢如此等宜服猪腎薺苨湯制腎中石熱也又宜服白鴨通湯磁石丸出聖濟總録治痟渇内虚熱結成癰疽磁石火炮醋淬二七徧甘草炙剉知母焙黄芩去黒心栝樓根各一兩大豆二合石膏碎一兩一分薺苨洗切人參赤茯苓去黒皮葛根剉各三分右為細末煉蜜和丸梧桐子大毎服二十丸温水送下日三服藍葉散出聖恵方治渇利口乾煩熱背生癰疽赤焮疼痛藍葉川升麻麥門冬去心赤芍藥元參黄耆剉甘草生剉犀角屑沈香葛根各一兩川大黄剉碎㣲炒二兩右為散毎服四錢以水一中盞煎至六分去滓不計時候温服射干散出聖恵方治渇利熱盛背生癰疽煩熱肢節疼痛射干川升麻犀角屑藍葉黄芩沈香地榆剉川大黄剉碎㣲炒各一兩栝樓根川朴硝各二兩右為散毎服五錢以水一大盞煎至五分去滓不計時温服元參散出聖恵方治渇利煩熱發癰疽發背焮腫疼痛元參犀角屑川芒硝黄耆沈香木香羚羊角屑各三兩川大黄二兩碎剉㣲炒甘草三分剉右為散毎服二錢不計時候以温水調下八珍散出聖恵方治痟渇後煩熱結成癰疽赤焮疼痛心内煩不得眠卧水銀入鉛丹㸃少水研令星盡栝樓根各一兩苦參剉知母焙各一兩半鉛丹半兩蜜陀僧研牡蠣煆黄連去鬚各一兩右除水銀鉛丹外搗為散入水銀鉛丹末和勻毎服一錢温水調下不拘時石膏湯出聖濟總録治痟渇後成癰疽石膏碎一兩半知母焙一兩半犀角鎊屑一兩栝樓根生者剉去皮細可半斤爛研生布絞取汁合半兩如無炒乾者四兩代之升麻三分土瓜根絞取汁兩合半無生者以乾者四兩代之右除汁外粗搗毎服三錢二藥汁各半合水一盞半小麥少許同煎至六分去滓温服不拘時麥門冬湯出聖濟總録治痟渇後熱毒結成癰疽麥門冬去心焙赤茯苓去黒皮栝樓焙地骨皮洗切各二兩甘草剉炙二兩右件㕮咀毎服三錢水一盞煎至七分濾去滓温服不拘時白茅根飲子一名茅根飲出聖恵方治因服硫黄及諸丹石熱發關節毒氣不得宣通肺燥熱渇利不止及發癰疽發背白茅根一握剉桑根白皮剉麥門冬去心紅雪各三兩赤茯苓三兩一作白茯苓露蜂房一兩炙黄右細剉毎服半兩水一大盞入淡竹葉三七片煎至五分去滓温服不拘時候一方無紅雪有棗二枚鉛霜散出聖恵方治渇利煩熱背生癰疽赤焮疼痛心煩不得眠卧服此鉛霜膩粉栁絮礬川朴硝各一分右為細末毎服以冷水調下半錢日夜可四五服忍冬丸出危氏方治渇疾愈須預防發癰疽忍冬草不以多少根莖花葉皆可用一名老公鬚蜜啜花一名金銀花古纒藤以洗净用之右用米麯酒扵瓶内以糠火煨一宿取出晒乾入甘草少許為末即以所浸酒為糊丸如梧桐子大毎服五十丸至百丸酒飲任下不拘時一方用忍冬花煎服此藤凌冬不凋二月間花開五出黄白相間㣲香蒂帯紅又名金銀花老公鬚數名外科精要又以煮酒窨服取時不犯鐡器服至大小膓通利此藥到得力用乾者不及生者效速仍治五腫飛尸酒研傅瘡亦好但留一口泄毒氣真經效竒藥也不特治癰亦能止渇并五痔諸漏磁石飲出聖濟總録治痟渇後成癰疽亦治痟腎渇燥磁石性𦂳者四兩右用杵碎以五升瓷器中煮取四升候冷不拘多少飲之栝樓根丸出聖濟總録治痟渇後虚熱留滯結成癰疽一名葛根丸方見飲水過度類耆參五味湯出如宜方治腎水枯竭不能運上痟渇恐生癰疽人參五味子粉草炙麥門冬黄耆各等分右㕮咀毎服五錢用水一盞半煎至一盞入硃砂少許去滓温服不拘時候輕則宜服黄耆六一湯渇利後發瘡附論夫渇利之病隨飲即小便也此謂服石藥之人房室過度腎氣虚耗故也下焦既虚虚則生熱熱則腎燥腎燥則渇則飲水腎氣既虚又不能制水故小便利也其渇利雖瘥熱猶未盡發扵皮膚先有風濕風濕相搏所以生瘡也升麻散出聖恵方治渇利後皮膚生瘡肢節疼痛川升麻元參知母赤茯苓漏蘆枳殻麩炒㣲黄去瓤菝葜甘草炙㣲赤剉各二兩赤芍藥三分黄連一兩半去鬚右為細末不計時候以温漿水調下二錢以瘥為度黄耆散出聖恵方治渇利皮膚生熱毒瘡疼痛寒熱口乾心煩黄耆甘草川升麻前胡去蘆頭栝樓根知母麥門冬去心赤芍藥各一兩黄芩生地黄各三兩右為散毎服四錢水一盞入竹葉二七片小麥一百粒煎至六分去滓不計時候温服日三四服皂莢煎圓出聖恵方治渇利後熱毒未解心神煩熱皮膚瘙痒成瘡皂莢十挺不蛀者拍碎用水二升浸一宿冷濃濾去滓以慢火熬成膏麥門冬一兩去心焙烏蛇三兩酒浸去皮骨炙令㣲黄枳殻麩炒㣲黄去瓤白蒺藜微炒去刺防風去蘆頭川大黄剉碎㣲炒杏仁湯浸去皮尖雙仁麩炒黄苦參剉川升麻各一兩右為細末入皂莢膏和搗三二百杵丸如梧桐子大毎服食後温漿水下三十丸元參散出聖恵方治渇利後頭面身上徧生熱毒瘡元參黄芩川升麻連翹葳㽔各一兩犀角屑木香白歛各半兩梔子仁三分右為散毎服四錢水一中盞煎至六分去滓温服日三四服秦芁丸出聖恵方治渇利後肺臓風毒外攻皮膚生瘡瘙痒心煩烏蛇三兩酒浸去皮骨炙㣲黄秦芁去苖枳殻麩炒㣲黄去瓤赤茯苓苦參剉各一兩右為細末煉蜜和搗三二百杵丸如梧桐子大毎服三十丸煎竹葉湯下食後栝樓根散出聖恵方治渇利後心煩體熱皮膚生瘡瘙痒栝樓根赤茯苓各一兩元參枳殻麩炒㣲黄去瓤各一兩甘草炙㣲赤剉苦參剉各三分右為細末毎服一錢不計時候温漿水調下黄耆六一湯出醫大成治男子婦人諸虚不足胸中發悸時常痟渇或先渇而欲發瘡或病癰疽者並宜服之黄耆去蘆蜜塗炙六兩甘草炙一兩右㕮咀毎服三錢水一盞棗一枚煎至七分温服不拘時普濟方卷一百八十
