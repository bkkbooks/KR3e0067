body:
  text: 普濟方卷三百四十六明周王朱橚撰産後諸疾門産後惡露不盡腹痛附論夫産後惡露不斷者盖由臟腑有冷肺氣不調和既産之後惡露乗虛不能制約淋瀝不斷久不已則經血不滎臍腹堅痛靣色菱黄氣短不足是其證也治法宜温補之劑凡姙娠當風取凉則胞絡有冷至於産時其血必少或新産而又風凉皆令風冷摶於血血壅滯則不得宣通蓄積在内則有時惡露不下盡故腹痛也凡婦人大産後或腹臍腰痛乃敗血物之致伏也醫者便作虛冷以燥熱藥治之誤人久矣難經曰諸痛為實者熱也可用導水丸禹功散㵼三五行然後以玉燭散和血通經降火益水之藥治之獨不可便服黑神散燥熱之藥當同半産治之方桃仁湯出千金方治産後往來寒熱惡露不盡桃仁五兩吳茱茰二升黄茋當歸芍藥各三兩生薑醍醐酥鍊柴胡各八兩右㕮咀以酒一斗水二升合煮取三升去滓適寒温先食服一升日三甘草湯出千金方治産乳餘血不盡逆搶心胷手足逆冷唇乾腹脹短氣甘草芍藥桂心阿膠各三兩大黄四兩右㕮咀以東流水一斗煮取三升去滓内阿膠令烊分三服一服入腹中靣即有顔色一旦夜盡此三升即下腹惡血一二升立瘥當養之如新産者大黄湯出千金方治産後惡露不盡大黄當歸甘草生薑牡丹芍藥各三兩吳茱萸一升右㕮咀水一斗煮取四升去滓分四服一日令盡加人參二兩名人參大黄湯蛇黄散出千金方治産後血傷不止或下血痢以蛇黄二十枚火煆醋淬七次搗羅為散毎服三錢米飲送下蒲黄湯出千金方治産後餘積有積血不出腹大短氣不得飲食上衝胷脇時煩憒逆滿手足悁疼胃中結熱蒲黄半兩大黄芒硝黄芩大棗三十枚甘草一兩右㕮咀以水五升煮取一升清晨服五合至日中下若不止進冷粥半盞即止若不下反少與熱飲自下人羸者半之千金翼名大黄湯而不用芒硝銅鏡鼻湯出千金方治産餘疾惡露不除積聚作病血氣結摶心腹疼痛銅鏡鼻十八銖燒末芍藥芎藭乾漆乾地黄芒硝各二兩亂髪雞子大灰大棗三十枚大黄二兩半右㕮咀以水七升煮取二升二合内髪灰鏡鼻末分三服小銅鏡鼻湯出千金方治産後餘疾惡露不除積聚作病血氣結摶心腹疼銅鏡鼻十銖焼末甘草黄芩大黄芒硝乾地黄各三兩桃仁五十枚右㕮咀以酒六升煮取三升去滓内銅鏡鼻末三服亦治遁尸心腹痛及三十六尸疾梔子湯出千金方治産後流血不盡小腹絞痛用梔子三十個以水一斗煮取六升内當歸芍藥各二兩蜜五合生薑五兩羊脂五兩於梔子汁中煎取二升分三服日三生地黄湯治産後三日至七日腹中餘血未盡絞痛生地黄五兩生薑三兩大黄芍藥茯苓細辛桂心當歸甘草黄芩各一兩半大棗二十枚右㕮咀以水八升煮取二升半去滓分三服日三麻子酒出千金方治産後血不去用麻子五升搗碎以酒一斗漬一宿明旦去滓温一升先食服不效夜服一升不吐不下忌房事一月將養如初産法升麻湯出千金方治産後惡物不盡或經一月半歲一歲用升麻三兩以清酒五升煮取二升去滓分温二服當吐下惡物甚良治産後惡血不盡腹中絞痛刺不可忍出千金方大黃黃芩桃仁各三兩桂心甘草當歸各二兩芍藥四兩生地黃六兩右㕮咀以水九升煮取二升半去滓食前分三服治産後惡血不除四體並惡方出千金方用續骨木碎如筭子大以水一斗煮取三升分三服相去如人行十里久間食粥或小便數或惡血下即瘥此木得三遍煮羚羊角散出肘後方治産後惡血下不盡煩悶腹痛方見本門血暈治産後餘血不盡奔上衝心悶腹痛出千金方搗生藕汁取飲二升甚騐一方飲一升治産後有血心煩腹痛出大全良方用生地黃汁不拘多少以清酒一升將地黃汁和煎二十沸分三服又方出千金方用赤小豆搗散取東流水和服方寸匕不瘥更服亦治心悶目不開治産後血不可止者出聖惠方乾菖蒲三兩以酒五升漬煮取三升分再服即止桃仁湯出大全良方治産後惡露方行忽然漸少斷絶不來腰中重痛不止兩腹痛如錐刀刺痛入骨中此由血滯於經絡不即通之有大痛處必作癰疽宜桃仁湯恐作癰者預服五香連翹飲桃仁去皮尖蘇木生地黃各半兩䖟蟲炒去足翅水蛭炒各三十個右為粗末每服三錢水一盞煎至六分去滓温服無時候惡露下即住服五香連翹湯産經治産後惡露不絶者由産後傷於經血虛損不足或分解之時惡血不盡在於腹中而臟腑挾於宿冷致氣血不調血故令淋漓不絶也木香沉香丁香乳香麝香升麻獨活連翹桑寄生木通各二兩右為粗散每服五錢水二盞入竹瀝少許攪停去滓温服一方有大黃一兩療産後惡露不多出大全良方川牛膝大黃各八分牡丹皮當歸各六分芍藥蒲黃桂心各四分右為末生地黃汁調酒服方寸匕日二服血下愈沒藥丸出大全良方治産後惡露方行而忽然斷絶驟作寒熱臍腹百脉皆痛如以錐刺非常此由冷熱不調或思慮動作氣所壅過血畜經當歸桂心芍藥各半兩桃仁去皮尖炒碎研沒藥研各一分蝱蟲去足翅炒水蛭炒各三十個右為末醋糊丸如豌豆大醋湯三丸下澤蘭湯出千金方療産後惡露不盡腹痛往來兼胸滿少氣蓋産後惡露不盡腹痛者何答曰産後惡血雖常通行或因外感五邪内傷七情至截然而止餘血停積壅滯不行所下不盡致令腹痛皆因姙娠當風取凉則胞絡有冷至於産時其血必少减新産時而取風凉此日令風冷摶於血血壅滯則不得宣通蓄積在内有時惡露不盡故令腹痛急引腰背甘草六分大棗十四枚右細切以水九升煮取三升分為三服日三墮身欲死服即瘥救急惡露不盡腹脹痛取亂髪和雞子灰汁洗凈燒為灰酒調服二錢又療産後血不盡痛悶方出肘後方取荷葉燒作灰煖水和服煮取汁亦良熬令香為末煎水下方寸匕又方便産須知治産後下血及姙娠腹脹以鐵秤錘一枚燒赤投酒五升中用此酒煮當歸三兩取二升去滓温再服千金同一方無當歸療産後下血不盡腹内堅痛不可忍出永類鈐方當歸芍藥桂心各三兩桃仁一百二十個右細切以水六升煮取二升分温二服如未瘥加大黄三兩治産後惡露不盡腹痛無計出永類鈐方青木香當歸牛膝川芎黄茋芍藥各八分大黄十三分浸芒硝十二分右細切以水七升煮取二升入大黄更煎三沸分三服治産後惡露不盡結聚小腹疼痛出永類鈐方當歸三分香附子一兩琥珀没藥青皮赤芍藥木香桂心各半兩右為細末以豆汁酒調下一錢地黄飲出㧞粹方治産後惡露不盡腹内疞痛産後常服甚妙生地黄當歸炒各一兩生薑細切如蠅頭大新瓦上炒令焦墨半兩右為細末以薑酒調一錢下紫金丸一名失笑㪚出大全良方治産後惡露不快腰痛小腹如刺時作寒熱頭痛不思飲食亦治久有瘀血月下不調黄痩亦治心痛五靈脂淘去石炒乾醋炒末真蒲黄右以好米醋調五靈脂末慢火煎成膏子次以蒲黄末搜和丸如櫻桃大每服一丸水與童子小便各半鍾煎至七分令藥化温服之少頃再一服惡露即下久有瘀血成塊月水不利並用酒磨下及治心腹痛欲死百藥不效生地黄湯治産後餘血不盡奔衝心煩悶腹痛方見本門惡血衝心類沒藥丸出大全方治産後心胸煩燥惡血不快沒藥研蠻薑延胡索乾漆炒當歸桂心牛膝牡丹皮乾薑各等分右為細末醋煮麫糊為丸如梧桐子大煎麯湯下十丸至十五丸大調經散出經騐良方治産後血虛惡露未消氣為敗滯榮衛不調隂陽相勝憎寒惡熱自汗氣衝皆血虗氣衝所為也大豆一兩半炒去皮茯神一兩真琥珀一錢右為細末濃煎烏豆紫蘇湯調下喘急煩滿小便不利者亦可治産後穢不盡痛出聖惠方用延胡索為末熱酒調下三錢治産後惡物上潮痞結大小便不通出神效方芒硝蒲黄細墨各等分右為末童便半盞服之玉燭散以四物湯承氣湯樸硝等分水煎去滓食前服當歸養血丸出和劑方治産後惡血不散發熱疼痛及惡露不快臍腹堅脹並室女經脉不調赤白帯下心腹腰脚疼痛當歸赤芍藥牡丹皮延胡索各二兩炒桂心一兩右為末蜜丸如梧桐子大温酒米飲下三十丸食前温服痛甚細嚼咽下青金散治婦人産後惡露不快腰腹疼痛不快當歸一兩焙甘草半兩炒沒藥自然銅三兩醋汁右為末每服一錢熱醋食前調下走馬散出海上方治産後惡露不散臍下疼若刀攪㡬死者當歸一兩紅花二錢半蘇木二錢半沒藥二錢半官桂去皮二錢半右為末毎服三錢好酒一大鍾煎三五沸和滓温服食先遇仙湯治惡露不快腸痛滿脹者血室有冷滯不快若腹疼如刺者舒眉煎惡心者壯氣丸熱者逍遥散無憂散主之當歸桂心各半兩白芷甘草各三分右㕮咀水煎食前熱服治婦人小産惡物滯注不通兩脇脹滿小膓絞痛不可忍者或變成乾血癆五心煩熱月水不通並治之當歸芎藭芍藥熟地各一兩川楝子和核研用𤣥胡索各二兩右為末每服二兩重水八合好酒大盞煎至七分去滓温服空心滓再煎取下惡物為妙治産後餘血不盡流入腰脚疼痛至甚者用五積散加桃仁煎服一名如神湯此藥速敗血去風濕産後惡露方行忽然斷絶不來腰中疼注兩腿刺痛如錐刀痛入骨此由血滯於經絡不即通之有大痛處必作癰疽宜桃仁湯恐作癰者預服五香連翹散治産後惡露不快及血暈以三月採取益母草洗擇令乾於箔上攤暴令乾别用㧞斷可長五寸以來忽用刀即置鍋中以水二碩以來令草上水深二寸三寸煎煮令益母草爛水三分减二漉出草取五斗汁㵼入盆中澄之半日以來以綿濾取清汁盆中滓澱盡弃之其清汁於小釡中慢火煎取一斗以來如稀餳毎取梨許大熱酒和服之日再服水和羮粥一二服差如遠行不能稀煎即更煉可丸每服之七日内則疼痛漸瘳七日平復治女子胞中餘血不盡欲死者並治煩悶腹疼用鹿角燒灰以清酒調服方寸匕日三夜一煮豆汁調服亦得不能用豆清煮水作湯用之治産後猶覺有餘血水氣用黒豆五升淋酒煎之令烟絶出於瓷器中以酒一斗淬之治破産婦滯血用鯉魚煙絶研酒方寸匕治産後穢疞下不盡腹疼用生薑二觔以水煮取汁服即出治破血以漬苧與産婦温服之黄芩湯治産婦腹中滿疼惡露不盡黄芩去黒心芍藥赤茯苓去黒皮大黄熟地黄焙各一兩厚樸去皮薑汁炒乾薑炮桂去皮各一兩一分䖟蟲去翅足炒甘草炒桃仁湯浸去皮尖雙仁炒黄各半兩枳實去瓤麩炒白术各一兩半芒硝一兩右粗搗篩每服三錢水酒共一鍾去滓温服地黄湯治産後腹疼餘血未盡不進飲食芍藥甘草炙各一兩丹參一兩半右搗篩每服三錢水一盞煎至七分去滓入地黄汁一合蜜半合生薑汁一合煎數沸空心温服芎藭湯治産後惡血不下盡心腹疞痛芎藭一兩半大黄剉炒二兩芍藥一兩半黄芩去心一兩桂去皮壹兩甘草炙一兩當歸切焙二兩熟乾地黄焙一兩桃仁湯浸去皮尖雙仁炒黄各半兩右搗篩為末每服三錢水一鍾煎七分去滓空心服牡丹飲治産後腹中惡血不除苦身强痛牡丹皮一兩大黄炒一兩桂去皮一兩桃仁湯浸去皮尖雙仁炒令黄四十枚右搗篩毎服三錢水一鍾煎七分去滓空心温服當歸湯治産後惡血不盡當歸切焙三兩桂去皮二兩荷葉蔕三七枚右搗篩每服三錢水酒各一鍾入薑三片同煎七分去滓温服早夜各一服蒲黄飲治産後惡血不盡攻心乏力腹痛脹滿頭痛蒲黄炒一兩半芒硝研三分芎藭半兩桂去皮半兩鬼箭半兩生乾地黄焙半兩桃炒二十枚右搗篩毎服三錢棗三枚擘水一鍾煎至七分去滓温服地黄飲治産後惡血不下或有熱補虛調氣生地黄汁半大鐘桂去皮半兩黄耆剉三分麥門冬去