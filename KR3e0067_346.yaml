服日三艾葉飲治産後惡露不絶心悶氣短艾葉當歸切焙人參地榆乾薑炮阿膠炙令燥生乾地黄焙各一兩右粗搗篩毎服二錢煎一盞水至七分去滓温服日三阿膠散治産後惡露不絶阿膠炙令燥牛角䚡燒灰龍骨煆各一兩右搗篩為散每服三錢薄粥飲調龍骨丸出千金方治産後虛冷下血及惡露不絶及治榖下晝夜無數龍骨細研四兩乾薑炮甘草炙桂去粗皮各二兩右為末煉蜜丸如梧子大毎服二十丸温酒早晨午晩間各一服一方用人參地黄各二兩虎掌飲治産後惡露過多心悶氣無力不能食虎掌當歸切焙艾葉炒各一兩人參半兩地榆三分生乾地黄焙一兩一分右搗篩每服三錢以生薑三片水一盞煎至七分去滓温服人參飲治産後惡露多下短氣乏力人參半兩當歸焙二兩半生乾地黄焙二兩地榆一兩右粗搗篩每服三錢生薑三片水一盞同煎至七分去滓温服地榆飲治産後惡露不多心煩氣短减食多倦地榆一兩當歸切焙艾葉人參各二兩桂去粗皮一兩生乾地黄焙三兩右粗搗篩每服三錢以水一盞入生薑三分同煎去滓空心温服一方無桂桑甘飲治産後下血不止桑甘微炙芍藥地榆茜根牛角䚡燒灰阿膠炙令燥各一兩艾葉雞蘇各三分白龍骨二兩右粗搗篩每服二錢水一盞煎至七分去滓温服早晨日午夜卧各一服芍藥丸治産後血下不止芍藥阿膠炙令燥各一兩半當歸切焙三分烏賊魚骨去皮甲一兩右為末煉蜜和丸梧桐子大空心以䓤湯下三十丸日三地黄丸治産後惡露不斷生乾地黄焙當歸切焙阿膠炙令燥黄耆剉各一兩艾葉炙三分生薑切炒一分右為末醋煮麫糊和丸如梧桐子大每服三十丸温酒或米飲下不拘時秦艽湯治産後惡露不斷秦艽去苗𤣥參芍藥各一兩艾葉炙白芷續斷當歸切焙各一兩半右粗搗篩毎服二錢水一盞生薑三片煎至七分去滓服不拘時寄生丸治産後惡露不斷桑寄生剉炒附子炮製去皮臍芍藥各一兩地榆剉炒白龍骨各一兩半雞蘇三分右為末煉蜜和丸梧桐子大每服三十丸温酒或米飲不拘時治一切宿血及傷損瘀血在腹内不問新久并婦人月經不通産後惡血不下皆良大黄芒硝各三兩桃仁四十枚去皮尖右芒硝桃仁合搗四五杵以酢漿二升半漬一宿空腹擾調頓服之不能頓服者分作兩服良久先下糞次下如豆泥汁或黒血為騐强人日别服一劑弱人兩日服之下血盡便止不過三兩劑忌生冷茶葵治産後若惡露下多少得所寒熱得調更無餘狀但覺腹内切痛可而復當歸五兩生薑六兩桂心三兩芍藥二兩右切以水酒各三升半煮取二升三合去滓分温三服忌生葱治産後惡露雖下不甚通利遂覺心腹滿悶脇肋脹妨兼咳喘息急不能飲大便不通眼澁坐𧺫不穏心腹時時痛宜服出大全良方白术當歸桑白皮大黄各三兩生薑四兩細辛桂心各二兩右以水八升煮取二升六合去滓分温三服此藥當得利大利不宜只取㣲利縁初産時體虛尚藉藥食補之豈宜大利此緣病熱既不可勿以當途此湯得通息安貼利脱未止須斷之取三兩匙酢飲飲之即止適寒温將攝佳忌桃李雀肉生葱生菜如利不减宜服後方當歸丸出大全良方如利後諸疾不减當歸十分白术八分甘草炙七分生薑六分桑皮六分桂心三分人參三分細辛四分右搗篩蜜丸梧桐子大以酒下十五丸至二十丸忌如常法治婦人小産惡露淋瀝不斷將近月餘諸藥不效用真五靈脂炒微焦為末飯糊丸梧桐子大毎服三四十丸米飲送下酒亦得應手而有效阿膠散出聖惠方治産後惡露不絶心腹疼痛不思飲食阿膠一兩炙令黄燥芎藭一兩艾葉半兩微炒當歸一兩剉微炒桂心一兩地榆一兩剉甘草半兩炙微炒厚樸二兩去粗皮塗生薑汁炙香熟右搗篩為散毎服三錢以水一中盞入棗二枚煎至六分去滓不計時候温服龜甲散出聖惠方治産後惡露不絶腹内疞刺疼痛背膞煩悶不欲飲食龜甲一兩塗散炙令黄當歸三分剉微炒乾薑一分炮裂剉阿膠半兩搗碎炒令黄燥訶梨勒一兩煨用皮龍骨一分赤石脂半兩艾葉半兩㣲炒甘草一分炙微赤剉右搗細羅為散不計時侯以熱酒調下二錢艾葉散出聖惠方治産後惡露不絶臍腹時痛艾葉三分微炒當歸三分微炒白芍藥一兩芎藭半兩熟乾地黄一兩半續斷一兩牛膝半兩去苗桑耳半兩敗醬三分右搗羅細為散毎服食前以薑粥調下二錢鹿茸散出聖惠方治産後臟虛冷致惡露淋瀝不絶腹中時痛靣色萎黄羸瘦無力鹿茸一兩去毛塗酥炙令黄卷栢半兩桑寄生半兩當歸半兩剉微炒附子半兩炮去皮臍龜甲一兩塗酥炙令黄續斷半兩白芍藥半兩阿膠半兩剉碎炒令黄燥地榆半兩剉熟乾地黄半兩右搗細羅為散每服食前以生薑温酒調下二錢普濟方卷三百四十六
