body:
  text: 普濟方卷三百六明周王朱橚撰諸蟲獸傷門諸蟲獸傷凡一切蟲獸所傷及背瘡腫毒杖瘡焮發或透入裏者可服木香檳榔丸七八十丸或至百餘丸生薑湯下五七行量虛實加減用之內經曰先治內然後治外是也又云犬咬蛇傷不可便貼膏藥及生肌散之類內經云先治內後治外可也先當用導水丸禹功散通經散㵼十餘行即時痛減腫消然後可用膏藥生肌散之類傅之則愈方豆䓻散治驢涎馬氣駱駝騾子子狗子蛇傷肉豆䓻二箇自然銅二錢燒酥檳榔一箇板藍根三分蚛桑子二錢甘草三錢烏梅四箇川鳥頭一箇燒金毛狗脊一箇去毛紅花二錢紅芍藥三分茅香三分甘柿蒂一十四箇川楝子四箇香附子二十一箇苦丁香七箇官桂一分半去皮乳香二分右為細末每服二分溫酒一盞調下如生氣食後服熱氣食前如要驗中毒喫大麥麵拌羹吐逆者是不吐非也又一管見如喫大麥麵羹一二碗令病人極吐後諸藥大效雄黃散用搗麻子汁飲之大效或用雄黃乾薑塗之蔦莧散用蔦莧汁塗之或用烏梅巴豆各等分塗之硫黃散治熊虎爪牙所傷毒痛用雄黃硫黃紫石搗末以絳囊盛之帶以防用雄礬散用雄黃礬或用飛丹礬塗之麝香散治鼠咬用貓毛燒灰麝香少許津唾調傳一方麝香封上用帛繫之葛根散治熊傷人瘡用燒青布薰瘡口毒出仍煮葛根汁令濃以洗瘡日十度并搗葛根為散煮葛根汁服方寸匕日五服瘥治虎咬瘡方用濃煮葛根汁洗十數遍及搗為散以葛根汁服方寸匕日五甚者夜二服一方以嫩絮骨燒灰為末乾傅瘡處一方用白礬為末納瘡口中痛止立效一方溫水服又方用青布捲為繩燒一頭燃內竹筒中注瘡口薰之極效又方用嚼栗子塗之良治豬嚙方用松脂煉作餅子貼上又方用屋霤中泥塗之治熊虎所傷毒痛用煮生鐡令有味以洗之治熊傷人瘡用蒴藋一大把銼碎以水一升漬須臾取汁飲餘滓封裹瘡治虎犬咬蛇咬用飲薤汁一升日三瘥又杵汁傅之治貓兒傷用薄荷汁塗之若中貓涎入瘡則令人悶浸椒水調莽草末塗之治蛇犬毒入用黃藥子末傅之治狗咬蚍蜉瘡蛇咬用山豆根並以水研傅之治蛇犬咬用熱人尿淋患處良治虎犬傷用糝礬末內瘡口申裹之痛止立效治虎傷但飲酒常令大醉當吐毛出又方用鼠一枚燒為灰細研先用漿水洗身後傅之甚良治虎咬瘡方用嚼粟米塗之即瘥治惡蛇風犬所傷用唾調人耳塞塗傷處兩頭防毒走散然非數人耳塞不可此極驗又方用萆麻子為細末臘水化白蜜調傅傷處可又辟虎法凡入山用燒水牛羖羊角虎狼蛇皆走治虎傷用生野葛汁塗乾薑末內瘡中治貓兒所咬成瘡不效右以鼠血塗之立瘥山林日用法每欲出行時用雄黃一桐子大火上燒煙右以薰腳綳草屨之類及袍袖間即百毒不敢侵害邪祟逺辟治虎傷人瘡取生葛根煮濃汁洗瘡兼搗葛根水服方寸匕日夜五六服治虎狼傷瘡以月經衣燒末傅之主人畜為虎狼等傷恐毒入內者取芒莖雜葛根濃煮服之效石芒生髙山如芒節短江西人呼為折草六月七月生穗如荻也治虎傷以細辛雄黃等分為末內瘡中日三四易之治虎及狗咬瘡用豬膏莓搗傳之至良治蟲豸咬傷取大藍汁一碗入雄黃麝香二物隨意看多少細研投藍汁中以點咬處若是毒者即并細服其汁神異之極也昔張薦貟外在劔南為張延賞判官忽被斑蜘蛛咬項上一宿咬處有二道赤色細如箸繞項上從胸前下至心經兩宿頭面腫疼如數升碗大肚漸腫幾至不救張相素重薦因出家財五百千延賞家財又數百千募能療者忽一人應召云可治張相初甚不信欲驗其方遂令目前合藥其人云不惜方當療人性命耳遂取大藍汁一瓷碗取蜘蛛投之藍汁良久方出得汁中甚困不能動又别搗藍汁加麝香末更取蜘蛛投之至汁而死又更取藍汁麝香加雄黃和之更取一蜘蛛投汁中隨化為水張相及諸人甚異之遂令點於咬處兩日內悉平愈但咬處作小瘡痂落如舊驢馬傷附論人誤被馬咬或踢踏傷損肌肉腫痛若不即治毒氣日深傳入臟腑有致死者宜急治之夫驢馬氣之病醫流少有知之者凡人宰殺驢馬及自死開剝不可犯之如開剝驢馬時切忌手指間有瘡痕及誤傷刃其涎入內毒氣發也剝活馬毒少有若自死者大毒殺人命名曰中生氣煮肉之時其半生半熟有白色時毒殺人名曰中熟氣其毒入內初時便不覺頭疼體熱走注疼痛寒熱無時而作起居如常如要知之用麥麵稀湯多飲之即吐涎此知是驢馬之毒也如不吐者非也急用豆䓻散或虎骨酒飲之即可如不知者久淹日月其毒發則如眼中出其眼即枯如臂中出其臂必傷腿中出腿必瘤幸然存命也如不然則病必篤遍身腫毒而膿出肉爛死者甚衆應驗方云余年幼時大安元年在洛南縣住親見官中倒死鋪馬命衆屠行開剝此時七人到此開剝之其人皆死後常見此證死者甚衆余深究其法於屠户中受此方屢經大效不忍祕之大抵頭目疼身熱比傷寒相似如走注疼痛起居如常此為異耳方殭蠶散治被馬咬傷損皮肉疼痛馬鞭稍五寸燒灰雄鼠糞炒二十枚白殭蠶炒半兩右搗為末以豬脂二兩調傅咬處日三易良立效散出千金方治馬囓人及踏人作瘡毒腫熱痛馬鞭稍二寸長鼠屎二七枚用合燒為末以豬膏和塗之立愈治遂成瘡爛經久不愈者以馬鞭皮燒末豬膏和塗虎骨酒治驢馬氣傷瘡毒虎骨酥炙半兩木香三錢右為細末分作二服酒調服之治馬踢傷出經驗良方用地骨皮不拘多少為末以水調傳瘡甚效桑皮散出千金方治馬囓人隂卵脫出用推內入以桑皮細作線縫之破烏雞取肝細銼以封之且忍勿小便即愈治馬犬嚙及馬骨刺傷人及馬血入舊瘡中方用取桑灰汁熱漬瘡常令汁器有火數易汁勿令爛人肉三數日漬之有腫者炙石尉之日二消止治剝馬被骨刺破毒欲死右以婦人月水傅瘡口立效治馬咬人瘡有毒腫疼痛又剝驢馬傷手出聖惠方用雞冠血著瘡中三下兒馬用雌牝馬用雄一方用熱雞血浸之茺蔚散治馬咬以益母草細切和醋炒封之效益母草即茺蔚子也治馬咬傷出傳信適用方用燒獨顆栗子灰貼瘡追毒治馬咬人或刺破瘡及馬汗入瘡毒痛用馬糞燒灰為末研傅瘡上及馬尿洗瘡佳治驢涎馬汗毒所傷神效白礬飛過黃丹炒令紫色各等分相滚合以貼患處治馬咬人毒入心方出聖惠方用馬齒菜子搗為散每服一錢溫酒調下不計時侯馬齒湯食之差又方用蓼藍汁三大盞水二盞煎至一大盞溫服二合不計時侯兼用洗瘡良治馬咬人及踏人瘡有毒腫熱痛方用灸瘡中腫上瘥猘犬嚙附論凡春末夏初犬多發狂必誡小弱持杖以預防之防而不免者莫出於灸百日之中一日不闕者方得免難若初見瘡瘥痛定即言平復者此最可畏大禍即至死在旦夕凡狂犬咬人著訖即令人狂精神已别何以得知但看灸時一度火下即覺心中醒然惺惺了了方知咬己即狂是以深須知此此病至重世皆輕之不以為意坐而死者常年有之凡猘犬咬人七日輒應一發三七日不發則脫也要過百日乃得免耳每到七日輒當搗韭汁飲一二升又當終身禁食犬肉蠶蛹食此則發死不可救矣瘡未愈之間禁食生魚及諸肥膩冷食但於飯上蒸魚及於肥膩器中食者便發不宜飲酒能過一年乃佳乃若人曽食落葵中犬咬必難治若已瘥十數年後食之者便發也若重發者生食蟾蜍鱠絶良亦可燒炙食之不必令其人知初得嚙毒便為之則於後不發也儒門事親書云麻先生兄材行為犬所嚙舁至家脛腫如罐堅若鐵石毒氣入裏嘔不下食頭痛而重往問戴人女僮口誦隨利減以檳榔丸下之見兩行不瘥適戴人自舞陽回謂麻曰脛腫如此足之二隂三陽可行乎麻曰俱不可行如是何不大下之乃命夜臨卧服舟車丸百五十粒通經散三四錢比至夜半去十四行腫立消作胡桃紋反細於不傷之脛戴人曰慎勿貼膏紙當令毒氣出流膿血水常行又一日戴人恐毒氣未盡又服舟車丸百餘粒濟川散三四錢見六行病人曰十四行易當六行反難何也戴人曰病盛則勝藥病衰則不勝其藥也六日其膿水盡戴人曰膿水行時不畏風盡后畏風也乃以愈風餅子日三服之又二日方與生肌散一傅之而成效嗚呼用藥有多寡便差别相懸向使不見戴人則利減之言非也以此知醫已難用醫尤難方桃白散出聖惠方治猘犬咬人毒氣攻心悶亂方桃白皮三兩甘草半兩炙微赤銼杏仁三十枚湯浸去皮尖雙仁麩炒微黃而成膏桂心一兩右細銼以水三大盞煎至一盞去滓入杏仁膏攪令勻分為二服良久再服蟬花散出衛生寶鑑方治夏月犬傷及諸般損傷蛆蟲極盛臭惡不可近之者蛇退皮一兩用炭燒存性研為末蟬殼半兩青黛半兩華隂細辛三錢半右為細末每服三錢酒調下如六畜損傷成瘡用酒灌如犬傷用梅子和喫蛆皆化為水蠅子不敢再落又以生寒水石末糝上韭根散出聖惠方治猘犬咬人疼痛不止方䜴一合雄鼠糞一兩杏仁韭根各一兩右件藥相和爛研傳破處良金黃散出聖惠方治狂犬咬傷損疼痛方白礬一兩燒灰硫黃梔子灰各半兩右件藥都研為末傅咬損處即瘥杏豆散治療狂犬咬方杏仁切去皮尖豆豉各一兩韭根一握淨洗右搗為餅可瘡大小厚一二分貼咬處大作艾炷以灸餅上熱即差猬皮散出千金方治猘犬毒方頭髮猬皮各等分右燒灰水和飲一杯口禁者折齒內藥枸杞散出聖惠方治犬咬方枸杞葉少許鹽少許右同搗令熟后傅於瘡上即愈杏桃散出聖惠方治狂犬咬人傷痛方杏人四十枚去皮尖雙人拍碎桃白皮切二升右用水二升先煮桃皮取汁一升去滓下杏人再煮減半去滓溫分三服得吐乃效金粒丹治風狗毒蛇所傷雄黃一兩透明者大硃砂一錢右研極細旋取溫蟾酥為丸如麻子大每服一丸溫酒下不忌口一服奏效立效散治風狗所傷蒜杏仁右各等分一處搗爛次用些少消風急風散一捻在蒜內連瘡口四畔傅訖將艾炷灸之次服消風急風二散忌鱔鰻發風等物定風散出衛生家寶方治風狗咬破先口噙漿水洗淨用綿揾乾貼藥更不再發天南星生防風各等分右為細末乾上藥更不再發無膿大有神效不可具述凡惡犬傷人咬破多或一二年三年至七八年咬破處或時疼痛或先發增寒甚至發風遍身搐搦數日不食十死八九余親見者數十人服此藥但凡犬咬破者無有不愈雄麝散出醫方集成治猘犬傷或經久復發無藥可療者用之極驗雄黃色黃而明者五錢麝香五分右各等研和勻用酒調二錢服如不肯服者則撚其鼻而灌之服藥后必使得睡切勿驚起任其自醒候利下惡物再進前藥即見效矣終身禁食犬肉蠶蛹此毒再發則難救梔子散治療狂犬咬方梔子皮燒灰石硫黃末用搗為末傅瘡日一易救急用二三度差虎骨散治療狂犬咬方虎骨石灰右二味以臘月豬脂和作餅子暴乾搗末以傅之良治凡犬嚙人方出千金方用取竈中熱灰以糝瘡中帛褁繫之又方出千金方用燒自死蛇一枚令焦為末內瘡孔中又方出千金方用鼠屎為末以臘月豬膏傳之或用鼠一枚豬膏煎傅之又方出千金方用飲生薑汁一升一方用白薑炙尉之良韭汁亦佳治狂狗咬出本草用菘耳葉煮服之又方出千金方用燒犬尾為末傳瘡日三又方出千金方治犬咬人重發瘡用頭垢少許內瘡中以熱牛糞塗之佳又方出千金方治凡犬囓人用苦酒和灰塗瘡中治小兒狗囓方出千金方用月一日以水一升灌之勿令狗主打狗若月盡日三升水灌之治猘犬毒方出千金方用搗韭絞取汁飲一升日三瘡愈止愈後復發者用韭根故梳二枚用水二升煮一升頓服又方用刮虎牙若虎頭骨為末酒服方寸匕或刮狼牙骨末服已發狂如猘犬者服即愈又方用髮及猬皮少許燒灰水和服之又方出千金方用燒虎骨傅瘡及尉之又微熬杏人搗研取汁服之良又取燈盞殘油灌瘡口此皆禁酒豬肉魚生菜又方出千金方用桃東南枝白皮一握水二升煮取一升分二服吐出犬子又方出千金方用服莨菪子七枚日一度以水服之差止又取其猘狗腦上毛燒灰傅瘡上不發一方用莨菪爛搗和鹽傅之又方出千金方用梅子末酒服之又方出千金方用豆醬清塗之日三四差治狂犬囓人方出千金方用蛇脯一枚炙去頭搗末服五分匕日三又方出千金方用青布浸汁服三升又方出千金方用飲驢尿一二升或驢屎汁飲一升即差治風狗傷出濟生拔粹方用口噙漿水洗淨以乾薑末塗貼又方出濟生拔粹方用吮去血漿水洗畢紙上炒黃丹赤色貼之蟾蜍灰散出肘后方治狂犬咬人重發者用蟾蜍三個燒灰搗羅為末每服二錢溫水調下服時不得令人知一方焙乾傅之又剝作鱠吞蒜虀下治猘犬咬人毒氣攻心悶亂方用蝦蟆一枚燒灰細研為末以粥飲調服之即愈一方蝦蟆作膾而愈一方用砂糖同搗汁服沈約宋書曰張收嘗為猘犬所傷醫云宜食蝦蟆膾收甚難之醫含笑先嘗收因此乃食瘡亦即愈治猘犬囓重發方出聖惠方用乾薑搗為細末每服二錢以溫水調下不拘時侯一方用末傅瘡口立差治犬咬成瘡漏方出聖惠方用石灰細研為末以醋和塗瘡上治犬咬方出聖惠方用取地龍爛搗封根咬處當有毛或收得乾者搗末用油調封之又方出聖惠方用闕燒灰細研為末以醋調塗之治狗咬用杏仁研細先切䓤湯洗然後傅塗傷處一方同馬藺根研細塗之一方搗杏仁傅之服汁亦佳熬成膏令黑傅亦可又方出危氏方用萆麻子五十粒去殼井水研成膏先以鹽水洗咬處次以此膏傅貼或用虎骨末及虎膏一方無虎骨末莽草散出危氏方治狗咬涎入瘡令人昏悶用上好浸椒水調莾草末塗之又方出仁存方治虎犬咬人用白礬為末糝瘡內裹之立愈治犬咬凍瘡出危氏方並以秫米嚼傅治狂犬咬人出聖惠方用蚯蚓屎和鹽研封狂犬傷毒處出犬毛殊有神效一方井口蚯蚓糞濕傅瘡上以物包定即差治療猘犬咬人出醫方大成用仍殺所咬犬取腦傅之後不復發治猘犬咬人出千金方用煮地榆汁飲之兼末傅瘡上服方寸匕日三服忌酒若治瘡已差者搗生韭汁飲之一二升一方無韭汁地榆絞汁無生者乾水煮飲之傅上一方為散水調服二三錢日三次服兼可傅瘡上過百日止解狗毒杏人礬石韭根人尿各等分研細爛傳毒處治犬咬人重發用服蔓菁汁佳一方地榆為末咬處立差治狗咬傷用鍋墨為末桐油調塗又方用嚼杏仁沃破處以帛繫定一方以人屎汁傅尤良治癩狗傷用真茶末桐油濃調塗傷處治顛狗咬人用清油泥於破咬處擦成條搯斷看油泥內直至無狗毛為度如有毛更擦然後用水調嫩米粳為膏貼之此一方賀都目傅清油泥俗云油屎治顛狗咬人出經驗良方用斑貓七箇去翅足為末夏間豆豉四十九粒去皮滴水研為膏入和班貓末為丸如梧桐子大盡數服白熟水下却將穢桶盛水令病人尿小便於內停半日見小便桶內水中氣凝結如狗形則愈如不下再合服至七次始獲全安清油散出經驗良方治顛狗咬人用生麻油滴䜴為膏彈子大常常拭揩所咬瘡口分開䜴彈見有狗毛茸茸此毒出即安至無茸毛為度日間常行食用加杏子食之尤妙又方出經驗良方凡被癲癩狗咬不可便用水洗及飯擦可用草藥名鐵薄荷又名接骨草用葉并根梗以水洗去土擂爛傅傷處用絹帛包定無令著水神效其草如菊花葉兩葉相對到秋有青花如小蓼花相似治風顛狗咬人出經驗良方用前方須要服藥後方可常食杏仁逐其毒又方出德生堂方用班貓七箇去頭足翅研為細末溫酒調服其毒亦從小便中出膏膜形如狗狀如小便雖出不見狗形須服七次方可如大小便俱澀不下却用火麻燒灰存性同沒藥末茶各少許用溫湯調服引導其毒即下又方出經驗良方當時被咬如藥不便隨即用生䓤連白不以多少擂爛先塗咬傷處然後服前藥虎骨膏治犬咬有一人被咬以蚯蚓屎黃泥各少許入些虎骨同調傅瘡口上一服便愈曽有驗治狗咬著破傷風欲死者用遍白狗糞燒灰溫酒下神效紫荆皮散治狂犬傷人先以杏仁搗爛焙去毒以紫荆皮煎水又以沙糖調紫荆皮末塗治風狗咬用路厠架上乾屎刮下用帶皮柳木捶熟搗成膏攤紙上貼傷處睡去睡覺則汗出而愈永不再發不忌口治猘犬咬人出肘後方用搗乾地黃汁飲之并塗瘡口上百度止立效散治風狗咬傷用餓老鷹膽一箇溫酒調下或四十日或百日不瘥者不過三服愈治顛犬所傷出醫方集成用斑貓大者二十一隻去頭翅并足用糯米一勺先將斑貓七枚入米內於微火上炒不令米赤去此斑貓别入七隻再於前米內炒令斑貓色變復去之又别用七隻如前法炒以米出青煙為度去斑貓不用以米研為粉用冷水入清油少許空心調服須又再進一服以小便利下惡毒為度如不利再進一服利后腹肚疼痛急用冷水調青靛服之以解其毒否則有傷或煎黃連水亦可不宜便食熱物治猘狗囓用葛根末傅之觸骨散出肘後方治狂犬咬人及諸犬咬瘡不瘥吐白沫者為毒攻入心人煩亂喚呌作犬聲者方用髑髏骨燒灰末以東流水和服方寸匕以活止凡狂犬咋人七日輒應一發過三七日不發則免也要過百日乃為大免每至七日輒當搗薤一作韭汁飲二三升又當終身禁食犬肉蠶蛹若食此發則不可救矣瘡未瘥之間亦忌食生物諸肥膩肉及諸冷食但於飯上蒸生魚及就膩器中食便發不宜飲酒能過一年乃佳杏仁膏治狂犬咬人凡被狂犬咬人即急嗍去血急吐之勿錯咽之然后搗杏仁和大蟲牙捻作餅子貼瘡上頓灸二七壯從此已后每日灸一兩壯貼杏仁餅子灸之須要滿百日乃止百日內必莫斷使瘡瘥如無大蟲牙單用杏仁亦可狂犬咬人每至七日即合一發但至七日即須搗韭汁服一大合日再服之縱非至七日但一日兩日服一兩合大妙如冬月無韭取韭根搗汁服之又三兩日取杏仁一合搗碎熟研濾取汁和大蟲牙齒骨亦可用熟煎取一大升汁又燒竹瀝一合以和杏仁酪汁更煎一兩沸分三服一日使盡又取所咬犬腦以塗瘡大佳取大蟲牙齒末或大蟲脂塗之更佳須忌酒治救急療狂犬囓人旡問深淺者方初被咬便以冷水洗令血斷封裹著如其瘡大及深宜放流水中浸之血斷依法封裹更不用餘藥忌風千萬可畏凡初被咬即覔一切物與喫后不發也治風狗咬出瑞竹堂用桃核殼半箇將野人肝即人之大糞也填滿以榆皮蓋定掩於傷處用艾於桃核上灸二七十四炷即愈永不發作治風犬傷用白糞蟲去肚中黑研之一二碗頭頂上有赤髮多火拔去以蟲傅之治療猘犬咬人方出千金方用火炙蠟以灌瘡中一方挼蓼以傅瘡上又方用白芷末湯茶調服永不發又方用槐皮並葉傅之又方用枇杷葉以臘酒一瓶新開傾出酒令乾將枇杷葉火上燒過作黑色捺入瓶中用紙密蓋一碗飯時取出葉灰研為細末糝於被傷處隨即痛定痊可絶妙皂角散治療猘犬咬人方用淨洗口以獨蒜切片子安在口上却用䓤鹽全蝎皂角四味同擂細安在上用艾灸黃水出為度治狗咬傷方用磚青和牛糞傳之治狂犬出肘後方以犬腎心搗傅咬處治狂犬咬寒熱欲發者刺熱人血飲之治狂犬毒入心悶絶不識人方出聖惠方用取黑豆煮汁服之甚良治犬咬方出千金方用熱牛糞塗傅咬處佳如無濕糞以乾糞為末小油調塗立效風狗亦無害治狂犬嚙人出聖惠方用乾蛇一條酒浸炙令黃色又搗為末水調二錢日四五服治犬咬人傷處毒痛心悶方出聖惠方用火灸瘡中毒上以搗韭汁飲三合日四五服瘡瘥即止治犬傷出千便良方鼠糞為末用冷井水洗瘡淨乾别用津調塗紙靨之帛子縛之濕者乾糝治犬傷出如意方麝香沉香防風各等分右為末以生杏仁研酒下治犬傷細研鼠糞以生油膩調塗立效治狂犬咬人取鼠屎二升燒末研傳瘡上治狂犬咬發狂欲死以蟾蜍作鱠食之頻食數頓治狗咬瘡用見腫消生苗葉爛搗貼瘡治狗咬破傷風人參不計多少桑柴火上燒令煙絶用盞子合研為末糝在瘡上立效治狗咬用山豆根水研傅之若猘犬咬以水調服二錢治狂狗咬取百家筯煎汁飲之一方就人家乞取煎汁服之療狂狗咬人欲發者及蛇蝎惡蟲等毒藥毒以韭葉及根生搗絞汁服治狂犬毒以紫珠煮汁服之治犬咬瘡用屋漏水即以水澆屋簷承取用洗之又以水滴簷下令土濕取土以傅犬咬處瘡上治猘犬咬人出肘後方用牀四腳下土和成泥傅瘡上灸之一七壯瘡中得犬毛者愈猘犬狂犬也療猘犬咬人出肘後方用地榆根末服方寸匕日一二服亦搗傅瘡上更佳治狗咬瘡右以竹藍耳燒灰傅狗咬處良治狂犬傷毒以白頸蚯蚓屎封之出犬毛神驗治犬咬右用黃荆葉搗急罨瘡口即安治狂狗咬人取桃白皮一握水三升煎取一升服桃白皮味苦辛平諸蟲傷附論凡諸蟲齒所傷其類不一然毒入皮膚非真氣正法不能移變故上古有移精變氣祝由之法今雖具存而逐惡去毒之劑亦不可廢也凡有一切毒螫之物必不得起惡心向之亦不得殺之若輒殺之于後必遭螫毒治亦難瘥慎之慎之方如聖散出宣明論治蛇蝎諸蟲毒傷川烏防風去蘆白芷各二兩川芎一兩二錢半草烏頭半兩蒼术二兩去皮細辛去苗土淨七錢半右件俱不見火生用晒乾研為細末傅之如神又蛇蝎螫狗咬用口噙漿水洗淨用藥末貼上三二次勤傅即愈諸小蟲血傷無口者唾津調藥擦上勤易三五次即愈麝香雄黃散出百一選方治二十七般惡蟲咬傷人及瘡腫者麝香雄黃乳香硇砂各二錢德生堂一作硼砂土蜂窩露蜂窩燒灰各一錢右研為末以醋調少許塗咬著處或不辨認得多疑是惡瘡三五日不療即毒入心難瘥忌雞魚膩物一方有白礬却無乳香聖核子出濟生拔粹方治蛇咬蝎螫雄黃三錢信一錢皂角子巴豆各四十九箇耳塞麝香少許用五月五日不聞雞犬婦人處不語搗為細末在杏子內封之針挑出止痛為用大有神效雄黃丸治百蟲囓毒氣內攻雄黃研朱砂研各半兩䔧蘆去苗微炒巴豆去皮心研去油鬼臼去鬚三味各一分右研為末鍊蜜和圎如大豆大每服三丸空腹煎乾薑湯下當轉出惡并蟲等當煩悶後以鴨為羹食之辰砂丸治百蟲囓沙虱蛇蝎蟲毒辰砂雄黃研水飛赤足蜈蚣續隨子各一兩麝香一分右搗研為末粟米糊為丸如菉豆大每服一丸冷水下良久身上毛旋起處即是毒所傷却用水調一丸於毛旋起處繞圍四畔其虱自爆出雄黃散出千金方治入山草辟衆蛇治蛇傷蜈蚣蝎螫諸毒蟲咬乾薑麝香雄黃各等分右為粗散以絳袋盛帶之男左女右蛇毒塗瘡如無麝香以麝罔和帶之以蜜為膏傳螫處良一方研為細末用津唾點時糝患處痛即止麝香雄黃散出經效濟世方治百蟲所傷雄黃硼砂白礬並研細土蜂窩炙各半兩麝香一錢右為末用醋調傳咬處日一二服甜葶藶散出聖惠方治蟲咬方甜葶藶蛇床子莵絲子鹽各一兩右各搗細為散以釅醋調如膏日三度塗之一方加麝香阿魏丸出聖惠方治辟蚊蟲及諸蟲等方臰樗皮鰻鱺魚阿魏芫花已上各半兩右為末用乳香煎汁和丸如雞頭大燒之是蟲皆去地膽散治一切蟲囓地膽曝乾地錦各等分曝右為散每用一錢盞內用醋調却用盞一隻合定慢火熬熱塗囓處如已囓得三兩日即先以牡蠣末一錢新汲水調下然後塗此藥藍汁膏治蟲螫傷方見本門蜘蛛蜈蚣傷類雄麝散治一切蟲豸蜘蛛等毒右用鹽汁入雄黃麝香和塗之能化蟲為水蚌粉散治天蛇毒方右以蚌粉滑石貝母為末傳之水銀膏治惡蛇傷紅腫爛者乾薑水銀豬脂臘月者各等分右揉令相得即置丸向碗中燒以竹筒籠上薰所腫處未薰先破兩處然後薰即瘥苦楝散治辟蚊蟲及諸蟲等方苦楝花柏子菖蒲各一兩右為散慢火燒聞氣自去矣硇砂散治守宮囓雄黃半兩硇砂一分右細研為散以少許傅之雄黃散治毒蟻螫人雄黃一錢麝香半錢自研細右研勻以生麻油調傳之立勝散治蟲蛇蜂蝎蚖蛇蜘蛛沙蟲等傷毒大紅川椒去核十五粒豆䜴十粒右同入口嚼爛唾在手心次用南星末調和得所傳傷處毒水自出續又再傅神效豆䜴油治春夏月樹木墻間有一等雜色毛蟲極毒凡人觸著者則放小毛入手足上自皮至肉自肉入骨其初則皮肉微癢以漸生痛經十數日癢在外而痛在內用手抓搔或痛或癢必至骨肉皆爛有性命之憂此名中射諸藥不能治之用好豆䜴約一碗清油半盞拌䜴搗爛厚傅痛癢處經一時久䜴氣透骨則引出蟲毛紛紛可見取下䜴埋在土中煎香白芷湯洗痛處如肉已爛用海螵蛸為末傅之愈海螵蛸即烏賊魚之骨也麝香傅方治一切蟲囓痛右用麝香細研一錢封囓處帛縳之一方蟲咬鼠咬用麝香細研蜜封塗之瘥用津調亦得治百蟲囓毒攻瘡痛塗方用犀角一片以井花水磨取濃汁塗瘡上治五毒蟲螫赤腫不止馬齒莧傅方并治蛇咬用馬齒莧葉洗切爛研厚傳之一方貼之亦可治一切蟲囓痛膩粉傅方用膩粉一分用生薑自然汁調傳之青麻心方治守宮囓用青麻葉心七枚以手挼碎取汁塗之治蛇蟲咬用豬牙中垢塗嚙處頻易治蚰蜒清明前一日取馬藺正日五更煎湯灑諸處治天蛇螫毒舉身潰爛號呼欲絶者用秦皮煮汁一斗許恣意飲之初日減半兩三日頻愈不知天蛇為何物或云草間黃花蜘蛛是也人遭其毒仍為露水所濡乃成此疾沈存中筆談載之甚詳一方秦皮濃煎服後用蚌粉滑石貝母末傅昔太子中允關把曾提舉廣南西路常平倉行部雍管一吏為蟲傷毒舉身潰爛有一醫言能治使醫視之曰此天蛇所螫疾已深不可為也乃以藥傅其瘡有腫起以鉗拔之有物如蛇凡取十餘條而疾不起又錢塘西溪常有一田家忽病癩通身潰爛號呼欲絶西溪寺僧識之曰此天蛇毒爾非癩也取秦皮如上服之而愈治壁鏡咬用桑柴灰汁三度沸取汁調白礬末為膏塗瘡口瘥兼治蛇咬毒治羊辣子傷用蠶繭拶之立愈治蠶咬用苧汁塗之今苧近蠶不生也治辟蚊蟲及諸蟲等方用鰻鱺魚乾者於室中燒之即蚊子化為水矣治蚯蚓咬用濃鹽湯浸身數遍瘥浙西軍將張韶為此蟲所咬其形如大風眉鬢皆落每夕蚯蚓鳴用此方愈或以石灰水浸身亦效治螻蛄咬用斛葉燒灰細研以泔水浸斛葉取洗瘡拭之內少許灰於瘡中治蛇蟲蜈蚣咬用家桑葉蒸後罯鹽挼傳瘡上葉未開枝可作煎酒服又治一切風家桑葉暖無毒利五臟通關節下氣煎服除風痛出汗并撲損瘀血並治之治桑蠍咬人用丁香末蜜調塗之治蜂蝎螫人方用人參嚼封之治入山草辟衆蛇傷蜈蚣蝎螫諸毒蟲咬用常燒羚羊角使煙出蛇則去矣一方用羖角治蜘蛛咬蟲蠶咬蠼螋溺瘡用豬膏莓搗汁傅之豬膏莓似荏葉有毛治螻蛄咬蚯蚓咬其形如大風眉鬚落用石灰醋和塗之治惡蟲咬用酥和鹽傅之治蛇蟲傷惡瘡疥溪毒沙虱用葫蘆搗貼熟醋浸之經年者良治蟲咬用荏葉搗傅治蚰蜒蜘蛛蟻子咬用油麻研塗傅瘡瘥治諸蛇虺蝎惡蟲毒用韭根葉搗汁服之治蟲咬人用紫草塗之一方用紫草油塗之治蛐蟺咬人方及中蜈蚣毒者用雞屎傅之治蚯蚓咬痛用鴨屎傅之人屎亦可拓又以䓤白傅之治毒蛇並射工沙虱等傷眼黑口噤手腳強有毒攻腹內成塊逡巡不救宜用此方用蒼耳嫩葉一握研取汁溫酒和灌之將滓厚罨所傷處一方蒼耳傳之亦妙治蛇咬蜘蛛毒用雞卵輕敲一小孔合咬處立瘥一方取白塗四畔瘡即愈辟諸蟲法用薺花置席下辟蟲治諸蟲毒用嚼青蒿葉擦之治壁鏡咬毒人必死方用醋磨大黃塗之治惡蛇傷紅腫者用棟木根并皮切一升以水三升和煎取二升適寒溫浸洗瘡冷即易再三瘥治惡蛇傷紅腫爛者用胡䓤於煻火中煨令軟即出以紙隔手挼令破以拓瘡上以痛定為度李饒州多用神效治諸蛇虺蝎惡蟲毒用令煙薰瘡口令煙入瘡中佳治蛇蟲咬及疥癬惡瘡用天南星入藥炮為末用醋調傳之治蛇蟲傷用䓤根葉搗之內加鹽少許同搗傅治蛇虺螫人用射岡塗螫處頻易塗腫上血出即愈治蛇蝎蜈蚣等傷用生鐡石上水磨汁塗之治蚯蚓咬用老茶研末調塗之立愈治壁鏡咬人立死方用檳榔不拘多少燒灰存性先以醋淋洗後以醋調貼之治諸蛇犬咬皆可治用黃花草為末傅傷處治蜈蚣蝎方用枯白礬不拘多少如傷左點左眼右點右眼治蚰蜒咬用木鱉子末醋調塗之治惡蟲咬出聖惠方用馬腸根生油磨塗之治百蟲所傷出衛生家寶方雄黃一兩白礬飛過硇砂一分麝香一錢露房蜂窠一分燒灰存性土蜂窠半兩生研烏梅肉半兩焙乾右一處研極細先用針挑開瘡口用醋并藥少許擦之次用醋打麵糊攤紙花子蓋之病小一服病大日一換治山源深逺處沙虱圡虺蛇纒丹毒傷人纍經神驗方烏賊魚骨膽礬赤足全腳大蜈蚣右三味等分細研為末如有患者速於元發端處以針挑破用辟蜈蚣辟虱蝎蚊蟲使聞之不敢近出衛生家寶方雄黃五分砒五分柏子青楝子各一升菖蒲四兩右為細末次入雄黃砒同研勻每用三錢以紙裹藥燈上點於房中薰又治壁鏡毒人必死方右溶化白礬乘熱滴傷處痛止毒出杏黃膏出百一選方治蛇蟲所傷皆可治右以杏核七七箇每磨開一竅去仁研真雄黃末填其中次以蠟封之共置一瓦合內合口更須固濟窖於向北靜處簷下七七日取出要用則槌開一核以津液調雄黃傅咬處當不移時毒氣盡作黃水消去此藥重午日合吳茱茰散治蛇蝎螫人右用乾薑嚼傳瘡上不過三四瘥又煮吳茱茰湯以漬瘡上瘥治蛇蟲咬傷先用帛片縛住兩頭免毒氣行急用手按擦去毒氣用草鵝糞同新水擂爛罨傷處四圍又方用黃泥調新冷水擦傷處見清水出乃止便用野決明菜搗爛酒浸濾去滓服留滓罨傷處以帛片裹之又方名纒蛇丹凡為蛇傷蜂蠆蜈蚣毒蟲顛犬所傷皆可用雄黃為末水調塗兼用井花水及酒調喫甚效治蛇毒蝎螫咬出朱氏集驗方用醋磨雄黃塗之治蛇蟲所傷羚羊北人多食南人食之免為蛇蟲所傷和五味子炒之投酒中經宿飲之又治筋骨急強中風治蛇蟲咬出聖惠方用烏蘝莓五葉或生人家墻間搗傳瘡腫蛇蟲咬處治蛇蟲咬用茨菰葉研傳之一方用根搗爛傅治諸蟲蛇傷用菩薩草搗絞飲汁及研傅之治蛇咬瘡蜈蚣所傷出聖惠方用桑樹白皮汁傅之瘥治蛇蟲咬及蛇虺螫人用藊豆葉搗爛傳之一方用白藊豆搗汁傳之治蚖蛇惡蟲毒并疥癬癰腫瘰􅊓用鹽水酒服之著瘡不爾磨傅之治蚯蚓毒腹大夜聞蚯蚓鳴於身者以鹽水浸之昔崇寧隴州兵士暑月在倅廳前跣立為蚯蚓所中遂不救數日又有被其毒教以先飲鹽湯一杯次以鹽湯浸足乃愈治蟲毒螫咬用合子草搗傳瘡上治蠶咬取大蝦蟆脊背上白汁和蟻子灰塗之治蛇蟲傷犬咬以榖樹汁傅之治蟲蛇犬等咬傷以千里及搗傅咬處治蛇蟲蜘蛛蠶咬毒入內者以􅀈桐葉搗封傷處又皮為末服之治蜘蛛蛇蝎毒以小薊搗絞取汁服之佳治惡蟲咬作瘡者取陽烏鸛觜燒為末酒下服之陽烏鸛亦名陽鴉出建州治諸蟲咬用土檳榔細研油塗之階除間蟾蜍屎也治蟲蠶蛇犬咬用五毒草根醋磨傅瘡上亦搗莖葉傅之恐毒入腹亦煮服之治蛇蝎蟲咬等毒取千金䥶草搗傅瘡上生肌止痛治蜂及蜈蚣螫人取蜘蛛置肉上則能吸毒治蟲蠶蜘蛛等咬用灰藋搗碎和油傅之治蛇及蜘蛛咬用鬼叉草杵碎傅之亦杵絞汁服之治蛇犬咬等毒以風涎母煮服之治蠶及諸蟲如蠶類咬人恐毒入腹用蠶菵草煮服之生搗傅瘡亦效治蚖蛇惡蟲毒疥癬癰腫瘰􅊓用戎鹽水酒服之著瘡不爾磨傅治惡蟲蛇螫毒用地菘挼以傳之治蛇蟲咬用蛇莓搗傳之治蟲咬取百舌鳥巢及糞塗咬處亦用百舌鳥炙食之良治蟲毒以人肝藤生研服治雜蟲咬以蟾蜍糞傅之治溪毒及逰蟲用溪狗燒末服一二錢匕治蟲蠶咬以百部根火炙浸酒空腹飲之治蛇蜂叮毒用糟傳之治惡蟲咬人入腹及咬人生瘡者取赤龍浴水服之此澤間水泉赤蛇在中者經雨取之治蝸牛蟲所毒遍身者以蓼子煮汁浸之立瘥治蟲刺螫人方用好豉心以足為限但覺刺即熟嚼豉以傳之少頃見豉中毛即瘥不見又嚼傳之晝夜勿絶見毛為度治蟲咬毒用烏雌雞糞炒服之治鼠咬人以麝香封上用帛子繫之治蛇蟲沙虱瘡用小蒜傅之治蛇虺蟲蠶狂犬等毒以紫荆木煮汁服之治狐尿刺人腫痛用熱蠟著瘡中又燒煙薰之令汁出即便愈治狐尿刺螫痛用杏仁細研一兩沸承熱以浸螫處數易之治蛇蟲毒以蒼鵝糞傅之及舍中飬能辟蛇蟲普濟方卷三百六
