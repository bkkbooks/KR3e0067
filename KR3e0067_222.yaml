兩末開者隂乾稱五色龍骨細研覆盆子各五兩鼓子花二兩五月五日採雞豆一百顆生取肉作餅子曬乾右為細末取金櫻子二百枚去毛子木臼內搗爛外水七升煎取濃汁一升去滓和藥再入內杵一千杵丸如梧桐子大每服三十丸空心鹽湯下服百日永不泄如要通即以冷水調車前子末半合服之如欲祕再服忌葵菜鹿角霜丸出聖濟總録専治腎寒羸瘦陽氣虛弱補精益髓鹿角霜肉蓯蓉酒浸去皺皮切焙附子炮製去皮臍巴戟天去心蜀椒去目及閉口炒出汗各一兩右為末酒煮麵糊和丸如梧桐子大每服二十丸空心溫酒下延壽丹出御藥院方専治腎經不足補精髓益氣壯元陽久服輕身耐老松脂三十兩洗煮白茯苓甘菊花柏子仁各十兩右為末煉蜜和丸如梧桐子大每服二十丸空心溫酒或鹽湯下日三服能愈諸疾麝香鹿茸丸出三因方能治精氣耗散血少不進陽道不興服此調榮衛利腰腳精血治諸虛百病鹿茸酥炙一兩五錢熟地黃二兩沉香三分麝香一兩另研右為末入麝香研勻煉蜜和丸如梧桐子大每服三十丸空心溫酒鹽湯下補骨丹出直指方能升神水於百會降神火於湧泉還淳反朴體合自然骨正節柔益壽延年補益心腎強筋壯骨杜仲去粗皮十兩炒黑色沒藥一兩另研鹿茸二兩燎去毛酒炙補骨脂十兩用芝麻五兩炒候芝麻黑色無聲為度即去芝麻右將杜仲補骨脂鹿茸一處為末入沒藥和勻再用胡桃肉三十個湯浸去皮為膏入麵少許酒煮糊為丸如梧桐子大每服一百粒米飲下溫酒鹽湯亦得日進三服食前浙東提刑陳才甫任郎官日嘗苦臂痛醫者孫宫幹令服此藥非獨臂痛即安而平日腰痛之疾自此遂不復作鹿茸散出聖濟總録用治腎久虛精氣耗憊腰腳酸重神色昏暗耳鳴焦枯陽道萎弱此由精少欲事過度鹿茸去毛酥炙右搗羅為細散每服一錢漸至二錢空心濃煎蓯蓉酒七分一盞放溫入少鹽調下如欲為丸即加後藥鹿茸去毛酥炙一兩肉蓯蓉酒浸一宿焙乾蛇床子洗焙乾各一兩右為末煉蜜和搗丸如梧桐子大每服二十丸至三十丸溫酒或鹽湯下青娥丸出德生堂能治肝腎虛腰腿重痛并治風濕腳氣常服壯筋補虛填精益髓方見本門補骨虛益髭髮類黑丸子瑞竹堂能治精血耗竭靣色黧黑耳聾目昏口乾多渴腰痛腳弱小便白濁上燥下寒不受峻補者宜服此藥鹿茸酒蒸當歸去蘆酒浸右各等分為末煮烏梅膏子為丸如梧桐子大每服五十丸空心用米飲下補真丸出聖濟總録能壯元氣補精髓潤髭髮久服無暴性肉蓯蓉八兩酒浸一宿去皺皮切焙為末兔絲子酒浸一宿淨洗焙搗末右同搗勻取生地黃汁二升於銀石器內慢火熬成膏另取青竹瀝一盞時時灑膏內候稠黏放冷和前藥丸如梧桐子大空心溫酒鹽湯下三十丸至五十丸日中再服雲母丸出聖惠方専治腎臟冷極補元精髓雲母四兩用鹽花同搗如麥皮止白礬四兩和前藥一處搗令勻細右藥用磁瓶子盛以炭火十斤燒火盡為度打破瓶子取出將藥搗碎用米醋半升拌藥作一毬安新瓦上更用炭火十斤燒火盡為度取出搗碎一地坑可深一尺將藥紙裹埋之以盆合三日取出曬乾搗研為末次粳米飯和丸如梧桐子大每日空心以鹽湯下二十丸婦人積冷醋湯下十丸孕婦勿服補虛益髓用麋角可五寸截之中破炙令黃香為末和酒空心服三錢七若卒心痛一服立瘥常服令人赤白如花益陽氣不知何因與肉不同爾亦可煎作膠與鹿角同甚勝鹿茸仙方靈芝丸出聖濟總録専治脾腎氣虛補骨髓通利耳目用蒼术一斤泔浸時換水用竹刀刮去皮并土夏浸三日冬七日曬乾木臼內搗羅為末棗肉丸如梧桐子大棗湯下三十丸至五十丸秋石方丸出聖濟總録凡世之煉石者但得火煉一法而已此藥須兼用隂陽二石方為至藥凡火煉者陽中之隂故得火而凝入水則釋煞消散歸於無體蓋質去但有味在此離中之虛也水煉者隂中之陽故得水而凝遇曝潤千歲不變味去而質留此坎中之實也二物皆出於心腎二臟而流於小腸水火騰蛇玄武正氣外假天地之水火凝而為體服之還補太陽相火二臟上為養命之本令具二法如後陽煉法出危氏方用小便不計多少大約兩桶一擔先以清水并好皂莢濃汁以布絞候去滓每小便一擔桶入皂莢汁一盞用竹棍急攪令轉百千匝乃止直候小便澄清白濁皆淀底乃除辟去清者不用只取濁腳併作一滿桶又用竹棍子攪百餘匝更候澄清又辟去清者不用十數擔不過取得濃腳一二斛其小便須是先以布濾過勿令有滓取得濃汁入淨鍋中熬刮下搗碎再入鍋以湯煮令化方於筲箕內布筋紙兩重傾藥入紙筲箕內淋過取淋下清汁再入鍋熬乾又用湯煮化再依前法淋直候色如霜雪即止乃入固濟沙盒內歇口火煆成汁傾出如藥未成更煆一兩遍候瑩白玉色即止細研入沙盒固濟頂火四兩養七晝夜久養火尤善再研每服二錢空心溫酒下或用棗肉為丸如梧桐子大每服三十丸亦得空心陽煉日午服隂煉各一服一名還元丹昔有人得瘦疾且嗽萬方不效服此輒愈又方有病顛眩腹鼓久之漸加喘滿埀困者亦服此即瘥法極省力只一小鍋便可煉體如金石永不暴潤與常法功力不侔久疾只數服便效隂煉法出聖濟總録用小便三五石夏月雖腐敗亦堪用分置大盆中以新水一半以上相和施轉攪數百匝放清澄辟去清者留濁腳又以新水同攪水多為妙又去清者直候無臭氣澄下秋石如粉即止曝乾刮下如膩粉光白粲然可愛都無臭氣味為度再研以乳和勻如膏烈日中曝乾如此九度須揀好日色乃和蓋假太陽真氣也第九度即以棗肉丸之如梧桐子大曝乾每服三十丸溫酒下治隂萎羸瘦精髓虗弱四肢少力用豬腎一對去脂膜切枸杞葉八兩用豉汁二大盞半相和煮羹入鹽椒蔥服之補虛勞益髓長肌恱顔色令人肥健用鹿角膠炙搗為末以酒服方寸匕日三服增至二三匕效地黃丸還精補髓駐顔色却老治虛損安臟腑暖下元壯腰膝生地黃淨洗細切一斗以好酒一斗浸之經宿即漉出曬乾却入酒中浸以酒盡為度曬乾乾漆搗碎炒令煙出肉蓯蓉酒浸一宿刮去皺皮炙乾蛇床子各一兩絲子三兩酒浸三日曬乾另搗為末桂心牛膝去苖石斛去根銼補骨脂微炙各二兩人參去蘆頭逺志去心各三兩右為末煉蜜和搗三五百杵丸如梧桐子大每日空心晚食前以鹽湯下三十丸秋石還元丹出十便良方能大補暖悅色進食益下元久服去百疾強骨髓補精血開心益智煉人中白方右以男子小便十石更多不妨先將大鍋竈一副於空屋內鍋上用深瓦甑接鍋口令高用紙斤杵石灰泥塗甑縫并鍋勿令通氣候乾下小便只可於鍋中及七分以來竈下以稻火煮專令人看之若涌出即添冷小便些少勿令涌出候乾細研入好盒內如法固濟入灰爐中煆之旋取二三兩再研如粉煮棗瓤為丸如菉豆大每服五七丸漸至十五丸空心鹽湯下久服臍下常如火暖凡諸般冷疾宜服之皆愈多年冷勞虛憊甚者服之皆壯盛其藥令常近火收或時復養火三五日功效大也神仙修真丹出朱氏集驗方能益精補髓壯筋骨明目補暖臟氣去一切風鹿角霜十兩附子五兩右為細末以鹿角膠八兩熬化為丸如梧桐子大每服三十丸空心溫酒下或炒茴香湯下保命延齡丸出楊氏家藏方能安神養氣補填骨髓起弱扶衰潤澤肌膚聰明耳目久服黑髭髮牢牙齒能夜讀詩書心力不倦巨勝子補骨脂酒浸一宿焙牛膝甘菊花天門冬去心絲子酒浸一宿濕杵作餅火焙再杵枸杞子人參去蘆頭肉蓯蓉酒浸一宿切焙白茯苓去皮巴戟去心生用酸棗仁柏子仁山藥覆盆子五味子楮實天雄炮去皮尖以上十八味各一兩肉去粗皮四兩生乾地黃切細新瓦上炒令乾燥右為細末春夏煉白蜜秋冬用蒸棗肉劑入好胡桃十枚去皮同藥劑於臼中搗千餘下丸如梧桐子大每服三十丸加至五十丸溫酒鹽湯送下空心食前服陳體常先生傳絲丸出衛生家寶方専固元益精絲子二兩酒浸一宿炒乾為末逺志去心一兩焙乾稱乾山藥五錢韭子五錢牛膝五錢去蘆頭白茯苓五錢肉蓯蓉五錢龍骨五錢火中煆過右搗為末煉蜜為丸如梧桐子大空心二十丸日進三服酒鹽湯下鹿角霜丸出衛生家寶方専治精氣虛滑鹿角霜二兩白茯苓一兩山藥一兩逺志五錢去心附子一個炮去皮尖右為細末酒糊丸如梧桐子大每服三十丸或四十丸用米飲溫酒任下空心食前服強筋健髓出本草以蓯蓉鱓魚為末黃精酒丸服之力可十倍補益精氣強盛隂道出本草以蘿藦生噉亦蒸煮食之補益精氣強盛隂道出本草以枸杞葉作羹食之治老人骨髓虛竭補益麋茸煎膏出本草以麋茸五兩去毛塗酥炙微黃為末以清酒二升於銀鍋中慢火熬成膏盛磁瓦器中每服半匙溫水調服空心食前服水陸丹出本草補下益精以雞頭實并中子搗爛曝乾再搗下篩熬金櫻子煎和丸服之治骨髓風毒疼痛不可運動者用麻子仁水中浸取沉者一大升漉出曝乾銀器中漸漸炒直須慢火待香熟調勻即入木臼中令三兩人互搗從三數令及萬杵看極細如白粉即止平分為十貼每用一貼取家釀無灰酒一大碗以沙盆桞木槌子點研麻粉旋濾取白酒直令麻粉盡餘殼却去子都合酒一處煎取一半待令熟空心食前頓服日服一貼藥盡全瘥輕者止四五貼甚者十貼必效麻子乃令人續布麻種子也補益強力益志附論夫腎在骨故腎憊則力劣心藏神故心虛則多忘強力益志必補心腎心腎得所養則力強而志益矣心腎合德水火相濟精全神足無所不通况強力益志哉方麥門冬丸補心育神強力益志兼止肺嗽及腎藏風冷麥門冬去心焙二兩五錢天門冬去心焙一兩三錢茯苓去木杜仲去粗皮炙銼柏子仁石菖蒲切焙枸杞子生乾地黃焙百部根去皮各一兩白茯苓去黑皮山芋人參肉蓯蓉酒浸切焙貝母去心炒各一兩五錢防風去蘆五味子丹參各一兩一錢逺志去心五錢右為末煉蜜為丸如梧桐子大每日空心米飲下二十丸食後常含化一丸枸杞子丸一名延年丸用育神氣強力益志及治風勞氣冷美顔色變髭髮枸杞子焙覆盆子車前子生乾地黃焙地骨皮續斷何首烏去黑皮巴戟天去心菊花去蘂焙白术菖蒲米湯洗曝逺志去心細辛去苖葉牛膝酒浸切焙絲子酒浸搗爛再焙乾為末方入前藥各一兩右為末煉蜜為丸如梧桐子大每日空心酒下十丸至二十丸不拘時候逺志丸治真元衰憊耳焦靣黑精神不爽補益血氣強力益志逺志去心山芋柏子仁巴戟天去心續斷杜仲去粗皮炙銼各二兩絲子酒浸焙乾另搗荆實山茱萸五味子各二兩五錢肉蓯蓉酒浸切焙牛膝酒浸切焙各四兩右為末煉蜜為丸如梧桐子大每服三十丸空心溫酒下服之月餘氣壯精倍若尿澀加柏子仁精冷加五味子陽衰加續斷各一倍麋茸丸一名地黃煎専補虛治心強力益志麋茸去毛酥炙二兩枸杞子三兩茯神去木人參各一兩五錢乾薑炮二兩桂去粗皮五錢逺志去心三錢右為末取地黃汁一升和搗令勻丸如梧桐子大每日食前鹽湯酒服十丸加至二十丸大豆丸補氣強力益志斷穀不飢大豆黃卷一升微炒薰陸香研白龍骨研白茯苓去黑皮黃蠟酒煮各一兩五錢蜜二升真酥半升右前四味為末入蜜蠟酥和搗三五千杵丸如雞子黃大每日空心酒嚼下一丸食後再服逺志丸強力益志延年逺志去心一兩山芋五錢人參五錢白茯苓去皮五錢金箔銀箔各十片右為末煉蜜為丸如梧桐子大每服十丸茶酒隨意下絲子丸補益真氣強力益志絲子酒浸焙乾另杵菖蒲切焙逺志去心地骨皮生乾地黃焙各二兩右為末煉蜜為丸如梧桐子大每服三十丸茶酒下合時齋戒仍忌婦人雞犬見四神湯一名四壯散専治一切冷氣調順經絡生精補氣強力方見本門補虛益氣類菖蒲丸補元氣強力益志菖蒲切細焙蒼术各等分右米泔浸三宿控乾再用酒浸一宿焙搗羅為末煉蜜和丸如梧桐子大每服二十丸至四十丸空心鹽湯下日三服治益精氣強志意用雞頭實二合煮令熟去殼研如膏入粳米一合煮粥空心食之又方用石燕二十枚和五味炒令熟以酒一斗浸三日夜臥時飲一兩盞隨性能補進食令人力健蓯蓉散出千金方用主輕身益氣強骨補髓不足能使陽氣強盛肉蓯蓉五味子逺志甘草各一斤生地黃三斤取汁慎火草楮子乾漆各二升右八味以地黃汁浸一宿出曝乾復漬令汁盡為散空心酒服方寸七日三服三十服力倍常雖度十女無損益筋力去伏熱出本草以芹菜作殼韭葅及煮食並得治五臟虛損羸瘦益氣力堅筋骨出本草以巨勝蒸曝各九遍每取二合用湯浸布裹去皮再研水濾取汁煎飲和粳米煮粥食之巨勝即胡麻也普濟方卷二百二十二
