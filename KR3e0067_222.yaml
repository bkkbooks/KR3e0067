body:
  text: 普濟方卷二百二十二明周王朱橚撰諸虛門四季補益論黃帝問素女曰男子受氣隂陽俱等男子行陽常先病耳目本其所好隂痿不起是氣力衰弱不能強健敢問療之之道素女曰帝之所問衆人同有隂陽為身邊各皆有婦女人夭年損夀男性急躁故不能制専心貪女色犯之竭力七傷之情不可不思常能審慎長生之道也其為疾病宜以藥療之今所犯者七第一之忌日月晦朔上下弦望六丁之日以合隂陽傷人之精令人臨敵不戰時時獨起小便赤黃精空自出夭壽喪身第二之忌雷電風雨隂陽晦暝振動天地日月無精光以合隂陽生子令狂癲或有聾盲瘖啞失神或多忘誤心意不安或常喜驚恐悲憂不樂第三之忌新飽飲食而榖力未行大倉內實五臟反覆以合隂陽六腑損傷小便常赤或白或黃腰脊疼痛頭項急強或身體浮腫心腹脹滿毁形夭壽天道之常第四之忌新小便精氣微弱榮衛不固衛氣未散以合隂陽令人虛乏隂陽氣閉絶食無味腹脹滿結怫鬱不安忘誤或喜怒無常狀如癲發第五之忌作事步行身體勞乏榮氣不足衛氣未散以合隂陽臟氣相干令人氣乏喘息為難唇口乾燥身體流汗穀不消化心腹脹滿百處酸疼起臥不安第六之忌新從沐浴通身熱濕舉重作事流汗如雨以合隂陽必傷風冷小腹急痛腰脊疼強四肢酸疼五臟防響上攻頭靣或生漏瀝第七之忌共女語話玉莖盛強以合隂陽不將禮防氣腠理開莖中痛傷外動肌體內損腑臟結髮塞耳目視􅑩􅑩心中怵惕恍惚喜忘如杵舂膈咳逆氣上傷中女色痿弱身體不可不防犯此七篇形證也彰天生神藥療之有方黃帝問高陽負曰吾知素女明知經脈臟腑虛盈男子五勞七傷婦人隂陽閉隔漏下赤白或絶産無子男子受氣隂陽同等其病緣由因何而起故問之請為具説對曰深哉問也男子五勞六極七傷病皆有元本由狀帝曰善哉七傷之病幸願悉説對曰一曰隂汗二曰隂衰三曰精氣四曰精少五曰隂下濕癢六曰小便數少七曰隂痿病形如是皆謂七傷黃帝曰七傷如是療之奈何對曰有四時神藥名四茯苓春秋冬夏療隨病形冷加熱藥溫以冷漿風藥色脈診評隨加藥悉如本來經春三月冝以更生丸更生茯苓也黃帝問曰夏三月以何方藥幸得具聞對曰宜以補腎茯苓丸黃帝問曰春夏之療已聞良驗秋三月以何方藥對曰宜以埀命茯苓丸黃帝問曰四時之藥具已聞之此藥四時通服得否對曰有四時之散名茯苓散不避寒暑但能久服長生延年老而更壯高陽負曰凡經方神仙所造服之療病具已論訖如是所擬議從開闢以來無病不治無生不救也方更生丸出聖惠方能療男子五勞七傷隂衰消小囊下生瘡腰脊背疼痛不得俯仰兩膝冰冷時時熱癢或時時浮腫難以行步目風淚出逺視茫茫咳逆上氣身體痿黃繞臍弦急痛及膀胱小便尿血莖痛損傷時有遺瀝汗衣赤黃或夢驚恐口乾舌強渴欲飲水得食不常或氣力不足時時氣逆坐犯七忌以成勞傷此藥主之甚驗方三月宜服之茯苓四分若不消食三分加一菖蒲四分若耳聾三分加一山茱萸四分若身癢三分加一栝樓根四分若熱渴三分加一絲子四分若痿泄三分加一牛膝四分若機關不利加一倍赤石脂四分若內傷三分加一乾地黃七分若煩熱三分加一細辛四分若目茫茫三分加一防風四分若風邪三分加一薯蕷四分若隂濕癢三分加一續斷四分若有痔加一倍蛇床子四分若少氣三分加一柏實四分若少力加一倍巴戟天四分若痿弱三分加一天雄四分炮若有風三分加一遠志皮四分驚恐不安三分加一石斛四分若體疼加一半杜仲四分若陽絶腰疼三分加一蓯蓉四分若冷痿加一倍右搗篩蜜丸如梧桐子大先食服三丸日三不知漸增以知為度亦可散服以清粥飲服方寸七日知十日愈三十日餘氣平長服老而更少忌豬羊肉餳冷水生菜蕪荑等物一方用酒下亦可補腎茯苓丸療男子內虛不能飲食忽喜忽忘悲憂不樂恚怒無常或身體浮腫小便赤黃精泄淋瀝痛絞膀胱脛疼冷痺難屈伸渴欲飲水心腹脹滿皆犯七上已記其當療之法隨病度量方夏三月冝服之茯苓二兩食不消加一倍附子二兩炮有風三分加一山茱萸二兩身癢三分加一杜仲三兩腰痛三分加一牡丹二兩腹中遊氣三分加一澤㵼三兩有水氣三分加一薯蕷三兩頭風加一兩桂心六兩顔色不足三分加一細辛二兩二目茫茫三分加一石斛二兩隂濕癢三分加一蓯蓉三兩身痿三分加一黃耆四兩體疼三分加二右搗篩蜜和丸如梧桐子大先食服七丸日二服忌生蔥生菜豬肉冷水大酢胡荽等物補腎茯苓丸療男子腎虛冷五臟風冷所苦令人身體濕癢足行失顧不自覺者或食失味目視茫茫身偏拘急腰脊痛強不能飲食日漸羸瘦胸心懊悶咳逆上氣轉側須人起則抶曳針灸服藥療之小折或乘馬觸風或因房室不自將護飲食不量用力過度或口乾舌燥或流涎出口或夢寤精便自出或尿血尿有淋瀝隂下癢濕心驚動悸小腹偏急四肢酸疼氣息噓吸身體浮腫氣塞胸脅醫所不能識妄加餘療方秋三月冝服之茯苓防風桂心白术細辛山茱萸薯蕷澤㵼附子炮乾地黃紫苑牛膝芍藥丹參黃耆沙參蓯蓉乾薑玄參人參苦參獨活各二兩右搗篩蜜和丸如梧桐子大食前服五丸臨時以酒飲下之忌酢物生蔥桃李雀肉生菜豬肉蕪荑等埀命茯苓丸療男子五勞七傷兩目茫茫得風淚出頭項急強不得回顧心腹脹滿上支胸脅下引腰脊表裏疼痛不得喘息飲食咳逆靣目痿黃小便淋瀝清精自出隂痿不起臨時不對足脛酸疼或惡心煩熱身體浮腫盜汗流離四肢拘攣或急夢善驚恐呼吸短氣口乾舌燥狀如消渴忽忽喜忘或悲憂嗚咽此藥主之補諸絶令人肥壯強健氣力倍常飲食百病除愈方冬三月冝服之茯苓三兩白术澤㵼牡蒙桂心牡蠣熬牡荆子薯蕷杜仲天雄炮人參石長生附子乾薑巴戟天絲子蓯蓉山茱萸甘草炙天門冬去心各二兩右搗篩以蜜和丸如梧桐子大先食服五丸酒飲皆得忌海藻菘菜鯉魚生蔥豬肉酢等物茯苓散宜四時通服之茯苓鍾乳研雲母粉石斛菖蒲柏子仁炒兔絲子續斷杜仲天門冬牛膝五味子澤㵼遠志去心乾菊花蛇床子薯蕷炙山茱萸天雄炮石韋去毛乾地黃蓯蓉並等分右為散以酒服方寸七日再二十日知三十日病悉愈百日以上體氣康強長服八十九十老公還如童子忌酢物羊肉餳鯉豬肉蕪荑等鹿茸丸出聖惠方能暖臟腑壯腰膝補下元養精氣久服美顔容長肌肉補諸虛損四時宜常服鹿茸二兩去毛塗酥炙微黃磁石二兩燒醋淬七遍細研水飛過熟乾地黃炒白茯苓肉蓯蓉酒浸一宿刮去皺皮炙乾兔絲子酒浸三日曝乾别搗為末人參去蘆頭附子炮製去皮臍薯蕷遠志去心牛膝去苗杜仲去粗皮炙微黃銼巴戟天續斷五味子山茱萸澤㵼桂心補骨脂蛇床子各一兩右為末入磁石研令勻煉蜜和搗五七百杵丸如梧桐子大每日空心以溫酒下三十丸看老少以意加減地黃丸出保命集方専治陽盛隂虛肝腎不足虛損形瘦無力而多青黃面無常色冝榮血養氣宜服蒼术一斤泔浸熟地黃一斤乾薑春七錢秋七錢五錢一兩右為細末蒸棗肉為丸如梧桐子大每服五七十丸諸飲下若加五味子為腎氣丸述類象形神品藥也如陽盛隂損心肺不足及男子婦人靣無血色食少嗜臥身體困倦冝八味丸如形體瘦弱無力多困未知隂陽先損夏月冝地黃丸春秋宜腎氣丸冬月宜八味丸如病久虛弱厭厭不能食和中丸補虛進飲食附論脾播百物氣澤以禆諸臟腑者也真氣強盛則可以腐熟水榖播諸臟腑滋養榮衛充實肌膚若中下氣虛內生寒冷陽氣不足則不能腐熟水榖故虛而不嗜食當補虛以助其陽氣也方補真丹出御藥院方能接真養氣健脾益胃升降隂陽調順三焦常服寬利胸膈消進飲食性平不燥沉香丁香檀香白豆蔲仁肉豆蔲各一兩肉蓯蓉五錢酒浸一宿焙乾牛膝五錢酒浸一宿焙乾巴戟天去心七錢白术五錢木香香附子青皮去白各二兩薑黃沒藥另研縮砂仁補骨脂炒各一兩附子七錢炮製去皮臍穿山甲五錢炙黃桂去粗皮一錢乾山藥七錢茴香五錢微炒甘草二兩炙黃乳香五錢另研蒼术三兩酒浸三日取出未乾用青鹽一兩炒黃去鹽不用右為細末酒浸蒸餅為丸如梧桐子大每服八十丸至一百丸空心溫酒服或鹽湯下葫蘆巴湯出王氏傳濟方専治元氣虛損腹脅雷鳴中脘脹滿冷痛不思食葫蘆巴炒川芎木香京三稜煨白术官桂去皮白蒺藜微炒當歸益智陳橘皮去白以上各一兩沉香附子炮去皮臍船上茴香微炒各一兩五錢乾薑五錢炮甘草三錢炙令黃苦楝子三兩取肉不用核右為末每服二錢煎沸點不拘時服一方入鹽少許同煎服七香丸出聖惠方専治虛冷氣上攻心膈不利腹脅虛脹不思飲食麝香五錢細研沉香白檀香木香藿香丁香銼零陵香白芷訶梨勒皮肉豆蔲去殼芎藭炙桂心當歸銼微炒細辛香附子各一兩檳榔二兩右為末煉蜜和搗三五百杵丸如梧桐子大每食前以溫酒下二十丸蓽澄茄湯出王氏傳濟方専治脾元虛冷飲食減少靣黃腹痛蓽澄茄石斛去根附子炮製去皮臍桂去粗皮巴戟天去心各一兩白术銼炒五味子芎藭各三錢人參白茯苓去黑皮木香檳榔白豆蔲右銼如麻豆每服三錢水一盞生薑二片棗二枚擘破煎至七分去滓空心日午近晚溫服補真丸出永類鈴方人大抵不進飲食以脾胃之藥治之多不效者亦有謂焉人之有生不善攝養房勞過度真陽衰虛坎火不溫不能上蒸脾土沖和失布中州不運是致飲食不進胸膈痞塞或不食而脹滿或已食而不消大腑溏泄此皆真火衰虛不能蒸藴脾土而然古人云補腎不如補脾然補脾不如補腎腎氣若壯丹田之火上蒸脾土溫和中焦自治膈開能食矣葫蘆巴炒附子炮製去皮臍陽起石煆川烏炮去皮絲子淘淨酒蒸沉香不見火别研肉豆蔲麵裹煨肉蓯蓉酒浸焙五味子各五錢鹿茸去毛酒蒸焙川巴戟去心鍾乳粉各一兩右為細末用羊腰子二對治如食法蔥椒酒煮爛入少酒糊杵和為丸如梧桐子大每服七十丸空心食前用米飲鹽湯任下沉香煮散出聖濟總録專治下元不和中焦痞悶氣滯噎塞不進飲食用之補之沉香木香青橘皮湯浸去白焙陳橘皮人參郁李仁湯浸去皮焙甘草炙各兩檳榔銼草豆蔲去皮桂去粗皮乾薑炮各五錢右為散每服三錢水一盞煎至七分去滓不拘時候溫服蕪荑丸出聖濟總録専治脾腎虛冷不思飲食蕪荑炒六兩烏梅肉炒二兩黃連去鬚五錢厚朴去粗皮薑汁炙五兩補骨脂炒肉蓯蓉酒浸切焙巴戟天去心附子炮製去皮臍鹿茸去毛酥炙陳橘皮右為末粟米粥丸如梧桐子大每服三十丸空心日午溫米飲下沉香丸出聖濟總録専補脾腎止腹痛進飲食沉香銼二兩鹿茸去毛酥炙烏藥銼楝實銼炒白茯苓去黑皮石斛去根白术訶梨勒炮去核厚朴去粗皮薑汁炙人參各一兩右為末酒煮麵糊如梧桐子大每服二十丸至三十丸溫酒或米飲下空心食前服碙砂丸出王氏博濟方専治脾元虛弱冷氣攻上飲食減少碙砂水煎飛成霜木香桂去粗皮肉豆蔲去殼炮蘹香子炒附子炮去皮臍青橘皮陳橘皮去白炒五錢山芋半斤木瓜二枚右八味搗羅為末先以木瓜切蓋出瓤如小甕子樣存取元蓋逐個木瓜共入碙砂末五錢以元蓋緊縳用無灰酒三升於銀石器內以慢火煮候酒欲乾木瓜爛取出入前八味藥末相和杵丸如梧桐子大每服二十丸至三十丸鹽湯酒下正陽丹出王氏博濟方専治脾元虛冷心胸滿悶飲食減少臍腹撮痛靣色黃黑耳焦枯陽事弱硫黃研菖蒲切天雄炮製