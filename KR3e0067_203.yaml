角灰主理氣下血治霍亂轉筋腹痛出本草用煮淡竹葉湯五六升令灼上轉筋處黃龍膝湯療舌強筋縮牽隂股引胸腹脹霍亂用黃龍膝切一升黃龍膝者樟木膝也斷以吹氣從裏靣度者好也以水四升煮取八合為一服一劑不止更至一劑良驗或宿食不消霍亂或乾霍亂或吐痢不止或不吐痢並悉療之療霍亂轉筋及四肢已冷強氣絶心上微暖者猶可救之用硃砂二兩熱研蠟三兩和之為丸待冷著火籠中如薰衣被厚覆勿令咽泄兼牀下著火令復微暖徹良久當汗則漸氣通便活忌生血物療腳轉筋及渾身轉筋立效用暖水稍熱於浴斛中坐浸須臾便瘥如湯沃雪又方治霍亂轉筋不止用芥菜子不拘多少擂細水調傅臍上又方治腳轉筋用獨頭蔥一個嚼一半於患處腳上猛擦一半用水送下一時立效治轉筋方出肘後方用燒鐵令赤以灼踵白肉際上近後當從鐵以隨足為留停令成瘡兩足皆爾須臾間熱入腹不復轉筋便愈燒蝦尾用之即瘥又方出肘後方用燒蜈蚣膏傅之即瘥又方出聖惠方用橘皮二兩湯浸去白穰焙以醋漿水一大盞煎至五分去滓稍溫服又方出聖惠方用釜底黑土末暖酒調下二錢頻服之又方出聖惠方用釅醋和米粉摩塗轉筋處三二升煎五七沸看緊慢冷換之治腳轉筋方出聖惠方用木瓜一兩以酒一升煎三七沸溫酒服之治霍亂轉筋出聖惠方用木瓜櫖子煮汁食之與木瓜梢等餘無有益江外常為果食人參散出廣南四時攝生論治霍亂吐逆及痢并腳轉筋人參去蘆頭吳白术木瓜乾者各一兩薑炮半兩右為散每服三錢以水一中盞入生薑半分煎至五分去滓不計時候溫服木瓜散出聖惠方治霍亂吐痢轉筋心膈煩悶木瓜乾者桂心各一兩草豆蔲半兩去皮右為散每服三錢水一中盞煎至六分去滓不計時候溫服又方出聖惠方扁豆五十粒木瓜一分皂莢子十枚右炒黃為散以水一大盞煎至六分去滓頓服立效治卒轉筋出醫方集成以香薷煮汁頓服半升止治霍亂轉筋入腹無可奈何者出醫方大成用酢煮青布拓之冷即易治躄筋急出本草以白酒研桂塗之治霍亂轉筋用山梔子二枚燒灰為末水調服之廣濟療轉筋方出本草取故綿入釅醋甑中蒸及熱用裹病人腳冷更易又方出聖惠方治霍亂轉筋不止右燒編薦索灰研三指撮以熱酒調服之瘥治肝虛轉筋出肘後方用赤蓼莖葉切三合水一盞酒三合煎至四合去滓溫分二服治霍亂腳轉筋出本草用吳茱茰和艾以醋湯拌塗之妙治霍亂轉筋出本草取蓼子一把去兩頭以水二升半煮升半頓服之治霍亂轉筋出本草多取蓼煮湯及熱將腳浸之治霍亂轉筋出本草以鹽一升水一升半作湯漬之治霍亂轉筋出本草以榲桲煮汁飲之主霍亂身冷轉筋於床下取厠籌取熱氣徹上治霍亂轉筋出本草以新研粟米清水和濾取汁服之腹胃冷者不宜多服治霍亂手足轉筋出本草以銅器或瓦器盛熱湯尉之亦可令踏器使腳底熱徹亦可以湯拓之冷則易用醋煮湯更良煮蓼子及吳茱茰汁亦好以綿絮及破氈擱腳湯淋之貴在熱徹治腳轉筋兼暴風通身氷冷如癱痪者出本草取蠟半斤以舊帛絁絹並得約五六寸隨患大小加減濶狹先銷蠟塗於帛上看冷熱但不過燒即便乘熱纒腳仍須當腳心便著襪褁腳得冷即更易之亦治心躁驚悸如覺是風毒兼褁兩手心治腳膝筋急痛出本草以木瓜煮令爛研作漿粥樣用褁痛處冷即易一宿三五度熱褁便瘥煮木瓜時入一半酒同煮之導引法治轉筋不止者出千金方男子則以手挽其隂牽之女子則挽其乳分左右邉灸霍亂法附論夫霍亂灸之或須未能立瘥終無死憂不可逆灸或但先腹痛或先下後吐當隨病狀灸之灸法治先心痛及先吐者出肘後方灸巨關七壯在心下一寸不效更灸如前數外臺祕要療下痢不止上氣灸五十壯各巨關治吐下不禁兩手隂陽脈俱疾數者灸心厭骨下三寸又灸臍下三寸各六七十壯治下痢者灸榖門三七壯在臍傍二寸男左女右一名大腸募不瘥更灸如前數甲乙針經天樞一名長溪一名榖門夾臍兩傍各二寸陷者中治下痢不止者出肘後方灸大都七壯在足大趾本節後內側白肉際治先腹痛者灸太倉二七壯穴在心厭下四寸臍上一寸不止更灸前數治苦繞臍痛急灸臍下三寸二七壯名關元良療霍亂心腹痛脹吐痢煩悶不止則宜灸之令痛人覆卧伸兩臂膊著手則以小繩正當兩肘骨尖頭從背上量度當脊骨中尖繩下點之去度又以繩度病人口至兩吻截斷便中折之則以度向所點背下兩邊各依度長短點之三處一時下火灸絶便定神驗艾炷火稍加也治瀉痢所傷煩欲死者灸慈宮三七壯柱橫骨兩邉各二寸半橫骨在橫臍下橫門骨是轉筋在兩臂及胸中者灸手掌白肉際七壯及灸膻中中府巨關胃管尺澤并治筋拘頭及足背愈灼艾法出仁存方治霍亂轉筋欲死絶惟腹中有暖氣者灸承筋七壯取繩量圍足從趾至跟匝捻取等折一半以度令一頭至跟踏地處引繩上至度頭即是穴起死人又以鹽內臍中令實就鹽上灸二七壯一方灸氣海穴臍下一寸半二七壯妙療霍亂神祕起死出濟生方用以物橫度病人口中屈之從心鳩尾度以下頭五壯橫度左右復灸五壯此三處併當先灸中央畢更橫度左右也又灸脊上以物圍令正當心厭又夾脊左右一寸各七壯是腹背各灸三處療霍亂已死上屋喚魂者又以諸療皆至而猶不瘥捧病人覆卧之伸臂對以繩度兩肘尖頭依繩下夾背脊大骨穴中去脊各一寸灸之百壯無不活者所謂針灸法此最善已試數百人皆灸即起坐或以此術傳其子孫世世皆稱之療手足逆冷者灸三隂交穴在足內踝直上三寸廉骨際陷中左右七壯不瘥更灸如前數治手足逆冷出肘後方灸大指上爪甲際七壯治乾嘔者灸間使各七壯在手腕後三寸兩筋間不瘥更灸之治乾嘔者灸心主各七壯在掌腕上約中吐不止更灸如前數療苦煩悶腠滿灸心厭下三寸七壯名胃管治轉筋四逆灸兩乳根黑白際各一壯外臺祕要灸兩乳邉連黑外近腋白肉際各七壯可至二七壯療吐下痢者治走哺轉筋灸踵踝白肉際各三七壯及灸小腹下橫骨中央如前數治轉筋灸湧泉六七壯在足心下當拇趾大筋上又灸足大趾下約中一壯治轉筋不止灸足踵聚筋上白肉際七壯立愈治轉筋入腹痛欲死出肘後方四人持手足灸臍上一寸十四壯如不動勿復傷之又灸股裏大筋去隂一寸一分半臍左邊二寸治霍亂轉筋令病人合面正卧伸兩手著身以繩橫量兩肘尖頭依繩下夾脊骨兩邉相去各一寸半灸一百壯無不瘥主霍亂腳轉筋及入腹以手拗所患腳大拇指灸當腳心下急筋上七壯療霍亂轉筋不止漸欲入腹凡轉筋能殺人起死之法無過於灸灸法惟三處要穴第一承筋穴在腳腨下際取穴法以繩從腳心下度至腳踵便截斷度復回此度從腳踵還量向上盡度頭當腨下際宛宛中是穴灸三七壯則定又不止則灸涌泉在足心下當足大指中節後一寸半正當大筋上是穴又灸足跟後黑白肉交際當中央此三處要穴灸之不過二三七壯必定療轉筋在兩臂苦胸脅者灸手掌白肉際七壯療轉筋十指筋攣急不得屈伸灸手踝骨上七壯良扁鵲療筋脛骨痛不可忍灸屈膝下亷橫筋上三壯腹腸轉筋灸臍上一寸十四壯沙證夫沙證之病在江南舊無今多有之原其證古有不載所感如傷寒頭痛嘔惡渾身壯熱手足指末微厥或腹痛悶亂須臾能殺人宜先濃煎艾湯試之如吐即是方艾湯方出仁存方用五月蠶退紙碎煎安碗中以碟蓋之以百沸湯泡艾碗許仍以綿紙封褁縫良久乘熱飲之就卧即愈又方出危氏方近時多看頭額上胸前兩邉有小紅點在於皮膚者用紙撚成條或大燈草微蘸香油燈上點燒於紅點上焌爆者是又名水傷寒用樟木煎湯服或蔥豉湯汗出愈如腹痛不止又用針於兩手十指近甲稍針出血即愈又法出危氏方治沙證用苧麻蘸水於頸項兩肘及臂兩膝腕等處戞掠見得血凝皮膚中紅點如粟粒狀然後蓋覆衣被喫少粥或蔥䜴湯清油蔥茶得汗即愈使皮膚腠理開發鬆利誠不藥之良法也又法出危氏方治兩足墜痛亦名水波於兩腳曲腕內兩筋兩骨間刺出血愈名委中穴絞腸沙方有一證心腹絞痛冷汗出悶脹欲絶俗謂攪腸沙今考之此證乃名乾霍亂而致此亦由山嵐瘴氣或因飢飽失時隂陽暴亂而致急用鹽湯吐法此法救人不一用鹽半盞以熱湯數碗泡鹽令患人盡服連至數碗不住手方可却以雞羽掃咽喉間即時吐所喫鹽湯盡出其證即愈又方出醫方集成治絞腸沙證手足厥冷腹痛不可忍者用手蘸溫水於病者膝灣內拍打有紫黑點處以針刺去惡血即愈治絞腸沙痛不可忍或輾轉在地或起或卧其腸絞縮在腹此是中毒之深須臾令人死古方乾霍亂是也急用鹽一兩熱湯調灌入病人口中鹽氣一到腹其痛即定也又方用石沙炒令赤色冷水淬之良一二合服之愈又方出經驗良方陳樟木陳艾陳壁土各等分右為細末水濃煎去滓連進三四服即安又方出經驗良方治心痛絞腸沙腹痛嘔吐瀉及霍亂中暑煩渴不省人事用馬糞研同蜜擂濾過新汲水下隨手即愈治絞腸沙痛欲死者可活用蠶生子連紙用手掌一片剪如錢大按於碗內上用一盞覆之然後將熱滚水一盞沿盞縫澆入去待少刻熱服立效又方用飲艾湯亦可治絞腸沙其病身熱肚腹疼痛咽喉刺刺澀疼是也用礦灰一小塊為細末半盞服之立效治沙子絞腸病危急之甚用黑神散用童子小便調服如不止再調服立愈普濟方卷二百三
