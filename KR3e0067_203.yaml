body:
  text: 普濟方卷二百三明周王朱橚撰霍亂門霍亂心煩附論夫霍亂而心煩者由大吐大痢腑臟氣暴極大吐者胃氣逆痢者腸虛也大吐大痢者氣逆則甚三焦不理五臟未和冷摶於氣逆上乘心故心躁亦有未經利心煩者是冷氣入於腸胃水榖不消藴瘀不宣氣亦逆上故亦煩也霍亂心煩者緣心下有水水害心火其氣不宣故令人心煩悶亂而不安也蓋胃土氣衰不能運化飲食氣鬱於中使清濁不分隂陽干擾故霍亂而神情煩躁也方白豆蔲丸出聖濟總録治霍亂後脾胃尚虛榖氣未實津液內燥令人煩躁睡卧不安白豆蔲去皮陳橘皮去白焙厚朴去粗皮生薑炙草豆蔲去皮桂去粗皮白术炒乾木瓜人參半夏湯洗去滑七次以上各二兩縮砂蜜去皮髙良薑炒甘草炙銼陳麴炒麥蘖炒木香乾薑炮白茯苓去黑皮以上各一兩桃仁四兩去皮尖雙仁炒右搗研為末煉蜜和丸如梧桐子大每服三十丸至四十丸空心米飲下人參散出聖惠方治霍亂吐痢汗出心煩人參去蘆頭茯神麥門冬去心各三分白术黃耆甘草炙微赤銼乾薑炮製銼桂心以上各半兩右搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓溫頓服蘆根散治霍亂心煩乾嘔蘆根銼一兩半人參去蘆頭陳橘皮泡去白穰焙以上各一兩枇杷葉半兩拭去毛炙微黃麥門冬半兩去心木瓜二兩右搗篩為散每服三錢以水一中盞入生薑半分煎至六分去滓溫頻服之麥門冬湯一名人參散出聖惠方治霍亂心煩坐卧不安麥門冬去焙心茯神去木人參陳橘皮湯浸去白焙甘草炙各一兩右搗篩每服三錢匕水一盞入生薑半分小麥五十粒竹葉十片煎至七分去滓溫服不拘時亂髮湯出聖惠方治霍亂吐痢後心煩亂髮一圍如雞子大燒存性吳茱茰湯浸焙乾三分甘草炙人參各一兩右搗篩每服五錢水一盞酒半盞煎至八分去滓溫服日三服之蘆根飲出聖惠方治霍亂乾嘔心煩蘆根銼炙一兩一分人參水萍紫者焙乾杷枇葉拭去毛各一兩右搗篩每服五錢匕水一盞酒半盞薤白四顆拍碎煎至八分去滓溫服日三一方無水萍生薑飲出聖惠方治霍亂吐瀉心煩悶亂生薑汁一合蜜一合糯米一合以新汲水淘令並研如粉右以新汲水一大盞相和時時服一合又方甘草一分炙微赤銼槐葉桑葉各一兩右搗篩為散每服三錢以水一中盞煎至六分去滓不計時候溫服香豉湯出聖濟總録治霍亂心中煩悶䜴七合綿裹梔子仁厚朴去粗皮薑汁炙各三兩右㕮咀如麻豆大每服六錢水二盞煎至一盞去滓溫服治霍亂心煩躁出聖惠方棗十三枚生薑二兩銼右用水二大盞煎至一盞去滓分溫二服又方桂心一分末人參半兩去蘆頭右以水二大盞煎至七分去滓分溫二服又方出聖惠方蘆根半兩銼麥門冬一兩去心右以水二大盞煎至一大盞去滓分溫二服橘皮湯出聖濟總録治霍亂吐後煩滿嘔逆陳橘皮湯浸去白焙梔子各二兩右搗篩每服三錢入䜴半合水一盞煎至七分去滓溫服日三服竹瀝飲出聖濟總録治霍亂狂悶煩渴吐瀉無度氣欲絶者淡竹瀝一合粳米一合以水二盞同研去滓取汁用右和勻頓服之蔥白大棗湯出聖惠方治霍亂後心煩卧不安席蔥白二十莖去鬚大棗二十枚去核右以水三盞煎取一盞半去滓分溫二服治中熱霍亂暴痢心煩脈數欲得冷水者出千金方用新汲井水頓服一升立愈先患胃口冷者勿服之治霍亂煩躁心腹脹痛出十便良方一方治不吐不痢胸膈煩渴用燒亂髮如雞子大鹽湯三升和服之不吐再服厚朴湯治霍亂心煩不止方見本門霍亂心下痞逆類桑葉飲出聖惠方治霍亂已吐痢心煩悶不止用桑葉一大握切以水一盞煎至七分頓服立定治霍亂煩悶出本草取向陽壁上土水煮服治霍亂後胃氣逆煩出本草用苦苣菜生搗汁飲之雖冷甚益不可用熱服霍亂後煩躁卧不安夫霍亂後煩躁卧寐不安者胃虛餘勢未盡榖氣鬱蒸津液內耗血氣散亂故煩躁不得安卧也當安其胃氣則病可愈方丁香白术丸出聖濟總録治霍亂煩躁不得安卧丁香一兩白术沉香銼胡椒各半兩肉豆蔲去殼五味子各二分芎藭白殭蠶各一分右為末研勻好酒煮木瓜一枚取肉丸如梧桐子大若患渴煎木瓜湯下十丸若氣病溫酒下神應散出聖濟總録治霍亂後煩躁眠睡不安白茯苓去黑皮一分丹砂研硫黃研各一錢朴硝二錢蛤粉三錢半人參一分右搗羅為散每服一錢用芝麻水調下不計時候服木香湯出聖濟總録治霍亂煩躁懊憹不得安卧木香乾木瓜紫蘇不去莖各一兩草豆蔲去皮一兩半右搗篩每服三錢水一盞入黑豆半合許生薑一棗大拍碎煎至七分去滓溫服日三甘草湯出聖濟總録治霍亂躁不得息甘草炙銼半夏湯洗七次去滑人參陳橘皮湯浸去白焙各二兩右搗篩每服五錢水一盞半入䜴半合生薑五片煎至八分去滓溫服日三枇杷葉出聖濟總録治霍亂心煩懊不得安卧枇杷葉拭去毛一分蘆根洗焙三分人參一分右搗篩每服五錢水一盞半薤白五寸煎至一盞去滓溫服有頃再服香薷飲出聖惠方治霍亂後胃氣虛不能安卧脹滿手足冷香薷一握生薑三兩木瓜一枚右細切研攪取自然汁空心頓服白米煮粥入藥汁少醬為味食之佳橘皮湯出聖濟總録治霍亂煩躁卧不安陳橘皮湯浸去白焙人參各三兩右搗篩每服四錢水一盞半入生薑三片煎至八分去滓溫服日三橘薑湯出聖濟總録治霍亂後煩躁卧不安陳橘皮湯浸去白焙一兩生薑二兩右㕮咀每服五錢水一盞半入醋少許煎至一盞去滓溫服之豆薑湯出聖惠方治霍亂後煩躁卧不安大豆淘一合生薑切半分右以酸漿水三盞煎至一盞半去滓分溫二服薑茶散出聖濟總録治霍亂後煩躁卧不安乾薑炮為末炒二錢好茶末一錢右以水一盞先煎茶末令熟即調乾薑末服之調胃乾薑散出肘後方治霍亂吐痢後煩躁卧不安心腹脹痛用乾薑炮一兩或用生薑為細末每服二錢匕溫粥飲調下熱酒調服亦可以水煮沸頓服愈竹葉湯出聖惠方治霍亂痢後煩熱燥渴卧不安用濃煮竹葉汁飲五六合佳木瓜子方治霍亂後煩躁卧不安有生食氣氣急用木瓜子不拘多少每服七粒微嚼破以溫水半盞吞之瘥既濟湯治霍亂後虛煩不得眠人參甘草淡竹葉炙各四兩麥門冬去心一兩附子炮半兩半夏湯洗五錢右㕮咀每服四錢生薑五片粳米百餘粒水煎空心服治霍亂後煩躁卧不安穩出本草以蔥二十莖大棗十枚以水三升煎取二升分服治霍亂腹中不安消榖理胃氣溫中除邪疫毒氣溫脾胃用小蒜煎湯服之霍亂逆滿附論夫霍亂逆滿雖本於飲食不消亦或痰水積聚滿逆不行皆氣分之痞也證胸膈窒塞脅肋脹滿或不得吐或吐而不止治法順其升降則愈厚朴丸出聖濟總録治腑臟不調內寒外熱脾胃氣冷宿食不消乍祕乍利不時霍亂逆滿厚朴去粗皮生薑汁炙赤石脂各一兩半白术乾薑炮麥蘖炮人參白茯苓去黑皮當歸切焙橘皮湯浸去白焙甘草炙銼訶梨勒煨取汁各一兩右搗羅為末煉蜜和丸如梧桐子大空心米飲下二十丸至三十丸柴胡湯出聖濟總録治霍亂逆滿兩脅下妨悶嘔不下食柴胡去苗厚朴去粗皮薑汁炙白茯苓去黑皮各三兩陳橘皮湯浸去白焙人參訶梨勒煨去皮桔梗去蘆頭炒各一兩半紫蘇莖葉甘草炙各一兩一分右搗篩每服五錢水一盞半入生薑一棗大拍碎煎至一盞去滓溫服日三蘇桂丸出聖濟總録治霍亂逆滿氣痞胸膈咽寒妨悶食不消腹脅虛脹腸鳴刺痛紫蘇葉桂去粗皮陳橘皮湯浸去白人參白术各一兩甘草炙半兩髙良薑三分右為細末煉蜜丸如梧桐子大每服二十丸至三十丸溫酒下米飲亦得如緩急無湯酒細嚼藥咽津薷香散出聖濟總録治霍亂逆滿開胃口薷香葉一兩焙訶梨勒煨去核十枚人參丁香各半兩糯米一百粒甘草炙一分石蓮心二百個如無以白豆蔲半兩代之右為細散每服一錢用煨和皮生薑一塊棗二枚去核煎湯調下早晚食前服紫蘇子丸出聖惠方治霍亂逆滿胸膈噎悶飲食不消乾嘔不吐者紫蘇一方無莖葉陳橘皮湯浸去白焙各二兩桂去粗皮髙良薑人參各一兩右為細末煉蜜丸如梧桐子大每服二十丸米飲下不拘時食生冷過多欲作霍亂者含化咽汁氣滿惡心欲吐不吐乾嘔者溫酒下麥門冬湯出聖濟總録治霍亂逆滿不下食食即吐出煩卧不安麥門冬去心焙三兩茅根銼焙五兩甘草炙銼人參各一兩右搗篩每服五錢水一盞半入竹茹彈子大一塊生薑一棗大拍碎煎至一盞去滓溫服日三麥門冬人參湯出聖濟總録治霍亂逆滿風邪熱氣衝心心悶氣短吐不下食麥門冬去心焙二兩人參三兩陳橘皮湯浸去白焙羚羊角鎊屑各一兩右搗篩每服五錢水一盞半入生薑七片煎至一盞去滓溫服日三半夏湯出聖濟總録治霍亂心下逆滿吐逆冒悶半夏湯浸去滑七次四兩厚朴去粗皮薑汁炙二兩赤茯苓去黑皮二兩右搗篩每服五錢水一盞半入生薑一棗大拍碎煎至一盞去滓溫服不拘時豆蔲湯出聖濟總録治霍亂逆滿不下食或腹中氣妨悶草豆蔲仁半兩人參一兩甘草炙三分右搗篩每服五錢水一盞入生薑一棗大拍碎煎至半盞去滓溫服半夏人參湯出聖濟總録治霍亂逆滿心下痞塞半夏為末薑汁作餅焙乾人參各三兩右搗篩每服三錢水一盞入白蜜一匙煎至七分去滓溫服日三不拘時霍亂乾嘔附論夫霍亂乾嘔者胃氣逆也本於吐痢之後脾胃俱虛三焦不理氣時逆上故但嘔逆而無所出即謂之乾嘔若遇冷傷胃氣則變噦也方白术散出聖惠方治霍亂胃氣虛乾嘔不止白术藿香人參去蘆頭各一兩枇杷葉拭去毛炙微黃髙良薑銼草豆蔲去皮各半兩右搗羅為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不拘時候溫服薤白人參散出聖惠方治霍亂乾嘔不止薤白一握人參去蘆頭白术香葇厚朴去粗皮塗生薑汁炙右細銼和勻每服半錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服生薑飲出千金方治霍亂引飲飲輒乾嘔用生薑五兩㕮咀水五升煮取二升半分二服又髙良薑佳薤白湯出聖濟總録治霍亂乾嘔不止用薤白一握細切水三盞煎一盞半溫分二服去滓不拘時木瓜湯出聖濟總録治霍亂乾嘔木瓜乾者去穰一枚厚朴去粗皮薑汁炙半兩乾薑炮一兩人參一兩一錢右搗篩每服五錢匕水一盞半煎至八分去滓熱服不拘時乾薑人參湯出聖惠方治霍亂乾嘔乾薑人參去蘆頭陳橘皮湯浸去白穰焙各二兩右細銼和勻每服半兩以水一大盞煎至五分去滓不計時候溫服又方吳茱茰半兩湯浸七次焙乾微炒乾薑半兩炮製銼人參二兩去蘆頭右搗羅為散每服三錢以水一中盞煎至七分去滓不計時候溫服生薑香葇湯出聖惠方治霍亂引飲飲即乾嘔生薑切香葇切陳橘皮湯浸去白穰焙各一兩右以水二大盞煎至一盞去滓分二服薤白湯出聖惠方治霍亂乾嘔不息薤白一握切生薑半兩切陳橘皮三分去白穰焙右以水二大盞煎至七分去滓分溫二服人參湯出聖濟總録治霍亂乾嘔人參甘草炙陳橘皮湯浸去白焙各二兩右搗篩每服三錢匕水一盞蔥白二寸煎至六分溫服木香湯出聖濟總録治霍亂乾嘔不止木香乾木瓜去穰白一兩紫蘇莖二兩右搗篩每服三錢匕水一盞半入黑豆一百粒生薑五片煎至一盞去滓溫服良久再服丁香人參散出聖惠方治霍亂胃氣虛乾嘔不止丁香一分人參一分去蘆頭右搗羅細為散分為二服每服以牛乳三合煎三五沸去滓溫服如人行五里再服又方出聖惠方生薑汁半合牛乳一合右煎一兩沸頓服之吳茱茰湯出聖惠方治霍亂乾嘔不止吳