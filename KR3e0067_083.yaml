body:
  text: 普濟方卷八十四明周王朱橚撰眼目門倒睫拳攣論夫臟腑久積風熱內薰肝經衝發於目始則腫赤隱痛多淚日久津液澀少瞼腫皮急致睫倒拳刺隱瞳人治法當起立毛睫又刺太陽經令出血及批鎌除其惡血仍服除風退熱之劑龍木論云倒睫拳攣外障此眼初患之時皆因肝家受熱膈內風虛眼多淚出或癢或痛乍好乍惡以手揩摩致於眼毛倒攣刺隱瞳人磣澀睛上白膜遮滿不宜洗鎌出血尉烙切恐眼皮漸小急開合稍難然後宜服細辛散補腎丸立瘥歌曰若因風赤淚涓涓翳膜潛生碧漸瞞乍好乍惡多年後眼皮急小欲開難倒睫拳攣如刺磣磨隱瞳人豈可安療者去毛撥睫轉太陽針血最為先湯藥又除風與熱細辛數數點水煎方犀角芎藭散出聖濟總録治眼瞼緊急倒睫拳攣犀角鎊芎藭羚羊角鎊木香檳榔煅銼茯神去木山芋前胡去蘆頭牛膝去苖桂去粗皮枳殼去瓤麩炒大黃銼炒各等分右為末每服三錢匕空心食前溫酒調下防風湯出聖濟總録治風熱衝肝目多睫倒方見本門目澀痛類車前子散出聖濟總録治眼倒睫赤眼疼痛不開方見本門目赤痛類旬效散出德生堂方治眼倒睫拳毛少腦川芎金叉石斛浮木賊去節各二錢人蛔蟲略隂乾右為細末用葦管吹入左右鼻中補腎丸出龍木論治倒睫拳攣外障乾山藥五味子車前子人參澤㵼茯苓細辛黃芩各一兩乾地黃三分右研煉蜜為丸如梧桐子大每服十丸空心茶清下退膜丸一名決明丸治倒睫拳攣隱瞳人方見本門目生丁翳類細辛湯出龍木論治睫拳攣外障細辛防風茺蔚子知母各一兩羚羊角大黃桔梗黑參各一兩右為末以水一盞散一錢煎至五分食後去滓溫服玄參湯一名菊花散治眼漸致倒睫隱澀痛方見本門目赤風類𬎼仁湯出聖濟總録治風熱攻眼磣澀疼痛漸致倒睫𬎼仁秦皮去粗皮銼防風去叉各一兩山梔子仁菊花萎蕤各半兩竹葉二握右銼細以水三升煎取一升半去滓乘熱淋洗冷再暖作三度使木通湯一名麥門冬湯出聖濟總録治倒睫拳攣眼如針刺緊急磣澀多眵淚方見本門目澀痛類三黃丸出聖濟總録治倒睫拳攣目眥赤爛黃連去鬚一兩半大黃銼砂一兩細辛去苖葉龍腦右為末煉蜜為丸如梧桐子大每服二十丸食後臨卧溫服熱水下日再小兒量減又方出神效方治倒睫拳毛木鱉子二箇令炒木賊一百二十莭地龍二條去土赤龍爪一百二十倒鈎針刺也右為細末摘去倒睫每日以紙撚蘸藥嗅之一日三五次又方治倒睫拳毛儒門事親川山甲炒地龍去土蟬殼五倍子各等分右為細末用藥時先將拳毛摘出後用藥一字隨左右鼻內嗅之次日目下如線樣微腫是驗蝟刺香白芷青黛研棗樹上橫直棘針右各等分為細末左眼倒睫口噙水左鼻內嗅之右眼倒睫右鼻嗅之治倒睫爛眩出本草事方蜜一兩黃丹五錢右慢火熬成膏入輕粉五分令熬黑色逐時湯泡洗治倒睫拳毛出儒門事親用川山甲以竹簟子刮去肉用羊腰窩脂去膜皮仍將川山甲於炭火上炙令黃色脂擦去山甲上如此數遍令酥為末隨左右眼噙水鼻內嗅一字月餘見效治倒睫出海上方用十二月熱蠅子乾為末鼻內嗅之治倒睫毛在瞼中聚刺瞳人白睛唯覺癢悶漸漸赤膜起連上下瞼多赤生瘡若刺黑睛則淚出似白㬾出若刺著瞳人令眼疼痛磣澀不欲見明此多損傷宜速醫療其法如左於平晨日未出之際令一眼明人把鑷子枝之去倒睫毛勾使毛斷連根去之下手十減八九疼痛立止至夜取千歲藤汁點之三五日將息得平後或點首生男乳汁亦良慎風寒日月光及煙火房事五辛一月內即瘥防風飲子出誠效方治倒睫拳毛黃蓍炙甘草人參各一錢葛根半錢防風半錢當歸七分半細辛葉蔓荆子各三分右件銼如麻豆大都作一服二盞煎至一盞去滓溫服食後避風寒溫暖處服之一方有黃連無黃蓍神效明目湯出誠效方治眼稜緊致倒睫拳毛損目及上下瞼眥赤爛睛赤疼痛昏暗則冷淚常流夜則目澀難開而眵淚漏眼葛根一錢半甘草炙一錢防風一錢蔓荆子半錢細辛二分一法加黃蓍一錢右㕮咀分二服每服水二盞煎至一盞去滓稍熱服臨卧治倒睫出保命集方無名異末之摻捲在紙中作撚子點著倒睫處吹散以煙薰睫自起眼瞼垂綏論夫眼瞼垂綏者以血氣不足膚腠開踈風邪客於瞼膚其皮垂綏下覆睛輪故俗呼為睢目又曰侵風久之則覆愈下眼閉難開方黃蓍丸出聖濟總録治膚瞼下覆輪垂綏難開又明眼目黃蓍銼蒺䔧子炒去角獨活去蘆頭柴胡去苖甘草炙生乾地黃焙梔子仁苦參白花蛇酒浸去皮骨白术各一兩防風去叉菊花茯神去木山芋秦艽去苗土各三分天門冬去心焙枳殼去瓤麩炒白檳榔銼各一兩半右為末煉蜜為丸如梧桐子大每服三十丸空心溫酒下羚羊角散出聖惠方治眼瞼垂腫心躁頭痛羚羊角鎊黃連去鬚木通赤芍藥防風去叉甘草炙黃芩去黑心各三分萎蕤一兩梔子仁半兩麥門冬去心一兩半石膏二兩右為散每服三錢七分水一盞八竹葉二七片煎至七分去滓食後溫服大黃散出聖惠方治眼瞼垂腫疼痛川大黃銼研微炒梔子仁井泉石秋桑葉甘草炙微赤炒決明子已上各三分右為散每服三錢以水一中盞煎至六分去滓食後溫服秦皮湯出聖惠方治眼瞼腫痛秦皮去粗皮銼黃連去鬚各一兩梔子仁一分大黃銼炒甘草炙銼細辛去苖葉各半兩蛇銜草三分右粗搗篩每服三錢匕水一盞入生薑半分拍碎竹葉二七片煎至七分去滓食後溫服枸杞湯出聖濟總録治眼瞼垂綏甚則眼閉難開枸杞子炒半兩赤芍藥山芋升麻各一兩半蒺䔧子炒茯神去木各二兩防風去叉一兩右粗搗篩每服五錢匕以水一盞半煎至七分生地黃汁一合去滓溫服臨卧再服升麻散出聖濟總録治眼瞼垂綏下覆睛輪升麻山茱萸各三分甘菊花細辛去苗葉各半兩蔓荆實去白皮山芋防風去叉各一兩右為散每服三錢匕溫酒調下茺蔚散出聖惠方治瞼眼垂下茺蔚子防風去皮羌活去蘆頭蔓荆子甘菊花玄參細辛黃芩去黑心車前子甘草炙銼各二兩大黃銼炒半兩右為散每服三錢匕水一盞煎至七分食後臨卧溫服竹葉湯出聖惠方治眼熱毒害垂腫遮睛苦竹葉黃連去鬚黃蘗去粗皮銼梔子仁各一兩𬎼仁湯浸去皮半兩用右為銼以水五大盞煎至二盞半去滓澄清溫洗眼日五七次作兩度使又方出聖惠方治眼熱毒瞼腫遮睛川大黃一兩銼碎微炒苦竹葉一握甘草一兩銼鬱金一兩膩粉二錢右先搗三味為散膩粉竹葉以水三盞煎至一盞半去滓澄清溫湯洗眼日三五度洗之目瞼腫鞕論夫目瞼腫鞕者內因肝肺積熱上衝於目外為風邪所摶風熱留結在於眥血氣不得宣流故令腫鞕久不瘥者多成風粟細瘡眵汁淹睛浸壞眼目鞕瞼鞕睛疼外障此眼初患之時胞瞼赤脹腫硬難開淚出疼痛還從一眼先患後乃相牽俱損漸生翳膜昏暗皆是中隔積熱肝臟風毒上衝入眼致令此疾宜令鎌洗去瘀血然後服瀉膈散㶸腫膏宜謹諸事龍木論歌曰瞼中硬腫似毆疼肝膈由來熱上衝㶸腫塗膏兼服藥輕輕鎌洗斷來蹤無令發蝎生浮翳此後尋醫轉費功省謹若能三五日世間諸事却從容方羚羊角散出聖惠方治眼風熱毒氣上攻兩瞼腫硬如棐李目不得開羚羊角屑防風去蘆頭羌活人參去蘆頭赤茯苓川升麻川大黃銼碎微炒玄參黃芩車前子已上各二兩細辛梔子仁半兩右為散每服四錢以水一盞煎至六分去滓每於食後溫服細辛散出聖惠方治眼瞼硬刺痛不開細辛半兩人參去蘆頭赤茯苓車前子藁本赤芍藥川大黃銼碎微炒玄參一兩甘草炙微銼分右為散每服食後用竹葉湯調下二錢瀉膈湯出龍木論治瞼硬睛疼外障大黃知母芒硝車前子茺蔚子黃芩天門冬各一兩黑參一兩右為末以水一盞散一錢煎至五分食後去滓溫服黃蓍散出聖惠方治眼瞼硬赤腫痛黃蓍銼茺蔚子麥門冬去心各半兩地骨皮玄參黃芩各一兩知母一兩犀角屑半兩右為散每服四錢以水一中盞半煎至六分去滓每於食後溫服忌炙煿熟麵防風湯出聖濟總録治風熱客摶目瞼腫鞕防風去叉秦皮去苖葉土甘菊花二兩蕤仁湯浸去皮梔子仁萎蕤各半兩竹葉一握右件細銼令勻每用一兩以水三盞煎至一盞半綿濾滓暖洗避風細辛散出聖濟總録治目瞼鞕刺痛腫赤細辛人參白茯苓去黑皮五味子各一兩芎藭藁本去苖土各一兩半右為散每服三錢以水一盞二分煎七分和滓溫服早晚食前服熁腫膏出龍木論治瞼硬睛疼外障代赭石黃蠟各半兩細磁末麻油各二兩膩粉少許黃蘗一兩右為末於銚子內入油蠟同煎以膏塗瞼上瀉膈散出聖惠方治眼瞼腫硬隱兼疼痛視物不得麥門冬川大黃銼細微炒川芒硝各一兩茺蔚子車前子黃芩各一兩半右為散每服三錢以水一中盞煎至六分去滓每於食後溫服秦皮湯出聖濟總録治瞼眼腫鞕癢痛秦皮黃連去鬚細辛去苖葉各二兩黃蘗半兩青鹽一兩右銼令勻每用一兩以水三盞煎取一盞半綿濾去滓乘熱用手洗眼了避風日三再暖洗之目膿漏論夫目膿漏者緣血脈壅熱傳入於足太陽膀胱之經膀胱之脈起於目內眥則令人瞼皆腫久癢即成疾膿汁時下綿綿不絶如滲漏故謂之膿漏俗呼為漏睛是也又有眼因患瘡出血膿後大眥頭常有膿血亦名漏睛不治則膿毒流漬穿壞白睛黑點相連即艱治療此眼初患之時微有頭施昏悶四體如勞五臟多積風氣壅毒遂令瘡出於眼常有膿血或流漬涎眥是腦熱所作雖然不痛漸加昏暗切宜補治服治風黃蓍湯即瘥龍木論歌曰眼目何緣患漏清熱和風在瞼中侵眥頭結聚為膿汁或流涎水色粘青雖然不痛兼無翳潛攻瘡大豈心寧黃蓍熊膽丸并散眼安􅀢薈作膏蒸若也因循經嵗月烏珠墜落始驚心方羚羊角丸出聖濟總録治毒風上攻目輪眼爛肉瘡翳生眼睛肉殠羚羊角鎊蘗皮去粗皮炙防風去義各一兩半玄參芎藭荆芥穗黃連去鬚槐子甘菊花防己石決明𬎼仁去皮蔓荆子車前子秦艽去苖土梔子仁生乾地黃焙陽起石研真珠末研龍齒搗研薔薇根銼各一兩大黃銼炒升麻麥門冬去心前胡去蘆頭人參白檳榔煨枸杞子各一兩半右為末鍊蜜為丸如梧桐子大每服三十丸晚食後熱水下玄參丸出聖惠方治眼膿漏眥赤癢日夜出膿水不止玄參決明子黃蓍銼黃連去鬚青葙子露蜂房微炒漏蘆羚羊角屑已上各二兩蕤仁一兩半湯浸去赤皮雄黃細研朱砂細研已上各半兩右為末入研子藥一時研令勻煉蜜和搗三二百杵丸如梧桐子大每於食後以溫漿水下二十丸臨卧再服之黃蓍散出聖惠方治眼膿漏不止黃蓍銼防風去蘆頭黃芩川大黃銼碎微炒各二兩地骨皮逺志去心人參去蘆頭赤茯苓漏蘆已上各一兩右為粗散每服三錢以水一中盞煎至六分去滓食後溫服臨卧再服忌炙煿油膩毒骨魚肉防風湯一名治風黃蓍湯出龍木論治眼痛睛膿出外障防風去義二兩一方用一兩知母二兩大黃銼炒二兩一方用一兩地骨皮逺志去心人參各一兩黃蓍銼一兩一方用一兩半白茯苓右粗搗篩每服一錢水一盞煎至五分去滓食後臨卧溫服點眼方出聖惠方治眼膿漏視物不見雄黃細研石決明搗碎研細水飛過馬牙屑細研已上各一兩青鹽半兩細研蜜三合青羊膽二枚右用生絹袋盛以蜜并羊膽汁中浸兩日取汁於磁器盒內盛點之白礬煎方出聖惠方治眼膿漏久不止宜點白礬一分燒灰黃蘗末三分黃連末七分雄黃一分熊膽一錢硃砂一分右都細研令勻以水二大盞調令勻內瓷瓶中以重湯煮一日藥成待冷用綿濾過每以銅筯取少許點眥頭龍腦散出聖濟