body:
  text: 普濟方卷一百二十四明周王朱橚撰傷寒門歌定數歌括甲一乙二丙三當丁四戌五己六鄉庚七辛八壬屬九癸十論流坎地行傷寒平氣歌己酉辛豬乙卯春坤元己未丑中因火運癸巳加臨定六氣不及平氣生戊戌辰午庚子對庚寅反得配庚申六陽太過還平氣相反隂陽子細尋傷寒五運所屬歌括戊亥午申皆是火己寅屬木未酉金子辰水位丑卯土萬兩黃金學也輕傷寒天符例司天與運同是名天符星假令戊子日戌為火運子為火氣只是天符此日病者因半也傷寒歲會例運與支同是也論傷寒南政司天脈歌南政司天北在泉厥隂右寸不虛言太隂左寸休言應少隂兩手寸不顯論傷寒北政司天脈歌北政司天南政同厥隂左尺不離宗太隂右寸休言應少隂兩手寸無蹤論傷寒南北二政逐年六氣脈不應總歌訣南太丑未北辰戌左寸不應不須疑南厥己亥北寅中右寸不應脈來遲北司丑未南魁罡右尺不知何處藏北厥乾巽南坤艮左尺不應莫休忙子午南少北卯酉雙手可口多不就坎離北少南門戶兩手尺脈俱無有傷寒南北二政司天括法南政司天甲子己丑年順遷北政司天乙丑金木水火土逆遷嵗神之氣是司天左進三辰為在泉天背南面言左右北地左右面南言司天便為三氣客地為終氣必應然地左間居中之氣欲知地氣自排連司天主一年之天氣為前三氣管一年司地主一年之地氣管後三氣訣法一年移一位以至六居而環會矣然上下相臨隂陽相錯而變由生也氣相得則和不相得則病主勝客則病逆也客勝主則病順也主客之勝而無復也所為三隂三陽自有盛衰之理也假令少隂在中則厥隂居右太隂居右此不可易也少隂則主寸尺不應厥隂司天在泉當在右故右不應太陽司天在泉當在左故左不應也假令辛亥年此政六氣補㵼即是客氣退司天地二位是厥隂風木餘郊此一陽明土下厥隂風木二太陽水下少隂君火三厥隂木下少陽相火四少隂火下太隂土五太隂土下陽明燥金六少陽木下太寒水丙戌庚壬子午年兩尺不應乙辛丁亥癸丑未年兩尺不應已後都應但逢申巳年南政以下皆此政論傷寒南政隂陽脈交死歌甲寅甲申厥隂位右是太陽左少隂南政隂陽脈交死厥隂主位取三辰又曰己丑己未交地左右是少陽左少隂南政隂陽脈交死太隂主位取三辰又曰己亥己巳交天右右是少陽左少隂南政隂陽脈交死太隂主位取三辰又曰甲子甲午交地左右是太隂左厥隂南政隂陽脈交死少隂主位取三辰又曰論傷寒南政三隂司天脈歌甲子甲午少隂位右是太隂左厥隂兩寸不應司天脈不取三辰行土運又曰己巳己亥厥隂位右是少隂左太陽兩寸不應司天脈不取三辰行土運又曰己丑己未太隂位右是少陽左少隂兩寸不應司天脈不取三辰行土運論傷寒南政三隂在泉脈歌甲寅甲申厥隂位右是太陽左少隂兩尺不應在泉脈前取三辰行土運又曰己卯己酉少隂位左是太隂右厥隂丙尺不應在泉脈前取三辰行土運又曰甲辰甲戌太隂位右是少陽左少陽兩尺不應在泉脈前取三辰行土運又曰論傷寒北政隂陽交死脈歌乙辛丁癸己亥年右是少隂左太陽北政隂陽脈交死厥隂主位交天左又曰丙戌寅壬辰戌年右是厥隂左陽明北政隂陽脈交死太陽主位交天左又曰己辛丁癸卯酉年右是厥隂左太隂北政隂陽脈交死少隂主位交地左又曰丙戊庚壬辰戌年左是厥隂左少陽北政隂陽脈交死太陽主位交地論傷寒北政三隂司天脈歌丙戊庚壬子午年右是太隂左厥隂兩尺不應司天脈不取三辰行金運又曰乙辛丁癸己亥年右是少隂左太陽兩尺不應司天脈不取三辰行木運又曰乙辛丁癸丑未年右是少隂左少陽兩尺不應司天脈不取三辰行水運論傷寒北政三隂在泉脈歌丙戊庚壬寅申年右是太陽左太隂兩寸不應在泉脈前取三辰行土運又曰乙辛丁癸卯酉年右是厥隂左太隂兩寸不應在泉脈前取三辰行火運又曰丙戊庚壬辰戌年右是少隂左少陽兩寸不應在泉脈前取三辰行火運圖解傷寒運氣説經曰夫天地之氣勝復之作不形於證診脈法曰天地之變無以脈診此之謂也嵗運更移順交作變而生病者亦隂陽之常理也謂嵗當陽在左而反於右謂嵗當隂在右而反於左左交者卜死若左右獨然非交是謂不應惟庚申己亥辰戍丑未八年有應也謂寸尺反者死謂嵗當隂在寸而反見於尺謂嵗當陽在尺而反見於寸若寸尺反者死若寸尺獨然非反見是謂不應唯卯酉四年應之故運有南北政令脈有寸尺交反又如此政兩寸當沉細不應而反浮大移於兩尺脈沉細不應是謂交如此者死謂如南政而寸當沉細不應而反浮大移於兩尺沉細不應是謂反如此者死若寸獨然或尺獨然不應者非交非反也上病而已舉此為例餘嵗同法故經曰必先嵗氣無伐天和粗工不知呼為寒熱攻寒令脈不變而熱疾已生制熱令寒脈如故而寒疾又起欲求其適安可得乎夭狂之由卒於此也蓋六脈與運氣勝復臨遇正當行令正當運化之時而脈動不相同似諸論政之則大同小異若交氣交連時日及期而見無相先後不及太甚方謂之平若差之者當其病脈也當先立其年以知其氣左右應見然後乃言死生也凡三隂司天在泉上下南北二政或左或右兩手寸尺不相應皆為脈沉下者仰手而沉覆手則沉為浮細為大者也若不明此法如過淵海問津豈不遇乎區區白手不能曉明也若能參究氣運脈法詳考圖局尺寸相應不相應明其補瀉而施治可謂偹矣其運圖者諸本不載其文令依素問五運論至其要論啓玄子注解仲景圖局具列於後使我同志意曉其意又何不逹於聖意哉文甲芍甘附子尊茯苓四逆乙相吞丙內調胃君須記五苓丁戊更兼庚茯苓甘草須尋己梔子䜴內壬癸辛廉字號十證亷甲梔厚乙梔薑丙是真武丁禹糧戊內四逆己調胃桂枝庚後小柴強武字號十證武甲小柴乙建中丙內大柴神有功丁柴加芒戊調胃承氣桃核己中攻庚柴龍骨牡礪妙辛壬兩字刺期門癸中用藥知何是救逆湯加品味行砂字號六證桂枝加桂破甲吉桂甘龍牡乙排連丁戊抵當丙調胃輪流破己扺當元陽明四十四證木字號十證調胃木甲是陽明乙丙戊己小承分丁庚壬丙大承氣癸中白虎自來辛土字號十證土桂甲己乙廂真丙是䓢蔯抵當丁戊庚辛屬大承氣壬圭茱莄癸五苓金字號十證金甲麻元最喜新乙丙調胃便來親丁曰小承堪作伴從戌至癸大承尊火字號十證火豉梔子甲戊君豬苓丁丙乙虎分癸中蜜導豬膽汗麻壬小柴庚己辛水字號四證陽明水甲抵當湯乙使茵蔯偏好強梔子蘖皮尋丙隊麻黃小豆水丁方少隂二十三證天字號十證天甲麻黃細辛髙麻附甘草乙相包黃連阿膠丙內用丁戌附子己庚桃辛內茱茰壬豬膚癸中甘結有功勞人地二號共十三證人甲苦酒丙白通半夏散中乙家逢丁丙白通豬膽汁戊中真武有神功通脈四逆須尋己辛用豬苓四逆庚壬癸大承兼地用甲承四逆乙丙同假如末二支上數到寅申二字只為少陽證少陽一證假如母字號下三證丑寅二字三合巳酉丑為號太隂三證少陽太隂合四證紀母二字號共四證少陽一證小柴胡太隂第二桂枝除第三證中四逆輩桂加大黃丙相如厥隂十九證乾字號十證乾甲鳥梅乙虎差當歸四逆丙中猜當四加吳薑丁妙戍巳四逆庚瓜蒂茯甘於辛升麻丸薑連苓參癸內棑坤字號九證坤甲四逆通脈分乙丁白頭丙桂尊戊內小承庚四逆己中梔子豉為君辛吳茱萸謁記取壬小柴胡常在心痓濕暍等證痓五證甲乙戊丁治痓尋桂枝續命問活人葛根承氣須詳用丙是括薑桂劑循濕六證濕申窮源用五苓乙宜梔子蘖皮平豬苓丙內為佳劑丁位麻上太陽一十六證日字號十證上太甲乙丁桂枝丙加葛根加桂時戌內尋證隨方治桂加厚朴己相隨庚加附子辛芍藥去芍壬中加附知桂枝麻黃各半癸後人學者記心機月字號六證先刺池府甲桂強乙中桂枝二麻黃白虎加參尋丙內丁桂二越婢一湯桂去桂加术茯戊芍藥甘草己尋常中太陽六十六證貪字號十證貪中甲乙葛根湯丙加半夏入前方根黃連苓丁丙戊己庚中是麻黃辛壬大青龍最妙癸小青龍是本鄉巨字號十證中陽巨甲小青龍貴加杏丙刑蹤桂枝乙丁戊壬癸麻黃湯中己辛庚祿字號十證麻黃甲祿最為良桂枝乙丙妙神方薑附子桂戌芍藥麻杏甘膏己丙相桂枝甘草庚堪用辛茯桂甘大棗湯厚甘半參壬丙癸茯桂术甘癸是常文字號十證下太陽三十九證震字號十證太陷胸元震甲方乙丙戊內大胸湯丁大柴胡己小陷庚中小陷白散強辛壬期門堪可刺小柴胡在癸中藏離字號十證小柴胡湯離申丁柴胡加桂乙相侵丙柴桂薑己十棗五苓散妙出於兊字號十證兊甲甘草㵼心湯乙赤石脂禹餘糧旋覆代赭於丙麻杏甘膏丁丙藏戊癸參庚大柴妙己大黃速心湯辛中瓜蒂壬無藥白虎加參癸是方坎字號九證坎中甲乙虎加參丁黃苓加半夏生丙內無藥五運六氣主病圖説夫主五運六氣隂陽虛實無越此圖經曰上天也下地也謂天周也五行之位天垂六氣地布五行天順地左回地羕天東轉木運之後天氣常餘氣不加君火却退一步加相火之上故五嵗退一位右遷故曰左右周天餘而復會會遇也言天地之道常五嵗曅餘氣遷加復與五行座再會而為嵗法也周天謂天周地位非天六氣也識傷寒鈴法歸號總例歌括上陽日月辰與巳中陽午上起貪星下陽子震兊離坎陽明卯木順相生逢申便是勞復證寅上須安霍亂名寅申少陽紀一證太隂丑母用心精少隂子起天人地痙亥暍卯濕未乘若問厥隂歸號處乾坤巳亥亦分明調理傷寒真妙訣萬兩黃金價也輕傷寒鈴法看病字號歌括日月俱為上太陽日十月六各分張貪巨祿文亷武破六十六法屬中陽震離坎兊三十九此訣名為下太陽陽明木火土金水四十四證五行藏紀屬少陽只一證太隂三法母身傍少隂子起天人地二十三種是尋常乾坤厥隂一十九霍勞各六莫輕忘痙五暍三濕亦六就中仔細為消詳陽證一百六十六隂證四十五條章仲景元來為此數總於前證盡包藏後學若還通此法強如端坐檢名方痙濕暍脈病證治法痙五證痙甲發熱無汗反惡寒剛痙應從表實看鬱熱感寒筋強直葛根湯下便能安痙乙發熱汗出不惡寒此名柔痙亦難安表虛感濕太陽病葛根劑或桂枝煎痙丙太陽發熱為表病其脈還當大且浮今反細沉名曰痙瓜蔞桂枝湯可投痙丁太陽之病發汗多致令陽微筋不和不必盡因寒濕得小續命湯用之瘥痙戊身熱足寒頭項強面赤目赤證非常有時頭熱還搖動有時口噤背反張其脈沉遲并弦細治法還宜承氣湯濕六證濕甲太陽關節痛而煩脈細沉時作濕看小便不通大便快但當利水五苓煎濕乙濕家體色似薰黃身熱而疼豈可當此是濕家脾色現便宜梔子柏皮湯濕丙背強頭汗欲得衣膈間滿噦小便稀渴而不飲口中燥亦須選用五苓醫濕丁下之額上汗微微小便利而喘者危下利不止亦死證麻黃加术頗相宜濕戊發熱身疼面色黃喘而頭痛脈猶強病在頭中寒濕重瓜蒂如神搐鼻良濕己一身盡痛不能移發熱日晡所劇時此名風濕脈沉細麻黃薏杏甘草醫暍三證暍甲太陽身熱惡寒時汗出還教渴不支此因中熱名為暍人參白虎用之宜暍乙太陽發熱脈微弱身痛而重最難當此由夏月傷泠水五苓瓜蒂並稱良暍丙發熱惡寒身重痛脈來遲芤細而弦灑然毛聳小便後手足逆泠自生寒小有勞時身即熱口開而喘齒痕乾汗下溫針俱不可清暑益氣法東垣上太陽脈病證治法十六證日甲陽浮隂弱衛中強身熱還教汗不藏嗇嗇惡寒翕翕熱鼻鳴乾嘔桂枝湯日乙太陽頭痛熱烘烘汗出之時又惡風榮衛調和邪亦解桂枝湯裏有竒功日丙太陽為病項背強汗出之時又惡風桂枝葛根湯可主祛風和表亦為功日丁太陽之病本屬表誤下還令氣上沖可與桂枝湯解外裏虛須更變而通日戊太陽三日已發汗若吐若下若溫針不解相將成壞證桂枝不中再尋思日己桂枝本為解肌藥酒客不喜桂枝湯喘家却須加朴杏吐者服之膿血傷日庚發汗之餘漏不乾小便澀閉屈伸難桂枝附子湯煎燎斂液回陽病即安日辛下之脈促胸間滿煎與桂枝去芍餐此是陽虛表漸入散邪通氣始能安日壬太陽脈促客邪干下後陽虛更惡寒桂枝湯中除芍藥却加附子一枚煎日癸發熱惡寒脈更微此時吐下汗皆非有熱無汗身應癢桂枝麻黃各半宜月甲先服桂枝煩不解風池風府刺之安大陽經病風邪泄再與桂枝愈弗難月乙桂枝服後形如瘧大汗之餘脈更洪桂枝二與麻黃一解散寒邪榮衛通月丙桂枝汗後更煩渴脈大而洪亦可危散熱生津和表裏人參白虎療之宜月丁發熱惡寒太陽病熱多寒少脈尤微此證無陽何可汗桂枝越婢按方施月戊頭項強痛身發熱雖經汗下邪猶結心下滿痛兼停飲桂枝去桂加苓术月己脈浮自汗小便數筋急心煩虛證多反與桂枝攻其表得之便厥可如何煩躁咽乾并嘔逆乾薑甘草劑調和厥愈足溫當益血芍藥甘草治其疴胃氣不和或讝語調胃承氣用之瘥若更燒針重發汗四逆湯煎慎勿訛中太陽脈病證治法六十六證貪甲太陽中風項背強無汗惡風几几搖解表葛根湯可治微汗之時病即消貪乙太陽陽明合病攻裏虛寒甚客胸中隂性下行必自利亦與葛根主治同貪丙太陽合病與陽明有時但嘔不下利邪氣相干氣不和葛根湯加半夏治貪丁太陽病本桂枝證醫反下之利不止喘而汗出兼脈促葛根芩連湯主此貪戊無汗而喘復惡風痛連骨節及腰中寒則傷榮宜發汗速用麻黃大劑攻貪己太陽合病與陽明喘而胸滿氣難平此非表實不可下麻黃解表效偏靈貪庚十日以外脈浮細嗜卧之時病漸降胸滿脅痛柴胡服但浮不細與麻黃貪辛發熱惡寒脈浮緊身疼不汗躁而煩大青龍湯餌之愈一服汗者止後煎貪壬脈浮而緩身不痛體重乍輕兼中風更無發厥吐利證妙者青龍大劑攻貪癸表未解時水氣停嘔而發熱嗽聲聲水寒相搏因傷肺小青龍劑療之平巨甲利減麻黃休發汗芫花逐水善調停如渴而煩除半夏却入瓜蔞津液生噎者去麻加附子小便不利用茯苓喘腫麻黃亦不用杏子仁添補肺經此是小青加減法隨時消息要分明巨乙衛強榮弱證如何脈弱而浮表未和縱日久時須汗解桂枝湯劑療其疴巨丙太陽未解下之早微喘應知氣不舒可與桂枝湯解表更加朴杏逆方除巨丁表邪未解汗偏宜誤下須知是逆施欲解肌時微發汗妙劑還當用桂枝巨戊發汗不解復下之脈浮反下亦非宜初來本是柴胡證今與桂枝且解肌巨己發熱身疼汗又無脈浮而緊表未除服藥微除還見衄宜與麻黃湯劑扶巨庚脈浮而數法當汗發熱身疼屬太陽灑灑惡寒邪在表麻黃湯劑用之良巨辛脈浮傷衛數傷榮榮衛之邪表病明速餌麻黃湯發汗莫教深入别傳經巨壬自汗之時榮氣和風邪客衛汗尤多桂枝與服風邪散榮衛和諧病得瘥巨癸中風臟亦無他證時時發熱汗尤多裏和表病汗之愈宜與桂枝湯劑和祿甲傷寒在表脈緊浮不發汗時致衄流邪擁於經因迫血麻黃湯劑療之瘳祿乙傷寒不便六七日有熱頭疼可下之小便清時還發汗頭疼而衄桂枝宜祿丙發汗身涼為已解却才半日又增煩脈浮而數邪猶在更用桂枝湯則安祿丁已經汗下猶堅燥夜靜晝煩表裏虛脈更沉微無大熱乾薑附子最相須祿戊發汗之後身疼痛脈沉遲者榮血傷可與桂枝湯作主新加參芍與生薑祿己汗後不可用桂枝汗出而喘表邪為麻黃杏草石膏劑以散其邪正合宜祿庚發汗過多心下悸其人叉手自冒心此是陽虛氣不足桂枝甘草劑宜斟祿辛汗後其人臍下悸隂邪上逆作奔豚茯甘桂棗湯煎療降腎滋脾效莫倫祿壬發汗之餘腹脹滿內無津液客邪侵降氣和脾通壅滯厚朴薑甘半夏參祿癸吐下表虛作頭眩心中逆滿氣沖胸更教誤汗身搖振术甘苓桂奏竒功文甲發汗不解反惡寒得之應作表虛看芍藥甘草與附子榮衛調和病即安文乙汗下交攻試問賢其邪猶在燥煩傳茯苓四逆湯能治診更精微證下愆文丙發汗惡寒是表虛但熱還因裏未除調胃承氣湯宜服泄實和中病可袪文丁汗餘煩渴胃中乾胃氣和時病即痊若更脈浮與有熱服下五苓津液還文戊脈浮而數表邪干汗後重教渴且煩和表五苓兼潤燥調其榮衛治何難文己汗出而渴用五苓汗而不渴費調停茯苓甘草湯宜用表解衛和津液生文庚中風發熱六七日不解而煩表裏兼渴飲水漿還欲吐是名水逆五苓諳文辛傷寒發汗吐下後反覆虛煩不得眠劇者心神顛倒甚速將梔子豉湯煎文壬汗下之餘邪不散胸中窒塞熱而煩可用梔子豉湯吐邪散熱除病必安文癸傷寒誤下五六日心中結痛客邪為身熱不去虛煩甚梔子䜴湯急吐宜亷甲下之腹滿又心煩卧起都教不得安泄滿吐煩君記取山梔厚朴劑宜煎亷乙丸藥下之熱不去正氣損兮邪氣留熱在胸中煩不解乾薑梔子劑宜投亷丙汗而不解熱難除汗出過多陽氣虛心悸頭眩身振振須慿真武妙湯扶亷丁汗家不可重發汗心虛恍惚亂而煩小便巳時隂內痛補心通水禹餘丸亷戊下之身痛利清榖隂盛陽微邪又牽救裏先須投四逆攻邪然後桂枝煎亷己發熱頭痛脈反沉不差遍體痛難禁此為裏症虛寒甚救裏宜煎四逆斟亷庚汗出少氣時發熱此是榮虛併衛強好與桂枝湯解散調和榮衛即安康亷辛傷寒中風五六日寒熱往來胸不舒默默不欲思飲食心煩而嘔費躊躇邪初入裏無定處或為之證更難拘隨時加減宜詳慎和中解表小柴胡廉壬邪正分爭結脅下寒熱因之自往來有時默默仍加嘔愈病良方用小柴亷癸身熱惡風頭項強脅滿口渴手足溫此名半表半裏證小柴胡劑莫因循武甲陽澀隂弦內有寒腹中急痛建中餐不差亦是柴胡證去苓加芍治之安武乙傷寒得病二三日欲傳未傳氣血虛心悸而煩先建裏小建中湯主治須武丙誤下曽經十餘日鬱鬱微煩嘔不安心下急時因胃熱大柴胡劑愈何難武丁傷寒不解十三日嘔而脅滿本柴胡醫施丸藥非其治潮熱重教發日晡熱已更加微下利此是邪乘腸胃虛先與小柴湯解表後入芒硝胃熱除武戊傷寒不解又過經讝語方知有熱蒸自利脈和為內實胃間客熱用調承武己其人熱結在膀胱下血宜先解表涼外已解時少腹急更用桃仁承氣湯武庚下之不解胸滿煩驚而讝語小便艱一身盡重難轉側龍骨柴胡牡蠣安武辛傷寒腹滿讝語時寸緊而浮肝乘脾木行乘土名縱脈當刺期門慎勿遲武壬發熱惡寒自汗出大渴腹滿小便通肝來乘肺名橫脈亦刺期門便見功武癸脈浮火迫必驚狂起卧不安耗損陽去芍桂枝加蜀漆􅀈蠣龍骨救逆湯破甲針處被寒因起核必發奔豚氣上衝炙其核上各一壯桂枝加桂便能通破乙火逆復下及燒針煩躁之時不可禁桂草龍骨牡蠣劑火邪解散斂真隂破丙太陽過經十餘日心下溫溫欲吐之腹滿便溏煩鬱痛此證柴胡湯亦宜若經吐下傷胃氣但欲嘔時便可知當與調胃承氣劑下其胃熱復何疑破丁太陽中風病不解熱結膀胱欲發狂小便自利少腹鞕畜血須知用抵當破戊脈沉而結病身黃小便不利茵陳湯便利如狂血證諦抵當湯用瀉之良破己傷寒有熱少腹滿小便不利今反利有血當為畜積時抵當丸子為主治普濟方卷一百二十四
