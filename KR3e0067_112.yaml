下天南星散出楊氏家藏方治破傷風遊入四肢口不能語及四肢強硬蜈蚣一條全去頭足炒黃天南星生用防風生用草烏去皮尖用各等分右為細末每服一錢熱酒調下不拘時候雄黃散出保命集治破傷風南星一錢半夏五錢天麻五錢雄黃二錢半右為末每服一錢以酒調下有涎於藥中可加大黃下之地榆防風散出保命集治破傷中風半表半裏頭微汗身無汗不可發汗宜服地榆防風地丁馬牙莧各等分右為末米飲下三錢白术湯治破傷風大汗不止筋攣搐搦白术乾葛一兩升麻二黃芩半兩右為細散水二盞煎一盞服治破傷風出儒門事親書烏稍尾一個兩頭尖四個全蝎四個右為細末另用石灰五升沸湯五升淋灰水澄清下藥熬之鐡鍋器內攪成膏子如稠用唾津調洗用溫漿洗淨瘡口後塗藥即時藥行吐黃水一日以新水漱口即愈玉真散一名奪命散一名防風散出三因方治風自諸瘡入破傷風及金刃傷打撲傷損天南星防風各等分沒藥半兩另研右為細末破傷風以藥敷貼瘡口然後以溫酒調下一錢如牙關緊急角弓反張用藥二錢童子小便調下或因鬪毆相打內有傷處以藥二錢溫酒調下打傷至死但心頭微溫以童子小便灌下二錢併進三服天南星為防風製服之不麻出黃水盡為效一日一次換一方無沒藥或以醋和灰麵貼瘡上一方用清油調塗瘡上昔張知府宰清流日以此二方授直廳醫者救欲死者數人凡居官者不可無此二方極效治破傷風口噤身強直出海上方藿香草烏頭生用去皮尖黃耆右等分為細末每服一字至半錢熱酒調下後用藥貼瘡口治破傷風白芷南星防風右各等分末乾摻瘡口亦可水煎服之神應丸一名救命丹治緊急破傷風身體沉重或角弓反張搐搦不省人事半夏一兩半草烏頭三兩巴豆一兩去殼並生用右為細末好棗四兩換水煮爛剝去皮同藥搗成劑丸如蓮子大緊者無灰酒磨一丸慢者半丸吐涎或㵼勿疑輕者不須服更審量老弱嵗數虛實加減之天南星丸治破傷風牙關緊急口噤不開面喎斜肢體弛緩天南星一枚及分者炮地龍五條醋炙土虺蛇一條去頭尾腸皮骨醋炙右為末醋煮麵糊丸如菉豆大每服三丸至五丸生薑酒下稀蔥粥投汗出即差昔宫使明光祖向任統判官嘗重傷服之得效乾蝎丸治破傷風乾蝎酒炒天麻各半兩蟾酥二錢湯浸化如稀糊右將二味搗羅為末用蟾酥糊丸如菉豆大每服一丸至二丸豆淋酒下甚者加三丸至五丸定命散治破傷風項頸緊鞭身體強直蜈蚣一條全者白花蛇項後取烏蛇項後取各二寸酒洗浸去皮骨並酒炙右為細散每服三錢至五錢煎酒小飲調服守宫丸出聖惠方治破傷風身如角弓反張及筋脈拘急口噤守宫炙乾去足七枚膩粉半分天南星一兩酒浸三日爆乾已上二味搖為末右同研勻細薄荷麵糊丸如菉豆大每斡口開以酒灌下七丸頃汗出得解更與一服再汗即差一方加白附子一兩煉蜜為丸守宫一名辟宫子烏頭散治破傷風發熱頭痛惡心煩悶草烏頭生用去蘆頭白礬生用蜀椒去目并閉口者生用各一分右為細末瘡口未合以津唾調塗覺淸水出足效仍服三味追風散烏頭生去皮臍一枚雄黃研一分麝香研一字右為細末散每服一錢以溫酒調下銀花散治破傷風打撲內損天南星大者半生半炮白附子半生半炮防風去蘆各等分右為細散每服二錢病重者童子小便調下稍輕熱酒調下如㱙傷用此藥貼瘡口仍依法服之如破傷風先以小便溫洗瘡口次用藥乾貼追風散立愈勢稍惡口噤者亦童子小便調乾開口灌之如鬪打至死但心頭微暖者併灌三服即治常須合不以備急用天南星散治諸般破傷風及治攧撲損傷中風天南星雄黃烏頭尖各等分右同為細末乾摻上或揉破傅之治破傷風無問表裏角弓反張地膚子炒八錢秋蟬二個麝香少許右為末調酒服每服二錢雄黃散出保命集治破傷風牙關緊急噤草烏頭去皮防風為末雄黃别研右等分每服一字熱酒調灌之亦洗頭風噤了牙關者如破傷風身體強硬用天南星二兩為末先以熱小便洗瘡貼之取紫汁出汗一方裏和至愈可服裏不和不可服治破傷風出神效方儒門事親白芷生用草烏尖生用去皮各等分右為末每服半錢冷酒一盞入蔥白少許用煎服之如人行十里以蔥白熱粥投之汗出立愈甚者不過二服治破傷風見血出濟生拔粹方半兩當歸蠟二錢合來捶碎酒同煎直須軟爛同柤喫一切傷瘡保萬全香膠散出三因方治破傷風口噤強直狀如中風魚膠燒留性七分麝香少許右為細末每服一二錢用酒調下如不飲酒用米湯調下又一方以蘇木煎調下麝香散治破傷風麝香研乾蝎各一分右為末傅患處令風速愈生大豆散治破傷風神效黑豆四十個味甘辛硃砂二十文味甘微寒惡磁石銀鹹水右同研為末以酒半盞調一字下辟宫子丸出聖惠方治破傷風身體拘急口噤眼亦不開辟宫子丸一條一名守宫酒浸三日爆乾搗羅為末膩粉半分右同研令勻以煮槐膠和丸如菉豆大不計時候拗口開以溫酒灌下七丸逡巡汗出差未汗再服治破傷風出儒門事親書病人耳塞并爪甲上刮末唾津調塗瘡口上立效無瘡口者難用又方用白麵燒鹽各一撮新水調塗瘡上又方用蝦蟆二兩半切爛為泥入花椒一兩同酒炒熟再入酒二半溫熱服之如重車行五里地通身汗宜效神治破傷風腫方出千金方取杏仁研為膏厚塗患處仍燃麻燭遙灸之治因瘡腫痛者皆中水風寒所作腫入腹則殺人方出千金方溫桑灰汁漬冷復溫之當令熱神效治破傷風欲死者用蜈蚣碾為末擦牙吐去涎沫立瘥治破傷風出瑞竹堂方無問新舊石灰驗瘡大小儘乾塗之不須封褁神效用避隂槐枝樹皮旋用刀刻取一塊連粗皮在外安在破處用艾醮於槐皮上灸百炷不妨如瘡口痛者止不痛者灸至痛然後用火摩不拘時候又方出瑞竹堂方治緊急破傷風用黃蠟一塊以熱酒化服之立差與前玉真散一劑連用牡蠣散出三因方治破傷濕口噤強直以牡蠣取末粉傅瘡口仍以末二錢煎甘草湯調下獨聖散治破傷風用蘇枋木不拘多少搗羅為細散每服三錢以酒調服之立效一方用巴豆七粒碎同用必效散治破傷風身項強硬不知人事兼治打撲損傷一名海神散治鰾膠白色者不拘多少於新瓦上用炭火煿焦黑色為度搗羅為細末散每服三錢以熱酒調下如不省灌之一方用童子小便調服亦可急急風散治破傷風腰背反折項強直牙關緊急用草烏頭不拘多少用釅醋煮十餘沸漉出曝如此十遍為度搗羅為細末每服一字溫酒調下白殭蠶散治身腫牙關不開用白殭蠶直者不拘多少生研為末每服用生薑自然汁調以雞翎於瘡口掃之勿令乾斯須腫拓皮皺為效仍用生薑汁調半錢匕服一方治癮疹及大腸風祕以酒調服之一方治風痰生薑汁一茶腳濕水調灌之治破傷風用燈心草嚼和唾貼之以白褁血立效治狗咬破傷風以人參不拘多少桑柴火上燒令煙絶用盞合研末摻瘡上立效治破傷風用大黃末一兩加乾大糞作三服以好酒服之以利三五行為度治破傷風瘡口作白痂無血者用雄黃雀糞直者研細熱酒調半錢服之舒筋法治傷破後筋攣縮不能伸他病筋縮亦可用以大竹管長尺餘鑽一竅繫以繩挂於腰間坐貼舉足搓衮之勿計工程久當有效此方出夷堅志言之亦有理曽試自有效治破傷風用黃明膠燒存性調二錢好酒服之追風散治破傷風蟬脫去土不拘多少右為細末摻在瘡上毒氣自散治破傷風燒鰾三錢為灰熱酒調下口噤挑開灌入一方入麝香少許又方生天南星一個為細末水調塗四面水出為效赤散子治破傷風雄黃少許草烏頭四個天南星十個右為細末患者看瘡口大小以新水塗調之用紙覆面蓋如此瘡認痛即以半散治之半夏半兩黑附子半兩天南星半兩蟬殼三十個藿香少許烏蛇一分取肉炙右六味同為末每服一字豆淋酒調下如瘡上認痛即併􅀈三服立效如不認痛即不與􅀈蜈蚣散蜈蚣一對鰾五錢左盤龍五錢炒煙盡為度野蛤糞右為細末每服一錢清酒調下治法依前用和至愈可服但有裏證不可服次當下之用前蜈蚣散四錢巴豆霜半錢燒飯為丸如菉豆大每服一丸漸加六七丸清酒調蜈蚣散少許送下冝利為度內外風去可常服羌活湯緩緩而治不拘時候服之羌活湯者治半在表半在裏也治一切破傷風水毒壅腫痛不可勝忍每用麝香末一字內在破傷風口中用舊罩子紙褁定取出盡膿水便效硃砂丸治破傷風目瞪口噤不語手足搦搐項筋強直不能轉側發則不識人硃砂研半夏洗川烏頭各一錢雄黃五錢鳯凰臺三錢麝香少許右為細末棗肉為丸如梧桐子大每服一丸或二丸冷水下以吐為度天麻丸治破傷風天麻三錢川烏頭三錢去皮生用草烏頭一錢半雄黃一錢半右為細末酒糊為丸如梧桐子大每服十丸溫酒送下不拘時候立效散治破傷風及沐髮中風極效方右以亂髮如雞子大無油器中熬焦黑研為末以好酒一盞沃之何首烏末二錢同攪候溫灌之下咽喉過三刻再灌立效除風破血以草石蠶浸酒服草石蠶生髙山石上根如著上有毛節如蠶葉卷拍治破傷風防風味草辛溫畏乾薑藜蘆白斂芫花天南星味苦辛有毒畏附子乾薑生薑右二味等分為末每服三二匙童子小便五升煎至四升服愈即止治破傷風入瘡強直天南星防風右等分為末以醋調作餅貼之普濟方卷一百十三
