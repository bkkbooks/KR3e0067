body:
  text: 普濟方卷一百十三明周王朱橚撰諸風門破傷風論夫刀箭所傷針瘡灸烙踒折筋骨癰腫瘡痍或新有損傷或久患瘡口未合不能畏慎觸冒風寒毒氣風邪從外所中始則傷於血脈又則攻於臟腑致身體強直口噤不開筋脈拘攣四肢顫掉骨髓疼痛面目喎斜如此之間便致難救此皆損傷之處中於風邪故名破傷風也風者百病之始也清淨則腠理閉拒雖有大風苛毒弗能為害故破傷風者通於表裏分别隂陽同傷寒證治人知有發表不知有攻裏和解此汗下吐三法也諸瘡不瘥榮衛虛肌肉不生瘡眼不合者風邪亦能外入於瘡為破傷風之候諸瘡上灸及瘡白痂瘡頭閉塞氣難通泄故陽熱易為鬱結甚則生風也故表脈浮而無力太陽也在表宜汗脈長而有力陽明也在裏宜下脈浮而弦小者少陽也半在裏宜和解若明此三法而治不中病者未之有也方羚羊角散治打擊破瘡或洗頭挑齒灸瘡狗咬等中風羚羊角鎊石斛去根芎藭知母焙山茱茰薏苡仁白芷曲棘針生用甘草炙芍藥紫苑去苑天雄炮製去皮臍防風去蘆牛膝酒浸火焙枳殼去穰麩炒蔓荆實去皮石南葉灑醋微炒焙杏仁湯浸去皮尖雙仁炒龍骨去土麻黃去根節煎去沫焙黃芩去黑心防己白术萆薢乾蔓菁花炒赤茯苓去黑皮葛根羌活去蘆頭蒼耳心炒車前子桑白皮銼菊花未開者酸棗仁炒當歸切焙藁本去苖土秦艽去苗土細辛去苗葉丹參烏蛇酒浸去皮骨炙各三分陳橘湯浸去白焙半兩右為散每服一錢半至二錢以空心午時夜臥溫酒調下要丸即煉蜜丸如梧桐子大每服十丸豆淋酒下大烏犀散治破傷中風犀角鎊羚羊角鎊龍腦研麝香研雄黃研熊膽研牛黃研乳香研阿魏研丹砂研水銀與丹砂同研漫火攪勻砂子研乾蝎酒炒豬牙皂莢酥炒去皮子烏頭去皮臍炮製附子炮製去皮臍白附子炮乾薑炮各一分天麻升麻獨活去蘆頭狗脊去土細辛去蘆葉秦艽去苗葉芎藭杜仲去粗皮切焙當歸厚朴去粗皮生薑汁炙黃耆炙銼藁本去土莨菪淘去浮者炒白鮮皮銼麻黃去根節水煎掠去末焙蜀椒去目并閉口炒去汗防風去蘆天南星炮各一兩右將二十六味搗羅為散與九味研者拌勻再羅一遍每服一分半漸加至二錢以豆淋酒調下生薑湯投甚者用米醋同煎與水服之牛黃丸出聖惠方治破傷風及諸風角弓反張牙關急硬言語不得牛黃半兩細研龍腦一分細研麝香一分細研硃砂半兩細研流黃半兩細研水銀半兩以少煮棗肉同研令星盡硼砂半兩細研膩粉半分白龍骨三分天麻三分牛膝三分去苗藁本三分桔梗三分去蘆頭白附子三分炮製木香三分白殭蠶三分微炒肉桂三分去皴皮當歸三分銼微炒防風三分去蘆頭附子三分炮製去皮臍天南星三分炮製獨活三分麻黃去根節一兩乾蝎三分微妙芎藭三分蔓荆子三分烏蛇二兩酒浸去皮骨炙令微黃犀角屑三分蟬殼三分羚羊角屑三分天麻黃三分細研檳榔三分右件藥搗羅為末入研了藥令勻鍊蜜和搗三五百杵丸梧桐子大每服不拘時候以熱酒下五丸併喫三兩服當有汗出為效莾草散治破傷中風莾草湯洗炙二兩半石斛去根二兩萆薢柏子仁生用石龍芮澤㵼牛膝酒浸切焙芍藥防風去蘆山茱茰莵絲子酒浸别搗白术細辛去苗葉芎藭各三分牛黃松脂各半兩附子炮製去皮臍杜仲去粗皮炙羌活去蘆頭烏蛇酒浸去皮骨炙各一兩桂去粗皮一兩半天麻麻黃去根節去沫焙先煎掠各二兩右為末與牛黃莵絲末拌勻每服一錢以溫酒調下日二夜一若中風腳手甲青者酒調二錢至二錢半頻頻服蓋覆良久以生薑稀粥投汗出即差牛黃散治破傷中風牛黃研乾蝎酒炒麝香研雄黃研各三分白附子炮三兩半天南星炮一兩白殭蠶炒天麻防風去蘆半夏湯洗七遍與生薑一兩搗焙乾各一兩半丁香丹砂犀角鎊羌活去蘆頭羚羊角鎊檳榔各半兩麻黃去根節先煎掠去沫焙乾附子炮製去皮臍各一兩一分烏蛇酒浸去皮骨炙蔓荆實去尖當歸切焙各一兩右先將十七味搗羅為散與研者四味和勻每服半錢以溫酒調下角弓反張牙關緊急以豆淋熱酒調下一錢以衣蓋良久汗出即差白附子白芍藥白茯苓零陵香白芨白斂麻油一斤白芷白檀藿香升麻細辛黃耆甘草杏仁去皮尖各半兩黃臘六分腦子一分大栝去皮二兩栝蔞根一兩摩風膏治頭面忽發瘡腫疥癬等疾及湯破傷摩風止痛滅癬䀶藥㕮咀以油內浸百日於臘日慢火炭上銀石器內煎至白芷微黃色焦再入栝蔞二味俟煎至百沸重綿濾去滓再慢火上燒香油下削去靣上浮沫并油盡淨黃蠟熔開為度傾在磁器內收貯上糝腦子密封用摩風塗之黑神丸治破傷中風身體強直口噤不開硫黃丹砂雄黃俱研各一兩水銀二兩已上四味同結砂子鉛丹硝石定粉俱研各二兩烏蛇肉藿香葉乾蝎去土炒白殭蠶炒麻黃去根節天麻天南星炮去皮白附子白芷附子炮製去皮臍麝香研各一兩右將前四味先結砂子研末次入鉛丹硝石定粉三味同炒黑色住火次十味並用酒浸一宿炒乾搗羅為末與前藥并後麝香合研令勻用頭醋煎膏和丸如皂角子大每服一丸傷寒生薑蔥酒磨下中風豆淋酒磨下一切風痰荆芥薄荷湯磨下羌活散出聖惠方治破傷風身體拘急手足搐掣牙關急強羌活一兩烏蛇二兩酒浸去皮骨炙令微黃天麻一兩防風一兩去蘆頭白附子一兩炮製藁本一兩麻黃一兩去根節白芷一兩白殭蠶一兩微炒天南星一兩炮製芎藭一兩細辛一兩附子一兩炮製去皮臍桂心一兩當歸一兩銼微炒桑螵蛸半兩微炒乾蝎一兩微炒晚蠶蛾半兩右件藥搗羅為散每服不計時候以溫酒調下一錢硃砂散出聖惠方治一切破傷急風口噤四肢抽掣硃砂一兩麝香半兩雄黃一兩俱細研天南星一兩炮製白附子一兩炮製母丁香一兩藿香一兩桂心一兩白花蛇一兩酒浸去皮骨炙令微黃防風一兩去蘆頭蟬殼一兩芎藭一兩蔓荆子一兩天麻一兩白殭蠶一兩微炒麻黃一兩去根節川烏頭一兩炮製去皮臍右搗羅為散入研了藥令勻每服不計時候以溫酒調下一錢羌活丸出聖惠方治破傷風筋脈拘急疼痛羌活芎藭藁本各一兩茵芋三分麻黃一兩去根節白附子三分炮製牛膝三分去苗麝香一分細研白龍骨三分木香三分防風三分去蘆頭桂心三分天麻一兩羚羊角屑一兩乾蝎半兩微炒當歸一兩銼微炒蒼耳喉頭一兩右搗羅為末入研了藥令勻每服煮棗肉和搗五七百杵丸如梧桐子大每服不拘時候以溫酒下十丸甚者日四五服以汗出為效附子丸治破傷中風附子炮製去皮臍烏頭炮製去皮臍天麻天南星炮各一兩已上四味粗搗篩入袋子以好酒三升浸之冬二七日夏一七日不得透氣日滿將袋子絞乾去滓取汁納入瓷石器中慢火熬成膏入後諸藥雄黃研丹砂研鉛霜研白殭蠶炒搗各一分蝎梢炒搗鹿角霜研鹿胎皮炙焦搗各半兩黑鍚搗一兩已上八味將四味同搗四味同研令極細龍腦研麝香研生金銼為末各一錢水銀一分入乾鍋內同與金末結沙子右各搗研同和令勻鍊蜜丸如菉豆大每服一丸至二丸空心午時夜臥溫酒下漸加三五丸赤箭散出聖惠方治破傷風身體強直牙關緊急目直視赤箭天南星炮當歸切焙白殭蠶炒芎藭白附子炮麻黃去根節烏頭炮製去臍羌活去蘆頭桂去粗皮各一兩蟬蛻去土乾蝎去土炒各半兩丹砂研烏蛇肉酒炙各三分麝香研一分膩粉三分右將十三味搗羅為末與别研三味和勻每服用一錢以溫酒調下不拘時候一方無烏蛇肉雄黃丸治破傷風身體強直口喎戰掉雄黃研羌活去蘆頭獨活去蘆頭各一兩膩粉研一錢人參蘆薈研烏犀角鎊牛黃研各半兩烏蛇酒浸去皮骨炙白殭蠶炒白附子炮天南星炮乾蝎酒炒槐膠研天麻各一兩右將十味搗羅為末入五味研者和勻以酒煮根蔥二莖熟後去蔥别入槐膠末一兩煎如稠膏和藥為丸如菉豆大每服二丸空心午時臨卧溫酒漸加至四五丸治諸破傷風腫急頭面者宜服此藥人參茯苓甘草前胡芎藭羌活桔梗柴胡枳殼當歸防風獨活荆芥各等分右㕮咀每服五錢薑一片水鍾半煎至一鍾去滓不拘時羌活湯治破傷風身如鐵石或如角弓反張口噤不開宜斡齒灌之羌活去蘆頭防風羚羊角鎊升麻黃芩去黑心蔓荆實去皮各一兩半犀角鎊二兩茯神去木一兩葛根銼甘草炙各一兩防風去蘆三分麻黃去根節煎掠去沫焙乾一兩右粗搗節篩每服三錢以水一鍾入地黃汁半合薤白二寸煎至八分去滓空腹溫服如病急不拘時候服蓋覆出汗愈乳香散治破傷中風乳香炒軟候冷研烏蛇酒浸去皮骨炙乾蝎酒炒天麻赤茯苓去黑皮蛇黃煆醋淬白附子炮白芥子炒白殭蠶炒白芨半夏湯洗七遍與生薑半兩同搗焙乾白斂各半兩右為散每服一錢以生薑溫酒調下日二夜一小兒只一字用薄荷湯調下白殭蠶丸治破傷中風白殭蠶炒麝香研烏蛇酒浸去皮骨炙牛黃研乾蝎酒炒木香龍骨去土研蟬蛻炒去土杜仲去粗皮炙天麻原蠶蛾炒雄黃研各半兩右將八味搗羅為末與别研四味勻和煉蜜丸如菉豆大每服二丸溫酒下甚者三丸併兩服豆淋酒下汗出如珠顆眼黃飲得水者可治若汗出如油直視吐涎水心煩熱悶頭髮亂身不轉者難治烏蛇丸治一切破傷風烏蛇酒浸去皮骨炙山梔子去皮各半兩獨活去蘆頭枳殼去穰麩炒防風去蘆白鮮皮人參丹參芎藭沙參各一兩苦參三分右為末煉蜜丸如梧桐子大每服七丸溫酒下加至十丸附子散出聖惠方治破傷風體強直筋拘急口眼偏斜附子一兩炮製去臍川烏頭一兩炮製去皮臍乾蝎一兩微炒烏蛇三兩酒浸去皮骨炙微黃天麻一兩天南星一兩炮製白附子一兩炮製防風一兩去蘆頭白殭蠶一兩微炒蟬蛻一兩麻黃一兩去根節藿香一兩右搗羅為散每服不計時候以溫酒調下一錢獨活散出聖惠方治破傷風四肢不收口中沫出及中賊風並治之獨活一兩白殭蠶三分微炒乾蝎半兩微炒附子一兩炮去皮臍防風三分去蘆頭芎藭一兩當歸三分麻黃一兩去根節桂心一兩赤芍藥三分天麻一兩細辛三分右搗羅為散不計時候以溫酒調下一錢如聖散治破傷風蒼术泔浸炒白芷各二兩半細辛一兩半防風五錢川烏二兩半大川烏炮二兩半天麻半兩全蝎去毒半兩麻黃半兩白术炮二兩半草烏炮一兩半右為末每服一錢溫酒調下如金瘡血出用藥貼之汗出即愈如諸瘡貼患處頭風口唅水鼻內嗅之一方有桔梗無全蝎麻黃走馬散治破傷中風牙關緊急口面喎斜身體或軟小兒驚風或治之天南星炮半夏湯浸七遍與生薑半兩同搗焙乾白附子炮附子炮製去皮臍各半兩丹砂研雄黃研牛黃研麝香研犀角鎊各一分膩粉研三分先將搗羅為末入五味研者和勻每服半錢以豆淋酒調下汗出即差如未汗出再服一字良久用熱生薑稀粥投若小兒患每服一字荆芥湯或熱水調下要丸即用新炊餅丸如大麻粒大每服三丸至五丸吐逆用生薑湯下出汗用生酒熱粥飲投之天南星丸出聖惠方治破傷中急風宜服天南星半兩生用白附子三分生用膩粉半分龍腦一分細研烏蛇肉一兩生用乾蝎半兩生用麻黃三分去根節附子一兩去皮臍生用牛黃一分細研麝香半兩細研硃砂三分細研右搗羅為末研令勻以酒煮麵糊為丸如菉豆大不拘時候以豆淋酒下七丸蓋知湯出濟生拔萃方治破傷見血乾生薑四兩杏仁一斤炒白麵三斤炒甘草七兩炒鹽三兩炒益智仁三兩青皮陳皮各二兩京三稜一兩蓬莪茂一兩右為極細末白湯點之溫服靈砂丹出宣明論治破傷風一切諸風等葳靈仙黑牽牛何首烏蒼术