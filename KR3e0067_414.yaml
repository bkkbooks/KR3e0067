body:
  text: 普濟方卷四百十四明周王朱橚撰針灸門腧穴圖頭部中行十穴外神聰四穴明堂一穴神庭一穴在鼻直入髮際五分灸七壯止七七壯岐伯曰凡欲療風勿令灸多緣風性輕多則傷宜灸七壯止二七壯禁針針即發狂忌生冷雞豬羊魚肉酒麵動風等物明堂經云舉火之時忌熱食不宜熱衣亦云灸三壯銅人經云在髮際直鼻上督脈入髮際一寸灸二七壯至百壯治腫氣風癎癲風戴目上不識人羊鳴吐舌角弓反張棄衣而走披髮而行或歌或哭多學人言語驚悸不得安寢頭痛喘渴目不可視目淚出鼻清涕不止又云灸足太陽陽明脈之會主頭風目眩上星一穴在鼻直上入髮際一寸陷中明堂云容豆是以細三稜針刺之即宣泄諸陽熱氣無令上衝頭目可灸七壯不宜多若頻灸之即拔氣上令目不明忌如前甲乙經熱穴論注並刺三分銅人經云在額顱上直鼻中央入髮際一寸督脈氣所發治頭風面赤腫皮虛腫鼻塞不聞香臭頭痛目眩赤瘧疾發寒熱病汗不出目晴痛不能遠視又云針入三分留十呼瀉五吸針下氣盡更停針引之得氣即瀉灸亦得然不及針日灸三壯至百五壯罷須停十餘日然後更灸故不用相續加灸滿五十壯即以細三稜針刺頭上以宣熱氣忌酒麵蕎麥𩕄會一穴在上星後明堂經云上星上一寸陷中可灸二七壯至七七壯初灸即不痛病去即痛亦云灸五十壯痛即罷灸針二分留三呼得氣即瀉若八歲以下不得針緣𩕄門未合刺之不幸令人夭素問注云刺四分銅人經云在上星後一寸陷中可容豆督脈氣所發治目眩面腫鼻塞不聞香臭驚癎戴目上不識人若是鼻塞灸至四日漸退七日頓愈頭風生白屑多睡針之彌佳針訖以鹽末生麻油相和揩髮根下頭風即永愈忌熱麵豬魚蕎麥等物明堂經云主頭皮腫靣赤資生經王氏云豫少刻苦年踰壯患腦冷或飲酒過多則腦疼如破後因灸此穴非特腦不復冷他日酒醉腦亦不疼矣凡腦疼冷者宜灸此前頂一穴在𩕄會後寸半骨陷中亦云在𩕄會上甄權云一寸今依素問寸半為定針一分灸三壯止七七壯素問注云刺四分銅人經云腎脈所發療頭風熱痛目眩頭面赤腫小兒驚癎風癎癲癡發作無時鼻多清涕頂疼痛又云針入三分留七呼瀉五吸大腫極即以三稜針刺之繞四方一寸以下其頭疼腫立差復以鹽末生麻油揩髮際下灸亦得忌如前法明堂經云在𩕄會後一寸直鼻中央陷者中治頭皮腫百會一穴一名三陽五會在前頂後一寸半頂中央旋毛中可容至灸七壯止七七壯凡灸頭頂不得過七壯緣頭頂皮薄灸不宜多針二分得氣即瀉素問注云刺四分銅人經云腎脈足太陽交會於頂上治大人小兒脫肛久不差風癎青風心風中風角弓反張羊鳴或多哭言語不擇發作無時發時即死盛即吐沫心煩驚悸健忘心神恍惚痎瘧耳鳴耳聾鼻塞不聞香臭又云療頭風頭痛目眩多睡無心力吃食無味頭重飲酒靣赤如灸數至百五即停三五日訖繞四畔以三稜針刺令出血以井花水淋之令氣宣通不得令向火灸恐拔氣上令人眼暗忌酒麵豬魚蕎麥蒜虀等資生經云唐秦鳴鶴針髙宗頭風武后曰豈有至尊頭上出血之理已而刺之微出血頭疼便立止后亟取金帛賜之是刺此穴能治頭風明堂經中風言語蹇澀半身不遂者灸七處亦先於百會北人始生子則灸此穴蓋防他日驚風也王氏云豫舊患心氣偶覩隂陽書有云人身有四穴最急應四百四病皆能治之百會蓋其一也因灸此穴而心氣愈後閲灸經此穴果主心煩驚悸健忘身無力自是間或灸之百病皆主不特治此數病已也一名天蒲神聰四穴在百會四靣各相去同身寸一寸理頭風目眩狂亂風癎左主如花右主如果針三分明堂經有此穴而銅人無之其穴治頭風目眩狂亂風癎亦所不可廢者故附入於此明堂一穴在鼻直上入髮際一寸理頭風多鼻涕鼻塞三日一報針二分銅人經云針三分按銅人明堂經諸家針灸經鼻直上入髮際一寸皆云上星穴明堂經於此復云明堂穴不知何所據且附入於此所謂疑以傳疑也今以諸經挍勘上星穴後頂一穴一名交衝在百會後寸半玉枕骨上陷者中灸五壯針二分明堂經云四分銅人經云針入四分灸五壯主風眩目􅉩􅉩額顱上痛亦云針入三分又云督脈氣所發治頸頂惡風寒頭偏痛明堂經云灸三壯主目不明頭目眩重西方子云主諸陽之熱嘔吐癲疾強間一穴一名大羽在後頂後寸半灸七壯針二分亦云五壯銅人經云督脈氣所發主頭如針刺不可以動項如拔不可左右顧視又云治腦旋目暈頭痛不可忍煩心嘔吐涎沫發作無時項頂強明堂經云灸三壯岐伯云兼治風癎病西方子云主癲疾癎發狂走不得卧腦户一穴一名合顱在枕骨上強間後一寸半禁針針令人啞可灸七壯亦可不妄灸令人夭明堂經云灸令人失音針三分素問注云四分甲乙云不可灸銅人經云一名仰風一名會顱是督脈足太陽之會主目睛痛不能遠視靣赤頭腫目黃又銅人經云禁針素問明堂經云針入三分四分亦可疑矣何如不針為穩素問蓋云刺腦户入腦立死故也風府一穴一名舌本在項後髮際上一寸大筋內宛宛中經言其肉立起立休立下禁灸使人失音針三分銅人經云一名舌本督脈陽維之會治頭痛頸急不得回顧目眩鼻衄喉咽痛狂走目妄視又主頭項急不可傾側鼻不可息嗌痛足不仁明堂經云主暴瘖不得言多悲恐驚悸欲自殺目反視又云四分留三呼又云舌緩針風府資生經云岐伯對黃帝傷寒之問曰巨陽者諸陽之屬也其脈連於風府諸穴為諸陽主氣也然則風府者因傷寒所自起也北人皆以毛裹之南人怯弱者亦以帛護其項俗謂三角是也王氏云豫少怯弱春冬須數次感風自用物護後無此患矣凡怯弱者須護項後可也啞門一穴一作瘖一名舌橫一名舌厭在頂中央入髮際五分宛宛中督脈陽維之會入繫舌本仰頭取之禁灸令人啞針三分素問注云在項後髮際宛宛中去風府一寸明堂經云舌息不言如何治答曰舌息針瘖門舌緩針風府得氣即瀉小繞針針入八分留三呼瀉五吸瀉盡更留針取之得氣即瀉銅人經云治頭項強舌緩不能言諸陽熱氣盛鼻衄血不止頭痛頭風汗不出寒熱風痙脊強反折瘛瘲疾頥重針二分曲差二穴在神庭兩旁寸半入髮際針三分灸三壯銅人經云足太陽脈氣所發治心中煩滿汗不出頭項痛身體煩熱目視不明針入二分灸三壯五處二穴在上星兩旁寸半針三分留七呼灸三壯明堂經云灸五壯銅人經云足太陽脈氣所發治目不明頭風目眩瘛瘲目戴上不識人西方子云在頭上去上星傍一寸主脊強反折癲疾頭痛又云在頭督脈傍去上星二寸半主風痺悶承光二穴在五處後寸半針三分禁灸明堂經云在五處後二寸素問注云一寸銅人經云足太陽脈所發治鼻塞不聞香臭喎鼻多清涕風眩頭痛欲嘔吐心煩目生白膜忌如前法通天二穴在承光後寸半針三分留七呼灸三壯銅人經云足太陽脈氣所發治頸項轉側難鼻塞悶偏風口喎鼻多清涕衄血頭重又云主項痛重暫起仆僵喘息不利齀衄有瘡絡穴二穴一名強陽又名腦蓋在通天後寸半灸三壯素問注云刺三分留五呼西方子云主癲疾嘔吐狂走瘛瘲恍惚不樂腹脹滿不得息暫起仆僵銅人經云足太陽脈氣所發治青風內瘴目無所見頭旋耳鳴玉枕二穴在絡却後寸半明堂經云絡却後七分半狹腦户腦户在強間後一寸半傍一寸三分起肉枕骨入髮際上三寸灸三壯主頭重如石目痛如脫不能逺視銅人經云足太陽脈氣所發腦風寒痛不可忍者又云主目內攣系息痛頭寒汗多耳聾鼻塞西方子云失枕頭重項痛風眩頭中寒痛項如拔不可左右顧目上插卒起僵仆惡見風寒汗不出悽厥惡寒腦風明堂經又云針三分素注云留三呼甲乙經云二分資生經云銅人經云玉枕在絡却後一寸半明堂上下經皆云七分半若以銅人為誤則足太陽穴亦同若以明堂為誤不應上下經皆誤也小本明堂亦同王氏按素問注云玉枕在絡却後七分則與明堂之七分半相去不逺矣固當從素問為凖然而玉枕二穴既夾腦户不應止七分則止於腦蓋也銅人之一寸半蓋有説焉識者當詳辨之今總諸經校勘在絡却後寸半者是天柱二穴在夾項後髮際大筋外廉陷中一云在宛宛中五分得氣即瀉明堂經云二分留三呼瀉五吸灸不及針日七壯至百五壯下云三壯素問注云刺二分銅人經云足太陽脈氣所發針二分主頭風目如脫項如拔項疼頭重先瀉而後補之灸亦得然不及針忌如前法明堂經云主項痛頸強左右不可顧頭痛目不明目淚出鼻不知香臭風眩暴卒癎眩狂言不休目上煩滿汗不出足不仁身肩背痛欲折頭旋腦痛眉衝二穴一名小竹當兩眉頭直上入髮際是療目五般癎頭痛鼻塞不灸通針三分明堂上經有眉衝穴而銅人經云無之療目五般癎頭痛鼻塞治疾所不可廢者其穴與曲差相近故附於此臨泣二穴在目上皆直入髮際五分陷中針三分留七呼得氣即瀉忌回素問注云灸五分銅人經云足太陽少陽之會主卒中風不識人風眩鼻塞目生白翳多淚忌如前法西方子云主腋下腫喜驚頰胸痺心痛不得反側瘧日夜發脅下痛資生經云足少陽有臨泣穴矣此亦有之蓋此乃頭臨泣也目窗二穴在臨泣穴後一寸針二分灸五壯今附三度刺目大明銅人經云足少陽陽維之會治頭靣浮腫痛引目外眥赤痛匆頭旋目􅉩􅉩遠視不明西方子云主諸陽之熱頭痛寒熱汗出不惡寒目眩瞑唇吻強上齒齲痛正營二穴在目窗下後一寸針三分灸五壯銅人經云足少陽陽維之會治齒痛唇吻急強齒齲痛頭項偏痛西方子云主諸陽之熱承靈二穴在目窗後寸半灸三壯素問注云刺三分銅人經云足少陽陽維之會治頭腦疼惡風寒齀鼻塞息不利西方子云主鼻衄窒喘息不通腦空二穴一名顳顬在承靈後寸半夾玉枕骨下陷中針五分得氣即瀉灸三壯銅人經云足少陽陽維之會治腦風頭痛不可忍目瞑心悸發即為癲風引目眇勞疾羸瘦體熱頸項強不得回顧魏公苦患頭風發即心悶亂目眩華陀當針而立愈西方子云主鼻管疸發為厲鼻勞衄不止耳風鳴聾素問注云按腦空在枕骨後枕骨上甲乙經作玉枕骨中忌如前法明堂經云灸七壯主狂病身寒熱風池二穴在腦空後髮際陷中針七分留七呼灸三壯明堂經云在項後髮際陷中甲乙經云腦空後髮際陷中針一寸三分大患風者先補後瀉少可患者以針取之留五吸瀉七吸灸不及針日七壯至百五艾炷不用大忌同西方子云主鼻衄窒喘息不通癲仆煩滿口癖惡寒銅人經云足少陽陽維之會治灑淅寒熱溫病汗不出目眩苦頭痛痎瘧頸項痛不得回顧目淚出欠氣多鼻齀衄目內眥赤痛氣發耳塞目不明腰傴僂引項筯無力不收針入七分可灸七壯又云主肺風面赤目􅉩􅉩項強靣腫皮軟腦頭痛灸亦良然不及針問曰如後髮際亦有項腳長者其毛首至頭骨亦有無項腳者毛齊至天牖穴即無毛根而何取穴也答曰其毛不可輒定大約如此若的的定中府正相當即是側相去各二寸此法定穴當陽二穴當瞳人直上入髮際一寸療目不識人風眩鼻塞針三分資生經云銅人無當陽穴而明堂下經有之理卒不識人風眩鼻塞等疾亦不可廢者其穴與臨泣相近故附於此頷厭二穴在曲鬢下明堂陽穴無下字明堂同腦空上廉灸三壯針七分留七呼忌同明堂經云二分素問注云在曲鬢下腦空上上廉刺七分若深令人耳無所聞銅人經云手足少陽陽明之交會治頭風眩目無所見遍頭痛引目外眥急耳鳴多嚏頸項痛又云二穴在曲鬢顳顬上廉懸顱二穴在曲上足少陽穴同明堂無上字腦空中灸三壯針三分留三呼明堂經云二分素問注云在曲上腦空下亷新校正云按後手少陽中云鬢上此云鬢下必有一誤懸顱二穴在曲鬢上是也銅人經云足少陽脈氣所發治熱痛煩滿汗不出頭偏痛引目外眥赤身熱齒靣膚亦痛西方子云主熱痛引目內眥忌如前懸釐二穴在曲鬢上足少陽穴無上字腦空下廉針三分灸三壯銅人經云手足少陽陽明之交會治熱病汗不出頭偏痛煩心不欲食目兑一作內眥赤痛西方子云二穴在曲鬢顳顬下廉主靣皮赤腫痛癲疾互引善驚羊鳴天衝二穴在耳上如前三寸足少陽穴啚灸七壯針三分銅人經云二穴在耳上如前三分治頭痛癲疾風痙牙齗腫善驚恐可灸七壯針三分西方子云亦作天衢率谷二穴在耳上入髮際寸半陷者宛宛中灸三壯針三分明下云針而取之銅人經云足太陽少陽之會治膈胃寒痰傷酒風熱發兩目眩痛腦兩角弦痛不能飲食煩滿嘔吐不止曲鬢二穴在耳上髮際曲隅陷中鼓頷有空明作穴針入三分可灸七壯明下云曲髮灸三壯指齒在耳上將耳掩前正尖上銅人經云足太陽少陽之會治頰頷腫引牙車不得開息急痛口噤不言灸亦良明堂經云主頸項急強不得顧引牙痛西方子云主暴啞不能言齒齲痛銅人經云曲髮足少陽穴同素問亦同明堂下經云曲髮疑髮字誤也曲鬢穴是曲髮字誤角孫二穴在耳郭中間止開口有空明作穴治目生膚翳齒齗腫灸三壯明堂别無療病法明堂經云主牙齒不嚼物齲痛腫針八分銅人經云手足少陽之會又云手足少陽手太陽之會西方子云主頭腫項痛不可顧頸頷柱滿資生經云按明堂經云角孫主牙不嚼物齲痛腫則有療病法矣銅人乃云明堂别有療豈後人增益之耶將所治止此因謂之無療病法歟竅陰二穴在枕骨下少陽穴云完骨上搖動有空針三分灸七壯明堂經云灸五壯針四分在完骨上枕骨下完骨二穴在耳後入髮際四分銅人經云足太陽少陽之會治勞疸發厲頭痛引頭目痛又云主骨疽西方子云主頭痛如錐刀刺不可以動主頷痛引耳嘈嘈耳鳴無所聞舌本出血及主舌寒口乾心煩臂外肘莭痺不能伸鼻管疽發為齀鼻衄頭痛及四肢轉筋癰疽頭痛風惡引頭目浮白二穴在耳後入髮際一寸針五分灸七壯明堂經云三壯三分銅人經云足太陽少陽之會治發寒熱喉痺氣痺咳逆痰沫疝積胸中滿不得喘息耳鳴嘈嘈無所聞頸項癰腫及癭氣肩背不舉悉皆治之又云主疝積不能言西方子云主牙齒痛手縱足緩不收顱𩕄二穴在耳後間青絡脈灸七壯不宜針明堂經云顱𩕄在耳後青絡間灸三壯針一分不得多出血出血多殺人銅人經云足少陽氣脈所發治身熱頭重脅痛不得轉側風痙耳聾小兒發癎瘛痰喘不得息嘔吐延沫驚恐失精瞻視不明不宜針即可灸七壯又云主耳痛塞鳴胸脅相别不得俯仰及治頭眩瘛脈二穴一名資脈在耳本後雞足青絡脈刺出血如豆汁不宜出血多灸三壯針一分明堂經云在內雞足青脈銅人經云治頭耳鳴小兒驚癎瘛瘲嘔吐泄痢無時驚眵瞢目精耳不明耳後痛西方子云不灸完骨二穴在耳後入髮際四分灸七壯針三分明堂經云二分灸依年壯銅人經云足太陽少陽之會治頭痛煩心癲疾頭靣虛腫齒齲偏風口眼喎邪頸項痛不得回顧小便赤黃喉痺頰腫針入五分又云主風眩項痛頭強寒熱針二分西方子云主肘腫足痿失履不收頭風耳後痛煩心及足不收僵仆狂瘧項強急痛翳風二穴在耳後陷中按之引耳中針七分灸七壯明堂下經云三壯在耳後尖角陷中銅人經云手足少陽之會治耳聾口眼喎針失穴脫頷口禁不開不能言頰腫牙車急痛西方子云主耳鳴口禁不開引鼻中口失欠及牙齒痛明堂經云主耳聾暴啞青髎一穴一名靣正在鼻柱之端外臺云不宜灸針一分銅人圖經云督脈所發此穴諸方闕治療法千金治鼻塞痘肉不消多涕生瘡水溝一穴一名人中在鼻柱下宛宛中針四分留五呼得風即瀉灸不及針日三壯若灸可艾炷如小雀糞風水面中腫針此一穴出水盡頓愈明堂經云灸三壯至二百罷若是水氣唯得針此穴若針餘穴水盡即死下云灸五壯銅人經云水溝在鼻柱下一名人中督脈手陽明之會治消渴飲水無度水氣偏身腫失笑無時癲語不識尊卑乍喜乍哭牙關不開靣腫唇痛葉葉肺風伏如蟲行卒中惡針此一穴出水盡即頓愈又云針入四分徐徐出之西方子云主寒熱頭痛喘渴目不可視鼻不聞香臭口喎僻不能開水漿禁瘖不能言寒熱卒中惡風水靣腫忌如前法兑端一穴在唇上端針二分灸三壯炷如大麥明堂下經云在頥前下唇下宛宛中開口取之銅人經云治癲疾吐沫小便黃舌乾消渴衄血不止脣吻強齒齗痛針入三分可灸三壯明堂經云主口噤鼓頷斷交一穴在脣內齒上齗縫筋中針三分灸三壯銅人經云治靣赤心煩痛頸項急不得回顧小兒靣瘡癬久不除點烙亦佳鼻塞不利目淚眵汁內皆亦癢痛生白膚翳鼻中息肉蝕瘡西方子云在脣內齒縫灸三壯主鼻窒喘息不利鼻喎僻多涕齀衄有瘡頭頷頞中痛口不能飲水漿喎僻口噤不開項如拔不可左右顧靣赤頰中痛心煩痛承漿一穴一名懸漿在頥前唇下宛宛中日灸七壯止七七壯灸即血脈通宣其風立愈炷依小筯頭作針三分得氣即瀉明堂經云頥前下唇之下針三分半得氣即瀉瀉盡更留三呼徐徐引氣而出日灸七壯過七十停四五日後灸七七若急灸恐足陽明脈斷令風不差停息復灸令血脈通宣其風立愈下云唇稜下宛宛中銅人經云足陽明任脈之會療遍風口喎面腫消渴口齒疳蝕生瘡灸亦佳日可灸七壯至七七壯止矣其艾炷不用大一依小筯頭作炷脈粗細狀如細線艾炷破肉但令當脈灸雀糞大亦能愈疾凡灸臍下灸令疝瘕痃癖氣塊伏梁積氣宜灸炷大故小品諸方云腹背宜灸五百壯四肢則但去風邪不宜多灸七壯至七七壯止不得過隨手數如巨闕鳩尾雖是胸腹之穴灸不過七七壯艾炷不須大以行筯頭則炷正當脈上灸之若灸胸腹艾炷大灸多令人永無心力如頭頂穴若灸多令人失精神臂腳穴灸多令人血脈枯竭四肢細度無力既腹失精神又加於細度即脫大真氣忌如前法明堂經云療消渴飲水無休口噤不開及暴啞不能言也西方子云主靣風目眩瞑小便黃或不禁廉泉一穴一名舌本在頷下結喉上明云舌本間灸三壯針三分得氣即瀉明堂經云二分千金云當頥直下骨後陷中銅人經云隂維任脈之會治舌下腫難言舌縱涎出咳嗽上氣喘息嘔沫口噤舌根急縮下食難攢竹二穴一名始光一名光明一員柱兩眉頭少陷宛宛中不宜灸針一分留三呼瀉三吸徐徐出針宜以細三稜針刺之宣泄熱氣三度目大明明云宜細三稜針針三分出血下云灸一壯銅人經云足太陽脈氣所發治目􅉩􅉩視目不明眼中赤痛及瞼瞤動明堂經云主頭目風眩眉頭痛鼻齀衄但是口厥顛狂痛神邪鬼魅主之忌如前法精明二穴一名淚孔在目內針一寸半留三呼雀目者可灸留針然速出禁灸明云目內眥頭外畔陷宛宛中針分半留三呼補不宜灸一云目內眥外一分銅人經云手足太陽少陽明五脈之會治攀睛翳膜覆瞳惡風淚出目眥癢痛小兒雀目疳眼大人氣冷眼淚遮目視物不明大眥努肉侵睛針一寸五分留三呼禁灸資生經云按明堂針一分半銅人乃云入一寸半二者必有一誤王氏云豫觀靣部針淺者一分深者四分素問氣府注云刺入一分則是銅人誤寫一分為一寸也巨髎二穴夾鼻孔傍八分直目瞳子蹻脈足陽明之會針三分得氣即瀉灸七壯明堂經云巨窖在鼻孔下夾水溝旁八分蹻脈足陽明之會針三分灸七七壯銅人經云治青盲目無所見遠視􅉩􅉩白翳覆瞳子面風寒鼻塞䪼上腫壅痛瘛瘲口喎僻針入三分灸亦良西方子云療招搖視瞻目淚出多赤痛癢迎香二穴在禾髎上一寸鼻下孔傍五分針三分留三呼不宜灸銅人經云手足陽明之會治鼻瘜肉不聞香臭衄血偏風口喎靣癢浮腫風動葉狀如蟲行刺或在唇動或癢腫痛忌如前法禾髎二穴在鼻孔下夾水溝旁五分針二分又手陽明穴云禾髎一名長頰直鼻孔夾水溝旁五分明堂經云灸三壯銅人經云手陽明脈氣所發治鼻衄不止鼻流清涕生瘡口噤不開及尸厥也西方子云主鼻窒口僻資生經云銅人經云禾髎二穴在鼻下夾水溝旁五分明堂下經作禾窖窖即髎也上經乃作禾髎皆在鼻下夾水溝旁五分則是一穴也而銅人手陽明穴復有和窖二穴在耳前兑素問作鋭髮陷中其穴遠矣恐明堂經誤禾字作和字陽白二穴在眉一寸直目瞳子灸三壯針入二分銅人經云足少陽陽維之會治頭目痛目眵皆􅀈寒栗重衣不得溫西方子云主目瞳子痛癢遠視􅉩􅉩昏夜無所見目系急目上插承泣二穴在目七分直目瞳子陷中禁針針之令人目烏色可灸二壯炷勿大明堂經云針入四分半得氣即瀉特不宜灸若灸無問多少三日後眼下太如拳息肉日加長如桃大至三十日定不見物腫或如五升許大銅人經云蹻脈任脈足陽明之會治口眼喎斜目瞤面葉葉動牽口眼目視􅉩􅉩冷淚眼眥赤痛禁不宜針可灸三壯西方子云不灸資生經云銅人經云此穴可灸三壯禁針針之令人目烏色明堂乃知其若是不針不灸可也四白二穴在目下一寸灸七壯針三分凡用針穩審方得下針深即令人目烏銅人經云足陽明脈氣所治頭痛目眩眼生白翳微風目瞤動下急西方子云主目眗淚出多眼內眥赤痛癢地倉二穴夾口吻旁四分外如唇下有脈微動是也針三分明云針三分半留五呼得氣即瀉日可灸二七壯重者七七炷粗叉腳大炷若大口轉喎却灸承漿七七即愈銅人經云蹻脈手陽明之交會若久患風其脈亦有不動者治偏風口喎目不得閉失瘖不語飲食不收水漿漏落眼瞤動止病左治右病右治左忌豬肉魚熱麵毒物房勞等大迎二穴在曲頷前一寸二分骨陷中動脈又以口下當兩眉針三分留七呼灸三壯銅人經云足陽明脈氣所發治寒熱頸痛瘰癧口喎齒齲痛數欠氣痓口噤牙疼頰頷腫惡寒舌強不能言風壅而腫目不得閉唇吻瞤動不止當針之頓愈西方子云治口噤不開引鼻中口涎不收本神二穴在曲差傍一寸半云直耳上入髮際四分針二分灸七壯銅人經云足陽明少陽維之會治目眩頸項強急痛胸脅相引不得轉側癲疾嘔吐涎沫針入三分可灸三壯西方子云療小兒驚癎絲竹空二穴一名目髎在眉陷中針三分留二呼宜瀉不宜補禁灸使人目小又令目無所見銅人經云少陽脈氣所發禁不可灸治目眩頭痛目赤視物眩眩風癎目戴上不識人眼睫毛倒發狂吐涎沫發作無時瞳子髎二穴自目外眥五分灸三壯針三分素問注云在目外眥五分千金主云一名火陽一名前關銅人經云手太陽手足少陽之會治青盲無所見遠視􅉩􅉩目中膚翳白膜頭痛目外赤痛又云灸二壯西方子云不可灸顴髎二穴在靣頰骨下廉兑骨端陷中針二分銅人經云手少陽太陽之會治喎靣赤目黃眼瞤動不止䪼腫齒痛針入三分西方子云主口喎僻不能言及口僻痛惡風寒不可以嚼齒痛頭維二穴在頷角入髮際本神傍一寸半針三分禁不可灸本神在曲差傍中半銅人經云足少陽陽明脈之交會治頭偏痛目視不明亦治微風眼瞼瞤動不止風淚出上關二穴一名客主人在前起骨上亷開口有空動脈宛宛中灸七壯艾炷不用大筯頭作炷若針必須側卧張口取之乃得禁針深問曰何以不得針深岐伯曰上關若刺深令人欠而不得咳下關灸留針即欵而不得牙關急是故上關不得針深下關不得久留針也明堂經云客主二穴入一分留之得氣即瀉日灸七壯至二百炷不用大其針灸之必須側卧開口取之乃得穴避風下云灸一壯銅人經云足陽明少陽之會治唇吻強耳聾瘛瘲口沫出目眩牙車不開口噤嚼食難偏風口眼喎斜耳中伏如蟬聲西方子云灸三壯主青盲無所見耳痛口喎僻不能言明堂經云主牙齒齲痛資生經云按素問刺禁日刺客主人內陷中脈為內漏為聾注云言刺太深則交脈破決故為耳內之漏則氣不營故聾審若是又不止令人欠而不得咳而已用針者所當知也下關二穴在上關下耳前動脈下廉合口有空開口即閉針入四分得氣即瀉禁灸又云下關不得久留針側卧閉口取之銅人經云足陽明少陽之會療停耳有濃汗出偏風口目喎牙車脫臼其穴側卧閉口取之牙齗腫處張口以三稜針出濃血多含鹽湯即不畏風西方子云灸三壯主耳痛鳴聾牙齒痛齲痛忌如前法前關二穴在目後半寸亦名太陽之穴理風赤眼痛目眩目澀不灸針三分資生經云銅人有上關下關各二穴素問亦同明堂上下經但有上關而無下關惟上經有前穴又不與下關穴同在上關之下恐别自是前關穴一名太陽穴理風赤眼頭痛目眩澀等疾所不可廢故附入于下關之後和髎二穴在耳兑髮下橫動脈針七分灸三壯素問注在耳前鋭髮下橫動脈銅人經云手少陽脈氣所發治車引急風頭重痛耳中嘈嘈頷頰腫和髎二穴在耳前髮陷中明堂上經云和窖即髎也在鼻孔下夾溝旁五分即銅人之禾髎明堂下經之禾窖也或者明堂上經誤寫禾字作和字耳恐人以和髎和窖為一穴故備論也聼會二穴在耳微前陷中上關下一寸動脈宛宛中張口得之針七分留三呼得氣即瀉不須補日灸五壯止七壯三十日後依前報灸明堂云針三分忌冷食呵下云灸三壯一名聼呵前一云後明聽會一名聽呵銅人經云手少陽脈氣所發治耳聾耳中狀如蟬聲通耳疼痛不得食經云牙車脫臼相推三寸一云一寸其穴側卧張口取之灸亦良明堂經云主耳淳淳渾聾無所聞西方子云主齒痛惡食癲疾嘔吐骨痠眩狂瘛瘲口噤喉鳴牙車急痛忌食動風生冷豬魚等物聽宫二穴在耳中珠子大赤小豆針三灸三壯明堂云針一分銅人經云手足少陽手太陽脈之會治耳如物填塞無所聞耳中嘬嘬嘈嘈心腹痛失聲西方子云主耳若蟬鳴骨痠眩狂瘛瘲口噤喉鳴頰車二穴在耳下曲頰端陷中針四分得氣即瀉日灸七壯又止七七炷勿大明下云在耳下二韭葉灸三壯又云耳下曲頰骨後千金云一名機關在耳下八分小近前銅人經云足陽明脈氣所發治牙關不開口噤不語失瘖牙車疼痛頷頰腫頸強不得回顧其穴側卧開口取之明堂經云主齒痛不得嚼西方子云主口僻痛惡風寒不可以嚼肩井二穴一名膞井在肩上陷明堂此有缺系中二字缺盆上大骨前寸半以三指按取之當中指下陷中甲乙經秪可針五分此膞井脈足陽明之會乃連入五藏氣若針深則令人悶倒不識人即速須三里下氣先補不瀉須臾平復如故凡針肩井背以三里下其氣大良灸七壯明堂云針四分先補而後瀉特不宜灸針不得深深即令人悶若婦人胎落後微損手足弱者針肩井立産灸乃勝日灸七壯止一百若針肩井必三里下氣如不灸三里即拔上氣銅人經云手足少陽陽維之會治五勞七傷頸項不得回顧背膊痛兩手不得向頭或因俯仰撲傷腰髖疼腳氣上攻又云若有灼然解針者遣針不解針者不可遣針灸乃勝針針深便引入五藏之氣乃令人夀短大肥人亦可倍之西方子云主婦人脫墮胎後手足厥逆咳逆寒熱慱索氣不得卧資生經云明堂既云特不宜灸又云乃勝針日灸七壯至百壯罷則是又可灸矣不知何自畔其説也或者肩井不可灸惟胎落後手足弱者可灸耶天髎二穴在肩缺盆中上毖骨之際陷中央針八分灸三壯銅人經云手足少陽陽維之會治肩肘痛引頸項急寒熱缺分中痛汗不出胸中煩滿西方子云主臂痛不舉巨骨二穴在肩端上行兩乂骨間陷中灸五壯針寸半明堂云巨骨一穴在心脾骨頭日灸三壯至七壯禁針針則側懸一食頓乃得下針針入四分瀉之勿補針出始得正卧下云巨骨二穴在肩端上兩行骨陷中灸一壯銅人云云門在巨骨下夾氣戶旁各二寸俞府在巨骨下璇璣旁各二寸氣戶在巨骨下俞肉兩傍各二寸明堂經云主肩中痛不能動搖也銅人經云手陽明蹻脈之會治背膞痛胸中有瘀血肩背不得屈伸而痛灸五壯針入一寸又云主驚癎破心吐血忌酒麵熱食豬魚生冷食資生經云銅人經云巨骨二穴在肩脾上兩乂骨間明堂下經亦同但明堂上經云巨骨一穴在心脾骨頭不特一穴字不同而穴在心脾骨頭亦異豈其所謂一穴在心脾骨者非巨骨耶不然即是誤寫二字作一字肩脾為心脾也臑會二穴一名臑髎在肩前廉去肩頭三寸宛宛中針七分留三呼得氣即瀉灸七壯素問注臂前廉肩端銅人經云手陽明之絡治頸癭氣瘤臂痛不能舉氣腫痙痛針三分留十呼西方子云主咽腫寒熱頸瘰癧癲疾腠氣肘莭痺臂酸重腋急痛肘難屈伸肩髃二穴在膞骨頭肩端兩骨間陷中宛宛中舉臂取之灸七壯至二七壯以差為度若灸偏風不遂可七七壯不宜多恐手臂細若風病筋骨無力久不差灸不畏細也刺則泄肩臂熱氣唐庫狄欽苦患風痺手足不得伸甄權針此穴令將弓箭射之如故明堂經云針八分留三呼瀉五吸不及針以平手取其穴日灸七壯增至二七若灸偏風不隨可至二百若更多灸恐手臂細若刺風癲風瘓風病當其火艾不畏細也千金云肩頭正中兩骨間名中肩井外一名偏骨也銅人經云手陽明蹻脈之會療偏風半身不遂熱風癮疹手臂攣急捉物不得挽弓不開臂細無力筋骨痠疼又云一名扁髃主難俯仰風刺風虛手不得伸頭臂冷而緩患刺風者百日刺筋百日刺骨方可得瘳灸亦得西方子云療肩中熱頭不可以顧忌如前肩髎二穴在肩端臑上陷中舉臂取之針七分灸三壯明堂經云五壯銅人經云治肩重不可舉背肘痛肩貞二穴在肩脾下兩骨解問肩髃後陷中針五分銅人經云治風痺手臂不舉肩中熱痛西方子云主頷痛引耳嘈嘈耳鳴無所聞頭不可以顧天宗二穴在秉風後大骨下陷中灸三壯針五分留三呼銅人經云手太陽脈氣所發治肩臂痛臂肘外後臁痛頰頷腫痛西方子云主肩重臂痛臑俞二穴在肩骸後大骨下脾上亷陷中針八分灸三壯素問云在肩臑後舉臂取之銅人經云手足太陽陽維蹻脈之會治寒熱肩腫引脾中痛臂痠無力秉風二穴在狂肩上小髎後舉臂有空灸五壯針五分銅人經云小髃後手太陽陽明手足少陽之會治肩痛不能舉西方子云俠大髎外灸三壯曲垣二穴在肩中央曲脾陷中按之應手痛灸三壯針明堂經云九分銅人經云主治肩痛周痺氣主氣主肩髀拘急疼悶西方子云灸十壯肩外俞二穴在肩脾上亷去脊骨三寸陷中針六分灸三明上云一壯銅人經云治肩脾痛熱而寒至時時西方子云主寒熱引項急強左右不顧肩中俞二穴在肩脾內亷去脊二寸陷中針三分留七呼灸十壯銅人經云治寒熱目視不明咳嗽上氣吐血西方子云主小兒妳癧目不明灸三壯大椎一穴一作顧在第一椎上陷中針五分留三呼瀉五吸灸以年為壯明堂云日灸壯至七七壯甲乙經云大椎下至尾骸骨二十一椎長三尺折重量取俞穴銅人經云手足三陽督脈之會療五勞七傷溫瘧痎瘧氣疰痎骸拘急頸項不得回顧風勞食氣凡度周身孔穴逺近分寸以男左女右取中指文為一寸素問云問身寸是也又多用繩度量孔穴繩多出縮取穴不準今以簿竹片點量分寸療病準約西方子云灸一壯至四十九壯止主傷寒熱盛煩嘔明堂經云背膊中悶久瘧不愈資生經云既曰大椎又曰在第一椎上陷中必是二穴非二穴則不言在第一椎上矣此大椎第一椎所以異也但銅人經云大椎在第一椎上陷中諸經皆同惟明堂下經云在第一椎下陶道穴既在第一椎下不應大推亦在第一椎下必是下經誤寫上字作下也考之下經亦言陶道穴在大椎莭不與銅人合足見其誤寫上字作下無疑矣陶道一穴在椎莭下間俯而取之陷者中灸五壯針五分銅人經云督脈足太陽之會治頭痛目瞑灑淅寒熱脊強及頭汗不出西方子云主頭痛項如拔不可左右顧目不明如脫身柱一穴在三椎莭下間宛宛中針五分灸七壯明堂云五壯下云三壯銅人經云督脈氣所發治癲疾瘛瘲怒欲殺人身熱狂走譫言見鬼西方子云主恍惚不樂胸熱口乾煩渴喘息頭痛吐而不出灸五壯明堂經云主小兒驚癎神道一穴在五椎莭下間陷中俯而取之灸七七壯止百壯小兒風癲瘛瘲可灸七壯明云灸五分灸三壯下云五壯銅人經云督脈氣所發西方子云主恍惚不樂胸熱口乾煩渴喘息頭疼吐而不出灸五壯西方子云主腰脊急強痎瘧恍惚悲愁健忘驚悸主寒熱頭痛進退往來熱喘目痛視物不明靈臺一穴在六椎莭下間俯而取之銅人經云督脈氣所發西方子云主熱病脾熱溫瘧汗不出出素問至陽一穴在第七椎莭下俯而取之針五分灸三壯明堂下經云七壯銅人經云督脈氣所發治寒熱解散風濕脛痠四肢重痛少氣難言西方子作阻氣難言明堂經云灸七壯主胸中寒氣不能食胸脅支滿身羸瘦背中氣上下行腰脊疼腹中鳴也筋縮一穴在第九椎節下間俯而取之針五分灸三壯明堂云七壯銅人經云督脈氣所發治驚癎狂走癲疾脊急強目轉上反明堂經云灸五壯主顛疾多言反目瞪也脊中一穴一名神宗在十椎莭下間俯而取之禁灸灸令人腰背傴僂五分得氣即瀉明堂作脊俞一名脊中在十一椎中央按脊在十二椎莭間銅人經云一名脊俞督脈氣所發治風癎癲邪溫病積取下利西方子云不灸懸樞一穴在十三椎莭下間伏而取之針三分灸三壯明堂經云在十椎下莭間下云十一椎下銅人經云督脈氣所發治積氣上下行水榖不化下利腰脊強不得屈伸復中留積明堂經云主積氣上下腹中盡通資生經云銅人經載懸樞在十三椎莭下間明堂上經作十二椎莭間下經作十一椎下脊中穴既在十一椎下不應懸樞又在十一椎下故知其誤矣考之素問亦與銅人同當以銅人為正明堂上經亦誤三字作二字也要之按脊穴在十二椎節下耳命門一穴一名屬纍在十椎節下間伏而取之明堂作俯而取之針五分灸三壯銅人經云督脈氣所發治頭痛如破不可忍身熱如火汗不出瘛瘲裏急腰腹相引痛明堂經云主寒痎瘧陽關一穴十六椎莭下間伏而取之針五分灸三壯西方子云主脛脾不仁銅人經云關療病法腰腧一穴一名背辭一名髓孔一名腰柱一名腰户在二十一椎莭下間宛宛中一作陷中以挺腹舒身兩手相重支頷縱四體後乃取其穴針八分留三呼瀉五吸灸七壯至七七壯甲乙經云針二寸留七呼灸七七壯又云針五分灸三壯明堂經云三壯下二壯素問注云針一分按甲乙經作二寸水熱穴注亦云二寸氣府論注骨空論注作一分一名髓空銅人經云督脈氣所發治腰髖疼腰脊僵不得回轉及溫瘧痎瘧明堂經云灸五壯主腰疼不得久立腰已下至足令不仁坐卧難腰脊強急不可俯仰腰重如石難舉動也忌房勞舉重強力長僵一穴一名氣之陰郤督脈絡别其穴跌地取之甲乙經云在脊骶端針三分轉針以大痛為度其穴跌地取之乃得灸不及針日三十壯止二百此痔根本是令甲乙經云針二寸留七呼明堂云五壯銅人經云足少陰少陽所結會治腸風下血乃漏種痔疳蝕下部􅉶又云在脊骨下宛宛中是西方子云主心痛氣短小兒脫肛瀉血秋深不愈驚癎瘛瘲吐㵼驚恐失精瞻視不明眵眼頭重洞泄不禁腰脊急強不可俯仰脊痛寒痓反折主癎疾明堂經云主大小便難五淋久痔又云在腰俞脊骸端陷者中主狂病及小兒驚癎忌冷食房勞資生經云自大椎至腰俞長同身寸三尺折量取穴王氏云有里醫言凡灸椎骨莭突處方駛灸脊下當骨無驗以魚肉骨參之其言為可信盍依其言當骨莭灸之普濟方卷四百十四
