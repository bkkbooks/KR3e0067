body:
  text: 普濟方卷三百五十明周王朱橚撰産後諸疾門中風附論夫産後中風由産傷動血氣勞損臟腑未平復起早勞動氣虛而風邪氣乘虛傷之故中風風邪冷氣客於皮膚經絡但疼痺羸乏不任少氣若筋脈挾寒則攣急喎僻挾溫則緩弱若入諸臟恍惚驚悸隨其所傷臟腑經絡而生病焉又云産後中風蓋由産後五七日內強力下床或一月之內傷於房室或懷憂怒擾蕩沖和或因跌挫傷動臟腑得病之初眼澀口噤肌肉瞤搐漸至腰脊筋急強直者不可治産後血氣未完風邪中之入於經絡則發為痓其候口噤不開筋脈攣急靣目喎僻至於五臟六腑則隨所中而證候出焉甚者瘈瘲直視角弓反張神志昏塞便溺遺失瘖不能言又有産後汗出多而變痓者由産後血虛腠理不密故多汗因遇風邪搏之則變痓痓者口噤不開背強而直如發癎狀搖頭馬鳴身反折須臾十發氣息如絶宜速斡口灌小續命湯稍緩即汗出如雨手捻不開者不可治也又云産後心悶氣絶眼張口噤遍身強直腰背反偃狀如癎疾心忪驚悸言語錯亂皆是宿有風毒因産心氣虛弱發成風痙之證几産後口噤腰背強直角弓反張皆名曰痙又曰痓當察有汗無汗以分剛柔隂陽而治之今中風口噤及角弓反張各一類其實一也凡産室但無風為佳不可衣被帳褥太暖即汗出汁出則腠理開易於中風便昏峕有一婦人産後遮護太密閣內更生火睡久及醒即昏昏如醉不省人事醫用愈風散佐以交加散囑云服之睡睡中必以左手搔頭覺必醒矣果如其言云方牛黃散出聖惠方治産後中風言語謇澀精神昏憒四肢急強牛黃細研天麻秦芃去苖防風去蘆頭天雄炮製去皮臍藁本當歸銼微炒天南星炮裂各三分龍腦細研人參去蘆頭芎藭獨活枳殼麩炒微黃去穰蝎尾微炒麝香細研各半兩桂心一兩金薄銀薄各五十片細研甘草半兩炙微赤銼烏蛇二兩酒浸去皮骨炙微黃右為細散同研令勻不計時候以豆淋酒調下一錢當歸散出聖惠方治産後中風手腳頑痺緩弱無力當歸銼微炒羌活附子炮裂去皮臍防風去蘆頭薏苡仁麻黃去根節各二兩茵芋羚羊角屑菖蒲阿膠搗碎炒令黃燥乾蝎微炒木香牛膝去苗柏子仁各一兩芎藭桂心各一兩半烏蛇酒浸去皮骨炙一兩麝香一分細研右為細散入麝香相合令勻不計時候以豆淋酒調下二錢烏蛇丸出聖惠方治産後中風四肢頑痺令人心腹疼痛烏蛇一兩酒浸去骨炙微黃釡底墨天麻牛膝獨活當歸銼微黃桂仁乾蝎微炒天南星炮製柏子仁乾薑炮裂炒芎藭各半兩朱砂半兩細研入藥附子一兩炮裂去皮臍龍腦麝香各一分細研麻黃三錢去根節右為末入研藥令勻煉蜜和搗三五百杵丸如梧桐子大每服不計時候以溫酒下一十五丸獨活寄生湯出危氏方治産後血虛生風手足抽掣筋脈攣急時發搐搦半身不遂或因勞役太早風邪乘間而入服之立愈有痰間服加味紫石英散芎藭湯治産後中風舌強不知人事芎藭一兩半防風去義人參附子炮裂去皮臍芍藥當歸切焙鬼箭羽銼虎杖銼各半兩重牛黃别研一分甘草炙檳榔各半兩生乾地黃切焙半兩右銼如麻豆每服三錢水七分酒三分同煎七分去滓溫服不拘時候蠶蛾散治産後中風偏風聲音不利或只發熱昏冒筋脈攣急原蠶蛾炒陳麴各一兩桂去粗皮一分肉蓯蓉酒浸切焙麝香别研一錢防風去義巴戟天去心白芍藥各二兩茵芋生乾地黃焙丹砂别研白芷各半兩右搗研為散每服一錢生薑薄荷酒調下不拘時候羌活散治産後中風身體麻痺疼痛羌活二兩莽草微炒防風去蘆頭川烏頭炮裂去皮臍桂心赤芍藥生乾地黃麻黃去根節銼碎萆薢銼牛膝去苗枳殼麩炒微黃去穰當歸銼微炒各一兩右為粗散每服四錢以水酒各半中盞入生薑半分煎至六分去滓不計時候溫服小續命湯治中風及剛柔二痓血氣痺弱不能轉側兼治小兒驚風及婦人産後失血冒昧不知痛處拘急遺失便利麻黃一作葛根桂心甘草各半兩防風三錢去乂芍藥白术一作杏仁人參川芎附子防己黃芩各半兩右㕮咀每服五錢水一盞半煎至一盞去滓取八分清汁入生薑汁再煎一二沸溫服日三服夜二服若柔痓自汗者去麻黃夏間及病有熱者去附子減桂一半冬及初春去黃芩陳無擇評曰凡産後汗出多便痓亦令服小續命湯既汗多如何更服麻黃官桂防己黃芩輩不若大豆紫湯并大聖散佳而小續命湯加減並治剛柔二痓若柔痓自汗朱奉議有去麻黃加葛根之説必有所據雖大豆紫湯大聖散良亦不可偏見曲説有妨古人之意云一方桂防風各一兩附子一枚炮人參等八味各半兩入生薑一棗大同煎名人參湯治中風口靣喎斜一方薑七片棗二枚煎有熱荆芥末炒烏豆淋酒下夀星丸獨活二兩半桑寄生如無以續斷代之杜仲薑汁炒細辛牛膝酒浸焙秦艽去蘆茯苓白芍藥辣桂川芎防風人參當歸熟地黃淨甘草炙各二兩右細銼每服三錢薑棗煎服下利者去地黃一方獨活芍藥熟地黃各二兩桑寄生一兩一分當歸一兩三分杜仲等十味各一兩半名獨活湯五石湯出千金方治産後卒中風發疾口噤倒悶吐沫瘈瘲眩冒不知人及濕痺緩弱身體痙妊娠百病紫石英三兩鍾乳赤石脂石膏白石英牡蠣人參黃芩白术甘草栝蔞根芎藭桂心防己當歸乾薑各二兩獨活三兩葛根四兩右以五石為末諸藥㕮咀用水一斗四升煮取三升半分五服日三夜二一方有滑石寒水石各二兩棗二十枚四石湯治産後卒中風發疾口噤瘈瘲悶滿不知人并緩急諸風毒身體痙強及挾胎中風百病紫石英白石英石膏赤石脂各三兩獨活生薑各六兩葛根四兩桂心芎藭甘草芍藥黃芩各二兩右㕮咀以水一斗二升煎去三分半去滓分五服一方有麻黃無黃芩獨活湯治産後中風手足頑痺角弓反張或口噤不能言獨活生薑各五兩防風秦艽桂心白术甘草當歸附子各二兩葛根三兩防己一兩右㕮咀以水一斗二升煮取三升去滓分三服不計時候知母湯治産後中風煩悶發熱渴燥頭痛目昏身體拘急知母獨活去蘆頭葛根銼白术各三兩甘草炙石膏桂去粗皮芍藥防風去義各二兩半夏生薑汁製半兩右粗搗篩每服三錢水一盞酒少許入生薑半分切同煎至七分去滓溫服不拘時候一方無葛根名石膏湯人參湯療産後中風心忪悸志意不定恍惚語言錯亂人參六分羚羊角屑麥門冬茯神各八分黃芩白鮮皮甘草各四兩石膏十分右㕮咀以水二大升煎至七合下竹瀝二大合分三服甘草湯治産後腰背及脅肋不得轉動名曰風痙甘草乾地黃麥門冬麻黃各二兩栝蔞根芎藭黃芩各二兩銼碎杏仁五十枚右㕮咀以水一斗五升爛煮葛根半斤取八升去滓內藥煮取三升分再服一劑不瘥更服良一方有前胡三兩芎藭散治産後體虛中風四肢疼腹內㽱痛芎藭附子炮製去皮臍琥珀生乾地黃當歸銼炒羌活桂心赤芍藥各一兩枳殼半兩麩炒微黃去穰川椒半分生薑一兩右為粗散用羊肉二斤蔥白二七莖以水五升煮取汁三升每用肉汁一中盞藥末四錢煎至六分去滓不計時候溫服羚羊角散治産後中風發熱靣赤氣喘頭痛羚羊角屑生乾地黃漢防己當歸銼微炒赤芍藥桂心各一兩石膏麻黃去根節各二兩甘草半兩炙微赤銼右細銼每服四錢以水一中盞入竹葉二七片生薑半分煎至六分去滓不計時候溫服烏金煎治産後中風言語謇澀心神恍惚筋脈不利黑豆炒一升天麻羚羊角屑防風去蘆頭赤茯苓羌活桂心酸棗仁微炒生乾地黃各二兩右細銼以水八升煎至三升絞去滓更熬成膏每服不計時候以溫酒調下一匙石斛浸酒方治産後中風四肢緩弱舉體不仁石斛去根二兩附子炮裂去皮臍牛膝去苖茵芋桂心芎藭羌活當歸銼微炒熟乾地黃各一兩右細銼用絹袋盛以清酒一斗浸三日每服不計時候暖一小盞服之防風湯治産後中風背急短氣防風獨活葛根各五兩當歸芍藥人參甘草乾薑各二兩右㕮咀以水九升煮取三升去滓分三服日三一方有乾桑耳無乾薑名人參湯羚羊角湯療産後腹中堅硬兩脅膈脹手足冷心中煩熱欲飲水乾嘔關節勞痓中風之疾羚羊角二分防風十二分羌活苦梗敗醬各八分桂心柴胡大黃浸過各六分右以水二升煎取八各空心二服畢即吐良久更服當歸湯治産後中風半身手足不遂言語謇澀恍惚多忘精神不定川獨活當歸芍藥防風川芎玄參各兩一桂心一分半右細銼以水八升煮取二升半分為三服覺效更作一劑漸瘥須適寒溫將息如不瘥即以此方作丸每服二十丸一方用天麻二分有熱加乾葛五兩有冷加白术五兩有氣加生薑六分手足不遂加牛膝五分萆薢二兩黃耆四兩腹痛加當歸芍藥各三分不食加人參四分玄參四分若寒中三陽所患必冷小續命湯加生薑汁煎若暑中三隂所患必熱小續命湯去附子減桂心一半加薄荷增損柴胡湯治産後經水適斷感於異證手足牽搐咬牙昏冒繫屬上焦柴胡八錢黃芩四錢半人參半夏各三錢甘草炙石膏各四錢知母二錢黃耆五錢右為粗末每服半兩生薑同煎服棗四個水一盞半煎至一盞溫服無時秦艽湯前證已去次服此以去風邪秦艽八錢芍藥半兩柴胡八錢防風黃芩各四錢半人參半夏各三錢甘草炙四錢右為粗末每服七錢水一盞煎至七分溫服無時二三日經水復行前證退宜服荆芥散小柴胡小料中加荆芥穗五錢枳殼麩炒去穰同小柴胡湯煎服二三日後脾胃之氣兼除風邪宜防風湯大續命湯治婦人産後中風卒然瘖啞及治偏枯賊風麻黃去根節煎掠去沫焙乾八兩石膏四兩桂去粗皮乾薑芎藭各二兩當歸切焙黃芩去黑心各一兩杏仁三十枚去皮尖雙仁炒右㕮咀每服五錢以水一盞半煎七分去滓又入竹瀝半合再煎數沸溫服能言未瘥服小續命湯方見本門竹葉湯治産後中風發熱面赤氣喘頭目昏痛淡竹葉葛根人參防風去義各一兩桔梗炒二兩一作苦梗甘草炙半兩附子大者一枚炮去皮臍桂去粗皮半兩右銼如麻豆每服三錢水一盞生薑三片煎至七分去滓溫服不拘時候千金方用大棗煎一方嘔者加半夏一方無附子獨活煮散治産後中風獨活去蘆頭一兩當歸切焙三分赤芍藥炒半兩芎藭秦艽去苖土桂去粗皮生乾地黃焙各三分黑豆二合右㕮咀每服五錢水一盞半生薑三片同煎至八分去滓溫服日二濟危上丹夫産後中風者五七日內強力下床或月未滿而行房傷於血室或懷蕩沖和或因火驚惕藏府得病初時眼澀口噤肉搐以漸腰背強直此候難治是自作招風中疾或血下過多虛極生風氣無所主唇青肉冷汗出目眩神昏命在須臾若以風藥治之則誤矣乳香五靈脂硫黃大隂玄精石細研陳皮桑寄生真阿膠卷柏子各等分右同研不入鐡器內微火焙乾為細末用生地黃汁煮糊為丸如梧桐子大空心溫酒或當歸酒吞下二十丸一方不用阿膠小柴胡湯治婦人在蓐得風熱四肢苦煩皆自發露所為若頭疼服此方柴胡半夏各半斤人參甘草各三兩大棗十二枚生薑二兩黃芩三兩右㕮咀以水一斗二升煮取六升去滓每服一升日進三服若頭不痛但煩熱與後方三物黃芩湯三物黃芩湯治婦人草蓐中傷風四肢苦煩熱頭疼與小柴胡湯頭不疼但與此藥黃芩苦參各二兩乾地黃四兩右㕮咀以水八升煮取一升去渣適寒溫服一升日二多吐下蟲川芎湯療産後中風身背拘急如束并渴川芎羌活羚羊角屑酸棗仁芍藥各四兩桑白皮六分防風五分右㕮咀水四升煎取二升分溫三服麻黃湯治産後中風四肢拘急筋節掣疼不得轉側角弓反張麻黃去根節一兩一作三分桂去粗皮一兩一作半兩