蜜和丸如梧桐子大不計時候以竹瀝酒下五十丸茯神散治産後風邪所中心神恍惚志意不定茯神一兩逺志去心白薇人參去蘆頭防風去蘆頭荆芥獨活各三分熟乾地黃龍齒各一兩甘草半兩炙微赤銼餳一升以水五升煮取三升右為散每服四錢以水一中盞煎至六分去滓不計時候溫服逺志散治産後中風心神恍惚言語錯誤煩悶逺志去心防風去蘆頭各一兩甘草半兩炙微赤銼麥門冬去心羚羊角屑酸棗仁微炒桑寄生獨活桂心當歸銼微炒茯神各三分右為散每服三錢水一中盞煎至六分去滓不計時候溫服天麻丸療産後中風恍惚語澀四肢不利天麻硃砂防風羌活各一兩殭蠶三分炒乾蝎炒白附子炮裂五靈脂雄雀糞炒牛黃各一兩為末糯米軟飯為丸如梧桐子大薄荷酒研十五丸服之風虛勞損附論夫産則血氣勞傷臟腑虛弱而氣冷客之搏於血氣不能溫於肌膚使人虛乏疲致羸損不平復若久不瘥風冷入于子臟則胞臟冷亦使無子謂風虛勞損也方延年增損澤蘭丸治産後風虛勞損黃瘦澤蘭熬七分防風乾地黃當歸北細辛桂心茯苓芍藥人參甘草藳本烏頭炮麥門冬石斛紫苑川芎各五分乾薑柏子仁蕪荑子仁厚朴川椒各四分白术黃耆各六分紫石英石膏各八分右為細末煉蜜為丸如梧桐子大酒下二十丸或三十丸澤蘭丸治産後虛損夾風勞氣飲食減少面色萎黃腹內冷疼四肢乏力澤蘭黃耆銼白术柏子仁赤石脂各二兩白礬燒令汁盡桂心木香人參去蘆頭白茯苓附子炮裂去皮臍續斷芎藭當歸銼微炒細辛龍骨川椒去目及閉口者微炒令去汗厚朴去粗皮塗生薑汁炙令香熟各一兩藁本乾薑炮裂銼陳橘皮湯浸去白焙各半兩羌活三分右為末煉蜜和搗五七百杵丸如梧桐子大每服空心及晚食前以溫酒下三十丸澤蘭丸治産後風虛並治之澤蘭九分禹餘糧防風各十分石膏白芷藁本蜀椒白术柏子仁各五分桂心甘草當歸生薑各七分蕪荑細辛各四分乾地黃赤石脂肉蓯蓉鹿茸芎藭各八分厚朴四分人參三分右治下篩酒服方寸匕日三以意增之牛膝丸治産後風虛勞損臟腑之弱四肢羸困不思飲食牛膝去苖白薇乾薑炮裂銼細辛防風桂心紫苑洗去根土當歸銼微炒五味子萆薢銼甘草炙微赤銼各半兩柏子仁牡蠣研為粉黃耆銼熟乾地黃紫石英細研水飛過各一兩杜仲去粗皮炙微黃銼川椒去目及閉口者微炒去汗用附子炮裂去皮臍澤蘭白茯苓厚朴去粗皮生薑汁炙令香熟各三分右為末煉蜜和搗三五百杵丸如梧桐子大每服空心及晚食前以溫酒下三十丸白薇丸治産後風虛勞損腹痛冷氣腳膝無力痿黃飲食減少日漸羸瘦木香當歸桂心澤蘭葉牛膝白薇牡丹皮枳殼人參川芎厚朴白术續斷熟地黃北細辛赤石脂龍骨禹餘糧黃耆各一兩白茯苓附子各三分吳茱萸一分右為細末煉蜜丸如梧桐子大食前溫服酒下三十丸柏子仁丸治産後風虛勞損四肢羸弱心神虛煩不能飲食眠卧柏子仁澤蘭各一兩熟乾地黃麥門冬去心焙各一兩半防風去蘆頭人參去蘆頭黃耆銼續斷白茯苓酸棗仁微炒附子炮裂去皮臍各三分當歸銼微炒羚羊角屑桂心芎藭白术各半兩紫石英一兩細研水飛過甘草一分炙微赤銼右為末入研藥令勻煉蜜和搗三二百杵丸如梧桐子大每服於空心及晚食前以溫酒下三十丸枸杞子丸療産後風虛勞損四肢疼痛心神虛煩不思飲食枸杞子牛膝白茯苓人參黃耆各一兩當歸漏蘆防風桂心酸棗仁羚羊角屑羌活五加皮白术川芎各三分熟地黃二兩甘草半兩麥門冬兩半右為細末煉蜜丸如梧桐子大溫酒下三十丸荆芥湯亦得白薇丸治産後風虛勞損寒熱發渴血脈虛竭四肢羸弱飲食無味白薇丹皮當歸銼微炒黃耆銼人參去蘆頭桂附子炮裂去皮臍石斛去根銼白术各三分芎藭肉蓯蓉酒浸一宿刮去皺皮炙乾三分柏子仁熟乾地黃白茯苓各一兩羌活白芍藥五味子各半兩甘草一分炙微赤銼右為末煉蜜和搗三五百杵丸如梧桐子大每於空心及晚食前以溫酒下三十丸澤蘭丸療産後患風冷氣腹內不調補益肥白恱懌方澤蘭厚朴人參石斛蕪荑仁續斷防風桂心各三分川芎白术柏子仁北五味子黃耆逺志各四分赤石脂甘草乾地黃各六分右為細末煉蜜丸如梧桐子大每用酒下二十丸至三十丸日二服澤蘭丸治産後風虛勞損羸弱百病必效方澤蘭葉六分白芷川椒蕪荑仁藁本白細辛各分四人參白术柏子仁防風桂心厚朴丹參各五分川芎當歸甘草各七分乾地黃十分右為細末煉密丸如梧桐子大空心溫酒下二十丸至三十丸日二服忌生冷鮓滑豬牛雀肉蔥麵桃李海藻菘菜延年澤蘭丸治産後風虛損瘦不能食服此令人肥恱澤蘭當歸甘草炙厚朴藁本食茱萸蕪荑仁白芷乾薑芍藥各三分石膏八分人參柏子仁桂心各四分白术五分右為細末煉蜜丸如梧桐子大酒服十五丸至二十五丸日二服忌法如前羌活散治産後風虛勞損身體疼痛時有煩熱不思飲食四肢少力羌活赤箭防風芎藭白茯苓黃耆銼各三分白芷白芍藥羚羊角屑當歸銼微炒牛膝去苖骨碎補各半兩熟乾地黃一兩桂心細辛各半兩右為粗散每服三錢以水一中盞入生薑半分煎至六分去滓不計時溫服黃耆丸治産後風虛勞損體瘦乏弱肢節疼痛不欲飲食黃耆銼熟乾地黃人參去蘆頭附子炮裂去皮臍白茯苓各一兩赤箭羌活羚羊角屑五加皮白术各三分防風去蘆頭當歸銼微炒桂心酸棗仁白鮮皮各三分右為末煉蜜和搗三五百杵丸如梧桐子大不計時候以溫酒下三十丸紫桂丸治産後風虛勞損氣攻臍腹疼痛紫桂一兩半去皺皮當歸銼微炒人參去蘆頭白术各三分木香羌活乾薑炮裂銼羚羊角屑白芍藥白薇細辛各半兩酸棗仁三分微炒熟乾地黃柏子仁丹皮各一兩右為末煉蜜和搗三五百杵丸如梧桐子大不計時以溫酒下三十丸木香散治産後風虛勞損氣攻心腹四肢疼痛不思飲食木香人參陳皮白茯苓白芍藥黃耆川芎各三分熟乾地黃當歸附子各一兩甘草分桂心白术各半兩右㕮咀每服三錢水一盞入薑三片棗一枚煎至七分去滓溫服熟乾地黃散治産後風虛勞損四肢煩疼夜卧不安漸加羸瘦熟乾地黃黃耆銼各一兩羚羊角屑羌活酸棗仁甘草炙微赤銼防風去蘆頭各半兩當歸銼微炒人參去蘆頭麥門冬去心白芍藥芎藭白茯苓各三分右搗篩為散每服四錢以水一中盞入生薑半分棗三枚同煎至六分去滓溫服日三服人參散治産後風虛勞損羸瘦四肢無力不思飲食人參黃耆熟地黃各一兩羚羊角屑三分桂心川芎當歸防風白茯苓白术北五味子各半兩甘草一分銼右為粗末每服三錢先用水二大盞獖豬腎一雙切去脂膜薑棗同煎至一盞去豬腎入藥煎至四分去滓空心溫服黃耆散治産後風虛勞損羸瘦不思飲食四肢疼痛黃耆白术木香羚羊角屑人參當歸桂心川芎白芍藥白茯苓各半兩甘草一分右㕮咀每服三錢水一中薑三片棗一枚煎至七分去滓溫服不拘時黃耆當歸散療産後風虗羸瘦不生肌肉勞弱無力黃耆當歸芍藥人參各二兩桂心甘草川芎生薑各八分大棗十二枚右為散以水七升煮取三升分溫三服當歸散治産後風虛勞損四肢疼痛不欲飲食當歸銼微炒白芍藥芎藭各一兩黃耆一兩半銼防風去蘆頭人參去蘆白茯苓各一兩熟乾地黃二兩甘草半兩炙微赤銼右為粗散用羊肉二斤棗二十枚先以水五升煮至二升半每服用肉汁一中盞入藥四錢煎至六分去滓溫服日三服普濟方卷三百五十
