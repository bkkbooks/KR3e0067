body:
  text: 普濟方卷二百五十一明周王朱橚撰諸毒門解諸毒附論凡人跋涉山川不諳水土人畜飲啖誤中於毒素不知方多遭其斃豈非枉橫耶然而大聖久設其法以救活之正為貪生嗜樂忽而不學一朝逄遇便自甘心竟不識其所自今述神農黃帝解毒方好事者少留意焉解諸毒例解一切毒止鼻衄吐血袪煩躁用藥王搗汁飲驗其苖莖青色連葉摘之有乳汁治沙蝨溪毒以栗樹皮煎汁服之辟溪毒養蒼鵝以辟之治黃毒去心下結以甘藍作葅經宿漬色黃和鹽食之治溪毒以天羅勒挼碎傅之解惡氣瘴毒出聖惠方犀角羚羊角雄黃麝香並水磨服解之方解毒丸治大人小兒一切諸毒吐瀉迷亂欲死時疫胳􅭫諸驚積熱山嵐瘴氣毒四方人不服水土貫衆茯苓黃藥子葛根生地黃甘草大豆滑石薄荷縮砂仁隂地蕨川芎土馬鬃人參菉豆粉寒水石紫河車茵陳益智馬勃草龍膽山豆根川百藥子白殭蠶雄黃白礬大黃青黛各五錢並生用右為細末生蜜為丸如彈子大每服一丸新水化下小兒半丸又解毒丸出濟生拔萃專善治男子婦人及小兒一切積聚停留作毒上焦壅熱咽喉不利口乾多渴伏暑煩悶及霍亂或山嵐瘴氣及食毒酒毒吐逆不定諸風毒或昏困不省人事虛煩發躁赤眼口瘡善解四時傷寒疾發散瘟疫毒邪之氣及四方人不伏水土一切毒並皆解之常服此藥補真益氣化毒除風神效不可細述滑石黃芩貫衆茯苓山梔子乾薑一作乾葛草龍膽大豆青黛甘草薄荷寒水石各一兩益智仁縮砂仁大黃山豆根生地桔梗百藥煎紫河車粉花即豆粉也馬勃板藍根黃藥子各五錢右為細末煉蜜為丸如彈子大每服一丸新汲水化下細嚼或含化亦得小兒半丸如婦人血暈不省生薑和水磨下一丸一方無滑石青黛為衣仁宗皇帝差人白內侍省陳頭供奉官劉元吉以李漢臣所進解毒保命丹賜狄青保命丹一名化毒丹出御藥院方專解諸毒酒毒山嵐瘴毒果毒肉麵毒魚菜毒冬月丹毒夏月暑毒傷風後餘熱小兒瘡疹毒及喉閉之患有名毒並皆治之貫衆茯苓黃藥子藍根乾葛地黃雄大豆甘草滑石縮砂隂地蕨薄荷各二兩好者土馬鬃菉豆粉益智寒水石山豆根紫河車馬屁勃草龍膽白殭蠶百藥煎山梔子大黃各一兩右各去土水洗淨焙乾為細末水浸蒸餅為丸如彈子大每服一丸細嚼新水送下小兒一丸分作四服煎薄荷湯放冷磨下小兒急驚磨水下更在臨時看病大小加減服之此藥常冝攜帶以備急若月頻服便諸疾不生神效不可盡述神仙解毒丸出經驗良方專治一切諸毒青靛花一斤半大黃山豆根自然銅黃藥白藥貫衆楮實子即穀樹子山梔子山茨茹黃連各十兩撲硝三錢滑石七斤芭蕉自然汁鉛光石右為極細末糯米煎糊同芭蕉汁和藥搗一二千杵多作餅隂乾不使見日不然折去料可作一千五百丸却用鉛光石打光不然煉光亦可丸如龍眼大如諸般骨鯁井水磨下一丸作勢一吞即下答腮焮腫咽喉飛錫麻油調下酒毒腸風下血薄荷湯磨水下赤眼腫疼井水磨下金蠶蠱毒用黃連水磨下蛇犬蜂螫蜈蚣毒用水磨塗傷處誤竹木刺井水磨下解般惡毒用新汲水磨下此藥收得年深愈神效又云合用白色新磚厠坑浸一年愈久愈妙厠窖底磚只須水洗淨不必煆燒細研五斤為細末同前藥為丸太乙追命丸一名奪命丸出聖惠方專治百病若中惡氣心腹脹不得喘息心痛疾積聚臚脹疝瘕不消宿食作逆嘔寒熱瘰􅊓蠱毒婦人産後瘀疾方蜈蚣一條丹砂附子炮製去皮臍礬石雄黃藜蘆鬼臼各一分巴豆右為末煉蜜丸如麻子大一服二丸日一服傷寒一二日服一丸當汗出綿裹兩丸塞兩耳中下痢服一丸塞下部蠱毒服二丸在外膏和摩病上在膈下痢有瘡一丸塗之毒自出産後瘀疾一丸耳聾綿褁塞耳一方無丹砂用溫酒服雞腸草散出千金方專解諸毒雞腸草三分薺苨升麻各四分芍藥當歸粉草各二分分圭一分藍子一合右下篩水服方寸以多飲水為佳若為蜂蛇等毒蠱所螫以針刺螫上血出著藥如小豆許於瘡所自瘥為射傷箭中所削竹如叉股長一尺五寸以錦纒繞水沾令濕取藥內瘡中隨瘡深淺令至底止如有血出即休若服藥有毒水服方寸以毒解痛止愈神仙解毒萬病丸出百一選方專解一切藥毒忌草菰菌菌金石毒喫自死馬肉河豚發毒時行疫氣山嵐瘴瘧急喉閉纒喉風脾病黃腫赤眼瘡癤衝冒寒暑熱毒上攻或自縊死落水打折傷死但心頭微暖未隔宿者並宜用生薑蜜水磨一粒灌之須臾復蘇癰疽發背未破及魚臍瘡腫毒湯火所傷百蠱犬鼠蛇傷并東流水磨塗并服一粒良久覺癢立消打撲攧損傷折炒松節酒磨下半粒仍以東流水磨塗男子或中顛邪狂走女人鬼氣胎并宜暖酒磨下一丸可分兩服有毒即吐或痢毒盡自止昔有一女子久患勞瘵病為血尸蟲所噬磨一粒服之一時即吐下小蟲千餘條一大者挣為兩段後只服蘇合香丸半月遂愈如常至牛馬六畜中毒亦以此救之無不效文蛤三兩淡紅色者捶碎洗淨本草云五倍子一名文蛤紅牙大戟一兩洗淨山茨菰二兩淨即鬼炣金炣花根也續隨子一兩去殼稱研細裹壓出油再研如白雪麝香三錢研右將前三味焙乾為細末入麝香續隨子研令勻糯米粥為丸每料分作四十九粒於端午七夕重陽日合如欲急用辰日亦得於木臼中杵數百下不得婦人孝子不具足人雞犬之類見之切冝祕惜不可廣傳輕之則無效如癰疽發背未破之時用冷水磨塗痛處并磨良久覺癢立消隂陽二毒傷寒心悶狂言亂語胸膈壅滯邪毒未發及瘟疫山嵐瘴氣纒喉風冷水入薄荷一葉同研下急中顛邪喝呌亂走鬼胎鬼氣並用暖無灰酒下自縊落水死心頭暖者及驚死鬼迷未隔宿者並冷水磨灌下蛇犬蜈蚣傷並冷水磨塗傷處諸般瘧疾不問新久臨發時煎桃桞磨下小兒急漫驚風五疳八痢蜜水薄荷小葉同磨下牙關緊急磨塗一丸分作三服如丸小分作二服量大小與之牙關痛酒磨塗及含藥少許吞下湯火傷東流水磨塗傷處傷損打撲炒松節無灰酒下年深日近頭疼太陽疼用酒入薄荷雜磨紙花貼太陽穴上諸般癎疾口面喎斜唇眼掣眨夜多睡涎言語蹇澀卒中風口噤牙關緊急筋脈攣縮骨節風腫手腳疼痛行止艱辛應是風氣疼痛並用酒磨下有孕婦不可服其方五倍子十五兩大戟七兩五錢山茨菰十兩續隨子十兩炒不去油麝香五錢療溺水死者王排岸云紹興府師有施此藥者渠一子溺水已死用此法救之遂蘇凡人居家或出入不可無此藥真濟世衛家之寶如毒藥嶺南最多若遊宦嶺表才覺意思不快便服之即安二廣山谷間有草曰胡蔓草又名斷腸草若此藥人急水吞之急死緩水吞之緩死又取毒蛇殺之以草覆上以水灑之數日菌生其上取為末酒調以毒人始亦無患再飲酒即毒發立死雞豚魚羊鵝鴨等肉內下藥復食此物即觸發急服此藥一粒或吐或痢隨手便瘥其俗淫婦人多自配合北人與之情相好多不肯逐北人回陰以藥置食中北人還即戒之曰于某年來若從其言即復以藥解之若過期不往必斃矣名曰定年藥北人屆彼亦冝志之若覺著毒四大不調即便服之危氏方內全蠍五枚大山豆根五錢硃砂雄黃各二錢紅牙大戟洗焙七錢五分一名方有續斷乳香各辟毒再生丹解毒丸出三因方專治誤食毒草并百物毒救人於必死板藍四兩乾者洗淨曝乾貫衆一兩銼去尖青黛研甘草生各一兩右為末蜜丸梧子大以青黛别為衣如稍覺精神恍惚惡心即是誤中諸毒將藥十五丸爛嚼用新水送下浸炊餅為丸尤妙如常服可三五丸大解暑毒甘草飲出千金方專解鴆毒及一切毒藥不止煩悶甘草蜜各四分粱米粉一升又以水五升煮甘草取二升去滓歇大熱納粉湯中攪令勻調納白蜜更煎令熟如薄粥適寒溫飲一升解毒散出余居士百選竒方類不問是毒藥服之蟲皆吐出神效石菖蒲白礬右等分為末新汲水調二錢不過兩服必效一方煎甘草湯調下青黛雄黃散出醫方大成諸凡始覺中毒及蛇蟲咬癰疽才作服此令毒氣不聚上好青黛雄黃等分右為細末新汲水調下二錢砂草油方治人食毒物及患惡瘡硼砂四兩甘草四兩右用真香油一斤於磁瓶內浸藥遇患急令患人服油一小盞立效浸久尤佳二藤酒出聖惠方專治解腹內諸毒并解一切毒都婪藤黃藤長握取二虎口長三寸并細銼右以酒三大升都入小罌罐中密封漫火圍四邉燒之令沸伺溫乃溫服常有酒色無禁忌若不獲己欲食俚人食者先取甘草一寸炙令熟嚼咽汁若食著毒藥即吐依前法治之若徑含甘草而不吐者非也冝常取甘草十數韯身帶之以自防嶺南人將生熟物並於火上炮炙食之永無慮若席上撒藥卧著因汗入肉最難治可常自將淨席隨身乃匙筯甘草并解毒藥行為妙昔有席辨刺史常言嶺南俚人解毒藥並是常用物畏人得其法乃言三百頭牛藥或言三百兩銀藥辨久住彼與之親狎乃得其實凡欲食先取甘草一寸炙熟嚼咽汁若中毒隨即吐出乃用都婪藤黃藤二物酒煎令溫服之常服毒隨大小溲出都婪藤者出嶺南髙三尺餘甚細常所謂三百兩銀藥也又常帶甘草隨身以備緩急解中毒似覺胸心煩悶狀如錐刀刺痛不可忍冝速吐之方出聖惠方生犀角屑一分生玳瑁一分右為細散以新汲水調下一錢頻服之以吐為度治一切毒入腹不可療及馬汗方用新葶􅐗子一兩炒研以水一升湯浸服取下惡血解一切毒方出千金方用母豬屎和服之一方用水三升二合和米粉飲之並瘥治發熱諸毒煩悶及解熱麵毒取枸把葉煮汁解之解諸毒方用橄欖生噉及煮飲並解之如誤食鯸鮐肝至迷悶者其汁立瘥治一切毒出聖惠方用戟藍實四兩白花藤四兩出嶲州者上不得取野葛同生者切以水七升酒一升煮取半空腹頓服之少悶勿怪單乾藍搗末服之瘥解諸毒卒得鬼打取粟米粉水攪服之亦主熱腹疼鼻衄並水煮服之治毒氣攻手足腫疼以及下部毒攻生瘡者出肘後方用櫸樹皮和槲皮合煮汁如飴糖以樺皮濃煎汁絞飲服之治蟲蛇毒取女青苖即雀飄白服汁良一方取倉鵝糞服之療下一切冷毒風氣取蒜獨頭者一枚和雄黃杏仁研為丸空腹飲下三丸靜坐少時患鬼氣者當汗出即瘥治剝馬皮骨刺破中毒欲死出德生堂取剝馬腹中糞及馬尿洗以糞敷之大驗絞汁飲之效治服漆毒發飲鐡漿及服黃櫨汁并甘豆湯良食蟹並可治又方用赤白地錦草洗曝乾為末米飲下一錢立效治中鴆毒氣欲絶者出十便良方用葛粉三合水三中盞調飲之如口噤者以物揭開灌之葛氏方止用粉治天行毒病衄鼻即是熱毒下血數升者出醫方大成取好墨為末以雞子白丸如梧子大用生地黃汁服三十丸如人行五里再服解諸毒方出危氏方方見本門解金銀銅鐡石毒類獨勝散出危氏方專解藥毒蠱蛇毒用大甘草以真麻油浸年歲愈多愈妙甘草用有節去土細嚼或以水煎服神效蠶退散出經驗良方專治一切諸毒用蠶退紙不拘多少以麻油燃燒存性為末新水調下一錢頻服凡諸中毒面青脈絶昏迷如醉口噤吐血服之蘇亦治牛馬誤喫花蜘蛛腹脹欲死者用兩大匙新冷水調下頻服灌下喉必效一方無麻油療蠱毒新汲水調服或㵼便安療出血解野毒方用鴨項煮汁飲之瘥解山瘴溪毒用􅗑羊角為末水煎服之一方燒之去蛇毒解中毒及能治挑生方出傳信十用方一日之毒中人即席狂亂五內如刀攪割不遇時死此一種最急亦以易治且以人頭垢用水調或洗頭巾水灌之吐出即愈二日之毒中人半日發其候精神昏忽腸胃攪刺霍亂吐㵼經夕而卒以逺處茆根下黃土攪冷水灌解三日之後毒中人似稍緩今凶人多用之被中者頗難知其初覺惡心減食暨毒發大槩數傷寒候肢節疼倦或作寒熱多唾皮膚習習痺覺如針鋩刺人又如被蜂蠆螫痛至甚著床啞而死此毒中人亦不可過兩日後發即取田中蟛蜞三十枚洗淨作鱠食之臨卧服碎蟛蜞數枚冷水投之天明㵼解諸湯毒又方用地黃汁一盞溫熱灌之解諸般中毒危卒等病證出德生堂用甘草一束長大約一尺許不論多少用麻繩緊拴三度安在厠屋糞缸內底下聼其諸淨手擔去糞必存留一年之餘取出拴繫長流水中洗去糞穢三日後切細晒乾碾為末恐有臭氣入麝香少許不問是何諸毒喉閉乳蛾口舌惡瘡中蠱菌毒之證悉皆治痘瘡不發服少許效竹筒中帶行有急時即塗傷處治百毒以鳬茈搗汁一升一方治露氣生於股根近小腹痛用獨核肥皂去子煨熟細搗加石灰同搗勻傅立去一方用五葉草根葉搗薑鹽酒浸服名五對草三對草一方用同治骨碎補生蘿蔔生薑同搗傅治腋下毒一方治􅣜毒用生腿根直者名露氣橫者名􅣜苦蕒菜椎傅愈又方治鐡蛇毒生手足指尖節上用大葉香薷并刺瓜者搗縳傅又方出鮑氏方用山薊醋調傅又方出鮑氏方用鴉鵲飯草挼汁縳傅又方出鮑氏方用藍青挼汁入雄黃麝香傅治熱毒以白麻油一合雞子二顆芒硝一兩攪服之少時即㵼一方出鮑氏方火帶毒似龍帶而以小龍芽草入酒一二滴搗傅一方出鮑氏方蜂窠毒燒蜂窠為灰麻油調傅一方用艾汁傅效一方出鮑氏方蜓蚰毒石菖蒲或地蜈蚣或赤葉地錦搗傅效一方出鮑氏方狐狸刺毒以五葉蛇草蘿蔔同搗傅或加倒摘刺肉橘實核皆效取甘草㕮咀濃煮多飲其汁雄黃散治中毒亦救蛇虺毒尤佳雄黃不拘多少為末入麝香少許麥門冬湯調下出舌數寸者亦治玉訣牛蒡涼風解毒用牛蒡子不拘多少炒為末水煎一錢服蟹解漆毒乾道五年襄陽有劫盜當死而特旨貸命點配者州牧慮其復為人害既受命以生漆塗其兩眼囚行到荆門已盲不見物寄禁長林縣獄以待傳送適有村叟以事在獄中憐而語之曰汝明日去時倩送者往蒙石及尋蟹搗碎之濾汁滴眼內漆當隨汁流散瘡亦愈矣如其言訪得一小蟹用之流三日而行目睛好略無損傷朱晞顔時以當陽尉攝邑令親見之生漆惹人成毒用椒葉煎湯洗雞黃塗白松菜解桐油誤食成毒飲熱酒解乾柿及甘草亦可治諸中毒衆藥不能解者急以野人肝研水灌下立解一方出本草用太平州白芷不拘多少研為末以麥冬湯調服一方出本草用秦皮濃煎服或蚌粉滑石貝母末傅亦可誤飲蜈蚣交水毒者方陳齋郎胡州安吉人因涉春渴掬澗水兩口咽之數日覺心腹微痛日久疼甚服藥醫診之云心脾受毒今心脈損齋答云去年涉春渴飲澗水得此病醫云齋郎喫却蛇在澗邉遺下不淨在溪水內蛇以成形腹中食其心而痛也遂以水調雄黃服之果下赤蛇數條皆能走也春秋二時龍帶精入芹菜中遇食之為病發時手青肚滿痛不可忍作蛟龍病服硬糖三二升日二度吐出如蜥蝪三二便瘥一方用餳粳米榖以人乳餅煮粥食之吐出為度外臺祕要云蛟龍病者三月八月近海及水邉回食生芹菜為蛟龍子生在芹菜上食入人腹變生龍子須慎之其病發似癲面色青少腹脹狀如懷妊冝食方以寒食飴餳三升日三服之吐出蛟龍有兩頭及尾開皇六年又賈橋有人喫餳吐出蛟龍大驗無所忌也明皇雜録云有黃門奉使交廣回周顧謂曰此人腹中有蛟龍上驚問黃門曰卿有疾否曰臣馳馬大庾嶺時當大熱困且渴遂飲水覺腹中堅痞如杯周遂以硝石及雄黃煮服之立吐一物長數寸大如指視之鱗甲皆具投水中俄頃長數尺復以苦酒沃之如故以器復之明日已生一龍矣上甚訝之解毒丸解世間不測一切等毒山豆根三兩板藍根二兩甘草四兩炙山茨菰三兩土馬鬃二兩續隨子仁二兩黃藥子二兩大黃一兩紫河車三兩木通二兩盆硝二兩五味子二兩藿香二兩寒水石二兩雄黃二兩貫衆二兩白殭蠶二兩乾葛一兩茜草根一兩薄荷二兩菉豆粉三兩百藥煎二兩硃砂一兩麝香五錢右為細末蒸餅為丸如彈子大用螺青三兩和勻一半為衣每服半丸用生薑蜜水化下解諸惡物及蠱毒砒毒菌毒河豚魚毒並皆治之又方煮薺苨令濃飲一二升祕方卒無可煮嚼食之亦可作散服之此藥在諸藥中最有驗又方凡煮此諸藥汁解毒者不可熱飲之諸毒得熱便甚冝使小冷為良又方用藍葉藍子亦通解諸毒常預稸之凡煮諸藥汁解毒者皆不可熱飲使諸毒更甚亦小冷爾畜之亦佳玉霜圓出華陀中藏經中專解一切毒牙硝半斤朴硝半斤硼砂四兩白礬二兩右四件火鎔鎔成汁傾入地坑之內為末龍腦二兩研水半盞令生蜜調一錢小兒量虛實服玉函方無朴硝只三味入藍實半斤至妙中毒門評諸凡中藥毒及一切諸毒從酒得者難治言酒性行諸血脈流遍身體也因食得者昜治言食與藥俱入於胃胃能容雜毒又隨大便泄出毒氣毒氣未流血脈故昜治也以毒即歸藏飽者毒氣未能深入故冝急解凡解諸食毒爛嚼甘草咽之則毒吐出矣方犯天麥毒方齊州有人病狂每歌曰五靈華蓋曉玲瓏天府由來汝府中惆悵此情言不盡一丸蘿蔔火吾宫又歌曰踏陽春人間二月兩和塵陽春踏盡秋風起腸斷人間白髮人後遇一道士作法治之乃云夢中見一紅裳少女引入宫殿皆紅紫飾小姑令歌道士曰此正犯天麥毒女則心神小姑脾神也按醫經蘿蔔治麵毒曰火吾宫即以藥并蘿蔔食遂愈治溪毒中毒以知母連根葉搗作散服之亦可服水搗取汁飲二升夏月出行多取此屑自隨欲入水先取少許投水上流便無畏兼辟射工亦可和水作湯浴之甚佳治諸蠱毒用小蒜五月五日採者上食之不可常食解諸藥毒蟲蛇及諸蠱毒右以大粉草寸假銼以芝麻油透愈久為妙收之遠行漳泉福建川廣間有中毒即嚼三兩假得吐即無害又方生茶葉焙生甘草焙生白礬乳鉢研為末右等分為細末每服一大錢以新汲水調下若中毒一月其毒自大便下若中蠱毒即吐出肉塊次服補藥生糯圓用糯米粉以烏豬膽汁為丸如梧桐子大每服三十粒熟水吞下解一切毒用縮砂仁生韭汁藍實各單用水調下淡豉蔥麥門冬水煎服卒中毒有藥者生麻油一盞吐下毒治中蠱毒出本草用生蒼耳七個白礬一兩皂角子嚼塗咬處須男子嚼之放藥於腫處一方出本草用雄黃不拘多少萵苣汁和作餅子候乾為末每用少許貼瘡口立效或以酒調雄黃末傅之亦得解毒散出本草用山鵲將酒服治中諸毒煩悶出本草用掘地作坎以水沃其中攪令濁俄頃取飲之即解解毒人卒不得生藍汁者出本草以浣䌝布汁解之亦善解諸毒物入腹出本草以鐡漿服之解一切毒出本草以臘雪少溫服之解諸毒藥及蟲出本草以車渠玳瑁一片等分作人乳磨服極驗治一切毒氣及蛇傷出本草以獨行根磨服之應是著諸般毒悉皆吐出治一切草毒出本草用白藊豆生嚼及煎湯服取效治諸惡􅈮狐尿刺毒山溪中沙虱射工等毒出本草以蔥煮汁浸之或搗傅中效治嶺南人以藍頭合毒有中之者出本草以藍蛇尾作脯與食之即解其蛇頭毒尾良也破棺湯出本草專治諸毒辛惡熱黃悶欲死者以屎新者最效須與水和服之乾者燒之煙絶水漬飲汁一方多年乾者搗末沸湯沃汁服之解諸毒蠱毒腫毒蛇虺蠱狂犬毒并瘡除血長膚者以紫珠煮汁服之一名紫木治溪毒出本草以小蒜煮汁服之治人中毒出本草以萍子曝乾為末酒服方寸解諸毒物出本草以百丈青煮服亦搗絞汁服治解一切毒氣虎狼所傷溪毒野蠱等毒出本草以草犀根燒碎服臨死者服之得活治諸毒熱煞蛇毒除驚怖恍惚出本草以麝香作服之治瘴毒出本草以蚺蛇肉作鱠食之良殺蠱毒出本草以鰻鱺魚乾燒炙之令香食之三五度即瘥一方為末服之長服尤良去熱煩解毒調中氣令人肥健又主馬血毒入肉出本草以甜藤搗絞汁和米粉作糗餌食之甜美去蟲蛇蠱毒出本草以大蒜生食之解蜈蚣毒及蜀椒毒用桑汁及煮桑根汁並解治狐狸刺毒用煮大豆令多飲甘汁無大豆豉亦佳又方解狼煙毒入口用飲少醋解治剝驢馬血入肉毒用赤柳木以火炙尉之亦可煮汁浸之效一名河桞風毒腫出聖惠方沉香木香薰陸香雞舌香麝香紫檀香並皆治之中藥毒附論神農嘗百草一日而遇七十毒以辨相得相反相惡畏至於有毒無毒各有制治然藥無毒則病不瘳內經所謂知毒藥為真者乃用藥之要也昧者語有服食當究其毒以制治之猶巴豆之用黃連半夏之用生薑是也甘草能解百藥之毒大有神妙有人中烏頭巴豆毒甘草入服即定中藜蘆毒蔥湯下咽便愈中野葛毒土漿飲訖即止如此之事其驗如反掌方稱大豆汁解百藥毒每令試之大懸絶不及甘草又能加之為甘豆湯其驗尤甚有人服玉壼丸治嘔不能已百藥與之不止藍汁入口即定又云凡受毒者或魚肉飯中得之則昜治飲酒得之則酒氣散歸百脈難治若在胸膈作楚則用稀延散吐之若在腹中作楚急服雄黃丸㵼之徐服參苓白术散無恙矣仍忌雞鵝肉數日為妙又云凡煮諸藥汁解毒者不可熱飲諸毒得熱更甚冝使小冷為良夫有大毒之藥不可入口鼻耳目即殺人者一曰鈎吻生朱崖二曰鴆又名䲰狀如黑雄雞生山中三曰隂命赤色著木懸其子生山海四曰海薑狀如龍赤色生海中五曰鴆羽狀如鸛雀黑項赤啄食蝮蛇生海內但彼此諸毒藥發動狀皆似勞黃頭項強直背痛而欲寒四肢痠灑毛悴色枯肌肉纒急神情不樂又欲似瘴病或振寒如瘧或狀熱似時行或吐或痢多若頭痛又言人齒色舌色赤面多青者並著藥之候也嶺外俚人别有不強藥不藍藥有燋銅藥金藥菌藥此五種藥中人者亦能殺人但此毒初著不能知欲知是毒非毒初得便以灰磨洗好熟銀令淨復以水楊枝洗口齒含此藥一宿卧明旦吐出著之銀黑者是強藥銀青黑者是藍藥銀紫班者是燋銅藥此三種但以不強藥最急毒若熱酒食裏中者六七日便死冷酒食裏中者著經半月始可知爾若冷銀銀色不異而病候與著藥之狀不殊心疑是欲得知者可食鯉魚食畢此毒即發亦空腹取銀含之可兩食頃出著露下明旦看銀色若變便黑即是藥毒又言取熟雞子去殼令病人齒勒齒雞子白處亦著露下若齒痕處黑即是也又言覺四大不調即飲酒空腹食炙雞炙豚鴨等觸犯令藥發即治之便瘥若久未治毒侵腸胃難復攻治也若定知著藥而四大未羸者取大戟長三寸許為末水服必大吐痢若色青者是燋銅藥色赤者是金藥吐菌子是菌藥此外雜亦無定色但小異常爾又有兩種毒藥名當孤草其著人時脈浮大而洪病發時惡寒頭為痛乾嘔背迫急口不覺嚼舌大小便祕澀面色眼眶唇口指甲背青是也又别一種當孤草毒者其病發時口禁而乾舌不能言咽喉如錐刀刺胸中甚熱體脾滿悶不至百日身體唇口手足背青而死又著烏頭者其病發時咽喉強而眼睛疼鼻中聞臰手腳沈重常嘔吐腹中熱悶唇口青顔色乍青乍赤百日乃死凡人若色黑骨大肉肥者皆胃厚則勝毒若瘦者則胃薄不勝毒也凡藥毒及中一切毒皆能變亂於人為害亦能殺人但毒有大小可隨所犯而救解之若毒重者令人咽喉腫強而眼睛疼痛鼻乾手腳沉重常嘔吐唇口習習腹裏熱悶顔色乍青乍赤經久則難療其輕者身體習習而痺心胸涌渴然而吐或利無度是也但從酒得者難治言酒性行諸血脈流遍身體故也食得者易治言食與藥俱入於胃胃能容雜毒又隨大便泄出毒每未流於血脈故易愈也若覺有前諸候便以解毒之藥救之方蜂窠散治藥毒吐後土蜂窠炒研末一兩赤小豆糯米粟米藍實四味并生用各二兩豬苓去黑皮薺苨各銼半斤馬藺花乾者二兩右為散每服三錢以溫水調下空心日晚服一方入豬糞炒焦解諸藥毒預含方出聖惠方水銀一兩以棗肉研令星盡膩粉一兩五錢不灰木一兩搗研細羅為末揀淨雞子三枚藍根一兩搗羅為末生薑汁二合右以臘日拌和入瓷罐內掘地坑埋至端午日取出用軟飲和丸如紅豆大每服以甘草汁生米泔嚼下一丸瘥丹砂丸解藥毒蠱毒等疾丹砂研雄黃研附子炮去皮臍為末各二兩䜴六十粒炒巴豆六十粒去皮心膜麩紗去油右細研巴豆并豉前三味煉蜜和搗數百下丸如豆瓷瓶蜜收每服二丸暖蜜酒下解諸毒藥傷人方出聖惠方石南根五錢啇陸五兩切晒乾炒令黃肉桂一兩去皴皮甘草一兩生用豬牙皂角三兩去皮絲炙令焦黃去子右搗篩為散每服五錢以水一大盞煎至五分去滓溫服之以吐㵼為度令吐在盆中要得看驗只得喫粥將息為妙解毒丸出聖惠方銀星礜石金星礜石太隂玄精石雲母粉不灰木以生糞燒灰令通赤已上各二兩右用藥四味炭火燒令通赤與不灰木同入盆下蓋出火毒一宿後細研如粉入龍腦二錢更研令勻以糯米粥和丸如紅豆大每服一丸以生薑汁少許并新汲水研破服之婆婆石丸出聖惠方專解藥不論年月深淺立瘥婆婆石豬血各五錢雄黃麝香乳香各一分右研為末用軟飯并豬血和丸如梧桐子大每服以溫水研下二丸又含一丸即吐出病根瘥如不吐即以內消也於端午日午時合如急要即取辰日辰時合亦得防己解出千金方專解芫花毒方防己防風去蘆甘草生銼桂去粗皮各一兩右為末散每服二錢以冷水調下連併三服一方單用一味亦可解之椒豆飲出百一選方專解砒毒韜丸傳漢椒四十九粒黑豆十四粒烏梅二分去皮甘草三寸碎之右水一碗煎七分溫服白扁飲一名巴豆靈膏出危氏方解砒毒等用白扁不拘多少為細末入青黛等分細研冉入甘草末少許巴豆一枚去殼不去油另研為細末取一半入藥內以炒糖一大塊水化開添成一大盞飲之毒隨利去後用五苓散之類金星地蟺散出聖惠方專解毒藥金星地蟺末二錢婆婆石五分牛旁根一兩切碎焙乾竈下黃土一兩右為細末每服以熱酒調下一錢服之藍根飲解毒藥藍根一握銼蘆根一握銼菉豆研一分澱腳研一合晒乾右先將藍根蘆根以水一碗煎至七分去滓次後二味和勻分三服或一二服利下惡物不用再服承氣湯出十便良方專治吐却惡毒物後覺胸心安穩即服此茯苓一兩麥門冬一兩去心人參去蘆頭一兩青竹茹五錢五分右為末每服五錢以水一大盞入棗三枚煎至五分去滓溫服日三服一二兩日內且宜食粥麥門冬飲出千金方專治一切藥毒發不問草石始覺惡心生麥門冬去心二兩蔥白切三兩豉二兩五錢右銼如麻豆大以水七盞煎取三盞半去滓分三服食頃再服之椿皮飲解一切藥毒椿白皮東桞枝并細銼各二合阿魏好者少許右以水三盞同煎取一盞去滓空心頓服吐出惡物即瘥吐後服蜂窠散甘草飲治中藥毒心痛煩悶甘草生銼二兩粉草研一兩白蜜五錢五分右以水六盞先煎甘草減半內葛粉并蜜更煎三兩沸去滓溫分三服如食頃冉服辨毒散治一切毒及藥毒阿魏研青鹽研各一兩甘草生銼三兩右為散如遇有毒物處每日空心沸湯點服一錢若食著毒物立便吐出中諸藥毒方甘草生用黑豆淡竹葉右等分銼散水一碗濃煎服之粉草飲凡中藥毒即用生黑豆數粒食之間醒者即非中毒若是吐出逆煩躁服藥須極冷即解也解中藥毒蟲毒悶亂吐血煩躁甘草一兩生用白礬五錢生延胡索一兩二分右為細末每服五分水一盞煎至六分去滓放冷細細呷之解諸藥毒人中毒以金叉股煮汁服之亦生研更烈必大吐下如無毒亦去熱痰解毒丸治中藥毒心腹切痛不可當欲死者有救藥不及死後身黑是中毒之證大棗二枚去核巴豆三十七粒去皮心膜不出油右共研勻只作四丸以大針穿就麻油炣熖上熏黑用瓷合貯遇中毒者每服只一丸隨所中毒物汁咽下不得嚼破一二時辰取下毒其毒即緊包裹所服藥下或不知所中毒物即以茶清一大盞放溫咽下甘草湯以中藥毒心膈煩悶甚者如錐刺痛不可忍冝速吐之甘草生用二兩白藥一兩一錢右細銼以水三盞同煎至二盞去滓候頓服以吐出惡物為度吐了後冉單煎甘草一味服之尤佳歸魂散一名礬茶散出廣南衛生方專解中藥毒煩躁吐血腹內口內如錐針刺白礬草茶各一兩一錢右搗研為散分作三服用新汲水調下連服之立解此藥入口其味甘甜不覺苦味者是中藥毒也得吐即效不吐冉服一方用白礬臘茶末水調下治菌毒解百藥毒方出千金方用甘草薺苨大小豆汁藍葉根實絞取汁服之並瘥解野葛毒方出千金方如若以口噤者以大竹筒盛冷水注兩脅及臍上暖輒易之口須臾開開則後藥入口便活以生薺苨汁解之又用雞子三枚葛根汁甘草汁鴨頭熱豬血雞屎人屎各絞取汁服之並瘥解烏頭天雄附子毒方出千金方用大豆汁逺志防風棗肉飴糖並能解之一方専用遠志防風二味投大豆汁調下一方專用防風棗肉濃煎湯服之亦可解半夏毒方出千金方用生薑汁及乾薑服之良唐崔魏公云䤤夜暴亡有梁新聞之乃診之曰食毒僕曰常好食竹雞竹雞多食半夏苖必是半夏毒命生薑捩汁折齒而灌之活浙人王夫人忽日面生黑班日久滿面俱黑遍求醫不效忽遇一草澤醫人云夫人中食毒矣治之一月平復後覺其方止用生薑汁糊為丸服之問其故云食班鳩蓋此物常食半夏苖中毒薑汁解之解莨菪葉中有毒者煮甘草汁服之解狼毒方出千金方用杏仁藍白斂鹽木占斯各絞汁調服瘥藍汁亦解解巴豆毒方出千金方用煮黃連大豆生藿小豆藿菖蒲屑及煮寒水石各件取汁並皆可服甚良解蜀椒毒方出千金方用葵子汁蒜桂汁豉汁人尿冷水土漿飲之一方以雞毛燒吸煙及水調服一方用棗子解之更含薺苨並瘥一方専用葵子汁桂汁䜴汁同和服之解斑貓芫青毒方出千金方用豬膏大豆汁戎鹽藍汁服之一方用鹽湯煮豬膏巴豆飲之一方用大小黑豆汁服之並瘥解莨菪毒方出千金方專治食莨菪悶亂如卒中風或似熱盛狂病服藥即劇右飲甘草汁及藍青汁即愈一方治中砒毒用藍汁同甘草汁飲之解鈎吻毒方出千金方專治鈎吻毒困欲死面青口噤逆冷身痺肘後方云鈎吻茱萸食芥相似而所生之傍無他草莖有毛誤食之殺人用薺苨八兩㕮咀以水六升煮取三升如人體冷服五合日三夜二濃汁為妙一方煮汁飲之一方噉蔥汁尤佳解毒方解中一切毒藥口唇麻目暗心腹如刀刺或吐出血用石緑不計多少研細每服一錢研萊蔔之汁調下立吐得毒出即服和氣藥調補升麻湯治藥毒吐出用升麻半兩為散食後及夜卧溫水調下一錢七服半月夜一切毒藥入口即便吐出冝常太白散解藥毒用山芋三兩為散每服二錢以新汲水調下日三服殭蠶散解一切藥毒用白殭蠶直者炒為散每服一錢以粥飲調下吐出毒物瘥一方用酒醋水三般同為一盞煎五七分溫服解野葛毒解一切藥毒方見本門解毒丸麻仁飲用大麻仁五合研如膏入水二盞攪令勻取汁飲之解躑躅毒方出千金方用梔子仁四兩為散冷水調下二錢若未效冉服解藜蘆毒方用雄黃一兩細研煎蔥汁調下一錢如未效冉服一方用溫湯飲之並解一方用冷酒服解一切毒解甘遂毒方出千金方用大豆粉不拘多少去皮以水研取汁每服一盞未效再服一方大小黑豆水調服解一切毒解大戟毒方出千金方用菖蒲一兩為散每服二錢以溫湯調下解杏仁毒方出千金方用藍實不拘多少研取汁水和服之亦解毒藥解桔梗毒方出千金方用糯米二合洗淨煮白淡湯粥食之解砒毒鼠莽草毒方出醫方大成用金錦重樓磨水服之即愈又用烏桕根擂水亦好又用大黑紅豆煮汁服之並瘥解射罔毒方藍汁竹瀝六畜血葛根屑蚯蚓屎藕根汁大小黑豆右各味偹急皆能解散諸毒但以一味二味皆良又一方無葛根屑解砒毒方用早禾桿燒灰新汲淋汁絹帛濾過冷水服一碗毒從下利即安解鼠莾草毒方用玉簮花根研取自然汁半盞灌之如吐冉一服一方解毒玉簮花根水服之解砒毒方用豆豉濃煎湯灌之亦治服藥過劑心中煩悶獨聖散治附子河豚烏頭之類一切毒藥并解丹毒用多年壁土熱湯泡攪之令濁少頃乘熱去腳取飲不醒人事灌之或掘地以水攪漿水飲之妙一方用壁土水調服之瘥一方用川白土調服解巴豆毒方視其證口渴臉赤熱痢不止諸藥不效用芭蕉根葉研取自然汁服痢止而安解鼠莽草毒方用枯蓮房殼帶梗隂乾㕮咀煎水二三碗灌之如無荷葉中心蒂或用藕節煎湯一碗冷灌之毒即散三味中隨其物便用之又方用江豆花研水吞下如無花只用豆亦可解砒毒方用伏龍肝為末清油調二錢服之解毒藥方用孔雀血生飲之良如聖散治中一切藥毒并蟲毒用石蟹熟水磨之服解砒毒方其證煩躁如狂心腹攪痛頭疼欲吐不吐面青黑四肢逆冷命在須臾不救方用菉豆半升擂去滓以汲水調通口服或用真靛花二錢分二服以井花水濃調服之又方治悶絶心頭溫者新汲水調下服之如神治中毒衆藥不能解者急以野人肝研水灌立解又方用黑鉛井水磨下一方無鉛用青鹽兩塊研井水下又方解砒毒亦解巴豆毒用生麻油一盞飲之不能飲灌之立見起死又煎黃連湯服之亦佳以吐為度則其毒氣自不能為害黑豆甘草節各熬水服解之解鼠莾草毒及丹毒方用旋刺下羊血鵝血鴨血飲之良礬茶散解鼠莾毒方見中蟲毒類又方解毒藥毒用大黑豆煮汁服之如欲試其驗先用鼠莾苖葉以豆汁澆其根縱其散爛不復生矣一方用紅豆解砒毒方用釅米醋多飲之吐出毒解不可飲水一方用人糞食之亦可解附子毒方用濃煎防風湯飲之良治藥毒取巴豆去皮不出油牙硝等分合研成膏冷水化一丸服瘥又方用溫豬脂一升飲之治中諸毒藥及野葛將死方取新小人屎絞汁和一升服之入腹即活解諸毒無過屎汁解諸藥毒以土芋研水服當吐惡物盡便止解諸藥及諸草毒方以黃土地掘一坑以水攪濁飲一二碗即愈本草謂之地漿解毒第一方也及解丹石毒又方治回回麻藥服多而昏暈者以好醋解之又方治草烏麻吐好醋生薑甘草皆解一方煎甘草生薑自然汁頓服解一切藥毒及草毒六畜肉中毒出聖惠方用白藊豆生晒乾為細末新汲水調下二三錢全椒醫者髙照一子無賴父笞之遂服砒霜自毒大泄利腹脹欲裂豫教照以調此藥隨所與之不數碗即安如聖散出肘後方專解藥毒露蜂房甘草各半同用麥麩炒去麩右為散用水一盞半煎至八分放溫臨卧頓服明日取下惡物為妙二珍散出廣南四時攝生論專解一切藥毒天南星三兩為末黃牛膽大者一枚取汁若收得隂乾臨用時冉用暖水浸軟用右和如雞頭大隂乾遇中毒者以汗襪水澄清半盞入鹽少許磨下一丸或和即瘥如吐利後氣滿即服平胃散助之此藥但頭服腹未裂並可治藍飲子出危氏方專解砒毒及巴豆毒用藍根沙糖二味相和擂水服之或更龍腦薄荷汁尤妙多進二服薺苨散出千金方專解一切毒藥薺苨一方藍并花二分七月七日取者為佳右以藍隂乾搗篩水和服一方寸每日三服貝齒散出千金方治中射罔脯毒及餅臛中毒方取貝子為末水服不瘥又服一方治食百物中毒以一枚含之吐出毒物為度解防葵毒方出千金方解藥毒方見本門解諸藥毒類解野芋毒方出千金方用土漿人糞服之解藥毒方出聖惠方用白礬一兩搗為末以新汲水灌之口耳中皆出黑白勿怪出盡即愈治中藥毒方出千金方取秦毛二枚燒灰服聖惠用春燕毛二枚燒灰水服凡中五大毒卒無藥可解者出外臺柲要冝用小便飲之治硼砂毒方用生菉豆粉不計多少研汁飲之亦解砒毒化毒散出余居士選竒方專治中藥毒吐血或心痛或舌微黑口唇裂嚼生黑豆不醒巴豆一粒去殼略去油研黃丹五分雄黃一錢研右同研用烏雞子一個打藥白剩煎捲成筒子臨睡只一服細嚼茶清送下當夜取下毒解莨菪毒方出千金方用薺苨甘草犀角蟹汁升麻各絞汁服並皆治之凍青飲解砒毒用凍葉擂取自然汁添井水服須㵼下解中仙茅附子毒方鄭長卿資政詵少時隨父太宰官懷州將官服仙茅遇毒舌脹出口漸大與肩齊善醫環視不能治一醫獨言尚可救少緩無及矣取小刀釐其舌隨合釐至百數始有血醫許善無害也舌應時消縮小即命煮附子酒每生切附子一兩浸以汁酒旦起輒飲一杯服之二十年後再為陜西漕使詵自太學歸過之南縣核中行中途曉寒詵飲一杯竟復令溫半杯酒來飲盡自覺微醉乃與妻飲行將數里妻頭腫如斗唇裂血流下駐路傍隨行李職醫告之李使黑豆菉豆各數合生嚼之且煎湯并飲至曉腫始消詵仍服之不輟到安數月失明遂致仕時方四十二嵗藥反中毒方治諸藥相反中毒蟬殼蛻燒灰細研一錢右冷水調下頻服取效雖面青脈絶腹脹吐血服之即活解毒藥方王仲禮嗜酒壯歲時瘡㾴發於鼻延於顙心甚惡之服藥多弗效僧法滿使服何首烏丸當用二斤適其僕識草藥乃掘得之其法忌鐡氣但入砂鉢中藉黑豆蒸熟既成香味可人念所蒸必能去證以頮面初覺極熱漸加不仁至晚大腫眉目耳鼻渾然無别望之者莫不驚畏王之母髙氏曰凡人感風癩非一日積吾兒遇毒何至於是吾聞生薑汁赤小豆解毒山豆根黑蛤粉能消腫毒即命僕搗捩薑汁以三味為末調傅之中夜腫消到曉蓋先採何首烏擇焉不精為狼毒雜其中以致此撓也解百毒甘草能解百毒為藥之長孫思邈論云有人中烏巴豆毒甘草入腹即定方稱大豆解百藥毒嘗試之不效乃加甘草為甘豆湯其驗更速凡欲食先取甘草一寸炙熟嚼咽汁若中毒隨即吐出治蒙汗毒目瞪不能言如醉用白藊豆不拘多少為細末用水或溫酒調下亦能解砒礵毒及鴆毒又方用川中白蟺土如無以厨上多年黃土為末水調服又方用鬢邉左挑腳銅錢飛下即是又方或急症無藥以新汲水噀心上候醒即止解砒礵毒以鬱金末二錢入蜜少許冷水調下升麻濃煎冷服杏核研為細末以米飲調下白藊豆為末冷水調下解砒毒無如醬調水服寒水石菉豆末以藍根研水調下取地漿調鉛粉服之解白芷末調水下鬱金末水調下豉豆汁又佳甘草散解一切毒藥用甘草二兩生銼碎用水三碗煎至一碗去滓入菉豆粉一合打勻冉煎數沸入蜜半兩溫服又方療諸藥各有相解者今但取一種而兼解衆毒求之易得者甘草濃煮汁多飲之無不解也又食少蜜佳解百藥毒用橫紋甘草截成小塊麻油煎過空心食前後常嚼久而作效凡食毒藥毒必嘔出皆不為害也薺苨解百藥毒以其與毒藥共處皆歇取根搗末飲服藍汁白匾豆及大小豆并單服用水調服以毒盡即效驗也萬露丹解一切藥毒及蠱毒金蠶等毒光明硃砂一兩須是辰州者令人細研一伏時大天南星為末生用三兩黃牛膽一枚取汁如無新者須是隂乾者用時以溫水浸軟以溫水調開右以膽汁和前二味為丸如皂角子大隂乾如有中諸毒者但頭肚未烈皆可救療服時先取汗腳襪以新汲水洗汁澄清半盞入鹽磨化一丸頓服續以薄粥投之以吐為度其疾永除解諸藥毒中肉毒合口椒毒野菌毒用入地乾土水調服並解之東壁土用之功亦小同治合口椒并楓樹上木耳有毒者以冬瓜蔓生搗汁服解諸藥毒及利小便以木通實蜜煎作果食之治解諸藥毒以陳家白藥水研服之入腹與毒相攻必吐疑毒未止便再服心胸煩熱天行溫瘴並皆治之治解諸藥毒方見本門解藥毒類解藥毒蠱毒以菩薩石用水磨服之解諸藥毒丹毒菌毒止渴去煩熱以諸血並生飲之解諸毒藥腫用人肝藤生研服之亦傅腫上治中野葛毒以羊血飲解之治水銀入肉令百節攣縮躄病昔北齊徐玉以此療以金物火炙尉之水銀得金當出蝕金候金色白者是也如此數度並瘥解諸藥菜肉中毒以白花藤酒漬服之大豆飲解一切藥毒消腫下熱氣殺烏頭附子毒用大豆一升以水二升煮至一升去豆停冷細細飲之一方用豆飲之治丹毒丹石發熱以牛肝和腹內柏葉作生薑醋食之服藥過劑附論夫唯動與過疾所由生故所守不固則邪得以干之以五藥內攻使邪不勝正而已然毒藥攻邪不必過劑則反傷正氣猶以五味致飬稍過亦能為害此理之必至也夫合和湯藥自有限劑至於刲銖分兩不可乖違若增加失宜便生他疾其為疾也令人吐下不能已嘔逆悶亂手足逆冷腸痛轉筋若藥不解之亦能致死宜速治之則無害也方花光散治服過劑反傷正氣致八邪干心或三蟲作蠱及中惡或變為五淋或致於為驚癎或筋攣脈結或産婦血暈或胸停客熱並皆治之玳瑁屑二兩五錢藍實炒一兩五錢安息香别研琥珀各一兩人黃别研人參麝香别研貫衆各五錢右除别研外搗羅為末拌勻每服一錢用溫酒下早晚服小兒半錢隔日再服充德丸治因寒藥攻大腸急痛或胸藏冷氣或為血蠱霍亂或心脹短氣或羸瘦或腸不解或虛滿遺精或水腫中惡艾去梗炒二兩雚菌一兩五錢丁香一兩訶梨勒煨去核一兩麝香研五錢桑白皮根一兩肉豆䓻去殼泡益智子去皮各五錢薰陸香别研五錢右除别研外搗羅為末同拌勻酒煮麵和丸如梧桐子大每服二十丸早晚食前溫酒下藥過劑毒服附子酒多而毒覺頭重如斗唇裂血流急求黑豆菉豆各數合嚼之及煎濃黑菉豆湯併飲服風藥多悶亂不省醋灌濃煎甘草同生薑自然汁頓飲之又螺頭青細研新汲泉水調下又方出千金方治服藥過劑及中毒煩悶欲死亦解狼毒以搗藍取汁數升無藍浣青絹取汁飲亦佳一方用藥水調服黃連湯出濟生拔粹專治因服藥過多小便不利諸藥莫能效或臍痛悶不可忍黃連炒黃蘖炒甘草各等分右㕮咀水煎溫飲之食前如盡不通加知母此藥助隂使氣得化則通矣解石藥過劑方出肘後方黃丹三兩芒硝二兩以水五升煮取三升分三服得下便愈一用地黃五升煮不用水一方并以藥末摻於舌上遂愈治藥中有巴豆下痢不止出聖惠方乾薑炮製銼黃連去鬚炒各一兩右為細散每服以水調二錢服如人行五里冉服治服藥過劑心中亂悶方及治諸菜毒搗生葛根取汁半盞或一盞飲之或以根一兩細銼水二盞同煎至一盞去滓溫服又方用胡粉水服之用乾薑末水和服之用飴糖服之並瘥又方出千金方搗蘘荷汁飲一二升良冬用根夏用莖葉犀角散治服藥過劑心中悶亂方見解諸飲食中毒類又方出千金方以粳米水研取清汁五升細細服之又方出千金方以雞子三枚取黃吞之又方出千金方以黃連末一錢用溫水調服又方出聖惠方於屋溜下作坑廣二尺深三尺以水七盞灌坑中攪揚之令沫出取沫五盞飲之未解更作又方出肘後方右刮東壁土水一二升調飲之又方出聖惠方用白鴨屎末和水調服之瘥治若卒服藥吐不止者出聖惠方以新汲水飲一升即止一方噀心候醒即止又方出本草若藥中有巴豆下痢不止用煮熟豆一升服之即瘥凡服藥太過熱物相反麻木嘔吐不可解者用鹽炒令紅冷水調下一二錢即蘇普濟方卷二百五十一
