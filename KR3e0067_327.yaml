蒼术製各七錢若妊娠傷寒下後過經不愈濕毒發班如錦文宜升麻六合四物湯四兩升麻連翹各七錢若妊娠傷寒胸脅滿痛而脈弦少陽頭昏項強宜柴胡六合湯四物湯四兩柴胡黃芩各七錢若妊娠傷寒大便硬小便赤氣滿而脈沉數陽明太陽本病也急下之宜大黃六合湯四物湯四兩大黃五錢桃仁十箇去皮麩炒若妊娠傷寒汗下後咳嗽不止者宜人參六合湯四物湯四兩人參五味子各五錢若妊娠傷寒汗下腹虛痞脹滿者陽明本虛也宜厚朴六合湯亦治咳嗽脹滿四物湯厚朴枳實麩炒各五錢若妊娠傷寒汗下後不得眠者梔子六合湯四物湯四兩梔子黃芩若妊娠傷寒身熱大渴蒸蒸而煩脈長大者冝石膏六合湯四物湯四兩石膏知母各五錢若妊娠傷寒小便不利太陽本病宜茯苓六合湯四物湯四兩茯苓澤㵼各五錢若妊娠傷寒太陽本病小便赤如血狀者宜琥珀六合湯四物湯四兩琥珀茯芩各五錢若妊娠傷寒汗下後血漏不止胎氣損者宜膠艾六合湯四物湯四兩阿膠艾各五錢一方加甘草同上一方加乾薑甘草黃蓍若妊娠傷寒四肢拘急身涼微汗腹中痛脈沉遲少隂病也附子六合湯四物湯四兩附子炮去皮臍桂各五錢若赤白帶下宜香桂六合湯四物湯四兩桂香附子各五錢若妊娠傷寒蓄血證不宜隨胎藥下之宜四物大黃湯下四物湯四兩生地黃大黃各五錢酒浸若虛熱病四物與參蘇飲相合名補心湯主之若四肢腫痛不能舉動蒼术合半夏湯主之若治燥結四物與調承氣湯合半為玉燭散若流濕潤燥冝四物湯理中合半湯若保胎氣令人有子四物與􅒦砂四君子湯各半名八珍湯若熱與血相搏口舌乾渴飲水加括蔞麥門冬若腹中刺痛惡物不止加當歸芍藥若血崩者加生地黃一用熟蒲黃黃芩一方無黃芩若因熱生風者加川芎柴胡防風一方無防風若臟祕澀者加大黃桃仁若嘔者加白术人參生薑一方無生薑若滑㵼者加官桂附子若發寒熱者加乾生薑牡丹皮芍藥一方無芍藥柴胡若大渴者加知母石膏若水停心下微吐逆者加豬苓茯苓防風若頭昏項強者加柴胡黃芩若虛寒似傷寒者加人參柴胡防風若産婦諸證各隨六經以四物與仲景藥各半服之甚效若婦人或因傷酒或因産亡血或虛勞五心煩熱者宜四物二連湯四物湯內用生地黃黃連胡黃連真者用溫飲四物與桂枝麻黃白虎柴胡理中四逆茱萸承氣涼膈等皆可作各半湯易老用藥大略也若虛煩不得睡者加竹葉人參若婦人血氣虛心腹㽱痛不可忍者去地黃加乾薑名四神湯若諸痛有濕者四物與白术相半加天麻茯苓川山甲用酒煎若目赤暴發作雲翳疼痛不忍宜四物龍膽湯四物湯各四兩羌活防風草龍膽防己各三錢用水煎一方等分為粗末每服四錢水一盞半煎至八分去滓取六分清者帶熱服食前若平常血氣不調及常服只用本方日二三服治經血凝滯腹內血氣作疼加莪术官桂等分用之王石膏云熟地黃滯血安能止痛不若用五味子代之如因産後欲推陳致新補血海治諸疾加生薑煎若胎動不安下血每服加艾葉五七片更加蔥白阿膠未減四味之半當歸用小半如疾勢甚者以四味各半兩細銼以水四盞熟艾一塊如雞子大阿膠五七片煎至二盞半去滓分作四服一日令盡一方有粉草乾薑黃蓍日二三服至二臘以一七日為一臘以前産後每日可一二服亦治血痢疾不止腹痛難忍宜加阿膠艾葉煎服名六物湯如氣虛弱血海不調服一月無不效也如産後被驚氣滯種種積滯敗血一月內惡物微少敗血或病或脹或疼胸膈脹悶或發寒熱四肢疼痛加延胡索沒藥香白芷與四物等分為細末淡醋湯或童子小便酒調下如血風於産後乘虛發作或産後傷風頭疼發熱百骨節痛加荆芥穗天麻香附子石膏藿香一分四物料共一兩中加之每服三錢水一盞煎至七分服如寒熱往來加炮了乾薑牡丹皮各一分若平常些少虛眩肢體瘦倦月信不調只用生薑薄荷如常服此是婦人常服之藥蓋謂寡而性緩效遲而功深治老人風祕加青皮等分煎服一方治婦人腹痛作聲經脈不快加熟地黃一倍添桂半倍煎治瘡疾加荆芥酒煎常服一方名五神湯柴胡大能補虛退熱一方以四物湯共四兩為細末煉蜜為丸如梧桐子大空心米飲下三四十丸以療年髙婦人白帶又良驗也請詳之四物湯加甘草半兩細末煉蜜為丸每兩八九丸酒醋共半盞煎湯同化調停下名當歸煎去敗血生好血如人行五里再進一丸無時候服一方銼散隨病證加減後藥煎服血氣不調加吳茱萸一兩甘草半兩補下元加乾薑半兩甘草七分血崩氣滯腹內刺痛炮附子一個赤石脂一兩便血及帶下加荆芥地椒血氣滯腹內刺痛加桂産後傷風頭痛加石膏一兩甘草半兩血風勞加荆芥柴胡潮熱加前胡子乾葛人參黃芩虛熱口乾加門冬半兩黃芩一兩嘔吐不止加藿香白术半兩人參一錢産後虛憊血熱煩悶加生地黃産後腹脹加枳殼肉桂各三錢産後惡露腹痛不止加桃仁蘇木牛膝産後寒熱往來加柴胡門冬各半兩經血淋漓不斷加乾瑞連房炒入藥血滯不通加紅花桃仁各一分産後悶亂加茯神逺志半兩虛而多汗加煆牡蠣麻黃粉各半兩妊娠心腹痛加竹茹一塊如有敗血則用當歸近上節白芍藥以赤易熟地黃以生者一方銼散每服四錢水一盞半煎至七分去滓食前熱服或為末服亦可若常服血氣不調平常服只用本方春加當歸夏加芍藥秋加川芎冬加地黃各一兩半日二三服妊娠作惡生寒面青不思飲食憔悴加陳枳殼白术茯苓甘草産後敗血築心地骨皮芍藥潮熱黃芩地骨皮柴胡咳嗽桑白皮半夏生薑人參甘草北五味子地骨皮損孕下血不止頭疼寒熱耳鳴氣血勞傷所致黃芩荆芥生地黃生薑赤芍藥虛寒潮熱柴胡地骨皮白术茯苓甘草秦艽知母黃芩麥芽貝母人參烏梅棗子心腹脹滿枳殼青皮虛汗麻黃根産後潮熱白术柴胡甘草牡丹皮地骨皮有熱黃芩汗浮麥腸風下血槐角槐花枳殼荆芥黃芩大腹皮紅內消地榆石楠皮白雞冠花為散煎一半為末空心鹽湯舊酒調下鼻衄吐紅竹青蒲黃藕節半夏丁香呵子桂花紅棗飛羅麵白茅根蚌粉奶癰連翹茨菰子紅內消白芷菰片荆芥牛膝山蜈蚣乳香沒藥漏蘆生地黃血風兩脅築心痛或盤腸成塊大黃蓽撥乳香動胎漏下不止黃蓍側柏阿膠甘草續斷平常經血淋漓不斷或多或少或赤或白非時漏下可多服有效月水不通野苧根牛膝紅花蘇木舊酒同煎臨産小腹緊痛紅花滑石甘草燈心葵子便閉枳殼大黃荆芥黃芩青皮滑石木通瞿麥海金砂山梔子車前子安胎及胎漏下血阿膠大艾甘草蒲黃炒過産後腹痛血塊攻腸大艾沒藥好酒産後病眼北細辛荆芥羌活甘草菊花木賊石決明草決明女人赤眼頭風疾薄荷清茶赤眼生風防風黃芩産後浮腫氣急腹大喉中水雞聲牡丹皮荆芥白术桑白皮赤小豆大腹皮杏仁半夏馬兜鈴生薑蔥白薄荷月水不調血崩或多少前後嘔逆心膨陳艾黃蓍血弱生風四肢痺痛行步艱難乳香人參沒藥射香甘草五露子羌活獨活防風荆芥地龍南星白附子澤蘭為末蜜丸木瓜鹽湯下血氣膨脹甘草木香枳殼馬兜鈴苧藶紫蘇藿香地黃空心服補血住崩百草霜敗棕灰苴綿灰蒲黃炒過龍骨白薑血成塊地黃藕節黑血片人參白术血片人參白术血片龍骨青黃木瓜五色生麝香好酒鮮紅溫酒鹽湯風瘡赤腫荆芥牛旁子何首烏甘草防風羌活鹽酒帶下肉桂蒲黃百草霜甘草黑豆白术玄胡索白薑龍骨空心鹽酒血寒甘草烏梅柴胡桃柳枝感風勞嗽欵冬花知母阿膠半夏麻黃甘草馬兜鈴黃芩杏仁柴胡殭蠶訶子烏梅月經久閉肉桂甘草黃蓍薑錢棗子木通紅花大便下血四肢寒膨脹及胃腸有風槐花枳殼漏蘆荆芥木香白雞冠花木通紅內消紫草石榴皮陳皮黃芩青皮甘草白茅根槐角虛㵼人參川芎白芷蒲黃炒阿膠白术茱萸續斷乾薑黑附子肉桂黃蓍赤帶白芷甘草蜜丸鹽梅湯下白帶用龍骨酒煎産後痢後風乳香龍骨茱萸木香肉桂蒼术牡丹皮白微人參甘草澤蘭大椒茴香煉蜜為丸木瓜酒下治帶下赤白痢陳米飲心腹膨炒薑酒血氣艾醋湯渾身勞倦為末炒薑陳青蒿鹽和調下虛證四肢黃甘草牡丹皮澤蘭白薇蒼术桂心茴香蜜丸鹽湯酒下嘔逆飲食不入加白术丁香甘草人參􅒦砂益智仁胡椒經行腹痛腰背痛藝薹牛膝紅花吳茱萸菴䕡甘草銀器燈心熱服虛渴人參甘葛烏梅瓜蔞根受胎小腸氣痛木香銀器胎前嗽枳殼甘草欵冬花知母馬兜鈴半夏木通苧藶人參苦參麥門冬腳腫大腹皮赤小豆茯苓皮生薑皮産後不語失音可子人參砂蜜百藥煎隂陽交合經脈行赤石脂黃蓍肉桂百草霜敗棕灰肉豆蔲當歸木香龍骨白术茯苓地榆藕節胎氣衝肝腰腳痺行步艱難枳殼甘草木通連翹荆芥地黃羌活獨活山梔子燈心空心服氣築小腹痛玄胡索煎服陳氏經驗方吳與周端仁郎中頃赴省試照矚一鄰云某本醫家凡婦人百病只以四物湯加茱萸無不效者産難及胎衣不下子死腹中入醋同煎凡用有效謹以此為報此藥不知起於何代或云自魏華他他之術精微方類單省傳稱他針灸不過數處千金方云自三代以來醫方藥論未有如此詳備其間有漢晉名公諸方金産寶方仍朱梁節度巡官咱膺所撰其中有四物散後修入聖惠方自後醫者易散為湯善用者若馭良馬當隨意無不得所至皆然名醫於四物中增損品味隨意虛實寒燠皆得其效者然亦非止婦人之疾可用而已交加散出大全良方治胎前産後百病婦人營衛不通經脈不調腹撮痛氣多血少結聚為瘕産後中風尤妙及肌體黃瘦氣短羸怯生地黃一斤研取自然汗生薑十二兩研取自然汁右將地黃汁炒生薑滓生薑汁炒地黃滓各稍乾焙為細末每服三錢溫酒調下尋常腹痛亦宜服産後尤不可缺一方或男女血熱心煩産後傷風以荆芥煎湯調下普濟方卷三百二十七
