血多凝滯是故百節經脈緊急腰背不能轉側手足不能動揺身熱若納炭頭如釘錠醫者不識妄為傷寒發汗變生他證宜服牛膝洗去蘆酒浸一宿急用酒蒸熟為度當歸酒浸去蘆白术防風去蘆獨活去蘆甘草各二兩半黄蓍一兩蜜炙右㕮咀每服半兩井水五盞生薑十片薤白一握同煎至三盞去滓不拘時服交感地黄煎丸出三因方治婦人產前産後眼見黒花或即發狂如見鬼狀胞衣不下失音不語心腹脹滿水穀不化口乾煩渇寒熱徃來口内生瘡咽中腫痛心忪悸夜不得眠産後中風角弓反張面赤牙闗緊急崩中下血如豚肝狀臍腹病痛血少結為癥瘕恍惚昏迷四肢腫滿産前胎不安産後血刺痛並皆治之生地黄淨洗研以布製汁留滓以生薑汁炒地黄滓以地黄汁炒生薑滓至乾甚為末為度生薑淨洗爛研以布製取自然汁留滓各二斤延胡索拌糯米炒赤去皮當歸去苗琥珀别研各一兩蒲黄炒香四兩右為末蜜丸彈子大當歸湯化下一丸食前服勝金丸一名勝金丹出大全良方治婦人久虚無子産前産後一切病患兼療男子下虛無力此藥能安胎催生妊娠臨月服五七丸産時減痛婦人無孕子宫冷如服二十丸可望孕育又治積年血風脚手麻痺半身不遂赤白帶血如山崩及治産後腹中結痛吐逆心痛子死腹中遶臍痛氣滿煩悶失葢汗不出月水不通四肢浮腫無力血勞虚勞小便不禁中風不語口噤產後痢疾消渇眼前見鬼迷暈敗血上衝寒熱頭痛面色痿黄淋瀝諸疾血下無度血痢不止飲食無味産後傷寒虚煩勞悶産後血癖産後羸痩凡婦人諸虚不足心腹疼痛一切諸疾不論年深日乆並皆治之一方名不換金丸白芍藥藁本石脂赤白皆可川芎不見火牡丹皮當歸白茯苓人參白薇白芷桂心延胡索白术米泔浸一宿各一兩沒藥甘草炙江西安撫司沒藥甘草減半右等分為末煉蜜丸如彈子大每服一丸温酒化下初産了並用熱醋湯下空心食前此方係王承宣息祖傳渠家凡婦懐身便服此藥神妙常服尤好係在京師於能家傳一方有沈香無沒藥一方有附子無沈香白术煎治胎前産後血氣諸疾木香五錢三稜莪术白术各一兩枳殻炒白茯苓當歸延胡索人參熟地黄洗牡丹皮甘草各半兩右為細末米糊丸如梧桐子大每服十五丸至二十丸常服温酒吞下胎前渾身并手脚痛炒薑酒下胎前腹内痛并安胎紫草煎湯下胎前嘔逆吐食糯米飲下胎前飲食不得渾身倦怠豆淋酒下胎前渾身發熱甘草湯下胎前咳嗽煨薑鹽湯下胎前頭痛煨葱茶下胎前産後㵼紫蘇薑酒下催生胎衣不下嚼葱白三寸煖酒下産後赤白痢乾薑甘草湯下産後下血不止燒紗㡌灰一錢調酒下無燒漆亦可産後渾身虛腫陳皮去白焙乾浸酒下頭疼薄荷茶下常服飯飲下赤白帶下燒㯶櫚灰三錢調酒下久年血氣陳塊築心痛温酒下炒薑酒下及良薑浸酒下皆可婦人室女經脈不通煎紅花蘇木酒下經脈不調或前或後或多或少煎當歸酒下大便小便秘結燈心湯下乳汁不通苦虀煮猪蹄羮下産後腰痛煎芍藥酒下保生丸養胎益氣安和子臟治姙娠將理失宜或因勞役胎動不安腰腹痛重肥阻漏胎惡露時下臟挾疾久不成胎或受姙不能固養痿燥不長過年不產日月雖滿轉動無力或致損墮及臨節適乖宜驚動太早産時未至惡露先下胎胞枯燥致令産難或横或逆痛極悶亂連日不産子死腹中手足氷冷口唇青黒吐出冷沫新産惡血上衝暈悶不省喘促汗出及瘀血未盡臍腹㽲痛寒熱往來或因産勞損虚羸未復面黄體痩心忪盜汗飲食不進漸成蓐勞入月常服壯氣養胎正順産理潤胎易産産後常服滋養血氣和調隂陽密腠裏實腑臟治風虚除痼冷一名千金丸大麻仁去皮一兩半貝母黄芩大豆黄卷糯米一作黍米甘草微炒赤細研乾薑炮肉桂去粗皮石斛去根石膏細研各一兩當歸去蘆炒半兩秦椒微炒汗出一兩右為細末煉蜜和丸如彈子大每服並用温酒或棗湯化下嚼亦得空心食前服一方用蒲黄一兩半夏丸治女人腹中十二疾一曰經水不時二曰經來如清水三曰經水不通四曰不周時五曰生不乳六曰絶無子七曰隂陽減少八曰腹苦疼如刺九曰隂中寒十曰子門相引痛十一曰經來凍如葵汁狀十二曰腰急痛凡此十二病得之時因與夫卧起月經不去或卧濕冷地及以冷水洗浴當時取快而後生百病或瘡痍未瘥便合隂陽及起早作勞衣單席薄寒從下生半夏赤石脂各一兩六銖蜀椒乾薑呉茱萸當歸桂心丹參白歛防風各一兩雚蘆半兩右為末蜜和丸如梧桐子大每日空心酒服三十丸不知稍加以知為度龍骨散治腹下十二病絶産一曰白帶二曰赤帶三曰經水不利四曰隂胎五曰子臟堅六曰臟癖七曰隂陽患痛八曰内强九曰腹痛十曰臟閉十一曰五臟酸痛十二曰夢與鬼交宜服之龍骨三兩黄蘗半夏竈中黄土桂心乾薑各二兩石韋滑石各一兩烏賊骨代赭各四兩白殭蠶五枚右治下篩酒服方寸匕日三白多者加烏賊骨殭蠶各二兩赤多者加代赭五兩小腹冷加黄蘗二兩子臟堅加乾薑桂心各二兩以上各隨病増之服藥三月有子即住藥太過多生兩子當審方取好藥寡婦童女不可妄服皺血丸治婦人血海虛冷百病變生氣血不調時發寒熱或下血過多或久閉不通崩中不止帶下赤白癥瘕癖塊攻刺疼痛小腹緊滿脇肋脹痛腰重脚弱面黄體虛飲食減少漸成勞狀及經脈不調胎氣多損産前産後一切病患無不治療菊花去梗茴香香附炒酒浸一宿乾地黄當歸肉桂去粗皮牛膝延胡索炒芍藥蒲黄蓬术各三兩右為末用烏豆一升醋煮候乾焙為末再入醋二碗煑至一碗留為糊丸如梧桐子大每服三十丸温酒或醋湯下血氣攻刺炒薑酒下癥瘕疼痛當歸湯下忌鴨肉羊血此藥煖子宫能令有子又治皺血損調補衝任温煖血海及胞