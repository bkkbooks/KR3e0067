body:
  text: 普濟方卷三百二十七明周王朱橚撰婦人諸疾門雜病附論夫三十六疾者十二癥九痛七害五傷三痼不通是也何謂十二癥是所下之物一曰收如膏二曰如黒血三曰如紫汁四曰如赤肉五曰如濃茄六曰如豆汁七曰如葵羮八曰如凝血九曰如青如血似水十曰如米汁十一曰如月浣乍前乍却十二曰經度不應期也何謂九痛一曰隂中痛傷二曰隂中淋瀝痛三曰小便即痛四曰寒冷痛五曰經來即腹中痛六曰氣滿痛七曰汁隂中如有蟲嚙痛八曰脇下分痛九曰腰胯痛何謂七害一曰竅孔痛不利二曰中寒熱痛三曰小腹急堅痛四曰臟不仁五曰子門不端引背痛六曰月浣乍多乍少七曰害吐何謂五傷一曰兩脇滿痛二曰心痛引脇三曰氣結不通四曰邪思洩利五曰前後痼寒何謂三痼一曰羸痩不生肌膚二曰絶産乳三曰經水閉塞病有異同具治之方儒門事親書云一富家婦人傷思慮過甚二年不寐無藥可療其夫求戴人治之戴人曰兩手脈俱緩此脾受之也脾主思故也乃與其夫以怒激之多取其財飲酒數日不處一法而去其人大怒汗出是夜困眠如此者八九日不寤自是而食進脈得其平矣又云項開令之妻病怒不欲食常好呌呼怒罵欲殺左右惡言不輟衆醫皆處藥幾半載尚爾其夫命戴人視之戴人曰此難以藥治乃使二娼各塗丹粉作伶人狀其婦大笑次日又令作角觝又大笑其旁常以兩個能食之婦誇其食美其婦亦索其食而為一嘗之不數日怒減食増不藥而瘥後得一子夫醫貴有才何足應變無窮又云李仲安宅四婦人病同日下涌劑置燠室中火兩盆其一婦發昏衆人皆驚戴人笑曰内火見外火故然舁之門外使飲氷雪水立醒時正雪晴戴人曰熱見寒則醒衆由是皆服非老手諳練必不能鎮衆庸人之驚也方熟乾地黄丸出簡易湯治婦人風虚勞冷一切諸疾或風寒邪氣留滯經絡氣血冷瀝不能溫潤肌膚或風寒客於腹内則脾胃冷弱不能尅消水穀或腸虚受冷大便時泄或子臟挾寒久不成胎月水不調乍多乍少或月前月後淋瀝不止或閉斷不通結聚癥瘕面色肌體減痩飲食進退百節酸疼時發寒熱漸至羸損帶漏五色隂中冷痛時發腫癢月水將行臍腹先痛皮膚皺澁癮疹瘙癢麻痺筋攣面生􅀈􅀈髪黄脱落目淚自出心忪目眩及産後勞損未復肌痩寒熱顔色枯黒飲食無味漸成蓐勞皆療之熟乾地黄二兩酒蒸晒過百遍者防風去蘆肉蓯蓉酒浸一宿白茯苓去皮禹餘糧火燒紅醋淬七遍細研五味子揀浄栢子仁微炒别研芎藭各一兩半澤蘭去梗二兩一分厚朴去粗皮薑汁炒白芷乾薑炮山藥細辛去苗卷栢去根各一兩當歸去蘆酒浸炒藁本去蘆炒甘草炙各一兩六分人參蜀椒去目及閉口者微炒出汗牛膝去苗酒浸一宿蛇床子揀淨微炒續斷蕪荑炒杜仲去粗皮炙黄各三分赤石脂煆醋石膏煆研飛各二兩艾葉三分石斛去根肉桂去粗皮白术各一兩一分紫石英煆醋淬研飛三兩右搗羅為末煉蜜和搗五七百杵丸如梧子大每服三十丸温酒或米飲下空心食前服常服養血補氣和順營衛充實肌膚調勻月水長駐顔除風去冷令人有子温平不熱無毒妊娠不宜服一方名大澤蘭丸治婦人虚損及中風除病疝瘕除中冷痛頭風入腦寒痺筋攣緩急血閉無子面上遊風去來目淚多出涕唾忽如醉或急邪冷逆胸中嘔不及泄痢淋瀝或五臟六腑寒熱不調心下􅂒急邪氣欬逆或漏下赤白隂中腫痛胸脇肢滿或身體皮膚中澁如麻豆苦癢痰癖結氣或四肢拘攣風行周身骨節疼痛目眩無所見或上氣惡氣寒洒浙如瘧或喉鼻齆風癎癲疾或月水不通魂魄不寕飲食無味并産後内䘐無所不治服之令人有子久赤白痢去訖地黄石膏麥門冬栢子仁加大麥蘗神麴龍骨阿膠黄連各一兩半有鍾乳加三兩良濟隂丹三稜二兩莪术一兩切片煨蒼术泔浸去皮枳殻去穰大艾去根劉寄奴香附子淨敗薑各一兩半烏頭三合以上九味用米醋三升煮乾取出焙乾為末當歸一兩半蒲黄一兩隔紙焙生地黄酒浸熟地黄酒蒸各七錢半橘皮去白細紅者佳白芍藥各一兩半𤣥胡索炒五靈脂酒煮白术煨各半兩牡丹皮浄去骨肉桂去粗皮赤芍藥片子薑黄青皮去白各一兩川芎七錢半右為末糯米粉穀醋打糊為丸沈香湯下蘇湯鹽湯亦可大聖散出和劑治婦人血海虛冷久無子息及産後敗血衝心中風口噤子死腹中擘開口灌藥須臾生下便得無恙治墮胎中攻刺疼痛横生逆産胞衣不下血癖血滯血崩血入四肢應血臟有患及諸腫風氣或傷寒吐逆欬嗽寒熱往來遍身生瘡頭痛惡心經脈不調赤白帶下乳生惡氣胎臟虛冷數曽墮胎崩中不定因此成疾室女經脈不通並宜服之常服煖子宫和血氣悅顔色退風冷消除萬病兼療丈夫五勞七傷虛損等病澤蘭葉石膏研各兩卷栢去根白茯苓去皮防風去蘆厚朴去粗皮黄汁炙細辛去苗栢子仁微炒呉茱萸湯浸七次焙乾炒桔梗各一兩五味子㨂淨人參藁本去苗乾薑炮白芷川椒去目閉口者微炒出汗白术黄蓍去苗川烏炮去皮臍丹參各三兩蕪荑微炒赤甘草炙川芎芍藥當歸各一兩三分白薇阿膠碎炒燥各半兩肉桂一兩一分生乾地黄一兩半右為細末每服二錢空心臨卧熱酒調下苦急疾有患不拘時日三服効金釵煎出大全良方專治婦人諸疾産前後風虚痼冷手足􅂒痺豆淋酒化下血風頭痛産後中風荆芥酒化下産後痰涎咳嗽桑白皮湯化下經脈不調或前或後或多或少血氣攻刺腰脇重痛温酒化下經脉不通産後血喘蘇木人參煎湯化下血崩不止赤白帶下側栢燒灰調酒下妊娠將理失宜或因驚動痛極妨悶漏胎下血膠艾煎湯化下臨産艱難乳香研酒化下子死腹中胎衣不下用朴硝三錢重研細童便和酒化下産後勞倦傷敗氣血如瘧寒熱遍身疼痛咳嗽湓汗地黄烏梅煎湯化下産後敗血浮腫薑汁少許和酒半盞化下産前服之則安胎臨産亦易産産後則逐去惡血不生諸疾用童便和酒調下常服活血駐顔大煖血海升降隂陽滋養營衛或子宫久冷多病少子急令服之竒効立致忌生冷油膩魚腥猪母白猪一切毒物當歸白芍藥川芎石斛酒炒香附子炒糯米各二兩炒降真香細剉熟地黄各四兩秦芄貝母去心羌活桂心粉草乾薑炮北細辛牡丹皮大豆卷炮茴香炒枳殻去穰麩炒延胡索白芷各一兩人參木香石膏煆沈香黄芩各半兩川椒三分交加修製八兩交加即用生地黄四兩絞汁留滓以生薑四兩取汁留滓用生地黄汁拌生薑滓乾生炒乾生薑汁拌生地黄滓炒乾為末用右為細末煉蜜為丸每兩作七丸依前服餌常服溫酒化下荆芥散治血風諸般疾産後並宜服諸疾除去荆芥雀腦芎各三兩當歸人參各半兩桂心牡丹皮羌活防風桔梗大腹皮甘草蒲黄白茯苓枳殻厚朴半夏杏仁欵冬花各三分附子炮乾地黄鱉甲白芍藥北柴胡黄茋各一兩乾薑木香各半分沈香一分右為細末每服二錢薑三片棗一箇水一盞煎至七分温服南嶽魏夫人濟隂丹出三因方治婦人血氣久冷無子及數經墮胎皆因衝任之脈虚損胞内宿挾疾病經水不時暴下不止月内再行或前或後或崩中漏下三十六疾積聚癥瘕臍下冷痛小便白濁以上疾證皆令孕育不成以致絶嗣此藥治産後百病若能常服除宿血生新血令人有孕亦生子充實亦治男子亡血諸疾桃仁去皮尖仁麩炒木香炮茯苓京墨燒各一兩蠶布燒藁本秦艽甘草人參桔梗炒石斛酒浸各二兩當歸桂心乾薑細辛牡丹皮去心川芎各半兩川椒去目閉口炒出汗山藥各三兩澤蘭葉熟地黄洗酒蒸焙香附子炒各四兩蒼术米泔浸去皮大豆卷炒各半升糯米炒一升右為細末煉蜜丸每兩作六丸每服一丸細嚼温酒送下淡醋湯調亦可空心食前服一本山藥川椒各三兩妙應丹一名延齡丹出三因方治婦人衆病無所不治晩蠶沙炒鯉魚鱗燒為末當歸去蘆石膏煅研澤蘭去根附子炮去皮臍木香炮各二兩熟乾地黄洗酒浸蒸焙川芎防風去蘆蕪荑炒馬牙硝炒人參黄蓍川椒微炒栢子仁微炒别研蟬蜕去足洗焙白薇㯽榔不見火各一兩厚朴去粗皮薑製藁本去苗白薑炮甘草炙赤各三兩紅花炒呉茱萸湯浸各半兩右為末煉蜜搜和杵數千下丸如彈子大每服一丸血瘕塊病綿灰酒下催生温酒嚼細下血勞血虛桔梗酒下血崩棕櫚灰酒下血氣痛炒白薑酒下血風荆芥酒下血暈悶絶胎死腹中胞衣不下並用生地黄汁童便酒各一盞煎二服下常腹痛醋湯温酒化下並空心食服地黄粥方治婦人血氣不調生地黄二合汁粟米一合粳米一合鹽花少許訶梨勒炮去核為末半兩右以水三升先煮二米將熟次入訶梨勒末地黄汁鹽花攬勻煮令稀稠得所分二服趂痛丸出豈明論方治一切走注疼痛婦人經脈住滯水腫腹脹甘遂大㦸芫花黄牽牛各等分右為末以蕎麫同末和作餅子切為棊子煮熟服之得利為度每服一錢加減相虚實烏雞煎丸一名大烏雞丸出和劑方治婦人胎前産後諸般疾患並皆治之烏雄雞一箇烏藥石床牡丹皮人參去蘆白术黄蓍各一兩蒼术米泔浸切焙一兩半海桐皮二兩肉桂去粗皮附子炮去皮臍白芍藥蓬莪术川烏炮熟乾地黄洗焙肉豆蔲草菓各半兩紅花陳皮各二兩延胡索木香琥珀右細剉用烏雄雞一隻湯撏去毛及腸肚將上件藥安放雞肚中用新甆缾好酒一斗同煮令乾去雞骨以油單盛焙乾為末煉蜜為丸如梧桐子大每服三十丸胎前産後傷寒蜜糖酒下胎前氣悶壯熱炒薑酒下白帶赤帶下生薑地黄酒下産後敗血注心童子小便炒薑酒吞下産後血塊瘨築心腹疼痛𤣥胡索酒下胎前嘔逆薑湯下催生炒蜀葵子酒下安胎鹽酒下室女經脈當通不通四肢疼痛煎紅花酒下血氣攻刺心腹疼痛煎當歸酒下血暈棕櫚燒灰酒調吞下血邪研硃砂麝香酒下血悶煎烏梅湯研硃砂下子宫久冷温酒或棗湯下空腹日一服血風勞人參酒吞下小腹疼痛炒茴香鹽酒吞下血散四肢遍身虚浮黄腫赤小豆酒下常服温酒醋湯任下空心食前服白堊龍骨芍藥各十八銖黄連當歸茯苓黄芩瞿麥白蘝石韋甘草牡蠣細辛附子禹餘糧藁本白石脂人參烏賊骨甘皮大黄已上各半兩右為末蜜和丸如梧子大空腹飲服十丸日再不知加至二十日至一月百病除若十二癥倍牡蠣禹餘糧烏賊骨白石脂龍骨若凡痛倍黄連白歛甘草當歸若七害倍細辛藁本甘皮加川椒茱萸各一兩若五傷倍大黄石韋瞿麥若三痼倍人參加赤石脂礬石巴㦸天各半兩合藥時隨病增減之小白薇丸出和劑方治女人衝任虛損子臟受寒久無子息及斷續不産此因上熱下冷百病滋生或月水崩下帶漏五色腰腹疼重面黄肌痩或因産乳不能將䕶露厠太早或久坐濕地或冷風從下入血臟既虛或邪内乘或月水當行失於調攝傷動胞絡隂陽不和上焦虚陽壅燥下臟邪冷結伏致使胎孕不成冷極傷敗月水不勻飲食減少夜多盜汗面䵟􅀈齒揺髪落脚膝疼痛舉動少力並宜服之覆盆子去根菖蒲微炒各三分白龍骨熟地黄川椒去目及閉口者微炒去汗各一兩白薇去苗一兩蛇床子炒乾薑炮細辛去苗當歸去蘆炒車前子芎藭各半兩逺志去心桃仁去皮尖麵炒黄白茯苓去皮藁本去苗人參卷栢去根白芷肉桂去粗皮各三分麥門冬去心焙一兩半右為細末煉蜜和丸如梧桐子大每服三十丸温酒或米飲下空心食前常服壯筋骨益氣煖下臟除風冷令有子白堊丹出和劑方治婦人三十六病崩中漏下身痩手足熱惡風怯寒咳逆煩滿抑急短氣心脇腰腹重墜與子臟相引痛漏下五色心常恐懼遇恚怒憂勞即發皆是内傷所致並皆治之牡蠣煅研白堊細辛去苗禹餘