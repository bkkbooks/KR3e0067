土水和塗臍乾復塗之一方酒和塗之又方泔清和塗之並佳又方取犬尿泥塗腹勿令乾療妊娠傷寒以鯉魚一頭燒末酒服方寸匕令汗出兼治乳無汗又云鯽魚治雙身婦人傷寒時行溫疫頭痛身熱用升麻散一兩水半碗大作劑料去滓分作二服先一服吐下後一服勿吐次以長流水加生薑棗煎五苓散熱啜之汗盡頭痛立止護胎白子散治妊娠傷寒用白藥子不拘多少為末用雞子清調塗在紙上紙可碗口大貼之臍下胎存處乾即以溫水潤之治妊娠傷寒身體壯熱增寒嘔逆四肢微冷頭痛腳疼心腹有氣至三日內未差者宜服此方右取生薑一分研濕紙褁燒熟酒調下後喫粥飲投之汗出為效治婦人妊娠傷寒畜血出拔萃方詩云婦人妊娠或畜血抵當桃仁勿妄施要教子母俱無損大黃四物對服之治婦人傷寒妊娠服藥例出拔萃方若發熱惡寒不離桂枝芍藥若往來寒熱者不離柴胡前胡若火渴者不離知母石膏五味子麥門冬若大便泄者不離桂附白术乾薑若大便燥結者不離大黃黃芩若經水適來適未斷者不離小柴胡若安胎者不離人參阿膠白术黃芩若發汗者不離蔥䜴生薑麻黃旋覆若頭痛者不離前胡石膏梔子若傷暑頭痛者不離前胡石膏甘草若滿悶者不離枳實陳皮若胎不安者不離黃芩麥門冬人參若斑黑者不離黃芩梔子升麻梔子大清湯療妊娠婦人七月傷寒壯熱赤斑變為黑斑溺血升麻梔子大青杏仁黃芩各三兩蔥白切一升右六味切以水六升煮取半分三服梔子五物散廣濟療妊娠傷寒頭痛壯熱梔子前胡知母各三兩黃芩一兩白石膏四兩右銼如麻豆大每服五錢水一小盞半煎至一盞溫服治妊娠後忽傷寒頭痛壯熱渾身百節俱痛心中煩躁方石膏山梔知母黃芩桔梗杏仁前胡葛根升麻各五錢大黃炮一分右細杵羅為末每服三錢或四錢以水一盞一分生薑三片䓤白三枝同煎取九分食後臨臥時徐徐去滓服病效即住治妊娠後頭痛傷寒大小腑祕熱身上發斑心中煩燥昏悶不安黃芩大黃山梔升麻防風麥門冬前胡杏仁桔梗郁李仁獨活大青各等分右細杵羅為末每服三錢水一盞二分煎取一盞食後去滓服黃耆解肌散治婦人妊娠傷風自汗人參黃耆當歸川芎炙甘草各五分芍藥加蒼术生地黃亦可右為粗末每服五錢水煎溫服無時治妊娠大腑寒溫不等或祕或㵼腹中氣滯飲食加少心頭妨滿兩脅脹迸四體不安桑寄生黃橘皮大腹皮枳殼青人參桔梗剝木川芎各一分藿香三錢右細杵羅為末每服二錢水一盞煎取一分食後去滓服妊娠傷寒仲景無治法用藥宜有避忌不可與尋常婦人一槩治之也類證活人詩云因熱生風以四物湯加川芎一分柴胡半兩身熱麻躁頭昏項強加柴胡黃芩各二兩祕澀加大黃半兩桃仁一分炒滑㵼加桂附各一分發寒熱加乾薑牡丹皮芍藥各一分煩噪大渴加知母石膏各半兩嘔加白术人參各半兩腹脹加厚朴枳實各一分虛煩不得眠加竹葉人參各一分水停心下微吐逆加豬芩防己各一分虛寒壯熱類傷寒加人參柴胡防風各三分其説如此更宜審詳如附子肉桂大黃桃仁尤不可輕用普濟方卷三百三十九
