body:
  text: 普濟方卷三百三十九明周王朱橚撰妊娠諸疾門中風附論夫四時八方之氣為風也常以冬至之日候之若從其鄉來者長養萬物若不從其鄉來者多為虛邪賊害萬物人體虛則中之若邪風客於皮膚入于經絡即頑痺不仁若入于筋脈挾寒則攣急喎劈挾溫則弛縱若入臟腑則恍惚驚悸凡五臟俞皆在背臟腑虛風邪皆從俞而入隨所傷臟腑經絡而為諸病也妊娠中風若不早治則令墮胎也夫妊娠體虛受風而傷太陽之經絡後復遇風寒相搏發則口禁背強名之曰痙又云痓其候昏悶不識人須臾自醒良久復作謂之風痙亦名子癎亦名子冒甚則反張葛根湯若有竹近可速辦者當先作瀝汁次辦湯也其竹逺不可即辦者當先辦湯此二療會得其一種其竹瀝偏主諸痙絶起死也非但偏療妊娠産婦絶死者有效小兒或癎痙金瘡發痙療之亦驗方赤箭丸出聖惠方治妊娠中風手足不遂筋脈緣急言語謇澀皮膚不仁赤箭萆薢麻黃去根節獨活羚羊角屑鼠黏子熟乾地黃已上各一兩防風去蘆頭芎藭當歸銼微炒薏以仁阿膠搗碎炒令黃燥五加皮秦艽去苖漢防己柏子仁酸棗仁丹參已上各三分右搗細羅為末煉蜜和搗三五百杵丸如梧桐子大每服食前以豆淋酒下二十丸烏犀丸出聖惠方治妊娠中風口面喎僻言語謇澀身體強直或時反張烏犀角屑赤箭麻黃去根節酸棗仁微炒阿膠搗碎炒令黃燥已上各一兩天南星炮製漢防己各半兩秦艽去苖獨活羚羊角屑防風去蘆頭白附子炮製白殭蠶微炒芎藭當歸銼微炒桑寄生已上各三分龍腦一分研入右搗細羅為末入研了藥令勻煉蜜和搗三五百杵丸如梧桐子大不計時候以薄荷酒下二十丸桑枝煎丸治妊娠中風手足緩弱口面喎斜言語謇澀枝節疼痛桑枝槐枝栁枝已上各一斤細銼黑豆一升淘洗過天蓼术半斤挫已上藥以水二斗煎至五升濾去滓入酒一升更熬令如稀天麻二兩獨活海桐皮萆薢芎藭防風去蘆頭五加皮酸棗仁微炒薏苡仁桂心已上各一兩生乾地黃一兩半右搗細羅為末入前煎中去滓更少入煉蜜和搗三五百杵丸如梧桐子大每服食前以溫酒下二十丸生地黃煎出聖惠方治妊娠中風筋脈攣急口眼喎斜皮膚頑麻言語常澀生地黃五斤搗絞取汁黑豆一升以水四升煮取一升半去豆大甜石榴五顆搗絞取汁枸杞根一斤細銼入水一中盞搗絞取汁荆瀝半升桑根白皮一斤細銼入水一中盞搗絞取汁竹瀝半升白蜜五兩已上諸藥汁相和於銀石鍋中慢火熬如稀餳入後藥末羚羊角屑天門冬去心焙天麻酸棗仁微炒當歸銼微炒羌活薏苡仁蠶沙微炒已上各一兩右搗細羅為末研令細入前煎中攪令勻瓷器中盛每服不計時候以溫酒調下一大匙頭鐵精丸出聖惠方治妊娠中風心神恍惚狂言亂語驚悸煩亂不得睡臥鐵精細研龍齒細研犀角屑茯神生乾地黃已上各一兩天竹黃人參去蘆頭逺志防風去蘆頭菖蒲白蘚皮已上各三分麥門冬一兩半去心焙金薄二十一片研入銀薄二十一片研入龍腦半分研入右搗細羅為末入研了藥令勻煉蜜和搗三二百杵丸如桐子大每服不計時候以竹葉湯放冷下二十丸茯神散出聖惠方治妊娠中風心神恍惚驚悸胎動不安言語失次四肢抽掣茯神麥門冬去心龍齒石膏已上各一兩人參去蘆頭防風去蘆頭生乾地黃桑寄生已上各三分獨活犀角屑鈎藤白蘚皮逺志去心甘草已上各半兩炙微赤銼右搗篩為散每服四錢以金銀水一中盞煎至六分去滓不計時候溫服獨活散治妊娠因洗頭中風身體強硬牙關緊急失音不語獨活赤箭麻黃去根節阿膠各一兩搗碎炒黃燥烏犀角屑羌活防風去蘆頭龍腦一分研入天蓼木白附子已上各三兩右搗細羅為散入研了藥令勻每服不計時候以薄荷湯調下二錢烏犀角丸治妊娠中風口面喎僻言語謇澀身體拘急烏犀角屑防風去蘆頭天蓼木羌活獨活羚羊角屑赤箭芎藭天門冬去心焙阿膠搗碎炒令黃燥大麻仁已上各一兩麻黃一兩半去根節秦艽去苗桑寄生各三分右搗細羅為末煉蜜和搗三二百杵丸如梧桐子大每服食前以薄荷湯下三十丸酸石榴煎出聖惠方治妊娠中風口眼不正言語謇澀手足不遂酸石榴十顆并皮細切研絞更入水一中盞再絞取汁去滓鵝梨十顆搗絞取汁荆芥五兩細銼入水一中盞研絞取汁薄荷五兩細銼入水一中盞研絞取汁牛旁根半斤淨洗切研絞取汁竹瀝一中盞生地黃汁一中盞白蜜三兩已上諸藥汁相和於銀石鍋中慢火熬如餳入後藥末赤箭二兩獨活羚羊角屑防風去蘆頭桑寄生阿膠已上各一兩搗碎炒令黃燥右搗細羅為末研令細入前煎中攪令勻瓷器中盛每服不計時候以溫酒調下一大匙頭葛根湯一名漢防己湯療妊娠臨月因發風痙忽悶憒不識人吐逆眩倒小醒復發名為子癎葛根貝母去心牡丹皮去心木防己防風當歸川芎白茯苓桂心熬澤㵼甘草各二兩獨活石膏碎人參各三兩右細切以水九升煮取三升分二服貝母令人易産若未臨月者升麻代之忌海藻菘菜酢物若有竹瀝先作汁次辦湯竹逺則先服此湯竹瀝偏療諸痙起死非但偏治妊娠産婦絶死者小兒或癎痙金瘡發痙治亦效天麻散出聖惠方治妊娠中風牙關緊急身體強直言語不得痰涎壅滯心胸煩悶天麻獨活麻黃各一兩去根節白殭蠶微炒白附子炮製羚羊角屑防風去蘆頭阿膠各三分搗碎炒黃燥半夏湯洗七遍去滑生薑半兩去皮同搗炒令乾犀角屑甘草各半兩炙微赤銼龍腦半分研入右搗細羅為散入研了藥令勻每服不計時候以竹瀝調下一錢防風散出大全良方治妊娠中風卒倒心神悶亂口禁不能言四肢強急此藥主之防風桑寄生葛根各一兩菊花防己北細辛秦艽當歸桂心茯神甘草羚羊角屑各半兩右為粗末每服四錢水一中盞薑三片煎至六分去滓入竹瀝半合溫服麻黃散一名獨活防風湯出大全良方治妊娠中風角弓反張口噤語澀謂之風痙亦名子癎麻黃去節防風獨活各一兩羚羊角屑桂心升麻酸棗仁炒甘草秦艽各半兩川芎當歸杏仁製各三分右㕮咀每服四錢水一盞薑四片煎至六分去滓入竹瀝半合溫服羚羊角散出永類鈴方治妊娠中風頭項強直筋脈攣急言語謇澀痰涎不消或發搐不省人事名曰子癎亦宜服之羚羊角鎊川獨活去蘆酸棗仁炒去壳五加皮去木各半錢薏苡仁炒防風去蘆當歸去蘆酒浸川芎茯神去木杏仁去皮尖各四分木香不見火甘草炙各二分半右㕮咀每服四錢水一盞生薑五片煎至七分去滓溫服不計時候芎藭散治妊娠中風四肢腰背強直言語謇澀心神煩悶芎藭防風各一兩去蘆犀角屑葛根獨活漢防己赤箭羚羊角屑甘草各半兩炙微赤銼生乾地黃麻黃去根節杏仁各三分湯浸去皮尖雙人麩炒微黃右搗篩為散每服四錢水一盞入生薑半分煎至六分入竹瀝半合不計時候溫服羚羊角散治妊娠中風頭項強直筋脈攣急手足不隨言語謇澀痰涎不消或時發搐不省人事名曰子癎羚羊角屑獨活酸棗仁各一兩薏苡仁防風去蘆頭五加皮當歸銼微炒芎藭萆薢海桐皮已上各三分蔓荆子甘草各半兩炙微赤銼右搗篩為散每服四錢水一盞入生薑半分煎至六分去滓不計時候溫服一方無甘草生犀角散治妊娠中風不語四肢強直心神昏昧宜服生犀角屑麻黃各一兩去根節防風去蘆頭赤箭羌活當歸銼微炒人參去蘆頭葛根赤芍藥已上各三分秦艽去苗甘草各半兩炙微赤銼石膏右搗篩為散每服四錢水一盞煎至六分去滓入竹瀝半合不計時候溫服烏金煎治妊娠中風語澀頭疼心神煩悶胎動不安黑豆一升淘洗令淨獨活羚羊角屑防風去蘆頭茯神牡荆子牛旁根桑椹桑寄生薄荷荆芥已上各一兩生乾地黃右搗篩以水一斗五升煎至五升去滓入白蜜三兩竹瀝半升更熬令如稠餳瓷器中盛每服不計時候以金銀溫湯調下一大匙頭獨活散治妊娠中風腰背強直或時反張名為風痙獨活防風去蘆頭赤箭麻黃各一兩去根節葛根銼芎藭秦艽去苗五加皮甘草各半兩炙微赤銼羚羊角屑當歸酸棗仁各三分微炒右搗篩為散每服四錢水一盞入生薑半分煎至六分去滓不計時候溫服天麻散治妊娠中風痙身體強直或時反張口噤失音天麻一兩天南星炮製獨活防風去蘆頭芎藭酸棗仁微炒白附子炮製羚羊角屑各半兩犀角屑阿膠搗碎炒令黃燥麻黃各三分去根節龍腦一分研入右搗細羅為散入研了藥令勻每服不計時候以竹瀝調下一錢木防己散治妊娠中風口眼不正手足頑痺防風羌活防己各一兩麻黃半兩去節桂心半兩黃松木節一兩荆芥穗羚羊角屑甘草桑寄生薏苡仁各半兩右㕮咀每服三錢水一盞生薑半分煎至七分去滓溫服防風散治妊娠中風腰背強直時復反張名為風痙防風葛根川芎生乾地黃各三兩杏仁製麻黃去節各一兩半桂心獨活甘草防己各一兩右㕮咀每服四錢水一盞煎至七分去滓溫服白薑蠶散治妊娠中風口噤心膈痰涎壅滯言語不得四肢強直白殭蠶微炒天麻獨活各一兩烏犀角屑三分白附子炮製半夏湯洗十遍去滑以生薑半兩去皮同搗爛焙乾藿香龍腦一錢研入天南星各半兩炮製麻黃一兩半去根節右搗細羅為散入研了藥令勻每服不計時候以生薑薄荷湯調下一錢羌活散治妊娠中風痙口噤憒悶不能言身體強直或時反張羌活防風去蘆頭芎藭葛根銼秦艽各三分去苗麻黃三兩去根節杏仁一兩半湯浸去皮尖雙人麩炒微黃犀角屑甘草各半兩炙微赤銼右㨶粗羅為散每服四錢水一盞入生薑半分煎至六分去滓不計時候溫服梨汁飲子治妊娠中風失音不語心神冒悶梨汁二合竹瀝二合生地黃汁二合牛乳一合白蜜半合右件藥相和令勻每服飲一小盞荆瀝飲子治妊娠中風語澀舌不轉心煩悶荆瀝二合生葛根汁二合竹瀝三合白蜜半合右件藥相和令勻煎一沸每服溫飲一小盞獨活飲子治妊娠中風口面喎斜語澀舌不轉獨活一兩銼竹瀝二合生地黃汁二合右件藥先以水一大盞煎獨活至六分去滓下竹瀝地黃汁攪勻更煎一沸分溫二服阿膠飲子治妊娠中風語澀心煩項強背拘急眼澀頭疼昏昏多睡阿膠半兩搗碎炒令黃燥竹瀝五合荆瀝三合右件藥相和令勻每服溫飲一小盞荆瀝飲子治妊娠中風痙口噤荆瀝三合竹瀝五合梨汁三合右件藥相和令勻分溫兩度灌之竹瀝飲子治妊娠中風痙口噤煩悶竹瀝五合人參二合陳醬汁半合右件藥相和溫分二服拗開口灌之白术酒治妊娠中風口噤語言不得白术一兩半獨活一兩黑豆一合炒右細銼以酒三升煎取一升半去滓溫分四服口噤者拗開灌之得汗即愈一方無黑豆亦治通身冷直一方有防風防風湯治妊娠中風口噤四肢強直反張一名羌活酒防風五分羌活一錢半右為細末以黑豆一合炒燋火煙出投無灰酒候沸定以酒調藥斡開口灌下稍蘇再灌却與治剛柔二痙藥速救省人事治妊娠因感外風如中風狀不省人急用熟艾三兩以米醋炒令極熱乘熱以絹帛褁尉向臍下良久開省治妊娠中風寒熱腹中絞痛不可針灸方亦療妊娠時行傷寒急用鯽魚一頭燒作灰搗末酒服方寸匕取汗一方有用乾魚一枚燒灰酒服不用鯽魚作竹瀝法右取新伐青淡竹斷之除兩頭節留中央一節作片以磚並側令竹兩頭虛布列其上燒中央兩頭汁出以器承之取服治妊娠忽如中風心前昏悶却如有一塊物上塞咽喉便昏迷不識人事宜服此方大腑虛冷喫食減少即不宜服麥門冬去心防風沉香藿香桑寄生川芎各一分半夏二銖右細杵羅為末每服二錢水一盞煎取