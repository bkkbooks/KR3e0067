舌上黒有數孔血出如涌泉此藏病也戎鹽黄芩黄蘖大黄各四兩人參桂心各二兩甘草一兩炙右為末鍊蜜和丸如梧桐子大飲服十丸日服三仍燒鐡烙之烏魚散出仁存方治重舌烏魚骨一兩燒灰乾蜣蜋半兩蒲黄半兩研枯白礬一分研右研為末每服半錢以鷄子黄調塗舌上嚥津無妨川硝散出仁存方治重舌及木舌川朴硝半兩真紫雪一分鹽半分右研細每服半錢入竹瀝三兩㸃白湯調塗舌上嚥津一方治木舌并水調𫝊之三物備急丸治心脾經為時邪所客重舌腫脹語聲不出水飲不下大黄剉炒乾薑炮巴豆去皮心膜各等分右為末蜜丸如菉豆大每服五丸温水下大便利為度蒲黄散出聖惠方治小兒重舌口中生瘡涎出蒲黄露蜂房各一分白魚燒灰一錢右研令勻用酒少許調𫝊重舌上日三秘錄方出陽氏寶書治重舌宜用海螵蛸燒灰以鷄子清傅患處一方用黄一方生用亦可及治小兒鵝口不乳治重舌木舌先用新水擦口并舌上下後用皂角刺燒灰入腦子少許每用半字糝舌上下出涎定消立効治重舌出湯氏寶書用竹瀝浸黄栢㸃之燄硝亦好又方煮小豆汁和鹿角灰安重舌下日三度桂礬方治小兒重舌口中生瘡涎出方見口瘡等疾類治小兒重舌方用桂心半兩為末以薑汁相和令匀每用少許塗舌下再塗之治重舌舌强不能收唾用鹿角末如豆大許安舌下一日三四度亦治小兒不能乳飲一方用水磨鹿角服之如小兒鵝口重舌令炙熨之治小兒重舌取衣魚塗舌上燒灰塗之亦可又方取竈門下黄土末以苦酒和塗舌上愈又方取三家猪肉切令如指大摩舌上兒立能啼又方出聖惠方取赤小豆為末醋和調舌上又方出聖惠方燒簸箕灰𫝊舌上一方用簸箕尖蒲黄散出簡易方治重舌夜啼用真蒲黄傅上不過三四次即愈更以温水蘸熱帛褁指輕輕按掠之然後糝藥一方用真蒲黄炒過出火毒用之治小兒重舌欲死者出聖惠方用亂頭髮不以多少燒灰細研末每用半錢𫝊舌下日數用之妙治小兒生重舌用白芨末以乳汁調𫝊小兒脚心治重舌鵝口用馬牙硝𫝊之日三度蛇蛻散出聖惠方治小兒重舌及重腭重齗腫痛用樵炙蛇蛻研末日𫝊三次舌下一度着一豆許一方用醇醋㸃掠舌下愈一方用唾和塗舌上治小兒重舌出聖惠方燒蜣蜋末和唾𫝊舌上又方用黄丹如豆大内管中以安舌下又方用木蘭皮一尺廣四寸削去麄皮用醋一升漬出汁注于重舌上又方出肘後方用粟米嚼哺之療小兒䑛方用狸骨燒灰和臘月猪脂塗上治小兒重舌小兒重舌聽行藏中鎖尋來是仙方火内燒灰為細末水調喫下便安康治小兒重舌及口中生瘡涎出方出聖惠方取白羊尿塗少許口中瘥治小兒重舌重腫方出聖惠方取牯牛乳與少許飲之治小兒重舌出聖惠方用甑帶燒灰細研𫝊舌下治小兒重舌欲死者方出聖惠方用桑根白皮一兩細剉以水一大盞煎至五分去滓漸漸以匙子抄手許令兒吮之一方取桑根白皮汁塗口中瘥治舌卒腫如吹胞滿口溢出氣息不得通須臾不治殺人㓜㓜新書以苦酒一升煑半夏一十枚令得八合稍稍含嗽吐之宜熱洗去滑用之勿嚥其汁一方加生薑一兩尤妙地黄湯治小兒舌胎舌黄舌出血舌腫舌裂舌芒刺舌卷舌黑舌赤并理諸舌病黄芩生地黄等分右㕮咀三歳一大錢水半盞煎三分去滓一方加赤芍藥甘草如舌乾燥者調胃承氣湯并人參白虎湯治舌腫强滿宜滿口含糖醋甚良又方飲羖羊乳即瘥治舌卒腫起如吹胞狀滿口塞喉氣息欲不復須臾不治殺人者方以刀鋒决兩邊第一大脉出血勿使刺着舌下中央脉血出不止殺人血出數升以燒鉄令赤熨瘡數過止血一方用針刺去惡血即愈又方含甘草汁佳治舌卒腫如吹胞滿口溢出氣息不得通須臾不治殺人急以指刮破漬去汁即愈亦可以鈹刀于前决破之一云兩邊破之尤妙治舌腫以百草霜研細醋調成膏舌上下𫝊之以針决出血𫝊之彌佳一方舌卒腫加鹽和塗舌上下並瘥一方治腫舌水調塗舌下升麻煎治心藏熱舌上生瘡裂破引唇赤蜀升麻射干各三兩栢葉切一升大青二兩苦竹葉切地黄汁各五合生蘆根薔薇根白皮各五兩生𤣥參三合赤蜜八合右㕮咀以水四升煑取一升去滓下𤣥參汁令兩沸次下地黄汁兩沸次下蜜煎取一升七合綿惹取汁安舌上含細細嚥之𫝊涎膏治小兒新生三五日爛舌上白瘡喫奶啼呌黄丹一分輕粉一錢蜜少許右同匀以飯上蒸一度鵝毛掃入口舌上一二次安治小兒舌上瘡取蜂房燒灰屋間塵各等分和匀𫝊之又方取羊蹄骨中生髓和胡粉𫝊之妙治小兒重舌瘡飲乳不得以白礬和雞子置醋中塗足底二七即愈治大人小兒口舌生瘡龍腦半分寒水石半兩燒細研右每糝于舌上少許治小兒舌上瘡取胡粉末并猪􅀈骨中髓𫝊之日三度治小兒舌上白羔瘡用草鵝屎取汁調沙糖服之如鵝喫糓者不用治小兒舌瘡方見本門口瘡等疾類治口吻瘡方下又方同治小兒舌上生瘡如粥及重舌并口中生瘡涎出方三項用桑白皮不以多少擣取汁𫝊之三兩度一方塗乳與兒飲之亦可治小兒撮口但看舌有瘡如粟大者為驗用蜈蚣汁刮破指甲研兩頭内差如無生者乾者亦得治新生小兒未滿月及百日舌生瘡口中白膏厚如紙者並宜治之以柸子臙脂少許兒病用女乳汁女病用兒乳汁同調塗舌上一宿効牛黄散治小兒重腭重斷腫痛口中涎出一名聖㪚牛黄龍腦丹砂各一分鉛霜半兩太陰𤣥精石一兩右為末再和研匀每服半錢先于重舌上以鈹鍼破出血用鹽湯洗拭乾然後糝藥于口中神効又方𤣥明粉太陰𤣥精石各一分鉛霜半分右同研令細少少𫝊之二乳飲治證同前方見口瘡等疾類又方取露蜂房燒灰細研以水和塗口中立愈一方治重舌以田中蜂房燒灰酒和𫝊舌一作喉下又方取炲煤以水調塗之一方治木舌以醋和炲煤塗舌上當脱涎膜又塗之以涎膜盡舌如故即止人參散治小兒木舌日漸長大滿塞口中人參一兩白茯苓去黒皮二兩甘草一兩槐花二兩白藥子二兩白术一兩白芷半兩右為散用薄荷汁調于糊塗舌上嚥下不拘時如患重舌亦可服之硼砂散治小兒木舌長大硼砂研甘草炙各半兩白芷二錢白藥子二兩蒲黄一兩右為散每服半錢薄荷湯入蜜少許塗下食後服三歳已上每服一錢朴硝散治小兒木舌方見咽喉等疾類治木舌方舌廼心之侯脾之絡脉于舌臟腑壅滯心脾積熱熱氣上衝故令腫脹滿口若不急療必至害人竹瀝半合太醫局紫雪一分右研細紫雪以竹瀝和之時抹入口中以盡為度一方半夏醋煎嚾嗽吐即差治木舌舌忽吐出不復收者又歌曰木舌要可用黄葵更入鉛丹兩自宜七遍㸃之便可愈神方不假乃為奇用葵花研細黄丹半之同研㸃七次木舌金絲膏治小兒心脾受熱唇口生瘡仍治幕口唇舌白鵝口重舌木舌以上皆係心脾熱並宜用下項藥𫝊脚心次服連翹飲子仍與金絲膏刷口内舌上功効用吳茱萸不拘多少為末用釅米醋調塗脚心更以紙貼糊粘傅之立効一方云重腭一證于上腭令生一肉如指大小赤腫妨食及勿乳斯由熱極而作速宜下之不爾熱毒流咽喉加其腫塞悶絶而死宜服踈風㪚下之愈治木舌舌忽吐出不能復收者用竹紙捍巴豆油却取油紙燃燒煙薫之立止治小兒木舌長大用鯉魚一枚去骨切肉作片將魚肉貼于舌上以線繫定又方黄蘖一分細研剉右以竹瀝漬取汁細細㸃口中良治小兒重舌欲死方烏賊魚骨一兩燒為灰右研如粉以雞子黄和塗喉外及舌下牛黄散治嬰兒重腭重舌口内腫滿多涎咽喉不利牛黄朱砂龍腦鈆霜射香𤣥精石右等分為末刺出血後用水洗拭之然後用此藥𫝊之朱礬散亦可治嬰兒木舌凡療木舌如舌根强直腫滿不能吮乳者先用長針于口内舌根兩角邊刺之令血出黄丹朴硝輕粉白礬枯右等分研細針後用此藥摻之普濟方卷三百六十五
