舌上黑有數孔血出如涌泉此藏病也戎鹽黃芩黃蘖大黃各四兩人參桂心各二兩甘草一兩炙右為末鍊蜜和丸如梧桐子大飲服十丸日服三仍燒鐡烙之烏魚散出仁存方治重舌烏魚骨一兩燒灰乾蜣蜋半兩蒲黃半兩研枯白礬一分研右研為末每服半錢以雞子黃調塗舌上咽津無妨川硝散出仁存方治重舌及木舌川朴硝半兩真紫雪一分鹽半分右研細每服半錢入竹瀝三兩點白湯調塗舌上咽津一方治木舌并水調傳之三物備急丸治心脾經為時邪所客重舌腫脹語聲不出水飲不下大黃銼炒乾薑炮巴豆去皮心膜各等分右為末蜜丸如菉豆大每服五丸溫水下大便利為度蒲黃散出聖惠方治小兒重舌口中生瘡涎出蒲黃露蜂房各一分白魚燒灰一錢右研令勻用酒少許調傳重舌上日三祕録方出陽氏寶書治重舌宜用海螵蛸燒灰以雞子清傅患處一方用黃一方生用亦可及治小兒鵝口不乳治重舌木舌先用新水擦口并舌上下後用皂角刺燒灰入腦子少許每用半字糝舌上下出涎定消立效治重舌出湯氏寶書用竹瀝浸黃柏點之焰硝亦好又方煮小豆汁和鹿角灰安重舌下日三度桂礬方治小兒重舌口中生瘡涎出方見口瘡等疾類治小兒重舌方用桂心半兩為末以薑汁相和令勻每用少許塗舌下再塗之治重舌舌強不能收唾用鹿角末如豆大許安舌下一日三四度亦治小兒不能乳飲一方用水磨鹿角服之如小兒鵝口重舌令炙尉之治小兒重舌取衣魚塗舌上燒灰塗之亦可又方取竈門下黃土末以苦酒和塗舌上愈又方取三家豬肉切令如指大摩舌上兒立能啼又方出聖惠方取赤小豆為末醋和調舌上又方出聖惠方燒簸箕灰傳舌上一方用簸箕尖蒲黃散出簡易方治重舌夜啼用真蒲黃傅上不過三四次即愈更以溫水蘸熱帛褁指輕輕按掠之然後糝藥一方用真蒲黃炒過出火毒用之治小兒重舌欲死者出聖惠方用亂頭髮不以多少燒灰細研末每用半錢傳舌下日數用之妙治小兒生重舌用白芨末以乳汁調傳小兒腳心治重舌鵝口用馬牙硝傳之日三度蛇蛻散出聖惠方治小兒重舌及重腭重齗腫痛用樵炙蛇蛻研末日傳三次舌下一度著一豆許一方用醇醋點掠舌下愈一方用唾和塗舌上治小兒重舌出聖惠方燒蜣蜋末和唾傳舌上又方用黃丹如豆大內管中以安舌下又方用木蘭皮一尺廣四寸削去粗皮用醋一升漬出汁注于重舌上又方出肘後方用粟米嚼哺之療小兒舐方用狸骨燒灰和臘月豬脂塗上治小兒重舌小兒重舌聽行藏中鎖尋來是仙方火內燒灰為細末水調喫下便安康治小兒重舌及口中生瘡涎出方出聖惠方取白羊尿塗少許口中瘥治小兒重舌重腫方出聖惠方取牯牛乳與少許飲之治小兒重舌出聖惠方用甑帶燒灰細研傳舌下治小兒重舌欲死者方出聖惠方用桑根白皮一兩細銼以水一大盞煎至五分去滓漸漸以匙子抄手許令兒吮之一方取桑根白皮汁塗口中瘥治舌卒腫如吹胞滿口溢出氣息不得通須臾不治殺人幼幼新書以苦酒一升煮半夏一十枚令得八合稍稍含嗽吐之宜熱洗去滑用之勿咽其汁一方加生薑一兩尤妙地黃湯治小兒舌胎舌黃舌出血舌腫舌裂舌芒刺舌卷舌黑舌赤并理諸舌病黃芩生地黃等分右㕮咀三歲一大錢水半盞煎三分去滓一方加赤芍藥甘草如舌乾燥者調胃承氣湯并人參白虎湯治舌腫強滿宜滿口含糖醋甚良又方飲羖羊乳即瘥治舌卒腫起如吹胞狀滿口塞喉氣息欲不復須臾不治殺人者方以刀鋒決兩邊第一大脈出血勿使刺著舌下中央脈血出不止殺人血出數升以燒鐵令赤尉瘡數過止血一方用針刺去惡血即愈又方含甘草汁佳治舌卒腫如吹胞滿口溢出氣息不得通須臾不治殺人急以指刮破漬去汁即愈亦可以鈹刀于前決破之一云兩邊破之尤妙治舌腫以百草霜研細醋調成膏舌上下傳之以針決出血傳之彌佳一方舌卒腫加鹽和塗舌上下並瘥一方治腫舌水調塗舌下升麻煎治心藏熱舌上生瘡裂破引唇赤蜀升麻射干各三兩柏葉切一升大青二兩苦竹葉切地黃汁各五合生蘆根薔薇根白皮各五兩生玄參三合赤蜜八合右㕮咀以水四升煮取一升去滓下玄參汁令兩沸次下地黃汁兩沸次下蜜煎取一升七合綿惹取汁安舌上含細細咽之傳涎膏治小兒新生三五日爛舌上白瘡喫奶啼呌黃丹一分輕粉一錢蜜少許右同勻以飯上蒸一度鵝毛掃入口舌上一二次安治小兒舌上瘡取蜂房燒灰屋間塵各等分和勻傳之又方取羊蹄骨中生髓和胡粉傳之妙治小兒重舌瘡飲乳不得以白礬和雞子置醋中塗足底二七即愈治大人小兒口舌生瘡龍腦半分寒水石半兩燒細研右每糝于舌上少許治小兒舌上瘡取胡粉末并豬􅀈骨中髓傳之日三度治小兒舌上白羔瘡用草鵝屎取汁調沙糖服之如鵝喫穀者不用治小兒舌瘡方見本門口瘡等疾類治口吻瘡方下又方同治小兒舌上生瘡如粥及重舌并口中生瘡涎出方三項用桑白皮不以多少搗取汁傳之三兩度一方塗乳與兒飲之亦可治小兒撮口但看舌有瘡如粟大者為驗用蜈蚣汁刮破指甲研兩頭內差如無生者乾者亦得治新生小兒未滿月及百日舌生瘡口中白膏厚如紙者並宜治之以柸子胭脂少許兒病用女乳汁女病用兒乳汁同調塗舌上一宿效牛黃散治小兒重腭重斷腫痛口中涎出一名聖散牛黃龍腦丹砂各一分鉛霜半兩太陰玄精石一兩右為末再和研勻每服半錢先于重舌上以鈹針破出血用鹽湯洗拭乾然後糝藥于口中神效又方玄明粉太陰玄精石各一分鉛霜半分右同研令細少少傳之二乳飲治證同前方見口瘡等疾類又方取露蜂房燒灰細研以水和塗口中立愈一方治重舌以田中蜂房燒灰酒和傳舌一作喉下又方取炲煤以水調塗之一方治木舌以醋和炲煤塗舌上當脫涎膜又塗之以涎膜盡舌如故即止人參散治小兒木舌日漸長大滿塞口中人參一兩白茯苓去黑皮二兩甘草一兩槐花二兩白藥子二兩白术一兩白芷半兩右為散用薄荷汁調于糊塗舌上咽下不拘時如患重舌亦可服之硼砂散治小兒木舌長大硼砂研甘草炙各半兩白芷二錢白藥子二兩蒲黃一兩右為散每服半錢薄荷湯入蜜少許塗下食後服三歲已上每服一錢朴硝散治小兒木舌方見咽喉等疾類治木舌方舌乃心之侯脾之絡脈于舌臟腑壅滯心脾積熱熱氣上衝故令腫脹滿口若不急療必至害人竹瀝半合太醫局紫雪一分右研細紫雪以竹瀝和之時抹入口中以盡為度一方半夏醋煎嚾嗽吐即差治木舌舌忽吐出不復收者又歌曰木舌要可用黃葵更入鉛丹兩自宜七遍點之便可愈神方不假乃為奇用葵花研細黃丹半之同研點七次木舌金絲膏治小兒心脾受熱唇口生瘡仍治幕口唇舌白鵝口重舌木舌以上皆係心脾熱並宜用下項藥傳腳心次服連翹飲子仍與金絲膏刷口內舌上功效用吳茱萸不拘多少為末用釅米醋調塗腳心更以紙貼糊粘傅之立效一方云重腭一證于上腭令生一肉如指大小赤腫妨食及勿乳斯由熱極而作速宜下之不爾熱毒流咽喉加其腫塞悶絶而死宜服踈風散下之愈治木舌舌忽吐出不能復收者用竹紙捍巴豆油却取油紙燃燒煙薰之立止治小兒木舌長大用鯉魚一枚去骨切肉作片將魚肉貼于舌上以線繫定又方黃蘖一分細研銼右以竹瀝漬取汁細細點口中良治小兒重舌欲死方烏賊魚骨一兩燒為灰右研如粉以雞子黃和塗喉外及舌下牛黃散治嬰兒重腭重舌口內腫滿多涎咽喉不利牛黃朱砂龍腦鉛霜射香玄精石右等分為末刺出血後用水洗拭之然後用此藥傳之朱礬散亦可治嬰兒木舌凡療木舌如舌根強直腫滿不能吮乳者先用長針于口內舌根兩角邊刺之令血出黃丹朴硝輕粉白礬枯右等分研細針後用此藥摻之普濟方卷三百六十五
