body:
  text: 普濟方卷三百六十五明周王朱橚撰嬰孩唇舌口齒咽喉門唇瘡等疾附論夫脾與胃合爲足陽明其經脉起鼻環于唇其支脉入絡于脾脾胃有熱氣則發于唇生瘡而重被風邪寒温之氣搏于瘡則微腫濕爛或冷或熱乍瘥乍發積月累年謂之緊唇亦名瀋唇也凡小兒唇青候者蓋因藏氣不和血虚為冷所乗即口唇青皅亦有藏氣熱唇生瘡而風冷之氣入瘡雖瘥之後血色不復故令唇青方順脾散治唇瘡未已復被風冷所摶瘡口濕腫此名緊唇山藥一兩人参三分桂去麄皮一分木香半兩甘草炙剉白术各一分訶梨勒炮去核半兩肉豆䓻炮去殻二枚白茯苓去黒皮黃耆剉各半兩白芷一分右件為散每服半錢沸湯㸃服量兒大小加减黃連散治小兒緊唇因五藏熱毒氣上衝唇腫反麄黃連去鬚甘草生剉寒水石黃蘖剉各半兩梹榔一分右為散鍊蜜調塗于唇上一日兩三度換之葵根散出仁好方治緊唇病葵根燒灰一兩烏蛇燒灰黃蘖剉末鱉甲燒灰研各半兩右研勻每用半錢以猪脂少許和塗唇上日數易之治緊唇用亂髮蜂房及六畜毛燒作末傅瘡上猪脂和亦佳治小兒緊唇及口瘡方以馬芥子搗汁先揩唇血出傅上日七遍馬芥即刺芥也治小兒緊唇搗刺薊取汁煎令濃先以物揩唇上血即塗之又方爛嚼澤蘭心安唇上良治緊唇及瀋唇出千金方用纒白布作大燈炷如指安斧刄上燃炷令刄汗出拭取𫝊唇上日二三度一方用青布燒灰以酒服之亦可脂和塗唇上並瘥治唇生核用猪屎平量一升以水投絞取汁温服之治小兒緊唇搗赤莧取汁洗之又方出聖惠方以葵根燒灰為末以酥調封之又方出聖惠方燒自死螻蛄灰細研水調𫝊之又方出聖惠方用炙松脂貼之又方出聖惠方用乾蠐螬燒灰細研以猪脂和卧塗之差又方燒鱉甲令煙盡細研酥調𫝊之烏蛇散出聖惠方治緊唇及脾熱攻唇瘡腫用烏蛇燒灰細研以酥和𫝊唇上頻換為効一方用皮燒灰𫝊之又方出聖惠方燒鷄屎白作末𫝊之有涎易之白芨膏治小兒唇瘡白芨白歛白蠟各一兩黃耆剉乳香研牡丹皮芍藥丁香各一分麻油二兩右除油蠟外並細剉先煎麻油令沸次入前項藥以柳木枝不住手攪綿濾過去滓再煎入蠟膏成銀石器中盛候冷不拘多少取傅瘡上龍膽丸治小兒唇瘡不合龍膽大黃剉微炒各一分人参梔子朴硝郁李人去皮别研入各半兩茵蔯蒿一分右為末鍊蜜和丸如麻子大每服五丸至七丸温水下量兒大小加减治小兒百日内無故唇口青不能飲乳大藍採取陰乾菱霄牙硝蜀大黃各一分右為散以羊髓為丸將一丸研碎灌之便可喫乳熱者可服而寒者難用也昔人休官去後曾遊湖湘三江長憶雲水修合此方特行救懸危者千餘人皆表功効殊妙治唇黒腫痛癢不可忍方㓜㓜新書取四文大錢于磨石上以臘月猪脂磨取汁塗之不過數遍即愈又方以竹弓彈之出其惡血立効療小兒唇腫及口赤生白瘡爛方以清旦研桑木白皮取汁以塗兒唇口即瘥治唇瘡及卒生瘡或痛癢用黃蘖去麄皮為細末濃煎薔薇根汁調塗瘡上立効治唇瘡用蘭葉研取汁洗之日三上瘥治小兒唇口吻生瘡以新瓦擣羅為末以生油調塗之治冬月唇乾拆血出方擣桃仁以猪脂和傅之治逺行唇口面皺裂方用熟煎猪脂將行夜常傅面設行萬里野宿不損口瘡等疾附論夫嬰孩口舌生瘡乃心脾受熱流沫煩啼盛則不乳然嬰兒吻乳之初口内生白煩燥駭人者莫知其由將謂神祟使之究竟其理母于未誕之月恣飲酣酗貪食肥膩熱毒胎氣所受其兒脫胎之後所襲熱毒之氣悉皆散出于表舌系于心唇干於脾所言心脾若是也欲以下其氣未可利臓腑但以吳茱萸末米醋調傅脚心移夜即愈藥性雖熱能引熱就下其功至良又有心肺熱者瘡潰頥顙初作數㸃胭脂紅漸散斑駁如丹加之身體有熱連翹飲主之但禁火氣餘無恙矣小兒口瘡由血氣盛兼將養過温心有客熱熏上焦故口生瘡也千金翼曰凢口瘡忌鹹膩及熱麵乾棗等冝純食甜粥勿食塩菜三日即瘥又口中面上生息肉轉大以刀决潰出濃愈由血氣盛實心脾藴熱熏發上焦故口生瘡蓋小兒純陽易生熱疾或衣服過厚飲食多熱血脉壅盛皆致此疾鷰口瘡者此由脾胃有客熱熱氣薫發于口兩吻生瘡其白色如鷰子之吻故名為鷰口瘡也或以鷰泥傅之甚良鵝口候者由小兒初生口裏白屑滿舌如鵝之口故曰鵝口也此乃胎熱而心脾最盛薫發于口也小兒初生口裏忽結生于舌上如黍粟大令兒不能飲乳名之口噤此由在胎之時熱入兒心脾心脾徧受于熱故令口噤者也方薔薇丸治口中瘡身體有熱氣痱瘰薔薇根黄芩鼠李根當歸葛根白歛石龍芮黄蘖黄耆芍藥續斷黄連各一兩括蔞根二兩右為末鍊蜜和丸如梧桐子大十丸日三服一方無黄連升麻㪚治小兒口瘡多時氣臭生蟲子川升麻黄芩藁本甘草生乾地黄五倍子各一分皂莢訶棃勒皮夏枯草已上三味燒灰各半兩右為散候兒睡時即乾摻于瘡上神効治小兒久患口瘡不瘥蝦䗫塗酥炙微黄筍灰各半兩白礬黄蘖剉黄連去鬚晩蠶蛾微炒川升麻各一分蝸牛三已枚去殻微炒右為散每取少許以白蜜和如膏塗于瘡上日三用之龍膽丸治小兒口瘡多睡吐乳方見唇瘡等疾類折桂散治口瘡口吻病梧桐津黄蘖蜜炙蛤粉各一分晩蠶蛾一錢微炒已上擣羅為細末次用朱砂半兩細研水飛麝香一錢研龍腦半錢研右研勻每用少許摻貼患處保生丸歌曰小兒心蔵不清涼客壅傷神饒口瘡鈎引重舌難言語涎流不斷似流漿待教食乳揺頭怕夜啼聲哭斷肝膓五膽三黄除客熱七香金薄甚為良大黄黄蘖為末别研宣黄各一分半丁香一錢麝香一字分金薄五片以水銀結為砂子右研細棗肉為丸如皂子大温水化下一粒黄連散治小兒口瘡心熱煩悶黄連去鬚大青川升麻各三分桑根白皮剉甘草炙微赤剉半兩右為散每服壹錢以水小盞煎至五分去滓放温量兒大小分減服之若與妳母服即加梔子黄芩各半兩每服三錢以水一中煎至六分去滓食後温服鉛丹膏治小兒口瘡鉛丹一分鉛霜半分晩蠶蛾微炒蛤粉各半錢麝香一錢右研令極細用蜜二兩熬成膏每上取膏半錢塗在口中又方麝香梧桐津晩蠶蛾微炒黄蘖末各一分朱砂半分右為末每夜臨臥時于瘡上薄貼之不過三夜瘥青黛散治小兒口瘡青黛甘草生用黄連香白芷密陀僧醋燒别研各等分右為末每用摻口内治小兒口瘡青黛黄連各一錢白殭𧖟三錢馬屁葧拳大右為末乾摻先用茱萸湯洗脚心又醋麵糊調茱萸末塗于脚上治口傍惡瘡亂髪灰胡絲灰黄連乾薑各等分右為散以粉瘡上不過三日立愈治小兒口瘡腫痛麝香半分細研蜜半兩甘丹一分生地黄汁一合右先將三味入銚子以慢火熬令紫色次下麝香勻攪候冷日三度塗于瘡上紫金霜方治大人小兒口瘡黄蘖如兩指大二片塗蜜慢火炙令紫色訶子一枚燒過盞子盖少時麝香膩粉各少許右為末每服二字摻于舌上立瘥黄連含湯治小兒口瘡如月蝕狀赤黒似瘤有竅如有蟲吮之有血黄連礬石細辛各二分藜蘆一分炙右以水三升煮一合令兒含滿口冬可煖之兒大解語可用含之但以綿揾拭瘡上胡黄連散治口糜胡黄連五分藿香一錢細辛三錢宣連三錢右為末每用半錢乾貼口内潄吐之治口舌生瘡其證乳到兒口即啼及喫乳不穩以竹瀝汁㸃黄連黄栢虢丹煆塗口中一捻散治小兒口瘡青黛黄蘖去麄皮訶黎勒炮去核蜜陀僧右研為散取一捻糝舌上如咽喉内有瘡亦糝喉中微微嚥津白芷散治小兒口瘡香白芷半兩塩緑一錢五倍子一分麝香少許右研為細末每用一字糝瘡上㵼心散治口瘡黄連草烏白薑各等分右為末乾糝先用井花水洗去白膜一方加腦子麝香硼砂為末每服一字温水臨臥服之碧玉通神散治口瘡黄栢蜜塗炙取末半兩青黛一分腦子少許右和勻候兒睡着乾糝口中及置舌下嚥之一方無腦子一方宜服洗心散㵼心散治小兒口瘡用桑白汁生地黃汁蜜各半合相和緩緩細傅兒口取瘥治口中瘡咽喉塞不利口燥膏方猪膏白蜜各一斤黄連一兩切右合煎去滓令相得含如半棗日四五夜二治小兒口瘡腫痛蟾酥石膽各半錢黄蘖二錢末右細研令勻鍊蜜和丸如皂莢子大每夜以水化一丸如餳相似以箆子抹在口中每夜一兩上不過兩夜瘥一法用鵝毛蘸掃患處治小兒口瘡芍藥當歸黄連各等分右乳汁浸塗口中治口瘡鬱金雄黄研甘草半炙半生各一兩右為末同和糝瘡上有涎吐之每用少半錢許又以蛤粉水調塗脚心亦妙治小兒口瘡赤芍藥川大黄宣連各等分右為末獖猪膽調塗顖門上一日兩次換一方有鬱金無宣連緑袍散治大人小兒口瘡多時不效者黄蘖二兩甘草炙二兩青黛一兩右為末入青黛同研勻乾貼瘡上治小兒口瘡用蒲黄蟬蛻去泥土為末打和用蜜少許甑上蒸過一頃時㸃入口中寒水石散治小兒口瘡寒水石一分燒通赤地上碗合一宿出火毒白礬熬令汁枯一分鉛白霜一分右為散每用少許糝口瘡上食後臨臥以瘥為度嚥津無妨硼砂散治小兒口瘡硼砂研礬蝴蝶研蜜陀僧各半錢研右用生蜜四兩與藥同熬紫色以新水氷冷瓷合盛每用以鷄翎傅之鉛丹煎治小兒口瘡鉛丹半兩蜜陀僧半兩白蜜四兩右先以蜜于銚子煎令沸下鉛丹同煎令紫色次下蜜陀僧攪令匀成煎於瓷合盛每用小豆大嚥津一方熬成膏鵝毛塗効大効金絲膏一名石膽散治小兒口瘡黄丹一錢生蜜一兩右相和深甌盛甑内蒸令黒為度每用少許鷄毛刷蘸口内甚効牡蠣散治小兒口瘡甘草炙一錢末牡蠣煅通紅取出候冷研細以紙褁了埋一尺土中七日出火氣三錢右和匀頻用少許糝口中或嚥或吐皆妙療小兒口瘡黄蘖皮一兩切烏頭一升右以水二升煮取兩合去滓重煎如餳入少許龍腦研和傅之甚良治小兒一切口瘡疼痛没石子三分微火炙令虚服甘草一分右為散每于瘡上薄糝令遍晩蠶蛾散治小兒百日以上二三歳以來患口瘡晩蠶蛾一分微炒麝香半分右細研為散每用少許糝于瘡上日再用之一方及治風疳等瘡無麝香治小兒口瘡水銀一分黄連六分右以水二升半煮五合兒小不能含以綿揾拭口中日十遍石膽散治口瘡石膽不以多少龍腦少許右為末糝之治大人小兒口瘡柴胡吳茱萸各等分右為細末每用一錢好酒調塗脚心男左女右治妳下小兒口瘡烏頭尖七個天南星一個右為末以藥合生薑汁調于男左女右脚心内塗之不過三兩次立愈升麻散治小兒口瘡升麻黄連各半兩右為末乾糝之治口瘡銅緑一錢研細白芷末半兩右相和研匀日三度糝貼于瘡上靑液散治小兒口瘡及鵝口重舌靑黛一錢腦子少許右為細末每用少許傅于舌上一方用竹瀝和蜜調敷舌上効必效散出濟生㧞萃方治口糜白礬大黄等分右為細末臨臥乾貼瀝涎盡温水漱之治小兒及老人虚人口瘡咽痛吳茱萸去浮者炒地龍去土炒各等分右為末米醋入生麵調塗足心吳内翰之孫初生而患口瘡用此方神効桂礬方出聖惠方治口瘡舌鞕言語不得白礬燒令汁盡桂去麄皮各一分右研為末糝舌上即瘥治小兒口下黄肥瘡及鷰口并口内生瘡方取羖羊髭燒作灰和臘月猪脂傅之角亦可用日三四上塗之効㵼心散出聖惠方治口瘡及鷰口黄肥瘡乃心臟積熱上發于口乳母亦同服用黄連一味去鬚為末蜜水調下一方用蜜調蒸一炊久旋旋與兒服之一方加草烏白姜各等分乾糝用井水洗去白漠治口瘡湯氏寶書用蛇蛻皮以水浸軟頻拭口内瘡一兩遍即瘥次用貼脚心藥傅之効治口瘡喉閉出金嬰方以朴硝為末水