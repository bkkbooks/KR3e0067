時傷寒發斑論夫傷寒發斑陽盛故也其病在表或未經發汗或已發汗未解或吐下後邪熱不除毒氣內盛因表虛熱毒乘虛出於皮膚發為斑疹如錦紋若色赤及發在五日內者可治若色黑過七日乃發難治甚則喉舌身體皆成瘡也歌云溫毒成斑肌肉焦石膏一劑毒須消若還黑毒乘虛出疹痘斑瘡别有條大抵發斑不可用表藥蓋表虛裏實若發其汗重令開泄則斑爛也咽痛元參升麻湯斑出大青四物湯又名阿膠大青湯又豬膽雞子湯近用升麻葛根湯最良下部生瘡咳而下利嘔吐青汁眼赤口瘡者黃連橘皮湯斑瘡豌豆黃連一物煮濃汁服大妙青黛大如棗服之又青木香煮湯汁服瘡出煩疼者五物木香湯犀角大青湯芒硝豬膽塗瘡法證治論化證湯乃白虎加人參湯别名也孫兆用紫雪有下證者調胃承氣湯又云溫毒渾身似錦紋發斑癮疹嘔吐頻或時咳逆心煩悶冬感於寒發在春溫毒黑膏方嘔青汁者葛根橘皮湯夫熱病在裏已發汗未解或吐下後熱毒氣不散煩躁譫語此為表虛裏實熱燥於外故身體發斑如錦紋凡發斑不可用發表藥令瘡開泄更增斑爛表虛故也又歌曰血如溫毒黑膏良熱病重陽别有湯裏實表虛因發出若還發汗愈增瘡病證屬陽誤投溫藥或當汗不汗或當下不下或當汗下未解陽熱內然蒸濕外迫熱毒入胃以致發斑蓋熱必傷血血熱不散裏實表虛由是熱氣乘虛出於皮膚輕則如痱子重則如錦紋是也斑家慎勿發汗汗之重令開泄斑爛又加多也凡斑略見一二須早圖又曰稍延獨陽絶陰不可救藥其發黑斑者熱劇胃爛無及矣然而斑文方萌與蚊迹類焉又不可誤用藥也發斑多見於胸腹蚊迹多在手足之間關前陽脈洪大病人昏潰先紅後赤者斑也陽脈不洪病人自靜先紅後黃者蚊迹也發班屬陽陽毒具而陰脈形或大極自利或怫鬱氣短而燥糞久不得通盧扁復生莫能施其巧溫毒發斑冬月冒寒至春間陽盛則發病凡吐下而表未解毒未消也黑膏主之肌肉斑爛咳而心悶下利嘔吐清汁下部病或口瘡黃連橘皮湯葛根橘皮湯熱病發斑時氣發斑大青四物湯豬膽雞子湯陽毒曰重陽發斑有舌乾咽痛者元參升麻湯發斑通用升麻葛根湯敗毒散犀角地黃湯熱多者元參升麻湯加生薑烏梅又黃連一物湯青木香一物湯可擇用有下證者少與調胃承氣湯孫兆用紫雪一劑證治論用白虎加人參湯發斑湯劑須以紫草川芎為佐血熱內結者與小柴胡湯發斑小點稀疏色常鮮細者易治或如錦紋癮起并塌者難治若初發色紅漸次微點良久點又轉其面色肌肉黧晦者斷不可救初發便如黑志亦然赤斑五死一生黑斑十死凡內外熱熾汗下不解煩悶咳嘔足冷耳聾便是發斑之證方漏蘆散出聖惠方治傷寒斑出癮疹如錦紋而咳嗽心神煩悶嘔吐不止漏蘆陳橘皮湯浸去白穰焙前胡去蘆頭麻黃去根節黃芩杏仁湯浸去皮尖雙仁麩炒微黃各一兩右為散每服四錢以水一中盞煎至六分去滓不拘時溫服黃芩湯出聖惠方治傷寒臟腑壅毒不得宣疏肌膚發斑黃芩大青川升麻石膏以上各一兩梔子仁半兩川朴硝二兩右為散每服五錢以水一大盞半入豆豉五十粒蔥白二莖生薑半分煎至五分去滓不拘時溫服稍利為度又方出聖惠方犀角屑一兩川大黃二兩銼碎微炒梔子仁半兩藍葉一兩川升麻一兩甘草半兩炙微赤銼右為散每服五錢以水一大盞煎至五分去滓不拘時溫服黃芩散出聖惠方治傷寒十日內未得汗表裏有熱發斑狂言欲走眼目俱黃心中煩悶大便不利黃芩大青川升麻川大黃銼碎微炒各一兩甘草半兩炙微赤銼茵陳一兩川朴硝一兩梔子仁半兩黃連半兩去鬚右為散每服五錢以水一大盞入竹葉三七片煎至五分去滓不計時溫服以利為度大青散出聖惠方治傷寒身面發斑大青一兩半川升麻二兩甘草二兩炙微赤銼右為散每服五錢以水一大盞入豆䜴小半合煎至五分去滓溫服不計時豬膽雞子湯出聖惠方治傷寒斑瘡欲出脈洪大心躁熱但令患人溺於紙上如金色是也宜服此豬膽汁一合釅醋一合雞子一枚打破去黃右相和煎三兩沸放溫頓服強人盡服羸人六七次服汗出愈升麻散出聖惠方治傷寒熱毒不解欲變成斑服此解毒川升麻梔子仁大青黃芩甘草炙微赤銼一兩石膏二兩右為散每服五錢以水一大盞入生地黃汁半合煎至六分去滓不計時溫服犀角散出聖惠方治傷寒赤斑不止犀角屑麻黃去根節梔子仁黃連去鬚地骨皮甘草炙微赤銼馬牙硝鬱金以上各一兩石膏二兩右為散每服五錢以水一大盞煎至五分去滓不計時溫服以瘥為度治傷寒黑斑出不止宜服川升麻一兩黃芩一兩半川大黃一兩銼碎微炒犀角屑一兩半川芒硝一兩梔子仁一兩右為散每服二錢煎甘豆湯放冷調下不拘時以差為度天竺黃散治傷寒發斑瘡已出心臟尚有餘熱不除發斑煩躁天竺黃研川升麻子芩茯神去木犀角屑赤芍藥人參去蘆頭鉛霜研以上各半兩麥門冬去心焙乾一兩甘草炙微赤銼半兩梔子仁一兩黃連一分去鬚右為散入研了藥令勻每服一錢煎竹葉湯下不計時黃連散治傷寒斑毒不解黃連一兩去鬚犀角屑半兩石膏二兩梔子仁一兩甘草半兩炙微赤銼右為散每服四錢以水一中盞煎至六分去滓不計時溫服阿膠湯治傷寒一二日及十餘日發黃疸斑出皆主之一名大青四物湯大青四兩甘草半兩炙微赤銼黃明膠半兩杵碎炒令黃燥亦用阿膠豉五兩右細銼和勻每服半兩以水一中盞煎至六分去滓不拘時又方大黃三兩甘草二兩杏仁三十粒芒硝五合麻黃二兩黃芩一兩巴豆二十粒右熬搗蜜和丸如大豆每服三丸當利毒利不止米飲止之家人視病者亦可先服取利則不相沾染也此丸亦可預合置犀角湯治傷寒熱毒內盛身發赤斑犀角鎊麻黃去根節石膏各一兩山梔子仁一兩半黃連去須三分右搗篩每服五錢水一盞半煎至一盞去滓溫服山梔子湯治傷寒發斑心躁煩亂山梔子仁三分大青升麻各一兩阿膠炒令燥半兩右搗篩每服五錢用水一盞半入豉百粒同煎至一盞去滓麻黃葛根湯治傷寒發斑狀如錦紋嘔逆煩悶麻黃去根節葛根銼知母焙陳橘皮湯浸去白焙黃芩去黑心各一兩杏仁湯浸去皮尖雙仁炒甘草炙各半兩右搗篩每服五錢水一盞半去滓溫服犀角散治傷寒毒氣外攻皮膚發狂躁熱犀角鎊黃芩去黑心大青馬牙硝另研黃連去鬚麥門冬去心焙各一兩山梔子仁牛黃另研赤茯苓去黑皮天竺黃另研甘草炙各半兩麝香另研一錢右搗研為散每服三錢煎竹葉湯調下不計時石膏湯治傷寒發黑斑石膏一兩半麻黃去根節桂去粗皮一兩半葛根一兩黃連故鞋一隻去土細銼蜀椒去目并閉口炒出汗一分右搗篩每服五錢水一盞半煎至一盞去滓溫服衣覆取汗知母湯治傷寒毒氣滋盛蒸於肌膚發為赤斑通身大熱頭痛精神昏亂知母焙牽牛子炒山梔子仁大黃銼炒黃芩去黑心牡丹去心麻黃去根節一兩荆芥穗硝石虎杖射干羌活去蘆頭杏仁各一分連翹半兩半夏一錢以生薑二錢同搗捻作餅子暴乾右搗粗篩每服五錢水一盞半煎至一盞去滓溫服黃芩湯治傷寒發斑煩躁除胃內瘀熱黃芩去黑心一兩山梔子仁甘草炙一兩馬牙硝半兩右搗篩每服三錢水一盞煎至七分去滓溫服不計時黃連散治傷寒發斑黃連去鬚一兩檳榔銼半兩甘草炙半兩右搗羅為散每服二錢入蜜少許如點湯放溫服不計時玄參升麻湯治傷寒失下不當下之熱毒在胃發斑如錦文甚則煩躁譫語兼治喉閉腫痛升麻玄參甘草炙各半兩右銼為散每服五錢水一盞半煎至七分去滓溫服溫毒亦能發化斑湯治斑毒人參石膏各半兩萎㽔知母甘草各一分右銼散每服五錢水一盞半入糯米一合煎八分取米熟為度去滓溫服香䜴湯治肺腑臟暴氣斑點香豉一升綿裏熬蔥鬚切一兩石膏八兩碎梔子仁三兩擘生薑六兩大青二兩升麻三兩芒硝三兩右切以水六升煮七味取二升五合去滓然後下芒硝分為三服麻黃解肌湯一二日便服之麻黃甘草升麻芍藥石膏各一兩杏仁三十枚貝齒三枚右末之以水三升煮取一升頓服取汗出即愈便食豉粥補虛即宜也又方麻黃二兩黃芩桂各一兩生薑三兩右以水六升煮取二升分為四服葛根解肌湯葛根四兩芍藥二兩麻黃大青甘草黃芩石膏桂各一兩大棗四枚右以水五升煮取二升去滓分為三服微取汗升麻湯治大人小兒傷風寒溫疫頭痛發熱體疼斑瘡已發未發均可服升麻乾葛甘草芍藥各等分右㕮咀每服五錢水二盞煎七分去滓熱服小兒量與一法加紫草茸煎鼠粘子散治傷寒斑瘡毒氣盛脈洪盛大便祕澀咽膈不利或致疼痛語聲不出鼠粘子炒丹參升麻甘草炙乾薄荷葉右等分每服三錢水二盞半煎至七分去滓不計時服凡似感風熱而咽疼聲重類疹證皆宜服之煮萍飲治斑瘡甚者青萍紫萍各一握淨洗右煮羮吃三服神仙紫雪黃金十兩寒水石石膏各四兩八錢犀角羚羊角各一兩元參一兩六錢沉香木香丁香各半兩甘草八錢升麻六錢右以水五升煮黃金至三升去金入諸藥再煎至一升濾去滓投朴硝三兩二錢微大火煎以柳木箆子攪勿停手候欲凝入盆中更下研朱砂麝香各三錢急攪令勻候冷凝成雪也每服一錢細細咽之普濟方卷一百三十三
