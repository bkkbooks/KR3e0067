之心煩腹滿卧起不安者梔子厚朴湯主之丸藥大下後身熱不去微煩者梔子乾薑湯主之是皆取其吐而湧其熱者也虛煩之狀必中溫溫然欲吐憒憒然無奈欲其不嘔擾擾亂亂是名煩也非吐則不能已經曰若下後更煩心下濡者為虛煩也梔子豉湯主之脈作結心下滿而煩飢不能食病在胸中瓜蒂散主之二者證均煩也藥均是吐也而有輕重之不同吐下發汗後邪氣乘虛而入煩者則謂之為虛煩與梔子豉湯則是吐劑之輕者不因吐下發汗後邪氣結胸中則為膈實與瓜蒂散則是吐劑之重者又陽明病不吐不下心煩者則是煩之實者也與調胃承氣湯下之傷寒二三日心中悸心煩者則煩之虛者也與小建中湯補之煩為熱也悸而煩復為主者以悸為虛悸甚而煩故為虛也少陽之邪入腑者煩而悸則為熱也大抵先煩而悸者是為熱也先悸而煩者是為虛也內經曰治病必先求其本誠哉是言也又云傷寒病後躁煩者有虛煩有穀煩陽氣偏多謂之虛煩病瘥後食穀太早心虛不勝穀氣胃內蒸熱謂之穀煩若陰陽和調則虛煩自己損其穀食則穀煩者瘥活人書云不惡寒身不痛頭不疼脈不緊但煩熱者此多虛煩諸虛煩熱與傷寒相似然不惡寒身不疼痛故知非傷寒也不可發汗頭不疼脈不緊數故知非裏實也不可下如此者內外皆不可攻攻之必遂損竭多死者也此虛煩但當與竹葉湯若嘔者與橘皮湯一劑不愈再與之孫真人云此法數用甚有效傷寒虛煩宜服王叔和云有熱不可大攻攻之熱去則寒起並宜服竹葉湯方竹葉湯治虛煩狀似傷寒但不身疼痛不惡寒或得汗亡津液燥熱未解內外皆不可攻者汗與竹葉湯嘔與橘皮湯渴與五苓散竹葉半把石膏碎四兩半夏湯洗去滑切焙三分人參半兩麥門冬去心二兩甘草炙半兩右銼如麻豆大每服五錢以水一盞半入粳米一百餘粒生薑半分拍碎同煎取八分去滓溫服并解暑毒陰證傷寒未解人勿服若表裏俱虛下利發熱去石膏加附子煎名既濟湯濟生除石膏粳米加茯苓小麥治傷寒大霍亂吐㵼後心虛煩悶梔子豉湯出聖濟總録治傷寒發汗後虛煩不得眠劇者必反覆顛倒心中懊憹宜服梔子豉湯又傷寒發汗若下之煩熱胸中窒痛亦宜服梔子豉湯又傷寒下利後更煩按之心下濡者虛煩也亦冝服之發汗若下之而煩熱胸中窒者梔子豉湯主之仲景云用梔子豉湯病人舊微溏者不與之梔子十四枚去皮豉四合右銼如麻豆大每服三錢水一盞煎至六分去滓溫服得快吐止後服烏梅湯同前治傷寒大病瘥後體虛煩滿烏梅取肉山梔子仁甘草炙葛根各半兩右搗粗篩每服五錢水一盞入豉二七粒同煎至半盞去滓早晚食後溫服麥門冬飲同前治傷寒汗後虛煩心神不寧麥門冬去心焙柴胡去苗防風去蘆半夏湯洗去滑薑汁製赤茯苓去黑皮犀角鎊各半兩右搗粗篩每服五錢水一盞半入生薑五片煎至八分去滓溫服人參湯同前治傷寒汗後虛煩心中滿悶腹脹微喘人參白茯苓去黑皮杏仁去皮尖雙仁細研各半兩右除杏仁外銼如麻豆大每服三錢水一盞半入粳米百餘粒同煎米熟去滓溫空心服麥門冬湯同前治傷寒後不解或寒或熱四肢瘦弱飲食不能胸中煩滿虛躁麥門冬去心焙赤茯苓去黑皮人參白术各一兩桂去粗皮半兩陳橘皮去白炒一兩甘草炙半兩地骨皮黃耆銼各一兩右粗搗篩每服五錢水一盞半煎至八分去滓溫服日再厚朴飲同前治傷寒發汗後氣虛心煩腹滿痰逆不思飲食厚朴二兩去粗皮薑汁製甘草炙半夏薑汁製人參陳橘皮去白焙各一兩右粗搗篩每服五錢水一盞半生薑五片同煎至七分去滓空心服薏苡仁湯同前治傷寒汗後煩滿多睡小便赤色薏苡仁酸棗仁防風去蘆人參甘菊花地骨皮紫蘇子甘草炙白茯苓去黑皮各一兩右粗搗篩每服三錢水一盞入荆芥薄荷生薑各少許同煎七分去滓溫服睡多冷服不睡熱服人參飲同前治傷寒汗後煩滿氣虛心神不寧人參赤茯苓去黑皮陳橘皮去白焙白术銼炒各一兩右粗搗篩每服五錢水一盞生薑三片煎至七分去滓溫服日三麥門冬茯苓飲同前治傷寒後煩滿心神恍惚不得眠卧麥門冬去心焙赤茯苓去黑皮知母焙芎藭酸棗仁微焙陳橘皮去白焙檳榔銼甘草炙各一兩右粗搗篩每服五錢水一盞半入生薑五片煎至一盞去滓溫服日三柴胡湯出聖濟總録治傷寒後虛勞煩熱驚悸不得眠睡柴胡去苗半兩酸棗仁微炒二兩逺志去心一分當歸防風去蘆人參生乾地黃芎藭各半兩麥門冬去心焙半兩甘草炙銼茯神去木豬苓去黑皮桂去粗皮黃耆銼各半兩右粗搗篩每服三錢水一大盞生薑三片煎至七分去滓溫服空心日二服人參湯同前治傷寒後虛勞不得眠煩悶四肢乏力人參一兩酸棗仁微焙三兩當歸切焙芎藭銼桂去粗皮甘草炙銼柴胡去苗白茯苓去黑皮石膏碎各一兩右粗搗篩每服五錢水一盞半生薑三片煎至一盞去滓食前溫服六神湯同前治傷寒虛煩不安人參白茯苓去黑皮防風去蘆百合黃耆銼乾山芋各二兩右粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時酸棗仁湯同前治傷寒後虛煩不得眠卧頭目昏眩酸棗仁炒三兩麥門冬去心焙二兩地骨皮銼一兩右粗搗篩每服三錢水一盞生薑三片同煎至七分去滓溫服不拘時茯神散同前治傷寒後虛煩心腹不快茯神去木柴胡去苗陳橘皮去白焙甘草炙各一兩右粗搗篩每服五錢水一盞半煎取八分去滓溫服不拘時黃連一物湯同前治傷寒不解恐服藥太多大小便不利虛煩不安黃連一兩銼碎生薑數片入酒少許微炒右作一服水一碗煎七分去滓徐徐冷熱皆可服一物黃連瀉心湯易老隨證加減列於後煩者加梔子燥者加香豉嘔者加半夏滿者加甘草腹痛加芍藥脈遲加附子大便硬加酒浸大黃用乾薑附子先煎另熱不僭也後另煎黃連與黃連薑附同用少陰渴逆者失下也陰消將盡陽逆上行使陰不納也或舌攣言語不正及昏冒與咽喉痛者少陰也速下之大承氣湯若陽極脈微將盡者不宜下宜㵼心湯涼膈散去硝清肺亦可飲水多心下痞渴别則無惡候者五苓散主之地仙散同前治大病後煩熱不安及一切虛勞煩熱病冝服之地骨皮去木二兩防風去蘆一兩甘草炙半兩右㕮咀每服四錢水一盞薑五片煎八分不拘時溫服枳實柴胡湯出濟生方治虛煩昏悶嘔逆惡心往來寒熱胸膈捫之即痛日晚所發潮熱者枳實半兩麩炒令紫色取瓤柴胡去苗二兩黃芩一兩半人參半兩甘草炙一兩半右杵為粗末每服四錢水一盞半生薑三片棗一枚同煎至七分去滓溫服日三不拘時大橘皮湯出活人書治動氣在下不可發汗發汗則亡陽心中大煩骨節疼痛目運惡寒食則反吐穀不得入先服大橘皮湯吐止後服小建中湯甘草炙半兩人參一分竹茹半升橘皮一兩半去白右銼麻豆大每服五錢生薑四片棗子一枚水二盞煎取一盞去滓分二服傷寒譫語論夫傷寒不應發汗而汗之遂致亡陽津液內耗胃中燥實令譫語此或由津液不和內有燥屎或三陽合病或瘀熱蓄血在裏或婦人熱入血室皆使譫語則身當有熱脈屬胃胃者足陽明經也陽明為病主身熱故譫語妄言則身當有熱脈當洪大而洪大亦陽脈也故其病為順若譫語而手足四厥脈反沉細而微者為逆也然又有鄭聲者取其鄭重之意與譫語相類蓋古人以此分虛實醫者當以脈證參合别之不可不慎故謂虛則鄭聲實則譫語傷寒四五日脈沉喘滿沉為在裏而反發汗其津液越出大便為難表虛裏實久久則成譫語發汗後重發其汗亡陽亦為譫語其脈反和者不死陽明病下血而譫語者此為熱入血室但頭汗出當刺期門隨其實者而㵼之濈然汗出者則愈病苦譫言妄語人身熱脈當洪大者生沉微細手足四逆者死也傷寒譫語何以明之譫者謂喃喃而語也又狂譫謂妄有所見而言也斯皆真氣昏神緒不清之所致夫心藏神而主火病則熱氣歸焉傷寒胃中熱盛上乘於心心為熱冒則神昏亂而語言多出識昏不知所以然遂言無次而成譫妄之語輕者睡中呢喃重者不睡亦語言差謬有譫語者有獨語者有狂語者有語言不休者有言亂者此數者見其熱之輕重也譫語與獨語雖間有妄錯之語若與人言有次是熱未至於極者也經曰獨語如見鬼若劇者發則不識人是病獨語未為劇者狂語者熱甚者也由神昏而無所見覺甚則至於喊呌而言語也言語不休者又其甚也至於言亂者謂妄言罵詈善惡不避親疏為神明已亂也經曰諸逆發汗微者難差劇者言亂是難可復制也譫語之由又自不同皆當明辨之有被火劫譫語者有汗出譫語者有下利譫語者有下血譫語者有燥屎在胃譫語者有三陽合病譫語者有過經譫語者有亡陽譫語者經曰大熱入胃中水竭燥煩必發譫語又腹滿微喘口乾咽爛或大便祕則譫語是因被火劫譫語者汗出譫語此為風也須下之過經可下之下之若早語言必亂以表虛重實故也是汗出譫語者也下利譫語者有燥屎也小承氣湯主之是下利譫語者也下血譫語者此為熱入血室當刺期門隨其虛實而㵼之是下血譫語者也譫語潮熱不能食者胃中必有燥屎五六枚也是謂燥屎在胃譫語者也腹滿身重難以轉側口不仁面垢譫語遺尿是三陽合病譫語者也過經譫語者熱也當下之是過經譫語者也發汗多亡陽譫語不可下與柴胡桂枝湯和其榮衛是以有通津液後自愈是亡陽譫語也諸如此脈短則死脈自和則愈又身微熱脈浮大者生逆冷脈沉細不過一日死實則譫語氣收斂在內而實者本病也或氣上逆而喘滿或氣下奪而自利者皆為逆也經曰直視譫語喘滿者死下利者亦死謂其正氣脫絶也能知虛實之診能識逆從之要治病療病則不失病人有譫語有鄭聲二證鄭聲為虛當用溫藥白通湯主之譫語為實當須調胃承氣湯主之服調胃承氣湯而譫語止或更衣者停後服不爾再與之仲景云實則譫語虛則鄭聲重語也世多不别然譫語鄭聲亦相似難辨須更用外證與脈别之若大小便利手足冷脈微細者必鄭聲也大便祕小便赤手足溫脈洪數者必譫語也以相參然後用藥萬全矣大抵傷寒不應發汗即譫語仲景云傷寒四五日脈沉而喘滿沉為在裏反發其汗津液越出大便為難表虛裏實則譫語譫語屬胃胃和則愈不和煩而躁宜服調胃承氣湯然亦有三陽合病譫語者三陽合病腹滿身重難以轉側口中不仁面垢譫語遺尿其脈必滑石不可汗下宜白虎湯有胃實譫語者病人身發熱汗出大便硬為胃實宜調胃承氣湯大承氣湯大承氣湯去芒硝尤穩或汗發多亡陽譫語者仲景云發汗多亡陽譫語者不可下此為津液不和與柴胡桂枝湯和其營衛以通津液後自愈恐人作燥屎攻之不可攻也下利譫語為有燥屎脈不微細即須下之用小承氣湯譫語而利不止則不治又汗出譫語者風也須候其過經乃下之瘀血譫語者狂言潄水大便黑小便多遍身黃小腹滿緣當汗蓄熱在裏熱化為血故爾輕者犀角地黃湯重者桃仁承氣湯抵當丸有下後譫語者傷寒八九日下之胸煩滿驚小便不利譫語身重不可轉側者柴胡加龍骨牡蠣湯有婦人熱入血室譫語者婦人傷寒發熱經水適來晝日明了暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦速用小柴胡湯治之若行陽遲致入胃冷津燥中焦上不榮成血塊結胸狀須當針期門也若婦人中風發熱惡寒經水適來入血室也當刺期門隨其實而取之已上二焦熱結在期門也若犯胃氣盡夜譫語喜妄小腹滿小便利屬抵當湯也發少陽汗則譫語經云汗之則譫語甚謂少陽也下之則額上汗手足逆冷謂下之早也發汗