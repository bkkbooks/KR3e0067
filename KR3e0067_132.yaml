body:
  text: 普濟方卷一百三十三明周王朱橚撰傷寒門傷寒煩渇論夫腎者水臟膀胱者津液之腑二經為表裏傷寒熱入於臟流於少陰之經則腎受病矣水惡燥熱盛則燥故渇而引飲又傷寒邪氣非發汗吐下則不能除治發汗吐下過甚則致津液耗少熱氣内生亦令渇也傷寒病煩渇者此謂經發汗吐下已後臟腑空虚津液竭絶腎家有餘熱故使其煩渇也傷寒渇者裏有熱也傷寒之邪自表傳至裏則必有名証隨其邪淺深而見焉雖曰一日在皮二日在膚三日在肌四日在胸五日在腹六日入胃其傳經者又有証形焉太陽主氣而先受邪當一二日發頭項痛而腰脊強者是矣太陽傳陽明則二三日發身熱目疼鼻乾不得卧也陽明傳少陽三四日胸膈痛而耳聾此三陽皆受病為邪在表而猶未甚作熱故不言渇至四五日少陽傳太陰則邪氣漸入裏寒邪漸成熱當日之時也津液耗少故腹滿而嗌乾至五六日太陰傳少陰是裏熱又漸深也當此之時則津液為熱所傳漸耗而乾故口燥舌乾而渇及至六七日則少陰之邪傳於厥陰厥陰之為病消渇為裏熱已極矣所謂消渇者飲水多而小便少是謂熱能消水也所謂傷寒病至六七日而渇欲飲水為欲愈之病以其傳經已盡故也是以厥陰病云渇欲飲水少少與之愈者是也邪氣初傳入裏熱氣散漫未收斂成熱裏蒸焦膈傳耗津液遂成渇也病人雖渇欲飲水又不可多與之若飲水過多熱少不能消故復為停飲諸疾經曰凡得時氣病至五六日渇欲飲水水飲不能多勿多與也何者以腹中熱尚少不能消之便更與人作病也若大渇欲飲水猶當依証與之與之常令不足勿極意也言能飲一斗與五升又曰渇欲飲水少少與之但以法救之渇者宜五苓散至於大渇欲飲水數升者白虎加人參湯主之皆欲潤其燥而生津液也凡得病反能飲水此為欲愈之病其不曉病者但聞病飲水自差小渇者乃強與飲之因成大禍不可復救然則悸動也交結也喘咳噎噦乾嘔腫滿不利小便不利數者皆是飲水過傷而診病之工當須識此勿令悞也歌括云熱氣薫蒸津液耗少所以發渇熱邪深淺條例不同然是渇者大熱裏有熱也或曰六經外証獨少陰曰渇厥陰曰煩何邪少陰屬腎主水熱氣深腎水易竭焉得而不渇厥陰屬肝心之母也病主消渇飲水多而小便少是其裏熱也極已子氣乗母於是挾心火以為煩惟煩則消矣凡煩証用藥並去半夏以其煩躁而逐水也若先嘔後渇者則為欲解當與之水先渇後嘔者則為水停心下屬赤茯苓湯活人書曰脉浮渇屬大陽寒表不解心下有水氣而渇者小青龍去半夏加栝蔞湯太陽病服桂枝大汗出後大煩渇者白虎加人參栝蔞脉浮小便不利㣲熱消渇者五苓散傷寒四五日身熱惡風脇下滿手足温而渇者小柴胡半夏加人參栝蔞根主之太陽証身體拘熱而渇者小柴胡去半夏為風温栝蔞根湯主之有汗而渇者屬陽明白虎加人參湯主之虚人老人及春秋月可與竹葉石膏湯陽明病但頭汗出小便不利渇飲水漿身必發黄菊東湯小柴胡去半夏加人參栝蔞根湯傷寒身熱或發熱惡風而渇屬少陽少陽脇下硬不大便而舌上白胎而渇小柴胡去半夏加人參栝蔞根湯自利而渇屬少隂傷寒熱入於臟流於少隂之經少陰主腎腎惡燥故渇而飲引少陰下利咳而嘔汁猪苓湯主之不利欲飲水者以有熱也白頭翁湯主之切戒太陽証無汗而渇者不可與白虎湯仲景云渇欲飲水無表証者白虎加人參湯脉浮發熱無汗是表未解也不可與白虎湯意以小青龍去半夏加栝蔞也傷寒四五日身熱惡風脇下不滿手足温而渇者小柴胡去半夏加栝蔞人參也陽明証汗多而渇者不可與五苓散汗多胃中燥者茯苓復利小便故也意以竹葉湯與之仲景云陽明病發作者有時汗出多言急下之然太陽病渇終不可與白虎湯陽証得汗後脉洪大而渇者方可與之也陽明病渇終不可與五苓散陽明証小便不利汗少脉浮而渇者方可與之此皆仲景之妙也仲景猪苓湯証亦云脉浮發熱渇飲水小便不利者猪苓湯主之凡病非大渇不可與水小渇咽乾者小小飲滋潤之令胃中和若大渇煩躁甚能飲一斗者與五升飲之若全不與則乾燥無由作汗發喘而死常人見因渇飲水得汗小渇遂劇飲之致停飲心下滿結喘死者甚衆當以五苓散或陷胸丸與之金匱要畧云得時氣至五六日而渇欲飲水水不能多不當與也何者以腹中熱尚少不能消之便更為人作病矣至七八日大渇欲飲水猶當依証與之常令不足勿極意也凡人但見仲景云得病反能飲水此為愈遂小渇者乃強飲之因成其禍不可勝數大抵傷寒水氣皆因飲水過多所致水停心下氣上乗心則為悸為咳結於胸脇則為水結胸胃中虚冷則嘔為噦令氣相搏則為噎上迫於肺則為咳漬入腸中則為利邪熱所搏畜於下焦則為小便不利小腹滿或裏急溢於皮膚則為腫若陽毒倍常燥盛大渇者黒奴丸主之中暑伏熱深累取不瘥其人發咳不已酒蒸黄連丸主之傷寒有所不利者行之取其滲泄也渇而飲停者有燥而煩渇者有病氣去而水氣不得行者其表裏得見煩躁口燥欲飲水水入即病氣去而水氣不得亂頭痛發熱身疼痛欲飲水者有發熱汗出復惡寒不嘔心下痞者並宜五苓散其脉浮發熱渇欲飲水小便不利少陰病下利六七日咳而嘔渇心煩不得卧者宜與猪苓散其大病瘥後從腰以下有水氣者牡蠣澤㵼散此利水道滲洩之意也口燥咽乾脾臟有熱則津液短少故令口燥而舌乾仲景云傷寒無熱口燥渇而煩背㣲寒者白虎湯加人參也又云陽明病渇欲飲水口乾舌燥者白虎加人參湯主之若咽乾者慎不可發汗發汗則重亡津液少陽症口苦咽乾者小柴胡主之少陰証口燥咽乾者急下之病人黙黙欲眠目不能閉起居不安其聲嘶或咽乾者當作狐惑治之狐惑証在第十一卷第十三問方人參散治傷寒大汗後煩渇熱不解脉大者人参一兩去蘆頭知母一兩甘草半兩炙㣲赤剉石膏二兩右搗粗羅為散每服五錢水一大盞入生薑半分煎至五分去滓不計時温服猪苓湯治傷寒脉浮發熱渇欲飲水小便不利猪苓去黑皮赤茯苓秦艽去蘆頭滑石澤㵼以上各一兩甘草半兩炙㣲赤剉右搗粗羅為散每服五錢水一大盞煎至五分去滓不計時温服犀角散出聖惠方治傷寒身體大熱小便黄赤煩渇不止心中悶絶言語錯亂睡多驚恐犀角屑一兩人參三分去蘆頭赤茯苓半兩茵陳半兩細辛半兩陳橘皮半兩湯浸去白穰麻黄半兩去根節甘草半兩炙㣲赤剉右搗粗羅為散每服五錢水一大盞入生薑半分煎至五分去滓不計時温服黄芩散出聖惠方治傷寒吐下後内外有熱煩渇不止黄芩人參去蘆頭甘草炙㣲赤剉麥門冬去心柴胡去苖葛根以上各一兩剉桂心半兩右搗粗羅為散每服二錢水一中盞入生薑半分棗二枚煎至五分去滓不計時温服栝蔞根散出聖惠方治傷寒大腸秘澁煩躁不止栝蔞根一兩黄芩一兩人參半兩去蘆頭川大黄一兩剉碎㣲炒梔子仁半兩川芒硝一兩甘草半兩炙㣲赤剉右搗粗羅為散每服五錢水一大盞煎至五分去滓不計時服如人行十里再服以利為度治傷寒下後煩渇冝服此方出聖惠方麥門冬一兩去心五味子一兩人參一兩去蘆頭甘草一兩炙㣲赤剉聖濟作半兩石膏一兩右搗粗羅為散每服三錢水一中盞煎至五分不計時去滓温服土𤓰根散出聖惠方治傷寒煩渇不止土𤓰根一兩麥門冬一兩去心甘草半兩炙㣲赤剉枇杷葉半兩拭去毛炙兩㣲黄聖濟作一右搗粗羅為散每服四錢水一中盞煎至六分去滓不計時温服聖濟名麥門冬飲黄耆散出聖惠方治傷寒煩渇不止黄耆剉麥門冬去心黄芩葛根剉柴胡去苗人參去蘆枇杷葉拭去毛炙㣲黄梔子仁赤茯苓赤芍藥甘草炙㣲赤剉各半兩右搗粗羅為散每服五錢水一大盞入生薑半分煎至五分去滓不計時温服茵陳散出聖惠方治傷寒頭項汗出身體無汗小便不利渇欲飲水者是瘀熱在裏身欲發黄茵陳梔子仁川大黄剉碎㣲炒滑石木通剉以上各一兩甘草半兩炙㣲赤剉右搗粗為散每服五錢水一大盞煎至五分去滓不計時温服如人行十里再服以小便快利為度石膏湯出聖惠方治傷寒已大汗後不利其人煩渇不解其脉洪大石膏知母地骨皮甘草炙㣲赤剉人參去蘆頭各一兩右搗粗羅為散每服五錢水一大盞入粳米一百粒煎至五分去滓不計時温服麻黄散出聖惠方治傷寒壯熱煩渇頭痛麻黄去根節葛根剉知母柴胡梔子仁陳橘皮湯浸去白穰焙甘草炙㣲赤剉以上各半兩石膏二兩右搗粗羅為散每服三錢水一中盞入生薑半分煎至五分去滓不計時温服麥門冬散出聖惠方治傷寒下後上氣煩渇不止麥門冬去心五味子人參去蘆頭葛根剉甘草炙㣲赤剉石膏芎藭桑根白皮剉各一兩右搗粗羅為散每服五錢水一大盞煎至五分去滓不計時温服半夏散出聖惠方治傷寒嘔吐煩欲飲水半夏三分湯洗七遍去滑蘆根一兩剉赤茯苓澤㵼三分桂心半兩甘草一分炙㣲赤剉麥門冬三分去心右搗粗羅為散每服三錢水一中盞入生薑半分煎至五分去滓不計時温服治傷寒頭痛骨節酸疼或已吐下餘熱不盡口乾煩渇麻黄去根節一兩知母一兩半葛根一兩剉甘草一兩炙㣲赤剉石膏二兩半聖濟作一兩半右搗粗羅為散每服五錢水一大盞煎至五分去滓不計時温服聖濟名葛根麻黄湯竹茹飲子出聖惠方治傷寒吐利後煩渇不止青竹茹一雞子大人參半兩去蘆頭烏梅肉二枚右藥細剉水一大盞煎至五分去滓不計時温頻服青箱子丸出聖惠方治傷寒後熱結在胸膈煩渇青箱子二兩外臺作五兩黄芩一兩龍膽草一兩去蘆頭外臺作三兩梔子仁一兩苦參剉一兩黄蘗剉一兩外臺二兩栝蔞根一兩右搗羅為末鍊蜜為丸如梧桐子大每服温水下三十丸外臺秘要有黄連二兩忌猪肉冷水治傷寒心神熱燥口乾煩渇出聖惠方秦艽一兩去苖右細剉以牛乳一大盞煎至六分去滓不計時温分二服又方出聖惠方栝蔞二兩右搗粗羅為散每服三錢水一中盞入新竹葉二十七片煎至五分去滓不計時温服聖濟不用竹葉知母湯出聖濟總録治傷寒數日不解心躁煩亂小腹脹急臍下悶痛大渇喘知母焙芍藥麥門冬去心焙柴胡去苖澤㵼各三分石膏一兩半黄芩去黒心甘草炙各半兩右搗粗篩每服三錢水一盞入生薑一棗大拍碎竹葉三七片同煎至七分去滓食後温服葛根飲出聖濟總録治傷寒頭痛躁渇不得眠睡四支煩痛葛根剉黄芩大青石膏碎人參各一兩甘草炙半兩右搗粗篩每服三錢水一盞煎至六分去滓温服葛根石膏湯出聖濟總録治傷寒下後頭疼口乾煩渇葛根剉麥門冬去心焙黄芩去黒心升麻各一兩石膏碎一兩半甘草炙半兩右粗搗篩羅每服三錢水一盞煎至七分去滓温服不計時黄芩蘆根湯出聖濟總録治傷寒吐下後内外有熱煩渇不止黄芩去黒心蘆根人參赤茯苓去黒皮各一兩桂去粗皮半兩右搗粗篩每服五錢水一盞半入生薑一棗大拍碎棗三枚擘破同煎至八分去滓温服不拘時芍藥黄連湯出聖濟總録治傷寒温病吐下有餘熱煩渇不止黄芩去黒心一兩芍藥黄連去鬚麥門冬去心焙各三分栝蔞根半兩甘草炙一分右粗搗篩每服三錢用水一盞煎至六分去滓食後温服葛根鬱金湯出聖濟總録治傷寒熱氣薫蒸臟腑煩渇飲水不休葛根剉鬱金剉石膏碎荆芥穗各一分甘草炙一錢右粗搗篩每服三錢水一盞煎至七分去滓食後臨卧温服升麻飲出聖濟總録治傷寒煩躁大渇飲水不休升麻黄芩去黒心葛根剉柴胡去苗山梔子仁荆芥穗牡丹皮黒