之心煩腹滿卧起不安者梔子厚朴湯主之丸藥大下後身熱不去㣲煩者梔子乾姜湯主之是皆取其吐而湧其熱者也虚煩之狀必中温温然欲吐憒憒然無柰欲其不嘔擾擾亂亂是名煩也非吐則不能已經曰若下後更煩心下濡者為虚煩也梔子豉湯主之脉作結心下滿而煩饑不能食病在胷中瓜蒂散主之二者証均煩也藥均是吐也而有輕重之不同吐下發汗後邪氣乗虚而入煩者則謂之為虚煩與梔子豉湯則是吐劑之輕者不因吐下發汗後邪氣結胷中則為膈實與瓜蒂散則是吐劑之重者又陽明病不吐不下心煩者則是煩之實者也與調胃承氣湯下之傷寒二三日心中悸心煩者則煩之虚者也與小建中湯補之煩為熱也悸而煩復為主者以悸為虚悸甚而煩故為虚也少陽之邪入腑者煩而悸則為熱也大抵先煩而悸者是為熱也先悸而煩者是為虚也内經曰治病必先求其本誠哉是言也又云傷寒病後躁煩者有虚煩有穀煩陽氣偏多謂之虚煩病瘥後食穀太早心虚不勝穀氣胃内蒸熱謂之穀煩若陰陽和調則虚煩自己損其穀食則穀煩者瘥活人書云不惡寒身不痛頭不疼脉不𦂳但煩熱者此多虚煩諸虚煩熱與傷寒相似然不惡寒身不疼痛故知非傷寒也不可發汗頭不疼脉不𦂳數故知非裏實也不可下如此者内外皆不可攻攻之必遂損竭多死者也此虚煩但當與竹葉湯若嘔者與橘皮湯一劑不愈再與之孫真人云此法數用甚有效傷寒虚煩宜服王叔和云有熱不可大攻攻之熱去則寒起並宜服竹葉湯方竹葉湯治虚煩狀似傷寒但不身疼痛不惡寒或得汗亡津液燥熱未解内外皆不可攻者汗與竹葉湯嘔與橘皮湯渇與五苓散竹葉半把石膏碎四兩半夏湯洗去滑切焙三分人參半兩麥門冬去心二兩甘草炙半兩右剉如麻豆大每服五錢以水一盞半入粳米一百餘粒生薑半分拍碎同煎取八分去滓温服并解暑毒陰証傷寒未解人勿服若表裏俱虚下利發熱去石膏加附子煎名既濟湯濟生除石膏粳米加茯苓小麥治傷寒大霍亂吐㵼後心虚煩悶梔子豉湯出聖濟總録治傷寒發汗後虚煩不得眠劇者必反覆顛倒心中懊憹宜服梔子豉湯又傷寒發汗若下之煩熱胸中窒痛亦宜服梔子豉湯又傷寒下利後更煩按之心下濡者虚煩也亦冝服之發汗若下之而煩熱胸中窒者梔子豉湯主之仲景云用梔子豉湯病人舊㣲溏者不與之梔子十四枚去皮豉四合右剉如麻豆大每服三錢水一盞煎至六分去滓温服得快吐止後服烏梅湯同前治傷寒大病瘥後體虚煩滿烏梅取肉山梔子仁甘草炙葛根各半兩右搗粗篩每服五錢水一盞入豉二七粒同煎至半盞去滓早晚食後温服麥門冬飲同前治傷寒汗後虚煩心神不寧麥門冬去心焙柴胡去苗防風去蘆半夏湯洗去滑薑汁製赤茯苓去黑皮犀角鎊各半兩右搗粗篩每服五錢水一盞半入生薑五片煎至八分去滓温服人參湯同前治傷寒汗後虚煩心中滿悶腹脹㣲喘人參白茯苓去黑皮杏仁去皮尖雙仁細研各半兩右除杏仁外剉如麻豆大每服三錢水一盞半入粳米百餘粒同煎米熟去滓温空心服麥門冬湯同前治傷寒後不解或寒或熱四肢瘦弱飲食不能胸中煩滿虚躁麥門冬去心焙赤茯苓去黒皮人參白术各一兩桂去粗皮半兩陳橘皮去白炒一兩甘草炙半兩地骨皮黄耆剉各一兩右粗搗篩每服五錢水一盞半煎至八分去滓温服日再厚朴飲同前治傷寒發汗後氣虚心煩腹滿痰逆不思飲食厚朴二兩去粗皮薑汁製甘草炙半夏薑汁製人參陳橘皮去白焙各一兩右粗搗篩每服五錢水一盞半生薑五片同煎至七分去滓空心服薏苡仁湯同前治傷寒汗後煩滿多睡小便赤色薏苡仁酸棗仁防風去蘆人參甘菊花地骨皮紫蘇子甘草炙白茯苓去黑皮各一兩右粗搗篩每服三錢水一盞入荆芥薄荷生薑各少許同煎七分去滓温服睡多冷服不睡熱服人參飲同前治傷寒汗後煩滿氣虚心神不寧人參赤茯苓去黑皮陳橘皮去白焙白术剉炒各一兩右粗搗篩每服五錢水一盞生薑三片煎至七分去滓温服日三麥門冬茯苓飲同前治傷寒後煩滿心神恍惚不得眠卧麥門冬去心焙赤茯苓去黑皮知母焙芎藭酸棗仁㣲焙陳橘皮去白焙檳榔剉甘草炙各一兩右粗搗篩每服五錢水一盞半入生薑五片煎至一盞去滓温服日三柴胡湯出聖濟總録治傷寒後虚勞煩熱驚悸不得眠睡柴胡去苗半兩酸棗仁㣲炒二兩逺志去心一分當歸防風去蘆人參生乾地黄芎藭各半兩麥門冬去心焙半兩甘草炙剉茯神去木猪苓去黑皮桂去粗皮黄耆剉各半兩右粗搗篩每服三錢水一大盞生薑三片煎至七分去滓温服空心日二服人參湯同前治傷寒後虚勞不得眠煩悶四肢乏力人參一兩酸棗仁㣲焙三兩當歸切焙芎藭剉桂去粗皮甘草炙剉柴胡去苗白茯苓去黑皮石膏碎各一兩右粗搗篩每服五錢水一盞半生薑三片煎至一盞去滓食前温服六神湯同前治傷寒虚煩不安人參白茯苓去黒皮防風去蘆百合黄耆剉乾山芋各二兩右粗搗篩每服三錢水一盞煎至七分去滓温服不拘時酸棗仁湯同前治傷寒後虚煩不得眠卧頭目昏眩酸棗仁炒三兩麥門冬去心焙二兩地骨皮剉一兩右粗搗篩每服三錢水一盞生薑三片同煎至七分去滓温服不拘時茯神散同前治傷寒後虚煩心腹不快茯神去木柴胡去苗陳橘皮去白焙甘草炙各一兩右粗搗篩每服五錢水一盞半煎取八分去滓温服不拘時黄連一物湯同前治傷寒不解恐服藥太多大小便不利虚煩不安黄連一兩剉碎生薑數片入酒少許㣲炒右作一服水一碗煎七分去滓徐徐冷熱皆可服一物黄連瀉心湯易老隨証加減列於後煩者加梔子燥者加香豉嘔者加半夏滿者加甘草腹痛加芍藥脉遲加附子大便硬加酒浸大黄用乾薑附子先煎另熱不僭也後另煎黄連與黄連薑附同用少陰渇逆者失下也陰消將盡陽逆上行使陰不納也或舌攣言語不正及昏冒與咽喉痛者少陰也速下之大承氣湯若陽極脉㣲將盡者不宜下宜㵼心湯凉膈散去硝清肺亦可飲水多心下痞渇别則無惡候者五苓散主之地仙散同前治大病後煩熱不安及一切虚勞煩熱病冝服之地骨皮去木二兩防風去蘆一兩甘草炙半兩右㕮咀每服四錢水一盞薑五片煎八分不拘時温服枳實柴胡湯出濟生方治虚煩昏悶嘔逆惡心往來寒熱胷膈捫之即痛日晩所發潮熱者枳實半兩麩炒令紫色取瓤柴胡去苗二兩黄芩一兩半人參半兩甘草炙一兩半右杵為粗末每服四錢水一盞半生薑三片棗一枚同煎至七分去滓温服日三不拘時大橘皮湯出活人書治動氣在下不可發汗發汗則亡陽心中大煩骨節疼痛目運惡寒食則反吐穀不得入先服大橘皮湯吐止後服小建中湯甘草炙半兩人參一分竹茹半升橘皮一兩半去白右剉麻豆大每服五錢生薑四片棗子一枚水二盞煎取一盞去滓分二服傷寒譫語論夫傷寒不應發汗而汗之遂致亡陽津液内耗胃中燥實令譫語此或由津液不和内有燥屎或三陽合病或瘀熱蓄血在裏或婦人熱入血室皆使譫語則身當有熱脉屬胃胃者足陽明經也陽明為病主身熱故譫語妄言則身當有熱脉當洪大而洪大亦陽脉也故其病為順若譫語而手足四厥脉反沉細而㣲者為逆也然又有鄭聲者取其鄭重之意與譫語相類盖古人以此分虚實醫者當以脉證參合别之不可不慎故謂虛則鄭聲實則譫語傷寒四五日脉沉喘滿沉為在裏而反發汗其津液越出大便為難表虚裏實久久則成譫語發汗後重發其汗亡陽亦為譫語其脉反和者不死陽明病下血而譫語者此為熱入血室但頭汗出當刺期門隨其實者而㵼之濈然汗出者則愈病苦譫言妄語人身熱脉當洪大者生沉㣲細手足四逆者死也傷寒譫語何以明之譫者謂喃喃而語也又狂譫謂妄有所見而言也斯皆真氣昏神緒不清之所致夫心藏神而主火病則熱氣歸焉傷寒胃中熱盛上乗於心心為熱冐則神昏亂而語言多出識昏不知所以然遂言無次而成譫妄之語輕者睡中呢喃重者不睡亦語言差謬有譫語者有獨語者有狂語者有語言不休者有言亂者此數者見其熱之輕重也譫語與獨語雖間有妄錯之語若與人言有次是熱未至於極者也經曰獨語如見鬼若劇者發則不識人是病獨語未為劇者狂語者熱甚者也由神昏而無所見覺甚則至於喊呌而言語也言語不休者又其甚也至於言亂者謂妄言罵詈善惡不避親疎為神明已亂也經曰諸逆發汗㣲者難差劇者言亂是難可復制也譫語之由又自不同皆當明辨之有被火刼譫語者有汗出譫語者有下利譫語者有下血譫語者有燥屎在胃譫語者有三陽合病譫語者有過經譫語者有亡陽譫語者經曰大熱入胃中水竭燥煩必發譫語又腹滿㣲喘口乾咽爛或大便秘則譫語是因被火刼譫語者汗出譫語此為風也湏下之過經可下之下之若早語言必亂以表虚重實故也是汗出譫語者也下利譫語者有燥屎也小承氣湯主之是下利譫語者也下血譫語者此為熱入血室當刺期門隨其虚實而㵼之是下血譫語者也譫語潮熱不能食者胃中必有燥屎五六枚也是謂燥屎在胃譫語者也腹滿身重難以轉側口不仁面垢譫語遺尿是三陽合病譫語者也過經譫語者熱也當下之是過經譫語者也發汗多亡陽譫語不可下與柴胡桂枝湯和其榮衛是以有通津液後自愈是亡陽譫語也諸如此脉短則死脉自和則愈又身㣲熱脉浮大者生逆冷脉沉細不過一日死實則譫語氣收斂在内而實者本病也或氣上逆而喘滿或氣下奪而自利者皆為逆也經曰直視譫語喘滿者死下利者亦死謂其正氣脫絶也能知虚實之診能識逆從之要治病療病則不失病人有譫語有鄭聲二証鄭聲為虛當用温藥白通湯主之譫語為實當須調胃承氣湯主之服調胃承氣湯而譫語止或更衣者停後服不爾再與之仲景云實則譫語虚則鄭聲重語也世多不别然譫語鄭聲亦相似難辨須更用外證與脉别之若大小便利手足冷脉㣲細者必鄭聲也大便秘小便赤手足温脉洪數者必譫語也以相參然後用藥萬全矣大抵傷寒不應發汗即譫語仲景云傷寒四五日脉沉而喘滿沉為在裏反發其汗津液越出大便為難表虚裏實則譫語譫語屬胃胃和則愈不和煩而躁宜服調胃承氣湯然亦有三陽合病譫語者三陽合病腹滿身重難以轉側口中不仁面垢譫語遺尿其脉必滑石不可汗下宜白虎湯有胃實譫語者病人身發熱汗出大便硬為胃實宜調胃承氣湯大承氣湯大承氣湯去芒硝尤穏或汗發多亡陽譫語者仲景云發汗多亡陽譫語者不可下此為津液不和與柴胡桂枝湯和其營衛以通津液後自愈恐人作燥屎攻之不可攻也下利譫語為有燥屎脉不㣲細即須下之用小承氣湯譫語而利不止則不治又汗出譫語者風也須候其過經乃下之瘀血譫語者狂言潄水大便黒小便多遍身黄小腹滿縁當汗蓄熱在裏熱化為血故爾輕者犀角地黄湯重者桃仁承氣湯抵當丸有下後譫語者傷寒八九日下之胷煩滿驚小便不利譫語身重不可轉側者柴胡加龍骨牡蠣湯有婦人熱入血室譫語者婦人傷寒發熱經水適來晝日明了暮則譫語如見鬼状者此為熱入血室無犯胃氣及上二焦速用小柴胡湯治之若行陽遲致入胃冷津燥中焦上不榮成血塊結胷状須當針期門也若婦人中風發熱惡寒經水適來入血室也當刺期門隨其實而取之已上二焦熱結在期門也若犯胃氣盡夜譫語喜妄小腹滿小便利屬抵當湯也發少陽汗則譫語經云汗之則譫語甚謂少陽也下之則額上汗手足逆冷謂下之早也發汗多亡陽譫語不可下柴胡桂枝湯主之火刼譫語口乾煩躁喘滿小柴胡加黑豆大便秘譫語不惡寒反惡熱白虎湯又問仲景云無犯胃氣何也答曰熱因經水適來乗虚入實故血室有熱遂令譫語當以小柴胡解之則與胃實譫語不同胃實有燥糞故宜調胃承氣湯下之若血室有熱譫語非胃家實仲景恐人作胃實攻之故曰無犯胃氣也大抵譫語是熱屬陽反見陰証者逆方枳實湯治傷寒脉沉在裏而反發汗津液越出大便難甚表虚裏實遂發譫語其人如狂枳實去瓤麩炒木香各一分朴硝三分大黄剉㣲炒一兩甘草炙半兩右粗𢷬篩每服五錢水盞半煎至七分去滓温服犀角湯治傷寒邪熱在胃譫言妄語身體壮熱犀角鎊大青人參各三分逺志去心一分升麻一兩半柴胡去苗甘草炙剉半兩黄芩去黑心各一兩右粗𢷬篩每服五錢水一盞半入生薑半分拍碎蘆根茅根各五寸同煎至半盞去滓温服一方無生薑芎藭湯治傷寒裏實譫語狂妄芎藭三分大黄炒剉各一兩甘草炙剉半兩右粗𢷬篩每服五錢水一盞半煎七分去滓温服柴胡湯治傷寒熱實煩躁譫語柴胡去苗人參黄芩去黑心各一兩犀角鎊朴硝茯神去木各三分甘草炙剉半兩右粗𢷬篩每服五錢水一盞半煎七分去滓温服人參柴胡湯治傷寒經六七日不解黙黙煩心腹中乾燥大腹結澀譫言妄語人參三分柴胡去苗一兩芍藥知母黄芩去黑心大黄剉㣲炒萎蕤半夏湯洗七遍焙甘草炙各半兩右粗𢷬篩每服五錢水一盞半入生薑一分拍碎同煎至七分去滓温服黄芩散治傷寒煩熱不解譫言妄語欲發狂走黄芩去黑心甘遂麩炒黄龍膽去蘆頭各一兩右粗𢷬篩為散每服一錢冷水調下更令病人飲水三兩盞腹滿則吐之此方療積熱之甚栝蔞散治傷寒發熱煩躁言語譫妄目赤口乾心神恍惚栝蔞根二兩鬱金甘草生各一兩右𢷬羅為散每服一錢生薑蜜水調下不拘時柴胡桂枝湯治傷寒發汗多亡陽譫語不可下與此和其營衛以通津液後自愈柴胡去苗四兩桂去粗皮黄芩去黑心芍藥人參各一兩半半夏湯洗七遍焙甘草炙各一兩右剉如麻豆大每服五錢水一盞半入生薑半分拍碎大棗三枚擘破同煎至七分去滓温服日三人參湯治厥陰病亡陽譫語驚狂者人參茯苓各二兩甘草菖蒲當歸紫石英熟地黄各一兩右以水五升煮取二升去滓温服七合人參柴胡湯治傷寒不分陽陰汗下太早為紅靨發大熱并譫語不得安寧宜服之人參二兩柴胡麥門冬去心各二兩右㕮咀分作三服水一大碗煎至七分去滓冷服熱亦可滓再煎犀角散出聖惠方治傷寒邪熱在胃譫語錯亂犀角屑川升麻柴胡去苖葛根剉川芒硝各一兩一方用馬牙硝甘草炙㣲赤剉藍葉各半兩右為散每服四錢以水一中盞煎六分去滓不拘時温服柴胡散出聖惠方治傷寒譫語頭疼壯熱百骨節疼痛柴胡去苗赤芍藥知母梔子仁各一兩川升麻黄芩大青川大黄剉碎㣲炒杏仁湯浸去皮尖雙仁麩炒㣲黄甘草炙㣲赤剉各三分石膏四兩右粗羅為散每服四錢以水一中盞入豉五十粒煎六分去滓不計時温服黄藥散治傷寒發熱面目赤黄煩躁欲走如見鬼神譫語不禁黄藥川大黄剉碎㣲炒梔子仁人參去蘆頭㯽榔鬱金甘草炙㣲赤剉龍膽去蘆頭犀角屑各半兩川朴硝二兩紫苑一兩右細羅為散每服二錢以雞子清調下蜜水調下亦得用不拘時服漢防己散出聖惠方治傷寒熱毒逼心譫語見鬼不安漢防己半兩桂心防風去蘆頭各三分甘草半兩炙㣲赤剉地黄二斤研絞取汁右搗羅為末入地黄汁中更入水一大盞調勻入銀器中盛於甑上蒸半日取出每服三合以温水調下不計時又方出聖惠方犀角屑一兩黄連半兩茯神三分甘草半兩炙㣲赤剉右粗為散每服五錢以水一大盞煎五分去滓不計時温服生地黄散出聖惠方治傷寒心膈熱毒煩悶譫語失度生地黄三兩𤣥參赤茯苓各一兩半麥門冬去心川升麻各一兩甘草半兩炙㣲赤剉右𢷬羅為末每服五錢以水一大盞煎五分去滓不計時温服又方出聖惠方治傷寒經五六日未經發汗大便結澀譫言妄語煩躁不安前胡去蘆頭葛根各一兩剉川大黄二兩剉碎㣲炒右為粗散每服四錢以水一中盞煎至六分去滓不計時温服以利為度葛根散出聖惠方治傷寒熱毒在裏譫言妄語體熱心躁葛根剉黄芩各一兩川大黄二兩剉碎㣲炒柴胡去苗犀角各一兩甘草半兩炙㣲赤剉右為散每服四錢以水一中盞煎至六分去滓不計時温服以通利為度赤茯苓飲出聖惠方治傷寒心臟虚熱譫語恍惚不定赤茯苓一兩半牡蠣一兩燒為粉龍骨一兩半黄芩一兩右為粗散先以水二大盞入羊心一枚煮熟去羊心次入藥五錢生薑半分煎至七分去滓不計時温服分為二服大承氣湯出聖惠方治傷寒陽明病譫語有潮熱不能食者必有燥糞在膓胃若能食者但耳聾宜服此湯下之川大黄二兩剉碎㣲炒川芒硝一兩半枳實三分麩炒黄厚朴一兩去粗皮塗生薑汁炙令香熟右為散每服四錢以水一中盞煎至六分去滓温服如人行五里再服以利為度鉛霜散出聖惠方治傷寒得汗後心狂譫語欲走鉛霜細研馬牙硝人參去蘆頭鬱金茯神各半兩甘草一分炙㣲赤剉右細羅為散每服二錢不計時煎麥門冬湯温調下鬱金散出聖惠方治傷寒發班譫語大便不通心腹脹滿欲走鬱金三分川大黄一兩半剉碎㣲炒梔子仁三分柴胡去苗半兩甘草一分炙㣲赤剉犀角屑半兩右細羅為散每服二錢煎葱豉湯下如人行十里再服大便通利為度朱砂散出聖惠方治傷寒伏熱在心脾譫言状如癡人朱砂細研太陰元精各半兩細研犀角屑一兩鉛霜半兩細研紫石英三分細研水飛過人參去蘆頭赤茯苓防風各一兩去蘆頭訶梨勒皮三分右細羅為散入上件四味同研令勻每服二錢葱湯調下不計時傷寒發斑論夫傷寒發斑陽盛故也其病在表或未經發汗或已發汗未解或吐下後邪熱不除毒氣内盛因表虚熱毒乗虚出於皮膚發為斑疹如錦紋若色赤及發在五日内者可治若色黑過七日乃發難治甚則喉舌身體皆成瘡也歌云温毒成斑肌肉焦石膏一劑毒須消若還黑毒乗虚出疹痘斑瘡别有條大抵發斑不可用表藥盖表虚裏實若發其汗重令開洩則斑爛也咽痛元參升麻湯斑出大青四物湯又名阿膠大青湯又猪膽雞子湯近用升麻葛根湯最良下部生瘡咳而下利嘔吐青汁眼赤口瘡者黄連橘皮湯斑瘡豌豆黄連一物煮濃汁服大妙青黛大如棗服之又青木香煮湯汁服瘡出煩疼者五物木香湯犀角大青湯芒硝猪膽塗瘡法証治論化証湯乃白虎加人參湯别名也孫兆用紫雪有下証者調胃承氣湯又云温毒渾身似錦紋發斑癮疹嘔吐頻或時咳逆心煩悶冬感於寒發在春温毒黑膏方嘔青汁者葛根橘皮湯夫熱病在裏已發汗未解或吐下後熱毒氣不散煩躁譫語此為表虚裏實熱燥於外故身體發斑如錦紋凡發斑不可用發表藥令瘡開洩更增斑爛表虚故也又歌曰血如温毒黑膏良熱病重陽别有湯裏實表虚因發出若還發汗愈增瘡病証屬陽誤投温藥或當汗不汗或當下不下或當汗下未解陽熱内然蒸濕外迫熱毒入胃以致發斑盖熱必傷血血熱不散裏實表虚由是熱氣乗虚出於皮膚輕則如疿子重則如錦紋是也斑家慎勿發汗汗之重令開洩斑爛又加多也凡斑畧見一二須早圖又曰稍延獨陽絶陰不可救藥其發黑斑者熱劇胃爛無及矣然而斑文方萌與蚊跡類焉又不可誤用藥也發斑多見於胸腹蚊跡多在手足之間闗前陽脉洪大病人昏潰先紅後赤者斑也陽脉不洪病人自静先紅後黄者蚊跡也發班屬陽陽毒具而陰脉形或大極自利或怫鬱氣短而燥糞久不得通盧扁復生莫能施其巧温毒發斑冬月冒寒至春間陽盛則發病凡吐下而表未解毒未消也黑膏主之肌肉斑爛咳而心悶下利嘔吐清汁下部病或口瘡黄連橘皮湯葛根橘皮湯熱病發斑時氣發斑大青四物湯猪膽雞子湯陽毒曰重陽發斑有舌乾咽痛者元參升麻湯發斑通用升麻葛根湯敗毒散犀角地黄湯熱多者元參升麻湯加生薑烏梅又黄連一物湯青木香一物湯可擇用有下証者少與調胃承氣湯孫兆用紫雪一劑証治論用白虎加人參湯發斑湯劑須以紫草川芎為佐血熱内結者與小柴胡湯發斑小㸃稀疎色常鮮細者易治或如錦紋瘾起并塌者難治若初發色紅漸次㣲㸃良久㸃又轉其面色肌肉黧晦者斷不可救初發便如黑誌亦然赤斑五死一生黒斑十死凡内外熱熾汗下不解煩悶咳嘔足冷耳聾便是發斑之証方漏蘆散出聖惠方治傷寒斑出瘾疹如錦紋而咳𠻳心神煩悶嘔吐不止漏蘆陳橘皮湯浸去白穰焙前胡去蘆頭麻黄去根節黄芩杏仁湯浸去皮尖雙仁麩炒㣲黄各一兩右為散每服四錢以水一中盞煎至六分去滓不拘時温服黄芩湯出聖惠方治傷寒臓腑壅毒不得宣疎肌膚發斑黄芩大青川升麻石膏以上各一兩梔子仁半兩川朴硝二兩右為散每服五錢以水一大盞半入豆豉五十粒葱白二莖生薑半分煎至五分去滓不拘時温服稍利為度又方出聖惠方犀角屑一兩川大黄二兩剉碎㣲炒梔子仁半兩藍葉一兩川升麻一兩甘草半兩炙㣲赤剉右為散每服五錢以水一大盞煎至五分去滓不拘時温服黄芩散出聖惠方治傷寒十日内未得汗表裏有熱發斑狂言欲走眼目俱黄心中煩悶大便不利黄芩大青川升麻川大黄剉碎㣲炒各一兩甘草半兩炙㣲赤剉茵陳一兩川朴硝一兩梔子仁半兩黄連半兩去鬚右為散每服五錢以水一大盞入竹葉三七片煎至五分去滓不計時温服以利為度大青散出聖惠方治傷寒身面發斑大青一兩半川升麻二兩甘草二兩炙㣲赤剉右為散每服五錢以水一大盞入豆䜴小半合煎至五分去滓温服不計時猪膽雞子湯出聖惠方治傷寒斑瘡欲出脉洪大心躁熱但令患人溺於紙上如金色是也宜服此猪膽汁一合釅醋一合雞子一枚打破去黄右相和煎三兩沸放温頓服強人盡服羸人六七次服汗出愈升麻散出聖惠方治傷寒熱毒不解欲變成斑服此解毒川升麻梔子仁大青黄芩甘草炙㣲赤剉一兩石膏二兩右為散每服五錢以水一大盞入生地黄汁半合煎至六分去滓不計時温服犀角散出聖惠方治傷寒赤斑不止犀角屑麻黄去根節梔子仁黄連去鬚地骨皮甘草炙㣲赤剉馬牙硝鬱金以上各一兩石膏二兩右爲散每服五錢以水一大盞煎至五分去滓不計時温服以瘥為度治傷寒黑斑出不止宜服川升麻一兩黄芩一兩半川大黄一兩剉碎㣲炒犀角屑一兩半川芒硝一兩梔子仁一兩右為散每服二錢煎甘豆湯放冷調下不拘時以差為度天竺黄散治傷寒發斑瘡已出心臟尚有餘熱不除發斑煩躁天竺黄研川升麻子芩茯神去木犀角屑赤芍藥人參去蘆頭鉛霜研以上各半兩麥門冬去心焙乾一兩甘草炙㣲赤剉半兩梔子仁一兩黄連一分去鬚右為散入研了藥令勻每服一錢煎竹葉湯下不計時黄連散治傷寒斑毒不解黄連一兩去鬚犀角屑半兩石膏二兩梔子仁一兩甘草半兩炙㣲赤剉右為散每服四錢以水一中盞煎至六分去滓不計時温服阿膠湯治傷寒一二日及十餘日發黄疸斑出皆主之一名大青四物湯大青四兩甘草半兩炙㣲赤剉黄明膠半兩杵碎炒令黄燥亦用阿膠豉五兩右細剉和勻每服半兩以水一中盞煎至六分去滓不拘時又方大黄三兩甘草二兩杏仁三十粒芒硝五合麻黄二兩黄芩一兩巴豆二十粒右熬𢷬蜜和丸如大豆每服三丸當利毒利不止米飲止之家人視病者亦可先服取利則不相沾染也此丸亦可預合置犀角湯治傷寒熱毒内盛身發赤斑犀角鎊麻黄去根節石膏各一兩山梔子仁一兩半黄連去須三分右搗篩每服五錢水一盞半煎至一盞去滓温服山梔子湯治傷寒發斑心躁煩亂山梔子仁三分大青升麻各一兩阿膠炒令燥半兩右搗篩每服五錢用水一盞半入豉百粒同煎至一盞去滓麻黄葛根湯治傷寒發斑狀如錦紋嘔逆煩悶麻黄去根節葛根剉知母焙陳橘皮湯浸去白焙黄芩去黒心各一兩杏仁湯浸去皮尖雙仁炒甘草炙各半兩右搗篩每服五錢水一盞半去滓温服犀角散治傷寒毒氣外攻皮膚發狂躁熱犀角鎊黄芩去黒心大青馬牙硝另研黄連去鬚麥門冬去心焙各一兩山梔子仁牛黄另研赤茯苓去黒皮天竺黄另研甘草炙各半兩麝香另研一錢右搗研為散每服三錢煎竹葉湯調下不計時石膏湯治傷寒發黑斑石膏一兩半麻黄去根節桂去粗皮一兩半葛根一兩黄連故鞋一隻去土細剉蜀椒去目并閉口炒出汗一分右搗篩每服五錢水一盞半煎至一盞去滓温服衣覆取汗知母湯治傷寒毒氣滋盛蒸於肌膚發為赤斑通身大熱頭痛精神昏亂知母焙牽牛子炒山梔子仁大黄剉炒黄芩去黑心牡丹去心麻黄去根節一兩荆芥穂硝石虎杖射干羗活去蘆頭杏仁各一分連翹半兩半夏一錢以生薑二錢同搗捻作餅子暴乾右搗粗篩每服五錢水一盞半煎至一盞去滓温服黄芩湯治傷寒發斑煩躁除胃内瘀熱黄芩去黑心一兩山梔子仁甘草炙一兩馬牙硝半兩右搗篩每服三錢水一盞煎至七分去滓温服不計時黄連散治傷寒發斑黄連去鬚一兩檳榔剉半兩甘草炙半兩右搗羅為散每服二錢入蜜少許如㸃湯放温服不計時𤣥參升麻湯治傷寒失下不當下之熱毒在胃發斑如錦文甚則煩躁譫語兼治喉閉腫痛升麻𤣥參甘草炙各半兩右剉為散每服五錢水一盞半煎至七分去滓温服温毒亦能發化斑湯治斑毒人參石膏各半兩萎㽔知母甘草各一分右剉散每服五錢水一盞半入糯米一合煎八分取米熟為度去滓温服香䜴湯治肺腑臟暴氣斑㸃香豉一升綿裏熬葱鬚切一兩石膏八兩碎梔子仁三兩擘生薑六兩大青二兩升麻三兩芒硝三兩右切以水六升煮七味取二升五合去滓然後下芒硝分為三服麻黄解肌湯一二日便服之麻黄甘草升麻芍藥石膏各一兩杏仁三十枚貝齒三枚右末之以水三升煮取一升頓服取汗出即愈便食豉粥補虚即宜也又方麻黄二兩黄芩桂各一兩生薑三兩右以水六升煮取二升分為四服葛根解肌湯葛根四兩芍藥二兩麻黄大青甘草黄芩石膏桂各一兩大棗四枚右以水五升煮取二升去滓分為三服㣲取汗升麻湯治大人小兒傷風寒温疫頭痛發熱體疼斑瘡已發未發均可服升麻乾葛甘草芍藥各等分右㕮咀每服五錢水二盞煎七分去滓熱服小兒量與一法加紫草茸煎鼠粘子散治傷寒斑瘡毒氣盛脉洪盛大便秘澁咽膈不利或致疼痛語聲不出鼠粘子炒丹參升麻甘草炙乾薄荷葉右等分每服三錢水二盞半煎至七分去滓不計時服凡似感風熱而咽疼聲重類疹証皆宜服之煮萍飲治斑瘡甚者青萍紫萍各一握凈洗右煮羮吃三服神仙紫雪黄金十兩寒水石石膏各四兩八錢犀角羚羊角各一兩元參一兩六錢沉香木香丁香各半兩甘草八錢升麻六錢右以水五升煮黄金至三升去金入諸藥再煎至一升濾去滓投朴硝三兩二錢㣲大火煎以柳木箆子攪勿停手候欲凝入盆中更下研朱砂麝香各三錢急攪令勻候冷凝成雪也每服一錢細細嚥之普濟方卷一百三十三
