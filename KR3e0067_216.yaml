斛桂心防葵各一兩烏頭半兩右為末蜜和更搗五六千杵丸如梧桐子大飲下十丸日二加至三十丸以知為度黃蓍丸出聖惠方治小便頓數此病有兩種一者小便多而渴飲食漸加至肌肉漸減乏氣力少顔色此是消渴一者小便難數而不至多又不渴食飲亦不異常或不至多能食但稍遇天寒冷即小便多更無别候此是虛冷所至大都兩種俱原腎氣膀胱冷渴不瘥便能殺人腎虛腰冷無所為害若候知是消歇小便數宜服後項等藥煎次服之黃蓍黃連去須土瓜根各五兩玄參六兩括􅌣一方用根地骨皮龍骨菝葜鹿茸炙各四兩牡蠣熬人參桑螵蛸炙各三兩五味子一升右為末煉蜜和丸用後竹根飲下之初服十五丸日二服稍加至三十丸如梧桐子大忌諸肉冷水又竹根飲子筯竹根生茅根蘆根各切五升菝葜切三升石膏一斤杵碎烏梅五十顆生薑切一升竹瀝二升白蜜一升右以水五斗煮取一斗去滓內竹瀝及蜜著不津瓶貯之物下煎丸縱不下丸但覺口乾及渴即飲之不限多少冷暖及前後如熱月即逐日斟酌煎之頓煮恐壞也如不能作此飲且用烏牛乳下丸渴日服丸及飲夜中恐虛熱宜合後小麥麵等十四味煎細細含咽之又小麥麵方用小麥麵五升水硬搜之别於水中揉挺令麵粉盡麵節别成一塊即止以此麵粉汁別器澄停瀝却汁清即以稠粉盛於練袋子中漉著令微生燥生葛根五挺徑三寸長二尺捶碎於水中揉挺令䒴根中粉汁盡别器澄停戒貯一如小麥麵法生括􅌣五升搗如上法胡麻三升去皮熬令熟為散筯竹根一斤生茅根切一斤生蘆根切一斤烏梅五十顆以上用水五斗緩火煎取一升半去滓澄取清冬瓜汁二升生麥門冬汁三升生薑汁一升牛乳一升白蜜二升先取竹根等汁和冬瓜汁以下汁微火上煎減半次內乳牛白蜜又煎六七沸投小麥麵粉生葛粉括􅌣胡麻散於諸汁中和熟攪之勿住手候如稠糖即成成訖止火待冷貯别器中每夜含如此初服一棗大稍稍加至一匙亦任性日日含之欲作丸飲亦得茸香丸出直指方治下焦虛冷尿多或虛勞遺尿或欲出而不禁鹿茸酥炙肉蓯蓉酒浸當歸各半兩龍骨牡蠣灰赤石脂川白薑益智仁巴戟乳香禹餘糧煆醋淬碎為度研細以上各二錢半雞內金七錢半右為末糯米糊丸桐子大每服七十丸空心鹽湯下山茱萸散出聖惠方治小便數日夜無時山茱萸一兩赤石脂肉蓯蓉酒浸一宿刮去粗皮炙乾各二兩萆薢牛膝去苖狗脊牡蠣燒為粉黃蓍木瓜根各一兩右為散每服四錢水一盞煎六分去滓每於食前溫服熟地黃丸出聖惠方治便數飲水多熟乾地黃土瓜根黃蓍菝葜漏蘆地骨皮銼各一兩􅌝􅌣根龍骨桑螵蛸一兩右為末煉蜜和搗三二百杵丸如梧桐子大每服食前以蜜下三十丸亦宜常服牛馬乳妙桑螵蛸散出經驗良方治男子小便頓數稠米泔色此由勞心腎得之有服此藥不中劑而愈大能安神定志桑螵蛸鹽水炙逺志去心菖蒲鹽炙龍骨人參茯神當歸龞甲醋炙各等分一作罷甲右為末每服二錢臨卧時人參湯調服莬絲子丸出危氏方治小便多或不禁莬絲子淘淨油烹焙二兩牡蠣煆取粉一兩肉蓯蓉酒浸二兩五味子一兩附子炮去皮一兩雞肶胵半兩鹿茸一兩桑螵蛸酒浸半兩右為末酒糊為丸如梧桐子大每服七十丸食前鹽湯酒任下菝葜飲出聖惠方方見本門治腎虛客熱小便數多雞肶胵丸出聖惠方治小便多數雞肶胵二兩黃蓍龍骨黃連去鬚麥門冬去心熟乾地黃各一兩土瓜根半兩右為末煉蜜和搗二三百下丸如梧桐子大每於食前以粥飲下三十丸地骨皮飲子出聖惠方治腎中虛熱雖能食小便數多漸加瘦弱地骨皮三兩生乾地黃人參白龍骨黃蓍各一兩麥門冬去心二兩右細研和勻每服半兩以水一大盞入生薑半分小麥半合煎治五分去滓每食前溫服黃連丸出聖惠方治小便數而多亦治熱淋黃連苦參麥門冬土瓜根龍膽右搗篩以蜜丸如梧桐子大每服十丸加至二十丸熟水下良一方無苦參有黃芩又方瞿麥葵子滑石黃苓甘草右切以水六升煮取三升去滓一服六合川方五子丸治小便夜多腳弱老人虛人有此證令人卒死大能耗人精液頭昏不爽莬絲子家韭子益知子茴香蛇床子右等分為末酒糊丸如梧桐子大每服五十七丸糯米飲鹽湯任下龍骨散治小便數而多龍骨桑螵蛸􅌝􅌣根黃連右為散每服於食前以粥飲調二錢雞肶胵丸出聖藏經驗方治小便多及遺尿雞肶胵一兩燒灰存性益知子一兩石菖蒲一兩雞腸一副焙乾右為末酒糊為丸如梧桐子大每服五十丸酒吞下食前服經驗方陳氏云昔先公晚年小水多吳興醫者鍾將任獻此方用之有效治小便多滑數不禁方出儒門事親書白茯苓去黑皮乾山藥去皮白礬水內湛過慢火焙乾各等分右為末稀米飲調下服之治小便數而多方括􅌣一錢黃連五分右為散每服方寸日三良米飲調服治小便頻滑數不禁方出神效方知母黃蘖各等分右銼碎酒浸透炒微黃為末水丸桐子大如服藥前一日休喫夜飲來日空心立服米飲湯下一百丸只服效後喫淡白粥一傾縮泉丸出危氏方治脬氣不足小便頻數天台烏藥益智仁各等分右為末酒煮山藥末糊丸如梧桐子大每服七十丸臨卧用鹽酒送下治小便多數用半夏生薑煎為熟水時呷之蓋半夏益脾土克水故也治小便利用雞腸草一斤於䜴汁中煮調和作羔食之粥亦得治膏疸其人飲少小便多用秦椒一分出汁瓜蒂二分末水服方寸匕日三服治小便多滑數不禁出儒門事親書用金剛骨末以好酒下調三錢服之益智丸出存仁方治心腎不足夜多小便眼見黑花極有神效用益智仁四兩以鹽二兩同炒為末糊丸如梧桐子大每服三十丸用白茯苓甘草煎湯吞服煎服亦得空心食前服萆薢丸出危氏方治小便頻數日夜無時川萆薢洗不拘多少為末酒和丸如梧桐子大每服七十丸空心食前用鹽湯鹽酒任下治小便數氣少走㵼用香附子為末湯酒任下治小便數多或熱痛酸楚手足煩疼用地膚子三兩水四升煎取二升半分作三服治小便數多用胡桃肉一升細米煮粥一升和勻頓服即瘥一方便火炮熟溫酒同嚼卧下治小腸虛冷出聖惠方用雞腸一具治如常法作臛暖酒和飲之一方漿水向北斗服之治尿數而多者方用羊肺一具作羔內少羊肉和鹽豉如食法任性食之不過三具效治小便數而多方以桃仁一味㕮咀酒一升煮三沸去滓分為三服強人一服盡之療小便卒大數作淋令人瘦葛洪後方用石膏半斤搗碎水一斗煮取五升稍飲五合治日夜小便頻數出鄭氏家傳渴酒方鹿茸一對酥炙右為末每服二錢空心溫酒下日三服萆薢丸大益腎氣能治小便頻數萆薢莬絲子白茯苓鹿茸肉蓯蓉黃蓍川巴戟杜仲金毛狗脊益智仁右為末酒糊丸如梧桐子大每服四十丸鹽水飲之人參鹿茸丸治勞心過度心腎不足所以小便頓數津液隨下虛損食少虛煩攻下人參白子仁赤石脂川續斷鹿茸大當歸白茯苓酸棗仁伐赭萆薢乾連肉山藥天麻仁桑寄生右為末煉蜜丸如梧桐子大每服硃砂為衣蓮肉去皮心煎湯早晚進三十四丸水芝丸治下焦真氣虛弱小便頓多日夜無度連實右為細末醋糊為丸如雞頭大每服五十丸酒溫送下食前得之鹿角散出十便良方腎消夜尿七八升用鹿角一具炙令焦搗篩酒服方寸漸加至一半縮泉丸出朱氏集驗方治丈夫小便頻數烏藥益智川椒去目合口者出汗吳茱萸九蒸九煨右等分酒糊丸梧桐子大每服五十丸臨卧湯下雙白丸出朱氏集驗方白茯苓去皮鹿角霜右等分細末酒糊丸梧桐子大每服三十丸空心鹽湯下此二方梁氏總要本又方右䜴一升內於鹽中綿裹之以白礬好者半斤致綿上令蒸之一斗米許時即下白礬得逍入䜴中出暴乾搗末每服方寸一方出鮑氏方以真龍骨白术酒下二錢末利小便出本草以烏犍牛尿半斤空心飲之止小便滑數出本草以烏藥葉及根嫩時採作茶片炙碾煎服之治腹冷夜起出本草以白荆子一升炒熟勿令焦細研以湯浸蒸餅丸如赤小豆大薑湯吞七丸甚效縮小便出本草以顆塊雄黃一兩半研如粉乾薑半兩切碎入鹽四大錢同炒令乾薑色黃同為末蒸餅入水為丸如菉豆大每服十九至二十丸空心鹽湯送下治小便數出本草以羊肥肚作羮食三五度瘥治下氣利小便用麻子炒令香搗碎以小便浸取汁服之今人續布者麻子也治腹冷夜起用象牙末燒灰米飲之治小便白數陽道乏者用牛領藤煮汁酒服之導引法養生方導引法云以兩踵布膝除數尿小便遺失附論夫人之遺尿為心腎二氣之所傳送蓋心與小腸為表裏腎與膀胱為表裏若心腎氣虧陽氣衰冷傳送失度則必有遺尿失禁之患故經云膀胱不利為癃不約為遺是也治之宜補暖下元清心寡欲又有産蓐不順致傷膀胱及小兒胞冷俱能令人遺尿失禁又當隨證施治診其脈來過寸口入魚遺尿肝脈微滑遺亦尿左手關上脈沉為陰絶者無肝脈也若遺尿尺脈實少腹牢痛小便不禁尺中虛小便不楚腎病小便不禁腎病脈當沈滑而反浮大其色當黑反黃此土之克水為逆不治內經言膀胱不約為遺緣其腎虛不能約束水液故小便多甚則下焦傷竭真氣不固而小便不禁也夫人有於眠睡不覺尿出者是其稟質陰氣偏甚陽氣偏虛則膀胱腎氣俱冷不能溫制於水則小便多或不禁而遺尿膀胱足太陽也為腎之府腎為足少陰為臟與膀胱合俱水主凡人之隂陽日入而陽氣盡則隂氣受至夜半陰陽大會氣交則睡卧小便者水液之餘也從膀胱入於脬為小便夜卧則陽氣衰伏不能制於陰所以陰氣獨盛水下不禁故於眠卧而不覺尿出也方家韭子丸出三因方治小腸遺尿及男子虛劇陽氣衰敗小便白濁夜夢泄精此藥補元養氣進美飲食家韭子六兩鹿茸四兩蓯蓉酒浸牛膝酒浸熟地黃當歸各二兩巴戟去心莵絲子酒浸各一兩半杜仲去皮石斛去苗桂心乾薑炮各一兩右為末酒糊丸桐子大每服五十丸加至百丸空心食前鹽湯酒下小兒遺尿多因服寒亦稟受陽氣不足别作小服丸澤㵼散出聖惠方治遺尿小便澀澤㵼牡丹牡蠣燒為粉鹿茸去鹿茸毛桑螵蛸微炒右為散每於食前以酒調下二錢治小便遺失出聖惠方阿膠炒珠子牡蠣煆桑螵蛸酒炙鹿茸酒炙各等分右為末糯米糊丸梧桐子大每服五十粒空心鹽酒下一方治遺尿小便澀無桑螵蛸有桑耳以水七升煮取二升分二服作散以飲送之一方以粥飲調下治遺尿小便澀方出聖惠方桑耳右為散酒服方寸日三服又方出聖惠方漢防己葵子各二兩防風三兩右切以水五升煎取二升米分溫三服作散亦佳阿膠飲出聖惠方治小便遺失不禁阿膠三兩炒牡蠣煆取粉鹿茸各四兩右銼散每服四錢水一盞煎七分空心服或作細末飲調亦妙祕元丹出危氏方治內虛裏寒自汗時出小便不禁白龍骨三兩訶子十箇縮砂一兩右為末糯米粥丸如梧桐子大每服五十丸空心鹽酒下一方有靈砂二兩治失禁出不自覺方用豆醬汁和電突墨如豆大內尿孔中又治胞轉亦治小兒治小便失禁方以水三升煮雞腸取一升分三服一方雄雞腸燒灰為末用三脂一撮溫漿水調下一錢向北斗服更良雞內金散出十便良方治溺床失禁用雞肶胵一具并腸淨洗燒為灰男用雌者女用雄者研細每服方寸酒飲調服一方煮之又方出危氏方用豬胞洗淨鐵鏟上炙香熟嚼細溫酒下治睡中遺不覺方用薔薇根隨多少銼以酒飲之煮汁去滓一方用野白薔薇根戎鹽散出聖惠方治遺尿恆澀戎鹽白礬各三分甘草半兩蒲黃龍骨各一兩鹿角膠二兩右為散每於食前棗湯調下二錢治遺尿小便澀方桑耳龍骨各三等礬石阿膠各二分炙右為散空服米飲方寸七日三療少小睡中遺尿不自覺方用鵲巢中蓐燒水服一錢即瘥鹿角霜丸治上熱下焦寒小便不禁用鹿角帶頂骨者不拘多少鋸作鋌子長三寸洗了用水桶內浸夏三冬五晝夜用清水同入內煮之覺湯少添溫湯日夜不絶候角蘇麋為度輕漉出用力削去皮如雪白放在篩子上候白乾微火焙之其汁慢火熬為膠候角極乾為細末酒糊為丸如梧桐子大每服三十粒至四十粒空心溫酒鹽湯下白薇散出聖惠方治小便失禁白薇白斂白芍藥各一兩右為散每於食前以粥飲調下二錢柏皮湯出聖惠方治小便不禁柏白皮焙乾二升酸石榴枝一握燒灰細研右洗搗柏皮為粗末每服四錢水一盞半煎一盞去滓下石榴枝灰一錢半更煎八分空心服至晚再服療小便卒大數作淋令人瘦出肘後方用不中水豬肪如雞子炙之下取肥汁盡服之為妙此方并療遺尿一方治大便俱不通豬脂水一升煮三沸飲汁立通鵲巢散出聖惠方治小便不禁重鵲巢中草一斤燒作灰細灰如粉薔薇根皮五兩右先搗薔薇根為粗末每服三錢水一盞煎七分去滓調鵲巢灰兩錢空心服牡蠣丸治小便不禁牡蠣白者三兩赤石脂三兩搗碎右同研勻酒煮麵糊丸如梧桐子大每服十五丸空心鹽湯送下黃蓍散治小便不禁黃蓍細銼豬脊去毛牡蠣各一兩三分土瓜根三兩肉蓯蓉酒浸一兩三分赤石脂萆薢朱牛膝山茱萸各二兩半右先搗八味為細散更與赤石脂同研勻每服一錢酒調食前服至午間夜卧各一服漸加至兩錢白茯苓散出十便良方治小便不禁日夜不止白茯苓龍骨甘草炙銼甘薑桂心續斷附子各一兩熟乾地黃桑螵蛸微炒右為散每服四錢水一鍾煎至六分去滓每於食後溫服鹿茸散出聖惠方治小便不禁陰痿腳弱鹿茸一兩去毛羊躑躅酒拌韭子附子桂心澤㵼各一兩右為細末每於食前以粥米飲調下二錢漿水亦可調服當歸湯治氣牽腰皆及脅內痛小腹堅小便不止禁當歸大黃桂各三兩乾薑人參各二兩吳茱萸水浸二兩半甘草白芍藥各一兩右搗篩每服三錢以水一盞煎至七分去滓食前溫服日三鹿茸散治腎藏虛腰臍冷痛夜遺小便鹿茸去毛烏賊魚骨各三兩當歸切焙人參白芍藥龍骨桑寄生各一兩桑螵蛸一兩半右搗羅七味為細末更與龍骨石研令勻每服一錢溫酒調服空心晚臨卧各一蓯蓉丸治腎臟虛冷腰膝無力小便不禁或溺白色肉蓯蓉二兩半杜仲去粗皮一兩半黃蓍二兩桂去粗皮山茱萸牛膝酒浸切焙各二兩韭子去浮者三兩為末鍊蜜和濟入臼內塗酥杵令勻熟丸如梧桐子大每服日空心腹煎黃蓍湯下三十丸至晚再服地黃湯治小便不禁多日便一二斗或如血色麥門冬乾地黃各八黃乾薑四兩蒺梨子續斷桂心各二兩甘草右㕮咀以水一斗煮取二升五合分三服一方治腎消腳細小便數莬絲子散治小便不禁莬絲子酒焙乾微炒一兩蒲黃微炒細研黃連一兩半肉蓯蓉一兩五味子雞肶胵黃皮各一兩右先搗四味為末散再入莬絲子粉與蒲黃同研勻細每服二錢酒調服食前服日三一方久房散有消石一兩米飲調服雞腸散治小便不禁日夜無度黃雞腸雄者四其肉蓯蓉酒浸赤石脂研苦參白石脂黃連各五兩右搗羅四味為細末散更與赤石脂白石脂同研勻細每服二錢酒調服食前日二夜一莬絲子散出十便良方治小便多或不禁莬絲子二兩酒浸三日為末牡蠣燒為粉附子炮製去皮五味子各一兩雞肶胵中黃皮三兩肉蓯蓉二兩酒浸右為末每於食前以粥飲調下二錢乾薑飲治小便不禁乾薑炮製一兩附子半兩芎藭三分桂去粗皮麻黃去根各半兩右銼如緑豆每服四錢每半煎一盞去滓空心服至晚再服治少小睡中遺尿不自覺方雄雞肝桂心各等分右搗丸服如小豆大一枚三日服又方雄雞尿白熬桂心各等分右為末酒服方寸日二亦可除桂心礬石散出於居士選竒方治丈夫婦人遺尿不知出時礬石燒令汁盡牡蠣熬各等分右為末以粟米粥飲服方寸日三一方酒調三錢立效又方用雄雞喉嚨及白雞肶胵裏黃皮燒末麥粥湯盡服亦可以赤雞翅燒末酒飲三指撮日三近效療尿床方取麻鞋乳帶及鼻根等唯不用底須七兩以水七升煮取二升分再服一方以麻底尖頭七為灰嵗朝井花水服療尿床方用羊肚貯水令滿繫兩頭熟煮開取水頓服之即瘥治尿床方用羊胞盛水滿中炭火燒之盡肉空腹食不過四五度瘥又方出十便良方以新炊熱飲一盞㵼尿床處拌與食之勿令知名治老人尿出不知出鄭氏家傳濁方揀草鳥二兩以童便沒七日便再浸去尖皮切碎同鹽炒右為末酒糊丸每服二十丸空心鹽湯下又方出危氏方益智仁一兩鹽炒龍骨四錢别研牡蠣煆紅研末半兩川烏去皮銼半兩川烏同前藥炒川烏黃色為度右研為末酒糊丸每服五十丸川萆薢煎湯吞下固脬丸治小便不禁茴香一兩附子半兩炮去皮尖莬絲子二兩桑螵蛸半兩戎鹽一兩右為末酒麵糊丸如梧桐子大米飲下三十丸治胞損小便不禁白牡丹根皮為末一錢須細花者不然無效白芨為末一錢生絹一尺右同以水煎如錫每服半盞二氣丹治內虛裏寒膀胱積冷小便不禁硫磺細研肉桂去皮為末各一分乾薑炮為末硃砂研為末各二錢附子一箇大者炮去皮臍為末半兩右以麵糊丸如梧桐子大每服五十丸鹽湯空心下治尿失禁以露蜂房水煮服之又方用益智母巴戟二味青鹽酒煮加桑螵蛸莬絲子酒蒸四味為末酒糊為丸服二十丸鹽湯酒任下普濟方卷二百十六
