淋方取絲子以水煮服之可常作飲勿歇也又方取露蜂房燒灰飲服之取碗大者妙又方取雞子二枚去白黃以鹽內殼中使滿以水三升瀆一升絞取汁其殼中鹽投汁中攪令調盡服之療淋不通方取地麥草一名地膚草一把以水二升煎之亦可常服一法但漬䜴汁飲之良琥珀丸以神祐丸加琥珀一兩是也治小便不通以五苓散加滑石末木通燈草煎湯調下八正散治心經邪熱小便赤澀不通用八正散加燈心枳殼車前子地膚草煎服並加半錢五苓散治小便不通壅上心滿用五苓散加燈心十根車前子二兩煎湯調下通心散治心經有熱唇焦面赤發熱小便不通用通心散每服四錢水一盞半燈心十根滑石末一錢麥冬二十粒桑白皮七寸煎去滓再入生車前子汁合攪勻八味丸出危氏方治腎虛小便祕澀不通或過服涼藥者用八味丸每服五十丸溫鹽湯下立效八味丸方見本門小便難類尊氣除燥湯出東坦先生蘭室祕藏方治小便閉塞不通及血澀蓋氣不通而竅澀也知母細銼酒洗二錢黃柏去皮酒洗四兩滑石三錢炒黃細末澤㵼三錢細末茯苓去皮二錢細末右件和勻服稱半兩水三盞煎一盞去滓稍熱服空心如小便閉急不拘時服通關散出東坦先生蘭室祕藏方治不渴而小便閉熱在血方知母二兩黃柏酒洗二兩桂二錢為引用右件為細末煎熱水為丸如雞頭大每服百餘丸或二百丸熱百沸湯下空心宿食消盡服之藥易下行故也如利時前隂中如刀刺之痛有惡物下為效亦或有無時神品藥也紅秫散出朱氏急驗方治小便不通上喘紅秫黍根二兩萹蓄一兩半燈草一百根右㕮咀每服五錢用河水二盞煎至七分去滓溫服空心食前琥珀散出朱氏急驗方治老小便不通琥珀研如粉不拘多少右蜜為丸如梧桐子大每服十丸煎赤茯苓湯下甚者加丸數立通如小便純血只以末二錢煎燈心湯下治小老人小便不通出朱氏急驗方茴香白頸地龍右杵汁傾腦腸中即愈車前散楊氏家藏方除下焦留熱小便不通淋澀作痛已下小便檳榔木通陳橘皮赤芍藥滑石車前子赤茯苓當歸石韋炙去毛丸味各一兩右件㕮咀每服五錢水二盞煎至一盞去滓食前服以利為度未利再服聖餅子出楊氏家藏方治小便不通黃連巴豆半兩去殼不去汁右件同搗為膏捻作餅子大人厚薄如錢先以蔥汁拌鹽滴在臍內次以餅子蓋之上用大艾炷於餅上灸二七壯再換餅子重灸以利為度礬石散出聖氏家藏方治小便不通臍腹急脹白礬不用炙少研細右用水和麵捻作圈子圍臍腹高一寸許內安礬末以冷水逐漸滳礬末上令濕透更以水滴覺內冷透即小便通葵子方出鮑氏方治小便不通小腹脹不治害人葵子車前子白术木通赤芍藥各等分右末米飲下二錢以蔥白細銼炒熱兩帕包更尉小腹立便葵子散出宣明論方治小便不通葵子茯苓去皮各半兩右為末每服四錢水一盞煎三沸食前服蒻葉散出指南方治小便先澀後不通乾蒻葉燒灰滑石半兩右為細末每服三錢七米飲調下空心黃芩清肺湯出衛生寶鑑治因肺燥而得之小便不通黃芩山梔子仁擊破右都作一服水一盞半煎至一盞去滓溫服食後如不利再一服之又不利加鹽䜴二十粒治小便不利臍下滿硬語言塞泄腰痛腳重不能立足也宜用後方出葉陀中藏經方瞿麥頭子一兩官桂一分甘遂三分車前子一兩炒右為末獖豬肝一箇去筋膜薄批開入藥末二錢勻裝濕紙包煨熟空心嚼服酒送下以大便為度小便未利臍腹未軟更服後方用蔥白一寸去心入硇砂一錢安蔥心中兩頭以綿紙濕包煨熟冷醇酒送下空心服以效為度療關膈大小便不通脹滿欲死三日則殺人用芒硝二兩紙裹三四重炭火燒之令內一升湯中盡服當先飲湯一升已吐出乃服之療小便不通出本草用滑石末一升以車前汁和塗臍四畔方四寸熱即易之冬月水和亦得治淋及小便卒不通出本草以龍鬚草席彌敗有垢者佳取方寸尺煮汁服之治小便不通及忍小便久致胞轉出本草取梁上塵三指撮以水服之治小便不通出本草用苦瓜煮汁漬陰括藪瞿麥丸方見本門小便難類治小便不利者有水氣紫草散出保生方治小便澀淋不通用紫草三分搗為散和井花水一盞半頓服治小便澀少用馬齒莧和少粳米醬汁煮食立瘥治小便溺不通右用皂角燒灰水調下一錢二錢立愈治祕澀不通右用蔥一根略去鬚剜一小孔子入不蛀皂角末一匙內之候腹鳴三兩次立隨通大妙小便利多附論夫腎者主水膀胱為府令腎氣傷不足膀胱有寒不能約制水液合津滑氣虛故小便利多久不差者則腎氣傷虧真陽耗損腰脊痠疼身體寒顫羸乏病生小便頻數者膀胱與腎俱虛而有客熱乘之故也腎與膀膀為表裏俱主水腎氣不通於陰此經既虛致受於客熱虛則不能制水故令數小便熱則水行澀澀則小便不快故令數起也診其脈趺陽脈數胃中有熱即消榖引食大便必鞭小便則數方覆盆子丸治元藏虛弱臍腹病痛膝脛少力百節痠疼昏倦多睡小便頻濁頭旋痰延背脊拘急飲食無味溫順藏氣補益下元覆盆子肉蓯蓉酒浸切焙黃蓍五味子補骨脂烏藥石斛去根澤瀉篳澄茄沉香銼巴戟尖一兩熟地黃一兩半芎藭當歸赤芍藥山茱根三分菟絲子酒浸三日搗焙二兩右為末煉蜜和丸如梧桐子大每服二十丸食前溫酒下米飲鹽湯亦得山茱萸丸治腎藏虛憊腰膝無力小便利多山茱萸山芋覆盆子菟絲子酒浸一宿搗焙巴戟尖去心人參楮實五味子一兩半草蔛牛膝酒浸桂天雄去皮胸各一兩熟乾地黃二兩半右為末煉密和搗五百杵丸梧桐子大每三十丸空心食前酒下附子湯治腎氣虛寒小便滑數白术附子炮製去皮乾薑炮桂赤石脂一兩右為末每服一錢空心生薑湯調下日進二服沉香蓯蓉煎丸因真氣虛臍腹疼痛