body:
  text: 普濟方卷三十二明周王朱橚撰腎臟門腎臓風毒流注腰脚附論夫腎臓風毒流注腰脚者其狀腰脚沈重筋脈拘急或作寒熱或為疼痛或發瘡瘍是也葢腎主腰脚風邪客於腎經久而不去風毒流注發於下部故變脚弱之證虎骨酒出聖恵方治腎臓風毒流注腰脚疼痛行立無力虎脛骨二兩塗酥炙黄熟地黄二兩續斷赤箭石斛去根剉防風去蘆牛膝去蘆丹參去蘆桂心當歸剉㣲炒萆薢剉芎藭酸棗仁㣲炒山茱茰五味子漏蘆五加皮仙靈皮附子炮製去皮臍骨碎補海桐皮肉蓯蓉酒浸一宿刮去皺皮炙令乾木香各一兩荆芥川椒去目閉口者炙㣲炒去汗各半兩烏蛇一條五兩用無灰酒浸三宿復取出頭尾皮骨去盡炙㣲黄右都細剉用生絹袋盛以無灰酒三斗浸經七日後每於食前煖一小盞服之牛膝丸出聖恵方治腎臓風毒流注腰脚筋骨疼痛行立艱難牛膝二兩去蘆虎脛骨塗醋炙㣲黄羌活鹿茸去毛塗醋炙㣲黄附子炮製去皮臍熟乾地黄檳榔肉蓯蓉酒浸一宿刮去粗皮炙乾杜仲去皮㣲炒海桐皮當歸㣲炒巴㦸天芎藭薏苡仁防風去蘆頭桂心石斛酸棗仁㣲炒仙靈皮補骨脂㣲炒乾蝎㣲炒天麻木香各三分右為末煉蜜和𢷬三二百杵丸如梧桐子大每服食前以温酒下三十丸木香人參湯出聖濟緫録治腎臓風毒攻四肢頭面腰脚生瘡口苦舌乾形容痩弱涕唾不時心下滿悶肢節怠惰狀如勞疾木香人參黄耆當歸切焙防風去蘆牛膝酒浸切焙桂炙剉荆芥穂巴㦸天去心半夏製用薑汁鼈甲去裙醋炙甘草白茯苓去皮秦艽去苗柴胡去苗各半兩乾蝎全者炒附子炮製去臍羌活去蘆枳殻去瓤麩炒肉豆蔲去殻熟乾地黄焙各三錢右㕮咀每服三錢水一盞葱白三寸切生薑三片同煎至七分臨熟入酒少許不喫酒即入童子小便少許去滓不拘時候温服内補丸出聖濟緫録治腎臓風毒元氣衰憊膀胱冷痿腰胯注痛脚膝無力狼毒濕紙煨附子炮製去臍鹿茸塗酥炙去毛各二兩天麻酒浸炙巴㦸天去心補骨脂㣲炒石斛去根萆薢肉蓯蓉酒浸去皮炒沒藥研桂去粗皮各一兩半乾蠍全者炒蒺藜子炒去角天雄泡裂去皮獨活去蘆乾漆熬去烟各一兩腽肭臍細剉𢷬篩為末四兩用酒五升煎右除膃肭臍外𢷬羅為細末研匀用膃肭臍煎捜和為丸或煉蜜和丸如梧桐子大每三十丸空心温酒或鹽湯送下羌活散出聖濟緫録治腎臓風毒流注腰脚虚痛或上攻頭目昏眩耳聾生瘡及脚氣衝心頭迷悶腹肚堅硬冷汗出者羌活去蘆一兩乾蠍炒三兩楝實剉炒一兩半硇砂飛煉成霜一分桃仁去皮尖雙仁勿用炒附子炮製去皮臍天麻白附子炮桂去粗皮檳榔剉芎藭地龍去土炒木香沈香各一兩阿魏用醋化麵拌作餅子半兩右為散每服二錢温酒送下木瓜丸出聖濟緫録治腎臓風毒氣攻注四肢疼及瘡腫煩熱木瓜切爆乾取二兩附子炒裂去皮臍一兩甘遂麩炒磁石煅醋淬二十遍白牽牛炒羌活去蘆陳皮去白防風巴㦸天去心蘹香子炒木香地龍炒乾薑炮亁蠍炒防己各半兩右為末酒煮麵糊丸如梧桐子大空心温酒送下十五丸㣲利為効萆薢散出聖恵方治腎臓風毒流注腰脚筋脈拘急起動艱難萆薢杜仲去粗皮炙㣲黄牛膝去蘆五加皮檳榔當歸去蘆酒洗酸棗仁防風去蘆肉桂去皺皮附子炮裂去皮臍獨活海桐皮羚羊角屑木香枳殻麩炒黄各一兩右為散每服四錢以水一鍾生薑半片煎至六分去滓温服日三白花蛇散聖濟緫録治腎臓風攻注遍體生瘡皮膚瘙痒白花蛇去皮骨酒浸獨活去蘆丹參蔓荆子蒺藜子炒去角元參秦艽去苗山芋甘草炙剉苦參防風去蘆附子炮裂去皮臍天麻牛膝酒浸切焙各半兩右為末每服二錢温酒調下安息香丸聖濟緫録治腎臓風毒腰脚疼痛隂痿緩弱言語混濁呼吸短氣安息香四兩剉細入胡桃肉四枚酒五升半同浸一宿來日漉出入沙盆研如糊同前酒調攄去滓入銚子内煎磁石醋淬肉蓯蓉酒浸去皮炙巴㦸去心附子炮裂去皮臍蒺藜子炒去角補骨脂㣲炒桃仁湯泡去皮尖炒天麻酒浸各一兩沈香剉桂去粗皮萆薢酸棗仁鹿茸酥炙去毛各三分右為末研桃仁同和匀入安息香煎膏為丸如梧桐子大每服三十丸鹽湯下威靈仙丸王氏博濟方治肝腎氣虚風邪攻注筋骨拘急機闗不利上攻口齒咽喉臭爛生瘡浮腫頭面虛腫下疰脚膝少力筋骨熱疼威靈仙去土藿香葉自然銅煅赤醋淬附子炮裂去皮臍狗脊去毛萆薢漏蘆去蘆肉蓯蓉酒浸去皺皮焙骨碎補去毛牛膝去蘆酒浸一宿焙木鱉子去殻防風去蘆地龍去土炒已上各等分右為細末酒浸煮麵糊和丸如梧桐子大每服十五丸加至二十丸荆芥湯下木瓜酒亦得杜仲丸出聖恵方治腎臓風毒流注腰脚疼痛杜仲二兩去粗皮炙續斷虎骨塗醋炙黄附子炮裂去皮臍各二兩丹參去蘆芎藭桂各半兩萆薢剉牛膝去蘆赤芍藥海桐皮乾蠍㣲炒各三分右為末煉蜜和匀三二百杵丸如梧桐子大每日空心及晩食前温酒下三十丸石斛丸出聖恵方治腎臓風毒流注腰脚疼痛四肢少力不能飲食石斛去根防風去蘆鹿茸去毛塗酥炙㣲黄天雄炮裂去皮臍羌活一兩木香當歸㣲炒附子炮裂去皮臍杜仲去粗皮炙㣲黄各一兩牛膝二兩去蘆仙靈脾桂心各一兩右為末煉蜜和匀三五百杵丸如梧桐子大每服空心温酒下三十丸晩食前再服暖腎散聖經緫録治腎臓氣發動攻腰髓四肢疼痛萆薢茄蜀椒去目及合口者炒出汗乾薑炮各半兩附子炮裂去皮臍桃仁去皮尖炒蘹香子炒桂去粗皮蒺藜子炒去角枳殻去穰麩炒澤㵼檳榔去皮牛膝酒浸去蘆右為散空心温酒調下三錢日再服薏苡仁酒出聖恵方治腎臓風毒流注腰膝拘急疼痛薏苡仁牛膝去蘆各三兩防風去蘆獨活生乾地黄二兩當歸㣲炒酸棗仁㣲炒黄蓍丹參去蘆桂心附子炮裂去皮臍各二兩黒豆五合炒令熟右細剉生絹袋盛用酒三斗漬五七宿後每於食前煖一小盞服之威靈仙散聖濟緫録治腎臓風毒攻注腰脚或瘡腫或痛威靈仙去蘆防風去蘆巴㦸何首烏去黒皮黄耆剉白附子蒺藜炒去角白花蛇去皮骨酒炙白殭蠶炒晩蠶沙炒各半兩右為散每服一錢温酒調下早晨日午臨臥服補元散聖濟緫録治腎臓風毒下注多生熱瘡或頭目虚腫日漸痩牛膝酒浸焙地龍炒去土海桐皮羌活去蘆當歸切焙白芷芎藭白附子炮附子炮裂去皮臍巴㦸天去心各一兩右為散每服一錢用獖猪腎批開入藥末外更入椒鹽少許煨熟空心細嚼用津嚥下葳靈仙丸聖濟緫録治腎經不足風冷乗之腰痛如折或引背膂肉俛仰不利轉側艱難或因役用力過多勞傷於腎或因寢臥冷濕地氣傷於腰或因墜堕損傷或因風寒客搏背冷腰痛葳靈仙去土一兩桂去皮白附子炮當歸酒洗地龍去土炒赤小豆羌活去土各半兩右為末酒煮麵糊和丸如梧桐子大每服二十丸空心或酒或鹽湯下八斤丸聖濟緫録治腎臓風氣攻注腰脚腫痛附子炮去皮臍牛膝酒浸焙天麻酒浸焙當歸焙乾烏頭炮去皮臍白附子炮烏藥五靈脂各一斤右為末蒸木瓜酒入藥一處杵一二千下丸如梧桐子大每服温酒下二十丸至三十丸不拘防風散聖濟緫録治腎臓風上攻下注腫痒脚膝生瘡防風去蘆黄耆旋復花枳殻麩炒羌活獨活去蘆枇杷葉炙去毛蒺藜炒去角各一兩右為散每服二錢空心晩食前温酒調下木香散聖濟緫録治腎氣發動上攻下注青木香蘹香子炒桃仁去皮尖炒丁香蜀椒去目及合口者炒出汗一分蒺藜子陳皮去白檳榔各三分右八味搗羅為散空心温酒下四錢磁石丸和濟方治腎臓風毒上攻頭面浮腫耳鳴眼暗頭皮腫痒太陽穴痛鼻塞腦悶牙齒動揺項背拘急渾身腫痒癮疹生瘡百節疼痛皮膚麻痺下注脚膝筋脈拘攣不能屈伸脚下癮疹步履艱難並宜服之常能補益去風明目活血駐顔磁石燒醋淬二十遍研如粉十兩牛膝酒浸六兩黄躑躅炒八兩川芎二兩肉桂去皮赤芍藥黒牽牛炒各四兩草烏炮去皮臍十四兩右為細末酒糊為丸每服三十丸煨葱茶下亦得偏正頭疼生葱茶下婦人血風渾身疼痛頭目眩暈面浮體瘦淡醋湯下日三服大有神効羌活硫黄丸治元氣虚弱風氣攻注脚膝疼痛羌活去蘆硫黄天雄炮去皮臍蘹香子炒木香天麻酒浸焙硇砂水飛各一兩艾葉五錢右搗五味為末用木瓜一枚切開頂去皮子入硫黄硇砂艾葉三味在内以元頂宻葢蒸爛與藥味和搗丸如梧桐子大每服二十丸鹽湯或酒送下葳靈仙丸一名神仙八味丸治腎臓風毒流注腰脚疼痛方見諸虚門平補黄耆丸出聖濟緫録治腎臓風毒攻注腰脚或生瘡虚腫熱疼痛行動不得方見諸虚門補益諸疾類羌活散出聖恵方治腎臓風毒流注腰脚疼痛羌活牛膝去蘆附子炮去皮臍五加皮當歸酒洗㣲炒桂心萆薢桐皮各三兩防風去蘆二兩右為散每服四錢以水一鍾煎至五分入酒二合更煎三兩沸去滓食前温服沈香丸出聖恵方治腎臓風毒流注腰脚疼痛腹脇滯悶沈香剉鹿茸去毛酥炙附子炮去皮臍牛膝去蘆各一兩桂心海桐皮萆薢檳榔各三分乾蠍半兩㣲炒右為末煉蜜為丸如梧桐子大每服食前以温酒下三十丸七聖丸出聖濟緫録治腎臓風毒攻注腰脚熱痛或生瘡葳靈仙去心烏頭炮去皮臍烏藥蘹香子炒蜀椒去子炒地龍去土炒赤小豆各一兩右為末煮麵糊為丸如梧桐子大每服二十丸空心鹽湯或温酒下日晩再服黄耆散出聖濟緫録治腎臓風上攻頭面下注腰脚黄耆羌活去蘆白附子炮去皮臍蒺藜子炒去角蘹香子炒各一兩右為散每服二錢羊腎一隻披破入藥在内濕紙裹火煨令熟空心用温酒嚼下猪肚丸出聖濟緫録治腎臓風毒氣攻注腰脚或瘡或腫臍腹熱痛獖猪肚一個洗浄蒔蘿炒硫黄研附子炮去皮臍各一兩硇砂半兩右除猪肚搗為末於猪肚内用線宻縫酒煮爛候酒盡將猪肚入木臼中搗三百下丸如梧桐子大空心温酒下三十丸檳榔散出王氏博濟方治腎臓風攻注生瘡兼療諸般惡瘡止痛生肉檳榔一枚甘草黄連去鬚蜜陀僧燒各半兩木香一分右為末先以温鹽漿水洗瘡揾乾以津唾調傅止痛生肌木瓜丸出聖濟方治腎臓風毒攻注脚膝筋脈拘急行步艱難疼痛木瓜去皮穰用一斤半牛膝去蘆酒浸天麻乾蠍去土炒各一斤右除木瓜外為末先將木瓜以瓦器盛瓶内蒸令爛留蒸下汁候冷放入盆内夾木瓜研細為膏次將三味藥末入膏中同和匀更入煉蜜杵千百下丸如梧桐子大每服三十丸空心食前温酒或鹽湯下加至五十丸蘹香子丸出聖濟緫録治腎臓風毒氣衝注腰膝生瘡蘹香子炒二兩肉蓯蓉酒浸一兩附子炮去皮臍一兩五味子一兩右細剉用好酒一升并猪腎一對細切和藥置一處浸一宿取出焙乾為末酒煮麵糊為丸如梧桐子大每服二十丸或好茶或豆淋酒下四生丸出聖濟緫録治腎臓風毒攻注腰脚生瘡烏頭炮木鱉子去殻狗脊去毛各半兩苦參去蘆三錢右為末爛研猪腎入少許麵糊和丸如梧桐子大每服二十丸温酒下不拘時四靈散出聖濟緫録治腎臓風毒上攻下注行步艱難白附子炮牛膝酒浸一宿巴㦸天去心黄耆各一兩右為散每服用猪腎一個批開去筋膜糝藥一錢并鹽蒔蘿各少許在内用濕紙裹煨熟為度早晨空心細嚼温酒送下四白散出王氏方治腎臓風毒攻注四肢頭面生瘡徧身瘙痒白花蛇酒浸一宿去皮骨白附子炮白殭蠶炒白蒺藜子炒去角各一兩右為散每服二錢早晩食前温酒調下燒腎丸出王氏博濟方治腎臓風上攻頭面耳内生瘡及腰脚腫痛磁石煅醋淬七遍細研水飛過附子炮去皮臍巴㦸天去心蜀椒去目及閉口者炒出汗各一兩右為散每服用猪腎一箇去筋膜薄切入葱白薤白白鹽花各少許藥末二錢濕紙裹炭火内煨熟空心細嚼温酒送嚥之十日内見効四聖丸出聖濟緫録治腎臓風毒下攻及五勞七傷徧身疼痛兼女人血氣風勞緩弱烏頭去皮臍地龍去土炒赤小豆烏藥各一兩右並生搗羅為末醋煮糊丸如小豆大每服二十丸鹽湯下乳香丸出聖濟緫録治腎臓風毒上攻壅悶下注沈重乳香一兩烏頭炮去皮臍二兩葳靈仙去土一兩右為末酒麵糊丸如梧桐子大每服三十丸温酒送下早晩服之甘遂散出仁存方治腎臓風攻疰膝脚腫痛甘遂一錢木鱉子二斤去殻右為末猪腰二箇記左右者右患用右左患用左將腰子批開入藥末一錢濕紙裹煨熟五更時嚼吞米飲下精水多則利多精水少則利少服後將息若雙脚患用腰子兩箇是方許學士云在毘陵有姓馬人宿患腎臓風一足發腫如瓠痛不可忍臥欲轉則兩人挾持方可學士語以上法服之下膿如水晶者數升腫消拄拐而行再以赤烏散令塗貼斯愈後十年過毘陵率子列拜叩謝脚疾至今不復作煨腎丸出永類録方治腎經積水流注經絡腿膝攣急四肢腫痛甘遂半兩木香一兩右為末每服二錢以猪腰子一箇批開糝藥在内鋪匀以薄荷裹定外以紙包數重水濕煨熟臨晩温酒細嚼當下黄水五味湯治腰腎間濕痺當用水洗用鰻魚和五味子末煮空腹食之甚補益濕痺脚氣服之良葳靈仙丸出本草治腎臓風壅積腰膝沈重用葳靈仙末蜜和丸如桐子大初服温酒下八十丸平明㣲利惡物如青膿即風毒積滯也如未動夜再服一百丸服下後喫粥補之一月仍常服温補藥應用丸出王氏博濟方治腎臓風毒氣攻刺脚膝疼痛生瘡烏頭二兩大附子一兩茱茰一兩黒豆一斗已上各味以水三升同煮乾為度取烏頭附子薄切為片肉桂海桐皮萆薢羌活獨活川芎牛膝酒浸乾木瓜乾漆天南星已上各一兩右為末煉蜜為丸如梧桐子大空心午後臨晩鹽湯下三十丸忌魚肉白蒺藜散出王氏博濟方治腎臓風下疰脚膝疼痛或麻痺生瘡白蒺藜炒黒附子炮羌活川芎黄耆右五味各等分同為細末每服二錢空心温酒下三服見効忌發風食大通丸出王氏博濟方治丈夫腎臓風上攻下注脚膝疼痛生瘡及小便膀胱宿冷滯氣攻刺腹脇并婦人血風攻疰腰膝拘攣兼能進食金釵石斛一兩牛膝一兩酒浸大附子二箇一兩去皮臍乾薑三分炒豆蔲四箇去殻麵煨檳榔四箇木香一分菊花二兩硫黄一分白花蛇酒浸去皮骨二兩枸把子二兩九蒸九晒炒右為細末以酒煮糊為丸如桐子大每服空心温酒下如喫了轉覺脛骨内疼甚者乃藥効力如疼發過後只管喫即永差如怕痛住藥疼亦止愈婦人當歸酒下如作散温酒調下如常服大妙煨石子散王氏博濟方治腎臓風上攻下注脚膝腫痛黄耆白蒺藜炒巴㦸天去心川椒炒白附子茴香川芎木香右各等分同杵為末每服空心用猪腎子一對去筋每服摻藥一錢半鹽半錢用濕紙裹煨熟為度以温酒或米飲嚼下皂角散出澹療方治腎臓風毒腰脚生瘡大便風秘等症大皂角去皮鎚碎煉膏石菖蒲樟栁根赤小豆黒豆川烏炮草烏炮各一兩五靈脂半兩右為末以皂角膏為丸每服二十丸鹽酒吞下經進地仙丹出醫方大成治腎臓虚憊風濕流注脚膝酸疼行步無力川椒去日閉口者炒出汗四兩兔絲子酒浸覆盆子白术一兩白附子炮羌活防風各二兩人參三兩烏藥二兩川烏炮一兩附子炮四兩茯苓一兩地龍去土三兩赤小豆骨碎補一兩甘草一兩木鱉子去殻三兩萆薢一兩狗脊去毛蓯蓉酒浸四兩牛膝去蘆酒浸南星湯泡各二兩黄耆一兩何首烏二兩右為末酒糊丸如梧桐子大每服四十丸空心温酒下黄耆丸出醫方集成治腎臓風毒上攻頭面下注腰脚行步艱難一切風痺川練子川烏炮赤小豆蒺藜炒茴香炒地龍去土炒防風各二兩烏藥二兩黄耆二兩右為末酒糊丸如梧桐子大每服五十丸温酒或鹽湯下羌活散出王氏博濟方治腎臓風上攻下疰頭面浮腫及有瘡者婦人血風攻注並宜服羌活去蘆防風去蘆川芎荆芥穂麻黄甘草木通黍黏炒各等分右為末每服三錢茶湯或酒調服不拘時服沒藥散出王氏博濟方治腎臓風攻注脚膝疼痛瘡腫沒藥三分甜瓜子半兩炒自然銅二兩燒醋淬一度研碎乳香一分骨碎補半兩紅芍藥半兩五靈脂半兩當歸半兩㣲炒地龍一分右為末用酒煮麵糊為丸如梧桐子大每服空心臨臥温酒下思仙續斷丸出如宜方治腎虚風毒下注脚膝不可踐地小便㣲澀方見本門腎虚類紫金丹出王氏博濟方治腎風上攻下注虚腫疼痛補暖丹田大進飲食及療婦人血風血氣流注筋骨疼痛或發熱口苦舌乾四肢煩倦血海久虚兼化痰涎黒附子半兩炮丁香半兩縮砂半兩當歸半兩硇砂半兩天南星炮半兩半夏半兩肉豆蔲五箇木香半兩防葵半兩青葙子半兩硃砂半兩水銀一分自然銅一兩火煅醋淬七次右先將水銀硇砂二味同研合一處為細末和匀以醋糊為丸如桐子大薄荷茶下十丸或薄荷湯下亦得每日二服補腎湯治卒患脚腰疼痛出本草以杜仲一兩去粗皮炙㣲黄剉以水二盞煎至一盞去滓用羊腎一對細切去筋膜入藥中煮次入薤白七莖白鹽花椒薑醋同作湯空心食之腎臓虚損氣痿弱附論夫腎者元氣之本精志之藏内主於骨氣通於隂若人動勞傷精氣自衰損隂陽不和臓腑既虚精氣空竭不能榮華故令陽痿弱也絲子丸出聖濟總録治腎臓虚損陽氣痿弱腹拘急四肢酸疼面色黧黒唇乾舌燥目暗耳鳴氣短力少精神倦怠小便滑絲子酒浸透别搗桂去皮鹿茸去毛酥炙附子炮去皮臍澤㵼石龍芮去殻一兩肉蓯蓉酒浸焙杜仲去粗皮白茯苓巴㦸去心熟地黄萆薢茄沈香茴香炒石斛去蘆牛膝酒浸一宿續斷各三分桑螵蛸酒浸炒芎藭覆盆子去枝葉