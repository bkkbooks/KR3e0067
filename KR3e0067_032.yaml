兩蒺藜炒去角牛膝酒浸絲子酒浸乾薑炮一兩蜀椒去目及合口者炒出汗桂去粗皮檳榔陳皮去白各一兩五味子炒一兩半右為末煉蜜和丸如梧桐子大空心溫酒下三十丸石斛飲出聖濟方治腎氣虛損骨痿體瘦無力兩耳鳴甚即成聾短氣不足石斛去根一兩當歸一兩人參二兩肉蓯蓉酒浸一宿三兩芎藭一兩附子去粗皮兩白茯苓一兩熟地黃焙二兩白术米泔浸一宿一兩桑螵蛸磁石火煅醋淬二七次各一兩羊腎一對去筋膜炙令黃右吺咀如麻豆大每服三錢鹽水一盞煎至七分去滓溫不拘時服補腎湯出聖濟方治腎臟虛損耳作蟬鳴腹疼痛黃耆炙一兩半蜀椒去目合口者炒出汗人參二兩白茯苓一兩獨活二兩芎藭一兩當歸二兩芍藥二兩白术一兩蒺藜炒去角附子炮去皮臍澤㵼各一兩右銼如麻豆大每服五錢水二鍾先煎羊腎一箇至一盞半入藥煎取八分去滓空心服乾地黃丸出聖惠方治腎臟虛損肌體羸瘦骨痿無力腰腳痛小便滑數熟地黃二兩山茱萸去核二兩白茯苓二兩山芋二兩石斛去根桂二兩附子炮去皮臍牛膝酒浸巴戟天去心五味子二兩澤㵼二兩黃耆一兩天門冬去心鹿角膠一兩柏子仁一兩絲子酒浸研一兩肉蓯蓉酒浸炒二兩右為末煉蜜和丸如梧桐子大每服三十丸溫酒下牛膝丸出濟生拔萃治腎臟骨痿不能起筋緩不能自收特宜暖中牛膝酒浸二兩萆薢一兩杜仲炒一兩蓯蓉酒浸二兩防風一兩絲子二兩葫蘆巴炒半兩桂一兩破故紙二兩沙苑半兩白蒺藜一兩右等味為末酒煮豬腰子為丸每服五七十丸空心溫酒下如腰痛不起者服之甚效補骨脂丸出聖濟總録治腎臟虛損骨痿肉瘦耳鳴心煩小腹裏急氣引膀胱連腰膝痛補骨脂二兩五味子石斛各二兩白茯苓二兩熟地黃二兩杜仲二兩天雄去皮臍一兩人參二兩絲子酒浸一宿焙乾為末肉蓯蓉酒浸一宿各二兩右為末煉蜜為丸如梧桐子大空心日午夜臥溫酒下鹽湯亦得肉蓯蓉丸出聖濟總録治腎氣虛損羸瘦飲食不作肌膚腰膝疼痛肉蓯蓉酒浸一宿石斛去根磁石火煅醋淬七次鹿茸酥炙桂去粗皮巴戟天去心杜仲炒去絲木香各一兩覆盆子一兩右為末煉蜜為丸如梧桐子大每服二十丸至三十丸溫酒下鹽湯亦得空心日午臨晚服肉蓯蓉丸出聖濟總録治腎臟虛損小便數滑脛無力漸羸瘦肉蓯蓉酒浸一宿附子炮去皮臍白蒺藜炒去角桑螵蛸炒各二兩五味子炒龍骨研各一兩黃耆炒絲子石斛去根各一兩半右為末煉蜜丸如梧桐子大每服二十丸空心鹽湯下石鍾乳丸出聖濟總録治腎臟虛損骨痿羸瘦行無力短氣不足腰背相引疼痛石鍾乳二兩絲子酒浸研為末一兩五味子一兩蛇床子一兩黃耆二兩續斷一兩萆薢烏頭炮去皮臍各一兩右為末酒糊為丸如梧桐子大每服二十丸溫酒下空心日午夜服絲子丸出聖濟總録治腎臟虛損精髓枯竭形體瘦弱筋骨痿軟晝夜疼痛腰膝冷痺耳內虛鳴宜服絲子酒浸三日肉蓯蓉酒浸天雄炮去皮臍各二兩骨碎補去毛一兩薏苡仁炒地龍去土焙乾各一兩石硫黃研半兩右為末酒煮糊丸如梧桐子大空心溫酒或鹽湯下二十丸加至三十丸鹿茸丸出聖濟總録治腎臟傷憊腰膝無力形瘦骨痿頭目昏沈時忽發暈項背疼痛不得俯仰鹿茸酥炙天雄炮去皮臍白附子鹿髓去膜别研如膏各一兩腽肭臍一對酥炙右以四味為末與鹿髓同研和令勻煉蜜和丸如梧桐子大溫酒下三十丸日三兩服巴戟天丸出聖濟總録治腎臟冷虛體羸瘦骨痿腰腳疼痛臍腹冷痛飲食無味行坐無力夜多夢泄耳內蟬鳴巴戟天去心補骨脂炒各半兩附子炮去皮臍蘹香子炒兩右為末用酒熬一半成膏一半杵和丸如梧桐子大每服二十丸空心食前鹽湯下腎虛多唾附論夫水飲非升降不能傳導非陽氣不能消爍腎虛多唾者腎臟不足陽氣虛微而又隂寒凝結停滯於胸膈之間不能消爍水飲上溢於齒牙故喜唾也夫腎主於水其下為膀胱是腎之腋主於津液二經允象於水故為表裡也若臟腑和平水液下流於小腹若腎氣勞損膀胱虛弱隂氣不足陽氣有餘則上生熱心胸壅滯水飲停積故令常唾也赤茯苓丸出聖惠方治腎虛損上壅痰滯常唾稠濁腹脅脹滿喫食無味赤茯苓一兩甜瓜子三分人參三分去蘆旋復花三分半夏一兩檳榔三分枳殼半兩麩炒草豆蔲半兩去皮前胡三分附子炮去皮臍厚朴三分去粗皮薑汁製右為末以生薑汁煮糊和丸如梧桐子大每服食前服以薑棗湯下二十丸白术丸出聖濟方治腎臟虛損心膈痰涎壅滯常唾胸脅悶白术一兩赤茯苓一兩附子三分炮去皮臍桂心一兩紫苑三分訶黎勒一兩前胡一兩桔梗一兩去蘆人參一兩陳皮三分檳榔半兩半夏一兩微炒右為末以生薑汁麵糊丸如梧桐子大食前以枳殼湯下二十丸澤㵼散出聖惠方治腎臟虛損上壅痰涎結聚常唾胃弱少食宜服澤㵼一兩人參三兩旋復花三分麥門冬三分去心枳實五錢麩炒前胡三分桔梗三分甘草一兩炙杏仁去皮尖三分半夏二兩炒右為散每服三錢以水一鍾入生薑半分煎至六分去滓食前服人參散出聖惠方治腎臟虛損冷氣所攻下焦虛冷壅滯唾液稠粘人參一兩五味子白术附子炮去皮臍細辛半夏各半兩前胡黃耆桂心各半兩枳實麩炒甘草各三分右㕮咀如麻豆大每服三錢水一盞生薑三片煎至七分去滓溫服半夏丸治腎臟虛損壅塞唾液不休心胸煩悶半夏湯浸七遍去滑為术三兩前胡一兩赤茯苓檳榔陳皮去白訶子枳殼麩炒人參桔梗炒五味子各半兩附子炮去皮臍半兩右為末麵糊為丸如梧桐子大每服二十丸至三十丸食前溫酒生薑湯下前胡湯治腎臟虛損頭目昏眩順三焦氣利胸膈進飲食前胡一兩白茯苓三錢木香五錢附子炮去皮臍大腹皮一兩桔梗半兩炒枳殼麩炒半兩五味子一兩甘草炙半兩半夏半兩生薑自然汁四兩水一升於銀器內浸晒乾焙右銼如麻豆大每服五錢水二盞入生薑三片同煎至一盞去滓食前服前胡散出聖惠方治腎臟虛損脾氣乏弱津液不榮上焦生熱常唾稠粘胸膈壅滯不欲飲食前胡一兩大腹皮三錢半夏一兩湯泡炒杏仁去皮尖炒一兩陳皮去白三錢澤㵼一兩赤茯苓一兩甘草半兩炙右為散每服三錢水一盞入薑三片煎至六分去滓食前溫服半夏散出聖惠方治腎臟虛損上熱下冷心胸壅滯痰毒結實唾如筋膠飲食少進半夏一兩湯浸七次炒川烏頭半兩去皮臍防風半兩旋復花一兩前胡二兩赤茯苓一兩桂心一兩白术半兩甘草半兩炙右為散每服三錢水一鍾入薑三片煎至六分去滓食前服地黃湯治腎虛多唾熟地黃焙鹿茸酥炙巴戟去心枸杞子丹參五加皮各一兩車前子一兩桂三錢防風一兩右㕮咀如麻豆大每服四錢水二盞煎至半盞去滓溫服茯苓湯治虛損短氣咽喉凝唾不出如膠方見虛勞門虛勞少氣類訶黎勒丸治腎虛常唾訶子半夏湯泡七次炒桔梗陳皮去白杏仁去皮尖研檳榔五味子澤㵼各等分右搗七味為末入杏仁和勻生薑汁煮麵糊丸如梧桐子大每服三十丸淡薑湯下五味子丸治腎虛痰唾不休五味子白茯苓前胡各一兩半夏湯泡七次炒麥門冬去心山茱茰各半兩貝母三錢右為末煉蜜為丸如梧桐子大每服三十丸食前薑湯送下日二服普濟方卷三十二
