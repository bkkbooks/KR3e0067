body:
  text: 普濟方卷三百五十四明周王朱橚撰産後諸疾門寒熱附論産後乍寒乍熱者何荅曰陰陽不和敗血不散能令乍寒乍熱産後血氣虛損陰陽不和陰勝則乍寒陽勝則乍熱陰陽相乗則或寒或熱若因産傷勞臟腑血弱不得宣通故令敗血不散入於肺則熱入於脾則寒醫人若誤作瘧疾治之則謬矣陰陽不和冝增損四物湯敗血不散冝奪命丹又問二者何以别之時有刺痛者敗血也但寒熱無他證者陰陽不和也增損四物湯不一皆隨病加减乍寒乍熱榮衛不和難以輕議若其敗血不散豈止入脾肺二臟邪大抵一陰一陽閉即作寒熱陰勝故寒陽勝故熱只可云敗血循經流入閉諸陰則寒閉諸陽則熱血氣與衛氣解則休遇再㑹而復作大調經散五積散入醋煎佳方紅藍花散出聖惠方治産後寒熱頭痛手足疼惡露不快心腹刺痛紅藍花一兩甘菊花當歸剉㣲炒蓬莪茂赤芍藥鬼箭羽芎藭桂心已上各一兩牛膝去苗劉寄奴赤茯苓桃仁湯浸去皮尖雙人麩炒㣲黄羚羊角屑已上各三分生薑半分右為散每服四錢以水一中盞煎至六分去滓不拘時候温服黄耆散出聖惠方治産後乍寒乍熱骨節疼痛四肢無力靣色痿黄黄耆一兩剉附子三分剉去皮臍鬼箭羽半兩鱉甲一兩塗醋炙㣲黄去裙欄芎藭半兩當歸三分剉㣲炒赤芍藥三分牡丹半兩牛膝三分去苗桂心半兩桃仁三分湯浸去皮尖雙人麩炒㣲黄赤茯苓三分右為散每服四錢以水一中盞入生薑半分煎至六分去滓不拘時候温服療産後惡寒壯熱一夜三五度發惡語口中生瘡時時乾嘔困之悶絶人參獨活白蘚皮葛根防風青竹茹逺志各六分茯神八分白歛十分元參十二分竹瀝二升半右銀一升水一斗五升煎取七升下諸藥重煎取三升分三温服忌魚酒麵等物豬腎湯出聖惠方治産後體虛寒熱發渴四肢少力心神煩悶不思飲食豬腎一對去脂膜切作四片䜴半兩生薑半兩拍碎白粳米一合桂心半兩人參半兩去蘆頭黄耆半兩剉當歸一兩葱白三根切右細剉以水二大盞煎至一盞去滓食前分為三服赤芍藥散出聖惠方治産後敗血不散乍寒乍熱骨節煩痛唇口乾焦心胸悶亂赤芍藥人參去蘆頭防風去蘆頭當歸剉焙生乾地黄紅藍花藕節已上各一兩羚羊角三分芎藭三分右為散每服四錢以水一中盞入生薑半分黑豆五十粒煎至六分去滓不拘時候温服增損四物湯大全良方治産後陰陽不和乍寒乍熱如有惡露未盡停滯胞絡亦能令人寒熱但小腹急痛為異人參一兩當歸一兩芍藥一兩乾薑一兩甘草右㕮咀每服四錢水一盞生薑三片煎至七分去滓熱服無時候一方無甘草有乾地黄一方云大抵一陰一陽閉即作寒熱陽勝故熱陰勝故寒只可云敗血循經流入閉諸陰則寒閉諸陽則熱血氣與衛氣解則休遇再會而復作大調經散五積散入醋煎佳石膏散出聖惠方治産後寒熱頭痛石膏二兩黄芩一兩半桂心一兩半生乾地黄一兩牡蠣二兩燒過赤芍藥二兩右為散每服四錢以水一中盞煎至六分去滓不拘時候温服蓬莪茂散出聖惠方治産後惡血滯留增寒壯熱心腹㽲痛蓬莪茂一兩當歸一兩剉㣲炒蒲黄三分桂心三分川大黄一兩碎剉㣲炒桃仁一兩湯浸去皮尖雙人麩炒㣲黄右為散不計時候以煖酒調下二錢治産後乍寒乍熱通身温壯心胸煩悶出肘後方知母生乾地黄劉寄奴鬼箭羽羗活當歸剉㣲炒已上各三分柴胡一兩去苗鱉甲一兩塗醋炙㣲黄去裙欄右件藥搗粗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服芎藭散出聖惠方治産後敗血不散體虛乍寒乍熱骨節疼痛四肢少力芎藭芍藥黄芩各二兩桂心一兩甘草二兩炙右以水六升煮取二升分三服比於蔣家得此方無桂加生地黄一升知母散出聖惠方治産後壯熱増寒四肢少力不思飲食知母當歸剉㣲炒鬼箭羽劉寄奴白术已上各二兩桃仁一兩半湯浸去皮尖雙人麩炒微黄右件藥搗粗羅為散每服三錢以水酒各半盞煎至六分去滓不計時候温服療産後寒熱心悶極脹及百病出肘後方以羚羊角燒末用酒服方寸匕未差再服療産後寒熱心悶極脹及百病以馬通絞取汁一盞以酒和服之瘥瘧疾附論産後血氣未至和平邪氣客於風府循膂而下與衛氣大㑹陰陽交争虛實更作寒熱相移其始發也起於毫毛伸欠及作寒慓頭頷腰脊俱痛去則内外皆熱頭痛如破渴欲冷飲是寒熱瘧之證也瘧證曰并於陽則陽勝并陰則陰勝陰勝則寒陽勝則熱凡産後病瘧而作寒熱有一日一發或一日二三發或間一日一發或三兩日一發或先寒後熱或先熱後寒或寒多熱少或熱多寒少或但寒但熱者亦有産前病瘧而産後未愈者最難用藥如柴胡常山信砒等斷不可用今有經草果飲子生熟飲子用之有効如易簡方四獸飲亦可用方秦芁湯治産後瘧先寒後熱頭痛發渴骨節痛秦芁去苗土麻黄去根節煎掠去沫焙烏梅去核炒常山甘草炙麥門冬去心炒青蒿子柴胡大黄炮剉鱉甲醋炙去裙襴當歸切焙赤茯苓去黑皮各一兩右粗搗篩每服五錢匕水一盞半生薑三片煎至八分去滓當未發前服欲發時再服草果飲子出危氏方治婦人産後瘧疾寒熱相半者或多熱者半夏炮赤茯苓甘草炙草果炮去皮川芎陳皮白芷各二錢青皮去白良薑紫蘇各一錢乾葛四錢右㕮咀每服三錢以水一大盞薑三片棗二枚同煎至七分去滓當發日侵早連進三服無有不安犀角飲治産後寒熱瘧往來不歇犀角屑麥門冬去心焙升麻洗焙知母切生乾地黄焙當歸切焙甘草炙鱉甲醋炙去裙襴石膏打碎柴胡去苗各一兩右粗搗篩每服五錢匕水一盞半煎至一盞去滓當未發前服欲發時再服木香丸治産後一切瘧木香常山剉牡蠣火燒赤大黄炮剉知母焙烏梅去核炒鱉甲醋炙去裙欄當歸切焙各一兩丹砂别研半兩麻黄去根節煎掠去沫焙右為末煉蜜和丸如梧桐子大每服二十丸温酒下當未發時服芍藥飲治産後寒熱瘧頭疼體痛煩渴赤芍藥一兩黄芩去黑心一兩柴胡去苗一兩麥門冬去心焙一兩半當歸切焙二兩白茯苓去黒皮一兩半鱉甲去裙襴醋炙二兩常山三分白术剉三分甘草炙半兩右粗搗篩每服五錢匕水一盞半生薑三片棗二枚煎至八分去滓温服當未發前不拘時候人參飲治産後寒熱往來不已煩渴體痛人參甘草炙厚朴去粗皮薑汁炙各三分知母半兩常山半兩麥門冬去心焙柴胡去苗豬苓去黒皮白茯苓去黒皮各二兩右粗搗篩每服五錢匕水一盞半生薑三片煎至半中去滓當未發前服生熱飲子出危氏方治産後瘧疾多寒者肉豆冦草果仁半夏陳皮甘草生薑厚朴生去粗皮大棗去核右各等分細剉和勻一半用濕皮紙煨令香熱去紙與一半生者和勻每服秤五錢重水二盞煎至七分食前一服食後一服烏梅飲治産後寒熱瘧發渴頭痛烏梅肉炒黄連去鬚柴胡去苗人參各一兩當歸切焙一兩半甘草炙三分常山半兩生乾地黄焙三分右粗搗篩每服五錢匕水一盞半生薑三片棗二枚煎至八分去滓當未發前温服知母飲治産後寒熱瘧發或半月間日發知母半兩白茯苓去黒皮一兩烏梅肉剉三分麥門冬去心焙一兩大青半兩柴胡去苗一兩甘草炙三兩當歸切焙一兩右粗搗篩每服五錢匕水一盞半生薑三片棗二枚煎至八分去滓當未發前服欲發時再服柴胡湯治産後諸瘧寒熱往來煩渴柴胡去苗黄芩去黑心人參當歸切焙生乾地黄焙甘草炙豬苓去黒皮各一兩右粗搗篩每服五錢匕水一盞半煎至八分去滓當未發前及空心日午臨卧服七勝飲治産後寒熱瘧煩渴引飲頭疼體痛乾薑半兩炮黄連去鬚桃仁去皮尖雙人炒當歸切焙常山剉柴胡去苗豬苓去黑皮各一兩右粗搗篩每服三錢匕水一盞煎至七分去滓當未發前空心温服欲發時再服常山飲治産後寒熱瘧常山一兩甘草一兩黄芩去黒心熬石膏碎各二兩烏梅去核用十四枚當歸切焙二兩芍藥一兩半右粗搗篩每服五錢匕水一盞半生薑三片棗二枚煎至八分去滓當未發前温服小柴胡湯治産後寒熱瘧方見本門傷寒類大黄散治婦人天行瘧病因産後心下痞悶氣逆潮熱小便澀祕不通者大黄陳皮黒牽牛各一兩炒右為末每服一二錢清茶調下若加半兩木香名大通散無憂散出衛生家寶方治産後瘧疾用蘿蔔子不以多少炒右一味為末每服二錢米飲調下只一服立愈治産後腎勞如瘧者如婦人體熱用豬腎體冷用狗腎燒灰酒服之大小便秘澀附論内經謂大腸與膀胱受五臟濁氣名曰𫝊化之府此不能乆留輸瀉者也婦人大小腸本挾熱者既産之後血氣暴竭津液内涸燥熱相摶大小腸秘澀不能𫝊導故大小便俱不通也方三脘散治産後臟腑壅滯腸胃燥澁大小便秘兼治脚氣大腹皮炙剉紫蘇莖葉沉香木𤓰切焙獨活去蘆頭各一兩㯽榔麫裏煨熟去麫白术芎藭木香陳橘皮去白焙甘草炙剉各三分右為粗散每服三錢匕水一盞煎至六分去滓温服不拘時候一方有羗活㯽榔散出聖惠方治産後大小便秘心腹脹滿氣促㯽榔一兩車前子三分冬𤓰仁三分川大黄一兩剉木通一兩剉桂心半兩甘草半兩炙剉當歸半兩剉炒川朴硝一兩滑石一兩右為散每服三錢水一盞煎至六分去滓不計時候温服柴胡湯治産後内熱大小便不通柴胡去苗黄芩去黑皮陳橘皮湯浸去白切焙澤㵼石膏椎碎羚羊角鎊各三分梔子仁一兩赤茯苓去黑皮一兩芒硝别研各一兩半右粗搗篩八味每服三錢匕水一盞半煎至八分去滓下芒硝末半錢匕更煎一沸温服榆白皮散出聖恵方治産後大小便秘澁小腹疼痛榆白皮三分剉木通一兩剉黄芩半兩當歸三分剉葵子半兩川大黄一兩剉炒赤芍藥半兩滑石一兩蒲黄半兩右為散每服三錢水一盞生薑半分煎至六分去滓不計時温服茯苓丸治産後大小便不通赤茯苓去黑皮赤芍藥當歸切焙人參枳殻去穣麩炒白术剉炒大麻仁别研如膏各半兩大黄剉炒三兩右搗羅七味為末與麻仁研勻煉蜜和丸如梧桐子大每服二十丸煎茅根湯送下以利為度梔子仁湯治産後大小便不通梔子仁石膏碎黄芩圓小者柴胡去苗赤芍藥剉澤㵼萎㽔各一兩半車前葉切半升右粗搗篩每服三錢匕水一盞煎至七分去滓食前温服以利為度㯽榔散治産後大小便不通臍下疼痛兼腹滿急脹㯽榔剉半兩桂去粗皮半兩芎藭半兩獨活去蘆頭半兩木香半兩大黄剉炒郁李仁去皮尖雙人别研赤茯苓去黑皮各一兩右為散每服二錢匕食前温水調下以利為度木通飲治産後大小便秘澁木通剉炒三兩冬葵根剉三兩黄芩去黑心甘草炙剉當歸切焙蒲黄微炒陳橘皮湯浸去白焙瞿麥穗各半兩右粗搗篩每服五錢匕水一盞半煎至八分去滓温服日再桃仁散出聖惠方治産後大小便秘澁心腹脹滿時時拘作疼痛桃仁一兩湯浸去皮尖雙人研葵子一兩川大黄一兩剉炒甜𤓰子一兩青橘皮一兩湯浸去白焙㯽榔當歸一兩剉炒甘草半兩剉炒右為散每服三錢水一盞煎至六分去滓不計時温服木通散出聖惠方治産後大小便不通木通大麻仁葵子滑石㯽榔枳實甘草各半兩右為粗末每服三大錢水一盞半煎至七分去滓温服赤芍藥丸治産後風虛壅結大小便不通赤芍藥一兩一分桂去粗皮一兩瞿麥取穗三分大黄剉炒半兩㯽榔剉當歸切焙羗活去蘆頭各二兩右為末煉蜜和丸如梧桐子大每服二十丸米飲下以利為度木香丸治産後因腫滿小腹急脹大小便不通木香一兩炮牽牛子二兩炒别搗為末防己陳橘皮去白炒各半兩訶梨勒炮去核羚羊角鎊㯽榔剉各一兩右為末煉蜜和丸如梧桐子大每