煎至六分去滓温服日三四服療産後小便澀痛或血淋者瞿麥黄芩冬葵子各二兩通草三兩大棗十一枚右以水七升煮取二升半分作兩服大麻仁散出聖惠方治産後小便淋瀝疼痛大麻仁一兩榆白皮一兩剉葵子一兩瞿麥半兩甘草一分炙剉右為散每服三錢水一盞煎至六分去滓温服滑石散治産後淋滑石五兩通草車前子葵子各四兩右治下篩酢漿水服方寸匕稍加至二療産後血淋車前子瞿麥各四兩黄芩三兩欝金末一兩右以水六升煮取二升下欝金末分三服瞿麥湯治産後淋痛因虛損有熱氣客於胞中血隨小便出為血淋淋者如雨之淋者也内虛則起數内熱則小便澀痛乃曰淋瞿麥黄芩通草各半兩大棗十二枚右以水一盞半藥四味每四錢煎至大半盞去滓服治産後小便淋不通七八日滑石六錢葵子三錢寒水石四錢右為散每服三錢水一盞半煎至大半盞空心服治産後小便淋瀝不通葵子一合朴硝八分右水二升煮取八合下硝分四服又方熨法用蛇床子炒乘熱布褁之熨患處亦治陰痛治産後小便淋瀝腹脇脹滿時復疼痛用鼠婦半兩炒為末每服半錢温酒調下治産後小便血附論夫産後損於血氣虛而挾於熱血氣得熱則流散滲於脬故血隨小便出也方石韋散治産後臟有積熱致小便出血石韋去毛三兩榆白皮剉三兩黄芩二兩木通剉二兩赤芍藥二兩冬葵子二兩甘草二兩右為末每服三錢水一盞煎至六分去滓食前温服一方無甘草茜根散治産後小便出血茜根一兩石韋去毛二兩木通剉二兩子芩一兩生乾地黄一兩滑石二兩右為散每服三錢水一盞煎至六分去滓食前温服又方瞿麥一兩黄芩冬葵子木通剉茜根當歸各一兩右為末每服四錢水一盞煎至六分去滓食前温服又方具齒五枚燒灰葵子一兩車前子一兩滑石二兩生乾地黄一兩茜根一兩右為末每服二錢食前温水調下又方車前子二兩瞿麥黄芩欝金蒲黄各一兩右為末每服二錢茅根湯食前調下又方治産後小便出血亂髮灰洗净燒滑石各半兩右為末令勻每服一錢生地黄汁調下一方無滑石米飲調下又方生地黄生刺薊各半斤右搗絞汁每服一小盞食前米飲下又方生乾地黄阿膠搗炒各一兩右為末每服二錢食前茜根湯調下小便頻數不禁附論夫産後小便頻數不禁者此由脬内宿有冷氣因産後發動冷氣入腹虛弱不能制其小便故也方雞肶胵湯治産後小便頻雞肶胵二三具雞腸三具洗乾地黄當歸甘草各二兩麻黄四兩厚朴人參各三兩生薑五兩大棗二十枚右㕮咀水一斗煮肶胵及腸大棗取七升去滓内諸藥煎取三升半分三服鹿茸散出聖惠方治産後臟虛小便數多鹿茸一兩去毛塗酥炙黄耆剉一兩半牡蠣一兩半燒為末人參一兩去蘆頭熟乾地黄二兩當歸剉炒一兩五味子一兩雞肶胵炙一兩半甘草炙剉半兩右為末每服二錢食前粥飲調下栝蔞湯出千金方治産後小便數兼渴栝蔞根麥門冬甘草黄連各二兩人參三兩生薑三兩桑螵蛸二十枚大棗十五枚右㕮咀以水七升煮取二升半分三服一方無麥門冬忌豬肉冷水桑螵蛸散出聖惠方治産後小便數此胞有宿冷冷氣又入腹中虛弱不能制其小便故數有遺尿者冷在胞囊漏不禁也桑螵蛸三十箇燒鹿茸酥炙黄耆各三兩牡蠣煆人參厚朴赤石脂各二兩右為末空心粥飲調下二錢外臺無厚朴石脂有甘草生薑不禁加龍骨龍骨散出聖惠方治産後小便數多龍骨一兩牡蠣一兩燒為粉桂心半兩烏藥一兩桑螵蛸炒半兩菝葜剉一兩熟乾地黄一兩半右為散每服三錢水一盞生薑半分棗三枚煎至六分食前温服又方出聖恵方雞肶胵十具炙熟乾地黄半兩當歸剉炒半兩牡蠣一兩燒為粉厚朴三分去麄皮塗生薑汁炙黄耆剉一兩右為末每服二錢食前温酒調下又方出聖恵方黄耆剉一兩鹿茸一兩去毛塗酥炙桑螵蛸一兩㣲剉牡蠣一兩燒為粉雞肶胵一兩㣲剉右為末每服二錢食前粥飲調下麥門冬散出聖惠方治産後小便數兼煩渴麥門冬去心三分龍骨三分當歸三分剉㣲炒黄耆三分剉甘草一分炙剉右為散每服三錢水一盞生薑半分棗三枚煎至五分去滓食前温服又方出聖恵方桑螵蛸半兩炒龍骨右為細末每服二錢空心食前粥飲調下療産後遺尿不知出出便産須知白薇芍藥右等分為細末以酒服方寸匕日服三療産後小便不禁出聖惠方用雞尾燒作灰細研温酒調方寸匕日三固脬散出楊氏家藏方治婦人臨産時傷手胞破小便不禁用黄絲絹自然黄者不用染成三尺以灰汁煮極化爛用清水洗去灰令浄入黄臘半兩蜜一兩白茅根二錢馬屁勃末二錢以水一升再煎至一盞空心頓服服時歛氣服之不得作聲如作聲無效治産後遺尿用故雞窠中草燒作末酒服二錢立瘥治産後小便不禁出肘後方用雞屎燒灰空心酒服方寸匕治産後小便不禁用雞子燒灰酒服日三療産後小便不記度數小腸虛損方出䕶命方當歸五味子石斛牛膝牡蠣火煆各半兩萆薢白芷各三分龍骨一分益智子去皮一兩右為細末煉蜜丸如梧桐子大早朝空心鹽湯下四十丸病减即住只作散子喫不喫滓補脬飲出危氏方治婦人産後傷胞動破終日不能小便但漏濕不乾黄絲絹生者一尺剪碎白牡丹皮末千葉者它無効白及末一錢右用水一碗煎至絹爛如餳空心頓服服時不得作聲作聲不效普濟方卷三百五十四
