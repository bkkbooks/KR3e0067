body:
  text: 普濟方卷二百二十五明周王朱橚撰諸虛門補益諸疾附論夫血氣者人之神所以榮養於一身而腎為之本若本元充實則精與神相感血與氣通流內有所守病安從來或乖內腎本元虛損則氣血從之動輒生疾故有因虛而為勞因虛而成積或耳目不能聰明或腰膝不能輕利或為諸勞宜用方劑以補益之方大沉香丸出德生堂主辟山嵐瘴氣通飲食厚腸胃令人肥白填精補髓去渾身走注活經脈健身體百病不生順氣寧心沉香木香丁香白檀香胡桃仁去皮枸杞子大茴香小茴香破故紙用羯羊畨白腸一尺半盛上項藥在內好酒煮熱瓦器內隂乾綿包亦可葫蘆巴酒浸五錢同前藥治之全蝎去毒炒五錢穿山甲酥炙川楝子五錢去皮木通五錢肉蓯蓉五錢去鱗酒浸逺志去心五錢韭子五錢酒浸蓮蕊二錢川巴戟五錢酒浸去心乾山藥五錢不蛀者山茱茰五錢去核知母五錢仙靈脾酥炙三錢青皮去白三錢白茯苓五錢牛膝酒浸三錢黃精酒浸五錢天門冬去心五錢麥門冬去心人參熟地黃乳香另研各五錢細墨一錠燒灰五錢生地黃五錢巨勝子五錢絲子五錢酒浸帶濕與羣藥同研北五味五錢陳皮二錢右為細末好酒麵糊丸如梧桐子大每服三十丸至五十丸空心酒下乾物壓之忌諸血豆粉等冷物聚寶養氣丹出危氏方能治諸虛不足氣血怯弱頭目昏眩肢節倦怠心志昏憒夜夢失精小便滑數脾胃氣虛又治諸風癱瘓半身不遂語言謇澀肢體重病寒濕氣痺或久寒冷泄㵼發瘧寒熱下痢赤白及腸風痔漏下血不止婦人子腸久冷崩漏帶下五色月候不調腹脅刺痛血瘕血閉羸瘦乏力並皆治之代赭石紫石英赤石脂禹餘糧以上四味各二兩醋淬水飛搜作錠子候十分乾入沙盒內養火三日罐子埋地中一宿出火毒入後藥陽起石煆肉豆蔲麵包煨鹿茸酒炙破故紙酒炒鍾乳粉研五靈脂酒研茴香酒炒柏子仁當歸酒浸炙逺志去心酒炒沒藥另研白茯苓附子炮胡椒沉香丁香銼木香乳香黃耆蜜炙山藥蓯蓉焙肉桂巴戟各五錢血竭琥珀硃砂麝香各三錢天雄炒五錢右為末糯米糊丸如梧桐子大留硃砂麝香為衣每服三十丸空心人參湯或棗湯下婦人醋湯下腽肭臍丸出和劑方主補虛壯氣暖腎祛邪益精髓調脾胃進飲食恱顔色治五勞七傷真氣虛憊臍腹冷痛肢體酸疼腰背拘急腳膝緩弱靣色黧黑肌肉憔瘦目暗耳鳴口苦舌乾腹中虛鳴脅下刺痛飲食無味心常慘戚夜多異夢晝少精神小便滑數時有餘瀝房室不舉或夜夢思交及一切風虛痼冷並宜服之方見本門治痼冷類養氣丹出和劑方能治諸虛百損脾元耗憊真陽不固三焦不和上實下虛中脘痰飲上攻頭目昏眩八風五痺或卒暴中風痰潮上膈言語謇澀神昏氣亂狀若癱瘓及奔豚腎氣上衝胸腹連兩脅澎脹刺痛不可忍者隂陽上下氣不升降飲食不進靣無精光肢體浮腫五種水氣上衝腰背倦痛夜夢鬼交覺來盜汗胃冷心疼小便滑數牽引小腹足膝緩弱步履艱難婦人血海久冷赤白帶下歲久無子及隂毒陽寒靣色青舌卷隂縮難言四肢厥冷不省人事者急服百丸用生薑大棗煎湯灌之即便回陽命無不活或觸冒寒邪霍亂吐㵼手足逆冷六脈沉伏唇口青黑腹脅攻刺及男子陽事痿怯腳膝酸疼臍腹虛鳴大便自滑兼療膈胃煩壅痰氣虛鳴百不愈者此藥常服取養真氣生陽遂隂溫平漸消磨冷滯尅化飲食使五臟安寧六腑調暢百病不侵出入道塗冝將此藥隨行緩急服餌大有功效禹餘糧石火煉七次醋淬七次為末紫石英煆一次赤石脂煆一次各五錢代赭石火煉七次醋淬七次為末磁石火煉十次醋淬十次以上各研為細末又以水研之挹其清者淋之紙上紙用箕成欲使細末在紙上而水滴在下挹盡而止既乾各用瓷瓶盛貯以鹽水一爐子煆此五藥以紙灰蓋之兩日後火盡灰冷則再煆如此三次埋地坑內兩日出火毒再研入後藥附子炮去皮臍二兩當歸酒浸一宿焙乾肉蓯蓉洗淨酒浸一宿焙乾一兩五錢茴香炒破故紙酒炒香熟木香不見火肉桂去粗皮巴戟鹽湯浸打去心丁香肉豆蔲麵裹煨山藥鹿茸酥炙白茯苓去皮沉香逺志去心各一兩以上如法修製同研為末却入後藥沒藥去沙石研乳香另研五靈脂去沙石研各一兩以上三味入衆藥同研却入硃砂或煆或蒸陽起石略煨或只用酒煮鍾乳粉各一兩以上三味另研臨時入右同為細末用糯米粉煮糊為丸每兩作五十丸隂乾入布袋內擦令光瑩每服五丸至十丸空心用鹽酒吞下或薑湯鹽湯或棗湯下亦可婦人艾醋湯吞下鐡刷湯出瑞竹堂専治男子婦人一切隂寒失精色敗腰膝疼痛隂乾不止腸風下血痔漏有頭者即散有漏平痊兼治婦人赤白帶下産後血暈等氣疾紫稍花或塊帶蒂者佳揀肉桂大丁香蛇床子吳茱茰各一兩山茱茰去核天仙子蘿蔔子川椒細辛藊豆大者白扁者佳狗脊芎藭甘松天雄一個白檀槐角子白芷沉香蕓薹子香附子芫花葶藶子巴戟去心肉蓯蓉木香各三錢右為粗末用酸漿水一大碗藥末五錢鹽少許同煎三五十沸傾在盆內薰之漸通手洗浴如火熱婦人每日薰浴之能使敗精穢血如黑汁下用藥人自知青木香出本草専主諸衰不足用崑崙青木香六路訶子皮各二十兩篩末沙糖和之昔鄭都尉方去沙糖加羚羊角十二兩白蜜丸如梧桐子煎福酒下三十丸日再其效甚速開心肥健丸出本草人參一分豬肪一錢酒拌和服一百日後體健髓溢日誦千言肌膚潤澤去熱風痰補益出本草以肉蓯蓉刮去鱗甲以酒淨洗去黑汁薄切合山芋羊肉作羮極美益人食之勝服補藥玉膏出本草能令人體潤主延年取蟾蜍作膏軟玉如泥以苦酒消之成水此則為膏之法試老嫩玉石間水飲之長生石斛丸出聖惠方主補虛損利腰膝暖水臟祛風冷強氣力恱顔色四時宜服石斛二兩去根蛇床子牛膝去苖一兩桂心一兩絲子二兩另搗為末酒浸二日曝乾肉蓯蓉二兩酒浸一宿刮去皺皮炙令乾人參一兩去蘆頭鹿茸一兩去毛塗酥炙令微黃熟乾地黃二兩杜仲一兩去粗皮炙微黃銼木香一兩薯蕷一兩白茯苓二兩附子二兩炮去皮臍巴戟二兩防風一兩去蘆頭鍾乳粉二兩乾漆一兩搗碎炒令煙出澤㵼一兩山茱茰一兩覆盆子一兩補骨脂二兩微炒五味子一兩石龍苪一兩檳榔一兩右為末煉蜜和搗五七百杵丸如梧桐子大每服空心以溫酒下三十丸延齡丹出御藥院方用治脾胃腎不足真氣傷憊肢節困倦舉動乏力怠惰嗜卧靣無潤澤不思飲食氣不宣暢小腹脹急臍下病痛及奔豚小腸氣攻充臍腹發歇無時常服補五臟養真陽和血脈壯筋骨牛膝酒浸二宿蓯蓉酒浸二宿金鈴子去皮補骨脂炒各七錢五分鹿茸益智仁檀香晚蠶蛾炒穿山甲炙沒藥研丁香青鹽各五錢沉香香附子炒薑黃薯蕷木香巴戟去心甘草炙各一兩川茴香炒七錢五分乳香研白术青皮蒼术各三兩右為細末酒煮麵糊為丸如梧桐子大每服四十丸空心溫酒下靈宿丸出御藥院方能補強心志壯筋骨益氣血調榮衛補骨髓固元陽黑髭髮治腰膝益志力通九竅利三焦去諸風除冷痰安五臟明耳目補虛損絲子酒浸一宿另研五兩覆盆子酒浸焙三兩熟地黃酒浸三日炒牛膝去苖酒浸肉蓯蓉去皺皮酒浸焙天麻酒浸銼焙檳榔煨以上七味各二兩附子炮製去皮臍鹿茸酥炙桂去粗皮石斛去根巴戟天去心紫者青皮去白焙楮實炒石葦去毛一兩杜仲去粗皮切焙蘹香子微炒白龍骨研補骨脂葫蘆巴枸杞子逺志去心五味子炒蛇床子炒山茱茰沉香銼蓽􅐺山藥另為末各一兩右為末用浸藥酒調山藥末煮糊更入酥蜜各一兩和藥搗三五百杵丸如梧桐子大每服二十丸空心溫酒送下溫粥飲送下亦可石刻安腎丸出危氏方能治真氣虛憊腳膝緩弱目暗耳鳴舉動倦乏夜夢遺精小便頻數一切虛損久服壯元陽益腎氣健筋骨生血駐顔扶老添壽蒼术四兩一兩用茴香一兩炒一兩用青鹽一兩炒一兩用茱茰一兩炒一兩用豬苓一兩炒令黃色取末用川烏炮去皮臍附子炮去皮臍川楝子酒浸去核巴戟白术炒陳皮炒各一兩肉蓯蓉酒浸炙破故紙炒三兩茯苓一兩炒木香不見火肉豆蔲麵裹煨當歸焙乾各一兩杜仲炒去絲二兩熟地黃酒浸蒸十次焙絲子酒浸炒茴香黑牽牛半生半炒山藥炒各一兩肉桂不見火晚蠶蛾去頭足翅炒各一兩葫蘆巴酒浸炒石斛炒川牛膝酒浸各一兩右為末酒煮麵糊丸如梧桐子大每服四十丸空心鹽湯下絲子丸出危氏方能治腎氣靣色黧黑目昏耳鳴心忪氣短舉動乏力腳膝緩弱小便滑數房室不舉股內濕癢小便澀痛出血遺瀝久服補五臟去萬病益顔色聰耳明目絲子洗淨酒浸炒一兩石斛去根三分熟地黃去土酒炒白茯苓去皮川牛膝去苖酒浸焙乾各三分五味子五錢鹿茸去毛酥炙一兩澤㵼一兩山茱茰水浸去核三分川續斷三分桑螵蛸酒浸炒防風去蘆三分覆盆子去枝葉并萼五錢杜仲去粗皮三分石龍苪去土一兩蓽澄茄肉蓯蓉酒浸切焙補骨脂酒浸炒黑角沉香川巴戟去心各三分茴香炒三分大川芎五錢肉桂去粗皮綿附子炮去皮臍一兩右為細末酒糊和丸如梧桐子大每服二十丸溫酒或鹽湯空心下腳膝無力木瓜湯下晚食前服一方無防風實氣散出簡易方大能補五臟氣虛脅肋膨脹中滿刺痛白术二兩五錢當歸微炒厚朴薑汁製白茯苓去皮熟乾地黃焙黃耆蜜炙川烏炮去皮臍桑白皮續斷炒各一兩枳殼炒香白芷炒牡丹皮茴香葳靈仙白芍藥白蒺藜炒去刺川芎五味子一兩山藥山茱茰乾薑蓬术甘草炙各三分右為細末用桃仁三分麵炒去皮研細和前藥每服二錢水一盞生薑三片棗一枚煎至七分食前鹽湯下藥應延壽丹麥門冬一兩去心天門冬一兩去心熟地黃一兩酒蒸生地黃一兩酒洗人參一兩乾山藥二兩牛膝三兩酒浸巴戟二兩去心澤㵼一兩肉豆蔲四兩酒浸洗杜仲一兩薑汁炒去絲枸杞子一兩酒浸洗去頂赤石脂一兩煆逺志一兩白茯苓一兩去皮覆盆子一兩地骨皮一兩酒洗去土五味六兩五錢車前子一兩石菖蒲一兩柏子仁一兩川椒七錢絲子三兩酒浸右為細末煉蜜為丸如梧桐子大每服三十丸空心溫酒送下初服一日三服二日至三日每日只一服漸加至五十丸老者加百丸服四十日見效至百日百病散之身體榮潤初服三日小便成酪雜色惡物是腎間病出五日間氣痞是臟腑間寒熱氣出至七日唇口生津初覺腹痛勿怪至十日全體漸肥潤至二十日鼻頂辛酸頭風消除腹中一切痛症四十五日語言雄壯胸膈微痛或吐微血去積滯思慮鬱結至百日百病散身體強健至誠修合服餌其效不淺也膃肭臍丸出聖惠方能補益丹田固濟水臟寧神益智明目駐顔壯腰膝充肌膚補虛冷安臟腑膃肭臍一兩酒刷炙微黃蓽澄茄一兩附子一兩炮製去皮臍澤㵼三分芎藭三分沉香一兩石龍苪三分肉豆蔲三分去殼牛膝一兩去苖蛇床子三分薯蕷一兩覆盆子一兩巴戟三分檳榔一兩桂心一兩木香一兩麝香一兩細研白术三分逺志三分去心石斛一兩去根銼補骨脂一兩微炒山茱茰三分肉蓯蓉一兩酒浸一宿刮去皺皮炙乾母丁香三分右為末入麝香研令勻煉蜜和搗三五百杵丸如梧桐子大每日空心以溫酒下三十丸漸加至四十丸巴戟丸出聖惠方専治丈夫下焦久積風冷腎臟虛乏腰膝酸疼小便數陽道衰不能飲食靣無顔色筋骨羸弱起坐無力膀胱虛冷臍腹脹急久服駐顔色養精志巴戟一兩肉蓯蓉一兩酒浸一宿刮去皺皮炙乾石斛一兩去根銼鹿茸一兩去毛塗酥炙微黃附子一兩去皮臍薯蕷三分牛膝三分去苖桂心三分山茱茰三分