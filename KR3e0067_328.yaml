body:
  text: 普濟方卷三百二十八明周王朱橚撰婦人諸疾門雜病萬病丸保慶集方治婦人久虚血氣衰少怠惰嗜卧百病諸虚飲食不進精神不足當歸四兩地黄二兩一方熟乾者右為末蜜和為丸如桐子大每服十五丸食前米飲下沈香萬應丸沈香另研沒藥細研茯苓去粗皮川芎當歸去蘆官桂去皮白朮白芷白薇𤣥胡索牡丹皮赤石脂藁本去蘆土赤芍藥右為細末煉蜜為丸每錢十丸每服十丸嚼空心温酒送下専治男子婦人姙娠傷寒諸虚百損或氣滯不勻飲食不化遍身走疼婦人姙娠傷寒身體腫大者麻黄湯送下姙娠打撲損傷或宿冷物動胎不安腹痛不止月水不調或前或後或多或少産前一切諸虚百損並用酒下或難産或逆血用當歸湯下或死胎在腹不過二丸或胎衣不下三丸即出亦温酒下惡物過多當歸湯下惡物不行紅花湯下自㓜年無孕每日一服至箇月次有神驗治婦人血氣出肘後方用通草煮飲之濃煎三五盞即便通又除寒熱不通之氣消䑕瘻金瘡踒折煑汁釀酒妙玉露通真丸出大全良方治婦人諸疾半夏薑汁製炒人參各半兩食茱萸醋炒厚朴製各一兩一分澤蘭葉三兩半甘草蟬蛻炒白芍藥蠶蛻炒用如無以蠶故帋三張代之石膏白朮當歸羌活熟地黄洗焙白茯苓各二兩防風乾薑柏子仁蒼术白薇木香黄耆川牛膝附子白蕪荑與蟬退同炒𤣥胡索川芎藁本各一兩川椒苦茰各三兩白芷一兩半右為細末煉蜜為丸每九錢分作十丸切記蜜煉無令太過及生也男子婦人諸虚不足狀如勞疾黄耆煎酒下血氣燒秤鎚淬酒下産前安胎用醋湯下産後諸疾用酒或鹽湯下産前産後㵼用米飲送下男子婦人牙疼用半丸揩疼處良久鹽湯嚥下産前産後血悶用童子小便下經脉不調用紅花酒下産後風毒生瘡荆芥茶下冷痰惡心乾嚼下婦人子宫久冷崩漏赤白帶下童子小便米醋一處緩熱下治婦人血氣用紫背金盤草根洗去粗皮焙乾搗羅温酒調服半錢治氣孕婦不可服忌雞魚濕麺羊血等橘歸丸出危氏方治肌膚手足俱有血脈路此怒氣傷肝血失常經以致如此服之神効右為末煉蜜丸如梧桐子大每服三十丸温酒下沒藥散出危氏方治月信退出皆為禽獸之狀似傷人先將綿塞隂户只頓服用沒藥一兩作丸散皆可服即愈一方細研温酒下一錢治内傷血暈臍腹痛者昔有莊婦病此危甚其夫來告急服此藥旋即愈痊治婦人發寒熱不止經久日後四肢堅如石以物擊之似鍾磬聲日漸痩惡茱茰木香等分煎湯飲即日可愈有一婦人小便中忽出糞穢諸方皆不能治因以意度之用生五苓散利水穀而愈後見夏書云有此病名交腸治以舊幞頭燒灰為末酒服之更不曉其故懐娠産前産後加減良方出澹寮方川芎洗當歸桂心不見火白芍藥洗右各為細末取浄各一兩各隨病証加減用産前初覺胎動川芎芍藥各半錢米飲下臨産腹痛甚川芎芍藥當歸各半錢桂末一錢温酒下扶産婦運行産後惡露未快川芎當歸各半錢童子小便調下仍時時打醋炭令香不絶則血脈自收安樂無病切不可妄投藥恐逐血過多則心虛氣劣三日内只服川芎當歸末各一錢童小便調下日三服三日後只服四順理中丸空心童子小便吞下七日内補虚當歸川芎末各一錢童子小便或米飲調下七日外方可服補藥補得太早則留住惡血纔平善四味各半錢童子小便調下産後頭昏目暈川芎芍藥當歸末各半錢童子小便調下未滿月已滿月四味各半錢水一盞煎至八分温服腹痛當歸末一錢桂心末半錢童子小便調下心胸煩悶當歸芍藥各一錢童子小便調下惡露過多桂心芍藥當歸各一錢童子小便調下大便冷用理中丸水一盞煎八分温服佛手散出危氏方治産前産後腹痛體熱頭疼及諸疾纔産了未進别物即先服此藥能除諸疾逐敗血生新血川芎二兩川當歸三兩右為細末每服二錢水一盞酒二分煎七分温服一方為粗末每服四錢水七分酒三分同煎至七分服將産前先安排此藥將兩服藥末煎之産了速進之三日内日二服三日外一服一方名芎歸湯只是此二味等分㕮咀水煎専治失血傷胎去血産後去血崩中去血金瘡去血援牙去血不止及一切去血過多心眩暈悶絶不省人事頭重目暗舉頭欲倒悉能治之若産後眩暈宜加芍藥服之一名桂香散治産後腹痛不可忍者加桂心等分酒與童子小便合煎服之立効一名當歸湯治姙娠子死或未死胎重不安每服用酒水合煎連進數服胎若已死便下若未死其胎自安此經累効萬不失一一名琥珀散臨月服之則縮胎易産兼治産後諸疾一名羊肉湯治虚損羸乏腹中㽲痛往来寒熱呼吸少氣不能支持頭眩自汗腹内拘急每服用精羊肉一兩姜十片水二盞煎至六分温服一名君臣散治婦人室女心腹㽲痛經脈不調用水煎服若姙娠胎氣不安産後諸疾加酒煎服一名芎當散治婦女血氣上喘下腫二味等分為細末每服二錢空心煎艾湯調下又治産後損身血衝心腹脹氣絶者神驗難生倒横子死腹中先用黒豆一大合炒熟水一盞入童子小便一盞藥末煎至一盞以上分為二服未効再作産後惡血注心迷悶喘急腹痛依前用黒豆加生薑自然汁半合煎服又此藥兼治臟毒毎服一錢半入炒槐花末半錢水一盞至六分無時候服三日取下血塊即愈如産後頭疼加荆芥煎如吐血亦宜服之治産難多用百草霜香白芷等分為末名烏金散每服二錢童子小便好醋各一合沸湯浸服止一服見効甚者再服已分免矣一法用五積散加醋煎亦能催生若崩中漏下失血過多不能止用芎歸湯療之不者宜以香附子炒去皮毛為末每兩用甘草一錢清米飲㸃服名順元湯仍以震靈丹間之有白帶者於順元湯加芍藥半兩仍間以白丹或者謂香附子耗氣則不然許學士謂資血養氣婦人仙藥雖羸人亦宜服之兼治男子婦人吐衂便利及諸症失血用此藥佐以米飲圓百草霜末每服百餘圎或以其他燒灰藥皆能作効不可劇以燥澁之劑止之必致壅遏腐敗却生他証大抵血不能行氣使之然者氣得其平則血循故道必無妄行之患矣香附子善能導氣用之每得其宜二聖散出大全良方治産前服之則安胎産後惡血不盡胎衣不下皆治之川芎羌活等分右為細末毎服二大錢水七分盞酒少許煎七沸温服二聖大寳琥珀散出大全良方生地黄一斤生薑一斤取自然汁將地黄汁炒生薑滓薑汁炒地黄滓各稍乾焙為末當歸川芎牡丹皮芍藥莪朮蒲黄香白芷羌活八味各炒桂心不見火熟地黄炒右各一兩同前二味為細末於甆合内收之婦人冷氣痛并血海不調隔氣炒薑酒下二錢産後包衣不下煖酒調下二錢産婦臨月日進三服滑胎易産温調二錢産後血犯心眼見鬼神用童子小便半盞酒半盞同煎調服婦人久服則顔色紅白無血来相攻一生無子者久服則有孕此藥治療婦人百病空心日午食前一日二服産後百病並煖酒下一捻金散出仁存方治婦人産前産後百病疼痛不可忍者此藥馬藺草醋炒麒麟竭沒藥乳香各半兩川當歸去蘆一兩右為細末每服二五錢熱酒調下保安丸出海上方治産前産後諸症列於後白豆冦赤茯苓牡丹皮紅芍藥沈香訶子皮梹榔硃砂石茱茰各三錢馬明退炒生地黄各一兩人參當歸官桂牛膝酒浸白芷木香藁本麻黄去莭黒附子炮川芎細辛去葉蘭香葉甘草桔梗去蘆寒水石燒粉防風去蘆蟬壳乳香沒藥白朮各五錢龍腦一錢射香少許右為細末煉蜜為丸如彈子大每服一丸空心細嚼温酒送下治証于後八分淋血𦂳不過三丸胎衣不下只三丸産前産後腹痛只一丸子死腹中只三丸臍下如刀刺只一丸遍身生黒班只一丸經脈不通只一丸産前産後傷寒只一丸臨産時一丸則易生返魂丹治婦人胎前産後諸疾危証舊黒箭野天麻葉似艾葉開紫花如紅蓼花形名茺尉子是也又名益母又名大扎又名貞尉又名屓蟾四五月採取隂乾用葉及花子磁器研為末煉蜜丸如彈子大隨後治証嚼服其根燒存性為末酒調服之功與黒神散不相上下胎前臍腹作痛或作聲者温米飲下胎前産後臍腹刺痛胎動不安下血不止水煎秦艽糯米湯下或當歸湯亦可如産時先用一丸以童子小便化下安魂定魄氣血自然調順諸病不生又能破血止痛養脈息調經絡温酒送下産後胎衣不下落在胞中及横生不順死胎經日不下者脹滿腹中心悶心痛炒鹽湯下産後中風牙闗𦂳急半身不遂失音不語童子小便用無灰酒各半下産後咳嗽胸膈不利惡心口吐酸水面目浮腫兩脇痛舉動失力者温酒下産後兩太陽痛呵欠心忪氣短肌體羸痩不思飲食血風身熱手足頑麻百節疼痛温米飲湯下産後眼前黒暗血暈血熱口渇煩悶如見鬼神狂言不省人事薄荷自然汁如無生者濃煎薄荷湯下及童子小便酒各半亦可也産後垢面顔赤五心煩熱或結成血塊臍腹奔痛時發寒熱有冷汗者童子小便酒各半下温薄荷自然汁亦可産後餘血惡露不盡結滯腸臍刺痛惡物上衝心胷主悶者童子小便酒各半下産後大小便不通煩燥口苦者薄荷自然汁如無生薄荷濃煎薄荷湯下産後瀉血者少煎棗湯下産後白帶下者煎膠艾湯下月水不調温酒下血崩漏下温酒下婦人久無子息温酒下服之十丸至二十丸亦能主喜一方用花花子隂乾搗末煉蜜丸如彈子大每服一丸一子死腹中盖因卒病臟腑熱極蒸其胎是其子死也盖子死不居子宫或墮胎腹間冷痛小便沫出腹脹四肢亦冷爪甲青是也或臨産之時此藥安魂定魄血氣自然調順諸疾不生破血補虚止痛養血氣調經絡用童子小便各七分化下二凡産難者胞已食母之血十月滿足則餘血結成塊俗呼為兒枕欲産之時血塊先破敗血裹其子是以難産或産後惡物不盡臍腹刺痛惡上衝心胸主悶用童便酒各七分化下三垢面顔赤胎衣不下既産了臟腑虛羸五心煩燥血流如水中則難出發寒熱有冷汗出但去其敗血其衣自出如帶斷了服此藥下或横生不順心悶欲死者童便酒各七分化下薄荷自然汁鹽湯亦可四産後三日起卧不得眼前黒暗生花盖産後血氣未定運走五臟入肝則目昏俗為暗風醫家以風治之或血熱口乾煩渴心悶亂見鬼神狂言妄語不省人事童便酒各七分薄荷自然汁亦可五産後口乾心悶及煩渇者血氣未定即食熱麫積滯在内以致熱燥煩渇者俗為胸膈壅塞或兩太陽穴痛呵欠怔忡氣短身體羸痩不思飲食血風身熱手足頑麻百節疼痛甚者温米飲童子小便各七分化下六産後四肢浮腫及寒熱者盖因敗血流入五臟滲入四肢停㽞日久化為膿状氣喘或小便澁或咳嗽胸膈不利惡心口吐酸水兩脇疼痛舉動乏力温酒化下七産後寒熱往来盖因敗血入心則熱入皮脾則寒狀熱瘧臍腹作痛或作聲温米飲化下桂枝湯亦可八産難中風牙闗𦂳急半身不遂失音不語童便酒各七分化下産後利未經月滿或誤食物下與血相攻擊前所積受濕因此敗血相攻煎棗湯下十産後大便秘結口苦煩渇非時不與以敗血衝心而蔽其心孔童便酒各七分化下薄荷汁亦可十一産後遍身疼痛百節開張血乗流入腸中停留不散臍腹疼痛米飲化下十二産後崩中漏下不止盖是傷酸物狀如雞肝脊背倦悶煎糯米秦艽湯化下當歸桂枝湯亦可十三産後未經月滿血氣不通盖是月水未還或食熱麫壅結成塊喘𠻳四肢無力多睡而汗出不止月水不調為骨蒸勞便服此藥童便各七分化下十四産後吐逆不止盖因敗血停於脾胃即發吐逆胸膈虚脹俗為翻胃温酒化下十五産後鼻衂口乾舌黒盖因入心臟熱則舌黒鼻衂也童子小便各七分化下十六産後赤白帶下煎秦艽湯下十七産後氣急喉中猫聲者盖因敗血衝心入喉中萬無一瘥矣十八産後中風者盖因未經七日勞動則百日之中傷其房事中風初病之狀眼澁腰强筋急角弓反張牙闗𦂳急若此者皆自傷犯耳十九産後面色黒及遍身生黒靨者乃敗血入其皮膚萬無一瘥矣烏雞煎出三因方治婦人百病呉茱萸良薑白薑當歸赤芍藥延胡索炒破故紙川椒炒生乾地黄劉寄奴蓬莪茂橘紅青皮川芎各一兩熟艾二兩荷葉灰四兩右為末醋煮麫糊丸如梧桐子大每服三五十丸湯使於後月經不通紅花蘇木酒下白帶牡蠣粉調酒下子宫久冷白茯苓煎湯下赤帶建茶清下血崩豆淋酒調棉花灰下胎不安和蜜好酒下腸風陳米飲調百草霜下心疼菖蒲煎酒下漏胎下血烏梅温酒下耳聾蠟㸃茶下胎死不動斑蝥三四箇煎酒下腰脚痛當歸酒下胎衣不下芸薹研水下頭風薄荷㸃茶下血風眼黒豆甘草湯下生瘡地黄湯下身體疼痛黄耆末調酒送下四肢浮腫射香湯下咳嗽喘滿杏仁桑白皮湯下腹痛芍藥調酒下産前後痢白者乾薑湯下赤者甘草湯下赤白雜者二宜湯下常服酸湯下任下並空心食前服之大効琥珀散一名烏藥散治婦人心滿迷悶臟腹搯撮疼痛氣急氣悶月信不調等疾方見室女月水不調類通真丸出危氏方隨證加減當歸去尾蒼术切炒肉桂防風川芎人參白芍藥白薇去土熟地黄酒炒牡丹皮茴香白朮白茯苓桔梗附子炮澤蘭葉各等分右為末煉蜜丸每服一丸血崩經脈不勻赤白帶下炒當歸酒下血風癮疹瘙痒薄荷蜜湯冷氣塊築心腹嘔逆反胃炒鹽湯下腸風㵼血赤白痢月信不止米飲下血風勞倦青蒿酒下頭疼眼花酒下月信不行室女紅脈不通産後中風不語迷悶五丸用紅花蘇木湯治漏下血氣刺心腹脹滿炒薑酒下育真丹出簡易方治婦人三十六種風疾下臟久虛沈寒痼冷帶下五色變易不定漸見痩弱代赭石紫石英赤石脂左顧牡蠣去二頭右為末米醋和成劑分為六錠入甘鍋内燒通紅半時辰傾出放冷搗為末次入乳香别研茴香微炒乾薑炮五靈脂去砂石各三兩右為末却入前末和勻醋煮糯米糊為丸如梧桐子大每服二十丸煎茴香酒下空心服艾煎丸出經驗良方治婦女諸疾腹痛赤白帶下香附子艾葉各四兩蔓荆子神麯枳壳去瓤當歸各一兩茱茰莪术各一兩右用醋一大碗慢火煮香附子艾葉以醋盡為度㨂去艾葉入糯米粉糊捻作餅子日乾同前藥為末醋煮麫糊丸如梧桐子大每服五十丸米飲醋湯任湯送下補隂丹出家藏方治婦人百疾經候不勻或崩漏不止腰腿沈重臍腹作痛潮熱往来虚煩自汗中滿氣短嘔噦不時肢體酸痛不思飲食日漸痩弱此藥潤肌體悅顔色調營衛逐風寒進飲食熟乾地黄洗焙生乾地黄各七兩半白术五錢蒼术五兩米泔浸一宿藁本去土牡丹皮當歸四味洗焙秦艽四味各十兩細辛去葉土七兩蠶退紙燒灰留性七兩肉桂去粗皮八兩甘草炙六兩半大黄卷焙乾秤炒取出六兩半枳壳麸炒去穰六兩陳橘皮去白六兩羌活去蘆頭香白芷乾薑炮三味各五錢糯米三升炒黒色大烟出白茯苓去皮一兩右件為細末煉蜜為丸每兩作一十丸每服温酒化下醋湯亦得空心食前服内補黄耆湯出危氏方治婦人七傷身體疼痛小腹急滿面目黄黒不能飲食並諸虚乏不足少氣心悸不安方黄耆三兩當歸三兩芍藥三兩乾薑四兩乾地黄半夏各三兩人參桂心逺志麥門冬去心甘草五味子白朮茯苓澤㵼各二兩大棗三十枚右㕮咀為散以水一斗半煮取三升去滓每一服五合日三夜一服治女人風虚血悶出本草以羊肉髓和酒服之阿膠煮散出生育寳鑑方治婦人宫臟百病阿膠大芎人參白术五味子麥門冬當歸茯苓黄耆續斷乾地黄各一兩甘草半兩右細剉為煮散每劑八銖婦人宫臟妄致肝氣攻衝喘促咳嗽入水五匕藥煎空心熱服若是血臟冷痛赤白帶下加生薑兩片大棗一枚煎服若補血入枸杞子覆盆子煎若嘔逆不思飲食加草豆蔲煎或丁香二十枚煎服若孕婦不安加桑寄生枝一兩細剉勻拌煎服若産後血多及半産下血宫臟全虛加白薇半兩微炙從蓉一兩細剉拌勻煎服若是久患宫臟骨節腰腿兩脇逆痛四肢少力常患風寒有如勞狀候加木香半兩鼈甲一兩醋炙柴胡一兩並剉拌之每服三錢入生薑三片水兩盞如茶法煎至七分空心熱服號萬全不傳方繹皮丸出朱氏集驗方治婦人百病大有効驗當歸四兩洗浄好酒浸一宿漉出焙乾再浸酒盡為度赤芍藥人參白芍藥肉桂去皮白术益智仁白微五靈脂附子陳皮青皮各二兩牡蠣煆赤石脂香附子𤣥胡索牡丹皮去木蒼朮敗醤京三稜蓬莪术劉寄奴艾葉澤蘭生乾地黄熟乾地黄各兩兩蒲黄三兩隔炒雄黒豆十兩丸小者右件將蒼术敗醤陳皮青皮京三稜莪术劉寄奴艾葉澤蘭小雄黒豆等十味用好醋煮藥候黒豆爛熟為度醋少又添煮為佳焙乾和衆藥為細末醋煮麫糊為丸如梧桐子大每服四五十丸空心薑酒或艾醋湯下有孕不可服玉仙散出鮑氏方治婦人諸疾香附子瓦器炒黒色勿焦白芍藥一兩甘草一錢右為末每服三錢沸湯下血崩不止手足麻木不仁竹葉湯下月水不行加生薑炒當歸煎木通湯下月水不勻當歸酒下頻頻下胎血脉不住米飲下氣痛及老婦人忽下血加炒薑黄炒陳皮任下勝金丹出王氏愽劑方治婦人血海虚冷臍腹痛黄痩飲食進退多因發煩産前後諸疾依法服大効大黄三兩用米醋浸兩宿以竹刀細切於甑上蒸九度研為糊當歸蒲黄官桂去皮乾地黄以醋微炒赤芍藥各半兩芫花一分下米醋内炒令黄劉寄奴一分畧炒蓬莪荗炮芎延胡索銀石器内炒杜牛膝地龍去土醋炒過已上各半兩右為末入大黄膏内和丸如雞頭大早辰臨卧温酒化下一丸如産後有疾炒薑酒化下一丸如月數未多勿服大琥珀丸出王氏愽濟方治婦人百病木香二兩細切微炒琥珀二兩生用北亭一兩以熱湯化為水澄去砂石取青者白磁器内熬京芎二兩炒官桂一兩去皮不見火當歸一兩去蘆頭各炒白殭蠶一兩直者去絲薑汁浸於椀内焙乾沒藥一兩生用薑黄一兩炒蟬殻去足酒洗浄用一兩右一十味依法修事一處為末别以乳香一兩用水應任水内入白麫為丸如菉豆大以好辰砂一兩半射香一錢為衣分為三度上之貴色勻也治婦人室女百病當服三十丸温酒醋湯任下舊病十五丸至二十丸日二服赤白帶下煎荆芥酒下脈不通虎杖芎蜜同煎酒下心氣痛生薑醋湯下上喘咳嗽訶子人參湯下五勞烏梅鼈甲葱白煎酒下血邪發狂磨刀水磨生犀下鉛白霜亦得四肢瘙痒遍身生瘡及五痔何首烏煎酒下血海積冷絞痛食後氣脹腰腳無力炒薑酒下血暈悶亂童子小便酒各半盞煎服温下血崩艾葉煎酒下臨産作陣血閇悶亂胎息不順子死腹中生衣不下及催生並用生雞子清一個熱酒冲調下小産後敗血奔心口噤舌强寒熱發渇頭面浮腫坐卧不得百節酸疼生地黄生薑汁各少許入童子小便酒各半盞同煎三五沸去滓温服産後重風炮烏頭二箇白殭蠶少許為末酒煎半盞下産後瀝淋不止口苦盜汗乾荷葉阿膠煎酒下頭面及四肢腫痛筋縮拘急延胡索酒下血癥結塊刺痛難忍煎當歸酒下赤白等痢熱陳米飲下有孕不得服保生丸出衛生家寳方治婦人胎前産後一切等疾知母細辛石膏火煆白薑火炮製血竭細研黄芩綿黄耆洗蜜水浸一宿炙肉桂去皮不見火沒藥研川當歸去蘆洗貝母生地黄淨洗防風去蘆已上各一分甘草一分半炙糯米炒令微黄黒豆微炒大麻子瓦上炒已上各三分川椒去子炒去汗石斛浄洗剉蜜水浸一宿以上各半兩右件各為末煉蜜為丸搗多杵為妙一兩分為五丸婦人胎前産後衆疾常服調氣進食在孕兩三月可服安胎益血不生諸疾孩子易生一丸分作三服温酒細嚼下或月候不調當歸酒下子難生死腹中横生倒産衣不下死絶不語但看心頭有氣暖煎棗湯化開灌入口中立瘥産後惡血攻刺刺腹脇腰疼炒豆淋酒下増寒壯熱嘔逆半身不遂及暈血崩帶下不止狂言飲食少味日漸黄痩並酒下忌生冷毒物黄金散治婦人産前後諸疾生薑一斤四兩薄切先炒令水氣盡再入米醋二升熬乾為度當歸白芍藥熟地黄洗桂心去皮大黄炮各一兩右五味浄洗細剉都炒乾同前炒薑為細末婦人産後敗血攻心暈悶欲死微有氣存細擦老薑炒令水氣盡用童子小便兩盞同煎百沸傾出漉去薑滓調藥二大錢熱服立醒或口噤以物挑開灌藥如分免後産母雖無病亦依前湯使調藥服之便服白粥壓下即不生血暈之患或胎不下者一服即下産後仍每日進藥三服服後五七日一服使逐去惡血久後百病不生産前後血氣及婦人尋常氣疾痛刺不可忍者並用無灰酒調服牡丹散治婦人脾血臟冷氣不和心胸煩悶不思飲食四肢少力頭目昏身體疼牡丹芍藥白芷乾薑當歸延胡索陳皮去穰官桂去皮烏藥苦杖紅花川芎各一兩右件十二味並生杵為末每服一錢半用薑二片酒水各半盞同煎至七分温服如初生産後每日三服一七日後漸減服數如吃藥後腹内些小疼痛請不怪如喫至滿月永無病生當歸散治宫胃虛冷當歸附子桂各半兩白术一兩半甘草一分右為細末每服二錢水一盞煎至七分去滓空心服治婦人使性常多欎怒傷損肝心止氣心氣結澁因而積涎怒而氣逆涎隨氣上其病状聞得心前昏悶潰亂不快遂有一塊物上觸到咽喉即手足倶冷口噤不開不省人事宜服此方忽懐孕而得此疾其治之與此方不同自有方在姙娠藥方中也藿香細辛羌活芎菖蒲各一分獨活牽牛各二兩半夏三分生右細剉為末内有牽牛半夏自作一處杵為末煎前面藥三錢取汁調牽牛半夏末一錢半為一服若吐涎即安若未吐如人行一里再進一服橄欖散治婦人口乾煩燥止渇潤咽喉川百菓煎烏梅甘草石膏各等分右為末煉蜜和丸如彈子大每服一丸噙化下沖和補氣湯十月十二日嚴霜作時有一婦人病四肢無力痿厥温熱在下焦也醋心者濁氣不降欲為滿也合目麻木者陽道不行也惡風寒者上焦之分皮膚中氣不行也開目不麻者助陽道行故隂寒之氣少退也頭目眩運風氣下陷於血分不得伸越而作也近火則有之羌活七分獨活三分柴胡二分人參一錢甘草炙半錢白芍藥三錢黄耆二錢白朮二錢蒼朮二錢橘皮二錢黄蘖三分黄連一分澤瀉一錢猪苓一錢麯二分木香草豆冦各二分麻黄不去節二分升麻半錢當歸身三分右件分作二服每服水二盞去滓稍熱服食逺神効麻黄桂枝升麻湯治婦人先患渾身麻木睡覺則少減開目則忽而全愈又忽而麻木因心中煩惱遍身骨節痛身體沈重飲食減少腹中氣不運轉黄耆半錢人參半錢炙甘草三分麻黄不去節半錢桂枝三分升麻三分白术三分半夏三分湯洗七次生薑一分陳皮二分厚朴二分木香一分茯苓三分澤瀉三分黄蘖二分黒附子二分草豆冦仁二分右都作一服煎法如常補氣升陽和中湯治六脈俱中得弦洪緩相合按之無力弦在上是風熱濕陷入隂中陽道不行其證閉目則渾身麻木晝少而夜甚覺而開目則麻木漸退而絶無常開其目此證不得懼其麻木不敢合眼致不得安息重時有痰嗽覺中常似有痰而不利時有躁作氣短促而喘肌膚充盛飲食不減大小便如常惟畏其麻木不敢合眼是為苦楚觀其色脈形病相應而不逆内經曰陽盛瞑目而動輕隂病閉目而静重又云諸脈皆屬於目靈樞經云開目則陽道行陽氣布週遍身閉目則陽道閉而不行如晝夜之分知其陽衰而隂旺也且麻木為風三尺之童皆以為然細按之有區别耳久坐而起亦有麻木為如繩繫縛之人釋之覺麻木不敢動久則自己以此驗之非有風邪乃氣不行也治之當補肺中之氣麻自去矣知經脈中隂火乗其陽分火動於中為麻木也當兼去其隂火則愈矣時痰嗽者秋凉在外在上而作也則實其皮毛以温劑身重脈緩者濕氣伏匿而作也時見躁作當升陽助氣益血微瀉隂火與濕通行經脈調其隂陽則己矣非五臟六腑之本有邪也補氣升陽和中湯主之黄耆五錢人參三錢炙甘草四兩生草稍一錢去腎熱白术二錢當歸身二錢橘紅二錢佛耳草四錢白芍藥三錢草豆冦仁一錢益陽表外寒酒黄柏一錢㵼火除濕蒼朮一錢半除濕中白茯苓一錢除濕導火澤瀉二錢除濕導火升麻一錢行陽助經右㕮咀每服五錢煎法如常已時間服之一方出海上方專治婦人血敗佛尼降真二兩右剉碎每服水一大碗煎至半椀空心連進二服治婦人血露出本草以蠶退紙燒灰服之治婦人懐子不乳出本草史記云菑川王美人懐子而不乳来召淳于意性飲意以茛𦿆藥一撮酒飲之旋乳意復診其脈而脈躁躁者有餘病即飲消石一劑出血血如豆比五六枚通血脈破血出本草取蕡麻汁煮粥食之治下閉血瘀女子帶出本草以沙牛角腮燒灰煖酒服治婦人一切血病産婦一切傷損方見本門虚損類益母煎出本草班珠藤出本草主風血羸痩婦人諸疾用班珠藤浸酒服綟木出本草主風血羸痩補腰腳益陽道以綟木浸酒服木香丸出危氏方治婦人氣虚不能制血凡婦人禀受怯弱其證有氣虚者血虚者氣虚者則不能管攝隂血時腹淋漓下濁白淫經候不調漏下五色形體痩瘁飲食減少不成胎也木香半兩白茯苓茴香炒黄益智仁醋浸三夕陳皮去白各一兩蒼朮三兩泔浸三夕焙乾香附子二兩浄酒浸三夕焙乾右末酒煮麫糊為丸如桐子大每服五十丸不拘時候米飲多下服收效尤速茸歸丸出危氏方治婦人血虚者胃之水氣不足胷中煩作熱手足掌心熱四肢煩疼或寒熱夜出盜汗口乾舌燥此是血虚當補其血嫩鹿茸煨去毛酥塗炙川芎人參肉蓯蓉烏梅肉肉桂柏子仁牡丹皮京芍藥已上各一兩當歸半兩洗黄蓍二兩蜜炙紫石英一兩大熟地黄洗浄再以酒蒸二次焙乾一兩右末米打薄糊為丸如梧桐子大每服五十丸至六十丸空心淡醋湯下黄耆白朮散出衛生寳鑑方治婦人四肢沈重自汗上至頭際項而還惡風燥熱黄耆一兩白术半兩黄蘖酒製二錢細辛三分川芎五分羌活二錢人參半兩吴茱萸五分當歸一錢半柴胡一錢升麻一錢五味子三個右件㕮咀每服半兩水二大盞生薑五片煎至一盞去滓稍熱服食前腹中不快加炙甘草一錢汗出不止加黄柏半錢𤣥胡苦練湯出衛生寳鑑方治臍下冷撮痛隂冷大寒肉桂三分附子三分熟地黄一錢炙甘草五分𤣥胡二分黄柏三分為引用苦練子二分右㕮咀都作一服水四盞煎至一盞去滓稍熱服空心食前千金丸出保慶集方治産前産後一切風冷血氣等疾產前胎氣不安腰腹多疼四肢昏倦姙娠臨月預合下每日空心一服臨産五臟不通産蓐中不生諸疾兼治産後惡血不盡及胎衣不下憎寒壯熱吐逆煩悶皮膚虚腫或血暈狂迷眼見神鬼能補勻血氣金釵石斛别搗為末秦芁細辛川椒去子微炒防風貝母麸炒微黄乾薑炮大豆蘖盫生芽長二寸焙乾生乾地黄切細糯米炒甘草炙已上各等分當歸切焙大麻仁黄芩石膏已上各等分右精擇為末以煉蜜成劑入木臼中杵一千下分為七十二丸擇破除天徳月徳合日合每服一丸温酒調下産後産前赤白帶下温酒嚼下産前後血氣薄荷湯嚼下月信不通當歸酒下臨産艱難或三五日難産及胎衣不下子死腹中横生倒産死絶不語但心頭有熱氣用藥一丸京棗湯研化灌之下喉立差産後惡血不盡臍腹疼痛嘔吐壯熱憎寒煩悶月候不調或多或少肢體虚怠皮膚浮腫産血不止虚勞中風口禁不語半身不遂産前後赤白痢大小便秘澁血暈狂語頭痛面色痿黄漸成勞痩飲食無味並温酒研下一丸産前臨月每旦一丸至臨産當歸酒下一兩丸催生五臟不痛子易生當歸荆芥散出家藏方治女人血氣攻注四肢疼痛飲食減少胸滿惡心日漸羸痩及血海虚冷經脈不調夜夢多驚瘕癖氣塊並皆治之荆芥穂川芎人參去頭蘆當歸洗焙桔梗去蘆頭附子炮去皮臍柴胡去苗防風去蘆丁香白芍藥蒲黄炒鼈甲醋炙令黄香白芷牛膝酒浸一宿焙乾白薇肉桂去皮半夏湯洗七次羌活去蘆杏仁湯洗去皮麸炒木香白茯苓去皮續斷㯽榔沒藥别研肉蓯蓉酒浸一宿焙柏子仁地骨皮已上各等分右件為細末每服三錢水一盞半生薑五片煎至八分温服不拘時候烏金散出危氏方治身熱口燥頭痛如破氣塊築痛下黄水如葵汁百草霜銑内炒烟盡為度紫金皮米泔浸煮熟炒焦色粉草炙右為末每服二錢艾湯調或用淡醋湯空心服又方加入住紅蘇根金欋子根心嘈猪血入鹽炒酒吐紅飯飲勻月水木𤓰當歸浸酒赤白帶下葱白連根煎酒血海虚冷下白不止用鯉魚一個去腸肚不去鱗將油髮一塊入魚肚内黄泥固濟炭灰内燒烟淡淡留性去泥碾為末後入當歸頭甘草炒為末每服一錢用舊酒調下養榮湯出楊氏家藏方治婦人血海虚弱氣不升降心忪恍惚時多驚悸或發虚熱經候不調不進飲食白芍藥川芎熟乾地黄洗焙當歸酒浸一宿焙乾青皮去白薑黄牡丹皮五加皮海桐皮香白芷十味半兩牛膝酒浸一宿焙乾延胡索沒藥五靈脂去石肉桂去皮已上五味各一分右件㕮咀每服五錢水一盞半生薑五片烏梅一枚煎至一盞去滓温服不拘時候黄耆地黄丸出衛生家寳治婦人血虚肌痩面黄腹脹飲食不進血或崩漏腰脚痠疼臍腹㽲痛榮衛不足渾身倦怠此藥活血駐顔滋潤皮膚黄耆一兩蜜炙當歸去蘆酒浸洗三兩川芎熟乾地黄酒浸二兩鵝卵礬朱二兩火煅通赤盆覆地上出火毒右為末煉蜜丸如梧桐子大每服三十丸空心温酒鹽湯下麝珀散出衛生家寳治婦人諸虚不足産前産後等疾大効獨莖川當歸一兩去蘆頭并稍洗以好酒浸一次日漉出控乾切作薄片子火焙令乾須稱一兩用紫團人參去蘆頭稱八錢切作片子慢火焙乾琥珀四錢别研極細末候衆藥成末子却入琥珀末一處拌勻柏子仁半兩㨂去殻如衆藥碾成末子即將柏子仁一味入碾中碾一二三百碾却將衆藥末子又在碾内一處又同碾一二百碾抄出再用紗羅子隔篩餘者藥碾又羅篩芎藭一兩剉碎焙乾官桂削去粗皮剉碎不得見火只於日㬠乾三錢半令碾作細末却拌和入藥尤妙甘草一兩火上微炙透熟地黄二兩須用酒漉勻九蒸九㬠白朮乾好者剉碎焙乾稱八錢白茯苓一兩剉碎微焙右件為細末每服三大錢水一中盞半煎至八分去滓乗熱再入射香少許攪勻急以盞子蓋定藥少時通口服空心食前如急要服便服抄二平錢泡射香湯調下酒浸服亦得忌生冷油膩硬物清肺湯出簡易方治婦人肺熱生風面癗用當歸防風大川芎剉生地黄洗切赤芍藥剉黄蓍去根荆芥穂各一分甘草炙半兩右為末每服二錢水一盞煎至七分食後通服日三服滋隂萬病丸出十便良方治勞虚血弱肌肉枯燥手足多煩肢節痠疼鬂髮脫落面少顔色腹中拘急痛引腰背去血過多崩傷内竭胸中氣短晝夜不得眠情思不樂怔忪多汗熟地黄當歸各一兩右為細末煉蜜為丸如梧桐子大每服二十丸米飲下不以時地髓煎丸通經脈補虚弱强腳膝潤肌膚生地黄一斤取汁牛膝製了末二兩右二件攪勻銀石器中熬可圓即丸如梧桐子大每服三十丸食前酒下渾身碎痛飲子治婦人勞倦虎骨五銖茯苓甘草防風藁本白芷各一銖當歸芍藥續斷呉朮附子茯苓各三銖右為粗末生薑棗錬服不拘時黄耆飲子屢經大効方治婦人血氣不足夜間虚乏有汗倦怠少力黄耆五味子當歸茯苓各半兩芍藥逺志麥子人參呉朮各一分甘草三銖右為粗末每服三錢水一盞半生薑三片煎至七分去滓不拘時服神驗地黄散治婦人血少氣寒面色青白方地黄乾薑各一兩右為細末每服二錢温酒調下不以時治婦人血海虚憊面無顔色飲食減少炙艾綿蒼术呉茱萸白朮各一分當歸半兩右為細末煉醋煮麫糊丸如梧桐子大空心米湯下二十丸治一切婦人血海虚弱將養不到變成勞候其狀面色青黒肌體消痩多困少力吃食減少口無滋味經後過少多時須汗頻發寒熱兩脇脹滿忽時氣痛當歸澤蘭五味子黄耆官桂去皮木香山茱茰獨活各一分芎牛膝石斛乾地黄人參各半兩藿香三銖右為細末煉蜜丸如梧桐子大早朝空心鹽湯下五十丸治婦人血海虚冷肌肉黄瘁飲食減少腹中非時刺痛或有氣塊非時走作不定少有嗣續延胡索桑寄生當歸牛膝各半兩獨活川芎五味子防風藁本白芷木香鼈甲醋炙各一分右為細末作一處相滚令勻煉蜜丸如梧桐子大早朝空心鹽湯下三十丸至五十丸温濕阿膠丸除風冷煖血海治月事過多血氣諸疾方阿膠附子熟乾地黄白芍藥各二兩艾葉四兩右五味同米醋二升一處煮令盡醋用烈火焙燥碾為細末酒煮麫糊丸如梧桐子大每服五十丸温酒送下不拘時候芎藭湯調益榮衛滋養血氣治諸疾血虚羸短氣腹中疼痛面體少色心忪驚悸虛煩汗出時發寒熱倦久無力姙娠温和胞絡助氣産後順行餘穢滋生新血芎當歸等分右為粗末每服三錢水一盞半入酒少許煎至七分去滓食前服一方加縮砂桑黄丸治積煖血海女人諸疾補益桑黄半斤牛膝酒浸切焙一斤桃仁去皮尖雙仁炒研如膏麥蘖炒白术陳麯炒當歸切焙大黄剉炒各半斤生地黄十斤絞自然汁生薑十斤絞自然汁右搗羅七味為末與桃仁膏同入二汁内拌勻磁器盛甑内蒸一日取出焙乾搗羅末煉蜜丸如梧桐子大每服二十丸空腹温酒下漸加至三十丸治室女月露滯澁心煩恍惚用鉛白霜研細為散每服一錢温地黄汁一合調下生乾地黄煎湯調服亦得治一切疾病取預知子人每日服二七粒患者服不過二千粒永瘥治女子赤白沃止血養精神保血脈益氣嗜飲食利人口齒去頭中熱風出本草用水靳和醋作虀葅及煮食之並亦得能滋人患鼈癥不可食治婦人瘕子藏急痛出本草以七月七日取槐實搗汁同器盛之日煎令可丸大如䑕屎内竅中三易乃愈鬼縳藤出本草去風血以鬼藤浸酒服之治血氣逆心煩滿用羚羊角或水羊角燒為末水服方寸匕治婦人十二疾出本草以狗隂卵燒灰服之治血氣出本草取蟕􅏲血飲之若無生血取其皮甲名鼈皮煎汁代之治婦人血病塞上出本草以白馬蹄燒烟盡取灰末酒服方寸匕日三夜一治女子胞中餘血不盡欲死者以清酒和鹿角灰服方寸匕日三夜一甚効治婦人傷子帶下諸血著臍腹中瘀痛身體黄疸欲死用乾地黄大黄各四兩杏仁四十枚春酒五升合煮取三升分三服日三夜一治腳膝風濕産後少力多疼痛及隂汗出御藥方用燒礬作灰細研末一匙頭沸湯投之淋洗痛處理中茯苓湯出試効方單治婦人六十歳病振寒戰慄太陽寒水客也呵欠嚏噴足少陽溢也口亡津液足陽明不足也心下急痛而痞手以隂受寒也故急痛足太隂血滯為痞身熱近火熱在皮表寒在骨髓亦有拒寒戰慄也臍下惡寒丹田有寒也渾身黄而白睛黄寒濕也以餘證之治其寒也溺黄赤而黒頻數寒温勝也自病来身重如山便著牀枕至隂濕勝也其脈診得在右關并尺命門中得弦而急極細雜之以洪而極緩弦急為寒加之以細細者寒水雜以寒甚者勝出黄色也又洪大者心火受制也左尺按之至骨舉指来實者壬癸俱旺也六脈按之俱空虚下焦無陽也先以輕劑去其中焦寒濕兼退其洪火服理中湯白术乾薑炙甘草人參茯苓除寒濕各五錢右件為細末毎服稱二錢水一盞半煎至一盞冰之冷寒服之謂之熱因寒用其寒以對足太陽之假熱也以乾薑之辛熱以瀉其寒也故曰真對真假對假若不愈當以术附湯冰之令寒以補下焦元氣也黄耆白术湯出試効方治婦人四肢沈重自汗上至頭際頸而還惡風頭燥熱黄耆一兩白术半兩黄蘖酒製二錢細辛二分川芎半錢吴茱萸半錢羌活二錢五味子三錢人參半錢炙甘草二錢當歸身一錢半柴胡升麻各一錢右件㕮咀每服半兩水二大盞入生薑五片煎至一盞去滓稍熱服食前腹中不快加炙甘草一錢汗出不止加黄蘖一錢療胸脇肢滿者妨於食病至則先聞臊臭出清液先唾血四肢清目眩時時前後血病名血枯得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不来治之方素問云出本草以烏鰂魚骨藘如二物并合之丸以雀卵大如小豆以五丸為後飯飲鮑魚汁以利腸中及傷肝也注云飯後藥先謂之後飯按古本草烏鰂魚骨藘茹等並不治血枯然經法用之是攻其所生所起耳魏志華佗治婦人長病經年世謂為寒熱注病冬月中佗令坐槽中平旦用冷水汲灌云當滿百始七十灌冷戰欲死佗令滿數至八十灌熱氣乃蒸出囂髙二三尺滿百灌佗乃使然火温牀厚覆衣良久汗洽出著粉便愈出鳯科集驗方烏金散出朱氏集驗方治婦人諸般發搐真川墨乃松烟也磨酸醋緩緩啜兩呷即効婦人産後頭揺目不開服之便住次用豆淋酒一味封過一宿次日兩服好治婦人血噤失音衝惡出本草用鑰匙以生薑醋小便煎服弱房人煎湯服亦得治因血枯皮上膚起面無顔色者皆不足也以諸血並生飲之神仙濟隂丹治婦人胎前産後一切積氣血塊血癥血瘕血暈血虛血悶血壅血崩血淋血靄赤白帶下月事不調臍腹疼痛腰膝沈重乾嘔惡心不思飲食五心煩熱四肢倦怠或寒熱嘔吐酸水頭目昏眩遍身隠痛坐卧不安經絡凝滯榮衛不調氣血虚弱變成血勞面黄體痩夢中驚悸虚怯盜汗或産後有失調理至天隂雨下渾身疼痛常服此藥升降隂陽温煖血海或子宫久冷或少病三四十丸細嚼炊薑酒下立愈若室女經脈不行宜服之治腸風食毒下血不住槐花劉寄奴各等分為細末用米湯空心送下妙敗薑青皮陳皮三稜蓬术各一兩烏頭一升已上六味先以米醋煮焙乾為度醋用二升熟地黄生地黄赤芍藥當歸白芍藥劉寄奴薑黄肉桂蒲黄各半兩右為細末醋糊為丸如桐子大每服三十丸空心薑酒食前送下治婦人口乾方用黄龍肝一具燒灰酒下即安瘥普濟方卷三百二十八
