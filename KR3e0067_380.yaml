body:
  text: 普濟方卷三百八十明周王朱橚撰嬰孩諸疳門治小兒一切疳吹鼻散出聖惠方治小兒一切疳腦悶昏沉宜先用青黛研躑躅各一兩黃連去鬚瓜蒂地龍微炒麝香右為細末散每用少許吹鼻中看嚏噴多少嚏噴多即病輕嚏噴少即病重熊膽膏一名熊腦煎出醫方妙選治小兒腦悶口生白瘡齒疳并諸般疳疾不差悉主之熊膽蚺蛇膽蘆薈牛黃麝香龍腦各一分右為末用新汲水兩盞入藥中攪令勻以銀器盛重湯煮之水只可及瓷器五分以慢火煮頻添暖水煮至半日更投三五粒糯米同煮米爛藥即成以箆子攪令勻勿令藥乾欲點鼻中時先七日孩子與乳母忌冷醬豉五辛熱麵魚肉并少食鹽然後取藥少許漸漸吹鼻中塗口瘡上頻使兩日即停一日看兒髮變青即止至七度停藥後還須慎口一方有黃礬一方用薄荷湯下兼塗患處地黃丸出危氏方治腎疳極瘦身有瘡疥寒熱時作頭熱腳冷如氷生乾地黃八錢乾山藥山茱茰各四錢澤㵼牡丹皮白茯苓去皮各三錢右為末煉蜜丸梧桐子大每用一二丸化開服又方取交妳及一切疳毒右夜明沙洗淨留滓每用三四錢入瓦瓶內取獖豬肉三兩薄切入瓶內水煮取肉一半與兒母食澄清肉汁令兒飲汁食肉取下腹中胎毒次用生薑四兩和皮切炒黃色又以黃連一兩去毛三味同為末麵糊丸空心米飲下史君子丸出錢氏方治臟腑虛滑及疳瘦下痢腹脅脹滿不思乳食常服化蟲補胃消疳肌肥厚朴薑汁製半兩史君子一半麩炒熟一兩一半一兩焙陳皮一分甘草訶子半生半熟青黛半兩如是兼驚及𢃄熱渴即用此一味如臟腑不調不用右為末煉蜜為丸如雞頭大每服一丸米湯化下兒生百日已上半嵗已下服半丸乳汁下一方無甘草或作散每服一錢粥飲調下此方消涼有積熱者可用一方無青黛嚏疳散出仁齋直指方蘆薈黃連各一錢瓜蒂豬牙皂角蝦蟆各半錢麝香少許右末吹入鼻嚏則可療黃連肥兒丸出仁齋直指方治一切疳及眼赤腫痛癢昏暗雀目肓或經月合眼鷹瓜黃連淨一兩蕪荑焙麥芽炒神麯炒各半兩青皮史君子焙各二錢半右為末獖豬膽浸糕丸麻子大每七丸米湯下疳熱眼山梔仁煎湯下檳榔丹出醫方妙選治小兒能食不生肌肉常服此佳檳榔麵裹炮木香胡黃連各一兩代赭石一分研香墨一分要細研燒存性麝香一分研右為細末粳米飯和丸如黍米大每服十粒煎橘皮湯下食後大小加減肉豆䓻丹出醫方妙選治小兒肌瘦挾積常服尤佳肉豆䓻史君子青橘皮炒黃各一兩牽牛一分炒蘆薈一分炒麝香一錢右為末用糯米飯和丸如黍米大每服十粒生薑湯下食後量兒大小加減五靈脂丹出醫方妙選治久嗽恐成疳常服尤佳五靈脂蟬殼欵冬花各半兩蟾頭一枚塗酥炙黃青黛研雄黃研各一分右為細末拌勻糯米飯和丸如黍米大每十粒煎人參湯下量兒大小加減灌鼻丸出聖惠方治小兒一切疳心煩腦熱青黛一錢黃連末一錢蘆薈一錢瓜蒂一錢龍腦一杏仁大蟾酥半杏仁大右為末用粳米飯和丸如菉豆大以妳汁丸化破兩丸滳在鼻中每日三兩度用之效定命丸出聖惠方治小兒一切疳硃砂一分細研麝香半分細研瓜蒂二枚蛇蛻皮灰二分青黛一分研細乾蝎二十枚微炒右為末都研令勻用狗膽汁和丸如黍米大每度以乳汁化破一丸男左女右滴入鼻中得嚏三五聲為效吹鼻散出聖惠方治小兒一切疳眼鼻癢熱髮豎乾瘦宜用此熊膽一分丁香半兩黃蘖一分蝦蟆半兩五月五日令炙黃皂莢半兩麝香一錢細研右為末每用小豆大吹於兩鼻中嚏出疳蟲為效通頂散出聖惠方治小兒一切疳青黛一分細研蟾酥半杏仁研入赤小豆十二粒麝香半分細研藜蘆一分瓜蒂七枚右為細末散每度用一豆大吹入鼻中常有蟲子出如米心大黑者難治赤白黃者易療牛黃丸出全嬰方治小兒疳熱進退或即盜汗大便堅實時時心躁情意不恱或大便焦黃黃連黃芩龍膽草各一兩大黃一兩牛黃一兩右為末糊丸小豆大三嵗二十丸米湯送下治鼻衄鹽水送下入良久即效青黛丸出聖惠方治小兒五疳煩熱羸瘦不欲乳食青黛三分細研麝香一分細研訶黎勒皮三分蘆薈一分熊膽一分細研硃砂一分細研右為末以糯米和丸如菉豆大每服以粥飲下五丸日三服量兒大小增減服之一方沙糖水下三丸三嵗已上加丸服生筋散出全嬰方治證本門金靈散下木鱉子六個去殼草麻子六粒去殼右研細先急抱頭捺項上令熱津唾調貼之神妙宜氣丸治小兒疳熱久蒸肌肉消瘦形容痿悴神情不樂飲食雖多不生肌肉宜服此方大有功效蓬莪术炮赤芍藥川當歸鱉甲米醋炙去裙焦為度等分右為細末煮麵糊為丸麻子大一嵗二十丸熟水大小加減服之蚵蚾丸出聖惠方治小兒五疳八利乳食不節寒溫調適乖違髮豎毛焦皮膚枯悴腳細肚大顱斛胸髙漸覺尫羸時時盜汗咳嗽腦後髙起復生內塊小便泔濁膿痢澱青撏眉咬指喫土甘酸吐食不化項濁頻併心神瞀鼻赤唇燥小蠱既出蛔蟲咬心疳眼雀目名曰丁奚此藥救療效驗如神白蕪荑去皮黃連去鬚蚵蚾酒浸去骨炒胡黃連各一兩半青黛半兩為衣右為細末豬膽汁糊丸如菉豆大每服三十丸飯飲吞下食後臨卧日進三服鶴虱丸出聖濟總録治小兒一切疳病鶴虱輕炒胡黃連蘆薈研丹砂研三分青黛研三分右為末更入乳鉢內研令細用米泔煮豬膽令熱取汁和為丸如麻子大每服三丸至五丸米飲下早晨午間日晚各一服量兒大小加減當有蟲出益容丸出聖濟總録治小兒五疳羸瘦發熱面黃或脾虛減食泄㵼無時大治腹痛史君子取肉銼碎焙乾厚朴去粗皮米泔浸川芎橘紅甘草各二錢右為末錬蜜丸如皂角子大二嵗以上服一丸以下服半丸陳米湯化下無時胡黃連丸出聖惠方治小兒一切疳胡黃連蘆薈細研騏驎竭地龍微炒熊膽研入已上各半兩蟾酥三分右為末麵糊和丸如黃豆大空心以粥飲下三丸晚後再服通命散出醫方妙選治一切疳證可以卜輕重逆順瓜蒂半兩細辛一分研乾地龍一分炒白礬一分黎蘆一分去蘆頭右為末每用少許吹鼻中得嚏即吉若有蟲出即差白礬丸出聖惠方治小兒一切疳肌膚消瘦㵼痢不止口鼻生瘡腹脹腳細水榖不化白礬灰蜜陀僧燒酒拌三遍烏賊魚骨炙微黃色同上麝香半兩蝦蟆灰右為末錬蜜和丸如菉豆大每服以溫水送下三丸日三服量兒大小增減服之青黛丸出聖惠方治小兒一切疳青黛一分龍腦麝香膩粉蟾酥已上各半錢右研令細用水浸蒸餅和丸如菉豆大每服以溫水下三丸量兒大小加減服之吹鼻散出聖惠方治小兒一切頭髮乾踈腦熱煩悶瓜蒂七枚蔥白一莖切暴乾藜蘆半分英粉半錢麝香一字右為散每用菉豆大吹左右鼻良久有蟲子出子細看如斷線此是病根出也通頂定命散出聖惠方治小兒一切疳腦熱鼻塞宜用蘆薈一分細研瓜蒂一分麝香一錢細研鵝不食草一分豬牙皂莢一分右為細散每取少許吹於鼻中當嚏出疳蟲黑者難治赤白黃者易醫又方出聖惠方治小兒五疳能充肌膚恱澤顔色宜常服此鯉魚膽二枚蝟膽二枚狗膽一枚白附子一分炮製烏賊魚骨一分炙令黃右先搗烏賊魚骨并白附子為末相和內入豬膽中候乾搗細羅為散每服以暖水調半錢服之量兒大小以意加減史君子丸出和劑方治小兒五疳脾胃不和心腹膨脹時復疾痛不進飲食漸致羸瘦並宜服之厚朴去皮薑汁炙陳皮去白川芎各一兩史君子仁浸去黑皮一兩右為細末煉蜜丸如皂子大三嵗已上一粒已下一粒陳米飲下大治小兒腹痛消積丸出錢氏方治一切積聚成疳腹脹丁香九箇縮砂仁十二箇巴豆二箇去皮膜心烏梅肉三箇焙右為細末麵糊丸黍米大三嵗已上三五丸已下二三丸溫水下無時候服君朴丸出全嬰方治小兒諸疳小便白濁久則黃瘦不長肌肉史君子炮厚朴製黃連各一兩木香三錢同炒右為末糊丸如小豆大三嵗三十丸米湯下五服效黃土丸出全嬰方治小兒疳積在脾面黃腹急咬指甲揉眉毛搔口鼻要喫泥土灰炭茶紙黃土陳皮各一兩木香一分巴豆三十粒不去油右為末糊丸小豆大三嵗三十丸煎黑豆汁下直候㵼五次疳積盡出益黃散助氣後與疳藥常服靈星膏出經驗方治小兒潮熱肌熱疳勞瘦弱肚拍如鼓鳴脊如鋸乃積熱而成疳黃耆蜜炙胡黃連地骨皮柴胡各等分右末煉丸服隔夜酒浸露一宿次日澄去酒薄荷湯浸服之龍膽丸出和劑方治疳病發熱龍膽草黃連去鬚炒青皮去白史君子去皮炒右為末豬膽汁和丸如蘿蔔子大每服二十粒以意加減臨臥熟水下黃連丸一名金粟丸一名金瓜丸出衛生家寶方治小兒諸疳壯熱肥兒神效黃連去鬚黃蘖去粗皮甘草炙銼青橘皮去白燒乾等分右四味搗羅末研麝香少許和勻獖豬膽內用線繫定於石器內漿煮五七沸取出當風挂一宿去膽皮研熟丸如菉豆大每服五七丸米飲下漸加至十丸一方加麝香一分豬膽內煮五珍丸出危氏方治疳傷肚大青皮不去白炒焦黃乾薑燒灰存性五靈脂蓬术各一兩右為末搜和稱藥末一兩用肥巴豆肉去油稱一錢研細拌和粳飯丸麻子大每三五丸米湯下不拘飢飽五疳蕪荑丸一名兒丸出續易間方治一切疳氣瘦弱食少大抵疳氣其狀多端雖輕重不同形證亦異然窮其根本皆由乳哺乖宜寒溫失節臟腑受病氣血不榮致成疳也一曰肝疳其候搖頭揉目白膜遮睛汗流遍體肉色青黃腹中積聚自是肝疳亦名風疳二曰心疳其候身體壯熱吐痢無時頰赤面黃胸膈煩滿鼻乾心燥口舌生瘡下痢膿血有時盜汗此是心疳亦名驚疳三曰脾疳其候心腹脹滿乳食不化喘促氣粗咳逆多啼骨立毛焦好喫泥土痢多酸臭名脾疳亦名食疳四曰肺疳其候咳嗽氣逆咽喉不利揉鼻咬齒腹內氣脹大腸不調糞中米出此名肺疳亦名氣疳五曰腎疳其候肌肉消瘦齒齗生瘡寒熱往來口鼻乾燥吐逆少食泄痢頻併肛門不收此是腎疳亦名曰急疳今以方同療之黃連蕪荑麥蘖神麯等分右為細末蜜丸粟大量兒大小米飲下如五疳陳皮湯下寒熱往來薄荷湯下蟲咬心痛苦棟子湯下乳癖氣結成下痢赤白腹痛後重腸鳴泄米榖不化並陳倉米湯下一方豬膽汁為丸磨積丸治小兒疳積黃瘦吐食出本事方川烏一錢定粉三錢艾灰二錢龍骨二錢右為末滴水為丸龍眼大作餅子每服一餅飯飲磨下蘆薈丸出本事方治小兒疳積蘆薈荆芥黑牽牛青皮各等分右精細銼治炮製為末麵糊丸如粟米大兒一嵗已下一丸或二丸亦不妨酌量加減壁宫丸出惠全方治小兒一切疳腹虛愛食泥土四肢壯熱壁宫一枚頭腳尾麵裹煨熟熊膽一錢研入麝香半錢細研黃連右為末蟾酥和丸黍米大每服研肝汁下五丸量大小以意加減吹鼻散出聖惠方治小兒一切疳瓜蒂二十枚赤小豆炒胡黃連半分倒鈎棘針二十枚右為細散每日早晨以半字吹兩鼻中兼用粥飲調一字灌之每一度吹鼻灌藥一服㵼腦散出聖惠方治小兒一切疳鼻塞壅悶宜用榖精草一分燒灰細辛一分蘆薈一分瓜蒂一分右為細散每用黃米大吹在鼻內常出惡物為效紫霜丸治小兒乳哺失節致傷脾胃停積不化變成疳積腹脹乳食減少胸腹疼痛痞悶嘔吐并治傷寒溫壯內挾冷食大便酸臭或已得汗身熱不除及變蒸發熱多日不解因食或癎或寒後熱並宜服代赭石二錢研細水飛巴豆二十個去皮尖右為細末飯丸如粟米大每服三五丸至十數丸煎皂角仁湯下無時五膽丸出聖惠方治小兒五疳齒焦四肢黃瘦百晬後至十五嵗已前並宜服之乾蟾五個大者細銼和骨用酒五升文火煎至濾去骨砂盆內研以絹濾去滓入熟蜜四兩於重湯內熬令成膏胡黃連二兩黃連二兩去鬚白蕪荑二兩輕炒去皮右為末入前膏內和丸如麻子大每服用人參湯下三丸乳汁下亦得量兒大小加減服之蛇蛻丸出聖惠方治小兒五疳羸瘦蛇蛻皮一分乾蟾一分乾地龍一分蝸牛一分已上四味入瓷合子內以泥封閉使炭火燒令通赤即住後取出硃砂羅為末更入黃丹一錢微炒同研丁香末半分阿魏半錢細研砂砂一分細研右件藥同研令勻以蒸餅和丸如麻子大每於空心以熟水下二丸量兒大小加減服之金粟丸出聖惠方治小兒疳榖精草寒食前後花出時收隂乾一兩白薔薇花出時收用一兩丁香末一兩蝦蟆一兩右件藥取上二味端四日用水一斗宿浸五日煎至二升去滓澄清重於小鍋中煎成膏後入丁香蝦蟆末令勻和丸如黍米大懷在胸每服半丸一二嵗一丸七嵗二丸十嵗三丸總服藥後以桃柳湯於盆中從頭淋浴之候湯冷以衣拭乾青衣蓋不得衝風恐蟲不出如睡最佳良久如醉疳蟲於頭面背膂出如汗津如蟻子或如麩片並微細色白稀者七日內瘥不出再服如色黃赤當隔日更依前法服蟲黑者不用服藥此方入硃砂為金粟丸入青黛為膏金丸入麝香為方勝丸四靈丸出聖惠方治小兒五疳頭大項細心腹脹滿皮膚乾鼓毛髮焦黃鼻下赤爛口舌生瘡㵼痢不止日漸瘦大蟾一枚去四足擘開腹肚入胡黃連末一兩在腹內以線縫合用濕紙三兩重裹以泥四面固晾令微乾便出隂氣便以炭火三斤燒令燒至通赤即住待冷去泥土即細搗羅為末更入後藥丸之用蘆薈麝香熊膽已上各一分右為末以麵糊丸如麻子大每服以粥飲妳汁下三丸日三服三嵗已上加服之蘭香散出錢氏方治一切疳瘡鼻下赤爛輕粉一字銅青半錢蘭香葉菜名二錢燒灰右為細末令勻看瘡大小乾貼白粉散出錢氏方烏賊魚骨末三七輕粉二七白芨二七右為末先用清漿水洗拭過乾貼之無時青金丹加麝香用之佳定粉龍腦白丁香炒右乳癖古方敗毒散加甜葶􅐗薄荷荷葉名羌活散蚵蚾丸出全嬰方治小兒因有疳積腹脹面黃證候百出右以蚵蚾一箇大黃一兩入腹中黃泥裹火煆用九分膩粉一錢稱同為末和丸小豆大三嵗三十丸米湯送下飢最服候㵼數次取下疳積次與白术散助氣後與常服疳藥蘆薈丸蘆薈丸出百一選方治壯熱煩躁泄㵼腹急脹滿面黃瘦一切蟲痛小兒五疳病證龍膽草去蘆黃連各半兩雷丸右為細末糊丸如黍米大每服三四丸米飲下此方費省而功效博蘇韜光家中令小兒常服極佳不可一日無也苦黃連丸出百一選方治疳蕪荑三兩川黃連一兩半苦棟子三兩去光皮并核右為細末篛裹粟米煨成飯丸如黃米大每服十五丸至二十丸米飲下空心食前日三服蘆薈丸一名膽連丸傳氏活嬰方治脾胃積熱遂成疳疾宜服此藥龍膽草黃連去鬚同蕪荑各一兩蕪荑去皮先炒黃色次入前藥一處炒赤色右末别入蘆薈一分和勻爛飯丸如黍米三丸服至三十丸空心米湯送下獲命方出全嬰方治小兒久患疳冷唇無紅色氣脹腹滿頻多㵼利惟是黃涕忽時嘔吐宜喫此方橘皮甘草炙豆䓻白术人參防風各一錢史君子蒸三次半兩右為末每服半錢六分米湯一盞入藥在內重煎取五分空心喫兒大者服一錢治小兒疳出本草以甜瓜葉碾末酒服之胡黃連丸出危氏方治熱疳潮熱如火大便澀及驚截疳胡黃連川黃連各半兩硃砂一錢别研右二連為末和硃砂入豬膽內繫定虛懸於銚中煮一炊久取出研蘆薈青黛各二錢半用蝦蟆灰二錢麝少許粳米飯丸麻子大每服十丸食後米飲下一方無青黛蝦蟆灰治小兒喫泥土壞肚出本草用好膩粉一分沙糖搜和丸如麻子大空心米飲下一丸良久㵼出泥土瘥治小兒食土出十便良方取豬肉一斤繩繫曵地行數里勿洗火炙與食一方用羊肉四珍丹出醫方妙選治小兒諸疳羸瘦毛髮焦黃口鼻生瘡乾大蟾一枚去四足擘開腹入胡黃連半兩在腹內以線縫合用濕紙三二重裹以泥四面固濟用木火燒令赤去泥土再為細末蘆薈半兩研麝香一分研右研細以白麵糊和丸如黍米大每服五粒粥飲下量兒大小加減定命通頂散出聖惠方治小兒一切疳羸困腦悶滑石一分蟾酥杏仁同研乾胭脂一分右同滑石細末每用兩黃米大吹入兩鼻中有嚏三五聲神效吹鼻散出聖惠方治小兒一切疳腦熱髮乾熊膽一錢硃砂一錢麝香半錢右同研令細五月午日取蟾酥和丸如黍粒大取一粒研為末吹兩鼻中甚者以妳汁調塗口中及齒齗上更甚者暖水下三丸通腦散出聖惠方治小兒一切疳頭髮乾堅作穗眼睛有膜鼻頭上瘡宜用蚺蛇膽一錢犀角屑一分榖精草一分右為細末散每日三兩度吹菉豆大於鼻中每吹藥後以新汲水調半錢服之三嵗已下即服一字榆仁丸出錢氏方治疳熱瘦悴有蟲久服充肥榆仁去扇黃連去鬚切各一兩右為細末用豬膽七箇破開取汁二藥同和入碗內甑上蒸九日每日一次候日數足研麝香半錢湯浸宿蒸餅同成劑丸如菉豆大每服五七丸至三十丸米飲下無時橘連丸出錢氏方治疳久服消食和氣長肌肉陳皮一兩黃連二兩去鬚毛米泔浸一日右為細末研入麝香一半用豬膽七箇分入膽內漿水煮候臨熟以針微扎破以熟為度取出以粟米粥和丸菉豆大每服十丸至二三十丸米飲下量兒大小與之無時大黃丸出全嬰方治小兒五等疳病急疳壯熱疳勞骨蒸頭髮作穗身上生瘡瘰癧核塊多惡煎劑服食不成肌膚腹大脛細大黃三兩木香半兩右為末米醋一升相和器中移入鐺內令浮於水靣上炭火煮竹箆子攪藥去渣滓候可丸即為丸如小豆大三嵗三十丸米湯下加減與之當下青膿為效一方治五等疳病肚大減時㵼痢冷熱不調漏蘆為末每服一錢豬肝一兩鹽少許水煮熟空心服之槐子方出本草治疳濕及明目右以烏牛膽釀槐子服之彌佳麝香丸出楊氏家藏方治諸疳挾積肌體發熱漸致羸瘦蟲作無時阿魏半兩精真者於砂石器中用煤火入羊肉內豬牙皂角炙去皮三分雄黃半兩蓬莪术生用半兩柴胡去苗三分檳榔生用一兩半蕪荑生用一兩當歸半兩洗炒麝香一錢别研辰砂半兩别研右件為細末同精羊肉去筋膜一斤切細以法酒煮如泥取出細研入阿魏并諸藥同搗丸如蘿蔔子大服三十丸溫米飲下不拘時候衛生湯出鮑氏方治疳熱肌瘦盜汗地骨皮洗四兩生乾地黃一兩甘草半兩白芍藥一兩右為散每服二錢小麥三十粒煎湯下又方出全嬰方治喫土黃連黃土右等分為末糊丸如小豆大每服三十丸米飲下又方出聖惠方治小兒一切疳手腳枯細腹肚脹滿萎黃羸瘦不欲乳食宜服此方乾蝦蟇一枚大者右以酒噴放地上一夜令脹內莨菪子二兩在蝦蟇腹中封口入瓶子內燒令煙盡放冷取出搗羅為末入膩粉一錢以軟飯和丸如菉豆大每服以粥飲下三丸量兒大小以意加減洗方出危氏方大腹皮苦參川白芷右為銼散煎湯淋洗妙三和丸出聖濟方治小兒諸疳肢體羸弱臟腑虛滑不思乳食胡黃連半兩木香半兩麝香研一錢右為細末滴水為丸如黍米大量大小加減丸數與服治小孩子疳瘦又取五月五日蟾酥以朱砂麝香為丸如麻子大空心一丸如腦疳以妳調滴鼻中五疳保童丸出保嬰方治小兒五疳八痢面黃肌瘦頭髮作縷好食泥土並宜服之大乾蝦蟆一個燒存性皂角一定去皮核燒存性蛤粉三錢水飛麝香一錢細研右為細末打麵糊為丸如粟米大每服三四十丸溫米飲送下空心日食三服福夀保生丸出德生堂經驗方治小兒諸脾疳癖積飲食無時諸物所傷脾胃因食寒熱積作成氣塊腹肚脹滿喜怒不常堅硬疼痛身熱虛汗而惟貪睡或黑或瘦口鼻生瘡並宜服之蘆薈木香各一兩蕪荑史君子砂仁胡黃連神麯廣皮三稜炒陳皮乾蝦蟆各七兩半右為細末水糊為丸粟大每服五七丸溫米湯送下量嵗數加服日進二服八九日後大便黑為驗切忌葷腥生冷硬物為妙磨脾化滯丸出德生堂經驗方家傳得效小兒諸脾疳服之者無不效木香蘆薈各二兩史君子仁蕪荑陳皮去白青皮砂仁神麯莪术已上各七錢半蝦蟆一兩半燒灰胡黃連二錢黃連五錢九肋鱉甲一箇醋炙右為細末醋糊丸如粟米大每服百十丸飰水下無時量兒大小加減服為妙化脾積二聖丸出德生堂經驗方逮公謹傳小兒脾疳得效方雷丸神麯炒麥蘖炒陳皮青皮茯苓苦葶藶石三稜蘿蔔子炒别研阿魏白豆䓻沉香青木香已上各一兩廣木香一兩半莪术二兩蒼术四兩炒半夏三錢丁香二錢半右銼麻豆大用好醋五升生利牛兒鐵一斤捶碎同煎藥浸春三夏二秋七冬十日去鐵將藥煮晒乾為細麵糊丸如粟米大量大小服三嵗已下三十丸四嵗以下至七嵗五十六十丸用飰水空心服之若受濕黃腫腹脹者用木瓜煎湯下忌生冷鹽酸海味毒物神聖化脾丸出德生堂經驗方專治小兒脾疳積聚成塊在皮膜外者發熱渴乳食不進日漸羸瘦服諸藥不效者此藥主之大有功效荆三稜炮廣荗炮青皮去皮陳皮去白各一兩沉香二錢木香三錢檀香二錢半檳榔二錢半腦子半錢全蠍二錢右為細末煉蜜為丸如菉豆大二嵗至四嵗者三丸五嵗至八嵗者九丸九嵗至十二三嵗者七丸食前用引子送下服後食積推下便軟二服後漸消三服去病七分然後用藥磨脾去積順氣進食引子須要白曵刺馬溺半盞水中浸後送下五疳消食丸治小兒食傷脾疳積聚發為寒熱香附子荆三稜石三稜青皮陳皮各二兩縮砂一兩半史君子一兩半黃連一兩莪术一兩蕪荑一兩蘿蔔子二兩木香一兩乾蝦蟆四兩燒灰蘆薈一兩苦棟根三兩檳榔一兩乾漆一兩燒去煙阿魏半兩另熬胡黃連右為細末熬蘿蔔水調神麯末作糊丸如黍米大每服十五丸至二十丸飯水下量大小加減丸數服日三次妙神仙妙應丸專治大人小兒疳脾癥瘕氣積成塊或如小黃瓜橫擔腹肚脅左右青筋明現腹鼓急手足瘦小形貌焦枯黃黑髮直口乾病在膏肓本堂自至都下止以此藥治大人小兒蟲積盡在大便中一行之後地上便見諸積委有功效藥性平穩不損元氣老幼皆可服檳榔二兩黑白牽牛二兩大黃一兩史君子半兩蕪荑半兩鶴虱半兩乾漆五錢半去煙雷丸半兩右為細末用皂角四兩去皮弦子切碎熱水浸泡搓揉濃水濾過和麵為丸如粟米大或菉豆大隨兒大小服一二十丸蔥白熬湯五更送下棗兒壓之次早大便見其得病根源之物年十嵗服二三錢又方治小兒一切五疳黃瘦不生肌肉肚脹多筋頭髮焦黃不思乳食糞中有蟲米榖不化小便如油睡中盜汗蘆薈二錢史君子七個木通炮一錢檳榔炮一錢黃連去鬚二錢蕪荑炒去膜雷丸銼炒一錢青皮炒一錢龍膽去須二錢右件為末雄獖膽汁蒸過為丸粟大每服二十丸飯飲送下鮓湯丸治疳積南星乳香滑石丁香青黛各錢輕粉金箔五片巴豆十六粒去皮心錫末先將水銀安紙上鎔錫入研碎右為末糊丸如粟米大每服三十丸飯飲送下疳積鮓湯下脹滿茴香湯赤白痢甘草湯下瘧疾桃枝湯下麝香丸專治小兒五疳麝香熊膽蚺蛇膽牛黃赤小豆為末已上各一分蟾酥加柳葉二片右件藥同研如粉用瓜蒂半兩煮取汁和如麻子大一嵗每服空心以粥飲下三丸量兒大小以意加減抵聖丸治小兒一切疳麝香細研熊膽細研硃砂細研瓜蒂蚺蛇膽已上各一分蟾頭一枚令炒焦黃牛黃半分細研赤小豆半分炒焦右件藥揚羅為末都研令勻煉蜜和丸如菉豆大每服以粥飲下三丸如小兒郎以乳汁破下與服量兒大小以意加減服之吹鼻散治小兒一切疳揉眼鼻撏耳髮乾蝸牛殼二十七枚洗去土蝦蟆灰一分銼青黛半分麝香半分細研右件藥搗羅為末相和更研令極細每日兩度以葦筒子吹半粳米大於鼻日覺有效即日一度吹之治小兒肝疳此由乳母多食酸物熱毒久鬱於內因乳兒致令毒熱之氣傳兒之肝經疳氣之盛相薄於脾故生斯疾其狀搖頭揉目白膜遮睛忽時多汗目中澀癢頭髮焦枯腦熱如火非時下痢唇皮赤焦即為肚疳宜喫此方但目色帶青左肋下堅硬多吐涎沫左右眼角有黑氣所衝者不可治也史君子蒸羌活防風延胡索天靈蓋酥炙黑色木香鱉甲酥炙焦黃蜜蒙花決明子各一分山梔半兩右為末每服一錢薄荷湯下兒大服一錢半治小兒心疳此又因乳母平日多食熱物以致血氣昏壅兒餐熱乳傳在兒心經火能生土毒熱之氣傳入於鼻故生斯疾其狀非時通身發熱面黃兩頰上赤心胸煩滿鼻乾心躁忽思飲水口舌生瘡忽時下痢下利久而不已忽時下膿血即為心疳宜喫此方但夜多驚啼耳邊脈動舌色黯黑者不可治胡黃連茯苓天靈蓋酥炙黑色鱉甲醋炙香黃木香沉香二銖史君子蒸三次半兩右為細末重羅如飛塵每服半錢以銀湯調下食後溫和去滓吃兒大者吃一錢治小兒脾疳此又因乳母平時飲食不莭冷熱不調或飯食不調停滯不化兒食其乳不調之氣積在脾間故生斯疾其狀多乳食不消心腹脹滿面色黃口鼻常乾肌體虛劣好喫泥土火炭之類情意不恱愛近黑處下利多酸臭此為脾疳冝喫此方但好食泥土水榖不化皮枯骨露者不治之候也訶梨勒麵裹火炮去核只用皮史君子蒸三次各半兩白术厚朴去塵土薑炙黃橘皮天靈蓋酥炙黑色用檳榔鱉甲酥炙黃香甘草炙木香川芎白蕪荑各一分南椒三分去黑子右為細末每服一錢空心以米湯調下治小兒肺疳此又因乳母平日多食辛熱之物肺臟傷兒餐其乳毒熱之氣傳在肺經故生斯疾其狀非時發嗽壯熱憎寒口鼻生瘡多饒涕唾毛髮焦枯多咬指甲頻頻氣脹大腑不調忽時下痢糞中下米是為肺疳並宜喫此兩方但皮上發瘡如粟黑色者不可治桑白皮白采入地一尺以下者用二兩蜜陀僧一分史君子十銖蒸七次枇杷葉去毛令淨微炙天靈蓋酥炙香黃黑色鱉甲酥炙香黃木香川芎右杵羅為末方入蜜陀僧末更研令勻每服半錢黃橘皮一片六分水一盞煎取四分食後去滓喫兒大喫一錢服此藥後空心吃後方藥訶梨勒半兩麵裹火炮去核只用皮白术史君子蒸各一分甘草三分炙右細杵羅為末每服半錢煎四五沸空心和滓吃治小兒腎疳此又因乳母平日隂陽交接之候血氣未定倉猝間便與兒乳其隂陽不調之氣傳在兒之腎經故生斯疾其狀骨肉消瘦齒上齗瘡頻發寒熱頭熱如火足冷如氷喫食減少㵼痢頻多其病至極即下部開張肛門搔癢不時蟲動名為腎疳宜服此方寒冷無熱氣者不治之候也鱉甲酥炙焦黃萆薢茯苓蕪荑天靈蓋酥炙黑色川芎烏藥各一分狗脊去毛半兩南椒二錢去黑子右為細末重羅如飛塵每一錢空心蔥湯下和滓喫兒大者喫一錢半兒小者不喫滓五疳丸治小兒疳瘦而面黃羞明眼澀好喫泥土乳食不消化常服退黃化蟲緑礬成塊者燒通赤取出稱一兩半蜜陀僧火燒赤取出稱一兩夜明沙燒過一兩半右為細末熟棗穰為丸如麻子大每服三五七丸溫米湯送下量兒大小加減一日三服不拘時抱子茯苓湯治黃疳土色為熱為濕當小便不利如黃赤色為燥熱伏于腎經中也髮黃脫落知膀腎俱受土邪乃濕熱之證鼻下斷作瘡土逆行火氣上火也能乳者胃中者熱也寒則食不入喜食者或其胃不足也靣黑色者為寒為痺大便青寒褐色熱畜血中間黃色腸胃真熱治法當滋隂潤燥耐熱避寒致生津液蘭臺祕簡方名大蕪荑湯山梔子三分黃蘖炙甘草各三分大蕪荑半錢黃連一分麻黃不去根節羌活各二分柴胡三分炙防風一分白术半分茯苓三分當歸四分右件銼如麻豆大都作一服水一盞半煎至一盞去滓稍熱食前下消疳丸治小兒諸疳肌肉消瘦日晡作熱引飲無度退疳熱長肌膚殺蟲美食熊膽硃砂别研水飛胡黃連鱉甲醋塗炙黃柴胡黃連去鬚微炒已上各半兩夜明砂微炒檳榔木香陳橘皮去白青橘皮去白各一分乾蟾二枚燒赤存性蘆薈别研麝香别研二銖各一錢右件為細末研勻軟粳米飯丸如黍米大每服二十丸溫水送下不拘時候蕪荑丸治小兒五疳骨熱面黃肌瘦飲食雖多不長肌膚口牙齒宣露或盜汗疳瘡濕癢小便白濁黃連去鬚髮微炒黃蘖去粗皮甘草炙青橘皮去白龍膽草去蘆已上各半兩乾蟾一枚酥炙白蕪荑仁炒胡黃連各一分青黛一錢史君子十四枚去殼麝香半錢别研右件為細末研勻和用獖豬膽汁少許將藥入豬膽內合令七分滿以線繫定於銀石器中用漿水煮五七沸取出當風挂一宿後剝去豬膽不用只取藥再和令勻丸如黍米大每服二十丸溫米湯送下不拘時候至聖丸治小兒五疳黃瘦食不生肌常服殺蟲長肌肉木香胡黃連黃連去鬚微炒陳橘皮去白龍膽草去蘆焙已上各一兩五靈脂二兩川棟子去核半兩蕪荑仁二錢半炒别研蟾酥半錢别研蘆薈二錢别研右件為細末煮麵糊為丸如黍米大每服二十丸溫米飲送下不拘時候麝香豬膽丸治小兒諸疳羸瘦齒齦潰爛或作蟲痛乳食雖多不長肌膚常服退疳黃肥肌肉美飲食胡黃連黃連去鬚切各一兩川芎三分沒石子半兩麵裹煨令黃去麵麝香二錢别研蕪荑一兩别研川棟子肉一兩銼碎炒黃右件為細末次入研者藥和勻用獖豬膽汁和蒸餅為丸如黍米大每服三十丸溫米飲送下不拘時候搜疳丸治諸疳羸瘦不生肌肉面色痿黃消腹脹殺疳蟲進飲食止盜汗寬胸膈下滯荆三稜半兩濕紙裹煨熟銼檳榔木香肉豆䓻麵裹煨黃香訶子去皮當歸湯洗焙已上各二兩半黃連去鬚微炒川棟子肉各半兩炒右件為細末豬膽汁煮麵