為風邪所客則氣壅不散結聚乳間或鞕或腫疼痛有核皮膚焮赤寒熱往來謂之乳癰然風多則腫鞕色白熱多則腫焮色赤若不即治血不流通氣為留滯與乳內津液相摶腐化為膿大凡婦人乳癰此非小病蓋婦人肺在前近乳故也懷娠發乳癰此却無害蓋由血氣凝滿而成才産後便可愈又有産後發乳癰者此乳道蓄積不去因氣逆而結成宜常令擠乳汁令通便可愈也又有産後為小兒睡中呵吹以致腫結而痛名曰吹奶宜速下其乳汁導其壅滯有輔奶又名石奶初結如桃核漸次浸長至如拳如碗堅硬如石數年不愈將來潰破則如開石榴之狀又反轉外皮名審花奶年四十以下間有可治者五十以上有此決死如未破以前不如不治以聽其終天年不可不知於其右手關上脈沉而為隂虛者則病癰乳久不瘥將變為漏男子以腎為重婦人以乳為重上下不同而性之根一也坐草以後風邪襲虛榮衛為之凝滯與夫嬰兒未能吮乳或乳為兒輩所吹飲而澀或斷乳之時汗出不盡皆令乳汁停蓄其間與血氣摶結而腫痛繼而結硬至於手不能近前乳癰之患成矣乳癰一名妬乳惡寒發熱煩躁大渴是其證也甚則嘔吐無已咽膈窒礙何耶蓋胃屬足陽明經實通乎乳血熱入胃嘔吐何疑或者昧於溫散妄以寒涼疏轉之劑行之即便癰毒自外入裏嘔吐尤甚其咽膈妨礙者毒氣上衝所致也生薑甘桔湯最為咽間要藥乳粉托裏散最能返出毒氣一香散加瓜蔞根止嘔止渴兩得其便也更以萬金醉膏佐之能事畢矣雖然渴而過飲水入腸胃必至下利醫理失節久而不瘥必成漏瘡又不可不防其變産後不自飲兒并失兒無飲乳乳蓄常結癰不飲兒令乳上腫者以雞子白和小豆散傅乳房令消結也若飲兒不泄者數捻去之亦可令大孩含水口中使嗍之取滯乳汁吐之不含水嗍去熱能令乳頭作瘡乳孔塞也産後宜嗍去乳汁不宜蓄積不出惡汁內引於熱則結硬堅腫牽急疼痛或渴思飲其奶手近不得若成膿者名妬乳乃結成癰宜服連翹湯利下熱毒外以赤小豆末水調塗之便愈或數揑去乳汁或以小兒手摩動之或大人含水嗍之得汁吐之其汁狀如膿若産後不曽乳兒蓄積乳汁亦結成癰凡婦人乳癰發痛者亦生子心也俗呼吹奶是也吹者風也風熱結聚於乳房之間血脈凝注久而不散潰腐為膿宜用益元散生薑湯調下冷服或新汲水時時呷勿輟晝夜可三五十次自解矣或煎解毒湯頓服之方治乳癰方出千金方麥門冬一升黃芩芍藥茯苓各二兩桑寄生人參黃蓍防風甘草各一兩飴糖八兩大棗五枚右㕮咀以水一斗煮取三升去滓內糖一沸分作四服又方先服前件湯五日後服此丸即愈矣出千金方天門冬五兩澤蘭五分大黃十分升麻六分羌活桑寄生防風人參黃耆乾地黃白芷通草黃芩枳實五味子茯神天雄芎藭當歸各一兩右為末蜜丸酒服二十丸加至四十丸麥門冬丸治乳癰先用諸湯藥塗傅癟後服此麥門冬去心二兩木通人參五味子黃耆羌活去蘆頭防風去苗生乾地黃焙黃芩去黑心桑寄生茯神去木天雄炮裂去皮臍升麻澤蘭各半兩枳殼去穰麩炒大黃各三分當歸一分右搗羅為末煉蜜丸如梧桐子大每服空心溫酒下二十丸漸加至三十丸以瘥為度托裏散出衛生家寶方治乳癰極妙甘草一兩生當歸一兩天蘿一箇炒絲瓜是也瓜蔞一箇炒紫色皂角刺四十九箇炒右件為細末每服二錢酒調下治奶結硬出朱氏集驗方凡未成瘡才覺腫硬作痛右以蔥熱尉之其法用中樣磁瓶須瓶口寬者以炭火入瓶內上以熱灰填滿平瓶口以蔥葉及蔥白捶損令覆瓶口以手帕子裹定煮熱將瓶口蔥向腫處任意輕輕尉之有驗芎藭丸出聖惠方治婦人乳癰穿穴膿水不住年月逺深蝕肉傷筋或時碎骨瘡中自出肉冷難生疼痛不可忍芎藭二兩當歸兩半桂心黃耆沉香安息香各一兩附子半兩去皮臍白芷麒麟竭丁香各半兩木香一兩枳殼羌活赤芍藥各半兩右為末煉蜜和搗三五百杵丸如梧桐子大每服空心午晚食前以甘草酒下二十丸排膿散出千金方治乳癰除惡肉蓯蓉微炙鐵精桂心去皮細辛去苗黃芩去黑心人參防己一作防風乾薑芎藭當歸各三分甘草五分右治下篩酒服方寸匕日三夜一服藥十日膿血出多勿怪葶藶散出聖惠方治婦人乳癰瘡腫焮熱疼痛宜用散毒氣甜葶藶一兩赤芍藥三分白芷一兩丁香三分黃耆一兩羊桃皮一兩硝石三分半夏一兩湯浸七遍去滑白斂一兩莽草半兩木香一兩木鱉子一兩去殼右為細散用酸漿水調和令勻攤於故帛上貼之麥門冬湯治乳癰初有異於常則先用此藥散化毒氣麥門冬去心二兩黃芩去黑心一兩桑寄生銼下兩半甘草炙令黃木通防風赤茯苓去皮芍藥炒黃耆各一兩人參一兩半右粗搗篩每服三錢匕水一盞入乳糖一分棗三枚擘破同煎至七分去滓溫服三日早晨午時至晚各一方無木通治乳癰黃耆白芷膏塗方黃耆白芷大黃當歸續斷各一兩薤白二兩切松脂二兩乳香半兩蠟一兩豬脂二斤生地黃汁三合右取前五味銼碎以地黃汁拌勻先熬脂令沸下諸藥煎白芷赤黑色漉出下薤白松脂香蠟煎候鎔盡以綿布絞去滓瓷盒內盛取塗傅乳上旦四度即瘥一方無乳香大黃散出聖惠方治婦人乳癰經年腫破如石不消宜貼川大黃當歸微炒赤芍藥黃香芎藭防風去苗黃連去鬚莽草梔子仁以上各一兩膩粉一兩乳香半兩右為散細入粉和勻以雞子白并蜜調令勻塗帛上貼乾即易當歸散出聖惠方治乳癰堅硬如石腫痛當歸芍藥人參枳殼去穰一兩麩炒黃耆炒蒺藜子去角附子去皮臍雞骨各一兩薏苡仁半兩桂去粗皮一兩半右搗羅為散服二錢匕以溫酒調下日三早晨午時至晚各一服一方用枳實地黃湯治乳癰生地黃汁一合射干升麻黃連芒硝白斂梔子大黃各半兩甘草當歸各一兩右九味銼碎以水五升煎至三升去滓下地黃汁更煎三五沸以故帛二片浸藥汁更互拓腫上日一二十度再暖用即瘥治婦人乳腫不消出聖惠方川大黃莽草伏龍肝各三分右為細散入生薑汁半合入少醋和塗乳上乾即再塗治乳癰初作腫痛出直指方貝母天花粉右等分為末酒調服木通散出聖惠方治婦人乳癰成瘡腫膿水疼痛不可忍木通一兩半黃耆二兩玄參一兩沉香三分赤芍藥二兩子芩一兩敗醬一兩露蜂房一兩防己一兩半川朴硝二兩右為散每服四錢水一盞煎至六分去滓不計時候溫服又療乳癰初覺有異出大全良方黃芩甘草防風赤芍藥黃耆各五兩通草十分桑寄生麥門冬各六分大棗五枚右細切以水一升煮取九合去滓入乳糖六分分為四服枳殼散治乳癰堅硬枳殼去穰芍藥人參各一兩半黃耆雞骨炙木通當歸桂去白皮各一兩蒺藜子炒去刺右搗羅為散每服二錢溫酒調下日三療乳癰出大全良方用黃丹一分細研末以雞子白調停塗之乾則易立愈治乳腫出大全良方用馬溺塗之立止又黃柏末雞子青調搽一方用白馬溺又方未成腫痛者出百一選方用水粉炒令黃色以紙攤在地上出火毒了碾作細末傅之尉火湯出聖惠方治乳癰風毒腫久不消未成服先用湯淋尉令四面惡物消散方赤小豆五合蔥一十莖并根細切白礬甘草一兩乳香半兩芥子二合桑根白皮一兩右用青布裹於鍋內以水三升煮藥令熟乘熱尉腫處冷則再暖尉之一日可四五度尉則令內消治奶癰乾山藥苧根芙蓉葉五倍子蔥管白蜜各等分右為末用米醋調敷在患處留頭立效治乳癰貼散方黃連去鬚白斂鼠糞積霜草大黃甘草炙各半兩右搗羅為散用漿水調為膏貼之乾即易治奶癰出大全方乳香沒藥草烏南星牡蠣以上各一錢白芨二錢右為細末不要見火用雞子清調作二服用鐵箆挑塗患處用白紙蓋上面如乾用水外面濕之膿血皆化為大小便大黃散出聖惠方治婦人乳癰焮腫疼痛川大黃銼微碎川棟子赤芍藥馬蹄燒灰玄參蒲公英各一兩右為細散每服一錢溫酒調下日服汗出瘥治乳癰疼痛宜熏方出聖惠方兼治乳汁不出內結成膿腫名妬乳方用露蜂房半斤以醋五升煮令熟相和傾於瓶中熱熏乳上三五度即瘥冷則再煎用之一方燒灰研每服二錢水一盞煎六分溫服治乳癰方出千金方大黃莽草生薑各二分伏龍肝十二分右搗為末以醋和塗乳痛即止有效劉涓子不用生薑用金背鯽魚立效治乳癰始作其乳癰大堅赤紫色衣不得近痛不可忍者出千金方大黃楝實芍藥馬蹄右各等分治下篩飲服方寸匕取汁出瘥一方酒服覆取汗當睡著覺後腫處散不痛經宿乃消治乳癰黃明膠傅散黃明膠炙令燥大黃炒莽草細辛去苗各半錢右搗羅為散以雞子白調芍藥勻塗紙上貼腫處頻易即瘥仍割穿如小錢大露腫頭治乳癰腫未破痛不可忍薰陸香塗傅方出聖惠方薰陸香一分為末百合半兩雄雀屎二十枚鹽半兩右細研令勻以醋調如糊塗傅患上乾即再傅以瘥為度一方鼠糞醋調塗生魚膏主乳癰生鯉魚長五寸大黃莽草竈中黃土各六兩右别搗魚如膏三物下篩更搗令調以生地黃汁和傅腫上日五六夜二三即愈治乳癰及一切無名腫毒瓜蔞貝母去心乳香天花粉右等分㕮咀水酒煎以疾上下分食前後服未成速散已成速潰惡毒從大便中出如膠神驗治諸般腫毒并疼毒奶癰白术豬苓赤茯苓澤㵼右各等分兩瓜蔞子酒一半水煎一盞露天一宿臨睡卧用黑豆一升米醋煮乾就炒燥研末傅之湧泉神應散出德生堂方治婦人吹奶或兩乳腫痛即為奶癰急宜連進數服立效金銀花黃耆各三兩半當歸甘草切各二兩右㕮咀每服四錢水一盞酒半盞煎八分去滓臨卧服滓再煎治婦人乳癰焮腫赤硬疼痛不止出聖惠方赤小豆炒白芷白斂雞子一枚用白右為細散入雞子白調如稀糊塗乳腫處乾即更塗之治乳癰除惡肉出千金方生地黃三升芒硝豉一升右合搗傅熱即易之取瘥止一切癰腫皆用之一方單用地黃傅之治乳癰堅方出肘後方黃芩白斂芍藥各等分右為末將乳飲服半錢日三若左乳汁結者即取用右乳汁若右乳汁結者可將去左乳汁服散消根丹參膏出大全良方療婦人乳癰乳腫毒氣焮作赤熱漸成攻刺疼痛及治乳核結硬不消能通順經絡利導癰滯丹參白芷芍藥各一兩右㕮咀以苦酒淹經宿以豬脂半斤微火煎至白芷黃為度膏成去滓傅之一方入黃蠟一兩每少許時時塗之黃鼠膏出肘後方治乳癰大黃鼠屎新者各一兩黃連二分右各搗為末以黍米粥和傅乳四邊痛止即愈無黍米用粳米並得治乳癰初發出危氏方草烏七箇赤小豆七粒拒霜葉一兩隂乾右為末井花水調塗乳四畔黃頂用前敷藥亦妙車螯散治乳癰及一切腫毒車螯殼燒灰十兩黃連去鬚一兩蜆殼多年白爛者炙黃泥裹燒五兩右搗羅為散每服二錢空心用甘草酒調下日晚再服治乳癰方乳香一兩為末丹砂一兩為末蔥白三兩切右先研蔥令細入二味再研令勻塗傅乳上乾即易之治婦人乳汁不下肉結成腫名為乳毒乃毒成癰也宜服此出聖惠方川大黃一兩炒黃連三兩牛蒡子一兩右為散每服三錢水一中盞煎至六分去滓不計時候溫服治乳癰腫成瘡疼痛方出聖惠方防風一兩去蘆牽牛子二兩微炒牛蒡子一兩右為細散不計時候以溫水調下二錢又方出聖惠方蔓荆子一兩甘草二十寸一半生一半熟乾薄荷半兩右為細末每服二錢用暖酒調下日三服又療乳癰初得令消出聖惠方赤小豆甘草右等分各為細末苦酒和傅之愈鹿角散出聖惠方療乳癰或瘡久不瘥膿汁出痛欲死不可忍亦治妬乳鹿角二兩甘草半兩右為細末用雞子白和於銅器中暖溫敷患處日五六易即愈一方用鹿角石上磨取濃汁塗之一方用鹿角燒灰酒調傅金黃散出大全良方治奶癰川大黃粉草各一兩右為細末以好酒熬成膏傾在盞中放冷攤紙上貼痛處仰面卧至五更瘥貼時先用溫酒調一大匙就患處洗明日取下惡物相度強弱用藥羸弱不宜服治乳癰初作腫痛便服久患乳癰戒不可用針若誤針著乳房立死出存仁方右以栝樓子忍冬葉各一兩濃煎汁飲即消皂蟾散出拔萃方治婦人因露風邪氣外客於乳內結為吹奶積久不消以為奶癰此藥導其汗散其風邪出其病自然痊愈矣皂角不蛀者燒存性真蛤粉各等分一方用皂角刺右為細末每服二錢溫酒下不拘時候詩曰婦人吹奶藥婁羅皂角燒灰蛤粉和熱酒一盞調八匙雙手操散笑呵呵加乳香少許尤佳瓜蔞散出危氏方如不愈者並前方治之瓜蔞明乳香各等分右為末每服二錢溫酒調下熱者加石膏末少許蔓荆實散治乳癰疼痛蔓荆實炒一兩甘草一兩半生半熟右搗羅為散每服二錢以溫酒調下日再服防風散治乳癰防風去乂二兩牽牛子炒令香二兩右搗羅為末每服二錢空心用沸湯調下取微利為度未利再服漸減服之即瘥鯪鯉甲散治乳癰疼痛結硬不可忍鯪鯉甲燒灰一兩栝蔞一枚燒灰右研和為散每服二錢空心用蔥酒調下至晚再服乳初腫方出直指方右用甘草生二錢炙二錢為粗末分二次新水煎服令人吮乳即瘥又方治奶疼右用芭蕉根槌碎盫之治乳癰腫疼宜熁貼方出聖惠方藍草根生蒻頭各半兩右搗如泥貼之立效治乳癰方出聖惠方赤小豆蛇脫皮燒灰右以雞子白和之傅上少乾即易一字散治婦人乳結痛不忍者麝香半錢螃蟹殼不拘多少右為灰入麝香調下治乳癰瘡鼠糞米粉炒黑右各等分勻加麝香少許好酒二盞送下祕方山藥半斤為末官桂二兩為末右用秈米粉打糊為圓每服一百五十丸用無灰好酒送下不拘時服次用膏藥貼痛處貝母散治乳癰貝母金銀花各二兩右為細末每服三錢好酒調食後服治婦人乳癰毒氣不散冬瓜皮研取汁當歸半兩末右以冬瓜汁調塗之以瘥為度附子散治婦人乳疽及妬乳作寒熱疼痛宜服附子一兩去皮臍藜蘆半兩去蘆頭右為末用醋調傅之乾即再傅之又方米粉一合炒令黑雞子白三枚右藥相和塗帛上以貼疽上開一小孔以泄毒氣燥即易之又方釜底土一兩雞子白三枚右搗相和塗之又方半夏末一兩雞子白三枚右藥和塗之極效治婦人乳頭裂痛欲成瘡胭脂三分蚌蛤粉一兩右藥研細塗乳裂處神效治婦人乳中結塞腫硬如石成癰出聖惠方玄參白檀香各半兩右為細散用醋調塗腫結處乾更塗治乳癰堅方出千金方以水罐中盛醋澄清燒石令熱內中沸止更燒如前少熱納乳漬之及冷更燒石內漬不過三度燒石愈治乳癰方出千金方鹿角治下篩以豬脂上清汁服方寸匕不過再服效不可以醋漿水服治乳癰二三百日衆療不瘥但堅紫色青桞根尉方出千金方栁根削取上皮搗令熟熬令溫盛著練囊中尉乳上乾則易之愈治乳癰痛不可忍出鮑氏方用餛飩草酒浸服以滓傅縛治乳癰出聖惠方用鹿角屑一兩為細末以豬膽汁調下一錢不過再服神驗以醋醬水服之亦得集驗方以豬頷下清汁一方鹿角炒微黃用橘香散一名橘皮出拔萃方治乳癰未結即散已結即潰極痛不可忍者藥下即不疼因小兒吹嬭變成斯疾者並治之陳皮湯浸去白晾乾麵炒微黃為細末麝香研酒調二錢初發覺赤腫疼痛一服見效每服有效一方用青皮焙乾為末熱酒調下一醉膏出十便良方治嬭癰石膏不以多少煅通赤取於地上碗覆出火毒細研每服三錢溫酒下添酒盡醉睡覺再進一服療乳無汁以水煮服治療婦人乳癰已穿未穿出膿大止痛斂瘡口出大全良方以芙蓉花爛研如泥若無花只取根上皮先用竹刀刮去粗皮但用內一層嫩白皮研如泥却入蜜少許調停看瘡大小如未穿即留中孔如已穿即塞其孔其膿根自然淋出盡不倦頻頻更換此方大治一切癰疽發背立見神效膿出盡却用後藥傅乾膿散出大全良方治斂瘡口烏賊骨黃丹天竺黃各一錢輕粉二錢麝香一分老降真香三錢右研細末乾糝瘡口不數日乾又方出大全良方降真節二錢天竺黃露蜂房各一錢麝香輕粉各少許右為末乾糝之又方出大全良方乳香沒藥黃丹各一錢龍骨二錢真樺皮二錢血竭半錢麝香一字降真節一錢右為末乾糝之治乳癰初作腫痛出仁存方用萱根自然汁調傅一方治乳癰牛皮膠不拘多少鎔開用紙花攤貼嬭上次以舊齒刷子一箇燒灰存性研為細末酒調服甚有功效又方出百一選方用苔脯中泥調塗嬭上甚妙治婦人嬭癰出危氏方用仙人掌草一握一處擂爛入桂末少許炒酒服滓罨腫處便止痛更不成瘡又方出危氏方用山礬菜為末食後溫酒或熱湯調下治婦人乳癰出聖惠方以人牙齒燒灰研令細以醋調塗貼攤上乳癰方出直指方乳癰疽初發用貝母為末每服二錢溫酒調下即以兩手覆按乳掉上垂乳良久自通麵塗方出肘後方主婦人癰疽不消用白麵半斤炒令黃色用醋煮為糊塗於乳即消或以蔓荆根葉淨擇去土不用洗以鹽搗傅乳上熱即換不過三五度冬無葉即用根須避風荒蔚子出聖惠方治婦人勒乳痛成癰用益母草搗羅為末新汲水調塗乳上一宿自瘥生者搗爛用治乳癰痛不可忍出鮑氏方右搗橘葉極細攤傅縛之治乳癰腫如碗大痛甚取白殭蠶搗末一二斤用雞子白和如飴傅腫上乾易之此方頻試驗如雞子不便榆白皮和搗傅即瘥乳癰月蝕瘡繞耳根以烏骨雞膽汁傅之日三治婦人嬭癰未成結者用管仲一味為細末外用敷腫上內亦可服之牡蠣散治乳癰初發腫痛結硬欲成膿令一服瘥牡蠣取腦頭厚處生用右細研為散每服二錢更研澱花冷酒調下如癰盛已潰者以藥末傅之仍更服藥一日三服樺皮散治乳癰初發腫痛結硬欲成膿令一服瘥以北來真樺皮燒灰酒服方寸匕就病乳處卧及覺已瘥治乳癰結硬疼痛方右用泥芥菜半斤銼碎以水四升煮取三升傾於瓷瓶熏乳腫處日三五度即瘥治乳癰結硬疼痛右和泥蔥半斤細銼以水四升煮十數沸於瓷瓶子內盛熏乳腫處日三五度即瘥冷即再暖以瘥為度一方搗蔥白摶之絞汁一升頓服治乳癰疼痛方右車前子一兩搗羅為散每服二錢匕溫酒服調下治乳癰腫疼痛方右打雞子一枚熱酒調為一服治乳癰初發用皂角針四十九枚燒灰存性瓜蔞根酒服立潰嬭癰瘡用黃瓜蔞一二箇連皮穰子銼碎用無灰常酒一二升於砂瓶內煮存一升去滓時溫服酒盡再煮滓服如初覺時便服此藥即時痛止便不成瘡如已成瘡服之其瘡自穿而痛自止治乳癰痛不可忍右用地龍一二條入生薑於乳鉢內研如泥塗四傍紙花貼之治乳癰用夏枯草酒擂服仍用滓敷即日乳下三日愈又方用豬膽汁蜜搗蔥貼乳上妙無比散出傳信適用方治婦人嬭癰痛甚用蛇蛻皮燒灰一錢炒甘草末半錢同和暖酒下如破用生油調塗治嬭癰用蒺藜子煎湯洗一方用枇杷葉煎湯洗若無則用棠梨葉又方出肘後方用屎或馬屎敷並佳此消去又方用搗生地黃汁傅之熱則易小豆亦佳治乳癰疼痛寒熱至甚宜服此出聖惠方用鑿下馬蹄燒為灰細研以醋調塗緋帛上貼日二換之治婦人乳癰身體壯熱疼痛不可忍出聖惠方取蒲公草并根搗絞取汁半合酒和服之如無新者用乾搗細羅為散每服調下二錢治婦人乳癰并吹嬭疼痛不止出聖惠方蝦蟇一枚五月五日收隂乾者以罐子盛燒令赤候冷取出細研為散每服熱酒調下二錢治婦人乳癰熱毒腫痛出聖惠方右青牛腹下毛燒作灰細研水和服之立效又方出聖惠方治婦人乳癰不消立效右嫩皂莢刺二兩黃色者微炒搗羅為細散以溫酒調下二錢治婦人乳疽及妬乳作寒熱疼痛出時效方以醋和吳茱萸末或搗生薑或小蒜和傅之並良治乳癰宜薰耶屈律藤蔓切一斤右水二升煮取一升半㵼於小口瓷瓶中薰患處良蒺藜丸出千金方治婦人乳癰瘡腫疼痛除熱蒺藜白者微炒去刺大黃炒各一兩敗醬一兩桂心人參去蘆頭薏苡仁附子炮去皮臍黃連去鬚黃耆去蘆當歸微炒枳實麩炒芍藥通草各三分右為末蜜丸如梧桐子大未食飲服三丸不知益至五丸日三無所忌一方無大黃敗醬黃連通草為散酒服方寸匕升麻散治婦人乳初覺腫房疼痛及欲成癰結川升麻赤芍藥甘草川大黃各一兩玄參一兩半白芷三分馬蹄三分川朴硝二兩桑根白皮三兩右件藥搗粗末羅為散每服四錢以水一中盞煎至六分去滓食前溫服傅乳方出聖惠方天南星半夏生皂莢刺燒帶生各二兩白芷草烏真殭蠶焙各一兩右為細末多用蔥白研取汁入蜜調傅若瘡口破用膏藥貼治婦人乳腫妨痛日夜不可忍出聖惠方煆爐底土一兩露蜂房半兩炒赤小豆一合川大黃一兩木香一兩桂心一兩右為細末以真麻油調塗上經宿神效治赤腫欲作癰者出百一選方用天南星為末生薑自然汁調塗初發便用以鵝翎塗之又方出百一選方右用缺盆草糯米香草又名趙侯鬚其葉小却如蒲萄有刺不拘多少連皮生薑一塊同研爛罨即瘥治嬭疼方真蛤粉五錢炒右用皂莢刺四五箇煎湯調服加好酒一呷服後又用後藥皂莢防風大黃當歸各等分右煎湯洗可止用手大揉揉久之後用口飲嬭汁出方可治乳腫出聖惠方桂心甘草烏頭一分炮右為末和苦酒塗覆之膿為水即神效治婦人乳腫痛慮作癰毒宜服此甘草半兩一半生用一半微炒栝蔞一枚去皮穰子細銼令爛右以酒一大盞煎甘草取六分入栝蔞酒後宜更用藥淋尉腫痛上栁白皮松枝二握銼右以水五升煎至三升及稍熱并滓熏乳腫處以通手即淋尉乳上當日即退菩薩散治嬭癰腫痛時發寒熱狀如傷寒不可忍已結未並治文經霜杜荆子今作枤子者是去皮十二月正月二月採之酵頭用作炊餅者微炒勿令焦右二件各搗為細末以淨盤子擎之於佛前焚香誦南無藥王菩薩南無觀音菩薩聖號各一百八遍等分拌勻至心禱告畢炒三錢匕以蔥酒調下食後稍空進之服藥頃間度藥力到患處即令人以手揉摩之更令人吮出乳汁尤佳飲酒多人多飲之令有力不飲酒者以蔥湯衝酒借氣可也得熟寐即釋然脫去矣已結未成膿者立潰並免痛楚重者不過兩服故人何伯選髙曽以來久施此藥其效如神祕而不傳近日漕司李運幹家有一婦患此病懇而得方一投而愈治乳癰不可忍右用古蛀竹籖將朽者研極細羅過溫酒服先用復元通氣散佳又方用竈間倒挂塵多年者羅細末二錢以乳汁調勻溫酒調下仍以手頻挼腫處即消又方用桑蟲糞曬乾為末酒下去風毒也治婦人乳腫不消右取魚枕搗末唾調塗之治乳腫痛甚者野松半斤不用洗右和鹽搗爛厚塗腫上乾即換之治乳頭裂破右用苧麻根搗傅之治嬭頭裂右用秋後冷露茄兒花裂開者隂乾燒存性灰水調傅之如未秋時但是裂開者亦可用療乳癰及發背四肢虛熱大渴生地黃六兩黃芩芍藥人參知母甘草各二兩升麻黃耆麥門冬栝蔞各三分大棗十二枚右以竹葉切三升以水一斗二升煮取九升去竹葉內藥煮取三升渴則飲之連翹湯治妬乳乳癰連翹芒硝各二兩芍藥射干升麻防己杏仁黃芩大黃柴胡甘草各三兩右㕮咀以水九升煮取二升五合分三服療婦人發乳丈夫發背爛生膿血氣虛成疾黃耆麥門冬地黃人參升麻茯苓各三兩當歸芍藥逺志甘草各一兩大棗十枚右水二升煮取一升溫分三服若有是症蜀中排膿內補十宣散妙神效瓜蔞散治婦人乳疽嬭勞瓜蔞一箇去皮焙研為末如急用只爛研子多者有力當歸酒浸去蘆半兩乳香一錢生粉草半兩通明沒藥一分二味别研右用無灰酒三升同於銀石器中慢火熬取一升清汁分作三服食後良久服如有嬭勞便服此藥可杜絶病根如毒氣已成能化膿而黃水毒未成即於大小便中通利疾甚再合服以退為妙婦人乳癰方甚多獨此一方神效無比百不失一矣癸亥年僕處五羊趙經略廳判閫夫人年七十一嵗隔一二年左乳房上有塊如鵝卵大今忽然作楚召余醫僕云據孫真人云婦人年五十嵗以上乳房不宜見癰見則不可治矣幸而未破恐是氣瘤謾以五香連翹湯去大黃煎服服稍減則已過六七年每遇再有腫脹再合服消立效散出直指方治發背及諸癰癤并瘰癧有效或婦人乳癰與前方間服妙紫色皂莢半斤不用枯者細銼炒耐久炒赤色生粉草二兩乳香半兩别研沒藥半兩别研瓜蔞五箇去皮取肉并仁搗碎炒煮乾右為細末每服二錢溫無灰酒調下無時候煎服直指方名五物湯竹皮大丸出金匱方治婦人乳中虛煩亂嘔逆安中益氣生竹茹三分石膏二分桂枝一分甘草七分白薇一分右五味棗肉和丸彈子大以飲服一丸日三夜二服有熱者倍白薇煩喘者加柏實一分治婦人乳癰出危氏方火掀草皂莢刺穿山甲黃蜂窠右以上件各燒存性為末入輕粉生麻油調傅瘡上療乳癰諸般癤癰疽出大全良方橘紅半兩阿膠粉炒燥粉草炙各二兩右㕮咀為二服每服用泉水一碗半煎至減半去滓溫服治妬乳乳癰方出千金方右取研米捶二枚炙令熱以絮及故帛㩉乳上以捶更易尉之瘥止已腫立效療嬭癰并無名癰癤出大全良方右用鼠糞不拘多少燒存性二分入輕粉二十分研勻麻油調塗如有頭即潰無頭即消又療火瘡治嬭勞嬭癰等疾出危氏方右用赤小豆三升酒研爛去滓溫酒服以滓傅患處一方赤小豆為末水調塗愈又方出危氏方右用蔓荆子無子用嫩葉或花擂爛炒酒服之用滓貼患處伏龍肝出肘後方療嬭發諸癰疽發背及乳右以釜下土搗取末雞子中黃和塗之加少鹽良治妬乳乳癰乳頭裂破出肘後方右取丁香搗末水調方寸匕服傅患處亦佳治嬭發痛不可忍出大全良方右水楊栁根新採者一握捶碎以好酒同甘草烏梅輝至七分去滓時時溫服治婦人乳勞癰爛見心者出危氏方右用貓兒腹下毛耳鍋煅存性為細末乾傅或油調入輕粉少許青桑膏出危氏方治乳硬作痛右用嫩桑葉左手採細研細末調攤紙花貼病處此症四十以下可治五十以上不可治之任死不治則自得終其年矣連翹湯治吹乳乳癰連翹瞿麥穗各一兩升麻玄參生乾地黃焙芍藥各三分甘草炙一分射干一分右細銼如麻豆大每服五錢水一盞半煎至八分去滓食後溫服治婦人乳結硬疼痛方出聖惠方右取鱓魚皮燒灰搗細羅為散空心以暖酒調下二錢服之治乳赤腫欲成癰者出鮑氏方白芷芙蓉葉赤芍藥紫金藤黃柏當歸各等分右為末入雄黃研少許拌勻蜜水調下治嬭癰腫痛右用瓜蔞根為末入炙甘草末少許用薄荷酒調下治乳癰惡痛者用茺蔚子搗傅及取汁服效治乳腫用栝蔞黃色老大者一枚熟搗以白酒一斗煮取四升去滓溫服一升日三服若無大者小者二枚黃熟為上妬乳附論氣血流行則上為汁下為月水上下通達不失常度是謂平人宜通而塞則為痛熱氣復乘之則為腫向之流行者壅遏矣儻失調治則結鞕成核身體壯熱甚則憎風遂為乳癰世傳氣結乳閇亦為妬乳者此也婦人女子乳頭生小淺熱瘡癢搔之黃汁出浸淫漸長百種治不瘥者動經年月名為妬乳婦人飲兒者乳皆欲斷世謂茍抄乳是也宜以赤龍皮湯及天麻湯洗之傅二物飛鳥膏及飛鳥散佳若始作者可傅黃芩漏蘆散及黃連胡粉散並佳吹嬭妬乳乳癰其實則一只分輕重而已輕則為吹嬭妬乳重為癰方升麻托裏湯一名肉桂升麻湯出濟生拔萃方治婦人兩乳間出黑頭瘡瘡頂塌下作黑眼子其脈弦洪按之細小升麻葛根連翹各一錢半肉桂黃柏各三錢當歸身黃耆炙甘草各一錢黍粘子半錢右㕮咀都作一服水酒同煎去滓稍熱服治妬乳乳生瘡方出千金方蜂房豬甲中土車轍中土各等分右三味為末苦酒和傅之黃連胡粉膏出千金方黃連二兩胡粉十分水銀一兩同研令消散右三味搗黃連為末三物相和合皮裹熟挼之自和合也縱不能無迹然得水銀細散入粉中也以傅乳瘡諸濕癢黃爛肥瘡若著甲煎為膏亦可漏蘆散治乳汁不時泄蓄積於內遂成癰名妬乳漏蘆一兩黃芩一兩去黑心米粉半兩右三味搗為細散小調如膏塗於乳上治妬乳方出千金方右燒自死蛇為灰和以豬膏塗之大妙赤龍皮湯出大全方治乳瘡右以檞皮切三升水一斗煮五升春夏冷用秋冬溫之分以洗乳亦洗諸毒敗爛久瘡洗畢傅膏散千金同天麻草湯出大全良方右用天麻草五升切水一斗半煎取一斗隨寒溫分洗乳以殺癢也此草葉如麻葉冬生夏著花赤如鼠尾花亦洗浸淫黃爛熱瘡癢疽濕隂蝕瘡小兒頭瘡洗畢傅膏散千金同飛鳥膏出大全良方右用燒硃砂作水銀上黑煙名棑彩者三兩熱令焦燥礬石三兩燒粉皆以絹篩了以甲煎和勻令如脂以傅乳瘡日三作熱者不須和有汗自著可用散亦傅諸熱瘡黃爛浸淫汁瘡蜜瘡丈夫隂蝕癢濕諸小兒頭瘡疳蝕口邊肥瘡蝸瘡等並以此傅之千金同兵部手集療妬乳硬欲結膿令消及發乳房初起微赤不急治之即殺人出肘後方右以鹿角於石上磨取白汁塗之乾又塗不得近手并以人嗍却黃水一日許即散一方燒灰酒調抹一方苦酒和塗一方出便産須知治妬乳便産須知云産婦乳汁不宜積蓄惡汁不出內為熱結腫痛煩渴手不可近成膿者名妬乳乃甚於癰右用連翹湯利下惡熱毒一方出大全良方右用生地黃汁塗之熱即易瘥又吮汁吐去若不吮吐汁必蓄積決然作癰釅醋調塗亦可治妬乳出肘後方右用梁上塵醋和塗之亦治隂腫治女子妬乳腫右取蔓荆根生搗後和鹽醋醬水煮取汁洗之五六度瘥又搗和雞子白封之亦妙治妬乳及癰出本草以研朱石捶煮令熱尉乳上取二捶更易用之以手覆乳上合熱徹內數十遍取瘥為度也治婦人妬乳乳癰出本草以車脂熬令熱塗之亦和熱酒服治妬乳用榆木葉生服一兩頓佳普濟方卷三百二十五
