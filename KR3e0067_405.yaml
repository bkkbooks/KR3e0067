內湯中拭病上隨手消并治癮疹又以大戟煎湯淋三五遍風毒癮疹即消治小兒患癮疹入腹體腫強而舌乾方用蕪菁子為末酒服方寸匕日三又方用蠶沙三升以水三升煮去滓洗之良亦治丹毒又方用車前子為末粉之良又方用鹽湯洗了以蓼子挼傅之治癮疹方用白芷針刺燒存性為末溫酒調下二錢又以根葉煮汁洗之治風疹亦治風熱皮膚瘙癢因而生瘡方用赤石脂不拘多少研細每服二錢荆芥茶調下食後荆芥酒調亦得如氣實用蜜水調亦妙治瘙癢成瘡方用殭蠶炒黃末酒調服立差療丹癮疹方用酪和鹽熱煮以摩之手下消療五野雞病小兒患赤疹方用蝦搗碎傅之治大人小兒風疹方用茱茰一升以酒五升煮取一升帛染拭之治腫毒遊風風疹頭痛方用芭蕉根井罯傅又治丹毒煎汁塗之土沙散治小兒風疹進退腫癢用土砂當歸等分為末冷酒調下一錢兼用塗之又愼火草生薑及鹽同研擦癢處消又方用石灰水醋調塗即消治小兒風瘙癮疹心中悶亂右川芒硝二兩以清酒三大盞煎至二盞放溫洗癢處候燥復洗之癢差乃止避風又方用虎脂摩之即愈五香枳實湯治小兒著風熱㾦㿔堅如麻豆粒瘡癢搔之皮剝汁出或遍身頭靣年年常發者青木香九銖麝香六銖漏蘆各半兩升麻黃芩白斂雞舌香薰陸香沉香防風秦艽麻黃各一兩枳實一兩半大黃一兩八銖右㕮咀以水五升煮取一升八合兒五六歲者一服四五合七八歲者一服六合十歲至十四五者加大黃半兩足水為一斗煮取二升半分三服之枳實丸治小兒病風瘙癢痛如疥搔之汁出遍身㾦㿔如麻豆粒年年喜發靣目虛肥手足乾枯毛髮細黃及肌膚不光澤鼻氣不利此則少時熱盛解體當風風熱相摶所得也不早治之成大風疾枳實一兩菊花蛇床子防風蒺䔧子白薇浮萍各一兩天雄麻黃漏蘆各半兩右為末蜜和丸如大豆許五歲兒米飲服十丸加至二十丸日二五歲已上者隨意加之兒大者可為散服治小兒風疹走帶方薑黃荆芥黃連土硃赤小豆爛石膏等分右為末撲之二聖散治癮疹肌肉青黑胡粉一兩苦參一兩右為細末每服一錢溫酒下兼塗患處消毒飲如麻風身或熱不熱遍身紅疹如此者是麻風冝朱砂雄黃等分為末井水調塗後服藥牛蒡子炒六兩荆芥穗一兩防風甘草炙升麻各一兩半右㕮咀水煎食後溫服又方用土硃砂酒服并搽之普濟方卷四百五
