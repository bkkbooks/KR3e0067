body:
  text: 普濟方卷四百五明周王朱橚撰嬰孩諸瘡腫毒門癰疽附論夫癰疽瘡癤瘰癧結核疥癩毒腫赤遊癮疹火疸等皆由風邪客摶經絡澀滯經曰五臟不和九竅不通六腑不和流結為癰或積毒熱氣不得宣行入於皮膚或發頭面或發虛處無故身熱微覺增寒或有痛處按之必熱乃癰癤欲發也其有火疸立名多端乃古人強為之名大抵治法同一理母患血熱兒在胎中受之其血亦熱母患氣壅兒在胎中受之其氣亦壅初生受母熱血壅氣聚在經絡臟腑之間積滯不散久則成毒毒氣相交內不通利即從外消外無能消其血與氣壅在一處則是生背膐或脊督脈腫大如拳紅赤似血其兒之體是一塊腐血又加生一塊壅毒卒未能消醫有何法善術之士俾勞以針灸尉炳取次攻之十不得一外傅用朴硝天南星當歸秋芙蓉葉黃蜀葵花乳香木鱉子無名異其癰已熱即研白丁香少許津唾調傅菉豆大良久破潰膿血迸出冝先與服托裏排膿消毒散血藥用生甘草瓜蔞根苦桔梗枳殼川當歸錦頭漏蘆好大黃等分為末服一錢匕煎熱為服以利為度克效萬一不可荒亂意欲速消以惡毒草藥致難保小兒因五臟不和寒邪壅滯榮衛閉塞逆於膚肉遂生疽腫其狀腫結皮強上如牛領然疼焮堅􅀈深附筯骨既得膿後其疽可愈更須用排膿換肌之藥若餘毒未去封斂稍疾則源流復至或癢或痛肌汁不斷瘡竅不得合矣陳氏子四嵗忽二月患核內塊五六枚不赤不腫亦不疼痛大小如雞鴨子皮不實硬從肉內透起召愚視之曰素問云榮衛不從逆於肉裏乃生癰腫此因疳成瘰癧惡核也寶鑑云惡核而肉裏頻生瘰癧而頂邉暗長萬金丸大黃丸治無辜疳瘰癧惡核愚曰此病不可治通真子云核塊結實經久不破破則膿潰經久不合者肉死不治且謾與藥和肌兼用外醫膏藥貼治月餘無效覺微軟內有自破者有開破者膿潰不止經兩月瘡口不合或一日發熱與四順飲大黃丸并涼肌藥鎮驚藥熱除尚有進退雖飲食如舊日漸黃瘦主人曰服藥已多日何效遲遲如此愚曰藥非無效也病有終身不除者也藥非無驗也病有決不可救者也此病決不治後七月間忽傷食吐數口神昏不省因驚而卒核塊之有惡者如此後之學者不可不知也方五香丸治小兒癰疽癤毒未破或膿未潰增寒壯熱木香一分沉香銼蘇合香研各三合麝香研半分犀角鎊二兩大黃生銼一兩半吳藍葉二兩梔子仁二兩熟乾地黃二兩白芍藥一兩雞舌香二兩人參一兩去蘆頭白茯苓一兩右搗羅為末煉蜜和丸如梧桐子大每服二十丸煎黃耆湯食前服木香散治小兒熱毒疽腫及赤白諸丹毒腫或生瘰癧瘡癤身中風疹瘙癢木香一分薰陸香一分雞骨香一分黃芩一分麻黃一分去根節連翹半兩海藻半兩洗去醎味射干半兩川升麻半兩枳實半兩麩炒微黃牛蒡子半兩微炒川大黃二兩銼碎微炒右羅為散每服一錢水一小盞煎至五分去滓入竹瀝半合更煎三兩沸量兒大小不計時分減溫服五香湯治小兒一切癰疽腫毒瘡癤瘰癧癮疹火疸赤遊等疾連翹木香沉香薰陸香即乳香射干升麻獨活桑寄生通草麝香丁香各一兩大黃半兩右㕮咀三歲用一錢煎汁去滓服藍葉湯治小兒疽瘡方見本門癰瘡類五香連翹湯治小兒熱毒腫色白或惡核瘰癧附骨癰疽節解不舉白丹走遍身中疹瘙方見本門毒腫類治小兒大腸頭惡癰熱瘡用蜣蜋臼搗汁傳其上即安或燒為末醋和塗數過先以鹽水洗之妙犀角知母湯治小兒癰疽犀角鎊知母焙黃耆銼黃芩去黑心人參丹參葛根銼大黃銼炒甘草炙各一兩元參三分麥門冬去心焙一兩半右粗搗篩每服一錢匕水半盞入生地黃汁半合同煎至四分去滓食後臨卧溫服量兒大小加減漏蘆湯治小兒熱毒癰疽赤白諸丹毒瘡癤漏蘆連翹肘後用白薇白斂芒硝肘後用芍藥甘草各六銖大黃一兩升麻枳實一方不用麻黃黃芩各九銖聖惠方有赤芍藥二分右㕮咀以水一升半煎取五合兒生七日內取一合分三服八日至十五日取一合半分三服十六日至二十日取二合分三服二十日至三十日取三合分三服三十日至四十日取五合分三服肘後治大人各用二兩以水一斗煮取三升分三服其丹毒須針鑱去血經心録無連翹有知母芍藥犀角各等分黃耆湯治小兒癰疽瘡癤腫毒黃耆連翹升麻惡實炒各半兩元參丹參露蜂房枳殼去穰麩炒甘草炙各一分右粗搗篩每服一錢匕水七分煎至四分去滓食後臨卧溫服小大加減木通湯治小兒疽木通升麻赤芍藥黃芩去黑心山梔子仁麥門冬去心焙各二兩大黃銼炒各一兩枳殼去穰炒半兩右粗搗篩每二錢匕水一盞入生地黃汁半合煎至七分去滓分溫二服食後臨卧服量兒大小加減治小兒疽瘻丹砂大黃各十二銖雄黃䕡茹漆頭者各二十四枚礬石馬齒者十八銖雌黃二十四銖莾草十八銖黃連三十銖右㕮咀以豬脂一升三合微火煎三上三下膏成去滓下諸藥末攪凝傅黃耆湯治小兒瘡腫癰疽黃耆銼葛根銼麥門冬去心焙黃芩去黑心犀角鎊升麻甘草炙各一兩木香半兩右搗篩每服一錢匕水七分煎四分去滓食後服量兒大小加減服之黃蓍散治小兒疽腫及瘡癤身體壯熱口乾心躁黃耆半兩銼連翹半兩川升麻半兩元丹一分丹參一分露蜂房一分微炙枳實半兩麩炒微黃去穰甘草一分炙微赤銼右羅為散每服一錢水一小盞煎至五分去滓放溫量兒大小加減服之犀角散治小兒疽毒腫硬壯熱大渴犀角屑三分葛根半兩銼麥門冬一兩去心焙川升麻半兩木香半兩黃耆半兩銼黃芩半兩甘草半兩炙微赤銼右羅為散每服一錢水一小盞煎至五分去滓放溫量兒大小分減服之雞舌散治小兒疽瘡雞舌香一兩木香一兩沉香一兩麻黃海藻洗去醎大黃炮各半兩右搗羅為粗散每服一大錢水一大盞竹瀝三兩點煎至五分去滓溫服兼放令溫熱淋泄患處清水膏治小兒疽腫毒堅硬疼痛攻衝四畔焮赤冝用抽熱毒消腫氣羊桃根一兩銼川大黃一兩銼生用黃芩半兩赤小豆半合黃蘖半兩銼菉豆粉半兩右羅為散用蕓薹菜搗取自然汁以蜜少許相調藥令稀稠得所看四畔腫赤處大小剪生絹上勻攤可厚一錢貼之乾即換之天烏散貼方南星赤小豆草烏黃柏各等分右為末生薑自然汁貼患處或用米醋調尤佳治發背癰疽羌活一兩為末麝香少許川山甲醋炒焦半兩生龍骨煆存性半兩右件煎麻黃薄荷酒調如隂瘡頭平向者服之即突其功效不可具述若小兒痘瘡黑陷者只一服而起萬不失一龍角散治小兒癰疽腫癤一切等瘡或於頭面或發虛處無故身熱微覺增寒或有疼處皆癰癤證也地龍去土一兩荆芥穗一兩甘草一兩角刺三兩潤者杵去骨用皮濕稱右為末每服一錢酒水合半盞煎至三分去滓調入乳香末半錢加減服又方忍冬草甘草大黃各等分右為末依前法煎調乳香末服之黃連散治小兒疽已潰黃連半兩去須黃蘖半兩銼白芷半兩右搗為散每用雞子白調塗於故細布上貼之又方白芷半兩黃連半兩去須地榆半兩銼白斂半兩右羅為散每用雞子白調塗於故細布上貼瘡日三四度換之良蜜陀僧散治小兒疽腫穴後及惡瘡膿水雖淨肌肉不生蜜陀僧一兩黃連三分去須檳榔三分右羅為散用糝瘡上日三用之治小兒疽腫硬已成膿未成膿貼熁方鹿角屑二兩燒灰白斂一兩粗理黃石三兩燒赤以酒淬九遍右羅為散以醋調稀稠得所厚塗之乾即更塗五七度即效松脂餅子治小兒疽瘡久不瘥松脂一兩薰陸香一兩右合研內少許鹽為餅子貼於瘡上汁出盡即差治小兒癰疽癤毒未破或膿未潰增寒壯熱用乾蝦蟇一箇燒灰細研以豬脂和傅之又方用敗布不以多少燒灰細研以豬脂和傅之備急神驗方治未結之初微有紅頭㿔子起隱疼者急用不語唾夜半頻頻塗之即消散飲了酒不可用若已結成當用治小兒疽腫結硬已成膿貼熁方用蛇蛻皮貼之經宿自消又方用啇陸爛搗傅之又方用芫花搗羅為末水和如膏塗之又方用蠐螬研塗之鰻鱺魚膽汁及血各用塗之並效癰瘡附論夫小兒六腑不和寒氣客於皮膚搏於血脈壅遏不通稽留於經絡之間結腫而成癰其狀腫上皮薄而澤是也熱氣乘之熱勝於寒熱盛則致血肉腐化為膿若膿潰之後其瘡不瘥故曰癰瘡也方黃苓湯治小兒癰瘡煩熱疼痛黃苓去黑心梔子仁元參升麻大黃銼炒黃耆銼連翹藍葉甘草芎藭木香犀角屑右粗搗篩每服一錢匕水半盞煎至三分去滓溫服量兒大小加減吳藍葉散治小兒肺熱毒攻於諸處生癰瘡及項腋下有結核煩熱疼痛不得睡卧吳藍葉半兩黃芩一分大青一分犀角屑半兩元參半兩川升麻半兩梔子仁半兩川大黃三分銼碎微炒黃芩半兩銼連翹子半兩甘草半兩右為散每服半錢水一小盞煎至五分去滓量兒大小不計時分溫服黃耆散治小兒癰瘡膿潰數日不止致體虛煩熱頭疼昏悶宜服黃耆半兩銼防風半兩去蘆頭川升麻半兩羚羊角屑半兩芎藭一分甘草半兩地骨皮半兩人參半兩去蘆頭白茯苓半兩石膏右羅為散每服一錢水一小盞煎至五分去滓量兒大小不計時候分減溫服犀角散治小兒癰腫成瘡臟腑壅滯犀角屑半兩麥門冬三分去心焙元參半兩赤芍藥半兩薺苨半兩葳㽔半兩川升麻半兩甘草一分紅雪半兩右為散每服一錢水一小盞煎至五分去滓入竹瀝半合更煎一兩沸服一方無紅雪入硝石末一字煎鎔去滓溫服量兒大小加減麥門冬散治小兒癰瘡膿水出不盡心中煩悶不已麥門冬三分去心焙紫葛半兩黃耆半兩川升麻半兩犀角屑半兩甘草半兩炙微赤銼木通半兩右羅為散每服半錢水一小盞煎至五分去滓量兒大小不計時候溫服大黃散治小兒癰瘡臟腑壅熱心神煩躁大小便不利大黃銼炒升麻梔子仁朴硝别研枳殼去穰麩炒黃耆銼各半兩右粗搗篩每服一錢匕水七分煎至四分去滓溫服量兒大小加減連翹散治小兒癰癤等瘡連翹一兩沉香半兩白斂一分朴硝一分川大黃一兩炮甘草一兩右搗羅為細末每服一錢水一盞炒麝香一錢煎至五分食後溫服大麻仁丸大麻仁二兩木香半兩枳殼半兩麩炒微黃去穰牛蒡子一兩微炒甘草半兩炙微赤刲川大黃一兩銼右為末煉蜜丸如菉豆大每以熱水下十圓取利為度更量兒大小加減服之黃蘖散治小兒一切癰腫毒諸風神驗黃蘖去粗皮蜜炙鬱金各一兩陳橘皮湯浸去白炒人參葛根銼各半兩右搗羅為末用溫水調下半錢匕量兒大小加減日兩三服大黃散治小兒癰瘡臟腑壅熱太過心神煩悶大小便不通川大黃半兩銼微炒川升麻半兩梔子仁一分川朴硝半兩葵子半兩右搗為散每服一錢水一小盞煎至五分去滓溫服以利為度量兒大小加減服之益毒散治癰癤皆可用益母草二兩燒灰鹽花一兩炒乾伏龍肝半兩右研為細末每用一錢新水調稀稠得所旋取塗瘡口上消毒散治小兒癰瘡腫毒熱赤川大黃三分生銼杏仁三分浸去皮别研鹽花二分右羅為散入杏仁以新汲水和稀稠得所旋取塗瘡腫上乾即易之以效為度益母草飲治小兒癰瘡腫痛用益母草不拘多少洗銼搗取汁每服三二分服之更量大小加減以滓傅癰上乾則易又方用豬腦脂塗紙上貼之乾即易日數遍又方用芥子爛研水和塗紙上貼之又方用馬齒莧搗傅之又方用地龍糞新汲水調塗之一方薄荷汁調塗傅又方用薑石末和蒜搗封上又方用馬鞭草搗傅之即消又方用蕓薹菜搗塗之又方用雞腸草搗爛傅之又方用伏龍膽末以好醋調作膏塗於故帛上貼之又方用地松爛搗傅之乾即易又方用赤小豆末以雞子白和塗之又方用龍葵菜