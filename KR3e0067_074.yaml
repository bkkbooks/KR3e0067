body:
  text: 普濟方卷七十五眀周王朱橚撰眼目門風毒衝目虛熱赤痛論夫眼者肝氣所通隂陽所注若風邪毒氣在於臟腑積蓄日久不能消散傳注於肝肝受風邪上焦壅滯乃攻於眼也其狀瞼眥赤腫癢悶難忍隱澀羞眀淚眵交下見風尤甚是皆脾肺受風肝經不治則風邪熾盛傳而為熱多致連瞼赤爛冝清潔瞼膚兼餌以除風鎮肝之藥此候白睛先赤而後癢痛迎風有淚閉澀難開或時無事不久又發年深則睛變成碧色滿目如凝脂赤露橫赤如絲此毒風積熱又云此症或先赤爛多年肝經為風熱所衝而成或用力作勞有傷肝氣而得或癢或痛自兩眥頭努出心氣不寧憂慮不已遂乃攀睛或起筋膜又云眼胞皮肉有似膠凝腫髙如桃李者時時出熱淚乃風毒所注冝消風散及花草膏點之又云眼為暴風熱所攻白睛起障覆黑珠瞼腫癢痛冝服白殭蠶散山芋散出聖濟總録治風毒衝目瞼皆赤腫癢痛山芋白芷桔梗防風去又石膏羌活去蘆頭寒水石煆石決眀赤茯苓去黑皮當歸切焙藿香葉零陵香大黃蒸三度曝二日牛膝酒浸切焙人參決眀子鬱金梔子仁桑根白皮銼葛根銼狗脊去毛各一兩甘草炙銼生乾地黃焙蒺䔧子炒去角木賊銼陳橘皮去白皮玄參二兩蒼术米泔浸過切焙四兩沙參各二兩木香一兩右為散每服二錢匕用水煎麥門冬熱湯調下食後臨卧服決眀子丸治風熱上衝眼目或因外受風邪眼痛視物不眀決眀子炒細辛去苖葉青葙子蒺䔧子炒去角芎藭茺蔚子升麻獨活去蘆頭羚羊角防風去叉各半兩菊花一兩黃連去鬚枸杞子元參各三兩右為末煉蜜和丸如梧桐子大每服二十丸淡竹葉熟水下加至三十丸還睛丸治風上攻眼目赤腫怕日差眀多淚隱澀瘀肉浸睛或痛漸生翳膜白术生用兔絲子酒浸另研防風去蘆羌活去苖白蒺藜炒去尖密蒙花木賊青葙子去土蟬蛻去頭足右各分為細末煉蜜為丸彈子大每服一丸嚼白沸湯吞下空心食後日三服七寶散治風眼除瘀熱當歸一錢半芍藥一錢半甘草白礬各一錢杏仁去皮七箇黃連真銅緑各三分細研右吮咀以同於磁盞內於鍋中坐煎至八分去滓澄清臨卧洗甘菊花散出聖濟總録治風毒衝目赤腫澀痛甘菊花旋復花密蒙花青葙子石決眀羌活去蘆頭木賊銼蒼术米泔水浸過去皮切炒決眀子炒蟬殼荆芥穗甘草炙防風去乂芎藭人參黃芩去黑心各一兩右為散每服二錢匕米飲調下早晚食後服甘菊花出聖濟總録治風毒衝目虛熱赤痛菊花決眀子車前子丹參防風去乂㽔仁去皮升麻黃連元參黃芩去黑皮心大黃銼炒萎蕤細辛去苗葉甘草炙銼人參各一兩右為末煉蜜為丸如梧桐子大食後臨卧溫水下三十丸蟬花散出和濟方治肝經藴熱風毒之氣內摶上攻眼目翳膜遮睛赤腫疼痛昏暗視物不眀隱澀難開多生眵淚內外障眼蟬蛻洗淨去土榖精草洗去土白蒺藜炒菊花去梗防風不見火草決眀炒密蒙花去枝羌活蔓荆子去白皮黃芩去土山梔子去皮甘草炒木賊草淨洗川芎不見火荆芥穗各等分右為細末每服二錢用茶清調服或用荆芥湯入茶少許調服亦得食後臨卧時俱可服細辛散出聖惠方治風毒攻兩眼緊小羞眀風淚視昏暗細辛甘菊花各三分犀角一兩牛黃細研羚羊角屑密蒙花各半兩蔓荆子赤芍藥各半兩龍腦細研天竹黃細研各一分琥珀細研硃砂細研防風去蘆頭酸棗仁徴炒各三分甘草一兩炙微赤銼右為細末入研了藥令都研勻每服不拘時以溫酒調下一錢車前子丸出聖惠方治風毒攻赤眼澀疼痛視物不眀心神煩躁車前子青葙子石膏細研水飛槐子炒香各一兩木香甘菊花川升麻牽牛子微炒石決眀㨶細水飛秦皮真珠末犀角屑芎藭麥門冬去心切二兩半右為末煉蜜為丸如梧桐子大每服二十丸食後臨卧溫熟水下加至三十丸烏頭煎丸出聖濟總録治風毒攻眼久成內外障及積年痛楚弩肉赤脈烏頭二兩去皮生用雄黑豆小者二兩甘菊花一兩牛膝酒浸切焙枸杞子芎藭羌活去蘆頭地龍去土炒白蒺藜當歸荆芥穗乾薄荷各半兩青橘皮湯浸去白半兩同烏頭黑豆同為末以水一升三合浸一宿焙乾火煎膏右除烏頭膏外搗羅為細末入烏頭煎和勻臼中搗三千杵丸如梧桐子大每服二十丸空心茶酒送下開眀散治風毒氣眼朦澀障膜蒺藜炒去刺防風羌活川芎天麻茯苓蟬殼蒼术童尿浸一宿焙各半兩荆芥華隂細辛茺蔚子甘草各炙一分甘菊去蕚二兩右為細末每服二錢鹽一點食後沸湯點下香芎出聖濟總録治風毒衝目赤癢痛芎藭枸杞子荆芥穗蒼术米泔浸一宿切焙各二兩細辛去苗葉蟬殼菊花莎草根炒去毛決眀子石膏煅甘草炙旋復花各半兩右為細末煉蜜為丸如彈子大每服一丸臘茶嚼下不拘時候甘菊花丸出聖惠方治風毒衝目虛熱赤痛甘菊花一兩決眀子一兩半車前子二兩防風二兩去蘆頭黃連川升麻子茶各一兩蕤仁一兩半湯浸去赤皮川大黃三兩銼炒玄參一兩萎蕤二兩右為末煉蜜和下三二百杵丸如梧桐子大每服食後溫漿水下一十丸日三柴胡湯出聖濟總録治肝虛風熱上衝目暗赤痛柴胡去苗車前子梔子仁決眀子微炒黃芩去黑心各二兩黃連去鬚一兩一方用半兩甘草炙銼一兩一方用半兩防風去叉羚羊角各一兩馬牙硝一兩一方半兩升麻一兩半一方用大麻仁右粗搗篩每五錢匕水一盞半煎至八分去滓食後臨卧服金絲膏出聖濟總録治風熱上攻目赤腫痛黃連去鬚二兩大黃龍膽草黃蘗去粗皮當歸山梔子仁各一兩已上同搗研青竹葉一百片切大棗二十枚去核燈心切蓬砂研乳香研各一分右用水五升不拘冬夏浸一時辰取出於銀器內慢火熬不令大沸候滴盡汁下火放冷用絹絞取汁於無風日處澄一時辰去滓於銀器內慢火熬令減半入白蜜半升同攪候有蜜香以手挑起有絲即止放冷再以生絹袋子濾過以瓷合盛之每取一茶腳許研龍腦一字極細入膏攪一遍和勻取少許點之琥珀煎出聖濟總録治風毒衝目腫赤癢痛乳香末二錢蕤仁研半兩鉛丹滑石各二兩黃連末秦皮各二兩白蜜黃芩去黑心各四兩木鱉子去殼十二枚栁枝槐枝並青新者各十枝每枝長寸半右將槐枝秦皮黃芩滑石等粗杵碎以水三碗同煎至二碗去滓其餘乳香𬎼仁鉛丹木鱉子四味與蜜同熬如琥珀色却共前項藥汁并黃連同煎至一碗半用熟絹濾去滓入瓷器內密封繫垂在井底一夜出火毒每用銅筯點以目澀為度熬點不得犯鐡器羌活散出三因方治風毒氣上攻眼目昏澀翳膜生瘡及偏正頭疼目小黑花纍纍者羌活川芎天麻青皮藁本旋復花天南星炮各一兩右為細末每服二錢水一盞薑三片薄荷七葉煎七分食後服一法入牽牛末二兩以生薑汁煮糊丸如梧桐子大茶酒米飲下二三十丸日三服不翳內障及暴赤眼決眀子散出直旨方治風熱毒氣上攻眼目腫痛或卒生翳膜或赤脈弩肉或癢或澀羞眀多淚或始則昏花漸或內障及一切暴風客熱皆冝黃芩木賊決眀子菊花去枝石膏川芎赤芍藥川羌活去蘆甘草蔓荆子石決眀各一兩右為末每服三錢水一盞薑五片煎至六分食後服羌活散出直旨方治風氣攻眼昏花澀淚羌活川芎天麻旋復花甘菊藁本防風蟬殼洗細辛杏仁去皮各一兩甘草各半兩右為末每服二錢新水略煎服羚羊角丸出聖濟總録治風毒衝目虛熱赤痛羚羊角鎊防風去叉芍藥茯神去木麥門冬去心焙地骨皮決眀甘草炙蕤仁各一兩右為末錬蜜丸如梧桐子大食後臨卧溫水下三十丸前胡湯出聖惠方治腎臟風毒衝眼赤痛及紫色前胡去蘆頭羚羊角屑茯神各三分防風去蘆頭決眀子木通銼川朴硝各一兩元參地骨皮各半兩川升麻三分右為粗散每服三錢匕水一盞煎至六分去滓食後溫服菊花湯出聖濟總録治熱毒上衝眼赤疼痛菊花一兩大黃銼炒半兩茯神去木元參淡竹葉升麻犀角鎊決眀子黃參去黑心黃連去鬚各三分右搗篩為粗散每服三錢匕水一盞煎至六分去滓食後溫服還睛丸出利劑方治一切內外障眼風毒赤腫怕日羞眀眵淚隱澀難開眶癢赤痛臉皆紅爛弩肉侵睛暴赤疼痛兼偏正頭目眩運川芎白蒺藜白术羌活甘草密蒙花木賊去節青葙子兔絲子酒浸三日炒防風右各等分為末以蜜丸如彈子大每服一丸爛嚼白湯下空心日三和劑方無川芎黃芩散治風毒攻眼磣痛不可忍黃芩防風去蘆頭石膏細研水飛過知母地骨皮石決眀搗細末水飛過梔子仁細辛赤芍藥各一兩黃連去鬚半兩右為細末每日食後及夜臨卧時以溫水調下一錢升麻散治肝臟熱毒衝眼生赤脈腫或生白翳或澀痛視物不眀川升麻赤芍藥秦皮枳殼麩炒微黃去穰前胡去蘆頭黃連川大黃銼碎微炒川芒硝決眀子各一兩梔子仁三分右粗搗為散每服三錢以水一鍾入淡竹葉二七片煎至六分去滓每於食後溫服決眀子丸治風毒衝目虛熱赤痛決眀子一兩半防風去義黃連去鬚各半兩車前子二兩升麻黃芩去黑心大黃銼炒元參萎蕤各一兩右為末煉蜜丸如梧桐子大食後以溫漿水下三十丸臨卧再服地黃丸治肝腎風毒熱氣上衝眼痛方見本門肝虛眼類防風散治風毒攻眼睫落腫痛防風去蘆頭黃連去鬚決眀子黃芩甘草炙赤銼川大黃銼碎微炒木通銼已上各一兩甘菊花三分赤芍藥一兩半右為粗散每服三錢以水一中盞煎至六分去滓每於食後溫服忌毒肉魚炙煿熱麵羚羊角散治熱毒上攻眼目煩悶頭熱心躁不便小利羚羊角屑半兩赤芍藥木通元參馬牙硝各一兩枳殼半兩麵炒微黃去穰梔子仁右粗羅為散每服三錢以水一中盞入竹葉二七片煎至六分去滓每於食後溫服甘草散治熱毒攻眼胸膈壅悶煩喘甘草炙微赤銼葛根銼桔梗去蘆頭元參車前子前胡去蘆頭貝母煨令微黃犀角屑川升麻各三分右為散每服三錢以水一中盞入生薑半分淡竹葉二七片煎至六分去滓每於食後溫服通膈薺苨散治風毒衝目心胸煩悶薺苨地骨皮葛根銼柴胡去苖黃芩各一兩𬎼仁去皮甘草炙各半兩石膏二兩右為散每服三錢匕水一中盞煎至七分去滓食後溫服臨卧再服洗肝散治風毒上攻暴作赤目腫痛難開隱澀眵多淚出昏暗羞眀或生翳膜並皆治之大黃煨一方用黃連山梔子去皮防風去蘆薄荷川芎當歸洗去蘆羌活去蘆甘草炙各二兩右為細末每服二錢冷水或熱水食後一方用荆芥花湯調下羚羊角散治大人小兒風熱毒攻眼目暴發赤痛或生瘡疼痛隱澀羞眀黃芩升麻甘草炙羚羊角鎊車前子各十兩梔子仁草龍膽各五兩決眀子十二兩右為末每服一錢食後溫熱水調下日三服小兒可服半錢車前子黃芩黃連決眀子元參甘草炙微赤銼黃耆各一兩銼麥門冬一兩去心焙右粗羅為散每服三錢以水一中盞煎至六分每於食後溫服忌炙煿酒麵毒魚肉㵼肺麻仁散一名大麻仁湯治熱毒攻眼澀痛方見本門肝實類石膏散治肝臟壅熱毒攻眼赤頭疼煩渴蓋臟腑氣母之精皆上榮於目若肝膽壅實榮衛不行則心肺俱熱之氣伏留不散乃上攻於眼石膏二兩甘草半兩炙微赤銼犀角屑川升麻柴胡去苖葛根黃芩各一兩麥門冬一兩半去心焙右粗羅為散每服三錢以水一中盞入淡竹葉二七片煎至六分去滓每於食後溫服羚羊角湯治風毒衝目連瞼赤爛熱痛羚羊角鎊防風去叉芍藥茯神去木甘草炙銼羌活去皮蘆細辛去苗葉各一兩右粗搗篩每服五錢用水一鍾半煎至七分去滓食後溫服臨卧再服草龍膽散治上焦氣感風熱氣攻毒衝眼目暴赤磣痛羞眀腫痛多眵迎風有淚翳瞙攀睛弩肉隱痛並治之川芎不見火香附子炒去毛各四兩