方治風毒熱氣上攻眼目赤痛翳膜功效不可細述更是冷熱虛實一切眼疾並可服當歸去蘆頭洗去塵土微炙切焙乾用稱四兩黃芩三兩生用木賊去節三兩木鱉子二兩琥珀半兩白研麻黃去節一兩枸杞子二兩防風去蘆頭二兩荆芥穗一兩半甘草一兩生用銼橘皮去穰一兩半烏魚骨一兩半龍腦薄荷隂乾者只用葉二兩右為末煉蜜丸彈子大每服一丸細嚼臘茶下食後夜卧日夜三服忌食魚麵春雪膏出楊氏家藏方治風毒氣攻眼目翳膜遮障隱澀難開或發腫痛攀睛弩肉並皆治之𬎼仁二錢去皮細研腦子一錢别研杏仁十四箇去皮朴硝細研硼砂别研二味各半錢右將㽔仁杏仁研細次入諸藥研勻成膏子每用一粟米許點通頂散出楊氏家藏方治風毒攻眼并夾腦風川芎細辛去葉土香白芷藿香葉去土已上四味各七錢躑躅花榖精草上二味各半兩右件為細末每用先唅新汲水一口然後挑少許搐在鼻內以手揉兩太陽穴蟬花散出楊氏家藏方治肝經藴積風毒上攻眼目腫痛昏暗或生翳膜視物不眀蟬蛻去土半兩蒼术二兩半米泔浸荆芥穗甘草炙木賊去節三味各一兩半密蒙花甘菊花旋復花黃連去鬚石決眀草決眀榖精草仙靈脾青葙子薄荷葉去土羌活去蘆頭川芎防風去蘆頭白蒺藜炒去刺黃芩已上十五味各一兩細辛去葉子半兩羯羊肝一片切焙乾右件為細末每服二錢用川椒湯調下茶清亦得食後服曾青散出經驗方治風熱攻眼赤腫疼痛眵淚難開除昏澀清頭目乳香一分須南中真滴乳川中來乳香不可用沒藥一分青黛二錢木香盆硝一兩揀乾白馬牙硝即燒煙火用者右件研細令勻每用時先噙水一口次以少許搐兩鼻中以手揉兩太陽穴都下御醫眼科仇防禦家日貨此藥十數千用者輒效近日本所唐主管花成病目纍日藥性多涼幾不進食深以為恐趙檢察德和偶傳此方屏去它藥用時數服而愈茶調散出朱氏集驗方治男女顛風攻注眼目昏暗最治睛痛藿香香附子各半兩甘草二錢半右為細末食後蔥茶調下目風赤論風毒內乘於肝則熱氣上攻於目故見風淚出瞼皆赤腫初患之時或癢或痛發歇不定甚則生瘡為風赤目也青葙子丸出聖惠方治眼風赤昏暗淚出青葙子一兩黃連一兩去鬚人參一兩去蘆頭苦參一兩銼防風三兩去蘆頭地骨皮一兩白鮮皮一兩川升麻一兩玄參一兩車前子一兩川大黃銼碎微炒一兩枳殼一兩麩炒微黃去麩梔子仁一兩秦芃一兩去苖茯苓一兩龍膽草三分去蘆頭右搗羅為末煉蜜搗三二百杵丸如梧桐子大每服用於食後以溫漿水下二十丸流氣飲出直指方治風熱攻眼赤腫治證又詳本門肝虛眼類荆芥穗去梗梔子仁蔓荆子牛蒡子炒甘菊去枝甘草炙細辛去葉洗白蒺藜炒去刺防風去蘆玄參去蘆川芎淨各一兩大黃炮木賊去節用黃芩各一兩去蘆草決眀一兩半蒼术米泔浸一宿焙二兩右為末每服二錢食後臨卧紫蘇煎湯調下或蜜湯下一方冷酒調下如小兒患用乳母服前胡湯出千金方治眼風赤暗前胡芍藥各四兩生地黃十兩芒硝黃芩茯苓白芷枳實各三兩人參白术梔子仁澤㵼各二兩甘草細辛各一兩竹葉五片右㕮咀以水一斗二升先煎竹葉取九升去滓下諸藥煎至二升半分三服犀角散出聖惠方治風赤眼澀痛淚出睛疼心膈煩熱四肢不利犀角屑一兩防風去蘆頭羚羊角屑車前子川升麻甘菊花細辛黃芩玄參甘草炙微赤銼各三兩蔓荆子二分硃砂細研琥珀細研各半兩龍腦細研各二分右為散研勻每於食後煎麥門冬湯調下一錢防風蔓荆丸出聖濟總録治風熱目赤昏澀磣痛防風去蘆二兩半蔓荆實去皮羚羊角山梔子仁玄參各一兩半萎蕤大麻仁研芍藥朴硝研各三兩黃連去鬚枳殼去穰麩炒各一兩菊花三分麥門冬去心焙二兩右為末煉蜜和丸如梧桐子大每服二十丸食後臨卧溫漿水下稍加至三十丸羚羊角出聖濟總録治風毒腫目赤昏暗年深者羚羊角鎊決眀子炒犀角鎊地骨皮石膏各一兩玄參細辛去苖葉黃芩去黑心各半兩防風去乂芎藭柴胡去苖升麻各三分右粗搗篩每服五錢以水一盞半入竹葉十片煎至七分去滓入芒硝末半錢用食後臨卧溫服日再升麻湯治肝腎虛風衝目赤視物昏暗漸成青盲升麻麥門冬去心焙玄參白楊樹皮柴胡去苖梔子仁黃連去鬚各一兩犀角屑鎊一兩半決眀子炒甘草炙各半兩黃芩去黑心二兩地骨皮三兩右粗搗篩每服三錢以水一盞煎至七分去滓於溫食後臨卧服日再柴胡湯出聖濟總録治肝虛風熱衝眼赤暗方見本門熱毒衝目虛熱赤腫痛類蔓荆實丸一名羚羊角丸出濟總録治風熱攻眼赤兼暴赤眼蔓荆實去皮羚羊角鎊山梔子仁甘菊花各一兩半萎蕤大麻仁麥門冬去心焙朴硝研各三兩防風去叉一兩半赤芍藥二兩右為末煉蜜和丸如梧桐子大每服二十至三十丸食後臨卧溫熱水下胡黃連煎治眼風赤痛爛怕見風日磣痛不可忍方見本門目赤爛類秦皮散出聖濟總録治目風赤熱痛淚出秦皮去粗皮黃連去鬚露蜂房柴胡去苖蛇蛻鈎藤紫蘇胡黃連丹砂别研各等分右除丹砂外搗羅為散與丹砂末同研勻每服二錢匕食後煎竹葉湯調下日三服垂栁枝煎出聖濟總録治風赤眼垂栁枝長二寸七莖枸杞枝長二寸七莖桃枝長二寸七莖馬牙硝一分細研桑枝二七寸七莖竹葉四十九片黃連半兩去鬚決眀子半兩龍腦半錢細研右除粗硝及龍腦外以漿二大盞於銅器中煎至一半去滓重以綿濾令淨入硝及龍腦攪令勻更煎令稠每以銅筯頭取如小豆許點日三五度甘菊湯出聖濟總録治風毒衝眼癢赤痛甘菊花地骨皮各一兩升麻一兩半茯苓去木皮黃連萎蕤防風去叉木通銼各二兩右粗搗篩每服五錢以水一盞半入竹葉一十片同煎八分去滓食後溫服日三袪風散出楊氏家藏方治風眼連瞼赤爛隱澀疼痛乾薑一兩洗淨銅緑一錢右為細末每用一字於銅盂內以沸湯浸澄清洗眼漸漸閃開眼方藥入眼內連瞼通洗直至藥冷住閉眼少時方開洗之半月赤爛自除如冷再蕩令熱更洗一次治目熱赤出本草以研合子葉挼碎滴目中龍腦膏出聖惠方治眼風赤冷淚翳膜龍腦細研麝香細研膩粉郁李子仁湯浸去皮𬎼仁湯浸去皮黃連去鬚硝石各一兩古字錢二文右為散研令勻以白蜜四兩同入在磁瓶中密封頭於炊飯甑內蒸飯熟為度如患者以銅筯不計候點之玄參湯一名羚羊角湯出聖濟總録治風熱氣衝目赤癢痛玄參黃芩去黑心各一兩羚羊角鎊三分一方用一兩蔓荆實去皮三分甘菊花三分一方用一兩防風去叉一兩芍藥一兩半右粗搗篩每服五錢以水一盞半煎至八分去滓入馬牙硝半錢於食後臨卧溫日再服治一切風赤眼皮上燥癢赤爛久治不效此藥神效不可盡説出護命方白蜜三銖輕粉十字白蠟三銖臘月豬脂半兩右為鎔豬脂成油漸入白蜜次下白蠟候三味總化成油入輕粉攪令均非時用搽眼赤皮上已上藥只於銅石器內煉點眼銅緑膏出聖惠方治風赤眼及癢痛銅緑半兩龍腦半錢麝香半錢烏賊魚骨一分馬牙硝一分蕤仁一分湯浸去皮水銀一兩豆大右研如粉每服用藥一字入人乳汁中調和如膏每以銅筯頭取少許點之日三五度洗風赤眼腫痛方一名洗眼方出聖惠方青鹽一分決眀子柴胡去苖秦皮防風去蘆頭蛇銜草各一兩生乾地黃二兩右銼和勻水三大盞煎二盞濾過每再暖三合洗眼了避風瘥洗眼槐枝湯出聖惠方治眼風赤磣澀生赤脈及膜熱淚出不止槐枝一大握栁枝青嫩如小指大者一握長三寸青錢三十文青鹽半分漿水二斗醋淡得所生朴硝一分右銅器中以慢火煎不得令火急常微沸如魚眼又别以槐枝栁枝如筯長十數莖以綿纒攪藥兩頭俱使看色變復換新者待漿水色緑苔減半於磁器中盛溫洗眼用之避風五生散出亘選方治目赤去頭風退昏天雄附子各半兩防風一兩天南一兩川續斷一兩生用右為飲子每服二錢水一盞半生薑七片酒少許煎至六分食後溫服因頭風而病目者服之效青梅煎青梅二十枚洗淨拍研碎要三月三日取上好者古文錢四十九文白鹽一兩川朴硝三兩馬牙硝半兩右以漿水二大盞內新磁瓶中盛密封頭埋頭地淨處一月後取出可用每點少許日三五度黑豆湯出聖濟總録治目風赤熱痛黑豆二合生用羌活去蘆頭惡實根去莖洗銼焙右粗搗篩每服五錢以水一盞半煎至七分去滓入乳糖一錢於食後臨卧服銅青湯出聖亘選方治風眩青赤眼防風一寸許銅青黑豆大一塊杏仁二枚去尖不去皮右為細切於􅊦中新汲水浸湯瓶上頓令極熱乘熱洗之如痛者加當歸數片救急療久患風眼方黃連一小兩碎印盛鹽兩豆大許肥大乾棗兩頭去核細切右以井花水半大升內前件藥攪緩火煮三分去一以綿濾使盡其餘汁更緩火煎之候藥上有紫液起即是成煎以物盡刮取於合內貯之勿使塵汚用取二豆大許以人乳和之置兩眼眥頭從淚出每著杏仁咽侯即停瘥亦不勞避風毒欲出時口含鹽水以洗之忌食豬肉春雪膏治風赤眼腦子一錢蕤仁二錢去殼麝香半錢右研極細末用蜜相和點眼中點眼蕤仁膏出聖惠方治風赤眼蕤仁半兩去皮浸膩粉二錢驢脂一分右先將蕤仁研細又下膩粉臚脂勻調如膏盛於磁合內勿令風土入夜眠時以銅筯取少許點目中繭鹵點眼煎出聖惠方治眼風赤熱淚虛腫赤澀痛繭鹵一升清香者青梅二十七粒古文錢二十一文右以新磁瓶盛密封於湯中煮一炊久取經三日後每以銅筯頭取少許點目中日三五度點眼黃連膏治目風赤方見本門積年赤類又方出聖惠方治風赤眼腫痛膩粉半分銅緑一分細研右以酥調成膏每用睡時先用鹽湯洗眼拭乾塗眼赤處治風赤眼方出聖惠方黃連半兩去鬚為末雄豬膽一枚取汁右相和作團却入在膽內於屋簷下懸冷乾淨去塵土搗羅為末煉蜜和丸如黃米大每服夜臨卧時以黃連湯下五丸治風赤澀痛出肘後方取訶梨勒核入白蜜研注目中神良一方用鷹觜者一枚滴蜜於石上磨點枸杞方出龍木論治風熱生膚赤白眼及去眼中風癢痛搗枸杞子汁點眼立驗亦治暴赤眼風障赤膜一方用葉搗汁含一滿口待稍溫就咽之拜堂散治風赤眼以五倍子為細末貼赤處治風赤眼出聖惠方以地龍十條炙乾為末夜卧冷茶調下一錢服熏眼洗方治風爛目眩臨洗加輕粉少許凡染時氣赤眼自外而入非臟腑病者不必服藥熏洗足矣黃連去鬚草芎去蘆蔓荆子一錢去葉膜五倍子三錢煎碎去垢銚內火炒待赤色紙鋪地上用蓋片時出火氣右為銼散作三服每服用生絹一小方洗淨入藥絹內以線扎定水煎仍以紙糊瓶口勿令氣出却於無風處就瓶口紙上破一小孔熏之後候氣稍平揭去瓶紙熏於瓶口之氣溫傾出用淨絹蘸洗如此三次為效驗仍避火毒洗眼黃連散出神效方治一切風毒赤目當歸赤芍藥黃檗黃連各等分右細銼以雪水或甜水濃煎汁熟洗治風沿眼赤黃連一兩輕粉一分海螵蛸二錢去殼蘆甘石四兩以童子便浸七日煅七次為末右為細末點眼洗肝散出本事方治風眼赤痛黃芩甘草炙各半兩菊花人參各一兩右為細末每服一錢熟水調下日服忌毒物嗅鼻藥出危氏方治目風熱腫赤難開雄黃水飛過辰砂各二錢細辛半兩腦麝少許右為末口含水以藥少許嗅鼻中治逺年風赤眼出瑞竹堂方杏仁一十一箇去尖分作三分粉草一寸分作三分右漱口淨將杏仁一分甘草一分同嚼爛如泥於磁盞內三分俱如此嚼爛用銅緑二錢研為細末與前藥和勻用新井水一盞將水漱口吐於藥內如洗攪以帛濾過澄清於眼大角點之效勿令塵灰入藥內又方出瑞竹堂方治近年風眼赤銅緑研寒水石右各等分碾為細末用五七沸滚水浸在藥內攪勻澄清將水面上藥膜掠去將清藥水於眼大角上點之勿令塵灰土入內立效桑葉方出龍木論用桑葉主除寒熱等毒除風毒痛春葉未開枝可作煎服治一切風眼赤乳香散治赤眼頭風等證乳香川芎沒藥石膏雄黃銅緑半兩盆硝共研用右為細末嗅鼻點眼雄黃散治風毒赤痛眥爛生瘡衝風有淚雄黃研黃連去鬚黃蘗去粗皮各一兩半乾薑炮三錢菊花一兩右為細末於瓦器中盛每取黍米許點目皆效普濟方卷七十五
