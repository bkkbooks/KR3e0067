body:
  text: 普濟方卷十一明周王朱橚撰運氣圖太陽寒水司天太陰濕土在泉中見太宫土運歲土太過氣化運行先天太宫下加太陰太過而加同天符又土運臨辰是謂歲會氣之平也平土之歲命曰備化之紀氣協天休德流四政五化齊修其氣平其性順其用髙下其化豐滿其政安靜其候溽蒸其令濕其類土其應長夏其穀稷其果棗其實肉其蟲倮其畜牛其物膚其色黃其味甘其音宫其𢾗五其在人也其藏脾其主口其養肉其病痞此運歲所生也天地之氣寒化在上左動化右清化故天政所布其氣肅甘化在下左明化右灼化故地氣靜而其令徐水土合德上應辰星鎮星其榖玄黅寒臨太虛其政大舉陽氣不令澤無陽焰則火發待時少陽中治時雨乃涯止極雨散還於太陰雲朝北極濕化乃布澤流萬物寒敷于上雷動于下寒濕之氣交民病寒濕發肌肉萎足痿不收濡瀉血溢嵗半之前太陽主之太陽有本標之化寒政大舉熱氣時應者天氣得中也歲半之後太陰主之太陰之化從本雨濕甚者地氣之應也寒化六濕化五是謂正化之日鱗蟲靜倮蟲育是謂嵗物所宜鱗蟲不成燥毒不生是謂地氣所制平土之嵗本不資化源以運與地氣臨於戌嵗有三土天令甚虛宜先資化源以助於水所謂抑其運氣扶其不勝無使暴過而生其疾也食玄黅之穀以全其真避嵗之虛邪以安其政以苦熱調上以苦溫調下運土在中亦以苦溫調之運同寒濕化宜燥熱治之常也初之氣自癸卯年大寒日寅初至是嵗春分日子初凡六十日八十七刻半主位太角木客氣少陽火中見土運少陽中治以行春令地氣遷氣大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍宜治少陽之客以醎補之以甘瀉之以醎耎之嵗穀宜玄間榖宜豆則火不為邪二之氣自春分日子正至小滿日戌正凡六十日有竒主位少徴火客氣陽明金中見土運金土相和大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜治陽明之客以酸補之以辛㵼之以苦泄之嵗榖宜玄間榖宜黍則燥不為邪三之氣自小滿日亥初至大暑日酉初凡六十日有竒主位少徵火客氣太陽水中見土運天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歲榖宜玄間榖宜稷則寒不為邪四之氣自大暑日酉正至秋分日未正凡六十日有竒主位太宫土客氣厥陰木中見土運歲土得位風氣居之風濕交爭風化為雨乃長乃榮乃成民病大熱少氣肌肉萎足痿注下赤白宜治厥陰之客以辛補之以酸瀉之以甘緩之歲榖宜黅間榖宜稻則風不為邪五之氣自秋分日申初至小雪日午初凡六十日有竒主位少商金客氣少陰火中見土運土能生金氣位相和陽復化草乃長乃化乃成民乃舒宜調少陰之客以醎補之以甘瀉之以酸收之歲榖宜黅間穀宜豆則熱不為邪終之氣自小雪日午正至大寒日辰正凡六十日有竒主位太羽水客氣太陰土中見土運氣與運符地氣正濕令行陰凝太虛埃昏郊野民乃悽慘寒風以至反者孕乃死宜治太陰之客以甘補之以苦瀉之以甘緩之歲榖宜黅間榖宜麻則濕不為邪是氣也不可犯涼司氣以涼故也歲氣雖平或有邪氣則中執法經曰中執法者其病速而危也厥陰風木司天少陽相火在泉中見少商金運歲金不及氣化運行後天上角與正角同諸同正歲氣化運行同天氣風化行於上左灼化右藏化故天氣擾而其政撓苦化司於地左素化右柔化故地氣正而其令速風生髙逺炎熱從之雲趨雨府濕化乃行風火同德上應歲星熒惑其榖蒼丹間榖言太宫太羽者其耗文角品羽風燥火熱勝復更作蟄蟲來見流水不氷熱病行於下風病行於上風燥勝復形於中熱化寒化勝復同所謂邪氣化日也風化八清化四火化二所謂正化度也毛蟲靜羽蟲育是乃歲物所宜介蟲毛寒毒不生是乃地氣所制然木為天氣火為地氣金運在中地氣勝運運化勝天天氣虛地氣實宜資化源以助木氣兼贊歲運無使邪勝其化上辛涼中酸和下醎寒所謂藥食宜也歲半之前天氣厥陰主之厥陰以中氣為化當其時風從火化者天氣之和也若風淫所勝則太虛埃昏雲物以擾寒生春氣流水不氷民病胃脘當心而痛上肢兩脅膈咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉病本於脾診在足衝陽之脈法宜平以辛涼佐以苦甘以甘緩之以酸瀉之歲半之後地氣少陽主之少陽之化從本若火淫于內則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便法宜治以醎冷佐以苦辛以酸收之以苦瀉之歲運之化金不及紀曰從革是謂折收收氣乃揚長化合德火政乃宣庶類以蕃其氣揚其用燥切其動鏗禁瞀厥其發咳喘其病邪傷肺其化兼所不勝夏有光顯鬱蒸之令則冬有嚴凝整肅之應若夏有炎爍燔燎之變則秋有氷雹霜雪之復其眚西其藏肺其病內舍膺脅肩背外在皮毛復則寒雨暴至乃零氷雹雪霜殺物陰厥且格陽反上行頭腦户痛延及額頂發熱甚則心痛宜治以酸和調中初之氣自甲辰年大寒日巳初至是歲春分日卯初凡六十日八十七刻主位太角木客氣陽明金中見金運氣與運同居於木位與厥陰交司而行春令金木氣齊寒始肅殺氣方至民病寒於右之下宜治陽明之客以酸補之以辛瀉之以苦泄之歲榖宜蒼間榖宜黍是氣也司氣以涼用涼無犯二之氣自春分日卯正至小滿日丑正凡六十日有竒主位少徵火客氣太陽水中見金運金水相得寒不去華雪水冰殺氣施化霜乃降名草上焦寒雨數至陽復化民病熱於中宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歲榖宜蒼間榖宜稷三之氣自小滿日寅初至大寒日子初凡六十日有竒主位少徵火客氣厥陰木中見金運火勝金金勝木天政布風乃時舉民病泣出耳鳴掉眩宜治厥陰之客以辛補之以酸瀉之以甘緩之歲榖宜蒼間榖宜稻四之氣自大暑日子正至秋分日戌正凡六十日有竒主位太宫土客氣少隂火中見金運火勝金溽暑至濕熱相薄爭於左之上民病黃疸而為胕腫宜治少陰之客以醎補之以甘瀉之以酸收之歲榖宜丹間榖宜豆五之氣自秋分日亥初至小雪日酉初凡六十日有竒主位少商金客氣太隂土中見金運嵗運之金得位與土相和其化燥濕更勝流隂乃布寒氣及體風雨乃行宜調太隂之客以甘補之以苦瀉之以甘緩之嵗穀宜丹間穀宜麻終之氣自小雪日酉正至大寒日未正凡六十日有竒主位太羽水客氣少陽火中見金運畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病溫厲宜治少陽之客以酸補之以甘瀉之以鹹耎之嵗穀宜丹間穀宜豆六氣之常也嵗之化天氣勝者陽明復之地氣勝者太陽復之其治各以其勝復法少隂君火司天陽明燥金在泉中見太羽水運嵗水太過氣化運行先天熱化在上柔化左動化右辛化在下玄化左明化右故天政布而其氣明地氣肅而其令切寒交暑熱加慘雲馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其穀丹白熱化二寒化六清化四政化度也羽蟲靜介蟲育是謂嵗物之宜毛蟲耗濕毒不生是皆地氣所制水火寒熱時氣交而為病始熱病生於上清病生於下寒熱相犯而爭於中民病咳喘血溢血泄鼽衄嚏欠目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上是嵗火為天氣金為地氣火勝金天氣盈當取火之化源水運在中火邪乃微必抑其運木資其嵗勝無使暴過而生其病食白丹之榖以全其氣食間氣之榖以辟虛邪以醎耎之調其上甚則以苦發之以酸收之而安其下甚則以苦泄之運同地氣以溫熱化其化上醎寒中醎熱下溫酸藥食宜也嵗半之前少隂主之其政熱若熱淫所勝則怫熱至火行其政民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨膨而咳喘病本於肺診在手尺澤之脈法宜平以醎寒佐以若甘以酸收之歲之後陽明主之其燥令若燥淫于內則霜霧清暝民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱法宜治以苦溫佐以甘辛以苦下之歲運之化水太過紀曰流衍是謂封藏寒司物化天氣嚴凝藏政以布長令不揚其化凛其堅其政謐其令流注其動漂泄沃涌其德凝慘寒氛其變氷雪霜雹其化兼其所勝其病脹故曰歲水太過寒氣流行大雨至埃霧朦鬱邪害心火民病身熱煩心躁悸陰厥上下中寒譫妄心痛寒氣早至甚則腹大脛腫喘咳寢汗出憎風其政息以醎熱初之氣自乙巳年大寒日申初至是歲春分日午初凡六十日八十七刻半位主太角木客氣太陽水中見水運氣與運同地氣遷燥將去寒始遷熱復藏水乃氷霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜治太陽之客以苦補之以鹹瀉之以苦堅之以辛潤之嵗榖宜丹間榖宜稷雖有寒邪勿能為害是氣也用寒逺寒無犯司氣之寒二之氣自春分日午正至小滿日辰正凡六十日有竒主位少徵火客氣厥陰木中見水運水生木陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣欎於上而熱宜治厥隂之客以辛補之以酸瀉之以甘緩之歲榖宜丹間榖宜稻雖有風邪弗能為害三之氣自小滿日巳初至大暑日卯初凡六十日有竒主位少徵火客氣少隂火中見水運二火相加水運承之天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜治少隂之客以鹹補之以甘瀉之以酸收之歲榖宜丹間榖宜豆雖有熱邪弗能為害四之氣自大暑日卯正至秋分日丑正凡六十日有竒主位太宫土客氣太隂土中見水運土居其位又能勝水溽暑至大雨時行寒熱互至民病寒熱嗌乾黃疸鼽衄飲發宜調太陰之客以甘補之以苦瀉之以甘緩之歲榖宜白丹間榖宜麻雖有濕邪弗能為害五之氣自秋分日寅初至小雪日子初凡六十日有竒主位少商金客氣少陽火中見水運火勝金水運承之畏火臨暑反至陽乃化萬物乃生乃長乃榮民乃康其病溫宜治少陽之客以醎補之以甘瀉之以醎耎之歲榖宜白間榖宜豆雖有火邪弗能為害終之氣自小雪日子正至大寒日戌正凡六十日有竒主位太羽水客氣陽明金中見水運水運得位燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連少腹而作寒中地將易也宜調陽明之客以酸補之以辛瀉之以苦泄之嵗榖宜白間榖宜黍雖有燥邪弗能為害此六氣之化也嵗氣之交天氣之交天氣勝則有太陽之復地氣勝則有少陽之復其治各依勝復之法寒者熱之熱者寒之無翼其勝無贊其復此其道也太陰濕土司天太陽寒水在泉見少角木運歲木不及氣化運行後天太隂濕化在上少陽明化為左間少陰灼化為居氣太陽醎化在下厥陰動化為左間陽明清化為右間故地氣上騰而其政肅天氣下降而其令寂陰專其政陽氣退辟大風時起原野昏霧白埃四塞其榖黅玄故陰凝於上寒積於下寒水勝火則為氷雹陽光不治殺乃行清化熱化勝復同邪氣化度也雲化五風化三寒化一正化度也委和之紀曰上宫與正宫同諸同正嵗化運行同天此言天地之平也嵗物所宜則鱗蟲育倮蟲靜地氣所制則羽蟲耗熱毒不生故有餘宜髙不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之間榖命太徵太商者蓋土為天氣土勝水天氣盈宜取化源以平土氣益其嵗氣無使邪勝食黅玄之榖以全其真食間氣之榖以保其精以苦燥之溫之甚者發之泄之不發不泄則濕氣外溢肉潰皮拆而水血交流必贊其陽火令禦甚寒從氣之異少其判也歲半之前天氣太陰主之太陰所至其令濕淫所勝則沉陰旦布陰雨變枯稿胕腫骨痛陰痺者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本于腎診在足太溪之脈法宜以苦燥之以淡泄之歲半以後地氣太陽主之太陽所至其令寒淫于內則凝肅慘栗民病少腹控皋引腰脊上衝心痛血見嗌痛頷腫法宜治以甘熱佐以苦辛以醎瀉之以辛潤之以苦堅之歲木不及是謂勝生生氣不政化氣乃揚長氣自平收令乃早涼雨時降風雲並興草木晚榮蒼乾凋落物秀而實膚肉內充其氣斂其用聚其化兼所不勝春有鳴條律暢之化則秋有霧露清涼之政春有慘悽殘賊之勝則夏有炎暑燔爍之復其眚東其病內舍胠脅外在關節復則炎暑流火民病寒熱瘡瘍痱疹癰痤法宜調以辛溫初之氣自丙午年大寒日亥初至是歲春分日午初凡六十日八十七刻半主位少角木客氣厥陰木中見木運歲木當其位地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相薄雨乃後民病血溢筋絡拘強關節不利身重筋痿宜調厥陰之客以辛補之以酸瀉之以甘緩之歲榖宜黅間穀宜稻則風不為邪是氣也司氣以溫用溫無犯二之氣自春分日酉正至小滿日未正凡六十日有竒主位太徵火客氣少陰當位大火正物承化民乃和其病溫厲盛逺近咸若濕蒸相摶雨乃時降宜調少陰之客以醎補之以甘瀉之以酸收之嵗穀宜黅間穀宜豆則熱不為邪三之氣自小滿日申初至大暑日午初凡六十日有竒主位太徵火客氣太陰土中見木運木生火火生土其化順天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿宜治太陰之客以甘補之以苦瀉之以甘緩之歲榖宜黅間榖宜麻雖有濕邪不能為害四之氣自大暑日午正至秋分日辰正凡六十日有竒主位太宫土客氣少陽火中見木運地氣交司畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相薄草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以醎補之以甘瀉之以醎耎之歲榖宜玄間榖宜豆雖有火邪不能為害五之氣自秋分日巳初至小雪日卯初凡六十日有竒主位少商金客氣陽明金中見木運金氣得位慘令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠宜治陽明之客以酸補之以辛㵼之以苦泄之歲榖宜玄間榖宜黍則燥不為邪終之氣自小雪日卯正至大寒日丑正凡六十日有竒主位少羽水客氣太陽水中見木運水當其位寒大舉濕大化霜乃凝水堅氷陽光不治感於寒則病人關節禁固腰脽痛寒濕持於氣交而為病也宜調太陽之客以苦補之以鹹瀉之以苦堅之以辛潤之嵗榖宜玄間榖宜稷則寒不為邪此六氣之化也嵗運之交天氣勝則有厥隂之復地氣勝則有太隂之復觀其氣至而治之無翼其勝無贊其復溫者清之濕者燥之此其道也少陽相火司天厥陰風木在泉中見太徵火運嵗火太過氣化運行先天太徵上臨少陽大過而同天化是謂天符之氣平也火氣適平命曰升明之紀正陽而治德施周普五化均衡其氣髙其性速其用燔灼其化蕃茂其政明曜其候炎暑其令熱其類火其應夏其榖麥其果杏其實絡其蟲羽其畜馬其色赤其味苦其物脈其音徵其數七其在人也其臟心其主舌其養血其病瞤瘛此歲運之化也天地之氣火化在上左清化右柔化故天氣正而其政嚴酸化在下左灼化右藏化故地氣擾而其令撓風乃暴舉木偃沙飛炎火乃流陰行陽化雨乃時應火木同德上應熒惑歲星其榖丹蒼清化九火化七風化三正化度也羽蟲靜毛蟲育歲物所宜也倮蟲耗濕毒不生地氣制之也歲半之前天氣主之其氣少陽相火其令暄者少陽之政也歲半之後地氣主之其氣厥陰風木其令風者厥陰之化也風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起民病寒中外發瘡瘍內為泄滿聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變是歲陽為天氣陰為地氣風火相值其氣專其化淳又遇火運統之運與天符火化升明天氣盈先取化源抑其運火贊其金氣則暴過不生苛疾不起嵗宜醎宜辛宜酸滲之泄之漬之發之運同風熱宜多寒化其化上醎寒中甘和下辛涼藥食宜也初之氣自丁未年大寒日寅初至是年春分日子初凡六十日八十七刻半主位少角木客氣少陰火中見火運氣與運同君火不司氣化地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣怫于上血溢目赤咳逆頭痛脅滿膚腠中瘡宜調少陰之客以醎補之以苦瀉之以酸收之歲榖宜丹間榖宜豆則熱不為邪二之氣自春分日子正至小滿日戌正凡六十日有竒主位太徵火客氣太陰土中見火運濕氣所客火反鬱白埃四起雲趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡宜調太陽之客以甘補之以苦瀉之以甘緩之歲榖宜丹間榖宜麻則濕不為邪三之氣自小滿日亥初至大暑日酉初凡六十日有竒主位太徴火客氣少陽火中見火運氣符於天而天政布炎暑至少陽臨上雨乃涯民病熱中聾瞑血溢膿瘡咳嘔鼽衄渴嚏欠喉痺目赤善暴死歲火既平其邪乃微宜調少陽之客以醎補之以酸耎之歲榖宜丹間榖宜豆則火不為邪是氣也用熱逺熱無犯司氣之熱四之氣自大暑日酉正至秋分日未正凡六十日有竒主位少宫土客氣陽明金中見火運土生金涼乃至炎暑間化白露降民氣和平其病滿身重宜調陽明之客以酸補之以辛㵼之以苦泄之歲榖宜蒼間榖宜稷則燥不為邪五之氣自秋分日申初至小雪日午初凡六十日有竒主位太商金客氣太陽水中見火運火勝金水制之陽乃去寒乃降氣門乃閉剛木早凋民病寒邪君子周密宜調太陽之客以苦補之以鹹瀉之以苦堅之以辛潤之嵗穀宜蒼間穀宜稷則寒不為邪終之氣自小雪日午正至大寒日辰正凡六十日有竒主位少羽水客氣厥隂木中見火運水生木地氣正風乃至萬物反生霧霿以行其病關閉不禁心痛陽氣不藏而咳宜治厥隂之客以辛補之以酸瀉之以甘緩之嵗穀宜蒼間穀宜稻則風不為邪此六氣之化也嵗氣天符為執法若有邪氣則民有卒急之病所謂邪中執法者民病速而危也陽明燥金司天少陰君火在泉中見少宫土運歲土不及氣化運行後天燥化在上左藏化右明化天氣急而其政切苦化在下左黅化右動化地氣明而其令暴陽專其令炎暑盛行物燥以堅淳風乃治風燥橫運流於氣交多陽少陰雲趨雨府濕化乃敷燥極而澤其為氣也清熱之氣持於氣交風化清化氣勝復同所謂邪氣化度也清化九雨化五熱化七運是謂正化度也金火合德上應太白熒惑其榖白丹間榖命太徵者歲物所宜則羽蟲育地氣所制則介蟲耗寒毒不生其耗白甲品羽蟄蟲乃見流水不氷民病咳嗌塞寒熱發暴振栗癃閟清先而徑毛蟲乃死熱後而暴介蟲乃殃然金為天氣火為地氣火能勝金土運間之其邪乃微天氣虛宜資化源以助金氣兼安其運土無使受邪食白丹之榖以安其氣食間氣之榖以去其邪歲宜以醎以苦以辛汗之漬散之運同天氣宜多地化治之常也嵗半之前天氣陽明主之熱淫所勝木乃晚榮草乃晚生民病左胠脅痛寒清于中感而瘧大涼革候咳腹中鳴注泄騖溏心脅暴痛嗌乾面塵腰痛目昧眥瘍瘡痤癰病本於肝診在足太衝之脈法宜平以苦甘佐以酸辛以苦下之歲半之後地氣少隂主之熱淫于內則熖浮川澤陰處反明蟄蟲不藏民病腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛䪼腫惡寒發熱如瘧小腹中痛腹大法宜治以醎寒佐以甘苦以酸收之以苦發之歲運之化土不及紀曰卑監是謂減化化氣不令生政獨彰長氣整雨乃愆收氣平風寒並興草木榮美秀而不實成而粃也其氣散其用靜定其化兼所不勝四維有埃雲潤澤之化則春有鳴條鼓折之政四維發振拉飄騰之變則秋有肅殺霖霪之復其眚四維其藏脾其病內舍心腹外在肌肉四肢復則收政嚴峻名木蒼凋蒼榖乃損胸脅暴痛下引少腹善太息氣客於脾食少失味治宜以甘和調中初之氣自戊申年大寒日巳初至是歲春分日卯初凡六十日八十七刻半主位少角木客氣太陰土中見土運氣與運同風不勝濕地氣遷陰始凝氣始肅水乃氷寒雨化其病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋宜治太陰之客以甘補之以苦瀉之以甘緩之歲榖宜白間榖宜麻雖有熱邪不能為害是氣也司氣以涼用涼無犯二之氣自春分日卯正至小滿日丑正凡六十日有竒主位太徵火客氣少陽火中見土運二火同治陽乃布民乃舒物乃生榮厲大至民善暴死宜治少陽之客以醎補之以甘瀉之以醎耎之歲榖宜白間榖宜豆雖有火邪不能為害三之氣自小滿日寅初至大暑日子初凡六十日有竒主位太徵火客氣陽明金中見土運火土金相生天政布涼乃行燥熱交合燥極而澤民病寒熱宜治陽明之客以酸補之以辛瀉之以苦泄之歲榖宜白間榖宜黍雖有燥邪不能為害四之氣自大暑日子正至秋分日戌正凡六十日有竒主位少宫土客氣太陽水中見土運運土得位太陽居之寒雨降民病暴仆振栗譫妄少氣嗌乾引飲急心痛宜治太陽之客以苦補之以鹹㵼之嵗榖宜丹間榖宜稷則寒邪不為害五之氣自秋分日亥初至小雪日酉初凡六十日有竒主位太商金客氣厥隂木中見土運客氣勝運春令反行宜治厥隂之客以辛補之以甘緩之嵗榖宜丹間榖宜稻則風邪不為害終之氣自小雪日酉正至大寒日未正凡六十日有竒主位少羽水客氣少隂火中見土運火土相得陽氣布其病溫宜治少隂之客以鹹補之以酸收之嵗榖宜丹間榖宜豆則熱邪不為害六氣之常也天氣勝則少陽復地氣勝則太陽復治各以其勝復法太陽寒水司天太陰濕土在泉中見太商金運歲金太過氣化運行先天天地之氣寒化在上左動化右素化故天政所布其氣肅甘化在下左明化右灼化故地氣靜而其令徐寒臨太虛陽氣不令寒政大舉澤無陽熖則火發待時少陽中治時雨乃涯止極雨散還於太陰雲朝北極濕化乃布澤流萬物寒敷於上雷動於下水土合德上應辰星鎮星其榖玄黅歲氣之化寒化一清化九雨化五正化度也倮蟲育歲物所宜也鱗蟲耗燥毒不生地氣制之也寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡瀉血溢是嵗水為天氣土為地氣中見金運土能勝水天化為虛金運統之土生金金生水以下生上其化不純天化雖虛氣運相生其邪乃微宜於九月先資化源以助天氣之虛抑其運金扶其木氣無使暴過而生其疾食玄黅之榖以全其真避虛邪之氣以安其政歲宜以苦熱調上以甘熱調下以辛溫調中運同寒濕以燥熱化治之常也淫勝之氣歲半之前天氣太陽主之若寒淫所勝則寒氣反至水且氷血變於中發為癰瘍民病厥心痛嘔血血泄鼽衄善悲時眩仆運火炎烈雨暴乃雹胸腹滿手熱肘攣腋腫心淡淡大動胸脅胃脘面赤目黃善噫嗌乾甚則色炲渴而欲飲病本於心診在手神門之脈法宜平以辛熱佐以甘苦以醎㵼之歲半之後地氣太隂主之若濕淫於內則埃昏巗谷黃反見黑至隂之交民病飲積心痛耳聾嗌腫喉痺隂病血見少腹痛腫不得小便病衝頭痛目項腰髀膕腨皆痛宜治以苦熱佐以酸淡以苦燥之以淡泄之運之化金太過紀曰堅成是謂收引天氣潔地氣明陽氣隨隂始化燥行其政物以司成收氣繁布化洽不終其化成其氣削其政肅其令鋭切其德霧露蕭飋其動暴折瘍疰其病喘渴胸仰息其化兼其所勝故經曰歲金太過燥氣流行肝木受邪民病兩脅下少腹痛目赤痛眥瘍耳無所聞肅殺乃甚則體重煩寃胸痛引背兩脅滿且痛引少腹甚則喘咳逆氣肩背痛下連股膝間髀腨胻足皆病收氣峻生氣下草木斂蒼凋隕心脅暴痛不可反側咳逆甚而血溢診在足太衝之脈其治宜辛溫調中初之氣自己酉年大寒日申初至是歲春分日午初凡六十日八十七刻半主位少角木客氣少陽火中見金運客氣勝運地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍宜治少陽之客以醎補之以甘瀉之以醎耎之歲榖宜玄間榖宜豆雖有火邪不能為害二之氣自春分日酉正至小滿日辰正凡六十日有竒主位太徵火客氣陽明金中見金運氣與運同大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜治陽明之客以酸補之以辛瀉之以苦泄之歲榖宜玄間榖宜黍雖有燥邪不能為害是氣也無犯司氣之涼三之氣自小滿日巳初至大暑日卯初凡六十日有竒主位太徵火客氣太陽水中見金運水勝火天政布寒乃行雨乃降民病寒反熱中癰疽注下心熱瞀悶宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歲榖宜玄間榖宜稷雖有寒邪不能為害四之氣自大暑日卯正至秋分日丑正凡六十日有竒主位少宫土客氣厥陰木中見金運木勝土金反制之人遇太陰交司風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白宜治以厥陰之客以辛補之以醎瀉之以甘緩之歲榖宜黅間榖宜稻雖有風邪不能為害五之氣自秋分日寅初至小雪日子初凡六十日有竒主位太商金客氣少陰火中見金運歲運得位客氣勝之陽復化草乃長乃化乃成民乃舒宜調少陽之客以醎補之以甘瀉之以酸收之歲榖宜黅間榖宜豆雖有熱化不能為邪終之氣自小雪日子正至大寒日戌正凡六十日有竒主位太羽水客氣太陰土中見金運土生金金生水其化順地氣正濕令行陰凝太虛埃昏郊野民乃慘悽寒風以至反者孕乃死宜治太陰之客以甘補之以苦瀉之以甘緩之歲榖宜黅間榖宜麻雖有濕邪不能為害六氣之化也是歲天氣勝者太陰復之地氣勝者厥陰復之其治皆如復氣之法濕者燥之溫者清之無翼其勝無贊其復此其道也厥陰風木司天少陽相火在泉中見少羽水運歲水不及氣化運行後天風化在上左灼化右玄化故天氣擾而其政撓苦化在下左清化右柔化故地氣正而其令速風生髙逺炎熱從之雲趣雨府濕化乃行風火同德上應歲星熒惑其榖蒼丹間榖言太商者其耗文角品羽風燥火熱勝復更作風病行於上熱病行於下風燥勝復邪氣化形于中雨化風化勝復邪氣化度也風化三寒化一火化七正化度也其在物則毛蟲靜羽蟲育是謂歲物所宜介蟲耗寒毒不生是謂地氣所制然歲氣升降天氣為陽而其化虛地氣為陰而其化盈當資化源以助司天之木氣化源雖虛水運在中水能生木邪乃微也必贊歲運之水扶其不足調上用辛調下用醎畏火之氣甚無妄犯歲半之前厥陰為主若風淫所勝則太虛埃昏雲物以擾寒生春氣流水不氷民病胃脘當心而痛上肢兩脅膈咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉病本于脾診在足衝陽之脈其法平以辛涼佐以苦甘以甘緩之以酸瀉之歲半之後少陽主之火淫所勝則熖明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便其法治以醎冷佐以苦辛以酸收之以苦發之是歲水運不及紀曰涸流是謂反陽藏令不舉化氣乃昌長氣宣布蟄蟲不藏土潤水泉減草木條茂榮秀滿盛其氣滯其用滲泄其動堅止其法燥稿其果棗杏其實濡肉其榖黍稷其味甘醎其色黅玄其畜彘牛其蟲鱗倮其主埃鬱昏翳其聲羽宫其在人也病為痿厥堅下從土化也病為癃閟邪傷腎也法宜以苦和調之也初之氣自庚戌年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位少角木客氣陽明金中見水運金勝木水運間之寒始肅殺氣方至民病寒於右之下宜治陽明之客以酸補之以辛瀉之以苦泄之歲榖宜蒼間榖宜黍二之氣自春分日酉正至小滿日未正凡六十日有竒主位太徵火客氣太陽水中見水運氣與運同寒不去華雪水氷殺氣施行霜乃降名草上焦寒雨數至陽復化民病熱於中宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歲榖宜蒼間榖宜稷是氣也慎無犯寒三之氣自小滿日申初至大暑日午初凡六十日有竒主位太徵火客氣厥陰木中見木運天政布風乃時舉民病泣出耳鳴掉眩宜治厥陰之客以辛補之以酸瀉之以甘緩之歲榖宜蒼間榖宜稻四之氣自大暑日午正至秋分日辰正凡六十日有竒主位少宫土客氣少陰火中見水運溽暑濕熱相薄爭於左之上民病黃疸而為胕腫宜治少陰之客以醎補之以甘瀉之以酸收之歲榖宜丹間榖宜豆五之氣自秋分日巳初至小雪日卯初凡六十日有竒主位太商金客氣太陰土中見水運燥濕更勝沉陰乃布寒氣及體風雨乃行宜治太陰之客以甘補之以苦瀉之以甘緩之歲榖宜丹間榖宜麻終之氣自小雪日卯正至大寒日丑正凡六十日有竒主位少羽水客氣少陽火中見水運畏火司令陽乃大化蟄蟲出見流水不氷地氣大發草乃生人乃舒其病溫厲宜治少陽之客以醎補之以甘瀉之以醎耎之歲榖宜丹間榖宜豆此六氣之化也歲氣之交司天氣勝則陽明復之在泉氣勝則太陽復之治勝復者各以其法少陰君火司天陽明燥金在泉中見太角木運嵗木太過氣化運行先天君火在上左太隂右厥陰燥金在下左太陽右少陽故天政所布其氣明地氣肅而其令切寒交暑熱加燥雲馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其榖丹白熱化二風化八清化四正化度也羽蟲靜介蟲育歲物之宜也毛蟲耗濕毒不生地氣制之也寒熱之氣持於氣交而為病始熱病生於上清病生於下寒熱相犯而爭於中則民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上是歲火為天氣金為地氣木運在中火勝金木生火天氣盈宜先取化火之化源必抑其運木資其歲勝無使暴過而生其病食白丹之榖以全真氣食間氣之榖以辟虛邪歲宜醎以耎之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之運同天氣宜以寒清化其化上醎寒中酸涼下酸溫藥食宜也歲半之前熱化主之熱淫所勝則怫熱至火行其政民病胸中煩熱嗌乾右怯滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩背臂腨及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本于肺診在手尺澤之脈法宜平以醎寒佐以苦甘以酸收之歲半之後燥化主之燥淫所勝則霿霧清暝民病喜嘔嘔有苦善太息心脅痛不能久側甚則嗌乾面塵身無膏澤足外反熱法宜治以苦溫佐以甘辛以苦下之歲運之化紀曰發生是謂啓陳土踈泄蒼氣逹陽和布化陰氣乃隨生氣淳化萬物以榮其化生其氣美其政散其令條舒其動掉眩巔疾其德鳴靡啓折其變振拉摧拔其化兼其所勝其病怒上微則其氣逆其病吐利故曰歲木太過風氣流行脾土受邪民病餐泄食減體重煩寃腸鳴腹痛滿甚則忽忽善怒眩冒癲疾化氣不正生氣獨治雲物飛動草木不寧甚而搖落反脅痛而吐甚診在足衝陽之脈味宜以酸涼調之也初之氣自辛亥年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位太角木客氣太陽水中見木運地氣遷燥將去寒乃始蟄復藏水乃氷霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜調太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歲榖宜丹間榖宜稷則寒氣不能為害二之氣自春分日子正至小滿日戌正凡六十日有竒主位少徴火客氣厥陰木中見木運氣與運同是謂司氣陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱宜調厥陰之客以辛補之以酸瀉之以甘緩之歲榖宜丹間榖宜稻則風邪不能害是氣也旡犯司氣之溫三之氣自小滿日亥初至大暑日酉初凡六十日有竒主位少徴火客氣少陰火中見木運木生火火當其位天政布大火行庶類蕃鮮寒氣時至民病氣厥痛寒熱更作咳逆目赤宜治少陰之客以醎補之以甘瀉之以酸收之歲榖宜丹問榖宜豆則熱邪不能為害四之氣自大暑日酉正至秋分日未正凡六十日有竒主位太宫土客氣太陰土中見木運土居其位溽暑至大雨時行寒熱反至民病寒熱嗌乾黃疸鼽衄飲發宜調太陰之客以甘補之以苦瀉之以甘緩之歲榖宜白間榖宜麻則濕氣不能為害五之氣自秋分日申初至小雪日午初凡六十日有竒主位少商金客氣少陽火中見木運木生火畏火臨暑反至陽乃化萬物乃生乃長榮民乃康其病溫宜治少陽之客以醎補之以甘瀉之以醎耎之歲榖宜白間榖宜豆雖有火氣不能為害終之氣自小雪日午正至大寒日辰正凡六十日有竒主位太羽水客氣陽明金中見木運金勝木燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連少腹作寒中地將易也宜治陽明之客以酸補之以辛㵼之以苦泄之嵗榖宜白間榖宜黍則燥氣不能為害嵗氣之交天氣勝則太陽復之地氣勝則少陽復之觀其氣至以法為治熱者寒之寒者熱之清者溫之無翼其勝無贊其復此治之大體也太陰濕土司天太陽寒水在泉中見少徴火運歲火不及氣化運行後天太陰在上左少陽右少隂故地氣上騰隂專政而其政肅太陽在下左厥陰右陽明故天氣下降陽氣退辟而其令寂大風時起原野昏霧白埃四起雲奔南極寒雨數至物成於差夏濕寒合德黃黑埃昏流行氣交上應鎮星辰星其榖黅玄間榖命太角之榖寒化雨化脫復同是謂邪氣化度也雨化五火化二寒化六是謂正化度也隂凝於上寒積於下寒水勝火則為氷雹陽光不治殺氣乃行倮蟲靜鱗蟲育是謂歲物所宜羽蟲耗熱毒不生是謂地氣所制有餘宜髙不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之其病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急是歲濕土在上寒水在下土能制水天氣盈地氣虛宜取化源以平土氣益其歲氣使無邪勝食黅玄之榖以全其真食間氣之榖以保其精歲宜以苦燥之溫之甚者發之泄之不發不泄則濕氣外溢肉潰皮拆而水血交流必贊其陽火令禦甚寒運異寒濕燥熱宜少故藥食之宜其化上苦溫中醎溫下甘熱歲半之前太陰主之濕淫所勝沉陰旦布雨變枯稿民病胕腫骨痛陰痺陰痺者按之不得腰脊頭項痛時眩大便難隂氣不用飢不欲食咳嗽則有血心如懸病本於腎診在足太溪當平以苦熱佐以酸辛以苦燥之以淡泄之歲半之後太陽主之寒淫於內凝肅慘栗民病少腹控皋引腰脊上衝心痛血見嗌痛頷腫宜治以甘熱佐以苦辛以醎瀉之以辛潤之以苦堅之運火不及命曰伏明之紀是謂勝長長氣不宣藏氣反布收氣自政化令乃衡寒清數舉暑令乃薄承化物生生而不長成實而稚遇化已老陽氣屈伏蟄蟲早藏其氣鬱其用暴其動彰伏變易其發痛其病昏惑悲忘其化兼其所不勝夏有炳明光顯之化則冬有嚴肅霜寒之政若夏有慘悽凝冽之勝則不時有埃昏大雨之復其眚南其藏心其病內舍膺脅外在經絡故曰歲火不及寒乃盛行長政不用物榮而下凝慘而甚則陽氣不化乃折榮美民病胸中痛脅肢滿兩脅痛膺背肩脾間及兩臂內痛甚則屈不能伸髖髀如别復則埃鬱大雨且至黑氣乃溽民病注泄其法悉以醎溫調中初之氣自壬子年大寒日巳初至是歲春分日卯初凡六十日八十七刻半主位太角木客氣厥陰木中見火運風木得位地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相摶雨乃後民病血溢筋絡拘強關節不利身重筋痿宜調厥陰之客以辛補之以酸瀉之以甘緩之歲榖宜黅間榖宜稻則風不為邪二之氣自春分日卯正至小滿日丑正凡六十日有竒主位少徵火客氣少陰火中見火運君火自居其位不司氣化是謂灼化大火正物承化民乃和其病溫厲勝行逺近咸若濕蒸相摶雨乃時降宜調少陰之客以醎補之以甘瀉之以酸收之歲榖宜黅間榖宜豆則熱不為邪三之氣自小滿日寅初至大暑日子初凡六十日有竒主位少徵火客氣太陰土中見火運歲火當位濕化鬱之天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿宜治太陰之客以甘補之以苦泄之以甘緩之歲榖宜黅間榖宜麻則濕不為邪四之氣自大暑日子正至秋分日戌正凡六十日有竒主位太宫土客氣少陽火中見火運氣與運同畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相摶草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以醎補之以甘瀉之以醎耎之歲榖宜玄間榖宜豆則火不為邪是氣也無犯司氣之熱五之氣自秋分日亥初至小雪日酉初凡六十日有竒主位少商金客氣陽明金中見火運氣與運同燥令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠宜調陽明之客以酸補之以辛瀉之以苦泄之歲榖宜玄間榖宜黍則燥不為邪終之氣自小雪日酉正至大寒日未正凡六十日有竒主位太羽水客氣太陽水中見火運水當其位而能勝火寒火與濕火化霜乃降陰乃凝水堅氷陽光不治感於寒則病人關節禁固腰脽痛持於氣交而為疾也宜調太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歲榖宜玄間榖宜稷則寒不為邪此六氣之節也氣交之化天氣勝者則有厥陰之復地氣勝者則有太陰之復各以其勝復法治之普濟方卷十一
