body:
  text: 普濟方卷一百九十九明周王朱橚撰諸瘧門山嵐瘴氣瘧附論夫傳言瘴者山川癘毒之氣又云江山霧氣多瘴凡以其氣欝蒸而然也論家方論治瘴之法不一或謂其證與傷寒相類有在表可汗者有在裏可下者有在膈可吐者又或以治瘧之法治之者今廣南山川地形瘴氣所生之因及春夏之交瘴氣所起之時與夫人染瘴氣而治法悉著於篇庶可考焉且陽生於子盛於已陰生於午盛於亥陽不極則隂不萌陰不極則陽不芽而廣南位當己午則陽之氣藴積於此可知矣天不滿西北地不滿東南西北土地髙厚東南土地卑下而廣南屬東南則土地之卑下可知矣以其卑下而陰陽二氣之所藴積是以四圍之山崇髙回環百川之水悉所歸赴及秋草木不凋瘁當冬蟄蟲不伏藏寒熱之毒藴積不散霧露之氣易以傷害此正岐伯所謂南方其地下水土弱霧露之所聚者也故瘴氣獨盛於廣南然瘴氣所起其名有二孟夏之時瘴名芳草而終於秋孟冬之時瘴名黄芒而終於辰四時皆能傷人而七八月之間山嵐煙霧蛇􅚣欝毒之氣尤甚故當是時瘴疾大作不論老壯或因饑飽過傷或因榮衛虚弱或衝煩霧或涉溪澗但呼吸斯氣皆成瘴疾其狀頭疼體痛胷膈煩滿寒熱徃來欬逆多痰全不思食發渇引飲或身黄腫脹眉鬚脱落是皆毒癘欝蒸所致夫生於陵者安於陵其土人宜無所受且日食㯽榔盖㯽榔之為性破堅毒除藴積故耳治法當以磁石下收其陰次以丹砂上正其陽陰陽氣正中滿自消然後以㯽榔解其餘藴瘴與瘧分作兩名其實一致或先寒後熱或先熱後寒嶺南率稱為瘴江北總號為瘧此由方言不同非是别有異病然南方温毒此病尤甚原其所歸大畧有四一山溪毒氣二風温痰飲三加之鬼癘四發以熱毒在此之中熱毒最重故所用藥物須審病源患瘧瘴之後但是防瘴而發痢死不旋踵所以然者瘴體先虚虚不宜痢又瘴宜冷差痢宜温斷斷痢則益瘴斷瘴則益痢大率如此不可不慎非直藥療亦須宜加將息取適若能一色藥兼二種病冷而止痢温而斷瘧最其妙也如不然先須斷痢然後療瘴瘴緩痢急故也仍變而作挾毒防之不得專醫其痢又服瘴藥皆在發前必須平旦空腹服藥之後勿洗手靣潄口勿通外勿喫食勿勞力既過發時久小進糜粥如此將療無不即斷又當發熱之時慎勿多飲冷水及多服冷藥若心下冷結更是難療得瘧之後復癥癖亦有即發氣者死不𠻳若熱渇者䜴汁煖服取其得吐彌善水煮豉併犀汁與服兼時進生葛根汁其大熱盛者與紫雪如兩棗許大水和飲之并燒猪糞作黄龍湯亦善各可服三二升又搗大䑕絞汁與服大止熱毒瘴熱病服此俱効其䑕并頭皮五臟等全搗若汁少著少許水和絞亦不難服常用立驗也方大五補湯出千金方治時行後變成瘴瘧桂心三十銖逺志桔梗芎藭各三兩茯苓乾地黄芍藥人參白术當歸黄耆甘草各三兩竹葉五兩大棗二十枚生枸杞根生薑各一斤半夏麥門冬各一升右㕮咀以水三斗煮竹葉枸杞取二斗次内諸藥煎取六升分六服一日一夜令盡白微湯治瘴瘧經百日或一年者白微蜀漆葉各半兩常山一兩知母切焙半兩大黄生一兩鼈甲去裙襴醋炙黄三分甘草炙剉苦參升麻半兩石膏碎三分豉一合蒜獨顆者三枝切淡竹葉切三兩龍膽黄芩去黑心各半兩赤茯苓去黒皮三分右剉如麻豆大每服三錢水一盞酒半盞同煎至一盞去滓未發前温一服發時一服仍以藥敷塗手靣良白术丸治瘴瘧白术丹砂研麝香研丁香訶梨勒皮安息香入胡桃同研檀香蓽撥犀角鎊各半兩薰陸香蘇合香龍腦研各一分莎草根石膏木香各半兩右為末煉蜜丸如梧桐子大毎服十丸空腹井華水下老人小兒三丸仍用紗絹袋盛帶於臂辟鬼氣臘月合以新瓷器盛勿令泄氣治山瘴瘧寒熱頭疼方出聖惠方恒山半兩烏梅肉七枚㣲炒䜴心半兩桃枝一支柳枝半兩鼈甲半兩塗醋炙令黄去裙襴虎頭骨半兩塗醋炙令黄乾棗三枚青銅錢一文雄䑕糞二七枚右細剉以酒一大盞半浸一宿明旦以重湯煮十餘沸去滓分為三服空心一服良久再服欲發時一服麝香散治瘴瘧麝香研一錢鼈甲去裙襴醋炙黄半兩丹砂研二分甘草炙半兩大黄炒三分恒山一兩右為散毎服三錢未發前温酒調下臨發更一服木香丸出直指方治瘴㯽榔鷄心者陳橘皮湯浸去白焙各二兩木香人參附子大者炮裂去皮臍厚朴去麄皮姜汁炙桂去麄皮羗活去蘆荆三稜炮獨活去蘆乾薑炮甘草炙剉芎藭天雄剉炒芍藥各半兩牽牛子一斤搗取末四兩肉荳䓻大枚去殻右為末瓷器盛密封臨服再用牽牛末二兩同研令勻煉蜜為丸如梧桐子大心腹脹滿一切風勞冷氣臍下刺痛口吐清水白沫醋心痰癖氣塊男子腎臟風毒攻刺四肢及陽毒脚氣目昬頭痛嘔逆及兩脇堅滿臨卧橘皮湯下三十丸以利為度婦女血痢下血刺痛積年血塊胃逆手足心煩熱不思飲食生姜湯下三十丸取利小兒五嵗以上疳氣腹脹氣喘燈心温湯下五七丸小者减丸數服凡胸腹飽悶不消脾泄不止臨卧温酒下取利食毒癰疽發背山嵐瘴氣纔覺頭痛背膊拘急即早宜服之快利為度常服可以不染瘴疾凡瘴疾皆因脾胃實熱所致常以凉藥解膈上壅熱并以此藥通利彌善此藥本治嵐瘴及瘟瘧大効以快利為度菖蒲散治瘴氣久治不瘥者菖蒲乾者白术剉炒蒼术剉焙梔子仁荆芥穂芎藭各一兩甘草炙剉乾薄荷側栢炒黄色消石研吳茱萸湯浸洗焙乾各半兩右為散用薄荷煎湯調下二錢如患熱疾水一盞入姜五片棗二枚擘破煎至五七分温服十補丸治瘴氣虚弱靣色萎黄不思飲食或困或醒心腹脹滿痞氣耳鳴補元氣巴㦸去心肉蓯蓉酒浸切焙白术米泔浸一宿切焙五加皮剉炒石斛去根各一兩鹿茸去毛酥炙半兩人參莵絲子酒浸一宿别搗栢子仁研菊花各三兩右等分為末煉蜜為丸如梧桐子大毎服二十丸空臨卧温酒下鹽湯亦得茵蔯蒿丸出聖惠方治瘴疫時氣温黄若嶺表行此藥常帶隨身茵蔯蒿四兩大黄五兩䜴五合熬恒山梔子仁熬芒硝研杏仁去皮尖雙仁炒研各三分鼈甲去裙襴醋浸炙二兩巴豆半兩去皮心熬别研去油右為末煉蜜丸如梧桐子大初得時氣三日以粥飲旦服五丸至半時許或吐或利或汗為効如不吐利不汗更服一二丸即以熱飲投老小加减凡黄病痰癖時氣傷寒瘧痢小兒熱欲發癎服之瘥治瘴氣尤妙一方無大黄有麻仁露宿湯恒山炒一兩秦芄去苗土梔子仁柴胡青蒿子㯽榔生剉甘草炙剉各半兩桂去麄皮一分右麄搗篩毎服三錢水三盞入烏梅二枚黒豆二十粒煎至一盞去滓露一宿五更初再温服其滓再入水二盞煎至一鍾去滓當夜臨卧時服却毒散出十便良方治山嵐瘴氣有黒霧起處急服麻黄去根節蜀椒去目并合口炒出汗各一兩烏頭炒去皮臍白术各半兩防風去叉一兩桔梗炒桂去麄皮各半兩乾姜炒一分右為散毎服一盞温酒調下毎日食前常服一云嵐者嶺南青草黄芒瘴狀如嶺北傷寒也南地煖故大陰時草木不黄而落伏蟄不閉而藏其虫因煖而生則仲夏有青黄瘴孟冬有黄芒瘴彼人失醫多成疸疾即為難治嶺南之人得之亦如傷寒狀頭疼一日三日以上在於皮膚前汗可愈五日以上結於臟腑身重而節痛當下之得愈即不可先下下之亦為難療其或不解則春秋作瘧痢而肌膚黄瘦可服此方烏藥湯治瘴氣烏梅剉焙一斤半夏半斤生姜絞汁浸二宿焙乾桂去粗皮一兩馬鞭草焙半斤荆芥穗陳橘皮去白焙乾各四兩甘草四兩右搗篩毎服二錢水一盞入生姜五片煎七分去滓不拘時候温服丹砂丸治山嵐氣安心臟丹砂研半兩阿魏一分米泔浸令軟研以醋為糊用白术人參白茯苓去皮當歸切焙各半兩右搗研五味為末用阿魏醋煮麵糊丸如梧桐子大如當發空心温酒嚼下七丸遇患者空心桃仁湯嚼下十丸㯽榔湯亦得秦芄湯治山嵐瘴氣如瘧秦芄去苖土柴胡去苗各半兩恒山二分烏梅肉三枚糯米一撮右剉如麻豆水三盞煎至一盞半去滓分二温服未發前服之取吐利常山飲治山嵐瘴靣黄力劣寒熱徃來心胷煩悶常山二兩乾漆炒煙出三兩甘草炙剉一兩豉生用一合右搗篩毎服五錢水一盞半煎八分去滓空心温服吐黄痰出効豫固丸治嶺南諸瘴丹砂雄黄各一兩並水飛過令乾鬼臼半兩為末阿魏一分法酒半升熬成膏右再研勻阿魏膏和丸如鷄頭大緋絹袋貯十丸常執手中頻嗅瘴氣内行不着人遇瘴者井華水嚼下三丸五服差香椿散治瘴氣惡心四肢疼痛口吐酸水不思飲食憎寒壯熱發過引飲二廣七閩多山嵐煙霧蛇虺欝毒之氣當秋七八月之間芒華發時此疾大作謂之黄芒瘴又謂黄茅瘴是也盖人或因饑飽或因虚怯或衝煙霧或涉溪澗遂得此疾謂之黒脚瘴蝦蟇瘴啞瘴其名不一並皆療之香椿嫩酒浸焙三兩甘草炙南壁土向日者臘茶各一兩右為散每服二錢用酒調下如患久者更加甘遂柴胡各半兩空心臨卧服煮豆丸治嵐瘴白术貫衆去土蒼术去皮甘草炙等分右為末煉蜜丸如彈子大每一丸先用黒豆一盞銚子内鋪靣令平於豆中心安藥丸添水髙豆一指許慢火煮水乾取豆暴乾以絹袋盛豆毎服二十粒新水下有瘴處空心一服如涉逺遇饑新水下五十粒至一百粒麄可充餒炒桃仁出余居士選竒方治山嵐氣預辟瘴癘桃仁一斤吳茱萸青鹽各四兩右為一處鍋内炒候桃仁熟為度以瓷缾貯密封一七日後取出來茱茰并鹽只將桃仁去皮尖以新缾子盛時嚼一二十枚大辟山嵐毒氣一方毎日空心服七粒爛嚼茶湯潤下或喫酒食前後一兩粒甚妙治山瘴瘧乍寒乍熱乍有乍無出聖惠方鯪鯉甲十四枚㣲炙鼈甲一兩塗醋炙令黄去裙襴柴胡一兩去苗恒山二兩虎頭骨一兩塗醋炙㣲黄桃仁一兩湯浸去皮尖右細剉以酒三盞浸一宿發前稍稍煖飲之勿絶鯪鯉甲酒出聖惠方治山瘴瘧南方山嶺瘴氣令人寒熱發作無時萎黄腫滿四肢痺弱鯪鯉甲炙五枚鼈甲去裙襴醋炙黄烏賊魚骨去甲附子炮裂去皮臍各一分常山半兩一方無右細剉以酒二升半漬一宿瘧發前稍稍服之勿絶藥味兼以酒塗身體服藥良久方可進食常山酒常山苗一握無苗取根五兩代之獨顆蒜七顆淡竹葉二握豉一合裏鼈甲三兩炙右切以苦酒三升煎取一升臨發隨性多少服盡之服訖當大吐愈忌食莧生葱生菜山瘴瘧酒出鮑氏方療乍寒乍熱乍有乍無及勞瘧痰滯發渇不定久不瘥常山三兩鼈甲炙升麻烏賊魚骨去甲附子各一兩右並切絹袋盛以酒六升漬之少令近火轉之一宿成一服一合比發可數服或吐忌猪肉生葱生菜治山瘴瘧發作寒熱方出聖惠方恒山三兩烏梅肉三七枚甑帶三寸獨顆蒜一枚右以酒二大盞煮取一盞分為二服初一服未發前服之後一服臨欲發服之如其形候欲似不發即止方便安卧頭左側安為佳也餻角飲子出聖惠方治山瘴瘧米餻角半兩九月九日者寒食飯二百粒恒山一兩剉䜴一百粒獨顆蒜一枚右以清水二大盞浸一宿至五更初煎至一盞去滓空腹頓服當下利為度保安湯治山嵐瘴瘧寒熱久不差常山半兩青蒿知母各一兩桃仁湯浸去皮尖雙仁研半兩右粗搗篩每服二錢水一盞生姜半分同煎至六分去柤稍熱服不拘時大黄湯治患瘴熱實兼吐痢者大黄常山升麻甘草炙各三兩右切以水七升煮取二升半分三服發前盡服别出吐痢忌海藻粉菜生葱生菜觀音丸出直指方治夏暑毒瘴毒圓白半夏生烏梅肉母丁香川巴豆不去油每件各十枚燃右為末姜汁麵糊丸麻子大上下以厚紙蓋貼去油又再易紙每服五丸臨卧冷水下此方舟人於海角遇白衣人