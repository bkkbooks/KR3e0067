治天行瘧瘴寒熱咳嗽痰壅飛尸喉閉瘡腫出木草以草犀根煮汁服之治瘴瘧出本草取鹽麩子乾搗為末食嶺南人將以防瘴治瘴瘧寒熱邪氣泄痢陰氣不足及止渴以小豆花於豉中煮五味調和作羹食之治瘴瘧出本草取海鷂魚燒令黑末服二錢此魚似鷂有肉翅能飛上石頭一名石礪一名邵陽魚生東海治勞熱瘴瘧出本草用土紅山葉搗爛酒漬服之治瘴瘧渾身熱連背項出本草以茴香子搗汁服之治勞瘴甚佳出本草用土紅山根如葛頭者薄切用米泔浸二宿更用清水浸一宿取出切炒令黃色搗末每服一錢水一盞生薑一小片同煎服治辟瘴出本草以菝葜根浸赤汁以煮粉噉之即金剛根也治瘴瘧寒熱出本草以果然肉煮食之亦坐其皮為褥治天行瘴瘧疫毒出本草以百丈青煮服亦搗絞汁服治久瘴瘧寒熱無時者出本草以死人頂骨十字解者燒令黑細研白飲和服七物升麻丸出本草治瘴升麻犀角黃芩朴硝梔子大黃各二兩豉二升微熬右同搗散蜜丸覺四肢大熱大便難即服三十丸取利為止四肢小熱於食上服二十丸非但辟瘴兼甚明目治瘴瘧以千里芨煮不拘時少服之吐下萬靈丸治瘴瘧用川常山好者一兩為細末以水兩碗沙糖一塊如小胡桃大白沙蜜一匙令同於砂石器內慢火熬令水盡候冷丸彈子大每服一丸於當發日五更時先用湯熱洗潄著鞋襪了方細嚼用溫酒半盞送下忌三日魚肉生冷糟腥葷味菜蔬只喫淡粥飯三日仍忌三日不得動冷物水神效疸瘧附論夫疸瘧者由肺系有熱氣盛於身厥逆上衝氣實而不能外泄因所用力腠理開舒風寒含於皮膚之內分肉之間而發也發則陽氣盛陽氣盛而不衰則病矣其氣不及之陰故但熱而不寒邪氣內藏於心而外含於分肉令人消鑠脫肉故名曰疸瘧其狀熱而不寒陰氣孤絶陽氣獨發則少氣煩惋手足熱而嘔也方茵蔯蒿湯出聖濟總録治瘴瘧發作有時但熱不寒頭痛不安通身俱黑大腸祕熱小便黃赤宜服此方茵蔯蒿山梔子去皮柴胡去苗黃芩去黑心桔梗炒牡丹皮去心貝母去心荆芥穗去梗升麻杏仁湯浸去皮尖雙仁炒半夏湯浸七遍去滑切焙羌活去蘆頭獨活去蘆頭麻黃去根節煎去沫焙各半兩細辛去苖葉一分右細搗篩每服三錢水一盞半生薑二片煎一沸急瀉出臨發熱頭痛時去滓熱服仍須時候但此瘧發熱并初發時先壯熱者可服熱多寒少食後喫此藥清脾湯出醫方集成治瘴瘧脈未弦數但熱不寒或熱多寒少膈滿能食口苦舌乾心煩渴飲水小便黃赤大腑結燥青皮去白厚朴薑製炒白术草果仁柴胡去蘆茯苓去皮半夏湯炮七次黃芩甘草炙各等分右㕮咀每服四錢水一盞生薑五片棗一枚煎至七分去滓溫服不拘時候一方加人參忌生冷油膩香䜴飲出聖惠方治疸瘧但熱不寒嘔逆不下食豉半合蔥白七寸切常山三分升麻一兩鱉甲醋炙令黃去裙襴知母焙生地黃各一兩半檳榔煨三錢右銼如麻豆大每以一錢水三盞於星月浸一宿橫刀一口安在藥上早晨煎取一盞半去滓空腹分為二服重者不過兩服大青飲出聖濟總録治瘴瘧積熱痰盛寒少熱多但熱不寒煩躁引飲大青一兩莖葉紫者是不紫者即是逺志不可用也如無真者以青黛代之大黃醋炒赤芍藥常山細銼炒甘草炙龍膽去土各半兩右粗搗篩每服五錢用水一盞半煎至八分去滓溫服氣盛熱多宜服得利或熱稍退即止人宿有冷痰疾年四十以上者熱證不宜多服茵蔯枳殼湯出聖濟總録治瘴瘧上焦熱身重目黃茵蔯蒿取葉枳殼去瓤麩炒各一兩桔梗銼炒三錢大黃銼微炒甘草炙令黃各半兩右粗搗篩每服三錢水一盞煎至六分去滓溫服不計時候硃砂丸出聖惠方治疸瘧發作不定但熱不寒硃砂砒霜馬牙硝猢猻頭骨末各一分麝香一錢右相和研令勻醋煮麵糊和丸如菉豆大於發時前以冷生薑茶下二丸忌食熱物白虎加桂湯出千金方治疸瘧陰氣孤絶陽氣獨發脈微其候少氣煩滿手足熱欲嘔但熱而不寒邪氣內藏於心外含於分肉之間令人消爍脫肉者石膏碎一兩六錢知母六錢甘草炙二錢粳米半合右除梗米外㕮咀拌勻以水一升煮藥五錢以米爛為度去滓加桂末三錢煎取四合作一服覆令汗先寒發熱汗出立愈常山散出聖惠方治疸瘧發熱不止及間日瘧發作無時常山銼一兩升麻三分鱉甲去裙襴銼生用山梔子各半兩右為散每服三錢未發前用溫水調下取吐即瘥常山飲出聖濟總録治疸瘧但熱不寒煩渴不止常山銼炒半兩甘草銼炒一分烏梅七枚槌碎去核焙青蒿焙一分右粗篩都以小便一盞水一盞煎至一盞去滓當發日空心服恆山飲子出聖惠方治疸瘧但熱不寒嘔逆不下食恆山甘草生用地骨皮各一分生鐵一斤打碎如碁子大右細銼以水二大盞於星月下浸一宿橫刀一口安在藥上早晨煎取一盞去滓空腹分為二服重者不過兩劑差治疸瘧發時大渴寒熱不定砒霜半兩細研菉豆半兩川大黃一兩銼碎微炒右為末入研了藥令勻鍊蜜和丸如梧桐子大露一宿夜發日平旦以冷水下一丸臨發前再服一丸忌食熱物十棗湯出楊氏家藏方治但熱不寒穿山甲用一兩乾棗十枚右同燒成灰留存性研細末每服二錢當發日未出時用新井華水調服之又方出聖惠方砒霜一分細研甘草半兩右研令勻以粟米飯和丸如菉豆大每未發時及空心以井華水調下服之三丸忌食熱物香薷散出醫方集成治但熱不寒隂氣孤絶陽氣獨發少氣煩寃手足熱而欲嘔兼渴方見傷暑門一方加黃連每料二兩名黃連香薷散治暑瘧獨熱燥煩大渴引飲小便不利或背寒靣垢每服加燈心二十莖麥門冬去心二十粒淡竹葉七片車前草二根晚禾根一握檳榔一枚切片煎不拘時候一方治脾寒初服黃連香薷飲加檳榔不止服甘草飲加檳榔服之止鬼哭散出經驗良方治疸瘧但熱不寒用黃丹煆煉過臨發蜜湯調下稍大能飲酒用酒調下大柴胡湯出續易簡方治疸瘧但熱不寒而嘔大便袐澀間日瘧附論夫間日瘧者此由邪氣與衛氣俱行於六腑而有時相失不相得故邪氣內搏於五臟則道逺氣深故其氣行遲不能與衛氣皆出是以間兩三日而作也方烏梅丸出聖惠方治間日瘧寒熱不止烏梅肉一兩微炒桃仁三十枚湯浸去皮尖雙仁麩炒微黃地骨皮䜴心炒乾各一兩虎頭骨一兩半塗酥炙令黃知母鱉甲塗醋炙令黃川升麻人參去蘆頭各一兩天靈蓋一兩半塗酥炙令黃右為末煉蜜和搗三二百杵丸如梧桐子大空腹以漿水下二十丸晚再服雄黃丸出聖惠方治間日瘧每日發者雄黃一兩細研臘月野狐肝二兩阿魏一分硃砂半兩細研猢猻頭骨一兩天靈蓋半兩麝香一分研右為末入研藥末令勻於五月五日午時煉蜜和丸如紅豆大每發時前男左女右以緋帛繫一丸於中指上時時嗅之後更以醋湯下一丸糯米煮散一名石膏治間日瘧方見本門痰瘧類常山湯一名常山酒治間日瘧先寒戰後壯熱方見本門痰瘧類神聖丸出聖濟總録治間日瘧黑豆小者二十一粒水浸去皮砒霜研一分大棗三枚煮去皮核右須於重午七夕日修合同研丸如豌豆大以丹砂為衣合時忌婦人雞犬見於發日早晨將藥一丸靣北香上度過用冷茶清送下忌熱物服時治瘧或間日發或夜發者出聖惠方恆山竹葉各三兩秫米一百粒石膏右㕮咀以水八升銅器中漬藥露置星月下髙淨處橫刀其上明日取藥於病人房中以銅器暖火煎取三升分三服清旦一服未發前候一食頃一服臨發一服三服訖靜室中卧莫共人語當日勿洗手靣及嗽口勿進食取過時不發乃澡洗進食并用藥汁塗五心胸前頭靣藥滓置頭邊或用烏梅二十七枚常山酒出聖濟總録治間瘧常山一兩蒜獨頭者一顆去根莖橫切糯米黑豆各一百粒右㕮咀以清酒一升病未發前浸藥於碗中以白紙覆之碗上橫一刀欲發時三分飲一分如未吐更服一分得吐則瘥醇醨湯一名大黃湯出聖濟總録治間日瘧及痎瘧積年不瘥者大黃銼炒三分甘草炙常山名一分半右㕮咀以水三盞煎取一盞去滓更以水一盞煎滓取七分未發先服醨藥是後煎者相次服醇藥是前煎者瘥又方出聖惠方小麥一合硫黃一兩細研右於臘日以醋浸四十九日取出焙乾每有患者取小麥七粒發前以冷醋湯下之又方出千金方先以羊肉臛麵餅飽食之并進少酒隨其量飲如欣欣有酒氣入密室裏燃炭火厚覆取大汗即瘥又方出千金方燒黑牛尾頭毛作炭酒服方寸匕日三又方出聖惠方治間日瘧川大黃半兩銼研微炒甘草一分炙微赤銼恆山三分桂心一分右件藥都細銼以水二大盞煮取一盞去滓分為二服空心熱服臨發前再服痰瘧附論痰瘧之狀胸中不利頭痛振寒怢栗而不能食食即嘔寒去則內外皆熱寒熱更作心下支滿痰積胸中氣逆煩嘔故謂之痰瘧治痰瘧發作有時熱多寒少頭痛額角并胸前肌肉瞤動食才入口即吐出靣色帶赤也夫痰實瘧者謂患人胸膈先有停滯結實因感瘧病則令人心下支滿氣逆煩嘔也方常山甘草飲出聖濟總録治痰瘧寒熱常山甘草炙銼大黃銼炒各一兩桑根白皮銼一兩半烏梅五枚去核杏仁湯浸去皮尖雙仁炒十枚黃連去鬚一兩羌活去蘆頭一兩半黃芩去黑心半兩芎藭枳殼去穰麵炒赤茯苓去黑皮各一兩旋覆花熬半兩茈胡去苗一兩半附子炒製去皮臍一兩牽牛子炒一兩半桂去粗皮虎頭骨牙齒酥炙黃一兩半右銼如麻豆每服五錢水一盞半煎至八分去滓溫服細辛湯出聖惠方治痰瘧吐隔細辛去苖葉松蘿犀角屑甘草各三分半常山升麻各一兩一分梔子仁玄參各一兩右粗搗篩每服三錢水一盞煎七分去滓溫服以吐病出為度其痰母爛雞子是也一方用酒浸一宿去滓溫服蜀漆丸出聖濟總録治痰逆多時久瘧不瘥及靣黑四肢黃腫蜀漆葉牡蠣燒赤黃芩去黑心各一兩大黃生銼甘草炙銼犀角屑各三分知母焙半兩右為末煉蜜丸如梧桐子大每服二十丸空心溫水下半夏散出續易簡方治痰瘧發作有時熱多寒少如頭痛額角并胸前肌肉瞤動食才入口即吐出靣色帶赤宜服此方半夏湯浸去滑為末生薑汁和作餅暴乾藿香去梗羌活去蘆頭芎藭各一分牽牛各半兩右為細末每服三錢食後白湯調下以吐為度未吐再服石膏飲出聖濟總録治一切痰瘧石膏碎淡竹葉各三兩常山甘草生銼烏梅各二兩粳米半合一作糯米右粗搗篩每服五錢水盞半煎至一盞去滓溫服吐痰即瘥如熱盛加大黃一兩烏頭湯出聖濟總録治痰瘧吐不出烏頭炒製去皮臍半夏湯洗去滑焙桂去粗皮芫花醋炒常山各半兩豉炒一合右銼如麻豆每服三錢酒一盞煎至七分去滓發前溫服相次再服取吐為度防葵飲出聖濟總録治痰瘧寒熱溫疫防葵鱉甲醋炙去裙襴松蘿甘草生各半兩常山三分右粗搗篩每服五錢水一盞半煎至八分去滓未發前徐徐溫服豉心丸出聖惠方治痰寒熱心膈煩壅不利豉微炒一合大黃生用一兩半常山三分升麻半兩一作蜀漆附子小者炮裂去皮一枚右為細末煉蜜為丸如梧桐子大每服七丸發前米飲下吐後更乾咽七丸或加甘草半兩二陳湯出直指方治傷食發瘧痰多陳皮半夏製各五兩白茯苓三兩甘草炙一兩右銼散每服三錢薑五片烏梅一枚煎服寒多者加草果熱多加前胡青皮檳榔縮砂白豆蔲之類隨意加減蒜丹丸出直指方治截瘧消痰虢丹煆穿山甲熬灰中炮焦各一兩土硃半兩右為末以獨頭蒜煨去皮研膏丸如梧桐子大每服十丸生薑烏梅紫蘇煎湯送下胡粉丸出聖濟總録治一切瘧及吐一切痰疾胡粉研砒霜研寒水石焙研各一兩右合研勻滴水丸如雞頭子大發前新汲水吞下一丸即大吐至日困睡為驗常山酒出聖惠方治痰實瘧發渴不止久不瘥常山三分烏梅肉生用甘草生用各半兩右細銼以酒二盞浸一宿早晨去滓煎服一盞良久以筯入喉中引之吐痰即瘥一方用水生薑煎服升麻常山湯出聖惠方治痰瘧發作無時寒熱不下食升麻一兩常山二兩蜀漆葉一兩半右粗搗篩每服四錢以井華水一盞半煎至一盞空心頭服瘥又即吐吐定食漿水粥和之半夏丸出危氏方治瘧咳嗽痰盛痞滿煩悶咽膈不利嘔吐惡心神思昏憒心忪靣熱並皆治之半夏十六兩湯洗去滑薑汁淹一宿白礬八兩枯過右為末生薑自然汁為丸梧桐子大每服三十丸食後臨卧淡薑湯吞下治溫瘧痰盛寒熱出聖惠方常山一兩香䜴二合炒乾右為末粟飯為丸如梧桐子大每服二十丸熟水下又方出仁存方青蒿二兩黃丹半兩右為末每服二錢寒多酒調熱多湯調青蒿以童子小便浸焙乾尤健冷附湯一名七棗湯治瘧疾無過是痰實痞塞不通脾胃弱虛熱在上停於胸膈不得入於臟腑所以五更冷服乃使藥下達肚脾胃去痰實除虛熱降心氣屢用屢效方見本門痎瘧類松蘿丸出聖惠方治痰實瘧發渴不止松蘿常山銼各半兩阿魏蜀漆大青硃砂研麝香細研各一分右為末研勻取端午日午時於淨室內用七家粽子尖和丸如梧桐子大當修合時不得婦人雞犬見如發時以溫湯下五丸夜發時桃符湯下兼取緋帛三二寸繫五丸男左女右臂上疾愈即去之如再發時取臂上繫五丸服之治痰實瘧久不瘥出聖惠方木香一兩恆山三分銼松蘿半兩赤小豆半合砒霜一分細研以醋五合煎令稠右為末以砒霜煎和丸如梧桐子大空心以溫漿水下三丸以吐為度如未定晚再服之松蘿湯出聖惠方治痰實瘧每夜不定時節或朝或暮漸不能食松蘿人參去蘆頭常山川升麻各半兩竹葉一百片右為細銼以水二大盞煎取一盞去滓分為二服平旦時一服如人行五里當吐不吐更一服良久得吐即瘥烏梅湯出聖惠方治痰實瘧盛攻作寒熱烏梅肉微炒常山各半兩松蘿三分鱉甲生用川升麻各一兩右細銼以水三大盞煎取一盞半下茶末二錢更煎三兩沸去滓空腹分為二服如人行五里當吐如未吐再一服以吐惡痰為度恆山散出聖惠方治痰實瘧發渴寒熱不定恆山半兩硃砂半兩細研烏梅肉半兩生用右細為散入硃砂研勻每於發前以醋湯下一盞以吐為度治痰瘧出本草以生熟湯熬鹽投中飲之令吐出痰及宿食痎瘧附論夫痎瘧者夏傷於暑其病秋則寒甚冬則寒輕春則惡風夏則多汗者然其搐作有時以瘧之始發先起於毫毛呻欠乃作寒栗鼓領腰脊疼痛寒去則內外皆熱頭痛如破渴欲飲冷者此乃陰陽上下交爭虛實更作陰陽相移也陽并陰則陰實陽虛陽明虛則寒栗鼓頷巨陽虛則腰背頭項痛三陽俱虛陰氣勝陽則骨寒而痛寒生於內故中外皆寒陽盛則外熱陰虛則內熱外內皆熱則喘渴欲飲此得之夏傷於暑熱氣盛藏之於皮膚之內腸胃之外此榮氣之所舍則令汗出肉腠理開因得秋汗出遇風乃得之及以浴水氣舍於皮膚之間與衛氣并居榮氣者晝行陽分此氣得陽則出得陰則內是以隔日作也痰瘧者以瘧發該時或間日乃作也入衛氣流行合於晝夜陰陽邪氣內舍於榮隨衛氣以出入而應於風府其作早晏皆以時發也寒溫疸瘧動皆該時故內經統謂之痎瘧方虎頭骨丸出聖惠方治痎瘧久不瘥虎頭骨二兩塗醋炙微黃硃砂半兩細研恆山半兩銼甘草一兩半生銼牡蠣二兩微炒桂心一兩知母二兩香䜴一兩炒乾烏梅二兩附子一兩炮裂去皮臍枳殼半兩麩炒微黃去穰木香一兩川大黃二兩銼微炒桃仁三七枚雙仁去皮尖皆湯浸去麩炒微黃右為末研入硃砂令勻鍊蜜和搗三二百杵丸如梧桐子大每於發前以桃符湯下十丸知母飲子出聖惠方治痎瘧積年不瘥者知母半兩鱉甲塗醋炙令黃去裙襴恆山銼各一兩烏梅肉七枚微炒豉心一百粒粳米一百粒甘草炙微赤銼川大黃各半兩右細銼和勻每服半兩以童子小便一中盞浸一宿五更初煎至六分去滓溫服臨發前再服以利為度每日發與不發皆得服之待過發後即得喫食恆山丸一名麻黃丸一名袪邪丸出千金方治痎瘧恆山知母甘草大黃各十八銖麻黃一兩右為末蜜和丸如梧桐子大未食服五丸日二不知漸增以瘥為度肘後無大黃靣東清水下袪邪丸治瘧疾脈浮大寒熱往來用此吐之衛州書云瘧寒多熱少痰多也然寒多熱少而脈浮則痰無疑矣可吐之若脈遲微者惡寒瘧耳宜柴胡桂薑也鱉甲漬酒出千金方治痎瘧以時發鱉甲醋炙半兩烏賊魚骨去甲常山各二兩附子炮裂去皮臍甘草銼各一兩右銼如麻豆大每服五錢以酒一盞半漬藥一宿明日以酒先塗五心過發時瘧斷若不斷可飲藥酒一二盞即瘥烏梅丸出聖惠方治痎瘧或發或歇久不瘥烏梅肉二七枚恆山三兩末香䜴二兩桃仁湯浸去皮尖雙仁四十九枚右搗如泥以少許蜜和搗二三百杵丸梧桐子大每服以粥飲下三十丸日三服常山酒出聖濟總録治痎瘧先寒戰動寒解壯熱日發及間日發常山淡竹葉切洗一兩鱉甲去裙襴酥炙一分甘草炙銼三分右粗搗篩每服五錢以酒半盞浸藥覆安露地一宿明旦以水一盞煎至七分去滓未發前溫服盡當吐既效不必盡劑過發時良久方可食霜墨丸出聖濟總録治痎瘧砒霜一錢墨蓐草灰各五分菉豆粉一分右一處細研為末用糯米粥和丸如小豆大每服兩丸未發前一時辰醋湯下端午日未出時靣東修合不得言語勿令婦人雞犬見丹砂丸一名硃砂丸治痰瘧寒瘧溫瘧疸瘧悉治之方見本門諸瘧類振虎膏出聖濟總録治痎瘧胭脂阿魏各一大豆許同研右同研以大蒜肉研和為膏用桃大核一枚劈開去仁取一片以藥膏子填在核瘧發時用藥桃核覆在手虎口上男左女右令藥著肉以緋帛繫定經宿七棗湯一名冷附散出醫方大成治五臟氣虛隂陽相勝作痎瘧不間寒熱先後與夫獨作疊作間日及痰痞塞不通發作無時或寒多熱少或單寒者悉治之附子一枚炮裂以鹽水泡再泡如此七次不浸去皮臍一方以水調陳壁土為糊泡浸七次右㕮咀分作二服水半盞生薑七片棗七枚煎至八分盞當發日去滓空心溫服川烏亦可一方名冷附湯去棗煎熟露一宿五更初冷服凡患瘧疾無過是痰實痞塞不通脾氣弱虛熱在上停於胸膈不得入於臟腑所以五更冷服乃使藥下達肚脾胃去痰實降虛熱降心氣屢試驗治瘧虛寒久不瘥者空心服仍食棗三枚一方以蔥白七寸同煎治痎瘧及邪熱用冬葵子陰乾為末服之午日取花挼手赤去瘧又方出聖惠方恆山半兩銼甘草二兩生用川大黃半兩桂心半兩右件藥搗篩為散每服五錢以水一中盞煎至六分去滓空心溫服欲發時再服普濟方卷一百九十九
