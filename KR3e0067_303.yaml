body:
  text: 普濟方卷三百三明周王朱橚撰金瘡門金瘡血不止附論夫血行脉中周行灌溉而無窮矣金刃所傷者深則其流湍激若海沸河決禦之至難要在杜其衝溢之勢外觀其形内訂其脉之如何若血出不斷其脉大止者為難治若血出不止前赤後黒或黄或白肌肉腐臭寒冷喘急者亦為難治不可不察也夫金瘡去血其人若渇然每忍之常令乾食并肥之物以止渇慎勿鹹食若多飲粥輩則血溢出殺人不可救也又忌憤怒大言笑思想隂陽行動作勞勿多食酸鹹飲酒熱羮臛輩皆使瘡痛腫發甚者即死瘡差後猶爾出百日半年乃稍常耳凡金瘡傷天𩕄眉角腦户臂裏跳脉髀内隂股兩乳上下心為尾小腸及五臟六腑腧此皆是死處不可療也又破腦出血而不能言語兩眼直視咽中沸聲口急唾出兩手妄舉亦皆死候不可療若腦出而無諸候者可療又瘡卒無汁者中風也瘡邊自出黄汁者中水也並欲作痙候可急療又瘡卒無汁者中風也瘡邊自出黄汁者中水也不可止前赤後黒或白肌肉腐自寒冷堅急者其瘡難愈亦死也口血出不止則用方中止血藥傅之如洗開後瘡孔大甚且先用降真香龍骨没藥摻之肉即生上瘡孔湏用油單貼待膿血汁出莫待蔽塞如夏月用藥以薄荷葉貼瘡孔一日一度湯洗又用藥摻如肉上滿瘡口用手搦不痛如好肉一般即用收瘡口藥傅上却莫貼待風稍瘡口立收若未生實肉切不可先收瘡口裏面恐為患也夫金瘡血出不斷其脉大而止者三七日死金瘡血出不止前赤後黒或黄或白肌肉腐臭寒冷強急者其瘡雖愈亦難療也夫金刃中於經絡者出血必多臟腑空虚津液竭少無血氣以榮養故湏補之也方當歸散一名内補散一名蓯蓉散出千金方治金瘡出血多虚竭此藥内補當歸剉微炒芎藭川椒去目及閉口者微炒去汗乾薑炮製剉白芍藥桂心甘草炙微赤剉黄芩呉茱萸湯浸七遍焙乾微炒桑根白皮剉各半兩肉蓯蓉四兩酒浸一宿剉去皴皮炙令乾人參去蘆頭黄耆剉厚朴去麄皮塗薑汁炙令香熟各二兩右為細末毎服以溫酒調下二錢日三四服一方有白笈無黄芩桑根白皮麻黄散出聖濟總録治金瘡止血悶及疼痛麻黄去節兩半甘草炙白芷附子炮製去皮臍乾薑炮當歸切焙續斷黄芩去黒心芍藥芎藭桂去麄皮各半兩右為散每服二錢温酒調下空腹日午夜各一服可加至三錢内補芎藭散出聖惠方治金瘡傷筋骨疼痛下血多食少臟腑虚竭芎藭一兩半熟乾地黄當歸剉微炒白芍藥肉蓯蓉酒浸一宿刮去皴皮炙乾用已上各一兩蛇衘草乾薑炮裂剉各三分續斷三兩桂心附子炮裂去皮臍細辛各三分右為細末每服不計時候以溫酒調下二錢内塞散亦名黄耆散出聖惠方治金瘡去血多虚竭疼痛羸弱内補黄耆當歸芎藭白芷乾薑黄芩芍藥續斷各二兩附子半兩細辛一兩鹿茸三兩右治下篩先食酒服五分匕日三稍増至方寸匕一方無芍藥川大黄散出聖惠方治金瘡刀箭所傷血不止日夜疼痛川大黄剉生用甘草剉生用甘菊花旋覆花㯽榔黄連去鬚白芷蔓菁花各一兩黄蘖五兩剉桑根白皮二兩剉右為細末傅之神效蒲黄散出聖濟總録治金瘡血出腹脹欲死甘草炙剉三分黄耆剉一兩蒲黄生乾地黄焙各一兩半當歸切焙芎藭白芷續斷各一兩右為散每服三錢匕空心溫酒調下日三四服血化為水而下若口噤斡開口與之仍加大黄一兩半龍骨散出聖惠方治金瘡出血不止龍骨鳥樟根各三兩當歸剉微炒芎藭續斷熟乾地黄突厥白各一兩鹿茸半兩去毛塗酥炙令微黄右為末敷瘡上血即止如服即每服以溫酒調二錢日三服石灰散出聖惠方治金瘡血不止石灰二斗以小便浸五日細淘過大麻心桑葉各五兩檞葉一兩青蒿葉半斤刺薊益母草芸薹子各六兩右以端午日收採相和石灰内臼中杵令爛攤作片曬乾要用即旋擣為散以傅瘡上一方無大麻心桑葉檞葉如神散出王氏博濟方治一切刀斧所傷血出不止并患惡瘡龍骨研半兩虎骨炙研半兩丹砂研一錢鉛丹以火燒令通赤半兩膩粉一錢麝香研少許乳香一塊皂子大研右研極細一切瘡以黄連湯或鹽湯洗拭乾摻藥在瘡上不得以液霑著瘡口治金瘡出血不止方川芎續斷熟地黄各一兩鹿茸半兩塗酥去毛炙微黄鳥樟根三兩突厥白一兩右搗為末傅瘡血即止如服溫酒調二錢日三服雄黒豆散出聖惠方治金瘡疼痛血不止雄黒豆半升𦂳小者是也黄葉半升剉芸薹子桑根白皮剉鳥賊魚骨各四兩黄連去鬚龍骨各二兩右為細末每用傅瘡上治金瘡下血出本草以青黛摩傅之治刀斧折傷生膚止血痛出本草以㑹州白藥為末傅瘡上藥如白歛出㑹州也金傷散出御藥院方治金刃箭簇所傷血出不止及落馬打傷内綻血出亦皆治之白芨白歛乳香各一兩龍骨半兩黄丹少許石灰半斤逺年者佳右為細末入黄丹有如淡紅色每用乾捻在患處上用軟紙更以絹帛裹䕶者忌風水乾痂為效定血散出楊氏家藏方治一切刀傷血出不止收歛瘡口天南星生槐花炒黄鬱金上三味各四兩半夏二兩生用没藥别研乳香另研各二錢半右為細末以入没藥乳香同研令勻如有傷處乾貼瘡切忌水洗治金瘡出血多虚竭内補出千金方當歸三兩乾薑三分芍藥辛夷各五分甘草二分右治下篩酒服方寸匕日三夜一没藥散出醫方大成治箭傷止血定痛定粉一兩枯白礬三錢另硏沒藥另研風化石灰乳香别硏各一兩右為末和勻摻上當歸散治金瘡去血多虚竭内補方當歸三兩芍藥細辛各五分乾薑三分甘草二分右為散以酒服方寸匕日三夜一忌海藻菘菜生菜黄連散出聖濟總録治金刃所傷血出不止黄連去鬚㯽榔剉生用木香白芷各半兩右為散摻所傷處血即止效如婦人血暈以童子小便調下一錢匕如臟毒瀉血以水煎服刀箭藥出聖濟總録治金瘡血不止石灰逺年船上者燒一兩龍骨研半兩鉛丹炒三錢狗腦骨燒灰半兩右搗羅末傅瘡上風化散出聖濟總録治金瘡止血定痛風化石灰一升乾薑三分生用生栗子末白藥各五兩右以端午日搗羅為末傅患處雄礬散出楊氏家藏方治金瘡血出不止雄黄别研乳香别研五倍末膩粉别研右等分為末依瘡口大小摻之血出立止其瘡不許封即乾歛不痛一方有白礬黑散子出聖濟總録治金瘡止血大黄三兩半童子小便浸三日後用紙裹煨巴豆一兩半漿水浸炒令黄半兩錢四十九文以鉄線繋焼紅以酒五升淬盡羊脛炭一握七莖米醋五升淬盡用之右為細散隨傷損大小貼之疼痛立止疼無瘢痕及能出箭頭止血大效婦人一切敗血極者可服一字溫酒調下神仙止血散龍骨一兩五色𦂳者訶子一兩白石脂半兩苧蔴葉半兩係五月午時採來隂乾者右為細末水調服之如修合時不得令婦人鷄犬見之灰韮散治金刃止血新石灰韮菜苧蔴葉小竒花右等分先搗三味爛汁着石灰再搗爛和成餅子亂草裹放起隂處用時碾碎末乾摻如神五月五日午時修合一方無小竒花治金刃或打傷血出不止出危氏方降真香末五倍子末銅末是削下鏡靣銅於乳鉢内研細等分右拌勻傅傷損處昔安豐手毆朱嵩碎首用此藥而愈黄金散治金刃傷止血定痛鬱金半夏各一兩風化石灰四兩右為末凡有損傷乾摻之治刀箭傷血出不止并折骨檳榔一箇木香胡黄連各二錢重右為末傅瘡口上立止亦接得損骨傷中便貼之如研下指血未定速將藥裹定便得却相連接治金瘡血不止疼痛生栗子一升炒乾乾薑三分炮裂剉白芨五兩右於端午日搗細為散瓷器中貯每用時於瘡上傅之止血止痛極效治金瘡出血不止出聖惠方蒲黄一斤當歸二兩右治下篩酒服方寸匕日三桃紅散治金瘡出血石灰一升大黄四兩剉作骰子塊右同炒至石灰淡紅色去大黄用石灰加當歸海桐皮為末傅之南星散出聖濟總録治刀刃所傷血出不止天南星三枚切焙鉛丹半錢右為散乾貼立定檳榔散出聖濟總録治金瘡出血痛甚方見金刃傷中筋骨類桃紅散出聖濟總録治金瘡或竹木所刺出血不止及疼痛乾葛粉染胭脂各一兩右研細乾摻在瘡上又用青絹以鷄清塗絹可瘡口大小貼仍先用箆子按去血令藥與肉平方以青絹蘸鷄清貼之石榴花散出聖惠方治金瘡傷破血流不止石榴花曝乾半兩一方用半斤石灰炒一升半一方炒一升右為散取少許傅瘡上捺少時血斷便差治金瘡血不止方出千金方煮桑根十沸服一升即止又方出千金方搗車前汁傅之血即絶連根取用亦効又方用桞絮封之又方以蜘蛛幕貼之血即止又方出聖惠方飲人尿五升愈治金瘡血不止取豉三升熱湯浸食頃絞去滓内蒲黄三合頓服之䓤白方出朱氏集驗方治金瘡定痛止血以䓤白煨爛乗熱縳定痛血自止䓤冷再易後全無痕神効傷者亦可以煨䓤罨之使活一方以䓤葉汁取塗瘡上即止或用䓤莖葉煨熱爛研罯傅之亦治金瘡水入皸腫若為婦人所驚者取婦人中衣火炙令熱以熨瘡上張氏經驗方二人云荆門軍㸃頭錄石城鄉人戴堯臣作尉試馬被馬劣拶人於籬戴損大指甲離肉血淋将䓤白煨爛乗熱縳痛與血隨止䓤冷再易不復痛後亦無痕跡小木匠姓雷脚跟為斧所傷乗急用泥塞後攻注成腫發寒熱不可立遂剔去舊土令血再出却用煨䓤白傅之不移時痛住血止推官宋琢定驗兩處殺傷氣偶未絶亟令取䓤白鍋内炒熱以傅傷處繼而呻吟再易䓤而傷者無事矣樂平人好闘多傷樂平鮑宰毎有殺傷公事未暇詰問先将䓤白傅傷損者活人甚衆大辟遂減傷損不必他求無䓤處以葉亦可只要炒熱為上時易為佳若傷多煨炮不及但以乾鍋内且烙且杵令涎出䓤熱用之為妙如聖千金散出衛生家寳方治金瘡出血痛不可忍海金砂滑石各半兩生欝金一分右一處為末每服二錢用砂糖一塊新汲水調下不拘時候治金瘡血不止出儒門事親用薇末貼之立止治金瘡血出用孩兒茶搗末傅之隨愈治刀傷瘡血不止取楊梅樹皮嚼極細盫刀瘡上立愈治金瘡傷損血出出百一選方用生牛膽入石灰末後乾摻瘡即止以臈月牛膽入風化石灰懸當風處佳候乾用百草散治金瘡止血方見金刃所傷類桑皮方治金瘡止血方見金刃所傷類灰礦散出聖濟總錄治金瘡止血用古窑石灰紫礦各半兩同為散傅之灰彈散治金瘡止血速差方見金刃所傷類治金瘡血不止兼痛方出聖惠方用麒麟竭末傅之止治金中經脉傷皮及諸大脉血出多心血冷則殺人出本草用炒塩三撮酒調服之治金瘡止血生肌及惡瘡入水並無妨絶妙人號為上血竭也出聖惠方急刮真紫檀末傅之凡裹縳瘡用故布帛不寛不急如繫衣帶即好一方用降真香為末傅之亦佳治金瘡止血止痛出刃方出肘後方用甑帶燒灰封之患處江南以蒲為甑帶取久者燒灰入藥味辛温無毒甑帶久被蒸氣故能散氣通氣治金瘡血湧出取月水衣炙熱熨之又燒末傅之治金瘡血出不止以篩過石灰用旋殺猪血就盆内攪匀捻作餅篾穿􅘮乾為末貼之治刀箭瘡止血并痛方出本草用茅香花罯之良一方以白茅針生挼傅瘡上治金瘡生膚止血出本草以研合子搗碎傅瘡上又云昔漢髙祖戰時用此傅軍士金瘡故名研合子旋復散治金瘡止血方見毒箭所傷類葛根飲治金瘡筋脉傷及諸大脉皆血出多不可止血冷則殺人方見箭鏃金刃入肉類治金瘡血不止痛出聖惠方用白芍藥一兩熬令黄杵令細為散酒或米飲下二錢並得初三服漸加一方為末傅之治金瘡血流破血出本草用莧煮汁飲之良治刀箭瘡有血不止方以小兒屎塗封之三日即差並不傷人五倍散出聖濟總錄治金瘡血不止亦治疳瘡以五倍子