兩條並熏瓠􅕧向上燭盡更續燭熏之不過半日即瘥若不止亦可經一兩日熏之以瘥為度若燭長不得內瓠􅕧可中折用之䓤白方治金瘡水入皸腫方見本門金瘡血不止類胡粉膏治金瘡中風寒水腫胡粉炭火各半兩右以豬膏量藥調和塗瘡孔上出水便瘥治外風入瘡口腫痛全蝎一箇白僵蠶三箇去絲蟬蛻三箇右為末擂生蔥自然汁調塗自愈治金瘡中風水刺痛方䓤一握鹽一合右以水三升煮數沸漬瘡即止浸酒方治金瘡中風痙用雞屎白三升炒黃以生絹盛入瓷瓶中與酒六升火煨浸半日去滓溫服五合日三夜一并取莨菪根搗作餅子當瘡上安著以炙上熱微黃水出取瘥必效酒治金瘡中風角弓反張者用蒜擘破去心頂一升以無灰酒四升煮爛并滓每服五合頓服之須臾得汗即瘥治金瘡浸酒方或擊破等瘡中風口閉牙噤身強欲死用雀糞炒研半合以酒七合煮五合濾去滓令溫頓腹中轉動即愈若不能開口斡開灌之杏仁酒摩方治金瘡中風角弓反張者用杏仁碎研生用不去皮尖三斤蒸令一炊久更研令極細入酒三升絞取汁每服五合日二夜一汗出即愈慎外風兼將杏仁酒汁摩瘡上一方不用酒亦得豆淋酒治金刃傷破見骨中風口噤宜用大豆炒半熟五升粗搗篩蒸一饙頃傾盆中以酒一斗五升淋之絞去滓每服五七合日二夜一俟汗出研生杏仁膏傅之若腦髓出者難救又方治金瘡因風水腫取蠟不計多少鎔了入鹽少許滴在瘡中大驗或先以鹽罨痛上後鎔蠟令冷熱得所灌瘡中亦可又方出聖濟總録取鹿角不限多少燒末細研以臘月豬脂和塗之久不差者不過五七日差椒罨方治金瘡中風用蜀椒生完者去目三兩量瘡口大小用麵作餛飩煻灰中炮令熟及熱開一孔當瘡上罨之却引風出可作數十枚更畨用之溫冷即换蔓青子方治因金瘡中風口噤不能語用蔓菁子淨洗一升搗極爛揑為炷炙瘡上熱徹即差莨菪根方治金瘡中風搐搦角弓反張用莨菪根量瘡大小截令平如無大者並縳數根以稱瘡為度别以豬脂一合鹽末一撮許相和熱煎令如雞子膏將莨菪根平處蘸膏溫坐瘡上冷即易之以差即止宜避外風牛膝膏治金瘡因風水腫方見箭鏃金刃入肉類治暴風口噤金瘡用垣衣酒漬服之效麻根飲治金瘡中風骨痛不可忍用大麻根葉無問多少搗研絞取汁飲三合至四合無青者以乾者煎取汁服亦主墮墜打損有瘀血在心腹令人脹滿短氣並宜服之黍瓤方出聖惠方治金瘡腫痛因中水及中風仍衝寒露濕氣其腫入腹則殺人宜熏之或中狐尿刺取黍瓤并馬牛乾糞及桑條輩多煙之物於坑都燒令煙出乃以板蓋坑上開板作小孔以瘡口痛處安孔上熏之令瘡上出汗乃瘥鹽韭傅方出聖惠方治金瘡因風水腫取韭并鹽搗各等分置瘡以火炙藥上熱徹即愈又方取櫟木根皮三斤細銼用水二斗煮沸內鹽一合時以漬瘡腫膿血當出便差又方取白茅根不限多少燒為灰湯和傅瘡上取差一方治金瘡止血煮汁服之艾葉方治金瘡中風掣痛不仁不隨用艾葉生熟者令揉團得所內瓦甑中塞諸孔獨留一目以通氣薰蒸患處良久身體自知立愈治八九月刺手足金瘡及諸瘡中寒露水冷毒皆殺人用生苦竹桑枝兩條惟得一物鬱著火中為推引之令極熱研斷之以頭炷瘡口中熱氣盡更易一枚盡此二枚則瘡當爛乃取薤白搗以綿裹著熱灰中使極熱去綿以薤白傅瘡上布帛急裹之治金瘡中風口噤欲死出本草用竹瀝半大升微微暖服之金瘡止痛生肌附論夫金瘡者乃肌膚之損要害甚重不可不療若不急治斂合瘡口潰去膿血以生肌肉日久必為風水所害愈難治矣方龍骨散治金瘡刃箭傷生肌長肉定痛止血諸瘡斂口龍骨寒水石滑石枯礬乳香沒藥輕粉些少黃丹炒各半分右為細末每要乾摻外用膏藥貼之效止血生肌方蘩蔞葛葉鹿活草槲葉芍藥地黃蒼耳青蒿以五月五日採取陳石灰為團曝乾碾為細末摻於患處金傷散治刀鐮斧傷辟風止痛生肌白芨二兩龍骨白附子天南星各一兩黃丹桑白皮各二兩陳石灰二兩風化右為細末每用乾貼之地黃膏一名生肌膏出聖惠方治金瘡火瘡炙瘡不能瘥者松脂杏仁蠟各二兩薰陸香二兩生地黃切一升搗絞取汁三合石鹽一兩研如粉羊腎脂五合煎烏麻油二升右先下蠟微火令消次內羊脂消次下油次下松脂令消次下杏仁次下薰陸次下地黃汁次下石鹽以微火煎令地黃汁水氣盡以綿濾停凝一切諸瘡初傷皆用傅之日三夜二慎生冷豬雞魚肉一方加蜜二兩此膏治瘡法先去惡肉不著痂先從內瘥乃至平復無痂不畏風不膿水大要妙地黃散亦名石灰散出聖惠方治金瘡止血除疼痛辟風續筋骨生肌肉地黃苖地松青蒿蒼耳苖生艾汁三合赤芍藥各五兩入水取汁石灰三升右五月五七月七午時修合以前藥汁拌石灰隂乾入黃丹三兩更杵羅細凡有金瘡傷折出血用藥封包不可動著十日差不腫不膿地榆散出聖惠方療金瘡內塞止痛地榆根白斂各二分當歸四分芎藭白芷芍藥各三分附子一分炮右搗散以酒飲服方寸匕日三服忌豬肉冷水治金瘡內塞逐痛方黃芩當歸各三兩甘草炙一兩細辛烏頭炮各二兩乾薑一兩白芷四兩右搗篩以酒飲服一錢匕日三可至二錢匕忌生菜海藻菘菜豬肉冷水等牛膝散出危氏方治金刃箭鏃傅瘡口兼能生肉降真香牛膝石灰人骨醋炒真龍骨老松皮各一兩右用黃牛膽一枚將小竹管插膽中以石灰末從管中入膽內挂髙處日乾要用刀破開同諸藥為末傅瘡口中不痛自愈完肌散陳石灰二兩麝香一錢另研黃丹半兩桑白皮新者蜜陀僧龍骨各四兩右為細末乾摻之雙金散出楊氏家藏方傅貼金瘡斂口定痛生肌乳香半兩研檳榔黃連黃丹火飛龍骨訶子去核焙各一兩右為細末乾貼瘡口三白膏出聖惠方治金瘡生肌白芨白斂甘草生用各半兩白芷熟乾地黃各三分豬脂半斤煉了者右為細末入豬脂內熬成膏候冷日三四度塗之生肌膏出聖惠方治金瘡兼治一切打損瘡白芍藥薰陸香胡粉乾薑炮製銼各一兩油四兩蠟二兩右為細末以油蠟相和煎如膏用貼瘡上日二換之止血收瘡口方出危氏方白膠香主接筋老松皮白芷龍骨血竭各一兩右為末傅之如瘡大者以燈心蘸入孔中止血收瘡口出鮑氏方土朱二兩用瓦盛瓦上火煉一日人骨火煉者老松皮龍骨各等分右為細末傅之妙麒麟竭散出聖惠方治金瘡定痛止血滅瘢麒麟竭别研突厥白别研各二兩蜜陀僧别研如麩一兩石灰以小便一斗浸三五日後飛淘極細暴乾稱一斤右合研令細但是金刃所傷厚以散傅之以帛封裹勿令著風及露水三日後開不見瘢䀶一方加小鷹糞二兩治金瘡兼治一切打損方出聖惠方乳香二兩羊腎脂一兩蠟二兩油半斤右以油和煎藥如膏綿濾過置不津器中旋取塗於瘡上神驗生肌膏出聖惠方治金瘡炙瘡火燒瘡等檳榔一枚薰陸香半兩杏仁二七枚去皮研如膏右為細末以煉了豬脂二合黃蠟如胡桃仁大入杏仁膏同煎令膏成以瓷盒盛每用攤於帛上貼之檳榔散出危氏方治長肉止痛生肌檳榔黃連木香各等分右為細末傅貼瘡上神驗一方無木香金瘡生肌散出十便良方甘草一斤炙黃蘗八兩當歸四兩右搗末以封瘡上日再禁聲飲子出危氏方治棒杖刀斧傷疼痛不可忍者防風去蘆南星湯洗右銼散每服三大錢水酒各半盞生薑捶碎同煎通口服甚者不過三服立效灰韭散止血收瘡口方見金瘡血不止類牡蠣散出聖惠方治金瘡止痛牡蠣二分熬石膏一分右下篩以粉瘡痛即止或用煉了豬脂調傅亦妙松皮散出危氏方治金刃箭鏃傅瘡口兼能生肉老龍皮二分末生石灰二停礦者用瓦盛上用瓦蓋炭火四畔上下煉一夜冷取研細右為末傅之止血收瘡口立效治金瘡苦痛出千金方用楊木白皮熬令燥為末以溫酒服方寸匕日三又以傅瘡上愈治金瘡及刺瘡痛不可忍者出千金方用䓤一把以水三升煮數沸取漬洗之能止痛治金瘡止血生肉方出聖惠方用青木綿布燒灰乾揾患處如舊者洗淨燒灰妙生肌斂瘡方用白附子為細末急貼傷破處治金瘡并斂瘡口出仁存方用千年石灰不拘多少為末炒煙出用油紙撚點燒攪白放冷研細末任意用之或以新石灰為末傅之亦得劉寄奴散出危氏方治斂金瘡口止疼痛取劉寄奴一味為末摻患處一方治湯火瘡以劉寄奴為末先以糯米漿雞翎掃傷處後摻藥末在上並不痛亦無痕大凡湯著急用炙鹽末摻之爛囱上面然後藥傅之朱氏集驗方云宋髙祖劉裕微時伐狄見大蛇長數丈射之傷明日復至聞有杵臼聲往視之見青衣童子數人於榛中搗藥問其故答曰我王為劉寄奴所射合藥傅之帝曰侮神何不死答曰寄奴王者不死不可殺帝叱之皆散收藥而反每遇金瘡傅之良驗寄奴髙祖小字也治金瘡生肌破血補損出聖惠方用紫葛二兩細銼以順流水三大盞煎取一盞半去滓食前分溫三服酒煎亦妙療金瘡生肌肉生搗薤白以火封之更以火烘炙令熱氣徹瘡中乾則易之白色者好亦治金瘡中水腫痛止血收瘡口方出聖惠方用雞內金焙為末傅之立止治金瘡止痛出聖惠方用馬蹄燒灰三指撮以酒和服之或用燒酒亦得治刀鐮斧所傷經年不可者用皂角一梃水浸打碎春五夏三秋七冬十用文武火熬膏貼又方用甘遂三四月採一擔以水大鍋熬一桶半熬半碗用磁器盛放膏藥旋攤治釘鐵擉傷手足腫痛不可忍用合菌細嚼傅於傷處一日三次换貼即愈金瘡藥草靈散出家藏經驗方韭菜刺薊草試劔草右於五月五日各取一斤不用根洗擇淨同搗爛如泥次入絹篩石灰不拘多少再搗令十分勻揑作餅子以瓦盆盛貯安置淨室中至六月六日晒令極乾收如常用之兒婦之兄李中父曉藥性云刀瘡藥無出於此治葛蛇銜膏出聖惠方治金瘡生肌蛇銜薔薇根續斷治葛各二兩當歸附子各一兩半去皮防風黃芩澤蘭各一兩松脂柏脂各三兩右㕮咀以豬脂三斤煎之别以白芷一枚內中候色黃即成膏去滓濾密器收之以塗瘡無問大小皆瘥不生膿汁也一方用羊腎膒脂不用柏脂生地黃散出朱氏集驗方生地黃川芎赤芍藥生藕節當歸藝薹子川芒硝荆芥馬齒莧各一兩隂乾右為細末和勻酒煎蘇木取酒調藥二大錢無時候服如血不甚發熱減芒硝加桃仁荷葉乾桃花散貼法出朱氏集驗方乾地黃生桃木取白皮劉寄奴葉枯桐皮取白皮生薑左纒藤葉國丹各等分右為細末和勻用生餅酒調塗損處如因損而成風則加服風損藥天蛾散外臺祕要治刀斧傷止血定痛生肌用晚蠶蛾不以多少為細末每服用藥貼於瘡上用綿裹不須再動一上便可亦治一切金瘡治金瘡生肌止血出本草以鐺墨研塗瘡側面慎勿塗令墨入肉成印治金瘡止痛斷血生肉出本草用豬膏莓搗封之治金瘡止血生肌出本草取五月五日採露草取之一百種隂乾燒作灰井華水和石灰為團燒令白刮傅瘡上治金瘡止血生囱令瘡黑出本草以燈花末傅之治金瘡折傷內損生肌肉出本草以無名異以醋磨塗傅所苦處治金瘡止痛止血生肌出本草取桑柴灰研傅瘡上佳治金瘡止血生肌合膚出本草用墨以醋磨傅之治金瘡止血長肉出本草以漏蘆搗傅之治金瘡大止血生肉止疼痛出本草以青蒿生挼傅瘡良也治金瘡長肉出本草用􅖳丹傅之治金瘡疥癬生肌止血出本草以栟櫚木皮燒灰傅之治金瘡止血長肌出本草取金瘡小草葉挼碎傅之又預加石灰杵為丸日乾臨時括傅治金瘡出本草取火槽頭炭刮取傅之瘡上止血生肉定血散治刀斧傷止血定痛生肌蜜陀僧半斤烏賊魚骨白礬灰龍骨各二兩桑白皮一斤黃丹一兩右為細末每用乾摻定血如神白芷膏出聖惠方治金瘡止血生肌白芷熟乾地黃焙一作生者當歸切焙各一兩半白斂一兩芎藭一兩一分蜀椒去目并閉口炒去汗二合附子炮製去皮臍三分甘草各半兩右細銼以豬脂五斤合和煎三上三下藥成膏去滓軟鞕得所每日塗瘡上頻塗即效一方無芎藭治金瘡止血生肌用琥珀和大黃鱉甲為末酒下方寸匕能下惡血婦人腹內血盡即止石灰膏一名杏仁方出聖濟總録治金瘡止血定痛生肌方見本門金刃所傷類治金瘡生肌破血補損用琥珀研為細末傅之又方用石蠶摩傅之普濟方卷三百三
