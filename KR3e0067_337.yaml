body:
  text: 普濟方卷三百三十七明周王朱橚撰妊娠諸疾門養胎胎教附論夫至精絶化一氣方凝始受胎胞漸成形質子在腹中雖無聽聞自妊娠之後則須行坐端嚴性情和悅常處淨室多聽美言令人讀誦詩書陳説禮樂耳不聞非言目不視惡事如此則生男女福夀敦厚忠孝賢明不然則男女既生率多鄙賤不夀而遇災此所謂因外象而內感也昔太姒妊娠文王目不視惡色耳不聽惡聲口不談惡言世傳胎教之道蓋謂此也前論亦略敘之矣若夫婦人有終身無子者何也按巢氏病源云婦人無子者蓋有三焉一者墳墓不嗣二者婦人年命相尅三者夫疹婦病皆令無子若夫疹婦病可以服藥之後能有子相尅則難逭今觀是説亦未盡善有人以婦人無子問西京常器之者答曰女人自少多病服燥藥無節用使天癸耗動早傷故終身無子又有襄陽宋大亨者亦云然若婦人妊娠有兩胎者何也余按古今方書並無論及此者惟巢氏論云陽施隂化精氣有餘故生二胎且謂成一胎之後則精有幾今觀婦人有兩胎者其精神氣宇略無小異至於數有兩胎或間兩胎者有俱男俱女者有一男一女者道藏經論云有求子法云婦人月信初止一日後三日五日值男女旺相日陽日陽時交合有子多男若男女稟受皆壯則多子一有怯弱則少子以此推之理可槩見焉又婦人妊娠男女之别何也按顱𩕄經陽盛發隂當孕成男六腑諸經皆舉其陽隂盛發陽當孕成女六腑諸經皆舉其隂巢氏病源云三陽所會則生男三隂所會則生女葛洪肘後方云男從父氣女從母氣聖濟經云天之德地之德稟隂陽之至和用為流轉於一體因氣左動則屬陽陽資之成男因氣右動則屬隂隂資之成女大易所稱乾道成男坤道成女此男女之别也凡妊娠有疾投以湯藥有傷破血者忌之何也內經云婦人重身毒之奈何岐伯答曰有故無殞衰其大半而已也蓋妊娠有疾不可不投藥也必有醫者審度疾勢輕重量度藥性高下處以中庸不必多品視其疾勢已衰藥冝便止則病去母安子亦無損復何懼於攻治哉凡婦人妊娠十月其説見於古書有不同者多矣按巢氏病源婦人妊娠一月名始胚足厥隂脈養之二月名始膏足少陽脈養之三月名始胎當此之時血不流行形象始化未有定儀見物而變欲子端正莊嚴常令見貴人不可見狀貌醜惡人也欲生男冝操弓矢乘牡馬欲生女宜施珥璫環珮欲子美好玩白璧觀孔雀欲子賢能冝看詩書習雅務手心脈養之四月始受水精以成血脈手少陽脈養之五月始受火之精以成其氣足太隂脈養之六月始受金精以成其筋足陽明脈養之七月始受木精以成其骨手太陽脈養之八月始受土精以成其膚革手陽明脈養之九月始受石精以成其毛髮足少隂脈養之十月五臟六腑關節人神皆備此其大備也又五臟論有稱耆姿者論一月如珠露二月如桃花三月男女分四月形象具五月筋骨成六月毛髮生七月逰其魂而能動左手八月逰其魄而能動右手九月三轉身十月受其氣足更有稱張仲景者亦然又顱𩕄經云一月為胎胞精血凝也二月為胎形成胚也三月陽神為三魂四月隂靈為七魄五月五行分五臟也六月六律定六腑也七月精光竅通光明也八月元神具降真靈也九月宫室羅布以定生人也十月受氣足萬象成也今推究數説之理如五臟論者類皆淺陋不經往往妄託其名至於三藏佛書且語涉怪誕謾不可考今按顱𩕄經三卷云中古巫方所撰隋人巢氏方亦嘗序之今巢氏論婦人妊娠乃不見言之聖濟經原化篇亦獨取顱𩕄經更不言巢氏論者何哉嬰童寶鑑集云小兒方論起自巫方黃帝云吾不能療小兒賴國有巫方能知小兒之夀夭也所相傳者有小方中古今巫方略小兒則取於顱𩕄經則是未盡其理故不言之焉及觀巢氏論小兒候亦云若聖濟經者但取其文句下若巢氏之論其間有胎教之法為可取所以巢氏論妊娠至三月始胎之時欲令見貴人莊嚴若操弓矢施環珮觀孔雀讀書之類豈非胎教之理乎嘗試推巢氏所論妊娠脈養之若足厥隂肝脈也一臟腑之經餘如此且四時之令始於木故十二經之養胎於肝也所以一月二月手心主心胞絡脈也手少陽三焦脈也屬火而憂旺所以養胎三月四月也屬手少隂心手少陽小腸者以君主之官無為而尊也足太隂脾脈也足陽明胃脈也屬土而旺長夏所以養胎而五月六月手太隂肺脈矣手陽明大腸脈也屬金而旺秋所以在養胎七月八月足少隂腎脈也屬水而旺冬所以養胎九月又况母之腎臟繫於胎氣脈以養然後待時而生此論之奧微而又有至理餘書所論皆不能及也觀此巢氏之論世更有明之者亦未有過於巢氏之論矣余因主其説又曰王氏脈經云産育人倫莫不愛重今世希見論者且謂凡夫婦配合隂陽竒耦乾道成男坤道成女天元既已妊娠自可將護胎息無犯禁忌生子必賢明夀考今人嗜欲為樂輕棄性命反又房勞不自節之亦有時因房勞絡脈滿而經脈虛運動之間胎氣亦隨經絡所積腹傷胎墮子皆從此損雖間有降生必逆惡早夭則患胎經變生諸病救療豈不晚哉又曰凡妊娠臟腑經脈關節壅塞切忌晝寢不可等間服藥針炙思憂悲慮驚恐胎孕時須要頻頻行步寬緩日三千步用溫酒濯足不可澡浴以防水氣衝胎難保無難八九月食葵菜臨産宜軟粥飯或爛煮雌雞取汁煮粥溫酒飽食則氣順必能易分娩自然無病飢渴氣乏大冷大熱勿食又云孫真人云凡妊娠唯在抑陽助隂素問隂摶陽則謂之胎蓋關前為陽關後為隂尺中之脈按之摶手而不絶者妊子也婦人平居陽氣微盛無害及其妊子則方閉經隧養胎氣若陽盛摶之則經血旺行胎乃不固素問隂虛陽摶謂之崩其抑陽助隂之方甚多然胎前唯惡羣隊若隂陽調勻有益交雜别生他病惟內補丸服之使陽不至強隂不至弱隂陽調勻有益胎嗣此前人未嘗論及二味熟地四兩酒浸當歸二兩酒浸將息以全人命更得名醫喻諸人幸莫大焉氣質生長具天地之性集萬物之靈隂陽平均氣質完偹其理應爾然而竒耦異數有盈有耗剛柔異用或強或羸血榮氣充不能逃於消息盈虛之理則稟受之初詎可一槩論是以附贅埀疣駢脢枝指侏儒跛足形氣所賦有如此者瘡瘍癰腫聾盲瘖啞瘦瘠疲瘵氣形之病有如此者然則胚胎造化之始精遺氣變之後保衛輔翼固有道矣天有五氣各有所湊地有五味各有所入所湊有莭適所入有度量凡所畏忌悉知戒慎資物為養者理固然也寢興以時出處以節可以髙明可以周密使霧露風邪不得乘其間而入因時為養者理冝然也以至調喜怒寡嗜欲作勞有節而氣血從之皆所以保攝妊娠使諸邪不得干焉茍不然方授受之時一失調養則內不足以為中之守外不足以為身之強氣形弗充而病因之若食兔缺唇食犬無聲食雜魚而瘡癬之屬皆以食物不戒故也心氣大驚而癲疾腎氣不足而解顱脾胃不和而羸瘦心氣虛乏而神不足之屬皆以血氣不調之過也誠能食飲知所戒推而逹之五味無所傷誠能於氣血知所調推而逹之邪氣無所乘茲乃生育相待而成者故曰天下人不困妊娠之人有宿挾疴瘵而後有孕時節適乖以致生疾病並有腑臟衰損氣力虛羸令胎不長故須服藥去其疾病令有血氣以養扶胎者也妊娠將理無方脾胃不足飲食減退不行榮衛化精微養衝任令胎臟內弱子氣不足故巢氏病源方調母療母則胎安是也若使脾胃和而能飲食穀水化而運氣血則何慮胎氣不長也又云人由受氣至於有生十二經脈迭相滋養猶之物也得寒溫之正土地之冝無物不長凡胎處胞中或有萎燥者蓋由妊婦所稟怯弱不足自周隂陽血氣偏係非冷即熱胞失於滋所以萎燥而不長也日月雖過不能生育亦有損墮胎孕者惟冝資母血氣脾隂陽調通本末相應則胎安而有養矣又云妊娠一月謂之始形二月謂之始稿三月謂之始胎當是之時血氣不流形象始化男女分形當其形未分緣感而孕所以孕婦欲令見榮貴端正之人不欲見傴僂侏儒之􅒰及猿猴犬馬怪禽異獸仍夜卧冝息心靜氣慎勿亂思恐形異夢而不祥也妊娠所以擇食者蓋孕假五氣五味生成五臟氣味各隨所喜而歸之隂陽相應論曰酸生肝苦生心甘生脾辛生肺醎生腎假五味以生也六節藏象傳曰燥氣湊肝焦氣湊心香氣湊脾腥氣湊肺腐氣湊腎此五臟假五氣以成形也若形藏未備則隨其不足而孕婦必欲其氣味食之蓋陽為氣隂為精氣化則精生味化則形長誠以人之生也氣本於天形本於地內經謂天食人以五氣地食人以五味正此之謂若夫天地既分質不完者皆孕婦擇食之時不得其氣味故視斜覷短偏瞽雙盲手攣足跛腰傴背僂此肝形之不備也言遲語吃或瘖或㿉神氣昏塞此心形之不備也胸背凸凹舌短唇缺此脾形之不備也毫毛踈薄髮鬢秃落或毫毛通白皮膚偏赤此肺形之不備也毛髮焦黃形體小黑五鞕五軟嵗不長此腎之形不備也由是孕婦擇食假其氣味生成五臟一有不備病輒隨之譬猶陶冶成器若或苦窳是水火之利不齊也方烏䳄雞湯治妊娠一月名始胚飲食精熟酸美受御冝食大麥毋食腥辛是謂始正妊娠一月足厥隂脈養不可針炙其經厥隂內屬於肝肝主筋及血一月之時血行否澀不為力事寢必安靜令無恐畏妊娠一月隂陽新合為胚寒多為痛熱多卒驚舉重腰痛腹滿胎胞急卒有所下當預安之冝服烏䳄雞一隻治如食法茯苓阿膠各二兩甘草生薑各一兩吳茱茰一升麥門冬五合人參芍藥白术各三兩右㕮咀以水一斗二升煮雞取汁六升去雞下藥煎之用三升內酒三升并膠煬盡取三升放溫每服一升日三服補胎湯大全良方若曽傷一月胎者當預服此方細辛一兩防風二兩乾地黃白术各三兩生薑四兩吳茱茰大麥冬各五合烏豆一升右㕮咀以水七升煮取二升半分三服先食服寒多者倍細辛茱茰熱多者去之加秳蔞根二兩若有所思去大麥加柏子仁三合一方有人參一兩忌生菜蕪荑桃李雀肉等物艾葉湯一名雞艾湯出千金方治妊娠二月名始藁無食辛燥居必靜處萬事勿勞百節皆通是為胎始結妊娠二月足少陽脈養不可針炙其經足少陽內屬於膽主精二月之時兒精成於胞裏當慎護驚動也妊娠二月始隂陽踞經有寒多栗不成有熱即萎悴中風寒有所動搖心滿臍下懸急腰背強痛卒有所下乍寒乍熱艾葉丹參當歸麻黃各二兩人參阿膠各三兩甘草四分生薑六兩大棗十二枚右㕮咀以酒三升水一斗煮減半去滓內膠煎取三升分三服一方用䳄烏雞半隻宿肥者治如食法割頭去血內三升酒中相和次以水一斗二升先煮取汁去雞肉內藥煎取三升內血酒并膠煎取三升分三服忌海藻菘菜黃連湯出千金方若曽傷二月胎者當預服此黃連人參各一兩吳茱萸生地黃各五兩一方用阿膠右㕮咀以酢漿七升生薑三兩煮取三升分四服日三夜一每十日一修合若頗覺不安加烏梅一升煮不用􅀢直用水一方用當歸五錢忌諸冷水蕪荑雄雞湯出千金方治妊娠三月名始胎當此之時未有定儀見物而化欲生男者操弓矢欲女者弄珠璣欲子美玩璧玉欲子賢冝端坐清虛是為外動內感者也妊娠三月手心主脈養不可針炙其經手心主內屬於心無悲哀思慮驚動妊娠三月為定形寒大便青熱小便難不赤即黃卒嗔恐憂思嗔怒喜頓什動於經脈腹繞臍苦痛或腰背若有所下雄雞一隻治如食法黃芩白术生薑各一兩麥門冬五合芍藥四兩大棗十二枚甘草人參茯苓阿膠各二兩右㕮咀以水一斗五升煮雞減半出雞內藥煮半內清酒三升并膠煎取三升分三服一日令盡當溫卧一方用當歸芎藭各二兩不用黃芩生薑忌海藻菘菜鮮物桃李雀肉等茯苓湯出千金方若曽傷三月胎者當預服此茯苓丹參龍骨各一兩阿膠當歸甘草人參各二兩大棗十二枚赤小豆二十一粒右㕮咀酢漿一斗煮取三升分四服先食服七日後服一劑腰痛者加桑寄生二兩一方有薤白二兩麻子一升忌同前一方用水煎服菊花湯一名麻黃雌雞湯出聖惠方治妊娠四月受水精以成血脈食冝稻粳羹魚雁節飲食飬血氣通耳目而行經絡妊娠四月手少陽脈養不可針炙其經手少陽內輸三焦四月之時而六腑順成當靜形體和心志節飲食妊娠四月寒心下愠愠欲嘔胸膈滿不欲有熱小便苦數如淋狀臍下苦急卒中風寒脛項強痛寒熱或驚動身軀腰背腹痛往來有時胎上追胸心煩不得安卒有所下菊花雞子大一枚麥門冬一升大棗十二枚人參一兩五錢甘草當歸各二兩麻黃去莭阿膠各三兩半夏四兩生薑五兩右㕮咀以水八升煮減半內清酒三升并阿膠煎取三升分三服溫卧當汗以粉撲之護風寒四五日一方用烏雌雞一隻煮水煎藥忌羊肉海藻菘菜餳等調中湯出千金方若曽傷四月胎者預服此白芍藥生薑各四兩厚朴生李根白皮枳實白术柴胡各三兩續斷芎藭甘草各一兩當歸二兩烏藥一升右㕮咀以水一斗煮取三升分四服日三夜一八日之後復一劑一方有半夏二兩忌海藻菘菜桃李雀肉阿膠湯一名旋復丸湯出千金方治妊娠五月始受火精以成其氣卧必晏起沐浴换衣深其居處厚其衣服朝吸天光以避天寒時殃其食稻麥其羹牛羊和以茱茰調以五味是為氣養以定五臟又云妊娠五月是太隂脈養不可針炙其經足太隂內輸於脾五月之時兒四肢皆成無令大飢無甚飽無食乾燥無自炙熱無大勞倦妊娠五月毛髮初生有熱苦頭眩心亂嘔吐有寒苦腹滿小便數卒有恐怖疼痛寒熱胎動無常處腹痛悶煩欲卧若有所下旋復花二合人參一兩生薑二錢當歸芍藥甘草黃芩各二兩吳茱茰七合阿膠四兩麥門冬一升右㕮咀以水九升煮藥減半內清酒三升并膠微火煎取三升半分四服日三夜一先食服便愈不瘥再服一方用烏雞一隻割取咽血內酒中以水煮雞藥減半內酒并膠煎取三升半分四服忌海藻菘菜安中湯出千金方曽傷五月胎者預服此黃芩一兩當歸芎藭乾地黃人參各二兩甘草芍藥各二兩生薑六兩麥門冬一升五味子大麻黃各五升大棗十二枚右㕮咀以水七升清酒五升煮取三升分四服日三夜一七日服一劑忌如前麥門冬湯一名人參雌雞湯出千金方治妊娠六月始受金精以成其筋身欲微勞無得靜處出逰於野數觀走犬及視走馬冝食鷙鳥猛獸之肉是謂變腠理鈕經以養其力以堅背膂妊娠六月足陽明脈養不可針炙其筋足陽明內屬於胃主其口目六月之時兒口目皆成調五味食甘美無太飽妊娠六月卒有所動不安寒熱往來腹內脹䐽身體腫驚怖忽有所下腹痛如欲産手足煩疼麥門冬一升人參甘草黃芩各二兩乾地黃阿膠四兩生薑六兩棗十五枚右㕮咀以水七升煮減半內清酒二升并膠煎取三升分三服每如人行三四里中間進糜粥一方用烏雌雞一隻煮水以煎藥忌海藻菘菜蕪荑柴胡湯出千金方若曽傷六月胎者當預服此柴胡四兩蓯蓉一兩白术芍藥一作紫苑甘草麥門冬芎藭各二兩生薑六兩乾地黃五兩大棗三十枚右㕮咀以水一斗煮取三升分四服日三夜一中間進糜粥勿食生冷及堅硬之物七日更服一劑大全方黃芩二兩忌海藻菘菜蕪荑桃李雀肉等蔥白湯出千金方治妊娠七月始受木精以成其骨勞身搖肢無使定止動作屈伸以遲血氣居處必燥飲食避寒常食稻粳以密腠理是養骨而堅固齒妊娠七月手太隂脈養不可針炙其經太隂內屬肺主皮毛七月之時其皮毛已成無大言無號哭無薄衣無洗浴無寒飲妊娠七月忽驚恐搖動腹痛足有所下手足厥冷脈如傷寒煩熱腹滿短氣常若頸項及腰背強常冝服蔥白長三四寸十四根半夏麥門冬旋復花黃芩一兩人參一兩五錢甘草當歸黃耆各三兩阿膠四兩生薑八兩右㕮咀以水八升煮減半內清酒三升及膠煎取四升每服一升日三夜一溫服常汗出若不出者加麻黃二兩煮服如前法若秋後勿強出汗一方以黃雌雞一隻割咽血取血內酒中煮雞取汁以煎藥大全方忌羊肉餳海藻及菘菜等杏仁湯出千金方若曽傷七月胎者當預服此杏仁甘草紫苑各一兩鍾乳乾薑各三兩麥門冬去心吳茱茰一升粳米五合五味子三合右㕮咀以水八升煮取三升半分四服日三夜一中間進食七日服一劑一方用白雞一隻煮汁黃雌雞亦可用酒二升煎藥大全方忌海藻菘菜芍藥湯出大全良方治妊娠八月始受土精以成膚革和心靜息無使氣急是謂密腠理而光澤顔色妊娠八月始手陽明脈養不可針炙陽明內屬於太陽主九竅八月之時兒九竅皆成母調護尤宜謹慎無食燥物無輒失食無忍大飢妊娠八月中風寒有犯觸身體盡痛乍寒乍熱胎動不安常苦頭眩痛繞臍下寒時小便白如米汁或青或黃使寒燥腰背苦冷而痛目昏昏右㕮咀以水五升清酒四升合煎取三升分三服日二夜一一方用雌雞煮汁煎藥大全方忌海藻菘菜桃李雀肉等葵子湯出千金方若曽傷八月胎者當預服此葵子二升甘草厚朴各二兩白术柴胡各三兩芍藥四兩生薑六兩大棗二十枚右㕮咀以水九升煮取三升分三服日二夜一凡十日一劑一方用烏雌雞一隻煮水煎藥大全方忌海藻菘菜桃李雀肉等半夏湯出千金方治妊娠九月始受石精以成皮毛六腑百節莫不畢偹體佚食甘緩帶自持而待之是謂養毛髮致才力妊娠九月足少隂脈養不可針炙其經足少隂內屬於腎腎主續縷皆成無處濕冷炙衣妊娠九月若卒得下痢腹滿懸急胎上衝心疼痛不可