野異域則所産有多寡之冝吉事有祥則所夢兆有各應之類是故揚豫薄壤多女雍冀厚壌多男熊羆為男子之祥蛇虺為女子之祥是皆理之可推也胎化之法有所謂轉女為男亦皆理之自然如食牡雞取陽精之全於天産者帶雄黄取陽精之全於地産者操弓矢持斧斤取剛物之見於人事者氣類潛通造化宻移必於三月兆形之先蓋方儀則未具陽可以勝隂變女為男理固然也又云張華慱物志曰姙娠必謹所感感於善者生子必善感於惡者生子必惡故不可見惡物異禽毒獸切忌食驢馬犬兎龜鱉鵝鴨無鱗魚粘膩難消化諸物葱薑乳餅等属用醬和藿食損胎難産惟務簡静動止有莭三箇月之後聽誦讀經典諷詠詩書静處飬心目不視惡色耳不聽惡聲如此生子必賢明端正忠孝夀考也方丹參丸出千金方治婦人始覺有孕養胎并轉女為男丹參續斷芍藥白膠白术栢子仁甘草各二兩人參芎藭乾薑各三兩吳茱茰橘皮當歸各一兩白芷冠纓燒灰各一兩乾地黄一兩五錢蕪荑十八銖犬卵一具乾東門上雄雞頭一枚右為末蜜和丸如梧桐子大酒服十丸日再稍加至二十丸又方出千金方用蠶一枚以井花水服之日三服轉女為男者蓋陽施隂化所以有娠遇三隂所會多生女子但懐娠二月名曰始藏精成為胞至於三月謂之始成胎血脈不流象形而變是男女未定故令於未滿三月間服藥方轉令生男也以斧置姙娠床下繋刃向下勿令人知恐不信者令待雞抱卵依此置窩下一窩盡出雄雞神效如此雖未試亦不可不知者一法覺三月尿雄雞糞處凡受胎三月逐物變化故古人立胎教能令生子良善長夀忠孝仁義聰明無疾蓋須十月内常見好景象毋近邪僻真良教也如有觸忤傷胎各有治法初覺有娠時可轉女成男出千金方取弓努弦縳婦人腰下滿百日去之一法絳囊盛帶左臂紫宫玉女秘法取雄雞尾尖上長毛三莖潛安婦人卧蓆下勿令知之驗又法取夫髮及手足甲潛安卧蓆下勿令人知姙娠纔滿三月要男法出千金方以雄黄半兩衣中帶之要女者以雌黄帶之一方絳囊盛帶之惡阻附論夫姙娠阻病者謂之子病巢氏病源謂之惡阻若禀受怯弱有風氣或有痰飲旣姙娠便有是病有其狀顔色如故脈息和順但覺肢體沉重頭目昏眩擇食惡聞食氣好食酸醎甚者或作寒熱心中憤悶嘔吐痰水胸膈煩滿恍惚不能支持初姙皆然但疾有輕重耳輕者不服藥亦不妨重者須以藥療之冝服半夏茯苓丸二方専治阻病然此二藥比來少有服者半夏有動胎之性蓋胎初結慮其易致寒熱發作不可不謹也張仲景傷寒論云婦人傷風續得寒熱發作有時此為熱入血室有用黄龍湯小柴胡湯去半夏此蓋為姙婦而設也冝以白术散或人參丁香散人參橘皮飲子試之亦效皆不用半夏動胎等藥服者知之水飲倚積結聚為痰人皆有之少者不能為害多者成病必且妨害飲食乃至嘔逆姙娠之病若嘔甚者傷胎也原病之由皆謂氣不調或風寒乘之冷入於胃故成斯病也亦惡阻之一也又曰婦人所食糓味化為血氣下為月水凡姙娠之初月水乍聚一月為腜二月為胚三月為胎胎成則男女分食於母之血焉則腜胚之時血氣未用五味不化中氣壅塞所以脾胃不思糓味聞見於物故惡心有所阻也其病心中憤悶頭重目眩四肢怠惰惡聞食氣是矣姙娠之初經随内閉以氣養血當是之時腸胃茹雜散入焦膈若素有痰飲輙飲與血摶食則嘔吐頭目旋暈憎聞食氣喜啖酸醎四肢倦怠不勝支持多卧少起厭厭懶墮名曰惡阻已産之後胞外餘血敗瘀流利名曰惡露蓋惡者不善不净之義阻者阻截之義血摶痰飲伏於胞絡難除也當漸消之内裹於胞臟隨胎而至不可遲也當亟逐之故胎前惡阻病者心中憤悶頭重脹眩四肢沉重懈惰不欲執作惡聞食氣欲噉酸醎多睡少起世云惡食是也乃至滿三月四月日已上大劇者不能勝舉也此由婦人本體虚羸血氣不足骨力又弱兼當風受冷太過心下有痰水挟之而有姙娠旣已痰水漬於臟氣不宣故心煩憒氣逆則嘔吐血旣不通經絡痞澁則四肢沉重被風則頭眩故有胎而病惡阻也所謂欲有胎者其人月水尚未來而顔色皮肉如常但加沉重憒悶不欲飲食不知患所在脈理順緒四時平和即是欲有胎也方半夏茯苓湯出千金方治姙娠阻病心中憒悶空煩吐逆惡聞食氣頭眩體重四肢百節疼痛沉重多卧少起惡寒汗出漸極黄瘦半夏生薑各三十銖乾地黄茯苓各三十銖橘皮旋復花細辛人參芍藥芎藭桔梗甘草各十二銖右㕮咀以水一斗煮取三升分三服若病阻積月日不得治及藥服冷熱失候病變客熱煩渇口生瘡者去橘皮細辛加前胡知母各十二銖若變冷下痢者去乾地黄入桂心十二銖若食少胃中虚生熱大便閉塞小便少者加大黄十八銖黄芩六銖餘依方服一劑得下後消息者氣力冷熱増減方調定更服一劑湯便急服茯苓湯丸令能食有力便強徤也忌生冷酸滑油膩菘菜海藻一方加棗二枚名半夏湯衛生寳鑑無細辛三因方無旋復花有紫蘓葉茯苓散出千金方治姙娠阻病患心中煩悶頭眩重増聞飲食氣便嘔吐悶煩顚倒四肢埀弱不自勝持服之即效要先服半夏茯苓湯兩劑後可服此常服此藥消痰水令能食強力養胎茯苓去皮人參去蘆桂心熬乾薑炮半夏一方洗七次炒黄橘皮各一兩白术葛根甘草炙枳實各三兩右為末蜜和丸如梧桐子大米飲服二十丸漸加至三十丸日三服肘後方無乾薑半夏橘皮白术葛根只五味又云姙娠忌桂一方有麥門冬忌海藻菘菜羊肉餳糖桃李雀肉鮓陳橘皮丸治姙娠阻病心中煩悶頭眩惡聞食氣常嘔吐悶亂顚倒四肢怠惰不自勝舉先服半夏茯苓湯兩劑後次服此陳橘皮去白炒白茯苓去黒皮各一兩白术甘草乾薑炮半夏温水洗去滑枳實去穣炒各二兩右為末煉蜜和丸塗酥為劑搗令勻熟如梧桐子大毎服二十丸生薑湯下食前服治姙娠惡阻嘔吐不止頭痛全不入食服諸藥不效者用此藥理血歸原則愈出大全良方人參甘草川芎當歸赤芍藥丁香各五錢白茯苓白术陳皮各一兩苦梗炒枳殻去穰炒各一分半夏泡洗七遍切炒黄一兩右㕮咀每服三錢加生薑五片棗一枚煎麥門冬出聖恵方治姙娠心煩憒悶虚燥吐逆惡聞食氣頭眩四肢沉重百節疼痛多卧少起麥門冬子芩赤茯苓一兩柴胡赤芍藥陳皮人參苦梗桑寄生甘草旋復花各五錢生地黄二兩右為麄末每服四錢水一盞薑半分煎至六分去滓無時溫服安胎飲出永類鈐方治懐三月四月至九月胎惡阻病心中憒悶頭眩目昏四肢沉重懈怠不欲執作惡聞食氣欲啖醎酸多卧少起嘔逆不食或胎動不安非時不能轉動腰腹疼痛或不時下血及姙娠一切疾病並皆治之甘草茯苓去皮當歸去蘆熟地黄酒蒸焙芎藭白术黄茋去苖白芍藥半夏泡洗七次切炒阿膠切粉炒地榆各等分右㕮咀每服三錢水一盞半生薑四片煎至八分去滓温服無時候如或惡食但以所思之物任意與之必愈按姙娠禁忌食物雞鴨鯉魚膾兎犬驢騾山羊肉魚鱉葅雞雀桑椹又按胎教論云令母常居静室多聽美言聽人講論詩書陳說禮樂耳不聽非言目不視惡事心不起邪念能令生子敦厚福夀忠孝仁義聰明無疾斯乃聖人所留胎教也一方無半夏地榆有人參桑寄生一方無白术黄耆半夏地榆有艾葉又名膠艾湯加白茯苓枳殻丸治姙娠阻病心中煩悶頭眩聞食氣即嘔吐逆四肢無力不自勝舉枳殻麩炒㣲黄去穣人參去蘆肉桂去麄皮半夏湯洗七遍去滑白术葛根剉白茯苓各一兩麥門冬一兩五錢去心焙乾薑炮甘草炒赤各三兩陳橘皮湯浸去白皮焙一兩右為末煉蜜和搗二三百杵丸如梧桐子大每服不拘時候以生薑粥飲下三十丸茯苓湯治姙娠惡阻嘔逆惡心四肢疼痛惡聞食氣怔冲煩悶多損墮宜安胎調勻血脈白茯苓去皮旋復花各二兩陳橘皮一兩五錢芎藭人參桔梗去蘆頭炒甘草炒令赤色芍藥各一兩五錢生乾地黄二兩五錢細辛去苖一兩右麄搗篩每服三錢匕水一盞同煎至六分去滓溫服不拘時候旋復半夏湯治姙娠阻病心下憒悶嘔逆不食惡聞食氣頭暈四肢百節煩悶多卧少起旋復花去枝蕚芎藭細辛人參甘草炙以上各五錢半夏湯泡七次赤茯苓去皮當歸去蘆頭酒浸乾生薑陳皮去白以上各一兩右㕮咀每服四錢水一盞半薑五片煎至七分去滓温服不拘時候桔梗湯治姙娠阻病心中憒悶虚煩吐逆惡聞食氣頭眩體重四肢疼痛煩熱多卧少起惡寒汗出羸瘦桔梗剉炒半夏湯洗七遍去滑白茯苓去黒皮細辛去苖葉芎藭人參甘草芍藥各一兩熟乾地黄㣲炒三兩右㕮咀每服五錢以水一盞半生薑五片同煎至六分去滓温食後日二服半夏飲治姙娠惡阻心中憒悶聞食氣即吐逆四肢百節疼痛多汗黄瘦半夏湯洗去滑生薑汁製白茯苓去黒皮各三分細辛去苖葉旋復花桔梗赤芍藥陳橘皮去白炒甘草炙各五錢熟乾地黄焙一兩一分右㕮咀每服三錢水一盞入生薑五片同煎至七分去滓空心食前温服茯苓湯治憂怒并氣攻血溢停留胃脘惡聞血腥嘔吐食飲不下姙娠中脘宿冷冷血侵皮惡聞食氣病名惡阻半夏一兩湯洗七遍茯苓熟地黄各二兩橘皮細辛人參芍藥川芎各一兩二錢右剉散每服四錢水二盞薑七片煎至七分去滓空腹服有客熱煩渇口瘡者去橘皮細辛加前胡知母腹冷下痢者去地黄入桂心炒胃中虚熱大便秘小便澁去地黄加大黄一兩八錢黄芩六錢人參散治姙娠一兩月惡聞食氣手足悶煩人參去蘆頭知母枳殻麩炒㣲黄去穣各三分陳橘皮一兩湯浸去白瓤焙甘草炙㣲赤剉麥門冬去心黄芩大腹皮剉以上各五錢右為末每服三錢以水一中盞入生薑一分煎至六分去滓不拘時候温服白术散治姙娠阻病心中憒悶頭昏目眩四肢沉重惡聞食氣好喫酸醎菓食多卧少起三月四月皆多嘔逆百節酸痛不得自舉白术厚朴去麄皮塗生薑汁炙各一兩白茯苓一兩五錢葛根甘草五錢炙㣲赤剉麥門冬人參陳橘皮各一兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓不拘時候温服厚朴丸治姙娠阻病頭疼胸煩悶徃徃氣脹不飲食厚朴去麄皮塗生薑汁炙赤令香白术陳橘皮湯浸去白瓤焙前胡去蘆各一兩赤茯苓一兩五錢麥門冬去心人參半夏湯洗七遍去滑各三分右為末煉蜜和搗二三百杵丸如梧桐子大每服以生薑粥飲下二十丸不拘時服陳橘皮丸治姙娠阻病心胸氣滿腹脹脇㽲痛腰重陳橘皮湯浸去白瓤焙當歸剉㣲炒各一兩乾薑炮裂剉艾葉㣲炒各五錢赤芍藥五錢芎藭三分甘草炙㣲赤剉吳茱茰湯浸七遍焙乾㣲炒各一分右為末煉蜜和搗二三百杵丸如梧桐子大不拘時候以粥飲下二十丸人參橘皮湯治阻病嘔吐痰水姙娠三月以來惡阻逆或初姙娠擇食頭痛寒熱間作四肢不和心虛者服之一名八味淡竹茹湯人參去蘆陳橘紅白术麥門冬去心各一兩甘草三錢厚朴白茯苓去皮各五錢用赤茯苓亦可右為麄末每服四錢水一盞半淡竹茹一塊彈子大生薑三片煎至七分去滓澄清温服空心食前一方無茯苓門冬一名甘草橘皮湯柴胡散治姙娠心煩頭目昏重心胸煩悶不思飲食或嘔吐柴胡一兩五錢赤茯苓麥門冬各一兩枇杷葉去毛人參橘紅甘草各五錢右㕮咀每服四錢水一盞薑三片煎至七分去滓温服柴胡飲出聖惠方治姙娠阻病頭疼四肢羸弱不思飲食唯思睡眠柴胡去苗赤芍藥麥門冬去心焙人參黄耆㣲炒剉甘草炙各五錢生地黄一兩五錢研絞取汁右為麄末每服三錢以水一盞入地黄汁一分同煎六分去滓温服日再服一方無生地黄用生薑煎服人參飲出大全良方治姙娠阻病心中煩悶嘔噦吐逆惡聞食氣頭眩重四肢百節疼痛嗜卧汗出靣色極黄人參麥門冬去心白茯苓去黒皮生薑各三兩陳橘皮湯浸去白焙甘草一兩大棗五枚右剉如蔴豆大分為二劑毎劑以水五盞煎取二盞去滓食前分三服如人行三五里再服一方凡姙娠惡食者以所思食任意食之必愈忌菘菜醋等物桑寄生飲出聖惠方治姙娠惡阻頭旋嘔吐腰腹㽲痛胎動不安桑寄生阿膠炒燥柴胡各一兩郁李仁去皮炒五錢麥門冬去心焙人參刺薊各一兩右㕮咀每服三錢水一盞煎至七分去滓温服不拘時候一方治姙娠阻病氣攻肩背兩脇肋腰臍下痛胎動不安無柴胡用生薑煎服保生湯出大全良方治婦人經候不行身無病而似有病者脈滑大六部俱勻乃是孕婦之脈也精神如故惡聞食氣或但是一物或大吐或時吐清水此名惡阻切勿作寒病治之宜服此藥如覺惡心嘔吐加薑丁香煎服人參甘草各一分白术香附子烏藥橘紅各五錢右㕮咀每服三錢水一盞半薑五片煎至七分去滓温服無時或為末調服亦可犀角散出聖惠方治姙娠心煩憒悶虚燥吐逆惡聞米糓氣頭眩四肢沉重百節疼痛多卧少起麥門冬苧根各二兩黄芩茯神各一兩甘草炙一分犀角屑五錢右㕮咀每服四錢水一盞生地黄一分淡竹葉二七片煎至六分去滓温服參术飲出便産須知專治阻病橘紅四錢去白藿香葉三錢浙术一兩人參五錢丁香二錢五分去花右為末每服二錢水一盞生薑五片煎至七分去滓温服惡心加乾薑胃膈悶加枳實又云千金半夏茯苓湯内有半夏姙娠不可服宜服此藥甚妙人參飲治姙娠阻病心中憒悶頭目眩四肢沉重懈怠惡聞食氣好飲酸醎菓食多卧少起三月四月皆多嘔吐百節不能自舉者人參三兩白茯苓去黒皮厚朴去麄皮塗生薑汁炙七遍白术各一兩半陳橘皮湯浸去白焙葛根剉各一兩右㕮咀每服四錢以水一盞生薑五片同煎至六分去滓温服日再服白术丸治姙娠阻病頭肩背煩悶氣脹不思飲食白术厚朴去麄皮塗生薑汁炙七次當歸㣲炒陳橘皮湯浸去兩白各一白茯苓去黑皮熟乾地黄㣲炒各一兩五錢右為末煉蜜搗和酥塗為劑令勻熟丸如梧桐子大毎日空心米飲下二十丸早晨日晚各一服茯苓飲一名茯苓湯治姙娠阻病心中煩悶頭眩重憎聞食氣聞便嘔吐四肢垂不自持方見本方子煩類陳橘皮散出聖惠方治姙娠二月三月惡阻病嘔不能食橘皮湯浸去白焙白茯苓半夏湯洗七次去滑麥門冬去心兩各一甘草五錢炙㣲赤剉人參三分去蘆右為散每服三錢以水一盞入薑半分淡竹茹一分煎至六分去滓不拘時候温服麥門冬丸出聖惠方治姙娠阻病頭重不思飲食四肢羸弱多卧少起麥門冬一兩五錢去心焙柴胡去苗枳殻麩炒㣲黄去瓤桑寄生刺薊各一兩甘草炙㣲赤剉五錢右為末煉蜜和搗三百杵丸如梧桐子大每服二十丸不拘時候煎淡竹茹湯下治姙娠惡阻胃寒嘔逆煩悶吐食及心腹刺痛出大全良方人參丁香柿蒂各一兩甘草良薑各五錢右為細末毎服二錢熱湯送下無時人參散出大全方療初姙娠惡食嘔逆人參四兩厚朴生薑枳殻甘草各二兩右切以水六升煮取三升分三服不拘時候療姙娠惡食心中煩悶憒熱嘔吐出大全方青竹茹麥門冬各三兩前胡二兩橘皮一兩蘆根一握白嫩右細切以水一大升煮取半升分為二服去滓食前一服一方無麥門冬用小麥三合體熱四肢煩熱者加地骨皮半夏茯苓湯出大全良方治姙娠惡阻嘔吐不食半夏泡洗七次炒黄陳皮各二兩五錢白茯苓二兩􅒦砂仁一兩甘草四兩右㕮咀毎服四錢水二盞薑十片棗一枚烏梅半箇煎至七分食前温服如嘔逆甚者加青竹茹一彈子大同熬空心進療婦人姙娠惡阻嘔吐不下飲食出大全良方青竹茹橘皮生薑茯苓各四兩半夏五兩右細切以水六升煮取二升半去滓分三服不瘥頻服忌羊肉酢餳等物加味二陳湯出危氏方治受胎一月或兩月嘔吐擇食縁中脘宿有痰飲經水止煖氣滯所作名曰惡阻陳皮白茯苓各一兩五錢半夏一兩白术七錢五分粉草三錢右剉散毎服四錢生薑三片烏梅一箇煎服未效加生薑汁小紫蘇飲出危氏方紫蘇厚朴白茯苓各一兩五錢半夏甘草各三兩右剉散每服三錢水一盞生薑五棗棗二枚煎温服客熱煩渇口生瘡者加知母前胡腹冷下痢加桂心炒胃中虛熱大小便秘加黄芩頭疼加細辛川芎麥門冬湯治姙娠惡阻病心中憒悶見食嘔吐惡聞食氣肢節煩疼身體沉重多卧黄瘦麥門冬去心焙人參各三分白茯苓去黒皮陳橘皮湯浸去白焙各五錢甘草炙剉一分右麄搗篩毎服三錢以水一盞入薑一分拍破棗二枚煎至六分去滓食前温服人參湯治姙娠一兩月惡食心胸煩亂人參知母焙枳殻麩炒去瓤令黄黄芩去黒皮各一兩大腹一枚并皮子用剉碎右㕮咀每服三錢以水一盞生薑半分切煎至七分去滓温服食後日二服前胡飲治初姙惡阻食即吐逆頭痛顚倒寒熱前胡去蘆頭細辛去苗葉白茯苓去黒皮甘草炙厚朴去麄皮塗生薑汁炙煙出七次各五錢右為麄末每服二錢水一盞生薑一分切同煎至六分去滓温服不拘時日二服一方加人參麥門冬飲出聖惠方治姙娠阻病胎不安寒熱嘔逆氣滿不思飲食麥門冬去心人參白茯苓去黒皮阿膠炙令燥各一兩甘草炙剉三分右為麄末每服三錢匕以水一盞入生薑一分拍碎棗二枚同煎至六分去滓食後温服日二服一方加陳皮薑橘湯治姙娠惡阻嘔吐涎痰不能食生薑母一兩一分陳橘皮去白焙青竹茹各五錢前胡去苗三分㯽榔剉二枚右剉如蔴荳每服三錢水一盞煎至七分去滓温服不拘時候茯苓丸出肘後方療姙娠惡阻吐顚倒垂死不自勝持服之即效茯苓人參各三兩肉桂熬甘草炙枳殻炙各五錢右搗篩蜜和丸每服二十丸加至三十丸日三服古今療胎病方有𢾗十首不問虚冷熱胎死者活此方縁姙娠忌桂所以熬白术散出十便良方治惡阻吐清水甚害十餘日粥漿不入者白术人參五錢丁香二錢五分甘草一錢右為細末每服二錢水一盞薑五片煎至七分温服醒脾散出永類鈐方治姙娠婦阻病嘔逆不食甚者滿口中無味或作寒熱草荳䓻以濕紙裹灰火中煨令紙乾取出去皮用厚朴製各五錢乾薑三分甘草一兩一分右為細末每服二錢水一大鍾棗二枚生薑三片煎至八分去滓呷服病輕者尺寸脈和便能食舊有橘紅二兩治寒熱瘧痢不食後人去橘皮以乾生薑代乾薑治老人氣虚大便秘少涬液引代有竒效一方用乾薑去橘皮一名醒脾飲子治阻病極為神效四七湯出如冝方治姙娠三月惡阻為病氣鬱生痰半夏五兩浸七次白茯苓四兩厚朴三兩薑汁製右㕮咀每服四錢用水一盞半薑三片棗一枚煎至七分去滓不拘時候服人參丁香散出大全良方治姙娠惡阻胃寒嘔逆翻胃吐食及心腹刺痛人參五錢丁香藿香葉各一分右為散每服三錢水一盞煎至七分去滓温服無時人參半夏丸出聖惠方治姙娠惡阻病醋心胸中冷腹痛吐逆不喜飲食半夏湯泡七次人參乾生薑各五錢右為末以生地黄汁浸蒸餅為丸如梧桐子大每服四十丸米飲送下不拘時候小地黄丸出保慶集方治姙娠吐清水酸心腹痛不能食人參乾薑炮各等分右為末用生地黄汁丸如梧桐子大每服五十丸米湯下食前服之濟生方加製半夏等分治姙娠忽下黄汗如出豆汁出大全方苧根切二升去黒皮右為末以水九升煎取四升每服入酒二升或一升煎藥取一升分作二服治阻病出存仁方用香附子末熟湯調服人參半夏丸出聖惠方赤茯苓橘皮去白麥門冬去心白术厚朴姜製甘草灸各五錢右㕮咀每服四錢水一盞姜七片竹茹少許煎至七分去滓温服赤茯苓散出楊氏家藏方治姙娠惡阻心胸煩悶頭暈惡心四肢昏倦嘔吐痰水惡聞食氣赤茯苓去皮半夏湯浸七遍陳橘皮去白桔梗去蘆乾熟地黄洗焙各一兩白术川芎人參去蘆赤芍藥各三分旋復花甘草炙二味各五錢右㕮咀每服三錢水一盞半生薑三片煎一盞去滓熱服不拘時人參調中湯出楊氏家藏方調脾肺養氣治胸膈滿煩悶四肢煩熱及姙娠阻病心胸煩悶嘔逆不思飲食人參去蘆甘草炙各五錢枳殻麩炒去瓤厚朴薑汁製白术白茯苓去皮各一兩柴胡去苗細辛去葉土藿香葉去土陳橘皮去白皮各三分右㕮咀每服三錢水一盞生薑三片同煎至七分去滓食前温服李氏傳快氣湯出産經自初姙娠後惡阻便可服此寛中快氣益陽輔隂入月滑胎易産枳殻五兩縮砂香附子甘草各三兩右各净稱同炒為末湯調服温真人方出産經枳殻川當歸木香甘草各一兩右為末湯調服膠艾湯出指南方治姙娠惡阻阿膠川芎甘草艾葉各二兩當歸三兩右為麄末每服五錢水二盞煎至一盞去滓温服覺冷痛加乾薑二兩普濟方卷三百三十七
