body:
  text: 普濟方卷二百五十三明周王朱橚撰諸毒門蠱毒下血附論蠱能變化毒害人有事之以毒害多為飲食內行之人中之者心腹懊痛煩毒不可忍食人五臟下瘀血黑如爛雞肝又云凡卒患血痢或赤或黑無有多少此皆是蠱毒粗醫以斷痢藥處之此大非也方躑躅散治蠱毒腹痛注下赤血羊躑躅乾薑藜蘆熬附子炮雄黃研巴豆去心熬野葛皮肉桂丹砂蜈蚣炙各一兩右搗為散水一兩盞不知加一粟米忌豬肉蘆笋生血物生蔥狸肉茜根湯治中蠱下血如呻肝腹中㽱痛急者茜根升麻犀角鎊各一兩地榆桔梗銼炒五錢白蘘荷根二兩蘗皮銼黃芩去黑心各五錢右粗篩每服五錢以水半盞煎七分去滓不拘時服治中蠱下血日數十行者方巴豆十二枚芫青藜蘆附子礬石各二分右為末别治巴豆合篩和相得以錦裹藥如大豆許內下部中日三瘥槲皮散治蠱毒下血爛肉片心腹㽱痛如有物齧不即治食人五臟乃死槲皮避隂白皮桃根白皮各四兩並細銼蝟皮灰亂頭髮各一兩大麻子汁五升右先以水五盞煮槲皮桃根皮取濃汁二盞和麻子汁每服暖汁一盞調頭髮灰蝟皮灰二錢服令患人少食旦服須臾用水一盞用雞翎引吐於中如牛涎諸蠱並出治蠱下血欲死方薔薇根銼一升牛膝五味連翹子一升蠟一彈子大右切以水四升煮三升分三服不計時治蠱吐下血方櫸皮廣五寸長七尺蘆荻根五寸如足指大一方用薔薇根右㕮咀以水二升煮取一升頓服即下蠱一方以水酒共煎服亦得治中蠱毒下血肝萞麻一粒去皮朴硝一錢右研細末作一服新汲水調下連作二三服效桔梗散治卒中蠱毒下血如雞肝晝夜不止臟腑悉損者用桔梗去蘆頭伏龍肝各等分右搗羅為散每服以溫酒下二錢每日三服不能下藥斡開口灌之心中自定服七日止食諸臛脯補之物一方單用桔梗搗屑酒服一方搗汁服並瘥地榆散治蠱毒下血或腹痛或不痛百治不效日夜加煩渴臭椿根東引根白皮蜜炙焙乾地榆各五錢右為細末熱米飲調下一錢牛膝酒出千金方專治腸蠱先下赤後下黃白沫連年不瘥用牛膝一兩捶散切以淳清酒一升漬一宿平旦空腹服之再服便愈鼓皮散出直指方專治蠱毒下血如雞肝晝夜不絶臟腑敗壞待死而已者用鼓皮五寸薔薇五寸酒水煎服蝟皮散出聖惠方專治蠱毒下血用蝟一枚炒為灰細研以熟水調下二錢日三服苦瓠湯出聖惠方專治蠱毒吐血或下血如爛肝用苦瓠一枚切以水二大盞煎去滓以取一盞空腹溫服二服吐下蠱即愈范注方云苦瓠毒當臨時量之肘後方云用苦酒一升煮令溫服之神驗一名苦瓠蘆治中蠱毒㵼血日夜無度腹痛不可忍者出肘後方取皂角三箇炙去皮子打碎醶醋四升入瓷器中日中午時漬又以新白布三尺蓋上布上刀裂一橫口正對病人眠牀下安之明日午時藥用布濾去分三服如人行十里再服若不肯服可針兩手大指端甲亦不勞深勿取針當自服或吐或痢去根先取白蘘荷葉四五枚放病人床席下勿令病人知若中毒則不眠其上矣一方治蠱毒以漬酒一宿去滓頓服並瘥治蠱毒暴下血以筯子根酒飲磨服療卒中蠱下血如雞肝者或晝夜出血石餘四臟皆壞惟心未毁或鼻破待死者以桔梗搗屑酒服方寸日三服不能下藥以物挖口開灌之心中當須臾自定服七日止當豬肝臛以補之神良療中蠱毒下血如雞肝或晝夜不絶臟腑敗壞待死知蠱姓名方取敗鼓皮燒灰作末酒服方寸下須臾自當吐蠱主姓名令蠱主呼取蠱姓名即瘥聖惠方亦治小兒蠱毒一方作飲服治蠱毒血痢方見中蠱下血類治蠱毒下血如雞肝或出血石餘四臟虛惟心未毁或鼻破待死取馬藺根末水服七寸下隨吐出極神效苗似葛蔓緣子生子如橘子治蠱毒溪惡刺虎狼蠱虺等毒乾犀根味辛平生嬰婺洪饒間苗髙二三尺獨莖根如細辛千金藤味苦平生北地主商土者根大如脂黑色亦如細辛右二味不拘多少煮汁服之若研服又良蠱毒吐血附論夫病源云蠱是合聚蟲之類以器皿盛之任其相噉食僅一存者名為蠱能害人食人腑臟其狀心切痛如被囓或鞕面目青黃病變無常是先傷於膈上則吐血也不治之食臟腑盡則死矣方太上五蠱丸一名雄黃丸出千金方專治百蠱吐血傷中心腹結氣堅塞咽喉語聲不出短氣欲死飲食不下吐逆上氣去來無常狀如鬼祟身體浮腫心悶煩痛寒戰夢與鬼交狐狸作魅卒得心痛又胸脅痛如刀刺經年纍嵗著牀不起悉主治之雄黃椒目巴豆莾草芫花真珠外臺用木香鬼臼礬石藜蘆各四分附子五分獺肝一分蜈蚣二枚斑貓三十粒右藥為末煉蜜和更搗二千杵丸如小豆先食飲服一丸密封勿泄藥氣十丸為劑如不中病後日增一丸以下痢為度當下蠱種種狀貌不可具述下後每日將息服一劑三十年百病盡除忌食五辛一方無真珠巴豆有木香空心粥飲下亦以痢為度治中蠱吐血方出肘後方以及下血羚羊皮方三寸得敗鼓皮亦佳苦參三兩蘘荷根三兩黃連二兩當歸二兩右㕮咀以水七升煎取二升分三服忌豬肉冷水一方加犀角升麻各三兩無蘘荷根用茜根四兩代之雄黃散出聖惠方專治中蠱吐血雄黃研一分伏龍肝研五錢獺肝如棗大炙斑貓去翅足糯米炒十四粒右搗羅為散每服二錢空心服以酪漿調下或吐蝦蟆及蛇等出為驗蘘荷根湯出聖惠方專治中蠱毒吐血蘘荷根苦參各一兩敗鼓皮燒存性三分右粗搗篩分為四服每以水一盞煎七分去滓不計時服治中蠱吐血出肘後方雄黃研丹砂藜蘆炙各一兩右搗篩為散旦以井花水服刀圭當吐蠱毒忌生物血狸肉一方無雄黃茜根湯出千金方專治蠱毒吐或下血如爛肝亦治肺疾茜根蘘荷根各半斤右細銼以水五盞煎至三盞半去滓空腹分溫三服即愈又自當呼蠱主姓名茜根草即染綘草也獨效散出千金方專治諸熱毒或蠱毒鼻中及口中出血方取人屎七枚燒作火色置水中研之頓服即愈亦解百毒時氣熱病之毒服訖溫覆取汗為度麥麵散出聖惠方專治中毒吐血用小麥麵二合分為三服以冷水調服半日服盡蠱下即瘥桔梗汁出聖惠方專治中蠱吐血及下血如雞肝晝夜不絶臟腑敗壞用生桔梗不拘多少搗取汁每服一小盞日三服治食著諸毒肉吐下血不止痿黃方取淨胡妥子一升煮食使破取汁停冷服半升一旦夜二服即止治中蠱心痛吐血欲死方出肘後方用鹽一升醇苦酒一升煮令和一盡服立吐即愈治中蠱毒或吐下血如爛肝用蚯蚓十四條以苦酒三升漬之蚓死但服其汁已死者皆可活治中蠱毒吐血或下血皆如爛肝者用蠡實日乾搗為細末每服方寸以水調下隨吐效又方用蝟皮燒存性為末水服方寸下當吐蠱毒中水毒附論夫中水毒其名有三中溪中灑中水其狀惡寒頭痛目疼心煩懊悶四肢振掀腰背骨節皆強或熻發熱神昏喜睡朝輕暮劇手足指冷二三日則蟲生下部生瘡不癢不痛人罕自覺若不即治則便膿蟲毒上食五臟熱盛煩毒注下不禁八九日死若手足指冷至一寸為微至肘膝為劇然治水毒有隂有陽其瘡正赤如截肉者陽毒也其脈緩大而數其瘡如鯉魚齒者隂毒也其脈沉細而遲陽毒雖急而易治治宜發汗隂毒雖緩而難治尤不可忽凡水毒惟髙山及山峽溪源繚繞處多有之何者山髙水冷日中始得陽氣故得隂氣常積而水有毒亦猶廣南山髙地下氣不疏通故鬱而為瘴水毒為多隂瘴氣為多陽多陽則熱結於中多隂則指節逆冷二者為病大體與傷寒相類欲辨水毒即以熱湯數斗蒜四升搗碎內湯滓洗浴若身體發赤斑者是水毒也此症劇則為洞痢及齒間出血心腹煩滿下血如爛肝不食而狂皆為熱毒變化而成也土人辟郤之法略與射工相似方升麻湯治中毒寒熱升麻三兩龍腦萎𬎼大青各一兩右粗搗篩每服五錢以水一鍾半煎至八分去滓溫服未瘥頓服蔥白湯治中水毒溪毒如傷寒狀蔥白一握切豉半升葛根二兩升麻三分右銼如麻豆大每服四錢以水二鍾煎至一鍾去滓溫服移時又服烏梅湯治中水毒手足指俱冷用烏梅三兩去核熬搗碎每服三錢以水一盞煎七分去滓不拘時候頓服之五加皮散出聖惠方專治中水毒溪毒寒熱如傷寒狀用五加皮三兩洗切搗羅為散每服一錢以酒一盞調下日三夜一粥飲調下亦得一方以五加根燒研為末水調服牡丹散治中水毒溪毒下部蟲蝕生瘡用牡丹皮二兩搗羅為散每服二錢以酒一盞調下日三服葛藤洗方治中水毒溪毒下部蟲蝕生瘡用葛藤不拘多少以水煮取濃汁洗下部并導灌入下部良治中水毒搗藍青汁以少水和傅頭面身上令匝治中水毒手足指冷即是或至膝肘以浮萍日乾為末每服三四錢以酒服又云中水病手足指冷即是若暖非其冷或一寸極或竟指未過時一寸淺至於肘膝為劇治中水毒用䔧葉一把熟搗杵以酒一盞攪服之不過三服愈治溪毒以馬齒莧絞汁一升以滓傅瘡上佳日四五遍葛氏方治射工毒治水毒中人一名中溪一名中濕一名水病似射工而無物以小蒜三升㕮咀於湯中莫令大熱熱即無力捩去滓適寒溫以浴若身體發赤斑文者無異治病中水毒方取梅葉桃葉搗絞汁三升許以少水解為飲之小兒不能飲以汁傅乳頭與之又方用常思草搗絞汁三升并以綿裹中指以導下部飲汁日過三即愈治水毒方以燒鮫魚皮水調下二錢又方搗七姑草塗腰背諸處即瘥七姑生冬間細葉如酸莓又方以烏蒜一枚爛搗酒半盞和服瘥一名烏韭山中甚多又方搗蒼耳取汁一大盞分二服又方取蓼搗汁一盞漸飲兼以塗身令周匝立瘥用酒調又方取雄牛膝一把水酒共一盞漬絞取汁飲之日三雄牛膝莖紫白者是雌又方用大莓根搗末飲之并導下部生者用汁夏月行常多賫此藥末入水以一錢投水上流無所畏又辟射工凡洗浴以少許投水盆中即無復中毒也治水箭有二種一種赤箭發則甚速或在手足肢或如指或半錢大如真紅色起泡子疼痛不可忍即有線直衝上肚便能殺人一種白箭生處大小皆不定顔色赤初發不痛不癢中間微白其赤處如虱咬不治則便起白泡疼痛不可忍有線一道入腹則殺人但緩於赤箭者耳大忌􅎲破風水入內則不治右用蛇每草一撮帶嫩根及梗連葉五六十片淨洗爛研入酒隨人所飲多少不得過半碗酒浸半時取出草滓暖溫此酒服了以前滓入些鹽拌於瓦上微炒訖塗患處以帛縳定半日便退大抵須治於未痛之前則易切慎切慎解酒毒附論夫酒者熟榖之液也其性慓悍急疾後食而入先食而出能通關節而走膚腠上古作湯液醪醴為而不用後世嗜之無節或飲過度停積不散藴滯於胃散流諸脈熏蒸腋臟令人志亂乃至不醒有連日而無所覺知者甚則中毒而為酒疸諸熱之病也酒者大熱有毒氣味俱陽乃無形之物傷之當發汗則愈其次利小便而消其濕則分解之矣今酒客多服大寒大熱之劑下之則無形元氣受傷而有形隂血亦損乖誤甚矣金匱要略云酒疸下之久為黑疸慎不可犯蓋令上下消分其藴是也又云凡醉不得安卧不動使人搖轉不住時忌當風席地及水洗飲水交接之事有人飲酒過多因酒作病胸脘不快其氣捫隔服無數二陳湯竟無寸效由是不喜飲食復以調氣服之致發大熱自後只用薄荷煎雞蘇丸麻仁丸日就痊愈乃以胸脘悶隔熱在上焦使然耳又有人酷好飲酒復感寒邪服不換金正氣散以致內熱愈熾煩渴且悶汗出如雨身體怯寒續後以小柴胡湯加枳殼白芍藥解之柴胡黃芩退熱枳殼寬中芍藥調榮止汗頓然痊愈然則酒家抱病其可妄以溫藥嘗試一中乎凡飲酒過多酒毒漬於腸胃流溢經絡使血脈充滿令人煩亂嘔吐無度乃至纍日不醒往往有腹背穿者是酒熱毒氣所為故飲酒須搖其身以消散也夫酒性有毒人飲之有不醒隨血脈流散故也人有榮衛否澀痰水停積者因復飲酒不至大醉大吐故酒與痰相摶不能消散故令腹滿不消也夫酒性有毒而復大熱飲之過多故毒熱之氣滲溢經絡漬臟腑而生諸病也或煩毒壯熱而似傷寒或灑浙惡寒有同溫瘧或吐痢不安或嘔逆煩悶隨臟氣虛實而生病焉病症非一故云諸病也方沉檀聚香餅子出德生堂專治消化宿酒辟口氣助脾胃和飲食香附子五兩丁香二兩檀香四兩三稜二兩白茯苓二兩甘松二兩沉香一兩五錢白豆䓻仁二兩砂仁二兩甘草五兩木香一兩五錢葛花三兩乾葛四兩麝香三錢另研入藥加南硼砂一兩右為末熬甘草膏子炒飛羅麵與藥末和成劑揑作小小餅兒噙化葛花丸治醒酒解毒消痰葛花五錢砂仁五錢木香一兩沉香一分豆䓻一分蓽澄茄一分陳皮去皮一兩烏梅十四箇半夏二十一枚湯泡七次汁浸煮晒乾切作片另用薑炒乾用山果五錢茯苓一分枳實去穰麩炒一兩葛粉末五錢甘草炙一分右為末煉蜜為丸如龍眼大每服一丸噙化酒散葛花解酲湯治飲酒太過嘔吐痰逆心神煩亂胸膈否塞手足戰搖飲食減少小便不利出濟生拔粹白豆䓻仁五錢縮砂仁五錢葛花五錢木香五分白术二錢橘皮去白一錢五分青皮去穰三錢乾生薑二錢白茯苓一錢五分澤㵼二錢豬苓去皮一錢五分神麴炒二錢人參一分五釐右為極細末稱勻每服三錢以白湯調下但得微汗酒病去矣此蓋不得已而用蓋藥味辛辣對酒服之不損元氣敵酒故耳不可頓服恐損天年沉檀快膈丸出德生堂專治酒食所傷胸膈痞悶氣逆吐痰口吐酸水香附子一斤丁皮半斤甘草一斤桂枝甘松莪术益智仁檀香丁香各四兩藿香薑黃各二兩沉香一兩加山果子四兩右為末用砂仁杵碎取仁作母炒豆粉一斤四兩黃色和勻加前藥末為丸如桐子大每服五七丸細嚼酒水任下無時加數丸亦可六和湯治飲酒煩渴人參赤茯苓厚朴白扁豆木瓜半夏白术藿香砂仁杏仁甘草香薷等分為末右㕮咀用生薑三片棗子一枚水煎服百杯丸出濟生拔粹專治酒停腹中膈氣痞滿面色黃黑將成癖飲食不進日漸肌瘦如飲酒先服此藥百杯不醉且無痰橘皮去白三兩木香廣茂炮三錢乾薑三兩白丁香五十箇甘草炙二錢茴香京三稜炮三錢砂仁三十箇白豆蔲三十箇生薑一兩去皮切作片子鹽二兩腌一夜焙乾右為細末煉蜜為丸硃砂為衣每一兩作五丸生薑湯下細嚼無時一方用益智仁二十箇橙香餅出御藥院方專治溫脾益胃降氣寬中生津液止煩消痰並治中酒不散細嚼一二餅用酒下或沉至杯可增酒味以津化自逼人香橙皮白豆蔲各一兩木香橘紅白檀甘松各五錢蓽澄茄沉香各三錢龍腦一錢薑黃四兩研右十味為細末用甘草膏和作餅子每服二三餅細細嚼用白湯下人參湯出三因方專治飲酒過多大熱煩躁言語錯謬及房勞酒入百脈令人恍惚失常人參二兩芍藥蔞實枳實去穰麩炒茯神去木生地黃洗甘草炙葛根酸棗仁各一兩右銼如麻豆大每服三錢以水一盞煎至七分去滓溫服不拘時候一方無葛根百杯丸出御藥院方專治酒不散胸膈滯悶嘔吐酸水心腹痛並服之沉香細切紅豆乾葛陳皮去白甘草炙各五錢丁香六錢砂仁一兩五錢白豆蔲二兩乾生薑一兩搗碎右九味為末煉蜜和成劑每兩作二十丸每服一丸細嚼生薑湯送下不拘時候木香分氣丸出德生堂治酒食後胸滿氣痞冝常服之本方得效香附子一斤三稜廣茂四兩丁皮四兩甘松淨四兩檀香四兩甘草一斤豆粉十兩炒黃色薑黃三兩研右為細末砂仁四兩杵碎取仁作母水為丸如雞頭大每服三五丸細嚼酒水任下無時加服豆蔲丸出聖惠方專治飲酒太過心悶腹滿吐逆喘急草豆蔲去皮二分丁香小豆人參木香髙良薑檳榔陳皮泡去白焙各五錢右粗搗篩每服三錢以水一盞入生薑一分煎七分去滓不拘時溫服訶梨勒散出聖惠方專治飲酒後痰滯心膈不利腹脅脹滿訶梨勒皮一兩草豆蔲去皮五錢人參五錢桔梗五錢乾木瓜五錢桂心五錢甘草五錢炙微赤木香一分研右粗搗為散每服三錢以水一鍾入生薑五釐煎至八分去滓微服細呷之髙良薑散出聖惠方專治飲酒後脾虛心胸脹滿不能消化頭疼心悶髙良薑二兩銼人參一兩去蘆草豆蔲三分去皮白术五錢沉香三分乾紫蘇五錢陳皮五錢湯浸去白穰焙右搗為散每服三錢以水一中盞煎至六分去滓不拘時溫服五豆湯出德生堂專能解酒毒止煩渴能發小兒痘疹不出解發渴之症後成瘡痍者黑豆黃豆菉豆青豆赤小豆各五升乾葛一斤甘草一斤貫衆俱不銼右用水五斗五升臘八日用大鍋熬至豆熟為度濾去豆汁頓冷以大磁瓷盛之用苦葉紙重封春夏月開用酒後渴隨意飲之小兒痘瘡不出飲即發見凡人家不可不於臘月八日留心熬之此藥水浸服之人參飲出千金方專治飲酒房勞虛受熱積日不食四月中熬飲酒下以酒入百脈心氣虛令人錯謬失常人參芍藥栝蔞根枳實知母各二兩甘草一兩生地黃八兩酸棗仁半斤茯神三兩白微二兩右㕮咀以水一斗煮取三升分三服一方茯神作茯苓益智子散出聖惠方專治飲酒過多肚腹脹滿不消心下痞急妨悶益智子去皮三分砂仁去殼三分茅根三分草豆蔲去皮二分丁香五分乾木瓜三分陳皮五錢湯浸去白穰焙右搗羅粗散每服一錢水一中盞入生薑五釐煎六分去滓微溫呷之穀神丸治酒食後胸膈痞悶木香五錢砂仁二兩檀香一兩甘松一兩白豆蔲二兩薑黃片子者五錢甘草一兩銼右為細末用甘草汁為丸每一兩作十丸細嚼熟水下全真丸治男婦酒食過傷胸膈痞悶黑牽牛頭末三兩大黃五錢南木香五錢陳皮五錢甘草五錢皂角一兩淨去皮弦用文武火炙黃色右為細末用米醋打糊為丸如桐子大每服三五十丸食後溫湯送下日進三服解酒藥葛根薄荷砂仁甘草各五錢盆硝二錢五分右㕮咀如麻子大每用少許細嚼解酒立效草豆蔲散出聖惠方專治飲酒過度嘔逆不止心腹脹滿草豆蔲十枚去皮髙良薑三分銼人參七兩五錢白茯苓二兩青皮三分去白穰湯浸焙右搗為散每服三錢以水一中盞入生薑五釐煎六分去滓點少鹽攪勻服之葛根散解酒毒甘草乾葛花葛根砂仁貫衆各等分右為粗末水煎三五錢去滓服橘皮湯治飲酒過度酒毒積在腸胃或嘔吐不食湯水服此陳皮去白湯浸炒葛根銼甘草炙銼石膏打碎各一兩右粗搗篩每服三錢以水一盞煎至七分去滓溫服不拘時服之解酒毒治飲酒太過百藥煎乾葛枸把子烏梅等分為末右為細末小粉糊為丸如桐子大溫白湯下二十丸石膏湯治飲酒過多大醉不醒石膏五兩葛根銼生薑細切各三兩右銼如麻豆大每服五錢以水二盞煎至一盞去滓溫服不拘時候百杯散治停酒胸膈痞悶飲食不快但是一切酒病宜服之甘遂橘皮去白葛花一兩淨右為細末每服一錢用溫酒卧調服至夜痢下酒病方愈未知再服忌食甘草藥物一二日治酒病方蔥白豉各一升右以水四升煮取二升頓服麻仁丸治連日飲酒咽喉爛舌生瘡大麻仁一升黃芩二兩肘後作黃蘖右為末蜜和丸含之一方用黃蘖二兩五靈脂丸五靈脂一兩為末麝香少許研右研勻飯丸如小豆大每服十丸米飲下不拘時治因為酒毒所傷斷酒方酒五升硃砂五錢細研右都盛於瓶中密封瓶口安在豬圈內任豬搖動經七日取之飲盡為度治飲酒過度欲至穿腸取驢蹄硬處削下以水濃煮汁冷飲之襄州散將樂小蠻得此治飲酒中毒不醒方用大豆三升以水三升煮取二升去滓每服一盞不拘時候溫服之立吐即愈治飲酒醉不得安卧必須使人搖動不治恐酒毒腐腸傷胃宜急治之以生茒根搗取絞汁每服一小盞頻服之柑皮煎散治酒毒昏悶煩渴或醉不醒用柑子皮二兩洗焙乾搗羅為散每服三錢以水一盞煎三五沸溫服或入鹽少許沸湯點未效冉服治飲酒中毒方用乾桑椹二合以酒一升浸一時久取酒漸漸飲之即解治酒醉醒方用菘菜子不拘多少每研半合以井花水一盞調服葛花散治飲酒中毒用葛花一兩搗為末沸湯點一大錢不拘時候亦可煎服葛根湯治飲酒過不醒用葛根細銼二兩粗搗篩每服三錢以水一盞煎七分去滓服不拘時候一方葛根汁一斗二升取醒止治飲酒後襲人方用乾蔓青根不拘多少蒸三次切焙乾為散每服二錢以飲酒後用新汲水調下一方煮汁內雞子清三枚治飲酒頭痛方用竹茹五兩以水八升煮取五升去滓令冷內破雞子清五枚攪勻更煮二沸飲二升盡瘥治飲酒腹滿不消方方見本門解酒類治酒毒下血方用百藥煎二兩一兩燒存性一兩炒香為細末每服三錢陳米飲調下解酒毒開胃口方取菰根雜鯽魚為羮服之治消毒明目散氣滿不能食取赤小豆花煮服之又下水氣大治飲酒不醉治飲酒大醉恐爛腸方出千金方作湯煮大器中漬之復易之酒自消夏月用之佳治飲酒大醉中毒方出聖惠方用枳椇子樹枝二兩銼每服一兩以水一大盞煎五分去滓溫服又方出聖惠方搗生葛根汁及葛藤和絞汁飲之乾葛乾蒲亦佳又方右用白粳米一升水五升煮使極爛濾去滓放冷飲之治飲酒積熱遂發黃方出肘後方取雞子七枚苦酒漬之器中密封內井底一宿當軟取吞二三枚漸至盡驗栝蔞湯治飲酒發渴又欲飲酒栝蔞根三錢麥門冬去心焙一兩葛根二兩桑根白皮三兩細切右粗搗篩每服三錢以水一盞煎至七分去滓溫服之不拘時候治飲酒連日醉不醒出聖惠方用蕪青菜并小米熟煮去滓冷內雞子三枚調勻飲之二三升無雞子則單飲又方出聖惠方取水中螺螄及螺蚌等著蔥椒薑豉煮如常法飲數升即解又煮蔥豉取二升飲之瘥止又煮粳米一升水五升煮爛去滓飲之加味敗毒散出海上方專治酒過度面黑肚飽人參敗毒散一貼斑貓一個枇杷葉十片右後二味同炒黃色去斑貓將枇杷葉入敗毒散水一碗煎至七分臨睡通服蘆根湯若已服安和藥仍不退者此小觸動服蔥豉等湯不解者可服蘆根地榆五加皮各一握右切以水三升煎取二升服之即解專治吐酒出傳信遍用方用桑樹上木耳以新瓦焙乾為末糯米飲調服之枳术黃連丸治酒太過眼熱口瘡去痰枳實半夏白术白茯苓桑皮黃連南星陳皮青皮黃芩用半大黃用半右各等分為末糊為丸桐子大每服六七十丸臨睡溫水送下解酒毒目黃者出本草以蛤蜊煮食之解丹毒酒後煩熱方見本門解諸毒類解酒渴右用上好菘菜二斤煮作羮啜之作虀葅亦得欲便難醉醉則不損人方用葛花并小豆花末子為散服二三服即不醉又用葛根飲枇杷葉飲并以雞子煮乾蒲麻子服使欲便而不病人胡麻亦煞酒先食鹽一撮後則飲酒亦倍瓜蔞粉出本草專解酒毒瓜蔞根不拘多少水浸三日淘洗右細切研水濾取汁作粉每服三錢米飲調下草節散出本草赤馬糞中草節不拘多少略洗合乾右為細末每服二錢米飲調下薺汁丸出本草專治酒食所傷并嗽杏仁七箇巴豆一枚去皮殼硃砂少許飛淨右件一處研成膏丸如黃米大每服三五丸淡薺湯汁下臨卧服小兒一丸如酒積溫酒下治酒毒食柑子而瘥即柚也口噙雞舌香即丁子香沈香亦可祛口中如膠而臭出本草知母地骨皮桑白皮山梔子麥門冬甘草各等分右藥煎湯入鹽噙早起汲井水第一汲水即黃花水含之吐棄厠下即瘥酒毒肺熱咳紅四黃湯丸出本草宣連大黃山梔子黃芩右件略為末蜜丸冷噙麝香丸出本草專治飲酒消多及傷瓜果虛熱在脾飲水多狀似痟渴大抵消中之疾往往脾氣衰元氣耗散土不制水故水溢不收冷脾有熱而元氣不衰者非消渴此藥主之麝香當門子右件研細以好酒濡之為丸如菉豆大每服一十丸煎枳椇子湯送下明日再服以不渴為度枳椇子亦謂之癩漢指頭蓋取其似也小兒喜食之食前服大酒不可安卧出本草常令搖動轉側又當風席地及水洗飲水最忌交接房事天南星丸出本草能去痰治酒積化酒毒南星一斤端正者右於平地上掘一窟濶五寸深一尺五寸仍略搗窟中次用剛灰於窟內簇起燒過大半除火去灰合淨以煮酒一斗澆之將南星於其中覆以瓦盆用元土泥封固盆縫勿令透氣一宿早取出用酒水各二升和洗切作片焙乾研末入飛過辰砂一兩薑汁糊為丸如桐子大又以硃砂為衣每服五十丸至百丸生薑湯下不拘時治噦氣嘔逆出本草用糟篘中酒以小兒乳和少牛乳飲之亦可單服少許解酒毒出本草取鹽麩子乾搗為末食之消酒毒出本草取葛根蒸食之其粉甚妙一方搗汁飲三升即醒治嗜酒不已出本草以山蛩蟲一節燒為灰水下服之訖便不喜聞酒過一節則毒人至死解酒毒目黃出本草以蜆肉浸取汁服一方煮食之蜆子肉湖邉溪澗皆有之治醒酒止渴除痰唾去酒毒出本草方見本門酒毒四黃湯丸治斷酒方出千金方栁花臘月鼠頭灰右等分為末黃昏時酒服一杯一方水調三錢治嗜酒方以氊葈耳子七枚燒作灰投酒中飲之勿令人知知則不效治酒苦唾用萎𬎼葉為散服之愈昔晉嵇紹有胸中寒痰每酒後唾服之得愈飲酒不醉方治飲酒不醉以後四味白扁豆二十五粒乾葛益智縮砂仁各等分右為末酒水各一碗熬成膏蒸餅為丸如桐子大吃酒時酒送下二丸益脾丸出御藥院方專治飲酒不醉又益脾胃葛花二兩小豆花二兩菉豆花五錢木香一分右為細末白蜜為丸如桐子大煎紅花湯下十丸或夜飲津液下五丸不醉大妙治飲酒令人不醉方出千金方柏子仁麻子仁各二兩右治飲前為一服進酒三倍又方出千金方葛花小豆花各等分右為末服三方寸臨飲時仍進葛根汁及枇杷葉飲並能倍酒又搗生葛根汁及葛藤餅和絞汁飲之又乾蒲煎服亦佳又方出千金方取九月九日菊花為末臨飲服方寸亦治酒醉不醒又方六月六日取小豆花葉隂乾百日為末服之又方出千金方五月五日取井中倒生草枝隂乾為末酒服之二錢治飲酒令無酒氣方出千金方右用乾蔓青根三七枚三遍蒸為末二錢許酒後水服之神驗遇仙方詩曰丁香沉檀麝一錢更兼香附五分先飲時少許投壺內席上春風正遇仙惡酒附論夫酒者水榖之精也其氣栗悍而有毒入腸胃則腸氣逆上滿於腦內薰於肝膽故令肝浮膽橫而狂悖變怒失其常性故云惡酒也方酒惡方取鷹屎灰酒服方寸效勿使飲人知治惡酒健嗔方用空井倒生草燒灰水調飲之勿令人知亦治飲酒不醉又方取其人牀上塵和酒飲之酒病方用豉蔥白各半斤水二升煮取一升頓服散酒氣以二月林擒實生食之又方正月一日酒五升淋碓頭搗七下取飲之又方用故氊中葈耳子七枚燒灰黃昏時服一杯呪曰與病人狂人飲也勿令知之後不喜飲酒也又方用白豬乳汁一升飲之永不飲酒又方刮馬汗和酒與飲終身不飲又方取虎屎中骨燒末和酒與飲又方取鸕鷀屎燒灰水服方寸其效如神又方取鷹毛用水煮去毛頓服又方以故車絃燒灰和酒與服又方取驢駒衣燒灰酒飲方寸妙又方以自死蠐螬乾搗末和酒與飲即嘔神驗又方用酒客吐中肉七枚隂乾燒末服之又方用酒漬汗靴替一宿平旦空腹與飲即吐不喜見酒又方用白狗乳汁酒服之又方用臘月馬腦和酒服之治惡酒嗔怒不醒方用雞子清二枚生吞下又方用甘蔗搗取汁每服一小盞酒病方用赤小豆煮汁熱飲即愈解酒毒以牛肝和腹內百葉生薑醋食之解酒熱面赤者以冬霜作圑飲之酒後暴熱以臘雪小溫飲之普濟方卷二百五十三
