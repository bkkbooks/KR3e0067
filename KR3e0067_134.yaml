為末蜜水調下為一服而愈此逼散寒氣然後熱氣上行而汗出乃愈又方出肘後方治隂毒傷寒口鼻冷者乾薑桂各一方溫酒三合服之當大熱差凡隂陽二毒不但初得便爾或一二日變作者皆以冷藥治之得此病多死治熱不解而下痢困篤欲死者服此大青湯方大青四兩甘草三兩膠二兩䜴八合赤石脂三兩右以水一斗煮取三升分三服盡更作日夜兩劑愈又方出肘後方右用梔子十四枚薤白一把水五升煮取三升半分為三服又分出肘後方右用龍骨半斤搗碎以水一斗煮取五升使極冷稍飲其間或得汗即愈矣又方出肘後方右用黃連二兩熟艾如鴨卵大以水二升煮取一升頓服立止天行諸痢悉主之又方出肘後方天行諸痢悉主之黃連三兩黃蘖當歸龍骨各二兩右以水六升煮取二升去滓入蜜七合又火煎取一升半分為三服效又方治隂毒傷寒及重感冒風寒頭疼拘急右用口嚼生薑一大塊用二三錢熟酒調服一大盞涎吐汗出即愈又方治隂症右用黑豆一合炒焦酒浸熱飲一碗豆不用被蓋汗出即愈老君神白散出余居士選竒方治傷寒隂證白术附子各二兩桔梗細辛甘草各一兩右為細末白湯點服隂毒熏法出活人書治隂毒逆冷囊縮者右用大豆三升炒令極熱先以淨盆桶內置熱醋三升旋扶病人坐桶上熏少時却以熱豆傾桶中熏之有頃囊下却以隂症藥服之回陽丹出衛生寶鑑治隂毒傷寒手足厥冷牡蠣燒不灰木燒良薑切炒川烏頭炮白芍藥各二錢麝香少許右為細末每用一錢男病女唾津調塗外腎女病男唾津調塗乳上手陽丹出衛生寶鑑治隂毒傷寒手足厥冷指甲青色體冷脈沈細而微神效右用青蔥四五枝陳蜂窠四五箇燒存性為末用青蔥搗如泥丸如桐子大手心內握定用手帕緊繫定須臾汗出以綿被覆蓋如手心熱甚休教解開如服藥時先服升麻湯五錢出子連鬚蔥三枝生薑五片水二大盞煎至一盞去滓溫服以被覆之汗出愈海藏已寒丸出濟生拔萃方治隂症服四逆背冷中發躁而煩渴者或數日大便閉小便澀赤服此上不躁大小便自利肉桂茯苓各五錢良薑烏頭炮各七錢附子炮乾薑炮芍藥茴香炒各一兩右為細末糊為丸如桐子大溫酒下空腹食前五七十丸八九十丸亦得酒醋為糊俱可麻黃升麻湯出濟生拔萃方治傷寒隂結不大便六七日大下之結去脈當浮則愈及寸脈沈而遲手足厥冷寸脈沈而遲者少隂本脈故主咽喉不利唾膿血四肢厥者為厥隂利不止為太隂為難治溫之則咽痛不可溫也麻黃二兩升麻當歸各一兩一分知母三分麥門冬一分去心黃芩三分乾薑芍藥桔梗石膏茯苓甘草白术各一分右㕮咀每服五錢水煎相次一服汗出止一法出濟生拔萃方治隂症諸藥不效并湯水不下身冷脈絶氣息不知人丁香蓽撥乾薑牡蠣各等分燒粉右用手心中以唾津調如泥以手掩其隂至暖汗出為度溫內玉抱肚出衛生寶鑑方治隂毒傷寒川烏細辛良薑天仙子肉桂牡蠣胡椒乾薑各等分右為細末醋糊調塗臍下以綿覆之破棺丹出華陀中藏經方治厥隂面目俱青心下硬四肢冷脈細而欲絶硫黃一兩酒煮三日硃砂一兩研右為末酒糊丸雞頭大入室中勿令人知同病人掘一坑深一尺入粟稈火燒坑子極熱醋五升沃令氣出衣被鋪坑以酒化一丸服之後令病人坑上卧少時汗出愈治傷寒隂症脫陽或因大吐大㵼之後四肢逆冷元氣不接不省人事或傷寒新瘥後與婦女交其症小腹緊痛外腎搐縮面黑氣喘冷汗自出亦是脫陽症須臾不治即不效出衛生家寶方蔥白炒令熱尉臍下次用附子白术半兩乾薑半兩木香一錢右銼碎用水兩碗煎至八分去滓放冷灌與服須臾又進一服兩服滓再作一服如無前件藥只用單方用桂皮二兩好酒二升煎至一升候溫分作二服灌與如無桂皮只用連鬚蔥白三七莖細銼就砂盆中研細用酒五升煮至二升分作三服灌陽氣即回先更用炒鹽尉臍下氣海之所勿令氣冷為妙治隂毒傷寒煩躁迷悶不治悮人急者出本草右用大附子一箇可半兩者立劈作四片生薑一大塊刀劈作五片如中指長糯米一撮三味以水一升煎取六合去滓如人體溫頓服厚衣覆之或汗出或不出候心神定即别服水解散太白通關散之類不得與冷水如渴更將滓煎與服令人多用有效故詳著之陽毒論夫陽氣獨盛隂氣暴衰隂為陽所勝內外皆陽故為陽毒傷寒有初得病便成陽毒者有服湯藥經五六日以上不差變成陽毒者以病本屬陽或以火劫發其汗或因灸焫陽氣轉盛隂氣內消所致其候面赤發躁狂走妄言發斑如錦文咽喉痛疼涕唾膿血或下利黃赤其脈洪實滑促是也歌括陽毒已深脈洪大內外結熱舌卷焦黑鼻中如煙煤宜用水漬法傷寒一二日便成陽毒或服藥吐下後變成陽毒身重腰背痛煩悶不安狂言或走或見鬼或吐血下利赤黃其脈浮大而數面赤斑斑如錦文咽喉疼痛唾膿血五六日可治至六七日不可治陽毒升麻湯主之咽痛玄參升麻湯甚者或有踰垣上屋陽毒脈弦洪促數身熱無汗陽毒升麻湯葶藶苦酒湯即醋大黃湯梔子仁湯黑奴丸太乙牛黃膏用竹葉湯調下或研生地龍大者三條入生薑汁薄荷汁生蜜腦子各少許新汲水調灌下可選用之令隂氣復而大汗解矣陽毒大熱煩渴譫語赤斑衄血不止白虎湯一服效陽毒已深脈洪大內外結熱舌卷黑鼻中如煙煤用新汲水浸濕布數重搭於腦上續又換新水浸布漬冷熱勢才減即止本事方灸結胸巴豆肉七粒黃連七寸搗細津唾調膏安於臍艾灸其上不拘壯數以腹中有聲為效灸畢即以湯蘸軟帛拭之恐或瘡爛此方與集驗神功散一同隂陽二毒但有微氣者皆可灸臍間有聲即得汗解尚藥孫用和破結丹治隂陽伏逆變為結胸五六日大便結攻之不及達之不可以此主之用錦辰砂銀青礞石北亭脂肉豆冦木香官桂牽牛黑附炮巴豆不去油各半兩輕粉麝香半錢金五箔右件將法醋半升八味硃砂附子牽牛三味熬成膏次入餘藥打和得所丸如皂子大輕粉衣每服二丸蜜湯調下陽症如隂冷四肢滑沈尿赤大便稀面紅煩躁身微熱隂症如陽沈更微隂極發燥熱極發厥物極則反也重陽必隂重隂必陽寒暑之變也四肢冷小便赤大便閉或糞色黑眼開言動脈沈而滑謂之陽症似隂面赤煩躁身有微熱眼閉發熱脈沈而微謂之隂症似陽欲知的定當推原反本察色聽聲辨以六經參以外症徐徐焉據脈驗之數熱遲寒隂陽别矣陽之體輕隂之體重隂家脈重陽家脈輕陽盛旦靜隂盛夜寧陽虛暮亂隂虛夜爭陽症似隂白虎湯熱極生寒則四肢逆冷或用承氣湯隂症似陽四逆湯加蔥白主之隂盛則躁下虛則面赤衰寒則身微熱也陽盛隔陽脈細沈矣身冷大煩躁嗜卧泥水之中欲飲水而不欲入口者是飲水者非可以服霹靂散少焰散丹砂丸亦效孫用和以半兩黑附子一枚燒存性候冷為末入真臘茶一大錢匕和為二服每服水一盞蜜半匙煎六分冷服躁止得睡汗出皆藥之驗也隂症太陽陽明少陽皆屬陽症也太陽者膀胱也發熱惡寒頭痛腰疼而脈浮也陽明者胃也不惡寒反惡熱濈濈汗出大便閉潮熱而脈長也少陽者膽也口苦咽乾脅下滿發熱而嘔或往來寒熱而脈弦也麻黃湯大青龍湯桂枝湯治太陽經傷風寒也大柴胡湯調胃承氣湯小承氣湯大承氣湯治陽明傷寒也小柴胡湯治少陽傷寒也其他藥皆發汗吐下後症也若陽氣獨盛隂氣暴絶即為陽毒必發躁狂走妄言面赤咽痛身斑斑如錦文或下利赤黃脈洪實或滑促當以酸苦之藥令隂復而大汗解矣古人云酸苦湧泄為隂謂苦參大青葶藶苦酒之類能復其隂氣也微用苦甚兼用酸苦拆熱復隂若熱極拆熱復隂若熱極發厥陽症似隂學者以脈别之方升麻散治傷寒一日便成陽毒或服藥發汗吐下之後毒氣不解身背強煩悶狂言或走或見鬼神面赤斑斑狀如錦文咽喉痛及下膿血川升麻射干各一兩當歸銼微炒犀角屑甘草炙微赤銼各半兩黃芩黃連去鬚地骨皮各三分右搗篩為散每服四錢以水一中盞煎至六分去滓不計時候溫服麥門冬散治陽毒傷寒身體痛疼頭面如火心胸煩熱而渴小便赤黃不得睡卧宜服麥門冬去心焙葛根銼柴胡夫苗赤芍藥知母馬牙硝各一兩子芩玄參甘草炙微赤銼各三分川升麻犀角屑各半兩右搗羅為散每服四錢以水一中盞煎至六分去滓不計時候溫服犀角散治陽毒傷寒狂言亂走面赤斑斑咽喉乾痛心胸煩滿四肢拘急小便赤黃犀角屑甘草炙微赤銼各半兩射干川大黃銼碎微炒黃芩各三分柴胡去苗川升麻川芒硝麥門冬去心焙各一兩右搗羅為散每服四錢以水一中盞入淡竹葉三七片小麥五十粒煎至六分去滓不計時候溫服石膏散治陽毒傷寒熱壯頭痛肢體煩重口乾心躁石膏一兩知母柴胡去苗麻黃去根甘草炙微赤銼黃芩赤芍藥防風去蘆頭赤茯苓川升麻甘菊花右搗篩為散每服四錢以水一中盞入生薑半分蔥白七寸豆豉一百粒煎六分去滓不拘時候溫服大黃散出活人書治陽毒傷寒未解熱結在內恍惚如狂者川大黃一兩半銼碎微炒桂心三分川芒硝二兩甘草炙微赤銼木通銼大腹皮銼各一兩桃仁二十枚湯浸去皮尖雙仁麩炒微黃右搗羅為散每服四錢以水一中盞煎至六分去滓不計時候溫服以通為度地骨皮散出聖惠方治陽毒傷寒頭昏身重咽喉唇乾腮赤狂言欲走心胸脹滿嘔逆不下飲食面色斑斑如錦文柴胡一兩去苗地骨皮木香麻黃去根節甘草炙微赤銼川升麻􅌝􅌣根人參去蘆頭赤茯苓木通銼已上各半兩右搗羅為散每服四錢以水一中盞煎至六分去滓不計時候溫服柴胡散一名梔子仁湯出活人書治陽毒傷寒壯熱百節疼痛柴胡一兩半去苗川升麻黃芩石膏杏仁湯浸去皮尖雙仁麩炒微黃色已上各三兩赤芍藥大青知母梔子仁各一兩甘草右搗羅為散每服四錢以水一中盞入生薑半分豉一百粒煎至六分去滓不計時候桂枝麻黃散出聖惠方治陽毒傷寒項背汗出急強惡風桂枝麻黃去根節甘草炙微赤銼赤芍藥葛根杏仁湯浸去皮尖雙仁麩炒微黃各一兩右搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候熱服衣覆取汗如人行十里未有汗再服良久以蔥白豉粥投之白虎湯出三因方治陽毒傷寒服桂枝湯大汗出後大渴煩躁不解脈洪大者知母甘草炙微赤銼各一兩麻黃二兩搗碎粳米一合右細銼以水二大盞煮米熟為度去滓不計時候溫三服治陽毒傷寒四肢壯熱心膈煩躁嘔吐不止宜服此方出聖惠方柴胡去苗黃芩人參甘草炙微赤銼各一兩麥門冬去心焙一兩半夏半兩湯浸七遍洗去滑右搗羅為散每服四錢水一中盞入竹葉三七片生薑半分煎至六分去滓不計時候溫服􅌝􅌣散出聖惠方治陽毒傷寒五六日已上俱胸中煩熱乾嘔􅌝􅌣柴胡去苗知母黃芩甘草炙微赤銼各一兩半蘆根二兩銼右搗羅為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服甘草散出聖惠方治陽毒傷寒脈洪大心中悸壯熱甘草炙微赤銼桂心茯神人參去蘆頭阿膠搗碎炒令黃燥麥門冬去心已上各一兩生乾地黃麻黃去根節各二兩右搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服黃芩散出聖惠方治陽毒傷寒氣盛昏昏如醉熱躁煩渴口苦舌乾黃芩川升麻柴胡去苗各一兩石膏二兩赤芍藥麥門冬去心甘草炙微赤銼各半兩右搗篩為散每服四錢以水一中盞煎至六分去滓不計時候溫服牛黃丸出聖惠方治陽毒傷寒心躁煩悶恍惚如狂結熱不散牛黃細研天竺黃細研防風去蘆頭真珠細研已上各半兩龍腦甘草炙微赤銼各一兩射香一錢細研犀角屑羚羊角屑硃砂細研水飛過黃芩川升麻各一兩右搗羅為末入前研了藥更研令勻以煉蜜和搗三二百杵丸如梧桐子大每服不計時候以溫水嚼下十五丸治陽毒傷寒煩熱大便不通川大黃一兩銼碎微炒川芒硝半兩右搗篩以水一大盞煎至七分去滓不計時候分溫二服如人行五七里再服當利下惡物治陽毒傷寒毒氣在臟狂言妄語欲走起者宜服此方龍膽一兩去蘆頭鐵粉二兩右件藥搗細羅為散每服不計時候以磨刀水調下一錢升麻湯出活人書治傷寒一二日便成陽毒或服藥吐下之後變成陽毒腰背痛煩悶不安面赤狂言或走見鬼或下利脈浮大數面赤斑文如錦咽喉痛出膿血五日可治七日不可治升麻犀角鎊射干黃芩去黑皮人參甘草炙銼各一兩右六味銼如麻豆大每服五錢以水一盞半煎至八分去滓溫服食頃再服溫覆出汗未汗再服甚者大承氣湯除厚朴加木通甘草大腹皮桃仁各一兩以利為效㵼心湯出聖濟總録治陽毒傷寒頭痛壯熱狂言妄語似見鬼神石膏一兩芍藥葛根銼黃芩去黑心各半兩大黃黃連去鬚各三分右搗篩每服五錢以水一盞半生薑一棗大拍碎煎至八分去滓溫服日二不拘時升麻湯出聖濟總録治陽毒傷寒腰背疼痛煩悶面赤狂言妄走或見鬼下利無常赤斑如錦文咽喉痛唾膿血升麻雄黃醋煮研各半兩當歸切焙桂去粗皮各一兩甘草炙銼二分鱉甲醋炙去裙襴一兩右粗搗篩每服五錢以水一盞半煎至八分去滓溫服日二不拘時候大青湯出聖濟總録治陽毒傷寒煩躁不解或下利危困大青二兩秦艽去苗土一兩犀角鎊山梔子仁甘草炙銼黃連去鬚各半兩右粗搗篩每服五錢以水一盞半豉一百粒薤白七寸煎至八分去滓食前溫服解陽湯出聖濟總録治陽毒傷寒口舌乾燥麻黃去根節人參赤茯苓去黑皮桂去粗皮各半兩麥門冬去心焙葛根銼各三分杏仁湯浸去皮尖雙仁炒甘草炙銼各一兩右粗搗篩每服五錢以水一盞半生薑一棗大拍碎煎至八分去滓溫服不拘時五解湯出聖濟總録治陽毒傷寒發熱煩躁山梔子仁黃芩去黑皮甘草炙銼大黃銼醋炒各一分朴硝二錢右粗搗篩每服五錢以水一盞半煎至八分去滓空心溫服犀角湯出聖濟總録治陽毒傷寒初得身體大熱眼赤小便黃心悶頭疼煩渴不止四肢酸痛心中悶絶言語錯亂睡中多驚犀角鎊一兩人參三分赤茯苓去黑皮茵蔯蒿細辛去苗葉陳橘皮湯浸去白炒麻黃去根節甘草炙銼各半兩右粗搗篩每服五錢以水一盞半生薑一棗大拍碎煎至八分去滓溫服葛根湯出聖濟總録治陽毒傷寒頭痛壯熱未解身體疼痛葛根銼龍膽大青各三分桂去粗皮萎㽔芍藥黃芩去黑心升麻石膏碎麻黃去根節甘草炙銼各半兩右粗搗篩每服五錢以水一盞半生薑一棗大拍碎煎至八分去滓不拘時候溫服葛根散出聖濟總録治陽毒傷寒身熱如火頭疼燥渴咽喉乾痛葛根銼三分山梔子仁黃芩去黑心大黃銼醋炒甘草炙銼各半兩朴硝一兩右搗篩羅為散每服二錢不拘時溫服熟水調下秦艽湯出聖濟總録治陽毒傷寒心躁悶亂煩熱狂語口乾不止秦艽去苗土黃芩去黑心甘草炙銼木通枳殼去穰麩炒玄參各半兩芍藥桔梗炒吳藍山梔子仁各半分枇杷葉三分拭去毛薑汁炙右粗搗羅篩每服五錢以水一盞半煎至八分去滓溫服不拘時候清涼散出聖濟總録治陽毒傷寒口乾煩躁大渴發汗葛根銼二兩大黃銼炒黃芩去黑心朴硝麻黃去根節甘草炙銼各一兩桂去粗皮三分右搗羅為散每服二錢以新汲水調下琥珀丸出聖濟總録治陽毒傷寒六七日間服熱藥過度致使陽氣內伏身體微熱眼目爪甲盡黃心下鞭痛語澀舌乾昏燥琥珀研一分黃連去鬚黃蘖去粗皮大黃煨銼各半兩巴豆去皮心焙出油取霜二錢右搗羅四味為細末與巴豆霜拌勻煮薄麵糊為丸如菉豆大每服一丸柳枝湯下不拘時妙應湯出聖濟總録治陽毒傷寒遍身壯熱大喘上氣躁悶甘草炙銼人參赤茯苓去黑皮各一兩大黃煨銼山梔子去皮麻黃去根節各半兩陳橘皮去白炒木香各一分右粗搗篩每服三錢以水一盞入蜜一匙生薑汁少許煎至八分去滓冷服不拘時鐡粉散出聖濟總録治陽毒傷寒發狂走者鐡粉朴硝各一兩天竺黃半兩龍腦一分右四味研勻令細每服二錢以雞清水調下不拘時水漬法出活人書治陽毒盛內外結熱煩躁右以新汲水漬疊布數重搭於腦上須臾蒸熱再浸再搭數換新水浸之此良法也治陽毒傷寒壯熱頭痛心神煩躁利胸膈出肘後方右用生瓜菜搗取自然汁飲之葉生搗貼腫毒升麻湯治傷寒一二日便成陽毒或服藥吐下之後變成陽毒身重腰背疼痛煩悶不安狂言或走或見鬼神或吐血下利其脈浮大數面赤斑斑如錦文咽喉痛唾膿血五日可療至七日不可療也宜服升麻湯肘後陽毒升麻湯治症同無梔子鱉甲升麻二分當歸二分蜀椒出汗一分雄黃研梔子桂心各一分甘草三分炙鱉甲大如手一片炙右件藥切以水五升煮取二升半分三服如人行五里久再服溫覆手足毒出則汗汗出則解不解重作服亦取得吐佳隂毒去雄黃忌海藻菘菜生蔥莧菜張仲景方無梔子桂心隂毒去雄黃蜀椒治陽毒傷寒昏憒不知藥食隔斷者出經驗良方右將早晚白米用新汲水爛研作漿頻頻灌之能解諸毒續穀氣陽毒梔子湯一名梔子仁湯出濟生拔萃方治陽毒傷寒壯熱百節疼痛升麻梔子仁黃芩芍藥石膏知母甘草杏仁柴胡各等分右為粗末每服五錢生薑五片豉百粒水煎服一方有大青治陽毒傷寒面赤頭痛身上熱如火心神躁眼赤睛逆露頭目昏眩項背強直坐卧不安大便閉熱脈氣洪大麻黃去根杏仁去尖山梔黃芩柴胡前胡各去毛大黃白术桔梗通草羌活秦芁乾葛牡丹皮荆芥穗各一分牽牛半夏四銖黃連細辛各三錢右搗羅為末每服五錢以水一碗生薑三片蔥三枝同煎一兩沸食後熱服浴腸湯治陽厥發狂將成疸大黃四兩濕紙裏大青一兩梔子一兩甘草一兩炙右水五升煎至二升內外須五合再發去一升分四服量虛實與之治陽毒人胃下血頻疼痛不可忍右用鬱金五箇大者牛黃一皂莢子别研細二味同為散每服用醋漿水一盞同煎三沸溫服普濟方卷一百三十五
