body:
  text: 普濟方卷一百三十五明周王朱橚撰傷寒門隂陽毒論夫隂毒盛而陽暴絶則為隂毒若陽毒盛而隂暴絶則為陽毒大凡隂陽離絶非大汗不能復其正氣也六脈俱洪大或沈取之大而不甚疾者非隂症也陽毒其脈當弦而洪數隂毒其脈沈細而疾陽病則身熱而無汗隂病則身冷而有汗岐伯云陽勝則身熱腠理閉喘促為之俯仰汗不出而熱隂勝則身寒汗出數栗而寒寒則厥此症不可以常法治之金匱論陽毒之為病面赤斑斑如錦文咽喉痛唾膿血五日可治七日不可治隂毒之為病面目青身疼狀如被打咽喉痛死生與陽毒同三因云病者頭重頸直皮肉強痺或藴而結核起於喉頸之側布熱毒於皮膚分肉之中上散於髮際下貫顳顬隱隱而熱不相斷離病名黃肉隨以四季各十八戊巳日其病從太陽陽明相隔寒濕不調關節隔滯若腑虛則皮肉強痺若臟實則布毒熱於皮膚又云病者裏熱外寒意欲守火而反引飲腰痛欲折或胸脅切痛類如刀刺不得轉動熱彭彭服冷多則洞㵼病名黑骨溫以冬三月源從足太陽少隂相搏藴積壅塞若腑虛為隂毒所傷則裏熱外寒若臟實為陽毒所損則彭彭發熱又云病者發熱腰痛強急腳縮不伸胻中欲折目中生花或澀澀增寒復熱頸中雙筋牽不得屈伸項直背強眼赤黃欲轉動合身回側病名青筋牽者由春三月其源從厥隂涉足少陽少陽之氣始發少隂之氣始衰隂陽拂鬱於腠理腑臟受厲而生若腑虛則為隂邪所傷故發熱若臟實則為陽毒所傷故增寒又云病者脈促身顫掉不能禁或內熱口乾舌破咽塞聲嘶病名赤脈㩌者以夏三月其病從少隂太陽之氣相搏而停則榮衛不通皮肉痛起太陽發動少隂淫邪之氣因而作厲則臟腑隨時受疫病也若腑虛則隂邪所傷則寒戰若臟實為陽毒所侵則內熱矣方治青筋牽三因方鮑氏方肝腑臟溫病隂陽毒膽腑虛為邪隂所傷腰脅強急腳縮不伸胻中欲折目中生花色蒼蒼者茈胡去苗五兩茯苓梔子仁半夏湯洗大青各三兩桂心竹茹香豉甘草右㕮咀每服五錢水二盞薑五斤煎七分去滓空心溫服又方三因方鮑氏方肝臟腑溫病隂陽毒肝臟實為陽毒所傷澀澀惡寒翕翕發熱頸外雙筋牽不得屈伸項直背強眼赤黃轉動則合身回側色蒼蒼者玄參一兩細辛二兩梔子仁黃芩升麻芒硝各三兩石膏煅八兩右銼散每服五錢水二盞入車前草三葉淡竹葉七片煎七分去滓空心服治赤脈㩌三因方鮑氏方心腑臟溫病隂陽毒若腑虛為隂邪所勝脈促身顫掉不能禁色昏赤者茯苓人參桔梗各三分甘草一兩半白芷青皮各一兩乾薑炮半兩右銼散每服五錢以水二盞煎七分去滓食前服又方三因方鮑氏方心腑臟溫病隂陽毒心臟實則為陽毒所傷內熱口乾舌破咽塞聲嘶色焦赤者天門冬去心麥門冬去心車前子炒梔子仁黃芩升麻甘草炙寒水石煅各等分右銼散每服五錢水二盞煎七分去滓食前服治黃肉隨三因方鮑氏方脾腑臟溫病隂陽毒胃腑虛則為隂邪所傷頭重頸直皮肉強痺䐜脹色黃黑者厚朴薑製炒一兩半白术陳皮各一兩半乾薑炒紫蘇甘草炙半夏湯洗浴三分右銼散每服五錢水二盞煎七分去滓食前服又方三因方鮑氏方脾腑臟溫病隂陽毒臟實為陽毒所傷藴熱結核起於喉頸之側布毒氣於皮膚分肉之中散入髮際下貫顳顬蓄熱不散色黃者葛根蒼术泔浸升麻白芷桔梗青皮各一兩大黃半兩右銼散每服五錢水二盞煎七分去滓食前服治白氣狸三因方鮑氏方肺腑臟溫病隂陽毒大腸腑虛為隂邪所傷寒熱互作上氣咳逆大腸飱泄色皓皓白者白术人參各一兩乾薑炮麥蘖炒各三分白茯苓五味子肉豆蔲草果烏梅甘草炙已上各半兩右銼散每服五錢水盞半煎七分去滓食前服又方三因方鮑氏方肺腑臟溫病隂陽毒臟實為陽毒所傷體熱肌膚發班氣喘引飲色昏白者紫苑茸一兩梔子仁升麻前胡各三分石膏煅半兩葶藶炒一分杏仁去皮尖甘草炙各半兩右銼散每服五錢水二盞煎七分去滓食前服治黑骨溫三因方鮑氏方腎腑臟溫病隂陽毒膀胱腑虛為隂邪所傷裏熱外寒煩渴引飲反喜守火或腰脅滿痛小便赤黃而與腳俱黑附子炮去皮臍茯苓各一兩山茱茰細辛山藥澤㵼各半兩麻黃三分杏仁去皮尖一分右銼散每服五錢水二盞煎七分去滓食前服又方三因方鮑氏方腎腑臟溫病隂陽毒腎臟實為陽毒所傷腰脅切痛不得轉動大小便閉澀小腹脹食冷則洞泄色薰黑者吳茱茰黑牽牛炒桃仁去皮尖萆薢杜仲去皮銼薑汁製炒絲斷大黃蒸各等分右銼散每服五錢水二盞煎七分去滓食前服治肝腑臟溫病隂陽毒頸背雙筋牽先寒後熱腰強急縮目中生花出千金方桂心一兩白术芒硝大青梔子各三兩茈胡五兩石膏生薑各八兩生地黃香豉各一升右㕮咀以水九升煮取三升分三服治心腑臟溫病隂陽毒戰掉不定驚動出千金方大青黃芩梔子知母芒硝各三兩麻黃四兩玄參六兩石膏生葛根各八兩生地黃切一升右㕮咀以水九升煮取三升去滓下芒硝分三服治脾腑臟溫病隂陽毒頭重頸直皮肉痺結核隱起出千金方大青羚羊角升麻射干芒硝各三兩梔子四兩寒水石六兩玄參八兩右㕮咀以水七升煮取三升分三服治肺腑臟溫病隂陽毒咳嗽連續聲不絶嘔逆出千金方麻黃梔子紫苑大青玄參葛根各三兩桂心甘草杏仁前胡各四兩石膏八兩右㕮咀以水九升煮取三升分三服治腎腑臟溫病身面如刺腰中欲折熱毒內傷出千金方茵蔯蒿梔子芒硝各三兩苦參生葛各四兩生地黃石膏各八兩蔥白豉一升右㕮咀以水九升煮取二升半下芒硝分三服大交泰丹治隂陽二毒傷寒或因下早亡陽或致結伏胸膈四肢厥冷脈息俱無心躁如火或因冷物傷脾夾臍注痛生硬入胃中滿痞塞及發潮熱并治翻胃噦逆霍亂吐㵼小腸痃癖脅肋氣痛但是隂陽不順惡候傷寒並治之每服一粒炭火內煅通赤良久取出放冷細研如粉米飲一盞煎至七分溫服不拘時隔半時辰再服甚效兼治小兒瘡疹倒壓依法服半粒丹愈金星石銀星石代赭石太隂玄精石雲母石白色成片子者禹餘糧石桂府滑石各一兩寒水石吉州者一兩半不灰木色青黑性軟者一兩右同入瓷瓶子內炭火半稱煅火耗一半取出放冷研為細末糯米粥為丸如彈子大候乾依前法服寒水石南人謂之軟石膏一方加麥飯石一兩歸魂散出聖濟總録治隂陽二毒不省人事石膏八兩寒水石四兩附子炮製去皮臍三兩陽起石三兩同石膏寒水石三味搗細研為末和入新罐內煅一伏時出紙鋪地出火毒入四味藥乾薑炮麻黃去節各一兩杏仁二七枚去皮尖雙仁炒研右搗研令勻瓷盒盛冷水調下二錢霹靂散一名黑散子治隂隔陽煩躁不飲水右用附子一枚炮熱取出用冷灰焙細研入真臘茶二大錢和勻為細末每服分作二服水一盞煎至六分臨熟入蜜半匙取溫或冷服之須臾躁止得睡汗出即差黑龍丹治隂陽二毒傷寒右用舶上硫黃一兩以柳木槌研三兩日巴豆一兩和殼記箇數用二升鐺子一口先安硫黃鋪鐺底次安巴豆又以硫黃蓋之釅醋半升已來澆之盞子蓋合令緊密更以濕紙周回固濟縫勿令透氣縫紙乾更以醋濕之文武火熬常著人守之候裏面巴豆作聲數已半為度急將鐺子離火便入臼中急搗令細再以少米醋并蒸餅少許再搗令冷可丸如雞頭大若是隂毒用椒四十九粒蔥白二莖水一盞煎至六分服一丸陽毒用豆豉四十九粒蔥白二莖水一盞同煎吞一丸不得嚼破患經五六日方可服之食前喫切在度其病勢可下即與雖及日數病未傳入或未及其日病先在臟亦不可拘執矣有孕婦人亦許服或吐或㵼為候不可喫熱食或覺心頭空以溫白粥或服調氣湯散補之欲辨隂陽二毒之病者但始得病唯看手足指冷者是隂不冷氣和者是陽若冷至指二三寸者病輕若冷至肘膝為病難理隂陽毒病亦無常也或初病便有毒或服藥經五六日以上或十餘日後不差變成其毒者其候身重背強咽喉痛飲食不下毒氣攻心心腹煩疼氣促四肢厥逆嘔吐體如被打面目青而體冷者隂症也陽毒則不然面目赤身壯熱或便膿血喉疼生班點如錦者是也合時忌婦人貓狗見破症奪命湯治隂陽二毒傷寒症候不明下藥錯誤致患人困重垂死七日以後十日以來可服此傳者云千不失一只一服不踰時見效汗自鼻上出儘是應方見傷寒門雜治類丹砂圓出活人書治傷寒隂陽二毒相伏危惡形症硝石半兩太陽石舶上硫黃水銀太隂石玄精石各一兩右為末先用無油銚子以文武火炒下諸藥末令一如灰色研如粉麵生薑自然汁浸蒸餅為丸如菉豆大每服五丸龍腦牛黃生薑蜜水下壓燥也若陽毒棗湯下隂毒蔥湯下不得於屋底炒一方無太陽石奪命丹出王氏博濟方治隂陽二毒氣衝心硃砂二兩金箔八十片膩粉半兩巴豆八十箇紙裹出油黃蠟二兩右為末煉蠟為丸如雞頭大如有患者以膩粉一錢米飲一盞調下如人行一里已來其藥動下惡物如藥在其中取出掘一地坑埋三伏時取出除却上面黑物以麝香裹養之如更用時擘為兩處重為丸一粒可療五七人神聖之功卒難序述青蒿散治隂陽二毒傷寒及肢體疼倦右用青蒿八九月候成實多採去枝梗以童子小便浸三兩日漉起酢乾日晒為末每服三錢水一盞烏梅一箇同煎七分溫服隂毒論夫隂氣獨盛陽氣暴衰陽為隂所勝內外皆隂故成隂毒傷寒有初得病便成隂毒者有服湯藥經五六日以上不瘥變成隂毒者以病本屬隂自服寒藥過多或臟腑內外受寒隂氣轉盛陽氣不復所致其候四肢逆冷臍腹築痛身如被繫嘔吐下利其脈沈細而疾者是也隂毒已深疾勢困重六脈附骨取之有按之即無一息八至已上或不可數宜用蔥尉法灼艾法傷寒初病一二日便結成隂毒或服藥六七日已上至十日變成隂毒身重背強腹中絞痛咽喉不利毒氣攻心心下鞕強氣短不得息躁渴虛汗或時鄭聲嘔逆下利身如被杖唇青面黑四肢厥冷其脈沈細緊數仲景云此隂毒之候五日可治至六七日不可治也隂毒甘草湯主之始得隂毒云隂毒本因腎氣虛寒因欲事或食冷物後傷風內既伏隂外又感寒或先感外寒而伏內隂內外皆隂則陽氣不守遂發頭痛腰重腹痛眼睛疼身體倦怠而不甚熱四肢逆冷額上及手皆冷汗不止或多煩渴精神恍惚如有所失三二日間或可起行不甚覺重診之則六脈俱沈細而疾尺部短小寸口或大六脈浮大或沈取之大而不甚疾者非隂症也若服涼藥過多則渴轉甚躁轉急有此病症者急服還陽退隂二藥即安惟補虛和氣而已宜服正元散退隂散五勝散隂症不宜發汗如氣正脈大身熱而未差用藥出汗無妨隂毒為病手足冷腰背強臍腹築痛嘔吐下利身如被杖脈細欲絶此由腎氣虛寒外傷風冷或因冷物傷脾蓋脾為太隂內外皆隂則陽氣不守遂成隂毒四肢逆冷額上手背冷汗不止或多煩渴精神如失故岐伯曰隂勝則身寒汗出身常清數栗而寒寒則厥宜服溫藥以復其陽氣或於氣海關元灸之又隂毒漸深積隂感於下則微陽消於上其症候沈重四肢逆冷腹痛轉甚或咽喉不利或心下脹滿結硬躁渴虛汗不止或時狂言指甲面色青黑六脈沈細而一息七至以來有此症者速宜於氣海或關元二穴灸三四百壯以手足和暖為效仍服金液丹來蘇丹玉女散還陽散退隂散又隂毒沈困候云沈困之候與前漸深之候皆同而更加困重六脈附骨取之方有按之即無一息八至已上或不可數也至此則藥餌難為功矣但於劑中灼艾如半棗大三百壯以來手足不和暖者不可治也偶復和緩則以前硫黃及熱藥助之若隂氣散陽氣來即漸減熱藥而和治之以取差也詩曰隂毒傷寒身體重背強眼痛不堪任小腹急痛口青黑毒氣衝心轉不禁四肢厥然惟思吐咽喉不利脈細沈若能速灸臍輪下六日看過見喜神隂毒身如擊撲然疾沈汗渴痛臍咽身班面赤多煩躁陽毒狂言洪數弦隂氣獨盛陽氣暴絶則為隂毒身冷有汗其脈沈細而疾是也沈而右疾者非初病遽然而成者有服藥數日變而成者蓋以腎氣極損生冷傷脾內已伏隂外又感寒或先感外寒後伏隂於內內外皆隂陽氣不守故爾陽氣獨勝隂氣暴絶則為陽毒身熱無汗其脈弦洪促數是也有初病遽然成者蓋酒麵過多丹砂僣躁腸胃極熱致之或病症屬陽誤投溫藥助熱為邪內外皆陽隂氣不守故爾隂陽二毒皆有頭疼微利之症抑隂用熱抑陽用寒固有條例然此二毒隨氣逆上結伏於胸中皆令人心下痛硬非常法所能通也當急作規摹以泄之隂毒泄則陽氣復陽毒泄則隂氣復隂陽升降榮衛流行自然大汗而解矣若心下已結延至六七日間斷不可活外症治法詳於後篇隂毒外症面目唇爪青黑口開氣短咽喉不利手足厥冷身不甚熱痛重如打撲或數栗而寒頭目俱疼腰重背強毒氣攻心心下堅悶腹中絞痛外腎並臍下冷硬額上及手背間冷汗不止嘔吐下利煩渴隂極發躁精神恍惚言語醒醒聲音鄭重舌上黑色隂病回陽服藥未透亦須外借火氣但無迫脅也生薑並良薑皆能散寒邪發越陽氣亦要藥也隂毒沈細而其疾身冷有汗可與之隂毒甘草湯及白术附子散正陽散肉桂散回陽丹返隂丹天雄散正原散退隂散金液散皆可選而用之則陽氣復而大汗解其汗醫之能精於此用藥療症則無不愈矣大師陳北山方訣治隂毒心下結伏按之極痛大小便閉澀纍日用藥不下但出氣稍暖亦可療治急取巴豆肉十粒研爛如麵一錢許捻作一餅堅實安頓臍心用小艾炷灸五七壯覺腹中鳴良久自通利其次用蔥白一束緊扎切作數餅灸令溫實貼於臍下以尉斗火尉其上續又易之漸覺體溫即以五積散二錢附子末一錢薑七片弦二枚鹽少許水一大盞煎七分溫溫服連併二三劑即汗出而瘥又法以大蒜一枚搗研揑作餅子灸熱置於臍心灸十壯大小便即通隂毒已深則灸氣海關元二穴以手足和為效仍以前項藥濟之若六脈附骨疾勢困甚者臍中可先艾後蔥法方訣詳具于前凡治隂毒得陽氣乍復復者皆生煩躁切勿誤投涼藥躁甚與返隂丹輩隂症太隂少隂厥隂皆屬隂症也太隂者脾也少隂者腎也厥隂者肝也何謂太隂症太隂脾之經主胸膈䐜脹甲乙經云邪生於陽者得之風雨寒暑邪中於隂者得之飲食居處隂陽喜怒又曰賊風虛邪者陽受之飲食不節起居不時者隂受之陽受之則入腑隂受之則入臟入六腑則身熱不時上為喘呼入五臟則䐜滿閉塞下為餐泄久為腸癖何謂少隂症少隂腎之經主脈微細心煩但欲寐或自利而渴又問經云一二日少隂病者何也謂初中病時腠理寒便入隂經不經三陽也傷寒雖是三隂二陽大抵發於陽則太陽發於隂則少隂也此二經為表裏其受病最為多陽明太隂受病頗稀至於少陽厥隂肝膽之經又加少焉凡病一日至十二三日太陽症不罷者但至太陽有初得病便見少隂症者直攻少隂亦不必先自太陽次傳而至蓋寒氣入太陽經即熱而惡寒入少隂經只惡寒而不發熱也三隂中寒微則理中湯稍厥或中寒下利即乾薑湯手足指頭微寒冷謂之清病有此未可喫四逆蓋疾輕故也只可服理中乾薑之類大段重者用四逆湯無脈者用通脈四逆湯也何謂厥隂症厥隂肝之經主消渴氣上衝心中疼熱飢不欲食食則吐蛔下之利不止也若隂氣獨盛陽氣暴絶則為隂毒其症四肢逆冷臍腹築痛身如被杖脈沈疾或吐或利當急灸臍下服以辛熱之藥令陽氣復而大汗解矣古人云辛甘發散為陽謂桂枝甘草乾薑附子之類能復其陽氣也微用辛甘甚則用辛苦隂極發躁隂症似陽學者當以脈别之方附子散治隂毒傷寒唇青面黑身重背強四肢逆冷或因服冷藥過度心腹脹滿昏沈不識人一名桂附散附子三分炮製去皮臍桂心白术當歸銼微炒各半兩半夏湯洗七遍去滑乾薑炮製銼天南星炮製木香各一分右搗篩為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候熱服衣覆取汗如人行十里未有汗再服治隂毒傷寒四肢逆冷身體疼痛或時心頭結硬宜服此方附子炮製去皮臍白术甘草炙微赤銼麻黃去根節已上各一兩桂心半兩木香三分右搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服衣覆取汗如人行十里未有汗再服烏頭散治隂毒傷寒四肢厥冷脈候沈細心腹脹滿腹中㽱痛咽喉不利遍身疼痛川烏頭一兩炮製去皮臍白术赤芍藥各三分麻黃去根節桂心枳殼麩炒微黃去穰當歸銼微炒川椒去目及閉口者微炒去汗乾薑炮製銼已上各半兩右搗粗羅為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候熱服衣覆取汗如人行十里未有汗再服麻黃散出聖惠方治隂毒傷寒二三日不得汗煩躁麻黃去根節防風去蘆頭各一兩乾薑炮製銼桂心川烏頭炮製去皮臍各半兩右搗羅為散每服不計時候以熱酒調下二錢衣覆取汗如人行十里未有汗再服回陽散出聖惠方治隂毒傷寒川烏頭炮製去皮臍益智子青橘皮湯浸去白穰焙桂心乾薑炮製銼各半兩麻黃一兩去根節右搗為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服衣覆取汗如人行十里未有汗再服白术散出聖惠方治隂毒傷寒心胸滿悶喘促四肢厥逆白术前胡去蘆頭附子炮製去皮臍訶梨勒皮厚朴去粗皮塗生薑汁炙令香熟各一兩桂心三分甘草炙微赤銼五味子乾薑炮製細銼各半兩右