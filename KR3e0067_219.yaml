body:
  text: 普濟方卷二百十九明周王朱橚撰諸虛門補虛益血附論夫氣為陽血為隂隂陽和平諸疾不生或衰弱則有偏隂偏陽之疾虛損之疾榮血不足津液涸少不能充養肌肉枯稿髭髮黃瘁手足多寒面色黧黑治法當加以益血之劑方薯蕷丸補虛益血調榮衛進食除五勞七傷手足疼痛肢體倦怠潤肌膚去風冷兼治虛損不足冷熱不調減飲食羸弱等症薯蕷二兩石龍芮一兩覆盆子一兩熟地黃二兩五味子一兩萆薢銼一兩蛇床子一兩肉蓯蓉一兩酒浸焙兔絲子二兩酒浸焙乾石斛一兩去根銼桂心一兩山茱萸一兩杜仲一兩半去皮炙炒黃人參一兩去蘆頭防風去蘆一兩五加皮三分狗脊一兩天雄一兩炮治去皮臍黃茋一兩銼蓁艽一兩去苗白术一兩石楠一兩麥門冬一兩半去心焙巴戟一兩右為末煉蜜為丸如桐子大每服三十丸空心溫酒下靈宿丹治腰腳通九竅利三焦及治五勞七傷諸風氣安和五臟益血補虛方見本門補益諸病類地金丸補益血脈烏髭髮調肌膚去風冷諸證生地黃十七斤竹刀切木臼搗爛木香兔絲子酒浸一日蒸搗末牛膝酒浸焙各二兩陳麴一斤搗末何首烏黑豆蒸一伏時炮乾臼搗末杏仁去皮犬雙仁研紙壓去油各四兩已上七味俱用新油單蓋伏縳定以白鹽一兩和灰泥固臍勿令透氣掘深二尺坑用慢火蟯熱方安藥罐子在內用粳火細細燒三晝夜開驗藥如豆汁色即住如未更燒一日燒藥及開藥勿令婦人雞犬犯之取出研細入后藥鹿茸酥塗炙五味子焙肉蓯蓉酒浸一宿焙白茯苓去黑皮覆盆子焙山茱萸巴戟天去心各二兩半同用木臼搗末右和作餅子搗乾山芋一斤半於盆內表裏按掩過安在竹棚子上用鋪蓋隂乾用新瓦器中盛貯旋取用木臼搗末細羅用白蜜稠更搗一千杵丸桐子大空心溫酒下三十丸食後更一服經一百日後日一服其黏罐子藥用酒洗以瓶子貯可每日飲一杯白术石斛湯補虛益血調營衛進飲食手足疼痛肌體倦怠皆治之白术石斛去根銼酒焙各半兩荆芥穗三錢桔梗銼炒秦艽去苗土各一分白芷白芍藥各三錢黃芪銼炒當歸切焙右為粗末散每服四錢七水一盞入生薑五片棗三枚煎八分去滓食前溫服日三補骨脂煎丸補虛益血氣補骨脂微炒另搗二兩附子炮製去皮臍胡蘆巴微炒巴戟天去心白檳榔炮治各一兩沉香五錢桃仁一兩去皮尖雙仁以酒一升另研如酪于銀石器內熬五七沸次入蜜二兩又煎五七沸入安息香五錢以酒半盞研細濾入煎內次入補骨脂末熬成膏右五味為末以煎膏為丸桐子大每服三十丸生薑湯或鹽湯下茸珠丸補精益血辰砂另研半錢當歸去蘆尾地黃九蒸九焙各八錢肉蓯容鹿茸去皮毛切片酥炙無酥用酒炙鹿角膠炒珠子鹿角霜大附子去皮臍炮柏子仁去殼同棗仁研黃茋蜜炙陽起石煆酒淬酸棗仁去殼搗成膏各一兩右為末酒煮麵糊丸桐子大每服五十丸空心溫酒鹽湯任下用乾物壓之為妙西蜀藥市中常有黑髮朱顔道人每酒後髙歌厲聲曰尾閭不禁滄海竭九轉仙丹都謾説惟有斑龍頂上珠能補玉堂關下血即貨此藥朝野遍傳一名斑龍丸鹿茸丸治精血虛憊補益腎水嫩鹿茸蜜炙兔絲子酒浸蒸數次研如泥蒻葉上焙各一兩沈香附子去皮臍當歸茴香炒胡蘆巴熟炒破故紙炒各半兩右用酒煮糊為丸如桐子大每服七十丸空心鹽酒鹽湯任下楮實丸補精血楮實半斤淘山芋四兩桑螵蛸銼炒枸杞子各二兩右為末煉蜜和丸如桐子大每服三十丸空心日午鹽湯下蓯蓉丸治虛損大補益精血蓯蓉酒浸一宿刮去皺皮炙乾兔絲子酒浸一宿曝乾另搗羅為末天雄炮去皮臍麋角屑酥拌微炒枸杞子微炒各二兩石斛去根逺志去心續斷乾薑炮製銼各一兩乾熟地黃三兩右為末煉蜜和搗三二百杵丸如桐子大每服空心及晚食前以溫酒或炒鹽湯下三十丸樂令健中湯治血氣勞傷五臟六腑虛損腸鳴神倦榮衛不和退虛熱除百病黃茋蜜炙人參去蘆橘皮去白當歸去土洗桂心細辛去土前胡白芍藥甘草茯苓去皮麥門冬去心各一兩半夏七錢半湯泡洗七次切右㕮咀每服四錢生薑四片棗二枚水一盞半熬七分去滓微熱服滓再煎服天地煎治血燥口乾咽燥心煩喜冷怔忡恍惚小便黃赤或生瘡痬天門冬去心二兩熟地黃九蒸暴一兩右為末煉蜜丸如桐子大每服百丸熟湯人參湯任下不拘時候金鎖丹凡人中年之後急務建助祕真之術以補殘年不衰矣若每旦服至髦無痿之理其治不可具陳桑螵蛸微炙黃色蠶蛾是雄者微炒紫稍花蛇床子微炒逺志去心鹿茸酥炙黃川茴香炒以上各半兩穿山甲五片炙焦海馬二對炙黃續斷三錢木茴二錢半麝香一錢半南乳香研二錢半黑丑一兩微炒取頭末三錢石燕子一對炭火燒赤醋淬七次研右件一十五味搗羅為細末用酒煮薄糊和丸如桐子大每服五十丸溫酒下空心及晚食前各一服其功不可言也如不及作丸只作散服尤妙黃茋健中湯治男子婦人諸虛不足羸乏少力此藥生血氣補益榮衛黃蓍去蘆肉桂去皮各三兩甘草炙二兩白芍藥六兩右㕮咀每服三錢水一盞半薑三片棗二枚同煎一法用炒小麥同煎去滓入餳少許再煎令溶稍熱服虛者加熟附子四真丸內補臟腑外充百脈資血平氣調筋強力進食養精宜常服有效當歸焙乾稱乾地黃焙乾稱各二兩北五味子一兩人參一兩右件為細末煉蜜丸如桐子大每服三十丸食前米飲吞下補精血鹿茸丸血茸半兩五味子山藥各一兩以上三件為末青鹽二錢研入右件藥煉蜜丸如桐子大每服三十丸食前溫酒下以蜜和作一塊收瓷合中臨服時丸交感丹升降水火令氣血不偏勝兔絲子四兩茯神四兩苓亦可用右為末以好酒煮麵作稀糊丸桐子大不拘時以酒或湯下五十丸兔絲子丸治精血不足筋骨無力怔忡盜汗夢遺失精鹿角霜兔絲子酒浸一宿另搗焙乾熟地黃洗焙柏子仁另研各五兩右件為細末煉蜜為丸如桐子大每服五十丸溫酒下空心如元氣虛冷久服此藥覺小便少以車前子五錢炒為末加入每服二錢水一盞煎至七分溫服小便即如常久服身輕駐顔益壽其功不可具述麥門冬湯治凡下血虛極方麥門冬白术各四兩甘草一兩牡蠣芍藥阿膠各三兩大棗二十枚右㕮咀以水八升煮取二升分再服洞陽丹補真氣去風冷通血脈附子天雄烏頭各一兩右三味同為細末入鍾乳粉一分同研勻酒糊丸如桐子大硃砂為衣每服三二丸空心溫酒下茴香丸補氣血治腰疼久服明目有效驗蒼术水浸三日去皮銼焙杜仲製破故紙川椒各二兩茴香一兩一錢厚朴一兩右六件修治外以青鹽三分入在瓶內約量入水文武火煮水盡為度焙乾為末酒糊丸空心酒下五十丸金櫻丸補血金櫻子一名山石榴曬乾以新草鞋於篩內擦刺令淨捶碎去子切焙縮砂一半右蜜丸空心酒或鹽湯下五十丸大養脾丸補氣血虛縮砂仁半兩麥芽人參各半兩神麯三錢木香三錢沉香三錢肉豆䓻棗肉包煨三錢扁豆二錢青皮二錢白豆䓻仁石蓮肉陳皮紅豆草果子丁香厚朴治各二錢右為末煉蜜為丸粟米湯嚼下空心一日三服升朝湯治脈澀精血少神氣昏倦背膞疼痛鹿茸二兩當歸二兩川烏一兩白薑一兩肉桂一兩甘草半兩右㕮咀每服半兩薑棗同煎空心服又方主精血虛憊嫩鹿茸鹽酒炙附子炮去皮各一兩乾薑炮半兩當歸炒一兩沈香鎊半兩右酒糊為丸桐子大麝末為衣每服三十丸鹽酒吞下空心服秋石丸益精生血補養心腎秋石一兩白茯苓半兩南參半兩山藥半兩川當歸酒浸半兩血茸蜜炙二兩龍骨煆半兩大附子炮一隻沈香一錢半辰砂二錢半叧研一半為衣一半入藥右為細末鹿角膠煮酒為丸如桐子大每服三四十丸溫酒鹽湯下茸附煎丸生精補血益諸虛百損鹿茸火燎去毛酒浸三宿蒸熟焙乾蓯蓉牛膝洗熟地黃當歸洗巴戟去心川續斷各四兩右以酒同浸二宿曬乾蜜丸桐子大每服三四十丸兔絲子半斤洗去沙酒浸五日焙乾大附子炮破故紙炒茯神去木茴香炒各四兩川楝子去核四兩五味子沈香官桂去皮各二兩台椒紅炒木香各一兩杜仲去皮細銼生薑汁拌乾炒蒼术半斤來泔浸一宿洗去沙土銼片用蔥白半斤切片罨五宿日乾炒黃色右為細末酒糊為丸如桐子大每服五十丸鹽湯送下補壯元陽附論夫隂陽氣血之在人初無餘欠及勞動妄作嗜欲過度戕真太甚致隂陽傷憊之疾氣血虛損之證法宜補之方麋角鹿茸丸出百一選方治真陽不足脾腎虛下焦憊傷臍腹疼痛兩脅脹滿手足麻痺目視茫茫遺泄失精精神不爽陽事不舉小便滑數氣虛腸鳴大便自利耳內常聾久服益脾元壯腎氣助真陽補虛損散寒濕養血氣留形住世此方大補元氣鹿角餅子鹿角霜各五錢菖蒲鍾乳覆盆子石斛蛇床子酒煮炒香當歸肉桂去皮金鈴子去核酒浸山藥澤㵼柏子仁研細另入續斷山茱萸去核附子炮去皮以地黃汁煮焙乾萆薢去鬚蜜水塗炙各二兩杜仲三兩炮炒去絲天雄去皮白茯苓五味子淨洗人參去蘆檳榔胡蘆巴酒浸焙麝香另研細辛各一兩破故紙酒浸炒逺志去心天門冬去心牛膝酒浸胡桃去皮研另入巴戟酒浸炒蓯容茴香炒熟地黃淨洗焙防風去蘆一兩兔絲子酒浸蒸三次研各四兩右件如法修治搗羅為末用酒煮麵糊丸如桐子大每服三四十丸漸加至五六十丸空心溫酒或鹽湯任下蓯蓉丸出御醫院方壯元氣養精神蓯蓉酒浸焙乾二兩楮實子枸杞子地膚子五味子金毛枸脊去毛覆盆子兔絲子乾山藥補骨脂微炒逺志去心石菖蒲熟地黃杜仲去粗皮炒石斛澤㵼白茯苓去皮牛膝酒浸炒萆薢柏子仁微炒别研各一兩山茱萸酒浸取肉一兩右為細末酒糊為丸如桐子大每服六七十丸食前溫酒下日可一二服薯蕷丸出聖惠方補暖臟腑強壯腰腳益氣倍力令顔色悅澤薯蕷一兩逺志三分去心白茯苓三分人參三分去蘆頭蓯蓉一兩酒浸一宿刮去粗皮炙乾山茱萸三分附子一兩炮治去皮臍五味子三分鍾乳粉一兩半牛膝三分去苗蛇床子三分黃耆三分銼萆薢三分銼車前子三分石斛一兩去根桂心三分天門冬三分去心兔絲子三分酒浸三日曝乾别搗為末鹿茸一兩去毛塗酥炙令乾右為末煉蜜和搗三五百杵丸如桐子大每日空心以溫酒下三十丸漸加至四十丸晚食前再服接氣丹出和劑方治真氣虛憊隂邪獨盛陽氣暴絶或吐㵼久痢虛脫等疾餘同黑錫丹治服此藥尤佳沈香硫黃入黑錫丹砂子結放令研為末黑錫去滓稱各二兩牛膝酒浸白术炒蓯蓉酒浸各半兩丁香川楝子去核用肉木香茴香肉豆䓻破故紙炒桂心去粗皮附子炮去皮臍胡蘆巴炒陽起石煆各一兩右藥并砂子四兩並為細末和勻用糯米粉酒煮為丸桐子大溫酒鹽湯空心吞下五十丸太和膏出御院方治諸虛不足氣血虛衰精神減少肢體瘦悴行步艱難久服益精氣壯元陽補虛乏健脾胃美飲食當歸酒浸川楝子破故紙白茯苓枸杞子葫蘆巴逺志去心白术各三兩川芎二兩舶上茴香肉蓯蓉各六兩黃蠟一兩半䓤白十莖胡桃五十個去殼用右用鹿角三十斤東流河水三十擔銅竈鐵鐹二隻靠鹿頂截角用赤石脂鹽泥於截動處塗固之勿令透氣於甑內蒸一炊用馬藺刷就熟湯刷去角上血刺塵垢訖可長三四寸截斷鹿角外將前件藥一十四味拌和停勻先鋪一層角於鍋內角上鋪一層藥如此勻作三層鋪之將河水添在藥鍋內其水於角上常令髙三寸用無煙木炭慢慢煎熬常令小沸勿令大滚外一鍋內專人將河水煎湯下勿令大滚如藥鍋內水稍下却於熱湯內取添止髙三寸却取河水添在熱湯內陸續加添