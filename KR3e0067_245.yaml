兩生用右為末煉蜜為丸如梧桐子大每服二十丸溫鹽湯下至三十丸不拘時候服麻仁大黃丸出聖濟總録専治腳氣大便祕澀大黃五兩大麻子仁二兩研先將大黃為末入麻子仁研勻煉蜜和丸如梧桐子大每服十丸食前溫酒下薑湯亦得日再以大腹溏滑為度未瘥加至二十丸兼消腫下氣破宿癖疏風壅桑楮湯出聖濟總録専治腳氣虛腫小便少桑根白皮楮白皮各細銼淨洗取一斤右搗篩每服三錢水一盞半煎至八分去滓空腹溫服日三消石丸出聖濟總録専治腳氣喘急咳嗽浮腫小腸澀消石研三分葶藶紙上炒二兩右為末煉蜜為丸如梧桐子大每服十丸至十五丸食前桑楮皮枝煎湯下黑豆湯一名檳榔湯専治腳氣小便四肢腫方見本門腳氣腫滿類沉香羌活散専治腳氣大小便祕或入腹衝心疼痛腫滿沉香木香羌活白芍藥檳榔各三錢甘草炙川芎枳殼各二錢青皮二錢紫蘇葉紫蘇子木瓜各二錢五分右㕮咀每服四錢水二盞生薑三片煎食前服腳氣風經五臟驚悸夫心者生之本神之舍所以主治五臟者也腳弱之疾感於風多而濕證少則風行陽化其應在心令人神思不寧心多驚悸也方竹瀝湯出聖惠方能療風毒入人五臟內短氣心下煩熱手足煩痛四肢不舉皮肉不仁口噤不能語當歸一兩防風三兩生薑八兩白术三兩人參黃芩芎藭細辛桂心各二兩茯苓三兩甘草二兩炙附子二兩炮秦芁三兩葛根五兩升麻二兩麻黃二兩去節蜀椒一兩出汗去目右切以甘草汁一斗九升煮取四升分五服忌豬肉冷水海藻菘萊生菜生蔥桃李雀肉醋物一方有芍藥茯神防己通草無茯苓黃芩芎藭升麻蜀椒麻黃生薑木香湯治腳氣風經五臟心下堅滿驚悸不寧金牙細辛去苖葉茵芋防己去蘆乾薑炮附子炮製去皮臍地膚蒴翟生乾地黃炮升麻人參各二兩牛膝石膏去根各三兩獨活去蘆頭六兩右十四味㕮咀用生絹袋盛入淨甕中以清酒三斗浸密封春夏五日秋冬七日隨量飲之不拘時常令酒力相續獨活湯治先有風證後患腳氣心悶憤憤驚悸不安食即嘔吐脹滿獨活去蘆頭赤茯苓去黑皮麻黃去根節炒陳橘皮湯浸去白炒各一兩五錢半夏湯洗去滑炒乾三兩檳榔銼射干桂去粗皮防葵生用各一兩右九味粗搗篩每服三錢以水一盞入生薑半分拍破同煎至七分去滓溫服若小便利兼汗即瘥如無防葵用龍葵代之木香丸治腳氣風經五臟夜臥不安心中驚悸主意不定小便數木香升麻白术枳殼去穰麩炒芍藥各一兩白茯苓去黑皮銼大黃細銼微炒各三兩檳榔細銼二兩右為末煉蜜和丸如梧桐子大每服十丸空心溫酒下日午再服漸加至十五丸以微利為度茯苓飲治兩腳腫至膝小腹引痛膀胱急宿水不宣時復心悶夜臥恍惚昏熱驚悸赤茯苓去黑皮桑根白皮炙銼防己郁李仁湯浸去皮尖羚羊角鎊木香檳榔碎五枚紅雪二兩五錢續入右除紅雪外粗搗篩每服五錢水一盞半煎取七分絞去滓納紅雪二錢空心溫服當快利三兩行須隔日服之酸棗仁湯治風毒敗攻下焦冷注四肢疼痛腳膝􅍙痺及風肝臟心神恍惚筋脈拘急酸棗仁炒二兩薏苡仁炒一兩五錢人參三兩茯神去木一兩麥門冬去心焙五錢右搗篩每服四錢水一盞煎至七分去滓熱服不拘時候日三腳氣變成水腫附論昔人論腳氣謂脾受陽毒即熱􅍙腎受隂濕即寒痺是知腳氣之病脾腎得之為多也今變成水腫者亦緣脾腎俱虛之故蓋腎虛則不能行水脾虛則不能制水故水氣散溢滲於皮膚流遍四肢所以遍身腫也方防風湯治腳氣腫滿變為風水防風去蘆防葵生用澤㵼白术黃耆杏仁湯浸去皮尖雙仁炒麻黃去根節獨活去蘆頭赤茯苓去黑皮各五錢大豆炒熟三合赤小豆炒熟半升桑根白皮銼炒四兩陳橘皮湯浸去白炒澤㵼麥門冬豬苓去黑皮各三分大戟銼炒一兩右搗篩每服五錢水一盞半生薑半分煎至七分去滓空心日午溫服豬苓散治虛滿通身腫利三焦通水道茯苓葶藶炒人參防風去蘆澤㵼甘草桂心白术狼毒椒目乾薑各三分赤小豆二合大戟二錢蓯蓉二分半豬苓三分女萎三分炒五味子三分右搗篩酒服方寸日三夜一老小一錢以便利為度忌海藻菘萊生蔥桃李醋雀肉酸物犀角湯出千金方専治腳氣衝心變成水氣身體遍腫悶絶欲死者犀角鎊旋復花去枝葉白术桂去粗皮防己各一兩桑根白皮銼炒前胡去蘆頭各二兩陳橘皮湯浸去白炒黃芩去黑皮心赤茯苓銼黑皮各一兩五錢豉半升紫蘇莖葉半握銼右搗篩每服五錢水一盞半生薑一片大棗三枚煎至八分去滓溫服日三得大小便通利為度茯苓丸治腳氣兼成水脹赤茯苓去黑皮白术椒目各一兩五錢葶藶子隔紙炒一兩五錢澤㵼防己芒硝各一兩一分赤小豆二合前胡去蘆頭芫花醋炒焦桂去粗皮各二兩甘遂炒三兩右搗羅為末煉蜜和令勻熟丸如梧桐子大每服五丸空心米飲下日二漸加至十丸以便利腫消為度海蛤湯治腳氣變成水腫小便不通喘息海蛤澤㵼葉新者防己木通銼百合各一兩桑根白皮銼炒一兩五錢郁李仁湯浸去皮尖雙仁炒牽牛子炒檳榔銼各五錢右搗篩每服三錢水一盞煎至六分去滓空心日午溫服防己丸治腳氣不瘥變成肺氣或上氣喘急夜臥不得賁豚氣脹頻發急喘漸成水氣防己赤茯苓去黑皮牽牛子洗去黑汁焙乾白术各一兩玄參杏仁湯浸去皮尖雙仁炒海蛤各一兩五錢澤㵼一兩一分郁李仁湯浸去皮二兩半右為末煉蜜和丸如梧桐子大每服三十丸空腹米飲下朴硝丸治腳氣水氣朴硝三兩青白色者煉過細研芒硝一兩青白色者細研馬牙硝五兩細研烏頭生去皮臍椒目炒各一兩二味為散與三硝末同羅葶藶子紙上炒莨菪子炒各一兩杏仁去皮尖雙仁炒研二兩右為末取大棗七枚煮熟取肉銚子內􅘤令水盡研爛與藥和勻更入熟蜜少許同搗千杵丸如梧桐子大每服十丸至二十丸空心桑白皮湯下豬苓湯治腳氣兼水氣隔氣通身腫滿氣急小便不通坐臥不得豬苓去黑皮赤茯苓去黑皮防己各三分桑根白皮五兩炙郁李仁湯浸去皮尖炒澤㵼銼木香各三兩大腹七枚和皮子銼右搗篩每服五錢水一盞半煎至八分去滓溫服當下小便立效日三大腹湯治風毒腳氣攻入五臟心腹氣脹喘急大小便不通漸成水腫大腹十枚和皮銼陳橘皮湯浸去白炒一兩吳茱茰三分炒木香研郁李仁湯浸去皮尖雙仁炒各二兩五錢右搗篩每服三錢以水一盞煎至六分去滓食前溫服日二葶藶子丸出聖濟總録専治腳氣成水兼上氣氣急咳嗽大小便苦澀所服利水藥反利大便唯小便轉澀者葶藶子隔紙炒三兩防己甘草炙銼各一兩杏仁湯浸去皮尖雙仁炒研如脂貝母去心各二兩五錢右搗篩三味為末與葶藶杏仁拌勻以棗肉和丸如梧桐子大每服三十丸空心煎大棗桑白皮粳米湯下如小便未快即加至四十丸服麻仁湯治腳氣氣急大小便澀通身浮腫漸成水候麻仁子五合炒熟研如膏大豆一升炒熟桑根白皮細銼炒三兩右將麻仁與桑白皮拌勻每服以水一盞半先煎大豆三合熟去豆下二味五錢煎至七分去滓溫服空腹日午臨臥各一赤小豆湯治腳氣氣急大小便澀通身腫兩腳氣脹變成水者赤小豆半升桑根白皮炙銼二兩紫蘇莖葉一握銼焙右為末每服先以豆一合用水五盞煮熟去豆用汁二盞半入藥末四錢生薑一分煎至一盞半空心溫服治腳氣壅毒水腫浮氣右用檳榔以沙牛尿一盞磨一枚空心暖服治腳氣水腫利大小腸右用桑葉味甘甘寒有少毒水煎取濃汁服治賁豚腳氣水腫出本草以釣樟根皮水煎服普濟方卷二百四十五
