body:
  text: 普濟方卷二百四十五明周王朱橚撰腳氣門腳氣心腹脹滿附論夫風毒之中人也必先中腳久而不瘥遍及四肢其氣深入則腹脅脹滿小便澀而不利氣喘高者其病為重也方杉節湯出直指方専治腳氣攻心痛悶脹滿不食青皮陳皮天台烏藥雞心檳榔宣木瓜乾杉木節半夏製枳殼製宿砂仁赤茯苓各五錢丁香茴香微炒大腹皮紫蘇子微炒北梗蘿蔔子微炒甘草炙各一分右銼每三錢水一盞半生薑五片煎至八分去滓溫服昆布丸一名吳茱萸丸能治腳氣夏盛秋歇毒氣既謝風緩猶在若諸病皆退但若食腹脹不安為氣在咽喉吐不出咽不入心悶痰滿食已吐醋水者若先服諸藥及湯酒等兼服之不相違忤吳茱萸蓽撥茯苓白术麴葶藶炒昆布各四兩洗杏仁去皮尖炒枳殼大黃乾薑炒旋復花二兩五錢橘皮三兩五錢右搗篩蜜和為丸如梧桐子飲服十丸日二服利多減之不利加之常令微利覺病退則止發便服之不可常服令瘦人六七日半合之或三分減一分不爾酸敗一本有半夏六兩以湯洗熬之射干三兩又一本無旋復花乾薑大黃杏仁橘皮忌羊肉餳桃李雀肉酢物治腳氣非冷非熱老人弱人脹滿者出本草用檳榔為末以檳榔殼斗或茶飲豉汁中調服方寸匕甚利治腳氣煩悶益心力方出本草取青魚和韭白煮食之治腳氣腫滿轉上入腹殺人出本草取赤小豆一升水五升煮熟去豆適寒溫浸冷即重溫之肉豆䓻丸治久患腳氣腹脹膝腫肉豆䓻人參陳橘皮湯洗去白炒各一兩木香一兩五錢桂去粗皮三分檳榔煨銼赤芍藥柴胡去蘆枳殼去穰麩炒各一兩五錢厚朴去粗皮除土生薑炙令煙盡高良薑各三分吳茱萸湯洗焙乾炒五錢右為末煉蜜和丸如梧桐子大每日空心溫酒下二十丸晚再服沉香散治腳氣心腹脹滿四肢壅悶不思飲食宜服沉香三分銼大腹皮一兩銼赤茯苓一兩木香五錢枳殼三分麩炒去穰檳榔一兩吳茱萸五錢湯浸七次焙乾微炒赤芍藥五錢桂心三分川大黃一兩碎炒訶梨勒皮一兩桑根白皮一兩銼右為散每服四錢以水一中盞入生薑半分煎六分去滓不計時候溫服木瓜丸出聖惠方専治腳氣心腹脹滿腳膝浮腫上氣喘促木瓜一兩乾者赤茯苓五錢木香五錢桂心一分沉香一兩陳橘皮一兩浸去白穰紫蘇葉一兩柴胡一兩去苖高良薑一兩銼赤芍藥五錢檳榔二兩吳茱萸二分湯浸焙乾右為細末煉蜜和搗二三百杵圓如梧桐子大每服不計時候以溫酒下三十丸茯苓散出聖惠方専治腳氣心腹脹滿兩脅妨悶不能飲食赤茯苓一兩枳殼一兩麩炒微黃去穰木香五錢木通三分銼川大黃二兩銼碎微炒訶梨勒皮一兩鱉甲一兩塗醋炙微黃去裙襴檳榔一兩桔梗五錢紫蘇莖葉一兩桂心五錢右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服訶梨勒湯出王氏溥濟方能治腳氣疼痛發熱腫悶上攻心腹脹滿吐逆反狀多般大抵地多卑濕處多有此疾訶梨勒炮皮核大腹煨熟和皮用木香防己紫蘇莖葉乾木瓜去子羌活去蘆頭芍藥沉香鎊杉木各五錢右搗篩每服五錢水二盞煎至一盞去滓通口服不計日時再大治風氣上衝羚羊角丸治腳氣心腹妨悶兩脅虛脹不思飲食漸覺心滿氣隔不通羚羊角鎊茯神去木木香防風去蘆升麻各二兩赤茯苓去黑皮大麻仁别搗如膏各三兩獨活去蘆頭二兩五錢大腹七枚連子銼旋復花一兩一分右除大麻仁外搗羅為末合和勻煉蜜為丸如梧桐子大每日空腹酒下四十丸日一服如腹內先冷加附子炮製去皮臍二兩大腸祕澀加大黃銼炒二兩五錢兼氣加檳榔銼二兩五錢心胸間熱多加麥門冬去心三兩筋急掣痛加牛膝切焙二兩五錢皮膚風癢心下防悶加枳殼去穰炒黃一兩五錢臟氣羸弱加黃耆銼炒三兩昆布丸治諸腳氣定時候間滿腹不能食者四時俱得服下氣消脹病源云此由風濕毒氣從腳上入於內與臟氣相摶結聚不散故心腹脹急昆布八兩射干四兩茯苓乾薑各一兩羚羊角屑橘皮各三分杏仁五分去皮尖雙仁炒蓽撥吳茱萸大黃各六分大小便澀者著大黃無不須用右搗篩蜜和為丸如梧桐子大飲服十五丸利多服七丸以意消息不能食者加白术六分麴米十分氣發服以前丸得定如不定作檳榔皮湯壓之忌炸物桃李等物木香散出聖惠方専治腳氣心腹脹滿壅塞不欲飲食木香五錢青橘皮一兩湯浸去白穰檳榔一兩訶梨勒皮一兩沉香五錢杉木節五錢銼蘹香子五錢炒澤㵼二分赤茯苓一兩紫蘇莖葉一兩右為散每服四錢以水一中盞入生薑半分蔥白七寸煎至六分去滓不計時候溫服高良薑丸出聖惠方專治腳氣心腹脹滿兩膝疼痛高良薑三分銼桂心五錢當歸三分銼陳橘皮五錢湯浸去白穰威靈仙三分檳榔三分牽牛子二兩細炒羌活三分蘿蔔子二兩微炒右為細末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以溫酒服下三十丸以利為度牛膝丸治腳氣食即腹脹喘急不利腰連左胯時掣痛小便日有餘瀝背膊拘悶手心多汗牛膝銼酒浸一宿焙木香訶梨勒皮兔絲子酒浸搗碎各二兩五錢赤茯苓去黑皮人參檳榔煨銼枳殼去穰麩炒各一兩五錢右為末煉蜜和丸如梧桐子大每日空腹溫酒下十五丸日午再服漸加至三十丸半夏湯出千金方専治腳氣上入腹脹急上衝胸氣急欲絶半夏一升桂心八兩乾薑五兩甘草人參附子各二兩蜀椒二合右㕮咀以水一斗煮取三升分三服初稍進恐氣衝上膈塞不得下少少服通人氣耳木香飲出直指方専治腳氣入腹攻心嘔悶南木香甘草炙青木香吳茱萸湯洗七次乾各五錢宣木瓜真橘皮紫蘇莖葉雞心檳榔各一兩右銼每服三錢薑五片烏梅一枚煎服前胡飲治腳氣攻心腹脹滿嘔吐不食前胡去蘆頭生薑切焙羚羊角鎊半夏湯洗七遍大黃銼炒赤茯苓去黑皮各五錢枳殼去穰麩炒三分右銼如麻豆每服五錢水一盞半煎至一盞去滓下朴硝一錢攪勻空腹溫服紫葛飲治腳氣風毒與臟氣相擊心腹急脹紫葛炒大戟炒黑牽牛瓦上焙半生半熟大黃銼炒各一兩木香一兩乳香少許白研檳榔五錢煨右除乳香外搗半勻每服三錢童子小便各半盞蔥白三寸蜀椒二十粒煎至六分去滓臨臥溫服量虛實用至來日早取下赤汁效第一服病減五分次日第二服必安降氣湯治虛陽上攻氣滯不快上盛下虛隔壅痰實咽乾不利咳嗽中滿喘急氣粗臍腹澎脹滿悶虛煩微渴引飲頭目昏眩腰疼腳弱四肢倦怠此藥専治腳氣上攻中滿氣急更有下元虛冷并尊年氣虛之人素有上壅之患服補藥不得者用之極效大便祕者仍用此藥下黑錫丹養正丹等藥少年氣大便祕上壅脾胃素壯者用此藥神攻丸三黃丸治上壅咽喉痛者先用降氣不效則服甘桔湯用生甘草桔梗等分加荆芥數穗白水煎服一名紫蘇子湯半夏五兩前胡去蘆甘草厚朴當歸各二兩肉桂陳皮各三兩右㕮咀并紫蘇子五兩微炒碾破極難得真須是細而香者共為八味每服四錢水一盞半生薑五片棗一枚煎至八分去滓不拘時服如無真蘇子只服生蘇飲亦佳凡人中風中氣痰飲腫滿及腳氣等患多是虛氣上攻胸膈不快不進飲食此藥大能降氣真仙人降氣湯後加參附五加皮大腹皮之類者却非其真若素無腳氣只是上氣喘急不得臥者亦宜用之或枳殼橘皮紫蘇子人參五味子桔梗各等分名神祕湯甚者用此藥調鍾乳粉下養正丹素有喘疾遇寒不當之時發則連不已夜不能睡則服九寶湯用龍腦薄荷紫蘇葉大腹皮麻黃各一兩桑白皮與官桂杏仁橘皮甘草各減半每服水一盞半生薑十片烏梅二個煎至六分去滓專心服之其年高人患嗽喘者亦宜服之小兒室女哮喘之患其效著切而謂薄荷冷紫蘇耗氣麻黃發散不肯多服蓋病有主對服之不妨時間感冒頭重鼻或流清涕或作咳嗽並宜服此惟虛勞自汗不可服之曩湘東王患腳氣十年篤困得此方遂安一方以降氣湯加川芎細辛桔梗茯苓共二十味名大降氣湯治法亦同老人氣虛上壅當兼以生附加生薑等分煎臨熟以藥汁濃磨沉香再煎再一沸服之尤為穩當若腳氣入腹大便必祕不任冷藥者當用降氣湯咽養正丹以溫利之詳見養正丹方中腳氣之證人多不識若作他病治之入腹攻心為禍甚速千金論見食嘔吐或腹痛下利或大便小便祕塞或胸中衝悸不欲見光明或精神昏憒言語錯亂或熱或冷或轉筋或腫或不腫或䏶腿頑痺或緩縱攣急或小腹不仁皆腳氣之證凡小覺有此急須治之傷緩則氣上入腹胸脅逆滿喘急自汗及嘔吐皆不可治今人患腳氣者多因氣實而死終無服藥致虛而殂故腳氣人不得大補亦不可㵼切不得畏虛預止湯藥宜服降氣湯間以茱萸用檳榔二兩橘紅茱萸木瓜紫蘇各一兩五錢㕮咀每服四錢生薑十片煎服仍多服石南丸并木瓜丸以大便溏利為效此數藥用之極驗更於養正丹方中互言之矣然只以偹緩急之需如諸經受病却當詳備桑白皮散治腳氣心腹脹滿壅悶喘急桑白皮一兩銼檳榔一兩五錢木香五錢牽牛子二兩微炒青橘皮一兩湯浸去白穰川大黃一兩銼碎炒杏仁一兩湯浸去皮尖右為散每服不計時候暖生薑童子小便調下二錢以利為度檳榔散治腳氣心腹脹滿煩悶喘促檳榔一兩陳橘皮一兩湯浸去白穰豬苓一兩去黑皮木瓜一兩乾者紫蘇莖葉一兩桑白皮一兩銼右件為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服木香散治腳氣心腹脹滿堅硬不消木香一兩鱉甲二兩塗醋炙令微黃去裙襴訶梨勒皮一兩檳榔一兩桂心三分川大黃二兩銼碎微炒右為散每服四錢以水一中盞入生薑半分去滓不計時候溫服大戟丸治腳氣攻注心腹脹硬小便赤澀大戟炒芫花醋炒黑色苦葶藶炒各五錢續隨子炒巴豆去皮心焙出油别研各一分右為末煉蜜為丸如梧桐子大每服十丸燈心湯下松節湯治腳氣入腹心腹脹急煩悶腫痛松節銼碎炒黃桑根白皮銼紫蘇葉各一兩甘草炙銼五錢檳榔煨銼三分右搗篩每服三錢水一盞燈心二十莖生薑三片童子小便三分同煎至七分去滓食前溫服日二吳茱萸湯許仁則曰此病有數種有飲氣下流以成腳氣飲氣即水氣之漸亦有腎氣先虛暑月承熱以冷水洗腳濕氣不散亦成腳氣此諸腳氣皆令人腳脛大腳趺腫重悶甚上衝心腹滿悶短氣中間有乾濕二腳氣濕者腳腫乾者腳不腫漸覺枯燥皮膚甲錯須細察之若先覺心腹脅肋刺痛胸背滿悶喫食之後此狀彌加時時氣短手腳沉重骨髓疼多喘氣每食諸黏膩陳敗臭物即諸狀轉劇此即飲氣下流而成腳氣有此候者自冝依前療飲氣將成水氣細辛等八味湯葶藶子等十五味凡療之若先無前狀但覺腳腫疼悶沉重有緩弱乍衝心腹滿悶小腹下不利有時急痛宜依後吳茱萸湯等五味桑根白皮等六味丸側子等十味酒細服之吳茱萸二兩生薑五兩橘皮三兩桂心二兩大檳榔十枚右藥切以水七升半去滓分溫三服服相去如人行七八里久一服覺諸狀可欲重合服亦佳服湯後將息經三四日即服後桑根白皮等六味丸忌生蔥又方桑根白皮五兩生薑六兩屑蜀椒汗桂心升麻四兩五味子四兩右搗篩煉蜜和丸以飲下之初服十五丸日再服稍加三十丸如梧桐子大覺熱食前服覺冷食後服忌生蔥側子酒至九月以後宜合側子等十味酒服之兼將下丸方側子五兩生薑八兩桑根白皮八兩白术八兩桂心四兩五加白皮六兩牛膝五兩丹參六兩續斷五兩細辛四兩右藥切絹袋盛用灰酒五升浸五六日初服一雞子黃許日再服少少加之以知為度必用前數法不覺可宜依舊腳氣方用之忌豬肉冷水桃