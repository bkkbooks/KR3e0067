body:
  text: 普濟方卷三十三明周王朱橚撰腎臟門腎虛漏濁遺精附論素問云夫腎精者身之本也蓋五臟六腑皆有精腎為都會關司之所命聽於心人能法道清淨精氣內持火來坎户水到離宮隂平陽祕精元密固矣若夫思慮不節嗜欲過度使水火不交精元失守由是為赤濁白濁之患焉赤濁者是心虛有熱也常因思慮而得之白濁者腎虛有寒也過於嗜欲而得之其狀凝面如油光彩不定常時濁漏粘如膏糊皆思慮嗜欲之所致耳各分致病之由施以治法坎離既濟隂陽協和然後火不上炎而神自清水不下滲而精自固安有赤濁白濁之患哉雖然思慮過度不特傷心亦能病脾脾土虛而腎不足故土邪克水亦令人便下渾濁史戴之又云夏則土燥而水濁冬則土堅而水清醫若峻補則疾愈甚以中和之藥療之水火既濟土自堅其精固矣遺精白濁二證脈息多澀醫經曰男子二八腎氣盛天癸至天癸者精之本也腎臟不足皆由不善衛生喜怒多勞憂愁思慮嗜欲過度起居不常遂致心火炎上而熄腎水散漫而無歸上下不得交養心腎受病令人遺精白濁腎受病者亦令人遺精白濁皆心腎不交關鍵不定之故耳腎病者當禁固之心病者當安寧之更有少壯之人情動於中所願不得意淫於外一門內有是證者大要於治之法不宜祕固祕固則愈甚惟當以後方豬苓丸主之蓋半夏有利豬苓導氣使通之也但虛損精滑之人却不宜服無因而出者曰尿因見聞而出者曰精心不足而熱赤曰赤濁心不足而腎冷者為白濁隂不升陽不降是以有清濁不分又有脾精不禁小便漏濁淋瀝不止手足腰背酸疼用蒼术等劑則脾精生於內也邪客於隂神不守舍故心有所感夢而後泄也其候有少年氣盛鰥曠多時強制情欲不自覺知此泄如瓶之滿而溢者也人或有之是為無病勿藥可矣心家氣虛不能主宰或心受熱陽氣不收此泄如瓶之側而出者也人多有之其病猶輕令和平之劑補之臟腑精弱其元久虧心不攝念腎不攝精此泄如瓶之碎而漏者也人或有之其病最重須當大補湯主之夢泄尤甚於房勞此世習聞其説者也又有神氣消磨異性橫生風邪乘虛致干其正往往與妖魅交媾是尤甚也宜用法藥調治之韭子丸出千金方治房室過度精泄自出不禁腰背不得屈伸食不生肌兩腳苦弱此藥治之韭子一升甘草一兩桂心半兩紫石英半兩當歸二兩禹餘糧一兩逺志一兩山茱茰一兩天雄一兩紫苑半兩薯蕷半兩細辛一兩茯苓一兩薑蠶半兩菖蒲半兩人參一兩杜仲一兩白术二兩乾薑二兩芎藭二兩附子石斛各一兩大棗五十個牛膝半兩乾漆半兩天門冬一兩半茯苓一兩黃耆一兩絲子一兩乾地黃二兩蛇床子半兩右為細末入牛髓同白蜜棗膏合搗三五千杵空心服丸如梧桐子大每服十五丸日再服可加至二十丸玉鎖固真丹出危氏方治心氣不足思慮太過腎經虛損真陽不固旋有遺泄小便經嵗白濁或淡赤或如膏夢寐精泄甚則身體拘倦骨節酸疼飲食不進面色黧黑容枯肌瘦唇乾舌燥虛煩盜汗舉動力乏多服效白龍骨半斤磁石醋淬七次硃砂各一兩牡蠣煆一兩紫梢花一兩半家韭子絲子各二兩鹿茸酒浸炙白茯苓一兩川巴戟一兩官桂一兩肉蓯蓉酒浸桑螵蛸酒浸當歸各二兩木香不見火逺志甘草水煮取肉蒼术各一兩茴香炒吳茰炒川練子炒桑寄生各半兩沈香半兩黃耆一兩綿附子炮去皮臍一兩右為末煉蜜和丸如梧桐子大每服五十丸溫酒鹽湯下棘刺丸治虛勞諸氣不足夢泄失精方見虛勞門夢泄頰八藥靈砂丸出危氏方治諸虛百損白濁耳鳴當歸酒浸鹿茸去毛鹽水酒炙黃耆各一兩沈香一兩北五味半兩逺志一兩酸棗仁一兩茴香炒吳茱茰去核破故紙炒牡蠣煆熟地二兩人參一兩龍骨煆附子巴戟各一兩硃砂一兩右為末酒糊和丸每服五十丸至七十丸溫酒鹽湯下龍齒補心湯出直格方治諸虛不足潮熱心內驚惕睡臥不寧小便油濁龍齒煆人參當歸酒浸熟地各一兩桔梗焙酸棗仁半兩麥門冬去心半夏麴各一兩白术炒甘草各半兩炙枳殼麩炒白茯苓去木逺志一兩肉桂二錢半黃耆七錢半炙右為末每服三錢水盞半薑五片粳米一撮同煎不拘時服鹿茸益精丸出直格方治心虛腎冷漏精白濁鹿茸去毛酥炙桑螵蛸瓦上焙肉蓯蓉當歸巴戟天去心絲子酒浸杜仲鹽水炒斷絲益智仁川練子去皮取肉赤石脂韭子炒禹餘糧煆用醋淬碎為度各三錢破故紙山茱茰龍骨二兩滴乳香一分右為末酒糊丸如梧桐子大每服七十丸食前白茯苓煎湯下茸丸出經驗方治心腎不交小便滑數精神耗散腰腳無力鹿茸肉蓯蓉乾地黃萆薢杜仲五味子白茯苓各二兩木瓜一兩巴戟枸把子川牛膝補骨脂青鹽各二兩絲子金鈴子各五兩蓮肉八兩右依法炮製為末酒煮山藥末糊為丸如梧桐子大每服五六十丸空心溫酒或鹽湯送下暖腎丸出直格方治腎虛多溺或小便不禁而濁葫蘆巴炒一兩破故紙炒一兩半川練子炒研一兩益智仁二兩熟地黃三兩鹿茸酥炙赤石脂各一兩山茱茰一兩代赭石醋煅龍骨各半兩海螵蛸一兩艾醋炙丁香沈香乳香各二錢禹餘糧醋煅碎三錢右為末糊丸桐子大每服五十丸煎石菖蒲湯送下子午丸出危氏方治心腎俱虛夢寐驚悸常自煩悶短氣不樂消渴停飲下赤白濁甚至四體無力眼昏形瘦耳鳴頭暈惡風怯冷棐子去壳二兩蓮肉去心枸杞子白龍骨川巴戟去心破故紙炒真虎珀各一兩芡實一兩半赭石白礬枯赤茯苓各一兩白茯苓二兩文蛤半兩蓮花半兩牡蠣煅一兩右為末酒蒸肉蓯蓉一斤爛研為丸如桐子大硃砂為衣煎萆薢湯空心吞下忌勞力房事十四友丸補諸虛不足益血收斂心氣治怔忪不寧精神昏倦不安赤白濁甚方見心臟門心虛類心腎丸見諸虛門治水火不濟心下怔忪夜盜汗便赤夢遺鹿茸散治臟腑久虛夢泄鹿角屑一兩鹿茸酥炙一兩白茯苓三錢人參一兩桑螵蛸研一兩芎藭一兩當歸一兩破故紙炒龍骨各半兩柏子仁去殼甘草炙各一兩棐子酒浸一宿半兩右為末每服三錢半生薑五片棗三枚粳米百粒食前煎服家韭子丸出直格方治腎氣不足精遺方見小便淋門遺精類逺志丸出直格方治腎不足遺精白濁驚悸健忘夢寐不安足脛酸疼逺志去心取肉地黃洗天門冬去心龍齒各一兩研麥門冬去心五味子一兩車前子半兩白茯苓去木地骨皮各一兩三錢桂六錢山藥炒熟地一兩半右為末煉蜜和丸如梧桐子大每服五十丸食前粳米湯送下芡實丸出危氏方治思慮傷心房勞傷腎心腎不交精元不固面少顔色驚悸健忘夢泄小便赤澀遺精白濁足脛酸疼耳聾目昏方見諸虛門補虛固精類瑞蓮丸出濟生方治思慮傷心便下赤濁白茯苓去木石蓮肉炒去心龍骨生用天門冬去心麥門冬去心逺志去心甘萆煮柏子仁炒研當歸酒浸紫石英醋煆七次酸棗仁炒去殼龍齒以上各一兩乳香半兩各研右為末煉蜜為丸如梧桐子大硃砂為衣每服七十丸空心溫酒棗湯下降心丹出直格方治心腎不交盜汗遺精及熱藥過多上實下虛小便赤白常服鎮心益血方見諸虛門諸虛補益類清心蓮子飲一名加味清心飲治心中客熱煩躁赤濁石蓮肉白茯苓各一兩益智仁水浸出薑汁炒逺志水浸取肉麥門冬去心人參各半兩石菖蒲車前子一兩白术一兩澤㵼甘草炙各二錢右銼散每服三錢添燈心一握煎熱加薄荷少許韭子丸出千金方治小便失精及夢泄精方見虛勞門虛勞失精類妙應丸出直格方治赤白濁通用真龍骨辰砂厚朴以腐草鞋重包插定火煆并研細石菖蒲各二錢半川練子蒸去皮取肉半兩白茯苓二兩益智仁三兩石蓮肉一兩砂仁三兩桑螵蛸瓦上焙絲子酒浸一宿各半兩右以藥碎研為末糊丸如梧桐子大每服五十丸煎人參酸棗湯下臨臥服或粳米飲送下韭子丸治虛勞夢泄方見虛勞門夢泄類固精丸出濟生方治嗜欲過度勞傷腎經精元不固夢遺白濁肉蓯蓉酒浸薄切焙陽起石煆研韭子炒龍骨生用赤石脂煆七次川巴戟去心白茯苓鹿角霜附子炮去皮臍各等分十補丸治真氣虛損下焦耗竭臍腹強急腰腿疼痛出血盜汗遺泄白濁大便自利小便滑數或三消渴飲食倍常肌肉消瘦陽事不舉顔色枯稿久服補五臟行榮衛益精髓進飲食方見諸虛門補虛固精類薰草湯治夢失精薰草一兩人參一兩乾地黃三兩白术芍藥各兩茯神一兩桂心甘草各二兩大棗十二枚右切以水八升煮取三升分為二服如人行四里一方又有茯苓三兩忌桃李雀肉大酢海藻松菜生蔥石斛散治男子夢泄精石斛七分桑螵蛸紫苑各二分乾漆煮五味子乾地黃鍾乳粉研逺志皮附子炮去皮臍各二分右搗合為末以酒服方寸匕漸增至二七日三服忌豬肉冷水蕪荑蓮子清心飲一名清心蓮子飲治心中蓄熱時常煩躁因思勞力憂愁抑鬱致小便白濁或有凝脂夜夢走失淋瀝便赤如血或因酒色過度上盛下虛心火炎上肺金受尅口舌乾燥漸成消渴睡臥不安四肢倦怠男子五淋婦人常下赤白帶病後氣不收斂陽浮於外心煩熱方見諸虛門補虛益氣類小溫金散出危氏方治虛熱或觸冒暑氣旋下或赤或白或淋瀝不止人參去蘆石蓮肉去心巴戟去心益智仁去殼黃耆去蘆萆薢酒浸焙麥門冬去心赤茯苓去皮甘草各等分右為散每服三錢水一盞燈心二十根紅棗二枚煎食前溫服以後藥同煎俱為散服祕精丸一名固精丸治下虛胞寒白濁或如米泔或如凝脂腰膝少力方見諸虛門補虛固精類金鎖鎮元丹治真氣不足氣促喘乏心怔忪盜汗小便滑數遺精白濁一切元臟虛寒方見諸虛門補虛固精類赤茯苓散出醫方大成治心經伏暑小便赤濁人參白术赤茯苓香薷澤㵼豬苓蓮肉麥門冬去心各等分右㕮咀四錢每服水一盞煎服蒼术難名丹出直格方治元陽氣衰脾精不禁白濁淋瀝腰痛無力蒼术去粗皮米泔水浸一宿茴香炒川練子去皮取肉各三兩川烏炮去皮臍破故紙炒白茯苓龍骨研各三兩右為末酒糊和丸如梧桐子大硃砂為衣每服五十丸空心縮砂煎湯下或粳米湯下蒼术收斂脾精故也逺志丸出經驗良方治白濁白茯苓一兩麥門冬去心一兩逺志去心石菖蒲各半兩人參去蘆益智仁去皮各二錢半右為末煉蜜和丸如梧桐子大麥門冬燈心煎湯送下三十丸桑螵蛸散出危氏方治男子小便日數十次如稠米泔色心神恍惚瘦悴食減多因房勞過度耗傷真氣得之服不終劑而愈桑螵蛸逺志去心甘草水煮取肉菖蒲龍骨煅人參茯苓當歸酒洗鱉甲醋炙各等分右各等分為末每服二錢夜臥人參或茯苓湯調下一方無桑螵蛸逺志黃耆湯治諸虛失精黃耆當歸甘草炙各二兩桂心六分蓯蓉石斛各三兩甘棗一百三十枚白蜜二斤右切以水一斗煮取四升內蜜煎取三升分為四服日三夜一以食相間忌海藻菘菜生蔥鹿角湯治勞夢泄精鹿角屑一斤韭白半斤生薑一斤芎藭茯苓各二兩當歸酒洗鹿茸炙各二兩白米二合右切先以水五斗煮鹿角取一斗二升去滓內諸藥煮取四升分服一升日三夜一鹿角唯取胖者打碎用忌酢物通治還少丹出危氏方治心腎俱虛漏精白濁山藥牛膝酒浸白茯苓山茱茰去核茴香炒各一兩半絲子酒浸續斷去蘆各一兩右為末煉蜜和丸如梧桐子大每服三十丸鹽湯下白濁方烏藥蓮子藕節白茯苓益智仁各一兩花椒甘草各三錢右等味為粗末用豬肚洗淨入藥在內以線縫口入鍋用水二三盞文武火煮之候豬肚軟取去藥滓薄切食之用汁作粥食之尤良甚效續斷丸出經驗良方治遺精白濁川續斷獨活柏子仁各二兩榖精草二兩半蓮花蘂半兩