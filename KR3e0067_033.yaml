骨露蜂房炙各半兩澤㵼白茯苓絲子酒浸一宿桂去皮牛膝酒浸切焙石龍芮赤芍藥各一錢韭子炒二錢巴戟去心三錢右為散每服三錢空心溫酒調下或煉蜜丸如梧桐子大空腹溫酒下二十丸加桑螵蛸亦得天門冬散治精極五臟六腑俱虛遍身及骨髓煩疼宜服天門冬二兩去心羚羊角屑一兩人參一兩黃耆一兩枸杞子一兩酸棗仁一兩芎藭一兩車前子當歸桂心各一兩澤㵼一兩甘草半兩右為散每服四錢鹽水一盞煎至六分去滓入竹瀝半合蜜一茶匙同煎三兩沸不計時候忌鯉魚鹿茸丸治精極上焦熱下焦冷補十二經脈添髓養血宜服鹿茸四兩去毛酥炙硃砂二兩細研水飛過野雞脛骨二兩天門冬二兩車前子二兩絲子二兩酒浸一宿曝乾為末雀腦二十枚肉蓯蓉三兩酒浸一宿刮去皮熟乾地黃三兩右為末煉蜜與羊脛髓拌和搗三二百杵丸如梧桐子大每服空心及晚食前以酒服三十丸忌鯉魚生血羌活補髓丸一名羌活丸治精極髓虛中傷臟腑方見本門骨髓虛實類茯神散治精極實熱勇悍多驚壯熱茯神三兩柴胡二兩去蘆黃耆三兩銼逺志一兩去心天門冬二兩去心人參一兩澤㵼二兩生地黃二兩甘草一兩炙右為散每服三錢以水一鍾入淡竹葉七片煎至六分去滓不計時候溫服竹葉黃芩湯治精極實熱眼視不明齒焦髮落形體疼痛通身虛熱竹葉切一升黃芩茯苓各三兩麥門冬大黃各二兩甘草二兩生地黃六兩芍藥四兩生薑六兩右㕮咀以水九升煮取三升去滓分三服石斛湯治精極實熱眼視不明齒髮焦落形衰通身虛熱甚則胸中煩悶夜夢泄精小草石斛去根黃耆麥門冬去心生地黃酒洗白茯苓元參各一兩甘草炙半兩右㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候竹葉湯治精極實熱視不明齒焦髮落形衰通身虛熱甚則胸中痛煩悶泄精生地黃五兩芍藥四兩黃耆茯苓澤㵼甘草麥門冬去心各三兩右銼散每服四錢水一盞半薑五片淡竹葉十片煎七分去滓不拘時服生地黃煎治精極補骨髓生地黃十斤搗絞取汁牛酥白蜜各一斤右先以慢火煎地黃汁減半內牛酥更煎良久次下蜜攪令勻候稀稠於瓷器中盛每日空心午時及晚食前溫酒下半匙補益鹿茸煎治精極骨髓虛竭用鹿茸五兩去毛塗酥炙令微黃為末以清酒二升於銀鍋中慢火煎膏盛於瓷器中每服空心及晚食前以溫酒下半匙白淫附論內經曰思想無窮所願不得則意淫於外入房太甚宗筋施縱發為筋疾及為白淫夫腎藏天一以慳為主志意內馳則精因而出思想為淫房室太甚則固者搖矣故淫不守隨流而下也然本於筋痿者以宗筋施縱故也七珍丸王氏博濟方補真益氣壯腰膝進飲食治小兒白淫肉蓯蓉半斤細切酒煮爛研成膏補骨脂炒巴戟天去心附子炮去皮臍各二兩為末杏仁湯浸去皮尖桃仁湯浸去皮尖胡桃仁研各一兩右將後六味搗研為末與蓯蓉膏同研勻更入煉蜜搗三五百杵丸如梧桐子大每服一丸熱酒化下日三服一名四神煎蓮實丸治下元虛冷小便白淫蓮實去皮附子炮去皮臍巴戟天補骨脂炒各二兩覆盆子炒一兩山茱茰一兩龍骨研半兩右為末煮米糊和丸如梧桐子大每服二十丸空心鹽湯下龍骨湯治小便白淫及遺泄無故自出龍骨研五兩人參白茯苓甘草炙牡蠣煅桂去粗皮熟地黃焙各二兩右為散每服五錢鹽水一盞半煎至八分去滓食前服內補鹿茸丸一名鹿茸丸治勞傷思慮隂陽氣虛益精止白淫方見虛勞門小便餘瀝類金鎖丸一名金鎖子丸治下元虛小便白淫夜夢遺泄方見虛勞門尿精類石斛散治陽虛憊小便白淫石斛去根巴戟天去心絲子酒浸二宿别搗各三兩杜仲去粗皮炙銼桑螵蛸炒各一兩半右為散每服二錢空心溫酒調下至晚再服白石英散治小便白淫白石英研肉蓯蓉酒浸焙澤㵼韭子各一兩白粳米淘五合右為散每服二錢米飲調下食前日三服祕真丸宣明論治小便白淫不止精氣不固及有餘瀝或夢寐隂人交泄龍骨研一兩訶黎炮去皮五箇縮砂仁去皮半兩丹砂研一兩留一錢為衣右為末煮糯米粥為丸如菉豆大以丹砂為衣每日空心熱酒下一丸夜臥冷水下三丸勿多服或大便祕欲通用蔥湯點茶服之即通陽起石丸楊氏家藏方治下元虛憊耳鳴面黑腰背疼痛遺泄白淫手足冷肌瘦陽起石煅研一兩白芷黃蠟各半兩生砒研一分右將三味同研勻以黃蠟為丸如梧桐子大每服三丸空心冷鹽湯或冷酒下微溫亦可服藥後忌熱食少時久服美進飲食補下元暖腰腳天雄散治腎臟虛冷小便白淫方見虛勞門虛勞失精類附礬丸治白淫過甚附子炮去皮臍二兩礬石二兩熬去汁右為末水煮麵糊和丸如梧桐子大每服十丸至二十丸空心夜臥清茶下黃連丸治心腎氣不足思想無窮小便白淫黃連去鬚白茯苓去黑皮右等分為末酒糊和丸如梧桐子大每服三十丸煎補骨脂湯下不拘時金泊丸衛生寶鑑治下焦虛小便白淫夜多夢泄原蠶蛾破故紙韭子炒各一兩牛膝酒浸肉蓯蓉龍骨山茱茰桑螵蛸絲子酒浸已上各一兩右為細末煉蜜為丸如梧桐子大每服三十丸溫酒下空心食前服補真玉露衛生寶鑑治隂盛精脫淫樂脛酸白茯苓白龍骨火煅韭子酒浸各二兩絲子酒浸一兩右為細末米醋同麵糊丸如梧桐子大每服五十丸溫酒下鹽湯亦得須空心食前服待少時以美飯壓之普濟方卷三十三
