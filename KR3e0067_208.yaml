body:
  text: 普濟方卷二百八眀周王朱橚撰泄痢門諸㵼附論夫有脾㵼有腎㵼脾㵼者肢體重著中脘有妨面色虛黃腹肚微滿腎泄者膚腠怯冷腰膂酸疼上咳面黧臍腹疼痛治脾㵼用蒼术白术厚朴乾薑木香生豆䓻治腎泄用補骨脂及安腎丸震靈丹輩方參連丸治腸胃虛弱冷熱不調泄㵼腸鳴日夜無度艾葉用糯米糊拌勻焙取細末稱二兩半乾薑炮取末二兩用艾末米醋一升半慢火熬成膏訶子煨去核一兩宣連一兩半銼如麻豆大用吳茱萸一兩半同黃連炒色紫㨂去茱萸不用人參去蘆白术木香一兩半别用黃連一兩等為粗末將木香浸水一升慢火煮盡水去黃連不用切焙乾烏梅去核焙乾稱百草霜别研白茯苓去皮酸石榴皮炒當歸洗焙各一兩半赤石脂一兩三分龍骨一兩三分火煆地榆一兩半阿膠二兩伴粉炒罌粟二兩蜜炙右為末將前項艾膏和為丸如梧桐子大每服五十丸陳米飲下斂腸丸治久㵼木香丁香附子炮去皮臍縮砂仁訶子皮罌粟殼炒去項穰川薑炮沒石子梓州厚朴薑製白龍骨赤石脂炮肉豆䓻麵包煨禹餘糧醋淬七遍已上各一兩右為細末麵糊丸如桐子大每服七十丸米飲下空心食前豆䓻燥腸丸治沉寒痼冷泄㵼冷痢腹疼後重附子炮去皮赤石脂各一兩肉豆䓻麵褁煨良薑切炒乾薑炮舶上硫黃各半兩右為細末醋糊為丸如梧桐子大每服三十丸米飲下太聖散治脾胃積寒心腹疼悶臟腑泄㵼腸鳴絞痛益智三兩連皮炒川烏頭炮裂去皮臍陳皮湯浸去白各一兩乾薑炮裂半兩茴香七錢半炒甘草二錢半炙右為細末每服二錢水一盞入鹽一捻同煎至七分去滓食前熱服加訶子四柱散治臟腑虛怯本氣弱脾胃不快不進飲食時加泄痢晝夜不息人參去蘆白茯苓去皮附子炮去皮臍各一兩木香紙包煨過訶子濕紙包取皮用半兩右為細末每服二錢棗一枚生薑三片煎至六分溫服一方加豆䓻一方有白术真陽耗散兩耳常鳴臍腹疼痛頭旋目暈四肢急倦脾胃不和晝夜泄㵼痢小便滑數止泄㵼暖脾去憊散以陳廩米作湯食之肉豆䓻散治脾胃氣虛腹脅脹滿水榖不消臟腑滑㵼腸內虛鳴困􅌒少力口苦舌乾不思飲食日漸瘦弱蒼术米泔浸一宿去皮尖八兩茴香炒肉桂去粗皮川烏炮去皮劑訶子皮各二兩乾薑厚朴去粗皮薑炒陳皮去白甘草爁肉豆䓻麵褁煨各四兩右為末每服水一盞生薑三片棗一枚煎至七分溫服實腸散出直指方治泄㵼不止肉豆䓻訶子炮縮砂仁陳皮蒼术炒茯苓各一兩木香半兩甘草四錢川厚朴製一兩半右㕮咀每服三錢薑棗煎服手足冷者加炒乾薑九寶飲子出醫方集成治分利水榖止泄㵼罌粟殼蜜炙青皮陳皮木通各一兩二錢赤茯苓去皮黃茋微炒厚朴薑製粉草車前子略炒各二錢半右㕮咀每服三錢水一盞煎至七分溫服蓽撥丸出百一選方治滑泄妙甚附子炮去皮臍蓽撥川薑丁香不見火吳茱茰炒良薑胡椒已上各一兩山茱萸去核草豆䓻去皮半兩右為末棗肉丸梧桐子大每服五十丸食前陳米飲下日五服廬州知錬周汝功嘉禾人乃尊守永嘉時每苦滑泄服此藥果有效其方董發運問有序多不復録上二方亦周紏所傳也如㵼日三服下補脾丸出百一選方治滑泄不禁白术赤石脂肉豆䓻麵褁煨川厚朴去粗塗皮薑汁炙川白薑炮各一兩蓽撥炒神麴炒附子炮去皮臍麥蘖炒半兩右為細末醋糊為丸如梧桐子大早晚食前各五十丸陳米飲下縮砂丸出御藥院方治大便泄㵼米榖不化腹中疼痛不思飲食縮砂仁黃連去鬚微炒附子炮去皮臍吳茱萸湯洗七次焙乾微炒訶子皮肉豆䓻各二兩乾薑炮木香各半兩右為細末水煮麵糊丸如梧桐子大每服五七十丸食前米飲下肉豆䓻丸出和劑方治泄㵼療脾胃氣虛弱飲食減少訶梨勒皮龍骨木香各三分丁香三兩肉豆䓻縮砂仁各一兩赤石脂白􅈨枯各半兩右件藥搗羅為末粟米飲和搜丸如梧桐子大每服二十丸米飲下不拘時厚腸丸出百一選方治泄㵼不止白龍骨乾薑附子炮去皮臍厚朴薑製訶子炮去核肉豆䓻麵褁煨陳皮右等分為末酒糊丸如梧桐子大每服五十丸米飲下羊肉扶羸丸出三因方治脾胃不和不進飲食臟腑虛滑老人虛人尤冝服精羊肉一斤半微斷血脈焙乾取末四兩川椒去目炒出汗肉豆䓻煨各一兩白薑炮一兩木香一分附子炮去皮臍神麴炒半兩右為末煮粟米飲為丸梧桐子大食前米湯下五十丸豆䓻分氣飲出三因方治臟腑虛寒泄㵼瘦極及婦人産後洞泄危篤者藿香葉草豆䓻仁青皮各四兩甘草炙丁香各半兩肉豆䓻炮十兩烏梅五十箇去仁右㕮咀每服四錢水二盞糯米一撮煎七分去滓空心服治大㵼後腹中空竭胸中虛滿不下飲食芍藥甘草半夏各一兩厚朴當歸桂心各三兩生薑五兩右㕮咀以水八升煮取三升分三服服二劑最佳豆䓻固腸丸出御藥院方治脾胃虛弱臟腑頻滑不思飲食腸鳴腹痛木香赤石脂乾薑縮砂厚朴生薑製肉豆䓻麵褁煨去麵各一兩右為細末麵糊為丸如梧桐子大每服六十丸食前米飲下麴术丸出衛生寶鑑治時暑暴㵼壯脾溫胃進美飲食及療飲食所傷胸膈痞悶等積服此取效神麴炒蒼术米泔浸一宿焙乾各等分為末右為細末麵糊為丸如梧桐子大每服四十丸不拘時米飲下神麴丸一名斷下九出百一選方治暴㵼不止神麴二兩炒茱茰半兩湯泡七次却砂乾右為末用醋糊丸如梧桐子大每服四十丸米飲下食前服通苓散出危氏方分利水榖解煩熱止泄㵼豬苓去皮白术去蘆澤㵼去毛赤茯苓去皮木通茵陳瞿麥車前子右銼散每服四錢水一盞半燈心麥門冬煎服木香散出危氏方治脾胃俱虛泄㵼肉豆䓻麵褁煨破故紙炒白术木香甘草白茯苓各半兩右銼散每服三錢生薑三片棗二枚食前溫服百粒丸治逺近久便大腸滑神效紅椒胡椒附子丁香乾薑麥糵右各等分為細末醋煮大蒜為丸每服百粒用米飲湯下椒紅固腸丸出瑞竹堂方治脾胃積冷腸鳴大便滑泄腹痛神麴六兩作小塊炒香熟白术一兩銼炒乾肉豆䓻三兩麵褁煨川薑去皮炮三兩厚朴去粗皮薑一兩川椒去月炒去汗取乾淨一兩半右為細末别用蒜不拘多少濕紙褁煨香熟剝淨研如泥熱湯化開濾去滓少入麵打糊搜藥丸如梧桐子大每服七八十丸空心米飲湯送下日進二服立效散治㵼烏梅肉御米殼白礬甘草炙夜義頭右各等分為末每服二錢半米飲湯調空心服治㵼出百一選方人參去蘆茯苓肉豆䓻麵褁煨訶子肉等分木香減半右為末丸如梧桐子大每服三五十丸米飲湯下小兒服丸如黍米大量大小加減服之治脾泄多年老人腎虛謂之水土同化出存仁方用吳茱萸簸淨不拘多少白水煎去滓盞內入鹽少許通口服蓋茱萸能暖膀胱水道既清大腸自固餘藥雖熱不能分解清濁也建脾散一名飬婆湯出三因方治五泄或清白五色雜下休作無時亦治脾胃虛損臟腑泄㵼不進飲食寒中洞泄及年髙久泄不止烏頭炮去皮尖三錢厚朴去皮銼薑製炒甘草炙乾薑炮一分右為末每服二錢水一盞薑五片棗二枚煎至七分熱服一方無棗煎四神丸出醫方集成治脾泄腎泄肉豆䓻生二兩破故紙炒四兩木香半兩不見火茴香炒一兩右為末生薑煮棗肉丸如梧子大鹽湯下一方去木香茴香入神麴麥蘗如前作丸木香煮散出百一選方治㵼不止木香二兩甘草半兩炙茱茰二兩去枝梗罌粟殼去頂蒂膜蜜炙四兩右㕮咀每服三錢水一盞半煎至一盞去滓食前稍溫服桃花丸治男子婦人泄㵼不止良薑赤石脂乾薑五靈脂右等分為末醋糊為丸如梧桐子大每服三四十丸米飲湯下豆䓻飲一名豆䓻散出百一選方治滑泄神效陳米一兩肉豆䓻麵褁煨五味子赤石脂研各半兩右為末每服二錢粟米湯飲調下日進三服麯藭丸出危氏方治脾胃中風澀臟腑泄滑不止芎藭神麴炒白术附子炮去皮臍尖各等分右為細末用糊丸如梧桐子大每服三五十丸空心米飲下左氏述楚子圍蕭將潰無社告申叔展曰有麴麥乎有山麴乎鞠窮芎藭也意欲令逃水中以避禍是知芎藭能除濕豫嘗加术附以製方治脾濕而泄者無有不中此藥亦治飱泄素問曰春傷於風夏必飱泄者食榖不化蓋春木旺時肝生風邪淫於脾經至夏飲冷當風故多飱泄此藥尤冝朝真丹治腸胃虛弱內受風冷或飲食生冷內傷脾胃泄㵼暴下日夜無度腸鳴腹痛手足厥冷硫黃生研細三十兩朱砂研為末三兩一錢白礬煆七兩半右研勻水浸蒸餅丸如梧桐子大用朱砂為衣每服三十丸溫米飲下不計時夏月冝備急棗肉丸出濟生方治脾胃虛寒或腸鳴泄㵼腹脅虛脹或膈不快食不化破故紙四兩炒木香不見火稱一兩肉豆䓻三兩麵褁煨香去麵不用右為細末燈心煮棗為丸如梧桐子大每服七十丸用生薑湯下空心食前服如神丸出三因方止㵼治臟腑虛寒脾胃受濕泄㵼無度腸鳴腹痛不進飲食漸至羸瘦並冝服之川烏頭四兩米泔浸軟去皮切作片子用鹽四兩炒黃去鹽不用半夏湯洗七次去滑蒼术米泔浸淨洗各半斤右為末薑汁糊為丸如梧桐子大每服五六十丸空心米湯下戊巳丸一名苦散海上名方治冷熱不調泄㵼不止米榖不化臍腹刺痛脾受濕氣毒不利黃連去鬚芍藥吳茱茰去梗湯浸各等分右將黃連芍藥微炒黃次下茱茰炒深黃色為末水糊丸如梧桐子大每服三十丸米飲下日二三服不拘時一方水浸蒸餅為丸良方作散末用水煎治痢疾一方麵糊為丸一方醋糊為丸一方粥飲調下香茸丸出危氏方治飲多遂成酒泄骨立不能食但再飲一二盞泄作幾年矣嫩鹿茸以火燎去毛酥炙黃肉豆䓻火煨生麝香别研右為末白陳米飲為丸如梧桐子大每服五十丸空腹米飲下熱者酒蒸黃連丸固腸丸一名茱連丸出百一選方治臟腑滑泄晝夜無度吳茱茰㨂淨黃連去鬚罌粟殼去穰蒂三味各等分右為末醋糊丸如梧桐子大每服三十丸空心米飲下赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下乳豆丸出瑞竹堂方治臟腑泄㵼不調滑泄不止諸藥罔效乳香一兩别研肉豆䓻二兩麵褁煨熟取豆䓻切碎另研為末右為細末相和用陳米粉糊為丸如梧桐子大每服五七十丸空心米飲湯下乙方乳香用酒浸透研成膏肉豆䓻生用為丸一方用肉豆䓻大一枚剜小竅入乳香三分塊麵褁煨熟去麵為末米飲下一方以茶末對烹之肉附丸一名豆附散出百一選方治腹㵼不止肉豆䓻一兩一錢麵褁煨附子一箇重七錢者炮去皮臍右為細末粉糊為丸如梧桐子大候乾每服五六十丸米湯吞下不拘時立效一方薑五片煎服空心下神授丸出百一選方治臟腑南木香二錢半肉豆䓻一兩麵褁煨右為末煮棗為丸如梧桐子大每服三五十丸米飲下不拘時香薑散治晨泄又名瀼泄久患脾泄㵼兼卒下痢一名委薑散一名薑黃散生薑四兩切如豆大黃連二兩銼右一處淹一宿慢火炒薑紫色去薑不用將黃連為末每服二錢用蠟茶清調一劑而愈或薑作末米飲酒調治白痢方二方㕮咀水五升煮一升頓服不拘時候若欲速效一料只作兩服常有患此兩服愈肉豆䓻丸治腎泄久不愈脈沉細無力者及脾胃虛弱泄㵼不止全不進飲食一名二神丸破故紙炒肉豆䓻麵褁煨各等分右為末棗肉為丸如梧桐子大每服五七十丸米飲下空心服一方用肥棗四十九箇生薑四兩切片同煮爛去薑取棗皮核研如膏入藥同杵丸鹽湯下弱甚加茯苓二兩木香一兩有人全不進食服補脾藥皆不效豫授此方服之遂頓然能食此病不可全作脾虛蓋腎氣怯衰弱真元衰劣自是不能消化飲食譬如鼎釜之中置諸米榖不無火力雖終日米榖不熱其可能化黃魯直嘗記服兔絲子淨淘酒浸曝乾日炒數匙酒下十日分飲噉如湯沃雪亦如此理也香蘇湯治下後煩氣暴上生蘇一把冬用蘇子三兩重香豉五兩右以水五升煮取二升頓服之治臟腑用鷹瓜黃連不以多少碾為細末煨熟去皮大蒜丸如梧桐子大每服三十丸或五十九米飲下火杴丸治風氣行於腸胃泄㵼用火杴草一味為末醋糊丸每服三十丸空心下治㵼久效者老人尤冝服一名護命方用大附子一箇炮去皮臍以韭菜根研爛絞取汁丸如梧桐子大晒乾每服三十丸米飲湯下不乾恐麻人一方治一切冷㵼出後頻仍靣無顔色不思飲食杵為末以一錢煮粥一碗空心食椒附湯治驟腹疼注下或滑腸頻多有冷沫川椒去目乾薑生用附子去皮臍生用三味各等分右為粗末每服三錢水二盞煎至八分溫服不拘時治夏秋暑㵼不止以理中湯下駐車丸胃苓散治㵼傷暑煩渴引飲所下如水用平胃散五苓散各二錢水一盞棗二枚薑三片煎至七分嚼薑棗和滓咽服少刻又服辰砂五苓散亦可用來復丹亦可或寒濕水泄正胃散理中湯蘇梅米湯調下一方入鹽煎藿香正氣散治飲食中憂怒傷脾腸腹內膨滿泄㵼頻併或作晨泄加丁香縮砂良薑南木香各半錢生薑三片紅棗二枚煎服效治泄㵼用雞蛋一箇去尖頂用白礬些少火上飛乾入於雞子內銀鑞勻將濕紙褁著火上煨熟服之治泄㵼不止腿腳無力行步艱難冝服丁香五套丸立止治泄㵼用敗毒散加陳糯米五十粒煎服亦治噤口痢熱毒沖心不進飲食噤口或有熱加蓮肉治泄㵼臟寒不進飲食氣體倦怠名豬臟丸用吳茱萸不以多少㨂淨用獖豬臟一兩條以茱茰實滿扎定兩頭熱炭煮令極爛研細丸如梧桐子大早晚食前各以飲吞下至五十丸棗附丸治臟腑寒滑泄不思飲食用正生大附子一箇乾棗半斤同銀石器中慢火煮上留水兩指未乾旋添湯煮兩三時取出切作薄半箇再煮候至晚棗丸如梧桐子大空心米飲下三四十丸患滑泄垂死者皆愈治夏月脾胃厥冷滑腸泄㵼肚痛及霍亂吐㵼不止用胡椒不拘多少為末研爛飯搜和手心揉勻丸如梧桐子大每服三四十丸陳米飲吞下炙肝散一名豬肝散治久患脾泄不愈及㵼不止白术白芷白芍藥各半兩桔梗一分右各生為細末以不入水獖豬肝五兩作小片子或塊子藥一十五錢細切蔥白二寸鹽一錢同拌肝令勻以竹簽子作串慢火炙香熟啖之米飲送下空心食前各一服渴勿喫冷水半月必安朴附丸出危氏方治脾元虛弱久患脾泄冷㵼不止及翻胃惡心臟腑滑泄痢下厚朴去粗皮薑汁製一兩綿附子炮去皮臍淨一兩神麴炒三錢乾薑炮三兩一用生薑六兩取汁右為末酒煮麵糊丸如梧桐子大每服三十丸空心食前米飲或鹽湯下一方無神麴用橘紅加味治中湯出危氏方治脾胃不足飲食不節過食生冷腸鳴痛泄㵼注下身體怯寒乾薑炮白术青皮縮砂各一兩用仁人參去蘆甘草炙各半兩右㕮咀每服四錢水一盞半生薑五片棗一枚煎至七分去滓溫服不拘時或進感應丸粟殼丸出危氏方治暴㵼肉豆䓻炮粟殼去赤臉蒂蕚淨炙右為末醋糊丸如梧桐子大空服米湯下三十丸訶梨勒散出聖惠方治老人㵼不止訶梨勒三分煨用皮白礬一兩燒灰右搗細羅為散每服不計時候以粥飲調下二錢榖神散出百一選方治夏月暴㵼甘草炙乾薑各一兩陳倉米楮實青者蒸一次晒乾用一斤右為細末飯飲調下朴附丸治脾胃久虛榖腸滑泄臍腹絞痛腸鳴泄㵼肢體無力此藥補益脾胃止心腹撮痛溫胃進食厚朴五兩去粗皮銼塊子附子一兩半銼大塊去皮臍生薑五兩不去皮淨洗切片子青州棗一百箇先將四味用水五升一處煮候水盡㨂出棗子外將其餘三味焙乾與後藥同末乾薑炮去皮一兩訶子一兩炮肉豆䓻一兩人參一兩右為末將棗去皮核和藥為丸如梧桐子大每服三十丸早晚食前用陳米飲下訶子丸出本草方治脾胃不和泄㵼不止諸藥不效訶子皮川薑肉豆䓻龍骨木香赤石脂各等分右為細末糊丸如梧桐子大每服四十丸水飲下一方有附子吳茱萸丸出御藥院方治一切積冷脾胃不和心腹疼痛嘔吐泄㵼腹內絞痛吳茱茰洗七次焙乾半兩良薑銼研乾薑炮各五兩右各修製畢搗羅為細末醋打麵糊為丸如梧桐子大每服五十丸空心食前溫粥飲下三宜湯出和劑方治冒暑引飲冷熱不調泄㵼多渴心腹煩悶痢下赤白腹痛後重桂心四斤四兩乾薑炮炒四斤甘草砂炒三十斤杏仁去皮尖砂炒四斤四兩另研右為末每服一錢沸湯點服如傷暑煩渴新水調下不計時來復丹出醫方集成治伏暑泄㵼方見中暑類理中湯出醫方集成治臟腑停寒泄㵼不止方見脾臟門藿香正氣散出醫方集成治感濕泄㵼方見傷寒門雜治類南白膠香散出衛生寶鑑治脾寒虛滑腸久㵼臍脹無休粟殼去鬚蒂四兩醋炒南白膠香龍骨各三分甘草炙七錢乾薑半兩炮右為粗末每服五錢水一盞半煎一盞去滓溫服金鎖正元丹出醫方集成治腎虛泄㵼小便頻數盜汗遺精虛冷之證並冝治之五倍子茯苓各八兩龍骨煆别研硃砂别研各三兩紫巴戟去心十六假補骨脂酒浸炒十兩肉蓯蓉洗焙葫蘆巴炒研各一斤右為末入研藥令勻酒糊丸如桐子大每服三十丸空心溫酒鹽湯任下白术丸出楊氏家藏方治泄㵼吐嘔脾胃不和痰多氣逆白术半夏麴乾薑炮人參去蘆頭四味各四兩丁香半兩髙良薑油炒半兩右件為細末生薑汁煮麵糊為丸如梧桐子大每服五十丸溫米飲食前下治腸丸治腸胃虛濕泄㵼頻併米榖不化腹脹腸鳴臍腹痛腸滑洞下黃連去鬚乾薑炮肉豆䓻麵褁煨香赤石脂龍骨吳茱茰湯洗微炒已上六味各半兩訶子煨去核一兩半右為細末粳米飯為丸如梧桐子大每服三十丸米飲下空心食前服茱萸已寒圓治臟腑久弱