各等分右為末溫水調下立止乾棗方治水㵼用青州乾棗十枚去核入茛菪子填滿以麻纒却用炭火燒令煙盡研細每服一錢半煎陳粟米飲調下治水㵼多時不瘥取羖羊角一枚用白礬末填滿燒為灰研為散每食前新水調下二錢計頭丸出危氏方治夏水㵼不止以大巴豆一粒去殼針刺定燈上燒存性研細用蠟如小豆大蘸亦以燈上炙令鎔丸巴豆灰作一丸倒流水吞服食前一服效治水㵼無度用乾薑末粥飲調下立效治暴水㵼不止出海上方用肉豆䓻三箇用濕麵褁定慢火內煨令麵焦去麵研為末只作一服陳米飲調下食前服之神效治水㵼用生薑一塊連皮切作二片入眀礬一銅錢合定紙包小打溫火煨熟沸湯井水合一盞嚼爛薑湯送下一方服理中湯加肉豆䓻良薑水一盞半薑三片煎至七分食前服之肚蒜丸出危氏方治水㵼丁必卿云渠每遇五更必水㵼一次百藥無效服此遂安用獖豬肚一枚淨洗去脂膜入大蒜在內肚滿為度自晨至晚肚蒜糜爛為度杵成膏子入平胃散同杵丸桐子大每服三十丸鹽湯或米飲空腹服玉霜丸一名縛虎丸出聖濟總録治水㵼小腹疼痛方見本門休息類茱萸丸一名茱萸湯治水㵼不止治一切男婦驟然水㵼日夜不止命欲臨死宜服此方小兒服半錢出謢命方麻葉五月五日採隂乾乃今人用作布者麻右杵細羅為末每服二錢冷水半盞調下空心服不要吃熱物令人閃倒只吃冷涼物也若大人病重者服二錢半此方亦治白痢大效梅棗湯出謢命方治水㵼不止棗子大者十枚罌粟殼烏梅肉十箇右銼為粗末每服二錢以水一盞煎七分去滓溫服不拘時候治水㵼并赤白痢出十便良方草烏大者一兩半右將一半燒灰一半生用為末醋糊為丸如菉豆大每服七丸赤痢甘草湯下白痢乾薑湯下水㵼井花水下並空心服忌腥臊熱膩生冷之物針頭丸出楊氏家藏治水㵼積痢杏仁四十枚去皮尖燒留性巴豆四十枚去殼燒存性草烏頭二錢燒留性百草霜四錢右為細末酒煮蠟一兩和丸芥子大每服五丸小兒三丸赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下水㵼米飲下食前服茯苓湯試驗方治因傷冷飯水泄一夜約走十行變作白痢次日其痢赤白腹中疞痛減食熱燥四體困倦無力以動茯苓六分澤㵼一錢當歸身四分蒼术二分生薑二錢肉桂五分豬苓六分甘草半錢炙升麻二錢芍藥一錢半黃芩三分生用柴胡二分右㕮咀分作二服每服水二大盞煎至一盞去滓稍熱服食前治水㵼腸虛煩熱出本草方以林擒實生食之飱泄附論夫內經曰清氣在下則生飱泄又曰久風為飱泄夫脾胃土也其氣沖和以化為事今清濁交錯風邪之氣得以干胃故沖氣不能化而食物完出夕食謂之飱以食之難化者尤在於夕故食不化而泄出則謂之飱泄此俗所謂水榖痢也脾胃交濟所以有水榖之分脾氣雖強而胃氣不足故飲食下咽而大腑之飱泄也治法用二神丸破故紙肉豆䓻修合或不換金正氣散吞安腎丸主之蓋脾胃之氣交通則水榖自然尅化此所謂妙合而凝者也紅豆丸出瑞竹堂治臟腑泄㵼名為飱泄麥蘗炒半夏湯洗七次砂仁神麴各一兩半炒碙砂醋化甘草青皮去穰陳皮鬱金紅豆藿香棠毬炒蓬术各三兩良薑蓽撥各二兩丁香半兩不見火右為末水煮麵糊為丸如梧桐子大每服一百丸或隨物空心下病甚者日進三服桂心丸出聖濟總録治脾胃氣虛飱泄不止飲食不消雷鳴腹內疞痛桂去粗皮赤茯苓去黑皮赤石脂各三兩黃連去鬚一兩麥蘗炒神麴炒石斛去根乾薑人參當歸切焙附子炮裂去皮臍蜀椒去目并閉口炒出汗龍骨各半兩右為末煉蜜丸如梧桐子大每服三十丸空心暖酒下日午再服髙良薑湯出聖濟總録治脾胃受氣久為飱泄下痢嘔逆腹內疞痛髙良薑木香赤茯苓去黑皮檳榔銼人參各三分肉豆䓻去殼吳茱茰湯浸焙炒陳橘皮湯浸去白炒各半兩乾薑炮一分縮砂蜜去皮半兩右搗篩每服四錢水一盞半煎八分去滓不拘時日三服乾薑丸出聖濟總録治飱泄色白食不消化乾薑炮黃連去鬚炒各一兩半右為末先以酒一升微火煎候可丸即丸如桐子大空心米飲下三十丸日午再服一方治氣痢㵼裏急後重為末空心酒調服蓽撥散出聖濟總録治飱泄氣脹滿不下食蓽撥三兩肉豆䓻去殼半生半煨一兩乾薑炮半兩白术三分甘草半生半炙銼半兩木香半生半炒一兩訶梨勒半生半炮去核一兩右為散每服二錢空心米飲調下日晚再服木香散出聖濟總録治腸胃冷氣飱泄不止木香阿膠炙燥訶梨勒炮去核黃連去鬚炒半兩乾薑炮吳茱萸湯浸焙炒龍骨各一分右為散每服三錢空心米飲調下日晚再服地榆湯出聖濟總録治腸胃受氣飱泄無度或下黃水腹脅痛悶地榆厚朴去粗皮生薑汁炙當歸切焙各三分艾葉炒吳茱萸湯浸炒髙良薑各半兩右搗羅每服四錢水一盞半煎八分去滓空心日午溫服薑米散出聖濟總録治脾胃氣虛腹脹飱泄困劣暖藥即嘔逆食飲不下陳米一升用生薑二斤取汁浸米焙搗篩為末炒令黃草豆䓻十枚煨去皮甘草銼炙肉豆䓻十枚去殼陳橘去白炒燒鹽各一兩研右研散每服二錢沸湯點服不拘時候雞舌香散出直指方治飱生冷久為冷積良薑辣桂香附淨洗天台烏藥益智仁各一兩甘草炙半兩右為末每服二錢入炒鹽沸湯點吞感應丸白术湯出宣眀論治風冷入中飱泄不止脈虛而細日夜數行口舌乾燥肚腹疼痛飱泄症主冷清氣在下則生飱泄清濁交錯食不化而清榖矣白术厚朴去粗皮生薑汁炙當歸切焙龍骨各一兩熟艾炒各半兩右搗篩每服四錢水一盞入薑兩片同煎七分去滓空心日晚溫服乾薑丸出聖濟總録治腸胃風冷飱泄注下腹痛不止乾薑炮厚朴去粗皮薑汁炙當歸切焙各三分阿膠炙燥龍骨各一兩右為末煉蜜丸如梧桐子大每服三十丸空心棗湯下豆䓻散出聖濟總録治飱泄水榖不分溫脾止腹痛進食草豆䓻去皮乾薑甘草陳橘皮湯浸去白髙良薑右等分銼碎都作一處用胡餅劑褁溏灰內炮令黃熟取出麵搗為散每服二錢陳米飲調下食前服茯苓湯出聖濟總録治飱泄米榖完出赤茯苓去黑皮黃連去鬚炒厚朴去粗皮生薑汁炙各一兩乾薑炮半兩右搗篩每服四錢水一盞半煎分去滓空心日午溫服治飱泄滑痢不止一名茯苓木香出百一選方白茯苓二兩南木香半兩紙褁炮右為末紫蘇木瓜煎湯調二錢茱萸湯出聖惠方治飱泄米榖不化及諸色痢亦治水㵼不止吳茱茰湯浸焙乾炒黃連去鬚炒等分右搗篩每服四錢水一盞半煎八分去滓空心溫服不止再服一方飯和丸粥飲下三十丸防風芍藥湯治泄痢飱泄身熱脈弦腹痛而及頭痛微汗方見本門諸泄痢類法云㵼有虛實寒熱虛則無力粘衣不便已泄出謂不能禁固也實則數至圊而不能便俗云虛坐努漬是也裏急後重皆依前法進退大承氣湯主之一説素問云春傷於風夏飱泄又至久風為飱泄泄者乃水榖不化而完出非水入胃而成此證非前水恣也此一證不飲水而榖完出名飱泄治法于後先以宣風散導之出錢氏方中四味者是也後服蒼术防風湯蒼术去皮四兩麻黃去根節四兩防風去蘆頭五錢右為粗末每服一兩生薑七片水二盞煎一盞去滓溫服泄止后椒术丸椒术丸蒼术二兩小椒一兩去目炒右為細末醋糊丸如桐子大每服二三十丸食前溫水下一法惡痢久不愈者彌佳如小兒病丸如黍米大木香散內經曰清氣在下坐生飱泄又曰久風入中則為腸氣飱泄夫脾胃土也其氣沖和以化為事今清氣下降不升則風邪久而干冒是木賊土也故沖和之氣不能化令物完出謂之飱泄或飲食太過腸胃所致亦致水榖不化此俗呼水榖痢也法當下舉而消尅之以加減木香散主之木香良薑升麻去黑腐檳榔人參各七錢半肉豆䓻煨吳茱萸湯洗陳皮砂仁各半錢陳麴炒二錢乾薑洗去灰炒半錢右為末每服四錢水一盞半煎一盞去滓溫服食前普濟方卷二百八
