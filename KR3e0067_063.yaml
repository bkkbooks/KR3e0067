body:
  text: 普濟方卷六十四明周王朱橚撰咽喉門語音不出夫喉嚨者為氣之道路㑹厭者是音聲之門户若風邪熱毒在於脾腑則隂陽不和氣道否澀語音不出也方苦參丸出聖濟總録治咽喉腫痛語聲不出痰唾稠濁苦參一分白礬燒枯半兩山梔子仁一兩木通剉防風去义杏仁湯浸去皮尖雙仁炒各半兩甘菊花三分大黄生剉一兩射干𤣥參甘草炙剉惡實炒白藥各一分馬勃二分右為末煉蜜和丸如酸棗大每服綿裹一丸夜後含化嚥津如喉不閉者去白礬通聲膏五味子欵冬花通草各三兩人參細辛青竹皮桂心菖蒲各二兩杏仁薑汁各一升白蜜二升棗膏三升酥五升右㕮咀以水五升㣲火煎三上三下去滓内薑汁棗膏酥宻煎令調和酒服棗大二丸治肺脾熱滯風冷所傷咽喉腫痛語聲不出宜服此方出聖惠方桂心一兩木通一兩剉防風一兩去蘆頭射干一兩附子一兩炮裂去皮劑桔梗一兩去蘆頭人參一兩去蘆頭獨活一兩羚羊角屑一兩杏仁一兩湯浸去皮尖雙仁麯炒㣲黄右為散每服三錢水一中盞入生薑半分煎六分去滓不計時候温服生薑膏方一名母薑酒治咽喉腫痛聲嘶不出葢咽門者肝膽之喉若臟熱咽門閉而氣塞若腑寒咽門聲嘶此證宜服之母薑汁一升牛髓三兩麻油二兩芎藭二兩獨活一兩半秦椒一兩去目及閉口者桂心一兩防風一兩半去蘆頭酥二兩右為末内薑汁中煎至將淹濡下髓酥油等攪令勻以慢火成膏每服不計時候以温酒調下半錢黄芩湯治風熱客於肺經上摶咽喉氣壅腫痛語音不出黄芩去黒心一而半枳殻去穰麸炒一兩半升麻一兩木通剉一兩芍藥柴胡去黄杏仁湯浸去皮尖雙仁炒羚羊角鎊各一兩石膏碎一兩右粗搗篩每服三錢以水一盞煎至五分去滓温服熱毒太盛加大黄一兩杏仁煎治暴嗽失音不語杏仁去皮尖研三兩桑白皮生薑取汁蜜砂糖各一兩半木通貝母各一兩三錢紫苑茸五味子各一兩右將桑根白皮木通貝母紫苑五味子為剉散以水三升慢火熬取一升漉去滓入杏仁糖蜜薑汁㣲火熬成膏旋含化小續命湯治卒然咽閉不能語言防己麻黄人參肉桂黄芩甘草炙白芍藥杏仁川芎各一兩附子半兩防風一兩半右㕮咀每四錢薑七片棗二枚加製杏仁七粒不拘時候温服又方出聖惠方丹砂水飛過一方朱砂升麻雄黄細研杏仁湯浸去皮尖雙仁麸炒㣲黄鬼臼甘草炙㣲赤剉射干各一兩麝香半兩細研右為末以蜜丸如梧桐子大粥飲下一丸加至五丸日三酒服亦佳咽痛失聲不利用尤良外臺秘要無丹參有丹砂治咽喉腫痛脾肺壅毒語聲不出宜服此方出聖惠方木通一兩剉杏仁三分湯浸去皮尖雙仁麸炒㣲黄菖蒲三分川升麻三分羚羊角屑三分麥門冬三分去心射干三分甘草一分炙㣲赤剉右為散每服三錢煎至六分去滓不計時候温服射干湯治風熱客搏於肺脾經血脉壅遏致喉門腫痛語聲不出射干紫苑去苗土欵冬花各一兩半麻黄去根節二兩細辛去苗葉五味子炒各一兩半夏湯浸七遍半分右粗搗篩每服三錢匕以水一盞入棗二枚劈破煎至五分去滓入地黄汁半合分温二服食後臨卧發聲散出御藥院方治語聲不出胸滿短氣涎嗽喘悶咽喉噎塞桑白皮升麻桔梗川芎各一兩甘草馬兠鈴羌活各半兩右為細末每服一錢水一盞入竹茹薄荷同煎六分去滓食後温服治咽喉腫痛聲嘶不出出聖惠方生薑汁二合生地黄汁三合桂心末半兩杏仁一兩湯浸去皮尖雙仁麸炒㣲黄研如膏蜜二合牛酥一合右相和熬令稠每服不計時候含杏核大嚥津治咽傷語聲不出方酒酥各一升乾薑二兩半末通草桂心石菖蒲各二兩末右令和服一匕日三治語聲不出釅醋生薑汁自然銅蛇端草木馬麻草右各等分為末用蘆筒吹入喉内立可菖蒲丸出聖惠方治咽喉腫痛語聲不出菖蒲二兩孔公孽細研一兩木通剉二兩皂莢一挺長一尺者去黒皮塗酥炙令黒黄去子右為末煉蜜和丸如梧桐子大每服二十丸煎鬼箭羽湯下不計時候荆芥湯又名三神湯出三因方治風熱肺壅咽喉腫痛語聲不出如有物硬嚥之則痛甚荆芥穗半兩甘草炙一兩桔梗二兩右為粗末每服四錢水一盞薑三片煎至六分食後温服治咽傷語聲不徹名必効散出十便良方酒酥各一升乾薑十兩术右以酒一合酥一匕薑末二匕相和服日三食後服亦治肺痛發聲散出御藥院方治咽喉語聲不出栝蔞皮細剉慢火炒赤黄白殭蠶去頭㣲炒黄甘草剉炒黄色各等分右為細末每服一二錢用温酒調下或濃生薑湯調服更用半錢綿包噙化嚥津亦得並不計時候日三兩服出聲散一名訶子湯出衛生寳鑑方治肺虚失語訶子四箇生熟甘草二兩生熟一方半兩右為末每以二錢用童子小便和茶煎五七沸温服甚者不過五服一方入砂糖一小塊以水煎服治感寒語聲不出杏仁丸出聖惠方治啞寒咳𠻳及治咽喉痛痒失音不語桂心杏仁十八銖湯浸去皮尖炒右為末宻丸如杏仁大新綿裹不時含之細細嚥津日夜勿絶治喉痺腫盛語聲不出方出聖惠方用馬藺根汁三合入白蜜一合相和慢火煎成膏徐徐嚥之日可五七度一方用子半升水二升煮一升半服若不煮用子四十五粒為末水調服立愈一方取馬藺根汁飲之若不煎刷汁亦可一法用一握少水絞取汁稍嚥之口噤者拗灌之良槐花方出危氏方治失音用槐花新瓦上炒香熟三更後仰卧牀上随意食之亦治咯血從彦文親服有効桂心散治失音聲若陽証傷寒失聲者不可用須察其証而用之隂證傷寒方可用用桂心搗碎每服三錢水二盞煎至一盞食後温服一方用末舌下漸嚥津白芨散治人無聲用猪肺一箇生薑數片煮熟切作片子白芨二十文研為末㸃盡猪肺喫治風冷失聲咽喉不利方用蘘荷根二兩研絞取汁酒一大盞相和令勻不計時候温服半錢治卒失音方用生豆一升青竹筭子四十九枝長四寸濶一分和水熟煮日夜二服瘥又每食後净磨拭吞雞子大能長生初服時身似重一年已後便覺身輕又益陽道橘皮湯治卒失聲音不出方用橘皮五兩水三升煮取一升去滓頓服治咽喉痒痛失音不語方見本門咽喉腫痛類治語聲不出如有硬用荆芥湯加荆芥治卒闇風失音不語方用好生梨搗汁一合䪺服即通日再服止治取好聲方用杏仁一升去皮尖酥一兩蜜少許丸如梧桐子大空心米湯下十五丸増損如聖散治肺風熱攻衝㑹厭語聲不出咽喉妨悶腫痛並皆服之桔梗二兩甘草炙炒一兩半防風半兩枳殻湯浸去穰二兩半右為細末每服三錢水一大盞煎至七分入酥如棗大攪勻温服食後治咽喉腫痛語聲不出用豉半升水二盞煎去滓分為二服相㫁稍熱服之令有汗出瘥大附方治腫痛全盛語聲不出者及喉痺毒氣咽門閉不能嚥用大附子一枚炮令裂削去皮切如豆每含一塊嚥津半食間即瘥烏頭亦得忌諸冷肉冷水一方蜜塗炙拆含之嚥汁甜盡更蜜塗炙准前含嚥之汁盡驗通聲丸治寒邪客在肺經咽嗌窒塞語聲不出咳嗽及憂思悸怒氣道閉塞胸膈短氣石菖蒲肉桂杏仁乾薑青橘皮等分甘草半枝右為末蜜丸每一兩作十丸每服一丸食後含化嚥玉粉丸治冬寒痰結咽喉不和語聲不出半夏洗五錢草烏頭一匙炒桂一匙右為細末生薑自然汁浸􅔻餅為丸如鷄豆大每服一丸至夜含化多年不愈亦有効黄帝鍼經中説寒氣客於㑹厭卒然如啞此藥治之甘桔湯治咽喉痛用桔梗一兩甘草二兩水煎食後服治咽喉如無熱咽痛喉閉用辣桂半夏甘草等分㕮咀水煎一半冷呷緩服出聲音方訶子炮去核木通各一兩甘草半兩右㕮咀用水三升煎至升半入生地黄汁一合再煎數沸放温分六服食後日作半料治啞病以蜩蟟退皮研一錢匕井花水服治卒啞取杏仁三分去皮尖熬别處桂一分和泥如李核大綿裹含細細嚥之日五夜三治喉痺卒不語煮䜴汁一升服覆取汗亦可末桂着舌下漸嚥治咽喉痒痛失音不語杏仁味甘苦冷有毒惡黄芩黄耆葛根畏蓑草去皮尖炒桂心味甘辛大熱有小毒為末右二味各一兩同研爛如泥用半熟蜜和圓如櫻桃大新綿裹含之嚥津日五次夜三次大效咽乾論夫脾肺不利上焦有熱則津液枯燥搏於喉咽故令乾痛甚則生瘡矣方絡石煎丸治咽喉乾燥熱疼宜服絡石半兩射干半兩川大黄一分木通一分剉白藥一分川升麻半兩牛蒡子一分𤣥參一分甘草半兩白蜜二兩白蒺藜一分馬牙硝一分黄藥一分地黄汁半升右除藥汁外搗羅為末先以地黄汁及蜜於銀鍋中以慢火煎成膏後入諸藥末相和令勻丸如小彈子大用綿裹一丸含嚥津龍腦雞蘇丸治上膈虚熱咽乾龍腦研一分鷄蘇甘草炙烏梅用肉紫蘇葉各一兩麥門冬去心焙白梅用肉人參各半兩天門冬去心焙半兩麝香研甜硝研各一分右為細末再同研勻煉砂糖和丸如鷄頭實大每服一丸食後人參湯下升麻散出聖惠方治咽喉熱毒上攻乾燥疼痛宜含化川升麻一兩半射干一兩白礬半兩燒灰細研絡石一兩甘草三分生剉白藥三分黄藥一兩天竹黄二兩細研犀角屑三分白龍腦一分細研馬牙硝二兩細研右為散入研了藥令勻於瓷合中盛每服一錢以綿裹含化嚥津犀角丸出聖惠方治風熱上攻咽喉乾痛如欲生瘡心胸壅悶犀角屑一兩川升麻一兩川大黄一兩剉碎㣲炒黄芩半兩𤣥參人參一兩去蘆頭黄耆半兩剉甘草半兩生剉藍葉半兩桔梗半兩去蘆頭杏仁一兩湯浸去皮尖雙仁麸炒㣲黄别研入右為末煉蜜和搗二三百杵丸如梧桐子大每服食後以温水下二十丸甘草湯出聖濟總録治咽乾涕唾如膠或腎氣不足心中悒悒目視􅉩􅉩少氣耳聾消渇黄疸一身悉痒骨中疼痛小腸拘急甘草炙半兩磁石煆醋淬三遍二兩𤣥參防風去叉各一兩半五味子牡丹皮桂去粗皮各一兩附子炮裂去皮臍半兩黒豆半合右粗搗篩每服五錢匕水一盞半入生薑半分拍碎煎至一盞去滓食後服日再射干膏出聖濟總録治乾口瘡牙癰心肺熱盛射干升麻梔子仁𤣥參小豆卷各一兩半黄蘖去粗皮二兩赤蜜地黄汁各三合右除蜜地黄汁外細剉如麻豆以水五升煎至一升半去滓下蜜與地黄汁慢火煎成膏細細含化嚥津治咽喉熱毒乾痛心膈多煩燥宜服此方犀角屑一兩川升麻一兩梔子仁三分藍葉半兩木通一兩剉麥門冬一兩半去心焙枳殻半兩麸炒甘草三分生剉生地黄三分右為散每服三錢水一中盞煎六分去滓不計時候温服貝母湯出聖濟總録治咽乾口燥上焦虚熱咳嗽氣促痰壅貝母麸炒去心百合各三分紫苑去苗土桑根白皮炙剉桔梗剉炒各半錢麥門冬去心焙三分甘草炙剉一兩半大黄炒剉一分右粗搗篩每服五錢匕水一盞半煎一盞去滓分温二服食後鷄蘇人參湯治上焦有熱津液燥少喉咽乾痛鷄蘇葉惡實炒𤣥參甘草炙剉各一兩防風去义人參天門冬去心各半兩焙右粗搗篩每服三錢匕水一盞入梨二片同煎六分食後去滓温呷之龍腦散治咽喉熱乾燥津液不足龍腦研一錢鷄蘇去梗焙乾荆芥穗一兩半白荳䓻去皮一分甘草研剉一兩右為細散每服半錢匕温水調下合時且各自貯之臨用旋合和取半錢匕服氣味尤全乾地黄丸出聖濟總録治咽喉乾痛風氣不能食生乾地黄焙一兩人參赤茯苓去黒皮各三分天門冬去心焙一兩右為末煉蜜和丸如梧桐子大每服十丸米飲下日三厚朴湯出聖濟總録治咽喉乾痛心腹痛不能飲食厚朴去粗皮生姜汁炙赤茯苓去黒皮各一兩半陳橘皮湯浸去白焙人參各一兩右粗搗篩每服五錢匕水一盞半入生薑半分拍碎煎至一盞去滓分温二服如雪湯出聖濟總録治膈熱咽乾風毒攻心狂悶朴硝黒豆