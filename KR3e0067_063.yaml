一丸含化食後臨卧服一方有縮砂無牛蒡子王醫師法用生蘿蔔切作片冬月臨卧時喫三兩片可無咽喉之患百靈圓治咽喉中結塊核不通水食危困欲死者大效右用釡底百草霜不拘多少研細蜜和為圓龍眼大每一圓新汲水化開灌下甚者不過三圓即愈骨鯁論凡療病皆以其類至如治鯁之法自宜以鸕鷀主魚鯁狸虎治骨鯁磁石治針鯁髮灰治髮鯁至於竹篾薤白嚼筯綿蜜等事乃可通於諸鯁用耳至用藥之法有不取於氣味特以意為用者若魚網虎骨治骨鯁是也然網能制魚乃魚之所畏虎能伏獸乃獸之所畏其所制伏既不同則用之亦異矣方神仙化鐡丹又名聖化仙丹治一切骨鯁香白芷大塊不蚛者三兩貫衆捒淨末一兩木藺花樹生者一兩京墨好者一錢金星石銀星石各半兩山豆根去梗一兩水仙根乾者一兩木香半兩烏芋即荸薺乾者一兩墨煤淨者一兩象牙硝玳瑁屑犀角屑右為末極細以頭麵雪水做糊丸如龍眼大用蘇葉為衣懸風吹處隂乾如合時忌婦人孝子貓犬外人看見每用一丸含化靈砂散出聖濟總録治物鯁寬喉靈砂丹砂附子去皮臍生用鉛丹雄黃各一分芎藭半兩金箔七片巴豆一粒去皮心取肉劈為十二假每劈以口吹之研去油盡右研如粉若咽錢及魚骨等在咽喉內每服一字先取萞麻子三枚去皮研湯半盞攪濾取汁調藥服之便下附子丸出聖濟總録治骨在喉中附子一枚炮製去皮臍細辛去苗葉桂去粗皮陳橘皮湯浸去白焙青橘皮湯浸去白焙各一兩硝石一分右末煉蜜丸如皂角子大每含一丸咽津如兩盞茶久未應即用桂末煎湯助之其骨立出磁石丸出聖濟總録治魚鯁在喉中不出磁石煆醋淬研陳橘皮湯浸去白焙漿水腳多年者晒乾炒紫色各一分右為散别用漿水腳和丸如芡實大每含一丸咽津一方有馬勃無磁石漿水腳礬灰散出聖濟總録治骨鯁在喉中不出白礬烏賊魚骨去甲桂去粗皮陳橘皮湯浸去白焙漿水腳多年者晒乾炒紫色各一分右搗研同炒黑色候冷細研為散每服一錢匕溫水一盞調下仍益酒令醉以綿裹一錢匕含咽覆蓋絍鼻嚏噴即出軟骨散出聖濟總録治咽喉諸鯁赤茯苓去黑皮陳橘皮湯浸去白焙各半兩甘草炙銼縮砂仁各一分右為散每用二錢匕先摻口中次用新水一盞咽下象牙丸出聖濟總録治骨鯁在喉中不出象牙屑烏賊魚骨去甲砂糖各一分右為末煉蜜和丸如皂子大綿裹含咽栗皮丸出聖濟總録治諸骨鯁在喉中不出栗子肉外皮半兩為末乳香研鮎魚肝各一分右同研為丸如梧桐子大看骨逺近綿裹一丸水潤外留線繫吞之即釣出玉錯散出聖濟總録治一切骨鯁或竹木簽刺喉中不下箆麻去殼一兩凝水石研如粉二兩右先研箆麻為膏旋入石末同研成散即止每服一捻置舌根深處以冷水咽之其鯁自然不見桂香散出聖濟總録治鵝鴨及雞骨鯁在喉中桂去粗皮半兩陳橘皮湯浸去白焙一分右為散每服一錢匕綿裹含咽十度其骨軟漸消二白散治諸鯁白芷白斂各一分右為散每服一錢匕水調下半夏散治鐡棘竹木鯁在喉中不下及刺在內中折不出半夏湯冼七遍白斂各三兩右為散每服半錢匕酒調下日三半夏戟入喉以生薑汁解之立愈半夏白芷散治諸鯁半夏湯洗七遍白芷各半兩右為散每服一錢匕水調下即嘔出諸鯁方出聖惠方取鹿筋漬之令濡合而索之大如彈丸以線繫之將筋端吞之入喉推至鯁處徐徐引之鯁著筋出一方用牛筋水浸之細劈亦可又方用竹箆刮令滑淨線裹內喉中令至鯁處可進退引之鯁即隨出治骨鯁在喉衆治不出出聖惠方取飴糖丸如雞子黃大吞之不去更吞漸大作丸可至十丸止一方服砂糖水又方出聖惠方用燒虎狼屎服之又方出聖惠方吞豬膏如雞子大瘥止治魚骨鯁出十便良方用楮桃葉研細取自然汁水調服治骨鯁出危氏方用橄欖食之如無用核碾為末以急流水調服治鯁出經驗良方縮砂仁甘草等分治魚雞骨鯁出危氏方用貫仲為末井花水調令濃大作一口慢慢吞便下用生者研細絞汁服尤妙一方煎濃汁一盞半分三服併進一咯而出滁州蔣教授名南金頻嵗因食鯉魚玉蟬羮為肋所鯁凡治鯁藥如象牙屑之屬用之皆不效或者令服此藥連進三劑至夜一咯而出戲云管仲之力也治骨鯁出醫方集成用野苧根洗淨搗爛如泥每用龍眼大如被雞骨所傷以雞汁化下如被魚骨所傷以魚汁化下骨鯁用寒食麵收飛過四兩包待五月五日加烏梅箇箇要好濕潤用四十九箇去核米醋浸一宿至午時打掃淨室一所香燭時果供養通靈忌貓犬生人勿令往來麵梅醋共一處石桕木杵搗搜勻丸如彈大線穿挂風內吹乾如治病用醋浸線穿繫於患處睡一宿立效鯁骨方細銼象牙末去穰陳橘皮沙糖調冷水鐡也化為泥又方紫白玉簮根重羅用一分竹筒吹入去不可近牙根治魚骨入喉方用久年朽桃枝竹根濃煎湯灌之立效鱖膽煎出德生堂治一切骨鯁或竹木刺喉中不下用鱖魚膽一味臘月取挂於北簷下乾不可見日如有魚鯁即取皂角子許以酒一合煎化呷若得通便吐骨隨涎出未吐便飲溫酒以吐為度又未出更煎一服無不出者此藥應是鯁在臟腑中日久疼痛黃瘦甚者服之皆出若卒無鱖魚蠡魚鯇魚鯽魚亦可惟有臘月收者最佳治諸魚骨鯁在喉中方出肘後方用蜜不拘多少煎化乘熱用綿一兩蘸尉鯁處又以瓢炙熱尉綿上未出再尉仍取皂角末少許吹鼻中即出一方用蜜匙抄稍服之笱須散出十便良方治諸魚鯁在喉中用笱須已捕魚者燒灰研細每服一錢匕粥飲調下獺骨方出聖惠方治諸魚骨鯁在喉中用獺骨一片含中咽津立下一方燒灰水調服又用瓜於喉嚨外爬之即下魚鱗散出十便良方治諸魚骨鯁在喉中用鯉魚皮鱗不拘多少燒灰研細四錢匕新汲水調下未出再服魚骨引方出聖惠方治諸魚骨鯁在喉中用魚骨一片潛令人將至鯁人被頭勿令覺之即下或枕上亦可令謦咳即出鸕鷀散出聖惠方治諸魚骨鯁在喉中用鸕鷀毛翅十片燒灰研細每服一錢匕濃煎橘皮湯下或以綿裹含咽即下一方用屎末方寸匕又用糞水調塗咽喉外即出雞足散出聖惠方治諸魚鯁在喉中用雞足二枚燒灰研為散每服一錢匕酒調下立出溫水調服亦可艾蒿酒方出聖濟總録治諸魚骨鯁在喉中及誤吞銅錢用生艾蒿一握以水酒各一盞煎至八分去滓分溫二服一方用水煮又方用縮砂煎湯調末下一方用艾蒿數升水酒共一斗煮取四升稍飲食良薔薇散出聖惠方治諸魚鯁在喉中用薔薇根不拘多少搗為散每服一錢匕水調下日三亦治折箭刺入膜囊不出及鼠瘻等瘡患服之十日皆穿皮出效一方用薔薇灰末方寸匕百合散出聖濟總録治諸魚骨鯁在喉中用百合五兩搗羅為散用蜜水調塗帛上匝項繫之甚者不過三五次魚尾引方治諸魚骨鯁在喉中用魚尾一枚取置衣領中即瘥立竹湯治諸魚鯁在喉中取立死竹從地髙二尺以上刮去皮細劈如算子三七莖用水二盞煎至七分去滓頓服一方取籬腳中朽竹去盡泥以手撚細蜜調丸如龍眼大以綿裹之含化其骨自消却去藥雖咽下津些不妨鷹灰散出聖惠方治食肉鯁用鷹糞燒灰細研為散每服一錢匕水調下虎狼雕糞皆可服之虎骨散出十便良方治諸獸骨鯁用虎骨搗研細每服一錢匕水調下狸骨亦得雞翮散出聖惠方治食鯁咽不下用白雄雞左右翅大毛各一枚就銅器中燒作灰每服一錢匕用米飲調下一方以水調服之取所食者骨左右反覆擲背後則下也螻蛄散出肘後方治諸鯁并刺不出用螻蛄骨頭一枚為散綿裹咽津勿令鯁人知若刺不出者以塗刺瘡上自出耳紅椹咽方治諸骨鯁在喉不出用椹子紅者不拘多少臨時細嚼先只咽津後盡咽之滓用新水吞下如無新者只欲紅隂乾為末用之治諸骨鯁及吞錢出聖惠方用木炭皮為末研令極細如無炭皮但堅炭亦可粥飲調下二錢未下再服不拘多少以鯁下為度一方炭灰搗羅為末用酒或水調一錢服方寸匕一方羊脛炭碾為細末米飲調下治魚骨鯁方用象牙一兩不以多少搗羅為末沙糖丸如雞頭實大每含化一丸咽津一方蔥酒調下諸鯁方用煮薤白令半熟以線繫定薤手牢撁定線少嚼薤白咽之度薤至鯁處粘牽引鯁即出一法以綿一小塊蜜煮少時用如食薤法一方或以薤煮作羮粥食之或煠作虀𦵔或炒食之皆可治雞魚諸骨鯁經日不下者隨其便而用之出危氏方諸骨鯁用藥王草頭擂水服又方以朴硝研細末加雞蘇丸别丸如彈子大仰卧含化不過三四丸自然茹化之又方南硼砂新汲水滌洗含化其骨脫然而失治骨鯁入喉出經驗良方用寒水石煆為末冷水調下又方出經驗良方用桑螵蛸用醋煎細細啜飲又方出經驗良方用白藥銼細用米醋煎細細吞下在上即出在下即下治骨鯁不下出經驗良方先嚼白茯苓一錢重次以白礬湯咽下一方白茯苓為末以鯁骨煎湯調下治魚骨鯁出經驗良方用白膠香細細吞下治魚骨鯁出聖惠方用陳橘皮為末好酒一升入沙糖一兩煎成膏子冷吞咽下口念鸕鷀立愈一方細嚼冷水吞下又常含橘皮即下煎湯服亦可治魚骨鯁兼喉痺以青魚膽少許口中含咽津即愈膽用臘月取隂乾良治食魚肉為骨所鯁取泉水一杯令患人合口向水張口取水氣鯁當自下治骨鯁出危氏方用金鳳花子嚼爛噙化下無子用根亦可口中骨自下便用溫水灌潄免損齒雞骨尤效一方擂碎水化下玉屑無憂散一名奪命無憂散治誤吞骨鯁塞不下方見口舌咽喉門喉痺類神效解毒丸兼治諸骨鯁方見解諸毒門解諸毒類獸骨鯁及咽中利用象牙梳或牙笏等磨水咽下桑木上蟲屑米醋煎灌潄自下治魚骨鯁不出出經驗良方用蒜內鼻中即出獨顆者殺鬼去痛入用最良治魚骨在腹中刺痛及刺入肉者用食茱茰煎汁一盞服之其骨軟如骨刺在肉中搗封之骨自爛出一方用吳茱茰水煎一盞汁服之及搗封之治骨鯁神效出衛生家寶方一名鹿屑散用鹿角為末含咽津下妙一方摻舌上咽津立效治魚骨鯁在喉中出聖惠方用硇砂少許口中咀嚼之立下治魚骨鯁出海上名方用白芍藥細切嚼爛咽下又方出海上名方用五倍子碾細末摻喉中立消治骨鯁在腹中刺痛出海上名方用大栗殼燒灰研細熟水調下麻煎丸出海上名方治骨并魚刺鯁在喉中取研萆麻子仁爛入百藥煎成劑即止丸如彈子大青黛為衣井花水磨下半丸咽之即下消化骨鯁用千金石以火煆水淬敲碎又用塘內攔魚竹并象牙屑一處為末嚼水咽下可消深師療食魚骨鯁方出聖惠方用捕魚網一小塊燒灰服刀圭匕良細研水調一錢服之一方乳香湯調下溫服甚者併三兩服一用魚網覆頭立下一用魚鱗燒灰細研水調一錢服治鐡棘竹木諸刺在肉中折不出及鯁不下出聖惠方用鼠腦厚塗瘡上則出亦可用獖鼠大效千金療鯁方兼主折刺不出出聖惠方取瞿麥為末水調服方寸匕治喉咽魚骨鯁刺右馬屁勃不以多少為末蜜和丸彈子大噙化咽津二聖散治魚雞骨刺在喉中不下取五月五日採楮子晒乾白茯苓各等分為末每服一大錢小兒半錢煎乳香湯調下溫服治骨鯁用赤華葉威靈仙心用井花水二盞煎至一盞諸般雞鵝骨吞下軟如綿又方用燈心燒灰喉中諸骨魚骨竹栨等不能上下用此味吹入喉中立銷又方取所食者骨在右手反覆擲背後立出治雜物鯁方解衣𢃄目窺下部不下即出一用紙撚頻打噴嚏鯁自出青雪散治魚骨鯁咽喉內不出方見本類後青雪散療鯁方用東流水一杯東向坐以手指畫水上作龍字訖飲水不自曉書令他人持手書良又方凡書文曰天有門地有根諸家入口者皆當得吞集驗同治骨鯁厭勝法遇鯁時以現所食筯急倒轉依舊如常食魚鯁即自下勿令人知又方呪骨鯁以淨器盛新汲水一盞捧之面東默念云謹請太上東流順水急急南方火帝令敕一氣念七遍即吹一口氣入水中如此七吹以水飲患人立下有一族姓用此呪水可以食針并竹刺萆麻丸治一切鯁萆麻子紅麴右等分研細用沙糖和丸如皂角子大以綿裹含之痰出立效治骨鯁方鹽膚子樹取根用釅醋煎濃汁時時呷咽瑞􅀢公云曽有人被雞骨鯁頸項腫大可畏用此啜至三碗忽吐出骨王九哥又云曽同彭醫官治骨鯁取鹽夫子樹根爛槌入鹽少許用綿裹吞下牽引使於喉中上下往來忽然釣得骨出愚謂綿裹之法固妙猶當兼用醋煎啜法為勝本草集議云鹽夫子樹根能軟雞骨神效解毒圓收藏年深愈見神效青靛花六兩大黃山豆根各四兩朴硝一錢黃藥子一兩半自然銅四兩貫衆山梔子黃連楮實子山茨菰各二兩半白滑石一斤十二兩鉛光石芭蕉自然汁白藥各二兩半右為末糯米糊和丸搗一千杵隂乾不可見日不然折去一料可作一千圓却用鉛光石打光諸般骨鯁井水磨下一丸作勢一吞即下答腮焮腫咽喉飛瘍清油調水磨化蛇犬蜂螫蜈蚣毒用水磨塗傷處誤吞竹木棘刺井水下諸般惡毒用新汲井水縮砂散治骨鯁縮砂仁甘草貫衆等分右搗為粗末如一切鯁以綿裹少許含之旋旋咽津久則隨痰自出矣有一人因食鯉魚玉蟬羮為肋骨所鯁凡治鯁藥如象牙屑之屬用之皆不效或者令服此藥連進三劑至食一咯而出玉屑無憂散治魚骨綆用貫衆調下妙不可言神效膏治諸般骨鯁馬鞭草地松一名鄒面草右件各一小握不用根入陳白梅肉一枚白礬一大拇指面許研令極細取一彈子大以綿裹作一毬子綴針頭上其餘藥即將無灰酒一碗絞取藥汁細細呷之令盡如不能飲亦強呷數口然後納綿毬子於喉間旋旋咽其藥汁其骨鯁即軟當自下去白龍散治魚骨鯁柑子皮白礬象牙屑右件各等分同為細末每用一錢綿褁含化厭勝法屢效治骨鯁以所食魚骨密置患人項上勿令知良久即下它魚骨亦可治食諸魚骨鯁久而不出右以皂角末少許吹入鼻中得鯁出多效咽中骨鯁剪刀草如野茨菰生於籬塹間其根白研之則如膠用順水吞下即吐出骨不過兩三口效研萱草根順水下亦佳青雪散治魚骨鯁咽喉內不出并急慢喉痺盆硝二兩牙硝三錢白殭蠶去頭炒黃色為末甘草生取末各一錢半青黛二錢右為末每服二錢用井花水半盞調藥細細呷服或少許頻乾摻咽津亦得主骨鯁以故魚網覆鯁者頸瘥如煮汁飲之骨當下矣治魚骨在人腹中刺痛煮吳茱茰汁一盞服之止又骨在肉中不出者嚼吳茱茰封之骨當爛出治魚鯁不可出者取獺足於項下爬之亦煮汁食治鯁及魚骨入肉不可出痛甚者取魚狗燒令黑為末頓服之煮取汁飲亦可狗乃今之翠鳥小者是也治食諸魚骨鯁雜物鯁以好蜜七抄稍稍服之令下治魚骨鯁口稱鸕鷀則下治鯁用琥珀作珠一物貫串著繩推令前入至鯁所又復推以牽引出矣若水晶珠亦得如更無以堅硬物摩令滑用之亦得治草芒硝石類喉中不出用甑𢃄燒灰水調飲之即出係蒲甑帶日久敗爛者佳治魚骨鯁右常含橘皮即下誤吞諸物夫誤吞諸物若金銀鐵鉛之類亦宜治之若舊梳治髮磁石出針皆意為之主不特取其味惟治療之工可謂用心精微者矣儒門事親書云一小兒誤吞一錢在咽中諸醫不能取亦不能下乃命戴人戴人熟思之得一策以淨白紙卷實如箸以刀縱橫亂割其端作鬅鬅之狀别取一箸縛鈎其端令牢不脫先下咽中輕提輕抑探之覺鈎入錢竅然後以紙卷納咽中與鈎尖抵候鈎尖入卷端不礙肌肉提之而出方治誤吞銅錢金石竹木刺雞鵝魚諸骨鯁出危氏方川山豆根山蜈蚣威靈仙鐡腳者山茨菰滑石馬牙硝金星鳳尾草各一兩急性子二兩苧麻根五錢菉豆粉五錢甘草根三錢油浸三宿磚五兩厠中製一年右為末白芨五兩與糯米糊一處和劑成鋌子如梧桐子大每服一鋌冷水磨化即下骨鯁若金石鐡銅以生薑汁磨化下之如聖散出聖濟總録治硬物誤咽喉中不出栝樓用穰二枚杏仁去皮尖雙仁炒一兩半皂角炙一寸與甘草同為末甘草炙三分右先研栝樓杏仁爛次以甘草皂角末如為餅子鐺中煿令乾重搗為細末每服一錢匕調下黃蠟少許水一盞同煎七分熱服亦得未效再服用蠟茶調下通氣散出醫妙選治誤吞銅錢物及鈎繩之類在咽喉不下鵝毛一錢燒灰磁石一皂角子大燒灰象牙末一錢燒存性右為細末每服半錢新水調下治誤咽竹木魚骨所鯁咽物不下咽痛方出旅舍方貫衆茯苓去皮甘草炙右等分為末每服二錢新汲水調徐徐呷之治誤咽錢出肘後方用葈耳頭一把以水一升浸十餘度飲水愈治誤吞鐡石骨刺等不下危急者出百一選方王不留行黃蘖去粗皮右等分為細末以浸蒸餅丸如彈子大以麻綿線穿之挂當風處每用一丸冷水化開灌下立效治誤吞金銀物或錢在腹內不下方出聖濟總録石灰光明者一杏核大硫黃一皂角子大右研為末酒調下不拘時血餘散出聖惠方治食中吞髮咽不去繞喉用亂髮燒末酒服一錢匕粥飲調下亦得一方水調服治誤吞金銀鐶及叉方兼治誤吞錢及桃枝竹木用白糖二斤一䪺漸漸食之多食益佳即自消化誤吞鐶及指纒方出聖惠方用雁毛燒灰用二七枚末服之鵝毛亦得一方米飲服之誤吞釘針及箭簇等方但多食肥肉并脂令飽自裹出一方食肥羊脂諸般肥肉誤吞錢針出十便良方用懸針磁石棗許大一塊含之立出誤吞椒閉氣不通出百一選方用喫京棗三個解之治誤食桐油一名乾肺湯出百一選方用食乾柿解之白礬少許入湯水中咽下尤妙治誤吞鈎繩在喉中不出方出聖惠方若鈎繩在手者莫引之但益以珠璫薏苡子等就貫著繩稍稍推至鈎處小引之即出也治誤吞蜈蚣出危氏方用生豬血令病人吃須臾生清油灌口中惡心其蜈蚣衮在血中吐出繼與雄黃細研水調服愈昔有村店婦人因用火筒吹火不知筒中有蜈蚣藏焉用以吹火蜈蚣驚走竄入喉中不覺下喉嚨求救人無措手適有人云可討小豬兒一個斷喉取血服之果出誤吞銅物不能化者出十便良方用濃煎縮砂湯服其銅自下又用生荸薺研爛服其銅自化細研堅炭為末米飲下於大便內㵼下如鳥狀治誤食物落鼻中及入眼不出出聖惠方用皂角末吹噉嚏即出治誤吞鈎線方出聖惠方用螺師琥珀一味貫著鈎繩推令前入至鈎所又復推之即出或用水晶珠卒無珠堅物磨令滑用之治誤吞竹木入喉咽出入不得出聖惠方用故鋸燒令赤漬酒中及熱飲並得一用女人指甲二枚燒末內酒中飲之治誤吞桃枝竹木用白糖塊數數多食即自消化治誤吞銀鐶及叉出十便良方用水銀二兩服之叉便下亦可以胡粉一兩搗調用之分再服銀物下如泥凡誤吞金銀物在腹中皆服此令消化出之治誤吞鈎出聖惠方用小羊喉以沓繩推至鈎處當退脫小引則出又方但大戾頭四向顧小引之則出又方出聖惠方用常思草頭一把二升水淘灌之十餘過而飲之治吞水蛭即馬蝗蜞用青靛調水飲即㵼出或謂此蟲咬亦用靛敷之又方出德生堂用藜蘆末二錢熬水一盞服之後則必吐其物遂出無恙又方出德生堂用蒸餅半個於狗口繳涎在餅上喫了再用半個依前捲涎喫後其毒自散矣誤吞銅錢珠璫鐡器硬物方出聖惠方用燒銅弩牙令赤內酒中飲之立愈誤吞錢出百一選方用生鳬茈取汁呷喫錢自然消化即荸薺也誤吞叉方用曝韭令萎蒸熟勿切食一束即出或生麥葉筋縷如韭法皆可用但隨意多食自消一方韭白治如前法誤吞錢不出及誤吞針用葵菜不以多少絞取汁冷飲之即出一用葵花煮汁服之治誤吞銅錢用􅀈油枻尖燒存性為末濃煎艾湯調二錢無油尖止服艾湯亦效又方用百部根四兩酒一升浸一宿溫作二服又方用木賊草為末每服一錢用雞子白調下又方用滑石末餳糖丸如豆大噙化一丸治誤吞錢用服炮蜜二升即出矣治誤吞椒閉氣不通萆薢一兩甘草炙微赤狗脊各三分右為細末食前以粥飲調下二錢一方不用甘草用貫衆半兩萆薢狗脊各一兩治誤吞鈎線方用螻蛄摘去身但吞其頭數枚勿令鯁人知治吞錢方用艾蒿五兩以水五升煮取一升頓服之便下治一切諸雜骨木竹諸鐡物鯁嚨宜服此方代赭硝石黃丹右細研為末每服半錢津液咽下治一切竹木簽刺諸骨鯁喉柏狼毒捶碎於土器內醋煮熟自然銅燒以醋投研各等分右為細末凡有鯁喉即掉藥末一字入口中津液咽下治喉中物鯁欲死用白鳳仙子研水服或以竹筒灌入硬物即軟去切勿經牙又方魚骨砂糖大塊含即軟去又方蛤蚡一兩萆麻半兩黃丹一錢右為末水調下一錢每服又方用綿包橙肉如小梅牽繫線令吞下過鯁物之內牽出物隨出又方用生鰍鱔大者綿牢縛其頭以尾先入喉中頭未出即牽出之治誤吞錢及骨至效用木炭皮為末米飲調二錢未下再服至三必效治誤吞鐡錢及骨古文銅錢十數枚入白梅十個淹過即爛每服一丸如菉豆大清晨取流水吞下即吐出巧匠取喉鈎方咸平中職方魏公潭州有數子弟皆幼因相戲以一釣竿重鈎用棗作餌登陸鈎雞雛一子學之而誤吞其鈎至喉中急引乃鈎以鬚逆不能出乃命之諸醫不敢措手魏公大怖令人遍問老婦曽否經歷時有一老婦九十餘嵗言亦未嘗見此竊料有智識者可以出之本郡有一莫都料性甚巧令問必能公呼老婦責之曰吾子誤吞鈎莫都料何能治之老婦曰聞醫者意也其莫都料曽水中打碑塔添仰瓦魏公大咍親屬勉之曰試詢之公遂召莫都料至沉思久言要得一蠶繭及大念珠一串公與之莫都料遂剪繭如錢大用物推四面令軟以油潤之仍中通一竅先穿上鈎線次串數珠三五枚令兒正坐開口漸添引數珠捩之到喉至繫鈎處乃以項下一推其鈎自下而脫即向上急出之見繭錢向下裹定鈎線鬚而出並無所損魏公大喜遂厚贈之公曰心明者意必巧也心明必善醫出醫録治鯁以類推方治鯁之法皆以類推鸕鷀治魚鯁磁石治針鯁髮灰治髮鯁狸虎治骨鯁亦各從其類也治蜘蛛飛絲入口用紫蘇葉不問新舊嚼之即愈治誤食髮令腹有蠱以雄黃餌之昔甄立言仕唐為太常丞有道人心腹滿煩彌二嵗立言診曰腹有蠱誤食髮而然令餌雄黃一劑少頃吐一蛇如人小指惟無目燒之有髮氣乃愈鈎吻葉與芹葉相似誤食之殺人用薺苨八兩水六升煎取二升為兩服解之又方治誤吞水蛭即馬蝗蜞用酒及藍靛絞汁月頭初三四五空心服治誤吞錢器物用韶粉一兩細研分作二服水調服之食水銀金花如泥者誤吞金銀物在腹中服之令消煬出治誤吞下錢右以羊脛燒灰為末空心米飲下二錢普濟方卷六十四
