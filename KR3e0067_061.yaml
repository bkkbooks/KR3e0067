裹含嚥津亦得升麻丸出聖惠方治咽喉閉塞不通川升麻半兩白礬一分馬藺子一分馬牙硝一分𤣥參一分右為末煉蜜和丸如楝子大用薄綿裹常含一丸嚥津治咽喉閉塞口噤方出聖惠方皂莢針一兩剉楸白皮一兩剉芎藭三分羌活三分桂心三分右為散每服水一中盞煎至六分去滓抝口温温灌之射干丸出濟生方治腑寒咽門不能嚥射干麸炒黄杏仁麸炒黄𤣥參一方作人參附子炮去皮臍桂心不見火各等分右為細末煉蜜和丸如雞豆大每服一丸以新綿裹噙嚥潄口地黄散出御醫院方治脾熱風熱上攻咽喉腫痛生瘡閉塞不通或生舌脹黄芩八兩甘草生二兩半荆芥穗二兩薄荷葉一兩右為細末每用二錢水一盞入薄荷少許煎三兩沸去滓熱潄冷不計時候四神散川大黄寒水石各一兩牛蒡子芒硝各半兩右為細末新水調塗腫上咽喉腫塞生蜜調時時含嚥化津救生散一名如聖散治時疾頭面腫咽喉腫塞氣息難通方見口舌咽喉門喉痺類山豆根一兩北大黄川升麻朴硝生各半兩右為末煉蜜丸如皂子大每一粒以薄綿包少痛便含嚥液泄熱湯治咽喉閉塞不通大黄炮甘草炙各一兩芒硝研防風去义各半兩右粗搗篩每服三錢匕水一盞煎八分去滓温服不計時候如聖散出御生寳鑑治時氣纒喉風漸入咽塞水穀不下牙闗𦂳急不省人事雄黄細研白礬飛過藜蘆厚去皮用心並生用猪牙皂角去皮炙黄右各等分為細末每服一豆大各鼻内搐立効立通散治咽喉閉塞不通蜒蚰隂炙二七條礬半生半燒一分白梅肉燒燥二七枚右為散每服半錢匕吹入咽内或水調下得吐立通消毒散治喉腫當歸荆芥甘草各等分右為末水煎五錢去滓潄欎金散治咽喉至重者欎金兩枚白殭蠶鴨嘴膽礬各半兩全蝎兩個山豆根二錢半猪牙皂角去皮雄黄一錢巴豆二七粒用七粒同礬火煆用七粒去油生右為細末每服半錢新汲井水加好茶脚多調用稀稠得所時復嚥下如口噤以巴豆油紙捻成條子燒咽搐鼻自然開口却以酸黄子醋調用鵞毛拂患處痰涎出為度覺不快更進無害治咽喉閉塞不通含嚥牛蒡子半兩馬牙硝半兩甘草半兩炙剉右為末煉蜜和丸如半棗大日四五度以新綿裹一丸含嚥津治咽喉閉不通出聖惠方赤黄糞汁一合生薑汁一合童子小便一合右相和攪令勻徐徐灌入喉中即立通膽礬散出直指方治酒麫熱盛咽喉腫結閉塞鴨嘴膽礬半錢全蝎二个右為末以雞羽蘸藥入喉中須臾破開聲出次用生青薄荷研細并水調下令吐出毒涎即愈未吐再服比金散治咽喉閉塞不通白殭蠶直者用生蛇蛻皮燒灰右等分細研為散每服半錢匕摻咽中嚥津神効不計時候硇砂散出聖惠方硇砂馬牙硝各等分右細研令勻用銅筯頭於水中蘸温揾藥末㸃於喉中又方出聖惠方馬藺花二兩蔓荆子一兩右為散每服不計時候以煖水調下一錢治咽喉閉塞口噤方出聖惠方羌活三兩細研牛蒡子二兩杵羅為末右先以水三大盞煎羌活取一大盞半去滓入白礬去毒丸治一切喉風閉塞咽喉青緑信州者煆㣲赤胡粉右味等分研為末醋煮麫糊丸如皂子大每服一丸薄荷煖酒磨化下如口不開用白殭蠶末一字吹入鼻内口即開吐下毒立止治風熱閉塞咽喉遍身浮腫方出聖惠方用牛蒡子一合半生半熟杵為末熱酒調下一錢匕立瘥一方搗碎以綿裹二錢熱水浸過含嚥津立瘥治咽喉閉塞口噤方出聖惠方用雄雀糞細研每服温水調半錢匕治咽喉閉塞不通出聖惠方用桑上白耳不拘多少搗羅為末以生薑每用半匙綿裹含化旋旋嚥下須臾即通治咽喉閉塞不通甚者宜用此方出聖惠方用無槵子皮半兩含之㣲㣲嚥之即立瘥治咽喉閉塞腫痛水米不通方出聖惠方用蝸牛蟲一枚綿裹水浸含之須臾便通治喉閉垂命不辨人方出聖惠方用銅黄如杏核大熱湯研之化灌之立効治咽喉閉塞喘息不通湏臾欲絶方用地龍一條爛研内雞子白相和攪令勻便㵼入口即通又方出聖惠方用猪牙皂莢三梃塗酥炙令黄搗羅為末每服蜜水調半錢治咽閉用臘月猪尾燒末水服之又方用含雞屎白治咽喉疾用臘月猪膽一個同枯礬大黄青黛甘草牙硝為細末入在猪膽内隂乾為細末用一字吹之治喉風腫用鴨嘴膽礬為細末醋煎一二沸呷入口吐即愈如吐不止呷米飲即止青金散治咽喉出儒門事親書用益元散加薄荷青黛生蜜丸如彈子大噙化治咽喉塞鼻中瘡出及乾嘔頭痛食不下方用生雞子一顆開頭取白去黄着米酢拌煻火䪺沸起擎下沸定更頓三度成就熱飲酢盡不過一二瘥治喉閉咽塞不通甚者用巴豆去皮針線穿嚥入撁出一方用一枚去外皮鑚中心綿裹令有出氣處内於鼻随腫左右時時吸氣通立効治喉碧玉散一名羅青散出御醫院方治心肺熱上攻咽喉腫痛閉塞水漿不下或生喉癤重舌木舌腫脹並可服之方見口舌咽喉門喉痺類如聖湯治咽喉噎塞咳濃血者桔梗二兩甘草炒陳皮半夏姜汁各一兩右為粗末每服三錢水一中盞半生薑七片煎至五分去滓温服食後日三大青煎出聖濟總録治喉中熱塞及舌上腭生瘡大青黄蘖去粗皮蜜炙升麻射干薔薇根半兩苦竹葉細切一握生地黄半兩𤣥參一兩天門冬去心焙半兩白蜜二兩右除蜜細研用水三升煎取一升去滓下蜜再煎成膏每服半匙頭含化嚥津不計時候治咽喉痛用馬勃去膜以蜜橘拌炒以水調呷之治咽喉閉塞及噎湯水難下宜服此方用牛涎一大盞入少許鹽攪和頓服立瘥治咽喉閉塞腫痛水米不通方用白礬如碁子大含之須臾便通礬硝散治咽喉閉塞腫痛方見本門喉痺類治一切咽喉壅熱腫閉不能嚥物口舌生瘡舌根𦂳強言不正腮項腫痛蒲黄青黛硼砂熖硝甘草各等分右為細末每用手指捻摻於喉中嚥津或冷水送下頻頻嚥之治喉中塞以懸釣莖燒為末服之良普濟方卷六十二
