body:
  text: 普濟方卷六十二明周王朱橚撰咽喉門咽喉生癰療喉中及舌生瘡爛方用銼薔薇根濃煮汁含潄之冬用根夏用枝葉酣飲喉舌生瘡方出朱氏集驗方治連月飲酒咽喉爛舌生瘡用水中螺蚌肉用䓤豉薑椒煮汁飲三兩盞瘥療喉中口及舌生瘡爛方用黃連一兩切水三升煮取一升稍稍含冷吐忌豬肉生冷黃茋湯治咽喉疼痛生瘡黃耆炙銼甘草炙麥門冬去心焙山梔子仁各半兩黃芩去黑心赤茯苓去黑皮人參檳榔煨銼貝母去黑心麯炒紫苑去首各一分右粗搗篩每服一錢匕水一盞煎至六分去滓溫服食後日三去毒玫瑰丸治上焦有熱咽喉生瘡赤根白頭痰唾稠濁口中腥臭化涎生津五倍子紅雪研各一兩馬勃升麻礬蝴蝶研硼砂研各半兩丹砂研麝香研龍腦研各一分甘草生用三分右為細末糯米和丸如雞頭實大每一丸含化不計時候犀角散生犀角屑玄參去蘆升麻生黃耆去蘆切麥門冬去心生粉草當歸酒浸去蘆焙各一兩大黃微炒二兩赤芍藥一兩右為粗末每服三錢水一盞半煎至七分去滓溫服無時候龍膽煎治喉腫瘡并口瘡龍膽黃連去鬚升麻去土黃蘖去皮蜜炒苦竹葉切槐白皮大青各一兩酥半合白蜜半合右細銼七味如麻豆以水三升半煮取七合絞去滓內蜜及酥再煎五六沸每服一匙頭含化咽津日可五六服瘥桃紅散出王氏博濟方治喉中生瘡腫赤紫色者咽嗌痛咽物有妨金箔十片銀箔十片丹砂研馬牙硝研甘草炙搗末各一兩鉛白霜研少許凝水石四兩太隂玄精石二兩二味搗碎入一合子內煆令通赤取出黃土內埋一宿右研每服一字甘草調下如要丸以稀糯米粥和為丸如豌豆大含化咽津琥珀犀角膏治咽喉口舌生瘡􅌲真琥珀研生犀角屑各一錢重辰砂研茯神去木各二錢并去皮真腦子研一字人參去蘆酸棗仁去皮研二錢右人參茯神犀角為細末入乳鉢內别研藥味和勻用煉蜜搜為膏子以甕瓶收貯候其疾作每服一彈子大以麥門冬去心濃煎湯化服一日連進五服取效利膈湯治脾肺有熱虛煩上壅咽喉生瘡雞蘇葉防風荆芥穗桔梗人參牛蒡子隔紙炒甘草各一兩右為末每服二錢沸湯點服如咽喉口瘡甚者加殭蠶一兩地黃湯治咽喉中生瘡唾血不下食生地黃細切一兩半竹茹玄參雞蘇苖各一兩赤茯苓去黑皮升麻麥門冬去心焙各一兩半右除地黃外粗搗篩入地黃拌勻每服三錢匕以水一盞煎至五分去滓溫服食後臨卧如不能多服細細咽含白藥丸治喉中有瘡咳嗽白藥子玄參射干甘草炙桔梗炒各半兩右搗羅為末煉蜜為丸如彈子大綿裹含化咽津牛黃金露丸治風壅毒氣上攻咽喉舌頰腫痛生瘡噎悶化涎解燥牛黃研龍腦研各一錢人參末二兩甘草生為末半兩甜硝研半兩丹砂研水飛一兩右研細以軟糯米飯為丸如雞頭實大每服一丸含化咽津救命散治脾胃熱上攻心肺咽喉有瘡并纒喉風大黃銼炒黃連去鬚白殭蠶直者炒甘草生各半兩膩粉三錢匕五倍子一分右為細散每服一黍大用以竹筒子吹吸小兒以竹筒吹之如餘毒攻心肺咽有瘡用孩兒妳汁調藥一匙以雞翎探之嘔生不嘔者死治咽喉瘡腫雙乳鵝喉疳熱毒方龍腦一字薄荷葉五錢大黃生二錢半甘草一錢炒盆硝半錢蒲黃生用淨者一錢右為細末每服少許吹咽喉內噙化忌生蔥蒜薑胡椒乾地黃散出聖惠方治咽喉內生瘡唾血不下食宜服生乾地黃一兩半雞蘇苗一兩赤茯苓一兩麥門冬一兩半去心焙玄參一兩甘草半兩生銼右為散每服三錢水一盞入竹茹一分煎至六分去滓不計時候溫服治咽喉內熱毒所攻生瘡腫痛宜服此方出聖惠方牛蒡子一兩微炒乾浮萍草半兩川升麻半兩玄參半兩黃蘖半兩銼甘草半兩生銼右為末煉蜜和丸如彈子大含一丸咽津治熱病口爛咽喉生瘡水漿不得入膏當歸射干升麻各一兩附子半兩白蜜四兩右㕮咀以豬脂四兩先煎鎔成膏下著地勿令大熱內諸藥微火煎令附子色黃藥成絞去滓內蜜復上火一兩沸令相得置器中令凝取如杏仁大含之日四五遍輒咽之小硼砂散治咽喉腫生瘡疼痛硼砂馬牙硝各三錢桔梗甘草薄荷各一兩右為細末乾摻咽中薔薇根引治喉咽生瘡連舌頰痛不可忍者薔薇根皮一兩升麻三分生乾地黃黃蘖各半兩鉛白霜研一錢右搗羅為末入鉛霜研勻每服二錢匕水一盞入蜜半匙煎至七分稍通口熱潄咽嗌吐之即令及時用藥末摻瘡上升麻湯治咽喉生瘡升麻銼甘草炙石膏研牡丹皮各一兩右粗搗篩每服三錢匕以水一盞煎至六分去滓不拘時候細細溫服黃連湯治喉中生瘡久患疾勞不下食日漸羸瘦黃連去鬚半兩豉半兩薤白切四莖豬膽半個右先以童子小便八合煎黃連豉薤白取四合去滓下豬膽煎至三合空腹頓服每隔日依法再服治咽喉內生瘡疼痛依用此方一名黃丹煎出聖惠方龍腦二錢細研蜜八錢黃丹二兩麝香二錢細研右先於銀鍋內化蜜用綿濾過再於鍋中以慢火煎次下黃丹煎成膏候冷熱得所內龍腦射香攪勻入於磁盒中盛每服一丸如杏仁大綿裹含咽津杏仁丸一名口瘡煎治咽喉及舌生瘡爛杏仁湯浸去皮炎雙仁半兩研黃連去鬚為末甘草炙為末各一分右粗研和勻綿褁如棗大含之瘥一方以蜜丸療口中塞及咽喉不利生瘡口燥膏方豬膏一斤白蜜一斤黃連一兩右合煎去滓冷攪相得含如半棗日四五度麥門冬丸治虛熱上攻脾肺有熱咽喉生瘡麥門冬一兩黃連半兩右為末用蜜丸如梧桐子大每服三十丸門冬湯下食前千金地黃丸治證同前黃連四兩末生地黃半斤取汁和連日乾右為末蜜丸如梧桐子大每服三十丸門冬湯下以地黃汁為丸亦可合口瘡方出危氏方滑石黃丹各等分右為末點瘡效仍用黃耆一兩二錢甘草一兩二錢為散煎服妙治喉中瘡腫方出肘後方蒲州膽礬一錢蔥鬚隂炙者二錢右為末研勻一字入竹管內吹病處治咽中瘡腫方永類鈴方萆麻子一枚去皮朴硝一錢右同研新汲水作一服連進二三服效治咽喉及舌生瘡爛方白礬熬冷汁盡二兩黃連去鬚一分右為末每服一錢匕綿裹含化咽津瘥治連月飲酒咽喉爛舌上生瘡大麻仁一升黃蘖二兩右為細末煉蜜為丸如雞頭大每服一粒含化咽喉生瘡冷閉聲不出者出危氏方祕傳降氣湯去陳皮加黃芩煎仍於喉下咽管口炙三壯即愈硼砂散出御藥院方治心脾風毒熱所發咽喉生瘡腫疼痛或子舌脹或木舌脹舌腫至腫悶塞水漿不下南玄參貫衆白茯苓去皮縮砂仁滑石研荆芥穗甘草生用山豆根青黛研各半兩硼砂研三兩蒲黃薄荷葉各一兩寒水石燒過研三兩半右為細末入研藥每服半錢新汲水調下或諸舌脹摻在舌上咽津無妨不計時候龍腦散出仁存方治咽喉腫頰舌生瘡朴硝一兩甘草龍腦薄荷各半兩右為末咽中生瘡竹筒吹入口瘡用井花水調潄膽礬散點瘡膽礬一錢飛過硇硝二錢右為細末點腫處立穿穿則用合瘡口藥南星散摻藥絳礬煆牙硝飛南星薄荷右各兩多少為細末水溫手點藥腫摻重處須用力摻之至痛無害然後服藥半夏塗藥半夏南星白殭蠶右各用一錢用巴豆七粒去皮油合前藥細研用少許生薑自然汁調塗外面腫處咽喉生瘡取杏仁去皮炒令赤和桂末研如泥綿裹如指頭大含之治喉中及口舌生瘡爛用酒漬蓑荷根半日含潄其汁瘥治喉腫瘡方出千金翼含荆瀝稍稍咽之尸咽喉夫道家服藥務先去三蟲者以其為人害也尸咽之病一本於此腹中蟲上蝕咽喉能令生瘡或痛如癢如𧈟之候者是也善攝生者倘未能除去亦當服藥治之勿使妄動則善矣方黃蘖湯治尸咽喉閉塞出瘡及乾嘔頭痛食不下黃蘖去粗皮炙半兩升麻木通銼各一兩竹茹三分麥門冬去心焙一兩半玄參一兩前胡去蘆頭大青各三分右粗搗篩每服三錢匕水一盞煎至七分去滓入芒硝末一錢攪令勻溫服如鼻中有瘡以地黃汁少許滴於鼻中三五服不計時候要通利加芒硝不欲利去之金露丸治尸咽喉風熱毒氣上攻咽中癢痛硃砂一錢白礬一分生用甘草半兩搗羅為末鉛霜一錢射香一錢太隂玄精一分蛇蛻皮三條全者去頭以皂莢水浸一時復曝乾炒黃右都研令勻煉蜜和丸如莢子大每於食後及夜卧時用薄綿裹一丸含化咽津治尸咽喉癢痛語聲不出宜服此方五倍子半兩黃蘖半兩銼川升麻三分甘草一分炙微赤銼射干半兩右為散每服三錢水一盞煎至四分去滓不計時候溫服蛇蛻散治咽喉疼痛蛇蛻皮白梅肉甘草生用各一分惡實半兩炒右為散每用綿裹一錢匕湯浸潤含化咽津不計時候服治尸咽喉痛方杏仁湯浸去皮尖雙仁炒桂去粗皮各二兩蕪荑仁一兩棐實去皮半兩右為末煉蜜為丸如彈子大含化咽津消盡再用日二三服一捻金散治尸咽喉及走馬喉閉或腦內生癰雄黃研藜蘆豬牙皂角去皮并子各一兩右為散先含水一口用藥一米許搐鼻內即吐出水少時效杏仁散治尸咽喉內痛欲失聲杏仁湯浸去皮尖雙炒桂去粗皮各二兩蕪荑仁炒一兩右為散每服三錢匕綿裹含化咽津消盡再用日三五服治尸咽喉癢痛射干一兩薔薇根皮一兩甘草半兩炙微赤銼右為散每服三錢水一盞煎至六分去滓不計時候溫服治尸咽方用燒履鼻繩為灰暖水服之治咽喉中痛癢吐之不出咽之不下似得蠱毒方用生薑含口中自差又方用青布裹麻黃燒筒盛煙吹喉中治尸咽方用燒麻子脂服之治飛尸逰蠱中有物含吞不出方用蚺蛇肉作膾食之狗咽論夫狗咽者喉中忽覺結塞不通如喉痺狀是也隂陽之氣出於肺循喉嚨而上下若風毒熱氣客於喉間氣結藴積而生熱故有結塞之候俗云此疾由誤咽毛而致其治法亦有將飯與狗分食取瘥者禳去之法也方昆布丸治咽喉中壅悶氣塞不通狀如喉痺者昆布洗去鹹味一兩訶梨勒皮二兩檳榔銼一兩松蘿乾薑炮製銼桂去粗皮各一兩海藻洗去鹹味一兩木通銼二兩右為末煉蜜為丸如梧桐子大每服酒溫下二十丸食後臨卧服馬牙硝煎治狗咽氣塞腫痛氣欲絶者馬牙硝木通銼升麻瞿麥穗犀角屑馬藺子各一兩半射干玄參各一兩右細銼以水五盞煎至一盞半去滓下白蜜二兩再煎成膏每服一匙頭含化咽津玄參散治狗咽氣塞玄參杏仁湯浸去皮尖雙仁炒甘草炙赤茯苓去黑皮白术桔梗炒人參各半兩右為散每服二錢匕熱湯調下日三五服丹砂酒治狗咽喉中忽覺結塞丹砂桂去粗皮絳礬各半錢右為末綿裹用好酒浸良久含之即瘥二灰散治狗咽纒喉風燈心燒灰炭上白灰白殭蠶直者炒各等分右同研為散生薑蜜水調下一錢匕如聖散治狗咽及咽喉緊急赤芍藥一兩防風去義三分天麻半兩右為散每服一錢冷茶調下不拘時候石膽散治纒喉風及狗咽石膽一錢半燒研白芷一錢為末右研勻細每服半錢匕溫漿水調下取出涎後再一兩服瘥雞子法治狗咽半夏一錢末薑汁搜為餅子焙乾細研雞子一枚右先開雞子頭去黃又盛苦酒入半夏末殼中攪令勻安雞子坐於溏灰火中慢煎沸熱取出後稍冷就殼帶溫三服之治狗咽喉方用粟米三合以手團為一塊與狗分食之即愈治咽喉忽覺氣塞喘息不通須臾欲絶方用獨顆蒜一枚削去兩頭可塞鼻竅患左塞右鼻患右塞左鼻喉口中濃血出立效惡實散治風熱閉塞咽喉腫結用惡實一合半生半炒搗羅為散酒調下一錢匕立瘥一方取生莖葉研塗上喉兼推一莖令頭破內喉又方用生鼠粘子用末沙糖為丸噙化又用根切一升以水五升煮取三升去滓分溫三四服忌蒜麵如聖丸一名如聖散治喉中忽然結塞不通方見口舌咽喉門喉痺類黃白散治狗咽芒硝研一兩硫黃研一兩右先