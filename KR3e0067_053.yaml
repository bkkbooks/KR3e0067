一方無糯米製銀石器炒牡荆酒治耳聾用牡荆子微炒一升以酒二升浸寒七日暑三日去滓任性飲之雖久聾亦瘥治耳聾方用蠟紙一張剪為四片於筯上緊捲抽却以蠟紙捲子安耳中燃之待火欲至耳急除去當有惡物出在紙上日一攪之攪了以蠟塞定又方用鐵鐶口內含之隨耳聾左右以磁石一塊枕之旬餘氣通即止又方以綿裹鐵砂納耳中口含磁石立瘥又方以生鼠取腦髓綿裹入耳治耳聾法用甘遂半寸綿裹插放兩耳中却將甘草口中嚼自然通聽驢脂方一名驢膏治聾積年用驢生脂和生薑熟搗綿裹塞耳數次能聽一方有椒無生薑有人耳癢一日一作可畏直挑剔出血稍愈此乃腎臟虛致風毒上攻未易常法治也宜服透水丹勿飲酒啖濕麵𬞞菜雞狗之屬能忌一月為佳不能戒無效治耳聾方用海螵蛸為末吹入耳中數日瘥治大病後耳聾方用生菖蒲裂汁滴耳中治耳聾方用骨碎補取根削作細條火炮乘熱塞耳良又方取烏蛇膏以綿裹塞耳中神效又方搗水蘇生葉綿裹塞耳治耳聾法以九月收石榴一個上作孔如毬子大留壓面子內米醋滿石榴中却以壓面子蓋之然後和麵裹却石榴無令醋入火灰中燒麵熟藥成入少黑李仙沼子末取出水滴點耳內不得輒轉腦中痛勿驚如此二夜又點别耳依前法佳又方出海上方治耳聾汁多皆由腎塞或久年不瘥服天門冬酒百日瘥又方出千金方治耳聾汁出久不瘥取礬石少許以菖蒲根汁和點入耳內醋附方出聖惠方治耳聾塞耳疼用附子以淳醋微火煮一宿削如棗核以綿裹塞耳中一方治風聾仍灸二七壯令氣通耳中即瘥真珠粉出本草治耳聾塞耳用真珠末一分研如粉以綿裹塞耳中桃仁方出聖惠方治耳聾塞耳用桃仁湯浸去皮尖雙仁炒一分搗爛撚如棗以赤楮皮裹塞耳中一方治聤耳有膿血用穀葉裹或緋綿裹塞耳中並良日三易鵝膏方出聖惠方治耳聾滴耳用鵝膏一合每以少許滴耳中立瘥生油方治耳聾滴耳用生油一合滴入耳中日三五次候其塞出即瘥一方治聤耳以油納蔥管內隔宿取出滴耳中立瘥蟹汁方出聖惠方治耳聾滴耳用生蟹一枚搗絞取其汁以少許滴耳中龜尿方出聖惠方治耳聾滴耳用龜一枚安於盒中荷葉上養之專看葉上有尿收取滴耳中一方用秦龜雄者以置磁碗中或盤內以鏡照之龜既自見鑑中影往往淫發而失溺急作物取用之又一方法以紙貼火上燒熱以點其尻亦能失尿益母草汁方治耳聾灌耳用益母草水洗淨研取汁少許灌耳瘥鯽魚腦方治耳聾灌耳用鯽魚腦一合以竹筒子盛蒸之冷灌耳中黃瓜根方治耳聾塞耳用黃瓜根削如棗核大塞耳數日乾耵聹膿血自出出盡即瘥雞卵方出本草治耳聾及疳痢耳鳴以雞卵和蠟塞耳中救急療耳聾用真崑崙木香一兩研碎入苦酒浸一宿胡麻油一合微火上緩煎之三上三下以綿濾去滓點耳中以瘥為度又方療耳聾以好神明膏如棗核許納耳日夜頻著三五日以篾子挑入耳中塞或癢取瘥亦治蟲入耳中鼠膽方出本草治耳聾用鼠膽二枚取汁滴耳中三次立效又有人云側臥瀝一膽盡須臾汁從下流出初出益聾半日頃乃瘥治三十年老聾一方用膽塞耳中雷鳴取膽膿自出乾地龍方出千金方治耳聾立效以乾地龍入鹽貯在蔥尾內為水點之一方為末用綿裹如棗核大塞耳中三五日即瘥一方用白項者安蔥葉中麵封頭炙地龍為水以滴耳中巴豆方出肘後方治耳聾用巴豆十四枚鵝脂半兩火鎔入巴豆和取如小豆綿裹塞耳中瘥日易治三十年聾治耳聾用石菖蒲根煎湯分調妙香散三服效黃耆湯治五聾鳴閙不聞人聲出黃水黃耆一兩附子一兩磁石三兩菖蒲一兩木通熟地黃白茯苓五味子防風人參玄參各一兩一分杜仲銼一兩右銼如麻豆每服五錢以水一盞半生薑半分拍碎大棗一枚劈破同煎至一盞去滓溫服續喫羊腎粥助之日五服不計時候通氣散治耳聾氣閉不通茴香木香全蝎陳皮玄胡各一錢羌活穿山甲殭蠶川芎各半錢蟬退半錢菖蒲甘草各一錢右為細末每服三錢溫酒調下防風附子方出聖濟總録治耳鳴氣塞不通用生附子尖一枚削作小棗核以綿裹置耳中治氣壅耳聾用祕傳降氣湯加石菖蒲大有神效磁石湯治耳聾及風氣腳氣磁石十二個石菖蒲四兩通草三兩瞿麥二兩山茱萸三兩白术三兩獨活四兩芎藭二兩薯蕷二兩甘草三兩炙附子三兩桂心三兩生薑五兩杏仁二兩茯神二兩人參三兩前胡三兩蔥白切一升竹葉二兩石膏二兩右切以水一斗四升煮取二升半去滓分三服宜向暮服之令盡丹參膏出千金方治耳聾齒痛丹參五兩蜀椒一升大黃一兩白术一兩細辛一兩芎藭一兩大附子十枚乾薑三兩巴豆十枚桂心四寸右銼以苦酒漬一宿以豬膏三斤煎藥成去滓可服可摩耳聾者綿裹膏納耳中齒冷痛者著齒間諸痛皆摩腹內有痛以酒服一棗大咽喉痛吞一棗核大大青丸治腦熱腦脂流下塞耳聾大青大黃梔子黃耆升麻黃連各一兩朴硝二兩右為末煉蜜丸如梧桐子大每服三十丸空心溫酒送下藍實丸治時行心氣奪耳聾藍實茯神防風各一兩一分黃連一兩半人參半兩菖蒲逺志各三兩右為末丸如桐子大每服二十丸空心溫水下黃耆膏治耳內窒塞如有物點黃耆升麻大黃芍藥各一分細辛半兩右為末以清麻油五合調勻慢火煎取二合稀稠得宜以瓷合盛每用少許滴耳中日三次百靈丸出聖濟總録治耳重芫花蒺䔧地龍蘹香子地丁各一分右為末以醋和蜜煉熟為丸如梧桐子大空心臨臥溫鹽湯下五丸白龍散經驗良方耳者宗脈之所聚腎氣所通小兒腎臟盛而有熱熱氣上衝於耳津液結聚則生膿汁有因沐浴水入耳內水濕停積摶於血氣蘊積成熱亦令耳膿汁出謂之聤耳久則變成聾白礬黃丹各半兩麝香一分龍骨半兩右研極細先以綿杖子拭盡耳中膿用藥一字分摻兩耳內日二次勿令風入摻耳抵聖散聖濟總録治耳重瓜蒂麝香地龍地丁各等分右為末每以少許摻耳內治耳疾出經驗良方蛇床子一兩巴豆半兩萞麻子半兩右同炒令焦黃却去巴豆萞麻子用蛇床子為末入麝香少許每用少許鵝毛管吹入耳中側臥良久黃水出便效治擦落耳鼻出經驗良方用頭髮入罐子鹽泥固濟煆過為細灰末乘急以所擦落耳鼻蘸灰綴定以軟綃帛縳定愈獨聖散治汗後耳聾用陵石有竅子如鐵眼者搗研為細散每服一錢冷水調下治諸耳中出血出三因方用龍骨為末吹入耳中立愈鼻衄等證皆可用方書以九竅出血皆可吹入萞麻子丸治耳聾萞麻仁五合杏仁菖蒲磁石桃仁石鹽通草各三錢巴豆附子各二分薰陸香松脂各一錢蠟八分右先搗草石令極細後入松脂蠟合搗數十杵令可丸即丸如棗核大綿裹塞耳一日四五度出之轉捻不過三四日易之雞峯方出聖惠方治耳聾菖蒲一寸巴豆一粒右搗研分為七丸每服一丸臥即綿裹塞耳中一方入麝香少許夜易之十日立愈一方用蠟一分為丸以綿裹塞耳一日一易鸊鷉膏出本草治耳聾取鸊鷉膏滴耳中此水鳥也治聾出本草取狗隂膏滴耳中令左右耳徹治耳聾出本草以杏仁七枚去皮拍碎為三分以綿裹於中著顆鹽如小豆許以器盛於飯甑中蒸之候飯熟出裹令患人側臥和綿捻一裹以油汁滴入耳中久之又一依前法治耳聾出本草以蝟脂注耳中治耳聾出本草以附子醋浸削如小指大納耳中導引法坐地交義兩腳以兩手從曲腳中入低頭義項上治久塞耳不聞聲又云腳著項上不息十二通必愈大寒不覺暖久頑冷患耳聾目眩皆治之風聾論夫風聾者本於足少隂之經宗脈之所聚其氣通於耳其經脈虛而風邪乘之風入于耳之脈使經氣閉塞不宣故為風聾風隨氣脈行於頭腦則聾而時頭痛故謂之風聾方雄黃散出聖濟總録治風聾雄黃半兩丹砂三分丁香一分肉桂去皮一兩乾蝎炒半兩烏蛇半兩硫黃一分天麻半兩人參半兩山芋一兩天南星炮三分白附子炮一分麝香三分檳榔三枚木香一分麻黃半兩右為散再羅令勻每服二錢溫酒調服磁石酒浸方治風邪入於腦或入於耳久而不散經絡壅滯不能宣利使人耳中悾悾然或時作眩暈磁石五兩搗碎山茱萸二兩木通一兩防風一兩薯蕷一兩菖蒲一兩逺志一兩天雄一兩蔓荆子一兩甘菊花一兩芎藭一兩細辛一兩肉桂一兩乾薑一兩白茯苓一兩熟地黃三兩右細銼拌和用生絹袋盛以酒三斗浸經七日後每日任性服之以瘥為度菖蒲湯出聖濟總録治風聾木通銼三兩瞿麥三兩白术三兩菖蒲四兩獨活四兩山芋三兩甘草炙二兩附子二兩肉桂去粗皮三兩杏仁炒三兩茯神二兩人參三兩前胡三兩石膏二兩磁石火燒七遍醋淬二兩右銼如麻豆每服三錢以水一盞半入竹葉七片生薑一棗大蔥白一寸同煎至七分去滓溫服山茱萸散治風虛耳聾頭腦眩悶四肢不利山茱萸一兩薯蕷一兩菖蒲一兩土瓜一兩甘菊花一兩木通一兩防風一兩赤茯苓一兩天雄一兩牛膝一兩沉香一兩甘草半兩逺志一兩生地黃一兩蔓荆子一兩右為散每服五錢以水一大薑入生薑半分同煎至五分去滓食前溫服蓯蓉丸出聖惠方治風虛耳聾由腎臟不足風邪入於經絡致四肢羸瘦腰背強直耳無所聞蓯蓉二兩酒浸磁石二兩燒七遍鹿茸一兩山茱萸三錢石斛三錢石龍芮三錢巴戟三錢杜仲三錢附子三錢莵絲子三錢菖蒲熟地黃三錢天麻三錢乾蝎三錢微炒右為末煉蜜丸搗三五百杵如梧桐子大每服十丸空心溫酒下桂星散出直指方治風虛耳聾辣桂川芎當歸細辛淨石菖蒲木通木香白蒺䔧麻黃甘草炙各二錢半天南星白芷梢各四錢右銼碎每服三錢水一盞半蔥白二莖紫蘇五葉薑五片食後煎服晚少食臨卧加些全蝎服排風湯亦可用蒼术酒出聖濟總録治腎間風熱骨痛耳聾及腎中實邪蒼术三兩防風三兩惡實三兩炒獨活三兩木通三兩生地黃三兩洗人參一兩薏苡仁三兩黃耆三兩肉桂一兩半白茯苓二兩半右細切以酒一斗浸七宿空心飲之初一盞後量性加至二三盞杏仁膏出聖濟總録治風聾久不瘥者杏仁一兩萞麻子去皮一兩巴豆去皮心研一分食鹽别研二分附子炮裂去皮臍一分桃仁一兩乳香别研一分木通銼半兩磁石一兩蠟二兩菖蒲一兩右除别研外搗羅為末後入研者相和搗丸撚如棗核大綿裹塞耳中日四五易黃耆散出聖惠方治風虛耳聾黃耆二兩銼當歸二兩銼杏仁二兩湯浸桂心二兩芎藭二兩白术一兩石菖蒲一兩蔓荆子一兩白蘚皮二兩白芍藥一兩右為散每服五錢以水一大盞羊腎一隻去脂膜切開入生薑一分同煎至六分去滓空心溫服犀角飲子出危氏方治風熱上壅耳內聾閉腫痛掣動膿血流出犀角一兩菖蒲一兩木通一兩玄參一兩赤芍藥一兩赤小豆一兩甘菊花一兩甘草半兩炙右㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候魚腦膏出聖惠方治風聾年久及耳鳴生鯉魚腦二兩當歸半兩細辛半兩白芷半兩附子半兩菖蒲半兩右除魚腦餘搗羅為末以魚腦置銀器中入藥在內微火上煎候香濾去滓傾入瓷合中候凝撚如棗核大綿裹塞耳中一方無菖蒲有羊腎脂同魚腦先熬後下諸藥附子散出聖惠方治風虛耳聾頭腦眩悶四肢不利附子一兩桂心一兩五味子一兩木香一兩桃仁一兩湯浸去皮白蒺䔧一兩微炒右為散每服二錢空心暖酒調服臨臥時再服天雄散治風聾頭目痛細辛二兩山茱萸五兩天雄三兩山芋七兩右搗為散每服一錢空心溫酒調下日三服羊腎羮方出聖惠方治風寒耳聾黃耆半兩羊腎一隻杜仲半兩磁石五兩肉蓯蓉一兩酒浸右以水三大盞先煮磁石取汁二大盞去磁石下黃耆等又煎取一盞半去滓入羊腎粳米一合蔥白薑椒鹽醋一如作羮法空心服之獨活散用獨活去蘆頭一兩搗羅為散每服二錢以水酒各半盞煎至七分去滓空心服以瘥為度時用水浸椒煮令熱以布裹尉之栝蔞方治耳卒得風覺耳中哄哄聲削栝蔞根令可入耳以臘月豬脂煎三沸出塞耳三七日即愈白鹽方治卒得風疾覺耳中桄桄卒痛者急取鹽五升甑上蒸熱以耳枕之冷即換亦治耳冷一方用軟布裹尉之治風虛耳聾取柘木白皮及東行根白皮煮汁釀酒服療耳聾風邪牙關不正得開方取八角附子一枚醋漬之三宿令潤微削一頭納耳中灸上十四壯令氣通耳中即瘥普濟方卷五十三
