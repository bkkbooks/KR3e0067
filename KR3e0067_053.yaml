body:
  text: 普濟方卷五十三明周王朱橚撰耳門總論夫耳屬足少隂之經腎家之寄竅於耳也腎通乎耳所主者精精氣調和腎氣充足則耳聞而聰若勞傷氣血風邪襲虛使精脫腎憊則耳轉而聾又有氣厥而聾者有挾風而聾者有勞損而聾者蓋十三經脈上絡於耳其隂陽諸經適有時交并則臟氣逆而為厥厥氣衝入於耳是為厥聾必有時乎眩暈之證耳者宗脈之所附脈虛而風邪乘之風入於耳之脈使經氣否塞不能宣是為風聾必有時乎頭痛之證勞役傷於血氣淫欲耗其元精瘦悴力疲昏昏瞶瞶是為勞聾有能將適得宜血氣和平則其聾漸輕其或日就勞傷風邪停滯則為久聾之證矣外此又有耳觸風邪與氣相擊其聲嘈嘈眼或見光謂之虛鳴熱氣乘虛隨脈入耳聚熱不散膿汁出焉謂之膿耳此耳間有津液輕則不能為害若風熱搏之津液結聚成核塞耳亦令暴聾謂之停耳前是數者腎脈可推風則浮而盛熱則洪而實虛則澀而濡風為之踈散熱為之清利虛為之調養邪氣屏退然後以通耳調氣安腎之劑主之如此得耳中三昧耳不致聾聵耳鳴耳痛耳癢耳內生瘡或為停耳或為耳腫六淫傷之調乎腎七情所感治乎心醫療之法寧心順氣欲其氣順心寧則耳為之聰矣宜用局方妙香散以石菖蒲煎湯調服以順心氣丹參蜜砂以寧心君調腎之藥前方所載蓯蓉丸是也續有二方為之佐使參而用之可也耳證歌云耳為聽會腎之官五臟官通理可詳內運唏噓呵呼呬外司角徴羽宫商卒然內塞不聞聲勞碌憂思過度生聾聵耳鳴膿血出風寒暑濕薄於經停耳底耳證多端用意消詳不一般或實或虛隨證療百蟲入耳别為看五臟六腑十二經脈有絡於耳者其隂陽經氣有相并時并則有臟氣逆名之為厥厥風相摶入於耳之脈則令耳聾其腎病精脫耳聾者其候頰顴色黑手少陽之脈動而氣厥逆而耳聾者其候耳內輝輝停㷚也手太陽厥而耳聾者其候聾而內氣滿養生方云勿塞故井及水漬令人耳聾目盲耳聾諸疾論夫腎開竅於耳足少隂之經宗脈所會也若精氣調和元藏充盛則耳聰而諸疾不生或勞傷氣血客受風邪則腎虛而為耳病有腎間漬水而耳聾者有心氣虛熱而耳聾者有腦脂下流成耵聹耳垢而耳聾者其證不一耳聾之證有二有腎虛精脫而聾者腎氣通於耳也有經脈氣厥而聾者經脈絡於耳也腎虛而聾者其候靣色黑氣厥搏入於耳聾者其候耳中輝輝㷚㷚或耳中氣滿是也輝輝㷚㷚過在手少陽耳中氣滿過在手太陽以至五絡皆會於耳中各有證候審而治之蓋肺虛而少氣不能服息耳聾嗌乾肺之絡會於耳中故聾此説非也蓋氣弱必塞甚則氣血俱澀滯而不行也耳者宗氣也肺氣不行故聾也耳聾有五曰風聾曰乾聾曰勞聾曰虛聾曰聤聾是也腎氣通於耳足少隂其經也虛受風邪及勞傷血氣停滯津液皆能致聾惟所受不同故其經各異葛氏所謂風聾者痛掣乾聾者內耵聹勞聾者出黃汁虛聾者肅肅作聲聤聾者膿汁出方磁石散出千金方治耳聾磁石四兩天門冬地骨皮生薑各二兩山茱茰土瓜根牡荆子茯苓菖蒲芎藭枳實白芷橘皮甘草各二兩竹瀝二升右㕮咀以水八升煮減半內瀝煮取二升五合分三服五日一劑三日乃著散入耳中如後方柏子仁湯出聖濟總録治腎間有水使人耳聾補不足柏子仁白术人參乾薑甘草防風烏頭陳橘皮山芋芎藭磁石芍藥黃耆白茯苓各一兩半肉桂一兩半右㕮咀每服三錢先以水三盞煮羊腎一隻取汁一盞去羊腎下藥入生薑一棗大拍碎同煎至七分去滓食前溫服之肉蓯蓉丸出聖濟總録治腎虛耳聾肉蓯蓉莵絲子白茯芩山芋人參肉桂去粗皮防風芍藥熟地黃黃耆附子羊腎羌活澤瀉各一兩右搗羅為末煉蜜和丸如梧桐子大每服三十丸空心溫酒送下桑螵蛸湯聖濟總録治虛損耳聾桑螵蛸十枚牡丹皮半兩白茯苓白术當歸肉桂去粗皮牡荆子磁石附子菖蒲熟乾地黃大黃細辛芎藭各半兩右㕮咀每服三錢先以水三盞煮豬腎一隻取汁一盞去腎下藥煎至七分去滓食前溫服礬石膏出千金方治耳聾礬石甘草菖蒲當歸細辛防風芎藭白芷烏賊骨附子皂莢各半兩巴豆十四枚右薄切三升酢漬一宿以不中水雞膏合煎三三下以巴豆黃膏成去滓內雄黃末攪調取棗核大瀝耳中綿塞之日三易黃耆丸治耳聾黃耆梔子仁犀角木通升麻人參玄參木香乾鹽黃芩芍藥銼各一兩右搗羅為細末煉蜜和丸如梧桐子大每服二十丸煎枸杞根湯下加至三十丸食後服追風散治耳聾閉塞不通䔧蘆雄黃川芎白芷石菖蒲全蝎藿香薄荷鵝不食草苦丁香各等分麝香少許右為末吹鼻中仍服順氣散即通乳香丸治耳聾塞耳乳香杏仁萞麻子附子磁石木通桃仁各半兩巴豆炒一分松脂菖蒲各三分右先搗羅磁石木通菖蒲附子為末其餘搗研為膏入末同搗一二百杵撚如棗核大中心通一孔子以綿裹塞耳中一日三換輕者三日重者七日愈清神散治氣壅於上頭目不清耳常重聽乾菊花白殭蠶各半兩荆芥穗羌活木通川芎防風各四兩木香一錢甘草石菖蒲各錢半右為末每服三錢食後臨臥茶清調下磁石羊腎丸治風虛不爽時重聽或有風痺之狀普皆治之磁石末二兩川椒石棗防風白术茯苓北細辛山藥川芎逺志肉大川烏木香當歸莵絲子黃茋鹿茸酒浸一宿各一兩肉桂熟地黃二兩石菖蒲一兩半右為末用羊腎兩對去皮膜以酒煮爛和諸藥細研以所煮羊腎酒攪糊為丸如梧桐子大每服一百丸空心溫酒鹽湯送下仍以清神散羊腎丸二方相間服却忌牛肉雞鵝子臨川阮助教方療耳聾出本草以鹽霑蚯蚓汁滴耳中治耳聾斑貓一個去翅足土狗一個石菖蒲一寸巴豆一個全蝎一個穿山甲一片燒麝香少許萞麻子三個右研細蔥涎和丸棗核大綿裹塞耳菖蒲散出千金方治耳聾石菖蒲二兩磁石四兩白斂牡丹皮山茱茰牛膝土瓜根各二兩右治下篩綿塞耳日一易之仍服大三五七散佳通耳丹治耳塞桑螵蛸安息香阿魏各錢半硃砂半錢大蒜萞麻子仁七個巴豆仁七個右為細末入二仁與蒜同研爛為丸如棗核樣每用一丸綿裹塞耳中覺微痛即取其藥萞麻丸一各大通膏治耳聾塞耳萞麻子去皮半兩乳香食鹽巴豆去皮炒各一兩松脂蠟棗仁各半兩右搗爛如膏撚如棗核樣如小手指大用薄綿捲之大針扎兩三眼兩頭透用塞耳經宿當聞鍾聲黃水出即愈雄黃散治耳聾薰耳雄黃防風菖蒲礬石烏頭椒炒出汗各一分大棗十枚右為散以香爐中安艾一彈子大次著黃蘖末半錢匕於艾上復以藥二匕著艾上火燃向耳薰之磁石丸療耳聾磁石菖蒲通草薰陸香杏仁萞麻子松脂等分右搗篩以蠟及鵝脂和丸稍長乃以叉腳子穿中心為孔先去耳中垢然後納藥日再初作癢及作聲日餘即瘥一方無鵝脂只用蠟為丸黃蠟丸出千金方治耳聾蠟松脂薰陸香萞麻子石鹽亂髮灰右等分為末作丸綿裹塞耳時易瘥止木香丸治遠年近日耳重香附一兩炒去毛蒼术一兩木賊二兩川烏半兩木香三錢右為細末用蔥六兩研同前藥和勻罨一宿來日炒乾再為細末作二分一分用酒糊為丸如梧桐子大每服三十丸用留下一分藥末每用一錢麝香酒調吞下丸子藥服之菖蒲酒治耳聾及鳴木通菖蒲銼焙三分磁石半兩防風去乂一兩肉桂半兩羌活一兩右㕮咀如麻豆以水一斗漬寒七日暑三日每日空腹飲三兩盞以瘥為度一方無羌活通神散出直指方治耳聾全蝎一枚土狗二枚中地龍二條雄黃半錢麝香一字明礬半錢右研細蔥白引藥入耳閉氣靣壁坐一時三日一次松脂膏出聖惠方療耳聾不聞人語聲松脂四分巴豆二分麻子仁二分蠟二分薰陸香二分食鹽二分右搗如膏丸棗核大納耳內三日一易取瘥一方無蠟地黃散出聖惠方治耳聾巴豆杏仁各七枚生地黃一寸半鹽頭髮如雞子大燒灰右治下篩以綿薄裹納耳中一日一夜若不損即去之直以物塞耳中黃水及膿出漸漸有效如不瘥者更納一日一夜必瘥一方搗成膏為丸以薄髮裹塞耳名地黃丸松脂膏出聖惠方治耳聾松脂半兩杏仁一分巴豆半分椒末半兩蔥汁半合右搗爛如膏撚如棗核大綿裹塞耳中菖蒲丸一名羊腎丸治腎虛耳聾重聽過於思慮則其病尤甚此藥主之菖蒲蜀椒各三分蔥子炒半兩羊腎皂莢右為末煉蜜丸如梧桐子大每服三十丸空心溫酒下日三凡欲服此藥臨臥時先安鐡物於所患耳邊口中以牙邊咬定却以磁石一小塊安耳內覺氣微通略能聽聲然後服藥一方無蜜研羊石子作膏鹽湯下亦得益腎膏治腎虛耳聾磁石巴戟大川椒各一兩沉香石菖蒲各半兩右為細末每服二錢用豬腎一隻細切和以蔥白少許鹽并藥濕紙十重裹煨令香熱空心嚼以酒送下附子散出聖濟總録治耳聾耳塞附子磁石煆醋淬七遍龍骨菖蒲藁本各一分右為散以綿裹一錢塞耳中羌活丸出聖濟總録治耳聾耳塞羌活玄參木通烏頭防風右為末鎔蠟和撚如棗核大塞耳中日一易楓香丸出楊氏家藏方療耳聾磁石三兩石菖蒲遠志破故紙各一兩木通半兩麝香一錢右為細末用蔥白汁煮麵糊丸如梧桐子大每服三十丸至四十丸煎通草湯送下食前服透耳筒出仁存方治耳聾及由腎氣虛耳中如風水聲或如鐘聲椒目巴豆菖蒲松脂各一錢右為末攤令薄候冷捲作筒子塞耳內一日一夜神效一方用川椒以蠟為丸如棗核大塞耳中一方無松脂治耳聾一豆三貓不出油麝香少許用真修煉蜜為丸麥粒大綿裹錠子耳中投燒腎散出聖惠方治耳聾磁石一兩附子一兩巴戟一兩川椒一兩去目及閉口者微炒去汗右為末每服用豬腎一隻去筋膜細切蔥白薤白各一分切入藥一錢鹽花一字和攪令勻以十重紙濕裹於煻灰火內煨熱空心細嚼用酒薄荷粥送下十日大效明硫黃膏出直指方治耳聾明硫黃雄黃各研細逺志去心白皂莢等分右為細末蔥白搗粘入麝少許綿包入耳蠟彈丸出危氏方治腎虛耳聾白茯苓黃蠟各二兩山藥三兩杏仁一兩半右為末鎔蠟和丸如彈子大嚼一丸鹽湯下不拘時候或茶清下亦效蝸牛子膏出聖惠方治耳聾塞耳蝸牛子一分石膽一分鍾乳一分龍腦右除龍腦同研細末一磁瓶盛之以炭火燒令通赤候冷取出研入龍腦少許每用油調藥一字滴入耳中無不瘥木通膏出聖惠方治耳聾木通一兩燈心七莖地龍三條鵝毛翎根筒七莖右相和燒為灰細研每用半錢以生油調傾入耳中用綿子塞耳且側臥良久如此三度麝香散治耳聾吸鼻麝香細辛乾薑莙薘根焙各一分右為散患左耳吸右鼻患右耳吸左鼻不拘時安腎丸朱氏集驗方治虛弱耳聾磁石半兩石菖蒲羌活各半兩右為末混合為丸梧桐子大每服四五十丸鹽湯溫酒任下硼砂丸出德生堂治耳聾右為細末蒸飯為丸如豌豆大用新綿裹一丸塞入耳內桂心膏出聖惠方治耳聾桂心十八銖野葛六銖成煎雞肪五兩右㕮咀於銅器中微火煎三時去滓蜜貯勿泄以葦筒盛如棗核大火炙令熱欹臥側耳灌之如此十日耵聹自出大如脂長一寸久聾不過三十日以髮裹膏深塞莫使泄氣五日乃出之千金翼云治二十年耳聾塞耳丸出危氏方治耳聾風道壅塞兩耳聾聵石菖蒲一寸巴豆一枚全蝎一枚右為細末蔥涎打和為丸如棗核綿裹納耳中乾棗膏治耳聾乾棗松脂巴豆十粒去殼生用右同搗綿裹塞耳中以瘥為度麝香黑豆丸出仁存方治腎虛耳聾黑豆一升韭菜二束石菖蒲二兩右用韭束蒲豆煮爛去蒲勿用只以豆韭成餘汁及取生韭一束共搗研成膏入麝半錢如梧桐子就捻作餅子用橘葉盛曮乾仍以原橘葉煎湯臨臥服二十粒牙硝散治耳