body:
  text: 普濟方卷十六明周王朱橚撰心臟門總論夫心主神神者五臟專精之本也為帝王監領四方夏王七十二日位在南方離宫火也有生之來謂之精兩精相摶謂之神所以任物謂之心神者心之藏也舌者心之官故心氣通於舌舌和則能審五味矣心在竅為耳夫心者火腎者水也水火相濟心氣通於舌舌非竅也其通於竅者寄見於耳左耳丙右耳丁循環炎宫上出唇口知味榮華於耳外主血內主五音心重十二兩中有三毛七孔盛精汁三合神名詬詬主藏神號五神居隨節應會故云心藏脈脈合神在氣為吞在液為汗心氣虛則悲不已實則笑不休心氣虛則夢救火陽物得其時則夢燔灼心氣盛則夢喜笑恐畏厥氣客於心則夢丘山煙火凡心臟象火與小腸合為腑其經手少隂與太陽為表裏其脈洪相於春王於夏夏時萬物洪盛埀枝布葉皆下垂如曲故名曰鈎心脈洪大而長洪則衛氣實實則氣無從出大則榮氣萌萌洪相薄可以發汗故名曰長長洪相得即引水漿溉灌經絡津液皮膚太陽洪大皆是母軀幸得戊巳用牢根株陽氣上出汗見於頭五內乾枯胞中空虛醫反下之此為重虛脈浮有表無裏陽無所使不但危身并中其母夏脈如鈎夏脈心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鈎反此者病何如而反其氣來盛去亦盛此謂之太過病在外其來不盛去反盛此謂不及病在內太過則令人身熱而膚痛為浸淫不及則令人煩心上見咳唾下為氣泄心脈來纍纍如連珠如循琅玕曰平夏以胃氣為本心脈來喘喘連屬其中微曲曰心病心脈來前曲後倨如操𢃄鈎曰心死真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死夏胃微鈎曰平鈎多胃少曰心病但鈎無胃曰死胃而有石曰冬病石甚曰今病心藏脈脈舍神怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死于冬手少隂氣絶則脈不通少隂者心脈也心者脈之合也脈不通則血不流血不流則髮色失澤面黑如漆葉者血先死壬篤癸死水勝火也心死脈浮之實如豆麻擊手按之益躁疾者死夏心火王其脈浮大而散一作弦曰平反得弦細而長者是肝之乘心母之歸子為虛邪雖病易治反得大而緩者是脾之乘心子之乘母為實邪雖病自愈反得沈濡而滑者是腎之乘心水之尅火為賊邪大逆十死不治反得微澀而短者是肺之乘心金之陵火為微邪雖病即瘥腎乘心必癃左手關前寸口隂絶者無心脈也若心下熱痛掌中熱時時善嘔口中傷爛刺手少陽治陽左手關前寸口隂實者心實也若心下有水氣憂恚發之刺手心主治隂心脈來纍纍如貫珠滑利再至曰平三至曰離經病四至脫精五至死六至命盡手少隂脈也心脈急甚為瘈瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行有時唾血太甚為喉介微大為心痺引背善淚出小甚為善噦微小為消疸滑甚為善渴微滑為心疝引臍小腹鳴澀甚為瘖微澀為血溢維厥耳鳴癲疾心脈搏堅而長當病舌卷不能言其濡而散者當病消渴自已心脈之至也喘而堅詮曰有積氣在中時害於食名心痺得之外疾思慮而心虛故邪從之扁鵲曰心有病則口生瘡腐爛心在聲為笑在變動為憂在志為喜喜傷心精氣并於心則喜心虛則悲悲則憂實則笑笑則喜時主夏病者時間時甚知其源取其輸觀其應審其害病先發於心者心痛一日之肺喘咳三日之肝脅痛支滿五日之脾閉塞不通身痛體重三日不已死冬夜半夏日中病在心日中慧夜半甚平旦靜假令心病北行若食豚魚得之不者當以冬時發得病以壬癸日方凡心病之狀胸內痛脅支滿兩脅下痛膺背肩胛間痛兩臂內痛虛則胸腹大脅下與腰背相引而痛取其經手少隂太陽舌下血者其變病刺郤中血者心脈沉之小而緊浮者不喘苦心下聚氣而痛食不下喜咽唾時手足熱煩滿時忘不樂喜太息得之憂思心病其色赤心痛短氣手掌煩熱或啼哭罵詈悲思愁慮面赤身熱其脈實大而數此為可治冝服闕冝服煮藥春當刺中衝夏刺勞宫季夏刺大陵皆補之秋刺間使冬刺曲澤皆㵼之此是手心主心胞絡經又當炙巨闕五十壯背第五椎百壯邪在心則病心痛善悲時眩仆視有餘不足而調其輸愁憂思慮則傷心心傷則苦驚喜忘善怒心中寒者翕翕發熱不能起心中飢則飲食食則嘔心中寒者其人病心如噉蒜虀狀劇者心痛徹背背痛徹心如蠱注其脈浮者自吐乃愈心傷其人勞倦頭面赤而下重心中痛徹背自煩發熱當臍跳手其脈弦此為心臟傷所致也心水者其人身體腫而少氣不得卧煩而躁其隂大腫真心痛手足青至節心痛甚者旦發夕死夕發旦死心脹者煩心短氣卧不安凡心脈急名曰心疝小腹當有形其以心為主臟小腸為之使故小腹當有形診得心積沉而芤時上下無常處病胸滿悸腹中熱面赤咽乾心煩掌中熱甚則唾血身瘈瘲主血厥夏差冬劇色赤也心病煩悶少氣大熱熱上傷心嘔咳吐逆狂語汗出如珠身體厥冷其脈當浮今反沉濡而滑其色當赤而反黑者此是水之剋火為大逆十死不治徴音人者主心聲也心聲笑其音竽其志喜其經手少隂厥逆太陽則榮衛不通隂陽反錯陽氣外擊隂氣內傷傷則寒寒則虛虛則驚掣心悸定心湯主之語聲前寬後急後聲不續前混後濁口喎冒昧好自笑此為厲風入心荆瀝湯主之心虛風寒半身不遂骨節離解緩弱不收便利無度口角喎邪薑附湯主之此病不盈旬日宜急治之又笑而呻呻而反憂此為水剋火隂擊陽隂起而陽伏伏則實實則傷熱傷熱則狂悶冒昧言多謬誤不可採聽此心已傷若其人口脣正赤可療青黃白黑不可療也赤為心心合脈赤如雞冠者吉心主舌舌是心之餘其人火形相比於上徴赤色䀕鋭面小頭好肩背髀腹小手足行安地疾行搖肩背肉滿有氣輕財少信多慮見事明了好顧急心不夀暴死耐春夏不耐秋冬秋冬感而生病主手少隂竅竅然􅐳骭長短傾正則心應之正赤色小理者則心小小則邪勿能傷易傷以憂粗理者則心大大則虛虛則寒寒則憂不能傷易傷於邪無􅐳骭者則心髙髙則實實則熱熱則滿於肺中悶而善忘難開以言􅐳骭小短舉者則心下下則藏外易傷於寒易恐以言􅐳骭長者則心堅堅則藏安守固􅐳骭弱以薄者則心脆脆則善病消疸熱中􅐳骭直下不舉者則心端正端正則和利難傷􅐳骭向一方者則心偏傾偏傾則操持不一無守司也一云若􅐳骭小短薄弱而下則心下下則虛虛則傷寒又憂恚內損心暴痛而好唾清涏口臭蠱齒痛侵唇齒若􅐳骭髙起則心髙髙則實實則熱熱則滿於心悶而善忘恐悸喉燥口痛牙癰舌傷小兒則便祕口重舌鵝口聲嘶凡人部分陷起者必有病生小腸太陽為心之部其處陷起即病生矣臟含內外部亦內外沉濁屬內浮清居外若外病內入小腹滿起內病裏出所部陷沒外入內前治陽後補隂內出外前補隂後㵼陽陽則實熱隂則虛寒在陽主外在隂主內凡人死生休咎則臟神前變形于外人心前病則口為之開張若心前死則枯黑語聲不轉若天中等分墓色應之即死不治看應增損斟酌賖促賖則不出四百日內促則不臻旬月之間心病少愈而卒死何以知之曰赤黑色黯點顔即若見顔度年上此必卒死心絶一日死何以知之兩目回回直視肩息立死凡面赤目白憂恚思慮心氣內索面色反好急求棺槨不過十日死又面黃目赤不死赤如衃血死吉凶之色若在分部朏朏而見赤黑入口此必死不出其年名曰行尸若年上無應三年之中病必死矣夏火心脈色赤主手太陽也夏取盛經分腠夏者火始治心氣始長脈瘦氣弱陽氣留溢熱熏分腠內至於經故取盛經分腠絶膚而病去者邪居淺也所為盛經者陽脈也其脈本在外踝之後應在命門之上三寸命門者在心下一寸也脈根在少澤在手小指端手少隂之脈獨無輸何也曰少隂者心脈也心者五臟六腑之大主也為帝王精神之所舍其藏堅固邪不能容容之則傷心心傷則神去而身死矣故諸邪在於心者皆在心之包胳包胳者心主之脈也故少隂無輸也少隂無輸心不病乎曰其外經腑病臟不病故獨取其經於掌後兊骨之端也夏三月主心小腸赤脈㩌病也其源從少隂太陽之氣相搏而停則榮衛不通皮肉痛起太陽動發少隂淫邪之氣因而作則臟腑隨時受夏疫病也其病相若腑虛則為隂邪氣所傷身戰脈掉捉所不禁臟實則為陽毒所侵內熱口開舌破咽塞聲嘶故曰赤脈㩌病扁鵲曰灸腎肝心三輸主治丹一作痺毒病當依源為治表治隂陽調和臟腑疾不生矣凡脈虛者好驚跳不定脈實者洪滿凡脈虛實之應主乎心小腸若其腑臟有病從熱生則應臟寒則應腑也心實附論夫心實熱左手寸口人迎以前脈隂實者手少隂經也病苦閉大便不利腹滿四肢重身熱名曰心實熱也心實則生熱熱則心神煩亂面赤身熱口舌生瘡咽燥頭痛喜笑恐悸心煩熱汗出衄血諸證皆手少隂經實熱所致其脈見於左手寸口人迎以前隂實者乃其候也心小腸俱實左手寸口人迎以前脈隂陽俱實者手少隂與巨陽經俱實也病苦頭痛身熱大便難心腹煩滿不得卧以胃氣不能轉水穀名曰心小腸俱實也方茯神湯千金方治心實熱口乾煩渴眠卧不安茯神去木麥冬去心焙各三兩木通銼一作通草桂去粗皮知母紫苑洗切升麻各半兩竹茹如雞子大赤石脂各一兩右粗搗篩每服五錢井華水一盞半入棗一枚去核煎至一盞去滓食前臨卧溫服安心散千金方治心熱滿煩悶驚恐芍藥白者逺志宿薑各二兩茯苓赤石脂麥門冬知母紫苑石膏各四十二銖人參二十四銖桂心麻黃黃芩各三十銖萎蕤三十六銖甘草十二銖右為粗散先以水五升淡竹葉一升煮取三升去滓煮散一方寸七半以絹裹煮時動之煎取八合為一服日再茯神丸王氏博濟方治心實壅熱口苦舌乾涕唾稠黏胸膈煩悶不思飲食肢體倦怠或發煩熱狀似骨蒸茯神去木生乾地黃洗切焙各二兩鱉甲九肋者醋炙去裙防風去蘆桔梗去蘆頭切炒人參升麻大復子炮黃芩去黑子白前各一兩枳殼去瓤麩炒赤芍藥柴胡去苗黃耆薄切各一兩右為細末錬蜜丸桐子大每十丸食後生薑湯下臨時更加減服犀角正心湯治心臟熱胸中滿悶嗔怒不常或頭旋運或痛如破犀角鎊防風去蘆生乾地黃焙羌活去蘆頭菊花半夏湯浸又用薑汁製作餅暴乾玄參黃芩去黑心白术甘草炙旋覆花麥門冬去心焙前胡去蘆頭各兩半右搗篩每服五錢水一盞半入生薑一棗大切煎八分去滓食後溫服抑心氣湯銜藥院方治心氣實熱火氣炎盛銷爍金精肺受心邪因而生疾若人患肺先審心虛實若心氣盛實則脈洪大或肺脈微得心脈即先服此黃芩去黑心赤茯芩去黑皮玄參甘草炙銼麥門冬去心焙牡丹皮升麻桔梗去蘆頭炒貝母去心犀角屑各一兩沉香木香各一錢右粗搗篩每服三錢水一盞煎七分食後溫服人參湯治心實壅熱口苦舌乾涕唾稠黏胸膈煩悶不思飲食人參赤茯苓去黑皮茯神去木龍骨逺志去心麥冬去心焙生乾地黃洗切焙甘草炙銼各半兩丹砂别研天竹黃各一錢天冬去心焙半兩右搗篩每服三錢水一盞棗一枚去核淡竹葉五片燈心一莖煎七分去滓溫服一方治心熱多汗用白茯苓無燈心煎竹瀝湯千金方治心實熱驚夢喜笑恐畏悸懼不安淡竹瀝生地黃各一升石膏八兩芍藥白术人參梔子仁各三兩赤石脂紫苑知母茯神各二兩右㕮咀以水九升煮十味取二升七合去滓下竹瀝更煎取三升若須利入芒硝二兩去芍藥分三服黃連散治心實熱多驚夢喜畏懼不安黃連人參去蘆頭知母麥冬去心柏子仁赤芍藥犀角屑茯神紫苑去苗土各一兩石膏川芒