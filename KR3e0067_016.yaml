心氣弱悸或時妄語四肢損變氣力顔色不榮腹背相引痛不能俛仰黄芩附子各一两甘草茯神一作茯苓麥門冬去心乾地黄桂心阿膠各二兩炒半夏薑製逺志石膏各四两生薑六兩粘糖一斤大棗二十枚右取十三味㕮咀水一斗五升煮取五升湯成下糖分四服育神散出簡易方理心氣不寧乆年不愈虚弱多驚神色昏憒怔忪健忘言語無節有類癲邪心志不定飲食無味小便白濁赤石脂别研細臨時入白茯苓去皮防風去蘆人參去蘆白术紅芍藥各等分逺志去心紫苑茸桂心去皮不見火臨時入各等分右為末毎服二錢水一盞薑三片棗一枚煎七分食後服辰砂逺志丸出本事方安神鎮心治驚悸消風痰止頭眩補腎益志白附子生用石菖蒲去毛逺志去心白茯神去木人參麥門冬去心川芎山藥半夏麯鐵粉南星剉炒黄天麻各半兩辰砂别研北細辛各一分右為細末生薑五兩取汁入水煮糊丸菉荳大别以硃砂為衣毎服二十粒夜卧生薑湯下小兒减丸数一方治憂愁思慮痰氣潮作如醉如癡精神不守大便難小便濁頭目眩暈用藥與上方同但去天麻南星耳用水糊丸如梧子大每四十丸生薑薄荷湯下日午夜卧服名逺志平肝丸一方細辛用半兩其餘品味各一兩辰砂一兩四錢入藥六錢為衣十四友丸出冝指方補虚益血收歛心氣怔忪昏憒神志不寧眠卧不得經曰臓有所傷情有所倚則卧不安大治丈夫白濁婦人心氣不足白茯苓去皮一兩龍齒二兩研細水飛一方用龍骨當歸酒浸紫石英研細水飛人參去蘆茯神去木黄耆蜜炙栢子仁研細酸棗仁炒香别研肉桂不見火辛辣者逺志湯洗軟去心酒洒蒸一飯乆焙乾熟地黄洗阿膠蛤粉炒各一兩硃砂三錢别研右為末拌和勻煉蜜丸如桐子大硃砂為衣每服三十丸煎棗湯下食後臨卧服昔韓魏公云胡總幹言予舊有心疾怔忡健忘夢遺夜不得睡千恠萬状無所不有凡世所謂心藥者無不服之皆無效驗忽遇一良醫言此疾本由憂愁思慮耗散心血而得當用地黄當歸滋養乎血以心主血故也如更服菖蒲之類則心氣愈散今當收歛之又心本因用過已自百虚當用黄耆阿膠等補之乃選諸家方處之大覺有効始謂收歛藥用訶子予曰訶子但入膓胃不如龍齒肉桂大行血亦欲以行諸藥渾同無害也常以此傳人無不效者此十四物吾之益友故名十四友丸其言極有理茯苓補心湯出三因方治心虚寒病苦悸恐不樂心腹痛難以言心寒恍惚喜悲愁恚怒衂血面黄煩悶五心熱渇獨語不覺咽喉痛舌本强冷汗出善忘恐走及治婦人懐姙惡阻吐嘔眩暈四肢怠惰全不納食白茯苓人參去蘆前胡半夏湯洗七次去滑川芎各三錢橘皮枳殻去瓤麩炒紫蘓桔梗甘草炙乾薑各半兩當歸一兩三錢白芍藥二兩熟地黄一兩半右剉散毎服四錢以水盞半薑五片棗一枚煎七分去滓食前服一方用甘葛無乾薑平補鎮心丹出永類鈴方治丈夫婦人心氣不足志意不定神情恍惚夜多異夢忪悸煩欝及腎氣傷敗血少氣多四肢倦怠足脛酸疼腫卧不穏夢寐遺精時有白濁漸至羸弱酸棗仁去皮隔紙炒二錢半白茯苓去皮五味子去枝梗肉桂去粗皮不見火麥門冬去心茯神去皮木車前子去土研破各一兩二錢半天門冬去心龍齒熟地黄洗净蒸山藥各一兩半人參去蘆半兩硃砂細研為末半兩逺志去心甘草炙兩半右為末煉蜜丸如桐子大每服三十丸空心飯飲下温酒亦得加至五十丸常服益精髓飬氣血恱色駐顔此方有五味子白茯苓車前子肉桂人參酸棗仁非惟可以治心氣不足而白濁消渇尤為切要之藥局方無此六味却有生地黄苦梗栢子仁石菖蒲當歸只冝治心氣不足腎氣傷敗血少氣多耳一方無甘草紫石英散出聖惠方治心氣不足虚悸恐畏悲思恍惚心神不安惕惕而驚紫石英細研水飛菖蒲白茯苓去木白术黄耆剉各一兩逺志去心赤小荳炒熟附子炮去皮臍桂心人參去蘆頭亁薑炮防風去蘆頭龍骨細研熟地黄各半兩右為細散每於食前以温酒調下二錢定心湯出三因方理心氣不足榮血衰少精神恍惚夢中失精人參去蘆白茯苓去皮茯神去木黄耆蜜炙焙各三兩白术赤石脂研川芎厚朴薑炒各二两官桂去皮一兩紫苑茸二兩麥門冬去心一兩半甘草炙一兩防風一兩右㕮咀每服三錢水一盞赤小荳七十粒煎七分食後服分氣補心湯治心氣欝結忪悸噎悶四肢浮腫上氣喘急大腹皮炒香附去毛炒白茯苓桔梗各一兩木通甘草炙川芎前胡去苗青橘炒枳殻麩炒去瓤白术各三錢細辛去苗木香各半兩右剉散每四錢用水一盞薑三片棗一枚煎七分去滓食前服山茱莄丸治心氣不足山茱莄杜仲去粗皮炒茯神去木枳殻去瓤麸炒甘草炙貝母去心炒天門冬去心焙各一兩白茯苓去皮麥門冬去心焙各一兩三錢生乾地黄洗切焙百部各二兩防風去义一兩半逺志去心半兩右為末煉蜜丸如彈子大毎服一丸食後細嚼麥冬湯下熟乾地黄散出聖惠方治心氣不足㤿㤿惚惚朝瘥暮甚驚悸心中憧憧胷滿不下食飲隂陽氣虚脾胃不磨不欲聞人聲熟地黄當歸剉㣲炒龍骨人參去蘆頭甘草炙㣲赤剉桔梗去蘆頭桂心茯神枳殻炒各一兩半夏湯洗七次去滑三錢黄耆二兩逺志去心白术各半兩右為散每服三錢水一盞生薑半分棗三枚白粳米五十粒煎六分去滓不拘時温服忌炙煿熱麵補心丸出醫方大成治憂愁思慮過度心血虚寒悸忪不樂舌强話難恍惚喜忘愁恚面黄多忤不進飲食紫石英火煆研細熟地黄洗菖蒲茯神去木當歸去蘆附子炮去皮臍黄耆去蘆逺志去心炒川芎桂心不見火龍齒各一兩人參半兩右為末煉蜜丸如桐子大每服七十丸不拘時以棗子湯下龍齒湯出直指方治理心下怔忡常懐憂慮神思多驚如墮險地小便或赤或濁官桂二兩半半夏二兩湯炮人