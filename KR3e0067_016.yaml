豆三十粒煎至八分去滓食後温服杏仁丸治心虚神氣不寧舉動多驚睡卧不安杏仁一斗湯浸去皮尖雙仁用童子小便三斗煮一日以好酒二升淘洗然後爛研如膏再以清酒三斗并地黄汁三升和杏仁膏銀石器内重湯煮一復時稀稠如膏為度盛瓶噐蜜封口逺志一兩去心焙乾茯苓去粗皮菖蒲各二兩麥門冬去心黄連各一兩右除杏膏外𢷬羅為末入前膏和為丸如梧桐子大每服三十丸人參湯下淡竹茹湯出危氏方治心虛煩悶頭痛短氣内熱不觧心中悶亂及婦人産後心虛驚悸煩悶甚至欲絶者方論中之所謂心虛煩悶是也大扺隂虚生内熱陽盛生外熱外熱則曰燥内熱則曰煩此不分而分也傷寒大病不復常霍亂吐㵼之後皆使人心虚煩悶婦人産蓐多有此病其證内煩身不覺熱頭目昏疼口乾咽燥不渇清清不寐皆虚煩也方例有虚煩近傷寒之說不可不辨又平人自汗小便頻併遺㵼白濁皆憂煩過度之所致傷寒屬外因憂煩屬内因霍亂兼乎内外因學者當辨析而調治麥門冬去心小麥各二兩半甘草炙一兩人參白茯苓各一兩半半夏湯洗七次二兩右為散每服四錢用水二盞薑七片棗三枚淡竹茹一團如指大煎七分去滓食前服虚勞煩悶尤宜服之硃砂安神丸治心神煩亂怔忪不安兀兀欲吐胷中氣亂而熱有似懊憹之状皆膈上血中伏火蒸蒸而不安宜從權衡法以鎮隂火之浮行以飬上焦原氣方見脾臓門飲食勞倦類茯苓菖蒲丸治心氣不足茯苓去黒皮菖蒲逺志去心各一兩茯神去邊二兩赤小豆半兩右為末用炊餅浸稀丸如菉豆大毎服三十丸至五十丸食後熟水下菖蒲散開心益智菖蒲三錢逺志去心一兩二分蒲黄白茯苓去黒皮龍骨碎研各一兩右為末毎服一錢平旦以新水調服此藥宜以開日為始服定志小丸出千金方治心氣不定五臓不足甚者憂愁悲傷不樂忽忽善忘朝差暮劇暮瘥朝發狂眩者菖蒲逺志各二兩茯苓白者人參各三兩右為末蜜丸如梧桐子大飲服七丸日三加茯神謂之茯神丸服之亦佳一方硃砂為衣一方為末飲服方寸七日三治好忘名開心散引神歸舍丹出永類鈐方治心氣亦治心風大天南星厚去皮取心秤一兩生用附子一箇重七錢以上者去皮臍硃砂一兩水飛右為末用猪心血為丸如梧桐子大如不稠粘入麵糊少許煎忘憂草根湯下子午之交各一服每服十五丸神效香參散百一選方治心氣育神養氣新羅人參剉薄片秤半兩濕紙裹煨大北棗三枚以丁香三七粒納其中濕紙裹煨生薑指大一塊切作二片以青鹽少許納其中濕紙裹煨右㕮咀以水一升於銀石噐内慢火熬成一盞以下睡覺煩悶時頓服若常服則毎料可作数劑道寧蘓先生仁仲戊子年心氣大作服此而愈歸神丹余居士選奇方治一切驚憂思慮或夢思恍惚作事多忘心氣不足癲癎狂亂悉皆治之顆塊硃砂二兩豶猪心二個燈心三兩右将猪心切開入硃砂燈心在内麻線繫合於銀器内煮一復時取出不用猪心及燈心只将硃砂研極細用眞茯神末二兩酒煮薄糊和硃砂為丸如梧桐子大每服九丸至十五丸加至二十一丸用去心麥門冬煎湯下癲癎至甚者乳香人參湯下夜寢不寐或多亂夢炒酸棗仁湯下玉匱丸澹寮方治心氣不足大補心腎大木𤓰一箇去皮瓤作竅入附子在内湏留葢子葢之竹釘簽定蒸熟取去竹丁大附子一箇七八錢重者湯浸去黒皮臍作竅子辰砂一兩研入附子竅内不盡者留个木𤓰内補葢附子右一法用人參切片砌定附子於木𤓰内又用白磁碗盛木𤓰於甑内蒸一七日放於砂鉢内爛研如糊次入乾茯神末拌和丸如梧桐子大每服二十丸人參湯下温酒亦可雄硃丸出簡易方治丈夫婦人因驚憂失心或思慮過多氣結不散積成痰涎留伏心包窒塞心竅以致狂言妄語叫呼奔走顆塊硃砂一分研白附子一錢為末雄黄明净者一分研右和勻以猪心血和丸如梧桐子大别以硃砂為衣每服三粒用人參菖蒲煎湯下常服一粒能安魂定魄補心益氣人參湯治心臓虚煩恍惚多忘神思不寧人參半兩逺志去心石菖蒲各一兩右𢷬篩每服三錢水一盞生薑三片薄荷三葉煎至七分去滓温服不拘時茸硃丹治心虚血少神志不寧驚惕恍惚夜多異夢睡卧不安鹿茸去毛酒蒸一兩硃砂半兩細研水飛蜜炒尤佳右為末煮大棗肉為丸如梧桐子大每服四十丸炒酸棗仁煎湯送下午前臨卧服治夏月心脉弱出經驗濟時方人參去蘆白茯苓去黒皮各焙乾等分右為末每服二錢用白湯㸃半盞不拘時服治心氣不足出經驗良方老人虛人及用心過度者心脉虛弱而心恙並宜服之用大附子一箇去皮臍切作片子疎絹袋盛用生地黄自然汁一大升銀石器中慢火熬候地黄汁将盡取出附子㬠乾為末再入地黄餘汁研成劑丸如菉豆大每服三十丸米飲下病二三十年者只兩箇附子可效三二年者一箇附子可効治心氣虛損出醫方大成崑山神濟大師方獻張魏公丞相韓子常知府閣中服之有效用猪腰子一雙用水兩碗煮至一盞半将腰子細切入人參半兩當歸上去蘆頭下去細者取中叚半兩並切同煎至八分喫腰子以汁送下有喫不盡腰子同二味滓焙乾為末山藥糊丸如梧桐子大毎服三五十丸米飲熟水下多服為佳平江醫者丁御幹為葛樞宻云此藥本治心氣怔忡而自汗者不過一二服即愈葢竒方也乳硃砂百一選方治一切心氣用硃砂一兩有墻壁透明者方可用以石韋葉裹之以布線縳定用人乳汁一小甌入銀盆内覆之重湯内煮候乳汁乾研細為丸如桐子大空心温酒下六丸石韋葉當以新布拭去毛方可用軟硃砂法百一選方補心氣輕健手足及治廢忘用顆塊有墻壁辰砂一兩研如粉以好清麻油四兩白芨二兩木通一兩於油内煎令焦黄濾去滓候油令㣲温於磁器内和辰砂末令如糍糕以皂角和水洗去油却用新汲水洗去皂角漿於磁合内以新水飬之每日早辰換水空心就舌上丸七粒如梧桐子大若用一匙頭許以温酒化下亦得有人病心虚每見垂掛動之物輙惡之服此遂愈蜜陀僧散出真指方治驚氣入心絡喑不能言語用蜜陀僧研極細如粉以茶清調服一錢七一服即愈昔有人為狼及惡蛇所驚皆以此藥療而愈田師中太尉祕方亦治暗風蜜陀僧大如兩指者一塊以鉄線宻纒留鉄線一條懸空掛之四邊以火煆令通紅酒一升醋一升合和淬藥取酒醋盡為度出火毒一宿研令細極每服一錢麝香酒調下吐涎不妨一方治大驚入心敗血頑痰填塞心竅喑不能言無熱者熱酒調下有熱者沸湯泡麝香調下延夀水仙丹一名軟硃砂治五臓六腑百病飬精神魂魄益氣明目通血脉止煩滿消渇治心熱多躁心虚不足夜卧不穏口苦舌乾小便白濁日夜無度色如凝脂其味或甜肢體羸痩不生肌肉或潮熱乆坐生勞倦怠乏力悉能主之乆服令人健記力康强心神安静夜卧平穏有非常之功人參木通白芨各半兩剉如豆大右用真麻油二兩入三味藥在油内用建盞盛之火上煎頻将栁枝打勻候三味藥黒焦色即去之更煎油滴水上如珠不散為度用透明朱砂不拘多少細研如粉将錬油捜成二劑用皂角水洗去油入新水中浸之逐日換水就水旋丸如菉豆大每服三丸浸朱砂水下日正午時服一服無所忌俞山人鎮心丹出衞生家寳方治憂愁思慮過傷心氣不足恍惚驚悸骨熱諸勞失精亂夢飛尸鬼疰肌痩色黄食衰倦怠心腑不利以至大恐所傷及吐血便血種種心疾悉主治之常服安神去百邪調順榮衛補飬真氣此藥性良無毒能起虚勞疾病蓯蓉一兩焙乾牛膝一兩細剉酒浸焙兎絲子一兩酒浸煮研五味子半兩㨂人參二兩去蘆頭山藥二兩鹿角霜二兩逺志二兩去心秤龍齒一兩飛黄耆半兩蜜炙茯苓二兩白者石菖蒲半兩茯神二兩同茯苓一處用栢葉裹之蒸九次右件為細末煉蜜為丸如桐子大毎服三十丸鹽米飲或酒鹽湯吞下空心服漸加至四十丸用辰砂為衣人參湯下食後服閉目良乆驚氣圓出衞生家寳方治憂愁思慮喜怒不常或因驚怕而傷心或因思慮而神損或心忪恍惚或手足不仁身熱自汗腰背引痛嗜卧少力舉動多驚飲食無味及治産後中風一切驚病代赭石一兩醋淬七次硃砂二錢别研麝香半錢茯苓一兩人參一兩去蘆頭白殭蠶半兩㣲炒蛇黄一兩火燒醋滓七次鉄粉四錢酸棗仁一兩湯浸去殻蝎稍一分去毒用逺志一兩去心五味子半兩右件各為末煉蜜為丸如鷄頭大每服一圓金銀薄荷煎湯嚼下荆芥湯化下亦得日進三五服臨卧一服不拘時候加味烏沉湯出危氏方生氣補血心腎虚損之人此服勝大建中湯人參當歸大者去蘆白术炒各二兩天台烏藥白茯苓去皮附子炮去皮臍各一兩沉香半兩肉桂去粗皮半兩右剉散每服三錢水一盞薑五片棗一枚煎空心服藿香湯出三因方治心下虚滿飲食不入時時嘔吐惙惙短氣或大病将理不復胃氣無以飬日漸羸弱藿香人參桂心桔梗木香白术各半兩茯苓半兩枇杷葉十片去毛半夏一兩湯洗用薑汁製右為散毎服五錢水二盞入炒薑絲一分煎七分去滓空心服逺志散出衛生家寳方治心氣不足白术白茯苓人參各三兩硃砂别研水飛過川芎羗活去蘆各二兩防風一兩當歸二兩洗净㬠乾白芍藥一兩熟乾地黄二兩宣粉葛一兩逺志肉一兩用生薑自然汁煑数十沸乾右除朱砂外並為細末旋入硃砂研令勻再羅過毎服二錢用燈心棗湯或温酒調下食後臨卧服定志圓出衛生家寳方治心氣不足逺志一兩去心天門冬去心茯苓麥門冬去心茯神龍骨巴㦸澤㵼辰砂各半兩右為細末煉蜜為丸如梧桐子大空心每服二十丸食後夜卧麥門冬熟水吞下人參湯尤妙鎮補丹出衛生家寳方治心氣勞傷夜間少睡常服寧心定志禹餘粮燒赤醋淬三五遍别研一兩蛇黄燒赤醋淬三遍鍋内燒之别研半兩石蓮肉一兩梗者炒去皮秤末白龍骨一兩龍齒尤妙别研紫石英一兩燒過别研代赭石三分燒過别研赤石脂一兩别研酸棗仁半兩去皮乳香一分别研辰砂一分白茯苓半兩自乳香已下三味後來方合藥者更在裁之右件為細末和勻煮棗肉為丸如梧桐子大每服二三十丸蓮心煎湯下不以時候或夜不睡以乳香暖酒服如不喫酒炒酸棗仁煎湯下亦得救命丹出衛生家寳方治心虚氣短神志不寧或多驚悸語言顚錯辰砂一兩有墻壁者細研豶猪血四兩右用水一斗同置於銀石器中用炭火煮至一升放冷别用清水蕩去猪血令净滲朱砂乾以桃膠丸如麻子大每服十丸用去心麥門冬煎湯下四五服立效紫辰丹出衛生家寳方治心氣不足硃砂半兩研酸棗仁一兩湯浸去皮炒乳香半兩研人參半兩茯苓半兩逺志肉一兩天南星半兩炮人腦子少許右為細末煉蜜為圓如梧桐子大毎服二十粒人參湯下大蓮心散出衛生家寳方治心氣不足白濁遺精等疾石蓮肉并心三兩赤茯苓一兩細辛半兩逺志一兩并苗浸去心桔梗一兩炒人參半兩白术一兩甘草三錢炙白芷半兩麥門冬一兩半青皮三錢川芎半兩右為細末每服二錢水一盞生薑三片棗子一箇煎至七分空心食前服鎮心丹出衛生家寳方治心氣之病起自憂愁思慮繁多所以先不足然後生疾也人參洗净去蘆切茯神去皮綿黄耆去蘆當歸洗净去蘆酸棗仁去皮别研菖蒲節宻者熟乾地黄栢子仁别研去膏已上各一兩肉蓯蓉半兩洗净逺志半兩去心五味子半兩硃砂六錢淘浄秤别研為衣右為細末同栢子仁一處和勻煉蜜為圓如梧桐子大硃砂為衣每服二十丸用少温酒吞下或温熟酒湯臨卧食後服瑞蓮散出衛生家寳方治心氣白濁茯苓二兩蓮肉一兩去心龍骨半兩水飛過右為末毎服二錢空心食前白湯㸃服補心丹出十便良方治心虚諸疾方乾山藥人參茯苓菖蒲各二兩乾地黄黄耆麥門冬各一兩右為末蜜丸如彈子大辰砂半兩為衣臨卧白湯化下一丸飬心丹出十便良方服之能寛神消慮令神智通明不老不忘光明硃砂一分明净乳香一分酸棗仁半兩雪白茯苓半兩右為細末以棗肉為丸如梧桐子大空心清滚水吞下十丸茯神丸出楊氏家藏方治心虚血少神不守舍多驚恍惚睡卧不寧人參茯神黄耆熟乾地黄當歸酸棗仁硃砂别研一半入藥一半為衣右件各等分為細末煉蜜丸如梧桐子大毎服三十丸煎人參湯下不拘時候人參散出楊氏家藏方治心虚四肢疼痛心神煩躁不得睡全不思食人參半兩黄耆三錢麥門冬一兩半去心甘草當歸各半兩地黄酸棗仁各一兩芍藥白术各三錢右九件為飲子毎服三錢生薑半兩棗三枚同煎随時温服之人參南星圓出朱氏集騐方治心虚因為驚氣所觸風邪乗虚而入或因氣觸或因驚觸或因㣲熱流入心經則神志昏亂涎潮手足搐搦如風之壮天南星生白附子生白茯苓天麻人參逺志肉酸棗仁炒熟右等分為細末薄荷水糊為丸如梧桐子大食後或臨卧用薑湯吞下三五十丸宜用硃砂為衣心氣散子治心虚氣不足脾乏生氣脾既受邪先診其脉氣若心脾脉俱弱即宜先服此方方見本門本類前鎮心大牛黄丸出王氏慱濟方治心臓虚風神情恍惚往往驚悸狂言妄語或似癲癎牛黄半兩眞硃琥珀硃砂麝香天竺黄石膏龍齒雄黄已上八味各一兩馬牙硝一兩鉄粉二分已上並各研如粉天門冬去心龍膽防風升麻人參黄芩甘草炙茯神去皮木菖蒲逺志去心露蜂窠秦芃知母犀角末鈎藤已上十五味各半兩川大黄一兩金箔五十片麥門冬半兩去心右件三十味各依法修製自天門冬以下至大黄𢷬為細末與前藥粉金箔銀箔同研令勻細為度煉蜜丸如桐子大每服二十丸温水下日喫三服永除病根乳香丸出王氏慱濟方治心虚有痰時多驚悸精神恍惚語澁鎮心開胃化痰治風乳香一兩細研朱砂一兩研白礬灰一兩皂莢子鈆自霜一兩研鉄引粉一兩半夏湯洗七遍日乾為末取一兩右七味為細末以薑汁煮糊丸如菉豆大每服十五丸生薑湯下驚悸語澁金銀湯下降心丹出醫方大成治心腎不交盗汗遺精及服熱藥過多上盛下虚小便赤白常服鎮心益血熟乾地黄洗焙三兩硃砂研飛半兩茯苓去皮人參各二兩當歸去蘆三兩茯神一兩肉桂去皮半兩山藥二兩天門冬去心三兩逺志甘草煮去苦骨二兩麥門冬三兩右為末煉蜜丸如桐子大每服三十丸人參湯下飬氣鎮心丹出余居士選竒方逺志去心二兩人參去蘆頭一兩辰砂一兩别研天門冬去心秤一兩石菖蒲去鬚一兩生龍骨一錢别研白茯苓去皮一兩右為細末煉蜜丸如桐子大用硃砂龍腦為衣毎服二三十丸煎人參湯食後臨卧服長樂陸慶長寺丞診脉投劑與史載之許叔㣲為伯仲其家傳方書一編載此丹云人以為補下元而使氣實杜琚謂不然先補心氣而五臓實以氣正而元氣自實也若更以藥補下元尤妙此方極飬心氣若止補元氣耗心氣非飬氣之理也中年以後宜服之此說極有理雖名醫亦少知之白术酒出千金方補心志定氣治心虚寒氣性反常心手不隨語聲冒昧其疾源厲風損心具如前方所説無窮白术切地骨皮荆實各五斗菊花三斗右四味以水二担煮取一担五斗去滓澄清取汁醸米二担用麴如常法酒熟隨能飲之常取半醉勿令至吐定神丸出楊氏家藏方治心虛氣弱神志不寧睡卧不安白茯苓去皮一兩人參去蘆頭白附子一兩炮酸棗仁一兩半炒麝香一分别研辰砂半兩别研右件為細末湯炮蒸餅為丸如菉豆金箔為衣毎服三十丸煎人參湯送下食後臨卧服四味補心丸出楊氏家藏方益血補心安神定志治怔忪驚悸恍惚健忘當歸酒洗焙乾二兩硃砂一兩别研肉蓯蓉酒浸一宿乾二兩杏仁一百五十箇湯炮去皮研成膏右件為細末以杏仁膏同和如乾以浸藥酒煮薄糊添和杵千餘下丸如菉豆大每服三十丸用米飲或温酒下不拘時候治心虛風邪精神恍惚健忘出本草以經使鏵鉄四斤於炭火内燒令通赤投於醋中如此七徧即堪打碎如碁子大以水二斗浸經七日夜每於食後服一小盞潤心肺出本草以丹砂服之蒲黄出本草觧心臓虚熱以蒲黄水調為膏擘為塊食之寧心志清神出本草以石蓮子取其肉於砂盆中乾擦之去浮上赤色留青心為末入龍腦湯㸃服治五臓邪氣厭榖者及治脾腸澼大渇熱中暴疾出本草以邪蒿煮令熟和醤醋食之煮硃砂法出楊氏家藏方茯苓一兩人參二兩醋棗仁一兩以上三味先為末右以硃砂二兩生者茅香水洗浄拭乾研令極細以蜜四兩同前三味藥并研過砂衮在蜜中剪大苦竹筒一截去青皮盛在筒内用油紙裹筒口令𦂳繫之仍針劄数孔通氣匝定竹筒於釜内不得移動着黒豆一斗水半桶浸筒煮一畫夜水乾即添湯再煮取出随時以熟湯調下日一二服安神定志治心煎熱并驚悸神效普濟方卷十六
