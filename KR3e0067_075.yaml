皆上注於目然目有五輪內應五臟而骨之精為瞳人筋之精為黑睛若肝腎熱火實或上膈壅滯風邪毒氣上攻於目皆令目睛疼痛也龍木論云神瞳疼痛外障蔽眼初患時舊無根基忽然發動疼痛如錐刺瞼皮如臠炙此痛不可忍且求神童然後服藥補治臟腑不得鈎割尉烙不爾恐生翳障冝服羚羊角飲子點秦皮煎立瘥歌曰舊沒根基患忽然疼痛如錐刺不安或加針炙來相近求他神瞳不虛言痛定須還湯藥治莫教風熱更留連不須割焙并燒炙點法秦皮作散煎眼痛疼如針刺外障此眼初患之時微有頭痛目眩眼系常急夜卧澀痛泪出難開時時如針刺相似是自心臟伏毒熱氣壅滯在膈中以後漸生障翳遮滿相牽俱損如此疾狀冝服㵼心湯補肝散兼銻洗出血火針太陽穴立效歌曰忽然睛內痛如針邪熱潛藏伏在心遂使兩眸兼系處肉眗急則痛鋟鋟太隂穴內將針刺易飲宣通冝洗淋磣澀難開由瞼內按銻出血自能禁光眀散治眼痛當歸藿香五錢細辛三錢半兩頭尖一兩白芷二兩枯礬二錢半蝎稍半錢石膏一兩何首烏一兩半薄荷半兩黃連一兩半川芎半兩甘草一兩半皂莢一兩半燒存性右為細末每服一二錢臨卧茶清調服忌熱物羚羊角散治肝壅熱眼睛眼赤澀疼痛心神煩熱羚羊角屑茯神防風去蘆頭地骨各一兩石膏麥門冬一兩半焙去心黃芩甘草炙微赤銼枳殼麩炒微黃去穰蕤仁湯去赤皮犀角屑川芒硝各三分右㕮咀每服四錢以水一中盞煎至六分去滓入生地黃汁半錢更煎一兩沸每於食後溫服治睛疼難忍者白芷赤芍藥細辛防風各等分右為末每服三錢以水一盞入砂糖二錢同煎至七分去滓溫服不拘時地骨皮散治肝臟壅毒氣上攻眼睛赤澀疼痛心燥體熱地骨皮川升麻玄參甘草炙微赤銼防風去蘆頭黃芩各一兩赤茯苓桑根白皮銼各二兩羌活決眀子柴胡去苗各二兩半石膏三兩右㕮咀每服四錢以水一中盞入薑半分淡竹葉二十七片黑豆五十粒煎至六分去滓每服食後溫服玄參散治上膈壅滯風邪毒氣攻目令目睛疼痛玄參大黃銼炒各二兩半菊花決眀子車前子黃連去鬚枳殼去粗夫炒各二兩梔子仁防風去叉各一兩半苦參銼半兩升麻二兩右為細散每服三錢匕食後臨卧蜜水調下日三治目生弩肉各二兩半米飲下細辛散治目睛疼痛及腹脅滯悶由肝氣上壅細辛甘草炙黃銼各半兩川升麻丹參各三兩芎藭當歸去蘆頭赤芍藥銼黃芩去心檳榔川大黃銼炒枳殼麩炒黃色桹各一兩右為末散每服三錢匕水一盞煎至六分去滓食後溫服忌炙煿熱麵洗肝前胡湯治目睛疼痛如脫前胡升麻枳殼去瓤麩炒各二兩防風去又車前子各一兩甘菊花黃連去鬚各半兩細辛去蘆葉苦參各三兩右㕮咀每服五錢匕以水一盞半煎至七分去滓投芒硝末半錢於食後臨卧溫服旋覆花湯治風毒攻衝目睛疼痛方見本草門目赤痛類甘菊花散治諸風毒頭目睛中如針尖刺痛及欲成障翳甘菊花川升麻芎藭細辛黃連去鬚川大黃銼碎微炒各一兩防風去蘆頭甘草炙微赤銼各三分石膏二兩羚羊角屑一兩半右㕮咀每服四錢以水一中盞煎至六分去滓每於食後溫服之梔子散治上焦壅熱睛眼疼痛大小便祕澀心神煩燥不得睡卧梔子仁黃連去鬚龍膽去蘆頭赤芍藥川大黃銼碎微炒大青各一兩枳殼麩炒微黃去穰甘草炙微赤銼各三分柴胡去苖一兩半右㕮咀每服四錢以水一盞至六分去滓每於食後溫服之蔓荆實湯治目睛疼痛上連頭疼一名羌活散蔓荆實去皮甘菊花羌活去蘆頭黃芩去黑心芎藭防風去蘆各一兩石膏三兩甘草炙銼半兩右㕮咀每服四錢匕水一盞半煎至七分去滓食後臨卧溫服之羚羊角湯治目睛痛上連頭并頰骨俱痛不可忍生障泪出羚羊角鎊黃芩去黑心芎藭石膏大黃銼炒芒硝研各一兩芍藥一兩半柴胡去苗三兩右㕮咀每服三錢匕水一盞入淡竹葉十片煎至七分去滓食後臨卧溫服羚羊角飲子治神崇疼痛外障羚羊角二兩天門冬車前子人參茯苓大黃黃芩黑參各一兩右為末以水一盞散一錢煎至五分食後去滓熱服㵼心湯治眼痛如針外障大黃黃芩桔梗知母各一兩防風三兩馬兜鈴黑參各一兩半右為末以水一鍾散一錢煎至五分食後去滓溫服補肝散治眼痛如針刺外障人參茯苓五味子芎藭藁本各一兩茺蔚子細辛各一兩右為末每日空心米飲送下一錢竹葉湯治風邪攻目令目睛疼痛方見本門草目暴腫類括痛散治兩額角痛目睛時見黑花及目赤腫類脈眩欲作內障多得之於飢飽勞役柴胡一兩半甘草炙七錢半瓜蔞根二兩生地黃各一兩黃芩四兩一半銼炒皂色一半酒溫過日乾右㕮咀每服三錢水一盞半生薑三片棗一枚臨卧熱服如小便不利加茯苓澤㵼各半兩地骨皮散治目睛疼痛睡卧不安地骨皮川大黃銼炒井泉水石各二兩甘草半兩炙黃銼石膏三兩研水飛右為細末入石膏更研勻每服二錢匕食後以白米泔調下秦皮洗眼湯治目睛疼痛秦皮秦芃玄參各一兩柴胡去苗二兩甘草半兩右粗搗篩每用一兩以水三盞煎至取一盞半綿濾去滓微熱洗淋冷即再暖用如聖散治睛痛不止青黛一兩盆硝牙硝各七錢井鹽半兩片腦少許右研勻鼻內嗅少許秦皮煎治神崇疼痛外障秦皮黃耆木香黃連黑參各一兩右為細末以水一鍾浸藥三宿去滓入蜜四兩煎為膏用之一捻金方治睛眼痛乳香沒藥黃連雄黃盆硝各等分右為細末鼻內嗅之救苦散治眼睛痛不堪忍川芎當歸防風各半兩防己半兩右為細末每服二三錢熱酒調治睛疼難忍川當歸防風細辛薄荷各等分右為末麥門冬熱水調下食後半夜各一服白定眼藥定痛消腫去翳可鐵刺如無以白芨粉代之阿飛勇各一錢李子樹膠四錢白錫粉炒水飛八錢右為細末雞子清為定丹妳女兒乳汁於光磨石上磨汁無時點之吹鼻碧玉散治邪熱攻衝目睛疼痛硝石一分龍腦青黛各一錢右合研令細每用一豆許嗅兩鼻內當歸立效散涼血定眼疼痛當歸大黃各一兩乳香少許定研一錢右銼碎分作三服每服七錢以水二鍾煎至一盞半去滓溫服食後臨卧看虛實加減服之治眼痛方當歸鬚木賊蓽撥右為末以茶水調浸舌出涎二聖散治眼痛不可忍者通聖散一兩半四物湯五錢右和勻每服五錢水二盞煎至二五沸食後溫服貼藥方治眼腫痛用生薑自然汁調飛過白礬貼眼胞上痛即止治發熱眼目腫痛方用萹蓄根一握洗淨以少水絞汁服之若熱腫處搗根莖傅之良通頂抽風散治眼睛如針刺疼痛用硝石二兩以新瓷瓶內盛漸以火鎔成汁以生蘿蔔子時時投三二十粒入於硝內候煙出盡又投直候蘿蔔子硝石無聲然後慢慢去火放冷敲破瓶取出研如粉用蘿蔔子一兩去揀淨秖取半兩麝香半錢合研令細每服用半字內筆管中猛用力吹入鼻內隨左右痛處當有清涕水出其疼痛立止決眀散出永類鈐方治熱淚如湯腫痛羞眀五臟積熱腫塞不開暗疼加沒藥當歸川芎大黃黃芩木賊去節赤芍藥山梔仁菊花粉草各等分右為細末每服二錢以生地黃水煎食後服石人屏曽氏家藏川芎散出永類鈐方治眼睛疼頭痛沙澀流淚眩爛風癢障膜遮睛及治積年頭風川芎羌活防風菊花荆芥穗殭蠶洗炒撫芎蒼术製白芷石膏煆細辛淨芎鬚水洗香附炒各一兩川烏炮淮烏黑豆煮各半兩去皮尖右為細末食後茶湯清調一大錢服頭痛䓤白湯調下常服薄荷茶調羞眀加朴硝乳香散出永類鈴方治睛疼乳香沒藥青皮陳皮草烏各等分右為末茶清或清子調貼眼目上普濟方卷七十六
