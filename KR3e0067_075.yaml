五臟精華不獨專屬於肝心肺之熱毒能乘之故時氣之後臟腑餘毒未盡熏發於目或因體虛未實多食熱毒之物皆致目病輕者赤痛重者或翳暈輕者眼見黑花治法尤在慎飲食戒房室以就痊平不然湯劑交攻無益也龍木論云傷寒熱病後患眼此初患之時或因傷寒早起熱病後臟氣未全六腑餘熱未盡體虛易損飲食毒熱物過多致令患眼或見黑花瞳人開大發敬不定赤腫淚出冝鐮出瘀血服龍膽丸生犀飲子㵼肝湯切不宜點藥恐損眼也歌曰熱病傷寒可後虛因飱壅熱患雙眗睛疼一目先昏暗不久相牽左右俱紅腫必須鐮瞼內生犀飲子最能驅次服決眀丸半濟免教白暈更相瘀未冝點服緣何事却恐生瘡敗黑珠瞳子匆然開黑大舊來肝腎有風虛神方用膽點和服雙目光眀却復初若也眼前花出現三年兩載始能除痛又云天行後赤眼外障此眼初患之時忽然赤腫疼淚出若有患者或輕或重還從一眼先患以相牽俱損切冝鐮洗去瘀血後宜服㵼肝湯用洗眼湯點龍腦煎即瘥歌曰忽然赤腫痛相并天行赤眼是為名厲時熱氣相傳染體性人人有重輕㵼肝飲子應須服瞼中鐮血更如星秦皮湯洗吞丸藥不差經久翳還生忌毒也須將息治不須鈎烙恐傷睛若將痛藥強為點損敗神光實可驚已療之間何最穩多餐涼藥得平平紫眥翳膜徙消散摩之自漸愈也前胡犀角湯出聖濟總録治傷寒後兩目昏暗或生浮翳前胡去蘆頭羌活去蘆頭犀角屑菊花防風去叉細辛去苖葉甘草炙銼梔子仁麥門冬去心焙蔓荆子青箱子生乾地黃焙決眀子微炒車前子微炒各一兩黃蓍銼一兩半右搗篩每服五錢水一鍾半煎至八分去滓溫服食後日三決眀子丸出危氏方治諸般眼患因熱病後毒風攻目生翳膜遮障服此漸消退免使針刀青葙子炒防風枳殼各一兩茺蔚子細辛枸杞子澤㵼生乾地黃石決眀燒各半兩宣連半兩去鬚土當歸酒浸車前子麥門冬去心各二兩右為末煉蜜和丸如梧桐子大每服三十丸食後麥門冬煎湯送下茺蔚子丸出聖濟總録治時氣後眼暗及有翳膜茺蔚子澤㵼各一兩半枸杞青葙子生乾地黃焙枳殼去穰麩炒各一兩石決眀細辛去苗葉麥門冬去心焙車前子各二兩黃連去鬚三兩右為末煉蜜和丸如梧桐子大每服三十丸食後漿水下人參湯出聖濟總録治時氣患後起早勞發風眼赤痛人參地骨皮羚羊角搒防風去叉赤茯苓去黑心皮各三分升麻玄參黃芩去黑心各半兩決眀子微炒一兩右搗篩每服五錢水一盞半煎至八分食後臨卧各一服地膚子散出聖濟總録治時氣病後眼忽失眀地膚子草決眀微炒沙參秦皮去粗皮人參甘菊花羚羊角屑各三分枳殼去穰麩炒半兩大黃銼炒令香一兩右為末煉蜜和丸如梧桐子大漿水下三十丸臨卧再服秦皮湯出聖濟總録治時氣病後目赤痛不開昏暗秦皮去粗皮銼研黃連去鬚各一兩半梔子仁大黃銼炒細辛去苗葉蛇銜草苦竹葉鹽各一兩右為銼令碎爛如眼赤及痛每用五錢以水二盞煎取一盞濾去滓頻頻洗眼㵼肝散出龍木論治天行後赤眼外障知母黃芩桔梗各一兩半大黃黑參茺蔚子羌活細辛各一兩右為末以水一盞散子一錢煎至五分食後去滓溫服之效生犀飲子出龍木論治傷寒熱病後患眼方見本門目昏暗類㵼肝湯出龍木論治證同前石決眀川大黃車前子桔梗芒硝各一兩羚羊角防風各一兩右為末以水一盞半散子一錢煎至五分食後去滓溫服栝蔞根湯出聖濟總録治時氣病後目赤澀痛栝蔞根銼二兩茅根銼麥門冬去黑心焙黃連去鬚石膏知母焙甘草炙各一兩右搗篩每服五錢水一盞半煎至八分去滓溫服食後臨卧決眀湯出聖濟總録治時氣病後眼生翳赤痛決眀子鈎藤各一兩白牡丹皮升麻各三分羚羊角鎊芍藥大黃銼炒各一兩右搗篩每服五錢水一盞半煎至八分去滓食後臨卧溫服前胡湯出聖濟總録治時氣後服補藥過多眼忽失眀頭疼憎寒天隂即甚方見本門丹石毒上攻目類黃耆湯出聖濟總録治時氣病目暗黃耆銼人參各二分黃蘗去粗皮蜜炙當歸切焙各一兩枳殼去穰麩炒半兩黃連去鬚三分右粗搗篩每服三錢水一盞煎至六分去滓食後溫服日三龍腦煎出龍木論治天行後赤眼外障龍腦一分秦皮宣連防風細辛甘草各半兩右為末以水一大碗浸藥末三日三夜用銀銚子煎至七分以生絹濾滓去又更入蜜四兩煎至五七沸入磁瓶內盛勿冷泄氣每用點眼立效菊花防風散一名防風散出聖濟總録治時氣後餘毒不盡上攻目赤澀痛或生障翳方見本門暴赤眼類蚡鼠土膏出聖濟總録治時氣後服補藥過多致眼忽失眀兩鬢脈掣頭痛憎寒田中蚡鼠土三分木香一兩大黃銼炒五兩白蘞一兩凝水石六兩右為末用酒和調如稠餳當痛掣處大如手掌許傅之乾即易不住頻頻貼痛處即止一方攤於帛上貼之葛根湯出聖濟總録治時氣病後客熱暴躁目赤澀痛冷淚壯熱葛根銼車前子各三分地骨皮薺苨生切烙各一兩甘草炙半兩右粗搗篩每服五錢以水一鍾半入竹葉十片煎至八分去滓食後臨卧溫服大黃湯聖濟總録方治時氣病後風毒眼熱痛右搗篩每服五錢以水一鍾半煎至八分去滓食後溫服得利即止洗眼湯出龍木論治天行後赤眼外障秦皮甘草細辛黃芩各一兩防風一兩半右為散以水三盞散三錢煎至一盞半熱洗一日兩度用之立效大黃銼炒二兩枳殼去穰麩炒黃芩去黑心菊花梔子仁此藥是大黃湯內之數竹葉湯出聖惠方治時氣病後目赤澀痛黃芩去黑心黃連去鬚各一兩升麻一兩半甘草炙半兩右粗搗篩每服五錢以水一盞半入竹葉十片煎至八分去滓入芒硝半錢須溫服如人行五里再服通利即止黃連湯出聖濟總録治時氣病後目赤痛黃連去鬚四兩芍藥二兩黃連去黑心秦皮去苗各