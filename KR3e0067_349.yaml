body:
  text: 普濟方卷三百四十九明周王朱橚撰産後諸疾門産後惡血衝心附論夫産後氣血挾於寒寒搏於血血則凝滯不消逆上者血隨氣上搶擊於心也凡産後餘血不盡因虛冷則留結與氣相搏必痛若遇久寒者血結彌甚則變成血瘕致令月水否澀不通也又云餘血奔心蓋是分娩了不即與童子小便以逐瘀血及卧太速兼食不相宜之物所致但能依方療之無不痊可方治産後敗血衝心發熱狂言奔走脈大虛者方出拔萃方乾荷葉生地黃乾牡丹皮等分右濃煎湯調生蒲黃二錢一服即定四物湯加柴胡小柴胡加生乾地黃等分煎服亦可捲荷散出醫方大成治産後血上衝心血刺血暈氣血腹痛惡露不盡初出荷捲紅花當歸各一兩蒲黃細炒丹皮各半兩右為細末每服二錢半空心溫酒送下一方內只使童子小便調如才産後便服此藥即諸疾不生荷葉散療産後七日內宿血不散時時衝心迷悶不識人荷葉六分延胡索八分地黃汁二合右水二升煮三味取八合下延胡索空心三服忌肉食一日療産後餘血攻心或下血不止心悶面青冷氣欲絶出肘後方當歸桂心川芎吳茱茰橘皮生薑各二兩芍藥三兩右㕮咀以水三升煮取一升去滓空心服治産後餘血攻心出大全良方用陳白梅捶碎濃煎湯服金黃散出大全良方治産後惡血衝心時發躁延胡索一兩蒲黃半兩桂心一分右為細末烏梅煎湯冷調下一錢生地黃湯出大全良方治産後餘血奔心煩悶不知便與童子小便以逐瘀血及睡太疾兼食不宜食之物生地黃川芎一兩枳殼芍藥半兩右為末酒服方寸匕日三服赤鯉魚鱗二兩燒灰虻蟲半兩微炒黃去翅足狗膽半兩乾者蒲黃半兩亂髮二兩燒灰麝香二兩細研右同研令細不計時候煎生薑湯童子小便調下一錢麒麟竭出聖惠方治産後惡血衝心痛氣欲絶麒麟竭二兩沒藥一兩木香一兩代赭半兩麝香半兩細研右搗細羅為散每服煎當歸酒調下二錢如人行五七里候再服當下惡神效沒藥散治産後惡血衝心悶絶疼痛不可忍沒藥麒麟竭當歸銼微炒芫花炒灰薑黃金羅蓽凌霄花已上各半兩麝香一錢細研狗膽二枚乾者右為散入研了藥令勻以醋煮麵糊和為丸如梧桐子大不計時候以溫酒調下芫花丸出聖惠方治産後惡血衝眼前黑暗或生寒熱或時狂語或腹痛不可忍芫花香墨釜下墨當歸切微炒薑黃葳靈仙已上各一兩砒黃半兩右搗羅為末生薑汁一盞醋一盞同煎熬藥為膏入神麯末半兩和為丸如菉豆大不計時候煎當歸酒化下七丸治産後惡血衝心迷悶出聖惠方生地黃汁半中盞凌霄根汁半中盞檳榔二枚銼羚羊角屑半兩右相和煎至七沸入酒三合分三服溫服又方出聖惠方羚羊角一兩燒灰麝香一錢右相和細研為散不計時候以熱酒調下一錢又方出聖惠方黑豆二合釅醋一大盞右煎醋令極沸然後投入黑豆煎三兩沸便濾出每服用半合或入前湯一合相合溫服血暈者服亦效又方出聖惠方雞子一枚米泔一合醋二合右先煎醋及泔三兩沸入雞子攪令勻不計時候服半合地黃飲子出聖惠方治産後惡血衝悶亂口乾生地黃汁三合藕汁三合童子小便三合右相和煎三兩沸分溫二服益母散出聖惠方治産後惡血衝心煩悶多渴益母草乾藕節紅花子各一兩右搗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時溫服療産後惡血衝心或胞衣不下腹中血塊等疾一名備急方出大全良方用大黃一兩為末以好醋半斤熬成膏以藥末搜膏為丸如梧子大溫醋湯吞五丸良久取下惡物不可多服亦治馬墜內損者及惡血不散服之神效此藥難用大假虛弱不可服調藥醋不宜太酸恐傷肺臟兩家醫者斟酌澤蘭散治産後因驚敗血衝心昏悶發狂如有鬼祟凡産前後諸病通治澤蘭葉石膏研各二兩白茯苓卷柏柏子微炒别研防風厚朴製細辛淨桔梗吳茱茰炮炒各一兩人參藁本乾薑炮五味子白芷白薇半兩川椒閉口者炒出汁黃耆川烏炮丹參各三分蕪荑微炒赤當歸銼甘草炙川芎芍藥各一兩三分生乾地黃一兩半肉桂一兩一分阿膠半兩炒右為細末每服二錢空心臨卧熱酒調下加辰砂一字煎酸棗湯調一服安血竭散治産後敗血衝心胸滿氣喘命在須臾宜服此真血竭研右細末三錢溫酒調服病勢危篤者盡二兩可活凡産後敗血衝心皆因惡露不下始則胸中微滿動加喘急者為難治産後所寶諸方無如此藥神速宜久畜之以備急用膏蜜湯主産後餘血衝心痛急欲死方豬膏二升白蜜生地黃切各一升右膏煎地黃赤色出之內蜜和之令調分五服日三紫金丹治産後衝脹胸中有物狀似噎氣不降代赭石􅀈礰石各等分右為細末醋糊丸如桐子大每服三五十丸酒下胸中痛加當歸煎湯下久服治血癖又方代赭石桃仁三錢炒去皮尖大黃五錢右為末薄荷水為糊丸如桐子大每服三五十丸溫水下無時治産後血悶欲絶以烏芋搗汁服之治産後血上摶心悶絶疼痛以生地黃搗汁飲之治卒惡血欲死以雞蘇一升煮服之産後積聚癥塊積聚癥塊夫積者隂氣也五臟所生聚者陽氣也六腑所成皆由飲食不節寒熱不調致五臟之氣積六腑之氣聚積者痛不離其部聚者其痛無有常處所以然者積為陰氣陰性沉伏故痛不離其部聚為陽氣浮動故痛無常處産後血氣傷於臟腑虛弱為風冷所秉搏於臟腑與血氣相結故成聚積癥塊也方桃仁散治産後餘血不散結成癥塊疼痛桃仁當歸鬼箭羽大黃鱉甲各一兩赤芍藥延胡索琥珀各三分川芎桂心各半兩右為粗末每服三大錢水一盞薑三片煎至七分去滓溫服京三稜散治産後積血不散結聚成塊或時寒熱不思飲食京三稜熟地黃鱉甲各一兩桂心當歸桃仁三分川芎牡丹皮劉寄奴赤芍藥各半兩大黃炒牛膝三分右為粗末每服三錢水一大盞薑黃三片煎至七分候去滓溫服桂心丸出聖惠方治産後血氣不散積聚成塊上攻心腹或成寒熱四肢羸瘦煩痛不思飲食青皮乾漆炒煙出各三分沒藥檳榔當歸桂心赤芍藥牡丹皮各半兩大黃炒桃仁鱉甲厚朴三稜延胡索各一兩右為細末入臼中細研以好醋煮麵糊為丸如梧桐子大溫酒下三十九硃砂丸出大全良方治産後虛中有積結成諸疾黑附子桂心白薑各半兩巴豆一錢醋浸煮去皮尖右為細末入巴豆研停醋煮麵糊丸如麻子每服三丸或至五丸冷茶下服之取㵼為度産後血氣不通當時不甚覺如再産出血少皆成癥結心腹痛硬乍寒乍熱餘氣不進不生肌肉心腹有時刺痛口乾粘手足沉重有狀熱者宜服此方出大全良方當歸芍藥甘草牛膝鬼箭羽人參各三分牡丹皮虎杖白术各六分大黃水蛭炒蒲黃各三分虻蟲十四枚製乾地黃七分朴硝一分烏梅肉炒白薇桂心各四分右為末煉蜜丸如桐子大空心酒服二十丸日兩服外臺有赤石脂十分禹餘糧丸出聖惠方治婦人産後積冷堅癖禹餘糧烏賊骨吳茱茰各三兩半當歸白术細辛乾地黃人參芍藥芎藭前胡各一兩去須􅂒蟲一兩桂心蜀椒各二兩半右為末煉蜜丸桐子大每服二十丸空心溫酒送下二十丸日三不知則加之五加皮酒治産後癖瘦五加皮一斤枸杞子一升蛇床子一升杜仲炒一升亂麻半斤乾地黃丹參各二兩乾薑三兩天門冬四兩右㕮咀以絹袋子盛酒三斗積三宿一服日再稍加至十合住鱉甲散出聖惠方治産後小腹內惡血積聚成塊堅硬疼痛脹滿鱉甲一兩塗醋炙令黃去裙襴桃仁一兩湯浸去皮尖雙仁麩炒微黃川大黃三兩銼碎醋拌炒乾吳茱茰一分湯浸七遍焙乾微炒桂心一兩鬼箭羽一兩牛膝一兩去苗當歸一兩銼微炒菴䕡子一兩右為散每服三錢水酒各半中盞入生薑片半分同煎至六分去滓食前稍熱服水蛭散出聖惠方治産後惡血不盡月經日久不通漸成癥塊臍腹脹硬時時疼痛水蛭八十枚炒令黃虻蟲八十枚去翅足微炒牛膝一兩去苗牡丹皮半兩桃仁三分湯浸去皮尖麩炒微黃菴䕡子一兩鱉甲一兩塗醋炙令黃去裙襴桂心半兩當歸一兩銼微炒乾漆一兩搗碎炒令煙出鬼箭羽三分琥珀三分吳茱茰半兩湯浸七遍乾微炒麝香一分研入右為散入研了藥令勻每服食前以溫酒調下一錢木香丸出聖惠方治産後惡血不散積聚成塊在臍腹下堅硬疼痛木香半兩京三稜一兩微煨檳榔一兩桂心半兩水蛭一分微炒令黃附子一兩炮製去皮臍沒藥半兩阿魏半兩麵褁煨麵熟為度芎藭半兩桃仁一兩湯浸去皮尖雙仁麩炒微黃鱉甲一兩塗醋炙令黃去裙襴牡丹半兩虻蟲一分去翅足微炒當歸銼微炒半兩赤芍藥半兩碙砂半兩細研川大黃一兩半銼碎微炒乾漆一兩搗碎微炒令煙出右為末煉蜜和搗五七百杵為丸如梧桐子大每服溫酒調下二十丸日三四服鱉甲丸出聖惠方治産後積聚按之躍手食飲無味肌膚萎黃不耐勞苦嘔逆上氣月水閉塞鱉甲一兩半塗醋炙令黃去裙襴川大黃一兩炒赤芍藥半兩乾漆一兩搗碎炒煙出乾熟地黃芎藭半兩延胡索半兩桂心半兩牡丹半兩蠐螬十四枚微炒虻蟲十四枚微炒水蛭一分炒令黃當歸三分銼微炒乾薑半兩炮製銼右為末煉蜜和搗三五百杵丸如梧桐子大每於食前以溫酒調下十丸桃仁煎出聖惠方治産後惡血結成癥塊羸瘦無力桃仁四十九枚湯浸去皮尖雙仁研入膏生地黃汁二升生牛膝汁一升白蜜五兩已上四味同於石鍋中慢火熬如稀餳鱉甲一兩半塗醋炙令黃去裙襴京三稜一兩微煨銼當歸一兩微炒銼延胡索一兩乾漆一兩搗碎炒令黃去裙襴芫花半兩醋拌炒乾檳榔一兩水蛭四十九枚炒令黃虻蟲四十九枚去翅足微炒川大黃一兩銼碎微炒桂心一兩琥珀一兩右為末入前煎中溲和搗三二百杵為丸如梧桐子大每服食前以溫酒下二十丸乾漆丸出聖惠方治産後惡血不散結成癥塊經脈不利乾漆一兩搗碎炒令出煙牡丹皮三分赤芍藥一兩蠐螬十五枚微炒琥珀一兩桃仁一兩湯浸去皮尖雙麩炒微黃牛膝一兩去苗桂心三分吳茱茰一分湯浸七遍炒川大黃一兩銼微炒虻蟲十五枚去翅足微炒水蛭三十枚炒令黃菴䕡子一兩亂髮灰一錢磨蟲三十五枚微炒大麻仁半兩鱉甲一兩塗醋炙令黃去裙襴右為末煉蜜和丸如梧桐子大每服空心以溫酒下芫花散出聖惠方治産後腹中有癥塊疼痛不可忍芫花一兩醋拌炒乾川烏頭一兩炮製去皮臍木香一兩蓬莪茂一兩乾薑一兩炮製銼劉寄奴半兩桂心一兩當歸一兩銼炒沒藥一兩右為末先以米醋五升於銀鍋中煎如稀餳後下藥搗三二百杵丸如菉豆大每服以溫酒下十丸琥珀丸出聖惠方治産後惡血不散積聚成塊琥珀一兩赤芍藥一兩桂心一兩當歸一兩銼微炒碙砂一兩細研乾漆二兩搗碎炒令煙出虻蟲三分去翅足微炒水蛭三分炒令黃鱉甲一兩塗醋炙令黃去裙襴桃仁三兩湯浸去皮尖雙仁麩炒微黃大黃一兩半右為細末煉蜜和搗三四百杵為丸如梧桐子大每服空心及晚食前以溫酒下二十丸碙砂丸出聖惠方治産後聚積癥塊疼痛碙砂五兩望淨夥挑者以固濟了瓷瓶一用用獨掃灰內瓶子中可一半安碙砂在中心又以灰三之後蓋瓶口以武文火斷令通赤待冷取出細研如粉桂心半兩麝香一分細研川大黃半兩銼碎微炒乾薑一分炮製銼當歸半兩銼微炒芫花半兩醋拌炒乾右為末入研了藥令勻以酒煮蒸餅和為丸如菉豆大每服空心以酒下五丸不飲酒荆芥湯下亦得三稜丸出聖惠方治産後癥塊京三稜一兩微煨銼木香半兩碙砂三分細研芫花半兩醋拌炒乾巴豆一分去心皮挼褁壓出油右為末研入前件碙砂巴豆勻以米醋二升熬令減半下諸藥慢火熬冷調可