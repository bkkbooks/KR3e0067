往來頭疼體痛口苦舌燥桂去粗皮芍藥剉厚朴去粗皮塗生姜汁炙柴胡去苗桔梗剉炒紫花去土焙乾髙良姜乾姜炮製白蕪荑炒陳橘皮湯浸去白用鼈甲去裙襴醋浸炙各半兩草荳䓻三枚去皮右搗羅為散每服用獖猪肝十片炙熟乘熱拌和藥旋旋嚼服温酒下日三柴胡人參湯治産後失於將理血虚損日漸困瘁少寒多熱煩渇嗽逆痰壅減食柴胡去苖人參生乾地黄焙各三分桔梗剉炒紫花去苗土知母桑根白皮枳殻去穰麩炒令黄赤芍藥桂去皮當歸㣲炒各半兩附子大黄一枚炮製去皮臍右剉如麻豆每服三錢水一盞生姜三片棗一枚擘破同煎候至七分去滓溫服不拘時茯苓丸治産後蓐勞寒熱羸痩骨節痠痛白茯苓去黑皮肉蓯蓉酒浸切焙熟乾地黄焙各一兩半當歸切炒枳殻去穰麩炒桑上寄生剉炒延胡索粳米炒半熟各一兩右為末煉蜜為丸梧桐子大毎服二十丸温酒或米飲下不拘時服猪腎湯治産後蓐勞寒熱體痛力乏痩黑猪腎一雙切黄耆剉碎人參芍藥剉碎炒各一兩半芎藭一兩桂去粗皮三分當歸剉炒令香一兩熟乾地黄剉碎炒各一兩半右除腎外搗為麄末每服二錢水二盞先煮猪腎取一盞去腎再入藥末生姜三片棗一枚擘破同煎七分去滓溫服不拘時茈胡湯治産後蓐勞寒熱日漸痩損茈胡去苗剉一兩甘草炙剉人參白茯苓去黑皮當歸切焙赤芍藥剉枳殻去穰麩炒厚朴去粗皮塗生姜汁炙各三兩黄耆三分右搗粗篩每服三錢水一盞半先煮猪腎一隻取汁一盞用去腎再入藥并生姜三片葱白三寸同煎至七分去滓溫服不拘時熟乾地黄湯治産後蓐勞寒熱瘁痩熟乾地黄焙一兩半麥門冬去心炒當歸切焙人參牛膝去苗剉白术剉炒各一兩淡竹葉一兩右粗搗篩每服三錢水一盞煎七分去滓温服不拘時候黄耆湯治産後蓐勞肌痩煩悶喘急多汗倦怠少力黄耆剉碎芍藥剉碎枳殻去皮穰麩炒牡蠣粉各一兩羚羊角屑半兩右粗搗篩每服二錢水一盞半猪脂一枚去筋膜用生姜五片同煎七分去滓溫服不拘時黄耆炙散出聖恵方治産後蓐勞肌肉枯痩面無顔色或寒或熱四肢痠痛心煩黄耆剉鼈甲去裙襴醋炙黄各一兩當歸剉㣲炒桑寄生桂去粗皮白茯苓去黑皮白芍藥人參麥門冬去心焙熟乾地黄焙牛膝去苗酒浸切焙甘草炙各半兩右為細散每服用猪腎一具切去脂膜先以水一盞半將生姜三片棗三枚擘煎至一盞去滓并腎却下藥三錢再煎至七分候空心食前溫服二滓並煎服芍藥湯治産後蓐勞疼痛寒熱頭旋眼昏精神恍惚睡多驚恐盜汗腹痛大便不利赤芍藥芎藭牡丹皮𤣥參當歸切焙人參五味子麥門冬去心焙白茯苓白薇甘草炙剉各一兩熟地黄二兩右粗搗篩每服五錢水一盞半煎至八分去滓溫服不拘時候猪腎湯治産後蓐勞似瘧寒熱不能食猪腎一枚去脂膜粳米淘二合知母焙三分當歸剉焙一分半葱白五莖芍藥三分右除腎并米外剉如麻子豆大以水六盞先煎猪腎至七八沸内諸藥煎取四盞去滓下粳米煮熟去米空心服分三服如行人五六里服訖卧良久乾地黄丸治産後蓐勞寒熱體虚羸痩不思飲食熟乾地黄焙人參鼈甲醋炙去裙襴肉蓯蓉酒浸切焙各兩白术炒續斷桂去粗皮附子炮製去皮臍牛膝酒浸切焙五味子當歸切焙各三分茯苓去黑皮半兩黄耆剉一兩半右為末研匀煉蜜和丸如桐子大每服十五丸溫酒化下不拘時白薇丸治産後蓐勞寒熱時作四體羸弱飲食無味白薇栢子仁研附子炮製去皮臍鼈甲醋炙去裙襴當歸切焙黄耆剉各一兩人參桂去粗皮石斛去根芍藥炒牡丹皮𦍑活去蘆頭各三分熟乾地黄焙甘草炙剉肉蓯蓉酒浸切焙一兩一分芎藭各半兩右為末研細煉蜜和丸如梧桐子大每服二十丸溫米飲化下不拘時澤蘭丸治産後蓐勞補虚損益血氣澤蘭一兩半防風去皮附子炮製去皮臍當歸切焙白术桂去粗皮芎藭栢子仁熟乾地黄焙石斛去根兩各一厚朴去粗皮姜汁炙甘草炙剉細辛去苗葉各半兩人參乾姜炮牛膝酒浸切焙肉蓯蓉酒浸切焙白芷黄耆續斷各三分桃仁去皮尖雙炒四兩右為末研匀煉蜜和丸如梧桐子大每服三十丸空心温酒下白术散治産後蓐勞虚羸發歇寒熱心腹疼痛四肢無力不思飲食白术一兩木香半兩熟乾地黄一兩乾姜半兩炮製白芍藥三分芎藭桃仁半兩湯浸去皮尖雙仁麩炒㣲黄人參三分去蘆頭桂心半兩黄耆三分剉當歸三分剉㣲炒白茯苓三分右粗搗羅為散每服四錢以水一中盞入生姜半分棗二枚同煎至六分去滓稍熱服一日三四服猪腎湯治産後體虚乍寒乍熱其狀如瘧名曰蓐勞宜服猪腎一對切去脂膜香豉半兩白粳米半兩葱白七寸切桂心半兩薤白三莖切生姜一分切白芍藥一兩人參一兩去蘆白术三分當歸一兩剉㣲炒黄耆三分去蘆頭大棗四枚擘破已前六味都以水二盞煎至一盞去滓同煎後藥腎􅅹湯治産後蓐勞心神煩熱頭痛口乾身體或寒或熱獖猪腎一對切去脂膜豉半兩大棗四枚擘破生姜一兩切葱白二莖以上五味用水一盞半煎至一盞去滓用煎後藥乾熟地黄焙一兩桂心半兩白术半兩麥門冬一兩半去心焙當歸半兩剉㣲炒黄耆半兩右搗粗羅為散每服半兩入前藥汁煎至七分去滓食前分温二服地黄丸治産後蓐勞虚羸氣短胸脇滿悶不思飲食熟地黄石斛去根剉耆剉白茯苓麥門冬去心焙肉桂去皺皮枸杞子肉蓯蓉酒浸一宿刮皺皮炙令黄芎藭當歸剉㣲炒白芍藥人參去蘆頭續斷桑寄生各兩右㨶羅為末煉蜜和搗五七百杵丸如梧桐子大每於食前以粥飲下三十丸羊肉湯治産後發熱自汗肢體疼痛名蓐勞當歸人參各七錢黄耆炙一兩生姜半兩㕮咀用羊肉一觔煮清汁五大盞去肉入藥煎至四盞冄去滓作三次服又方當歸人參䓁分右為末猪腰一隻薄切藥三錢水二盞粳米半合同煎至一盞汗未出再服治蓐婦血暈以芭蕉根搗汁飲之治蓐中血暈取猪脂燒灰酒服之立驗已斃者去板齒灌之經一日亦可治産後蓐婦産後血邪攻心狂語附論夫血邪攻心狂語者由産後臟腑俱虛敗血奔衝邪滛於心心不受觸氣血相蒸氣搏於肝神魂不定内外虚亂心氣怯弱因其體虚血邪干於心臓故狂亂見鬼神也方栢子仁散治産後荒言亂語皆由内虚是血邪上攻扵心也栢子仁逺志去心人參去蘆頭桑寄生防風去蘆頭琥珀細研當歸剉㣲炒熟乾地黄甘草炙㣲赤剉各半兩右為散每服以水一大盞入白羊心一枚切先煎至七分候去滓溫下藥五錢更煎至四分去滓不拘時候温服茯神散治産後血邪心神恍惚言語無度睡卧不安茯神一兩人參去蘆頭龍齒琥珀赤芍藥黄耆牛膝去苗已上各二分生乾地黄半兩桂心半兩右為散每服用一盞先羊腎三錢以水一中盞同煎至六分去滓不拘時溫服羊腎湯治産後狂語如見鬼神皆是體虚心氣不定邪血所攻羊腎一對切去脂膜逺志三分去心白芍藥三分熟乾地黄一兩黄耆剉白茯苓人參去蘆頭防風去蘆頭甘草炙㣲赤剉獨活羚羊角屑以上各半兩右為散每服用一大盞先煎羊腎至七分去腎入藥五錢再煎至四分去滓不拘時溫服麝香散治産後血攻心言語無度煩悶不安麝香一分牛黄一分硃砂三分龍齒三分麒麟竭半兩右都細研為散不計時以豆淋酒調下一錢琥珀散治産後迷悶言語錯亂琥珀一兩細研人參三分去蘆頭逺志三分去心茯神三分鉛粉一兩生乾地黄三分阿膠三分搗碎炒令黄烟硃砂半兩細研麝香一分細研甘草一分炙㣲赤剉右為細散入研了藥令匀不計時以金銀湯調下一錢金烏散治産後血邪衝心言語不得心神迷悶烏鵶一兩燒灰麝香半兩虎糞一兩燒灰右同研令細不計時以童子小便調下一錢鉛粉丸治産後體虛血邪攻心狂語或見鬼神鉛粉一兩天竹黄半兩真珠末半兩地黄半兩砒黄一兩硃砂一分麝香一分琥珀半兩金箔二十片銀箔二十片右都研如麩以粟米飯和丸如桐子大不計時候以竹葉湯下五丸丹砂丸治産後血邪攻心迷悶氣不足臓腑虛弱令人如顛邪怕驚或啼或笑或驚或恐言無準憑狀如鬼魅宜服光明硃砂二兩白礬二兩金箔五十片先將硃砂并礬内瓷瓶子中封閉了於甑上每兩度蒸至半月日取出和前金箔細研以粟米軟飯和為丸如菉豆大每服不拘時以麥門冬湯下七丸麝香散治産後血邪氣攻心如見鬼神狀候似風亂語不定刺痛脹滿宜服麝香一錢細研烏驢蹄護一兩燒灰亂髪二兩炒灰乾漆一兩搗碎炒令烟出右為細散研入麝香令匀不計時以溫酒調下一錢麒麟竭散治産後血邪攻心恍惚如顛狂麒麟竭一分蒲黄三分右相和研令匀細不計時以溫酒調下二錢治血攻心顛狂不識人宜服此方赤馬蹄炒令焦黄白殭蚕㣲炒各一兩右為細散不計時煎苦參湯調下一錢又方延胡索半兩狗膽一分乾者琥珀半兩右為細散不計時以溫酒調下一錢小便調下亦得茯苓湯治産後心氣不足血邪上攻眠卧不安白茯苓去黑皮熟地黄焙各一兩半甘草炙剉獨活去蘆頭逺志去心防風去皮人參各半兩白薇龍齒各一兩半研右粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時治婦人産後發狂用木香附子去鬚皮淨為末每用二錢再入研極細真辰砂末一錢以燒通紅秤錘好酒調服神効八珍散治産後血暈心竅言語不正狀如顛狂人參石菖蒲生地黄川芎各一兩硃砂别研防風去蘆各半兩細辛淨洗一錢甘草炙半兩右為末每服一錢薄荷湯下不拘時地黄多膩膈脾胃不快者即以當歸代之黑龍丹出濟生方治産後敗血衝心不省人事狂言如癲當歸去蘆酒浸五靈脂川芎髙良姜三兩生地黄三兩以上剉入沙鍋内紙筋鹽泥固濟炭火煆令通紅令冷後取出細研入後藥生硫磺花蘂石百草霜乳香琥珀右五味一兩一錢細末前後和匀米醋煮麵糊為丸如彈子大每服一丸服時再入炭火煆藥通紅入生姜汁内浸碎以無灰酒合童子小便頓服神効不可述治産後顛狂出永類鈴方用小柴胡湯加生地黄同煎百餘沸安又有服逍遥散外加逺志桃仁蘇木紅花每服再加一錢重服後再服平胃散安此先理血而後理脾者寧中膏出如宜方治産後心志不寧心血耗散如見神鬼人參酸棗仁各一兩辰砂半錢右為末蜜丸如彈子大每服一丸薄荷湯化下又宜研琥珀麝香燈心湯下普濟方卷三百四十九
