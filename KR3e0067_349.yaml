往來頭疼體痛口苦舌燥桂去粗皮芍藥銼厚朴去粗皮塗生薑汁炙柴胡去苗桔梗銼炒紫花去土焙乾髙良薑乾薑炮製白蕪荑炒陳橘皮湯浸去白用鱉甲去裙襴醋浸炙各半兩草豆䓻三枚去皮右搗羅為散每服用獖豬肝十片炙熟乘熱拌和藥旋旋嚼服溫酒下日三柴胡人參湯治産後失於將理血虛損日漸困瘁少寒多熱煩渴嗽逆痰壅減食柴胡去苖人參生乾地黃焙各三分桔梗銼炒紫花去苗土知母桑根白皮枳殼去穰麩炒令黃赤芍藥桂去皮當歸微炒各半兩附子大黃一枚炮製去皮臍右銼如麻豆每服三錢水一盞生薑三片棗一枚擘破同煎候至七分去滓溫服不拘時茯苓丸治産後蓐勞寒熱羸瘦骨節痠痛白茯苓去黑皮肉蓯蓉酒浸切焙熟乾地黃焙各一兩半當歸切炒枳殼去穰麩炒桑上寄生銼炒延胡索粳米炒半熟各一兩右為末煉蜜為丸梧桐子大每服二十丸溫酒或米飲下不拘時服豬腎湯治産後蓐勞寒熱體痛力乏瘦黑豬腎一雙切黃耆銼碎人參芍藥銼碎炒各一兩半芎藭一兩桂去粗皮三分當歸銼炒令香一兩熟乾地黃銼碎炒各一兩半右除腎外搗為粗末每服二錢水二盞先煮豬腎取一盞去腎再入藥末生薑三片棗一枚擘破同煎七分去滓溫服不拘時茈胡湯治産後蓐勞寒熱日漸瘦損茈胡去苗銼一兩甘草炙銼人參白茯苓去黑皮當歸切焙赤芍藥銼枳殼去穰麩炒厚朴去粗皮塗生薑汁炙各三兩黃耆三分右搗粗篩每服三錢水一盞半先煮豬腎一隻取汁一盞用去腎再入藥并生薑三片蔥白三寸同煎至七分去滓溫服不拘時熟乾地黃湯治産後蓐勞寒熱瘁瘦熟乾地黃焙一兩半麥門冬去心炒當歸切焙人參牛膝去苗銼白术銼炒各一兩淡竹葉一兩右粗搗篩每服三錢水一盞煎七分去滓溫服不拘時候黃耆湯治産後蓐勞肌瘦煩悶喘急多汗倦怠少力黃耆銼碎芍藥銼碎枳殼去皮穰麩炒牡蠣粉各一兩羚羊角屑半兩右粗搗篩每服二錢水一盞半豬脂一枚去筋膜用生薑五片同煎七分去滓溫服不拘時黃耆炙散出聖惠方治産後蓐勞肌肉枯瘦面無顔色或寒或熱四肢痠痛心煩黃耆銼鱉甲去裙襴醋炙黃各一兩當歸銼微炒桑寄生桂去粗皮白茯苓去黑皮白芍藥人參麥門冬去心焙熟乾地黃焙牛膝去苗酒浸切焙甘草炙各半兩右為細散每服用豬腎一具切去脂膜先以水一盞半將生薑三片棗三枚擘煎至一盞去滓并腎却下藥三錢再煎至七分候空心食前溫服二滓並煎服芍藥湯治産後蓐勞疼痛寒熱頭旋眼昏精神恍惚睡多驚恐盜汗腹痛大便不利赤芍藥芎藭牡丹皮玄參當歸切焙人參五味子麥門冬去心焙白茯苓白薇甘草炙銼各一兩熟地黃二兩右粗搗篩每服五錢水一盞半煎至八分去滓溫服不拘時候豬腎湯治産後蓐勞似瘧寒熱不能食豬腎一枚去脂膜粳米淘二合知母焙三分當歸銼焙一分半蔥白五莖芍藥三分右除腎并米外銼如麻子豆大以水六盞先煎豬腎至七八沸內諸藥煎取四盞去滓下粳米煮熟去米空心服分三服如行人五六里服訖卧良久乾地黃丸治産後蓐勞寒熱體虛羸瘦不思飲食熟乾地黃焙人參鱉甲醋炙去裙襴肉蓯蓉酒浸切焙各兩白术炒續斷桂去粗皮附子炮製去皮臍牛膝酒浸切焙五味子當歸切焙各三分茯苓去黑皮半兩黃耆銼一兩半右為末研勻煉蜜和丸如桐子大每服十五丸溫酒化下不拘時白薇丸治産後蓐勞寒熱時作四體羸弱飲食無味白薇柏子仁研附子炮製去皮臍鱉甲醋炙去裙襴當歸切焙黃耆銼各一兩人參桂去粗皮石斛去根芍藥炒牡丹皮羌活去蘆頭各三分熟乾地黃焙甘草炙銼肉蓯蓉酒浸切焙一兩一分芎藭各半兩右為末研細煉蜜和丸如梧桐子大每服二十丸溫米飲化下不拘時澤蘭丸治産後蓐勞補虛損益血氣澤蘭一兩半防風去皮附子炮製去皮臍當歸切焙白术桂去粗皮芎藭柏子仁熟乾地黃焙石斛去根兩各一厚朴去粗皮薑汁炙甘草炙銼細辛去苗葉各半兩人參乾薑炮牛膝酒浸切焙肉蓯蓉酒浸切焙白芷黃耆續斷各三分桃仁去皮尖雙炒四兩右為末研勻煉蜜和丸如梧桐子大每服三十丸空心溫酒下白术散治産後蓐勞虛羸發歇寒熱心腹疼痛四肢無力不思飲食白术一兩木香半兩熟乾地黃一兩乾薑半兩炮製白芍藥三分芎藭桃仁半兩湯浸去皮尖雙仁麩炒微黃人參三分去蘆頭桂心半兩黃耆三分銼當歸三分銼微炒白茯苓三分右粗搗羅為散每服四錢以水一中盞入生薑半分棗二枚同煎至六分去滓稍熱服一日三四服豬腎湯治産後體虛乍寒乍熱其狀如瘧名曰蓐勞宜服豬腎一對切去脂膜香豉半兩白粳米半兩蔥白七寸切桂心半兩薤白三莖切生薑一分切白芍藥一兩人參一兩去蘆白术三分當歸一兩銼微炒黃耆三分去蘆頭大棗四枚擘破已前六味都以水二盞煎至一盞去滓同煎後藥腎􅅹湯治産後蓐勞心神煩熱頭痛口乾身體或寒或熱獖豬腎一對切去脂膜豉半兩大棗四枚擘破生薑一兩切蔥白二莖以上五味用水一盞半煎至一盞去滓用煎後藥乾熟地黃焙一兩桂心半兩白术半兩麥門冬一兩半去心焙當歸半兩銼微炒黃耆半兩右搗粗羅為散每服半兩入前藥汁煎至七分去滓食前分溫二服地黃丸治産後蓐勞虛羸氣短胸脅滿悶不思飲食熟地黃石斛去根銼耆銼白茯苓麥門冬去心焙肉桂去皺皮枸杞子肉蓯蓉酒浸一宿刮皺皮炙令黃芎藭當歸銼微炒白芍藥人參去蘆頭續斷桑寄生各兩右㨶羅為末煉蜜和搗五七百杵丸如梧桐子大每於食前以粥飲下三十丸羊肉湯治産後發熱自汗肢體疼痛名蓐勞當歸人參各七錢黃耆炙一兩生薑半兩㕮咀用羊肉一斤煮清汁五大盞去肉入藥煎至四盞冉去滓作三次服又方當歸人參等分右為末豬腰一隻薄切藥三錢水二盞粳米半合同煎至一盞汗未出再服治蓐婦血暈以芭蕉根搗汁飲之治蓐中血暈取豬脂燒灰酒服之立驗已斃者去板齒灌之經一日亦可治産後蓐婦産後血邪攻心狂語附論夫血邪攻心狂語者由産後臟腑俱虛敗血奔衝邪淫於心心不受觸氣血相蒸氣搏於肝神魂不定內外虛亂心氣怯弱因其體虛血邪干於心臟故狂亂見鬼神也方柏子仁散治産後荒言亂語皆由內虛是血邪上攻于心也柏子仁逺志去心人參去蘆頭桑寄生防風去蘆頭琥珀細研當歸銼微炒熟乾地黃甘草炙微赤銼各半兩右為散每服以水一大盞入白羊心一枚切先煎至七分候去滓溫下藥五錢更煎至四分去滓不拘時候溫服茯神散治産後血邪心神恍惚言語無度睡卧不安茯神一兩人參去蘆頭龍齒琥珀赤芍藥黃耆牛膝去苗已上各二分生乾地黃半兩桂心半兩右為散每服用一盞先羊腎三錢以水一中盞同煎至六分去滓不拘時溫服羊腎湯治産後狂語如見鬼神皆是體虛心氣不定邪血所攻羊腎一對切去脂膜逺志三分去心白芍藥三分熟乾地黃一兩黃耆銼白茯苓人參去蘆頭防風去蘆頭甘草炙微赤銼獨活羚羊角屑以上各半兩右為散每服用一大盞先煎羊腎至七分去腎入藥五錢再煎至四分去滓不拘時溫服麝香散治産後血攻心言語無度煩悶不安麝香一分牛黃一分硃砂三分龍齒三分麒麟竭半兩右都細研為散不計時以豆淋酒調下一錢琥珀散治産後迷悶言語錯亂琥珀一兩細研人參三分去蘆頭逺志三分去心茯神三分鉛粉一兩生乾地黃三分阿膠三分搗碎炒令黃煙硃砂半兩細研麝香一分細研甘草一分炙微赤銼右為細散入研了藥令勻不計時以金銀湯調下一錢金烏散治産後血邪衝心言語不得心神迷悶烏鴉一兩燒灰麝香半兩虎糞一兩燒灰右同研令細不計時以童子小便調下一錢鉛粉丸治産後體虛血邪攻心狂語或見鬼神鉛粉一兩天竹黃半兩真珠末半兩地黃半兩砒黃一兩硃砂一分麝香一分琥珀半兩金箔二十片銀箔二十片右都研如麩以粟米飯和丸如桐子大不計時候以竹葉湯下五丸丹砂丸治産後血邪攻心迷悶氣不足臟腑虛弱令人如顛邪怕驚或啼或笑或驚或恐言無準憑狀如鬼魅宜服光明硃砂二兩白礬二兩金箔五十片先將硃砂并礬內瓷瓶子中封閉了於甑上每兩度蒸至半月日取出和前金箔細研以粟米軟飯和為丸如菉豆大每服不拘時以麥門冬湯下七丸麝香散治産後血邪氣攻心如見鬼神狀候似風亂語不定刺痛脹滿宜服麝香一錢細研烏驢蹄護一兩燒灰亂髮二兩炒灰乾漆一兩搗碎炒令煙出右為細散研入麝香令勻不計時以溫酒調下一錢麒麟竭散治産後血邪攻心恍惚如顛狂麒麟竭一分蒲黃三分右相和研令勻細不計時以溫酒調下二錢治血攻心顛狂不識人宜服此方赤馬蹄炒令焦黃白殭蠶微炒各一兩右為細散不計時煎苦參湯調下一錢又方延胡索半兩狗膽一分乾者琥珀半兩右為細散不計時以溫酒調下一錢小便調下亦得茯苓湯治産後心氣不足血邪上攻眠卧不安白茯苓去黑皮熟地黃焙各一兩半甘草炙銼獨活去蘆頭逺志去心防風去皮人參各半兩白薇龍齒各一兩半研右粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時治婦人産後發狂用木香附子去鬚皮淨為末每用二錢再入研極細真辰砂末一錢以燒通紅稱錘好酒調服神效八珍散治産後血暈心竅言語不正狀如顛狂人參石菖蒲生地黃川芎各一兩硃砂别研防風去蘆各半兩細辛淨洗一錢甘草炙半兩右為末每服一錢薄荷湯下不拘時地黃多膩膈脾胃不快者即以當歸代之黑龍丹出濟生方治産後敗血衝心不省人事狂言如癲當歸去蘆酒浸五靈脂川芎髙良薑三兩生地黃三兩以上銼入沙鍋內紙筋鹽泥固濟炭火煆令通紅令冷後取出細研入後藥生硫磺花蘂石百草霜乳香琥珀右五味一兩一錢細末前後和勻米醋煮麵糊為丸如彈子大每服一丸服時再入炭火煆藥通紅入生薑汁內浸碎以無灰酒合童子小便頓服神效不可述治産後顛狂出永類鈴方用小柴胡湯加生地黃同煎百餘沸安又有服逍遙散外加逺志桃仁蘇木紅花每服再加一錢重服後再服平胃散安此先理血而後理脾者寧中膏出如宜方治産後心志不寧心血耗散如見神鬼人參酸棗仁各一兩辰砂半錢右為末蜜丸如彈子大每服一丸薄荷湯化下又宜研琥珀麝香燈心湯下普濟方卷三百四十九
