body:
  text: 普濟方卷五十九明周王朱橚撰舌門總論夫凢舌者心主小腸之候也重十兩長七寸廣二寸半善用機衡能調五味也凢有所啖若多食醎則舌脉凝而變色多食苦則舌皮稿而外毛焦枯多食辛則舌筋急而爪枯乾多食酸則舌肉肥而唇掲多食甘則舌根痛而外髪落且心欲苦肺欲辛肝欲酸脾欲甘腎欲醎此五味内合五臓之氣熱則生瘡引唇掲赤若腑寒則舌本縮口噤唇青寒宜補之熱冝㵼之不寒不熱依臓腑調之舌縮口噤唇青升麻煎主之舌者心之官主嘗五味以榮養於身資於脾以分布津液於五臓故心之别脉係於舌本肝脉絡于舌本脾脉連舌本散舌下凢此三經或為風寒濕所中使人舌縮卷而不能言或憂怒思恐所鬱則舌腫滿而不得息心熱則破裂生瘡肝壅則出血如湧脾閉則白胎如雪諸證雖異治之各有方舌者脾脉之所通心氣之所生和則知味資於脾而榮於身者也二臓不和風寒中之則舌强而不能言壅熱攻之則舌腫不能言語更有重舌木舌舌胎出血等證皆由心脾虚風熱所乗而致且更有傷寒舌出過寸此虗毒熱攻心也但舌瘡一證不特因實熱所致亦有虚熱上攻而就者却不可倒用凉藥也貴乎鎮墜寧心而已局方所載黒錫養正二丹並以冷鹽水送下用之多效重舌論大人小児重舌候者心脾有熱故也心候於舌而主血脾之絡脉又出舌下心火脾土二臓子母也有熱則血氣俱盛其狀附舌下近舌根處遂令舌下血脉脹起如小舌狀故謂之重舌盖心開竅於舌足太隂之脉屬脾絡胃上膈挟咽連舌本散舌下故也方紅雪煎出聖濟總録治心脾有熱生重舌羚羊角升麻呉藍黄芩去心芍藥人參大青淡竹葉切各一兩㯽榔為末三兩木香為末三兩木通剉山梔子去皮丹砂研蘇枋木椎碎煎葛根各一兩椎碎朴硝研一升桑根白皮一兩枳殻去瓤麸炒三分麝香碎半兩甘草炙二兩右除朴硝蘇枋木丹砂木香麝香㯽榔外剉如麻豆大以水二斗五升煎至九升濾去滓再煎沸下朴硝不住手以桞箆攪候水脚欲盡下蘇枋木汁煎更三五沸於新砂盆中次下木香㯽榔麝香丹砂等末攪令勻每服一錢綿裹嚥津甚者蜜水調下一錢食後服之石膏煎出聖濟總録治心脾積熱生重舌及時行隂黄丹石發動一切熱毒石膏凝水石滑石並碎各一斤鬱金研犀角各一兩黄芩去黒心五兩升麻三兩山梔子去皮二兩黄連去鬚三兩苦硝研一斤馬牙硝研半兩先以石膏凝水石滑石等用水三斗入金十兩亦得煎至七升去滓再煎先下芒硝煎三兩沸次下馬牙硝攪令化不住手攪良乆用一新瓦盆傾出凝結每服一錢用蜜水調下大人小兒以意加减服牛黄散出聖濟總録治重舌牛黄研人參各半兩白茯苓去黒皮三分大黄剉炒半兩當歸切炒一分甘草各半兩丹砂研一分麝香研半兩右為細散毎服半錢温水調下甚者加至一錢食後服朴麝散出聖濟總録治重舌及天行隂黄丹石發動一切熱毒朴硝研五兩麝香研一分黄芩去黒心半兩山梔子去皮一兩甘草炙一分淡竹葉一握蘆根剉一兩右剉五味如麻豆大研者二味以新汲水三升將藥入鐺中煎約半升已來去滓澄淸取甆瓶一箇傾藥汁在内以物盖定瓶口用鹽泥固濟慢火煆一周時去火令冷却將瓶安在水中無令水滿至瓶口浸經一宿至明日打破瓶子取藥如金色研為細散每服半錢冷水調服綿裹嚥津亦得牛黄散出聖恵方治重舌口中涎出水漿不収牛黄龍腦朱砂各一分太隂𤣥精石二兩右細研為散每度用藥一錢先於重舌上以鈹針鈹破出血用鹽湯潄口然後摻藥於舌上嚥津神效芝𨼆方出海上方治重舌或不能言乾薑蒲黄右等分為末乾搽即愈盖二藥隂陽得中宋度宗春月欲賞花飲宴不意一夜重舌滿口不能飲食蔡御醫進此方立效因此入内黄藥湯治舌腫及重舌黄藥甘草炙剉各一兩右粗搗篩每服三錢水一盞煎至七分去滓食後温服治重舌皂角刺燒灰為末朴硝少許細碾為末右先以手蘸水擦口内并舌上下將藥搽在舌上下涎出自消治重舌口中涎出方出聖恵方驢乳一升猪乳一升右相和煎至半升不拘時候服半匙蒲黄散出范氏方治重舌上戴妨礙不能言口中涎出用新眞蒲黄羅細散傅之吐出又傅立消亦治舌腫傅舌上不過數上愈湏眞者可用李莫安撫内子夜半忽不能言燭之乃舌下生一舌上戴急取外臺檢此方五七傅即愈一方炒碾為末摻之治重舌出經驗良方用竹瀝漬黄蘖無時㸃舌上朴硝散出經驗良方治重舌喉痺用朴硝黄丹細散摻重舌上竹筒以半錢許吹入喉中即破吐涎而愈甚者不過兩次又方出經驗良方用五靈脂一兩去砂石為細末用米醋一大盤煎湯旋噙𠻳口即安又方出經驗良方用皂角四五挺皮不蛇者去皮炙令乾地上出火毒荆芥穗少許二味為細末米醋調塗腫處即消治重舌木舌出范氏方用川烏尖巴豆為末米醋調刷患處即效木舌湏先服勝金散開闗竅治重舌口中涎出水漿不収出聖恵方用簸箕舌燒為灰細研以温酒調下一錢又方出聖惠方用伏龍肝研如粉以牛蒡汁調傅之效又方出聖恵方用蛇蜕皮燒灰細研少許傅之效一方治小兒重舌燒蛇蜕皮為末睡和塗舌上瘥治重舌口中涎出方出聖惠方右取田中蜂房燒灰細研以好酒和傅喉下立愈杏仁膏出聖恵方治口舌熱乾或舌上生胎語言不眞升麻杏仁去皮尖甘草炙各一兩黒豆五十粒去皮右為細末入白蜜五合生地黄汁五合慢火熬成膏子丸如雞頭大噙一丸嚥津舌上生胎立用薑蘸冷水擦洗之薄荷蜜煎出澹寮方治舌上生白胎乾澀話語不眞白蜜薄荷自然汁各等分右以生薑片先蘸水揩洗再用硃砂雄黄硼砂腦麝為末傅之良未效更加𤣥明粉一方先以生薑蘸水揩洗用薄荷自然汁白蜜作煎服之治大人小兒舌下腫起重舌出鮑氏方用地鱉虫和薄荷研汁綿包捻舌下腫處重舌極證出鮑氏方用指去爪先於舌下筋上擦至根漸深深擦入如此三次又用擦蘸水取項後燕窠小坑中筋自上幹下至堂深深擦入亦三次小兒若飲乳勝前即病去矣半夏酒治重舌滿口右用半夏二十枚水煑過再用水泡片時乗熱用好酒一升浸宻封頭良乆取酒乗熱含冷時即吐又含熱者以差為度然後再服歸荆湯獨活酒人為邪氣所干則發而為病若氣若血若痰若水若風若寒若暑若濕腑臓表裏冷熱虚實各有受病之處用藥之法必究其原而後可以起病否則前賢所謂獵不知兔廣絡原野兾一人獲之術亦踈耳是可以人試技乎哉一方用羗活得汗則愈歸荆湯出指南方治風痙昏迷吐沫抽掣背脊强直産後中痓通用當歸荆芥穂各等分右為末每服二錢水一盞酒少許煎七分灌下如牙闗𦂳用銅匙斡開以雞羽蘸藥入口或用童尿調下或以芎藭代當歸亦妙中風角弓反張論中風角弓反張之狀腰背反折不能俛也由風邪客於諸陽之經邪正相搏風氣勝則筋脉縮急腰背反折如弓之形也方天麻丸一名朱附丸出聖恵方治中風角弓反張口噤不語四肢拘急并腎臓風毒攻注手足頑麻一切急氣天麻白附子炮裂附子炮裂去皮臍牛膝去苗白僵蠶㣲炒羗活槐膠羚羊角屑防風去蘆頭各一兩天南星炮裂蟬殻硃砂細研各半兩膩粉麝香細研各一分乾蝎㣲炒半兩白花蛇酒浸去皮骨炙研右為末入研了藥令匀煉蜜和搗二三百杵丸如雞頭實每服以生薑汁薄荷汁各少許入熱酒二合相和研下一丸不計時候頻服一方無薄荷汁犀角散出聖恵方治中風角弓反張心神煩亂口噤不語犀角屑升麻去根節羗活附子炮裂去皮臍杏仁湯浸去皮尖雙仁麸炒各一兩防風去蘆頭桂心白术人參去蘆頭芎藭白茯苓細辛當歸各三分石膏二兩甘草炙㣲赤剉半兩右搗羅為散每服四錢以水一盞煎入生薑半分煎至五分去滓入竹瀝一合更煎一兩沸不拘時候温服龍腦丸出聖恵方治中風身如角弓反張不語悶塞以半夏醋煎灌漱吐出即瘥舌腫强論夫手少隂為心之經也其氣通於舌足太隂脾之經也其氣通於口太隂之脉起於足大指入連舌本心脾虚為風熱所乗即隨脉至舌熱氣留於心血氣壅滯故舌腫因脾脉脹急則舌本強也心氣通於舌脾脉挾咽連舌本散舌下心脾二經受風邪則舌本強不能巻舒又或熱氣加之則腫腫則筋脉脹急勢連咽喉礙於呼吸法宜刺之洩去惡血然後用藥儒門事親書云南隣朱老翁六十餘嵗身熱數日不已舌根腫起和舌尖亦腫腫至滿口比元舌大三倍一外科以燔針刺舌兩傍下廉泉穴病勢轉亟戴人曰血實者宜决之以針磨令鋒極尖輕砭之日砭八九次血出約二三盞如此者三次漸少減腫消夫舌者心之候也心主血故血出則愈也方白茯苓湯出經濟總録治舌腫強白茯苓去黒皮牛黄研各三分犀角屑一分甘草炙人參羚羊角屑白术桂去粗皮熟乾地黄焙各半兩右粗搗每服三錢匕水一盞煎至七分去滓温服射干湯出經濟總録治木舌腫強及天行病丹石發動一切熱毒射干木通剉大黄剉炒馬蘭子各一兩半漏蘆去蘆頭升麻當歸切焙桂去粗皮甘草炙各一兩右粗搗篩毎用五錢匕水一盞半煎至八分去滓分温二服日三夜二牛黄散出聖惠方治舌腫強牛黄細研漢防己各三分甘草炙剉人參去蘆頭羚羊角屑生乾地黄牛蒡子㣲炒桂心各半两犀角屑一分右為散入牛黄研令勻每服三錢水一鍾煎至六分去滓不計時候温服柴胡散出聖惠方治腹中虚熱舌本強直口吻兩邊痛舌上有瘡嚥食不得柴胡去苗川升麻梔子仁赤芍藥木通各二兩剉黄芩大青杏仁各一两半湯浸去皮尖雙仁石膏三两右為散每服五錢水一大盞入生薑半分煎至五分毎於食後温服金沸草散出危氏方治風寒傷於心脾令人增寒發熱齒浮舌腫荆芥穗四兩旋覆花前胡麻黄去節各三兩甘草炙赤芍藥半夏湯浸七次各一兩右剉散每服四錢水一盞半薑七片棗二枚煎七分去滓漱口吐一半喫一半世毉用此發散傷風傷寒及加杏仁五味子治咳𠻳皆效治舌腫牙疼辛未年有人患舌腫如吹滿塞口中粥藥不入其勢甚危大煎一劑乗熱以紙籠氣衝之即愈黄連湯出聖濟總録治傷寒舌腫黄連去鬚大黄生用各一兩大青五根升麻黄藥各半兩甘草炙三分右粗搗篩每服五錢匕水二盞黒豆一撮同煎至一盞去滓分温二服病未退每服更加芒硝末半錢匕和湯下以㣲利為度治心脾壅熱生木舌腫脹一名𤣥參散出聖恵方𤣥參升麻大黄犀角各七錢右為末每服三錢水一盞煎五分温服牡蠣散出聖濟總録治牙疼連牙闗急口眼相引木舌腫強不能轉牡蠣煆研伏龍膽附子炮裂去皮臍白礬煆研各半两右為散以酒和如泥每用一錢於患處塗貼吐津正舌散出危氏方治中風舌本強難轉語言不正蝎稍去毒一分茯神木剉㣲炒一兩龍腦薄荷焙乾二兩右為細末每服一二錢溫酒調下或以搽牙頰間亦得柴胡散出聖濟總録治舌本強兩邊痛柴胡去苗升麻各一兩梔子仁半两右為散每服一錢匕熱水調下日三蒲黄散出海上方治舌忽然腫硬或出血如湧蒲黄海螵蛸末各等分右為細末毎服少許塗舌上瘥治木舌漸腫大滿口若不急治即塞殺人紫雪一分竹瀝半合右研紫雪以竹瀝和之時時抹入口中飛礬散出海上方白礬飛百草霜各等分右為末捻糟茄自熟水調若口噤挑灌之妙二聖散治舌根腫硬咽喉不利紅芍藥甘草各等分右㕮咀每服三錢水一盞煎七分去滓温服仍潄嚥之礬石散出聖恵方治舌強不能言語白礬研桂去粗皮各一兩右為散每服一錢匕或半錢匕安舌下或上瘥䗪蟲散出聖恵方治舌腫滿口言語不得䗪蟲五枚炙鹽半兩右細研為散以水二盞煎至十餘沸去滓熱含吐以瘥為度麝香散出聖濟總録治舌強不語麝香皂莢各半兩右為散每用半錢摻舌腫上吐津舌腫強方出直指方蛇皮燒存性全蝎各等分右為末少許摻傅之治舌暴腫宜摻藥方出聖恵方乾薑半夏各一分湯浸七遍去滑右為細散毎用少許摻在舌上以瘥為度百草霜散一名黒散子出危氏方治舌腫起如猪胞或忽然硬腫逡廵塞悶殺人用釡下黒末以醋厚傅舌下上脱去更傅湏臾即消若先决去血汁竟傅之彌佳凢此患人皆不識或錯治益困殺人甚急且看其舌下自有噤蟲狀如螻蛄或如卧蠶子細看之有頭尾其頭自少燒鐵釘格頭上即熟使自消一方釡下墨和鹽等分瀝清水塗腫處令遍表裏良乆即愈一方用醋調尤妙一方用甘花水調釡下墨鹽成膏傅舌上立愈治舌腫強滿口方滿口含糖醋少許時熱通即止蒲黄膏治舌腫滿口不能言用蒲黄調成膏傅舌上下研箆麻子紙捲燒烟薫之隨即縮治舌腫脹用好硼砂為末用薄批生薑蘸藥揩腫舌處少時即退又方治舌強不語用蛇膽一枚焙乾碾為末傅舌上有涎吐之半夏酒治舌腫滿口氣息不通湏臾殺人急以手刺破潰出惡血令其泄氣然後可治亦可用微針決破次用此藥用半夏十二枚以苦酒一升煑取八合稍稍漱口熱含冷吐半夏勒人咽喉以薑汁觧之一方蜜封頭良乆取出含之蚯蚓方治舌腫滿塞喉欲死用蚯蚓一條以少許鹽花化為水以塗咽喉舌上良乆漸消甘草湯治舌卒腫起滿口塞喉氣不通頃刻殺人以針决舌下兩邊地天脉出血銅筯燒令赤熨瘡數遍亦令血絶用甘草不拘多少煎湯熱含冷吐又治大人小兒重舌腫起舌下用朴硝研水敷咽喉外其内用成塊者含涎出乃平又方用地蜱蟲和薄荷研汁綿包蘸舌下腫處治舌用葈耳葉挼安舌下令涎出去目黄好睡治跌倒舌因牙誤枕綻破者用生薑切作薄片貼之治舌根腫疼不可忍者用升麻湯加柴胡枳殻山梔子用水二盞煎至一盞去滓服之立效治舌忽然硬腫逡廵塞悶殺人或血出如湧方一名蒲黄散用烏賊魚骨蒲黄等分為末每用少許塗舌上瘥一方用蒲黄摻上瘥縮舌膏一名如神㪚出仁存方治舌腫懸下尺許及傷寒熱毒攻心舌出數寸用片腦成片頻於舌上三四次敷就縮又方出經驗良方用萆麻仁三四十粒乳鉢研細取油塗紙上二幅熏舌上未退又燒一幅取令此證退如未愈再合用之令愈為度如治牛舌出亦好一法染黄紙捲搥碎萆蔴子燒烟熏之其舌竟退巴豆方出經驗良方治傷寒後不能轉攝舌出不収者用巴豆一枚取油霜用紙捲之内入鼻中其舌即収治舌卒腫起如吹泡或如猪脬形滿塞喉氣息不通湏臾不治殺人便以指刮破舌兩邊或破血出尤好亦可以鈹刀刮兩邊破之以瘡膏傅之出聖恵方又方出肘後方刺舌下兩邊大脉血出勿使刺著舌下中央脉血出不止殺人如上治不愈或血出數升則燒鐡箆令赤熨瘡數過以絶血也又方出仁存方治舌忽然腫破用釡下墨烟和鹽塗舌上下調酒米醋傅即安舌強不語出永類鈐方用白礬桂心末傅之硬腫悶塞取釡底上炲煤和鹽等分為末塗之一方小豆末醋調塗如神散出御藥院方治舌腫強及齗腫不消露蜂窩椒末青鹽各等分另研為末右毎用各抄一錢和勻用水一盞半煎至八分去滓熱漱冷吐藥盡為度舌本縮口噤論夫心欲苦肺欲辛肝欲酸脾欲甘腎欲醎此五味内合五臓之氣也若臓熱則生瘡唇掲青色若腑寒則舌本縮口噤唇青寒宜補之熱宜瀉之不寒不熱依臟腑調之方獨活觧噤膏療小腸腑寒應舌本縮噤口唇青獨活芎藭苦李根皮各三兩天雄焙防風細辛桂心蜀椒甘草猪肪右㕮咀綿裹以苦酒一升漬一宿以猪肪㣲火煎之去滓膏或凝以綿裹少許口含於下壓之取瘥日三度易之又生艾葉傅法無生艾葉取乾者搗之以水淹一升熱搗以帛塗之於塞處上封裹之瘥為度龍石散治大人小児上膈壅毒口舌生瘡咽嗌腫塞疼痛妨悶每用少許摻貼患處嚥津小兒瘡疹毒氣攻口齒先用五福化毒丹掃後仍再用此藥摻貼立效硃砂研飛二兩半寒水石生腦子研二錢半右為末毎服五七次用夜卧摻貼吹喉散治三焦大熱口舌生瘡咽喉腫塞神思昏悶並能治蒲黄一兩盆硝八兩青黛一兩半右用薄荷汁一升將盆硝青黛蒲黄一處用磁罐盛慢火熬令乾研細每用一匙或半錢摻於口内良乆出涎吞之不妨或喉中腫病用筒子入藥半錢用力吹之無不立效一方無蒲黄舌上出血論夫心主血在竅為舌若心臓藴熱則血得熱而妄行或溢於心之竅故有舌上出血之證甚者出如湧泉方治舌上黒有數孔大如箸出血如湧泉此心臓病戎鹽黄芩一作蔡子黄蘖大黄各五兩人參桂心甘草各二兩右為末蜜丸如梧桐子大米飲服十丸日三亦燒鐵焙香參丸治心臓熱盛舌上出血人參生蒲黄麥門冬去心焙當歸切焙半兩甘草生乾地黄焙一兩右為末煉蜜丸小彈子大每服一丸温化下一日三四服升麻湯治心臓有熱舌上出血如湧泉升麻剉茜根剉小薊根剉各一兩半艾葉去梗一握凝水石碎三兩右粗搗篩毎服三錢匕水一盞同煎至七分生地黄汁一合更煎一二沸去滓温服寸金散治心煩熱血妄行舌上血出不止新蒲黄三錢新白麵三錢半牛黄研生龍腦各半錢匕右研極細生藕汁調下一錢匕食後臨卧服日二文蛤散治熱壅舌上出血如泉五倍子洗白膠香牡蠣粉各等分右為末每用少許摻病處或燒鐵箄熱烙孔上阿膠散治舌上血出不止阿膠炒燥蒲黄黄耆細剉各一分右為細散毎服一錢匕生地黄汁調下併二服熟艾湯治心經藴熱舌上血出及諸失血熟艾用糯米半合炒松黄栢葉各炙半兩右粗搗篩每服三錢匕水一盞煎至七分去滓温服不拘時候紫霜丸治舌上血出竅如針孔紫金沙即露蜂房頂上實處是研一兩蘆薈研二錢貝母去心四錢右為煉蜜和丸如櫻桃大每服一丸化開煎至五分温服吐血衂血每服一丸酒半盞化開服治舌上出血如簮孔方黄連半兩黄蘖三兩梔子二十枚右以酒二升漬前藥一宿去滓煑三沸頓服聖金散治舌上忽然血出不止黄藥子一兩青黛一分右為細散毎服一錢匕食後新汲水調下日二服欝金散治心臓積熱血脉壅盛舌上血出鬰金一兩當歸切焙半兩右為散每服一錢匕煎生薑烏梅湯調下地黄散出聖恵方治舌血出如簮孔者生乾地黄焙乾鹿用膠炒令乾一兩右為散每服二錢匕食後糯米飲調下必勝散出危氏方治舌衂眞蒲黄畧炒螺兒青各等分右為末毎用少許擦患處少時温鹽水潄之治舌硬忽出血不止用木賊煎湯潄之良清心散治舌上出血并九孔出血用刺蘇一握研絞取汁以酒半盞調服如無生汁只搗乾者為末冷水調下三錢匕兼治大衂黄蘖散治心臓熱極舌上血出用黄蘖二兩塗蜜慢火炙焦搗羅為散每服二錢匕温糯米飲調下治舌下上忽出血如簮孔者出聖恵方用香薷汁一升日三服一方細嚼即止一方作香荗治舌上出血如針孔出聖恵方用豆二升水三升煑之沸去滓服一升日三一方用豆一合水一碗煮數沸温服一盞治下血治舌上出血如簮孔出聖恵方用赤小豆一升杵碎水三升和攪取汁飲一方用苦酒和塗舌上治舌出血不止無故出血仍有小竅此名舌衂出朱氏集驗方用槐花晒為末傅舌上或炒槐花地上出火毒傅之如舌腫以眞蒲黄乾摻治自行被攧穿斷舌心血出不止以米醋用雞翎刷所斷處其血即止仍用眞蒲黄杏仁去皮尖硼砂少許研為細末煉蜜調藥稀稠得所噙化即安治舌上出血如簮孔者出聖惠方用巴豆一枚燒作屑亂髮如雞子燒末以酒調服之治舌上出血如泉方出聖惠方以燒鐵筯熱烙孔中良治舌上出血如泉用五倍膠香牡蠣粉末摻之或燒鐵筯烙其孔普濟方卷五十九
