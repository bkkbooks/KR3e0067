谷列缺治頭面腫穴陽陵泉公孫治頭氣浮腫穴完骨巨窌治頭目癰腫留飲胸脇肢滿及水腫穴陥谷刺出血立已治面浮腫穴天樞豐隆厲兊陷谷衝陽治面浮腫穴中府間使合谷治風面水浮腫顔黒穴解谿治肩腫不得顧穴氣舍治水腹脹皮腫穴三里治腹腫穴曲泉治寒熱腹徧腫穴陰谷治大腹腫脹臍腹悒悒穴大敦治水腹水氣行皮中小腹皮敦敦然小便黄氣滿穴陰交石門治身腫皮痛不可近水穴屋翳治身脹逆息不得卧風汗身腫喘息多喘穴天府治身腫重穴關門治水氣徧身腫穴水溝若是水氣唯得針此若針餘穴水盡即死治水腫穴胃倉治水氣穴缺盆治身體腫皮膚痛不可拉衣淫濼瘈瘲不仁穴屋翳治身腫穴腎腧治腹脹身腫穴三里治身腫鼓脹腸鳴如流水聲穴神闕治水腫穴中極石門治大腹有水穴四滿治腹腫脊强四肢傷墮穴章門治男子如蠱女子如妊娠五指端盡痛足不得踐地穴涌泉隂谷治水腫穴三里治水分病穴復溜治水腫不嗜食穴維道治丈夫溏洩腹脇脹水腫腹堅不嗜食小便不利穴地機治腹中寒不嗜食膈下滿水腫腹堅喘逆不得卧臍腰難俛仰穴隂陵泉治面目浮腫及水病善噫腸鳴腹痛穴䧟谷治腹腫不能食及療水病腹腫繞臍痛衝胸不得息并水氣浮腫鼓脹腸鳴如雷聲時上衝心及胃虗脹穴分水灸七壯若是水病灸大良三回方云可灸三隂交足痿穴及風門穴明堂經云灸二壯主小便不利身腫治水病脹滿穴曲骨治水腫腹脹食飲不下惡寒穴胃倉治水腫人中盡滿唇反死穴水溝治身潤石水身腫穴章門治小腹滿石水穴關元治大腹石水穴四滿然谷治大氣石水穴氣衝治四肢腫濕穴豐隆治汗出四肢腫穴列缺治四肢腫穴復溜王氏曰水腫惟得針水溝若針餘穴水盡即死此明堂銅人所戒也庸醫多為人針水分殺人多矣若其他穴亦有針得瘥者特幸焉耳不可為法也或用藥則禹餘粮元為第一予屢見人服驗故書于此然灸水病則取為要穴也有里醫為李生治水腫以藥飲之久不效以受其延待之勤一日忽然灸水分與氣海穴翌早觀面如削矣信乎水分之能治水腫也明堂固云若是水腫灸大良盖以此穴能分水不使妄行斯可耳但不知明堂又云針四分者豈治其他病當針四分耶治百病水腫穴腎腧灸百壯胃倉灸隨年壯治水腫穴䧟谷灸隨年壯治水腫上下穴陰交灸百壯治水腫脹穴曲骨灸百壯治風逆四肢腫穴豐陵復溜治大腹穴隂市灸隨年壯治人中滿唇腫及水腫大水穴臍中石門各灸百壯分水上㢘各灸隨年壯治水腫不得卧穴陰陵泉灸百壯治石水穴灸然谷氣衝四滿章門治水腫腹滿不能食堅硬穴水分灸七壯至四百壯止此穴忌針針水盡即死治水腫大臍平穴灸臍中腹無紋理者不治治水腹大及水脹水氣行皮中穴石門治石水腫痛引脇下脹頭眩痛身盡熱穴關元治石水穴刺氣衝治石水穴章門然谷治水病穴天泉治風水膝腫穴巨虗上㢘治面浮腫穴上星先取譩譆後取天牖風池治風水面浮腫穴衝陽治脹滿水衝灸脾腧隨年壯三報治卒腫滿身面皆洪大灸足内踝下白肉際三壯治氣兼水身面腫灸丹田三壯女子禁灸治水腫如鼓用大蒜切作錢安臍心次用甘遂為末同作艾炷灸蒜上熱即易之每日頻灸其水自下忌一切毒物并鹽一年治五水灸法青水灸肝井赤水灸心榮黄水灸脾腧白水灸肺經黒水灸腎合脾疼治脾水虚令人不樂穴商丘治脾病身重穴陰交王氏云灸患脾疼服治脾藥反膨脹不得已依耆城方用麵裹火炮蓬莪茂末水與酒醋煎服立愈已而告人亦曰髙良姜末米飲調服亦作效後鄭教授傳一方云草菓延胡索苓脂并没藥酒調三兩錢一似手拈却草菓子五苓脂四味等分為末此亦平穏藥也有此疾者宜服之或不吐不㵼心中疼甚日輕夜重者用乾鹽梅并茶服神效若灸者宜上管中脘下脘脾腧三陰交等穴治疝癖脾中急痛循脇上下搶心腹滿聚積厥氣兩乳穴府舍胃疼治胃氣逆穴魚際治胃脹不調胃虗不嗜食穴分水治胃脘暴痛穴膈腧治腹胃不調腹痛穴下脘治胃寒脹穴腎腧治胃中寒穴胃腧治胃虗脹穴分水治胃中寒心腹脹滿胃氣不足惡聞食臭腸鳴腹痛食不化穴三里治胃熱不嗜食穴下㢘懸鍾治胃中弱食不下穴心腧治胃氣上逆喘血穴太淵治胃補胃穴胃腧灸百壯治胃寒不能食食多身痩腸鳴腹滿胃脹胃熱穴三里灸三十壯反胃治食飲不化入腹還出穴先取下管後取三里㵼之治食飲不化入腹還出穴章門治膈寒食不下嘔吐還出嘔逆吐食不得出穴中庭中府治吐食穴胃腧治胸脇肢滿心下滿食不得嘔逆吐食還出穴中庭治胃氣不足反胃穴三里治吐食不留住穴意舍治吐逆食不住穴胃腧灸百壯治嘔逆不得下食今日食明日吐穴膈腧灸百壯王氏云有人久患反胃予與鎮靈丹服之更令服七氣湯遂能立食若加以炷艾尤為佳也老婦人患反胃飲食至晩即吐出見其氣繞臍而轉予為㸃水分氣海并俠臍邊兩穴他歸只艾水分氣海即愈神效治反胃食即噎氣灸兩乳下各一寸以瘥為期又臍上一寸一十壯又内踝下二指稍斜向前穴三壯一云一指中脘一穴在臍上四寸足三里穴在膝下三寸各灸七壯或九壯其效尤甚食不下治飲食不下腹中雷鳴穴魂門治吐逆飲食不下穴三焦腧治飲食不下穴胃倉意舍膈關治嘔吐筋攣食不下穴胃腧治食不下喜飲穴大腸腧周榮治膈氣食不下穴中庭中府治飲食不下穴腸膈期門少商勞宫治胃弱食飲不下穴心腧治膈寒食不下腹脇滿胃弱食少嗜卧怠惰不欲動身温不能食又云主吐食穴膈腧治食不下腹中雷鳴大小便下黄水穴陽綱治飲食不下穴紫宫中庭膽腧治榖不化穴三里大腸腧三陰交下脘三焦腧懸樞梁門治食不化穴天樞志室腎腧治寒中食不化穴腹衰治水榖不消腹脹腰痛吐逆穴三焦腧治食不化穴腹哀太白治不欲食入不化穴石門治食不化不嗜食俠臍痛穴天樞厲兊内庭治食不化穴章門治寒中傷飽食飲不化穴上脘中脘治胸脇滿食不下穴中庭治小腹積聚堅大如盤胃脹食不消穴胃脘三焦腧治食不下穴志室治食不化穴太白公孫治食不下穴中府胃倉承滿魚際周榮治食不化穴中脘三陰交不能食治腦痛不能食資生經穴然谷治不能食穴豐隆治饑不能食穴中極治嘔吐筋攣食不下不能食穴維道治三焦有水氣不能食穴維道治不欲食榖入不化穴石門治醉酒風熱發不能飲食嘔吐穴率谷治不能食腹中氣滿喫食無味穴少商治不能食穴分水治煩滿吐食腹脹不能食穴胃腧治胃中寒氣不能食胸脇滿身痩不能食胸滿膈上逆氣悶熱穴大腸腧灸二七壯小兒减之治腹滿不能食胃氣不足反胃不能飲食腸癖臟腑積聚及飲食不消寒熱穴三里治不能食胸中滿膈上逆氣悶熱灸心腧二七壯小兒减之不嗜食治不嗜食資生經刺然谷多見血使人立饑治食不化不嗜食俠臍急穴天樞厲兊内庭治身黄有微熱不嗜食穴中封治飲食不化入腹還出熱中不嗜食苦吞而聞食嗅傷飽身黄酸疼羸痩穴章門治上氣嘔吐肢滿不嗜食穴肺腧治腹痛不嗜食穴胃腧脾腧治不嗜食穴地機隂陵泉水分幽門小腸腧治大腑氣寒不嗜食穴下脘治胃熱不嗜食穴下㢘懸鍾治病饑不欲食穴三隂交治腹滿中焦客熱不嗜食心腹脹滿胃熱不嗜食穴懸鍾治不嗜食穴陽綱治胃虚脹不嗜食穴水分資生經云不嗜食有數端有三焦客熱不嗜食有胃熱不嗜食有胃寒不嗜食有六腑氣寒不嗜食固隨症用藥治之而針灸者亦當知補㵼之法可也史記楊虚侯病甚衆醫皆以為蹷太倉公診脉以為脾根在右脇下大如覆杯令人喘逆氣不能食病得之内即以火齊粥且飲是日氣下即令更服丸藥出入六日病已然則人之不能食亦有患脾而得者槩曰胃有寒熱不可也扁鵲治心風腹脹滿食不消化四肢羸露不欲食穴灸心腧肝腧治心痛不嗜食穴曲泉治心痛不嗜食通身浮腫男子如蠱女子如妊娠五指端盡痛腹不得覆地宜灸針千金云忽忽喜忘身體腰脊如解大便難小便不利足中清至膝咽中痛不可納食瘖不能言衂不止穴涌泉治食多身痩洩痢體重四肢不收腹痛不嗜食穴脾腧治胃寒腹脹不嗜食羸痩穴胃腧食氣治食氣惡聞食臭穴三里治食氣穴大杼治喫食無味穴百㑹少商治身重不得食食無味心下虚滿時時欲下喜卧穴針胃脘大倉又服建中湯及平胃丸良食多治食飲多身痩穴脾腧治食多身痩穴腎腧治胃中寒脹食多身痩穴胃腧腎腧治食多身痩穴脾腧大腸腧普濟方卷四百二十
