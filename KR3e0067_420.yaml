body:
  text: 普濟方卷四百二十明周王朱橚撰針灸門心氣治心氣亂資生經穴心腧治中風心煩驚悸健忘穴百會治健忘穴神道幽門列缺膏肓腧主惡風邪氣泣出善忘穴百會天府曲池列缺主健忘穴刺足少陰主心忪少力穴大橫灸五十壯療無心力穴百會巨闕療心中悶穴上脘治失志穴委陽療神氣不足失志穴中衝主失志穴內關主心中憒憒穴通谷療心中氣悶不喜聞人語穴鳩尾治無心力忘前失後穴百會王氏云豫舊患心氣凡思慮過多心下怔忪或至自悲感慨必灸百會則以百會有治無心力忘前失後證故也兼服鎮心丹心痛凡心實者則心中暴痛虗則心煩惕然亦不能動失智資生經穴內關治卒心痛汗出穴大敦刺出血即已治心痛穴心腧亶中通谷巨闕太倉神府郤門曲澤大陵治心痛氣短穴期門長強天突俠白中衝治心痛膨膨然心煩亂悶少氣不足息穴尺澤治心懸少氣不足以息穴然谷治心悶痛上氣牽引小腸穴巨關灸二十七壯治心痛如懸穴腎腧復溜大陵雲門治心懸如飢穴間使治心痛如錐刺甚者手足寒至節不息者死保命集穴支溝太溪然谷治心痛色蒼蒼然如死灰狀終日不得太息穴行間治心寒脹滿不得食息噴唾血厥心痛善􅎪心疝太息穴鳩尾治胸痺心痛不得反側及不得息痛無常處穴臨泣治心痛難俯仰及治心寒心疝衝冒死不知人穴中脘治痛搶心穴腹結行間治卒痛煩心中懊憹數欠頻伸心下悸悲穴通理治心痛悲恐相引瘈瘲穴靈道治心痛上搶心不欲食及身腫穴建里治心痛而嘔穴章門治心痛肺脹胃氣上逆穴太泉治心寒脹滿不得食穴鳩尾治暴泄心痛腹脹心痛尤甚保命集穴大都太白治心痛有三蠱多涎不得反側穴上管治心痛喜噫酸穴不容期門治心痛而寒穴少衝治心下有寒痛又治痺虛令人病不樂好太息穴商丘治胸脾心痛穴天井臨泣亶中或百壯治胸脾心痛心腹諸病心痛穴亶中天井灸太倉肝腧治心腹胸滿痞痛灸肝腧治心痛穴中脘治心痛穴建里治心痛周痺穴膈腧治心痛周痺痛無常處穴臨泣治心痺穴魚際王氏云嘗侍親疾纍日不食因得心脾疼發則攻心腹後心痛亦應之至不可忍則與兒女别以藥飲之疼反甚若灸則遍身不勝灸矣不免令兒女以火針微刺之不拘心腹須臾痛定即欲起矣神哉治心痛悲恐相引瘈瘲肘攣暴瘖不能言穴靈道治心痛乾嘔煩滿穴俠白治心痛乾嘔穴極泉治心痛唾血振寒咽乾狂言口僻穴太淵治心痛煩滿舌強穴陰郤中衝治心痛穴厥陰腧神門治面赤心煩痛穴齗交治心胸痛穴天井治心痛不可忍及不得卧穴下脘治心如懸下痛穴外陵治心痛不可忍穴上脘太陵治喘息心痛穴章門治心下痛不欲食及心痛有涎穴建里涌泉治心凡痛有數種冷痛蛔蟲心痛蠱毒霍亂不識人及治心痛蠱毒穴巨闕治心匿不能食反胃霍亂心痛穴中脘治心痛穴曲澤督腧膈腧治心痛不嗜食穴湧泉治卒心痛穴少衝治寒熱心痛背相引痛胸滿悶咳嗽不得息煩心多涎穴心腧治心痛不可忍嘔血煩心穴巨闕療心痛不可忍吐冷酸水及元藏氣灸足大指次指內橫文中各一壯炷如小麥立愈治心懊憹憹微痛煩逆穴心腧治心痛如錐刀刺氣結穴膈腧灸七壯治心痛冷氣上穴龍頷灸百壯治心痛惡氣上脅急痛穴通谷灸五十壯治心痛暴絞急絶欲死穴神府灸百壯在鳩尾正心治心痛暴惡氣穴巨闕灸百壯治心痛堅急氣結穴太倉灸百壯治心痛穴灸胃脘橫文三七壯又灸兩虎口白肉際七壯治腎心痛先取京骨崑崙發針不已取然谷治胃心痛取大都太白治脾心痛取然骨太溪治肝心痛色蒼蒼然如死灰狀終日不得休息保命集取行間太衝治肝心痛取魚際太淵治心痛不可按煩心穴巨闕主心痛有三蠱多涎不得反側危氏方穴上脘主心痛身寒難以俯仰心疝衝胃死不知人穴中脘主心痛如錐針刺穴然谷太溪主心腹中卒痛穴石門主心痛穴陰郤行間治卒心痛多驚瘖不得語咽中如鯁穴間使治心痛善驚穴曲澤治心痛衄血嘔噦驚恐畏人神氣不足穴郤門治心痛胸脅肢滿咳嗽膺胛臂內廉痛穴天泉治久瘧咳逆心痛如錐刺手足寒至節喘息者死穴太溪心痛內九種乃心脾痛非真心痛如真心痛則朝發夕死夕發朝死如難經疏所載是已然此疾有所自産論嘗謂産後心痛若誤以為有所傷療之則虛極而心絡寒甚傳心之經則變為真心痛此一説也巫臣以夏姬之故怨子反曰余必使汝疲於奔命以死子反於是一嵗七奔命遂遇心疾而卒則又因用心而成疾矣然則如之何平居當養其心使之和平疾自不作其次當服鎮心丹之類補養可也若疾將作而針灸亦可以為次也治心腹冷痛王氏玉抱肚法針砂四兩炒俟煙出入􅈨半兩硼砂粉霜各半錢新水拌勻微濕以皮紙貼安懷中候熱發置臍中氣海石門關元血大補本元或置其他冷處汗出立瘥豫自用驗此藥燥則不熱再以新水拌再熱可用十餘次如藥力盡却曝乾再入􅈨等依舊熱舍弟叔浩傳一方只用針砂泥􅈨功效亦同豈以硼砂粉霜價不廉而不用耶王氏云豫舊患心脾發則痛不可忍急用瓦片置炭火中燒令通紅取出投米醋中漉出以紙三二重褁之置疼處稍止冷即再易耆舊所傳也後閲千金方有云凡心腹冷痛熬鹽一半斤尉或熬蠶炒燒石磚蒸尉取其裏溫暖止或蒸土亦能治始知豫家所用蓋出千金方也它日心痛甚急灸中脘數壯覺小腹兩邊有冷氣自下而上至灸處即散此灸之功也本事方載王思和論心忪非心忪也胃之大絡名曰大里絡胸膈兩乳虛而有痰則動更須臾發一陳是其證也審若是又是灸建里矣但不若中脘為要穴云治心疼及治小兒心疼足大拇指中節上灸三壯即止男左女右其有蛔蟲鑽心疼甚醫者不明其症但服此藥大相遠也如是蟲痛作時面必青黑仰身撲手悶亂欲絶止而口吐清水者是也治心痛足心亂文中以麥粒大艾炷灸三壯男左女右每遇痛盛時灸治真心痛論手足青至節心痛甚者旦發夕死夕發旦死療心痛及已死保命集右髙其枕拄其膝欲令腹皮蹙揉灸其臍上三寸胃脘有頃其人患痛短氣欲令人舉手者小舉手問痛差緩則已治蛔心痛以手按其堅持之勿令得移以大針刺之後久持之蟲不動乃出針心下不事刺中有成聚不可取於輸腸中有蟲蛔咬皆不取以小針治心痛引腰脊欲嘔及不息保命集刺足少陰不已取手少陰治心痛腹脹嗇嗇然大便不利保命集刺足太陰治心痛引小腹滿上下無常處便溺難保命集刺足厥陰治心痛但氣不足以息保命集刺手太陰治㵼熱厥心痛保命集穴太溪灸三壯或五七壯治㵼熱厥痛保命集穴崑崙灸三壯或五十七壯治心痛與背相引善恐如從後觸其心傴僂者腎心痛也保命集先刺京骨崑崙不已刺合骨治心痛卧若徒居間動作痛益甚者其色不變此肺心痛也保命集刺魚際太淵宣通靈氣行無所礙滯則病愈治卒心痛不可忍刺任脈上腕針入八分先補後㵼之其穴下針令患人覺針下氣行如滚雞子入腹為度次針氣海二穴足少陰湧泉二穴無積者刺之如食頃而已有積者先飲利藥後刺之立愈如不已刺間使二穴針支溝二穴次針三里二穴如灸冷心痛燔針斜任脈巨闕穴如五臟氣相干心痛者刺之無不愈有小腸氣痃癖膀胱氣脅痛等疾皆痛至心宜審諦不可執一而刺之如汗出刺大敦出血立已治腹有逆氣上攻心腹滿脹上搶心痛不得息氣衝腰痛不得俯仰穴氣衝各灸七壯如大麥禁針次針三里二穴而愈治心痛周痺穴膈腧臨泣治心痛短氣手掌煩熱或啼哭罵詈悲思愁慮面赤身熱其脈實大而數春當刺中衝夏刺勞宫季夏刺大陵皆補之秋刺間使冬刺曲澤皆㵼之又當灸巨闕五十壯背第五顀百壯治心疝暴痛取足太隂治卒心痛肘後方手中央長指端灸三壯又橫度病人口折之以度心厭下度頭灸三下治心疝激痛難忍肘後方巨闕及左右一寸並灸百壯又以繩度頸及度脊如之令正相對凡灸六處治卒心腹滿肘後方乳下一寸灸七壯又兩手大拇指肉邊爪後第一紋頭各灸一壯又兩指中央長指爪下各灸一壯愈治心脾疼痛不可忍足大拇指甲頭當中肉甲之間男左女右灸五壯艾炷如麥粒大經驗方雲景齊芳自創一日婢病此同官郭魯望傳是法立愈治心腹痛嘔逆中脘灸三百壯治心腹絞刺痛不可忍陰都二穴灸三百壯心恍惚治悲愁恍惚穴心腧天井神道治狂驚恍惚灸足陽明治狂癲恍惚灸腦户治狂言恍惚灸天樞治卒中邪魅恍惚左斗關後尺中隂實者腎實也恍惚健忘目視􅉩􅉩耳聾悵悵善鳴刺足少隂至隂治恍惚不知人穴巨闕療少力忘前失後心神恍惚穴百會療心恍惚穴陰都心驚恐治心痛善驚資生經穴曲澤治悲恐穴靈道治暴驚穴下廉治心痺悲恐穴魚際治悲恐善驚穴少衝治心風驚悸穴上脘治悲恐畏人穴少府治驚悸少氣穴神門蠡溝巨闕治大驚亂痛穴梁丘治多驚穴陰郤間使二間厲兊療驚悸穴間使治驚恐穴五里治善驚恐穴京骨大鍾大陵治驚悸穴百會神道天井液門治喜恐穴通谷章門治癲疾風牙腫善驚恐穴天衝治風虛驚恐狂蕩又療驚恐悲愁穴支正治驚恐畏人穴郤門治驚悸不得安寢穴神庭治腦頭風痛目瞑心悸穴腦空主吐舌戾頸善驚穴三間合谷厲兊主心下淡淡善驚穴曲澤大陵主心下悸又療悲恐畏人穴通理主心下惕恐人將捕之穴然谷陽陵泉主驚恐畏人神氣不足穴大鍾郤門主善驚穴大巨主多卧好驚穴厲兊主驚不得卧穴氣海陰交大巨主善驚妄言面赤穴液門主數噫恐悸氣不足穴少府主數噫恐悸氣不足穴神門主驚悸少氣穴巨闕主卧驚視如見鬼穴隂蹻主瘈瘲而驚穴解溪主太息煩滿少氣悲驚穴少衝治心痛數驚心悲不樂穴行間主氣驚心痛穴手少陰療悲恐畏人善驚穴少衝療驚不安寢穴神庭療善驚穴曲澤療大驚穴梁丘療多悲恐驚悸穴風府療心驚悸神氣耗散穴鳩尾治驚怖恐心忪少力穴大橫灸五十壯治驚悸穴上脘治驚悸穴天井治善驚穴厲兊治悸坐不安穴彧中心喜笑主笑若狂資生經穴神門陽谷主喜笑不止穴勞宫太陵主喜笑穴列缺治喜笑不休穴太陵治狂言喜笑見鬼穴陽溪治失笑無時節穴水溝治喜怒穴復溜療心悲怒穴魚際療多怒穴肝腧主怒欲殺人穴身柱心憂悲主心悲資生經穴漏谷治心悲穴商丘治悲恐穴靈道治恍惚悲愁穴神道主悲愁恍惚悲傷不樂穴天井心腧神道主大風默默不知所痛悲傷不樂又療驚悸悲傷穴天井治大風逆氣多寒善悲穴大橫治善悲不樂穴照海治太息善悲小腹熱欲走多唾言語不正四肢不收穴日月治悲恐善驚穴少衝療驚恐悲愁穴支正治煩滿少氣悲恐畏人掌熱腹腋攣急胸痛手倦不伸穴少府治悲笑穴勞宫治善悲泣穴心腧神門解溪大陵主善悲穴間使主悸悲穴通理主心悲穴行間勞宫主泣出穴百會治憂心灸絶骨治乍哭穴水溝王氏云母久病忽泣涕不可禁知是心病也灸百會而愈豫凡遇憂愁悽愴亦必灸此有此疾者不可不之信也治泣出而驚穴後溪心煩悶治瘧心煩甚欲得飲冷惡寒則欲處溫中咽乾不嗜食心痛數噫恐悸少氣不足手臂寒喘逆身熱狂悲哭嘔血遺溺資生經穴神門治淡熱嘔逆上氣穴中府治淡虛穴三陽絡灸各十三壯歎息主太息煩滿少氣悲驚資生經穴少衝主不得太息穴行間凡好太息不嗜食多寒熱汗出病至則喜嘔嘔已乃衰穴取公孫井腧實則腸中切痛厥頭面腫起煩心狂多飲不嗜卧虛則鼓脹腹中氣滿熱痛不嗜食霍亂公孫主之治太息善悲穴日月商丘治太息穴行間療腦脅痛善太息腦滿膨膨穴丘墟嗜卧治多