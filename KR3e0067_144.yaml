變成瘧狀䜴心一合川大黄三兩剉碎微炒恒山川升麻各一兩附子半兩炮裂去皮臍右為末錬蜜為丸如梧桐子大每服食前以温水下二十一丸治傷寒後發温瘧恒山川大黄剉碎微炒黄丹炒令紫色各半兩右為末錬蜜為丸如梧桐子大每服食前以升麻湯下十五丸知母升麻湯治傷寒後變成瘧病寒熱燥渴知母石膏升麻各一兩蜀漆常山甘草炙各一兩烏梅去核半兩右㕮咀每服五錢匕水一盞半煎至八分去滓食後温服二黄湯治傷寒後變成瘧疾口乾煩渴麻黄去根節大黄剉炒𤓰蔞根各一兩甘草炙微赤半兩右㕮咀每服五錢匕水一盞半煎至八分去滓食後温服升麻前胡湯治傷寒後變成瘧疾寒熱燥渴升麻前胡去蘆頭各一兩知母焙芍藥各三分朴硝山梔子仁木通剉烏梅去核各半兩甘草炙剉一分右麄𢷬篩每服五錢匕水一盞半入生薑一片棗一枚同煎至七分去滓入生地黄汁二合更煎一沸食後温服人參常山湯治傷寒後變成瘧疾痰壅脾肺面色浮腫人參常山各半兩生甘草陳橘皮湯浸去白焙各一分燈心十莖右細剉拌勻用水二盞酒一盞同煎至兩盞去滓入好茶末二錢匕分作兩服取吐即瘥黄芩鼈甲湯治傷寒變成勞瘧久不瘥黄芩去黒心柴胡去苗山梔子仁烏梅去核各半兩鼈甲去裙襴醋炙一兩甘草炙一分右麄𢷬篩每服五錢匕用童子小便一盞半入桃柳尖各七箇生薑一片棗一枚豉半合同浸一宿平旦煎至七分去滓入生地黄汁一合攪勻更煎一沸温服不拘時蜀漆鼈甲丸治傷寒後肝瘧由邪熱客於足厥隂經所成顔色蒼蒼戰掉似熱勞鼈甲去裙襴醋炙蜀漆知母焙烏梅苦參常山萎蕤各一兩䜴一合熬石膏二兩細辛去苗葉甘草炙各三分右為末錬蜜和𢷬數百下丸如梧桐子大每服十五丸空心温酒下晩再服常山石膏湯治傷寒後心瘧令人煩熱不止飲水多渇常山鼈甲去裙襴醋炙犀角屑蜀漆各一兩甘草炙烏梅去核各一分山梔子半兩石膏一兩半右麄𢷬篩每服五錢匕水一盞半入䜴三七粒淡竹葉二七片生薑一片棗一枚同煎至八分去滓食後温服日二常山丸治傷寒後脾瘧脾臟受熱或渇或不渴熱氣入内傷不得大便腹中熱痛身寒汗出常山二兩知母焙鼈甲去裙襴醋炙各一兩甘草炙半兩右為末煉蜜和𢷬數百下丸如梧桐子大每服十五丸未發前温酒下發時再服三味湯治傷寒後肺瘧痰熱聚於胸膈令人心寒甚則發熱熱則驚有所見者常山一兩秫米半合甘草炙剉一分右麄𢷬篩每服五錢匕水一盞半入生薑一片棗一枚同煎至八分去滓臨發時温服常山柴胡湯治傷寒後腎瘧令人悽悽腰脊痛而宛轉大便難手足寒常山柴胡去苖麥門冬去心焙各一兩烏梅去核半夏湯浸七遍炒乾梹榔剉枳殻去穰麩炒各半兩右麄𢷬篩每服三錢匕水一盞入生薑一片棗一枚淡竹葉二十片䜴二七粒同煎至七分去滓臨發時温服太乙護命丸治傷寒後變成瘧疾或取轉早隂氣結伏心下成塊或膨滿嘔逆喘哫面黒唇青四肢逆冷飲食不下并氣結食毒宜服此丸陽起石硫黄附子炮裂去皮臍各一兩金星石銀星石白石英紫石英礞石滑石硝石凝水石煆磁石火燒醋淬太隂𤣥精石耳鍋子累經銷金銀者不灰木各半兩丹砂一分巴豆四十九粒去心及出油杏仁四十九粒湯浸去皮尖雙仁炒右為末再同研極細用阿魏一分與糯米粥同研勻丸如櫻桃大每服一丸麩炭火内燒赤取出兩隻盞子合在内候冷細研以生薑米飲下未好再服茯苓散治傷寒後熱不退成瘧時作赤茯苓去黒皮鼈甲去裙襴醋炙地骨皮各三兩柴胡去苖知母焙各一兩枳殻去穣麩炒一兩右剉如麻豆大每服五錢匕水一盞半煎至七分去滓入生地黄汁一合食後良久温服如人行五六里再服柴胡散出廣南衛生方治傷寒後發瘧柴胡一兩去苖半夏二錢半湯浸七遍桂枝二錢削凈秤甘草一錢半炙白芍藥二錢半去皮炒右為末每服二錢水一盞半入生薑七片棗四枚同煎至一盞去滓温服寒熱纔愈便止此藥小柴胡湯出如宜方治先寒後熱熱多寒少黄芩人參甘草各三兩柴胡八兩半夏製二兩半右㕮薑五片棗一枚煎服寒多加肉桂寒熱相等不加五福丹出保生囬車論硃砂硫黄雄黄以上各一兩研細硼砂硝石以上各兩半五味並用精者揀去砂石合研細右用磁合子一個裏有油者用乳香少許香爐中燒烟起即熏合内入前藥貯定油調蛤粉固口再加紙筋泥固濟一指厚隂乾凈室中塼上坐合子醋拌灰少許擁抱合子上過口縫可一指厚以生炭三斤簇合周圍次又上熟炭火一斤在合上漸令通灼候火消至八分已上即撥開殘火俟良久冷透開合取藥盡作汁如鏡面搥碎研極細粳米飯和丸如豌豆大及如粗菉豆大硃砂為衣每於發前一日臨卧時温粥飲吞下一粒發作前一時温粥飲再下一粒至日自愈靈砂丹一名龍虎丹出保生回車論硃砂研細水飛晒乾硫黄研極細右二味各一錢研極細用醇酒八分一盞貯銀器或磁甌中用文武火熬将竹篾不住手攪熬至六分去火候冷以發作前一二時頓服忌口永不再發又方常山二兩細剉鼈甲醋炙紫色二兩芍藥三兩剉黄連一兩黄芩一兩柴胡去苗二兩甘草一兩炙青蒿子一兩半如無用茵陳蒿右為麄末每服五錢水二盞烏梅半兩以慢火煮至一盞去滓露一宿發作前一日進服於發作時再進一服即愈傷寒發豌豆瘡滅瘢痕夫傷寒之病發豌豆瘡者皆是熱毒所致其毒氣中於臟腑餘毒之氣衝於肌肉而生瘡痍及其痊則瘡愈而毒氣尚未全散故瘡雖落其瘢猶黶或凹凸肉起宜用消毒滅瘢之藥以傅焉方鷹糞白膏出聖恵方治傷寒發豌豆瘡瘥後瘢痕不沒宜塗鷹糞白半合辛夷一兩白附子一分杜若二兩細辛二兩右搗碎以酒一升浸一宿入羊髓五兩慢火熬五七沸去滓盛於磁合中每用時新布揩瘡瘢令熱後以藥薄塗之朴硝膏出聖恵方治傷寒後發豌豆瘡初瘥宜塗川朴硝一兩細研如粉猪膽一枚取汁右調如膏摩瘡瘢上勿令動着任瘡痂自落白芷膏出聖恵方治傷寒後發豌豆瘡瘥後滅瘢宜塗白芷當歸各一兩雞屎白五兩右用猪脂七兩麻油三兩以慢火煎白芷當歸色黄去滓後将雞屎白攪和煎如膏入磁器内盛每日塗摩瘡瘢上白斂膏出聖恵方治傷寒後豌豆瘡瘥後滿面瘡瘢久不沒宜塗白斂三分礬石半兩剉用白石脂一分杏仁一分湯浸去皮尖雙仁研如膏右為細散次加杏仁膏研令勻後入新雞子白一枚酥二兩相和研為膏入磁器内每夜取塗面上來日以温浆水洗之猪蹄湯洗方出聖恵方治傷寒生豌豆瘡新瘥後滿面瘡瘢猪蹄一兩川芎藭萎㽔桑白皮白术白茯苓商陸白芷以上各半兩右細剉先以水二斗煮猪蹄至一斗五升去猪蹄下藥煎至八分去滓每夜洗之白附子膏出聖恵方治傷寒生豌豆瘡瘥後瘢痕不消宜塗白附子密陀僧洗研為粉川芎藭白茯苓各半兩牡蠣煆一錢右為細散更研令極細以酥調傅之𤓰蔞子膏治傷寒生豌豆瘡瘥後瘢痕赤腫不消宜塗𤓰蔞子一升湯浸擘取細研如膏白石脂一兩搗羅為末麝香一分細研雄雀糞半兩白色者細研右研令勻用兎絲子苖研取自然汁調如膏夜間先煎葱白湯洗面後塗藥明旦以煖浆水洗之玉屑膏出聖恵方治傷寒熱毒發豌豆瘡瘥後滿面瘢痕玉屑蜜陀僧附子生去皮臍搗為細末珊瑚以上各一兩右研令細每度以藥末二錢用真牛酥調勻夜卧塗面來日以温浆水洗之又方出聖恵方鷹白糞一兩半白僵蠶二兩右先搗僵蠶為末次将鷹白糞同研如粉以白蜜調如稀餳塗於瘢上日二易之又方出聖恵方杏仁一兩湯浸去皮尖雙仁研如膏雞子白二枚右和調如稀餳每夜塗瘡瘢上至旦以浆水洗之又方出聖恵方雞子七枚煮熟用黄亂髪一兩剪碎右用銅銚子炒令髪消盡成油用薄綿濾入磁合中盛夜卧時塗摩之又方出聖恵方馬齒莧自然汁五合蛤粉二兩細研右調和令勻每日塗搽又方出聖恵方升麻二兩白蜜三兩右用水一大盞煎升麻取半盞濾去滓下蜜更煎良久候冷漸漸取塗普濟方卷一百四十五
