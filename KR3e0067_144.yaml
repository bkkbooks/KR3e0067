body:
  text: 普濟方卷一百四十五明周王朱橚撰傷寒門傷寒後虛驚悸附論夫傷寒後虛損心氣不足致多驚悸此由邪熱乘於心也心主於血心主於神血脈亂則神氣不定故令驚悸也又云傷寒病後心氣不足風邪乘之則令精神不寧恍惚驚悸此由憂愁思慮致心氣虛邪氣內乘故神氣不得安定而生驚悸也方白茯苓散出聖惠方治傷寒後心虛驚悸或時妄語四肢煩熱肌體羸瘦白茯苓石膏人參去蘆頭熟乾地黃各一兩半夏湯洗七次去滑黃芩桂心麥門冬逺志各一兩半右為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓下飴糖一分攪令勻不計時候溫服紫石英散出聖惠方治傷寒後心虛驚悸煩悶及咽喉不利面目忽赤忽黃虛羸少力紫石英細研桂心紫菀洗去苗土白茯苓各一兩麥門冬去心焙一兩半人參去蘆頭黃耆銼各一兩甘草炙微赤銼半兩熟乾地黃二兩右為散入石英和勻每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服人參散出聖惠方治傷寒後心虛驚悸恍惚不安人參去蘆頭茯神去本各一兩陳橘皮三分湯浸去白焙杏仁湯浸去皮尖雙仁麩微炒一分右為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時溫服聖濟方無棗三枚煎至半盞名人參茯神湯龍齒散出聖惠方治傷寒後心虛驚悸煩熱口乾頭項時疼龍齒一兩子芩防風去蘆頭茯神各三分川升麻大青各半兩人參三分去蘆頭石膏一兩右為散每服三錢水一中盞煎至六分去滓入竹瀝半合攪勻不計時候溫服逺志散出聖惠方治傷寒後心虛驚悸恍惚多忘或夢驚魘及諸不足逺志去心人參去蘆頭龍齒茯神紫石英細研赤石脂當歸銼微炒桂心甘草炙微赤銼白术白芍藥紫菀洗去苖土防風麥門冬去心焙各一兩右為散入石英相和勻每服五錢水一大盞入棗三枚煎至五分去滓不計時候溫服茯神散出聖惠方治傷寒後虛羸心氣乏弱驚悸多忘茯神黃耆炙菖蒲各一兩白芍藥人參去蘆頭各一兩逺志去心三分右為散每服三錢以水一中盞入棗三枚煎至六分去滓不計時候溫服龍齒丸出聖惠方治傷寒後伏熱在心心虛驚悸龍齒人參去蘆頭茯苓生乾地黃各一兩逺志去心鐵粉細研各三分防風去蘆頭三分麥門冬一兩半去心焙黃連去鬚三分馬牙硝細研三分麝香半分細研右為細末都研令勻錬蜜和丸如梧桐子大每服二十丸竹葉金銀湯下不計時候防風丸出聖惠方治傷寒後心虛驚悸精神昏亂煩悶四肢沉重不能飲食防風一兩半去蘆頭茯神一兩半人參一兩半去蘆頭天門冬一兩半去心焙黃連半兩去鬚豉一合白术二兩土炒右為細末錬蜜和丸如梧桐子大每服二十丸粥飲下不計時候人參丸出聖惠方治傷寒後心虛驚悸卧起不安食全少人參去蘆頭茯神各三分黃連去鬚一兩麥門冬一兩去心焙白术三分土炒柏子仁三分去油枳殼三分麩炒微黃去心穰黃耆三分銼甘草三分炙微赤銼陳橘皮半兩湯浸去白穰焙厚朴半兩去粗塗生薑汁炙龍齒三分右為末錬蜜丸如梧桐子大每服三十丸粥飲下不計時候定志丸出聖惠方治傷寒後或用心力勞倦四肢煩弱心虛驚悸翕翕短氣茯神一兩逺志半兩去心麥門冬一兩半去心焙人參三分去蘆頭熟地黃一兩甘草半兩炙微赤銼黃耆三分銼桂心半兩牛膝半兩去苗澤瀉半兩右為末鍊蜜為丸如梧桐子大每服三十丸以粥飲下不計時候酸棗仁丸出聖惠方治傷寒後心虛驚悸發即恍惚不定睡卧不安酸棗仁三分微炒枸杞子三分甘菊花三分白茯苓三分人參三分去蘆頭防風三分去蘆頭桂心三分柏子仁三分逺志半兩去心天門冬去心焙一兩半赤石脂一兩龍齒一兩右為末錬蜜為丸如梧桐子大每服三十丸粥飲下不計時候黃耆丸出聖惠方治傷寒後心虛驚悸恍惚不定黃耆銼人參去蘆頭各半兩龍齒一兩茯神三分鐵粉一兩細研金銀箔各五十片細研防風半兩去蘆頭逺志半兩去心熟乾地黃三分右為細散入鐵粉金銀箔都研令勻錬蜜和丸如梧桐子大每服二十丸粥飲下不計時候龍齒丸出聖惠方治傷寒後心虛驚悸神氣不定龍齒一兩人參去蘆頭一兩虎睛一對酒浸一宿微炙茯神一兩犀角屑一兩龍膽一兩去蘆頭鬼臼三分去苖桂心一兩防風半兩去蘆頭逺志三分去心甘草一分炙微赤銼麝香一錢細研右為末麝香研令勻錬蜜為丸如梧桐子大每服三十丸不計時候金銀湯下羚羊角丸出聖惠方治傷寒後心肺壅熱背膊煩悶心虛驚悸眼澀口乾羚羊角三分川升麻梔子仁各一兩玄參三分麥門冬去心焙龍齒各一兩半金銀箔各五十片與馬牙硝同研令細茯神一兩半知母一兩防風一兩去蘆頭子芩一兩赤芍藥一兩大麻仁一兩半另研如膏馬牙硝二兩細研右為末入金銀箔馬牙硝麻仁同研令勻錬蜜和丸如梧桐子大每服三十丸竹葉湯下不計時候人參湯治傷寒後壅熱心忡驚悸人參三分犀角屑甘草炙黃芩去黑心玄參堅者秦芃去苖土地骨皮各半兩右粗搗篩每服三錢匕水一盞煎至五分去滓下竹瀝一合攪勻食後溫服茯神湯治傷寒後心熱煩夢睡多驚悸茯神三分去木犀角屑龍齒各一兩麥門冬去心焙一兩升麻半兩玄參堅者半兩竹茹一兩芍藥三分馬牙硝一兩半右粗搗篩每服三錢匕水一盞煎至五分去滓下地黃汁一合攪令勻食後溫服麥門冬飲治傷寒後心忪驚悸煩熱口乾麥門冬去心焙一兩龍齒三分山梔子仁玄參堅者各半兩芍藥三分木通銼一兩人參茅根各三分右粗搗篩每服五錢匕水一盞半入生薑半分拍碎同煎至七分去滓下生藕地黃汁各一合攪勻食後分溫二服犀角湯出濟生拔萃方治傷寒後伏熱在心怔忪驚悸不得眠睡犀角屑半兩茵陳蒿三分茯神去木二兩山梔子仁半兩芍藥一兩半麥門冬去心焙一兩半生乾地黃二兩焙右粗搗篩每服五錢匕水一盞半入生薑半分拍碎竹葉三七片同煎至七分去滓食後溫服前胡湯治傷寒後驚悸不定前胡去蘆頭茯神去木人參各一兩逺志去心一兩半甘草炙一分右粗搗篩每服二錢匕水一盞同煎至七分去滓溫服不計時候麥門冬湯治傷寒後心虛忪悸麥門冬去心焙茯神去木菊花人參各一兩甘草炙半兩右粗搗篩每服三錢匕水一盞煎至半盞去滓溫服紫石英湯治傷寒後驚悸煩悶虛羸少力紫石英研桂去粗皮紫菀去苖土白茯苓去黑皮麥門冬去心焙人參黃耆銼各一兩甘草炙半兩右粗搗篩每服五錢匕水一盞半入棗三枚擘破煎至七分去滓溫服不計時候龍骨湯治傷寒後心氣虛悸恍惚多忘或夢寐不安龍骨研人參茯神去木紫石英研赤石脂當歸切焙乾薑炮桂去粗皮甘草炙白术芍藥紫菀去苖土防風去蘆各一兩逺志去心焙半兩右粗搗篩每服五錢匕水一盞半入棗三枚擘破同煎至七分去滓食前溫服茯神丸治傷寒後或用心力勞倦四肢羸弱心忪驚悸吸吸短氣茯神去木麥門冬去心焙熟乾地黃焙各一兩牡丹皮人參黃耆銼各三分桂去粗皮甘草炙牛膝去苖澤瀉各半兩右搗羅為末錬蜜和搗三百杵丸如梧桐子食前溫酒下二十丸傷寒後夾勞附論夫傷寒後氣血未實臟腑尚虛餘毒之氣猶存淹延時日不瘥肌體羸瘦肢節痠痛壯熱憎寒心煩盜汗上氣咳嗽嘔逆痰涎飲食不消腹中癖塊口乾舌澀折骨痿面赤青黃氣力虛弱此皆由虛損致成夾勞也又云傷寒瘥後復夾勞者由病人先有夙疾因汗下之後榮衛虛弱氣不復常行體羸少力時有盜汗寒熱不常喘咳嗽痰唾鼻中臭氣飲食不消肢體痠痛面黃頰赤不即治之則致危殆方前胡散治傷寒後夾勞寒熱時作咳嗽盜汗四肢疼痛頰赤面黃心胸不利前胡一兩去蘆頭白蘚皮柴胡去苖桑根白皮銼大腹皮銼黃耆銼訶梨勒皮白术青橘皮湯浸去白穰焙各三分半夏二兩湯浸七遍去滑甘草半兩炙微赤銼右為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服柴胡散治傷寒後夾勞骨節煩疼時有寒熱咳嗽頭痛柴胡去苖貝母煨令微黃白术半兩人參去蘆頭赤芍藥石膏各一兩黃芩三分知母梔子仁半兩杏仁一兩湯浸去皮尖雙仁麩炒微黃鱉甲一兩炙右為散每服五錢水一大盞入生薑半分煎至五分去滓不計時候溫服熟乾地黃散治傷寒後夾勞骨節疼痛不能飲食四肢少力熟乾地黃一兩黃芩三分白芍藥一兩五味子三分桂心半兩甘草半兩炙微赤銼當歸半兩銼微炒半夏湯浸七次去滑人參半兩去蘆頭右為散每服五錢水一大盞入生薑半分煎至五分去滓不計時候溫服鱉甲散治傷寒後夾勞四肢煩熱骨節疼痛不思飲食時時咳嗽心胸痰壅鱉甲一兩半塗醋炙令去裙襴柴胡一兩半去苗秦芃半兩去苖紫菀半兩洗去土苗桔梗三分去蘆頭麻黃三分去根節知母三分桃仁一兩湯浸去皮尖雙仁麩炒微黃半夏半兩湯浸七次去滑桂心半兩黃耆三分銼陳橘皮半兩湯浸去白穰焙右為散每服五錢以水一大盞入薑半分煎至五分去滓不計時候溫服柴胡散治傷寒後夾勞體瘦少力四肢疼痛心膈痰壅時有咳嗽不思飲食柴胡一兩去苖鱉甲一兩塗醋炙令黃去裙襴白术三分人參三分去蘆頭天門冬一兩去心桑根白皮半兩銼枳殼半兩麩炒微黃去穰桂心半兩當歸半兩銼微炒百合三分紫菀三分洗去苖土桔梗半兩去蘆頭欵冬花半兩麥門冬半兩去心陳橘皮半兩湯浸去白穰焙黃芩半兩枇杷葉三分拭去毛炙令黃甘草半兩炙微赤銼右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服紫蘇散治傷寒後夾勞脾胃氣虛心腹煩悶壯熱憎寒飲食不多咳嗽痰涎腦悶小便黃赤紫蘇莖葉一兩赤茯苓三分麥門冬半兩去心木香半兩人參一兩去蘆頭陳橘皮三分湯浸去白穰焙紫菀半兩洗去苗土柴胡三分去苖桂心三分當歸三分銼微炒半夏三分湯浸七次去滑白术半兩知母半兩桑根白皮半兩銼犀角屑半兩黃芩半兩檳榔半兩枳殼三分麩炒微黃去穰右為散每服五錢以水一大盞入生薑半分煎至五分不計時候溫服犀角散出聖惠方治傷寒後夾勞煩熱四肢疼痛不欲飲食犀角屑三分赤茯苓三分枳殼三分麩炒微黃去穰柴胡一兩半去苗白术三兩鱉甲一兩半塗醋炙令黃去裙襴知母半兩赤芍藥三分甘草半兩炙微黃銼右為散每服五錢以水一盞入生薑半分煎至五分去滓不計時候溫服秦艽散出聖惠方治傷寒後夾勞黃瘦體熱四肢煩疼不欲飲食秦芃一兩去苗人參三分去蘆頭鱉甲一兩塗醋炙令黃去裙襴白术一兩半夏半兩湯浸七次去滑五味子半兩甘草半兩炙微赤銼柴胡一兩去苗黃芩半兩桔梗半兩去蘆頭麥門冬半兩去心黃耆一兩銼右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服旋覆花散出聖惠方治傷寒後夾勞胸膈痰壅不思飲食氣攻背膞腰脊痠疼旋覆花一兩半夏三分湯浸七次去滑麥門冬半兩去心知母半兩甘草半兩炙微赤銼赤芍藥半兩柴胡三分去苗人參半兩去蘆頭陳皮半兩湯浸去白穰焙百部半兩赤茯苓三分前胡一兩去蘆頭右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服木香丸出聖惠方治傷寒後夾勞四肢無力脾氣弱飲食無味肩背疼痛木香半兩鱉甲一兩塗醋炙令黃去裙襴白茯苓三分柴胡一兩去苗半夏半兩湯浸七次去滑桔梗三分去蘆頭枳殼三分麩炒微黃去穰五味子半兩陳橘皮三分湯浸去白穰焙黃耆半兩銼桃仁一兩湯浸去皮尖雙仁麩炒微黃白芍藥一兩右為末錬蜜丸搗三二百杵丸如梧桐子大每服三十