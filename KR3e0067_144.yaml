body:
  text: 普濟方卷一百四十五明周王朱橚撰傷寒門傷寒後虚驚悸附論夫傷寒後虚損心氣不足致多驚悸此由邪熱乗於心也心主於血心主於神血脉亂則神氣不定故令驚悸也又云傷寒病後心氣不足風邪乗之則令精神不寧恍惚驚悸此由憂愁思慮致心氣虚邪氣内乗故神氣不得安定而生驚悸也方白茯苓散出聖恵方治傷寒後心虚驚悸或時妄語四肢煩熱肌體羸痩白茯苓石膏人參去蘆頭熟乾地黄各一兩半夏湯洗七次去滑黄芩桂心麥門冬逺志各一兩半右為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓下飴糖一分攪令勻不計時候温服紫石英散出聖恵方治傷寒後心虛驚悸煩悶及咽喉不利面目忽赤忽黄虛羸少力紫石英細研桂心紫菀洗去苗土白茯苓各一兩麥門冬去心焙一兩半人參去蘆頭黄耆剉各一兩甘草炙微赤剉半兩熟乾地黄二兩右為散入石英和勻每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候温服人參散出聖恵方治傷寒後心虚驚悸恍惚不安人參去蘆頭茯神去本各一兩陳橘皮三分湯浸去白焙杏仁湯浸去皮尖雙仁麩微炒一分右為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時温服聖濟方無棗三枚煎至半盞名人參茯神湯龍齒散出聖恵方治傷寒後心虛驚悸煩熱口乾頭項時疼龍齒一兩子芩防風去蘆頭茯神各三分川升麻大青各半兩人參三分去蘆頭石膏一兩右為散每服三錢水一中盞煎至六分去滓入竹瀝半合攪勻不計時候温服逺志散出聖恵方治傷寒後心虚驚悸恍惚多忘或夢驚魘及諸不足逺志去心人參去蘆頭龍齒茯神紫石英細研赤石脂當歸剉微炒桂心甘草炙微赤剉白术白芍藥紫菀洗去苖土防風麥門冬去心焙各一兩右為散入石英相和勻每服五錢水一大盞入棗三枚煎至五分去滓不計時候温服茯神散出聖恵方治傷寒後虛羸心氣乏弱驚悸多忘茯神黄耆炙菖蒲各一兩白芍藥人參去蘆頭各一兩逺志去心三分右為散每服三錢以水一中盞入棗三枚煎至六分去滓不計時候温服龍齒丸出聖恵方治傷寒後伏熱在心心虚驚悸龍齒人參去蘆頭茯苓生乾地黄各一兩逺志去心鐵粉細研各三分防風去蘆頭三分麥門冬一兩半去心焙黄連去鬚三分馬牙硝細研三分麝香半分細研右為細末都研令勻錬蜜和丸如梧桐子大每服二十丸竹葉金銀湯下不計時候防風丸出聖恵方治傷寒後心虚驚悸精神昏亂煩悶四肢沉重不能飲食防風一兩半去蘆頭茯神一兩半人參一兩半去蘆頭天門冬一兩半去心焙黄連半兩去鬚豉一合白术二兩土炒右為細末錬蜜和丸如梧桐子大每服二十丸粥飲下不計時候人參丸出聖恵方治傷寒後心虚驚悸卧起不安食全少人參去蘆頭茯神各三分黄連去鬚一兩麥門冬一兩去心焙白术三分土炒栢子仁三分去油枳殻三分麩炒微黄去心穰黄耆三分剉甘草三分炙微赤剉陳橘皮半兩湯浸去白穰焙厚朴半兩去麄塗生薑汁炙龍齒三分右為末錬蜜丸如梧桐子大每服三十丸粥飲下不計時候定志丸出聖恵方治傷寒後或用心力勞倦四肢煩弱心虚驚悸翕翕短氣茯神一兩逺志半兩去心麥門冬一兩半去心焙人參三分去蘆頭熟地黄一兩甘草半兩炙微赤剉黄耆三分剉桂心半兩牛膝半兩去苗澤瀉半兩右為末鍊蜜為丸如梧桐子大每服三十丸以粥飲下不計時候酸棗仁丸出聖恵方治傷寒後心虚驚悸發即恍惚不定睡卧不安酸棗仁三分微炒枸杞子三分甘菊花三分白茯苓三分人參三分去蘆頭防風三分去蘆頭桂心三分栢子仁三分逺志半兩去心天門冬去心焙一兩半赤石脂一兩龍齒一兩右為末錬蜜為丸如梧桐子大每服三十丸粥飲下不計時候黄耆丸出聖恵方治傷寒後心虚驚悸恍惚不定黄耆剉人參去蘆頭各半兩龍齒一兩茯神三分鐵粉一兩細研金銀箔各五十片細研防風半兩去蘆頭逺志半兩去心熟乾地黄三分右為細散入鐵粉金銀箔都研令勻錬蜜和丸如梧桐子大每服二十丸粥飲下不計時候龍齒丸出聖恵方治傷寒後心虚驚悸神氣不定龍齒一兩人參去蘆頭一兩虎睛一對酒浸一宿微炙茯神一兩犀角屑一兩龍膽一兩去蘆頭鬼臼三分去苖桂心一兩防風半兩去蘆頭逺志三分去心甘草一分炙微赤剉麝香一錢細研右為末麝香研令勻錬蜜為丸如梧桐子大每服三十丸不計時候金銀湯下羚羊角丸出聖恵方治傷寒後心肺壅熱背膊煩悶心虚驚悸眼澁口乾羚羊角三分川升麻梔子仁各一兩𤣥參三分麥門冬去心焙龍齒各一兩半金銀箔各五十片與馬牙硝同研令細茯神一兩半知母一兩防風一兩去蘆頭子芩一兩赤芍藥一兩大麻仁一兩半另研如膏馬牙硝二兩細研右為末入金銀箔馬牙硝麻仁同研令勻錬蜜和丸如梧桐子大每服三十丸竹葉湯下不計時候人參湯治傷寒後壅熱心忡驚悸人參三分犀角屑甘草炙黄芩去黒心𤣥參堅者秦芃去苖土地骨皮各半兩右麄𢷬篩每服三錢匕水一盞煎至五分去滓下竹瀝一合攪勻食後温服茯神湯治傷寒後心熱煩夢睡多驚悸茯神三分去木犀角屑龍齒各一兩麥門冬去心焙一兩升麻半兩𤣥參堅者半兩竹茹一兩芍藥三分馬牙硝一兩半右麄𢷬篩每服三錢匕水一盞煎至五分去滓下地黄汁一合攪令勻食後温服麥門冬飲治傷寒後心忪驚悸煩熱口乾麥門冬去心焙一兩龍齒三分山梔子仁𤣥參堅者各半兩芍藥三分木通剉一兩人參茅根各三分右麄𢷬篩每服五錢匕水一盞半入生薑半分拍碎同煎至七分去滓下生藕地黄汁各一合攪勻食後分温二服犀角湯出濟生抜萃方治傷寒後伏熱在心怔忪驚悸不得眠睡犀角屑半兩茵陳蒿三分茯神去木二兩山梔子仁半兩芍藥一兩半麥門冬去心焙一兩半生乾地黄二兩焙右麄𢷬篩每服五錢匕水一盞半入生薑半分拍碎竹葉三七片同煎至七分去滓食後温服前胡湯治傷寒後驚悸不定前胡去蘆頭茯神去木人參各一兩逺志去心一兩半甘草炙一分右麄𢷬篩每服二錢匕水一盞同煎至七分去滓温服不計時候麥門冬湯治傷寒後心虚忪悸麥門冬去心焙茯神去木菊花人參各一兩甘草炙半兩右麄𢷬篩每服三錢匕水一盞煎至半盞去滓温服紫石英湯治傷寒後驚悸煩悶虚羸少力紫石英研桂去麄皮紫菀去苖土白茯苓去黒皮麥門冬去心焙人參黄耆剉各一兩甘草炙半兩右麄𢷬篩每服五錢匕水一盞半入棗三枚擘破煎至七分去滓温服不計時候龍骨湯治傷寒後心氣虚悸恍惚多忘或夢寐不安龍骨研人參茯神去木紫石英研赤石脂當歸切焙乾薑炮桂去麄皮甘草炙白术芍藥紫菀去苖土防風去蘆各一兩逺志去心焙半兩右麄𢷬篩每服五錢匕水一盞半入棗三枚擘破同煎至七分去滓食前温服茯神丸治傷寒後或用心力勞倦四肢羸弱心忪驚悸吸吸短氣茯神去木麥門冬去心焙熟乾地黄焙各一兩牡丹皮人參黄耆剉各三分桂去麄皮甘草炙牛膝去苖澤瀉各半兩右𢷬羅為末錬蜜和𢷬三百杵丸如梧桐子食前温酒下二十丸傷寒後夾勞附論夫傷寒後氣血未實臟腑尚虚餘毒之氣猶存淹延時日不瘥肌體羸痩肢節痠痛壯熱憎寒心煩盗汗上氣咳嗽嘔逆痰涎飲食不消腹中癖塊口乾舌澀折骨痿面赤青黄氣力虚弱此皆由虚損致成夾勞也又云傷寒瘥後復夾勞者由病人先有夙疾因汗下之後榮衛虚弱氣不復常行體羸少力時有盗汗寒熱不常喘欬嗽痰唾鼻中臭氣飲食不消肢體痠痛面黄頰赤不即治之則致危殆方前胡散治傷寒後夾勞寒熱時作欬嗽盗汗四肢疼痛頰赤面黄心胸不利前胡一兩去蘆頭白蘚皮柴胡去苖桑根白皮剉大腹皮剉黄耆剉訶梨勒皮白术青橘皮湯浸去白穰焙各三分半夏二兩湯浸七遍去滑甘草半兩炙微赤剉右為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候温服柴胡散治傷寒後夾勞骨節煩疼時有寒熱欬嗽頭痛柴胡去苖貝母煨令微黄白术半兩人參去蘆頭赤芍藥石膏各一兩黄芩三分知母梔子仁半兩杏仁一兩湯浸去皮尖雙仁麩炒微黄鼈甲一兩炙右為散每服五錢水一大盞入生薑半分煎至五分去滓不計時候温服熟乾地黄散治傷寒後夾勞骨節疼痛不能飲食四肢少力熟乾地黄一兩黄芩三分白芍藥一兩五味子三分桂心半兩甘草半兩炙微赤剉當歸半兩剉微炒半夏湯浸七次去滑人參半兩去蘆頭右為散每服五錢水一大盞入生薑半分煎至五分去滓不計時候温服鼈甲散治傷寒後夾勞四肢煩熱骨節疼痛不思飲食時時欬嗽心胷痰壅鼈甲一兩半塗醋炙令去裙襴柴胡一兩半去苗秦芃半兩去苖紫菀半兩洗去土苗桔梗三分去蘆頭麻黄三分去根節知母三分桃仁一兩湯浸去皮尖雙仁麩炒微黄半夏半兩湯浸七次去滑桂心半兩黄耆三分剉陳橘皮半兩湯浸去白穰焙右為散每服五錢以水一大盞入薑半分煎至五分去滓不計時候温服柴胡散治傷寒後夾勞體痩少力四肢疼痛心膈痰壅時有欬嗽不思飲食柴胡一兩去苖鼈甲一兩塗醋炙令黄去裙襴白术三分人參三分去蘆頭天門冬一兩去心桑根白皮半兩剉枳殻半兩麩炒微黄去穣桂心半兩當歸半兩剉微炒百合三分紫菀三分洗去苖土桔梗半兩去蘆頭欵冬花半兩麥門冬半兩去心陳橘皮半兩湯浸去白穰焙黄芩半兩枇杷葉三分拭去毛炙令黄甘草半兩炙微赤剉右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候温服紫蘇散治傷寒後夾勞脾胃氣虚心腹煩悶壯熱憎寒飲食不多欬嗽痰涎腦悶小便黄赤紫蘇莖葉一兩赤茯苓三分麥門冬半兩去心木香半兩人參一兩去蘆頭陳橘皮三分湯浸去白穰焙紫菀半兩洗去苗土柴胡三分去苖桂心三分當歸三分剉微炒半夏三分湯浸七次去滑白术半兩知母半兩桑根白皮半兩剉犀角屑半兩黄芩半兩梹榔半兩枳殻三分麩炒微黄去穰右為散每服五錢以水一大盞入生薑半分煎至五分不計時候温服犀角散出聖恵方治傷寒後夾勞煩熱四肢疼痛不欲飲食犀角屑三分赤茯苓三分枳殻三分麩炒微黄去穰柴胡一兩半去苗白术三兩鼈甲一兩半塗醋炙令黄去裙襴知母半兩赤芍藥三分甘草半兩炙微黄剉右為散每服五錢以水一盞入生薑半分煎至五分去滓不計時候温服秦艽散出聖恵方治傷寒後夾勞黄痩體熱四肢煩疼不欲飲食秦芃一兩去苗人參三分去蘆頭鼈甲一兩塗醋炙令黄去裙襴白术一兩半夏半兩湯浸七次去滑五味子半兩甘草半兩炙微赤剉柴胡一兩去苗黄芩半兩桔梗半兩去蘆頭麥門冬半兩去心黄耆一兩剉右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候温服旋覆花散出聖恵方治傷寒後夾勞胸膈痰壅不思飲食氣攻背膞腰脊痠疼旋覆花一兩半夏三分湯浸七次去滑麥門冬半兩去心知母半兩甘草半兩炙微赤剉赤芍藥半兩柴胡三分去苗人參半兩去蘆頭陳皮半兩湯浸去白穰焙百部半兩赤茯苓三分前胡一兩去蘆頭右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候温服木香丸出聖恵方治傷寒後夾勞四肢無力脾氣弱飲食無味肩背疼痛木香半兩鼈甲一兩塗醋炙令黄去裙襴白茯苓三分柴胡一兩去苗半夏半兩湯浸七次去滑桔梗三分去蘆頭枳殻三分麩炒微黄去穰五味子半兩陳橘皮三分湯浸去白穰焙黄耆半兩剉桃仁一兩湯浸去皮尖雙仁麩炒微黄白芍藥一兩右為末錬蜜丸𢷬三二百杵丸如梧桐子大每服三十