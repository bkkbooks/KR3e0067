  - {type: page-break, offset: 0, content: '', id: KR3e0067_WYG_098-1a, image: WYG0750/WYG0750-0310a.png}
body:
  text: 普濟方卷九十九明周王朱橚撰諸風門癲癎論夫癲癎之疾諸方所載並作一證治之愚謂癲與癎難以一槩而論故癲者全歸於心癎者歸於五臟所謂癲者神不守舎狂言妄言如有所見動經年歳不得即愈若心經有損是為真病如心經蓄熱則當清心除熱如痰迷心竅使然又當下痰而寧其心志婦人因血氣迷心或因産後惡露上衝而語言錯亂神志不守者各當隨其證治其癲癎病者旋暈顛倒吐涎沫搐搦騰踴作馬嘶鳴多因挾熱夾驚心動膽懾鬱涎流入心之所致也名曰馬癎以馬屬在午手少隂君火主之故其病生於心經病者暈眩四肢煩疼昏悶顛倒掣縱吐沫作羊呌聲多因少時臍瘡未愈數洗浴濕襲脾經之所致也名曰羊癎以羊屬未坤位足太隂濕土主之故其病生於脾經病者昏暈顛倒兩手頻伸呌作雞聲湏臾即醒醒後發多因少時燥氣傷胃煩毒内作鬱涎入胃之所致也名曰雞癎以雞屬酉足陽明燥金主之故其病生于胃經病者眩暈顛倒眼目相引牽縱急强作猪呌鳴吐涎沫食頃方已多因少小吐利挾風之所致也名曰猪癎以猪屬亥手厥隂心胞絡風木主之故其病生於右腎經病者眩暈顛倒目反口禁瘛瘲吐沫作牛吼聲多因少小濕熱傷肺涏留肺系遇燥熱則發動名曰牛癎以牛屬丑手太隂濕土主之故其病生于肺經思夫癲癎病者皆因驚動使臟氣不平鬱而生涏閉塞諸經厥而乃成或在母胎中受驚或少小感風寒暑濕或飲食不節逆於臟氣詳而推之三因備具風寒暑濕得之外驚恐震懾得之内飲食飢飽屬不内不外三因不同忤氣則一傳變五臟散及六腑溢諸絡脉但一臟不平諸經皆閉隨其臟氣證候殊分所謂象六畜分五聲氣色脉證各隨本臟所感所成而生證諸古方有三癎五臟癎六畜癎及至一百二十種癎以其禀賦不同臟腑强弱性理燥靜故諸證蜂起推其所因無越三條病由都盡矣三因方云五癎合屬五臟而無腎有胃者以腎屬鼠非畜養物神無主治故不作癎胃屬雞繫六畜物故有象兼胃為五臟海非餘府比又犬屬戌手少陽三焦經主之雖屬六畜無犬癎者以辰戌為魁罡四煞無處不興癎之象也方虎睛丸出千金方治風癲癎瘛瘲反張口出白沫或作猪聲不知人虎睛一對酒浸炙令黃入藥搗白茯苓去黑皮龍齒别硏各一兩一分防葵剉秦艽去苖土升麻防己剉各一兩獨活去蘆頭三分遠志去心鬼箭羽白蘚皮各三分鐵精搗硏防風去义各一兩鬼臼貫衆去土木細辛去苗葉炒各三分大黃剉醋炒山茱萸人參各一兩白薇炒二兩一作白歛天雄炮製去皮臍銀薄别研各三分一作銀屑蛇蛻皮一尺炙凝水石别研石膏别研各一兩一分飛鵶頭三枚去喙毛炙麝香别研牛黃别硏乾薑炮一作乾地黃芎藭露蜂房炙各半兩黃芩去黒心一兩右搗羅為末次將别研等入末中拌和令匀鍊蜜丸如梧桐子大每服二十丸加至三十丸温酒下日二夜一如心肝覺風熱上衝用竹瀝飲下一方有茯神雄黃無芎藭飛鵶頭龍膽丸治癲癎狂悖迷亂心神恍惚四體抽掣吐沫嚼舌龍膽去土鈎藤升麻犀角鎊𤣥參黃芩去黒心白茯苓去黑皮防風去义秦艽去苗土地骨皮剉大麻仁研膏同搗檳榔剉黃連去鬚炒馬牙硝研麥門冬去心焙龍齒别研甘草炙剉大黃剉炒天竺黃别研琥珀别研珍珠末别研各一兩青黛二兩别研蜣螂三十五枚去頭生用金薄七十片與丹砂同研牛黃研半兩蚱蟬三十五枚去頭足生用銀薄一百片與金薄丹砂同研鐵粉一兩一分别研虎睛一對酒蘸炙燥去皮搗丹砂三分别研入金銀薄同研右除十二味别研外餘藥搗羅與研者藥末合研勻鍊蜜和丸如菉豆大每服十丸食後煎人參茯苓湯下日三服小兒三丸至五丸防葵散治癲癎厥時發作防葵代赭人參鉛丹白殭蠶生猪齒茯神雷丸鈎藤虎骨逺志桂心防風各六分卷栢莨菪子光明砂升麻附子牡丹龍齒各一兩一分牛黃二分白歛四分蚱蟬十四枚蛇蛻皮白馬眼睛各一具右治下篩酒服方寸匕日二亦可為丸良驗一方治風癲精神錯亂發作無時無莨菪子桂心二味有虎掌湯洗以生薑汁拌炒黃用羚羊角丸出聖濟總録治風癲癎羚羊角鎊犀角鎊遠志去心焙人參山芋茯神去木各一兩半生乾地黃焙乾令搗三兩防風去义一兩三分金薄研銀薄硏各一百片麥門冬去心焙鐵粉研天門冬去心焙各三兩水銀一分入金銀薄龍齒鐵粉五件同研水銀星子盡為度龍齒研一兩右先將一十味擣羅為末入别研者相拌令匀鍊蜜和丸如菉豆大用桃栁枝湯下二十丸日二夜一或人參茯苓湯下亦得治百二十種風癲癎驚狂發即吐沫不識人者四月五月並宜服之出千金方紫石英芍藥龍骨一本用黃芩青石脂白蘚皮麻黃當歸甘草括蔞根桂心人參各二兩牡蠣三兩大黃五兩右為散分作七裹每裹以大棗十枚水三升煮取二升半去滓下一裹大棗汁中煎取一升去滓頓服相去七日一服服乾即瘥龍腦安神丸出濟生拔粹治男子婦人小兒五積癲癎無問遠日近日發作無時服諸藥不効但服此藥無不痊愈茯神去麄皮取末人參去蘆頭麥門冬去心烏犀取末硃砂飛各二兩甘草取末桑白皮取末龍腦另研牛黃另研麝香研各三錢真地骨皮各一兩馬牙硝另研一錢金薄三十五片右為細末煉蜜丸如彈子大金薄為衣如有風癎病多歲冬月用温水化下夏月凉水化下不拘時候多歲病服如二三年病日進三服小兒一丸分作二服又治男子婦人虛勞發熱喘𠻳新汲水一盞化開服其喘滿痰𠻳立止又治男子婦人語澁舌强日進三服食後温凉水化下五癎丸出醫方大成治癲癎發作不問久年新日病宜服之全蝎一錢去毒炒半夏二兩湯洗七次雄黃一錢半别研天南星炮一兩蜈蚣半條去頭足炙烏蛇一兩酒浸一夕去皮骨焙乾麝香二錢别研白附子半兩炮白礬一兩皂角四兩搗碎水半升將汁與白礬一同熬乾研白殭蠶一兩半炒去系硃砂一分别研右為末薑汁煮麵糊丸如梧桐子大每服三十丸薑湯下五膽丸治心風狂走癲癎鯉魚膽雞膽狗膽猪膽羊膽各一箇傾汁作一處蛇黃五兩火煆蘸膽汁盡為度右為末别以狗膽汁為丸如菉豆大硃砂為衣服十五丸以磨刀汁吞或只作末將磨刀水調亦可食後服蛇黃丹出三因方治五臟六腑諸風癲癎掣縱吐涎沫不識人及小兒急慢驚風蛇含四枚建窑盞内煆紅以楮樹汁一盌淹乾天南星炮白附子辰砂别硏麝香别研各半兩右為末糯米糊丸如梧桐子大每服温湯磨化一丸量大小與服大人嚼細三五丸温酒米湯任下抱膽丸出危氏方治男子婦人一切癲癎風狂或因驚恐怖畏所致者及婦人産後血虚驚氣入心并室女月脉通行驚恐藴結此方累曾經効本是忠懿王之子有疾忽得一僧授此服之即効本名靈妙觀音丹忠懿得之未敢輕信忽有一風犬飼以此藥立効破犬腹而視其藥乃抱犬膽因易今名水銀二兩硃砂一兩細研黑鉛一兩半乳香一兩細硏右將黑鉛入銚子内下水銀結成砂子次下硃砂滴乳乘熱用栁木槌研匀丸如雞頭大每服一丸空心井花水吞下病者得睡切莫驚動覺来即安再一丸可除根本治癲癎痸瘲出千金方鉛丹一斤飛鴟頭二枚右為末蜜丸先食服三丸日三劇者夜一稍加之乳硃丹一名二靈丹治癲癎驚痸出濟生方乳香别研硃砂細研水飛右用乳香鎔化拌和硃砂為劑丸如龍眼大每服一丸側栢葉浸酒磨化盪温服不拘時候奪命散治壓風疾癲癎用青礞石好者一兩入甘鍋内同熖硝一兩拌匀用炭火煆通紅湏化盡為度冷則色如金取研為末每服一錢用薄荷自然汁入蜜調微温服之良久其藥自裹痰逐下隨大便夾和稠粘如膠乃藥之功驅風丸一名驅風散治五癲百癎無問隂陽冷熱出三因方虢丹晉礬各一兩右用磚鑿一窠可鎔二兩許先安丹在下次安在上以白炭五斤煆令炭盡取出細研以不經水猪心血為丸如菉豆大每服十丸至二十丸橘皮湯下一方為散温酒調下大鎮心丹出三因方治一百二十種癲癎驚狂譫妄顛倒昏悶不知人噴吐涎沫及治心驚膽寒清清不睡或左脇偏疼辰砂用黃松節酒煮龍齒用遠志苗醋煮右只取辰砂龍齒各等分為末猪心血為丸如雞頭大每服一丸以麥門冬黒豆燈心生薑白蜜水煎豆熟為度臨卧嚥下小兒磨化半丸量歲數與之金砂丸出聖惠方治風癲邪癎等疾精神不守言語錯亂金五兩剉屑為藥匱丹砂三兩將金屑置以定州細瓷合于内作一坑子置丹砂于金屑中心上下覆襯以合蓋又用六一泥固濟以慢火養七日將出丹砂掘一地坑子同入凈濕土内單帛裹著在土中出火毒七日用右去金取砂出火毒後研取粉乾控粟米飯爛研和拌得所丸如菉豆大每食後金銀湯下五丸中夜一服桃栁湯亦得其合子用金者為佳甘遂散出危氏方治癲癎及婦女心風血邪用甘遂一錢為末以猪心取三管血三條和末多少和之將心批作兩片入在内再合線縛定外用皮紙裹濕慢火煨熟不可焦過取藥細研入辰砂末一錢和匀分作四丸每服一丸將所煨猪心煎湯化下再服别用猪心亦可過半如大便下惡物後調和胃氣神應丹出衛生寶鑑治諸癲癎用辰砂不以多少細研水飛過候乾用猪心血和之得所以蒸餅劑裹蒸熟為度取出就熱便丸如梧桐子大每服一粒食後臨卧温人參湯下不數服取効如神一方用金銀湯下陳蒲飲治卒發風癲狂癎用三年陳敗蒲一兩切細以水二升煎至七合去滓温飲治癲癎并風狂久不瘥者出海上方用黃丹火上飛過不拘多少用蒸餅為丸如梧桐子大每服五十粒人參湯下日三四服牛黃丸出聖濟總録治風邪變成癲癎時時發動不知人事定心神風癲之狀發無常時每發則仆地吐涎沫無所覺知蓋由血氣皆虚精神離散魂魄失守風邪入於隂經故也又以胞胎之初其母卒大驚精氣并居能令子發癲其證與風癲大率相似牛黃别研真珠末别研琥珀别搗羅鐵粉别研天竺黃别研龍齒别硏各半兩金薄七十片研同水銀銀薄七十片與水銀同研水銀與金薄同研犀角鎊丹砂與水銀金銀薄同研各半兩露蜂房龍膽去土升麻防風去义黃芩去黑心鈎藤各半兩知母細切焙天門冬去心焙白芍藥茯神甘草炙剉菖蒲九節者米甘浸刮去皮切酒炒麥門冬去心焙各一分乾蝎酒炒一兩麝香别研人參各半兩右除别研石藥及麝香等外餘藥搗羅與研藥再羅令勻煉蜜拌和得所更擣千杵丸如桐子大夜卧及食後煎新竹葉湯下十五丸至二十丸治癲癎發熱急狂走出本草以鐵漿服之治驚邪癲癎雞癎發熱狂走出本草取鳯凰臺石水磨之服是鳯樓正處脚下物如白石也治大風癲癎頭風濕痺毒在骨髓久服益氣耳目聰明輕身强志亦治腰膝中風毒出本草取蒼耳三月已後七月已前刈日乾為散夏水服冬酒服日服二丸服二三十丸散一二匕滿百日病當出如瘑疥或痒汁出或班駮甲錯皮起後乃皮落肌如凝脂令人省睡忌食猪肉米泔療癲癎出本草以野猪黃水研如棗核日二服効治癲癎用艾于隂囊下榖道正門當中間隨年歲灸之癲論夫黃帝問曰人生而病癲疾者安所得之岐伯對曰此得之在腹中時其母數有所大驚也氣上而不下精氣并居故令子發為癲疾病在諸陽脉且寒且熱諸分且寒且熱名曰狂刺之虚脉視分盡熱病已而止病癲初發歲一發不治月一發不治四五日一發名曰癲疾刺諸分其脉尤寒者以針補之病已止癲疾始生先不樂頭重直視舉目赤其作極已而煩心候之於顔取手太陽陽明太隂血變而已癲疾如發而反强因而脊痛候之足太陽陽明太隂手太陽血變而已癲疾始作而引口啼呼甲乙作喘悸者候之手陽明太陽右强者攻其左左强者攻其右血變而止癲疾者常與之居察其所當取之處病至視之有過者即瀉之置其血於瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者尾骶也治癲者病發而狂靣皮厚敦者死不療凡癲發則卧地吐涎沫無知若强掠起如狂及遺糞難療癲疾脉搏大滑久自己脉沈小急實死不療小牢急亦不可治脉虚可療實則死矣厥成為癲疾五臟不平六腑閉塞之所生也厥成為癲故附厥於此條也隂衰發熱厥陽衰發寒厥黃帝問曰厥之寒熱者何也岐伯對曰陽氣衰於下則為寒厥隂氣衰於下則為熱厥問曰熱厥必起於足下者何也對曰陽氣起於足三趾之表集於足下而聚於足故陽勝則足下熱也問曰寒厥必起於趾而上於膝者何對曰隂氣起於五趾之裏集於膝而聚於膝上故隂氣勝則從五趾至膝上寒其寒也不從外皆從内也厥或令人腹滿或令人暴不知人或至半日遠至一日乃知人者何也隂氣勝於上則下虚下虚則腹滿腹滿則下氣重上而邪氣逆逆則陽氣亂亂則不知人巨陽之厥腫首頭重足不能行發為眴外陽明之厥癲疾欲走呼腹滿不能卧靣赤而熱妄見而妄言少陽之厥暴聾頰腫而熱脇痛脾不可以運太隂之厥腹滿䐜脹後不利下欲食食嘔不得卧少隂之厥舌乾溺赤腹滿心痛厥隂之厥小腹腫痛腹脹經溲不利好卧屈膝隂縮腫胻内一作外熱盛則瀉之虚則補之不盛不虛以經取之上寒下熱先刺其項太陽久留之已則火熨項與肩甲令熱下冷乃止所謂推而上之者也上熱下寒視其虚脉而陷下於經絡者取之氣下而止所謂引而下之者也刺熱厥者留針反為寒刺寒厥者留針反為熱刺熱厥者二隂一陽刺寒厥者二陽一隂所謂二隂者二刺隂也所謂二陽者二刺陽也温病熱於腎中亦為痙小兒病癎熱盛亦為痙凡風瘖暴尸厥及鬼魘不寤皆相似宜精察之故經言久厥則成癲是以知似也癲病有五一曰陽癲發時如死人遺溺有頃乃解二曰隂癲坐初生小時臍瘡未愈數洗浴因此得之三曰風癲發時眼目相引牽縱反急强羊鳴食頃方解由熱作汗出當風因以房室過度醉飲飽滿行事令心氣逼迫短氣脉悸得之四曰濕癲眉頭重痛身重坐熱沐髪濕結腦汗未止得之五曰馬癲發時反目口噤手足相引身皆熱坐小時膏氣腦熱不和得之骨癲疾者頷齒諸腧分肉皆滿而骨倨强直汗出煩悶嘔多涎沫氣下泄不利筋癲疾者身拳攣急脉大刺項大經之本杼多嘔涎沫氣下泄不療脉癲疾者暴仆四肢之脉皆脹而縱滿脉盡刺之出血不滿俠項灸太陽又灸帶脉於腰相去三寸諸分肉本腧嘔多涎沫氣下泄不治癲狂之疾何以别答曰狂之始發少卧不飢自賢自貴妄笑好歌樂又曰癲者精神不守言語錯亂甚則登高罵詈或至狂走癲者發則卧地嚼舌吐沫手足搐搦或作六畜之聲頃刻則甦癲者邪入於隂則癲狂者邪併於陽則狂癎者邪干於心其處用藥亦皆相類凡人患癲狂者呌呼打人者皆心經有熱當用鎮心藥加大黃與之瀉數行然後用安神及風藥但得寧靜即是安妥不可見其瘦弱减食便以温藥補之補之病必再作當戒之緩緩調治飯食可也因驚癲狂軍中有犯法者褫衣將受刃忽然得釋神失如癡與驚氣丸一粒服訖而寐及覺病已失矣風癲者由血氣虚風邪入於隂經故也人有血氣少則心虚而精神離散魂魄妄行因為風邪所傷故邪入於隂則為癲疾夫人見十步垣墻勿順墻而卧風利吹之人必發癲癎及體重人卧春夏向東秋冬向西此是常法方麝香丸出聖濟總録治風癲瘛瘲口眼翻張口吐白沫或喉中作聲不知人麝香别研半兩虎睛一對炙令操去外皮防風去义一兩龍齒别研黃芩去黒皮鐵粉研鬼臼各三兩人參大黃剉醋炒各一兩牛黃别研一分秦艽去苗土雄黃别研各二兩獨活去蘆頭凝水石别研各一兩茯神去木一兩一分升麻三分石膏别研一兩一分遠志去心半兩天雄炮裂去皮臍用一兩一分白蘚皮三分露蜂房炙一分細辛去苗葉三分貫衆擣去土末鬼箭羽各十兩蛇蛻炙一分金薄銀薄各四十九片研右先將一十八味擣羅為末後入别研九味和勻鍊蜜為丸如梧桐子每服十五丸至二十丸空心日午臨夜温酒下虎睛丸出聖惠方治風癲口眼開張多吐白沫或作惡聲恍惚虚悸虎睛一對酒浸炙微黃茯神一兩龍齒一兩石膏一兩防風一兩去蘆頭黃芩一兩秦艽一兩去苗川升麻一兩漢防己一兩鐵粉一兩細研川大黃一兩剉碎微炒人參一兩去蘆頭防葵一兩獨活一兩遠志三分去心白蘚皮三分鬼臼三分細辛三分銀薄金薄各五十片細硏天雄三分炮製去皮臍乾薑半兩炮製剉芎藭三分麝香半兩細研露蜂房半兩牛黃半兩細研蛇蛻皮十條燒灰右為末入研了藥令匀鍊蜜和擣五七百杵丸如梧桐子大不計時候以温酒下二十丸薄荷湯下亦得麥門冬丸出聖濟總録治風癲狂亂失心安魂定志麥門冬去心焙一兩虎睛一對微炙龍齒一兩研金薄一百片研銀薄一百片研石膏研升麻枳實麩炒生薑切炒白茯苓去黑皮人參剉各一兩元參葳蕤炒芍藥甘草炙剉遠志去心各三兩栢子仁生用薤白細切焙乾牛黃别剉各半兩右除虎睛并别研六味外餘擣羅再與研者同羅為末鍊蜜和丸如梧桐子大每服二十丸煎地骨皮湯下日三夜一不拘時候茯神丸出聖濟總録治風癲瘛瘲神魂不定茯神去木龍骨龍齒龍角三味去土一處龍膽去苗土鐵精搗研入前三味同研蔓荆實揉去白皮各一兩乾薑炮人參遠志黃連去湏炒各三分大黃剉醋炒一兩半芎藭白芷當歸切焙黃芩去黑心桂去麄皮各半兩右先將一十三味擣羅為末入别研者四味和令匀鍊蜜丸如梧桐子大每日空心及日午食前用蜜湯下十五丸漸加至二十丸銅青丸治五癲方見癎類侯氏黑散出金匱方療風癲大風四肢煩重心中惡寒不足者菊花四十兩防風白术各十兩茯苓細辛牡蠣熬鍾乳研礐石泥裹燒半日人參乾薑桂心芎藭當歸礬石如馬齒者燒令汁盡各三分黃芩五分右擣合下篩以酒服方寸匕日三忌桃李雀肉胡荽青魚鮓酢物生葱生菜一方有桔梗八分無鍾乳礐石以温酒下之禁一切魚肉大蒜常宜冷食六十日止即藥積在腹中不下也熱食即下矣冷食自能助藥力治風癲引脇牽痛發作則吐耳如蟬鳴出肘後方用天門冬去心皮曝乾擣篩酒服方寸匕若人久服能長生治風癲及百病出肘後方用麻仁四升水六升猛火煮令牙生去滓煎取七升旦空心服或發或不發或多言語勿怪之但人摩手足湏定凡進三劑愈麻仁者今人績布麻種也治癲狂疾出肘後方用防葵子末温酒服一刀圭至二三服身潤又小不仁為候凡使防葵勿悞用狼毒其防葵在蔡州沙土中生採得二十日便蚛用之唯輕為妙欲使先湏揀去蚛末後用甘草湯浸一宿漉出暴乾用黃精自然汁一二升拌了土器中炒令黃精汁盡治卒癲疾方出肘後方用葶藶一升擣三千杵取白犬倒懸之以杖犬令血出承取以和葶藶末丸如麻子大一丸三服取瘥温水下蠶紙散出肘後方治風癲狂發欲走或自高貴稱神聖皆應備諸火灸百會風池膏肓三里効乃得永瘥耳若或悲泣呻吟者此為邪魅非狂依邪方治之用生蠶紙燒灰酒水任下續命風引湯出千金方治中風癲眩不知人狂言舌腫出麻黃芎藭石膏人參防風各三兩桂心甘草獨活各二兩防己附子當歸各二兩杏仁三十枚陳薑五兩一方無陳字右㕮咀以酒三升水一斗合煎取四升分四服日三夜一鴟頭丸治風癲葶藶子三分鉛丹虎掌烏頭括蔞根各三分甘遂天雄蜀椒大㦸各三分白术一分鐵精䕡茹各一兩鴟頭一枚右為末蜜丸如梧桐子大温酒下二丸日三服茯神丸治風癲引脇肋牽痛發作吐沫耳中虚鳴茯神去木一兩一分龍骨别研龍角别研各一兩龍膽去土鐵精擣研蔓荆實炒各一兩一分人參遠志去心黃連去湏炒大黃剉醋炒各一兩芎藭當歸切焙各一兩黃芩去黑心一兩右先將一十味擣羅為末入别研者相拌令匀鍊蜜丸如梧桐子大食後煎生薑枳殻湯下十丸加至十五丸一方以温酒下鉛丹丸治風癲發時吐涎起卧不定及大小便不能知覺鉛丹一兩括蔞根一兩虎掌半兩湯洗七遍生薑汁拌炒令黃䕡茹一兩白术半兩鐵粉二兩細研鴟梟頭一枚燒為灰大㦸半兩剉微炒甜葶藶一兩隔紙炒令紫川椒半兩去目及閉口者㣲炒去汗天雄半兩炮去皮臍烏頭半兩炮裂去皮臍右為末鍊蜜和丸如桐子大不計時候以温酒下二十丸治發癲口邊白沫動無常者秦艽人參防葵一作防風茯神一作牡丹甘草各二兩鉛丹一兩貫衆一枚右㕮咀以水九升煮取三升半分三服六生散一名菖蒲散療風癲菖蒲蒴藋一作藜蘆防風茵芋商陸根蜀附子炮各二兩右擣篩酒服五錢七日再服不能稍增以知為度忌猪肉冷水羊肉餳牛犬肉蒜雄黃丸治風癲失性欲死并理五驚諸癎雄黃别研雌黃别研珍珠末别研各一兩丹砂别研一兩水銀二兩先以蒸熟棗肉二兩研馬尾羅内擦過用栁木椎研令青色水銀星盡為度鉛丹㸃醋炒一方熬令成屑右將五味各研如粉後合研用棗肉膏研不見水銀星為度更入棗膏入臼更擣千杵丸如大麻豆每服二丸至三丸人參茯苓湯下日二夜一食後服之一方治風癎以蜜為丸用薑棗湯下古今録驗云療五癲牛癲則牛鳴馬癲則馬鳴狗癲則狗鳴羊癲則羊鳴雞癲則雞鳴病五癲狂病者腑臟相引盈氣寒厥不識人氣爭言妨吐沫久而得蘓者雄黃丹砂丸治五癲病宜服之及治風癲失性倒卧惡聲吐沬口禁方名雄珠丹雄黃丹砂雌黃各二兩碎同用夾生絹袋貯又入十兩蜜内重湯煮待蜜赤色滴如珠引若線為度取藥囊出河水洗滌淘漉出曝乾入乳鉢中研如粉為度其蜜即丸藥用之最妙黑鉛二兩大火化用鐵匙攪捄法如塵垢者用精者一兩將無油淨器中下水銀及鉛同銷鎔攪令匀瀉於熟鐵器内候冷先將前三味石藥乳鉢内研次入鉛同研取匀甚良水銀一兩右各如前修製畢便將前煮丹砂雄黃雌黃餘蜜再重湯煮少少㸃入藥中漸漸和勻為丸如大麻粒每用桃栁桑木嫩條各長七寸剉以水一升煎至六合去滓分温下丸藥空心午時臨卧時下三丸至五丸小兒一丸至二丸菪莨子散療五癲反側羊鳴目翻吐沫不知痛處猪卵一具隂乾百日莨菪子三升牛黃八分研鯉魚膽五分桂心十分研右切以清酒一升漬莨菪子暴乾盡酒止乃擣合下篩酒服五分匕日再當如醉不知稱增以知為度忌生葱鐵粉散治風癲心神不定狂走無恒鐵粉馬牙硝光明砂各一兩鉛霜半兩金薄五十片右為散不計時候以生地黃自然汁調下一錢忌生血物水銀丸治風癲心神憒亂狂走不恒言語倒錯水銀一兩硫黃一兩與水銀結為砂子硃砂定粉黃丹各一兩右細研入甆罐子内以泥封頭候乾以慢火養一復時取出入金銀薄各五十片雄黃鉛霜各一分同研令細以糯米飯和丸如菉豆大不計時候以豆淋酒下五丸丹砂煎治風癲疾時發時省涉歴年月丹砂細研水飛濾過後焙乾炙研如粉三兩石膏五兩細研黃連去鬚搗篩一斤重生地黃不計斤兩研取自然汁二升不得入水右以清水一斗煮生石膏黃連取五升净滓子刺用生地黃汁又煎之如稠餳始下火取丹砂粉投入勻攪百餘徧貯於不津器中夏攪待冷即住每日兩度以温水調服約如半彈丸大服藥後只得喫淡飯蔓菁菜等鐵精散療五癲鐵精一合芎藭防風各一兩蛇床子五合右合擣篩酒服一錢匕日三有効芎藭湯出聖濟方治風癲引脇牽痛發作則吐耳如蝉鳴狂走恍惚芎藭藁本䕡茹各五兩右㕮咀内酒一斗煮取三升頓服之羸者分再服取大汗一方以水煎不計時候温服天門冬煎出千金方治風癲卒發仆地口吐涎沫不省人事天門冬凈洗浸兩日去心細切七斤生地黃三十斤肥者淘洗細切右細切都于木臼中擣爛却入大沙盆内爛研壓取汁絞滓乾别收將滓更研極爛入煎湯一斗研攪令匀又壓滓乾再研極細入湯八升壓滓又再研入湯六升壓令盡乾無味即住取第二第三度研入者汁同煎至一斗次入第一藥汁煎成膏若稠餳即止每服一匙用酒化下或桃栁湯温水化下食後服烏巴丸出經驗良方治癲邪結熱狂亂不辨尊卑吼呌醜罵用巴豆五粒去殻烏梅五箇去核焙乾同研匀滴水研為丸粟米大硃砂為衣大人三五丸加至十五丸量大小加减淡薑湯夜卧吞下通利三五行病去白粥補之鬰金丸出危氏方治癲狂可畏數年不愈多因驚憂得之痰涎留於心竅蟬肚鬰金七兩真蜀川來者明礬三兩右為末薄糊為丸如梧桐子大每服五十丸湯水任服初服覺心胷間有物脱去神氣洒然再服稍甦多服此藥大能去痰一方治癎用生薑汁糊為丸仍以生薑湯送下治諸癲風等疾用鯉魚一斤治淨加成塊用明礬末四兩醃一兩日煎喫其疾必愈莨菪丸出聖濟總録治風癲如纔得病者服藥三日愈間日發者十日愈五日發者二十日愈半年一發者服一月愈用莨菪子淘去浮者三升以新汲水淘三十徧浮者盡去生研如膏入酒一升同研絞取酒又研如膏更入酒一升研絞取酒又研如前絞取酒都及三升更濾一徧入無油淨鐵器中煎成膏却將莨菪滓炒令焦黃乾擣羅為末待其煎成即漸漸少入末和煎令可丸如梧桐子大空心午時夜卧各用温酒下十丸如未覺効加至十五丸額上手中從文理中赤是覺効也即减藥服之凡癲疾發則仆地吐涎沫無知彊掠起如狂反遺糞者難治𤓰蒂散出直指方治風癲宜服此藥吐之保命集用𤓰蒂末一錢熟水調下吐痰如吐不止者以真麝香少許温水服之一方獨聖散治諸風隔實諸癎痰涎津液湧溢雜病亦然𤓰蒂一兩右剉如麻豆大炒令黃色為細末每服量虚實久新或三錢藥末茶一錢酸虀汁一盞調下若用吐法天氣晴明隂晦勿用如病卒暴者不拘於此法吐時辰午已前故内經曰平旦至日中天之陽陽中之陽也論四時之氣仲景曰大法春宜吐是天氣在上人氣亦在上一日之氣卯辰寅候也故宜早不宜夜也先令病人隔夜不食服藥不吐再用熟虀水投之如吐風癲病者加全蝎半錢微炒如有䖝者加狗油五七㸃雄黃末一錢甚者加芫花末半錢立吐其䖝如濕腫滿者加赤小豆末一錢故此不可常用大要辨其虚實實則𤓰蒂散虚則梔子豉湯滿加厚朴不可一槩用之吐罷可服降火利氣安神定志之劑治卒發癲狂出本草用經死繩燒為末服三指撮三年陳蒲水煮服之亦佳治狂癲不能語不識人者出本草以生驢脂和酒服三升良治驚悸癲邪安神定魄强志出本草用天子籍田三推犂下土水服治邪狂癲大呌奔走蝦蟆一枚匕首去腸中滓令凈將腸胃却入腹中入瓶子中固濟漸以火燒通赤以土罨定隔日取出入麝香一錢用同研令細每服新汲水調下一錢治去風痰癲狂除瘟痺用天門冬末服方寸匕日三無間山中人間常勿廢久服釀酒服之治狂癲不識人不能語者以水服伏龍肝方寸匕導引法養生方治欬逆胷中病寒熱癲疾喉不利咽乾咽塞還向反望不見七通又以兩手承鹿盧倒懸令脚反在其上元愈頭眩風癲坐地舒兩脚以繩絆之以大繩絆訖拖鹿盧上來下去以兩手挽繩使脚上頭下不使離地自極十一通愈頭眩風癲久行身卧空中而不墜落普濟方卷九十九
