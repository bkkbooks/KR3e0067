内以磁噐盛封盖於甑上蒸乘熱攪調收用膏藥熬成後湏連所盛磁噐置凈水中出火毒一晝夜歇三日用方可用日換兩次夜換一次熬此膏藥極難於火候湏察頻㸔火𦂳慢大猛即藥中火發不特失藥性又傷人靣目救助不及千萬謹戒膏藥方甚多不下數十治疽之時神効無出於此方千金不換杖瘡尤効没藥膏治發背方見本門瘡毒腫傷折類金絲膏治諸般瘡木鼈子五枚乳香三錢没藥四錢當歸五錢䧺黄四錢白膠半兩黄蠟三錢右先用小油半觔和蠟一處看硬軟次入餘藥末攤貼黒神膏治諸瘡榮衛未腐腫痛堅硬焮赤不消當歸一兩黄丹六兩栁枝桃枝各二十兩小油二十兩血餘如鷄子二塊杏仁湯浸去皮尖一百箇右除黄丹外入鍋内以火熬兩時辰綿濾去滓再入鍋内熬滳水成珠不㪚入黄丹用文武火熬成黒膏用木通膏治一切癰疽發背疼痛不止木通二兩黄丹五兩細辛一兩茵蔯一兩琥珀半兩别研硃砂半兩右先煎油令沸即下細辛木通茵蔯煎五七沸去滓即入琥珀硃砂末更煎用栁木錍攪候滳水中成珠膏成收於磁盒中每攤膏於故帛上貼日二易丁香膏治一切癰疽發背疼痛不可忍丁香半兩麻油一觔黄丹七兩丈夫頭髪一兩蠟一兩桂心半兩末當歸半兩末右煉油令香下髪煎盡次下蠟以綿濾過却入鐺中下黄丹不住手攪候色黒滳水内如珠即下桂下當歸等末攪勻以磁噐盛用故帛候攤貼日二換五枝膏香油一觔桃枝栁枝橘枝梅枝桑柱萆麻子六十七粒去殻右各藥浸油中同煎赤色撈去五枝用帛濾凈下乳香一錢次下没藥三錢逐旋下黄丹半觔次下瀝青不住攪之膏成為度萬應膏治一切惡瘡疼痛乳香一錢木鼈子四箇去皮當歸半兩黄丹四兩桃枝槐枝各四寸清芝蔴油半觔右入油内慢火熬不住手攪焦色去滓入黄丹熬滳水中不㪚入乳香攪勻收用止痛㧞毒膏治一切瘡發腐爛不可近未破貼則破已破則生肉兼治杖瘡疔瘡斑猫四十九箇栁根四十九條木鼈子七箇乳香没藥麝香少許松脂三錢右用真清油十四兩煎黒栁條焦枯濾去滓入黄丹五兩滳入水中成珠為度却入諸藥攪及勻入磁噐中收了後用神効千金錠子蟾酥不拘多少粉霜少許䧺黄少許麝香少許巴豆一枚去殻八角兒四箇栁樹上者乳香少許右將八角兒先研如泥化開黄蠟少許入前藥末和成膏子如麥粒大如有患瘡者先用迷針針破疼時用槐條兒送下藥隨後用雀兒糞瘡口内放一粒如瘡疼者非疔不湏再下藥如針破無血係是着骨疔即於男女左右中指甲内刺無血即於脚上大拇指甲内刺取血糊納藥丸下瘡口効如是都無血時恐證難醫必即死然如此可再用香油二觔黄丹一觔白巴豆四百八十箇銅鍋内煎油熟次入桃枝二十根煎枯将出次下栁枝二十根長二寸煎枯将出三次下巴豆煎枯將出油放入磁鍋内煎油熱下丹文武火攪勻一箇半時辰熬取下於地再攪滳水成珠沉下方好就砂鍋番轉合在地上二日第四日方可用野葛膏治癰疽痔瘻惡瘡婦人妬乳漆瘡野葛芍藥薤白當歸通草各一分附子一分右㕮咀醋浸半日先煎猪脂八合候令烟出内乳髪二分令消盡下之待冷又内松脂八分蠟二分更著火上和次内諸藥煎令沸三上三下去滓以故帛傅藥貼腫上乾即易如春月去附子其髪湏凈洗不爾瘡疼烏犀膏治一切惡瘡瘰癧癰疽發背瘡隂炙瘡湯火瘡及閃撲損白芷板藍根苦参芎藭並剉各一兩半鉛丹六兩清麻油十五兩右先将油同前四味慢火熬煎令藥焦黒用綿濾去滓再入鍋内亦用文武火煎沸下鉛丹以栁木錍攪勻滳水内成珠為度即傾磁噐内宻封收如用無灰紙攤貼胡粉膏治一切癰疽發背日夜發渴疼痛不止胡粉四兩油半觔蠟三兩半乳香半兩細研麝香一錢細研没藥半兩細研右以文火煎令油熟下胡粉後下蠟臨成下麝香乳没攪勻勿住手待星花上即住以磁噐内盛於故帛上塗貼日二換無名異膏治一切瘡毒無名異細研騏驎竭細研各一分栁枝剉二兩蠟一兩鉛丹五兩油十二兩右熬油令沸下栁枝煎候赤黒色以綿濾過再煎下丹蠟攪候變色滳水中成珠得所下騏驎竭無名異末更攪令勻㵼冷水中捻作挺子一切惡瘡發背諸毒瘡並宜塗貼如聖膏治一切惡瘡癤毒薔薇根剉乳香阿魏研各一兩栁枝二兩剉長一寸鉛丹六兩清油一觔右熬油令沸下栁枝薔薇根煎候黄黒色以綿濾過下丹煎攪候變黒色次下乳香阿魏更攪令勻一切瘡腫並用故帛上塗貼之如患赤眼頭痛眼澁貼太陽兩次驢傷馬墜婦人血氣並當歸酒下三丸如梧桐子大癬瘡先􅎲破取膏塗貼白膏治一切瘡癤癰腫及瘻瘡杖瘡等定粉三兩清油四兩煉熟取三兩鉛丹二錢商陸根三分暴乾秤蠟四兩白栁枝半兩青白而葉大者冬月抹去粗皮取内白皮切作片子暴乾秤右先以熟油熬商陸根栁枝令色變後入粉蠟丹攪之不住手直至滳水内為珠攤帛上貼之熬時始則色㣲紅次㣲青乃熟也取出久而色白冬色愈白乳香膏香油二兩萆麻六十五粒去殻赤芍藥三錢當歸一錢半木鼈三箇去殻楊枝十束右将藥没油中煎去滓藥凈次下乳香二錢瀝青十二兩入内調成膏滳水中不㪚為度黄蠟膏治膁瘡槐條椿皮桃條棟條栁條荆芥各一束右各條熬湯盪洗用無漿絹帛拭乾用生黄蠟於紙上量瘡大小攤膏十箇十層拴於瘡上三日一次洗除去着瘡蠟紙膏一箇不用貼之一月無問年深近日必愈金絲膏治諸般惡瘡疼痛白膠香五錢瀝青黄蠟三錢小油三錢没藥二錢另研乳香二錢半另研右將油蠟白膠瀝青用栁枝攪化盡後用乳没入藥内再攪勻綿濾過傾水内再攪三二十徧後任意攤用調聖膏治二十四腫瘡毒等證新石炭蕎麥桿灰半錢胡椒三十粒巴豆三十粒去殻木鼈子去殻落藜草灰半升右以三灰一處和勻三藥一處研細别置箱箕攤帛於箕内置灰帛上下置丸鉢盛貯用沸湯五盞淋取汁候稍澄勿用脚将汁入銚熬沸纔乾又添直待煎至半盞許如兩呷多太乾即剗起入磁噐内以椒巴豆等藥末攪令勻使用黄蠟封固勿泄氣候冷挑一星許㣲㸃舌頭上即時潰爛些少過一刻使無事此其驗也膩粉膏治風邪熱毒等證容摶皮膚之間以致身體生瘡或癢或痛及大小頑疥瘡焮赤疼痛黄水浸滛侵展肌汁不絶甘草一兩末猪脂煉六兩松脂半兩膩粉胡粉黄連末各二兩右藥先以猪脂煎松脂次入黄蠟二兩濾去滓次下膩粉并四味攪勻仍於磁噐中收貯每用少許塗之日三四易此膏援熱毒止痛生肌肉歛瘡口乳香金絲膏治一切瘡腫𤣥参二兩黄芩栁枝槐枝當歸各二兩黄茋一兩右用香油一觔慢火熬藥至黒色濾去滓入黄丹四兩飛過熬至黒色滳水中不㪚為度放冷用紙攤貼香油半觔料總計四兩夏用丹三兩冬用二兩半春秋二兩八錢碧油膏止痛排膿未潰用之則消腫㪚毒已潰破則排膿生肌及治炙瘡後便用此膏貼則尤佳桃枝栁枝桑枝槐枝白莢枝右焙乾為末麻油十兩同煎取八兩去滓令凈入黄丹乳香血竭末各半兩再熬成膏熬約七兩以下用磁噐盛埋地中一宿去火毒以無灰紙攤貼善應膏治癰疽潰後長肌傅瘢白芷黄茋各一兩甘草一錢黄蠟二兩黄丹二兩半右前三味並為粗末春秋用真麻油四兩半夏四兩冬月用五兩熬藥紫赤色用綿去滓然後入臘黄丹以栁枝不住手攪勻滳水成珠即止用如常法紫金膏治一切瘡腫皂莢一錢不蛀者去皮葱五莖去根鉛丹研團粉研各四兩松脂研二兩右清油半觔先煎皂莢葱二味焦黄綿濾去滓次下鉛丹又下團粉松脂以栁木錍不住手攪滳水中不㪚為度隨瘡大小攤貼之寒水石膏治發背寒水石二兩為末謂之石膏明者擇明月盈夜埋地中露天三日夜薄土盖挹其月華取出不見火研清麻油四兩黄蠟黄丹各一兩楓香二兩右将油熬黄蠟等三味成稀膏提起藥銚候無烟下寒水石末急調勻又露月下三夜日間收起若陽證變發背瘡用之立効不問破與不貼之如冰生肌長肉膏治一切癰疽惡瘡清油十兩龍骨研二兩木香㯽榔黄連去湏各三分同三味為細末右將油入鍋内慢火熬滳水成珠下龍骨末更熬如稀膏則止去火候稍温入三味藥不得住手攪候冷以磁盒盛收隨瘡大小攤貼𤣥武膏治癰疽發背疔腫内外膁瘡隂陽諸惡瘡及頭頂癰腫不問已潰未潰皆可用大能排膿㪚毒止疼生肌累有神驗若疔腫先用銀箆或皂角針於疔瘡中間及四畔針破令出惡血以追毒餘如小麥大擦入孔中却以此膏貼之如瘡壊爛至甚難以藥貼則将皂角二三片煎油調勻此膏如稠糊傅之膿水或轉多數次傅之乾愈妙巴豆二兩凈木鼈子仁二兩黄丹四兩清油十兩槐栁嫩枝各七條每長寸許剉碎右将木鼈子巴豆槐栁枝用磁噐或銅鐵銚盛油浸藥一宿慢火煎熬諸藥黒色用生絹帛濾去滓復将所濾油於慢火上再熬却將黄丹入油内用長條槐栁枝不住手攪候有㣲烟起即将出藥㸃滳在水靣上凝結成珠不㪚成膏矣傾入磁噐内收貯置新汲水内三日出火毒後攤用烏膏療一切瘡引膿生肌殺虫烏麻油一升用清者黄丹三兩羅松脂半兩末薫陸香一兩乳頭者蠟半兩煉净右先空煎油三分减一停待冷次入黄丹更上火緩煎又三分减一又停冷次入薫陸香末不冷即恐溢沸出煎候香消盡下松脂及蠟㸔膏稍稠即㸃鉄物上試之斟酌硬軟適中乃罷先問所患瘡是熱即减薫陸香及松脂若瘡苦疼如久不差此渉於冷依方煎之治杖瘡者油若一升地黄汁半合黄丹二大兩蠟一小兩餘凖上法乳香膏治諸瘡癰癤等及小兒瘡乳香一兩膩粉松脂蜜陀僧各半兩生地黄汁半合右為末用好油四兩黄蠟二兩煉熟下諸藥熬成膏入麝香一錢取出窨一宿每用看瘡大小攤貼日一二換神仙膏治馬汗血入瘡一名膏藥方鉛丹三兩炒紫色清麻油六兩當歸半兩切碎綿裹杏仁四十九枚不去皮尖椎碎綿裹桃栁枝各二十一莖但長肥瘐者佳右先油慢火煎約三時辰入杏仁當歸兩裹候杏仁黄紫色漉出二味却入桃栁枝煎亦如杏仁等時候漉别用綿濾過再煎下鉛丹用栁木錍攪一向左轉不住手至稠取膏少許滳水中若直墜下水底不㪚在水靣其膏成矣傾在甆噐中候冷却以新汲水浸一宿來晨去水收貯勿令雞犬婦見每用少許攤貼乳香膏治發背癰疽腫痛一切瘡癤黄蠟一兩半定粉二兩半乳香一兩小油四兩右用甆椀盛油蠟放湯鍋熬消盡蠟入乳香定粉用栁枝攪沫㪚放冷水内去火毒量瘡攤帛紙隨用忌鉄噐白玉膏治縮收癰疽不令蔓衍切忌用冷藥杏仁二十一粒去皮尖别研川椒四十九粒去目出汗為末清油一觔右同熬至紫色黒新綿濾過用無灰薄紙看瘡大小剪作梳様攤藥在上於瘡暈盡處兩邊圍遶貼之候暈漸收近裏别剪差小者再攤藥圍貼暈又收即又再移近裏貼仍頻換候暈已收見瘡根脚或瘡口即用次方凡貼大惡瘡毒氣方盛不可以藥當上貼恐過㪚毒氣瘡益大此藥能收暈見瘡根其法大妙普濟方卷三百十三
