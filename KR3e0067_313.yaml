body:
  text: 普濟方卷三百十三明周王朱橚撰膏藥門總論凡諸痛癢瘡瘍癰腫疽疹瘤氣結核拂欎甚者皆熱五臟不和九竅不通六腑不和留結為癰近於火氣㣲熱甚癢熱甚則痛附近則灼而為瘡皆火之用也人之瘡腫因内熱外虚所生也為風濕之所乘則生瘡腫然肺主氣候於皮毛脾主肌肉氣虚則膚腠開為風濕所乘脾氣温而内熱即生瘡也腫者由寒熱毒氣客於經絡使血澁而不通壅結成腫風邪内作即無頭無根氣血相摶作者即有頭有根壅盛則為膿赤根腫則為風氣流潰也瘡有痛癢痛則為實癢則為虚非為虚為寒也謂熱之㣲甚也癢者熱疾也故火旺於夏而萬物著鮮榮羙也炙之以火潰之以湯而其癢轉甚者㣲熱之所使也癢去者謂熱令皮膚縱緩腠理開通陽氣得泄熱㪚而去或夏熱皮膚癢而以冷水沃之其癢不去謂寒氣收歛腠理閉宻陽氣欎結不能㪚越沸熱内作故也瘡瘍皆為火熱而及腐出膿水者猶糓肉菓菜熱極則腐爛而潰為汚水也潰而腐爛者水之化也癰淺而大疽深而惡勝熱血則為癰膿也瘍有頭小瘡也脉浮而小癮胗也瘤氣赤瘤丹熛熱勝氣火之色也諸瘡之證或腫或潰或硬或久不差者皆藉以膏劑去殠腐排惡汁化死肌生良肉者正以此也諸瘡毒腫方十香膏治五發惡瘡結核瘰癧疳瘻疽痔沉香麝香各一錢木香乳香甘松丁香白芷安息香零陵香各五錢同為細末藿香五錢為細末當歸川芎黄茋茴香芍藥細辛升麻白歛獨活川椒藁本菖蒲厚朴木鼈子官桂剉各二錢桃仁五錢商陸根二両剉杏仁栢子仁松子仁各五錢槐枝桑枝栁枝松枝没藥輕粉䧺黄硃砂雲母石生犀角亂髪灰白礬灰各二兩另研如粉蟾酥猪脂羊腎脂各二兩清芝蔴油三觔黄丹一觔右先用木炭火煉油香熟下十六味剉藥并四枝四仁熬至紫黒出火濾滓入脂酥煎十餘沸綿濾過油澄拭鐺凈火上煎油沸下丹藥桞枝作錍不住攪熬一日滳水中成珠離火入十味藥末攪匀上火入雲母輕粉八味輕煎沸出火攪食傾於磁盒内封宻收每用量瘡口大小緋帛上攤貼腸胃癰疽可作丸如桐子大每服七丸空心温酒下消毒膏治五發惡瘡消毒㪚腫當歸黄蓍川芎杏仁白芷白歛零陵香槐白皮栁枝嫩者木鼈仁甘松各半兩剉乳香没藥各三錢麝香朱紅硃砂各半錢黄丹半觔炒紫色芝蔴油一觔輕粉一錢黄蠟半觔右将剉藥油浸七日木炭火上煎杏仁焦色濾去滓下黄蠟候鎔開出火下丹藥急攪百轉下乳香麝香硃砂䓁六味不住手攪至凝磁盒内收貯白光絹上攤之消毒膏治一切腫毒結硬疼痛𤣥参葛根木香當歸升麻槐白皮甘草白歛川芎桃仁浸去皮尖杏仁浸去皮尖白附子木通赤茯苓各三錢半藁本一錢半牛膝亂髮水洗浸净令乾用二錢半牡丹皮蒼术去皮細辛各一錢半羗活何首烏天麻各二錢柴胡去苖一錢木鼈子去皮白芷各三錢白芨四錢沉香三錢半赤芍藥防風黄蓍各半兩黄丹一十三兩好者臈日澄清芝蔴油一觔四兩右藥並剉同亂髪一處用油浸七日七夜於凈石鍋或銀噐中以慢火煎候白芷焦黄色放温以綿濾去滓於磁鑵子内宻封三日三宿候取出傾於鍋内慢火輕温再濾去滓傾出磁椀中用慢火再熬動次下黄蠟一十五兩用竹錍子不住手攪令勻次下黄丹再攪令勻以慢火再熬動取下攪令勻續次再上火三日方得膏成於磁盒内宻封每用時軟白絹上攤藥貼患處神效鬼哭膏治杖瘡不疼不發無痕及治癰疽逺年惡瘡腫毒風寒暑濕疼不可忍者香油五觔栁桃槐桑枸杞枝四寸長蘇木降真莭四錢甘草三錢防風二錢川烏二錢草烏二錢半夏二錢黄蘖一錢槐花二錢紅花四錢厚朴二錢黄連五錢萆麻三錢江子二錢牙草四錢天花粉二錢川楝二錢當歸鬚三錢川椒二錢南星四錢五加皮二錢杜當歸四錢穿山甲二錢蒼术二錢白芨二錢木鼈子二錢㯽榔二錢川芎二錢貝母二錢白芷二錢婦人油頭髮一團右将前藥同五枝一處入油熬至藥似灰黒色用鉄􅀢籬撈去滓離火候稍温下黄丹三十五兩用槐條攪勻再入火畧滚一兩沸藥鍋離火再下乳香没藥血竭末各一兩攪匀用生麻布濾入别噐内將麝香一兩研輕粉七錢拌在鍋内和勻候經一宿用紫金膏治諸般惡毒乳香没藥當歸人参羗活獨活蒼术白芨黄蘖萆麻子木鼈子桔梗烏頭五倍子知母貝母白芷防風藁本蛇蜕陳艾苦参赤芍藥良薑亂髮葱白桃枝栁枝槐枝米醋雲母石甘草巴豆丁香白歛右各等分研碎内除葱白桃槐枝大蒜米醋一大椀鍋内煑三四徧下香油一觔熬至七八沸去滓每用黄丹半觔下前已碾藥味入油熬用桃槐枝一順攪至千餘徧待匀住火滳水中不㪚為度傾入水中出火氣如稀即再熬火堅則加油匀之忌孝子婦人雞犬見白龍膏治一切惡瘡焮赤腫痛沉香黄蓍白芍藥防風白芷各二錢半白茯苓去皮白檀木香栝蔞根川芎白术各二錢半甘草白芨各二錢白附子桔梗白㣲生乾地黄各一錢白歛半兩當歸洗焙半兩杏仁湯去皮尖桑白皮桃仁湯浸去皮尖各二錢木鼈子去殻人参去蘆各一錢半麝香獨活川升麻槐白皮零陵香各一錢半臈日澄清芝蔴油一觔二兩苦参一錢右並麄剉用油浸七日七夜於凈石鍋或銀噐中慢火煎候白芷焦黄色取下以綿濾去滓於磁鑵子内宻封澄三日三宿候取出傾於鍋内以慢火輕温再濾去滓傾磁椀中用慢火再熬動次下黄蠟十四兩用竹錍子不住手攪勻放温次入丸粉再攪勻以慢火輕熬動取下攪令匀續次再上火三日方得膏成於磁盒内盛宻封每用時軟白絹攤貼患處烏龍徳生膏治一切惡瘡腫毒及小兒腫毒脾癖等之類堅硬者黄茋青木香連翹𤣥参木鼈子去油殻生地黄桃仁去皮尖防風川芎白芷羗活白芨白歛金銀花各一兩萆麻子三百枚去殻亂髮一兩燒灰桂花油五錢五香連翹湯人参敗毒散復元通氣散十竒内補排膿散各五錢一貼右将黄茋等十七味五香連翹湯四藥㕮咀用小油三觔半入鐵鍋内先浸五日却用慢火煎至藥味黄黑為度以槐栁條一握不住手攪再用重絹濾去滓秤凈油三觔先将黄丹一觔半炒黒色下小油一處於慢火同熬得所滳入水中不㪚成珠後下䧺黄血竭乳香另研没藥陀僧輕粉龍骨楓香各五錢麝香一錢加蘇合油半両大妙右將䧺黄等藥末下前膏内化開攪千餘徧和匀又試水中得所成膏藥可攤為度如堅少加小油如軟加些黄丹湏要攪匀成膏切忌雞犬婦人孝子見湏誠心静意修合如小兒脾疳諸癖等症量病堅硬大小用紙或緋帛攤藥貼之候藥力盡自脱下再換小兒疳㵼痢證貼肚皮上咳𠻳貼脊梁中心其病即愈紫金膏治瘡腫疼痛辟風歛瘡當歸續斷骨碎補桂去粗皮附子澤蘭芍藥白芨牛膝羗活芎藭木香騏驎竭生乾地黄白薑白附子各一兩沉香丁香各半兩栝蔞二枚大者烏蛇肉白歛白芷𤣥参二十三味同炒杏仁桃仁去皮細研各二分右入蔴油四觔猪脂一觔半野駝脂三兩用文武火鍋内煎黒去滓再入乳香末三兩松脂六兩更煎拌後濾去滓細羅鉛丹三觔别炒紫色旋於藥油内煎栁枝攪紫色去火滳水内成珠即傾入磁噐内盛每用看瘡大小用之滅瘢膏治諸色癰疽惡瘡腫差後有瘢痕安息香一作麝礬石狼毒羊􅀈蠋烏頭附子野葛白芷烏賊骨皂莢天䧺芍藥芎藭赤石脂大黄當歸莾草石膏乾地黄地榆白术續斷鬼臼蜀椒巴豆細辛各一兩右為末用煎成猪脂四觔和以此為凖煎三上三下以塩一大匙下之膏成患毒者與服摩之忌孝服及姙娠婦人若滅瘢者以布揩令傷傅之鼻中息内者取如大豆許内鼻中如瘀血者酒服棗核大痔瘻者綿裹梅子大内下部中風者摩患上崩中者亦宜滅瘢取少許和鷹屎白傅之修合宜用臘日摩風膏摩風膏止癢消腫定疼治頭靣唇鼻諸瘡肌肉裂破黄茋去粗皮一兩一錢白芍藥茅香甘草防風各二錢半當歸去蘆白芷杏仁浸去皮尖桃仁藿香葉去梗零陵香檀香川芎各三錢白附子沉香白芨白歛天麻獨活木香各一錢半木通二錢龍腦研四錢木𤓰蔞剉一百枚黄蠟夏用十二兩半冬用九兩半右藥剉用清油二觔三兩浸七日凈石磁銀噐中慢火煎候白芷㣲黄綿濾去滓於凈磁鑵内宻封澄一宿再濾過於磁椀中慢火再輕温熬動次下黄蠟攪匀放温次下研細龍腦掺靣於磁盒内盛每用少許摩擦患處至聖膏治一切瘡癤腫毒蒴藋大黄當歸夜合花白皮白歛槐白皮白芷細辛去苖葉天麻芎藭槐枝栁枝敗龜虎骨附子去皮臍各半個乳香細研二錢麝香細研二錢砒霜細研半兩自然銅細研一分膩粉研半分生黄研半兩鉛丹十二兩定粉研半兩清油二觔半右除研藥丹粉外細剉先熬油令沸次下諸藥煎候白芷赤黒以綿絞去滓再煎下丹栁錍攪候變色黒滳水中成珠軟硬得所次下乳香等研藥更攪勻磁盒盛發背魚臍瘰􅊓並貼之日二上乳香中黄膏白芷當歸赤芍藥生地黄地龍穿山甲血竭防風大黄𤣥参苦参藁本蒼术各三錢草烏尖半兩牙皂十條兩頭尖半兩無草烏代南星二錢木鼈十五枚萆麻一百五十枚去殻乳香没藥另研一兩不入油浸蜂房二錢生葱二把桃栁槐枝各半兩右用桐油五兩浸三兩時鍋内文武火慢慢熬萆麻子焦穿山甲葱白焦黄用布濾去滓藥油另收入松香在鍋内熬開藥入在内同前化又用布濾去滓藥油與松香同熬以桃栁枝攪勻滳水中不散為度如硬入油少許藥嫩加松香方入乳没末攪勻再以布濾入水盆中候冷用水抽洗黄色為度萬痊膏治一切瘡瘍已潰未潰膿水不絶及炙瘡炙不差减生肌每用粘在鐡錍子上炭火炙消攤紙上貼患處兩日一換之乳香没藥各四錢半另研半夏不剉當歸續斷杏仁桃仁巴豆和皮搥碎木鼈子仁芫花大㦸川芎熟地黄芍藥蒼术防風乾薑生用蛇床子桂各半兩松枝桃枝新者各二兩亂髮二磈如馬毬大澄清芝蔴油十觔右将藥下油内浸七日慢火煎熬令鐵杓攪至半夏黄黒色為度竹篩濾去滓另研血竭三錢半下油内攪勻用綿濾在盆噐中澄去滓油揩鍋并杓至凈再用綿濾入鍋内入油每一觔用黄丹五兩黄丹性𦂳只用四兩半准偹冬春秋間使用如夏月用者使黄丹五兩二三錢並看丹急慢調品用慢柴火燒熬不住手攪令變黒色㣲益武火至沫下依前用慢火熬候黒烟出住火如此二日後用木炭火飬仍不得暫住手攪直至通前四五日攤紙上不湮硬軟得所盛在磁噐内方欲凝時用絹子裹水銀搭在膏靣上如用時揩去水銀如此不至膏藥上靣一重乾了臘月煎熬佳萬靈膏治一切惡瘡腫毒青木香連翹木鼈仁桃仁萆麻仁巴豆仁地黄白芷防風川芎黄茋羗活當歸黄連蓬术露蜂房槐枝栁枝桃枝已上皆㕮咀没藥研輕粉各半兩黄丹十五兩右將前藥入真香油三十兩浸春秋七日夏五日冬十日慢火熬至巴豆萆麻仁抹開如泥黒色濾去滓逐旋入丹以槐栁枝不住手攪候丹盡然後下乳没滳水中成珠為度提起離火攪至㣲温入輕粉攪勻至冷以椀覆地上出火毒收藏時先用真蛤粉撲裹却入凈瓮噐内收貯用之黒金膏治男子婦人癤毒惡瘡臁瘡發背風毒瘡黄茋黄連黄蘖黄芩大黄防風白歛白芷南星花粉荆芥猪牙皂莢露蜂房木鼈二枚烏頭小者一枚碎萆麻子十枚桃仁杏仁栁枝槐枝栢枝稍各五錢右用香油一觔同煎藥焦濾去滓候温入黄丹半觔入五靈脂為末乳香没藥末各三錢再煎滳水椀内為膏油煙起便住欲用以帛攤之太乙靈應膏治諸般惡瘡惡毒並可外貼内服一丸每丸如櫻桃大蛤粉為衣各随後項飲子服之亦治杖瘡𤣥参半兩生地黄半兩補血大黄二錢同上黄蘖三錢同上黄芩二錢同上槐花二錢同上紅花二錢活血白