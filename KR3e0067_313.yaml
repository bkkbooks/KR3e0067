內以磁器盛封蓋於甑上蒸乘熱攪調收用膏藥熬成後須連所盛磁器置淨水中出火毒一晝夜歇三日用方可用日換兩次夜換一次熬此膏藥極難於火候須察頻看火緊慢大猛即藥中火發不特失藥性又傷人靣目救助不及千萬謹戒膏藥方甚多不下數十治疽之時神效無出於此方千金不換杖瘡尤效沒藥膏治發背方見本門瘡毒腫傷折類金絲膏治諸般瘡木鱉子五枚乳香三錢沒藥四錢當歸五錢雄黃四錢白膠半兩黃蠟三錢右先用小油半斤和蠟一處看硬軟次入餘藥末攤貼黑神膏治諸瘡榮衛未腐腫痛堅硬焮赤不消當歸一兩黃丹六兩栁枝桃枝各二十兩小油二十兩血餘如雞子二塊杏仁湯浸去皮尖一百箇右除黃丹外入鍋內以火熬兩時辰綿濾去滓再入鍋內熬滳水成珠不散入黃丹用文武火熬成黑膏用木通膏治一切癰疽發背疼痛不止木通二兩黃丹五兩細辛一兩茵蔯一兩琥珀半兩别研硃砂半兩右先煎油令沸即下細辛木通茵蔯煎五七沸去滓即入琥珀硃砂末更煎用栁木錍攪候滳水中成珠膏成收於磁盒中每攤膏於故帛上貼日二易丁香膏治一切癰疽發背疼痛不可忍丁香半兩麻油一斤黃丹七兩丈夫頭髮一兩蠟一兩桂心半兩末當歸半兩末右煉油令香下髮煎盡次下蠟以綿濾過却入鐺中下黃丹不住手攪候色黑滳水內如珠即下桂下當歸等末攪勻以磁器盛用故帛候攤貼日二換五枝膏香油一斤桃枝栁枝橘枝梅枝桑柱萆麻子六十七粒去殼右各藥浸油中同煎赤色撈去五枝用帛濾淨下乳香一錢次下沒藥三錢逐旋下黃丹半斤次下瀝青不住攪之膏成為度萬應膏治一切惡瘡疼痛乳香一錢木鱉子四箇去皮當歸半兩黃丹四兩桃枝槐枝各四寸清芝麻油半斤右入油內慢火熬不住手攪焦色去滓入黃丹熬滳水中不散入乳香攪勻收用止痛拔毒膏治一切瘡發腐爛不可近未破貼則破已破則生肉兼治杖瘡疔瘡斑貓四十九箇栁根四十九條木鱉子七箇乳香沒藥麝香少許松脂三錢右用真清油十四兩煎黑栁條焦枯濾去滓入黃丹五兩滳入水中成珠為度却入諸藥攪及勻入磁器中收了後用神效千金錠子蟾酥不拘多少粉霜少許雄黃少許麝香少許巴豆一枚去殼八角兒四箇栁樹上者乳香少許右將八角兒先研如泥化開黃蠟少許入前藥末和成膏子如麥粒大如有患瘡者先用迷針針破疼時用槐條兒送下藥隨後用雀兒糞瘡口內放一粒如瘡疼者非疔不須再下藥如針破無血係是著骨疔即於男女左右中指甲內刺無血即於腳上大拇指甲內刺取血糊納藥丸下瘡口效如是都無血時恐證難醫必即死然如此可再用香油二斤黃丹一斤白巴豆四百八十箇銅鍋內煎油熟次入桃枝二十根煎枯將出次下栁枝二十根長二寸煎枯將出三次下巴豆煎枯將出油放入磁鍋內煎油熱下丹文武火攪勻一箇半時辰熬取下於地再攪滳水成珠沉下方好就砂鍋番轉合在地上二日第四日方可用野葛膏治癰疽痔瘻惡瘡婦人妬乳漆瘡野葛芍藥薤白當歸通草各一分附子一分右㕮咀醋浸半日先煎豬脂八合候令煙出內乳髮二分令消盡下之待冷又內松脂八分蠟二分更著火上和次內諸藥煎令沸三上三下去滓以故帛傅藥貼腫上乾即易如春月去附子其髮須淨洗不爾瘡疼烏犀膏治一切惡瘡瘰癧癰疽發背瘡隂炙瘡湯火瘡及閃撲損白芷板藍根苦參芎藭並銼各一兩半鉛丹六兩清麻油十五兩右先將油同前四味慢火熬煎令藥焦黑用綿濾去滓再入鍋內亦用文武火煎沸下鉛丹以栁木錍攪勻滳水內成珠為度即傾磁器內密封收如用無灰紙攤貼胡粉膏治一切癰疽發背日夜發渴疼痛不止胡粉四兩油半斤蠟三兩半乳香半兩細研麝香一錢細研沒藥半兩細研右以文火煎令油熟下胡粉後下蠟臨成下麝香乳沒攪勻勿住手待星花上即住以磁器內盛於故帛上塗貼日二換無名異膏治一切瘡毒無名異細研騏驎竭細研各一分栁枝銼二兩蠟一兩鉛丹五兩油十二兩右熬油令沸下栁枝煎候赤黑色以綿濾過再煎下丹蠟攪候變色滳水中成珠得所下騏驎竭無名異末更攪令勻㵼冷水中捻作挺子一切惡瘡發背諸毒瘡並宜塗貼如聖膏治一切惡瘡癤毒薔薇根銼乳香阿魏研各一兩栁枝二兩銼長一寸鉛丹六兩清油一斤右熬油令沸下栁枝薔薇根煎候黃黑色以綿濾過下丹煎攪候變黑色次下乳香阿魏更攪令勻一切瘡腫並用故帛上塗貼之如患赤眼頭痛眼澀貼太陽兩次驢傷馬墜婦人血氣並當歸酒下三丸如梧桐子大癬瘡先􅎲破取膏塗貼白膏治一切瘡癤癰腫及瘻瘡杖瘡等定粉三兩清油四兩煉熟取三兩鉛丹二錢商陸根三分暴乾稱蠟四兩白栁枝半兩青白而葉大者冬月抹去粗皮取內白皮切作片子暴乾稱右先以熟油熬商陸根栁枝令色變後入粉蠟丹攪之不住手直至滳水內為珠攤帛上貼之熬時始則色微紅次微青乃熟也取出久而色白冬色愈白乳香膏香油二兩萆麻六十五粒去殼赤芍藥三錢當歸一錢半木鱉三箇去殼楊枝十束右將藥沒油中煎去滓藥淨次下乳香二錢瀝青十二兩入內調成膏滳水中不散為度黃蠟膏治膁瘡槐條椿皮桃條棟條栁條荆芥各一束右各條熬湯蕩洗用無漿絹帛拭乾用生黃蠟於紙上量瘡大小攤膏十箇十層拴於瘡上三日一次洗除去著瘡蠟紙膏一箇不用貼之一月無問年深近日必愈金絲膏治諸般惡瘡疼痛白膠香五錢瀝青黃蠟三錢小油三錢沒藥二錢另研乳香二錢半另研右將油蠟白膠瀝青用栁枝攪化盡後用乳沒入藥內再攪勻綿濾過傾水內再攪三二十遍後任意攤用調聖膏治二十四腫瘡毒等證新石炭蕎麥桿灰半錢胡椒三十粒巴豆三十粒去殼木鱉子去殼落藜草灰半升右以三灰一處和勻三藥一處研細别置箱箕攤帛於箕內置灰帛上下置丸鉢盛貯用沸湯五盞淋取汁候稍澄勿用腳將汁入銚熬沸才乾又添直待煎至半盞許如兩呷多太乾即剗起入磁器內以椒巴豆等藥末攪令勻使用黃蠟封固勿泄氣候冷挑一星許微點舌頭上即時潰爛些少過一刻使無事此其驗也膩粉膏治風邪熱毒等證容摶皮膚之間以致身體生瘡或癢或痛及大小頑疥瘡焮赤疼痛黃水浸淫侵展肌汁不絶甘草一兩末豬脂煉六兩松脂半兩膩粉胡粉黃連末各二兩右藥先以豬脂煎松脂次入黃蠟二兩濾去滓次下膩粉并四味攪勻仍於磁器中收貯每用少許塗之日三四易此膏援熱毒止痛生肌肉斂瘡口乳香金絲膏治一切瘡腫玄參二兩黃芩栁枝槐枝當歸各二兩黃茋一兩右用香油一斤慢火熬藥至黑色濾去滓入黃丹四兩飛過熬至黑色滳水中不散為度放冷用紙攤貼香油半斤料總計四兩夏用丹三兩冬用二兩半春秋二兩八錢碧油膏止痛排膿未潰用之則消腫散毒已潰破則排膿生肌及治炙瘡後便用此膏貼則尤佳桃枝栁枝桑枝槐枝白莢枝右焙乾為末麻油十兩同煎取八兩去滓令淨入黃丹乳香血竭末各半兩再熬成膏熬約七兩以下用磁器盛埋地中一宿去火毒以無灰紙攤貼善應膏治癰疽潰後長肌傅瘢白芷黃茋各一兩甘草一錢黃蠟二兩黃丹二兩半右前三味並為粗末春秋用真麻油四兩半夏四兩冬月用五兩熬藥紫赤色用綿去滓然後入臘黃丹以栁枝不住手攪勻滳水成珠即止用如常法紫金膏治一切瘡腫皂莢一錢不蛀者去皮蔥五莖去根鉛丹研團粉研各四兩松脂研二兩右清油半斤先煎皂莢蔥二味焦黃綿濾去滓次下鉛丹又下團粉松脂以栁木錍不住手攪滳水中不散為度隨瘡大小攤貼之寒水石膏治發背寒水石二兩為末謂之石膏明者擇明月盈夜埋地中露天三日夜薄土蓋挹其月華取出不見火研清麻油四兩黃蠟黃丹各一兩楓香二兩右將油熬黃蠟等三味成稀膏提起藥銚候無煙下寒水石末急調勻又露月下三夜日間收起若陽證變發背瘡用之立效不問破與不貼之如冰生肌長肉膏治一切癰疽惡瘡清油十兩龍骨研二兩木香檳榔黃連去須各三分同三味為細末右將油入鍋內慢火熬滳水成珠下龍骨末更熬如稀膏則止去火候稍溫入三味藥不得住手攪候冷以磁盒盛收隨瘡大小攤貼玄武膏治癰疽發背疔腫內外膁瘡隂陽諸惡瘡及頭頂癰腫不問已潰未潰皆可用大能排膿散毒止疼生肌纍有神驗若疔腫先用銀箆或皂角針於疔瘡中間及四畔針破令出惡血以追毒餘如小麥大擦入孔中却以此膏貼之如瘡壞爛至甚難以藥貼則將皂角二三片煎油調勻此膏如稠糊傅之膿水或轉多數次傅之乾愈妙巴豆二兩淨木鱉子仁二兩黃丹四兩清油十兩槐栁嫩枝各七條每長寸許銼碎右將木鱉子巴豆槐栁枝用磁器或銅鐵銚盛油浸藥一宿慢火煎熬諸藥黑色用生絹帛濾去滓復將所濾油於慢火上再熬却將黃丹入油內用長條槐栁枝不住手攪候有微煙起即將出藥點滳在水靣上凝結成珠不散成膏矣傾入磁器內收貯置新汲水內三日出火毒後攤用烏膏療一切瘡引膿生肌殺蟲烏麻油一升用清者黃丹三兩羅松脂半兩末薰陸香一兩乳頭者蠟半兩煉淨右先空煎油三分減一停待冷次入黃丹更上火緩煎又三分減一又停冷次入薰陸香末不冷即恐溢沸出煎候香消盡下松脂及蠟看膏稍稠即點鐵物上試之斟酌硬軟適中乃罷先問所患瘡是熱即減薰陸香及松脂若瘡苦疼如久不差此涉於冷依方煎之治杖瘡者油若一升地黃汁半合黃丹二大兩蠟一小兩餘凖上法乳香膏治諸瘡癰癤等及小兒瘡乳香一兩膩粉松脂蜜陀僧各半兩生地黃汁半合右為末用好油四兩黃蠟二兩煉熟下諸藥熬成膏入麝香一錢取出窨一宿每用看瘡大小攤貼日一二換神仙膏治馬汗血入瘡一名膏藥方鉛丹三兩炒紫色清麻油六兩當歸半兩切碎綿裹杏仁四十九枚不去皮尖椎碎綿裹桃栁枝各二十一莖但長肥瘐者佳右先油慢火煎約三時辰入杏仁當歸兩裹候杏仁黃紫色漉出二味却入桃栁枝煎亦如杏仁等時候漉别用綿濾過再煎下鉛丹用栁木錍攪一向左轉不住手至稠取膏少許滳水中若直墜下水底不散在水靣其膏成矣傾在瓷器中候冷却以新汲水浸一宿來晨去水收貯勿令雞犬婦見每用少許攤貼乳香膏治發背癰疽腫痛一切瘡癤黃蠟一兩半定粉二兩半乳香一兩小油四兩右用瓷碗盛油蠟放湯鍋熬消盡蠟入乳香定粉用栁枝攪沫散放冷水內去火毒量瘡攤帛紙隨用忌鐵器白玉膏治縮收癰疽不令蔓衍切忌用冷藥杏仁二十一粒去皮尖别研川椒四十九粒去目出汗為末清油一斤右同熬至紫色黑新綿濾過用無灰薄紙看瘡大小剪作梳樣攤藥在上於瘡暈盡處兩邊圍繞貼之候暈漸收近裏别剪差小者再攤藥圍貼暈又收即又再移近裏貼仍頻換候暈已收見瘡根腳或瘡口即用次方凡貼大惡瘡毒氣方盛不可以藥當上貼恐過散毒氣瘡益大此藥能收暈見瘡根其法大妙普濟方卷三百十三
