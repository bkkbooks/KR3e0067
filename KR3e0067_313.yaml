body:
  text: 普濟方卷三百十三明周王朱橚撰膏藥門總論凡諸痛癢瘡瘍癰腫疽疹瘤氣結核拂欎甚者皆熱五臟不和九竅不通六腑不和留結為癰近於火氣微熱甚癢熱甚則痛附近則灼而為瘡皆火之用也人之瘡腫因內熱外虛所生也為風濕之所乘則生瘡腫然肺主氣候於皮毛脾主肌肉氣虛則膚腠開為風濕所乘脾氣溫而內熱即生瘡也腫者由寒熱毒氣客於經絡使血澀而不通壅結成腫風邪內作即無頭無根氣血相摶作者即有頭有根壅盛則為膿赤根腫則為風氣流潰也瘡有痛癢痛則為實癢則為虛非為虛為寒也謂熱之微甚也癢者熱疾也故火旺於夏而萬物著鮮榮美也炙之以火潰之以湯而其癢轉甚者微熱之所使也癢去者謂熱令皮膚縱緩腠理開通陽氣得泄熱散而去或夏熱皮膚癢而以冷水沃之其癢不去謂寒氣收斂腠理閉密陽氣欎結不能散越沸熱內作故也瘡瘍皆為火熱而及腐出膿水者猶穀肉果菜熱極則腐爛而潰為汚水也潰而腐爛者水之化也癰淺而大疽深而惡勝熱血則為癰膿也瘍有頭小瘡也脈浮而小癮疹也瘤氣赤瘤丹熛熱勝氣火之色也諸瘡之證或腫或潰或硬或久不差者皆藉以膏劑去殠腐排惡汁化死肌生良肉者正以此也諸瘡毒腫方十香膏治五發惡瘡結核瘰癧疳瘻疽痔沉香麝香各一錢木香乳香甘松丁香白芷安息香零陵香各五錢同為細末藿香五錢為細末當歸川芎黃茋茴香芍藥細辛升麻白斂獨活川椒藁本菖蒲厚朴木鱉子官桂銼各二錢桃仁五錢商陸根二兩銼杏仁柏子仁松子仁各五錢槐枝桑枝栁枝松枝沒藥輕粉雄黃硃砂雲母石生犀角亂髮灰白礬灰各二兩另研如粉蟾酥豬脂羊腎脂各二兩清芝麻油三斤黃丹一斤右先用木炭火煉油香熟下十六味銼藥并四枝四仁熬至紫黑出火濾滓入脂酥煎十餘沸綿濾過油澄拭鐺淨火上煎油沸下丹藥桞枝作錍不住攪熬一日滳水中成珠離火入十味藥末攪勻上火入雲母輕粉八味輕煎沸出火攪食傾於磁盒內封密收每用量瘡口大小緋帛上攤貼腸胃癰疽可作丸如桐子大每服七丸空心溫酒下消毒膏治五發惡瘡消毒散腫當歸黃蓍川芎杏仁白芷白斂零陵香槐白皮栁枝嫩者木鱉仁甘松各半兩銼乳香沒藥各三錢麝香朱紅硃砂各半錢黃丹半斤炒紫色芝麻油一斤輕粉一錢黃蠟半斤右將銼藥油浸七日木炭火上煎杏仁焦色濾去滓下黃蠟候鎔開出火下丹藥急攪百轉下乳香麝香硃砂等六味不住手攪至凝磁盒內收貯白光絹上攤之消毒膏治一切腫毒結硬疼痛玄參葛根木香當歸升麻槐白皮甘草白斂川芎桃仁浸去皮尖杏仁浸去皮尖白附子木通赤茯苓各三錢半藁本一錢半牛膝亂髮水洗浸淨令乾用二錢半牡丹皮蒼术去皮細辛各一錢半羌活何首烏天麻各二錢柴胡去苖一錢木鱉子去皮白芷各三錢白芨四錢沉香三錢半赤芍藥防風黃蓍各半兩黃丹一十三兩好者臘日澄清芝麻油一斤四兩右藥並銼同亂髮一處用油浸七日七夜於淨石鍋或銀器中以慢火煎候白芷焦黃色放溫以綿濾去滓於磁罐子內密封三日三宿候取出傾於鍋內慢火輕溫再濾去滓傾出磁碗中用慢火再熬動次下黃蠟一十五兩用竹錍子不住手攪令勻次下黃丹再攪令勻以慢火再熬動取下攪令勻續次再上火三日方得膏成於磁盒內密封每用時軟白絹上攤藥貼患處神效鬼哭膏治杖瘡不疼不發無痕及治癰疽逺年惡瘡腫毒風寒暑濕疼不可忍者香油五斤栁桃槐桑枸杞枝四寸長蘇木降真莭四錢甘草三錢防風二錢川烏二錢草烏二錢半夏二錢黃蘖一錢槐花二錢紅花四錢厚朴二錢黃連五錢萆麻三錢江子二錢牙草四錢天花粉二錢川楝二錢當歸鬚三錢川椒二錢南星四錢五加皮二錢杜當歸四錢穿山甲二錢蒼术二錢白芨二錢木鱉子二錢檳榔二錢川芎二錢貝母二錢白芷二錢婦人油頭髮一團右將前藥同五枝一處入油熬至藥似灰黑色用鐵􅀢籬撈去滓離火候稍溫下黃丹三十五兩用槐條攪勻再入火略滚一兩沸藥鍋離火再下乳香沒藥血竭末各一兩攪勻用生麻布濾入别器內將麝香一兩研輕粉七錢拌在鍋內和勻候經一宿用紫金膏治諸般惡毒乳香沒藥當歸人參羌活獨活蒼术白芨黃蘖萆麻子木鱉子桔梗烏頭五倍子知母貝母白芷防風藁本蛇蛻陳艾苦參赤芍藥良薑亂髮蔥白桃枝栁枝槐枝米醋雲母石甘草巴豆丁香白斂右各等分研碎內除蔥白桃槐枝大蒜米醋一大碗鍋內煮三四遍下香油一斤熬至七八沸去滓每用黃丹半斤下前已碾藥味入油熬用桃槐枝一順攪至千餘遍待勻住火滳水中不散為度傾入水中出火氣如稀即再熬火堅則加油勻之忌孝子婦人雞犬見白龍膏治一切惡瘡焮赤腫痛沉香黃蓍白芍藥防風白芷各二錢半白茯苓去皮白檀木香栝蔞根川芎白术各二錢半甘草白芨各二錢白附子桔梗白微生乾地黃各一錢白斂半兩當歸洗焙半兩杏仁湯去皮尖桑白皮桃仁湯浸去皮尖各二錢木鱉子去殼人參去蘆各一錢半麝香獨活川升麻槐白皮零陵香各一錢半臘日澄清芝麻油一斤二兩苦參一錢右並粗銼用油浸七日七夜於淨石鍋或銀器中慢火煎候白芷焦黃色取下以綿濾去滓於磁罐子內密封澄三日三宿候取出傾於鍋內以慢火輕溫再濾去滓傾磁碗中用慢火再熬動次下黃蠟十四兩用竹錍子不住手攪勻放溫次入丸粉再攪勻以慢火輕熬動取下攪令勻續次再上火三日方得膏成於磁盒內盛密封每用時軟白絹攤貼患處烏龍德生膏治一切惡瘡腫毒及小兒腫毒脾癖等之類堅硬者黃茋青木香連翹玄參木鱉子去油殼生地黃桃仁去皮尖防風川芎白芷羌活白芨白斂金銀花各一兩萆麻子三百枚去殼亂髮一兩燒灰桂花油五錢五香連翹湯人參敗毒散復元通氣散十竒內補排膿散各五錢一貼右將黃茋等十七味五香連翹湯四藥㕮咀用小油三斤半入鐵鍋內先浸五日却用慢火煎至藥味黃黑為度以槐栁條一握不住手攪再用重絹濾去滓稱淨油三斤先將黃丹一斤半炒黑色下小油一處於慢火同熬得所滳入水中不散成珠後下雄黃血竭乳香另研沒藥陀僧輕粉龍骨楓香各五錢麝香一錢加蘇合油半兩大妙右將雄黃等藥末下前膏內化開攪千餘遍和勻又試水中得所成膏藥可攤為度如堅少加小油如軟加些黃丹須要攪勻成膏切忌雞犬婦人孝子見須誠心靜意修合如小兒脾疳諸癖等症量病堅硬大小用紙或緋帛攤藥貼之候藥力盡自脫下再換小兒疳㵼痢證貼肚皮上咳嗽貼脊梁中心其病即愈紫金膏治瘡腫疼痛辟風斂瘡當歸續斷骨碎補桂去粗皮附子澤蘭芍藥白芨牛膝羌活芎藭木香騏驎竭生乾地黃白薑白附子各一兩沉香丁香各半兩栝蔞二枚大者烏蛇肉白斂白芷玄參二十三味同炒杏仁桃仁去皮細研各二分右入麻油四斤豬脂一斤半野駝脂三兩用文武火鍋內煎黑去滓再入乳香末三兩松脂六兩更煎拌後濾去滓細羅鉛丹三斤别炒紫色旋於藥油內煎栁枝攪紫色去火滳水內成珠即傾入磁器內盛每用看瘡大小用之滅瘢膏治諸色癰疽惡瘡腫差後有瘢痕安息香一作麝礬石狼毒羊􅀈蠋烏頭附子野葛白芷烏賊骨皂莢天雄芍藥芎藭赤石脂大黃當歸莾草石膏乾地黃地榆白术續斷鬼臼蜀椒巴豆細辛各一兩右為末用煎成豬脂四斤和以此為凖煎三上三下以鹽一大匙下之膏成患毒者與服摩之忌孝服及妊娠婦人若滅瘢者以布揩令傷傅之鼻中息內者取如大豆許內鼻中如瘀血者酒服棗核大痔瘻者綿裹梅子大內下部中風者摩患上崩中者亦宜滅瘢取少許和鷹屎白傅之修合宜用臘日摩風膏摩風膏止癢消腫定疼治頭靣唇鼻諸瘡肌肉裂破黃茋去粗皮一兩一錢白芍藥茅香甘草防風各二錢半當歸去蘆白芷杏仁浸去皮尖桃仁藿香葉去梗零陵香檀香川芎各三錢白附子沉香白芨白斂天麻獨活木香各一錢半木通二錢龍腦研四錢木瓜蔞銼一百枚黃蠟夏用十二兩半冬用九兩半右藥銼用清油二斤三兩浸七日淨石磁銀器中慢火煎候白芷微黃綿濾去滓於淨磁罐內密封澄一宿再濾過於磁碗中慢火再輕溫熬動次下黃蠟攪勻放溫次下研細龍腦摻靣於磁盒內盛每用少許摩擦患處至聖膏治一切瘡癤腫毒蒴藋大黃當歸夜合花白皮白斂槐白皮白芷細辛去苖葉天麻芎藭槐枝栁枝敗龜虎骨附子去皮臍各半個乳香細研二錢麝香細研二錢砒霜細研半兩自然銅細研一分膩粉研半分生黃研半兩鉛丹十二兩定粉研半兩清油二斤半右除研藥丹粉外細銼先熬油令沸次下諸藥煎候白芷赤黑以綿絞去滓再煎下丹栁錍攪候變色黑滳水中成珠軟硬得所次下乳香等研藥更攪勻磁盒盛發背魚臍瘰􅊓並貼之日二上乳香中黃膏白芷當歸赤芍藥生地黃地龍穿山甲血竭防風大黃玄參苦參藁本蒼术各三錢草烏尖半兩牙皂十條兩頭尖半兩無草烏代南星二錢木鱉十五枚萆麻一百五十枚去殼乳香沒藥另研一兩不入油浸蜂房二錢生蔥二把桃栁槐枝各半兩右用桐油五兩浸三兩時鍋內文武火慢慢熬萆麻子焦穿山甲蔥白焦黃用布濾去滓藥油另收入松香在鍋內熬開藥入在內同前化又用布濾去滓藥油與松香同熬以桃栁枝攪勻滳水中不散為度如硬入油少許藥嫩加松香方入乳沒末攪勻再以布濾入水盆中候冷用水抽洗黃色為度萬痊膏治一切瘡瘍已潰未潰膿水不絶及炙瘡炙不差減生肌每用粘在鐡錍子上炭火炙消攤紙上貼患處兩日一換之乳香沒藥各四錢半另研半夏不銼當歸續斷杏仁桃仁巴豆和皮捶碎木鱉子仁芫花大戟川芎熟地黃芍藥蒼术防風乾薑生用蛇床子桂各半兩松枝桃枝新者各二兩亂髮二磈如馬毬大澄清芝麻油十斤右將藥下油內浸七日慢火煎熬令鐵杓攪至半夏黃黑色為度竹篩濾去滓另研血竭三錢半下油內攪勻用綿濾在盆器中澄去滓油揩鍋并杓至淨再用綿濾入鍋內入油每一斤用黃丹五兩黃丹性緊只用四兩半準偹冬春秋間使用如夏月用者使黃丹五兩二三錢並看丹急慢調品用慢柴火燒熬不住手攪令變黑色微益武火至沫下依前用慢火熬候黑煙出住火如此二日後用木炭火飬仍不得暫住手攪直至通前四五日攤紙上不湮硬軟得所盛在磁器內方欲凝時用絹子裹水銀搭在膏靣上如用時揩去水銀如此不至膏藥上靣一重乾了臘月煎熬佳萬靈膏治一切惡瘡腫毒青木香連翹木鱉仁桃仁萆麻仁巴豆仁地黃白芷防風川芎黃茋羌活當歸黃連蓬术露蜂房槐枝栁枝桃枝已上皆㕮咀沒藥研輕粉各半兩黃丹十五兩右將前藥入真香油三十兩浸春秋七日夏五日冬十日慢火熬至巴豆萆麻仁抹開如泥黑色濾去滓逐旋入丹以槐栁枝不住手攪候丹盡然後下乳沒滳水中成珠為度提起離火攪至微溫入輕粉攪勻至冷以碗覆地上出火毒收藏時先用真蛤粉撲裹却入淨甕器內收貯用之黑金膏治男子婦人癤毒惡瘡臁瘡發背風毒瘡黃茋黃連黃蘖黃芩大黃防風白斂白芷南星花粉荆芥豬牙皂莢露蜂房木鱉二枚烏頭小者一枚碎萆麻子十枚桃仁杏仁栁枝槐枝柏枝稍各五錢右用香油一斤同煎藥焦濾去滓候溫入黃丹半斤入五靈脂為末乳香沒藥末各三錢再煎滳水碗內為膏油煙起便住欲用以帛攤之太乙靈應膏治諸般惡瘡惡毒並可外貼內服一丸每丸如櫻桃大蛤粉為衣各隨後項飲子服之亦治杖瘡玄參半兩生地黃半兩補血大黃二錢同上黃蘖三錢同上黃芩二錢同上槐花二錢同上紅花二錢活血白