body:
  text: 普濟方卷二百二十九明周王朱橚撰虛勞門風勞附論夫風勞者肝勞之類也肝主風風善行而數變無所不至勞傷之人血氣俱虛風邪易侵或遊易皮膚或沉滯腑臟其病令人手足􅍙痺筋脈拘急頭旋眼暗弩怒驚悸尋覔衣縫瞪語狂呼爪甲枯目黑是其證也方鱉甲湯治風勞四肢倦怠百節痠疼飲食漸少行履艱涕唾稠黏多困少力靣色萎黃小便赤澀黃耆鱉甲去裙醋炙秦艽去苗土柴胡去苗當歸切焙各一兩知母切焙一兩人參芎藭羌活去蘆赤茯苓去皮黃芩去黑心紫苑去土甘草炙芍藥桑白皮白蘚皮欵冬花陳橘皮浸去白焙貝母去心焙木香桂去粗皮附子炮裂去皮臍各五錢丁香一分右銼如麻豆每服三錢水一大盞入烏梅一枚薑三片棗二枚同煎至七分去滓入麝香少許稍熱服入酒一半同煎尤佳羌活湯一名羌活煮散治風勞攻注四肢皆腫疼上焦虛熱心胸躁悶面少色困乏無力元臟虛憊腰腳沉重日漸羸冷氣時攻腹脅如刺脹滿酒後痰唾稠多大宜服此羌活去蘆荆芥穗附子炮去皮臍秦艽去苗土麻黃去節牛膝酒浸切白蒺梨酒浸一宿焙各二兩人參沉香銼牡丹皮當歸切焙甘草炙銼半夏生薑汁浸一宿焙切白茯苓去皮鹿茸酥炙去毛萆􅐺防己桂去皮各一兩右㕮咀每服三錢水一鍾棗二枚蔥白二寸煎至七分去滓溫服空心午前臨卧各一服忌動風物石斛丸治風勞氣四肢羸弱心神虛煩飲食無味肢節疼腰腳無力夜多盜汗小便赤黃石斛去根苗牛膝去苗桂杜仲去粗皮炙稍微赤銼焙白茯苓續斷兔絲子酒浸一宿焙乾别搗枸杞子五味子山茱萸黃耆銼防風去蘆頭逺志去心肉蓯蓉酒浸一宿刮去皺皮焙乾人參去蘆頭天門冬去心焙各一兩熟乾地黃二兩右為末煉蜜搗三二百杵丸如梧桐子每服食前溫酒下三十丸黃耆散治風勞臟腑氣虛體瘦無力不思飲食四肢疼痛黃耆銼一兩續斷一兩人參三分去蘆頭茯神一兩五味子三分羌活芎藭桂心各五錢附子三分炮裂去皮臍防風去蘆頭一兩牛膝去苗五錢枳殼三分炒微黃甘草炙微赤銼當歸一錢沉香三分右為散每服三錢以水一中盞入生薑半分煎至六分去滓每於食前溫服沉香散治風勞氣攻四肢枸急背膊常痛肌體萎弱不欲飲食沉香石斛去根銼黃耆銼桂心白茯苓白术天門冬去心焙白芍藥當歸銼微炒羌活附子炮製去皮臍防風去蘆頭陳橘皮湯浸去白穰焙各一兩熟乾地黃一兩甘草五錢炙微赤銼右為散每服三錢水一中鍾入生薑半分煎至六分去滓溫服巴戟散治風勞氣血不足臟腑虛傷肢節煩痛腰膝弱形體羸瘦面萎黃小便數多卧即盜汗巴戟柏子仁石龍芮天麻牛膝去苗牡蠣燒為粉兔絲子酒浸一宿焙乾别搗肉蓯蓉酒浸一宿刮去皺皮炙乾天雄炮裂去皮臍各一兩萆􅐺銼防風去蘆頭羌活當歸桑螵蛸微炙各三分肉桂二兩去皺皮右為散每服空心及晚食前以溫酒調下二錢鍾乳散出聖惠方治風勞臟氣虛損肌體羸瘦頭目昏悶四肢少力神思不安鍾乳粉紫石英細研水飛過白石英各一兩細研水飛過白术三分防風去蘆頭桂心􅌝􅌣根乾薑炮裂細銼三分細辛三分牡蠣三分桔梗半兩去蘆頭川椒去目并閉口者微炒去汗人參去蘆頭白茯苓附子各一兩炮裂去皮臍右為散入研了藥令勻每服食前溫酒調下二錢敗龜湯治風勞氣虛咳嗽發熱敗龜醋炙虎骨醋炙防風去蘆頭海桐皮銼當歸切焙芍藥木通銼各五錢桂去粗皮木香酸棗仁炒黃耆銼大腹皮銼麻黃牛膝酒浸酒焙各一兩右為散每服三錢水一盞入青蒿烏梅各少許同煎至七分去滓溫服一方加柴胡熟乾地黃各五錢肉蓯蓉散出聖惠方治風勞補益臟腑利腰膝止煩疼強志力充肌膚肉蓯蓉酒浸一宿刮去皺皮炙令乾兔絲子酒浸一宿焙乾别搗牛膝去苗附子炮裂去皮臍杜仲去粗皮炙令黃銼白茯苓各一兩防風去蘆頭桂心巴戟續斷枸杞子各三分五味子蛇床子山茱萸各五錢右為散每服食前以溫酒調下二錢附子散出聖惠方治風勞肌體羸瘦皮膚不潤肢節煩疼腰膝無力少思飲食附子炮裂去皮臍牛膝去苗桂心當歸各一兩五加皮防風去蘆頭萆薢銼杜仲去粗皮炙微黃銼續斷丹參沉香木香枳殼麩炒微黃去麩各二兩右為散每服四錢以水一中盞入生薑半分煎六分去滓溫服薑黃散治風勞四肢無力胸膈煩悶薑黃二兩沉香三分黃耆銼一兩桂去粗皮五錢玄胡索炒人參各三分厚朴去粗皮生薑汁炙五錢芎藭三分防風去皮五錢芍藥三分羌活去蘆頭杏仁湯浸去皮尖銼研各五錢訶梨勒皮微炒三分右為散再同研勻每服三錢空心井華水一盞煎至七分别調藥末一錢溫服午後再服茵蔯散治風勞瘦疾七種冷氣六極等疾脾胃虛寒不思飲食疳痢休息大小便澀兼治纍年口瘡茵蔯蒿犀角屑石斛去根紫參人參白术柴胡去苗各三分桂去粗皮芍藥防風去義各五錢茱萸湯洗炒一兩桔梗炒五錢白蕪荑七分右為散白羊肝一具細切分為三服去淨筋膜每服入藥末五錢蔥白五寸細切一處拌和用濕紙裹慢火煨熟空腹頓服之羚羊角湯治風勞困劣不思飲食及大病後羸瘦不食及虛勞潮熱羚羊角屑犀角屑人參防風去甘草炙銼柴胡去苗桔梗炒白茯苓去黑皮半夏湯浸七遍焙各一分黃耆銼知母焙各半分升麻半分右粗搗篩每服五錢水一盞半煎至一盞去滓食後分溫二服排風飲治風勞虛熱攻頭項急言語錯亂心膈煩悶四肢拘急手足痠痛防風去苖當歸焙白术白蘚皮芍藥桂去粗皮芎藭獨活去蘆頭麻黃去根節甘草炙銼杏仁皮尖去淨炒茯神去木各一兩右粗搗篩每服五錢以水一盞半生薑三片煎至八分去滓食後溫服防風散出聖惠方治風勞體虛食少羸瘦筋脈不利手足多疼防風去蘆頭天麻海桐皮附子炮裂去皮臍沉香各一兩桂心芎藭白术白茯苓山茱萸熟地黃各三分枳殼五錢麩炒微黃赤銼右為散每服四錢以水一中盞入生薑半分煎至六分去滓食前溫服天麻散治虛勞風氣不順天麻附子炮裂去皮臍各一兩甘草炙烏頭炮去皮臍各二兩麻黃三兩內三兩去節一兩蕪荑仁炒柴胡去苗秦艽去苗土鱉甲藁本前胡各六錢右細銼用豬脊骨一條全者銼入好酒一斗同熬乾去骨將藥乾搗為散每服三錢溫酒調下日二服菴䕡子湯治風勞濕痺痿厥筋脈拘攣關節疼痛難以屈伸不能行履精衰目瞑腹中不調乍寒乍熱大小便息此由腎虛所致菴䕡子炒酸棗仁炒薏苡仁菊花車前子蜀椒去目并閉口炒出汗蔓荆實菥蓂子冬瓜子炒阿膠炙令燥各一兩大豆炒去皮一兩淨右粗搗篩每服三錢水一盞煎至一半去滓空心夜卧溫服若筋攣關節難以屈伸倍加酸棗仁菴䕡子菥蓂子冬瓜子各一兩桃仁散治風勞脾腎虛冷心腹脹疼骨節煩痛食少無力桃仁湯浸去皮尖雙仁麵炒微黃鱉甲塗醋炙微黃去裙襴白术附子炮裂去皮臍訶梨勒煨用皮各一兩芎藭丁香桂心蓽澄茄當歸枳殼麩炒微黃去穰各三分右為散每服四錢以水一中盞入生薑半分煎至七分去滓食前稍熱服忌莧菜柏子仁散治風勞益氣血利四肢強腰腳除濕痺柏子仁巴戟天雄炮裂去皮臍牛膝去苗天門冬去心焙川椒去目閉口者微炒去汗兔絲子酒浸三宿暴乾别搗各一兩肉桂二兩去皺皮石南續斷當歸各三分右為散每服空心及晚食前以溫酒調下二錢補益天雄丸治風勞氣身體疼痺手足無力氣血虛損顔色萎黃精神昏沉飲食無味天雄炮裂去皮臍兔絲子酒浸一宿焙乾别搗柏子仁石斛去根苗巴戟天門冬去心焙牛膝去苗乾漆搗碎炒令煙出已上各一兩肉蓯蓉酒浸一宿刮去皺皮炙令乾熟乾地黃肉桂各二兩去皺皮右為末煉蜜和搗三二百杵丸如梧桐子大每服空心及晚食前以溫酒下三十丸漸加至四十丸輕骨散治風勞四肢乏力嗜卧多困飲食減少身體疼痛三焦氣澀發熱口乾麻黃出節三兩烏頭炮去皮臍各一兩附子白附子生用各五錢秦艽去黃土一兩五錢柴胡去苗鱉甲去裙醋炙各一兩桂去粗皮人參各五錢山茵蔯一分右細銼用童便十盞酒三盞浸入瓷器內熬令乾再焙搗為散每服二錢溫酒調下就浴後再服以衣被蓋卧汗出為候三順丸治虛勞風氣攻作大腸祕澀下部疼痛脊膂牽強附子炮去皮臍天南星楝實銼炒威靈仙去土烏藥銼地龍去土炒黑牽牛搗取粉蜀椒取紅蘹香子炒各一兩右為末酒煮麵糊丸如梧桐子大每服二十丸溫酒下空心食後服婦人醋湯下有孕不可服牽牛子散治風勞冷氣骨熱羸瘦及婦人産後諸疾血氣衝心腳手麻痺牽牛子半生半炒三兩白术枳殼去穰麵炒木通銼炒桑根白皮炙銼陳橘皮湯浸去白焙人參五錢赤茯苓去黑皮一兩右為散每服三錢空腹溫酒調下日三服天仙藤湯治風熱勞氣天仙藤二兩秦艽去苗土鱉甲去裙襴醋炙柴胡去蘆麻黃去節芍藥甘草炙銼防風去叉前胡去蘆頭各一兩右粗搗篩每服三錢水一盞入烏梅一枚生薑二片同煎至七分去滓溫服如傷寒不用烏梅入蔥白二寸煎熟服茯神湯治風勞咳嗽心躁煩熱驚悸鼻塞咽乾唇腫口瘡胸滿悶手臂腰腳疼兼治虛勞驚悸茯苓去木麥門冬去心焙柴胡去苗黃連去鬚貝母去心焙各一五錢秦艽去苗土一兩檳榔銼二兩甘草炙銼一兩右粗搗篩每服五錢水一盞半煎至一盞去滓食後溫服日三三木節散出聖惠方治風勞面色青白肢節沉重膂間痛或寒或熱或躁或嗔每思食味食即不能被蟲侵蝕證狀多端樟木瘤節皂莢木瘤節槐木瘤節三味銼搗羅為末各五兩天靈蓋塗酥炙搗末淨一兩牛黃研五錢人中白焙乾研一兩麝香二錢四味各研搗為末合和合勻右先將前三味末三錢以水一盞煎至半盞去滓調天靈蓋等末一錢五更頓服一方無人中白為散溫酒調下二錢排風酒治風勞虛熱攻頭項急言語錯亂心膈煩悶四肢拘急手足痠痛防風去叉升麻桂去粗皮獨活去蘆頭天雄炮裂去皮臍羌活去蘆頭各一兩仙人放杖草并根一斤右銼如麻豆大以醇酒三升浸五日後旋飲一盞日再服耆婆湯療治風勞虛損補髓令人健麻油一斤牛酥一斤蔥白一握胡麻仁一升研蜜一升豉二斤以水三升一宿取汁上酒一升右先於鍋中入油煎令沸著蔥白令色黃下酥蜜豉汁麻仁沸下酒成煎收不津器中盛之日服一匙兩匙或和酒服亦妙冷即加生薑一斤取汁乾薑末亦可用之蛤蚧丸治風虛氣肢體無力喫食減少心胸不利咳嗽涎唾兼婦人血氣風勞不思飲食蛤蚧去鱗酥炙一對桂去粗皮木香五靈脂各一兩烏梅去核二十枚甘草炙銼一分右為末煮棗肉丸如梧子大每服二十丸鹽湯下婦人醋湯日三人參丸一名五補丸治風勞諸虛不足方見本門虛勞羸瘦類牛膝丸治風勞攻注背腰疼痛四肢沉困日漸瘦弱飲食無味牛膝酒浸切焙二兩桂去粗皮烏頭炮裂去皮臍各一兩乳香研五錢右為末煉蜜丸如梧桐子大每服十五丸至二十丸空心日午夜卧酒溫服牡丹皮散治血臟虛風及頭目不利不思飲食手足煩熱肢節拘急疼痛胸脅不利大腸不調隂陽相干心驚忪悸常時旋運牡丹皮川芎枳殼麩炒各一兩陳皮五錢炙玄胡甘草羌活半夏湯洗各五錢木香三分訶子肉三分芍藥三錢三稜炮乾薑炮桂各五錢當歸一兩五錢白术三分炒右為細末每服二錢水一盞半煎五七沸食前溫服益血海退血風勞攻注消寒痰實脾胃理血氣攻刺及氣虛惡寒潮熱石斛散出千金方治男子風虛勞損兼時氣甘草一斤石斛防風蓯蓉山茱萸茯苓人參薯蕷各四兩桂心牛膝五味子兔絲子巴戟天芎藭各二兩並為末丹參二兩生地骨皮切碎生地黃汁各一升生