杏仁五錢湯浸去皮尖雙仁麩炒微黃右為末煉蜜和搗三二百杵丸如梧桐子大每於食後良久以粥飲下三十丸忌豬肉莧菜濕麵醋物大腹皮湯治熱勞肌瘦盜汗潮熱咳嗽大腹皮銼炒三分黃芩去黑心一兩柴胡去蘆頭二兩桂去粗皮山梔子去皮白术半夏湯浸去滑生薑汁同炒乾桔梗炒各一兩白茯苓去黑皮青蒿童子小便浸一日暴乾一兩右為散每服五錢水一盞童子小便半盞煎至一盞去滓溫服如婦人服加虎杖當歸各少許人參湯治熱勞心神煩躁肢體痠痛不能飲食人參赤芍藥􅌝􅌣根白薇枳實去瓤麩焙知母焙茯神去木酸棗仁炒甘草炙銼生乾地黃焙各一兩右為散每服三錢水一盞煎至七分去滓食後服牛黃丸治男子婦人熱勞內伏身體羸瘦牛黃麝香研人參沉香銼丁香各一兩胡黃連前胡去蘆頭各二兩木香生犀角各一兩五錢枳殼去瓤麩炒一兩五錢右為末煉蜜為丸如桐子大每服二十丸米飲下不拘時地黃煎丸治熱勞生地黃汁青蒿汁薄荷汁童子小便好酒各二升同煎成膏柴胡去苗一兩鱉甲去裙襴醋炙秦芁去苗土各一兩丹砂麝香各半分研右搗研五味為末入前煎和丸如梧桐子大每服十五丸至二十丸酒下犀角屑一兩烏梅肉三兩微炒黃連一兩去鬚秦芁二兩去苗貝母三分煨令微黃柴胡一兩五錢去苗川升麻三分枳殼一兩麩炒微黃去瓤龍膽三分去蘆頭鱉甲一兩塗醋炙令黃去裙襴右為末入豬膽汁二合拌次入煉成蜜和搗三二百杵丸如梧桐子大每服不計時候以清粥飲下二十丸忌豬肉莧菜人參散出醫方集成治補勞氣解勞倦治邪熱客於經絡肌熱痰嗽五心煩熱頭目昏痛夜多盜汗婦人血熱虛勞骨蒸子芩五錢一作黃芩人參白术茯苓赤芍藥柴胡甘草當歸半夏麴乾葛各一兩右為散每服三錢水一盞薑四片棗二枚煎至八分不拘時應是勞熱皆可服熱退即止一方無柴胡有杜仲柴胡丸治熱勞寧心志止咳嗽除肌熱柴胡去苗紫苑去土各一兩白茯苓去黑皮雄黃研人參黃芩去黑心各一分牛膝生丹砂研馬兜鈴各一兩右為末酒煮麵糊為丸如彈子大每服一丸燒綿灰溫酒化下不拘時服日三青蒿煎丸出聖惠方治熱勞煩心口乾皮膚枯燥漸漸羸瘦青蒿汁薄荷汁生地黃汁各二升童子小便五升朱砂一兩細研水飛過麝香五錢細研桃仁柴胡三兩去苗為末鱉甲五兩塗醋炙令黃去裙襴為末右取青蒿汁等及小便相和一處先煎令稠然後下桃仁已下諸藥更熬令稀稠得所候可丸即丸如梧桐子大每服以麥門冬湯下二十丸不計時候服忌生血柴胡湯治熱勞潮躁盜汗羸瘦減食柴胡去苗白术牡蠣燒令透各二兩桑根白皮炙黃知母銼焙木通銼甘草炙各五錢鱉甲去裙襴醋炙黃一兩五錢右為散每服三錢水一盞生薑半分拍碎竹葉三片煎至六分去滓空心溫服夜卧再服犀角散治熱勞心神煩躁羸瘦發渴犀角胡黃連各五錢人參逺志去心各一兩石韋去毛五錢酸棗仁秦芁各一兩杏仁湯浸去皮尖雙仁麩炒五錢研右搗研極細每服二錢煎蓮子心湯調下不拘時服青蒿飲治暴急熱勞四肢煩疼手腳心熱咽乾虛損飲食減少宜退熱青蒿甘草炙柴胡去苗知母龍骨麥門冬去心各一兩桃枝桞枝各一握右為散每服四錢以童子小便一盞半浸經宿入蔥白薤白各三寸切同煎至八分去滓溫服食後鱉甲散出聖惠方治熱勞四肢疼痛發渴寒熱鱉甲塗醋炙令黃去裙襴柴胡各二兩去苗赤芍藥甘草炙微赤銼赤茯苓枳殼麩炒微黃去瓤人參各一兩去蘆頭地骨皮三分右為散每服四錢以水一中盞煎至六分去滓不計時候溫服忌莧菜菘菜醋物牡蠣散出聖惠方治熱勞百節煩疼漸漸羸瘦不能飲食日晚惡寒兼盜汗牡蠣燒為粉知母各一兩五錢犀角屑前胡去蘆頭柴胡各二兩去苗甘草五錢炙微赤銼虎骨頭一兩五錢塗酥炙令黃鱉甲二兩塗醋炙令黃去裙襴右為散每服四錢以水一中盞煎至六分去滓不計時候溫服忌生果莧菜桃仁丸出聖惠方治熱勞肌體羸瘦桃仁湯浸去皮尖雙仁麥炒微黃鱉甲塗醋炙令黃去裙襴柴胡各一兩去苗甘草五錢炙微黃去銼天靈蓋一兩塗醋炙微黃麝香一分銼研龍膽一兩去蘆頭青蒿子二兩右為末入麝香都研令勻煉蜜和搗三二百杵丸如梧桐子大每服不計時候用童子小便一小盞入豉五十粒煎五七沸去滓溫酒下三十丸忌莧菜豬牙皂莢丸出聖惠方治熱勞或咳嗽氣喘兩脅脹不思飲食大便祕澀心臟躁熱恍惚不安豬牙皂莢五錢去黑皮塗酥炙令焦黃去子乾青蒿五錢鱉甲一兩塗醋炙令黃去裙襴桃仁湯浸去皮尖雙仁麵炒微黃郁李仁各五錢湯浸去皮尖微炒天靈蓋一兩塗酥炙令黃甜葶藶一分隔紙炒令紫色虎頭骨五錢塗酥炙令黃右為末煉蜜和搗三二百杵丸如梧桐子大每服以麥門冬湯下二十丸不計時候服忌莧菜子芩散涼心肺解勞熱黃耆一兩白芍藥子芩人參白茯苓麥門冬桔梗生薑地黃各五錢右為散先用竹葉一握小麥七十粒水三盞薑三片煎至一盞半入藥末三錢重煎至七分去滓溫服鱉甲丸治熱勞羸瘦盜汗壯熱煩渴鱉甲去裙襴童子小便炙黃為末柴胡去苗為末秦芁去土為末各一兩生薄荷汁生青蒿汁生地黃汁生薑汁各用自然汁下盛銀器內熬成煎右將前三味搗羅為細末入後四味煎中拌和再搗勻可丸即丸梧桐子大或乾更入熟蜜少許每服二十丸食後溫熟水下日三鱉甲湯治熱勞及女子虛勞身體瘦不下飲食咳唾稠黏背膞疼痛手足背心煩熱兼渴鱉甲去裙襴醋浸炙令黃生乾地黃焙天靈蓋塗酥炙黃甘草紫苑去苖土貝母去心麥門冬去心焙杏仁湯浸去皮尖雙仁生研各一兩右將前六味粗搗篩入杏仁和勻每服五錢用童子小便一盞半竹葉五片煎至一盞去滓分溫二服空心食後各一服柴胡飲治熱勞身體壯熱咳嗽痰喘面赤頭痛肢節痠疼煩躁口乾盜汗瘦弱柴胡去苖二兩桑根白皮防風去義芍藥玄參黃芩去黑心甘草炙各一兩右為銼散每半兩水二盞入生薑半分切煎至一盞去滓溫分兩服如咳嗽咯血者每服入杏仁七枚湯浸去皮尖打碎同煎服青蒿飲子出聖惠方治熱勞煩悶四肢無力青蒿二兩柳嫩枝一兩梔子仁三分烏梅肉五錢微炒甘草三分木香五錢桃嫩枝一握右細銼相和令勻分作五服每服以水一大盞半煎至八分去滓不計時候分溫二服黃耆湯一名地骨皮散治熱勞肢節痠疼呼吸少氣腰背強痛心中虛悸咽乾唇赤面色枯燥飲食無味悲憂慘戚多睡少起黃耆銼焙地骨皮各一兩鱉甲一枚去裙襴塗醋炙黃甘草炙銼五錢麥門冬去心焙一兩半桂去粗皮五錢右粗搗篩每服五錢水一盞半薑半分拍破粳米五十粒煎至八分去滓食前溫服葛根散治熱勞心神不寧肥瘦煩渴葛根銼黃芩去黑心各三分甘草炙柴胡去苗黃連去鬚牛黃研各五錢右為散每服二錢新汲水半盞調下日二青蒿散治熱勞久不瘥寒熱羸瘦青蒿一握甘草二寸童子小便三大盞東南枝桃心一握杏仁三七枚去皮尖捶碎檳榔三枚為末右以童子小便內瓶子中初夜浸至五更用慢火煎至一大盞半去滓空心分溫三服當㵼出惡物自止後喫薤粥補之青蒿丸治熱勞青蒿一斤洗甘草杏仁去皮尖鱉甲炙柴胡蜜各一兩右為童子小便五升先煎青蒿取一升去滓更煎如稀餳入酥少許及蜜藥末等再熬可丸即丸如梧桐子大每服二三十丸空心酒下忌豬肉熟麵莧菜胡荽等人參湯治熱勞肌熱煩躁面紅頰赤人參一兩地骨皮五錢青蒿二錢山梔子去皮五錢甘草炙一兩右粗搗篩每服三錢水一盞小麥少許煎至六分去滓不拘時候溫服茯苓丸治熱勞咳嗽白茯苓去黑皮地骨皮鐡精或用輕鐡六兩天靈蓋浸童子小便二升煮各三兩右為末飯丸如梧桐子大每服食後煎湯下三十丸日二枸杞湯一名麥門冬飲療虛勞口中苦渴骨節煩熱或寒方見勞療門骨蒸煩渴類治熱勞咳嗽四肢無力不能飲食生地黃汁半升蜜三合青蒿汁三合右藥相和不計時節溫服一合宜頻服之地骨皮散治熱勞地骨皮二兩柴胡去苗一兩右為散每服二錢須用麥門冬去心煎湯調下不計時候服黃耆湯一名黃耆天一湯治虛勞有熱咳唾膿血口苦咽乾胸滿短氣見諸虛門補虛益類出仁存方治虛熱用褐桃膠如彈大丸含之佳升陽散火湯出濟生拔粹方治男子婦人四肢發熱肌熱筋痺熱骨節熱發熱如燎捫之烙手此病多因血虛而得或胃虛過食冷物抑遏陽氣於脾土火鬱則發之升麻葛根獨活羌活各五錢防風二錢五分柴胡甘草三錢炙人參五錢白芍藥五錢生甘草二錢右㕮咀每服五錢水三大盞煎至一盞去滓稍熱服忌寒涼之物治一切男子女人患熱勞後服涼藥過多病勢已減變成虛冷宜服此藥牡蠣火煅牛膝各五錢五味子萆薢狗脊去毛石斛山茱萸天靈蓋酥炙焦黑色乾地黃巴戟去心益智子去皮芎藭各一分川椒二銖阿魏一銖右為細末以酒半盞蜜半盞對當化阿魏含煉丸如梧桐子大每朝鹽湯下三十丸須是骨熱已退臟腑已冷方可喫此方香甲丸出獲命方治男子熱勞四肢無力手足渾身壯熱不思飲食口苦舌乾夜夢鬼交多饒驚魘川棟子十個炒葫蘆巴一分舶上茴香一兩附子一箇炮去皮臍柴胡五錢宣連五錢鱉甲二兩醋炙令黃右件七味同杵為末煮麵糊為丸如桐子大每服五丸茶酒任下愚魯湯出淡療方主勞熱柴胡去蘆人參右等分㕮咀每服三錢薑三片棗一枚煎不拘時治熱勞出本草以皂莢長一尺續成者亦可須無孔成實者以牛乳酥一大兩微微塗於火上緩炙之不得令酥下待酥盡即搗篩為末蜜丸如梧子大每日空心飲下十五丸漸增至二十丸重者不過兩劑差治熱勞骨節煩痛肩背疼痛氣虛羸瘦及時病內外熱不改用柴胡煮汁服之普濟方卷二百二十九
