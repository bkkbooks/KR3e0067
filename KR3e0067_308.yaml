body:
  text: 普濟方卷三百八明周王朱橚撰諸蟲獸傷門蜂螫附論夫蜂有大小故其螫人毒有輕重輕者或疼痛移時或經日而愈重者至悶絶徧身皆腫當亟用呪禁之術以取速効仍以消毒等藥塗傅之蜂類甚多而方家不具顯其名唯地中大土蜂有毒一中人便即倒悶舉體洪腫諸藥治之皆不能卒止舊方都無其法雖然不致殺人有禁術封唾亦頗徴効又有瓠􅕧蜂抑亦其次餘者猶善耳方雄黄麝香散治竹中青蜂螫人方右以雄黄麝香乾薑等分擣篩以射菵和之著小竹筒帯之行急便用傅瘡兼治衆蛇虺毒如神蜜脂煎治蜂螫毒不出痛不定白蜜臘月猪脂各兩匙許雄黄細研三錢右先将蜜并脂煎沸傾在瓷盆中入雄黄攪轉通口旋飲之蜜臘膏治蜂螫方猪脂蜜各五合臘二兩右和煎如膏候冷以塗之一方和煎稍稍食之蜂房膏治蜂螫疼痛蜂房剉蒼耳各半兩右為末用藍青汁調厚塗螫處一方無蒼耳楮皮塗方治蜂螫用以楮皮生者取汁塗傅螫處生硃散治沙蜂叮右以水磨生硃塗又磨雄黄塗桑白皮塗方治蜂螫用桑根白皮生者擣取汁傅螫處角灰散治蜂螫用牛角燒灰二兩為散苦酒調傅螫處斷葫揩之青蒿塗方治蜂螫用青蒿生者一兩細切擣研厚塗螫處治蜂螫毒方出千金方用取瓦子磨其上唾二七遍置瓦子故處治蜂螫出千金方用燒蜂房為末猪膏和塗之先煮蜂房洗之又燒塗之又方出千金方用酥脂塗之立愈又治豆蜂螫人又方出千金方用燒牛屎灰苦酒和塗之又方出千金方用以齒垢塗之又破蜘蛛塗之又方出千金方用淳酢沃地取泥塗之又方出千金方用嚼塩塗之又方出千金方用人尿新者洗之或以尿泥塗之一方用人屎洗又方出千金方用反手捻地上土𫝊之治蜂蠆毒出經驗良方用野芋葉擦之如不便急以手就頭爬垢膩𫝊之或用塩擦治胡蜂叮出百選方用生薑汁塗又苦蕒汁塗之治蜂螫出徳生堂方用於地上尋小竹或木棒兒正南北安頓者取在手就冩十字先從南畫至北次從東畫至西然後於十字中心搯一捻土𫝊在痛處立止屢曽用之治不可曉須至誠乃驗治蜂蠆出肘後方用芋葉梗汁傅之沈存中筆談云處士劉易隠居王屋山嘗於齋中見大蜂為蛛網絲縳之蛛為蜂所螫墜地俄頃蛛鼔腹欲裂徐徐行入草嚙芋梗微破以瘡就嚙處磨之良久腹漸消輕躁如故自後人有為蜂螫者㧞芋頭梗傅之則愈治蜂螫出十便良方用薄荷按貼之瘥又方出朱氏集驗方用蛇皮以蜜塗之灸令熱以貼螫處効又以醤汁塗蛇皮熱封之甚妙治蜂蠆螫人用搗常思草絞取汁以洗瘡又方用取屋霤下土水和傅之立愈又方出肘後方用破烏雞熱傅之治蜂螫毒痛不可忍用挼藍青及搗莖實塗之又方出聖恵方用蒼耳挼取汁塗之治蜂蠆取蠮螉窠細研醋調塗之治蜂叮右以冬𤓰葉搗傅之治毒蜂螫右取被螫人所居正東上着地草須是頭尾正東西者取中間五寸勿動散着頭灸㸃所傷處三㸃依舊着原取處勿亂却東西即瘥孫真人云見一切毒螫之物不得起惡心向之亦不得殺之後必遭螫治亦難蜘蛛蜈蚣傷附論凡蜘蛛蜈蚣所傷輕者焮腫疼痛甚則潰而成瘡自非外以藥塗傅内以藥䟽導未易得愈方四神膏治蜘蛛咬痛皂莢蕪荑雄黄青塩右等分為末和勻蜜調塗咬處頻易甚効棗葉散治蜘蛛作瘡棗葉栢葉各五月五日採陰乾生鐡衣晩蚕沙右各等分搗散以生麻油和如泥先灸咬處塗之瘥棗栢膏出聖惠方治蜘蛛咬生瘡諸治不瘥棗葉栢葉晚蚕沙右等分搗為末以生油和如泥先灸咬處後用藥塗之良蕪荑散出聖惠方治蜘蛛咬徧身成瘡立効方白蕪荑一分皂莢半挺青塩半分右為末錬蜜和圓如皂莢子大毎有傷著處用蜜調一圓𫝊在瘡上即効雄黄膏一名藍汁膏出聖恵方治蜘蛛咬徧身成瘡及治蟲豸傷咬雄黄一分麝香一錢藍汁一大盞右細研投於藍汁中以塗咬處立瘥若是毒蜘蛛咬即便細細服其藍汁神異之効香油方出千金方治蜘蛛咬毒方用人尿𫝊又油淀𫝊又炮薑貼之又猢猻屎傅之黄臘方出百一選方治蜈蚣毒蟲咬用桑枝汁同塩調擦痛處或用鎔黄臘滴患處肉赤為度一方以桑白皮搗𫝊之良柳白散出聖恵方治蜘蛛咬作瘡諸治不瘥方柳白皮一兩半夏一兩用並燒為灰細研以水調塗之膩粉散出聖恵方治蜈蚣咬人方膩粉半両麝香少許右相和研匀生薑汁調塗咬處一方無麝香地龍散出聖恵方治蜘蛛咬徧身成瘡立効方用青䓤葉一莖去尖頭作孔子以地龍一枚置䓤葉中𦂳揑兩頭勿令通氣動搖之俟為水塗之所傷便瘥神驗麝香散出聖恵方用棗葉一合入麝香末半錢麻油調塗之立効韮根散出聖惠方用韮根一根去土入麝香一錢同研𫝊之雄黄膏治蜈蚣咬痛用雄黄研細一分用桑根白皮自然汁調𫝊咬處桑根散出十便良方治蜈蚣咬蒜汁塗方用蒜洗切細研桑根白皮汁和塗咬處胡粉散出千金方治蜘蛛咬毒方用烏麻油和胡粉如泥塗上乾則易之吳茱茰散出百一選方治蜈蚣傷用爛嚼吳茱茰一味擦之立効一方用搗爛蝦䗫塗之雄黄散出百一選方用生薑汁調膩粉傅之其痛立止一方薑汁雄黄塗貼亦良薤白方出聖恵方治蜘蛛咬用嚼薤白傅雄黄亦可遍身腫服藍汁桑葉方出經驗良方治蜈蚣諸䖝咬方先用鞋底土擦之用大蒜桑葉罨於傷處如無用油䜴罨傷處或藍塗罨傷處亦効麻鞋履底炙以揩之即瘥巴荳膏出經驗良方治蜈蚣䖝咬傷痛方用爛研巴荳一粒猪脂膏少許調塗瘡口立愈一方用胭脂膏少許白礬散治蜘蛛並蜈蚣咬傷用露筯草其根洗淨焙乾搗細為末用白礬水調貼苦參散治蜈蚣咬人痛不止用頭垢膩和苦參末酒調傅之椒䓤散出聖恵方治蜈蚣咬方胡䓤一握搗如泥椒一合用水煮椒汁洗之後封胡䓤泥於咬處即瘥治蜘蛛咬徧身成瘡立効方出聖惠方用井花水研硇砂塗之甚效又方出聖恵方用蝙蝠糞生油研塗之治蜘蛛咬作瘡諸治不瘥出聖恵方生油少許䜴一合用先将油塗咬處即以䜴搗作團拭之若見絲入䜴中即效又方出聖恵方用蝦蟇頭炙令黄為末油調塗之立効又方出聖恵方用塩和油調塗之數揩之神驗又方出聖恵方用獼猴糞為末油調塗之瘥人家飬者不净不可用又方出聖恵方用竹筒子長三寸許籠咬處煎釅浆水㵼於筒中冷即易之以瘥為度仍取桃枝葉剉煮湯洗之尤驗又方出聖恵方用嚼續隨子傅之立瘥又方出聖恵方用驢馬脚底臰屎泥塗咬處不過三兩度瘥治蜈蚣咬方用蠟少許將筆管坐所咬處鎔蠟滴向管内令到瘡上三四滴便止羊乳散出聖恵方治蜘蛛咬人令徧身生絲及毒中人用羊乳一味飲之愈正元十年崔貟外從質云目擊有人為蜘蛛所咬腹脹大如有娠徧體生絲其家棄之乞食於道後遇僧教飲羊乳未㡬而平復矣此方妙治蜘蛛咬徧身成瘡立效方出聖恵方用上好春酒任意飲之取醉使人飜轉身勿令一面卧恐酒毒入人腸胃須㬰蜘蛛兒於瘡中小如粟米自出盡即瘥雞冠血塗方出聖恵方治蜈蚣咬用雄雞冠血塗之立止附子膏出聖恵方治蜈蚣咬痛用附子一枚生用去皮臍就沙盆内以醋少許磨濃少許塗之治蜈蚣毒蟲咬出廣南衛生方用皂角於咬處上用艾灸之熱即去之無不効治蜈蚣傷出醫方集成用大撚紙燈一箇濃蘸麻油㸃着了於咬處照熁之毒氣自出盡入油烟中也又方出百一選方用右手大指中指把地上於中指盡處搯少土傅之勿令患者知此亦厭勝法耳又方出百一選方用菖蒲細嚼以傅咬處立愈又方出百一選方用頭髮烟薫或燒灰擦傷處又方治蜈蚣咬法蜈蚣有赤足黄足者蟄人甚痛用大蜘蛛一枚放所咬處令收其毒曽試用之既囓痛果即定蜘蛛雖着身稍逺必徑尋其處而囓之漸覺腹脹盖為毒氣所攻須投水中不爾即死一方云用冷水在傍如蜘蛛死即投水中救活易之以痛止為度甚妙兼治蠍螫尤佳必効方治蜘蛛咬着疼痛用塩䜴炒乾為細末每用油調塗之必効治蜈蚣蜘蛛毒用紅蚯蚓擂爛傅之立効治蜈蚣毒出百一選方用鷄糞塗之一云烏白鷄屎水調塗之一用燒鷄糞用酒塗之一用醋治蜘蛛咬出十便良方用雄黄末傅又徧身腫飲羊乳愈藍汁尤佳治蜈蚣咬出聖恵方用蝸牛擦取汁滴入咬處治蜘蛛咬瘡用合歡皮葉並頭垢搗為末和鐺下墨生油調塗治蜘蛛咬用蠮螉燒末油和傅咬瘡上此物能食蜘蛛亦取其相伏也治蜘蛛咬瘡用蜂子燒末油和傅之按土蜂赤黒色此物能食蜘蛛治蜘蛛咬用山豆根為末吐唾和塗之治蜈蚣咬人痛不止出十便良方用嚼塩沃土及以塩湯浸瘡極妙其蜈蚣有赤足者螫人黄足者痛甚一方治蜘蛛螫蜈蚣螫用塩熱漬之治蜈蚣螫人用蛇含草挼𫝊之治蜈蚣蜘蛛毒出十便良方用醋磨生鐡傅之治蜘蛛咬作瘡出聖恵方用蘿摩草搗如泥封之日二三傅毒化作膿膿出頻著勿停又方出肘後方用羊桃葉搗𫝊之立愈又方中蜈蚣毒出十便良方用蒜切作兩斷以揩之又以蒜摩地取泥塗之一方治蜈蚣咬痛不止用獨頭蒜摩螫處又嚼塗之立瘥治蜈蚣螫人用挼藍汁以漬之即瘥蜈蚣不甚囓人甚亦微殊輕於蜂當時小痛易歇脱為所中幸可以此療之藥皆用赤足者螫人乃痛於黄足者是其毒烈故也又方取屋中土以水和傅之又方用趕雄雞令走以雞觜氣呵之數易雞立瘥又方用錫炙令熱以熨之不越十度即瘥治蜈蚣蛇咬出𫝊信適用方用蜒蚰一條塗咬處痛立止一方去殻治蜘蛛毒出肘後方用荆葉袋貯傅瘡腫上又方出肘後方用射菵塗腫上血出乃瘥又方出肘後方用合口椒并葉搗𫝊之無不瘥治蜘蛛咬作瘡諸治不瘥用麫圍咬處滴羊乳於上絲出即瘥治蜘蛛毒出肘後方用切菜刀燒赤烙之治蜈蚣咬用刮指甲末貼即不痛治蜘蛛咬用乆臭人溺於甕中浸所咬處仍以烏鷄屎炒浸酒服不然恐毒入治蜘蛛瘡用水韮根新者同雄黄研塗之杏仁膏治蜈蚣傷右爛嚼杏仁𫝊之或以人屎汁傅尤良治蜈蚣咬傷冝山胡椒加塩擦又方治蜘蛛中人毒右以汗垢擦之又方汗垢加嫩楓葉擦治中蜈蚣毒者用桑白皮汁鹽塗或搗蛄蝓塗之蜈蚣畏蛄蝓不敢過所行之路觸其身即蜈蚣死故取治蜈蚣毒也治蜈蚣咬以腐木末和醋傅之亦漬取汁傅咬處良治中蜈蚣毒者以烏鷄屎水稠調塗咬處効大蒜塗之亦効治蜘蛛咬以赤翅蜂燒令黒和油塗之亦取蜂窠土醋和為泥傅蜘蛛咬處當得絲出瘥治蜘蛛蟲等咬以鐡銹和蒜磨傅之治蜘蛛咬以黒驢之溺及乳以物盛之浸瘡或先用醋泔汁洗瘡然後再取驢尿處臭泥傅之亦佳一方無乳亦得治蜘蛛咬以生鐡鍜後飛淘去麄赤汁烘乾用蒜磨生油傅之治蜘蛛咬恐毒入内用蔓菁末和油傅亦搗為末酒服蔓菁園中無蜘蛛是其相畏也治鼅鼄咬瘡以土蜂窠燒末麻油和傅之一方用醋和為泥傅之解蜈蚣蛇蟲毒用塩挼桑葉傅上治蜘蛛蚕咬取蘿摩子汁㸃瘡上解蜘蛛毒藍青麝香少許為末傅毒處蠼螋尿瘡附論凡蠼螋蟲尿人影著處便令人病瘡其狀身中忽有處瘮痛如芒刺亦如刺蟲所螫後起細㾦㿔作聚如茱茰子狀四邉赤中央有白膿如黍粟亦令人皮肉急舉身惡寒壯熱劇者連起竟腰脇胸治之法初得之磨犀角塗上止其毒治如火丹法余以武徳中六月得此疾經五六日覺心悶不住以他法治不愈後有人教畫地作蠼螋形以刀子細細盡取蠼螋土就中以唾和成泥塗之再塗即愈方知天下萬物相感莫曉其由矣方白磰方療蠼螋尿用雞子和白磰𫝊之浸滛為廣以大蒜磨研書墨塗之赤小豆散出千金方治蠼螋尿瘡及諸惡瘡用槐白皮半斤切以苦酒二升漬半日刮去瘡處以洗日五六遍仍以赤小豆為末用苦酒和傅之燥復易小兒以水和一方醋二升浸半月洗之日五六度甘草傅方治蠼螋尿瘡用甘草一兩為末韮汁調傅之鷄子膏出直指方治蠼螋蟲又名八脚蟲隱於壁間以尿射人遍體生瘡如湯火傷用烏雞翎毛燒灰雞子白和塗之一方云麻油調傅雞食百䖝故能治之或用燕糞水調𫝊或南向燕窠自東取土末之新水調傅治蠼螋尿方出千金方用羖羊髯燒灰臘月猪脂和封之又方出千金方用搗䜴封之又方出千金方用酢和胡粉塗之一方猪膏塗之又燒蒲灰傅之治蠼螋尿瘡方出千金方用燒鹿角為末以苦酒和傅瘡上已有汁者燒道傍敝蒲席傅之一方醋調塗之一方油調塗之又方出千金方用嚼大麥以𫝊之日三又方出千金方用熟嚼梨葉以水和塗疼處燥復易之一方研爛傅之一方以梨子汁傅之並瘥又方出千金方用搗馬鞭草爛傅上燥復易之又方出千金方用吳茱茰東行根下土酢和塗之棟枝灰方出肘後方治蠼螋尿瘡及諸惡瘡用棟木枝皮燒灰為末如瘡濕即乾傅瘡乾醋調傅之用和猪膏亦可皂莢脂方出聖恵方治蠼螋尿瘡久不愈用猪牙皂莢炙令脂出乘熱以脂塗之治蠼螋毒出海上名方用猪牙皂莢炙令脂出用螟蛉窠水調塗之治蠼螋尿瘡出肘後方用食塩三升水一斗煮取六升以綿浸湯淹瘡上治蠼螋蟲溺人影亦隨所著作瘡出肘後方用雞腸草取汁傅之効一方生挼𫝊三四度效治蠼螋尿繞腰者用煎敗漿汁塗之瘥治蠼螋尿瘡繞身匝即死出千金方用燕巢中土猪脂苦酒和𫝊之土蜂窠水調傅亦佳一方無酒療蠼螋尿繞腰欲死用敗蒲扇煮汁塗之治蠼螋溺人影發瘡如熱沸而大繞腰匝不可療蠼螋如小蜈蚣色青黒長足用扁豆葉搗塗之即瘥療蠼螋尿瘡用鵲巢中土以苦酒和𫝊之療蠼螋尿瘡表裏相當一名浸淫瘡用猪牙車骨年久者搥破燒令脂出及熱塗之療蠼螋尿瘡習習然黄水出者出聖恵方用韮搗汁取塗之又方出聖恵方用煮甘草湯洗之又方出聖恵方用嚼桂塗之又方用絞馬屎汁洗之又方出聖恵方用嚼麻子塗之又方用令患人於日裏立側近作沸湯微取以淋患人影令當所患瘡處六七度仍遣人熟嚼蒜以噀患人影中患處口中餘蒜氣即真噀患人瘡上愈治蠼螋尿人成瘡初如粉粟漸大如豆更大如火烙浆疱疼痛至甚出肘後方用草茶并汁茶俱可生油調傅瘡上其痛藥至立止妙一方用燈盞内油調塗又方出聖恵方用取衆人尿處爛泥塗之治蠼螋尿方出聖恵方用白礬滴醋於銹生鐡上磨並鐡銹刮下塗之治蠼螋瘡及諸惡瘡以槐白皮醋浸半日洗之治蠼螋蟲尿人影著處便令人體病瘡其狀如粟粒累累一聚磣痛身中忽有處燥痛如芒刺癢如刺蟲所螫後細瘡㿔作叢如茱茰子狀也四畔赤中央有白膿如黍粟亦令人皮急身惡寒壯熱極者連起竟腰脇胸也得之者以此法治之以犀角磨塗之止治蠼螋溺瘡取磨刀石泥傅瘡有効治蠼螋溺瘡以故蓑衣結燒灰和油傅之佳治蠼螋溺瘡用猪膏苺碎𫝊之治蠼螋叮右用刀就地畫又用刀裁至天面脚了取中間身上土津調塗小豆末傅方治蠼螋尿痛汁出用小豆為末傅瘡上頻易之一方酒調塗之射工中人附論夫江南有射工毒䖝一名短狐一名蜮其蟲形如甲蟲外䑓云正黒狀如大飛生有一長角在口前如弩檐臨其角端曲如上弩以氣為矢因水勢射人或聞其在水中鉍鉍作聲要須得水沒其口便射人也此䖝畏白鵞能食之其初得證候先惡寒噤瘮寒熱筋急仍似傷寒亦如中尸便不能語朝旦小蘓至夕輙劇寒熱悶亂此是其證始得三四日當急治之治之稍遲者七日皆死初未有瘡但惡寒噤瘮未成瘡似蠼螋尿亦似瘭疽瘡射工中瘡有四種其一種瘡正黒如黶子皮周邉悉赤或衣犯之如有芒刺痛其一種作瘡久乃穿或晡間寒其一種如火灼熛起似此者最急數日殺人備急方云有四種其一種突起如石癤狀俱能殺人多令人寒熱屈伸張口閉目也凡山水有毒䖝人渉水中人似射工而無物其診法初得之惡寒微似頭痛目眶疼心中煩懊四肢振焮腰背百節皆强而兩膝痛或翕翕而熱但欲睡旦醒暮劇手足逆冷至肘膝二三日腹中生䖝食人下部肛中有瘡不痛不癢令人不覺不急治過六七日下部出膿潰䖝上食人五臓熱毒煩盛下利不禁八九日雖良醫不能治矣覺得之急早視其下部若有瘡正赤如截肉者陽毒最急若瘡如鯉魚齒者為陰毒猶小緩要皆殺人不過二十日也欲知是中水與非者當作五六升湯以小蒜五升㕮咀投湯中消息勿令大熟去滓以浴之是水毒身體當發赤斑無異者非也當以他病治之本草云水弩射工短狐等䖝生於山水間含沙射人影而成疾或如瘧狀及如天行病者名曰沙病今人謂沙子証然亦全非射工水弩之毒不過山嵐瘴氣感而成疾今以䋲擦之所皆是太陽經脉所過之處則邪氣出而病愈矣江西袁州一河其間多生水弩彼人云其䖝射人人中之即病却以綿揩身上或揩着如針刺則以針挑去令血出其病即愈然彼人日食此水及於此浴縁此䖝聞水動則射人彼中人欲入此水則先以石打水動後方入水則其䖝已射不能中人方五香散出千金方治江南毒氣惡核及射工中人暴生瘡甲香犀角鱉甲升麻薫陸香烏翣丁香沉香黄連青木香羚羊角黄芩甘草牡蠣各四分黄蘗六分吳茱茰三分右為細末中射工毒及諸毒皆水服方寸匕日三并以水和少許洗之仍以雞子白和塗腫上乾則易一方無青木香犀角散一方甲香散出聖恵方治射工毒腫生瘡犀角鎊甲香射干木香乳香丁香黄連升麻鱉甲醋炙去裙襴牡蠣羚羊角甘草炙剉黄芩去黑心各一兩黄蘗去粗皮吳茱茰湯洗晒乾各半兩右除乳香研外搗為散和勻毎服二錢水調下日三兼以雞子白調塗瘡毒良一方有薫陸香無乳香野葛膏出千金方治射工惡核卒中惡毒方野葛一升巴荳烏頭蜀椒各五合茵芋躑躅附子丹砂各一兩雄黄大黄各七兩右為細末以不中水猪膏三觔煎三上三下去滓内丹砂雄黄末攪至凝以棗核大摩痛上勿近眼凡合名膏皆毋令産婦女人小兒雞犬六畜見之惟宜清淨治卒中射工水弩毒方其毒有四種惟如灼人肉熛起作瘡者此種最急凢射工並居毒地天大雨或逐人行潦流入人家而射人常冝飬鵝鵝見即食人行將純白鵝以辟之白鴨亦善帯好生犀角佳也治療射工毒方出聖恵方用以白梅皮褁豉母䖝吞至六七枚勿住取水浮起䜴母䖝一枚置口中便瘥䜴䖝已死者亦浮起有毒應不可吞治水毒中人一名中溪一名中濕一名水病似射工而首無物用小蒜三升㕮咀於湯中莫令大熟即無力去滓適寒温以浴若身體發赤斑者是也升麻散出千金方治人忽中水毒手足指冷或至肘膝者方吳茱茰一觔生薑切一升半犀角升麻橘皮各二兩烏梅十四箇右㕮咀以水七升煮取二升分二服治溪毒沙虱用馬齒莧搗絞汁一升漸以傅瘡上佳治中射工毒用白鵝血飲之又以血塗之桃葉方治土俗療溪毒方右初覺便取溪蒜狶薟桃葉剉一斛蒸使遍熱出布席上觧衣卧上厚覆衣被大汗良久出拭之勿見風則瘥已五六日恐毒入腹不可先爾應先服藥東間諸山有大木名埋檀枝葉上似梨冬不凋剥取白皮皮重疊如紙搥破煮服一斗日夜六七過無生者預取乾之亦單用蒨根白蘘荷根藍青汁並佳若卒無根皮亦可單用藍汁煮服之亦可都合煮取汁漬之若患腹中痛恐轉成蠱噉人腹臓者取猪脂二升熬令燥水一斗絞取汁稍稍服之雄黄朱砂方出千金方療溪毒雄黄朱砂常山各等分右五月五日午時使童子搗合之取傅瘡上巴豆方出肘後方治卒中射工水弩毒右鼠婦蟲䜴各七合巴豆三枚去心合猪脂但以此藥塗之升麻散一名犀角散出千金方治射工中人瘡有三種一種瘡正黒如靨子狀周徧悉赤如有刺痛一種作瘡經久乃穿晡間寒熱一種如火灼熛起者此最急數日殺人此病人寒熱方犀角屑二兩川升麻一兩射干一兩右搗為散每服四錢以水一中盞煎至六分去滓不計時候温服射干散一名和氣散出聖恵方治證同前射干川升麻各二兩右剉以水三大盞煎至一盞去滓適寒温盡服其滓傅瘡上一方用烏扇根三兩研末治射工及疰氣發無常處用白芥子為丸服之或搗為末醋和塗之隨手有驗中射工溪毒以䓤和塩研傅之犀角塗方治射工毒右以犀角不拘多少以水磨塗患處又取細末與麝香同研水調一錢服之梅桃散出千金方治人忽中水毒手足指冷或至肘膝者方右取梅若桃葉搗絞取汁三升許或乾以少水絞取汁飲之小兒不能飲以汁𫝊乳頭飲之熊膽散治水弩射人用熊膽塗之更以雄黄同酒磨服之即愈解毒散出瑞竹堂方治毒蛇射工沙虱等傷著人眼黒口噤手足直强毒氣入腸腹服之效白礬研甘草各等分右為末毎服二錢冷水調下皂莢膏出肘後方治射工傷人傅瘡皂莢一挺長一尺二寸者椎碎以醋一升煎如餳去滓傅於瘡又方出聖恵方用馬齒莧不拘多少爛搗取汁飲一盞又爛搗傅毒上日四五易治射工中人去毒方出聖恵方用胡䓤不拘多少細切爛搗以搨瘡上灸十壯即瘥一方云胡蒜治射工中人寒熱或發瘡偏在一處有異於常者方出千金方用鬼臼葉一把漬苦酒中熟搗絞取汁服一升日三或用醋又方出千金方用吳茱茰莖葉一握斷去前後取握中熟搗以水二升煮取七合頓服一方用葫蘆切貼瘡上炙七壮又方出千金方用蜈蚣大者一枚火炙為末苦酒和以傅瘡上或用醋以治口噤又方出千金方用赤莧菜熟搗絞取汁每服一升日四五服以滓傅之又方出千金方白雞屎取白頭者三枚餳和塗中毒處治射工中人已有瘡者但惡寒噤瘮及其成瘡似蠼螋尿亦似風疽出千金方用芥子爛搗勻酒和厚塗瘡上半日痛便止醋調亦可治人忽中水毒手足指冷或至肘膝者方出千金方用浮萍萆曝乾為末酒浸服方寸匕又方出千金方用搗蒼耳汁服一升又以綿褁杖沾汁導下部日三瘥又方出千金方用搗蓼一把以酒和絞取汁一升飲之不過三服瘥外䑓肘後作梨葉又方出千金方用搗蓼一把以酒絞取汁以塗浴面目身體令徧又方出千金方用搗蛇苺根為末水飲之并導下部生者用汁凡夏月行常多齎此藥屑入水以方寸匕投水上流無所畏又辟射工凡洗浴以少許投水盆中即無毒治射工毒用獨頭蒜切之厚三分以來貼瘡上灸之令熱氣射入即瘥治水弩射人出千金方用臘月猪膏塗脚足拍間趺上及著鞋處蛭不敢著人一方和鹽塗之灸斷其道治療中毒方用大苺連根搗作屑服之亦可投水搗絞汁飲一二升并道下部生䖝者夏月常行多齎此屑欲入水浴先以少屑投水上流便無所畏又辟射工家中雖以噐盛水浴亦常以此屑投水中大佳治溪毒每春月多得亦如京都傷寒之狀呼為溪瘟未必皆是射工輩亦不盡患瘡痢但寒熱煩疼不解便死用東向三禹歩即以手左一攪取水將蒜一把熟搗以酒漬之去滓可飲三兩杯當吐得吐便瘥此方甚妙治療溪毒出肘後方用五加根燒末以酒若漿服方寸匕又方用燒鮫魚皮以飲服方寸匕立瘥又方出肘後方用荆葉搗汁飲之佳又方出肘後方用搗漆姑以塗之腰背諸處漆姑生冬間細葉如蒜狀又方用烏蒜一枚搗以酒和服半升得吐即瘥一名烏韭山中甚多療溪毒下部生瘡已决洞者出肘後方用伏米一升鹽五升一并作糜坐中即愈又方出肘後方用桃葉艾葉搗熟以水漬之絞取濃汁去滓著盆中坐有白䖝出即瘥又方出肘後方用塩和皂莢末搗綿褁導之一方無塩亦可又方出肘後方用末牡丹屑以飲服方寸匕日三治山中草木上石蛵著人則穿嚙肌肉行人肉中浸淫墳起出千金方用灸斷其道即愈治入山路草木中行出千金方用狼牙葉冬取根枝搗之令熟傅所中處又飲汁四五合治療溪毒及沙虱毒出千金方用大蒜十枚合皮安熱灰中炮令熱刀切斷頭以拄所著毒處盡十片復以艾灸瘡上七壯則良又方用蓼搗取汁服一二升又以塗周匝瘥又方用雄牛膝根一把搗水酒共一升漬絞取汁飲之日三雄牛膝莖白紫色者是治水弩子方川烏頭一兩半生炮半熟去皮臍巴荳一兩去皮心出油用朱砂半兩别研右先將烏頭末後入二味再研用生薑自然汁煮麫糊丸如菉豆大以朱砂衮過熟水下三丸未轉再服治水弩子貼瘡方蚌蛤厚者一合燒為末黄丹一兩麝香一分右同研細用油調塗瘡上以帛子盖之治溪毒射工取溪鬼䖝口邉角帯之其䖝出於有溪毒處山林間亦名射工蟲治溪毒射工以狄耳草絞取汁服滓傅瘡上血出治溪毒沙虱水弩射工蟈短狐蝦鬚等病用鶚鳿鳥至病人邉則能咬人身訖以物盛之當有砂石出也亦可燒末及毛作灰服之鸀鳿鳥如鴨眼大赤觜斑山水毒處即生此鳥也此數病俱是山水間䖝含沙射人影亦有無水處患者夜卧常以手摩身體覺辣痛處熟視當有赤㸃如鍼頭急捻之以芋葉入肉刮却視有細砂石以蒜封瘡頭上不爾少即寒熱瘡漸深也其蝦鬚瘡桂嶺獨多著者十活一二唯有早覺者當有芋草及大芋甘蔗葉入肉鈎之深盡根蒜封可瘥須㬰即根入至骨其根㧞出如蝦鬚亦有如丁腫最惡者生人幽隱處自餘六病或如瘧及天行初著寒熱亦有瘡出者亦有無瘡者要當出得砂石沙虱毒附論沙子病江南舊無今所在皆有之其證如傷寒頭痛嘔惡悶亂須㬰能殺人多用麻繩擦頸及膊間出紫㸃則愈或用針膝後委中穴出血則愈山水間多有沙虱其䖝甚細不可見人入水浴及汲水澡浴此䖝在水中著人及陰雨日行草中即著人便鑚入皮裏其診法初得之皮上正赤如小豆大黍米粟粒以手摩赤上痛如刺過三日之後令人百節强疼痛寒熱赤上發瘡此䖝漸入至骨則殺人凡在山澗水澡浴畢熱以巾拭身中數過又以故帛拭之一過乃傅粉也今東間無不有此浴洗畢以巾拭􅯌􅯌如芒針刺熱看見處仍以竹葉細拂去比見嶺南人初有此者只以茅葉刮去乃小傷皮膚為佳仍數塗苦䒰菜汁瘥已深者用針挑取得䖝子正如疥䖝者爪上映光方見行動也挑不得便就上灸三四炷則䖝死病除若止兩三處不能為害多處不可盡挑灸若猶覺惽惽是其毒大深便應依土俗作方術出之并作諸藥湯以浴皆得一二升沙出沙出都盡乃止若無方術痛飲畨酒取醉亦佳如其無則依此方為療并雜用前中溪毒射工法急救七日中宜瘥不爾則仍變成溪毒如薤葉大長四五寸初著腹脇腫如刺破則雞㩉之䖝出食雞或三四數過取盡乃止兼須服麝香犀角䕶其内作此療之彼土有中之者不少呼此病為􅀈呼故切沙䖝吳音名沙作盗䕶如鳥長尾盗者言此䖝能招呼溪氣東間山行無處不有其䖝著人肉不痛不即覺者久久便生子在人皮中稍攻人則為瘻山行宜竹管盛塩數視軆足見者以鹽塗之便脱雜少石灰尢良亦斷血而辟水温又云所謂蜂蠆作於懐袖賁育為之驚恐言其小而有毒起乎不意也世人呼蝘蜓為蠆子而未嘗中人乃言不可螫人雷鳴乃放想亦當極有毒書家呼蝘蜓為守宫本草云守宫即是蜥蜴依如東方朔云則兩種物矣今蜥蜴及蛇醫母並不螫人蜥蜴有五色具者亦云是龍不可殺之令人震死今又有小烏䖝子尾有翅世人呼為甲虫而尾似車鍰兩蠆尾後復言此䖝是蠆未詳其正矣方麝香散治沙虱麝香少許辰砂少許右細研為末以塩塗之瘥羊脂膏出千金方治沙虱毒麝香大蒜右合搗以羊脂和著小筒中帯行欲用取傅瘡上如聖散治療沙虱毒右用少許麝香傅瘡上過五日不瘥當用巴豆湯服之一日輙以巴豆一枚二日則二枚計為數並去皮心以水三升煮取一升盡服之未瘥即更可作服之治沙虱毒出千金方用班猫二枚一枚熬為末服之一枚燒令烟絶為末著瘡中又方用白萵苣菜汁傅之瘥治療沙虱用鹽五合以水一斗煮一沸以漬洗瘡上又方若初著有赤㸃如米以鹽和麝香塗之瘥治初中沙虱有赤㸃如米良久即如刺在肉中者用竹葉刮之令血出仍斷大蒜摩之即瘥治卒中沙虱毒山水間多有沙虱其䖝甚細略不可見人入水浴及汲水澡浴此䖝在水中着人身及陰雨天行草中亦着人便鑚入皮裏其診法初得之皮上正赤如小豆黍米粟粒以手摩赤上痛如刺三日之後令百莭强疼痛寒熱赤上發瘡此䖝漸入至骨則殺人凡在山澗浴畢當以布拭身數遍又以故帛拭一度乃𫝊粉治療沙虱毒今東間水無不有此浴竟巾拭􅯌􅯌如芒針然刺熱看見處仍以竹葉杪挑去之比見嶺南人初有此者即以茅葉細細刮去及小傷皮膚為佳仍數塗苦苣菜汁佳辟虱方水銀不拘多少右以茶末拌在手心以津唾研和令不見星擦在綿帯子上繋於有虱處每一條帯約三箇月無虱辟狗蚤方韶腦不拘多少右以薄紙褁之放在枕邉或被下即無也治虱咬水磨朱砂傅雄黄醋磨塗治諸溪毒沙虱以白蘘荷煮汁服之治沙虱毒以射罔𫝊之佳治溪沙虱用搗蒜貼之熟醋浸之經年者良治沙虱水弩用蜣蜋十枚端午日收乾者佳杵末油調傅之辟蚊子右用皂角蒼术乾浮萍等分為末飯丸弹大令乾燒之辟蚊辟虱狗蚤右用駝糞白鱔魚骨為末燒之永無凡新屋未居先燒之直至屋壊亦無普濟方卷三百八
