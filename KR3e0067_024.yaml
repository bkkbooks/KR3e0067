body:
  text: 普濟方卷二十四明周王朱橚撰脾臟門脾胃冷熱不和附論夫體弱之人榖氣不足脾胃既虛冷熱之氣易為傷動蓋脾胃倉廩之官布化津氣灌養四旁其氣虛弱則食飲或冷或熱多致不消使陰陽交爭冷熱相搏故令脾胃不和也方沉香阿魏丸治脾胃冷熱氣不和食毒脾胃中宿積沉香木香各三分芎藭當歸銼焙蓬莪荗炮陳橘皮去白焙延胡索檳榔銼吳茱茰醋浸一宿炒益智仁桂去粗皮白术附子炮製去皮臍乾薑炮草豆䓻去皮各半兩阿魏一兩半瓷器中醋浸一宿絹濾去砂入麵煮糊右搗羅十五味為細末用阿魏糊攪和杵二三百下丸如梧桐子大丹砂為衣生薑橘皮湯下五七丸血氣溫酒醋湯下前胡湯治脾胃冷熱氣不和平胃前胡去蘆頭人參白茯苓去黑皮附子炮製去皮臍白术半夏薑汁浸一宿并生薑杵令勻焙乾枇杷葉擦去毛厚朴去粗皮生薑汁塗炒透訶梨勒紙裹煨熟去核各一兩半肉豆䓻去殼檳榔銼陳橘皮湯去白焙乾薑炮甘草炙各三分右銼如麻豆大每服三錢水一盞入生薑一棗大切棗二枚擘破同煎至七分去渣不拘時稍熱服忌生冷油膩飴糖白豆䓻丸出聖惠方治脾胃冷熱氣不和心腹㽱痛嘔逆不欲飲食四肢少力白豆蔲三分去皮黃耆半兩銼赤茯苓半兩乾薑半兩炮裂銼桂心半兩白术半兩當歸半兩銼微炒半夏半兩湯浸七遍去滑人參三分去蘆頭附子半兩炮裂去皮臍陳橘皮半兩湯浸去白焙乾甘草半兩炙微赤銼右件藥搗羅為末煮棗肉和搗三二百杵丸如梧桐子大每服不計時候以生薑湯下二十丸忌生冷油膩飴糖白术散出聖惠方治脾胃冷熱氣不和腹脅脹悶少思飲食白术一兩草豆蔲一兩去皮檳榔一兩甘草半兩炙微赤銼桂心三分桔梗一兩去蘆頭人參一兩去蘆前胡三分去蘆頭赤茯苓三分枳實半兩麩炒微黃訶梨勒一兩煨用皮右件藥搗篩為散末煉蜜和搗三百杵丸如梧桐子大不計時候以薑棗湯下二十丸人參湯聖惠方治脾胃冷熱氣不和胸膈不利三焦閉塞人參去蘆頭赤茯苓一兩桂心一兩乾薑一兩炮製銼細辛半兩訶梨勒一兩煨用皮川大黃一兩細銼微炒枳殼一兩麩炒微黃去穰赤芍藥一兩檳榔一兩甘草半兩炙微赤銼右件藥搗羅為末煉蜜和搗三五百丸如梧桐子大不計時候以生薑湯下二十丸忌生冷油膩濕麵草豆蔲散治脾胃冷熱氣不和胸中滿悶不能下食四肢無力草豆蔲三分去皮赤茯苓三分甘草半兩炙微赤銼人參半兩去蘆白术半兩桂心三分陳橘皮半兩湯浸去白穰焙枳殼三分麩炒微黃去穰半夏三分湯浸七遍去滑厚朴三分去粗皮塗生薑汁炙令黃香熟右件藥搗篩為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服忌生冷油膩飴糖丁香散聖惠方治脾胃冷熱氣不和心腹虛脹痰逆不思飲食四肢無力丁香乾薑炮白术各半兩赤茯苓去黑皮人參木瓜去穰切焙草豆䓻去皮訶梨勒煨用去皮茅香花各三分甘草炙一分右為細散不計時煎生薑棗湯調下一錢忌生冷油膩麵食神麯丸聖惠方治脾胃冷熱氣不和心腹㽱痛脅肋氣滯不思飲食四肢無力神麯一兩微炒令黃色乾薑半兩炮製銼檳榔一兩甘草半兩炙微赤銼桂心半兩陳橘皮半兩湯浸去白瓤焙人參三分去蘆當歸三分銼微炒附子半兩炮裂去皮臍右件藥搗羅為末煉蜜和搗三二百丸如梧桐子大不計時候以生薑橘皮湯下二十丸訶梨勒丸聖惠方治脾胃冷熱氣不和心腹痛不欲飲食訶梨勒三分煨用皮白术半兩木香三分甘草半兩炙微赤銼陳橘皮半兩湯浸去白瓤焙乾薑半兩炮製銼芎藭三分縮砂半兩去皮當歸三分銼微炒右件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大不計時候以薑棗湯下二十丸勻氣湯治脾胃冷熱氣不和止痰逆思飲食厚朴去粗皮生薑汁炙一兩陳橘皮湯去白焙半兩炙甘草一兩白术半兩沉香一分甘松一分白茯苓去黑皮半兩麥蘖炒半兩髙良薑炒一分右粗搗篩每服三錢鹽水一盞入生薑三片棗二枚擘破同煎至七分去滓不計時溫服快活丸治脾胃冷熱相攻胸膈氣悶消痰進食五味子炮炒一兩糯米炒香熟一兩半京三稜炮半兩檳榔銼半兩枳殼去瓤炒一兩半蓬莪荗炒半兩青橘皮湯去白瓤焙一兩郁李仁湯浸去皮半兩右為細末用半夏一兩生薑二兩爛煮研細為糊丸如菉豆大每服十五丸至二十丸食後溫湯下和中丸治脾胃冷熱氣不和寬中脘附子炮煨去皮臍甘草炙木香各一兩蘹香子炒一兩乾薑炮三兩沉香銼半兩藿香葉半兩青橘皮湯去白焙半兩右為細末湯浸炊餅和丸如櫻桃大每服一丸用白湯化下食前服硇附丸經效濟世方治脾胃冷熱虛滯積氣疼痛者是黑附子大者一箇從臍下剜如甕留一方厚有硇砂在內須至藥滿却用剜出末碾細稱得多少用白麵與前藥一般水搜作餅片裹附子硇砂先飛過右用炭三四斤於平地生火令地赤熱却攤周圍七寸安附在中時時轉動令裹者藥面焦赤皆勻入於末桕杵半日麵附皆細後入木香末半錢陳橘皮末半錢旋旋滴水杵和勻丸如梧桐子大每服五丸空心及晚食前用淡薑湯放溫服久服更無疼痛嘔酸之類大腹皮湯聖惠方治脾胃氣冷熱不和胸膈氣滯不下飲食宜服大腹皮銼微炒桑根白皮銼各半兩陳橘皮湯浸去白焙訶梨勒皮煨赤茯苓去黑皮炒三分右粗搗篩每服三錢匕以水一盞入生薑半分煎至七分去滓不計時溫服勝金丸治脾胃冷熱氣不和不思飲食或腹痛㽱刺山梔子仁烏頭各等分右生搗羅為細末以酒糊丸如梧桐子大每服十五丸炒生薑下如小腸氣痛炒蘹香子酒下二十丸治腹冷不調本草以筯子根酒飲磨服飲食勞倦附論夫人之百病皆由喜怒不節飲食失宜寒溫不適勞役所傷以致中氣有虧而五臟六腑之氣皆不足也由是而隂陽二證生焉其外傷風是天之邪氣感則傷人筋骨風從上受之風傷筋寒傷骨有形之物病也繫在下焦腎肝是也腎肝地之氣既絶於內肝主筋腎主骨故得病則筋骨酸疼筋骨之絶是腎肝之本亦絶乃有餘之病當㵼不當補其內傷飲食則水穀之寒食感則害人六腑溫存下受之脾胃之氣不足而反下行極則衝脈之火逆而上是無形之元氣受痞繫在上焦上焦者心肺是也心肺天之氣既絶於外心主榮肺主衛榮衛周身在於皮毛之間故得則亦惡風寒榮衛失守皮膚之間無陽以滋養是心肺之本亦絶乃中氣不足之病當補不當泄俗往往將中氣不足之證誤作外感風寒有餘客邪之病不知裏之虛實而重㵼其表使榮衛雙絶安得不至於死不可不辨外傷寒邪者其熱也翕翕怫怫然發於皮毛之上皮膚腠理陽之分寒邪中之鬱遏陽不得伸發熱而鼻塞心煩悶稍稍裸露皮膚明其熱在外也其惡寒也雖重衣下幕逼近烈一日一時增加愈甚必傳入裏作下證乃可罷此證也內傷飲食及勞役所傷者其熱也蒸蒸而燥上衝頭項旁徹皮毛蓋為腎間受脾下流之濕氣閉塞致隂火上行故渾身躁熱近寒涼則已明其熱在內也其惡寒也但見風見寒或居隂寒無日處便惡無有間斷一避風或添衣而覆被其所惡則不見實表而已此其證也况內傷亦有頭疼項強腰痛與太陽表證相似餘則不同內傷飲食發熱則汗出外傷風寒則不汗出得汗乃解尤當先審用藥也傷飲食勞役病手心熱手背不熱病在內也外傷風寒病則手背熱手心不熱病在外也內傷飲食及勞役必口失五味必腹中不利欲言強答口多沫唾鼻中清涕或有或無此隂證也外傷風寒必鼻塞不利而清涕聲言壅口不和此陽證內經云傷食惡寒傷寒是也外傷風寒則氣壅盛而有餘者蓋心肺元氣無減損又添邪氣助之使鼻氣壅塞不利併從口出發言前輕後重聲狀有力故曰氣勝有餘之病也內傷飲食及勞役則短氣少氣上喘而不足蓋心肺之氣先損為熱既傷氣使四肢無力氣怯聲低不欲言語故曰氣少不足之病也內傷則頭痛有時而作有時而止外傷則頭痛常常有之直傳入裏方罷內傷則心肺之氣為脾土濕熱所乘脾主四肢必四肢沉重怠惰嗜臥經云熱傷氣熱則骨消筋緩是也外傷則腎肝氣絶為寒邪所傷腎主骨為寒肝主筋為風必筋疼骨沈著體倚枕不能搖動經云寒傷形寒則筋攣骨痛是也外傷不惡食而能食口仍能知五味心氣和脾氣通故也內傷不能食而惡食口不知五味心氣絶脾氣損故也外傷風二三日榖消水去邪入裏則有渴內傷飲食久病者濕氣流在血脈中則不渴若勞役形質傷之重者大火熾上尅肺金則渴矣胃中元氣盛則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱虛則不能食而瘦或少食而肥雖肥而四肢不舉蓋脾虛而氣盛也又有善食而瘦者胃伏火邪於氣分則能食脾虛則肌肉消即食亦瘦也叔和謂多食亦肌虛此之謂也夫飲食不節則胃病胃病則氣短精神少而生大熱有時顯火上行獨燎其靣靣熱足陽明病病則脾無所稟受脾為死隂不主時也故亦從而病焉形體勞役則脾病而怠惰嗜臥四肢不收大便泄㵼脾既病則胃不能獨行津液故亦從而病焉大抵脾胃虛弱陽氣即不能發生是春夏之令不行五行之氣不生脾病則下流乘腎土尅水則骨乏無力是為骨蝕令人骨髓空虛足不能履地是隂氣重疊此隂盛陽虛之證汗之則愈下之則死若用辛甘之藥滋胃當升當浮使生長之氣旺言汗之者非正發汗也為助陽也夫胃病其脈緩脾病其脈遲若人當臍有動氣按之勞若痛乃火乘土位其脈洪緩更有身弱心中不便之證此陽氣衰弱不能生發不當於五臟中用法治之當從臟氣發時論中升降浮沉補瀉法用藥如脈緩怠惰嗜臥四肢不收或大便泄㵼此濕勝從平胃散若脈弦氣弱自汗四肢發熱大皮泄㵼或皮毛枯稿髮脫落從黃耆建中湯脈虛而弱於四物湯中摘一味或二味以夲顯證中加之或真氣虛弱及氣短脈弱從四君子湯或小便祕澀赤黃多少從五苓散去桂摘一二味加正藥中已上五藥當於本中隨所兼見證加減假令表虛自汗春夏加黃耆秋冬加桂如腹中急縮或脈弦加防風急甚加甘草腹中窄狹或氣短者亦如之腹滿氣不轉者勿加雖氣不轉而脾胃中氣不和者勿去但加厚朴以破滯氣然亦不可多用於甘草五分中加一分可也腹夯悶此非腹脹乃散而不收可加芍藥收之如肺氣短促或不足者加人參白芍藥中焦用白芍藥則脾中升陽使肝膽之邪不敢犯也腹中窄狹及縮急者去之及諸酸澀藥亦不可用腹中痛者加甘草白芍藥稼穡作甘甘者己也曲直作酸酸者甲也甲己化土此仲景妙法也腹痛兼發熱加黃芩惡寒或腹中絞寒加桂怠惰嗜臥有濕胃虛不能食或沉困或泄㵼加蒼术自汗加白术小便不利加茯苓渴亦如之氣弱者加白茯苓人參氣盛者加赤茯苓縮砂仁氣腹不能轉運有熱者微加黃連心煩亂亦如之小便少者加豬苓澤瀉汗多津液竭於上勿加之是津液還入胃中欲自行也不渴而小便閉塞不通加炒黃蘖知母小便澀者加滑石炒小便淋瀝者加澤瀉且五苓散治渴而小便不利無惡寒者不得用桂不渴而小便自利妄見妄聞乃瘀血證用炒黃蘖知母以除腎中燥熱竅不利而淋加澤瀉炒滑石若竅不利者六一散中加木通亦可心臟熱者用錢氏方中導滯散中滿或但腹脹者加厚朴氣不順加橘皮氣滯加青皮一橘皮三氣短小便利者四君子湯中去茯苓加黃耆以補之如腹中氣不轉者更加甘草一半腹中刺痛或周身刺痛者或裏急者腹中不寬快者是也盛虛坐而大便不得皆血虛也血虛則裏急或血氣虛弱而目睛痛者加當歸身頭痛者加川芎若頭疼者加細辛此少隂頭痛也髮脫落及臍下痛加熟地黃調理脾胃虛弱於此藥中加減如五臟正中互顯一二證各對證加藥無不驗然終不能使人完復後或有因而再至者亦由督任衝三脈為邪皆胃氣虛弱之所致也法雖依證加減執方料病不依素問法度耳是以檢討難素及黃帝經中説脾胃之源乃陽氣不足隂氣有餘當從六氣不足浮沉升降法隨證用藥治之蓋脾胃不足不同餘臟無定體故也其肝心肺腎有餘不足或補或瀉惟益脾胃之藥為切經言至而不至是為不及所勝妄行所生受病所不勝乘之也至而不至者謂從後來者為之虛邪心與小腸來乘脾胃也脾胃脈中見浮大而弦其病或煩躁悶亂或四肢發熱或口乾舌乾咽嗌蓋心生火小腸主熱來乘土位乃濕熱相合故煩燥悶亂四肢者脾胃也火乘之故四肢發熱也飲食不節勞役所傷以致脾胃虛弱乃血所生病主口中津液不行故口乾咽乾病人自以為渴燥醫以五苓散止渴燥而反加渴燥乃重渴津液以至危亡經云虛則補其母當以心與小腸中以補脾胃之根蒂也甘溫之藥為之主以苦寒之藥為之使以酸味為之臣佐以甘辛心主緩急食酸以收之心火旺則肺金受邪金虛則以酸補次以甘溫及甘寒之劑於脾胃中瀉心火之亢盛是致其本也所勝妄行者言心火旺能令母實者肝木也肝木旺則火之勢無所畏懼而妄行也故脾胃先受之或身體沉重走疰疼痛蓋濕熱相搏而風熱鬱而不能伸附著於有形也或多怒若風熱不陷於地中或目病而生內障者脾裹血胃主血心主脈脈者血之府也或云心主血又云肝主血肝之竅開於目或妄聞起妄心夜夢亡人四肢滿閉轉筋皆肝木火盛而為邪也或生痿或生痺或生厥或中風或生惡瘡或作腎痿或為上熱下寒為邪不一皆風熱不得生升長而木火遏於有形中也所生受病者言肺受土火木之邪而清肅之氣傷或胸滿少氣短氣肺主諸氣五臟之氣皆不足而陽道不行也或咳嗽寒熱者濕熱乘其內也所不勝乘之者水乘木之旺行而反來侮土欲腎入心為汗入肝為泣入肺為涎入脾為痰為嗽為涕為嚏為水出鼻也一説下元土盛尅水致督任衝三脈盛火旺煎熬令水沸騰而乘脾肺故痰涎唾出於口也下行為隂汗為外腎冷為不足不任身為腳下隱痛或水附木勢而上為眼澀為眵為淚皆由肺金之虛而害於外也夫脾胃不足皆為血病是陽氣不足隂氣有餘故九竅不通諸陽氣根於隂血中隂血中受火邪則隂盛隂盛則上乘陽分而陽道不行無生發升騰之氣也夫陽氣走竅者也隂氣附形質者也如隂氣附於土陽氣升於天則各安其分也今所立方中有辛甘溫藥者非獨用也復有甘草大寒之劑以非獨用以火酒二製為之使引苦甘寒藥至頂而復入於腎肝之下此所調升降浮沉之道自偶而竒竒而至偶者也陽分竒隂分偶瀉隂火以諸風藥升發陽氣以滋肝膽之用是令陽氣生上出於隂分末用辛甘溫藥按其升藥使大發散於陽分也而令走九竅經云食入於胃散精於肝淫氣於經食入於胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於府且飲食入胃先行陽道而陽氣升浮也浮者陽氣散滿皮毛升者充塞頭頂則九竅通利也若飲食不節損其胃氣不能尅化散於肝歸於心溢於肺食入則昏冒欲睡得臥則食在一邉氣暫得舒是知升發之氣不行者此也飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺病人飲入胃遽覺至臍下便欲小便由精氣不輸於脾不歸於肺則心火上攻口燥咽乾是隂氣太盛其理甚易知也脾胃病則當臍有動氣按之牢若痛有是者乃脾胃虛無是則非也脾胃不足則火不能生土而反亢拒此至而不至是為不及也白术君人參臣甘草佐芍藥佐黃連使黃耆臣桑白皮佐諸風藥此是風能勝濕也諸甘溫藥亦可心火亢盛乘於脾胃之位亦至而不至是為不及也芍藥佐石膏佐黃連君知母佐黃蘖臣甘草使生地黃臣黃芩佐肝木妄行胸脅痛口苦舌乾往來熱而嘔多怒四肢滿悶淋潰便難轉筋腹中急痛此所不勝乘之也羌活佐防風臣升麻使柴胡君獨活芍藥臣甘草臣白术佐茯苓佐豬苓澤瀉佐肉桂臣藳本川芎細辛蔓荆子白芷石膏黃蘖知母滑石肺金受邪由脾胃虛弱不能生肺乃所致受病也故咳嗽氣短氣上皮毛不能禦寒精神少而渴情懆慘而不樂皆陽氣不足隂氣有餘是體有餘而用不足也人參君白术佐白芍藥佐橘皮臣青皮破滯氣黃耆臣桂枝佐桔梗引用桑皮佐甘草諸酸之藥亦可木香佐檳榔五味子佐此三味除客氣腎水反來侮土所勝者妄行也作涎及清涕唾唾多溺多而惡寒者是也土火復之及三脈為邪則不足任身足不痛不能踐地骨乏無力喜睡兩足冷腹隂隂而痛妄聞妄見腰脊背脾皆痛白术臣蒼术佐川烏頭臣乾薑君肉桂佐去皮少許茯苓佐澤瀉使豬苓佐附子佐炮少許夫飲食入胃陽氣上行津液與氣入於心貫於肺充實皮毛散於百脈脾稟氣於胃而澆灌四傍榮養氣血者也今飲食損胃勞倦傷脾脾胃虛則火邪乘之而生大熱當先於心分補脾之源而土生於火兼於脾胃中瀉火之亢甚是先治其標後治其本也且濕熱相合陽氣日已虛則不能上升而脾胃之氣下流併入腎肝是有秋冬而無春夏春主升夏主浮人則肝心應之弱則隂氣勝則陽氣不能經營陽本根於隂惟瀉隂中火味薄風藥升發以伸陽氣則隂氣不病陽氣生矣假令不能食而肌肉削乃本病也其右關脈緩而弱本脈也而本部本脈證脈中兼見弦脈或見四肢滿閉淋瀝便難轉筋一二證此肝之脾胃病也當於本經藥中加風藥以瀉之本部本證脈中兼見洪大或肌熱煩熱靣赤而不能食肌肉消一二證此心之脾胃病也當於本經藥中加瀉心火之藥本部本證脈中兼見浮澀或見氣短氣上喘嗽咳痰盛皮澀一二證此肺之脾胃病也當於本經藥中兼瀉肺之體及補肺之藥本部本證脈中兼見沉細或見善恐懼之證此腎之脾胃病也當於本經藥中加瀉腎水之浮及瀉隂火伏熾之藥病有逆從治有反正除四反治法不須論之惟有陽明厥隂不從標本從乎中也假如時在長夏之令中立方謂正當主氣衰而客氣旺之時也後之處方者當從此法加時令藥名補脾胃瀉隂火升陽湯升陽益胃湯之類方在脾胃俱虛類君臣佐使法有毒無毒無毒所治為主主病者為君佐君者為臣應臣者為使一法力大者為君凡藥之用皆以氣味為主補瀉在味隨時换氣氣薄者為陽中之隂氣厚者為隂中之陽味薄者為隂中之陽味厚者為隂中之隂辛甘淡中熱者為陽中之陽辛甘淡中寒者為陽中之隂酸苦醎之寒者為隂之隂酸醎之熱者為隂中之陽夫辛甘淡酸苦醎乃味之隂陽又為地之隂陽也溫涼寒熱乃氣之隂陽又為天之隂陽也氣味生成而隂陽造化之機存焉一味之內氣味兼有一藥之中理性具焉主對治療由是而出假令治表實麻黃葛根表虛桂枝黃耆裏實枳實大黃裏虛人參芍藥熱者黃芩黃連寒者乾薑附子之類為君君藥分兩最多臣藥次之使藥又次之不可令臣過於君君臣有序相與宣攝則可以禦邪除病矣如陽脈澀隂脈弦腹中急痛法當以芍藥之酸於上瀉木為君飴糖炙甘草甘溫補脾養胃為臣水挾木勢亦來侮土故脈弦而脹痛肉桂大辛熱佐芍藥以退寒水薑棗甘辛溫發散陽氣行於經脈皮毛為使建中之名於此見焉有緩急收散升降浮沉澀滑之類非一也皮毛肌肉之不伸無大熱不能食而渴者加葛根半兩燥熱及胃氣上衝為衝脈所逆或作惡氣而裏者加炒黃蘖知母覺胸中熱而不渴加炒黃芩如胸中結滯氣澀或有熱病者亦各加之如食少而小便少者津液不足也勿利之益氣補脾自行矣氣弱氣短者加人參入升陽之劑助陽尤甚如人惡熱發熱而躁渴脈洪大白虎湯主之或喘者加人參如渴不止寒水石石膏各等分少少與之即錢氏方中甘露飲主身大熱而小便數或上飲下溲此躁熱也氣燥加白葵花如脈弦只加風藥不可用五苓散如小便不行病增者此內燥津液不能停留致津液加炒黃蘗赤葵花心下痞悶加黃連一黃芩三減諸甘藥不能食心下軟而痞者甘草瀉心湯則愈喘滿者加炙厚朴小便不利者加之小便為禁藥也胃虛弱而痞者加甘草喘而不利者加苦葶藶氣短氣弱而腹微滿者不去人參去甘草加厚朴然不若苦味泄之而不令大便行如腹微滿者而氣不轉加之中滿者去甘草倍黃連加黃蘗更加三味五苓散少許此病雖宜升宜汗如汗多亡陽加黃耆四肢肌熱煩熱與羌活柴胡升麻葛根甘草則愈鼻流清涕或頂背脊膂強痛羌活防風甘草等分黃連加倍臨卧服之有大熱脈洪大加苦寒劑而熱不退者加石膏如脾胃中熱加炒黃連甘草凡治此病脈數者當用黃蘖或少加黃連以柴胡蒼术黃耆甘草更加升麻得汗出則脈必下是火鬱而發之也如證退而脈數不退不洪大而痰有力者多加苦藥加石膏如大便軟或泄者加桔梗食後服之此藥悮用則其害非細用者旋旋加之如食少者不可用石膏石膏善能去脈數即病退脈數不退者死不治不大渴亦不可用如脈弦而數者此隂氣也風藥升陽以發火欎則脈數峻退矣風寒汗出肩背痛中風小便數而欠者風熱乘其肺使肺氣欎甚也當瀉風熱以通氣防風湯主之小便遺失者肺氣虛也宜臥養氣禁勞役以黃耆人參之類補之不愈當清其熱加黃柏生地黃肩背痛不可回顧此手太陽氣欎而不行以風藥散之如脊痛項強腰似折項似拔上衝頭痛及足太陽經不行也以羌活勝濕湯主之如腿腳沉重者無力者加酒洗漢防己半錢輕則附子重則川烏頭少許以為引用而行經也如臥而多驚小便淋溲者邪在少陽厥隂亦用太陽經藥更加柴胡半錢如淋加澤㵼半錢此下焦三經風寒合病也腎肝之病同一治為俱在下焦非風藥行經不可也如大便後有白膿或赤便膿者因勞役氣虛傷大腸也以黃耆人參湯補之如裏急後重者血虛也加當歸如肺脹膨脹而喘嗽胸膈氣滿壅盛而上奔者多加五味子人參次之麥門冬又次之黃連少許甚則交兩手瞀者真氣大虛也若氣短加黃耆五味子人參氣盛加五味子人參黃芩荆芥穗冬月去荆芥穗加草豆䓻仁如咽嗌痛頷腫頸肩懦肘臂外後亷靣赤脈洪大者以羌活防風甘草藳本通其經血加黃芩黃連消其腫以人參黃耆益其元氣而瀉其火邪如脈緊者寒也或靣白善嚏或靣白色惡皆寒也亦加羌活等四味當瀉足太陽不用黃芩少加附子以通其脈靣色白多悲恐者更加桂附如便白膿少有滑頻見汚衣者氣脫加附子皮甚則加米榖如氣澀者只以甘藥補氣當安臥不動以養其氣夫脾胃虛弱必上焦之氣不足過夏天氣熱甚損其元氣怠惰嗜臥四肢不收精神不足兩腳痿弱遇早晚寒厥日髙之後陽氣將旺復熱如火乃隂陽氣血俱不足故或熱厥而隂虛或寒厥而氣虛口不知味目中流火而視物昏昏無所見小便頻而數大便難而結祕胃脘當心而痛兩脅痛或急縮臍平周圍如繩束之急甚則如刀刺腹難舒伸胸中閉塞時顯嘔噦或有痰嗽口沃白沫舌強腰背脾眼皆痛頭痛時作食不下或食入即飽全不思食自汗尤甚若隂氣覆在皮毛之上皆天熱之熱助本病乃庚大腸辛肺金為熱所乘而作當先救元氣調理庚辛之不足以黃耆人參湯主之如心痞悶加黃連二分或三分如胃脘常痛減大寒藥加草豆蔲仁五分如脅下痛或縮急加柴胡二分或三分如頭痛目中溜火加黃連二分或三分川芎三分如頭目不清利上壅下熱加蔓荆子三分藳本二分細辛一分川芎三分生地黃二分如氣短精神如夢寐之間困乏無力加五味子九箇如大便澀滯隔一二日不見者致食少不下血中伏火而不得潤也加當歸身生地黃各半錢桃仁三枚麻子仁泥五分如大便通所加之藥勿再服如大便又不快利者勿用别藥少加大黃煨半錢如不利者非血結血祕而不通也是熱則生風其病人必顯風證單血藥不可服加之常服人參黃耆湯只用羌活半兩防風半兩二味㕮咀以水四盞煎至一盞去滓空心服之其大便必大走也一服便止如胸中氣滯加青皮一分或二分并去白橘皮倍之去其邪氣此病本元氣不足惟當補元氣不當瀉之如氣太甚或補藥過多或病人心有憂滯欎之事更加木香二分或三分白豆䓻仁二分縮砂仁二分或三分如腹痛不惡寒者加白芍半錢黃芩二分却減五味子脾胃虛弱遇六七月間河漲淋雨諸物皆潤人汗沾衣身重短氣甚則四肢痿軟行步不正腳軟眼黑欲倒此腎水與膀胱俱竭狀也當急救之滋肺氣以補水之上源又使庚大腸不受邪熱不令汗大泄也汗泄甚則止津液則七神無依津液相乘神乃自生津者庚大腸所主三伏之義為庚金受囚也若正津液汗太泄濕令亢甚則清肅之氣正燥金受囚風木無可以制故風濕相搏骨節煩疼一身盡痛亢則害承乃制是也五月常服五味子是瀉丙火補庚大腸益五臟之元氣壬膀胱之寒已絶於己癸腎水已絶於午今更逢濕旺助熱為邪西方北方之寒清絶矣聖人立法夏宜補者補天真元氣非補熱火也令人夏食寒是也為熱傷元氣以人參麥門冬五味子生脈脈者元氣也人參之甘補元氣瀉熱火也麥門冬之苦寒補水之源而清肅燥金也五味子之酸以瀉火補庚大腸與肺金也當此之時無病之人亦或有二證或避暑熱納涼於深堂大厦得之者名曰中暑其病必頭疼惡寒身形拘急肢節疼痛而煩心肌膚火熱無汗為房室隂寒所遏使周身陽氣不得伸越意多以大順散主之是也若行人或農夫於日中勞役得之者名曰中熱其病必苦頭痛發燥熱手捫之肌膚大熱必大渴引飲汗大泄無氣以動乃天熱外傷肺氣蒼术白虎湯主之潔古云動而得之為中熱靜而得之為中暑中暑隂證當發散也中熱者陽證為熱傷元氣非形體受病也若虛損脾胃有宿痰之人遇此天暑將理失所違時伐化必困乏無力懶語氣短氣弱氣促似喘非喘骨乏無力其形如夢寐濛濛如煙霧中不知身所有也必大汗泄若風犯汗眼皮膚必搐項筋皮枯毛焦身體皆重支節時有煩疼或一身盡痛或渴或不渴或小便黃澀此風濕相搏也頭痛或頭重上熱壅盛口鼻氣短促身心煩亂有不生之意情思慘悽此隂勝陽之極也病甚則轉腎肝之為痿厥四肢如在火中為熱厥四肢寒冷者為寒厥寒厥則腹中有寒熱厥則腹中有熱為脾主四肢故也若肌肉濡潰痺而不仁傳為肉痿證證皆有肺疾用藥之人當以此調之氣上衝胸皆厥證也痿者四肢痿軟而無力也其心煩寃不止厥者氣逆也甚則大逆故曰厥逆其厥痺多相須也於黃耆人參五味子麥門冬湯中每服加白茯苓二分澤瀉四分豬苓一分白术一分如小便快利不黃色只加澤瀉二分與二术上下分消其濕如行步不正腳膝痿弱四肢欲側者已中痿邪加酒洗黃蘖五分炒知母三分不令妨其食當以意斟酌若妨食則止候食進則再服三里氣衝以三稜針出血若汗不減不止者於三里穴下三寸上亷穴出血禁潤物濕麵夫痿者濕熱乘腎肝也當急去之不然則下焦元氣竭盡而成軟癱腰下不能動心煩寃而不止也若身重減氣不短小便如常及濕熱之令退時或所增之病氣退者不用五味子澤瀉茯苓豬苓黃蘖知母蒼术白术之藥只依本病中證候加減常服藥亦須用酒黃蘖二分或三分如更時令清燥之氣大却加辛溫瀉之苦濕氣盛風證不退眩運麻木不仁除風濕羌活主之夫脈弦洪緩而沉按之中指下得一時澀其證四肢滿閉肢節煩疼難以屈伸身體沉重煩心不安忽時忽瘦四肢懶倦口失滋味復難舒伸大小便清利而數或上飲下便或大便澀滯不行一二日一見夏月飱泄米榖不化或便後見血見白膿胸滿短氣咽膈不通或痰嗽粘稠口中沃沫食入反出耳鳴耳聾目中流淚視物昏花努肉紅絲墊壅頭目不得安息嗜臥無力不思飲食調中益氣湯主之氣虛身弱得之傷暑熱傷氣故也有所逺行勞倦逄大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不勝火則骨枯髓虛足不任身發為骨痿者生於大熱也此溫成痿令人骨乏無力故治痿獨取於陽明時當長夏濕熱大勝蒸蒸而熾人感之多四肢困倦精神短少懶於動作胸滿氣促肢節沉疼或氣髙而嗽身熱而煩心膨閉小便黃而數大便溏而頻或痢出黃如糜或如泔色或渴或不渴不思飲食自汗體重或汗少者血先病而氣不病也其脈中得洪緩若濕氣相搏必加之以遲遲病雖互換少差其天暑濕令則一也宜以清燥之劑治之陽氣者衛外而為固也是則氣泄令暑邪於衛故身熱自汗以黃耆甘溫補之為君人參橘皮當歸甘草微溫補中益氣為臣蒼术白术澤瀉滲利而除濕升麻葛根甘苦平善解肌熱又以風勝濕也濕勝則食不消而作痞滿故炒麴甘草青皮辛溫消食快氣腎惡燥急食辛以潤之故以黃蘖苦辛寒借甘味瀉熱補水虛者淫其化以人參五味子麥門冬酸甘微寒救天暑之傷於庚金為佐名曰清暑益氣湯此病皆由飲食勞倦損其脾胃乘天暑而病作也但藥中犯澤瀉豬苓茯苓燈草通草木通淡滲利小便之類皆從時令之旺氣以瀉脾胃之客邪而補金水之不及也此方以從權而立之者若於無時病濕熱脾土之證或小便已敷腎肝不受邪者誤用之必大瀉真隂竭絶腎水先損兩目也心火乘脾乃血受火邪而不能外發陽氣伏於地中地者人之脾也必用當歸和血少用黃蘖以益真隂脾胃不足之證須少用升麻乃足陽明太隂别經之藥也使行陽道自脾胃中又遷少陽行春令生萬物化生根蒂也更少加柴胡使諸經又遷生發隂陽之氣以滋春之和氣也脾胃緣心火亢甚而乘其土也其次肺氣受邪為熱所傷必須用黃耆最多甘草次之三者皆甘溫之藥也脾始虛肺氣先絶故用黃耆甘溫以益皮毛之氣而閉腠理不令自汗而損其元氣也上喘氣短懶語須用人參以補之心火乘脾須用炙甘草以瀉火熱而補脾胃中元氣甘草最少恐資滿也若脾胃之急痛并脾胃太虛腹中急縮腹皮急縮者却宜多用之若從權加升麻以引之恐在遷之邪堅盛卒不肯退反行隂逆故使引陽道上行若中滿者去甘草嗽甚者去人參如口乾嗌乾者加葛根血虛加人參補之陽旺則能生隂血也更加當歸和血又加黃蘖以救腎水蓋甘寒瀉熱火火減則心氣平安如煩亂猶不能止少加黃連以去之如氣浮亂則以硃砂安神丸鎮固之如心下痞亦少加黃連氣亂於胸為清濁相干故以橘皮理之能助陽氣之升又助甘辛為用也長夏溫土客邪大旺可從權加蒼术白术澤瀉上下分消其濕熱之氣濕氣太勝主食不消化故食減不知榖味加炒麴以消之復加五味子麥門冬以人參瀉火益肺氣故秋損也此三伏中長夏正旺之藥也濁氣在陽亂於胸中則腹滿閉塞大便不通夏月宜少加酒洗黃蘖大苦寒之味冬月宜加吳茱茰大辛苦熱之藥以從權乃隨時用氣以從權乃隨時用氣以瀉濁氣之不降也借用大寒之氣於甘藥中故曰甘寒瀉大熱也亦須用發散寒氣辛溫之劑多黃蘖少也清氣在隂者乃人之脾胃氣衰不升發陽氣故升麻柴胡助辛甘之味以引元氣之升不令飱泄也堵寒咽喉陽氣不得出者曰塞隂氣不得下降者曰噎夫噎迎於咽喉胸膈之間今諸經不行則口開目瞪氣欲絶當先用辛甘氣味俱陽之藥引胃氣以治其本加堵塞之藥以瀉其標也寒月隂氣大助隂邪於外於正藥內加吳茱茰大熱大辛苦之味以瀉隂寒之氣暑月陽盛則於正藥中加青皮陳皮益智黃蘖散寒氣泄隂火之上逆或以消痞丸合滋腎丸者黃蘖加知母微加桂三味是也或更以黃連别作丸二藥各七十八丸空心約盡服之待少時以美食壓之不令胃中停留也如食少不飢加炒麴如食已心下痞别服橘皮枳术丸如脈弦四肢滿閉便難而心下痞加甘草黃連柴胡如腹中氣上逆者是衝脈逆也加黃蘖三分黃連一分半以泄之如大便閉燥心下痞加黃連桃仁少加大黃當歸身如心下痞嘔逆者加黃連生薑橘皮如冬月加黃連少入丁香藿香葉如口乾嗌乾加五味子葛根如脅下急或痛甚俱加柴胡甘草如胸中滿悶欎欎然加橘皮紅青皮木香少許如頭痛有痰身重懶倦者乃太隂痰厥頭痛加半夏半錢生薑二分或三分如腹中或周身間有刺痛此血澀不足加當歸身如噦加五味子多益智仁如食不下乃胸中胃上有寒或氣澀滯加青皮陳皮木香此三味為定法冬天加益智仁草豆䓻仁夏月少用更加黃連秋月氣滯澀食不下更加檳榔草豆蔲仁縮砂仁或加白豆蔲如春三之月食不下亦用青皮少陳皮多加風藥以退其寒覆其上如初春猶寒更少加辛熱以補春氣之不足以為風藥之佐益智草豆䓻皆可也如脈弦者見動風之證以風藥通之如脈澀覺氣澀滯者加當歸身天門冬木香青皮陳皮有寒者加桂枝陳皮黃耆如胸中緻塞或氣閉悶亂者肺氣澀滯而不行宜破滯氣者青皮陳皮更加木香檳榔冬月加吳茱茰人參緻塞因外寒所遏必寸口脈弦或微緊乃胸中大寒也若加之舌上白胎滑者乃丹田有熱胸中有寒加黃蘖生地黃勿作寒證治之如秋冬天氣寒涼而腹痛者加半夏或益智等藥若或草豆蔲之類如發熱或捫之而肌表熱者此表證也只服補中益氣湯一二服得微汗則涼矣如腳膝痿軟行步乏力或疼痛乃腎肝中伏濕熱少加黃蘖空心服之不愈更增黃蘖加漢防己半錢則腳膝中氣如故也如多唾白沫胃口上停寒也加益智仁如少氣不足以息者服正藥一二服氣猶短促者為膈上及表間有寒所當遏引陽氣上伸加羌活獨活藳夲最少升麻多柴胡次之黃耆加倍飲食勞倦所傷身熱氣短以黃耆甘草人參白芍藥當歸少加柴胡升麻立愈此者可以通天地之變也又經云氣勝身寒得之傷寒身形也仲景以麻黃桂枝青龍湯之類發散寒邪汗出而解矣內傷飲食服藥用藥者皆以為細務然利害非小蓋胃氣者榮氣也榖氣也清氣也資少陽生發之氣人之真氣衰旺皆在飲食入胃和則五榖氣升輸於華蓋布灌於五臟以資元氣生發之功也飲食一傷藥對所傷之物胃氣愈旺榖氣精氣神氣強盛氣血周流百病不侵一藥之用大哉若下峻利之藥所傷之物已去藥未盡化病去之後脾胃受虧脾胃既虧則精敗損促人命其可戒哉且如易水張先生枳术丸神妙可推以白术之甘溫補脾胃其若除胃中之濕熱是先補其虧後以尅化之尅化者枳實是也以枳實苦寒泄心下痞悶消化胃中所傷則不峻利也且以燒飯與白术協力滋養榖氣令脾胃自厚不至內傷若以辛熱之物如集香丸之類下之大便下則所傷物去巴豆大熱有毒重傷元氣七神不熾經云熱傷氣正謂此也其人必無氣而熱因而四肢不舉傳變諸痰不可勝數經云因而大飲則氣逆因而飽食則腸癖為痔夫飲食無形之氣傷之則發汗利小便解醒湯五苓散主之食者有形之物傷之則損其榖而消導之丁香爛飯枳术丸主之若重攻化三稜消積木香見脘之類是也尤重則吐瓜蒂備急之類是也以平為期斯為善矣榖肉榖菜本以養生無使過之傷其正也茍能慎起處節飲食經云不治已病治未病此之謂也傷冷飲不惡寒身重飲食不化小便不利去桂五苓散假令傷熱物二分生冷物一分用寒藥三黃丸二停熱藥木香見脘一停合而用之傷生冷二分熱物一分用見脘二停三黃一停合而服之假令夏月傷生冷當用見脘丸須少加三黃丸蓋天時不可伐故加寒藥以順時令若傷熱物只用三黃此三黃時藥也假令冬月傷羊肉濕麵熱物當用三黃須加熱藥少許草豆䓻之類為引用又為時藥也方補中益氣湯出拔萃方治脾胃虛弱飲食勞倦內傷不足之病古之聖人窮於隂陽之化究乎生死之氣所著內經悉言人以胃氣為本人受水榖之氣以生所謂清氣榮氣運氣衛氣春升之氣皆謂之氣别稱也夫胃水榖之海飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經并行合於四時五臟陰陽揆度以為常也茍飲食不節寒溫不適則脾胃乃傷喜怒憂恐而損耗元氣既脾胃衰元氣不足而心火獨盛心火者隂火也起於下焦其系繫於心心不主令相火代之相火下焦包絡之火元氣之賊也火與元氣不兩立一勝則一負脾胃虛則下流於腎肝隂火得乘其土位故脾胃之證使得之則氣髙而喘身熱而煩其脈洪大而頭痛或渴不止其皮膚不任風寒而生寒熱蓋隂火上衝則氣髙喘而煩熱為頭痛為渴而脈洪脾胃之氣下流使榖氣不得升浮是春行之令則無陽以護其榮衛則不任風寒乃生寒熱此皆脾胃之氣不足所致也然而外感風寒所得之證頗因而寒異內傷脾胃乃傷其氣外感風寒乃傷其形為有餘有餘者瀉之傷其內為不足不足補之汗之下之吐之尅之之類皆瀉也溫之和之調之養之之類則皆補也內傷不足之證茍悮認外感有餘之病而反瀉之則虛其虛也實實虛虛損不足而補有餘如此死者醫殺之也然則奈何曰惟當以辛溫之劑補其中而升其陽甘寒以瀉其火則愈矣勞者溫之損者溫之溫能除大熱大忌寒苦之藥瀉其土耳今立此方主之黃耆半錢病甚勞役熱者一錢當歸身二錢酒洗焙乾二日乾小和血脈人參三錢有嗽去之白术三錢以調其氣炙甘草半錢柴胡二錢引清氣上升行少陽之經升麻二錢引胃氣上升而復夲位便是行春升之令橘皮三錢以導滯氣又能益元氣行諸甘藥右件㕮咀都作一服水二盞去滓大溫服一方加白芍藥黃蘖紅花硃砂安神丸出拔萃方夫脾胃虛者因而飲食勞倦心火亢甚而乘其土位其次肺氣受邪須用黃耆最多甘草人參次之脾如一虛肺氣先絶故用黃耆以益皮毛而閉腠理不令自汗損其元氣上喘氣短人參以補之心火乘脾須炙甘草之甘以瀉火熱而補脾胃中元氣若脾胃急痛大虛眼皮急縮者最宜多用急者緩之胃中清氣在下必加升麻柴胡以引之引黃耆甘草上升能補胃氣之散解以緩帶脈之縮急二味苦平味薄者隂中之陽而引清氣上升也黃耆人參甘草三味溫為主用脾胃虛乃必用之藥氣亂於胸為濁相干用去白橘皮以理之又能助陽氣之升以散滯氣助諸甘辛為用也口乾嗌乾者加葛根脾胃氣虛不能升浮為隂火傷其生發之氣勞血大虧榮氣不營隂火熾盛是血中伏火日漸煎熬血氣日減心包主血血減則心無所養致使心亂而煩病名曰忪忪者心感而煩悶不安也故加辛溫甘溫之劑生陽陽生則隂長或曰甘溫何能生血仲景之法血虛以人參補之陽旺則能生隂血更加當歸和之又宜加黃蘖以救腎水能瀉隂中之伏火如煩猶伏止少加生地黃補腎水水旺而心火自降如氣浮亂以硃砂安神丸鎮固之則愈硃砂五錢另研隂乾稱黃連去鬚揀酒洗稱六錢當歸去蘆二錢半炙甘草五錢半生地黃二錢半右為細末另硃砂水飛如塵隂乾為衣湯浸餌餅為丸如黍米大每服一十丸津唾咽之食後熱淫所勝治以甘寒以苦寒瀉之黃連苦寒去心煩除濕熱為君以甘草生地黃之甘寒瀉虛熱滋生隂血為臣以當歸補其血不足硃砂納浮遊之火而安神四時用藥加減法長夏濕土客邪大旺加蒼术澤瀉上下分消其濕熱之氣濕熱大勝主食不消故食減不知榖味則加麯以消之加五味子麥門冬助人參瀉火益肺氣助秋損也在三伏中為莖藥堵塞咽喉陽氣不得出病名曰寒隂氣不得降病名曰噎噎塞迎逆於咽喉胸膈之間令諸經周身陽氣不行令人開目瞪氣欲絶者何也清氣在隂濁氣在陽清濁相干於胸中是為大忪夏月加青皮陳皮益智黃蘖泄隂火之上逆或以清痞丸滋腎丸各七八十丸則愈冬月加吳茱茰大熱大辛苦之味以瀉隂寒之氣則愈食不消則加炒麯空心約宿食消盡之時少時以美食壓之不令胸中停留也食不下乃胸中有寒胸上有寒或氣寒澀滯加青皮陳皮木香此三味為定法冬月加益智仁并草豆䓻仁夏月少加黃芩黃連秋更加檳榔草豆蔲縮砂仁白豆䓻仁如春初猶寒更少加辛熱之劑以補春氣之不足為風藥之佐益智草豆䓻可也冬月咳嗽者加不去節麻黃半錢如秋涼亦加如春月天溫只加佛手甘草欵冬花各三分若痰嗽久病肺中伏火者去人參防痰嗽增益耳然調和隂陽血氣之際甘溫為必用之藥脈洪大兼見熱證少加黃芩黃連生地黃甘草脈緩顯沉困怠惰無力者濕勝也加蒼术澤瀉人參白茯苓五味子脈澀氣滯澀者加當歸身木香天門冬青陳皮覺寒者加桂枝黃耆不是病雖見熱證須加寒熱藥不宜多以從權頭痛有疼沉重懶倦者乃太隂痰厥頭痛加半夏半錢生薑三二分若更煩亂如腹中或周身有刺痛皆血澀不足加當歸身脅下急或痛甚俱加柴胡甘草人參腹中氣上逆者衝脈逆也加黃蘖三分黃連二分以瀉之多唾或唾白沫胃口上停寒也加益智仁如少氣不足以息服正藥二三服猶氣短促此膈上及皮表間有寒所遏當引陽氣上升則愈多加羌活獨活升麻柴胡藳本次之黃耆倍之捫之而肌熱表證也只服正藥一二服得微汗則已躁熱作蒸蒸而熱者腎間伏火上騰也加黃蘖地黃各三分腳膝痿軟行步乏力或痛乃腎肝伏熱少加黃蘖空心服如不愈更加漢防己半錢則愈使腳膝氣力湧出矣脈緩有痰而痞加半夏黃連脈弦四肢滿閉便難而心下痞加黃連柴胡甘草大便祕燥心下痞加黃連桃仁少加大黃當歸身心下痞夯悶者加白芍藥黃連心下痞腹脹加五味子白芍藥縮砂仁如天寒少加乾薑或用桂心下痞覺中寒加附子黃連心下痞加黃連生薑橘皮冬月黃連木香藿香葉能食而心下痞加黃連半錢枳實三分胸中氣滯加去白青皮益痛含腫脈洪大靣赤者加黃芩桔梗甘草耳鳴目黃頰腫頭肩臑肘臂外後亷痛靣赤脈洪大者以羌活防風甘草藳本以通其經血加黃芩黃連消其腫人參黃耆益元氣而瀉火邪如脈緊靣白善嚏或靣色惡者皆寒也亦羌等四味中加之當瀉足太陽也不用寒藥小便遺失肺金也宜安臥養氣以黃耆人參湯之類補之不愈是有熱也加黃蘖生地黃切藥勞役臥而多驚小便淋溲者邪在少陽厥隂亦宜太陽經所加之藥更加柴胡半錢如淋加澤瀉半錢此下焦風寒合病也腎肝之病同一治法俱在下焦非風藥行經則不可乃受客邪之濕熱也宜升舉發散以除之頭痛加蔓荆子半分痛甚加川芎二分頂腦痛加藳本三分若苦頭痛加細辛二分諸頭痛并用此四味足矣臍下痛者加熟地黃三分不已者大寒也其寒從轉變中來加肉桂三分遍閲內經少腹痛者皆寒非傷寒厥隂之證也仲景以抵當湯丸主乃血結下焦膀胱身有疼痛及身重者濕也以五苓散主之如風濕相搏一身盡痛加羌活防風各半錢升麻柴胡各半錢藳本羌活蒼术各一錢所以然者為風藥也能勝濕故另作一服與之通氣防風湯出拔萃方治肩背痛不可廽顧者此手太陽氣欎而不行以風藥散之脊痛項強腰似折項似拔者此足太陽經不行以此藥主之羌活獨活各一錢藳本防風甘草各一錢川芎蔓荆子各二錢右㕮咀都作一服水三盞煎至一盞去楂溫服空心如身重腰沉沉然經中有寒濕也更加酒洗漢防己半錢輕者附子重者川烏頭腹中痛不惡寒加黃芩芍藥腹中痛惡寒而脈弦者小建中湯如脈沉細者理中湯之類主之腹痛在寒涼時加半夏益智草豆蔲之類胃脘當心而痛氣欲絶者胃虛之極也俗言心以草豆蔲丸主之方見本門脾胃俱虛類白术附子湯出拔萃方治脾胃之證始則熱終則寒中隂盛生內寒厥氣上逆寒氣積於胸中是腎水反來侮土此謂所勝者妄走行也作中滿腹脹作涎作清涕或多溺足下痛不能任身履地骨乏無力喜睡兩丸多冷時作隂隂而痛或妄鬼狀夢亡人腰背胛眼脊背痛而不渴不瀉不渴不瀉則溫氣去寒獨留寒獨留則血凝沍血凝沍則脈不通故其脈盛大以澀曰寒中當以此藥主之茯苓澤瀉各二兩豬苓去皮半兩肉桂四錢右件銼如麻豆大每服五錢水三盞生薑三片同煎至一盞去滓食前溫服之量病人虛實加減多少補中益氣湯內外傷辨云飲食勞倦所傷必氣髙身熱煩喘短氣鼻息不調嗜臥困倦少言皆熱傷元氣耗故也宜溫甘之劑以補元氣瀉火也其初肌膚間必大熱燥悶心煩而渴久後則不渴頭痛大作四肢疼痛表虛不任風寒目不欲開慎不可以寒涼藥與之內經云勞者溫之損者益之蓋以溫藥以補元氣瀉心火也其內熱皆由心火乘於皮膚之位榖氣不能上升輸於心肺滋養上焦故爾屬少陽宜用此方黃耆半錢或病勞復熱甚者一錢人參去蘆三錢甘草半錢已上三味除燥熱意解肌之聖藥也紅花一分白芍藥三分秋冬之月末之只用白术三分代之葛根半錢如渴用之渴甚以意旋加不渴去之當歸二分酒洗焙乾以和血脈橘皮不去白二分或三分以導滯氣又至能益元氣得甘藥乃可若獨用瀉脾升麻二分或三分引胃氣上升而復其令便是春令柴胡六分或三分引清氣行少陽之氣上升黃柏酒洗去皮一分或二分但言分也一錢則十分也黃芩二分或三分如覺胸中熱用之却除黃柏生甘草梢三分如覺胸中熱用之不熱却除之右㕮咀作一服水二大盞量氣弱氣盛加減水盞大小去滓食逺稍熱服傷重者不二服若病日久立減法於後腹中痛加白芍藥半分甘草三分惡寒疼痛加去皮中桂一分或二分桂心是也惡熱寒而痛者於己加白芍藥甘草二味中更加生黃芩一分或二分治時藥也如天涼時惡熱而痛於己加白芍藥甘草黃芩中更少加桂一分如腹痛在天氣寒涼時則去芍藥以其味酸而寒故也别加熱藥用之天氣寒涼時復加益智仁二分或三分或作半夏半錢生薑三片忌用芍藥頭痛加蔓荆子二分痛甚加芎二分頂痛腦痛更加藳本根三分或半錢若頭痛更加細辛二分諸般頭痛者併用此四味足矣若頭上有熱則此不能治别有青空膏治之臍中痛者加真熟地黃半錢其痛乃止如不止則大寒也其寒從變中來更加肉桂去皮三分或二分胸中氣滯加蓮花青皮一分壅滯者去之氣促及少氣者去之身間痛疼者濕若覺身重者溫加去桂五苓散一分風濕相搏一身盡疼加羌活半錢防風半錢升麻一錢柴胡半錢藳本根半錢蒼术勿用五苓止服元藥也大便祕澀加當歸一錢閉塞不大便煎正藥或先用調元明粉半錢一錢久病咳嗽去人參冬月加不去節麻黃半錢如春寒者亦酌量加之春月天溫加甘草三分欵冬花三分勿加麻黃若初病之人痰嗽不去人參久病肺中伏火者去人參夏月得病加五味子去子七八箇去心麥門冬二分或一分如舌上白滑胎者是胸中有寒勿用之夏月更加人參二分五味子麥門冬等分病人能食心下痞加黃連一分如不能食心下痞勿加黃連依方服脅下痛或脅下縮急加柴胡三分甚加半錢已上治熱中始用諸甘藥若傳至寒中腹脹咽膈不通胃脘當心而痛若前用甘溫之類則誤矣升陽順氣湯濟生拔萃方治飲食不節勞役所傷腹滿悶短氣遇春口淡無味遇夏雖熱猶惡寒飢常如飽不喜冷物升麻一錢柴胡一錢黃耆一兩半夏湯浸三錢人參三錢陳皮一錢甘草半錢草豆蔲二錢神麯炒一錢五分當歸身一錢黃柏半錢右㕮咀每服三錢水二大盞薑五片煎至一盞去滓空心溫服寬中進食丸醫方大成滋榮氣喜飲食草豆蔲五錢縮砂仁二錢半夏七錢大麥蘖麵炒五錢半枳實麩炒去穰四錢神麯炒五錢半甘草炙一錢乾生薑二錢陳皮三錢半木香一分白术三錢白茯苓去皮三錢豬苓去黑皮三錢半澤瀉二錢半人參二錢半青皮二錢半檳榔一方無檳榔右為末湯煮蒸餅為丸如桐子大每服三十丸米飲湯下空心服一方用檳榔二錢半和中丸一名平胃丸病久虛弱厭不能下食而臟腑或祕或溏此胃氣虛弱也常服則和中理氣消痰去濕厚腸胃進飲食出濟生拔萃方厚朴薑汁一兩白术一兩二錢半夏洗七次一兩陳皮去白八錢檳榔四錢五分枳實麩炒三錢半木香二錢半炙甘草二錢半右為末生薑自然汁浸蒸餅為丸如梧桐子大每服三十丸至五十丸溫水空心服一方用生薑湯下橘皮枳术丸出衛生寶鑑治老幼元氣虛弱飲食不消或臟腑不調心下痞悶不快橘皮一兩去陳皮枳實麩炒去穰一兩白术二兩右為末荷葉裹燒飯丸梧桐子大每服五十丸溫水下食逺服內傷用藥所謂人強胃氣益厚雖猛食多食重食而不復致傷矣荷葉中央空虛象震卦體震動也人之足少陽甲膽也甲膽風也生化萬物之根蒂手少陽三焦人之元氣也二經同法故飲食入胃營氣上行便為少陽元氣生發也胃氣榖氣元氣甲膽上升上氣一而異名即是胃氣上升荷葉色形味乃空清象風木也食藥感此氣之化胃氣何由不升引藥如此誠合乎道觀者味之麴蘖枳术丸出衛生寶鑑治為人所勉勸強食所致心腹滿悶不快神麴炒一兩麥蘖麴炒一兩枳實麩炒去穰一兩白术二兩右為細末荷葉裹燒飯丸如梧桐子大每服五十丸溫水食逺下木香化滯湯出衛生寶鑑治一切酒麵結於中脘腹皮底微痛心下痞滿不思飲食食之不散常常痞悶柴胡四錢木香三錢橘皮三錢甘草炙半兩半夏一兩當歸梢二錢紅花半錢草豆蔲五分枳實麩炒去穰一錢右為散每服五錢水二大盞薑五片煎至一盞去滓稍熱服食逺服忌酒濕麵半夏枳术丸出衛生寶鑑治因飲食內傷心腹痞滿嘔噦不止半夏洗七次焙一兩乾生薑一兩枳實麩炒一兩炒微黃白术二兩右為細末荷葉裹燒飯丸如菉豆大每服五十丸溫水下如以湯浸蒸餅為丸亦可如食傷寒熱不調每服加上二黃丸十丸白湯下一方加澤瀉一兩為小便淋一方無乾薑丁香爛飯丸出衛生寶鑑又治飲食所傷卒心胃痛甚效丁香一錢丁香皮三錢甘草三錢甘松三錢去土稱縮砂仁三錢益智仁三錢三稜炮一錢莪术炮一錢香附子半兩木香一錢右為細末湯浸蒸餅丸如菉豆大每服三十丸白湯送下細嚼亦可不拘時候草豆蔲丸出濟生拔萃方秋冬傷寒涼物胃脘當心而痛上肢兩脅咽膈不通草豆蔲仁麵裹煨去皮一兩神麯炒黃半兩白术一兩黃芩去皮半兩枳實麩炒黃二兩陳皮二錢麥蘖麵炒黃半兩半夏洗七次日乾半兩青皮二錢乾生薑二錢炒鹽半錢右為末湯浸蒸餅丸如菉豆大一倍每服五十丸白湯下量所傷多少加減服之如冬月别作一藥不用黃芩嵗火不及又傷冷物加以溫劑是其治也有熱物傷者從權以寒藥治之隨時處方不可不知三黃枳术丸出濟生拔萃方治傷肉食麵辛辣味厚之物填塞悶亂不快黃芩二兩黃連酒洗一兩大黃紙裹煨一兩神麯炒一兩枳實麩炒半兩白术一兩陳皮一兩右為末湯浸蒸餅丸如菉豆大一倍每服五十丸白湯下量所傷加減服除濕益氣丸出濟生拔萃方治傷酒麯心腹滿悶肢體沉重枳實麩炒黃一兩白术一兩蘿蔔子炒熟涼去穢氣半兩神麯炒黃一兩黃芩生用一兩紅花三分右為末荷葉裹燒飯丸如梧桐子每服五十丸白湯下量所傷多少加減服之上二黃丸出衛生寶鑑治傷熱食痞悶兀兀欲吐煩亂不安黃芩二兩黃連去鬚酒洗一兩升麻三錢柴胡三錢甘草二錢枳實半兩麩炒去穰右為末湯浸蒸餅丸如菉豆大每服五七十丸白湯下量所傷服之一方無枳實枳實導滯丸出我效力治傷濕酒熱物不得施化而作痞悶煩亂不安茯苓去皮黃芩去腐白术黃連揀淨各三分澤瀉二分枳實麩炒去穰炒麴各五錢大黃一兩右為末湯浸蒸餅丸如梧桐子大每服五十丸至七十丸溫水下食逺量所傷加減服更衣止後服枳實梔子大黃湯續易簡方治大病産後傷食勞役枳實一箇麩炒去穰梔子三枚半肥者豉一兩二分半線裹右清漿水二盞煎退八分却入枳實梔子煮取八分下滯再煮五六沸去滓溫服覆令汗出者若有宿食內大黃如簿棊子五六箇同煎食膏粱之物過多煩悶亂者亦宜服白术湯治傷豆粉濕麵油膩之物白术一兩半夏洗七次日乾一兩陳皮去白七錢神麯炒黃一兩黃芩半兩白礬枯二錢右為末湯浸蒸餅丸菉豆大一倍每服五十丸白湯下量傷加減素食多用乾薑故加黃芩以瀉之木香見脘丸一名巴豆三稜丸治傷生冷硬物心腹滿悶疼痛巴豆霜半錢荆三稜一兩煨神麯炒一兩石三稜去皮煨一兩木香二錢香附子炒半兩升麻三錢草豆蔲仁麵裹煨半兩柴胡二錢右為末湯浸蒸餅丸菉豆大一倍每服一二十丸白湯下量傷加減服之一方無草豆蔻仁三稜消積丸治傷生冷硬物不能消化腹滿悶不快荆三稜炮莪术炮各七錢青皮陳皮各五錢丁皮益智仁各三錢炒麯七錢茴香炒半兩巴豆和皮米炒黑焦去米五錢右為末醋打麵糊丸如桐子大每服十丸至二十丸溫生薑湯下食前服量虛實加減服如通利止後服一方去麯加川楝子名消積滯焦香丸神應丸治一切冷水及鐘乳酥水腹痛腸鳴米榖不化巴豆杏仁乾薑百草霜各半兩丁香二錢木香二錢黃蠟一兩右先將黃蠟用好醋煮去滓後巴豆杏仁同炒黑煙盡研如泥將黃蠟在上火春夏入油半兩秋冬入小油八錢鎔開入在杏仁巴豆泥內同攪旋下丁香木香等藥末研勻搓作錠子油紙裹旋丸用每服三五十丸溫米飲下食前日三服如脈緩體重自利乃溫氣勝也却以五苓散平胃散加炒麵相合而服之名曰對金飲子益胃散一名溫脾湯出濟生拔萃方治服寒藥過多或脾胃虛弱胃脘痛白豆蔲仁三錢澤瀉三錢黃耆七錢乾薑三錢縮砂仁甘草各二錢薑黃三錢陳皮七錢智仁六錢厚朴二錢人參二錢右為細末每服三錢水一盞煎至七分溫服食前一方用溫酒服亦得如脈弦惡寒腹中乃中弱也以仲景小建中湯黃耆錢氏異攻散加芍藥選而用之如渴甚者加白术散葛根倍之如胃脘當心而痛氣欲絶者胃脘中虛之至極俗呼為心痛與草豆蔲丸二三十丸若痛平依胃中元氣虛甚則將理二三日不得食熱常食溫爛細嚼細咽痛必不作一二日自知矣若食熱調粥必幾死言畢不得食食後不得言欲食時口鼻不得當風食罷亦然忌生冷硬物果木之類及麩粉麯食須忌長逺免致後患一名益智調中湯除濕方出濟生拔萃方治傷馬乳并牛羊酪一切冷物半夏洗七次三錢車前子炒半兩澤瀉半兩甘草炙二錢神麯炒一兩生薑三錢紅花二錢茯苓七錢右為細末每服三錢白湯調下食前靈砂丹出百一選方治飲所傷一切積滯或痢赤白瘥者亦甘草湯下白薑湯下赤白薑甘草湯下酒食所傷又暴瀉白湯下並食後臨臥時服之為妙感應丸辰砂細研硇砂研細各二錢巴豆去皮壳完全者四十箇黃蠟半兩右先將蠟於銀器內熬熔次投巴豆在內泄令黑漉出不用只將泄入前二味為鋌子要時旋丸大人服菉豆大七丸小兒量嵗數加減老人産婦皆可服最治酒食今人施痢藥者以黃丹代辰砂亦驗本事方治瀉痢用巴豆數不同其説病證甚詳木香人參生薑枳术丸出濟生拔萃方開胃進食破滯氣消寒飲木香三錢人參三錢半乾生薑二錢半枳實一兩炒白术一兩半橘皮四錢右為細末荷葉燒飯丸如桐子大每服三五十丸溫水送下食前一方加炒麯一兩名木香枳术丸交秦丸出試效方升陽氣瀉隂火調營氣進飲食助精神寬腹中除怠惰嗜臥四肢不收沉困懶倦厚朴去皮銼炒三錢秋冬加七錢知母四錢一半炒一半酒炒此春夏所宜秋冬去之柴胡去苖一錢半人參去蘆一錢肉桂去皮一錢黃連去鬚六錢秋冬減一錢半酒煮苦楝三錢白茯苓三錢皂角水洗煨去皮絃子六錢紫苑去苖六錢縮砂仁三錢川椒炒去汗并閉目去子一錢乾薑炮製三分川烏頭炮去臍皮四錢白术一錢半吳茱茰湯洗七次五錢巴豆霜五分右除巴豆霜另入外同為極細末煉蜜為丸如桐子大每服三五十丸溫水下虛實加減一方無紫苑導氣除濕湯出濟生拔萃方治飲勞倦而小便閉塞不通乃血澀致不通而竅澀也知母三錢酒洗銼黃蘖四錢酒洗銼滑石二錢澤瀉三錢茯苓三錢右為細末每服半兩水三盞煎至一盞去滓稍熱服空心如急不拘時大枳殼丸出濟生拔萃方治一切酒食所傷胸膈痞悶脅肋腹滿心腹疼痛飲食不消痰逆嘔吐噫醋吞酸飲食遲化並宜服之枳殼麩炒茯苓去皮白术厚朴湯洗人參木香青皮陳皮二味去欀京三稜煨熟檳榔廣茂煨熟神麯炒黃大黃各二兩麥蘖微炒已上各乙兩乾生薑半兩牽牛淨微炒右為細末生薑汁麵糊為丸如桐子大每服一百丸生薑湯下食後木香檳榔丸出濟生拔萃方治食傷太隂木香檳榔青皮陳皮廣茂燒黃連枳殼麩炒已上各一兩黃蘖大黃各三兩香附子炒牽牛各四兩婦人加當歸一兩右為細末水丸如桐子大每服三十丸食後生薑湯下人參開胃湯出直指方助胃進食人參白术霍香橘紅縮砂仁木香丁香麥蘖炒神麯炒甘草炙茯苓蓮子肉厚朴製半夏麯各等分右銼散每服三散薑四片煎服枳术丸出衛生寶鑑治老弱虛弱食不消臟腑而火仲景本湯易老改丸及治氣下不降胸膈滿悶消食強胃枳實七錢半麩炒黃白术一兩右為細末荷葉燒飯為丸或薑浸蒸餅丸亦得如桐子大每服二十丸三十丸米飲送下食後服亦方白湯下五十丸祕傳降氣湯出簡易方治飲食過度致傷脾胃酒色無節耗腎水水土交攻陽隂關膈遂使氣不升降上熱下虛上熱則頭目昏眩咽喉乾燥痰塞嘔逆胸膈不快飲食無味下虛則臍冷痛大便閉塞裏急後重腰腳無力若治以涼則脾氣怯弱腸鳴不利治溫熱上焦壅熱口舌生瘡腳氣上攻久痢不瘥並宜先進此藥然後却以所主藥治之其效速桑白皮二兩銼炒枳殼湯浸去穰炒甘草炒陳皮炒各一兩五加皮酒浸半日炒黃黃花根皮是骨碎補火燎去毛炒銼地骨皮炒黃桔梗炒黃訶子炮取肉炒草果仁炒黃半夏為末薑汁作餅再碎炒各半兩右㕮咀以碗盛飯甑上蒸一伏時傾攤令冷收之每服三錢紫蘇三葉薑三片水一盞煎至七分一方無半夏食後溫服痰嗽加半夏麯心肺虛加人參茯苓上膈熱加黃芩下部虛加炮附子少許多用生薑煎婦人血虛加當歸煎常服調順榮衛通利三焦開膈化痰和五臟檳榔木香人參各二錢橘皮五錢炙甘草一錢右為細末湯浸蒸餅為丸如梧桐子大溫水下三十丸無時強胃湯出濟生拔萃方治因飯食勞倦所傷腹脅滿悶短氣遇春口淡無味遇夏雖熱而惡寒常如飽不喜食冷物黃耆一兩半夏三錢草豆蔲二錢黃蘖半錢麯一錢半陳皮一錢生薑一錢半升麻一錢柴胡一錢甘草半錢當歸身一錢右㕮咀每服三錢水二大盞煎至一盞去滓溫服食前桂香丸治大人小兒過食雜瓜果腹脹氣急肉桂一兩麝香一錢右為末飯為丸如菉豆大大人十五丸小兒七丸不以時飯湯下三稜丸治同前三稜莪术青皮陳皮右等分為末麵糊和丸如梧桐子大每服三十丸薑湯下不拘時小橘皮煎丸出醫方集成消食化氣常宜服之三稜莪术並煨青皮去白陳皮去白神麯炒麥蘖炒各等分右為末陳米粉煮糊為丸如梧桐子大每服五十丸米飲下治飽食便臥得榖勞病四肢煩重默默如臥食畢輒甚方出肘後方右用大麥一升椒一兩並熬乾薑三兩搗末服方寸匕日三四服寬中理氣丸出德生堂治脾胃不和寬中理氣可宜常服枳實檳榔青木香丁皮神麯蒼术香附子葛根各一斤加蓽澄茄半斤右為細末水糊為丸每服三十丸加至五十丸酒水生薑湯任下不拘時三香神术丸出德生堂能溫中快膈化積順氣中酒吐酒逆唾酸氣壅食噎飲食遲化胸膈痞悶腰脅刺痛胃脘停痰飲食無味婦人血氣臍腹疼凡此人吃飯後大宜服之香附子蒼术厚朴藿香耳良薑枳實枳殼青皮陳皮廣茂三稜檳榔神麯半夏麯益智仁瓜三稜石三稜麯蘖雷丸乾葛黃連木香各一兩右為細末蘿蔔和水打麵糊丸如梧桐子大每服五十丸酒水任意下百鍾丸出德生堂治酒食吐酒嘔逆惡心吐酸水壅盛痰塞氣不暢快但酒所傷者宜服之百鍾可以再進乾葛黃連枳實各四兩青皮陳皮神麯麥蘖雷丸三稜莪术益智仁檳榔各二兩牽牛末木香各二兩杏仁煮去皮尖半斤蘿蔔子半斤杏仁另加葛花二兩右為細末酒糊為丸如桐子大每服五七十丸酒水任意下藿香利膈丸出德生堂寬腸快膈和胃利痰進食化宿酒表解寒暑功極效當歸臘茶散治榮衛氣虛風邪冷氣進襲臟腑之內或食生冷或啖炙煿或飲食過度積熱腸間致使腸胃虛弱糟粕不聚大便不利解血臍腹疼痛裏急後重久患酒毒便血諸疾一切大便下血證並皆治之細芽茶半斤川百藥煎五箇燒存性右為細末每服二錢用米飲湯調下或烏梅湯亦可麥蘖散療飽食訖便臥得便令人煩重默默欲臥大麥蘖一升炒乾薑二兩右為末方寸七日三良丁香湯出十便良方消酒下痰通中健胃丁香半兩胡椒一錢縮砂仁四兩乾薑一兩甘草二兩鹽二兩右同為細末每服一錢不拘時沸湯點下治飲食過多飽出本草以蘆根生嚼之佳和中丸出試效方補胃進食乾薑二錢乾木瓜三錢炙甘草二錢陳皮四錢人參二錢白术三錢益智仁二錢右件為末用湯炊餅為丸如梧子大每服三五十丸溫水食前下木香檳榔丸出試效方消食破滯氣木香檳榔各三錢青皮五錢陳皮麥蘖麯枳實各七錢白术厚朴五錢右件為末湯浸蒸餅為丸如梧桐子大每服五七十丸溫水食後下扶胃丸出蘭室祕藏方開胃進食白术二錢茯苓一錢橘皮二錢炒麯四錢大麥蘖四錢炒炙甘草肉桂半錢多但因酒食所傷脾胃不和常服之厚朴九兩枳實三兩當歸一兩人參一兩藿香一兩檳榔一兩半木香甘草各兩半陳皮二兩右為極細末水糊為丸如桐子大每服五十丸酒水送下治食魚膾及生肉住胸膈中不消化吐之又不出不可留多使成癥方出肘後方右用朴硝如半雞子一枚大黃一兩凡二物㕮咀以酒二升煮取一升去滓盡服之立消若朴硝芒硝代之皆可用至靈散出肘後方療食飽煩悶但欲臥而腹痛用麯熬令香黃為末服方寸匕大麥蘖亦佳木香調中丸出德生堂治因飲食不調致傷脾胃心腹脹滿臟腑泄瀉米榖不消腹中雷鳴不思飲食或不痢膿血或大便赤水木香陳皮去白青皮去白肉豆蔲麵褁煨檳榔三稜焙訶子草豆蔲各一兩右為末麵糊丸如梧桐子大每服六十丸食前米飲下清暑益氣湯治長夏濕熱胃因長夏五六月濕熱蒸炊人多困倦胸滿短氣支節疼痛氣髙而喘煩熱大便或泄而黃或如白泔或渴或不渴膨悶不欲食或氣短不能言小便多而黃宜以除濕散熱之劑主之黃耆一錢半汗少減半錢人參半錢甘草炙三分白术半錢蒼术米泔浸去皮一錢陳皮半錢黃柏酒浸去皮少減半錢神麯炒黃半錢升麻一錢葛根三分澤瀉半錢陳皮九錢麥門去心三分青皮去白一分右㕮咀作一服水二大盞煎至一盞去滓溫服食逺服此病因飲食失節勞倦所傷損而脾胃得也藿香一錢半夏二錢紅豆一錢乾生薑半錢訶子皮二錢烏梅肉二錢乾薑一錢右為極細末荷葉裹燒飯為丸如桐子大每服三五十丸溫水送下黃耆湯出蘭室祕藏方補胃除濕和中滋養元氣黃耆一兩當歸二錢酒洗人參半兩澤瀉半兩藿香葉一錢橘皮木香一錢氣暢去之右㕮咀每服三五錢水二大盞煎一半欲汗加生薑煎食逺熱服之又方出蘭室祕藏方上攻頭痛攻身胸背發熱用黃耆當歸湯當歸身一錢酒洗黃耆半兩右㕮咀水二大盞煎法如常黑地黃丸出濟生拔萃方治男子婦人靣色無血食少嗜臥肢體困倦蒼术一斤熟乾地黃半斤乾薑炮夏月五錢冬月一兩春秋七錢右為末水煎麵糊丸如桐子大每服五十丸溫水下食逺溫中益氣治驗出衛生寶鑑中書左丞相史公年六十有七至元丁卯九月間因內傷自利數行覺肢體沉嗜臥懶語不思飲食舌不知味腹中痛頭亦痛惡心醫以通聖散大作劑料飲之覆以厚朴夜遂大汗出前證未除反劇凡易數醫四月餘不愈余以應召至燕命治之候其脈得沉細而微弦不欲食則嘔逆中氣不調滯於升降口舌乾燥頭目昏眩肢體困倦足胻冷臥不欲起丞相素不飲酒肢體本瘦又因內傷自利復發汗是重竭津液本愈虛不能滋榮周身百脈故使然也非甘辛大溫之劑則不能溫養其氣經云脾欲緩急食甘以緩之又脾不足者以甘補之以黃耆人參之甘補脾緩中故以為君形不足者溫之以氣以當歸辛溫和血潤燥木香辛溫升降滯氣生薑益智仁草豆蔲仁辛甘大熱以蕩中寒理其正氣白术炙甘草橘皮甘苦溫乃厚腸胃麥蘖麵寬腸胃和中神麯辛熱導氣消食故以為佐右件㕮咀一兩水煎成服之嘔吐止飲食進逾三日前證悉去左右前證雖去九日不大便何以治之曰丞相年髙氣弱既利且汗脾胃不足陽氣虧損津液不潤也豈敢以寒涼有毒之劑下之仲景云大發汗後絞小便數大便堅不可用承氣湯可用蜜煎導之須臾去燥屎二十餘塊遂覺腹中空快上下氣調又以前藥服之喜飲食但傷則以前橘皮枳术丸消導之餘月方得平復丞相曰病既去矣當服和藥預防其復來余謂不然慎言語節飲食不可服藥用藥如用刑民有罪則刑之身有疾則藥之無罪妄刑是謂虐民無疾妄藥是反傷正氣軍志有之允當則歸服而舍之可也丞相恱而然之參术調中湯出衛生寶鑑治內傷自利臍腹痛肢體困倦不喜飲食則嘔嗜臥懶語言足胻冷頭目昏悶黃耆五錢參五錢當歸身厚朴木香益智仁草豆蔲仁白术炙甘草橘皮麥蘖麵炒麯已上各三錢右件銼如麻豆大每服一兩水二盞半生薑三片煎至一盞去滓食前溫服腸滿四肢倦行立難食以嘔多胃傷減飲食或渴者是也宜用後方出華陀中藏經方大黃一兩濕紙十重包褁煨令香熟切作片子檳榔一枚木香一分右為末生蜜丸桐子大薑湯下食後三十丸日二服末減加之效即勿再服附方桂半兩不焙檳榔一箇黑牽牛四兩生取末二兩餘不用右為末蜜酒調二錢以利為度須問湯出楊氏家藏方治中酒痰逆白豆蔲仁縮砂仁各四兩丁香二兩甘草炙三兩白鹽三兩炒右除丁香外同炒熟以一磁合子入藥一半鋪紙下丁香又以一半蓋頭罨一宿取出為細末每服一錢沸湯點服沖和湯出楊氏家藏方醒酒快膈消痰助胃生薑四錢切焙草果子去皮七錢半甘草七錢半炙半夏麯二錢半炙白鹽一兩炒右件為細末入鹽和勻每服二錢沸湯點服青金湯出楊氏家藏方治酒食所傷及嘔逆惡心頭目昏運神志不爽縮砂仁一兩薄荷葉去土二兩白蔲仁一兩甘草一錢微炒右件為細末每服一錢沸湯點服生胃丸朱集驗方治酒食所傷胸膈不快不思飲食良薑白薑各四兩并油炒丁香胡椒右為細末麵糊丸如梧桐子大每服百十丸米飲陳皮湯下妙應丸出楊氏家藏方治脾胃虛冷飲食不化心腹刺痛噫氣吞酸兩脅膨脹胸膈痞悶四肢倦息不美飲食蓽撥木香破故紙炒三味各一兩附子二枚重七錢者每一枚剜去心入硇砂末一錢附子末塞口外以麵裹煨令麵焦黃取不用右件同為細末麵糊為丸如菉豆大每服五丸至七丸木香湯下不拘時候快膈丸出十便良方治飲酒過多胸膈不快嘔吐涎沫生薑二斤切片米泔浸三日䁠冷半乾丁香二兩銼鹽半斤甘草六兩如大豆切右以淨銚一枚先入鹽炒熟次下薑候薑稍乾脆次下草炒色赤次下丁香皮同炒不得焦紫色為度乘熱入新瓷瓶密封不得透氣三日後開每次沸湯點一錢一名紫薑湯是漫火炒氣味為妙解醒湯出十便良方治飲酒過度脾胃不健不思飲食胡椒桂心丁香各一分檀香二銖藿香半兩見火甘草三兩炙白鹽半兩炒右為末每取一錢沸湯點服不拘時普濟方卷二十四
