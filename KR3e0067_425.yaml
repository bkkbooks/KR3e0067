body:
  text: 普濟方卷四百二十五明周王朱橚撰本草藥品畏惡玉石上部玉泉畏欵冬花玉屑惡鹿角丹砂惡磁石畏鹹水曾青畏兔絲子石膽水英為使畏牡茵桂芫花辛夷白薇茵音郡鍾乳蛇床為使惡牡丹玄石牡蒙畏紫石英蘘草雲母澤瀉為使畏鮀甲及流水鮀音駝朴硝畏麥句薑硝石火為使惡苦參苦菜畏女苑芒硝石韋為使惡麥句薑白礬甘草為使滑石石韋為使惡曾青紫石英長石為使畏扁青附子不欲鮀甲黃連麥句薑白石英惡鬼臼赤石脂惡大黃畏芫花黃石脂曾青為使惡細辛畏蜚蠊蠊音亷白石脂燕糞為使惡松脂畏黃芩太一餘糧杜仲為使畏鐡落菖蒲貝母玉石中部水銀畏磁石殷孽惡防己畏本孔公孽木蘭為使惡細辛陽起石桑螵蛸為使惡澤瀉菌桂雷丸蛇蛻皮畏兔絲子􅌲音郡蛻音稅凝水石畏地榆解巴豆毒石膏雞子為使惡莽草鬼臼磁石柴胡為使畏黃石脂惡牡丹莽草殺鐵毒玄石惡松脂柏子仁菌桂􅌲音郡理石滑石為使畏麻黃玉石下部青琅玕得水銀良畏雞骨殺錫毒礜石得火良棘針為使惡虎掌鬼臼鶩屎細辛畏水特生礜石得火良畏水方解石惡巴豆代赭畏天雄大鹽漏蘆為使草藥上部六芝薯蕷為使得髮良惡怕山畏扁青茵陳天門冬垣衣地黃為使畏曾青麥門冬地黃車前為使惡欵冬苦瓠畏苦參青葙术防風地榆為使女葳葳㽔畏鹵鹹乾地黃得麥門冬清酒良惡貝母畏蕪荑菖蒲秦艽秦皮為使惡地膽麻黃艽音膠逺志得茯苓冬葵子龍骨良殺天雄附子毒畏真珠蜚蠊藜蘆文蛤澤瀉畏海蛤文蛤薯蕷紫芝為使惡甘遂菊花水枸杞根桑根白皮為使井草木乾漆苦參為使惡逺志及甘遂大戟芫花海藻人參茯苓為使惡疏及藜蘆音摉疏音疏石斛陸英為使惡凝水石巴豆畏白殭蠶雷丸牛膝惡熒火鱉甲陸英畏白前細辛曾青棗根為使惡狼毒山茱萸黃耆畏硝石滑石及藜蘆獨活蠡實為使蠡音禮柴胡半夏為使惡皂莢畏女苑藜蘆菴音淹䕡音閭子荆子薏苡仁為使薏音意苡音以菥音錫蓂音覔子得荆子細辛良惡乾薑苦參龍膽貫衆為使惡防葵地黃兔絲子冝圓不宜煮得酒良薯蕷松脂為使惡雚菌雚音桓菌音郡巴戟覆盆子為使惡朝生雷丸丹參蒺藜子烏頭為使防風惡乾薑藜蘆白欵芫花殺附子毒絡石杜仲牡丹為使惡鐵落畏菖蒲貝母黃連黃芩龍骨理石為使惡菊花芫花玄參白鮮畏欵冬勝烏頭解巴豆毒沙參惡防己及藜蘆丹參畏醎水及藜蘆天名精垣衣為使決明子惡實為使惡大麻子芎藭白芷為使續斷地黃為使惡雷丸黃耆惡鱉甲杜若得辛夷細辛良惡柴胡前胡蛇床子惡牡丹巴豆貝母茜根畏鼠婦飛亷得鳥頭良惡麻黃薇銜得秦艽良五味子蓯容為使惡葳㽔勝烏頭草藥中部當歸惡䕡茹畏菖蒲海藻牡蒙藺音閭茹音如秦艽音膠菖蒲為使黃芩山茱黃龍骨為使惡䓤實畏丹砂牡丹藜蘆芍藥須圓為使惡石斛芒硝石硝鱉甲小薊及藜蘆乾薑秦椒為使惡黃芩黃連天鼠糞殺半夏莨菪毒莨音浪菪音蕩藁本惡䕡茹麻黃厚朴為使惡辛夷石韋葛根殺野葛巴豆百藥毒前胡半夏為使惡皂莢畏藜蘆貝母厚朴白薇為使惡桃花畏秦艽礬石莽草及烏頭􅌝音括􅌣音婁枸杞為使惡乾薑畏牛膝乾漆及烏頭玄參惡黃耆乾薑大棗山茱萸及藜蘆苦參玄參為使惡貝母漏蘆兔絲子及藜蘆石龍芮大戟為使畏蛇蛻吳茱萸石韋滑石杏仁為使得菖蒲良狗脊萆薢為使惡敗醬蠣薢薏苡為使畏葵根大黃柴胡牡前胡蘧音劬麥蘘草牡丹為使惡桑螵蛸白芷當歸為使惡旋復花紫苑欵冬為使惡天雄蘧麥雷丸逺志畏茵陳白鮮皮惡桑螵蛸桔梗茯苓萆薢白薇惡黃耆乾薑乾漆大棗山茱萸紫參畏辛夷仙靈脾薯蕷為使牡丹畏兔絲子欵冬花杏仁為使得紫苑良惡皂莢硝石玄參畏貝母辛夷麻黃黃芩黃連黃耆青葙漢防己殷孽為使惡細辛畏萆薢殺雄黃毒女苑畏鹵醎澤蘭防己為使地榆得髮良惡麥門冬海藻反甘草草藥下部大黃黃芩為使桔梗秦皮為使畏白及龍膽龍眼甘遂瓜蒂為使惡逺志反甘草葶藶榆皮為使得酒良惡殭蠶石龍芮芫花決明為使反甘草澤漆小豆為使惡薯蕷大戟反甘草鈎吻半夏為使惡黃芩藜蘆黃連為使畏細辛芍藥玄參惡大黃天雄逺志為使惡腐婢烏頭烏喙許穢切莽草為使反半夏􅌝􅌣貝母白欵白及惡藜蘆􅌝音秳附子地膽為使惡蜈蚣畏防風甘草黃連人參烏韭大豆貫衆雚菌為使雚音桓菌音郡半夏射干為使惡皂莢畏雄黃生薑乾薑秦皮鱉甲反烏頭射音夜虎掌蜀漆為使畏莾草蜀漆􅌝藪為使惡貫衆恆山畏玉札狼牙蕪荑為使惡棗肌地榆白斂伐赭為使反烏頭白及紫石英為使惡理石杏核仁杏仁雚菌得酒良畏雞子䕡音閭茹音如甘草為使惡麥門冬藎草畏鼠婦夏枯草土瓜為使狼毒大豆為使惡麥句薑鬼臼畏垣衣木藥上部茯苓茯神馬蘭為使惡白斂畏牡蒙地榆雄黃秦艽龜甲柏子仁牡蠣桂心爪子為使畏菊花羊踹諸石麩麵杜仲惡蛻參玄參蛻音稅乾漆半夏為使畏雞子蔓荆子惡烏頭石膏五加皮逺志為使畏蛇皮玄參黃蘗惡蛇漆辛夷芎藭為使惡石脂畏菖蒲蒲黃黃連石膏黃環酸棗惡防己槐子景天為使牡荆實防風為使惡石膏木藥中部厚朴乾薑為使惡澤瀉寒水石山茱萸蓼實為使惡桔梗防風防己吳茱萸蓼實為使惡丹參硝石畏紫英石秦皮大戟為使惡吳茱萸占斯解狼毒毒梔子解躑躅毒桑根白皮續斷桂心麻子為使秦椒惡􅌝藪防葵畏雄黃木藥下部黃環鳶尾為使惡茯苓防己石南五加皮為使巴豆芫花為使惡蘘草畏大黃黃連藜蘆殺斑蝥毒蜀椒杏仁為使畏欵冬欒華決明為使雷丸荔實厚朴為使惡葛根音授疏音疏漏蘆為使皂莢柏子仁為使惡麥門冬畏空青人參苦參獸上部龍骨得人參牛黃良畏石膏龍角畏乾