body:
  text: 普濟方卷三百二明周王朱橚撰金瘡門金刃所傷附論夫金刃所傷瘡有微甚生死所繫要在原經絡所在觀變動之形察微妙之脈昔人謂天𩕄眉角腦户臂裏跳脈髀內隂股兩乳上下心鳩尾小腸及五臟六腑腧皆不可傷此所謂原經絡所在也破腦出血戴眼直視不能語言咽中沸聲口急唾出兩手妄舉肌肉不生按之乾急或青黃汁出或瘡邊寒清肉消殠敗或前出赤血後出黑血或血出不止白汁隨出此所謂觀變動之形也診其脈虛細小者生微緩者遲者生反此謂難愈此所謂察微妙之脈也三者兼得則治藥庶幾矣夫金瘡有久不差膿汁不絶肌肉不生者其瘡內有碎骨斷筋伏血腐肉缺刃竹刺久而不出者令瘡不愈喜出清汁當破出之瘡則愈矣治金瘡者無大小冬夏及始初傷血出便以石灰厚傅裹之既止痛又速愈無石灰灰亦可用若瘡甚深未宜速合者內少滑石令瘡不時合也方治金瘡白藥黃皮黃芩赤芍藥甘草木鱉去殼當歸生地黃黃茋黃連牡丹地骨皮桑白皮各一錢半白芷馬蓼稍葉生者一錢火煆過右桐油三兩煎焦黃色少停用踈生布濾去滓再煎油稍熱入細白版松香一斤熳火煎須頻頻栁枝攪勻却又入乳香沒藥虢丹各七錢煎數沸出火頃時以少綿敷於前濾藥滓布上濾過先用瓦鉢滿盛清水八分却濾藥於鉢水中將去清水中如綳麵狀綳三二百度愈綳愈白故名白藥常以清水浸放於冷地上用物遮蓋勿令塵入五七日一換水刀斧一應金傷量傷孔大小取一塊填於傷孔中以白紙護之隨手不痛日一換五日生肉筋斷加杜仲續斷各二錢同煎收瘡口加龍骨半錢碎了煎入藥內打損只敷於油紙上貼之即愈却不須入接筋龍骨之劑治金瘡及些小出血出本草用通草煮汁釀酒飲之一方起了通草貼之血止瘡合草須以滑面貼瘡乃佳治金瘡傷折瘀血內損補筋肉消惡血出本草用質汗以酒消服之亦傅病處治金瘡出本草用枸杞根去上浮粗皮一重近白者一重色微紫極薄隂乾末傅瘡有神驗如聖散治一切金刃傷及諸般傷損中風等疾蒼术六兩米泔浸一宿雄黃五錢通明者佳白术一兩五錢川烏四兩炮裂去皮臍草烏一兩半同上製兩頭尖不用白心者炮四兩細辛二兩半去土淨蝎稍五錢微炒川芎一兩半去蘆白芷一兩半防風二兩半去蘆右碾為細末如金刃箭傷先以藥末一錢重乾貼瘡口後用溫酒調一二錢服之仍以軟帛封裹瘡口腹破腸出先剪去指甲潤油於手上將腸欵欵納入以細桑白皮縫合瘡口然後敷上藥末溫酒調服二錢不可多服一切金刃傷并打撲損中風搐倒牙關緊閉以剪股揭開口溫酒調二錢灌下即愈再休服若再發則再服沒藥散出聖惠方治金瘡及內損久不差沒藥乾薑炮裂銼蜜陀僧紅藍花子騏驎竭雄黃細研安息香當歸銼微炒各半兩墓裏石灰一兩炒令黃豬膽三枚晒乾右為末外貼一日一換內損溫酒調下一錢定痛乳香散専治金傷病證并折骨打摶傷損虎骨半兩酥炙穿山甲火炮少許乳香二錢沒藥二錢敗龜板一兩當歸鬚半兩紫金皮二兩半兩銅錢五箇無自然銅火煉醋浸骨碎補半兩右為細末好酒調下每服一錢重病沉二錢重損上者食後服損下者食前服為妙王不留行散出金匱方治身有瘡被刀斧所傷王不留行十分八月八日採蒴藋細葉十分七月七日採桑東南根白皮十分三月三日採甘草十八分川椒三分除目及閉口者炒出汗黃芩二分乾薑二分芍藥二分厚朴二分右桑根皮以上三味燒灰存性勿令灰過各别杵篩合治之為散服方寸匕小瘡即粉之大瘡但服之産後亦可服如風寒桑東根勿取之前三物皆隂乾百日用生肌止血立效方出聖惠方治金瘡辟一切風冷續筋骨石灰二升搗生地黃青蒿汁和作團焙之令赤細研芎藭艾葉熬黃狗頭灰細研地松蜜陀僧各半兩黃丹一兩騏驎竭三分細研右為細末研勻密封之每有金瘡傅之如聖散治金瘡破傷風蛇蠍螫狗咬腫癤丹瘤諸疔發背搭手腦疽膁瘡湯火牙疼杖瘡雷頭風癩乾風遍身麻木常服甚妙一切小血傷無口並皆治之川烏頭防風去蘆白芷各二兩川芎一兩二錢半草烏頭半兩細辛去苖土淨錢半蒼术二兩去皮實者右俱不見火都生用晒乾研為末傅之如金刃所傷初傷者藥到血定以帛片繫定其瘡如日久不可去瘡口痂口噙漿水淨洗揾乾貼三二次即愈如破傷初發時用藥一錢熱酒一盞不拘時調服用被蓋取汗為驗如病重每一錢半如多時汗不出再加藥一錢依前取汗或涎出為驗如或男婦洗頭感風疼痛用藥一錢溫酒調服汗出即愈太乙膏出危氏方治金瘡箭鏃不問輕重因此傅之并治癰疽癤毒白芷乳香沒藥蒼术白膠香石膏醋炒黃丹各五錢右為末用真清油四兩桐油真者亦可以黃蠟一兩先煎油栁枝攪次入白芷等四味煎少頃然後入膠香石膏丹同煎試欲成珠却入蠟同煎片時用生布濾過瓦器內藏用油單攤之損傷傅瘡口自然肉不痛速愈獺膽丸出聖惠方治金鏃去後瘡疼痛不可忍獺膽豶豬膽鯉魚膽各一枚為一處青黛􅌝􅌣根沒藥各一分當歸半兩銼微炒右為末與膽汁研和令勻入瓷合中盛收經七日後用之每用一丸如小豆大旋取任在箭瘡內疼痛立止矣木香檳榔散出儒門事親治刀箭所傷木香檳榔黃連乳香輕粉蜜陀僧各等分右為細末乾摻之先以口噙漿水洗瘡傅一方加黃蘖麝香乾薑散出聖惠方治一切金瘡止痛辟風乾薑甘草炙桂心各一兩當歸三兩芎藭四兩蜀椒三兩汗右搗散以酒服方寸匕日三忌海藻菘菜生蔥又方出聖惠方治金瘡久不差宜傅白斂黃芩艾葉各二兩狗頭骨灰五兩地松三兩石灰五合右搗篩為末粉瘡上立愈龍骨膏出危氏方治金瘡真龍骨海螵蛸五倍子赤石脂黃丹煆過或不用只使血竭尤佳石亭脂一方不用石亭脂只用麝右等分為末塗患處如傷大先以冷鹽水洗淨却用黃桑生漿塗四圍待水乾皮斂即乾敷若小傷只以冷鹽水略洗敷之蜜陀僧傅散出聖惠方治金瘡久不差諸藥未效蜜陀僧十兩黃丹一斤炒令紫色生肌草一斤白斂半斤突厥白十兩石灰一斤炒右為細末以傅瘡上帛封勿令水濕鉛白霜散出儒門事親治刀箭所傷鉛白霜乾胭脂寒水石各等分腦子輕粉各少許右為末乾摻患處當歸散出聖惠方治金瘡辟風止痛方當歸半兩銼微炒川椒半兩去目微炒出汗㨂去合口者澤瀉半兩附子一兩去皮臍炮川芎一兩右為末若金瘡有折瘀血用酒調下一錢日三服刀箭藥牛膽大灰不以多少白芨半兩乳香血竭各少許右用新牛膽內盛藥物窨乾為末每少許乾貼不得犯婦人手開騏驎竭散治金瘡久不差傷筋骨不止疼痛騏驎竭三兩黃丹炒令紫色白斂白芨各五兩葛布三尺燒灰右為細末於傷中處乾傅之立效雄黃散治刀箭所傷雄黃乳香沒藥麝香少許右為末量瘡大小乾貼治刀鎌所傷千人心香灰千人手門扉後塵千年土門檔土青龍蔥汁右撚和作一塊如有刀鐮所傷旋割為末貼之治破血在心腹蘇木半兩南乳香沒藥各一錢生薑一塊長約二寸右捶破用瓦器以濕紙遮口不與走氣好酒熳火溫時服一盞金瘡藥白龍骨一兩蜜陀僧五錢千古石灰一兩大黃一兩作塊子燒灰了大用大黃右為細末乾貼瘡口上急風散治久新諸瘡破傷風項強背直腰返折口噤不語手足抽掣眼目上視喉中鋸聲及取箭頭方見諸風門破傷風類治剝馬驢傷手以熱雞血及熱浸治中刀箭悶絶取嘴􅏲刺血飲便瘥治刀斫箭傷赤石脂白茯苓龍骨各一兩右為細末傅瘡口立愈刀箭藥石灰一斤多年者龍骨四兩刺薊一小束右為末杵作泥為餅子或為散貼患處端午日合尤良續斷膏治金瘡蜀續斷蛇銜防風各三兩右切以豬脂三斤於東向露竈煎之三上三下膏成去滓若深大瘡者但傅四邊未可使合淺小瘡者俱通傅便相連能止血住痛亦可為丸以酒服之黑虎散治一切金瘡黑狗頭一箇豬牙皂角三箇鹽梅五箇右用香油十二兩用浸一宿前藥九炙九浸如煎至一伏時須視炙油乾存性研細為用黃柏散治寒濕金瘡舉發打撲傷損黃柏黃芩等分為末蘿蔔子一撮搗細如無松子亦可右為末以酸米醋調敷患處多多用藥乾醋解之治金瘡木賊三兩麻黃去節一兩甘草七錢半右為末每服五錢熱酒調下先整骨了夾定飲之令醉排膿散枳實十六枚芍藥六分桔梗二分右為散取雞子黃一枚以藥散與雞黃相等揉和令相得飲和服之日一服排膿湯甘草二兩桔梗三兩大棗十枚右㕮咀以水三升生薑一兩煮取一升溫服五合日再服新石灰散治金瘡止血除疼痛辟風續筋骨生肌肉新石灰二升青蒿切艾葉切各一斤右先搗青蒿艾葉絞取濃汁拌石灰令盡曝乾研入黃丹突厥白木各三兩令勻封金瘡血止立效治刀瘡及合口神驗金瘡深者若以藥速合則潰宜用滑石四兩一方用一兩黃丹一兩右同研細乾摻患處五真散一名神助散出楊氏家藏方治金刀傷打撲傷損及破傷風天南星防風各半兩右為細末摻上瘡口後以溫酒調下一錢如牙關緊身似弓用藥二錢童子小便調下但鬭毆內傷二錢酒調下傷欲死者童子小便灌下併進立效一方傅瘡口仍不作膿神驗又方五倍子燒灰存性燈草燒灰存性右共乳香為末傅傷處仍以帛子扎定檳榔散治金瘡方見金刃傷中筋骨類黃丹散一名桃紅散出危氏方治金瘡并一切惡瘡上等黃丹嫩石膏不以多少火煆通紅右研細和勻如桃花色摻傷處甚妙治金瘡定疼痛方以紫皂角針二兩用麥麩炒黃黑色碾為細末次入乳香沒藥末各半兩令勻每服二錢用酒調下神妙丸出朱氏集驗方以葳靈仙根和烏煮焙乾為末酒麵糊丸空心下五十丸見效廣東馮師斡云渠當年腰下為金瘡所傷遇春則發痛入小腹有不可忍忽傳此方療之神妙治刀箭金瘡藥緊龍骨緊赤石脂右為細末貼瘡上定血辟風治金瘡出危氏方黃蘗半斤半夏四兩右為末每用半兩生薑半兩生地黃自然汁調塗攧處如折斷用絹帛封縳次杉木皮扎定乾則頻搽薑地黃汁潤之百草散一名備急百靈膏一名大散方出聖惠方治金瘡以五月五日平旦使四人出四方各於五里內採一方草木莖葉每種各半把勿令漏説一事日正午時細切碓搗并石灰極令爛熟一石草斷一斗石灰先鑿大實中桑樹令可受藥取藥內孔中實築令堅仍以桑樹皮蔽之以麻油搗石灰極粘蜜泥之令不泄氣又以桑皮纒之使牢至九月九日午時取出隂乾百日藥成搗之日晒令乾更搗絹篩貯放凡一切金瘡傷折出血登時以藥封裹治使牢勿令動轉不過十日即瘥不腫不膿不畏風若傷後數日始得藥須暖水洗令血出然後傅之此藥大驗平時無事宜多合以備倉卒金瘡之要無出於此雖突厥質汗黃末未能及之一方云採時不得回顧任意摘取方回入杵臼內爛搗如泥量藥多少以意入石灰和勻取出搜成膏日中曝乾遇用旋取撚碎若刀斧傷乾傅取血止為度湯火傷冷水調開塗傅蛇蝎犬鼠咬傷先以溫水洗以津液調傅疥瘡先􅎲損以藥末乾傅濕癬以醋調傅之其效如神紫金散出危氏方治金瘡中藏刀斧傷見血欲死者用紫藤香即降真香也刮末碾細傅之一方用花蕊石散朱氏集驗方云周崈班緣捕海寇被寇以提刀所傷血出不止分明筋如斷骨如折用花蘂石散掩之血不止痛不定有兵士李髙言其在軍中被人傷中欲死見統領以藥掩之血止痛定明日瘡靨如鐵遂安又無瘢痕告統領其此方只用紫藤香瓷刮下石碾碾細傅之若却萬千人也又方出危氏方用門扉後塵傅之立瘥治刀傷斧斫方一名血竭散出百一選方用五倍子一味為末乾貼瘡上效一方炒黑為細末摻瘡口妙亦名小血竭凡殺傷不透膜者用乳香沒藥各一皂角子大研爛以小便半盞好酒半盞同藥通口服然後用花蘂石散或烏賊魚骨或龍骨為末傅瘡口立止殺傷氣偶未絶取䓤白熱鍋炒熟便傅傷處頃即再易其痛自止但青葉亦可灰彈散出聖惠方治刀斧傷及多年惡瘡并金瘡止血用多年石灰細碾雞子清調成團煆過俟冷再碾細若刀斧傷摻之患處若多年惡瘡以薑汁調傅一方單用石灰摻上患處裹定並瘥如無石灰灰亦可用治金瘡方用磁石厚朴白藥或槐花入沙窩中泥裹燒存性但得一味為末傅之立愈又方用新桑白皮松葉車前根葉並搗爛傅之刀斧傷用隔年四月苧葉揉令極軟覆在傷處縳定止血也又方以紫蘇麻末傅之良治金瘡傷至重但不透膜者用海味中鹹白鰾揀大片色白而有紅絲者成片鋪在傷處以帛子扎血止如膏脂出不傷內膜者即剃去傷人頂心髮以熱尉斗不令傷人知之或於新剃頂上一尉膏脂即入以桑白皮線縫合用血結草木臘葉磁石為末乾傅瘡上即合又方以五月五日採馬鞭草缺盆草血見愁擂爛同風化石灰為末合和候乾再為細末塗之即愈神仙刀箭藥妙不可言一名桑葉散取桑葉隂乾為末乾貼如無旋尉乾末傅之一方用新桑葉研取白汁塗之能合金瘡治金瘡並一切惡瘡用雲母粉傅之絶妙治金刃所傷瘡若深未宜速合者用少滑石末傅之治人倉卒中金刃刮花乳石為末傅之亦效治金瘡用冬葵子葉燒灰及搗乾葉末并取根搗傅之皆妙治療金瘡用苦芙五月五日採曝乾燒作灰水和服之甚驗一方春初採艾葉隂乾為餅用時入生薑汁服之良一方熟艾拓傅之治金瘡傷折瘀血用天南星根為末傅傷處治刀斧折傷及一切金瘡以白殭蠶不以多少炒令黃色細研為末傅之立愈又方用狼牙草莖葉熟搗傅之兼止血一方燼草灰傅之又方用蛇全搗傅之佳藍汁飲治金瘡方見毒箭方門類治金刃初傷取生青蒿搗傅上以帛裹創血止即愈陽起石散治刀箭所傷用陽起石燒研末新水調塗腫病處白灰散治刀斧所傷見血及惡瘡用石灰不以多少端午日午時取百草搗汁濾過和作餅子入韭菜汁調隂乾為末少許傅上擦少時血止便安五月五日取灰尤佳如腸潰出桑白皮線縫合罨之帛繫定效一方用晚蠶沙生為末摻勻綿裹之瘡愈血止一方蘇木五倍子末封之吳內翰父少保守南雄州有刃傷人腸者以此藥治之全二人之命只用韭汁和石灰一端午日合治刀斧傷磕擦及破傷風浮腫者用薑汁調平胃散傅塗若急卒只以生薑和皮爛搗􅝛患處止痛截血且無疤痕倉卒易得療金瘡方割氊方一寸燒灰研細以傅之瘥黑氊尤妙封裹勿動直待生肌杏仁方一名石灰膏用杏仁去皮尖搗如泥石灰分等以豬脂和之淹足合煎令杏仁黃絞去滓以塗瘡上日五六遍愈一方亦主犬馬被金刃所傷並皆治之又方以蛇銜草搗傅之瘥晉異苑云昔有田父見蛇被傷又見蛇銜一草著其瘡上經日傷蛇乃去田父因取其草以治瘡皆驗遂名曰蛇含草又方出聖惠方用五月五日掘葛根曝乾搗末傅瘡上止血止痛又方出本草用釣樟根刮取屑傅瘡上神驗五月五日採又方燒牡蠣末傅之佳桑皮方出聖惠方治金瘡或壓損斷裂及金瘡血出不止者剝取新桑皮作線縫之又以新桑皮裹之以桑白汁塗之極驗小瘡但以桑皮裹即瘥又方出本草以桑白皮燒灰和馬糞塗瘡上並瘥治金瘡若驚瘡血復出及未愈而交接血湧出多死急以蒲黃傅之又方取所交婦人衣帶三寸燒灰末服亦以粉瘡炙手令熱以尉瘡上良若驚而腫者燒小鐵出灼瘡中不療則須臾煞之出肘後方治金瘡即瘥方出肘後方取生地松三四升搗如泥餅封瘡上無問大小即合神良治刀斧傷并磕破血出方用頭髮一兩皂角二兩皆燒存性為末加倒弔灰貼上即止又方刮杉條皮穰貼之尤妙治刀箭傷出海上名方用香白芷爛嚼和生土傅之途成道者不可用治金瘡血出用胡椒末隨即摻之妙又方用海船縫內久年油灰碾碎摻之佳治刀刃傷用旱蓮子即水枯蔞以香油一處揉之傅瘡上藥蛆方治金瘡內爛生蛆者出濟生拔粹方以皂礬飛過乾貼其中即死治金瘡出千金方燒乾梅為炭搗末傅之一宿即瘥亦治打傷止血一作白梅乾鹽梅亦可又方出千金方用麻葉三斤以水三升熟煮取二升半為一服又方出千金方取蚯蚓屎以水服方寸匕日三亦治金瘡疼煩悶治金瘡出百一選方用猢猻頭草黃花子如蒺䔧骨朵者一名草血竭用其子爛研或爛嚼傅傷處血立止治破血在心腹用薊葉焙乾摻瘡中亦止血治金瘡血痢用豬黃豬野脂碎銼以酒服之瘥胡堇草方治五臟榮衛肌肉皮膚中瘀血止疼痛散血用胡堇草絞汁塗金瘡上良糯米膏出聖濟總録治金瘡用糯米三升揀去粳入米瓷盆內於端午前四十九日以冷水浸之一日兩度換水輕以水淘轉逼去水勿令攪碎浸至端午日取出隂乾生絹袋盛挂通風處旋取少許炒令焦黑碾為末冷水調如膏藥隨大小裹定瘡口外以絹帛包定更不要動直俟瘡愈若金瘡誤犯生水瘡口作膿紅腫漸甚者急以藥膏裹定一二食久其腫處已消更不作膿直至瘡合若竹木簽刺者臨卧貼之明日看其刺出在藥內若金瘡及水毒不可換藥恐傷動瘡口治金瘡久不瘥出聖惠方以白楊木皮細銼熬令乾搗細為末每服以溫酒下二錢日三四服治金瘡金傷皮肉裂開方用黃蠟熱酒溶化服之其口自合花蘂石散出和濟局方治一切金刃箭鏃傷中及打撲傷損貓狗咬傷或至死者及急於傷處摻藥其血化為黃水再摻藥便活更不疼痛如內損血入臟腑熱煎童子小便入酒少許調一大錢服之立效若牛抵腸出不損者急內入細絲桑白皮尖葺為線縫合肚皮縫上摻藥血止立活如無麻白皮用生麻縷亦得並不得封裹瘡口恐作膿血如瘡乾以津液潤之然後摻藥婦人産後敗血不盡血迷血暈惡血奔心胎死腹中胎衣不下至死者但心頭尚暖急以童子小便調一錢取一惡物如豬肝片即終身不患血風血氣若膈上有血化為黃水即時吐出或隨小便出立效用硫黃上色明淨者四兩花蘂石一兩搗為粗末相拌令勻先用紙筋和膠泥固濟瓦罐子一箇內可容藥俟泥乾入藥內密泥封口焙籠內焙乾令透熱便安在四方磚上磚上書八卦五行字用炭一稱籠疊周匝自巳午時從下生火令漸漸上徹有墜下火旋夾火上直至經宿火冷炭消盡又放經宿罐冷定取出細研以絹羅子羅得至細瓷盒內盛依前法使用一法用鹽固濟治金瘡止血疼痛辟風續筋骨生肌肉出聖惠方取烏樟根晒乾搗細羅為末薄傅瘡上神效治寒濕金瘡舉發打搏傷損用鹽梅浸水後用陳石灰九燒九浸研細黃丹入少許後塗患處地榆絹煎治刀刃所傷內損大腸及兩脅肋痛腹肚傷破大便從口中出并中大箭透射傷損腸胃及治産後傷損小腸并尿囊破小便出無節止此方神效餌至一服其藥直往損處補定傷痕隔日開瘡口看之只有宿舊物出即無所惡物出瘡口內用長肉散子作燼子引散藥入瘡裹面俟長肉出外其䀶即自合地榆八兩洗淨搗羅為末絹一匹小薄者右用清水洗淨絹糊以炭灰淋清汁二斗煮絹灰汁盡為度絹已爛熟擘得成片假五寸三寸即取出壓盡灰汁入於清水內洗三五度令去灰力盡重入鍋內以水二斗入地榆末煎煮熟爛以手撚看不作絹片取入砂盆研之如麵糊得所分為二服用白粳米粥飲調空心服之服了仰卧不得驚動轉側言語忌一切毒食只得食熟爛黃雌雞白米炊飯餘物不可食之其餘一服至來日空心亦用粥飲調服其將養一月內切須慎護如是産後所傷服一匹分作四服每用粥飲一中盞調服之日二服治金瘡出端竹堂黃柏四兩好者去粗皮黃連三兩去鬚淨銼黃葵花三兩焙乾降真香末一兩檳榔二兩雞心者佳白芍藥少許已上六味同研為細末木鱉子半兩烏賊魚骨三兩二味同研為末旋入密他僧一兩細研真龍骨一兩乳鉢旋令研入真血竭一兩麝香一錢旋入輕粉一錢韶粉一兩滴乳二錢叧研同於乳鉢內再細研旋入黃丹黃丹三兩飛過研右為一處合和令勻用好紙包褁令密勿令透氣俟三日方可用須十分研細為佳凡遇金刃所傷血不止者作急用藥乾貼血痛立止或所傷日久用䓤鹽湯洗去惡物提乾用唾津調藥貼用紙封蓋瘡口留一竅出膿水又被傷血流太多恐傷斷脈胳血筋急揩去血用藥乾貼之立止內補澤蘭散出聖惠方治金瘡澤蘭石膏細研水飛過附子炮製去皮臍乾薑炮製銼辛夷仁細辛芎藭當歸銼微炒各半兩防風二兩去蘆頭甘草一兩炙微赤銼右為末不計時候以溫酒調下二錢又方出鮑氏方治刀箭傷龍骨寒水石赤石脂半夏五倍子右為末乾摻貼皆可主治傷刃箭藥方烏魚骨五月五日前淮備下一兩石灰四兩萵苣菜一握在地青薊草一握藥一虎口人手指團圓是也韭菜一握右於五月五日平旦本人不語旋取後三味同杵於日未出摶作餅子晒乾用用時旋刮削敷之早用並不作膿又方出肘後方燒馬矢傅上瘥又方出肘後方山行傷刺血出無藥可得挼葛葉傅之又即尿中亦好又方出肘後方療金瘡初傷五月五日取百草心和石灰搗熟鑿桑北面下作孔團藥了內孔中以大桑皮掩孔釘四畔令固七月七日開隂乾末用傅瘡大良但百草心隂乾亦佳此當令桑白汁入藥中治金傷出如宜方宜五月五日樟木草和石灰搗爛晒乾為末摻之又方出如宜方用蛀蟲蛀屑摻又方出如宜方宜五月五日以墨同韭菜和研汁調石灰令乾為末摻之又方出如宜方炒石灰令沸後溫入大黃末炒勻要如桃花色名利水桃花散又方出如宜方臘月牛膽入龍骨金毛狗脊毛懸當風處用又方出鮑氏方治刀刃傷或負重所傷即時嚼青刺芥草貼傷處止用目前青草細嚼塗之亦可入湯水無妨又方出鮑氏方用白麵鹽各一撮新水調塗瘡治金瘡妙方華陀中藏經以石灰不以多少和人血作餅厚兩指許風乾旋切傅之治刀傷及竹木刺血傳信適用方急以自己小便淋洗三兩次立止不妨入水劉寄奴散出楊氏家藏方治刀箭所傷赤石脂無名異炒紅風化石灰寒水石磁石燒紅七遍已上五味各一兩王不留行劉寄奴地松地榆黃蘗皮已上五味各半兩右件為細末乾摻患處如刀傷肉開者以藥摻後更用軟帛微斂即時肉合更不痛作亦無膿血甚妙凡耳或斫落上脫下粘下脫上粘用封口藥封貼却以線對縳住看脫落所向用鵝翎橫夾定却用竹夾子直上橫夾定鵝翎用藥封其耳後出永類鈴方治人中鐵刀入肉出本草取蛇鳥矢傅之立消治金瘡痛出本草用生牛膝搗傅瘡上立瘥治金刃所損痛不可忍出本草用沒藥爛研以熱酒投飲之良治金瘡出本草用紅蜀葵葉燒為末傅之治刀刃所傷以北庭􅔈砂窨傅定當時生痂亦名狄鹽者治金瘡出本草用薔薇灰末一方寸匕日三服之治金瘡折傷出本草用天明精搗傅之昔劉􅖓宋元嘉中射一麞剖五臟以此草塞之蹶然而起􅖓怪而拔草便倒如此三度因名劉􅖓草治刀刃不傷出本草以朱龞帶之合金瘡出本草以小薊作煎和糖服治金瘡并折傷止暴痛出本草以蓮藕搗窨其上良治刀斧諸瘡出本草用絡石草搗封之立瘥治金瘡出本草以當歸煮飲之治金瘡出本草以牛蒡子葉貼之永不畏風亦不膿又搗傅之治金瘡出本草用白檳榔黃連少許為末傅之即瘥金刃傷中筋骨附論夫金刃所中至於筋骨所傷深矣然折骨絶筋亦可接續要在乘血氣未寒急施治法若不乘熱則風冷易入瘡縱暫愈後必不仁亦致痛煩而終身不完至於小碎之骨即當出之不爾則膿血不絶肌亦不斂矣夫金瘡始傷之時半傷其筋榮衛不通其瘡難愈已後令不仁也若被瘡截斷諸解身軀肘中及腕膝髀若踝際亦可連續須在急及熱療之其血氣未寒碎骨不去令人痛煩膿血不絶日久不能得安諸中傷人臟者十死一生方續斷散治金瘡傷中筋骨續斷生地黃焙地榆芍藥蛇銜甘草炙銼當歸切焙芎藭附子炮製去皮臍人參杜蘅各二兩乾薑炮一兩肉蓯蓉酒浸切焙二兩細辛去苖葉一兩桂去粗皮一兩半牡蠣煆研一兩一方無牡蠣蜀椒去目并閉口者炒出汗半兩右為散每服二錢溫酒調下空腹日午夜卧各一服骨碎補丸治一切金刃及筋骨風冷所中疼痛骨碎補炙去毛三兩敗龜醋炙虎骨酒炙澤蘭葉山芋白薇各一兩自然銅煆醋淬七遍山茱茰桂去粗皮各一兩當歸切焙肉蓯蓉切焙三分熟乾地黃焙五味子乾薑炮各半兩白檳榔生銼附子炮製去皮臍各一兩肉豆蔲去殼二枚右為末煉蜜丸如梧桐子大每服二十丸空心溫酒下欲作散每服一錢匕溫酒調下並空心日午臨卧服杜衡散治金瘡筋骨斷令續杜衡生乾地黃各二兩半蛇銜地榆各二兩銼乾薑炮製半兩川椒去目及閉口者一錢令汗出桂心各半兩當歸銼微炒芎藭赤芍藥各一兩半肉蓯蓉酒浸一宿去皴皮炙乾用一兩半人參去蘆甘草炙微赤銼附子炮製去皮臍各一兩右為細散每服不計時候以溫酒調下二服葛葉散治金瘡續筋骨斂血止痛葛葉地菘苖續斷石灰末旋復花地黃生用益母草麥門冬去心各五兩右搗絞七味取汁和石灰調作餅曝乾再搗為散傅所傷處騏驎竭散治刀箭傷筋斷骨止痛定血辟風騏驎竭白芨各半兩黃蘗銼甘草炙微赤銼白芷白斂當歸銼微炒密陀僧各一兩右為細末每用時以少許乾摻瘡立效敗弩箭散治金刃弓弩所中筋急不得屈伸即地黃散敗弩箭燒作灰秦芁去苖切熟乾地黃焙各半兩附子焙製去皮臍一兩大棗三枚取肉焙杜仲去粗皮炙各半兩當歸切焙一兩右七味搗羅為散每服二錢匕溫酒調下空腹日午夜卧各一服一方有續斷無大棗沒藥散治金瘡傷筋骨疼痛沒藥一兩當歸銼微炒地龍微炒自然銅細研各三分肉桂去粗皮川烏頭炮製去皮臍乾薑炮製以上各半兩右為細末每服不計時候以溫酒調下一錢地菘苖散治金刃傷筋骨止血生肌地菘苖石灰末旋復苖葛葉青蒿苖麥門冬苖各五兩右除石灰外切碎搗絞取汁和石灰作餅子曝乾再搗羅為散傅瘡上五月五日合佳一方有益母苖骨碎補散治金瘡傷筋斷骨疼痛不可忍骨碎補去毛麩炒微黃自然銅細研虎脛骨塗酥炙令黃敗龜塗酥炙微黃各半兩沒藥一兩右為細末每服一錢以胡桃仁半個一處爛嚼用溫酒一中盞下之日三四服催潮散治針鐵箭頭等鋒刃氣入皮肉筋骨害人不能出天南星半夏生各一兩右為細末每服一錢熱酒調下先嚼生薑少許後嚼生薑少許以外敷曲亷檳榔散治金瘡接筋補骨并血不止檳榔銼黃連去鬚並生用右等分搗羅為散乾傅之瘡上如瘡口乾用香油潤瘡口摻藥瘡上續骨妙方用馬蘭草花葉去根以五月五日採取隂乾為細末酒調服立效治金瘡續筋骨方見金刃所傷類治金瘡續筋骨方見毒箭所傷類一名庭賓散方又方出肘後方用石灰細篩以麻油和之作丸如栝蔞許大以炭火燒赤放冷搗篩為末又以油和燒凡如此十遍為細散傅瘡神效又方出聖濟總録取葵菜根搗爛傅之立瘥治金瘡續筋斷骨令還續方出聖惠方多取蟹頭黃及腦并足中肉熬末內瘡內治傷斷筋骨續筋方出聖惠方取旋復根搗汁滴瘡中仍用滓傅瘡上封之十五日即筋骨便續更不用易金刃腸出附論夫金刃所傷有腸出者有腸出已斷者視其輕重之證可決死生腸有一頭見者不可續也若腹痛不可忍短氣不能食近則一日逺則三日治無及已腸有兩頭見者可速以桑白皮挼為線或以麻縷續之仍取雞血塗隙勿令氣泄推內之更以前線縷綴縫瘡口亦以雞血塗之腸有出而不斷者當以大麥粥取其汁洗腸而內之綴縫瘡口如前法然後作研米粥飲二十餘日稍作強糜百日後始得飯食不可飽飽則腸痛宜常以湯散助之被傷肚皮俱破腸出在外只腸全斷難醫傷破者不斷皆可治療腸及肚皮破者用花蘂石散傅之線上輕用手從上縫之莫待糞出用油撚活放入肚內肚皮裂開用麻縷為線或捶桑白皮為線亦用花蘂石散傅線上須用從裏重縫肚皮不可縫外重皮留外皮開用藥摻待生肉如傷孔大肚腸與脂膏出放入內則用縫如孔小只有膏出先用清心藥與服用手擘去膏不用緣此膏出者已無用了不可復入肚中反成禍只須擘去不妨此是間肉但放心可去之肚肉被傷者專用退利大小腸不可待祕恐成重患方磁石散出聖惠方治金瘡腸出宜入之磁石煆研滑石研鐵精各三兩右等分同研細末每服一錢匕以溫酒調下空腹日午晚間各一服夜卧二服及以針砂塗腸上其腸自收入一方用白米飲服一方無鐵精治金瘡腸出方出聖惠方取人屎乾為末以粉腸即入若腸乾取濃麵漿濕腸上即入腸以冷水噀而令吸氣即易入治被傷腸出不斷出欲燥而草土腸著出聖惠方作大麥粥取汁洗腸推內之常研米粥飲之二十日稍稍作強糜百日後乃可瘥草土當踧在皮外及以乾馬屎傅瘡上治金瘡中腸出不能入者出聖濟總録以小麥三升用水九升煮取五升絹濾過候冷含噴瘡上漸入以冷水噴其背不宜多令人見亦不欲令傍人語又不可令病人知或尚未入取病人卧席四角令病人舉身搖須臾腸自入十日內食不可飽頻食而少勿使病人驚則殺人縫金瘡腸出者方見金刃所傷類桑皮方又方出本草治金瘡腸出者以桑白皮作線縫之更以熱雞血塗上立愈唐安藏剖腹用此法效毒箭所傷附論夫箭鏃毒藥入皮膚肌肉間令人短氣悶絶口噤唇乾血雖止而腹痛不能言其人如醉者為難治若瘀血應時出其瘡溫而熱開能言則可治也巢氏論毒箭有三種曰嶺南夷俚人用焦銅作箭鏃嶺北諸處以蛇毒螫物汁著管中漬箭鏃及有以毒藥為之者三種傷人皆不易治唯急飲糞汁可以禦其毒小緩則毒氣深入不可救也方梨母子煎出聖惠方中毒箭後皮肉瘀腫梨母子一斤去核爛研鹽麵搗曝乾再搗用絹羅之去柤瀆子五兩一作鹽麩子菉豆三兩炒熟不灰木三兩以牛糞火燒赤藍子五兩黃連三兩獨顆栗三兩生用黑豆三兩炒熟大糞燒五兩赤芍藥三兩右為末煉蜜為膏每一匙溫酒下日三四服一方加甘草銼生用治毒箭及馬汗方不灰木散出聖惠方不灰木二兩以牛糞火燒令赤色蜜陀僧一兩黃柏半兩銼膩粉一分麝香一分右為末鹽水洗患處傅搽日一换之雄黃散出聖濟總録治藥毒箭頭在身未出雄黃細研一分粉霜半兩研蜣蜋四枚為末生用巴豆三粒去殼别研為末生用右再同研為散以銅筯頭取乳汁調點瘡上頻頻用之七日瘡熱箭頭自出解毒雄黃散出聖惠方治毒箭所傷雄黃細研大麻仁微炒各一分蘆根半兩銼白斂半兩右為細末每服以溫酒調下一錢日四五服治中射罔箭藍子散出聖惠方藍子五合升麻八兩王不留行甘草各四兩右治下篩冷水服二方寸匕日三夜二又以水和塗瘡乾易之治中毒箭方一名蘆根散出聖惠方蘆根一兩藍葉一兩紫檀半兩不灰木二兩以牛糞火燒令赤色為末右為末每用一錢以藍汁調下粥飲亦得不拘時候乾薑散出肘後方治毒箭乾薑末一作乾葛末鹽右等分再同研勻傅瘡上毒自出藍汁散出聖惠方治毒箭所中搗藍汁一升飲之并以傅瘡上若無藍取青布漬絞汁服之并淋瘡中鏃不出搗死鼠肝塗之鼠腦亦得用之即出又方出聖惠方煎地黃汁作丸以熱水服之百日箭出或作膏調服亦得葛根飲治毒箭所中方見箭鏃金刃入內類貝子散出聖濟總録治毒箭用貝子搗羅為末每服一錢匕溫酒調下不拘時候日三四服此方治中毒并治金瘡止痛又方出聖惠方取雄黃末傅瘡上日四五度汁出便愈治毒蛇咬瘡亦妙又方出聖惠方取蘆根自然汁每服半盞許日二夜一一方飲藕汁唯多為妙蘆根煮汁亦可一方貝齒末服一錢匕大良甘草飲出聖濟總録治毒箭用甘草三兩細銼用水二升煎取一升絞汁每服一小盞溫飲日三服仍淋瘡上生薑飲出肘後方治毒箭用生薑半斤切研如泥取自然汁飲五分一盞未退再服更無疤痕一方煮薑汁飲三二升甚佳旋復散方出聖濟總録治毒箭用旋復根不拘多少搗為散每服二錢匕以溫酒調下日三服不拘時候仍用傅瘡中若無根花并子亦可用治毒箭所傷煩亂欲絶出肘後方用大麻子三升搗取自然汁每服半盞許日再服秦龜散治俚人毒箭傷用秦龜血飲之良治卒被毒箭及金瘡方出千金方用麻菁仁數升杵飲汁瘥又方出肘後方煮藕取汁飲之飲多益良療毒箭方出千金方以鹽滿瘡中炙鹽上三十壯一方多飲豬血良治毒箭及馬汗方用大虻蟲於端午日收之隂乾為末每服一錢挑破瘡口傅之後以醋糊膏子貼之即追出毒治卒被毒箭中人才破肉爛者即便死人飲人糞汁以糞塗瘡上良治著藥弩藥箭用曲蟺泥為末搗豆豉和勻為丸桐子大每服五十丸隨傷上下用五六服一日安治毒箭所傷出本草以菩薩石為末傅之良治中藥箭方出本草交廣夷俚人用焦銅作箭嶺北諸處以蛇毒螫物汁著筒中漬箭鏃此二種才傷皮便潰膿沸爛而死若中之者以飲月水屎汁并以傅之亦可食惟此最妙治毒箭鏃及深山大蝮中人出本草速取病者當頂上十字剺之令皮斷出血以石藥末瘡上并傅所傷處其毒必攻上下泄之當出黃汁數升則悶解治毒箭蟲蛇咬出本草以芋麻根搗汁罨之治毒箭出本草以薺苨搗罨之治毒箭出本草以苧葉窨傅之一方用生芋同鹽研細傅之解藥箭毒出本草用鵝絨篩末以酒調服之有效箭鏃金刃入肉附論大凡箭鏃金刃入肉治宜速出之或有碎骨亦必須去盡然後塗傅諸藥不然其瘡必不合縱復少愈亦常作疼痛若神驚血亂氣奪則死矣方續斷膏一名當歸續斷膏出聖濟總録治箭頭入內赤腫辟風斂瘡當歸續斷骨碎補桂去粗皮附子澤蘭芍藥白芨牛膝羌活芎藭木香麒麟竭生乾地黃白殭蠶白附子各一兩沉香丁香各半兩栝蔞二枚大者烏蛇肉白斂白芷玄參各一兩杏仁桃仁各三分右細銼入麻油四斤豬脂一斤半驢脂三兩用文武火煎三日濾去諸藥入乳香三兩松脂六兩更煎一日用生絹濾却粗滓再用五斗大生鐵鍋細羅鉛丹三斤炒令紫色旋入前藥油煎令紫色即旋退火以藥油滴少許水碗內成珠子為度以磁石器密收依前法用祇聖散出聖濟總録出箭頭附子二枚重半兩者炮製去皮臍檳榔二枚一生一熟大黃銼木香各一分巴豆半兩去皮漿水煮三二十沸麩炒黃研出油肉豆蔲去殼吳茱茰洗焙炒當歸銼焙黃連去鬚豬牙皂莢酥炙去黑皮并子各一分蒼鼠銼焙乾研末一兩芎藭陳橘皮浸去白焙乾薑炮桂去粗皮蕪荑各一分右為細末沒藥酒調下一茶匙只三服箭頭卒出虎舌丸出聖濟總録點藥箭頭令自出乾虎舌半兩用石臼杵搗為末生草烏頭尖末三錢楮實末三錢磁石半兩用石臼杵搗為末性緊者水銀三錢同磁石末一處研細令水銀星盡丹砂一錢研硫黃舶上者一錢􅔈砂透明者二錢研金牙半兩石杵臼搗為末消石二錢同硫黃研右一處於乳鉢內更研極細石腦油為丸如黍米大令兩頭尖角盒子盛貯每出箭頭一枚用藥一丸竅內將銅筯點入箭瘡內即以好酒少許摩瘡四畔次將紅散子摩瘡須臾覺瘡極熱而癢其箭頭當日內自出次以生肌金黃散摻瘡內以紫金膏封之紅散子出聖濟總録摩瘡上蔓陀羅子草烏頭尖麒麟竭萞麻子去殼細研茄子花各半兩右為細散以好酒調下如膏於瘡口上塗摩之箭頭自出雄黃丸出聖濟總録治箭鏃不出雄黃研獨角仙􅔈砂研不灰木威靈仙去殼木槿花各一分鼠一枚心頭取血研入衆藥內右除鼠血外搗為散和勻鍊蜜丸黃米大內在瘡內箭頭自出牡丹散出聖濟總録治金瘡箭頭在骨逺年不出牡丹去心白斂各一兩桑根白皮銼二兩藿香葉丁香麝香研各一分右為散每服二錢匕溫酒調下日三淺者十二日深者二十日箭頭自出雄黃丸出楊氏家藏方治骨中箭頭方雄黃一分蜣蜋一分研不灰木一分以牛糞火燒赤色威靈仙一分朝生花一分鼠一枚去頭取血右為末入鼠血并鍊蜜和丸如黃米大內瘡口其箭鐵不計逺年自出蠐螬丸出聖惠方治金瘡箭鏃在骨中逺年不出蠐螬五枚乾者螻蛄三枚乾者赤小豆一分赤鯉魚鮓一兩􅔈砂一錢紅花末三錢右研細以鮓研丸如菉豆大如瘡口在只於瘡口內絍一丸如無瘡口以針撥破內藥不過三丸至五丸箭頭自動輕搖即出巴豆丸出聖惠方治肉中箭頭巴豆一枚去皮膩粉一分砒少許細研磁石半兩細研蜣蜋一個為細末右以雞清和丸菉豆大先以針撥開瘡口用男子乳汁化一丸在撥開處上用醋麵紙封貼上當癢癢極不可忍則其鐵自出也多年者兩上新者一上箭鐵自出治箭鏃入肉出聖惠方雄黃蜣蜋膩粉砒霜巴豆去皮各一分右為末先以兒妳汁濕筯頭點藥入瘡內當癢不過三兩上便出矣半夏散出聖惠方治金瘡箭頭在肉中不出半夏湯洗七遍去滑白斂牡丹各一兩桑根白皮銼二兩右為末每服以溫酒調下一錢日三服出箭頭方蜣蜋自死者十個土狗子三個婦人髮灰少許右蜣蜋去殼取白肉與三味同研如泥用生塗中箭處如膏搽後內微癢即以兩手蹙之其箭頭自出解骨丸出聖濟總録治箭鏃不出雄黃研蜣蜋研象牙末各等分右搗研為散鍊蜜丸如黍米大內瘡口內後細嚼羊腎芝麻摩貼之覺癢箭頭自出治箭鏃不出出聖濟總録蜣蜋五月五日取者佳斑貓各七枚棘刺上暴乾細研砒黃細研半兩右和勻入青竹筒三寸內捲蠟紙塞口更以躐紙封定厠中浸三七日取出洗曝乾每用豆許待癢按之自出出箭頭方出濟生拔粹方角蜣蜋不計多少全用乳香麝香不計多少右為細末撥動箭頭撥藥於瘡口內治箭鏃入肉出聖惠方斑貓二七箇蜣蜋一七箇􅔈砂一錢右為末都入竹筒內封頭然後入厠中七日取出於隂地內埋之七日取於磁盒內盛之每用時服少許於瘡上塗之其箭鏃自出白斂散出聖惠方治金瘡箭在肉中不出白斂半夏各等分右治下篩酒服方寸匕日三淺瘡十日出深瘡二十日出終不住肉中牡丹皮散出聖金方治箭鏃及諸刀刃在咽喉胸膈諸隱處不出者牡丹皮一分白鹽二分一方作白斂右治下篩以酒服方寸匕日三服出取箭鏃入骨取不出疼痛不可忍宜用此方出聖惠方巴豆三枚蜣蜋三枚右研塗所傷處俟痛定微癢忍之極癢不可忍即撼動拔出以生肌膏藥傅之以黃連貫衆湯洗畢以牛膽製風化石灰傅之兼治惡瘡夏侯鄲云初在潤州得之方鏃箭出後速以生肌膏傅之説者云兼治瘡鄲得方後至洪州旅舍主人妻患背瘡呻吟鄲遽用此方試之愈治箭頭不出出聖濟總録磁石生搗研極細雄黃研各三分右同研令勻每服二錢匕菉豆汁調下空心十日後輕撥便出手足上用此藥貼之自出白斂散一名丹散出聖惠方治箭頭不出白斂三分牡丹去心三分右為散每服三錢匕溫酒調下空腹日午卧各一服一方加鹽等分萬類灰散出聖惠方治金瘡及箭入肉不出腫痛萬類灰弓弦灰各三兩右共研為散每二錢匕用蓼藍汁調下日再服治刀箭傷緊閉者血竭一枚消石右為末敷之出血不止立效又方龍骨二錢船灰六兩乳香一兩右為末敷之立效治箭鏃方用射罔以塗之治卒中箭不出或肉中有聚血出千金方取女人月經布燒灰屑酒服之治箭鏃及諸刀刃在咽喉胸膈諸隱處不出出千金方用酒服瞿麥方寸匕日二瘥又方出千金方以栝蔞汁塗箭瘡上即出一方用根搗傅瘡日三易治針入肉中并箭諸物刺出千金方刮象牙為末水和聚著折針上即出又方出千金方用磁石吸鐵者著上即出取箭鏃方出危氏方用天水牛一箇獨角小者尤妙用小瓶盛之用硼砂一錢研細末用水些少滴在內浸自然化水以藥水滴在傷處箭頭自然出也淮西總管趙領衛名屬殿巖密之子云仇防禦方張循王屢求不得因奏知德壽宣取以賜之有奇效與楊氏方中用巴豆蜣蜋者大率相似赤小豆飲出聖惠方治箭頭入肉及入腹不出用赤小豆半升以水五升煮令爛熟絞取汁每服一盞空腹日午夜卧服一方和酒相次服之盡為度治箭頭在咽喉中或胸膈中及諸處不出者出聖惠方用鼠肝五箇細切爛研傅之兼以鼠腦髓或鼠頭血塗之並良兼治人針折在肉不出并刀刃傷又方出聖濟總録以生鼠皮一枚及前兩足作灰用豬膏和塗之即出牛膝膏出聖濟總録治箭在咽喉中或胸膈中及諸處不出者搗牛膝不限多少作末以熱水調塗箭頭即出若火瘡炙瘡不能愈者塗之效又方出聖濟總録以白項蚯蚓十四枚內銅器中次入研細鹽一兩於日中曝並化作汁者塗之箭鏃與刃傷處須臾癢則出療箭頭及諸刃頭在咽喉胸膈諸隱處不出者出葛洪肘後方嚼杏仁不限多少塗之研杏仁細傅之又方出聖濟總録搗烏梅不限多少為散水和塗之即出又方出聖濟總録取蠐螬不限多少細研取汁塗之血止即出箭鏃中傷在喉咽胸膈不出者及針刺不出者出聖惠方用螻蛄即土狗蟲乾者濃煎汁滴上三五度箭頭自出一方以螻蛄腦十枚細研塗瘡上亦出治出箭頭出本草以栗肉生喫七箇又生嚼罯可出亦罯惡刺治箭頭不出及惡刺破癰出本草以人牙齒垢和虱研塗之出箭頭治折箭刺入膿囊不出堅燥及鼠損取薔薇灰末方寸匕服之十日鯁刺皆穿皮出效萬聖神應丹出衛生寶鑑出箭頭魚骨針麥芒逺近治之用莨菪科一名天仙子取著中一科服本枝華花實全者好於端午日前一日特不語尋見莨菪科言道先生你却在這裏那道罷用柴灰自東南為頭圍了用木椑子橛取了根周細二次日端午日未出時依前特不語钁只一钁取出土用淨水洗了不令雞犬及婦人見於淨室中以石臼搗為泥丸如彈子大黃丹為衣以紙袋封了懸於髙處隂乾如有人著箭不能出者用緋絹盛此藥乾於臍中用綿裹肚繫了先用象牙末於瘡口上貼了後用前藥如瘡生合用刀子割開貼之最驗葛根飲治箭鏃不出及治毒箭所傷用生葛根三斤銼細研絞取自然汁每服半盞不拘時候日三治一切金瘡無有不效者又云葛白屑熬黃傅瘡止血立效治箭鏃石不出立效方用黑羊糞搗末傅之待瘡口開即以生鼠刺取血滴瘡中須臾即出神鈴散治箭頭在骨內取不出大雄鼠一枚右件去皮骨取精肉薄批焙乾碾為細末每服二錢熱酒調下若覺箭瘡癢不得㧓忍癢少時箭頭自出不拘時候磁石丸出箭頭斑貓五十枚全者屈盤蟲五十枚去頭翅磁石一兩四面緊者􅔈砂一兩别研巴豆二十枚去殼不用川烏頭二十枚生用不去尖右件為細末以棗肉為丸如鼠糞大任瘡口內箭頭自出如瘡口生合不見於舊瘢上炙三十壯以津液化藥傅在炙瘡上用濕紙貼定候肉瘡以物枕瘡口卧良久箭頭自出鼠油膏出箭頭鼠一枚熬取油蜣蜋皂角燒灰定粉龍骨上四味各一錢乳香少許别研右件為細末以鼠油和成膏子點藥瘡口內其上更用磁石末蓋之箭頭自出凡箭金及諸竹刺沒肉中頭尾猶可揣得者應破上以鈎鋒引出之若深藏不見者難療多死又箭中骨骨破碎者須全出去碎骨盡得藥傅之不爾瘡永不合亦死鐵汞丹治金箭頭入腹內及在身體諸處禁或著骨斷折不能取者獺膽七枚如無只用赤鯉魚膽一十四枚磁石四邊緊者血竭别研澤㵼赤小豆紫葛根蒼耳子赤芍藥已上七味各半兩樟桞根三兩已上並生用焙乾為細末酒煮赤小豆麵糊入膽汁同和為丸如梧桐子大如在腹內每服二十丸濃煎赤小豆樟桞根湯并酒各半盞送下不拘時候日三四服立出如在骨節禁穴內不可取者用後藥􅔈砂别研砒别研巴豆霜斑貓上四味各一字蜣蜋十枚螻蛄七枚蠐螬七枚右七味研細入前藥二十丸一處再研用石腦油為丸如菉豆大每用一丸任瘡口內上用雲母膏蓋口日一換藥不過三五日其箭自出矣湧鐵膏取箭頭一切針刺入肉盡皆治之糞鼠頭一箇螻蛄四十九箇芫青一兩土消蟲十箇巴豆一兩馬肉蛆一兩焙乾信一兩醬蛆一兩焙乾夏枯草一兩􅔈砂一兩磁石一兩黃丹一兩地骨皮一兩蘇木一兩蜣蜋一兩石腦油三兩蒿柴灰汁三升右將灰汁石腦油用文武火熬成膏次下地骨皮等末令勻磁器內收臨用時看瘡勢大小點藥良久箭頭自然湧出神聖膏取針鐵誤入皮膚車脂不以多少右成膏子者好攤在紙上如錢許二日一换三五次其針自出大有神驗烏翎散取針鐵誤入皮膚烏翎三五枚火炙焦色右碾為末好醋調成膏子塗在瘡上紙蓋一兩次其針自出神效普濟方卷三百二
