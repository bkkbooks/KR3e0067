body:
  text: 普濟方卷三百九十七明周王朱橚撰嬰兒下痢門熱痢附論夫小兒挾熱痢此由邪熱在於腸間因胃氣不和乳食傷動故食腹痛腸鳴下痢黃赤名熱痢者由本挾虛熱而又為風熱所乘風之與熱俱入於大腸而為熱痢也非是水穀之痢而色黃者為熱也方犀角丸治小兒赤痢經時不止犀角鎊一兩一分黃連去鬚一兩半女萎一兩白頭翁去蘆頭一兩半茜根三分枳殼去瓤麩炒三分甘草炙半兩赤石脂一兩一分黃芩去黑心一兩乾薑半兩桂皮炙三分龍骨一兩黃蘗去粗皮炙半兩右為細末煉蜜和搗五百杵丸如梧桐子大一二歲每服三丸三歲至六歲兒可四五丸空心午後各一服米飲下黃蘗湯治小兒夏月傷暴寒寒折大熱入胃下赤白滯如魚腦壯熱頭痛身熱手足煩躁此太陽之氣外傷寒使熱氣入胃服此方良若誤以痢藥下之或以溫脾下之則熱劇以藥下之便數去赤汁如爛肉者下之瘥宜以澀熱藥斷之下既不止倍增壯熱者服之即效或是溫病熱盛復遇暴寒折之熱入腹下血如魚腦者服之良方黃蘗黃連升麻白頭翁一作白飲當歸牡蠣煅石榴皮黃芩寄生甘草各二分犀角艾葉各一分右㕮咀以水三升煮一升二合百日兒至二百日一服三合二百至期歲一服三合半赤石脂湯治小兒卒下熱痢赤石脂一兩黃連去鬚石膏碎甘草炙龍骨知母焙前胡赤茯苓桂去粗皮芍藥各一分右搗篩一二歲每半錢入棗一枚水七分煎至四分去滓溫分二服空心午後各一栝蔞根散治小兒熱痢體瘦口乾煩躁不欲飲食栝蔞根白茯苓知母黃芩地榆微炙甘草炙各半兩人參三分去蘆黃蘗半兩微炙赤石脂一兩右為粗散每服一錢水一盞煎至五分去滓不計時量大小分減服之龍骨湯治少小壯熱渴引飲下痢龍骨甘草大黃赤石脂栝蔞根石膏生寒水石桂心各二兩右製下篩以酒水各五合煮散二合二沸去滓量兒大小服之除熱結腸丸斷小兒熱下黃赤汁沫及魚腦雜血肝中瘡爛坐􅉶生蟲黃連蘗皮苦參鬼臼獨活橘皮芍藥阿膠各半兩右為末以藍汁及蜜丸如小豆大日服五丸至十丸如無藍汁可用藍子一合春蜜和丸亦不得傷飽傷則再作犀角散治小兒熱痢煩悶腹痛靣黃體瘦犀角屑半兩赤芍藥三分黃連三分去鬚微炒黃芩半兩知母三分葳蕤三分地榆半兩微炙甘草半兩炙右為粗散每服一錢水一小盞煎至五分去滓量大小日三四度分減服之牡蠣丸治小兒熱痢牡蠣煆黃連去鬚黃蘗去粗皮炙龍骨赤石脂人參去蘆甘草炙各一兩右為末煉蜜和搗千餘杵丸如麻子大一二歲每服三丸四歲至六歲五丸米飲下空心午後各一服龍骨散治小兒熱痢煩悶口乾多渴不欲乳食龍骨一兩黃連三分去鬚微炒地榆三分微炙黃芩三分烏梅肉半兩微炒赤地利三分鼠尾花三分右為細散每服以粥米飲調下半錢日三四服量大小加減熊膽散治小兒熱痢壯熱全不食乳食乳即吐熊膽半兩黃連去鬚三分馬齒莧乾者炒一兩無食子煨一枚蚺蛇膽半兩犀角鎊一兩右為細末一二百日兒每服一字新汲水調服空心午後各一量大小加減烏梅湯治小兒熱痢壯熱多渴而痢不止烏梅肉二枚去核焙黃連去鬚藍菜各一兩犀角鎊屑阿膠炙燥甘草炙各半兩右搗篩三歲每半錢水七分煎至四分去滓分溫二服空心午後各一大小加減麥門冬湯療小兒夏月伏暑吐痢過後胃中虛熱渴唯飲水麥門冬去心甘草炙各四分枳實炙黃芩人參各三分龍骨六分右切以水二升煮取九合去滓溫服黃連丹治熱痢便血頻併黃連二兩去鬚當歸一兩焙白頭翁蔓菁菜各三分焙木香銼川楝子各半兩麵裹煨右為細末糯米飯丸如麻子大每服十粒米飲下量大小加減地榆散治小兒痢腹痛心煩不欲飲食地榆三分微炙黃連半兩去鬚炒赤石脂一兩人參去蘆頭赤芍藥各半兩杏仁湯浸去皮尖雙仁麩炒黃右為粗散每服一錢水一小盞煎至五分去滓不計時量兒大小分減溫服子芩散治小兒熱痢腹痛壯熱心煩不欲飲食四肢瘦弱子芩一兩知母三分女萎三分黃蘗半兩微炙甘草半兩炙赤芍藥半兩右為粗散每服一錢水一小盞入竹葉七片煎至五分去滓不計時量大小分減服黃芩知母湯治小兒熱痢不止黃芩去心知母焙各一兩萎㽔三分黃蘗去粗皮炙黃甘草炙各半兩右搗篩一二歲每半錢水七分煎至四分去滓分溫二服空心午後各一服一方加竹葉梔子丸治少小熱痢不止梔子七枚大棗四枚炙黑黃蘗三分礬石四分黃連五分右為末蜜丸如小豆大每服五丸日三夜二服不止稍加至十丸梔子仁散治小兒熱痢腹痛心煩口乾小便赤黃不欲飲食梔子仁當歸微炒各半兩黃蘗三分微炙地榆三分微炙黃連一兩去鬚微炒熊膽散治小兒熱痢全不欲乳食身體壯熱熊膽一分蘆薈三分黃連半兩去鬚微炒粟殼一枚乾馬齒莧一兩右為細散每服以粥飲調下半錢日三四服量兒大小加減白頭翁湯治小兒熱毒下痢如魚腦手足壯熱黃連去鬚一兩白頭翁醋石榴皮炙犀角鎊屑各半兩右搗篩一二歲每半錢水七分煎至四分去滓分溫二服空心午間晚各一服一方無犀角量大小加減梔子丸治小兒熱痢不止梔子仁七枚黃蘗去粗皮炙三分白礬熬枯一兩棗大者三枚燒令黑色右為細末煉蜜和丸如麻子大三歲每服三丸三四歲每服五丸米飲下空心午後各一服黃連湯治小兒熱痢黃連去鬚一兩黃蘗去粗皮炙半兩阿膠半兩炙燥右除阿膠外搗篩每服半錢酒半盞入阿膠一片同煎至二分去滓空心日午近晚各一服三物湯治小兒久痢不食乳大黃生甘草炙麥門冬去心焙各等分右搗篩每三錢水一盞煎至五分去滓分溫三服空心下量兒大小加減犀角散治小兒熱痢不瘥犀角屑半兩桂樹皮一兩黃連半兩去鬚微炒右為粗散每服一錢水一小盞煎至五分去滓不計時量兒大小加減溫服黃連湯治小兒熱痢腹中疼痛或血痢黃連去鬚山梔子仁各三分右搗篩三歲兒每半錢水七分煎至四分去滓分溫二服空心午後各一服訶梨勒散一名訶梔散治小兒赤痢血痢腹痛煩渴訶梨勒煨去核梔子去殼各一兩右為細末一二歲每服半錢米飲調下空心午後各一服黃蘗丸治小兒熱痢下血黃蘗去皮半兩赤芍藥四錢右為細末飲和丸麻子大每服一二十丸食前米飲送下大者加丸數杏仁湯療少小夏月伏暑吐痢過後胃中虛熱渴唯飲水杏仁五十枚去皮尖鹽一合右以苦酒一升煮取一半量與服之治小兒熱痢方煮木瓜汁飲之又方搗蒜傅兩足下治熱痢備急方用井水調臘茶蜜磨生薑渴則飲之治熱痢方小兒冒暑中熱積熱在臟或母觸冒熱毒乳兒內臟腑積滯外因觸中暑熱之毒及內外因時行疫氣傳染致成下痢或血痢治法以豬苓湯解除暑毒敗毒散去風邪行滯氣四順飲蕩除熱毒平胃散補養脾胃五積丸祛除積滯以四藥合用米湯煎調吞下五積丸消積去熱其痢自止若患血痢則變白痢服以溫脾之劑立可收功治熱痢用五苓散入車前子末米湯調吞服黃連阿膠丸或用香薷湯倍加赤茯苓黃連酒水煎服或用久年白鹽梅以蜜水各半并好茶煎服治小兒熱痢不瘥用蒲根一兩細切以粟米一合水一大盞同煮米熟去滓取汁不計時量兒大小加減溫服預知丸傅氏活嬰方治一切痢方見前下痢門黃白散治小兒大小便出黃沫如蟹吐沫者良久即青脾之虛熱也此方治之大黃白术各等分右為末每服半錢水半鍾煎三分空心服加味豬苓湯治熱痢血痢豬苓去皮赤茯苓去皮澤瀉白术麥門冬去心百藥煎黃連去鬚大黃煨甘草炙各等分右㕮咀水煎溫服血痢加阿膠蒲黃赤白痢附論夫小兒痢下赤白由脾胃不和乳食所傷留滯腸中與津液相摶腸虛則泄故為痢也虛而有熱則赤虛而有寒則白冷熱不調則赤白相兼膿血雜下故名赤白痢方藿香散治冷熱不調赤白五色諸般瀉痢陳皮去白厚朴甘草炙枳殼蒼术米泔浸烏豆炒去皮縮砂仁白芍藥當歸藿香葉川芎木瓜百藥煎阿膠炒等分右為末白痢加白薑木香赤痢加黃連赤白痢加薑黃連用生薑茶芽蜜水煎調服血痢加訶子肉治中桔梗丸斷冷滯下赤白青色如魚腦脫肛出積日腹痛經時不斷赤石脂五分吳茱萸乾薑附子當歸厚朴薑汁炒白术木蘭皮白頭翁黃連石榴皮黃蘗各三分右為細末蜜丸如大豆大二歲每服五丸三歲已上服十丸十歲已上二十丸暴下者服少許便瘥即下者盡一劑更合龍骨散治小兒赤痢白痢龍骨研白石脂研胡粉炒白礬枯過各一兩訶梨勒皮二兩黃連去鬚陳橘皮阿膠炙燥當歸焙人參厚朴去粗皮薑汁炙各一兩半右為散每服一錢空腹煮白粥飲調下日二服赤石脂丸治小兒赤白痢腹肚㽱痛不思飲食赤石脂白礬燒令汁盡訶梨勒皮白术黃耆厚朴去粗皮薑汁炙醋石榴皮乾木瓜焙各半兩肉豆䓻去殼一枚乾薑炮一分右為末煉蜜丸如麻子大每服五丸溫米飲下空心午後服量大小加減溫中大黃湯治小兒暴冷水穀下并洞泄注下或乳冷下青結不消或冷實吐下乾嘔煩悶及冷滯赤白下者良若已服諸痢湯去實胃中虛冷乾嘔眼下陷煩擾不宜利者可除大黃若中乳冷乳母洗浴水氣未消飲兒遂為霍亂者但用大黃小兒諸霍亂宜溫和除之大黃六分桂心厚朴去粗皮薑汁炒甘草炙乾薑炮已上各一分人參茯苓去黑皮白术當歸焙已上各二分桔梗三分炒梔子二分黃芩澤瀉各三分右以水二升半煮取八合凡兒三十日至六十日一服二合七十日至一百日一服二合半二百日已來一服三合白术散治小兒赤白痢腹內㽱痛羸弱不能飲食白术人參去蘆頭各半兩厚朴三分去粗皮薑汁炙令香熟黃連去鬚當歸二味各微炒地榆木香桂樹皮微炙甘草炙各半兩右為散每服一錢水一小盞煎至五分去滓不計時量兒大小分減溫服地榆散治小兒赤白痢煩渴寒熱腹痛羸瘦不欲飲食地榆三分微炒醋石榴皮半兩微炒龍骨一兩燒赤當歸半兩微炒黃耆半兩阿膠三分搗碎炒黃連三分去鬚銼微炒赤石脂一兩燒赤烏梅肉半兩微炒右為細散每服以粥飲調下半錢不計時量兒大小加減服之訶梨勒散治小兒赤白痢腹脹疼痛不欲飲食四肢瘦弱訶梨勒三分煨用皮當歸炒黃芩龍骨地榆炒乾薑炮陳皮白术甘草炙各半兩右為散每服一錢水一小盞煎至五分去滓不計時量大小加減溫服小香連丸治小兒瀉痢赤白脾胃虛弱糟粕不化腹痛煩渴身熱并裏急後重黃連三兩乾薑炮一分當歸一兩半阿膠炒為末醋煎成膏一兩半右為末以膠膏為丸如小豆大三歲三十丸米飲下食前服一方醋糊丸大小加減當歸丸治小兒赤白痢不止腹痛當歸焙半兩黃連去鬚龍骨人參各一分無食子炮二枚鹿角鎊豉炒各一分右為末煉蜜丸如麻子大每服五十丸溫米飲下空心午後各一服量大小加減訶梨勒丸治小兒赤白痢裏急後重訶梨勒煨去核地榆炒醋石榴皮炙焦髙良薑赤石脂各半兩吳茱萸湯洗炒一分黃連去鬚三分右為末煉蜜為丸如麻子大每服七丸溫米飲下空心午後各一量兒大小加減小兒暑月多吐瀉其證最宜詳審用藥不可差謬有伏暑吐瀉者小水必不利宜服五苓散香薷散有傷食吐瀉者其吐及糞皆有醋臭氣宜感應丸三方易知今不復載瀉多日口唇齒俱白及瀉糞頗多者因冷成也宜以六神散每二錢匕加附子末一錢煎三四服防變癎也白者疳瀉宜官局六神丸瀉者不可急以熱止之若止變成痢凡痛者皆因有積赤痢熱積白痢冷積赤白痢冷熱不調積也赤多白少者熱多冷少也白多赤少冷多熱少也御米飲子治赤白痢罌粟殼半兩人參一兩厚朴一兩