黃蘗當歸各二分香豉一合綿裹右切以煮銀水重濾一升半煮取九合分服以瘥為度秋末冬末加赤石脂半兩乾薑一分白术二分大小量之忌如常法黃連湯治小兒膿血滯痢并冷痢腹痛當歸切一兩黃連去鬚三分桂去粗皮三分赤石脂一兩一分人參三分乾薑白頭翁甘草各三分龍骨附子各一兩炮右銼如麻豆大每一錢水七分煎至四分去滓分二服空心午後各一量大小加減冷去白頭翁加牡蠣三分羚羊角湯治小兒熱痢下血并體熱心煩口乾不欲飲食四肢羸瘦羚羊角屑茜根吳藍各三分黃連去鬚赤石脂地榆當歸炒阿膠炙一兩黃芩去心甘草半兩右搗篩每服二錢水一盞煎至五分去滓溫分三服人參散治小兒膿血痢久不瘥腹痛不欲飲食人參去蘆當歸炒地榆阿膠炒黃黃連炒子芩黃蘗炒赤芍藥蕪荑炒厚朴去粗皮薑汁炙各半兩右為散每服一錢水一盞入薤白一莖豉五十粒煎至五分去滓不計時量大小加減赤石脂散治小兒下痢膿血腸鳴腹痛亦治赤白痢赤石脂研龍骨研地榆黃連去鬚各一兩人參三分厚朴去皮薑汁塗五遍炙當歸焙乾薑炮製各半兩右為散每服半錢米飲調下日三服或煉蜜丸如梧子大乳汁下五丸至七丸空心午後各一量大小加減肉豆䓻散治小兒膿血痢肉豆䓻二枚去殼當歸焙蜜陀僧研訶梨勒去核黃連去鬚枳殼麩炒各一分龍骨半兩乾薑炮半兩右為散每服半錢空心米飲調下隨兒大小加減沉香豆䓻丸治小兒乳哺失宜冷熱不調熱衝上膈冷歸下焦致虛實不等水穀不化遂傷泄痢夾積則變為下痢膿血當歸木香白术各一兩沉香白芍藥人參去蘆頭蓬莪荗縮砂仁各一錢半右為細末麵糊丸如黍米大每服十丸二十丸米飲下量大小加減黃連丸治小兒膿血痢并赤白痢黃連去鬚龍骨研黃芩去心白石脂研當歸焙赤石脂研各三分烏梅肉炒半兩右為末研令勻煉蜜丸如麻子大每服五丸空心晚食前各一服米飲下量大小加減鮓湯丸治小兒瀉痢五色膿血如爛魚腸並無大便只是膿血腸中攪痛粉霜輕粉硃砂􅔈砂各一錢白丁香四錢乳香半錢巴豆七粒去皮心不去油右為細末蒸棗肉丸如小豆大三歲二丸煎鮓湯吞下候積下與調胃氣食前服建胃丹治泄痢並膿血日漸羸瘦黃連一兩炒龍骨白石脂神麴炒烏梅肉炒乾薑各半兩白礬二錢右為細末醋煮麵糊和丸如黍米大每服十粒米飲下量兒大小加減乾薑散治小兒下痢膿血腹痛腸鳴乾薑炮製一分黃連去鬚三分人參三分肉豆䓻去殼一枚當歸焙三分厚朴去皮薑汁塗五遍炙五錢右為細末每服半錢以粥飲調下空心午後各一量大小加減肉豆䓻丸治小兒下痢膿血腹痛虛煩肉豆䓻去殼訶梨勒炮去核各三錢蜜陀僧一錢人參白茯苓去皮各一分右為細末用燒粟米飯為丸如菉豆大每服七丸溫米飲下蠟茶丸治小兒下痢膿血寒熱不除豉八十粒炒黃大豆半兩炒黃香去皮黃連去鬚硝石各一分芫花醋炒焦巴豆二十粒去皮麩炒令香出油用右為細末入鎔蠟一分并煉蜜和丸如黍米大一二百日內每服二丸一二歲每服可五丸三四歲每服七丸米飲空心服隨兒大小加減樗根皮散治小兒膿血痢如魚腦後重臭樗根皮一分炒黃枳殼半分麩炒黃連半分去鬚炒蕪荑炒赤芍藥各半分右為散每服一錢水一小盞入豉三十粒蔥白一莖煎至六分去滓不計時量兒大小加減雞屎礬丸治小兒膿血痢不瘥漸加瘦弱雞屎礬一兩燒灰胡粉一分炒黃龍骨阿膠搗碎炒黃黃連去鬚各一兩右為細末煎釅醋為膏和丸如菉豆大每服以暖漿水下七丸日三四服量兒大小加減石榴皮散治小兒膿血痢酸石榴皮微炒乾薑炮製用黃連去鬚訶梨勒煨去核各一分右為細散每服半錢空心午後各一米飲調下隨兒大小加減乾藍湯一名吳藍散治小兒百晬內下痢如魚腦赤白雜痢腹痛多啼乾藍葉升麻芍藥各一兩梔子仁四枚右搗篩百晬至二百日兒每一錢以水半盞入香䜴七枚薤白一莖煎至三分去滓分溫三服隨兒大小加減食前服一方有龍骨如金散治小兒瀉痢頻併不食多渴膿血相雜腹中疼痛裏急後重心燥身熱甘草半兩炙烏梅罌粟殼三十箇蜜炙陳皮一分右㕮咀為散三歲一錢水半盞煎三分去滓食前服忌魚腥油膩肥甜等物一方用枳殼無烏梅白石脂散治小兒腸澼下膿血白石脂燒令赤一分亂髮燒灰一分甘草炙半兩右為細末每服一字至半錢早晨午後各一服米飲調下隨兒大小加減如聖散治小兒臟毒久痢下膿血鉛丹半錢􅔈砂皂子大膩粉一錢甘草五分右研為末用好棗一枚去核入在棗內用大麥麵裹煻火燒香熟為度去麵研為粉每一枚棗分兩服煎槐花湯調下日二治小兒膿血痢每日三二十行立效方一名揵散方見本門赤白痢類治小兒水氣腹腫兼下痢膿血小便澀用葶􅐗子半兩微炒搗如泥以棗肉和搗為丸如菉豆大每服五丸棗湯下空心晚後各一量兒大小加減服之治小兒久痢膿血濕熱方用艾葉伍升以水一斗煮取一升半分三服治小兒下痢膿血日夜無度腹痛裏急後重罌粟殼去穰梗炙人參陳皮甘草炙地榆阿膠搗碎炙燥木香各等分右為粗末一歲每服二錢水一盞煎至四分去滓溫服如冷痢純白即加乾薑炮等分如熱痢純赤即加黃連炒等分忌一切毒物普濟方卷三百九十七
