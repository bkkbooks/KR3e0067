二錢半右二味和勻每服二錢醋湯熱服如橫逆用童子小便好醋各一茶腳百沸湯四五分服一方等分白芷生用兼治腰脅痛濟生增損四物湯治産後隂陽不和乍寒乍熱惡露停滯亦令寒熱也但看小腹急痛為異當歸酒浸白芍藥川芎人參乾薑各一兩甘草炙半兩右㕮咀每服四錢薑三片水煎無時芍藥湯出保命集方治産後諸積不可攻當養去熱其病自退宜服芍藥一斤黃芩茯苓各六兩右三味為粗末每服半兩水煎日三去滓溫服治産後坐草多時寒熱所損腹中成塊忽衝心背臍腹疼嘔逆惡心不思飲食宜服此方須是大腹冷可喫也出護命方當歸一兩官桂桑寄生各半兩獨活豆䓻川芎各一兩細辛三株芫花醋炒土器內黃黑色十銖右為細末修製芫花研為末每服衆藥末二錢芫花末半錢共為一服空心土器內煎䓤湯調下熱服治産後頭冷項重頸軟非時聞頭靣上肌肉痺大腑虛冷頗出後又或無糞或時泄㵼兩足沉重少精神行步無力面色黃瘦或産後未經百日經後通行忽因誤喫涼藥有此疾候忽自懷孕時間通身寒冷至産後却有此疾但合硫黃丸與此藥相間服多服硫黃丸不妨也吃此一方了却修合下面一方喫此兩方各喫一料出護命方防風藳本澤蘭獨活各一兩五味子川芎白芷當歸破故紙炒白术石斛續斷各半兩右為細末煉蜜丸如梧桐子大早晨空心鹽湯下五十丸治産後亂喫物致傷損血氣身體虛弱飲食減少眼如貓兒出護命方當歸續斷官桂各半兩芍藥桔梗羌活芫花醋煮炒金黃黑川芎各一分牽牛炒細辛各三株右為細末每服四錢水一盞二分煎取一盞空心和滓喫只用土器內煎治産後肝氣虛弱風邪所中肝氣既虧不能生心心乏生氣非時驚恐一切産後有虛冷中驚悸之侯大腑虛冷此三方藥不可闕一出護命方當歸石斛五味子川芎各半兩防風破故紙炒獨活藳本白术各一分右為細末煉蜜梧桐子大早晨空心木瓜二片鹽少許同煎湯下五十丸治産後肝虛中風其狀頭冷痛忽偏痛至晚即痛但頭痛時間頭骨內冷痛大腑不調喫食減少宜服此藥若是發熱頭痛即不可喫此方出護命方當歸防風桑寄生甘草細辛獨活川芎各一分右為細末每服一錢半水一盞煎取九分間頭冷痛發作時即空心喫治産後正氣不足咽喉乾口無津液飲食減少大腑不調又似虛弱之故不可涼其上隔宜服此生液寄生散出護命方桑寄生半兩人參一分甘草炙三株沉香一株右為細末非時口含化咽津每服一錢八分水一盞煎至六分時喫亦得治産後大腑虛冷却因用性淤怒其氣上逆因而血暈其狀頭覺重痛昏昏如醉思睡語聲低小宜喫此方若是大腑熱并血暈時壯熱頭痛不可喫此藥已有上見藥方出肘後方麻黃去根延胡索川芎防風各一分官桂去皮半兩右為細末每服一錢半水一盞煎取九分非時去滓喫不要多喫病住即止藥治産後大腑虛冷因怒後成血暈喫前方藥末效却更加頭痛壯熱面赤如醉宜喫此方出護命方牡丹皮去心荆芥穗羌活麻黃去根各一分右為細末每服二錢水八分一盞煎一兩沸急㵼出食後徐徐去滓熱喫病減即住藥治婦人忽因經候行時忽因産後喫生冷不相當之物忽産後起早衝風傷損血氣俱病經候過多臨經候行時氣痛不可勝忍方但婦人血氣痛俱可與此方出萬全護命方當歸續斷獨活艾葉炙芍藥木香芫花醋土器內炒微黃官桂各一分延胡索川芎牛膝各半兩右細杵羅為末每取二錢半土鉢內煎蔥湯調下空心喫若喫數服未安其人必大腑熱每服添熟牽牛子半夏末半錢喫治産後小遺登後早蔥亂物早宫臟傷風飲食減少近十日遠經半月飲引食不進才喫一口湯水即聞所喫湯水巡歷方由胸中而下入胃既入胃仍舊不出面色青黃形體困重宜服此方若得此病須是每日喫得一兩盞酒方可延得半月未死急宜治之細辛官桂川芎當歸各半兩羌活藿香各一分吳茱萸三朱甘草炙四株右為細末每服三錢空心煎防風湯調下喫了渾身手足暖忽頭痛即連喫一二盞候通身發熱忽行下惡血物即便安樂也若人得此病須是依得上面題目方可喫此藥治産後熱悶氣上衝變為腳氣者何答曰産卧血虛復因春夏取涼過多地之蒸濕因足履之而為腳氣之狀熱悶掣瘲驚怖心煩嘔吐氣上皆其候也服小續命湯二三服自愈醫人誤遂以敗血藥攻之則血去而疾盛增矣人參黃芩桂去皮麻黃去節防已川芎甘草白芍藥白术各二錢附子炮黑一錢防風一錢半右計一兩一錢半銼末作四服生薑五片水二盞煎一盞溫服評云腳氣故是常病未聞産後能轉為者初不知腳氣得之不覺因他病之後血氣方發産後既虛發則無疑小續命湯知其證加木瓜煎引入經絡治之切忌湯藥淋洗治産後壯熱頭痛頰赤口乾唇焦多煩渴燥昏悶不爽松花川芎石膏蒲黃等分右為末每服二錢水二合紅花一捻同煎七分去滓粥後溫溫細呷治産後下白涕不止方當歸白芷各一兩杜仲去皮蓽薢各半兩兔絲子半兩牡蠣火煆三分艾葉炙龍骨川芎各一分山茱萸半兩右為細末兩三次羅如飛塵空心鹽湯下三錢濟危上丹治産後所下過多虛極生風氣無所主唇靑肉冷汗出目嗔神昏命在須臾乳香研五靈脂糖心香潤水淘出砂生硫黃别研阿膠炒玄精石别研極細四味和瓦器微炒再研生卷柏焙桑寄生無以續斷代淨陳皮各等分右後四味細末和前藥地黃汁和丸梧子大每服二十丸空心當歸酒下紫湯破血去風除氣防熱産後兩日尤用服之用烏豆五升選擇令淨清酒一斗半炒豆令煙向繞投入酒中看酒赤紫色乃去豆量性服可日三盞如風中口噤即加雞屎白二升和熬投酒中神驗治産後血病取􅂒藥乳及水煮服之治婦人産後冷血以櫓炒令黑及熱投酒中漸漸飲之治産後疾以蓼蕎作羮食之良治婦人虛羸勞損因産瘦血氣結積腹內冷痛腸鳴下痢腰痛癥瘕崩中大下以淡菜燒食一頓令飽大效又名殼菜常時頻燒食即若不宜人與少米先煮熟後除肉內兩邊鎖及毛了再入蘿蔔或紫蘇或冬瓜皮煮作臛食之治産後血氣暴虛汗出用淡竹瀝三合微暖服之須臾再服治産後惡露不盡怯起衝心腹中攪痛及經絡不通以細研乳頭香為末方寸匕酒煎蘇方去滓調服立下惡物差治産後祕結膨脹不通轉氣急坐卧不安以大麥蘖末一合和酒服食良久通轉驗治産後諸血氣以白馬屎汁溫服之治婦人産後腸中癢不可忍以針線袋安所卧褥下勿令知之治産後破血止血渴以小白芋煮食之飲其汁良治婦人産後腹中癢用箭簳及鏃安所卧席下勿令婦人知治産後諸疾結痛血上欲死以倒挂藤煮汁服之聚珍丸出朱氏集驗方治婦人小産後虛羸百節疼痛不進飲食百藥不效艾煎丸卷柏丸茴香丸烏雞煎丸巴戟丸右五味合作一藥鹽湯溫酒任下兼服沉香荆芥散張氏方治幼婦初産傷水多有此證殺人最急用鰾膠為末酒服滓傅傷處集驗方防風天南星等分右為末酒服仍以傅傷處南星為防風所製不能麻人海上方新産便用此方可無破傷風之患苦薺煎沸湯候通手淋洗又馬齒莧煎湯熏洗治産後血痛如刀刺出大全良方熟地黃橘皮等分右為末每服一錢粥飲調下尋常痛發可常服治産婦血滿腹脹痛血渴惡露不盡月閉止好血下惡血去鬼氣痃痛癥結出本草取芒硝燒為末酒下或以酒煮彌久著煙者佳治産後傷冷腰痛動不得者用蒴藋葉火燎厚鋪床上趂熱即卧於上冷復易之冬月取根杵碎炒及熱準前用産後調補凡産後七日內惡血未盡不可服湯候臍下塊散乃進羊肉湯有痛甚切者不在此例後三兩消息可服澤蘭丸此至滿月丸盡為佳不爾虛損不可平復也全極消瘦不可救者服五石澤蘭丸凡在蓐必須服澤蘭丸補之服法必七日外不得早服也若産後將息如法四肢安和無諸疾者亦須先服黑神散四服亦略偹補益丸散之類不可過多又恐因藥致疾不可不戒如四物湯四順理中丸內補當歸丸當歸建中湯或産婦血盛初經生産覺氣悶不安者調七寶散服之若寧貼不須服若三日後覺壯熱頭痛胸腑氣刺者不可便作傷寒風治之此是乳脈將行宜服玉露散一二服如無此證不須服若因床帳大暖或産婦氣盛或素多喜怒覺目眩暈如在舟中車內精神鬱冒者此是血暈即須服血暈藥一二服止仍須看承之人照管體問也或覺粥食不美虛困即服四順理中丸一二服若不如此不須服若於兩三日間覺腹中時時撮痛者此為兒枕作痛必須服治兒枕藥二三服若大便祕或小便澀切不可服通利藥以其無津液故也若通利之藥則滑泄不禁不可治也切須戒之若祕甚必欲通利者方可服和暖湯即通凡産後宜常進溫粥食勿則熱熱則滯血七日之後方可與酒及些鹽味煮羊肉豬蹄肉及豬肚中物忌母豬及白蹄豬宜烏雞及雞蛋暖血食物不宜過多及生冷肥膩恐成積滯大抵正産止是血臟空虛補其虛生好血化惡血保其臟氣去其風邪耳方地黃羊脂煎出海上方治婦人産後欲令肥白飲食平調方見本門産後虛羸類羊肉湯出千金方治産後及傷寒大虛上氣腹痛兼微風茯苓黃茋乾薑各三兩甘草獨活桂心人參各二兩麥門冬七合生地黃五兩大棗十枚二肥羊肉二斤無羊肉用麞􅍪代右㕮咀以水二斗煮肉取水一斗內藥煮取三斤半分四服日三夜一一方無乾薑産後醋墨出大全良方以松煙墨不拘多少用炭火煆通紅以米醋淬之再煆再淬如此七度研令極細用絹羅過才産了喫醋墨三錢用童子小便調下四順理中丸出千金方治産後氣血俱傷五臟暴虛四肢羸弱少氣多汗直至百晬每日常服壯氣補虛調養臟氣蠲除餘疾消穀嗜食兼治産後臟虛嘔吐不止㵼附子甘草人參白术乾薑各一兩右為細末蜜丸如梧子大每服十丸增至二十丸溫米飲湯調下才産了以童子小便打開點服七日內三日服産乳方云此乃大理中丸加甘草兩倍耳然其功比之四味等物分大故不同蓋取甘味以緩其中而通行經絡之功最勝者也此産婦月內不可闕者出月不須服矣古方中有婦人補益之藥大澤蘭丸小白微丸熟乾黃丸大聖散之類其藥味稍衆而中下之家村落之地卒何以致且藥肆少有真者不若以四順理中丸易之較其功此澤蘭丸之類主治頗多也産如未出月飲酒或喫藥宜造黑豆酒用淨黑豆一升炒令甚熟以無灰酒五升淋之仍入羌活一兩同浸尤妙時時飲之或用此酒下藥可以辟風邪養血惡露行乳脈當歸人參散治産後虛損痿弱難以運動疼痛胸滿不思飲食當歸白术黃芩芍藥大黃茯苓陳皮各半兩人參黃耆厚朴薑製川芎官桂各三錢甘草一兩枳殼四錢去穰麩炒右末每服三錢水一盞半薑三片煎至六分去滓不拘時溫服如大便閉以此散下和中丸治新産婦用黑雄雞一隻理如食法和五味炒熟香即投二升酒中封口經宿取飲之令大肥白治新産婦用黑雌雞和烏油麻二升熬令黃香末入酒酒盡極效補中丸宜常服川芎白芍藥黃耆當歸人參陳皮各半兩白术地黃各一兩右為丸煉蜜如梧子大每服五七十丸溫水下滋血湯滋養榮血補婦人諸虛治血海久冷當歸川芎芍藥人參麥門冬牡丹皮阿膠各三兩琥珀三分别研酸棗仁炒粉草桂心各兩一半夏麯二兩半右為粗末每服三錢水一盞薑三片煎七分去滓溫服一日三服大保生丸調和本氣主療諸疾滋補榮衛久服之大有功益人參藳本白茯苓當歸乾地黃赤石脂白芷玄胡索肉桂白薇白芍藥川芎白术甘草牡丹皮沒藥各半兩右為細末煉蜜丸如彈子大每服一丸溫酒化下空心食前服之滋隂丹駐養血和氣調順榮衛充盛肌膚活血駐顔久服大補衝任勻順月經神良不可具述熟地黃白茯苓人參各三兩甘菊花枸杞子黃耆丹參柏子仁炒白芍各一兩生地二兩右為細末蜜和丸如梧子大每服五十丸至六十丸米飲空心下日進二三服八珍湯和榮調衛理順隂陽滋血氣進美飲食當歸川芎赤芍藥熟地黃人參茯苓甘草縮砂仁各等分右為粗末每服三錢水一大盞入生薑七片棗三枚去核同煎三五沸去滓放溫空心日三服人參養血丸治女人稟受怯弱血氣虛損常服補衝任調血脈宣壅破積退邪熱除寒痺緩中下堅脹安神潤顔色通氣悶兼治婦人懷身腹中絞痛口乾不食崩傷眩暈及産出月羸瘦不復常者人參赤芍藥川芎菖蒲各一兩炒作蒲黃當歸二兩熟地黃五兩烏梅肉三兩右為末蜜搜杵數千下丸如桐子大每服五十丸至百丸溫酒米湯任下食前服拱辰丹治當壯年而真氣猶怯此乃稟賦素弱非虛衰而然也􅑒燥之藥尤宜速戒勿謂手足厥逆便云隂多如斯之證治之不惟不能愈疾大病自此生矣滋益之方羣品稍衆藥力細微難見功效但固天元一氣使水升太隂則五臟自和百病自去此方主之鹿茸酥炙去毛皮角山茱萸新好有肉紅潤者川當歸各四兩麝香半兩别研右為末入麝香拌勻酒煮麵糊為丸如梧桐子大每服百粒或五十粒溫酒鹽湯下暖宫丸當歸川芎禹餘糧醋淬七次各一兩附子炮去皮桂心各三兩右為細末酒糊丸如梧桐子大空心酒服三十丸日進二三服增至五七十丸治産後更無他狀肥羊肉脂當歸二兩生薑六兩右切以水一斗闕溫分服若覺惡露下不盡加桂心闕兩闕藭闕兩覺有氣加細辛二兩覺有加闕地黃汁二合闕庵劉尚書第五子闕卿叔謙之內李闕母不得而情動於中又闕勞後四肢困倦躁闕減少食則嘔吐弱闕急情嗜卧醫作傷寒以闕又以小柴胡大柴胡之類治之至十餘日之後病闕生家前藥闕無效莫非宅證否醫曰此傷六經傳變至再經得汗則愈異日見爪甲微青黑色足䟰至腰如水目上視覩不轉睛咽嗌不利小腹上衝而痛嘔吐不止息氣欲絶以為不救日久命視之具説病證及所服之藥豫診其脈沉細而微此中氣不足妄作傷寒治之發表攻裏中氣愈損壞證明矣大夫人泣下避席曰病固危困君盡心救治豫笑以辛熱之藥㕮咀一兩作一服合夜藥熱而不能飲續續灌之下一時飲至半夜稍有吟呻之聲體漸溫忽索粥飲至旦食粥兩次又煎服投之至日高衆醫診之曰脈已生證已回矣衆喜而退後三日大夫人曰病人大便不利或曰以脾約丸潤之可也豫曰前證用大辛熱之劑陽生隂退而愈以大黃之劑下恐寒不協轉生他證衆以為不然遂以脾約丸二十丸之至夜下利而行異日而色漸青精神困弱嘔吐復行豫再以辛熱之劑溫之而愈名曰溫中益氣湯溫中益氣湯附子炮去皮臍五錢乾薑炮五錢丁香二錢藿香二錢吳茱茰一錢半炙甘草三錢當歸一錢草豆䓻二錢益智仁二錢人參一錢半白术二錢陳皮一錢半白芍藥二錢內經曰寒淫于內以辛熱佐以苦甘溫附子乾薑大辛助陽退陽故以為君草豆䓻益智仁丁香藿香吳茱茰辛熱溫中上吐為臣人參當歸白术陳皮白芍藥炙甘草苦甘溫補中益氣和血脈脅力為佐右件㕮咀每服五錢水二盞煎至一盞去滓溫服食前病人服一兩治産後餘惡血未下因感風邪與熱血相摶壯熱頭痛面赤如醉人眼色痙急昏悶不醒身如在虛空見食即吐食不住腹宜吃此方出護命方麻黃去根三分麥門冬去心黃芩牡丹皮去心羌活大黃炮熱荆芥穗山梔射干各半兩官桂去皮一分右為細末不要熬只生杵每服二錢濃薄荷湯調下大腑祕熱出後不通煎前面藥二錢半取汁調下牽牛末一錢半半夏末一字和滓吃大腑不熱不服牽牛半夏末琥珀地黃丸出護類鈐方治産後惡露不行增寒發熱如瘧晝日明了暮則譫言當作熱入血室琥珀别研延胡索糯米炒去米當歸各一兩蒲黃四兩炒香生地黃裂汁留滓生薑各二斤研汁留滓生薑汁石器內炒地黃滓以地黃汁炒薑滓各令汁乾右為末蜜丸彈子大空心當歸湯下兼服四物湯只用地黃加北柴胡煎末退再加小柴胡生地黃黃芩治産後血不出用懸鈎根皮濃煮汁服之普濟方卷三百四十五
