body:
  text: 普濟方卷三百四十五明周王朱橚撰産後諸疾門産後諸疾附論凡婦人非止臨産須憂至於産後大須將慎危篤之至其在於斯勿以産時無他乃縱心恣意無所不犯犯時微若秋毫感病廣於嵩岱何則産後之病難治於餘病也婦人産訖五臟虛羸惟得將補不可轉㵼若其有病不須駃藥若行駃藥轉加增虛就中更虛向生路遠所以婦人産後百日以來極須殷勤憂畏勿縱心犯觸及即便行房若有所犯必身反強直猶如角弓反張名曰蓐風則是其犯候也若似角弓命同轉燭凡婦人皆患風氣臍下虛冷莫不由此早行房故也凡婦人坐産畢且飲冷童子小便一盞不得便卧且宜閉目而坐須臾方可扶上仰卧不得側卧宜屈膝未可伸足髙倚床頭厚鋪茵蓐遮圍四壁使無孔隙免被賊風兼時時令人以物從心擀至臍下使惡露不滯如此三日可止仍不可令多卧如多卧看承之人宜頻喚醒舊説産婦分娩了三日方可上床若三日上床則必就地睡卧又豈可令産婦近地氣乎才生産畢且先研醋墨三分服之一法云不可服醋墨有傷肺經成咳嗽之戒誠過慮也然醋墨本破凝結之血然不可用大釅之醋仍不可太多即不至傷肺然所在皆同亦有不吃者更産後三日內令産婦嘗聞醋炭氣或燒乾漆煙若無乾漆以破舊漆器燒之以防血迷血逆血暈不省之弊夏月宜於房外燒磚以醋沃置於房中夏月房中不須著火及煮粥煎藥之類分娩之後須臾且食白粥一味不可令大飽頻少與之為妙遂日漸增之煮粥時須是煮得如法不用經宿者又不可令溫冷不調恐留滯成疾仍時與童子小便一盞飲之亦須預偹小便若遇夏月以薄荷養之新産後不問腹痛有病無病以童子小便以酒和半盞溫服五七服妙一臘七日也之後方可少進醇酒并些小鹽味一法才産不得與酒緣酒引血逆入四肢兼産母臟腑方虛不禁酒力熱酒入腹必至昏悶七日之後小進些酒不可多飲如未出月間欲酒吃或服藥者可用淨黑豆一升炒至無煙以無灰酒五升燒淋仍加好羌活一兩洗淨拍破同浸尤妙當用此酒下藥或時時飲少許可以避風邪養氣血下惡露行乳脈也如産婦素不善飲酒或夏月之間亦不許強飲一臘之後恐吃物無味可爛煮羊肉或雌雞汁略用滋味作粥飲之或吃爛粥豬蹄肉忌母及白蹄豬肉不可過今江浙間産婦多吃熟雞子云補益亦風俗也三月之後方可少食溫麥麵成腫疾因食麵早也凡吃物過多恐成積滯若未滿月不宜多語喜笑驚恐憂懼哭戚思慮恚怒強起離床行動久坐或作針線用力工巧恣食生冷粘粳果菜肥膩魚腥之物及不避風寒脫衣洗浴或冷水洗濯當時未覺大損滿月凡言滿月者謂滿三月非三十日也之後即成蓐勞手腳及腰腿痠重冷痛骨髓間颼颼如冷風吹雖有名醫亦不療又不得夜間獨處緣去血心虛恐有驚悸切宜謹之所有血衣洗濯不得日中曮曝免致邪祟侵傷又不得濯足恐血氣攻下又不得刮舌傷心刷齒及就下低頭皆成血逆血暈此産家謹護之常法也滿月之後尤忌任意飲食觸冒風寒恣意喜怒梳頭用力高聲作勞工巧房欲及上髙厠便溺之類如此節養攝至百晬始得血氣調和臟腑平復自然安帖設不依此即至産後餘疾矣産婦心下堅大如旋盤乃飲水所作名曰氣分婦人童幼至天癸未行之間皆屬少隂天癸既行皆從厥隂論之天癸巳絶乃屬太隂經也治胎産之病從厥隂經無犯胃氣及上三焦為之三禁不可汗不可下不可利小便發汗者同傷寒下早之證利大便則脈數而已動於脾利小便則內亡津溢胃中枯燥製藥之法能不犯三禁則榮衛自和而寒熱止矣如發渴而白虎氣弱則黃茋血刺痛而用以當歸腹中疼而加之芍藥大抵産病天行從增損柴胡雜證從增損四物宜詳察脈證而用之方當歸散出大全良方療産後氣血俱虛慎無大補恐增客熱别致他病常令惡露快利為佳及治腹痛當歸芍藥川芎黃芩各一兩白术半兩右為細末溫童子小便或酒調下二錢如腹不痛者米飲調之妙加減四物湯便産須知治産後血虛發熱或日間明了暮則發熱增寒當歸川芎生地黃山柴胡右等分每服三錢水一大盞煎至六分去滓服薤白湯出千金方治産後胸中煩熱逆氣薤白半夏甘草人參各二兩石膏四兩知母二兩括蔞根三兩麥門冬半升右㕮咀以水一斗三升煮取四升去滓分五服日三夜二熱甚即加石膏知母各一兩一方無石膏療如覺煩熱便産須知用圓白半夏不拘多少淨洗湯泡七次為末如大豆納鼻中即醒醫學發明云産前寒熱小柴胡湯中去半夏謂之黃龍湯主之治血氣逆心煩滿出肘後方用生竹皮一斤水三升煮取一升半分為再服皂甲散治産後魅川楝皮皂角樹皮各一斤皂角核一合石蓮一合去心右為粗末煎湯乘熱以物為定熏通手洗於淨房中就熏洗處鋪薦席才洗了次帛挹乾便吃玉露通真丸熱酒下二丸便仰睡芎歸湯一名立效散出百一選方治婦人産後忽兩乳伸長細小如將腸垂墜直過小肚下痛不可忍危在須臾名曰乳懸兼治産後惡露不下腹痛或下血太多眩暈不能支吾妊娠胎動腹痛下血川芎當歸各二斤右將芎歸各半斤㕮咀於瓦器內用水濃煎不拘時候多少溫服餘芎歸各斤半銼作大塊用香爐慢火逐旋燒煙安在病人面前卓子下要煙氣直上不絶令病人低頭伏卓子上將口鼻及病乳常吸咽氣直候用此一料藥盡看病證如何或安或全未安或略縮減再用一料如前法煎服及燒煙熏吸必安如此二料已盡雖兩乳略縮上而不能復舊者用冷水磨萆麻子一粒於頭頂心上塗片時即去則全安矣此通真子祕方一方加縮砂腹中刺痛加芍藥口乾煩渴加烏梅麥門冬發寒加乾薑白芍藥水停心下微有嘔逆加茯苓生薑虛煩不得眠加人參竹葉大便閉澀加熟地橘皮杏仁小便不利加車前子腹脅膨脹加厚朴血崩不止加香附子咳嗽痰多加紫苑半夏生薑腰痛腳痛加牛膝心下疼痛加玄胡索惡血不下腰腹重痛加牡丹皮煎治婦人臨産服催生藥驚動太早未當離經而用力大過以致育膜有傷産後水道中垂出肉線一條約三四尺長牽引心腹痛不可忍以手微動之則痛苦欲絶龍興鐵柱觀前有一産婦患此諸醫皆用失笑散雖略止痛而不能得肉線離脫後有一道人來問證因白諸醫用失笑散儘不瘥但不能絶根乃買老薑三斤淨洗不去皮於石鉢內研爛用清油二斤拌勻入鍋內烚熟以油乾焦為度先用熟絹一假約五尺長摺作結方令穩重婦人輕盛起肉線使之屈曲作一團納於水道中却用絹袋兜裹油薑稍溫傳在肉線上熏覺薑漸冷又用尉斗火尉熱使之常有薑氣如薑氣已過除去又用心如此熏尉一日一夜其線已縮大半再用前法越兩日其肉線盡入腹中其病全安不復痛矣却服失笑散芎歸湯補理道人云此乃魏夫人祕傳怪病方切不可使肉線斷作兩截一斷則不可醫當歸散出大全良方治産後補虛益血當歸羌活各一兩延胡索五錢右為細末用豬腰子一隻切作片以水一盞入藥末二錢同煎至七分同腰子喫蓬莪术散出大全良方治産後血海氣虛腹臟疼痛心胸注悶每遇經脈行或多或少及有積塊者莪荗桃仁去皮尖炒大黃濕紙煨當歸炒各一兩桂心川芎木香牡丹皮延胡索炒赤芍各五錢右為細末溫酒調一錢空心臨卧服療産後大虛心腹急痛血氣上搶心氣息乏補益方出大全良方黃茋白术當歸甘草各二兩生薑四兩人參二兩右先以白羊肉三斤去膜以水一斗九升煮肉取汁五升後下諸藥更煎取三斤分溫三服得勝丸治婦人産後血氣虛冷腰腹大痛便利膿血川烏炮去皮一兩五靈脂二兩沒藥二錢右為細末醋糊為丸如豆大每服二三十丸食前酒下竹根湯出千金方治産後虛煩甘竹根細切一斗五升右以水二斗煮取七升去滓用小麥二升大棗二十枚復煮麥熟三四沸內甘草一兩麥門冬一升湯成去滓服五合不瘥更服取瘥短氣亦服之蘇麻粥便産須知治産後鬱多汗汗則大便祕難於用藥唯此粥最佳此粥不獨産婦可服老人諸虛人風祕皆可服昔有老人年八十四歲風祕臟腑壅血氣聚膈中腹脹惡心不喜食氣上攻頭目頭神昏迷此藥氣血結糞自下諸病悉去紫蘇子大麻子淨洗各半兩右為細研用水再研濾汁一盞分二服煮粥食淡竹茹湯治産後虛煩頭痛短氣欲絶心中悶亂不解生淡竹茹麥門冬小麥各五升甘草一兩生薑三兩産寶用乾葛大棗十四枚産寶用石膏三兩右㕮咀以水一斗煮竹茹小麥取八升去滓乃內諸藥煮取二升去滓分二服羸人分作三服若有人參入一兩若無人參內茯苓一兩半亦佳人參茯苓皆治心煩悶及心虛驚悸安定精神有則為良自無依方一劑不銼更作苦氣逆者加半夏二兩芍藥梔䜴湯出拔捽方治産後虛悶不得眠芍藥當歸梔子各五錢香豉半合右如前修産後傷寒便同下後變證治産後煩渴潮熱出危氏方用五苓散枇杷葉去白毛蜜塗炙用麥門冬二十粒去心煎湯服方見寒暑濕門中暑類治産後心悶手腳寒熱氣力欲絶血暈連心頭硬及寒熱不禁用接骨木破如算子一握以水一升煎取半升分溫二服或小便數惡血不止服之即瘥此木可煮三次其力一般此是起死人方治産後心悶手足煩熱厭厭氣欲絶血暈心頭硬作熱增寒忍不禁出肘後方用續斷皮一握銼以水三升煮取一升分三服服如人行二三里再服無所忌此藥救産後垂死治産後心悶手足煩熱氣力欲絶血暈心頭硬及寒熱不禁出肘後方用玄胡索炒搗為末酒服一錢匕亦治穢汚不盡腹滿千金三物黃芩湯治婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者此湯主之黃芩一兩苦參二兩乾地黃四兩右以水八升煮取二升溫服一升多吐下蟲腎氣湯治婦人病飲食如故煩熱不得卧而反倚怠者何也師曰此名轉胞不得溺也以胞系子戾故致此病但利小便則愈乾地黃八兩薯蕷四兩山茱茰四兩澤㵼茯苓三兩牡丹皮三兩桂枝附子炮各一兩右㕮咀以水六升煮取二升去滓分三服日三人參當歸散出大全方治産後去血過多血虛則隂虛隂虛生內熱內熱曰煩其證心胸煩悶吸吸氣短頭痛悶亂骨節疼痛脯時輒甚與大病虛煩相類急宜治之人參當歸乾地黃桂心各一兩白芍二兩麥門冬一兩右㕮咀每服四錢水二盞先將粳米一合淡竹葉十片煎至一盞去米竹葉入藥并棗三枚煎去七分去滓溫服虛甚者用熟地黃食前服一方血熱甚者加生地黃産後榮血暴竭便産須知治婦人血禁失音衝惡用鑰匙以生薑醋小便煎服弱房人煎湯服亦得用大劑芎歸湯方見本門諸疾類艾煎丸出衛生家寶方治婦人産後血海虛弱面無顔色腹痛身體倦怠艾葉去梗一斤乾薑半斤當歸四兩洗附子二個炮去皮尖切白芍藥半斤熟乾地黃四兩洗右五味各切細用米醋五升煮乾取出焙乾為末醋糊丸如桐子大每服三五十丸酒下不吃米飲食前忌生冷物又方燒荔枝核灰研和服烏金散出衛生家寶方治婦人産十八種疾宜預服不生諸病沒藥半兩生血餘半兩男子者燒灰紅花子一分生伏龍肝一分研當歸半兩微炒乾柏葉一分爛杵赤龍鱗半兩鯉魚鱗燒灰存性香墨一分燒紅米醋淬凌霄半兩生右為末每服二錢熱酒下不拘時候酒不宜多玄胡索散産經治産後血氣攻刺疼痛不止及新舊虛實痛不止當歸酒浸玄胡索赤芍藥蒲黃紙隔炒乳香水研桂不見火去皮沒藥各五錢右計七味細末挑三錢酒調空心下四物湯産經治大産小産對證合服立效腹中刺痛惡物不下加當歸芍藥各半錢口舌乾欲飲水加括􅌣麥門冬去心各一錢水停心下微吐逆