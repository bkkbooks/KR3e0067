body:
  text: 普濟方卷六十三明周王朱橚撰咽喉門咽喉腫痛夫足太隂之脉屬脾絡胃上膈挾咽連舌本足陽明之脈其支者從人迎前下人迎循喉嚨是知咽喉者脾胃之候也脾胃有熱風毒乗之其上氣衝經絡胥慮故喉咽為之腫痛或為風毒腫痛或連頸外痛甚則水漿不下便能殺人其候有使人寒熱似傷寒者宜急治之咽喉卒腫痛者脾肺暴熱胸膈壅滯上攻咽喉故發腫痛也亦有服餌丹石過度毒氣在胃多嗜五辛酒麫傷於脾肺皆致此疾源雖不同其為熱則一方龍麝聚神丹出濟生拔萃治心脾客熱氣攻衝咽喉赤腫疼痛或成咽癤或結硬不消愈而復發經久不瘥或舌本腫脹滿口生瘡飲食難嚥並宜服之川芎半兩生地黄犀角屑南琥珀南元參桔梗連翹各半兩馬牙硝赤茯苓去皮人參牛黃研麝香研腦子研升麻各三錢朱砂飛半兩金箔五片鉛白霜一錢南硼砂各研一兩右為細末煉蜜為丸毎兩作十五丸用金箔為衣毎服一丸用薄荷湯化下或新水化服亦可更或細嚼服并噙化嚥津皆可服食後臨卧進三兩服袪毒牛黃膏治大人小兒咽喉腫痛舌木强硬或滿口生瘡涎潮喘急胸膈不利飲食難進牛黃研二錢半人參一兩南琥珀南硼砂犀角屑研細桔梗生乾地黃各半兩雄黃煉二錢川升麻三錢南元參三錢蛤粉硃砂研飛七錢鉛白霜一錢腦子三錢金箔寒水石燒赤去火毒三兩研右為細末入研藥勻煉蜜丸如小彈子大金箔為衣用滋器收毎服一丸濃煎薄荷湯温化下或新汲水化服亦可食後日進三兩服更或噙化嚥津亦可沈香湯治咽喉腫痛不得語卒中風毒入於喉間舌强頭面身體疼痛咽喉閉塞氣欲絶者沈香剉木香射干防風去义甘草炙當歸切焙黄芩去黒心升麻薫陸香藿香葉雞舌香各一兩獨活去蘆頭三兩麻黄去根節先煎掠去沫焙三分大黄剉生用二兩右粗搗篩每服三錢七水一盞煎至六分去滓食後温服日三服丹砂玫瑰丸治脾胃有熱風毒相乗上攻咽喉腫痛丹砂二兩研人參硼砂研半夏為末生薑汁作餅暴乾雄黄研各半兩麥門冬去心焙一兩半甘草生剉烏梅肉各一兩赤茯苓去黒皮白梅肉各三分麝香研龍腦研紫雪各一分右研為末以乳糖和丸如雞頭實大金箔為衣每服一丸紫蘓熟水嚼下含化嚥津亦得食後臨卧服犀角散出聖惠方治咽喉毒氣結塞疼痛不下湯水宜服犀角屑一兩沈香一両木香半兩馬牙硝一両雞舌香一両薫陸香半兩川升麻三分射干三分甘草半兩生剉黄芩半兩麝香一分細研右為散每服二錢水一中盞入竹葉二七片煎至六分去滓不計時候温服治咽喉腫欎金甘草馬牙硝細研將來冷水調加入殭蠶并半夏自然風熱不能潮大青湯治咽喉唇腫口舌糜爛口乾面熱㵼脾大青升麻大黄剉炒各二兩生乾地黄三兩剉焙右粗搗篩每服二錢匕以水一盞煎至七分去滓温服利即愈春永散出御醫院方治脾肺積熱咽喉赤腫疼痛大黄生一兩盆硝薄荷甘草㣲炒各三兩右為細末每服二錢食後新水一盞服調入蜜少許玉塵散出御醫院方治小兒大人咽喉腫痛口舌生瘡寒水石燒三兩馬牙硝枯一錢鉛白霜半錢南硼砂半兩右為細末每用少許乾摻口瘡上嚥津不妨不拘時候大青丸出聖惠方治咽喉腫痛上焦實熱口舌生瘡大青一兩黄芩半兩蚤休半兩黄藥半兩剉黄連去鬚半兩薔薇根皮一兩剉升麻川半兩􅌝􅌣根半兩知母半兩石膏細研半夏馬牙硝半兩右為末煉蜜和搗二三百杵丸如酸棗大綿裹一丸含嚥津硼砂散出御醫院方治心風熱毒充發咽喉生瘡腫痛或木重舌脹或子舌脹腫悶塞水漿不下南硼砂三兩白茯苓去皮縮砂仁滑石末荆芥穗山豆根南元參管仲甘草各半兩薄荷葉郯州者一兩右件除研藥五味外搗羅為末同合和勻每服半錢調㸃舌上嚥津無妨不拘時候三合湯治喉痛風毒積於臟腑毒氣随經流𫝊虚行靣上身面為腫毒在咽喉為痛姙娠者最宜急治不然子母俱傷産後咽喉一同三合湯主之升麻桔梗去蘆甘草各半兩右㕮咀每服三錢水一盞煎至七分食後服治喉痛出海上方用白礬半斤研細水和勻新磚一片入礬水中浸如水下乾取磚曬復浸礬水乾重五日入大便缸中浸一月取出洗净安隂處用雞掃收如喉痛服無不好治咽喉腫痛口舌生瘡凡腫毒之屬殊効用升麻一兩剉水一升煎煉取濃汁服治咽喉腫痛方用紫背龍牙草含嚥之効治咽喉頸外腫痛黄膏方出聖惠方木鼈子十枚土𤓰根一兩黄連半兩去鬚黄耆一兩剉􅌝􅌣根二兩黄蘖一兩剉消石一兩馬牙硝一兩芸薹子二兩川大黄二兩剉麝香一錢細研右為散入射香研令勻以生油旋調可腫處傅之有菜油調更佳乾即再傅絡石飲出聖惠方治咽喉風毒腫痛熱毒氣攻心胸滿悶絡石葉赤芍藥桔梗剉炒各一兩半射干元參升麻青竹茹各一兩木通剉馬牙硝各二兩生犀角鎊梔子仁各三分右搗篩每服五錢匕水一盞半煎八分去滓温服以通利為度人參青肺散出御藥院方治脾肺不利風熱攻衝咽喉腫痛嚥物妨悶宜用此藥人參去蘆頭甘草生山梔子盆硝各一兩薄荷葉黄芩净川大黄生各一兩半連翹三兩黄連五錢去鬚白附子七錢去皮右為粗末每服五錢水一盞半煎一盞去滓食後温服一方無黄連消毒丸治脾胃毒熱上攻咽喉腫痛化涎生津五倍子馬牙硝各一兩甘草三分生剉硼砂白礬熬令汁枯升麻馬勃各半兩丹砂炒麝香研龍腦研各一分右為末糯米飯為丸如雞豆大每服一丸含化不拘時侯犀角湯出聖惠方治咽喉腫痛風毒衝心胸豉一升半犀角鎊射干杏仁甘草各二兩芍藥三兩梔子七枚升麻四兩羚羊角一兩半鎊右㕮咀以水九升煮取三升去滓入豉煮一沸分三服一方有漢防已青金散治心肺客熱上攻咽喉腫痛生瘡舌夲強硬妨悶不利宜服出御醫院方薄荷二兩甘草七錢半炒百藥煎半兩南硼砂一兩别研紫河車二錢半青黛别研馬牙硝另研各半兩枯腦子半錢另研白殭蚕直者去頭㣲炒取末一錢半右除研藥外同為細末入研藥再研勻細每用少許時乾摻舌上細細嚥津薑蜜煎治喉痺腫盛語聲不出方見夲門喉痺類治喉中腫痛膈上痰熱初覺便治不能成喉痺亦緩取効可也用硼砂含化嚥津一方治喉痺為末水調嚥之治喉熱上壅咽喉腫痛用鵞抱草隂乾節末以酒調服之有効犀角散出聖惠方治咽喉疼痛四肢寒熱痰涎壅滯煩躁頭疼犀角屑三分馬牙硝一兩白礬一分川升麻三分甘草剉半兩生桔梗半兩去蘆頭細辛一分石膏一兩前胡三分去蘆頭右為散每服三錢以水一中盞煎至六分去滓不計時候温服之射干散出聖惠方治風毒攻咽喉腫痛水漿不下宜服射干二兩赤芍藥一兩甘草二兩炙㣲赤剉牛蒡子一兩楓香一兩葛根二兩剉杏仁二兩右為散每服三錢水一中盞煎至六分去滓不計時候温服治咽喉壅塞頸頷腫痛宜服此方出聖惠方升麻川一兩漏蘆半兩木通三分剉赤芍藥三分桑白皮三分剉川大黄三分剉枳殻半兩麯炒㣲黄去穣甘草半兩炙㣲赤剉漢防己三分右為散每服三錢水一中盞煎至六分去滓不計時候温服青硼砂散出御藥院方治咽喉赤腫疼痛不消有妨飲食防風去蘆頭白茯苓去皮五倍子去穰牙硝各四錢白礬紫河車各四錢薄荷葉四兩甘草二兩半右為細末每服半錢摻患處如咽喉腫用蜜水調凉服牛蒡子湯出濟生方治風熱上攻壅咽喉腫痛或生壅瘡有如肉臠牛蒡子炒元參升麻桔梗去蘆炒犀角鎊黄芩木通去節甘草各等分右㕮咀每服四錢水一盞薑三片煎八分温服不拘時一方無犀角知母飲治咽喉腫痛知母麥門冬去心焙山梔子仁人參各半兩黄芩去黒心赤茯苓去黒皮各一兩天門冬去心焙一兩甘草炙剉三分右粗搗篩每服三錢匕水一盞煎至六分去滓温服病甚者倍之丹砂牛黄丸治咽喉腫痛解臟腑諸毒化涎丹砂研硼砂研各半兩生甘草末一分礬蝴蝶研牛黄研龍腦研各三錢印子塩二十粒細研凝水石燒赤去火毒研半兩右將七味同研令勻用甘草末熬煎和丸如雞豆大每服一丸食後含化嚥津羚羊角湯治痺熱喉中腫痛熱塞不通羚羊角鎊一兩射干絡石碎大黄剉升麻各三分木通剉芍藥各一兩半生地黄二兩切焙右粗搗篩每服五錢匕水一盞半煎至八分去滓下芒硝末一錢匕攪勻温服得利即瘥桔梗散出聖惠方治咽喉腫痛結毒氣衝其心胸桔梗一兩去蘆頭犀角屑一兩甘草一兩炙㣲赤剉羚羊角屑一兩赤芍藥一兩川升麻二兩梔子仁一兩杏仁一兩湯浸去皮尖雙人麯炒㣲黄右為散每服四錢以水一中盞煎至六分去滓不計時候温服鉛霜散出聖惠方治咽喉腫痛風熱上攻胸膈心神煩熱鉛霜一分細研磁藥一兩細研龍腦一分細研羚羊角屑一兩黄耆一兩剉黄芩二兩甘草三分炙㣲赤剉馬牙硝一兩細研右為散都令勻每服不計時候以冷水調下一錢龍腦散出聖惠方治咽喉卒腫痛龍腦研一分犀角鎊丹砂研白藥子各三分真珠研黄耆剉甘草炙各半兩牙硝研一兩右為散拌勻再羅每服二錢匕新汲水調下不拘時候治咽喉疼痛含嚥丸黄藥白藥􅌝􅌣根牛蒡子馬勃以上各一兩𤣥參一兩半砂糖三兩蜜三兩右煎六味為末煉蜜并糖和丸如彈大不計時候含一丸嚥津馬藺根散出聖惠方治咽喉卒腫痛熱毒在胸膈馬藺根二兩川升麻一兩射干一兩半犀角屑一兩𤣥參一兩半木通剉一兩蘧麥一兩甘草半兩生剉右粗搗羅為散每服三錢以水一中盞煎至六分去滓不計時候温服馬牙硝丸出聖惠方治咽喉風毒腫痛煩熱不止四肢不利宜服含化之馬牙硝三分細研犀角屑一分川升麻半兩甘草一分炙㣲赤剉真珠一分黄藥二分硼砂二分細研朱黄半兩右為末入研了藥令勻煉蜜和丸如雞豆大每服一丸含化嚥津治風熱嚥水不下及瘰癧腫方升麻芍藥各四兩射干杏仁楓香葛根麻黄各三兩甘草炙二兩右㕮咀以水八升煮取二升半分三服勝金散出危氏方治咽喉腫痛氣急諸項等証於内麝香旋入有孕者不可用麝香不問冷熱虚熱實並皆通用若痰盛者如煎藥内所用不應於中畧加膽礬少許立効或吐無妨礬石三兩大硃砂南雄黄其色勝如硃砂者炒各五錢麝香乾胭脂菉豆粉各二錢半白礬半生半枯光粉各五錢右為末研薄荷汁同炒少許調服天門冬丸出御藥院方治上膈欎熱咽喉腫痛唇焦舌乾腮頬生瘡解化痰毒並宜服之天門冬慢火炙𤣥參湯洗焙乾牛蒡炒各一兩百藥煎紫蘇葉各半兩甘草炙人參各一兩半右為細末煉蜜和丸如皂子大每服一丸噙化嚥津食後備急散治咽喉腫痛生痛瘡涎堵水米難下盆硝四兩紫河車青黛蒲黄一兩甘草二兩薄荷二兩半殭蠶二錢炒右為細末入硝研勻吹半錢許咽喉中或摻不住吹摻一方無青黛蒲黄天門冬丸一名硼砂丸治上膈壅實咽喉腫痛出王氏愽濟方天門冬去心焙𤣥參焙惡實炒各一兩甘草炙剉一兩半人參硼砂研龍腦研各一分右搗羅五味為末與别研二味拌勻煉蜜和劑搗三百杵丸如皂子大每服一丸食後臨卧淡生姜湯嚼下射干丸出聖惠方治咽喉腫痛水漿不下射干半兩柑皮半兩山大豆苦藥子硝石研甘草炙剉各一分升麻半兩右為細末煉白蜜和丸如彈丸大每服一丸含化嚥津乳香丸治咽喉腫痛喉痺及咽喉諸疾乳香研石膏脂研阿魏蜜陀僧安息香各一分砒霜研半分麝香研半兩右除安息香外搗研為末煮酒安息香和丸如菉豆大每服五丸茶清下空心服良乆以熱茶投令吐更欲服只用薑湯含化升麻丸出聖惠方治咽喉腫痛熱毒在肺脾上焦壅滯心神煩悶宜服川升麻一分川大黄一分剉㣲炒𤣥參