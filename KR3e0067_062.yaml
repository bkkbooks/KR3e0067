患喉痺吳八主簿用此治之即安一方調下二錢未通半時許再服立通吐出頑涎别將大黄一塊慢火炮熟打撲盡灰如一米厚切片以兩指大片口内含汁嚥之一食頃再換一片含至三片即止或患人含不得乆自嚥不下即扶持起靠斜仰坐令人呷藥在口以筆管注入鼻中男左女右注藥訖湏㬰吐涎不止即扶起恐吐自鼻中出也吐了含嚥大黄如前法大能救人無不騐治喉腫痛飲食不可入者用猪牙皂角一梃去黒皮并核米醋浸炭火上炙令乾再浸再炙七遍黄色則止莫令大焦為細末每用少許以管吹入喉内吐出痰涎即止又方用蛇牀子三四撮入小花瓶内用火一塊入瓶内燒之即用筆管入瓶内用口吸咽吐痰出即止又方用野塵葱一枝獨生者槌碎用白絹包縳以酸米醋一大碗煎乾候冷取着牙外牙根即止使藥味入喉立便吐出痰涎又方治喉腫痛用直殭蠶白梅不拘多少研為末入米醋少許和蠶末含化須㬰所腫即破矣治傷寒毒攻咽喉腫方用真䕡如𤓰甲大内口中嚼汁嚥之自寛治喉中腫痛不得飲食出肘後方用燒筆頭灰將飲下方寸匕治壅熱咽喉腫痛方用百兩金一寸含之嚥津治咽喉腫痛方用都管草根切片含之立愈治咽喉腫痛語言不出出海上名方用硼砂碾細竹筒吹入喉内其痛自定治卒風咽腫面腫方用杏仁末和鷄子黄更搗傅上乾復易之七八度若腫汁出煮醋和伏龍肝傅乾更易之又方用含上好醋口舌有瘡亦佳鶴頂丹治大人小兒咽喉腫瘡用甜硝四兩炒過研細先掘地作坑子揩净入甜硝在内一時辰出火毒取出入熟甘草末半兩麝香生龍腦各一錢硼砂二錢半馬牙硝一兩丹砂一錢半一處細研滴水丸如雞豆大每服一丸含化嚥津小兒只作散新汲水調下半錢匕治咽喉卒腫不下食方出聖惠方取鯇魚膽滴喉中如喉嚨痛以膽塗喉嚨外痛處極妙治咽喉卒腫痛不下食方用附子半枚生搗細羅為散用竹管吹入喉中治咽喉卒腫痛不下食方出聖惠方用生地龍十四枚搗爛塗喉外帛繋之兼治癰發喉中一方取地龍一條着塩淹令化為水蜜少許調勻服之治咽喉卒腫痛不下食方用白麫不計多少以苦酒和塗喉外腫處治咽喉卒腫食飲不通出肘後方用黄蘗搗傅腫上冷復易之用苦酒和末亦可服搗薤膏出聖惠方治咽喉卒腫食飲不通用薤一握爛搗醋和傅腫上冷復易佳一方用根炒搗貼腫處以帛繫之治咽喉内卒腫痛出聖惠方用商陸根爛搗㣲炒帛裹熨之冷即易之立愈治咽喉頸外腫及咽乾痛方出聖惠方用皂莢炙黄焦去皮搗羅為末水調傅之治風毒嚥水不下用水服莨菪子末二錢匕神良又方用煮桃皮汁三升服硼砂散治咽喉𦂳腫疼痛硼砂甘草剉一分馬牙硝人參各半兩右為細散每服半錢匕含化嚥津不拘時防風散出危氏方虚者少用實者多用防風去蘆一兩羗活黄藥子白藥子蜜炙殭𧖟炒硼砂大黄紙褁煨令香熟荆芥細辛川芎紅豆鬱金山豆根甘草已上各五錢牙硝二錢薄荷葉右為末研薄荷汁同蜜少許調藥服之治咽腫痛至危困以手用力拔頂心髮立通無髮者撮頂心皮即安之劉大夫得此方未試忽一日苦咽痛不能言亟去其巾乃患酒即以意令人用力撮其頂心皮遂安出百一選方射干膏一名烏翣膏治喉腫熱塞不通脾熱上衝方見本門咽喉腫塞類絳雪散一名代針散治男女長幼咽喉腫氣息難通方見夲類後代針散杏仁丸治咽喉噎塞咳嗽方見本門語音不出類治喉卒腫不下食出經騐良方以薤一把搗熬傅之冷則易之治卒咽痛燒炊箅一枝漿水服方寸匕發聲散治咽痛有妨嚥物嚥物則㣲痛不宜寒凉藥過泄之此妨悶非熱也􅌝􅌣去穰白殭蠶半兩㣲炒桔梗新白者七錢半炒甘草二錢炒右件為細末每用少許乾摻咽喉中大腫痛左右有紅或只一邊筋紫大米水難下用此散一錢朴硝一錢匕和勻乾摻喉中嚥津如喉中赤腫或有小白頭瘡用前藥一錢匕白礬細研作粉半錢匕和勻乾摻通闗散治一切咽喉危疾盆砂甘草蒲黄白殭蠶青黛已上並等分生用右為細末每用一字乾摻在舌上嚥津鈆霜散治咽喉腫痛清凉咽膈南硼砂柿霜糖霜鈆白霜右件各等分為細末每服半錢遂旋摻嚥下食後菖蒲大丸治風熱壅盛咽嗌腫痛語音嘶嗄嚥物艱難常服清上焦發音聲水菖蒲白术各一兩防風去蘆頭川芎各半兩甘草炙桔梗去蘆頭㣲炒各二兩木通半兩肉桂去粗皮二錢半杏仁半兩湯浸去皮尖細研以竹紙包壓去油取霜縮砂仁二錢半薄荷葉去土取末十兩右為細末次入杏霜薄荷葉末研勻煉蜜為丸每一兩作一十丸每服一丸含化嚥津食後一方無木通犀角散治上焦壅熱咽膈腫疼不利鼠粘子一兩銚子内以文武火隔紙炒令香為度甘草一分荆芥半兩右件三味同為細末每服一錢水三分一盞煎令沸去滓温服大調胸膈治丈夫婦人喉嚨腫痛飲食不下喘息不通頭項俱腫命欲臨死宜服此返魂散量病勢大小使藥輕吹吹重則人悶絶硝石牽牛各一兩半夏三分殭𧖟去鬚天南星各一兩右為細末以舊筆管盛吹在痛處停候片時吐出涎後喘息已通即便住藥若氣未通腫氣未消未破更進吹一錢半待氣通即住若未通加藥吹之以氣通為度若喉中喘息已通更修合後方喫麻黄荆芥穗𦍑活牡丹皮去心射干殭蠶去絲連翹硝石各一分大黄牽牛各半兩半夏三銖右為細末用白麫些少和滚熟水丸如梧桐子大食後葱湯下五十丸只作散子喫每服三錢水一盞三分煎一兩沸食後和滓喫若喫時吐逆即濃煎去滓喫一兩盞只以通取轉為度桔梗湯治咽腫㣲覺痛聲破麻黄半錢不去節桔梗一錢當歸一分黄芩三分白殭蠶一分馬屁勃桂枝少許右件剉如麻豆大都作一服水二大盞去滓稍熱食後時時服之治咽喉腫痛用生艾尾研井花水朴硝噙嚥津治咽喉腫痛百藥煎去黒心硼砂甘草生白礬等分右四味為細末每服一錢食後米飲調細細呷嚥下治咽喉腫痛用山豆根磨醋噙出涎又方白礬三錢巴豆三箇去殻用炒白礬枯去巴豆只研礬為末調灌或㸃入喉中黄芩湯治喉嚨腫疼口瘡等疾黄芩蓽撥右等分為末煎湯漱口神効龍腦丹砂丸治喉腫痛連舌頰牙根赤腫心煩咽乾多渇眠睡不穏龍腦研二錢丹砂研半兩人參白茯苓去黒皮各一兩羚羊角犀角鎊甘草炙剉升麻惡實炒各半兩麥門冬去心炒一兩半馬牙硝研黄藥各半兩右為末再同和勻煉蜜丸如雞豆大每服一丸含化嚥津食後臨卧治咽喉間生肉層層相疊漸漸腫起不痛多日乃有竅子臭氣自出遂退飲食用臭橘葉煎湯連服愈治卒咽痛懸木构燒末水服方寸匕日三代針散一名絳雪散治咽喉腫痛氣息不通難下飲食硇砂為君少許白礬為臣皂子大牙硝一分三兩硝石四兩黄丹半兩巴豆六枚右用粗磁礶子一箇先煨令熱後次第漸漸下藥巴豆逐箇咬破後有火熖盡更入一箇續入蛇退皮一條圍之入五味以火養成汁後結硬乃成也每用少許以竹筒子吹在患處忌鷄犬及婦人見唯臘月合之秘𫝊觧毒丸治一切諸毒瘡痍之疾咽喉腫痛貫衆山豆根黄藥子牙硝寒水石龍膽草雄大豆乾葛百藥煎紫河車甘草節薄荷梔子大黄豆粉各四兩加山茨菰二兩大妙右細末煉蜜為丸秤一兩作十丸如前銀箔為衣服治喉嚨疼用木通煎湯服之或木通將含之嚥津亦得又方用甘草煎湯去滓温服一盞日三服治一切咽頷腫毒右用蝉殻一兩為末以猪膽汁和蜜調傅腫處即消治咽喉痒痛失音不語杏仁味甘苦冷有毒惡黄芩黄耆葛根畏蓑草去皮尖炒桂心味甘辛大熱有小毒為末右二味各一兩同研爛如泥用半熟蜜和圓如櫻桃大新綿裹含之嚥津日五次夜三次大效普濟方卷六十三
