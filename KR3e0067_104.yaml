body:
  text: 普濟方卷一百五諸風門明周王朱橚撰風氣論夫風氣之狀有冷有熱冷則厥逆熱則煩惋盖肺者皆五臟之華盖而為氣之本主通行陽氣循于皮膚分肉之間熏于肓膜㪚於胷腹以拒外而温内若其氣虚則風邪因而傷之其傷之也或遇陰氣勝則四肢厥逆而為風冷或遇陽氣盛則心神煩惋而為風熱二者皆因體虚受風氣能皷作故均謂之風氣也方枇杷飲一名枇杷煑散治三焦風壅五臟虚弱徧身風氣勞悶手脚風毒氣寒熱煩燥通心肺健脾胃益腎臟正元氣止逆進食廣南四時攝生論枇杷葉炙去毛木香剉木通剉大腹皮剉訶梨勒皮各二兩桔梗剉炒五味子厚朴去粗皮生薑汁炙鱉甲去裙襴醋炙白芷防風去义茯苓去黒皮當歸澤㵼京三稜煨剉各半兩白术藿香藥人參各一兩一分芍藥甘草炙剉枳殻去瓤麩炒牡丹皮知母焙各一分半夏湯洗七遍切焙一兩前胡去蘆頭右粗搗篩毎服四錢七水一盞半入生薑三片大棗一枚擘破煎至八分去滓熱服空心食前服如要作藥粥喫用時用水一升粟米一匙藥末二錢候熟次下藥末同煎至五分帶熱服之天麻防風丸一名靈砂丹治一切風氣方見風熱類烏蛇散治一切風氣出聖濟總録烏蛇酒浸去皮骨炙三兩肉豆蔲五枚去皮白茯苓去黒皮㯽榔人參當歸切焙桂去粗皮天麻牛膝酒浸切焙甘草炙剉白附子炮麻黄去根節芎藭羌活去蘆頭藁本去苖土附子炮製去皮臍各半兩細辛去苖葉一分乾蝎去土炒一兩白芷半兩防風去义半兩白鮮皮一分木香半兩丹砂研一分麝香研二錢右除研者外搗羅為末再同研令勻細毎服一錢七葱白蠟茶清調下大治虚風氣上攻兼進飲食常服只用蠟茶調下大叚風涎手足不隨􅍙麻用薄荷酒調下八寶回春湯出危氏方治一切諸虚不足風疾血起交攻滯脉絡拘急攣拳氣不服降痰中疼痛痰涎壅盛脾胃不和飲食不進此藥去風和氣血脉大有神效凡治風不専用風藥攻之愈攻則急甚服此輕者一月重者二三月自然愈矣且不再作夫血氣和平榮衛調順則風証不攻而自去矣附子炮人參麻黄去節黄芩防己香附子去毛杏仁去皮川芎當歸陳皮防風桂乾薑熟地黄生乾地黄各一兩茯神兩半白芍藥五兩沉香川烏炮各半兩半夏兩半白术二兩天台烏藥半兩黄耆三兩甘草一兩右同剉散毎服三錢水一盞半薑三片棗一枚同煎空心通口服常服效此方乃王翰林經進奉㫖頒行而謝子充少年亦感疾得此愈大通散出聖濟總録治風氣冷熱不調四肢厥逆心神煩惋白花蛇酒浸去皮骨炙天麻赤箭防風去叉藁本去苖土厚朴去粗皮生薑汁炙海桐皮剉萆薢桂去粗皮杜仲去粗皮炙剉木香山芋切焙當歸切焙甘草炙剉葳靈仙去土羌活去蘆頭白附子炮蔓荆實菊花郁李仁虎骨醋炙白芷乾蝎炒各等分右為散毎服二錢七温酒調下空心食前臨卧日三服加味順氣㪚治風氣南星枳殻防風川芎殭蚕全蝎木香少許白术白茯苓去皮當歸青皮去白香白芷蓬术陳皮去白天台烏藥人參少許甘草白芍藥右各等分為㕮咀生薑三片棗一枚煎服香枳丸治風氣利胷膈及心腹諸疾出聖濟總録木香枳殻去瓤麩炒羌活去蘆頭乾薑炮桂去粗皮人參陳橘皮湯浸去白焙芎藭甘草炙剉白术附子炮製去皮臍京三稜煨剉大黄蒸過切焙各半兩肉豆䓻去皮一分㯽榔剉一兩獨活半兩牽牛子凈淘揀焙乾一觔取粉半觔别入右除牽牛子外搗羅為末甆合收勿洩氣每要使時旋秤藥末一兩使牽牛子粉半兩合和研勻煉蜜和丸如梧桐子大每服二十丸至三十丸葱白蠟茶下生薑湯温酒亦可臨時更看虚實加减服婦人血風勞氣心腹脹痛小兒疳痢時疫癥瘕皆宜服之靈寶丸出王氏慱濟方治風氣攻作隂盛則厥逆陽盛則煩惋天麻烏蛇酒浸去皮骨炙天南星各二兩附子炮製去臍皮白附子芎藭白殭蚕㣲炒蔓荆實乾薑炮桂去粗皮各一兩麻黄去根節二兩三分防風去义一兩半當歸切焙三分龍腦研麝香研各一分右為末煉蜜為丸如雞頭大以丹砂末為衣每服一丸酒調化下如有急風攤瘓薄荷湯下一二丸衣覆出汗立效防風丸出聖濟總録治風氣肢節疼痛四肢少力頭痛煩悶防風去桔梗剉炒丹砂研各二兩天麻細辛去苖葉獨活去蘆頭秦芁去苗土芎藭木香各一兩天南星用牛膽製由䟦炮各一兩半甘草炙剉茯苓去黒皮各半兩藿香葉三分右研為末煉蜜和丸如雞頭大毎服一丸荆芥湯嚼下食後臨卧服羌活散一名羌活丸治風氣不調頭目昏眩痰涎壅滯遍身拘急及風邪寒壅頭痛項强鼻塞聲重肢節煩疼天陰風雨愈覺不安出御藥院方前胡去蘆羌活去蘆麻黄去根節白茯苓去皮川芎黄芩甘草炒蔓荆子去白皮枳殻去瓤麩炒細辛去苗石膏别研菊花去梗防風去蘆各一兩右為末入石膏研勻毎服二錢水一大盞入生薑三片薄荷三兩葉同煎至七分稍熱服不拘時候一方麫糊為丸朱砂為衣生薑湯下㯽榔丸一名木香丸治風氣調榮衛利胷膈清頭目化痰涎明視聽化積出聖濟總録㯽榔剉大黄剉炙各二兩陳橘皮湯浸去白焙木香附子炮製去皮臍人參各一兩芎藭羌活去蘆頭獨活去蘆頭桂去粗皮各半兩京三稜煨半兩肉豆䓻六枚去皮右為末毎用此末二兩别搗牽牛子取細末一兩和勻煉蜜為丸如梧桐子大毎服十丸至十五丸臨卧生薑橘皮湯下木香丸出聖濟總録治風氣木香枳殻去瓤麩炒㯽榔剉各一兩半芍藥防風去义黄耆剉牛膝酒浸切焙茯苓去黒皮各一兩一分大黄三兩訶梨勒皮一兩三分重附子炮製去皮分臍一兩一桂去粗皮各一兩右為末煉蜜丸如梧桐子大毎服十五丸酒下日二漸加至二十丸以知為度槐膠丸出聖濟總録治風氣肢節疼痛徧身瘙痒麻木頭目昏痛咽膈煩滿槐膠二兩天麻牛膝酒浸切焙各一兩蔓荆實半兩何首烏去黒皮一兩甘草生剉一兩半人參半兩生乾地黄焙防風去义各一兩槐花炒菊花各三分右為末用麫糊和丸如梧桐子大以丹砂為衣毎服十五丸至二十丸荆芥薄荷湯下不計時候服紫蘇木通湯出聖濟總録治體虚受風因氣皷作名為風氣冷則厥逆熱則煩惋紫蘇莖剉焙木通剉焙桑根白皮剉焙青橘皮湯浸去白焙各一兩荆芥穗焙獨活去蘆頭剉木𤓰去瓤切焙蘹香子根剉炒羌活去蘆頭剉各半兩枳殻去瓤麩炒二兩大腹皮剉二十枚并皮用右㕮咀毎服五錢匕水二盞生薑一分葱二莖同煎至一盞去滓温服空心日午臨卧各一黄耆丸出聖濟總録治風氣有熱煩惋頭面生瘡黄耆剉防風去叉地骨皮枳實去瓤麩炒各一兩羌活去蘆頭苦參當歸切焙升麻甘草炙剉各半兩大黄剉炒半兩右為末煉蜜和丸如梧桐子大毎服十五丸食後温荆芥湯送下仙茅丸出聖濟總録治風氣凝滯身體疼痛拘急腰脚沉重仙茅米泔浸去赤汁焙葳靈仙去土羌活去蘆頭青橘皮湯浸去白焙白牽牛炒白茯苓去黒皮各一兩薑黄白术蒼术米泔浸一宿竹刀切作片子焙各半兩右為末煉蜜和丸如菉豆大毎服十丸空心鹽湯下八風散出醫方大成治風氣上攻頭目昏眩肢體拘急煩疼或皮膚風瘡痒痛及治寒壅不調鼻塞聲重藿香去土半觔白芷前胡去蘆各一觔黄耆去蘆甘草炒人參去蘆各二觔羌活去蘆防風去蘆各三觔右為細末毎服二錢水一中盞入薄荷少許同煎至七分去滓食後温服臘茶清調一大盞亦得小兒虚風乳香臘茶清調下半錢更量大小加减防風半夏丸出聖濟總録治風氣身體疼痛胷膈煩滿化痰涎利頭目防風去义三兩半夏湯洗七遍切焙一兩半天麻二兩芎藭半兩白芷一兩獨活去蘆頭半兩人參三分茯苓去黒粗皮半兩右為末酒煑麵糊和丸如梧桐子大毎服二十丸不計時候荆芥湯下加至三十丸槐實丸出聖濟總録治風氣頭目昏眩化痰涎胸膈槐實四兩乾肥者揀令凈走水洗過放乾慢火上麩炒令焦㣲以黒色芎藭一兩皂莢六兩不蛀者剉長三四寸用長流水五升黒豆一升同煑令豆香熟為度去黒豆不用皂莢焙乾刮去黒皮塗酥慢火炙令燋為度枳殻去瓤麩炒菊花各一兩牽牛子二兩慢火炒令㣲燋黑色别搗羅取末一兩用㯽榔三分雞心者剉木香半兩右為末煉蜜成劑再入臼内搗令熟丸如梧桐子大毎服二十丸食後臨卧荆芥湯下小乳香丸出聖濟總録治風氣凝滯胸膈不快身體刺疼乳香研没藥研各半錢五靈脂二兩半㯽榔煨剉半兩肉豆蔲三枚去皮半夏二兩半用生薑四兩研汁入水一盞同浸半夏一宿切碎用少生薑汁同炒赤色牽牛子四兩搗細只羅一徧餘者不用猪牙皂莢三挺去皮酥炙右為末用生薑自然汁并冷水中停和丸如菉豆大毎服十五丸至二十丸生薑湯下食後臨卧服更量虚實加减天麻煎一名沉香天麻煎丸治風氣不順骨痛或生癮疹不治則加冷脾筋骨緩弱出王氏慱濟方天麻乾蝎炒羌活去蘆頭防風去义各二分五靈脂附子炮白术赤小豆各一兩右為末先以沉香二兩酒一升甆噐煎為膏入藥搗千杵和丸如梧桐子大每服二十丸空心荆芥湯或荆芥茶酒下過五日加至三十丸秋夏宜荆芥湯春冬宜荆芥酒春末夏初喜生赤根白頭瘡服之大佳忌一切毒物搜風大丸寶飲出澹療方治挾氣中風痰雖㣲去當先服此順氣併開其關竅不致枯廢然後進以風藥或非重熱氣實者亦可服天雄氣弱者以代附子沉香防風去蘆南星炮薄荷葉地龍去土木香不見火全蝎去毒各等分右㕮咀毎服四錢重入生薑五片水一盞煎熟入麝香啜服不拘時繼洪甲寅嵗主柳州報㤙寺時州教諭林脩職招治其女尼瘴瘧及至則悲痛謂尼昏厥已久偹棺衾惟候其喘息絶余視之唇口臉猶頗有紅赤色脉亦㣲有而伏告之曰痰厥尚或可甦為用半夏末搐鼻蘇合香圓擦齒便覺喉中噫有聲亟煎星香飲灌下初似不能嚥且令人將咽摩胷遂能吞藥眼睛轉動繼用附香飲靈砂白丸子等調理兼旬氣體復舊或謂真更生也又壬戌年間曽在連州值蹇新恩季沉傷寒病毉者過用竹葉石膏湯遂成寒厥四肢冷而强直身亦無甚暖氣惟心胸稍温且大小便泄而似不禁脉尤㣲伏亦已偹後事余謂此五虛証矣法在不治試為炮雄附烏大者各一隻作三建湯熟煎一椀仍磨入沉香盪令稍温熱仍令人旋旋搦摩其肢體又繼用此湯吞嵗丹三十粒自午至晩漸覺身體温煖精神完復調理數日而安又嘗于封川介軒徐制使請療一軍士悶絶昏厥牙關緊噤不省人事惟喉中有聲如拽鋸鼻息真如鼾睡用猪牙皂角搐鼻遂畧噴嚏牙關稍開且急令人提挈其髪使頸項伸舒而灌下獨烏湯一時稍甦項刻諸証復作遂縛其髪于竹竿上令人扶掖其體以麝香擦齒復灌下南星川烏湯良覺甦醒纔越兩時辰間病復作幸為製稀涎飲已成灌下一錢七頃刻吐出粘涎小半盞許方得漸安凡此等証區區三十年間遇療不一雖非小疾亦不過痰涎潮上節閉咽膈謂其源則或因四氣七情或久病而下虚上盛或小兒驚風客忤或强壯氣盛之男子婦人為癲為狂皆似風痰而閉厥一時救急亦只得用通關打痰藥也然前所用丹附不可以為定法且或生或炮或多或寡或壓以大丹或兼以紫蘇沉木香之類或熱服或盪冷而熱因寒用皆當有以權便誠不可執也黒虎丸出聖濟總録天南星虀汁煑透切片焙乾二兩芎藭一兩杜仲去粗皮炙剉半夏湯洗七遍切焙用白附子㣲炮續斷各半兩香墨燒令煙盡物盖放冷研三兩右為末再和勻用生薑自然汁煑麵糊為丸如梧桐子大毎服十丸荆芥湯下食前犀角丸出衛生寶鑑除三焦邪熱踈一切風氣治風痰盛實頭目昏重肢節拘急痰涎壅滯腸胃燥澁大小便難黄連去鬚犀角鎊各十兩人參去蘆二十兩大黄八十兩黒牽牛一百二十兩炒别搗取粉六十兩右與牽牛粉合和為細末煉蜜為丸如梧桐子大每服十五丸至二十丸臨卧温水下更量虚實加减獨活丸出御藥院方治風氣上攻頭目疼痛昏眩不快利膈化痰獨活去蘆頭川芎甘菊花防風各一兩乾蝎一分去土炒半夏湯洗去滑作餅子炙二兩右為末用生薑自然汁二大盞煑如膏和為丸如豌豆大毎服七丸至十丸荆芥薄荷湯送下葳靈仙丸出聖濟總録治風氣葳靈仙去土蔓荆實何首烏去黒皮苦參右等分搗羅為末用酒煑麫糊丸如梧桐子大毎服三十丸温酒或温熟水下烏附丸出醫方大成去風踈氣川烏二十箇香附子半觔薑汁淹一宿炒右為末酒糊為丸毎服十數丸服之若只用草烏當防其麻木人也然肌體肥壯及有風疾者宜常服温酒下治風氣手足不遂出經效濟世方用五積㪚薑棗煎去滓入麝香服之或先與蘇合香丸尤妙如暴中風未可服他藥先以麝香煎五積散灌之連進三服汗透便輕快此是高逄辰醫施林宗法其後用此以治他人皆立效毎五積散一兩湏用細研麝香二錢以多為妙胡薄荷方出本草治風氣壅併攻胸膈用胡薄荷作茶服之立效俗呼新羅薄荷牽牛子方出本草治風氣所攻臟腑積滯用牽牛子以童子小便浸一宿後長流水上洗半日却用生絹袋盛掛于當風處令乾每日鹽湯下三十粒極能搜風亦善消虛腫久服令神清體爽麝香烏龍丸出楊氏家藏方治一切風氣攻注腰背拘急皮膚瘙痒遍身麻木疼痛或中風口眼喎邪語澁涎潮半身不隨偏枯嚲曵天麻去苖蒼术米泔水浸一宿白蒺藜炒去刺地龍去土炒没藥别研羌活去蘆頭白殭蚕炒去絲嘴木鱉子去殻麩炒黄色香白芷防風去蘆頭五靈脂炒川芎一十二味各一兩白膠香别研川烏頭炮去皮尖乳香别研三味各半兩全蝎去毒炒二十枚麝香不别研腦子一匙别研草烏頭炮去皮臍半兩右為細末酒煑麫糊為丸如梧桐子大每服一十五丸至二十丸茶酒任下食後加味敗毒散治風氣上攻頭目咽燥舌澁心胷煩滿痰涎不利頭旋目眩兼解傷寒陽証脚氣踝上赤腫疼痛寒熱如瘧自汗惡風或無汗惡風服此出余居士選竒方前胡去蘆柴胡銀州者去苖人參甘草冬服用炙夏月不用羌活獨活桔梗茯苓去皮枳殻湯浸去瓤麩炒令香川芎各一兩半夏湯洗七次蒼术米泔浸炒等分右為細末毎服二錢水一盞入生薑薄荷同煎至八分去滓温服如覺着風即併熱進三兩服㣲出汗立瘥熱甚者加大黄又方加地骨皮兼治骨熱病没藥丸出衛生寶鑑治風氣頭疼及渾身痛五靈脂川烏頭灰火中畧炮去皮尖切作薄片子畧炒過右各等分為細末酒糊為丸如梧桐子大毎服一丸細嚼用荆芥薄荷茶湯送下酒服亦得食後四聖散出王氏慱濟方治風氣壅滯心胷不利精神不爽痰併多頭項緊急半夏湯洗七次桑白皮酥炙令黄荆芥穗陳橘皮去瓤各等分右件四味為末毎末一大錢薑一小塊子水一盞同煎至七分温服黒神丹出楊氏家藏方治一切風氣上攻口眼不正肌肉瞤動及偏正頭疼頭風等疾天麻去蘆蔓荆子川烏已上三味各一兩防風去蘆頭藁本去土白茯苓去皮已上三味各七錢細辛三錢半去葉土川烏頭二錢半炮去皮臍尖牛膝酒浸一宿荆芥穗甘草剉炒上三味各三分香白芷赤芍藥已上二味各一兩二分白殭蚕炒去絲嘴細松煙墨燒過醋淬已上二味各四錢右件為細末煉蜜為丸每一兩作一十丸毎服一丸細嚼薄荷茶下不拘時候羌活煑散治風氣澁骨節疼痛頭目不利拘倦羌活川芎桔梗茯苓薏苡仁各一兩獨活黄橘皮人參細辛一分麥門冬白术甘草各半兩防風半兩右件刷去沙土細剉都㣲炒搗為粗末毎服三錢以水一盞薑三片同煎濾取五分温服餘滓再煎不以時候㯽榔丸出王氏慱濟方治通利三焦踈逐風氣空胷膈化痰涎㪚腹脇壅滯清頭目化酒食毒黒牽牛四兩揀去雜物二兩炒令香起方得二兩生用重洗焙杵為末取三兩用㯽榔半兩木香一分陳橘皮一分去瓤乾薑一分炮右為末同煑粟米糊細研搜為丸如梧桐子大曝乾以甆合盛之並夜卧濃煎薑湯下三十丸飲食傷煎棗湯下痰涎壅喉痛頭疼食後生薑湯下十五丸婦人産前後諸疾煎生薑湯下止渴棗湯下天麻丸治風氣壅盛頭疼目澁項背拘急鼻塞耳鳴方見本門諸風雜治類五味防風丸香芎丸出楊氏家藏方治風氣上攻頭目昏疼身體倦怠川芎十兩天麻去苗一兩細辛去葉土半兩蓽撥二錢半甘草二兩炙右件為細末煉蜜為丸毎一兩作一十丸毎服一丸細嚼荆芥湯下食後二香散出澹療醫方治風氣食三証通用調暢胃氣須兼服之木香藿香葉白豆䓻仁半夏麯厚朴製橘皮茯苓蒼术甘草炙各半兩益智仁縮砂各一兩丁香二錢半右為末每服二錢半薑棗煎服四君丸出朱氏集騐方治風順氣血生乾地黄熟乾地黄當歸木𤓰各等分右為細末酒糊為丸如梧桐子大毎服三十丸温酒下愈風丸出楊氏家藏方治風壅氣滯頭目不清痰多上壅天麻去苖白附子炮羌活去蘆頭天南星炮細辛去葉上香白芷川芎㯽榔已上八味各一分白蒺藜㣲炒肉桂去粗皮半夏湯洗七次陳橘皮去白三味各七錢半右件為細末生薑自然汁煑麵糊為丸如梧桐子大毎服三十丸生薑湯下食後木香丸出聖惠方治一切風及氣臟腑壅滯宿食不消心腹脹滿木香二兩羌活二兩芎藭二兩郁李仁四兩湯浸去皮㣲炒桂心二兩㯽榔二兩川大黄四兩剉碎㣲炒右件藥搗羅為末煉蜜和搗三五百杵圓如梧桐子大毎于食前以温酒下三十丸欲得快利加至四十丸此藥稍温必不虚人夜臨卧時服亦得順氣丸出保生方治風濕毒氣攻疰腿膝或腫或疼降風消食木香青皮去白㯽榔各一兩郁李仁湯浸去皮研半兩黒牽牛炒取頭末三兩半麻子仁去皮别研一兩半右除二仁外俱為細末次入郁李仁麻子仁末同研勻煉蜜和丸如梧桐子大毎服三十丸加至五十丸温麻仁湯下或用生薑湯下亦得杜翰林枳實丸出御藥院方踈導老人及虛家風氣痰實腹肋有妨諸飲癖積枳實麩炒人參赤茯苓㯽榔各一兩白术半兩黒牽牛八兩别一方加木香半兩右件六味為細末稀麫糊為丸如梧桐子大毎服食後以橘皮湯下十五丸漸加至二十丸如要不動時臨卧熱水下五丸加至十丸治風氣客于皮膚瘙痒不已出本草取蟬蛻薄荷葉等分為末酒調一錢七日三服治風氣客于皮膚瘙痒不已出本草以蜂房炙過及蟬蜕等分為末酒調一錢匕日三二服去除浮風益氣力潤皮肉出本草以菉豆煑食之風消論夫内經謂二陽之病發於心脾有不得隱曲女子不月其傳為風消夫腸胃發病傳于心脾心主血心病則血不流脾主味脾病則味不化而精不足精血不足故其証不能隱曲女子不月久則傳為風消盖精血已虧則風邪勝而真氣愈削也方黄耆湯出聖濟總録治風消氣血虚弱黄耆薄切犀角鎊各一兩人參白茯苓去黒皮各一兩半柴胡去苖升麻秦芁去苖土芎藭木香桑根白皮剉枳殻去瓤麩炒防風去义芍藥黄芩去黒心肉豆䓻去殻炒天麻鱉甲醋浸炙去裙襴地骨皮甘草炙剉各一兩羌活去蘆頭當歸切焙青橘皮去白切炒各三分㯽榔剉桔梗去蘆頭炒各半兩右粗搗篩毎服三錢七以水一盞煎至七分去滓空腹温服之妙大和湯出聖濟總録治風消五勞七傷等疾前胡去蘆頭枇杷葉拭去毛鱉甲醋炙白茯苓去黒皮桔梗去蘆頭炒白芷五味子白术厚朴去粗皮生薑汁炙半夏湯洗去滑京三稜煨剉藿香去梗防風去义各一兩人參三分柴胡去苖半兩桂去粗皮一兩半桑白皮剉當歸切焙芍藥枳殻去瓤麩炒牡丹皮甘草炙剉知母焙杏仁去皮尖雙仁麩炒各半兩右粗搗篩毎服三錢七水一盞生薑三片煎至七分去滓温服之人參荆芥湯出聖濟總録治風消血氣虚損攻刺疼痛四肢無力多因黄瘁胷膈痞悶或大便多秘或時泄利荆芥穗二兩芍藥天麻芎藭當歸洗切焙京三稜煨剉黄耆薄切鱉甲醋浸去裙襴炙牛膝去苖酒浸切焙各一兩木香半兩熟乾地黄切焙柴胡去苖各一兩半防風去义牡丹皮大腹皮各三分枳殻去瓤麩炒三兩半夏為末生薑汁作餅曝乾一兩秦芁去苖土一分人參石膏碎研白术羌活去蘆頭欵冬花擇净陳橘皮去白切焙各半兩右粗搗篩毎服三錢七水一盞生薑三片棗一枚去核同煎七分去滓空心日午臨卧服莵絲子丸治風消經久不瘥漸成五勞七傷少腹拘急四肢痠疼靣色黧黄唇口乾燥目暗耳鳴心忪氣短夜夣驚恐精神困倦喜怒無常悲憂不樂飲食無味舉動乏力心腹脹滿脚膝痿緩小便滑數房事不舉股間濕痒水道澀痛小便出血時有遺瀝莵絲子酒浸别研桂去粗皮鹿茸去毛酥炙附子炮製去皮臍澤㵼炮石龍芮各一兩肉蓯蓉酒浸切焙杜仲去粗皮剉炒防風去白茯苓去黒皮熟乾地黄洗焙巴㦸天去心山茱萸補骨脂炒蓽澄茄沉香剉蘹香子炒石斛去根牛膝酒浸切焙續斷各三分桑螵蛸酒浸炒芎藭覆盆子擇净五味子各半兩右為末以酒煑麵糊丸如梧桐子大毎服二十丸温酒或鹽湯下空心日午服如脚膝無力木𤓰湯下黄耆羌活飲治心脾受病精血虚少風氣乘之日益削消黄耆一兩半羌活去蘆頭一兩石斛去根防風去义枳殻去瓤麩炒人參附子炮製去皮臍茯苓去黒皮五味子牛膝酒浸切焙各一兩續斷半兩地骨皮三分牡蠣煆一兩生乾地黄切焙二兩右剉如麻豆毎服五錢匕水一盞半煎至一盞去滓温服日三服薑黄湯治風消四肢無力胷膈煩悶薑黄一兩沉香剉三分黄耆剉一兩桂去粗兩皮半延胡索人參厚朴去粗皮塗生薑汁炙芎藭防風芍藥各三分杏仁湯浸去皮尖雙仁别研羌活去蘆頭訶梨勒煨去皮各半兩右除杏仁外粗搗篩和入杏仁勻毎服三錢匕旋汲井花水一盞煎至七分去滓温服不拘時排風湯治風消肢體痠疼血脉枯耗及治風毒脚氣腫痛防風去义當歸洗切焙白鮮皮白术芍藥桂去粗皮芎藭獨活去蘆頭杏仁去皮尖雙仁炒别研枸杞根剉茯神去木麻黄各等分右除杏仁外粗搗篩入杏仁和勻毎服三錢匕以水一盞生薑三片煎至七分去滓空腹温服日晩再服五補人參丸出聖濟總録治風消人參白茯苓去黒皮黄耆薄切地骨皮熟乾地黄焙乾各一兩右為末煉蜜丸如梧桐子大毎服三十丸温酒下夜卧時服之妙風厥論夫内經曰二陽一陰發病主驚駭背痛善噫善欠名曰風厥夫胃土也肝木也木剋土故風勝而驚駭背痛土不勝木故善噫土不制水則腎氣上逆而善欠為風厥也方乾地黄丸出聖濟總録治風厥背痛善噫善欠驚恐不安熟乾地黄焙桂去粗皮續斷山茱萸鍾乳粉天門冬去心焙各一兩半白茯苓去黒皮天雄炮製去皮臍杜仲去粗皮炙剉牛膝酒浸切焙肉蓯蓉酒浸切焙栢子仁各一兩三分松脂遠志去心乾薑炮各一兩一分菖蒲山芋甘草炙剉各一兩右為末煉蜜和丸如梧桐子大毎服三十丸温酒空心下食前日二人參湯出聖濟總録治風厥志意不樂身背疼痛多驚善欠噫氣人參芎藭枳殻去瓤麩炒芍藥防風去义細辛去苖葉桂去粗皮附子炮製去皮臍甘草炙各半兩桔梗炒木香茯神去木各一分右細剉如麻豆大毎服五錢匕水一盞半生薑半分切煎至八分去滓温服遠志散出宣明論治風厥多驚駭背痛善欠志意不樂身背皆痛遠志去心人參細辛去苖葉白茯苓去黒皮黄耆剉各一兩桂去粗皮一兩熟乾地黄焙菖蒲白术防風去义各半兩右為散毎服二錢七温酒調服空心晩食前日三服獨活湯出聖濟總録治風厥肩背痛驚惕不安善噫多欠獨活去蘆頭人參白茯苓去黒皮當歸切焙各二兩桂去粗皮遠志去心熟乾地黄焙防風去义各一兩半細辛去苖葉甘草炙各一兩右細剉如麻豆大毎服五錢七水一盞半煎取八分去滓温服不拘時日二茯苓湯出聖濟總録治風厥驚駭背痛善噫善欠方見風驚恐類治風蹷出本草以海桐皮浸酒服風眩論夫風眩之病起于心氣不定胷上蓄熱故曰高風靣熱之所為也痰熱相感而動風風痰相亂則悶瞀故謂之風眩大人曰癩小兒曰癎其實則一得方療治萬無不愈但恐証候不審或差違大都忌食十二屬肉而賁豚為患發多氣急氣急則死不可救若發其病者宜急與續命湯也用急時但度灸穴便大針針之無不差者初得針竟便灸最良灸法次列于後余業之以來三十餘年所救活者數十百人無不瘥矣後人能曉此方幸各參以余術焉方茯神湯出千金方治風眩倒屋轉吐逆惡聞人聲茯神獨活各四兩黄耆遠志防風各五兩生薑三兩甘草人參當歸牡蠣白术蓯蓉附子各二兩右㕮咀以勞水一斗二升煑取三升服五合一日夜盡續命湯出千金方治風眩發則煩悶無知口沬出四體角弓目各噤不得言竹瀝一升二合生地黄汁一升龍齒生薑防風麻黄各四兩防己三兩附子三分石膏七分桂心二兩右㕮咀以水一斗煑取三升分三服有氣加附子製一兩紫蘇子五合橘皮半兩以服續命湯口開四肢尚安定而心中尚不除者紫石湯主之獨活散一名獨活白术散出聖濟總錄療風眩厥逆身體疼痛百節不隨目眩心亂反側苦癲發作無常獨活四分白术六分防風八分細辛人參乾薑各四分蜀天雄炮桂心各一分栝蔞六分右細篩旦以清酒服半方寸匕日再忌李桃雀肉猪肉冷水生菜生葱等一方無桂心芍藥湯出聖濟總錄治風眩暗倒旋屋轉腦痛芍藥防風去义石膏研碎木通各一兩葛根半兩甘菊花擇半兩麻黄去根節一兩甘草炙剉前胡去蘆頭各三分右㕮咀毎服五錢七水一盞半生薑三片棗一枚去核煎至一盞去滓入荆瀝半合重煎令沸早晩食後臨卧温服一方無甘草荆瀝普濟方卷一百五
