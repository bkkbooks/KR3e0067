body:
  text: 普濟方卷八十一明周王朱橚撰眼目門目昏暗論夫目昏暗之疾其候有二肝氣不足則氣弱腎氣不足則精衰血弱精衰不能榮養于目漸致昏暗又云眼者五臟六腑隂陽之氣皆上注于目若血氣充實則視分明若血虛竭則為風邪所侵故令昏暗不明也龍木論云肝氣目暗內障此眼初患之時蒙籠昏暗並無赤痛內無翳膜此是腎臟虛勞肝氣不足眼前多見花發數假形狀或白或黑或黃或赤如此患者切忌房室事過多如夜看經書亦令失明也見一物兩形缺服補肝散缺藥丸立效詩曰蒙籠逺視不分明赤痛全無黑白睛淨下令肝虛元氣眼前花發數般形權時辭却隂陽事經書裁縫暫且停不是臣家穿鑿説古來聖者記章程缺方還睛神明酒出聖濟總録治眼昏暗及內外障失明黃連去須五兩石決明草決明生薑石膏黃硝石蕤仁秦皮山茱萸當歸黃芩去心沙參朴硝甘草炙芍藥澤瀉桂去皮車前子薺子淡竹葉柏子仁防風去叉烏頭去皮臍辛夷菊花芎藭白芷瞿麥穗桃仁去皮尖炒細辛地膚子龍腦三錢丁香一錢二分真珠二十五顆無孔者右㕮咀絹囊盛用好酒五斗甕中浸之春夏一七日秋冬二七日食後服半合勿使醉吐稍稍至百日後目明如舊惟不治枯損睛破者但黑白不損服此藥更生瞳子如故補肝丸一名羊肝丸出龍木論治眼暗青葙子桂心葶藶子茺蔚子杏仁細辛枸杞子五味子各一兩茯苓黃芩地膚子防風澤瀉決明子麥門冬蕤人各一兩之銖車前子兔絲子兔肝一方用白羖羊肝瓦磚一具乾地黃三兩一方用熟者一兩五錢右為末蜜丸飲二十丸如梧桐子大再加至三十丸或溫水下日三服不拘時聖餅子出聖濟總録治昏暗視物不明黃芩去心蒼术各一兩菊花木賊旋覆花防風去叉蟬殼草決明青葙子甘草炙銼蔓荆實惡石炒羌活桑葉􅔾子芎藭真珠各五錢蛇蛻皮五錢鹽泥固齊瓶子燒之有翳即用右為末煉蜜和就杵藥三五百下丸如小彈子大揑餅子每服一丸食後湯水嚼下沙糖水下亦得決明散出御藥院方治眼目昏花逺視不明川芎井泉石仙靈脾槐花各一兩蛤粉水飛防風石決明水飛甘菊荆芥羌活蒼术泔浸去皮地骨皮杜蒺䔧炒木賊去節薄荷甘草炙各一兩川椒二錢五分炒黃芩右為末每服二錢熱茶清調下日一服青葙子丸出聖惠方治肝風多淚眼目昏花青葙子甜瓜子仁兔絲子酒浸三日曝乾別杵為末麵麴炒令微黃烏梅肉微炒桂心蔓菁子決明子牡荆子茺蔚子枸杞子螢火蟲微炒地膚子柏子仁各一兩川大黃二兩銼炒微碎蕤人二兩湯浸去赤皮細辛二兩右為末煉蜜和搗三五百杵丸如梧桐子大每服不計時候溫酒下二十丸蟬花散出聖濟總録治眼一切昏暗疾蟬花柏子仁郁李人去皮甘草炙銼大黃炒銼延胡索逺志去心蜜蒙花石韋去毛槐樛防風去叉各一兩甘菊花旋覆花蛇蛻微炙焦乾蝎炒烏賊魚骨去甲草茶芽各五錢右為散每服一錢米飲調下食後日三纍經效忌動風物撥雲退翳丸治一切眼目不明楮實薄荷各五分川芎一兩五錢當歸一錢五分黃連甘菊花蟬退瓜蔞根生用六錢蔓荆子炒二兩蛇退晒乾蜜蒙花荆芥穗甘草香白芷木賊草防風各三錢右為細末煉蜜丸如櫻桃子大每兩作十丸日進二服治眼引子于後氣障眼煎木香湯送下眼常昏暗茶清湯下眼睛青盲當歸湯下婦人血暈眼亦當歸湯下磁石丸出聖濟總録治翳勞眼目昏暗磁石火煅醋淬一十遍車前子各三兩羚羊角鎊茯神去木防風去叉牛膝酒浸切焙兔絲子酒浸一宿山芋山茱萸覆盆子白茯苓去黑心檳榔煨銼枸杞子芎藭各一兩五錢熟乾地黃焙二兩甘菊花一兩右為末煉蜜和丸如梧子大空心黃耆湯下四十丸還睛丸治眼目昏翳蟬退洗晒蒼术童便浸二宿焙熟地黃洗焙白蒺藜炒去刺各三兩川芎一分茺蔚子羌活木賊去節童便浸一宿晒乾甘菊花荆芥杏仁去皮尖焙石決明煅存半生兔絲子酒浸焙研蛇皮酒浸洗淨焙防風各五錢右為末煉蜜和丸如彈子大每服一丸食後細嚼茶下冬瓜子散出聖惠方治眼昏暗漠漠不明冬瓜子一兩青葙子牡荆子地膚子蔓菁子決明子車前子茺蔚子白蒺梨去刺微炒松子仁桂心櫻薁根蕤人湯浸去皮兔絲子酒浸三日晒乾搗為末細辛各三分右為細散不計時候以溫水調下一錢五味子丸醫方大成治心肝二經蘊積風邪并腎臟虛耗眼目昏暗或生翳膜阿膠蚌粉炒熟地黃洗各一兩白茯苓去皮麥門冬去心各五錢山藥五味子貝母柏子仁人參各一兩百部茯神去皮木逺志去苗取根上皮防風去蘆杜仲去皮二兩薑汁浸炒去絲右為細末煉蜜丸如彈子大每服一丸食前薑湯嚼下補肝丸主明目地膚子藍子蒺藜子車前子瓜子兔絲子青葙子茺蔚子各二兩決明子五合細辛桂心螢火蟲各五分大黃八分黃連六分右搗篩蜜和為丸如梧子大每服十五丸日三加至三十丸忌熱麵生冷酢滑油蒜豬雞魚蕎麥黃米生蔥生菜地膚子丸出聖惠方治眼補肝祛暗明目能令逺視地膚子白蒺藜炒去刺青葙子決明子黃連去須覆盆子兔絲子酒浸三宿乾晒別搗為末各三分茺蔚子藍子各一分螢火蟲炒去翅足各一分車前子甜瓜子細辛各五錢生地黃右為末煉蜜和搗三二百杵丸如梧子大每服不計時候以溫酒送下二十丸治眼暗方出千金方古錢十枚銅青乾薑石鹽胡粉菥蓂子各中棗大烏頭棗核大黃連三銖細辛五銖蕤人一百二十枚酢二合清酒五合楸葉一把取汁右治篩合煎取三分去一盛瓷器中若燥取人乳和傅目慎風冷天雄散出聖濟總録治目昏暗眩轉倒仆或三兩日却明發動無定久成青盲天雄炮製去皮臍山茱萸人參芎藭白术逺志去心獨活去蘆頭桂去粗皮葛根茯神莽草各五錢防風去叉三分山芋三兩右為散每服一錢空心甘菊花酒調下食後再服日三漸加至二錢兔肝丸出聖惠方治肝腎氣虛眼虛昏暗久視無力兔肝炙二兩川大黃二兩五錢銼炒研微防風去蘆頭元參車前子茯神龍齒各一兩決明子地骨皮各三分枳殼麩炒微黃去穰甘菊花苦參各五錢麥門冬右為末煉蜜和搗三二百杵如梧子大每於食後以溫漿水下二十丸山芋丸出聖濟總録治眼視不明􅲿􅲿昏暗補不足山芋巴戟天去心兔絲子酒浸切焙杜仲去皮炒炙續斷各一兩五錢桑寄生生乾地黃焙各三分右為末煉蜜和丸如梧子大每服二十丸漸加至三十丸空腹酒下補腎丸出醫方大成治腎氣不足眼目昏暗瞳人不分明漸成內障五味子熟地黃酒蒸浸枸杞子楮實子覆盆子酒浸肉蓯蓉車前子酒蒸石斛去根各一兩青鹽五分別研沈香五分別研磁石煅醋淬七次水飛兔絲子淘淨酒浸別研各二兩右為末煉蜜為丸如梧子大每服七十丸空心鹽湯下當歸丸出危氏方治頭疚腦虛眼昏睛蒙牛犀人參白术當歸芍藥木香茯苓丁香牛膝酒炒蓯蓉天麻各五錢腦麝少許右為末好酒三升牛羊膽一枚熬成膏丸如梧子大每服三十丸麝香湯下青葙子散出聖濟總録治年深日久目視昏暗青葙子烏賊魚骨各二兩羌活防風去叉甘草炙各一兩石決明二兩半荆芥穗一兩半蒼术米泔浸去皮三兩半焙蠶退蟬蛻蛇蛻皮此三味各一兩入合子實填赤石脂固濟合子口勿令煙出炭火燒通紅右為散每服一錢茶酒調下食後臨臥決明子散出聖惠方治肝臟風熱眼目昏暗隱澀疼痛決明子甘菊花青葙子羚羊角屑犀角屑芎藭元參黃芩茯苓梔子仁各一兩甘草半兩炙黃右為散每服四錢水一盞入竹葉七片煎六分去滓食後溫服空青丸出聖濟總録治目昏暗益血脈鎮肝空青研三兩羚羊角鎊茯神去木馬蹄決明子枳殼麩炒去穰大黃炒青葙子地膚子龍腦車前子各一兩半黃連去須一兩半一方用三兩右搗研為末煉蜜和丸如梧子大每服二十丸食後米飲子下日服茯神湯出聖濟總録治眼昏暗將成青盲茯神去木山芋逺志去心肉蓯蓉去粗皮酒浸切焙人參地骨皮蔓荆子青葙子羚羊角鎊甘草各半兩甘菊花三分右粗搗篩每服三錢以水一盞煎至七分去滓食後臨臥服日再決明丸出聖濟總録治眼目風毒昏暗草決明湯洗三遍照乾菥蓂子甘草炙細辛京芎甘菊花荆芥穗旋覆花蒼术河水浸切片曝乾木賊各等分右為細末煉蜜為丸如櫻桃大每服一丸細嚼茶酒下不計時候瀉肝湯治臟中痰實熱衝眼翳膜暗苦竹根八兩半夏四兩洗乾藍茯苓枳實白术各三兩乾地黃細辛甘草炙各二兩杏仁一兩去皮尖右以水一斗二升煮取二升七合分三服忌羊肉餳酢物海藻松菜生菜蕪荑菜桃李雀肉等羚羊角湯出聖濟總録治頭旋眼暗欲成青盲羚羊角鎊二兩羌活去蘆頭黃芩去黑心防風去叉元參各一兩半細辛去苗半兩車前子決明子升麻人參各一兩半右粗搗篩每服三錢水一盞煎至七分去滓食後臨臥服之日二次羌活散出聖濟總録治風毒目昏暗退翳膜羌活去蘆頭防風去義楮實蒺藜子炒去角芎藭甘草炙銼各一兩蒼术米泔浸焙荆芥穗菊花各二兩右為散米飲調下一錢日三磨光散出直指方治諸風攻眼消磨翳障除昏防風羌活甘菊甘草炙鹽水草決明蟬退去足沙苑蒺藜形如羊腎慢火炒杵去刺石決明搗碎細研水飛過蛇皮剪碎和麻油瓦炒川芎各半兩右為末每服一錢半用麥門冬去心煎湯調下食後臨臥服四物五子湯出仁存方治心腎不足眼目昏暗當歸酒浸川芎熟地黃白芍藥覆盆子枸杞子地膚子兔絲子酒浸炒車前子酒蒸以虛實加減各等分右為末煉蜜丸如梧子大每服五十丸鹽湯下不拘時治腎經虛冷水候不升不能上蔭肝木致令眼目昏暗或赤澀痛癢無時出醫方大成川芎荆芥天麻茯苓川烏烏藥金叉石斛牽牛當歸各等分右為末煉蜜丸如豆大硃砂為衣每服一丸薄荷茶嚼下決明子散出聖惠方治眼昏暗袪風止淚決明子地膚子細辛白芷桂心車前子各三兩柏子仁防風去蘆頭二兩川椒四兩去目及閉口者炒去刺右為細散每空心及晚食前溫酒下二錢蔓青子丸出聖惠方治眼昏暗不能逺視蔓青子五味子枸杞子地膚子楮實水淘去皮炒青葙子決明子茺蔚子免絲子酒浸三日晒乾為末各一兩右為末煉蜜和搗三二百杵丸如梧子大每於空心以溫酒下二十丸晚食前再服之磁石丸出聖惠方治肝腎風虛眼目昏暗四肢無力磁石燒醋搗碎七遍水飛過兔絲子三兩酒浸三日別研為末桂心黃耆銼羚羊角屑車前子薯蕷各一兩細辛熟乾地黃一兩半右為末煉蜜為丸如梧子大每空心以溫酒下三十丸加至四十丸治眼昏暗不明視物不快大便熱小便赤宜服此方出護命方元參黃芩甘草蜜蒙山梔子麻黃去根羌活菊花白蒺藜去刺各一分右為細末臨臥熱湯調下一錢半治眼暗及風赤眼癢方極良出肘後方煎白鹽三匙烏錢四枚右以青醋漿四升煎二升澄清每旦及晚洗眼亦去膚肉單漿治者洗之亦佳青葙子丸出聖濟總録治氣毒攻注目昏澀疼青葙子牡丹去心地骨皮杜仲蜜炙焦黃芎藭赤芍藥黃連去須各一兩地龍去土一分右為末煉蜜和丸如彈子大每服一丸細嚼茶清下食後服牛犀飲子出龍木論治目昏暗牛犀角鎊桔梗各二兩羚羊角鎊人參去蘆頭茯苓去皮黃芩知母防風各一兩右為末每服一錢水一盞煎至五分夜食後去滓溫服金膸煎丸出御藥院治眼目昏花逺視不明久視乏力常服滋血益水去風助目力杏仁半斤去皮尖炒黃黑為末用紙三兩裹厭去油易油紙令如粉為用防風去蘆頭枳殼金叉石斛去根銼牛膝切酒浸焙乾當歸各四兩生乾地黃熟乾地黃各一兩右用石臼中為末煉蜜和丸如梧桐子大每服四十丸空心溫酒下粥飲下亦可養肝丸出仁存方治肝血不足眼目昏花或生眵疾久視無力方見本門肝虛眼類養肝丸地黃湯出護命方治眼病昏澀因發而久不愈者防風羌活黃芩黃連地黃當歸人參茯苓各等分右為粗末每服五錢水盞半煎至一􅊦食後湯服天麻丸出聖濟總録治偏正頭疼毒風攻注眼目腫疼昏暗及頭目旋運起坐不能天麻一兩半附子炮製去皮臍半下湯浸七遍去滑各一兩木香荆芥穗芎藭各半兩桂去皮一分右為末入乳香勻研和滴為丸如梧子大每服五丸漸加至十丸茶清下日三聖明散出聖濟總録治肝腎不足眼目昏暗羌活去蘆頭青鹽各半兩惡石蜀椒去目及閉口者炒去汁荆實木賊蒼术米泔浸一宿切焙各一兩右為細末每服二錢水一盞煎至五分去滓食後溫服艾煎方出聖濟總録治眼缺熟艾二兩好醋二升熟銅末一分蕤仁黃連去須石鹽各一兩秋根一兩半去皮無根帶亦得右搗研大味為末安于醋中煎取三合去滓收拾熟銅器中入鯉魚膽烏雞膽各一分和勻用槐木去皮濶三指長一寸向日中研藥勿住手候如餳即止夜點眼眥頭避風日中不點熱淚中出勿住羚羊角飲出聖濟總録治眼不見物羚羊角菊花羌活去蘆頭各三分漏蘆去蘆頭元參胡黃連升麻各半兩右粗搗篩每服五錢以水一盞半煎至八分去滓食後溫服日二主眼湯去熱氣漠漠視物不見并翳秦皮黃蘖皮蕤人各三分細辛二分茺蔚子三分黃連四分古銅錢七枚右切以水二升煮取八合平日洗目忌生菜補益豬腎丸出聖濟總録治眼目昏暗附子炮製去皮臍黃耆切酒浸焙牛膝酒浸焙各一兩肉蓯蓉切酒浸焙黃蠟各半兩蜀椒去目及閉口者炒去汁白蒺䔧炒各三分右除蠟外為末用豬腎對蔥白五莖各細切以法酒炒各欲熱入蠟令溶盡搗爛搜和藥為丸如梧子大每服二十丸空心食前鹽湯下之地黃丸出聖濟總録治目昏暗地黃二斤一斤生暴乾一斤于甑中炊一頓飯間取出暴乾防風四兩杏仁半斤去皮尖炒黑色并用川紙三兩重裹壓去油可四五度令如粉金叉石斛枳殼麩炒去穰牛膝各四兩右為細末煉蜜丸如梧子大每服三十丸空心用蕪豆淋酒下海上方出危氏方治眼昏不見物冷淡清淫及青盲天行後一切眼疾以西國草一名畢楞加一名覆盆子暴乾搗令極爛薄綿裹之以男乳汁中浸如人行八九里久用點目中即仰臥不過三四日視物如少年禁酒油麵或用葉自然汁以新筆蘸點一方加腦子少許尤佳聖餅子治眼目昏花木賊甘草甘菊花川芎川椒連翹各一兩右為細末煉蜜丸如彈子大每服一丸食後茶清細嚼神效柴胡散出濟生摘粹明目益腎水柴胡羌活防風生地黃芍藥甘草各等分右㕮咀水煎臨臥服之青葙子丸主眼風暗有花青葙子槐子覆盆子地膚子菥蓂子車前子各三分右搗篩煉蜜和丸如梧子大日服十五丸忌辛豬雞牛羊肉魚蒜麵酢等物甘菊花丸出衛生家寶方治男子腎臟虛弱眼目昏暗或生黑花常服明目暖水臟活血注顔注筋骨甘菊花二兩去土枸杞四兩熟地黃三兩乾山藥半兩右為細末煉蜜和丸如梧子大每服三五十丸空心食後各一服溫水下決明子丸出聖惠方治肝明目祛風除暗決明子槐子覆盆子地膚子青葙子車前子各一兩右為末煉蜜搗三二百杵丸如梧子大每空心溫酒下二十丸晚食前再加服之芎藭散出聖濟總録治眼目昏暗川芎菊花荆芥穗石膏各一兩甘草炙半兩右為散每服二錢溫水調下食後臨臥甘菊花散一名菊花散出聖濟總録治肝腎風毒氣衝目疼痛昏暗方見本門風毒衝目虛熱赤痛類治眼漠漠無所見方出千金方蕤仁秦皮黃連各一分八銖螢火七枚決明子一分右㕮咀以水八合微火煎取三合冷以綿注洗目日三度杞苓丸專治男子腎臟虛耗水不上升眼目昏暗逺視不明漸成內障白茯苓八兩去皮真枸杞四兩酒浸蒸當歸二兩洗青鹽一兩别研兔絲子酒浸蒸右為細末煉蜜為丸如梧桐子大食後湯下七十丸神聖膏一名太良膏治眼目昏花方見本門一切雜治類點眼藥出濟生拔萃除昏退翳截赤氣痛當歸二錢黃連一兩防風一錢半生甘草一錢細辛半錢右銼水一大碗文武火熬滴水中不散為度撇去沫熟蜜少許點用之車前子丸出聖惠方一名駐景治眼目昏暗宜服補肝明目方見本門目眊類兔肝丸出聖濟總録治肝虛目暗黃連洗一兩半去須熟乾地黃焙胡黃連各一兩草決明半兩右為末細切兔肝研爛丸如梧子大每服二十丸米飲下食後臨卧服龍肝煮散出聖濟總録治頭注目昏暗魚膽細辛去苗葉人參防風去叉各半兩右為散每服二錢水一盞沙糖少許同煎六分溫服甘石膏出瑞竹堂治眼昏花視物不明爐甘石研代赭石煅醋淬七次黃丹各四兩水飛過白蜜半斤右將二石碾為細末次與黃丹和合用銅鍋將蜜煉過白沫更添水五六碗熬沸下煎藥以文武火熬至一碗用銅器攪拭藥滴水中洗下為度方可住火熬成用夾紙四重濾過用淨磁器盛貯密封不要透下塵土恐點時隱眼昏花不時點之治眼不見光明蟬蛻白蛇蛻木賊去節各一兩生薑一斤去皮為末右為末煉蜜和丸如彈子大留一料分作三十丸服一月茶清臨臥時服之苓术丸出聖濟總録治肝腎久虛眼目昏暗視物不明變成內障蒼术米泔浸秋冬七日春夏三日去皮切片焙乾為末三斤白茯苓去皮為末二斤蜀椒去目及閉口者出汁為末一斤右拌勻用蜜煮麵糊為丸如桐子大每服三十丸至五十丸溫熟水下不拘時日三服補肝散出千金方治目失明漠漠青羊肝一具去膜以新瓦淨拭內肝炭火上炙令乾汁盡為末決明子半升蓼子一合熬令香右治篩以粥飲食後服方寸匙日二稍加至三匙不過兩劑能一嵗服之可夜讀細書一方酒糊丸如梧子大每服三十丸食前米飲下七寶散出御藥院治目不明昏澀難開南爐甘石一斤用炭火燒熟為末枯白礬一錢黃連三兩去鬚用水一碗煎三五沸濾絹去滓右將黃連水煎入爐乾石末內用紙糊三兩重坐於灰池內滲令乾次用枯白礬一錢同研為末每點一黃米大于大眥頭漸至菉豆許每日只點一筯治目昏出神效方荆芥穗地骨皮楮實各等分右為末煉蜜丸如梧子大每服二十丸米飲湯下夜光丸一名雙美丸治眼方出醫方集成治目眼昏暗及諸疾兼退翳膜蜀椒去目及閉口者炒去汁一斤半搗取末一升甘菊末一斤右和勻取肥地黃十五斤切搗研取汁八九升許將藥末拌浸令勻暴小乾入盤中攤暴三四日內取乾候得所即止勿令太燥入煉蜜二斤同搗數千杵丸如梧子大每服三十丸空心日午熟水下久服自能夜視髮白再黑通神強志延年益夀一方用熟地黃二兩浸酒九蒸九暴食後細嚼新淅米十粒道下或用茶清下亦得治目卒無所見出肘後方以錢石上磨汁注眥中又方出肘後方以黃土著水中攪令濁以洗眥中良真珠煎治肝虛寒茫茫不見物真珠研細一分鯉膽二枚白蜜二兩右合和銅器中微火煎一半新綿濾過瓷瓶中盛每以銅筯點如黍米大著目眥中即淚出頻點取差地膚子散出聖惠方治眼熱目暗地膚子枸杞子檾實各二兩右為細散每服不計時候以溫酒調下二錢車前子散治目受風熱昏暗乾澀隱痛車前子黃連去須各一兩要宣州者右為散每服三錢食後溫酒調下臨臥再服黑豆丸出聖惠方治肝腎風虛目暗黑豆緊小者牛膽右量膽大小淨擇豆布擦過內牛膽緊繫頭垂淨屋下隂乾每日食後熟水下二七粒治眼暗赤冷淚方出千金方蕤仁波斯鹽右等分治篩以驢生脂和每服傅目四角以一粟大密室中將息一月瘥忌五辛失明者三十日傅之柴胡散出千金方治眼暗柴胡六銖決明子十八銖右治篩人乳汁和傅目可夜書見五色合德丸補虛活血健骨輕身聰耳明目除昏蒼术去皮泔浸二日薄切晒乾四兩地黃熟者焙切二兩右為末酒糊為丸如梧子大每服三五十丸溫酒或米泔下食前日進三服點藥出危氏方治暑熱行路眼昏澀者黃連三寸切爛生龍膽草汁一合右用生絹捩出汁點入目中葈耳粥治眼昏暗葈耳實一升白米右先搗羅葈耳實為散水調濾取汁和米煮作粥如常法空心服之蕪菁子丸治眼昏暗蕪菁子一合米三合右將蕪菁子丸遍研以水調濾取汁和米煮作粥空心食之地膚子散出聖惠方治五勞七傷明目兼治肝虛目昏補肝方見本門目赤腫疼類蔓菁子散出聖惠方治眼補肝氣明目延年益夀蔓菁子一斤以水淘淨黃精三斤和蔓精子九蒸九暴乾右為散每空心以粥飲調下二錢日午晚食後以溫水再服決明子散出聖惠方治眼補肝除暗明目決明子一升蔓菁子二升用好酒五升煮暴乾右為散每服以溫水下二錢食後及臨臥服槐子丸治眼熱目暗槐子黃連去須各二兩右為末煉蜜丸如梧子大食後以溫漿水下二十丸夜臥再服治勞傷肝氣目暗明目方螢火蟲二七枚白术膽一枚右隂乾為散每取如黍大點之椒沈丸治目黑暗暖水臟沈香一兩椒去目并閉口者炒出汁四兩右為末無灰酒煮麵糊為丸如梧子大每下三十丸空心鹽湯下治目不明淚出方以烏雞膽臨臥傅之一方日三五度點之治眼暗方以銅器盛大酢三四升煎七八日覆器濕地取銅青一合以三月杏白仁一升取汁和銅青傅之日不過三四度大良參附大正氣散治男子婦人眼昏暗不生眵糞此是元氣憊腎經虛夜間小便二次耗傷腸氣致生內障腦中有風或鼻流清涕或腦脂流下或瞳人開濶皆腎脾憊黑水散也用參附大正氣散加枸杞子去梗炒揀菊花蕊同薑棗煎八分去滓食前空心服合滓煎仍服錦鳩丸青鹽丸山藥丸八味丸打和食前溫酒服及四柱散十味正氣散十全大補湯去熟地黃加附子枸杞子菊花蕊薑棗煎服婦人服冷藥過多或崩或白帶致令眼昏不見可服前藥急救治眼暗方以七月七日生苦瓜中白絞取汁一合以酢一升浸古文錢七枚微火煎減半以米許內眥中又方以黃蘖爪甲許每朝含使津置掌中拭目訖以水洗之至三百日眼明此法可終身行之永除眼疾治暑或行路目昏澀多眵黏者生龍腦薄荷五七葉淨洗手揉爛右用生絹捩汁滴入眼中妙治眼目昏暗取桑樹老皮燒灰用水煎七分去滓澄清洗一年如童子眼光明并開洗眼日于後正月初八日二月初十日三月初五日四月初八日五月初八日六月初七日七月初七日八月初三日九月初十日十月初九日十一月初八日十二月二十二日又方用朴硝六兩重水一盞煎八分冷定澄清下次分定每月一日洗至一年之間眼如童子光明正月初一日二月初八日三月初四日四月初五日五月初五日六月初四日七月初五日八月初一日九月十三日十月十三日十一月十六日十二月初五日眼藥方用椿柱上鳳眼草燒灰每洗頭後用灰一錢放頭上一周年正月初二日二月初八日三月初一日四月初七日五月初七日六月初十日七月初七日八月初二日九月十三日十月三十日十一月初一日十二月十三日治淚冷目昏以乾薑肥者為末每用一字沸湯點洗退熱明目方以千里光十一個多與甘蔗作飲服治眼暗不足方以蔥實大半升為末每服取一匕頭水二升煮取一升半去滓葺米作粥食良久食之右搗蔥實蜜和丸如梧子大食後飲汁服一二十丸日二三服亦甚明目青羊肝方治眼昏暗不見物者以青羊肝切淡醋食之亦佳青魚膽方出龍木論治目昏用青魚膽汁滴目中主令明目方出十便良方以三月中杏仁研脂汁一升石鹽兩大斗銅器盛之取古銅錢二十七文浸之二七日綿注眼中夜洗眼用延年令明目方以波津香黍米一粒內目眥中當有水出并目中習習然引出此即明之候也須以日申時傅之若似痛以冷水洗之即定以申傅藥者為其目至日下便膜膜然暗如有物也即以藥內眼中淚出以熟帛拭之以水洗訖便豁明也此香以單主百病服之益人勝石乳也本云是外國有之明目甚驗天竺沈香中出此決明散出聖惠方療失明或一二三四嵗拭目中無他疾無所見如絹中視以馬蹄決明二升搗篩以粥飲服方寸匕忌魚蒜豬肉辛菜蕪菁子散出龍木論常服明目補肝肥腸蕪菁子三升淨淘以清酒三升煮令熟乾搗治下篩以井花水和服方寸匕稍加至三匕無忌可少作服之令人充腹肥明目洞視如煮酒服亦可千金翼同用水者三易水一方用苦酒又方出千金方用胡麻一斗蒸三十遍治下篩每日酒服一升又方出千金方服小黑豆每日空心吞二七粒徹視散出千金方常服明目三月三日採蔓花隂乾治下篩空心井花水服方寸匕久服長生明目可夜讀細書亦治虛勞暗眼一方用蔓青二升淘令淨蒸暴三五遍為細散清粥飲下一錢日三四度治男子五勞七傷明目補肝出千金方用冬瓜子七升絹袋盛攪沸湯中三五遍暴乾以醋五升浸一宿暴乾治下篩酒服方寸匕日三服之百日可夜寫細書治勞傷肝氣目暗明目方出聖惠方用螢火蟲三七枚以鯉膽二枚內蟲於膽中隂乾百日搗為末每以少許點之妙又方出聖惠方用車前十兩為細散用蜜和蒸令熟香每食後以清粥飲下如彈子大又方出聖惠方用兔絲子三兩酒浸三日暴乾為末雞子白和丸如梧子大每空心溫酒下三十丸又方出聖惠方用鷹眼睛一對炙乾搗末研細以人乳汁再研每以銅筯取少許點于瞳人上日夜三度可以夜見物或取臘月鴝鵒眼睛如上法用效三日見碧霄中物忌煙蒸石決明丸出聖惠方治眼視物漠漠如隔絹看物石決明搗研水飛過車前子羚羊角屑各三分黃連去須菥蓂子各一兩秦皮細辛蕤人湯浸去赤皮甘草炙各半兩右為末煉蜜搗三二百杵丸如梧子大每服食後以溫水下二十丸治冷淚昏暗出儒門事親蜜蒙花甘菊花杜蒺梨石決明木賊白芍藥甘草右各等分為末茶清下一錢服半月後加至二錢消風散出危氏方治眼風癢昏澀用頭風內消風散以荆芥湯下治頭風注目昏暗出海上方芝麻淨六兩槐實淨四兩微炒椒紅淨二兩去汗右將槐實椒紅為末次入芝麻攪勻每三錢就唾津咽之服至九日雲膜遮障者用叉股撥之隨手而下合定再服效金絲膏出直指方治一切眼疾昏暗如紗所遮或疼或痛宣黃連半兩水一盞浸一宿取汁再添水半盞浸滓經半日取汁與前汁放蜜一兩白礬一字井鹽一分無則青鹽代之山梔子二錢槌碎黃連汁同炙五十餘沸濾滓與黃汁一處切入篩藥右用銀瓷器內熬十餘沸用絹上細紙數重濾過常點黃連洗湯療眼翳膜黃連秦皮各二兩蕤仁半兩右㕮咀水三升煮取一升半去滓適寒溫以洗目日四五度又加升麻二兩加水煎之忌豬肉一方搗碎以綿裹於銅器中乳汁一合半浸復去滓每日三五度點眼眥頭春雪膏治風熱上攻眼目昏暗癢痛隱澀難開多淚羞明時發疼痛或生翳膜衛生寶鑑云豫從軍征南數年有病眼者此方用之多效春雪膏上清散黃連四兩銼碎童尿浸一宿去黃用汁爐甘石汁盡研為末南爐甘石十二兩好丹六兩水飛烏魚骨燒存性三錢碙砂一錢細研水調去盞內放湯瓶內候乾乳香三錢當歸三錢麝香輕粉各少許白丁香半錢右為末另裹用白蜜一斤四兩煉去蠟先下爐甘石末不住手攪次下黃丹及諸末不住手攪至紫金色不黏手為度搓作挺子每月一粒新水少許磨化時時點洗之忌酒濕麵豬肉蕎麥上清散出衛生寶鑑治上熱鼻塞壅頭目不清利川芎半兩石膏一兩盆硝一兩桔梗半兩荆芥穗半兩薄荷半兩右為末每以一字口噙水鼻內搐之神效加龍腦三分尤妙五烏丸出永類鈴方治老人婦人眼昏細辛何首烏烏藥各一兩川烏炮淮烏炮五月雄小烏豆防風粉草炙各半兩右以烏豆煮熟焙乾入衆末同米糊丸如彈子大茶清食後嚼一丸菊睛丸一名枸杞丸治眼昏目暗視物不明眵淚難開久服能夜看細書巴戟水浸去心一兩五味子三兩枸杞子四兩揀淨肉蓯蓉二兩酒浸一宿焙乾甘菊花五兩右為末煉蜜丸如梧子大每服五十丸鹽酒送下食前一方無五味子用椒紅每服酒下二十丸久服明目活血防風荆芥散治風毒攻注眼目常多昏暗冷淚不止當歸洗川烏頭炮羌活去蘆頭防風去蘆頭栝􅌣根荆芥穗木賊去節各一兩甘草半兩烏賊魚骨一兩半右為末每服茶清調下食後撥雲散治眼一切昏暗浮雲翳膜侵遮白蒺梨四兩去刺角甘草防風羌活各一兩右以清明日水淨洗於日中晒乾勿令塵土入內杵羅為末非時煎洗明目去暗翳大利老眼得補一之方海鹽隨多揀淨用瓷器盛以百沸湯泡去不淨取清汁於銀石器內熬取雪白鹽花用新瓦器盛每早用一大錢作牙藥揩擦以水熬動用左右手指背迎互口內點鹽津洗兩眼內大小眥頭閉目良久却用水洗面洞視千里法明目堅齒極神妙東坡手録目赤不可具湯浴并忌用炮足湯軀體中熱并集于頭目喪明必矣目見黑花飛蠅論夫眼見黑花皆起于臟腑為陽氣不實隂氣競生故也凡人隂陽安和精氣上注于目却能令目明也若肝膽勞傷氣血不足而更注目強視看讀細書勞所傷承虛致患或因患起早營衛氣虛恣食五辛而傷正氣攝養既已失度眼目于此患生目睹或如飛蠅亂髮因此歲久漸成多般白象龍蛇之形逺近如煙霧看物不真用藥補五臟保養須在于十全不值良醫疾狀彌篤立成內障也聖濟總録曰腎水也肝木也木得水而盛其理也腎水既虛肝無所滋養故見于目者始則昏耗不能逺視久則昏暗時見黑花飛蠅其症如此腎氣可知也治宜以益水去風之劑則標本兩得矣方還睛散治眼見黑花昏暗獨活去蘆頭麻黃去節白茯苓去皮厚朴去皮薑汁製槐子五味子蒺梨子炒去角枸杞子菥蓂子麥門冬人參細辛去苗白芷決明子車前子茺蔚子覆盆子地膚子丹參芎藭防風黃芩去心升麻各一兩一分黃連去心一兩一分逺志去心木通銼柏子仁各二兩右為散以米飲調服方寸匕食後服日再或因飲熱酒食五辛致黑風入眼或因大病後昏暗或因赤不見物或因虛損視物不明但瞳子不曾破者皆可愈撥雲散出聖濟總録治一切風毒眼見黑花攀睛翳暈瘀肉侵睛檾實炒蒺梨子炒去角青葙子各一兩惡實一兩蔓青實三升炒煮各一遍防風去叉菊花旋覆花甘草各二兩炙榖精草石決明地骨皮蟬殼木賊牡蠣燒各四兩烏賊魚骨去角淡竹葉木通龍膽白花蛇酒浸去皮蜜蒙各二兩羌活去蘆頭一兩蒼术去皮米泔浸一宿半兩焙右為散丈夫生椒湯調下二錢婦人茶下小兒疳眼雀目生米泔調下一錢腎藏毒眼即加胡桃仁四兩蓯蓉散出聖濟總録治腎虛風上攻頭旋腦痛眼生翳或有黃黑花起如飛蠅及腰胯酸疼腳膝冷痺肉蓯蓉湯浸焙乾一兩巴戟天去心檳榔煨萆薢麥門冬去心犀角鎊羚羊角陟釐炒各半兩黃芩去心茺蔚子枸杞子人參元參木香槐子決明子炒丹參兔絲子酒浸一宿各三分右為散每服二錢空心溫酒下臥時又用梔子湯一二錢還睛丹出御藥院方治腎虛眼見黑花飛蠅或黑白或紅久不已將變內障威靈仙揀淨青葙子去土巴戟去心蟬殼去土防風去蘆頭并叉蜜蒙花甘菊花旋覆花枸杞子天麻酒浸一宿焙乾地骨皮各二兩香白芷蛇蛻皮各一兩半酒浸一宿炒黃桑花檾子炒香麻子水淘淨炒各一兩蓯容酒浸一伏焙乾二兩右為末煉蜜丸如豌豆大每服五十丸空心食前溫酒白湯送下磁石湯出聖濟總録治肝腎風虛下元冷眼生黑花或昏暗補不足黃耆人參沈香芎藭桂去皮熟乾地黃肉蓯容酒浸去皮菖蒲當歸焙補骨脂炒羌活附子炮製去皮臍覆盆子五味子乾薑各一兩磁石五兩生絹袋盛用水五升煎取二升半後去磁石方下諸末煎之右除磁石外銼如麻豆大拌勻每劑一兩半用大羊腎一對去脂膜細切用磁石水三盞煮羊腎令熟次下藥煎取一盞半去滓分二服磁石丸出聖惠方治眼見黑花衝風淚出逺視不明方見本門內障眼類蕤人丸出聖濟總録治眼見黑花飛蠅作痛昏暗漸成青盲蕤人去皮地膚子石決明淨洗人參細辛去苗地骨皮白茯苓去皮白术各二兩楮實三兩空青别研防風各一兩半石膽半兩研熟乾地黃三兩焙鯉魚膽五枚青羊膽一枚右除膽及研藥外細銼搗羅為末拌勻膽汁煉蜜丸如梧子大每服二十丸食後米飲下再服羌活散出聖濟總録治目視茫茫或見黑花蠅翅羌活去蘆頭甘草炙石決明生研蜜蒙花蒼术去皮防風去叉蒺梨子炒木賊各半兩蔓青子葳靈仙去土乾桑葉荆芥穗蠶沙炒各六兩石膏研半兩煅紅右為散每服一錢食後溫水下眼赤澀沙糖水下臥再服宿鳩丸出聖濟總録治肝腎氣虛眼生翳暈及見黑花宿鳩一隻去毛羽嘴足炙黃羊肝一具清油煠定血切作片焙蔓青子半升炒三遍蜀椒去目及閉口者炒出汁楮實仙靈脾羌活去蘆蟬殼各一兩木賊一兩甘菊花去荆芥穗蒼术米泔浸去皮蒺梨子炒各二兩右為末煉蜜丸如梧子大每下三十丸用溫酒鹽湯下不拘時乾地黃丸出聖濟總録治腎虛眼見黑花診右手尺脈常沈而數是其候也熟乾地黃焙石斛去根黃耆防風去義兔絲子酒浸三日晒乾研車前子茺蔚子肉蓯容酒浸一宿焙覆盆子一兩地膚子一兩兔肝一兩炙磁石醋淬七次一兩研水飛過右為末煉蜜和勻杵五百下丸如桐子空心晚食前鹽酒下三十丸兔肝丸出聖濟總録治肝腎毒攻風衝眼生黑花視物不見兔肝去筋膜薄切焙羌活去蘆頭黃連去須菊花各三分龍腦地骨皮車前子青葙子柴胡防風萎蕤白附子各半兩右為末煉蜜丸如梧子大每服二十丸食後竹葉水送下羚羊角丸出御藥院方治肺肝風熱凝滯見紅白黑花頭額偏疼漸昏暗不見物羚羊角屑一兩車前子決明子石決明研水飛過犀角屑各三分獨活防風去蘆蔓荆子甘菊花吳藍子梔子仁甘草各半兩炙右為末煉蜜和搗三五百杵丸如梧子大每服二十丸食後溫漿水下日用二服熟乾地黃丸一名滋隂地黃丸治血弱隂虛不能養心致心火旺陽火甚偏頭腫悶瞳子散大視物花發當養血涼血益髓除風散火則愈矣出聖濟方熟乾地黃一兩柴胡八分人參二錢當歸身五錢酒洗焙地骨皮三錢甘草黃芩各五錢黃連三錢枳殼炒三錢五味子三錢天門冬三錢去心生地黃酒洗七錢半右為末煉蜜和丸如菉豆大每服一百丸茶清送下食逺日進三服忌食辛辣物而助火邪及食寒冷物損胃氣藥不上行也防風湯一名羚羊角散出聖惠方治眼見黑花或眼暗漸變青盲防風去叉羚羊角車前子各三分細辛甘草菊花羌活黃芩人參決明子元參各半兩右粗篩每服三錢用水一盞煎七分去滓食後溫服羌活丸出聖濟總録治腎毒風攻衝眼生黑花風淚不止羌活菊花白茯苓蒺梨子枳殼肉蓯容附子黃耆沈香兔肝萆薢右為末煉蜜丸如梧子大每服三十丸空心食前薄荷鹽湯送下摩頂膏出聖濟總録治肝腎虛風上攻眼生黑花或如水浪空青研青鹽研各半兩槐子木香附子各一兩丹砂一分牛酥二兩鵝脂四兩蓮草自然汁一升龍腦半錢右為末先以蓮草汁牛酥鵝脂銀器中熬三五沸下諸藥末煎一半即止盛瓷器臨臥用舊鐵一片重二兩蘸藥頂上摩二十遍再服決明丸忌鐵器決明丸出聖濟總録治眼見黑花不散決明子甘菊花各一兩車前子防風芎藭蔓荆子梔子人細辛白茯苓元參薯蕷各半兩生乾地黃二分右為末蜜和搗三二百杵丸如梧子大在食前桑枝湯下二十丸日三羚羊角湯出聖濟總録治眼見黑花或頭旋目暗欲變青盲眼腫微開羚羊角決明子人參升麻元參車前子各一兩羌活去蘆防風去義一兩半細辛去苗半兩右銼如麻豆大每服三錢水一盞半煎八分去滓溫服不拘時芎藭丸出聖濟總録治肝腎虛風上攻眼生黑花頭目不利內障翳暗疼隱澀芎藭細辛蟬殼甘菊花荆芥穗羚羊花蕤人蒼术右為末煉蜜丸如梧子大每服一丸茶湯鹽湯下不拘時通明丸出聖濟總録治肝腎氣虛眼目昏暗時見黑花飛蠅石決明芍藥桔梗車前子細辛茺蔚子熟乾地黃右為末煉蜜丸如梧子大每服二十丸鹽湯臨臥加至三十丸摩頂膏出聖惠方治眼見花或黃紅黑白不定附子木香硃砂龍腦青鹽牛酥鵝脂右將附子木香為末入硃砂下五味同研令勻以慢火熬成膏每用少許不時頂上摩之昨葉何草丸出聖濟總録治眼見黑花視物不明薄荷葉羌活荆芥穗蒺藜子附子昨葉何草右除黑外搗羅為末將黑豆研爛和丸如梧子大每服十丸空心溫水下一方加羌活半兩服此藥名更合蕤人散開之蕤人散出聖濟總録治眼見黑花昏暗蕤人羌活天麻槐子山梔子黃芩黃連菊花右為散每服一錢溫水調下食後日二服有人患眼見黑花或如大環當目前漸如小蟲樣後又變如粉點只見三二分物服此二藥二十餘日頓愈更不復發一方加細辛甘草各一兩芎藭丸出醫方集成治逺視不明常見黑花久服增明眼力芎藭菊花荆芥薄荷甘草各一兩蒼术二兩湯浸右為末煉蜜丸如梧子大每服五十至六七十丸食後茶清下日一服或二服白龍粉出御藥院方治腎水衰虛肝經邪熱視物不明或生翳障弩肉攀睛或迎風淚出眼見黑花或如蠅飛油星或睛澀痛腫或癢不可忍並治之用硝三斗二九月造一大罐熱水浸開以綿濾過入銀石器內煎一半已上就鍋內放溫傾銀盆內露地放一宿次日結成塊子别水內淨洗再用小罐熟水化開熬火蘿蔔二個切片子同煮以熟為度傾在器內撈去蘿蔔不用仍于露地一宿結成塊子去水日中晒一日去盡水色入好紙袋盛于透風日處至風化開逐旋於乳鉢內研細點眼如常法亦名元明粉肉蓯蓉丸出聖惠方治眼昏翳赤澀逺視似有黑花及內障不見物肉蓯蓉酒浸一宿去皮炙乾磁石燒醋淬一次研細神麯炒少黃青鹽各一兩雀兒十個去毛嘴爛研兔絲子一兩酒浸三日晒乾為末右為末以好酒二升入少煉熟蜜入雀肉及鹽研令極爛成膏和諸末丸如梧子大空心食前以溫酒下二十丸一方無磁石五倍丸出聖濟總録治眼見黑花去翳明目巴戟天去心一兩枸杞子揀淨二兩甘菊花淨三兩旋覆花淨四兩蜀椒去目及閉口者淨五兩右將椒入銀石器中入青鹽四兩醋三升慢火煮乾如器小旋添醋煮待醋盡將前四味為末鍊蜜丸如梧子大每服三十丸加至四十丸空心鹽湯下黃連丸出聖濟總録治一切眼疾青盲黑花赤脈熱淚黃連去須甘菊花車前子羚羊角鎊芒硝各一兩右為末煉蜜丸如梧子大食後溫水下二十丸加至三十丸黃蘖漿出聖濟總録治眼看物如兩股或如蠅翅遊絲黃蘖一兩鵝梨三顆黃連去須一兩一分黃芩三分竹葉半兩右㕮咀如麻豆大以水二升煎半升去滓內瓦瓶中入龍腦半分和每夜以銅筯點眼硃砂散治眼中有黑白花逐眼上下光明硃砂研龍腦香各六分車前子三分地骨皮白者決明子各五分右細研如粉少少傅之煮肝煎出聖濟總録治眼生黑花漸成內障及痛澀短視倒睫雀目羌活獨活各去蘆頭青葙子款冬花各一兩右為散每服三錢羊子肝一葉銼細辛竹葉數片同裹如粽别用黑豆四十九粒米泔一盞入銀石器同煮取肝細嚼溫酒下又將豆空心日午夜臥服枸杞子丸出聖濟總録治肝腎風上攻眼生黑花枸杞子二兩旋覆花淨蜀椒炒去汗各一兩巴戟天一兩右為末煉蜜丸如梧子大每服三十丸茶清下不以時白蜜黃連膏出聖濟總録治風毒上攻眼不見物白蜜半斤黃連一兩大棗五枚淡竹葉洗右以水二升煎竹葉取一升去滓下棗等煎取三合去滓煎如稀餳逐夜點眼中三兩滴勿令塵入通明丸出御藥院方治風痰頭目昏䀦目見黑花飛蠅牽頭牛末三兩黑白各何首烏六兩去皮皂角三斤二斤炭在磁罐內不令出煙用紙二張水濕蓋口紙乾為度右為末用皂角一斤熱水浸軟以酒二升搗成濃汁去滓入麵二匙同熬成膏入三味丸如小豆大每服二十丸煎生薑湯下食後日三加至三十丸神效散出聖濟總録治一切眼見昏花經年不愈羞明石決明黃連蜜蒙花各半兩右為散每服二錢食後臥熟水調下神麴丸出聖惠方治肝腎風虛眼生黑花方見本門一切眼疾類蜀椒丸出聖濟總録治見黑花蜀椒一斤用鹽一斤拌三宿去鹽元參半斤銼右為末煉蜜丸如梧子大每服鹽湯下三十丸臨臥服椒目丸出本事方治久年眼生黑花不可者椒目一兩炒蒼术一兩炒右為末醋糊丸如桐子大每服二十丸醋茶送服椒方出聖濟總録治肝腎虛風上攻眼生黑花頭目不利能通神延年以川椒一斤揀淨去目閉口者於銚內炒令透於地上鋪淨紙二重用新盆合定周回用黃土培之半日去毒出汗然後取之曝乾為度只取椒於瓷合子內收每日空心新汲水下十粒甘露湯出聖濟總録治眼見黑花赤痛昏暗以萎蕤焙四兩為末每服二錢水一盞以薄荷葉二片薑一片蜜少許煎七分去滓臨臥服杏子膏出聖濟總録治眼中癢痛時見黑花取初生杏子仁一升古五銖錢七文入瓶密封埋門限經一百日化為水每夕點兩眥頭補肝散出龍木論治眼坐起生花外障茺蔚子一兩半旋覆花羌活知母各一兩甘菊三分防風二兩右為末以水一盞散一錢煎五分食後去滓溫服治眼前常見禽蟲飛走捉之則無膽經為疾出經驗良方酸棗仁羌活元明粉青桐子花各兩右為末每服二錢水一大盞煎七分和滓飲一日三服目暈論經曰瞳子黑睛法于隂白睛赤脈法于陽隂陽俱轉則睛明矣若不和肝氣血弱風邪乘虛而摶于精氣故令精氣聚生于白睛之上繞于黑睛之際水淪昏濁不明是為目暈之候方芎藭散出聖濟總録治目昏澀視物不明芎藭地骨皮何首烏去皮荆芥穗菊花旋復花甘草石決明草決明各一兩蟬蛻去土青葙子木賊各半兩白芷一分右為散每服一錢米泔水調下食後服芎藭丸出聖濟總録治肝血不足兩目暈翳疼痛不可忍芎藭枸杞子荆芥穗蒼术米泔浸一宿甘草炙各一兩細辛去苗蟬蛻焙石膏研旋覆花菊花羌活去蘆各半兩右為末煉蜜丸如彈子大每服一丸臨臥細嚼茶淸下日三服羊肝夾子出十便良方治眼翳膜小疳眼雀目並治之蟬殼黃連各半兩甘草菊花各一分蛇蛻皮一條灰右為末以羊肝一具竹刀批摻藥半勻用麵作夾子每食後吞一服九味犀角湯出聖濟總録治風熱乘虛搏于精氣令目磣痛兼暈翳犀角一兩半梔子仁木通銼黃連去心大黃炒黃連去須甘草炙芎藭各一兩車前子二兩右搗篩每服五錢水一盞半竹葉七片煎八分去滓入朴硝末一錢食後臨臥溫服延年注眼熱暈覆瞳子方柴胡茯苓枳實炙決明子瞿麥各三兩甘草炙黃連蕤人各二兩右切以水一斗煮二升七合去滓分再服忌海藻松菜豬肉酢物七味犀角湯出聖濟總録治風邪攻眼磣痛暈翳犀角三分車前子梔子仁各兩木通銼黃芩去心大黃炒黃連去須各半兩右搗篩每服五錢水一盞半竹葉七片去滓入芒硝末一錢食後臨臥溫服犀角湯出聖濟總録治肝血不足虛熱生浮翳上黑睛疼痛磣澀烏犀角二兩黃連去須甘草炙秦皮去皮青竹茹梔子仁各兩大黃炒半兩右搗篩每服五錢水盞半煎八分去滓食後溫服山芋散出聖濟總録治肝虛血弱毒氣乘虛攻損黑白不明發為目暈山芋防風去叉細辛各一兩去苗山茱萸三分芍藥升麻各半兩蔓荆實去皮三分右為末每服二錢溫酒調下芎辛丸一名芎术丸治眼昏翳及頭目昏疼方見本門目風眼寒類點眼雄黃膏出聖濟總録治眼暗暈生翳纍年不愈兼乾澀痛雄黃研乾薑炮末黃連去須末礬石燒汁盡研丹砂研各一分麝香研一錢右為末雪水二盞和瓶子內重湯煮一日藥候冷用綿絞過點少許于眥頭還明散出聖濟總録治眼生翳昏暗隱澀肉疼痛甘草炙銼二兩白芷烏梅去核各五兩水蛭揀細者炒一兩蚌栗子一百九六枚并皮用虻蟲一百二十枚炒去翅足右為細散每服一錢食後熟酒調下續飲酒半盞壓之日三服蒼术散出聖濟總録治風毒熱搏目生翳暈黑白眼昏濁不明蒼术泔浸一宿切焙四兩木賊童尿浸一宿焙二兩甘草炙二兩半蟬蛻去土旋覆花各一兩右為散每服一錢食後麥門冬水調下療眼因赤瘥後翳暈方決明子碎黃連蕤人各六兩黃蘖四兩鹽緑三分右為末更研細取少許內目中日三四度忌豬肉蔓青散出聖濟總録治肝虛風邪攻目目暈瞻視不明蔓青子四兩洗蛇蛻二兩右用瓦罐盛蔓青子火燒黑焦無聲傾出入蛇蛻在內又輕燒蛇蛻成灰候冷細研每服半錢食後溫酒調下日三普濟方卷八十一
