body:
  text: 普濟方卷三十五明周王朱橚撰胃腑門總論夫胃腑者主脾也口唇者是其候也脾合氣于胃胃者水穀之府也號倉庫守內嗇吏重二斤十四兩迂曲屈伸長一尺六寸大一尺五寸徑五寸受水穀三斗五升其中常留穀二斗水一斗五升廣昡大頭弦胸五穀乃容而滿上焦泄氣出其精微慓悍滑疾下焦不下溉泄諸小腸腸胃所受水穀之數也凡平人無不皆然故胃滿則腸滿胃虛則腸虛更滿更虛氣得上下五臟安定血脈和利精神乃居故神者水榖精氣也五臟不足調施于胃故腸胃之中常留穀二斗四升水一斗一升故人一日再至後二升半一日中五升七日五七三斗五升而留水穀盡故好人不飲不食七日而死者水穀精氣津液皆盡故七日而死右手關上陽絶者無胃脈也若吞酸頭痛胃中有冷刺足太隂治隂在足大指本節後一寸右手關上陽實者胃也若腸胃中伏伏不思食得食不能消刺足陽明治陽在足上動脈脈浮而芤浮則為陽芤則為隂浮芤相轉胃氣生熱其陽則絶趺陽脈浮大者此胃家微虛煩躁必日再行動作頭痛重熱氣盛者居胃胃脈搏堅而長當病其色赤當病析髀其斬而散者當病食痺髀痛病先發于胃脹滿五日之腎少腹腰脊痛脛疼三日之膀胱背臂筋痛小便祕五日上之心脾心痛閉塞不通身體痛重三日不已死冬夜半後夏日昳胃病者腹䐜脹滿胃管當心穴而痛上支兩脅膈咽不通飲食不下下取三里穴飲食不下隔塞不通邪在胃管在上管則抑而刺之在下管則散而去之胃脹者腹滿胃管痛鼻聞焦臭妨于食大便難胃中有癖食冷物者痛不能食食熱則能食脾前為病移于胃脾咳不已嘔吐長蟲厥氣客于胃則夢飲食診得胃脈病形如何曰胃脈實則脹虛則泄脹脾應肉䐃肉䐃堅大胃厚肉䐃麼者胃薄肉䐃小而麼者胃不堅肉䐃不補其身者胃下胃下者脘約肉䐃不堅者胃緩肉䐃無小果瘰癧堅者胃急肉䐃多小果纍者胃結胃結者上脘約不利扁鵲云足太隂與陽明為表裏脾胃若病實則傷熱欲飲水漿常渴虛則傷寒寒則苦飢常痛發于風木其根胃先從四肢起腹滿大通身腫胃絶不治五日死何以知之舌腫溺血大便赤泄咽者咽物之門户也膈者上焦胸中心肺之分野不通者升降之氣上不得交又云清氣在下則生飱泄泄黃如糜米穀不化者是也濁氣在上則生䐜脹中䐜滿不得下大便難或先結後溏皆是症也濁氣在上當降而不降者乃腎肝吸入之隂氣不得下而逆在上也胃氣逆上或為嘔或為吐或為噦者是隂火之邪上衝而吸入之氣不得入故食不下也此皆氣衝之火逆胃之脈反上而作者也清氣在下則生飱泄者胃氣未病之日當上行心肺而經營也因飲食失節勞役形體心火乘于土位胃氣弱而下陷于隂中故米穀入而不升遂降而為飱泄也膈咽之間交通之氣不得表裏者皆衝脈上行逆氣所作也蓋胃病者上支兩脅膈咽不通飲食不下取三里者是也針經云清之與濁相干亂于胸中是為大悗者惑也氣不交通最為急證不急去之諸變生矣聖人治此有要法陽氣不足隂氣有餘先補其陽後㵼其隂是先令陽氣升發在陽分而後㵼隂也春夏之日陽氣在經當益其經脈去其血絡秋冬陽氣降伏當先治其臟腑若有噎有塞塞者五臟之所生隂也血也噎者六腑之所生陽也氣也二者皆由隂中伏隂而作也胃實熱附論夫右手關上脈陽實者足陽明經也病若渴引水頭痛汗不出如溫瘧唇口乾善噦乳癰缺盆腋下腫痛腹脹心懸消榖喜飢溺黃名曰冒實熱也冒氣盛熱則壅澀不宣藴積生熱面目悉黃譫妄狂周身熱多汗腹脅堅滿大便祕難皆其證也方凝神散出脈數鈐方收斂胃氣清涼肌表人參白术茯苓山藥各一兩白扁豆粳米知母生地黃甘草各五錢淡竹葉地骨皮麥門冬各二錢半右㕮咀每服三錢水一盞薑三片棗一枚煎不拘時候服清陽湯出濟生拔粹方治口喎頰腮急緊胃中火盛必汗不止而小便數升麻黃耆當歸各二錢葛根一錢半紅花桂枝酒黃蘗各一分甘草一錢炙蘇木甘草生各半錢右㕮咀作一服酒三大盞煎一盞三分去滓稍熱食前服訖以火尉其緊結處即愈夫病口喎筋急者是筋脈血絡中大寒此藥以代燔針劫刺破惡血以去其凝血內作泄衝脈之火熾通熱湯出聖惠方治胃氣實熱苦頭痛汗不出口中乾燥一名子芩散人參二兩甘草一兩炙柴胡去黑心葛根銼麻黃去根節白茯苓去黑皮各一兩一用赤茯苓黃芩去黑心五加皮各半兩銼石膏三合碎右㕮咀每服三錢水一盞生薑三片煎七分去滓溫服一方無人參加味大黃湯治面熱如醉此為胃熱上薰其面加大黃以利之茯苓四兩甘草乾薑細辛大黃各三兩五味子半夏杏仁各半斤右水一斗煮三升去滓溫服半升日三橘皮竹茹湯永類鈐方治胃熱多渴嘔噦不食赤茯苓去皮橘皮去白枇杷葉刷去毛麥門冬去心青竹茹半夏各一兩湯泡七次人參甘草各半兩炙右㕮咀每服四錢水一盞半薑五片煎八分去滓溫服無時黃芩梔子湯聖惠方治胃氣實熱頭痛寒熱狀如溫瘧唇口乾燥或生乳癰腋下腫黃芩去黑心梔子仁犀角鎊赤茯苓去黑皮赤芍藥各一兩射干一兩大黃半兩銼炒右㕮咀每服五錢水二盞煎一盞入生地黃汁半合蜜一匙攪勻更煎數沸去滓食後溫服一方無芍藥忌炙煿熱麵黃芩湯聖濟總録治胃氣實熱口舌乾燥頭痛煩渴黃芩去黑心紫苑各一兩去苗葛根銼赤芍藥各三兩甘草半兩炙石膏二兩碎右㕮咀每服三錢水一盞煎七分去滓溫服不拘時泄熱蘆根散聖惠方治胃實熱常渴引飲水蘆根銼栝蔞根麥門冬各一兩去心赤茯苓知母甘草各三錢右㕮咀每服三錢水一中盞入小麥五十粒竹葉二十七片生地黃一分生薑半分煎六分去滓食後溫服黃連丸聖惠方治胃實熱氣盛消穀善飲頭目痛衄血煩渴黃連去須栝蔞根麥門冬去心焙知母焙茯神各一兩去木右為末煉蜜丸梧桐子大每服三十丸熱水下不拘時粥飲下亦可前胡湯聖濟總録治胃實熱乾嘔煩悶目黃燥渴前胡一兩半去蘆頭茅根二兩銼麥門冬去心焙甘草各一兩黃芩半兩去黑心右㕮咀每服二錢水一盞煎七分去滓溫服不拘時茯芩散聖濟總録治胃腑實熱發渴飲水漿不止茯神去木銼一兩栝蔞根麥門冬各三兩半去心焙葳蕤知母各二兩焙右㕮咀每服先以水三五盞煮小麥一合淡竹葉一錢沸去滓然後下藥末五錢生地黃半錢棗一枚擘破煎一盞去滓溫呷清胃散濟生拔粹治因服補胃熱藥而致上下牙痛不可忍撁引頭腦滿熱發大痛此足陽明别絡入腦也喜寒惡熱此陽明經中熱盛而作也升麻一錢牡丹皮半錢當歸身生地黃各三錢酒製淨黃連六分不好加二分夏月倍加之無易法右㕮咀作一服水一盞半煎七分去滓稍冷服赤芍藥湯治胃氣實熱煩躁多渴唇焦口乾引飲不止方見脾臟門脾疸類黃連丸聖濟總録治胃氣實熱煩躁多渴黃連去須赤茯苓各三兩去黑皮麥門冬一兩去心焙苦參半兩右為末煉蜜丸梧桐子大每服三十丸食後臨卧竹葉湯下犀角飲聖惠方治實熱嘔噦吐逆不食頭痛煩渴犀角鎊枇杷葉炙去毛麥門冬去心焙葛根各一兩銼右㕮咀每服三錢水一盞煎七分去滓溫服不拘時一方有生薑半分葛根湯出聖濟總録治胃實熱煩渴咽乾吐逆葛根十兩銼汁甘草三兩炙半夏二兩生薑汁半杯漿水半升同浸焙乾右㕮咀每服三錢水一盞生薑二片竹茹少許煎七分去滓溫服不拘時地黃飲聖濟總録治胃氣實熱唇口乾燥頭昏體倦五心煩熱生地黃汁生薑汁藕節生蜜各二合右調和令勻分三服不拘時地骨湯聖濟總録治胃氣盛實壅塞不宣藴積為熱口渴煩地骨皮二兩防風去義甘草各一兩炙右㕮咀每服三錢水一盞半煎一盞去滓食後溫服薑汁飲一名三和飲子治胃中實熱吐逆心煩不下飲食治通利腸胃除胸中煩熱解酒渴用菘菜二斤煮作羮啜之止作韭菹食亦得治胃痺熱中隂渴止痢小便益氣力補虛輕身長年用粱米炊飲食之理胃中熱去身腫健脾消穀止脹用大豆一升煮令熟杵米飲服之補氣湯十便良方生胃中津液并治上焦虛熱夜卧口乾五味子三兩須用遼東甘草半兩白鹽一兩炒三件同拌于器中經一宿取出焙乾吳茱萸一錢右為細末乾淨磁瓶中盛每以熟湯不拘時點一盞服治胃氣實熱口乾唇裂中心熱燥大腸祕非時煩渴睡中口內生涎楊子建萬全護命方大黃半兩桔梗枳殼只使青前胡葛根梔子各一錢右件細搗羅為末每服二錢匕水一盞生薑三片同煎取八分食後和滓喫平胃散醫方集成治胃經實熱口乾舌裂大小便祕澀及熱病後飲熱不除畜于胃中四肢發熱口渴無汗厚朴去皮薑炒射干米泔浸升麻茯苓各半兩芍藥一兩枳殼去瓤麩炒大黃蒸甘草各一兩炙右㕮咀每服四錢水一盞煎七分空心食前服治胃中熱下氣本草以溲疏作湯浴之若病胃脹滿心胃悶發熱本草即用葈耳服之治胸胃熱氣本草以蛇母草絞汁食之效升麻湯治瀉胃食熱方見本門胃虛冷附論夫胃合于脾陽明是其經也為水穀之海凡五味五榖入口則胃實而腸虛食下則腸實而胃虛六腑實而不滿五臟滿而不實臟氣不足調之於胃胃虛則生寒寒則苦飢心腹恆痛兩脅虛脹善鳴時寒時熱唇口乾咽喉不利飲食不下面目浮腫淅淅惡風目中急足脛寒不得安臥則是胃虛冷之候也健脾丸治虛勞羸瘦身重胃冷飲食不消泄㵼不止或作帶下變五色噦臭鍾乳粉赤石脂各一兩半煆枯礬乾薑炮蓯蓉酒浸石斛酒浸五味子桂心澤㵼桑上寄生逺志去心焙人參柏子仁當歸酸石榴皮龍骨煆天雄炮去皮臍牡蠣粉白頭翁去苗甘草各一兩炙右為末蜜丸梧桐子大米湯下三十丸空心服硇砂丸出聖濟總録治胃氣虛冷不思飲食陳橘皮湯浸去白焙桂去粗皮乾薑炮當歸切焙厚朴去粗皮薑汁炙芎藭胡椒縮砂去皮甘草炙銼附子各四兩炮去皮臍白术三兩五味子一兩半右除别研外為末用銀石鍋好酒一升白蜜一十兩先下硇砂二兩阿魏半兩青鹽二兩好麵一兩煎煮稀稠成糊入藥末和劑熟杵丸梧桐子大每服二十丸生薑鹽湯送下不拘時調中散出直指方治腸虛泄㵼止嘔進食藿香葉縮砂蓬术炮肉桂草果各半兩麥芽炒益智仁橘紅各三錢蒼术炮神麴炒桔梗各一兩甘草三錢炙右用乾薑茴香各半兩為末每三錢薑棗少鹽煎服木香散出衛生家寶方治臟寒冷極及久冷傷敗口瘡下泄米穀不化飲食無味肌肉瘦癢心多嗔恚虛陽上衝婦人産後虛冷下泄及水㵼冷痢木香一兩破故紙一兩良薑砂仁厚朴各三兩薑製赤芍藥陳皮肉桂白术各半兩胡椒茱茰各一兩肉豆䓻四個檳榔一個右為末每三錢用不經水豬肝四兩批片重重糝藥漿水一碗醋入茶腳少許入瓶蓋覆煮熟入鹽蔥白三箇薑切一彈大同煮水欲蓋空心作一服冷食之初微溏不妨此是逐下冷氣少時自住經年冷痢滑泄只是一服渴則飲粥湯忌冷油膩如不能則漿水暖食之若只用漿水煮豬肝丸梧子大每服五十丸用粥湯下若暴㵼只一服一方用銀石器盛煮熟乾地黃散出聖惠方治胃中虛冷肌肉不榮身體枯燥骨節皆痛熟地黃一兩白茯苓三錢當歸三錢銼炒麥門冬三錢去心焙乾薑半兩炒川椒一分去目并閉口者炒去汗吳茱茰一分湯浸焙炒桂心三分甘草半兩炙人參一兩去蘆五味子三分木香三分右為末每服二錢溫酒食前調下忌生冷丁香溫氣湯出百一選方治胃寒嘔吐涎沫張上舍名萃云其母常服有效丁香吳茱茰湯浸炒桂心各一兩去粗皮附子炮去皮臍黃耆去蘆白茯苓各三兩人參去蘆半夏湯炮七次良薑白茅各一兩甘