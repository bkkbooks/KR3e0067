泥和藥再搗三千杵丸如梧子大每服十丸白湯下日三下甚者加龍骨阿膠艾各三兩乾薑散出千金方治不能食心意冥然忘食乾薑法麯蜀椒大麥芽䜴各一升右為末食後米飲服方寸匕日三以能食為度消食斷下丸出千金方治數年不能食寒冷者常服之麴大麥芽各一升吳茱萸四兩右為末蜜丸如梧子大每服五十丸白湯日三服麴蘖散出千金方消穀能令除腸中水氣腹脹法麴麥芽杏仁各五兩右為末食後酒服一合日三開胃生薑丸治中焦不和胃寒水穀不化噫氣不通噎塞痞滿口淡吞酸食時臌脹噦逆惡心嘔吐痰水宿食不消嗽脅肋刺痛寬中開胃進美飲食桂心一兩甘草二兩炙生薑一斤切鹽三兩淹一宿焙乾青皮去白陳皮各二兩去白廣茂當歸縮砂四十九個右為末煉蜜丸如彈子大每服一丸食前細嚼沸湯化下平胃丸出千金方治丈夫小兒食實不消胃氣不調或溫濕熱結大小便不利者有病冷者服露宿丸熱藥後當進此丸調胃葶藶各一兩杏仁五十枚大黃二兩小草甘草芍藥芎藭各一兩右為末蜜丸桐子大每服五丸米飲下日三一嵗小兒二丸漸加之千金翼有菖蒲當歸乾薑茯苓麥門冬細辛為十二味無杏仁調中益五臟開胃令人能食出本草以草鼓食之利五臟健胃令人能食以蛆煮食之以飯壓之不爾令人口乾開胃消食出本草以蓮藕生研服之開胃通心膈出本草以麥芽炙作熟水飲主開胃出本草以蓮藕蒸煮食之良開胃通利五臟用鯔魚煮食久食令人肥健而開胃鯔魚似鯉身圓頭匾骨軟生江海水中調中消食去惡氣用羅勒生食之即蘭香也味辛溫有小毒食亦論夫內經曰大腸移熱于胃善食而瘦故謂之食亦胃移熱于膽亦曰食亦胃為水穀之海所以化氣味而為榮衛者也胃氣和則飲食有節精血盛而膚革充盈若乃胃受邪熱消爍穀氣不能變精血故善食而瘦也病名食亦言雖能食亦若飢也胃移熱于膽亦曰食亦以膽為陽木熱氣乘之則爍土而消榖也甘露飲出聖濟總録治胃熱善食不生肌生地熟地天門冬去心麥門冬去心枇杷葉去毛黃芩石斛甘草炙枳殼麩炒山茵陳各一兩右㕮咀每服三錢水一盞煎七分去滓食後溫服日三升麻湯出聖濟總録治胃熱健食消穀善飢不生肌肉病名食亦升麻梔子仁射干赤茯苓各三兩芍藥四兩白术五兩生地黃蜜各一升右㕮咀六味如麻豆大每服五錢水一盞半煎一盞去滓加地黃汁半合再煎兩沸次下淨白蜜半匙共煎取一盞溫服老少加減沉香湯出聖濟總録治胃熱消穀善飲不為肌膚沉香人參麥門冬去心地骨皮小草生甘草生地黃各一兩右㕮咀每服五錢水一盞半煎八分去滓溫服日三不拘時參苓丸出宣明論治胃中熱結消穀善食不生肌肉人參赤茯苓菖蒲逺志去心地骨皮牛膝各一兩酒浸切焙右為末煉蜜丸如梧子大每服二十丸溫米飲下日三不拘時候服乾地黃湯出聖濟總録治胃熱善食而瘦病名食亦地黃麥門冬去心栝蔞根各三兩甘草炙枳殼黃芩各一兩右㕮咀每服五錢水一盞半煎七分去滓溫服日二三噫酸附論夫上焦有留飲脾胃挾宿寒致飲食滯于膈脘不能傳化令人脹滿氣逆所以噫酸也和胃丸出聖濟總録治噫酸惡心痰飲嘔逆不思飲食方見脾臟門兼理脾胃類丁香散出聖濟總録治脾胃虛弱噫氣吞酸食飲遲化丁香縮砂白术乾薑人參陳皮去白附子各二兩炮去皮臍髙良薑桂檳榔白豆䓻陳麴各半兩甘草炙各一錢木香右為末每服二錢炒生薑鹽湯下不拘時丁香煮散出聖濟總録治噫酸吞酸不欲食丁香半兩赤茯苓桔梗白术白芷桂半夏薑汁製甘草人參各一兩乾薑半兩檳榔髙良薑肉豆蔲枳殼各一錢右㕮咀每服三錢水一盞半生薑三片棗子一枚煎至六分去滓溫服木香平氣丸聖濟總録治心胸有痰噫酸吞酸木香沉香丁香肉豆䓻丹砂射香各半兩檳榔麵裹慢火煨熟去麵不用乳香一兩揀通明者生薑汁內煮軟别研如膏半夏二兩湯浸七次焙乾為末生薑汁和作餅子入藥同研右除丹砂乳香半夏射香四味别研外將木香等七味一處為末次入丹砂射香再拌研勻細後將乳香半夏末入生薑汁煮作薄糊拌和前藥如拌和未就以生薑汁煮糊拌和硬軟得所為度丸如梧桐子大每服十五丸至二十丸食後溫米湯送下丁香丸聖濟總録治胃寒痰飲噫酸吞酸胸膈妨悶丁香母丁香丹砂麝香乾薑礬石飛過附子炮去皮吳茱萸杏仁去皮炒硫黃各一錢巴豆三十枚去皮膜别研為膏去油右研末拌勻用蒸棗肉和劑丸菉豆大放乾每服三五丸不拘時溫薑湯下丁香丸聖濟總録治噫酸吞酸或時惡心懶進飲食丁香五味子半夏人參各半兩甘草琥珀乾薑各一兩枳殼麩炒昆布洗去醎水訶子桂右為末煉蜜丸梧子大每服三十丸煎薑橘皮湯下京三稜丸聖濟總録治噫酸吞酸消積進飲食京三稜三兩濕紙裹煨熟白术二兩丁香半兩檳榔一兩半夏四兩去滑麝香一錢丹砂半兩右除研為細末入研藥再研令勻以生薑自然汁煮麵糊丸如梧桐子大每服二三十丸木香生薑湯下無時丁沉煎丸和劑方辟寒邪散胸膈中凝滯調順三焦和養榮衛治心胸痞悶噫酸吞酸嘔逆痰水津液不收兩脅刺痛腹中堅滿口苦無味不思飲食丁香十二兩沉香二兩木香一錢半陳皮一兩白豆䓻九兩半右為末别用甘草熬膏子為丸每一兩分作二百五十丸每一粒含化空心食前常服養榮衛散滯氣治噫酢咽肘後方治人食畢噫酸及醋心吳茱萸半兩人參二兩生薑三兩大棗十三枚右㕮咀水六升煮水二升先服一升日再半夏丸聖濟總録治上焦冷氣噫醋吞酸吐沫嘔逆不思飲食半夏二兩去滑丁香半兩乾薑一錢右為末生薑自然汁煮麵糊為丸梧桐子大每服十五丸熟水鹽湯下不拘時又半夏丸聖濟總録治上膈痰滯吞酸吐沫涕唾稠粘胸膈不利半夏二兩用生薑炙山芋一兩礬石飛過右為末用麵糊為丸每服十丸至二十丸食後臨卧生薑湯下丁香丸聖濟總録治噫酸息臭胸中有痰丁香萆撥各一兩硇砂半兩研細用百沸湯量多少化研以淨紙濾過八次磁碗內慢火熬乾右同研令勻好新黃蠟二兩入瓷器內鎔化入上味攪勻候溫酒通手丸桐子大如硬難丸復近火溫之以丹砂一分研為衣每用煨生薑湯下空心夜卧各一服三丸逐日加一丸至五丸後三日加一丸至七丸止藿香半夏丸聖濟總録治膈中有痰脾胃積冷噫酸吞酸不思飲食藿香葉一分丁香半夏五兩薑汁浸一宿焙乾右為末麵糊丸梧桐子大每服十五丸不拘時溫生薑湯下薑棗丸聖濟總録治胃寒痰逆噫酸吞酸胸膈不利不思飲食生薑四兩丁香附子各一兩炮去皮臍右為末用蒸棗肉丸梧桐子大每服十五丸至二十丸米飲不拘時送下治胃冷常吐清水醋心聖濟總録乾薑礬石各一兩燒過别研右為末米飲丸如梧桐子大蔥茶下二十丸食後服治醋心肘後方橘皮二兩檳榔四兩右為末空心生薑湯下方寸匕一方蜜湯下又方傳信遍方用用胡桃爛嚼以乾薑下之或只嚼胡桃喫乾薑亦可治治噎酸漿用取頭垢漿水煎煮膏服之驗一方水煎服治酸心每心氣上攻如醋肘後方用取茱茰一合水三盞煎七分頓服涎濃亦須強服近有人心如蜇破服此方後二十年不發增損成氣丸療胸脅肋滿背上時有灑熱則痛腹脹多噎醋咽氣逆兩脅滿前胡枳實橘皮大黃各七分桂心吳茱茰乾薑各五分茯苓四分芍藥六分厚朴杏仁七十個去皮炒右為末內杏仁脂中研爛篩度蜜和丸每服食後少時酒飲任性初服七丸如梧子大以氣宣下泄為度忌生蔥大醋茯苓湯治吐酸茯苓陳皮生薑各十二分白术甘草人參桂心各六分紫蘇一錢檳榔七枚右㕮咀水九升煮二升絞去滓分溫三服每服如人行六七里未好差三兩日更服一次老小腹微痢忌生蔥酢物雀肉海藻菘菜檳榔散療吐酸水每食則變作醋水吐出檳榔人參茯苓陳皮六分萆撥六分右為末空腹取生薑五大片合搗絞汁溫內散方寸匕攪調頓服旦服漸加至一匕半若利多減以微通泄為度忌酢物生冷油膩豬魚等茯苓湯療心頭氣結連胸臍皆痛及吐酸水日夜不止茯苓厚朴各四兩檳榔白术各二兩生薑十兩右㕮咀水九升煮二升七合絞去滓分溫三服每服相去如人行七八里須利加檳榔末一兩半湯欲熱時內之甚安穩三日服一劑類服六五劑則可停忌酢物桃李雀肉等一方有吳茱萸人參各三兩治酢咽麴末一升地黃三斤右合搗日乾以酒服三寸匕日三白术散治食訖醋咽多噫食飲不下及脾胃虛冷白术一兩吳茱萸半兩湯浸七遍焙乾微炒髙良薑半兩右為粗散每服三錢以水一大盞入生薑半分煎至六分去滓不拘時候稍熱服前胡丸治胸脅支滿背上時寒腹脹多噫醋咽逆氣前胡一兩半去蘆頭枳殼一兩麩炒微黃去瓤桂心一兩草豆䓻一兩去殼髙良薑二兩銼乾薑半兩炮製銼赤茯苓一兩吳茱萸一兩湯浸七遍乾微焙赤芍藥一兩川大黃二兩銼碎微炒厚朴二兩去粗皮生薑汁炙令香杏仁一兩湯浸去皮尖發麵炒微黃右為末煉蜜丸搗三二百杵丸如梧桐子大每服不計時候以生薑湯下三十丸檳榔散治酸咽吐水及白沫飲食不消腹脹脅滿檳榔一兩厚朴二兩去粗皮塗生薑汁炙令香熟甘草半兩炙微赤銼川大黃一兩銼碎微炒白术一兩訶梨勒皮一兩陳橘皮一兩半湯浸去白焙桂心一兩吳茱茰半兩湯浸七遍焙乾微炒右製為粗散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服檳榔丸治脾胃氣冷上攻胸膈嘔吐酸水不思飲食腹脅虛脹檳榔半兩髙良薑三錢銼陳橘皮半兩湯浸去白瓤焙桂心一錢厚朴半兩去粗皮生薑汁炙令香熟訶梨勒皮半兩半夏半兩湯浸去滑草豆䓻半兩去皮白术半兩右為末煉蜜和搗三二百杵丸如梧桐子大不計時候生薑湯下三十丸木香散治脾胃冷氣上攻胸膈切痛醋咽不能下食木香一兩厚朴一兩去粗皮塗生薑汁炙令香熟甘草一兩陳橘皮二兩湯浸去白瓤焙白术二兩甘草半兩炙微赤銼髙良薑半兩銼前胡二兩去蘆頭右為粗散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服人參散治食畢即咽醋心胸氣滯腹脅疼痛不能下食人參二兩去蘆頭吳茱茰半兩洗七遍焙乾微炒木香半兩半夏一兩湯浸洗七遍去滑陳橘皮二兩湯浸去白瓤焙髙良薑一兩銼右為粗散每服三錢以水一中盞生薑半分棗三枚煎至六分去滓不計時稍熱服半夏散治醋咽胸中氣塞飲食不下半夏半兩湯洗七遍去滑人參一兩去蘆頭赤茯苓一兩甘草半兩炙微赤銼吳茱茰半兩湯浸七遍焙乾微炒訶梨勒皮二兩右為粗散每服三錢以水一中盞生薑半分棗三枚煎至六分去滓不計時候稍熱服陳橘皮散治噦逆酸咽胸膈不利食少腹脹陳橘皮二兩湯浸去白瓤焙白檳榔一兩人參一兩去蘆頭白术一兩厚朴一兩半去粗皮塗生薑汁炙香熟右為粗散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服療醋咽用羌活五兩搗用水一升浸三宿每日溫服五合差生薑湯治酒食所傷心胸煩滿口吐酸水多嘔逆飲食無味胸膈不快乾生薑一斤白麵炒三斤甘草十三斤炒杏仁去皮尖麵炒另研十斤右炒鹽二十二斤同為末每服半錢如茶點喫常服一匙消食化痰寬胸膈不拘時候除胸間酸水本草以雞蘇作生菜食之普濟方卷三十五
