羊腸中兩頭緊繫放麩碗中安之上以紙覆之却將碗合蒸一炊久去麩取藥并腸細切搗如膏更入煉蜜和丸如菉豆大每服以粥飲下七丸日二服量兒大小以意加減沉香膏治小兒針無辜核後冝煉貼之沉香一兩銼黃丹六兩右件藥以清麻油一升先下沉香燋黑漉出下黃丹不住手攪以慢火煎之後滴於紙上如黑錫無油傍映即成膏每貼法以箆子於爛帛上攤膏令稍薄貼之一日一換勿令風吹著針處為妙雉肝散治小兒無辜疳右將雉肝一具乾者搗濕者熬為末分三服每服丹砂散後即一服米飲調下半錢蝸牛煎治小兒無辜疳右用蝸牛殼七枚舊死者皮薄黃白色者是淨洗不得小有塵土漉乾內酥蜜殼中入瓷瓶紙糊頭飯上蒸之下飯時即坐甑中裝飯及蒸飯熟細研如水淀漸與服一日服盡大黃煎丸治無辜閃癖或頭乾瘰癧頭髮黃焦落去或乍痢乍差諸狀既多不可備説四肢黃瘦食物不長肌膚精神失緒大黃九兩錦文新實者若微朽即不用銼去蒼皮乃稱右搗篩為散以上好米醋三升和之置銅碗內於大鐺中浮湯上炭火煮之火不用猛又以竹木箆攪藥候堪丸乃停放小瓷器中密貯兒年三嵗一服七丸如梧子日再服常以下青赤膿為度若不下膿或下膿少者稍稍加丸下膿若多丸又須減病重者或至七八劑方盡根本大人小兒不等以意量之此藥惟下膿及宿結不令兒痢禁牛馬驢雞豬魚肉生冷粘滑油膩小豆蕎麥乳母亦同蝦蟇丸治小兒患無辜疳三焦虛熱飲水不歇下痢頻併日夜無度煩躁乾嘔食入即吐如此惡證服諸疳藥未安一服虛熱去兩服煩渴止三服㵼痢住不過三服諸證悉應尅效萬一神聖祕密蟾蜍一枚夏月取生活者乃是溝渠中腹肚大不能跳又不能鳴者身上多痱磊是也右取糞蟲一杓放於桶中更以尿灌四邉令乾即留得蟲却將蟾蜍打殺放在蟲上任其蟲咀食兩日乃用新布作袋包裹小麻繩繫於急流中浸一宿明日取上晒乾瓦上焙為末入麝和勻湯浸蒸餅丸如麻子豆子大兒小者二十丸大者三十丸溫飯飲下或麥門冬去心煎湯空心食前日進二服切效神妙却冝至誠修合和夜明砂為末入蜜中啖之治無辜疳演山人參散治小兒疳熱虛煩作渴不思乳食四體腫脹服此吞前蝦蟇丸作效人參莪术當歸龍腦棟根甘草炙赤芍藥白茯苓枳殼各等分為末麥門冬湯下漏蘆散治小兒無辜疳肚脹或時㵼痢冷熱不調冝服漏蘆一兩右為細散每服以水磨犀角湯下半錢空心午後各一服量兒大小以意加減療無辜疳腦後兩畔有小結者方凡無辜之病此結為根欲療者先看結之大小然後取細竹斟酌籠得此結便截竹使斷狀如指環形仍將此竹籠結自然不得轉動以火針針結於中央作兩下去針訖乃塗少許膏藥無者雜油亦得須待三兩日又如前復針更經一兩日當膿水自出若不出復如前針候膿潰盡結便自散俗法多用刀子頭割者謂之割無辜此未𠫭詳殊不如針之以絶根本恐後者不悉故重復説之治無辜疳其證腦後項邊有核如彈按之轉動軟而不疼其間有蟲如米粉冝速破而去之免蟲如血氣流散淫蝕臟腑以致肌體癰瘡便利膿血壯熱羸瘦頭露骨高急用竹刀刺破刮去核內蟲又楊氏方用夜明砂為末加飲食內食之膏藥貼則愈或因浣濯兒衣露於簷下為雌鳥落羽所灑兒著衣蟲入皮毛亦致斯疾凡晒兒衣須微火烘之疳􅉶附論夫小兒嗜食甘味多而動腸胃間諸蟲致令侵食臟腑是名疳􅉶也凡食五味之物皆入於胃其氣隨其臟腑之味而歸之脾與胃為表裏俱象土其味甘而甘味柔潤於脾胃脾胃潤則蟲動侵食成疳也但蟲因甘而動故名之為疳也若蟲食下部則肛門生瘡爛開急者數日便死冝速療之小兒宿有疳氣加以腸胃虛弱寒邪乘之則變下痢久而不止腸胃益虛寒濕相乘蟲因虛動侵蝕臟腑或口齒生瘡或肛門傷爛故名疳􅉶方緋帛膏緋帛燒灰研一分倒棘刺四十九枚燒灰研雄黃研磁石搗研麝香研蚺蛇膽研各一分槐枝一條長八寸銼豬脂臘月者五兩右先研六味為細末次煉脂作油去滓下槐枝煎令焦黃去槐枝下六味藥末煎成膏以磁器盛每用少許塗下部日三次五福化毒丹治小兒􅉶鼻疳瘡清膈涼血玄參一兩桔梗去蘆八錢淨赤茯苓人參牙硝青黛各二錢半甘草二錢麝香少許右除麝香牙硝别研餘一處為末以和青黛煉蜜為丸如圎眼大用金銀箔為衣薄荷湯化下瘡疥餘毒磨生犀水下如上焦熱口血臭氣用生地黃自然汁化開食後服麝香丸治小兒疳􅉶下部開張痢有膿血爛癢赤腫麝香研蟬殼去足豬牙皂莢去皮子灰蘆薈研人中白研各一分青黛半兩研右為細末先取五月五日蝦蟇一枚以繩子雙繫後腳倒挂用胡黃連一寸以綿線繫定內蝦蟇口中將不滲器承蝦蟇涎從午至戌解放蝦蟇只取胡黃連并涎用將六味藥末涎和丸如黍米大每用先將暖水洗兒軟帛拭乾後扶坐取一丸子以乳汁少許化下須臾如醉慎勿驚之蟲即自出若蟲色白或身黃頭黑皆是病淺易差若蟲子遍體亂出紛紛如碎剪馬尾此必死之候苦參丸治小兒疳蟲蝕下部久痢膿血舉體痛癢面色虛腫苦參雄黃研白礬燒各半兩麝香少許研藜蘆去蘆頭一分右為末以一小棗許內下部中日兩三上黃蘖散治小兒疳𧈟齒瘡宣露黃蘖根皮炙銼黃連去鬚黃芩去黑心升麻銼各三分大青半兩乾蝦蟇酥炙一分右為散以綿裹貼齒齗上吐涎麻子膏治小兒疳􅉶下痢不問赤白大麻子二兩黑豆黃一兩青黛半兩研蝦蟇一枚燒灰研右先研麻仁搗研黑豆等四味為末與麻仁同研如稠餳入少許竹瀝和勻圎瓷收貯口鼻疳瘡者每服半七匙米飲調下日三服若腦脊疳每日塗鼻上若下部開以綿裹藥半七匙內下部日二換量兒大小加減治小兒疳蛔蝕口鼻及下部赤爛方大麻仁三合地龍去土炒一兩亂髮如雞子大葶藶半紙上炒兩右除亂髮外並搗碎與髮勻拌都入在一根新竹筒內置於瓦上以熱炭火燒取瀝少許塗兒口鼻頂上及穀道中蝦蟇散治小兒下部疳􅉶瘡乾蝦蟇塗酥炙令黃蕪荑微炒乾薑炮製銼葵莖灰莨菪子水飛去浮者煮令芽出候乾炒令微黃黑色白礬燒令汁盡各半兩右為細散三嵗兒每服以溫水調下一字看兒大小以意加減又方乾蝦蟇一枚塗酥炙令微黃蚺蛇膽半兩木香半兩硫黃半兩麝香二分右為細散都研令勻三嵗兒每服以溫水調下一字日再服量兒大小以意加減苦參膏治小兒疳𧈟蝕下部苦參五兩艾葉二兩青葙子甘草炙銼各三兩右先以青葙甘草為末次用水五升煎苦參艾葉成湯涼久去滓入二味藥末和作梃子長一寸如筋許大暴乾塗豬脂內下部日再貼蟲出盡為度又方治小兒下部疳􅉶瘡吳茱萸根白皮一兩桃白皮一兩右細銼以酒一大盞浸一宿看兒大小漸漸分服之又方治小兒疳􅉶蟲蝕下部以鐵衣少許研細綿裹內下部中黃連丸治小兒疳􅉶或口齒生瘡或肛門傷爛黃連去鬚一兩白蕪荑半兩麝香一錢右為末麵糊和丸如麻子大一二嵗每服十丸溫米湯飲下日三服治小兒下部癢痛方枳實二兩鬼箭羽一兩木香一兩右為粗散以鹽醋拌和炒令熱用青布裹日三度尉之治疳􅉶口齒及下部以飛亷蒿燒灰搗篩以二錢七熱尉痛處忍之若不痛非疳也下部蟲如馬尾相纒出無數十日差二十日平復雄黃散治小兒􅉶蟲蝕下部雄黃研胡粉各半兩右細研如粉每用半錢乳汁調內下部中日三上以差為度豬膽飲治疳􅉶蟲蝕肛門治不以時多至殺人豬膽一枚苦酒五合右同煎量力空心飲之蟲即死又方治小兒疳􅉶蟲蝕大腸赤爛羊膽汁漿汁各一分右藥相合令勻日三四度塗之治疳􅉶無問新舊皆治之右用蝦蟇燒灰好醋和傅日三五度瘥治小兒下部疳􅉶蟲蝕大腸赤爛右用水銀一兩以將水煮之取少許以唾研安著竹筒吹入下部中三度差又方大麻仁一分右以水研取汁與飲之量兒大小臨時加減日三四服候蟲出盡即住又方扁竹一兩右以水一杯煎六分去滓看兒大小加減溫服又方艾葉一兩右以水一杯煮取六分去滓看兒大小加減溫服又方青黛一兩右為末散先用麻油塗上次用此藥貼之日三四度效又方胡粉二兩熬令黃色右細研豬脂和日三度塗之治疳􅉶用雞腸草燒傅之五疳出蟲附論夫小兒五疳之疾皆由乳哺不調寒溫失節之所致也久而不差則腹內有蟲肌體黃瘦下痢不止冝服藥出之則疳氣漸退又因肥甘所致蓋臟腑氣血更相榮衛逢甘則中緩致榮衛行遲故臟腑之間化為諸蟲其蟲狀如絲髮或如馬尾多出於腹背及頭頂上若蟲色黃白及赤可療青色者不可療也方乾蟾丸治小兒五疳眼鼻多癢寒熱往來臟腑不清或㵼膿血肌體瘦弱飲食不化多困少力眼澀饒睡兼治驚風乾蟾一枚大者端午取蛇蛻皮大者一條穀精草二兩三味同入一瓶子內以鹽泥固濟燒灰胡黃連甜瓜蒂母丁香各一分熊膽研天竺黃蘆薈雄黃研各一分丹砂研牛黃研龍腦研麝香青黛研各半兩右為末再研勻獖豬膽汁煮麵糊丸如菉豆大每服三五丸米泔下量兒大小加減服藥後以桃栁湯浴兒著青衣蓋疳蟲出衣上及肩毛髮邊如細麩片子或如糝麵塵青黑色者難治黃白色易一方無熊膽水銀丸治小兒五疳四肢黃瘦腹脹氣粗髮乾作穗眼鼻多癢精神昏悶不欲飲食宜出蟲仍宜粥飲下丸日三服甚者半月內差水銀三分硫黃半兩二味結沙微炒細研粉霜半兩蘆薈半兩細研硃砂半兩細研水飛過礬灰一分蛤蚧一枚塗酥炙令微黃烏驢蹄灰一分雄黃一分細研蟬殼一分微炒天靈蓋一分塗酥炙黃焦故皮中蛀灰一分白豬糞灰一分右為末研了藥令勻以苦參半升銼碎用水五升浸一宿煮至一升去苦參候熬成膏用諸藥丸如菉豆以獖豬膽去汁將藥入內懸於舍東隂七日候乾以麝香蜜水下三丸後便煎桃柳湯浴兒以青衣蓋遍身蟲出或泄惡氣或㵼惡物便是病源已出小兒每三嵗加一丸服之蘆薈丸治小兒五疳瘦弱腹脹氣粗頻揉鼻眼冝服出蟲蘆薈一分細研田父一枚燒以煙絶便住青黛半兩細研膩粉一錢牛黃一分細研粉霜一錢硫黃一錢細研蟬殼一分蛇蛻皮一條燒灰麝香一錢細研巴豆去皮心十枚研紙裹壓去油右為末入研了藥令勻以粳米飲和丸如菉豆大每服以溫水下二丸良久煎桃栁水浴兒後以青衣蓋遍身當有蟲出白黃色者可治青黑色者難治青黛丸治小兒諸疳青黛研蘆薈研乾浮萍草蝦蟇燒灰蟬殼去土菉豆故破手巾燒灰研香豉炒白礬燒研丹砂研麝香研各一分右為末和勻用粟米飲為丸如麻子大一嵗兒每服一粒用熱水下先以桃栁湯浴兒後與藥服服藥後得睡覆面看脊骨間必有蟲出形狀不定甚者吐出或噎出即愈穀精丹治諸病下蟲如絲髮或如馬尾甚者便至夭傷穀精草三兩入瓶子內鹽泥固濟用慢火煨通赤為度取出胡黃連半兩乾蟾三枚五月五日取者用酥炙黃皂角三寸燒灰瓜蒂半兩母丁香半兩粉霜蘆薈麝香各一分並各研右件都拌勻用豬膽汁和丸如黍米大每服十粒米泔放溫下量兒大小加減田父丸治小兒五疳下痢羸瘦鼻癢田父三分炙微黃夜明砂半兩微炒蛇蛻皮半兩燒灰胡黃連三分白礬灰一分牛黃一錢細研硃砂一錢細研麝香一錢細研莨菪子一分水淘去浮芽炒令黃黑色用右為末都研令勻以糯米飯和丸如菉豆大一二嵗空心熟水下三丸服藥後用桃栁湯洗浴兒了以青衣蓋覆良久當有蟲出黃白赤者易治黑者難醫量兒大小加減服青黛丸治小兒五疳體熱乾瘦髮堅鼻癢不欲乳食青黛半兩蘆薈半兩蟬殼半分人中白半兩麝香一分胡黃連三分蟾涎少許人乳汁少許豬牙皂莢半兩生用右為末五月五日午時修合以稷內棗肉丸及蟾涎乳汁和如黍米大先以桃栁湯浴兒後以粥飲下一二丸後著熱青衣蓋兒看身上有蟲出青黑者不治白黃赤者易差定命夜明砂丸治小兒疳夜明砂炒青黛蛇蛻蟬蛻麝香地龍乾蝦蟇各一分蚱蟬四十枚右為末和勻粟米飯丸如麻子大一二嵗一二丸三四嵗五丸并用米飲下空心日午各一服更用水化一丸滴兩鼻中又以栁桃湯浴兒以青布偎良久蟲出青布上麝香丸治小兒諸疳麝香研熊膽研丹砂研牛黃研蚺蛇膽研瓜蒂一分赤小豆七粒蟾酥二片如小豆大作蟾頭一枚炙焦黃右為末和勻麵糊丸如麻子大每服一二丸至五丸空心日午近晚各一度量兒大小加減服後以桃栁湯浴兒即衣蓋覆當有蟲出一方煉蜜和丸如兒小即乳汁化服麝香丸治小兒五疳瘦弱毛髮乾焦口鼻癢麝香一分蘆薈一分蟾酥一片豆許大皂莢三寸燒為灰蛇蛻皮五寸燒為灰粉霜一分蝙蝠三枚取血拌入藥末硃砂一分細研右為細末以油鎔蠟和丸如小豆大先以桃栁湯洗兒後用藥一丸塗於臍中醋麵封之良久即蟲出黃白赤者易治黑者難療蘆薈散治小兒五疳煩熱乾瘦或不欲乳食宜服出蟲蘆薈半兩細研胡黃連半兩雄黃一分細研熊膽半兩研入硃砂半兩麝香半兩細研乾蟾一枚塗酥炙焦黃代赭一分右為細散先用栁桃湯浴兒後以粥飲調下半匙然後著青衣覆其蟲自出量兒大小加減服之螳螂散治小兒五疳羸瘦腹脹不欲乳食宜服出蟲螳螂三分炒令黃蝸牛子七枚炒令微黃色蟬殼七枚微炙丁香一分蟾酥一錢細研麝香一錢地龍三分微炒蛇蛻皮灰一錢右為細散先以桃栁湯浴兒後以粥飲調下半錢便以青衣蓋覆當有蟲子自出赤白者易治青黑者難治瓜蒂丸治小兒疳出蟲瓜蒂燒灰麝香研蟾酥各半兩烏蛇尾酒浸炙黃連去鬚各一分蛇蛻皮燒灰熊膽各半兩研右為末用粟米飲丸如麻子大溫熱水化破二丸滴於鼻中蟲出為效出蟲丸治小兒五疳久不瘥羸瘦極甚硃砂一分麝香一分牛黃一分蟾酥半錢熊膽一分蝸牛子一分炒微黃夜明砂一分微炒右都研細以麵糊和丸如菉豆大每服以溫水下三丸更别以水研一丸滴向鼻中得嚏四五聲良久當有蟲隨汗出立效麝香散治小兒疳氣麝香研白礬燒灰膽礬燒過皂莢燒灰各一分豬膽一枚去膜熬乾膩粉研半錢右研令極細每服一字米飲調下服藥後以青衣蓋兒身上良久有蟲出即差除疳散治小兒五疳吐蟲腹脹羸瘦丁香生犀角末各半錢苦楝根有子者良赤者不用隂乾為末鶴蝨各半兩蜜陀僧白檳榔炮銼各一分右為散每服一錢米湯調下日三度蟲自出更量兒大小加減天靈蓋丸治小兒五疳定命靈蓋灰一分蟾酥一片如栁葉大汗襪灰一分砒霜半分麝香一分驢蹄窩乾灰一分右為末煉蜜和丸如麻子大空心以溫水下二丸後以桃栁湯浴兒了澄浴水清看盆內當有蟲如蟻子白即吉黑即凶更看兒大小以意加減熊膽丸治小兒五疳出蟲熊膽細研硃砂細研麝香細研蚺蛇膽細研蜣蜋微炒瓜蒂已上各一分右為末入研了藥令勻以豬膽汁和丸如菉豆大先用桃柳湯浴兒了用粥飲下三丸以青衣蓋當有蟲出也蟾頭丸治小兒五疳手足乾瘦腹脹筋起鼻癢昏沉多睡宜服出蟲蟾頭青黛一分研硫黃一分研皂莢一分先湯中泡七日後以水洗淨刮黑皮炙令焦黃去子麝香半分細研巴豆七枚去皮研紙裹壓去油右為末煉蜜和丸如菉豆大空心以粥飲下三丸良久當有蟲出量兒大小以意加減乾蟾丸治小兒五疳出蟲乾蟾蟬殼麝香半分天靈蓋半兩鱉甲一分右為末用燒飯和丸如菉豆大二嵗已下以蛤粉湯下一丸三嵗已上至五嵗二丸服藥後續以桃柳湯浴兒後以青衣蓋之當有蟲子出赤白者易治黑者難醫蘆薈丸治小兒疳殺蟲蘆薈蕪荑木香鶴虱各半兩右為末水浸炊餅丸如黃米大每服十丸米飲下更量兒大小加減雄黃丸治小兒疳殺蟲雄黃研黃連去鬚木香各一分麝香半分右搗羅為散每服半錢米飲下量兒大小加減定命散治小兒疳蝦蟇一枚燒為灰蛇蛻皮一分炒令黃蟬殼一分右為末入麝香末半錢研勻但是一切疳至午時後以暖水調半錢一嵗二嵗即服一字後煎桃柳湯放溫浴兒了便用青衣蓋當有蟲出效雄黃丹治五疳羸瘦或多生蟲胡黃連乾蟾白蕪荑川黃連各一兩乾漆半兩雄黃半兩研麝香一錢研右為細末豬膽汁和丸如黍米大每服十粒新水下量兒大小加減稷香丸治五疳多蟲羸瘦黃瘁㵼痢無常黃連青皮蕪荑仁胡黃連蘆薈神麯麥芽木香當歸肉豆蔲史君子三稜莪术各一分右為末麵糊為丸如菉豆大每服二十丸米飲下化蟲丸治小兒因食甘肥致使蟲動嘔吐涎沫心腹悶痛此藥止痛下蟲五靈脂一兩半白礬一兩右件為細末麵糊為丸如黍米大每服二十丸溫米湯送下不拘時候雷丸散治消疳殺蟲雷丸史君子炮去殼鶴虱棐子檳榔五味各等分右件為細末每服一錢溫米飲下乳食前楝實散治小兒疳黃羸瘦好食泥土蛔蟲㽱痛發渴往來川楝子去核半兩微炒甘草半兩􅌝􅌣根一兩右件為細末每服二錢煎紫蘇湯調下乳食前治小兒疳毒生蟲肌肉消瘦頻頻腹痛臨痛時多在小腹上或胃脘上忽上衝心前疼痛不可勝忍喫食減少非時只思清水喫其痛之極忽口中吐出蟲忽大便下得蟲冝服此方但尋常好喫清湯忽痛時只思清湯喫即是有蟲之候史君子蒸二次方用萆薢狗脊檳榔烏藥芎藭南椒二錢白蕪荑一分右細杵羅為末麵糊為丸如黍米大每服二十丸米飲下不拘時治小兒諸疳臟腑之間化為諸蟲飲食不下或嘔吐或手足浮腫飲水不歇並冝服之青皮三稜莪术北柴胡半夏大腹皮秦芃淨香附陳皮紫蘇青木香枳殼檳榔甘草右各等分㕮咀每服一錢生薑同煎餘以意加減湯使服之治疳氣腹痛服藥不見效此藥治之檳榔三個銼炒蓬术一錢陳皮二錢巴豆七粒去油茴香一錢炒枳殼一錢右為末麵糊為丸如粟米大每服二十丸陳皮湯下普濟方卷三百八十三
