body:
  text: 普濟方卷三百八十三明周王朱橚撰嬰孩諸疳門疳㵼附論全嬰論云賈公賔監酒子四嵗六月中泄㵼黃水身熱小便赤少或夾白酸臭召一醫作伏暑與五苓散黃龍丸不退一醫作食㵼以感應丸小益黃散補因兒恣食病多進退至月餘目炮乳腫靣黃消瘦腹大氣粗渴飲不食糞雜不化腥臭肥膩召愚視曰本傷水食因㵼久則亡津液變成疳㵼主人曰何傷暑食與疳兼兒平日不曽食甜物何變成疳也答曰傷暑㵼黃身熱小便赤少傷食者㵼白酸臭食物不化疳㵼者㵼腥肥膩腹急氣粗錢氏曰疳皆脾胃病亡津液之所作也蓋脾胃有疳食積所以進退不已此病以補之法去其積主人曰小兒㵼久憔悴難動臟腑答曰積聚之病終身為憂况疳病一成虛中有積若不以補㵼之法恐久害身主人聽先以麝沉香膏益黃散補三日各三服苐四日與二黃丸止㵼餘次除積再以前藥補二日病退七分後沒石膏六甲丸治愈方人參散治疳瀼㵼湯氏曰此㵼與積㵼相類但臭如抱退雞子㵼又不頻又如水聚作一次只難得止實者宜微取積先服麝香竣丸次服人參散常服六神丸人參去蘆白术炒黃耆蜜炙茯苓去皮甘草炙各二錢肉豆蔲一錢史君子肉五個白薑五分木香一錢胡黃連二錢丁香二錢右為末陳米煎空心服一方加白豆蔲吳婆散治小兒疳㵼不止日夜遍數不計漸漸消瘦木香炮丁香沒石子蜜炙檳榔黃連炒厚朴製桃根白皮苦楝根白皮各等分右為末三嵗半錢柴胡木瓜湯下食前一日三服一方有蕪茅東坡家小兒曽患此症百藥不效因得此方多人服之皆愈録此示人藥性少溫暴熱㵼者或不相當如先生之説果驗也保安丸治小兒瀼㵼傷食㵼香附一兩淨白薑炮青皮陳皮去白各一兩砂仁一兩三稜炮莪术半兩甘草炙半兩右為末麵糊為丸如菉豆大每服一二十丸淡薑湯下食前服麝沉膏治小兒疳㵼白濁腥臭肥膩骨熱多渴腹痛不食羸劣無力頸骨垂倒乳香一錢木香一錢炮訶子炮四錢麝香半錢沉香半錢蚵蚾酒浸去皮骨炙黃六錢豆蔲半兩取孔子入乳香在內薑汁麵裹炮焦去麵右為末煉蜜丸如雞頭來大三嵗一丸米湯下沒石膏治小兒白濁疳㵼腥臭肥膩骨熱多渴沒石子二個香附子四錢人參訶子炮去核丁香各一錢白术炙二錢巴豆十粒針穿燒存性右為末煉蜜丸如雞頭大三嵗一丸米湯化下至聖丸治冷疳不時泄㵼虛汗不止丁香丁皮各一錢木香紫厚朴製見前橘紅史君子焙肉豆蔲濕紙裹煨各二錢右為末神麯糊丸麻子大每服七丸食前湯下調中散治小兒瀼㵼傷食㵼香附甘草白茯苓天仙藤藿香白芍藥葛粉右各等分為末烏梅甘草湯調一錢食前服如聖丸治冷熱疳㵼胡黃連川黃連白蕪荑去皮各三分史君子一兩去皮殼稱麝香别研半錢乾蝦蟆五個銼熬成膏右件藥為末與膏丸麻子大每服人參湯下二三嵗五六丸已上十丸至十五丸香蔲散治疳㵼黃連三錢炒肉豆蔲生木香訶子煨縮砂仁茯苓各一錢右為末粳米飲丸麻子大每服十丸食前米飲下沒石子丸治疳痢及治瀼㵼血痢滑腸腹痛木香黃連各二錢半沒石子一個肉豆蔲一個煨訶子三個煨蠟茶半兩右為細末爛飯丸如黍米大白湯下量兒大小服之日進二三服食前米飲湯送下亦可一方無蠟茶龍粉丸治疳㵼渴飲草龍膽定粉微炒烏梅焙稱黃連各二分右為末煉蜜和丸麻子大米飲下一二十丸小兒疳虛極用補藥太過反生大熱而渴當審六甲丸治小兒疳㵼白㵼腥臭肥膩骨熱多渴腹疼不食體倦少力六甲日修合黃連炒五錢肉豆蔲木香各一兩右為末白麵糊丸小豆大三嵗三十丸米湯下又方木香一分肉豆蔲半兩薑汁麵炮訶子火炮去核一兩黃連二兩治法亦同木香丸治小兒疳㵼不止腹急亦理尋常腹痛木香炮肉豆蔲炮各一分牽牛半兩半生半炒右為末糊丸小豆大三嵗三十丸米湯送下芎朴丸治小兒疳瘦㵼白水腹脹芎藭厚朴各一兩白术半兩右為末煉蜜丸小彈子大每服一丸米飲下三嵗已下半丸京芎散治小兒疳㵼進退京芎赤石脂各等分右為末三嵗兒半錢米湯下飢服又方加蚵蚾灰訶子炮黃連炒肉豆蔲炮當歸焙作丸子尤妙香糖丸治小兒喫泥害肚進退不定並治疳㵼右以輕粉一錢沙糖搜和為丸如雞頭肉大三嵗一丸米湯化下食久㵼下泥土後服益黃散若以陳皮地榆煎湯化下治疳㵼痢治小兒疳㵼右用赤石脂杵羅為末如麵以粥飲調下半錢立瘥或以京芎等分同服更妙治疳㵼疳痢百藥不效只一服取安方右用雞子一枚打破黃蠟一塊大如指頭鎔鍋內傾雞子炒熟令兒空心喫盡此乃隨藥作效百發百中凡瀼㵼亦與傷㵼不相逺也治法亦須略取然後服前件藥若小兒稟賦平常亦如前法只用官局進食丸取之若充實頑健飲食如常者當峻取之右用雞子一枚筯頭扎竅入金星丸一嵗五丸二嵗十丸大小加減入藥於雞子內紙塞蒸熟取出去殼空心令兒連藥喫盡良久取下臭穢滯積却再喫前方蠟雞子一枚仍忌魚肉一日只喫蔥白粥萬無一失治小兒水㵼妳疳右用川椒一分去目為末酥調之少傅腦上日可三度四香三米飲治小兒疳傷聚㵼遺糞帶餿酸臭氣穢至二三尺逺最有神效木香丁香檀香各等分藿香葉加兩倍用早米晚米或陳倉米尤妙糯米各等分炒熟右每服半米藥三錢重水一盞煎不拘時候六神丸治疳氣消瘦臟腑怯弱泄㵼虛滑乳食減少心腹脹滿肉豆蔲麵煨木香炮一兩丁香訶子肉炮各半兩史君子二兩半蘆薈一兩半另研右為末棗肉和丸加減米湯下緊㵼不止須紫霜丸服之直指沒石子丸白沒石子一個白豆蔲三個訶子煨三個取肉木香炮一兩黃連一錢右為末粳米糊丸梧子大每服十五丸米飲下神效豆蔲散治小兒疳瘦弱或泄㵼無度神麯半兩炒肉豆蔲三兩裹煨麥蘖半兩炒黃連去鬚半兩史君子十枚去殼蘆薈二錢半研右為細末獖豬膽汁為丸如黍米大或桐子大每服二三十丸米飲下空心食前木香散治小兒腹脹不消疳㵼白色乳榖不化木香一錢青橘皮去白一兩陳粟米一合巴豆去殼三十粒同粟米炒令巴豆黑去巴豆不用只用粟米肉豆蔲二十枚止用十枚麵裹煨過蜣蜋二枚去頭足翅糯米炒焦不用糯米右件為細末每服半錢溫米飲調下乳食空服香連散治五疳㵼痢龍膽草一錢胡黃連半錢五靈脂一錢炒丁香半錢赤剪子一錢麝香半錢蘆薈龍骨半錢右為末爛飯為丸如粟米大飲湯吞下史君子丸治五疳瘦瘁面色萎黃髮竪眼澀㵼痢穢惡並宜服之蕪荑一錢苦楝皮一錢史君子二十個去殼炒訶子一錢煨陳皮一錢青皮一錢檳榔一錢木香半錢右件為細末蒸餅丸如黍米大每服七丸溫米飲送下乳食前服硫黃丸治小兒疳㵼不止色如米泔者巴豆肉二十粒去殼出盡油硫黃别研五靈脂一錢炒丁香半錢右為末再入蚌粉一錢麝香少許再取豬膽汁煮粉為丸每服五十粒陳皮湯下如水㵼陳米飲下煩渴罌粟殼湯下澀石榴皮湯吞下木香丸治小兒喫食太早遂成疳疾腹脹疳㵼及瀼㵼等病木香沉香青皮去白各一錢肉豆蔲一錢麵裹煨牽牛二枚炒右為細末醋麵糊丸如麻子大二三嵗兒服三粒五六嵗服五七粒濃煎蘿葡子湯下疳渴不止附論夫小兒有積氣肌膚瘦瘁內亡津液心肺壅熱則為疳渴蓋因乳母不慎恣食熱物不擇酸鹹致令壅熱潛流乳脈或即乳兒致臟腑生熱疳熱相摶上焦乾燥津液枯少故煩燥而渴方龍膽丸治小兒渴疳黃瘦日夜飲水龍膽研麝香研丹砂研牛黃研胡黃連熊膽蘆薈丁香木香黃連去鬚大黃銼騏驎竭蟾酥研一錢右研為細末飯丸如菉豆大每服三丸至四丸薄荷湯下地骨皮丸治小兒疳㵼不定黃瘦不思食地骨皮龍膽黃芩去黑心枳殼去瓤麩炒木香赤芍藥豬苓去黑皮海蛤研各一分紫參銼大黃銼炒各半兩郁李仁炒研一兩一分右為末煉蜜和丸如菉豆大每服五七丸溫湯下微利即止量兒大小加減蟾酥丸治小兒疳渴不止及急慢驚風膈有痰涎天瘹疳風並皆治之蟾酥麝香研犀角鎊牛黃研丹砂研蘆薈研天竺黃半兩炙益知仁十枚青黛研半兩乾蟾頭五枚全者白花蛇一寸去皮骨炒右為末用獖豬膽汁和丸如米粒大丹砂為衣每服五丸至七丸煎薄荷湯下驚風用剪刀股研薄荷湯下慢驚風煎荆芥湯下疳氣麝香湯下驚風搐搦目睛上視煎金銀酒化下此藥兼利胸膈墜涎壓心臟腑積熱順氣進妳食開胃小兒諸疾皆治量兒大小加減天竺黃散治小兒多疳渴體熱煩燥少得睡臥天竺黃半兩細研黃連半兩去鬚馬牙硝半兩梔子仁半兩葛根半兩銼甘草一分炙微赤銼牛黃一分細研欵冬花一分紫苑一分洗去苗土犀角屑一分土瓜根一分右為細散都研令勻不計時候以蜜水調下半錢量兒大小加減服之參苓白术散治疳渴由臟腑夙有疳氣加之乳母恣食甘肥酒麴炙􅘤使邪入心肺壅熱日則煩渴飲水乳食不進夜則渴止白术人參去蘆甘草炙山藥石蓮肉桔梗去蘆炒薏苡仁縮砂仁各三錢白藊豆薑製二錢白茯苓去皮一兩右為細末全生方白术丸曰疳病皆因津液亡竭凡飲食之中入藥食之王氏曰仍以前藥加黃連入豬肚內縛口煮爛入臼杵丸食後米飲下可以生津清心止渴調脾諸疳皆可常用龍膽散治小兒疳渴羸弱龍膽熊膽研蝸牛炒令黃蘆薈研夜明砂炒麝香研青黛研丹砂水飛過半兩乾蟾頭炙焦一枚右研為散每服半錢米飲下量兒大小加減金粉地黃膏治小兒膈壅乾渴涼心經鬱金一兩皂莢水煮軟切焙乾地黃半兩銼雄黃水飛一分菉豆粉半兩白术人參甘草炙各一分牛黃一錢右為末煉蜜和丸如菉豆皂子大二嵗一丸薄荷湯化下一嵗半丸更量大小加減烏梅丸治小兒渴疳飲水不止烏梅肉焙茜根去土木瓜焙葛根炮各一兩人參一分白术一分赤茯苓去黑皮半分甘草炙半兩右為末沙糖和丸如皂子大每服一丸新汲水化下蘆薈丸治小兒渴疳肌膚消瘦乳食不進蘆薈研硼砂研麝香研馬牙硝研人參熊膽研甘草炙搗為末各半兩右為末煉蜜為丸如菉豆大每服五丸或七丸薄荷湯下鉛霜丸治小兒疳鉛白霜鉛丹定粉鐵粉龍腦蛤粉馬牙硝右等分為細末入麝香少許用蝸牛肉研和為丸如梧桐子大每服一丸倒流水化下大棗湯治小兒久疳多渴不慕乳食大棗去核人參白术白茯苓去黑皮陳麴炒各一兩甘草炙檀香銼各一分右搗篩一嵗兒一錢水半盞入棗一枚擘煎至三分去滓溫服日三度量兒大小加減服之胡黃連丸治小兒疳渴黃瘦壯熱不欲乳食胡黃連半兩旱蓮子半兩龍膽半兩去尖頭牛黃一分研細青黛半兩細研烏梅肉半兩微炒右為末以棗肉和丸如菉豆大每服以甘草湯下五丸日三服量兒大小加減黃連散治小兒疳熱煩渴乾瘦黃連一分去鬚天竺黃一分細研甘草一分炙微赤銼梔子仁一分欵冬花一分牛黃一分細研葛根一分銼紫苑一分洗去苗土犀角屑一分川朴硝半兩竹瀝二合右為末先用竹瀝拌和更入熟蜜和丸如菉豆大每服以新汲水研破五丸服日四五服量兒大小臨時加減黃連散治小兒渴疳飲水不止胡黃連葛根銼玄參枇杷葉拭去毛炙黃甘草炙各一分麥門冬去心焙半兩右為散每服一錢水一盞生薑少許煎至五分去滓入蜜少許再煎一兩沸放溫服愈金湯治小兒渴疳喜水小便淋山梔子炒黃一兩瞿麥半兩木通銼半兩滑石研分一甘草炙一兩竹葉一兩切焙右搗篩二嵗兒每服一錢水一盞沙糖皂子大同煎至五分去滓溫服日兩服更量兒大小加減人參散治小兒宿疳氣心腹壅熱內亡津液煩渴不止人參白茯苓去黑皮一兩葛根銼二兩木香藿香葉