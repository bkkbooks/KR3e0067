body:
  text: 普濟方卷一百二十七明周王朱橚撰傷寒門辨太陽病脈證并治法上第五太陽之為病脈浮頭項強痛而惡寒經曰尺寸俱浮太陽為陽主表脈浮頭痛惡寒者太陽表病也太陽病發熱汗出惡風脈緩者名為中風風陽也寒隂也風則傷衛發熱汗出惡風者衛中風也榮病發熱無汗不惡風而惡寒衛病則發熱汗出不惡寒而惡風也以衛為陽衛外者也病則不能衛固其外而皮腠踈故汗出而惡風也傷寒脈緊傷風脈緩者寒性徑急而風性解緩故也太陽病或已發熱或未發熱必惡寒體痛嘔逆脈隂陽俱緊者名曰傷寒經曰凡傷於寒則為病熱謂寒氣客於經中陽氣怫鬱而成熱也中風即發熱者風為陽邪及傷寒或已發熱未發熱者以寒為隂邪不能即熱欎而方變熱也風則傷衛寒則傷榮衛虛者惡風榮虛者惡寒寒傷榮者必惡寒也氣病者則麻血病者則痛風令氣緩寒令氣逆體痛嘔逆者榮中寒也經曰脈盛身寒得之傷寒隂陽俱緊者知其傷寒也傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也太陽主表一日則太陽受邪至二日當傳陽明若脈氣微為不傳陽明胃經受邪則善吐寒邪傳裏者則變熱如頗欲吐若煩躁脈急數者為太陽寒邪之變熱傳於陽明也傷寒二三日陽明少陽證不見者為不傳也傷寒二三日無陽明少陽證知邪不傳止在太陽經中也太陽病發熱而渴不惡寒者為溫病發熱而渴不惡寒者陽明也此太陽受邪知為溫病非傷寒也積溫成熱所以發熱而渴不惡寒也若發汗已身灼熱者名曰風溫風溫為病脈隂陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇如驚癎時瘈瘲若火熏之一逆尚引日再逆促命期傷寒發汗已則身涼若發汗已身灼熱者非傷寒為風溫也風邪傷上而陽受風氣與溫相合則傷衛脈隂陽俱浮自汗出者衛受邪也衛者氣也風則傷衛溫則傷氣身重多眠睡者衛氣受風溫而氣傷也鼻息必鼾語言難出者風溫外盛而氣擁不利也若被下者則傷藏氣太陽膀胱經也內經曰膀胱不利不為約為遺溺癃者小便不利也太陽之脈起目內眥內經曰瞳子髙者太陽不足戴眼者太陽以絶小便不利直視失溲為下竭津液藏氣欲絶也為難治若被火者則風溫挾火之熱微者熱瘀而發黃劇者熱勝生風如驚癎而時瘈瘲也先曽被火為一逆若更以火熏之為再逆也一逆猶尚延引時日而不愈其再逆者必致危殆故云促命期病有發熱惡寒者發於陽也無熱惡寒者發於隂也發於陽者七日愈發於隂者六日愈以陽數七隂數六故也陽為熱也隂為寒也發熱而惡寒寒傷陽也無熱而惡寒寒傷隂也陽法火隂法水火成數七水成數六陽病七日愈者火數足也隂病六日愈者水數足也太陽病頭痛至七日已上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈傷寒自一日至六日傳三隂三陽經盡至七日當愈經曰七日太陽病衰頭痛少愈若七日不愈則太陽之邪再傳陽明針足陽明為逆而奪之使經不傳則愈太陽病欲解時從巳至未上巳為正陽則陽氣得復也始于太陽終厥隂各以三時為解而太陽從巳至未陽明從申至戌少陽從寅至辰至太隂從亥至丑少隂從子至寅厥隂從丑至卯者以陽行也速隂行也緩陽主晝隂主夜陽三經從寅至戌以陽道常饒也隂三經解時從亥至卯以隂道常之也內經曰陽中之太陽通于夏氣則於午未太陽乘旺也風家解表而不了了者十二日愈中風家發汗解後未全快暢者至十二日大邪皆去六經悉和則愈病人身熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣寒在皮膚熱在骨髓也皮膚言淺骨髓言深皮膚言外骨髓言內陽脈浮者熱自發隂脈弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之陽以候衛隂以候榮陽脈浮者衛中風也隂脈弱者榮氣弱也風并于衛則衛實而榮虛故發熱而汗自出也經曰太陽病發熱汗出者此為榮弱衛強者是也嗇嗇惡寒之貌也淅淅灑淅也惡風之貌衛虛則惡風榮虛則惡寒榮弱衛強惡寒復惡風者以自汗出則皮毛緩腠理疏是以惡風也翕者熇熇然而熱言熱在表也鼻鳴乾嘔者風擁而氣逆也與桂枝湯和榮衛而散風邪也桂枝湯方桂枝三兩去皮味辛熱白芍三兩味苦酸微寒甘草三兩炙味甘平生薑三兩切味辛溫大棗十二枚擘味甘溫內經曰辛甘發散為陽桂枝辛甘之劑也所以發散風邪內經曰風淫所勝平以辛溫佐以苦甘以甘緩之以酸收之是以桂枝為主芍藥為佐也又曰風淫於內以甘緩之以辛散之是以生薑大棗為使也右五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升餘以助藥力溫覆一時許令遍身漐漐微似有汗者佳不可令大汗如水流漓病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗小促役其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病症猶在者更作服若汗不出者乃服至二三劑禁生冷粘滑肉麵五辛酒酪臭惡等物太陽病頭痛發熱汗出惡風者桂枝湯主之頭痛者太陽也發熱汗出惡風者中風也與桂枝湯解散風邪太陽病項背強几几反汗出惡風桂枝加葛根湯主之几几者伸頸之貌也動則伸頸搖身而行項背強者動則如之項背几几者當無汗反汗出惡風者中風表虛也與桂枝湯以和表加麻黃主表實後葛根湯症云太陽病項背強几几無汗惡風葛根湯主之藥味正與此方同其無汗者當用麻黃今曰汗出恐不加麻黃但加葛根也太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之太陽病屬表而反下之則虛其裏邪欲乘虛入裏若氣上衝者裏不受邪而氣逆上與邪爭也爭則邪仍在表故當復與桂枝湯解外其氣不上衝者裏虛不能與邪爭邪氣已傳裏也故不可更與桂枝湯攻表太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之太陽病三日中曽經汗吐下溫針虛其正氣病仍不解者謂之壞病言病為醫所壞不可復與桂枝湯當審觀脈證知犯何逆而治之逆者隨所逆而救之桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也常須識此勿令誤也脈浮發熱汗出惡風者中風也可與桂枝湯解肌脈浮緊發熱不汗出者傷寒也可與麻黃湯常須識此勿妄治也若酒客病不可與桂枝湯與則嘔以酒客不喜甘故也酒客內熱喜辛而惡甘桂枝湯酒客得之則中滿而嘔喘家作桂枝湯加厚朴杏仁佳太陽病為諸陽生氣中風其氣擁則生喘也與桂枝湯以散風加厚朴杏仁以降氣凡服桂枝湯吐者其後必吐膿血也內熱者與桂枝湯則吐如酒客之類也既亡津液又為熱所搏後必吐膿血吐膿血者謂之肺痿金匱要略曰熱在上焦為肺痿謂或從汗或從嘔吐得之重亡津液故也太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之太陽病因發汗遂汗漏不止而惡風者為陽氣不足因發汗陽氣益虛而皮腠不固也內經曰膀胱者州都之官津液藏焉氣化斯出小便難者汗出亡津液陽氣虛弱不能施化四肢者諸陽之本也四肢微急難以屈伸者亡陽而脫液也針經曰液脫者骨屬屈伸不利與桂枝加附子湯以溫經復陽太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之脈來數時一止復來曰促促為陽盛則不因下後而脈促者也此下後脈促不得為陽盛也太陽病下之其脈促不結胸者此為欲解此下後脈促而復胸滿則不得為欲解由下後陽虛表邪漸入而客於胸中也與桂枝湯以散客邪通行陽氣芍藥益隂陽虛者非所宜故去之陽氣已虛若更加之微寒則伏當溫以散之故加附子太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此隂陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯傷寒八九日則邪傳再經又遍三陽欲傳三隂之時也傳經次苐則三日傳遍三陽至四日陽去隂入不入隂者為欲解其傳隂經第六日傳遍三隂為傳經盡而當解其不解傳為再經者至九日又遍三陽陽不傳隂則解如瘧發作有時也寒多者為病進熱多者為病退經曰厥少熱多其病為愈寒多熱少陽氣退故為病進也今雖發熱惡寒而熱多寒少為陽氣進而邪氣退也裏不和則嘔今不嘔清便自調者裏和也寒熱間日發者邪氣深也日一發者邪氣復當出也日再發者邪氣淺也日二三發者邪氣微也內經曰大則邪至少則脈微今日數多而脈微緩者是邪氣微緩也故云欲愈脈微而惡寒者表裏俱虛也陽表也隂裏也脈微為裏虛惡寒為表虛以表裏俱虛故不可更發汗更下更吐也隂陽俱虛則面色青白反有赤色者表未解也熱色赤色也得小汗則和不得汗則邪氣外散皮膚而為癢也與桂枝麻黃各半湯小發其汗以除表邪太陽病初服桂枝湯反煩不解者先刺風池風府却與桂枝湯則愈煩者熱也服桂枝湯當汗出而身涼和若反煩不解者風甚而未能散也先刺風池風府以通太陽之經而除風氣却與桂枝湯解散則愈服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯經曰如服一劑病證猶在者故當復作本湯服之服桂枝湯汗出後脈洪大者病猶在也若形如瘧日再發者邪氣客於榮衛之間也與桂枝二麻黃一湯解散榮衛之邪服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之大汗出脈洪大而不解邪氣猶在表也可更與桂枝湯若大汗出脈洪大而煩渴不解者表裏有熱不可更與桂枝湯當以白虎加人參湯生津止渴和表散熱病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯桂枝二越婢一湯方桂枝去皮芍藥甘草各十八銖生薑一兩三錢切大棗四枚擘麻黃十八銖去節石膏二十四銖碎綿裹胃為十二經之主脾治水穀為卑藏若婢內經曰脾主為胃行其津液若湯所謂越婢者以發越脾氣通行津液外臺方一名越脾湯即此義也右七味㕮咀以五升水煮麻黃去上沫內諸藥煮取二升去查溫服一升本云當裁為越婢湯桂枝湯合飲一升今合為一方桂枝二越婢一服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白术湯主之頭項強痛翕翕發熱雖經汗下為邪氣仍在表也心下滿微痛小便不利者則欲成結胸今外證未罷無汗小便不利則心下滿微痛為停飲也與桂枝以解外加茯苓白术利小便行留飲之水也傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中乾煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和讝語者少與調胃承氣湯若重發汗加燒針者四逆湯主之脈浮自汗出小便數而惡寒者陽氣不足也心煩腳攣急者隂氣不足也隂陽血氣俱虛則不可發汗若與桂枝湯攻表則又損陽氣故為誤也得之便厥咽中乾煩躁吐逆者先作甘草乾薑湯以復其陽氣得厥愈足溫乃與芍藥甘草湯益其隂血則腳脛得伸隂陽雖復其有胃燥讝語少與調胃承氣微溏以和其胃若重發汗為亡陽加燒針則損隂也經曰榮氣微者加燒針則血不行重發汗復燒針是隂陽之氣大虛四逆湯以復隂陽之氣甘草乾薑湯方甘草四兩炙味甘溫乾薑一兩炮味辛熱內經曰辛甘發散為陽甘草乾薑相合以復陽氣右㕮咀以水三升煮取一升五合去滓分溫再服芍藥甘草湯方白芍藥四兩味苦酸微寒甘草四兩炙甘平芍藥白補而赤㵼白收而赤散也酸以收之甘以緩之酸甘相合用補隂血右二味㕮咀以水三升煮取一升半去滓分溫再服調胃承氣湯方大黃四兩去皮清酒浸甘草二兩炙芒硝半斤味鹹苦大寒內經曰熱淫於內治以鹹寒佐以苦甘芒硝鹹寒以除熱大黃苦寒以蕩熱甘草甘平助二物推陳而緩中益氣右三味㕮咀以水三升煮取一升去滓內芒硝更上微火令沸少少溫服四逆湯方甘草二兩炙味甘平乾薑一兩半味辛熱附子一枚生用去皮破八片辛大熱內經曰寒淫於內治以甘熱又以寒淫所勝平以辛熱甘草薑附相合為甘辛大熱之劑乃可發散隂陽之氣右三味㕮咀以水三升煮取一升二合去滓分溫再服強人可加乾薑三兩問曰證象陽旦按法治之而增劇厥逆咽中乾兩脛拘急而讝語師曰言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣病證象桂枝因加附子參其間增桂令汗出附子溫經回陽故也厥逆咽中乾煩躁陽明內結讝語煩亂更與甘草乾薑湯夜半陽氣不足兩脛當熱尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其讝語故知病可愈陽旦桂枝湯别名也前症脈微自汗出小便數心煩微惡寒腳攣急讝語桂枝湯證相似是證象陽旦也與桂枝湯而增劇得寸口脈浮大浮為風邪大為血虛即于桂枝湯加附子溫經以補虛桂令汗出以祛風其有治之逆而增厥者與甘草乾薑湯陽復而足溫更與芍藥甘草湯隂和而脛伸表邪已解隂陽已復而有陽明內結讝語煩亂少與調胃承氣微溏泄以和其胃則隂陽之氣皆和內外之邪悉去故病可愈辨太陽病脈證并治中第六太陽病項背強几几無汗葛根湯主之太陽病項背几几汗出惡風者中風表虛也項背強几几無汗惡風者中風表實也表虛宜解肌表實宜發汗是以葛根湯發之也葛根湯方葛根四兩麻黃三兩去莭桂枝三兩去皮芍藥二兩切甘草二兩炙生薑三兩切大棗十二枚擘本草云輕可去實麻黃葛根之屬是也此以中風表實故加二物於桂枝湯中也右七味㕮咀以水一斗先煮麻黃葛根減二升去沫內諸藥取煮三升去滓溫服一升覆取微似汗不須啜粥餘如桂枝法將息及禁忌太陽與陽明合病者必自下利葛根湯主之傷寒有合病有併病本太陽病不解併于陽明者謂之併病二經俱受邪為合病謂之合病者邪氣甚也太陽陽明合病者與太陽少陽合病陽明少陽合病皆陽也必自下利者以邪氣併於隂則隂實而陽虛邪氣併於陽則陽實而隂虛寒邪氣甚客於二陽二陽方外實而不主裏則裏氣虛故必下利與葛根湯以散經中之甚邪也太陽與陽明合病不下利但嘔者葛根湯加半夏主之邪氣外甚陽不主裏裏氣不和氣下而不上者但下利而不嘔裏氣上逆而不下者但嘔而不下利與葛根湯以散其邪加半夏以下逆氣而一以貫之矣葛根加半夏湯方葛根四兩麻黃三兩去節湯泡去黃汁焙乾稱生薑三兩切甘草二兩炙芍藥二兩桂枝二兩去皮大棗十二枚擘半夏半斤洗右八味以水一斗先煮葛根麻黃減二升去白沫內諸藥煮取三升去滓溫服一升覆取微似汗太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之經曰不宜下而便攻之內虛熱入協熱遂利桂枝證者邪在表也而反下之虛其腸胃為熱所乘遂利不止邪在表則見陽脈邪在裏則見隂脈下利脈微遲邪在裏也促為陽盛雖下利而脈促者知表未解也病有未汗出而喘者有自汗出而喘者皆邪氣外甚所致喘而汗出者謂急喘而汗出也即裏熱氣逆所致與葛根黃連黃芩湯散表邪去裏熱而已葛根黃連黃芩湯方葛根半斤甘草二兩炙黃芩二兩味苦寒黃連三兩味大苦寒內經曰辛甘發散為陽表未解者散以葛根之辛甘草之甘以緩裏氣黃連黃芩之苦以清裏熱以堅裏氣右四味以水八升先煮葛根減二升內諸藥煮取二升去滓分溫再服太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之此太陽傷寒證也寒則傷榮頭痛身疼腰痛以至牽連骨節疼痛者太陽經榮血不利也內經曰風寒客於人使人毫毛畢直皮膚閉而為熱者寒在表也風并於衛衛實而榮虛者自汗出而惡風也寒并於榮榮實而衛虛者無汗而惡風也以榮強衛弱故氣逆而喘與麻黃湯以發其汗麻黃湯方麻黃三兩去節味甘溫桂枝二兩去皮味辛熱甘草一兩炙味甘平杏仁七十個湯泡去皮尖味辛溫內經曰寒淫於內治以甘熱佐以苦辛麻黃甘草開肌發汗桂枝杏仁散寒下氣右四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥餘如桂枝法將息太陽與陽明合病喘而胸滿者不可下宜麻黃湯主之陽受氣于胸中喘而胸滿者陽氣不宣發壅而逆也心下滿胸滿皆為實當下之此以為胸滿非裏實故不可下雖有陽明然與太陽合病為屬表宜與麻黃發汗太陽病十日已上脈浮細而嗜卧者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯十日已上向解之時也脈浮細而嗜卧者表邪已罷也病雖已和解若脈但浮而不細者則邪氣猶在表際也與桂枝麻黃發散之太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也此中風見寒脈也浮則為風風則傷衛緊則為寒寒則傷榮榮衛俱病故發熱惡寒身疼痛也風并於衛者為榮弱衛強寒并於榮者為榮強衛弱今風寒兩傷則榮衛俱實故不汗出而煩躁也與大青龍湯發汗以除榮衛風寒若脈微弱汗出惡風者為榮衛俱虛反服青龍湯則令陽虛故生厥逆筋惕肉膶此治之逆也大青龍湯方麻黃六兩去莭味甘溫桂枝三兩去皮味辛熱甘草二兩炙味甘平杏仁四十粒去皮尖味苦甘溫生薑三兩切味辛溫大棗十二枚擘味甘溫石膏如雞子大碎味甘微寒辛甘均為發散然風以辛散寒宜甘發辛甘相合乃能發散榮衛之風寒麻黃甘草石膏杏仁以發散榮中之寒桂枝薑棗以解除衛中之風右七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗出停後服傷寒脈浮緩身不疼但重乍有輕時無少隂症者大青龍湯發之此傷寒見風脈者傷寒身疼此以風勝故身不疼中風者身重此以兼風故乍有輕時不發厥吐利無少隂症者為風寒外甚也與大青龍湯以發散表中之風寒傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利小腹滿或喘者小青龍湯主之傷寒表不解心下有水飲則水寒相搏肺寒氣逆故乾嘔發熱而咳針經曰形寒飲冷則傷肺以其兩寒相感中外皆傷故氣逆上行此之謂也與小青龍湯發汗散水水氣內漬則所傳不一故有或為之症隨症增損以解化之小青龍湯方麻黃三兩去節味辛溫芍藥三兩味酸微寒乾薑三兩味辛熱甘草三兩炙味甘平五味子半升味酸溫桂枝三兩去皮味辛熱半夏半升湯洗味辛微溫燥細辛三兩味辛溫寒邪在表非辛甘不能散之麻黃桂枝甘草之辛甘以發散表邪水停心下而不行則腎氣燥內經曰腎苦燥急食辛以潤之乾薑細辛半夏之辛以行水氣而潤腎燥咳逆而喘則肺氣逆內經曰肺欲收急食酸以收之芍藥五味子之酸以收逆氣而安肺右八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升加減法若微利去麻黃加蕘花如雞子大熬令赤色下利者不可攻其表汗出必脹滿麻黃發其陽水漬入胃必作利蕘花下十二經水水去則利止若渴者去半夏加括蔞根三兩酸甘而苦潤半夏味辛而燥津液非渴者所宜故去之括蔞味苦而生津故加之若噎者去麻黃加附子一枚炮經曰水得寒氣冷必相搏其人即噎加附子溫散水寒病人有寒復發汗胃中冷必吐去麻黃惡發汗也若小便不利少腹滿去麻黃加茯苓四兩水畜下焦不行為小便不利少腹滿麻黃發津液於外非所宜也茯苓泄畜水於下加所當也若人喘者去麻黃加杏仁半升去皮尖金匱要略曰其形腫故不內麻黃內杏仁以麻黃發其陽故也喘呼形腫水氣標本之疾具矣傷寒心下有水氣咳而喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之咳而欲喘者水寒射肺也發熱不渴表證未罷也與小青龍湯發表散水服已渴者裏氣溫水氣為欲解也太陽病外證未解脈浮弱者當以汗解宜桂枝湯脈浮弱者榮弱衛強也太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之下後大喘則為裏氣大虛邪氣傳裏正氣將脫也下後微喘則為裏氣上逆邪不能傳裏猶在表也與桂枝湯以解外加厚朴杏仁以降逆氣大陽病外證未解者不可下也下之為逆欲解外者宜桂枝湯主之經曰本發汗而復下之為逆也若先發汗治不為逆太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯主之經曰柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆則其類矣太陽病脈浮緊無汗發熱身疼痛八九日不解者表證仍在此當發其汗也服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之脈浮緊無汗發熱身疼痛太陽傷寒也雖至八九日而表證仍在亦當發其汗既服溫經發散湯藥雖未作大汗亦微除也煩者身熱也邪氣不為汗解欎而變熱蒸於經絡發于肌表故生熱煩肝受血而能視始者氣傷榮寒寒既變熱則血為熱搏肝氣不舒故目瞑也劇者熱甚於經迫血妄行而為衄得衄則熱隨血散而解陽氣重者熱氣重也與麻黃以解前太陽之寒邪也太陽病脈浮緊發熱身無汗自衄者愈風寒在經不得汗解欎而變熱衄則熱隨血散故云自衄者愈二陽併病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證未罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫欎在表當表之熏之若發汗不徹不足陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也太陽病未解傳病併入陽明而太陽證未罷者名曰併病續自微汗出不惡寒者為太陽證罷陽明症具也法當下之若太陽病未罷者為表未解則不可下當小發其汗先解表也陽明之經自面色緣緣正赤者陽氣怫鬱在表也當解之熏之以取其汗若發汗不徹者不足言陽氣怫鬱止是當汗不汗陽氣不得越散邪無從出擁甚於經故躁煩也邪循經行則痛無常處或在腹中或在四肢按之不可得而短氣但責以汗出不徹更發汗則愈內經曰諸過者切之澀者隂氣不足陽氣有餘為發熱無汗是以脈澀知陽氣擁鬱而汗出不徹也脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裏虛須裏氣實津液自和便自汗出愈經曰諸脈浮數當發熱灑淅惡寒言邪氣在表也是當汗出愈若下之身重心悸者損其津液虛其胃氣若身重心悸而尺脈實者則下後裏虛邪氣乘虛入裏也今尺脈微身重心悸者知下後裏虛津液不足邪氣不傳裏但在表也然以津液不足則不可發汗須裏氣實津液足便自汗出而愈也脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之然以榮氣不足血少故也針經曰奪血者無汗尺脈遲者為榮血不足故不可發汗脈浮者病在表可發汗宜麻黃湯浮為輕手得以候皮膚之氣內經曰其在皮毛者汗而發之脈浮者病可發汗宜麻黃湯浮則傷衛數則傷榮榮衛受邪為病在表故當汗散病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣和諧故爾以榮行脈中衛行脈外復發其汗榮衛和則愈宜桂枝湯風則傷衛寒則傷榮衛受風邪而榮不病者為榮氣和也衛既客邪則不能與榮氣和諧亦不能衛護皮腠是以常自汗出與桂枝湯解風邪調和榮衛則愈也病人藏無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯主之藏無他病裏和也衛氣不和表病也外臺云裏和表病汗之則愈所謂先其時者先其發熱汗出之時發汗則愈傷寒脈浮緊不發汗因致衄者麻黃湯主之傷寒脈浮緊邪在表也當與麻黃湯發汗若不發汗則邪無從出擁甚於經迫血妄行因致衄也傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裏仍在表也當須發汗若頭痛必衄宜桂枝湯不大便六七日頭痛有熱者故宜當下若小便清者知裏無熱則不可下經曰小便數者大便必鞕不更衣十日無所苦也况此不大便六七日小便清者不可責邪在裏是仍在表也與桂枝湯以解外若頭痛不已為表邪不罷鬱熱甚于經迫血妄行至為衄也傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯主之煩者熱也發汗身涼為已解至半日許身復熱脈浮數者邪不盡也可更發汗與桂枝湯凡病若發汗若吐若下若亡津液隂陽自和者必自愈重亡津液則不能作汗必待隂陽自和乃自愈矣大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈因亡津液而小便不利者不可以藥利之後津液足小便利必自愈也下之後復發汗必振寒脈微細所以然者以內外俱虛故也發汗則表虛而亡陽下之則裏虛而亡血振寒者陽氣微也脈微細者隂血弱也下之後復發汗晝日煩躁不得眠夜而安靜而不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之下之虛其裏汗之虛其表既下又汗則表裏俱虛陽主晝陽欲復虛不勝邪正邪交爭故晝日煩躁不得眠夜主隂陽虛不能與之爭是以夜則安靜不嘔不渴者裏無熱也身無大熱者表無熱也既無裏症又無表症而脈沉微者是陽氣大虛隂寒氣甚與乾薑附子湯退隂復陽乾薑附子湯方乾薑一兩味辛熱附子一枚生用去皮破八片味辛熱內經曰寒淫所勝平以辛熱虛寒大甚是以以辛熱之劑勝之也右二味以水三升煮取一升去滓頓服發汗後身疼痛脈沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之汗後身疼痛邪氣未盡也脈沉遲榮血不足也經曰其脈沉者榮氣微也又曰遲者榮氣不足也血少故也與桂枝湯以解未盡之表加芍藥生薑人參以益不足之榮血也發汗後不可更行桂枝湯汗出喘無大熱者可與麻黃杏仁甘草石膏湯主之汗出而喘當作桂枝加厚朴杏仁湯汗出而喘愈今發汗後而喘是邪氣擁甚桂枝湯不能發散故不可更行桂枝湯汗出而喘有大熱者內熱氣盛也無大熱者表邪擁甚也與麻黃杏仁甘草石膏湯以散其邪麻黃杏仁甘草石膏湯方麻黃四兩去莭味辛溫杏仁五十粒去皮尖味甘溫甘草二兩炙味甘平石膏半斤碎綿褁味甘平內經曰肝苦急急食甘以緩之風氣通於肝風邪外甚故以純甘之劑發之右四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升去滓溫服一升本云黃耳柸發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之發汗過多亡陽也陽受氣于胸中陽氣不足故病人叉手自冒心心下悸欲得按者與桂枝甘草湯以調不足之氣桂枝甘草湯方桂枝四兩去皮味辛熱甘草二兩味甘平炙桂枝之辛走肺而益氣甘草之甘入脾而緩中右二味以水三升煮取一升去滓頓服發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之汗者心之液發汗後臍下悸者心氣虛而腎氣發動也腎之積名曰奔豚發則從小腹上至心下為腎氣逆欲上凌心今臍下悸為腎氣發動故云欲作奔豚與茯苓桂枝甘草大棗湯以降腎氣茯苓桂枝甘草大棗湯茯苓半斤味甘平甘草二兩炙味甘平桂枝四兩去皮味辛熱大棗十五枚擘茯苓以伐腎邪桂枝能泄奔豚甘草大棗之甘滋助脾土以平腎水氣煎用甘瀾水者揚之無力取不助腎邪也右四味以甘瀾水一斗先煮茯苓減二升內諸藥煮取三升去滓溫服一升日三服作甘瀾水法取水二斗置大盆內以杓揚之水上有珠子五六千顆相逐取用之發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之吐後脹滿與下後腹滿皆為實言邪氣乘虛入裏為實發汗後外已解也復脹滿知非裏實由脾胃津液不足氣澀不通壅而為滿與此湯和脾胃而降氣厚朴生薑甘草半夏人參湯方厚朴半斤去皮炙味苦溫生薑半斤切味辛溫半夏半升洗味辛溫人參一兩味甘溫甘草三兩炙味甘平內經曰脾欲緩急食甘以緩之以苦泄之厚朴之苦以泄腹滿人參甘草之甘以益脾胃半夏生薑之辛以散滯氣而三服矣右五味以水一斗煮取三升去滓溫服一升日三服傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經絡身為振搖者茯苓白术桂枝甘草湯主之吐下後裏氣虛氣上逆者心下逆滿氣上衝胸表裏陽不足也起則頭眩脈浮緊為邪在表當發汗脈沉緊為邪在裏則不可發汗發汗則外動經絡損傷陽氣陽氣外虛則不能主持諸脈身為振搖也而此湯以和經益陽茯苓桂枝白术甘草湯方茯苓四兩味甘平桂枝三兩去皮味辛熱白术二兩味苦甘溫甘草二兩炙味甘平陽不足者補之以甘茯苓白术生津液而益陽也裏氣逆者散之以辛桂枝甘草行陽散氣右四味以水六升煮取三升去滓溫服三發汗病不解反惡寒者虛故也芍藥甘草附子湯主之發汗病解則不惡寒發汗病不解表實者亦不惡寒今發汗病且不解反惡寒者榮衛俱虛也汗出則榮虛惡寒則衛虛而芍藥甘草附子湯以補榮衛芍藥甘草附子湯方芍藥三兩味酸微寒甘草三兩炙味甘平附子一枚炮去皮破八片味辛熱芍藥之酸收斂津液而益榮附子之辛溫固陽氣而補胃甘草之甘調和辛酸而安正氣右三味以水五升煮取一升五合去滓分溫服疑非仲景意發汗若下之病仍不解煩躁者茯苓四逆湯主之發汗若下病宜解也若病仍不解者則發汗外虛陽氣下之內虛隂氣陽隂俱虛邪獨不解故生煩躁與茯苓四逆湯以復隂陽之氣茯苓四逆湯方茯苓六兩味甘平人參一兩味甘溫附子一枚生用去皮破八片味辛熱甘草二兩炙味甘平乾薑一兩半味辛熱四逆湯以補陽加茯苓人參以益隂右五味以水五升煮取三升去滓分溫服七合日三服發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯汗出而惡寒者表寒也汗出而不惡寒但熱者裏實也經曰汗出不惡寒者表解裏未和與調胃承氣湯以和胃氣太陽病發汗後大汗出胃中乾煩躁不得眠欲得飲水者少少與之令胃氣得和則愈若脈浮小便不利微熱消渴者與五苓散主之發汗已解胃中乾煩燥不得眠欲飲水者少少與之胃氣得潤則愈若脈浮者表未解也飲水多而小便少者謂之消渴裏熱甚實也微熱消渴者熱未成實上焦燥也與五苓散生津液和表裏也五苓散方豬苓十八銖味甘平澤㵼一兩六銖半味酸鹹茯苓十八銖味甘平桂枝半兩去皮味辛熱白术十八銖味甘平淡者一也口入而為甘甘甚而反淡者甘緩而淡滲豬苓白术茯苓三味之甘潤虛燥而利津液味下泄為隂澤㵼之鹹以泄伏水辛甘發散為陽桂枝之辛甘以和肌表右五味為末以白飲和服方寸匕日三服多飲暖水汗出愈發汗已脈浮數煩渴者五苓散主之發汗已脈浮數者表邪未盡也煩渴亡津液胃燥也與五苓散和表潤燥傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之傷寒汗出而渴者亡津液胃燥邪氣漸傳裏也五苓散以和表裏若汗出不渴者邪氣不傳裏但在表而表虛也與茯苓甘草湯和表合衛茯苓甘草湯方茯苓二兩味甘平桂枝二兩去皮味辛熱生薑三兩切味辛溫甘草一兩炙味甘平茯苓甘草之甘益津而和衛桂枝生薑之辛助陽而解表右四味以水四升煮取二升去滓分溫三服中風發熱六七日不解而煩有表裏證渴欲飲水水入則吐者名曰水逆五苓散主之中風發熱至六七日則當解若不解煩者邪在表也渴欲飲水邪傳裏也裏熱甚則能消水水入不吐裏熱少則不能消水水停則精不散飲而吐水也以其飲水而吐故名水逆而五苓散和表裏散停飲未持脈時病人叉手冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此發汗多而亡陽胸中陽氣不足病人叉手冒心師見外證知陽氣不足也又試令咳而不即咳者耳聾也則陽氣虛明矣耳聾者陽氣虛精氣不足不得上通于耳故也發汗後飲水多必喘以水灌之亦喘飲水多而喘者飲冷傷肺也以水灌洗而喘者形寒傷肺也發汗後藥不得入口為逆若更發汗必吐下不止血弱氣盡腠理開邪氣因入與正氣相搏結於脅下邪正分爭往來寒熱發作有時默默不欲飲食藏府相連其痛必下邪髙痛下故使嘔也小柴胡湯主之人之氣血隨時盛衰當月郭空之時則為血弱氣衰腠理開疏之時邪氣乘虛傷人則深針經月廓空則海水東盛人血氣虛衛氣去形獨居肌肉減皮膚緩腠理開毛髮殘瞧薄垢落當更時遇賊風則其入深者是矣邪因正虛自表之裏而結於脅下與正分爭作往來寒熱默默不欲飲食此謂自外之內經絡與藏府相連也邪氣隨經必傳于裏故曰痛下作病邪在上焦為邪髙邪漸入裏為痛下裏氣與邪氣相搏而上行故使嘔也與小柴胡湯以解半表半裏之邪服柴胡湯已渴者屬陽明也以法治之服小柴胡湯表邪已而渴裏邪傳于陽明也以陽明治之得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食穀者噦得病六七日脈遲浮弱惡風寒手足溫則邪在半表半裏未為實醫反二三下之虛其胃氣損其津液邪蕰於裏故不能食而脅下滿者胃虛為熱氣熏蒸發於面目及身故必黃也頸項強者表仍未解也小便難者內若乏津液雖本柴胡湯證然以裏虛下焦氣澀而小便雖與柴胡湯又走津液後必下重也不因飲水而嘔者柴先胡湯證若本因飲水而嘔者水停心下也金匱要略曰渴却嘔者為水停心下此屬飲家飲水者水停而嘔食穀者物聚而噦皆非小柴胡湯所宜二者皆柴胡湯之戒不可不識也傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之身熱惡風頸強者表未解也脅不滿而渴者裏不和也邪在表則手足通熱邪在裏則手足厥寒今手足溫者知邪在半表半裏之間也與小柴胡湯所以解半表半裏之邪傷寒陽脈澀隂脈弦法當腹中急痛者先與小建中湯不差者與小柴胡湯主之陽脈澀隂脈弦而腹中急痛者當作裏有虛寒治之與小建中湯溫中散寒若不差者非裏寒也必由邪氣之裏裏氣不利所致與小柴胡湯去黃芩加芍藥以除傳裏之邪小建中湯方桂枝三兩去皮味辛熱甘草三兩炙味甘平大棗十二枚擘味甘溫芍藥六兩味酸微寒生薑二兩切味辛熱膠飴一斤味甘溫建中者建脾也內經曰脾欲緩急食甘以緩之膠飴大棗甘草之甘以緩中也辛潤散也榮衛不足潤以散之桂枝生薑之辛以行榮衛酸收也隂氣不和芍藥之酸以和隂氣右六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服虗嘔家不可用建中湯以甜故也傷寒中風有柴胡證但見一證便是不必悉具柴胡證是邪氣在表裏之間也或胸中煩而不嘔或渴或腹中痛或脅下痞鞕或心下悸小便不利或不渴身有微熱或咳但見一證便宜與柴胡湯治之不必待其證候全具也凡柴胡湯病證而下之若柴胡證未罷者復與柴胡湯必蒸蒸而振却發熱汗出而解邪在半表半裏之間為柴胡證未作裏實醫便以藥下之若柴胡證仍在者雖下之不為逆可復與柴胡湯以和解之得邪氣外越外作蒸蒸而熱先經下裏氣虛邪氣欲出內則振振然而却也正氣勝陽氣生復發熱汗出而解也傷寒中風五六日往來寒熱胸脅苦滿默默不欲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅痞鞕或心下悸小便不利或不渴身有微熱或咳者與小柴胡湯主之病有在表者有在裏者有在表裏之間者此邪在表裏之間謂之半表半裏證五六日邪氣在表傳裏之時或傷寒至五六日或中風至五六日而往來寒熱者即是非傷寒又中風也傷寒中風俱有柴胡證俱見一證便是不必悉具正是謂或中風或傷寒也邪在表則寒邪在裏則熱今邪在半表半裏之間未有定處是以寒熱往來也邪在表則胸腹不滿邪在裏則胸腹脹滿今止言胸脅苦滿知邪氣在表裏之間未至于胸腹脹滿也默默靜也邪在表則呻吟邪在裏則煩悶內經曰陽入之隂則靜默默者邪方自表之裏在表裏之間也邪在表則能食邪在裏則不能食不欲食者邪在表裏之間未至于必不能食也邪在表則不煩不嘔邪在裏則煩滿而嘔心煩喜嘔者邪在表方得裏也邪初入裏未有定處則所傳不一故有或為之證有柴胡證但見一證便是故有或為之證云小柴胡湯方柴胡半斤味辛微溫黃芩三兩味苦寒人參三兩味甘溫甘草二兩味甘平半夏半斤洗味辛溫生薑三兩切味辛溫大棗十二枚擘味甘溫內經曰熱淫於內以苦發之柴胡黃芩之苦以發傳邪之熱裏不足者以甘緩之人參甘草之甘以緩中和之氣邪半入裏則裏氣逆辛以散之半夏以除煩嘔邪半在表則榮衛爭辛甘解之薑棗以和榮衛右七味以水一斗二升煮取六升去滓再煎取二升溫服一升日三服後加減法若胸中煩而不嘔去半夏人參加括蔞實一枚胸中煩而不嘔熱聚而氣不逆也甘者令人中滿方熱聚無用人參之補辛散逆氣既不嘔無用半夏之辛治熱宜用寒療聚宜苦括蔞實苦寒以泄胸中之藴熱若渴者去半夏加人參合前成四兩半括蔞根四兩半夏燥津液非渴者所宜人參甘而潤括蔞根苦而涼徹熱生津二物為必當之藥也若腹中痛者去黃芩加芍藥三兩去黃芩惡寒中加芍藥以通壅若脅下痞鞕去大棗加牡蠣四兩甘能令人滿痞者去大棗之甘醎以耎堅鞕者加牡蠣之鹹若心下悸小便不利者去黃芩加茯苓四兩飲而水畜不行為悸小便不利內經曰腎欲堅急食苦以堅之腎堅則水益堅故去黃芩味淡滲泄為陽茯苓甘淡以泄伏水之藥也若不渴外有微熱者去人參加桂三兩覆微取汗愈不渴者裏和也故去人參外有熱表未解也故加桂枝以發汗若咳者去人參大棗生薑加五味子半升乾薑二兩咳者氣逆也甘則壅氣故去人參大棗內經曰肺欲收急食酸以收之五味子之酸以收逆氣肺寒則咳溫以辛熱故易生薑以乾薑之熱也傷寒醫下之續得下利清穀不止身疼痛者急當救裏後身疼痛清便自調者急當救表救裏宜四逆湯救表宜桂枝湯傷寒下之續得下利清穀不止身疼痛即當救裏者以裏氣不定必先救裏急用四逆湯得清便自調裏氣已和然後急與桂枝湯以救表身疼痛者表邪也內經曰病發於不足標而本之先治其標後治其本此以裏寒為標外邪為本也病發熱頭痛脈反沉若不差身體疼痛當救其裏宜四逆湯發熱頭痛表病也脈反沉者裏脈也經曰表有病者脈當浮大今脈反沉遲故知欲愈也是表病而得裏脈則當差若不差是為內虛寒甚也宜四逆湯以救其裏太陽病先下之而不愈因復發汗以此表裏俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也裏未和然後復下之冒者鬱也下之則裏虛而亡血汗之則表虛而亡陽表裏俱虛寒氣怫鬱其人因致冒金匱要略曰亡血復汗寒多故令鬱冒汗出則怫鬱之邪得解而冒愈又曰冒家欲解必大汗出汗出表和而裏不和然後下之太陽病未解脈隂陽俱停必先振栗汗出而解但陽脈微者先汗出而解隂脈微者下之而解若欲下之宜調胃承氣湯脈隂陽俱停無偏勝者隂陽氣和也經曰寸口關上尺中三處大小浮沉遲數同等此脈為隂陽和雖劇當愈今隂陽既和必先振栗汗出而解也如陽脈微者陽不足而隂有餘也經曰陽虛隂盛汗之則愈隂脈微者隂不足而陽有餘也經曰陽盛隂虛下之則愈是也太陽病發熱汗出者此為榮弱衛強故使汗出欲救邪風者宜桂枝湯太陽中風風併于衛則衛實而榮虛榮隂也衛陽也發熱汗出隂弱陽強也內經曰隂虛者陽必湊之故時發熱而汗出與桂枝湯解散風邪調和榮衛傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之丸藥下之不能除熱但損正氣邪氣乘虛於胸中而未入深者則身熱不去微煩與梔子乾薑湯吐煩和裏梔子十四枚擘味苦寒乾薑三兩味辛熱苦以湧之梔子之苦以吐煩辛以潤之乾薑之辛以和裏右二味以水三升半煮取一升半去滓分二服溫進一服得吐止後服凡用梔子湯病人舊微溏者不可與服之病人舊微溏者裏虛而寒在下也雖煩則非藴熱故不可與梔子湯內經曰先㵼而後生他病者治其本必且調之後乃治其他病太陽病發汗汗出不解其人仍發熱心下悸頭眩身膶動振振欲劈地者真武湯主之發汗之後仍發熱者邪氣未解也心下悸頭眩身膶動振振欲劈地者汗出亡陽也裏虛為悸上虛為眩經虛為身膶動搖振劈與真武湯溫經復陽真武湯方茯苓三兩味甘平芍藥三兩味酸微寒生薑三兩切味辛熱白术二兩味甘溫附子一枚炮去皮破八片味辛熱右五味以水八升煮取三升去滓溫服七合日三服咽喉乾燥者不可發汗津液不足也淋家不可發汗發汗必便血膀胱裏熱則淋反以湯藥發汗亡耗津液益增客熱膀胱虛燥小便必血瘡家雖身疼痛不可發汗發汗則痓表虛熱聚則生瘡瘡家身疼如傷寒不可發汗發汗則表氣愈虛熱勢愈甚熱甚生風故變痓也衄家不可發汗汗出必額上陷脈急緊直視不能眴不得眠衄血上焦亡血也若發汗則上焦津液枯竭經絡乾澀故額上陷脈急緊諸經脈皆屬于目筋脈急緊則牽引其目故直視不能眴瞬合目也針經曰隂氣虛則目不能瞑亡血為隂虛是以不得眠也亡血家不可發汗發汗則寒栗而振針經曰奪血者無汗奪汗者無血發汗則隂陽俱虛故寒栗而振搖汗家重發汗必恍惚心亂小便已隂疼與禹餘糧丸汗者心之液汗家重發汗則心虛恍惚奪汗者無血故小便已隂中痛病人有寒復發汗發汗則胃中冷必吐病人有寒則當溫散反發汗陽氣虛胃中冷必吐蛔也本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆病在表者汗之為宜下之為逆病在裏者下之為宜汗之為逆經曰陽盛隂虛汗之則死下之則愈陽虛隂盛汗之則愈下之則死藥不得入口為之吐逆發汗亡陽胃中虛冷也若更發汗則愈損陽氣胃氣大虛故吐下不止也發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豆豉湯主之發汗吐下後邪熱乘虛客於胸中謂之虛煩熱鬱胸中煩躁鬱悶而不得發散者是也熱氣伏於裏者則喜睡今熱浮于土煩擾陽氣故不得眠心惡熱甚則必神昏是以劇者反覆顛倒而不安心中懊惱而憒悶懊憹者俗謂鶻突是也內經曰其髙者因而越之與梔子豆豉湯以吐胸中之邪梔子豆䜴湯梔子十四枚擘味苦寒香䜴四合絹裹味苦寒酸苦湧㵼為隂苦以湧吐寒以勝熱梔子䜴湯相合吐劑宜矣右二味以水四升先煮梔子得二升半內䜴煮取一升半去滓分為二服溫進一服得吐者止後服若氣少者梔子甘草䜴湯主之若嘔者梔子生薑䜴湯主之少氣者熱傷氣也加甘草以益氣嘔者熱煩而氣逆也加生薑以散逆氣氣少則氣為熱搏散而不收甘以補之可也嘔者氣為熱搏逆而不散辛以散之可也發汗若下之而煩熱胸中窒者梔子豆䜴湯主之陽氣鬱於胸中發汗若下使陽氣不足邪熱客於胸中結而不散故煩熱而胸中窒塞與梔子䜴湯以吐胸中之邪傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子䜴湯主之傷寒五六日邪氣在裏之時若大下之身熱去心中空者為欲解若大下之後身熱而心結痛者結胸也身熱不去心中結痛者虛煩也結胸為熱結胸中為實是熱氣已收斂於內則外身熱去虛煩為熱客胸中未結為實散漫為煩是以身熱不去六七日為欲解之時以熱為虛煩故云未欲解也與梔子豆䜴湯以吐胸中虛煩傷寒下後心煩腹滿起卧不安者梔子厚朴湯主之下後但腹滿而不心煩即邪氣入裏為裏實但心煩而不腹滿即邪氣在胸中為虛煩心煩且滿則邪氣壅于胸腹間也滿則不能坐煩則不能卧故不安與梔子厚朴湯吐煩泄滿梔子厚朴湯方梔子十四枚擘味苦寒厚朴四兩薑炙味苦溫枳實四枚水浸去穰炒味苦寒酸苦湧泄為隂梔子之苦以湧虛煩厚朴枳實之苦以泄腹滿右三味以水三升半煮取一升半去滓分溫服進一服得吐者止後服傷寒腹滿讝語寸口脈浮而緊此肝乘脾也名曰縱刺期門腹滿讝語者脾胃病也浮而緊者肝脈也脾病見肝脈木行乘土也經曰水行乘火木行乘土名曰縱此其類矣期門者肝之募刺之以㵼肝經之勝氣也傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解不解者此肝乘肺也名曰橫刺期門傷寒發熱嗇嗇惡寒肺病也大渴欲飲水肝氣勝也五七日作大渴欲飲酢漿是知肝氣勝也經曰傷寒欲飲水者愈若不愈者而腹滿是肝氣乘肺水不得行也木行乘金名曰橫刺期門以寫肝之勝氣使肺氣水散而津液得通外作自汗出內為小便利而解也太陽病二日發躁反尉其背而大汗出火熱入胃胃中躁煩必發讝語十餘日振栗自下利者此為欲解也故其汗從腰已下不得汗欲小便不得反嘔欲失溲足下惡風大便鞕小便當數而反不數及不多大便已頭卓然而痛其人足心必熱谷氣下流故也太陽病二日則邪在表不當發躁反躁者熱氣行於裏也反尉其背而發汗大汗出則胃中燥火熱入胃胃中燥熱躁煩而讝語至十餘日振栗自下利者火邪勢微隂陽復生津液得復也故為欲解火邪去大汗出則愈若從腰以下不得汗則津液不得通故欲小便不得熱氣上逆而反嘔也欲失溲足下惡風者氣不得通于下而虛也津液偏滲令大便鞕者小便當數經曰小便數者大便必鞕也此以火熱內燥津液不得下通便故小便不數及不多也若火邪消津液利則結鞕之大得潤因自大便也便已頭卓然而痛者先大便鞕則陽氣不得下通既得大便則陽氣下降頭中陽虛故卓然而痛谷氣者陽氣也先陽氣不通於下之時足下惡風今陽氣得下故足心熱也太陽病中風以火劫發汗邪風實也潮熱者被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄隂虛則小便難隂陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則讝語甚者至噦手足躁擾捻衣摸床小便利者其人可治風為陽邪因火熱之氣則邪風愈甚迫於血氣流遍失其常度風與火氣謂之兩陽相熱熏灼熱發必發身黃若熱搏於經絡為陽盛外熱迫血上行必衄熱搏于內者為隂虛內熱必小便難若熱消血氣陽隂俱虛血氣虛少不能榮於身體為之枯燥三陽經絡至頸三隂至胸中而還但頭汗出劑頸而還者熱氣炎上搏陽而不搏隂也內經曰諸脹腹滿皆屬於熱腹滿微喘者熱氣內鬱也內經曰火氣內發上為口乾咽爛者火熱上熏也火氣上而不下則大便不鞕若熱氣下入胃消鑠津液則大便鞕故云不大便久則胃中燥實必發讝語內經曰病深其聲噦火氣大甚正氣逆上則噦內經曰四肢者諸陽之本也陽盛則四肢實火熱太甚故手足躁擾捻衣摸牀擾亂也小便利者為火未劇津液未竭而猶可治也傷寒脈浮醫以火迫劫之亡陽必驚狂起卧不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之傷寒脈浮責邪在表醫以火劫發汗汗大出者亡其陽汗者心之液亡陽則心氣虛心惡熱火邪內迫則心神浮越故驚狂起卧不安與桂枝以解未盡之表邪芍藥益隂非亡陽所宜火邪錯逆加蜀漆之辛以散之陽氣亡脫加龍骨牡蠣之澀以固之本草云澀可去脫龍骨牡蠣之屬是也桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之桂枝三兩去皮甘草二兩炙生薑三兩切牡蠣五兩煅味酸寒龍骨四兩味甘澀大棗十二枚擘蜀漆二兩洗味辛平右七味以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升形作傷寒其脈不弦緊而弱弱者必渴被火者必讝語弱者發熱脈浮解之當汗出愈形作傷寒謂頭痛身熱也脈不弦緊則無傷寒表脈也經曰諸弱發熱則脈弱為裏熱故云弱者必渴也若被火氣兩熱相合傳於胃中胃中躁煩必發讝語脈弱發熱者得脈浮為邪氣還表當汗出而解矣太陽病以火蒸之不得汗其人必躁至六七日不解必清血名為火邪此火邪迫血而血下行者太陽病用火蒸之不得汗則熱無從出隂陽俱虛被火必發燥也六日傳經盡至七日再到太陽經則熱氣當解若不解熱氣迫血下行必清血清厠也脈浮熱甚反灸之此為實實以虛治因火而動必咽燥唾血此火邪迫血而血上行者也脈浮熱甚為表實醫以脈浮為虛用火灸之因火氣動血迫血上行故咽燥唾血微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也微數之脈則為熱也灸能除寒不能散熱是慎不可灸也若反灸之熱因火甚遂為煩逆灸本以追虛而復逐熱為實熱則傷血又加火氣使血散脈中氣主詬之血主濡之血氣散不能濡潤筋骨致骨焦筋傷血散而難復也脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痺名火逆也脈浮在表宜以汗解醫以火灸取汗而不得汗邪無從出又加火氣相助則熱愈甚半身以上同天之陽半身以下同地之隂火性炎上則腰以下隂氣獨治故從腰以下必重而痺也欲自汗者必當先煩乃有汗而解何以知之脈浮故知汗出解也煩熱也邪氣還表則為煩熱汗出而解以脈浮故為邪還表也燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝湯更加桂二兩燒針發汗則損隂血心氣虛針處被寒氣而成核心氣因驚而虛腎氣乘寒而動發為奔豚金匱要略曰病有奔豚從核上驚發得之腎氣欲上乘心故其氣從小腸上衝心也先灸核上以散其寒與桂枝湯以泄奔豚之氣火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之先火為逆復以下除之裏氣因虛又加燒針裏虛而為火熱所擾故生煩躁與桂枝甘草龍骨牡蠣湯以散火邪桂枝甘草龍骨牡蠣湯方桂枝二兩去皮甘草二兩炙牡蠣二兩煅龍骨二兩辛甘發散桂枝甘草之辛甘以發散經中之火邪澀可去脫龍骨牡蠣之澀以收斂浮越之正氣右四味為末以水五升煮取二升半去滓溫服八合日三服太陽傷寒者加溫針必驚也寒則傷榮榮氣微者加燒針則血留不行驚者溫針損榮血而動心血金匱要略曰血氣少者屬於心故驚也傷寒八九日下之胸滿煩驚小便不利讝語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之傷寒八九日邪氣已成熱而復傳陽經之時下之虛其裏而熱不除胸滿而煩者陽熱客於胸中也驚者心惡熱而神不寧也小便不利者裏虛津液不行也讝語者胃熱也一身盡重不可轉側者隂氣內行於裏不榮于表也與柴胡湯以除胸滿而煩加龍骨牡蠣丹鉛收斂神氣而鎮驚加茯苓以行津液利小便加大黃以逐胃熱止讝語加桂枝以行陽氣而解身重錯雜之邪斯悉愈矣柴胡加龍骨牡蠣湯方半夏二合洗大棗六枚擘柴胡四兩生薑一兩半人參一兩半龍骨一兩半鉛丹一兩半桂枝二兩半去皮茯苓一兩半大黃二兩牡蠣一兩半熬右十一味以水八升煮取四升內大黃切如碁子更煮三沸去滓溫服一升傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡湯下之而不得利今反利者知以丸藥下之非其治也先宜小柴胡湯以解外後以柴胡加芒硝湯主之傷寒十三日再傳經盡當解之時也若不解胸脅滿而嘔者邪氣猶在表裏之間此為柴胡湯證若以柴胡湯下之則更無潮熱自利矣醫反以丸藥下之虛其腸胃邪熱乘虛入府日晡所潮熱熱已而利也潮熱雖為實熱胸脅之邪未解故先與小柴胡湯以解外後以柴胡加芒硝以下胃熱傷寒十三日不解過經讝語者以有熱也當以湯下之若小便利者大便當鞕而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之傷寒十三日再傳經盡謂之過經讝語者陽明胃熱也當以諸承氣湯下之若小便利者津液偏滲大便當鞕反下利者知醫以丸藥下之也下利脈微而厥者虛寒也今脈調和則非虛寒由腸胃虛熱協熱而下利也與調胃承氣湯以下胃熱太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解也但少腹急結者乃可攻之宜桃仁承氣湯主之太陽膀胱經也太陽經邪熱不解隨經入府為熱結膀胱其人如狂者為未至於至但不寧也經曰其人如狂者以熱在下焦太陽多熱熱在膀胱必與血搏若血不為畜為熱迫之則血自下血下則熱隨血出而愈若血不下者則血為熱搏畜積於下而少腹急結乃可攻之與桃仁承氣下熱散血內經曰從外之內而盛於內者先治其外後調其內此之謂也桃仁承氣湯方桃仁五十粒去皮尖味甘平桂枝二兩去皮味辛熱大黃四兩芒硝二兩甘草三兩炙甘以緩之辛以散之少腹急結緩以桃仁之甘下焦畜血散以桂枝辛熱之氣寒以取之熱甚搏血故加二物於調胃承氣湯中也右五味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服五合日三服當微利傷寒二三日心中悸而煩者小建中湯主之傷寒二三日邪氣在表未當傳裏之時心中悸而煩是非邪氣傳裏所致心悸者氣虛也煩者血虛也以氣血內虛與小建中湯先建其裏使在表之邪不致傳裏而自解也太陽病過經十餘日及二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱鬱微煩者為未解也與大柴胡湯下之則愈日數過多屢經攻下而柴胡證不罷者亦須先與小柴胡湯以解其表經曰凡柴胡湯疾病而下之柴胡證不罷者復與柴胡者是也嘔吐者表裏不和也若嘔不止鬱鬱微煩者裏熱也熱結於胃中也與大柴胡湯下其裏熱則愈大柴胡湯方柴胡半斤味辛溫黃芩三兩味苦寒芍藥三兩味酸微寒半夏半升洗味辛溫生薑五兩切味辛溫枳實四枚炙味苦寒大棗十二枚擘味甘溫大黃三兩味苦寒柴胡黃芩之苦入心而折熱枳實芍藥之酸苦湧泄而扶隂辛者散也半夏之辛以散逆氣辛甘和也薑棗之辛甘以和榮衛右七味以水一斗煮取六升去滓再煎溫服一升日三服一方加大黃二兩若不加大黃恐不為大柴胡湯也太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆惡寒發熱為太陽表病自汗出不惡寒發熱者為陽明證本太陽表病醫反吐之傷動胃氣表邪乘虛傳於陽明也以關脈細數知醫吐之所致病一二日為表邪尚寒而未成熱吐之則表寒傳於胃中胃中虛寒故腹中飢而口不能食病三四日則表寒已傳成熱吐之則表熱乘虛入胃胃中虛熱故不喜糜粥欲食冷食朝食暮吐也朝食暮吐者晨食入胃胃虛不能尅化即知至暮胃氣行裏與邪氣相搏則胃反逆而以胃氣尚在止云小逆太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也太陽表病今反吐之傷其胃氣邪熱乘虛入胃胃為邪熱內煩故不惡寒不欲近衣也病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃虛冷故吐也陽受氣于胸中發汗外虛陽氣是令陽氣微膈氣虛也數為熱本熱則能消榖客熱則不能消穀因發汗外損陽氣致胃中虛冷故吐也太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱鬱微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲吐胸中痛微溏者此非柴胡證以嘔故知極吐下也心下溫溫欲吐鬱鬱微煩胸中溏痛當責邪熱客胸中若大便反腹微滿則邪熱已下於胃也日數雖多若不經吐下止是傳邪亦未可與調胃承氣當與柴胡湯以除上中二焦之邪若曽吐損傷胃氣胃虛則邪乘虛入胃為實非柴胡湯所能去與調胃承氣湯下胃熱以嘔知胃氣先曽動傷也太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當鞕滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裏故也抵當湯主之太陽膀胱經也此隨經入府者也六七日邪氣傳裏之時脈微而沉邪氣傳裏之脈也表證仍在則邪氣猶淺當結於胸中若不結胸其發狂者熱結在膀胱也經曰熱結膀胱其人如狂此發狂則熱又深也少腹鞕滿小便不利者為無血也小便自利者血證諦也與抵當湯以下畜血抵當湯方水蛭三十個熬味鹹苦寒虻蟲三十個熬去翅足味苦微寒桃仁三十粒去皮尖味苦甘平大黃三兩酒浸味苦寒苦走血鹹勝血虻蟲水蛭之鹹苦以除畜血甘緩結苦㵼熱大黃之苦以㵼結熱右四味為末以水五升煮取三升去滓溫服一升不下再服太陽病身黃脈沉結少腹鞕小便不利者為無血也小便自利其人如狂血證諦也抵當湯主之身黃脈沉結少腹鞕小便不利者胃熱發黃也可與茵陳湯身黃脈沉結少腹鞕小便自利其人如狂者則非胃之瘀熱為熱結下焦而為畜血也與抵當湯以下畜血傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可餘藥宜抵當丸傷寒有熱少腹滿是畜血於下焦若熱畜津液不通則小便不利其熱不畜津液而畜血不行小便自利者乃為畜血當與桃仁承氣抵當湯下之然此無身黃屎黑又無喜忘發狂之證是未至于甚故不可以餘藥下之但與抵當丸小下之可也抵當丸方水蛭三十個虻蟲二十五個桃仁二十個大黃三兩右四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服太陽病小便利者以飲水多必心下悸小便少者必苦裏急也飲水多而小便自利者則水不內畜但腹中飲多令心下悸金匱要略曰食少飲多水停心下甚者則悸飲水多而小便不利則水畜於內而不行必苦裏急也辨太陽脈證并治下第七問曰病有結胸有藏結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸何謂藏結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰藏結舌上白胎滑者難治結胸者邪結在胸藏結者邪結在藏二者皆下後邪氣乘虛入裏所致下後邪氣入裏與陽相結者為結胸以陽受氣於胸中故也與隂相結者為藏結以隂受之則入五藏故也宜通而塞故痛邪結陽分則隂氣不得上通邪結隂分則陽氣不得下通是故二者皆心下鞕痛寸脈浮關脈沉知邪結在陽也寸脈浮關脈小細沉緊者知邪結在隂也隂結而陽不結雖心下結痛飲食亦自如故隂氣乘陽虛而下故時時自下利隂得陽則解藏結得熱證多則為易治舌上白胎滑者則胸中亦寒故難治藏結無陽證不往來寒熱其人反靜舌上胎滑者不可攻也藏結於法當下無陽證為表無熱不往來寒熱為半表半裏無熱其人反靜為裏無熱經曰舌上如無胎者以丹田有熱胸中有寒今舌上胎滑以表裏皆寒故不可攻病發於陽而反下之熱入因作結胸病發於隂而反下之因作痞所以成結胸者以下之太早故也發熱惡寒者發於陽也而反下之則表中陽邪入裏結於胸中為結胸無熱惡寒者發於隂也而反下之則表中隂邪入裏結於心下為痞結胸者項亦強如柔痓狀下之則和宜大陷胸丸結胸病項強者為邪結胸中胸結膈滿心下緊實但能仰不能俯是項強亦如柔痓之狀也與大陷胸丸下結泄滿大陷胸丸方大黃半斤味苦寒葶􅐗半升熬味苦寒芒硝半升味酸寒杏仁半升去皮尖熬黑味苦甘溫大黃芒硝之苦寒所以下熱葶歷杏仁之苦甘所以泄滿甘遂取其直達白蜜取其潤利皆以下泄滿實物也右四味搗篩大黃葶厯二味內杏仁芒硝合研如脂和散如彈丸一枚别搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法結胸證其脈浮大者不可下下之則死結胸為邪結胸中屬上焦之分得寸脈浮關脈沉者為在裏則可下若脈浮大心下雖結是在表者猶多未全結也下之重虛邪氣復結則難治故云下之則死結胸證悉具煩躁者亦死結胸證悉具邪結已深也煩躁者正氣散亂也邪氣勝正氣病必死太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因鞕則為結胸大陷胸湯主之若不結胸但頭汗出餘無汗劑頸而還小便不利身必發黃也動數皆陽脈也當責邪在表睡而汗出者謂之盜汗為邪氣在半表半裏則不惡寒此頭痛發熱微盜汗出反惡寒者表未解也當發其汗醫反下之虛其胃氣表邪乘虛則陷邪在表則見陽脈邪在裏則見隂脈邪氣內陷動數之脈所以變遲而脈浮獨不變者以邪氣結胸中上焦陽結脈不得而沉也客氣者外邪乘胃中空虛入裏結于胸膈膈中拒痛者客氣動膈也金匱要略曰短氣不足以息者實也短氣躁煩心中懊憹皆邪氣實熱陽氣內陷氣不得通於膈壅塞心下為鞕滿而痛成結胸也與大陷胸湯以下結熱若胃中空虛陽氣內陷不結于胸膈下入于胃中者遍身汗出則為熱越不能發黃若但頭汗身無汗劑頸而還小便不利者熱不得越必發黃也大陷胸湯方大黃六兩去皮苦寒芒硝一升味鹹寒甘遂六錢七分味苦寒大黃為將軍苦以蕩之芒硝一名消石以其鹹以耎堅膚間有水甘遂以通水也其氣直達邪結之處以導去熱邪也右以水六升先煮大黃取二升去滓內芒硝煮一兩沸內甘遂末溫服一升得快利止後服傷寒六七日結胸實熱脈沉而緊心下痛按之石鞕者大陷胸湯主之病在表而下之熱入因作結胸此不云下後而云傷寒六七日則是傳裏之實熱也沉為在裏緊為裏實以心下痛按之實鞕是亦為結胸不因誤下也與陷胸湯以下結實傷寒十餘日熱結在裏復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之傷寒十餘日熱結在裏是可下之證復往來寒熱為邪正分爭未全結裏與大柴胡湯下之但結胸無大熱者非熱結也是水飲聚於胸脅謂之水結胸周身汗出者是水飲外散則愈若但頭微汗出餘無汗是水飲不得外泄停畜而不得行也與大陷胸湯以逐其水太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所有潮熱從心至少腹鞕滿而痛不可近者大陷胸湯主之重發汗而復下之則內外重亡津液而邪熱內結致不大便五六日舌上燥而渴也日晡潮熱屬胃此小有潮熱非但在胃從心下至少腹鞕滿而痛不可近者是一腹之中上下邪氣俱實也宜大陷胸湯以下其實邪小結胸病在心下按之則痛脈浮滑者小陷胸湯主之凡心下鞕痛手不可近者結胸也正在心下按之則痛是熱氣猶淺謂之小結胸結胸脈沉緊或寸浮關沉今脈浮滑知熱未深結可與小陷胸湯以除膈上之結熱小陷胸湯方黃連一兩味苦寒半夏半升洗味辛溫括蔞實大者一個味苦寒苦以泄之辛以散之黃連括蔞實之苦寒以泄熱半夏之辛以散結右三味以水六升先煮括蔞取三升去滓內諸藥煮取二升去滓分溫三服太陽病二三日不能卧但欲起心下必結脈微弱者此本有寒分也醫反下之若利止必作結胸未止者四日復下之此作協熱利也太陽病二三日邪在表也不能卧但欲起心下必結者心下結滿卧則氣壅而益甚故不能卧而但欲起也心下結滿有水分有氣分有寒分今脈微弱知本有寒分醫見心下結而反下之則太陽表邪乘虛入裏利止邪氣留為結胸利不止至于四日後前下利不止者是邪熱下攻腸胃為挾熱利也太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸也脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血此太陽病下之後邪氣傳變也其脈促者為陽盛下後脈促為陽勝隂也故不作結胸為欲解下後脈浮為上焦陽邪結而為結胸也經曰結胸者寸脈浮關脈沉下後脈緊則太陽之邪傳於少隂經曰脈緊者屬少隂內經曰邪客於少隂之絡令人嗌痛不可納食所以脈緊者必咽痛脈弦則太陽之邪傳于少陽經曰尺寸俱弦者少陽病也其脈循脅絡於耳所以脈弦者必兩脅拘急下後邪氣傳裏則頭痛當止脈細數為邪未傳裏而傷氣也細為氣少數為在表故頭痛未止脈沉緊則太陽之邪傳於陽明為裏實也沉為在裏緊為裏實陽明裏實故必欲嘔脈滑則太陽之邪傳於腸胃以滑為隂氣有餘知邪氣入裏在于下焦也沉為血勝氣虛是為協熱下利浮為氣勝血虛是知必下血經曰不宜下而便攻之諸變不可勝數此之謂也病在陽應以汗解之反以冷水噀之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服病在陽為邪在表也法當汗出而解反以冷水潠之灌洗熱被寒水外劫不得出則反攻其裏彌更益煩肉上粟起者水寒之氣客於皮膚也意欲飲水者有熱也反不渴者寒在表也與文蛤散以散表中水寒之氣若不差是水熱相搏欲傳於裏與五苓散發汗以和之始熱在表因水寒制之不得外泄內攻於裏結於胸膈心下鞕痛本以水寒伏熱為實故謂之寒實結胸無熱證者外無熱而熱悉收斂于裏也與小陷胸湯以下逐之白散下熱故亦可服文蛤散方文蛤五兩醎寒醎走腎則可以勝水氣右一味為末散以沸湯和一錢匕服湯用五合白散方桔梗三分味辛苦微溫巴豆一分去皮心熬黑研如脂辛溫貝母三分味辛苦平辛散而苦泄桔梗貝母之苦辛用以下氣巴豆辛溫用以散實右三味為末內巴豆於臼中杵之以白飲和服強人半錢羸者減之病在膈上必吐病在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆者若以水潠之洗之益令熱邪不得出當汗而不汗則煩假令汗已出腹中痛與芍藥三兩如上法太陽與少陽併病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則讝語脈弦五六日讝語不止當刺期門太陽之脈絡頭下項頭項強痛者太陽表病也少陽之脈循胸絡脅如結胸心下痞鞕者少陽病也太陽少陽相併為病不純在表故頭項不但強痛而或眩冒亦未全之裏故時如結胸心下痞鞕此邪在半表半裏之間也刺大椎第一間肺俞以㵼太陽之邪肝俞以㵼少陽之邪邪在表則可發汗邪在半表半裏則不可發汗發汗則亡津液損動胃氣少陽之邪因汗於胃土為木刑必發讝語脈弦至五六日傳經盡邪熱去而讝語當止若復不止為少陽邪熱甚也刺期門以㵼肝膽之邪婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀讝語者此為熱入血室也當刺期門隨其實而㵼之中風發熱惡寒表病也若經水不來表邪入裏則入府而不入血室也因經水適來血室虛空至七八日邪氣內傳入裏之時更不入府乘虛而入於血室熱除而脈遲身涼者邪氣內陷而表證罷也胸脅下滿如結胸狀讝語者熱入血室而裏實期門者肝之募肝主血刺期者㵼血室之熱審看何經氣實更隨其實而㵼之婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室必結故使如瘧狀發作有時小柴胡湯主之中風七八日邪氣傳裏之時本無寒熱而續得寒熱經水適斷者此為表邪乘虛入於血室與血相搏而血結不行經水所以斷也血氣與邪氣分爭因致寒熱如瘧而發作有時與小柴胡湯以散傳經之邪婦人傷寒發熱經水適來晝日了了暮則讝語如見鬼狀者此為熱入血室也無犯胃氣及上中二焦必自愈傷寒發熱者寒已成熱也經水適來則血室空虛邪熱乘虛入于血室若晝日讝語為邪客於府而與陽爭也此晝日明了暮則讝語如見鬼狀是邪不入府入于血室而與隂爭也陽盛讝語則宜下此熱入血室不可與下藥犯其胃氣其脅滿如結胸狀者可刺期門此雖熱入血室而無滿結不可刺期門犯其中焦必自愈者以經行熱隨血去血下已則邪悉除而愈矣所謂無犯上中二焦謂發汗為犯上焦者發汗則動衛氣衛氣出上焦故也刺期門為犯中焦者刺期門則動榮氣榮氣出中焦故也脈經曰無犯胃氣及上中二焦必自愈豈謂藥不謂針耶傷寒六七日發熱微惡寒支節煩痛微嘔心下支結外證未去者柴胡加桂枝湯主之傷寒六七日邪當傳裏之時嘔而心下支結者裏證也法當攻裏乃發熱微惡寒支節煩疼為外證未去不可攻裏與柴胡桂枝湯以和解之傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝乾薑湯主之傷寒五六日已經汗下之後則邪當解今胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者即邪氣在半表半裏之間為未解也胸脅滿微結寒熱心煩者邪在半表半裏之間也小便不利而渴者汗下後亡津液內燥也若熱消津液則小便不利而渴者其人必嘔今渴而不嘔知非裏熱也傷寒汗出則和今但頭汗出而餘處無汗者津液不足而陽虛於上也與柴胡桂枝乾薑湯以解表裏之邪復津液而助陽也柴胡桂枝乾薑湯柴胡半斤桂枝三兩去皮乾薑二兩括蔞四兩黃芩三兩牡蠣二兩甘草二兩炙內經曰熱淫於內以苦發之柴胡黃芩之苦以解在裏之邪辛甘發散為陽桂枝甘草之辛甘以散在表之邪鹹以耎堅牡蠣之鹹以消胸膈之滿辛以潤之乾薑之辛以固陽虛之汗津液不足而為渴苦以堅之括蔞之苦以生津液右以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出愈傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便鞕脈細者此為陽微結必有表復有裏也脈沉亦在裏也汗出為陽微假令純隂結不得復有外證悉入在裏此為半在裏半在外也脈雖沉緊不得為少隂病所以然者隂不得有汗今頭汗出故知非少隂也可與小柴胡湯設不了了者得屎而解傷寒五六日邪當傳裏之時頭汗出微惡寒者表仍未解也手足冷心下滿口不欲食大便鞕脈細者邪結于裏也大便鞕為陽結此邪熱雖傳于裏然以外帶表邪則熱結猶淺故曰陽微結脈沉雖為在裏若純隂結則便無頭汗惡寒之表證諸隂脈皆至頸胸中而還不上循頭今頭汗出知非少隂也與小柴胡以解半表半裏之邪服湯已外證罷而不了了者為裏熱未除與湯取其微利則愈故云得屎而解傷寒五六日嘔而發熱者柴胡湯證具而醫以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振怯發熱汗出而解若心下滿而鞕痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏㵼心湯主之傷寒五六日邪在半表半裏之時嘔而發熱邪在半表半裏之證是為柴胡證具以他藥下之柴胡證不罷者不為逆却與柴胡湯則愈若下後邪氣傳裏者邪在半表半裏則隂陽俱有邪至於下後邪氣傳裏亦有隂陽之異若下後陽邪傳裏者則結於胸中為結胸為陽受氣之分與大陷胸湯以下其結隂邪傳裏者則留于心下為痞為隂受氣之分與半夏㵼心湯以通其痞經曰病發于陽而反下之熱入因作結胸病發於隂而反下之因此作痞此之謂也半夏㵼心湯方半夏半升洗黃芩乾薑人參已上各三兩黃連一兩大棗十二枚擘甘草三兩炙辛入肺而散氣半夏之辛以散結氣苦入心而㵼熱黃連黃芩之苦以㵼痞熱脾欲緩急食甘以緩之人參甘草大棗之甘以緩之右七味以水一斗煮取六升去滓再煮取三升溫服一升日三服太陽少陽併病而反下之成結胸心下鞕下利不止水漿不下其人心煩太陽少陽併病為邪氣在半表半裏也而反下之二經之邪乘虛而入太陽表邪入裏結於胸中為結胸心下鞕少陽裏邪乘虛下於腸胃遂利不止若邪結隂分則飲食如故而為藏結此為陽邪內結故水漿不下而煩脈浮而緊而復下之緊反入裏則作痞按之自濡但氣痞耳浮而緊浮為傷陽緊為傷隂當發其汗而反下之若浮入裏為陽邪入裏則作結胸浮不入裏而緊入裏者隂邪入裏則作痞太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時痛心下痞鞕滿引脅下痛乾嘔短氣汗出不惡寒者此表解裏未和也十棗湯主之下利嘔逆裏受邪也邪在裏可以下須待表解者乃可攻之其人漐漐汗出發作有時短不惡寒者表已解也頭痛心下痞鞕滿引脅下痛乾嘔氣者邪熱內蓄而有伏飲是裏未和也與十棗湯下熱逐飲十棗湯方芫花熬甘遂大戟大棗十枚擘辛以散之芫花之辛以散飲苦以泄之甘遂大戟之苦以泄水水者腎所主也甘者脾之味也大棗之甘益土而勝水右三味等分各别搗為散以水一升半先煮大棗肥者十枚取八合去滓內藥末強人服一錢匕羸人服半錢溫服之平旦服若下少病不除明日更加服半錢得快下利後米粥自養太陽病醫發汗遂發熱惡寒因復下之心下痞表裏俱虛隂陽氣並竭無陽則隂獨復加燒針因胸煩面色青黃膚瞤者難治令色微黃手足溫者易愈太陽病因發汗遂發熱惡寒外虛陽氣邪復不除因復下之又虛其裏表中虛邪內陷傳於心下為痞發汗表虛為竭陽下之裏虛為竭隂表證罷為無陽裏有痞為隂獨又加燒針虛不勝火火氣致胸煩也傷寒之病以陽為主其人面色青膚肉瞤動者陽氣大虛故云難治若面色微黃手足溫者即陽氣得復故云易愈心下痞按之濡其脈關上浮者大黃黃連㵼心湯主之心下鞕按之痛脈關沉者實熱也心下痞按之濡其脈關上浮者為虛熱也大黃黃連㵼心湯以導虛熱大黃黃連㵼心湯方大黃二兩黃連一兩內經曰火熱受邪心病生焉苦入心寒除熱大黃黃連之苦寒以導㵼心下之虛熱但以麻沸湯漬服者取其氣薄而㵼虛熱也右二味以麻沸湯漬之須臾絞去滓分溫再服心下痞而復惡寒汗出者附子㵼心湯主之心下痞者虛熱內伏也惡寒汗出者陽氣外虛也與㵼心湯攻痞加附子以固陽本以下之故心下痞與㵼心湯痞不解其人渴而口燥煩小便不利者五苓散主之本因下後成痞當與㵼心湯除之若服之痞不解其人渴而口燥煩小便不利者為水飲內蓄津液不行非熱痞也與五苓散發汗散水則愈一方忍之一日不飲乃愈者外水不入所停之水得行而痞亦愈也傷寒汗出解之後胃中不和心下痞鞕乾噫食臭脅下有水氣腹中雷鳴下利者生薑㵼心湯主之胃為津液之主陽氣之根大汗出後亡津液胃中空虛客氣上逆心下鞕痞金匱要略曰中焦氣未和不能消榖故令噫乾噫食臭者胃氣虛而不殺榖也脅下有水氣腹中雷鳴土弱不能勝水也與㵼心湯以攻痞加生薑以調中益胃也傷寒中風醫反下之其人下利日數十行榖不化腹中雷鳴心下痞鞕而滿乾嘔心煩不得安醫見心下痞謂不盡復下之其痞愈甚此非結熱但以胃中虛客氣上逆故使鞕也甘草㵼心湯主之傷寒中風是傷寒或中風也邪氣在表醫反下之虛其腸胃而氣內陷也下利日數十行榖不化腹中雷鳴者下後裏虛胃弱也心下痞鞕乾嘔心煩不得安者胃中空虛客氣上逆也與㵼心湯以攻痞加甘草以補虛前以汗後胃虛是外傷陽氣故加生薑此以下後胃虛是內損隂氣故加甘草傷寒服湯藥下利不止心下痞鞕服㵼心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便傷寒服湯藥下後利不止而心下痞鞕者氣虛而客氣上逆也與㵼心湯攻之則痞已醫復以他藥下之又虛其裏致利不止也理中丸脾胃虛寒下利者服之愈此以下焦虛故與之其利愈甚聖濟經曰滑則氣脫欲其收也如開腸洞㵼便溺遺失澀劑所以收之也此利由下焦不約與赤石脂禹餘糧湯以澀洞㵼下焦主分清濁下利者水榖不分也若服澀劑而利不止者當利小便以分其水氣赤石脂禹餘糧湯方赤石脂一斤碎味甘溫禹餘糧一斤碎味甘溫本草云澀可去脫石脂之澀以收斂之重可去怯餘糧之重以鎮固之右二味以水六升煮取二升去滓日三服傷寒吐下後發汗虛煩脈甚微八九日心下痞鞕脅下痛氣上衝咽喉眩冒經脈動惕久而成痿傷寒吐下後發汗則表裏之氣俱虛其脈甚微為正氣虛邪氣獨在至八九日正氣當復邪氣當罷而心下痞脅下痛氣上衝咽喉眩冒者正氣內虛而不復邪氣留結而不去經脈動惕者經絡之氣虛極久則熱氣還經必成痿弱傷寒發汗若吐若下解後心下痞鞕噫氣不除者旋覆代赭湯主之外邪雖解以曾發汗吐下胃氣弱而未和虛氣上逆故心下痞鞕噫氣不除與旋覆代赭湯鎮虛氣而和胃旋覆代赭石湯方旋覆花三兩味鹹溫代赭石一兩味苦寒人參二兩味甘溫甘草三兩炙半夏半升洗味辛溫生薑五兩切大棗十二枚擘鞕則氣堅鹹味可以耎之旋覆之鹹以耎痞鞕怯則氣浮重則可以鎮之代赭之重以鎮虛逆辛者散也生薑半夏之辛以散虛痞甘者緩也人參甘草大棗之甘以補胃弱右七味以水一斗煮取六升去滓再煎取三升溫服一升日三服下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏仁甘草石膏湯前第三卷十六證云發汗不可更行桂枝湯汗出而喘無大熱者為與此證治法同汗下雖殊既不當損正氣則一邪氣所傳既同遂用一法治之經所謂若發汗若吐若下後者是也太陽病外證未除而數下之遂協熱而利利不止心下痞鞕表裏不解者桂枝人參湯主之外證未除而數下之為重虛其裏邪熱乘虛而入裏裏虛協熱遂利不止而心下痞若表解而下利心下痞者可與㵼心湯若不下利表不解而心痞可先解表而後攻痞以表裏不解故與桂枝人參湯和解表裏桂枝人參湯方桂枝四兩去皮味辛熱甘草四兩炙味甘平白术三兩味甘溫乾薑三兩味辛熱人參三兩味甘溫表未解者辛以散之裏不足者甘以緩之此以裏氣大虛表裏不解故加桂枝甘草於理中湯中也右五味以水九升先煮四味取五升內桂更煮取三升溫服一升日再夜一服傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連㵼心湯大下後復發汗則表裏之邪當悉已此乃痞而惡寒者表裏之邪俱不解也因表不解而下之為心下痞先與桂枝湯以解表表解乃與大黃黃連㵼心湯以攻痞內經曰從外之內而盛於內者先治其外而後調其內傷寒發熱汗出不解心下痞鞕嘔吐而下利者大柴胡湯主之傷寒發熱寒已成熱也汗出不解表未和而裏復病也吐利心腹濡耎為裏虛嘔吐而下利心下痞鞕者是裏實也與大柴胡湯以下裏熱病如桂枝證頭不痛項不強寸脈微浮胸中痞鞕氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散病如桂枝證為發熱汗出惡風言邪在表也頭痛項強為桂枝湯證具若頭不痛項不強則邪不在表而傳裏也浮為在表沉為在裏今寸脈微浮則邪不在表亦不在裏而在胸中也胸中與表相應故知邪在胸中猶如桂枝證而寸脈微浮也以胸中痞鞕上衝咽喉不得息知寒邪客於胸中而不在表也千金以曰氣浮上部填塞心胸胸中滿者吐之則愈與瓜蒂散吐胸中之邪夫盛食填塞於胸中為之窒塞兩寸當王事兩尺脈不見其理安在胸中有食故以吐出之食者物也物者坤土也是足太隂之號也胸中者肺也為物所填肺者手太隂金也金主殺伐與坤土傾在於上而旺於天金能尅木故肝木生發之氣伏於地下非木鬱而何吐出上焦隂土之物木得舒暢則鬱去矣食塞於上脈絶於下若不明天地之道無由達此至理水火者隂陽之徵兆天地之别名也故曰獨陽不生獨隂不長天之用在於地下則萬物生長矣地之用在於天上則萬物收藏矣此乃天地交而萬物通也此天地相根之道也故陽火之根本於地下隂水之源本於天上故曰水出髙源故人五藏主有形之物物者隂也隂者水也右三部脈主之偏見于寸口食塞其上是絶五藏之源源絶則水不下流兩尺竭絶此其理也何疑之有重明木鬱達之之理達造化者能此或曰食盛填塞於胸中為窒也今吐以去所傷之物去則安胸中者太隂肺之分野木鬱者遏鬱厥隂肝木於下故以吐伸之以舒暢陽和風木之氣也此吐乃㵼出太隂之塞所謂木鬱請問其説答曰此大神靈之問非既演大道不能及於此天地之間六合之內惟水與火耳火者陽也升浮之象也在天為體在地為用水隂土也降沉之象也在地為體在天為用殞殺之收藏之象也其氣上下交則以成八卦矣以醫者言之則是升浮降沉溫涼寒熱四時也以應八卦若天火在上地火在下則是天地不交隂陽不相輔也是萬物之道大易之理絶滅矣故經言獨陽不生獨隂不長天地隂陽不交會矣故曰陽本根於隂隂本根於陽若不明根源是不明道故六陽之氣生於地則曰陽本根於隂以人身言之是六腑之生發長散於胃中上之中也既陽氣鼓舞萬象有形質之物於天為浮散者也物極必反陽極變隂既六陽升浮之力在天其力既盡是陽道終矣所以鼓舞六隂有形之隂水在天在外也上六無外必歸於下此老陽變隂之象也是五藏之源在於天者也天者人之肺以應之故曰隂本根於陽水出髙源者是也人之五藏其源在肺肺者背也背在天地故足太陽膀胱寒水生長其源在中故隂寒自此而降以成秋收氣寒之漸也降之於成冬藏伏謂六陽在九泉之下者也故五藏之氣生於死以人身是五藏之氣收藏沉降之源出於肺氣之上其流下行既隂氣下行沉墜萬化有形質之物皆收藏於地為沉降者也物極必反隂極變陽既六隂沉降之力在地其力既盡是隂道終矣是老隂變陽陽乃和上九無位是一嵗四時之氣終而復始為上下者也莫測其紀如環無端具太陽隂者肺金收降之氣當居下體金反在上抑遏厥隂風木反居於下是不得上升也故曰木鬱故令其吐出窒塞有形土化之物使太隂秋肺收於下體浮其木以衰之始上升手足厥隂之木尤氣以伸其舒暢上升之念得其所以又沉金能尅木以土伐之則金衰矣金者其道當降是塞因塞用歸其本矣居於上則遏其木故以吐伸之乃㵼金以助木也遍考內經中説木鬱則逹之之義止是食傷太隂有形之物窒塞於胸中尅制厥隂木氣伏潛於下不得舒伸於上此若無異説以六淫有餘運氣中論之仲景傷寒論云懊惱躁煩不得眠不經汗下謂之實煩瓜蒂散主之曾經妄汗妄下謂之虛煩梔子䜴湯主之瓜蒂散方瓜蒂一分熬黃味苦寒赤小豆一分味酸溫其髙者因而越之越以瓜蒂之苦佐以赤小豆之酸內經曰酸苦湧㵼為隂右二味各别搗篩為散已合治之取一錢匕以香䜴一合用熱湯七合煮作稀糜去滓取汁和丸散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與瓜蒂散病脅下素有痞連在臍旁通引少腹入隂筋者此名藏結死素有宿昔之積結於脅下為痞今因傷寒邪氣入裏與宿積相併使藏真之氣結而不通致連在臍旁痛引少腹入隂筋而死傷寒病若吐若下後七八日不解熱結在裏表裏俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之若吐若下後七八日則當解復不解而熱結在裏表熱者身熱也裏熱者內熱也今因吐下後邪氣乘虛內陷為結熱若無表熱而純為裏熱則邪熱結而為實此以表熱未罷時時惡風若邪氣純在表則惡風無時若邪氣純在裏則更不惡風以時惡風知表裏俱有熱也邪熱結而為實者則無大渴邪熱散漫則渴今雖結熱在裏表裏俱熱未為結實邪氣散漫熏蒸焦膈故大渴舌上乾慘而煩欲飲數升與白虎湯加人參湯散熱生津傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之無大熱者為身無大熱也口燥渴心煩者當作陽明病然以背微惡寒為表未罷所以屬太陽也背為陽背惡寒口中和者少隂病也當與附子湯今口燥而渴背雖惡寒此裏熱也其惡寒亦不至甚故云微惡寒與白虎湯和裏散熱加人參止渴生津傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之傷寒脈浮發熱無汗其表不解不渴者宜麻黃湯渴者宜五苓散非白虎湯所宜大渴欲飲水無表證者乃可與白虎湯加人參湯以散裏熱臨病之工大宜精别太陽少陽併病心下鞕頸項強而眩者當刺大椎肺俞慎勿下之心下痞鞕而眩者少陽也頸項強者太陽也刺大椎肺俞以㵼太陽之邪以太陽脈下項俠脊故刺肝俞以㵼少陽之邪以膽為肝之府故爾太陽為在表少陽為在裏即是半表半裏證前第八證云不可發汗發汗則讝語是發汗攻太陽而少陽之邪益甚于胃必發讝語此云慎勿下之攻少陽之邪而太陽之邪乘虛入裏必作結胸經曰太陽少陽併病而反下之成結胸太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之太陽陽明合病自下利為在表當與葛根湯發汗陽明少陽合病自下利為在裏可與承氣湯下之此太陽少陽合病自下利為在半表半裏非汗下所宜故以黃芩湯以解半表半裏之邪嘔者胃氣逆也故加半夏生薑以散逆氣黃芩湯方黃芩三兩味苦寒甘草三兩炙味甘平芍藥三兩味酸平大棗二十枚擘味甘溫虛而不實者苦以堅之酸以收之黃芩芍藥之苦酸以堅斂腸胃之氣弱而不足者甘以補之甘草大棗之甘以溫補固腸胃之氣右四味以水一斗煮取三升去滓溫服一升日再夜一服若嘔者加半夏半升生薑三兩傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之濕家下後舌上如胎者以丹田有熱胸中有寒是邪氣入裏而為下熱上寒也此傷寒邪氣傳裏而為下寒腹中痛上熱也胃中有邪氣使隂陽不交隂不得升而獨治於下為下寒腹中痛陽不降而獨治於上為胸中痛欲嘔吐與黃連湯升降隂陽之氣黃連湯方黃連三兩甘草三兩炙乾薑三兩桂枝二兩去皮人參二兩半夏半升大棗十二枚擘上熱者㵼之以苦黃連之苦以降陽下寒者散之以辛桂薑半夏之辛以升隂脾欲緩急食甘以緩之人參甘草大棗之甘以益胃右七味以水一斗煮取六升去滓溫服一升日三服夜二服傷寒八九日風濕相搏身體煩疼不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之傷寒與中風家七八日再經之時則邪氣多在裏身必不苦疼痛今日數雖多身體煩疼不能自轉側者風濕相搏也煩者風也身疼不能自轉側者濕也經曰風則浮虛脈經曰脈來澀者為病寒濕也不嘔不渴裏無邪也脈得浮虛而澀身有煩疼知風濕但在經也與桂枝附子湯以散表中風濕若其人大便鞕小便自利者去桂枝加白术湯主之桂枝發汗走津液此小便利大便鞕為津液不足故去桂加术桂枝附子湯方桂枝四兩去皮味辛熱附子二枚炮去皮破八片辛熱生薑三兩切辛溫甘草二兩炙味甘溫大棗十二枚擘味甘溫右五味以水六升煮取二升去滓分溫三服風濕相搏骨莭煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之風則傷衛濕流關節風濕相搏兩邪亂經故骨節煩疼掣痛不得屈伸近之則痛劇也風勝則衛氣不固汗出短氣惡風不欲去衣為風在表濕勝則水氣不行小便不利或身微腫為濕外搏也與甘草附子湯散濕固衛氣甘草附子湯方甘草二兩炙味甘平附子二枚炮去皮破味辛熱白术二兩甘溫桂枝二兩桂枝甘草之辛甘發散風邪而利衛附子白术之甘溫解濕氣而溫經右四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者宜服六七合為妙傷寒脈浮滑此表有熱裏有寒白虎湯主之浮為在表滑為在裏表有熱外有熱也裏有寒邪氣傳裏也以邪未入腑故止言寒如瓜蒂散證云胸中有寒者是也與白虎湯以解內外之邪白虎湯方知母六兩味苦寒石膏一斤碎味甘寒甘草一兩甘平粳米六合味甘平內經曰熱淫所勝佐以苦甘知母石膏之苦甘以散熱熱則傷氣甘以緩之甘草粳米之甘以益氣右四味以水一斗煮米熟湯成去滓溫服一升日三服傷寒脈結代心動悸炙甘草湯主之結代之脈動而中止能自還者名曰結不能自還者名曰代由血氣虛衰不能相續也心中悸動知真內虛也與炙甘草湯益氣虛補血虛而復脈炙甘草湯方甘草四兩炙生薑三兩切桂枝三兩去皮生地黃一斤甘溫阿膠二兩麥門冬半升去心甘平麻子仁半升甘平大棗十二枚擘人參二兩補可去弱人參甘草大棗之甘以補不足辛走氣桂枝生薑之辛以益正氣聖濟經曰津液耗散為枯五藏痿弱榮衛涸流溫以潤之麻仁阿膠麥冬生地之甘潤經益血以復脈通心也右九味以清酒七升水八升先煮八味取三升去滓內膠煬消盡溫服一升日三服一名復脈湯脈按之來緩而時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結隂也脈來動而中止不能自還因而復動名曰代隂也得此脈者必難治結代之脈一為邪氣留結一為真氣虛衰脈來動而不止若能自還更來小數止是邪氣留結名曰結隂若動而中止不能自還因其呼吸隂陽相引復動者是真氣衰極名曰代隂為難治之脈經曰脈結者生代者死此之謂也夫太陽病下之不愈其脈浮者為在外汗之則愈宜桂枝湯夫太陽病發汗已解半日後復煩燥其脈浮散者可復發其汗宜桂枝湯太陽病脈浮而數者可發其汗宜麻黃湯太陽與陽明合病而自利宜术附湯太陽病發汗後腹脹滿者宜厚朴湯太陽病汗後心下痞滿者宜㵼心湯太陽病汗出後胃中不和心下痞堅乾噎食臭脅下有水氣腹中雷鳴而利宜半夏㵼心湯普濟方卷一百二十七
