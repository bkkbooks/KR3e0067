body:
  text: 普濟方卷三百九十九明周王朱橚撰嬰兒諸疝諸蟲諸疝附論夫腎主納氣乃人之氣海腎虛為風寒所乘為暑濕所襲為喜怒驚恐所傷而水結不散又與邪氣摶聚於中為奔疝為奔豚為小腸氣為膀胱等證不特外腎小腸作痛或攻刺腰脅或遊走背膂或氣搶心心下痛滿或痛繞臍傍或脅之左右如杯或臍之上下如臂或腸中纍纍如桃李或胃脘覆大如盤或壯熱惡寒或灑淅寒熱有大小便祕者有裏急而下泄者其於隂間則卵有小大伸縮上下不常囊有腫脹急痛而發渴無定夾冷驚怒則塊物上逼囊根或攻腹脅皆謂腎氣治法大綱風則散之寒則溫之暑則解其熱濕則滲其水驚怒則調其心氣水與氣摶則行其小便其間又以治腎氣藥參之大要流行踈利為先母曰腎虛不敢踈泄蓋腎為邪氣所干若非踈利病何由愈倘或姑息畏虛妄投剛補之劑使大小腑祕而不通邪氣入腹沖心危殆必矣然腎氣雖虛得之當明冷熱及冷熱不調之證蓋冷者脅邊及外腎清冷小便清而多遇寒則發熱者內夾暑氣或積酒毒熱藥則外腎與小腹俱熱小便數而澀遇熱則甚冷熱不調者小腹外腎乍冷乍熱大小便或澀或利用藥溫涼流行踈導於其中矣若逆氣長吁中脘停酸躁悶嘔吐最為惡候乃天一生水腎實主宗筋聚於隂氣必藉陽明胃土以養今脾土未強腎水既涸脾土又焦隂陽不升降榮衛不流行大小便祕澀腎胃兩虛必為酸汁而暴吐者難治方金鈴子丸出危氏方治疝氣小腹痛引腰脊攣曲身不能直木香檳榔三稜蓬术炮青皮去白陳皮川棟肉芫花醋浸炒各半兩辣桂牽牛生取仁研各二錢川巴豆肉去油一錢右為末麵糊丸麻子大每丸空心午前各一服薑湯下小檳榔丸一名神效丸出危氏方治疝氣小腹痛引腰脊攣曲身不能直疝氣因何得邪風在腎經流傳并血聚如此漸成形冷氣結在臟因兹小腹疼本經無補法踈利藥通靈芫花醋浸炒木香檳榔三稜炒各半兩茯苓青皮去白全蝎肉桂附子炮硇砂各一分右為末將硇砂浸洗去土頓在湯瓶上候成膏子和糖醋打麵糊丸如菉豆大每服三十丸空心溫酒送下未效再服昔日有一人患此服之斷根今三十年不發矣化生丸出楊氏家藏治疝氣小腸痛上連腰脊曲飲食不進痿黃身不能直服此藥後宜炙脊俞三壯立瘥百藥俱試惟此最效木香一分炒檳榔半兩生青皮巴豆炒半兩去巴豆陳皮炮三稜莪术用濕紙裹煨取出槌切炒川楝去核芫花米醋浸炒各半兩右為細末麵糊丸如麥米大熟水下空心一服臨睡一服治小兒狐疝傷損生㿗出聖惠方芍藥茯苓各十八銖防葵一作防風大黃各半兩半夏桂心蜀椒各六銖右為末蜜和丸如豆大每服一丸日午服可加至三丸玉蟾煮裩藥出端竹堂歌曰三歲嬰兒性不調休教少子放踈嬌一張衲被幪頭側自有神仙路一條山茱萸蛇床子牡礪川椒吳茱萸蔥白帶鬚各等分右㕮咀每服用三錢熬水熏洗患處硃砂丸出御藥院治小兒疝氣硃砂一錢研當門子一枚如皂子大重分半石燕子燒醋淬五遍史君子末訶子炮出核為末各一錢木香三字右為細末用米飲為丸如黍米大從一丸至七丸薄荷湯下日二服早晚乳食前各一服當歸散出直指方治疝氣大腑祕小腹隂囊牽引撮聚痛甚辣桂牽牛炒取仁各半兩北大黃桃仁浸去皮焙各二錢半全蝎一錢右銼散每一錢入蜜煎溫服已利後以青皮陳皮茯苓木香縮砂甘草為散生薑煎和胃唇青不治牡丹丸一名桃仁丸出聖惠方治小兒疝氣桃仁炒去皮二錢牡丹白蒺藜炒去刺桂心各半兩郁李仁去皮炒一錢右為末煉蜜丸如小豆大三歲用三十丸溫酒下一方治小兒腹虛冷因多啼氣下致令隂腫加黃蘖半分微炙用茴香散出全嬰方治小兒疳疝氣攻隂核腫大茴香炒川棟子去核牽牛巴戟各等分右為末三歲半錢燈心湯調下一方牽牛為末糊丸小豆大三歲三十丸米湯下常服尤佳香附丸出朱氏集驗治膀胱疝氣外腎腫痛牽牛炒香附子炒石燕煆紅酒浸研巴豆七粒同牽牛炒去巴豆右末為丸用萆麻湯下金鈴散出危氏方治疝氣作痛時先曲腰啼哭眼中無淚腳冷唇乾額上多汗或外腎釣上隂囊偏大金鈴子一兩炒去核縮砂七錢半去殼蓽澄茄木香各五錢右為末每服一錢大者二錢鹽湯或好酒調服煨棗方治小兒腸氣痛斑蝥不去頭足十箇大棗一斤去核右將斑蝥入大棗內濕紙包煨香熟去蝥空腹食棗桂心湯下治小兒狐疝氣偏墜有大小時時上下者出濟生拔萃蜘蛛十四枚熬焦桂半兩右為散每服一錢日再酒調下蜜丸亦可治小兒寒疝腹痛大汗出出肘後方濃煮梨葉汁七合頓服以意消息可作三四度飲之大良治小兒疝氣并腎氣以葛袋盛鹽於户口懸之大人以手撚抖盡即愈治小兒疝發時腫痛如刺全嬰方以生射干汁取下飲之亦可為丸服之紫蘇子丸出楊氏家藏治臟寒氣疝腹痛加木香真紫蘇子楝淨陳橘皮去白各一兩髙良薑桂心人參各半兩木香一分炮右為末煉蜜丸如芡實或如圓眼細嚼米飲下小兒白湯化下一丸霍亂吐㵼急服煎霍香湯下尤妙備急方出楊氏家藏治證同前沉香木香右以水磨濃傾小盞內逐次磨一服許煎數沸即服無不作效茴香散朱氏集驗治小兒弔疝大人膀胱疝氣痛京三稜炮茴香炒甘草沒藥右等分為末煎釣藤湯調下蔥湯亦可桃仁湯出朱氏集驗方治弔疝幼雛服之取效木饅頭切碎用蔥炒桃仁鹽炒右二味等分為細末每服二錢溫酒下治偏墜吊疝方出朱氏集驗方正氣散一貼入釣藤煎服即愈牡丹丸治小兒隂疝偏腫牡丹皮豉炒防風去義黃蘖去粗皮微炙滑石别研桂去粗皮各一兩右為末煉蜜和丸如麻子大一二歲兒每服五丸米飲下早晨日晚各一服量大小加減治吊氣出朱氏集驗方鈎藤乾薑甘草各等分右為末湯點下吊腹氣痛未成者出鮑氏方蘿蔔子茴香枳殼甘草各等分右為散煎入少蜜再煎服痛甚者加少木香又方出鮑氏方蓬术枳殼木香甘草半兩沒藥二錢乳香一錢鈎藤勾炒半兩右為末蜜丸如芡實大釣藤湯下量與服立蘇散出朱氏集驗方治小腸氣蛜􅀈九個去毒馬蘭花二錢水浸一宿木香一錢沒藥半錢胡椒為末半錢右為末蘭香酒調下隂腫附論夫隂腫核腫者由兒啼怒躽氣逆不順乘虛而行隂偏大又因甘肥不節生冷過度致生疳氣結不行流入隂中更或傷暑毒或觸風邪使血氣與邪氣相摶停結不散則成隂腫巢氏曰邪氣衝於隂與血氣相摶則成隂腫小兒隂腫者為足少隂為腎之經其氣下通於隂小兒有少隂之經虛者而為風邪之氣衝於隂與血氣相摶結則令隂腫也人有常言天生地長多與小兒近地然兒有大小壯弱起止中節可也夫苟腎經氣虛或坐石不起冷氣旋之或近地經久風邪濕氣傷之不為隂腫幾希矣間有啼呌怒氣閉繫於下結聚不散加以水竇不行亦能發為此疾方治小兒核腫壯熱有實千金方青木香甘遂石膏甘草各十八銖麝香大黃前胡各一兩黃芩半兩右㕮咀以水七升煮取一升九合每服三合日四夜二甘遂丸出聖惠方治小兒隂腫壯熱甘遂一分煨令微黃麝香一分細研川大黃銼微炒一兩前胡二兩去蘆頭黃芩半兩木香一兩右為末煉蜜和丸如菉豆大三歲兒每於食前以溫水下三丸量兒大小以意加減三白散出危氏方治膀胱藴熱風濕相乘隂囊腫脹大小便不利白牽牛二兩桑白皮白术木通去節陳皮去白各半兩右為末每服二錢薑湯調空心服治盤腸氣釣先服此後服鈎藤膏桃仁丸出危氏方治啼呌怒氣閉繫於下結聚不散水竇不行桃仁去皮尖麩炒三分辣桂牽牛炮取仁牡丹皮白蒺䔧炒搗去刺北大黃各三錢右為末煉蜜丸如麻子大每服五丸或七丸青皮木通蔥白鹽少許煎湯灌下或煎大流氣飲研青木香丸灌下一方無辣桂大黃散出聖惠方治小兒隂腫大黃一分木通一分桑根白皮半兩羌活一分川朴硝三分右搗羅為散一二歲每服一錢水一小盞煎五分去滓溫服量兒大小分減海蛤散出醫方集成治小兒陰腫由啼呌怒氣繫於下乘虛而行故成此疾宜服海蛤蘹香子炒各三分薏苡仁白术檳榔各半兩麵裹煨右為末食前溫酒調下半錢量兒大小以意加減治小兒氣卵之疾破故紙蘿蔔子黑牽牛橘核各等分各炒焦黃色右為細末酒糊丸如菉豆大每服三十丸鹽湯下牡丹丸出聖惠方治小兒隂腫為腸虛冷多啼躽氣下所為宜服牡丹桂心郁李仁去皮微炒各半兩桃仁一分去皮尖雙仁麩炒微黃右搗羅為末煉蜜丸如麻子大一二歲每服以溫水下五丸早晨午後各一服量兒大小加減牛蒡膏出聖惠方治小兒隂卒腫脹痛生牛蒡汁二大盞熬如膏赤小豆末半兩肉桂末一分右藥相和如膏塗兒腫處立消漆燕散治小兒隂核氣結腫大或偏腫疼痛漆燕一枚入瓦瓶內鹽泥固濟隂乾炭火燒通赤為度放冷研令細續隨子去皮一分右為細散每服半錢米飲調下治小兒隂腫出聖惠方小豆一合川大黃半兩銼生用右為細散用雞子白調塗兒隂腫處乾即昜之蛇床仁湯尉方出聖惠方蛇床仁一兩柳蚛屑一兩右藥以水一大碗煎六七沸洗之取其滓以帛褁尉兒腫處治小兒隂腫出聖惠方用狐莖炙搗為末酒服之下半錢又方出千金方用斫桑木白汁塗之又方出千金方用搗蕪菁塗之又方出聖惠方用搗垣衣傅之又方出聖惠方以衣中白魚傅之差一方書中白魚雞翅散出全嬰方治小兒隂核腫大用雞翅六莖燒灰京三稜煎湯調塗左腫用左翅右腫用右翅一方單有雞翅燒灰服之古今録驗云治隂大如斗三稜散出全嬰方治小兒隂疝核腫用京三稜麵褁煨焦去麵將三稜為末三歲半錢空心鹽湯下大小加減蟬螁散出危氏方治隂囊忽腫多坐地為風或蟲蟻吹著用蟬螁半兩水一碗煎湯洗腫處其痛立止腫亦消再溫再洗後仍與五苓散加燈心煎服地龍膏出直指方治外腎腫硬或疝或風熱暴腫及隂瘡用乾地龍不拘多少為末先以蔥椒湯於避風處洗次用津唾調傅其上外腎熱者雞子清調傅或加牡蠣少許亦可一方加蔥液調塗一方只用地龍糞生薄荷汁調塗尤妙牡蠣散出危氏方治外腎腫大莖物通明用牡礪粉研極細先以津唾塗腫處次用糝傅治卵腫出危氏方研桃仁唾調傅亦治婦人隂腫燥癢一方治兒隂腫以桃仁研為膏溫酒化下豇豆大服之日三服大小加減遇仙方出危氏方治風熱腎焮赤腫痛日夜啼呌不退數日皮如雞卵殼愈而復作用老杉木燒灰入膩粉清油調傅效昔滁州趙使君云長子數歲時患此證忽見一道人説此方一傅遂愈五苓散出危氏方治隂核氣結腫大釣痛因啼怒不止傷動隂氣結聚不散得之或胎婦啼泣過傷令兒生下小腸氣閉加以風冷血水相聚水氣上乘於肺故先啼而後疝痛外腎木硬臍下痛楚不可忍惟利二便則安以木通蔥白茴香食鹽煎湯調下得小便利為效治小兒隂卒腫痛出聖惠方用蔓菁子末以豬脂調傅之又方出聖惠方用馬鞭草爛搗褁之日二易之水萍散出全嬰方治小兒隂囊腫色如琉璃又治瘡痘入目用浮萍草為末三歲煎蔥白湯調下一錢治小兒地風或蟲蟻吹著隂腫出經驗良方用蔥地內蚯蚓糞甘草汁塗一方無甘草水調塗治小兒隂腫出千金方用豬屎五升水煮沸布裹安腫上皂角膏出危氏方㵼腎氣治腎經有熱隂囊赤腫釣痛大腸祕澀大黃五錢黑牽牛半生半炒豬牙皂角各一兩右為末煉蜜丸菉豆大每服七粒溫水空心下茴香散出楊氏藏方治小兒外腎腫大腸悶作痛香附子去殼巴豆二十七粒炒焦去巴豆不用茴香炒各半兩右件為細末每服半錢煎紫蘇湯調下如是三歲以上服一錢乳食前空心下立消散出楊氏家藏方治小兒隂腫脹痛赤芍藥赤小豆枳殼麵炒去穰右件等分濃煎柏枝湯調藥傅腫處乾即以柏枝湯潤之桃仁方出醫方如選治小兒足少隂之經虛而受風邪者衝於下經則成隂腫病宜用經效桃仁湯浸去皮尖雙仁麩炒微黃三分牡丹半兩白蒺藜半兩微炒去刺桂心半兩郁李仁湯浸去皮微炒一分右件藥搗羅為末煉蜜和丸如黍米大每服十粒以溫酒下乳食前量兒大小加減治百二十日內隂腫如柿大者出朱氏集驗方大黃黃芩黃連黃柏右各等分燒留性為末以雄豬膽汁調抹服則消毒散血一方出海上方治小兒隂囊虛腫以生甘草調地龍糞塗之治小兒隂囊腫脹明亮出本草用石灰湯放溫洗之數次立效治小兒外腎腫痛出朱氏集驗方生地黃甘草右各等分為末煎服立效又方出朱氏集驗方五苓散煎蘿蔔子湯調下即愈偏墜附論夫小兒偏㿗者是隂核偏腫大亦由啼怒躽氣不正所致其偏者乘虛而行故謂偏結也方防葵丸出聖惠方治小兒隂偏大卵核堅硬防葵牡丹桂心黃蘖銼滑石以上各一兩豉半兩微炒右搗羅為末煉蜜和丸如麻子大三四歲兒以粥飲下五丸早晨晚後各一服量兒大小以意加減五等丸出千金方治小兒隂偏大又隂核堅㿗方黃蘖香豉牡丹防風桂心各二兩右為末蜜丸如大豆兒三歲飲服五丸加至十丸兒小以意酌量著乳頭上服之乳香丸一名妙香丹出全嬰方治小兒疝氣偏墜乳香青木香昆布洗各三錢牽牛炒藿香各半兩右為細末煉蜜或棗肉丸如小豆大三歲二十丸鹽湯送下一方用牡蠣湯下蘹香子丸出聖惠方治小兒偏墜或氣攻小腹疼痛蘹香子微炒搗末古文錢青細研硇砂細研各一分桃仁四十九枚去皮尖雙仁生用右研令勻湯浸蒸餅和丸如麻子大二三歲每服以橘皮湯下三丸萬靈丸出全嬰方治小兒疝氣偏墜京三稜濕紙裹煨茴香炒各一兩斑蝥一錢蛤粉炒去頭足右為末酒糊丸如小豆大三歲五丸茴香湯下食前常服漸退住藥牡丹散出濟生方治小兒卵腫偏墜用防風丹皮等分為末每服二錢溫酒調服鹽湯亦可又千金方取生白頭翁根三月上除日取者佳搗隨偏腫處傅一宿當作瘡二十日愈治隂㿗偏大又聖惠方治偏墜或氣攻小腹疼痛用蛇床仁末半兩馬鞭草汁一合相和如膏塗隂腫處效又本草治小兒偏墜服防葵丸令兒坐於土中午時灸卵下偏墜處七壯石燕子丸出楊氏家藏方治小兒啼哭躽氣不正動繫於隂偏墜腫脹小腹作痛木香檳榔各一錢石燕子二枚火炙醋淬七遍史君子肉一錢郁李仁一分湯浸去皮尖研如膏右件前四味為細末次入郁李仁同研勻煮麵糊為丸如黍米大每服十丸煎紫蘇陳橘皮湯送下乳食前金鈴散出楊氏家藏方治小兒隂核偏腫疼痛往來金鈴子一兩取肉微炒馬蘭花炒黃茴香炒黃蒔蘿三味各半兩右為細末每服一錢煎木瓜湯調下乳食空心服㿗疝附論夫小兒核氣結腫大者㿗疝也由稟受之月肝經虛弱因啼怒軀氣筋脈下墜繫於隂氣則筋脈緩縱結聚不散是為㿗疝也若氣偏虛則其腫亦偏蓋足厥隂肝之經環隂器抵少腹是動則為㿗疝少腹痛方狐隂丸治小兒隂㿗狐隂一具炙黃蜚生蟲十四枚炙微黃桂去粗皮附子炮裂去皮臍乾薑炮蒺藜子炒去刺細辛去苗各三分桃仁湯浸去皮尖雙仁炒别研卷柏各一兩半右為末煉蜜和丸如麻子大一二歲兒米飲下五丸空心日晚各一服量大小加減一方有消石亦作滑石昆布丸出聖惠方治小兒㿗疝攻注連腎外囊腫脹或疼痛偏墜昆布三分洗醎味蘹香子半兩微炒木香甘草炙微赤銼黃蘖銼丁香爛牡蠣生用銅青已上各一分右為末用熟棗肉為丸如麻子大每一二歲兒煎甘草湯下三丸量兒大小加減桃仁丸治小兒隂㿗日夜疼痛桃仁三分湯浸去皮尖雙仁微炒川大黃半兩銼微炒赤芍藥半兩防葵半兩半夏一分浸洗七遍去滑桂心一兩赤茯苓半兩川椒一分去目閉口者微炒去汗右為末煉蜜和丸如菉豆大每三歲兒食前以溫酒下五丸量兒大小虛實加減一方治小兒隂㿗氣疝發作無時者一方無桃仁防葵名芍藥丸白蒺藜散出聖惠方治小兒隂㿗不消白蒺藜半兩微炒去刺香豉半兩微炒鼠婦蟅蟲微炙川大黃銼微炙桂心細辛已上各一分右為細末一二歲兒每服以溫酒調下半錢早晚後各一服量兒大小加減薏苡仁散出聖惠方治小兒㿗疝薏苡仁芍藥土瓜根蛇床子微炒黃芩去黑心桔梗炒蛇含各三分右搗羅為散一二歲兒每服半錢匕空心溫酒調下日晚後再服量大小加減一方治小兒隂㿗腫硬或時疼痛無蛇含有地膚子木香散出聖惠方治小兒隂㿗腫脹木香白蒺藜微炒去刺地膚子昆布洗去醎味枳殼麵炒令黃去穰槐子已上各一分狐隂一具醋炙令焦黃右搗羅為末一二歲兒空心以粥飲調下半錢晚後再服量兒大小以意加減治小兒隂㿗腫大不消方出聖惠方硼砂一分右以水研化塗之立效治小兒隂㿗出聖惠方取莧菜根搗碎傅之立差馬鞭草傅亦佳萆麻丸治小兒㿗疝萆麻仁三十枚棘剛子去皮二十枚石燕子燒一枚滑石末二錢麝香研半錢右為末麵糊和丸如菉豆大每服五十丸空心煎燈心湯下魁蛤散出聖惠方治小兒隂㿗衆藥不效魁蛤三分細研狗隂一具炙令黃白术半兩桂心一分右搗羅為末一二歲兒每於空心以粥飲調下半錢晚後再服酒下量兒大小加減韭子丸治小兒隂㿗韭子炒二兩半附子炮製去皮臍三分狐隂一具炙黃右為末煉蜜和丸如麻子大一二歲兒每服五丸米飲下早晨夜卧各一服量兒大小加減三應散治小兒肝經虛弱筋脈緩縱氣脈下墜隂氣腫大久成㿗疝蘹香蟲一枚研汁膩粉二錢匕胡黃連末一分右同研令乾每服一字匕陳米飲調下不拘時滑石丸治小兒㿗疝腫鞭疼痛滑石碎澤蘭各二錢粉霜一錢續隨子去皮半兩右為末白麵糊和丸如菉豆大五歲以下五丸五歲以上七丸豆䓻酒下空心臨卧服土瓜根散出千金方治小兒氣㿗并隂㿗腫硬時復疼痛土瓜根赤芍藥當歸各一兩右㕮咀以水二升煎取一升服五合日二桂心散出千金方治小兒隂㿗腫硬桂心一兩地膚子一兩白术一兩右搗羅為細末三歲兒每服以溫酒調下半錢匕日三服量兒大小以意加減一方治小兒狐疝傷損生㿗以蜜為丸白酒服之亦可治大人治小兒㿗及隂㿗腫硬用蜥蜴二枚燒末酒服之一二歲服半錢早晚各一服量兒大小加減木通散治小兒㿗疝發作疼痛木通銼膽礬研各一分右研為散每服半錢匕米飲調下治小兒㿗疝腫痛偏墜或氣攻小腹疼痛用枳殼三兩微炒搗為散每用柏枝煎濃汁調厚塗兒囊腫處妙治小兒隂㿗日夜疼痛用蝟皮一箇燒存性研細卧熱酒調下一錢匕治小兒隂㿗隂㿗核大小也取杜父魚擘開口咬之七下此魚生溪澗下背有刺大頭開口長二三寸色黑班如吹砂而短也治小兒卵㿗用桃仁細研傅之諸蟲附論夫小兒有九蟲一曰伏蟲長四分二曰長蟲一名蛔蟲長一尺貫心則殺人三曰白蟲長一寸長至四五寸亦能殺人四曰肉蟲狀如爛杏令人煩滿五曰肺蟲狀如蠶令人嗽咳六曰胃蟲狀如蝦蟇令人嘔吐喜噦七曰弱蟲又名鬲蟲令人多唾八曰赤蟲狀如生肉令人腸鳴九曰蟯蟲狀如蝸蟲令人下部中癢九蟲之中三蟲最甚而為病之尤者莫如蛔由小兒氣血不調臟腑虛弱或食生冷或嗜肥甘胃中氣緩故生諸蟲者腸胃之間多則為癢劇則為㿗或因瘡瘍變成癰疽惡瘡又有寸白蟲者長一寸色白小𥚹因食生魚牛脂冷物或飲乳致生此蟲損人精氣令人心腹痛長若及一尺亦能殺人凡此諸蟲品類不可悉數皆可通以化蟲藥治之欲知蟲證者凡腹痛之脈當沈弦若反洪大者蛔也肘外垢聚甚者蟲也蟲痛者由兒三歲之後甘肥不節生冷過度食生粟炙肉魚生皆致生蟲其蟲因臟腑虛弱而動或食甘肥而動或胃冷而動或胃熱而動動則上下往來腹痛攻心㽱疼呌哭仰身揮手心神悶亂吐涎吐沫或吐清水飲食不成膚沉默默其蟲不療傷心害人保生云蛔蟲九蟲之數腹中皆有之小兒食乳而哺早或食甜過多胃虛蟲動令兒腹痛惡心口吐清水腹上青筋是其證也方烏梅丹出醫方妙選治小兒久痢蟲動及傷寒蛔厥並宜服之烏梅肉一百枚炒焦川黃連三兩乾薑二兩當歸洗焙乾二兩附子一兩炮製去皮臍細辛桂一兩刮去粗皮人參一兩去蘆頭蜀椒一兩揀去閉目雙仁者炒香熱出汗黃蘖一兩右為細末煉蜜和丸於石臼中搗一二百下丸如黍米大每服十粒米飲下量兒大小加減大蘆薈丸治疳殺蟲和胃止㵼胡黃連黃連白蕪荑去扇稱蘆薈木香青橘皮雷丸鶴虱微炒各半兩麝香研二分别入右為細末粟米飯丸如菉豆大米飲下一二十丸無時議曰小兒疳積蟲積皆由食肉太早脾胃本弱受之不磨癥傷不化何况更加以肥膩冷硬之物腸胃虛怯因積生蟲只有三種蛔苗胃也蛔多令兒喜食滋味肉脯之物腹肚緊脹心胸膨滿苗多令兒消瘦神困肚脹青筋疳氣漸盛腸鳴㵼臭食即嘔噦胃多令兒喜食酒肉食不生肌常作困道嗔脹脅煩躁迷悶眠不安席並宜服此其蟲自化盛用利下仍須調胃和氣助之下蟲丸出活幼口議治小兒多蛔蟲苗蟲食蟲疳蟲血蟲並宜服之鶴虱炒一錢光粉炒二錢膩粉三大錢匕史君子一百箇炒檳榔一錢生龍牙根二錢生貫衆子午卯酉日採取百方驗緑色者炒焦二錢龍膽根二錢苦楝根皮酒炙二錢右為細末水煮麵糊為丸如麻子大每服三五十丸空心食前甘草湯下或以豬肉清汁羮服之尤妙仍以調脾和胃佐之貫衆丸治小兒九蟲貫衆一兩一分去白蟲顴盧三兩去長蟲蕪荑去長蟲狼牙各一兩去胃蟲蜀漆去燒蟲雷丸一兩半去赤蟲白薑蠶去弱蟲厚朴去粗皮生薑汁炒去肺蟲石蜜去蛔蟲各三分右為末煉白蜜和丸如麻子大每服量兒大小加減四五歲以苦酒漿下五丸空腹服之以知為度未知稍加至十丸治小兒香煎丸治小兒蟲動腹啼呌口吐涎沫乳香沉香各一錢肉豆䓻一箇煨百草霜木香丁香各一錢巴豆一十四粒出油如霜右為末煮酒封頭蠟和丸如菉豆大每服三五丸淡生薑湯送下如患肚痛不止服之大效常服以通為度又云此方加沉乳二香藥即名感應丸宜療小兒虛中積證冷積癥積疳積食積脾氣乳積盤腸蟲痛及胃久虛臟腑中脘不和痞氣鬱結或㵼或痢或嘔或噦腹肚疼痛兒體虛嬴不堪動轉者並與服之此方比珍珠丸等取積大不同只恐服此未能通利若已通利誠為之幸如胃仍虛當以和脾生胃之藥斟酌用之一方釣藤湯下凡用藥下蟲須在月初蟲頭向上可下仍須空心凌早下後以和胃藥調之史君子餅治因喫食粗肉肥甘生熱肌瘦體虛口吐清涎唇間紫色腹中絞痛口鼻中出黑色蟲不治史君子四十箇去殼雷丸半兩定粉二分輕粉半錢青箱子鶴虱各一分右為末用雞鴨卵和蒸為餅先將此藥隔日夜五更服後蔥湯丸取下化蟲丸治小兒好食炭土不長肌膚五心煩熱鼻赤齒搖蕪荑黃連神麯麥蘖烏梅已上各微炒陳皮去白各等分右為末麯糊丸黍米大空心米飲肥豬汁尤佳量兒大小下一二十丸白蘚皮丸治小兒諸蟲大啼時作心腹脹白蘚皮半兩苦楝根半兩鶴虱炒半兩定粉青橘皮湯浸去白焙半兩石灰一分右為細末麵糊和丸如菉豆大每服十丸煎史君子湯下不拘時候奪命丹治小兒蟲動不止攻心危困狼牙草扁竹苦參各一兩雷丸鶴虱㨂淨薏苡仁各半兩右為細末糯米飯和丸如黍米大每服十粒取生地黃汁下量兒大小加減棕櫚散治小兒痔疾皆由勞傷過度損動血氣其裏有蟲甚細棕櫚一兩燒灰荆芥一兩去枝梗側柏一兩炙黃牛膝半兩枳殼半兩黃耆半兩右為細末每服半錢米飲調下乳食前遣蟲丸治小兒蟲動腹動啼呌口吐涎沫檳榔蕪荑雷丸定粉鶴虱炒各等分右為末煎苦楝根湯和丸如小豆大每服三十丸煎史君子湯送下食前又云如蟲攻下部燒艾煙熏安蟲散治小兒喫物粗肌膚消瘦蟲生腹內極痛不可忍者終日啼哭或平時哺食甘肥油膩不知莭省或因臟腑虛弱而動或因食甘肥而動其動則腹中疼痛發作腫聚往來上下痛無休止亦攻心痛呌哭合眼仰身撲手心神悶亂嘔噦涎沫吐清水四肢羸困面色青共黃飲食進不生肌膚或寒或熱沉沉默默不的知病之去處其蟲不療則子母相生無有休止長一尺則能害人及治蟲咬心痛來去不定不思乳食一名化蟲丸一名鶴虱散真胡粉炒檳榔川楝子肉炒去核一方用苦楝根去浮皮鶴虱炒各二兩白礬二錢半生用右為末米飲調痛時及空心服之或以麵糊為丸如麻子大一歲兒服五丸溫漿水入生清油一二點打勻下溫米飲下亦得不拘時候其蟲細小者皆化為水大者自下一方化蟲丹月初服尤妙化蟲散雷丸二錢史君子十箇鶴虱一錢生大黃一錢甘草一錢右為末肉汁調服千金散治小兒疳蛔動心痛面伏地卧口吐清水痰涎白檳榔銼一錢紫楝根銼石榴根皮銼鶴虱炒令煙出蘆薈研各半兩右為散空心熱茶調下一錢匕更看小兒大小加減一方無蘆薈用生乾地黃一方忌餳糖黏滑食化蟲丸治小兒寒熱傷脾蟲痛㵼青黑色減乳食木香一分檳榔炒二枚胡粉苦楝根鶴虱炒各二分右為末麵糊丸如麻子大一二歲兒每服十丸溫粥飲下日二差即止鶴虱散治小兒蟲痛面好伏地口吐清水鶴虱炒苦楝根各一分檳榔銼一枚牽牛子炒一分史君子去皮十枚右為散每服半錢匕米飲調下檳榔散治蟲痛檳榔貫衆石菖蒲木香甘草各一兩右㕮咀用水一盞煎服黑金散出醫方妙選治小兒蟲煩預先服之得眠睡為驗乾漆二兩肉桂一兩草豆䓻半兩石榴根半兩精明雄黃半兩水磨者右於瓦器中燒存性搗羅為末乳鉢內研極細每服一字至半錢研入麝香少許煎粟米調下量兒大小加減補胃膏出醫方妙選治小兒腹痛不可忍者㵼利蟲煩髙良薑一兩微炮肉桂一兩刮去皮肉豆䓻半兩乾漆半兩燒存性烏梅肉半兩炒乾右為末煉蜜丸如雞頭子大每服一粒至二粒米飲化下乳食前一方有白术無烏梅肉麵糊丸如粒米大蝟皮散出醫方妙選治小兒痔疾皆由勞傷過度損動血氣其裏有蟲甚細蝟皮一兩燒灰鱉甲一兩塗醋炙黃去裙襴蛇蛻皮一兩燒灰露蜂房半兩微炒麝香一錢右為末每服半錢米飲調下量兒大小加減香雷散出醫方妙選治小兒諸蟲動啼呌不止雷丸鶴虱苦楝根淡蕪荑各半兩右為末每服一字至半錢用生精豬肉汁調下食前服勝金丸治小兒疳蟲痛取效龍膽定粉研黃連去鬚烏梅肉炒各等分右為末煉蜜丸如麻子大每十丸米泔下檳榔散治小兒蟲痛頻發面青嘔吐冷痰漸漸肌瘦檳榔銼一枚酸石榴皮銼苦楝根銼陳橘皮湯浸去白焙各一分右為散每服半錢匕米飲調下食前服赤石脂丸治小兒胃虛蟲動赤石脂細研二錢肉豆䓻燒存性二枚橡實五枚莨菪子淘去浮土五枚右為橡實并莨菪一處炒令黑色與赤石脂豆䓻同搗羅為末入蟾酥少許用麵糊丸如黃米大每服五丸米飲下蟲痛煎苦楝根湯下小兒㵼泄頻服良乾漆散永類鈴方專治小兒疳蟲腹痛乾漆炒煙出一錢史君子取肉十四枚楝木皮東邊皮厚者暴乾去粗皮一兩蕪荑一錢半右為末每服一字二三歲半錢四五歲一錢砂糖熟水調下一日三服化蟲丸出楊氏家藏治因疳生蟲五心煩熱蕪荑炒黃連炒去蘆神麯炒麥蘖炒去芽各等分右為末麵糊丸如黍米大空心米湯下一方用豬膽汁麵糊為丸米飲下肥豬肉汁尤佳黃金散出醫方妙選治小兒吐痢腹蟲動者乾漆一兩白蕪荑肉豆䓻各半兩精明雄黃三分細研右研細每服半錢蔥白湯入生油一點同調下須調令勻熟藥冷即再溫動乳前服安蟲丸一名川楝九出錢氏方治上中二焦虛或胃氣蟲咬心動及痛乾漆三分折碎炒煙出盡雄黃一分巴豆霜一錢右為細末麵糊丸黍米大看小兒大小與服取東引石榴根煎湯下痛者煎苦楝根湯下或蕪荑湯下五七丸至二三十丸發時服萬安散治小兒疳渴蟲動心痛蝦蟇蛇蛻皮蟬殼各等分燒右為散用麝香半錢同研每服一字匕日午溫水調下午後煎柳枝湯浴用青紗帛子蓋之其蟲自出蕪荑散出聖惠方治小兒寸白蟲蛔蟲動作多吐清水白蕪荑一兩半狼牙草一兩白蘝半兩右為散每服半錢匕以苦酒二合空心調服立差化蟲散治小兒蟲痛不可忍白丁香一錢檳榔銼一枚雷丸一錢右為散每服一字或半錢匕米飲調下嬭食後服滴金丸治小兒蟲動心腹痛雄黃麝香各半錢白礬三錢右為末粟米飯和丸如麻子大每服五丸煎苦楝湯下化蟲丸治小兒疳蟲㽱刺腹痛及蛔蟲常服化其蟲去根蕪荑一分檳榔銼二錢鶴虱炒半兩右為末獖豬膽丸如麻子大每服五丸七歲十丸陳米飲吞下一日三服治小兒三蟲出千金方雷丸芎藭各等分右為末每服一錢匕日三蕪荑散出全嬰方治上中二焦虛或胃寒蟲動及痛小兒蟲咬心痛面青唇紫口吐涎沫可食白蕪荑去皮稱乾漆各等分右為細末每服一字半錢或一錢米飲調下發時服靈白散一名靈礬散出醫方集成治蟲咬心痛欲絶五靈脂二錢白礬枯半錢右研勻每服一二錢水一盞煎至半盞溫服當吐出蟲為效史君子餅出經驗良方取疳蛔蟲史君子鸕鷀糞各等分右為末雞子一箇打破併藥為餅蒸熟五更初食其蟲立可出麝香散治小兒諸蟲及一切疳蟲麝香研一分夜明砂一兩右為末每服半錢匕蔥白湯調下楝實散治小兒蟲痛楝實雞糞等分右為散每服半錢匕冷水調下治蟲方出經驗良方用乾漆一兩搗碎炒令煙盡出油用新汲水入生麻油空心吞下一方調下一字不過三服當取下蟲即差治小兒疳蟲取羊蹄葉作菜食之良亦解胡夷魚鮭魚鱣魚之毒治小兒因喫食粗肥甘生熱肌瘦體虛口吐清涎唇間紫色腹中絞痛口鼻中出黑色蟲不治用四君子湯每服二錢苦楝根少許煎湯調服治小兒蟲證腹痛啼哭如口角青者蟲證也抱起稍止卧之則大啼蓋卧則蟲攻上起則蟲攻下故也出經驗良方以平胃散加生硫黃一粒如小指大煎服痛即止又方用白蕪荑檳榔各一兩蒸餅為丸每服二十丸熟水下治小兒蟲出經驗良方用石榴皮桑白皮椿皮苦楝根皮等分為末水煎服治小兒諸蟲疼痛不止者以史君子火煨為末以殼煎湯送下宜於月初四五間服之其蟲自下化蟲丸出仁存方鶴虱去土胡粉檳榔白礬半生半枯苦楝根各半兩蕪荑黃連酸石榴皮各一分右為末以麵糊丸如麻子大一歲兒三丸漿水入香油三五滴下其蟲小者化為水大者自下加雷丸或用豬瘦肉湯下亦可化蟲丸出直指方治蟲痛蕪荑川鶴虱雞心檳榔乾蝦蟇炙焦各一分蘆薈右為末雄豬膽汁為丸麻子大每服五丸陳皮飲下或史君子煎湯送下凡蟲月首則頭向上凌晨可服藥人參湯治小兒疳蟲咬心痛不時日夜不睡人參桂去粗皮桃柳枝銼焙狼牙乳香研青橘皮去白焙炒吳茱萸湯浸焙炒各一兩古老錢四文火煆右粗搗篩每服一錢水六分煎至四分去滓溫服量兒大小加減服之楝根湯治小兒蛔蟲攻心痛楝根皮有子者酸石榴根槐根各一握切碎用東引者右以水三盞煎取一盞去滓空心頓服以藥盞合之即㵼蟲出仰之即吐蟲出神驗量兒大小加減夏少保傳經驗蟲動痛極不可忍方用乾漆半兩檳榔一箇生用窑老一塊再煆細研三件一處為末空心熱酒服良久取下少保門子之兒十歲心痛危亟服藥不痊遂用此方取下蟲即愈化蟲丸治小兒脾胃虛弱面黃肌瘦或大便有蟲出或有諸蟲腹內作痛並宜服之乾漆炒煙盡二錢半雄黃另研水飛二錢半蕪荑另研極細狗脊銼各二錢巴豆霜一錢右先將乾漆狗脊為細末次入雄黃蕪荑巴豆霜同研勻水麵糊為丸一二歲兒如粟米大每服五七丸三四歲如麻子大每服七八丸乳汁送下或煎石榴湯送下或煎蕪荑湯送下更效日進二服如有蟲即時化作濃水便下大效抵聖散治小兒殺蟲定疼痛苦楝二兩白蕪荑半兩右為末水一盞藥末一錢煎取二分放冷待發時服之雄麝散治小兒蟲動心腹撮痛口吐涎沫乾漆炒青煙出史君子炮去殼各三錢雄黃半兩别研麝香一錢别研右為細末每服半錢煎苦楝根湯下史君子散治小兒飲食不調恣食肥膩蟲作㽱痛唇青白嘔吐涎沫發渴往來宜服此藥取蟲史君子二十枚炮去殼蕪荑别研半兩檳榔一錢大腹子二枚右件為細末次入蕪荑仁同研勻每服一錢至二錢煮豬肉湯下香蘇散治諸蟲腹痛疳食氣積肚緊痞氣紫蘇香附各二兩陳皮製一兩甘草炙半兩右㕮咀薑䓤煎熱服內加川芎白芷名芎芷香蘇散內加三稜莪术丁香史君子苦楝根皮名君子香蘇散治小兒蟲氣痛內加木瓜檳榔蘇木烏藥羌活蒼术名行氣散多加大黃治腳氣茴香丸治蟲積氣痛陳皮茱萸三稜莪术丁香枳殼炒茴香炒檳榔炒去巴神麯麥芽史君子一百箇右為末醋糊為丸菉豆大空心飯飲吞下或薑湯吞下亦可小青木香丸治蟲痛氣刺腹肚疳積盤腸一切等候並宜服此藥青木香鹽炒胡椒白薑烏梅茴香炒右等分為末用湯浸烏梅肉煨大蒜共搗爛和每服二三十粒空心陳皮湯下取蟲立效丸史君子三錢檳榔半錢輕粉二字右為末入煎雞子餅少許爛飯數粒搗成丸輕粉為衣每服四五十丸五更初肉湯吞下後進宣藥殺蟲神妙丸苦楝根皮握下二三寸炒川楝子石榴皮史君子蕪荑仁炒檳榔鉛錫灰輕粉莪术巴豆去心膜油三稜青皮􅀈子蛤粉雞子黃一枚右等分為末醋糊為丸如麻子大每服用二三十丸空心煎桃柳條湯下或五更用茶清肉湯連進三兩服立通有效治小兒大腹殺蟲用苦耽苗子煮汁服亦生搗絞汁服蛔蟲附論夫蛔蟲九蟲之內一蟲也長一尺亦有長五六寸者或因臟腑虛弱而動或食甘肥而動其動則腹中痛發作積聚往來上下痛有休止亦致心痛口多吐涎及清水貫傷心者死凡小兒有蟲火煨史君子與食以殼煎湯送下甚妙人多於臨卧服又無日分多不效唯於月初四初五間五更服之至日午前蟲盡下乃以和胃溫平藥一二服調理或有蟲痛發作似癎但目不舒手不搐唯只心痛也蛔蟲長此證候作與脾氣冷積虛積大抵相似然小兒腹肚緊脹天明呌喚吐津沫要羮肉喫方小安乃蛔蟲候脾氣多噎逆飲食不下虛中有積腹緊弔痛冷積脹緊膨滿心腹不任坐卧兩脅心膈上下攻刺疼痛脹先與下蟲丸殺蟲其蟲困次與晶丸推下餘證各與調胃藥服却推下積宜服小沉香煎丸又云小兒疳積蟲積皆由食肉太早脾胃本弱受之不磨癥傷不化何况更加肥膩冷硬之物腸胃虛怯因積生蟲只有三種蛔苗胃也蛔多令兒喜食滋味肉脯之物腹肚緊脹心胸膨滿苗多令兒消瘦神困肚脹青筋疳氣漸盛腸鳴㵼臭食即嘔噦胃多令兒喜食酒肉食不生肥常作困頓腹脅脹煩躁迷悶眠不安席並宜服此其蟲自化蛔蟲痛面白無光心腹痛口中沫及清水出發痛有時安蟲散主之小兒本怯者多此病積痛食痛虛痛大同小異惟蟲痛者當口淡而沫自出辛氏女年五歲病蟲痛諸醫以巴漆硇砂之屬治之不效至五日外多哭而俯仰卧不安自按心腹時大呌面無正色或青或黃或白或黑目無光睛慢唇白吐沫至六日胸髙而卧不安錢詳而視之用蕪荑散三服見目不除青白色大驚曰此病大困若更加瀉則為逆至次日錢見辛曰夜來三更而瀉錢於瀉盆中看如藥以杖攬之見有藥丸錢曰此子肌厚當氣富今證反虛不可治也何以然師曰脾虛胃冷則蟲動今反目青此肝乘脾虛脾加瀉知其氣極虛也而丸藥隨糞下即脾胃已脫無形病又相應故知死病後五日危篤七日而死決矣方檳榔丸治蛔厥腹痛其證愁啼乾痛吐清涎人中唇鼻皆烏視之蛔厥多似慢驚但唇紫耳雞心檳榔鶴虱貫衆蕪荑川楝肉史君子肉雷丸雄黃乾漆存性輕粉巴豆去殼油木香黃丹煅錫灰炒不見星如灰各等分右為末酒煮麵糊丸以用五更豬肉蔥油煎臠細嚼莫吞蟲頭向上便用肉汁調化蟲散吞下檳榔丸至已時取下蟲方可飲食化蟲散見諸蟲類史君子散治小兒蛔蟲史君子蘆薈研乾楝皮檳榔銼蕪荑各三兩肉豆䓻去殼丁香苦參各二兩膩粉右為散每服一字匕空心飯飲調下療小兒蛔蟲出本草取萹蓄煮汁令濃飲之即差治小兒蛔蟲出本草以莢蒾樹枝煮汁和作粥甚美以飼兒能殺蛔蟲尤妙青箱子散出聖惠方治小兒蛔蟲發作心痛多吐青箱子苦參銼黃連去鬚萹竹狼牙草已上各三分雷丸一兩雄黃半兩細研桃仁一兩浸去皮尖雙仁麵炒微黃右為細散一二歲無時以稀粥飲調下半錢兒稍大以意加之若下部癢綿褁少許內之日二度如不癢即勿用槐耳湯治蛔心痛取槐樹上木耳燒作灰痛發棗肉碾和水調服備急散出聖惠方治小兒蛔蟲㽱刺心腹疼痛及蛔蟲嚙心腹痛用鶴虱一兩搗細羅為散每服煎肥豬肉汁調下半錢其蟲便出量兒大小以意加減治小兒蛔蟲咬心痛亦治蛔蟲薏苡根二兩去土銼右以水一大盞煎取半錢去滓一二歲兒每服一合三四歲至五六歲兒二合空心服之隨大小以意加減一方煮汁作糜食之甚香大效桃仁散出聖惠方治小兒蛔蟲咬心痛桃仁湯浸去皮尖雙仁麵炒木香狗脊白蕪荑狼牙草苦楝根皮銼鶴虱檳榔右為細散三歲兒每服煎苦楝根皮湯調下半錢日三四服量兒大小臨時加減木香桃仁丹出醫方妙選治小兒蛔蟲攻心痛不可忍木香一兩桃仁一兩湯浸去皮尖雙仁麵炒香熟檳榔一分黑狗脊一兩鶴虱一兩揀淨苦楝根皮半兩右為細末豚豬膽汁和丸黍米大每服十粒點麝香湯下不拘時候三根散出醫方妙選治蛔蟲動啼呌不止每至月初間尤甚狀如神祟貫衆根棠梨根醋石榴皮各一兩栗刺故綿乾漆各半兩已上各燒灰存性右為末每一錢用水八分煎四分去滓溫服不拘時候苦楝根散出聖惠方治小兒腹臟有蛔蟲苦楝根鶴虱薏苡根銼檳榔糯米微炒牽牛子微炒已上各一兩右搗為細散三歲每服以粥飲調下半錢日三服看兒大小臨時加減檳榔散出聖惠方治小兒蛔蟲咬心檳榔三分狼牙草一分醋石榴皮三分赤芍藥川朴硝各半兩右搗為粗散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減服貫衆散出聖惠方治小兒蛔蟲攢心合眼撲手心悶貫衆狗脊狼牙草萆薢銼各一兩右為粗散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減溫服胡粉丸出聖惠方治小兒腹內有蛔蟲時時㽱痛胡粉三分豶豬膽三枚麝香牛黃各一分右研為細末用膽汁浸蒸餅和丸如菉豆大五歲兒每服以溫水下七丸看小兒大小以意加減下蟲檳榔散出聖惠方治小兒蛔蟲攻臟腑㽱痛檳榔半兩苦楝根皮半兩銼麝香一錢細研東引石榴枝皮半兩銼右搗細羅為散入研了藥令勻五歲兒每服以熱茶調下半錢量兒大小以意加減蕪荑散治小兒蛔蟲咬心痛等積乾漆炒煙盡一兩雷丸蕪荑各半兩右為末溫酒調服鶴虱散出聖惠方治小兒多吐蛔蟲鶴虱一分川大黃一分銼微炒川朴硝右為粗散都以水一大盞煎至七分去滓三歲溫服半合日三服量兒大小以意加減麝香散出聖惠方治小兒蛔蟲咬心或吐清水麝香一錢研入萆薢一兩銼苦楝根一兩銼右搗為細散以豶豬膽三枚取汁和令勻曝乾後却研為末每服以蕪荑湯調下半錢量兒大小以意加減化蟲乾漆丸出聖惠方治小兒蛔蟲咬心㽱痛四肢逆冷乾嘔不吐面色青宜服此藥乾漆二錢膽子礬一錢右搗羅為末用蔥白湯煮麵糊和丸如麻子大二三歲兒以石榴皮湯下二丸日三服三四歲三丸又方乾漆炒煙出一兩雄黃二兩右為細散每服半錢匕油一點溫水調下量兒大小以意加減又方胡粉一分膩粉半兩右細研令勻五歲每服以粥飲調下半錢量兒大小以意加減若用羊子肝一具煮熟切以藥末拌和與兒食之更佳治小兒蛔蟲攻臟腑㽱痛出聖惠方醋石榴根半兩入土五寸東引者檳榔一枚右切碎以水一大盞煎取七分去滓入粟米半合煮稀粥空心與食蟲下更利量兒大小加減服之治小兒蛔蟲出千金方削楝木上蒼皮以水煮取下汁飲之量兒大小加減一方以根白皮煮服之亦治蛔蟲用半兩一方不用蒼皮治小兒羸瘦有蛔蟲出千金方用雚蘆二兩以水一升米二合煮取米熟出滓服之又方出千金方桃白皮三兩東引吳茱萸根白皮四兩右㕮咀以酒一升二合漬之一宿漸服取瘥為度又方出千金方取豬膏服之亦治蟯蟲亦云煉臘月豬脂每日空心取如皂莢子大服之亦良又方出千金方搗槐子用少許內下部中瘥亦治蟯蟲又方出千金方棟實一枚內孔中亦治蟯蟲一方云為末用少許內下部中殺蛔蟲方取鼹鼠小兒食之良治孩兒蛔蟲定疼痛用葶􅐗子一分生為末以水三合煎取一合一日服盡治小兒蛔蟲痔疾用瞿麥葉煎湯服之榴枝飲治蛔蟲方出千金方用石榴枝東行根一把水煮服之亦治寸白蟲大驗治小兒蛔蟲定疼痛用石竹葉煎湯服之又方用繅絲湯一盞服之此繅絲湯係煮繭汁為其殺蟲故也蟯蟲附論夫小兒蟯蟲者是九蟲之內一蟲也形甚細小如今之蝸蟲狀亦因臟腑虛弱而致發甚者則成痔瘻瘑疥也方胡粉丹出醫方妙選治小兒蟯蟲發動甚者成痔瘻瘑疥青州大棗五十箇蒸熟取肉水銀半兩胡粉一兩雄黃半兩水磨飛研右拌勻與水銀一處拌勻用棗肉和如黍米大每服一粒苦楝根煎湯下量兒大小加減治小兒蟯蟲蝕下部出聖惠方槐根白皮一兩銼桃仁一兩湯浸去皮尖雙仁生研苦楝子一兩右搗羅為末以豬膏和丸如棗核大內下部中更以蔥白兩莖去鬚水煮濃汁溫飲半合治小兒蟯蟲攻下部癢出聖惠方用萹蓄葉一握以水一升煎取五合去滓空心飲之蟲即下用其汁煮粥亦佳一方搗汁服並差大棗膏出聖惠方治小兒蟯蟲蝕下部中癢蒸大棗二枚取肉水銀半兩右藥都研令水銀星盡捻為挺子長一寸以綿褁宿內下部中明旦出蟲為效胡粉散出聖惠方治小兒蟯蟲蝕下部胡粉一分雄黃一分右藥都研令細每用少許傅下部中治小兒蟯蟲用桃葉一兩搗絞取汁空腹服半合亦治寸白蟲治小兒蟯蟲蝕下部出聖惠方杏仁一兩湯浸去皮尖雙仁麩炒微黃右研如膏以綿褁棗核大內下部中甚者不過三度差寸白蟲附論夫小兒寸白者是九蟲內之一蟲也長一寸而色白形小褊小兒多因甘肥不節生冷過度之所致也其蟲發動則傷人臟腑飲食不成肌膚子母相生無有休止若蟲長一尺則能害人也方碧金散出危氏方治寸白蟲蛔蟲苦楝根一兩鶴虱半兩檳榔半兩豬牙皂角三錠燒灰史君子仁半兩各搗羅為末好青黛半兩麝香一分右研勻每服一字用淡豬肉湯調下一方無史君子仁除根散出經驗良方治寸白蟲川楝子去皮檳榔各一錢輕粉一字蕪荑一錢黃丹二錢右為末作一服取石榴根煎酒調下以五更初服先用熟豬肉嚼取汁喫却服前藥如同喫則令人嘔吐青黛散治小兒寸白蟲連年不除面無顏色體瘦少力出聖惠方青黛一分苦楝根一兩微炙赤銼鶴虱一分檳榔一枚右為細末每服時先喫湯肉脯少許後以粥飲調下半錢量兒大小加減服之日二三服治小兒寸白蟲久不愈出聖惠方鶴虱三分雷丸三分史君子三分巴豆十枚去心皮研紙褁壓去油右搗羅為末以糯米飯和丸如菉豆大每服以沙糖水下三丸量兒大小加減服之治小兒寸白蟲連年不除面無顏色體瘦無力出聖惠方硃砂一錢麝香一錢苦楝子肉一兩糯米拌炒以米熟為度右研令細以水浸蒸餅和丸如芥子大每服於空腹服春夏冷水秋冬熱水下七丸量兒大小加減服之檳榔散出聖惠方治小兒寸白蟲久不愈檳榔三枚為末豬牙皂角三挺燒苦楝子五枚為末右為散每服空心煎苦楝根白皮湯調下半錢三兩服後蟲皆出自下量兒大小加減服之榴枝飲治寸白蟲方見蛔蟲類桃葉飲出千金方治寸白蟲方見蟯蟲類下寸白蟲用雷丸水浸去皮切焙乾為末於五更初先食炙肉少許便以一錢匕藥稀粥調半錢服之日久其蟲自下立應散一名必效散出經驗良方治寸白蟲久不下漸羸瘦用雞心檳榔一箇為末以熟精豬肉四兩不用鹽醋只以酒淹切作薄片和檳榔末嚼肉下五更時以東行石榴根濃煎汁咽下大人小兒皆可服普濟方卷三百九十九
