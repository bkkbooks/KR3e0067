body:
  text: 普濟方卷二百九十五明周王朱橚撰痔漏門諸痔附論夫内經謂因而飽食筋脉横解腸澼為痔夫痔病之候亦多矣此獨舉飽食一端者葢飲食人之大欲存焉推此則它可觸類而知也五痔者一曰牡痔二曰牝痔三曰脉痔四曰腸痔五曰血痔肛邉發露肉珠狀如䑕乳時時滴清膿血曰牡痔肛邉生瘡腫痛突出一枚類口膿潰即散曰牝痔膓口顆顆發㿔且痛且痒水血淋瀝曰脉痔腸内結核有血寒熱往來登溷脫肛曰腸痔若血痔則每遇大便清血隨下而不止若酒痔每遇飲酒發動瘡腫而血流若氣痔則憂恐欝怒適臨乎前立見腫痛大便難強力則肛出而不收治法大抵以解熱調血順氣先之葢熱則血傷血傷則經滯經滯則氣不能行氣與血俱滯乗而墜入大腸此其所以為痔也諸痔出血肛門間别有小竅下如血線不與便物共道痔久不愈必至穿穴瘡口不合漏無已時此則變而為漏矣葢膓風臓毒之與痔漏同出而異名也嵗積月累滛蝕腸頭濕爛可畏此蟲為之害也其間執劑又當為治蟲也又有腸風痔脉痔雌雄痔皆五痔之别名也其状初生悉在肛邉或如䑕乳結小核痒痛注悶甚者身熱惡寒諸方論之皆因房酒過度久嗜甘肥不慎醉飽以合隂陽擾血脉腸癖㵕漏衝注下部肛邉生瘡變為痔疾治法如覺痔作便服通氣丸槐角丸熱食者服諸利湯踈利藏腑及浴洗熏熨以取内消切忌酒麵辛熱房室肥膩稍存縱嗜欲腐潰膿血或逗流滛汁嵗月已深穿穴成漏即湏用寸金錠子三五次痊也其次服餌調節謹慎合宜未有不差者矣方治崩中及痔方出千金方蝟皮人參茯苓白芷禹餘糧乾地黄槐耳續斷各三兩蒲黄黄蓍當歸艾葉橘皮白歛甘草各兩白馬蹄酒浸一次炙令黄牛角腮各四兩鰻鱺魚頭二十枝猪蹄懸甲二十一枝炙右為末蜜丸梧子大酒服二十丸日再稍加鹿茸丸聖濟緫錄治諸痔漏牡痔脉痔膓痔血痔等鹿茸酒浸炙令黄附子炮裂去皮臍龍骨碎研黄蓍炙剉桔梗炒生乾地黄牛膝去苗酒浸焙芍藥人參白茯苓去黒皮各一兩一分枳殻去瓤麩炒當歸切焙蝟皮炙焦芎藭槐子㣲炒白礬煆火令升盡桂去皮三分黄連去鬚各一兩半蒲黄炒一兩右為末煉蜜丸梧子大每服三十丸空心煎柏葉湯下日晚再服神效散治洗痔凡富貴之人多嗜慾酒色過度喜怒不常致生痔漏或如䑕乳連珠或糞門膓頭腫流膿漏血其痛如割不可忍者但是諸種瘡痔漏及膓風漏血此藥治之苦參川椒苦葫蘆鮮荽子槐花枳殻荆芥金銀花小茴香白芷連翹獨活麻黄牡蠣煆威靈仙椿樹皮各二兩加老黄茄子二箇油炒右㕮咀每服五錢水六七碗葱白二枝煎五七服沸去渣以盆盛藥水上坐先蒸後洗却以烏龍膏貼之卧時用再以藥渣熬水如前洗之如此三五次夜則以膏藥貼之常服葛花酒蒸香連丸多有驗槐子丸聖濟緫録治燥濕痔痔有雌雄皆主之方方見本門久痔類槐實丸千金方治五種痔疾方槐實一兩黄蓍枳實麩炒貫衆白术肉豆冦仁防風去叉荆芥穂樗莢去皮炒紫色苦參厚朴麝香芎藭皂角子黄炒各半兩右擣羅為末麵糊調丸如桐子大食前米飲下三十九丸晚再服之蝟皮丸直指方治諸痔出血裏急疼痛槐花㣲炒艾葉炒黄枳殻製地榆當歸川芎黄蓍白芍藥白礬煆貫衆各半兩蝟皮一兩炙焦頭髪燒三錢各存性猪後蹄垂甲盈尺皂角一挺去弦核醋炙黄右件藥搗羅為末煉蜜丸如桐子大每服五十九丸未食前飲下療五痔下血不止方槐子五色龍骨槲葉炙令紫色乾薑芎窮當歸蒨根吳茱茰各六分白歛附子炮五分黄蓍五分大黄猪懸蹄甲十四枚炙髪灰四分右搗末蜜丸空腹服如桐子大二十丸日二漸加至四十丸若恐多服以意減之忌生冷炙猪魚蒜黄蓍丸療痔黄蓍青葙子漏蘆鱉甲炙狼牙各五分黄蘖四分猪懸蹄甲七枚炙蝟皮四分炙白礬十分燒存性芫青去足翅斑蝥去足翅炒蜈蚣各十條炒犀角屑八分右為末蜜丸梧子大空腹以飲服二丸日二増之以知為度忌一切油膩莧菜治五痔衆醫者所不能愈者秦芁白芷厚朴紫參乳髪紫苑各一兩雷丸藁本各二兩石南䗪蟲各半兩貫衆三兩蝱蟲半兩猪後懸蹄十四枚右為末以羊髓脂煎和丸桐子大每服空腹米飲下十五丸日二服若劇者夜一服四日後覺肛邉痒則止八日後膿血出䑕乳悉瘥滿六十日則終身不復發能久服益喜忌魚猪肉等物收痔丸直指方諸痔通用阿膠炒酥黄連貫衆各半兩盈尺皂角去核醋炙蝟皮炙焦蜂房炒焦蛇皮畧燒皂角刺畧燒穿山甲揷入熱久灰中令焦猪後蹄甲燒已上各存性當歸川芎槐花並用二錢半右為末米醋糊丸桐子大每服七十丸調氣用枳殻散下消血熱荆芥煎湯下食前服立聖丸聖濟總録治五痔及腸風下血槐花枳殻去瓤麩炒二兩半五倍子去灰土黄蓍蜜炙切槐莢各二兩猪蹄垂甲二十枚以上並各炒焦除令净木賊二兩半何首烏米泔浸軟以竹刀切作片子焙乾扵石臼内搗末秤和入諸藥臭橘一百枚刺蝟皮皂莢針四兩榼藤子二枚炒上四味各用蔵瓶一枚成用塩泥固濟各届一穴出烟以灰火燒守候逐件烟盡退火各放冷取出研細皂子各三兩右為末蜜丸桐子大每服五十丸至百丸温酒空心服烏蛇散聖濟總錄治諸痔大膓下血烏蛇去皮肉骨酒浸炙蝟皮酒浸炙各五錢槐子炒天麻黄蓍桑皮酒炙枳殻桂去皮附子炮裂去皮臍當歸焙赤芍藥炙各三兩白礬燒半兩麝香研二錢右為散空心陳米飲調下二錢匕日晚再服温酒亦得蝟皮丸聖恵方治五痔下血疼痛裡急不可忍蝟皮一兩炙令焦黄槐子仁二兩㣲炒龍骨二兩槲葉一兩㣲炒乾薑半兩炮裂剉熟地黄乾一兩當歸一兩㣲炒茜根附子用裂炮一兩去皮臍芎藭半兩梹榔一兩黄蓍一兩剉吴茱茰半兩湯浸七遍焙乾為末右為末蜜丸如桐子大每食前以粥飲下三十丸至四十丸日三治痔腫硬發歇疼痛久不瘥宜服此方聖恵方雷丸一兩紫參半兩當歸一兩白芷半兩槐子仁一兩微炒亂髪一兩燒灰貫衆三兩黄蓍一兩剉䗪蟲一分炒微黄石南三分蝱蟲一分去翅足炒令微黄藁本一兩猪後懸蹄甲七枚炙令黄焦右為末蜜丸如桐子大每服食前以粥飲下三十丸釣腸丸危氏方治久新諸痔肛邉腫硬或生瘡痒時有膿血又治腸風下血及肛門脫出並宜服之亦治男子婦人下血栝蔞二枚燒存性蝟皮二箇碎剉爐内燒存性雞冠花剉微炒五兩白礬㣲枯緑礬枯白附子生用天南星生用枳殻去瓤麩炒附子去皮臍生用訶子煨去皮各二兩半夏二兩胡桃取仁十五兩燒存性不油者入礶内右為末以醋糊丸桐子大每服二十丸空心臨卧温酒下逺年不瘥者服十日見效久服永除根本并除膓風等疾一方用鷄肉無胡桃槐子丸出聖恵方治五痔下血痛不止槐實龍骨去土研槲葉乾薑炮當歸剉炒茜根黄蓍剉炒吴茱茰湯洗焙乾炒各一兩半附子炮裂去皮臍一兩一分大黄蒸三度炒二兩半猪懸蹄十四枚炙右為末蜜丸如桐子大每服空心米飲下二十丸日二服治五痔下血不止衆治無效宜服此方出聖恵方石南一兩半槐實一兩半㣲炒黄蓍一兩半貫衆一兩㣲炒附子一兩炮裂去皮臍蝟皮一枚燒灰黄礬一兩燒灰烏蛇三兩酒浸去皮骨酥塗炙黄白礬一兩燒灰髪灰一兩露蜂房一兩炙㣲黄枳殻一兩麸炒右為末蜜丸桐子大每空腹及晚食前桑枝湯下三十丸如聖散出聖濟總錄治諸痔白蝟皮二枚燒雞冠花炒皂莢針炙各二兩栝蔞一枚焼胡桃十枚燒槐花二兩炒樗莢二兩酥炙黄蓍炙枳殻麩炒各二兩白礬綠礬各二兩半水飛右為散毎服二錢匕酒和下或作丸服如聖丸出聖濟錄治五種痔疾枳殻去穣麩炒威靈仙去土陳橘皮紅各一兩續斷炒白礬飛過當歸炒乾薑炮附子炮去臍皮生地焙用熟乾地黄連翹炒槐莢子各半兩炒香為度取莢内子右為末蜜丸桐子大每服十丸陳粟米飲下空心食前日二服如年深者加丸數疼痛甚者當日見效黒神散出王氏傅濟方治膓風痔疾𦍑活去蘆頭黄蓍黄荆實蔓荆實狗脊火燎去毛枳殻去穣麩炒梹榔栝蔞以盛盡藥為度不拘枚數去子㽞穣右味除栝蔞外等分為末入栝蔞中盛於沙合或瓦罐子内鹽泥固濟煆通赤候冷取出藥末更别用藥如後荆芥子白蕪荑二味與前等分木香比前減半右為散每服一錢匕空心茶酒調下日三蝟皮散出聖濟總錄治五痔蝟皮炙鱉甲醋炙當歸大黄蒸三度炒各二兩露蜂房炙蛇皮炙藁本去苗土桂去粗皮各一兩一分猪後懸蹄十四枚炙右件藥搗羅為散每於空腹煮白粥飲調下三錢匕服日二服治五痔及脱肛出千金方槐白皮三兩猪脂半斤松子桃仁各十枚巴豆七枚薫草一名薰陸辛夷甘草白芷各半兩野葛六銖右㕮咀煎三上三下去滓以綿沾膏塞孔中日四五過蟲死瘥止痒痛大佳一方無葛黄蓍丸出濟生方治五痔出血疼痛榼藤煨用肉半兩川續斷酒浸黄蓍去蘆貫衆附子炮去皮臍黄礬别研蝟皮燒灰當歸去蘆酒浸阿膠蛤粉炒各一兩香麝别研一字右為末米糊丸桐子大毎服七十丸空心米飲送下氣壮多熱之人免服皂刺丸出直指方治疼痛而復痒皂莢刺二兩燒烟盡存性防風槐花蛇床白礬白蒺莉炒去刺枳殻薑黄各半兩蜂房五倍子各一分右為末醋調草粉糊丸小豆大每服五十丸以苦楝根煎湯下仍用童子尿熱入白礬末浄洗肛門誥後丸出聖濟總錄治痔連翹附子炮去皮臍桂去皮槐莢白礬枯飛杜仲去皮炒枳殻去穣麩炒黄香當歸切焙藁本右件藥等分為末蜜丸桐子大每服十丸米飲下空心日二藜蘆湯出聖濟總錄洗痔䔧蘆附子莽草蛇床𦍑活獨活當歸苦參芍藥各一兩蜀椒去目半兩右味搗篩每服兩撮生絹袋盛桑松柏枝各一握生薑一塊拍破銀石器中以水三碗煎熟去滓傾入器中乗熱薰候温洗之黄蓍丸出聖恵方治五痔下血不止疼痛壅塞不通黄蓍一兩蝟皮一兩炙令焦黄當歸一兩㣲炒桂心三分槐子仁二兩白礬燒一兩麝香一分細研入枳殻二兩炒黄附子一兩炒去皮臍白花蛇一兩酒浸㣲黄炙右為末蜜丸桐子大每服食前煎栢葉湯下三十丸㧞毒散敷掃痔腫毒處大黄黄柏白芨石膏黄芩各五錢白歛黄連梔子各三錢朴硝右末用井花水調塗宣毒散丸苦參荆芥當歸川芎𤣥參白芷各半兩牽牛一兩半烏蛇一條青黛半兩右先将牽牛巴豆肥白者去殻十粒慢火燒令色黒去巴豆不用只用牽牛同前九味為末将煨熟大蒜擂細看稀稠得所即時糊丸桐子大每服空心以鹽酒送下一十丸如神丸一名烏蛇丸出聖濟總錄治膓風五痔烏蛇酒浸去皮骨炙大黄濕紙裹煨防風去蘆各二兩黄蓍秦芁去苗一兩半枳殻去穣炒蝟皮炙黒焦陳皮浸去白焙土蒺莉炒去角右為末蜜丸桐子大每日空心酒下三十丸夜卧更服當日血止痛定丁香爛飲丸治痔丁香木香廣茂三稜丁皮各二分右為末水浸蒸餅丸如桐子大每服三十丸食後白湯下乳香丸出和劑方治諸痔下血肛邉生肉或結核腫疼或生瘡痒痛或大便難肛膓脱出又治風膓下血無問新久及諸漏根在臓腑悉能治之枳麩炒牡蠣火煆蓽澄茄芫花青去頭翅足炒黄色大黄蒸焙鶴虱炒各半兩白丁香乳香研各一兩右為末粟米糊丸梧桐子大每服十丸至十五丸如治膓風臘茶清下諸痔煎薤白湯下諸漏煎鐵屑湯下並前服一方無白丁香枳殻黄蓍丸出經騐良方治痔枳殻黄連各五兩白雞冠黄蓍各一兩荆芥二兩半右為末糊丸每服三十丸荆芥湯下洗痔訶子散訶子甘草大黄荆芥白芷三賴子藿香防風各等分右藥煎湯洗治男子婦人痔瘡黄連一兩松香二兩黄栢一兩銅青二兩明礬一兩生輕粉三錢半右為末乾敷上先用稻草一小把鹽一兩煎湯熏洗每一日洗二三次敷前藥洗方出危氏方黄連黄芩荆芥蛇床子各一兩側柏葉四兩兒茶鏡面草蚵皮草各一握右用新汲水煎傾盆内薫候通手却洗三香丸出聖濟總録治五痔乳香半兩研安息香蜜陀僧研各一分巴豆七粒去皮油丹砂麝香研砒霜研各半錢蝟皮一枚炙搗為細末右為末用水化炊餅丸菉豆大毎服一丸空心冷茶清下黄連阿膠丸出永類鈐方治諸痔解熱調血用枳殻丸散送下或黒豆煎湯下解裏熱先用此追風毒剉散治諸痔藴熱腫痛大便不通用追毒剉散加枳殻煎服神效方出聖恵方治五痔有頭疼痛可忍生槐煎皂角二兩炙去皮子麝香鰻鱺炙雄黄莨菪炒丁香各二分木香一分右末以槐煎和丸分為五丸取一淨瓶可一升以掘地埋之著一疊子於瓶上鑚疊子作孔内大瓶中灰葢之後内藥一丸燒之令安稳以下部著疊孔上坐便通汗其盡一丸藥即上内痔以藥一丸内下部立效仍不住熏忌魚熱麵等一方無木香小槐實丸千金方治五痔十年者槐子三斤白糖一斤用炒礬石硫黄各一斤大黄乾漆龍骨右末四味其二種石及糖並細研内銅器中一石米下蒸之以綿絞取汁丸藥末併手丸桐子大隂乾酒服二十丸日三稍増至十丸一方治久痔温水下槐皮膏和濟方治榖道痒痛痔瘡及内外諸痔腫核結硬或發無時痛不可忍或肛邉生瘡赤爛浸潰䑕乳附核久不消散槐皮楝實各五兩裂或作豆䜴甘草刪繁用蜂房白芷各二兩當歸二兩桃仁五十箇赤小豆二合右剉以成煎猪膏一斤㣲火煎白芷色黄膏成取摩瘡上日再并𨗳下部刪繁方無當歸治腎勞虛或酒醉當風所損腎藏病肛門腫生瘡因酒房傷發㵼清血肛門疼痛蜂房膏槐角丸御藥苑方治膓風疾痔大便澁滯氣結不通飲食衰少面黄肌痩或下血不止或在便前或在便後者宜服槐角一斤炒令焦熟㨂净黄蓍枳殻麩炒熟地乾當歸防風各四兩木香一兩右末麵糊丸桐子大毎服六七十丸不拘時温米飲下黄金散黄栢黄芩白芷藿香零陵香甘草甘松各等分右㕮咀黒豆一勺相和水二碗煮二十沸去滓洗却要生肌藥聖丸子直指方諸痔通用榼藤子重一兩者三个去穣炙酥猪牙皂角二兩酥炙蝟皮一兩炙令焦大皂角刺二兩燒各存性没藥别研槐角各三錢麝香少許右為末酒麵稀糊丸桐子大毎服三十丸枳殻散下一方翻花脱肛磨五七丸塗七物湯聖濟總錄薫痔乾蝦䗫一枚剉碎皂莢三挺剉艾一握鱉甲二枚切片雄黄一兩麝香一錢草烏二枚右剉均穿地坑内看熟火一斤方塼一片中心鑚孔子葢坑口旋入藥一撮披衣薫療五痔散肘後方主酒客勞及損傷療下部中傍孔起居血縱横出及肉方赤小豆四分炒黄蓍三分附子炮白歛桂心各一兩芍藥黄芩共二兩右為散酒服方寸日三止血又方肘後方藜蘆大黄黄連各半兩楝木子十四枚桃仁十四枚去皮尖巴豆四枚去心煮萞麻十四枝一名狗􅀈右㕮咀以猪脂一斤煎三沸去滓傅贅肉上日三外有此膏内服紫雪丸併行療大便急去血或至一升數合面少血色足内傷風冷積年多變痔大黄五分甘遂二分黄芩一分乾薑附子各四分燒桃仁三十枚去皮尖葱白七枝右水六升煮一升半先服半升稍安又服半升湏㬰血發又服半升未斷候發日再作不過三劑瘥忌猪肉等治一切外痔翻花鷄冠痔三十年者大如蒸餅者赤不可治興功神效鍋底煤朴硝半兩雌黄半兩雄黄半兩膽礬三錢白礬四兩半右合研細依次乾鍋内以瓦器葢之鍋上留分寸恐藥滚起先發頂火仍發底火庶上下火力俱透煆令青烟盡為度取出用紙攤在地上出火毒如白礬未甚煆過單取白礬再煆以枯為度然後一處研細再入滴乳没藥少許毎用甘草湯調傅日四五次夜間兩次自然焦黒硬脱落無瘡口膓頭三日自收如日傅夜不傅亦可凡欲傅藥先用温湯洗痔揾乾敷藥如再敷再洗再傅三日覺疼無妨直敷直乾落為度仍服釣膓丸須依局方自合方有異效艾葉散出聖恵方治五痔下血不止宜服艾葉半兩炒㣲黄黄蓍一兩半白龍骨一兩地榆一兩枳實一兩半炒㣲黄白芍一兩熟地乾者一兩右搗羅為散每服三錢水一盞煎六分去滓食前温服治五痔及膓風㵼血等出聖恵方鷹頭草半兩甘菊花半兩地榆半兩黄蓍一兩金蘿藤半兩黄藥半兩榼藤子半兩煨用肉右末以軟飯和丸桐子大毎服食前粥飲下三十丸加味四君子湯出三田方治五痔下血面色萎黄心忪耳鳴脚弱氣乏口淡食不知味人參茯苓白术甘草炙黄蓍白扁豆蒸各等分右末毎服二錢以湯㸃服一方有五味子無甘草洗痔方海桐皮荆芥甘草節苦參葱黒豆右等分剉成粗粒水五升煎湯洗凡塗藥一次洗湏一次催痔散治五痔種疾穿山甲七片火煆螻蛄一个煆血餘一兩燒灰黄􅶞魚一箇糞釭内片時火煆過了腦子麝香各少許右為末用貼痔瘡方蛇蛻􅒝麻子荆芥油頭髪皂角穿山甲各等分右先用輕粉煎湯洗浄瘡口後用六味烟薫治痔頭疼痛有瘡膿血不止出千金方朱砂二錢砒半錢麝二分巴豆一粒去油安息香阿魏一分麵裹煨熱右為末蒸餅丸黄豆大每日空心枳殻湯下一丸十日取效蜜陀僧丸治一切痔疾面色萎黄蜜陀僧燒赤白礬灰各一兩槐子仁炒雞冠花鐺墨各半兩皂莢灰一分右為末以麵糊丸梧子大每服二十丸煎栢葉湯下空心服之蝟皮散治痔蝟皮一枚黄牛角腮一對鯪鯉甲二兩猪牙皂角野猪肉桕子葉四兩右用新瓶一隻盛新瓦子葢口紙泥封乾後煆過赤放冷取出研為散入麝香少許每服二錢七服用胡桃仁一枚分作二服研細温酒調下久患不過五七服差夜卧更深服神妙湯出聖濟總錄薫洗痔疾􅒝薢栝蔞根甘草五倍子䜴葱白切右等分研每服一二兩水兩碗煎數沸盆盛坐薫痔候通洗黄蓍丸治牝痔下血黄蓍枳實各二兩炙烏蛇炙當歸赤石脂各一兩蝟皮二兩炙右末蜜丸空腹服酒下如桐子大二十丸日二服更不加減不利忌血猪肉魚蒜臭物蜜陀僧散出聖恵方治五痔下血疼痛不可忍蜜陀僧半兩細灰橡實半兩肉荳蔲半兩去殻地龍一兩㣲炒榼藤子一兩煨蝦梹榔右為散毎服食前以粥調下一錢六神丸出聖濟總錄治五痔腫痛鶴虱金星石煆酒淬三過各一兩芫青五十箇去足翅生用皂莢仁一百个磁石煨醋淬十遍鉛丹各一兩研右為末用荷葉四五重裹放飯上蒸一饋取出研勻别取白礬一分泡水和丸桐子大每服十丸麝香酒臨卧時連三服未效再一二服治外痔亦治惡瘡瘑瘡珍珠雄黄雌黄各一兩竹茹二兩猪膏一斤右為末内猪膏中和調又切亂髪半鷄子大東向煎三上三下髪焦出其痔先用鹽湯洗拭乾後傅寛膓丸散治年深日近痔疾當歸荆芥枳殻香附甘草各等分右為末米飲調下二錢玉龍膏白礬指頭大膽礬硫黄各二如豆大硼砂五粒豆大砒指頭大右同入黒盞内火煆過候冷取出入乳香末黄丹各半錢朱砂三錢研勻毎服少許油調塗一日三次至三四日其痔瘤皆黒色便不用只用催落藥治痔瘡雄黄五分細研没藥二錢五分明浄者白礬半飛半生五倍子炮過五靈脂一錢去石煉退頭烟右研仝極細末用紙花子貼瘡上五灰散出肘後方治五痔不問内外牝牡寒温勞濕悉主之鱉甲治牡痔蝟皮治牝痔猪左懸蹄甲治膓痔蜂房治脉痔蛇蜕治氣痔各等分右燒存性隨證位一分為末井水調二錢空心臨卧一服一方有麝香無蝟皮粥飲調下一方亦以傅瘡上五劑不差更服一名鱉甲散各半兩炙用取痔千金方出家藏經騐方可用甘草節同葱白煎湯用新茟頭㸃藥水輕輕洗浄休破了痔頭成漏難治砒霜色黄明者三錢白礬明浄者十兩虢丹一錢水飛過炒蝎稍以稍尾全者七个洗浄瓦上焙乾草烏豆末一錢小而𦂳滑者去皮揀生用右用熱便鉄銚炭火煆紅放冷揩拭净先下白礬焼令滚沸次下砒霜拌勻攪合候沸定三兩次了礬乾烟盡為度放地上出火毒研為末方入草烏黄丹蝎稍同研收於新瓦礶内埋地内乾處二日取出如痔痛旋加乳香没藥末少許入於前藥内如用先以甘草水或葱水輕輕洗浄休破了以生芝蔴油調或蜜調毛翎掃痔頭或用茟㸃藥少許於痔上坐卧以痔頭向空處椅子開穴坐草蓆亦開穴以肛門坐空處待黄水自然滴下十日内乾又五七日内其瘡乾痂自落連根去了生好肉平後登厠於野處不可登後架坑上恐舊糞觸了房室油膩鮓物等一月逺者不出十日可取盡近者化為水連根去好肉臨安曹五醫痔本刀鑷人因黄院子薦引為宋髙宗取用此方愈後官至觀察使一士夫内郷亦苦此十餘年如四五枚櫻桃大血出如箭因過金陵遇醫重請之用此藥斷絶根經騐方云昔隆慶府安住一内子久患得此方調治遂除其根重謝之後毎調官不敢相忘必多治饋重感其意慨然以方授之甚属秘藏安屢製以施人無不效者僕聞而求之不可不𫝊薰洗方出經騐良方槐花半兩蓮房一箇五倍子三个研細荆芥五錢地榆皮右為末毎服半兩水一碗瓦器煎入朴硝白礬各三錢重先薫後洗之五灰膏出危氏方治藏府一切藴毒發痔瘡不問逺年近日形如雞冠蓮花桃核牛乳或内或外並皆治之蕎麥灰半升荆芥老杉枝山白竹薊柴右柴竹截作三尺長以斧劈破成片毎取束晒乾於火上燒過置鐔内為灰防為風化候燒盡却以水於窩内煮出灰汁又用酒漏以花帛實其竅置蕎麥灰於酒漏内以所煮四般灰汁淋之然後取汁於窩内慢火熬汁約取一小碗候冷入石灰虢丹同和成膏以瓦瓶貯之上用石灰傅面不令灰氣臨用時郤出石灰冷水調開令病者以水洗洗净痔瘡仰卧合起一足先濕紙於瘡四圍貼䕶却用竹箆挑藥塗痔上湏更痛息用紙揩去藥再塗如此三四遍要痔瘡如墨様黒方止以水洗浄毎日常置冷水一盆以葱湯和之日洗三五遍六七日膿穢出盡其瘡自消治痔方槐花半斤猪臓使五个盛線縳砂鍋煮熱取出槐花焙為末薄荷百藥煎當歸黄連各五兩為末右麵糊丸桐子大毎服五十丸至百丸空心米湯送下上馬散出楊氏家藏治五種痔疾初可以消散痛不可行坐者朴硝薄荷荆芥枳殻蓮房各等分右㕮咀毎服用一兩水三升煎三五十遍薫洗痔上未效再用即愈治因痔疾阻大便秘結出本事方牽牛四兩瓦土炒青皮二兩威靈仙大㦸大黄各一兩右為末量人大小毎服一二錢至三錢用蜜酒調下湏用熟水潄口服傅痔方斑猫十个輕粉半錢馬牙硝三十枚紅椒一錢黄皮半錢右為末先用皂角荆芥洗令净拭乾用麻油調藥聖五丹出直指方治痔雄黄葉子雌黄朴硝綠礬明白礬各半兩右件各别磕碎以銀窩一入雄黄二入雌黄三入朴硝四入綠礬五入白礬圎瓦片葢定灰火煆一日夜看青烟盡有紅烟上方好候冷取出紙襯頓地用盆出火毒一日夜入乳香没藥各一錢同研極細毎抄一匙煎甘草湯調外用鷄翎埽藥末葢之日一次夜一次自然乾硬而脱逐日湏用葱白煎入朴硝温洗軟帛拭乾然後敷藥治痔猪膽膏猪膽七枚各取汁以建盞坐炭火熬成膏用單紙攤傅湏用鮮槐根取白皮煎湯温洗然後傅藥没藥散出聖濟總錄治五痔消毒没藥一兩黄礬白礬溺塗火煆各半兩麝香一錢研右研令勻毎用時先以葱湯洗拭浄以藥乾傅乳石散出聖濟方治五痔花花乳石一兩煆研乳香去石研膽礬研夜明砂地龍去土細末右等分研勻用時先以甘草湯洗痔浄以藥乾傅令痔消釋藥蘗散塗痔漏黄蘗鉛丹黄連膩粉白礬右等分為散先煎葱湯洗後用藥散一錢以塗之久患不過三度一方無膩粉唾津調塗五物湯出聖濟總錄薫洗諸痔莨菪子二兩白礬一兩通明者半兩生用半兩鉄器内盛慢火煆過蓬砂馬牙硝各一分已上四味一䖏先碾碎朴硝五兩同前四味一處碾右用百沸湯一大碗藥末五錢匕浸薫洗痔痛處食後夜卧以衣覆䕶只留痔瘡綠雲湯出聖濟方治痔已用藥淋渫了貼痔卷柏樗根白皮貫衆地骨皮朴硝各一兩右搗篩毎用十五錢匕葱二枝水五升煮四升去滓葉熟渫之二黄散出聖濟總錄塗痔黄蘗一兩黄葵花乾生地半兩白芨半兩青黛二塊右五味為散先渫了用朴硝水塗之乾即易之以瘥為度療五痔衆醫所不能療神方出肘後方雷丸半斤熬䖟虫半兩石南草半兩藁本二兩猪後懸蹄十四枚燒令焦右搗下以羊髓脂調和先食飲服十五丸日冄劇者夜又一那十四日痒止更八日膿血盡䑕乳悉愈滿六十日終不發也忌魚猪肉大神效硫黄散出聖恵方治五痔疼痛久不瘥硫黄一兩蛇黄一兩全星者火燒令赤碎白礬一兩鰻鱺頭一枚鯽魚大者一頭開肚去膓入四味在内以麻皮纒之泔泥包之令乾燒烟盡取出右研如粉毎服食前粥飲下二錢日三龍涎散龍骨蜜陀僧花蕋石黄栢各一分右為末毎用少許乾傅上生肌洗法出三因方海桐皮蛇床子各一兩香南藤葱白切各三兩右水一斗藥五兩煎减半去滓候温著手輕洗以絹拭一法用槐白皮煎淋渫取佳治痔瘡方當歸蓮花蕋各一兩牽牛頭末四兩紅土少許右用新瓦上焙乾為末毎四錢好酒調下利三五行為度如不利來日再依前服比及服藥休喫夜飯來日早空心辰時前後先食熟肉四兩約至己午時前後服藥大有神效夘時即止治痔方苦參四兩半血竭四錢椿樹皮二兩乾者芫荽子約二合浄即去積右㕮咀水半碗酒半盞煎六分臨發空心服薫藥麻花三錢蜈蚣一条水銀粉一錢半婆娑石二錢青氣礬二錢明礬二錢雌黄二錢雄黄半錢血竭一錢右将青明雌火煆存性研細加血竭雄黄為末傅之用唾調傅治痔良方功如神白礬黄丹熖硝各等分斑猫不拘多少右先用黄丹斑猫同炒焦取斑猫煎湯了去斑猫将已炒黄丹及白礬熖硝入在湯中洗而後薫冷時盛貯再煖薫而復洗湏㬰加丹礬硝三件洗三次過五日其疾自乾浴此湯一次用時湏加三件烏玉丸治内外翻花痔大黄一兩炮厚朴二錢半枳殻一兩猪牙皂角五錢右為末擂芝麻丸桐子大毎服三十丸用米湯下治痔方出本事方信砒一兩燒烟盡榖精草三錢白礬一錢硼砂三錢右為末綿塊㸃藥撲上如痔乾可用水調傅聖治方痔藥白礬血餘石竹各半兩胡椒二十粒右用瓦礶盛泥固濟猛火煆通紅取出去泥用藥細研為末五更時用不語津調敷痔頭上不過三服效治内痔大膓頭痛仙茅白术石南各一兩郁李仁三錢右為末毎服一錢薄荷酒送下治諸痔疾出本事方塗杉朴硝大黄側栢各等分右㕮咀礶内煎二十沸於礶坐糞雞痔疾堪下手則洗之效又方出本事方枳殻甘草荆芥香附子炒去毛右等分為末毎服二錢米泔湯調下清凉散一名當歸湯治諸痔熱證大便閉結方見本門痔漏類薫洗方出危氏槐花荆芥枳殻艾葉各等分右㕮咀煎白礬湯或明礬泡薫洗佳神驗散出聖濟總錄治痔當歸焙一兩白礬二兩桑蛾二兩黄紫色者木耳二兩右為散毎服一錢匕粟米粥調下空心服異功散一名犀灰散出傳信適用方治五痔膓風㵼血外痔及脱肛下痔四邉努肉如乳皆治黄牛腮角一枚碎蛇蜕皮一条白者猪牙皂角五根鯪鯉甲半兩右入瓦瓶内黄泥封固候乾先以小火燒令烟出後用大火煆令通紅為度取出攤冷為散先用胡桃肉一枚分作四分取一分臨卧時研如粉温酒送下便睡先引出蟲至五更時用温服禦散二錢七分至辰時更一服雖患年深日久過三服瘥永除根木𤓰丸出聖濟總錄治痔木𤓰一兩成片晒乾為末三分中㽞一分下藥梹榔三枚為末白礬一兩甜硝一分右用生麵旋起酵作一蒸餅糊相勻裹藥置火煮其上香熱乃去餅搗藥二百杵如藥乾即糊潤之為丸桐子大毎服二十丸空心木𤓰香水湯下其藥内不見鐵犯火木香散出聖濟總錄貼痔木香梹榔大者黄連各一分莽草半兩右為散毎服五錢匕水二碗煎二三沸薫洗後用温水調以紙花子貼之四妙散出聖濟總錄治蓮花痔及雞冠痔等貼白芨白歛木鱉桑螵蛸各半兩右為散湯磨乳香調令稀稠得所攤故帛上貼次日連皮折更無瘡痛效四香湯出聖濟總錄治丈夫婦人乆患痔不論有瘡無瘡莎草根一兩黒狗脊半兩甘崧草黄熟香上好極香者各一分右搗篩毎使五錢匕水一碗煎五七沸盛在深盆中便令患者於上面坐圍衣被薫之勿透氣味下得手便淋渫患處直候藥冷即止不得揩拭便益覆卧一時許若渫了臨卧将被以火焙稍煖妙槐子酒出千金方治五痔十年者槐子二斗槐東南枝細剉一石槐東南根細剉二石右大釡中十六斛水煮五斛澄清更煎取一石六斗炊二斛黍米上麯二十斤醸之攪令調封泥七日熟取清飲適性常令小小醉合時更煮滓取汁淘米及洗器不得用水湏知此事忌生水故也一方有槐柏皮細剉一石大豆帛方治榖道痒痛繞腫起裏許欲生肉突出方見本門脉痔類換膓散外痔不用草烏生一个白薑一指大白礬一錢飛右為末乳香一錢研勻毎用半錢葱涎調塗於肛門内不久其痔自脱遂用落藥三神丸治僧痔道痔僧覺海少年患痔其形業比氷霜此縁飽食久坐知痔疾不必酒色過度矣枳殻炒白礬皂角燒存性五倍子等分右為末蜜丸桐子大毎服二三十丸温水食前服洗痔方防風當歸川芎各等分右剉細煎水去滓候熟温淋洗瘡用軟帛拭乾傅煎藥治翻花痔久不瘥地骨皮乳香一兩麝香五分炒末右為末毎服二錢米飲送下兼米飲傅瘡上渫藥馬蹄香蒼术荆芥各二兩右剉細以水三升煎数沸先噓後洗薫法出子金方治五痔蝟皮方三指大切雄黄事大研熟艾雞子大右為末用瓦器以灰入實一半如焼香法安長桶内坐其上薫之烟氣口出為佳凡一度永瘥勿犯風冷忌雞魚等物貼藥蜀葵子半兩蟬蜕五个梹榔一个末右棗子三枚取肉研細搜和藥如覺硬滴少蜜研成膏量大小貼於病處治痔蓮子散吕子厚朴此累年用之立效蓮子十四个草芽茶十四个乳香隨意入右搗了以紙裹煨透先以黄連湯洗患處然後以藥生貼之三黄丸治痔黄連黄栢槐花炒變色各等分右搗末麵糊為丸毎服三十丸米飲下酒亦可立效散治風窠爛痔苦參卷栢澤蘭葉各一兩右焙為末毎服二錢無灰酒調下治痔神方黄葵隂乾風化朴硝各等分腦子少許右以蜒蚰置器中摻藥末於上令作水以桑葉貼之立愈治痔良方白蓮花蕋白牽牛頭末芫荽子各三錢右入土硃少許為末空心熱酒調傅乳香丸治内外痔枳殻梹榔各四兩皂角子四十灰炒熱右為末用水糊丸桐子大毎服二十丸用酒下米湯亦可食前服寛膓丸黄連枳殻百藥煎各等分右為末用水糊丸桐子大毎服三十丸用米湯下治諸痔痛大蜈蚣一條大青州棗三个白礬一塊如棗大右蜈蚣白礬為末用棗肉丸分作二圎燒烟用竹筒透引烟薫痔治痔方白礬乳香泥礬少許右為末用好醋二升熬成膏痔上貼理痔方五靈脂四錢膩粉半兩麝香三十文右為末先用甘草湯後用津唾調抹痔上痔濕作乾撲薫痔方官桂三分蛇床子五錢蛇蜕一條右為末毎服用一錢煎湯薫洗收痔方白歛白芨各一兩黄丹二兩右為末輕粉麝香各少許麻油調敷立效治痔疾膓風半夏湯炮洗七次黄蓍枳殻右為末薑汁糊丸如菉豆大毎服三十丸温酒空心下椿皮丸臭椿花刮去粗皮焙乾四兩蒼术枳殻各一兩右為末醋糊丸桐子大空心食前米飲下三四十丸清心湯諸痛痒瘡瘍皆属於心心主血熱諸痔受病之原黄連一兩茯神去木赤茯苓各五錢右為末蜜丸桐子大毎服一百丸食前米飲下止宜食白米粥疏膓胃能消丸治五痔腫痛下血不止或榮衛滯澁身體疼痛大便風閉不通葳靈仙十兩木香右為末蜜丸桐子大毎服五十丸荆芥湯下不拘時勝金丸雌黄五錢研白礬一兩研麝香一錢研右研勻釅醋半盞銀器中慢火煎一半傾乳鉢内研内勻再傾入器内熬成膏麝香少許研更入蒸餅心少許和丸菉豆大毎服夜卧温漿水下十丸仍用一丸手中心漿水調開塗痔三年者三五服瘥應痛散治痔荆芥穂桑根白皮地榆各一兩右為散毎三錢匕水一椀同殠橘二枚拍破煎三五沸傾入就薫瘡下的手方可洗仍服後藥至聖丸殠橘一半去穣核剉枳殻半斤黄連去須五兩右麩五升於銀石器内慢火炒令麩黒於地去火毒不用麩将藥為末用皂角一百枚去黄以水一升於器内煮令熟爛如膏與前藥末同拌和丸桐子大毎服二十丸温米飲下不拘時日二服普濟方卷二百九十五
