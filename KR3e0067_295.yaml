血黃蓍枳實各二兩炙烏蛇炙當歸赤石脂各一兩蝟皮二兩炙右末蜜丸空腹服酒下如桐子大二十丸日二服更不加減不利忌血豬肉魚蒜臭物蜜陀僧散出聖惠方治五痔下血疼痛不可忍蜜陀僧半兩細灰橡實半兩肉豆蔲半兩去殼地龍一兩微炒榼藤子一兩煨蝦檳榔右為散每服食前以粥調下一錢六神丸出聖濟總録治五痔腫痛鶴虱金星石煆酒淬三過各一兩芫青五十箇去足翅生用皂莢仁一百個磁石煨醋淬十遍鉛丹各一兩研右為末用荷葉四五重裹放飯上蒸一饋取出研勻别取白礬一分泡水和丸桐子大每服十丸麝香酒臨卧時連三服未效再一二服治外痔亦治惡瘡瘑瘡珍珠雄黃雌黃各一兩竹茹二兩豬膏一斤右為末內豬膏中和調又切亂髮半雞子大東向煎三上三下髮焦出其痔先用鹽湯洗拭乾後傅寬腸丸散治年深日近痔疾當歸荆芥枳殼香附甘草各等分右為末米飲調下二錢玉龍膏白礬指頭大膽礬硫黃各二如豆大硼砂五粒豆大砒指頭大右同入黑盞內火煆過候冷取出入乳香末黃丹各半錢朱砂三錢研勻每服少許油調塗一日三次至三四日其痔瘤皆黑色便不用只用催落藥治痔瘡雄黃五分細研沒藥二錢五分明淨者白礬半飛半生五倍子炮過五靈脂一錢去石煉退頭煙右研同極細末用紙花子貼瘡上五灰散出肘後方治五痔不問內外牝牡寒溫勞濕悉主之鱉甲治牡痔蝟皮治牝痔豬左懸蹄甲治腸痔蜂房治脈痔蛇蛻治氣痔各等分右燒存性隨證位一分為末井水調二錢空心臨卧一服一方有麝香無蝟皮粥飲調下一方亦以傅瘡上五劑不差更服一名鱉甲散各半兩炙用取痔千金方出家藏經驗方可用甘草節同蔥白煎湯用新茟頭點藥水輕輕洗淨休破了痔頭成漏難治砒霜色黃明者三錢白礬明淨者十兩虢丹一錢水飛過炒蝎稍以稍尾全者七個洗淨瓦上焙乾草烏豆末一錢小而緊滑者去皮揀生用右用熱便鐵銚炭火煆紅放冷揩拭淨先下白礬燒令滚沸次下砒霜拌勻攪合候沸定三兩次了礬乾煙盡為度放地上出火毒研為末方入草烏黃丹蝎稍同研收於新瓦罐內埋地內乾處二日取出如痔痛旋加乳香沒藥末少許入於前藥內如用先以甘草水或蔥水輕輕洗淨休破了以生芝麻油調或蜜調毛翎掃痔頭或用茟點藥少許於痔上坐卧以痔頭向空處椅子開穴坐草席亦開穴以肛門坐空處待黃水自然滴下十日內乾又五七日內其瘡乾痂自落連根去了生好肉平後登厠於野處不可登後架坑上恐舊糞觸了房室油膩鮓物等一月逺者不出十日可取盡近者化為水連根去好肉臨安曹五醫痔本刀鑷人因黃院子薦引為宋髙宗取用此方愈後官至觀察使一士夫內鄉亦苦此十餘年如四五枚櫻桃大血出如箭因過金陵遇醫重請之用此藥斷絶根經驗方云昔隆慶府安住一內子久患得此方調治遂除其根重謝之後每調官不敢相忘必多治饋重感其意慨然以方授之甚屬祕藏安屢製以施人無不效者僕聞而求之不可不傳薰洗方出經驗良方槐花半兩蓮房一箇五倍子三個研細荆芥五錢地榆皮右為末每服半兩水一碗瓦器煎入朴硝白礬各三錢重先薰後洗之五灰膏出危氏方治藏府一切藴毒發痔瘡不問逺年近日形如雞冠蓮花桃核牛乳或內或外並皆治之蕎麥灰半升荆芥老杉枝山白竹薊柴右柴竹截作三尺長以斧劈破成片每取束晒乾於火上燒過置鐔內為灰防為風化候燒盡却以水於窩內煮出灰汁又用酒漏以花帛實其竅置蕎麥灰於酒漏內以所煮四般灰汁淋之然後取汁於窩內慢火熬汁約取一小碗候冷入石灰虢丹同和成膏以瓦瓶貯之上用石灰傅面不令灰氣臨用時郤出石灰冷水調開令病者以水洗洗淨痔瘡仰卧合起一足先濕紙於瘡四圍貼護却用竹箆挑藥塗痔上須更痛息用紙揩去藥再塗如此三四遍要痔瘡如墨樣黑方止以水洗淨每日常置冷水一盆以蔥湯和之日洗三五遍六七日膿穢出盡其瘡自消治痔方槐花半斤豬臟使五個盛線縳砂鍋煮熱取出槐花焙為末薄荷百藥煎當歸黃連各五兩為末右麵糊丸桐子大每服五十丸至百丸空心米湯送下上馬散出楊氏家藏治五種痔疾初可以消散痛不可行坐者朴硝薄荷荆芥枳殼蓮房各等分右㕮咀每服用一兩水三升煎三五十遍薰洗痔上未效再用即愈治因痔疾阻大便祕結出本事方牽牛四兩瓦土炒青皮二兩威靈仙大戟大黃各一兩右為末量人大小每服一二錢至三錢用蜜酒調下須用熟水潄口服傅痔方斑貓十個輕粉半錢馬牙硝三十枚紅椒一錢黃皮半錢右為末先用皂角荆芥洗令淨拭乾用麻油調藥聖五丹出直指方治痔雄黃葉子雌黃朴硝緑礬明白礬各半兩右件各别磕碎以銀窩一入雄黃二入雌黃三入朴硝四入緑礬五入白礬圎瓦片蓋定灰火煆一日夜看青煙盡有紅煙上方好候冷取出紙襯頓地用盆出火毒一日夜入乳香沒藥各一錢同研極細每抄一匙煎甘草湯調外用雞翎掃藥末蓋之日一次夜一次自然乾硬而脫逐日須用蔥白煎入朴硝溫洗軟帛拭乾然後敷藥治痔豬膽膏豬膽七枚各取汁以建盞坐炭火熬成膏用單紙攤傅須用鮮槐根取白皮煎湯溫洗然後傅藥沒藥散出聖濟總録治五痔消毒沒藥一兩黃礬白礬溺塗火煆各半兩麝香一錢研右研令勻每用時先以蔥湯洗拭淨以藥乾傅乳石散出聖濟方治五痔花花乳石一兩煆研乳香去石研膽礬研夜明砂地龍去土細末右等分研勻用時先以甘草湯洗痔淨以藥乾傅令痔消釋藥蘗散塗痔漏黃蘗鉛丹黃連膩粉白礬右等分為散先煎蔥湯洗後用藥散一錢以塗之久患不過三度一方無膩粉唾津調塗五物湯出聖濟總録薰洗諸痔莨菪子二兩白礬一兩通明者半兩生用半兩鐵器內盛慢火煆過蓬砂馬牙硝各一分已上四味一處先碾碎朴硝五兩同前四味一處碾右用百沸湯一大碗藥末五錢匕浸薰洗痔痛處食後夜卧以衣覆護只留痔瘡緑雲湯出聖濟方治痔已用藥淋泄了貼痔卷柏樗根白皮貫衆地骨皮朴硝各一兩右搗篩每用十五錢匕蔥二枝水五升煮四升去滓葉熟泄之二黃散出聖濟總録塗痔黃蘗一兩黃葵花乾生地半兩白芨半兩青黛二塊右五味為散先泄了用朴硝水塗之乾即易之以瘥為度療五痔衆醫所不能療神方出肘後方雷丸半斤熬虻蟲半兩石南草半兩藁本二兩豬後懸蹄十四枚燒令焦右搗下以羊髓脂調和先食飲服十五丸日冉劇者夜又一那十四日癢止更八日膿血盡鼠乳悉愈滿六十日終不發也忌魚豬肉大神效硫黃散出聖惠方治五痔疼痛久不瘥硫黃一兩蛇黃一兩全星者火燒令赤碎白礬一兩鰻鱺頭一枚鯽魚大者一頭開肚去腸入四味在內以麻皮纒之泔泥包之令乾燒煙盡取出右研如粉每服食前粥飲下二錢日三龍涎散龍骨蜜陀僧花蕊石黃柏各一分右為末每用少許乾傅上生肌洗法出三因方海桐皮蛇床子各一兩香南藤蔥白切各三兩右水一斗藥五兩煎減半去滓候溫著手輕洗以絹拭一法用槐白皮煎淋泄取佳治痔瘡方當歸蓮花蕊各一兩牽牛頭末四兩紅土少許右用新瓦上焙乾為末每四錢好酒調下利三五行為度如不利來日再依前服比及服藥休喫夜飯來日早空心辰時前後先食熟肉四兩約至己午時前後服藥大有神效卯時即止治痔方苦參四兩半血竭四錢椿樹皮二兩乾者芫荽子約二合淨即去積右㕮咀水半碗酒半盞煎六分臨發空心服薰藥麻花三錢蜈蚣一條水銀粉一錢半婆娑石二錢青氣礬二錢明礬二錢雌黃二錢雄黃半錢血竭一錢右將青明雌火煆存性研細加血竭雄黃為末傅之用唾調傅治痔良方功如神白礬黃丹熖硝各等分斑貓不拘多少右先用黃丹斑貓同炒焦取斑貓煎湯了去斑貓將已炒黃丹及白礬熖硝入在湯中洗而後薰冷時盛貯再暖薰而復洗須臾加丹礬硝三件洗三次過五日其疾自乾浴此湯一次用時須加三件烏玉丸治內外翻花痔大黃一兩炮厚朴二錢半枳殼一兩豬牙皂角五錢右為末擂芝麻丸桐子大每服三十丸用米湯下治痔方出本事方信砒一兩燒煙盡榖精草三錢白礬一錢硼砂三錢右為末綿塊點藥撲上如痔乾可用水調傅聖治方痔藥白礬血餘石竹各半兩胡椒二十粒右用瓦罐盛泥固濟猛火煆通紅取出去泥用藥細研為末五更時用不語津調敷痔頭上不過三服效治內痔大腸頭痛仙茅白术石南各一兩郁李仁三錢右為末每服一錢薄荷酒送下治諸痔疾出本事方塗杉朴硝大黃側柏各等分右㕮咀罐內煎二十沸於罐坐糞雞痔疾堪下手則洗之效又方出本事方枳殼甘草荆芥香附子炒去毛右等分為末每服二錢米泔湯調下清涼散一名當歸湯治諸痔熱證大便閉結方見本門痔漏類薰洗方出危氏槐花荆芥枳殼艾葉各等分右㕮咀煎白礬湯或明礬泡薰洗佳神驗散出聖濟總録治痔當歸焙一兩白礬二兩桑蛾二兩黃紫色者木耳二兩右為散每服一錢匕粟米粥調下空心服異功散一名犀灰散出傳信適用方治五痔腸風㵼血外痔及脫肛下痔四邉努肉如乳皆治黃牛腮角一枚碎蛇蛻皮一條白者豬牙皂角五根鯪鯉甲半兩右入瓦瓶內黃泥封固候乾先以小火燒令煙出後用大火煆令通紅為度取出攤冷為散先用胡桃肉一枚分作四分取一分臨卧時研如粉溫酒送下便睡先引出蟲至五更時用溫服禦散二錢七分至辰時更一服雖患年深日久過三服瘥永除根木瓜丸出聖濟總録治痔木瓜一兩成片晒乾為末三分中留一分下藥檳榔三枚為末白礬一兩甜硝一分右用生麵旋起酵作一蒸餅糊相勻裹藥置火煮其上香熱乃去餅搗藥二百杵如藥乾即糊潤之為丸桐子大每服二十丸空心木瓜香水湯下其藥內不見鐵犯火木香散出聖濟總録貼痔木香檳榔大者黃連各一分莽草半兩右為散每服五錢匕水二碗煎二三沸薰洗後用溫水調以紙花子貼之四妙散出聖濟總録治蓮花痔及雞冠痔等貼白芨白斂木鱉桑螵蛸各半兩右為散湯磨乳香調令稀稠得所攤故帛上貼次日連皮折更無瘡痛效四香湯出聖濟總録治丈夫婦人久患痔不論有瘡無瘡莎草根一兩黑狗脊半兩甘嵩草黃熟香上好極香者各一分右搗篩每使五錢匕水一碗煎五七沸盛在深盆中便令患者於上面坐圍衣被薰之勿透氣味下得手便淋泄患處直候藥冷即止不得揩拭便益覆卧一時許若泄了臨卧將被以火焙稍暖妙槐子酒出千金方治五痔十年者槐子二斗槐東南枝細銼一石槐東南根細銼二石右大釡中十六斛水煮五斛澄清更煎取一石六斗炊二斛黍米上麯二十斤釀之攪令調封泥七日熟取清飲適性常令小小醉合時更煮滓取汁淘米及洗器不得用水須知此事忌生水故也一方有槐柏皮細銼一石大豆帛方治榖道癢痛繞腫起裏許欲生肉突出方見本門脈痔類換腸散外痔不用草烏生一個白薑一指大白礬一錢飛右為末乳香一錢研勻每用半錢蔥涎調塗於肛門內不久其痔自脫遂用落藥三神丸治僧痔道痔僧覺海少年患痔其形業比氷霜此緣飽食久坐知痔疾不必酒色過度矣枳殼炒白礬皂角燒存性五倍子等分右為末蜜丸桐子大每服二三十丸溫水食前服洗痔方防風當歸川芎各等分右銼細煎水去滓候熟溫淋洗瘡用軟帛拭乾傅煎藥治翻花痔久不瘥地骨皮乳香一兩麝香五分炒末右為末每服二錢米飲送下兼米飲傅瘡上泄藥馬蹄香蒼术荆芥各二兩右銼細以水三升煎數沸先噓後洗薰法出子金方治五痔蝟皮方三指大切雄黃事大研熟艾雞子大右為末用瓦器以灰入實一半如燒香法安長桶內坐其上薰之煙氣口出為佳凡一度永瘥勿犯風冷忌雞魚等物貼藥蜀葵子半兩蟬蛻五個檳榔一個末右棗子三枚取肉研細搜和藥如覺硬滴少蜜研成膏量大小貼於病處治痔蓮子散吕子厚朴此纍年用之立效蓮子十四個草芽茶十四個乳香隨意入右搗了以紙裹煨透先以黃連湯洗患處然後以藥生貼之三黃丸治痔黃連黃柏槐花炒變色各等分右搗末麵糊為丸每服三十丸米飲下酒亦可立效散治風窠爛痔苦參卷柏澤蘭葉各一兩右焙為末每服二錢無灰酒調下治痔神方黃葵隂乾風化朴硝各等分腦子少許右以蜒蚰置器中摻藥末於上令作水以桑葉貼之立愈治痔良方白蓮花蕊白牽牛頭末芫荽子各三錢右入土硃少許為末空心熱酒調傅乳香丸治內外痔枳殼檳榔各四兩皂角子四十灰炒熱右為末用水糊丸桐子大每服二十丸用酒下米湯亦可食前服寬腸丸黃連枳殼百藥煎各等分右為末用水糊丸桐子大每服三十丸用米湯下治諸痔痛大蜈蚣一條大青州棗三個白礬一塊如棗大右蜈蚣白礬為末用棗肉丸分作二圎燒煙用竹筒透引煙薰痔治痔方白礬乳香泥礬少許右為末用好醋二升熬成膏痔上貼理痔方五靈脂四錢膩粉半兩麝香三十文右為末先用甘草湯後用津唾調抹痔上痔濕作乾撲薰痔方官桂三分蛇床子五錢蛇蛻一條右為末每服用一錢煎湯薰洗收痔方白斂白芨各一兩黃丹二兩右為末輕粉麝香各少許麻油調敷立效治痔疾腸風半夏湯炮洗七次黃蓍枳殼右為末薑汁糊丸如菉豆大每服三十丸溫酒空心下椿皮丸臭椿花刮去粗皮焙乾四兩蒼术枳殼各一兩右為末醋糊丸桐子大空心食前米飲下三四十丸清心湯諸痛癢瘡瘍皆屬於心心主血熱諸痔受病之原黃連一兩茯神去木赤茯苓各五錢右為末蜜丸桐子大每服一百丸食前米飲下止宜食白米粥疏腸胃能消丸治五痔腫痛下血不止或榮衛滯澀身體疼痛大便風閉不通葳靈仙十兩木香右為末蜜丸桐子大每服五十丸荆芥湯下不拘時勝金丸雌黃五錢研白礬一兩研麝香一錢研右研勻釅醋半盞銀器中慢火煎一半傾乳鉢內研內勻再傾入器內熬成膏麝香少許研更入蒸餅心少許和丸菉豆大每服夜卧溫漿水下十丸仍用一丸手中心漿水調開塗痔三年者三五服瘥應痛散治痔荆芥穗桑根白皮地榆各一兩右為散每三錢匕水一碗同殠橘二枚拍破煎三五沸傾入就薰瘡下的手方可洗仍服後藥至聖丸殠橘一半去穰核銼枳殼半斤黃連去須五兩右麩五升於銀石器內慢火炒令麩黑於地去火毒不用麩將藥為末用皂角一百枚去黃以水一升於器內煮令熟爛如膏與前藥末同拌和丸桐子大每服二十丸溫米飲下不拘時日二服普濟方卷二百九十五
