body:
  text: 普濟方卷二百九十五明周王朱橚撰痔漏門諸痔附論夫內經謂因而飽食筋脈橫解腸澼為痔夫痔病之候亦多矣此獨舉飽食一端者蓋飲食人之大欲存焉推此則它可觸類而知也五痔者一曰牡痔二曰牝痔三曰脈痔四曰腸痔五曰血痔肛邉發露肉珠狀如鼠乳時時滴清膿血曰牡痔肛邉生瘡腫痛突出一枚類口膿潰即散曰牝痔腸口顆顆發㿔且痛且癢水血淋瀝曰脈痔腸內結核有血寒熱往來登溷脫肛曰腸痔若血痔則每遇大便清血隨下而不止若酒痔每遇飲酒發動瘡腫而血流若氣痔則憂恐鬱怒適臨乎前立見腫痛大便難強力則肛出而不收治法大抵以解熱調血順氣先之蓋熱則血傷血傷則經滯經滯則氣不能行氣與血俱滯乘而墜入大腸此其所以為痔也諸痔出血肛門間别有小竅下如血線不與便物共道痔久不愈必至穿穴瘡口不合漏無已時此則變而為漏矣蓋腸風臟毒之與痔漏同出而異名也嵗積月纍淫蝕腸頭濕爛可畏此蟲為之害也其間執劑又當為治蟲也又有腸風痔脈痔雌雄痔皆五痔之别名也其狀初生悉在肛邉或如鼠乳結小核癢痛注悶甚者身熱惡寒諸方論之皆因房酒過度久嗜甘肥不慎醉飽以合隂陽擾血脈腸癖滲漏衝注下部肛邉生瘡變為痔疾治法如覺痔作便服通氣丸槐角丸熱食者服諸利湯踈利藏腑及浴洗熏尉以取內消切忌酒麵辛熱房室肥膩稍存縱嗜欲腐潰膿血或逗流淫汁嵗月已深穿穴成漏即須用寸金錠子三五次痊也其次服餌調節謹慎合宜未有不差者矣方治崩中及痔方出千金方蝟皮人參茯苓白芷禹餘糧乾地黃槐耳續斷各三兩蒲黃黃蓍當歸艾葉橘皮白斂甘草各兩白馬蹄酒浸一次炙令黃牛角腮各四兩鰻鱺魚頭二十枝豬蹄懸甲二十一枝炙右為末蜜丸梧子大酒服二十丸日再稍加鹿茸丸聖濟總録治諸痔漏牡痔脈痔腸痔血痔等鹿茸酒浸炙令黃附子炮裂去皮臍龍骨碎研黃蓍炙銼桔梗炒生乾地黃牛膝去苗酒浸焙芍藥人參白茯苓去黑皮各一兩一分枳殼去瓤麩炒當歸切焙蝟皮炙焦芎藭槐子微炒白礬煆火令升盡桂去皮三分黃連去鬚各一兩半蒲黃炒一兩右為末煉蜜丸梧子大每服三十丸空心煎柏葉湯下日晚再服神效散治洗痔凡富貴之人多嗜欲酒色過度喜怒不常致生痔漏或如鼠乳連珠或糞門腸頭腫流膿漏血其痛如割不可忍者但是諸種瘡痔漏及腸風漏血此藥治之苦參川椒苦葫蘆鮮荽子槐花枳殼荆芥金銀花小茴香白芷連翹獨活麻黃牡蠣煆威靈仙椿樹皮各二兩加老黃茄子二箇油炒右㕮咀每服五錢水六七碗蔥白二枝煎五七服沸去渣以盆盛藥水上坐先蒸後洗却以烏龍膏貼之卧時用再以藥渣熬水如前洗之如此三五次夜則以膏藥貼之常服葛花酒蒸香連丸多有驗槐子丸聖濟總録治燥濕痔痔有雌雄皆主之方方見本門久痔類槐實丸千金方治五種痔疾方槐實一兩黃蓍枳實麩炒貫衆白术肉豆冦仁防風去叉荆芥穗樗莢去皮炒紫色苦參厚朴麝香芎藭皂角子黃炒各半兩右搗羅為末麵糊調丸如桐子大食前米飲下三十九丸晚再服之蝟皮丸直指方治諸痔出血裏急疼痛槐花微炒艾葉炒黃枳殼製地榆當歸川芎黃蓍白芍藥白礬煆貫衆各半兩蝟皮一兩炙焦頭髮燒三錢各存性豬後蹄垂甲盈尺皂角一挺去弦核醋炙黃右件藥搗羅為末煉蜜丸如桐子大每服五十九丸未食前飲下療五痔下血不止方槐子五色龍骨槲葉炙令紫色乾薑芎窮當歸蒨根吳茱茰各六分白斂附子炮五分黃蓍五分大黃豬懸蹄甲十四枚炙髮灰四分右搗末蜜丸空腹服如桐子大二十丸日二漸加至四十丸若恐多服以意減之忌生冷炙豬魚蒜黃蓍丸療痔黃蓍青葙子漏蘆鱉甲炙狼牙各五分黃蘖四分豬懸蹄甲七枚炙蝟皮四分炙白礬十分燒存性芫青去足翅斑蝥去足翅炒蜈蚣各十條炒犀角屑八分右為末蜜丸梧子大空腹以飲服二丸日二增之以知為度忌一切油膩莧菜治五痔衆醫者所不能愈者秦芁白芷厚朴紫參乳髮紫苑各一兩雷丸藁本各二兩石南蟅蟲各半兩貫衆三兩虻蟲半兩豬後懸蹄十四枚右為末以羊髓脂煎和丸桐子大每服空腹米飲下十五丸日二服若劇者夜一服四日後覺肛邉癢則止八日後膿血出鼠乳悉瘥滿六十日則終身不復發能久服益喜忌魚豬肉等物收痔丸直指方諸痔通用阿膠炒酥黃連貫衆各半兩盈尺皂角去核醋炙蝟皮炙焦蜂房炒焦蛇皮略燒皂角刺略燒穿山甲插入熱久灰中令焦豬後蹄甲燒已上各存性當歸川芎槐花並用二錢半右為末米醋糊丸桐子大每服七十丸調氣用枳殼散下消血熱荆芥煎湯下食前服立聖丸聖濟總録治五痔及腸風下血槐花枳殼去瓤麩炒二兩半五倍子去灰土黃蓍蜜炙切槐莢各二兩豬蹄垂甲二十枚以上並各炒焦除令淨木賊二兩半何首烏米泔浸軟以竹刀切作片子焙乾于石臼內搗末稱和入諸藥臭橘一百枚刺蝟皮皂莢針四兩榼藤子二枚炒上四味各用藏瓶一枚成用鹽泥固濟各屆一穴出煙以灰火燒守候逐件煙盡退火各放冷取出研細皂子各三兩右為末蜜丸桐子大每服五十丸至百丸溫酒空心服烏蛇散聖濟總録治諸痔大腸下血烏蛇去皮肉骨酒浸炙蝟皮酒浸炙各五錢槐子炒天麻黃蓍桑皮酒炙枳殼桂去皮附子炮裂去皮臍當歸焙赤芍藥炙各三兩白礬燒半兩麝香研二錢右為散空心陳米飲調下二錢匕日晚再服溫酒亦得蝟皮丸聖惠方治五痔下血疼痛裡急不可忍蝟皮一兩炙令焦黃槐子仁二兩微炒龍骨二兩槲葉一兩微炒乾薑半兩炮裂銼熟地黃乾一兩當歸一兩微炒茜根附子用裂炮一兩去皮臍芎藭半兩檳榔一兩黃蓍一兩銼吳茱茰半兩湯浸七遍焙乾為末右為末蜜丸如桐子大每食前以粥飲下三十丸至四十丸日三治痔腫硬發歇疼痛久不瘥宜服此方聖惠方雷丸一兩紫參半兩當歸一兩白芷半兩槐子仁一兩微炒亂髮一兩燒灰貫衆三兩黃蓍一兩銼蟅蟲一分炒微黃石南三分虻蟲一分去翅足炒令微黃藁本一兩豬後懸蹄甲七枚炙令黃焦右為末蜜丸如桐子大每服食前以粥飲下三十丸釣腸丸危氏方治久新諸痔肛邉腫硬或生瘡癢時有膿血又治腸風下血及肛門脫出並宜服之亦治男子婦人下血栝蔞二枚燒存性蝟皮二箇碎銼爐內燒存性雞冠花銼微炒五兩白礬微枯緑礬枯白附子生用天南星生用枳殼去瓤麩炒附子去皮臍生用訶子煨去皮各二兩半夏二兩胡桃取仁十五兩燒存性不油者入罐內右為末以醋糊丸桐子大每服二十丸空心臨卧溫酒下逺年不瘥者服十日見效久服永除根本并除腸風等疾一方用雞肉無胡桃槐子丸出聖惠方治五痔下血痛不止槐實龍骨去土研槲葉乾薑炮當歸銼炒茜根黃蓍銼炒吳茱茰湯洗焙乾炒各一兩半附子炮裂去皮臍一兩一分大黃蒸三度炒二兩半豬懸蹄十四枚炙右為末蜜丸如桐子大每服空心米飲下二十丸日二服治五痔下血不止衆治無效宜服此方出聖惠方石南一兩半槐實一兩半微炒黃蓍一兩半貫衆一兩微炒附子一兩炮裂去皮臍蝟皮一枚燒灰黃礬一兩燒灰烏蛇三兩酒浸去皮骨酥塗炙黃白礬一兩燒灰髮灰一兩露蜂房一兩炙微黃枳殼一兩麩炒右為末蜜丸桐子大每空腹及晚食前桑枝湯下三十丸如聖散出聖濟總録治諸痔白蝟皮二枚燒雞冠花炒皂莢針炙各二兩栝蔞一枚燒胡桃十枚燒槐花二兩炒樗莢二兩酥炙黃蓍炙枳殼麩炒各二兩白礬緑礬各二兩半水飛右為散每服二錢匕酒和下或作丸服如聖丸出聖濟録治五種痔疾枳殼去穰麩炒威靈仙去土陳橘皮紅各一兩續斷炒白礬飛過當歸炒乾薑炮附子炮去臍皮生地焙用熟乾地黃連翹炒槐莢子各半兩炒香為度取莢內子右為末蜜丸桐子大每服十丸陳粟米飲下空心食前日二服如年深者加丸數疼痛甚者當日見效黑神散出王氏傅濟方治腸風痔疾羌活去蘆頭黃蓍黃荆實蔓荆實狗脊火燎去毛枳殼去穰麩炒檳榔栝蔞以盛盡藥為度不拘枚數去子留穰右味除栝蔞外等分為末入栝蔞中盛於沙合或瓦罐子內鹽泥固濟煆通赤候冷取出藥末更别用藥如後荆芥子白蕪荑二味與前等分木香比前減半右為散每服一錢匕空心茶酒調下日三蝟皮散出聖濟總録治五痔蝟皮炙鱉甲醋炙當歸大黃蒸三度炒各二兩露蜂房炙蛇皮炙藁本去苗土桂去粗皮各一兩一分豬後懸蹄十四枚炙右件藥搗羅為散每於空腹煮白粥飲調下三錢匕服日二服治五痔及脫肛出千金方槐白皮三兩豬脂半斤松子桃仁各十枚巴豆七枚薰草一名薰陸辛夷甘草白芷各半兩野葛六銖右㕮咀煎三上三下去滓以綿沾膏塞孔中日四五過蟲死瘥止癢痛大佳一方無葛黃蓍丸出濟生方治五痔出血疼痛榼藤煨用肉半兩川續斷酒浸黃蓍去蘆貫衆附子炮去皮臍黃礬别研蝟皮燒灰當歸去蘆酒浸阿膠蛤粉炒各一兩香麝别研一字右為末米糊丸桐子大每服七十丸空心米飲送下氣壯多熱之人免服皂刺丸出直指方治疼痛而復癢皂莢刺二兩燒煙盡存性防風槐花蛇床白礬白蒺莉炒去刺枳殼薑黃各半兩蜂房五倍子各一分右為末醋調草粉糊丸小豆大每服五十丸以苦楝根煎湯下仍用童子尿熱入白礬末淨洗肛門誥後丸出聖濟總録治痔連翹附子炮去皮臍桂去皮槐莢白礬枯飛杜仲去皮炒枳殼去穰麩炒黃香當歸切焙藁本右件藥等分為末蜜丸桐子大每服十丸米飲下空心日二藜蘆湯出聖濟總録洗痔䔧蘆附子莽草蛇床羌活獨活當歸苦參芍藥各一兩蜀椒去目半兩右味搗篩每服兩撮生絹袋盛桑松柏枝各一握生薑一塊拍破銀石器中以水三碗煎熟去滓傾入器中乘熱薰候溫洗之黃蓍丸出聖惠方治五痔下血不止疼痛壅塞不通黃蓍一兩蝟皮一兩炙令焦黃當歸一兩微炒桂心三分槐子仁二兩白礬燒一兩麝香一分細研入枳殼二兩炒黃附子一兩炒去皮臍白花蛇一兩酒浸微黃炙右為末蜜丸桐子大每服食前煎柏葉湯下三十丸拔毒散敷掃痔腫毒處大黃黃柏白芨石膏黃芩各五錢白斂黃連梔子各三錢朴硝右末用井花水調塗宣毒散丸苦參荆芥當歸川芎玄參白芷各半兩牽牛一兩半烏蛇一條青黛半兩右先將牽牛巴豆肥白者去殼十粒慢火燒令色黑去巴豆不用只用牽牛同前九味為末將煨熟大蒜擂細看稀稠得所即時糊丸桐子大每服空心以鹽酒送下一十丸如神丸一名烏蛇丸出聖濟總録治腸風五痔烏蛇酒浸去皮骨炙大黃濕紙裹煨防風去蘆各二兩黃蓍秦芁去苗一兩半枳殼去穰炒蝟皮炙黑焦陳皮浸去白焙土蒺莉炒去角右為末蜜丸桐子大每日空心酒下三十丸夜卧更服當日血止痛定丁香爛飲丸治痔丁香木香廣茂三稜丁皮各二分右為末水浸蒸餅丸如桐子大每服三十丸食後白湯下乳香丸出和劑方治諸痔下血肛邉生肉或結核腫疼或生瘡癢痛或大便難肛腸脫出又治風腸下血無問新久及諸漏根在臟腑悉能治之枳麩炒牡蠣火煆蓽澄茄芫花青去頭翅足炒黃色大黃蒸焙鶴虱炒各半兩白丁香乳香研各一兩右為末粟米糊丸梧桐子大每服十丸至十五丸如治腸風臘茶清下諸痔煎薤白湯下諸漏煎鐵屑湯下並前服一方無白丁香枳殼黃蓍丸出經驗良方治痔枳殼黃連各五兩白雞冠黃蓍各一兩荆芥二兩半右為末糊丸每服三十丸荆芥湯下洗痔訶子散訶子甘草大黃荆芥白芷三賴子藿香防風各等分右藥煎湯洗治男子婦人痔瘡黃連一兩松香二兩黃柏一兩銅青二兩明礬一兩生輕粉三錢半右為末乾敷