body:
  text: 普濟方卷八十六明周王朱橚撰眼目門一切眼疾難治治氣昏蒙出海上方赤芍藥黃連檳榔荆芥石菖蒲蒼术白芷當歸去鬚各等分右研為細末食後臨卧用津液舌上調傅眼患處立愈一方出海上方右用爐甘石一兩用川蜀道地粉者佳臘水浸地黃一宿却取連水浸甘石一宿以沙鍋火煆却於水內淬七次加當歸末半兩海螵蛸虢丹各半錢輕粉一釐蜜二兩麝香少許祕方紫金膏出海上方黃連十兩淨槌碎黃皮十兩去皮外洗銼右以臘水於淨鍋煎取一升濾滓冉用水二斗煎取一升復以重絹綿濾杏仁三七粒去皮尖研極細作膏蕪荑半兩去皮研細右以前藥水同於銀石器熬成膏黃丹五兩先用細絹羅了再研極細銅青淨輕粉各四十文右同入前膏子內不住手攪勻再用艾葉二十片重搗去麝殼燒煙熏藥膏子了然後丸如皂子大陰乾密器收藏用腦麝養久留為妙每用一丸井花水磨點又一方出海上方治一切眼疾腦子細研麝香各四分黃丹輕粉各一兩蜜一斤北葶二爪甲許將盞子盛於用火飛遏取淨潔者蛘粉一兩右先用黃丹蛘粉入蜜內打勻於飯上蒸一周日蒸時又入煎了黃連少許最佳蒸時令熱了將新綿濾過次入腦麝北葶同和打勻又甑上重蒸少時令熱將淨瓶內貯之用銅叉頭點之眼中資聖點眼藥用竹筒貯之撥雲散出經驗濟世方治一切眼疾黃芩石膏别研荆芥穗蒼术甘草甘菊花蟬退洗旋覆花各一兩右將甘菊旋花用好酒拌勻蒸過熟晒乾杵為末每服二錢茶酒調下三服花全蝎散治夾腦頭風一切眼疾全蝎一錢半細辛藁本羌活川芎防風各五錢白花蛇三錢炙右為細末每服一錢臨卧茶清調下祕方點眼藥出海上方治一切眼疾不問年月久近者代赭石爐甘石各一兩用童子小便淬七次黃丹四兩水飛過蜜一斤四兩硼砂腦子各三錢右先將黃丹蜜用銅鍋炒成紫色然後用河水十二大碗滚五七沸然後將二藥為末下銅鍋用蜜水煉以栁條攪煎成膏滴在水內不化為度將絹一重皮紙五重濾過盛在盞內牢封褁口埋在土內去火毒次日取出將腦子硼砂一處研細放在瓶內攪勻點不問逺年一切昏眼害眼皆治却忌房事上十分昏者點五七次必微腫却少歇再點復陷即愈神效又方出海上方治一切眼疾黃連一兩以水煎至一盞綿濾去滓朴硝黃丹光粉好粉各半兩蜜二兩右除黃連外細研同蜜煎煉稠入黃連汁以四五重綿濾過候冷再入腦麝一錢用點之神效治一切眼瘴真珠五百枚蕤仁五百枚南硼砂五百枚北硼砂五百枚腦子一兩麝香二錢半右共三兩二錢半為末研極細點眼上治眼花方水二碗半杏仁七箇為兩半甘草一寸銅錢四十九文明者用之黃連一寸銅緑少許右用銅鍋內煎至一碗去滓溫洗之合眼少許又用青鹽一錢又方洗眼黃連杏子當歸銅青滑石細辛各等分右用帛裹分粗末水浸洗之治三十年失明出千金方鍾乳粉雲母各煉成細辛茯苓逺志五味子各等分右治篩以酒服五分己日加三加至一錢黃芩黃連湯治一切眼疾黃芩黃連各酒洗各二兩酒生地黃草龍膽酒浸四遍炒四遍各一兩右㕮咀每服二錢水煎服椒紅丸出三因弓明目暖水臟補虛久服駐顔縮小便川椒取紅四兩巴戟去心金鈴子銼炒附子炮去皮夫茴香炒各一兩右為末别用乾山藥三兩為末酒煮糊為丸如梧桐子大空心鹽湯送下三五十丸黃連膏出瑞竹堂方治一切眼疾黃連十兩去鬚蕤仁三錢炒研杏仁七十箇浸去皮尖草龍膽三兩去土木賊去莭七錢右將藥各擇洗淨用水一斗浸之春秋三日夏二日冬五日入鍋內熬至半升濾去再用水七升熬至小半取出用重絹濾過再熬至半升傾出於碗內重湯煮為膏子盛於瓷器內每用米粒大於盞內用水一滴化開以叉頭點之三五遍口內覺苦效川芎散出海上方川芎白芷細辛龍腦葉豬芽皂角子右等分為細末嗅入鼻中碧霞散出危氏方洗眼銅青三錢滑石一錢土膏半兩輕粉麝香各少許右為末每用少許湯泡洗竹葉飲子療熱風暴赤臉爛生瘡或磣或疼或癢或痛久患虛熱逺視不明喻若隔絹看花或服石乳發動冷熱淚出不明赤紅腫脹漸裹眼珠皆稱肝膈實熱腎腸已虛宜先服此然後可藥竹葉一握乾葛甘草炙各三兩地骨白皮薺苨各五兩右切以水二小升煎取半升去滓內車前子三兩半分三服一日令盡食後服之不過三劑眼中疼痛歇次得點一無疼痛亦須傅藥抽熱毒風不然恐尋經脈入眼熱深入赤難瘥也又取羊肝一具或豬肝豬肉精處亦堪取三斤皆須破作手許大片厚薄亦如手掌候其疼處或從眼後連耳上頭或從眉向上入頭掣痛者急以新汲水漬令極冷貼疼痛脈上及所患部分候肝或肉以大槩稍暖則易之須臾間熱如煮豈不是熱毒之候出也齋忌之月無肉還作四五替如漬乾肉法更互尉之其疾痛或連鼻中酸辛者並是難差之候並宜急治又用藍莖葉搗如泥傅痛處亦有瘥者十得三四凡起此患不宜久忍痛若深入於眼中漸成痛疼花草膏出直指方治患眼腫痛澀癢昏淚羞明用羯羊膽一枚飯上蒸熱以冬蜜研和入硃砂末少許頻研成膏食後臨卧炒少許含咽亦可點目點眼藥出危氏方用大田螺一箇淨養去泥然後入瓦合中以腦麝少許入田螺掩中封起候十日餘開即成水點之金露膏出濟生拔萃治一切眼疾除昏退翳截赤定痛蕤仁捶碎黃丹各一兩黃連半兩蜜六兩右先將黃丹鐵鍋內炒令黃色至紫色入蜜攪勻下長流水四升以嫩栁枝五七莖把定攪之次下蕤仁候滚十數沸又下黃連用栁枝不住手攪熬至三升罩籬內傾藥在紙上慢滴之無令塵汚如有瘀血加硇砂末一錢上火煨開入煎膏子內用通關散出直指方治一切眼疾細辛川芎腦荷蔓荆子等分右為末每用半錢嗅入鼻內良又頭風門消風散加細辛皆可通用青金散出儒門事親芒硝一兩螺青沒藥乳香各少許右為細末每用少許鼻內嗅之眼藥出百一選方治一切眼疾蕤仁細研竹紙褁壓去油蕪荑仁新者細研竹紙褁壓去油二件各四十九粒透明硼砂如指大細研如磨翳多用之赤目少用之生龍腦如硼砂大細研右同研勻將沙糖如指大先篩極細須夾紙篩過與前藥再研極細銀磁盒子收之以銅筯點眼中百疾皆治之洗眼荆芥散出余居士選竒方荆芥五文黃連五文杏仁三文鉛山白墡土三文右件銼碎煎湯洗之立明纍見其效龍膽膏治眼疾黃連四兩洗淨銼用水四盞慢火熬成膏去渣蜜一斤慢火熬令得所却入黑膏子熬黃丹少許龍涎粉一兩即膩粉右將先前藥膏蒸後入粉再用半盞水研細傾入蜜藥膏在內慢火熬用篦子攪令紫色傾在罐子內再用水半盞洗熬藥器物依前傾入藥內却入麝香半錢片腦半錢攪令勻遇患點之諸般患眼方朴硝一斤薄荷二兩梅花腦一兩麝香五百文右先用小甜瓜末黃者取子出淨却將朴硝水洗淨將鍋內煎如鹽又將薄荷相間朴硝置之瓜中却封紙袋挂在風頭處或一月二月取下瓜刺落瓜內硝為細末却用腦子麝香少許調勻點之四聖丸出傳信適用方治逺年近日風赤翳膜攀睛倒睫等眼疾川椒去合口者并細黑子不須去白搗羅末下土銚內熬令得所鋪紙一張於地上傾椒出火毒熟乾地黃枸杞子荆芥穗右等分為細末煉白沙蜜為丸如梧桐子大每服十丸至二十丸空心鹽湯下治眼疾開元銅錢四十九文槐條四十九根每長一寸枸杞根四十九根每長一寸好醬水碗大右同煎用小盞臨卧點之立愈神仙藥應丸陳皮生地黃男用熟女用生人參各一錢丁香母丁四箇小丁三箇右用薑汁調麵餅裹前藥於慢火內煨候麵熟藥香取出去麵將內藥安石臼內用北棗三十箇合舂分作十丸先用一丸細咽用無灰酒吞下將綿被重蓋出汗透旋去被每日再服一丸五日效神麯丸出龍木論一名千金神麯丸主清目百歲可讀細書常服益眼目諸方不及此方神效勿傳非人神麯炒四兩辰砂研磁石火煨醋淬七次各二兩右為末煉蜜丸如梧桐子大每服二十丸米飲下常服益眼方用辰砂磁石猶火之畏水也今合用之砂法火而入心經磁法水而入腎經心腎各得其養則目自然明神麯倍於二品者無他目疾總由脾胃有痰飲清浸於肝久則昏眩用以健脾胃消痰飲故極效衆方不可及也一方加夜明沙一方用神麯打糊為丸視星膏出瑞竹堂方治內外障赤毒氣赤目一切翳膜一名捲簾膏白沙蜜一斤煉去蠟滓可稱十四兩蜜陀僧一兩金色者研極細水淘可得六七錢新栁條子四兩去皮心半乾半炒右用臘雪水五升與蜜鎔調入藥與栁條子同貯於磁瓶中以柳木塞瓶口油絹封雜於黑豆鍋內熬從朝至暮仍用柴棒閣瓶防傾側用文武火另添一鍋豆水滚下施於另鍋中取水添之熬成用重綿濾淨却入瓶中用井水浸三兩日埋在雪中更妙頻點為上靈寶膏出楊氏家藏方黃丹乳香各三錢蜜二兩右以磁器安藥在中慢火熬成膏子埋地下出火毒每一豆大許塗目四傍目熱赤以生地黃汁調或龍腦薄荷汁調風氣眼荆芥湯調爛弦風眼用楓木孔中水如無用楓乳煎湯調虛眼煎黃耆湯調有淚者宜用飯飲調塗銀青丸出仁存方洗諸眼患銅青半兩另研薑粉末二錢半爐甘石煆半兩右為丸如龍眼大以紗袋盛當風挂之每用一粒沸湯泡洗再溫再洗可用五六次一方洗眼收淚用銅青白墡土水丸雞頭大沸湯泡洗名青金丸龍腦膏治眼赤􅀈瞼赤爛出仁存方龍腦研一錢杏仁去皮用紙罩去油二錢半右共成細膏用飯子乳汁調勻磁器中盛每以銅筯點少許入眥頭日二三次兼治赤眼㵼肝散出海上方大黃黑牽牛各二兩白芷一兩右為細末每二錢空心臨卧溫酒調下金蓮子散出醫方集成治肝經不足客熱風壅上攻眼目赤澀睛疼瞼爛怕日羞明夜卧多淚時行暴赤兩太陽穴疼頭旋昏眩視物不見漸生翳膜並皆治之黃連當歸赤芍藥右等分沸湯泡待澄清然後再於火上溫熱用絹帛蘸洗冷即復暖一日數次直至口中覺黃連味方得加淡竹葉尤妙加滑石等分即明睛散也凡睛病皆血凝滯所致故以當歸芍藥行血黃連去熱其血得熱則行故乘熱洗之也忌一切淹藏魚鮓酒麵等毒一用當歸半兩芍藥黃連甘草各二錢半為㕮咀煎至八分以紙蓋瓶口開一小孔無風處薰眼冷則再溫隨意薰之畢就服之為效經驗方陳氏云余少嘗患此得方秦皮湯治黑睛反瞳人有瘡翳一切眼疾皆宜洗之秦皮一兩梔子仁二七枚淡竹葉一握右切綿褁以水一升半煎銅器中煎三五沸以綿濾取洗眼須用淨器盛之杏連湯出危氏方治患眼杏仁去皮尖七箇炒黃連一錢赤眼用七莖棗一箇拍去核赤眼用去核大者同上用器盛用水八分熬取二三分再蒸溫取汁點之右用水一小盞飯上蒸熱乘熱蘸熏洗再蒸再洗可用五次七次一方將三味搗碎以河水二大碗煎至一碗乘熱洗良久再暖復洗五七遍立愈忌炙煿酒麵等物朱氏集驗方用新瓦盆盛貯入水八分以紙覆蓋慢火熬存二三分放在地上去火毒候冷存在湯瓶上蒸溫不要熱病者仰卧令人滴藥汁在眼大角近鼻者候口中苦味即是藥透如未知苦則一面滴數次即安其效如神重明膏治一切眼目柯子一兩銼去核黃連五錢黃丹三兩水飛右為細末用好蜜十兩熬去白沫濾淨入前藥末於銀銅器內用文武火慢熬用槐條攪成膏紫黃色為度用淨磁器盛貯於地內埋一伏時去火毒每用一豆大溫水化開洗眼三仙丸明目甘菊花一兩蒼术米泔浸去油椒紅各二兩右為細末酒糊丸桐子大每服三五十粒食前茶酒下蜀椒丸一名蜀椒丸傳適用方治一切眼目或見黑花及生障翳久近不痊者地黃一斤洗淨焙乾川椒一斤去合口并子焙乾蒼术三斤米泔浸三日焙乾右為細末麵糊為丸梧桐子大每服三十丸食前溫酒或鹽湯下日二服一方鍊蜜為丸洗目槐條荆芥芍藥右湯泡洗之撥雲散治一切眼內外翳膜遮障磣澀疼痛羞明怕日努肉攀睛及冷熱淚楮實微炒一兩荆芥穗半兩甘草各銼一分右為細散每服二錢臘茶調下食後臨卧服菊花丸治一切眼疾明目菊花四兩烏頭生去皮臍二兩黑豆二合生去皮為末滴鹽水爛研為膏右先將上二味入黑豆膏內和搗丸如梧桐子大每服三十丸空心溫酒或鹽湯下木賊散治一切眼疾木賊小便浸七日取出曝乾甘草炙銼各一兩蒼术四兩河水浸一日去皮用陳粟米泔浸七日控去片切曝乾右為散每服二錢空心臨卧茶酒調下周益公陰德録出永類鈐方有貴官患氣障眼不見光明夢觀音授方蜜蒙花散撥雲散菊花散右和勻茶清調日三服光明復初治一切眼疾爐甘石煆一兩盆硝一錢研右為末細研煎泡洗亦效二百味草花膏出仁存方治白眼赤眼爛眼障眼羯羊膽蜜右用白沙蜜二錢填滿線繫定攪令勻蒸熟冷水內浸候乾研細為膏入角罐子內銀銅筯點眼四角立效蜂採百花羊喫百草故以此名一方入沙腦子以罐密封收貯久者膽方可用每一銅筯點眼卯戌丸出海上方絲子去沙用無灰酒浸一宿逼乾隨飯蒸熟入鉢臼搗三五十下取起焙乾用十兩枸杞子去枝根㨂淨十兩右為細末煉蜜為丸如梧桐子大每服三十丸冷酒熱水茶下辰砂膏出王氏傳濟方治白眼目一切疾白龍腦烏魚骨研至細飛過用川硝麝香少許牛黃牙硝甘鹽石膽各少許朱砂明壁者少許膩粉一錢右用研令勻至細為妙入白蜜和令得所以銅筯點之去瘟障變白明目夜中見光出本草以麥門冬及車前子乾地黃為丸食後服之治患眼痛出本草取真珠末并黃連內於田螺中良久汁出取汁注目中多瘥洗眼眀睛散出本事方馬牙㨂淨一兩青礬少許右用研勻水調文武火煎乾出火毒一宿次用蔓荆子防風二味為極細末各三錢重入前二味同拌勻每服一匙同百沸湯泡洗點眼水膏出本事方鵝梨一箇雞瓜黃連去毛洗淨半兩右用砂瓶一隻先入梨次入黃連末候初冬第一次下雪時取雪滿鋪入砂瓶內用油單封口入地五寸深候立春日交春時候過了取出點或溫過洗妙光明散出海上方治一切眼疾不問病因爐甘石黃連各四兩右先將黃連細銼用新汲水二升將黃連浸之三四日後藥味已出去黃連滓用汁將爐甘石火內煆至黃連汁盡了地上出去火毒用乳鉢內慢慢細乳之用水半碗水內飛之去砂以盡為度用甘石末四兩再入乳鉢內細細研之入腦子一錢麝香一錢再研細為度每用一匙或點或沸湯泡洗之一方無麝香用水煮點眼方出聖惠方治一切眼病海螵蛸末一錢一名烏賊魚骨腦子少許右研細銅筯點入眼中一方洗亦可六一丸傳信適用方明目養血補氣七錢附子兩隻炮去皮尖臍取肉一兩當歸去蘆尾取身切片晒乾取肉六兩右為細末蜜丸如梧桐子大每服三五十丸溫酒或鹽湯下食前治眼疾白礬如米大山梔子一箇右溫水洗之治一切眼疾以春三月收穀木軟葉曝乾為細散一兩入麝香一大豆許重研為細末以小杖子挑取如黍米注目眥內眼開其翳自然漸消落治一切眼疾不可效者以人耳中塞如濕曝乾為末以小粟許每夜上注之良春雪膏朴硝十斤右用水一桶攪勻入鍋內煎先下蘿蔔一箇同煎熟又下二個蘿蔔煮熟為度同新綿鋪上在絹羅上濾過再煎數沸再濾過瓦盆內明早去水已結白牙子却收豬魚牛膽汁澆在硝上用豬胞或牛胞盛之扎定置錫盒中三七日取出用生絹袋盛之當風挂粉却用腦子麝香入之隨意研勻入磁器內密封每帖燈心二寸黑豆二粒以青紙作貼盛一錢作二服仍用內燈心蘸藥點兩眥頭良明目令髮不落方以十月上己日收槐子內新淨甕中以盆密封口三七日發封洗去皮取子從月一日一枚日别加計十日五十五枚一月日服一百六十五枚一年服一千九百八十枚八月減六十枚此主補腦早服之髮不白好顔色長生益夀先病冷人勿服之又方出聖惠方治一切眼疾長服明目令髮不落以牛腦中漬槐子隂乾百日食後吞一枚十日身輕三十日白髮再黑百日通神又方出仁存方治一切眼疾以木賊草打指甲細末同硃砂末等分再研極細以露水攪為丸如芥子大每服一粒夜卧點入眼內夜半更點一丸入腦子尤妙經進洗眼方出海上方昔武勝軍朱仲孚患青盲二十年依此法服之二年而目明如故用廣其傳以白乾青桑葉及新所曬乾非自乾者逐月按日就淨地上燒灰存性每以一合於新瓷器內煎減二分傾出澄極清者再以金盞就火上溫熱用手撑開眼洗百度一方按月收如正月一日二月二日三月三日等類最佳以水內碗浸飯上蒸洗之亦妙此方屢試有驗時時洗之尤佳逐月日列于左正月初八日二月初八日三月初六日四月初四日五月初五日六月初二日七月初七日八月二十日九月十二日十月十三日十一月初二日十二月三十日神仙一點散出海上方治一切患眼諸藥不效者以清白鹻黑碎者不用不拘多少以七數為則去邉頭不用取純乾淨者以好厚紙七層包之拴縳挂在當風處待風化四十九日取下要時研極細如半粒菉豆大點眼徐神翁洗眼方出海上方以柘樹煎湯洗眼遇洗日自寅至亥一日洗十箇時無不效洗眼良日列于左正月初一日二月初二日三月不洗四月初四日五月十三日六月十一日七月初七日八月初二日九月初二日十月十九日十一月不洗十二月十四日還光丸出海上方治一切眼疾以白芷切炒黃研末煉蜜為丸如龍眼大硃砂為衣每服一丸食後清茶調下或荆芥茶尤妙又方出海上方治一切眼疾以生冬青葉研細入朴硝水調􅂒貼之治鹽擦眼出經驗良方治一切眼疾用籠蒻燒灰淋汁洗之久久可效荆芥穗方出龍木論治一切眼疾血勞風痛頭旋眼眩以荆芥穗子為末酒服二錢七助陽和血補氣湯治眼發後上熱壅白睛紅多淚無疼痛而隱澀難開此服苦寒藥太過而真氣不能通九竅也或眼昏花不明防風七分黃耆一錢甘草炙半錢蔓荆子三分香白芷二分升麻七分柴胡五分當歸身酒洗半錢右㕮咀作一服水一盞半煎至一盞去滓熱服臨卧忌氣寒及食冷物敷藥瞿麥散治一切眼疾兼目腫痛浸淫等瘡以瞿麥炒令黃色為末鵝涎調逐時塗眥頭疾開或搗汁傅治目中病以雞舌香黃連乳汁煎點之治一切眼目并牢齒烏髭鬚皆宜以黑鉛半斤大鍋內鎔成汁旋入桑條灰栁棍攪成沙熟絹羅為末每日早辰常擦齒牙後用溫水潄在盂子內取用其水洗眼治諸般眼疾髭黃白者用之皆變黑也治目疾方用象睛和乳滴目中黃連丸治眼以黃連不拘多少捶碎用新汲水一大碗浸至六七日後用綿濾過取汁入厚碗內却以重湯上熬不住以匙蕩攪侯乾為度即穿地坑子可深一尺以瓦鋪底將艾四兩坐瓦上以火燃如灸法然後以碗覆上四畔泥封開孔令煙出盡即止取出刮下丸如小豆大每服十丸甜竹葉煎湯下明目去眼中膿水方以上伏日採犬膽以酒服之良枳殼方明目用枳殼一兩杵末如茶法煎呷之槐葉方明目用嫩槐葉一斤蒸如造炙法取藥葉研末如茶法煎呷之茯苓方明目以茯苓搗細於水盆中攪令濁浮者去之是茯苓筯若誤服令人眼中瞳子并黑時作昏花目盲切記之取其沈好者用佳柏實方治一切眼疾一方以柏實不拘多少服之能益氣除風久服耳目聰明一方治一切眼疾及生膚赤白膜以蛔蟲燒為末傅之一方用小兒吐下蛔蟲隂乾生用碾為末輕粉和勻如濕乾摻如乾以津唾調傅如聖散治上焦壅熱一切眼疾桂去粗皮鬱金各半兩馬牙硝三兩甘草一分右為散每服一錢臨卧新汲水調下服藥畢去枕卧少時令藥行到眼中覺痛淚出為度小兒十嵗半錢五嵗以下一匙治目翳及物入目又療氣赤眵淚用羅勒子三五顆致目中少頃當濕脹與物俱出枸杞煎取枸杞自然汁銀石器熬成膏入白茯苓末白沙蜜黃蠟少許每服一匙溫酒鹽湯化下明目方用車前草自然汁調朴硝末卧時塗眼胞上明早氷洗去妙又方輕身益氣明目蕪菁子一升水九升煮冷汁盡日乾如此三度搗末取服方寸匕日三炙肝散治一切眼􅔾麻子一升揀去土杵為末以豶豬肝一片如手大薄批作五七片於藥末蘸勻炙乾再蘸再炙末盡為度搗為散每服一匙止空心臨卧陳米飲調下服五七服加半匙又五七服加至半錢止治諸般赤眼攀睛雲翳菖蒲根不拘多少擂碎濾自然汁用文武火煉作膏子點效蟬花散治風眼氣昏淚癢翳膜或頭風牽引眼小胞爛一名蟬花無比散當歸防風羌活石決明用東流水入鹽煮一伏時搗研入粉各三兩蟬殼洗晒甘草炙各二兩荆芥蛇皮皂角水洗新瓦焙細辛各一兩茯苓四兩蒺藜炒去角八兩芍藥蒼术童尿浸二宿去皮切晒久一十兩川芎三兩右為細末每服二錢食後米泔清茶任下神聖膏一名太良膏出海上方治一切風眼眼目昏花兼諸般雲翳眼疾內外障風赤冷淚等眼訶子一對黃連去鬚土五錢烏魚骨去殼二錢青鹽一錢走水洗淨以上四味研羅為極細末黃丹四兩用青碗淘飛晒乾於銀石器內炒紫攤紙上地下放令去火毒研細末右用白沙蜜六兩於銀器內鍊清濾去滓稱四兩洗下黃丹用槐栁條攪勻慢火熬時時不住手大忌火緊將稠出火再下餘四味藥末攪勻上火再煎只要極稠深紫色成膏子手試不沾手為度乘熱用竹篦刮出放於磁器內每用豆粒大湯泡洗眼大效熬藥忌銅鐵器一名海青膏治雲翳內外障人參羌活散治風眼熱眼澀癢昏朦羌活獨活柴胡人參川芎枳殼麩炒茯苓各半兩前胡桔梗天麻地骨皮甘草炙各二錢半右為末每服一錢半荆芥煎湯調下聖效散出經驗良方諸般風熱風癢熱毒大人小兒生翳生膜生血筋但是一切障眼疾並可服如內障却不可服及治眼有紅綿紅血并眼生糞黃芩北細辛甘草熟地黃大黃山梔子赤芍藥當歸尾極細牛蒡子各二兩菊花桑根白皮二兩有翳膜多加一兩如無翳膜止依等分右為粗末每四錢水一盞半煎至八分去滓臨卧溫冷服兩滓再煎早食一服午食一服臨卧一服忌雞魚酒麵糯米醎醋熱油諸般生冷毒物目乃一身之主如不忌口藥亦無功自陷此身生入地獄每日只白煮精豬肉咽飯或山藥蘿蔔菜不可用熱油更不可喫棗子柿子生銀杏土瓜棐子生菖蟬花無比散出翳方大成治大人小兒逺年日近風眼攻注眼隱澀昏暗瞼生風粟或癢或痛漸生翳膜侵睛遮障視物不明久患偏正頭風牽抽兩眼漸漸細小連眶赤爛小兒瘡疼入眼白膜遮睛赤澀隱痛赤芍藥十三兩防風甘草炙白茯苓去黑皮各四兩蒺䔧小去角半斤羌活三兩蟬殼微炒一兩蒼术浸去皮炒十二兩當歸洗焙川芎石決明用鹽同東流水煮一伏時濾出研細如粉各三兩右為末每服三錢食後米泔茶清任調袪風退翳明目一方加蛇脫一兩忌食發風毒等物碧雲丹出宣明論點一切惡眼風赤者龍腦麝香硇砂各三分血竭乳香銅各一錢硼砂三錢右為末滴水和丸如梧桐子大每服取一丸新水化開點之治眼腫痛出經驗良方用生薑新水爛者連皮切取自然汁調飛過白礬末貼放眼胞上痛止勿令藥入眼內乳香散治一切眼疾昏澀熱淚赤脈努肉蔽遮光明及風痛癢不止乳香研三錢銅緑研馬牙硝研各一兩龍腦研二錢輕粉半分右各别研了更用同研每半錢匕新汲水調洗之青蘘方青蘘味甘寒無毒主益氣補肺常服耳目聰明治上焦積熱攻眼目昏花右涼膈散與四物和合為細末蜜丸如梧桐子大五十丸臨卧茶清下顧含養嫂失明出肘後方含嘗藥視膳不冠不食嫂目疾須用蚺蛇膽含計盡求不得有一童子以一盒授含含開乃蚺蛇膽也童子出門化為青烏而去嫂目遂瘥通聖散治婦人血風眼烏賊魚骨二錢銅青一錢右為細末每用一錢熱湯泡洗如冷再蕩令熱更洗一次當歸散出朱氏集驗方治一切眼疾川芎菊花當歸尾荆芥羌活生熟地黃防風乾葛白芍藥各三分右粗末白水煎候入生地黃汁數點磁石丸出朱氏集驗方治目清神磁石煆醋淬十次白术神麯枸杞子橘皮當歸人參熟地黃辰砂朱滕白茯苓乾菊花右等分為末酒糊為丸白湯吞下五十粒青金散出朱氏經驗方治眼四季發動羌活甘草荆芥熟生地黃川芎鬱金地骨皮桑白皮各一兩右㕮咀每服三錢水一盞煎至八分食後熱服清涼枕法出本草羌活川芎淡竹葉防風防己菊花黑芎當歸芍藥枸杞子蜜蒙花山梔子荆芥薄荷甘松香白芷旋覆花地骨皮各等分右為粗末用袋子盛之枕頭羊肝丸出本草用黃連末一大兩白羊子肝一具去膜同於砂盆內研令極細衆手撚為丸如梧桐子大每食以暖漿水吞下二七枚連作五劑瘥但是諸眼目疾及障翳青盲皆主之禁食豬肉及冷水劉禹錫云有崔承元者因宦治一死囚出活之囚後數年以病目致死一旦崔為內障所苦喪明逾年後半夜歎息獨坐時聞階除窸窣之聲崔問為誰曰是昔所蒙活者囚今故報恩至此遂以此方告訖而沒崔依此合服不數月眼復明因傳此方於世烏賊魚方出保生方治疳眼烏賊魚骨牡蠣各等分右為末糊丸如皂角子大每服用豬子肝一具藥一丸清米泔內煮肝熟為度如食肝用煮肝泔水下三兩服龍膽飲子出衛生寶鑑方治疳眼流膿生疳翳濕熱為病神效亦治寒濕為病青蛤粉半兩羌活三錢草龍膽三錢炒黃芩二錢蛇退皮半錢麻黃二錢半穀精草半兩升麻二錢川鬱金半錢炙甘草半錢右為細末每服二錢食後茶清調下忌辛熱之物白藥子散出直指方治一切疳眼赤爛目生翳膜內外障疾并治小兒吐痢疳瀉白藥子一兩甘草半兩右為末用豬肝一片批開摻五錢水一大盞煮熟食後服茺蔚子丸出衛生家寶方治氣眼退翳茺蔚子一兩蓽澄茄一兩石決明一兩煆青葙子一兩人參半兩白术半兩茯苓一兩甘草半兩炙枸杞子一兩羌活一兩右為細末鍊蜜為丸如彈子大每服一丸細嚼用清茶送下大明散出王氏博濟方治一切風毒氣眼翳膜昏睛眼澀疼熱淚時出蟬退白蒺藜川羌活黃耆荆芥穗烏蛇皮各等分蛇皮蟬退三味入瓶子內蓋口煉煆過右同為末并二錢燒者研令勻每服一大錢酒調下一日三服神妙夜光育精丸出家蒙經驗方養神明育精氣主健忘益智聰補心血下壅燥潤顔色逺視移時目下􅉩􅉩腸腑調適久服目光炯然神守泰定語音清徹就燈永夜眼力愈壯並不昏澀不睡達旦亦不倦怠服兩三月後覺神清眼明志強力勝步履輕快體氣舒暢是藥之效常餌如飲食一日不可輕惟在修合洗濯潔淨藥材件件正當不宜草率熟地黃洗晒乾以酒浸逺志淨洗就砧上挑捶碎取皮去骨木牛膝去蘆頭兔絲子洗淨晒乾别以酒浸别研如泥枳殼淨洗去穰麩炒赤色當歸淨洗晒乾焙亦得地骨皮須自取淨後淨砧上捶打取皮右為等分逐件稱過分兩平除地黃兔絲子别器用酒浸其餘五味同銼細共入一鉢內或瓷內若每件拾兩都內第一等無灰濃酒六升半浸三宿取出文武火焙乾須試火令得所不可太猛恐傷藥性十分焙乾搗羅為末以兩手拌令十分勻煉蜜為丸如豆大每服空心鹽酒下三十丸增至四十丸亦得不妨若不飲酒鹽湯亦得但不如酒好煉蜜法冬五滚夏六七滚候冷以紙貼惹去沫丸後却入微火燒傾入甕收黃牧仲司諫常服此藥晚嵗目視甚明硼砂散出十便良方點睛止淚明目右用薑不計多少刮去皮洗淨略俟水氣乾捶擦以夾絹袋裂汁淨器中盛澄一兩日蓋之撇去清者其淀熳􅏼乾研細如粉用硼砂等分合研勻令細瓷合收之每用銅筯點少許於大小眥間點之去昏與風毒如神藥性論出肘後方空心用鹽揩齒少時吐水中洗眼夜見小字良觀音應夢熊膽丸出衛生家寶方治雙目失明內外翳障年深日近醫治不瘥者南熊膽一錢蔓荆子一合水淘仙靈脾一兩旋覆花半兩麒麟竭一錢草龍膽一兩防己二兩半黃連瞿麥半兩蜜蒙花二兩半甘菊花半兩蕤仁二錢半蛇退一兩炙地骨皮一兩羌活一兩半木賊一兩去腳羯羊肝一具一半生用一半煮熱焙乾右為末將生羊肝去膜乳爛入藥一處搗勻丸如梧桐子大每服三十粒食後用米飲下吞神驗驅風散治眼之法先須治風風候既息用藥攻治則易見其效眼疾無問重輕新久欲調治先進此藥數服却隨症副以他藥無不立見效者或無别藥相間多服尤佳若患雷風眼諸症候只此藥一劑不必别藥服之可以斷去根本仍治新久偏正頭疼或暴赤眼三兩服即如脫去川烏兩斤大者一炮去皮尖不用皮尖用生天南星一個大者有油盆粉白者生用川芎半兩白附子半兩生用藿香葉半兩荆芥穗半兩石膏半兩火煆右為細末每服一錢入好茶末半錢薄荷五葉白梅一個水一盞煎至半盞乘熱便用紙覆盞面冗小竅如指令通氣薰患處後通口然後服食後臨臥飲此藥若有物螫尋患處甚效也觀音水點眼方出衛生家寶方乳香一錢銅青半分白礬三錢當歸一錢鹽一錢黃連一匙蜜四兩黃丹一兩暴飛令赤色右用水一斗煎至五升濾去滓令極清入腦子一分麝香一匙硼砂三錢熊膽半錢同研入粉與前藥共入一瓶紙封三日候香氣勻以銅筯點十數次閉目少時湯洗之楮桃丸華山李真人治諸眼疾不問逺近皆治之蒼术川芎青鹽甘草各一兩川椒去目木賊去莭滑石研榖精草各半兩右為末以藥末四兩水三升煮桃一升水盡為度頻攪使藥纒在楮桃上焙或曬乾每服三五個食後細嚼清茶下如患暈翳服之神效貼頂出光膏治瞳人散失頭目昏痛附子一個重八九錢者鹽紙褁定用文武火炮熟為度辰砂一錢研石膏半兩焙通赤爛研右和勻每服一小錢用薄荷水調成膏更入菉豆粉和勻攤紙上貼頂心三日一次換不半月而瞳人如故後用八子丸虎睛丸常服補之八子丸治諸眼患白附子半兩牛蒡子半兩炒五味子半兩決明子山梔子覆盆子各半兩地膚皮半兩炒川芎一分木香一分赤芍藥白芷柴胡各半兩芎藭半兩焙吳白芷一兩焙苦桔梗一兩焙紫蘇子半兩右為細末米糊為丸如梧桐子大每服二十丸白湯下食後服虎睛丸治眼目內外障羚羊角三分柴胡虎睛一對藁本各一兩防風半兩夏枯草一兩草決明一兩麝香一匙别研家菊花半兩腦子半匙别研青葙子熟地黃各半兩天竺一兩密蒙花天麻紫河車車前子旋覆花玄參黃連各半兩蕤仁半兩去殼别研右為末煉蜜為丸如梧桐子大每服二十丸加至三十丸荆芥湯下食後服之通明膏治目疾諸症大黃當歸甘草生赤芍藥川芎已上各等分右為末煉蜜丸如彈子大每服一丸細嚼用茶清送下如目疼者加乳香少許同嚼食後臨臥服雙仙散出衛生家寶方治眼仙靈脾小瓜蔞紅色又名王瓜各等分為末每服一錢食後茶清調下揭雲方洗一切眼疾當歸赤芍藥秦皮滑石各半兩銅青甘草各半分右為末每服半錢湯泡澄清洗珍珠散晚蠶砂二兩穀精草一兩夜明砂一兩石決明三兩煆右為末每服一錢米泔水調下如赤腫上翳用豬肝夾藥札定泔一盞煎至七分先薰後服車前子丸衛生家寶方治眼去瘟瘴輕身變白明目夜中見光車前子菊花生乾地黃麥門冬已上各等分右為末煉蜜為丸如梧桐子大每服五十丸食後用溫熱水送下煦水丹神妙眼藥輕粉一匙腦子半匙麝香半匙辰砂半錢硼砂半錢水銀三匙硇砂半匙銅青半兩杏仁三粒湯去皮尖右為末如法研了用蠟一塊如彈子大鎔和勻小合盛旋取作子餅睡時安眼頭天明以水一盞照下看膜依前收夜再用金絲膏出衛生寶方治一切年深日近風毒眼目內外翳障攀睛瘀肉貫瞳人或癢或疼川黃連半兩宣連半兩青鹽二錢䝞丹二錢研細黃白皮半兩去粗皮乳香二錢大棗二十四箇白丁香二十個蜜四兩煉蜜同藥入燈心三百莖右除蜜外並搗碎湯浴洗淨不犯鐵器用井花水一升砂石器中熬切勿令火緊候至十數沸用生絹袋濾過放冷至五七分再濾以赤小豆葉煉丸食之令人肥悅明目延年不老出本草取冬瓜仁七升以絹袋盛之投三沸湯中須臾出爆乾如此三度止又與清苦酒漬浸一宿暴為末日服之方寸匕明目定心出本草以隨方向日取水飲之明目出本草用菉豆作枕枕之明目出本草菊花生熟並可食之通治目出本草取烏鴉目睛注目中治失明出本草取羖羊肝一斤去脂膜薄切以未著水新瓦盆一口揩令淨鋪肝於盆中置於炭火上煿令脂汁盡候極乾取決明子半升蓼子一合炒令香為末和肝杵之為末以白蜜漿下方寸匕食後服之日三加至三匕止不過二劑目極明服之一年妙夜見文字并諸物其羖羊即骨歷羊是也主驚悸心熱能安心明目去赤眼翳障尉熱腫以玻璃珠此西國寶也是水玉或云是千嵗水化之應玉石之類生土中未必是今水晶珠精者極光明置水中不見珠尉目除熱淚或云火燧珠向日取得火丹石毒上攻目論夫丹石毒氣上攻於目者熱氣內乘於肝也在竅為目肝受血而能視服食之人配合失宜其毒流於肝則榮血否澀衝發於目故令兩目赤痛或生努肉不宜緩治緩則石勢穿發睛瞳高突損爛方大黃丸出聖惠方治丹石毒上攻眼目赤腫開眼不得澀痛生障翳心神煩躁川大黃一兩銼碎微炒麥門冬一兩半去心焙玄參黃芩決明子車前子青葙子黃連去鬚馬牙硝蕤仁湯浸去赤皮犀角屑寒水石已上各二分甘草半兩炙微赤銼梔子仁右為末鍊蜜和搗三二百杵丸如梧桐子大每服不計時候煎竹葉湯下二十丸大黃湯出聖濟總録治丹石熱毒上攻目及生翳心躁面赤頭痛大黃銼炒當歸生乾地黃焙芎藭葛根銼甘草炙炒麥門冬去心焙天門冬去心焙葳根凌霄花根是也焙各半兩山梔仁地骨皮黃連去鬚各一兩右粗搗篩每服五錢七以水一􅊦半入竹葉一十片煎至八分去滓食後臨臥服瀉肝大黃湯出聖濟總録治丹石發動目赤痛及風熱眼大黃銼炙黃芩去黑心決明子炒山梔子甘草炙銼桑根白皮銼前胡去蘆頭羚羊角鎊枳殼去穰二麩炒各兩黃連去鬚大青細辛去苖葉各半兩右粗搗篩每服五錢匕以水一􅊦半煎至八分去滓食後臨臥溫服羚羊角湯出聖濟總録治服丹石過多熱毒上乘兩目赤痛或生努肉或即腫爛羚羊角鎊茯神去木防風去叉羌活去蘆頭芎藭地骨皮菊花各二兩甘草炙銼三分枳殼去穰麩炒犀角鎊各三分麥門冬去心焙一兩半右粗搗篩每服三錢水一􅊦煎至七分去滓食後早晚湯服羚羊角散出聖惠方治丹石毒上攻眼目澀痛腫赤心神煩躁唇口乾燥羚羊角屑一兩地骨皮黃芩車前子各三兩麥門冬一兩半去心焙秦芃去苖梔子仁葳蕤川升麻甘草炙微赤銼各半兩柴胡去苖右搗粗羅為散每服四錢以水一中盞煎至六分去滓不計時候溫服羚羊角湯出聖濟總録治丹石發動燥渴睛痛赤熱淚熱毒服羚羊角屑鎊子芩山梔子仁麥門冬去心焙知母桔梗銼炒貝母去心焙甘草白檳榔銼各一兩前胡去蘆頭半兩右粗搗篩每服五錢匕水一􅊦半煎至八分去滓溫服前胡瀉肝湯出聖濟總録治丹石毒上攻目赤煩悶熱氣胸中前胡去蘆頭三兩決明子三兩梔子仁二兩黃芩去黑心三兩細辛去苖葉三兩大青三兩秦皮三兩石膏四兩乾鹽右粗搗篩每服五錢七水一􅊦半入竹葉十片車前葉十片細切煎至八分去滓入芒硝一錢七放溫食後臨臥服決明子湯出聖惠總録治丹石毒及客熱衝眼赤淚出疼痛決明子微炒枳殼去穰麩炒柴胡去苖黃芩去黑心芍藥甘草炙銼車前子葉乾各一兩梔子仁升麻各半兩右粗搗篩每服五錢七水一􅊦半入竹葉十片煎至七分去滓芒硝一錢七放溫食後臨臥服葛根湯出聖濟總録治金石發動眼痛欲裂葛根銼黃連去鬚木通銼甘草吳藍各二兩升麻黃芩去黑心大黃銼焙各一兩半石膏四兩右粗搗篩每服五錢七水一􅊦半煎至六分去滓入芒硝一錢七地黃汁半合更煎三兩沸放溫食後臨臥服療先服丹石熱衝上眼赤方黃連苦參槐子各二兩蕤仁決明子黃芩各五分麥門冬去心葳蕤大黃右搗篩蜜和丸如梧桐子大食後以蜜水下二十丸至三十丸犀角散出聖惠方治丹石毒上攻眼目赤腫疼痛犀角屑川升麻黃芩梔子仁甘菊花玄參川大黃銼碎微炒各三分麥門冬一兩半去心焙甘草半兩炙微赤銼右搗粗羅為散每服四錢以水一中盞入竹葉二十七片煎至六分去滓不計時候溫服車前子散出聖惠方治丹石毒上攻眼黑白睛腫脹疼痛開張不得心神煩悶車前子川升麻赤芍藥黃芩川大黃銼碎微炒各二兩麥門冬一兩炙微赤銼甘草半兩炙微赤銼右搗粗羅為散每服四錢以水一中盞入竹葉二十七片煎至六分去滓不計時候溫服芒硝散出聖惠方治丹石毒攻眼疼痛腫生翳心神躁亂川芒硝黃連去鬚黃芩枳殼麩炒微黃去穰梔子仁鈎藤銼已上各一兩川大黃三分銼碎微炒甘草三分炙微赤銼右為細散每於食後烏豆湯調下二錢前胡湯出聖濟總録治乳石發動頭痛太陽兩脈掣熱痛目赤睛疼若毒不解當睛破葳蕤一兩甘草炙銼一兩葛根銼二分前胡去蘆頭半兩麥門冬去心焙半兩梔子仁半兩漏蘆銼三分右粗搗篩每服五錢七以水一盞半入竹葉十片煎至八分去滓食後臨臥服葵子散出聖惠方治服丹石毒先面赤口乾目黃赤睛疼恐變生翳障葵子豉微炒犀角屑地榆銼川升麻露蜂房微炒各一兩甘草三分炙微赤銼右搗粗羅為散每服四錢以水一中盞煎至六分去滓每於食後溫服忌炙煿熱麵麥門冬湯治諸石毒眼睛疼寒熱時作麥門冬去心焙二兩甘草炙銼黃芩去黑心大黃銼炙梔子仁各一兩右粗搗篩每服五錢匕以水一􅊦半煎至八分去滓下芒硝一錢匕食後臨臥溫服柴胡洗眼湯出聖惠方治丹石毒上攻眼目赤痛微腫眥爛柴胡去苖蕤仁研黃連去鬚川升麻玄參已上各一兩右搗粗羅為散以水三大盞煎半濾去滓微熱洗淋不限度數冷即重暖用之三黃丸出聖濟總録治諸石毒盛熱不除腹滿小便赤大便澀不利吐逆氣衡勾目口焦目赤黃連去鬚二兩黃芩去黑心二兩大黃銼炒甘草炙銼各一兩右粗搗篩每服五錢匕以水一􅊦半煎至八分去滓下芒硝一錢匕溫服以利為度黃芩湯出聖濟總録治丹石發動發熱心腹脹滿小便赤大便難胸中煩躁目赤痛黃芩去黑心大黃銼炒各二兩梔子仁一兩豉炒三分右粗搗篩每服三錢匕水一􅊦煎至六分去滓食後臨臥溫服大黃膏出聖惠方治丹石毒眼腫痛熱淚出川大黃三兩銼生用木香半兩右為細末散以生地黃汁調如稀膏傅於腫處乾即換之杏仁膏出聖惠方治丹石毒衝目赤癢反生浮膜點眼方見本門目努肉類肝方出龍木論以肝和決明子作丸服之又生用服丹石人目腫眼暗不見物可生食之一如服羊子肝法治丹石攻眼方出聖惠方以生地黃汁澄清用瓷合子盛頻點之治服丹石人上衝眼暗不見物用兔肝切細醋拌生食之鈎割針鐮論夫內經曰血實宜決之難經曰腫熱宜破攻之蓋邪毒結聚其熱成實看藥力來能去者破攻之法不可廢也凡目息肉腫弦黃膜之類皆以臟腑風熱毒氣薰發於肝血氣結滯所成也治宜先鈎割鐮洗去惡毒次以湯散蕩滌膏劑點傅之法凡兩眥頭有赤脈及息肉者宜鈎起以鈑針割去令盡未盡更割以盡為度或以縫衣細針穿線口銜線頭牽起别以鈹針向日中割之了以大針尉使斷其根不爾二三年間恐能復發復發睛難藥其絶厚者侵入水輪其以曲頭箆子折起勿使掣損瞳人蓋瞳人甚薄易損故也凡鈎割及用針不宜在旦時腹空五臟皆虛令人頭運悶倒又鈎割不宜欲速惟緩緩為之凡眼上腫瞼皮褁其核如米豆大漸長如梅李大者內有物如膿似桃膠此皆風熱所致也可針破撥去之即瘥仍翻眼皮向裏針之恐風毒又恐瞼外成痕凡風毒熱腫結於兩瞼熱痛不止其眼腫隱損瞳人宜用針刀去之乃差又脾風熱壅上攻眼角熱痛不止其眼腫者宜令翻眼瞼視其黑睛上下有黃翳根腳連瞼則以法針去之次以藥傅又風瞼毒熱結成腫如捨世俗呼為眼捨其風熱氣常在瞼唇邉緣臉唇中空卷遇肝肺熱即依前結成宜針去結膿脹凡目赤腫脹淚出難開疼痛不可忍先患一目次相牽引漸生翳膜不能見物此是膈中積熱肝臟風熱上攻故也宜先鐮洗除去毒血次服藥攻治之凡目赤兼黑睛中忽從下向上生黃翳疼痛者是脾胃熱毒氣薰攻如此宜先鎌上下瞼散去瘀血次服諸藥凡目生頑翳者可用火燒銅針輕點傳波斯國銀礦名悉潤脂點之不痛勿用别法凡目生黃膜上直覆瞳人者初患之時疼痛赤澀發渴不定淚出難開漸生翳膜直覆黑睛不辨人物蓋因脾藏風熱重發於目其證如此宜先鈎割鎌洗次服蕩滌脾臟風熱之藥凡目忽然赤澀淚出痛癢漸生障翳赤膜下垂直覆睛珠如朝露之色者宜急鎌洗去其瘀血次用點藥及服諸藥凡目胞內膠凝者是脾胃積熱膈內風衝入魚胞瞼初如麻米久則漸長狀如桃李磨隱瞳人後必生翳宜針破出血次鎌洗去瘀血加湯藥攻治凡目風牽瞼者初患之時乍好乍惡發渴不定淚出不止是冒氣受風肝膈積熱風熱毒氣薰發瞼眥甚者目皮翻出急宜鎌洗散去瘀血及尉烙服藥治療凡瞼生風粟者因心肺壅毒肝家有風故令瞼穴上下有肉如粟粒出澀痛久生翳膜宜鎌出惡血除根本凡目痛如針救者初患之時微覺頭疼目眩日夕較急夜臥澀痛淚出難開久則發痛時如針刺此是心臟潛伏毒熱風壅在於膈中久則漸生障翳兩目俱損急宜針洗出血及針陽白穴凡目忽被物撞打睛出但眼𢃄未斷者當時內入瞼中勿令驚觸四畔摩碎風膏及搗生地黃傅之其竅內有惡血以針引之方鈎割後用刀剪藥安咱盧係回回藥名菉豆粉糖霜李子樹膠各一兩右為末每用點瘡上治目白膜瞞睛方以雞翎截之近黑睛及當白睛嗍之膜自聚鈎針鈎挽之割去即見物以綿當眼上著血斷三日瘥尉烙論夫血氣得溫則宣流得寒則凝注肝臟血上主於目若肝經虛寒則目多昏暗淚出之候古方用溫尉之法蓋欲血氣使之宣流爾若翳膜頑厚尉法所不能去者又宜烙之凡五臟虛勞風熱上衝於肝從上生向下名曰逆翳從下生向上名曰順翳此疾宜用尉烙法法尉眼餅子出聖惠方治眼腫生翳瞼垂疼痛大黃銼鬱金黃連去鬚各一兩右為散用酸粟米飯和攪令勻每用藥五錢揑作一餅子以軟帛褁不住手尉之治眼赤腫貼尉地黃膏方出聖濟總録生地黃粟米飯醬極酸者右等分爛研細膏勻攤於薄絹上方圓二寸許貼尉目上乾即易之治眼疾出或有膿出者馬齒尉方出聖惠方馬齒子人莧子各半合右為末入銅器中於飯上蒸熱以綿褁尉大眥頭膿水出處仍乘熱尉令透睛每尉五十度膿水自絶治目赤癢澀及一切目疾湯器尉方出聖濟總録用熱湯滿器銅器尤佳用以尉目仍閉目勿開亦勿以手挣目次掬器中湯淋目候稍冷即止一日三次或四次為之若無目疾亦可間用此法治眼昏暗中指尉法出聖濟總録右東向坐氣息調適以兩手指口唾之二七相摩拭尉目眥佳針烙法出聖濟總録治熱病後失明或生膜極厚者右取平頭針可醫大小翳燒赤當翳中烙之須輕下手若烙後翳已破即少傅除翳藥亦可烙眼膚生覆瞳子治目暗掌心尉法出聖濟總録右雞鳴時以兩手相摩熱尉目三遍仍以指甲拶兩眥頭覺神光明爽其疾即愈尉眼方治熱毒風攻赤痛并瞼浮腫右黑豆揀擇一升分作十處將軟絹帛各褁定於沸湯內蘸過乘熱更互尉之每一分三度入湯用豆盡當愈治目痛不得睡及毒病後眼赤痛有翳方暮炙新青布尉并蒸大豆袋盛枕之夜常令熱治目為物所傷觸睛方右煮羊肉令熱尉勿令過熱豬肝亦得普濟方卷八十六
