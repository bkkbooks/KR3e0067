吐即效治三十六種鬼疰不問男子女人皆主之方出聖惠方白芥子一升陳米醋三升三年者可韭子一升燒令煙出為度右以粗瓶盛醋內芥子於中以物蓋瓶頭封之勿令泄氣其合藥日時分明記之七日為滿還以合藥時開內淨臼中搗如泥用生布絞取汁內韭子末為丸如菉豆大服藥之時不食夜飯明旦以粥飲下三十丸溫酒亦得至辰巳時當有大利如不利更吃熱粥飲十丸投之當利下惡物及有蟲如蒜瓣大出即以粥飲壓之回生丹治鬼疰如中惡氣急腹脹如鼓攻心即不可救巴豆去皮心膜出油十枚雄黃水飛研半兩右同研麵糊丸如雞實大隂乾每服一丸新汲水下治鬼疰尸疰下部蝕瘡用炒鹽布褁坐尉之兼主大灼瘡治百邪鬼魅出千金方以水服頭垢一小豆大又方疏齒間刮取垢水服之治哭疰治卒忤停中不能言口禁不開用附子末置管中吹內舌下即瘥治心痛疰忤石淋産難小兒驚癎用蛇黃水煮研服汗出嶺南蛇腹中得之丸重如錫黃黑青雜色蛇黃今越州信州亦有之又有一種今醫家用大如彈丸堅如石外黃內黑二月採云是蛇冬月蟄時所含土封春發蟄吐下者亦可用治卒忤停尸不能言用真硃末以雞冠血和丸小豆大以四五粒內口中治鬼氣以白蒿子末和酒服之良即蓬蒿獺肝散出永類鈐方治鬼疰夫鬼疰者葛云此是五尸之一疰又挾諸鬼邪為害其病變動乃有三十六種至九十九種大略使人寒熱淋瀝沉沉默默不的知所苦無處不惡纍年積月漸就沉滯以至於死死後又傳傍人乃至滅門覺如是候者急治之右用獺肝一具隂乾杵末水服方寸匙日三未知再服肘後方云此方神良宣和間天慶觀一法師祛邪辟祟極精嚴時一婦人投狀述患人有祟所附須臾已召至附語云非我為禍别是一鬼亦因病人命衰邪祟乃集今已成形在患人肺中為蟲食其肺遂令其吐血聲嘶師掠之云此蟲還有畏忌否久而無語師再掠之良久云客有説惟畏獺爪為末以酒服之則病去矣患家如其言得愈此乃豫所見矣究其患略亦相似獺爪者殆獺肝之類與一方火炙治疰病至相染一門悉患者阿魏藥安息香方療鬼氣辟邪惡兼治五疰復連及近死尸惡氣入腹終身不愈者右用阿魏藥濟濕盤經云央匱是也服法旦取棗子許大研為末又取牛乳一大升煎五六沸停令熱定再取鴨子許大和攪服更以餘乳蕩盞飲盡至暮又别取安息香亦如棗許大分如梧子還以熟牛乳服之令盡每日旦暮常然若無乳者即以煮肉汁服之其患久者不過十日近者不過五日愈如過三十日或不愈便停只得食脯肉之屬忌一切生菜昔禮部孫侍郎家有此病所在訪問有人從梁漢來云一官人某姓服此得效者十餘家孫侍郎即照伊方進服至七八日即效便以此法傳授親知得驗者非一或有以阿魏用頭醋褁作餛飩十餘枚熟食須用白麵半兩日二服滿七日永瘥治鬼疰癎病右用野豬三嵗膽中黃和水服之治鬼疰相染方右用豬肝一具薄切炙乾搗羅為散每服不計時候以新汲水調下二錢又方右用桃仁四兩湯浸去皮尖雙仁研為膏每服不計時候以酒調下半匙金牙散治鬼疰風邪鬼語尸疰或在腰脊胸脅流無常處不喜見人志意不定靣脫色目赤鼻張唇乾甲黃者金牙雄黃鐡青野葛露蜂房芎藭大黃甘草曽青蛇蛻皮真珠丹砂藺如乾漆各一兩石長生狸骨一作鸛骨桔梗鬼臼鬼箭羽鬼督郵椒目烏頭狼毒蕪荑毒公胡燕屎牛黃各三分人參狼牙四分寒水石桂心各四分石膏五分蜈蚣蜥蜴附子各一枚蜣螂亭長各七枚芫青徐長卿斑貓各十四枚貝母二枚右治下篩先食以酒服一刀圭日再不知漸加之蟲隨大小便出一名蜀金牙散治鬼疰邪氣恍惚妄語右用半天河水勿令知之與飲瘥能殺鬼精此竹籬頭邉水及髙樹冗中天雨水也治鬼疰氣痛右取蚡鼠壤堆上土以秫米泔汁搜作餅燒令熱以此物褁尉痛處蚡鼠即田野中尖嘴鼠也治鬼疰右以桃掘煮服之三載者良治鬼疰精魅右用敗天公取上好燒酒服之敗天公即人所戴竹笠之敗者治卒心痛疰忤惡氣右用鑄鐘黃土置酒中溫服之彌佳治鬼氣尸疰復連右以秋蒿秋冬用子春夏用苖並搗絞汁服亦暴乾使為末小便沖服如覺冷用酒煮服走疰附論夫走疰者風邪客於衛氣是也體虛之人受於邪氣隨血而行且風善行而數變衛氣之行慓疾滑利邪氣相摶則淫溢皮膚去來擊痛逰走無常故名走疰也方五香散治五尸鬼邪走疰疼痛及風氣沉香丁香木香麝香研薰陸香研鬼箭羽當歸切焙沒藥研肉豆蔲各一兩牛黃研桂去粗皮鬼臼陳橘皮湯浸去白焙金牙各三分犀角鎊羚羊角鎊大黃煨人參升麻桔梗桃仁去皮尖雙仁麩炒安息香研各一兩一分附子炮裂去皮臍一枚正者丹砂研一錢一分右搗研為細散湯飲或酒調服一錢半日再服牛黃丸治走疰惡氣偏僻皮膚疼痛如錐刺背脾牽強伏連羸瘦發渴牛黃研一兩人參沉香銼木香枳殼去穰麩炒前胡去苗各一兩半麝香研黃連去鬚犀角鎊各一兩胡黃連三分右為末煉蜜丸如小豆大每服空心米飲下二十丸日再服治走疰風毒疼痛尉藥方出聖惠方狼毒附子去皮臍川椒吳茱茰生乾地黃桂心藝薹子芎藭川大黃當歸已上各半兩各生用右羅為末以酒糟三斤同炒令熟用絹包褁更互尉痛處以效為度天雄散出聖惠方治惡風走疰疼痛天雄炮裂去皮臍雄黃研各一兩莽草桂去粗皮蜀椒去目及閉口炒出汗虎骨塗酥炙丹砂研木香半兩右為散每服一錢溫酒調下不拘時一方用川烏頭一兩枳殼丸治走疰疼痛如錐刺皮膚風氣心腹四肢疼痛枳殼去穰麵炒厚朴去粗皮薑汁炙各一兩犀角鎊半兩檳榔煨二枚桑根白皮炙銼一兩柴胡去苗一兩半半夏湯浸焙乾為末薑汁和作餅暴乾大黃銼醋拌勻炒各一兩右羅為末煉蜜丸如小豆大空心酒下二十丸神效膏出聖惠方治走疰上下相病貼之芫花一兩藝薹子半兩安息香半兩附子半兩去皮臍桂心一兩川椒半兩已上並生用右羅為散入牛皮膠中和成膏塗紙上隨痛處貼之立定蛇床子散治久患走疰疼痛蛇床子炒莨菪子炒藝薹子炒胡荽子芫花醋炙各一兩右為細散取生薑自然汁煮麵糊調膏先用白礬湯洗痛處後貼之烏頭散治久患走疰氣疼痛烏頭炮裂去皮臍曼陀羅子炒地龍炒牛膝酒浸切焙各半兩右為散溫酒調半錢日再服雄黃丸出聖惠方治惡氣走疰疼痛雄黃三兩細研水飛過清漆三匙米醋九升右件五月五日以粳火煎一夜時候可丸即丸小豆大每服不計時以溫酒調下一丸兼治蛇蝎螫塗之可驗治走疰方出聖惠方用燒車缸令熱暫入水以濕布褁尉病上又方出聖惠方右用小芥子末一合蜜和丸如梧桐子大每服宜以溫酒下十丸三兩服瘥瘥後不得食五辛又方出聖惠方右用桂心一兩以酒一大盞煎至七分為二服又方出聖惠方右用蕓薹子以慢火炒熟搗為末以油麩入濃醋內調煎為糊看令熱塗在痛處三五次效推仙丸出保生方治一切走疰疼痛蒼术酒浸四兩炒乾薑炮厚朴薑製川椒炒各一兩右為末酒糊丸如梧子大每服三十丸溫酒空心下治走疰攻頭靣四肢及陽毒傷寒壯熱頭痛心神煩燥大利胸膈右用生瓜菜搗取自然汁飲之風疰附論夫風疰者由體虛風邪之氣客於榮衛邪氣行逰連滯停疰故名風疰其狀皮肉掣振痛無常處一年之後則有頭髮墮落頸項掣痛骨拉解鳴目痛鼻酸牙蚛之證又十二風所疰不同溫風所疰頭痛欲解髮腳腫汗風所疰頭痛體熱骨莭厥強柔風所疰逰腫在眼或在手腳氷風所疰噉食眠臥汗出尤風所疰腦轉肉裂目絲痛惡聞人聲絶風所疰暴倒仆口有白沫顛風所疰被髮狂走遇物擊破狂風所疰呌呼罵詈獨語談笑寄風所疰口噤靣喎四肢不隨紏風所疰體生瘡眉毛墮落蚝風所疰癖痺如毛螫瘡或癢或痛罩風所疰舉身戰動或鼻閉塞其狀雖異其為氣停疰則一也方金牙散治風邪疰氣及南方百毒瘴氣疫毒腳弱腫痛濕痺金牙研一兩芫青去足麩炒二十七枚斑貓去翅足炒七枚雄黃研亭長去翅足炒七枚蜥蜴去翅足炙一兩蜈蚣去頭炙一枚丹砂研龍腦去蘆頭防風去仁荏枝微炙大黃銼醋拌炒曽青研白茯苓去黑皮桂去粗皮松脂研乾薑炮細辛去苗葉硝石研野葛銼炒烏頭炮裂去粗皮大戟煨商陸炙蛇蛻皮炒芫花醋炙鶴骨炙附子炮裂去皮臍寒水石碎蜀椒去目及閉口者炒出汗人參貫衆龍骨炒露蜂房炒巴豆去皮心出油盡礜石煨狸骨微炙天雄炮裂去皮臍石膽研莽草炙各一兩右為細散以絳囊盛半兩帶之男左女右食前以漿或酒隨意調下一服以知為度小金牙散出千金方治風邪疰氣并瘴癘疫氣腳弱金牙研一兩一分牛黃研一分天雄炮裂去皮臍蓽解炒各兩半萎㽔三分蜈蚣一枚長五寸去頭炙焦黃芩黑皮去盡細辛去苗葉各半兩蜀椒去目及合口者炒出汗由跋湯浸去滑炒各半兩桂去粗皮三分莽草微炙半兩犀角鎊三分雄黃研丹砂研麝香研半兩乾薑炮裂三分烏頭炮裂去皮臍半兩黃連去鬚一兩右除研藥外搗羅為散後入研藥搗三五百下令極細溫酒調服二錢日三夜二以瘥為度以絳囊盛半兩男左女右帶省病問孝不避夜行塗鼻下人中晨昏露霧亦塗之一方無萎㽔由跋有女萎虎杖細辛散出聖惠方治風疰走入皮膚中如蟲行腰脊強直五緩六急手足拘攣隱疹搔之作瘡風尸身瘴卒風靣目腫起耳聾頭痛口噤不能語細辛一兩人參一兩去蘆頭乾薑炮裂銼兩黃芩一兩桂心一兩半麻黃一兩半去根莭當歸一兩半銼微炒芎藭一兩半石楠一兩甘草一兩微炙銼生乾地黃三分食茱茰三分右搗為散每服三錢水一中盞煎至六分不計時溫服真硃散出聖惠方治風疰毒氣貓鬼所疰真硃半兩細研雄黃半兩細研硃砂半兩細研細辛一兩乾薑半兩炮裂銼川椒半兩去目及合口者微炒去汗桂心一兩天雄半兩炮裂去皮臍蜈蚣一枚微炒去足莽草半兩微炙右羅為散不計時溫酒調下一錢烏頭散出聖惠方治風疰及五尸惡氣逰走胸心流出四肢往來不住短氣欲死川烏頭一兩炮裂去皮臍赤芍藥一兩當歸一兩銼細微炒乾薑半兩炮裂銼桂心一兩細辛一兩生乾地黃一兩吳茱茰半兩湯浸七遍乾微炒甘草一兩炙微赤銼右搗為散每服三錢水一中盞煎至六分去滓不計時溫服天雄散出聖惠方治風疰淫躍皮膚攻疰逰走疼痛不可忍天雄一兩炮裂去皮臍桂心三分石南三分莽草三分微炒茵芋三分狼毒半兩銼碎醋拌炒熟雄黃半兩細研麝香一分細研木香三分右羅為散入雄黃麝香同研令勻不計時以溫酒調下一錢安息香丸治一切風疰痛安息香研乳香研各一分白膠香研地龍去土炒搗為末各半錢桃仁湯浸去皮尖雙仁研二七枚沒藥研一分胡桃仁研三枚右為細末酒煎為丸如彈丸大每服一丸溫酒化下羌活湯治風疰心腹刺痛上引胸背羌活去苗鬚三分大豆炒一合桑根白皮炙銼一兩半芎藭一兩陳橘皮湯浸去穰白焙三分大腹皮並子煨三分右粗搗篩每服三錢水一盞煎至七分去滓溫服良久再服小金牙酒出本草治風疰百病虛勞濕冷緩不仁不能行步近人用之多效金牙細辛地膚子莽草乾地黃葫蘆根防風附子茵芋續斷蜀椒獨活各四兩右以金牙先搗末别盛練囊餘皆薄切并金牙共內大練囊以清酒四斗漬之密封器口四宿取酒溫服二合三日漸增之轉疰附論夫轉者言死又易傍人轉疰之狀與諸疰略同以其於身內移轉無常故以為轉疰也方牛黃散出聖惠方治鬼物身纒轉相染易夢寐氛氲肌體羸瘦往來寒熱默默煩悶欲寤不能手足不能動或欲向壁悲啼或喜笑無常牛黃細研鬼箭羽王不留行徐長卿逺志去心乾薑炮裂附子炮裂去皮臍五味子石韋去毛黃芩赤茯苓已上各半兩桂心一分代赭半兩細研菖蒲一兩麥門冬一兩去心焙右搗為散每服用酒一小盞入生薑汁少許地黃汁一合令溫酒調下一錢不計時候日三服忌豬肉冷水生蔥羊肉餳醋物獺肝丸出千金方治萬病轉疰相染或霍亂中惡客忤病者獺肝半兩細炙雄黃半兩細研莽草半兩微炙硃砂半兩細研鬼臼半兩去鬚犀角屑半兩麝香半兩細研川大黃半兩銼碎微炒牛黃一分細研蜈蚣一枚微炙去足巴豆半兩去皮心研紙褁壓去油右羅為末入研了藥令勻煉蜜和搗三五百杵丸如麻子大每服空心以溫酒下三丸若中惡病不計時服治人久疰相轉乃至滅族冝服此方出聖惠方雄黃一兩半細研水飛過鬼臼一兩去鬚硃砂一兩細研水飛過莽草一兩微炙藜蘆一兩去蘆頭微炙巴豆四十枚去皮心紙褁壓去油皂莢半兩去黑皮塗酥炙焦黃去子真硃半兩微研右羅為末入研了藥令勻煉蜜和搗三二百杵丸如小豆大每服空心以溫酒下二丸當吐利下惡物瘥忌生冷豬肉蘆笋生血物雄黃丸出聖惠方治轉疰絶門族盡轉逐內外復易親友雄黃半兩細研麥門冬一兩去心焙天門冬一兩去心焙皂莢半兩去黑皮酥炙微黃并去子莽草半兩微炙鬼臼半兩去鬚巴豆半兩去皮心研紙褁壓去油右羅為末煉蜜和搗三二百杵丸如小豆大每服空心暖酒下二三丸日一服忌鯉魚野豬蘆笋一方無天門冬惡疰附論夫惡疰者是惡毒之氣也人體虛者受之毒氣入於經絡遂流移心腹其狀疰來擊痛痛不一處故名惡疰也方牛黃散出聖惠方一名千金蜈蚣湯治惡疰邪氣往來心痛徹胸背或入皮膚移動不定四肢酸痛羸瘦短氣牛黃一兩細研蜈蚣一枚微炙去足硃砂一兩細研一方用丹砂細辛半兩川大黃一兩銼微炒鬼臼半兩去鬚黃芩一兩當歸半兩銼微炒桂心半兩人參半兩去蘆頭麝香一分細研附子半兩炮裂去皮臍乾薑半兩炮裂銼右羅為散入研了藥令勻每服三錢水一中盞煎至六分去滓不計時溫服治惡疰撮肋連心痛冝服此方出聖惠方當歸一兩銼微炒木香二兩檳榔二兩麝香一錢細研右羅為散不計時煎童子小便調下三錢治惡疾心痛悶絶欲死冝服此方出聖惠方鬼督郵一兩末安息香一兩酒浸細研去滓慢火煎成膏右以安息香煎和丸如梧桐子大不計時以醋湯下黑奴散出千金方治卒得惡疰腹脹釡底墨一合鹽半兩右以水一大盞煎至七分去滓溫服日二服須臾吐下即瘥又方出聖惠方獨顆蒜四顆伏龍肝一兩細研右搗入沙糖水和丸如梧桐子大每服以溫酒下二十丸治惡疰腹痛不可忍冝服此方出聖惠方吳茱茰半兩湯浸七遍漸暴乾微炒桂心一兩右羅為散不計時以熱酒下二錢治惡疰入心欲死冝服此方出聖惠方右用安息香半兩搗末分為二服以熱酒和服之又方出聖惠方右用阿魏末一分分為二服以熱酒調服之立瘥又方出聖惠方右用獨顆蒜一頭香墨如棗大並搗以醬汁一合調和頓服立瘥治邪辟惡止驚右用南草緋絹盛一片令小男女佩之宜南草即萱草治強鬼突迷人致惡者右以鐵鎚柄和桃奴鬼箭羽等丸服之蠱疰附論夫蠱之患人有造作蓄聚之者多取蟲蛇之類以瓷器中盛則任其自相噉食唯有一物獨在者謂之蠱以毒害於他人多因飲食內而行之人中者心悶腹痛蝕五臟盡則死矣有緩有急急者倉卒十數日便死緩者延引嵗月逰走腹內常氣力羸􅉵骨莭沉重發則心腹燥而病人所食之物亦變化為蠱漸侵蝕臟腑盡而死矣死則病流疰染著傍人故為蠱毒也方紫參丸出聖惠方治蠱毒百病癥瘕積聚大小便不利卒忤惡風脹滿轉相疰易醫所不治紫參人參去蘆頭半夏湯洗七遍去滑盡藜蘆去蘆頭代赭細研桔梗去蘆頭白薇肉蓯蓉酒浸一宿刮去粗皮炙黃石膏細研牡礪燒為粉丹砂已上各三分乾蝦蟆一枚燒為灰川烏頭一兩炮裂去皮臍狼毒一兩銼碎醋拌炒熟附子一兩炮裂去皮臍巴豆一兩去皮心研褁紙壓去油右搗羅為末入研了藥令勻煉蜜和搗三五百杵丸如小豆大每服不計時以粥飲下一丸日三服老少量之蜂蠆毒用塗之亦良鮫魚皮散出聖惠方治蠱毒疰氣變化無常鮫魚皮微炙犀角屑麝香細研白龍骨硃砂細研雄黃細研蘘荷根鹿角屑已上各一分蜈蚣一枚微炒去足右羅為散入研了藥令勻每服食前以暖酒調下一錢雄黃丸出聖惠方治蠱疰四肢浮腫肌膚消瘦咳逆腹大如水之狀死後疰易人家并五尸疰百毒惡氣飛尸客忤無所不治雄黃一兩細研水飛過巴豆一分去皮心研紙褁壓去油莽草一兩微炙鬼臼一兩去鬚蜈蚣一枚微炙去足右羅為末入研了藥令勻煉蜜和搗三二百杵密封收之每於食前以溫酒或米飲服如小豆大一丸增減臨時當下清水豆汁蟲長數寸或如壞雞子等及惡物治卒得蠱疰毒氣往來方出千金方亂髮灰一分杏仁一分湯浸去皮尖雙仁麝香一錢細研右都研如脂每服不計時候以酒服如梧桐子大五丸日三服一方無麝香姚氏用豬肝和丸普濟方卷二百三十八
