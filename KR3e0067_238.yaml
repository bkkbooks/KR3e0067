body:
  text: 普濟方卷二百三十八明周王朱橚撰尸疰門五尸附論夫諸尸為病固不一其狀重者唯五尸若得之疾速如飛走狀者名飛尸停遁不消者為遁尸沉痼在人臟肺中為沉尸衝風則發者為風尸隱伏積年不除者為伏尸唯此五尸變態多端大率令人沉沉默默痛無常處五尸之外復有尸氣雖各有證然大同小異亦可通治之皆本是方飛尸者逰走皮膚穿臟肺每發刺疼變作無常遁尸者附骨入肉攻鑿血脈每發不可得近見尸喪聞哭聲便作風尸者淫躍四肢不知痛之所處每發則昏恍得風雪便作沉尸者纒骨結臟衝心脅每發絞切遇風寒便作疰尸者舉身沉重精神錯雜常覺昏廢每莭氣攻變輒發大惡方丹參丸治五尸蠱疰中惡客忤心腹刺痛丹參微炒一兩芍藥一兩半芎藭芫花醋炒各一兩梔子仁一兩烏頭炮裂去皮臍乾薑炮裂各一兩桂去粗皮一兩半野葛皮炙黃半兩吳茱茰湯浸焙炒半兩蜀椒去閉口并目炒出汗一兩巴豆去心皮麩炒研出油盡一十枚右為末煉蜜丸如小豆大每服三丸米飲下日三服丹砂丸出聖惠方治五尸蠱疰中惡客忤心腹刺痛丹砂研一兩巴豆去心皮麩炒出油盡三十枚乾薑炮芎藭芫花醋炙炒烏頭炮裂去皮臍各一兩赤芍藥一兩半野葛吳茱茰湯浸焙炒各三分桂去粗皮一兩半右為末煉蜜丸如小豆大每服二丸米飲下空心服溫酒亦得太乙偹急散出千金方治卒中惡客忤五尸入腹鬼刺鬼痱及蠱中疰吐血下血及心腹卒痛腹滿傷寒熱毒病六七日雄黃桂心芫花各二兩丹砂蜀椒各一兩藜蘆切巴豆各一分野葛三分附子五分右巴豆别治如脂餘合治下篩以巴豆合和更搗調治銅器中密貯之勿泄有急疾水服半錢可加至五錢老小半之病在頭當鼻衄在膈上吐在膈下痢四肢當汗出此藥所為如湯沃雪手下皆愈方冝祕之非人不傳也雄黃丸治五尸瘕積及中惡心痛蠱疰鬼氣雄黃研丹砂研一作真珠礜石煆牡丹皮藜蘆去蘆頭炙巴豆去心皮膜麩炒研出油盡附子炮裂去皮臍各一兩蜈蚣去足炒一枚右為末煉蜜丸如小豆大每服二丸米飲下食前服吐利為效一方治男子婦人染著鬼神謂之鬼疰病每服十丸冷水送下無時一方有桂心五疰丸一名雄黃丸出聖惠方治中惡五疰五尸入腹胸脅急痛鬼擊客忤傳尸垂死者此藥入喉即愈若口禁則斡開不可斡者扣一齒以竹管下藥先以少許湯或水內藥竹管瀉喉中丹砂銼一方用硃砂甘遂微煨附子炮裂去皮臍雄黃研各一兩豆豉曝乾巴豆去皮心壓出油盡各六十枚右除巴豆外為末却同研勻蜜丸梧子大密器貯每服二十丸米飲下以知為度未知加丸數不發者粥飲投之利不止與酢飯一兩匙療交中五尸遁尸風尸飛尸尸疰沉尸其狀皆腹痛脹急衝心攻脅或磊塊踊起或牽腰脊出聖惠方乾薑附子各兩桂心二分巴豆三十枚去皮心生用右搗篩蜜和又內臼中搗萬杵服如小豆二丸此藥無所不療忌野豬肉蘆笋生蔥一方暖酒下又方出聖惠方龍骨三分藜蘆二分巴豆一分右搗和煉蜜丸空腹內井花水服如麻子大一丸又方出肘後方雄黃一分梔子十五枚芍藥一兩右水三升煮取一升半分再服雄黃丸出肘後方治卒中飛尸遁尸沉尸風尸腹痛脹急不得氣息上衝心胸及攻兩脅或磊塊踊起或攣引腰脊雄黃研大蒜研各一兩右爛搗和丸如彈子大每服一丸熱酒化下須臾未瘥更服有尸疹者常以預收此藥丸五尸之中尸鬼接引共為病害經術有消滅之方而非世徒能用今復撰其經要以救其被毒惡氣散出肘後方治五尸鬼疰百毒桂去粗皮乾薑炮各一兩右為散每服三錢用炒鹽半錢溫水調服之一方新汲水調治卒中五尸遁尸其狀腹脹氣急衝心或磊塊踊起或牽腰脊者出聖惠方右用雞卵一枚取白吞之困者搖頭令下兼治飛尸及腹痛脹急衝心一方破雞子白頓吞七枚不可再服藜蘆子丸出肘後方治中五尸腹痛脹急不得喘息上衝心胸及攻兩脅或磊塊踊變縮引腰脊右以蒺黎子炒去角二兩研為末煉蜜丸如小豆大凡每服三十丸食後熟水下日三服即瘥一方用頂白蒺黎和丸溫酒下治五尸出聖惠方右用鼉肝一具熟切食盡亦用蒜虀食之一方用鱉肝療疾卒中五尸方右取牙四角牙內銅器中以三尺布覆復著器布上以燒牙令熱隨痛追逐跖下癢便瘥若瓦屋削四角木柱燒用之神驗療卒中五尸今取一方而兼療之右搗商陸根熬以囊盛之畨尉之冷復易又方右用粳米二升水六升煎二服沸之又方右掘土作小坑以水滿坑中熟攪取汁飲之又方右用豬肪八合銅器煎小沸投苦酒八合相和頓服可即瘥又方右用烏田根銼二升煮令濃去滓煎汁磨五升則入清水一兩服五合至一升良又方右用漆葉暴乾搗末酒服之又方右用斷鱉頭頭髮末水服可分為三度當如肉食不遽盡後發更作又方右用梔子二七枚燒末服治卒中遁尸其狀腹脹氣急衝心或伏或起牽腰脊痛用服鹽湯取出鮫魚皮散治五尸鬼疰百毒惡氣鮫魚皮炙硃砂雄黃金牙椒天雄細辛鬼臼麝香乾薑雞舌香桂心莽草各一兩貝母半兩蜈蚣炙蜥蜴炙各二枚右十六味搗下篩溫清酒服半錢匕日三服漸增至五分七分亦可帶之飛尸附論夫飛尸者其狀令人心腹刺痛氣息喘急脹滿上衝心胸是也此病發無由漸忽然而至病如飛走故謂之飛尸方附子散治一切飛尸鬼疰風痺身體背痛如針刀刺嘔逆痰癖除五勞七傷萬病一名萬病散附子炮裂去皮臍烏頭炮裂去皮臍芫菁去足翅微炙雄黃研丹砂研乾薑炮裂細辛去苗葉人參莽草微炙鬼臼去毛微炒蜀椒去閉口并目微炒出汗各一兩蜈蚣去頭足微炙蜥蜴去頭足微炙各一兩右為散再羅令勻空心溫酒調下半錢日再服細辛散治飛尸入人皮膚中又名惡脈亦名賊風發時氣急頭痛不在一處針灸則移時好或一日或半日微炙須臾復發細辛去苖葉一分桂去粗皮三分附子炮裂去皮臍一兩雄黃研半兩烏頭炮裂去皮臍一兩天雄炮裂去皮臍一兩乾薑炮一兩莽草微炒一分真硃研三分右為散每服空心米飲調下一錢日二服一方酒服飛尸入腹刺痛方治卒有物在皮中如蝦蟆宿昔入腹中如杯動搖掣痛不可堪過數日即發冝服此方巴豆十四枚龍腦一兩土瓜子一兩桂一斤半右合搗碎以兩布囊貯蒸熱更畨以尉之亦可煮飲少少服之此本在雜治中病名曰隂尸得者多死一方龍膽亦可雄黃散治一切飛尸鬼疰身痛如刺雄黃研甘草炙銼黃芩去黑心各半兩梔子去皮芍藥銼碎微炒各一兩半右為細散每服以溫酒調下二錢日再服不拘時候鬼臼丸治一切勞疾飛尸鬼疰等鬼臼半兩去鬚川升麻三分麝香一錢柴胡一兩去苗右羅為末煉蜜和搗二三百杵丸如梧桐子大每服不計時以暖酒下十丸日再服三黃散治飛尸病腫光如油色無常定處一名硃砂散黃連去鬚黃蘗去粗皮微炒陳橘皮湯浸去白炒各一兩右搗羅為散入丹砂少許合研令勻每服二錢沸湯點服不拘時候一方熱酒下瓜蒂散治飛尸心痛氣急胸滿冝取吐瓜蒂赤小豆雄黃研各一分右為散拌勻每服空心溫酒調一錢取吐惡物走馬湯出聖惠方治飛尸入腹脹滿刺痛氣息喘急巴豆二枚去皮心杏仁二枚去皮尖雙仁右以綿纒錘令極碎投熱湯二合指捻取白汁分三服飲之食頃當下老小量減之如惡物未下即再服通治飛尸鬼繫妙葛洪肘後方飛尸者逰走皮膚穿臟肺每發刺痛變作無常遁尸者附骨入肉攻鑿血脈每發不可得近見尸喪聞哀哭便作風尸者淫躍四肢不知痛之所在每發昏恍得風雪便作沉尸者纒結臟骨衝心脅每發絞切遇寒冷便作尸疰者舉身沉重精神錯雜常覺昏廢每莭氣改變輒致大惡此一條後别有尉治法也右用忍冬莖葉銼數斛煮令濃取汁煎之服如雞子樣大一枚日二三服治喉閉飛尸出本草右取鯇魚膽和暖水攪服之內喉中飛尸上此膽味至苦服之良此魚似鯹生江湖間治蠱毒飛尸喉閉出本草右取仰盆子以水磨服少許治飛尸逰蠱喉中有物吐吞不得出者出本草右以蚺蛇肉作膾食之治飛尸出本草右取鹽麩子乾搗為末食之治飛尸蠱毒瘴瘧出本草右取海豚魚作脯食之一如水牛肉味少腥耳此魚生大海中治飛尸出本草右以麂頭骨為灰米飲下治逰蠱飛尸者喉中刺破出本草右以攩子揩之令血出當下涎沫即瘥治飛尸出本草右以無患子中仁燒令香祛惡氣治飛尸蛔蟲口中甘􅉶風瘙身癢頭瘡牙齒落疥癬生如蛇蜍蚊子入人肉出本草右以大紅蝦鮓食之初食瘡發後乃愈治飛尸逰蠱著喉氣欲絶者出本草右以鳶尾根削去皮內喉中摩病處令血出為佳治飛尸出本草右以紫荆木煮汁服之治飛尸及蛇虺咬右用白鶴腳骨及嘴煮汁服之或燒為黑灰飲服之良似鸛而巢木者為白鶴遁尸附論夫遁尸謂尸埋伏染疰連滯在於胸腹育膜之間尋常如無病人若因喜怒不莭飲食動其隱伏之疾發則心腹脹利痛連及胠脅上衝心胸氣喘促急不得安臥者是其證也方天雄散治遁尸疰在傍人或入腹中化為蠱毒有聲或作咽喉或入諸脈不在一處入人腹內蠱惑蝕人五臟入心令人靣赤入肺令人面白少氣入肝令人靣青喜怒轉筋入腎令人呻吟靣黑腰痛入耳聾入脾令人面黃不嗜飲食羸瘦小便數胸中噎塞嗔喜無常及妖魅百疰為病天雄炮裂去皮臍一兩蜈蚣去足微炒一枚莽草微炒一兩乾薑炮裂雄黃研如粉各二兩烏頭炮裂去皮臍一兩真珠研如粉一兩半桂去粗皮二兩蜀椒去目并閉口微炒出汗一兩半細辛去苗葉一兩半芫青去足微炒四十九枚犀角鎊鬼臼去毛微炒各一兩右為散每服一錢空心以青酒調下日再服麝香丸治遁尸經年不瘥心腹刺痛短氣麝香研五分蜥蜴去頭足微炙一兩鸛骨微炒三寸乾薑炮裂一兩羚羊鼻炙令焦黃二枚雞屎白巴豆去皮心麩炒去油盡五枚芫青去翅足微炒二十枚藜蘆去蘆頭微炙一兩鬼臼去毛微炙丹砂研如粉桂去粗皮各一兩右為末拌勻煉蜜丸如小豆大每服空心米飲下三丸日二服稍加至五丸以吐利為度鶴腦骨丸出千金方一名鶴骨丸治遁尸飛尸積聚脅痛連背走無常處或在臟或腹中忽然而痛鶴腦骨三分塗酥炙微黃一方用鶴骨三寸雄黃一兩細研水飛過野葛半兩藜蘆半兩去蘆頭微炙莽草一兩微炙硃砂一兩細研水飛過一方作丹砂牡蠣一兩燒為粉桂心半兩蜈蚣一枚微炙去足芫青十四枚糯米拌炒令微黃去翅足斑貓十四枚糯米拌炒令微黃去翅足巴豆四十枚去皮心研紙褁壓去油右羅為末研了藥令勻煉蜜和搗三五百杵丸如小豆大每服不計時以暖酒下三丸以知為度鸛骨丸治初得遁尸及經年不差心腹短氣鸛骨炙三寸羊鼻炙微黃二枚乾薑炮裂一兩麝香研半兩蜥蜴去頭足炙微焦一枚斑貓去足翅微炒十四枚雞屎白微炒一兩巴豆去皮心麩炒出油盡二十枚芫青去翅足微炒二十枚藜蘆去蘆頭微炙一兩右研為末拌勻煉蜜和丸梧子大每服空心米飲下二丸以吐利為度木香湯治初得遁尸鬼疰心腹中刺痛不可忍木香丁香各三分鬼箭羽桔梗銼炒各一兩桃仁湯浸去皮尖雙仁炒黃色十四枝一方用桃搗陳橘皮湯浸去白微炒一兩紫蘇莖葉微炒一兩半當歸焙乾一兩白檳榔慢火煨十四枚銼右粗搗篩每服五錢以水二盞煎至七分去滓溫服日二服不計時候一方用生薑一分拍碎同煎服五疰湯治卒中賊風遁尸鬼邪心腹刺痛大脹急大黃甘草各三兩當歸芍藥各二兩烏頭十枚生薑一斤蜜一斤桂心四兩右㕮咀别漬大黃以水九升煮取三升烏頭别納蜜中煎令得一升拌湯中去滓溫服三合如人行三十里久更進一服日三不知加至四合木香湯治初得遁尸鬼疰心腹中刺痛不可忍木香一兩鬼箭羽桔梗銼炒紫蘇莖葉炒令焦當歸焙乾各一兩半白檳榔右粗搗篩每服二錢水二盞入生薑一分拍碎同煎至七分去滓空心溫服日三治遁尸尸疰心腹刺痛不可忍者桂心乾薑各一兩巴豆二兩去皮心研紙褁壓去油右搗羅為散每用以醋和如泥塗於病上乾即更塗蒸尉方治遁尸飛尸及暴毒腫流入頭靣四肢右用芥子蒸熟焙一升搗為末以鉛丹二兩拌之分開作兩處用踈布袋盛之更換蒸熱以尉痛處常使極熱尉之三五度愈風尸附論夫風尸者在人四肢循環經絡其狀淫躍去來沉沉默默不知痛處若衝風則發故名風尸也方金牙散治風尸疰忤鬼氣心腹刺痛一名大附著散金牙一分細研由跋一分犀角屑一分黃芩一分麝香一分細研牛黃一分細研川椒一兩去目及閉口者微炒去汗一作椒目天雄半兩炮裂去皮臍真硃半兩細研蜈蚣一枚微炙去頭足細辛三分雄黃半兩細研乾薑半兩炮裂銼黃連三分去鬚桂心半兩右為散入研了藥令勻每服以暖酒調下一錢不計時候川大黃散治風尸及卒中賊風遁尸邪鬼五疰心腹刺痛川大黃一兩半銼碎微炒甘草一兩炙微赤當歸一兩半銼微炒赤芍藥一兩川烏頭一兩炮裂去皮臍桂心一兩右搗為散每服四錢水一中盞入生薑半分蜜半合煎至六分去滓不計時候溫服一方無當歸空腹溫酒服尸厥附論夫尸厥者隂陽氣逆也此由陽脈卒下墜隂卒上升隂陽離居榮衛不通真氣厥亂客邪乘之其狀如死猶脈有息而不常脈尚動而形無知也聽其耳內微響有如嘯之聲而股間暖者是也耳內無嘯聲而脈動者故當以尸厥療之診其寸口脈沉大而滑沉則為實滑則為氣實氣相摶身溫而汗此為入臟腑雖卒厥不知人氣復則自愈若唇正青身冷此為足臟厥不知人即死診其左手關上脈隂陽俱虗者足少隂足少陽俱虛也故病恍惚不知人妄有所見也內經謂客于手足少隂太隂足陽明之脈五脈俱竭令人身脈皆動而形無知其狀若尸故曰厥五絡皆會於耳中茍為邪所客則氣進逆厥上下暴隔五絡閉結而不通故俱竭而令人狀若尸焉治法當洗刺其足大指內則爪甲上去端如韭葉後刺足心後刺足中指爪甲上各一痏後刺手太指內去端如韭葉後刺手心主少隂鋭骨之端各一痏立已不已以竹管吹兩耳使氣脈踈通內助五絡然後藥石治之方通微丸治五絡閉結病發尸厥不知人營實根五兩薔薇根是也白薇三兩虎骨獺肝微炙五靈脂各二兩丹砂另研代赭另研各一兩右為末煉蜜丸如彈子大溫木香酒化下一丸日二以知為度不拘時候硃砂丸出聖惠方治尸厥脈動而無氣氣閉不通故靜如死聽其耳中翛翛有如嘯聲而股內暖者是也不治三日當死硃砂三分細研雄黃三分細研附子三分炮裂去皮臍桂心一兩半巴豆二十枚去皮心研紙褁壓去油右羅末入研了藥令勻煉蜜丸如麻子大每服不計時以粥飲下五丸不知更下二丸若痢多即止之返魂丹出聖惠方治尸厥不語生玳瑁硃砂雄黃白芥子麝香已上各一分右研如粉於寬器中鎔安息香和丸如菉豆大衝惡不語不計時以小便下五丸孩子熱風只一丸硫黃丸出衛生家寶方治尸厥奄然死去四肢逆冷不省人事腹中氣走如雷鳴焰硝半兩硫黃一兩右細研如粉作三服每服用酒一大盞煎覺焰起傾盆內蓋了酌溫時灌服如人行五里又進一服不過三服即蘇尸厥之狀卒死脈猶動聽其耳中或有如嘯聲腹間暖者是也右搗乾菖蒲棗核大著舌下人臥忽不語勿以火照耀之殺人但痛齧其踵及足拇指甲際多唾其靣即可活又菖蒲末吹兩鼻中又桂末吹舌下又菖蒲末如棗核大內下部中又吹入兩耳內即活矣治尸厥奄然死去四肢逆冷不省人事腹中氣走如雷鳴出聖惠方右用附子七枚炮熱去皮臍為散分作二服每服用陳酒三錢煎至一盞溫服又方出衛生家寶方右用生薑自然汁半盞酒一盞煎令百沸灌二服後却炙頭上百會穴四十九壯兼臍下氣海丹田穴至三百壯覺體溫暖即止治尸厥方出肘後方右鬄左角髮方寸燒灰以醇酒一杯飲之不能飲者即灌之立已又方出肘後方右以繩圍兩臂腕男左女右伸繩從大權度下行當在脊上炙繩頭五十壯即活又方出肘後方右尉兩脅下又取灶中墨如彈丸以漿水調和飲之須臾可三四度又取梁上塵如小豆許竹管吹入鼻孔中凡尸厥為病脈動而形無所知陽脈下墜隂脈上升榮衛不通其狀如死又猶微有息其息不常人乃不知欲殯斂者療治之方右以蘆管吹其兩耳極力以氣吹之立起若人氣已極可别易一人吹之一方以竹管吹兩耳中不過良久即活又方出肘後方用白馬尾二七莖白馬前腳目二枚合燒之苦酒為丸如小豆大開口吞二丸須臾再服一丸治卒中惡暴死出聖惠方右捧兩手莫放須臾即活又方出聖惠方右握兩大拇指令固即活又方出聖惠方右以竹管吹下部數更互吹之氣滿即活又方出聖惠方右吹皂角末入鼻中令嚏即活又方出聖惠方以酒磨桂心灌之即活又方出聖惠方右用研麝香一錢醋和灌之又方出聖惠方右取床下土小便研之灌瀝入口鼻即活白薇湯出指南方治鬱冒白薇紫蘇各三兩當歸二兩右為粗末每服五錢水二盞煎一盞去滓服倉公散出指南方瓜蒂雄黃藜蘆末礜石火煆右各等分研細末每用少許吹於鼻內以嚏省為度瓜蒂散出指南方赤小豆末右為細末每服一錢米飲調下以吐為度諸疰附論夫諸疰者邪氣所疰也皆因精神衰弱經絡空虛傷於風寒暑濕飲食勞倦及傷寒不時發汗或發汗不得真汗三陽傳於諸隂五臟留滯宿食或冷熱不調邪氣流疰或感死生之氣或挾鬼物之精初忽中惡客忤卒死諸尸之類雖或暫瘥必有邪氣伏於經脈流傳臟腑深浹骨髓經久不已皆成疰病變狀多端時發時瘥令人昏悶無不病處若因風寒暑濕之邪所疰則為風疰寒疰令疰溫疰濕疰若因飲食勞倦之邪所疰則為食疰飲疰酒疰若因感生死之際而為其邪所疰則為喪疰哭疰轉疰若因挾鬼物之精而為其邪所疰則為鬼疰邪疰尸疰殃疰犯土禁成疰者為土疰産後得疰者為産疰虛勞所成疰為勞疰邪氣外泄為泄疰此諸疰以受病因為名也邪疰於肺則為氣疰邪疰於榮則為血疰久疰不已傷損骨髓則為骨疰此諸疰以病之所在為名也又有石疰言其牢強如石走疰者言其逰走無常此諸疰以病之形變為名也治諸病者欲辨是非但覆紙於痛處燒髮令焦投於紙上若髮粘紙者疰氣引之也不黏者非疰也審知其因隨證治之諸疰者之診脈浮大者可治細而數者難治疰者住也言其連滯停住死又疰易傍人也疰病之狀或乍寒乍熱或皮膚淫躍或心腹脹刺痛或肢莭沉重變狀多端而方云三十六種九十九種及此等五疰病皆不顯出其名大體與諸疰皆有相同方金牙散治江南三十六種人病經年羸瘦垂死服之皆瘥并帶之能殺鬼氣逐尸疰諸惡癘不祥悉主之金牙研曽青研硝石研礜石泥褁燒半日石膏研莽草銼玉枝雄黃硃砂寒水石龍骨蛇蛻皮炙芫青熬當歸龍膽大黃細辛防風銼大戟芫花熬野葛炙蓯蓉天雄炮茯苓附子炮烏喙炮乾薑人參桔梗桂心椒去汗目貫衆巴豆去心皮熬汁狸骨炙蜂房炙鶴骨炙各一兩右為散以酒服一錢漸增五分日三并以三角絳囊貯散方寸匙以擊頭及心上一方加蜈蚣蜥蜴雌黃鑑鼻麝香毒公忌豬肉生血物生菜冷水大醋蘆笋龍牙散龍牙茯苓各用二兩半雄黃棗膏芍藥各五分乾地黃石斛胡燕尿各三分鬼翦烏頭羌活細切露蜂房曽青真硃桂心杏仁防風桃奴鬼臼鶴骨各一兩一方用鸛骨人參大黃各一兩半白术二兩蘇子四合銅鏡鼻甘草橘皮芎藭鬼督郵逺志鱉甲各半兩狸隂二具一方用狸骨三分蜈蚣一枚右治下篩酒服一刀圭以知為度當有蟲從大便出一方無棗膏金牙散主邪魅心腹刺痛金牙研雄黃丹砂研礜石泥裹燒半兩寒水石芫青熬巴豆去心皮熬朴硝桔梗茯苓人參貫衆附子炮蜀椒去目汗露蜂房炙龍骨乾薑川桂烏頭炮石膏研莽草炙蓯蓉大戟芫花熬防風狸骨炙商陸根大黃細辛蛇蛻炙玉枝貝母一作牙子右等分下篩酒服五分日三忌豬肉冷水生菜生血肉脂醋蘆笋麝香丸治五疰積年心痛鬼氣蠱毒百病悉療麝香研三分牛黃研藜蘆炙鬼臼去毛炙赤硃各半兩當歸切焙三分蜈蚣炙去頭足一枚芍藥銼雄黃研各半兩白茯苓去黑皮桔梗炒金牙碎桂去粗皮人參各三分獺肝炙熟一具吳茱茰湯浸焙炒貫衆各半兩丹砂研三分鬼翦羽半兩乾薑炮巴豆去皮心膜出油一兩蜥蜴盡去頭足一枚右研為末煉蜜丸如小豆大每服五丸空心米飲下日再稍加至七丸五野丸療五疰尸疰冷疰寒疰熱疰在身體寒熱短氣兩脅下痛引背腰脊吸吸氣小不能行飲食少靣目痿黃小便難項強不得俯仰腹堅癖臍左右下雷鳴脹急手足煩疼目不明喜忘及風濕痺腰脊不隨喜夢寤百病皆療之方一名牛黃丸牛黃研麝香研蜀椒去目炮雄黃大黃桂心蜀烏頭炮蜀天雄炮硝石熬人參當歸硃砂研細辛乾薑各二分石蜥蜴一枚炙巴豆五十枚去心皮鬼臼二分右搗篩煉蜜和丸如梧子大服三丸日再不知稍增以知為度忌豬肉蘆笋生蔥生菜生血物一方無鬼臼有川芒以暖酒下野狐丸治五疰與鬼神狐狸精魅鬼交通野狐鼻七枚豹鼻七枚炙野狐頭一枚炙雄黃鬼箭羽炙露蜂房炙白术大蟲頭角各一兩炙阿魏一兩驢馬狗駝牛肉各凹分燒作灰若用骨加炒故人腦骨一兩炙右為末攪和令勻又以水煮松脂候煬按取以和之時勿以手攪將大蟲爪和攪為丸用水磨下一丸分一半别搗雄黃為末衣以床下火燒之衣被覆之勿令泄藥煙并氣未汗出水磨二丸分飲一半須臾候等如汗不通約行十里再暖餘一服溫喫服後平身坐少時平身臥熱烘衣被和頭通身蓋卧令厚暖服藥處須在暖房中無令風入如汗出以燈燭照手足指及節間當有毫毛生出如青黃白色即一服見效如赤色須三次服如毛黑色必死之證如汗出以青絹拭遍身日出時於黑漆盆內洗當有蟲如麩片是驗大腸取下黑水紫黯黑黃白膿涎如諸般蟲等物是效次即服和氣藥皂莢丸治諸疰豬牙皂莢去黑皮酥炙研白馬夜眼炒令黑色研安息香炒令黑色研斑貓以糯米炒令黑色去米并翅不用餘即研粉霜二錢麩二錢水滳和為餅子煨令黃色研以上各稱二錢蜈蚣一條炙令黃色研蛇蛻一條炙令黑色研雄黃研丹砂硇砂研牛黃犀角屑胡黃連各一錢右同研令勻以黃狗膽汁為丸如梧桐子大别以丹砂末為衣每服五十丸四更盡以桃仁煎湯下十疰丸治十種疰氣疰勞疰鬼疰冷疰生人疰死人疰食疰水疰吐等方雄黃巴豆各二兩人參甘草麥門冬細辛一作藁本桔梗附子皂莢蜀椒各一錢右為末蜜丸如梧子大空腹服五丸日再稍加以知為度雄黃丸治諸疰病及中惡鬼邪客忤及一切不測之病並冝服雄黃一兩細研水飛過人參半兩去蘆頭甘草半兩炙微赤銼桔梗半兩去蘆頭藁本半兩附子半兩炮裂去皮臍麥門冬一兩去心焙川椒半兩去目及閉口者微炒去汗巴豆半兩去皮心别研紙裹壓去油右羅為末入研了藥令勻煉蜜和搗三二百杵丸如小豆大每服不計時候以溫酒下二丸殺鬼丸治五疰伏尸等病虎頭骨酒炙三兩藜蘆六兩豬牙皂莢炙鬼臼雄黃蕪荑仁天雄炮裂去皮臍各一兩右為末煉蜜丸如小彈子大每夜燒一丸五月五日午時合佳硃砂丸治諸疰鬼擊客忤心痛上氣鬼魘蠱毒硃砂細研白礬燒為灰藜蘆去蘆頭炙附子炮裂去皮臍雄黃各半兩細研蜈蚣