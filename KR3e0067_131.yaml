body:
  text: 普濟方卷一百三十二明周王朱橚撰傷寒門傷寒陰陽剛柔痓論夫傷寒痓病之狀身熱足寒頸項強直惡寒頭面熱搖頭卒口噤背脊反張是也此由肺熱移於腎轉而為痙痙有剛柔太陽病發熱無汗而不惡寒為剛痙發熱汗出而惡寒為柔痙診其脈沉細此為痙也又論云太陽病發汗過多因致痓其狀令人搖頭發熱頸項強急腰身反張或瘛瘲口噤但謂之剛痓者特以其無汗而反惡寒也柔痓之狀搖頭發熱頸強急腰身反張或瘛瘲口噤與剛痓同然謂之柔痙者特以其自汗不惡寒故也痓又謂之痙者蓋痙痓一類古人特以強直名之又云傷寒瘛瘲何以名之瘛者筋脈急也瘲者筋脈緩也急則引而順緩則縮而伸或縮或伸動而不止者名曰瘛瘲俗謂之搐者是也考內經曰病筋脈相引而急名曰瘛瘲謂若契合之契也行則緩身則緊從則瘲縱疾之從瘲謂若放縱之縱也以急為緊以緩為瘲理至明矣瘛瘲者風疾也而癲癎則瘛瘲焉傷寒瘛瘲者邪盛氣極也熱甚則風持併經絡風主動致四肢瘛瘲而不寧也故風濕被火者則發微黃也劇者如驚癎時瘛瘲言其熱氣則劇盛也傷寒病痓而發瘛瘲者病熱已過矣多難制治內經曰太陽終者戴眼反折瘛瘲絶汗乃出大如貫珠而汗不流是其瘛瘲為已過之疾也又有四肢熱惡寒四肢動而不止似瘛瘲而無力不得伸縮者也此為汗絶瘛瘲之證雖難治若能以袪風滌熱之劑折其大熱則瘛瘲亦有生者若妄加灼灸或引以發表之藥則死不旋踵經曰一逆尚引曰再逆促命期歌曰原來痓病屬膀胱口噤如癎身反張此是傷風感寒濕故分兩證有柔剛痓病無汗者剛葛根湯有汗曰柔桂枝加葛根湯二痓並通用小續命湯口噤腳攣咬齒大承氣證治論柔痓桂枝栝蔞葛根湯傷寒頸項強急身體反張屬太陽經先因傷寒又感寒濕而致然也古人謂之痓病痓音熾又作痙巨郢反痙者強直也古人以強直為痙金匱要略太陽病其身體兀兀便痙也外證發熱惡寒與傷寒相似但其脈沉遲弦細而項背反張強硬如發癎之狀此為異耳新痓血虛多汗也善中風亦有此症當其有汗無汗以分剛痓柔痓無汗惡寒名剛痓有汗不惡寒名柔痓無汗葛根湯主之有汗桂枝加葛根湯主之本草葛根主傷風有濕開竅解肌凡剛柔二痙小續命湯並可與之有汗者小續命去麻黃加葛根也若審知剛痓胸滿口噤其人卧不著席腳攣急咬齒當行大承氣湯外臺云熱而痓者死熱病痓者反折瘛瘲齒噤齦也又問剛柔二痓與陰陽二痙是如何痓亦作痙陽痙屬剛痓陰痙屬柔痓附术散桂心白术湯附子防風散八物白术散桂枝煮散可選而用之方羌活散治傷寒陰痙筋節急硬陽痙即易差陰痙即難差羌活黃松木節銼茯神石膏防風各一兩去蘆頭王不留行桂心各半兩麻黃去根節一兩當歸半兩銼微炒右為散每服四錢以水一中盞入生薑半分棗二枚煎至六分去滓不計時候溫服頻頻服後宜食荆芥葛根石膏豉粥避風如額上漸潤以厚衣蓋之汗出便瘥附子散一名人參散出聖惠方治傷寒陰痙頸項強直四肢疼痛足冷口噤附子炮製去皮臍人參去蘆頭白茯苓前胡去蘆頭白术麻黃去根節桂心半夏湯浸七遍去滑當歸炒各一兩半獨活一兩半石膏二兩乾薑半兩炮製銼右為散每服五錢以水一中盞入生薑半分煎至五分去滓不計時候溫頻頻服白术散治傷寒陰痙手足厥冷筋脈拘急汗出不止白术桂心附子炮製去皮臍防風去蘆頭芎藭甘草炙微赤銼各二分右為散每服四錢以水一中盞入生薑半分棗三枚煎至五分去滓不計時熱服麻黃散治傷寒陰陽痙病頭痛壯熱百節痠疼吐逆悶絶口噤腰背反張手足強直肉熱脈數麻黃一兩去根節防風一兩去蘆頭赤茯苓一兩葳㽔一兩葛根一兩半銼獨活一兩半漢防己芎藭白蘚皮牡丹各三分石膏桑寄生各一兩甘草三分炙微赤銼黃芩一兩秦艽一兩去蘆右為散每服五錢以水一大盞煎至七分去滓入淡竹瀝一合更煎三兩沸分溫二服日三四服治傷寒汗出後成隂陽痙骨節煩痛不得屈伸近之即痛汗出短氣小便不利惡風身體微腫附子一兩炮製去皮臍白术三分甘草半兩炙微赤銼右為散每服五錢以水一大盞入生薑半分棗二枚煎至五分去滓不計時候溫服白术散治傷寒陰痙三日不瘥手足厥冷筋脈急汗不出恐有氣內傷白术白茯苓麻黃去根節五味子各半兩桂心三分髙良薑一分銼羌活半兩附子三分炮製去皮臍右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服柴胡散治傷寒陰痙閉目頭面手足厥逆筋脈拘急汗不止柴胡一兩半去苗白术白茯苓甘草炙各三分五味子一兩乾薑炮製銼附子炮製去皮臍防風各三分去蘆頭桂心半兩右為散每服五錢以水一大盞生薑半分煎至六分去滓不計時候溫服桂心散治傷寒陽痙經二三日不瘥毒氣攻五臟心神煩躁四肢疼痛桂心柴胡去苗赤茯苓五味子麥門冬去心檳榔甘草炙微赤銼細辛以上各三分右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服羚羊角散治傷寒陽痙身熱無汗惡寒頭項強直四肢疼痛煩躁心悸睡不得寧羚羊角屑犀角屑防風去蘆頭茯神柴胡去苗麥門冬去心人參去蘆頭葛根銼甘草炙微赤銼枳殼各一分麩炒去穰石膏龍齒各半兩右為散每服三錢以水一中盞煎至五分去滓不計時溫服麥門冬散治傷寒陽痙身體壯熱項背強直煩燥發熱惡寒頭面赤色四肢疼痛麥門冬去心麻黃去根節赤茯苓知母犀角屑地骨皮黃芩赤芍藥白蘚皮甘草炙微赤銼杏仁湯泡去皮尖雙仁用炒微黃各三分右為散每服五錢以水一大盞煎至五分去滓不計時候溫服龍齒散治傷寒陽痙通身大熱不渴煩悶頭疼龍齒前胡去蘆頭各三分犀角屑木通子芩各三兩甘草一分炙微赤銼右為散每服五錢以水一大盞煎至五分去滓入牛黃末一字攪令勻不計時候溫服一方無甘草石膏散治傷寒陽痙通身熱仰目頭痛石膏二兩龍齒一兩犀角屑前胡去蘆頭各半兩秦艽一兩去苗右為散每服五錢以水一大盞入豉五十粒蔥白七寸煎至五分去滓入牛黃末一字攪令勻不計時候溫服防風散治傷寒陽痙壯熱不歇筋脈拘急牙關急疼防風去蘆頭木通銼麥門冬去心川升麻以上各一兩甘草三分炙赤銼右為散每服五錢以水一大盞煎至五分去滓不計時候溫服芎藭散治傷寒頭痛面色赤發熱形如中風常自汗出嘔逆下之益煩心懊憹如飢發汗致痙身強難以屈伸川大黃銼碎微炒芎藭各一兩獨活二兩柴胡一兩半去苗防風三分去蘆頭右為散每服五錢以水一大盞煎至五分去滓不計時候溫服白蘚皮散治傷寒陽痙壯熱不渴筋脈不能舒展牙關疼急不欲見食白蘚皮百合木通防風川升麻各一兩羚羊角三分石膏龍齒各一兩半右為粗末每服三錢以水一中盞入蔥白七寸豉五十粒煎至六分去滓不計時候溫服龍齒散治傷寒陽痙通體大熱心神煩悸龍齒前胡去蘆頭各一兩犀角屑半兩牛黃半分另研麥門冬一兩去心焙右為細末入牛黃同研令勻每服以竹瀝調下二錢不計時候服牛黃散治傷寒陽痙發熱急寒頭項強直四肢拘急心神煩燥牛黃細研麝香細研硃砂細研人參去蘆頭赤茯苓防風去蘆頭芎藭甘草炙微赤銼桂心犀角屑地骨皮天麻麥門冬去心焙已上各一分右為細散入牛黃朱砂麝香同研令勻每服不計時候以竹瀝湯調下二錢葛根湯治太陽病無汗而熱小便短少氣上衝口噤不得語欲作剛痓葛根銼四兩麻黃去根節煎掠去沫焙芍藥各三兩桂心去粗皮甘草炙各二兩右㕮咀如麻豆大每服五錢水一盞半生薑五片棗二枚擘破同煎至七分去滓溫服取微汗大承氣湯治剛痙胸滿口噤卧不著席兩腳攣急齗齒大黃銼四兩厚朴去粗皮生薑汁炙半斤枳實去穰麩炒右㕮咀如麻豆大每服五錢水一盞半煎至七分去滓入芒硝末半錢再煎一兩沸溫服石膏湯治傷寒剛痓身熱仰目頭痛項強石膏碎前胡去蘆頭各一兩犀角鎊防風去蘆芍藥各半兩龍齒研二分牛黃研一錢右粗搗篩每服五錢水一盞半入豉一百粒蔥白五寸煎至八分去滓不計時候溫服羚羊角湯治傷寒剛痓渾身壯熱頭痛口噤筋脈拘急心神躁悶羚羊角鎊百合芎藭木通銼葛根銼升麻黃芩去黑心各半兩石膏碎一兩龍齒防風去蘆各三分右粗搗篩每服五錢水一盞半煎至一盞去滓不拘時溫服日再服神术湯治風濕惡寒脈緊解利無汗蒼术防風各二兩甘草一兩右㕮咀生薑水煎加蔥白三寸治剛痓加羌活獨活麻黃白术湯治風濕惡風脈緩解利有汗白术三兩防風二兩甘草一兩右㕮咀每服稱三錢水一盞生薑三片煎至七分去滓溫服無時治柔痓加桂心黃耆白术太陽陽明加川芎荆芥穗正陽陽明加羌活酒大黃少陽陽明加防風柴胡根熱而在表者加黃芩寒而在表者加桂枝黃耆附子熱而在裏者加大黃寒而在裏者加乾薑良薑附子以上數經寒熱當以脈别之龍齒犀角湯治傷寒剛痓通身壯熱龍齒犀角鎊前胡去蘆頭各一兩牛黃一錢半右四味將三味粗搗篩每服五錢水一盞半煎至八分去滓入牛黃少許不拘時溫服犀角大黃散治傷寒剛痓壯熱頭痛筋脈不能展舒犀角鎊大黃銼炒各一兩芎藭半兩石膏二兩牛黃研半分右四味搗羅為散入牛黃同研令勻每服一錢不拘時淡竹葉湯調下小續命湯治傷寒剛痙無汗惡寒口噤背強麻黃去根節煎掠去沫桂心去粗皮甘草炙各半兩防風去蘆一分半芍藥白术人參芎藭附子防己黃芩去黑心各一分右銼如麻豆每服五錢水一盞半煎至一盞去滓入生薑汁少許煎至一二沸溫服日三夜二若柔痓自汗者去麻黃夏病及病覺熱甚者減桂枝一半冬及初春病去黃芩栝蔞桂枝湯治太陽病其證憊身體強兀兀然脈反沉遲自汗此為柔痓栝蔞桂枝湯主之栝蔞根二兩桂枝三兩芍藥三兩甘草二兩生薑三兩大棗一十二枚右以水九升煮取三升溫頻服取微汗汗不出食頃啜熱粥發之一方有葛根桂枝加葛根湯治傷寒柔痓項背強兀兀反汗出惡風方見本門發汗吐下後脈證類桂术湯治傷寒柔痓手足厥冷筋急汗不止桂去粗皮一兩白术人參附子炮製去皮臍各三分防風去蘆乾薑炮甘草炙各半兩右銼如麻豆每服五錢水一盞半煎至八分去滓溫服日二附子白术湯治傷寒柔痓手足逆冷筋脈拘急汗出不止頸項強直搖頭口噤附子炮製去皮臍白术各一兩芎藭獨活去蘆頭桂去粗皮各半兩右銼如麻豆每服三錢水一盞入生薑半分拍碎棗二枚擘破同煎至七分去滓溫服不拘時五味子湯治傷寒柔痓汗出身體強直手足多寒五味子炒一兩附子炮製去皮臍木香檳榔各三分白术桂去粗皮乾薑炮甘草銼各半兩右銼如麻豆每服五錢水一盞半煎至八分去滓食後溫服晚再服附子散治傷寒柔痓身體直汗出不止腹內急痛附子炮製去皮臍乾薑炮甘草炙銼桂去皮人參各半兩右搗羅為散每服二錢以薑粥飲調下不拘時薑术湯治時行及傷寒後虛憊發即閉眼合面者柔痓之候也厥冷筋脈急強汗出不止乾薑炮白术桂去皮各一兩附子炮製去皮臍甘草炙各半兩防風去蘆一兩右銼如麻豆每服五錢用水一盞半煎至八分去滓溫服柴胡飲治傷寒柔痓四肢逆冷汗不止腹中痛筋脈急柴胡去苗赤茯苓去黑皮各三分檳榔煨銼五味子炒各半兩桂去粗皮髙良薑羌活去蘆頭各一分右粗搗篩每服五錢用水一盞半煎至八分去滓溫服茯苓湯治傷寒柔痓病經三日不差恐陰氣攻五臟致損赤茯苓去皮五味子炒麥門冬去心焙各