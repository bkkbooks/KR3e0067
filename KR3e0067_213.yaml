搗羅為散每服二錢七水白湯調下兼治腹痛止虚渇芍藥黄芩湯治泄痢腹痛或後重身熱久不愈脉洪𦂳者及下痢膿血稠粘黄芩芍藥各一兩甘草半兩右㕮咀每服半兩水一盞半煎一盞温服無時如痛加桂少許三竒散治痢後裏急後重枳殻黄耆防風右等分為末每服二錢蜜湯下米飲亦得如聖散治後重下膿血臭橘萆薢各一兩右搗碎炒令煙出放冷為細末每服二錢至三錢米清調下治裏急後重好蛤粉川山甲各等分右為細末每服一錢好酒空心調服又方治裏急後重枳殻皂莢子右等分炒令乾燥為末米飲為丸如梧桐子大每服三十丸空心米飲下大黄湯治泄痢久不愈膿血稠粘裏急後重日夜無度久不愈者用大黄一兩右剉細以好酒二大盞同浸半日許煎至一盞半去大黄不用将酒分二服頓服之如未止再服以痢為度復服芍藥湯和之痢止再服黄芩芍藥湯和之以徹其毒也白术黄耆湯服前藥痢疾雖除宜此和之白术一兩黄耆七錢甘草二錢右㕮咀匀作三服水煎服一方無黄耆用黄芩半兩療重下方療源云此謂赤白滯下也令人下部疼重故名重下去膿血如鷄子白日夜數十行繞臍痛也用豉熬令少焦搗服一合日再三服不止又熬豉令焦水一升淋取汁服冷則用酒淋日三服之治重下下赤者方取獺赤糞右以酒清旦空腹服一小杯三旦飲即愈赤白下乆穀道疼痛不忍宜服温湯藥用炒豉熨之又炙枳實熨之治裏急後重不能安快用末子人參消風散及黒神散小平胄散右和匀用乾艾并陳米五十粒煎湯去滓只用湯調藥服其効如神靈砂丹治臟腑怯弱内有積滯臍腹撮痛下痢膿血日夜無度裏急後重腸鳴腹脹米穀不化少氣困倦不思飲食不發寒熱漸羸痩硝石砒霜膩粉粉霜各半両黄丹枯礬各一両半朱砂乳香滑石各一分右為末用蒸餅二两四錢和為丸如梧桐子大每服五丸温粟米飲下未愈加丸數再服小兒服一丸二丸厚腸丸治臟虚氣寒下痢不止裏急後重臍腹疼痛鍾乳粉二両宣黄連人參白术訶子荳㓂厚朴茴香阿膠白茯苓右件為細末入鍾乳粉同研匀湯浸蒸餅為丸如梧桐子大每服一百丸糯米飲下空心服濕䘌附論夫􅊜䘌病者由脾胃虚弱為水濕所乘腹内生蟲侵蝕成䘌也䘌者蟲至於䘌而難知也多因下痢不止或時病之後客熱結於腹内其狀不能飲食忽忽喜睡口乾燥熱骨節沉重齒無光色舌上盡白細瘡如粟若上唇生瘡是蟲食五臟則心煩懊若下唇生瘡是疳食下部則肚門爛開甚者臟腑被蝕齒上下齗悉生瘡者齒色紫黒利血面濕水氣也脾附乎胃而象土胃為水穀之海脾氣磨而消之水榖之精化為血氣以養腑臟若脾胃虚弱則土氣衰微或受于冷乍傷于熱使水榖不消化糟粕不實則或下痢翻為水濕所傷若久病之後傷胃虚熱熱則三尸九蟲因虚發動侵蝕五臟上出唇口下至肛門胃虚氣弱則變嘔噦蟲蝕臟腑傷敗痢出瘀血如此者死其因脾胃虚微土氣衰弱為水濕所侵蟲動成􅉶故名濕􅉶也又云天行之濕初得不覺行坐不廢恒少力氣或微痢或不痢或痢而變嘔吐即是蟲内蝕于臟又云急結濕先因腹痛下痢膿血相兼出成病也故大小便不通頭頂皆痛小腹急滿起坐不安必有内蝕五臟凡如此者雖初證未發于外而心腹亦常煩懊不治則唇口及肛門潰爛而死也方薫黄散治疳濕􅉶下赤黒血肛門蟲蝕赤爛日夜疼痛雄黄丹砂食鹽青黛丁香礬石梔子仁鐡衣麝香茛菪子細辛土𤓰根乾薑菖蒲煆蟇甜葶藶蜀椒故靴底各一兩天靈葢一分右搗研為散每服一錢已以綿褁内下部中日再易治疳濕􅉶蝕口齒及下部右用飛連三兩燒為灰細研每用一錢傳病處痛甚忍之若不痛則非疳又方治疳濕經年不瘥用燒香曝乾搗末傳瘡神効青箱子散治疳濕􅉶殺蟲青箱子雄黄硫黄蕪荑仁苦參狼牙各三分藜蘆二分雷丸半兩右搗研為散以綿褁一錢匕内下部中日再易之丁香散治濕􅉶不止丁香青黛黄連木香灰石蚺蛇膽半兩麝香一錢右搗研為散每用半錢傳瘡上日三兩易蕪荑丸治濕䘌痢不止蕪荑仁吳茱茰枳殻乾薑半兩黄連各二分右搗篩為末煑漿水飯和丸如梧桐子大每服二十丸空心日午米飲下聖湯治下赤白痢大孔蟲䘌生皆瘥䑕尾草二兩豉一升梔子仁生薑各六分桃皮右㕮咀以水七升煮二升半分三服一本單用桃皮以酒煮服之苦參湯治疳濕䘌口齒及下部苦參青箱子熊膽各半兩右除熊膽外搗篩服每服四錢匕水一盞半煎至八分去滓入膽半分攪和空心頓服日午再服之一方無熊膽用生地黄汁調下一錢黄連湯治痢濕䘌下部瘡爛黄連四兩熟艾二兩苦參槐白皮各三兩右細剉如麻豆每服五錢水二盞煎至八分去滓重者不過三劑丁香散治甘濕􅉶洗熨下部丁香一分麝香一錢犀角甘草各三分右搗研為散以鹽椒各三合豉二升水三升去滓熱用綿蘸洗熨下部冷即易參連湯治濕䘌痢蟲蝕下部苦參兩半黄連二兩阿膠一兩右粗搗篩每服五錢匕水一盞半煎至八分去滓空心温服日晩再服治下部疳濕䘌經年不瘥白礬半兩桂心半兩徐長卿半兩右搗細羅為散每用半錢日二三上傳瘡蕪荑黄連丸治濕䘌痢蕪荑仁半兩黄連一兩右搗細為末煉蜜丸如梧桐子大每服五丸空心食前暖米飲下加至七丸治濕䘌痢下血不止乾嘔羸痩多睡面黄者用猪膽和生薑汁釅醋半合灌下部手急捻令醋氣上至咽喉仍放手當下五色惡物及蟲雄黄散治疳䘌蝕下部生瘡膿血雜下身面俱浮腫雄黄青箱子各二兩苦參三兩礬石雌黄藜蘆鐡衣各一兩麝香半兩右搗研為散每和醋棗大以竹管送内下部中若小兒以大豆許此方能救死兎頭散治疳濕乆下痢赤白蟲蝕肛門赤爛下血痛名為濕䘌兎頭骨苦參蛇頭薪箕子胡緋貍骨葶藶子蜣琅黄蘗百草倒掛草青黛晩蠶蛾青礬丁香乾薑蝎䖝屎麝香牀中恍木印成鹽救月木桂心角蒿鐡衣硃砂芒硝蝦蟇黄礬荏子各等分右炒為細末入筒子中内下部吹進日一二度一方無荏子倒掛草有丹參半分治疳濕下黒痢醫不能治垂死者髑髏灰薰黄硃砂青黛石鹽丁香莨菪子麝香礬石梔子鐡衣乾薑乾蝦蟇故敝靴底灰細辛芥子蜀椒土𤓰根葶藶菖蒲各等分右治節以竹筒吹杏仁着大孔中所有患者疳瘡上悉傅之其丁香麝香别妍搗着藥中合之一方有寒水石泔淀救月木揪葉為二十三味若病大者用灌方佐麝香丁香甘草犀角各三分右四味為粗末合和以鹽三合豆䜴二合以水二升煮取一升去滓内四味散合和分作二服灌大孔日一灌凡九下一日不瘥成疽候大孔心寛者是以此主之黄芩湯治疳􅊜不能食身轉心熱脚冷百節㽲痛黄芩芍藥苦參甘草當歸蜀椒甘松猪膽二枝青黛黄豉各二兩東引桃根葱白各一䀋一分麝香半兩右㕮咀以水一斗八升煑取四升分為二分一度灌一分湯如稍安再覺着麝香猪膽一枚即灌更取葱豉和食之後日更将一服如前灌之七日忌生冷毒物等但是油膩醤乳醋三十日忌之大佳烏梅湯療熱下䘌方烏梅四十枚梔子四十枚黄連阿膠黄蘗各二兩右五物以水五升煑取二升半分再服姚云療熱水穀下効疳䘌附論夫疳䘌者由人多嗜甘味多而動腸胃間諸蟲致令侵蝕腑臟此是䘌也凡食五味之物皆入於胃其氣結於腑臟之中而不散脾與胃為表裏俱象土其味柔潤於脾胃脾胃潤則氣濕而蟲動虫動則侵蝕成疳也但蟲因疳而動故名之為疳也其初患之状手足煩痛腰脊無力夜卧煩燥昏昏喜睡黒黑眼澁羸弱顛倒飲食無味面無顔色睡起即頭眩體重腔脛痛疼其蟲蝕五臟則心内恍愡出蝕咽喉及齒齗皆生瘡出黑色齒血紫赤下蝕腸胃下痢黑血蝕肛門生瘡爛開胃氣逆則變嘔噦急者數日便死亦有緩者沉嘿肢節疼重食飯减少面無顔色在内侵蝕及至數年方上蝕口齒生瘡下至肛門傷爛乃死又云五疳即是白疳令人皮膚枯燥面失顔色二是赤疳内蝕五臟令人頭髮焦枯三是燒疳蝕人脊臍逰行五臟體重四是疳䘌令人下部痒腰脊攣急也五是黑疳蝕人五臟多下黒血數日即死凡五疳白者輕赤者次蟯疳又次之疳䘌又次之疳黒者最重皆從腸裏上蝕咽喉齒齗並生瘡下至糓道腸爛下痢膿血嘔逆足心熱腰痛嗜睡秋冬可春夏劇又云面青煩赤眼無精光唇口焦燥腹脹有塊日漸瘦損者是疳蝕人五臟至死不覺又云疳緩者則變成五蒸也方丁香散治五疳蒸下痢丁香麝香石黛皮鹽山榆皮小蘗皮桂心乾薑青礬頭髮灰各等分右搗為散每用取乾者和臘月猪油和兼療時行病後食羊肉及肥膩酒或房勞得九蒸終變為疳必須攻下部不行可輕之忌生葱効兀子礬散治乆患疳痢不瘥兀子礬黄連白礬龍骨雲母粉麝香無食子右搗研為散空心生薑汁調下三錢匕日再服女萎丸治熱病時氣下赤白痢遂成䘌方女萎藜蘆烏頭桂心黄連雲母石代赭右為末蜜和丸如桐子大服二丸大下痢宿勿食清旦以冷水服之勿飲食至日中過後乃飲食者若得藥力明旦更服如前亦可長服虚羸晝夜百行膿血亦瘥石榴丸治久痢成疳便下白色食不生肌膚石榴皮橡實附子無食子厚朴乾薑右搗羅為末米飲和衆手丸如梧桐子大每服三十丸食前生薑湯下苦參甘草湯治疳痢不止苦參甘草薫黄豉葱白蜀椒右以苦參等三物各搗下篩以水五升煑葱白豉椒取三升以三指撮苦參末等各一撮内汁中冷煖令適中先飲少許豉汁食一口乃側卧徐徐灌之訖多時卧不出為佳大急乃出之於净地當有疳温蟲如白馬尾状頭黑是効也其肛腫大難差當取桃枝綿褁頭用前件汁乘熱急烙之須臾復一作三十度烙之乃瘥神効治疳䘌經年不瘥用蚊蛤燒灰以臘月猪脂和塗之大効療疳􅊜痢神効方黄連零陵香犀角屑丁香麝香牛黄右以水洗黄連零陵香丁香澄清水去滓更以水添滿九升内黄連零陵香丁香犀角煑沸服然後着牛黄麝香煎一沸取一升分作三服如一服不盡二日服亦得忌生冷酢滑猪肉魚三日内不得食葱韮深師以九升先以一升煑煎添盡九升取一大升分為三服麝香丸治疳䘌時久下部生瘡麝香乾薑蠧蟲糞葵莖白礬蝦蟆右搗羅為末以醋煑麫糊和丸如梧桐子大每於食前以艾湯下十丸五皮湯治久痢赤白疳􅊜諸疾槐皮桃皮樗根白皮栁皮棗皮右細剉用水二盞煎至一盞去滓濕服末止再服樗白皮散治久痢成疳灌洗方樗根白皮大麻油酢泔淀椒豉右以水五升先取椒豉煎絞取汁二升和樗汁麻油泔淀等三味分為二分一分灌下部隔一日更取餘者復灌其藥温用唯得食煑飯葱白爛煑蔓菁芥等五十六日外以鹿脯下飯治疳蝕人諸處旦是赤血痢久不瘥立着即瘥秘方乾蝦蟆人屎灰金銀土蝸各五兩麝香銀末右治下篩傅瘡上即瘥忌生冷毒物一切油膩醤乳醋忌之三十日大佳痢者吹下部二白湯治久痢變疳下部生惡瘡惡寒壮熱桃白皮槐白皮苦參熟艾大棗右以水五升煑取二升半去滓内熊膽一棗許大艾蜜右以水一升先煑黄連艾取半升後内硫黄末更煑三五沸絞去滓又内蜜更煑三五沸分三服一治丈夫婦人小兒久痢成疳百藥不瘥丁香麝香黄連右搗研為散每以一錢取竹筒吹入下部小兒量度減之不過三四次瘥一方食前以粥飲調下二錢療五疳蒸下痢青黛丁香黄連各等分右搗篩用泔淀和為丸口中有瘡含之若下部有瘡以綿褁内下部日服五六十丸含之令下瘥苦參丸治疳䘌上唇内生瘡如粟口中乾澁腹痛面色枯白好睡體重蟲食五臟苦參一兩桃皮白三分槐皮白三分右細剉以水三大盞煎至二大盞去滓食前分温三服黄礬散治疳䘌腸頭挺出黄礬一兩乾薑一兩葛勒蔓一兩右搗羅為散熔黄蠟和如棗核大以薄綿褁内下部中日易三効治疳痢不止千金方大麻子胡麻各一升半右並炒令黄以三升瓦缾泥表上厚一寸待泥乾内大麻等令滿以四五枚􅓗管揷口中密泥之掘地作竈倒立竈口底著瓦器承之密填竈孔中地平聚灰著缾四面厚圍之日夜放火燒至明旦開取適寒温灌疳温者下部中一合尋覺咽中有蘗氣者為效亦不得過多多則傷人隔日一灌重者再三灌之従旦灌至日夕極覺體中乏力勿恠也非旦治疳温凡百異同瘡疥癬並洗塗之治疳䘌蟲蝕下唇生瘡多睡頭面時腫下部痔痛不止者出聖恵方雞子好漆一合右相令匀空腹仰頭頓服令盡當吐蟲即愈治疳䘌腸頭挺出桃葉二兩腐犬骨二兩右搗細羅為散每服於食前以粥飲下二錢又方出聖恵方乾蝦蟆一枚糞半兩右細研為散用綿褁連子大内下部中易効治疳瘡久不瘥羸瘦欲死出聖濟總録用新出羊糞一升以水一升漬經宿明旦絞滓頓服之至日午唯食煑飯極重者不過三服薤白餅治療疳痢及諸痢疾出續易簡方用薤白一握生搗如泥以粳米粉二物蜜調相和桿作餅炙取熟與喫不過三兩服一方切煑作粥治痢下膿血以醋煑食之治病人齒無色舌上白或喜睡眼憒憒不知痛痒處或下痢急治下部不曉此者但攻其上不以為意下部生蟲蟲食肛門爛見五臟便更用馬蹄燒灰末猪脂和傅綿上導下部日二三度瘥療冷疳痢方用莨菪子炒令黄色㨶為末和臘月猪脂更搗令熟為丸綿裹如棗許大以内下部中因痢出即更内新者不過三度即瘥療痢後膿血或變純白或成魚腦五七年以上或一二年不瘥變成疳下如泔淀方用生羊肝一具剥去上膜切作栁葉朝暮空腹取肝手取吞之覺心悶則止不悶還服之一日之間能不食粥飯盡一具羊肝者大佳不然除飽吞外料理生肝以薑虀下飯如常法食之日食一具肝不過二三具即永瘥後一月不得食熱麫油膩醬猪肉魚雞肉等苦參散出聖濟總録治疳䘌蝕人下部通見五臟下痢膿血舉體不安徧身疼痛面無顔色手足虚腫苦参礬石熬令汁盡青箱子各半兩藜蘆一分右為末每服用二錢七置竹筒中吹下日三二度小兒只一錢猪膽煎出聖濟總録治疳䘌下部上攻移熱殺蟲猪膽一枚米醋五合右煎醋令百沸入膽汁更三五沸滿口飲之蟲死即瘥治疳䘌無問所在皆治之出聖濟總録用死蝦蟆燒灰研末以油塗瘡上一方用好醋和傅之日三五度瘥治疳痢曉夜無度者出本草用樗根濃汁一雞子殻許和粟米泔一雞子許灌下部再度即瘥其騐如神小孩減用之甚妙治疳痢困重用樗白皮搗麫拌作小顆子日曮少時又拌凡三過水煑至熟加鹽酢酒一得頻服多少量兒大小治久痢成疳用胡粉和水及雞子白服以糞黒為度為其殺蟲而止痢也治疳蟲亦治腸瘋顛血并熱痢用苦參炒待烟出為末飯後下治疳痢用粟米酸泔和臭樗皮煎服治疳痢腹中諸瘡用豺皮煑汁飲或燒灰和酒服之其灰傅䘌齒瘡普濟方卷二百十三
