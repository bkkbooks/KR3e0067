  - {type: page-break, offset: 0, content: '', id: KR3e0067_WYG_213-1a, image: WYG0754/WYG0754-0212a.png}
body:
  text: 普濟方卷二百十三明周王朱橚撰泄痢門腸滑下腸垢附論夫脈經謂大腸有熱便腸垢者腸間津汁垢膩也蓋傳化之府熱氣積而為痢痢久不已腸間虛滑津垢方出是邪熱氣實致臟氣虛故有此證方陟釐丸治久痢下腸垢陟釐緑礬石灰各三兩鉛丹赤石脂石脂胡粉各一兩半右為末入餅子內燒一伏時取出研極細麵糊丸如梧桐子大每服二十丸空心粥飲下一方用吳礬三兩白礬一兩半附子散治久痢不瘥腸垢出附子赤石脂桂去粗皮乾薑各等分右為末煉蜜丸如梧桐子大每服二十丸空心米飲下食前日三服麝香丸治久患冷痢及休息痢脾胃虛極大腸滑泄腸垢不絶麝香半兩鹿茸炙二兩右為末醋煮麵糊丸梧桐子大每服三十丸粥飲下不拘時候日三服一方煮棗瓤和丸烏梅湯治久痢不瘥或腸垢用烏梅二十個捶研水一升煎四合去滓空心服未愈日晚再煎服石榴汁方治久痢不瘥腸垢出用酸石榴皮大者一枚搗研絞取汁空心服之一方酸石榴皮一枚和皮取汁茛菪丸治久痢腸滑下垢不止羸困勞痢茛菪子乾薑白礬各二兩右為末醋煮麵糊丸如梧桐子大每服三十丸粥飲下赤石脂丸治水穀痢積久不瘥下腸垢赤石脂一兩桂心一兩白礬一兩乾薑一兩附子一兩炮右搗羅為末煉蜜和搗百餘杵如梧桐子大每服不計時候以粥飲下休息痢附論夫休息痢者由胃脘有停飲因痢積久或冷氣或熱氣乘之氣動於飲而腸虛受之故為痢也冷熱氣調其飲則淨而痢亦休也腸胃虛弱易為冷熱所傷氣或動或靜則其痢亦乍發乍止故謂之休息痢也治法當先退其寒熱再投止痢之劑則愈也方麥蘗丸治休息痢不能飲食及羸瘦大麥蘗附子陳麴肉桂烏梅肉人參白茯苓各一兩右搗羅為末煉蜜為丸如梧桐子大每服三十丸煮棗粥飲不拘時沒石子散治休息痢脾胃氣虛冷大腸轉泄或發或止沒石子肉豆䓻桂心各半兩訶梨勒一兩龍骨一兩麝香一分厚朴一兩半右搗羅為末每服一錢粥飲半盞調下食前服之丹粉丸治下痢乍瘥乍發病名休息丹砂半兩粉霜三錢膩粉鉛丹各四兩硝石研二錢砒霜研二錢白礬灰三錢右同研勻用水浸炊餅心為丸如菀豆大每服三丸冷麵湯下看虛實加減縮砂丸治冷氣腹痛止休息氣痢勞損消化水榖溫暖脾胃及治冷滑下痢縮砂仁附子乾薑厚朴陳橘皮肉豆䓻各半兩右搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲下食前服吳茱茰煎丸治休息痢肌羸無力腰膝冷臍下痛吳茱茰一兩陳橘皮三兩生薑一斤無灰酒一升附子二兩當歸一兩右搗羅為散先將薑汁并酒入鐺子內慢火煎不住手攪次入藥末煎成膏候可丸即丸如桐子大每於食前以粥飲下三十丸阿膠湯治休息痢阿膠黃連龍骨各一兩艾葉半兩倉米二合右粗搗篩每服五錢以水一盞半煎至五分去滓空心溫服日午再服肉豆䓻丸治休息痢久不瘥嘔吐腹內疼痛肉豆䓻訶梨勒烏梅肉各一兩黃連一兩半白礬半兩右搗羅為末煉蜜為丸如梧桐子大每服二十丸空心用粥飲下紫金散治休息痢定粉鉛丹各一兩大棗二兩茛菪子一兩半訶梨勒一兩右同和搗成一團以麵重褁於火中燒令煙盡取出去灰土令淨搗羅為散每服空心米飲調下四霜丸治休息痢久不瘥巴豆霜半錢百草霜二錢粉霜一錢砒霜半錢乳香末一錢右研細令勻用黃蠟半兩鎔汁和為丸如菉豆大每服一丸食前服安息香散子治休息痢發歇不恆羸瘦少力安息香半兩阿膠半兩黃連一兩桃白皮一兩漢椒一分右搗細羅為散每於食前以粥飲調下一錢治休息痢發歇不定經久不瘥黃牛角腮木賊草豆䓻各一兩麝香一分楮葉一兩右搗細羅為散每於食前以粥飲調下一錢白頭翁丸治休息痢日夜不止腹內冷痛白頭翁一兩黃丹三兩乾薑一兩茛菪子半升白礬二兩右搗羅為末以醋煮麵糊和丸如梧桐子大每於食前以粥飲下十丸黃丹散治休息痢諸藥無效黃丹三兩棗肉三十枚枳殼半兩黃連半兩右搗羅為末每服一錢空心粥飲調下忌油膩冷物亦治赤痢白茯苓丸治休息痢日夜頻併黃連湯治休息痢多時不瘥黃連龍骨各半兩艾葉一握阿膠半兩右細銼以水三盞先煎黃連等三味至一盞半去滓次下阿膠再煎至一盞分為二服空心一服如人行十里再一服每服藥後濃煎乾艾葉湯飲之一方煮忍冬米和飲之硫黃丸治休息痢發歇不定經久不瘥硫黃砒黃何首烏白礬各一兩右相和勻入磁瓶子中五月五日取不食井水和鹽泥固濟封頭候乾安瓶中燒令通赤候冷取藥細研以麵糊和丸如菉豆大患近者黃連湯下久老橘皮湯下一丸黃芩丸治一切休息痢日痢不止四體倦怠黃芩半兩砒霜烏梅肉黃蘗各一分右搗羅為末煉蜜和丸如菉豆大每服五丸冷水下四神丸治多年休息痢疾當歸半兩烏梅七枚黃連一兩龍骨半兩右搗篩為細末以薤白細研和丸如梧桐子大每日空心以溫漿下十五丸至二十丸玄精丸出聖惠方治休息痢久不瘥面色青黃四肢逆冷不思飲食太隂玄精白礬黃丹青鹽右件藥細研入生鐡銚內燒礬汁盡為度後以不蛀皂莢三梃存性燒熟都研為末用糯米飯和丸如梧桐子大每於食前以粥飲下十丸硫黃散治休息痢不止腹內冷痛不思飲食硫黃肉豆䓻梭閭皮阿膠右搗羅為散每於食前以粥飲調下一錢縮砂丸治休息痢縮砂仁肉豆䓻羊肝右拌和令勻用麵和作餅子褁又以濕紙三重褁於溏灰內火煨令香熟去焦麵紙研細為丸如梧桐子大每服三十丸空心用米飲下日冉服玉液丹治休息痢白礬硫黃硝石右於乳鉢內相和研作末却入沙瓶子內以炭火鎔成汁取出候冷更研令細用麵糊為丸如菉豆大每服十丸空心米飲下兼治腹風痔漏諸疾金石散治休息痢石灰鉛丹糯米右將前二味慢火燒一炊夕入糯米同研令細每服二錢空心陳米飲調下當歸丸治休息痢膿血痢不止疼痛困弱煩渴當歸黃連烏梅右搗羅為細末以生蔥汁和衆手丸如梧桐子大焙乾每服三十丸空心煎厚朴湯下加至五十丸一方加阿膠一方煉蜜丸甚者鎔蠟丸一名神效散訶梨勒丸治休息痢晝夜無度腥臭不可近臍腹撮痛諸藥不效椿根白皮阿子母丁香右為細末醋研和丸如梧桐子大每服五十丸陳皮飲湯入醋神麴丸治休息痢日夜不止腹內疼痛神麴蕪荑吳茱茰右等分熬生薑汁自然汁和丸如桐子大食前粥飲下三十丸括蔞散治休息痢神效括蔞白礬白石英右將二味入括蔞中以濕紙褁燒赤為度候冷搗細杵為散每服一錢粥飲調下又方治休息痢烏賊魚骨蜜陀僧白龍骨右搗細羅為散每於食前以粥飲下一錢阿膠丸治休息氣痢神效阿膠烏梅肉黃連右搗羅為末用蒜煨研和丸如梧桐子大治休息痢羸瘦黃連定粉棗右搗棗如泥鋪於紙上安二味藥褁之燒令通赤取出候冷細研為散每服使好精羊肉半斤切作片子用散藥三錢摻肉上使濕紙褁燒熟放冷食之不過三兩服效附子丸治休息痢赤白痢附子雞子右先將附子為末以雞子丸如梧子大一時傾沸湯內煮數沸漉出分作兩服米飲下空心日午各一服縛虎丸砒黃蠟右將黃蠟鎔開下砒以桞條七個攪頭焦即換候成膏取起旋丸如梧桐子大每服一丸痢冷水下脾疼亦然腰痛冷酒下並食前小兒丸如麻子大薑茶湯止休息痢乾薑建茶各一兩右以烏梅取肉丸如梧桐子大每服三十丸食前米飲下療休息痢乾地榆一斤附子一兩右以酒一斗漬五宿飲一升日三服盡更作忌豬肉冷水治休息痢牛脂一斤黃蘗八兩右切以水八升去滓食後服一升暮一服服下止煮糜食之治休息痢羸瘦宜服杏仁一兩去皮獖豬肝一具右件肝以水洗去血漉出後於淨鐺中一重肝一重杏仁入盡後用童子小便二升入鐺中以物蓋慢火煎令小便盡肝熟放冷任意食之又方縮砂一兩肉豆蔲半兩右搗羅為末用羊肝半具細切拌藥以濕紙褁三五重更以麵褁用慢火燒令熱去焦麵并紙入軟飯研丸如桐子大每於食前以粥飲下訶梨勒散治休息痢腸滑訶梨勒皮三兩粟三合右相和以慢火炒以粟黃為度搗細羅為散不計時候以粥飲下治主休息痢大小便頻數用山魚蘇乾末米飲調下治痢久下經時不愈者此名休息用大蟲骨炙令黃焦搗末飲服患休息痢者以醋煎白豆腐食之即愈治休息痢腸滑用藤羅二兩搗細為散每於食前以粥飲調下二錢四物湯治休息痢熱湯下駐車丸每服百粒痢初服而愈治休息痢用梅根葉煎濃湯服之治久下痢經時不止者此成休息痢用虎骨炙令黃搗酒服方寸匕日三服愈痢兼渴附論夫痢不瘥則腸胃虛弱津液減耗不能上潤於咽嗌故口舌焦乾而內煩使人引飲飲多則濕氣淫溢肌肉虛浮而痢亦不瘥又方人參湯治泄痢上膈虛熱煩渴引飲口瘡不下食困劣人參白茯苓木香麥門冬葛根前胡梔子仁黃耆陳橘皮訶梨勒各一兩半夏二兩甘草半兩右粗搗篩每服四錢水一盞半生薑三片陳米一合同煎至七分去滓空心溫服黃芩湯治泄痢臟腑虛燥煩渴不止黃芩石膏甘草枳殼黃蘗女萎括樓根各半兩櫸皮三分白茯苓半兩淡竹葉三分右搗篩為粗末每服五錢水一盞半煎至一盞去滓空心溫服未止再服石膏湯治痢後渴不止石膏麥門冬括樓根茯苓知母黃連枸杞根皮白茯苓各一兩胡粉半兩右搗研為末煉蜜丸如梧桐子大每服三十丸空心米飲下晚食前再服或作散冷熱水溫服二錢烏梅湯治久痢食即嘔吐煩渴不可忍烏梅肉半兩黃連三分白茯苓黃芩龍骨各半兩訶梨勒三分厚朴一兩阿膠半兩右搗篩粗每服五錢漿水一盞生薑三片同煎至七分去滓空心溫服日午再服瀉心湯治卒然下痢熱唇乾口燥嘔逆引飲人參甘草黃芩栝樓根橘皮各一兩右㕮咀以水六升煮取二升分三服治老小痢水榖不化腹中雷鳴心下痞滿乾嘔不安無橘皮栝樓若寒加附子一枚渴加栝樓一兩嘔加橘皮一兩痛加當歸一兩仲景用大棗十二枚黃連丸治下痢煩渴括蔞根湯治下痢冷熱相衝臟腑氣不和順本來下虛津液耗少口乾咽燥常思飲水人初不許飲水毒氣更增煩燥轉甚宜急與湯飲救之不得令至過度止渴括蔞根甘草白茯苓各半兩右粗搗篩每服五錢以水一盞半麥門冬一分去心棗一枚擘破同煎至七分去滓不計時候溫服黃連丸治熱痢黃膿發渴四肢煩悶麥門冬湯治痢兼渴麥門冬一兩半烏梅七枚右銼以水二盞煎取一盞去滓分溫二服空心晚食前服陳米湯治吐痢後大渴飲水不止右用陳廪米水淘淨二合水二盞煎至一盞去滓空心溫服治痢後渴用糯米二合以水一盞半同研絞取汁空心頓服之痢兼腫附論夫下痢身體浮腫者久痢所致也痢久則胃氣弱而腸虛胃者土也所以化水榖而充肌肉若胃土氣衰不能勝濕則水氣妄行流溢皮膚故痢而兼腫也得小便利者即愈方澤漆湯治夏月暴冷忽壯熱泄痢引飲變通身浮腫脈沉細小澤漆一兩半吳茱茰赤茯苓白术桔梗當歸青木香犀角芍藥海藻大黃各二兩右銼如麻豆大每服以水二盞煎藥五錢匕取分去滓溫服防己湯治痢後四肢浮腫喘息促急坐卧不安小便不利防己豬苓桑根白皮赤茯苓各三分青橘皮海蛤檳榔紫蘇木通各一兩木香白术各半兩右粗搗篩每服三錢以水一盞生薑三片煎七分去滓溫服不拘時木香湯治下痢後虛損臍下痛四肢浮腫木香五加皮桑根白皮檳榔桃仁三分郁李仁各一兩松節二兩薏苡仁陳橘仁各三分右粗搗篩每服三錢水一盞煎六分去滓不拘時稍熱服澤漆湯治痢後腫滿氣急喘嗽小便如血澤漆葉五兩桑根白皮郁李仁三兩杏仁人參各一兩半陳