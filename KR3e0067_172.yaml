body:
  text: 普濟方卷一百七十二明周王朱橚撰積聚門積聚心腹痛附論夫積者隂之氣五臟所生其痛不離其部故上下有所窮也聚者陽之氣六腑所成故無根本上下無所留止其痛無常處此皆由寒氣摶于臟腑與隂陽之氣相擊下上故心腹痛也診其寸口之脈沉而橫脅下有積腹中有橫積聚痛又寸口脈細沉滑者有積在脅下左右皆滿與背相引痛又云寸口脈緊而牢者脅下腹中有橫積結痛而泄利脈微細者生浮者死方旋覆花湯出聖濟總録治冷積不去氣澀腹痛飲食不下旋覆花微炒三分當歸切焙黃連去鬚桑根白皮陳麴牛膝切焙芎藭射干龍骨白术各一兩半枳殼去瓤麩炒桂去粗皮地榆各一兩杏仁湯浸去皮尖雙仁炒二十枚附子炮裂去皮臍赤石脂厚朴去粗皮生薑汁炒各二兩黃芩去黑心半兩黑豆一合草豆䓻去皮兩枚桃仁去皮尖雙仁炒二十一枚右為細銼每服五錢水一盞半煎至八分去滓溫服訶黎勒丸出聖惠方治積聚心腹相引疼痛胸膈氣滯不能飲食訶黎勒皮一兩川大黃二兩銼碎微炒烏頭一兩當歸一兩銼微炒木香一兩白术一兩桂心一兩吳茱茰半兩湯浸七遍焙乾微炒檳榔一兩蓬莪茂一兩青橘皮一兩湯浸去皮白焙神麴一兩微炒令黃右搗細末後將硵砂三兩用醋二升煎半去滓入前藥末四兩內硇砂醋中攪和勻于銀鍋內煎成膏和餘藥末搗三二百杵丸梧桐子大每于食前以生薑橘皮湯下二十丸檳榔散出聖惠方治積聚心腹內疼痛檳榔一兩赤芍藥半兩枳殼半兩麩炒黃去瓤芎藭半兩赤茯苓半兩柴胡一兩去苖木香半兩川大黃一兩微炒當歸三分銼碎微炒甘草三分炙微赤炒桃仁半兩去皮尖炒右為粗散每服三錢水一中盞煎至六分去滓不拘時候稍熱服桂心散出聖惠方治積聚心腹疼痛面無潤澤日漸黃瘦桂心一兩川大黃一兩銼碎微炒桔梗一兩去蘆木香一兩附子一兩炮裂去皮臍白术一兩髙良薑半兩芎藭半兩當歸一兩銼微炒檳榔半兩赤芍一兩枳實半兩右為細散每于食前溫酒調下五錢生薑湯調下亦得青橘皮丸出聖惠方治積聚心腹疼痛全不飲食青橘皮二兩湯浸去白瓤焙當歸一兩微炒枳殼一兩麩炒黃乾漆一兩搗碎炒令煙出附子一兩炮裂去皮臍木香一兩白术二兩桃仁一兩湯浸去皮尖雙仁麩炒黃桂心一兩川椒二分去目及閉口者微炒出汗川大黃二兩銼碎微炒厚朴二兩生薑汁灸令香右為細末煉蜜和搗三二百杵如桐子大每服于食前以溫酒下三十丸丁香爛飯丸出瑞竹堂治食傷太隂又治卒心胃痛消食快氣丁香一錢丁香皮三錢甘草灸三錢甘松三錢去土砂仁三錢益智三錢荆三稜一錢炮香附子半兩木香一錢廣茂一錢炮右為細末湯浸蒸餅和丸如菉豆大每服三十丸白湯送下或細嚼亦可不拘時候或丸如桐子大亦可通命丸療心腹積聚寒中㽱痛乂心迫滿脅下急繞臍痛大黃逺志黃耆麻黃甘遂鹿茸灸各四分杏仁六十枚去皮尖兩人者熬香豆豉一合熬芒硝三分巴豆五十粒去心皮熬右搗篩和以蜜丸如小豆先食三丸日再忌蘆笋野豬肉木香散出聖惠方治積聚心腹疼痛胸膈氣滯四肢無力不思飲食木香三分訶黎勒皮檳榔青橘皮各半兩湯浸去白瓤焙白术一分赤苓一分人參一分桂心一分厚朴半兩去粗皮塗生薑汁灸令香熱右為細散每于食前以溫酒調下二錢生薑棗湯調下亦得大黃丸出聖惠方治積聚氣心腹妨悶疼痛川大黃一兩銼碎微炒當歸三分微炒川芎三分訶黎勒皮檳榔各一兩川烏頭一兩炮裂去皮臍乾薑三分炮裂銼吳茱萸半兩湯浸七遍焙乾微炒桃仁一兩湯浸去皮尖雙仁麩炒微黃右件藥搗羅為末煉蜜和搗三二百杵丸如桐子大不計時候溫酒下三十丸氣痞丸療寒氣痞積聚結不通繞臍切痛腹中脹滿胸逼如戳憂恚所積用力不節筋脈傷羸瘦不能食飲此藥食之人強嗜食益氣壯力烏頭炮甘草炙葶藶熬芎藭芍藥柑皮灸各二分右搗篩蜜和丸如梧桐子大一服三丸日再不知漸加至五丸七丸一方桂二分去柑皮忌海藻菘菜豬肉冷水等一方有通草無柑皮烏頭丸療久寒積聚心腹繞臍切痛飲食不下烏頭炮甘草炙各三分茱萸半兩細辛半夏洗三十遍附子炮藁本各三兩右下篩蜜和丸如桐子大先食前服五丸日再不知稍增之忌羊豬肉冷水薑菜海藻菘菜餳化鐵丹出御藥院方治逺年近日沉積及內傷冷物心腹疼痛烏梅八枚不去核巴豆十六枚不去皮胡椒四十八粒青皮半兩陳皮半兩二味俱不去白右為細末醋麵糊和丸如菉豆大每服五七丸食後生薑水下若不化更加蓽澄茄半兩丁香二錢半服之更快巴豆丸出聖惠方治心胸積聚時有疼痛巴豆二十枚去皮研紙包壓去油桔梗一兩去蘆頭杏仁二十枚湯浸去皮尖雙仁麩炒微黃藜蘆一兩去蘆頭炙黃皂策二兩去皮塗酥炙令黃焦去子右件先搗藥桔梗皂䇲藜蘆等羅為末後細研巴豆杏仁如膏煉蜜和搗三二百杵丸如小豆大每日虗心溫水下三丸如未覺即加至五丸萬靈丸治積聚滯氣胸膈痞悶心腹刺痛雄黃研大黃銼炒陳橘皮去白焙白牽牛末肉蓯蓉酒浸切焙青橘皮湯浸去白焙杏仁去皮尖雙仁炒乾漆炒煙出巴豆去皮心膜出油各半兩訶黎勒炮去核三分木香藿香葉天南星炮各一分胡椒半分右為末用薄荷汁煮麵丸如菉豆大傷飲食生薑下三丸至五丸傷酒嚼燒生薑下十丸婦人血氣心痛酒煎當歸調沒藥末一錢匕下十丸百當膏出聖濟總録治一切積聚心腹疼痛年月深久者皆治一歲至百歲并可服丹砂膩粉研各半兩水銀鉛各一分二味炒紫牛黃研龍腦研粉霜研陽起研各一分黃蠟半兩巴豆肥者一百二十枚去皮心膜研出油取霜用蝎梢炒一分半夏一錢湯洗七遍二味杵羅為末右合研極細勻鎔蠟并熟蜜少許同和成膏旋丸如梧桐子大每服三丸至五丸量大小虗實加減服吐逆藿香湯下取熱積生薑蜜水下取冷積乳香湯下風涎薄荷湯下便利米飲下沉香丸治五積氣結面色萎黃心腹疼痛口吐酸水有時發􅠲積年不已沉香半兩丁香半兩木香半兩硇砂一分碎巴豆霜半兩蓬莪茂煨銼桂去粗皮乾漆炒出煙乾薑炮青橘皮去白焙荆三稜煨銼白豆䓻去皮各一兩大黃一兩生為末用醋一升慢火熬成膏右搗研十二味為末入大黃膏和丸如梧桐子大每服五丸食後臨卧生薑湯下乙丑丸出聖濟總録治食積隱伏見時作攻心脅㽱刺疼痛硇砂細研湯內飛過去砂石熬取霜烏頭生去皮臍為末各一兩沉香末五靈脂末去粗皮胡椒末乾薑末巴豆去皮心膜各半兩研乾漆末三分右除巴豆外同研勻次入巴豆再研極細同熟棗肉和作一塊用濕紙裹三五重用紙筋黃泥固濟約厚半指許熁乾用熱炭火十斤于乙丑日早漸進火燒令香為度以新盆器合候冷取出及焦紙灰不用搗爛看鞭軟再入熱棗肉和約千餘杵得所丸如梧桐子大每服三丸溫木瓜酒下木瓜湯下亦得不拘時候服如大瘕癖積塊及諸冷氣㽱刺疼痛或泄痢膿血食前服五丸至七丸看虗實加減狼毒丸出聖惠方治積聚氣結成塊假在腹下久不消散發咳疼痛狼毒細銼醋拌炒令乾芫花醋拌炒令乾乾漆搗碎炒令煙出雄雀糞微炒五靈脂鱉甲塗醋灸令黃去裙襴硫黃細研入硇砂不夾石者細研以上各一兩膩粉半兩研入右件藥搗為末入研藥令勻以醋煮麵糊和丸如梧桐子大每服空心以醋湯下三丸至五丸當利下惡物吳茱茰散出聖惠方治積聚氣心腹脹滿飲食減少四肢不和吳茱茰一兩湯浸七遍焙乾微炒白术一兩當歸一兩銼碎微炒枳實半兩麩炒微黃紫菀一兩湯浸去皮微炒桂心一兩檳榔一兩鱉甲一兩塗醋炙令黃去裙襴郁李仁一兩湯浸去皮微炒右為粗散每服四錢水一中盞生薑半分煎至六分去滓食前稍熱服縮砂丸出楊氏方溫中散滯消飲食治胸膈噎悶心腹冷痛大能暖化生冷果食夏月不可缺天南星湯浸去皮七遍焙乾碎髙良薑各四兩縮砂仁一兩右為細末生薑自然汁煮麵為丸如梧桐子大每服五十丸生薑湯下尉氣法出淡潦法方大艾打熟砂石銚內灼滴少醋令香熱極右以二三絹袋袋藥更替乘熱搭腹上印尉一法只炒食鹽炒極熱按尉痛處亦效軟犀丸出楊氏家藏方治久虗沉積心腹撮痛腸滑下痢臟腑不固日漸羸瘦沉香檀香各一分丁香木香肉豆䓻麵裹煨熟檳榔已上四味各半兩六味同為細末巴豆二十一粒去殼杏仁二十一枚去皮尖炙白丁香一字鷹糞白一字百草霜一字右件除前沉香等六味外將後巴豆等五味用鐵銚子內慢火炒至煙出無令太過不及候得所用一磁盞蓋放冷一宿研細與前藥末相和研勻同黃蠟一兩半麻油一兩同煉鎔和藥成劑旋丸如菉豆大每服十丸至三十生薑湯下食後臨卧服異香紅丸子出楊氏家藏方治一切積聚心腹疼痛婦人血氣攻注常服消滿食破積氣沉香硇砂别研使君子去殼蓬莪术炮切荆三稜炮浸汁硃砂别研木香以上七味各一分檳榔一枚大者肉豆䓻一枚大者母丁香五粒巴豆二十粒好者去皮心膜不出油研黑牽牛一兩炒熟取末半兩入藥餘者不用澄茄一分右件為細末麵糊為丸如菉豆大硃砂為衣每服三丸茴香湯下欲微利加至五七丸食後服賜方五香湯出楊氏家藏方治積寒攻衝腹脅疼痛木香沉香滴乳香别研藿香葉吳茱茰湯洗七次已上五味各三兩麝香一兩别研右件除乳麝外為㕮咀以水五升煮取二升去滓入二香煎令濃再服分三服一方寒熱頭痛加獨活四肢不舉無力口乾加桑寄生連翹兩脅脹痛加射干大黃大黃看虗實加減小便不利加通草不拘時候治五臟癥結心腹積聚疼痛用戎鹽水消服之積聚宿食不消附論凡飲食入胃脾臟化之若腹有積聚攝養乖度飲食不時則脾胃愈弱飲食遲化故為宿食不消之病其狀噫食氣臭胃脹煩滿診其脈來實者是也人之有身藉五榖以生故胃以納之脾以尅化之脾胃喜暖不宜以生冷傷之體虗者不善調養飢飽失時或過減飲食并一切生冷之物脾胃法弱不能尅化停蓄胃脘遂成宿滯輕則吞酸嘔惡腦滿噎噫或泄或利其臭如抱壞雞子或米榖不化甚則積聚結而為瘕癥之病治之須究其源又須量人氣體虗實病證淺深投以藥餌病之淺則消化之甚必須推利而後調補脾胃或有因挾寒熱之氣而泄者又當以脈證辨而料理凡一切冷食不消宿酒不散亦類傷寒身熱惡寒戰栗頭痛腰脊強不可用雙解散導引丸木香檳榔丸共六十丸量虗實加減利五七行所傷冷物宿食酒推盡頭痛病自愈矣次以五苓散生薑棗煎用長流水煎取五六錢不可服酒癥丸進食丸此藥巴豆有大毒故也凡一切沉積或有水不能食便頭目昏眩不能清利可茶調散吐之次服七宣丸木香檳榔丸膏粱之人起居間逸奉養過度酒食所傷以致中脘留飲脹悶痞膈必當服木香導飲丸治之若田野芻蕘之人食踈衣薄動作勞役若酒食所傷心腹滿悶醋心時吐酸水可用進食丸以其勝毒也病甚者每月泄三五次夫馨飪之邪從口入者宿食也蓋五味入口所以滋養五臟得之則生不得則死傷之則反為害所以宿食為雜病之先若五臟不平食不輸化血凝氣滯羣證蜂起皆宿食所為也治之宜量臟腑虗實淺深為治養生方戒不得用巴豆令服青木香丸如有食癖非巴豆不尅所謂擾乎可擾擾亦無擾方集香丸治傷生冷硬物不消荆三稜廣茂青皮陳皮川練子益智茴香丁香各一兩巴豆和皮米炒焦黑色五錢右為細末醋和為丸每服五七十丸食前生薑湯下治一切氣宿食不消方右用訶黎勒一枚入夜含之至明嚼咽紫沉消積丸出華陀方治久積伏滯胸膈膨脹心腹刺痛不化飲食及婦人血氣疼痛沉香銼阿魏醋化研巴豆霜各一兩硵砂研細四味同研勻用蜜一斤酒二盞共熬成膏以瓷盒盛丹砂二兩硫黃研木香人參桂去粗皮胡椒各四兩丁香乾薑炮各二兩右將前四味蜜酒熬成膏餘並搗羅為末用膏和搗千百杵丸如菉豆大每服五七丸溫橘皮湯下如心痛溫酒下婦人血氣痛當歸湯下一方有沒藥一兩鱉甲散出聖濟總録治肋下結塊連心腹痛食冷物即劇鱉甲去裙襴醋炙蒺藜子炒去角各二兩黃芩去黑半兩桂去粗皮一兩柴胡去苗桔梗炒當歸切焙牛膝醋浸切焙赤茯苓去黑皮芍藥大黃銼醋拌炒人參陳橘皮湯浸去白焙訶黎勒煨去核各二兩檳榔銼二分右搗羅為散每服二錢煮棗湯調下葛花解酲湯出德生堂治宿食酒傷胸膈滿悶口吐酸水惡食嘔逆及年逺日久酒疸面眼俱黃不思飲食葛花白豆䓻砂仁木香五錢乾葛二錢陳皮白术薑屑二錢青皮白茯苓豬苓一錢五分澤瀉二錢人參一錢五分神麯五錢甘草三錢右為細末每服二錢臨卧沸湯調服汗出立效不損元氣而散酒積毒如㵼者加豆䓻煨二錢荆三稜散治積聚氣脾胃虗弱不能化榖至宿食不消腹脅痛荆三稜一兩煨銼桂心三分丁香半分益智三分去皮木香五錢大腹皮一兩銼前胡一兩去蘆白术二分厚朴一兩去粗皮塗生薑汁灸令香熱乾薑半兩炮裂銼蓬莪术二分郁李仁一兩浸湯去皮微炒青橘皮一兩湯浸去白瓤焙赤茯苓一兩川大黃一兩銼碎微炒右為粗散每服三錢水一中盞生薑半分棗三枚煎至六分去滓每于食前稍熱服藿香煮散治久積聚宿滯不消或翻胃吐逆惡心乾嘔及脾寒等疾藿香葉木香陳橘皮湯浸去白焙肉豆䓻去殼煨人參訶黎勒皮去黑皮白茯苓去黑皮甘草灸草豆䓻去皮麥蘖炒陳皮炒各一兩乾薑炒半兩厚朴去粗皮生薑汁灸一兩半髙良薑銼炒五錢右搗羅為散每服二錢水一盞生薑一塊打碎同煎至七分入鹽一捻熱服水㵼及腸風毒熱陳米飲調下神效感應方治消宿食除積滯常服不動臟腑黑沉角磨木香檀香全丁香陳皮青皮黃連砂仁香附子去黑毛見白巴豆三百粒肥白淨研為細末半夏水浸去面衣三稜略煨蓬术大者煨各一兩肥烏梅肉重一百文右用瓷器一隻盛巴豆上以烏梅肉蓋之却用陳米醋浸過與烏梅肉平于甑上蒸至極熟以巴豆紅色為度却濾出研令極爛次用糯米粽和前件諸藥搜勻搗千百杵以黑色為度衆手丸如蘿蔔子大每服一十丸宿食不消陳皮湯下氣滯茴香湯下酒後嘔吐薑湯下法製生薑散治飲酒過多或生冷停滯嘔逆惡心不欲飲食生薑十兩用青棒摻過再白麵拌浥焙乾用之桂去粗皮青皮去白陳皮去瓤半夏生薑製白术各一兩丁香木香去白蓽澄茄各二兩半白豆䓻縮砂仁白茯苓各一兩半甘草灸葛根各半兩右為細末每服三錢溫酒調下不拘時候仙方內消丸治酒食過傷脾胃青皮陳皮去白蒼术米泔浸桂去皮三稜煨蓬术煨乾漆炒去煙芫花醋煮草霜附子故紙炒皂角各三兩黑牽牛半兩半生半熟右為末醋和丸梧桐子大三十丸隨湯下一方加半夏三兩訶黎勒散出聖惠方治積聚宿食不消四肢羸瘦乏力訶黎勒一兩煨用皮附子一兩炮去皮臍草豆䓻一兩去皮白术三分當歸半兩銼碎微炒人參半兩去蘆頭神麯一兩火煨黃耆三分銼桂心一兩陳橘皮一兩湯浸去白瓤焙檳榔一兩郁李仁一兩湯浸去皮微炒赤茯苓一兩右為粗散每服三錢水一中盞生薑半分棗三枚煎至六分去滓不拘時候稍熱服乳香丸出聖惠方治宿食不化心膈氣滯中焦不和及癥癖積聚或多嘔逆並宜服乳香半兩别研入木香半兩肉豆䓻半兩去殼當歸半兩銼微炒青橘半兩湯浸去白瓤焙荆三稜半兩煨銼乾漆半兩搗碎炒令煙出紫菀一兩去苖土乾薑一兩炮裂銼附子一兩炮裂去皮臍鱉甲一兩半塗醋炙令黃去裙襴硃砂一兩細研巴豆一兩去皮心研紙裹壓出油右藥除乳香硃砂巴豆外餘藥並搗羅為末入研子藥都研令勻每兩匙藥末用細蕎麵一匙相和更研令勻灑水為丸如菉豆候乾以漿水煎令沸下藥丸子煮一兩沸候藥丸子浮上乃漉出收竹篩子內晒乾每服以溫湯下三丸或五丸若有久積聚常於卧時服五丸瘥木香丸出聖惠方治積聚氣脾胃虗冷宿食不消心腹氣滯脹滿疼痛木香三分銼白术三分人參三分去蘆赤茯苓三分橘皮一兩去白吳茱茰半兩湯浸七遍焙乾微炒乾薑半兩炮裂銼桂心三分訶黎勒一兩煨用皮檳榔一兩神麯一兩炒微黃大麥蘖一兩炒微黃川大黃一兩銼碎微炒當歸半兩銼微炒桔梗半兩去蘆頭右為細末錬蜜和搗三二百杵丸如梧桐子大每于食前以溫酒下三十丸黑神丸出聖濟總録治消積化氣進食木香硵砂研蓬莪茂煨銼荆三稜煨銼各半兩桂去粗皮附子炮裂去皮臍乾薑炮乾漆搗碎炒出煙大黃煨為末青橘皮湯浸去白焙墨燒過巴豆去心皮膜細研出油各一兩右以好醋一大碗先熬磠砂令沸又熬巴豆數沸又加大黃末熬成膏餘藥並搗羅為末以膏杵和丸如菜蔔子大每服二丸五丸茶酒任下如消食化氣生薑橘皮湯下小腸疝氣茴香酒下婦人血氣當歸酒下硵砂煎丸聖濟總録治一切積聚停滯化氣消食補益真氣産後逐敗血補虛損硇砂揀通明無石者别研如粉當歸酒浸一宿去蘆頭切焙肉蓯蓉酒浸一宿薄切作片焙乾巴戟天酒浸一宿去心焙檳榔生各一兩楝實洗過切破四兩酒浸一宿候軟以刀子刮割下瓤去皮核下用三兩蘹香子微炒木香沉香銼附子炮裂去皮臍天雄用酒煮五七百沸候軟刮下皮臍各一兩阿魏半兩米醋磨成膏入清茶右為細末以無灰酒煮麵和丸如梧桐子大每服三十丸空心日午溫酒下常有婦人病蓐中下痢日久甚困篤百方不瘥醫曰蓐中痢與他痢不同常痢可用苦澀藥止今蓐中利生于血不足投澀藥則血愈不行痢當愈甚産後痢者宜投硇砂丸日三服痢頓減半次日遂愈此藥産後雖無病亦宜服之能養血去積滯應驗方治大人小兒百物所傷難經云脾氣通于口口和則知榖味矣心氣通于舌舌和則知五味矣知榖味五味莫不由口舌而入胃也善攝生者謹于和調使飲食一入于胃隨消隨化則無滯留之患若稟受怯弱飢飽失時或過食五味魚腥乳酪強食生冷果菜停蓄胃脘遂成宿滯輕則吞酸嘔噦胸膈噫噎痞悶不食久則積聚結為癥瘕面黃羸瘦此皆宿滯不消而生焉大率才有停滯當量人虛實速宜尅化之不可後時養成沉疴也青皮陳皮三稜蓬莪丁香木香檀香沉香麝香各一錢腦子半錢黃連三錢巴豆一百粒去皮心膜陳米酒醋半盞煮熟冷研極爛細右為細末入巴豆合同麝香腦子十分和勻用糯米粽子取尖搜和勻成膏棒捶二十餘下丸如米大大人服三十丸小兒斟酌服之用陳皮湯任下臨卧服通神丸治積聚留飲宿食寒熱煩結長肌膚補不足蜀椒去目并閉口炒出汗附子炮裂去皮臍厚朴去粗皮生薑汁灸半夏湯浸七遍焙各一兩杏仁湯浸去皮尖雙仁炒研藶子紙上炒各三兩芒硝研五兩大黃銼炒九兩右除研外搗羅為末與杏仁芒硝研勻錬蜜丸如梧桐子大每服二十丸米飲下忌豬羊肉餳冷水小分氣丸治久積氣塊宿食不消胸膈痞悶痰逆惡心不思飲食臍腹刺痛醋心噎塞木香一兩檳榔銼陳橘皮湯浸去白焙楝實銼炒乾薑炮青橘皮湯浸去白各半兩蓬莪茂醋浸一宿煨過一兩巴豆去皮心膜出油淨半夏湯浸一遍去滑焙大黃煨銼各一分雄黃研一兩右為末醋煮麵和丸如菉豆大每服五丸七丸溫生薑湯下食後臨卧服桂香勻氣湯治消積滯化宿食痰飲胸膈痞悶桂去粗皮丁香皮縮砂仁益智去皮炒檳榔銼陳橘皮湯浸去白焙一兩木香蓬莪茂煨各一兩烏梅和核一兩半青橘皮湯浸去白焙一兩巴豆去皮心膜研出油六十四粒右除巴豆外搗羅為末和勻煮麵和丸如麻子大每服七丸至十丸茶酒任下食後服乳香丸出聖濟總録丁香木香各一兩附子炮裂去皮臍五靈脂乾薑炮各半兩桂去粗皮芫花醋拌炒黃青橘皮湯浸去白焙各三分豬牙皂䇲去皮酥灸一兩巴豆去皮心膜别研如膏新瓦上攤去油取霜一錢乳香一兩右除乳香五靈脂末巴豆以外八味搗羅為末入上三味拌勻煮陳麵和丸如菉豆大每服二丸三丸生薑湯下量虛實加減食後臨卧服阿魏丸出濟生方治脾胃怯弱食麵或食生果停滯中焦不能尅化致腹脹痛嘔惡不食或痢或祕悉主之阿魏酒浸化旋入官桂不見火蓬术煨炮麥蘖炒神麯炒青皮去瓤蘿蔔子炒白术薑乾炮各半兩百草霜三錢巴豆去殼油三十粒右為細末和勻用薄糊為丸如菉豆大每服三十丸不拘時薑湯下麵傷用麵湯下生果傷用麝香湯送下如意丸治消積化氣溫胃食後心膈妨悶威靈仙去苖土附子生去皮臍二味各半兩同為末用好醋半盞浸一宿硵砂細研一分巴豆十一粒去皮心膜出油二味同研用酒半斤醋半斤同煎與前二味同熬成膏木香半兩蓬莪茂煨銼半兩大黃銼炒三分青橘皮湯浸去白炒一兩神曲炒半兩丁香一分右將後六味為末以前四味膏和更别熬醋少許研墨汁同丸如菉豆大每服五丸七丸薑湯送下麝香丸出聖惠方治氣消食心腹氣痛麝香一分細研木香檳榔五靈脂半兩湯浸去白瓤焙巴豆半兩去皮心硫黃一兩右以生絹袋硫黃巴豆同內湯中煮懸袋于鐺上勿令著底可半日久去硫黃巴豆晒乾與木香四味加入麝香同研勻用水浸蒸餅和丸如菉豆大每服五丸以橘皮湯送下益智散出聖濟録治脾胃虛冷積聚沉結宿食不化荆三稜煨銼益智去皮炒蓬莪茂煨銼白茯苓去黑皮各一兩青橘皮陳橘皮二味並湯浸去白炒人參銼甘草灸銼各半兩木香一分厚朴去粗皮生薑汁灸一兩右搗為散每服一錢入鹽少許沸湯點服不拘時候三台丸出千金方療五臟寒熱積聚腹脹腸鳴而噫食不作肌膚甚者嘔逆若傷寒寒瘧已愈令不復發食後服五丸飲多者吞十丸長服令人大小便調和長肌肉古病源云積聚而宿食不消者由腹臟為寒氣所乘脾胃虛冷故不能消化留為宿食也診其脈來長實心腹積聚飲食不消胃中冷故也大黃二兩熬熟硝一升葶藶一升煎前胡二兩厚朴一兩炙附子一兩焙茯苓半兩半夏一兩洗杏仁一升去皮尖炒細辛一兩右搗篩蜜和搗五十杵酒服如梧子大五丸稍加以知為度忌羊肉餳生菜酢物一方無厚朴硃砂丸出聖惠方治一切氣及消宿食硃砂三分細研木香一分檳榔半分阿魏半分皂䇲一錢炙麝香半分肉豆䓻一分去殼巴豆二十枚去皮心以醋煮半日取出研令細右件藥為末都研令勻以糯米飯和搗三二百杵丸如麻子大每服不計時候以生薑橘皮湯下三丸至五丸快活丸黑牽牛半斤大麥芽半斤用巴豆三錢炒黃色去巴豆香附子四兩炒去毛青皮二兩半蘿蔔子四兩炒檳榔二兩蓬术三稜醋灸各四兩大黃二兩生用右為細末水和丸如梧桐子大每服七丸以淡生薑湯下木香丸治積聚宿食不消中脘痞滯煩悶氣促腹內刺痛噫氣不思飲食木香半分檳榔銼一兩陳橘皮湯浸去白焙半兩荆三稜煨一兩丁香一分乾薑炮一分蓬莪茂煨半兩巴豆去皮心膜出油半錢硵砂研飛半兩右除研外搗羅為末入巴豆硇砂合勻湯浸蒸餅丸如菉豆大每服二丸至三丸溫生薑橘皮湯下食後服黑虎丸出聖濟總録治諸積宿食不消芫花炒甘遂炒烏頭炮去皮臍荆三稜煨銼大戟炒銼牽牛子炒乾薑炒陳皮去白焙各半兩乾漆二兩炒出煙盡右為末以醋煮麵和丸如菉豆大每服二丸消食化氣溫水下取積滯米湯下溫病傷寒薑醋湯下氣痛艾湯下本臟氣虛炒蘹香子酒下瘧疾桃枝湯下婦人血氣勞氣醋湯下寸白蟲煎牛肉湯下巴豆丸出聖惠方治積聚宿食不消心腹脹滿疼痛巴豆半兩去皮心出油研入附子一兩炮裂去皮臍桂心一兩硫黃一兩半細研水飛過五靈脂一兩雄黃一兩細研水飛麝香一分細研乾薑一兩炮裂銼香墨半兩右為細末入巴豆都研令勻用糯米飯和丸如小豆大每服于食前以生薑橘皮湯下二丸丁香丸出聖惠方治積聚氣宿食留滯不能消化丁香半兩木香半兩巴豆一分去皮心出油研入硫黃半兩細研水飛硃砂半兩細研水飛膩粉一錢麝香一錢細研乳香半兩神麴一兩半别搗末右為細末都研令勻以酒煮神麴末和丸如菉豆大每服食前生薑橘皮湯下三丸治暴食宿食留飲不除腹中為患方出肘後方右用巴豆一枚去皮心熬之椒目十四枚䜴十六粒合摶為丸服二丸當吐利不盡更服二丸服四神丸下之亦佳順氣丸治一切積氣宿食不消黑牽牛一斤取頭末右用蘿蔔存頂蓋剜令空內藥末不許納實蓋頂紙封蒸熟取出藥末將蘿蔔擂碎加白豆䓻末二三錢重用自然汁和丸如梧桐子大每服三十丸任意加減服之磨積消食治痞悶膨脹右杏仁每七粒用巴豆一粒去殼同麩炒熟去巴豆不用每服杏仁去皮尖細嚼三五枚溫湯送下食後臨卧服又方出肘後方右椒目二兩巴豆一兩去皮心熬摶以棗膏丸如麻子服二丸下痛止赤子丸出聖惠方化氣消食巴豆半兩去皮用冷水內浸一宿取出去心膜于紙上收乾後將麵作餅子攤巴豆在內如作夾子膏者麵勿令薄熟湯內煮直候黃色漉出去麵取巴豆于乳鉢內兩手研以細為度檳榔肉豆䓻去殼木香桂心乾薑炮裂銼青橘皮湯浸去白焙已上各半兩硃砂半兩細研右件為末入巴豆細研令勻以醋煮麵糊和丸如麻子以朱砂為衣滚過曬乾每服以橘皮湯下三丸硵砂煎丸出聖惠方治一切積滯氣脅膈不利飲食難化心腹結硬欲成癥瘕面色已萎黃臍腹多痛宜服硵砂一兩去夾石者研乾漆末一兩荆三稜一兩巴豆一兩去皮心研紙裹捶白已上五味用頭醋五升于磁瓦器內以慢火熬三日成膏入後藥末川大黃一兩銼碎微炒附子一兩炮裂去皮臍香墨一兩青橘皮一兩湯浸去白瓤焙當歸一兩銼微炒右件等藥搗羅為末入前煎中相和搗一千杵丸如菉豆大每服一丸以溫酒下寬中丸專逐積滯化宿食利胸膈烏頭炮裂去皮臍吳茱茰湯浸焙良薑甘遂麩炒大黃梔子仁各半兩巴豆去皮心膜研出油四十九粒右為末用棗肉丸如菉豆大每服一丸生薑橘皮湯下檳榔丸出聖濟總録取積聚消宿食檳榔生銼兩枚巴豆去皮心膜麩炒二十一枚牽牛子炒硇砂研一分青橘皮湯浸去白焙半兩大黃濕紙包煨乾漆炒煙出各一兩右為末湯浸蒸餅丸如菉豆大以丹砂為衣每服一丸至二丸溫水下如要㵼取食積三五丸或七丸十丸量虛實加減空心煎蔥白湯下瀉後服和氣人參湯和氣人參湯出聖濟總録人參白茯苓去黑皮厚朴去粗皮注水薑汁灸肉豆䓻去殼甘草灸陳橘皮去白麩炒蘹香子灸木香白术桂右為細末每服二錢水一盞生薑三片棗一枚劈同煎至七分去滓溫服七星丸出聖惠方化氣消食巴豆一兩去皮心油煎令黃黑色去油硃砂半兩細研檳榔半兩木香半兩丁香半兩乳香半兩肉豆䓻半兩去殼右為末入硃砂巴豆等研勻以麵糊丸如麻子大每服以溫酒下五丸湯下亦得木香丸消食化氣利胸膈及積聚凝滯臟腑刺痛木香為末丁香為末巴豆去皮心膜研出油各半兩硵砂研半兩大棗去皮核烏梅去核為末各三十枚右先將水拌白麵作一薄餅以棗肉鋪餅上次以前四味藥末和勻復鋪棗肉上作饅頭裹就用炭火四圍灸熁候麵焦黑約藥透取出地面上出火毒候冷打破去焦麵不用將藥與烏梅末同搗稀麵糊丸如黃米大每服二丸至三丸食後生薑湯下或隨所傷物湯下黑丸子出永類餘方治中脘有宿食吞酸惡心吐清水噫氣或心腹疼痛及中虛積聚飱泄赤白痢下烏梅肉七個百草霜三錢杏仁去皮尖别研三七枚巴豆去殼油二枚半夏湯泡七次九枚縮砂仁三七枚右為細末和勻用薄糊為丸如黍米大每服十五丸加至二十丸用熟水送下薑湯亦得更酌虛實增損丸類或因食生冷魚膾得腐用治中湯送下亦可雞舌香散出德生堂治男子婦人隂陽不和臟腑虛弱中脘氣滯宿食停積留飲不消胸脅脹滿心脾引痛攻刺腹脅有妨飲食及治中酒吐酒停飲侵積嘔逆惡心噫氣吞酸良薑官桂香附芍藥各一兩甘草二兩半烏藥一兩右為細末每服二錢入鹽少許沸湯點服不拘時此藥治心氣疼大妙巴豆丸出聖惠方治冷氣破積聚消宿食巴豆一兩以漿水煮一日不住添熱水去皮心膜紙壓出油桂心一兩硫黃一兩細研水飛過木香一兩檳榔半兩附子半兩炮裂去皮臍右件為末入巴豆硫黃同研令勻用軟飯和丸如菉豆大每服以生薑湯下五丸木香丸治積聚宿食不化留滯成塊心腹疼痛脾倦多困日漸黃瘦木香三分蓬莪荆三稜二味煨銼各一兩丹砂研三分巴豆去皮心膜研出油二十粒右將前三味搗羅為末入巴豆丹硃醋煮麵糊丸如菉豆大每服三丸至五丸生薑橘皮湯下食後臨卧服治積聚宿食不消虛羸腹脹出聖惠方吳茱茰二兩湯浸七遍焙乾微炒巴豆半兩去皮心研如膏紙包壓出油右件藥先搗羅茱茰為末以釅醋一大碗浸茱茰末一宿至來日于銀鍋內熬候茱茰似膏即以巴豆膏更熬候可丸即丸如菉豆大空心以溫酒下三丸如氣散惡物下即住服小丁香丸出聖濟方消積滯生冷留飲宿食止痰逆惡心霍亂嘔吐治心腹脹滿肋脅刺痛胸膈痞滿噎塞不通常服順脾胃進飲食五靈脂十二兩丁香三兩木香一兩半肉豆䓻去殼三十枚巴豆去皮出油二百一十枚右為細末入巴豆令勻麵糊和丸如黍米大每服五丸至七丸溫生薑湯下橘皮湯亦得食後服如霍亂吐逆煎桃葉湯冷下小兒吐逆不定三歲服三丸五歲以下服四丸用生薑桃葉湯下治積聚氣宿食留滯不能消化出聖惠方木香一兩青橘皮一兩湯浸去白禳焙肉豆䓻三分去殼巴豆半兩去皮心出油研入神麴一兩微炒右為細末入巴豆研勻以醋煮飯丸如小豆大每服食前以生薑湯下三丸五福夀命丹治一切積氣及酒醉解酲專治酒痰寬胸利膈枸祀子生白礬枯各一兩天麻去苗半兩半夏湯泡乾薑生各一兩半右為細末􅔻餅生剜裹藥蒸熟去蒸餅皮將藥入臼中搗千下如乾入酒些少丸如梧桐子大每服五七十丸生薑湯下日二服陷胸湯出千金方治胸中心下結積飲食不消栝蔞實大黃黃連各二兩甘草一兩右㕮咀以水五升煮取二升五合日三服加味青木香丸出危氏方治糍糕傷脾噫酸不食心腹作痛百藥不效宜用青木香丸三十粒白丁香十粒小酒麯二錢同為末入巴豆三粒更研和令勻蒸餅為丸如菉豆大每服二十丸漸加至三十丸生薑橘皮湯下宿滯既去其疾自安只用小酒麴木香二件為末鹽湯調服口有酒香是效治暴宿食留飲不除腹中為患方出射方大黃茯苓芒硝各二兩巴豆一兩右搗蜜丸如梧桐子大一服二丸不痛止木香枳术丸治宿滯氣消飲食開胃進食木香一兩枳實炒一兩白术二兩右為細末荷葉燒飯為丸如梧桐子大每服五十丸溫水送下治宿食不化嘔吐酸水胸膈痞悶冷氣腹痛肺寒咳嗽並皆治之陳皮去皮四兩生薑一兩半洗甘草一兩灸右㕮咀炒令黃赤乾研為末每服二錢鹽湯點服化滯丸専治飲食不消氣閉肚疼裏急後重白㵼男女並可服之黃丹一兩黃蠟一兩巴豆肉三錢右巴丹二味同細研白用碗一個香油少許慢火化開蠟後三四次下前藥調勻滴入水不散都傾入水中取出為度每服如蘿蔔子大水大者十五丸生薑湯下水小者虛實隨加減用服硃砂丸治大人小兒百物所傷黃丹一兩白麵四兩巴豆五十粒去殼去油研細右前三味合和一處用砂鍋煮數沸去水冷定入木香三錢硃砂二錢前後五味共搗數千下為丸如黍米大每服薑湯下大人三十丸小兒十五丸二歲三丸量病人虛實感應丸十六羅漢杏仁生八金剛巴豆四菩薩晉棗本方無分兩依方修合休要差萬兩黃金不如他巴豆去皮棗兒去核裝巴豆二個紙裹水醮􅊜燒熟杵一千餘下用油單紙包裹旋用每服如菉豆大空心送下看人虛實加減用黑神丸巴豆血餘灰百草霜右各分停每服五七丸送下看人虛實與藥白术丸治積聚宿食不消腹脅下妨悶血臌羸瘦骨莭酸疼多有盜汗白术一兩黃耆一兩銼牡蠣一兩燒為粉人參一兩去蘆頭赤茯苓一兩川烏頭一兩炮裂去皮臍乾薑半兩炮裂銼木香一兩當歸一兩銼微炒赤芍藥三分桂心一兩甘草半兩炙微赤銼防葵半兩鱉甲一兩塗醋炙令黃去裙襴紫菀半兩去苖檳榔一兩桔梗半兩去蘆頭枳殼一兩熬炒微黃去瓤右為細末錬蜜和搗三二百杵丸如梧桐子大每服于食前以溫酒下三十丸觸痰丸磨積滯化氣寬中南星水煮一滚每個切作四塊半夏不切皂角切作假子生薑切皮明礬捶碎各四兩五味一處于砂罐內用水自卯時煮至酉時以南星內無白點為度有此不妨㨂去皂角不用只將餘藥切作薄片晒乾各焙乾為末後藥杏仁湯泡去皮灸神麴麥芽青皮陳皮去角紫蘇皮乾葛枳殼去瓤糖棗子肉蘿蔔子微炒木香各二兩右為細末入前藥末拌勻以生薑自然汁同拌隔三四月藥成餅去皮搜碎打糊為丸如梧桐子大每服六七十丸臨卧白湯送下露宿丸療心腹積聚膈上下有宿食甘草三分炙大黃甘遂芫花熬大戟炙葶藶子熬各二分苦參硝石各一兩巴豆半分去心皮熬右用細搗合蜜和丸如小豆服三當吐下不吐下稍益至五六丸以知為度先少起忌蒲藻藥蘆笋菘菜野豬肉治積聚宿食不消虛羸腹脹肥皂莢半兩灸去皮子搗為末甘遂三錢晒乾生搗羅為末牽牛子二錢生搗為末右件藥一處更研細如麵患人二十已上用藥末一分涼水濕拌用麵桿作餛餅子十枚煮熟别用暖水嚼破下之良久方取下積聚如未轉即更以煎水調藥末半錢投之良久取下積食初服藥後如欲睡是藥力行量人虛實加減服之五靈脂丸化氣消食五靈脂一兩巴豆四十粒去皮心膜以􅊜紙五重裹于粳灰火內煨令熟取出細研壓出油木香半錢右件為末研入巴豆令勻以麵糊和丸如菉豆大每服以橘皮湯下五丸消食方右用石燕在乳穴石洞中者冬月採之堪用餘者不中治消食如常法取二十枚投酒二升中漬之三日後取之令飲三盞隨性多少甚益氣力香麴散治食過飽煩悶但欲卧而腹脹右熬麴令微香拌服方寸匕須大麥生麴佳無麴以蘖亦得凡人飲食過度生嚼蘿蔔咽之獨效散療食生冷雜物或寒時衣薄當風衣食便卧不消心腹煩滿疼痛脹急或食不化以火燒地令極熱即卧地激薄覆被取汗愈消食丸出楊氏家藏方消食化積治久痢心腹膈不快腹脹不思飲食烏梅肉攣者五十枚槌碎炒令焦黃色巴豆五十枚生用去皮殼熬肉桂去粗皮半兩胡椒二十粒吳茱茰湯泡七次一兩右件為細末濃磨細松煙墨水浸蒸餅和劑令勻丸如菉豆每服五七丸溫熟水送下如心腹痛醋湯下食後服救生丹消酒食化氣滯空利胸膈丁香一分肉桂一分去皮大甘草科七分燒存性木香一分巴豆十五個去皮用油煎令黃色為度右件六味一處杵為末以酒煮麵糊為丸如菉豆大茶酒任下三兩丸大黃丸治凡積滯氣餒食即不消風熱氣上衝宜服此利氣川大黃四兩銼碎微炒訶黎勒皮四兩人參三兩去蘆皮大麻子三兩右件藥搗羅為末錬蜜和丸如梧桐子大每服酒下十五丸老少以意增減服之以溏利為度青空湯出江楊氏傷酒食飽滿青橘皮一兩右湯浸去瓤入鹽四銖炒為末熟湯下二錢類攻散出集驗方凡所食不消方取其餘類燒作末酒服方寸匕便吐去宿食即瘥張文仲備急同陸光祿説有人食桃不消化作病特無桃林間得禞桃子燒服之登時吐病即瘥麝香三稜丸出楊氏家藏方化生冷宿食散心腹脹悶止嘔吐惡心勻氣寬膈消痰美食荆三稜煨切二兩人參去蘆頭一兩白术一兩丁香一兩陳橘皮去白半夏湯洗七次各二兩神麴炒黃沉香二味半兩麝香半錢别研右件除麝香外並為細末次入麝香研令勻煮麵糊為丸如菉豆大每服三十丸溫生薑湯下食後服青鹽丸出衛生寶鑑治一切冷積作痛無時宿食不消及治一切酒食所傷巴豆三十個去皮心膜出油硵砂一兩鹽䜴六十粒揀棗三十個青鹽一錢大椒三十粒細麴三錢右為細末入巴豆研令勻醋煮麵糊為丸如梧桐子大每服三十丸溫薑湯下空心食前服積在上食後服之破積導飲丸出衛生寶鑑治內有積塊堅硬飲食不消化心下痞悶廣木香檳榔陳皮去白枳殼麩炒枳實麩炒廣茂炮荆三稜炮半夏湯洗七次神麴炒麥蘗炒茯苓去皮乾生薑澤㵼灸甘草已上各半兩牽牛頭末六枚巴豆三十粒去心皮膜右為細末入巴豆霜令勻生薑麴和為丸如梧桐子大每服三十丸溫生薑湯送下食前服治宿病出本草以石灰酒飲下唐李伯藥勤杜伏威朝京師既至歷陽中悔欲殺之飲以石灰酒因大利頓欲死既而宿病皆愈祛宿疾出本草以蒙頂茶煎服茶譜云蒙山有五頂有茶園其中頂名上清峰者昔僧人病冷且久遇一老父謂曰蒙中頂茶當以春分之先後多搆人力同雷之發聲併手採摘三日而止若獲一兩以本處水煎服即能祛宿疾二兩當現前無疾三兩因以換骨四兩即為地仙矣其僧如説獲一兩餘服未盡而病瘥治食飲不消出本草以蓬莪茂酒研服之治宿食腹脹出本草用碧海水飲一合吐下消宿食下氣治嗽出本草用菘菜根冬月作葅煮作羮食之治宿食不消常吐酸臭水出本草以鈞樟材酒煮服之消食和中以萊蔔嫩葉生食之大葉熟噉之調中消食及大醉并食苽果過度以生熟湯浸身湯皆為酒及苽果味能消諸食令人易飢以海月生椒醬調和食之良普濟方卷一百七十二
