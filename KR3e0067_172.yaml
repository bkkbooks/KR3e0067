body:
  text: 普濟方卷一百七十二明周王朱橚撰積聚門積聚心腹痛附論夫積者隂之氣五臟所生其痛不離其部故上下有所窮也聚者陽之氣六腑所成故無根本上下無所留止其痛無常處此皆由寒氣摶于臓腑與隂陽之氣相擊下上故心腹痛也診其寸口之脉沉而横脇下有積腹中有横積聚痛又寸口脉細沉滑者有積在脇下左右皆滿與背相引痛又云寸口脉𦂳而牢者脇下腹中有横積結痛而泄利脉㣲細者生浮者死方旋覆花湯出聖濟總録治冷積不去氣澁腹痛飲食不下旋覆花㣲炒三分當歸切焙黄連去鬚桑根白皮陳麴牛膝切焙芎藭射干龍骨白术各一兩半枳殻去瓤麸炒桂去粗皮地榆各一兩杏仁湯浸去皮尖雙仁炒二十枚附子炮裂去皮臍赤石脂厚朴去粗皮生薑汁炒各二兩黄芩去黒心半兩黒豆一合草荳䓻去皮兩枚桃仁去皮尖雙仁炒二十一枚右為細剉每服五錢水一盞半煎至八分去滓温服訶黎勒丸出聖惠方治積聚心腹相引疼痛胸膈氣滯不能飲食訶黎勒皮一兩川大黄二兩剉碎㣲炒烏頭一兩當歸一兩剉㣲炒木香一兩白术一兩桂心一兩吴茱茰半兩湯浸七遍焙乾㣲炒梹榔一兩蓬莪茂一兩青橘皮一兩湯浸去皮白焙神麴一兩㣲炒令黄右搗細末後将硵砂三兩用醋二升煎半去滓入前藥末四兩内硇砂醋中攪和勻扵銀鍋内煎成膏和餘藥末搗三二百杵丸梧桐子大每扵食前以生薑橘皮湯下二十丸梹榔散出聖恵方治積聚心腹内疼痛梹榔一兩赤芍藥半兩枳殻半兩麸炒黄去瓤芎藭半兩赤茯苓半兩柴胡一兩去苖木香半兩川大黄一兩㣲炒當歸三分剉碎㣲炒甘草三分炙㣲赤炒桃仁半兩去皮尖炒右為粗散毎服三錢水一中盞煎至六分去滓不拘時候稍熱服桂心散出聖恵方治積聚心腹疼痛面無潤澤日漸黄痩桂心一兩川大黄一兩剉碎㣲炒桔梗一兩去蘆木香一兩附子一兩炮裂去皮臍白术一兩髙良薑半兩芎藭半兩當歸一兩剉㣲炒梹榔半兩赤芍一兩枳實半兩右為細散每扵食前温酒調下五錢生薑湯調下亦得青橘皮丸出聖恵方治積聚心腹疼痛全不飲食青橘皮二兩湯浸去白瓤焙當歸一兩㣲炒枳殻一兩麸炒黄乾漆一兩搗碎炒令烟出附子一兩炮裂去皮臍木香一兩白术二兩桃仁一兩湯浸去皮尖雙仁麸炒黄桂心一兩川椒二分去目及閉口者㣲炒出汗川大黄二兩剉碎㣲炒厚朴二兩生薑汁灸令香右為細末煉蜜和搗三二百杵如桐子大每服扵食前以温酒下三十丸丁香爛飯丸出瑞竹堂治食傷太隂又治卒心胃痛消食快氣丁香一錢丁香皮三錢甘草灸三錢甘松三錢去土砂仁三錢益智三錢荆三稜一錢炮香附子半兩木香一錢廣茂一錢炮右為細末湯浸蒸餅和丸如菉豆大每服三十丸白湯送下或細嚼亦可不拘時候或丸如桐子大亦可通命丸療心腹積聚寒中㽲痛乂心廹滿脇下急繞臍痛大黄逺志黄耆麻黄甘遂鹿茸灸各四分杏仁六十枚去皮尖兩人者熬香豆豉一合熬芒硝三分巴豆五十粒去心皮熬右搗篩和以蜜丸如小豆先食三丸日再忌蘆笋野猪肉木香散出聖恵方治積聚心腹疼痛胸膈氣滯四肢無力不思飲食木香三分訶黎勒皮梹榔青橘皮各半兩湯浸去白瓤焙白术一分赤苓一分人参一分桂心一分厚朴半兩去粗皮塗生薑汁灸令香熱右為細散每扵食前以温酒調下二錢生薑棗湯調下亦得大黄丸出聖恵方治積聚氣心腹妨悶疼痛川大黄一兩剉碎㣲炒當歸三分㣲炒川芎三分訶黎勒皮梹榔各一兩川烏頭一兩炮裂去皮臍乾薑三分炮裂剉吴茱萸半兩湯浸七遍焙乾㣲炒桃仁一兩湯浸去皮尖雙仁麸炒㣲黄右件藥搗羅為末煉蜜和搗三二百杵丸如桐子大不計時候温酒下三十丸氣痞丸療寒氣痞積聚結不通繞臍切痛腹中脹滿胸逼如戳憂恚所積用力不節筋脉傷羸痩不能食飲此藥食之人强嗜食益氣壮力烏頭炮甘草炙葶藶熬芎藭芍藥柑皮灸各二分右搗篩蜜和丸如梧桐子大一服三丸日再不知漸加至五丸七丸一方桂二分去柑皮忌海藻菘菜猪肉冷水等一方有通草無柑皮烏頭丸療久寒積聚心腹繞臍切痛飲食不下烏頭炮甘草炙各三分茱萸半兩細辛半夏洗三十遍附子炮藁本各三兩右下篩蜜和丸如桐子大先食前服五丸日再不知稍増之忌羊猪肉冷水薑菜海藻菘菜餳化鐵丹出御藥院方治逺年近日沉積及内傷冷物心腹疼痛烏梅八枚不去核巴豆十六枚不去皮胡椒四十八粒青皮半兩陳皮半兩二味俱不去白右為細末醋麺糊和丸如菉豆大每服五七丸食後生薑水下若不化更加蓽澄茄半兩丁香二錢半服之更快巴豆丸出聖恵方治心胸積聚時有疼痛巴豆二十枚去皮研紙包壓去油桔梗一兩去蘆頭杏仁二十枚湯浸去皮尖雙仁麸炒㣲黄藜蘆一兩去蘆頭炙黄皂筴二兩去皮塗酥炙令黄焦去子右件先搗藥桔梗皂䇲藜蘆等羅為末後細研巴豆杏仁如膏煉蜜和搗三二百杵丸如小豆大每日虗心温水下三丸如未覺即加至五丸萬靈丸治積聚滯氣胸膈痞悶心腹刺痛雄黄研大黄剉炒陳橘皮去白焙白牽牛末肉蓯蓉酒浸切焙青橘皮湯浸去白焙杏仁去皮尖雙仁炒亁漆炒烟出巴豆去皮心膜出油各半兩訶黎勒炮去核三分木香藿香葉天南星炮各一分胡椒半分右為末用薄荷汁煮麺丸如菉豆大傷飲食生薑下三丸至五丸傷酒嚼燒生薑下十丸婦人血氣心痛酒煎當歸調沒藥末一錢匕下十丸百當膏出聖濟總録治一切積聚心腹疼痛年月深乆者皆治一歲至百歲并可服丹砂膩粉研各半兩水銀鈆各一分二味炒紫牛黄研龍腦研粉霜研陽起研各一分黄蠟半两巴豆肥者一百二十枚去皮心膜研出油取霜用蝎梢炒一分半夏一錢湯洗七遍二味杵羅為末右合研極細勻鎔蠟并熟蜜少許同和成膏旋丸如梧桐子大每服三丸至五丸量大小虗實加减服吐逆藿香湯下取熱積生薑蜜水下取冷積乳香湯下風涎薄荷湯下便利米飲下沉香丸治五積氣結面色萎黄心腹疼痛口吐酸水有時發􅠲積年不已沉香半兩丁香半两木香半两硇砂一分碎巴豆霜半两蓬莪茂煨剉桂去粗皮亁漆炒出烟亁薑炮青橘皮去白焙荆三稜煨剉白荳䓻去皮各一两大黄一两生為末用醋一升慢火熬成膏右搗研十二味為末入大黄膏和丸如梧桐子大每服五丸食後臨卧生薑湯下乙丑丸出聖濟總録治食積隠伏見時作攻心脇㽲刺疼痛硇砂細研湯内飛過去砂石熬取霜烏頭生去皮臍為末各一两沉香末五靈脂末去粗皮胡椒末亁薑末巴豆去皮心膜各半两研亁漆末三分右除巴豆外同研勻次入巴豆再研極細同熟棗肉和作一塊用濕紙裹三五重用紙筋黄泥固濟約厚半指許熁乾用熱炭火十觔扵乙丑日早漸進火燒令香為度以新盆器合候冷取出及焦紙灰不用搗爛看鞭輭再入熱棗肉和約千餘杵得所丸如梧桐子大每服三丸温木𤓰酒下木𤓰湯下亦得不拘時候服如大瘕癖積塊及諸冷氣㽲刺疼痛或泄痢膿血食前服五丸至七丸㸔虗實加减狼毒丸出聖恵方治積聚氣結成塊叚在腹下久不消散發欬疼痛狼毒細剉醋拌炒令乾芫花醋拌炒令乾乾漆搗碎炒令烟出雄雀糞微炒五靈脂鼈甲塗醋灸令黄去裙襴硫黄細研入硇砂不夹石者細研以上各一两膩粉半两研入右件藥搗為末入研藥令勻以醋煮麺糊和丸如梧桐子大每服空心以醋湯下三丸至五丸當利下惡物吳茱茰散出聖恵方治積聚氣心腹脹滿飲食减少四肢不和吴茱茰一两湯浸七遍焙乾㣲炒白术一两當歸一两剉碎㣲炒枳實半两麸炒㣲黄紫菀一两湯浸去皮㣲炒桂心一两梹榔一两鼈甲一两塗醋炙令黄去裙襴郁李仁一两湯浸去皮㣲炒右為粗散每服四錢水一中盞生薑半分煎至六分去滓食前稍熱服縮砂丸出楊氏方温中散滯消飲食治胸膈噎悶心腹冷痛大能煖化生冷菓食夏月不可缺天南星湯浸去皮七遍焙乾碎髙良薑各四两縮砂仁一两右為細末生薑自然汁煮麺為丸如梧桐子大毎服五十丸生薑湯下熨氣法出澹潦法方大艾打熟砂石銚内灼滴少醋令香熱極右以二三絹袋袋藥更替乗熱搭腹上印熨一法只炒食塩炒極熱按熨痛處亦效軟犀丸出楊氏家蔵方治久虗沉積心腹撮痛膓滑下痢臓腑不固日漸羸痩沉香檀香各一分丁香木香肉荳䓻麺裹煨熟梹榔已上四味各半两六味同為細末巴荳二十一粒去殻杏仁二十一枚去皮尖炙白丁香一字鷹糞白一字百草霜一字右件除前沉香等六味外将後巴豆等五味用鉄銚子内慢火炒至烟出無令太過不及候得所用一磁盞盖放冷一宿研細與前藥末相和研勻同黄蠟一两半麻油一两同煉鎔和藥成劑旋丸如菉豆大每服十丸至三十生薑湯下食後臨卧服異香紅丸子出楊氏家藏方治一切積聚心腹疼痛婦人血氣攻注常服消滿食破積氣沉香硇砂别研使君子去殻蓬莪术炮切荆三稜炮浸汁硃砂别研木香以上七味各一分梹榔一枚大者肉荳䓻一枚大者母丁香五粒巴豆二十粒好者去皮心膜不出油研黒牽牛一两炒熟取末半两入藥餘者不用澄茄一分右件為細末麺糊為丸如菉荳大硃砂為衣毎服三丸茴香湯下欲㣲利加至五七丸食後服賜方五香湯出楊氏家藏方治積寒攻衝腹脇疼痛木香沉香滴乳香别研藿香葉吴茱茰湯洗七次已上五味各三两麝香一两别研右件除乳麝外為㕮咀以水五升煮取二升去滓入二香煎令濃再服分三服一方寒熱頭痛加獨活四肢不舉無力口亁加桑寄生連翹兩脇脹痛加射干大黄大黄㸔虗實加减小便不利加通草不拘時候治五臓癥結心腹積聚疼痛用戎鹽水消服之積聚宿食不消附論凢飲食入胃脾臟化之若腹有積聚攝養乖度飲食不時則脾胃愈弱飲食遲化故為宿食不消之病其状噫食氣臭胃脹煩滿診其脉来實者是也人之有身藉五榖以生故胃以納之脾以尅化之脾胃喜煖不宜以生冷傷之體虗者不善調養飢飽失時或過减飲食并一切生冷之物脾胃法弱不能尅化停蓄胃脘遂成宿滯輕則吞酸嘔惡腦滿噎噫或泄或利其臭如抱壊雞子或米榖不化甚則積聚結而為瘕癥之病治之湏䆒其源又湏量人氣體虗實病證淺深投以藥餌病之淺則消化之甚必湏推利而後調補脾胃或有因挟寒熱之氣而泄者又當以脉證辨而料理凢一切冷食不消宿酒不散亦類傷寒身熱惡寒戰慄頭痛腰脊强不可用雙觧散導引丸木香梹榔丸共六十丸量虗實加减利五七行所傷冷物宿食酒推盡頭痛病自愈矣次以五苓散生薑棗煎用長流水煎取五六錢不可服酒癥丸進食丸此藥巴豆有大毒故也凢一切沉積或有水不能食便頭目昏眩不能清利可茶調散吐之次服七宣丸木香梹榔丸膏粱之人起居閒逸奉養過度酒食所傷以致中脘留飲脹悶痞膈必當服木香導飲丸治之若田野蒭蕘之人食踈衣薄動作勞役若酒食所傷心腹滿悶醋心時吐酸水可用進食丸以其勝毒也病甚者每月泄三五次夫馨飪之邪從口入者宿食也盖五味入口所以滋養五臓得之則生不得則死傷之則反為害所以宿食為雜病之先若五臓不平食不輸化血凝氣滯羣証蜂起皆宿食所為也治之宜量臓腑虗實淺深為治養生方戒不得用巴豆令服青木香丸如有食癖非巴豆不尅所謂擾乎可擾擾亦無擾方集香丸治傷生冷硬物不消荆三稜廣茂青皮陳皮川練子益智茴香丁香各一两巴豆和皮米炒焦黒色五錢右為細末醋和為丸每服五七十丸食前生薑湯下治一切氣宿食不消方右用訶黎勒一枚入夜含之至明嚼咽紫沉消積丸出華陀方治久積伏滯胸膈膨脹心腹刺痛不化飲食及婦人血氣疼痛沉香剉阿魏醋化研巴豆霜各一两硵砂研細四味同研勻用蜜一觔酒二盞共熬成膏以瓷盒盛丹砂二两硫黄研木香人参桂去粗皮胡椒各四两丁香亁薑炮各二两右将前四味蜜酒熬成膏餘並搗羅為末用膏和搗千百杵丸如菉豆大每服五七丸温橘皮湯下如心痛温酒下婦人血氣痛當歸湯下一方有沒藥一两鼈甲散出聖濟總録治肋下結塊連心腹痛食冷物即劇鼈甲去裙襴醋炙蒺藜子炒去角各二兩黄芩去黒半兩桂去粗皮一两柴胡去苗桔梗炒當歸切焙牛膝醋浸切焙赤茯苓去黒皮芍藥大黄剉醋拌炒人参陳橘皮湯浸去白焙訶黎勒煨去核各二两梹榔剉二分右搗羅為散每服二錢煮棗湯調下葛花解酲湯出徳生堂治宿食酒傷胸膈滿悶口吐酸水惡食嘔逆及年逺日久酒疸面眼俱黄不思飲食葛花白荳䓻砂仁木香五錢亁葛二錢陳皮白术薑屑二錢青皮白茯苓猪苓一錢五分澤瀉二錢人参一錢五分神麯五錢甘草三錢右為細末每服二錢臨卧沸湯調服汗出立效不損元氣而散酒積毒如㵼者加豆䓻煨二錢荆三稜散治積聚氣脾胃虗弱不能化榖至宿食不消腹脇痛荆三稜一两煨剉桂心三分丁香半分益智三分去皮木香五錢大腹皮一两剉前胡一两去蘆白术二分厚朴一两去粗皮塗生薑汁灸令香熱亁薑半两炮裂剉蓬莪术二分郁李仁一两浸湯去皮㣲炒青橘皮一两湯浸去白瓤焙赤茯苓一两川大黄一两剉碎㣲炒右為粗散每服三錢水一中盞生薑半分棗三枚煎至六分去滓毎扵食前稍熱服藿香煮散治久積聚宿滯不消或翻胃吐逆惡心亁嘔及脾寒等疾藿香葉木香陳橘皮湯浸去白焙肉豆䓻去殻煨人参訶黎勒皮去黒皮白茯苓去黒皮甘草灸草豆䓻去皮麥蘖炒陳皮炒各一两亁薑炒半两厚朴去粗皮生薑汁灸一两半髙良薑剉炒五錢右搗羅為散每服二錢水一盞生薑一塊打碎同煎至七分入鹽一捻熱服水㵼及腸風毒熱陳米飲調下神效感應方治消宿食除積滯常服不動臓腑黒沉角磨木香檀香全丁香陳皮青皮黄連砂仁香附子去黒毛見白巴豆三百粒肥白净研為細末半夏水浸去面衣三稜略煨蓬术大者煨各一两肥烏梅肉重一百文右用甆噐一隻盛巴豆上以烏梅肉盖之却用陳米醋浸過與烏梅肉平扵甑上蒸至極熟以巴豆紅色為度却濾出研令極爛次用糯米粽和前件諸藥搜勻搗千百杵以黒色為度衆手丸如蘿蔔子大毎服一十丸宿食不消陳皮湯下氣滯茴香湯下酒後嘔吐薑湯下法製生薑散治飲酒過多或生冷停滯嘔逆惡心不欲飲食生薑十两用青棒掺過再白麺拌浥焙乾用之桂去粗皮青皮去白陳皮去瓤半夏生薑製白术各一两丁香木香去白蓽澄茄各二两半白荳䓻縮砂仁白茯苓各一两半甘草灸葛根各半两右為細末每服三錢温酒調下不拘時候仙方内消丸治酒食過傷脾胃青皮陳皮去白蒼术米泔浸桂去皮三稜煨蓬术煨乾漆炒去烟芫花醋煮草霜附子故紙炒皂角各三两黒牽牛半两半生半熟右為末醋和丸梧桐子大三十丸随湯下一方加半夏三两訶黎勒散出聖恵方治積聚宿食不消四肢羸痩乏力訶黎勒一两煨用皮附子一两炮去皮臍草豆䓻一两去皮白术三分當歸半两剉碎㣲炒人参半两去蘆頭神麯一两火煨黄耆三分剉桂心一两陳橘皮一两湯浸去白瓤焙梹榔一两郁李仁一两湯浸去皮㣲炒赤茯苓一两右為粗散毎服三錢水一中盞生薑半分棗三枚煎至六分去滓不拘時候稍熱服乳香丸出聖恵方治宿食不化心膈氣滯中焦不和及癥癖積聚或多嘔逆並宜服乳香半两别研入木香半两肉豆䓻半两去殻當歸半两剉㣲炒青橘半两湯浸去白瓤焙荆三稜半两煨剉乾漆半两搗碎炒令烟出紫菀一两去苖土乾薑一两炮裂剉附子一两炮裂去皮臍鼈甲一两半塗醋炙令黄去裙襴硃砂一两細研巴豆一两去皮心研紙裹壓出油右藥除乳香硃砂巴豆外餘藥並搗羅為末入研子藥都研令勻毎兩匙藥末用細蕎麺一匙相和更研令勻洒水為丸如菉豆候亁以漿水煎令沸下藥丸子煮一兩沸候藥丸子浮上乃漉出收竹篩子内晒亁毎服以温湯下三丸或五丸若有乆積聚常於卧時服五丸瘥木香丸出聖恵方治積聚氣脾胃虗冷宿食不消心腹氣滯脹滿疼痛木香三分剉白术三分人参三分去蘆赤茯苓三分橘皮一兩去白吴茱茰半两湯浸七遍焙乾㣲炒亁薑半两炮裂剉桂心三分訶黎勒一两煨用皮梹榔一两神麯一两炒㣲黄大麥蘖一两炒㣲黄川大黄一两剉碎㣲炒當歸半两剉㣲炒桔梗半两去蘆頭右為細末錬蜜和搗三二百杵丸如梧桐子大毎扵食前以温酒下三十丸黒神丸出聖濟總錄治消積化氣進食木香硵砂研蓬莪茂煨剉荆三稜煨剉各半两桂去粗皮附子炮裂去皮臍亁薑炮乾漆搗碎炒出烟大黄煨為末青橘皮湯浸去白焙墨燒過巴豆去心皮膜細研出油各一两右以好醋一大碗先熬磠砂令沸又熬巴豆數沸又加大黄末熬成膏餘藥並搗羅為末以膏杵和丸如菜菔子大毎服二丸五丸茶酒任下如消食化氣生薑橘皮湯下小腸疝氣茴香酒下婦人血氣當歸酒下硵砂煎丸聖濟總録治一切積聚停滯化氣消食補益真氣産後逐敗血補虚損硇砂揀通明無石者别研如粉當歸酒浸一宿去蘆頭切焙肉蓯蓉酒浸一宿薄切作片焙乾巴㦸天酒浸一宿去心焙梹榔生各一两楝實洗過切破四两酒浸一宿候軟以刀子刮割下瓤去皮核下用三两蘹香子㣲炒木香沉香剉附子炮裂去皮臍天雄用酒煮五七百沸候軟刮下皮臍各一两阿魏半两米醋磨成膏入清茶右為細末以無灰酒煮麺和丸如梧桐子大毎服三十丸空心日午温酒下常有婦人病蓐中下痢日久甚困篤百方不瘥醫曰蓐中痢與他痢不同常痢可用苦澁藥止今蓐中利生扵血不足投澁藥則血愈不行痢當愈甚産後痢者宜投硇砂丸日三服痢頓减半次日遂愈此藥産後雖無病亦宜服之能養血去積滯應騐方治大人小兒百物所傷難經云脾氣通扵口口和則知榖味矣心氣通于舌舌和則知五味矣知榖味五味莫不由口舌而入胃也善攝生者謹扵和調使飲食一入扵胃随消随化則無滯留之患若禀受怯弱飢飽失時或過食五味魚腥乳酪强食生冷菓菜停蓄胃脘遂成宿滯輕則吞酸嘔噦胸膈噫噎痞悶不食久則積聚結為癥瘕面黄羸痩此皆宿滯不消而生焉大率纔有停滯當量人虛實速宜尅化之不可後時養成沉疴也青皮陳皮三稜蓬莪丁香木香檀香沉香麝香各一錢腦子半錢黄連三錢巴豆一百粒去皮心膜陳米酒醋半盞煮熟冷研極爛細右為細末入巴豆合同麝香腦子十分和勻用糯米粽子取尖搜和勻成膏棒捶二十餘下丸如米大大人服三十丸小兒斟酌服之用陳皮湯任下臨卧服通神丸治積聚留飲宿食寒熱煩結長肌膚補不足蜀椒去目并閉口炒出汗附子炮裂去皮臍厚朴去粗皮生薑汁灸半夏湯浸七遍焙各一两杏仁湯浸去皮尖雙仁炒研藶子紙上炒各三两芒硝研五两大黄剉炒九两右除研外搗羅為末與杏仁芒硝研勻錬蜜丸如梧桐子大毎服二十丸米飲下忌猪羊肉餳冷水小分氣丸治久積氣塊宿食不消胸膈痞悶痰逆惡心不思飲食臍腹刺痛醋心噎塞木香一两梹榔剉陳橘皮湯浸去白焙楝實剉炒乾薑炮青橘皮湯浸去白各半两蓬莪茂醋浸一宿煨過一两巴豆去皮心膜出油净半夏湯浸一遍去滑焙大黄煨剉各一分雄黄研一两右為末醋煮麺和丸如菉豆大毎服五丸七丸温生薑湯下食後臨卧服桂香勻氣湯治消積滯化宿食痰飲胸膈痞悶桂去粗皮丁香皮縮砂仁益智去皮炒梹榔剉陳橘皮湯浸去白焙一两木香蓬莪茂煨各一两烏梅和核一两半青橘皮湯浸去白焙一两巴豆去皮心膜研出油六十四粒右除巴豆外搗羅為末和勻煮麺和丸如麻子大毎服七丸至十丸茶酒任下食後服乳香丸出聖濟總録丁香木香各一两附子炮裂去皮臍五靈脂乾薑炮各半两桂去粗皮芫花醋拌炒黄青橘皮湯浸去白焙各三分猪牙皂䇲去皮酥灸一两巴豆去皮心膜别研如膏新瓦上攤去油取霜一錢乳香一两右除乳香五靈脂末巴豆以外八味搗羅為末入上三味拌勻煮陳麫和丸如菉豆大毎服二丸三丸生薑湯下量虚實加减食後臨卧服阿魏丸出濟生方治脾胃怯弱食麫或食生菓停滯中焦不能尅化致腹脹痛嘔惡不食或痢或秘悉主之阿魏酒浸化旋入官桂不見火蓬术煨炮麥蘖炒神麯炒青皮去瓤蘿蔔子炒白术薑乾炮各半两百草霜三錢巴豆去殻油三十粒右為細末和勻用薄糊為丸如菉豆大毎服三十丸不拘時薑湯下麫傷用麫湯下生菓傷用麝香湯送下如意丸治消積化氣温胃食後心膈妨悶威靈仙去苖土附子生去皮臍二味各半两同為末用好醋半盞浸一宿硵砂細研一分巴豆十一粒去皮心膜出油二味同研用酒半觔醋半觔同煎與前二味同熬成膏木香半两蓬莪茂煨剉半两大黄剉炒三分青橘皮湯浸去白炒一两神曲炒半两丁香一分右将後六味為末以前四味膏和更别熬醋少許研墨汁同丸如菉豆大毎服五丸七丸薑湯送下麝香丸出聖恵方治氣消食心腹氣痛麝香一分細研木香梹榔五靈脂半两湯浸去白瓤焙巴豆半两去皮心硫黄一两右以生絹袋硫黄巴豆同内湯中煮懸袋扵鐺上勿令着底可半日久去硫黄巴豆晒乾與木香四味加入麝香同研勻用水浸蒸餅和丸如菉豆大毎服五丸以橘皮湯送下益智散出聖濟録治脾胃虛冷積聚沉結宿食不化荆三稜煨剉益智去皮炒蓬莪茂煨剉白茯苓去黒皮各一两青橘皮陳橘皮二味並湯浸去白炒人参剉甘草灸剉各半两木香一分厚朴去粗皮生薑汁灸一两右搗為散毎服一錢入鹽少許沸湯㸃服不拘時候三台丸出千金方療五臟寒熱積聚腹脹腸鳴而噫食不作肌膚甚者嘔逆若傷寒寒瘧已愈令不復發食後服五丸飲多者吞十丸長服令人大小便調和長肌肉古病源云積聚而宿食不消者由腹臟為寒氣所乗脾胃虚冷故不能消化留為宿食也診其脉来長實心腹積聚飲食不消胃中冷故也大黄二两熬熟硝一升葶藶一升煎前胡二两厚朴一两炙附子一两焙茯苓半两半夏一两洗杏仁一升去皮尖炒細辛一两右搗篩蜜和搗五十杵酒服如梧子大五丸稍加以知為度忌羊肉餳生菜酢物一方無厚朴硃砂丸出聖恵方治一切氣及消宿食硃砂三分細研木香一分梹榔半分阿魏半分皂䇲一錢炙麝香半分肉豆䓻一分去殻巴豆二十枚去皮心以醋煮半日取出研令細右件藥為末都研令勻以糯米飯和搗三二百杵丸如麻子大毎服不計時候以生薑橘皮湯下三丸至五丸快活丸黒牽牛半觔大麥芽半觔用巴豆三錢炒黄色去巴豆香附子四两炒去毛青皮二两半蘿蔔子四两炒梹榔二两蓬术三稜醋灸各四两大黄二两生用右為細末水和丸如梧桐子大毎服七丸以淡生薑湯下木香丸治積聚宿食不消中脘痞滯煩悶氣促腹内刺痛噫氣不思飲食木香半分梹榔剉一两陳橘皮湯浸去白焙半两荆三稜煨一两丁香一分乾薑炮一分蓬莪茂煨半两巴豆去皮心膜出油半錢硵砂研飛半两右除研外搗羅為末入巴豆硇砂合勻湯浸蒸餅丸如菉豆大毎服二丸至三丸温生薑橘皮湯下食後服黒虎丸出聖濟總録治諸積宿食不消芫花炒甘遂炒烏頭炮去皮臍荆三稜煨剉大㦸炒剉牽牛子炒乾薑炒陳皮去白焙各半两亁漆二两炒出烟盡右為末以醋煮麺和丸如菉豆大毎服二丸消食化氣温水下取積滯米湯下温病傷寒薑醋湯下氣痛艾湯下本臟氣虛炒蘹香子酒下瘧疾桃枝湯下婦人血氣勞氣醋湯下寸白䖝煎牛肉湯下巴豆丸出聖恵方治積聚宿食不消心腹脹滿疼痛巴豆半两去皮心出油研入附子一两炮裂去皮臍桂心一两硫黄一两半細研水飛過五靈脂一两雄黄一两細研水飛麝香一分細研乾薑一两炮裂剉香墨半两右為細末入巴豆都研令勻用糯米飯和丸如小豆大毎服扵食前以生薑橘皮湯下二丸丁香丸出聖恵方治積聚氣宿食留滯不能消化丁香半两木香半两巴豆一分去皮心出油研入硫黄半两細研水飛硃砂半两細研水飛膩粉一錢麝香一錢細研乳香半两神麴一两半别搗末右為細末都研令勻以酒煮神麴末和丸如菉豆大毎服食前生薑橘皮湯下三丸治暴食宿食留飲不除腹中為患方出肘後方右用巴豆一枚去皮心熬之椒目十四枚䜴十六粒合摶為丸服二丸當吐利不盡更服二丸服四神丸下之亦佳順氣丸治一切積氣宿食不消黒牽牛一觔取頭末右用蘿蔔存頂蓋剜令空内藥末不許納實盖頂紙封蒸熟取出藥末将蘿蔔擂碎加白豆䓻末二三錢重用自然汁和丸如梧桐子大毎服三十丸任意加减服之磨積消食治痞悶膨脹右杏仁毎七粒用巴豆一粒去殻同麩炒熟去巴豆不用毎服杏仁去皮尖細嚼三五枚温湯送下食後臨卧服又方出肘後方右椒目二两巴豆一两去皮心熬摶以棗膏丸如麻子服二丸下痛止赤子丸出聖恵方化氣消食巴豆半两去皮用冷水内浸一宿取出去心膜扵紙上収乾後将麫作餅子攤巴豆在内如作夹子膏者麫勿令薄熟湯内煮直候黄色漉出去麫取巴豆扵乳鉢内两手研以細為度梹榔肉豆䓻去殻木香桂心亁薑炮裂剉青橘皮湯浸去白焙已上各半两硃砂半两細研右件為末入巴豆細研令勻以醋煮麫糊和丸如麻子以朱砂為衣滚過曬亁毎服以橘皮湯下三丸硵砂煎丸出聖恵方治一切積滯氣脅膈不利飲食難化心腹結硬欲成癥瘕面色已萎黄臍腹多痛宜服硵砂一两去夹石者研亁漆末一两荆三稜一两巴豆一两去皮心研紙裹搥白已上五味用頭醋五升扵磁瓦噐内以慢火熬三日成膏入後藥末川大黄一两剉碎㣲炒附子一两炮裂去皮臍香墨一两青橘皮一两湯浸去白瓤焙當歸一两剉微炒右件等藥搗羅為末入前煎中相和搗一千杵丸如菉豆大毎服一丸以温酒下寛中丸耑逐積滯化宿食利胸膈烏頭炮裂去皮臍吴茱茰湯浸焙良薑甘遂麸炒大黄梔子仁各半两巴豆去皮心膜研出油四十九粒右為末用棗肉丸如菉豆大毎服一丸生薑橘皮湯下梹榔丸出聖濟總録取積聚消宿食梹榔生剉两枚巴豆去皮心膜麸炒二十一枚牽牛子炒硇砂研一分青橘皮湯浸去白焙半两大黄濕紙包煨亁漆炒烟出各一两右為末湯浸蒸餅丸如菉豆大以丹砂為衣毎服一丸至二丸温水下如要㵼取食積三五丸或七丸十丸量虚實加减空心煎葱白湯下瀉後服和氣人参湯和氣人参湯出聖濟總録人参白茯苓去黒皮厚朴去粗皮注水薑汁灸肉荳䓻去殻甘草灸陳橘皮去白麸炒蘹香子灸木香白术桂右為細末毎服二錢水一盞生薑三片棗一枚劈同煎至七分去滓温服七星丸出聖恵方化氣消食巴豆一两去皮心油煎令黄黒色去油硃砂半两細研梹榔半两木香半两丁香半两乳香半两肉荳䓻半两去殻右為末入硃砂巴豆等研勻以麫糊丸如麻子大毎服以温酒下五丸湯下亦得木香丸消食化氣利胸膈及積聚凝滯臓腑刺痛木香為末丁香為末巴豆去皮心膜研出油各半两硵砂研半两大棗去皮核烏梅去核為末各三十枚右先将水拌白麫作一薄餅以棗肉鋪餅上次以前四味藥末和勻復鋪棗肉上作饅頭裹就用炭火四圍灸熁候麫焦黒約藥透取出地面上出火毒候冷打破去焦麫不用将藥與烏梅末同搗稀麺糊丸如黄米大毎服二丸至三丸食後生薑湯下或随所傷物湯下黒丸子出永類餘方治中脘有宿食吞酸惡心吐清水噫氣或心腹疼痛及中虛積聚飱泄赤白痢下烏梅肉七個百草霜三錢杏仁去皮尖别研三七枚巴豆去殻油二枚半夏湯泡七次九枚縮砂仁三七枚右為細末和勻用薄糊為丸如黍米大每服十五丸加至二十丸用熟水送下薑湯亦得更酌虚實増損丸類或因食生冷魚膾得腐用治中湯送下亦可鷄舌香散出徳生堂治男子婦人隂陽不和臟腑虚弱中脘氣滯宿食停積留飲不消胸脇脹滿心脾引痛攻刺腹脇有妨飲食及治中酒吐酒停飲侵積嘔逆惡心噫氣吞酸良薑官桂香附芍藥各一两甘草二两半烏藥一两右為細末毎服二錢入鹽少許沸湯㸃服不拘時此藥治心氣疼大妙巴豆丸出聖恵方治冷氣破積聚消宿食巴豆一两以漿水煮一日不住添熱水去皮心膜紙壓出油桂心一两硫黄一两細研水飛過木香一两梹榔半两附子半两炮裂去皮臍右件為末入巴豆硫黄同研令勻用軟飯和丸如菉豆大每服以生薑湯下五丸木香丸治積聚宿食不化留滯成塊心腹疼痛脾倦多困日漸黄痩木香三分蓬莪荆三稜二味煨剉各一两丹砂研三分巴豆去皮心膜研出油二十粒右将前三味搗羅為末入巴豆丹硃醋煮麫糊丸如菉豆大每服三丸至五丸生薑橘皮湯下食後臨卧服治積聚宿食不消虛羸腹脹出聖恵方吴茱茰二两湯浸七遍焙乾㣲炒巴豆半两去皮心研如膏紙包壓出油右件藥先搗羅茱茰為末以釅醋一大碗浸茱茰末一宿至来日扵銀鍋内熬候茱茰似膏即以巴豆膏更熬候可丸即丸如菉豆大空心以温酒下三丸如氣散惡物下即住服小丁香丸出聖濟方消積滯生冷留飲宿食止痰逆惡心霍亂嘔吐治心腹脹滿肋脇刺痛胸膈痞滿噎塞不通常服順脾胃進飲食五靈脂十二两丁香三两木香一两半肉豆䓻去殻三十枚巴豆去皮出油二百一十枚右為細末入巴豆令勻麫糊和丸如黍米大每服五丸至七丸温生薑湯下橘皮湯亦得食後服如霍亂吐逆煎桃葉湯冷下小兒吐逆不定三歲服三丸五歲以下服四丸用生薑桃葉湯下治積聚氣宿食留滯不能消化出聖恵方木香一两青橘皮一两湯浸去白禳焙肉豆䓻三分去殻巴豆半两去皮心出油研入神麹一两㣲炒右為細末入巴豆研勻以醋煮飯丸如小豆大每服食前以生薑湯下三丸五福夀命丹治一切積氣及酒醉觧酲專治酒痰寛胸利膈枸祀子生白礬枯各一两天麻去苗半两半夏湯泡亁薑生各一两半右為細末􅔻餅生剜裹藥蒸熟去蒸餅皮将藥入臼中搗千下如亁入酒些少丸如梧桐子大每服五七十丸生薑湯下日二服䧟胷湯出千金方治胸中心下結積飲食不消栝蔞實大黄黄連各二两甘草一两右㕮咀以水五升煮取二升五合日三服加味青木香丸出危氏方治糍糕傷脾噫酸不食心腹作痛百藥不效宜用青木香丸三十粒白丁香十粒小酒麯二錢同為末入巴豆三粒更研和令匀蒸餅為丸如菉豆大每服二十丸漸加至三十丸生薑橘皮湯下宿滯既去其疾自安只用小酒麹木香二件為末鹽湯調服口有酒香是效治暴宿食留飲不除腹中為患方出射方大黄茯苓芒硝各二两巴豆一两右搗蜜丸如梧桐子大一服二丸不痛止木香枳术丸治宿滯氣消飲食開胃進食木香一两枳實炒一两白术二两右為細末荷葉燒飯為丸如梧桐子大每服五十丸温水送下治宿食不化嘔吐酸水胸膈痞悶冷氣腹痛肺寒咳𠻳並皆治之陳皮去皮四两生薑一两半洗甘草一两灸右㕮咀炒令黄赤乾研為末毎服二錢鹽湯㸃服化滯丸専治飲食不消氣閉肚疼裏急後重白㵼男女並可服之黄丹一两黄蠟一两巴豆肉三錢右巴丹二味同細研白用碗一個香油少許慢火化開蠟後三四次下前藥調勻滴入水不散都傾入水中取出為度毎服如蘿蔔子大水大者十五丸生薑湯下水小者虛實随加减用服硃砂丸治大人小兒百物所傷黄丹一两白麫四两巴豆五十粒去殻去油研細右前三味合和一處用砂鍋煮數沸去水冷定入木香三錢硃砂二錢前後五味共搗數千下為丸如黍米大每服薑湯下大人三十丸小兒十五丸二歲三丸量病人虚實感應丸十六羅漢杏仁生八金剛巴豆四菩薩晋棗本方無分两依方修合休要差萬两黄金不如他巴豆去皮棗兒去核裝巴豆二個紙裹水醮􅊜燒熟杵一千餘下用油單紙包裹旋用每服如菉豆大空心送下㸔人虛實加减用黒神丸巴豆血餘灰百草霜右各分停毎服五七丸送下㸔人虚實與藥白术丸治積聚宿食不消腹脇下妨悶血臌羸痩骨莭酸疼多有盗汗白术一两黄耆一两剉牡蠣一两燒為粉人参一两去蘆頭赤茯苓一两川烏頭一两炮裂去皮臍亁薑半两炮裂剉木香一两當歸一两剉㣲炒赤芍藥三分桂心一两甘草半两炙㣲赤剉防葵半两鼈甲一两塗醋炙令黄去裙襴紫菀半两去苖梹榔一两桔梗半两去蘆頭枳殻一两熬炒㣲黄去瓤右為細末錬蜜和搗三二百杵丸如梧桐子大毎服扵食前以温酒下三十丸觸痰丸磨積滯化氣寛中南星水煮一滚毎個切作四塊半夏不切皂角切作叚子生薑切皮明礬搥碎各四两五味一處扵砂礶内用水自夘時煮至酉時以南星内無白㸃為度有此不妨㨂去皂角不用只将餘藥切作薄片晒亁各焙亁為末後藥杏仁湯泡去皮灸神麹麥芽青皮陳皮去角紫蘓皮亁葛枳殻去瓤糖棗子肉蘿蔔子㣲炒木香各二两右為細末入前藥末拌匀以生薑自然汁同拌隔三四月藥成餅去皮搜碎打糊為丸如梧桐子大毎服六七十丸臨卧白湯送下露宿丸療心腹積聚膈上下有宿食甘草三分炙大黄甘遂芫花熬大㦸炙葶藶子熬各二分苦参硝石各一两巴豆半分去心皮熬右用細搗合蜜和丸如小豆服三當吐下不吐下稍益至五六丸以知為度先少起忌蒲藻藥蘆笋菘菜野猪肉治積聚宿食不消虚羸腹脹肥皂莢半两灸去皮子搗為末甘遂三錢晒乾生搗羅為末牽牛子二錢生搗為末右件藥一處更研細如麫患人二十已上用藥末一分凉水濕拌用麫桿作餛餅子十枚煮熟别用煖水嚼破下之良久方取下積聚如未轉即更以煎水調藥末半錢投之良久取下積食初服藥後如欲睡是藥力行量人虚實加减服之五靈脂丸化氣消食五靈脂一两巴豆四十粒去皮心膜以􅊜紙五重裹扵糠灰火内煨令熟取出細研壓出油木香半錢右件為末研入巴豆令勻以麫糊和丸如菉豆大毎服以橘皮湯下五丸消食方右用石燕在乳穴石洞中者冬月採之堪用餘者不中治消食如常法取二十枚投酒二升中漬之三日後取之令飲三盞随性多少甚益氣力香麹散治食過飽煩悶但欲卧而腹脹右熬麹令㣲香拌服方寸匕湏大麥生麹佳無麹以蘖亦得凡人飲食過度生嚼蘿蔔嚥之獨效散療食生冷雜物或寒時衣薄當風衣食便卧不消心腹煩滿疼痛脹急或食不化以火焼地令極熱即卧地激薄覆被取汗愈消食丸出楊氏家藏方消食化積治久痢心腹膈不快腹脹不思飲食烏梅肉攣者五十枚槌碎炒令焦黄色巴豆五十枚生用去皮殻熬肉桂去粗皮半两胡椒二十粒吴茱茰湯泡七次一两右件為細末濃磨細松烟墨水浸蒸餅和劑令勻丸如菉豆毎服五七丸温熟水送下如心腹痛醋湯下食後服救生丹消酒食化氣滯空利胸膈丁香一分肉桂一分去皮大甘草科七分燒存性木香一分巴豆十五個去皮用油煎令黄色為度右件六味一處杵為末以酒煮麫糊為丸如菉豆大茶酒任下三兩丸大黄丸治凢積滯氣餒食即不消風熱氣上衝宜服此利氣川大黄四两剉碎㣲炒訶黎勒皮四两人参三两去蘆皮大麻子三两右件藥搗羅為末錬蜜和丸如梧桐子大毎服酒下十五丸老少以意増减服之以溏利為度青空湯出江楊氏傷酒食飽滿青橘皮一两右湯浸去瓤入鹽四銖炒為末熟湯下二錢類攻散出集騐方凡所食不消方取其餘類燒作末酒服方寸匕便吐去宿食即瘥張文仲備急同陸光禄説有人食桃不消化作病特無桃林間得禞桃子燒服之登時吐病即瘥麝香三稜丸出楊氏家藏方化生冷宿食散心腹脹悶止嘔吐惡心匀氣寛膈消痰羙食荆三稜煨切二两人参去蘆頭一两白术一两丁香一两陳橘皮去白半夏湯洗七次各二两神麹炒黄沉香二味半两麝香半錢别研右件除麝香外並為細末次入麝香研令匀煮麫糊為丸如菉豆大每服三十丸温生薑湯下食後服青鹽丸出衛生寳鑑治一切冷積作痛無時宿食不消及治一切酒食所傷巴豆三十個去皮心膜出油硵砂一两鹽䜴六十粒揀棗三十個青鹽一錢大椒三十粒細麹三錢右為細末入巴豆研令匀醋煮麫糊為丸如梧桐子大每服三十丸温薑湯下空心食前服積在上食後服之破積導飲丸出衛生寳鑑治内有積塊堅硬飲食不消化心下痞悶廣木香梹榔陳皮去白枳殻麸炒枳實麸炒廣茂炮荆三稜炮半夏湯洗七次神麹炒麥蘗炒茯苓去皮亁生薑澤㵼灸甘草已上各半两牽牛頭末六枚巴豆三十粒去心皮膜右為細末入巴豆霜令匀生薑麹和為丸如梧桐子大毎服三十丸温生薑湯送下食前服治宿病出本草以石灰酒飲下唐李伯藥勤杜伏威朝京師既至歴陽中悔欲殺之飲以石灰酒因大利頓欲死既而宿病皆愈祛宿疾出本草以䝉頂茶煎服茶譜云䝉山有五頂有茶園其中頂名上清峰者昔僧人病冷且久遇一老父謂曰蒙中頂茶當以春分之先後多搆人力同雷之發聲併手採摘三日而止若獲一两以本處水煎服即能祛宿疾二两當現前無疾三两因以換骨四两即為地仙矣其僧如説獲一两餘服未盡而病瘥治食飲不消出本草以蓬莪茂酒研服之治宿食腹脹出本草用碧海水飲一合吐下消宿食下氣治𠻳出本草用菘菜根冬月作葅煮作羮食之治宿食不消常吐酸臭水出本草以鈞樟材酒煮服之消食和中以萊菔嫩葉生食之大葉熟噉之調中消食及大醉并食苽菓過度以生熟湯浸身湯皆為酒及苽菓味能消諸食令人易飢以海月生椒醬調和食之良普濟方卷一百七十二
