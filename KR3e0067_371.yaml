嘔逆或發喘或腳手漸冷或眼目欲合或服涼藥太多或虛損不足或沉沉默默不省或恍恍惚惚生驚但胃氣未脫速與服之若是危急不待作丸子可只以溫飯飲調與服以愈為度若腳手氷冷者服之立溫未止者服之立止雖慢驚慢脾風候宜與服仍加薄荷湯尤良竹瀝膏出全嬰方治小兒久患脾虛發搐慢驚潮歇附子炮一錢厚朴薑汁浸一宿焙乾白术蜜炒各一分麻黃去節炒半錢犀角屑一錢焙乾全蝎二十七箇薄荷汁浸一夕焙乾右為末竹瀝為丸如雞頭大三歲一丸薄荷湯化下無時治慢驚出楊氏家藏方赤腳蜈蚣一條頭尾全者酒塗炙白殭𧖟七箇炒辰砂一字别研麝香少許别研青州白丸子三十粒全蝎七箇頭尾全者各用生薄荷葉裹定外以麻線係定火上炙右為末將人參麥門冬湯調下急驚加腦子牛黃各少許煎金銀薄荷湯調服之一方水化蒸餅為丸續經驗治法前件藥如俱用不效危困可憂須診衝脈未絶在兩足面間當灸百會取前後髮際兩耳尖折中乃是穴也方書所載但云頂上旋毛中殊不審有雙頂者又有毛旋不正者庸庸之輩只循習舊本誤人多矣炙後即當控涎用青州白丸子末再煎如稀糊一般入蜜須冷熱得所調奪命散服之良久涎下細研靈砂米飲調和旋抹口中如證漸退而風堅服八仙散昏困服醒脾散常令減乳妳子服釀乳藥如此調理無不更生間有稟受不堅本氣素弱五行修短雖有神聖工巧靈丹妙劑不能奪其造化此乃曉然之理學者不可不審若涎已壅膈但聞喉中如鋸藥不能入又不可控當别法療之然須搐鼻噴嚏得出次服奪命散或免再潮溫白丸出全嬰方治小兒脾胃氣虛困頓泄㵼冷疳洞利及吐㵼之後或病久變成慢驚身冷瘈瘲天麻半兩殭𧖟去嘴白附子全蝎南星炮七次各一分右為末寒食麵煮糊為丸如小豆大三歲三十丸薑湯下食前如作散薑煎尤妙漸加服一方加附子一分五靈脂丸出全嬰方治小兒因吐瀉之後變為慢驚發歇不定蟬蛻一分附子炮去皮臍一作白附子五靈脂南星薑汁浸一宿焙乾蝎各半兩麝香一字一方不用麝香右為末釅醋一盞藥末半兩同熬成膏次入餘藥并麝香和為丸如雞頭大三歲一丸乳汁化下金銀薄荷湯服亦得鼻上汗出為效定命飲子出活幼口議治嬰孩小兒吐瀉脾胃虛弱發作慢驚風候搐搦不已醫工截風不止取痰不下散熱不退即驚不去其證欲傳慢脾風候一名天麻散亦治急驚風半夏揀羊眼者半分天麻一分甘草炙白茯苓白术老生薑各二錢右用水一盞磁器內煮令水乾將半夏天麻白术茯苓切焙為細末每服半錢或一錢生薑棗子湯調與服無時一方用半夏七錢天麻二錢半甘草等四味各三錢一方有木香無天麻此方健脾化痰去風散熱功效如神醫工少有知用初學之士只知有腦麝香㸑等方用之俗夫便言好藥殊不知腦麝乃醫家出不得已用之其物通關竅開閉塞踈腠理利骨節其藥屬隂能化於陽只有急驚宜用慢驚慢脾傷寒等患悉宜禁止其或疳痢藥用之虛者亦禁惟有痙痓癲癎宜用定命飲子屢經效驗野老處定此方功同造化深智高明往往欽服痰搦連併脈息怯不敢頓下者宜與靈芝丸若手足逆冷兼進回陽之劑行醫用藥至於此等證候乃主治之權變也乾蝎天麻散出御藥院治小兒慢驚風乾蝎全者十枚炒蔓陀羅七朵重一字天麻二錢半乳香研天南星炮丹砂研各一分右為細末每服半錢薄荷湯調下不拘時快脾湯出直指方治慢驚脾困不食和胃祛風天南星一箇銼如碁子塊生薑一兩切川厚朴一兩銼碎水三升同煮令南星透去薑朴只用南星切焙白茯苓半兩木香人參天麻各二錢半全蝎七箇焙右為末每服半錢甘草生薑煎湯調下桃紅散治小兒慢驚風手足瘈瘲神情如醉天南星炮烏頭炮製去皮臍白附子炮天麻各半兩乾蝎微炒二十一枚丹砂研一分右為細散每服一字或半字入牛黃龍腦各少許煎麻黃湯調下日三珍珠丸出聖惠方治小兒慢驚風墜涎珍珠牛黃丹砂雄黃膩粉各一分研右為合研勻細用粳米飯和丸如黃米大一二歲兒每服三丸薄荷湯下日三更量兒大小加減辰砂膏出活幼口議治嬰孩小兒慢驚風傳脾風傳慢候有冷痰在膈潮作不散此疾虛久不可頓下其兒搐緩昏困至重者大黑附子一箇八九錢者去皮頂上刻一孔入粉霜硇砂各半錢內在孔中用附末塞燒灰存性天南星炮半兩蠍稍羌活各一分硃砂半兩飛過右為末以硃砂和勻鍊蜜為丸雞頭子大每服一丸至兩丸金銀薄荷入酒三五滴點化與服一方麝香薄荷湯下此三方皆用黑附子直不可執謂性熱兒在幼小礙與服之兒患脾風腳手冷者有微有暴審其輕重輕即用湯盛即以丸重即以膏服之皆效須候手足暖陽氣回即為之快矣既以溫暖更以醒脾正謂藥兼服除是慢驚傳入慢脾候方可與服之硫黃其功甚速又且逐風化痰醒脾開胃溫暖臟腑補益腸胃奪命回陽省活危困至良至驗切不可倉皇妄投丸散或爾太過不及之時則致咎於後萬宜詳審不至誣誕故也天南星丸出直指方治慢驚痰壅惟身熱者可服南星一斤每重一兩上下者用溫湯浸洗刮去裏外浮皮並虛軟處令淨用法酒浸一宿用桑柴蒸不住添熱湯滿釜令甑內氣猛便不住灑酒常令藥潤七得時滿取出用銅刀子切開一個大者嚼少許不麻舌為熱未即再炊候熱用銅刀切細焙乾麝香研丁香各一兩龍腦研一兩半辰砂别研水飛二兩用一半為衣右為細末入研藥勻鍊蜜并酒丸硃砂為衣每服一豆許生薑煎調下蠍附散出危氏方回陽氣豁風痰全蠍七箇附子炮二錢南星炮白附子炮木香各一錢右為末每服半錢薑四片慢火熟煎旋服黃連丸出聖惠方治小兒慢驚風心胸痰涎腹內壅悶或搐搦黃連一分末青黛一分麝香一分硃砂一分細研巴豆霜半兩右都研令細用豬膽汁和丸如黍米大每服以薄荷湯下三丸量兒大小加減服之乾蠍丸治小兒慢驚風乾蠍五枚全者炒細辛去苖葉乳香研各一分青黛研白附子炮各半兩右為細散每服半錢匕煎冬瓜子湯調下不拘時丁香丸治小兒慢驚風吐逆不定胃虛生涎多驚饒睡丁香一分為末半夏三枚湯洗十遍焙乾為末蠍稍四十九枚炒為末水銀鉛各一分二味結砂子右合研勻細用熟棗肉和丸如菉豆大每服五丸至七丸量兒大小加減並用荆芥薄荷湯下大人虛風痰涎丸如梧桐子大一服七丸至十丸麝香散出聖惠方治小兒慢驚風及天瘹麝香一分細研膩粉一分牛黃一分細研乾蠍一分白附子一分炮製右為細散不計時候以薄荷汁調下一字量兒大小加減服之硃砂散出聖惠方治小兒一臘後月內忽中慢驚風及無辜之候硃砂一分細研牛黃一分細研麝香一分細研乾蠍十四枚微炒雀兒飯甕一十枚麩炒令黃去壳右細研為散不計時候以乳汁調下半錢薄荷湯調下亦得更量兒大小以意加減回生丹出聖惠方治小兒慢驚風痰涎壅悶發歇搐搦天麻一分白附子一分炮製白殭𧖟一分微炒桃膠一分天南星一分炮製右為末以爛飯和丸如黍米大每服以溫薄荷酒下三丸量兒大小加減服之返魂丹出聖惠方治小兒慢驚風及天瘹夜啼蝙蝠一枚去翼腸肚炙燋黃人中白一分細研乾蝎一分微炒麝香一分細研右為細散人中白等同研令勻煉蜜和丸如菉豆大薄荷汁研下三丸大小加減小黑膏一名小黑散出鮑氏方治小兒傷寒發搐慢驚脾風鼻流清涕及傷寒風癎南星三箇燒存性川烏三箇燒存性玄參四錢大薄荷葉四錢右為末鍊蜜和丸如龍眼大每服一丸煎薄荷湯化下蘇沈良方與此同星烏各一箇薄荷玄參各五錢一方作散每服一豆許蜜和䓤白用研細白湯調下如筋脈緩急乳香同蔥白煎湯下羌活丸治小兒慢驚虛困痰涎不利羌活去蘆頭一兩白殭𧖟炒半兩二味搗末硫黃水銀各半分二味結砂子研右為合研勻細鍊蜜和丸如豌豆大四五歲每服二丸三歲以下一丸煎金銀荆芥薄荷湯化下理中湯人參去蘆白术白薑炮甘草炙各等分右為末薑棗煎服手足厥冷加附子炮回陽犀角散出活幼口議治嬰孩小兒因吐㵼神困力乏欲傳作慢驚風候犀角鎊一錢白术二錢水煮過甘草炙半錢陳皮舊者良去白一分右為末每服一錢水一中盞金銀薄荷同煎三五沸通口無時服此方治小兒吐㵼神困力乏欲發慢脾風候正謂救急不可令緩若已傳受即風即熱即驚交相攻作神散不定上竄搐搦悉由脾虛之所致也脾經既虛次第胃虛其藥白术陳皮預理脾胃犀角退熱去風熱既不作痰無由生醒脾壯胃風何得有漸見蘇省兼與醒脾散及既濟丹相間服一向取愈為良其方全不用逐風化痰之藥者蓋是證候欲作慢驚所以未宜先投緊藥故用此方調之和劑一正是其脾氣得無傳變不勞療理簡徑微沙稽首智者作之施功利益而已療痰方出湯氏寶書川烏尖附子尖各七箇生去皮用蝎稍七箇石緑少許右為末和勻用軟雞翎蘸藥入喉中逐旋惹出頻用帕子拭之定吐截風回陽出湯氏寶書金液丹青州白丸子五靈脂一錢青皮末一錢右和劑蒸餅糊丸如黍米大米湯送下大小加減服之丁附湯出危氏方治吐瀉虛脫成慢驚風困而不醒用大附子生或炮製去皮臍銼散每服一錢水一盞生薑五片丁香五粒煎五分更量大小與之急無丁香亦可屢收竒效豆卷散治小兒慢驚多用性大溫及熱藥治之有驚未退而别生熱證者有病愈而熱證者有反為急驚者甚多當問得病幾日又何以得之曽以何藥治之可用解毒無有不效方見本門急慢驚風類蟬蝎散出直指方治方傳慢驚及驚風積熱全蝎七箇去尾尖蟬壳二十一箇甘草二錢半炙天南星一個爐香右為末每服半錢生薑棗煎服積熱加薄荷煎四聖散出直指方治慢驚痰滯虛熱若有竄視搐搦證壯以少許册管吹入鼻中全蝎七箇直殭𧖟十四箇天南星七錢半真川烏三錢三分并生用右將南星為末水調作餅裹蠶川烏外用溫紙重炮慢火中煨令赤色頓地土上一伏時為末每服煎金銀湯點好茶清少許調下黑附湯出直指方治慢脾風盛四肢厥冷方見本門慢脾風類天南星煎丸出聖惠方治小兒慢驚風天南星一兩細銼水二盞微火熬至半盞去渣重熬成膏白附子半兩炮製天麻一兩乾蝎一分炒右搗羅三味為末入天南星膏內和丸如菉豆大三五歲兒每服二丸薄荷湯下五六歲兒三丸日再服更量兒大小加減不拘時一方無乾蝎又方出聖惠方雀兒飯甕三枚有蟲者白殭𧖟三枚微炒乾蝎三枚微炒右為細末每服以麻黃湯調下一字日三服汗出為效三歲已上即加之玉液丹出聖惠方治小兒慢驚風及天瘹熱疳心驚悸等白附子一分生用赤箭一分白殭𧖟一分生用膩粉一分右以三味搗羅為末入膩粉同研令勻鍊蜜和丸如麻子大二歲兒每服以熟水下三丸三四歲每服五丸日二三服量兒大小以意加減天漿子散出御藥院治小兒慢驚風天漿子有蟲去白殭𧖟炒乾蝎各二十箇炒右為細末每服一字煎麻黃湯調下或薄荷湯下無時日三隨兒大小加減之大有效南星飲出危氏方宣利過多脾困眼慢涎盛四肢不舉不思飲食大南星三箇炒赤令熟冬瓜子仁白扁豆各一兩右為末每服一錢薑二片防風少許煎湯調服川烏散出直指方驅風回陽方見本門慢脾風類附硫丸一名小續命議丸出活幼口治嬰孩小兒慢脾風四肢厥冷方見本門慢脾風類南附湯出危氏方治泄㵼虛脫生風名慢驚風及因服冷藥多者南星生附子二錢全蝎五箇去毒右銼散每服二錢水一盞生薑三片煎五分量大小旋服麻黃散治小兒慢驚風因轉㵼虛極多睡善欠醫所不能療麻黃七節以兒中指節比薄荷全者七葉乾蝎全者一枚右各炒黃色合搗研為細散每服半錢溫薄荷水調下更量兒大小加減服後略以衣被蓋之汗出立瘥麝香餅子治小兒慢驚風涎塞咽喉服利藥過度麝香研膩粉各三錢七分定粉一錢右研令勻細以香墨研濃汁和丸揑如豆大每服一餅薄荷湯化下治小兒慢驚風生菜薄荷荆芥右各等分搗滴汁數點入口滓繫於臍中乳香丸治小兒慢驚風心神悶亂煩懊不安筋脈拘急胃虛蠱動反折啼呌乳香盞子內鎔過研半錢胡粉一分右合研勻細用白頸蚯蚓生揑去土爛研和就為丸如麻子大每服七丸至十五丸煎蔥白湯下更量兒大小加減治小兒慢驚百藥不效者及驚風手足搐搦涎潮上壅一名烏頭丸出醫方集成大川烏頭去皮臍生用全蝎各等分右㕮咀每服半兩水兩大碗生薑五十片煎至三四分去渣逐旋以藥注灌之董陸香丸出御藥院治小兒虛風慢驚潮搐瘈瘲安魂益心氣血竭半兩乳香二錢半右同研細末用火上炙極乾時滴水丸如酸棗大每服一丸薄荷酒化下不計時候如夏月嬰兒患此證為細末薄荷人參湯調下不拘時候天王散出全嬰方治小兒吐㵼或悮服冷藥脾虛生風成慢用南星一箇重八九錢已上取地坑子深三寸炭火五斤燒通赤入好酒半盞然後以入南星却用炭三兩條蓋却坑子候南星微裂取出銼碎再炒熟為末用半兩天麻一錢麝香一字和拌三歲半錢生薑防風湯調下亦治咳嗽惡心不食七寶妙砂丹出活幼口議治嬰孩小兒慢驚風及慢脾利疾竒效須以木香佐之其候神情昏睡膈上有虛痰不能得化不可服巴豆輕粉恐動臟腑只將神仙所留妙方與服其痰須臾自下良久神情已定眼目微開漸與溫平藥調理胃氣兼順理驚風藥與服勿更攻繫其方乃一文開元通寶銅錢名七寶妙砂丹開元錢樣其錢背上下有兩月子只有一箇月子者不用錢色淡黑小於諸錢將錢頓鐵匙頭於炭火內燒霎時羅上下各出黃白珠子遍匙都是將出候冷傾放茶盞中入硃砂末少許只作一服煎金銀薄荷湯送多收此錢準備緩急或先燒成硃子收拾亦得此方墜下小兒虛痰别無他者用之乃保十全功效一方用南木香煎湯送下或人參湯下調治嬰孩小兒慢驚風候無過前件藥對證尅效須審慢脾已傳未傳之理其兒眼開未合尚有慢驚腳手不冷之時未可便與回陽且與七寶妙砂丹一二服眼合沉困隂證極盛者方可與服回陽醒脾湯劑手足漸暖仍與觀音全蝎散兼服凡慢脾風候最為惡證只可前方調治雖曰病在緊急不得夾雜用藥泛泛為之總屬無益枉勞其功虛延其候此疾傳隂陽虛隂盛如燈無油只見次第蛻去若不助陽生胃只知截風去驚兒疾轉見增重且兒隂證未至十分與藥如太寒涼攻得隂重虧難以救療也若扶其陽氣隨隂而化所謂制之於未然醫慢脾風證候如其所述用藥由可救活若鄙夫意見不同難以省活嗟哉羌活膏出錢氏方治脾胃虛肝氣熱盛生風取轉過或吐㵼後為慢驚者亦治傷寒用無不效羌活去蘆頭川芎人參切去蘆頭白附子炮赤茯苓去皮各半兩天麻一兩乾蝎焙去毒白蠶酒浸炒黃方可用白花蛇酒浸肉焙乾取用各一錢川附子焙去皮臍防風去蘆頭切焙肉豆蔲麻黃去節各二錢雞舌香即母丁香藿香葉沉香木香各二錢輕粉一字真珠末牛黃各錢半龍腦半字麝香一錢半雄黃一錢辰硃一錢已上七味各别研入右為細末熱蜜和劑旋丸大豆大每服一二丸食前薄荷湯或麥門冬湯化下實熱急驚勿服性溫故也服不拘時古今論雞舌香者同異紛紛或以為畨棗核或以為母丁香互相排抵竟無定説忠孝以謂最為易辨所以久無定説者或於其名耳古人論藥多以其形似者名之如烏頭狗脊鶴蝨之類是也畨棗核母丁香本二物以其皆似雞舌故名邇同况藥物名同實異如金櫻地歸之類不足怪也如雞舌香二種各有主療番棗核者得於乳香中今治瘡疥藥多用之母丁香即丁香之老者極芳烈古人含雞舌者乃此類也今治溫中藥多用之所謂最為易解者青金丸一名二神丹出續易簡方用青州白丸子金液丹等分同研為細末麵糊和丸如黍米大量兒大小服二十丸至三十丸薑湯下一方用泡蒸餅糊為丸如菉豆大溫熱水下未能咽者青米飲調服如痰多者加白丸子末瀉多者加金液丹末證候退即以六神散調補小兒胸膈痰喘吐逆欲生風者及作泄㵼並皆治之陳米飲下麝香六神膏出楊氏家藏方治小兒慢驚潮作口噤不如手足瘈瘲發歇無時麝香一字别研白花蛇頭一枚酒浸一宿烏蛇尾五寸酒浸一宿全蝎七枚去毒炒焦蜈蚣一條塗酥炙焦棘剛子七條去壳取蟲微炒右件為細末鍊蜜和丸每一兩作四十丸每服一丸煎人參麻黃湯化下不拘時候香蠶散出楊氏家藏方治小兒慢驚涎盛口噤昏塞項背強直手足搐搦進退不定睡卧多驚白附子一兩炮天麻全蝎去毒微炒白殭𧖟炒去絲嘴天南星炮裂人參去蘆頭附子去皮臍各二兩甘草炙黃硃砂别研釣􅀈各一錢腦子一字别研麝香一字别研右為細末半歲兒每服一字一歲兒服半錢煎荆芥湯下不拘時雀甕散出楊氏家藏方治小兒慢驚潮搐口眼相引目睛上視頭項偃折痰涎壅閉神志昏憒棘剛子十枚去蟲微炒全蝎三十枚去毒炒萆麻子二十枚去皮研石榴一枚大者去子盛前三味藥在內用黃泥裹作毬慢火煨乾燒赤候聞藥氣透出候全紅熟取出去泥細研次入沒藥白殭𧖟炒去絲嘴天南星炮半夏湯浸七遍去滑白附子炮四味各一分乳香一錢别用右件後四味為細末次入乳香并燒者藥同研勻半歲兒每服一字一歲兒服半錢煎荆芥薄荷湯入酒兩三點同調下不拘時候截驚散出楊氏家藏方治小兒慢驚潮搐目聵斜視口眼牽引牙關緊急胎風胎癎悉皆治之麻黃去根節稱一錢麝香一錢别研烏蛇頭一枚酒浸焙乾蜈蚣一條塗酥炙焦全蝎一錢去毒微炒川烏頭一分炮去皮臍右件為細末次入麝香研勻半歲兒每服一字周歲兒服半錢煎荆芥湯調下不拘時候加減定命丹出楊氏家藏方治小兒慢驚瘈瘲目睛斜視身體強硬昏塞如醉及治胎風成癎發歇不定荏苒經時蟾酥酒浸一宿牛黃别研硃砂别研甘草炙黃胡黃連麝香别研使君子肉犀角屑當歸洗焙天麻細松煙墨燒灰煙盡地上去火毒羌活去蘆頭十二味各一字全蝎二枚去毒微炒棘剛子五枚去殼取蟲微炒半夏湯洗七遍天南星牛膽製者附子炮去皮臍虎骨蘸酒酥炙烏蛇酒浸一宿取肉炙乾乾薑炮丁香沉香肉桂去粗皮人參去蘆頭白茯苓去皮肉豆蔲麵裹煨熟去麵白术已上十三味各一錢右為細末煮粟米粥和丸如黍米大青黛為衣每服十丸荆芥湯下不拘時候桃仁方出王氏博濟方治小兒慢驚墜涎安蟲其狀多因久患脾胃虛弱風邪中入而作此候緑礬一兩半赤腳烏半兩右二味同研為細末稠麵糊為丸如菉豆大每服溫米湯下三丸次喫補虛丸新羅白附子一兩湯泡去皮大半夏一兩右二味各用白湯浸三日每日換水三度取出焙乾為末以生薑自然汁著兩錢薑末煮糊和為丸如菉豆大每服三丸溫粟米湯飲下醒脾散出朱氏焦驗方治慢驚吐㵼不止肉豆蔲檳榔各一箇胡椒二十四粒茯苓二錢木香藿香各一錢右為末每服一錢用水一盞煎溫服麝香餅子出楊氏家藏方治小兒吐㵼之後內虛生風成慢驚涎潮搐搦頭項反折精神昏困全蝎二十一枚每一枚用薄荷二葉褁定先以生薑搗汁浸軟麻黃逐枚以麻黃纒定却蘸薑汁於慢火上炙令麻黃黃色又蘸薑汁炙如此三遍焙乾用乳香别研雄黃别研白花蛇酒浸取肉焙乾天南星炮裂入生薑汁內浸一宿切焙乾用烏蛇尾酒浸取肉白殭𧖟炒去絲嘴附子一枚炮去臍尖取末已上八味各三錢麝香半錢焙乾右件為細末次入研者藥和勻别用天南星一兩調生薑汁煮糊與前藥和丸如梧桐子大揑作餅子略見日色隂乾每服一餅子煎荆芥湯化下不拘時候補脾益真散湯宿州陳氏方治小兒胎稟怯弱外實裏虛因嘔吐乳妳糞便青色而成因癎俗曰慢驚風氣逆涎稠眼珠直視四肢抽掣或因變蒸客忤而所作或因持拖驚嚇而所作或因悮服鎮心寒涼藥而所作此藥但溫而不燥木香當歸去蘆人參去蘆黃茋丁香訶子肉陳皮去瓤厚朴薑製甘草肉豆蔲草果茯苓去皮白术官桂不見火半夏薑製附子炮已上一十六味各半兩全蝎去毒一服加一枚右各修製為㕮咀每服三錢重水一盞半生薑一片肥棗一枚煎至六分去柤稍熱服壯飢時服訖揉動心腹以助藥力後方可乳食渴者加茯苓去附子人參丁香甘草肉豆蔲㵼者加丁香訶子肉嘔吐加丁香半夏陳皮腹痛加厚朴良薑腹脹加厚朴丁香前胡枳殼咳嗽加前胡去附子半夏肉豆蔲官桂草果痰喘加前胡去附子枳實肉豆蔲赤茯苓丁香草果氣逆不下加前胡去當歸枳實檳榔附子惡風自汗加官桂黃芪足冷加附子丁香厚朴已上增藥與正方分兩同又方出百一選方用正生大附子去皮臍生為末以白項蚯蚓令於藥末內衮候定刮蚯蚓上附子為丸如黃米大每服十丸溫米飲下八仙散傅氏活嬰治一切身冷瘈瘲四肢弱吐㵼不食精神困慢靣色青黑不省人事天麻一錢熱湯泡洗人參一錢白术一錢白茯苓一錢半御米一錢炒乾油糯米薑汁浸七次扁豆一錢炒陳皮一錢蓮肉去心一錢藿香一錢甘草一錢炒右為細末如常用調氣只用鹽湯下或鹽米飲下如吐㵼霜梅湯下慢驚者冬瓜仁陳皮煎湯下入鹽少許不拘時候羌活勾藤散傅氏活嬰治慢驚風可與宣風散八仙散相間服勾藤二錢蟬蛻三錢洗防風三錢人參一錢天麻一錢蝎稍半錢川芎一錢麝香一字右為細末每服一錢用薄荷湯調服溫茶清湯亦得不計時候普濟方卷三百七十一
