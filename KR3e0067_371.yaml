body:
  text: 普濟方卷三百七十一明周王朱橚撰嬰孩驚風門慢驚風附論夫慢驚因病後或吐瀉脾虛胃損遍身冷口鼻氣出亦冷手足瘈瘲昏睡露睛此無陽也惟括樓湯主之錢氏曰無陽可用括樓湯內用括樓根白甘遂按本草括樓根味苦寒無毒主心渴身熱甘遂味苦甘大寒有毒主腹滿靣目浮腫留飲宿食又曰驚急合涼㵼慢驚合溫補錢氏云急驚涼㵼慢驚溫補今同括樓湯寒毒之藥又無溫補為佐首尾亦無補助兼主對不親如此治之怪也經曰實實虛虛損不足益有餘有如此者醫殺之慢驚虛病寒毒之藥甚戾人正合難經虛虛之論乃錢氏之非也愚常治此病以神寶丹寬筋湯治之多愈錢氏方脈議論優長甚為可取其間如治慢驚法用括樓湯隂癎壞病內亦用此方錢豈不知括樓湯反為害也觀其智識必不如是儻有此説但取其所長略其所短庶幾不悮耳徐仲秀子三嵗七月中因傷乳食嘔吐數次而後作㵼召一醫視之三日不退加之眼露後因囟陷氣粗靣白形青虛煩腹痛忽發驚風進退召愚視曰此子雖是慢驚法當斷乳三日頻與稀粥服藥可安主人曰小兒以乳妳為本豈可即遽然捨乳也答曰舟非水不能行然波濤沸湧則有覆舟之患兒非乳不養然吐㵼過傷則有傾人之患波濤非自生其所以生者風鼓不平之勢作之也吐瀉非自生其所以生者風冷乳食之傷引之也風息則水勢平乳少則吐瀉安善行舟者不懼波濤而懼舟之不固善為醫者不懼吐瀉而懼乳之不節蓋乳猶水也水能載舟亦能覆舟此之謂也始因傷乳為病若以所傷之乳乳之如以酒解醉轉加昏憒固能節乳使藥速驗也主人乃聼用神寶丹續命湯安神膏日各三服頻與稀粥至夜驚再不潮翌日噯哺尚困是中脘有食脾胃有風主人曰何以知也答曰噯者是有食困者是有風當用宣風散汁用下紫丸子令微利再用神寶丹安神膏琥珀散日各二服調治三日時與止妳至五日全安主人曰慢驚風何敢快生答曰病雖至困形青而不昏肚痛而手足常溫驚搐無痰喘氣而微熱是胃氣未脫經曰胃者水榖之海主稟四時故皆以胃氣為本此子病雖至困胃氣尚未脫可以復生也蘇氏子半年自生下時復觀乳一月吐而身熱召愚視曰心者精神之本清虛不欲昏不可昧昏昧則氣濁氣濁則神亂神亂則血脈不榮今者血脈俱虛精神離散不可治主人曰何便不治答曰緣見兒目解而囟腫面白而唇青兼繞口鼻人中肉內隱出黑色是精神散失素問云得神者昌失神者亡設或苟安猶若輕漚浮水暫駐目前亦豈宜久微燭乘風其不亡者何待主人大怒後易數醫果驚而卒大便青臟冷也或初出微黃良久則青者亦然也靈祕云瀉下如藍澱胎中受積驚蓋惟心主驚心驚則膽怯膽者與肝為表裏也膽怯則肝冷肝傳脾受邪故大便初出微黃脾之色也良久後青肝之本色肝熱則外發目赤肝冷則內作便青又有不因驚而得此證者蓋稟胎氣怯弱內受風寒故也有便青夾白膿稠粘如涎者亦是腸寒久冷令小兒面白形青腹痛驚啼失治則變隂癎也凡慢驚風候若是急驚傳來而尚陽證其陽即虧不必回陽又不待治陽只可截風而調胃均平隂陽可冷可熱可緩可急是也若直便為服附子硫黃之屬使陽歸陽又是急驚學者理宜知之既治陽證傳作隂證即與服保命丹三二服兼前牛黃清心丸子其有四證具八候稍緩隂癎者即可與服之若已傳過八候不作四證尚在者只宜與服定命飲子若腳手氷冷者乃四逆候方可回陽次第合眼者即傳作慢脾風候寒而驚風痰涎壅盛搐搦不止不可下者宜與五靈脂丸其痰涎壅盛口角垂者白薑丸功效驚風搐搦身體雖暖風痰不化宜服天南星丸嬰孩所受此等證候無他疑者只將下項用藥無不蘇省切不可延久其陽易脫隂氣漸盛藥力不及使人難治又不可一向連併投藥每次一二服了須審察證候緩急有無傳變稍覺寬定其藥放慢或勢漸緊宜以次苐緊急藥與服不可執滯一藥又不便換湯餌連併與之所謂察其輕重審其進止而後已慢驚若是急傳來是知前人不曽截風定搐陽脫而傳隂隂重陽虧其風與熱常流注經絡又有曽服大寒涼之藥過多又有下積取瀉致作又有臟腑虛寒洞㵼而為其所受多端理慢驚風當知隂癎之説其證屬隂臟寒氣虛尚或泄㵼不止其驚正作多因無識之人一向治驚更不理㵼藥用寒涼投之令氣愈虛泄㵼不止隂證愈作驚搐愈增若用止瀉藥稍熱八候復加四證不退慢驚雖曰難治蓋醫亦不曽究竟病作加進深為重害慢驚當察知所視為要眼睛昏定為重竄視為重四肢厥冷為重睛定不眨為重雖眨不左右顧為重汗出如流亦重口靣忽作黔黯色至重感風搐搦慢驚眼在半開半合之間者乃知隂氣漸盛傳入臟間陽氣已虧脾經屬隂次苐入脾故言慢脾風候醫慢驚與急驚風候自是不同未可一向下定搐藥急驚謂關竅不通故以腦子麝香等藥通利定其搐搦慢風隂重陽虧諸經已虛不宜通關又涼其臟易作慢脾風醫慢驚不可爭攻急驚陽癎稍易理慢驚隂證最難服藥已愈而尚虛乏未省三五日之間者有之俗謂過街候發無定論不可輕易妄投攻擊之劑則前功俱喪慢驚所治之理須究問原因所發若是急驚傳隂為慢驚者乃癎所作隂癎也當察陽子為重即陽脫而隂盛小兒有長幼之别臟腑有虛實之分有㵼三五次便成風候乃由虛之甚也或二三日泄方成風候或有五七日㵼不止而成風候暴㵼成風猶可速治蓋回陽調中補氣之為易若久㵼漸傳成風候者為虛為乏故難療理嬰孩小兒洞泄成風以補藥治之者宜用附子臟寒洞泄或因服藥下積取㵼成風宜以溫脾壯氣藥調之宜服觀音全蝎散有服寒涼藥成風者下藥太涼致令臟腑先寒遇發藥吐㵼即傳成風候以助氣醒脾藥溫之即王氏大惺惺丸大喝起散與服之效若手足冷回陽宜术附湯效陽癎傳作隂癎候急驚傳作慢驚風候以截風藥定搐藥若在前三者慢驚候便以截風往往未為當蓋由病自虛乏得之所以云調補之理慢驚之候其意在慢治急驚之候其意在急何也蓋急無過因熱生風作驚跌撲作驚他物觸之作驚驚熱傳極即變生風搐搦等候皆熱所乘若順證依法下之諸候自息慢驚所作不常當宜省察用意子細所療至為難以故宜消息之為慢也不可愴惶恐懼非失治躊躇疑二之為慢也又曰慢驚無爭攻蓋所療至為難事嬰孩所患急驚慢驚慢脾三者皆由風痰所作以漸傳及未有初得病而便慢脾者或急驚傳來或吐㵼而得或久痢氣虛脫而得傷寒表裏既虛傳入隂證亦成慢候久嗽成癎亦傳慢驚候霍亂吐痢亦傳慢候脾困久睡亦傳慢候吐血亦傳慢候蟲積衝心亦傳慢候肝風筋急大小便閉心虛煩躁煩渴引飲肚腹㽱痛睡裏咬牙日夜汗出走馬疳急諸般丹毒龍纒腰膀胱吊疝卵腫莖曲四體浮腫以上諸般證亦皆傳慢候有如此者其所患諸疾皆能傳作慢驚乃傳作慢脾脾氣既絶胃氣已盡無可得而治療也嬰兒五臟易冷易熱易虛易實醫方並不治腑受病曰臟不病耳曰非也小兒在腑有疾自息愈者有之在臟不可不治臟者隂屬腑者陽屬謂小兒先隂而後陽又曰小兒乃純陽之氣在腑則順在臟則逆故前賢皆理其臟未言治腑也又腎一臟常主虛不可攻療若有腎病但清心肺緣心與腎即既濟也肺與腎乃子母也無與腎藥及諸補藥若治腎臟即他病發生故戒止不可療湯氏云吐㵼才生便惡心胃虛脾弱汗相侵舌赤唇緋雙眼閉頭搖髮竪起如針膈悶氣粗兩脅動口生瘡白命難任未生此證宜先治有瘡胃閉命須沉未發慢脾先要困睡中吐舌更搖頭吐妳作腥生氣息額頭千顆汗珠流睡裏多驚驚哭起面黃脈細最堪憂腥脾助胃成切效傷妳依前命也休凡有此疾宜暫斷乳控令胃乾飢甚當用藥令藥乳母釀其乳與之十救一二矣全嬰簡易方云驚風似是而非若同而異受證非一治法不同此病之惑人也醫者當首辨明而治之宿州陳氏田曰驚風二證驚自驚急驚慢脾也風自風五臟中風也當分别治之世言熱極生風而不知風寒暑濕之氣亦能生風錢伸陽云傷風傷寒傷食麻豆變兼等候亦能搐所謂斷搐者是也陳氏曰醫者每見小兒發搐不辨是否驚風用蜈蚣腦麝牛黃巴粉等寒涼毒劑多致夭傷或成慢候蓋真氣者元陽也如用藥性溫則固養元陽用藥性冷則敗傷真氣宜用溫涼之劑則無過與不及楊氏曰驚風暴烈惟蜈蚣能截能擒貴乎藥病相當辨認的是驚風之證方可用之或一字半字而止或傷風等證假搐不可妄投中毒非淺或有誤焉急以桑白皮蚯蚓為解錢氏湯氏胡氏楊氏辨云傷風傷寒熱盛生驚必有傷風傷寒之證但牙關不緊麻豆搐乃熱乘於心心火炎上故目瞪上竄乃痘證欲出之狀必中指冷耳後紅繡乃四臟之證但無痰潮食積發搐必有靣黃吐利夜熱晝涼等證變兼微搐但唇上白珠生蝄厥多似慢驚但唇口紫吐清涎癎者四肢柔軟發而時醒痓痙一身強直終日不醒痙則舉身強直痓則手足氷冷剛痓有汗柔痙無汗中風口眼喎斜必有五臟中風之證天吊或啼或哭狀似鬼祟頭目仰視如魚上釣內吊傴僂返張唇黑隂腫眼有紅筋班血客忤物忤中惡面變易五色狀似驚癎但目不上視楊氏曰慢驚無熱乃虛熱也當用藥以溫之又曰才經吐痢便是慢驚由虛使之須用溫中扶裏抑隂助陽用理中湯加木香錢氏云夏月脾胃伏熱當解暑毒不可便曰回陽楊氏曰方傳慢驚尚有八候竄視反引搐搦掣顫也但昏沉者不可回陽宜調胃截驚可涼可熱均平隂陽而已用全蝎觀音散又曰若陽虛隂盛病已傳過無搐掣反視之證昏沉者用四君子湯加附子三分之重者對加又曰手足氷冷方可回陽用附子理中湯慢驚下痰用蘇合香丸白丸子又曰若眼半合半開手足不冷不可回陽其證尚在慢驚用調中湯參苓白术散或用實脾散楊氏截驚用太乙保生丹或用奪命丹桞氏曰凡吐㵼氣虛體弱者調胃用實脾散便服奪命丹以截其驚方實脾散治脾胃虛冷吐痢不止不進乳食慢驚脾等證及治痘證下痢不能收靨人參白术白茯苓縮砂仁各五錢丁香二錢木香炮二錢麥芽石蓮肉麯餅陳皮去白山藥良薑油炒青皮去白冬瓜仁各五錢肉豆䓻三箇煨薏苡薑炒三錢扁豆薑炒三錢香附子炒去毛三分甘草炙三錢陳米一撮炒右為細末常服棗湯調或米湯燒鹽調服吐痢脾胃虛弱加消積飲同服慢驚脾手足厥冷加附子理中湯同服下回陽丹冷吐痢加附子訶子肉慢驚慢脾研奪命丹同服蘆薈散治小兒慢驚風胸膈痰涎咽喉壅塞身體壯熱筋脈拘急時或發渴蘆薈研龍骨雄黃研麝香研各半分胡黃連青黛研木香丁香牛黃研天竺黃熊膽研乾蝎炒膩粉研丹砂研犀角鎊附子炮製去皮臍人參沉香各一分右搗研為散每服半錢薄荷湯調下牛黃丸治小兒慢驚風及取風涎積聚牛黃細研甘草炙微赤銼陳橘皮湯浸去白瓤焙黃連去鬚天南星炮製白附子炮製附子炮製去皮臍半夏湯洗七遍去滑乾蝎微炒犀角屑􅗠砂細研硃砂細研各一分水銀半兩燒棗瓤一處别研星盡金箔二十片細研硫黃半兩細研麝香半分細研巴豆十枚去心皮殼别研壓去油右為末都研令均以麵糊和丸如黍米大每服以甘草薄荷湯下三丸至五丸烏犀散出聖惠方治小兒慢驚風或發即戴眼向上手足搐搦烏犀角屑一分獨角仙三枚微炙去翅足驢胎耳一分燒灰雀兒飯甕五枚乾蝎一分燒灰白殭𧖟一分微炒硃砂一分細研雄黃一分細研丁香一分𧖟紙一張出子者燒灰麝香一分細研牛黃一分細研羌活半兩青黛一分細研天竺黃一分細研右為散都研令勻不計時候