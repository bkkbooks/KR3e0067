分不計時候去滓熱服之益母草子散出聖惠方治産後惡血腹內㽱痛口乾心痛悶益母草子半兩劉寄奴半兩藝薹子三分微炒肉桂三分去皺皮沒藥半兩當歸半兩銼微炒右搗細羅為散每服二錢以水酒各半鍾煎至五分不計時候和滓熱服琥珀散出聖惠方治産後惡血不散㽱刺腹脅疼痛心膈煩躁虛氣上衝眼見黑花琥珀紅藍花當歸沒藥牛李子蒲黃薑黃赤芍藥莞花醋拌炒令乾桂心各半兩益母草三分延胡索三分右搗細羅為散每服不計時候以熱酒調下一錢立效牛李子散出聖惠方治産後惡血攻心腹㽱痛不可忍牛李子一兩桂心一兩紅藍花蒲黃半兩當歸半兩棕櫚皮二兩炒灰右搗細羅為散每服不計時候以熱酒調下二錢鱉甲當歸散治産後小腹結塊痛不可忍鱉甲醋炙去裙襴三兩當歸切焙桃仁去皮尖雙仁炒京三稜炮銼芍藥桂去粗皮各一兩右為散每服五錢空心溫酒下日再服又方用童子小便調服即醒方見諸氣門氣類妙香散出危氏方用生地黃當歸湯調立效方見心臟門心虛類劉寄奴散出聖惠方治産後惡血衝心不語劉寄奴一兩麝香一分細研當歸銼微炒芎藭桂心牛膝去苗益母草羌活生乾地黃延胡索已上各三分右搗細羅為散研入麝香令勻不計時以溫酒生薑童子小便同調下二錢通神散出聖惠方治産後敗血衝心蒲黃一兩肉桂一兩去皺皮當歸半兩銼微炒延胡索半兩碙砂一分琥珀半兩右搗細羅為散不計時候以溫酒調下二錢烏金散出聖惠方治産後惡血攻衝心腹疼痛好墨梁上塵釜下墨豬胎衣赤鯉魚鱗已上各一兩右都燒為灰入麝香一錢同研令細每服不計時候以熱酒調下二錢烏金散出聖惠方治産後惡血不盡衝心痛氣促煩亂赤鯉魚鱗三兩燒灰棕櫚三兩燒灰竈底墨一兩釜底墨一兩亂髮三兩燒灰已上五味入瓷瓶內密固濟候乾以炭燒須令通赤候冷取出細研入後藥虻蟲三分去翅足微炒水蛭三分微炒麒麟竭一兩麝香一分細研當歸半兩銼微炒桂心右搗細羅為散都杵令勻不計時候溫服生薑酒調下一錢或生薑童子小便調下亦得烏金散出聖惠方治産後敗血衝心疼痛面青手足冷赤鯉魚皮二兩室女頭髮二兩伏龍肝一兩臘月豬脂水蛭一兩香墨一兩已上六味入瓷瓶內用鹽泥固濟候泥透乾用炭火再煆令通赤候冷取出細研入後藥桂心一兩當歸一兩銼微炒麝香一兩細研右搗細羅為散入前燒了藥同研令勻細每服以豆淋酒調下一錢鱣魚散出聖惠方治産後惡血不散衝心痛鱣魚二兩亂髮一兩皂莢一挺長七八寸者為佳剛砂一兩香墨半兩穿山甲一兩半右研細入瓷瓶內用泥固濟候乾用炭火燒須令通赤待冷取出入麝香一分同研令極細每服不計時候用紅藍花湯調下一錢玳瑁散出聖惠方治産後敗血衝心暈絶玳瑁屑延胡索當歸銼微炒赤鯉魚鱗燒灰麝香細研三分琥珀牡丹益母草子水蛭炒令黃香墨各半兩右搗細羅為散入研了藥令勻每服不計時候以溫酒調下一錢又方用兔頭炙令熱以慰産婦腹如刀絞痛者尉之立效治痛不可忍取苦瓠蘆未經開者腹攪痛即開去子訖以沸驗酢投中蒸熱隨痛即令尉冷即換之甚妙吳茱茰散出千金方治産後血氣不利心腹疼痛或寒或熱或時吐吐後氣乏力倦及治婦人先有寒冷胸滿痛食少或腫或下利氣息綿惙欲絶者皆主之吳茱茰湯浸微炒一兩防風去義桔梗炒甘草炙乾薑炮製銼細辛去苖葉各半兩生乾地黃焙當歸切炒各三分右粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時候療血氣痛欲絶出大全良方用槐雞為末酒濃煎頓服立效大黃乾漆湯出千金方治新産後有血腹中切痛大黃乾漆乾地黃桂心乾薑各二兩右㕮咀以水三升清酒五升煮取三升去滓溫服一升血當下若仍不差明旦服一升日二服病無不瘥四神散一名芎歸散出和劑方治産育後留血不消積聚作塊急切疼痛猶如遁口心腹絞痛不利當歸芍藥川芎乾薑炮各等分右為末每服方寸匕溫酒調下日三服治婦人血氣痛乾薑赤石脂右為末醋為丸每服五十丸淡醋湯下立效赤龍鱗散出聖惠方治産後惡血衝心石灰二兩打碎赤鯉魚鱗五兩乾藕節四兩亂髮敗蒲二兩棕櫚皮二兩紅藍花一兩芫花一兩右都入瓷瓶子內使鹽泥固濟候乾以摶坯蓋頭再用炭火半稱煆之如人行一二里還來其初青煙出後白煙出經一宿冷取出搗羅細為散加麝香一分同研令細每服以溫酒調下一錢如人行三五里再服其惡血自下穿山甲散出聖惠方治産後惡血在腹中㽱痛不可忍穿山甲一兩兒孩子頭髮一兩十嵗已下佳乾漆一兩紅藍花子一兩赤鯉魚鱗二兩竈突墨二兩右都入於瓷瓶內以瓦子封口用鹽泥固濟於蓋上開一竅以大火燒令煙出白色住火候冷取出細研為散不計時候以熱酒下一錢烏鴉散出聖惠方治産後惡血腹中㽱痛臘月烏鴉一隻去毛爪赤鯉魚鱗一兩桑木耳一兩童子頭髮一兩香墨半兩碙砂一兩右都入一瓷瓶子內以六一泥固濟曝乾先用文火煙出後以武火煆稍時待冷取出搗細羅為散研入麝香一分每服不計時候以熱酒調下二錢烏金散出聖惠方治産後惡血攻心腹㽱痛赤鯉魚鱗二兩兔頭二兩亂髮一兩棕櫚一兩乾漆一兩虻蟲半兩去翅足水蛭半兩狗膽三枚香墨一兩右都入一瓷瓶子內密固濟候乾用炭火燒須令通赤待冷取出搗細羅為散研入麝香一分每服不計時候以生薑溫酒調一錢黑神散出聖惠方治産後一切惡血㽱刺腹內疼痛及發渴煩熱生乾地黃鳥巢子檞葉棕櫚皮一斤好墨一挺童子髮四兩右都入罐子中以泥封固令乾了以炭火燒須令通赤慢去火候冷取出搗細羅為散不計時候以熱酒調下二錢當歸散出聖惠方治産後惡血不散攻心腹㽱痛當歸三分銼微炒赤芍藥一兩劉寄奴半兩芎藭三分紅藍花三分桂心半兩延胡索半兩沒藥半兩右搗細羅為散不計時候以熱酒調下二錢碙砂九出聖惠方治産後惡血凝結不散刺腹脅㽱痛碙砂細研當歸銼微炒乾薑炮製銼沒藥芫花醋拌微炒蓬莪荗各一兩右搗細羅為散研入碙砂令勻在狗膽中以繩子繫懸在竈後令乾取出更研以醋煮麵糊和丸如菉豆大不計時候以熱酒當歸酒下五丸沒藥丸出聖惠方治産後惡血攻刺腹內撮撮疼痛宜服利經脈止疼痛沒藥一兩肉桂三分去皺皮當歸銼微炒芫花醋拌炒令乾地黃炒令黃五靈脂乾漆搗碎抄煙出蒲黃各半兩右搗羅為末以醋麵糊和丸如梧桐子大不計時候以酒調下十丸菴䕡子丸出聖惠方治積聚惡血攻刺心腹及兩脅㽱痛菴䕡子延胡索肉桂去皺皮當歸微炒五靈脂沒藥各一兩乾漆搗碎炒令煙出牡丹神麯微銼各半兩右搗羅為末以醋煮麵糊為丸如梧桐子大不計時候煎生薑醋湯下二十丸溫酒下亦得碙砂丸出聖惠方治産後惡血氣腹中㽱刺疼痛碙砂半兩細研沒藥一分木香一兩桂心半兩當歸半兩銼微炒右搗羅為末研入碙砂令勻以醋煮麵糊和為丸如梧桐子大不計時候以生薑酒下十丸紅藍花湯出聖惠方治産後腹臟有惡血結滯㽱刺疼痛紅藍花半兩麒麟竭半兩碙砂一兩細研當歸一兩銼微炒赤鯉魚鱗一兩燒灰青蛙一枚去腹肚炙令焦色桂心一兩右搗羅為末先以醋五升於石鍋內煎令沸入諸藥末一同煎如膏取出於瓷合內盛不計時候以溫酒下一茶匙芫花丸出聖惠方治産後腹有積冷惡血凝滯攻衝心腹㽱痛不可忍芫花二兩别搗末當歸一兩銼微炒碙砂一兩細研蓬莪荗三分桂心半兩川大黃一兩銼微炒右搗羅為末以醋一升熬芫花成膏入諸藥末和為丸如梧桐子大不計時候以醋湯下七丸治産後惡血積聚攻刺心腹疼痛方出聖惠方碙砂一兩乳香一兩右都研令細用酒一升白蜜二兩攪拌令勻於銀石器內以慢火熬成膏不計時候以暖酒調下半匙治産後惡血㽱痛極甚者方出聖惠方芫花一兩醋拌炒令黑竈突墨一兩右同研令細以煮麯末和丸如菉豆大不計時候以溫酒調下五丸又方出聖惠方用牛膝一兩半去苗以酒一大盞半煎至一盞去滓不計時候分溫三服又方出聖惠方用羌活一兩銼以酒一大盞煎至七分去滓分溫二服又方出聖惠方用吳茱萸一分湯浸七遍焙乾微炒以酒一大盞煎至六分去滓溫服二次普濟方卷三百四十八
