body:
  text: 普濟方卷二百三十九明周王朱橚撰諸蟲門諸蟲附論夫人腹中有屍蟲此物與人俱生而為人大害屍蟲之形狀似大馬尾或如薄筋依脾而居乃有頭尾皆長三寸又有九蟲一曰伏蟲長四分二曰蝤蟲長一尺三曰白蟲長一寸四曰肉蟲狀如爛杏五曰肺蟲狀如蠶六曰胃蟲狀如蝦蟇七曰弱蟲狀如𤓰瓣八曰赤蟲狀如生肉九曰蟯蟲至細㣲形如菜蟲伏蟲則羣蟲之主也蝤蟲貫心殺人白蟲相生子孫轉多其母轉大長至四五丈亦能殺人肉蟲令人煩滿肺蟲令人咳𠻳胃蟲令人嘔吐胃逆喜噦弱蟲又名膈蟲令人多唾赤蟲令人腸鳴蟯蝤居胴腸之間多則為痔劇則為癩因人瘡痍即生諸癰疽癬瘻瘑疥齲蟲無所不為人亦不必盡有有亦不必盡多或偏有或偏無頽婦人常多其蟲凶惡人之極患也常以白鹽草沐浴佳根葉皆可用既是香草且屍蟲所畏也凡欲服補藥及諸病皆湏去諸蟲并疾飲宿醉醒後除盡方可服補凡得傷寒及天行熱病腹中有熱又人食少腸胃空虚三蟲行作求食蝕人五臟及下部若齒斷無色舌上盡白甚者唇裏有瘡四肢沉重芴芴喜睡當數㸔其上唇内有瘡唾血唇内有粟瘡者心内懊憹痛悶此蟲在上蝕也九蟲皆由臟腑不實脾胃俱虚雜食生冷甘肥油膩醎等物莭宣不時腐敗停滯所以發動又神志不舒精魂失守及五臟勞熱又病餘毒氣血積欝而生或食果蓏與畜獸内藏遺留諸蟲子類而生蟲之為候嘔惡吐涎口出清水痛有去来乍作乍止寸白蟲色白形褊損人精氣力乏腰疼蟯蟲細如菜蟲能為痔痿瘡癩疥癬癰疽等患寸白蟯蟲是三者皆九蟲數中之一物也外此有兒童疳􅉶昏睡煩燥鼻爛汁臭齒齦生瘡下痢黒血蟲食下部為狐下唇有瘡蟲食其臟為上唇有瘡三蟲者為長蟲蟯也乃有九種而蟯蟲及寸白人多病之寸白從食牛肉飲白酒所成相連一尺則殺人服藥下之湏結裏潰然出盡乃佳若斷者相生未已更宜速除之蟯蟲多是小兒患之大人亦有其病令人心痛清朝口吐汁煩燥則虚弱而動或因食甘肥而動其發動則腹中痛發作種聚行来上下痛有休息亦攻心痛腹中熱口喜吐涎及吐清水貫傷心者則死診其脉中痛其脉法當沉弱弦今反洪而大則煙蟲也方鹤蝨丸出聖恵方治積年常患諸蟲心痛吐水不能食鶴蝨附子狼牙㯽榔乾漆搗碎炒令煙出白术甘草陳橘皮已上各一兩吳茱茰三分湯浸乾姜三分狼毒一兩半右為末煉蜜和搗三二百杵丸如梧桐子大不計時候以粥飲下十五丸木香㯽榔丸殺下諸蟲鷄心㯽榔一兩木香鶴蝨貫衆錫灰乾漆使君子輕粉二錢雷丸巴豆各二錢半右為細末飛白麵糊丸麻子大毎服二十粒五更粥飲下或菖蒲石榴根煎湯下蝦蟇丸出直指方殺蟲大蝦蟇乾木香鷄心㯽榔貫衆桃仁苦楝根各三錢酸石榴根皮三錢蕪荑二錢鶴蝨二錢巴豆肉二錢半右為細末糯米粉糊研丸麻子大毎服十丸五更石菖蒲煎湯下碓砂丸出直指方殺諸蟲鶴蝨蕪荑乾漆殭蚕各三錢貫衆酸石榴根皮晒乾各半兩硃砂雄黄雷丸甘遂各一錢半右為細末粳米粉糊丸麻子大毎服十丸五更粥飲下木香三稜散出瑞竹堂方治腹中有蟲面色痿黄一切積滯黑牽牛大腹子㯽榔雷丸錫灰三稜蓬术木香大黄已上各一兩右為末毎服三錢空心用蜜水調下或沙糖水亦可湏先將燒肉一片口半嚼之休嚥下吐出口中血汁後服藥取蟲積㯽榔半斤牽牛雷丸三稜二兩蓬术二兩苦楝皮一兩大黄四兩皂角半斤隨意加木香右為末煎皂角膏子打糊丸如香黍大每服二錢四更時分冷茶清下小兒一錢下蟲白粥補大效追蟲丸雷丸一兩白蕪荑一兩㯽榔一兩使君子肉半兩白术半兩黑牽牛一兩大黄錦一當歸一兩右為末不可見火用麵糊為丸如桐子肉大每服三十丸小兒七丸或三丸量人虚實勞症桞桃頭湯五更下小兒沙糖空心下諸雜病薑湯送下勝金丸治蟲動心痛不可忍貫衆白殭蠶蕪荑乾漆㯽榔桂各一兩厚朴一兩半雷丸右為末煉蜜丸梧桐子大毎服十五丸空心食前温漿水下初服三五日取下諸蟲乃效若蟲多即服藥十以上曰方騐鶴蝨散治取男子婦人腹内諸積蟲積無時攻心疼痛及口中及大便時有蟲者服之立效雷丸鶴蝨黑狗骨使君子苦棟根㯽榔各一兩加輕粉一錢右為末每服三錢葱白五根熬湯稠滴小油少許入藥内五更服如要服此藥隔夜不食夜飯次早五更空心燒猪肉二兩重喫後却服藥若大便踰時不行單用牽牛頭目末三錢漿水調服取下蟲物有一托長餘莭莭相連屢見效蒼术澤㵼丸出㧞粹方胃為三焦相火盛而制陽明燥金故木相侮木主生五蟲所以胃中有蟲也因多食熱物胃大熱若㵼三焦火熱退則使金得氣而制木木既受制五蟲不生而自愈矣蒼术去皮三兩澤㵼桔梗各二兩地榆一兩皂角子秦芁二兩右為末燒飯為丸桐子大食前温水下三十丸或酒米飲下一方無秦芁萬靈丸治取蟲宣積黑牽牛一斤取頭末十五兩生用荆三稜五兩蓬术煨三兩大腹子一斤取七兩雷丸五兩廣木香五兩右為末和匀用好紫色皂角半斤去皮弦碎用水兩大碗浸一宿冬月兩宿撈去麄滓銅磁器内熬數沸白沫出為度放冷和藥必湏淨杵搗丸梧桐子大每服四錢重五更用沙糖水送下温冷不妨至天明去利四五行者㸔取下是何蟲積温白粥補之忌生冷腥硬之物孕婦勿服無憂散治男子女人小兒諸般蟲積已未成癰瘕脾疳及膀胱隂嚢腎腫婦人血蟲如懐鬼胎月水不通并一切危急之症悉皆治之白牽牛二兩半白蕪荑用末二兩㯽榔去皮用末二兩黑牽牛一兩大黄半兩雷丸半兩右為末匀和一處每服四錢用葱白根熬湯五更服次早大便中方見藥力之效小兒或一錢二錢大小加减石榴枝散治蝤蟲寸白等心腹㽲痛東引石榴根一兩膩粉一錢芍藥剉炒三分陳橘皮去白焙半兩㯽榔萆􅐺各一兩右搗細散每服二錢空心煎棗湯調服日晩再服白术丸治諸蟲白术四兩澤㵼二兩地榆枳實皂角子各兩右為細末燒飯為丸桐子大米飲或白湯或温酒下化蟲丸治腹中有塊以起手按之不見作聚徃来痛無休止亦治心痛五更心嘈牙闗强硬嘔吐涎沫清水及夢中齧齒面色青飲食雖多不能肌膚或寒或熱沉沉嘿嘿不知病之去處有蟲不療則子母相生無有休止長一尺則害人胡粉炒五分鶴蝨三錢白礬五錢㯽榔五錢苦楝根五錢右為細末麵糊丸如麻子大每服十五丸温漿入生麻油一兩㸃打匀下温米飲下亦得不拘時候其蟲細小者化為水大者自下㯽榔丸出聖恵方治諸蟲心痛多吐四肢不和冷氣上攻心腹滿悶㯽榔鶴蝨桂心吳茱茰陳橘皮已上各一兩右為末煉蜜和搗百餘杵丸如梧桐子大不計時以熱酒下三十丸一方療煙蟲心痛以蜜湯下三十丸蟲出為度忌生葱治諸蟲心痛出聖恵方酸石榴枝桃白皮各一兩陳橘皮一分髙良薑半兩㯽榔一兩右細剉和匀每服半兩水一盞煎至五分去滓不計時稍熱服之桃皮湯出千金方治蟯蟲及痔䘌蟲食下部生瘡桃皮艾葉各一兩槐子三兩大棗三十枚右㕮咀以水三升煮取半升頓服之良一方麄搗篩每服三錢水一盞煎至六分空心食前夜卧各一服酒䗶膏出直指方殺諸蟲醇酒一盞蜜三錢蜀漆一兩右銅銚内慢火同熬可丸即丸彈子大每服一丸温酒化開朝晩服之蟲自下化蟲散出直指方雷丸二個鷄心㯽榔二個鶴蝨一錢使君子七個右為末入輕粉少許分作兩服當晩用猪精肉一兩切成片皂角漿浸一宿至五更㣲火炙熟又用紫清油拭肉候温取一服藥末摻於肉上略烘過空腹食之至已刻蟲自下乃飲食一方無鶴蝨補金散出㧞粹方治諸般蟲鶴蝨雷丸定粉錫灰已上各等分右為末每服三錢空心小油調下又用猪肉一兩燒熟摻藥在上下細嚼亦得用翎掃甘遂末一錢與前藥一處服之其蟲自下治諸蟲在胃中漸漸羸瘦鷄子白蠟三分乾漆蜜一合右藥於銅器中以慢火煎令可丸即丸梧桐子大每服空心服以粥飲下七丸漸加十丸當下諸蟲變為黄水乾漆散治諸蟲痛乾漆雄黄㯽榔訶棃勒右為散每服五分入麝香少許用葱汁生油調空心服青橘丸治諸蟲動發上連心痛青橘皮蕪荑貫衆雷丸右為末煉蜜丸如梧桐子大每服二十丸食前橘皮湯下加至三十丸蟲下為度蕪荑散取諸蟲鷄心㯽榔蕪荑木香右為末一服當晚先煎酸石榴根湯至五更喫炙肉一片嚼細引蟲上至喉以石榴根湯煖温調藥服蟲自軟而下漆香散治大人小兒腹中蟲動痛發不止乾漆雄黄麝香右先搗乾漆為末次入雄黄麝香再同匀以蜜器盛之每服一錢苦棟根湯調下食前小兒以意加减皂莢丸治心痛如蟲咬皂莢杏仁右先搗羅皂莢為末次與杏仁相和搗為丸如小豆大每服七丸粥飲下發時喫乾漆湯治蟲咬心痛乾漆胡椒右搗篩每服一錢水一盞入葱白一寸麝香少許煎七分去滓温服㯽榔丸出聖恵方治諸蟲心痛多吐四肢不和冷氣上攻心腹滿悶鶴蝨一兩乾漆一兩搗碎右為末煉蜜和丸如梧桐子大每服十丸不計時以醋湯下又方出聖恵方東引石榴根一兩剉膩粉右用水一大盞煎石榴根至五分去滓調膩粉以利下蟲為效制諸蟲方出本事方白蕪荑㯽榔各一兩右為細末蒸餅丸如梧子大毎服十五丸至二十丸温湯下治諸蟲心痛多吐四肢不和冷氣上攻心腹悶右用鰻鱺魚淡炙令患人三五度食之治心腹蟲痛脾胃虚冷氣併冷熱虚洩赤白痢等右用肉豆蔲以白粥飲服治疳蟲本草右以端午日取蟾蜍眉脂用硃砂麝香為丸如麻子粒大小孩子瘦者空心一丸如腦疳以妳汁調滴鼻孔中治疳蟲用苦参炒帶煙出為末飲下治熱病蛄毒令人喜寐不知痛處面赤如醉下痢膿血當數視其人下部大小之孔稷稷然一云搜搜然赤則䘌瘡者也劇因殺人見人肝肺服藥不瘥可熏之出千金方右以泥作小甖令受一升竹筒一枚如指大者一頭即横穿入甖腹中一頭内人穀道中淺入可取熱艾團如鷄子大著罌中燃之於甖口吹烟令入人腹艾燃盡乃止大人可益艾小兒减之羸者不得多多亦害於人再熏不過三作蟲則死不斷亦可末燒雄黄仍如此熏之貫衆酒出直指方右取寸白諸蟲五更嚼炙肉一片莫吞俟蟲尋肉其蟲頭向上却吐出肉嚼使君子三箇并輕粉一匙吞咽下少頃以當晩所煎貫衆酒吞解毒雄黄丸七粒則㵼下皆蟲也殺五臟蟲并諸蟲右取側栢葉焙乾為末與川黄連同煎為汁服之良道家多作栢葉湯常㸃益人枯葉尤佳油麻散治胷喉間覺有癥蟲上下徧聞葱豉食香此是髪蟲油煎葱豉令香二日不食張口而卧將油葱豉致口邊蟲當漸出徐徐以物去之南粉散治腹中諸蟲令人腹痛多食泥土及油者右用南粉二錢細研五更初用生油調下至食時蟲即出盡砒黄丸治諸蟲痛右用砒黄細研一兩以水浸炊餅心為丸如小豆大只每服二丸煮肉湯下空心服金液丹出直指方壮陽道徤胃氣除冷癖殺諸蟲右用好硫黄十兩飛煉去砂石研細末入甆盒水調和赤石脂封口研泥固濟日乾於地埋小罐子盛滿了水安甆盒在上再用泥擠慢火養七日七夜次即加頂火一通冷取出研末每一兩用蒸餅一兩湯浸手握去水為丸梧子大每服三十丸空心米飲送下白金散治臟腑内一切蟲令人褊好食生物及面黄嘔吐或時心腹發痛但是蟲病悉治右用狼毒不拘多少為細散毎服一錢用餳一皂子許大沙糖少許以温水同化下臨卧放冷空心服之至服藥時覺腹㣲動氣食藥一服来日早取下蟲為見效寸金散治大人小兒諸蟲為病及骨蒸勞羸痩飛屍遁屍鬼室女經脉不行五心煩熱怠惰少力右用乾漆不拘多少炒令煙出為細散每服一錢加以生油温水攪匀調服若治小兒每一斤再加入白蕪荑仁三兩搗取細末更研雄黄半兩合研匀量兒之大小亦用生油温水調服清米飲亦得如是室女有經脉不行服之必行其餘蚘蟲服無不效者蕪荑散出肘後方治脾骨有蟲食即痛面黄無色疼痛無時立效方右用石州蕪荑仁二兩麵炒令黄色為末非時米飲調服二錢瘥又方治蟲咬心痛右用白蕪荑㣲炒一兩為末用沙糖丸梧子大每服吞十丸破宿血殺蟲右以獅子屎服之即蘓合香治諸蟲在臓腑乆不瘥右以㯽榔半兩炮搗為末每服一錢至二錢葱蜜煎濃湯調下空心服沙應丸治諸蟲積惡物盡下㯽榔大腹子各十両净取末十二両蕪荑净一両黒牽牛二斤取净末十二兩大黄净四兩雷丸净一兩錫灰净四兩木香净一兩右為末一處滴水為丸如小七香丸大每服四錢重五更時候用葱白湯送下治大腸蟲出百十尺不斷斷之復生行坐不得右用鶴蝨末水調五錢服之自愈治蟲心痛千金方右用鶴蝨一味為末蜜和丸如梧子大每服四十丸煎蜜湯下日一服可加五十丸一方為末温漿和空腹時服荳䓻散朱氏集騐方治腹痛陳皮甘草訶子使君子半夏没石子各半兩厚朴七分木香肉豆蔲各二錢半右㕮咀每服三錢薑三片棗三枚水一盞煎七分無時湘中醫者陳必勝以此醫一女使遂除根化蟲丸朱氏集騐方治諸蟲蕪荑錫灰神麹麥蘖右等分為細末麻油為圓取初五更空心用炙猪肉細嚼嚥汁不喫肉汁引動蟲次用濃煎石榴根湯下丸子藥十丸又方朱氏集騐方右急以酒調好雄黄末傳之毒水流如涎大效又方治諸蟲心痛多吐四肢不和冷氣上攻心腹滿悶楝樹東南根白皮一兩樹有子者右細剉以水一大盞煎至五分去滓空腹温服雷金散出衛生寳鑑方取諸蟲雷丸末八分欝金末七分黑牽牛末一錢半右為末和匀以生油調下以三兩匙飯壓之制蟲蜜勞恱澤膚去勞熱㯽榔一兩半龍膽一兩乾漆半兩右為末煉蜜圓如梧子大毎服十丸至十五丸熟水吞下又方出本事方右用定粉研每服一錢用麻油調五更服晩取下助肺殺諸蟲下氣令人能食消心腹間惡氣卒心冷氣澹寮方右以榆子作漿食之良亦甚香羙有少辛味陳者尤為佳治疳蟲食人脊骨者出本草右以䑕李根煮濃汁空心服一盞良如智丸出本草治蟲痛方見本門寸白類名香附丸治腹中蟲毒右用營實根皮濃煮汁服之治病咽塞食不下有蟲毒者右用小蒜虀大蒜三升飲之當自痊可昔華佗路逢一車載一人病咽塞食不下呻吟佗曰餅店家蒜虀並大醋三升飲之當自痊其病人遂依言飲之果吐出大蛇一枚而自愈九蟲附論夫蟲與人俱生而藏於幽㣲其為害也盖本於正氣虧弱既食生冷復感風邪所以種種變化以至蕃息初若不足畏而其甚可以殺人善攝生者薄滋味節嗜慾蚤去三屍防患於未然彼九蟲亦將銷鑠於㝠㝠之中惟未進此道則攘蘖剔蠧無使滋蔓盖有藥存焉名狀見諸蟲論方貫衆丸出聖恵方治九蟲動作變生諸病貫衆石蠶各一兩一分狼牙剉藜蘆蜀漆白殭蠶厚朴各三分雷丸炮一兩半白蕪荑炒一兩右為末煉蜜和為劑更於臼内入酥少許杵令匀熟丸如梧桐子大每服十丸空心温漿水下午時臨卧再服一方無厚朴另有㯽榔石榴枝湯治九蟲動作腹中刺痛口吐清水面色黒黄及蟲攻心痛者東引石榴枝三兩木香陳橘皮吳茱茰各一兩半大黄芍藥各二兩薏苡仁二兩半右㕮咀如麻豆大每服五錢水一盞半煎八分去滓空心温服麝香丸治九蟲黄連去鬚一兩白蕪荑炒二兩乾蝦蟇一枚乾漆炒去煙一兩雷丸炮半兩定粉研一兩半右為末入麝香少許再研羅匀用醋煮麺糊和丸梧桐子大每服温水下十丸空心食前服麝香丸出聖恵方治九蟲麝香半兩犀角屑一兩雄黄半兩甘遂一兩巴豆半兩硃砂半兩右為細末入巴豆及研了藥令匀煉蜜和丸如梧桐子大每服空心以温水酒下五丸㯽榔散治九蟲在臟日乆相生轉多下蟲㯽榔一兩蕪荑仁半兩狼牙一分白蘝一分鶴蝨一分右為細散每服藥時不得喫夜飯候至四更以来將暖水一盞調下三錢其蟲㵼下鷄子丸治九蟲鷄子好漆蠟三兩粳米粉右先取漆蠟入銅鐺中用慢火攪令得所次入粳米粉又攪令匀煎令凝候可丸即取鐺置坐黄土上纔候稍温即下鷄子又攪令得所再置火上煎令可丸如小豆大隔宿勿食於空腹煎粟米飲下二十丸小兒五丸千金有茱茰根桑皮狼牙散治九蟲在腸胃令人心煩吐逆下蟲狼牙鶴蝨貫衆蕪荑各等分右為細散每服以粥飲調下一錢良乆再服蟲盡為度蕪荑散治九蟲蕪荑仁狼牙㯽榔石榴根皮各等分右細羅為散每日空心以温酒調下二錢狗脊散治九蟲狗脊芎藭細辛白蕪荑各等分右為細散三更後先喫牛肉澹乾脯三二兩五更初以粥飲調下三錢良乆當有蟲下為度三蟲附論夫三蟲亦九蟲之數曰蚘曰赤曰蟯是也其發動諸病較之他種為甚蚘蟲又曰長蟲長一尺動則吐清水心痛貫心則死赤蟲狀似生肉動則腸鳴蟯蟲至細㣲形如菜蟲居胴腸間多則為痔極則為癩或生諸癱疽癬痿瘑疥而其變甚多三蟲為患如此古人秘析而治之意亦深矣方白蘝丸治三蟲發動心痛等疾白蘝狼牙藜蘆桃花貫衆陳橘皮白蕪荑右為末煉蜜和為劑更於鐵臼内入稱杵令匀熱丸如小荳大每服二十丸隔宿勿食空腹漿水下至晩再服漸加至三十丸姙娠婦人勿服鼈甲丸治三蟲發痛面目黄不下食鼈甲白术陳橘皮木香狗脊㯽榔吳茱茰三次換水洗去土焙乾㣲炒一兩右為末煉蜜和為劑置臼内入酥杵令匀熱匀丸如梧桐子大毎日空心服煎青橘皮湯下三十丸晩食前再服芎藭散治三蟲芎藭白芷雷丸桔梗右為細末每服二錢用蜜并醋各少許觧匀調服或米泔汁調服亦得每日空腹日午近晩各一服竹莭丸治三蟲燒竹莭雷丸錫屑陳皮右搗下篩蜜丸如梧桐子大一服八丸日三服斷虫也一方温水送下雚蘆散治三蟲雚蘆乾漆吳茱茰右為細散每服二錢煎粟米稀粥調空心服一方先嚼淡乾脯後服天門冬治三蟲保定肺氣去寒熱養肌膚益氣力利小便及諸暴中偏風濕痺強骨髓天門冬半斤右先取天門冬細剉爛研如泥用酒一斤和絞取汁并蜜攪之令匀銅器中重湯上煎仍用竹箆攪後如餳毎服如彈子大空腹温湯服之或用生地黄汁一盞同煎妙亂髪灰散治三蟲并蟯蟲亂髪丹砂各二兩右同研極細毎服一錢醋調空心服之一方用真珠苦酒調服治蟯蟲雷丸散治三蟲雷丸炮一兩芎藭一兩右為細散毎服一錢空腹服煎粟米飲調下日午近晩各一服鶴蝨散出聖恵方治三蟲鶴蝨二兩雚蘆一兩右為細散毎服一錢用猪羊肉臛汁調空腹日午近夜各一服一方無雚蘆療三蟲方肘後方茱茰根取東引指大者長一尺剥取白皮栝蔞四兩切一升右件細剉茱茰根以水一升漬之一宿旦絞滓宿勿食旦空腹先喫脯然後遂服之小兒再三服亦療寸白蟲雚蘆散肘後方治三蟲神效兼治蟯蚘蟲攻心如刺吐清汁并寸白蟲右用雚蘆㣲炒二兩為細散每服二錢隔宿勿食於日清旦用肉臛汁調服之蟲自下一方飲臛和服㯽榔湯治三蟲幷寸白蟲右用㯽榔三枚灰火煨過麄搗篩用水三鍾煎至一鍾半漉去滓分三服空腹日午前近夜各一服其蟲即盡下或和葱白鹽豉同煮飲之亦佳一方治寸白蟲用好㯽榔二七枚治下篩以水二升半煮去皮取一升半濾去滓内末頻服晩卧蟲出或不盡更服取全瘥止宿勿食旦服之木香湯治三蟲心痛黄面不下食木香三分㯽榔三分薏苡仁炒一兩陳橘皮焙三分吳茱茰炒一分東引石榴枝炙剉一兩半右㕮咀每服二錢水一盞煎七分去滓温服如人行三四里再服殺三蟲毒邪氣破老血出本草右取竹肉以灰汁煮三度煉然後依常菜茹食之煉之不熟者㦸人喉出血手爪盡脱竹肉生枯枝上如家鷄子似肉臠應别有功人未盡識之一名竹實也治三蟲右用桃葉絞汁一升飲導引法療三蟲右以兩手著頭相生义手長㓜氣即吐之坐地緩舒兩脚以兩手從外抱膝中痛低頭入兩膝間兩手交叉頭上十二遍愈三蟲又云叩齒二七過輙咽氣二七如是三百通乃止為之三十日邪氣悉去六十日小病愈百日大病除三蟲伏屍皆去面體光澤五臟蟲附論夫五臟蟲者縁臟真衰弱熱氣薫蒸而成之傳所謂肉腐出蟲魚枯生蠧理固如此其名狀之異見於九蟲序可辨而察也方麥門冬丸出聖恵方治肺熱生蟲其形如蚕令人咳逆氣喘或謂憂膈氣膈患膈寒膈熱膈皆從勞熱氣生名曰膏欲病鍼炙不至麥門冬十兩蜀椒一兩人参一兩一分逺志附子細辛各一兩半甘草一兩半乾薑一兩桂去粗皮百部焙白术黄蓍各一兩一分杏仁半兩右為末煉蜜和更於鐵臼内塗酥杵令匀熱丸如酸棗大含化稍稍嚥津一方有㯽榔一方無白术前胡湯治脾有白蟲長一寸在脾為病令人好嘔胸中咳即嘔而不出前胡白术赤茯苓枳殻細辛旋覆花常山松蘿各一兩半龍膽杏仁各兩右麄搗篩每服五錢水二盞入竹葉十片净洗細切同煎至一盞去滓空心服吐之即瘥若腹中熱滿入黄硝五分梔子仁一兩半苦参一兩一方用枳實無枳殻雷丸丸治心臟勞熱傷心有長蟲名白蟲長一尺貫心為病雷丸陳橘皮桃仁各一兩一分狼牙一兩半貫衆半兩白蕪荑青箱子乾漆各一兩亂髪燒為灰右除亂髮燒灰餘搗為末然後與亂髪灰同研令匀煉蜜和更於鐵臼内塗酥杵令匀熱丸如梧桐子大毎服空心温酒下十五丸至晩再服米飲亦得一方用塗酥一方有殭蠶吳茱茰根皮貫衆散出千金方治勞腎熱四肢腫急有蟯蟲如菜中蟲生於腎中貫衆三枚乾漆三兩吳茱茰一兩半白蕪荑槐白皮各一兩胡粉一兩杏仁半兩右除别研胡粉外搗羅為散更與胡粉同研令細每服二錢空腹用井華水調服日晩再服㯽榔散治蟲多脾病乍去乍来嘔吐清沫鷄心大㯽榔貫衆各分石菖蒲木香各分甘草一錢右剉毎三錢水煎空心加靈砂金液丹服盡靈砂金液有硫黄水銀能殺蟲也桑根白皮湯治肺勞熱生蟲在肺為病桑根白皮取一升狼牙三兩吳茱茰根皮净刷去土五兩右細剉用酒七升煮至二升去滓分作三服每日空腹一服一方無狼牙茱茰根浸酒方出聖恵方治脾勞有白蟲在脾中為病好嘔吳茱茰東引者一尺剉麻子八升陳橘皮右先搗碎橘皮麻子如泥然後拌茱茰用酒一斗浸宿慢火上㣲煎絞去滓分作五服毎服空心温服蟲即下凢欲合藥時忌言合煞蟲藥一方以水煎服㯽榔散治蟲動心痛㯽榔一兩乾漆一兩石灰三兩右件為末每服一錢用熱酒調放温連二服不拘時候一方右用杏仁輕粉最殺蟲治臟腑内一切蟲病出本草方殺腹臟蟲右以槐花炒服治五種蟲右以楝皮去其蒼者焙乾為末米飲下二錢匕蟯蟲附論夫蟯蟲是九蟲之一甚㣲細如今之蝸蟲亦由臟腑虚弱而致發動其始若不足慮者然其生化衆多攻心刺痛時吐清水在胃中浸蝕不已日加羸瘦甚則或痔瘻疥癬癰疽諸癩齲蟲害人若此絶其本根勿使能殢則毒而治之所不可忽方石榴散治蟯蟲酸石榴根乾漆狼牙鶴蝨㯽榔剉各一兩右為細散每服二錢空心温酒調下芫花散治蟯蟲芫花三分狼牙三分雷丸三分桃仁三分白蕪荑三分右為細散隔宿勿食平旦以粥飲調下一錢一方無白蕪荑又方聖恵方貫衆狗脊白蕪荑已上各一錢桃花半兩麝香一分右為細散每服二錢空心温酒調下良乆再服蜜香丸治蟯蟲蜜陀僧煆一兩麝香研五分硫黄研一分定粉研半兩右為細散醋煮麺糊丸梧桐子大每服十丸空心蕪荑湯下槐皮丸治蟯蟲在胃漸加羸弱槐皮桃仁楝實各半兩右為末煉蜜猪膏丸如人指大以綿裹導下部中巴豆桃仁丸治蟯蟲巴豆五枚桃仁炒二十兩右同研極細丸如梧桐子大每旦空心服温漿下大人兩丸小兒一丸蟲下再服艾汁方治蟯蟲攻心如刺吐清水并寸白蟲良乆再服蟲當下右用艾葉并嫩心切二升搗研絞取汁兩盞許宿不可食平旦先嚼乾脯少許後頓飲汁不能盡即兩日徐服一方治蚘蟲旦取肥香脯一方寸片先喫令蟲皆聞香然後飲一升當下蚘一方搗艾葉以苦酒煎而服之良一方治寸白蟲隔宿勿食好淡羊肉乾脯用一二兩嚼嚥汁令蟲聞香然後飲艾汁一盞又却取水觧一盞初五更先喫炙猪肉一片服之蒺藜散治蟯蟲右於七月七日採蒺藜子幷苖葉隂乾燒存性細研之毎服二錢食後煎蕪荑酒調下日三又治諸蟲方水銀膏治蟯蟲咬人下部癢右以水銀一兩蒸用棗膏丸如人指大綿裹臨卧導於下部中一宿内藥時常留綿帶子在外一方水銀恐損腸宜慎之治蟯蟲方右以好鹽末二兩苦酒半升合銅器中煮熬數沸宿則不食空心頓服之治蟯蟲攻心如刺口吐清水并烟蟲咬腹内痛右用苦楝子取根剉水煮令濃赤黒色以汁合米煮之作糜隔宿勿食来旦食一匙俟少時復食一匙半升糜便下蟯騐或用皮去其蒼乾者焙為末米飲下一二錢兼治五種蟲一方療蛔蟲但取肥香脯一片於先喫令蟲聞香舉頭稍從一口為度妙少進自然取食一匙半升糜便下蛔一方用苦楝樹白皮水煎之去滓熬成膏五更以温酒服半匙用銀器内熬更為妙蚘蟲附論夫蚘蟲即九蟲序所謂長蟲者今此折而治之較之他害人多觀其發作冷氣臍腹撮痛變為嘔逆以至心中痛甚如錐昔人蚘厥貫心能殺人所以治之不可緩也聖恵論曰蛔蟲者是九蟲内一蟲也長一尺亦有長五寸或因臟腑虚弱而痛或疳肥而動則腹中痛發作種聚行上下痛無休息亦攻心痛喜吐涎及清水貫傷心者則死診其脉腹中痛當沉弱而弦今反脉洪而大則是蛔蟲也方烏梅丸治蚘厥令病者静而復煩臟氣蚘上入膈故煩湏㬰復上得食嘔又煩者蚘聞食臭出其人自吐蚘兼治久痢烏梅一百五十箇當歸川椒細辛附子桂心人参黄蘖各三兩乾薑炮五兩黄連八兩右為末以苦酒漬烏梅一宿去核蒸之五斗米熟下搗或泥和藥相得内臼中與蜜杵一二千下丸如梧桐子大食前飲服十丸或加至二十丸温米飲下食前服當歸湯治蚘蟲心痛如錐刺時吐白蟲當歸一兩桔梗一兩半陳橘皮桂去粗皮人参各半兩赤芍藥三分鶴蝨炒二分㯽榔炮分朴硝研三分右除朴硝外麄搗篩入朴硝拌匀每服三錢水一盞煎至七分去滓空心服後半時辰再服靡蕪丸治少小有蚘蟲結在腹肚内數發腹中㣲下白汁吐而悶寒熱飲食不生肌皮肉痿黄四肢不相勝舉靡蕪貫衆雷丸山茱茰天門冬狼牙各八分雚盧甘菊花各四分右為末蜜丸如大豆三嵗飲服五丸五嵗以上以意加之漸至十丸加雚蘆六分名雚蘆丸治老小及婦人等凡病腹内冷熱不通急滿痛胸膈堅滿手足煩熱上氣不得飲食身體氣腫腰脚不遂腹内狀如鷄鳴婦人月經不調無所不治集效丸治因臟腑虚弱或多食甘肥致蚘蟲動作心腹絞痛發則種聚徃来下上痛有休止腹中煩熱口吐涎沫是蚘咬宜服此藥若積年不瘥服之亦愈又治下部有蟲生痔癢痛木香鶴蝨㯽榔訶子蕪荑附子乾薑炒各七錢半大黄右為末蜜丸如梧子大毎服三十丸食前橘皮湯下婦人醋湯下當歸散治蚘蟲痛發冷氣先從兩肋連胸背撮痛欲變吐逆當歸鶴蝨各二兩陳橘皮人参各一兩㯽榔三兩枳殻芍藥各兩桂一兩一分右為散每服二錢空心煎棗湯調下至晩再服雷丸散治九種心痛蟲痛為先雷丸一兩貫衆一兩半狼牙當歸一兩半㯽榔一兩桂一兩半鶴蝨一兩陳橘皮一兩右為散每服二錢空心煎粟米飲調下晚食前再服以大下蚘蟲為度一方用蜜湯下柴胡湯治蚘蟲心痛柴胡一兩半當歸食茱茰一兩芍藥一兩半厚朴剉一兩㯽榔三枚郁李仁三分右麄搗篩每服三錢水一盞煎至六分去滓食前温服日三桔梗散治蚘蟲攻心痛桔梗當歸芍藥各三分橘皮炒半兩㯽榔鶴蝨各一兩萆􅐺一兩右為散毎服二錢空心煎生薑棗湯調下至晚再服鶴蝨散治疳蚘寸白蚘蟲等發作心腹㽲痛鶴蝨炒三分㯽榔一兩二分楝根皮二兩五錢陳橘皮五錢麥葉一兩半糯米一合牽牛子三兩右為散毎服二錢空腹煎粟飲調下如未轉㵼即更服仍時煎薑蜜湯熱投之治蚘蟲右用赤藤煮汁服之桑根白皮湯治蚘蟲心痛毎連臍腹刺痛多吐涎沫桑根白皮三兩酸石榴皮一兩白蕪荑㯽榔厚朴各五錢右麄搗篩每服三錢水一盞入生薑一小塊擘破同煎至六分去滓空心服至晩再服石榴皮湯治蚘蟲心痛腹中㽲刺痛不可忍徃徃吐醋水酸石榴皮三分㯽榔一分桃符一兩半胡粉一分右先搗篩前二味後以胡粉拌匀分為五服煎每服水一盞入桃符一分酒半盞同煎至七分去滓空心温服至晚再服萆􅐺散治蚘蟲發作萆􅐺白蕪荑狗脊剉一分右為散每服二錢温酒調欲服藥先隔一宿喫牛肉乾脯一片次日空心服藥蟲下即瘥麝香散治大人及小兒疳蚘腹中虚脹面目痿黄麝香剉研一分乾蚯蚓五錢乾蝦蟇一枚塗酥炙黄赤色淨剔去骨并去腹中惡物右先搗蚯蚓等為散與麝香同研令匀細毎服一錢空腹煎薏苡根湯調下髙良薑湯治蚘蟲髙良薑剉一分苦楝根皮二兩胡椒三十粒右麄搗篩每服三錢水一盞煎至六分去滓空心服服訖卧少時未得喫食或吐或㵼即瘥雚蘆散治蚘蟲懊憹雚蘆乾漆各二兩扁蓄三分右為散每服一錢煎粟米飲調食前服日三漆煎丸肘後方治蚘蟲蟯蟲在胃令人漸漸羸瘦漆清白蜜清酒各半升右同攪令匀於銅鍋中㣲火煎常令沸不住手攪候如膏可丸即止丸如雀邜太每服一丸隔宿不食空心温酒化破服之蟲即下不下再服亦可丸如梧子大空心服酒下二十丸甘草粉蜜湯治蚘蟲之為病令人吐涎心痛發作有時甘草二兩粉一兩蜜四兩右以水三升先煮甘草取二升去滓内粉蜜攪令和煎如薄粥温服一升瘥即止㯽榔煎治蚘蟲并寸白蟲㯽榔五枚酸石榴根皮剉一升右先將㯽榔麄搗與石榴根各均分作三度用每度用水二升半煎至一升半絞去滓入粟米一合煮如粥平旦空心頓喫利下蟲效一方治寸白蟲為散淡猪肉汁調五更初服候半時辰再服一方石榴根煎湯調末服先將猪肉含口中嚥津下去肉却服藥狼牙散治蛔蟲或攻心吐清水幷療白蟲狼牙一兩蕪荑一兩右細羅為散每一服藥空心先喫小淡羊肉乾脯即以温酒調散二錢服之不過三四日永瘥治蚘蟲右用麻黄搗葉水絞取汁服五合治石蚘腹脹面黄極難療者右用死人枕煮汁服之昔張㬌年十五嵗腹脹面黄用衆藥不能治以問徐嗣伯曰石蚘耳即難療當取陳死人枕煮汁服之得大蚘蟲頭堅如石者五六升其病即瘥石蚘者醫療既癖蚘蟲轉堅世間藥豈能祛遣所以湏是鬼物驅之然後乃散故令煮死人枕以服治蚘蟲咬心痛面青口中沫出臨死者本草右取扁蓄葉十斤細切以水三石三斗煮如餳去滓渣適寒温空心服一升蟲即下至重者再服仍通宿且勿食来日平明服之治蚘蟲右以鼹䑕肉令大人小兒食之療蚘蟲攻心如刺吐津汁右用萑菌單末之猪肉臛和食之亦作羊肉臛和之旦日一頓服佳治蚘蟲右取楝實浮苦酒中浸再宿用綿裹内穀道中入三二寸一日易之治寸白蚘蟲右用金櫻花子止冷熱痢殺寸白蚘蟲等和鐵粉研細㧞白髪傳之再出黑者亦可染髪薏苡根湯治蚘蟲右以薏苡根一握去土碎剉麄搗篩水三盞煎至一盞半漉去滓分二服空心先喫餳少許然後温服又一方治蚘蟲攻心腹痛蠶蛹汁方治蚘蟲右取繰絲蠶蛹兩合爛研生布絞取空心頓飲之非值繰絲時即湏依時收取蠶蛹暴乾搗羅為末用時任以意斟酌多少和粥飲服之鶴蝨散療蚘蟲幷三蟲諸蟲右取波斯鶴蝨三兩搗散以肥猪羊肉但有一色以少葱豉為臛汁毎旦空腹以臛汁和一方寸七日頓服之稍多飲臛汁佳若不能散服即以蜜和為丸畧如梧桐子大一服十丸還以此臛汁下之假令明旦須服今日未欲即勿食明旦服藥訖至巳時為佳要須服此丸散使盡已後三十日勿雜食永瘥或以苦酒於空心服之亦治諸蟲一年治涎蛔蟲出吐水心疼痛淡醋和服之蜜丸平旦漿水服一方治三蟲以猪羊肉臛汁調一錢空心服殺蚘蟲右以鹽麸子樹根白皮煎服殺腸中蚘蟲右用小麥熬煎末服療蚘蟲咬心痛右取鶴蝨十兩搗篩蜜和丸如梧子大以蜜湯空腹時吞四十丸日増至五十丸慎肉酒一方平旦漿水吞服二十丸又千金方為末温醋下蟲當出桔梗散治蚘心痛桔梗當歸芍藥雷丸人参貫衆㯽榔陳橘皮右為細散每服二錢空心煎薑棗湯調下日晚再服漸加至三錢増損當歸湯治心痛發作痛有休止喜涎出是為蟲亦治心腹藴結痛當歸芍藥黄芩朴硝桔梗柴胡升麻右㕮咀毎服三錢水一盞煎七分去滓温服狗脊丸治蚘蟲痛狗脊去毛一兩吳茱茰炒半兩陳橘皮焙三分蕪荑三分㯽榔剉一兩半右為細末煉蜜和丸如小豆大每服二十丸食前橘皮湯下蕪荑散治大人小兒蚘咬心痛經心蟲貫心則殺人欲騐之大痛不忍或吐清黄緑水淋沫或吐蟲出發有休止此是蚘痛心也宜速療之仁存方乾漆煙盡一兩雷丸蕪荑各五錢右為細末每服二錢温水七分盞調和服不拘時甚者不過三服小兒毎服五分薑黄散治蚘蟲心痛喜吐水衝刺痛不可忍或不能食面黄腹滿薑黄一兩三分雚蘆剉一兩鶴蝨一兩一分右搗篩每服三錢水一盞煎七分又入酒一合更煎取沸空心服晚食熱飯即蟲下一服未盡更服鶴蝨飲治蚘咬心痛鶴蝨苦楝根焙各一兩碙砂一兩右先以二味麄搗羅入研藥和匀毎服三錢水二盞新匙一柄剉折同煎一盞下朴硝末一錢煎沸去滓空心服乳香散治蚘心痛乳香研一分鶴蝨炒三分㯽榔剉一兩半右為細散每服三錢大麻子汁調下㯽榔散治蚘咬心痛㯽榔剉蜀椒各半兩右為細散每服二錢米飲調下空心日晩各一服吳茱茰散治蚘心痛吳茱茰炒半兩鶴蝨一兩半右為細末每服二錢空心温酒調下鶴蝨㯽榔湯療心痛不可忍似蛔者鶴蝨二兩小兒用一兩大腹㯽榔右以猪肉汁六升煮㯽榔取三升去滓内鶴蝨末先夜不食明旦空腹頓服湏㬰病下及吐水瘥神效七日禁生冷酢滑一方用煖大麻仁汁調下二錢又方方發時取鹽一七内口中水下立定蟲即出治蚘蟲右用麻葉搗爛用水泡絞取汁五合服之麻葉乃今時人績布者是也去蚘蟲右用楝根煮汁作糜食之治蚘蟲右用漏蘆杵為末以餅臛中服方寸七治大人小兒蚘咬心痛心腹脹滿黄瘦右用醋麻子搗為末每服一錢匕調服之甚效寸白蟲附論夫寸白蟲乃九蟲之一種也狀似絹邊葫蘆子因臟氣虚風寒濕冷積腸胃又好食生膾乾肉等所以變化滋多難於蠲治說者謂食牛肉飲白酒所致特一端爾亦未必皆縁此方㯽榔散治蚘蟲寸白蟲蛔蟲㯽榔剉一兩半當歸鶴蝨各三分貫衆雷丸半兩蕪荑仁陳橘皮焙各三分右搗羅為末每服二錢空心煎棗湯調下至晩再服漸加至三錢利為度錫灰丸取寸白諸蟲錫灰細末一兩鷄心㯽榔貫衆各半兩木香二錢五分輕粉黄丹各二錢右為細末酒醋煮麵糊丸荔枝乾大每服一丸米泔浸軟日落先喫飯了至黄昏不饑飽時喫肉脯一片引蟲候少刻温酒嚼下天明蟲出又喫韭菜治寸白蟲取寸白蟲出寸草方錫灰一兩木鼈一兩蘆薈二十枚黄丹十分輕粉十分右為末猪膏油丸如彈大先齋一日晩莫喫飯次早五更温水吞下分作二服取寸白蟲出本事方蕪荑一錢鷄心㯽榔二箇狼牙草五錢雷丸三分輕粉少許右為末每服二錢四更時清茶調下隔夜㸃取茶四更時取清石榴根散治寸白蟲酸石榴根去土五兩碎切㯽榔一顆膩粉研半錢鉛丹炒半錢右先取㯽榔末等三味細末令匀再温石榴根汁調藥末五更頓服凡欲服藥侵早先喫肥猪肉次便服藥㯽榔散治寸白蟲每以月一日二三服之餘日勿服㯽榔剉二兩陳橘皮桑白皮剉各三分蕪荑炒一兩右為散每服一錢半以漿水一中盞濃煎酸石榴根湯調空腹服欲服藥隔宿勿食清早先取乾脯一片細嚼嚥汁少頃即服藥至晩蟲出未下煮白皮汁服之治寸白蟲令化為水出聖恵方狗脊貫衆白蕪荑酸石榴根已上各一兩右為散每服兩半以漿水一大盞煎至五分去滓四更初温服先於晚間不得食夜飯又方出聖恵方狼牙白芨白蘝白蕪荑已上各一兩右為細末毎食空心以温酒調下二錢香附丸治葫蘆蟲亦治寸白蟲兼諸蟲木香為末一分附子硫黄研各半兩右先用蜜陀僧半兩入醋熬成膏然後入三味藥末一處和丸如小豆大每服十五丸温酒下食前服一方先以釅醋一升煎附子末為膏次入三味為丸冷茶芥湯下頭日不晚食五更服為妙白蘝散出肘後方治寸白蟲為病令人兩眼無光澤脚膝少力蕪荑六分狼牙四分白蘝二分右治下篩以苦酒二合和一宿次早空腹服之一方漿水二盞治寸白蟲出徳生堂錫沙蕪荑㯽榔各等分為末右濃煎石榴根汁半升下散三錢一方用黄丹丸五枚中夜服旦日下見蟲㯽榔散治寸白蟲石榴根剉陳橘皮桑根白皮各一兩右細剉分作三服每服水盞半煎至一盞去滓五更初調生㯽榔末二錢至天欲明不㵼至曉又一服如蟲母未下再服或㵼不止喫冷粥止之石榴根湯治寸白蟲令人羸瘦酸石榴根一大握蕪荑二兩牽牛子末五錢右前二味麄搗篩毎服五錢水一盞半煎至一盞去滓下牽牛末五分煎沸空心温服如人行十里再服以快利蟲下為度橘皮湯治寸白蟲陳橘皮焙乾二兩蕪荑仁狼牙各一兩半右為末煉蜜和為劑更杵令匀丸如梧桐子大毎服三十丸食前温漿水下日三服㯽榔湯治寸白蟲㯽榔剉一十四枚薤白一盞許鹽豉一盞許右將大㯽榔麄搗篩與餘物各分為三分煎毎分以水三盞煎至一盞半去滓分三服隔宿勿食侵早空心一服如人行六七里一服蟲未下再服水銀丸治寸白蟲水銀錫白蠟各一分右熟研以糯米粥丸如皂子大每服温酒夜嚼一丸次日食前取下蟲母瘥石榴根湯酸石榴根一握陳皮一兩㯽榔三枚右除㯽榔末外合細剉以水三盞煎至一盞半去滓入㯽榔末攪匀分温二服空心相繼服盡當有蟲出次煮薤粥補療寸白蟲為水㵼出求除方榧子㯽榔蕪荑各等分右為散温酒二錢燒牛肉脯喫後服藥也治寸白蟲令化為水十全良方萆􅐺一兩甘草三兩狗脊三兩右為細散毎服二錢食前粥飲調下又方出聖恵方㯽榔二枚杏仁七枚酸石榴根一握剉右細剉水二大盞煎至一盞去滓空心分温二服凢欲出蟲時先坐暖物兼食少澹羊肉乾脯微燒過爛嚼嚥汁待引得蟲出即服良又候腹内似不安甚即轉動以快利為度後服蕪荑湯一小碗以補之永瘥又方出聖恵方麝香二錢蕪荑仁三分狗脊五錢右為細散入麝香研令匀於月厭日以澹漿水空心調下二錢良乆再服從早至食時可三服當以下蟲為度一方以蕪荑湯下又方出聖恵方狗脊一兩萆􅐺五錢剉貫衆半兩右為細散毎服空心以蕪荑湯調下二錢以蟲出盡即止又方出聖恵方桑根白皮一兩剉㯽榔半兩桃根白皮治寸白蟲出肘後方胡麻一升胡粉一兩右為末明旦空腹以猪肉臛汁噉盡則瘥一方名胡粉丸療心痛不可忍似蛔者用生真胡麻一合胡粉半合熬搗先以猪肉脯一片空心服啖嚥肉後取前藥搜作丸以少清酒盛頓服盡十嵗以上增减忌生冷猪肉魚鷄蒜酢滑等七日若是蛔吐水者是也取寸白蟲出本草方畫粉蜜陀僧各等分右為末每服二錢用麻油調服空心下頓刻成涎取下療白蟲方寸白者亦九蟲之一也長一寸色白形小褊因臟腑虚弱而能發動或云飲白酒以桑根貫牛肉炙食之并生粟所成又食生魚後即飲乳酪亦令生之其發動則損人精氣脚腰疼弱此蟲生長一尺則殺人淳漆二合猪血三合右相和微火上煎之不著手隔宿勿食空腹且先喫肥香脯一片服之如荳許一百丸日中蟲悉出亦治蚘蟲療白蟲并治三蟲東引茱茰根一大握切麻子半大升右先搗麻子極碎又盆中熱研以水一大升更和研絞取濃汁以浸茱茰根一宿明旦煮兩三沸頓服如不頓服分再服至如明旦欲服藥合日午後便不得食仍湏先嚼一片肥乾脯嚥津然後服藥一劑去蟲不盡停一日更作服一劑永瘥後一月日勿食脂膩魚肉必效不用脯餘一方同剉搗用酒二升浸一宿去滓空腹煖頓服之聖功散療寸白蟲不拘逺年神效南木香㯽榔各等分右為細末濃米飲調三服許黎明空心先熱嚼炙猪肉之属口嚥吐去滓便服藥辰巳間蟲下其疾永除此方簡易如是而取效神速諸名醫未知有此用之屢騐治寸白蟲令化為水出聖恵方楝根五兩剉粳米二合右藥以水三大盞煎楝根取汁二合盞去滓入米作粥煮宿勿食旦朝先喫淡羊肉脯令蟲舉頭便食其粥其蟲即盡下治寸白蟲出千金方右用榧子四十九枚去皮以日平旦空腹時服七枚七日服盡蟲消成水永瘥又云日食七顆七日滿蟲即化為水一方一百枚只細啖之食盡佳不能者但須啖五十枚亦得經宿蟲消自下一方并治三蟲又方出千金方右取吳茱茰比隂根乾去土切一升以酒一升浸過一宿平旦二服茱茰用細根東引比隂者良若如指頭以上大不用又用石榴根如茱茰法亦可水煮又方出千金方右研大麻汁五升分五服亦可治小兒蚘蟲又方出千金方右以好麻油二升煎令熟内葱白三寸葱白黑便熟候冷頓服之又方出肘後方右熬餳令十分燥作末以水方寸内羊肉臛中服之又方出肘後方右用桑根白皮切三升以水七升煮取二升宿勿食於平旦空腹服一升蟲亦下桑白皮亦可用又方出千金方右以金櫻根東行者二兩秫米二十粒水一升煎去渣滓半空心服湏㬰下蟲如神效一方用糯米三十餘粒又方出本事方右以鈆錫灰炒鷄子喫亦可只用錫灰為末以棗肉為丸如梧桐子大先齋一日次日五更喫炙肉一片又次温酒下石榴湯出聖恵方治寸白蟲蛔蟲右以酸榴根南引者一握取净細剉半升用水五升入煎半碗已下去滓五更腹空時先炙猪肉随意喫之下引蟲不過飽然後温服此藥只作一服蟲自取下乃喫白粥補之永絶根一方用東南引根并東引之根有人服之一啜即下而愈一方取石榴東引之根令患人以手大指與第三指滿握一握兩頭出者總皆留之又取乾脯肥者如手大一片細剉以水四升浸漬之一宿明旦煮取一升去滓分三分如人行十里之乆每欲服先嚼脯一片然後飲藥并令人以手徐按所患人腹令藥易宣都服了有頃當日便蟲出凡服藥以月一至五日以前是蟲頭向上服之得力蟲無問多少皆得出盡若疑蟲未盡更合一劑永愈矣一方酸石榴東向根三五錢用水一碗半煎八分於隔宿煎下来早用半精肥肉四塊令病人聞之頃乃食其肉次藥煎服若氣虚者覺如醉夢寢至申未時間蟲下不過兩服蟲上旬頭向上下旬則無效又方出仁存方右熬胡粉令葱焦燥平旦先作肉以藥納肉中喫之即大效或以生麻油調一錢服又方出肘後方右用雷丸水浸軟去皮切焙乾為末毎有病者五更之初先食炙肉少許却以稀粥調藥服之即時須出凡服藥以上半月日蟲乃下治寸白蟲出仁存方右用新生韭子五更初喫半升許其蟲去根取寸白蟲出大全良方右用苦綿苽子不以多少研為末每服二錢好酒半盞許空心調服治寸白蟲出大全良方右用黑鈆灰炒二錢一服先喫猪肉脯少許一時来又却用沙糖濃水盞半調灰五更服蟲盡下以白粥将息一日良子宣和中每覺心中多嘈雜意謂飲作或又疑是蟲浸依良方所說服翌日下蟲一條長一丈二尺五寸頭匾闊尾尖銳毎寸作一節班班如綿絞其一條皆寸斷矣千金謂勞生熱熱則生蟲白蛔為脾蟲寸白腎蟲如寸截絲縷肝蟲如爛杏肺蟲如桑蠶五蟲皆能殺人惟肺蟲為急肺蟲居肺葉之内每蝕人肺系故成療疾咯血斷嘶藥所不到治之為甚難有人說道臟中載諸蟲皆頭項下行唯自初一日至初五日以前頭上行故用藥者取月朏以前盖為是故也牙子治白蟲方肘後方右用狼牙五兩搗末蜜丸如麻子大宿不食明旦以水漿一合服盡瘥之治患中宿冷寸白蟲右用山豆根為末毎朝空心熱酒調三錢其蟲自出又如小兒乳調半錢療心痛不可忍似蛔者黑鉛散治寸白蟲累取不盡乆令人面黄心如饑肘後方右用黑鉛沙子畵家銀塗是也極研細毎服二錢於五更初肉汁調頓服治平明取下蟲立瘥一方以肥猪肉三兩片炙令香熟再三蘸藥細嚼米飲下空心及食前服㯽榔散出三因方治寸白蟲右用㯽榔如鷄心者一枚為末欲服藥隔宿不吃晩時食放饑睡先用鹽醋等炙雜肉脯一片香熟次日之五更令病人空腹嚼脯嚥津却吐出肉用温米飲下㯽榔末一錢頓服即睡至午前取下蟲方可食多蟲者不過再服月一至初五已前尤佳一方治諸蟲生在臟腑乆不瘥用茶蜜或葱蜜湯調服一錢至二三錢一方用水煎服一方二七枚為散水先煮其皮却減半去滓内末頻服暖卧療白蟲方出肘後方右用濃煮猪肉汁煎㯽榔三十枚取三升服之蟲盡自出又方肘後方右用熟煮猪脂血宿勿食明旦飽食之蟲當下又方右以橘食破其上取皮中子搗合蜜丸如梧子大不須食但以醋漿水或米汁下三百丸諸食蟲并死下又或以糜爛皮亦可丸服八十丸忌如常法又方出聖恵方右用熟猪肉以蕪荑鹽醋早晨飽噉蟲出盡即止又方出聖恵方治寸白蟲令化為水右用狗脊三兩搗細羅為散毎於空心以蕪荑湯調之下二錢催取寸白蟲出本事方巴豆七粒皂角末一錢用亰墨磨醋糊為丸如麻子大只作二服五更初橘皮湯下取疋白蟲方鈆灰三錢雄黄五分蜜陀僧五分麝香一字㯽榔一个右為細末用猪膏油打邜餅入藥末小半於餅内用其邜餅於五更初時逐旋蘸藥細嚼喫盡未可喫食飯後至早食時服烏梅丸烏梅丸方右用巴豆二粒蒸爛烏梅肉為丸分作二七粒飯飲和吞下七粒稍乆臟腑未轉再吞二粒凢取此蟲湏先斷葷腥三四日縱復吐嘈雜亦當忍耐服藥後湏即以爛軟粥飯將息亦未湏便喫葷腥若覺蟲下未能盡或可斟酌再服藥取令盡為度仍湏月初一二日間服藥為妙化蟲散取寸白蟲黄丹半兩錫灰一兩定粉二兩右件三味同研極細末稱一錢先燒肉五更喫了後用生油一口許調藥都一服至晩取下婦人有胎不可服恐有害李副統女名菊花年十三嵗此藥一服取蟲一抄終身不發雷丸散取寸白蟲㯽榔一兩雷丸一兩雄黄黄丹韶粉已上各半兩右件為細末每服一大錢油餅泡湯調服二更服至五更時却服後方雙粉散催之雙粉散下寸白蟲兼蛔蟲石灰一兩黄丹五錢韶粉五錢輕粉一錢右件為細末每服一大錢煎使君子湯調下五更初服如患蛔蟲二更時只服此藥不湏服前方雷丸散治蛔蟲咬心痛右用苦楝皮煎一大盞服治蛔蟲出本草右用繰絲湯熱取一盞服盖取此繭汁為其殺蟲故爾也治蛔蟲攻心臍如刺口吐清水右取鷄子一枚開頭去黄以好漆内於中合和仰頭向臍蟲出自浄治蛔蟲攻心腹痛出本草右取薏苡根二斤切水七升煮取三升先食盡服之其蟲死盡出療蛔蟲心痛積年乆不瘥右用取苦酒五合燒青錢二文令赤安酒中又别取鷄子白一顆却去錢㵼著酒中頓服瘥治蛔蟲攻心痛右以使君子任意喫又方出仁存方右以鹽醋煮馬齒莧一椀空腹食之少時當盡下一方但生搗絞汁服當利惡物療蛔蟲方右以菉豆三升煮取濃汁麻子一大升研取汁一升許以下然後取汁半升和豆汁一升更煖令温正發時即炙羊肉脯令熟先令嚥汁三五嚥即服之湏㬰當即吐或出利其蟲已消如帛練帶三二百條如未即盡更服即永絶一方服麻子汁效治蛔蟲攻心楚痛宛轉欲死方右濃搗地黄汁和麺煮作冷淘不用著鹽醋盡意食啗之如一頓蟲不出再服食治蛔蟲攻心如刺吐清水右用龍膽一兩去頭剉水二盞煮取一盞去滓隔宿且不食平旦一頓服療蛔蟲攻心右取槐子樹上木耳燒灰為細末每服水調如棗許於正發時服若不止飲熱水一升蛔蟲出療蛔蟲心痛惡心吐水右用乾漆熬搗蜜和丸如梧子大每服十五丸日一再服貫衆散治蛔蟲攻心吐醋水痛不能止貫衆一兩鶴蝨一兩狼牙一兩麝香一錢蕪荑仁一兩龍膽一兩右細羅為散食前以淡醋湯調下二錢通大小腸治蛔蟲攻心病白麻油一合鷄子兩顆半芒硝一兩右三味攪匀服之少時即㵼治寸白蟲右取櫻桃東行根搗絞汁服之治寸白蟲右用緑礬一塊杵之為末温漿水一盞生油五七㸃入同調五更初服治寸白蟲右用銀泥錫一彈子大以生麻油和丸南粉為衣作如餅子厚著竹紙裹熨斗火上焙乾出火毒候冷令患病人五更初用丁香七粒同一餅細嚼令酒嚥下俟至晩腹痛如厠蟲盡出永不發䘌蟲附論夫五臟下唇内生瘡者其人喜服此蟲在下蝕其下部人不能知可服此藥蝕蟲藥不尔䘌蟲殺人凢蟲濕䘌者多是熱病後或乆下不止或有客熱結在腹中或易水吐温凉氣着多生此病亦有乾䘌不甚泄痢而下部瘡癢不問乾濕乆則殺人凢濕得冷而苦利單煮黄連及艾葉苦參之属皆可用之若病人齒斷無色齒上白者或喜服煩憒不知痛癢處或有下痢急治下部不曉此者但攻其上不以下部為意下部生蟲蟲蝕其肛肛爛見五臟便死燒艾於竹筒熏之方懊憹散治濕䘌瘡爛殺蟲除䘌方扁竹五錢雚蘆雷丸青箱女青桃仁各三兩右治下篩粥飲服方寸匕日三加至二匕亦酒服治濕䘌方青黛二兩黄連黄蘗丁香各一兩麝香二分右治下篩以小棗丸内下部中日一度重者棗大和車脂二三合灌下部日二次治濕䘌方右取生薑刮皮斷理切之極熱研取汁一升半又以温水一升半合和相得平旦空服仍削生薑二枚如蠶繭大以秋葉苦桃葉重包於煻灰火中燒令極熱却内下部中食頃若濕盛者三旦作頻服無有不瘥穀道䘌赤痛又癢方右用杏仁熬令黄搗以綿塗導之又方右用雄黄吹在上良治䘌蟲蝕下部右以泥作甖以竹筒如大指一頭坐甖缸中一頭入下部孔中以鷄子大艾一團燒之以指作􅑥口吹之要常令艾烟熏下部强人可益良乆治濕䘌方黄連生薑各十兩艾葉八兩苦參四兩右㕮咀以水一斗煮取三升分三服乆者服三劑薑蜜湯治䘌生薑汁五合白蜜三合黄連三兩右以水二升别煮黄連取一升去滓内薑蜜更煎取一升二合五嵗兒平旦空腹四合日三杏仁湯治濕䘌杏仁五十枚苦酒三升鹽一合右和煮五合頓服之小兒以意量服阿膠湯治䘌蟲蝕下部癢穀道中生瘡阿膠當歸青葙子炒各一兩右麄搗篩每服五錢水一盞半入艾葉十餘片同煎至一盞去滓空腹午食近晩各一治蟲蝕下部方出千金方胡粉雄黄右各等分為末著穀道中亦治小兒治蟲已蝕下部吐盡腸穿者右取長股蝦蟇青背者一枚鷄骨一分燒灰合吹向下部令深入數用大騐治蟲狀如蠋牛食下部癢用扁竹一把水二升煮煎五嵗兒空腹服三五合隔一宿合明早食之尤佳甚騐治下部蟲齧并三蟲右杵梅桃葉一斛蒸之令極熱内小器中大布上坐則蟲死或以桃葉汁飲一升療瘟癘疳䘌右以崑崙草搗汁單服一名草蒿即葙子草也治百蟲入肉䘌蝕瘙疥出枚師方右以繭鹵汁浸瘡治疳䘌無問去處皆治之出枚師方右以蝦蟇燒灰好醋作傅日三五度敷之瘥普濟方卷二百三十九
