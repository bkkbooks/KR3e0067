body:
  text: 普濟方卷二百三十九明周王朱橚撰諸蟲門諸蟲附論夫人腹中有尸蟲此物與人俱生而為人大害尸蟲之形狀似大馬尾或如薄筋依脾而居乃有頭尾皆長三寸又有九蟲一曰伏蟲長四分二曰蝤蟲長一尺三曰白蟲長一寸四曰肉蟲狀如爛杏五曰肺蟲狀如蠶六曰胃蟲狀如蝦蟇七曰弱蟲狀如瓜瓣八曰赤蟲狀如生肉九曰蟯蟲至細微形如菜蟲伏蟲則羣蟲之主也蝤蟲貫心殺人白蟲相生子孫轉多其母轉大長至四五丈亦能殺人肉蟲令人煩滿肺蟲令人咳嗽胃蟲令人嘔吐胃逆喜噦弱蟲又名膈蟲令人多唾赤蟲令人腸鳴蟯蝤居胴腸之間多則為痔劇則為癩因人瘡痍即生諸癰疽癬瘻瘑疥齲蟲無所不為人亦不必盡有有亦不必盡多或偏有或偏無頽婦人常多其蟲凶惡人之極患也常以白鹽草沐浴佳根葉皆可用既是香草且尸蟲所畏也凡欲服補藥及諸病皆須去諸蟲并疾飲宿醉醒後除盡方可服補凡得傷寒及天行熱病腹中有熱又人食少腸胃空虛三蟲行作求食蝕人五臟及下部若齒斷無色舌上盡白甚者唇裏有瘡四肢沉重芴芴喜睡當數看其上唇內有瘡唾血唇內有粟瘡者心內懊憹痛悶此蟲在上蝕也九蟲皆由臟腑不實脾胃俱虛雜食生冷甘肥油膩醎等物莭宣不時腐敗停滯所以發動又神志不舒精魂失守及五臟勞熱又病餘毒氣血積鬱而生或食果蓏與畜獸內藏遺留諸蟲子類而生蟲之為候嘔惡吐涎口出清水痛有去來乍作乍止寸白蟲色白形褊損人精氣力乏腰疼蟯蟲細如菜蟲能為痔痿瘡癩疥癬癰疽等患寸白蟯蟲是三者皆九蟲數中之一物也外此有兒童疳􅉶昏睡煩燥鼻爛汁臭齒齦生瘡下痢黑血蟲食下部為狐下唇有瘡蟲食其臟為上唇有瘡三蟲者為長蟲蟯也乃有九種而蟯蟲及寸白人多病之寸白從食牛肉飲白酒所成相連一尺則殺人服藥下之須結裏潰然出盡乃佳若斷者相生未已更宜速除之蟯蟲多是小兒患之大人亦有其病令人心痛清朝口吐汁煩燥則虛弱而動或因食甘肥而動其發動則腹中痛發作種聚行來上下痛有休息亦攻心痛腹中熱口喜吐涎及吐清水貫傷心者則死診其脈中痛其脈法當沉弱弦今反洪而大則煙蟲也方鶴蝨丸出聖惠方治積年常患諸蟲心痛吐水不能食鶴蝨附子狼牙檳榔乾漆搗碎炒令煙出白术甘草陳橘皮已上各一兩吳茱茰三分湯浸乾薑三分狼毒一兩半右為末煉蜜和搗三二百杵丸如梧桐子大不計時候以粥飲下十五丸木香檳榔丸殺下諸蟲雞心檳榔一兩木香鶴蝨貫衆錫灰乾漆使君子輕粉二錢雷丸巴豆各二錢半右為細末飛白麵糊丸麻子大每服二十粒五更粥飲下或菖蒲石榴根煎湯下蝦蟇丸出直指方殺蟲大蝦蟇乾木香雞心檳榔貫衆桃仁苦楝根各三錢酸石榴根皮三錢蕪荑二錢鶴蝨二錢巴豆肉二錢半右為細末糯米粉糊研丸麻子大每服十丸五更石菖蒲煎湯下碓砂丸出直指方殺諸蟲鶴蝨蕪荑乾漆殭蠶各三錢貫衆酸石榴根皮晒乾各半兩硃砂雄黃雷丸甘遂各一錢半右為細末粳米粉糊丸麻子大每服十丸五更粥飲下木香三稜散出瑞竹堂方治腹中有蟲面色痿黃一切積滯黑牽牛大腹子檳榔雷丸錫灰三稜蓬术木香大黃已上各一兩右為末每服三錢空心用蜜水調下或沙糖水亦可須先將燒肉一片口半嚼之休咽下吐出口中血汁後服藥取蟲積檳榔半斤牽牛雷丸三稜二兩蓬术二兩苦楝皮一兩大黃四兩皂角半斤隨意加木香右為末煎皂角膏子打糊丸如香黍大每服二錢四更時分冷茶清下小兒一錢下蟲白粥補大效追蟲丸雷丸一兩白蕪荑一兩檳榔一兩使君子肉半兩白术半兩黑牽牛一兩大黃錦一當歸一兩右為末不可見火用麵糊為丸如桐子肉大每服三十丸小兒七丸或三丸量人虛實勞症桞桃頭湯五更下小兒沙糖空心下諸雜病薑湯送下勝金丸治蟲動心痛不可忍貫衆白殭蠶蕪荑乾漆檳榔桂各一兩厚朴一兩半雷丸右為末煉蜜丸梧桐子大每服十五丸空心食前溫漿水下初服三五日取下諸蟲乃效若蟲多即服藥十以上曰方驗鶴蝨散治取男子婦人腹內諸積蟲積無時攻心疼痛及口中及大便時有蟲者服之立效雷丸鶴蝨黑狗骨使君子苦棟根檳榔各一兩加輕粉一錢右為末每服三錢蔥白五根熬湯稠滴小油少許入藥內五更服如要服此藥隔夜不食夜飯次早五更空心燒豬肉二兩重喫後却服藥若大便踰時不行單用牽牛頭目末三錢漿水調服取下蟲物有一托長餘莭莭相連屢見效蒼术澤㵼丸出拔粹方胃為三焦相火盛而制陽明燥金故木相侮木主生五蟲所以胃中有蟲也因多食熱物胃大熱若㵼三焦火熱退則使金得氣而制木木既受制五蟲不生而自愈矣蒼术去皮三兩澤㵼桔梗各二兩地榆一兩皂角子秦芁二兩右為末燒飯為丸桐子大食前溫水下三十丸或酒米飲下一方無秦芁萬靈丸治取蟲宣積黑牽牛一斤取頭末十五兩生用荆三稜五兩蓬术煨三兩大腹子一斤取七兩雷丸五兩廣木香五兩右為末和勻用好紫色皂角半斤去皮弦碎用水兩大碗浸一宿冬月兩宿撈去粗滓銅磁器內熬數沸白沫出為度放冷和藥必須淨杵搗丸梧桐子大每服四錢重五更用沙糖水送下溫冷不妨至天明去利四五行者看取下是何蟲積溫白粥補之忌生冷腥硬之物孕婦勿服無憂散治男子女人小兒諸般蟲積已未成癰瘕脾疳及膀胱隂囊腎腫婦人血蟲如懷鬼胎月水不通并一切危急之症悉皆治之白牽牛二兩半白蕪荑用末二兩檳榔去皮用末二兩黑牽牛一兩大黃半兩雷丸半兩右為末勻和一處每服四錢用蔥白根熬湯五更服次早大便中方見藥力之效小兒或一錢二錢大小加減石榴枝散治蝤蟲寸白等心腹㽱痛東引石榴根一兩膩粉一錢芍藥銼炒三分陳橘皮去白焙半兩檳榔萆􅐺各一兩右搗細散每服二錢空心煎棗湯調服日晚再服白术丸治諸蟲白术四兩澤㵼二兩地榆枳實皂角子各兩右為細末燒飯為丸桐子大米飲或白湯或溫酒下化蟲丸治腹中有塊以起手按之不見作聚往來痛無休止亦治心痛五更心嘈牙關強硬嘔吐涎沫清水及夢中齧齒面色青飲食雖多不能肌膚或寒或熱沉沉默默不知病之去處有蟲不療則子母相生無有休止長一尺則害人胡粉炒五分鶴蝨三錢白礬五錢檳榔五錢苦楝根五錢右為細末麵糊丸如麻子大每服十五丸溫漿入生麻油一兩點打勻下溫米飲下亦得不拘時候其蟲細小者化為水大者自下檳榔丸出聖惠方治諸蟲心痛多吐四肢不和冷氣上攻心腹滿悶檳榔鶴蝨桂心吳茱茰陳橘皮已上各一兩右為末煉蜜和搗百餘杵丸如梧桐子大不計時以熱酒下三十丸一方療煙蟲心痛以蜜湯下三十丸蟲出為度忌生蔥治諸蟲心痛出聖惠方酸石榴枝桃白皮各一兩陳橘皮一分髙良薑半兩檳榔一兩右細銼和勻每服半兩水一盞煎至五分去滓不計時稍熱服之桃皮湯出千金方治蟯蟲及痔𧈟蟲食下部生瘡桃皮艾葉各一兩槐子三兩大棗三十枚右㕮咀以水三升煮取半升頓服之良一方粗搗篩每服三錢水一盞煎至六分空心食前夜卧各一服酒蠟膏出直指方殺諸蟲醇酒一盞蜜三錢蜀漆一兩右銅銚內慢火同熬可丸即丸彈子大每服一丸溫酒化開朝晚服之蟲自下化蟲散出直指方雷丸二個雞心檳榔二個鶴蝨一錢使君子七個右為末入輕粉少許分作兩服當晚用豬精肉一兩切成片皂角漿浸一宿至五更微火炙熟又用紫清油拭肉候溫取一服藥末摻於肉上略烘過空腹食之至已刻蟲自下乃飲食一方無鶴蝨補金散出拔粹方治諸般蟲鶴蝨雷丸定粉錫灰已上各等分右為末每服三錢空心小油調下又用豬肉一兩燒熟摻藥在上下細嚼亦得用翎掃甘遂末一錢與前藥一處服之其蟲自下治諸蟲在胃中漸漸羸瘦雞子白蠟三分乾漆蜜一合右藥於銅器中以慢火煎令可丸即丸梧桐子大每服空心服以粥飲下七丸漸加十丸當下諸蟲變為黃水乾漆散治諸蟲痛乾漆雄黃檳榔訶梨勒右為散每服五分入麝香少許用蔥汁生油調空心服青橘丸治諸蟲動發上連心痛青橘皮蕪荑貫衆雷丸右為末煉蜜丸如梧桐子大每服二十丸食前橘皮湯下加至三十丸蟲下為度蕪荑散取諸蟲雞心檳榔蕪荑木香右為末一服當晚先煎酸石榴根湯至五更喫炙肉一片嚼細引蟲上至喉以石榴根湯暖溫調藥服蟲自軟而下漆香散治大人小兒腹中蟲動痛發不止乾漆雄黃麝香右先搗乾漆為末次入雄黃麝香再同勻以蜜器盛之每服一錢苦棟根湯調下食前小兒以意加減皂莢丸治心痛如蟲咬皂莢杏仁右先搗羅皂莢為末次與杏仁相和搗為丸如小豆大每服七丸粥飲下發時喫乾漆湯治蟲咬心痛乾漆胡椒右搗篩每服一錢水一盞入蔥白一寸麝香少許煎七分去滓溫服檳榔丸出聖惠方治諸蟲心痛多吐四肢不和冷氣上攻心腹滿悶鶴蝨一兩乾漆一兩搗碎右為末煉蜜和丸如梧桐子大每服十丸不計時以醋湯下又方出聖惠方東引石榴根一兩銼膩粉右用水一大盞煎石榴根至五分去滓調膩粉以利下蟲為效制諸蟲方出本事方白蕪荑檳榔各一兩右為細末蒸餅丸如梧子大每服十五丸至二十丸溫湯下治諸蟲心痛多吐四肢不和冷氣上攻心腹悶右用鰻鱺魚淡炙令患人三五度食之治心腹蟲痛脾胃虛冷氣併冷熱虛泄赤白痢等右用肉豆蔲以白粥飲服治疳蟲本草右以端午日取蟾蜍眉脂用硃砂麝香為丸如麻子粒大小孩子瘦者空心一丸如腦疳以妳汁調滴鼻孔中治疳蟲用苦參炒帶煙出為末飲下治熱病蛄毒令人喜寐不知痛處面赤如醉下痢膿血當數視其人下部大小之孔稷稷然一云搜搜然赤則𧈟瘡者也劇因殺人見人肝肺服藥不瘥可熏之出千金方右以泥作小罌令受一升竹筒一枚如指大者一頭即橫穿入罌腹中一頭內人穀道中淺入可取熱艾團如雞子大著罌中燃之於罌口吹煙令入人腹艾燃盡乃止大人可益艾小兒減之羸者不得多多亦害於人再熏不過三作蟲則死不斷亦可末燒雄黃仍如此熏之貫衆酒出直指方右取寸白諸蟲五更嚼炙肉一片莫吞俟蟲尋肉其蟲頭向上却吐出肉嚼使君子三箇并輕粉一匙吞咽下少頃以當晚所煎貫衆酒吞解毒雄黃丸七粒則㵼下皆蟲也殺五臟蟲并諸蟲右取側柏葉焙乾為末與川黃連同煎為汁服之良道家多作柏葉湯常點益人枯葉尤佳油麻散治胸喉間覺有癥蟲上下遍聞蔥豉食香此是髮蟲油煎蔥豉令香二日不食張口而卧將油蔥豉致口邊蟲當漸出徐徐以物去之南粉散治腹中諸蟲令人腹痛多食泥土及油者右用南粉二錢細研五更初用生油調下至食時蟲即出盡砒黃丸治諸蟲痛右用砒黃細研一兩以水浸炊餅心為丸如小豆大只每服二丸煮肉湯下空心服金液丹出直指方壯陽道健胃氣除冷癖殺諸蟲右用好硫黃十兩飛煉去砂石研細末入瓷盒水調和赤石脂封口研泥固濟日乾於地埋小罐子盛滿了水安瓷盒在上再用泥擠慢火養七日七夜次即加頂火一通冷取出研末每一兩用蒸餅一兩湯浸手握去水為丸梧子大每服三十丸空心米飲送下白金散治臟腑內一切蟲令人褊好食生物及面黃嘔吐或時心腹發痛但是蟲病悉治右用狼毒不拘多少為細散每服一錢用餳一皂子許大沙糖少許以溫水同化下臨卧放冷空心服之至服藥時覺腹微動氣食藥一服來日早取下蟲為見效寸金散治大人小兒諸蟲為病及骨蒸勞羸瘦飛尸遁尸鬼室女經脈不行五心煩熱怠惰少力右用乾漆不拘多少炒令煙出為細散每服一錢加以生油溫水攪勻調服若治小兒每一斤再加入白蕪荑仁三兩搗取細末更研雄黃半兩合研勻量兒之大小亦用生油溫水調服清米飲亦得如是室女有經脈不行服之必行其餘蛔蟲服無不效者蕪荑散出肘後方治脾骨有蟲食即痛面黃無色疼痛無時立效方右用石州蕪荑仁二兩麵炒令黃色為末非時米飲調服二錢瘥又方治蟲咬心痛右用白蕪荑微炒一兩為末用沙糖丸梧子大每服吞十丸破宿血殺蟲右以獅子屎服之即蘇合香治諸蟲在臟腑久不瘥右以檳榔半兩炮搗為末每服一錢至二錢蔥蜜煎濃湯調下空心服沙應丸治諸蟲積惡物盡下檳榔大腹子各十兩淨取末十二兩蕪荑淨一兩黑牽牛二斤取淨末十二兩大黃淨四兩雷丸淨一兩錫灰淨四兩木香淨一兩右為末一處滴水為丸如小七香丸大每服四錢重五更時候用蔥白湯送下治大腸蟲出百十尺不斷斷之復生行坐不得右用鶴蝨末水調五錢服之自愈治蟲心痛千金方右用鶴蝨一味為末蜜和丸如梧子大每服四十丸煎蜜湯下日一服可加五十丸一方為末溫漿和空腹時服豆䓻散朱氏集驗方治腹痛陳皮甘草訶子使君子半夏沒石子各半兩厚朴七分木香肉豆蔲各二錢半右㕮咀每服三錢薑三片棗三枚水一盞煎七分無時湘中醫者陳必勝以此醫一女使遂除根化蟲丸朱氏集驗方治諸蟲蕪荑錫灰神麴麥蘖右等分為細末麻油為圓取初五更空心用炙豬肉細嚼咽汁不喫肉汁引動蟲次用濃煎石榴根湯下丸子藥十丸又方朱氏集驗方右急以酒調好雄黃末傳之毒水流如涎大效又方治諸蟲心痛多吐四肢不和冷氣上攻心腹滿悶楝樹東南根白皮一兩樹有子者右細銼以水一大盞煎至五分去滓空腹溫服雷金散出衛生寶鑑方取諸蟲雷丸末八分鬱金末七分黑牽牛末一錢半右為末和勻以生油調下以三兩匙飯壓之制蟲蜜勞恱澤膚去勞熱檳榔一兩半龍膽一兩乾漆半兩右為末煉蜜圓如梧子大每服十丸至十五丸熟水吞下又方出本事方右用定粉研每服一錢用麻油調五更服晚取下助肺殺諸蟲下氣令人能食消心腹間惡氣卒心冷氣淡寮方右以榆子作漿食之良亦甚香美有少辛味陳者尤為佳治疳蟲食人脊骨者出本草右以鼠李根煮濃汁空心服一盞良如智丸出本草治蟲痛方見本門寸白類名香附丸治腹中蟲毒右用營實根皮濃煮汁服之治病咽塞食不下有蟲毒者右用小蒜虀大蒜三升飲之當自痊可昔華他路逢一車載一人病咽塞食不下呻吟他曰餅店家蒜虀並大醋三升飲之當自痊其病人遂依言飲之果吐出大蛇一枚而自愈九蟲附論夫蟲與人俱生而藏於幽微其為害也蓋本於正氣虧弱既食生冷復感風邪所以種種變化以至蕃息初若不足畏而其甚可以殺人善攝生者薄滋味節嗜欲蚤去三尸防患於未然彼九蟲亦將銷鑠於冥冥之中惟未進此道則攘蘖剔蠧無使滋蔓蓋有藥存焉名狀見諸蟲論方貫衆丸出聖惠方治九蟲動作變生諸病貫衆石蠶各一兩一分狼牙銼藜蘆蜀漆白殭蠶厚朴各三分雷丸炮一兩半白蕪荑炒一兩右為末煉蜜和為劑更於臼內入酥少許杵令勻熟丸如梧桐子大每服十丸空心溫漿水下午時臨卧再服一方無厚朴另有檳榔石榴枝湯治九蟲動作腹中刺痛口吐清水面色黑黃及蟲攻心痛者東引石榴枝三兩木香陳橘皮吳茱茰各一兩半大黃芍藥各二兩薏苡仁二兩半右㕮咀如麻豆大每服五錢水一盞半煎八分去滓空心溫服麝香丸治九蟲黃連去鬚一兩白蕪荑炒二兩乾蝦蟇一枚乾漆炒去煙一兩雷丸炮半兩定粉研一兩半右為末入麝香少許再研羅勻用醋煮麵糊和丸梧桐子大每服溫水下十丸空心食前服麝香丸出聖惠方治九蟲麝香半兩犀角屑一兩雄黃半兩甘遂一兩巴豆半兩硃砂半兩右為細末入巴豆及研了藥令勻煉蜜和丸如梧桐子大每服空心以溫水酒下五丸檳榔散治九蟲在臟日久相生轉多下蟲檳榔一兩蕪荑仁半兩狼牙一分白蘝一分鶴蝨一分右為細散每服藥時不得喫夜飯候至四更以來將暖水一盞調下三錢其蟲㵼下雞子丸治九蟲雞子好漆蠟三兩粳米粉右先取漆蠟入銅鐺中用慢火攪令得所次入粳米粉又攪令勻煎令凝候可丸即取鐺置坐黃土上才候稍溫即下雞子又攪令得所再置火上煎令可丸如小豆大隔宿勿食於空腹煎粟米飲下二十丸小兒五丸千金有茱茰根桑皮狼牙散治九蟲在腸胃令人心煩吐逆下蟲狼牙鶴蝨貫衆蕪荑各等分右為細散每服以粥飲調下一錢良久再服蟲盡為度蕪荑散治九蟲蕪荑仁狼牙檳榔石榴根皮各等分右細羅為散每日空心以溫酒調下二錢狗脊散治九蟲狗脊芎藭細辛白蕪荑各等分右為細散三更後先喫牛肉淡乾脯三二兩五更初以粥飲調下三錢良久當有蟲下為度三蟲附論夫三蟲亦九蟲之數曰蛔曰赤曰蟯是也其發動諸病較之他種為甚蛔蟲又曰長蟲長一尺動則吐清水心痛貫心則死赤蟲狀似生肉動則腸鳴蟯蟲至細微形如菜蟲居胴腸間多則為痔極則為癩或生諸癱疽癬痿瘑疥而其變甚多三蟲為患如此古人祕析而治之意亦深矣方白蘝丸治三蟲發動心痛等疾白蘝狼牙藜蘆桃花貫衆陳橘皮白蕪荑右為末煉蜜和為劑更於鐵臼內入稱杵令勻熱丸如小豆大每服二十丸隔宿勿食空腹漿水下至晚再服漸加至三十丸妊娠婦人勿服鱉甲丸治三蟲發痛面目黃不下食鱉甲白术陳橘皮木香狗脊檳榔吳茱茰三次換水洗去土焙乾微炒一兩右為末煉蜜和為劑置臼內入酥杵令勻熱勻丸如梧桐子大每日空心服煎青橘皮湯下三十丸晚食前再服芎藭散治三蟲芎藭白芷雷丸桔梗右為細末每服二錢用蜜并醋各少許解勻調服或米泔汁調服亦得每日空腹日午近晚各一服竹莭丸治三蟲燒竹莭雷丸錫屑陳皮右搗下篩蜜丸如梧桐子大一服八丸日三服斷蟲也一方溫水送下雚蘆散治三蟲雚蘆乾漆吳茱茰右為細散每服二錢煎粟米稀粥調空心服一方先嚼淡乾脯後服天門冬治三蟲保定肺氣去寒熱養肌膚益氣力利小便及諸暴中偏風濕痺強骨髓天門冬半斤右先取天門冬細銼爛研如泥用酒一斤和絞取汁并蜜攪之令勻銅器中重湯上煎仍用竹箆攪後如餳每服如彈子大空腹溫湯服之或用生地黃汁一盞同煎妙亂髮灰散治三蟲并蟯蟲亂髮丹砂各二兩右同研極細每服一錢醋調空心服之一方用真珠苦酒調服治蟯蟲雷丸散治三蟲雷丸炮一兩芎藭一兩右為細散每服一錢空腹服煎粟米飲調下日午近晚各一服鶴蝨散出聖惠方治三蟲鶴蝨二兩雚蘆一兩右為細散每服一錢用豬羊肉臛汁調空腹日午近夜各一服一方無雚蘆療三蟲方肘後方茱茰根取東引指大者長一尺剝取白皮栝蔞四兩切一升右件細銼茱茰根以水一升漬之一宿旦絞滓宿勿食旦空腹先喫脯然後遂服之小兒再三服亦療寸白蟲雚蘆散肘後方治三蟲神效兼治蟯蛔蟲攻心如刺吐清汁并寸白蟲右用雚蘆微炒二兩為細散每服二錢隔宿勿食於日清旦用肉臛汁調服之蟲自下一方飲臛和服檳榔湯治三蟲並寸白蟲右用檳榔三枚灰火煨過粗搗篩用水三鍾煎至一鍾半漉去滓分三服空腹日午前近夜各一服其蟲即盡下或和蔥白鹽豉同煮飲之亦佳一方治寸白蟲用好檳榔二七枚治下篩以水二升半煮去皮取一升半濾去滓內末頻服晚卧蟲出或不盡更服取全瘥止宿勿食旦服之木香湯治三蟲心痛黃面不下食木香三分檳榔三分薏苡仁炒一兩陳橘皮焙三分吳茱茰炒一分東引石榴枝炙銼一兩半右㕮咀每服二錢水一盞煎七分去滓溫服如人行三四里再服殺三蟲毒邪氣破老血出本草右取竹肉以灰汁煮三度煉然後依常菜茹食之煉之不熟者戟人喉出血手爪盡脫竹肉生枯枝上如家雞子似肉臠應别有功人未盡識之一名竹實也治三蟲右用桃葉絞汁一升飲導引法療三蟲右以兩手著頭相生義手長幼氣即吐之坐地緩舒兩腳以兩手從外抱膝中痛低頭入兩膝間兩手交叉頭上十二遍愈三蟲又云叩齒二七過輒咽氣二七如是三百通乃止為之三十日邪氣悉去六十日小病愈百日大病除三蟲伏尸皆去面體光澤五臟蟲附論夫五臟蟲者緣臟真衰弱熱氣薰蒸而成之傳所謂肉腐出蟲魚枯生蠧理固如此其名狀之異見於九蟲序可辨而察也方麥門冬丸出聖惠方治肺熱生蟲其形如蠶令人咳逆氣喘或謂憂膈氣膈患膈寒膈熱膈皆從勞熱氣生名曰膏欲病針炙不至麥門冬十兩蜀椒一兩人參一兩一分逺志附子細辛各一兩半甘草一兩半乾薑一兩桂去粗皮百部焙白术黃蓍各一兩一分杏仁半兩右為末煉蜜和更於鐵臼內塗酥杵令勻熱丸如酸棗大含化稍稍咽津一方有檳榔一方無白术前胡湯治脾有白蟲長一寸在脾為病令人好嘔胸中咳即嘔而不出前胡白术赤茯苓枳殼細辛旋覆花常山松蘿各一兩半龍膽杏仁各兩右粗搗篩每服五錢水二盞入竹葉十片淨洗細切同煎至一盞去滓空心服吐之即瘥若腹中熱滿入黃硝五分梔子仁一兩半苦參一兩一方用枳實無枳殼雷丸丸治心臟勞熱傷心有長蟲名白蟲長一尺貫心為病雷丸陳橘皮桃仁各一兩一分狼牙一兩半貫衆半兩白蕪荑青箱子乾漆各一兩亂髮燒為灰右除亂髮燒灰餘搗為末然後與亂髮灰同研令勻煉蜜和更於鐵臼內塗酥杵令勻熱丸如梧桐子大每服空心溫酒下十五丸至晚再服米飲亦得一方用塗酥一方有殭蠶吳茱茰根皮貫衆散出千金方治勞腎熱四肢腫急有蟯蟲如菜中蟲生於腎中貫衆三枚乾漆三兩吳茱茰一兩半白蕪荑槐白皮各一兩胡粉一兩杏仁半兩右除别研胡粉外搗羅為散更與胡粉同研令細每服二錢空腹用井華水調服日晚再服檳榔散治蟲多脾病乍去乍來嘔吐清沫雞心大檳榔貫衆各分石菖蒲木香各分甘草一錢右銼每三錢水煎空心加靈砂金液丹服盡靈砂金液有硫黃水銀能殺蟲也桑根白皮湯治肺勞熱生蟲在肺為病桑根白皮取一升狼牙三兩吳茱茰根皮淨刷去土五兩右細銼用酒七升煮至二升去滓分作三服每日空腹一服一方無狼牙茱茰根浸酒方出聖惠方治脾勞有白蟲在脾中為病好嘔吳茱茰東引者一尺銼麻子八升陳橘皮右先搗碎橘皮麻子如泥然後拌茱茰用酒一斗浸宿慢火上微煎絞去滓分作五服每服空心溫服蟲即下凡欲合藥時忌言合煞蟲藥一方以水煎服檳榔散治蟲動心痛檳榔一兩乾漆一兩石灰三兩右件為末每服一錢用熱酒調放溫連二服不拘時候一方右用杏仁輕粉最殺蟲治臟腑內一切蟲病出本草方殺腹臟蟲右以槐花炒服治五種蟲右以楝皮去其蒼者焙乾為末米飲下二錢匕蟯蟲附論夫蟯蟲是九蟲之一甚微細如今之蝸蟲亦由臟腑虛弱而致發動其始若不足慮者然其生化衆多攻心刺痛時吐清水在胃中浸蝕不已日加羸瘦甚則或痔瘻疥癬癰疽諸癩齲蟲害人若此絶其本根勿使能殢則毒而治之所不可忽方石榴散治蟯蟲酸石榴根乾漆狼牙鶴蝨檳榔銼各一兩右為細散每服二錢空心溫酒調下芫花散治蟯蟲芫花三分狼牙三分雷丸三分桃仁三分白蕪荑三分右為細散隔宿勿食平旦以粥飲調下一錢一方無白蕪荑又方聖惠方貫衆狗脊白蕪荑已上各一錢桃花半兩麝香一分右為細散每服二錢空心溫酒調下良久再服蜜香丸治蟯蟲蜜陀僧煆一兩麝香研五分硫黃研一分定粉研半兩右為細散醋煮麵糊丸梧桐子大每服十丸空心蕪荑湯下槐皮丸治蟯蟲在胃漸加羸弱槐皮桃仁楝實各半兩右為末煉蜜豬膏丸如人指大以綿裹導下部中巴豆桃仁丸治蟯蟲巴豆五枚桃仁炒二十兩右同研極細丸如梧桐子大每旦空心服溫漿下大人兩丸小兒一丸蟲下再服艾汁方治蟯蟲攻心如刺吐清水并寸白蟲良久再服蟲當下右用艾葉并嫩心切二升搗研絞取汁兩盞許宿不可食平旦先嚼乾脯少許後頓飲汁不能盡即兩日徐服一方治蛔蟲旦取肥香脯一方寸片先喫令蟲皆聞香然後飲一升當下蛔一方搗艾葉以苦酒煎而服之良一方治寸白蟲隔宿勿食好淡羊肉乾脯用一二兩嚼咽汁令蟲聞香然後飲艾汁一盞又却取水解一盞初五更先喫炙豬肉一片服之蒺藜散治蟯蟲右於七月七日採蒺藜子並苖葉隂乾燒存性細研之每服二錢食後煎蕪荑酒調下日三又治諸蟲方水銀膏治蟯蟲咬人下部癢右以水銀一兩蒸用棗膏丸如人指大綿裹臨卧導於下部中一宿內藥時常留綿帶子在外一方水銀恐損腸宜慎之治蟯蟲方右以好鹽末二兩苦酒半升合銅器中煮熬數沸宿則不食空心頓服之治蟯蟲攻心如刺口吐清水并煙蟲咬腹內痛右用苦楝子取根銼水煮令濃赤黑色以汁合米煮之作糜隔宿勿食來旦食一匙俟少時復食一匙半升糜便下蟯驗或用皮去其蒼乾者焙為末米飲下一二錢兼治五種蟲一方療蛔蟲但取肥香脯一片於先喫令蟲聞香舉頭稍從一口為度妙少進自然取食一匙半升糜便下蛔一方用苦楝樹白皮水煎之去滓熬成膏五更以溫酒服半匙用銀器內熬更為妙蛔蟲附論夫蛔蟲即九蟲序所謂長蟲者今此折而治之較之他害人多觀其發作冷氣臍腹撮痛變為嘔逆以至心中痛甚如錐昔人蛔厥貫心能殺人所以治之不可緩也聖惠論曰蛔蟲者是九蟲內一蟲也長一尺亦有長五寸或因臟腑虛弱而痛或疳肥而動則腹中痛發作種聚行上下痛無休息亦攻心痛喜吐涎及清水貫傷心者則死診其脈腹中痛當沉弱而弦今反脈洪而大則是蛔蟲也方烏梅丸治蛔厥令病者靜而復煩臟氣蛔上入膈故煩須臾復上得食嘔又煩者蛔聞食臭出其人自吐蛔兼治久痢烏梅一百五十箇當歸川椒細辛附子桂心人參黃蘖各三兩乾薑炮五兩黃連八兩右為末以苦酒漬烏梅一宿去核蒸之五斗米熟下搗或泥和藥相得內臼中與蜜杵一二千下丸如梧桐子大食前飲服十丸或加至二十丸溫米飲下食前服當歸湯治蛔蟲心痛如錐刺時吐白蟲當歸一兩桔梗一兩半陳橘皮桂去粗皮人參各半兩赤芍藥三分鶴蝨炒二分檳榔炮分朴硝研三分右除朴硝外粗搗篩入朴硝拌勻每服三錢水一盞煎至七分去滓空心服後半時辰再服靡蕪丸治少小有蛔蟲結在腹肚內數發腹中微下白汁吐而悶寒熱飲食不生肌皮肉痿黃四肢不相勝舉靡蕪貫衆雷丸山茱茰天門冬狼牙各八分雚盧甘菊花各四分右為末蜜丸如大豆三嵗飲服五丸五嵗以上以意加之漸至十丸加雚蘆六分名雚蘆丸治老小及婦人等凡病腹內冷熱不通急滿痛胸膈堅滿手足煩熱上氣不得飲食身體氣腫腰腳不遂腹內狀如雞鳴婦人月經不調無所不治集效丸治因臟腑虛弱或多食甘肥致蛔蟲動作心腹絞痛發則種聚往來下上痛有休止腹中煩熱口吐涎沫是蛔咬宜服此藥若積年不瘥服之亦愈又治下部有蟲生痔癢痛木香鶴蝨檳榔訶子蕪荑附子乾薑炒各七錢半大黃右為末蜜丸如梧子大每服三十丸食前橘皮湯下婦人醋湯下當歸散治蛔蟲痛發冷氣先從兩肋連胸背撮痛欲變吐逆當歸鶴蝨各二兩陳橘皮人參各一兩檳榔三兩枳殼芍藥各兩桂一兩一分右為散每服二錢空心煎棗湯調下至晚再服雷丸散治九種心痛蟲痛為先雷丸一兩貫衆一兩半狼牙當歸一兩半檳榔一兩桂一兩半鶴蝨一兩陳橘皮一兩右為散每服二錢空心煎粟米飲調下晚食前再服以大下蛔蟲為度一方用蜜湯下柴胡湯治蛔蟲心痛柴胡一兩半當歸食茱茰一兩芍藥一兩半厚朴銼一兩檳榔三枚郁李仁三分右粗搗篩每服三錢水一盞煎至六分去滓食前溫服日三桔梗散治蛔蟲攻心痛桔梗當歸芍藥各三分橘皮炒半兩檳榔鶴蝨各一兩萆􅐺一兩右為散每服二錢空心煎生薑棗湯調下至晚再服鶴蝨散治疳蛔寸白蛔蟲等發作心腹㽱痛鶴蝨炒三分檳榔一兩二分楝根皮二兩五錢陳橘皮五錢麥葉一兩半糯米一合牽牛子三兩右為散每服二錢空腹煎粟飲調下如未轉㵼即更服仍時煎薑蜜湯熱投之治蛔蟲右用赤藤煮汁服之桑根白皮湯治蛔蟲心痛每連臍腹刺痛多吐涎沫桑根白皮三兩酸石榴皮一兩白蕪荑檳榔厚朴各五錢右粗搗篩每服三錢水一盞入生薑一小塊擘破同煎至六分去滓空心服至晚再服石榴皮湯治蛔蟲心痛腹中㽱刺痛不可忍往往吐醋水酸石榴皮三分檳榔一分桃符一兩半胡粉一分右先搗篩前二味後以胡粉拌勻分為五服煎每服水一盞入桃符一分酒半盞同煎至七分去滓空心溫服至晚再服萆􅐺散治蛔蟲發作萆􅐺白蕪荑狗脊銼一分右為散每服二錢溫酒調欲服藥先隔一宿喫牛肉乾脯一片次日空心服藥蟲下即瘥麝香散治大人及小兒疳蛔腹中虛脹面目痿黃麝香銼研一分乾蚯蚓五錢乾蝦蟇一枚塗酥炙黃赤色淨剔去骨并去腹中惡物右先搗蚯蚓等為散與麝香同研令勻細每服一錢空腹煎薏苡根湯調下髙良薑湯治蛔蟲髙良薑銼一分苦楝根皮二兩胡椒三十粒右粗搗篩每服三錢水一盞煎至六分去滓空心服服訖卧少時未得喫食或吐或㵼即瘥雚蘆散治蛔蟲懊憹雚蘆乾漆各二兩扁蓄三分右為散每服一錢煎粟米飲調食前服日三漆煎丸肘後方治蛔蟲蟯蟲在胃令人漸漸羸瘦漆清白蜜清酒各半升右同攪令勻於銅鍋中微火煎常令沸不住手攪候如膏可丸即止丸如雀邜太每服一丸隔宿不食空心溫酒化破服之蟲即下不下再服亦可丸如梧子大空心服酒下二十丸甘草粉蜜湯治蛔蟲之為病令人吐涎心痛發作有時甘草二兩粉一兩蜜四兩右以水三升先煮甘草取二升去滓內粉蜜攪令和煎如薄粥溫服一升瘥即止檳榔煎治蛔蟲并寸白蟲檳榔五枚酸石榴根皮銼一升右先將檳榔粗搗與石榴根各均分作三度用每度用水二升半煎至一升半絞去滓入粟米一合煮如粥平旦空心頓喫利下蟲效一方治寸白蟲為散淡豬肉汁調五更初服候半時辰再服一方石榴根煎湯調末服先將豬肉含口中咽津下去肉却服藥狼牙散治蛔蟲或攻心吐清水並療白蟲狼牙一兩蕪荑一兩右細羅為散每一服藥空心先喫小淡羊肉乾脯即以溫酒調散二錢服之不過三四日永瘥治蛔蟲右用麻黃搗葉水絞取汁服五合治石蛔腹脹面黃極難療者右用死人枕煮汁服之昔張景年十五嵗腹脹面黃用衆藥不能治以問徐嗣伯曰石蛔耳即難療當取陳死人枕煮汁服之得大蛔蟲頭堅如石者五六升其病即瘥石蛔者醫療既癖蛔蟲轉堅世間藥豈能祛遣所以須是鬼物驅之然後乃散故令煮死人枕以服治蛔蟲咬心痛面青口中沫出臨死者本草右取扁蓄葉十斤細切以水三石三斗煮如餳去滓渣適寒溫空心服一升蟲即下至重者再服仍通宿且勿食來日平明服之治蛔蟲右以鼹鼠肉令大人小兒食之療蛔蟲攻心如刺吐津汁右用萑菌單末之豬肉臛和食之亦作羊肉臛和之旦日一頓服佳治蛔蟲右取楝實浮苦酒中浸再宿用綿裹內穀道中入三二寸一日易之治寸白蛔蟲右用金櫻花子止冷熱痢殺寸白蛔蟲等和鐵粉研細拔白髮傳之再出黑者亦可染髮薏苡根湯治蛔蟲右以薏苡根一握去土碎銼粗搗篩水三盞煎至一盞半漉去滓分二服空心先喫餳少許然後溫服又一方治蛔蟲攻心腹痛蠶蛹汁方治蛔蟲右取繅絲蠶蛹兩合爛研生布絞取空心頓飲之非值繅絲時即須依時收取蠶蛹暴乾搗羅為末用時任以意斟酌多少和粥飲服之鶴蝨散療蛔蟲並三蟲諸蟲右取波斯鶴蝨三兩搗散以肥豬羊肉但有一色以少蔥豉為臛汁每旦空腹以臛汁和一方寸七日頓服之稍多飲臛汁佳若不能散服即以蜜和為丸略如梧桐子大一服十丸還以此臛汁下之假令明旦須服今日未欲即勿食明旦服藥訖至巳時為佳要須服此丸散使盡已後三十日勿雜食永瘥或以苦酒於空心服之亦治諸蟲一年治涎蛔蟲出吐水心疼痛淡醋和服之蜜丸平旦漿水服一方治三蟲以豬羊肉臛汁調一錢空心服殺蛔蟲右以鹽麩子樹根白皮煎服殺腸中蛔蟲右用小麥熬煎末服療蛔蟲咬心痛右取鶴蝨十兩搗篩蜜和丸如梧子大以蜜湯空腹時吞四十丸日增至五十丸慎肉酒一方平旦漿水吞服二十丸又千金方為末溫醋下蟲當出桔梗散治蛔心痛桔梗當歸芍藥雷丸人參貫衆檳榔陳橘皮右為細散每服二錢空心煎薑棗湯調下日晚再服漸加至三錢增損當歸湯治心痛發作痛有休止喜涎出是為蟲亦治心腹藴結痛當歸芍藥黃芩朴硝桔梗柴胡升麻右㕮咀每服三錢水一盞煎七分去滓溫服狗脊丸治蛔蟲痛狗脊去毛一兩吳茱茰炒半兩陳橘皮焙三分蕪荑三分檳榔銼一兩半右為細末煉蜜和丸如小豆大每服二十丸食前橘皮湯下蕪荑散治大人小兒蛔咬心痛經心蟲貫心則殺人欲驗之大痛不忍或吐清黃緑水淋沫或吐蟲出發有休止此是蛔痛心也宜速療之仁存方乾漆煙盡一兩雷丸蕪荑各五錢右為細末每服二錢溫水七分盞調和服不拘時甚者不過三服小兒每服五分薑黃散治蛔蟲心痛喜吐水衝刺痛不可忍或不能食面黃腹滿薑黃一兩三分雚蘆銼一兩鶴蝨一兩一分右搗篩每服三錢水一盞煎七分又入酒一合更煎取沸空心服晚食熱飯即蟲下一服未盡更服鶴蝨飲治蛔咬心痛鶴蝨苦楝根焙各一兩碙砂一兩右先以二味粗搗羅入研藥和勻每服三錢水二盞新匙一柄銼折同煎一盞下朴硝末一錢煎沸去滓空心服乳香散治蛔心痛乳香研一分鶴蝨炒三分檳榔銼一兩半右為細散每服三錢大麻子汁調下檳榔散治蛔咬心痛檳榔銼蜀椒各半兩右為細散每服二錢米飲調下空心日晚各一服吳茱茰散治蛔心痛吳茱茰炒半兩鶴蝨一兩半右為細末每服二錢空心溫酒調下鶴蝨檳榔湯療心痛不可忍似蛔者鶴蝨二兩小兒用一兩大腹檳榔右以豬肉汁六升煮檳榔取三升去滓內鶴蝨末先夜不食明旦空腹頓服須臾病下及吐水瘥神效七日禁生冷酢滑一方用暖大麻仁汁調下二錢又方方發時取鹽一七內口中水下立定蟲即出治蛔蟲右用麻葉搗爛用水泡絞取汁五合服之麻葉乃今時人績布者是也去蛔蟲右用楝根煮汁作糜食之治蛔蟲右用漏蘆杵為末以餅臛中服方寸七治大人小兒蛔咬心痛心腹脹滿黃瘦右用醋麻子搗為末每服一錢匕調服之甚效寸白蟲附論夫寸白蟲乃九蟲之一種也狀似絹邊葫蘆子因臟氣虛風寒濕冷積腸胃又好食生膾乾肉等所以變化滋多難於蠲治説者謂食牛肉飲白酒所致特一端爾亦未必皆緣此方檳榔散治蛔蟲寸白蟲蛔蟲檳榔銼一兩半當歸鶴蝨各三分貫衆雷丸半兩蕪荑仁陳橘皮焙各三分右搗羅為末每服二錢空心煎棗湯調下至晚再服漸加至三錢利為度錫灰丸取寸白諸蟲錫灰細末一兩雞心檳榔貫衆各半兩木香二錢五分輕粉黃丹各二錢右為細末酒醋煮麵糊丸荔枝乾大每服一丸米泔浸軟日落先喫飯了至黃昏不飢飽時喫肉脯一片引蟲候少刻溫酒嚼下天明蟲出又喫韭菜治寸白蟲取寸白蟲出寸草方錫灰一兩木鱉一兩蘆薈二十枚黃丹十分輕粉十分右為末豬膏油丸如彈大先齋一日晚莫喫飯次早五更溫水吞下分作二服取寸白蟲出本事方蕪荑一錢雞心檳榔二箇狼牙草五錢雷丸三分輕粉少許右為末每服二錢四更時清茶調下隔夜點取茶四更時取清石榴根散治寸白蟲酸石榴根去土五兩碎切檳榔一顆膩粉研半錢鉛丹炒半錢右先取檳榔末等三味細末令勻再溫石榴根汁調藥末五更頓服凡欲服藥侵早先喫肥豬肉次便服藥檳榔散治寸白蟲每以月一日二三服之餘日勿服檳榔銼二兩陳橘皮桑白皮銼各三分蕪荑炒一兩右為散每服一錢半以漿水一中盞濃煎酸石榴根湯調空腹服欲服藥隔宿勿食清早先取乾脯一片細嚼咽汁少頃即服藥至晚蟲出未下煮白皮汁服之治寸白蟲令化為水出聖惠方狗脊貫衆白蕪荑酸石榴根已上各一兩右為散每服兩半以漿水一大盞煎至五分去滓四更初溫服先於晚間不得食夜飯又方出聖惠方狼牙白芨白蘝白蕪荑已上各一兩右為細末每食空心以溫酒調下二錢香附丸治葫蘆蟲亦治寸白蟲兼諸蟲木香為末一分附子硫黃研各半兩右先用蜜陀僧半兩入醋熬成膏然後入三味藥末一處和丸如小豆大每服十五丸溫酒下食前服一方先以釅醋一升煎附子末為膏次入三味為丸冷茶芥湯下頭日不晚食五更服為妙白蘝散出肘後方治寸白蟲為病令人兩眼無光澤腳膝少力蕪荑六分狼牙四分白蘝二分右治下篩以苦酒二合和一宿次早空腹服之一方漿水二盞治寸白蟲出德生堂錫沙蕪荑檳榔各等分為末右濃煎石榴根汁半升下散三錢一方用黃丹丸五枚中夜服旦日下見蟲檳榔散治寸白蟲石榴根銼陳橘皮桑根白皮各一兩右細銼分作三服每服水盞半煎至一盞去滓五更初調生檳榔末二錢至天欲明不㵼至曉又一服如蟲母未下再服或㵼不止喫冷粥止之石榴根湯治寸白蟲令人羸瘦酸石榴根一大握蕪荑二兩牽牛子末五錢右前二味粗搗篩每服五錢水一盞半煎至一盞去滓下牽牛末五分煎沸空心溫服如人行十里再服以快利蟲下為度橘皮湯治寸白蟲陳橘皮焙乾二兩蕪荑仁狼牙各一兩半右為末煉蜜和為劑更杵令勻丸如梧桐子大每服三十丸食前溫漿水下日三服檳榔湯治寸白蟲檳榔銼一十四枚薤白一盞許鹽豉一盞許右將大檳榔粗搗篩與餘物各分為三分煎每分以水三盞煎至一盞半去滓分三服隔宿勿食侵早空心一服如人行六七里一服蟲未下再服水銀丸治寸白蟲水銀錫白蠟各一分右熟研以糯米粥丸如皂子大每服溫酒夜嚼一丸次日食前取下蟲母瘥石榴根湯酸石榴根一握陳皮一兩檳榔三枚右除檳榔末外合細銼以水三盞煎至一盞半去滓入檳榔末攪勻分溫二服空心相繼服盡當有蟲出次煮薤粥補療寸白蟲為水㵼出求除方棐子檳榔蕪荑各等分右為散溫酒二錢燒牛肉脯喫後服藥也治寸白蟲令化為水十全良方萆􅐺一兩甘草三兩狗脊三兩右為細散每服二錢食前粥飲調下又方出聖惠方檳榔二枚杏仁七枚酸石榴根一握銼右細銼水二大盞煎至一盞去滓空心分溫二服凡欲出蟲時先坐暖物兼食少淡羊肉乾脯微燒過爛嚼咽汁待引得蟲出即服良又候腹內似不安甚即轉動以快利為度後服蕪荑湯一小碗以補之永瘥又方出聖惠方麝香二錢蕪荑仁三分狗脊五錢右為細散入麝香研令勻於月厭日以淡漿水空心調下二錢良久再服從早至食時可三服當以下蟲為度一方以蕪荑湯下又方出聖惠方狗脊一兩萆􅐺五錢銼貫衆半兩右為細散每服空心以蕪荑湯調下二錢以蟲出盡即止又方出聖惠方桑根白皮一兩銼檳榔半兩桃根白皮治寸白蟲出肘後方胡麻一升胡粉一兩右為末明旦空腹以豬肉臛汁噉盡則瘥一方名胡粉丸療心痛不可忍似蛔者用生真胡麻一合胡粉半合熬搗先以豬肉脯一片空心服啖咽肉後取前藥搜作丸以少清酒盛頓服盡十嵗以上增減忌生冷豬肉魚雞蒜酢滑等七日若是蛔吐水者是也取寸白蟲出本草方畫粉蜜陀僧各等分右為末每服二錢用麻油調服空心下頓刻成涎取下療白蟲方寸白者亦九蟲之一也長一寸色白形小褊因臟腑虛弱而能發動或云飲白酒以桑根貫牛肉炙食之并生粟所成又食生魚後即飲乳酪亦令生之其發動則損人精氣腳腰疼弱此蟲生長一尺則殺人淳漆二合豬血三合右相和微火上煎之不著手隔宿勿食空腹且先喫肥香脯一片服之如豆許一百丸日中蟲悉出亦治蛔蟲療白蟲并治三蟲東引茱茰根一大握切麻子半大升右先搗麻子極碎又盆中熱研以水一大升更和研絞取濃汁以浸茱茰根一宿明旦煮兩三沸頓服如不頓服分再服至如明旦欲服藥合日午後便不得食仍須先嚼一片肥乾脯咽津然後服藥一劑去蟲不盡停一日更作服一劑永瘥後一月日勿食脂膩魚肉必效不用脯餘一方同銼搗用酒二升浸一宿去滓空腹暖頓服之聖功散療寸白蟲不拘逺年神效南木香檳榔各等分右為細末濃米飲調三服許黎明空心先熱嚼炙豬肉之屬口咽吐去滓便服藥辰巳間蟲下其疾永除此方簡易如是而取效神速諸名醫未知有此用之屢驗治寸白蟲令化為水出聖惠方楝根五兩銼粳米二合右藥以水三大盞煎楝根取汁二合盞去滓入米作粥煮宿勿食旦朝先喫淡羊肉脯令蟲舉頭便食其粥其蟲即盡下治寸白蟲出千金方右用棐子四十九枚去皮以日平旦空腹時服七枚七日服盡蟲消成水永瘥又云日食七顆七日滿蟲即化為水一方一百枚只細啖之食盡佳不能者但須啖五十枚亦得經宿蟲消自下一方并治三蟲又方出千金方右取吳茱茰比隂根乾去土切一升以酒一升浸過一宿平旦二服茱茰用細根東引比隂者良若如指頭以上大不用又用石榴根如茱茰法亦可水煮又方出千金方右研大麻汁五升分五服亦可治小兒蛔蟲又方出千金方右以好麻油二升煎令熟內蔥白三寸蔥白黑便熟候冷頓服之又方出肘後方右熬餳令十分燥作末以水方寸內羊肉臛中服之又方出肘後方右用桑根白皮切三升以水七升煮取二升宿勿食於平旦空腹服一升蟲亦下桑白皮亦可用又方出千金方右以金櫻根東行者二兩秫米二十粒水一升煎去渣滓半空心服須臾下蟲如神效一方用糯米三十餘粒又方出本事方右以鉛錫灰炒雞子喫亦可只用錫灰為末以棗肉為丸如梧桐子大先齋一日次日五更喫炙肉一片又次溫酒下石榴湯出聖惠方治寸白蟲蛔蟲右以酸榴根南引者一握取淨細銼半升用水五升入煎半碗已下去滓五更腹空時先炙豬肉隨意喫之下引蟲不過飽然後溫服此藥只作一服蟲自取下乃喫白粥補之永絶根一方用東南引根并東引之根有人服之一啜即下而愈一方取石榴東引之根令患人以手大指與第三指滿握一握兩頭出者總皆留之又取乾脯肥者如手大一片細銼以水四升浸漬之一宿明旦煮取一升去滓分三分如人行十里之久每欲服先嚼脯一片然後飲藥并令人以手徐按所患人腹令藥易宣都服了有頃當日便蟲出凡服藥以月一至五日以前是蟲頭向上服之得力蟲無問多少皆得出盡若疑蟲未盡更合一劑永愈矣一方酸石榴東向根三五錢用水一碗半煎八分於隔宿煎下來早用半精肥肉四塊令病人聞之頃乃食其肉次藥煎服若氣虛者覺如醉夢寢至申未時間蟲下不過兩服蟲上旬頭向上下旬則無效又方出仁存方右熬胡粉令蔥焦燥平旦先作肉以藥納肉中喫之即大效或以生麻油調一錢服又方出肘後方右用雷丸水浸軟去皮切焙乾為末每有病者五更之初先食炙肉少許却以稀粥調藥服之即時須出凡服藥以上半月日蟲乃下治寸白蟲出仁存方右用新生韭子五更初喫半升許其蟲去根取寸白蟲出大全良方右用苦綿苽子不以多少研為末每服二錢好酒半盞許空心調服治寸白蟲出大全良方右用黑鉛灰炒二錢一服先喫豬肉脯少許一時來又却用沙糖濃水盞半調灰五更服蟲盡下以白粥將息一日良子宣和中每覺心中多嘈雜意謂飲作或又疑是蟲浸依良方所説服翌日下蟲一條長一丈二尺五寸頭匾闊尾尖鋭每寸作一節班班如綿絞其一條皆寸斷矣千金謂勞生熱熱則生蟲白蛔為脾蟲寸白腎蟲如寸截絲縷肝蟲如爛杏肺蟲如桑蠶五蟲皆能殺人惟肺蟲為急肺蟲居肺葉之內每蝕人肺系故成療疾咯血斷嘶藥所不到治之為甚難有人説道臟中載諸蟲皆頭項下行唯自初一日至初五日以前頭上行故用藥者取月朏以前蓋為是故也牙子治白蟲方肘後方右用狼牙五兩搗末蜜丸如麻子大宿不食明旦以水漿一合服盡瘥之治患中宿冷寸白蟲右用山豆根為末每朝空心熱酒調三錢其蟲自出又如小兒乳調半錢療心痛不可忍似蛔者黑鉛散治寸白蟲纍取不盡久令人面黃心如飢肘後方右用黑鉛沙子畫家銀塗是也極研細每服二錢於五更初肉汁調頓服治平明取下蟲立瘥一方以肥豬肉三兩片炙令香熟再三蘸藥細嚼米飲下空心及食前服檳榔散出三因方治寸白蟲右用檳榔如雞心者一枚為末欲服藥隔宿不吃晚時食放飢睡先用鹽醋等炙雜肉脯一片香熟次日之五更令病人空腹嚼脯咽津却吐出肉用溫米飲下檳榔末一錢頓服即睡至午前取下蟲方可食多蟲者不過再服月一至初五已前尤佳一方治諸蟲生在臟腑久不瘥用茶蜜或蔥蜜湯調服一錢至二三錢一方用水煎服一方二七枚為散水先煮其皮却減半去滓內末頻服暖卧療白蟲方出肘後方右用濃煮豬肉汁煎檳榔三十枚取三升服之蟲盡自出又方肘後方右用熟煮豬脂血宿勿食明旦飽食之蟲當下又方右以橘食破其上取皮中子搗合蜜丸如梧子大不須食但以醋漿水或米汁下三百丸諸食蟲并死下又或以糜爛皮亦可丸服八十丸忌如常法又方出聖惠方右用熟豬肉以蕪荑鹽醋早晨飽噉蟲出盡即止又方出聖惠方治寸白蟲令化為水右用狗脊三兩搗細羅為散每於空心以蕪荑湯調之下二錢催取寸白蟲出本事方巴豆七粒皂角末一錢用亰墨磨醋糊為丸如麻子大只作二服五更初橘皮湯下取匹白蟲方鉛灰三錢雄黃五分蜜陀僧五分麝香一字檳榔一個右為細末用豬膏油打邜餅入藥末小半於餅內用其邜餅於五更初時逐旋蘸藥細嚼喫盡未可喫食飯後至早食時服烏梅丸烏梅丸方右用巴豆二粒蒸爛烏梅肉為丸分作二七粒飯飲和吞下七粒稍久臟腑未轉再吞二粒凡取此蟲須先斷葷腥三四日縱復吐嘈雜亦當忍耐服藥後須即以爛軟粥飯將息亦未須便喫葷腥若覺蟲下未能盡或可斟酌再服藥取令盡為度仍須月初一二日間服藥為妙化蟲散取寸白蟲黃丹半兩錫灰一兩定粉二兩右件三味同研極細末稱一錢先燒肉五更喫了後用生油一口許調藥都一服至晚取下婦人有胎不可服恐有害李副統女名菊花年十三嵗此藥一服取蟲一抄終身不發雷丸散取寸白蟲檳榔一兩雷丸一兩雄黃黃丹韶粉已上各半兩右件為細末每服一大錢油餅泡湯調服二更服至五更時却服後方雙粉散催之雙粉散下寸白蟲兼蛔蟲石灰一兩黃丹五錢韶粉五錢輕粉一錢右件為細末每服一大錢煎使君子湯調下五更初服如患蛔蟲二更時只服此藥不須服前方雷丸散治蛔蟲咬心痛右用苦楝皮煎一大盞服治蛔蟲出本草右用繅絲湯熱取一盞服蓋取此繭汁為其殺蟲故爾也治蛔蟲攻心臍如刺口吐清水右取雞子一枚開頭去黃以好漆內於中合和仰頭向臍蟲出自淨治蛔蟲攻心腹痛出本草右取薏苡根二斤切水七升煮取三升先食盡服之其蟲死盡出療蛔蟲心痛積年久不瘥右用取苦酒五合燒青錢二文令赤安酒中又别取雞子白一顆却去錢㵼著酒中頓服瘥治蛔蟲攻心痛右以使君子任意喫又方出仁存方右以鹽醋煮馬齒莧一碗空腹食之少時當盡下一方但生搗絞汁服當利惡物療蛔蟲方右以菉豆三升煮取濃汁麻子一大升研取汁一升許以下然後取汁半升和豆汁一升更暖令溫正發時即炙羊肉脯令熟先令咽汁三五咽即服之須臾當即吐或出利其蟲已消如帛練帶三二百條如未即盡更服即永絶一方服麻子汁效治蛔蟲攻心楚痛宛轉欲死方右濃搗地黃汁和麵煮作冷淘不用著鹽醋盡意食啖之如一頓蟲不出再服食治蛔蟲攻心如刺吐清水右用龍膽一兩去頭銼水二盞煮取一盞去滓隔宿且不食平旦一頓服療蛔蟲攻心右取槐子樹上木耳燒灰為細末每服水調如棗許於正發時服若不止飲熱水一升蛔蟲出療蛔蟲心痛惡心吐水右用乾漆熬搗蜜和丸如梧子大每服十五丸日一再服貫衆散治蛔蟲攻心吐醋水痛不能止貫衆一兩鶴蝨一兩狼牙一兩麝香一錢蕪荑仁一兩龍膽一兩右細羅為散食前以淡醋湯調下二錢通大小腸治蛔蟲攻心病白麻油一合雞子兩顆半芒硝一兩右三味攪勻服之少時即㵼治寸白蟲右取櫻桃東行根搗絞汁服之治寸白蟲右用緑礬一塊杵之為末溫漿水一盞生油五七點入同調五更初服治寸白蟲右用銀泥錫一彈子大以生麻油和丸南粉為衣作如餅子厚著竹紙裹尉斗火上焙乾出火毒候冷令患病人五更初用丁香七粒同一餅細嚼令酒咽下俟至晚腹痛如厠蟲盡出永不發𧈟蟲附論夫五臟下唇內生瘡者其人喜服此蟲在下蝕其下部人不能知可服此藥蝕蟲藥不爾𧈟蟲殺人凡蟲濕𧈟者多是熱病後或久下不止或有客熱結在腹中或易水吐溫涼氣著多生此病亦有乾𧈟不甚泄痢而下部瘡癢不問乾濕久則殺人凡濕得冷而苦利單煮黃連及艾葉苦參之屬皆可用之若病人齒斷無色齒上白者或喜服煩憒不知痛癢處或有下痢急治下部不曉此者但攻其上不以下部為意下部生蟲蟲蝕其肛肛爛見五臟便死燒艾於竹筒熏之方懊憹散治濕𧈟瘡爛殺蟲除𧈟方扁竹五錢雚蘆雷丸青箱女青桃仁各三兩右治下篩粥飲服方寸匕日三加至二匕亦酒服治濕𧈟方青黛二兩黃連黃蘗丁香各一兩麝香二分右治下篩以小棗丸內下部中日一度重者棗大和車脂二三合灌下部日二次治濕𧈟方右取生薑刮皮斷理切之極熱研取汁一升半又以溫水一升半合和相得平旦空服仍削生薑二枚如蠶繭大以秋葉苦桃葉重包於煻灰火中燒令極熱却內下部中食頃若濕盛者三旦作頻服無有不瘥穀道𧈟赤痛又癢方右用杏仁熬令黃搗以綿塗導之又方右用雄黃吹在上良治𧈟蟲蝕下部右以泥作罌以竹筒如大指一頭坐罌缸中一頭入下部孔中以雞子大艾一團燒之以指作􅑥口吹之要常令艾煙熏下部強人可益良久治濕𧈟方黃連生薑各十兩艾葉八兩苦參四兩右㕮咀以水一斗煮取三升分三服久者服三劑薑蜜湯治𧈟生薑汁五合白蜜三合黃連三兩右以水二升别煮黃連取一升去滓內薑蜜更煎取一升二合五嵗兒平旦空腹四合日三杏仁湯治濕𧈟杏仁五十枚苦酒三升鹽一合右和煮五合頓服之小兒以意量服阿膠湯治𧈟蟲蝕下部癢穀道中生瘡阿膠當歸青葙子炒各一兩右粗搗篩每服五錢水一盞半入艾葉十餘片同煎至一盞去滓空腹午食近晚各一治蟲蝕下部方出千金方胡粉雄黃右各等分為末著穀道中亦治小兒治蟲已蝕下部吐盡腸穿者右取長股蝦蟇青背者一枚雞骨一分燒灰合吹向下部令深入數用大驗治蟲狀如蠋牛食下部癢用扁竹一把水二升煮煎五嵗兒空腹服三五合隔一宿合明早食之尤佳甚驗治下部蟲齧并三蟲右杵梅桃葉一斛蒸之令極熱內小器中大布上坐則蟲死或以桃葉汁飲一升療瘟癘疳𧈟右以崑崙草搗汁單服一名草蒿即葙子草也治百蟲入肉𧈟蝕瘙疥出枚師方右以繭鹵汁浸瘡治疳𧈟無問去處皆治之出枚師方右以蝦蟇燒灰好醋作傅日三五度敷之瘥普濟方卷二百三十九
