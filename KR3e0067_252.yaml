body:
  text: 普濟方卷二百五十二明周王朱橚撰諸毒門解金銀銅鐡石毒附論夫金受五方精氣各有毒性不可謂之有利無害也服之適冝足以瘳疾服之非冝徒傷正氣當隨所畏惡以治之服石法亦若是又云人皆以服石為佳殊不知惡瘡疥瘟疫瘧疾年年常患寝食不安皆由於是非止己身不康生子亦難育也所以服石之人終須受害要不可輕服五石也人年三十以上可服石藥若素肥充亦勿妄服四十以上必湏之五十以上三年可服一劑六十以上二年可服一劑七十以上一年可服一劑又云人年已上五十精華消歇服石猶得其力六十以上轉惡服石難得力所以常湏服石令人手足温煖骨體充實雖生冷舉措輕便復耐寒暑不著諸病是以大須服之凡石熱熟煉用之凡石之發當必惡寒頭痛心悶發作有時状如瘟瘧但有此兆無過取冷水淋之得寒乃定止一切冷食惟酒須温方薺苨湯療石毒卒發者慄慄如寒或欲食或不食若服紫石英發毒者亦寒悶惛喜卧起止無氣力或寒是腑臟氣不和所生療之薺苨四兩甘草炙藍子各一兩茯苓黄芩各二兩蔓青子一升人參一兩芍藥一兩右㕮咀以水一斗煮蔓青子八升去滓子放藥煎取三升去滓分三服日三服若虛弱加人參一兩若氣上加茯苓薺苨一兩甚良治銀毒方黄連去鬚甘草生剉各一兩右麄搗篩以水三盞煎取二盞去滓復飲之解金銀毒方出千金方用水銀服數兩即出若毒少者一兩亦可扶坐與吞令入腹中即活一方以鷄汁及屎白燒猪脂和水淋鷄屎汁煮蔥白汁鴨血及屎汁並能治之一方加人參汁臘月猪脂為九如豇豆大三丸並解之單用鴨屎汁治銅鐡毒及金毒治腹中有鐡方用白折炭刮去末井花水服三錢不效再服解服石藥中毒出千金方方見解金銀石毒類解金毒方出聖惠方用鴨血一盞毎服半盞和鷄子清調下未效再服解銀毒方用石亭脂一兩為末煎甘草湯調下二錢毎日三服效治鐡毒方出聖惠方用磁石火煆醋淬二七遍一兩細搗研為粉醋煮麫糊丸如梧桐子大毎服三十丸水吞下未瘥更服治丹砂毒方用塩五錢以冷水攪勻令澄旋旋服之治百種乳毒方用紫石英一兩為末毎服一錢以温水調下連三服治硫黄毒方用細辛去苖葉一兩搗羅為散毎服一錢煮猪肉白湯調下冷服一方用白野鴿肉服之並解治硝石毒方用女苑一兩粗搗篩毎服二錢以水一盞煎七分温服不拘時候治陽起石毒方用菟絲子一兩不用酒浸搗羅為細末毎服一錢以水調下三服立瘥治雄黄毒方出千金方用防己一兩為細末毎服二錢以温水調下連進三服一方取汁解之並瘥治礬石毒方出千金方用白鵝膏不拘多少研細服一匙大豆汁調下一方單用大豆汁服之亦佳黑鉛酒治中金石藥毒用黑鉛一斤浄鍋鎔作汁投酒一升如此十数廽候酒至半升去鉛頓服之效一方用井水磨下解砒毒解丹毒方用地漿服之最妙壓丹石毒及解諸毒方用生大豆煮汁服之甚良又方壓丹石去煩熱利小便止渇小兒熱痜取葛根浸搗汁飲之良治服金石方取括根苦酒中熬燥搗篩仍以苦酒和塗紙上攤貼用之良妙五加皮湯治服諸藥石後或熱噤多向冷地上卧又不食熱麫酒等物用五加皮二兩以水四升煮取二升半候石發之時便服未定更服治硫黄忽發氣弱用羊血服一合效單葱白湯藥療石毒沉體中數年或便發冝服之葱白一升水五升煮一半去滓服未效再服三劑止治丹石熱發用菰根和鯽魚作羮食之三兩頓即瘥療熱酒壓丹石用田螺汁飲之不可常服解砒毒治食金欲死方用鷄糞半升水一升淋汁灌之如人行三二里再灌馬通散治石毒赤馬糞不拘多少水浸三日淘洗右以砂鍋子煆存性入麝少許毎服一錢温酒調下治中金藥毒方亦解衆毒止㵼洩及邪熱取金蛇四寸炙令黄煮汁飲頻服之以瘥為度治一切藥毒并蠱并解金石毒用石蟹熟水磨服治硫黄毒煎餘甘子汁飲之以預其毒也治硫黄毒以黑錫煎湯解之忌食宿冷猪肉解金銀藥毒用黄龍眼以水研取半合空心少少服二十餘日瘥治硫黄發徧身熱以大麻油二合煎熱放温以銅匙抄少許啜之日三五服效治服硫黄發動以猪肉鴨羮及餘甘子湯並解之食丹藥毒用嬰栗子研去滓煎取腐入薑蜜和合萱草研汁服四物湯香蘇散各一貼和煎藥解金鉛粉調地漿飲之亦解淡竹葉濃煎服猪浮肋骨煎汁及研瓜蒌根飲可解藍汁猪血菉豆以上並解之服丹石毒薄荷黄芩各五錢芒硝二錢用蜜調嚼或傅又方用東引柳枝心甘松或加丁香木香為末可服可噙解紫石英毒以破麻鞋底水煮汁服之犀角飲方解丹石藥毒犀角鎊知母防風去蘆頭甘草四味各五錢山梔子杏仁去皮尖蔓荆子地骨皮白茯苓去皮五味各一兩黄芩一兩五錢柴胡去苗二錢右件㕮咀毎服五錢水一盞煎至七分去滓温服解諸飲食中毒附論夫五糓五菜五畜五果以至藥石皆能飬性益夀延年却老瘳疾蠲邪然有損益有利害不可不察飲食之間不可不慎哉又云物性味有相須相得相畏相惡相得則良相須則用相畏則制其毒相惡則置而不用然則飲食有毒冝有解散除治之法也又云嶺南俚人毒藥皆因食得之即覺漸不能食或五心中滿脹并背急悶似瘴㣲覺即取一片銀方寸餘含之一宿其銀變色即是著毒藥也銀色青是蠱藥若黄是菌藥不可不辨也夫人一旦由飲食忽忽困悶少時轉甚乃至死者名為飲食中毒言人假以毒物投於食裏而殺人但頰内或懸癰内初如酸棗漸長大是中毒藥也急治則瘥不治則毒入腹藏則死脉浮滑無陽㣲細不可知者中毒也凡飲食有毒者傾於地下濆起者皆殺人也凡飲食雜味有相害相得則益體害則成病以此治疾則皆難療所以病有不受藥療必至於死也今畧䟽其不可嘶物不須各題病名相知者善加慎之方解麫毒以蘿菔啖之昔有婆羅僧東來見食麥麫者云此熱何以食之又見食中有蘿菔云賴有此以解性自此相傳食麫必啖蘆菔解毒丸解一切飲食毒及諸藥毒并療縊死磕死湯盪火燒氣色已絶但心頭熱者皆可治五倍子三兩大㦸一兩山茨菰五錢板藍根五錢續隨子去皮一兩麝香一錢别研右件為細末研勻水煮糯米和丸毎一兩作一十丸隂乾用鷄鴨血為衣候經宿布袋掛當風酒下一丸治欝食中毒取豆汁解之治誤中􅺗魚毒者以黄耆吳藍煎湯服之此鱉之屬頭足不縮者是解飲食中毒及魚肉菜等毒出千金方苦參一兩五錢醇酒二升一法用苦酒同煎一升去滓令温飲之得吐即愈或取甘汁藍汁犀角汁飲之亦佳解一切食毒及飲酒不知中何毒卒急無藥可解出聖惠方甘草生薺苨各二兩右以細剉以水五盞同煎取二盞停冷去滓分三服一方解一切藥毒加蜜少許同煎服之解俚人一切毒飲方生薑甘草炙各一兩右各拍碎以水三盞煎取一盞半平旦空肚服分二服訖然後以别方治之又方出肘後方常山四兩白塩二錢右以水一斗浸之一宿以月盡之日五更用土釡中煎之勿令奴婢鷄犬見煎取二升於平旦分三服服少時即吐以銅盆盛之㸔色青以杖舉得五尺不斷者即是病吐盡候一日二日後更進一劑乃良席辨曽飲酒得病月餘始覺首領梁墳將土常山與之呼為一百頭牛藥服即瘥後二十日慎毒物惟煮粥食之前後活凡九人治食百物中毒出千金方掘厠傍地深一尺以水滿坑中取厠籌七枚燒令烟盡以投坑中乃取水汁飲四五升即愈急者不可得但掘地著水即取飲之服生韭汁数升含貝母子一枚湏臾吐食物瘥治食索粉片積方出經驗良方用紫蘇濃煎汁加杏泥服即散治中豆腐毒方出經驗良方用蘿蔔煎湯如非時無蘿蔔用子煎湯亦可人有好食豆腐因中其毒醫治不效後更醫醫治中途適見做豆腐之家夫婦相争因問云今早做豆腐妻誤將蘿蔔湯置豆腐鍋中今豆腐不成盖豆腐畏蘿蔔也醫得其說至病家凡用湯俱使以蘿蔔煎湯或調或嚥病者遂愈治粽糍為積方出經驗良方用麯末加少木香末塩湯調服口有酒香食積去矣大治酒疾甚妙治酒麫腫方用參苓平胃散加白藥煎傷麫湯下酒亦然辨飲食毒法凡飲食傾澆於地上湧起者不可食食之皆殺人治新中雜食瘀食不消心腹堅者出金匱方用白塩二兩以水二大盞半分三服連併服取吐為效黄龍湯出千金方耑治因食中毒取竈底當釜直下掘取赤土搗羅為末以冷水隨多少服之或犀角水磨取汁飲大效亦治六畜肉毒驗又方右急取赤馬溺不拘多少毎服飲一二盞又方取桑上蕈破作叚著釜中以水五升取二升漉出澄清以火冄煎沸經宿不食來晨空服三合則吐食瘕毎日服三合瘥羸者减服之貝齒散治食諸餅臛百物中毒及射㒺在肉中毒方見中藥毒類解俚人一切毒飲出肘後方用都淋藤十二兩以水一升酒二升煎取二升分三服如人行十里進一服盡三服訖其藥毒遂大小便出十日慎喫壅毒諸食不瘥更服以瘥為度又方療諸毒用此藤二兩長三寸并剉酒三升合安罌中宻封以糠火燒四邉至三四時取出温服良長令有酒色亦無所忌一方治初中俚人毒藥未得此藥即用黄藤十兩以水煮取二升分為三服藥毒内消解鷄子毒方出千金方用淳酒解之椒桂方出金匱方治蜀椒毒誤食欲死或下白沫身體冷右用以急煎桂汁服之多飲冷水一二升忽食欲吐漿煎濃㪷汁服之或食蒜或飲地漿亦可慎不可熱飲殺人中椒毒者含蒜及薺苨瘥治消熱麫毒用枸把葉及根皮細剉麫拌煮熟吞之良犀角散出肘後方耑治人以雉肉作餅臛因食皆吐下以犀角為末服方寸一方治服諸藥過劑心中悶亂燒灰水服治食飲損者方右以葱㪷湯加當歸一兩煎之去滓分服即瘥若不見效即服蘆根湯治有人夜間飲水誤吞水蛭入腹中經月累日必生小蛭能食人肝血腹痛不可忍面目黄痩全不進食不早治能令人死出危氏方用田中乾泥一塊小死魚三四箇將猪膏鎔油攪勻用巴豆十粒去殻膜拌入泥内研爛為丸如菉豆大用田中冷水吞下十丸小兒只用三丸湏臾大小水蛭一時皆㵼出却以局方四物湯加黄芪煎服生血補理飲食毒心煩悶者以苦参煮汁飲之吐出即愈解食牛馬猪羊犬鷄鴨魚蟹中毒附論夫禽獸品類有根性本毒者有無毒而食毒物者有雜相畏相惡相因成者人不慎而食之致傷臟腑之和亂腸胃之氣或輕或重各隨其毒而為害凡六畜者謂牛馬猪羊鷄狗也此等本無毒不害人其自死及着疫者則有毒人食之中此毒者則令人心神煩悶而吐利無度是也凡六毒五臟著草自動揺及得醋醎不變色又墮不汚又與犬犬不肯食者皆有毒殺人凡牛肉有毒者由毒蛇在草中牛食草因誤噉蛇則死亦有蛇吐毒著於草上牛食其草亦死此牛肉則有大毒又因瘦病而死者亦有毒食之則令人心悶身體痺甚者乃吐逆下痢腹痛不可忍因此而致死者非一也凡駿馬肉及馬鞍之下肉皆有毒不可食之食之則殺人其有常馬肉則無毒或因疫死食之則有毒中於人也凡猪無毒其間野放或食雜物而遇死此則肉有毒人食之則毒入臟腑故令人吐痢困悶不安也凡狗肉性甚燥熱不可多食其疫死及猘死者皆有毒食之難消故令人腹脹心煩急躁悶亂也凡鴨肉本無毒不能損人偶食之觸令不消因結積聚成腹内之病也凡禽獸自死者肝皆有毒不可食徃徃傷人其疫死者彌甚被其毒也者多涸痢嘔吐而悶不安也凡猪肉脯若放在茅草屋雨漏則有大毒人食乃成暴癥不可治亦有始食下即殺人也凡猪肉脯炙之不動得水則動故不可食凡脯肉及熟肉皆不可深宻收藏令氣不泄食之殺人也凡射罔獵人多用㒺藥塗箭頭以射蟲鹿傷皮則死以其有毒故也人獲此肉除中箭去毒處肉不食餘可食若誤食肉則被毒致死其有不死者所食肉處去毒箭較逺毒氣不深其毒則輕雖不死令人困悶身體痺不安并吐痢者是其候也其㒺藥者以生鳥頭汁煎之是也凡欝肉者謂諸生肉及熟肉内器中宻閉其氣壅積不泄則為欝肉有毒不幸而食之乃殺人其輕者亦悶亂不安也凡可食之肉不甚有毒自死者多因疫氣所斃則有毒若食此肉便令人悶亂吐痢無度是中毒也凡食諸魚中毒者皆由魚在水中食毒蟲惡草則有毒人食之不能消化即令悶亂不安也凡蟹食水蒗水蒗有大毒故蟹亦有毒若中其毒則煩亂欲死如經霜已後遇毒即不能殺害人未被霜蟹煮之則多有中毒故令人悶亂精神不安也方獺肝丸出聖惠方耑治食魚鱠不消生瘕常欲須鱠者方獺骨肝肺乾胡大黄各八分蘆根鸛骨各七分桔梗五分乾薑桂心各四分斑猫二十枚炙右為末蜜丸酒服十丸至十五丸即消五蠱黄丸一名萬病丸出千金方耑治食蟹中毒煩亂欲死者服得吐下皆瘥雄黄一兩以水從旦至夜煎之取出别研莾草取葉水煎洗曝乾一兩蜈蚣一條去頭足炙研細巴豆二十枚去皮心炒研勻鬼臼一兩右搗羅三味為末别研巴豆雄黄和勻煉蜜為丸如小豆大瓷器中盛毎服三丸至五丸米飲下一方治諸蟲亦依此方治食諸肉中毒方出聖惠方耑治遇冷不消成䖝癥大黄炒一兩朴硝研一兩杏仁打破和皮一兩右為粗末毎服三錢以水一盞煎至七分服橘薑丸出十便良方耑治食魚中毒陳橘皮湯浸去白焙為末生薑去皮切碎搗甚爛豆䜴為末一方有冬𤓰汁右各等分同和桐子大毎服二十丸茶清下三服吐出神效三聖飲治蟹腹中有毒食之或將死急治之大黄汁紫草汁冬𤓰汁右取汁共一大盞飲之立效治食蟹中毒方出聖惠方生藕汁蒜汁冬𤓰汁右各取汁自各飲之或一汁已解别汁不用飲一方專用紫蘇汁飲之蘇子汁亦可一方專用冬𤓰汁服二升治食馬肉血洞下欲死方出聖惠方䜴二百粒杏仁二十枚右㕮咀蒸五升米飲下熟搗之冄服令盡又用甘豆湯冷飲能解諸毒又方煮蘆根汁飲之良厚朴飲出聖惠方耑治食魚鱠及生肉在胸膈中不化吐不出便成癥瘕厚朴三兩大黄二兩右㕮咀以水二升煮取一升盡服立消人强者大黄用酒三升取二升冄服治食魚鱠不消及食諸魚中毒方大黄二兩切朴硝二兩右以酒二升煮取一升頓服之中景方橘皮一兩肘後方云食猪過冷不消必成癥􅛎一方無橘皮一方煎生薑汁服治食六畜肉中毒方出聖惠方右取六畜乾屎為末水服佳一方專肉毒以大糞服之良又方出聖惠方燒小豆一升為末服三方寸甚良一方服灶底黄土方寸治食生肉中毒方掘地深三尺取下土三升以水五升煮土五六沸取上浮清者飲一升立愈治食野菜馬肝肉諸脯肉毒方出聖惠方取頭垢如棗核大水吞之神驗一方燒狗屎灰水和絞取汁又方出聖惠方燒猪骨為末水服方寸毎日三服一方燒笠子末服方寸亦瘥治食百獸肝中毒出千金方大凡食物自不可輕食自死者諸心皆勿食猪脂一斤頓服佳亦治陳肉毒治生食馬肝毒殺人方出聖惠方取牝䑕屎二七枚兩頭尖者是以水研飲之不瘥更作一方用雄䑕屎即瘥治食猪肉毒方出聖惠方右燒猪屎為末服方寸以犬屎亦佳治食魚中毒方出聖惠方以水煮橘皮停極冷飲之立驗一方用大小黒豆取汁服之或用朴硝汁服之並瘥一方大黄汁亦解治食魚中毒面腫煩亂以及鱸魚中毒欲死者并食鯸鮧魚中毒剉蘆根舂取汁多飲一方治蟹毒取蘆葦茸汁飲之愈一方治食馬肉中毒飲蘆根汁亦可兼作湯浴之尤妙出千金方治食魚鱠不消及食諸魚中毒不療必成癥瘕出聖惠方舂馬鞭草飲汁一升即消生薑亦良薑葉汁一升亦消又可服吐藥吐之又方出聖惠方取鮐魚皮燒灰水服無完皮壊刀装取之一名鮫魚皮或魚皮亦可大治食鯸鮧魚毒欲死者甚驗一方魚皮燒灰水服又方出千金方取魚鱗燒灰水服方寸食諸鮑魚中毒亦用之治食鵝鴨肉成病胸滿面赤不下食者方出千金聖惠方以秫米泔服之良一方糯米煮服一中盞治食狗肉不消心中堅或腹脹口乾大渇心急發熱狂言妄語或洞下方出聖惠方用杏仁一升去皮研以沸湯三升和絞取汁三服狗肉完片皆出即浄良驗治食牛肉中毒方出聖惠方以狼牙燒灰水服方寸良又云猪牙亦可一方以甘草煮汁飲之並瘥一方以猪脂煉為油服之亦妙治食六畜肝中毒方出十便良方大凡物肝臟不可輕噉自死者彌勿食之用䜴一兩以水浸絞取汁旋服亦治食躁誤食諸毒方方見治六畜肉毒類治鳥獸中毒箭其肉有毒解之方出肘後方用藍青三握細切搗取汁毎服一盞飲之肘後方加大豆汁塩汁服之解治食魚中毒方用冬瓜一枚小者洗净搗絞汁一大盞旋旋飲之效或甜𤓰取絞汁飲之亦得亦治食蟹中毒解河䐁毒方出徳生堂五倍子白礬右等分為細末水調灌之又方出百一選方以槐花腦子為細末水調灌之治食蟹反惡方出徳生堂昔一人食大蟹數枚誤食紅柿至夜大吐繼以血昏不醒人事同邸有知其故者憂之以木香作餅子斡開病人口遂調藥灌下神效以木香嚼尤妙治食噉蛇牛肉殺人大凡髮向後順者是也食之欲死出聖惠方飲人乳汁一升立愈右以泔洗頭飲一升愈又牛肚細切以水二升煮取一升煖飲之大汗出者愈治食鯽魚不得食沙糖令人成疳丹石熱毒發取艾首和鯽魚作羮食一兩頓即愈治食自死鳥獸肝中毒出聖惠方取故頭巾垢一錢以熱湯中烊服之亦治卒心痛以沸湯取汁飲之頭巾即髻帛也又方飲豉数升良治食牛馬肉及肝中毒先剉頭髪令寸長拌和土作溏泥二升合和飲之須臾髪皆貫所食肝出治食牛羊肉中毒出肘後方方見六畜肉毒類治食猪肉馬肝漏脯中毒出傳信適用方用大蒜燒末服或猪脂清調下方可或單用生蒜汁服之亦瘥治食狗肉不消心下堅或腹脹口乾或發熱暈亂出肘後方以煮蘆根飲之治中鱉蝦䗫毒方及治六畜鳥獸肝中毒取生豉一大合新汲水半碗浸令豉水濃頓服之即瘥此三味令人小便秘臍下痛有一士人嘗云此三味大小皆可殺人中之令人小便秘臍下痛至死者又方取五味生為末一二錢井水調下治食自死六畜諸肉中毒搗黄藥末以水和方寸服未覺再服瘥一方用犀角屑水調服之治食黍米中藏乾脯中毒方出金匱方濃煮大豆汁飲数升即解亦治狸肉漏脯等毒治鯉魚毒方用菓樹蔔樹葉刺蠣灰醋糟搗細用火焙熱盫之食河豚毒出本草以蘆根并橄㰖解之治食生肝中毒出聖惠方用附子一枚炮製去皮劑為末温水服一錢日三服薑湯下亦可治漏脯毒并及諸食欝肉方出聖惠方用搗韮汁服之良大豆汁亦得一方治食百物中毒單用韮汁数升服之治欝濕脯毒及生肉熟肉皆不用深藏宻盖不泄氣殺人又肉汁在器宻盖氣不泄者亦殺人張文中云肉閉宻器中經宿者為静出千金方以燒狗屎為末水服方寸以酒服尤佳毎服人乳汁亦良飲生韮汁三升亦得治脯在黍米中毒方出聖惠方用麺一兩塩二撮以水一升煮服之良治食鬰肉漏脯毒方出肘後方以焼人屎灰酒服之方寸治食生脯過多筋痛悶絶煮細漿水粥以少鷹糞末攪和服三五合鷄屎亦可治河豚毒等諸毒來安縣主簿李紘云度白塔寨丁未春有二卒一候兵同食河豚既醉燒子併食之遂皆中毒人急以告廵檢二卒以困殆倉卒無藥因令取麻油獨以麻油灌候兵者既多大吐毒物盡出腹間頓寛以此無恙治中河豚等諸毒用槐花不拘多少為細末如中諸毒毎服三錢用河水調下井水亦得若能未食前先服尤妙六畜自死皆是遭疫有毒食之致洞下亦致堅積冝以利丸下觧毒右急用濃煮香蘇飲汁一升中猪肉毒用壁土用水煎一錢服之又燒白扁豆末黄蘖末並解中禽魚毒食鴆鳥毒生扁豆末温水下又葛粉末調下又生螺肉並解食鮜毒生苦蕒嚼及擂水飲治河豚魚毒用白礬末湯㸃服河豚能殺人服此毒自消累用效治食班魚子毒方治誤食班魚子吐不止者用取魚尾草研汁服少許立止魚尾草又名樚木根形似黄荆八月間開紫花成穗葉似水楊無大樹經冬不凋漁人以藥魚中山鷄鷓鴣毒方南唐相馮延已苦腦中痛累日不减太醫令吳延紹宻詰㕑人曰相公平日嗜何物對曰多食山鷄鷓鴣延紹曰吾得之矣投以甘豆湯而愈盖山鷄鷓鴣皆常食烏頭半夏故以此解毒勝金散槐花染坯右等分生為細末毎服一錢汲井水調下常熟一家専貨此藥毎服百金藉之稍温錢倅叔儀家傳得之又方解鰻毒櫸樹皮或櫳木子或荅菜或冬青葉皆酒浸服又方解鱔毒灰汁洗鐡漿菜等皆可服又方解服毒以麻油炒砂焦熱帛裹縛熨之又方解蟹毒未破者醋炒石灰縛傅已破水調酒糟皆效服天門冬食鯉魚中毒以浮萍解之解食牛馬肉毒腹痛吐痢不止者出本草以麻鞋底水煮汁服之解馬肝牛肉毒出本草以人乳汁合豉濃汁服之神效治食魚膾腹中脹滿成瘕痛悶飲食不下日漸瘦出本草取水中石子数十枚火燒赤投五升水中各七遍取熱飲之如此三五度當利出瘕也中魚毒方虞侍郎蘇州人平生善食鱠中年病堅腹難側身毎發疼痛幾死累治不效一善醫切脉曰侍即右關脉伏為積聚生冷之積成瘕在腹則痛不可忍取藥令用橄㰖汁吞丸子藥数粒晚下痢一盆許皆鱠縷前一半皆成魚矣從此遂安治人食著諸毒肉吐血不止痿悴者出本草取胡葱子洗煮使碎破取汁停冷服半升日一服夜一服血定止治人誤食鯸鮐肝而迷悶者出本草方見解諸毒類解諸毒方治誤食水蛭水蛭即馬蝗出經驗良方用酒及土藍靛絞汁月頭初三四日空心服治誤吞蜈蚣出朱氏集驗方用生猪血令病人喫須臾生清油灌口中惡心其蜈蚣滚在血中吐出繼與雄黄細研水調服愈昔有村店婦人因用火筒吹火不知筒中有蜈蚣藏焉用以吹火蜈蚣驚逆竄入喉中不覺下胸求救人無措手適有人云可討小猪一箇斷喉取血飲之遂愈治蛇蟲食飲中得之咽中如有物嚥不下吐不出者服馬兠鈴即出又服麝香一錢即吐蟲毒治食鱸魚肝鯸鮧魚中毒及食魚蟹毒右用蘆根剉煮汁一二升飲之亦以蓬蒿濃煮汁服之佳治食蟹中毒以生藕汁服之或煮乾蒜汁或冬𤓰汁服之並佳治飲食中毒以及魚肉菜等用苦參三兩酒二升半煮取一升服吐愈梅師方用醋煎或取犀角一升亦佳治食蟹中毒以紫蘇煮汁飲之以子煮汁亦得蟹未經霜多毒治食魚中毒以絞魚焼末服之解食諸菜菓蕈菌中毒附論朽木生蕈腐土生菌二者皆隂濕之地氣蒸欝所生也即非冲和所産性必有毒若誤食之令人吐利不已心腹切痛甚者身黑而死菜亦生於隂濕食之過多或與菌蕈同性有反惡悉能害人可不慎哉凡園圃所種之菜元本無毒但蕈菌之物皆是草變化所生出於樹者為蕈生於地者為菌並是欝蒸濕氣變化所生有毒者人食遇此毒多至於死甚迅速也其不死者能令人煩悶吐利食久始醒也方甘草散出聖惠方耑治食諸菜菌蕈中毒甘草炙剉貝母胡粉各一兩右為散毎服二錢以水調下小兒尿乳汁共服二升亦好治食諸蕈并菌中毒方生薑切細四兩豆漿四两麻油二兩五錢右和研勻楪盛甑上蒸一炊許時取出不拘時候時時食之諸毒立解治諸食中毒方童子小便人乳汁各半盞右和勻㣲煎過温分二服連併服之又方鷄毛燒灰一分鷄屎燒灰一分右細研和勻毎服一錢用豆漿水少許研酒下三服效治食諸菜中毒方用豆漿不拘多少逐旋量多少食之一方治食菜菓中蛇毒以大麥酒浸汁半升服之妙又方出聖惠方耑治食諸菜蕈菌中毒方并急躁發狂煩悶吐下欲死者右用鷄屎燒灰研為末毎服五分用好豆漿半匙細研和藥温酒調下連併三服立醒一方用水調一錢又方出醫方集成治療食蕈并菌中毒致殺人者及食楓菌至令人笑不止者並皆治之盖菌種類不一徃徃蛇虺毒氣薫蒸而成耳掘地作坑用新汲水投坑中攪之成濁混取出以絹濾過用瓷器盛毎服時打轉飲一盞至三盞當效又食橄㰖可解服諸吐利藥丸亦佳治食苦瓠中毒方出聖惠方用黍穣剉半升以水三升煮取一升時時服之一方用黍煮汁飲之葛根飲出聖惠方耑治食諸菜中毒發狂煩悶吐下欲死者用葛根煮汁飲之又方出聖惠方耑治菜菓中毒以鷄血和真鐡精吞如梧子大毎服以温水下一丸治食野菌毒方方見本門解菌毒類又方出千金方耑治食山中樹中菌中毒并食楓樹上菌令人笑不止者取人屎服一升良煎魚魫汁服之即愈又用大豆汁飲之亦可治蕈毒欲死及治菌毒出百選方用石魚頭白水煮濃汁灌之即愈如無生者鮝頭亦得又方出經驗良方耑治中蕈毒同菰毒用左纒藤梗煎汁服又治癰疽尤妙或傅或服皆良解菰子毒及解一切菌毒出危氏方用芫花生者為末毎服一錢新汲水下以利為妙治食桃子傷方取桃樹間裊桃焼服之漸吐即愈解誤食菌中毒及葛毒方出肘後方以荸薺擂水服之一方用左纒藤取其葉生嚼喫並解一云種芋三年不收者成野芋故殺人也治食葅菜誤吞水蛭蛭藏血腸痛漸黄瘦者出肘後方飲羊牛熱血一二升許經一宿便煖猪脂一升飲之便下蛭食治食諸果中毒方出千金方用猪骨燒過為末水服方寸亦治馬肝漏脯等毒治食菜中毒發狂煩悶吐欲死方出聖惠方取鷄毛燒為灰以水調服二錢瘥治食菜及菓子中蛇毒方出聖惠方用黑豆末以酒漬取汁服之中萵菜毒方王順求云萵菜出過園有毒百虫不敢近蛇虺過其下誤觸之則目瞑不見物人有中其毒者惟生薑汁解之解菓菜毒豆粉毒以杏仁細嚼冷水吞下荔枝毒泡塩湯又蜜解𤓰毒𤓰皮湯解塩湯亦可柑毒柑皮湯解塩湯亦可解治中菰菌毒方以茱萸煎湯服吐下即解或熟艾煮三五盞或犬項下取熱血灌之雄鷄血亦可中蕈毒方崇寧間蘇州太平山白雲寺五僧行山間得蕈一叢甚大摘而煮食之至夜發吐三人急用鴛鴦草生啖遂愈二人不甚肯啖吐至死此草藤蔓而生對開白花傍水依山處有之治癰疽腫毒尤妙或服或傅今人皆謂之金銀花又曰老翁鬚本草名忍冬草解野菌毒北夣鎻言野菌毒人而笑者煎魚魫汁服僧光逺云夷堅志云急採鴛鴦草生啖之即愈中菌毒殺人者以防風三十枝剉碎以水煎候冷灌之立愈白水濃煮石首魚頭汁灌之無不愈食生梨葉解菌毒地漿飲三盞愈又多食橄㰖愈治食野菌毒出本草以蓮葉蓮房水煮服之凡菜中有水茛菪葉園而有光有毒誤食之令人狂亂若中風或吐甘草煮汁服之即解出本草麝香圓消𤓰菓水毒肉桂去粗皮人參去蘆頭五錢丁香一兩白茯苓去皮一兩甘草二兩炙青塩二錢麝香一錢五分别研乾木𤓰四兩右件為細末次入麝香青塩同研勻煉蜜為丸每兩作十五丸毎服一丸細嚼新汲水下傷冷嘔吐生薑湯下治人食楓樹上生菌即令笑不止出本草以土漿屎汁飲之愈蠱毒附論夫蠱毒千品種種不同或下鮮血或好卧闇室不欲光明或心性反常乍嗔乍喜或四肢沉重或百節酸疼如此種種状貌說不可盡有得之三年乃死急者一月或百日即死其死皆於九孔中或於脇下肉中出去所以出門常須帶雄黄麝香神丹諸大辟惡藥則百蠱猫鬼狐狸老物精魅永不敢着人生之家須慮此俗有灸法神蠱於心下捺便大炷灸一百壮并主猫鬼亦得愈又當是小指尖上灸三壮當有物出酒上得者有酒出飯食得者有飯出肉菜上得者有肉菜出即愈神驗皆於灸瘡上出凡人患積年之久大黑如漆或堅或薄或㣲赤者皆是蠱也凡下忽患下血以斷方治更增劇者此是中蠱也凡卒患血痢或赤或黑無有多少皆是蠱毒粗醫以斷痢藥處之大非也凡人中蠱毒以病人者若服藥知蠱主姓名當便呼喚將去若欲知蠱主姓名以敗皷皮燒作末以飲服方寸須臾自呼蠱姓名可驅令去則愈又有以蛇蜓合作蠱藥着飲食中使人得瘕病此一積年乃使療之各自有藥江南山左間人有此不可不信之蠱之為毒醫書所載雖有数種而中土少見之今古所傳多是閩廣深山之人於端午日以蛇虺蜈蚣蝦蟆三物同器貯之聼其互相食啖候一物獨存者則謂之蠱欲害其人宻取其毒於酒食中啖之若中毒者令人心腹絞痛如有虫咬吐下血皆如爛肉若不即治食五臟即死然此毒中人有緩有急急者十数日便死緩者待以数月氣力羸敗食盡五臟而後死死則其毒流注於傍人亦成蠱注治療之法必須審而後行今人凡有積聚脹滿之病類乎蠱者便以為蠱尤為非也世說閩深山人專有以蠱行毒於人者若素知其姓名呼喚將去其病自愈又有一說病者若能知元中毒於何物之中終身不服此物其毒亦不變作又云蠱毒千品種種不同有得三年方死有一月或百日乃死者其病症亦各有異或吐下鮮血或如卧闇室或心性反常乍嗔乍喜或四肢沉重痠痛緩與急皆有殊也具以五蠱推之有蛇蠱有蜥蜴有蜣蜋有蝦蟆有草蠱若蛇蠱者面色青黄脉洪壮病發之時腹内熱悶胸脇支滿舌本脹强不喜言語身體常痛心腹似蠱形顔色赤唇口乾燥經年不治肝膈爛而死蜥蜴蠱者面色黄黑其脉浮滑而短病發之時腰背微痛手脚唇口皆習習而喉脉急舌上生瘡二百日不治噉人肝心盡爛下膿血羸瘦顔色枯黑而死蝦蟆蠱者面色青白其濡發時咽喉塞不欲聞人語腹内鳴呼或上或下若天隂久雨而病轉劇皮肉如行蠱手脚煩熱嗜食欬唾膿血顔色乍白乍青腹内脹滿状如蝦蟆若成蠱吐出成蝌蚪形是蝦蟆蠱經年不治噉人脾胃俱盡唇口裂而死蜣蜋蠱者脉緩而散病發之時身體乍冷乍熱手脚煩疼吐逆無時小便黄赤腹内疼胸中痛顔色多青或吐出似蜣蜋有足翅是蜣蜋蠱經年不治噉人血脉枯盡即死欲試蠱與非當令病人唾於水内沉者是蠱浮者非也又云旦起取井花水未食前當令病人唾於水内唾如柱脚直下沉者是蠱毒沉散不至下者是草蠱毒又方含大豆若是蠱豆脹皮脫若非蠱豆不爛脫又云以鵠皮置病人卧下勿令知若病劇者是蠱又云取新生鷄子煮熟去皮留黄白令完全日晩口含以齒㣲齧之勿令破作兩炊時夜吐瓦上著霜露内旦看大青是蠱毒也昔有人食新變鯉魚中毒病心腹痛心下硬發煩悶欲得水洗沃身體揺動如魚得水状有人診云是蠱其家云野間相承無此毒不作蠱治遂死大凡人體弱自不可輕於濯江南有射工毒其色黑形如肉臠口中横骨如角弓生溪間内或因雨潦逐水而入人家含沙射人之影得之寒熱悶亂頭目俱痛亦如中尸卒不能言又水毒虫一名溪温得之病状與射工相若但有爛瘡為射工無瘡為溪温特少異耳又沙風虫細如疥虫視不得見遇隂雨則行出草間著人身則鑚入皮裏刺如針芒是三者為病朝輕暮劇皆能殺人以方術灸法灸之若治之不早變生飛蠱倐入患軀噉食五臟而死矣挑生之毒其類是乎挑生多於飲食過度凡魚肉菓菜茶湯酒醋之中皆可挑毒以中人自嶺以南率多有此其候初覺胸腹作痛次則漸漸如刺十日生於腹中生則能動矣治法胸痛則為生在上膈腹痛則為生在下膈如上膈者用膽礬五分投入一盞熱茶之内候礬烊連口服之少頃以鷄翎攪刺喉中取吐在下焦者用川欝金二錢末之米湯調下即㵼出惡物吐㵼以後以人參一分白术茯苓倍之碎為粗末新汲水和入磁瓶中慢火煨至半日毎盞連口服日兩劑又廣山谷間有草曰胡蔓草亦曰㫁腸草或以藥人急水吞之急死緩水吞之緩死又有取毒蛇殺之以草覆蛇汲水洒草數日菌生採取為末入酒毒人始亦無患後再飲酒毒發立死其俗滛婦多遇合北人情好雖稠不肯令歸隂以藥置食中與之還即叩之曰子某年來若從其說復以藥解之若過期不來則斃矣又云猫鬼者云是老狸野物之類變為死蜮而依附於人人畜事之猶如事蠱以毒害人其病状心腹刺痛食人臟腑吐血痢血而死又野道者是無主之蠱也人有畜事蠱以毒害人為惡既積乃至死滅絶其蠱則無所依止浮㳺田野道路之間有犯害人者其病發猶是蠱之状但以其於田野道路得之故謂之道也方大金牙散治一切蠱毒百疰不祥醫所不治金牙鸛骨石膏班猫活草子胡燕屎白术雷丸龍牙銅鏡鼻梔子仁乾漆龜甲鼈甲鬼督郵挑白皮大黄各四分桂心芍藥徐長卿羚羊角射干升麻鳶尾馬日毒公蜂房細辛乾薑芒硝田跂犀角甘草狼毒蜣蜋龍膽狼牙雄黄真珠各三分芫花莾草射㒺烏梅各一分蛇脫皮一尺鐡精赤小豆研一合地膽摴雞芫青各七枚桃奴巴豆各二枚右治下篩服一刀圭稍加至二刀圭帶之辟百邪治九十九種一方有麝香無白术紫參丸治蠱注百病癥瘕稍聚酸削骨肉大小便不利卒遇惡風臚脹腹滿淋水轉相注殫門盡戸延及内外族醫不能治者紫參人參半夏洗藜蘆代赭石桔梗白薇肉蓯蓉各三分石膏一分大黄一分牡蠣一分熬丹參一分蝦蟆夾巴豆七十枚去皮心熬烏頭炮四分狼毒七分附子炮五分右搗篩蜜丸如小豆大以米飲下一丸日三服老小以意加减人參丸治蠱注四肢浮腫肌膚消瘦欬逆腹大水壮漏泄人參紫參半夏湯炮七次去滑藜蘆炒代赭石研桔梗炒白薇肉蓯蓉酒浸切焙石膏碎牡蠣粉丹參各三分乾蝦蟆灰狼毒炒附子炮裂去皮臍各一兩巴豆七十枚去皮心膜油右搗研為末煉蜜丸如梧桐子大毎服一丸至三丸量虛實米飲下犀角丸治蠱毒百病腹暴痛飛尸惡氣腫犀角屑鬼臼屑桂心末羚羊角各四錢天雄莾草真珠雄黄各一兩貝母子五枚燒蜈蚣五節巴豆五十枚麝香射㒺如雞子黄大一枚右為末合搗蜜丸如小豆服一丸含咽不知少増之卒得腹滿蜚尸服如大豆許二丸若惡氣腫以苦酒和塗上縫袋子盛藥繫左臂辟不祥鬼疰蟲毒可以偹急一方無天雄大黄空心米飲下一二丸北地太守酒治萬病蠱毒風氣寒熱方一名烏頭酒烏頭甘草芎藭黄芩桂心藜蘆附子各四兩白歛桔梗半夏栢子仁前胡麥門冬各六兩右七月麹十斤秫米一斛如醖酒法㕰藥以絹袋盛之沉於甕底酒熱去糟還取藥滓以青布袋盛沉著酒底泥頭秋七日夏五日冬十日空腹服一合日三服以為度藥有小毒故以青布盛之斷勿中止二十日大有病出其状如漆五十日病悉愈有婦人年五十被病連年腹中積聚冷熱不調時時切痛遶臍絞急上氣胸滿二十餘年服藥二七日所下三四次即愈又有女病徧枯絶産服二十日吐黑物大如刀帶長三尺許即愈期年生子又有女人小得癲疾服十八日出血二升半愈有人被杖崩血内室卧著九年服藥十三日出黑血二三升愈有人耳聾十七年服三十五日鼻中出血三升耳中出黄水五升便愈古方云喜平二年北地大守臣光上造此主蠱毒有人中蠱毒者服無不愈極難瘥者不過二七所有效莫不偹出曽有一女年四十餘歳徧枯羸瘦不能起長床枕聾耳一無能聞兩手不收已經三年余為合之遂得平復如舊有人中蠱毒而先患風服菌芋酒傷多吐出蠱数十枚遂愈何况此酒何不下蠱也加其功效有異常方故具述焉雄黄丸一名太乙五蠱丸耑治五蠱吐血傷心腹中寒語聲中出氣悶飲食不吐逆身體浮腫頭疼痛戰夣與鬼交狐狸作魅卒得心痛上义心胸或痛如刀刺經年不起方見䖝毒吐血類保靈丹出直指方耑治蠱毒諸毒一切藥毒朱氏方云徃時蜀喜行毒而成都故事歳以天中重陽時開大慈寺聚人物出百貨其間號名藥市者於是有於窻隙間呼貨藥一聲識其意極投以千錢乃從忩隙度藥一粒號解毒丸一粒救一人命夫迹既叵測故時多疑之政和間祐陵以仁聖惠天下嘗即上清寳籙宫之前新作兩亭左曰濟人主給藥治病苦右曰輔正主符水除鬼邪遂詔海内凡藥之治彰彰有聲者悉索方書而上之於是成都守監司奉命相共窮其状乃得售解毒丸者葢甚懼行毒者為讎害故匿其迹非有所謂仙者既據方修治得其全即并藥奏御下殿中省上曰朕自施天子所服御以濟元元毋煩有司也繇是殿中省令羣醫驗之則王氏愽濟方之保靈丹爾是時猶子行適領殿中監事故獨得其詳吳子南攜之嘗救兩人食胡蔓草毒得不死盖不可不書硃砂研細一兩大山豆五錢雄黄黄丹麝香黄藥子續隨子生杵末各二錢五分川巴豆肥者二錢五分取肉不去油斑猫二錢五分去頭翅足糯米半炒半生用赤蜈蚣二條一炙一生右入乳鉢研和用糯米稀糊丸如圓眼大隂乾磁合收毎服一丸好茶清吞下不得嚼破須臾病人自覺心頭如拽斷皮條聲將次毒物下或自口出或大便出嫩則是血老則成鱉或蜣蜋諸雜帶命之物藥丸凝血并下以水洗净收之可救三人如中蠱口噤即挑開如斡牙不開打落牙一兩枚下藥若蛇蝎蜈蚣諸毒以好醋磨傅患處立解服藥已效如知毒害之家不必研究若訴知其毒再發不救瘥後更忌酒肉毒食一月為軟飯可也或急用但擇吉日精潔修合不急冝用端午日重陽修合勿令鷄犬婦人見之鮫魚皮散治諸蠱注氣變化無常鮫魚皮㣲炒犀角鎊麝香白龍骨丹砂研雄黄研蘘荷根鹿角俱鎊各一分蜈蚣炙去足一條右除研外搗羅為散共和令勻毎服二錢以温酒調下日三服一方有椒一分乾薑一分貝子十枚鷄舌香一分聖惠丸出直指方耑治蠱毒心腹堅痛羸瘁骨立面目黄瘦硃砂研雄黄研細各七錢五分藜蘆去蘆頭莾草㣲炙鬼臼去鬚各五錢肥巴豆肉十五粒去油麝香一錢斑猫去翅足三錢糯米炒黄青色大蝦蟆一个燒存性研細末右為細末煉蜜和搗五百杵丸如小豆大毎服五丸空心酒下少刻更喫粥一盞利出虫蛇惡物若不吐痢更服二丸必效一方無青大蝦蟆石刻方治蠱毒宋嘉祐中范吏部道為福州守日掲方於石云凡中蠱毒無論年代近逺但煮一鴨卵插銀釵於内病者噙之約一食頃取視釵卵俱黑即中毒其方用五倍子二兩硫黄末一錢甘草二寸半生半炙丁香木香麝香米粉各少許糯米二十粒右用十分放瓶内煎七分候藥而生皺為熟絹濾去滓通口服病人平正仰卧令頭髙覺腹中有物衝心者三即不得動若出一盆桶盛之鰇魚之類乃俟惡物吐罷飲茶一盞㵼無妨旋煮白粥補忌生冷油膩鮓醬十日後服解毒丸三五丸經旬平復雄黄丸主蠱毒中藥欲死雄黄研硃砂研藜蘆炙馬日毒公巴豆去心皮炒各二分皂角炙去皮子二分莾草二分右搗篩以蜜丸如大豆許水服三丸當轉下先痢清水次出蛇等當煩悶者依常法可用鴨羮補之忌生猪肉冷水及蘆笋狸肉妙治一切蠱毒邪妖鬼疰病者有進有退積聚堅結心痛如切齒不可坐卧及時行惡氣瘟病風熱瘴氣相傳染或時熱如㾬癗咽喉腫塞不下飲食或煩滿短氣面目赤或目中赤黄或乾嘔或吐逆或下赤白痢或熱如蒸或欲狂走自殺或如見鬼或手足冷或熱而飲冷水不知足或使手掇空或面目癰腫生瘡耳聾目暗頭項背脊强不得屈伸或手足卒癢或百鬼惡疰狐魅入體痛無常處方出千金方麝香丹砂特生礬石馬目毒公馬齒礬雄黄各一兩巴豆九十粒青野葛三兩一方不用右為末别搗巴豆如膏合搗五千杵内蜜更搗一萬杵丸如小豆大强者服二丸弱者服一丸水下入腹雲行四布通徹表裏即得安瘥如病在膈上吐膈下痢或蛇虫諸毒五色熱水或不吐下便後漸除瘥萬蠱妖精狐狸鬼魅諸久痼癖塊皆消散在表汗出在裏直下忌名其藥故此方無名也七寳丸出直指方耑治蠱毒破皷皮蠶退各燒存性刺蝟皮五倍子續隨子硃砂研雄黄研右等分為細末糯米稀粥糊丸桐子大毎服七丸空心熟水下犀角散治中五蠱下血咽喉妨悶犀角鎊三兩蘘荷根四兩黄連去鬚二兩升麻三兩茜根一兩當歸切焙三兩羖羊角三寸炙焦右粗搗篩毎服五錢以水一盞半煎七分去滓不拘時温服一方有苦參無茜根奪命丸一名大乙追命丹耑治五蠱及惡氣心腹脹滿時作喘心痛聚積及疝瘕宿食不消吐嘔噦寒熱瘰􅊓方見諸毒類羖羊皮散治中蠱毒腹内堅如石面青黄小便淋瀝無常病肘後古今籙驗方俱云用鐡精烏鷄肝和丸酒服三丸冄甚者不過十日千金用後方疑千金語羖羊皮方五寸犀角芍藥黄連牡丹各一兩蘘荷四兩五錢梔子仁七枚右㕮咀以水九升煮取三升分三服一方無芍藥牡丹梔子用苦參當歸蠱即出席云余與一人應時吐蜂兒数升則瘥一方羚羊角無羊皮不拘時候温服五蠱湯一名犀角散耑治諸蠱毒噎喉妨悶犀角屑三兩蘘荷根黄連綘草即茜根也當歸各三兩羖羊皮方二寸炙右以水七升煮取二升分三服忌猪肉冷水丹砂丸一名雄硃丸出百一選方耑治蠱毒從酒食中著者辰砂别研雄黄五錢赤脚蜈蚣一條續隨子一兩麝香一分右為末糯米飲為丸鷄頭大若覺中毒即以酒下一丸蛇蠍所螫醋磨塗之其藥端午日合妙丹砂丸出聖惠方耑治蠱毒雄黄别研硃砂别研各五錢藜蘆畧炒鬼臼巴豆去心皮各一錢右為細末煉蜜和丸如豆大毎服三錢空心煎薑湯送下當轉惡物并蠱等如煩悶後以鴨為羮食之皂莢散出聖惠方耑治蠱毒猪牙皂角一兩去黒皮塗酥炙黄焦去子用木香五錢雄黄細研一錢天麻一兩當歸一分剉㣲炒右羅為散毎服不論時以煎水調下一錢治人得藥雜蠱方出千金方斑猫六枚桂心藜蘆各如指大釜月下土如彈子大右治篩水服一錢下蠱蛇蝦蟆蜣蜋毒俱出化蠱丸一名如智丸耑治諸般蠱痛硫黄研一兩木香蜜陀僧煨三分附子炮製去皮臍别為末一兩右除附子别研外搗羅為末先将附子末用米醋一盞熬成膏入前藥末丸如桐子大毎服十丸荆芥湯下空心食前服蠱化為水乃愈升麻湯出聖惠方耑治初中蠱毒升麻桔梗炒栝蒌根各一兩右粗搗篩毎服三錢以水一盞煎七分去滓不拘時服治蠱毒方令病人唾水中沉者冝用巴豆兩粒去臍尖心膜豆豉十七粒竈額上煤二錢一用釡底墨右同研細以生甘草水作一服調下或吐血或瀉血内有如蛇形及蛺蝶蜣蜋蜘蛛螻蟻之類即效如有患者先令嚼大豆一合如口内覺豆腥即不是蠱毒若覺甘美便是蠱也速服此藥一方白蜜為丸甘草湯下一方飯為丸温酒下一方適水為丸如彈子大一丸新汲水磨下若毒在膈即吐出在腹即㵼下茅香湯下赤罽丸治五蠱下痢去膏血芫花一升巴豆一百粒去心皮炒赤罽方方一寸右搗篩以蜜丸更搗丸如胡豆大水服一丸如痢不止以清粥汁止之不效小増之欲令隂除不令大下忌蘆笋狗肉桃白皮散出聖惠方耑治蠱毒喉中如物嚙嚥之不下吐不出或下鮮血漸漸羸瘦腹大食飲不下桃白皮五月五日採隂乾臨用去黒皮一兩五錢大㦸剉炒斑猫去翅足米炒各三分右搗羅為散毎服一錢以空心清粥飲調下雖大困終不損人候吐盡良久食粥飲李饒州云若以酒中得則以酒服以食中得以食服之一分冷水調下夷堅志以米泔為丸忌鷄犬婦人見治蠱毒方燕屎三合零陵香獨頭蒜十枚去皮右和搗為丸如桐子大毎服三十丸水服蠱當随痢下而出礬茶散出濟生方耑治中諸毒及挑生毒亦觧藥蕈毒嚼黑豆不腥礬味甘乃中毒之候晉礬建各等分右為末毎服三錢新汲水調下得吐即效未吐再服若欲驗知是中蠱當令病人唾水中沉者是蠱不見非也雄麝散出濟生方耑治五種蠱毒雄黄末麝香各一匙右生羊肺如脂大以刀開内雄黄等末以肺裹吞之一方有雌黄末國老飲治蠱毒白礬末甘草末右等分清水調下或吐黑涎一兩碗或㵼亦驗兼治喉痺及嶺南啞瘴治草蠱術入人喉刺痛此術在西凉更西嶺南人多行此毒甘草炙藍汁右搗羅甘草為末毎服一錢以藍汁調服治草蠱毒入人咽喉刺痛以及中蠱下血維肝日夜不解欲死者方出千金方桔梗剉炒犀角鎊各一兩右搗羅為散毎於食前以煖酒調下三錢即愈七日止當食猪痺補之東坡雄黄丸出直指方耑治蠱毒及蛇獸毒雄黄明白礬生研等分右端午日研細鎔黄臘為丸如桐子大毎服七丸念藥王菩薩藥上菩薩七遍熟水送下蜜髓煎出聖惠方耑治中蠱毒令人腹内堅痛面青黄瘦變無常候猪骨髓研五兩蜜一碗右同煎令熟分為十服三四服即瘥化毒丸出聖惠方耑治蠱毒難愈喉中妨悶瘦瘁胡燕屎炒一合獨頭蒜五枚右同搗如膏丸如杏仁大毎空腹以清粥飲下十丸至十五丸其蠱化作鮮血一方有零陵香馬兠鈴根湯出聖惠方耑治五種蠱咽中有物嚥吐不出悶亂不卧心熱不能食馬兠鈴一兩蘘荷五錢右粗搗篩毎服三錢以水一盞煎至七分去滓不拘時候頓服其蠱並吐出一方單用馬兠鈴煎水服如要吐出蠱者用麝香温水服之即出愈治蛇蠱方出千金方治蛇毒入菜菓中食之得疾右用大豆末以酒漬絞取汁服半升治蠱氣方方見本門治蠱毒類治蠱方犯此病者小便不通用五六月間菜園内屎缸中隔宿新浸死蝦蟆大者以巴豆八粒乾葛甘遂各五錢放口上填入令盡用麻線縫合却將兩片銅瓦合住兩頭用黄泥固擠柴炭煏透内藥焦乾為末不可太過㣲赤色為妙取出研末毎服三錢酒下其病深於小便内下小兒加减之已死人用硬物斡開口灌下仍用手揉其肚立效治挑生雷州民康材妻為蠻巫林公榮用鷄肉挑生值啇人楊一善醫療與藥服之纔食頃吐積肉一塊剖開筋膜有生肉存已成鷄形頭尾嘴翅悉具康因訢州捕林至獄而呼楊生令具疾症用藥畧云凡喫魚肉𤓰菓湯茶皆可挑生初中覺胸腹稍痛日漸加刺滿十日則物生能騰上胸痛沉下則腹痛漸瘦悴此候也昔陳可大知肇慶府脇下忽腫起如生癰癤頃刻間其如碗識者云此中挑生毒也候五更以菉豆嚼試若香甜則是已而果然乃用此方用升麻為末冷熟水調二大錢服之遂洞下㵼出腫即消續煎平胃散調補若在上膈即取之其法用熟茶一甌投膽礬五分於中候礬化盡通呷服良久以鷄翎探喉中即吐出毒物在下膈即㵼之以米飲服欝金末三錢毒則㵼下乃碾人參白术末各五錢同無灰酒半升入瓶内慢火熬半日許度酒熟取出即温服之日一盃五日乃止然後飲食如故治蠱毒及金蠶蠱毒方如中毒者先以白礬末令嘗不覺澁而味甘次食黑豆不腥乃中毒也即濃煎石榴根皮飲之不下即吐出虫皆活無不愈者李誨之云凡中毒以白礬茶芽搗為末冷水飲之又方用菖蒲末一味切焙乾為末以甘草煎湯調下不拘時以病退為度知府張叔潜云平生用此甚驗居官毎施此藥治中一切藥食蠱毒用續随子随多少以熱湯送下毒随大便痢去啇陸汁方治蠱毒用生啇陸五兩洗細切用生薑五錢和搗取自然汁半盞五更初服之服了坐半時即睡至旦不動即以茶一盞投得痢以冷水洗手面便止煮韮白粥俟冷喫三五度便安鷓鴣酒治瘴及蠱氣欲死者以鷓鴣合羊肉熬酒煮服之或單鷓鴣以酒服之神驗散治中蠱毒用相思子三七枚搗羅為散毎服二錢以空心温水調下服後欲吐且忍之忽便吐不可忍即吐其毒出少時以稀粥助之勿食猪肉輕者七日瘥治忽中蠱毒方出海上名方用白鷄血不拘多少白鴨血亦得取灌口立解生漆丸出直指方耑治蠱毒用正料平胃散用生漆和丸桐子大毎服七十粒空腹温酒下加至百粒蠶退散治蠱毒方見觧諸毒類治蠱毒方用牡丹根搗為末服一錢毎旦一服良温酒調下治蠱毒出肘後方取白鸛肫用砂石磨水服胡荽根汁出肘後方治中蠱毒神驗用胡荽根一握先剉搗取自然汁半盞不拘時候服之其蠱立下和酒服亦佳治中蠱毒出肘後方用生玳瑁水磨濃汁飲服一盞即解治蠱毒咬用烏雌鷄屎炒服之又方出聖惠方用土瓜根大如拇指長三寸切以酒半升漬一宿一服當吐下蠱亦名王瓜又方用王瓜根及葉搗汁服當吐冝少進之有小毒故也㯽榔散治諸蠱在臟腑久不瘥用㯽榔剉五錢搗羅為散毎服一錢至二錢以葱蜜湯調下空心食前服馬兠鈴根湯出聖惠方耑治五種蠱毒及草蠱術在西凉處嶺南人若行此毒入人咽喉刺痛欲死者用馬兠鈴根一兩細剉以水一盞煎至七分去滓空腹頓服即時吐蠱未吐再服以快為度一方用苖為散温水調服一方用根搗末水服方寸瘥麝香散出聖惠方耑治五種蠱毒蛇食飲中得之咽中如有物咽不下吐之不出悶亂不得卧心熱不食用麝香研一錢分為二服以温水空腹調下吐出蠱毒為效獨效飲出聖惠方耑治蝦蟆蠱及蝌蚪蠱其病得之心腹脹口乾思水不能食悶亂大喘急氣發用車脂半升漸漸服之其蠱即出一方温酒烊令熱漸漸服之車脂乃車中膏油也猪脂方出聖惠方耑治蜣蜋得之胸中或哽噎怵怵如蟲行欬有血咽喉臭氣出用猪脂半合服之其蠱即下或吐之自消也治一切毒方出肘後方取膽子礬為末用糯米糊丸如鷄頭大以硃砂為衣以空心服之冷水化一丸立瘥治諸蠱毒方用鰻鱺魚乾為末空腹食之三五度瘥一方燒炙之令香食尤佳鰻鱺魚有五色文者良治蠱疰方方見本門解蠱毒類又方用黄瓜楼根乾者二兩搗以綿褁酒一升漬去渣温服少時吐蠱出後煮粥一兩盞吐痢即斷不斷煮人參甘草炙生薑各一兩服之又方出聖惠方用猪膽導下部至良一方以猪膽瀝内下部中以綿深導内塞之又方出肘後方用隠葱草汁飲一二升此草桔梗苖人皆食之若蠱已食下部肚盡腸穿者取長股蝦蟆青背一枚鷄骨一分燒為灰合内下部令深入犀角散出肘後方耑療蠱状如鬼氣者以犀角射香雄黄為散毎日空心及晩食前温水調下一錢或帶此於身防預急用甚妙又方出肘後方用猪肝一具蜜一升共煎之令分為二十服解毒散出肘後方治蠱毒方見解諸毒類薺苨湯出危氏方耑治蠱毒凡毒多因假毒藥投之覺時冝煮大豆甘草薺苨汁飲之治飲食中蠱毒令人腹内堅痛面黄青筋露骨立病變無常用桑木心剉解着釡中以水淹之三斗水煮取二斗澄清㣲火煎五升宿勿食旦服五合則吐蠱毒出亦可治中蠱吐血肘後用棗木心鐡精丸出聖惠方耑治食中有毒腹内堅痛兩目青黄瘦悴􅅹露骨立病變無常用鐡精不拘多少搗羅為末研生鷄肝和丸如桐子大曝乾毎服五丸至七十丸温酒下鐡精乃煆灶中如漉紫色輕者為佳五蠱丸出醫方大成治蛇蠱蜣蜋蠱蝦蟆蠱蝌蚪蠱草蠱含升麻嚥汁妙一方治虫蠱毒為末溪水調服治黄腫蠱氣通身黄者出聖惠方用瓜蒂焙乾三四錢細末毎用半字於鼻孔中吹上日一度併吹三日如不愈後用黄芩末煎湯調下五錢治飛尸逰蠱著喉中氣欲絶者出聖惠方以鳶尾根削去皮内喉中磨病處令血出佳治百蠱不愈方出聖惠方右取鵓鴿熱血隨多少服之又方出聖惠方右取越燕頭血隨多少服之甘草湯出聖惠方耑治凡畏忌中蠱欲死右甘草五錢生用以水一大盞煎至五分頓服之當吐痰出若單要預防蠱者宜熟炙煮汁服即内消不吐神驗治中蠱心痛方出肘後方以及欲呼蠱主姓名右取敗皷皮一片燒灰細研粥飲調服二錢病人須臾自當呼蠱主姓名可語便去則便愈亦有蛇蜓合作蠱毒着飲食中使人得瘕病此一種積年乃死療之各自有藥又蘘荷葉宻着病人卧席下其病人即自呼蠱主姓名也一方水和服之令病人即喚蠱主姓名其蠱便瘥此症係被他人飲食中所有此病當令病人吐唾入水沉是浮者非也其蠱状令人心腹切痛如有物咬或下血不即治之蝕人五臟盡則死矣寄生散出聖惠方耑治中蠱毒令人腹内堅痛面目青黄形露骨立病變無常用桃樹上寄生搗羅為散毎服三錢不拘時候如茶㸃服之萬病丸一名五蠱黄丸耑治蠱注四肢浮腫肌膚消索欬逆腹大如水狀死後轉移家人方見食牛馬猪犬魚蟹中蠱類相思丸出聖惠方耑治猫鬼眼見猫狸及雜所聞相思一枚萞麻一枚巴豆一枚去皮心硃砂二分蠟三錢右合搗令先取麻子許大含之即以灰圍患人前頭旋吐藥於灰中吐盡即止灰上作十字其猫皆死治中蠱毒用預知子根冬月採隂乾石臼内搗下篩凡中蛇毒則水煎三錢温服立效又方出聖惠方用臘月猪脂小兒頭髪灰相和熱酒調下一錢療内脹病并蠱疰中惡等以及蜂百毒溪毒射工雄黄真丹砂别研礬石熬各一兩生礬三兩五錢燒之鬼臼一兩五錢蜈蚣一枚赤足者少炙斑猫去翅足附子炮各七枚龍膽五錢藜蘆七分炙杏仁四十枚去皮尖熬右搗篩蜜和搗千杵内脹病中惡邪氣飛尸逰走皆水服二丸如豆大若積聚堅結服四丸取痢洩下䖝蛇五色若蛇疰病中惡邪飛尸遊走皆二三丸以二丸磨痛上若蛇蜂百病若中溪毒射工其服者視强弱大小及病輕重加减温水服二丸治中蠱毒諸毒人有行蠱毒以病人者若中之當服藥如知其姓名便呼取以去也凡診法中蠱状令人心腹痛如有物咬或吐下即治之蝕人五臟盡即死欲知是蠱當令病人吐水沉者是浮者非也有以䖝蛇作蠱病飲食中使人得瘕病此一種一年内治可愈江南山間人有此不可不信之南方有蠱毒處於他家飲食即以犀角搗之白沫竦起即知有毒無則無毒也解中蠱毒造蠱之家用毒有日如正月則用初一日二月二日三月三日四月四日五月五日六月六日七月七日八月八日九月九日十月十日十一月十一日十二月十二日延平有僧惠全者刋板以警悟人凡蠱毒有種皆治辟蠱毒取生瑇瑁甲帶之凡遇飲食有毒則必揺動死者則不能神矣薛王之鉏南海人獻生瑇瑁者王令掲取上甲二月二繫於左臂遇毒瑇瑁甲自動歸乃飬於便宅後池河其掲處復生還遣送舊處無傷矣治草蠱其状入咽刺痛痛欲死者以胞衣一具切曝乾為末熟水調一錢下最療蛇蠱蜣蜋草毒等治蠱状如蝸牛食下部痒取篇竹一把水二升煮熟五歳小兒服三五合隔宿食明早服之尤佳治蠱毒以茜根酒煎服治蠱用麥苖煮取汁細細服之治蠱飛尸取象豌子中仁碎為粉㣲煮水服一二錢治蠱毒以陳思岌煮服之治蠱殺䖝以預知子去皮研服有效試蠱取棷子殻為酒器如酒中有毒則酒沸起解蠱毒以藍汁服之治中蠱及治下血如鷄肝晝夜不絶臟腑敗壊待死以白蘘荷煮汁服并卧其葉即呼䖝主姓名搜神記云昔蒋士先得疾下血言中蠱家人宻以蘘荷置其席忽然大笑曰蠱我者張小也乃收小小走此解蠱藥多用之去蠱毒用苦耽苖子煮汁服之亦生搗絞汁服治飛尸遊蠱以蓼螺生食以薑醋浸之彌佳治䖝蠱用向東者白蘘荷一把搗絞汁三升服之治蠱諸毒以千金藤煎服療中蠱毒手脚不隨以人肝藤用清水磨一彈丸飲之不過三兩服令吐下諸毒又以猯胞乾之湯摩如鷄卵許空腹服之治蠱毒以榼藤子燒作灰為末酒調服之治蠱毒以千里及煮服之吐下治蠱毒取塩麸子乾搗為末食之治蠱毒中惡腹内不調者以研藥剉水煎服之海藥云出南海諸州根如烏圓小封生也治飛尸蠱毒以紫珠煮汁服之治中蠱毒蕈毒以頭垢用米飲或酒化下並得以吐為度治中蠱以蠱䖝燒為黑灰水少許下立愈按敗皷皮注云服敗皷皮即喚䖝主姓名又云古人遇算造䖝圖富取百䖝甕中盛經年間開之必有一䖝盡食諸䖝即皆名為蠱能隐形似鬼神與人作禍然中是蠱鬼咬人至死者或從人諸竅中出信候取之曝乾用之廣南衛生方挑生胡蔓草胡蔓葉如茶其花黄而小凡一葉有百竅漬血人無復生廣西愚民私怒如以自斃家人覺之急取抱卵不生鷄兒細研以麻油灌之吐出惡物而甦少遲不可救矣如人誤服此藥者止以前法解之治蠱毒甚佳用石垂子四月採焙乾生搗羅蜜丸服療蠱毒以故錦燒灰煮汁服治中藥患蠱毒用山豆根不拘多少和水研服少許不止冄服通大小便并㵼蠱毒以白啇陸煎服得大蒜良治蠱毒中惡用鐺墨以酒或水細研温服之療蠱治諸毒取預知子二枚綴衣領上遇䖝毒物則聞其聲當便知之炒桃仁解山嵐氣及蠱毒有驗法桃仁一把茱萸四両青塩四兩如無食塩亦得右用同炒桃仁黄熟了將桃仁茱萸塩入於磁罐内封閉一七日後取出除了茱萸塩只將桃仁去皮尖後時時嚼三五顆祛山嵐毒氣曾經使有效或有去廣者兵士望施散與又方貝母末右毎服半兩令病人盡其酒量劇飲良久酒化為水從傷處出候出盡又以貝母末塞口妙不可加夷堅志云有病此夣道人示頌似犬非犬似猫非猫烹而食之其病自消覺而有狐入其室殺而爛煮食之腹自消白氏六帖云青丘狐食之令人不蠱本草孟鏡云狐補虚又主五臟邪氣䖝毒發寒熱萬病解毒圓治蠱毒挑生毒藥毒草毒畜獸文蛤即五焙子一兩五錢山茨菰金炣花根一兩洗焙全蝎五枚大山豆根續隨子取仁去油留性各五錢麝香一錢硃砂雄黄各二錢紅芽大㦸洗焙七錢五分右先以五味藥入木臼搗羅為散研麝隨子硃砂雄黄夾和糯米糊丸作三十五丸端午七夕重陽臘日净室修合毎一丸生薑蜜水磨下并井水浸研傅所患處解毒收瘡收病神妙硃砂雄黄乃收其毒第一用也一方無山豆根觧䖝毒方頃有朝官與一髙僧西遊道由歸峽程途荒逺日昃餒其小村舍間有食而勢必就去住未判僧曰有神咒可無憂也食至僧閉目誦持俄見蜘蛛縁碗吻曰速殺之於是竟食無所損咒曰姑蘓啄摩耶吾知虫毒生四角父是穹窿母是舍耶女眷屬百萬千吾今悉如汝摩薩薩訶時同行者競傳其所至無恙傳解毒方用豆豉七枚巴豆去皮二粒右入百草霜一處研細滴水丸菉豆大以芋香湯吞下七丸槲皮湯治䖝毒用槲皮木北隂白皮一大握長五寸細剉以水三盞煎至一盞去滓温服空腹頓服得吐即愈豆真圓治中蠱不深久之變為鬼瘧或中氣結邪或胸藏痰癖或口中血出或中惡或驚魘或入邪在裏或産婦胎衣不下或至馬刀腫癰處女經水不調女青二両五錢蘭草白兔藿丹砂研各一兩犀角鎊馬先蒿皂角酥炙去皮子䕡茹各五錢巴豆十粒去皮心膜炒紫色研右除别研外搗羅為末蜜為丸如菉豆大毎服十丸夜半冷水送下治蠱毒方白鴿毛糞燒灰以粥飲服之二錢日三四服一方治急蠱飲調方寸愈治蠱毒用獨行根水煮三兩取汁服導引法治一切蠱毒以兩手著頭相叉坐地緩舒兩脚以兩手從外抱膝中低頭入曲膝間兩手交叉頭十二通愈蠱毒及三尸毒腰中大氣又云常度日月星辰清浄以鷄鳴安身卧漱口咽之調五臟殺蠱蟲令人長生治心腹病又云治百病邪蠱當正卧閉氣内由丹田以鼻徐徐納氣令腹急滿徐徐以口吐之勿令有聲令入多出少以微為度由是五臟各如其形色又存胃中令鮮明潔白為素明晨倦極汗出乃止以粉粉身摩挲形體汗不出而倦者亦可止明復為之又當存作大雷電隆晃走入腹中為之不止病自除普濟方卷二百五十二
