苓一兩甜葶藶一兩炒紫色蘧麥一兩右為末煉蜜和搗二三百杵丸梧桐子大每服空心溫水下十丸良久當利三兩行不利即加丸再服以利即效木通湯出聖惠方治遍身水腫木通銼苦葫蘆各一兩半澤㵼防己各三分豬苓去皮海蛤各一兩研右搗篩每服五錢水七分酒七分入蔥白五寸切煎至八分去滓食前溫服當下小便數升腫消大效葶藶丸出聖濟總録治水氣遍身黃腫葶藶微炒防己陳橘皮湯浸去白焙郁李仁去皮紫蘇子赤茯苓去皮各半兩右為末煉蜜為丸梧子大麝香酒下二十丸日三服以小便利為度白丸子出衛生寶録治水氣腫滿氣息喘急小便不利并男子女人虛損積及遍身黃腫膩粉半兩粉霜四錢滑石末四錢硇砂寒水石火煆為末白丁香真者末各三錢重右先將膩粉滑石二味研勻紅紙褁更和白麵作餅子再褁合復用酒濕紙褁二十四重後用桑柴熟火燒以麵熟為度取出與前藥四味一處研勻用水浸蒸餅心搦乾粘和為丸如豌豆大每煎生薑水下食前喫第一日三丸日三第二日四丸日三第三日五丸日三第四日六丸日三服後以小便無數取下水為度服四日病未下更加一日如服藥第二日覺口氣時便用後嗽口藥嗽之嗽口齒貫衆湯方出衛生寶鑑貫衆黃連去鬚各半兩右搗篩每用一錢匕水一盞煎三兩沸入龍腦少許溫溫嗽之白粥養百日桑白皮湯治患水氣兼頭身靣腫桑白皮四兩橘皮二兩海藻二兩洗去醎茯苓去皮郁李仁各四兩碎赤小豆一升右切以水八升煮取二升半分三服療風腫水腫毒氣遍身方方見本門風水類治水氣遍身浮腫坐臥不得宜服此方出聖惠方杏仁五兩湯浸去皮尖雙仁研桃仁五兩湯浸去皮尖雙仁研昆布湯洗去醎二兩赤小豆半升郁李仁三兩湯浸去皮研右件藥水一斗煮諸藥及豆爛為度濾取汁時復暖半中盞服之豆亦漸食之小便當利即效吳茱茰丸出千金方治水氣遍身洪腫吳茱茰蓽撥昆布杏仁葶藶各等分右為末蜜丸梧子大服五丸勿令飽食食訖飽悶氣急服之即愈麻子湯出千金方治遍身流腫麻子五升赤小豆三升商陸一斤附子一兩防風三兩右㕮咀搗麻子令熱以水三斗煮麻子取汁三升去滓內藥及豆煮取四升去滓食豆飲汁送下甘遂丸出聖惠方治水氣遍身腫滿皮肉欲裂心腹內氣脹小便不利飲食不消甘遂一兩葶藶炒二兩半赤茯苓去皮一兩陳橘皮浸焙去白郁李仁各三分右四味為末别搗葶藶如脂內散中蜜丸如梧桐子大空心飲下七丸日一服如不利稍稍加之以利為度小消化丸出聖濟總録治水腫病通身微腫腹大飲食不消芫花炒甘遂炒大黃炒銼葶藶隔紙炒黃各一兩巴豆去心皮炒出油盡十枚右為末煉蜜丸小豆大每服飲下三丸稍稍增至五丸以知為度麻黃湯治水氣通身腫麻黃去根節二兩半白术銼碎微炒二兩甘草炙一兩石膏研碎三分赤茯苓去黑皮一兩右粗搗篩每服五錢匕水二盞半棗二枚擘破生薑一棗大拍碎同煎至一盞去滓溫服日三每服後蓋覆令汗出瘥木香丸治通身洪腫木香肉豆蔲去皮青橘皮去白焙檳榔煨銼各一兩右為細末用棗肉丸如菉豆大每服空心溫酒下二十丸漸加至三十丸治水氣遍身浮腫上喘小便不通桑枝二兩豬苓二兩商陸一兩右都銼為細末以水五大盞入麻仁半兩小豆一合同煮至二盞半去滓為六服二日服盡桑白皮湯治水腫通身皆腫桑白皮炙黃色銼五兩吳茱茰水浸一宿炒乾二兩甘草炙一兩右㕮咀如麻豆大每服五錢水二盞生薑棗大糖汁一匙煎至一盞去滓溫服日再赤小豆湯治水腫遍身小便澀腹滿赤小豆微炒一升桑白皮炙銼一兩澤漆莖葉切炒三分右將二味綿褁用水九升與小豆三味煮熟去褁只留小豆飢則食小豆渴則飲汁以利為度芍藥湯治通身腫其脈沉遲芍藥銼炒一兩桂去粗皮半兩黃耆銼三分右粗搗每服五錢用米醋一合水一盞半煎一盞去滓溫服忌食鹽十全湯治水氣通身洪腫大麻子皆取新長肥者佳赤小豆不雜者各一石右以新者揀淨以水洗曝乾蒸麻子熟更曝乾貯淨器中欲服取五升麻子熬令黃香宜慢火休焦了為細末以水五升取汁盡淨器盛之明旦飲服今夜以小豆一升淘淨浸至旦漉去水以新水煮豆未大熟即漉出令乾內麻子汁中煮爛為度佳空腹恣食三日腹當小心悶少時即止五日後小便數或赤而唾粘口乾不足為怪服訖微行不可便臥十日後針灸三里絶骨下氣如氣不泄盡服藥後五日逆不可下者取鯉魚一頭先死者去鱗尾以湯脫去滑淨洗破肚去臟以上件和小豆麻汁和小豆完煮熟作羮入蔥䜴橘皮生薑紫蘇調和食之始終斷鹽渴即飲麻汁秋冬暖飲春夏冷飲食不可飽慎房事嗔怒大語酒麵油醋生冷菜茹一切魚肉鹽醬五辛並治一切氣病凡作一月服之大良麻子熟時多收新甕貯之以施人苦瓠丸治大水頭靣遍身腫脹又治卒腫忽覺腳腫漸至膝足不可踐者苦瓠白穰實捻如大豆以麵褁煮一沸空腹吞一枚至午出水一升三四日水自出不止大瘦乃瘥三年內慎口味苦瓠雖好須揀擇細理研淨不爾有毒不可用崔氏子作餛飩服二七枚若虛者牛乳服之如此隔日作服漸加至三十七枚以小便利為度小便若太多即一二日停止治通身腫出子蘿蔔不拘多少浮麥不拘多少右二味一處浸湯服羌活散治水氣腫氣急不得臥羌活蘿蔔子右各等分同炒香熟取蘿蔔子不用末子以鹽酒調二錢一日二服三日三服取效嘉興主簿張昌時傳土狗方出直指方治遍身腫外腎腫生土狗不拘手足全者研細入縮炒縮砂右等分老酒調下大豆散出聖濟總録治水病通身腫滿喘急大小便澀大黃豆醋拌炒大黃微煨去皮各一兩右為散每服二錢匕臨臥時煎蔥橘皮湯調下平明以利大腸為度一字湯一名大戟湯出聖濟總録治水腫通身腫滿喘急小便澀兼治水腫甘遂大戟去皮各一兩右銼碎慢火炒令黃色搗篩每服一字匕以水半盞煎三五沸便須傾出不得煎過火去滓溫服之不過十服一方用棗煎服之大戟散出聖濟總録治通身腫滿喘急小便澀大戟去皮細切微炒二兩乾薑炮製半兩右為散每服三錢匕用生薑湯調下良久糯米飲接之以大小便利為度苦葶藶丸出衛生寶鑑治一切水病氣通身腫滿不可當者人參一兩苦葶藶四兩於鍋內鋪紙炒黃色右為末用棗肉和丸桐子大每服十五丸煎桑白皮湯下日三服空心食前此藥急效人不信試驗之治水腫通身出千金方苦瓠膜二分葶藶五分右合搗為丸如小豆大服五丸日三又方出千金方葶藶桃仁各等分右皆熬合搗為丸服之利小便一方用杏仁又方出千金方大棗肉七枚苦瓠膜如棗核大右熟搗丸一服三丸如人行十五里又服三丸水出更服一丸即止又方出千金方用搗生葶藶子酢和服以小便數為度又方出千金方用煎豬椒枝葉如餳空腹服一匕日三癢以汁洗之治水氣遍身浮腫方出聖惠方右取蔥根葉不限多少細切晒乾杵羅為末每用蔥末二錢席下塵半錢相和作散每服於食前清粥飲調服之治水氣坐臥不得靣目身體悉浮腫方出聖惠方蔥白七斤和鬚分作兩拓子右先以炭火燒一處淨地令赤即以蔥拓子安在地上令病人脫襪以人扶著踏蔥上蹲坐即以被衣圓褁勿令透風得汗通小便汗出黃水蔥冷即止小便多即差矣蒴藋酒出聖惠方治水氣通身黃腫用蒴藋根搗汁一盞和之置暖處一宿旦起空心服之瘥葶藶丸出聖惠方治水腫氣滿用葶藶子三兩蒸過搗如泥和蜜為丸梧桐子大每服五丸加至七丸得利為佳或以葶藶一升用酒五升浸三宿每服取半盞日三小便利佳白鴨方出肘後方治水氣脹滿浮腫小便澀少用鴨白者一隻去毛腸湯洗燒飯半升以飯薑椒釀鴨中縫定如法蒸候熟食之又方出肘後方治通體遍身腫小便不利用豬苓五兩搗篩煎水一合調服方寸匕日二匕牽牛散出聖惠方治水氣遍身浮腫氣促坐臥不得用牽牛子二兩微炒搗細末烏牛尿浸一宿平旦入蔥白一握煎十餘沸去滓空心分為二服水從小便中下大效一方為丸蔥白湯加人尿令可丸服如小豆大日三治水通身腫方出千金方海藻銼錦紋大黃銼大戟銼續隨子去殼各一兩右件好酒二盞淨碗內浸一宿取出晒乾後用甘遂炒黃一兩白牽牛一兩生頭末桂府滑石半兩淨肉豆蔲一箇青皮陳皮並去白各半兩共前藥都作一處杵為細末大人每服二錢如氣實者三錢半平明冷茶清調下至辰時取水三二行腫減五七分隔二三日平明又一服腫消息忌鹽魚肉百日小兒腫服一錢五嵗以上下者半錢婦人有胎不可服木香通氣丸導滯寬膈消腫進食牽牛半斤半生半熟陳皮四兩去白破故紙四兩炒茴香一兩炒南木香一兩檳榔二兩海金沙四兩右件為末清醋為丸桐子大每服三十丸熟水送下食後白术丸治通身腫滿及病氣疾羌活白术半兩木通黃耆桑白皮各三兩木香二兩黑牽牛十兩半生半炒陳皮三兩右為末蜜丸薑湯下塌脹丸治水氣渾身腫喘急小便不利白樟栁根三兩銼細赤小豆五兩陳橘皮去白穰二兩木香一兩右件為末滳水和丸菉豆大每服三十丸煮赤小豆湯下防己湯主通身脹滿小便澀胸膈上下脹悶不能食食則脹者桑白皮五兩大豆五升以水三斗并桑白皮煮取一斗去滓防己橘皮赤茯苓三兩生薑五兩杏仁十枚去皮尖雙仁碎旋覆花一兩紫蘇莖葉二兩切右切以前件藥汁煮取三升去滓分為三服弱者分為五服相去六七里久被覆當大汗小便利腫氣消下冷多加茱茰四兩玄參四兩忌酢物普濟方卷一百九十三
