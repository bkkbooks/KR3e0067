body:
  text: 普濟方卷一百九十三明周王朱橚撰水病門濕腫附論夫腎主水脾胃俱主土土性尅水脾與胃合相為表裏胃為水穀之海今胃虛不能傳化水氣滲液經絡浸漬腑臟水脾得水濕之氣加之則病脾病則不能治水故水氣獨歸於腎三焦不㵼經脈閉塞故水氣溢於皮膚而令腫也除濕丹出經驗良方治腰腳腫足脛浮腫筋脈拘攣便尿不利目赤瘡疥癰疽發背走注腳氣疥癬惡瘡並皆治之澤㵼檳榔乳香另研葳靈仙赤芍藥大戟水煮甘遂水煮各一兩陳皮青皮沒藥另研黑牽牛頭末各半兩右為末麵糊為丸小豆大溫湯下三十丸葶藶丸御藥院方治脾胃受濕流於四肢足脛浮腫小便澀少苦葶藶微炒研黑牽牛生取頭末白术各半兩郁李仁去皮研赤茯苓去皮心桑白皮各三分漢防己川羌活澤㵼各三兩陳皮湯浸去白焙乾各二分右為末用棗肉丸如桐子大每服五十丸溫酒送下不拘時聖靈丹出衛生寶鑑治脾肺有濕喘滿腫盛小便赤澀苦葶藶四兩炒木香檳榔茯苓麵裹煨防己木通人參各二錢半右為細末同棗肉丸如桐子大煎桑白皮湯下大半夏湯出危氏方治脾土受濕不能制水水漬於腸胃溢於皮膚漉漉有聲怔忪喘息名水脹半夏浸洗陳皮茯苓桔梗檳榔甘草各等分右為散每服三錢水一盞半生薑三片煎溫服濕腫胃氣為本至元戊寅五月間積雨淋淫魯齋許仲平先生時年五十有八嵗面目肢體浮腫大便溏多腹脹腸鳴時痛飲食減少命豫治之脈弦細而緩魯齋曰年壯時多曾服牽牛大黃藥面目四肢常浮腫今因隂雨故大發豫曰營運之氣出於中焦者胃也胃氣弱不能布散水穀之氣榮養臟腑經絡皮毛故濕氣行而澀為腫大便溏多腹脹腸鳴皆濕氣勝也四時五臟皆以胃氣為本五臟有胃氣則和平而安若冒氣虛則不能運動滋養五臟故五臟脈不和平若向來氣盛者其脈獨見輕若病太甚則必死故經曰真臟又脈弦無胃氣則死君之疾幸而未至於甚尚可調補人知病而服牽牛大黃為一時之快不知其為終身之害也遂以平胃散加白术茯苓草豆蔲仁數服而腹溏瀉腸鳴及痛皆愈飯食進止如常其肢體浮腫以導滯通經湯主之遂愈導滯通經湯治脾濕有餘及氣不宣通面目手足浮腫陳皮一兩桑白皮一兩木香五分茯苓五分茯苓一兩霖雨時加澤㵼半兩右㕮咀每服五錢水二盞煎至一盞去滓食前溫服牽牛丸治一切濕熱腫滿等病黑牽牛黃芩大黃大椒滑石各等分右為末酒煮麵糊為丸如梧桐子大每服五丸至七丸生薑湯下食後視虛實加減海金沙散治脾濕太過通身洪腫喘不得臥及腹脹如鼓牽牛一兩半半生半熟甘遂半兩白术一兩海金沙三分右為末每服二錢煎熟水一盞調下食前得先利止後一方不用白术赤茯苓丸治脾濕太過四肢腫滿腹脹喘逆氣不宣通小便赤澀葶藶四兩防己二兩赤茯苓一兩木香半兩右為末棗肉為丸梧子大每服三十丸煎桑皮湯下食前服牽牛湯治腹中有濕氣足脛微腫中滿氣急咳嗽喘息小便不利黑牽牛頭末一兩厚朴薑製半兩右為末每服二錢煎薑湯調下或臨時水丸桐子大薑棗湯下三十丸防己湯出鮑氏方治濕氣浮腫防己四兩白术三兩甘草二兩右為末每服三錢薑三片棗一箇煎治脾虛受濕發腫一切虛腫皆治出朱氏集驗方大附十大枚去皮破四塊用小豆半升藏附子於中慢火煮附子透熟軟去豆焙乾附子右為末用薏苡仁粉煮糊丸桐子大每服百十丸空心冬瓜湯下或蘿蔔湯下治水廕病者出本草以獺毛皮作褥履著之并煮汁服治水廕出本草取楤根白皮煮汁服之一盞當下如病已因取根搗碎吸取其氣水自下下濕丸出本草以蜆糟煮食之良去隂一水出本草以烏臼子油服一合令大利治水毒中人一名溪毒一名中濕一名水病似射工而無物出本草以小蒜三升㕮咀於湯中煮莫令大熟即用力捩去滓量寒濕以浴若身體發赤斑紋者即是治濕水出本草以駁驢屎絞汁一服五合良畫體成字者為燥水用牝驢屎不成字者為濕水用駁驢屎卒腫滿附論夫身面卒浮腫者亦水病之候也此由腎脾虛弱之所為也腎主於水今腎虛故水妄行脾主於土脾虛不能制水故水流散入皮膚令身面卒然浮腫也澤㵼湯療寒熱當風飲多暴腫身如吹脈浮數者澤㵼三兩炒知母二兩海藻二兩丹參三兩秦芁二兩木防己二兩豬苓二兩去皮大黃三兩通草二兩青木香二兩右切以水九升煮取三升分三服忌酢物柴胡湯出聖惠方治頭面身體卒浮腫喘促柴胡三分銼川芒硝二兩右為散每服四錢水一盞煎至六分去滓溫服日三四服鯉魚湯出聖惠方治卒身面浮脹腫水腸澀大便難上氣喘促鯉魚二斤洗去鱗腸令淨赤茯苓一兩澤漆一兩杏仁半兩湯浸去皮尖雙仁桑白皮二兩銼紫蘇莖葉一兩右為細銼先以水五升煮魚取汁三升去滓魚內藥煮取二升去滓每服於食前溫服一中盞其魚亦宜食之商陸飲子出聖惠方治卒身面浮腫腹大小便不利喘息稍急商陸柳樹根嫩桑枝各一兩大麻子三兩搗碎桂心一兩右為散每半兩水一大盞煎至五分去滓空心溫服如人行五里大小便當利未利晚再服之甜葶藶丸出聖惠方治卒身面四肢浮腫脅氣脹滿小便不利漢防己海蛤研細椒目微炒川芒硝赤茯苓各一兩甜葶藶二兩隔紙炒紫色右為末煉蜜和搗三二百杵丸梧桐子大每服以後四味湯下三十丸日三服下丸藥湯方出聖惠方木通一兩銼桑根白皮一兩銼百合一兩郁李仁半兩湯浸去皮微炒右為散每服三錢水一大盞煎至六分去滓下前丸藥又方出聖惠方治頭面四肢卒浮腫大小便澀及隂腎腫甜葶藶二兩隔紙炒令紫色牽牛子微炒海藻洗去醎味焙豬苓去黑皮澤㵼各二兩昆布洗去醎味焙右為細末煉蜜和搗三二百杵丸如梧桐子大每服二十丸煎大麻子湯下日三服赤茯苓湯出聖惠方治頭面身體卒浮腫赤茯苓一兩枳殼二兩麩微炒陳橘皮半兩湯浸去白焙甘草半兩炒多銼牽牛子二兩薇炒右為散每服五錢水一盞煎至五分溫服日三四服甜葶藶丸治頭面四肢卒浮腫小便澀及隂腎腫甜葶藶二兩隔紙炒令紫色海蛤炒一兩細研川大黃三兩銼碎微炒甘草二兩煨透令黃焙杏仁一兩半湯浸去皮尖雙仁麩炒黃右為細末棗肉丸如桐子大每服日空心煎木瓜通草湯下丸以利為度甘遂麻黃散出聖惠方治卒身面目腫喘急氣促大小便赤澀甘遂一兩煨微黃麻黃二兩去根節桑根白皮一兩半銼右為細末每服煮赤小豆汁調下二錢日再服以利為度治卒身面浮腫腹脹大小便不利喘息方出聖惠方赤小豆一升椒蔥十莖細切硝石一兩右三件藥以水五升并蔥同煮令豆熟候水乾於砂盆中入硝石研或膏每日空服以暖酒下半匙葶藶丸出聖惠方治卒身面浮腫上氣喘促甜葶藶半兩隔紙炒紫色搗研如膏漢防己一兩末杏仁半兩湯浸去皮尖雙仁生搗如泥右件藥和勻棗肉和搗三二百杵丸如梧桐子大每服煎橘皮湯下三十丸日三四服甘遂丸出聖惠方治卒身面浮腫上氣喘促甘遂半兩煨令微黃蒜瓣半兩煨熟研黑豆半兩炒熟右件藥除蒜外搗為細末并蒜棗肉和丸如梧桐子大每服木通湯下十丸日二服又方療身體暴腫滿榆皮搗屑隨多少雜米右令和作粥食小便利甘遂方出肘後方治卒腫滿身面背洪大小便澀用甘遂一分粉之豬腎一枚分為臠入甘遂於中以火炙之令熟二食至四五當覺腹鳴小便利治身面卒腫滿出肘後方用芫花兔絲子一升酒五升浸二三宿每服服一升日二服療卒腫滿身面背洪大出肘後方用大鯉魚一頭以醇苦酒二升煮之令苦酒盡訖乃食魚勿用酢及鹽豉他物雜也再作愈又方出肘後方用車下李樹中仁十枚研令熟粳米三合研令破以四升水中煮作粥令得一二升服之日三作未消則更增枚療卒患腫滿曽有人忽腳跌腫漸上至膝足不得踐地諸療不差方以葫蘆莖葉埋熱灰中令極熟以傅腫上冷又易一日夜消又方出肘後方治卒身面腫滿脈皆洪大用大豆一斗熟煮漉飲汁及食豆不過數度必愈小豆尤佳又方出肘後方取雞子黃白相合和塗腫處乾復塗之又方出肘後方用杏葉銼煮令汁濃及熱漬之亦可服之治身體頭面忽有暴腫處如核者出千金方以巴豆三十粒連皮碎用水五升煮取三升出滓以綿點扺上腫處即消勿近日及隂又勿近口又方以生參薄切貼頭上核佳又方以磁石為末醋和傅之又方以甘蕉根搗爛塗患處蕉子不中食治卒心腹水病浮氣水腫用胡燕卵中黃頓吞十枚即差治卒腫身面皆洪大方出肘後方商陸根一斤刮去皮薄切之煮令爛去滓內羊肉一斤下蔥頭鹽如食法隨意食腫差後亦宜作此亦可常搗商陸根和米作餅子食之又方出肘後方切商陸一升以酒三升漬三宿服五合至一升日三服之凡此滿或是虛氣或是水飲氣化此方皆治之又方出肘後方防葵末溫酒服一兩刀主至二三服身潤又治不仁亦效治卒腫滿身面皆浮出本草以大生豬肝一具細切頓食之勿與鹽乃可用苦酒妙膜外氣附論聖濟總録論曰諸家方書論水病甚詳未嘗有言膜外氣者唐天寶間有徒郁子者始著膜外氣方方書本未完具自成一家今併編之然究其義本於肺受寒邪傳之於腎氣虛弱脾土又衰不能制水使水濕散溢於肌膚之間氣攻於腹膜之外故謂之膜外氣其病令人虛脹四肢腫滿按之沒指是也徒郁子之論病本云膜外氣者或謂水氣也起於他疾不可常定或因瘧或因腎藏中風或因肺腑傷冷或因隔上氣或因衝熱逺行或因酒肉中所得始於肺終於腎或因咳嗽或多涕唾或因蓄聚冷氣壅塞不散遂使肺藏熱氣氣攻心五臟冷氣不化為水流入膀胱在大腸膜外所以切脈不能知針灸不能及蓋人腎為命本不可虛也本固即葉茂本虛即易枯况四時衰旺皆乘腎藏之氣腎損即五臟皆衰是致胃閉而脾不化氣結而小便澀輕重之候在大小便耳若小便不通則氣壅攻擊腹內衝出膜外化而為水使人手足頭面浮腫大小便微澀則微腫極澀則極腫大小便俱不通三日即遍身洪腫至重則隂亦腫夫隂腫有二有腫而小便自出者有腫而小便出澀者又有莖頭連少腹臍皆腫者此並為死候宜速治之若患此疾腫亦不常定或先面目浮腫或先腰肋微腫或先手足之腫其候或消或甚三五日稍愈或三五日再發亦以小便通澀為候積漸變成洪腫婦人得之與此略同凡患此疾令人腹脹煩悶胸間氣急此由肺脹甚即喘如牛吼坐臥行立不得或中夜後氣攻胸心腫者一年二年方死有一月兩月死者若將息失度誤食毒物十日五日即死也愚醫多以針灸出水為功又以鯉魚赤小豆為藥又令病人飲黃牛尿服商陸根反有所損少有差者大抵此病尤忌針灸華他云患水病未遇良醫第一不得針灸氣在膜外已化為水水出即引出腹中氣水盡則死扁鵲云水病在膜外常藥不可療惟神針良藥可也有此疾者宜向陽行坐遇隂雨則愈覺壅滯房中常須存火服後夜臥覺胸間熱甚宜含紅雪與好茶之類慎勿飲酒及冷茶水若渴宜喫五靈脂湯方録在卷後尤忌鹽生冷醋滑防己湯出聖濟總録治膜外氣水病不限年月深淺洪腫大喘防己大戟木香赤茯苓去黑皮海藻洗犀角屑胡椒白术葶藶防風去蘆木通桑根白皮紫蘇陳橘皮炙牽牛子訶梨勒去核郁李仁白檳榔各一兩大黃二兩麝香少許湯成下不用研右等分惟大黃一味倍用並須新藥銼稱為二劑以水三升隔宿浸明日五更用鐺文火煎減去一升絞取飲可三盞早晨空心服一盞如人行五里更服一盞又如人行五里更服一盞至第三盞即微利三兩行若腹中實者至日午即轉㵼宜用盆盛驗之必有惡濁黃水或惡濁青黑物出三五升並氣化為之㵼若不甚困慎勿止之必自住若覺力乏即以常服漿粥補之後隔三五日更服一劑則還依此法服之按徒都先生云服第一劑則病減半至第二劑則去根本前後歷試絶重者朝服一劑而暮已差根本深者服藥當日腫消能起但覺小腹內有塊結則須後劑去之其藥滓慎勿拋棄布囊盛懸於風中他日或覺微有發動則更煎藥滓可更治兩人徒都先生云人家有此藥滓懸於户上一家不患疫氣此飲不獨治水凡是氣病悉治若患肺氣不限年月深淺於此藥二十味中減去大黃及訶梨勒加貝母人參以童子小便煎每日空心服之當去病根有患肺氣困重者因逄患水氣人偶服此藥遂永差有人一生患腳氣時時衝心服此飲亦除根本以此推之但是氣皆治不獨治水氣而已産婦及有娠婦人服之亦無妨小兒及老人當隨意加減瘥後宜服順氣丸順氣丸出聖濟總録治水氣防己一兩半大黃二兩半犀角炙鎊訶梨勒皮牽牛子赤茯苓去黑皮葶藶炒海蛤芎藭乾地黃炒木通銼大戟桑根白皮銼微炒陳橘皮去白防風去鬚郁李仁去皮木香各一兩右搗羅為末煉蜜丸梧子大每服十丸空腹米飲下覺壅不快則加至十五丸覺通則減至三五丸大小便不通即加至三十丸此藥不獨治水氣其功與前飲相類若患水氣人服前飲後腫既消便服此順氣丸順血滑體氣輕健即止患腳氣人長合此藥將行備急服前飲差百日內即宜服五靈湯五靈湯出聖濟總録治水氣訶梨勒皮木通銼赤茯苓去黑皮防己銼陳橘皮湯浸去白焙各一兩右粗搗篩每服五錢水一盞半煎至一盞去滓渴即飲之覺熱即喫好茶一方無訶梨勒皮有葶藶十水丸出聖濟總録治膜外水氣身腫藁本去苗土澤漆微炒大戟微炒連翹葶藶紙上炒甘遂微炒芫花醋浸炒焦桑根白皮炙銼赤小豆微炒各三分巴豆去皮心膜麩炒去油盡一兩右為末煉蜜丸如小豆大每服五丸空心米飲下不利加至十丸澤漆丸出聖濟總録治膜外水腫澤漆微炒一兩水銀煉葶藶紙上炒大戟微炒銼郁李仁湯浸去皮炒枳殼去穰麩炒各一兩半甘遂椒目炒各一兩右為末煉蜜為丸如小豆大每服十丸空腹米飲下未利加至十五丸牛李子丸出聖濟總録治膜外水氣牛李子炒吳茱茰水浸一宿炒乾青橘皮去白炒各半兩杏仁湯浸去皮尖雙仁炒半兩葶藶紙上炒少許牽牛微炒半兩右為末用水蒸餅子丸如小豆大每服三十丸夜後煎橘皮湯下轉為度白牽牛散出聖濟總録治膜外氣白牽牛炒青橘皮去白焙炒木通銼各一兩右為末用每服一錢匕煎商陸湯下下大便黃水為度忌鹽一百日甘遂餅出聖濟總録治膜外水氣甘遂大麥麴各半兩右為末以水和作餅子燒熟熱食之如不利以熟飲投之如利以冷水洗手面即止一方治十種水氣為末空心以蔥白調服之治膜外氣及氣塊方右以延胡索不限多少為末豬胰一具切作塊作炙熟蘸藥末食之水氣心腹鼓脹附論夫水氣心腹鼓脹者由脾腎二藏俱虛故也脾主於土腎主於水土能尅水今脾胃虛弱不能制夫水使水氣停聚在於腹內故心腹鼓脹也薑蔲散出直指方治胸滿腹脹大㵼不止時或乾嘔人參川厚朴製草果仁良薑訶子炒川白薑各一分南木香一分半丁皮蒼术炒真橘紅甘草炒各一分肉豆蔲炮縮砂仁焙茯苓各一分半藿香一分右銼散每服三錢水煎食前服仍以木香縮砂煎湯濃調正料參苓白术散佐之炮腎散出聖濟總録治水氣腫滿巴戟天去心麩炒黑甘遂炒各一分檳榔一枚生用一枚炒用木香葶藶紙上炒各一分大麥蘗芫花醋浸炒黃色陳橘皮去白炒各半兩膩粉一分沉香銼澤㵼各一分右為散每服二錢用豬腰子一隻以竹刀子割開去筋膜作二片摻藥末在內用濕紙裹慢火煨令香熟先煮蔥白三莖令熟細切將蔥白與粟米同煮粥一碗先食粥一半方食腰子藥後再食粥令盡臨臥服如至五更并小便下赤黃惡物乃驗檳榔丸出聖惠方治水氣心腹鼓脹四肢羸瘦喘息促急食飲漸減小便澀少腹下妨悶檳榔一兩海蛤一兩細研桂心半兩訶梨勒皮一兩木香一兩漢防己桑根白皮銼郁李仁各一兩湯浸去皮炒旋復花半兩右為末煉蜜和丸搗三二百杵丸如梧子大每服三十丸煎木通湯下日三服檳榔散出聖濟總録治水氣腫滿檳榔二枚生郁李仁去皮尖炒芫花炒甘遂炒續隨子木通銼各二兩海蛤一錢橘皮去白穰微焙商陸各一分右為末每服一錢溫酒調下臨臥服至五更取下惡物吳茱茰丸出聖惠方治水氣腹鼓脹上氣喘促吳茱茰湯浸七遍乾微炒甘遂煨令微黃各半兩甜葶藶三兩紙上炒紫色椒目一兩半炒去汗檳榔一兩赤茯苓一兩半皂莢一兩去皮塗酥炙令黃焦去子右為末煉蜜丸如梧桐子大每日空心及晚食前以粥飲下二十丸以利為度木香丸出聖惠方治水氣心腹鼓脹木香檳榔各半兩硇砂三分細研青橘皮三分湯浸去白吳茱茰半兩湯浸七遍乾炒巴豆三枚去皮心研細壓去油右為末以釅醋大盞熬硇砂巴豆為膏入末相和丸如菉豆大每服五丸煎青橘皮湯下食前大戟散出聖惠方治水氣心腹鼓脹喘促大小便不利方見本門諸腫類紅丸子出楊氏家藏方治一切飲食不化氣滿膨脹紅丸子三百粒巴豆二十粒去殼同炒取巴豆變為度右用橘皮湯送下不拘時煎木香湯下尤佳羊桃根散出聖惠方治水氣心腹膨脹大小便澀羊桃根銼桑根白皮銼木通銼大戟銼炒各半斤右為末散以水二斗煮五升去滓熬如稀餳每服空心一茶匙得大小便一時通利三兩行為效宜喫漿水粥補之甘遂散出聖惠方治水氣心腹鼓脹上氣喘促甘遂煨令微黃檳榔各半分牛蒡子微炒商陸各分右為細末每服用豬肉一隻切作四五片摻藥半錢用濕紙褁煻火中煨熟