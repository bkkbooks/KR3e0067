body:
  text: 普濟方卷二百七十五明周王朱橚撰諸瘡腫門諸瘡水毒焮腫內經謂濕傷肉以脾主肌肉而惡濕也諸瘡未合或中於水則水毒發腫能為焮痛膿潰不止是為濕傷肌肉治宜敷藥使水盡出則肌肉溫平瘡可愈方亂髮熏方治諸瘡水毒或中風反漲腫入腹者殺人亂髮雞糞大麻子黑豆各三兩青布一尺蠟以二兩於火上攤令盡右以髮散青蠟布上次摻雞屎麻豆等令勻卷如餅纒縛之以筒瓦一口仰熳火上安藥復以一瓦覆定塞一頭令煙出一頭於煙上熏之瘡中即黃水出煙盡乃止或汗出勿見風熏訖餘蠟滴瘡口內良效追風散治水毒入瘡諸腫痛不止真炭灰四兩豶豬膽一枚蛤粉二兩右羅細灰以紙一幅鋪地上攤灰可兩指厚取豬膽汁傾灰上經宿取濕著者灰烘乾入蛤粉同研勻每用少許摻瘡上如瘡口合者以針挑破摻之水即出皂子散治水毒入瘡腫痛或入刺骨者皂莢子不蛀者七枚右用乾鍋入藥在內瓦蓋鍋口慢火燒煙盡取出研細每用藥先以溫漿水洗瘡口拭乾摻藥次以别膏藥貼之良久水盡出有刺者即自見寸金散治一切瘡或外傷肌肉水作膿焮腫久不瘥蝦蟇自死者新磚等分右搗末揑作餅子暴乾為細散摻瘡口上即撮出毒水盡以别藥敷貼鉛丹散治破傷水入腫潰不愈鉛丹蛤粉等分右同炒令變色摻瘡口上水即出烏梅散治諸瘡水毒腫痛烏梅皂莢子等分右各燒存性研勻貼瘡上毒汁即出烏犀膏治皂莢水及惡水入瘡熱痛不止皂莢子燒存性一錢沙糖半兩右先研皂莢子灰令細續入沙糖和勻如膏貼瘡上胡粉塗方治諸瘡中水毒攻腫胡粉石灰研羅各三兩右鍊豬脂調如糊塗瘡上水即出一方用炭白灰天雄散治一切水毒入瘡腫及驢涎馬汗以天雄去皮用瓷瓦刮細末貼瘡口治瘡水毒及竹簽刺癰疽熱毒等方以糯米三升入瓷盆內於端午前四十五日以冷水浸之一日兩度換水時輕淘辟去水勿令攪碎浸至端午日取出暴乾生絹袋挂通風處每用旋取少許炒令焦為散冷水調如膏藥隨大小裹定瘡口外以絹帛包縛候瘡愈解去若金瘡誤入生水瘡口作膿漸甚者急以藥膏裹定良久其腫處即消更不作腫直至瘡合若癰疽毒瘡初發才覺焮腫赤熱急以此膏貼之一夜便消喉閉及咽喉腫痛􅞷腮並用藥貼項下及腫處若竹簽刺入肉者臨卧貼之眀日揭看其刺出在藥上若貼腫毒乾即換之常令濕為妙惟金瘡及水毒不可換恐傷動瘡口治凡八九月中刺傷手足因犯惡露腫殺人不可輕視須用此藥以生桑枝三枚內煻火中推引令極熱斫斷正以枝頭拄瘡口上熱既盡易之盡三枚則瘡自爛又方仍取薤白搗綿裹著熱灰中使極熱去綿去薤白敷瘡上以布帛急裹之若有腫者便須用薤白最佳小品云并內青鹽良亦可搗作餅子以艾炙之使熱氣入瘡治刺傷中風水方以黑牛熱屎一服二升三服即止又方出千金方以蠟一兩熱炙尉敷傷上令水出愈又方出千金方以魚目燒灰敷之又方出千金方以熱煮韭拓之良又方出千金方以刮箭羽下漆塗于患處治入水手足腫痛方出儒門事親書以生胡麻搗爛敷之治諸瘡水毒腫方以生白礬末水調塗之自消治中寒露水入手瘡痛不可忍方出肘後方以鹽數合著瘡上裹之火炙令熱氣透瘡又以蠟入竹管內插熱灰中令蠟鎔滴入瘡口立愈若無鹽熏單用蠟亦可百一選方云吳尚書家婢因浣衣手中水毒晝夜呌喚用此愈針頭散出肘後方治瘡瘍焮腫木硬右用蟾酥麝香各一錢研細以兒乳汁調和泥入瓷合內盛乾不妨每用以唾津調撥少許於腫處更以藥敷之毒氣自出不能為瘡雖有瘡亦輕也治瘡腫因中水及中風寒所作其腫入腹則殺人方出肘後方多以桑灰淋汁漬冷復易之取愈當令熱神祕若已中水及惡露風寒腫痛方出肘後方用蒲黃敗青布於小口器中燒以熏之瘡汁出盡則愈療瘡中風水神效方出肘後方取乾竹三指大節疏者佳每於節間截斷中間勿留節令得長三二尺總六七枚燒一頭令起熖以一頭掩瘡孔上瘡得煙熏又兼火氣壯風水悉出疼痛即止可盡四五枚令水出盡則止鎔蠟灌瘡中帛裹仍慎風水即瘥若燃竹難著可側瘡低以頭就火中燃之竹短瘡熱痛更換竹頭用之則可神驗治瘡腫因中水及風寒所作其腫入腹則殺人方出肘後方燒黍穰若牛馬乾屎桑條輩多煙之物作坑中燒之以板掩坎上穿板作小孔即以瘡口當孔熏之令瘡汁出盡乃止又灌熱蠟於瘡中瘥治生瘡因入湯成毒膿出或赤腫者方出百一選方以淡豆豉不拘多少手內碾為膏子揑作餅敷貼之以片帛裹定膿即止未有頭以米醋調塗腳面傷手瘡因水入作腫用耳塞敷之療瘡中風方出肘後方用煎鹽令花出以物取鹽稍瀝去水及熱安瘡上取瘥良一周時著鹽勿住手鹽厚即撥却瘡上厚薄留鹽三分更著火炙之勿住以葒草作湯浸之治水中爛瘡皮皹方出本草用含水藤葉搗敷之治手足水爛瘡方出本草以占斯煎湯洗之一切惡瘡附論內經云諸瘡瘍皆屬心諸濕腫皆屬脾蓋心主血脾主肉也由體虛受於風濕邪毒與氣血相搏故發瘡也甚者焮腫滿痛潰而多汁或形體為之壯熱稽緩不治則毒氣內攻固不可以常法治之夫體虛受風熱濕毒之氣則生瘡癢痛焮腫多汗壯熱謂之惡瘡而濕毒氣勝體外虛內熱其瘡漸增經久不瘥故為久成惡瘡夫無名瘡者非癰非疽非疥狀如惡瘡或瘥或劇人不能名故無名瘡也此亦是風熱搏於血氣所生也方烏膏出聖惠方治諸惡瘡雄黃細研雌黃細研芎藭升麻烏頭防己竹灰黃連去鬚黃蘖水銀各二兩胡粉一分與水銀研令星盡蠟三兩杏仁三十枚湯浸去皮尖巴豆二十枚去皮心松脂亂髮各一雞子大右㕮咀以酒一盞拌一時久安鐺於火上先取鍊了豬膏三升煎髮令消下諸藥以文火煎攪候杏仁黃色以綿濾去渣入研了真珠末三錢雄黃胡粉等攪令相得收瓷合中每日二三塗之凡用膏先淨洗瘡拭乾敷訖以赤石脂黃連散粉之千金翼方無竹灰水銀蠟一方無防己水調膏治一切惡瘡腫毒疼痛黃連黃柏黃芩鬱金大黃梔子白芥子烏魚骨地龍白殭蠶蜜陀僧白芨各二兩寒食麵二兩木鱉子仁盆硝各半兩右為細末新泔水調如膏攤江箔紙上貼瘡上痛立止發背惡瘡大者一日一換五日大換效黃水盡自瘥勿疑連翹飲出危氏方治諸惡瘡紅赤痛癢不定心煩口乾及婦人血風紅班圓點開爛成瘡癢痛流黃水汁當歸荆芥黃芩粉草木通生乾地黃瓜蔞根麥門冬瞿麥連翹赤芍藥防風牛蒡子炒川芎梔子各等分右為銼散每服四錢水一盞半燈心二莖煎不以時服救苦散治一切惡瘡硃砂一錢紅娘子二箇班貓六箇雄黃一錢沒藥一錢金腳信一錢研細南乳香半錢海馬一對輕粉一錢腦子半錢蜜陀僧二錢研另蜈蚣一對麝香半錢水蛭四箇黃連一錢右為細末與蜜陀僧􅔻餅乳汁為丸如疔瘡作小尖錠子若瘡口大揑作餅子絍於瘡內立效烏金散治一切惡瘡附子蛇蛻皮乾薑故紙多年者黃丹川大黃重臺即元參藜蘆檳榔舊綿絮亂髮胡粉蓼葉榆皮楸皮已上各一兩右藥並細銼入瓷瓶中固濟燒令熱取出搗羅為末入麝香龍腦各一分更於乳鉢中細研先以甘草一兩捶蔥白七莖白礬半兩以水二升煎取一升看冷暖淨洗瘡後乾貼日再貼之五香連翹湯療惡瘡熱毒腫恐惡毒氣入腹兼取利以泄毒氣連翹三兩蜀升麻薰陸香各二兩淡竹瀝一升寄生三兩大黃一兩水一升别內朴硝二兩熬乾别內麝香一分研青木香二兩丁香一兩獨活沉香甘草射干各二兩右切以水一斗煮取二升半絞去滓然後內大黃朴硝竹瀝更煮一兩沸去滓內麝香分溫三服服别相去如人行十里久以得利一二行為度慎雞豬魚蒜生冷酢滑油膩麵食小豆五辛葵菜等物黑龍丸聖濟總録治諸惡瘡腫等病芎藭三錢大黃一分甘草炙一兩益智去皮藿香葉各四錢梔子六錢防風去蘆半錢雄黃雌黃各二錢麝香半錢七膩粉五錢匕水銀一分為沙子乳香半分右研除外搗羅為末先將水銀膩粉乳香同研入諸藥研細勻水浸炊餅和丸如小豆大每服五丸嚼破茶酒下此藥一半作丸子一半作散子每服酒調散子一字下丸子一方更入蓽撥一十箇乳香少許作丸每服五丸嚼破散子酒下若婦人吹妳用散子半錢蝸牛七枚熱瓦上􅏼後令去殼黃色入龍腦麝香各少許研酒調合面卧若治頭面腋下赤瘤子以二藥相間服之半月軟爛自破出盡惡毒以膏藥貼之貼疼膏藥南星大柏皮良白薑木鱉子白芨甘草牡蠣赤芍藥白芷天花粉各一兩赤小豆二兩官桂半兩經霜芙蓉葉三兩右為細末生薑自然汁調塗疼痛處皮破用燒鹽泡湯調四圍蜜調亦可桑螵蛸散直指方治諸瘡桑螵蛸地龍貝母厚黃柏各半兩飛丹煆一合乳香一分粳米粉二錢雄黃輕粉各一錢麝香半錢右為細末以不食井水和沙糖調敷洗瘡藥治諸般惡瘡管仲茵陳川芎鬚地骨皮甘草荆芥獨活當歸防風地扁竹右等分為㕮咀每用一次二兩水三碗煎三沸去渣通手洗之龍麝追毒散治惡瘡毒氣未出盡者可用之如箭頭針刺癰癤惡瘡內有毒氣在內不著骨者不過三兩箭刺自出也破傷搶惡不痛者大有神效龍腦三錢輕粉粉霜雄黃各半錢乳香沒藥各一字血竭半錢硫黃半字麝香半字巴豆一十四箇去皮心出油右為細末調生麵糊為丸錠子如麥粒大小如用時先用針破瘡入藥量輕重者一二丸可得也上藥後一兩時辰瘡腫盡是應也如患可疳瘡蝕莖或半或盡用者溫漿水磨藥二丸搽之愈漏蘆湯出瘡科精要治一切惡瘡毒腫丹瘤瘰􅊓疔腫魚睛五廢癰疽初覺一二日便如傷寒頭痛煩渴拘急惡寒肢體疼痛四肢沉重恍惚悶亂坐卧不寧皮膚壯熱大便祕澀小便赤黃並宜服娠身莫服漏蘆白斂黃芩去黑心麻黃去節枳實麥炒去瓤升麻芍藥甘草各一兩大黃二兩朴硝一兩右除硝外銼㕮咀與硝同和勻每服三錢氣實人五錢水一盞半文武火煎至七沸去滓空心熱服蕪荑散仁存方治三十六種惡瘡蕪荑剪草蛇牀黃連硫黃雄黃五倍子海桐皮輕粉右各等分為末麻油調敷乳香消毒散濟生拔粹方專治惡瘡大黃燒黃耆牛蒡子炒金銀花各五兩牡蠣鹽泥裹燒五兩甘草三兩炙沒藥乳香懸蔞各半兩右為粗末每服五錢水煎在上食後在下食前救苦黃耆散濟生拔粹方治諸惡瘡癰癤黃耆甘草瓜蔞根芍藥各一兩五錢當歸一兩五錢懸蔞一對熟地黃不拘多少金銀花三兩皂角刺為引右㕮咀每服五錢無灰好酒一升同引子裝於磁瓶內將瓶用箬葉封坐於鍋內上以大盆覆鍋口盆外用黃土封之毋令出氣煮之外聞藥香為度取出瓶澄定清飲將藥滓再添酒一升依前煮服若酒少者酒水各半煮服瘡在上食後臨卧在下空腹服此藥治之萬無一失神效如谷應聲常五月五日修合廣施於人奪命雄朱丹德生堂治諸腫疔瘡癰疽發背丹毒無名惡瘡色黑而癢心驚嘔逆命在須臾雄黃三錢膽礬枯白礬銅緑輕粉朱砂血竭各三錢半蟾酥一錢黃丹二錢右細末於五月五日午時修合以水糊為丸如雞頭每服一丸先用蔥白三寸煎湯患者自嚼爛吐出手心却用藥一丸在於蔥裹定好酒送下切不要嚼藥恐傷牙口不一時如拽重車行三二里路汗出即愈或利一行病在上食後病在下食前服如病消減亦須要服十竒補內排膿散或服煎散之類更貼上膏藥又用篐藥敷瘡四圍腫處十竒內補排膿散出德生堂治一切癰疽發背諸腫瘡毒未成者即散已成者速潰排膿自出惡肉自出不犯刀杖服藥復疼痛頓減黃耆當歸人參各二兩川芎白芷桔梗防風厚朴甘草官桂金銀花各一兩木香五錢天花粉一兩右為細末每服三