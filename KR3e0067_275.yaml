糞亂髮粳米粳右等分都置在一地坑內用火燒上以方磚覆之其磚心鑽一竅令煙出瘡就煙之有蟲及惡物出盡以溫漿水淨洗然後塗前六枝烏金膏用帛覆之內托紅𣪚子治諸般惡瘡烏魚骨半兩蜈蚣一對雄黃三錢朱砂一錢膽礬枯礬三錢右為細末每服一錢溫酒調下汗出為效龍麝追毒散一名龍麝追毒丹治一切惡瘡內毒氣未出盡者皆可用之如前針頭刺癰癤內有毒氣不著骨者不過一二上藥之其針刺自出也破傷風惡不痛者亦效死肉生肌龍腦一字麝香半錢粉霜半錢乳香一字雄黃半錢輕粉半錢砒黃一字巴豆十四粒去皮尖心右為細末水糊為丸如小麥大每用一丸絍在瘡內覺腫痛是效如患下疳瘡蝕莖或半或盡者用漿磨一粒兩粒擦之三上立效治惡瘡方一名雄黃膏出肘後方雄黃研末雌黃研末水銀一兩松脂二兩豬脂半斤亂髮如雞子大右各煎去滓內水銀敷瘡日再蟾酥托裏丸治一切惡瘡蟾酥乾胭脂輕粉朱砂穿山甲各二錢百草霜不問多少右為細末如黃米大每服五七丸加至八九丸用蔥一根將蔥刀劙開將藥包裹在裏用生絲線縛文武火燒蔥伺熟將蔥帶藥口內嚼碎溫湯送下用衣服蓋之汗出為效治惡瘡方出千方礬石松脂亂髮蠟各二分豬膏四兩右煎髮候消納礬石次納松脂次納蠟去滓先刮洗瘡令淨然後用藥塗之日再三不痛久瘡時愈新瘡遲愈瘑疥癢瘡頭秃皆愈即愈生髮勝飛黃膏聖箬皮出仁存方治諸般惡瘡膁瘡新箬皮二十四片剪如梨柿大乳香二錢當歸三錢白鹽五錢好醋一盞右用小碗瓶同煎慢火熬乾盡取箬皮貼瘡隨大小剪貼之用絹帛縛之消毒散治諸惡瘡生肌止痛消毒散腫滑石一斤黃蘗二兩乳香半兩輕粉二錢黃丹二錢右為細末每用乾摻或火湯下注膁瘡風濕疥癬等瘡油調塗之追毒餅治諸般惡瘡因針開了口後又閉合生膿脹痛不可忍用此捻成小麥子大放瘡中永不膿閉水自出瘡自乾好極好信石半錢雄黃大硃砂各一錢輕粉少許雌黃一錢右研為細末糯米糊為丸如麥子大若瘡閉合生膿將藥入內仍以膏藥貼之洗方出危氏方治諸般惡瘡黃柏茵蔯荆芥蔥白藿香各等分右煎水臨溫洗烏蛇散治惡瘡生好肉去膿水風毒氣腫烏蛇去皮骨炙搗末二兩麻油一斤鉛丹二兩鼠一箇臘月者尢佳蠟四兩右先用油煎鼠令焦去滓次用鉛丹并烏蛇末微火煎沸後下蠟更煎十沸膏成以瓷器收每用封瘡日一易通聖散出聖濟總録治諸般惡瘡穀精草炒天南星炮管仲炒黃蘗炙各一分麝香半錢右搗研為散用少許乾摻瘡上熊膽膏出聖濟總録治一切惡瘡熊膽研一錢膩粉半分雄黃研半錢檳榔末一字右研勻於臘月用豶豬膽一箇取汁藥却入藥在膽內用綿繩繫定揉勻以松明黑熖熏令偏黑挂於隂處如惡有指面大者用黍米許貼之如錢大者用菉豆許貼之恐藥乾難貼薄以津唾調和稀糊塗之仍用薄樺皮蓋貼以帛子繫之藥不宜多用瓜蒂散出聖濟總録瓜蒂四十九枚黃連去鬚三兩杏仁去皮尖炒二兩半膩粉一分麝香一錢研右搗為細末用膩粉麝香同調和令勻以津唾調塗在瘡上更用紙麵糊覆在瘡上貼三五日一度含鹽水洗過更貼是瘡只貼夲瘢子其餘自瘥又方出聖惠方治惡瘡鉛丹一兩半炒令紫松脂三分麒麟竭二兩半細研亂髮一分細研緋帛灰四分細研右先用油四兩於猛火上熬令煙出即下松脂鉛丹等煎令色黑下亂髮緋帛灰麒麟竭等末攪令勻膏成塗故帛上貼日二易之治一切惡瘡方出聖濟總録赤小豆糯米各一分黃連去鬚二兩吳茱萸一分水銀二兩半手內唾津研之右各搗研為末和勻胡麻油調淨洗瘡貼之沒藥𣪚治一切惡瘡疼痛不止沒藥二錢黃丹一錢赤斂一錢麝香二錢白斂一錢右為末口噙漿水洗淨揾乾貼內托散治一切惡瘡金銀花三兩牡蠣三錢甘草二錢穿山甲三片炙黃朴硝半錢右為細末每服五錢酒一升煎至半升溫服神驗黃耆丸治內虛經寒髓冷惡瘡多時不效者黃耆一兩銼炒附子四錢炮去皮臍兔絲子酒煮浸茴香微炒熟乾地黃各一兩右為細末酒打麵糊為丸如桐子大每服三十丸空心酒送下萬靈奪命丹治一切惡瘡麵於清明五更不用雞犬見面做麵將來祭祖宗坐位焚紙畢收起候用龍臘八日合朱砂一錢巴豆仁一兩去皮不去油血竭一錢麝香少許右各為細末用無根水清辰打前麵糊為丸如梧桐子大若有患瘡惡方死者即用無根水每服一丸立效如走的緊又用白溫粥補之又方出聖惠方治諸惡瘡皂莢五挺銼蜣蜋五枚去頭足砒霜半分細研蜜陀僧一兩細研乳香一兩細研右件藥先以醋一升於鐺中慢火煎皂莢蜣蜋十沸濾去渣入諸藥煎成膏置於瓷合中每攤在故帛上貼之乳香散治一切惡瘡毒氣痛悶乳香一兩石膏半夏各半兩膩粉少許右為細末乾貼瘡上次用太一膏覆之追毒散出瘡科精要治一切惡瘡膿水不快者五靈脂川烏頭炮白乾薑炮各一兩全蝎右為細末少許摻瘡口上深者紙撚醮藥絍入瘡口內以膏貼之或水浸蒸餅搦去水和藥令勻撚作錠子每用入瘡口中亦名追毒錠子烏金𣪚出聖濟拔粹方貼惡瘡疳瘻以橡子二箇內一箇實黃丹一箇實以白礬末相合定用黑稍麻皮纒了火內燒研細加麝香少許洗淨瘡貼之硃砂消丸治一切惡瘡新蟾蜍不以多少硃砂為細末寒食麵少許巴豆去皮不出油不以多少右和為丸如黃米大心紅為衣服一丸溫酒送下覷病上下頭頻服之大有神效又方出聖濟總録治一切惡瘡黃檗去粗皮鬱金黃蜀葵花白斂右等分搗羅為散百合水調貼之又方出聖惠方治惡瘡樓蔥一斤和鬚葉切細晒乾以火慢炒令黃色臰黃一兩麝香半兩細研硫黃二兩細研右細研為散先以熱鹽漿水洗瘡拭乾生油調貼逐換之黃連散出聖惠方治一切惡瘡疼痛不可忍黃連一兩去鬚檳榔一兩母丁香半兩麝香半錢細研右搗羅細散入麝香研令勻先用鹽漿水洗候乾以藥摻之烏頭𣪚出聖惠方治二十種惡瘡及風瘡痔瘻等瘡疣子黑疵瘡腫雀靣􅀈黯痤癤塗敷之烏頭二十枚巴豆二十枚藜蘆一兩大黃三兩右同燒搗研為末細羅石灰一升以染青汁和成膏看瘡大小敷之日二三易治腎腧惡瘡方出瑞竹堂方雞內金瓦上焙乾川百藥煎胡黃連各等分輕粉一錢右為細末燒厚朴油調擦之內托𣪚治一切惡瘡御米殼去葉頂一兩蜜炒甘草一兩炙雄黑豆六十四箇炒生薑一兩切片右為粗末每服稱半兩水二盞煎至七分去滓溫服如血利加乳香半錢同煎空心服洗毒散治一切惡瘡多時不效風寒久冷皆洗之麻黃地骨皮蛇床子地丁各等分右為粗末每用五錢水三盞煎至七分去滓溫服針毒𣪚治惡瘡追毒去死肉信雄黃各半錢乳香二錢麝香少許右為細末每服少許貼在瘡上膏藥封之消毒散治惡瘡赤腫瘤掃之大妙大黃黃連各半錢地骨皮一兩朴硝三錢右為粗末每用三錢水一大盞煎至七分去滓冷用雞翎掃於瘡腫處鹿角𣪚出聖惠方治一切惡瘡不可者宜敷鹿角一兩燒灰膩粉半兩百合半兩木槿花一兩右件藥搗細為𣪚入膩粉百合生油調塗日再用之碧霞錠子出濟生拔粹方治惡瘡透下覺疼痛銅緑一兩硇砂二錢蟾酥一錢右為細末軟米飯一處擦勻撚作錠子粳米樣每用針之不覺痛者但有血出絍一錠子在內以膏貼之或作散以紙撚醮絍之亦可臨證看如何宜用合度惡瘡方出危氏方赤色白膠一錢明白礬三錢黃色黃丹三錢右為細末麻油調敷先以酸漿水暖過洗瘡拭乾用瘡藥祕方紅明信五錢黃丹三錢硫黃三錢右為細末打和一處初用水調點於瘡頭上次用清油調敷每日一換要好用水洗得瘡乾淨上膏藥或點化瘡內或看瘡熱如何用荔枝膏藥追膿乾淨治一切惡瘡腫痛方懸蔞出穰五錢沒藥三錢甘草三錢炙右為散水酒各半盞煎至七分去滓溫服蜜陀僧散出聖濟總録治一切惡瘡蜜陀僧穀精草各一分雄黃半兩右搗研為散每用少許乾摻瘡上粉香𣪚出聖濟總録治惡瘡膩粉二錢乳香一錢蔥一根煨熟去焦皮右同研如膏攤在帛上貼瘡三日一換黃連散出聖濟總録黃連去鬚胡粉黃蜀葵花各等分右搗羅為散用龍腦麝香膩粉各少許研細拌勻先以鹽漿水帛子揾乾摻之治一切惡瘡及瘻瘡等方出聖惠方蛇床子末硫黃膩粉各等分右同研為𣪚以生麻油調如糊以鹽湯淨洗瘡拭乾即先以口補塗之然後敷藥不過三五服定血𣪚出聖濟總録治諸惡瘡栝樓大者一枚去穰棕櫚皮一把當歸切碎半兩右入栝樓中泥固濟燒細研為散每服一錢匕茶酒任調下三聖散出儒門事親治膁瘡疔瘡搭手背疽等惡瘡蔥白一斤馬莧一斤石灰右濕搗為團隂乾為細末貼瘡有死肉更宜先用潰死肉藥治惡瘡疥癬蟲瘻疽螫毒方用五榖和松脂雄黃燒灰熱塗之更良治入膿生惡瘡似火自爛方出肘後方用胡粉熬點黃藥黃連等分下篩粉之瘡上雄黃𣪚治惡瘡蝕肉雄黃六分箭笴礬石各二分右為末敷瘡中日二治蛇頭瘡其形生時在手足上瘡傍一塊開如蛇口之狀痛而流血不止者此藥治之雄黃蜈蚣全蝎各一錢右為細末看瘡濕劈開入藥摻在瘡上却以小油抹裁帛拴住如乾小油調搽紫金散治諸般惡瘡追毒去死肉白礬一兩黃丹一兩硼砂三錢右為末於銚子內一處同炒去盡水為度用量瘡貼之追毒散治一切惡瘡追毒去死肉巴豆半兩去皮雄黃三錢豆粉三錢右為細末量瘡貼之大聖散治胳􅭫瘡及惡瘡腫惡悶痛川大黃寒水石當歸各一兩右為細末每服二錢新水沸湯隨病人意調下量老幼大小臨時以意加減又方出千金方治惡瘡連痂癢痛燒扁竹灰和楮白汁塗之又云搗扁竹敷之痂落即瘥又方燒灰研細豬脂調塗之拔毒散出瑞竹堂方敷貼諸惡瘡大黃東墻上土右極細末用無根井花水調搽如乾再搽經宿即愈治諸惡瘡初得汁出濟生拔粹方槐花不以多少皂角棘針不以多少銼碎右用水熬三五十沸以胡桃二箇一生一燒存性細嚼以前槐花水送下碗許不過三五服見效雄黃散治惡瘡追死肉活血回毒明雄黃明信砒各半兩右研令細量瘡少許砂草油出瑞竹堂方治食毒物及一切惡瘡硼砂甘草各四兩右細末用真香油一斤於磁石瓶浸藥遇患急令服油一盞立效浸久尤佳皂莢刺散出聖濟總録治惡瘡皂莢刺乳香一分右為散每服二錢匕以酒一盞煎一兩沸服熱酒調下亦得烏頭𣪚出聖濟總録治惡瘡烏頭一枚炮裂去皮尖為末膩粉二錢匕右研勻先白湯洗瘡數遍次用鹽數遍後以唾調藥或膏敷瘡口金黃𣪚出聖濟總録治惡瘡黃檗一兩蜜二兩將蜜塗黃檗炙盡為度右搗羅為𣪚入麝半字同研勻細乾摻瘡上牛齒散出聖濟總録治諸惡瘡口不合牛齒三兩雞卵殼二兩右燒研為𣪚入膩粉少許生油調塗之立愈懷乾散出聖濟總録治惡毒惡瘡蜜陀僧一分黃檗蜜炙半兩右懷中懷乾搗羅為𣪚先用蔥湯洗瘡候乾敷之治諸惡瘡方出儒門事親白殭蠶直者大黃右等分為細末生薑自然汁與蜜同和為劑丸如彈子大每服一丸細嚼療惡瘡方以狼毒秦芁等分兩搗末酒調服方寸匕日二常服之瘥內托𣪚出濟生拔粹方治一切瘡毒菉豆粉一兩研細通明乳香一分慢火於銀石器中炒手指攪使乾可熱急傾出在紙上用扇冷研令極細用右同研勻凡一切惡瘡應係難名癰腫毒每服二錢至三錢食後臨卧濃煎甘草湯調下如打撲諸般內損用溫酒調下食後空心服些小即內消大損則敗血從大便出矣一方治瘡毒攻衝臟腑漸成嘔吐多攻咽喉口舌生瘡黑爛生􅌲名心氣絶飲食藥餌無由可進又有因鼻衄初愈不曽表汗餘毒流在經絡皆發大疽運腰腫甚其硬如石色紫黑醫以涼藥敷之中夜大嘔乃運盡此藥三四服嘔遂止既而瘡潰出赤水淋漓四十日方愈再有害瘰􅊓者痛過即嘔此藥嘔亦止有人患疽醫者不肯用此藥恐傷脾胃先人纍試有效記以遺後人潰膿𣪚治惡瘡潰膿活血去惡肉白礬鹽等分右於銚子內熳火炒去盡水乾研為末量瘡貼之又方治一切惡瘡及沙虱水努甲疽皆治藜蘆一兩去蘆頭燒灰虎骨一兩燒灰右各研令細以臘月豬脂調之塗日再塗之又方出千金方治惡瘡以羊屎麻根燒煙斷細研豬膏和封上有汁者乾敷之又方出千金方治惡瘡及浸淫瘡以麵一升作餅大小以覆瘡炙上令熱汁出盡瘥一方作煎餅乘熱拓之治惡瘡似火爛湯洗出千金方以白馬屎曝乾以河水和煮十沸絞取汁洗之治惡瘡其大如錢名白馬疥方出千金方以水潰自死蛇一頭令爛去骨以汁塗之隨手瘥又方出千金方治惡瘡腫痛不瘥以苦瓠或苦瓜用一枚㕮咀煮取汁洗之日三度又煎以塗癬甚良當先以泔淨洗乃塗三日瘥或為末敷之療惡瘡尤良又方出千金方以鹽湯洗搗地黃葉貼之又方出千金方燒莨菪子為末敷之治小兒大人忽得惡瘡疽未便識者出本草取蜣蜋杵絞取汁敷之其上治惡瘡疥及風腫以驢脂敷之活血散治惡瘡死肉腫硬用苦葶藶為細末好酒調勻掃死肉上血活自軟元胡散治瘡無頭腫痛煩悶用元胡索二箇為細末熱酒調下治一切惡瘡偏用藥不效者出百一選方以陳米飯緊作團火煆存性麻油膩粉調敷蘇韜光耳上病碎瘡或痛或癢兩月餘不效人傳此初不之信試用之次日即愈後再作吕顯謨云此證蓋以痰飲之故只用肥皂燒存性生油膩粉調敷用之尤妙治一切惡瘡已破膿血不止者出百一選方以蝸牛并殼肉燒存性入輕粉少許調敷之散腫膏出濟生拔粹方治腫毒惡瘡川大黃生用風化石灰赤小豆各二兩右搗羅為末以調塗之乾再塗之又方出直指方治諸惡瘡用蜘蛛曬為末麻油輕粉調之敷治諸惡瘡消浮腫出本草用豬膏細搗封之湯漬散敷並良惡瘡口不能合用橡子為末敷之治一切惡瘡以皂角子十五粒冷水送下併二三服又方治一切惡瘡大鱔頭以雞冠花燒灰溫酒調下一云連根葉搗入鹽少許盦患處治諸般惡瘡誤著死驢馬毒氣其瘡走遍中馬毒走稀糞拋下汁溫酒調服之中驢馬毒自用驢治遍身惡瘡以荷葉晒乾為細末與麵一處攪和為餅火燒熱食之病在上食後病在下食前七日見效地骨皮散出德生堂治惡瘡以地骨皮一物見刮取乳皮别收之次取皮下膩白粉為散其白粉下堅赤皮細銼與皮乳一處為粗末一合許煎濃汁乘熱洗瘡直候藥湯冷以軟帛裛乾乃用細𣪚敷之每日洗貼一次以瘥為度其用之未瘥甚不可住但勤施之無不瘥者小可瘡腫痛只以枸杞生銼煎濃汁熱淋亦效或以地骨皮為末用鹽湯洗訖乾糝之治一切惡瘡及沙虱水努甲疽疼痛不可忍者並皆治之兼大赫瘡出聖惠方以蜣蜋十枚端午日收者佳搗羅為細末以油調敷之即易一方取末以鹽水調之塗周圍如韭菜濶狹一方用蜣蜋二枚腸肚安在紙中心四靣以醋麵糊貼瘡上治一切惡瘡方出儒門事親以天茄葉貼之或為細末貼之亦可又方出儒門事親用臘月人中白燒灰油調塗瘡疥上又方出儒門事親治一切惡瘡以瓦菘不拘多少隂乾為末先用槐枝蔥白湯洗之後摻藥立效炙瘡久不斂者治之尤妙又方出儒門事親以蒲公英搗之貼一切惡瘡肉刺薰惡瘡方出儒門事親以紫花地丁一名米布袋取根曬乾用四箇平頭磚壘成爐燒著地丁絡磚垜一枚蓋之使磚內煙出熏惡瘡出黃水自愈治無頭瘡方出儒門事親用皂角刺燒灰為末每服三錢酒調嚼葵菜子三五箇煎藥送下一方用蛇退皮於腫處貼治諸惡瘡炒蟾蜍糞敷惡瘡疔腫雜蟲咬油調敷瘰􅊓痔瘻瘡治一切有蟲惡癢滋胤瘡用蝦蟇燒灰敷之一方用屎敷治諸毒腫惡瘡瘻痔金瘡內射身癢癮疹不止者用天明精揩之立已治諸惡瘡以鼹鼠膏摩之治惡瘡以蛇魚骨杵末入諸色膏藥中相和合敷之紙花子貼之即􅀈鱺魚骨治惡瘡疥并犬馬瘑瘡用山茱萸根皮煎湯洗赤龍皮湯治諸敗惡瘡乳瘡用檞皮切三升水一斗煮五升春夏冷用秋冬溫用洗瘡治惡瘡用地菘汁服之日三四服瘥治毒并惡瘡菌毒以人屎取汁服浸皂莢甘蔗治天行熱疾治卒得惡瘡人不識者以牛膝根敷之諸惡瘡以槐白皮醋浸半日洗之治惡瘡中風寒水腫痛搗韭敷之良治卒得惡瘡不識者出肘後方取桃皮作屑納瘡中內蒼乾作屑亦可治瘡毒以金星草南人多用此草末以水一升煎取半升更入酒半升再煎數沸溫服取下毒黑未下再服但是瘡毒皆可服之然性至冷服後下利須補治乃平復治卒得惡瘡不識者出肘後方燒苦竹葉和雞子黃服之良治惡瘡瘢靨及風疥癬沙虱用草蒿燒灰淋汁和石灰煎洗或只用草蒿浸煎洗又方治惡瘡以烏桕葉冬無用根貼壁草椒葉無葉用根野椒亦可又方用楓根白皮即楓樹根旋取去及粗赤皮就濕用為粗末每用藥一升無灰酒二升煎去八分取清汁稍熱作三服藥滓敷瘡口瘡未破敷時留瘡口既破用藥敷瘡三服可活人命神效治惡瘡用茜草根將絹帛包裹用頭米醋於瓦罐內煎熱薰洗若有瘡口用生肌藥貼之療惡瘡熱毒腫痛以甕近下鑽孔盛水令水射腫又以雞子清封腫上熱即易之又方取茺蔚臭草搗汁服一雞子許滓封腫熱則易之甚良治一切惡瘡疼痛不可忍黃水出流出聖惠方以栝樓一枚燒作灰細研每服摻在瘡上治一切惡瘡以金毛獸蹄火燒存性為末入麝少許敷上瘥治惡瘡連痂癢痛出肘後方搗扁豆封痂落即瘥又方治諸惡瘡才覺癢腫者用草烏二三錢為細末酒調雞翎醮水掃瘡即皮皺治惡瘡蝕𧈟金瘡毒物傷皮肉上風水不入入水不爛手足皸折瘡根結筋出夲草以鐵熱及熱未凝塗之少當乾硬以竹未熱火於刀斧刃上燒之津出出如漆者是也治㾏捍瘡用黃連煎湯半碗將爐甘石於火內煆通紅淬黃連湯內乾碾為末入輕粉油調敷治未發惡瘡用獨核肥皂酸米醋合和打成膏子放溫熱敷患處治諸惡瘡毒腫癮疹或癢或痛出百一選方用黃蜀葵花茄花皆取自落者以竹夾取置淨磁器中勿犯手指聽其自爛取敷瘡腫如氷即愈神驗治人面黑瘡出肘後方記事云江左有商人右膊上有瘡如人靣亦無它苦商人戲酒滴口中其面亦赤色以物食之亦能食食多則覺膊內肉脹起或不食之則亦臂痺有善醫者教其歷試諸藥金石草木之類悉試之無效至貝母乃皺眉閉口商人喜曰此藥可治也因以小􅓗筒毁其口灌之數日成痂遂愈然不知何疾也謹按夲經主金瘡此其金瘡之類歟或用為末入雄黃少許摻之良治大人小兒卒得熛瘡又名爛瘡初起作熛漿出肘後方燒牛屎末以粉和敷之又方出肘後方以黃丹為末和糊塗之又方出肘後方燒鐵冷赤三七度注水中浴日二三度治諸惡瘡膏海上方出德生堂方用燕窠內外泥糞俱研極細羅過用油調塗一方治卒患腰惡瘡先發於足有汁水者取為末水調塗治惡瘡黃汁出不瘥漸胤者出本草取載鹽車牛角上土封之即止牛角末是車邉上角也好用之治惡瘡黃水出流痛不止方出聖惠方用故鞍屜氊燒灰細研和臘月豬脂調塗之又方出聖惠方取䜴三合炒令黃色搗羅為末用豬脂調塗之一方無豬脂治熱瘡惡腫癰色毒金瘡下血蛇犬等毒用青黛大黃二味等分為末以雞子白調敷之治惡瘡腫痛方出聖惠方用芨以水煮取汁洗瘡乾塗後膏膏用桑葉取東向者作末臘月豬膏和塗之又方出千金方用豬糞燒煆入油塗之金黃散出聖濟總録治積年惡瘡透掌漏瘡疥外膁瘡大黃銼炒鬱金銼炒鯪鯉甲炙穀精草龍骨山梔子仁木鱉子去殼獨角仙皂角株上黑蟲黃蘗去粗皮甘草銼鉛丹白斂不灰木麒麟竭研黃芩各半兩膩粉藜蘆去苗各一分烏賊魚骨去甲半兩右搗研為散每看瘡大小摻之有膿水即用溫鹽漿水洗淨敷之透掌漏瘡以津調絍於瘡內不過三五上牛角散出聖惠方治久患惡瘡不可者黃牛角一分燒灰麋角屑一分白斂一分炙令微黃麝香一分細研蜜陀僧半分微炒黃丹半分微炒蜣螂半分燒灰羌活一兩海桐皮一兩銼仙靈脾一兩乾地龍一兩去土微炒右為細末每服二錢匕溫酒調下空心食前服赤小豆散出聖濟總録治惡瘡人不識多年不可者赤小豆炒熱糯米微炒吳茱萸炒熟黃連去鬚黃檗銼乾薑蛇床子各半兩右為細散以生油和如面脂先煎槐枝湯洗瘡令淨然後塗藥日再換之白膏方出聖惠方治久惡瘡油二錢白蠟一兩膩粉一分南粉一分細研蜜陀僧一分細研乳香一分細研杏三七枚湯浸去皮尖雙仁細研右件藥先於銚子內煉油熟下蠟令消入諸藥末攪勻成膏日二三塗之乳香散出瘡科精要治年深不效惡瘡白乾薑草烏頭苦丁香半兩鈎苓根狼毒乳香一兩右為細末每用乾摻之或唾調作錠子絍入瘡內麝香散出聖濟總録治一切惡瘡久不瘥麝香當門子二箇丁香紫檀香各一分乳香沒藥各半兩木香一分右為散用雞子清和入殼內飯上蒸熟暴乾再研分作六服每用蠟茶清調下乳香散出聖濟總録治逺年惡瘡乳香膩粉各半錢麝香一字龍骨大黃銼黃蘗去粗皮各三錢右搗研為散先用苦竹瀝洗瘡次摻藥貼之寸金散出聖濟總録治惡瘡久不效雞子殼十箇生却子者檳榔一枚麝香研膩粉各半錢黃蘗去粗皮蜜陀僧各一錢右搗研為𣪚用溫鹽漿水洗瘡乾貼松脂膏出聖惠方治久惡瘡黃水出流松脂一兩半薰陸香一兩半白羊脂三方亂髮灰半兩細研生地黃汁五合石鹽半兩細研右先煎羊脂松脂薰陸等拌次下地黃汁煎令稠即入髮灰并鹽攪令勻成膏日塗之柏葉𣪚出聖惠方治一切惡瘡久不瘥寒食收柏葉燒灰一兩露蜂窠半兩微炒蜣蜋五枚燒灰蜜陀僧半兩膩粉石灰各一錢右搗為細散濃煎漿水淋洗瘡後用雞子清調貼之引膿散出瘡科精要治年深不效惡瘡麝香一字狼毒釣苓根白丁香無心草根各半兩右為細末每用乾摻瘡上瘡口深者絍之治逺年不好毒瘡方雄黃大黃黃連黃芩硫黃各用等分右用巴豆真香油煎至花繳去豆用油調五般末子每用鹽湯水洗後乾雞毛搽上藥用黑傘紙蓋十日全好忌口降真𣪚出聖惠方治久患惡瘡常出膿水降真香半兩蕪荑半兩微炒白斂白芷白芨各半兩右搗細羅為末先煎漿水放溫淋洗瘡拭乾以𣪚敷之砒霜膏出聖惠方久惡瘡砒霜一分細研附子一分細研硫黃一分細研苦參一分末黃蠟一分右用麻油二兩煎油熟下蠟次下藥末攪令勻成膏每用先以蒴藋柳枝煎湯洗瘡拭乾日二塗之鈞苓𣪚出瘡科精要治年深不效惡瘡井鹽一兩釣苓根三兩無心草乾薑二兩右為細末每用乾摻之或唾調少許塗在膏上就貼之檳連散一名木香散出濟生拔粹方治多時不效一切惡瘡生肌止痛木香檳榔黃連各半兩白芷三錢右用為細末每日乾貼檳榔黃葵散出聖濟總録治惡瘡久不瘥者檳榔一箇生者木香黃蜀葵花黃連去鬚右將檳榔稱見分兩餘藥與檳榔等分搗羅為細散先以溫漿水洗瘡淨看大小入膩粉少許蜜調塗於故帛上貼之二三日易之治惡瘡三十年不愈者大黃黃芩黃連黃蘗各一兩右為散洗瘡淨以粉之日三無不瘥馬齒莧膏出聖惠方治一切久惡瘡馬齒莧一兩末白礬一兩末皂莢一兩末右用好醋一斤慢火煎為膏貼之又方出直指方治久不瘥方透眀硫黃黃連等分右為細末以雞子清一箇打碎鋪新瓦上焙為末夾上項藥麻油輕粉調敷先白芷蔥頭煎洗治積年惡瘡不瘥以馬糞并馬齒研敷之不過二三次即愈足脛上瘡癢尤妙血竭散出聖濟總録治一切惡瘡年深不愈大效血竭一兩鉛丹半兩炒紫色右搗研為散先用鹽湯洗瘡後貼之桃花散治逺年惡瘡枯瘤為上信一分千年石灰二分右為細末先洗瘡津調貼之治一切惡瘡多年不瘥者宜用此方出聖惠方緑礬末二兩水銀半兩右以紙一張安緑礬在上入水銀於中間裹定用鹽泥封裹候乾以文火養一宿去泥及紙細研入麝香末半分和令勻如瘡乾油調塗濕即乾貼之治多年惡瘡口不乾者出百一選方採冬瓜葉隂乾瓦上焙碾極細貼瘡濕處三二次便乾纍效治久年惡瘡用多年石灰碾碎雞子青調成塊煆過候冷再為末薑汁調敷治積年諸瘡不瘥方取鼠粘草根細切熟搗和臘月豬膏封之日二換之治惡瘡多年不瘥浸淫入骨或成骨疽宜用此方出聖惠方取七葉子搗令爛以生油調先洗瘡裛乾然後敷之初敷極癢切不得觸之又方出聖惠方用刺蝟膽濕即用膽汁塗之如膽乾即研末摻在瘡上如瘡口不合只去盡膿中心研一瓣乳香安在瘡內即效治惡瘡積年不瘥不痛只入心癢方出聖惠方用枯骨多年者為末酥塗瘡口內外摻此藥不過三五度瘡蟲即死其瘡即瘥凡一切惡瘡久不愈者以木香檳榔散貼之地丁散出聖惠方治一切惡瘡丁腫毒瘡人不識者地丁虻蟲倒鈎棘針露蜂窠蛇蛻皮粟米黍米大麻仁黑豆赤小豆亂髮牝牛脊射生箭熟紅帛蠶紙已上各半兩朝生花秋夏滯雨後糞堆或爛木上如小菌子者炙時收之半兩右都細銼以蠶紙裹纒水浸良久時方漉出候乾於淨地上以炭火燒令煙絶入新盆中以盆子合之候冷細碾羅為末如患已成頭有膿水者以散敷之即愈如未成頭便以酒調一錢服之蓼葉散治無名瘡立驗蓼葉柏葉黃丹胡粉附子粟米石膽川大黃白礬蛇蛻皮乾蟾晚蠶蛾蜜陀僧已上各一兩榠檀一枚右細銼入瓷瓶中固濟燒令熟取出搗羅為末入龍腦麋香各半分更研令勻細先以溫湯淋洗後敷貼日二用之又方治一應不識惡瘡或濈濈狀者臘月豬膏一斤亂髮如雞子大生鯽魚頭雄黃末苦參末各二兩大附子一枚末右合煎令消盡內雄黃苦參大附子末攪令勻候凝以敷諸瘡又療瘑疽疥效又方以鹽湯洗搗地黃葉貼之效硫黃膏治一切惡瘡硫黃膩粉吳茱萸湯洗焙乾炒各一分礬石煆令汁枯牡蠣煆赤研各半兩右細研入小油半兩黃蠟一兩同熬成膏趂瘡大小攤於紙上以火炙鎔貼之又方治諸惡瘡及腫久不識者麝香一錢細研狗糞一兩穀精草一兩燒灰蟾一兩燒灰膩粉一錢右為細末羅為散都研令勻以津調貼之取瘥為度蘖皮散治無名惡瘡年深不愈黃蘗蜜炒榆蛀蟲炙乾各一錢麝香少許研右搗研為細末以鹽漿水洗淨瘡後唾調藥紙花子貼之薔薇膏治惡瘡不識名者薔薇銼一升春夏用枝秋冬用根鉛丹十五兩炒令紫色松脂十兩煉成者右用油三升先煎薔薇待黑即去滓下松脂候消綿濾過下鉛丹文火煎攪勿停手待色變凝成膏以帛上攤貼日二換之白龍膏治諸惡瘡及腫人不識者膩粉一分乳香半兩研細濕百合根一兩爛研右相和研令勻熟每用先以漿水洗瘡淨後以紙塗藥於上每日二貼之蛇床散治一應不識惡瘡或濈濈狀者蛇床子半兩末硫黃半兩細研水銀半兩以少熟棗瓤研令勻星盡右都研令勻以臘月鍊成豬脂調如面脂先以楮根濃煎湯洗瘡裛乾塗之獺骨散治無名惡瘡毒似魚眼者獺骨生碾末一兩麝香一字右細研和勻用津唾調貼之治一切不識惡瘡黃連蛇床子等分右為末豬脂和塗日數次治大人小兒卒得惡瘡不可識者用栁葉或皮洗之亦可內少鹽亦療面上瘡治面上一切惡瘡秃瘡諸藥不瘥者宜用此方一名魚膽膏以鯽魚一頭長五寸留鱗開去腸胃頭髮令滿即以紙裹之燒為灰别覔鯽魚膽調塗之一方入雄黃一分同令研細用臘月煉了豬脂和更令研勻先以泔清洗瘡乾拭塗之日三兩上自瘥麻油調亦得一方鯽魚灰和醬清敷之治面上及遍身生瘡似貓兒眼有光彩無膿血但痛癢不常飲食減少久則透腔名曰寒瘡以多喫魚雞蔥韭自愈羌活散治諸毒惡瘡如疔瘡等煮酒浸半箇時辰羌活一錢半獨活一錢半防風半錢藁本半錢黃芩一錢黃連半錢黃柏五分知母一錢生地黃一錢漢防己一錢半澤瀉七錢熟地黃一錢已上十二味用浸次十一味不用浸防己稍半錢當歸身一錢連翹三錢黃耆一錢半人參半兩甘草橘紅生甘草稍蘇木當歸稍各半錢桔梗一錢右㕮咀水二碗煎至七分一碗去滓食後臨卧喫藥後端坐半箇時辰方可睡如是疔腫急證一切惡瘡更加沉香檀香藿香乳香木香各一錢金寶赴筵膏治諸要毒瘡盤蛇瘡疔瘡等大黃黃耆地龍去土當歸龍骨乳香沒藥粉霜硼砂穿山甲輕粉各三錢腦子一錢江子二十一粒去皮殼麝香少許右蕎麥灰一斗煎淋灰三覆之汁煎三分之一下用雲裡之雀糞五錢重煎十來沸提起放冷澄清再熬入大黃末煎三沸次入朴硝花減者各三兩重每藥一兩加石灰三兩黃丹半兩逐旋絞之待煎滴水中直到底不散者方好提起用餅封要用者入麝香腦子犀角丸治一切諸般疔腫項疽惡瘡巴豆二十二箇大黃一兩一錢犀角一兩三分梔子黃連藍葉升麻黃芩防風人參甘草各一錢當歸黃耆各一分右為細末和蜜為丸如梧桐子大每服三五丸溫酒送下臟腑虗二丸臟腑實五丸不問大人小兒婦人神方奪命丹治疔腫癰疽發背諸惡瘡及牛馬肉發黃者透眀雄黃一兩肥巴豆一百二十粒不去油心金鼎砒一兩半黃蠟四兩鎔開右三味各研極細和勻入蠟中打勻取出火重湯攪勻丸小麻子大量老幼加減服之每服五十丸多至二百丸臨睡溫熟水送下不動其丸不過臟腑只下清黃黑水病去藥丸亦可如藥未下再服則藥病俱下矣煆金鼎砒法透明砒四兩敲作米粒磈用黑鉛一斤鎔化水中撲作珠子先鋪珠一層次鋪砒一層層層相間入角罐中鉛珠蓋面黃泥餅子又蓋面上其餅用筯杵十數竅餅四緣略用泥固定罐口須空一二寸水鼎顛倒覆口鐵線扎定須做把手提挈略固口縫安平地上城甎圍煆就可下開四竅通風一層熟火一層生炭層層相鋪平藥處即止又發火自上而下煆之通紅或提出或寒爐取出其鉛鎔墜在下其砒將在上可得四兩半煆時須先點治發背疔瘡天南星半夏各二錢大黃瓜瓜蔞各三錢右粗末無灰酒一碗水一碗煎服病在上食後服在下空心服不一時於大便內取出膿血塊其疾即可熬藥於四味加扁柏葉苧麻根搗細井花水敷之中留孔治一切惡瘡小赤豆半合漿水半合鯽魚膽五枚蔥白一握細切右相和於砂盆內研如膏薄塗腫上即瘥治延皮惡瘡方用石榴煎皮取濃汁放冷以搽瘡上冷如氷雪即著痂而隨愈此藥甚效昔錢質司法粢嘗苦臁上生瘡始者如粟漸如豆爬搔不已即成大瘡纍治不效後得此方而愈聖愈散治諸惡瘡血出不止及浸淫一名聖愈湯以生寒水石細末滲之立止如神此藥或滲瘡時間作黑色不可貴也藥力去盡却和紅也如血出血多而心煩不安不得眠睡宜用此藥主之熟地黃生地黃各三分當歸身五分川芎三分黃耆半錢人參三分右同㕮咀如麻豆大都作一服水一大盞煎至一盞去滓稍熟眠無時又方治證如前以寒水石燒作粉每服半錢漿水調空心服追毒𣪚治一切惡瘡追死肉惡水甘草乾沙糖糯米粉右等分為細末淨洗瘡口乾摻惡水出盡為度併上藥數遍有死肉即追出用煎紅玉𣪚乾摻瘡口次用萬金膏貼之輕黃𣪚治一切風熱惡瘡龍骨二錢黃丹一錢輕粉五筒子白礬一分右先將白礬為末入在田螺殼內炭火煆過白色為度取出同龍骨黃丹等碾為細末次以輕粉和之如患膁瘡惡瘡皆先用口溫虀汁洗淨以軟帛揾乾次用藥末乾貼瘡上兩三次必瘥黃蘗𣪚出聖惠方治久惡瘡疾痛諸藥不效宜塗黃蘖一分微炒黃丹一分炒令紫色蜜陀僧一分白狗糞半兩燒灰膩粉半兩麝香一字細研麒麟竭三錢右搗羅細為𣪚都研令勻先用甘草湯洗瘡口後用津唾調塗涼肌散出衛生家寶治一切惡瘡濃水不乾蜜陀僧右為末入輕粉和勻乾摻立見效花蕊石𣪚出衛生家寶治無名惡瘡穿潰久經不瘥及癰疽潰爛膿不乾花蕊石一兩半煨過黃柏皮半兩黃連一兩右為末入輕粉和勻先用溫鹽水洗瘡令淨以帛拭乾即以津調藥塗瘡上立效香礬𣪚出衛生家寶治惡瘡及嵌甲神驗白礬半兩乳香二錢半先飛礬令溶後下香飛住麝香輕粉各半錢右合研令勻細先用鹽湯或漿水洗過乾貼或摻疏風解毒散出直指方治諸惡瘡頑癢閧熱及婦人血風遍身紅斑圓點斑中漸發疹痱開爛成瘡癢痛白芷細辛蒺藜炒去刺麻黃去節雞心檳榔當歸鬚生乾地黃川芍赤芍藥川獨活牽牛微炒取仁蒼术炒桑白皮炒枳殼製甘草微炙等分右銼𣪚每服三錢入黑豆七十粒紫蘇五葉薑五片同煎服如大便祕加些生大黃次用貝母膏敷瘡治惡瘡發背出華陀方燒車鰲蘆殼黃蘖甘草右等分為末先以青鹽薄荷園荽樓蔥煮漿水湯洗瘡男子以婦唾婦人以男唾調前藥塗之以赤水出為度紅花𣪚出華陀方治諸惡瘡大效龍骨雪白真者一兩乳香半皂子大粉霜半錢光粉二錢輕粉用小半錢炒半錢生麝香少許黃丹逐旋入百顔色粉紅即止腦子少許右合和了如患瘡先用溫漿水洗淨次用好油塗瘡口上了方可將藥摻在瘡上用膏藥貼日三四次易之趙允蹈赴溫倅過諸暨傳此方云親自效渠患一漏瘡以藥用紙撚填瘡中上以膏藥貼之日生肉舊不痛逐漸覺痛有血是好生肉也集珍膏出家藏經驗方治諸惡瘡黃連十文山茱萸五文白礬五文熖硝十文苦參五文剪刀草五文蛇床子五文巴豆五文用三粒去殼夾蔥煎油調藥右為末用輕粉三十文入藥用油調先用甘草湯洗拭乾敷却用青紗片護藥更入少五倍子末尤佳瘡藥方固多未見此方之效如神乃湖州道場山一僧每以此療人託人主僧力求得之百草膏出三因方一切惡瘡不問乾濕痛癢日近年深百藥不瘥羊屎不拘多少右上下以瓦盛蓋柴木燒令煙盡末麻油調敷癢者入輕粉少許痛入麝香神效雄黃𣪚出余居士選竒方治惡瘡雄黃飛白礬飛黃丹飛白斂細末右等分水調鵝毛掃紙花貼中留小竅出毒氣専治惡瘡瘰􅊓神效張定叟侍郎傳出百一選方黃蘖不以多少用童子小便春秋五日夏三日冬七日穿山甲不以多少火煆存性研細土牛不以多少新瓦磚乾細研每黃蘖末三錢穿山甲末土牛末各一字輕粉半錢同研極勻細濕瘡乾摻乾瘡麻油調塗之又方出衛生寶鑑治一切瘡能生肌肉止痛地骨皮右為細末先於瘡口上噙漿水洗揾挹乾後上藥貼之其效不可具述及治下疳瘡神效黃連散出衛生寶鑑斂多時不效瘡黃連去鬚木香檳榔已上各等分右為細末先洗淨瘡用藥乾貼有水出勿怪未效隔二三日又貼用之治一切丈夫婦人度年過月惡瘡瘙癢疼痛不得安效出護命方當歸木香檳榔栁枝防風甘草各一分南椒二銖鯽魚一箇右使油四兩同煎令藥得所去藥出却用黃丹一兩麝香一分膩粉四銖研令勻入在煎者油內栁枝攪六七沸瀉出用塗瘡口却以龍骨貝母杵為末敷其上外以油單裹之先用栁枝湯洗了方使治惡瘡十年不瘥似癩者蛇蛻皮一枚燒為末下篩豬脂和敷之醋和亦得石上者彌佳懸蔞散出儒門事親治發背惡瘡懸蔞一箇大黃一兩當歸半兩金銀花一兩皂角刺一兩右銼碎用酒一碗煎至七分去滓溫服如有頭者加黍粘子白金散出楊氏家藏方治惡瘡烏賊魚骨不拘多少削去硬皮右件為細末用麻油調敷透膿散出德生堂方治諸惡瘡及貼骨癰不用刀針其膿自出纍有應驗不可視之輕泛然其功甚有取焉鵝口繭用出鵝兒者一箇燒灰右為細末酒調服即透只用一箇不可用兩三箇繭兒燒灰如服三兩箇即有三兩箇瘡口膿透為害妙用膏出百一選方治諸惡瘡項有癭及漏瘡真清麻油入古武錢三二十文久深浸年深每用以鵝毛掃患處療惡瘡粉方一名水銀膏方見夲門瘑瘡類治惡瘡生背脅頭腦四肢要害之處欲成大毒者鮑氏方狼跋子出泉州似巴豆人以醉魚右去殼椎碎或水或酒浸之良久頓服只一二粒不可多滓敷勿著瘡口利下惡物即愈或不用酒又方出鮑氏方治同前大黃一兩木鱉甘草節各半兩右為散每服三錢入少酒煎利下愈又方出鮑氏方治同前紫河車又名木棉根鱉藤鱉豆並各二錢生右酒浸用生薑同搗細浸透服之滓盦瘡上即時黑皺愈已上三方治發背及早用妙黃耆肉桂柴胡酒煎湯出東垣蘭室方柴胡一錢半連翹一錢肉桂一錢黍粘子炒一錢右㕮咀好糯米酒一大盞半水一大盞半同煎至一大盞去滓大溫空心宿食消盡服之少時便以早飯壓之使不致火熱上攻犯中上二焦也化毒丹治百腫惡瘡毒腫初覺一二日咳逆煩悶或咽喉閉塞發熱惡寒沒藥乳香各五錢另研巴豆四十九箇去皮生用另研草烏頭醋浸炮裂浮石各一兩燒赤淬七次餘醋湯右為細末浮石烏頭餘醋打麵糊丸如豌豆大每服五七丸空食後冷酒送下忌熱飲取快利三二行或吐出惡物為效白香散出聖濟總録治一切惡瘡疼痛久不瘥者楓香脂研膩粉防風各一分右細研令勻先以瘡含漿水令暖吐出洗瘡令淨後以藥末乾敷之疼痛立止貼至令瘥即易一方無防風名楓香散又方治諸惡瘡疼痛不可忍以熊脂不拘多少細研塗之良敷瘡藥治惡瘡方見本門諸瘡類加減五苓散出百一選方治惡瘡項上有癭及漏瘡沉香檀香生熟地黃升麻乾葛芍藥黃耆黃芩羚羊角犀角連翹甘草防風右等分㕮咀每服三錢白水煎服仍煎何首烏散服雄黃膏出十便良方治身上諸惡瘡雄黃一兩硫黃一兩並細研右以豬脂四兩入銚內煎化成油入鯽魚兩箇煎令肉爛了又亂髮兩卷煎焦爛去滓用和上件雄黃末搽之瘥黃連散出衛生家寶方治一切新舊惡瘡斷膿生肉或先唾沫瘡口結後用藥末摻黃連黃蘗黃丹各一兩白芨龍骨輕粉各半兩右為末以冷熟水調敷瘡口瘡濕即乾糝治諸惡瘡以半天河水洗之即竹籬頭水及空樹中水治諸惡瘡出本草用馬勃敷之甚良治諸惡瘡膿水久不瘥者出本草以黃蜀葵花作末敷之即愈治鼷鼠食人患惡瘡及正月食鼠殘多為鼠瘻小孔下血者是此病出本草以貍骨摩之及食貍肉亦佳治惡瘡及殺蟲出本草以粟米泔下澱醋者敷之治惡瘡出本草以蛇婆炙赤燒末服一二錢匕一方敷之治惡瘡及乳癰蜂疔出本草以露蜂房煎湯洗之治惡瘡熱瘡出本草以青魚膽汁塗上瘥治惡瘡久不瘥有蟲者出本草用柏枝節燒油膏敷之三五次無不愈驗治風惡瘡出夲草以黿鱓魚膏塗摩之治惡瘡出本草取蛇魚甲炙浸酒服之以膏摩之治諸惡瘡出夲草用虎杖根燒灰貼瘡治惡瘡出本草用桐皮水煎敷之治惡瘡出夲草以白商陸大蒜㶸之治腫爛惡瘡出夲草以櫸樹皮研搗窨治惡瘡疽癰腫疳瘡野雞病出夲草以楸木皮煎膏粘敷之或用楸木葉搗敷瘡腫治惡瘡出夲草以貝母燒灰油調敷之治惡瘡疥出夲草搗蒜貼之熟醋浸之經年者良治惡瘡疥并風瘙出本草取白鴿食之立愈治一切惡瘡出夲草用雞草腸搗汁敷之五月五日者驗或為末豬脂調敷亦可極妙治惡瘡疥癬出本草以海豚魚皮中肪摩瘡上此魚生大海中治人惡瘡腫毒出本草以續用鬼蓋和醋敷之治一切惡瘡疥癬出本草以續隨子搗敷之治諸瘡腫出夲草以胡麻油生摩之治一切惡瘡腫及斂瘡口出夲草用石合草葉焙乾搗羅為細末溫水調貼治惡瘡痂癢破血出夲草以狗膽汁敷之河內太守劉勳女病在左膝瘡癢華陀視之以繩繫犬後足不得行斷犬腹取膽糊瘡口須臾有蟲若蛇從瘡出長三尺病愈矣治惡瘡腫未潰者出夲草煮白茅針服之一孔二針二孔四針治惡瘡出夲草用灰藋搗碎和油敷之治惡瘡久不瘥出本草用屋內檻下蟲塵土乾敷之亦可油調塗之治惡瘡疥癩出夲草以楊梅皮根煎湯洗之忌生蔥治惡瘡疥癬有蟲者出本草以馬先蒿根皮為末和油塗之治惡瘡疽𧈟疥癰蟻瘻等出夲草並以朝生暮落花日乾末和油塗之一名狗尿臺治諸惡瘡瘍出本草以當歸煮飲之治惡瘡出夲草以狼牙煎汁洗之治惡瘡出夲草以野蒿煮令熱和醬醋食之治惡瘡久不瘥者用三家洗碗水煎令沸以鹽投中洗之不過三五度主惡瘡以益母草搗敷之治惡瘡經年不瘥者及炙瘡上血令不中風水以青布燒作黑灰敷之治惡瘡入水不爛及虎狼咬瘡以青布和蠟燒熏之出水毒治多年惡瘡百方不瘥或痛焮走不已者爛搗馬齒莧敷上不過三兩遍瘥治惡瘡用土檳榔細研油塗之即階除間蟾蜍屎也治惡瘡瘑瘻以酢漿草搗敷之殺諸小蟲治惡疾遍身瘡者取水中浮萍濃煮汁漬浴半日多效此方甚竒也治惡瘡以白鬃燒灰敷之治惡瘡腫用剪刀草莖葉爛搗如泥塗敷治惡瘡癰腫疼痛未潰取毛建草葉煎搗敷不得入瘡令人肉爛治惡瘡腫以羚羊角生摩和水塗瘡腫上主惡瘡熱毒癰腫赤白逰瘻蝕等瘡北人呼腫曰逰用石藥和水敷之治惡瘡疥癬以大蘇葉鹽細窨傅治惡瘡疥癬以白灰淋汁洗之主惡瘡疥癬以鐵線鏽和油塗之治惡瘡疥癬蟲瘻疽螫毒出本草用五榖燒作灰爇塗之良主惡瘡以白馬骨和黃連細辛白調牛膝雞桑皮黃荆等燒為末淋汁洗之治惡瘡出本草以蜣蜋和乾薑末敷之治惡瘡丁腫毒腫諸瘡有根者出本草用故緋帛如手大取露蜂房彎頭棘刺爛草節二十七亂髮燒為末作膏空腹服下方寸匕大主毒腫緋帛亦入諸膏取水蛭十餘枚啖病處取皮皺肉白無不瘥冬月無蛭蟲地中掘取暖水中養之令動先洗去人皮上醎以竹筒盛蛭啜之須臾便咬血滿自脫便用肌者治諸熱毒惡瘡出本草取瓜藤與刺豬苓二味洗淨去粗皮焙乾等分搗羅用甘草水調貼之瓜藤生施州四時有葉無花其皮無時採之治諸般惡瘡及杖瘡成癰未潰之前急宜貼之􅒝麻子仁研成膏黃蜀葵花去萼及時收入瓶內令腐爛自然成膏真蒲黃各等分右研成膏子攤白紙上掩之治一種瘡毒初發時癢抓之汁出著處復為連續不已至於滿身號曰肥瘡右用黃柏黃連各一兩以蜜塗之慢火炙令焦為細末入輕粉麻油調敷瘡上若瘡濕即摻之不過三兩次自愈治鼠咬瘡用野狐頭燒灰敷之又方用桐油塗之效治諸惡瘡用雀梅搗敷之又方用黃楬侯五味淹食之一名青鳩治一切惡瘡用肥好黃連土根鬚并蘆頭以生蜜浸炙七次勿令焦為末瘡乾即用油調敷之即乾摻之治惡瘡腫毒漏爛用駱駝脂敷之治惡瘡瘜肉及除面印子用新生小兒臍中屎塗之普濟方卷二百七十五
