氣茯苓乾地黃當歸各八分甘草乾薑人參各七分黃耆六分芎藭五分桂心四分厚朴三分杏仁五十枚右為末蜜丸如梧子大每服二十丸加至三十丸為度日二清米飲下一方無乾地黃訶梨勒丸治下焦虛冷氣溫脾胃不思飲食訶梨勒皮蓽撥桂去皮胡椒附子炮製去皮臍沉香木香人參草豆蔲檳榔各一兩右為末和搗二三百杵丸如梧子大每服二十丸食前溫酒下內固丸治下焦虛寒脾腎不足腹脅疼痛蘹香子二兩半木香兩楝實一兩半乾薑半兩草豆蔲去皮三分吳茱茰湯洗炒葫蘆芭炒補骨脂各一兩甘草炙一分右搗細末煉蜜和丸如彈子大丹砂為衣每服一丸嚼破以溫酒鹽湯下空心食前服伏龍肝湯出千金方治下焦虛寒損或先見血後便轉此為血痢不止伏龍肝五合乾地黃五兩阿膠牛膝甘草乾薑炮黃芩地榆各三兩髮灰一兩右㕮咀以水九升煮取三升去滓下膠候化下髮灰為三服防己湯療下焦冷腫滿胸壅塞吐不下食兼去溫毒防己芍藥各二兩枳實炒獨活防風桂心各三兩生薑八分葛根三兩半夏一升洗右銼以水九升煮取三升分四服相去八九里久中間少食粥一方無防己枳實加附子二兩炮餘依本方忌羊肉餳生蔥黃蘖止泄湯出千金方治下焦虛冷大小便洞泄不止黃蘖人參地榆阿膠各三兩黃連五兩茯苓橘皮各四兩艾葉一升右㕮咀以水一斗煮取三升去滓下膠化分三服一方有厚朴續斷散出千金方治下焦虛寒損或先便轉後見血此為逺血或利或不利因勞冷即發續斷當歸桂心蒲黃阿膠各一兩甘草二兩乾薑乾地黃各四兩右㕮咀以水九升煮取三升半去滓下膠化下蒲黃分三服石鍾乳丸治下焦虛冷臍腹疼痛手足厥逆脈氣沉短石鍾乳陽起石各一兩附子一兩半桂去粗皮硫黃各半兩硝石鹽精各半兩右為末用糯粥為丸如梧子大每服三十丸空心食前生薑鹽湯下厚朴丸治下焦虛冷便利頻羸瘦無力不思飲食厚朴去粗皮銼五兩附子炮去皮臍蜀椒去日及閉口者取紅各二兩右將水六升青鹽三兩生薑三兩同入銀鍋中煮令水盡焙乾搗為末以水浸炊餅和丸如梧子大每日空心酒下三十丸燒厚茴香散王氏博濟方治中焦虛冷臍腹撮疼心胸痞脹和元氣進飲食川附子去皮臍官桂去皮川椒去目舶上茴香木香胡椒陳橘皮去穰巴戟天去心乾薑炮半兩京三稜煨一兩右十味杵為末每服用豶豬腎子一對切去筋膜切作薄片子以末三錢入蔥絲少許鹽半錢濕紙包煨熟餌訖以酒或粥飯壓之須臾覺臍下暖甚妙胡椒青鹽丸出楊氏家藏方治下焦虛弱腳膝無力多倦瘦怯不美食附子兩枚重九錢炮去皮臍切細青鹽二兩厚朴去皮人參去蘆木香白术沉香丁香茴香破故紙炒川楝子去核取肉肉豆蔲麩褁煨香黃耆蜜炙杜仲去皮胡椒共十三味各一兩右為細末却入青鹽酒煮麵糊丸如梧子大每服一百丸空心鹽湯送下治下焦虛冷小便數瘦怯無力出本草羊肺一具細切作羹飲食之煮粥亦得厚腸胃令人能食下焦除惡氣治下焦虛冷腳膝無力陽事不行補益出本草羊腎一箇熟煮和入半兩煉成乳粉空腹食之或用燕覆子即木通實也和藥食之更好主補中焦諸不足氣脾胃卒患食後氣痛本草以山奈生搗汁服之治下焦弱理胃氣令人能食用蝟肉以五味淹炙食之良不可食骨令人縮治下焦冷氣用陳皮一斤去瓤搗末以蜜丸如梧子大每服三十丸食前溫酒下三焦腹論黃帝針經謂三焦病者腹脹氣滿不得小便窘急溢則為水留則為脹夫三焦者決瀆之官水道出焉上焦其治膻中膻中為氣海中焦主腐熟榖下焦當膀胱上口主分别清濁今三焦俱病故腹脹氣滿不得小便溢而為水為脹也治宜升降氣道則腹滿自消水道自利矣三焦脹者經所謂氣滿於皮膚殼然而堅不痛是也蓋脹有痛否以别虛實若鼓脹之類內挾宿食按之堅痛是謂邪實今三焦皮膚殼殼然而堅不痛特以氣滿為虛脹而已方補氣丸治三焦病久欲成水腹脹不消小水不利海蛤牽牛子赤茯苓去黑皮防己大戟炒防風去義木香桑根白皮陳橘皮去白焙訶梨勒去核苦葶藶芎藭木通犀角郁李仁去皮各一兩大黃二兩半乾生薑地黃焙一兩右為末煉蜜丸如梧子大空心米飲下十丸覺壅不快加至十五丸覺通利即減三丸大小便不通服三十丸木香枳殼散治三焦病脹滿水道不利木香枳殼白芷蓬莪茂白术甘草炙桂去粗皮各二兩益智子炒青橘皮各三兩陳麴炒京三稜炮各四兩右為散每服二錢生薑鹽湯點服不拘時候京三稜散治三焦脹和養脾胃除積氣京三稜十兩陳麴微炒大麥蘖微炒木香肉豆蔲去殼白檳榔乾薑炮甘草炙厚朴去粗皮一兩杏仁去皮尖雙仁者麩炒一兩右為散拌勻每服二錢入鹽少許沸湯服不拘時候小丁香丸治三焦脹滿消化滯氣丁香沉香銼各一分乳香研一錢半茴香子半兩蓽撥半兩桂半兩檳榔二枚肉豆蔲二枚去殼巴豆十五枚去皮心阿魏少許右除研者外為末次入乳香巴豆阿魏令勻煮白米粥和丸如菉豆大每服五丸生薑湯下如胸膈氣不和及元臟冷氣上攻迷悶加至十丸溫酒下常服熱水亦得要微動以意加服之白术橘香湯一名橘香散王氏博濟方治三焦氣滿皮膚腎脹順氣白术四兩陳橘皮去白焙赤茯苓去黑皮甘草各二兩附子一兩乾薑炮半兩右銼如麻豆大水一盞薑二片棗一枚同煎至七分去滓溫服如覺減寒入荆芥煎丸稍覺三焦不和併服即效陳麴湯治三焦滯氣陳麴炒黃萊蔔子炒黃等分右為散每服三錢水一盞煎三四沸去滓入麝香少許再煎一沸溫服不拘時候澤漆湯治三焦不調上乘於肺時發喘咳身體浮腫坐卧不安澤漆陳橘皮去白防己甜葶藶紙上炒郁李仁各半兩百合桑根白皮木通赤茯苓各一兩右搗篩每服三錢水一盞棗二枚擘破煎至七分去滓不拘時溫服茯苓飲治三焦有水氣滿悶不能食消痰氣令能食赤茯苓去黑皮人參白术生薑各三兩枳實二兩陳橘皮一兩半右銼如麻豆大每服五錢水一盞半煎至一盞不拘時去滓溫服甘遂散治三焦氣不通心腹脹滿喘促大小便不利甘遂半兩牽牛子半生半炒續隨子去殼大戟各一兩葶藶一分右為散每服半錢空心濃煎燈心湯下利下水為效未減更一服甘遂散治三焦水氣似鼓四肢虛腫甚者甘遂半兩檳榔木香牽牛子半生半炒萊蔔子研各一兩右為散每服半錢煎紫蘇木瓜湯調下空心服利下水為度更量人虛實加減茯苓湯治三焦有水氣胸脅肢滿目眩赤茯苓去黑皮四兩桂去粗皮白术甘草炙各三兩右為散每服五錢水一盞半煎至一盞去滓不拘時溫服小半夏加茯苓湯治三焦不順心下痞悶膈間水脹眩悸動半夏洗五兩生薑半斤赤茯苓去黑皮三兩右銼如麻豆大每服五錢水二盞煎至一盞去滓溫服不拘時牽牛子丸治三焦病脹滿為水小便不利牽牛子二兩烏指木根皮五兩木香三兩蜚蠊大黃銼炒各二兩防己枳實去穰麩炒陳橘皮去白皮羌活去蘆各一兩右為末煉蜜丸如菉豆大日中及雞鳴後合用甘草湯下十丸稍增至二十丸以知為度檳榔飲治三焦榮衛不通氣滿水脹檳榔銼五枚木香一兩生薑切焙芎藭青橘皮各半兩前胡去蘆一分丁香山芋各半兩右為散每服三錢水一盞煎至七分空心溫服腳腫加牽牛子半兩面目浮腫加郁李仁半兩人參香术散治隂陽不和三焦氣滯胸膈氣痞脅滿脹小便不利飲食不消人參甘草炙各半兩木香半兩白术五兩五味子炒三兩右為散每服二錢入薑鹽少許白湯點服不拘時候木香丸治三焦病腹脹氣滿小便不利木香二兩牽牛子二十四兩炒香取十二兩檳榔補骨脂炒香各四兩右搗四味為末又入牽牛子勻以清水和丸如菉豆大每服二十丸茶清或熟水下食後服如酒食過傷可服五七丸小兒一歲可服一丸妊婦不可服三焦咳論內經云久咳不已則三焦受之三焦咳吐咳嗽腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮氣逆也蓋三焦之氣以胃氣為本水榖之道路氣之所終始也今咳而久者以寒氣藴結關播胃中腹滿不食逆氣上行涕唾多而面目浮腫也藿香散治久咳傳三焦腹滿不欲食藿香葉人參赤茯苓去黑皮青橘皮去穰焙細辛去苗葉益智子去皮炒縮砂陳橘皮去白焙甘草炙各一兩木香白芷炒各半兩右為散每服三錢水一盞入生薑木瓜各三片煎至七分去滓稍熱不拘時服半夏湯治三焦咳腹滿不欲食方見本門方紫蘇子湯治三焦咳心胸不利不思飲食蘇子微炒陳橘皮湯洗去白焙各一兩甘草炙半兩乾薑炒桔梗炒杏仁湯洗去皮尖雙仁炒各三分右為散每服四錢水一盞半棗二枚擘破煎至七分去滓溫服日三五味子丸治三焦咳腹滿不欲食順氣五味子炒覆盆子去蒂仙靈脾各一兩右為末煉蜜和丸如梧子大每服二十丸生薑臘茶下加至三十丸空心食前服玉液散治久咳傳三焦腹滿不思飲食及胃虛有痰半夏湯洗去滑七遍焙一兩生薑去皮切陳粟米揀淨各二兩右為散每服一錢水一盞煎至六分溫服三焦約論黃帝三部針灸經言小腹腫痛不得小便邪在三焦病名曰三焦約內閉發不得大小便夫三焦者水榖之道路氣之所終始也上焦如霧中焦如漚下焦如瀆三焦乃流行之道榮衛致養則腐熟水榖分别清濁以時而下無復滯留若榮衛不調風邪入客則決瀆之官約而不通所以不得大小便也刺法取足少隂太陽之經方郁李仁丸治三焦約小腹瘇痛不得大小便木香二兩青橘皮去白焙一兩人參二兩赤茯苓去黑皮一兩郁李仁半斤大戟河水煮去皮焙一兩麻仁半兩與大戟郁李仁同别搗細入藥內甘遂麩炒微煙生覆於土候冷開出火毒一兩訶梨勒半兩大黃銼炒二兩右為末别研三味外搗羅却入三味拌和再羅煉蜜丸如豌豆大每服十丸煎車前子湯下不拘時服順氣丸治三焦約通導大小便郁李仁浸去皮研大黃銼炒各一兩赤茯苓去黑皮澤㵼銼葶藶隔紙炒各二兩大麻仁一兩半研檳榔三兩銼杏仁去皮尖雙仁者麩炒半兩研右搗研了和拌勻再研極細煉蜜和丸如梧子大每服三十丸空心用甘草湯下日三炒鹽酒下亦得枳殼丸出宣明論調順三焦平勻氣脈消痰滯利胸膈袪風利大小腸枳殼去穰二兩牽牛子四兩一半生一半熟檳榔半兩陳橘皮去白焙一兩木香一分右搗羅四味為末與牽牛粉拌勻再羅過煉蜜和丸如梧子大每服一十五丸至二十丸食後生薑湯下欲利加丸數枳殼散治三焦約大小便不通枳殼湯洗切作片子焙乾五兩厚朴去粗皮塗生薑汁炙二兩滑石細研一兩桂二兩去粗皮右四味搗研拌和每一兩藥末入膩粉半錢和勻每服一錢用冷米飲調下空時服更量老少虛實加減踈風散治三焦氣約大小便不通牽牛子炒一兩大黃一兩檳榔半兩陳橘皮去白焙一兩右為散每服二錢生薑蜜水調下食後良久服皂莢散治三焦約大小便不通豬牙皂莢酥炙去皮子白蒺藜各等分右為末如大腸不通用鹽茶湯調下一錢小便不通用溫酒調下一錢淮南五柔丸出活人書治三焦不調小便祕澀和榮衛臟腑大黃炒一斤前胡去蘆二兩赤茯苓去黑皮半夏湯洗切焙肉蓯蓉酒浸去皺皮葶藶隔紙炒當歸切焙芍藥各一兩右為末煉蜜和搜再搗千杵丸如桐子大每服五丸食後溫水下日三稍增之普濟方卷四十三
