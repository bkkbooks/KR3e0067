body:
  text: 普濟方卷四十三明周王朱橚撰三焦腑門總論夫三焦有名無形主持諸氣以象三才之用故呼吸升降水榖往來皆待此以通逹是以上焦在心下主內而不出中焦在胃脘主腐熟水榖下焦在臍下主分别清濁出而不內統而論之三者之用又本於中焦中焦者胃脘也天五之沖氣隂陽清濁自此而分十二經絡所自始或不得其平則有寒熱偏勝虛實不同榮衛滯澀清濁不分而生諸病矣故曰氣會三焦手少陽脈通於膻中膻中臣使之官為氣之海審此則知中焦者為沖和之本古人謂左腎為腎臟其腑膀胱右腎為命門其腑三焦三焦者有脂膜如手大正與膀胱相對有二白脈自中出夾脊而上貫於腦所以經云丈夫藏精女子繫胞以理推之三焦當如上説有形可見為是扁鵲乃云三焦有位無形其意以為上中二焦如漚如露下焦如瀆不可遍見故曰有位無形而王叔和輩失其旨意遽云無狀空有名俾後輩承繆不已其名以失實矣脫果其無形尚何以藏精繫胞為哉其所謂三焦者何也上焦在膻中內應心中焦在中脘內應脾下焦在臍下即腎間動氣分布人身有上中下之異方湛寂欲想不興則精散在三焦榮華百脈及其想念一起欲火熾然翕撮三焦精氣流溢並命門輸㵼而去故號此腑為三焦耳夫三焦者一名三關也上焦名三管反射中焦名霍亂下焦名走哺合而為一有名無形主五臟六腑往還神道周身貫體可聞不可見和利精氣決通水道息氣脾胃之間不可不知也凡上焦三管反射者通三焦名中清之腑也别號玉海水道出入膀胱合者雖合而不通上中下三焦同號為孤之腑也而榮出中焦衛出上焦榮者是絡脈之氣道衛者是經脈之氣道上焦如霧霧者霏霏起上也起於胃上管並因以上貫及布胞中走腋循足太隂之分而行還注手陽明上至舌下注足陽明常以榮衛俱行於陽二十五度行隂亦二十五度為一周日夜五十周身周而復始大會於手太隂手少陽也主心肺之病內而不出人有熱則飲食下胃其氣為蒸汗則出或出於面或出於背或出於身手背不循衛氣之道而出蓋外傷於風內開腠理毛蒸易泄衛氣其病則肘攣痛食先吐而後下氣不續肺膈間不得從其道名曰泄氣走之故不循其道此氣慓悍滑疾乍開出故厭悶所以飲食先吐而後下也寒則精神不守泄下便利語聲不出若實則上絶於心若虛則飲氣於肺也中焦如漚漚聚也言在胃如漚起於胃中管在上焦之下此以受氣變其糟粕使化為精微上注於肺脈乃化而為血奉以生身莫貴於此故獨得行於經隧名曰榮氣主足陽明則號曰豐隆在外踝上去踝八寸别走太陽絡諸經之肺上下絡太倉主熟五榖不吐不下實則熱熱則閉塞不通上下隔絶虛則生寒寒則洞泄便利霍亂主脾胃之病夫血與氣異形而同類衛是精氣榮是神氣故血與氣異形而同類焉奪血無汗此是神氣越胃血此是精氣故人有一死而無再生也由精神之氣隔絶也若虛則補於胃實則泄於脾調其中和其原萬不遺一也下焦如瀆瀆者如溝水絶泄也起胃下管别回腸注於膀胱而滲入焉故水榖常並居於胃中成糟粕而俱下於大腸主足陽明灌生津液合膀胱主出不主入别於清濁主肝腎之病也若實則大小便不通利氣逆不續吐嘔不禁故曰走哺若虛則大小便不止津液氣絶人飲酒亦入胃榖未熟而小便獨先下者何也蓋酒者熟榖之液也其氣悍以滑故後榖入而先榖出也所以熱則瀉於肝寒則補於腎三焦病者腹脹氣滿小腹尤堅不得小便窘急瀉則為水留則為脹候在足太陽之外大絡在太陽少陽之間亦見於脈取委陽小腹病腫痛不得小便邪在三焦約取太陽大絡視其結脈與厥隂小絡結而血者三焦也脹氣滿在皮膚殼然而不堅仁存方論云嘗觀周子太極圖曰無極而太極至哉斯言也天地混沌此無極也天地既判隂陽始分此太極也太極動靜而生隂陽有天地有夫婦有男女矣人身亦與天地同人之生是受氣於無動靜往來然後為有父母交合之始陽精隂血未至之時此無極也隂陽交媾陽施隂受此太極也自此真精之氣至所謂天一生水水腎也則綴而為根元漸次生長則成為二二生三三生萬物五臟百骸皆由此而成也至於三焦一經叔和云命門配越人以手心主配千載之賢哲固不敢以孰是孰非議之也手心上為十二經之一而命門於十二經無所與焉且手心主厥隂之經屬心胞而絡三焦手少陽三焦經則屬三焦而絡心胞表裏互相屬絡而三焦經則未嘗絡命門如此則越人為是手心主其經則厥隂起於胸中屬心胞下膈絡三焦然後循脅腋而上肘至臂自小指次指出其端少陽三焦之經起於小指次指中耳前過額主人穴名夾頰至鋭目眥而出其端此二經絡之始終也三十一難曰上焦在心下下膈在胃上口主內而不出其位在膻中玉堂下一寸六分直兩乳間陷者是中焦在胃中脘不上不下主腐熟水榖其治在臍傍下焦在臍下當膀胱上口主分别清濁出而不內以傳導也其治在臍下二寸故名曰三焦素問六節臟象論亦曰膻胃大腸小腸膀胱三焦者倉廪之本營之居也能化糟粕轉而不出者也五臟别論亦曰膻胃大腸膀胱三焦此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之腑由是論之聖人且以三焦為有形以至陳無擇作三因方且曰三焦有脂膜如掌大正與膀胱相對有二白脈自中出夾脊而上貫於腦及觀漁隱叢話後集引龍川略志曰有徐遁者在齊時大飢群盜相臠割肉而食其中有一人皮肉盡而骨脈全遁以學醫故往觀其五臟見右腎下有脂膜如手大正與膀胱相對有二白脈自其中出夾腎而上貫於腦意無擇蓋本於此前所謂十二經脈互相屬絡一臟則曰屬臟而絡臟一腑則曰屬腑而絡腑不然則手厥隂經何以曰偏屬心胞而絡三焦手少陽三焦經何以曰屬三焦而絡心胞惟有形而可以屬之絡之無形安可以屬之絡之十二經者既有始起之所又有出其端之所謂之無形亦難矣若以三焦列為倉廪之腑言之則又難於執著所以梁丘子注黃庭經尚且曰三焦自古無的説三焦自叔和謂無狀空有名之後後世紛紛議論不一而三因方及徐遁之説則在臟腑之外别是一物而不與臟腑相聮屬且與經中所謂內而不出出而不內之説異以至於周賢天權注難經曰三焦有名而形隱焉前賢天曰二經為虛臟虛腑諸如此説教人則念越人豈妄稱內而不出出而不內之論以垂後世耶為其有物可以容內出入而後為之經指或者難曰如子之言則二十五難曰心主與三焦為表裏俱有名而無形謂何愚曰彼子之言固如此而周氏所注曰膻中為三焦之所會原氣夙藏於其下胃氣營周於其中聮續貫通為水榖之道路氣之所終始所謂無形於義未安所以修之曰具有名而形隱亦斯意也但尚欠發明耳玉因閲蔡西山脈其間有論三焦一篇後引禮運記曰上焦若竅中焦若編下焦若瀆然究不曾指何為竅何為瀆愚得竅編瀆三字入後三復細思似有可推詳者且上焦若竅竅者竅漏之義可以通達之物即是胃之管也所以經曰上焦在胃之上口主內而不出此豈非胃之管乎中焦者若編編者編絡之義如有物編包之象此乃胃之外有脂如網包羅在胃之上以其能磨化飲食叔和脈訣曰膏凝散半斤者此是也是脾之大絡故經曰主腐熟水榖是也下焦若瀆者溝瀆之義可以決瀆可以傳導乃是小腸之下曰闌門泌别水榖自此而分别清濁之所故經曰在膀胱上口主泄而不藏又曰主出而不內又曰下焦為傳化之腑此豈非出而不內傳導之腑乎又曰三焦者水榖之道路氣之所終始也蓋水榖之所入者自上而中自中而下至於糟粕轉輸傳導而下一無底滯如此尤可表其為形名矣愚謂形者非謂臟腑外别生一物不過指其所而為形耳愚今發明內而不出出而不內之奧旨表而出之於千百年之後又如手心主經謂之心胞絡且人之心為君主之官不受邪氣凌犯其所以致病者心胞絡也故曰真心不受邪者此也愚未免臆度一説曰心胞絡亦必有所指今觀豬獸之心上有黃脂􅀈包在其上似脂非脂似肉外别有細筋膜如絲與心肺相連者此則心胞絡也豬獸之內景大槩亦與人同觀其心形亦可見矣三焦熱用藥大例上焦清神丸方見積熱門連翹防風湯一名連翹散方見嬰孩門一切痘疹疥類龍腦飲子方見積熱門犀角地黃湯方見肝臟門涼膈散方見積熱門中焦小承氣湯方見傷寒門調胃承氣湯見傷寒門洗心散方見嬰孩積熱類四順清涼飲見積熱門桃仁承氣湯見傷寒門下焦五苓散方見傷寒中暑類大承氣湯方見傷寒門立效散見淋祕門血淋類八正散淋門石葦散淋祕類四物湯方見婦人門抵當湯方見傷寒門氣分熱柴胡飲子方見傷寒過經不解類白虎湯方見傷寒門血分類清涼飲子方見嬰孩諸熱類桃仁承氣湯見傷寒門通治大熱三黃丸見木門黃連解毒丸方見熱病門嘔逆類三焦寒用藥大例上焦桂附丸見脾胃門鐡刷湯見心痛門胡椒理中湯見本門虛寒類中焦二氣湯方見四季補益門附子理中丸方見痼冷門大建中湯熱病門下焦還少丹見四季補益門八味丸見腎臟門天真丹見腎虛類氣分寒枝桂加附子湯傷寒門桂枝加芍藥人參新加湯傷寒門血分寒巴戟丸見諸虛門神珠丹見腎臟門腎虛類通治大寒大巳寒丸方見瀉利門四逆湯方見傷寒門右此內有寒熱之大略也若外有寒熱者當求别法三焦實熱論上焦在心下其氣起於胃上口并咽貫膈有熱則舌乾燥口氣面赤胃膈痞滿之病生焉中焦者在胃中脘不上不下主腐熟水榖其氣和平能傳糟粕蒸津液便積為上注於肺通行榮衛仲景曰熱在中焦則為堅故其氣實則閉塞不通上下隔絶熱則身重目黃脾疸之證生焉下焦者在臍下當膀胱上口主分别清濁出而不內以傳導也又下焦如瀆司決壅也泄其氣實而有熱則津液內燥道不利由是有氣逆便難胃脹噦嘔之證潤焦湯出三因方治三焦實熱目鋭眥急痛腰脅熱脊背連膻中煩悶飲食未定頭面汗出關格不通不吐不下或氣逆不續走哺不禁或泄瀉溺澀遺瀝地骨皮半夏湯洗七次柴胡去土苗澤瀉各五兩茯苓麥門冬去心甘草炙人參各一兩右銼散每服四錢水二盞薑五片竹茹如指大煎七分去滓空心服犀角丸治三焦邪氣一切風氣又治風盛痰實頭目昏重肢體拘急腸胃燥大小便難犀角黃連一兩人參黑牽牛各二兩大黃八兩右為末蜜丸如梧桐子大每服十五丸臨卧溫水送下虛實加減用三黃丸出衛生寶鑑治夫婦三焦積熱攻衝眼目赤頭項瘇痛口舌生瘡中焦有熱心膈煩燥不美飲食下焦有熱小便赤澀大便結五臟俱熱即生疽癤瘡瘐及治五般痔疾糞門熱痛或鮮血方見腎臟門骨蒸類勝氷丹出和劑方治三焦壅盛上衝頭目赤熱疼痛口舌生瘡咽喉不利咽物有礙神思昏悶並皆治之白藥子一兩半山豆根紅內消黃藥子甘草炙黃連各三兩麝香另研龍腦另研各二分右為末用建盞盛於飯上蒸候冷入腦麝令勻煉蜜丸如雞頭米大每服一丸含化及用津吐於指甲上磨少許點赤眼立效三黃湯出直指方治積熱藴隆三焦皆熱大小便閉黃連去鬚黃芩大黃濕紙包煨等分右銼細每服三錢薑三片慢略煎食後服清氣散調榮衛順三焦治風壅消痰涎退煩熱前胡柴胡川芎枳殼白术青皮羌活獨活甘草炙茯苓人參等分右為末每服二錢水一盞荆芥一穗煎七分食後服牛黃散出濟生拔萃治上熱臟腑祕結大黃一兩白牽牛頭末五錢右為細末有厥冷用酒下三錢無厥冷而手足煩者蜜湯下大三黃丸出危氏方治上焦壅熱咽喉瘇閉