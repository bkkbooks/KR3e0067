時時又發驚齧齒粘痰魚口動瞳人昏暗翳遮睛發搐面白發搐面白唇中黑滿身皮膚無血色汗出如油沾體滑頑涎滿口喉中塞驚風指黑驚風指黑爪如煙手足多垂軟似綿咬妳多啼無泪下暫時停息又撁纒再發驚風再發驚潮搐涎流臉目斜烏青連口鼻啼哭類如鴉面冷腮紅眼閗睛手青足點指如丁朝朝嘔吐時時㵼日日咨煎夜夜驚舌腫風涎牽據響唇焦氣喘水雞鳴齒噤戛牙偏咬妳頻吹魚口作鴉聲逆危衰脫面白唇紅逆晴昏力困危驚風嫌有汗痢熱怕攢眉吐㵼防咽噎痰涎忌氣痿囟低脾胃脫頸軟骨筋衰喘嗽變驚粘痰作嗽發連綿喘急時時面臉鮮外被客風傷肺穴內緣冷氣入喉咽看看拗頸雙眸直漸漸畨身兩手牽口角流涎心肺脹鴉聲齕齒必難痊感風氣喘邪客脾肺感風濕忽然喘急氣難通睛斜汗出唇青逆尤忌痰涎滿腹中虛陽生風虛脫變虛風虛陽必上攻下焦隂氣盛中脘食難通上熱下冷虛陽上熱口生瘡下㵼頻頻為滑腸渴飲唇乾咽若火四肢冷逆似氷霜天柱骨倒天柱骨倒為亡津所得元因吐㵼頻肝受賊風難俯仰脾傷冷氣損精神頭垂頸軟身憔悴筋緩皮寬項不伸面色痿黃胸腹脹渴多畏食命逡巡歷驗不治囟腫數日忽病不治或風攻囟門頭骨開解或時面赤如酒色少時即愈必發驚不可治兒百日內外發搐愈而必復作并愈後囟腫不可治病愈後復作面黑神昏雖不吐㵼大便如常身熱口瘡咨煎兒自指口內者胸中有痰久必發驚久痢不治身熱膿青身熱血黯潮熱腹痛憎寒汗出頭熱足冷壯熱手冷形羸頭軟睛昏赤脈眼澀白膜口臭生痰面腫作喘舌頭紅黑口唇焦赤喉中鳴響膈滿氣喘飢不能食渴欲思酒痢如血蠶或如癰膿神昏項硬雜色不治青赤從眉入目者死青色連眉入耳者死青色如斜目下者死青黑色入口鼻者死青黑色多繞口鼻者死黑色從眉繞耳者死鼻上青色腹痛者死鼻上白色諸血出者死耳目口鼻起黑或白色者死汗不出出不止者死熱病不得汗者死不治證目赤脈貫瞳人胸腫及陷鼻朝黑魚口氣急吐蟲不定㵼不定精神耗大渴不定止之又渴吹鼻不噴病重口乾不睡時氣唇上青黑點頰深赤如胭脂鼻開張喘急不定聽聲音驗病驗五臟正聲脾屬土應宫音其聲緩大而漫肺屬金商音其聲促而清次于宫肝屬木應角音其聲悲而和次于商心屬火應徴音其聲雄而清次于角腎屬水應羽音其聲沉而細次于徴亂聲音主病聲雄而重大主傷風身熱頭疼驚悸上焦熱聲雄而實澀主身熱大便不通及口瘡聲悲而焦躁主肝風拘急眠卧不安或恐悸聲濁而沉重主疳氣并耳聾聲哭而不啼主驚睡卧不安聲哭而不哭主腹中疼聲促而躁急主肺經感風邪咳嗽身熱聲長而細小主下利腹疼或大便下血聲嗄而不響主肺熱久則虛聲嗄而輕顫主久病發驚癎聲短而微細主小便澀聲短而遲緩主㵼瘧耳鳴聲前促而後緩主吐逆惡心不思飲聲咨煎不定主心煩躁眠卧不定有小兒聲嗄咳嗽眼目澀者是欲出瘡豆有瘡豆盛出或出後豆毒咽喉聲啞者死候也又有初生嬰孩兒患重舌啼聲不出者死辨疑一兒患隂癎其脈浮數洪弦是隂中之陽非真陽也一兒患慢驚得脈浮數呼吸粗大是其絶證非陽回也一兒患痘疹作熱非傷寒也但看耳後赤縷者是一兒患身支張非驚也肺肝不足或投涼寒亦愈一兒聞響即掣跳者非驚也乃肺肝不足身有未安一熱在筋脈亦發搐非真搐也如或過劑變假為真撮要一凡兒在胞胎必須飲食有常起居自若使神全氣和胎氣安生子必偉一懷娠之後最忌食熱毒等物庶免孩兒生有臍突瘡癰等患一乳母常須養和血氣樂以忘憂使乳汁溫平縱兒疾作自安平過半矣一兒平常無病不必服藥恐遇疾不即為效一初生小兒必忌外客所觸庶免致客忤熱古人所以忌客一兒孩不宜食肉大早傷及脾胃免致蟲積疳積一兒孩變蒸作熱非謂其病不藥自愈一小兒有病在腑有自愈者故先賢惟理其臟未言其腑腑陽臟隂如麻子一證乃是腑病一小兒顱囟未合視為尋常一兒生榖道無穿多至不救藥無速驗必假物透以通之一兒風發搐手足不宜熱捉恐風癎逆入經絡廢害肢體一小兒無容入神廟中恐神情閃爍必生怖畏一小兒笑極與和樂睡思既濃母使咀嚼一小兒患吐㵼女吐男㵼最為急證急宜療之一小兒患瘡疹發驚不可下驚藥有熱不可用退熱藥有汗不可止汗或吐不可理吐或下亦有可不可論髮際穴仁齋直指方論云小兒初誕收生者多於頭額前髮際中間灸之蓋取其可以截風路也諸風篤證藥力不及昏迷沉絶默然無聲於此灼艾每有扶危之功然亦顧其善後之劑何如耳百會一穴在頂心端正旋毛間亦濟危困者以是哉灌藥服藥法小兒煎藥以銀盞約水半盞藥多焉其或不能灌藥則以匙送下服藥未盡旋旋與之藥性溫熱乳食前服藥性寒涼乳食後少頃服和平之疾隨意無拘論腦麝銀粉巴硝等不可輕用仁齊真指方論云小兒驚風古人以其內外熱熾風氣暴烈而無所泄故用腦麝麻黃以通其關竅銀粉巴硝以下其痰熱蓋不得已而用之其實為風熱盛實者設也世俗無見不權輕重每見發熱發搐輒用腦麝蟾酥鉛霜水銀輕粉巴豆芒硝等劑視之以為常惟其不當用而輕用或當用而過用之是以急驚轉為慢驚吐㵼胃虛荏苒時月驚風之所謂難療者正在此也萬一發熱驚搐本為傷風傷寒傷食瘡痘而作誤藥至此其為害豈淺淺哉以理觀之能用細辛羌活青皮乾薑荆芥之類以為發散如腦麝能用獨活柴胡山梔枳殼大黃之類以為通利勝如銀粉膏硝殼或當用酌量可與不可無之亦須酌量勿可過劑幼幼書謂㵼青丸導赤散乃醫用之上藥蜈蚣有毒惟風氣暴烈者可以當之然其風氣暴烈非蜈蚣能截擒亦不自止但用之貴乎藥病相當弗容固執或半字或一字或桐子半丸或桐子一丸尤在酌量而作劑也設或過焉當以蚯蚓桑皮為解解巴豆毒以龍腦薄荷汁調沙糖服或巴焦根汁服凡幼兒欲發驚風先神志不定恍惚悸人搭眼上視左顧右盻伸手握拳悶鬱拿氣情態不若尋常如此者有驚即散驚有熱即退熱壅實即去壅實退熱則不生痰熱全未有風癎搐搦顫引之狀則只與退熱化痰如參蘇飲之類可也謹勿妄投通利勝等劑惡或透其熱流入絡及成風此又小兒無病不可服藥之戒世俗玩習以為小兒體熱或遇澡浴即與久坐湯水之中風冷外傷水濕內滲頃刻間遽成風搐或惡呌頻吐驚散則不生風壅滯通則氣得其平病無由作是故當以小劑治之若夫患在或昏迷失音或洞泄或已勢如暴風疾雨難以支吾不可不戒小兒四時用藥拔粹假令春分前風寒也宜用地黃當歸羌活防風或地黃丸㵼青丸相間服是也春分後風熱也羌活防風黃芩或㵼青丸用導赤散下之立夏之後宜三黃丸導赤散夏至後溫熱也導赤散㵼黃散合而服之或黃芩井草白术茯苓之類為勝濕去熱也立秋後宜益黃散陳皮厚朴人參木香之類是也秋分之後地黃丸主之謂腎下受㵼也新生兒戒火嘗有北人居于南方新生小兒多與灸囟其害非淺古書云河洛土地寒多兒生三日灸囟以防驚今者東南地土多溫新生牙兒無病不宜逆灸聖濟經云前世之書執小兒論者不知南北之異而專於灸焫大抵察其地寒溫虛實仁齋直指方論云小兒初誕收生者多於頭額前髮際中間灸之蓋取其可以截風路也諸風篤證藥力不及昏迷沉絶默然無聲於此灼艾每有扶危之功然亦顧其善後之劑何如耳百會頃石頂心端正旋毛間亦濟危困者以是哉普濟方卷三百五十九
