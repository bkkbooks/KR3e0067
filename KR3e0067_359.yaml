body:
  text: 普濟方卷三百五十九明周王朱橚撰嬰孩門五臟伏敵喜傷附論肺所伏者心所敵者肝所喜者辣所傷者焦苦二變七蒸之臟和則喜歡氣爽神清魄強疾主喘滿咳傷風作熱虛痰壅盛腎所伏者脾所敵者心所喜者醎所傷者甜五變十蒸之臟和主行坐嬉戲笑語疾主崩砂黑齒截齒咬牙䁎耳膿汁肝所伏者肺所敵者脾所喜者酸所傷者辣辛初變六蒸之臟和則魂神壯意志生疾主風攣搐搦眼目瘇赤疼痛心所伏者腎所敵者肺所喜者苦所傷者醎三變八蒸之臟和則情性悅樂疾主驚癎恐悸虛躁啼呌讝語狂煩涎流口角脾所伏者肝所敵者腎所喜者甜所傷者酸釅四變九蒸之臟和則消榖氣美飲食疾主嘔噦疳積虛痢痞癖潮熱不思乳食五位分部定位附論肺部所主鼻孔井竈尖處名凖兩眼大角中央坎陷名曰山根若鼻孔黑如煤色主肺焦熱或黑燥如墨色主肺氣已絶鼻中赤癢疳盛或㵼白涕主肺寒或困寐流清涕主傷風肺熱或鼻塞呼吸艱澀有妨吮乳關竅閉塞乃感冒風寒邪熱之候鼻下生瘡潰爛者即疳鼻中常臭者積熱所致腎部所主耳穴之前名曰耳花耳船名輪輪裏名廓輪廓焦黑腎家虛熱其黑如炭腎絶待旦耳門生瘡衛積非常耳中膿出腎熱疳極臭名停耳膿汁不止瘡癢如裂其候虛熱耳聽不聰心腎氣壅常作閧閧熱氣上攻或如蟲剖榮虛衛熱耳輪如氷淋痘相侵耳輪紅熱傷寒是則極熱內痛腫氣相攻清心涼膈關竅通塞兒孩兩腎常虛無病若有攻擊使令無益肝部所主眼睛有穴內藏其神外究五輪眶䀭屬脾熱即生眵兩眥屬心熱痛如針白屬肺家熱赤生砂黃屬肝臟昏瞀翳障中心瞳人腎熱不明兒孩眼目痛即便哭良方對治更為忌毒或患丹瘡從裏為殃經效良藥速療無妨眼本屬肝怕熱怯寒如有治法得愈何難眼或連眨驚風交雜忽然竄視驚風已至肝熱定晴或翻無神瞳出中陷十無一生脾部所主唇即口門語言之明舌居其中飲食之宗齒牙咀嚼咽喉相約牙齒既剛角宫自若嬰孩未定唇口見病上則人中下乃承漿上下四旁皆屬脾鄉口內屬心心脾有熱舌燥唇裂三焦藴熱紅如血色紅重渴輕即流涎沫鵝口膜口木舌重舌脾肺熱就口內噴臭脾腎氣寒色如死肝大驚一嚇口乾唇白時時積驚漸漸傳心心氣不足令兒煩哭可知脾絶指甲皆黑目神無光醫者知亡五種撮口驚風最惡可醫論方無路莫錯心部所主眼睛直下髙骨之中名之曰顴顴下名面面下名頥屬生則吉相反病乖相尅證失醫士喜之平常不動良士惡之其色反乖應病乖色九分不救心絶何因大呌數聲過關不作必作鴉聲夫人一身主事于心心不可病病即散神兒童心真才熱傷神神既昏亂當與調榮心為身主常能安靜忽然加熱譫讝驚汝邪干不寧心常昏沉醫工究心藥莫亂陳人之五體以頭為首首中有靣靣中有睛睛中有神神者目中光彩是也或隱或顯或橫或衝應衛而現病之順即順疾之逆即逆色者青黃紅白黑是也初發則我生而侵之次則生我以臨之盛則我尅以交之重則尅我而入之侵即有犯臨即相干交即過位入即通度然其白色者白似枯骨又如煙霧空黑色者如冷灰又如竈尾塵埃紅色者紅若朽木又若赤霞照谷黃色者黃似晒竹又如敗葉紅霜青色者青如冬瓜又如荷葉蓋水察之侵臨交入究之生平尅傷加以聽聲而應之一數圓長謂其如水洄渦漩洑流聲也二數鋭謂如焚薪爆烈之聲也三數散靸謂其如朽腐折蠧之聲也四數洪亮謂其如鍾磬之器擊響之聲也五數頽弊謂其有如牆傾岑陷崩拓之聲也在病疾而有變于證而有應五行五脈一氣而更有滯者從幼至長氣干犯者隨受以傳或善或惡惟主五臟相參百脈相領輕重相傳自然應見辨小兒脈法分三部法分三部但取掌後高骨為關關前為寸口關後為尺澤如小兒脈可以一指按其三關進退取之此法甚明不須疑惑也論小兒脈小兒脈三嵗以上五嵗以下然後可看與大人有異者為呼吸常六至是也八至病十至困蓋小兒純陽故脈息數促如大人者為不同也小兒周嵗以前脈息難慿周嵗以後方有脈形寶鑑云五百七十六日乃成人血脈骨肉皆堅牢方可診候也審脈逆順驚搐脈浮數順沉細逆身溫順身冷逆夜啼脈微小順洪大逆身冷順身熱逆心腹痛沉細順浮大逆身溫順身冷逆傷寒脈洪弦順沉細逆浮大順微伏逆汗後脈沉細順緊促逆困倦順狂躁逆溫病脈洪大順沉細逆身熱順身冷逆咳嗽脈滑浮順沉細逆身溫順肢冷逆霍亂脈浮洪順沉微逆身溫順身冷逆吐哯脈浮大順沉細逆身溫順身冷逆泄㵼脈緩小順浮大逆身溫順身冷逆諸痢脈沉細順浮大逆身溫順身冷逆諸渴脈洪數順微細逆身溫順身冷逆諸腫脈滑大順沉細逆臟實順滑泄逆腹脹脈浮大順虛小逆臟實順泄㵼逆痰喘脈滑大順沉細逆身溫順身冷逆寒熱脈緊數順沉細逆倦怠順強直逆疳勞脈緊數順沉細逆臟實順脾泄逆蟲痛脈滑緊順浮大逆身溫順唇青逆諸失血沉細順浮數逆身溫順發熱逆中惡腹脹緊細順浮大逆身熱順身冷逆黃疸脈浮大順沉細逆腹寬順泄㵼逆火疸脈浮洪順沉細逆身熱順身冷逆已上脈是小兒五臟之根本若得其順則知其可治若得其逆則知其不可治也縱有生者十無一二七表應病浮寸口風熱頭沉關上腹脹胸痛尺中大便不通芤寸口衄血吐血關上㵼血痢血尺中少便出血滑寸口惡心吐逆關上胃寒不食尺中渴飲不歇實寸口胸中煩熱關上腹滿痛切尺中小便淋澀弦寸口胸心結痛關上胃寒不食尺中小便赤澀緊寸口頭疼心痛關上腹內刺痛尺中小便急痛洪寸口頭痛壯熱關上吐逆不食尺中小便赤澀三部一脈三部俱數身熱驚搐忪竭心躁三部俱緩脾熱口臭吐逆寒熱三部俱弦肝風拘急欲發驚搐三部俱浮心腹疼痛急則驚癎三部俱芤又患㵼血吐血溺血三部俱洪發熱驚悸大小便澀三部俱實胃不能食胸膈不利三部俱急巢氏云主小兒驚癎脈應雜病數為熱屬腑遲為冷屬臟陽數主逆吐不吐必發熱隂微主泄㵼不㵼必盜汗沉數寒熱寒多熱少亦生骨蒸緊數寒熱熱多寒少又主骨熱急沉緊心腹疼痛短數同又主咳嗽有痰沉細乳食不化亦主疞痛不利沉伏為積聚為霍亂微緩泄㵼乳不化沉緩同微澀瘈瘲筋攣微主利血微急寒熱吐血微浮嗽浮滑宿食不消亦主咳嗽浮緊疳氣耳聾弦緊潮痛浮弦頭痛身熱浮數驚熱緊滑吐血惡心心急數驚癎不測屢主疳淋肺甚緊顛癎風癎痰涎流溢肺浮實鼻塞大小便不通脾微細不吐則㵼難治關緊滑主蛔蟲尺沉同尺微細溏泄冷利乳食不化尺微澀便血無血必盜汗脈過寸口入魚際主遺尿七表八裏脈乃是五臟六腑脈也蓋小兒純陽有病多見七表脈為屬陽脈故也主病有驗八裏脈所以不見者為屬隂脈故也設是小兒有八裏脈者必發隂癎孫氏云陽脈急甚必變陽癎急驚風也隂脈沉遲必變隂癎是慢驚風也是以八裏多不經見湯氏云凡脈浮數為熱風伏結為寒沉細為冷傷食亦沉大小不勻者惡也小兒脈大多風熱沉細因云乳食結弦長多是肝膈熱緊數驚風四肢掣浮洪胃口似火燒沉緊腹中痛不徹虛㵼有氣又兼驚脈芤多利大便血前大後小童男順前小後大必氣咽四至洪末苦煩滿沉細肚中疼切切滑主露濕冷所傷弦急客忤分明説五至夜甚浮大晝六至夜細浮晝别息數平和八九至此是皆人之惡疾前件所論童男脈訣乃舊訣也又况今古不同然古書云小兒八至為平大人八至為緊九至乃死今之小兒吾常指下審之只多大人一至為平若八九至乃是數脈必發熱生驚若以八九至為平緊數之脈豈止此也若十至之餘乃是雀啄病已危亟今之醫者宜審而切之小兒脈訣并歌凡小兒脈當以大指按三部一息六七至為平和十至為發熱五至為內脹脈緊為風癎沉緩為傷食促息為虛驚弦急為氣不和沉細浮為風大小不均為惡候為鬼祟浮大數為風熱伏細為物聚單細為疳癆凡腹痛多喘嘔而脈洪為有蟲浮而遲潮熱者胃寒也溫之則愈嬰孩有疾未能言筋骨肌膚尚未堅脈理未全難考據當觀形色定由緣靣帶青色肝之病赤色心病因可必白為肺病黃屬脾黑色屬腎斯為得黑死還生死可生紅深時氣有疾停赤青已援脾風了青黑傳入變慢驚發熱鼻冷是瘡疹耳冷應知風熱證通身皆熱是傷寒上熱下冷傷食病更將虎口紋色看或紅或紫傷風寒青驚白疳黑中惡黃困皮端皆可觀紋直是驚曲傷損沉隱為風固可知曲外為冷內食傷紋得短少當安逸五臟部位怕相承更看稟受有虧盈隂陽表裏不可亂補過㵼多須辨明五百七十有六日大小變蒸數已畢血榮氣盛脈理全診候方能無所失男左女右不相干須臾一指蓋三關浮洪驚熱須遲數滑冷沉虛食積然脈浮固知感風候浮大傷寒宜審詳浮緊驚風不可當浮數風熱應須有浮遲之脈有潮熱乃知胃寒無所守浮虛盜汗睡中多浮洪胃口如火炙㵼痢浮大不可醫口噤不食亦堪悲脈洪腹痛多嘔逆定知蟲動不容説脈弦為風或為寒弦數之脈瘧未痊弦急因知為客忤氣結下寒邪所干脈沉帶緊為腹痛緊數為驚多瘈瘲脈牢而實大便難牢緊積聚何能動脈浮沉濡為虛弱久亦變驚上還作虛緊伏熱致生風虛濡慢驚真可邈脈沉而實為有積沉數骨間須極熱沉遲虛冷豈應無沉緩食傷多嘔逆脈緩筋細皆為冷乳食不化兩相宜單細疳勞伏氣攻小大不均惡候省變蒸尺寸脈不拘既曰變蒸何必驚脈如雀啄風癎疾直上直下亦驚名額上多青色驚疼卧不安赤時身壯熱黃燥汗難乾素問云心熱病者顔先赤心氣合火火氣炎上指象明候故候于顔顔額也毛髮燥乾黃驚疳體似湯熱除須有汗微渴意恓惶毫毛畢直主傷寒作熱素問云寒客于人使人毛髮畢直皮膚閉而乃為熱當是之時可汗而發之右臉連腮赤身軀發熱時肝弦筋脈急驚哭又攢眉身熱攢眉主頭疼肝弦驚哭主下痢素問云肝熱病者左臉先赤肝氣合木木氣應春南靣正理之則其左臉也左臉腮青白時時咳嗽頻痰涎嘔多逆不食少精神素問云合金之氣應秋南靣正理之則右臉也兩臉微赤因潮熱夜間發作日間歇久則令兒氣血虛骨肉如蒸四肢逆有一等小兒兩臉常赤氣壯實始然非熱所作也若臉赤有熱者色必憔悴養生道云氣虛則發厥謂手足冷也血虛則發熱謂肌肉熱也兩臉腮青黑多啼勿奈何驚疼時進退腑臟不安和鼻息氣粗促兒孩衄血因黃時尿不利赤色熱多嗔鼻燥兒多哭皆因肺熱為白青連口鼻吐㵼食傷脾目鮮目眨目青驚目直心肝熱已成二臟戰爭風火盛漸看搐搦動雙睛錢氏云目赤兼青欲發搐目直身反強直生風又云肝風熱目連眨萬全方云目若睛青脈左脅下必硬多吐涎沫扁鵲云目睛青脈主癖凶也有積眼睛黃春冬骨似湯夏秋多㵼痢胞腫嗽難當兩目皰浮腫皆因久嗽為睛黃脾有積潮熱有瘡痍亦有目皰腫不嗽者因食積傷脾久必虛腫腹脹者必痢無常眼深微黑睛微赤必主耳聾腎受積眼稍如有細紅筋內弔驚風是蹤迹印堂多青黑腹痛夜頻啼卧睡時驚悸無歡日慘悽攢眉因下病疳積靣黃浮吐㵼形容白唇乾渴不休傷寒身熱攢眉者主頭疼黃色人中畔兒因食物傷形青便澱沫脾胃不安康白唇兒須吐兼成失血形紅赤亦同唇乾唇皺揭夜熱不安寧久渴㵼唇紅已虛證不可用涼藥有積唇黃色看看作腫形脾虛多夜起糞白臭酸腥唇青脾胃怯腸冷痛非常畏食多嫌乳增寒靣色黃青肝木色唇主脾土木來剋土知脾弱不能食巢氏云小兒臟氣不和血氣為冷所乘即口唇青白亦有臟氣熱唇生瘡而風冷之氣入瘡雖瘥後血氣不復故令唇青口臭或作燥唇焦赤腸中糞不通氣粗多作熱睡卧不和同紫色唇間見流涎口畔垂蛔蟲攻刺痛久則致尫羸涎流唇紫回蟲積痛作疼時汗出多虛痛若來脾胃冷蟲消積㵼保安和舌白乾焦燥烏黃並為小便難且澀心火漸蒸脾如小便不澀必焦黃舌腫厚急欲乳不能吃者此因邪熱客入兒臍流入心脾即舌厚唇燥不急治殺人洗心散導赤散黑魚眼膏子貼舌上百草霜鹽等分和塗舌上下立消舌上出血舌腫舌裂舌上芒刺舌焦舌黑舌赤並與地黃湯方見舌胎舌卷門兩耳前微赤疳攻必耳聾微黃驚入腎戞齒睡魂中頥下微黃亦主之或曰女子無腎素問云胞胎者腎靣色形青白心煩㵼又驚躽身啼腹痛臟腑作雷鳴靣色青兼赤驚來熱亦成色青腸胃冷腹痛但啼聲赤紅傷寒靣心煩熱不安眼鮮驚必作風盛變多端有一等小兒靣黃不赤却發潮熱傷寒壯熱者必唇乾燥或氣微促也靣白黃皆見心煩㵼不調因傷常夜起乳食不能消靣青兼黃色驚疳發病因睡中多呌哭潮熱損精神胃熱身金色脾蒸靣眼黃不利腸自利黃疸病難當頭靣青筋起咨煎不肯眠身軀才發熱驚哭握雙拳唇紅靣赤睡難安頭黑青筋驚氣蟠冷氣入腸成內弔虛風在胃變多端曲身呌哭為非祟直頸啼聲欲作癎不久自然驚搐候隂陽邪正互相干弄色非時變胎氣客忤驚紅青須發搐兼黑痛分明錢氏云病重靣有五色不常不澤者死孫氏云弄色者為夭色夭色者死下頥赤微微亦主耳聾熱聚小腸中結澀膀胱內令兒溺不通素問云腎熱病頥先赤腎氣合水水性潤下指蒙明候故候于頥古書有一證靣青目兼黃小便澀異常亦主滑喉中多哽氣噎飲欲生驚二證皆癎疾看看搐搦成便黃因內熱紅赤黑同看緑白青皆冷疳肥食臭酸有一等淡黃沫如蟹之黃如槐花者虛熱治法在後傷食酸餿臭兼疳㵼白肥積停物不化結實久還稀小兒多要吐者傷胃中有宿食宜下之妙丸子下益黃散補若此吐唾者停飲在胃黃龍丸以白术橘皮煎湯送下孫氏云小兒飲乳吃水正乳吃食正食飲水並成痰飲錢氏云口中吐沫後心蟲痛靣黃目白少精光多睡咨煎被食傷嘔逆出聞酸氣息時時腹痛實難當先下後補右驗實積痛錢氏云凡積痛靣黃目白無精光多愛睡畏食大便酸臭輕者磨去其積重者下去積腹痛亦去矣時行瘡痘數日前狀似傷風靣臉光乍熱乍涼頭有汗虛驚虛悸手多牽唇紅體熱時加喘鼻清耳冷只貪眠目澀氣粗頻嚏噴定知瘡疹有相傳瘡疹多驚悸時行候一同增寒偏要水發熱又嫌風目澀雙睛白皰浮兩臉紅嗽涎聲啞嗄呵欠睡朦朧瘡痘相傳染時行若感風唇乾唇緣白目澀目微紅疹出眉先皺瘡來鼻不通皮毛寒聳立麩豆隱其中時氣行瘡豆形青靣臉鮮咨煎頭有汗恍惚手多牽嚏噴兼微嗽噓呵欠愛眠睡中驚起哭瘡疹欲相傳孩兒驚搐定體熱狀如湯班疹藏肌肉身涼出豆瘡身熱心煩躁驚來耳似氷指稍俱帶冷豆搐甚分明湯氏雜病形症歌鬼病皮膚裏相傳臟腑間腫虛如水病瘈瘲似風癎發熱渾身澀痛連心腹攢小兒若有此服藥醫急看時氣皆因節令虧頭疼壯熱汗微微良工仔細看時候當作傷寒病治之宜服羌活散惺惺散熱氣流傳脾胃居致令黃色在皮膚須知其病真如可何用燒錢問女師此證宜服五苓散煎茵蔯湯調熱氣還逢腑氣衝便成結毒在腸中身體若煩多燥渴更兼尿糞不能通此證宜利下輕則利之用四順飲重則下之用金星丸時氣還須早早醫變成敗氣急難差乍寒乍熱無時度或去或來體漸羸小兒骨蒸者皆因時氣不治療漸成敗氣羸寒熱往來是疳勞宜服地骨皮散次服星露膏鱉甲散隂陽邪氣兩相并臟腑隂陽各競爭發作有時名是瘧早須醫治莫留停此疾宜服正氣散并瘧藥草果飲雖然吐下熱猶餘蓋為元因臟腑虛熱盛虛時皮肉澀治令燥渴不能除此候宜服五苓散以上俱是時氣傳變有此等候初無治法學者當審其根源量其輕重虛實用藥何患不痊時氣雖然瘥猶多餘熱停氣傾須不食頰冷面皮青熱盛血兮血散行鼻出血兮人可驚皆因汗而不得汗上壅喘兮聞有聲大凡時氣與傷寒病相似初病在表速宜汗庸醫恐誤失表漸入腠裏其熱昏于經絡血得熱即散從鼻中出故其名紅汗也宜服小柴湯大便祕用大柴湯病未入而先下之乘虛入腹怎生醫痞滿喉中生喘急結胸之候切須知傷寒熱毒胃中存久作班瘡發滿身若見舌唇渾似黑只因性命在逡巡黃病皆由胃熱為痢加腹滿脈沉微見此候時須用意若言魂去定難醫百日孩兒或作黃非干溫疫及時殃只為胎中遭熱盛勿令人炙作成瘡此候乳母宜服生料四物湯用生地黃赤芍藥乃是也兒亦服云瘧疾因何渴皆因臟腑虛熱餘多飲水結塊腹中居小兒胎裏受風寒生下令兒不得安腹痛躽身頻哭泣此候良工仔細看此名躽啼宜服鈎藤木香乳香等藥風冷傷筋脈四肢全不仁痛同風熱摶緩是熱傷筋寒客于喉裏啼聲似啞人溫和用湯藥不爾損精神小兒虛腫一似吹蓋是風邪夾氣為若見皮膚如熟李此名疳水聽因依此候宜服塌風散并五苓散加木香青皮用燈心煎脾為土壞不尅水便為腫滿入于脾腫痛行時還熱痛若居血氣即成之若看此候須審細莫教差誤使傾危太陽入耳聼聰聰氣滯多因耳必聾鳴是風并氣相擊痛應腦户有邪風腎熱鬱蒸停耳患漸深疼痛出稠膿不痛即非氣與熱緣因風水入其中熱氣薰肝眼必昏其有輕重必須分輕疾熱多多熱淚重生白翳色如銀赤目眥頭成努肉朦朧睛上似浮雲洗肝飲與頻頻服只此良醫是異人小兒飲水久停肝翳障全無辨物難夜裏不明為雀目青盲晝夜一般般小兒胃熱班瘡爛眼癢復疼發渴無蓋為熱氣傷眼臉世人俗諺號胎風毒入喉中熱作癰名為喉痺食難通馬脾額間生腫痛重必心煩命必終凡有此證急宜吐出惡涎為佳胃熱皆因血氣強四肢溫壯小便黃表裏熱時煩躁甚渴多身體熱如湯客忤多因人物衝更遭鬼氣亦相逢吐下青黃并白沫水榖開張痛又攻面色青黃時變色脈弦急數不干風亦似驚癎無上是早須醫治莫從容小兒氣弱命中衰魂魄多因被鬼持其候痿黃頻哭泣衡人冷氣早須醫乘年衰兮逢月空失時和兮三虛中遇賊風兮還卒死一如鬼氣候須同臟腑未絶兮須存活急須救療兮莫匆匆疝氣因何得邪風在腎經經傳并血聚如此漸成形冷氣結在臟因弦小腹疼本經無補法疏利藥通靈霍亂因風急忽然吐㵼并有時連風痛或即繞臍鳴乳母因傷冷孩兒有宿癥夾風身發熱臟實更頭疼小兒吐痢早須醫早是腸虛胃逆為更有中他湯藥毒必知煩躁在心脾風冷傷于乳變壞汁須凝孩童生嘔逆氣喘腹膨脝解脫當風處洗浴向簷楹哭中還吮妳氣逆在胸停嘔吐從兹發良醫諳本經當令乳母腹強順釀乳藥血為榮兮氣為衛二氣相須無阻滯忽然血被氣來侵所以妄行不安位血隨氣上奔心來吐出鮮紅爭忍視便須服藥急醫看解熱涼中依次第偹急即服藕汁及蘿蔔汁治法當順其氣次行血産母懷胎忌數般若令冷傷便憎寒生下嬰孩不吃乳更加腹痛肚皮堅乳哺寒溫不著量致令壅滯在胸堂更兼新乳相投觸不得安和亂胃腸因成吐哯須醫治診脈輕浮夀必長衣厚傷溫損小兒熱蒸津液透膚皮致令身體連頭上汗出流珠汚濕衣小兒血氣未調和腠裏開踈易染疴將養傷溫成盜汗早須醫治莫蹉跎此候有二般有虛汗有心血溢汗治法不同切冝審詳虛汗乃脾虛不能尅制津液當補脾心血溢汗兩膄亦當斂心氣涼血為佳飲乳并傷水為痰結在胸令兒乳不下吐沫似癎同實則身烘熱譫言入夢中還須早醫療取久變驚風三焦若不調胸寒氣極急煩滿喘氣粗噯出酸臭氣乳哺不能消結聚成癥癖有形名曰癥乳動為瘕積弦強癖之元分明記胸臆胸中熱兼實榮衛不通徹臟腑不調和經中名痞結氣滿腹肚脹時時及加熱不用問神明此是分明訣察形證神色凡看小兒病疾先觀形證神色而切脈次之面青睛青肝之病面赤心之病靣白肺之病靣黃脾之病靣黑腎之病先欲别其五臟各有所主次看稟受盈虧胎氣實虛隂陽二證補過㵼多當敕其失兼五臟六腑表裏有各相應配若能明其標本則神聖工巧自然有之察形證歌搖頭揉目肝熱生風䏧淚減明三焦積熱鼻生清涕肺受其寒頰赤靣黃風傷肺熱霍亂吐逆胃積氣傷㵼痢不常氣攻腸滑靣青呵欠驚風傳肝盜汗頻頻臟腑熱傷寒戰驚搐風盛發狂胃熱生斑氣傷冷厥長吁齒齧風盛氣生上竄搖頭涎流胃熱肺壅氣傷咳嗽咯血涎盛發齁積傷風熱小便淋瀝熱聚膀胱疝氣因啼胎中積結妳脾痞癖因物所傷喉閉丹瘡肺之受熱愛吃泥土脾臟生疳嘔逆痰涎蛔蟲上出鶴膝解顱因風腑熱熟審而用細詳使藥病證疑難逆證似順順逆有别隂陽不均證候相加色脈致亂惟驚風發作按脈察證以較之陽候證脈俱得其陽陽者順也隂候證脈俱得其隂隂者逆也陽候有隂脈者其證欲傳隂候得陽脈者其證反是也謂有急驚風乃是陽癎得脈浮數洪弦陽中之陽又有得脈沉緩陽中有隂慢驚風乃是隂癎得脈沉細遲弱隂中之隂又有得隂太隂中有陽所言逆證似順乃謂隂中有陽助陽不醒回陽不生其候偏虧雖則隂中有陽其陽非真脈使疑二不可攻理詳而知之察其可否而後已隂證反陽小兒傷寒惟察表裏而理之不以隂陽證候究竟者蓋無關前關後之脈所謂純陽之孩合而言之此説驚之隂候慢驚是也凡兒吐㵼疾作慢驚其候無反證良由急驚傳來已成隂癎藥用寒涼證入慢脾藥用燥熱其候反陽者反從陽也其脈愈盛其證愈逆故云反也隂陽俱壞實謂難治醫工不知所似但見其搐搦肆意退熱截風良久怯不引搐但只合眼即醒醒如睡證候有如此何藥理之隂盛強陽慢驚風候謂之隂盛及其欲絶之時虛痰上攻咽喉引其呼吸粗大其脈浮數其證強陽得之醫工將謂陽回以得其所宜與下痰藥用大迅痰涎隨藥而下兒命隨藥化衆言醫殺之非也謂不識胃絶而用之雖不下藥亦死矣虛極生熱疳疾有作斯證初發即證疳氣次第傳至疳極是謂虛極之後隂陽二氣不均上下氣不升降榮衛兩虛臟腑滑泄豈可攻療善醫疳者隨順藥餌以助之淡薄飲食以扶之榮衛始得均勻氣脈方得升降既而隂陽二氣已得調和臟腑已自充實肌膚已自肥壯醫已知工疳傳虛候名作疳極遂與補氣藥服之稍多及生大熱所謂虛極勿補熱盛煩渴疾作疳勞名曰丁奚皆由藥助虛極生熱而致之也冷極必寒癥積已作證候所傳自是孩童飲食不化氣滯中脘再食停氣復傷前積積之為病皆致其冷冷之既久脾胃虛怯既在隂陽相勝寒熱間發痞癖有加脈氣無定醫工不理隂陽令其勻平但作疾瘧治或投磁或投栁利下大速疾不去根為患反重難施利劑良由動利臟腑虛必復發作煩燥腹肚脹緊氣喘短促難以調治此等證候究心無忽保全是幸熱多作燥熱分內外身藉隂陽一氣受邪三焦致熱三焦者本質無狀隱伏得名所通五臟六腑相傳血脈皮毛溫平由實燥熱由虛靜則為一名動則分三所上焦喉管至于中脘下焦至于丹田以大拇指展中指作一掘自咽喉坎處分作三停則知上中下三焦所寓也溫極則熱熱盛則焦寄于其中矣大人患猶尚不可况小兒三焦隱伏熱多作熱寒涼之藥所投不堪畢竟當從何劑調理若不早療疾作無辜理虛致虛虛則作疾實亦是病按實理虛遣病去疾內知其冷熱外審其證候三實兩虛神不安居三虛兩實人有得失虛之為病其候則速實之為病其候則緩實未致害虛則作禍迅矣肝心脾肺腎子母相生肺肝脾腎心五臟相尅且如脾胃經虛嘔噦不食又心氣不足驚悸有所療子母俱虛小便閉澀利之可乎所以知其內者母虛靠子實子虛藉母榮又肺家有熱宜㵼之否大腸滑利宜溫之可醫工但究母虛理其子實若攻其子則母亦虛所謂母能令子實子能令母虛脾病㵼心理實致虛矣利表傷裏傷寒豆疹皆論表裏二義不同所受及是傷寒所傳從表入裏豆疹所發自裏出表作熱形證與傷寒頗似醫家不究輕重所受所干與服外麻葛根湯或過劑餌飲其表裏已解其汗不止出汗過多裏虛作渴且熱乘熱悉化疹豆自然回出緣逐其熱利其表遍出雖多疹亦不成豆亦不是比比小赤由其熱力且有限裏外不相續榮衛不加助于中道而廢漸加黑陷非食毒感風之咎自是助發大過失其自然之理至死莫知其由是謂表裏傷寒故也退熱作渴小兒發熱一證與大人同熱在三焦方渴肺驚不利虛煩方渴上盛下虛方渴水火不相濟方渴伏暑藴熱方渴津液燥竭方渴渴證本無但有其熱熱在于表攻動其裏裏自無熱受之以虛表熱傳裏反致其渴表裏俱虛引飲入脾頭靣手足受濕虛浮作腫醫工下之徒增其病宜與扶表救裏庶幾有命痰驚發風有痰者必有熱隨之有驚者必有風繼之利其驚風必有散其熱即痰不生此醫者流所得其宜調理證候截風定搐以除其惡也常見豪貴家才見孩童有熱不問元因便投驚藥日輒數粒月既積多雖則驚悸不作忪恐無妨其兒所服寒涼藥多脾胃虛弱不吐即㵼遂成慢風更與驚藥愈加其疾調理醫工當究之也風痰隱久風者肝受之肝稍不和則風所由縱痰者脾受之脾若不壯則痰所由盛痰之與風驚之與熱四證在馳在流行則經絡傳變它疾風痰由襲久而不化隱在肝脾所由飲食冷熱相干不散雖則療理愈而復作以至長成且風痰常在牙頰之間吐如無盡生發有因或作䩓鞈或喘息或硬牙關或腫頥頰臨于肺則咳嗽干乎心則恍惚善術醫士未能速下其痰恐風猖狂者逐其風又疑痰作梗須是風痰並化妙藥竒方蒢漸減瘥可也食不禁戒服藥無攻若療風痰可不致緩久則發疾亦深究之驚熱無時因驚而得熱其熱常發不擊乎心而屬乎血更加氣血榮衛母得備還驚熱時常發作或生疥癬或發瘡痍熱來神困心虛熱去唇焦口苦舌乾求飲恍惚忘飢兒孩受此艱辛藥餌如何救療人參羌活蝎尾當歸之類總不相關更尋妙餌可也恐悸喘息驚悸心屬喘息得同而言否愚曰非心主之若心所受其疾不作喘發是知肝藏魂肺藏魄魂魄不安恐悸傷乎肝肺受其驚而受其喘須求水飲肝受其驚發喘細細若張口大喘者肝肺俱不利鎮心安神調氣定喘未必盡善當于損益魂魄丸散㵼心補肝竟切效食噎咳逆兒孩睡息魂魄恬逰擊響髙聲傷乎其神睡中不穩乃心不寧乳幼飢渴飲食宜細掇物觸志傷乎其氣令肺作噎肝脾發噫其氣逆升降其志不分伸舒隂陽差忒胸襟鬱悶良久取氣發聲含飯靣黑啼哭聲焦輕則咳逆致燥盛則咽塞不通所受之後常作咳逆者良由食噎觸擊悶挫關竅宣通臟腑即宜升降榮衛乃利逆若不早治咳逆肝腸終其身致疾而難療矣令子無辜夫人所藉者隂陽而生所宜者氣血而長血氣不順則五臟以違其和隂陽不均則百脈亂其體流之於表裏相恭注之於經絡致急凡周晬乳兒等間捉拳又挖齦身體檢束頭目搖動此乃隂陽有虧榮衛失正即名胡孫禁十二種無辜疾之一也母情不識見之喜笑復作體態教令致其然也久而不已則其病漸至風痰之所攻驚熱之所作也當遍舒其氣調其脈均其隂陽適其灑淅受氣不促三才降氣數成方謂為人萬象論功道合始知得志胞胎既偹心定神全血脈未充骨萎髓薄筋力藉乎骨體智謀出乎心神為人恍惚者斯可知多忘者應由是傴僂者乃然侏儒者必告此不及受之重者身負五軟大過受之深者身負五硬由其脾肺心肝腎所屬者氣血脈筋骨所受者體舌臂項膝其或有疾于證候不及議者往往無辜無辜形體必定受氣不足謂知五硬五軟只許聞名稍有永醫難著後進執謂堪與療理者野老付之一笑飯多傷氣幼幼未降形處胞胎藉母氣血滋蔭由如養素已誕之後繼時吻之以乳乳者化其氣血敷養肌膚百脈流和三焦頥順身體漸舒骨力漸壯三周所庇一生為幸其或母因産得疾血竭氣耗乳不成汁當召妳子看顧貧乏之家食不繼口奚能講此其乳少其食多不益兒體其有不産之婦抱幼繼宗終夜號啼惟飼飯食初傷其氣次傷其神重傷其命萎羸聲靸躁皮皺項軟足垂唇焦骨劣再過半載時光則兒氣散神敗凡人生子吮乳為正獨以榖食扶持十中未保一二抑服圓散強為勉之急吮乳蔭始得死中半活矣臍腫受熱初生未及蔭乳洗能便用斷臍帶留一掘綿褁三重受氣根全者其臍自深成胎數闕者臍自突臍者受質之根也為人之本也形體之基也元命之夀也迭月之前一臘之後其兒臍紅髙腫不作水濕亦無風候但將胸堂仰起厄厄作聲闔家無見責之老嫗有傷臍帶致之非也召愚一觀察知心氣受之胎熱與利丁火少頃不展胸堂厄聲遂止越宿視之臍根復本醫工與傳及洗總施謬妄故書于褚果其宜哉謾峯頥以誚之云耳治中受病諸證鬼胎婦人産育有患病胎者痛鄙婦人納鬼之氣而受實非也鬼胎者乃父精不足母氣衰羸滋育涵泳之不及護愛安存之失調方及七八箇月已降生又有過及十月而生初生胎氣血虛羸降誕艱難所言鬼者即胎氣怯弱榮衛不充致子萎稍語猶如果子結實之時有所蔭藉不到灌溉失注為物褊小其形猥襄無有可援如此之謂胎氣怯萎常與丸散扶挾乳哺勻調氣血充蔭腸胃固壯筋骨即保其盡善蓋由受氣不足稟賦不全忽爾橫殤非可惜邪魃病小兒有患病魃者非五臟傳變亦非六腑所主也緣兒生後方及周晬母復有孕血氣所蔭分之兩端是故胚胎漸傷乳汁成毒虛邪相攻兒吻致疾斂率其氣鬱傷其神魄令兒疳虛尫羸枯悴煩躁朝昏嘔噦日夜啼哭不可得療但速斷其乳溫平胃氣和順血脈自然而愈其有萎怯致痰乃成無辜證巢氏病源云小兒被鬾病者婦人懷妊有鬼神導其腹中蓋嫉妬所致或服邪藥令小兒鬾病也妊娠婦人不必悉熊致鬾人時有此耳鬾之為疾頻下痢寒熱往來毛髮􅀢鬡情思不悅是其證也千金又論鬾曰小兒鬼也凡婦人先有小兒未能行母繼有胎妊鬼未節乳漸覺羸瘦骨立毛髮稀黃不長時作壯熱大便不勻乃鬼之症也胎氣初生牙兒三朝之後滿月之前所受諸證作疾輕重不同者蓋由胎氣稟賦有強弱其母飲食恣令飢飽起止無忌坐卧不擇令兒得疾不寒即熱不虛即怯熱乃作壅寒乃作泄虛即作驚怯即作結寒則溫之熱則涼之虛則壯榮怯則益衛驚用安神結用利詳審用之不必過劑胎病牙兒胎病謂月數將滿母失護愛或勞動氣血相干或坐卧飢飽相役或冷熱飯食相制或恐怖血脈相亂胎氣有傷兒形無補或因動土興工或由榮葺房卧或移安居或更薦席雖不犯凶神惡煞終干礙子體兒身有因如此得疾者乃成終身疾者斷不可醫初生幼幼又被干邪即時和順調理胎病作熱兒在胎中母多驚悸或因食熱毒之物生育之後兒多虛痰氣急短滿眼目眵淚神困呵欠不發伸舒厄厄作聲狀小便不利或通利即有血水盛則手常拳緊腳常搐縮眼常斜視身常掣跳皆因胎中受熱宜速與大連翹飲子解散諸熱次與消風散數服無恙胎氣藴熱兒在胎中母多惱怒鬱悶之情不散又因胎氣燥濕兒生艱難母生驚悸是致乳汁不可兒吻成毒故作熱令兒食即嘔吐眠不定席神不安穩聞響即掣若不解藴毒熱相干久作無辜成疾害生先宜順氣次服四順若不安愈蔥根必效胎病風熱兒在胎中母常喜食動風之物熱毒流傳致兒之疾隱在經絡則手足拳攣注入血脈則肌體枯稿其兒眼常喜竄血不蔭心神不守舍怯人怕物視作定目若不早療恍恍惚惚形體雖長情性乖拙為人多荒朝記夕忘雖久受病不如無生蓋父母但知惜其嬌姿安養無用之兒如此者凡胎氣服藥須用詳細若以常方難治胎病驚熱兒在胎中母因驚悸驚氣入胎兒當受之生育之後其兒精神不爽顔色虛白初則溫溫有熱其後頰赤饒驚物動則恐響即悸若不綳抱安床取次難為調適既有胎驚將傳胎風之候産母謹謹忌食一切熱毒之物若作尋常畢竟難治是蓋血脈柔弱臟腑虛怯不堪重劑何可攻擊是使智者怯懼若輕受熱已有散即於項上生癤其大如拳名曰驚癧須當破之而後合之勿傅毒藥恐傷肌體不惟傷壞深恐為禍胎病風痰兒在胎中母喜食熱毒之物熱即生風脾肺不利遂有風痰雖不能損肌傷體其痰與風相襲痰多風不散熱盛痰復生風痰能作熱更加暖被紅爐母食炙煿淹藏動風之物即時害生藥非不驗乳汁之咎也如兒或患風痰不必下截風化痰藥但清心肺涼膈利順三焦則自然安愈亦不可太涼恐寒傷臟腑宜以消風散吞下白丸子至涼冷小作丸胎病結熱兒在胎中母失調理恣縱飲食不加將護藴熱頗久及至生育熱氣隱蔽傳入於裏遂作悶結由熱極得之大便不通熱衝心腹脹臍突撮口努力停鬱急以三黃丸或四順七寶以通為度不必過劑切不可下積丸子藥不惟無益恐反為害胎病寒邪兒在胎中母因感受寒邪熱氣煩蒸傳入胎臟兒當受之及至生育令兒關竅不通精神昏濁作熱加蒸啼聲不響號呌駭人未知之者將謂驚風妄動臟腑或妄鎮心良由所受寒邪初只在表久則傳裏邪氣亂真血脈皮毛皆不得其便腠理所拘邪不得解變蒸有違氣血致傷煩懆益增無能自暢但與小柴胡湯服稍輕次以人參羌活散然胎中所受未分表裏既生蔭庇當議和解為良胎病榮熱兒在胎中母喜啖薑瓜古人有云修竈缺唇食薑餘指蓋薑性至熱又是燎藏攻及血脈傳入於經則令兒遍體生蛆瘡延毒熱瘡丹瘡之類經年發作或於頭額生核重則大發癰癤潰則爛壞皮膚十死一生何堪忍見初生幼幼毒氣加盛肌肉柔弱參术托裏互相扶持常與清心平調血脈母慎其口父抱令暖醫工順理與扶其危胎病衛熱兒在胎中母傷和氣飢飽勞役神疲力倦否則憂愁思慮役乎其中動乎其氣攻以隂邪干亂心魂流入胎臟兒乃受之既生之後兒常昏困腹急氣粗重則喘急睡卧不穩狂啼煩哭肌肉不滋遍生瘡痍身熱早晚精神少具宜平調臟腑臟腑既正熱自散止胎病臟寒兒在胎中不理其身母喜食諸生冷物過度冷盛既寒腸鳴泄利時時有作生育之後兒腹青脈膨脹虛緊乃是虛氣入腹厄厄作聲日夜不禁雖則漸長終是臟腑隂陽二氣受不勻調若不溫平分氣長成痞結陽結易治冷結難醫誠宜母服藥庶乳溫令子調和胎病潮熱兒在胎中母曽發作子瘧或是因患瘴氣母或飲酒無厭或是胃風傷暑經絡榮衛為熱所傷母雖分娩以脫其難兒襲其氣隂陽不分初生嫩弱血氣不和作熱潮來先寒關緊身體作顫庸工未識其理即以艾炷灸之未免有傷經絡但與調中均其隂陽便可漸安急驚風候醫云陽癎也手足搐搦涎潮大熱醫家下之往往利以輕粉或水銀巴豆此等毒藥雖已㽔省精神猶尚昏沉未快乳食者或有餘熱其候欲得安痊平和只可用平穩藥調胃氣不可便與燥熱藥若與服之其候復作矣小兒驚風之後胃虛不食助胃生氣以截風藥移狂生胃散或觀音散中加用全蝎天麻殭蠶白附防風羌活之類生薑棗子同煎自然胃壯㵼止諸風不作雖則驚熱及搐搦皆去其精神未爽不可便謂無事若用補藥助虛乾薑豆䓻硫黃附子之類則熱復來其候又發凡治急驚之候正謂醫療豈可遽云調理用藥乃在一時之久若少寬緩症候轉加深重醫者既知當下即可量其輕重如病五六分只下三四分許隨通且利熱去痰消則病徐徐減差不揣度一槩并湯下之太過傷害臟腑痰轉隂候乃作驚風候豈可臨時生胃回陽慢驚風候醫云隂癎也良由急驚用寒涼之藥太過轉加深重傳作慢驚或因吐痢不止而成慢驚或因澡浴感風不解而作慢驚或因風食二癎不治而變成慢驚或因咳嗽下痰轉虛而成慢驚因由甚衆槩而舉之病家怕驚不怕㵼良醫怕㵼不怕驚其㵼不止驚風愈盛若與治驚更用寒涼之藥且㵼轉多病加進重矣小兒脾胃虛怯方作吐㵼其證有五有熱吐冷吐淹虛吐痰吐食所言熱食吐者謂母飲酒吃肥炙􅏼藏或胃風傷暑致熱兒吻乳入胃遂成熱吐冷吐者謂兒胃冷加以宿冷之物與食即吐虛吐者其兒肌熱神困疳積未消胃堂久虛即吐痰吐者其兒胃氣本虛復感寒邪生痰作熱留滯胸膈故吐食吐者其兒胃弱飲食不節強食傷脾作熱神困吐後即逆病家但知其吐不明所以且吐兼㵼作其名曰霍亂其吐後又推輕重有五初則乳自流出謂之哯哯之不已即謂之吐吐之不已即作嘔嘔之不已即作噦自嘔逆噦皆冇出聲動氣嘔者口開而作逆者心胸上下氣逆鬱築噦者無物可出即膈虛胃寒引噦噦作聲此等候惡須臾證變即慢脾風熱者吐先去風痰冷吐虛吐與生胃氣痰吐即與下之次與正氣食吐宜與禢氣豈可一槩理之吐㵼不止脾虛風生眼開慢驚眼合慢脾治之不當更下驚藥旋腫而死豈可得而塌療兒分長幼病察虛實有吐㵼三五日發風者有一日半日而發者大抵女孩以吐為急男以㵼為速若虛暴吐才作便得之惟有疳㵼不成風候久則患無辜證終于虛乏驚藥及寒涼之藥切不可用亦不可用大熱藥其候乃屬隂證小兒熱證古分十種為總例有驚熱疳熱風熱潮熱傷寒熱瘧熱積熱丹熱瘡疹熱餘毒熱十種熱證病各不同已有觸類而作潮熱者即痞癖熱也類近積熱證先腹肚熱腳冷者是傷寒熱與瘡疹熱亦相類且傷寒有三種皆從表發入裏瘡疹隨五臟所受從裏入表故不同根風熱與驚熱亦相近疳熱與餘毒熱類疳有五證瘧有五候皆由脾家隂陽不順若驚熱盛即風熱作丹毒熱有類種皆五臟熱毒所作自上發下曰毒自下發上曰丹毒各隨輕重又有一種名曰龍帶橫腰過肚上或至胸前相交者重有如火燔其候亦同丹治病候餘毒熱諸證皆有之適輕重類諸證而調解不可越前病用藥如傷寒後有餘毒熱則於傷寒調理下而解餘皆倣之大抵驚熱涼之風熱化之疳熱補之潮熱散之傷寒熱解之瘧熱分之積熱利之丹熱消之瘡疹熱甚表之諸證餘熱皆和凡證不可便下蓋小兒得病皆由身體柔弱中來雖有外感冝先和脾調胃令其充實後以藥下之方保無虞若積症已作可先下而後與調胃藥服之然下藥一應即止不可太過太過則傷脾胃反致病重也惟痞癖證定宜先去寒熱寒熱已去方可用下總以通為度下之太過反生重熱雖有重熱即不宜用涼藥宜以調理胃氣藥與之尤宜深究小兒傷寒正受夾驚夾食正受傷寒所由冷邪感于胃傷于腠理輕則傷風重則壯熱頭疼鼻塞流涕斯乃正傷寒候又有傷風傷暑傷冷傷濕皆能作熱困乏但不咳嗽又有因驚之時而傷寒故云夾驚又有因食之時而感寒氣者故下曰夾食大抵傷寒或有它證以積之類切不可妄者下之太早表裏俱虛難以調理謂之壞證大人壞證由尚可藥小兒壞證救療無門凡傷寒有驚候亦不可下藥雖夾驚又有不可用驚藥幼幼傷寒只可解表雖曰用表不可令兒汗出如王氏曰杜薄苛散和劑方四人參羌活散之類若熱在裏讝語煩躁于證當下只用散末藥七寶洗心散四順飲犀角飲之類不可用丸子或以取積藥下之其熱不去反成無辜夾食者于理用下宜以紫霜量虛實兒用須問先傷寒後夾食後傷寒然傷寒夾食乃在于食時之間惟母覺知其先後多是不覺若知之以後受者先調理之既不明其先後即解表可以扶裏此法為尤善也且下與表二不可並行且如三日前在表三日後在裏斯乃犬槩約而言之恐後人傳之不當反為其後凡傷寒在表即解在裏則下不可以日限為拘其或有在表裏之間亦宜和解如又不愈小柴胡湯治之又不愈候傳裏下為良大者讝語小即煩啼切不可意急取愈宜在用心明究表裏小兒積證積證最為要緊病家將作尋常醫者不急治之反至傳變方覺困重東漢王氏不言疳與㵼及痢即還證而已所以治未病之病凡小兒自幼及長不患驚風癎痙癲痙有之矣未聞無患積證者五臟之所積名曰積六腑之所聚名曰聚且小兒只理五臟受病故不有大聚證者六腑屬陽雖有疾不治而自愈且骨屬腑氣生于漸乃脾胃主有疾當治之臟屬隂治之尤難調治四季有積欲調理之皆可用藥但當究其虛實然後利之既有積氣不能全實説量其輕重故古人有拔積療積消積化積無積之小兒有患驚風痰熱四證如何用藥小兒有熱熱盛生痰生驚驚盛發搐又盛牙關緊急及盛及眼上竄痰涎擁牙關緊風熱極閉經絡即作搐搧涎擁胃口悶亂不省才入中脘手足拳攣關竅不通百脈凝滯有退熱而愈者有治驚而愈者有袪風而愈者有化痰通關而愈者皆是依證用藥不可不究其所以凡病在熱不可妄治痰病在驚不可妄治風病在痰不可便治驚病在風不可治搐凡治小兒病在驚由痰熱痰只可退熱化痰其驚自止病在風風由驚作只可利驚化痰其風自散病在痰涎急須退熱化痰若有搐須用截風散驚若意急雖治驚痰不化熱何以退驚如何自止化其痰熱若不退風亦不散痰如何去是知不治之治所以治之小兒泄㵼除疳㵼為虛熱餘㵼皆臟腑虛寒怯弱得之小兒臟寒腑冷大腸不禁總謂之㵼分别輕重究竟緩速者有溏泄有滑有利有洞五者不同豈可一槩而理溏者糟粕不聚由其尚濃似㵼非㵼泄者無時而作或出不知利者直射濺溜氣從中脫滑者穀食直過腸胃不化洞者頃然下之如桶散潰餘更不留即知其兒臟寒腑冷㵼之作疾其來緩速輕重可知凡兒㵼糞出青色者蓋脾受肝經所制肝屬乙木能尅土所勝之氣故見本質由其臟之虛寒非謂驚也又㵼初黃良久變青色乃臟之微又㵼藥物直過尤寒滑凡虛滑三五次即困乏若不急與溫其臟調其胃平順三焦和正榮衛不爾即慢驚證候傳變傳如此之急欲以止㵼藥次苐理之往往不及惟務溫其臟腑臟腑既溫寒何能留于腸胃之間或以熱藥頓止則熱及為他疾須先投澀腸藥然後生胃正氣與服切不可意急過劑投之熱藥也稍或臟腑至虛孩童困乏四肢軟冷者是胃逆證當用黑附子白术乾薑量輕重而用凡投熱藥㵼止則痢作無疑小兒痢疾醫云五疳八痢究其理種數多端輕重不一痢者利也痢之為痢無積不成反至積化成痢且厚脾胃亦虛即不可便下善治痢者生其胃溫其脾其腸和其氣無不愈也若成痢疾故不可下下之反虛作渴浮腫痞滿脹急不食亦未可便補補則傷熱能令脫肛切與禁却一切毒食之物頻與生胃謂赤或氣或白即是冷熱不調或受暑知溫即與分隂陽氣利水榖道若裏急即與厚腸胃肚痛即與和順氣溫臟或化白者乃積冷毒加之即挨其毒却與溫其脾胃其痢自止凡痢疾能飲食可治不能飲食疾名噤口主不食而死又有毒氣侵胃口亦不飲食或急痢疾因食毒物下攻腸頭解血頞汗肛脫㵼下惡物可畏腹肚㽱痛裏急後重名曰滑腸此三種痢疾最為惡疾乃是十二種中皆能傳受而作此疾凡言小兒美飲食者飲謂飲乳食謂食飯若病中能飲水漿喜食果子魚肉之類者亦助其虛不能令臟腑充實須是白粽子爛煮飲可矣若以蔥粿䊦粘膩不堪脾胃之物尤其增困幼者吻乳尅化漸安五臟平和六腑調貼然後隂陽自均氣脈自壯丸散湯劑不必抑之或有餘毒宜以順調緩助不可攻之又有時氣作痢薰習相染而或由天氣晴雨不常隂濕冷熱相干腸胃糟粕不聚遂成其疾腸肚疞痛裏急後重他藥莫治者宜服木香黃連地榆川當歸白芍藥赤肉豆蔲為末蒸烏梅肉丸棗子湯下三五十丸如麻子大加減神良小兒疳疾證數端其後不同發作不常治療不一方論不等輕重斟酌隨宜設方必有可理者疳者甘也疳因脾家有積虛而致其積不可復食粘膩甘甜生冷炙􅏼之物故名曰疳初作名疳氣皆飲食不莭生冷相投積傷久滯不化而得之久則疳氣傳于五臟傳足名疳極候腹大候雖食不生肌肉作渴煩燥名虛候時發潮熱盜汗常有名疳勞候如手足無肉者多名丁奚候自丁奚翻食吐蟲虛熱來去名曰哺露十嵗以下曰疳以上曰疳勞治勞之理悉不用疳藥蓋疾作傳足非常治疳之法理其氣虛助其血弱調令脈壯消其蟲子散去疳熱和順三焦無由用急力攻治不可勉強投藥只可對候而設不得過劑若冷藥易動臟腑躁藥易損三焦審察端的丸散隨其輕重無所失矣小兒諸證悉皆著載方藥調理發度惟有咳嗽一證究莫能盡月內牙兒難醫百日嬰孩亦難調理所言牙兒及嬰孩咳嗽難治者蓋為初生血氣微寒弱五臟未充身體未周應變應蒸未周之兒所感邪攻及腠理表裏相干邪正相勝隂陽未和不可強主攻治妄主吐妄下妄汗補皆令兒疾轉盛不惟無益甚有害傷幼幼咳嗽乳母之過丸散狼虎醫人之罪豈特牙兒及孩童難為調理小兒有咳嗽未許一二服藥便見安樂雖傷寒傷風證候已歸半復且咳嗽尚作大抵究竟小兒咳嗽先看有無熱與痰有熱在表無熱傳過是未傳痰稠熱盛痰壅即吐宜服補肺散人參伏苓麻黃白术杏仁甘草阿膠訶子地骨皮桑白皮桔梗有痰加半夏風熱加防風天麻服之自然痰化熱散咳嗽漸愈未可直用粗澀藥白礬南星石膏雄黃砒粉之類宜先滋潤脾肺次用王氏金華散少少時時與服或以白丸子加雄朱腦子隨大小作丸凡兒患嗽須究表裏未可以動手便攻若用金石藥直入胃脘乃成提脾風候手足勿曲又何所益巴豆輕粉砒霜藥下之腸胃不禁須臾成風亦何所益只用溫平與表順助其氣滋潤腑經和順三焦其痰漸化其熱自退不必攻醫所謂理嗽宜且補氣化痰即生胃氣胃開氣壯即嗽漸減胃正即痰不生肺滋即嗽不有然小兒氣弱其嗽作熱與大人一同而用藥調理實不同又有時氣咳嗽謂天時冷熱不同幼幼虛怯受患者表其嗽曰夜不輟或吐或喘痰熱壅盛至重者利之即愈謂用大黃朴消枳實陳皮半夏人參厚朴柴胡心神煩悶胸膈不快方冝與服無熱與痰亦可不下審小兒得病之源大喜後乳食多變驚癎喜屬心大喜後乳食則傷心錢氏云心主驚驚是癎也素問云暴大飲後迎風多成暴厥大飽則食氣上衝心肺之間未散卒被風冷所傷故暴厥不醒如中風之狀修真祕訣云熱食汗出蕩風發痙頭疼多腫大驚後乳食嘔吐心痛大驚後乳食則手少隂經受邪多成心痛抱撲子云夾驚便食多成心痛心主驚故也大驚飲食氣節不通或吐逆翻胃大驚後飲水久成不語心主驚驚後飲水則傷心心氣通于舌舌本無力故不語也亦能成水痢癖寶鑑云小兒水痢癖者因飲水兒被驚則成也當風乳食兒成吐嗽腹膨倉公云小兒飲乳迎風風冷入肺則令咳嗽又經云形寒飲冷則傷肺肺傷則咳嗽肺主氣氣傷則腹脹當風飲水成雀目青盲素問云風氣通於肺當風飲水則水停於肝肝氣通於目故成青盲雀目也寶鑑云小兒飲水久停肝翳障全生辨物難夜裏不明為雀目青盲晝夕一般般夜露下乳兒多成嘔吐夜露下乳兒隂氣入咽冷乳不散多生嘔逆修真祕訣云夜露食其上有邪氣夜露下飲水多成泄㵼素問云濕勝在內攻於脾胃脾胃受濕則水穀不分水榖不和故大腸傳道而乃注㵼也正食便乳成疳黃口臭王氏云正食便乳令兒口臭牙中血出通真子云乳食並食令兒面