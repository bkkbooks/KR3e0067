body:
  text: 普濟方卷三百二十六明周王朱橚撰婦人諸疾門脚氣附論夫婦人脚氣與丈夫不同男子則腎臟虛弱為風濕所乘女子以胞絡氣虛為毒所摶是以胞絡屬於腎也腎主於腰脚又肝脾腎三臟經絡起於十足指若臟腑虚損則風邪先客於脚從上而下動於氣故名脚氣也此皆由體虛或當風取凉或久坐卑濕或産後勞損或恚怒傷肝心氣滯致令月候不通因其虛傷風毒搏於肌骨則令皮膚不仁筋骨抽痛五緩不遂六急拘攣或即冷痛或即腫滿兩脚痺弱或舉體轉筋目眩心煩見食即吐精神昏憒肢筋煩疼小便赤黄大便秘澁並皆其證也其婦人脚氣治之與丈夫不同者以其氣血不調懐胎難産崩傷之異是以褚澄療寡婦師尼與妻妾殊别即其義也凡婦人有脚氣疾者必無生育凡頭痛身熱肢節疼大便秘或嘔逆而脚屈弱者脚氣也輕者可與香蘇散加木𤓰㯽榔生薑煎服然後隨證治之要知有脚氣之人先從脚起或先緩弱疼痺或行起忽倒或兩脛腫滿或脚膝枯細或心中忪悸或小腹不仁皮頑不知有無也或舉體轉筋或見食嘔逆惡聞食氣或胸滿氣急或遍體痠疼皆脚氣候黄帝所謂緩風濕痺是也頑若名緩風疼痛為濕痺寒中三陽所患必冷小續命湯主之煎成入生薑自然汁最甚快暑中三隂所患必熱小續命湯去附子減桂一半主之大煩躁者紫雪最良若無紫雪以百合薄荷煎冷水調服極妙大便秘者脾約圓麻仁圓三和散主之仍針灸為佳服補藥與湯淋洗皆醫之大禁也又云若産後熱悶氣上轉為脚氣者蓋由産卧血虛生熱復因春夏取凉過多地之蒸濕因足履之所以著為脚氣其狀熱悶掣瘲驚悸心煩嘔吐氣上皆其候也可服小續命湯兩三劑必愈若誤以逐敗血藥攻之則血去而疾益増矣陳無擇謂脚氣固是常病未聞産後能轉為者往往讀千金見産婦多有此疾之語便出是證設是熱悶氣上如何便服小續命湯此藥本主少陽經中風非均治諸經脚氣要依脚氣方論隂陽經絡調之方紫蘇散治婦人風毒脚氣腹内壅塞痰惡不思飲食脚腫虛腫並皆治之紫蘇莖葉木通桑白皮茴香根各一兩枳殻二兩川羌活獨活荆芥穗木𤓰青皮各半兩大腹子十個甘草半兩右㕮咀每服三錢水一盞薑三片葱白一莖煎至七分去滓温服佳薏苡仁散治婦人脚氣緩弱及頑痺腫滿心下急大便澁薏苡仁防風猪苓川芎防己㯽榔郁李仁大麻仁各一兩桑白皮三兩枳實三分甘草半兩羚羊角屑一兩右為散每服三錢水一盞煎至七分去滓放溫服牛膝散治婦人脚氣浮腫心神煩悶月信不通川牛膝羚羊角㯽榔大黄芒硝各一兩防己桂心牡丹皮赤芍藥甘草各三兩桃仁五粒製右為粗末每服三大錢水一盞煎至七分去滓溫服利下惡物為度亦要相其強弱用之一方有當歸三分防風散治婦人脚氣腫滿疼痛筋脉拘急防風一兩去蘆頭五加皮二兩薏苡仁二兩羌活一兩附子一兩炮去皮臍酸棗仁一兩微炒枳實三分麩炒微黄甘草半兩炙微赤剉芎藭一兩川大黄三兩剉碎微炒當歸一兩剉微炒羚羊角屑一兩右為散每服四錢水一中盞煎至七分去滓食前温服大腹皮散一名大腹子散治婦人風毒脚氣肢節煩疼心神壅悶大腹皮一作大腹子紫蘇木通桑白皮羌活荆芥赤芍藥青皮木𤓰獨活各一兩枳殻二兩右㕮咀每服四錢水一盞薑五片葱白七寸煎至七分去滓空心溫服赤茯苓散治婦人脚氣腫滿腹内妨悶月水不通四肢疼痛服之赤茯苓一兩木通一兩紫蘇莖葉一兩牛膝一兩去苗木香半兩防葵半兩㯽榔一兩桂心半兩鼈甲一兩塗醋炙令黄去裙赤芍藥半兩川大黄二兩剉碎微炒右為散每服四錢以水一中盞生薑半分煎至六分去滓食前溫服惟以利為效桑白皮散出聖惠方治婦人脚氣盛發兩脚浮腫小便赤澁腹脇脹滿氣滿坐卧不得並宜治之桑白皮郁李仁各一兩木香防己大腹皮各半兩紫蘇子木通㯽榔青皮各三分赤茯苓二兩右㕮咀每服三錢水一盞薑三片煎至七分去滓溫服羚羊角圓出聖惠方治婦人脚氣上衝喘急稍縱兩脚不仁小腹頑痺頭面浮腫時復心悶便利常澁羚羊角屑一兩漢防己半兩薏苡仁一兩牛膝一兩去苗芎藭一兩川大黄一兩剉碎微炒獨活半兩大麻仁一兩木香半兩郁李仁一兩湯浸去皮微炒枳實一兩麩炒微黄右為末煉蜜和擣五七百杵丸如梧桐子大每服三十丸溫酒下食前木香散出聖惠方治婦人脚氣卒發衝心悶亂木香半兩郁李仁赤芍藥大腹皮紫雪各一兩桑白皮桂心㯽榔茯苓各三分右㕮咀每服三錢水一盞薑三片煎至七分去滓溫服紅藍花散出聖惠方治婦人脚氣心神煩亂紅藍花一兩柴胡一兩半去苗羚羊角屑赤芍藥各一兩桑根白皮二兩剉㯽榔紅雪各二兩甘草三分炙微赤剉紫蘇莖葉一兩右為散每服四錢水一中盞入生薑半分煎至六分去滓溫服不計時候牛膝散出聖惠方治婦人脚氣緩弱無力兼軟風牛膝一兩去苗附子炮裂去皮臍仙靈脾萆薢羌活防風去蘆頭大腹皮剉各一兩桑根白皮二兩剉郁李仁一兩湯浸去皮㣲炒右為末每服四錢水一中盞入黒豆五十粒生薑半分煎至六分去滓每於食前溫服木𤓰丸出聖惠方治婦人脚氣衝心悶亂腹脇脹滿不能下食木𤓰二枚蒸熟去皮子木香一兩㯽榔二兩草荳蔲一兩去皮青橘皮湯浸去白穰焙桂心各三分當歸剉微炒郁李仁湯浸去皮微炒各半兩桃仁一兩湯浸去皮尖雙仁麩炒微黄右為末煉研木瓜和丸如梧桐子大溫酒下三十丸不計時候半夏散出聖惠方治女人脚氣發動心腹脹滿飲食下嘔下逆不止半夏陳皮人參大腹皮桂心各三分㯽榔一兩赤茯苓紫蘇各一兩半右㕮咀每服四錢水一盞半薑三片煎至七分去滓溫服一方有木通犀角散出聖惠方治女人脚氣怱發衝心悶亂四肢煩疼有熱者犀屑木香各半兩紫蘇莖葉白茯苓㯽榔各一兩赤芍藥紅花各三分紅雪一兩半右㕮咀每服四錢水一盞煎至七分去滓溫服坐挐散出聖惠方治婦人脚氣厥冷血氣不調坐挐一兩狼毒一兩旋酥炙令酒旋㸃取盡沈香紫蘇子羌活蘿蔔子微炒杉木節各三分剉用乳香炒桂心半兩右為散每服用水煎木𤓰紫蘇莖葉湯調下二錢每於食前服蒼朮丸出永類鈐方治自諸證退後只有脚攣痛不能行以蒼朮丸治之効此藥大治乾濕脚氣筋脈拘攣疼痛不能行履兼補下部乳香沒藥各二錢另研川牛膝青鹽各半兩研熟艾四錢川烏三錢全蝎一錢炒右除研藥為細末入研藥令停以木𤓰一個大者切一頭留作葢去穰入上件藥於木𤓰内將葢簽定安木𤓰於黒豆中蒸令極爛取出去皮連藥研成膏却入生蒼朮末拌勻得所丸如梧桐子大每服五十丸空心用木𤓰湯下或溫鹽酒亦得一日三服忌血與蒜䓤等物如大便祕者可與七宣丸神功丸七聖㯽榔丸三和散服効昔有婦人病發熱自汗心煩身體骨立足痛拘攣不能屈伸飲食不進雖老醫亦不能療因治之見六脉弱似勞實非勞也似脚氣非止脚氣但當調脾生血其熱必退然後見功足則可望安遍尋諸方皆無對証之藥遂處四白散子與服不半劑熱退能食又處蒼朮丸繼之筋脈伸足能行而愈治婦人脚氣衝心悶亂不識人宜服此藥出聖惠方紫蘇莖葉松節各二兩呉茱萸半兩㯽榔乾木𤓰各一兩陳皮三分右㕮咀每服四錢水一盞煎至一半入童子小便二合再煎三沸溫服紅雪散出聖惠方治女人脚氣臟腑氣壅胸膈滿悶脚膝煩痛紅雪一兩半赤芍藥半兩茜根半兩剉桂心一兩生乾地黄一兩紅藍花三分右為散每服四錢以水一中盞煎至六分去滓食前溫服治婦人脚氣卒發衝心煩悶氣急大便苦難小便赤澁心神熱燥宜服出聖恵方紅藍花三分生黒豆皮二合川大黄三分剉碎微炒右以水一盞半煎至一盞去滓食前分溫三服治脚赤腫出聖惠方荆芥石膏地龍炒薄荷右剉散生薑三片蜜少許煎服腰脚疼痛附論夫腎主於腰脚女人腎臟繫於胞絡若勞傷腎氣虛弱而風冷客於胞絡邪氣與真氣交爭故令腰脚疼痛也凡婦人腰膝痛兩脚麻木惡寒喜煖内經曰風寒濕合而為痺先可服除濕丹七八十丸量虛實以意加減次以禹功散投之㵼十餘行清冷積水青黄涎沫為驗復用長流水煎生薑棗同五苓散服之風濕散而氣血自和也方附子丸出聖惠方治婦人血風流注腰脚骨節痠疼不可忍附子三分炮裂去皮臍牛膝一兩去苗海桐皮剉桂心延胡索安息香各半兩天麻羚羊角屑芎藭當歸各三分白芷半兩木香半兩乾蝎一分㣲炒酸棗仁三分微炒羌活三分防風三分去蘆頭漏蘆一兩右為末煉蜜和擣三五百杵丸如梧桐子大每於食前以暖酒下三十丸虎骨丸出聖惠方治婦人血風流注腰脚骨節疼痛不可忍虎脛骨塗酥炙令黄㯽榔敗龜塗酥炙令黄各一兩防風去蘆頭附子炮裂去皮臍赤芍藥麒麟竭各半兩當歸川大黄剉碎微炒三分桂心沒藥地龍炒令微黄各半兩牛膝一兩去苗木香海桐皮剉桃仁湯浸去皮尖雙仁麩炒微黄各三分右為末煉蜜和擣三五百杵丸如梧桐子大每於食前溫酒下二十丸酸棗仁散出聖惠方治婦人血氣風虛腰脚疼痛頭目昏悶食少無力者服之酸棗仁炒川牛膝當歸各三分羌活川芎桂心防風木香海桐皮杜仲續斷粉草附子萆薢各二分右㕮咀每服四錢水一盞半薑三片煎至七分去滓溫服骨碎補散出聖惠方治婦人血風氣攻腰脚疼痛腹脇拘急肢節不利宜服骨碎補炒萆薢川牛膝去苗桃仁湯浸去皮尖麩炒黄附子炮製去皮臍川芎各三分枳殻半兩一作枳實右為粗末三錢水大盞薑三片棗一個煎至七分去滓食前熱服一方無棗仙靈脾散出聖惠方治婦人血氣攻注腰脚疼痛仙靈脾一兩羌活海桐皮牛膝去苗當歸芎藭骨碎補去毛延胡索桂心木香各三分桃仁一兩湯浸去皮尖雙仁麩炒微黄菴䕡子枳殻各三分㯽榔一兩蛜􅖉半兩微炒麝香一分細研入右為細散每服食前以豆淋酒調下一錢藁本散出聖惠方治婦人血風流注腰脚疼痛不可忍宜服藁本一兩半狗脊一兩去毛沒藥天麻麒麟竭蟬殻微炒骨碎補桂心各一兩虎脛骨敗龜穿山甲已上各二兩各醋塗炙令黄焦麝香半兩研入右為細散每服少生薑黒豆淋酒下二錢空心服萆薢丸出聖惠方治婦人血風腰脚骨節痠疼筋脈拘急行履艱難兩脇抽痛萆薢剉牛膝去苗當歸石斛去根剉附子炮裂去皮臍各一兩虎脛骨一兩半塗酥炙令黄防風去蘆頭丹參赤芍藥桂心酸棗仁杜仲去粗皮炙黄剉各三分右為末煉蜜和擣三二百杵丸如梧桐子大每日空心及晚食前以温酒下三十丸琥珀散出聖惠方治婦人血風攻注腰脚疼痛經絡滯澁四肢煩疼宜服之琥珀牛膝去苗當歸凌霄花赤芍藥沒藥各一兩地龍半兩微炒水蛭一兩炒令黄焦麝香一分細研入桃仁一兩半湯浸去皮尖雙仁麩炒微黄右為細散每服食前以温酒調下二錢敗龜散出聖惠方治婦人風毒流注腰脚疼痛行立艱難敗龜二兩塗醋酥炙令黄白殭蚕一兩微炒沒藥半兩薏苡仁當歸剉微炒杜仲去粗皮炙微黄剉各一兩桂心乳香地龍微炒各三分去土用虎脛骨二兩塗酥炙令黄右為細散每於食前以暖薄荷酒調下二錢牛膝散出聖惠方治婦人腰脚風冷疼痛久不瘥牛膝去苗敗龜塗醋酥炙令黄各二兩虎脛骨塗酥炙令黄沒藥羌活當歸桂心各一兩右為末煉蜜和擣三二百杵丸如梧桐子大每於食前温酒下三十丸海桐皮丸出聖惠方治婦人腰脚風冷疼痛行立無力宜服海桐皮剉牛膝去苗熟乾地黄杜仲去粗皮炙微黄剉各一兩桂心石斛去根剉各三兩右搗羅煉蜜丸如梧桐子大每於空心及晩食前以温酒下三十丸附子散出聖惠方治女人腰脚積年疼痛不瘥附子炮裂去皮臍桂心各二兩沒藥葳靈仙牛膝去苗乾漆搗碎炒令烟出各一兩右為細散於食前温酒下二錢葳靈仙散出聖惠方治婦人腰脚疼痛大腸不利葳靈仙牽牛子微炒各二兩木香半兩枳殻一兩麩炒微黄去穰右為細散每日空心以茶清調下二錢以利為効腰痛附論夫腎主於腰女人腎臟繫於胞絡若腎氣虛弱外感六淫内傷七情皆致腰痛古方亦有五種之說如風腰痛宜小續命湯加桃仁杜仲煎服脾胃氣蔽及寒濕腰痛宜五積散加桃仁如虚損及五積腰痛者青蛾丸神應丸皆可用也如氣滯腰痛加神保丸黒牽牛茴香橘核必有功也方獨活寄生湯出大全良方夫腰痛者皆由腎氣虚弱卧冷濕地當風所得不時速治喜流入脚膝為偏枯冷痺緩弱疼重或腰痛拘腰重痺宜急治之獨活三兩桑寄生續斷杜仲北細辛川牛膝秦艽茯苓白芍藥桂心川芎防風人參熟地黄當歸各二兩甘草二兩炙右㕮咀每服三錢水一盞煎至七分去滓温服空心若下利除地黄并治新産腹痛不得轉動及腰脚攣痺弱不得屈伸此藥最能除風消血肘後有附子一枚無寄生人參當歸甘草近人將治歴節風脚氣流注亦効如神湯出鮑氏方治男子婦人腰痛及産後臍下痛延胡索當歸桂心等分右為末温酒調下二錢甚者不過數服一方無當歸有杜仲虎骨散治腰上實肉處痛不可忍用麝香末半錢用酒調服虎骨末治婦人患腰痛亦治卒中吐血及痔血用向東者蘘荷根一把擣絞汁三升服之一方空心酒煎服治婦人月信滯下部諸疾附論夫婦人下部諸疾其類不一隂腫者是虛損受風邪所為胞絡虚而有風邪客之風氣乗於隂與血氣相搏令氣否澁腠理壅閉不得泄越故令隂腫也胞絡勞傷子臟虚損風冷客之冷乘於隂故令冷也胞絡傷損子臟虛冷氣下衝則令隂挺出謂之下脫亦有因産而用力嘔氣而隂下脫者診其少隂脈浮為虚動為悸故令下脫也隂瘡者由三蟲或九蟲動作侵蝕所為也諸虫在人腸胃之間若臟腑調和血氣充實不能為害若勞傷經絡腸胃虚損則動作蝕於隂輕者或痒或痛重者生瘡診其少隂之脈滑而數者隂中生瘡也方當歸湯出聖惠方治産後臟風隂腫痛當歸獨活白芷地榆各三兩川敗醬礬石各一兩右以水一斗半煮取五升適令煖稍稍洗隂日三兼治隂挺下脫治腫不收出聖惠方麻黄荆芥茄子皮蛇床子真杉木刺蝟皮各等分右為末敷或煮水熏洗小麥朴硝白礬五倍子葱白煮水淋洗極効麻黄湯出聖惠方療婦人隂腫苦瘡熾者宜用洗之麻黄去節黄連艾一方無艾蛇床子各二两酢梅十枚一作烏梅右切以水一斗煎取五升熱洗之宜避風冷菖蒲散出聖惠方治女人月水澁滯隂中腫痛菖蒲當歸剉微炒各一兩秦艽三分吴茱萸半兩湯浸七遍焙乾微炒右粗搗羅為散每服三錢以水一中盞入葱白五寸煎至六分去滓每於食前溫服經心録方出聖惠方治婦人隂中腫痛不可忍艾葉五兩防風三兩大㦸二兩右剉碎以水一斗煮取五升熱洗日三切宜避風冷礬石散出聖惠方療婦人隂腫堅痛礬石二分熬甘草半分炙大黄一分右搗篩取棗大綿纒導隂中二十日即愈桃仁膏出危氏方治産後隂腫妨悶桃仁去皮尖另研為膏枯礬五倍子右等分為細末以膏子拌勻傅之治産後臟中風隂腫疼方出千金方用搗熟桃仁傅之良日三度治隂腫大如升脹痛不問男子婦人皆可用出澹寮方用馬鞭草搗汁塗之効治婦人隂腫堅硬出澹寮方用枳實半斤打碎炒令熱將舊絹帛裹熨入冷則易之又炒熱再熨治隂門腫方出危氏方用甘菊苗研爛百沸湯淋洗先熏後洗療隂中腫痛出聖惠方用枳殻一斤炒令熱故帛裹熨冷即換治婦人隂腫堅痛出聖惠方用商陸一斤剉以水一斗煮取五升稍熱洗之日三度五加皮浸酒方出聖惠方治婦人癖溲冷五加皮熟乾地黄丹參杜仲去粗皮炙微黄蛇床子乾薑各三兩地骨皮二兩天門冬鍾乳粉四兩右細剉以生絹袋盛以酒一斗五升漬二宿後每服煖一大盞空心及晩食前服一方用枸把子無地骨皮治婦人隂冷痒方出大全良方逺志乾薑生用蓮花各半兩蛇床子五味子各一兩右搗羅為末每用先以兔糞塗隂門中用綿裹一錢内隂中熱即為効又方蛇床子三分甜葶藶各半兩呉茱萸半兩沒石子一枚右搗羅為末綿裹棗許大内隂中令腹内熱為度又方蛇床子一兩呉茱萸一兩半生用右搗羅為末煉蜜和丸如酸棗大以綿裹内隂中下惡物以瘥為度一方用麝香治温中坐藥用蛇床子為末白粉少許和勻相得如棗大綿裹内之自然温矣甚効三茱丸治隂中生一物甚大牽引腰腹膨痛至甚不思飲食皆因多服熱藥及煎煿或犯非理房事兼意淫不遂名隂挺食茱萸呉茱萸湯浸微炒桔梗水浸一伏時漉出漫火炒白蒺藜青皮去口山茱萸去核取肉微炒舶上茴香淘去砂土焙乾各一兩五味子海藻洗焙大腹皮酒洗過晒乾用川楝子去核𤣥胡索各一兩二錢半右為末酒糊丸如梧桐子大每服三十五丸木通湯下下虛加川烏炮去𤣥皮肉桂去粗皮各一兩腰腹痛甚加桃仁可去皮尖麩炒别研用再加青皮去白枳實去穰各一兩真南木香七錢半服之一方每服二錢生地黄湯調仍用金毛狗脊五倍子白礬水楊根魚腥草川黄連各一兩為散分作四服以有觜瓦罐煎熟預以銀錫作一長小筒下透罐觜觜上貫挺上先熏後洗立効冄服白薇散凌霄花少許煎一捻金丸服前藥未効却用𤣥胡索舶上茴香呉茱萸炒川楝子去核青木香各二兩右為末粳米糊丸如梧桐子大每服三十五丸空心木通湯服又用梅花腦子半錢鐵孕粉一錢水調刷上如隂畔生疱以凉血飲每服三錢加凌霄花少許煎空心服見効黄芩散治婦人隂脫挺出黄芩蝟皮炙微焦當歸各半兩芍藥一兩赤牡蠣竹皮各二兩狐莖一具一用松皮右治下篩飲服方寸匕日三禁舉重房勞冷食一方以酒服二錢妙硫黄散治産蓐努用力太過隂迸下脫硫黄烏賊魚骨各半兩五味子三銖一作五倍子右治下篩以粉其上良日再三粉之當歸散治同前當歸剉微炒黄芩各二兩蝟皮半兩牡蠣二兩半燒為粉芍藥一兩六銖右治下篩酒服方寸匕日三服禁舉重良方食前煖酒調下二錢治婦人隂挺出下脫方皂莢去皮子炙黄焦半夏炒令黄大黄細辛各一兩蛇床子一兩半右搗羅為末薄絹袋盛如指長内隂中日二易之硫黄湯治産勞玉門開而不閉硫黄四兩呉茱萸一兩半兔絲子一兩六銖蛇床子一兩右為散以水一升煎二方寸匕洗玉門日再洗磁石散治子宫不收名瘣疾有痛不可忍者用磁石酒浸火燒為末糯米粥丸梧子大每服二十丸空心滑石湯下一方為散温酒調服一錢治隂挺出下脫鐵粉散治同前當歸磁石酒浸鐵粉各等分右為末米飲調下隔夜用角藥次日服此角藥用鐵屑螺青為末磨刀水調下治婦人隂挺出下脫方桂心一方作川椒呉茱萸一兩生用戎鹽二兩右藥並熬令色變搗羅為末以綿裹如指大内隂中日再易之甚妙又方川椒生用川烏頭生用白芨各半兩右搗羅為末綿裹一錢内隂中深三寸腹中熱即止來日再用之又方蛇床子五兩烏梅二七枚右以水五升煮取三升去滓稍熱洗之每日夜三五度用又方川烏頭生用白芨各一兩右搗羅為末綿裹一錢内隂中令入三寸腹内熱即止來晨再用又方出聖惠方硫黄烏賊骨各半兩右搗羅為末傅之又方出聖惠方用鐵精細研以羊脂調布裹炙令熱熨之以瘥為度治産後隂下脫方出聖惠方用蛇床子一升布裹炙熨之亦治産後隂中痛又方出聖惠方用弊筆頭燒為灰酒服方寸匕食前服治産後隂道開而不閉此因産室失於遮䕶致風入産門截勝湯出千金方用石灰一斗熬冷燒草以水二斗投之適寒温入汁中坐漬之須臾復易坐如常法此方已効千金不𫝊治婦人隂下脫若肛方出千金方用羊脂煎訖適冷煖取塗上以鐵精傅之上多少令調以火炙布令煖熨肛上漸推内之然後末磁石酒服方寸七日三熏洗法出危氏方用荆芥穂藿香葉臭椿樹皮煎湯熏洗即入托藥用萆麻葉有九角者好飛過白礬為末以紙片攤藥托入摻藥先以淡竹根煎湯洗仍用五倍子白礬為末乾摻立効敷藥用温鹽水洗軟却用五靈脂燒烟熏次用萆麻子研爛塗上俟吸入如入即洗去療苦産門痒無計出聖惠方蚺蛇膽研雄黄研石硫黄研硃砂研硝石藜蘆蕪荑各二分右搗細篩重羅令調以臘月猪脂和如泥取故布作篆子如人指長一寸半以藥塗上内孔中日一易易時宜以猪椒根三兩煮湯洗拭乾内藥佳三黄散一名大黄散出千金方治隂中癢入骨肉大黄黄芩黄蓍各一兩芍藥半兩用赤𤣥參丹參各十八銖呉茱萸三十銖一作山茱萸右治下篩酒服方寸匕日三一方有蛇床子半兩亦可煎洗治婦女隂中瘡濕痒出聖惠方黄連梔子仁甘草黄蘖各一兩蛇床子二兩右治下篩為細末以粉瘡上無汁以猪脂和塗之深者用綿裹内瘡中日二一方無蛇床子一方無甘草真丹散出聖惠方療隂痒似有蟲狀煩悶真丹一分研礬石三分燒研芎藭四分右為散以縠囊盛著隂中蟲當死盡真丹一作丹砂浴風湯治隂中痛痒蛇床子呉茱萸湯浸七次石灰炒乾草烏等分右為細末煎湯洗之三五次治隂痒脫出聖惠方用礬石燒為細末每日空心調方寸匕日三服一方隂挺出下脱治女子隂中苦痒搔之痛悶葛洪肘後方用猪肝炙熱内隂中當有蟲隨肝出治女子隂癢絶産小兒㿉卵腫用狐肉煮炙食之良療隂癢痛不可忍出大全良方用蒜隨多少水煮作湯洗之日三一方用小蒜又方出聖惠方猪牙二兩蛇床子三兩右以水三升煮作湯稍熱洗日三用之又方出大全良方取杏仁燒作灰乗熱綿裹内隂中良亦治女人隂中蟲疽療隂癢出聖惠方用枸把根一斤水三升煮汁沸適寒温洗之治隂癢有蟲出聖惠方取雞肝去脂及熱内隂中有蟲當盡死又方出聖惠方取牛肝截五寸䋲繫内隂中半日蟲入肝出之猪肝亦得療隂中有蟲癢且痛目腫身黄欲得男子漏血下白少氣思美食服此出聖惠方用鯉魚長一尺去頭肉取骨搗末熬黄黒以猪脂和以絹袋盛如常法内隂中至痛處即止蟲當自出治婦人隂癢不止用小薊不拘多少水煮作湯熱洗日三用之治小戸嫁痛連日出千金方甘草炙生薑各三分芍藥二分桂心一分右切以酒二升煮三沸去滓溫服之神良單行大黄湯一名大和湯出千金方治婦人嫁痛用大黄三兩以酒一升煮一沸頓服治婦人隂戸嫁痛出千金方用牛膝三兩酒三升煮取一升半去滓分作三服治婦人小户嫁痛出大全良方用烏賊骨燒研末酒調下方寸匕日三服一名海螵蛸散治婦人隂處疼痛出危氏方用青鹽以布裹熨之補心湯出危氏方治隂中生瘡名曰䘌瘡或痛或癢如蟲行狀淋瀝濃白茯苓人參前胡半夏湯洗七次去滑川芎各三分枳殻麩炒去穰紫蘇桔梗甘草炙橘紅乾薑各半兩當歸一兩三分白芍藥二兩熟地黄一兩半右剉散每服四錢水盞半薑五片棗一枚同煎食前服藿香養胃湯出危氏方治陽明經虚不榮肌肉隂中生瘡不愈藿香白术白茯苓神麴炒烏藥去縮砂仁薏苡仁半夏麴人參各半兩蓽澄茄甘草炙各三錢半右剉散每服四錢水盞半薑五片棗二枚同煎不以時候治隂瘡方出千金方蕪荑芎藭黄芩甘草礬石雄黄附子白芷黄連各六銖右㕮咀取猪膏四兩合煎傅之治婦人隂瘡與男子妬精瘡大同小異出危氏方黄丹枯白礬扁蓄藁本各一兩硫黄半兩白蛇皮一條燒灰荆芥蛇床子各半兩研極細右細末叧以荆芥蛇床子煎湯溫洗軟帛滲乾清油調塗如瘡濕乾末滲之洗搨乾草湯出大全良方療隂蝕甘草乾漆各一兩黄芩乾地黄當歸各二兩右細切以水七升煮取一半去滓以綿帛内湯中以搨瘡處良久即易日二度每搨湯可行十里許即可乾捻取勻濕散薄傅瘡上使遍可經半日又以湯搨乾如前傅藥用五月五日蝦蟆青木香石硫黄鐵精為末生麝香臨時加入黄芩湯出聖惠方療婦人隂中生瘡洗之方當歸黄芩芎藭大黄礬石各三分黄連一分雄黄二分右切以水五升煮取四升洗瘡日三度一方無雄黄雄黄散出聖惠方療婦人隂中生瘡芎藭藜蘆雄黄研丹砂研蜀椒細辛當歸各一分右搗篩散取方寸匕綿裹内隂中又傅外瘡上忌如常法治疳瘡因月後便行房致成湛濁伏流隂道疳瘡遂生搔癢無時先用胡椒葱白作湯一日兩三度淋洗却服後藥出危氏方赤石脂龍骨黒牽牛炒兔絲子酒浸蒸黄蓍鹽水炙沙苑蒺藜炒右為末蜜丸梧桐子大每服二十丸燕窠蒸酒澄上清者吞下雄黄兌散治下部䘌瘡雄黄研青葙子苦參黄連各三分桃仁去皮尖炒一分右為末以生艾搗汁和如棗核綿裹内下部未効更加扁竹汁無艾只用綿裹散子内下部亦可隂瘡膏治男女隂瘡方米粉一酒杯許芍藥黄芩牡蠣附子白芷各十八銖右㕮咀以不落水猪膏一斤微炒上煎三上三下候白芷黄膏成絞去滓内白粉和勻相得傅瘡上併治口瘡一方無米粉杏仁膏治婦人隂瘡杏仁五兩湯浸去皮研白芷芎藭生乾地黄各一兩猪脂羊髓各三兩右細剉以猪脂羊髓拌令勻入鐺中慢火煎候白芷色黄絞去滓膏成用甆合中貯之每取如棗大綿裹内隂中頻頻換之易瘥黄芩散治隂門生瘡黄芩當歸川芎白礬黄連各等分右剉散煮水熏洗即安當歸湯治婦人隂蝕瘡凡婦人少隂脈數而滑者隂中必生瘡名曰䘌瘡或痛或癢如蟲行狀淋露膿汁隂蝕幾盡者此皆由心神煩鬱胃氣虚弱致氣血流滯故經云諸痛癢瘡皆屬於心又云陽明主肌肉癢痛皆屬於心治之當補心養胃外以熏洗坐導藥治之乃可當歸芍藥甘草芎藭各二兩地榆三兩右細切以水五升煮取去滓熏洗日三夜三一方用蛇床子不用芎藭甘濕散又名蚺蛇膽散療疳蟲隂蝕蚺蛇膽真者青木香末石硫黄鐵精麝香各四分臨時分之多少入用原麝香觧蛇毒若先以相和蛇膽即無力也舊用五月五日蝦蟆右等分為末更細研有患取如三碁子和井花水日再服訖先令便利了即以後方桃枝熏下部訖然後取藥如碁子安竹管裏吹下部中亦日再度老少減量其熏法每日一度不用再為之又療疳蟲食下部及五臓方用取桃東南枝三七枚輕大頭使散以綿纒之又搗石硫黄為末將此綿纒枝撚轉之令末少厚又截一短竹筒先内下部中仍以所撚藥桃枝熟燃熏之療婦人隂中痛生瘡羊脂一斤當歸杏仁去皮尖研白芷芎藭各一兩右細切羊脂和置甑中蒸之藥成取如大豆一枚綿裹内隂中日一易之治婦人隂户生瘡青黛虢丹水粉五倍子各為細末右用賣肉舖上拭肉巾燒灰為末和前藥用小絹袋入宫中滲乾如乾用荆芥薄荷栢葉煎水洗如乾仍用油調煎藥塗瘥治婦人隂上生瘡黄芩海桐皮白礬薤菜各等分右煎湯洗後用破牛皮鼔燒存性細研入輕粉在内刮下雞腸上膏調藥塗瘡上如蟲喫入隂内用雞子一個煮熟去殻塗藥末於上綿子兠入隂中如洗了向火炙患處得癢即蟲行若身微作寒服藿香正氣散二三服杏仁散治女子隂中瘡杏仁燒末雄黄礬石燒各二分麝香半分右細研為散每用少許傅瘡上以差為度一方無杏仁治婦人隂蝕瘡方蒲黄一升水銀一兩右研勻以摻上又方用肥猪肉三十斤以水三石煮熟去肉入盆中浸之冷即易不過三兩度湯令熱便洗瘡療隂蝕欲盡者方蝦蟆糞兔屎右等分為末傅瘡上良治茄子疾心躁連綿黄水易治白水難愈出危氏方烏金散二豆散右用薑棗子煎温服麝香杏仁散治婦人隂瘡麝香少許杏仁不拘多少燒存性右為末如瘡口深用絹袋子二個盛藥滿繫口臨上藥炙熱安在隂内立愈治下部䘌瘡方右以平胃散加貫衆末每用二錢熟煮猪肝拌藥入隂户内數日可安治隂中生瘡如蟲咬痛出三因方用生搗桃葉綿裹納隂中日三四易狼牙湯療婦人隂蝕其中爛傷濃水淋漓臭穢用狼牙三兩㕮咀以水四升煮取半升去滓内苦酒如雞子中黄大沸湯一盃消盡夜適寒溫以綿纒筋頭大如蠒濡湯以瀝瘡中日四五度即差一方以水煮洗之一方蝕於肛者單燒雄黄末熏煎苦參湯洗亦可治女子隂瘡用硫黄末傅之瘡上即瘥治婦人隂中生痔凡九竅有肉突出者皆名痔用烏頭七個燒存性用小瓦罐盛釅醋淬乘熱熏候通手沃之良洗方治茄子疾用茄皮白礬馬稻頭根朴硝澤蘭煮水熏洗加入砂石灰少許妙傅藥治痂子疾用朴硝為末黄荆柴燒瀝調傅或濃鐵漿水敷之又方治痂子疾用硫黄一兩大黒魚一個去頭皮納入藥故紙裹黄泥固濟火煆烟盡為末米糊丸梧桐子大每二十丸溫酒下如下疽生蟲所下如柿汁臭穢心中㽲痛悶絶虚煩甚者不可治治茄子疾心躁連綿黄水易治白水難愈出危氏方用生枳殻為散熏洗却用絹帛包枳殻滓納入隂中即日漸消治婦人産時患瘡用冬葵子患瘡者吞一粒便治一頭可煮頓服童女交接陽道違理及為他物所傷犯血出淋漓不止用釜底墨研胡麻以塗之一方有葫蘆塗藥入隂中納之又方用燒青布并髪為粉傅之大良治玉門寛冷方以硫黄末煎湯洗治隂冷子門癢閉五倍子四兩為細末每用以口中玉泉和如兔屎大内隂門中熱即効治女人交接輒血出方桂心伏龍肝各二分右為末酒服方寸匕瘥止又方兼治合隂陽輒痛不可忍出大全良方黄連六分牛膝甘草各四分右三味細切以水四升煮取二升洗之日三四度瘥止治女童交接陽道違理血出不止出大全良方割雞冠血塗之治隂冷病出本草用丁香為末縫紗囊如小指實末内隂中其病便已治婦人産門痒痛以槐皮煎湯浸洗治婦人隂瘡出本草以瞿麥搗傅之治婦人隂瘡浮疱用落鴈木以椿桐煮洗妙治女人痂病出如宜方白獨活荆芥甘草右松花煎湯服仍冝硝菊花煎湯熏洗治産後隂下脫方用鼈頭五枚燒末以井花水服方寸日三治婦人隂瘡以雞子和光粉炒乾服治一切婦人因産用力過多隂門挺露不收出䕶命方萆薢狗脊去毛石斛牛膝續斷益智仁去皮各半兩當歸一兩蒼术一分巴㦸去心附子火炮去皮磁石真上等吸鐵者燒赤醋淬七度研如塵水飛過用各一兩半右件藥先熬搗衆藥為細末方入磁末相滚令勻以薄醋煮稀麵汁丸如梧桐子大早朝熱湯下四十丸治婦人宫臟虚冷正氣微弱每懐孕時即隂門挺露喫食減少肌體羸痩宜喫此方楊子建萬金䕶命方萆薢五味子當歸續斷石斛杜仲人參細辛白朮炙艾葉川芎各等分右細杵羅為末煉蜜丸如梧桐子大空心鹽湯下五十丸吃了若大腑踈轉連連進服以安効為期治婦人懐孕臨産隂門挺出通而生露桑寄生川芎當歸黄橘皮細辛藿香人參防風炙艾葉右為細末每服二錢水一盞煎取八分空心去滓喫治女人隂腫出本草用荏子葉生搗和醋以綿裹内三四易寸金散出衛生寳鑑方治婦人子腸不收蛇床子韶腦葫蘆巴紫稍花右件各等分為細末每服五七錢用水半碗淋洗之伊祁散出衛生寳鑑方治婦人子腸不收全蛇不拘多少右為細末口噙水鼻内搐之立効若有息肉突出出肘後方以苦酒三升漬烏喙五枚三日以洗之日夜三四度治隂下濕癢出肘後方用呉茱萸一升水三升煮三沸去滓洗癢瘥治産後傷水隂腫如斗神驗出胎産救急方用牡蠣粉傅之又方以通脱木根研汁調服又方防風荆芥蛇床子右煎湯熏洗凡産後歸房早多有此隂瘡出胎産救急方蛇床子地骨皮右煎湯熏洗又方黄連黄芩枯礬右煎湯熏洗治隂瘡癢出胎産救急方枯礬川芎硃砂右為細末綿裹内隂中有蟲即死又方枯礬蛇床子右為末同煎洗一方則用蛇床又方菊花榴根皮右煎湯熏洗又方蛇床子白礬榴根右五倍煎湯熏洗治女子隂隠瘡及骨節中寒熱者出本草以龜殻作湯浴漬之治隂癢痛用車前子以水三升煮三沸去滓洗癢痛處不用藥法療頽必瘥方出肘後方令病人自把糯米餅子一枚并皂莢刺一百箇就百姓間坐社處先將皂莢刺分合社人社官三老以下各付一針即出餅子示人從頭至尾皆言從社官已下乞針揺社人問云揺何物病人云揺人鬼周匝總遍訖針并揷盡即時餅却到家收掌於一處餅乾頽不覺自然永散瘥極神効普濟方卷三百二十六
