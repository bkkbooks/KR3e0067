𤓰一兩水一升入鹽二兩煮乾為度右用瓦器煮焙乾為末酒糊丸如梧子大空心温酒下三五十丸婦人醋湯下牛膝湯治脚氣有驗牛膝一斤白茯苓人參各一兩當歸半兩右為細末酒調服又方專治脚氣右用敗毒散加木𤓰煎服加味火扻丸治陽證脚氣火扻草九斤枯松枝二兩石楠枝一斤萆薢半兩石膏三兩右為末醋糊為丸毎服三十丸空心服虎骨丸治脚氣兩腿腫行歩艱難蒼术防風萆薢杜仲各三兩虎骨金毛狗脊二兩去毛右件為細末酒煮麵糊為丸如梧子大毎服五十丸湯酒任下石楠丸治脚氣痛楚不可履地石楠葉一兩淡木𤓰一兩烏藥一兩續斷一兩綿黄耆一兩黒狗脊一兩地龍一兩川烏半兩右件為細末酒糊丸如梧桐子大毎服十丸加至二十丸服乆加至三十丸空心食前温酒吞下如疼痛不堪忍者煎木𤓰湯下寛筋丸治風壅氣道不宣筋脉拘攣難以屈伸兼治脚氣疼痒防風荆芥麻黄乾木𤓰獨活各一兩牛膝半兩右剉碎用好酒浸二宿漉出焙乾為末草烏頭二兩黒豆一兩用水五碗煑令乾去豆薄切烏頭焙乾亦為末和勻醋糊丸如梧桐子大毎服十丸漸漸加至二十丸温茶好酒食後服蒼术羌活湯治脚氣無力沉重羌活三錢防風根一錢半柴胡七分半升麻一錢獨活一錢葛根一錢熟甘草半錢黄耆二錢蒼术一錢橘皮六分縮砂皮一錢草豆蔲皮半錢黄栢半錢知母二分半生甘草梢半錢右分作二服水三盞煎至一盞去滓熱服鐡角丸治乆新脚氣膝脛腫痛脚心隠疼行歩艱難或攻衝作瘡膿血不止鐡角葳靈仙黒牽牛草烏頭陳橘皮金鈴子右件各等分為細末酒煑麵糊為丸梧子大毎服十丸至十五丸空心用白湯送下以少㸃心壓之忌温麵並茶等物加減小續命湯治男子婦人脚氣何首烏四兩川牛膝一兩草烏半兩右為細末先用木𤓰二箇好酒二升小鍋煮十分爛去皮穰研和前藥硬燥用煮木𤓰酒添搜丸梧子大毎服三四十丸酒下常服除根芎仙丸治乆新脚氣腿膝腫痛或攻注生瘡川烏十兩白芍藥五兩葳靈仙三兩右件為細末用蘿蔔自然汁打麵糊為丸如梧子大毎服五十丸再用蘿蔔自然汁少許同温酒半盞送下空心臨睡服忌茶療脚氣方附子甘草各五兩右二味同細剉以水五斗煎取二斗半置盆中以板子濶三寸許横湯上共水面平脚踏板上以湯将脚浴水冷即休此湯得四五度用脚氣永除此方多驗敗毒散治三陽脛腫脚氣踝上赤痛寒熱徃来人參茯苓甘草前胡川烏羌活獨活桔梗柴胡枳殻各等分右㕮咀薑薄荷煎熱服加蒼术熱多加大黄芒硝行氣散治血氣不和脚氣頻發不問冷熱及補藥云脚氣無補法者非也大䟽通紫蘓香附各二兩陳皮一兩甘草半兩木𤓰烏藥㯽榔蘓木羌活蒼术各半兩右㕮咀薑葱煎熱服推氣丸治脚氣作吐飲食不進大便不通手心熱口舌燥大黄枳實青皮㯽榔黒牽牛生各一兩麻仁一兩半右為末以麻仁碾為膏取藥末一兩同拌再碾用絹羅過去滓却将麻仁和入餘藥用不蛀皂角煑汁麵入汁作糊為丸如梧桐子大毎服四五十丸熟水下得利即止順氣丸治脚氣欲發大便先閉大黄五兩半車前子㯽榔麻仁牛膝郁李仁兎絲子山藥各二兩防風山茱茰枳殻獨活各一兩右為末蜜丸如桐子大茶酒米湯任下此藥補益通利䟽風順氣如虚弱人難服推氣丸冝服順氣丸烏白散治脚氣發則脚骨痛苦甚者竒妙草烏四兩桑白皮八兩右㕮咀水三升煮豆一升去滓好酒和藥水温服用瓦瓶忌鐡器李降兵部手集方著此法云昔有人患脚氣服此得效出風科集驗方右用赤小豆作袋置足下朝夕輾轉踐踏之其疾遂漸愈赤主丹毒㯽榔丸治脚氣攻衝腿膝腫痛㯽榔赤芍藥白术當歸陳皮青橘皮烏藥上七味各一兩甘草炙半兩右件搗細末麵糊為丸如梧桐子大毎服七十丸空心食前熟水下木𤓰丸治脚氣極效破故紙川萆薢乾木𤓰杜仲茯神茴香川牛膝右為細末麵糊為丸如梧子大湯酒任下全蝎丸治脚氣檀香一錢麝香川烏各二錢沒藥紅麯五錢白膠香五錢穿山甲三錢全蝎一錢右麵糊為丸毎服三十丸空心温酒下烏靈丸治男子脚氣不能伸屈及癱瘓手足不隨烏草一方草烏烏豆各二兩用好醋浸葳靈仙各一兩右並為末醋煮麵糊為丸如梧桐子大病上食後温酒吞下病下空心服十丸至二十丸烏藥丸治脚氣徹骨痛不能行履者不過三服見效木鱉子白芍藥草烏葳靈仙北細辛沒藥右等分為末薄糊為丸如梧子大毎服七丸至十丸食後木𤓰湯下或酒下亦可以身上覺麻痺即是效或未效可添十五丸量虚實不可妄増丸数亦不可於食前服之有草烏頭在其間最忌服後以熱食物衝動烏頭毒則昏不知人矣地黄湯出朱氏集驗方治穿心脚氣熟地黄四兩川當歸二兩芍藥川牛膝三柰子杜仲半兩右㕮咀毎服三錢水一盞半煎至八分不時服地仙丹治男子婦人陽證脚氣痛錢子地龍五靈脂天台芍藥白膠香葳靈仙木𤓰赤小豆黒豆天仙藤淮烏五加皮木鱉子蒼术樹紅右等分為細末酒糊為丸如梧桐子大毎服七十丸空心鹽酒湯任下鷄鳴散治脚氣第一此藥不問男女皆可服如人感風濕流注腿足痛不可忍用索懸吊呌聲不絶筋脉腫大梹榔七枚陳皮木𤓰各一兩呉茱茰二錢桔梗半兩生薑半兩紫蘓莖葉三錢右為麄末分作八服隔宿用水三大盞慢火煎留碗半去滓留水二碗煎滓取一小碗兩次以酒煎汁相和安頓牀頭次日五更分二服只是冷服冬月畧温亦得服了用餅餌壓下如服不盡留次日漸漸喫亦可服此藥天明大便當下一碗許黒糞水即是原腎家感寒濕毒氣下来也至早飯前後痛漸住只是放遲喫物候藥力過此藥不是空藥並無所忌治脚氣流注四肢指莭腫痛不可屈伸法當先服搜風麻木之劑然後服此藥婦人尤宜川烏當歸芍藥附子右等分以薑十片煎空心服之梹榔湯出澹寮方治脚氣順風防壅梹榔香附子陳皮紫蘓木𤓰五加皮甘草炙各一兩右㕮咀毎服四錢水一盞半薑五片煎至八分去滓温服婦人脚氣多由血虚加當歸半兩室女脚氣多由血實加赤芍藥一兩半大便秘結虚弱者加枳實壮熱者加大黄並不拘時一方治脚氣衝心大便秘澁冝服三和散亦曽有人加杜仲烏藥春夏常服脚氣遂不復作亦妙方也治脚氣出本草方右以巴㦸天兩半糯米同炒微轉色用大黄一兩剉碎炒同為末熟蜜為丸温米湯服五七十丸有人嗜飲酒日須五七盃後脚氣甚危或教以此方仍禁酒疾遂愈治脚氣衝上小腹急硬右以田螺煮食之脚氣丸治一切脚膝沉重疼痛腫滿川烏取末五兩木𤓰二枚牛膝七錢巴㦸七錢青鹽一兩肉蓯蓉一兩天麻一兩防風一兩半海桐皮一兩半甘草萆薢金毛狗脊半兩去毛右件先将木𤓰用竹刀切下盖子剜去子却填熟艾末令滿将盖子盖定用竹簽簽住入飯甑内蒸爛将烏頭末同木𤓰研勻次将藥為細末用和為丸如梧子大毎服三十丸至五十丸空心温酒送下一方兼治婦人産後脚軟行履不得筋骨疼痛加羗活乳香沒藥三味各一兩治閉結并脚氣方大螺右一味搗用神驗饒醫熊産誠年五十五嵗病前後便閉不通五日腹脹如鼓同軰環視皆不能措力與西湖妙果僧慧月相善遣信邀致訣别月驚馳而徃過釣橋逄一異客風姿瀟洒出塵揖之曰方外髙士何孑孑走趨如此曰一善友患結勢不可療急欲徃問客曰此易事也待奉施一藥即脱鞋入水探一大螺而出曰事濟矣持抵其家以鹽和生搗碎置病者臍下一寸二分用寛帛𦂳繋之仍辦濁器以須其通月未深以為然姑謝之熊昏不知人事妻子涕泣諸醫知無他䇿漫以試之曽未移席忽然暴下醫愧嘆而散月歸訪異人無所見矣熊後十六年乃終白石董守約以脚氣攻注為苦或教之搥数螺傅兩股上便覺冷氣趨下至足既而亦安療脚氣破冷氣痃癖右取鯉魚鱗用絹裹和魚煮羹熟後去鱗食之驗治脚氣出本草右以麋皮作鞋穿治脚氣出本草右以紅草為湯浸之治脚氣出本草右以枕材煮湯浴浸之治脚氣風氣諸惡氣右以鯉魚大者洗去泥開肚以椒末半兩切碎大蒜三兩顆内魚腹中縫合并和小豆一升煑之臨熟下白蘿蔔二五顆如指大切葱一握煮熟空腹食之并小豆等强飽盡食之至夜即洩氣無限三五日更一頓食并下一切惡氣普濟方卷二百四十
