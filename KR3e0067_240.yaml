body:
  text: 普濟方卷二百四十明周王朱橚撰腳氣門一切腳氣附論夫腳氣之疾實水濕之所為也蓋濕之害人皮肉筋脈而屬於下然亦有二焉一則自外而感一則自內而致治法自應不同南方地下水寒濕清之氣中於人必自足始故經曰清濕襲虛則病起下或者難曰今兹北方其地則風土髙寒其人則腠理緻密而復多此疾者豈是地濕之氣感之而然耶答曰南方之疾自外而感者也北方之疾自內而致者也何以言之北方之人常食潼乳又飲酒無莭過傷而不檢且潼乳之為物其氣味則潼乳其形質則水也酒醴亦然人之水穀入胃胃之氣蒸騰其氣與味宣之經絡化之為血外營四肢內注五臟六腑周而復始以應刻數焉謂天地之紀此皆元氣充足脾胃之氣無所傷而然也茍元氣不充則脾胃之本弱飲食自倍則脾胃之氣有傷既不能蒸化所食之食其氣與味亦不能宣泄旁通其水之性潤而致之其自外而入者止於下脛腫而痛自內而致者乃或至於手莭腫也經曰足脛腫曰水太隂所致為重跗腫此但即其自外者言之也所治之法前人方論偹矣自內而致者治法則未有也楊大受云腳氣是為壅疾治法當以宣通之劑使氣不能成壅也壅既成而盛者砭惡血而去其腫勢經曰蓄則勢腫砭則去也後以藥治之醫學發明論云經論南方其地下水弱為霧露之所聚也江東嶺南皆如此春夏之交山水蒸鬱風濕毒氣為甚足或感之遂成瘴毒腳氣其後則身先屈弱至痺疼脛腫小腹不仁頭痛心煩痰涎腫逆時作寒熱便溺不通甚者攻心而勢迫治之誠不可緩有法存焉所以留意經方便善心術者豈非江左嶺表此疾得之多與外臺云南方腳氣者一忌嗔嗔則心滿煩則腳氣發第二禁大語語則傷肺亦發動不得久露足當風入冷水洗腳兩腳脛尤不宜冷雖暑月常須著腳袴至冷寒倍令兩脛溫暖微汗大佳依此將息氣漸薄損每至寅丑日割手足甲割少侵肉去氣夏日腠理開不宜當風臥睡覺令人按挼勿使邪氣稽留數勞動骨莭當令通暢此蓋養生之要拒風邪之法也尋常冇力無力食後行三五百步疲倦不止腳中惡氣隨即下散雖浮腫氣不能上也東垣法外臺總録所録皆謂南方卑濕霧露常聚之地其民腠理散陽氣不能外固因而履之則清濕襲虛病起於下此由血氣虛弱受清濕之邪氣與血並行於膚腠邪氣盛正氣少故血氣澀澀則脾虛虛則弱故令脾弱也後人名曰腳氣針經云有道以來治之多灸滿灸為佳以引導濕氣外出及醪醴以通經散邪所治之法方藥少熱藥多用麻黃川烏薑附之屬內經曰濕淫於外以苦發之麻黃苦濕發之者也川烏辛熱走而不能守通行經絡薑附辛甘大熱助陽而退隂亦散清濕之邪又察足之三隂三陽是何經絡所起以引用藥為主治審之六氣中何氣所感治以佐使之藥孫真人云醫者意也隨時增損物無定方真言哉異法方宜論云北方者其地髙峻風寒水洌其俗飲潼酪而肉食凡飲潼酪以飲多飲速者為飲經云太飲則氣逆又云食入於隂長氣於陽今反行隂道是逆也夫乳酪醇酒濕熱之物飲之屬也如此奉養太過亦滋其濕水性潤下氣不能拘故下注於足經積久而作腫滿疼痛此飲食下流之所致也通評虛實論云穀入多而氣少濕居下也况潼酪醇酒之濕熱甚於穀者也至真大要論云太隂之勝火氣內鬱流散於外足脛跗腫飲發於中跗腫於下此之謂也故飲受於胃逰溢精氣下流於脾脾氣散精上歸於肺通調水道下淪膀胱水經四部五經並行合於四時五臟隂陽發度以為常也若飲食自倍脾胃有傷則胃氣不能舒化脾氣不能四布故下流乘其肝腎濕熱注於足脛加之房事不莭陽虛隂盛遂成腳氣孫真人云古人少有此疾自永嘉南渡衣纓士人多有之亦此意也診其脈浮而緩者起於風濡弱者起於濕洪而數者起於熱緊而澀者起於寒風者汗而愈濕者熏而愈仍利小便熱者下而愈寒者發散而愈凡得腳氣速冝針灸惟用湯淋洗者醫之大戒也觀夫腳氣皆由腎虛而生然婦人亦有病腳氣者必因血海虛乘宿塊嗔怒憂悶哀感悲傷遂成斯疾兼今婦人病者衆則知婦人以血虛而得與男子腎虛類矣治婦人之法與男子同藥固無異但兼以七情之藥治之無不效矣治腳氣古無補法多貴乎利然亦須順四時補㵼之法可矣春微瀉後微滋補不然則血氣日衰必使年年遇蒸熱而作理之必然也治法大槩無越於此又加以四時謹於調攝又不得久坐立於冷濕之地暑月亦不可露坐濕處能慎於此依法隨證治之無不瘥矣風毒中人隨處皆得作病何偏著於腳也曰夫人有五臟心肺二臟經絡所起在手十指肝腎與脾三臟經絡所起在足十指夫風毒之氣皆起於地地寒暑風濕皆作蒸氣足常履之所以風毒之中人必先中腳久而不瘥遍及四肢腹背頭項也微時不覺固滯乃知經云次傳足間是也腳氣病皆由感風毒所致得此病多不令人即覺會因他病一度乃始發動或奄然大悶經兩三日不起方乃覺之諸小庸醫不識此疾漫作他病治之莫不盡斃始起甚微食飲嬉戲氣力如故惟卒起卒屈弱不能動有此為異耳黃帝云暖風濕痺是也故有腳未覺異而頭項臂膞已有所苦有諸處皆未知而心腹五內已有所困又風毒之中人也或見食嘔吐憎聞食臭或有腹痛不利或大小便祕澀不通或胸中衝突不欲見光明或精神昏潰或喜怒迷妄語言錯亂或壯熱頭痛或身體酷冷或覺轉筋或欲腫不腫或肢腿頑痺或時緩縱不隨或復百莭攣急或小腹不仁此皆腳氣狀貌也婦人亦爾又有婦人産後春秋取涼多中此毒深冝慎之其氣悶掣瘲驚心煩嘔吐氣上皆其候也又但覺臍下冷痛愊愊然不快兼小便淋瀝不同平時即是腳氣之證凡四時之中皆不得久立久坐濕冷也亦不得因醉酒汗出脫衣鞋襪當風取涼致得腳氣若暑月久坐久立濕地者則熱濕之氣蒸人經絡病發必熱四肢酸疼煩悶若寒月久坐立濕冷者則冷濕之氣上入經絡病發則四肢酷冷轉筋若當風涼得之者病發則皮肉頑痺諸處瞤動漸漸向頭上忽然暴痛若人皆不能忍者當於熱時必不得頓取於寒以快意也卒有暴寒復不得受之皆生病也故風毒中人或先中手足十指因汗毛孔開腠理通風如急箭或先中足仆跌或先中膝已下足脛表裏若欲使人不成病者初覺病時即灸所覺處二十三壯因此即愈不復發也黃帝云當風取涼醉已入房能成此疾問曰何故得者有冷有熱答曰足有三隂三陽寒中三陽所患必冷暑中三陽所患必熱故有表裏冷熱不同熱者治以冷藥冷者治以熱藥以意消息之脾受陽毒即熱頑腎受隂濕即寒痺雖患腳氣不防乳石動發皆須服壓石藥療之夫因患腳氣遂生諸病者則以諸藥恭治之小便不利則以茯苓及諸利小便藥治之大便極硬則以五柔麻仁丸等治之遍體滿腫成水病者則取治水方中治水之藥治之餘皆倣此更無拘忌凡小覺病後有異即須大服快意之劑急治之緩則氣上入腹胸脅逆滿氣上肩息急者死不旋踵寬者數日必死不可不急也但看心下急氣喘不停或自汗數出或乍寒乍熱其脈促短而數嘔吐不止者死千金論云凡人患腳氣不自知則於後因有他病發動治之得瘥有人直患嘔吐而復腳弱余為診乃告為腳氣病者曰某平生不患腳腫何因名為腳氣不肯服湯余醫以為古法狐疑之間不過一旬而死故腳氣不得一向以腫為名亦有腫者有不腫者其小腹頑痺不仁者腳多不腫小腹頑痺不過三五日即行嘔吐者名腳氣入心如此者死在旦夕凡患腳氣到心難治以其腎水尅火故也凡腳氣雖復診候多途而三部之脈要須不違四時者為吉其逆四時者勿治本其人黑瘦者易治肥大肉厚赤白者難愈黑人耐風濕赤白不耐風濕人肉硬却風人肉軟則受風至深難愈腳氣證狀貌固多但當以診脈分隂陽使無差誤謂脈浮為風緊為寒緩細為濕洪數為熱見於諸陽病在外冝發散之沉而弦者為風沉而緊者為寒沉細為濕沉數為熱見於諸陰病在裏宜溫利之外證自汗走注為風勝無汗疼痛攣急為寒勝腫滿重著為濕勝煩熱頑痺為暑勝四氣兼有但推其多者為勝治之當以諸證之辨而分表裏寒則溫之熱則涼之在表則散在裏則下方二十四味輕腳丸出直指方治腳氣通用當歸川芎萆薢羌活杜仲石楠葉薏苡仁華隂細辛枳殼雞心檳榔蒼术五加皮防風續斷獨活牛膝葳靈仙海桐皮木香木瓜麻黃川五靈脂沒藥滴乳香右為末酒浸雪糯為丸桐子大每服五十丸細銼辣桂荆芥穗食前煎湯下或枳殼木瓜煎湯下又方出本事方治腳氣毒遍內外煩熱不解口中生瘡狂走毒厲及解中諸熱攣毒邪熱卒黃等解蠱毒鬼魅野道熱毒又治小兒驚癎熱病寒水石石膏磁石滑石已上四味各三斤元參一斤羚羊角五兩升麻五兩丁香一兩木香半兩甘草八兩朴硝精者三斤硝石好者二斤朱砂三兩研細麝香當門子右各細研為末每服一錢匕或二錢冷水調下大人小兒仔細加減食後服透骨丹出醫方集成専治腳氣川烏一兩羌活二兩白茯苓二兩乳香一兩檳榔木香各一兩半川芎木瓜沉香各一兩右為末用麵糊丸如梧桐子大每服六十丸薑湯下每於食前服一方無川芎捲柏散出楊氏家藏方治逺年腳氣難治此方特效體虛人減半服一法治寒濕腳氣腫痛不能履地黑牽牛甘遂檳榔已上各等分捲柏隨用右為末不得稍雜每服每味各一錢惟檳榔末二錢五更初濃煎蔥白湯下至辰已時取下惡物如魚凍吃淡粥病安便冝服藥大腹皮三兩紫蘇子檳榔各一兩乾宣木瓜二兩半荆芥穗烏藥橘紅蘇葉各一兩蘿蔔子半兩沉香三兩桑白皮枳殼各一兩半右銼散每服三錢薑五片煎不時溫服獨活湯出直指方治腳氣羌活麻黃熟附子生乾薑川烏牛膝白芍藥白茯苓黃耆人參杜仲甘草辣桂當歸白术木香各等分右粗末每服三錢薑五片棗二枚同煎吞活血應痛丸活血應痛丸出和劑方治風濕客於腎經血脈凝滯腰腿重疼不能轉側皮膚不仁遍身麻木上攻頭目虛浮耳內常鳴不住蒼术六兩炒香附七兩威靈仙二兩陳皮五兩半沒藥一兩草烏頭二十四兩枸把四兩右為末酒麵稀糊為丸如梧子大每服二十丸用獨活湯下兼治腎受風寒腳氣酸疼及久痢登厠風冷入於腸胃以致兩腳削小成鼓捶風而痢又不止用此藥搜風散出醫方集成治腳氣愈後可常服之白芷川芎茯苓甘草芍藥當歸各一兩陳皮厚朴枳殼白术各二兩乾薑麻黃各三兩桔梗一兩半蒼术十一兩肉桂一兩右㕮咀每服三錢水一盞薑四片煎服除腳氣出本草右以鈎樟木作履主腳氣出本草右以靈床下鞋履之紫金皮丸出海上方治腳氣不問逺近紫金皮黑豆防風白膠香石膏白蒺䔧骨碎補各二兩川烏一雙二兩五月蠶沙四兩右為末煉蜜丸如雞頭子大每服半兩細嚼用生薑湯下木瓜散出醫方集成治腳氣大腹皮紫蘇羌活木香茯苓陳皮甘草炙各半兩宣木瓜一兩右㕮咀每服三錢水一盞薑棗煎服一方加檳榔白术川芎沉香即沉香三和散一方無陳皮茯苓用水煎服降氣湯治下部閉不通并治腳氣右取雚蒴根一把搗汁水和絞去滓強人服一升數數用之治腳氣出本草右以豬肝切作生空心以薑醋進當微泄若先利勿用服三香丸治腳氣妨悶不下食瘦弱腹痛木香檳榔各二兩雞香吳茱茰當歸陳橘皮訶梨勒皮生薑各一兩半右為細末煉蜜和丸如梧桐子大煎陳皮湯下三十丸蓯蓉牛膝丸治腳氣肉蓯蓉川牛膝天麻木瓜枸杞子黃耆真虎骨青鹽已上各二兩右都拌勻將前項浸藥酒入麵糊為丸如梧子大焙乾每服三五十丸溫酒白湯空心食前吞下檳蘇散治腳氣初發服此藥去風溫及損鬱氣脈多服不傷人香附子半兩甘草二兩陳皮紫蘇各三錢木瓜二錢半右為粗末每服五錢水一盞半或加生薑五片煎七分空心食前服如大便祕滯加大黃檳榔各二錢半一方薑蔥煎服黑豆煎膏出聖濟總録治腳氣黑豆五升桑白皮銼五兩羌活蒺䔧子海桐皮吳茱茰各半兩右取煎汁外搗羅為末入煎汁中以文武火煎成膏每服一匙頭溫酒化下空心食前服加減檳榔湯治一切腳氣痛順氣防壅一方無香附子足痛而熱者加地骨皮煎腳氣名曰壅疾貴乎踈檳榔香附子陳皮蘇葉木瓜甘草五加皮右㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服婦人腳氣多由血虛加當歸半兩室女腳氣多由血實加赤芍藥一兩半如大便祕結虛弱者加枳實壯盛者加大黃如腳痛不已復轉筋者加茱茰痰逆或嘔者加半夏小便不通加木通腳痛大便不通者用此湯送下青木香丸亦可木香丸治腳氣木香全蝎一兩白牽牛黑牽牛各半兩破故紙半兩半生半熟右為末內木瓜中九蒸九曝研爛為丸炒茴香鹽酒下三十丸食前服黑錫丹出加直方治虛老人腳氣上攻牙齦腫痛口舌生瘡沉香葫蘆芭附子陽起石肉桂破故紙茴香肉豆蔲金鈴子各一兩錫硫砂子四兩右為末同砂子末酒和為丸如梧子大隂乾布袋摖令光瑩每服四十粒空心薑鹽湯下枳實大黃湯醫學發明云昔有人體充肥腳氣始發頭面渾身肢莭微腫皆赤足脛赤腫痛不可忍不敢扶策手近皮膚其痛轉甚坐而復臥臥而復起晝夜苦楚難以名狀乃北土髙寒故飲酒積久傷脾不能運化飲食不流之所致投以當歸枳實一兩二錢其痛減半再服腫痛悉除止有右手指微赤腫以三稜針刺於爪甲端多出黑血赤腫全去不數日因食溫麵肢體覺痛宜服此藥羌活當歸身枳實大黃右㕮咀只作一服水一盞半煎至一盞去滓溫服空心食前利下兩行痛止夫腳氣之疾皆水濕之為也麵滋其溫又添肢莭煩疼內經云風勝溫羌活辛溫透關莭故以為主血滯不行則痛當歸辛溫散壅止痛枳實苦寒治痞消食故以為臣大黃苦寒以導麵之溫熱治諸老血留結取其駿駛故以為使也二仙散治氣不足者因久坐久立隂濕之地坐卧當風醉脫靴鞋皆成腳氣若暑月久立溫熱鬱蒸榮滯不和發熱冬月寒天氣冷或發麻疼痛悶亂晴隂並皆發富貴之家亦有此疾蓬术元胡索蛤粉陳皮檳榔末生薑切紫蘇陳橘右為末每服二錢燒黑豆五十粒以湯一盞生薑三片煎至五分去滓調前藥服三和丸專治腳氣皂角破故紙黑牽牛核桃肉右為末酒糊為丸如梧桐子大每服五十丸溫酒下木瓜湯亦可檳榔湯治腳氣少府監韓正彥暴得手足不舉諸醫以風針灸臂揵不知痛孫兆作腳氣藥乃愈檳榔石斛黑牽牛木瓜右以水一大盞煎七分去滓稍熱服治腳氣衝心痛悶用童尿煎服治心患痛溫酒調下治腳氣出本草右以鈎樟木作湯浴之治腳氣出本草右以毛蓼煎湯濯足曹公鍾乳丸治腳氣久虛脈來沉細宜補煉成鍾乳粉三兩石斛二兩吳茱茰二分萖絲子炒二兩右除鍾乳粉外搗羅為末錬蜜和丸如梧桐子大每服三錢食前以人參棗湯下如覺氣壅即服踈氣藥勿令太過赤小豆煎方出聖濟總録治腳氣赤小豆二升半杏仁桑根白皮銼各一兩生薑切一兩半右搗篩以水三升煎至一升半去滓更入茱茰半分蜀椒末半分再煎一兩沸冷如膏蜜收每匙頭空心酒調服木瓜丸治腳氣諸病乳香一兩甘菊花一兩青鹽二錢木瓜一枚右先破木瓜作兩瓣去穰並子入乳香等三味在內却以綿繫定於瓶中蒸令爛熟研細成膏丸如梧桐子大每服五十丸溫酒下日三服病甚者更加丸數服百日汗香為驗腳膝等疾并可服雙香散出經驗良方治腳氣香蘇散五錢金鈴子三枚木香半錢右作一服水一盞半生薑三片棗一枚同煎至七分空心進二服大安補散出海上方治腳氣大附子一個桂末一錢粉薑末一錢右三味水二盞蔥白三寸煎七分先喫蔥白次服藥忌甘草十日千金散治腳氣兼治腎臟風攻注膝右用連州甘遂懸挂紙籠中却切川芎作片子如燒爐香熏之燒川芎盡將甘遂為末量病人虛實每以三四錢或一二錢用獖豬腰一對去筋膜糝藥於內以濕紙裹煨熟臨臥細嚼以溫酒送下盡量飲至醉却以物擱起兩足至明取下惡物水數升以茴香末糝煮粥次服大安補散烏頭丸出海上方治腳氣黑牽牛川五靈脂大烏頭右生為末糊為丸如梧桐子大每服三十丸空心食前鹽湯服或酒任下木瓜散專治腳氣乾木瓜一兩紫金皮二兩香附子三兩右為末每服三錢空心鹽酒調下五日見效日三四服椒囊出海上方治腳氣僕丁酉嵗在臨安約婺州親戚吳寬夫泛湖是時劇暑見其用火踏上置一布囊烘足叩其所以答云某腳氣之疾近得一方用川椒二三斤實於踈布囊中置火踏上跣足踏椒囊蓋椒氣性熱辟去寒濕氣言甚有理用之月餘亦漸見效庚子嵗在淳安寬夫經過因問其疾云愈之已久乃椒囊之力也不特某用之效傳之數親知皆無恙也真竒方壬寅再來臨安適於賓次中邂逅王成之時為都司見其用火踏亦有一布囊問之豈非椒乎云又添破開檳榔并熟艾各三之一且云果是甚妙大抵足膝之病居下屬隂又加寒濕隂益甚矣血氣惟冷凝結非至熱不可除今用川椒椒性熱復加以火蒸之自然寒濕去矣信乎處方之妙也蒜酒治初覺似有腳氣冝服蒜二升桃仁䜴一升右以生絹袋盛內淨瓷甕中用好酒一斗浸密封頭春夏五日秋冬七日初服半盞加至一盞惟量飲之日三四服當令有酒色更入酒五升加好椒一二合用良牽牛子散治腳氣甘遂黑牽牛右為末以豬腰子去膜竹刀批開內藥於瓦瓶中煎熟用白酒調二錢中咽腰子酒醒痛止又方右用蝦蟇藤一束暴乾為末用鹽及白酒一盞加水二盞先將藥末水調頻攪花謝却將前藥酒調開併作一服次用後藥鳯尾草四錢大黃一錢炒右為末將二味和勻卧用時侵晨將魚鮓蘸藥末喫要飽候吐痰為度然後服後藥前胡麻黃杏仁桔梗半夏茯苓甘草生薑右為散加桑白皮水煎服之乳香木瓜丸專治逺年近日腳氣乳香血竭右等分另研為細末用好木瓜一個竹刀去皮心批取頂蓋將末藥攪勻却用批下頂蓋合續以麵裹之約半指厚於鍋內煮熟極爛為度連麵石臼內杵如泥丸如梧子大每服三十丸漸加至四十丸空心溫木瓜湯送下乾物壓之忌動氣及生冷濕膩之物甘鱉散出本事方治腳氣連珠甘遂一兩木鱉去殼一雌一雄取好者右為末豬腰子二箇批開藥末一錢糝勻紙褁數重火煨熟放溫五更初細嚼米湯下如左腿患則用左腰子右腳患則用右腰子藥末止須一錢毗陵有姓馬人鬻酒宿患腎臟風一足發腫如瓠自腰以下巨細通為一律痛不可忍卧欲轉側用兩人挾持方可動或者欲以刀尖批之豫用此方合藥以服至五更初細嚼米飲下至辰巳間下膿如水精者數升及明痛止腫退一月尚跛倚而行豫再以赤烏散令塗貼其膝方愈後十年毗陵子率其子列拜以謝云向腳疾至今不復作并積年腎臟風亦已失去今速步不難矣治腳氣兼治頭風香附子一兩甘草半兩右㕮咀每服四錢水二盞帶鬚蔥白五寸薑三片煎至八分通口服頭風食後腳氣食前服又方治腳氣舉發立止鷺鷥藤蒼耳草子右酒浸一宿放火旁次早喫先以草藤燒水熏洗治腳氣已經驗方活鯽魚一尾去鱗肥皂一個去子右同鯽魚碎搗如泥傳於腳痛處用絹包之即愈枳殼散疏導毒氣枳殼製五兩甘草炙一兩半右為末每服二錢濃煎木瓜湯調下如要快利便更加麻仁仙靈丸治腳氣久不瘥冝服神效葳靈仙乾者半斤牛膝半斤右為細末酒糊丸如梧子大每服五十丸空心木瓜酒下牛膝酒治腳氣冷著厚綿衣蓋覆不覺暖者生牛膝生地黃各半斤右搗如泥作團以紙褁外更以黃泥固濟微火炙泥有裂處待乾即於地爐中灰火養半日漸漸灰火燒之加至火三斤燒一復時取出候冷去泥紙搗羅為散每服五錢酒一盞半以瓷器煎七分和滓食前頓服之老小如意加之仙术木瓜丸治腳氣蘇生瑩叟與楊梅卿云親曽得效右用宣州大木瓜三箇去皮切下蓋剜了用青鹽六兩許放在三箇木瓜內於飯甑上蒸三四次研爛先須以蒼术二斤米泔浸三日取出黑豆一升汲取長流河水攪淨二味同煮以水乾為度去黑豆不用只將蒼术切作片焙乾再入白茯苓六兩同碾為細末却以研爛木瓜為丸如梧子大每服五十丸空心溫好酒鹽湯送下一月有效治腳氣右用豉三斗蒸一石米下暴乾如是三上以酒五斗浸漬之七日去滓飲惟醉為佳酒內更以二斗米浸漬之飲如初神授方治腳氣神效右用木鱉子每箇批作兩邉麩炒炒畢切碎再炒用楮皮紙滲盡油為度每服一兩用肉桂一兩同為末合熱酒調服以醉為得蓋覆得汗即愈一方名夢中神授方神效膏治腳氣膝腫痛攣縮不可行右用不蛀皂角一挺灰火中煨去皮核為細末却入平胃散半帖米醋調敷腫痛處立效或有用者先以生鐡稱鎚煆紅淬米醋中以熱氣熏痛處少定再以萆麻子數粒研細貼腳心下然後傅藥蘇千之運幹染此疾親用之及傳他人皆驗得之於蕪湖轉般倉中一納米人治腳氣右用五積散每服加檳榔一枚切碎依法同煎服藥之後用被蓋覆令腿股間少出汗為佳一方加木瓜並吳茱茰煎如赤腫加大黃以利為度治腳氣右用四味理中丸去人參增紅麯每服二錢白湯點服或蜜丸亦得空心服神效治腳氣右用木瓜去瓤實以十華散同蒸候熟一處細研如或覺爛即添散以丸得為度如梧桐子大每服三十丸用溫酒鹽湯下治腳氣右用䜴酒浸以滓傅腳愈治腳氣右用生附子一箇去皮碾細乾柿十枚去蒂不切以好無灰酒三升於砂石器或銀器內煮候酒乾取去即研爛蒸餅和令燥濕得所丸如梧桐子大每服三十丸於空心鹽酒下一方臨睡冷水下三十丸烏藥酒治腳氣發動鄉村無處問藥恃此效右用土烏藥即是矮樟樹根取如蘿蔔者不用鐡器亦不須過水乾漉布揩淨用磁片刮屑收於磁器內盛如飲得酒一升或半升取出酒浸一宿次日空心時磁器熱湯上坐溫服有麝香入少許尤妙一服即安妥無麝香多服後溏泄病去治腳氣右用赤小豆五合葫蘆一箇生薑一塊商陸根一條以水煮豆爛為度去滓細嚼豆子空心食之旋旋啜其汁咽下腫立消便愈桃紅散治腳氣舉發立止右用帶莭蘇木不拘多少為細末每服三五錢以水二盞煎至一盞半和滓空心熱服乾物壓之若進至三服至老不發至驗方右用續命湯須兩料候遍身得汗如續命湯香疾乃可去體有宜興王侍郎之孫為歸安縣尉三世並有此疾皆服之去根方見中風門治腳氣不問逺近右用紫蘇飲子加黑牽牛白芷破故紙木瓜川練子一同煎吞騙馬丹治一切氣及腳氣右取食鹽三升蒸候熱分裹布囊腳踏之令腳必熱或又取食鹽和槐白皮蒸夜尉亦良治腳氣右用赤小豆和鯉魚爛煮食之别有諸治具載在魚條中散氣去關莭煩熱令人心孔開如止小便數菉豆赤豆皆可用暴利後氣滿不能食煮一頓服之即得愈治腳氣右用孔子蘗二斤石斛五兩酒二斗浸服之治患腳氣右用良薑每早任意頓食午後少食日晚不食如飢亦可食豉粥若暝不消欲致霍亂者即須以髙良薑一兩打碎以水三升煮取一升頓服盡即消待極飢時乃食一碗白粥其藥惟極飲之良若卒無良薑以母薑一兩代之以清酒一升煮令極熱和滓飲之雖是不及良薑亦有效矣治腳氣右用五積散三兩加荆芥五錢蔥白五根熬湯先熏之後洗腫腳疼仍用膏藥貼之就以藥水烙痛處極其妙屢用有驗五積散方見感冒門治一切腳氣右用榖白皮五升炙勿取斑者有毒取水一斗半煮之取一升去滓煮米粥常食之木瓜丹治腳疼重不能逺行久立常服補腎氣調血脈右用宣州木瓜一箇杜木瓜大者亦可用取去穰膈旋切出蓋子用好艾填在木瓜內須滿實却用蓋子上覆竹簽之放定飯甑上蒸爛次再入羌活一兩及獨活二兩附子半兩同炮為末先杵木瓜令爛次下前藥末搗成膏丸如梧桐子大食前溫酒或鹽湯下每三五十粒治腳氣用蜈蚣瓢搗碎取汁刷之佳治腳氣右用紅豆擂爛用生薑汁熱調之敷痛處治腳氣右用五積散去麻黃乾薑排風湯沉香附子湯及烏藥順氣散去麻黃乾薑酒浸數日為末如梧桐子許大每服五六十丸溫酒送下治腳氣右用赤小豆南星末生薑汁調敷之烏麻酒右用烏麻五升微熬搗碎以酒一斗漬之一日隨量取飲之盡更作甚良治腳氣右用生料五積散一貼蘇木半兩煎湯有顔色去滓淨即用蘇木水煎五積散加木瓜米半兩木香一錢又爐香一錢入藥同煎食前服全蝎地龍丸專治腳氣殭蠶半兩地龍二兩全蝎十四枚川山甲半兩黑牛豆二十二粒赤足蜈蚣一條草烏半兩右為末糯米醋炙糊為丸如菉豆大日間每服十五丸麝香酒送下臨卧時以壁土及香白芷為末冷水調敷疼處米醋尤妙吃罷如人行四五里後以荆芥湯煎茶喫一錢藥即行無忌天門冬煎丸治腳氣生天門冬三升半枸把根三斗半酥三升鹿髓一升牛髓一升生地黃三升半右六味先將天門冬枸把地黃三味搗汁以水一石入大釡中煮取五斗三升却入鍋中重煎至一斗收入銅器中入後藥桂去粗皮白术萎㽔菖蒲逺志澤㵼山芋人參石斛牛膝杜仲細辛蔓荆實獨活枳殼芎藭黃耆肉蓯蓉續斷狗脊蓽􅐺白芷巴戟天五加皮根覆盆子陳橘皮胡麻仁大豆捲白茯苓各二兩甘草石楠葉柏子仁各一兩阿魏十兩鹿角膠五兩薏苡仁一兩蜀椒一兩大棗一百枚右三十七味為末內前三味煎中更入鹿髓牛髓酥等重湯煮攪勻可丸即丸如梧桐子大每服二十丸空心溫酒下加至四十丸此藥冝服於臘月王相日修合若小便澀去柏子仁加秦芄二兩地黃六兩若隂萎再加五味子二兩若頭風去柏子仁加菊花防風各二兩若小便和隂氣弱去細辛加防風山茱茰各二兩若腹中冷去防風加乾薑二兩如臘月修合經夏至七月下旬即服之當於舍北入地深六尺填沙置藥沙中上加土覆之婦人如有舊患熱者冝服冷者不宜時服見效治腳氣右用生香草連根煎湯薰洗木瓜散治腳氣大腹皮紫蘇乾木瓜甘草木香羌活右㕮咀分作三服每服水二盞煎至一盞通口服鹿茸煎方治下元虛􅉵而受證者宜飲之右用鹿茸三錢燒灰為細末作一服好酒調空心時服五積散一兩加馬藺子荆芥子各五分水十升熬至數沸去滓以盆盛水先炙熱上金絲萬應膏藥貼緊在痛處腫處放腳在盆上如法安定蒸熏熱氣隨即用手拍蘸藥水趂熱於膏藥淋烙以熱為上如水微溫再以火上燒熱又熏又烙如此三五次則痛頓覺減矣其效如神後加五味流氣飲子服之或用木香流氣飲子方見諸氣門每服四錢加木瓜石菖蒲川牛膝乳香沒藥各一錢為一處令勻作一服以水二盞生薑五片棗一枚同煎至一盞去滓空心服滓渣再煎連進數服犀角旋復花湯治腳氣疾得之有漸或微覺疼痺或覺兩脛腫滿或行起澀弱或上下腹不仁或時冷熱小便祕瀝喘息氣衝氣急欲死食嘔不下氣上逆者皆其候也若覺此證先與此藥犀角旋復花各二兩橘皮茯苓生薑各三兩大棗七枚香䜴一升紫蘇莖葉一握右㕮咀以水八升煮取二升七合分三服相去十里再服之以小便利為度一方若小便澀者加桑白皮炙銼二兩又方出聖濟總録治腳氣吳半夏三兩生薑汁二升右二味用水五升煮取二升去滓一服盡每日一劑三劑必好禁羊肉餳治腳氣初覺著腳右用香豉一升小便一升和漬少時令有稠色去滓至平旦空腹服日三未愈復作服以瘥為度治氣滯風壅手臂腳膝疼痛右用酢糟裹之三兩易當瘥牛膝丸治腳氣草烏荆芥續斷蓽薢牛膝破故紙骨碎補黑牽牛香附子當歸川練子何首烏赤小豆石楠葉防風芍藥烏藥地黃木瓜右等分為末酒煮麵為丸每服三十丸空心鹽酒湯下三香散治腳氣檀香麝香穿山甲沒藥白膠香紅麯川烏全蝎右為末每服二錢空心溫酒調下又方小續命湯石榴丸右入木瓜內蒸九次杵和成膏為丸每服三十丸用木瓜湯調下治腳氣痛入腹右用杜仲烏藥同雞子瓦磁中煮一日藥透取雞子出切片蘸鹽煎散末服效七聖散治腳氣平胃散丁香平胃散棗肉平胃散木香勻氣散沉香降氣湯復元通氣散流氣飲每服一貼右用八角茴香麝香大蒜去心皮用火醋調麵火煨候蒜香熟取出蒜臼杵拌和前藥如梧子大用茶芽與燈心同煎湯空心下一連三服頃刻移步見效敷貼腳氣藥大戟茱茰大黃官桂右等分為細末酸醋調敷痛處草烏丸治腳氣草烏五兩水浸全蝎五七枚右為細末煮清糊候冷入麝香少許為丸如梧桐子大每服十丸空心溫酒下極妙木瓜敗毒散治一切腳氣右用宣木瓜一枚無則尋常木瓜亦可去穰入㕮咀以自合敗毒散實其中入酒調藥蒸熟將瓜切片曝令乾同敗毒散入水煎空心服平胃散治腳氣用平胃散一貼入大蒜研爛服之有效蒼芎千里飲治久近腳氣蒼术乾木瓜白芍藥川芎人參枳殼白茯苓甘草大黃陳皮半夏桔梗各二錢前胡乾葛紫蘇木香各三錢右㕮咀每服二錢水一碗半生薑七片煎至一碗去滓食前溫服如服此藥先用大蒜三頭剝去皮洗淨擂細捻作餅子貼所患腳心外用絹帛傅之覺腳心微有蒜氣便溫前藥頓服象守紀智立傳親見劉監稅用之取效木瓜散治腳氣鷺鷥藤木香赤芍藥各一錢右用香蘇散一帖同煎去滓服四製丸治腳氣製蒼术二兩乾木瓜一兩好酒一升煮乾蒼术一兩木瓜一兩水一升入鹽二兩煮乾為度右用瓦器煮焙乾為末酒糊丸如梧子大空心溫酒下三五十丸婦人醋湯下牛膝湯治腳氣有驗牛膝一斤白茯苓人參各一兩當歸半兩右為細末酒調服又方專治腳氣右用敗毒散加木瓜煎服加味火扻丸治陽證腳氣火扻草九斤枯松枝二兩石楠枝一斤萆薢半兩石膏三兩右為末醋糊為丸每服三十丸空心服虎骨丸治腳氣兩腿腫行步艱難蒼术防風萆薢杜仲各三兩虎骨金毛狗脊二兩去毛右件為細末酒煮麵糊為丸如梧子大每服五十丸湯酒任下石楠丸治腳氣痛楚不可履地石楠葉一兩淡木瓜一兩烏藥一兩續斷一兩綿黃耆一兩黑狗脊一兩地龍一兩川烏半兩右件為細末酒糊丸如梧桐子大每服十丸加至二十丸服久加至三十丸空心食前溫酒吞下如疼痛不堪忍者煎木瓜湯下寬筋丸治風壅氣道不宣筋脈拘攣難以屈伸兼治腳氣疼癢防風荆芥麻黃乾木瓜獨活各一兩牛膝半兩右銼碎用好酒浸二宿漉出焙乾為末草烏頭二兩黑豆一兩用水五碗煮令乾去豆薄切烏頭焙乾亦為末和勻醋糊丸如梧桐子大每服十丸漸漸加至二十丸溫茶好酒食後服蒼术羌活湯治腳氣無力沉重羌活三錢防風根一錢半柴胡七分半升麻一錢獨活一錢葛根一錢熟甘草半錢黃耆二錢蒼术一錢橘皮六分縮砂皮一錢草豆蔲皮半錢黃柏半錢知母二分半生甘草梢半錢右分作二服水三盞煎至一盞去滓熱服鐡角丸治久新腳氣膝脛腫痛腳心隱疼行步艱難或攻衝作瘡膿血不止鐡角葳靈仙黑牽牛草烏頭陳橘皮金鈴子右件各等分為細末酒煮麵糊為丸梧子大每服十丸至十五丸空心用白湯送下以少點心壓之忌溫麵並茶等物加減小續命湯治男子婦人腳氣何首烏四兩川牛膝一兩草烏半兩右為細末先用木瓜二箇好酒二升小鍋煮十分爛去皮穰研和前藥硬燥用煮木瓜酒添搜丸梧子大每服三四十丸酒下常服除根芎仙丸治久新腳氣腿膝腫痛或攻注生瘡川烏十兩白芍藥五兩葳靈仙三兩右件為細末用蘿蔔自然汁打麵糊為丸如梧子大每服五十丸再用蘿蔔自然汁少許同溫酒半盞送下空心臨睡服忌茶療腳氣方附子甘草各五兩右二味同細銼以水五斗煎取二斗半置盆中以板子濶三寸許橫湯上共水面平腳踏板上以湯將腳浴水冷即休此湯得四五度用腳氣永除此方多驗敗毒散治三陽脛腫腳氣踝上赤痛寒熱往來人參茯苓甘草前胡川烏羌活獨活桔梗柴胡枳殼各等分右㕮咀薑薄荷煎熱服加蒼术熱多加大黃芒硝行氣散治血氣不和腳氣頻發不問冷熱及補藥云腳氣無補法者非也大疏通紫蘇香附各二兩陳皮一兩甘草半兩木瓜烏藥檳榔蘇木羌活蒼术各半兩右㕮咀薑蔥煎熱服推氣丸治腳氣作吐飲食不進大便不通手心熱口舌燥大黃枳實青皮檳榔黑牽牛生各一兩麻仁一兩半右為末以麻仁碾為膏取藥末一兩同拌再碾用絹羅過去滓却將麻仁和入餘藥用不蛀皂角煮汁麵入汁作糊為丸如梧桐子大每服四五十丸熟水下得利即止順氣丸治腳氣欲發大便先閉大黃五兩半車前子檳榔麻仁牛膝郁李仁兔絲子山藥各二兩防風山茱茰枳殼獨活各一兩右為末蜜丸如桐子大茶酒米湯任下此藥補益通利疏風順氣如虛弱人難服推氣丸冝服順氣丸烏白散治腳氣發則腳骨痛苦甚者竒妙草烏四兩桑白皮八兩右㕮咀水三升煮豆一升去滓好酒和藥水溫服用瓦瓶忌鐡器李降兵部手集方著此法云昔有人患腳氣服此得效出風科集驗方右用赤小豆作袋置足下朝夕輾轉踐踏之其疾遂漸愈赤主丹毒檳榔丸治腳氣攻衝腿膝腫痛檳榔赤芍藥白术當歸陳皮青橘皮烏藥上七味各一兩甘草炙半兩右件搗細末麵糊為丸如梧桐子大每服七十丸空心食前熟水下木瓜丸治腳氣極效破故紙川萆薢乾木瓜杜仲茯神茴香川牛膝右為細末麵糊為丸如梧子大湯酒任下全蝎丸治腳氣檀香一錢麝香川烏各二錢沒藥紅麯五錢白膠香五錢穿山甲三錢全蝎一錢右麵糊為丸每服三十丸空心溫酒下烏靈丸治男子腳氣不能伸屈及癱瘓手足不隨烏草一方草烏烏豆各二兩用好醋浸葳靈仙各一兩右並為末醋煮麵糊為丸如梧桐子大病上食後溫酒吞下病下空心服十丸至二十丸烏藥丸治腳氣徹骨痛不能行履者不過三服見效木鱉子白芍藥草烏葳靈仙北細辛沒藥右等分為末薄糊為丸如梧子大每服七丸至十丸食後木瓜湯下或酒下亦可以身上覺麻痺即是效或未效可添十五丸量虛實不可妄增丸數亦不可於食前服之有草烏頭在其間最忌服後以熱食物衝動烏頭毒則昏不知人矣地黃湯出朱氏集驗方治穿心腳氣熟地黃四兩川當歸二兩芍藥川牛膝三奈子杜仲半兩右㕮咀每服三錢水一盞半煎至八分不時服地仙丹治男子婦人陽證腳氣痛錢子地龍五靈脂天台芍藥白膠香葳靈仙木瓜赤小豆黑豆天仙藤淮烏五加皮木鱉子蒼术樹紅右等分為細末酒糊為丸如梧桐子大每服七十丸空心鹽酒湯任下雞鳴散治腳氣第一此藥不問男女皆可服如人感風濕流注腿足痛不可忍用索懸吊呌聲不絶筋脈腫大檳榔七枚陳皮木瓜各一兩吳茱茰二錢桔梗半兩生薑半兩紫蘇莖葉三錢右為粗末分作八服隔宿用水三大盞慢火煎留碗半去滓留水二碗煎滓取一小碗兩次以酒煎汁相和安頓牀頭次日五更分二服只是冷服冬月略溫亦得服了用餅餌壓下如服不盡留次日漸漸喫亦可服此藥天明大便當下一碗許黑糞水即是原腎家感寒濕毒氣下來也至早飯前後痛漸住只是放遲喫物候藥力過此藥不是空藥並無所忌治腳氣流注四肢指莭腫痛不可屈伸法當先服搜風麻木之劑然後服此藥婦人尤宜川烏當歸芍藥附子右等分以薑十片煎空心服之檳榔湯出淡寮方治腳氣順風防壅檳榔香附子陳皮紫蘇木瓜五加皮甘草炙各一兩右㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服婦人腳氣多由血虛加當歸半兩室女腳氣多由血實加赤芍藥一兩半大便祕結虛弱者加枳實壯熱者加大黃並不拘時一方治腳氣衝心大便祕澀冝服三和散亦曽有人加杜仲烏藥春夏常服腳氣遂不復作亦妙方也治腳氣出本草方右以巴戟天兩半糯米同炒微轉色用大黃一兩銼碎炒同為末熟蜜為丸溫米湯服五七十丸有人嗜飲酒日須五七杯後腳氣甚危或教以此方仍禁酒疾遂愈治腳氣衝上小腹急硬右以田螺煮食之腳氣丸治一切腳膝沉重疼痛腫滿川烏取末五兩木瓜二枚牛膝七錢巴戟七錢青鹽一兩肉蓯蓉一兩天麻一兩防風一兩半海桐皮一兩半甘草萆薢金毛狗脊半兩去毛右件先將木瓜用竹刀切下蓋子剜去子却填熟艾末令滿將蓋子蓋定用竹簽簽住入飯甑內蒸爛將烏頭末同木瓜研勻次將藥為細末用和為丸如梧子大每服三十丸至五十丸空心溫酒送下一方兼治婦人産後腳軟行履不得筋骨疼痛加羌活乳香沒藥三味各一兩治閉結并腳氣方大螺右一味搗用神驗饒醫熊産誠年五十五嵗病前後便閉不通五日腹脹如鼓同輩環視皆不能措力與西湖妙果僧慧月相善遣信邀致訣别月驚馳而往過釣橋逄一異客風姿瀟灑出塵揖之曰方外髙士何孑孑走趨如此曰一善友患結勢不可療急欲往問客曰此易事也待奉施一藥即脫鞋入水探一大螺而出曰事濟矣持抵其家以鹽和生搗碎置病者臍下一寸二分用寬帛緊繫之仍辦濁器以須其通月未深以為然姑謝之熊昏不知人事妻子涕泣諸醫知無他䇿漫以試之曽未移席忽然暴下醫愧嘆而散月歸訪異人無所見矣熊後十六年乃終白石董守約以腳氣攻注為苦或教之捶數螺傅兩股上便覺冷氣趨下至足既而亦安療腳氣破冷氣痃癖右取鯉魚鱗用絹裹和魚煮羹熟後去鱗食之驗治腳氣出本草右以麋皮作鞋穿治腳氣出本草右以紅草為湯浸之治腳氣出本草右以枕材煮湯浴浸之治腳氣風氣諸惡氣右以鯉魚大者洗去泥開肚以椒末半兩切碎大蒜三兩顆內魚腹中縫合并和小豆一升煮之臨熟下白蘿蔔二五顆如指大切蔥一握煮熟空腹食之并小豆等強飽盡食之至夜即泄氣無限三五日更一頓食并下一切惡氣普濟方卷二百四十
