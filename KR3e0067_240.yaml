body:
  text: 普濟方卷二百四十明周王朱橚撰脚氣門一切脚氣附論夫脚氣之疾實水濕之所為也盖濕之害人皮肉筋脉而属於下然亦有二焉一則自外而感一則自内而致治法自應不同南方地下水寒濕清之氣中於人必自足始故經曰清濕襲虚則病起下或者難曰今兹北方其地則風土髙寒其人則腠理緻宻而復多此疾者豈是地濕之氣感之而然耶答曰南方之疾自外而感者也北方之疾自内而致者也何以言之北方之人常食潼乳又飲酒無莭過傷而不檢且潼乳之為物其氣味則潼乳其形質則水也酒醴亦然人之水糓入胃胃之氣蒸騰其氣與味宣之經絡化之為血外營四肢内注五臓六腑周而復始以應刻数焉謂天地之紀此皆元氣充足脾胃之氣無所傷而然也茍元氣不充則脾胃之本弱飲食自倍則脾胃之氣有傷既不能蒸化所食之食其氣與味亦不能宣洩旁通其水之性潤而致之其自外而入者止於下脛腫而痛自内而致者乃或至於手莭腫也經曰足脛腫曰水太隂所致為重跗腫此但即其自外者言之也所治之法前人方論偹矣自内而致者治法則未有也楊大受云脚氣是為壅疾治法當以宣通之劑使氣不能成壅也壅既成而盛者砭惡血而去其腫勢經曰蓄則勢腫砭則去也後以藥治之醫學發明論云經論南方其地下水弱為霧露之所聚也江東嶺南皆如此春夏之交山水蒸欝風濕毒氣為甚足或感之遂成瘴毒脚氣其後則身先屈弱至痺疼脛腫小腹不仁頭痛心煩痰涎腫逆時作寒熱便溺不通甚者攻心而勢迫治之誠不可緩有法存焉所以留意經方便善心術者豈非江左嶺表此疾得之多與外臺云南方脚氣者一忌嗔嗔則心滿煩則脚氣發第二禁大語語則傷肺亦發動不得乆露足當風入冷水洗脚兩脚脛尤不宜冷雖暑月常須着脚袴至冷寒倍令兩脛温暖微汗大佳依此将息氣漸薄損毎至寅丑日割手足甲割少侵肉去氣夏日腠理開不宜當風臥睡覺令人按挼勿使邪氣稽留数勞動骨莭當令通暢此盖養生之要拒風邪之法也尋常冇力無力食後行三五百歩疲倦不止脚中惡氣隨即下散雖浮腫氣不能上也東垣法外䑓總録所録皆謂南方卑濕霧露常聚之地其民腠理散陽氣不能外固因而履之則清濕襲虚病起於下此由血氣虚弱受清濕之邪氣與血並行於膚腠邪氣盛正氣少故血氣澁澁則脾虚虚則弱故令脾弱也後人名曰脚氣針經云有道以来治之多灸滿灸為佳以引導濕氣外出及醪醴以通經散邪所治之法方藥少熱藥多用麻黄川烏薑附之属内經曰濕滛於外以苦發之麻黄苦濕發之者也川烏辛熱走而不能守通行經絡薑附辛甘大熱助陽而退隂亦散清濕之邪又察足之三隂三陽是何經絡所起以引用藥為主治審之六氣中何氣所感治以佐使之藥孫真人云醫者意也隨時増損物無定方真言哉異法方宜論云北方者其地髙峻風寒水洌其俗飲潼酪而肉食凡飲潼酪以飲多飲速者為飲經云太飲則氣逆又云食入於隂長氣於陽今反行隂道是逆也夫乳酪醇酒濕熱之物飲之属也如此奉養太過亦滋其濕水性潤下氣不能拘故下注於足經積乆而作腫滿疼痛此飲食下流之所致也通評虚實論云糓入多而氣少濕居下也况潼酪醇酒之濕熱甚於糓者也至真大要論云太隂之勝火氣内欝流散於外足脛跗腫飲發於中跗腫於下此之謂也故飲受於胃逰溢精氣下流於脾脾氣散精上歸於肺通調水道下淪膀胱水經四部五經並行合於四時五臟隂陽發度以為常也若飲食自倍脾胃有傷則胃氣不能舒化脾氣不能四布故下流乘其肝腎濕熱注於足脛加之房事不莭陽虚隂盛遂成脚氣孫真人云古人少有此疾自永嘉南渡衣纓士人多有之亦此意也診其脉浮而緩者起於風濡弱者起於濕洪而数者起於熱緊而濇者起於寒風者汗而愈濕者熏而愈仍利小便熱者下而愈寒者發散而愈凡得脚氣速冝針灸惟用湯淋洗者醫之大戒也觀夫脚氣皆由腎虚而生然婦人亦有病脚氣者必因血海虚乘宿塊嗔怒憂悶哀感悲傷遂成斯疾兼今婦人病者衆則知婦人以血虚而得與男子腎虚類矣治婦人之法與男子同藥固無異但兼以七情之藥治之無不效矣治脚氣古無補法多貴乎利然亦須順四時補㵼之法可矣春微瀉後微滋補不然則血氣日衰必使年年遇蒸熱而作理之必然也治法大槩無越於此又加以四時謹於調攝又不得乆坐立於冷濕之地暑月亦不可露坐濕處能慎於此依法隨証治之無不瘥矣風毒中人随處皆得作病何偏著於脚也曰夫人有五臟心肺二臟經絡所起在手十指肝腎與脾三臟經絡所起在足十指夫風毒之氣皆起於地地寒暑風濕皆作蒸氣足常履之所以風毒之中人必先中脚乆而不瘥遍及四肢腹背頭項也微時不覺固滯乃知經云次傳足間是也脚氣病皆由感風毒所致得此病多不令人即覺㑹因他病一度乃始發動或奄然大悶經兩三日不起方乃覺之諸小庸醫不識此疾漫作他病治之莫不盡斃始起甚微食飲嬉戯氣力如故惟卒起卒屈弱不能動有此為異耳黄帝云煖風濕痺是也故有脚未覺異而頭項臂膞已有所苦有諸處皆未知而心腹五内已有所困又風毒之中人也或見食嘔吐憎聞食臭或有腹痛不利或大小便秘澁不通或胷中衝突不欲見光明或精神昏潰或喜怒迷妄語言錯亂或壮熱頭痛或身體酷冷或覺轉筋或欲腫不腫或肢腿頑痺或時緩縱不隨或復百莭攣急或小腹不仁此皆脚氣状貌也婦人亦爾又有婦人産後春秋取凉多中此毒深冝慎之其氣悶掣瘲驚心煩嘔吐氣上皆其候也又但覺臍下冷痛愊愊然不快兼小便淋瀝不同平時即是脚氣之證凡四時之中皆不得乆立乆坐濕冷也亦不得因醉酒汗出脫衣鞋襪當風取凉致得脚氣若暑月乆坐乆立濕地者則熱濕之氣蒸人經絡病發必熱四肢酸疼煩悶若寒月乆坐立濕冷者則冷濕之氣上入經絡病發則四肢酷冷轉筋若當風凉得之者病發則皮肉頑痺諸處瞤動漸漸向頭上忽然暴痛若人皆不能忍者當於熱時必不得頓取於寒以快意也卒有暴寒復不得受之皆生病也故風毒中人或先中手足十指因汗毛孔開腠理通風如急箭或先中足仆跌或先中膝已下足脛表裏若欲使人不成病者初覺病時即灸所覺處二十三壮因此即愈不復發也黄帝云當風取凉醉已入房能成此疾問曰何故得者有冷有熱答曰足有三隂三陽寒中三陽所患必冷暑中三陽所患必熱故有表裏冷熱不同熱者治以冷藥冷者治以熱藥以意消息之脾受陽毒即熱頑腎受隂濕即寒痺雖患脚氣不防乳石動發皆須服壓石藥療之夫因患脚氣遂生諸病者則以諸藥恭治之小便不利則以茯苓及諸利小便藥治之大便極硬則以五柔麻仁丸等治之遍體滿腫成水病者則取治水方中治水之藥治之餘皆倣此更無拘忌凡小覺病後有異即須大服快意之劑急治之緩則氣上入腹胸脇逆滿氣上肩息急者死不旋踵寛者数日必死不可不急也但㸔心下急氣喘不停或自汗数出或乍寒乍熱其脉促短而数嘔吐不止者死千金論云凢人患脚氣不自知則於後因有他病發動治之得瘥有人直患嘔吐而復脚弱余為診乃告為脚氣病者曰某平生不患脚腫何因名為脚氣不肯服湯余醫以為古法狐疑之間不過一旬而死故脚氣不得一向以腫為名亦有腫者有不腫者其小腹頑痺不仁者脚多不腫小腹頑痺不過三五日即行嘔吐者名脚氣入心如此者死在旦夕凡患脚氣到心難治以其腎水尅火故也凡脚氣雖復診候多途而三部之脉要須不違四時者為吉其逆四時者勿治本其人黒痩者易治肥大肉厚赤白者難愈黒人耐風濕赤白不耐風濕人肉硬却風人肉軟則受風至深難愈脚氣證狀貌固多但當以診脉分隂陽使無差誤謂脉浮為風𦂳為寒緩細為濕洪数為熱見於諸陽病在外冝發散之沉而弦者為風沉而𦂳者為寒沉細為濕沉数為熱見於諸陰病在裏宜温利之外證自汗走注為風勝無汗疼痛攣急為寒勝腫滿重著為濕勝煩熱頑痺為暑勝四氣兼有但推其多者為勝治之當以諸證之辨而分表裏寒則温之熱則凉之在表則散在裏則下方二十四味輕脚丸出直指方治脚氣通用當歸川芎萆薢羗活杜仲石楠葉薏苡仁華隂細辛枳殻鷄心㯽榔蒼术五加皮防風續㫁獨活牛膝葳靈仙海桐皮木香木𤓰麻黄川五靈脂沒藥滴乳香右為末酒浸雪糯為丸桐子大毎服五十丸細剉辣桂荆芥穂食前煎湯下或枳殻木𤓰煎湯下又方出本事方治脚氣毒遍内外煩熱不解口中生瘡狂走毒厲及解中諸熱攣毒邪熱卒黄等解蠱毒鬼魅野道熱毒又治小児驚癎熱病寒水石石膏磁石滑石已上四味各三斤元參一斤羚羊角五兩升麻五兩丁香一兩木香半兩甘草八兩朴硝精者三斤硝石好者二斤朱砂三兩研細麝香當門子右各細研為末毎服一錢匕或二錢冷水調下大人小兒仔細加减食後服透骨丹出醫方集成専治脚氣川烏一兩羌活二兩白茯苓二兩乳香一兩㯽榔木香各一兩半川芎木𤓰沉香各一兩右為末用麵糊丸如梧桐子大毎服六十丸薑湯下毎於食前服一方無川芎捲柏散出楊氏家藏方治逺年脚氣難治此方特效體虚人减半服一法治寒濕脚氣腫痛不能履地黒牽牛甘遂㯽榔已上各等分捲柏随用右為末不得稍雜毎服毎味各一錢惟㯽榔末二錢五更初濃煎葱白湯下至辰已時取下惡物如魚凍吃淡粥病安便冝服藥大腹皮三兩紫蘓子㯽榔各一兩乾宣木𤓰二兩半荆芥穂烏藥橘紅蘓葉各一兩蘿蔔子半兩沉香三兩桑白皮枳殻各一兩半右剉散毎服三錢薑五片煎不時温服獨活湯出直指方治脚氣羌活麻黄熟附子生乾薑川烏牛膝白芍藥白茯苓黄耆人參杜仲甘草辣桂當歸白术木香各等分右麄末毎服三錢薑五片棗二枚同煎吞活血應痛丸活血應痛丸出和劑方治風濕客於腎經血脉凝滯腰腿重疼不能轉側皮膚不仁遍身麻木上攻頭目虚浮耳内常鳴不住蒼术六兩炒香附七兩威靈仙二兩陳皮五兩半沒藥一兩草烏頭二十四兩枸把四兩右為末酒麵稀糊為丸如梧子大毎服二十丸用獨活湯下兼治腎受風寒脚氣酸疼及久痢登厠風冷入於腸胃以致兩脚削小成皷搥風而痢又不止用此藥搜風散出醫方集成治脚氣愈後可常服之白芷川芎茯苓甘草芍藥當歸各一兩陳皮厚朴枳殻白术各二兩乾薑麻黄各三兩桔梗一兩半蒼术十一兩肉桂一兩右㕮咀毎服三錢水一盞姜四片煎服除脚氣出本草右以鈎樟木作履主脚氣出本草右以靈床下鞋履之紫金皮丸出海上方治脚氣不問逺近紫金皮黒豆防風白膠香石膏白蒺䔧骨碎補各二兩川烏一雙二兩五月蠶沙四兩右為末煉蜜丸如鷄頭子大毎服半兩細嚼用生薑湯下木𤓰散出醫方集成治脚氣大腹皮紫蘓羌活木香茯苓陳皮甘草炙各半兩宣木𤓰一兩右㕮咀毎服三錢水一盞薑棗煎服一方加㯽榔白术川芎沉香即沉香三和散一方無陳皮茯苓用水煎服降氣湯治下部閉不通并治脚氣右取雚蒴根一把搗汁水和絞去滓强人服一升数数用之治脚氣出本草右以猪肝切作生空心以薑醋進當微洩若先利勿用服三香丸治脚氣妨悶不下食痩弱腹痛木香㯽榔各二兩鷄香呉茱茰當歸陳橘皮訶梨勒皮生薑各一兩半右為細末煉蜜和丸如梧桐子大煎陳皮湯下三十丸蓯蓉牛膝丸治脚氣肉蓯蓉川牛膝天麻木𤓰枸杞子黄耆真虎骨青鹽已上各二兩右都拌匀将前項浸藥酒入麵糊為丸如梧子大焙乾毎服三五十丸温酒白湯空心食前吞下㯽蘓散治脚氣初發服此藥去風温及損欝氣脉多服不傷人香附子半兩甘草二兩陳皮紫蘓各三錢木𤓰二錢半右為粗末毎服五錢水一盞半或加生薑五片煎七分空心食前服如大便秘滯加大黄㯽榔各二錢半一方薑葱煎服黒豆煎膏出聖濟總録治脚氣黒豆五升桑白皮剉五兩羗活蒺䔧子海桐皮呉茱茰各半兩右取煎汁外搗羅為末入煎汁中以文武火煎成膏毎服一匙頭温酒化下空心食前服加减㯽榔湯治一切脚氣痛順氣防壅一方無香附子足痛而熱者加地骨皮煎脚氣名曰壅疾貴乎踈㯽榔香附子陳皮蘓葉木𤓰甘草五加皮右㕮咀毎服四錢水一盞半薑五片煎至八分去滓温服婦人脚氣多由血虚加當歸半兩室女脚氣多由血實加赤芍藥一兩半如大便秘結虚弱者加枳實壮盛者加大黄如脚痛不已復轉筋者加茱茰痰逆或嘔者加半夏小便不通加木通脚痛大便不通者用此湯送下青木香丸亦可木香丸治脚氣木香全蝎一兩白牽牛黒牽牛各半兩破故紙半兩半生半熟右為末内木𤓰中九蒸九曝研爛為丸炒茴香鹽酒下三十丸食前服黒錫丹出加直方治虚老人脚氣上攻牙齦腫痛口舌生瘡沉香葫蘆芭附子陽起石肉桂破故紙茴香肉豆蔲金鈴子各一兩錫硫砂子四兩右為末同砂子末酒和為丸如梧子大隂乾布袋摖令光瑩毎服四十粒空心薑鹽湯下枳實大黄湯醫學發明云昔有人體充肥脚氣始發頭面渾身肢莭微腫皆赤足脛赤腫痛不可忍不敢扶策手近皮膚其痛轉甚坐而復臥臥而復起晝夜苦楚難以名状乃北土髙寒故飲酒積乆傷脾不能運化飲食不流之所致投以當歸枳實一兩二錢其痛减半再服腫痛悉除止有右手指微赤腫以三稜針刺於爪甲端多出黒血赤腫全去不数日因食温麵肢體覺痛宜服此藥羗活當歸身枳實大黄右㕮咀只作一服水一盞半煎至一盞去滓温服空心食前利下兩行痛止夫脚氣之疾皆水濕之為也麵滋其温又添肢莭煩疼内經云風勝温羗活辛温透闗莭故以為主血滯不行則痛當歸辛温散壅止痛枳實苦寒治痞消食故以為臣大黄苦寒以導麵之温熱治諸老血留結取其駿駛故以為使也二仙散治氣不足者因乆坐乆立隂濕之地坐卧當風醉脱靴鞋皆成脚氣若暑月乆立温熱欝蒸榮滯不和發熱冬月寒天氣冷或發麻疼痛悶亂晴隂並皆發富貴之家亦有此疾蓬术元胡索蛤粉陳皮㯽榔末生薑切紫蘓陳橘右為末毎服二錢焼黒豆五十粒以湯一盞生薑三片煎至五分去滓調前藥服三和丸專治脚氣皂角破故紙黒牽牛核桃肉右為末酒糊為丸如梧桐子大毎服五十丸温酒下木𤓰湯亦可㯽榔湯治脚氣少府監韓正彦暴得手足不舉諸醫以風針灸臂揵不知痛孫兆作脚氣藥乃愈㯽榔石斛黒牽牛木𤓰右以水一大盞煎七分去滓稍熱服治脚氣衝心痛悶用童尿煎服治心患痛温酒調下治脚氣出本草右以鈎樟木作湯浴之治脚氣出本草右以毛蓼煎湯濯足曹公鍾乳丸治脚氣乆虚脉来沉細宜補煉成鍾乳粉三兩石斛二兩呉茱茰二分萖絲子炒二兩右除鍾乳粉外搗羅為末錬蜜和丸如梧桐子大毎服三錢食前以人參棗湯下如覺氣壅即服踈氣藥勿令太過赤小豆煎方出聖濟總録治脚氣赤小豆二升半杏仁桑根白皮剉各一兩生薑切一兩半右搗篩以水三升煎至一升半去滓更入茱茰半分蜀椒末半分再煎一兩沸冷如膏蜜収毎匙頭空心酒調服木𤓰丸治脚氣諸病乳香一兩甘菊花一兩青鹽二錢木瓜一枚右先破木𤓰作兩瓣去穰並子入乳香等三味在内却以綿繫定於瓶中蒸令爛熟研細成膏丸如梧桐子大毎服五十丸温酒下日三服病甚者更加丸数服百日汗香為驗脚膝等疾并可服雙香散出經驗良方治脚氣香蘓散五錢金鈴子三枚木香半錢右作一服水一盞半生薑三片棗一枚同煎至七分空心進二服大安補散出海上方治脚氣大附子一个桂末一錢粉薑末一錢右三味水二盞葱白三寸煎七分先喫葱白次服藥忌甘草十日千金散治脚氣兼治腎臟風攻注膝右用連州甘遂懸掛紙籠中却切川芎作片子如焼爐香熏之焼川芎盡将甘遂為末量病人虚實毎以三四錢或一二錢用獖猪腰一對去筋膜糁藥於内以濕紙裹煨熟臨臥細嚼以温酒送下盡量飲至醉却以物擱起兩足至明取下惡物水数升以茴香末糝煑粥次服大安補散烏頭丸出海上方治脚氣黒牽牛川五靈脂大烏頭右生為末糊為丸如梧桐子大毎服三十丸空心食前鹽湯服或酒任下木𤓰散專治脚氣乾木𤓰一兩紫金皮二兩香附子三兩右為末毎服三錢空心鹽酒調下五日見效日三四服椒囊出海上方治脚氣僕丁酉嵗在臨安約婺州親戚呉寛夫泛湖是時劇暑見其用火踏上置一布囊烘足叩其所以答云某脚氣之疾近得一方用川椒二三斤實於踈布囊中置火踏上跣足踏椒囊盖椒氣性熱辟去寒濕氣言甚有理用之月餘亦漸見效庚子嵗在淳安寛夫經過因問其疾云愈之已乆乃椒囊之力也不特某用之效傳之数親知皆無恙也真竒方壬寅再来臨安適於賓次中邂逅王成之時為都司見其用火踏亦有一布囊問之豈非椒乎云又添破開㯽榔并熟艾各三之一且云果是甚妙大抵足膝之病居下属隂又加寒濕隂益甚矣血氣惟冷凝結非至熱不可除今用川椒椒性熱復加以火蒸之自然寒濕去矣信乎處方之妙也蒜酒治初覺似有脚氣冝服蒜二升桃仁䜴一升右以生絹袋盛内净瓷甕中用好酒一斗浸宻封頭春夏五日秋冬七日初服半盞加至一盞惟量飲之日三四服當令有酒色更入酒五升加好椒一二合用良牽牛子散治脚氣甘遂黒牽牛右為末以猪腰子去膜竹刀批開内藥於瓦瓶中煎熟用白酒調二錢中嚥腰子酒醒痛止又方右用蝦蟇藤一束暴乾為末用鹽及白酒一盞加水二盞先将藥末水調頻攪花謝却将前藥酒調開併作一服次用後藥鳯尾草四錢大黄一錢炒右為末将二味和勻卧用時侵晨将魚鮓蘸藥末喫要飽候吐痰為度然後服後藥前胡麻黄杏仁桔梗半夏茯苓甘草生薑右為散加桑白皮水煎服之乳香木𤓰丸專治逺年近日脚氣乳香血竭右等分另研為細末用好木𤓰一个竹刀去皮心批取頂盖将末藥攪勻却用批下頂葢合續以麵裹之約半指厚於鍋内煮熟極爛為度連麵石臼内杵如泥丸如梧子大毎服三十丸漸加至四十丸空心温木𤓰湯送下乾物壓之忌動氣及生冷濕膩之物甘鱉散出本事方治脚氣連珠甘遂一兩木鼈去殻一雌一雄取好者右為末猪腰子二箇批開藥末一錢糁勻紙褁数重火煨熟放温五更初細嚼米湯下如左腿患則用左腰子右脚患則用右腰子藥末止須一錢毗陵有姓馬人鬻酒宿患腎臟風一足發腫如瓠自腰以下鉅細通為一律痛不可忍卧欲轉側用兩人挾持方可動或者欲以刀尖批之予用此方合藥以服至五更初細嚼米飲下至辰巳間下膿如水精者數升及明痛止腫退一月尚跛倚而行予再以赤烏散令塗貼其膝方愈後十年毗陵子率其子列拜以謝云向脚疾至今不復作并積年腎臟風亦已失去今速歩不難矣治脚氣兼治頭風香附子一兩甘草半兩右㕮咀毎服四錢水二盞帶鬚葱白五寸薑三片煎至八分通口服頭風食後脚氣食前服又方治脚氣舉發立止鷺鷥藤蒼耳草子右酒浸一宿放火旁次早喫先以草藤焼水熏洗治脚氣已經驗方活鯽魚一尾去鱗肥皂一个去子右同鯽魚碎搗如泥𫝊於脚痛處用絹包之即愈枳殻散䟽導毒氣枳殻製五兩甘草炙一兩半右為末毎服二錢濃煎木𤓰湯調下如要快利便更加麻仁仙靈丸治脚氣乆不瘥冝服神效葳靈仙乾者半斤牛膝半斤右為細末酒糊丸如梧子大毎服五十丸空心木𤓰酒下牛膝酒治脚氣冷著厚綿衣盖覆不覺暖者生牛膝生地黄各半斤右搗如泥作團以紙褁外更以黄泥固濟微火炙泥有裂處待乾即於地爐中灰火養半日漸漸灰火焼之加至火三斤焼一復時取出候冷去泥紙搗羅為散毎服五錢酒一盞半以瓷器煎七分和滓食前頓服之老小如意加之仙术木𤓰丸治脚氣蘓生瑩叟與楊梅卿云親曽得效右用宣州大木𤓰三箇去皮切下盖剜了用青鹽六兩許放在三箇木𤓰内於飯甑上蒸三四次研爛先須以蒼术二斤米泔浸三日取出黒豆一升汲取長流河水攪净二味同煮以水乾為度去黒豆不用只将蒼术切作片焙乾再入白茯苓六兩同碾為細末却以研爛木𤓰為丸如梧子大毎服五十丸空心温好酒鹽湯送下一月有效治脚氣右用豉三斗蒸一石米下暴乾如是三上以酒五斗浸漬之七日去滓飲惟醉為佳酒内更以二斗米浸漬之飲如初神授方治脚氣神效右用木鱉子毎箇批作兩邉麩炒炒畢切碎再炒用楮皮帋滲盡油為度毎服一兩用肉桂一兩同為末合熱酒調服以醉為得盖覆得汗即愈一方名夢中神授方神效膏治脚氣膝腫痛攣縮不可行右用不蛀皂角一挺灰火中煨去皮核為細末却入平胃散半帖米醋調敷腫痛處立效或有用者先以生鐡秤鎚煆紅淬米醋中以熱氣熏痛處少定再以萆麻子数粒研細貼脚心下然後傅藥蘓千之運幹染此疾親用之及傳他人皆驗得之於蕪湖轉般倉中一納米人治脚氣右用五積散毎服加㯽榔一枚切碎依法同煎服藥之後用被盖覆令腿股間少出汗為佳一方加木𤓰並呉茱茰煎如赤腫加大黄以利為度治脚氣右用四味理中丸去人參増紅麯毎服二錢白湯㸃服或蜜丸亦得空心服神效治脚氣右用木𤓰去瓤實以十華散同蒸候熟一處細研如或覺爛即添散以丸得為度如梧桐子大毎服三十丸用温酒鹽湯下治脚氣右用䜴酒浸以滓傅脚愈治脚氣右用生附子一箇去皮碾細乾柿十枚去蒂不切以好無灰酒三升於砂石器或銀器内煮候酒乾取去即研爛蒸餅和令燥濕得所丸如梧桐子大毎服三十丸於空心鹽酒下一方臨睡冷水下三十丸烏藥酒治脚氣發動鄉村無處問藥恃此效右用土烏藥即是矮樟樹根取如蘿蔔者不用鐡器亦不須過水乾漉布揩净用磁片刮屑収於磁器内盛如飲得酒一升或半升取出酒浸一宿次日空心時磁器熱湯上坐温服有麝香入少許尤妙一服即安妥無麝香多服後溏泄病去治脚氣右用赤小豆五合葫蘆一箇生薑一塊商陸根一條以水煮豆爛為度去滓細嚼豆子空心食之旋旋啜其汁嚥下腫立消便愈桃紅散治脚氣舉發立止右用帶莭蘓木不拘多少為細末毎服三五錢以水二盞煎至一盞半和滓空心熱服乾物壓之若進至三服至老不發至驗方右用續命湯須兩料候遍身得汗如續命湯香疾乃可去體有宜興王侍郎之孫為歸安縣尉三世並有此疾皆服之去根方見中風門治脚氣不問逺近右用紫蘓飲子加黒牽牛白芷破故紙木𤓰川練子一同煎吞騙馬丹治一切氣及脚氣右取食鹽三升蒸候熱分裹布囊脚踏之令脚必熱或又取食鹽和槐白皮蒸夜熨亦良治脚氣右用赤小豆和鯉魚爛煮食之别有諸治具載在魚條中散氣去闗莭煩熱令人心孔開如止小便数菉豆赤豆皆可用暴利後氣滿不能食煮一頓服之即得愈治脚氣右用孔子蘗二斤石斛五兩酒二斗浸服之治患脚氣右用良薑毎早任意頓食午後少食日晩不食如飢亦可食豉粥若暝不消欲致霍亂者即須以髙良薑一兩打碎以水三升煮取一升頓服盡即消待極飢時乃食一碗白粥其藥惟極飲之良若卒無良薑以母薑一兩代之以清酒一升煑令極熱和滓飲之雖是不及良薑亦有效矣治脚氣右用五積散三兩加荆芥五錢葱白五根熬湯先熏之後洗腫脚疼仍用膏藥貼之就以藥水烙痛處極其妙屢用有驗五積散方見感冒門治一切脚氣右用榖白皮五升炙勿