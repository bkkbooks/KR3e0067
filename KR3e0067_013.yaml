body:
  text: 普濟方卷十三明周王朱橚撰臟腑總論五臟六腑經絡論肺手太隂之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下循臑內行少隂心主之前下肘中循臂內上骨下亷入寸口上魚循魚際出大指之端其支者從腕後直出次指內亷出其端是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳嗽上氣喘喝煩心胸滿臑臂內前亷痛掌中熱氣盛有餘則肩臂痛風寒汗出中風小便數而欠氣虛則肩臂痛寒少氣不足以息溺色變為此諸病盛則㵼之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者則寸口反小於人迎也大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上亷入肘外亷循臑外前亷上肩出髃骨之前亷上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰下入齒縫中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛䪼腫是主津液所生病者目黃口乾鼽衄喉痺肩前臑鼽痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒栗然不復為此諸病盛則㵼之虛則補之熱則疾之寒則留之陷下炙之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也胃足陽明之脈起於鼻之交頞中旁納一本作約字太陽之脈下循鼻外上入齒中還出挾口環唇下交承漿却循頥後下亷出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內亷下挾臍入氣衝中其支者起於胃口下循腹裏下至氣衝中而合以下髀關抵伏兔下膝臏中下循脛外亷下足跗入中指內間其支者下亷三寸而别下入中指外間其支者别跗上入大指間出其端是動則病悽悽振寒善呻數欠顔黑病至則惡人與火聞木聲則愓然而驚心欲動獨閉户塞牖而處甚則欲上髙而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇疹頸腫喉痺大腹水腫膝臏腫痛循膺乳氣衝股伏兔骭外亷足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消榖善飢溺色黃氣不足則身以前皆寒栗胃中寒則脹滿為此諸病盛則㵼之虛則補之熱則疾之寒則留之陷下則炙之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也脾足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前亷上踹內循脛骨後交出厥陰之前上膝股內前亷入腹屬脾絡胃上行挾咽連舌本散舌下其支者復從胃别上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能卧強立股膝內腫厥足大指不用為此諸病盛則㵼之虛則補之熱則疾之寒則留之陷下則炙之不盛不虛以經取之盛者寸口大三倍於人迎虛者寸口反小於人迎也心手少隂之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽繫目系其直者復從心系却上肺下出腋下下循臑內後亷行手太隂心主之後下肘內循臂內後亷抵掌後鋭骨之端入掌內後亷循小指之內出其端是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後亷痛厥掌中熱為此諸病盛則㵼之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者寸口反小於人迎也小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下亷出肘內則兩筋之間上循臑外後亷出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目鋭眥却入耳中其支者别頰上䪼抵鼻至目內眥斜絡於顴是動則病嗌痛頷腫不可回顧肩似拔臑似折是主液所生病者耳聾目黃頰頷腫痛肩臑肘臂外後亷痛為此諸病盛則㵼之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於寸口也膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出别下項循肩髆內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從髆內左右别下貫胛挾脊內過髀樞循胛外從後亷下合膕中以下貫踹內出外踝之後循京骨至小指外側端是動則病衝頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結腨如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭𩕄項痛目黃淚出鼽衄項背腰尻膕腨腳皆痛小指不用為此諸病盛則㵼之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於寸口也腎足少隂之脈起於小指之下邪趨足心出於然谷之下循內踝之後别入跟中以上腨內出膕內亷上股內後亷貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中是動則病飢不飲食面如漆柴咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後亷痛痿厥嗜卧足下熱而痛為此諸病盛則㵼之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之灸則強食生肉緩帶被髮大杖重履而步盛者寸口大再倍於人迎虛者寸口反小於人迎也心主手厥隂心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸中出脅下腋三寸上抵腋下循臑內行太隂少隂之間入肘中下臂行兩筋之間入掌中循中指出其端其支者别掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱為此諸病盛則㵼之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也三焦手少陽之脈起於小指次指之端上出次指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項繫耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥是動則病耳聾渾渾焞焞嗌腫喉痺是主氣所生病汗出目鋭眥痛頰腫耳後肩臑肘臂外皆痛小指次指不用為此諸病盛則㵼之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也膽足少陽之脈起於目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上却交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者别鋭眥下大迎合於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裏出氣衝繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外亷下外輔骨之前直下抵絶骨端下出外踝之前循足跗上入小指次指之間其支者别跗上入大指之間循大指岐骨內出其端還指爪甲出三毛是動則病口苦善太息心脅痛不能轉側靣微有塵體無膏澤足外反熱是為陽厥是主膽所生病者頭痛頷痛目鋭眥痛缺盆中腫痛腋下腫馬刀俠癭汗出振寒瘧胸脅肋髀膝外至脛絶骨外踝前及諸莭皆痛小指次指不用為此諸病盛則㵼之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也肝足厥陰之脈起於大指聚毛之際上循足跗上亷去內踝一寸上踝八寸交出太陰之後上膕內亷循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裏環唇內其支者復從肝别貫膈上注肺是動則腰痛不可以俯仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆飱泄狐疝遺溺癃閉為此諸病盛則㵼之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也手太隂之别名曰列缺起於腕上分間並太隂之經直入掌中散入魚際其病實則手鋭掌熱虛則欠呿少便遺數取之去腕半寸别走陽明也手少陰之别名曰通里去腕一寸半别而上行循經入於心中繫舌本屬目系其實則支膈虛則不能言取之掌後一寸别走太陽也手心主手厥隂之别名曰內關去腕二寸出於兩筋之間循經以上繫於心包絡心系實則心痛虛則為頭強取之兩筋間也手太陽之别名曰支正上腕五寸內注少隂其别者上走肘絡肩髃實則莭弛肘廢虛則生疣小者如指痂疥取之所别也手陽明之别名曰遍歷去腕三寸别入太隂其别者上循臂乘肩髃上曲頰遍齒其别者入耳合於宗脈實則齲聾虛則齒寒痺隔取之所别也手少陽之别名曰外關去腕二寸外繞臂注胸中合心主病實則肘攣虛則不收取之所别也足太陽之别名曰飛揚去踝七寸别走少陰實則鼽窒頭背痛虛則鼽衄取之所别也足少陽之别名曰光明去踝五寸别走厥隂下絡足跗實則厥虛則痿躄坐不能起取之所别也足陽明之别名曰豐隆去踝八寸别走太陰其别者循脛骨外亷上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痺卒瘖實則狂癲虛則足不收脛枯取之所别也足太陽之别名曰公孫去本節之後一寸别走陽明其别者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所别也足少陰之别名曰大鍾當踝後繞跟别走太陽其别者并經上走於心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所别也足厥陰之别名曰蠡溝去內踝五寸别走少陽其别者循脛上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所别也任脈之别名曰尾翳下鳩尾散于腹實則腹皮痛虛則癢搔取之所别也督脈之别名曰長強挾膂上項散頭上下當肩胛左右别走太陽入貫膂實則脊強虛則頭重髙搖之挾脊之有過者取之所别也脾之大絡名曰大包出淵腋下三寸布胸脅實則身盡痛虛則百莭盡皆縱此脈若羅絡之血者皆取之脾之大絡脈也凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所别也足太陽之筋起於足小指上結於踝邪上結於膝其下循足外側結於踵上循跟結於膕其别者結于腨外上膕中內亷與膕中并上結於臀上挾脊上項其支者别入結於舌本其直者結於枕骨上頭下額結於鼻其支者為目上網下結於頄其支者從腋後外亷結於肩髃其支者入腋下上出缺盆上結於完骨其支者出缺盆邪上出於頄其病小指支跟腫痛膕攣脊反折項筋急肩不舉腋支缺盆中紐痛不可左右搖治在燔針劫刺以知為數以痛為輸名曰仲春痺足少陽之筋起於小指次指上結外踝上循脛外亷結於膝外亷其支者别起外輔骨上走髀前者結於伏兔之上後者結於尻其直者上乘䏚季脅上走腋前亷繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄支者結於目眥為外維其病小指次指支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻即上乘䏚季脅痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹻脈而行左絡於右故傷左角右足不用命曰維筋相交治在燔針劫刺以知為數以痛為輸名曰孟春痺也足陽明之筋起於中三指結於跗上邪外上加於輔骨上結於膝外亷直上結於髀樞上循脅屬脊其直者上循骭結於缺盆其支結外輔骨合少陽其直者上循伏兔上結於髀聚於隂器上腹而布至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上網陽明為目下網其支者從頰結於耳前其病足中指支脛轉筋腳跳堅伏兔轉筋髀前腫㿉疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋者有寒則急引頰移口有熱則筋弛縱緩不勝收故僻治之以馬膏其急者以白酒和桂以塗其緩者以桑鈎鈎之即以生桑炭置之坎中髙下以坐等以膏尉急頰且飲美酒噉美炙內不飲酒者自強也為之三拊而已治在燔針劫刺以知為數以痛為輸名曰季春痺也足太陰之筋起於大指之端內側上結於內踝其直者絡於膝內輔骨上循隂股結於髀聚於隂器上腹結於臍循腹裏結于肋散于胸中其內者著於脊其病足大指支內踝痛轉筋痛膝內輔骨痛隂股引髀而痛隂器紐痛下引臍兩脅痛引膺中脊內痛治在燔針劫刺以知為數以痛為輸命曰孟秋痺也足少陰之筋起於小指之下並足太陰之筋邪走內踝之下結於踵與太陽之筋合而上結於內輔之下並太陰之筋而上循陰股結于陰器循脊內挾膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癎瘛及痙在外者不能俯在內者不能仰故陽病者腰反折不能俯隂病者不能仰治在燔針劫刺以知為數以痛為輸在內者尉引飲藥此筋折紐紐發數甚者死不治名曰仲秋痺也足厥隂之筋起於大指之上上結于內踝之前上循脛上結內輔之下上循陰股結于隂器絡諸筋其病足大指支內踝之前痛內輔痛隂股痛轉筋隂器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰氣其病轉筋者治在燔針劫刺以知為數以痛為輸名曰季秋痺也手太陽之筋起于小指之上結於腕上循臂內亷結于肘內鋭骨之後彈之應小指之上入結于腋下其支者後走腋後亷上繞肩胛循脛出走太陽之前結于耳後完骨其支者入耳中直者出耳上下結於頷上屬目外眥其病小指支肘內鋭骨後亷痛循臂陰入腋下痛腋後亷痛繞肩胛引頸而痛應耳中鳴痛引頷目瞑良久乃得視頸筋急則為筋痿頸腫寒熱在頸者治在燔針劫刺之以知為數以痛為輸其為腫者後而鋭之本支者上曲牙循耳前屬目外眥上頷結于角其病當所過者支轉筋治在燔針劫刺以知為數以痛為輸名曰仲夏痺也手少陽之筋起于小指次指之端結於腕上循臂結于肘上繞臑外亷上肩走頸合手太陽其支者當曲頰入繫舌本其支者上曲牙循耳前屬目外眥上乘頷結于角其病當所過者即支轉筋舌卷治在燔針劫刺以知為數以痛為輸名曰季夏痺也手陽明之筋起于大指次指之端結于腕上循臂上結于肘外上臑結于髃其支者繞肩胛挾脊直者從肩髃上頸其支者上頰結于頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右視治在燔針劫刺以知為數以痛為輸名曰孟夏痺也手太陽之筋起于大指之上循指上行結于魚後行寸口外側上循臂結肘中上臑內亷入腋下出缺盆結肩前髃上結缺盆下結胸裏散貫賁合賁下抵季脅其病當所過者支轉筋痛甚成息賁脅急吐血治在燔針劫刺以知為數以痛為輸名曰仲冬痺也手心主之筋起于中指與太陰之筋並行結于肘內亷上臂陰結腋下下散前後挾脅其支者入腋散胸中結于臂其病當所過者支轉筋前及胸痛息賁治在燔針劫刺以知為數以痛為輸名曰孟冬痺也手少陰之筋起于小指之內側結于鋭骨上結肘內亷上入腋交太陰挾乳裏結于胸中循臂下繫于臍其病內急心承伏梁下為肘網其病當所過者支轉筋筋痛治在燔針劫刺以知為數以痛為輸其成伏梁唾血膿者死不治經筋之病寒則反折筋急熱則筋弛縱不收陰痿不用陽急則反折陰急則俯不伸焠刺者刺寒急也熱則筋縱不收無用燔針名曰季冬痺也足之陽手之太陽筋急則口目為僻眥急不能卒視治皆如右方也五臟所主論夫在天之風在地為木在人為肝惟肝則主風在天之熱暄暑熾燠熱之用也在地為火在人為心惟心則主熱在天之濕在地為土在人為脾惟脾則主濕在天之燥在地為金在人為肺惟肺則主燥在天之寒在地為水在人為腎惟腎則主寒此天地自然之氣也氣之愆伏乘虛入人而人不能克百病之所由生故風喜傷肝熱喜傷心濕喜傷脾燥喜傷肺寒喜傷腎而暑喜傷心包絡心包絡曰膻中在胸膈間蓋心主暑故暑氣伏於三焦膈胃之間其或風暑之勝木邪乘土則脾病生焉熱氣之勝火邪乘金則肺病生焉濕氣之勝土邪乘水則腎病生焉燥氣之勝金邪乘木則肝病生焉寒氣大來心火亦為腎水所乘矣在關為人迎可以知風寒暑濕熱燥所從入之門右關為氣口可以别臟氣鬱暢與食氣聚散盈虛之候若乃憂愁思慮易耗心神恚怒氣逆易損肝氣縱欲強志腎之戕形寒飲冷肺之害飢飽勞倦脾之傷外之六氣相乘內之七情相感凡是數者皆為五臟之邪因其所主而尋其各臟所受之處則得之矣心主乎血所藏者神上應舌外應諸掌其聲言其色赤其臭焦其味苦其液汗肝主筋所藏者魂上應眼外應爪甲其聲呼其色青其臭臊其味酸其液泣腎主骨所藏者精與志上應耳外應腰背其聲呻其色黑其臭腐其味鹹其液唾腎冷多唾腎熱多渴肺主氣所藏者魄上應鼻外應皮毛其聲笑其色白其臭腥其味辛其液涕脾主肌肉所藏者意與智上應口外應四肢其聲歌其色黃其臭香其味甘其液涎故心肺在上主脈氣也肝腎在下藏精血也脾居中州又所以主精血脈氣之養也心之平脈浮大而散肝之平脈弦細而長腎之平脈沉濡而滑肺之平脈短澀而浮脾之平脈和緩而大平者五臟本然之正脈也春弦夏鈎叔和云夏洪取火脈來盛之義秋毛冬石以其四時當旺者象之木火金水四時各旺七十有二日土為季脈每季之月寄旺一十八日春則弦緩夏則洪緩秋則微緩冬則沉緩合四季而論則亦七十有二矣春弦者端直之狀細弱而長是也夏鈎者浮大而散來疾去遲是也秋毛者稀軟之狀輕虛似浮是也冬石者沉濡而滑舉指來疾是也土之脈溫厚氣行乎臟腑之中平和不可得見其衰則現焉所謂弦鈎毛石蓋應時而略見耳其中須有榖神胃氣之和若弦如張弓弦鈎如操帶鈎毛如風吹毛石來如奪索去如彈石此皆危脈也此絶無胃氣也虧絶其能久乎若夫春得金脈夏得水脈秋得火脈冬得土脈四季得木脈其與心之脈尅肺肺之脈尅肝肝之脈尅脾脾之脈尅腎此皆賊邪也一藏無氣况可以為人乎然則諸腑之脈可得聞歟曰小腸微洪大腸微澀膀胱微沉胃微緩而膽微弦急此無他腑與臟合氣同氣相求斯有得其近似者矣抑古人所為九臟者又何如耶曰形臟四一者頭角二者耳目三者口齒四者胸中神臟五在心藏神在肝藏魂在腎藏志肺藏魄而脾藏意然臟者神之舍色者神之旗五臟已散其色必夭稿怪異常夭必亡矣抑猶有説焉微遲濡弱其候雖不同而為寒為虛一也數實長洪其形雖不類而為熱為實一也諸脈皆弦吾知其病出於肝諸脈皆緩吾知其病出於脾諸脈皆澀吾知其病出於肺脈皆浮洪病不在心乎脈皆沉滑病不在腎乎若合臟腑而觀假如數在左寸數之主熱也沉之而得則熱入於心浮之而得則熱入於小腸遲在左尺遲主寒也沉之而得則寒入於腎浮之而得則寒入膀胱其餘以此推之五臟病證虛實論五臟各有所主至其病證莫不隨所主而見焉面赤喜笑舌破口乾頤燥掌熱心痛而啘臍上有動氣者心家病也面青多怒脅下痛硬咳逆目眩支節攣急轉筋溲難臍左有動氣者肝家病也肝乘脾挾水氣故咳逆足厥隂下絡於陰器故溲難面黑而恐呵欠呻吟齒痛骨痿耳鳴精泄足脛寒腰脊痛小腹急疼瘕泄而裏急後重臍下有動氣者腎家病也面白善嚏憂愁欲哭喘嗽氣逆咽喉不利灑淅惡寒熱臍左有動氣者肺家病也面黃善思善噫善嗜中脘脹滿飲食不消身體腫重肢莭酸疼怠惰嗜卧四肢不收當臍動氣脾家病也東萊先生有曰肝受病則目不能視腎受病則耳不能聽脾受病口不能食心受病則舌不能舉五臟病證以此觀之不待智者而後知矣然而心之惡熱者何熱則潰濁也肝之惡風者何風則筋燥急也腎何以惡燥燥則精涸竭肺何以惡寒寒則氣留滯也脾何以惡濕濕傷肌肉肉傷則痿腫也五臟之病推原及本安有不從所受中來哉是以臟氣有餘謂之實臟氣不足謂之虛心實之候口乾喜笑身熱汗血痛滿乎脾脅膺背之間肝實之候目赤多怒頭眩耳聾痛引乎兩脅小腹之間腎實之候腹膨體腫少氣不言骨痛飱泄而小便黃肺實之候喘促咳嗽上氣鼻張脛股肩疼而胸中滿脾氣已實必至肢體重著而不舉腹脹尿閟而苦飢故曰臟氣有餘謂之實者此也心虛則恍惚多驚憂煩少色咳唾舌強腰背酸疼肝虛則眼目昏胸痛筋脅拘攣恐懼面青如人將捕腎虛則心懸如渴飢胸痛引脊厥逆溲變腹冷耳鳴肺虛則呼吸少氣鼻涕嗌乾肺中聲鳴喘乏咳血唾中有紅縷者此肺損為氣所傷也若脅下痛而唾鮮血者此熱氣傷肝也其或吐逆泄利飲食不消腹脹腸鳴四肢無力則脾虛之證生焉故曰臟氣不足謂之虛者此也大抵實者㵼之虛者補之無過不及以平為期否則實實虛虛損不足而益有餘至若心病而直視面黧肝病而舌卷囊縮腎病而腰折骨枯肺病而毛焦氣出脾病而臍突唇反此則五臟之氣絶矣邪氣盛則實精氣奪則虛脈盛皮熱腹脹前後不通曰五實脈細皮寒氣少前後泄利飲食不進曰五虛諸病出者為虛諸病入者為實陰出乘陽陽入乘陰言者為虛不言者為實緩者為虛急者為實陰主靜則緩陽主急則急濡者為虛堅者為實癢者為虛痛者為實外痛內快者外實內虛外快內痛者外虛內實其有心腹皮膚內外俱痛則按之而止者虛也按之而痛者實也經所謂皮虛則熱脈虛則驚肉虛則重筋虛則急骨虛則痛髓虛則墮腸虛則溏泄三陽實三陰虛汗不出三陰實三陽虛汗不止與夫脈浮而緩自汗惡風法當解肌脈浮而緊無汗惡寒法當發汗此表之病一虛一實脈伏而牢腹痛祕結法當下之脈沉而弱厥冷自利法當溫之此裏之病一實一虛內實之證心下牢強腸中痛滿前後不通乾嘔而無物出者死內虛之證厥逆煩燥而吐利不止者亡五臟平脈黎居士簡易方論云肝平脈來厭厭聶聶如循榆莢心平脈來纍纍如環如循琅玕脾平脈來而和柔去如雞踐地肺平脈來如藹藹如車蓋按之益大腎平脈來上大下鋭濡滑如雀之喙五臟病脈肝病脈來實而益滑如循長竿心病脈來纍纍連屬其中微曲脾病脈來實滿稍數如雞舉足肺病脈來不上不下如循雞羽腎病脈來如引葛按之而益堅五臟死脈肝死脈來急而益徑如新張弓弦心死脈來前曲而後居如操帶鈎脾死脈來鋭堅如鳥喙如屋之漏肺死脈來按之消索如風吹毛腎死脈來之如解索去之如彈石五臟真脈真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而急如循薏苡子纍纍然色赤黑不澤毛折乃死真脾脈至弱而乍數乍踈色黃青不澤毛折乃死真肺脈至大而虛如以毛羽中人膚色赤白不澤毛折乃死真腎脈至摶而絶如指彈石辟辟然色黑黃不澤毛折乃死五臟色候氣所以養形而化神也周流乎五臟六腑之間發越乎五嶽四瀆之表神者氣之主氣者色之源色者容之表氣充乎內色形於外故色有青黃赤白黑以應肝心脾肺腎也夫五色得其正而形不相克者為善黃色尤為之正然亦不可無神氣要之得如秋雲襯月春蠶吐絲濕潤明快為佳設或枯燥暗惡則病將至矣內經所載五臟之色生死各不同也東方青色入通於肝肝象木而色青青欲如蒼璧之澤不欲如藍故云如翠羽者生如草滋者死南方赤色入通於心心法火而色赤赤欲如帛裹朱不欲如赭故云如雞冠者生如血衃者死中央黃色入通於脾脾屬土而色黃黃欲如羅裹雄黃不欲如黃土故云如蟹腹中生如枳實者死西方白色入通於肺肺效金其色白白欲如鵝羽不欲如鹽故云如豬膏者生如枯骨者死北方黑色入通於腎腎應水而色黑黑欲重漆色不欲如地蒼故云如鳥羽者生如炭煤者死五臟聲音詩云情動於中而形於言故人之有言將有所為則意與氣合而聲隨至矣聲之所發會於五臟而備五音矣肝其音角其聲呼在志為怒在變動為握心其音徵其聲言在志為笑在變動為擾脾其音宫其聲歌在志為思在變動為噦肺其音商其聲哭在志為慮在變動為咳腎其音羽其聲呻在志為恐在變動為栗五臟臭味臭陽也其氣上逹故心主之味陰也物成致養焉故脾主之五行互相連故五臟各復自有臭味亦各從五行之數也故內經曰形不足者補之以氣精不足者補之以味五臟各有補之法詳列如左肝其臭臊其味酸榖以麥為養果以李為助菜以葵為充肉以犬為益藥以空青為治合而服之以補精益氣心其臭焦其味苦榖以小豆為養果以梨為助菜以薤為充肉以羊為益藥以丹砂為治合而服之以補精益氣脾其臭香其味甘榖以大豆為養果以棗為助菜以韭為充肉以牛為益藥以雄黃為治合而服之以補精益氣肺其臭腥其味辛榖以麻為養果以桃為助菜以蔥為充肉以雞為益藥以雲母為治合而服之以補精益氣腎其臭腐其味醎榖以黃黍為養果以栗為助菜以藿為充肉以豕為益藥以磁石為治合而服之以補精益氣五臟主配肝者罷極之本魂之居也其華在爪爪者筋之餘其充在筋筋者肝之養開竅於目目者肝之官與膽為合膽者肝之府肝主內血配於仁為陽中之少陽通於春氣心者生之本神之變也其華在面心火氣騰上使五色修明而榮於其面也其充在血脈血脈者心之養開竅於舌舌用非竅寄通於耳耳為心之官與小腸合小腸者心之府心主行血配於禮為陽中之太陽通於夏氣脾者倉廩之本營之居也其華在唇四白肉際唇者脾之外候也其充在肌肌者脾之所至開竅於口口者脾之官與胃為合胃者脾之府脾主裹血配於信上合太陰通於土氣肺者氣之本魄之處也其華在毛其充在皮皮毛者肺之所養開竅於鼻鼻者肺之官與大腸為合大腸者肺之府肺主持諸氣配於義為陰中之太陰通於秋氣腎者主蟄封藏之本精之處也其華在髮髮者血之餘腦之所養腎主於髓而腦為髓海其充在骨骨者腎之外應開竅於二陰二陰者前後便也前後便者腎之外穴也與膀胱為合膀胱者腎之府主受五臟六腑之精而藏配於智為陰中之少陰通於冬氣五邪相干假令肝病實邪風熱相合風性急火搖動熖而旋轉其脈弦而緊洪風熱發狂宜羌活湯羌活川芎大黃各一兩甘草五錢右㕮咀每服五錢水二鍾煎至六分去滓溫服虛邪風寒相合本慮腎恐拘急自汗其脈弦緊而沉仲景云風感太陽移證在太陽經中桂枝加附子湯主之賊邪風燥相合血虛筋縮皮膚皺揭脈弦浮而澀仲景云血虛筋急桂枝加栝蔞湯主之微邪風濕相合體重莭痛藏府洞泄脈弦長而緩仲景云身體疼痛下利清榖急當救裏四逆湯主之正邪中風目眩頭重呌怒不咄脈弦緊而長仲景云甚則為癎為痓真羌活湯本草云羌活主痓主癎防風黃蓍為佐小兒為癎大人為痓假令心病實邪熱濕相合憒憒心煩熱蒸不眠脾經絡於心心經起於脾二經相接故為濕熱脈浮大而緩足太陰寄證在手太陽宜梔豉湯若痞加厚朴枳實虛邪熱風相合妄聽妄聞耳簫聲膽與三焦之經同出於耳銅人云刺關衝出血㵼支溝脈浮大而弦初小柴胡湯後大柴胡湯此證是太陽與少陽為病前客後主也賊邪熱寒相合膽傷心懸如飢神怯恐怖足少陰與手厥陰相接水中心經手邪故神怯怖耳脈大而沉濡亦在太陽經中內經曰心虛則熱收於內黃連附子湯㵼心湯主之法云謂熱多寒少以為佐矣如寒多熱少加附子乾薑佐之微邪熱燥相合過飲歌樂實為熱燥俗言暢飲也病人曰快活快活是有聲於歌樂也以意思漿是無聲歌樂也脈洪大而澀白虎湯主之喘則加人參正邪熱也脫陽見鬼躁擾狂起脈洪實一呼四至是八至脈也小承氣湯主之謂復堅大也假令脾病實邪溫燥相合胃中燥屎腹滿堅痛其脈緩而長澀是太陽陽明證也以承氣湯主之虛邪濕熱相合熱陷胃中腸癖下血脈中緩大黃黃連解毒湯主之賊邪濕風相合嘔逆脅痛往來寒熱脈緩而弦長小柴胡湯主之微邪濕寒相合濕與寒交寒來求濕身黃而不熱體重而不渴謂之寒濕其脈緩沉而滑木附湯主之如小便不利者加茯苓正邪濕自病腹滿時痛手足自溫其脈沉澀而長虛痛桂枝加芍藥湯主之實痛桂枝大黃湯假令肺病實邪燥寒相合毛聳皮涼溲多而清其脈短澀而沉此證如秋冬宜八味丸若春夏宜地黃丸虛邪燥濕相合微喘而痞便難而痰其脈浮澀而緩枳實理中丸主之如喘甚加人參若便難加木香檳榔各五分為極細末煎下理中丸賊邪燥熱相合鼻窒鼽衄血溢血泄其脈澀而浮大甚者桃仁承氣湯微者犀角地黃湯極者抵當湯微極抵當丸微邪燥風相合皮著甲枯血虛氣虛二藏俱虛先血後氣其脈浮澀而弦久養氣血主之正邪燥自病其氣奔鬱皆屬於肺諸燥有聲其脈浮澀而短列諸咳藥選而用假令腎病實邪寒風相合臟不藏散下利純清其脈沉滑而弦仲景云少陰證口燥咽乾下利純清大承氣湯主之脈弦仲景云膈逆冷者宜四逆湯等虛邪寒清相合腎唾多呻灑浙寒清無寐經言燥化清其脈沉實而澀酸棗仁湯主之賊邪寒濕相合腎為胃關關閉水溢關閉水在胃為腫水在肺為喘及變諸證其脈沉緩而大仲景云大病差後腰下有水氣者牡蠣澤㵼湯主之微邪寒熱相合膀胱熱鬱津液枯少其脈沉濡而大內經曰水少乾涸也豬苓湯主之正邪寒自病寒忿用臟黑痺經沉濡而滑黑痺天麻丸如證同脈異微者腑病也甚者臟病也五臟各有身熱夫五臟者有邪各有身熱其狀各異以手捫摸有三法以輕手捫之則熱重按之則不熱是熱在皮毛血脈也重按之至筋骨之分則熱蒸手極甚輕手則不熱是邪在筋骨之間也輕手捫之不熱重加力以按之不熱不輕不重按之而熱是在筋骨之上皮毛血脈之下乃熱在肌肉也此為三法以三黃丸通治之細分為五等肺熱者輕手乃得但微按全無是瞥瞥然見於皮毛之上日西尤甚乃皮毛之熱其證必見喘咳灑浙寒熱輕者㵼白散重涼膈散白虎湯地骨皮散心熱者心主血脈微按至皮膚之下肌肉之上輕手乃得微按至皮毛之下則熱少加力按之則全不熱是熱在血脈也日中大甚乃心之熱也其證煩心心痛掌中熱而噦以黃連㵼心湯導赤散硃砂安神丸清涼飲子脾熱者輕手捫之不熱重按至筋骨又不熱不輕不重在輕手重手之間熱在肌肉遇夜尤甚證必怠惰嗜卧四肢不收無氣以動㵼黃散調胃承氣湯治實熱用之人參黃茋散補中益氣湯治中虛有熱者用之肝熱者重按之肌肉之下至骨之上乃肝之熱寅卯間尤甚其脈強四肢滿悶便難轉筋多怒多驚四肢困熱筋痿不能起於床㵼清丸柴胡飲子腎熱者輕手重手俱不熱如重手按於骨分其熱蒸手如火其人骨蘇蘇如蟲蝕其骨困熱不任亦不能起於床滋腎丸六味地黃丸普濟方卷十三
