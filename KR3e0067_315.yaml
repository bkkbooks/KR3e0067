body:
  text: 普濟方卷三百十五明周王朱橚撰膏藥門諸瘡毒腫方黑虎膏治一切癰癤疽毒發背腦疽腸癰痔瘻疔瘡妳癰虎狼刀箭所傷一應無名腫毒及攧撲損傷車馬搕傷杖傷懸癰並貼之如痔瘻丸如棗核大絍入腸癰丸如雞實大甘草湯送下三丸當歸防風各一兩大黃赤芍藥黃芩黃蘗生地黃黃連玄參桔梗官桂白芷木鱉子仁杏仁血竭豬牙皂莢沒藥乳香各半兩别研香油二斤黃丹一斤别研右㕮咀藥入油浸三日銚內同煎油藥候白芷燋色為度每用槐栁枝各數條攪動其油文武火熬却用布帛濾去滓丹入銚下丹並乳沒末不住手攪熬至紫色及有青煙起急去火緊攪滴水中成珠為度看時候冷熱加減油並丹臨時通變傾於淨器盛之修合時於淨室勿令雞犬婦人見神妙膏治諸般瘡癤癰疽攧傷損及折傷乳香沒藥頭髮大黃肉桂當歸玄參續斷莪术生地黃赤芍藥白芷射干巴豆明礬黃芩栁枝各半兩香油一斤黃丹八兩麝香一錢右銼如豆大油浸一宿煎栁枝攪令色黑濾去滓油再入銚微冷下丹煎不住手攪黑色滴水中不散不粘手為度下乳沒麝香攪勻取出每用油紙安刀上攤以藥量大小貼患處治杖瘡宜中間貼此膏藥用大黃黃蘗皮黃芩三味焙乾為末雞子清調塗四邊用皮紙條封第三日蔥椒鹽湯熏洗瘡一日一次換膏藥忌醋麵肉服烏藥傾氣散方見諸氣門木香膏木香八錢川烏一兩地骨皮六錢羌活一兩甘草白芷八角回香天南星各半兩萆麻八十五粒去殼油官桂八錢巴豆八十五粒去殼油細辛大黃荆芥黃連防風各半兩苦參半兩生薑一兩生蔥一兩連根半兩錢五七文右銼碎依法浸煎韶粉膏韶粉一兩銀珠樟腦各半兩青鹽四錢松香一兩龍骨虎骨油炙各半兩白丁香地龍瓦焙去土各二錢川山甲二錢半全蠍五枚瓦煆去稍乳香沒藥各一兩血竭六錢腦子半錢輕粉六錢麝香半錢蛤粉二錢右諸藥銼如豆大入油內浸三宿文武火熬藥色燋黃濾去滓再上火煎沸先下黃丹次下銀珠用栁枝三兩根不住手攪候藥色略變擡下不住手攪成膏滴水中成珠不散看藥得所溫冷却次第下藥末第一松乳沒血竭第二龍骨虎骨韶粉蛤粉第三白丁蠍山甲地龍第四輕粉腦麝樟腦加狗腦骨燒灰末攪勻入磁罐內掘坑埋三宿去火毒攤貼此膏治男子婦惡疽瘡毒癤漏發背腦疽瘰􅊓丁瘡牙淋腫痛打撲傷損筋骨動損刀斧割傷杖瘡湯火所傷小兒頭面瘡癤丹流熱毒蜈蚣蜂蝎蛇犬傷毒痔􅀈瘡諸般瘡癤無名腫毒及治風濕腳氣小腸疝氣勞瘵咳嗽風虛頭痛耳鳴腰腹疼痛婦人血氣刺痛吹妳腫毒神效勝金膏清油三斤黃丹一斤半飛當歸一兩白芨黑牽牛各半兩木龞子六十枚去殼油獨活一兩川牛膝半兩川棟子八錢清藤半兩豬牙皂莢嫩松枝桃枝槐枝栁枝石榴枝右藥依法煎製玉容膏治中皮膚骨瘡癬癢唇裂面皺風刺及打撲傷損舒筋骨通流血消腫止痛發散邪毒每用少許塗摩熱為度如耳鼻中有瘡用綿杖兒點少許在瘡上黃茋去粗皮銼當歸去蘆銼白芍藥銼白芷銼川芎銼藿香葉零陵香白檀香銼白附子銼白芨銼白斂銼杏仁洗去皮尖研各一兩栝蔞一枚龍腦二錢清油四兩右除龍腦其十三味入清油浸三日用銀器內慢火熬藥燋黃色綿濾去滓放溫入黃蠟鎔令勻再用綿濾過入龍腦不住手用栁木錍攪候冷密封如法用冬用油三兩蠟一兩夏油五兩蠟三兩如臘月熬臘油入蠟中黃膏治男婦人風濕腳氣疼痛貼疼處受風寒咳嗽貼背心風寒腰疼貼腰上眼腫貼太陽心氣疼痛貼缺盆諸氣疼痛貼疼處打撲傷閃肭疼痛並貼患處瘡癤腫毒貼患處杖臀瘡貼患上草烏防風藁本大黃白芷當歸苦參生地黃玄參乳香沒藥各半兩木龞子仁二十五枚萆麻子二百枚去殼豬牙皂莢十斤桐油四兩松香春用十二兩夏用十八兩秋十一兩冬十兩右藥依法製玉龍膏治摩風止痛消腫化毒一切傷折瘡腫栝蔞大者一枚去殼松脂研一錢半黃蠟一兩半白芷半兩銼麻油六兩麝香研一錢零陵香藿香各一兩杏仁去皮尖升麻黃茋赤芍藥白芨白斂甘草淨㨂銼各一分右以油浸七日却出油先錬令香熟放冷入諸藥慢火煎黃色用絹濾去滓入銀石鍋內入蠟並麝香松脂熬少時磁器盛每用少許薄攤絹帛上貼之頭面風癬癢瘡腫疼痛並塗摩令熱頻用之如耳鼻中間用紙撚子每日點之至一月愈如炙瘡及小兒瘤瘡塗之兼滅瘢䀶一善膏治小兒脾證大人一切風氣氣積食冷積氣塊但有形之癰疽癤毒丁腫杖瘡之類木通綿黃茋羌活川芎生地黃桃仁白芷連翹玄參防風木龞子仁當歸同乳香另沒藥另各二兩右除乳沒當歸外餘並銼用真麻油四斤半炒黃丹二十四兩續續挑入油內以栁枝三五條不住手攪之丹不可老火不可猛直候丹變黑色滴水不散為度取出稍冷即下乳沒當歸末再攪勻慢火養一時許露一宿出毒蛤粉養之旋攤用凡貼上數日不可揭去速則作痛乳香膏治傷折皮肉破冷久不合乳香續斷當歸切焙莨菪子亂髮燒灰騏驎竭薰陸香各二兩桂去粗皮一兩麻油七兩松脂豬脂臘月鉛丹各四兩右藥除麻油豬脂鉛丹外並為末先煎油脂等令熟停冷下藥以栁木錍攪勻用慢火更煎半日後下鉛丹攪勻候成膏磁盒盛每用故帛攤貼觀音膏香油四兩松香一斤明淨者乳香四錢沒藥龍骨各四錢白芷木龞子七枚栁枝川山甲炙萆麻二十一粒貝母右以清油浸沒藥龍骨白芷木龞子却以火煎三五沸再入松乳末將栁枝不住手攪熬三五沸滴水不散為度又滴地上隨取起不粘手上膏成矣善應膏治一切瘡疽及傷折損痛巴豆七粒去殼殭蠶去系嘴赤芍藥白芷各五錢五倍子二錢黃連一錢亂髮雞子大桃栁枝各七條萆麻子三十粒去殼豬膏一指靣大右清油半斤浸藥三日慢火煎熬令亂髮燋爛出火候冷用絹濾去滓再澄却入銚內火熬次下飛過黃丹四兩以桃栁枝不住手攪青煙微出為度滴水不散即膏成矣即出火攪令溫再入乳香沒藥末各五錢桂心末三錢略上火攪勻收磁器貼使用一方無乳香沒藥桂心善應膏治諸般惡瘡腫毒發背腦疽􅊓子牙腫打撲接骨閃肭刀斧傷杖瘡蛇蟲毒犬馬咬湯火漆瘡疥癬貼之即愈及治婦人吹妳丸藥如梧桐子大新汲水下二十丸産前催生産後敗血經脈不調溫酒下二十丸不得犯葷手及火焙黃丹八兩細研沒藥乳香白芨生木鱉子仁白斂子當歸杏仁白芷並生用官桂去粗皮各一兩清油一斤新栁枝兩三條攪藥用右藥依法煎熬內官桂為極細末同乳沒一並下八寶膏治諸般惡瘡腫毒傷折疼痛杜牛膝馬鞭草血見愁煎刀草狶蘞草燈籠草醋漿草螺面草蒼耳草各一把右於端午日採隂乾香油一斤黃丹六兩後入乳沒松香各五錢依法熬貼金絲膏治閃肭並寒濕疼痛一切腫毒白芷半兩木鱉萆麻各十枚竹茹一兩栁條十莖長一寸沒藥乳香夏一兩秋半兩冬二兩白膠香六兩右藥入桐油煎令黃色去滓綽子重濾淨下白膠香再煎勻下乳沒攪勻用新汲井水一盆將藥傾入水中持杖千餘遍如銀絲為度栁稍正此在手第一指不通用過節只虎口長萆麻木龞不去殼每箇作兩三塊神應膏治一切惡瘡消毒止痛活血潰膿去風生肌亦治杖瘡疼痛清油三斤桃栁槐枝各半斤木鱉子仁半兩當歸一兩黃丹一斤乳香沒藥各半兩另研細末右將油慢火熬續續下三枝燋去滓不用下鱉子當歸燋去不用冷定下丹乳沒藥枝攪丹性絶再用慢火熬不住手攪休溢出滴水內成珠不散為度磁器盛之旋攤貼之沒藥膏治一切癰疽發背癤毒傷折􅀈攧壞膿生肌止痛貼炙瘡騏驎竭乳香沒藥各一分研當歸半兩去蘆黃丹六兩杏仁木鱉子仁半兩細研亂油頭髮二兩右先以油一斤石器內或砂鍋中露天底錬油熱先下木鱉當歸杏仁頭髮慢火熬黃燋油耗五分離火綿濾去滓再入鍋內煎數沸下上三味研藥再攪勻磁盒盛放地上以盆蓋一宿出火毒如用或帛或綿攤貼日易之長肉膏桑枝栁枝桃枝槐枝榆皮枸杞枝右各四十九寸先以真麻油一斤熬滚下枝在內煎黃赤色去枝入黃丹十兩栁枝不住手攪勻滴試水中不散為度傾入水盆內候冷磁器盛貯凡用攤紙上化開貼長肌肉無䀶此膏治肉瘤丁瘡癰疽發背腦瘍蜘蛛蛇犬傷蜈蚣蠍毒蜂蠆草刺竹木屑小兒梅花禿瘡靣有諸般惡癤瘡及箭鏇毒并十指面目無名種毒惡肉悉依法治凡丁瘡其患四畔俱赤中間或青或白或黑或凸或陷者是也痛如入心徹骨不可忍身如火熱頭如斧劈昏間不省不爽其病三日不療病喪身命急用􅀈針於瘡頭上刺入一分許作十字用藥一粟點之黃水出為度少頃將紙拭乾再用藥點如是者三次乃止內服菊花散將生菊葉一握研冷水一二盞與服吐㵼為度如虛弱人多服內補十宣散數日丁瘡自然墜地暑月尤速若膿水不乾用麝香散摻之四畔長肉膏但肉滿平復如初是也􅊓子大者如銀杏小者如雞頭先用麻布擦令血熱以綿繫定將藥於根頭旋轉點之若暑月即時落癰疽發背腦瘍等不問有頭無頭但要腫處知痛用藥一粟許於瘡頭上點之少頃再點便覺肉地軟癢內服黑神散和復元通氣散須用局方有白牽牛川山甲者二藥打和勻以無灰酒一二碗調服即時膿潰痛減次服十宣散內補如膿水不止麝香散摻之用膏貼忌食毒物及房室等事切須將理不得失宣一待瘡合愈矣治蜘蛛蜂蠆等不問咬硬皮或見血以藥一粟點所傷處候黃水出盡為度其毒已消毒氣不行於四肢隨見便可治草刺竹木刺屑以藥一點滴之少頃黃水流痛止刺屑自出小兒梅花秃瘡以先剃頭令淨若有膿血用帛拭乾却將油紙一張攤藥靣清水在上以托紙罨放小兒頭上不住手旋轉扶之其蟲即死後用水洗令潔淨二三日來結薄痞自落也靣痣用筯子杵令血熱將藥隨痣大小點之待痞乾落即可贅痣先剪去硬皮以藥點之痞落即去大者內捻去丙疔子仍須擦令血熱方可用藥疥癬待癢時􅎲破以藥面清水拂之其蟲即死痢瘡凡疾後有此瘡蓋餘毒不散生於榖道四傍有若癢癬其癢無休時當依癬法治筯鏇毒蜘蛛蠍毒同治無名腫毒惡肉與瘤同法治之乳香膏治一切惡瘡打撲走注疼痛乳香研黃蠟各半兩白膠香二兩杏子油一斤珠子瀝清半兩右將瀝清於木炭火上先鎔開下白膠香黃蠟入油攪勻以綿濾去滓於井花水中持援白色如銀再鎔乳香在內援白色收磁盒內依常法攤用膏藥方真香油一斤黃丹半斤巴豆七十粒木鱉子五枚穿山甲五片右香油用鐡鍋熬滚下川山五片煎黃色取出却下木龞子亦煎黃色取出然後下巴豆熬黃色取出將生絹濾去滓將油入砂鍋內浸火再熬下丹用栁枝三條不住手攪一時久後沫高三寸可住手將油滴水中不散成珠為度走馬膏治諸瘡一切打損腫毒皂莢豬牙者十挺捶碎芫花五兩生薑五兩取自然汁生地黃一斤取自然汁右用上好米醋一斗入諸藥煎至三升絞去滓再煎以栁錍攪稀稠得所如膏磁盒盛埋地內五日取出故帛上塗貼患處日二上膏藥方瀝青萆麻各一兩右同搗爛攤紙上貼瘡神應膏治腳氣疼痛不可忍及寒濕皂莢肥大者二十挺萆麻一兩為末右將皂莢炙過槌細好米醋二碗同煎五七沸揉去滓熬成稀膏入乳末攪勻次加木鱉草烏南星等末勻熬一沸取下再入沒藥血竭輕粉勻放溫量患處約一分厚紙貼上膏藥治諸般惡瘡打撲傷損及心痛遍體瘡疼痛木鱉二十枚白芷二十枚右咀作小片同油四兩半慢火煎燋黃色為度綿濾去滓稱油見數凡油四兩入嫩松香六兩栁枝攪松香鎔盡入水中去毒用乳香膏治諸瘡腫硬疼痛及膿潰肌肉腐爛兼治腐肉不退