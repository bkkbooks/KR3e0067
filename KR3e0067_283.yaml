body:
  text: 普濟方卷二百八十三明周王朱橚撰癰疽門諸癰疽黃芩散治癰疽發背丹疹赤腫惡肉時行熱毒變作赤色及眼赤腫生障翳病方黃芩白芨麻黃去節漏蘆真者白薇枳殼麩炒去穰升麻白芍藥川當歸川牛膝甘草已上各二兩大黃五兩右為粗末每服四錢水一中盞半煎至七分空心熱服或利一二行如未利再服可加芒硝三錢未成者散已成者立潰一云癰癤發背等疾服此獲安之後宜常服四物湯交和黃耆建中湯空心煎服以禦未來恐後再作青露散治背疽一切惡瘡圍藥不散開白芨白斂白薇白芷白鮮皮朴硝青黛黃柏大黃天花粉青露散即芙蓉葉老龍皮即老松樹皮右各等分為細末用生薑自然汁調圍敷如乾時再用薑汁潤一方無黃柏吸筒以慈竹為之削去青五倍多用白礬少用些子右和筒煮了收起用時再於沸湯煮令熱以筯夾筒乘熱安於患處治癰疽發背腎癰山藥一尺木鱉六個右以木鱉細切搗成泥後將山藥先去泥與之同搗成泥傅於患處四圍中間留瘡口大黃蝕肉膏大黃附子炮裂去皮臍莽草芎藭雄黃研雌黃珍珠研白斂白礬研黃芩去黑尖䕡茹各一兩豬脂二斤右除研者并豬脂外銼碎先熬脂令沸下諸藥煎候赤色綿濾過去滓下研者藥攪勻傾出瓷器盛每日塗瘡日三五次以惡肉盡為度當歸散治癰疽發背金瘡已壞及未敗火瘡諸瘑疥患當歸附子炮細辛芎藭續斷牛膝通草甘草炙白芷各二兩蜀椒三合芍藥黃耆各一兩右㕮咀以豬膏二升煎微火上以白芷色黃藥成絞去滓以傅瘡上日三過忌海藻菘菜豬肉乳香黃耆散治一切惡瘡癰疽發背疔瘡疼痛不可忍者或瘡氣入腹神昏不醒嘔吐者或未成者速散之已成者潰敗膿不出刀削其惡肉下打撲傷損筋骨疼痛或婦人産後腹痛惡物不下黃耆當歸去蘆川芎陳皮麻黃去根節甘草芍藥各一兩人參五錢米殼二兩去根蒂蜜炒乳香沒藥各五錢另研右為末每服三錢水一中盞煎至七分去渣溫服如瘡在上食後如瘡在下食前服內補散一名木占斯散治癰疽發背婦人乳癰諸癤未潰者便消不消者令速潰疾愈木占斯人參乾薑一云乾地黃一作大黃細辛桂心厚朴敗醬防風栝蔞根桔梗甘草各一兩右治下篩酒服方寸匕藥入咽覺流入瘡中若癰疽灸之不能發壞者可服之未壞者去敗醬已發膿者內敗醬服藥日七八服夜二三服病在下當膿血出此為腸癰諸病在裏惟服此藥即覺其力痛者即不痛常服治諸瘡及疽痔瘡已潰愈婦人乳癰宜速服之一方無桂心一名木占斯散主癰腫堅結若已壞者速愈未壞者使不成癰便消一方粥飲調下亦可猬皮散治癰疽膿血內漏諸漏壞敗男發背女乳房及五痔方猬皮蜂房各一具地榆附子桂心當歸續斷各五分乾薑蜀椒藁本各四分厚朴六分右治下篩空腹以酒服方寸匕日三取瘥加斑貓七枚益良外臺祕要有杜仲無乾薑椒薑散治癰疽發背蜀椒乾薑黃芩人參各二錢桂心小豆一合半白斂甘草附子防風各一兩芎藭二兩右治下篩酒服方寸匕日三夜二祕傳連翹湯連翹升麻朴硝各一兩另研玄參芍藥白斂防己射干各八分大黃一兩三錢甘草炙半兩杏仁八十枚去皮尖麩炒黃另研右除杏仁朴硝外為粗末却入杏仁朴硝末令勻每服三錢水一鍾二分煎至八分去滓空心服利下惡物為效神功妙貼散塗傅癰疽暈內使膿血化水收暈斂毒南星元白的萞麻子仁各四錢半夏生白芷硝一片沒藥薑黃五倍子淡紅的貝母白芨各三錢乳香各二錢花蕊石散二貼右細末夾和井水入蜜調傅瘡色黯晦薑汁調傅從暈邊收入裏留中間如錢大貼膏藥若瘡開大可用紗攤藥以舊茶籠內白竹葉尾剪兩片如瘡勢先貼藥上然後貼瘡久年蓬仰上竹葉亦得竹葉出水藉藥以行之凡傅藥須是細末則不痛紅內消散癰疽內藴熱外發熱用此紅何首烏半兩逺志水浸取肉蘸薑汁片赤茯苓川芎北梗苦參赤小豆赤芍藥蔓荆子葳靈仙各三錢甘草生半兩右末每服二錢麥門冬十四粒煎湯調下洗瘡方莽草苦參貝母射干木通蜂房大腹皮桑白皮漢椒白芷各等分連根蔥白多用右煎湯密室中淋洗五香連翹湯治惡核癰疽惡瘡惡腫等已破未破疼痛皆可治之青木香母丁香一作雞舌香黃熟沉香當門麝香乳香川升麻桑寄生川獨活木通牛舌大黃蒸一方用兩半連翹各一兩右銼散每四錢水二盞煮一盞須用銀銚煎如無用銀一片空心熱服半日以上未利再服以利下惡物為度未生肉前服不妨以宣去毒熱之氣一方有射干一味本方有竹瀝芒硝恐泥者不能斟酌故缺之知者自當量入一方有黃耆藿香無獨活射干名五香大黃湯凡惡瘡一寸以下者曰癤以上曰癰而瘡瘍亦非小疾有腫而冷者有腫而熱者有不腫而冷者有不腫而熱者有肉色不變而腫者有腫而不破者有破而無膿血者有破而不生肌肉者有膿在膏膜之下若有膿在骨間者皆當與五香連翹湯始發者即消膿成者自破可保全濟也肘後方有紫葛甘草無通草治惡肉惡脈惡核風結腫氣痛要籍喻義有黃耆甘草芒硝各六分翼云未瘥中間常服佳與小兒篇方相重小有異處加味十寄散治癰發已成未成服內消三五日不效或年四十已上氣血衰弱成者速潰未成者速散服至瘡口合而止能固濟去舊生新是名固壘當歸酒浸桂心不見火人參土芎香白芷防風去蘆桔梗厚朴去粗皮薑汁炒甘草五支乳香另研沒藥另研右前八味各等分同為末每服二盞酒調日三服病愈而止不飲者麥門冬去心煎湯或木香湯奪命更生散乾葛知母貝母荆芥各五錢防風細辛獨蓮白芷各半兩青木香澤蘭甘草節各半兩右㕮咀每服五錢酒水各一盞薑五片煎至一盞溫服潮熱皮膚受毒加大黃擂爛柴胡地龍地骨皮麻黃不去節嘔吐惡心脾胃受毒加母丁香瘡凹不起加蜜水調蟬退發汗加黃芩山梔子燈心眼花心經受毒先另服朱砂雄黃麝香為末薑酒下然後服前藥喘嗽肺經受毒加木瓜黑牽牛麝鹽小腹脹大小便閉結脾經受毒加苦葶藶枳殼木通通草麝香瘡冷加當歸肉桂羅參木香用前藥除獨蓮如瘡發痛及身上有熱再進一服仍服前藥如當日瘡痛身熱次早又冷加附子一隻去防風如眼大黃色暈黑汗冷汗粘手足冷至膝瘡硬不起者不治六化丹庶幾神化其藥而俗子所珍以其能化風化熱化毒化結化積化膿為水故曰六化丹即癢丸丸之易名也犀角生者一兩黃芩一兩大黃一兩巴豆半兩去油白斂一兩升麻一兩當歸一兩梔子仁一兩去皮防風草一兩甘草一兩炙天南星黃耆一兩半右為細末以順流新汲早潮水丸如梧桐子大每服五丸不拘時候隨證量大小用之內托散治一切癰疽毒腫發背發肩發髭發鬢發腦發手發足附骨等疽應是瘡瘍毒腫未膿者即消散已膿者即破潰已潰者即收斂消毒順氣托裏定痛收瘡口散腫毒及腸胃癰皆可用化毒排膿內補黃者當歸川芎白茯苓芍藥白芷甘草人參厚朴去粗皮用生薑汁製桂心去皮已上各等分右一十味為細末每服三錢至五錢不計時候溫酒調下如不飲酒以木香湯調下九珍散治一切癰瘡癤腫毒因氣壅血熱而生者當歸川芎白芷赤芍藥生地黃熟地黃瓜蔞甘草大黃茯苓各等分右㕮咀每服四錢以水二盞酒一盞煎至二盞去滓溫服兼治婦人乳癰等瘡芎歸托裏散托裏排膿生肌川芎當歸白芍藥炒木香白芷茯苓各半兩人參辣桂丁香甘草右末每二錢食前米湯調下沉水膏癰疽發背排膿斂毒天南星三分白芨白芷赤小豆半夏生貝母各半兩木鱉子仁去油乳香沒藥各二錢半雄黃一錢右細末井水入蜜調傅紗貼爐峯散治癰疽腫毒爐甘石緑者十分細一兩天南星半夏生各半兩五倍子赤小豆片薑黃直殭蠶貝母白芨各四錢乳香二錢半右細末未破者酸醋調傅已潰者清蜜調傅半乾濕只摻若紅腫多汁生地黃研汁調傅仍前苦參桑白皮湯淋五香散治癰疽須要香氣透達經絡木香丁香藿香葉各一分沉香乳香連翹木通續斷桑寄生甘草微炙各半分右細銼每服三錢井水一碗煎至七分入麝香少許患在上食後服患在下食前服五發證皆令人頭痛惡心寒熱氣急拘攣此藥療之如有熱加燈心桑白皮千金漏蘆湯治癰疽發背丹疹惡肉時行熱毒發作赤腫及眼赤痛生障翳等疾并瘰􅊓初發吹妳腫痛一切無名惡瘡雖覺所苦細微不可輕慢急服此藥並皆內消更不成膿若發背癰已成膿者當排日服之直至膿盡大黃三兩蒸漏蘆白芨黃芩麻黃去節枳殼麩炒升麻白斂一方用白薇芍藥甘草炙各二兩右銼散每四錢水二盞煎七分空心熱服以快利為度淡寮方云漏蘆湯後説本方有芒硝今去之若見熱而實者加大黃作五兩或加芒硝服病人更自量虛損服之化毒方一名十全內托散一名十寄散治一切癰疽瘡癤未成者速敗已成者速潰敗膿自出無假手擠惡肉自去不犯針刀服藥後疼痛頓減此其當用有效也此方得自於都下異人時有苦背瘍者七十餘日諸藥試遍不獲痊效衆醫環立如堵出是方示之相目而笑曰是豈癰背所用藥耶因謂之曰古人用方自有意義觀其所用藥性平和縱未能已疾必不能壞病服之何害乃治斯方藥與之以熱酒一升許下藥五六錢少頃減七分數服後瘡大潰膿血流迸若有物自內托出服半月瘡口遂合若未嘗有所苦者又有苦腸疾者其痛異常醫者略曉時意謂此藥大能止痛試與餌之當日下膿三二碗許痛亦遂止思察之乃腸癰也又一老人忽胸間發腫根腳甚大毒氣上攻如一瓢然斜插項右不能轉動遂以此藥與服明日腫毒既散餘一小瘤如粟米大又明日帖然如故無事又一人發腦疽疑此藥不能救遂殞於庸醫手次年其子復苦此疾與父無異病狀一同因懲父之失縱飲酒服此藥而至不覺大醉竟日衮卧地上及至酒醒病已去矣又一婦人發乳焮腫疼痛日夜呌聲不絶哀苦之音皆不忍聞自謂無復生理又有一婦人股間發腫大如杯碗服此藥皆脫然如失物是藥濟苦者不可計數姑托一二以示大略大扺癰疽之作無定非氣血凝滯風毒壅結或飲酒食熱物過多房室虛甚榮衛不調所致治之不早則外壞肌肉內攻臟腑去生逺矣詳味此方其所用藥皆發散風毒調理氣血排膿止痛生肌長肉等藥五毒不成而坐收瘍醫十全之功其可尚也一方排膿內補十宣散治癰疽瘡癤未成者速敗已成者速潰凡瘡癢者多是心血虛弱此大能消風生血人參用新羅者團結重實滋潤者先洗淨去蘆薄切焙乾當歸取川中來者肥大擇如馬尾狀滋潤甜辣香芬者溫水洗薄切焙乾黃耆用綿者為勝狀如箭幹者長一二尺不開義者洗淨寸截捶碎擘如絲狀以鹽湯浸透微火炙酥再銼入衆藥中芎藭川中者為上今多止是撫芎不用淨洗切焙乾防風擇新香者淨洗切焙厚朴宜用新州來者厚而紫搯之仲出者佳去粗皮切薑汁一宿焙炒桔梗以有心味苦者為真無心味甘者薺苨也切勿誤用洗淨去頭薄切焙乾入衆藥甘草生右八味選藥材精者皆取淨曬焙極燥方稱人參當歸黃耆各二兩餘各一兩除參為細末後入諸藥勻每服自三錢加至五六錢熱酒調下日夜各數服以多為妙服至瘡口合更服為佳所以補前損止後患也不飲酒人濃煎木香湯下然不若酒之勝也或飲酒多能勉強間用調并木香湯解功效當不減於酒也括蒼胡權識疽發背三尺童子亦知為膏肓之疾庸醫既手無措或者又為髙論以自神其術世傳刻涓子方以為得之神仙家而湯劑不一用者惑之歙丞胡君所藏方簡要而有大功郡酒官蕭世京病此數日創大已如碗用其方而愈覽者勿以無竒藥而忽之也如妳癰腸癰及其它腫毒皆常治愈一方作散薑五片煎一方加白芍藥瓜蔞金銀花等分或乳香服之得汗解一方加木香檳榔製枳殼紫蘇天台烏藥名流氣飲甚效陳氏云服在內消等方之後膿盡乃止拔毒黃耆散黃耆大黃酒浸煨羌活去蘆甘草炙當歸去蘆芍藥白附子炮黃芩杏仁去皮尖連翹已上各等分右搗羅為末每服先以黑豆半兩或二合水一大碗煎至七分去黑豆入藥末再煎至一盞食後一日兩服候逐出惡物即止其貼瘡斂瘡藥隨宜用之一方無黃耆犀角散生犀角屑玄參去蘆升麻生黃耆去蘆切赤芍藥麥門冬去心生粉草當歸酒浸去蘆焙各一兩大黃微炒二兩右為粗末每服三錢水一盞半煎至七分去滓溫服無時候救苦黃耆散治諸癰癤惡瘡黃耆甘草當歸瓜蔞根芍藥各一兩五錢懸蔞一對熟地黃不以多少金銀花二兩皂角棘針為引右㕮咀每服五錢無灰好酒一升同引子裝於磁瓦內將瓶用笋葉封坐於鍋內以大盆覆鍋口盆外用黃土封之毋令出氣煮之外聞藥香為度取出瓶沉定飲清將藥滓再添酒一升依前煮服不飲酒者以水煮服若酒少者酒水各半煮服瘡在上食後臨卧瘡在下空心服之萬病解毒丸治癰疽發背魚臍毒瘡藥草毒挑生毒蛇毒獸毒蠱毒廢蟲諸惡病文蛤即五倍子一兩半山茨菰即金花燈根一兩洗焙全蝎五枚紅牙大戟洗焙七錢半大山豆根續隨子取仁去細留性各半兩麝香一錢朱砂雄黃各二錢右件先以前五味入木臼搗羅為細末吹研後四味夾和糯米糊丸分作三十五丸端午七夕重陽臘日淨室修合每服一丸生薑蜜水磨下井水浸研傅患處解毒收瘡救病神妙朱砂雄黃乃瘍醫五毒攻瘍中物也一方無山豆根九珍散治一切癰疽癤腫毒因氣壅血熱而生者當歸川芎白芷赤芍藥生乾地黃苽蔞甘草大黃北黃芩各等分右㕮咀每四錢水二盞酒一盞煎至二盞去滓微熱服未成膿即內消已成膿則速潰亦治婦人乳癰瞿麥散主排膿止痛利小便瞿麥芍藥當歸麥門冬去心各二兩桂心芎藭白斂赤小豆半合黃耆一兩右為散先食溫酒服方寸匕日三翼深師同忌生蔥陳臭肉食等物大黃薄貼方療癰疽發背大黃黃芩寒水石石膏赤石脂黃連各三兩白芷黃蘖各二兩白斂五兩右藥下篩以三合投粉瀝三升中和薄塗貼腫上燥易腫下止不下厚傅忌生冷熱麵大酢一方用漿水調塗小丹拓方治癰疽始發浸淫進長升麻黃連大黃芎藭各二錢黃芩芒硝各三兩當歸甘草炙羚羊角各一兩右杖攪令成膏適令熱貼帛拓腫上數度便隨手消散瞿麥散治癰疽未潰瘡中疼痛膿血不絶瞿麥白芷黃耆當歸細辛芍藥芎藭薏苡仁赤小豆末各一兩右先以清酒一升漬小豆出銅器中熬之乾復漬漬復熬五遍上然後搗諸藥下篩酒服一方寸日三夜二服三五日後痛者癢肌肉生一法以春酒漬小豆多痛倍瞿麥痛未開倍白芷多膿倍黃耆薏苡仁芍藥良李溫如八行家寶祕療發背藥方不以傳人其子秉彛客於新吳大姓羅氏一日出遊偶忘封鎖書篋為諸生竊取其方録之秉彛歸為之出涕蓋其父子以此方救人之死甚多深不欲傳也其用藥次第如後初覺瘡發時先服通關散治發背肉潰及諸惡毒衝心嘔逆以菉豆不拘多少為末每服二錢入乳香一錢井花水調下以利為度未利更入乳香再服次用藥試發瘡可治不可治白礬一兩天南星一個右為末以冷水和勻傅腫處留出瘡口仍以筆畫泥瘡暈若藥力勝則腫消皮皺此為易治若腫處皮急暈即難治次服赤小豆用赤小豆半升不去皮生為末每用一兩匙以冷水調下連併服盡未退再服半升取口鼻大便出血為度服豆末時不可喫飯次服四味散石上薜荔二兩地榆一兩甘草節一兩當歸一兩右為末溫酒調下三錢次服膨脝葉一斤岡穀刺葉一斤右旋採勿令婦人雞犬見碓臼內舂爛每用一碗許以酒一盞浸去滓溫服仍以藥滓罨瘡次用斂瘡口生肌散木香檳榔黃連洗去鬚右等分淨器碾為末時以傅瘡若瘡潰爛傅了更以常用膏藥或雲母膏貼定聼膿水自出若有此藥傅後瘡口未便斂白艾末輕粉各少許勻傅即有速效麝香蟾酥丸治一切癰疽發背疔瘡內毒如未破用針刺破撚藥在內膏藥貼之其瘡即潰蟾酥輕粉乳香各半錢明信雄黃各一錢巴豆十個去皮油麝香少許寒食麵三錢右為細末滴水為錠子如小麥大量瘡為度八味黃耆散治癰疽發背黃耆芎藭大黃黃連芍藥莾草黃芩梔子仁各等分右治下篩雞子白和如泥塗故帛上隨腫大小傅之乾則易若已開口封瘡上須開頭令出氣治癰疽發十指或起膀胱及發背後生惡肉者豬蹄一具治如食法當歸大黃芎藭芍藥黃芩獨活莾草各一兩右㕮咀以水三斗煮豬蹄取八升去之內諸藥煮取四升去滓漬瘡兩食頃洗之拭令乾傅麝香膏麝香膏治癰疽及發背諸惡瘡去惡肉麝香䕡茹一作真珠雄黃礬石各一兩右為末以煮膏調如泥塗之惡肉盡止却傅生肉膏生肉膏治癰疽發背後生肉生地黃一斤辛夷一兩獨活去蘆頭當歸焙大黃炒黃耆銼芎藭白芷芍藥黃芩去黑心續斷各一兩薤白五兩右十二味㕮咀以臘月豬脂四升煎取白芷黃下之去滓傅之立效參苓順氣散病癰疽之人進飲食降氣健脾烏藥一兩半白茯苓去皮真紫蘇子微炒人參去蘆各一分青皮去白麩炒粉草炙各半兩白术泔浸半日焙麩炒白芷不見火各一兩右為細末每服二錢水一盞生老薑連皮切三片棗一枚煎至八分空心溫服煎藥不用薑能發熱動氣茯苓開胃散白茯苓去皮一兩粉草炙半兩枳殼去穰麩炒黃一分右為細末每服一錢入鹽一捻沸湯點服無時候龍腦麝香錠子追毒回瘡止痛生肌龍腦三錢麝香二錢輕粉半錢粉霜三錢雄黃半錢乳香一錢雌黃半錢巴豆十四個去皮尖右為細末乾飯為丸如小麥大紝在瘡上其瘡腫時藥敷上用貼治疳瘡研絍在瘡內忌冷水消腫膏治發背癰疽一切惡瘡生烏麻油鉛丹研黃蠟各四兩熊脂松脂各一兩水銀硫黃研芒硝研各半兩右取五月四日早於淨室中用銀石器炭火上微煎至初五日早勿令息火膏成看瘡腫大小以故帛攤貼之未作膿便消合時忌婦人豬犬見臘月臘日合亦良其水銀熊脂於掌中研入諸藥當歸貼方療諸癰瘡發背有膿血當歸一分蠐螬丹參附子炮蠟蜜桂心膠各一分梔子十枚右合煎以貼瘡上琥珀犀角膏治癰疽不曽宣毒致熱毒衝心經咽喉口舌生瘡及紅黑􅌲者真琥珀研生犀角屑各一兩辰砂研二錢人參去蘆二錢茯神去木皮二錢真腦子研一字酸棗仁去皮研二錢右人參茯神犀角為細末入乳鉢內别研藥味和勻用煉蜜搜為膏子以瓷瓶收貯候其疾作每服一彈子以麥門冬去心濃煎湯化服一日連進五服取效追毒散追毒排膿五靈散川烏頭炮白乾薑炮各一兩井鹽全蝎各半兩釣靈根三兩無心草二兩右為細末每用藥少許津唾調塗患處釣靈根一作常靈根萬應鐵針丸治一切腦背疽惡毒大瘡欲死者一粒即愈麝香三錢蟾酥三錢舌試辣者可用血蝎三錢嚼如蠟者用散者非真不可用輕粉三錢硼砂三錢片腦一錢蜈蚣一對全用右為極細末煉蜜和為劑如瘡有頭用針挑破微有血出將藥一黍米大放於挑破瘡口內上用紙花周圍唾津濕沾瘡上其藥不過時刻即效如兩三刻見無頭瘡者即是暗疔俗云耍瘡是也即將兩手虎口白土紋用針挑破如前藥封蓋忌雞鵝酒濕麵一切發熱之物清心散治癰疽有熱證逺志製赤茯苓赤芍藥生地黃麥門冬去心知母甘草生各半分右銼每三錢薑棗煎服小便祕加燈心木通獨活散浣洗一切癰疽獨活黃芩莽草當歸川芎大黃赤芍藥各一兩右為散分作兩次先用豬蹄以水二升煮令蹄熟去蹄入藥冉煎十餘沸去滓乘熱洗瘡車鰲散治癰疽初發腫痛或少年熱盛發背等急宜宣毒利下熱退為度大人小兒四季皆可服之紫背車鰲一雙鹽泥固濟火煆通紅地上出火毒用輕粉甘草各二錢大黃五錢黃芩漏蘆去鬚瓜根各半兩右為末每服二錢薄荷湯下速利酒亦可單煮大黃湯治同上氣血衰者不可用大黃甘草各等分右銼散每服三錢水一盞半煎空心服利下熱毒排膿散廣濟療癰疽黃耆十分膿多倍青小豆一分熱口乾倍芎藭三分肉不生倍芍藥三分痛不止倍白斂三分有膿不合倍栝蔞三分若渴小便利倍甘草三分炙右為散酒服方寸匕日三服不利忌海藻菘菜熱麵魚蒜止痛靈寶散鬼繫腰生竹籬隂濕石岸絡石而生者佳路木者無用其藤柔細兩葉相對形生三角用藤葉一兩洗淨晒乾不見火皂角刺一兩銼新瓦上炒黃甘草節半兩瓜蔞大者一個取仁亦用新瓦炒香明乳香一錢别研沒藥三錢别研右除乳香沒藥外為粗末入乳香沒藥和勻每服二錢水一盞酒半盞慢火煎至一盞去滓通口服無時壓熱神白膏大黃白斂黃蘖皮南星赤小豆黑蛤粉右為細末用芭蕉清汁調塗腫上遇乾時更用蕉汁刷濕內托黃耆丸治因用針砭傷其經絡白膿赤汁逗流不止生黃耆去蘆焙銼八兩當歸洗焙三兩肉桂去淡者不見火木香沉香乳香别研各一兩諸香並不見火右為細末用菉豆粉四兩生薑自然汁煮糊丸如梧桐子大無時溫熱水吞下四十五十丸替針丸治癰疽已潰未破後膿出不快者白丁香一字硼砂一字石灰餅入藥內拌炒糯米十四粒一法用煉倉米沒藥乳香各一字右為細末粳米飯旋丸如麥粒大每用一粒米破用津貼瘡頭薄處已破膿滯不快則用二粒絍瘡內使膿不滯好肉易生三因方無乳香枳殼丸治瘡疽熱癰腫瘰􅊓枳殼麩炒去穰牽牛炒取頭末木香青皮各一兩甘草大黃右為末用皂角長一尺豬牙三挺約三兩炮燋捶碎以好酒煮軟挼取汁熬膏調粘和前藥末為丸如梧桐子大每服三五十丸食後蔥茶下日進二服升麻拓腫湯升麻黃耆防風川芎生地黃細辛等分右㕮咀用藥二兩水二升煎十沸稍熱淋拓內消通聖雙行湯治傷風寒暑濕或澀或散使氣血滯凝肉腐為膿壅結成癰疽隨處發作大黃蒸一兩木鱉去殼切防風枳殼桔梗甘草各一分右為銼散每服四大錢水一盞煎七分去滓入朴硝兩錢重煎鎔熱服得踈轉一兩次即服萬金湯若隂證只服萬金不可用聖雙行湯復元通氣散治諸氣澀耳聾腹癰便癰瘡疽無頭止痛消腫青皮陳皮各四兩甘草三兩生熟各兩半穿山甲炮二兩栝蔞根二兩金銀花連翹各一兩右為細末熱酒調下消腫毒方専用塗諸瘡疽川烏蚌粉草烏海金砂赤小豆天南星各等分右為末用生地黃汁調塗患處佳越椒散洗諸癰疽越椒一名梔子黃芩甘草當歸羌活白芷各等分右㕮咀每用一兩水五碗煎至四碗去滓溫洗當歸連翹散治腦疽發背諸惡瘡咽頰不利舌腫喉閉鼻衄出血咳嗽痰實鷺絲藤芍藥梔子大黃當歸切焙連翹各等分右為粗末每服三錢酒一盞半煎至六分去滓溫服食後日三服量力減加熱實加倍以利之隂證者加大黃一方生薑五片水煎服之蠲毒散治癰疽腫毒未結則散已結則潰去風排膿天南星一兩貝母三分白芷赤小豆各半分雄黃二錢研直殭蠶焙用半兩右細末初用醋調傅後用蜜水傅癰疽宣毒方諸癰疽已破未破通用瓜蔞一箇去皮銼細用皂角刺甘草微炙各二錢乳香輕粉各半錢紫車鰲殼一箇黃泥和鹽塗得煆通紅用二錢右細末先用老酒二碗煎瓜蔞濾清取一碗五更暖用瓜蔞酒調上項藥末空心服大便自下惡物如魚涎狀消腫散癰疽通用澤蘭皮天南星赤小豆白芷薑黃各一分白芨半分右細末酒調傅或蜜水醋同調傅退毒散癰疽通用木鱉子去油天南星半夏生赤小豆白芷草烏連皮尖等分右細末硬則法醋調傅熱焮則蜜水調傅退腫散癰疽腫毒通用天南星圓白者半夏生各半兩赤小豆五倍子白芷貝母各二錢半右細末蜜醋調傅乳香膏治癰疽腫毒惡瘡排膿止痛收縮筋腳乳香竹葉包尉研沒藥各一分輕粉一錢麝香半錢黃蠟二錢􅒝麻仁一兩右搗研極細成膏撫紙折薄攤藥留眼貼之日二換或純用萆麻子仁入沒藥研細傅貼神聖內托散未成者散已成者膿血自消沒藥一錢鮮明者大黃一斤甘草半斤牡蠣四兩山梔子二兩乳香五錢右粗末每服五錢水一大盞煎至三五沸去滓入蜜半匙調勻溫服年壯力盛人加至兩水一小盞煎服劑下後宜以十六味流氣飲調理血氣復常立效散治疽背膁瘡癤毒當歸尾苦參南星黃芩黃柏草烏尖各等分右為末煎茶清調敷患處存瘡破處如不破通生肌散米醋調陽證朴硝隂證加川烏尖拓腫升麻湯升麻芒硝黃芩漏蘆梔子仁蒴􅀢右㕮咀每用藥二兩水三升煎十沸帛蘸藥拓潰腫處薏苡仁散主令癰自潰長肌肉方薏苡仁桂心乾薑白斂當歸肉蓯蓉各一兩右為散先食溫酒服方寸匕日三夜再忌生蔥神仙追毒丸一名神授丹又名神仙解毒萬病丸解一切毒如被狐狸鼠莽惡菌河魨食疫死牛馬肉等毒或蛇犬惡蟲所傷又治癰疽發背及魚臍瘡人多不識喚作癰疽治殺人者及治諸風病丙穩禾疹赤腫丹瘤等山茨菰去皮淨焙枰二兩重文蛤一名五倍子捶碎先焙淨稱三兩重麝香三錢别研入千金子一名續隨子去殼研去油取霜一兩紅牙大戟去蘆洗淨焙乾稱一兩半右除千金子麝香外三味為細末後却入研藥令勻用糯米煮濃飲為丸分為四十粒每服一丸研生薑薄荷汁井華水研服如是乾薄荷濃煎湯冷磨服亦佳通利一兩行無妨只用溫白粥止住合時宜用端午七夕重陽日合或遇天德月德日亦佳合時須淨室焚香至誠修製毋令婦人雞犬見效驗不可具述宜珍藏之若遊宦嶺表才覺意思不快便服之即安二廣山谷間有草曰胡蔓草又名斷腸草若以毒人急水吞之急死緩水吞之緩死又有殺毒蛇以草覆上以水灌之數日菌生其上取為末調酒以毒人始若無患飲酒即毒發立死其俗淫婦人多自配合北人與之情好多肯逐北人而隂以藥置食中比還即戒之曰子復來若從其言即復以藥解之若過期不往則必死以名曰定年藥北人屆彼亦宜志之若覺中毒四支不調即宜服之或於雞豚魚羊鵝鴨等肉內下藥冉食此物即觸發其毒急服此藥一粒或下隨手便瘥昔有一女子病勞瘵命在旦夕為血尸蟲所噬磨一粒服之一時間唾下小蟲千餘條大者挣為兩假後更服蘇合香丸半月遂愈别具湯使于後菌菌苽子金石砒毒喫疫死牛馬肉豚魚毒時行瘟疫山嵐瘴氣急喉閉喉纒喉風脾病黃腫赤眼瘡癤衝冒寒暑熱毒上攻自縊溺水打折傷死但心頭微暖未隔宿者已上並用生薑蜜水磨一粒灌之須臾復蘇癰疽發背未破魚臍瘡諸般惡瘡腫毒湯火所傷百蟲犬鼠蛇傷已上並用東流水磨塗并服一粒良久覺癢立消打撲攧損傷折以炒松節酒磨下半粒仍以東流水磨塗男子婦人顛邪鬼氣鬼胎以暖酒磨下一丸可以分作兩服有毒即吞下自止縊溺死邪鬼死用磨服聖效散黃柏二兩去粗皮細切炒至赤黑色穿山甲一兩炒令黃色檳榔木香各半兩炒令黃雞䏶脛七箇生用右為細末每用少許候大膿出盡方可乾摻瘡上立效散治發背及諸癰癤及瘰􅊓有效或婦人乳癰紫色皂角刺半斤不用枯者細銼耐久炒赤生粉草二兩乳香别研半兩沒藥别研半兩瓜蔞五箇去皮取肉并仁搗碎右瓜蔞炒黃乾者不必炒共為細末每服二錢溫無灰好酒調下無時候神驗酒煎散治癰疽發背諸癤毒定痛人參沒藥當歸各一兩甘草炙一分瓜蔞一分半生半炒右㕮咀以酒五升煮至二升淨瓷瓶貯之每服半盞浸酒半盞溫服無時候更用滓焙乾加當歸生為末酒煮麵糊丸如梧桐子大每服五十丸用此浸藥酒吞下順氣活血潰消散治癰疽諸發可以宣熱拔毒川當歸漢防己赤芍藥瓜蔞子木鱉肉各半兩大黃七錢木香甘草各三錢右㕮咀每服二錢酒水各半煎去滓露一宿空心冷服若病勢急者漩冷服此藥較之連翹湯又無五香而不利於虛若瘡不痛不大熱不腫髙者不可輕用沉水膏治癰疽腫熱硬痛不止白芨白斂黃柏黃連黃丹各等分右為細末新水調塗腫處護肌膏收暈斂毒天南星二兩明白礬並生用七錢半白斂白芨雄黃右細末每半兩生地黃取汁調傅瘡暈外舊肉上自外圍而促斂之又驗瘡用新水調筆蘸傅瘡藥力勝則腫消皮皺易療若腫處皮急暈開難療特異萬靈散治癰疽發背腫毒軟石膏燒通紅碗覆在泥地上一宿大白南星赤小豆各半兩草烏連皮半兩乳香别研二錢右細末蜜水調膏從外抹收入留最髙處如錢勿傅如已破切忌藥入瘡口恐痛斂毒排膿不致潰爛屢效白芷洗方白芷一兩新桑白皮三分貝母半兩漢椒三錢紫蘇二莖右銼碎分兩次入連根蔥煎以蔥蘸湯洗潰爛者豬蹄煎湯洗或水膠煎湯洗亦好追毒餅子治諸般惡瘡因針開了口後又閉合生膿脹痛不可忍用此藥捻成小錠麥大放入瘡口中永不閉膿水自出瘡自乾好極等好信半錢雄黃雌黃朱砂各一錢輕粉少許右研細末用糯米糊丸如麥子大如瘡口閉合生膿却將錠甲許入在瘡口中錠子既入仍將膏藥貼之一日過丁子自出或不出膿瘡乾好如神效諸疽瘡膏方蠟亂髮礬石松脂各一兩豬膏四錢右先下髮髮消下礬石礬石消下松脂松脂消下蠟蠟消下豬膏塗瘡上玄參散懸癰腫毒不下食玄參一兩升麻射干大黃各半兩甘草一分右用水煎作一服含咽追毒丹治疽瘡黑陷者先用狗寶丸治次以烏龍膏收腫散毒去赤暈乃用針刀開瘡納追毒丹使之潰然後去敗肉隨膿排證治之癰疽疔瘡附骨疽並治之巴豆七粒去皮心不去油研如泥白丁香一錢雄黃黃丹各二錢輕粉一錢右研和加白麵三錢滴水為丸如麥狀針破瘡納之上復以乳香膏追出膿血毒物漏瘡四壁死肌不可治亦以此法追毒去死肌乃養肉便愈矣疾小者用一粒大者加粒數用之一方加蟾酥丸尤神速治癰疽發背已潰未潰及諸腫毒栝蔞根榆白皮故燕窠鼠坌土右各等分為末以女人月經衣水洗取汁和如泥封腫上乾即易潰者四面封之已覺即封從一日至五日瘥神功麻仁丸麻仁去殼研令極細川大黃三兩溫紙褁煨人參三分去蘆訶子煨取肉三兩右除麻仁外為細末和麻仁令勻煉蜜丸如梧桐子大每服三十丸熟水任下食前臨卧服排膿托裏散治一切瘡癤癰毒及腸癰背疽或赤腫而未破者或已破而膿血不散渾身發熱痛疼不可堪忍者并治婦人妳癰一切毒腫並宜服之地蜈蚣赤芍藥當歸甘草右等分為細末每服二錢溫酒調下不拘時靈寶膏治發背癰疽宣熱散毒排膿止痛及腦癰妳癰疼痛不可忍大瓜蔞三十箇去皮留穰子炒香取仁細研乳香二兩胡桃六十箇取肉去皮同瓜蔞細研白蜜一斤右以銀石器內慢火熬成膏每服兩大匙溫酒調下不以時候服一方無胡桃用瓜蔞五箇乳香五塊蜜一斤熬成膏每服三二錢日二服大治發背諸惡瘡等日進二服無不立效昔嚴州上人一通判忘其名母病發背祈禱備至夜夢吕真人服青衣告云為公極孝故來相告更遲一日不可療矣通判公急市藥治服之即愈楊和玉得此方家中使令凡百瘡腫等患服之皆效遂合以濟人無不驗者漏瘡惡核普皆治之烏龍膏治一切腫毒癰疽色赤暈木鱉子去殼半夏各一兩小粉四兩草烏半兩右令鐵銚內慢火炒令轉焦為細末出火毒冉碾細以冷水調傅一日一換逼毒散治諸般腫毒癰疽白芷半斤貝母十二兩香附子末六兩甘草三兩右為細末每服二錢用溫酒調下隨病服內補散治癰疽已破托膿敗毒白芷二兩官桂一兩香附子三兩甘草半兩右為細末每服二錢用酒調下拔毒散癰疽腫結通用能散能漬南星上等大白者一兩草烏頭白芷各半兩木鱉子仁一個右細末分兩次法醋入蜜調傅紗貼之穿山甲散癰疽托毒排膿治五毒附骨在臟腑裏托出毒氣止痛內消蜂房一兩蛇退穿山甲油髮並燒帶生存性各一分右為末每服二錢入乳香末半錢暖酒調下皂棘散托毒排膿川烏半兩甘草生一兩乳香一分皂莢刺燒帶生存性四兩右為末每二錢溫酒調下麝香散癰疽已結而頭不破用此直雀屎研一錢斑貓去頭足翅一錢半腦麝隨意右細末法醋調少許點在有頭處立破急用煎黃連湯洗去當歸酒治癰疽隂證頭平向內沉黯不疼渾身患處不熱辣桂去粗皮半兩當歸四錢木香白芷各二分右細銼每服三錢半醇酒一碗慢火煎七分入乳香末半錢不飢飽溫服以排膿內補散加味千金正氣散為佐以米補豬蹄膂肉為養喬麥麵能發起可煮食之如更不發起用狗寶薑附湯當歸木香炙甘草煎服之更不發起用又方穿山甲頭截片子醋炒焦人牙煆留性各一分右為末分作兩服用辣桂當歸去節麻黃煎酒食前調下患處用生薑汁和麵厚塗或用川烏硫黃人牙煆並細末酒調傅之癰疽腹痛方辣桂一分木香芍藥北五靈脂各半分右銼散每服三錢薑棗煎服癰疽方赤小豆菉豆黑豆川薑黃各等分右細末未發起薑汁和井華水調傅已發起蜜水調傅家寶方柞木湯一名柞木飲子治發背及諸般癰腫柞木葉一葉刺在處有之焙乾地榆根刷洗去土切片煨萱草根洗去土切片煨乾乾荷葉各等分右如急用濕者亦可共為粗銼將大斗瓶一隻入藥半瓶却灌新水令瓶滿煎拆二分存八分無時溫服不拘多少飲多為妙如赤腫未結即自大便中下其狀如碎豬肉勿以為怪如瘡黑赤為候怪證定結成頭服之兩日黑定變赤其赤處變成紅穿用貼斂藥得遂得效方用竹葉四兩柞葉四兩餘三味各一兩外加甘草節一兩銼為散每半兩水二碗煎至一碗分二服早晚各一服併滓再煎服膿血自乾未成者自消忌一切飲食毒追毒散又名四調膏治一切癰疽瘡癤滑石寒水石黃連大黃各等分右為細末用朴硝調傅上瘡腫處藤花散治癰疽腫瘡毒內附筋骨裏托內消回活氣血鷺鷥藤莖葉花附黃耆甘草生各半兩栝蔞根半兩右為粗末每服五錢酒二盞煎至一盞紗絹拗濾去滓溫服日三無時豬蹄湯升麻甘草芍藥蒴藋各等分右㕮咀每服藥四兩水一斗豬蹄一對煮蹄軟取出次下藥再煎汁沸帛蘸淋拓之此藥如毒已破其熱漸退即常服如患初發未破此藥性雖暖大能去熱毒化毒排膿內托散治一切癰疽發背諸般瘡腫未成膿者自散已成膿者速潰貼膿自出至瘡口合止人參當歸川芎防風各一兩右同為細末每服五錢熱酒調下不拘時候治生癰疽腫毒已未成者生大黃山梔子金銀藤蠣殼煉過末子右約三錢研和一處酒水為小煎至大半碗病在上食後病在下空心服如生成者用皂角針七八枚將尖頭火內燒作炭敲尖在內如前煎阿膠飲子治一切癰疽發背挾􅗢􅂒􅗢妳癰癤毒明牛膠銼粉炒如珠出炒毒粉草生銼各一兩化橘紅半兩右㕮咀分作三分每服以水一碗煎至七分去滓候溫病在上食後服病在下空腹服試之有效一方有紫色皂角刺燒存性等分轉毒散治發背癰疽不問淺深大小利去病根則免傳變不動元氣解壅積排膿血一名小車螯散一名去毒散車螯紫背光厚者又名嫦娥以鹽泥固濟煆令通赤候冷淨取末一兩用生甘草一分輕粉半錢右細末每服四錢以濃煎栝蔞酒調下五更初服轉下惡物為度未知冉用栝蔞一箇去皮酒一碗煎至一盞調一服甚者不過二服要須熱視其勢若大假聚則急服之效在五香連翹湯之上但稍緩者只服五香連翹湯急切須急服神仙截法凡發背者自內出外始名發背其疾實緣熱當心在中隔上下不通拆以承背上虛處出也先三五日病丙穩禾疹妨悶在肌膚中積漸成腫如出皮膚結聚成腫故名發背麥飯石膏治發背諸般癰疽神效一名鹿角膏又名三神膏白麥飯石其石顔色黃白類麥飯團者是也如無此石只尋舊麵磨近齒處石不限多少用炭火煆至紅以好米醋淬之如此煆淬十次方得却穰為末重羅去粗者取細末入乳鉢內用數人更迭研五七日要如麵樣細炒用鹿角不用自脫者須揀帶腦頂骨全者即是生取之角方可用截作二三寸長炭火內燒令煙盡為度碾羅為末冉入乳鉢內更迭研令極細白斂研為細末右用煆成麥飯石細末二兩鹿角灰細末四兩最要研得極細方可效驗若研得不細塗即極痛若細而嫩則大能止痛收口排膿精粗之效不同者如此和合時量藥末多寡用經年好米醋入銀石器內煎令魚服沸却旋旋入前三味藥末在內用竹箆子不住手攪一二時久令稀稠得所取出傾在瓷盆內候冷以紙蓋慎勿令著塵埃每用時先以豬蹄湯洗去瘡上膿至淨以故帛挹乾以鵝翎拂藥膏塗傅四圍凡有赤處盡塗之但留中心一口如錢大以出膿血使熱毒之氣隨出如未潰能內消如已潰則排膿如湍水逐日見瘡口收斂如患久肌肉腐爛筋骨出露用舊布塗藥以貼瘡上但內膜不冗亦能取安洗瘡勿以手觸動嫩肉仍不可以口氣吹著瘡更忌有腋氣之人及月經見行婦人或有孕人見合藥亦忌此麥飯石須好者鹿角須生帶腦骨者燒灰時却不用腦骨但要辨其生取與自退耳若能精虔選擇修製收功多矣仍可熬米醋一大盆收瓷器內候逐日用藥於瘡上久則其藥乾常用鵝翎點醋拂溫其藥勿令綳也初須一日一洗一換藥十日後兩日一換古方云白麥飯石顔色黃白類麥飯舊作磨者尤佳愚謂麥飯石不可作磨如斯言則惑人以麥飯石其狀如飯團生粒點若無此石當以舊麵磨退齒處石代之以其有麥性故也此石或無賣者只於溪中尋麻石中有白石粒如米大者即是也但大小不同或如拳或如鵝卵或如盞大略如握聚一團麥飯焉古之吕西華北方傳以外舅之親計其不可得裴員外啖之以名利河南尹脅之以重刑吕寧絶榮望守死不傳君子責之以存心隘是方之得不易如此普濟方卷二百八十三
