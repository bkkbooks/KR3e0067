body:
  text: 普濟方卷二百七十六明周王朱橚撰諸瘡腫門許真君七十二證土虺瘡證第一夫土虺瘡證者初生蕎麥皮相似腫硬無頭腦熱著骨只發憎寒俗名疔瘡此名土虺之證也宜服奪命返魂散紫燕瘡證第二夫紫燕瘡者初生如黃豆相似無頭癤只發憎寒腫硬逐旋如添近心熱燥喫食無味喉中不利霍亂憎寒無時是紫燕瘡證也治法如前紅絲瘡第三夫紅絲瘡者初生如牛眼睛相似貓兒如絲走徹不止及發憎寒身體沈重霍亂吐逆先服奪命丹追魂散半錢後用針當紅絲頭針破出血宜服四聖散以麝香散敷之魚臍瘡第四夫魚臍瘡者初生如覆盆相似肉有紅筋頭破只出赤水涓涓不住不疼不痛此是魚臍瘡之證也紫燕發背瘡第五夫紫燕發背瘡者初生似大頭癤狀如白米大多發黑紫色破如蜂窠相似及發寒熱身體倦悶宜服前藥治之紫燕發髮瘡第六此瘡生面上侵鬚髮際紫燕發鬚瘡第七此瘡多生口邉鬚裏紫燕腦疽瘡第八此瘡多生頂上宜急救魚臍發背瘡第九此瘡多生背上硬腫內有紅絲魚臍發髮瘡第十此瘡多生在髮邉是魚睛瘡破之黃水出魚臍腦疽瘡第十一夫此瘡者多生於頂上宜急救之已上六證並前項紫燕發憎寒困悶身體昏亂吐喫無味宜服奪命丹追魂散急救之若遲透入臟腑難治誤人性命精疽瘡第十二夫此瘡者多生於男子婦人小便之處只發腫硬俗名下疳瘡遲治爛人皮肉宜用佛手散貼之頂疳瘡第十三夫此瘡者多生人髮鬚用沒藥散貼之背疳瘡第十四夫此瘡者多生人手足背上破時多出白膿水不止不赤不腫經年不可宜用如聖水沈膏貼之腦疳瘡第十五夫此瘡者多生於胸脅左右不疼不痛破之白膿水出宜用水沈膏貼之腿疳瘡第十六夫此瘡多生腿上治法同前乳疳瘡第十七夫此瘡者多生於男子婦人左右乳上下依前用藥以上六證苗硬成眼子黑色不可治如白色者用丸藥絍之用水沉膏貼之骨疳瘡第十八夫此瘡者初生如指面大頂上有赤靨破後膿水不止宜服乳香散止痛丸子藥絍之沒藥散貼之紫骨疳瘡第十九夫此瘡者初生苗破頭上瘡子汚徹向外出紫色膿水從裏翻向外是證也宜服萬靈針頭丸裏托之用沒藥散貼之白骨疳瘡第二十夫此瘡者多生形如紫骨疳相似肉之破也不同有如豬肺出赤水從裏翻向外疼痛不止治之依前用藥紫金丹瘡第二十一夫此瘡者初生無頭腦不異色只發增寒疼痛不止是紫金之證宜用萬靈針頭丸用乳香散貼之咽喉單乳蛾第二十二咽喉雙乳蛾第二十三咽喉􅊓瘡第二十四水􅊓瘡第二十五子母瘡第二十六乳􅊓瘡第二十七以上六證咽喉內瘡也用針鈎搭開以奪命散吹入咽喉中後服白龍丸治之凡內外􅊓子瘡只可用藥裏托外貼小便內取之乳疳瘡第二十八夫乳疳瘡者初生如苗乳下若指許腫硬汁成膿或乳頭上下膿水出不止宜服針頭上用水沉膏貼之三五次上觀紫燕瘡第二十九下觀紫燕瘡第三十論曰心牌骨上下一寸二分為紫燕瘡三日已後毒氣入臟腑遍行四肢此是死證服奪命丹追魂散救之遲治則死也勿輕之上觀魚臍瘡第三十一下觀魚臍瘡第三十二論曰若心牌骨上下一寸三分外屬魚臍之證三二日以前未破時服奪命丹救之必愈若破死證不可治紅絲膿沽瘡第三十三螻蛄瘡第三十四其瘡初生時苗破只流赤水或白膿水不止膿到處破肉皆是螻蛄之證也用萬靈針頭丸相膿水盡絍上丸子藥上用麝香散貼之走馬牙疳瘡第三十五口疳瘡第三十六其瘡多生於人口上下無齦遲治即蝕透唇口上不可用惡瘡藥以三亭散貼之疔瘡第三十七其瘡俗言土虺瘡初生黑燋頭只發增寒滿身拘急霍亂吐逆宜服奪命丹返魂散救之痔漏瘡第三十八腸風瘡第三十九其瘡多生於男子婦人大腸頭在裏為腸風有㾦㿔為痔若破膿出為漏此瘡因飲食太過坐卧於濕地上冷氣入內為患筯瘤瘡第四十其瘡多生於胸背上著骨腫硬不消疼痛不止宜服乳香散托之水沉膏貼之撮毒散掃之火焰用丹瘡第四十一其瘡多生於男子婦人手足赤腫熱痛走徹不止宜用撮毒散掃之鴉啖瘡第四十二其瘡多生於人曲文中苗硬如鴉嘴相似白色者可治黑色者不可治乃鴉啖之證用丸藥絍上後服萬靈針頭丸裏托即愈咽喉魚臍瘡第四十三咽喉紫燕瘡第四十四其瘡多生於男子婦人咽喉不可用瘡藥針刺破用吹喉散吹入喉中涎出為效後用白龍丸治之必愈魚臍瘡第四十五紫燕瘡第四十六疔瘡第四十七其三般瘡多生於男子婦人左右脅下此瘡如生三二日以前苗不破者可治急服奪命丹魚臍瘡第四十八紫燕瘡第四十九疔瘡第五十其三般瘡多生於右脅下初生三二日苗不破可治依前法用藥肉瘤瘡第五十一其瘡初生苗似腫癤破後肉色不同無黑色疼痛不止口出赤水有似筋強肉翻向外是肉瘤之證宜服乳香散定痛丸藥絍在瘡口後服萬靈針頭丸托裏甚效血瘤瘡第五十二其瘡初生腫硬如碗苗破紫黑色血出疼痛不止是其證也有此證者急用丸子藥絍之服乳香沒藥散定痛不止再以奪命丹救之紫靨瘡第五十三其瘡初生似疱瘻苗紫色腫硬不消破時徹叱血外不疼痛昏沈合眼不開喫食無味如癡如醉是證也宜服奪命丹次服追魂散更絍丸藥於瘡口內三日外服萬靈針頭丸托裏令不若醉人才可通也氣瘤瘡第五十四其瘡初生並無疼痛不異色苗未破可服萬靈針頭丸內托外用撮毒散掃之如破更用丸子藥絍在瘡口內其瘡自回膽次瘡第五十五其瘡初生形惡疼痛不止其苗破似鴉啖瘡成坑子常出紫黑膿水是此證也宜服香散次絍丸子藥後服萬靈針頭丸托裏用麝香散貼之發增瘡第五十六其瘡多生婦人乳上常言次乳覺初發增寒次發紅硬乃應本證未破用撮毒散掃之後用萬靈針頭丸內消治用沒藥膏貼之骨刺瘡第五十七其瘡初生著骨熱痛赤腫不消是其證也宜服乳香散定痛如人少年氣實者可服妙應犀角丸下㵼三兩行後用撮毒散掃之次服萬靈針頭丸裏托之鶻刺瘡第五十八其瘡多生於人腳板底常言石隱瘡也宜服乳香散次服萬靈針頭丸如破用沒藥膏貼之𣲖􅊓瘡第五十九其瘡多生於男子婦人及小兒頂上只一箇不可用惡瘡藥先於小腸內取過次用沒藥膏貼之腳踝瘡第六十其瘡多生於男子婦人腳踝上破後宜服萬靈針頭丸裏托之乳香散貼之乳風瘡第六十一其瘡初生於人臂上左右兩股間癢痛不止宜用桃花散貼之不可次用動臟腑藥行三五次用一捻散貼之疳瘡第六十二其瘡多生於人耳內疼痛不止時流黃水是證也用萬靈針頭丸托裏後用綿條子去其膿血用筒兒吹桃花散於耳內三五次大有效黑班疹瘡第六十三其瘡多生於小兒身上有似倒陷黑疱宜煎蘇木湯下萬靈針頭丸發瘡托裏白瘤瘡第六十四其瘡多生於小兒手足上赤腫不消用撮毒散掃之效腎疳瘡第六十五其瘡蓋因不慎色欲生於男子婦人便處口噙漿水洗淨用佛手散貼之赤瘤瘡第六十六其瘡多生於男子婦人腿膝上赤腫熱疼宜用撮毒散掃之麻根瘡第六十七其瘡多生於男子婦人手足上瘙癢不止爪破疼痛宜用桃花散貼之血風瘡第六十八其瘡多生於男子婦人手足肋脅下紅紫腫硬走風不止是證也宜用桃花一捻金散貼之效紫靨花瘡第六十九其瘡多生於男子婦人頭面上用枯白礬水相調掃之立效血刺瘡第七十其瘡初生發熱疼痛渾身拘急增寒霍亂吐逆急用藥截次用奪命丹追魂散托裏得氣定後用乳香散定痛白粉瘡第七十一其瘡多生於男子婦人面上常言香瓣瘡屋漏水研枯礬淋洗香乳瘡第七十二其瘡生於男子婦人乳上用桃花散或一捻金散貼之立效也追魂丹治七十二證走徹惡瘡托裏南硼砂砒霜蓽澄茄輕粉硇砂粉霜芒硝已上各一錢蜈蚣一對飛亷一對水馬四十九箇片腦一錢右研細末蟬汁為劑用竹刀子切如黃米大不得用手和每服一丸溫酒下忌食米湯葷腥魚膩冷物等萬靈針頭丸治七十二證走徹惡瘡乳香一錢麝香一錢米腦一錢犀角三錢砒霜一錢夜遊將軍一箇白芨半兩蟾汁一箇玄黃色半兩寒食麵三錢右為末就濕研勻用孩兒乳汁和黃米大每服二三丸溫酒送下小兒黑疱子煎蘇木湯送下忌白米粥小豆葷腥奪命丹治七十證走徹惡瘡金頭蜈蚣一對麝香一錢輕粉一錢朱砂少許右為細末用蟾汁和劑不得用手和用竹刀子切如黃米大磁碗內搖之成丸放乾用翎竹筒盛之經年不變色吐逆惡心不拘時候每服三二丸溫酒下奪命追魂散治七十二證惡瘡毒入腸寒熱往來吐逆麝香一錢金頭蜈蚣一對炒乾黃色雄黃三錢濕生蟲四十五箇新瓦焙乾焦右研細末大人服半錢小兒半匙熱酒調下乳香散治七十二證惡瘡疼痛不可忍乳香二錢甘草一錢炒黃皂角針二錢為末右為末每服二錢用無灰酒一盞煎至三五沸和滓溫服身體風毒瘡附論夫風毒瘡者由內熱外虛為風濕所乘則生瘡也所以然者肺主氣候於皮毛脾主肌肉氣虛則膚腠開為風濕所乘內熱相搏故身體皆生瘡也方白花蛇方治風毒攻身體生瘡或時發癢腫痛白花蛇一條去皮骨海桐皮白芷防風去蘆頭獨活羌活白术附子去皮臍天南星半夏湯洗七遍去滑前胡去蘆頭細辛乾蝎桂心漢椒去月木鱉子去殼當歸吳茱茰蒼术各一兩右銼細以米醋二升煎三兩沸和藥拌勻經一宿用臘月豬脂鍊成者三斤苦參湯淋浴後以暖酒調下半匙外以膏塗在瘡上令熱為度日三遍服用苦參散治身體生風毒瘡或癢痛不止方見本門諸疥類薰浴方治風毒攻身體生瘡或時發癢痛久不瘥黃櫨苦參細辛黃蘖麻黃根半夏藁本藜蘆去蘆頭吳茱茰枳殼狼牙桃枝槐枝桑枝栁枝白礬各二兩右銼細和勻分為三分每度用一分以水五斗煎取三斗布濾去滓極熱入盆中於上坐薰令汗出後通手即淋浴湯冷即止以熱水拭乾避風澡浴方治遍身熱毒風瘡及疥癬瘙癢防風一兩去蘆頭白芷一兩細辛一兩苦參吳茱茰苦楝子藜蘆去蘆頭莽草麻黃根各一兩川椒半兩去月鹽二兩右銼細以水五斗煎取三斗去滓乘熱洗浴水冷為度餘滓重煎如前法用治身體生風毒瘡膏藥白蠟一兩麻油五兩桑根白皮一兩銼黃耆一兩銼木鱉子仁一兩膩粉一分乳香一分胡粉一兩研細右先煎麻油後下桑白皮黃耆木鱉子煎令焦去滓後入白蠟候鎔即離火次下膩粉胡粉乳香等以栁木箆攪令勻即膏成內磁器中盛日二三度塗之治風毒攻身體生瘡赤焮腫痛膩粉半兩洛粉半兩杏仁半兩湯浸去皮尖雙仁黃蘖半兩銼黃丹半兩麝香一錢細研黃連半兩去鬚右為細末入麝香等研勻日二三上用油調塗之水銀膏治風毒身體生瘡水銀一兩以熟棗瓤和研令星盡松脂一兩硃砂一兩細研土蜂窠一兩黃柏一兩銼川大黃一兩右除水銀硃砂另為末以鍊成豬脂二斤煎為膏放冷取水銀硃砂入膏中相和攪勻塗瘡上日二換之茅膽膏治身體生風毒瘡茅膽一兩茅針裏面瓤是也梔子仁一兩苦參一兩銼黃蠟三兩清麻油半斤膩粉半斤右茅膽等三味為末先以油蠟漫火熬候蠟消入前藥末并膩粉不住手攪勻磁盒盛之每用少許塗瘡上日四五度清涼散治諸毒攻身體生瘡赤焮腫痛黃連去鬚檳榔枳殼去瓤黃芩貝母赤小豆炒熱各等分右為末先以蔥白煎湯洗瘡拭乾後用生油調塗一日三上之澡浴方治遍身熱毒風瘡及疥癬瘙癢茵芋石楠莽草蛇床子羊躑躅白礬各二兩右細銼分為五帖每度取一帖以水一斗煎至五升去滓乘暖洗浴日再用之破心散出聖惠方治身體風毒生瘡赤腫疼痛豉一合炒煙絶黃連一兩半去鬚赤小豆一合杏仁一兩湯浸去皮尖雙仁細研胡粉一兩右研為末入胡粉杏仁令勻以酥和塗之黃連散出聖惠方治身體生風毒瘡臭穢不可近黃連去鬚胡粉蜜陀僧白芷白斂各半兩右為末先以鹽湯洗瘡後用生油調藥以羽毛敷之甚者日二上治身體生毒風瘡白鴿糞四兩燒為灰天麻一兩麻黃一兩去根節防風一兩去蘆頭右為細散每於食後溫酒調下一錢水銀膏治身體生風毒瘡方見本門濕癬類治身體生風毒瘡赤爛頭出白膿汁方出聖惠方晚蠶砂三兩杏仁一兩湯浸去皮尖雙仁右相和於銚子內炒令杏仁焦黑為末旋取摻瘡上瘑瘡附論夫瘑瘡者初作亦如肥瘡喜著手足常相對生隨月生死痛癢折裂春夏秋冬隨瘥隨劇者是也瘑瘡疥癆之類由風熱濕毒客搏皮膚變化生蟲於皮肉之間手足尤甚赤根白頭相對並生狀如小豆或若茱茰子浸淫癢痛􅎲之汁出折裂成瘡此蓋脾肺壅滯風濕乘之與熱相搏結聚而成治宜疏滌於內敷藥於外淋浴之類次第以治之凡瘑瘡積久不瘥者由膚腠虛則風濕之氣停滯蟲在肌肉之內則生長常癢痛故經久不瘥也方白花蛇散出聖惠方治熱毒風濕皮膚生瘑瘡白花蛇一條去皮骨酒浸炙令微黃蜂房三兩微炙苦參四兩銼防風四兩去蘆頭丹參三兩梔子仁三兩薯蕷三兩秦芁三兩甘菊花二兩元參三兩白蒺藜三兩微炒去刺獨活三兩樗雞膏出聖濟總録治瘑瘡樗雞十二枚蜜蜂十二枚蚖青八枚去翅足炒蜈蚣二條長五寸者無以野葛二兩代之斑貓六十枚去翅足藜蘆去蘆頭䕡茹鉛丹各一兩豬脂二斤附子泡裂去皮臍二兩巴豆六十粒去皮右除鉛丹外銼碎先熬豬脂令沸下諸藥煎至半日濾去滓綿布絞過再煎下鉛丹以栁木箆攪令勻以瓷盒盛取塗摩瘡上日三五上以瘥為度漏蘆散出聖惠方治風瘑熱疥腫漏蘆一兩羌活二兩川升麻一兩木通一兩炒枳殼二兩麩炒微黃去瓤赤芍藥一兩甘草一兩炙微赤銼川朴硝二兩防風二兩去蘆頭右搗篩為散每服三錢以水一中盞煎至六分去滓每於食後以溫服黃連膏出聖濟總録治濕瘑積年不瘥瘡汁浸四畔好肉復變成瘡瘡色赤黑癢不可耐搔之血汁出者黃連去鬚黃蘖去粗皮杏仁去皮尖蔓青子胡粉水銀各一兩豬脂一斤䜴心三合右除胡粉水銀豬脂外銼碎先熬脂令沸下諸藥煎候黃黑色漉出以綿布濾過入粉水銀攪令勻以磁盒盛取塗摩瘡上日三五度即瘥一方水銀納掌中用唾研之然後攪胡粉等以塗瘡上仍取黃連末粉之候汁徹即易之雄黃散出聖濟總録治瘑瘡雄黃研黃連去鬚為末各一兩黃芩去黑心為末松脂各二兩亂髮灰一分為末豬脂六兩右先熬脂令沸下松脂煎令鎔盡即下藥末以栁木箆攪令勻磁盒內盛取塗摩瘡上以瘥為度水銀膏出聖惠方治瘑疥癬瘡水銀一兩白礬一兩蛇床子一兩黃連一兩去鬚䕡茹一兩右搗羅為末以臘月豬膏七合入水銀和研以水銀星盡膏成敷之神效一方無䕡茹練子方出千金方治瘑疥癬瘡百療不瘥楝實一斤桃皮苦參地榆根各五兩右㕮咀以水一斗煎取五升稍溫洗之日一度螺殼散出聖惠方治瘑瘡方見本門濕癬類伏龍肝膏塗摩方出聖濟總録治瘑瘡伏龍肝一兩細研楮木白汁一合豬脂二兩小蒜去皮半兩細研右和調令勻取塗摩瘡上日三五度即瘥治瘑瘡方雄黃一兩黃芩二兩松脂二兩髮灰如彈丸大右以白膏與松脂合搗以敷瘡上汪文仲備急用黃連又方槲木白汁一合苦酒二合小蒜半合釜月下土一合右和如泥以蜜調塗之乾復塗之胡粉膏出聖濟總録治瘑疥癬有蟲胡粉三兩研水銀二兩皂莢十箇梃椎以水浸援濾取濃汁一升右先熬皂莢汁至五合下粉水銀以栁木箆攪令勻瓷盒盛之先以鹽湯洗瘡取塗摩瘡上日三五次即瘥水銀膏出聖濟總録治瘑瘡及惡瘡水銀唾研入藥黃連去鬚為末胡粉研各一兩右和研勻以乳汁調如糊塗敷瘡上日三五度即瘥唾和之亦可又方出聖濟總録治卒得瘑瘡常攻在兩腳亂髮燒灰頭垢各三分蝸牛殼二十七枚燒灰右研為末以豬脂調塗敷瘡上日三五次即瘥又方出聖濟總録吳茱茰洗焙赤小豆屋塵各二兩右搗篩為末用豬脂調如糊先用鹽湯洗取塗瘡上日三五度瘥又方出千金方治瘑瘡搗桃葉和鯉魚鮓糂封之亦可以鮓薄敷上治蠶瘑惡瘡等出本草以蠶蛹子研敷之沉香瀝塗敷方出聖惠方治瘑瘡燥濕沉香半斤劈如指許大松節半斤劈如指許大右以布袋盛於麻油中浸半食久漉出取一口瓷坩穿底作孔大如雞子以松葉一小把鋪安孔上取藥袋入坩中以白鹽覆之泥固封令厚五分藥上以火燒坩下著碗一口盛取瀝流入碗中候火盡即取瀝塗敷瘡上日三五度以瘥為度韭塗敷方出千金方治瘑瘡生韭一把細切醋一升右和煎令韭爛細研更煎如糊取塗敷瘡上日三五度瘥一方用生韭一握切研暖酒五合浸良久布絞取汁塗揩瘡上治卒得惡瘑瘡常攻在兩腳方出聖濟總録人屎燒灰二兩水銀半兩右用生油調塗敷瘡上日三五度即瘥療瘑瘡但是腳腰已下名為瘑此皆有蟲食之蟲死即瘥此方立見效驗出肘後方用醋泔澱一碗大麻子一盞白砂鹽一撮研末和掩瘡上瘡中有孔如針穴皆蟲食之也先溫泔洗淨拭乾敷之一二度即瘥大驗治乾瘑濕瘑疥癬方出聖惠方取練根生蔥白豬脂和搗塗又方出千金方治瘑瘡炒臘月糖敷之良又方出千金方燒故履絲為末敷之又方出千金方燒松根取脂塗之又方出聖濟總録治卒得瘑瘡常攻在兩腳以蜜蜂不拘多少細研入醋調塗敷瘡上日三五度即瘥又方出聖濟總録生刺蛇取血塗敷瘡上日三五度即瘥又方出聖濟總録治瘑瘡及丹毒取苧根刺碎不拘多少爛搗令細入醋調塗敷瘡上日三五度即瘥一方搗根敷之不用醋荆瀝塗洗方出聖惠方治瘑瘡以荆條一把燒瀝汁塗敷瘡上日三五度即瘥躑躅花塗洗方出聖濟總録治瘑瘡用躑躅花三斤以水五升於磁瓶內浸半月濾去滓取洗瘡上日三兩度更炙鮓塗摩瘡上蟲當出即瘥治􅤞目耳瘑瘡及月蝕入繞耳根用烏堆雞膽日三塗之治卒得瘑瘡常對生兩腳及諸惡瘡出肘後方塗白犬血立愈又方以皂莢十枚苦酒四升煮之去滓煎如飴以塗瘡上又方治瘑瘡及丹疹以新瓦一口安雞屎陳酒下著火煎之成膏塗之或水煮雞屎汁拭之佳治瘑瘡疥癬方出聖惠方用苦參末三兩以蜜調塗之野葛膏出聖濟總録治久瘑瘡野葛黃連去鬚細辛去苗葉杏仁去皮尖莽草芍藥藜蘆去苗頭附子去皮臍亂髮灰䕡茹芎藭白芷桂去粗皮藳本去苗土烏頭白术吳茱茰洗焙乾雄黃研礬石研天黃去皮臍當歸各一兩斑貓去翅足巴豆去皮蜀椒去目及合口者黃蘗去粗皮蛇牀子半兩旨三月斤右除雄黃礬石豬脂外銼碎先熬脂令沸下諸藥煎候白芷黃黑色漉出以綿布絞濾過即下雄黃礬石末以栁箆攪令勻磁盒盛每日三五度取摩塗瘡上即瘥五黃膏出聖濟總録治久瘑瘡毒雄黃研黃連去鬚黃蘖去粗皮黃芩雌黃研木香白芷各一兩亂髮如雞子許雞舌香半兩豬脂一斤半狼坺子四十枚右除豬脂外銼碎先熬脂令沸下諸藥亂髮煎盡漉出以綿布濾去滓磁盒盛取塗摩患上日三五次即瘥外臺祕要用苦酒半斤漬諸藥一宿藜蘆膏出聖惠方治瘑瘡經年瘙癢引白膿久則有蟲生藜蘆去苗頭黃連去鬚苦參各一兩半雄黃研礬石洗過細研松脂各二兩研豬脂一斤右除雄黃松脂豬脂外銼搗羅為末先熬豬脂令沸下松脂鎔盡即下諸藥末以栁箆攪令勻瓷盒盛一切風瘡不問深淺經年不瘥成疽瘡肥汁出不生痂百藥療之不瘥悉主之痔疥瘡頭赤熱者起瘡便生白膿是也黃爛瘡者淺但出黃汁名肥瘡也浸淫者淺瘡搔之近年不止是也瘙瘡者初起如疥搔之轉甚瘡汁相連著者是也瘑瘡者初作亦如瘙瘡喜著手足相對痛癢春夏秋冬隨著是也並取塗摩日三五上以瘥為度一方無黃連杏仁膏出聖濟總録杏仁四十粒湯浸去皮尖雙仁黃連去鬚為末藜蘆去苗頭為末各一兩水銀一分豬脂十兩巴豆四十粒去皮心研右先熬豬脂令沸下諸藥以栁箆攪下水銀令勻以磁盒盛先用鹽湯洗瘡去痂取塗摩瘡上日三五上以瘥為度丹砂膏出聖濟總録治三十年瘑瘡及小兒乾瘑濕瘑瘡壞爛丹砂研雄黃研雌黃研各一兩䕡茹三兩為末亂髮灰半兩豬脂十六兩右面向東先熬豬脂令沸下諸藥末以栁箆攪令勻磁盒盛用鹽湯洗瘡取塗摩瘡上日三五上即瘥乳香蠟油膏出直指方治瘑瘡久不瘥杏仁水浸去皮晒乳香各三錢硫黃輕粉各一錢半蠟半兩麻油一合右研極細先熬油沸入蠟鎔盡次入諸藥煎攪成膏放地上冷出火毒磁器收用又方出聖惠方治瘑癬瘡經年久不瘥硇砂一分細研大麻仁三兩搗爛鹽一分細研醋淀一大盞右都以醋淀和攪令勻先以溫漿水淨洗拭乾敷藥日二三上瘥有孔穴多蟲者效亂髮灰膏塗敷方出聖濟總録治濕瘑積年不瘥四邉肉青起亂髮灰蛇蛻灰各一分豬脂一兩右細研二味以脂調如糊先用麴末一升石灰湯二升攪和令勻洗瘡了塗敷瘡上日三五度即瘥羊蹄散出千金方治久瘑疥濕瘡浸淫日廣癢不可堪搔之黃水出瘥後復發用羊蹄根去土細切熬以醋和熟搗淨洗瘡敷之一時間以冷水洗之日一度又隂乾作末癢時搔則汁出以粉之又以生蔥根揩之一方取根勿令婦人小兒雞犬見去土用白蜜相和搗敷瘡上乾蝦蟆塗敷方出千金方治濕瘑用乾蝦蟆一箇燒灰細研為末以豬脂調塗敷瘡上日三五度即瘥胡燕窠塗敷方出聖惠方治濕瘑用燕窠取大者曽抱子窠羅為末先以漿水甘草鹽煎湯洗瘡了塗敷上日三五度即瘥若患惡刺以醋和糊塗裏定三兩日一易刺出即瘥或以白芷大腹皮煎湯先洗之後摻窠末治燥瘑出千金方醋和灰塗之又方出本草熱牛屎塗之治卒得瘑瘡常對生兩腳出葛氏肘後方搗桃葉以苦酒和塗皮亦可用治熱毒風皮膚生瘑瘡出聖惠方螺殼一兩爛者亂髮半兩燒灰龍膽末半兩胡粉半兩右都研細末用油腳調塗之月蝕瘡附論夫月蝕瘡多小兒有之蓋由嗜甘肥榮衛不清風熱毒熱之氣藴蓄臟腑其瘡多生於兩耳及鼻面間并下部諸孔竅側侵蝕之甚則潰爛黃赤汁流達於筋骨月初則瘡盛月晦則瘡衰以其隨月盈虛故名月蝕或謂小兒以手指月而生未必然也方兔頭散出聖濟總録治月蝕下部濕𧈟臘月兔頭一枚燒過代赭一兩地黃葉灰半兩虎頭骨炙令赤黑色二兩椇子燒過七枚小蘇半兩五月五日蝦蟆自死者一枚燒灰右為散以綿裹如棗核大內下部中兼每日空心新汲井花涼水調下半錢以瘥為度胡粉散出直指方治月蝕瘡胡粉微炒黃白礬煆虢丹煆黃連淨輕粉各二錢胭脂一錢麝少許右為末先以漿水入鹽洗拭後摻藥如瘡乾麻油調敷水銀膏出聖濟總録治月蝕瘡多生在兩耳上及竅傍隨月盈虛水銀一分胡粉研黃連去鬚為末松脂各半兩豬脂四兩右先熬脂令沸下松脂諸藥末及水銀攪令勻磁盒盛之先以鹽湯洗瘡塗敷日三五度甘草散出聖惠方治月蝕瘡甘草末青蛙自死者燒作灰母豬蹄甲燒作灰救月杖燒灰各一兩右搗羅研拌以蜜調塗敷瘡上日三五度一方無甘草膩粉散出聖惠方治月蝕瘡膩粉一兩黃連一兩去鬚搗為末胡粉一兩炒令微黃松脂一兩右都細研先以溫鹽漿水洗瘡令淨拭乾以散敷之如瘡乾用生油調塗以瘥為度又方虎頭骨研末豬脂各三兩浮萍屑一兩右和調如糊先用鹽湯洗瘡塗敷瘡上日三五度硫黃塗敷方出聖濟總録治月蝕瘡息肉石硫黃細研䕡茹末各一兩斑貓去足半兩細研右搗研和勻先用鹽湯洗瘡後塗敷瘡上如乾者以豬脂調和塗敷日三五度半夏根散出聖濟總録治月蝕濕蟲瘡𧈟半夏根五月五日取一兩木瓜根烏頭各一兩右隂乾細銼搗羅為末每取棗核許大以綿裹內穀道中日二為度礬石塗敷方出聖惠方治月蝕瘡礬石研石硫黃研各半兩蝦蟆五月五日自死者一枚燒作灰右細研為末先以鹽湯洗瘡塗敷日三五上以瘥為度小兒耳後瘡亦用甚效茱茰湯治月蝕瘡息肉茱茰根地榆根薔薇根各一兩右細銼以水五升煎至二升半去滓溫洗瘡冷即止日三兩度洗之仍敷以他藥一方為末以鹽湯洗瘡敷之日三䜴塗敷方出聖濟總録治蝕瘡入鼻口及九竅孔并諸瘡䜴蝦蟆五月五日取自死者一枚右將鹽䜴不以多少填滿蝦蟆腹挂於屋比令乾燥以紙泥裹之揑釜鍋底下三炊久燒之取去泥搗細研為細末塗敷瘡上乾即以豬脂和七月七日修合亦得日三五上鼓皮醋方出聖惠方治月蝕瘡鼓皮如手掌大醋二升右以醋浸皮經一宿取汁塗敷瘡上日三五度又去醋燒作灰脂和敷之亦用救月杖鼓皮甚佳酥粉塗敷方出聖濟總録治月蝕瘡酥二兩胡粉一兩和研右調和如糊塗敷瘡上日三五度又方出聖濟總録射干三兩甘草一兩炙右粗搗篩每服五錢用鹽水一盞半煎至八分瀘去滓空心溫服午後晚間再煎服塗敷方出肘後方治卒得月蝕瘡蝦蟇一枚自死者兔屎月望夜取右破蝦蟆腹內兔屎滿合定於炭內燒過細研為末塗敷瘡上日三五度又方一名聖灰散出聖惠方治小兒月蝕瘡耳後耳下或鼻內生瘡是也地龍糞燒通赤為末豬脂各三兩右調塗敷瘡上日三五次以瘥為度塗敷方出聖惠方治卒得月蝕瘡取羅摩草研絞取汁塗敷日三五度療大人小兒卒得月蝕瘡方出聖惠方取五月五日蝦蟇燒灰以豬膏和塗之瘥止又方取燭燃照瘡使燭熱氣相及瘡即愈又方出肘後方取虎頭骨二兩搗碎以豬脂一斤煎之以骨焦黃色為度去滓塗之治月蝕瘡隂瘡瘻瘡出本草取鱁鯷魚燒灰敷之一名鰾生南海治月蝕瘡及月割耳出本草以救月杖燒為灰油和敷之治耳後月蝕瘡出本草取桂子研碎敷摩瘡上治月蝕瘡夫月蝕瘡者生於兩耳及鼻面間并下部諸孔竅側及至筋骨月初則瘡盛月末則瘡衰以隨月生因名之為月蝕瘡也又小兒耳下生瘡亦名月蝕世云小兒見月以手指之則病此瘡也其生諸竅中則有蟲矣久不瘥則變成瘻也以地龍糞一合用豬脂和令勻塗之下注瘡附論夫足三隂之脈脾腎肝之三經也並起於足大小指之內循足附內踝前膁膝脛中若風熱毒氣乘之則榮衛凝澀稽留不行氣脈下注於腳膝間故令皮膚腫硬結核成瘡膿水不絶綿歷嵗年愈而復發以毒氣自上而下如水之注故名下注瘡此瘡生於腳脛名不疰瘡俗謂之挎口瘡或因物打撲而成者其瘡口狹皮膚極濶皮薄如竹膜極癢痛終日黃水流出延蔓而生甚者數年不愈又易於傳過他人患此者須忌房室則易愈方治膁瘡方鼠糞杉樹刺雞子殼苦參桃枝栁枝松枝麩漿皂角雀糞松明不拘多少芍藥木綿子芝麻桑枝蛇殼鍋底煤杜當歸鬚右各四錢俱晒乾將松明捶碎掘地一孔內碗一口用破箕片閣上如做松瀝製度候火盡揭起即將汁敷瘡上自然痊疴忌酒麵一應發氣熱毒物隔膁膏出經驗良方治內膁及外膁瘡當歸白芷五倍子黃連雄黃各半兩乳香三錢末沒藥海螵蛸血蝎黃蘖白斂白芨厚朴各半兩黃丹六錢輕粉木合三盠右為細末和乳香輕粉清油調成膏用油單貼藥敷瘡上絹帛縛定了有膿水出解開刮去不潔再貼藥如此數次即愈須先用鹽湯洗淨片帛拭乾待片時水氣乾然後貼藥尉洗蒴􅀢湯出聖惠方治腳瘡久傷風毒攻衝腫焮膿水不止蒴􅀢一兩藜蘆一兩去苗頭鬱金一兩苦參一兩白芷一兩水葒一兩甘草一兩生用桑根白皮一兩栁枝去葉細銼五合苦練子細銼二合藁本半兩枳殼半而鹽末二兩右細銼以水二斗煎取一斗五升濾去滓用軟帛兩事替換承蘸揾尉洗患處水冷為度餘滓煎用如聖丸出聖濟總録治腳膝下注先生瘡熱腫痛草烏頭去皮大銼油煎令焦楓香脂研赤小豆躑躅花地龍去土用火燒地赤色將醋洗過放地龍在上用碗蓋一時許取用威靈仙仙靈脾蒺藜子炒去角乾蝎去土炒白殭蠶瓦上炒天南星泡防風去蘆各半兩右搗研為末醋煮麵糊和丸如菉豆大每服十丸至十五丸空心溫酒送下淋浴海桐皮出聖惠方治風毒流注兩腳生瘡腫爛疼痛行履不得海桐皮地骨皮黃耆甘草生用黃連去鬚枳實木香乳香狼牙白芷牛膝去苗白礬各一兩右銼散令勻分為六貼每取一貼以水四升煎至三升去滓熱薰之通手淋洗瘡上以熱衣拭乾避風淋蝶莽草湯出聖惠方治腳上生瘡莽草榆白皮甘草生用玄參苦參鬱金羌活獨活五加皮防風枳殼細辛各五兩右細銼分為十貼每貼用漿水一斗五升煎取一斗别入白礬末二兩投藥湯內及淋蝶日一用之牛黃金虎丹出危氏方治足面生瘡下連大指上延外踝膁骨每發兼旬昏暮癢甚爬搔血出如泉痛楚不可忍夜分漸已明日復然天雄泡去皮臍一兩白礬煅枯天南星湯洗天竺黃研膩粉研各二兩一錢牛黃研二錢雄黃研飛十二兩半生龍腦四錢金箔六十五片為衣右為末煉蜜和丸每一兩半作十丸金箔為衣每服一丸新汲水下之臟腑有所下即愈黃耆丸出聖濟總録治腎臟風虛下注腰腳生瘡行步艱難筋脈拘攣不得屈伸腰腿冷痛者黃耆銼蘹香炒烏頭泡裂去皮臍楝實去皮防風去蘆蒺藜子炒去角赤小豆地龍去土炒烏藥各等分右為末酒煮麵糊和丸如梧桐子大每服二十丸溫酒下或鹽湯亦得婦人醋湯下空心日午服治膁瘡方出直指方雄黃雌黃硫黃白礬煆各二錢厚黃蘖鷹爪黃連去鬚各二兩輕粉半錢虢丹煆二錢右為細末外先以荆芥蔥頭入鹽少許煎湯洗拭乾又用麻油一酒盞煎巴豆肉二錢濾清筆蘸抹藥末摻上甚妙勝金散出聖濟總録治下注并惡瘡多年不效者黃連一兩半半炒半生用鬱金生用半兩天南星一枚紫鈎藤白斂白芨各一分膩粉少許右搗研為散每用時先濃煎蔥椒湯淋洗去瘡皮拭乾次以津唾調藥散敷或用紙花子蓋之亦得如瘡濕即乾摻治男子婦人膁瘡下藥不效者乳香末黃連末黃皮末薄荷末黃蜀葵花頭四十九箇焙乾為末黃刺魚一箇煆為末連鬚蔥頭七箇焙乾為末右末和勻先取蟬殼蜂窩防風煎湯洗瘡口如瘡濕乾摻若瘡上扎定防備清水出三日內生肉覺癢甚突出內外卒不落須待其乾用酥油塗四下十餘日其痂落下內皆生肉永除其根黃蠟膏出德生堂方治膁瘡槐條椿皮桃條楝條栁條荆芥右熬湯無時湯拭乾用黃蠟於紙上攤膏十箇將十層都拴於瘡上日三次洗瘡除去著瘡蠟紙一箇不候一月即愈無間年深日近纍曽依方醫治得效驗治膁瘡久不愈出經驗良方乾豬糞半兩燒存性乳香一錢檳榔半兩龍骨二錢半輕粉少許沒藥一錢右為細末先以燒鹽湯洗瘡軟熟絹帛拭乾清油調敷濕乾塗枳殼丸出聖濟總録治毒氣下注腳膝腫赤作瘡方見本門惡瘡類蘭香散出聖濟總録治一切風毒惡瘡及下注瘡或痛或癢白蘭花香葉隂乾百合黃蘖蜜炙銼黃蜀葵花焙胡粉研各一兩右搗研為散以醋調塗瘡上如有汁即乾敷黃白散出聖濟總録治下注生瘡黃蘖蜜炙白堊蕪荑並為末各一分膩粉研二錢杏仁去皮尖雙仁研膏七枚右再同研勻先以鹽漿水洗候乾以藥散敷之鯽魚散出聖濟總録治下注瘡鯽魚去肚腸一枚黃連去鬚半兩鉛丹蜜陀僧碎胡粉研各一錢右將前三味入鯽魚肚內却纒合固濟了燒通紅取出候冷同粉研為細末用豬膽汁調敷瘡上治逺年近日膁瘡黃丹飛輕粉蜜陀僧麝香少許龍骨右各等分研為細末用漿水洗淨瘡口乾貼之治膁瘡方明礬白松香四兩百草霜二兩黃丹五錢輕粉半分右為細末於瘡上貼治膁瘡溜氣瘡黃丹火飛過定粉心松香㨂淨白礬火飛過硫黃少許右將香油熬滚下黃丹松香再滚下餘藥又一滚攪勻成膏攤白厚紙上貼瘡以輕絹扎縛一日一換瘡口平不須換只用舊膏藥香油潤之枳殼丸枳殼去穰麩炒三兩生乾地黃焙防風去蘆五加皮銼各二兩黃茋銼三兩羌活去蘆頭一兩右為末煉蜜和丸如梧桐子大每服二十丸加至三十丸早晚食前溫酒下治膁瘡下注五倍子二兩燒存性黃丹三錢飛過白礬一兩燒枯龍骨半兩雄黃少許白石脂半兩右為細末先將蔥鹽湯洗瘡見赤肉然後將前藥敷在瘡上用藥如法厚者却用帛子包縛著不要動直候乾自脫去瘡皮治膁瘡膏羌活二兩獨活二兩當歸二兩黃丹二兩龍骨二兩輕粉三錢右為末和勻用香油調用厚油紙攤藥在內油紙夾著貼瘡上治膁瘡敗船灰輕粉白芨樟腦黃丹各等分右用香油調成膏攤在油紙袋內先煎溫蔥湯洗淨以帛扎住藥在瘡上用了一面翻轉如前用一方無輕粉若得糞船灰妙又方無輕粉白芨桐油調治膁瘡方出直指方木香檳榔五倍子白芷貝母各等分右為細末先以桑葉白芷煎湯洗淨拭乾後以藥末摻上良神效方一名露蜂房散治下注瘡纍年不已去息肉生好肉排膿止痛方見本門惡瘡類治膁瘡方出德生堂方老瀝青淨一兩黃蠟五錢雄黃四錢另研乳香三錢另研輕粉一錢右先將瀝青化開却下黃蠟重煎綿布濾過却下乳香雄黃輕粉三味栁條攪勻得所成膏藥用稀絹一層攤藥在上再以絹帛在膏藥上夾定拴在瘡上三日換一次三換可愈治膁瘡方出百一選方詹武子年三十歲時曾患此用之即安後屢有效黃蘖白芨白斂黃丹另研右等分研為極細末入黃丹拌勻入輕粉多少隨意以蜜和如藥劑勿令稀薄揑成餅貼瘡上深者填滿以帛片包扎一日一易後來瘡乾漸好或有裂處只須乾摻以瘥為度檳榔散出危氏方治膁瘡方全蝎七箇斑貓十四箇檳榔一箇巴豆十四箇右先用清油一兩半漫火煎先入全蝎次斑貓次巴豆隨下檳榔巴豆黑色方入黃蠟一兩候鎔去滓不用只用蠟油入後藥硫黃研生者黃丹火飛海螵蛸各一錢黃柏皮炙蛇床子研各一錢雄黃研白膠香黃連杏仁輕粉清油膠香與油洗鎔右為末同入清油調敷瘡上立效治下注生瘡方出聖濟總録白礬燒枯二分黃連去鬚半兩膩粉一錢烏雞子取白一枝右將前三味搗研為末以雞子白調塗如有膿即用鹽蔥湯洗後用藥驢蹄散出聖濟總録治腎臟風毒下注生瘡驢蹄二十片燒灰蜜陀僧研一分輕粉一錢麝香半錢右再同研勻先拭去膿汁次用藥乾摻日三四次瘥檳榔散一名檳榔膏出危氏方治裏外膁瘡逺年不瘥亦治打撲腳腔上成瘡此最難愈檳榔銼半兩乾豬糞半兩燒存性龍骨一分膩粉二錢右搗羅三味入膩粉研勻先以鹽湯洗瘡熟絹裛乾以生油調藥如膏貼瘡三日一易三五易定瘥忌無鱗魚鮓熱麵几脛內外瘡世謂裏外膁瘡最難得瘥此方神妙一方甘草鹽湯淨洗瘡口治多年不效者乳香灰人骨灰輕粉淡菜等分右為細末先將槐栁條煎湯洗瘡淨用藥搽貼之治膁瘡方苦麻根疥肚蝦蟇江石千轉蜣蜋毬右各等分為末敷之翠玉膏出濟生拔萃方治膁瘡瀝青一兩黃蠟二錢銅緑二錢沒藥一錢右將銅緑為細末入油調勻將瀝蠟於火上鎔開下緑攪勻入沒藥勻傾在河水盆內拌勻油紙裹口嚼之旋捻餅子貼瘡上紙封三日一易治足瘡方出百一選方用牛黃金虎丹半粒服之趙子固母劉氏年幾八十左右足面一瘡下連大指上延外踝以至膁骨每歲必數發發必兼旬纍月昏暮癢甚爬搔移時出血如泉流申吟痛楚殆不可忍夜分即漸已明日復然每一更藥則瘡轉大而劇百試不驗如是二十餘年淳熙甲辰仲冬之末先生為太府丞一夕母病大作相對悲泣無計困極就睡夢見四神明之僧默座一室之內傍有一長几子固母因亦坐而發嘆一僧問其故子固答之以實僧云可服牛黃金虎丹又一僧云硃砂一服好即覺驚異試取藥半粒強服之良久大痛舉家大悔俄而下礧硯物如鐵石者數升是夕瘡但微癢不痛而無血數日成痂自此遂愈朱砂之説竟不復試先生因圖僧像如所夢者而記其事金虎丹出和劑局方治中風痰延壅塞所用牛黃龍腦膩粉金箔之數皆非老人所宜及今取竒效意為熱積臟腑而發於皮膚歲久根深未易洗滌做假涼劑以攻之不以常瘡論也神僧之夢蓋孝感云治膁瘡方松香多沒藥黃丹乳香少右為細末將蔥涎調攤在黑紙油單上用箬扎一孔針線縫之先用蔥椒湯洗用豬肉貼瘡如水并蟲出貼之治膁瘡方川柏一兩赤石脂三錢各研勻末黃丹一錢石頭熱紫色右用真油調裏外以油單紙貼以針刺孔貼瘡口三日換轉貼如孔深者用川黃連三錢龍骨錢半各研為末先用荆芥苦參湯洗將此二味摻入藥面加輕粉七分萬靈膏治膁瘡芝麻油二兩黃蠟二兩乳香龍骨各五錢右將乳香龍骨為末先將油煎過次下二味攪勻冷攤油紙上貼之治膁瘡方樟腦一錢船灰細末黃丹百草霜各二錢右用油紙溫水洗去油乾入藥用香油調包隔紙貼於瘡口上一二日翻換治膁瘡方出德生堂方黃連黃蘖蜜陀僧輕粉各等分研末右用黃蠟化開和藥一處敷貼瘡上紙花蓋伋先洗淨騏驎竭散出聖惠方治腳上生瘡疼痛傷風毒膿水不止生肌騏驎竭一分訶梨勒一錢黃連一分去鬚檳榔一枚右為末看瘡眼大小薄敷瘡上以瘥為度治血注腳桑桂菰牛屎菰又名石灰菰生地上如有石成塊者碎其中有灰起肥株桂菰胎髮男用男女用女用三箇右用三菰焙乾各五錢重胎髮燒灰存性並為末和前藥濕則乾搽乾清麻油塗治膁瘡腳肚上細瘡水流不止延蔓漸大出仁存方豬毛燒灰雄黃奄扇窠右等分為末麻油調敷治膁瘡方出直指方中鯽魚二尾洗淨穿山甲炙黑入皂角末二錢滿尺皂角一條擘開兩片夾鯽魚用麻扎煨乾燒存性右為細末先以井水洗盡膿汁用白竹葉一葉針插多孔縛於瘡上候水出盡然後以麻油輕粉調藥敷瘡上羌活丸出聖濟總録治腳膝生瘡風毒下注羌活去苗頭天麻各二兩白花蛇寸截漿水煮熟去皮骨再用酒浸一宿安栁杖上漫火炙乾用四兩右為末酒煮麵糊和丸如梧桐子大每服二十丸溫酒下空心日午臨卧服蚓泥散出聖濟總録治下注瘡韭菜地蚯蚓燒赤一兩膩粉一分麝香半錢右各研為散再同和勻每用先煎蔥湯洗了將藥乾敷治膁瘡方冬青葉臘豬膽百草霜二味和勻右取冬青葉與本人嚼爛先用蔥椒湯洗淨瘡口以膽霜敷後却敷嚼藥在上三四次可竒妙梔子散治逺年日久內外膁瘡山梔子不拘多少火燒成灰篩羅為細末輕粉少許乳香半錢右再研為細末相和磁器盛貯每用時先將蔥白花椒煎湯洗瘡稍歇再溫漿水又洗一次候惡水去盡再將白水煎百沸候溫再洗但瘡口膿水血絲清水各盡又用粉帛片拭乾然後敷藥如乾者香油調敷濕者乾摻上但惡瘡口滿實軟絹帛護之中硬不作膿者未可用如腫軟有膿者依前法再洗敷貼之三兩次即愈乃一藥二洗之功也地榆散出御藥方治足脛熱毒腫滿按之不起地榆荆芥蘭藋苦參各等分右研末每藥二兩水三大碗煎三五沸去滓避風熱洗患處冷再溫治膁瘡方象骨一兩斑貓五錢砒霜五錢右各火煉砂碾成末用香油調將油單紙縫成袋子裝藥在內封殺袋口用虀水洗淨搒於瘡上兩日翻轉再貼每四日一換治膁瘡方出德生堂龍骨煆輕粉黃丹炒各二錢右為細末先用蔥椒漿水溫熬洗淨後用絹帛揩乾却將藥末填入瘡口令滿以生薑切薄片封貼瘡口次用厚紙隨瘡大小裹之絹帛拴住一服即愈治纍年腳瘡方出聖惠方蔓菁花三分三月三日採晒乾赤小豆三分黃連一兩去鬚右為末敷瘡上日三用之治腳瘡方出聖惠方龍骨二兩枇杷葉五兩蜣蜋五枚燒灰右同麝香少許膩粉一分相和細研勻摻瘡上不過三五上治膁瘡方出百一選方乾胭脂輕粉少許右研極細先以溫水洗瘡片帛裛乾然後用藥深者填滿以瘥為度治膁瘡方出德生堂輕粉一錢黃連末二錢右用豬膽一箇針刺七孔滴膽汁於藥內調成稠糊用竹片攤滿瘡口上用白紙數層蓋藥以無糨青絹繫緊拴住過了十日再換藥如法緊拴及解下時瘡痂隨紙脫矣一方先用蔥白及槐條水洗之後用藥得效膁瘡藥黃連三錢明礬三錢右㕮咀用水一碗煎至一停入冬青葉四十九箇浸於藥水內每用一葉光面著瘡口上貼之外用軟紗帛縛定頻換仍用藥水搭濕甚有效豆連散出聖濟總録治下注瘡赤小豆黃連去鬚等分右為散先用溫漿水洗令淨用藥以豬膽汁調塗之一日三換火府丹出聖濟總録治下注腳瘡甘遂肥實連珠者一兩薄切疏布囊盛之芎藭一分銼如豆右以大紙籠罩香爐令至密不漏煙頂留一竅垂甘遂囊下燒芎藭一塊令煙薰甘遂欲過更燃以芎藭盡為度取甘遂搗末三十歲以上氣盛者每服三錢氣虛者二錢羯羊腎一對批開勻分藥末在內淨麻纒定炭灰炙熟臨卧爛嚼溫酒下隨人酒量能飲一斗者可飲五升以髙物支起雙腳一服即瘥治痛癢方舶上硫黃雄黃各等分右為細末用柏油黃蠟約量化開一處相和作膏子搭之治膁瘡方牽牛芝麻右詩曰牽牛一合三處分一次下鍋逐次增芝麻一合也須炒爛搗成膏始方好箬葉煮熟把來包敷作照依瘡大小不問逺年近日生旦夕之間見分曉先用蔥椒湯洗淨瘡口貼之痊瘥早治膁瘡方輕粉三錢官粉七錢右為細末以溫漿水洗瘡後用敷之以生薑一片蓋合用紙封定逺年不過三敷近年一敷即效治膁瘡方出德生堂五倍子五錢輕粉二錢右為末小油調塗仍先洗淨以五倍子燒灰尤妙治膁瘡方出聖惠方蜣蜋三枚燒灰䜴三兩蜜陀僧一兩右和研如糊貼之治腳瘡方出聖惠方􅌝􅌣一枚䜴三兩右分為兩處一半燒為灰一半為末相和研令勻用臘月豬脂調塗荷葉藁本湯治腳脛生瘡浸淫腿膝膿汁淋漓熱痺痛癢乾荷葉四錢藁本一分右為散以水二斗煎減五升去滓溫暖得所淋泄仍服前大黃左經湯佳治膁瘡久不愈者以川烏頭黃蘖各等分為末用唾津調塗紙上貼之治腳肚上細瘡初則如粟漸大爬搔不已成片包腳相交黃水流出癢不可忍久成痼疾最難愈者出仁存方用百藥煎研極細唾津調敷自外而入先以貫衆煎湯淋洗却用藥治膁瘡方用鱔魚數條黃色者尤好打死先用油塗其腹置瘡上盤屈令遍帛子繫定食頃覺瘡痛不可忍然後取鱔魚看腹下有針眼大竅子皆蟲也如未盡再以數條依上再縛蟲去盡却用死人脛骨燒灰麻油調敷瘡上或以骨灰一兩入好茶末皆用二錢同藥調亦可治膁瘡方用大柏皮黃連蜜炙焦黃等分為末乾敷或蜜調敷治膁瘡方用大柏皮蜜炙霜桑葉等分為末乾油調敷之或用蜜調敷亦可治膁瘡成臼纍月不乾用上等好砂糖先以鹽湯淋洗絹帛拭乾用津唾塗却以此敷上三日即愈神效治外膁腳瘡用屢經燒過窑竈黃土研極爛入黃柏赤石脂黃丹輕粉拌勻以青油調稀用油絹盛藥敷瘡上以布絹縛定縱癢不可以手開動直候十日後瘡愈去之一方無黃丹治膁瘡方用血蝎一味為細末摻在瘡上以乾為度治膁瘡方用地骨皮去粗皮以竹刀刮粉焙乾為細末貼之治膁瘡方用隔年駐車丸碾末敷之極妙如無新者亦可治膁瘡方一名三羊散治內外膁瘡及諸般惡瘡用羊糞不相粘者燒灰存性為末敷之入輕粉尤佳一方用瓶一口入糞在內鹽泥封固燒存性研為末入膩粉先用溫水淨洗去瘡皮揾乾用糞末一匙粉一匙拌勻摻瘡上尤佳治膁瘡方陳仲山寺丞家有一老奶婆九十餘嵗每以此藥治人無不效者用左腳上舊草鞋名千里馬不得犯手以棒挑取於水內鞭洗淨晾乾燒黑灰研為末入輕粉少許先以鹽漿水洗瘡裛乾然後敷之乾者生油調濕者乾撡便成痂甚妙或云端午日以左手提右腳舊草鞋燒用兼治軟癤郭醫名其子親曾得效治膁瘡方出百一選方用冬瓜葉焙乾碾為末摻敷或只用青葉包裹瘡上亦得雖瘡痛不妨甚者亦不過三兩次即效治內外膁瘡方出百一選方用六一泥是薤地中蚯蚓糞新瓦上火煆通赤地上出火毒為細末入輕粉少許先以虀汁溫洗拭乾清油調塗一云用犬血敷亦可危氏方瘡生腳入胻名下注瘡俗謂之袴口瘡或因物打撲而傷損者其口狹皮肉極濶皮薄如竹膜極癢痛終日黃水流延蔓而生甚者數年不愈又易於染過他人患此者忌房室則易愈治貼腿上瘡出百一選方用滑石末塗之治腿膝生瘡有膿者出百一選方用五倍子細碾摻之苦參散出聖濟總録治下注熱毒瘡苦參白花蛇酒浸去皮骨炙蒺藜子炒去角白芷各一兩右為散每服一錢半加至二錢半溫酒調又方出瑞竹堂方亦治膁瘡以好粉用油調在碗裏取艾燒煙薰黃要只敷瘡上效治膁瘡方出百一選方取煮酒瓶頭泥田中黑者為上山上者不可用於火中燒通紅放冷出火毒研令極細麻油調成膏子再用包煮酒瓶頭蒻葉量瘡口大小一樣剪兩片將一片於箬葉背上攤藥子再將一片合之以蒻葉光面安在瘡上用帛子扎定不可令藥著好肉恐反侵損敷藥了痛即止惡水出三兩日一換不過一兩敷即生拓榴肉若能忌口愛護遂絶根本一云不須燒土但研末亦佳馮安時説陳仲山云此法甚妙常以醫數人矣治膁瘡方出經驗良方先用薄鐵器盛鹽一撮火上焙過熱湯浸起澄清溫洗淨拭令乾用藥乾摻瘡上以大螞蟻空窠煆為末清油調塗治膁瘡方出經驗良方用多年水中艌船石灰為末摻之即安治膁瘡方出經驗良方用雞肫黃皮焙乾為末清油調塗治膁瘡方用隂地上青苔草焙乾為末清油調塗狗脊膏出經驗良方治膁瘡用商甲黑狗脊生用各一兩為末口含漿水洗之嚼杏仁調藥攤瘡上紙貼絹帛裹之五七日一換癢痛不可動直至連換三次可效治膁瘡方出經驗良方先用虀汁煎湯淨洗拭乾用蔥涎調真輕粉敷上夏月取荷花片隂乾隨瘡口大小剪蓋之以帛扎定令有些膿水從側畔出以指擦之忌毒食不半月可除根無虀汁用水四碗煎沸入醋半盞竹葉膏出直指方治兩腳骨膁瘡用小網蝦三十枚去頭殼尾以糯米飯一合研細臨卧以帛扎患處上下以青紗罩瘡將蝦飯敷青紗上另用青紗罩蝦飯之上繫定至五更初解紗連蝦飯揭起挂空間處皆是小赤蟲即以漢椒蔥白煎湯候溫淋洗次用舊茶籠內白竹葉隨瘡大小剪貼軟帛繫之一日兩換直待汁水出盡方以好膏藥貼逐日煎苦練根湯淋洗仍換膏藥直待生肉將滿則不用膏藥其瘡口只如筋尾許乃可以血竭或真栙香節夾白斂收平瘡口切忌動風下氣等件治膁瘡方以豬蹄下甲燒灰敷之良治膁瘡方出直指方先用酸漿水溫暖淋浴次用生覆盆子葉瓦上煆乾碾極細乾摻紗扎次日以新水濕去痂又用溫漿水洗拭摻藥上良粉麝散出危氏方治外膁瘡臭爛數十年不愈者用生龜一箇烏者打死去肉取殼酸醋一碗炙酸盡為度仍煆令白煙盡存性用碗蓋地上出火毒為末入輕粉麝香拌勻臨用先以蔥水洗乾方用藥摻上治腳脛骨上作瘡久爛黑或發孔或臭穢不可近出危氏方用蛐蜒十數條小竹篾穿定瓦上焙乾為末真清油調敷劃時取效隔壁膏出危氏方治膁瘡用多年老杉木節燒灰真清油調蒻葉盛隔貼在瘡上以絹帛繫定不數貼而愈洗藥出朱氏集驗方用海桐皮石榴皮等分煎湯淋洗令淨然後用薰藥薰藥出朱氏集驗方用牛蒡子半兩研為末入紙撚子內燒薰之然後塗藥治冷膁瘡方出危氏方用鹿角灰髮灰乳香為末清油調敷有一種膁瘡赤腫而痛用黃連黃蘖之類皆涼藥也久而不愈其瘡冷矣却當用溫藥治之自愈此隂陽寒熱往來之理也治足上生瘡臭穢潰爛出危氏方用漏藍子一枚燒為末入膩粉少許井水調塗效必效散出聖濟總録治下注瘡爛肉陷用鯽魚一尾去腸入頭髮不拘多少燒灰研散先用蔥湯洗瘡口次以藥敷之蒜灰散出聖濟總録治諸惡瘡下注氣血冷新肉不生用蒜一百顆去根苗切以鐵鍋內露地燒令通熱扇去灰入蒜在內用一淨盆蓋之周圍以淨土護不令透風經一宿取出扇去灰土搗研令極細不拘多少乾敷瘡上此治冷惡瘡最妙熱毒惡瘡不可敷令內轉爛故也豆粉散出聖濟總録治下注腳膝生瘡不可垂腳腫用菉豆粉石器內炒黃濕地上出火毒研細先以溫水洗瘡乾敷甚者再敷即愈治膁瘡下注方用橡斗不以多少於橡斗內各滿裝鹽兩碗相合用麻線縛住瓦罐盛貯鹽泥固濟炭火內燒過碾為細末入烏龍尾不以多少合和用淡漿水洗過瘡將好清油調搽忌動風之物仍入麝香少許瘡有膿乾貼然後用江茶清油調成膏子於前藥上面如膏藥相似貼護用新綿包裹敷藥大有神驗膁瘡頭黑四畔紫者有蟲頭白者無蟲有蟲者用覆盆子為末撒在餅上然後撻在瘡上取出蟲為驗治膁瘡方用訶子不以多少燒灰為末香油調搽治膁瘡方用絲瓜子包雞子不以多少燒灰為末貼之治膁瘡方以五月五日收苧葉晒乾貼瘡有效治膁瘡方用隔年蔥白煨熟搗為膏捻成餅子炙熟先用童便洗淨却以蔥餅熱貼之冷再易追惡水後用貼過餅子童便洗淨新瓦焙乾為末摻之妙治膁瘡方以冬青葉用鹽滴水浸留久不妨臨用時取出清水洗淨去醎味貼瘡上一日一易待紅水出不可遽輟治膁瘡方以蔥漿水洗淨帛淹去膿囊厚貼輕粉了用蝸牛不拘多少搗爛作膏藥貼定瘡可自落治內外膁瘡方取瘡內蟲子取杏仁細嚼貼在瘡上後用枯白礬末摻在杏仁上病人便卧少時瘡有蟲子出如頭髮絲取了用藥斂之治毒氣攻注足脛久瘡不瘥用白术為細末鹽漿水洗瘡乾貼一二日一換佳治腳痛成瘡先銼水蓼煮湯令溫熱得所頻頻淋洗候瘡乾自安治腳上生惡瘡調之下注用鹿角燒灰為末輕粉油調塗瘡上治內外膁瘡用北棗核燒灰乾敷之治膁瘡用爐甘石散二分重加煆過枯明礬一分五靈脂半分為末先用溫水於瘡上洗淨後用藥末於四周逺逺摻上用手指輕勻開次日再用手輕輕擦出膿水再用水濕瘡加藥摻自可治膁瘡膏以百草霜不拘多少黃蠟一小塊鎔開勻成餅先以醋水洗淨貼上一片以帛裹之一方蠟燭油治內外膁瘡以牛蹄退下甲燒灰酒調敷上良治膁瘡用白膠香黃蠟香油熬成膏滴水中凝為度作成餅貼患處若多年者以豬脂滴水在瘡上治膁瘡用刺杉柱皮浸在厠中年久撈起曬乾為細末摻上治膁瘡用楮樹葉於未霜時收夾於書內壓乾剪去邉先用蔥湯洗瘡挹乾用葉貼之紗帛扎定遇癢再洗如前貼治膁瘡先用蔥白漿水熬湯洗淨瘡口絹帛拭乾徐以輕粉末摻上瘡口上用五靈脂黃柏各等分研為細末涼水調貼瘡上紙蓋三五十上即平復治膁瘡方先用匾柏枝或墻上舊稻草煎湯溫洗拭乾然後用􅒝麻子去殼研細為膏入好明淨松香一處入些少桐油看稀稠研搗為泥又入好黃丹和勻用油紙扶去些紙上油攤藥於油紙包隔油紙貼在瘡上貼數日再糞藥貼之即愈看瘡大小用藥治腳疼痛不瘥方出聖惠方取多年墻壁上爛乾蜆殼泥裹燒過為末敷之應效三聖散花蘂石散復元通氣散追風獨活散右各一貼合和藥調空心服治下注瘡用皂莢燒灰存性油調搽皇散出衛生家寶治膁瘡腳瘡插芹大蚌蛤殼薄眩者不拘數燒為灰研細末篩過右每看瘡大小施用入輕粉拌和瘡濕乾摻上瘡乾津唾調塗不可近水治膁瘡多年不效出傳信適用方鯽魚一枚用麻油煎魚熟為度去魚只留油調藥穿魚不拘多少鹽泥固濟候乾火煆存性為末輕粉麝香少許研勻先以鹽湯洗瘡却用前件油調藥塗之荆芥湯出楊氏家藏方治膁瘡地骨皮三兩何首烏三兩荆芥穗苦參海桐皮各二兩草烏頭一兩右㕮咀生絹袋盛用水三升煎數沸盛在盆內乘熱薰瘡口通手淋洗挹乾以後四蛻散貼之四蛻散出楊氏家藏方敷膁瘡烏雞子殼已抱出雞兒者蛇蛻各半兩燒灰烏賊魚骨去硬皮一兩龍骨一分右為細末每用入膩粉少許濕即乾摻乾即油調敷之木香散出楊氏家藏方治下臟風毒攻注膁上生瘡浸潰不止瘡口不斂肌肉不生黃連蜜陀僧檳榔木香各等分右為細末每用少許摻瘡口如膿乾以津唾調敷之如膁瘡先以溫藥湯洗後用陳箬葉貼又宜木香貝母五倍子白芷等分為末摻瘡上水流延漫漸大宜雄毛散治膁瘡經年不瘥屢效出永類鈐方大黃黃連黃柏赤芍藥當歸尾蕪荑貫衆白芷等分右為末却研烏賊龍骨輕粉䝞丹四味清油熬加頭髮一握蔥根同熬一半多用上藥調搽紙白封拴之作熱癢不可動數日愈又方出永類鈐方於鹽中揀如黑泥者晒乾為末濕乾摻乾水調塗又先用蘆皮席燒灰濾淋水洗乾却用藥治膁瘡方出淡寮方乾胭脂白蝎地骨皮羊糞不粘者左腳草鞋不得犯手棒挺於水打洗晾乾隔年駐車泥右六味乃百一選方六方或各用併用在人臨時看瘡論藥以裁之也但當先用蔥鹽椒湯洗其瘡却以前藥化灰存性或碾細末入輕粉臘月豬油調敷之乃服他藥治骭瘡內外膁瘡出鮑氏方以川椒煎湯洗淨真茶末蠟燭油調敷有􅀢勿除又方出鮑氏方五倍子醋調敷留瘡勿遮以車前草去筋貼之汗自出又方出鮑氏方以烏雞子二箇黃麻油一兩亂髮一錢輕粉一錢文武火熬成膏煮甘草湯洗淨乃敷貼又方出鮑氏方以乾漆燒存性輕粉麻油調敷四香散出楊氏家藏方治膁瘡地龍糞火煆通紅新瓦盆蓋覆出火氣五兩寒水石火煆通紅依前出火氣三兩龍骨木香檳榔黃蘖去皮降真香槐香研已上六味各一兩牡蠣三兩煆乳香另研雄黃研已上二味各半兩右為細末先用荆芥湯洗吹將帛子挹乾乾摻或麻油調敷不得入膩粉治膁瘡藥如神用刺蝟皮燒灰存性入輕粉生油調塗膁瘡方貓頭一箇栁柴七根枳殼一箇巴豆七箇毛桃七箇右燒灰為末貼瘡上普濟方卷二百七十六
