body:
  text: 普濟方卷二百五十四明周王朱橚撰雜治門中惡附論夫病者卒心腹脹滿吐利不利如乾霍亂状世所謂衝惡是也由人精神不全心志多憂遂為邪鬼所擊或復附着沉沉黙黙寤言譫語誹謗罵詈訐露人事不避譏嫌口中好言未然禍福至及其時毫髮無失人有起心已知其肇登髙渉險如履平地或悲泣呻吟不欲見人其状萬端如醉如狂不可槩舉此皆神鬼及諸精魅附着感人或復觸犯忌諱土地神靈為其所作非有真實但隨方俗放驗治之中惡者是人精神衰弱為鬼邪之氣卒中之也夫人隂陽順理榮衛調平神守則强邪不干若将攝失宜精神衰弱便中鬼毒之氣其状卒然心腹刺痛悶亂欲死又凡卒中惡腹大而滿者診其脉𦂳大而浮者死𦂳細而微者生又中惡吐血數升脉数細者浮焱如疾者生中惡者差後餘勢尚滯發作則變成疰也方備急㪚一名雄黄散出聖惠方治卒中惡客忤五尸入腹鬼刺鬼排及中蠱毒注吐血下血及心腹㽲痛腹滿寒熱毒病雄黄研二兩丹砂研一兩附子炮裂去皮臍一兩一分桂去粗皮藜蘆各一分蜀椒去目并閉口炒出汗半兩野葛三分芫花醋炒四分巴豆仁三十五箇去心熬右将巴豆别治如脂餘細為散以巴豆合搗令勻瓷器貯之宻封勿泄氣遇急病水服一分許加至半錢零老㓜减半病在頭當鼻衂在膈上則吐在膈下則利在四肢則汗出而愈辟穢丹能辟穢氣細辛半兩甘松一兩川芎二兩右為細末水丸如弹子大乆窨妙毎焼一丸加麝香少許如無亦可又方救卒中惡死及卒死右以猪脂如鷄子大苦酒一升煮沸以灌喉中又救治卒死亦可醋灌之桃皮湯出聖惠方治中惡喘急氣心腹痛胸脇脹滿短氣桃皮一握東引者白楊皮一握梔子仁十四枚真珠研當歸切焙桂去粗皮各二兩附子炮裂去皮臍一兩吴茱茰湯洗焙炒半兩右除真珠外剉如麻豆毎服五錢水一盞半入生薑大棗煎至一盞去滓内真珠末半錢攪勻温服一方無白楊皮當歸散出聖惠方治中惡心腹痛胸脇短氣當歸二兩剉碎微炒梔子仁一兩桃白皮二兩附子一兩炮裂去皮臍赤芍藥一兩蓬莪荗一兩桂心一兩吴茱茰一兩湯浸十遍焙乾微炒右為散毎服三錢水一盞入豉五十粒煎至六分去滓不時温服桃皮湯治中惡心痛胸脇㽲刺喘急桃東行白枝皮剉一握丹砂研一兩梔子仁十四枚當歸切焙三兩桂去粗皮三兩附子炮裂去盡皮臍一兩吴茱茰湯浸焙乾炒香䜴炒各五合右除丹砂外剉如麻豆勻毎服五錢水一盞半入生薑半分切碎煎取七分去滓入丹砂末半錢温服雄黄膏一名五毒神膏出肘後方療中惡暴百病雄黄二兩硃砂二兩當歸二兩椒二兩烏頭一升薤白一升右以苦酒漬一宿猪脂五斤東南陳蘆煎五上五下絞去滓内雄黄朱砂末攪令相得畢諸卒百勞温酒服如棗核一枚不差更服得下即除四肢有病可摩癰腫諸病瘡皆摩傅之夜行及病冐霧露皆以塗人身中佳朱砂丸出聖惠方治中惡客忤垂死朱砂一兩細研水飛過雄黄一兩研水飛過麝香一分别研入附子一兩炮裂去皮臍為末巴豆二十枚去皮心研紙裏壓去油右細研令匀煉蜜和搗三五百杵丸如麻子大毎服不計時以粥飲下三丸不利更服三丸漸加至五丸七丸以利為度空青散出聖惠方治中惡客忤垂死空青一兩細研麝香一分細研硃砂一兩細研水飛過雄黄半兩細研右相和研令勻毎服醋一合相合調散半錢不計時候又用湯一合與醋相勻服之須臾即吐為妙朱犀散出經驗良方治中惡中忤鬼氣其證暮夜或登厠或出郊野或遊空屋或人所不至之地忽然眼見鬼物鼻口吸着惡氣驀然倒地四肢厥冷兩手握拳鼻口出清血性命逡廵須臾不救此證與尸厥同但腹不鳴心脇俱煖切勿移動即令人圍繞打鼓焼火或焼麝香安息香蘇木樟木之類醒方可移歸犀角半兩鎊硝研末生麝香一分大硃砂一分右為細末毎服和勻二錢用井花水調嚾服如無前件藥只用單方桃枝湯出危氏方右用雄黄為末毎服一錢桃枝葉煎湯嚾下如或無雄黄只用後方又方出危氏方右用故汗衣或觸衣者着在上身多時乆遭汗者佳用觸衣者乆着上身内衣也男用婦衣婦用男衣焼為灰毎服二錢百沸湯㸃灌服雄黄丸出聖惠方治患鬼氣出鬼毛方獨顆蒜一枚雄黄一錢杏仁一分湯浸去皮尖䨇仁炒右都研為丸如麻子大毎日空心以粥飲下三丸静坐少時鬼毛自爪甲中間出矣當汗出即差備急丸一名追魂丹出聖惠方療心腹卒暴百病中惡客忤心腹脹滿卒痛如錐刀刺氣急口噤風氣忤迷絶不知人巴豆去心出油乾薑炮二兩大黄二兩右為細末以蜜為丸如梧桐子大毎服三丸温水送下不拘候服之一方為散研以水三合嚾之亦可棗瓤為丸及停尸卒死者以煖水服之若不下捧頭起灌令下喉須臾差未知更與三丸腹當鳴轉即吐下便愈若口已須噤亦當拆齒嚾之藥入喉即差此藥無問一切雜病並能治之麝香散出聖惠方治卒中惡心腹刺痛去惡氣麝香研一分犀角屑半兩木香半兩右為散拌勻毎服二錢空心熱水調下日未再止更服亦可漿水調服呉茱茰散出聖惠方治中惡心神煩悶腹脇刺痛宜服金匱方韮根一握切烏梅十四枚碎呉茱茰湯洗焙乾炒二兩半右以潦水五升煑之以病人􅌨内其中三沸􅌨浮者生沉者死煮取三升時飲之備急散治卒中惡心痛脹滿欲吐短氣大黄二兩桂心四兩巴豆一分去心皮熬研右為散取一錢以湯七合和服當吐下即愈雄黄散出聖惠方治卒中惡心腹㽲痛刺急脹滿雄黄半兩赤小豆半兩炒熟𤓰蔕半兩右為散毎服不計時以温漿水調服一錢服至錢半當小吐立不吐加至二錢又方出聖惠方治中惡悶亂腹痛心膈不利宜服吐桂心一兩生薑三兩梔子十四粒䜴五合人参蘆頭一分酒剉右搗碎以酒二升微煑之去滓頓服之取吐為度一方無人參蘆頭三神方能辟死氣蒼术二兩米泔浸兩宿焙乾白术半兩甘草半兩右為末毎服二錢入鹽少許百沸湯㸃服治中惡吐血欲死右用煮水蘇汁一斗服之治中惡出千金方右用葱心黄刺鼻孔中血出愈肘後方云入七寸八寸深若使目中血出佳崔氏云男左女右又方出千金方右用大豆二七粒為末雞子黄并酒相和頓服雞子白亦可又方出千金方右使人尿其面上可愈肘後云此扁鵲法伏龍肝散出千金方治中惡并蠱毒右冷水和伏龍肝如雞子大服之必吐又方出千金方右宜温二斗猪肪頓服之又方出千金方用車􅤧脂如雞子大温酒烊令熱服之又方出聖惠方右用臘月野狐腸焼灰以水服方寸餘又方出本草右用京墨為末水服一錢零犀角散治卒中惡心痛及心胸煩悶熱毒筋骨中風右用犀角研為末和水服之治中惡氣欲絶出聖惠方右取釡底墨半兩鹽一錢和滓研入熟水一盞調服艾葉湯出聖惠方治中惡遁尸心腹及身體痛者甚短氣不語以手按之得其痛處則病人色動恐人近之宜艾葉傅右取生艾小葉挼碎傅痛上厚寸餘以沸湯和灰作泥餅令熱傳艾上冷則易之不過再傅愈又一方以熨斗着火熨艾上治中惡心氣欲絶出聖惠方右取新牛糞絞汁服無新者以乾者浸汁服乾者水煮之若口不開抝口内藥也又方出十便良方右仰卧以物塞兩耳以竹筒内病人鼻中使兩人用力吹之塞口傍無令氣得出半日病人即噫則勿復吹也治卒中惡氣絶出聖惠方右取真硃砂書舌作鬼字額上以書之大良又方出肘後方右先以衣三重籍服上以銅器着衣上稍稍用少許茅於器中焼之茅盡益之勿頓多也取愈乃止救卒中惡死及卒死出肘後方右令二人以衣壅口吹其兩耳極則易又可以筒吹之宜並捧其肩上側身逺之莫臨死人上又方出肘後方右取雄鴨就死人口上㫁其頭以熱血􅅹口中并急以竹筒吹其下部極則易人氣通下即活互吹之治卒暴右用鯉魚齒焼灰酒服方寸餘扁鵲䧟米丸出肘後方療内脹病并蠱疰中惡等及蜂百毒溪毒射工雄黄一兩真丹砂别研一兩礜石熬一兩生礬石一兩半焼之鬼臼一兩半蜈蚣一枚赤足者火炙班猫去翅足龍膽炮七枚附子炮七枚藜蘆七分炙杏仁四十枚去尖皮熬右搗篩蜜和搗干杵腹内脹滿病中惡邪氣飛尸遊走皆服二丸如小豆若積聚堅結服四丸取利洩下䖝蛇五色若蠱疰病中惡邪飛尸遊走皆服二三丸摩痛上若蛇蜂百病若溪毒射工其服者視强弱大小及病脹輕重加减服之中和湯出衛生家寳治忽感惡氣閉昏悶暈倒逆冷氣絶卒中驚氣四肢厥冷右用香附子不拘多少為末毎服二錢白湯調服心中痛醋湯下救卒死或先病痛或常居寝卧奄然而絶皆是中惡救之方出肘後方右破白犬以搨心上無白犬白雞亦佳又方出肘後方右割丹雄雞冠血管吹内鼻中治破腹中惡血殺蟲右用馬鞭草生搗水煎去滓盛煎如飴空心酒服一匙後惡血皆下良治中惡及救死或先病常居寝卧奄然而絶右以韭搗汁灌鼻中一方用薤汁治中惡心痛出孫真人食忌本草右用苦參一兩酒一升半煮取八合乘熱頓服治鬼氣注忤中惡心腹痛背急氣喘惡夢悸常為鬼神所祟焼者右以古櫬板用水酒和東引桃枝同煎服當得吐下取彌古者佳杉材㝡良千嵗通神治心忽中惡口吐清水者出本草右取髙良薑根如骰子塊含之嚥津逡巡即差若臭亦强含嚥更加草豆蔲同為末煎湯常飲之佳辟惡氣出本草右以臘月䑕焼灰為末服一錢水調之佳辟惡氣出本草右取兠納香焼之能辟逺近惡氣治惡氣令人身香羮出本草右用白茅香煮服之亦可以作湯浴之去惡氣出本草右取橙子瓤和鹽蜜細細食之治惡氣温中消食出本草右取椒碾以豆醤汁食之芳香好味治惡氣脹滿出本草右以桃橛煮服之三載者良除身中一切惡氣不潔之疾令人白净肌體滑澤出本草右以天門冬煑食除邪辟惡出本草右以麝香一劑安於枕合中枕之治惡氣心痛出本草右以土苦𤓰酒煑服一合祛鬼氣出本草右用迷迭香焼之去鬼辟惡出本草右以五月五日取楝葉佩之治中惡注忤心腹痛出本草右以腐竹根先入地者煑服之一名鬼齒先入地者亦名為鬼針治鬼氣中惡疰忤心腹痛惡夢鬼神出本草右用糧甖中水進一合多飲令人心悶伏鬼物惡氣出本草右用磨石焼赤熱投酒中飲之治惡氣中惡心腹痛鬼疰出本草右以釣樟材用酒煮服之辟邪惡鬼出本草右以火糟頭帶之辟惡出本草右以酒服之昔三人晨行一人健一人病一人死健者晨飲酒病者食粥死者空腹凡酒勢辟惡勝於作食治惡鬼神注刺痛霍亂出本草右以茄子酒飲磨散服治中惡鬼氣出本草右取厠籌焼取熱氣徹上治中惡與卒死鬼擊亦相類為治皆参取而用之若已死者并用出本草右搗菖蒲生絞汁灌之立差尸厥之病卒死脉猶動又聴其耳中如語聲股間煖是也亦此方治之治中惡客忤垂死出本草右以麝香一錢重研和醋二合服之即差治中惡疰忤出本草右用熱煖薑酒一椀服即止治中惡脫肛出本草右以年乆筆頭焼灰水飲之治中惡心腹刺痛出本草右以羊屎焼薫鼻中治惡病出本草右以松葉隂乾搗為屑丸服無不差辟惡出本草右以琥珀帶之辟邪惡氣出本草右用降真香令小兒帶之辟惡出本草右以丹砂帶之辟惡鬼出本草右以虎爪懸小兒臂上殺鬼去邪氣出本草右以桃木中蠧食之治鬼氣出本草右取樗木根皮一握細切以童兒小便二升䜴一合隔宿浸絞取汁温一沸三五日一度服辟邪惡去鬼氣出本草右以蘇合香俗云獅子屎赤黒色焼之治百病一切惡氣疰病出本草右以麝香研了以水服之療一切鬼氣出本草右取初生艾實作乾菜食之治鬼氣出本草右取青蒿子為末酒服之方寸餘差治鬼氣出本草右取必栗香煑服之并焼為香殺鬼毒出本草右用堇菜生取汁半升服即吐出一名薰葵治鬼氣出本草右以白蒿子末和酒服之良治鬼氣注忤出本草右以枕材煮汁服之治心腹惡氣右取艾葉擣汁飲之治卒惡心腹不安右以茴香莖葉煮食之即差治百惡氣右取艾子和乾薑搗作末蜜丸如梧桐子大空心服三十丸服以飯五三匙壓之再服其鬼神速走出頗能消一切冷血田野之人與此方相冝也療惡疾右以狼毒秦芄分兩等搗末酒服方寸餘日二常服之瘥辟惡右以雄黄服之鬼魅附論夫心者精之合神之舎也心氣不足精神衰弱邪氣乘虗而感則為鬼魅其状令人喜怒不常情思如醉或狂言驚怖向壁悲啼夣寐多魘與鬼交通病乍寒乍熱腹滿短氣不能食診其脉人迎氣口乍大乍小乃鬼魅所持之候也方阿魏散治夣與鬼神交通及狐狸精魅等方野狐鼻焙炙豹鼻焙各七枚狐頭骨一具炙雄黄腽肭臍鬼箭羽露蜂房白术虎頭骨炙各分一兩驢馬駒駝牛等毛各四分焼作灰若骨蒸氣如泥加死人胸骨一兩炙阿魏藥二兩炙右搗篩為散攪使調勻又先以水煑松脂候烊接取以和散和散之時勿以手攪将虎爪攪和為丸如弹子大以薰患者欲薰之時盖覆衣破物令藥煙洩别搗雄黄為末以籍藥焼藥莭度一如薰香法其藥一分於牀下薫彌善忌桃李雀肉等雄黄散治五臓六腑氣少亡魂失魄五臟不安忽喜忽悲恐怖如有鬼物皆發於大驚及當風從髙墜下落水所致悉治之雄黄一兩細研黄芩半兩黄連三分去鬚黄蘖一分剉川大黄半兩剉碎微炒黄耆半兩剉桂心半兩細辛半兩黄環半兩澤瀉半兩山茱茰半兩麻黄半兩去根莭人參半兩去蘆頭蒲黄一分右羅為散毎服不計時以温酒調下一錢日三服不治稍増至二錢服羸劣者更加人參五分十分合一方有生地黄二分一方有蜀椒五分乾薑四分九精丸治感鬼魅邪氣驚怖悲啼休作無時一名九物牛黄丸牛黄研荆實曾青研五屑研雄黄研空青研赤石脂研元參龍骨各二兩右為末蜜丸如小豆大毎服一丸食前温酒下日三以知為度黄環丸治邪氣鬼魅脉見人迎氣口時大時小黄環五兩琥珀研二兩丹砂研生銀水磨細龍膽各二兩白頭蚯蚓微炒元參去心大黄剉炒䕡茹各一兩右為細末酒煮麵糊和丸如菉豆大雞鳴及日中時用温麝香酒下十丸稍加至二十丸以知為度煞鬼五邪丸治邪氣鬼魅所持妄言狂走恍惚不識人丹砂研雄黄研龍骨鬼臼去毛炙赤小豆各一兩半鬼箭羽去莖二兩半桃仁湯浸去皮尖䨇仁炒研五十枚芫青三十枚炒去翅足右除研者外搗羅為細末入雄黄丹砂再研拌勻鎔蠟和丸如弹子大囊盛之男左女右擊於臂上小兒繫於頭合藥時勿令婦人雞犬見亦可用蜜和為丸如梧桐子大毎服一丸米飲下日三方用犀角屑亦可外䑓秘要有馬目毒公大殺鬼丸絶一切鬼魅魍魎虎頭骨三兩雄黄一兩細研鬼臼一兩去鬚天雄一兩去臍皂莢去皮及子一兩蕪荑一兩藜蘆一兩去蘆頭右羅為末煉蜜和丸如杏核大伏屍惡疰為患者焼一丸安室四角熱疾時氣焼一丸安床頭邉牛馬疫疾焼一丸安鼻中虎爪丸治狂邪鬼魅妄語狂走恍惚不識人一名殺鬼丸虎爪焼三兩丹砂研細一作赤朱雄黄研細蟹爪焼各一兩右除研者外為細末再入研者拌勻鎔蠟為丸如梧桐子毎至正旦及有狐魅處焚之甚妙以薫巫人即神去一方無蟹爪用鱉爪消松脂和丸如芡實大堂中焼四物鳶頭散治鬼魅東海鳶頭是由㧞根黄牙石又名金牙防葵各一分莨菪子一分水洵去浮者水煮令芽出曝炒令黄色右藥搗篩以酒服方寸匙欲病見鬼増防葵一分欲令知鬼主者復増一分㸔騐防葵莨菪並令人迷或恍惚如狂不可多服又方治女人與鬼物交通獨言笑或悲思恍惚雄黄一兩人參一兩防風一兩五味子一升右為散早以井花水服方寸匙日三服又方松脂三兩烊雄黄一兩右用虎爪攪令調如弹子丸一夜内籠中焼之令女祼坐籠上被急自䝉唯出頭耳過三薫即斷鹿角散治妖魅病人不言鬼若男女喜夢鬼通致恍惚右用鹿角鎊屑搗羅為細末水服方寸匙自言則差又一方用酒調服三服治精魅感着語言狂亂悲怖不常不飲食右用水銀一兩入漿水一盞炭火上煎取三分方去火取生水銀如豌豆大空服一丸晩再服一丸一日三作神符褁生水銀空腹吞之雄黄散治鬼迷不寤及卒魘右用雄黄研如粉吹入病人兩鼻中差桂亦佳辟諸邪祟附着及小児驚哭恐悸右於安息處取一皂子焚焼令煙起邪自去治百邪鬼魅右服頭垢如小豆大又方治鬼魅右用水服獺肝末日三千金翼用獺肉末療癲狂鬼魅及蠱毒等右用鵲巢多年者焼之亦傳瘘瘡良治鬼魅𫝊尸温疫魍魎神等右取古厠木以太嵗所在日時當户焼薰之辟百邪鬼魅右以雄黄佩之鬼神不能近入山林虎狼伏濟川毒物不敢傷辟邪魅右以白芥子焼及服治鬼魅神邪及狐魅右以豹鼻和狐鼻煮服之治妖魅右以狐心肝生服治人卧忽不寤右勿以火照照之殺人但痛齧其踵及足拇指甲際更多唾其面即活以菖蒲末吹兩鼻中又桂末吹舌下治狐魅右以鷹嘴及爪焼灰為末和飲服之治精魅邪氣右以桃符煑汁飲之亦以桃䨇丸散服之亦以桃仁毎夜中嚼一顆和蜜塗手面良治妖魅瘟瘵硃砂雄黄右為末法醋調入口鼻鬼魘附論夫卒魘者屈也謂夢裏為鬼邪之所屈也凡人其寐也魂交其覺也形開若形數驚恐心氣妄亂精神慴欝志有揺動則有鬼邪之氣乗虚而来入於寝寐使人魂魄飛蕩去離形幹故魘不得寤以致死必須人助喚并以方術治之乃蘇若在燈光前魘者是䰟本由明出喚之無忌若在夜暗䖏魘者忌火照火照則鬼䰟不復入乃至於死又人魘須逺呼不得近而急喚恐神䰟或致飛蕩也方鎮心丸治心氣怯弱常多魘夢恍惚謬忘紫石英研二兩丹砂研一兩雄黄研白茯苓去黒皮茯神去木銀屑菖蒲桔梗去蘆頭炒人參乾羗炮逺志去心甘草炙剉各二兩防風去蘆頭防己當歸切焙桂去粗皮鉄青各一兩細辛去苗葉一兩右為末煉蜜為丸梧桐子大毎服十丸食後以熟水下日三增之大定心湯治心虚悸恍惚多忘或寤驚魘志少不足人參茯苓茯神逺志去心赤石脂龍骨乾薑當歸甘草炙白术芍藥大棗桂心防風紫苑各二兩右切以水一斗二升煮取三升半分為五服日三夜二忌如常法人參散出聖惠方治心氣虗悸恍惚多忘或夢寤驚魘腎氣不足人參去蘆頭茯神逺志去心赤石脂龍骨乾薑炮裂剉當歸剉微炒甘草炙微赤剉白术白芍藥熟地黄桂心防風去蘆頭紫苑去苖土已上各一兩右搗為散毎服四錢水一中盞入棗三枚煎六分去滓不計時温服日三茯神散出聖惠方治虚羸心氣乏弱多魘茯神一兩黄耆一兩剉甘草一兩炙微赤剉白芍藥一兩乾薑一兩炮製剉逺志二兩去心人參一兩去蘆頭桂心一兩右搗為散毎服五錢水一大盞煎至五分去滓不計時温服八毒赤丸出濟生㧞萃治男子婦人染着神鬼謂之鬼疰病服之甚有效驗礬石雄黄朱砂牡丹皮附子炮藜蘆巴豆各一兩蜈蚣一條右為細末煉蜜為丸如小豆大毎服五七丸至十丸冷水送下無時昔入國副使許可道致雄州請醫看脉乍大乍小乍短乍長氣血不勻邪氣傷正本官説去路到邯鄲驛中夜夢一婦人着青衣不見面用手於脇下打了一拳遂一㸃痛徃來不止寒熱不食乃鬼擊也可服八毒赤丸本官言嘗讀明醫録中㸔李子愈八毒赤丸為殺鬼枚子遂與藥三粒卧服旦下清水二斗立效可謂如神合時冝齊戒心志小定心湯治形體虚羸心氣怯弱多魘善忘茯神去木一兩甘草炙剉芍藥乾薑炮逺志去心人參桂去粗皮各二兩右剉如麻豆大毎服五錢水一盞入棗三枚擘煎至七分去滓温服日三外䑓秘要有川芎無甘草伏龍肝散出千金方治鬼魘不寤右用伏龍肝為末吹鼻中或以桂心末以蘆管吹入兩鼻中雄硃散出衛生家寳方或到客舎官驛及乆無人居冷房睡中為鬼物所魘旦聞其人呃呃作聲便令人呌喚如不醒此乃鬼魘也不急救則死牛黄一錢雄黄一錢大硃砂半錢右為末毎挑一錢床下焼一錢用酒調灌之凡人好魘出本草右以桃仁熬去皮尖三七枚以小便下之雄黄散出聖惠方治卒魘右用雄黄為末細篩以管吹入鼻孔中一方加桂心末佳麝香散出十便良方療卒魘右用虎頭為枕一方麝香一分又灌香少許治卒魘出十便良方右令一人坐頭邉守一人於户外呼病人姓名坐人答應曰在便甦治魘死不覺者出千金方右慎燈火勿令人手動牽牛臥其上即覺若卒不能言語取東門上鷄頭為末以酒服之又方出聖惠方治卒魘昏昧不覺魂魄外遊為邪所執縁切忌火照右用皂莢為末如大豆許作丸吹鼻中嚏則氣通能起死逥生集騐方治中惡辟魘出千金方右用雄黄如棗大繫在腋下令人終身不魘張文仲常云男左女右帶之一帶頭上尤妙又方出聖惠方治卧忽不寤勿以火照殺人但痛嚙拇指甲際而唾其面則活如不醒者移動䖏些子徐喚之若有燈即存如無燈切不可用燈照右取搗韭汁吹鼻孔中及灌兩耳如冬月用韭根取其汁灌之口中并兩鼻孔又方出經騐良方右用桃栁枝東邉者各七寸煎湯三盞候温并灌服又方出經騐良方右用竈心圡搥碎為末毎服二錢新汲井花水調灌之更挑半指甲吹入鼻中治卒魘出聖惠方右以菖蒲吹兩鼻中以桂末内於舌上亦得治卒魘出金匱方右法剔取左角髮方寸焼末酒和灌令入喉立起半天河右取竹籬頭水及髙樹穴中盛天南能殺鬼精恍惚憺妄語勿令知之與飲差破棺散一名復生散出經騐良方治魘寐卒死及為墻璧竹木所魘水溺金瘡卒致悶絶産婦惡血衝心諸暴絶證又兼治自縊死一切横死心温并用之右用半夏湯洗七次去滑不拘多少為末毎用一大豆許吹入鼻中即活但心頭温者一日可活又方治心下温一日可活右用生薑汁調蘇香丸灌之效治卒魘不寤出聖惠方右以蘆管吹兩耳并其人頭髮二七莖作䋲内鼻孔中再割雄雞冠取血以管吹喉咽大良治魘及惡夢出聖惠方右用麝香不拘多少安頭邉佳又灌香少許在口中治卒魘不寤右卒魘之人多語聲不出不必髙呌但敲卧床其人當自寤治卒魘死出十便良方右以井底泥埿死人日令垂頭就井呼姓名即活又方右勿以火照但痛齧其足後跟及足大指爪甲即活若齧其踵不覺者宜用􅈨石散方見鬼擊門又方以食鹽湯灌之又方出肘後方右以瓦甑覆病人面上使人疾打破甑則寤又方出肘後方右以牛蹄或馬蹄臨魘人上亦可治卒死青牛尤佳卒魘不覺及凡人喜魘及惡夢者出肘後方右取火焼死者火着枕中履中合枕即止辟魘寤出肘後方右以真赤罽方一尺以枕之治氣死或魘死者出肘後方右搯兩手中指甲内即醒治卒魘昏不覺出肘後方右以茟毛刺兩鼻中男左女右展轉即起也治卒魘夢寐不祥右将霹靂石作枕並無此患導引法出十便良方養生方云拘鬼門制鬼户名曰握固法屈大拇指着四小指内抱之積習不止眠時亦不復開令人不鬼魘魅又云人魘勿燃明喚之魘死宜闇喚之好唯得逺喚不可相近而急喚亦恐失魂魄也又魘不悟候人眠睡則魂魄外遊為鬼邪所魘屈其精神弱者魘則乆不得悟乃至氣暴絶所以須旁人助喚並以方術療之即蘇也鬼擊附論夫精全則神王精耗則神衰精神耗衰血氣虚弱則邪氣易襲故邂逅鬼邪相遇則為鬼擊之病一方鬼排言鬼排獨於人也其得之無漸卒著人如矛㦸所傷令人胷脇腹滿急痛不可按抑或即吐血或衂或下血輕者或獲免重者或至不救治冝符禁之法兼以辟邪安正之劑今巫覡實見忽被神鬼所擊刺擺摷者或犯其形伍或遇相觸突或精神散弱或愆負所招輕者獲免重者多死猶如周宣燕簡軰事不為虚也必應死者亦不可療要自不得救之耳方𤓰蒂散治鬼排鬼刺下血麝香皂莢去皮子雄黄細研藜蘆去蘆頭𤓰蒂已上各一分右為末如大豆大以竹筒吹入鼻中得嚏則氣通便活若未嚏復吹之以嚏為度礜石散治鬼氣排擊心腹刺痛吐下血死不知及卧魘齧踵不覺者諸惡毒病此是漢文帝時太倉令淳于意方一名吹鼻散又名倉公散生礜石一分以水和赤土褁之炭火三斤焼兩炊乆取出去赤土右為散以竹筒吹大豆許入鼻中得嚏則氣通氣通即活未嚏者復吹之又一方加丹砂麝香各半分升麻散治卒得鬼擊如刀刺胷脇腹内急痛不可按抑或即吐血或鼻中出血或下血升麻獨活去蘆頭桂去粗皮各半兩右為散毎服一錢温酒調下一方去桂加犀角屑半兩又方去獨活加大黄半兩治卒鬼擊如中箭忽然一㸃痛如疰不可忍右以桃皮一片将裏面濕䖏貼痛上匙頭安桃枝皮上𦂳搓蘄艾一團似胡桃大安匙頭上炙之須臾痛微徹又方治鬼擊忽然不寤若火照之則殺人但痛嚙其踵後足拇指甲際而多唾其面即活右以犀角枕佳或以青木香内鼻中并帶亦辟魘寐治鬼擊病鬼擊之病得之無漸卒著人如刀刺肚胷脇腹内絞急切痛不可抑按即吐血或鼻中血出或下血名鬼排雞糞白如棗青花麻一把右酒七升煮取三升熱服須臾發汗若不汗熨汗盛火炙兩脇下使熱汗出愈又方治鬼擊之病得之無漸卒着人如刀刺肚胷脇腹滿㽲刺疼痛不可抑按或即吐血鼻中出血一名鬼排右以熟艾與雞子三枚水五升煎取三升頓服之治鬼擊之病及兵刀所傷血滿腹中不出煩懣欲絶卒中右以雄黄粉酒服一中盞日三血化為水治鬼擊之病得之無漸卒着如刀刺状胷脇腹内絞急切痛不可抑按而吐血衂血下血一名鬼排亦治卒中惡右斷白犬頭熱水一升飲之無白犬白雞亦佳治卒中鬼擊及救卒死或先病或常居寝奄忽而絶皆是中惡右以雞冠血瀝口中令人下咽破及此雞以搨心下稍冷即棄於道傍得烏雞佳又方以猪脂取雞子大服未差再服亦可一方以醋一合煮沸灌喉中良又方右以刀鞘三寸焼末水飲之又方治鬼擊右用犢子屎半盞酒三升煮之服治霍亂大牛亦可又方治鬼擊右用焼䑕大如黍米許水和服不能以水飲和少許内於喉中又方右以好醇酒吹兩鼻一方用酢吹鼻中治鬼擊之状卒着如刀刺胷脇腹内絞急切痛不可按摩或吐血及口中衂血右用鹽一盞水二盞和服以冷水噀之吐即差一作鹽一兩又方右以豆粉一撮於水中攪飲之又方右用蓬莪术酒研服一盞治鬼打鬼注邪氣右鍜鍖下鐡屑水漬攪沫出澄清去滓及暖飲三盞治夢中被殺刺或杖打諸般不祥卒然衂血吐血及下血甚者九竅皆有病名鬼擊亦名鬼排升麻獨活地黄續㫁各半兩桂一分右為末熟水日三服卒忤附論夫卒忤者亦名客忤謂邪客之氣卒忤犯人精神也此是鬼厲毒氣中惡之類也人有魂魄衰弱則為鬼氣取犯忤喜於道間門外得之其状心腹㽲痛腹滿氣衝心胷或悶絶不識人内色變異腑臟虚竭者不即治乃至於死然其毒氣有輕重者微治而差重者尅臓腑雖當時救療餘氣停滯乆後猶乃變成疰也方礜石丸出聖惠方治卒中忤礜石半兩黄泥煨焼細研附子半兩炮裂去皮臍雄黄半兩細研真硃半兩細研巴豆半兩去皮心研紙褁壓去油藜蘆半兩去蘆頭蜈蚣一枚微炙去足麝香一分細研犀角屑半兩細辛三分班猫七枚糯米拌炒微黄去翅足右為末入研了藥令勻煉蜜和搗三百杵丸如小豆大毎服不計時以温酒下一丸日二服蛇蜂蝎所中以藥摩之效正氣散療客忤心腹絞痛脹滿氣衝心胷煩躁壮熱或氣悶又刺此鬼魅之氣麝香一錢茯神人參天門冬去心鬼臼菖蒲等分右為末蜜為丸如梧桐子大服十丸日三温酒下太乙神精丹出千金方治客忤霍亂腹脹滿痛尸疰惡風癲狂鬼語蠱毒妖魅温瘧凡一切惡毒並皆治之丹砂曽青雌黄磁石各四兩金牙二兩半右各搗篩惟丹砂雌黄雄黄用釅醋浸之曽青好酒各於鍋器中漬以紙宻封訖日中曝百日經夏急五日亦得無日以火暖之然後各研令如細粉以釅醋同拌使乾濕得所内土釡中以六泥固濟勿令泄氣乾後安鉄環施脚髙一尺五寸置釡上漸放火無軟硬炭等皆得初放火取熟一兩秤炭各長置釡上三分二分盡即溢如此三度盡用熟火然後用益生炭其過三上熟火已外皆須加火漸多乃至一伏時其火已欲近釡即便滿就釡下益炭經兩度即罷火盡極冷然後出之其藥精飛化凝著釡上五色者上三色者次一色者下雖無五色但色光明皎潔如雪取佳若飛上不盡更冷與火如前以雄雞翼掃取或多或少不足研如棗膏丸如黍粒一本云丹砂曽青雄黄雌黄各二斤丹砂以大酢瓷器中漬曽青美酒漬紙宻封閉日曝一百日雄黄雌黄各油煎九日九夜去油膩訖更搗数千杵皆勿研之别以大酢拌令浥浥然内藥土釡中以雄黄在下次下雌黄次曽青次丹砂以甘土泥塗勿令餘毫毛許乾以剛炭火焼之九日九夜去釡五寸九日九夜至釡底九日九夜侵釡腹三寸三九二十七日冷之一日一夜以刀子於釡中際刮著一匝開之取丹丹成訖細研如粉以棗膏和一切丹不得用蜜皆用棗膏學者宜知舊不用磁石金牙今加而用之治偏風大風惡疾癲癎歴癤鬼打等最良服法平旦空服一丸如黍米為度其瘧病黄乆百方不差又加心腹脹滿上氣身面脚等並腫垂死者服一丸吐即差亦有不吐差者若不吐復不差者更服一丸半仍不差者後日増半丸漸服無有不差氣亦定當吐出青黄白物其因瘧兩脇有癖塊者亦當消除若心腹不脹滿者可與一丸日日加之以知為度不必專須吐亦可一丸即差勿併與服亦可三日一服皆須以意斟酌量得其宜或腹内有水便即下者忽恠若患瘧日近精神健亦可斟酌病人藥性併與兩丸作一丸頓服之皆午後食勿使熱䜴漿粥任意食之若病瘧盗汗虚弱者日服一丸至二日吐即止若患瘧不汗氣復不流脚冷者服一丸至三日若不汗氣復脚即暖有閏汗不止三日吐即止若患瘧無顔色者服藥後三日即有顔色亦有須吐差者亦有服少許而差者亦有殺藥强人服三四丸始覺藥行者凡人禀性不同不可一槩與之但作黍米大服之為始漸加以知為度藥力驗壮勿併多服特慎油麫魚肉蒜當清净服之若有患乆不差在床羸痩并腹脹滿及腫或下利垂死者與藥救之亦或差也又一説癥瘕積聚服刀圭以飲漿水送下治諸卒死中惡客忤霍亂腹滿體帶五尸注惡風疰悴大病相易死亡滅門癲狂鬼語已死氣絶心上微暖者扶起頭以物擊口開琢去兩齒以漿飲送藥藥下即活諸乆病者日服一刀圭覆令汗汗出即愈不愈者不過再服亦有不汗而差復有不汗不愈者服如上法加半刀圭以差為度常以絳囊帶九刀圭散男左女右小兒撃頭上辟瘴毒氣惡時氣射工小兒患可以苦酒和之塗方寸紙上著兒心腹上令藥在上治之亦有已死者冬二日夏一日與此藥同服得藥便下活若不得入腹不活若加金牙石者至五服内必令人吐逆下利過此即自定其藥如小豆大為始從此漸小不得更大大風惡亂癩可二十服偏風􅊓癤諸惡風癩病等亦可二十服自餘諸惡病者皆止一二服量人輕重强弱不得多與若欲解殺藥但爛煮肥猪肉食服此藥後小應頭痛身熱一二日来大不能得食味後自漸得氣味五日後更能食若貪食過多者冝莭之若服藥下悶亂可煮木防已湯服之即定凡言刀圭者以六粟為一刀圭一詵云三小豆為一刀圭作土釡法取兩齒瓦盆各受二大斗許以甘土塗其内令極乾又法作一瓦釡作一熟鉄釡各受九升瓦在上鉄在下其状大小隨藥多少不必依此説一本云搗好甘土絹篩水和作泥硬軟如坯瓦泥泥一升内細紙搗可受十斤亦可随藥多少作之隂乾三十日置日中曝亦三十日多飛轉向日乾訖以糖五升内釡糖中四向圡攔擁之令糖徧釡周囬上下各厚七寸以火從下放五日五夜勿令人近之土及待冷一日一夜乃取掃拭令净以黄丹醋和如稀粥掃其中令厚一分乃内藥丸合九丹八石招魂太清神諸大丹皆用作釡作之萬成終不落節其石釡六一泥及鉄釡皆除之勿更用也此釡一具前後数十囬用不動乆乆轉此法師甚秘之余欲令當来天下學士得解之所以委曲具述之也作六一泥法赤石脂牡蠣滑石礜石黄礬蚯蚓屎鹵土已上各二兩右取釅醋以足為度若無鹵以鹽代之先作甘土泥以泥各别褁前黄礬等五種作團褁之勿令泄氣以火焼周三日最好一日亦得出破團取藥各搗碎絹篩然後與蚯蚓屎鹵土等分以酢和之如稠粥既得酢可用二分酢一分水和用取煎瓦盒以此泥塗之曽青如蚯蚓屎如黄連加即佳世少此㸔好崑崙碌亦得差病丹砂亦堪硃砂亦得舊不用磁石金石今加之用治萬病惡風神良丸有患年遲積嵗不可治者宜須合此一篇皆以王相日天氣晴明齋戒沐浴如法合之述曰古之仙者以此救俗特為至秘余以大業年中数以合和而苦雄黄曽青難得後於蜀中却得雄黄大賤又於飛烏𤣥武大獲曽青蜀人不識今須識者随其大小作蚯蚓屎者即是如此千金可求遂於蜀縣魏家合盛一釡以之治病神驗不必論宿癥風氣百日服者皆得痊愈故叙而述焉凡雄黄皆以油煎九日九夜乃可入丹不爾有毒慎勿生用丹必熟毒不堪服冝慎之還魂散一名還魂湯出聖惠方治卒感忤鬼撃飛尸諸奄忽氣絶無復覺知或已死口噤即發口下湯湯入口不下者捉病人髮左右揺動引之藥下復能取盡一升須臾立效麻黄三兩去根莭杏仁三兩浸泡去皮尖䨇仁焙桂心三兩甘草一兩炙微赤剉丹砂半兩右搗為散毎服四錢水一中盞煎至六分去滓分三服一方無丹砂桔梗散出聖惠方治卒客忤不能言桔梗末一兩麝香一分右研勻毎服以温水調下二錢服之細辛散出肘後方治卒忤停尸不能言細辛桂心各等分右為細末内口中桔梗散出肘後方治卒忤停屍不能言右焼桔梗二枚末米飲服之仍吞麝香如大豆許佳附子散出肘後方治卒忤口噤不開者停屍不能言右用生附子置管中吹内舌下一方搗末吹喉中麝香散出肘後方治客忤惡氣垂死右用麝香一錢重研和醋二合服之即差又方治卒忤所謂中惡者與卒死鬼撃亦相類為治皆𠫭通右用鹽八合以水三升煮取一升半分二服吐之即立愈又方如若小便不通筆頭七枚焼作灰末水服之即通治客忤者中惡之類多於道路在外得之令人心腹絞痛脹滿氣衝心胷不急治即殺人出經驗良方右用好京墨為末調二錢服或瓦器盛湯用衣襯貼將熱湯於肚上轉移温之湯冷别換又方右用真丹砂方寸餘蜜三合和服口噤者折齒下之治卒中客忤死出肘後方右用人血和真硃如梧桐子大二丸折齒内喉中令下治卒忤停尸不能言者出肘後方右用真硃末以雞冠血和丸如小豆大内口中三四枚差客忤者中惡之類也多於道間門外得之令人心腹絞痛脹滿氣衝心胷不即治亦殺人此急救之方出肘後方右以銅器若瓦器貯熱湯器着腹上轉冷者撤去衣服器親肉大冷者易以熱湯取愈則止普濟方卷二百五十四
