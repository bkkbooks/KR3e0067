body:
  text: 普濟方卷二百五十四明周王朱橚撰雜治門中惡附論夫病者卒心腹脹滿吐利不利如乾霍亂狀世所謂衝惡是也由人精神不全心志多憂遂為邪鬼所擊或復附著沉沉默默寤言譫語誹謗罵詈訐露人事不避譏嫌口中好言未然禍福至及其時毫髮無失人有起心已知其肇登髙涉險如履平地或悲泣呻吟不欲見人其狀萬端如醉如狂不可槩舉此皆神鬼及諸精魅附著感人或復觸犯忌諱土地神靈為其所作非有真實但隨方俗放驗治之中惡者是人精神衰弱為鬼邪之氣卒中之也夫人隂陽順理榮衛調平神守則強邪不干若將攝失宜精神衰弱便中鬼毒之氣其狀卒然心腹刺痛悶亂欲死又凡卒中惡腹大而滿者診其脈緊大而浮者死緊細而微者生又中惡吐血數升脈數細者浮焱如疾者生中惡者差後餘勢尚滯發作則變成疰也方備急散一名雄黃散出聖惠方治卒中惡客忤五尸入腹鬼刺鬼排及中蠱毒注吐血下血及心腹㽱痛腹滿寒熱毒病雄黃研二兩丹砂研一兩附子炮裂去皮臍一兩一分桂去粗皮藜蘆各一分蜀椒去目并閉口炒出汗半兩野葛三分芫花醋炒四分巴豆仁三十五箇去心熬右將巴豆别治如脂餘細為散以巴豆合搗令勻瓷器貯之密封勿泄氣遇急病水服一分許加至半錢零老幼減半病在頭當鼻衄在膈上則吐在膈下則利在四肢則汗出而愈辟穢丹能辟穢氣細辛半兩甘松一兩川芎二兩右為細末水丸如彈子大久窨妙每燒一丸加麝香少許如無亦可又方救卒中惡死及卒死右以豬脂如雞子大苦酒一升煮沸以灌喉中又救治卒死亦可醋灌之桃皮湯出聖惠方治中惡喘急氣心腹痛胸脅脹滿短氣桃皮一握東引者白楊皮一握梔子仁十四枚真珠研當歸切焙桂去粗皮各二兩附子炮裂去皮臍一兩吳茱茰湯洗焙炒半兩右除真珠外銼如麻豆每服五錢水一盞半入生薑大棗煎至一盞去滓內真珠末半錢攪勻溫服一方無白楊皮當歸散出聖惠方治中惡心腹痛胸脅短氣當歸二兩銼碎微炒梔子仁一兩桃白皮二兩附子一兩炮裂去皮臍赤芍藥一兩蓬莪荗一兩桂心一兩吳茱茰一兩湯浸十遍焙乾微炒右為散每服三錢水一盞入豉五十粒煎至六分去滓不時溫服桃皮湯治中惡心痛胸脅㽱刺喘急桃東行白枝皮銼一握丹砂研一兩梔子仁十四枚當歸切焙三兩桂去粗皮三兩附子炮裂去盡皮臍一兩吳茱茰湯浸焙乾炒香䜴炒各五合右除丹砂外銼如麻豆勻每服五錢水一盞半入生薑半分切碎煎取七分去滓入丹砂末半錢溫服雄黃膏一名五毒神膏出肘後方療中惡暴百病雄黃二兩硃砂二兩當歸二兩椒二兩烏頭一升薤白一升右以苦酒漬一宿豬脂五斤東南陳蘆煎五上五下絞去滓內雄黃朱砂末攪令相得畢諸卒百勞溫酒服如棗核一枚不差更服得下即除四肢有病可摩癰腫諸病瘡皆摩傅之夜行及病冒霧露皆以塗人身中佳朱砂丸出聖惠方治中惡客忤垂死朱砂一兩細研水飛過雄黃一兩研水飛過麝香一分别研入附子一兩炮裂去皮臍為末巴豆二十枚去皮心研紙裏壓去油右細研令勻煉蜜和搗三五百杵丸如麻子大每服不計時以粥飲下三丸不利更服三丸漸加至五丸七丸以利為度空青散出聖惠方治中惡客忤垂死空青一兩細研麝香一分細研硃砂一兩細研水飛過雄黃半兩細研右相和研令勻每服醋一合相合調散半錢不計時候又用湯一合與醋相勻服之須臾即吐為妙朱犀散出經驗良方治中惡中忤鬼氣其證暮夜或登厠或出郊野或遊空屋或人所不至之地忽然眼見鬼物鼻口吸著惡氣驀然倒地四肢厥冷兩手握拳鼻口出清血性命逡巡須臾不救此證與尸厥同但腹不鳴心脅俱暖切勿移動即令人圍繞打鼓燒火或燒麝香安息香蘇木樟木之類醒方可移歸犀角半兩鎊硝研末生麝香一分大硃砂一分右為細末每服和勻二錢用井花水調嚾服如無前件藥只用單方桃枝湯出危氏方右用雄黃為末每服一錢桃枝葉煎湯嚾下如或無雄黃只用後方又方出危氏方右用故汗衣或觸衣者著在上身多時久遭汗者佳用觸衣者久著上身內衣也男用婦衣婦用男衣燒為灰每服二錢百沸湯點灌服雄黃丸出聖惠方治患鬼氣出鬼毛方獨顆蒜一枚雄黃一錢杏仁一分湯浸去皮尖雙仁炒右都研為丸如麻子大每日空心以粥飲下三丸靜坐少時鬼毛自爪甲中間出矣當汗出即差備急丸一名追魂丹出聖惠方療心腹卒暴百病中惡客忤心腹脹滿卒痛如錐刀刺氣急口噤風氣忤迷絶不知人巴豆去心出油乾薑炮二兩大黃二兩右為細末以蜜為丸如梧桐子大每服三丸溫水送下不拘候服之一方為散研以水三合嚾之亦可棗瓤為丸及停尸卒死者以暖水服之若不下捧頭起灌令下喉須臾差未知更與三丸腹當鳴轉即吐下便愈若口已須噤亦當拆齒嚾之藥入喉即差此藥無問一切雜病並能治之麝香散出聖惠方治卒中惡心腹刺痛去惡氣麝香研一分犀角屑半兩木香半兩右為散拌勻每服二錢空心熱水調下日未再止更服亦可漿水調服吳茱茰散出聖惠方治中惡心神煩悶腹脅刺痛宜服金匱方韭根一握切烏梅十四枚碎吳茱茰湯洗焙乾炒二兩半右以潦水五升煮之以病人􅌨內其中三沸􅌨浮者生沉者死煮取三升時飲之備急散治卒中惡心痛脹滿欲吐短氣大黃二兩桂心四兩巴豆一分去心皮熬研右為散取一錢以湯七合和服當吐下即愈雄黃散出聖惠方治卒中惡心腹㽱痛刺急脹滿雄黃半兩赤小豆半兩炒熟瓜蒂半兩右為散每服不計時以溫漿水調服一錢服至錢半當小吐立不吐加至二錢又方出聖惠方治中惡悶亂腹痛心膈不利宜服吐桂心一兩生薑三兩梔子十四粒䜴五合人參蘆頭一分酒銼右搗碎以酒二升微煮之去滓頓服之取吐為度一方無人參蘆頭三神方能辟死氣蒼术二兩米泔浸兩宿焙乾白术半兩甘草半兩右為末每服二錢入鹽少許百沸湯點服治中惡吐血欲死右用煮水蘇汁一斗服之治中惡出千金方右用蔥心黃刺鼻孔中血出愈肘後方云入七寸八寸深若使目中血出佳崔氏云男左女右又方出千金方右用大豆二七粒為末雞子黃并酒相和頓服雞子白亦可又方出千金方右使人尿其面上可愈肘後云此扁鵲法伏龍肝散出千金方治中惡并蠱毒右冷水和伏龍肝如雞子大服之必吐又方出千金方右宜溫二斗豬肪頓服之又方出千金方用車􅤧脂如雞子大溫酒煬令熱服之又方出聖惠方右用臘月野狐腸燒灰以水服方寸餘又方出本草右用京墨為末水服一錢零犀角散治卒中惡心痛及心胸煩悶熱毒筋骨中風右用犀角研為末和水服之治中惡氣欲絶出聖惠方右取釡底墨半兩鹽一錢和滓研入熟水一盞調服艾葉湯出聖惠方治中惡遁尸心腹及身體痛者甚短氣不語以手按之得其痛處則病人色動恐人近之宜艾葉傅右取生艾小葉挼碎傅痛上厚寸餘以沸湯和灰作泥餅令熱傳艾上冷則易之不過再傅愈又一方以尉斗著火尉艾上治中惡心氣欲絶出聖惠方右取新牛糞絞汁服無新者以乾者浸汁服乾者水煮之若口不開拗口內藥也又方出十便良方右仰卧以物塞兩耳以竹筒內病人鼻中使兩人用力吹之塞口傍無令氣得出半日病人即噫則勿復吹也治卒中惡氣絶出聖惠方右取真硃砂書舌作鬼字額上以書之大良又方出肘後方右先以衣三重籍服上以銅器著衣上稍稍用少許茅於器中燒之茅盡益之勿頓多也取愈乃止救卒中惡死及卒死出肘後方右令二人以衣壅口吹其兩耳極則易又可以筒吹之宜並捧其肩上側身逺之莫臨死人上又方出肘後方右取雄鴨就死人口上斷其頭以熱血􅅹口中并急以竹筒吹其下部極則易人氣通下即活互吹之治卒暴右用鯉魚齒燒灰酒服方寸餘扁鵲陷米丸出肘後方療內脹病并蠱疰中惡等及蜂百毒溪毒射工雄黃一兩真丹砂别研一兩礜石熬一兩生礬石一兩半燒之鬼臼一兩半蜈蚣一枚赤足者火炙班貓去翅足龍膽炮七枚附子炮七枚藜蘆七分炙杏仁四十枚去尖皮熬右搗篩蜜和搗干杵腹內脹滿病中惡邪氣飛尸遊走皆服二丸如小豆若積聚堅結服四丸取利泄下蟲蛇五色若蠱疰病中惡邪飛尸遊走皆服二三丸摩痛上若蛇蜂百病若溪毒射工其服者視強弱大小及病脹輕重加減服之中和湯出衛生家寶治忽感惡氣閉昏悶暈倒逆冷氣絶卒中驚氣四肢厥冷右用香附子不拘多少為末每服二錢白湯調服心中痛醋湯下救卒死或先病痛或常居寢卧奄然而絶皆是中惡救之方出肘後方右破白犬以拓心上無白犬白雞亦佳又方出肘後方右割丹雄雞冠血管吹內鼻中治破腹中惡血殺蟲右用馬鞭草生搗水煎去滓盛煎如飴空心酒服一匙後惡血皆下良治中惡及救死或先病常居寢卧奄然而絶右以韭搗汁灌鼻中一方用薤汁治中惡心痛出孫真人食忌本草右用苦參一兩酒一升半煮取八合乘熱頓服治鬼氣注忤中惡心腹痛背急氣喘惡夢悸常為鬼神所祟燒者右以古櫬板用水酒和東引桃枝同煎服當得吐下取彌古者佳杉材最良千嵗通神治心忽中惡口吐清水者出本草右取髙良薑根如骰子塊含之咽津逡巡即差若臭亦強含咽更加草豆蔲同為末煎湯常飲之佳辟惡氣出本草右以臘月鼠燒灰為末服一錢水調之佳辟惡氣出本草右取兜納香燒之能辟逺近惡氣治惡氣令人身香羮出本草右用白茅香煮服之亦可以作湯浴之去惡氣出本草右取橙子瓤和鹽蜜細細食之治惡氣溫中消食出本草右取椒碾以豆醬汁食之芳香好味治惡氣脹滿出本草右以桃橛煮服之三載者良除身中一切惡氣不潔之疾令人白淨肌體滑澤出本草右以天門冬煮食除邪辟惡出本草右以麝香一劑安於枕合中枕之治惡氣心痛出本草右以土苦瓜酒煮服一合祛鬼氣出本草右用迷迭香燒之去鬼辟惡出本草右以五月五日取楝葉佩之治中惡注忤心腹痛出本草右以腐竹根先入地者煮服之一名鬼齒先入地者亦名為鬼針治鬼氣中惡疰忤心腹痛惡夢鬼神出本草右用糧罌中水進一合多飲令人心悶伏鬼物惡氣出本草右用磨石燒赤熱投酒中飲之治惡氣中惡心腹痛鬼疰出本草右以釣樟材用酒煮服之辟邪惡鬼出本草右以火糟頭帶之辟惡出本草右以酒服之昔三人晨行一人健一人病一人死健者晨飲酒病者食粥死者空腹凡酒勢辟惡勝於作食治惡鬼神注刺痛霍亂出本草右以茄子酒飲磨散服治中惡鬼氣出本草右取厠籌燒取熱氣徹上治中惡與卒死鬼擊亦相類為治皆參取而用之若已死者并用出本草右搗菖蒲生絞汁灌之立差尸厥之病卒死脈猶動又聽其耳中如語聲股間暖是也亦此方治之治中惡客忤垂死出本草右以麝香一錢重研和醋二合服之即差治中惡疰忤出本草右用熱暖薑酒一碗服即止治中惡脫肛出本草右以年久筆頭燒灰水飲之治中惡心腹刺痛出本草右以羊屎燒薰鼻中治惡病出本草右以松葉隂乾搗為屑丸服無不差辟惡出本草右以琥珀帶之辟邪惡氣出本草右用降真香令小兒帶之辟惡出本草右以丹砂帶之辟惡鬼出本草右以虎爪懸小兒臂上殺鬼去邪氣出本草右以桃木中蠧食之治鬼氣出本草右取樗木根皮一握細切以童兒小便二升䜴一合隔宿浸絞取汁溫一沸三五日一度服辟邪惡去鬼氣出本草右以蘇合香俗云獅子屎赤黑色燒之治百病一切惡氣疰病出本草右以麝香研了以水服之療一切鬼氣出本草右取初生艾實作乾菜食之治鬼氣出本草右取青蒿子為末酒服之方寸餘差治鬼氣出本草右取必栗香煮服之并燒為香殺鬼毒出本草右用堇菜生取汁半升服即吐出一名薰葵治鬼氣出本草右以白蒿子末和酒服之良治鬼氣注忤出本草右以枕材煮汁服之治心腹惡氣右取艾葉搗汁飲之治卒惡心腹不安右以茴香莖葉煮食之即差治百惡氣右取艾子和乾薑搗作末蜜丸如梧桐子大空心服三十丸服以飯五三匙壓之再服其鬼神速走出頗能消一切冷血田野之人與此方相冝也療惡疾右以狼毒秦芄分兩等搗末酒服方寸餘日二常服之瘥辟惡右以雄黃服之鬼魅附論夫心者精之合神之舍也心氣不足精神衰弱邪氣乘虗而感則為鬼魅其狀令人喜怒不常情思如醉或狂言驚怖向壁悲啼夢寐多魘與鬼交通病乍寒乍熱腹滿短氣不能食診其脈人迎氣口乍大乍小乃鬼魅所持之候也方阿魏散治夢與鬼神交通及狐狸精魅等方野狐鼻焙炙豹鼻焙各七枚狐頭骨一具炙雄黃腽肭臍鬼箭羽露蜂房白术虎頭骨炙各分一兩驢馬駒駝牛等毛各四分燒作灰若骨蒸氣如泥加死人胸骨一兩炙阿魏藥二兩炙右搗篩為散攪使調勻又先以水煮松脂候煬接取以和散和散之時勿以手攪將虎爪攪和為丸如彈子大以薰患者欲薰之時蓋覆衣破物令藥煙泄别搗雄黃為末以籍藥燒藥莭度一如薰香法其藥一分於牀下薰彌善忌桃李雀肉等雄黃散治五臟六腑氣少亡魂失魄五臟不安忽喜忽悲恐怖如有鬼物皆發於大驚及當風從髙墜下落水所致悉治之雄黃一兩細研黃芩半兩黃連三分去鬚黃蘖一分銼川大黃半兩銼碎微炒黃耆半兩銼桂心半兩細辛半兩黃環半兩澤瀉半兩山茱茰半兩麻黃半兩去根莭人參半兩去蘆頭蒲黃一分右羅為散每服不計時以溫酒調下一錢日三服不治稍增至二錢服羸劣者更加人參五分十分合一方有生地黃二分一方有蜀椒五分乾薑四分九精丸治感鬼魅邪氣驚怖悲啼休作無時一名九物牛黃丸牛黃研荆實曾青研五屑研雄黃研空青研赤石脂研元參龍骨各二兩右為末蜜丸如小豆大每服一丸食前溫酒下日三以知為度黃環丸治邪氣鬼魅脈見人迎氣口時大時小黃環五兩琥珀研二兩丹砂研生銀水磨細龍膽各二兩白頭蚯蚓微炒元參去心大黃銼炒䕡茹各一兩右為細末酒煮麵糊和丸如菉豆大雞鳴及日中時用溫麝香酒下十丸稍加至二十丸以知為度煞鬼五邪丸治邪氣鬼魅所持妄言狂走恍惚不識人丹砂研雄黃研龍骨鬼臼去毛炙赤小豆各一兩半鬼箭羽去莖二兩半桃仁湯浸去皮尖雙仁炒研五十枚芫青三十枚炒去翅足右除研者外搗羅為細末入雄黃丹砂再研拌勻鎔蠟和丸如彈子大囊盛之男左女右擊於臂上小兒繫於頭合藥時勿令婦人雞犬見亦可用蜜和為丸如梧桐子大每服一丸米飲下日三方用犀角屑亦可外臺祕要有馬目毒公大殺鬼丸絶一切鬼魅魍魎虎頭骨三兩雄黃一兩細研鬼臼一兩去鬚天雄一兩去臍皂莢去皮及子一兩蕪荑一兩藜蘆一兩去蘆頭右羅為末煉蜜和丸如杏核大伏尸惡疰為患者燒一丸安室四角熱疾時氣燒一丸安床頭邉牛馬疫疾燒一丸安鼻中虎爪丸治狂邪鬼魅妄語狂走恍惚不識人一名殺鬼丸虎爪燒三兩丹砂研細一作赤朱雄黃研細蟹爪燒各一兩右除研者外為細末再入研者拌勻鎔蠟為丸如梧桐子每至正旦及有狐魅處焚之甚妙以薰巫人即神去一方無蟹爪用鱉爪消松脂和丸如芡實大堂中燒四物鳶頭散治鬼魅東海鳶頭是由拔根黃牙石又名金牙防葵各一分莨菪子一分水洵去浮者水煮令芽出曝炒令黃色右藥搗篩以酒服方寸匙欲病見鬼增防葵一分欲令知鬼主者復增一分看驗防葵莨菪並令人迷或恍惚如狂不可多服又方治女人與鬼物交通獨言笑或悲思恍惚雄黃一兩人參一兩防風一兩五味子一升右為散早以井花水服方寸匙日三服又方松脂三兩煬雄黃一兩右用虎爪攪令調如彈子丸一夜內籠中燒之令女祼坐籠上被急自蒙唯出頭耳過三薰即斷鹿角散治妖魅病人不言鬼若男女喜夢鬼通致恍惚右用鹿角鎊屑搗羅為細末水服方寸匙自言則差又一方用酒調服三服治精魅感著語言狂亂悲怖不常不飲食右用水銀一兩入漿水一盞炭火上煎取三分方去火取生水銀如豌豆大空服一丸晚再服一丸一日三作神符褁生水銀空腹吞之雄黃散治鬼迷不寤及卒魘右用雄黃研如粉吹入病人兩鼻中差桂亦佳辟諸邪祟附著及小兒驚哭恐悸右於安息處取一皂子焚燒令煙起邪自去治百邪鬼魅右服頭垢如小豆大又方治鬼魅右用水服獺肝末日三千金翼用獺肉末療癲狂鬼魅及蠱毒等右用鵲巢多年者燒之亦傳瘻瘡良治鬼魅傳尸溫疫魍魎神等右取古厠木以太嵗所在日時當户燒薰之辟百邪鬼魅右以雄黃佩之鬼神不能近入山林虎狼伏濟川毒物不敢傷辟邪魅右以白芥子燒及服治鬼魅神邪及狐魅右以豹鼻和狐鼻煮服之治妖魅右以狐心肝生服治人卧忽不寤右勿以火照照之殺人但痛齧其踵及足拇指甲際更多唾其面即活以菖蒲末吹兩鼻中又桂末吹舌下治狐魅右以鷹嘴及爪燒灰為末和飲服之治精魅邪氣右以桃符煮汁飲之亦以桃雙丸散服之亦以桃仁每夜中嚼一顆和蜜塗手面良治妖魅瘟瘵硃砂雄黃右為末法醋調入口鼻鬼魘附論夫卒魘者屈也謂夢裏為鬼邪之所屈也凡人其寐也魂交其覺也形開若形數驚恐心氣妄亂精神懾鬱志有搖動則有鬼邪之氣乘虛而來入於寢寐使人魂魄飛蕩去離形幹故魘不得寤以致死必須人助喚并以方術治之乃蘇若在燈光前魘者是魂本由明出喚之無忌若在夜暗處魘者忌火照火照則鬼魂不復入乃至於死又人魘須逺呼不得近而急喚恐神魂或致飛蕩也方鎮心丸治心氣怯弱常多魘夢恍惚謬忘紫石英研二兩丹砂研一兩雄黃研白茯苓去黑皮茯神去木銀屑菖蒲桔梗去蘆頭炒人參乾羌炮逺志去心甘草炙銼各二兩防風去蘆頭防己當歸切焙桂去粗皮鐵青各一兩細辛去苗葉一兩右為末煉蜜為丸梧桐子大每服十丸食後以熟水下日三增之大定心湯治心虛悸恍惚多忘或寤驚魘志少不足人參茯苓茯神逺志去心赤石脂龍骨乾薑當歸甘草炙白术芍藥大棗桂心防風紫苑各二兩右切以水一斗二升煮取三升半分為五服日三夜二忌如常法人參散出聖惠方治心氣虗悸恍惚多忘或夢寤驚魘腎氣不足人參去蘆頭茯神逺志去心赤石脂龍骨乾薑炮裂銼當歸銼微炒甘草炙微赤銼白术白芍藥熟地黃桂心防風去蘆頭紫苑去苖土已上各一兩右搗為散每服四錢水一中盞入棗三枚煎六分去滓不計時溫服日三茯神散出聖惠方治虛羸心氣乏弱多魘茯神一兩黃耆一兩銼甘草一兩炙微赤銼白芍藥一兩乾薑一兩炮製銼逺志二兩去心人參一兩去蘆頭桂心一兩右搗為散每服五錢水一大盞煎至五分去滓不計時溫服八毒赤丸出濟生拔萃治男子婦人染著神鬼謂之鬼疰病服之甚有效驗礬石雄黃朱砂牡丹皮附子炮藜蘆巴豆各一兩蜈蚣一條右為細末煉蜜為丸如小豆大每服五七丸至十丸冷水送下無時昔入國副使許可道致雄州請醫看脈乍大乍小乍短乍長氣血不勻邪氣傷正本官説去路到邯鄲驛中夜夢一婦人著青衣不見面用手於脅下打了一拳遂一點痛往來不止寒熱不食乃鬼擊也可服八毒赤丸本官言嘗讀明醫録中看李子愈八毒赤丸為殺鬼枚子遂與藥三粒卧服旦下清水二斗立效可謂如神合時冝齊戒心志小定心湯治形體虛羸心氣怯弱多魘善忘茯神去木一兩甘草炙銼芍藥乾薑炮逺志去心人參桂去粗皮各二兩右銼如麻豆大每服五錢水一盞入棗三枚擘煎至七分去滓溫服日三外臺祕要有川芎無甘草伏龍肝散出千金方治鬼魘不寤右用伏龍肝為末吹鼻中或以桂心末以蘆管吹入兩鼻中雄硃散出衛生家寶方或到客舍官驛及久無人居冷房睡中為鬼物所魘旦聞其人厄厄作聲便令人呌喚如不醒此乃鬼魘也不急救則死牛黃一錢雄黃一錢大硃砂半錢右為末每挑一錢床下燒一錢用酒調灌之凡人好魘出本草右以桃仁熬去皮尖三七枚以小便下之雄黃散出聖惠方治卒魘右用雄黃為末細篩以管吹入鼻孔中一方加桂心末佳麝香散出十便良方療卒魘右用虎頭為枕一方麝香一分又灌香少許治卒魘出十便良方右令一人坐頭邉守一人於户外呼病人姓名坐人答應曰在便蘇治魘死不覺者出千金方右慎燈火勿令人手動牽牛臥其上即覺若卒不能言語取東門上雞頭為末以酒服之又方出聖惠方治卒魘昏昧不覺魂魄外遊為邪所執緣切忌火照右用皂莢為末如大豆許作丸吹鼻中嚏則氣通能起死回生集驗方治中惡辟魘出千金方右用雄黃如棗大繫在腋下令人終身不魘張文仲常云男左女右帶之一帶頭上尤妙又方出聖惠方治卧忽不寤勿以火照殺人但痛嚙拇指甲際而唾其面則活如不醒者移動處些子徐喚之若有燈即存如無燈切不可用燈照右取搗韭汁吹鼻孔中及灌兩耳如冬月用韭根取其汁灌之口中并兩鼻孔又方出經驗良方右用桃栁枝東邉者各七寸煎湯三盞候溫并灌服又方出經驗良方右用竈心圡捶碎為末每服二錢新汲井花水調灌之更挑半指甲吹入鼻中治卒魘出聖惠方右以菖蒲吹兩鼻中以桂末內於舌上亦得治卒魘出金匱方右法剔取左角髮方寸燒末酒和灌令入喉立起半天河右取竹籬頭水及髙樹穴中盛天南能殺鬼精恍惚憺妄語勿令知之與飲差破棺散一名復生散出經驗良方治魘寐卒死及為墻璧竹木所魘水溺金瘡卒致悶絶産婦惡血衝心諸暴絶證又兼治自縊死一切橫死心溫并用之右用半夏湯洗七次去滑不拘多少為末每用一大豆許吹入鼻中即活但心頭溫者一日可活又方治心下溫一日可活右用生薑汁調蘇香丸灌之效治卒魘不寤出聖惠方右以蘆管吹兩耳并其人頭髮二七莖作繩內鼻孔中再割雄雞冠取血以管吹喉咽大良治魘及惡夢出聖惠方右用麝香不拘多少安頭邉佳又灌香少許在口中治卒魘不寤右卒魘之人多語聲不出不必髙呌但敲卧床其人當自寤治卒魘死出十便良方右以井底泥埿死人日令垂頭就井呼姓名即活又方右勿以火照但痛齧其足後跟及足大指爪甲即活若齧其踵不覺者宜用􅈨石散方見鬼擊門又方以食鹽湯灌之又方出肘後方右以瓦甑覆病人面上使人疾打破甑則寤又方出肘後方右以牛蹄或馬蹄臨魘人上亦可治卒死青牛尤佳卒魘不覺及凡人喜魘及惡夢者出肘後方右取火燒死者火著枕中履中合枕即止辟魘寤出肘後方右以真赤罽方一尺以枕之治氣死或魘死者出肘後方右搯兩手中指甲內即醒治卒魘昏不覺出肘後方右以茟毛刺兩鼻中男左女右展轉即起也治卒魘夢寐不祥右將霹靂石作枕並無此患導引法出十便良方養生方云拘鬼門制鬼户名曰握固法屈大拇指著四小指內抱之積習不止眠時亦不復開令人不鬼魘魅又云人魘勿燃明喚之魘死宜暗喚之好唯得逺喚不可相近而急喚亦恐失魂魄也又魘不悟候人眠睡則魂魄外遊為鬼邪所魘屈其精神弱者魘則久不得悟乃至氣暴絶所以須旁人助喚並以方術療之即蘇也鬼擊附論夫精全則神王精耗則神衰精神耗衰血氣虛弱則邪氣易襲故邂逅鬼邪相遇則為鬼擊之病一方鬼排言鬼排獨於人也其得之無漸卒著人如矛戟所傷令人胸脅腹滿急痛不可按抑或即吐血或衄或下血輕者或獲免重者或至不救治冝符禁之法兼以辟邪安正之劑今巫覡實見忽被神鬼所擊刺擺摷者或犯其形伍或遇相觸突或精神散弱或愆負所招輕者獲免重者多死猶如周宣燕簡輩事不為虛也必應死者亦不可療要自不得救之耳方瓜蒂散治鬼排鬼刺下血麝香皂莢去皮子雄黃細研藜蘆去蘆頭瓜蒂已上各一分右為末如大豆大以竹筒吹入鼻中得嚏則氣通便活若未嚏復吹之以嚏為度礜石散治鬼氣排擊心腹刺痛吐下血死不知及卧魘齧踵不覺者諸惡毒病此是漢文帝時太倉令淳于意方一名吹鼻散又名倉公散生礜石一分以水和赤土褁之炭火三斤燒兩炊久取出去赤土右為散以竹筒吹大豆許入鼻中得嚏則氣通氣通即活未嚏者復吹之又一方加丹砂麝香各半分升麻散治卒得鬼擊如刀刺胸脅腹內急痛不可按抑或即吐血或鼻中出血或下血升麻獨活去蘆頭桂去粗皮各半兩右為散每服一錢溫酒調下一方去桂加犀角屑半兩又方去獨活加大黃半兩治卒鬼擊如中箭忽然一點痛如疰不可忍右以桃皮一片將裏面濕處貼痛上匙頭安桃枝皮上緊搓蘄艾一團似胡桃大安匙頭上炙之須臾痛微徹又方治鬼擊忽然不寤若火照之則殺人但痛嚙其踵後足拇指甲際而多唾其面即活右以犀角枕佳或以青木香內鼻中并帶亦辟魘寐治鬼擊病鬼擊之病得之無漸卒著人如刀刺肚胸脅腹內絞急切痛不可抑按即吐血或鼻中血出或下血名鬼排雞糞白如棗青花麻一把右酒七升煮取三升熱服須臾發汗若不汗尉汗盛火炙兩脅下使熱汗出愈又方治鬼擊之病得之無漸卒著人如刀刺肚胸脅腹滿㽱刺疼痛不可抑按或即吐血鼻中出血一名鬼排右以熟艾與雞子三枚水五升煎取三升頓服之治鬼擊之病及兵刀所傷血滿腹中不出煩悶欲絶卒中右以雄黃粉酒服一中盞日三血化為水治鬼擊之病得之無漸卒著如刀刺狀胸脅腹內絞急切痛不可抑按而吐血衄血下血一名鬼排亦治卒中惡右斷白犬頭熱水一升飲之無白犬白雞亦佳治卒中鬼擊及救卒死或先病或常居寢奄忽而絶皆是中惡右以雞冠血瀝口中令人下咽破及此雞以拓心下稍冷即棄於道傍得烏雞佳又方以豬脂取雞子大服未差再服亦可一方以醋一合煮沸灌喉中良又方右以刀鞘三寸燒末水飲之又方治鬼擊右用犢子屎半盞酒三升煮之服治霍亂大牛亦可又方治鬼擊右用燒鼠大如黍米許水和服不能以水飲和少許內於喉中又方右以好醇酒吹兩鼻一方用酢吹鼻中治鬼擊之狀卒著如刀刺胸脅腹內絞急切痛不可按摩或吐血及口中衄血右用鹽一盞水二盞和服以冷水噀之吐即差一作鹽一兩又方右以豆粉一撮於水中攪飲之又方右用蓬莪术酒研服一盞治鬼打鬼注邪氣右煆鍖下鐡屑水漬攪沫出澄清去滓及暖飲三盞治夢中被殺刺或杖打諸般不祥卒然衄血吐血及下血甚者九竅皆有病名鬼擊亦名鬼排升麻獨活地黃續斷各半兩桂一分右為末熟水日三服卒忤附論夫卒忤者亦名客忤謂邪客之氣卒忤犯人精神也此是鬼厲毒氣中惡之類也人有魂魄衰弱則為鬼氣取犯忤喜於道間門外得之其狀心腹㽱痛腹滿氣衝心胸或悶絶不識人內色變異腑臟虛竭者不即治乃至於死然其毒氣有輕重者微治而差重者尅臟腑雖當時救療餘氣停滯久後猶乃變成疰也方礜石丸出聖惠方治卒中忤礜石半兩黃泥煨燒細研附子半兩炮裂去皮臍雄黃半兩細研真硃半兩細研巴豆半兩去皮心研紙褁壓去油藜蘆半兩去蘆頭蜈蚣一枚微炙去足麝香一分細研犀角屑半兩細辛三分班貓七枚糯米拌炒微黃去翅足右為末入研了藥令勻煉蜜和搗三百杵丸如小豆大每服不計時以溫酒下一丸日二服蛇蜂蝎所中以藥摩之效正氣散療客忤心腹絞痛脹滿氣衝心胸煩躁壯熱或氣悶又刺此鬼魅之氣麝香一錢茯神人參天門冬去心鬼臼菖蒲等分右為末蜜為丸如梧桐子大服十丸日三溫酒下太乙神精丹出千金方治客忤霍亂腹脹滿痛尸疰惡風癲狂鬼語蠱毒妖魅溫瘧凡一切惡毒並皆治之丹砂曽青雌黃磁石各四兩金牙二兩半右各搗篩惟丹砂雌黃雄黃用釅醋浸之曽青好酒各於鍋器中漬以紙密封訖日中曝百日經夏急五日亦得無日以火暖之然後各研令如細粉以釅醋同拌使乾濕得所內土釡中以六泥固濟勿令泄氣乾後安鐵環施腳髙一尺五寸置釡上漸放火無軟硬炭等皆得初放火取熟一兩稱炭各長置釡上三分二分盡即溢如此三度盡用熟火然後用益生炭其過三上熟火已外皆須加火漸多乃至一伏時其火已欲近釡即便滿就釡下益炭經兩度即罷火盡極冷然後出之其藥精飛化凝著釡上五色者上三色者次一色者下雖無五色但色光明皎潔如雪取佳若飛上不盡更冷與火如前以雄雞翼掃取或多或少不足研如棗膏丸如黍粒一本云丹砂曽青雄黃雌黃各二斤丹砂以大酢瓷器中漬曽青美酒漬紙密封閉日曝一百日雄黃雌黃各油煎九日九夜去油膩訖更搗數千杵皆勿研之别以大酢拌令浥浥然內藥土釡中以雄黃在下次下雌黃次曽青次丹砂以甘土泥塗勿令餘毫毛許乾以剛炭火燒之九日九夜去釡五寸九日九夜至釡底九日九夜侵釡腹三寸三九二十七日冷之一日一夜以刀子於釡中際刮著一匝開之取丹丹成訖細研如粉以棗膏和一切丹不得用蜜皆用棗膏學者宜知舊不用磁石金牙今加而用之治偏風大風惡疾癲癎歷癤鬼打等最良服法平旦空服一丸如黍米為度其瘧病黃久百方不差又加心腹脹滿上氣身面腳等並腫垂死者服一丸吐即差亦有不吐差者若不吐復不差者更服一丸半仍不差者後日增半丸漸服無有不差氣亦定當吐出青黃白物其因瘧兩脅有癖塊者亦當消除若心腹不脹滿者可與一丸日日加之以知為度不必專須吐亦可一丸即差勿併與服亦可三日一服皆須以意斟酌量得其宜或腹內有水便即下者忽怪若患瘧日近精神健亦可斟酌病人藥性併與兩丸作一丸頓服之皆午後食勿使熱䜴漿粥任意食之若病瘧盜汗虛弱者日服一丸至二日吐即止若患瘧不汗氣復不流腳冷者服一丸至三日若不汗氣復腳即暖有閏汗不止三日吐即止若患瘧無顔色者服藥後三日即有顔色亦有須吐差者亦有服少許而差者亦有殺藥強人服三四丸始覺藥行者凡人稟性不同不可一槩與之但作黍米大服之為始漸加以知為度藥力驗壯勿併多服特慎油麵魚肉蒜當清淨服之若有患久不差在床羸瘦并腹脹滿及腫或下利垂死者與藥救之亦或差也又一説癥瘕積聚服刀圭以飲漿水送下治諸卒死中惡客忤霍亂腹滿體帶五尸注惡風疰悴大病相易死亡滅門癲狂鬼語已死氣絶心上微暖者扶起頭以物擊口開琢去兩齒以漿飲送藥藥下即活諸久病者日服一刀圭覆令汗汗出即愈不愈者不過再服亦有不汗而差復有不汗不愈者服如上法加半刀圭以差為度常以絳囊帶九刀圭散男左女右小兒擊頭上辟瘴毒氣惡時氣射工小兒患可以苦酒和之塗方寸紙上著兒心腹上令藥在上治之亦有已死者冬二日夏一日與此藥同服得藥便下活若不得入腹不活若加金牙石者至五服內必令人吐逆下利過此即自定其藥如小豆大為始從此漸小不得更大大風惡亂癩可二十服偏風􅊓癤諸惡風癩病等亦可二十服自餘諸惡病者皆止一二服量人輕重強弱不得多與若欲解殺藥但爛煮肥豬肉食服此藥後小應頭痛身熱一二日來大不能得食味後自漸得氣味五日後更能食若貪食過多者冝莭之若服藥下悶亂可煮木防已湯服之即定凡言刀圭者以六粟為一刀圭一詵云三小豆為一刀圭作土釡法取兩齒瓦盆各受二大斗許以甘土塗其內令極乾又法作一瓦釡作一熟鐵釡各受九升瓦在上鐵在下其狀大小隨藥多少不必依此説一本云搗好甘土絹篩水和作泥硬軟如坯瓦泥泥一升內細紙搗可受十斤亦可隨藥多少作之隂乾三十日置日中曝亦三十日多飛轉向日乾訖以糖五升內釡糖中四向圡攔擁之令糖遍釡周回上下各厚七寸以火從下放五日五夜勿令人近之土及待冷一日一夜乃取掃拭令淨以黃丹醋和如稀粥掃其中令厚一分乃內藥丸合九丹八石招魂太清神諸大丹皆用作釡作之萬成終不落節其石釡六一泥及鐵釡皆除之勿更用也此釡一具前後數十回用不動久久轉此法師甚祕之余欲令當來天下學士得解之所以委曲具述之也作六一泥法赤石脂牡蠣滑石礜石黃礬蚯蚓屎鹵土已上各二兩右取釅醋以足為度若無鹵以鹽代之先作甘土泥以泥各别褁前黃礬等五種作團褁之勿令泄氣以火燒周三日最好一日亦得出破團取藥各搗碎絹篩然後與蚯蚓屎鹵土等分以酢和之如稠粥既得酢可用二分酢一分水和用取煎瓦盒以此泥塗之曽青如蚯蚓屎如黃連加即佳世少此看好崑崙碌亦得差病丹砂亦堪硃砂亦得舊不用磁石金石今加之用治萬病惡風神良丸有患年遲積嵗不可治者宜須合此一篇皆以王相日天氣晴明齋戒沐浴如法合之述曰古之仙者以此救俗特為至祕余以大業年中數以合和而苦雄黃曽青難得後於蜀中却得雄黃大賤又於飛烏玄武大獲曽青蜀人不識今須識者隨其大小作蚯蚓屎者即是如此千金可求遂於蜀縣魏家合盛一釡以之治病神驗不必論宿癥風氣百日服者皆得痊愈故敘而述焉凡雄黃皆以油煎九日九夜乃可入丹不爾有毒慎勿生用丹必熟毒不堪服冝慎之還魂散一名還魂湯出聖惠方治卒感忤鬼擊飛尸諸奄忽氣絶無復覺知或已死口噤即發口下湯湯入口不下者捉病人髮左右搖動引之藥下復能取盡一升須臾立效麻黃三兩去根莭杏仁三兩浸泡去皮尖雙仁焙桂心三兩甘草一兩炙微赤銼丹砂半兩右搗為散每服四錢水一中盞煎至六分去滓分三服一方無丹砂桔梗散出聖惠方治卒客忤不能言桔梗末一兩麝香一分右研勻每服以溫水調下二錢服之細辛散出肘後方治卒忤停尸不能言細辛桂心各等分右為細末內口中桔梗散出肘後方治卒忤停尸不能言右燒桔梗二枚末米飲服之仍吞麝香如大豆許佳附子散出肘後方治卒忤口噤不開者停尸不能言右用生附子置管中吹內舌下一方搗末吹喉中麝香散出肘後方治客忤惡氣垂死右用麝香一錢重研和醋二合服之即差又方治卒忤所謂中惡者與卒死鬼擊亦相類為治皆𠫭通右用鹽八合以水三升煮取一升半分二服吐之即立愈又方如若小便不通筆頭七枚燒作灰末水服之即通治客忤者中惡之類多於道路在外得之令人心腹絞痛脹滿氣衝心胸不急治即殺人出經驗良方右用好京墨為末調二錢服或瓦器盛湯用衣襯貼將熱湯於肚上轉移溫之湯冷别換又方右用真丹砂方寸餘蜜三合和服口噤者折齒下之治卒中客忤死出肘後方右用人血和真硃如梧桐子大二丸折齒內喉中令下治卒忤停尸不能言者出肘後方右用真硃末以雞冠血和丸如小豆大內口中三四枚差客忤者中惡之類也多於道間門外得之令人心腹絞痛脹滿氣衝心胸不即治亦殺人此急救之方出肘後方右以銅器若瓦器貯熱湯器著腹上轉冷者撤去衣服器親肉大冷者易以熱湯取愈則止普濟方卷二百五十四
