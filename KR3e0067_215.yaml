服方寸稍加至上上日二三服歸血散治男子婦人老幼小便溺血荆芥銼一合大麥一合黑豆一合甘草二錢右件和水一盞半煎一盞去滓作二次食前服或食後卧溫服木通飲一名通草飲方見本門小便赤澀類治小便出血木通湯治小便出血面色萎黃飲食不進木通銼冬葵子各半兩燈心切一握右搗篩每服五錢水二盞煎一盞去滓溫服不拘時木通散治小便出血木通一方銼作通草白茯苓各一兩葶藶隔紙炒一分右為散每服二錢煎粟米飲調下不拘時服一方治熱淋小便不利莖中疼痛小腹急痛用酒服蔥白湯亦可調服雞蘇湯治小便出血不絶雞蘇去土石膏各二兩竹葉銼一兩右搗篩每服四錢水二盞煎一盞去滓溫服不拘時鹿角膠丸治房勞損傷中小便尿血鹿角膠半兩油頭髮灰沒藥别研各三分右搗篩為末用茆根汁打糊丸如梧桐子大每服五十丸空心鹽湯送下薑蜜湯治小便出血不止薑七片蜜半盞白茅根一握右用水調同煎服神效棕櫚湯治下血小便用棕櫚灰米飲下一法棕櫚同葵子等分米飲下二錢又治轉胞妙血以灰吹入鼻中治因勞損尿血不止生乾地黃汁車前子汁各五合鹿角膠三兩右藥將二味汁相和每服食前暖一大盞調下膠末二錢治虛損膀胱有熱尿血不止生地黃汁生藕汁各五合蜜一合右為末細和暖令溫食前分為三服槐金散治小便出血槐花炒鬱金銼各一兩右為散每服二錢煎木通湯調下不拘時蒲黃散出聖惠方治膀胱熱小便下血不止亦治血淋蒲黃微炒二兩鬱金銼三兩右為散每服一錢粟米飲調下空心晚食前服地黃飲出危氏方治小便出血地黃汁生薑一合右並取自然汁相和分作三服每服煎一沸溫服自早至日中服治小腸尿血方指甲半分頭髮一分右燒灰研勻空心酒調一錢頓服玉屑膏出三因方治尿血并淋沙石疼痛不可忍受者黃茋人參各等分右為末用蘿蔔大者切一指厚三指大四五片蜜淹少時蘸蜜煮乾復蘸盡蜜二兩為度勿令焦炙熟點黃茋人參末喫不以時仍鹽湯送下一方無蘿蔔蜜治小便出血出危氏方當歸川白芷各等分右為末每服二錢溫米飲調下治卒傷熱行來尿方出聖惠方大黃末芒硝末各半兩右以水冷和頓服之立止服後三日禁如藥方二聖散治男女人小兒小便出血芍藥黃柏各等分右為末每服三錢溫漿水調下食前服治虛損膀胱有熱尿血不止出聖惠方大麻子根三兩銼亂髮灰研合細右以水二大盞煎麻根取一盞三分去滓每於食前暖一小盞調下髮灰一錢治尿血不出止出時后方用鬱金一兩為末蔥白調和水煎溫服又方用黃麻根煎服一服即止神驗亦作麻布麻子更治莖中痛治小便出血方用胡麻三升搗細末以東流水二升漬一宿平旦絞去滓煮兩沸頻服又方出時后方用龍骨為末溫水服方寸日五六服一方酒調服又方用搗荆葉取汁酒服二合又方出聖惠方用車前根葉子煮汁多飲佳一方取車前葉搗絞取汁每服三合每於食前服之又方用酒服葵莖灰方寸日二又方出時后方以刮滑石末水和敷繞小便及陰際佳一方治小便不通髮灰散出十便良方治小便尿血或先尿而後血或先血而後尿亦逺近之謂也用髮灰每服二錢以酸醋二合湯少許服之井花水溫水調亦得兼治肺疸血衄內崩吐血一兩口或舌上血水如針孔若鼻衄吹內立止一法棕櫚燒灰米飲調下又治大小便出血又一方同葵子等分為末米飲服二錢又治轉胞及小便不通一方再用亂髮灰溫湯調服一方恐難喫用蜜丸此方通瘀利水道一方用自己髮灰酒調下治血出不止出百一選方以熱艾裹之燃再以絹裹立定昔紹興王小八者賣饌為業不知何處得此方治人甚驗遂棄業行醫琥珀散出直指方治尿血用琥珀為細末每服二錢燈心一握龍腦薄荷少許煎湯調下一方治諸般沙石淋用蔥白濃煎湯下治大人小兒尿血出經驗良方以升麻一兩半銼用水一升煎五合接續服治小便出血出經驗良方用燕窩草抖撇去泥燒草存性為細末白湯調下又方出經驗良方治血淋小便祕昔有婦人患此十年服之神效用牡牛膝淨洗一握水五盞煎一盞入乳香麝香少許研細服又方出經驗良方用牽牛子二兩半為末每服二服一錢一服薑湯調下良久熱茶服之又一方大檳榔一枚麥門冬熱酒研磨一盞熱湯下又方出經驗良方用烏豆白柿鹽煎湯調京墨末服治溺血如注水小腹氣痛出經驗良方用茶籠內葉燒灰入麝香少許米飲調下治小便出血出聖惠方用當歸四兩細銼酒三升煮取二升頻服亦治遺尿小便澀又方出聖惠方用荆棘刺三升水五升煮取三升分三服棘刺乃棗針也白膠方出時后方治尿血用白膠三兩炙水二升煮取一升四合分再服一名黃明膠治小便出血療五淋方出聖惠方用茅根一把切以水一碗煮半碗服二次愈治無故遺血溺出本草用船中故竹茹乾末酒服三錢日三服治小便出血出危氏方用竹茹一大塊水煎服妙療小遺出血條出危氏方用淡豆䜴一撮煎湯服效酒煮頻服亦可治小便出血出危氏方則小便腹氣祕氣祕則小便難其痛者謂之淋不痛者謂之尿血此方治之此藥能利水道而不動氣水水道利則清濁分榖藏自止矣用車前子但曬乾為末每服二錢車前子葉煎湯調下一方米飲下二錢又方用海金沙為末以新水汲調下一方用沙糖水調下治尿血方出聖惠方服益母草汁一升瘥立止一云葎章又方出聖惠方用酒服蒲黃二方寸以日二服水服粥飲亦可調下又方搗水芹汁服六七合日一服治小便出血用五蘇散夾五苓散加竹葉薑麥門冬燈心蔥頭煎湯調下治小便後出鮮血數點又不疼出仁存方用鏡面草一名螺靨草搗細用蜜水調服經驗方陳氏云余在章貢時年二十六忽小便後出鮮血數點不勝驚駭却全不疼如是一月若不飲酒則血少終不能止有鄉兵告以市醫張康者嘗療此疾遂呼之來以一器清汁云是草藥添少蜜解以水兩服而愈既厚酬之遂詢其藥名乃鏡面草一名螺靨草藥其色青翠所在石階縫中多有之徐克安云亦治蟲牙治少便頻數卒然下血不止並不疼痛此緣心中積惡機謀艱險長懷嫉妬多積忿怒傷損肝心正氣又因氣傷小腸氣虛血承虛妄虛行故有此疾宜服此方出護命方桑寄生一兩乾地黃茯苓各半兩人參羌獨活蒲黃各一分甘松沉香各二銖右細研羅為末每服三錢以水一盞煎一二沸便㵼出去滓不拘時服服此藥後其血以安校覺丹田元氣之虛腰膝沉重多困少力者宜喫後方藥以補之桑寄草生一味為末每服一錢非時煎點喫當歸散出於居土選竒方治小便下血不止當歸白芷川芎蒲黃各等分右為末每服二錢溫米飲調下柏葉湯出十便良方治小便下血生地黃三兩白葉小半握黃芩一兩阿膠三升右四味切以水三升煮取七合去滓入膠分作五六服蓯蓉丸出十便良方若小便純血血下則凝亦無痛處惙惙短氣日就嬴瘦不食此由陽氣不固陰無所守五液淋下欲絶而身冷者死治虛損宜服􅊵絲子肉蓯蓉乾地黃鹿茸各一兩右為末酒糊丸如梧桐子大飲下三十丸玄胡索散出活人書治尿血玄胡索一兩朴硝三分右為末每服四錢水二盞煎至八分溫服犀角地黃湯治小腸淋瀝出血痛難忍及治心血妄行衄血等疾犀角半兩芍藥二錢牡丹皮半兩右三味為粗末入生地黃二寸打碎水一盞同煎至八分空心服之心血妄行衄血等疾食後臨卧服之用絲茅根煎湯服余癸丑夏嘗若淋滴之疾出血已得黃應明授此方數服而愈香附地榆湯出指南方治尿血香附子切新地榆切各不拘多少右各濃煎湯一盞先呷附子三口呷地榆湯以盡為度未效再進蓯蓉丸出指南方治虛損溺血肉蓯蓉􅊵絲子桑螵蛸半兩乾地黃鹿茸各一兩右為細末酒糊為丸如梧桐子大每服三十丸鹽湯下普濟方卷二百十五
