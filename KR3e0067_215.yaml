服方寸稍加至上上日二三服歸血散治男子婦人老㓜小便溺血荆芥剉一合大麥一合黑豆一合甘草二錢右件和水一盞半煎一盞去滓作二次食前服或食後卧温服木通飲一名通草飲方見本門小便赤澁類治小便出血木通湯治小便出血面色萎黄飲食不進木通剉冬葵子各半両燈心切一握右搗篩每服五錢水二盞煎一盞去滓温服不拘時木通散治小便出血木通一方剉作通草白茯苓各一両葶藶隔紙炒一分右為散每服二錢煎粟米飲調下不拘時服一方治熱淋小便不利莖中疼痛小腹急痛用酒服葱白湯亦可調服鷄蘇湯治小便出血不絶鷄蘇去土石膏各二両竹葉剉一両右搗篩每服四錢水二盞煎一盞去滓温服不拘時鹿角膠丸治房勞損傷中小便尿血鹿角膠半両油頭髪灰没藥别研各三分右搗篩為末用茆根汁打糊丸如梧桐子大每服五十丸空心鹽湯送下薑蜜湯治小便出血不止薑七片蜜半盞白茅根一握右用水調同煎服神効㯶櫚湯治下血小便用㯶櫚灰米飲下一法㯶櫚同葵子等分米飲下二錢又治轉胞妙血以灰吹入鼻中治因勞損尿血不止生亁地黄汁車前子汁各五合鹿角膠三両右藥將二味汁相和每服食前煖一大盞調下膠末二錢治虛損膀胱有熱尿血不止生地黄汁生藕汁各五合蜜一合右為末細和煖令温食前分為三服槐金散治小便出血槐花炒鬰金剉各一両右為散每服二錢煎木通湯調下不拘時蒲黄散出聖惠方治膀胱熱小便下血不止亦治血淋蒲黄微炒二両鬰金剉三両右為散每服一錢粟米飲調下空心晩食前服地黄飲出危氏方治小便出血地黄汁生薑一合右並取自然汁相和分作三服每服煎一沸温服自早至日中服治小腸尿血方指甲半分頭髪一分右燒灰研匀空心酒調一錢頓服玉屑膏出三因方治尿血并淋沙石疼痛不可忍受者黄茋人参各等分右為末用蘿蔔大者切一指厚三指大四五片蜜淹少時蘸蜜煮亁復蘸盡蜜二両為度勿令焦炙熟㸃黄茋人参末喫不以時仍鹽湯送下一方無蘿蔔蜜治小便出血出危氏方當歸川白芷各等分右為末每服二錢温米飲調下治卒傷熱行來尿方出聖惠方大黄末芒硝末各半両右以水冷和頓服之立止服後三日禁如藥方二聖散治男女人小兒小便出血芍藥黄栢各等分右為末每服三錢温漿水調下食前服治虛損膀胱有熱尿血不止出聖惠方大麻子根三両剉亂髪灰研合細右以水二大盞煎麻根取一盞三分去滓每於食前煖一小盞調下髪灰一錢治尿血不出止出時后方用鬰金一両為末葱白調和水煎温服又方用黄麻根煎服一服即止神驗亦作麻布麻子更治莖中痛治小便出血方用胡麻三升搗細末以東流水二升漬一宿平旦絞去滓煮両沸頻服又方出時后方用龍骨為末温水服方寸日五六服一方酒調服又方用搗荆葉取汁酒服二合又方出聖惠方用車前根葉子煮汁多飲佳一方取車前葉搗絞取汁每服三合每於食前服之又方用酒服葵莖灰方寸日二又方出時后方以刮滑石末水和敷繞小便及陰際佳一方治小便不通髪灰散出十便良方治小便尿血或先尿而後血或先血而後尿亦逺近之謂也用髪灰每服二錢以酸醋二合湯少許服之井花水温水調亦得兼治肺疸血衂内崩吐血一両口或舌上血水如針孔若鼻衂吹内立止一法㯶櫚燒灰米飲調下又治大小便出血又一方同葵子等分為末米飲服二錢又治轉胞及小便不通一方再用亂髪灰温湯調服一方恐難喫用蜜丸此方通瘀利水道一方用自己髪灰酒調下治血出不止出百一選方以熱艾裹之燃再以絹裹立定昔紹興王小八者賣饌為業不知何處得此方治人甚驗遂棄業行醫琥珀散出直指方治尿血用琥珀為細末每服二錢燈心一握龍腦薄荷少許煎湯調下一方治諸般沙石淋用葱白濃煎湯下治大人小兒尿血出經驗良方以升麻一両半剉用水一升煎五合接續服治小便出血出經驗良方用鷰窩草抖撇去泥燒草存性為細末白湯調下又方出經驗良方治血淋小便秘昔有婦人患此十年服之神効用牡牛膝净洗一握水五盞煎一盞入乳香麝香少許研細服又方出經驗良方用牽牛子二両半為末每服二服一錢一服薑湯調下良乆熱茶服之又一方大檳榔一枚麥門冬熱酒研磨一盞熱湯下又方出經驗良方用烏豆白柿鹽煎湯調京墨末服治溺血如注水小腹氣痛出經驗良方用茶籠内葉燒灰入麝香少許米飲調下治小便出血出聖惠方用當歸四両細剉酒三升煮取二升頻服亦治遺尿小便澁又方出聖惠方用荆棘刺三升水五升煮取三升分三服棘刺乃棗針也白膠方出時后方治尿血用白膠三両炙水二升煮取一升四合分再服一名黄明膠治小便出血療五淋方出聖惠方用茅根一把切以水一碗煮半碗服二次愈治無故遺血溺出本草用船中故竹茹亁末酒服三錢日三服治小便出血出危氏方用竹茹一大塊水煎服妙療小遺出血條出危氏方用淡豆䜴一撮煎湯服効酒煮頻服亦可治小便出血出危氏方則小便腹氣秘氣秘則小便難其痛者謂之淋不痛者謂之尿血此方治之此藥能利水道而不動氣水水道利則清濁分榖藏自止矣用車前子但曬亁為末每服二錢車前子葉煎湯調下一方米飲下二錢又方用海金沙為末以新水汲調下一方用沙糖水調下治尿血方出聖惠方服益母草汁一升瘥立止一云葎章又方出聖惠方用酒服蒲黄二方寸以日二服水服粥飲亦可調下又方搗水芹汁服六七合日一服治小便出血用五蘇散夾五苓散加竹葉薑麥門冬燈心葱頭煎湯調下治小便後出鮮血數㸃又不疼出仁存方用鏡面草一名螺靨草搗細用蜜水調服經驗方陳氏云余在章貢時年二十六忽小便後出鮮血數㸃不勝驚駭却全不疼如是一月若不飲酒則血少終不能止有鄉兵告以市醫張康者嘗療此疾遂呼之來以一器清汁云是草藥添少蜜解以水両服而愈既厚酧之遂詢其藥名乃鏡面草一名螺靨草藥其色青翠所在石階縫中多有之徐克安云亦治蟲牙治少便頻數卒然下血不止並不疼痛此縁心中積惡機謀艱險長懷嫉妬多積忿怒傷損肝心正氣又因氣傷小腸氣虛血承虛妄虛行故有此疾宜服此方出䕶命方桑寄生一両亁地黄茯苓各半両人参羌獨活蒲黄各一分甘松沉香各二銖右細研羅為末每服三錢以水一盞煎一二沸便㵼出去滓不拘時服服此藥後其血以安校覺丹田元氣之虛腰膝沉重多困少力者宜喫後方藥以補之桑寄草生一味為末每服一錢非時煎㸃喫當歸散出於居土選竒方治小便下血不止當歸白芷川芎蒲黄各等分右為末每服二錢温米飲調下栢葉湯出十便良方治小便下血生地黄三両白葉小半握黄芩一両阿膠三升右四味切以水三升煮取七合去滓入膠分作五六服蓯蓉丸出十便良方若小便純血血下則凝亦無痛處惙惙短氣日就嬴瘦不食此由陽氣不固陰無所守五液淋下欲絶而身冷者死治虛損宜服􅊵絲子肉蓯蓉亁地黄鹿茸各一両右為末酒糊丸如梧桐子大飲下三十丸𤣥胡索散出活人書治尿血𤣥胡索一両朴硝三分右為末每服四錢水二盞煎至八分温服犀角地黄湯治小腸淋瀝出血痛難忍及治心血妄行衂血等疾犀角半両芍藥二錢牡丹皮半両右三味為粗末入生地黄二寸打碎水一盞同煎至八分空心服之心血妄行衂血等疾食後臨卧服之用絲茅根煎湯服余癸丑夏嘗若淋滴之疾出血已得黄應明授此方數服而愈香附地榆湯出指南方治尿血香附子切新地榆切各不拘多少右各濃煎湯一盞先呷附子三口呷地榆湯以盡為度未効再進蓯蓉丸出指南方治虛損溺血肉蓯蓉􅊵絲子桑螵蛸半両亁地黄鹿茸各一両右為細末酒糊為丸如梧桐子大每服三十丸鹽湯下普濟方卷二百十五
