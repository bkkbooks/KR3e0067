body:
  text: 普濟方卷二百十五明周王朱橚撰小便淋祕門血淋附論夫心主氣通小腹與膀胱行於水道下焦受熱則氣不宣通故溲便癃閉而成淋也熱則摶於血摶則流行入於胞中與溲便俱下故為血淋也血淋者是熱淋之甚也然尿血謂之血淋心主血之行身通遍經絡循環腑臟勞熱甚者則散失則其常經溢滲入胞而成血淋也方乾地黃丸補神益脾氣散客熱則自然調和小便色即變白如常切不得憂愁在心并勿食熱食及冷水等物乾地黃黃耆各六分防風逺志皮茯神括􅌣子芩鹿茸龍骨人參滑石石韋當歸芍藥蒲黃甘草戎鹽車前子右為末以蜜及棗膏各半相和煎令消散和藥為丸如梧桐子大食後少時以粥湯下十丸日二三稍加至二十丸以知為度禁熱食及冷水海藻菘菜蕪荑酢等物瞿麥湯治血淋尿血通用爛滑石赤芍藥瞿麥穗車前子赤茯苓石韋桑白皮阿膠黃芩生地黃甘草白茅根右為末每服二錢入生髮燒灰一錢沸湯調下如無茅根用茅花石韋湯治血淋小腹內結痛石韋大黃滑石甘遂木通冬葵子赤芍藥當歸車前子蒲黃右搗篩每服三錢水一盞煎七分不拘時去滓溫服小蘇飲子出危氏方治下焦結熱血淋生地黃洗四兩小蘇根滑石通草蒲黃炒淡竹葉藕節當歸去蘆酒浸山梔子仁甘草炙各半兩右㕮咀每服四錢水一盞半煎七分去滓溫服空心食前服王不留行散出聖惠方治血淋疼痛不止王不留行一兩甘遂煨微黃赤芍藥桂心蒲黃當歸銼微炒各半兩葵子滑石各一兩半車前子木通銼各一兩右為細散每服一錢食前粥飲調下當歸湯出百一選方治血淋及五淋等疾當歸去蘆淡竹葉燈心紅棗竹葳蕤麥門冬并根苖用烏梅甘草木龍又名野葡萄藤右等分或多少不妨煎湯作熱水患此疾者多渴隨意飲之石韋湯治血淋小腸澀痛煩悶石韋去毛滑石碎各三分葛根桑根白皮甘草獨活去蘆頭防風去皮各半兩木通銼各半兩右搗篩每服三錢水一盞煎七分去滓溫服不拘時龍腦散出聖惠方治血淋心神煩躁水道澀痛不得眠卧龍腦細研膩粉各一錢寒水石白茅根銼黃連去鬚馬牙硝滑石木通銼伏龍肝細研各半兩右為細散每服煎竹葉湯調下一錢如人行十里再服增味導赤散出直指方治血淋尿血通用生地黃乾洗木通黃芩生甘草車前子山梔子仁川芎赤芍藥以上等分右為末每服三錢入竹葉十片薑三片煎服白茅根湯出聖惠方治血淋小便出血疼痛不可忍白茅根芍藥木通車前子各二兩亂髮燒灰半兩冬葵子微炒半兩滑石碎黃芩去黑心各一兩右搗篩每服三錢水一盞煎七分去滓溫服日三雞蘇湯治血淋雞蘇一兩半滑石膏碎淡竹葉木通甘草滑石小蘇根生地黃半斤銼焙右搗篩每服六錢水二盞煎一盞去滓空心溫服羚羊角飲治血淋小便出血熱結澀痛羚羊角屑山梔子仁冬葵子炒各一兩青箱子紅藍花麥門冬大青大黃荆芥穗雞蘇甘草芍藥右為末水煮麵糊丸梧桐子大每服二十丸溫水下不拘時候服瞿麥散治血淋及尿血尿水道中澀痛遍絡腑臟熱甚則血散失其常經而成血淋瞿麥滑石生乾地黃鬱金右搗篩每服三錢水一盞煎七分去滓溫服不拘時服鎮心丸鎮保心氣寧養神志宣暢氣血解諸邪壅黃疸鼻衄小尿淋痛目赤暴腫或作飛血證川大黃車前子亂髮灰右為細末每服二錢食前蔥湯調下淡竹葉湯治沙血淋淡竹葉甘草燈心棗子烏豆車前子右不拘多少以水濃煎湯代熱水服甚妙一方無車前子榆皮湯治血淋熱痛榆白皮滑石石韋瞿麥穗筆頭灰右粗搗篩每服二錢水一盞煎七分去滓溫服不拘時一方有生地黃一兩雞蘇飲治血淋不絶小便滲痛雞蘇苖竹葉滑石木通小蘇根生地黃右㕮咀如麻豆大每服五錢以水一盞半煎至八分去滓溫服不拘時以利為度一方加石膏五兩碎瞿麥湯治血淋熱結不通利者及尿血者水道中澀痛瞿麥穗乾地黃車前子葉滑石鬱金芒硝右搗篩每服三錢水一盞煎七分去滓溫服不拘時黃芩散治血淋小便疼痛不可忍黃芩雞蘇滑石小蘇根生乾地黃木通各一兩右為散每服三錢水一盞煎至六分去滓食前服溫下地龍散治血淋煩熱澀痛眠卧不安地龍微炒滑石各一兩膩粉麝香研細各一錢自然銅半兩菉豆粉三分右為細散研令勻不計時候煎甘草湯調下雞蘇飲治血淋不絶雞蘇一握切石膏八分碎竹葉生地黃一升切蜀鬼子四分右先將四味水五升煮取二升去滓湯成下葵子末四分分溫二服如人行四五里久進一服不利忌蕪荑蒜麵炙肉等物餘無忌阿膠湯治血淋阿膠二兩木豬苓去皮赤茯苓滑石澤㵼車前子各一兩右㕮咀每服三錢水一盞煎七分五更時服至大晚小便清瀅其血不知去處木通湯治血淋疼痛木通銼三兩半雞蘇葉石膏碎各二兩刺薊根生乾地黃切焙三兩右搗篩每服三錢水一大盞煎七分去滓溫服不拘時金黃散治小便血淋疼痛大黃煨銼人參蛤粉黃蜀葵花切焙右等分搗羅為散每服一錢煎燈心湯調下日三服葵根湯治血淋葵子根胡荽淡竹葉各一握滑石末二錢右將前三味銼細末作分三分每服水一盞半滑石末一錢七煎八分溫服車前子草方治小腸有熱血淋急痛用生車前草洗淨臼內搗細每服惟一盞許井水調濾清汁食前服若沙石淋則以煆寒水石為末和之新水調下一方用蜜調服豆葉飲出千金方治血淋以水四升煮大豆葉一把二升頓服又方出千金方以水三升煮葵子一升取自然汁日三服亦治虛勞尿血石韋散治血淋心煩水道中澀痛石韋當歸蒲黃芍藥右為散酒服方寸日三解毒散治男子婦人血淋百藥煎車前子黃連滑石木香右為細末燈草湯調下空心服重者日進二服治血淋心煩水道中澀痛石燕赤小豆商陸子紅藍花右為細散每服一錢煎蔥白湯調下食前服立效散治血淋多因下焦結熱小便黃赤淋閉疼痛所出如血或外挾風冷熱或內傷勞神或房室過度丹石發動便解赤者為風熱傷心瘀血者為風冷傷腎及大小便俱出血瞿麥穗耳草山梔子右為末每五錢至七錢水一碗入連鬚蔥根七個燈心五十根生薑五片同煎至七分時時溫服不拘時既云血寒則瘀此藥衛心勻治宜煎木通湯下麝香鹿茸丸兔絲子丸等所以養生方云不可専以血得熱則淖溢為説於理甚明不復詳解鹿茸丸兔絲子丸方見虛損門桃膠散治血淋木通石膏桃膠右為細末每服二錢水一盞煎七分通口食後服神效方治血淋海螵蛸生乾地黃赤茯苓右為末每服一錢煎柏葉車前草湯調下通祕散治血淋痛不可忍陳皮香附子赤茯苓右銼散每服二錢水一盞煎至六分去滓空心服鬱金散治血淋心頭煩水道中澀痛及治小腸積熱尿血出者生乾地黃鬱金蒲黃右為細末每於食前煎車前子葉湯調下一錢湯調下亦得大黃散治血淋熱痛不可忍大黃亂髮右為散每服二錢溫熱水調下日一服旱蓮子湯治血淋心煩水道中澀痛旱蓮子芭蕉根右搗篩每服五錢水一盞半煎八分去滓溫服日二服桑黃湯治小便淋瀝出血疼痛及臍腹陰根澀痛桑黃榆白皮右搗篩每服三錢水一盞煎七分去滓溫服治血淋車前子生乾地黃右相和煎三分沸食前服治血淋臍腹及陰根澀痛金燈花地蘖花各一兩右藥陰乾為散每服三錢水一盞煎六分去滓食前溫服又方出聖惠方薜之藤一握甘草一分炙右為散水大一盞煎七分去滓食前分二服治血淋用蜜一瓶熬熟入生薑汁一鍾同煎四五沸將瓦器盛之旋取白湯調服或只挑服之亦得髮灰散出危氏方治血淋若單小便出血如尿此為莖中衄此主之用乳髮不拘多少燒灰入麝香少許每服用米酢泡湯調下治淋以葵子末等分用米飲調下最治婦人胞轉不尿治男子血淋出經驗良方用蓮房燒存性入麝香少許每服二錢空心米飲調下又方出經驗良方以茄蒂火煙上薰乾為細末每服二錢溫酒或鹽湯調下隔年者尤佳又治腸風臟毒茄蒂燒灰存性為末米飲湯調下二錢小兒服半錢抵聖散治男子婦人血淋便澀水道疼痛治血淋及五淋等疾出百一選方用多年煮酒瓶頭蒻葉惟福建過夏酒有之三五年至十年者為佳每七個作一服燒灰存性入麝香少許研極細陳米飲煮濃湯調下空心臨卧服有人久患三服而愈治血淋出經驗良方用山梔子不見火為細末加滑石蔥湯調下一方溫酒調下治血淋因虛損得之出經驗良方用生料平胃散每服五錢重加龍骨一錢同煎空心服之數服而愈黃芩一物湯出直指方治血淋熱痛亦治熱淋用黃芩細銼新水煎通口服海金散出直指方治血淋小便澀痛用黃爛浮石於草陰地為末每服二錢生甘草煎湯調下亦治小腸氣根縮囊腫用木通燈心赤茯苓麥門冬煎湯調下獨連丸治男子婦人血淋下血用黃連末四兩或五兩於豬臟頭內煮熟去臟將藥末用糕并米飲湯和丸空心米湯送下丸如梧桐子大麻根湯出聖惠方治淋下血用麻根十枝水五升一服血止神效治血淋臍腹及根澀痛出聖惠方用烏魚骨搗細羅為散每於食前地黃汁調下一錢又方用出聖惠方用天靈蓋炙令黃色搗細羅為散每食前以新汲水調下一錢又方用晚蠶蛾研為末每食前熱酒送下二錢柿灰方出危氏方用乾柿燒灰存性為末米飲調下二錢蓋柿性寒也治血淋以酸草酒煎五苓散酸草名醋唎唎爐田家謂之田字草清泉湯治血淋不止右用棕櫚皮不拘多少分為兩處一半生炒為末一半燒灰為末每服生熟各半錢空心溫酒調下立效髮灰煎出十便良方治五勞七傷溺血淋瀝胸腹撑悶兔絲子四兩鹿茸山藥各一兩髮灰一分右為細末酒浸煮麵和丸如梧桐子大服五十丸空心白湯下茯苓散出十便良方治血淋不可進涼藥者五味子阿膠茯苓各半兩黃蓍一兩右為細末每服二錢米飲調下不拘時服伏龍肝飲出十便良方解血淋甘草川芎伏龍肝黃苓各一兩赤芍藥一兩右為粗末用水一升藥半兩煎至七分去滓分作三服溫服之鹿草地黃煎出十便良方治血淋鹿茸熟地黃當歸蒲黃各半兩龍骨髮灰各一分右為末煉蜜丸如彈子大每服一粒以水一盞入青鹽一揑煎化食前空心服之一方出鮑氏方用推車客即糞鳩去足翅研水下一方出鮑氏方劉君玉大帥苦淋人獻土狗五苓散效七聖散出衛生家寶方治因酒色太過眼赤腹脹膿血淋瀝腹痛五淋散半兩杏仁一分去皮桃仁一分去皮右為細末每服三錢溫水調下一方出鮑氏方治夏月勞淋血淋用洗心散入木通燈心一貼分二服治血淋用鱘魚木耳水煮汁飲之沙石淋附論夫石淋者淋病而有沙石從小便道出也蓋由腎氣虛損則飲液停聚不得宣通膀胱客熱則水道痛澀胞內壅積故令結成沙石隨小便而下其大者留凝水道之間痛引小腹膀胱裏急令人悶痛絶方王不留行散出聖惠方治石淋及血淋下沙石兼碎血片小腹結痛悶絶王不留行石韋去毛滑石蒲黃桂心各一兩甘遂三分葵子赤芍藥當歸各一兩半木通二兩車前子右為散每服三錢以水一盞煎六分去滓不計時溫服以利為度石韋散治石淋疼痛淋瀝晝夜不利石韋當歸木通地膽鍾乳粉車前子瞿麥穗蛇床子細心露蜂房各半兩右為散煎冬葵子湯調三錢以食前服一方加滑石神效琥珀散出聖惠方治石淋水道澀痛頻下沙石琥珀磁器燒酒淬七遍細研水飛過桂心滑石葵子川大黃膩粉木通木香右為散每服於食前蔥白燈心調下二錢如聖散出經驗良方治沙淋馬藺花麥門冬苦葶藶白茅根車前子檀香連翹甜葶藶各等分炒右為末每服四錢水煎服如渴加黃苓煎臨熱入燒酒少許滑石膏出聖惠方治膀胱虛熱下沙石澀痛利水道滑石二