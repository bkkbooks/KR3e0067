body:
  text: 普濟方卷八十明周王朱橚撰眼目門目生膚翳論夫目生膚翳者以腑臟氣血虛實不調加以風邪斂鬱于膈上薰蒸既久衝發于目乃生膚翳其睛上及有物如蠅飛然是為膚翳也龍木論云黑翳如珠外障此眼初患之時忽然疼痛難忍有翳如珠子在黑睛上如是大人患者毒風入眼如此疾狀不宜針灸宜服補腎丸如小兒患者即是實熱宜服羚羊角飲子詩曰黑翳珠排黑水間醫工會者始知難如神藥點翻為咎服藥湯丸即得完不用強看將手撥恐因手重出青涎遇翳挑撥并燒炙要見三光路更難凡水瑕翳深外障此眼初患之時或癢痛發歇不定致令黑睛上膜久後為患全損眼目此疾不可挑撥摩去鉤割切宜服茺蔚散除熱人參湯點退翳散立效詩曰黑暗橫豎點睛瑕似翳沈沈少與多醫者細看如此狀根深入厚莫挑摩老憂久後深為患除消風熱蔑以加出入不防須省謹志心翳療別無他膜因他患後生翳外障此眼初患之時或赤爛漸生翳生睛蓋即無所見若不赤黃猶見光明宜令鉤割尉烙後點爛翳散服細辛散歌曰忽因他患後漸漸失光明初覺微生膜經年翳便成遍遮睛上白日久赤黃生火燒銅筯烙用意手輕輕稍覺凝脂爛細辛散服平初時如少痛不用此求徵肝逆順生翳外障此眼初患之時皆因五肝虛勞衝上膈之間漸漸生翳或生下向上或生上向下名曰逆順之障不宜鉤割宜服知母飲子立效詩曰一般眸翳有逆順要先知從上生為逆名醫效亦遲消停經日月湯藥至還離尉烙并摩割四者揔非宜從下生名順治法亦如之效速非同逆忌者即依依方決明散出聖濟總録治眼生膚翳遮覆瞳人決明子炒地骨皮元參黃連去須桔梗炒柴胡去苗茯神去分各三山梔子仁五錢羚羊角屑一兩右粗搗篩每服五錢水一盞入淨淡竹葉十片煎至七分去滓放溫食後臨臥再服墜翳丸治眼疾日月深及白翳大者人參川當歸各一錢甘菊花一錢五分北細辛北五味川芎旋復花各二錢黃連二錢五分荆芥三錢甘草七錢五分黃芩防風羌活各三錢柴胡三錢五分知母四兩赤芍藥白蒺藜炒各五錢木賊已上銼散晒乾為末不要火焙然後入後藥料石膏三錢真珠一鵬砂二錢五分琥珀二錢生石決明一個火炙生麝香硫黃氣者不可用大黃氣者不妨磁石一錢五分火燒淡醋浸三次出火氣右為末前藥一處粳米糊丸如龍眼大用硃砂三錢半別研為衣取日氣隂乾臨睡及食後細嚼三丸白湯下鹽棗燈心湯三樣皆可決明子丸出聖濟總録治久患膚翳遮覆瞳子兼肝腎虛目黑暗決明子炒蕤人去皮地骨皮白茯苓去心防風去義澤瀉麥門冬去心焙茺蔚子各一兩一方用兩半枸杞子五味子青葙子各一兩細辛去苗三分車前子兔絲子酒浸別搗各三分生地黃焙乾各二分黃芩去心杏仁湯浸去皮炒一兩桂去皮五錢一方用一兩右為末煉蜜和丸如梧桐子大每服二十丸食後以米飲下臥再服此藥加兔肝一兩一分至二月停尤妙還睛丸出直指方治眼目昏翳蟬殼洗晒熟地黃洗焙川芎蒼术童尿換浸二宿焙白蒺䔧各一兩茺蔚子羌活木賊去節童尿浸三宿防風甘菊荆芥蔓荆子一方不用杏仁浸去皮炒兔絲子研酒浸石決明煅存半生蛇皮酒浸洗淨各五錢右為細末煉蜜丸如彈子大每服一丸食後細嚼清茶下黃連丸出聖濟總録治眼熱生暈翳覆瞳人黃連去須秦皮去皮澤瀉瞿麥各一兩車前子地骨皮去土黃芩去心沙參茯神去決明子炒甘草焙各一兩五錢蕤人二兩去皮右㕮咀焙過搗羅為末煉蜜丸如梧桐子大每服三十丸食後溫熟水下臨臥再服朱僧熱翳方出直指方蟬殼洗晒五錢蒺藜炒五錢防風羌活川芎木賊去節童尿浸一宿晒細辛秦皮枳實荆芥藁本甘菊各二錢五分右為末每服一錢茶調下石決明散出聖惠方治眼生膚翳昏暗頑熱疼痛石決明一兩搗碎水飛過葳蕤一兩黃連去須三分菥冥子一兩決明子三分秦皮三分川升麻三分犀角屑一兩梔子人三分甘菊花一兩細辛五錢甘草五錢炙右為末每以食後以竹葉湯下二錢白鮮皮湯出聖濟總録治目翳睛及瞳人上有物如蠅狀令人視物不明白鮮皮款冬花柴胡車前子枳殼去穰麩炒黃芩去心各一兩甘草五錢百合二兩菊花蔓荆實各一兩半右粗搗篩每服五錢水一盞半煎八分去滓食後溫服再服仙木飲出直指方治眼中翳膜蟬殼去土白蒺藜炒去角榖精草白蛇皮皂角作水洗焙蒼术一兩羌活川芎杏仁去皮木賊去節童尿浸一宿晒各一分右為末每服一錢食後蜜湯調下琥珀方治目翳用琥珀為細末點目中療眼翳方用胡粉注翳上以療三年翳白蜜方點目中熱膜以家養白蜜為上木蜜次之崖蜜又次之通明散治眼生翳膜赤脈弩肉疼痛有熱方見本門去爛類治眼翳生膜出仁存方天竺黃井泉石石決明蟬退洗去足各一兩蠶退一兩蛇退須足全者一條鬱金去皮炒切木賊去節各二兩右為細末丸餅煮雄豬肝以苦竹作刀切片食後用三四片蘸藥末二錢細嚼以肝水潄口咽下更加羌活當歸各一兩五退散出危氏方治目翳膜漸并上下瞼俱赤或翻一瞼在外者蟬退洗蛇退醮煮荆芥豬退蹄一分微炒穿山甲燒存性川烏炮去皮粉草各五錢蠶退二錢五分右為末鹽湯調下二錢空青丸出危氏方治沈翳細看方見其病最深空青二錢一方用一銖五味子細辛各一兩防風二兩車前子一兩生乾地黃知母各二兩石決明一兩別研右為末煉蜜丸如梧桐子大每服十丸空心茶湯下曾青散出聖惠方治眼生膚翳及消赤脈曾青一兩貝齒五錢炮烏賊魚骨一兩銅碌一分輕粉一分蕤人三分湯浸去赤皮龍腦一錢馬牙硝五錢右並細研如粉每取少許點翳上可二度點之青鹽膏出聖惠方治眼生膚翳及赤脈努肉青鹽一分輕粉五錢蕤人三分湯浸去赤皮硼砂一分以水化淨或青銅照子塗硼砂水在上却穿地作坑子可容照子懸面向下上以物蓋如此七日滿出之當有青碌刮取細研之雄雞糞一分烏賊魚骨五釐貝齒一分燒灰龍腦一分右相和研令極細以牛酥調如硬膏每用丸如黍米大點安翳上合目便臥候藥化盡以鹽湯洗之蘆薈丸出聖濟總録治眼熱赤痛及生膚翳蘆薈五錢研鯉魚膽七枚取汁熊膽一分研石決明一兩刮淨牛膽乾者半兩濕者汁一合麝香半分研車前子一兩右除膽外搗研細末後入膽汁同和勻煉蜜丸如梧桐子大米飲下二十丸漸加至三十丸菊花散出聖濟總録治眼中膚翳侵及瞳人如蠅翅狀菊花防風去叉木通銼仙靈脾銼木賊銼荆芥去根甘草炙各一兩右為散每服一錢食後用茶半錢同點溫服真珠散出聖惠方治眼生膚翳宜服祛風毒消翳障真珠末一兩蕤人炒三分湯浸去赤皮秦皮三分銼石決明一兩水飛過細研車前子一兩細辛三分枳殼一兩麩炒微黃去穰羚羊角屑一兩甘草三分炙微赤銼右搗細羅為散每於食後以甘豆湯下二錢忌炙油麵萎蕤湯出聖濟總録治眼膚翳萎蕤去皮地骨皮去土赤芍藥犀角屑黃芩去黑心茯神去水甘草炙升麻各一兩右粗搗篩每服五錢以水一盞煎八分去滓溫服臨臥再服前麓點翳膏出直指方硃砂二錢南朋一錢五分真珠爛石膏各五分熊膽一麝香少許蕤人二十一粒炒糸去油皮右為末用冬蜜研和於䂪內蒸候黏入角罐收用時煎秦皮汁調銅筯點于眼眥頭淚出為效墜翳丸治沈翳細看方見其病最深方見本門內障眼類蘆根湯出聖濟總録治脾肺熱薰目赤生翳方見本門五藏皆熱眼類爛翳散出龍木論治因他患後生翳外障硃砂石決明真珠末各五錢曾青硼砂龍腦各一分右研細末每夜少點眼中石謄散出聖惠方治眼膚翳赤痛癢澀石謄五錢石鹽一兩硃砂一兩鹽緑五錢龍腦一分膩粉一分右同研如粉每以銅筯頭取如小豆大點目中日三四度清涼散出龍木論治冰瑕翳深外障馬牙硝白礬曾青各五錢龍腦青黛各三分右研細末令勻至臨臥用散乾點半字在眼內硃砂散出聖惠方治眼生膚翳目赤時痛風淚宜點此硃砂五錢貝齒五枚燒灰乾薑半分衣中白魚二十枚膩粉半分右同研如粉每以銅筯頭取如豆大點目中珍珠退翳散出直指方白澤石膏烏賊魚骨真蚌粉等分小朱少許右為末每一錢用米泔調食後臨臥常服如神飲子一名如神餅子治目生翳膜出百一選方烏魚骨去皮細研木賊去節為末硃砂各一錢南硼砂四皂子大研細右同研三千遍湯溶蠟少許以栁枝子攪四十九遍入腦子少許更多尤妙于五月五日合丸作餅子每用一餅子臨臥安目眥中來早淨水洗于盞內臨臥再用一餅可使三四次通光丸出御藥院方治翳昏暈赤隱難開蒼术去心黃芩去心朴硝各二兩甘草七錢五分右為細末乾柿為丸每兩作五丸每服二丸冷水送下食後服真珠散一名湯風散治白翳覆瞳睛不見物方見本門目風淚出類龍腦膏出聖惠方治目生膚翳明目龍腦五分硼砂一豆大蕤人三顆湯浸去赤皮出雞子殼一枚以乾沙上磨雞子殼面斑點令滑為度去雞子膜用炭火炙冷乾研如粉右同研令細用牛酥和銅筯攪勻以磁瓶盛每一日三四度取少許點之貝齒散出聖濟總録貝齒七枚燒末研細真珠一分搗羅末細研龍腦研五分右合研如粉每點如黍米大於翳膜上日三四度摩翳膏出聖濟總録治目生膜膚翳逆順者空青二錢片腦三錢蕤人一兩口含去皮殼右於乳鉢內研合盛全點之療眼黑翳覆瞳子膚起方貝子四枚空青礬石一兩熬汁盡右為末取如黍米注上日二次療翳五十年不瘥出聖惠方貝齒一枚燒豆䜴三十枚三年苦酒三斤一作三年醋右先漬貝齒三宿消盡方內䜴微火煎如膏取三合藥置筒中夜臥時取如小麥大內於眥頭明日以湯洗之又方出聖惠方治眼生膚翳馬琦三分白龍腦五分白礬灰一錢右同研如粉每銅筯取如米許點之羚羊角散出寶命集治水翳久不去者主之羚羊角升麻細辛各等分甘草半枝右為細末一半為散一半蜜丸如梧桐子大每服五七十丸以羚羊角散下之食後臨臥米泔水煎服點眼方治眼生膚翳方見本門一切眼疾雜治類治目生翳方出本草以貝子十枚燒灰治篩取如胡豆著翳上日二次令仰臥人傳之炊久乃拭之佳如炊一石米久乃滅息內者加真珠以與貝子等分一方以貝子燒作細屑末以吹眼中良又真馬琦搗末亦可療膜翳人乳方一名刮翳膏治目熱生膚赤白膜目翳障出龍木論取雄雀屎細直者人乳和熟研傅之當漸消爛治翳如重者出本草用豬膽白皮暴乾合作小繩子如粗叉股大火燒作灰待冷便以灰點翳上不過三五度即好楮實方一名楮白皮散治肝熱生翳亦治氣翳細點及生花澀痛出龍木論以楮白皮暴乾合作一繩子如叉股大火作灰待冷細研每點於翳上三五度漸消一方用實子研細蜜湯調下食後服亦治小兒翳眼治赤眼後生翳膜以蘭香子洗淨晒乾每用一粒以筯點大眥頭閉目即覺藥在目內旋轉藥力過即不轉須臾隨淚出翳膜在上如魚眼然再易一粒以病退為度一方為末每服如黍米大點眼眥頭昔蘆州知録彭大辨父在臨安暴得此疾醫僧以此治之坐間瞭然因得此方屢以治之又方一名枸杞煎療眼中翳小輕者兼眼澀痛出十便良方取枸杞及車前子葉等手中使汁欲出又別取桑葉兩三重裹之懸於隂地經宿仍摘破桑葉取汁點目中不過三五度梣本方治膚翳以方注梣苦歷木浸皮青用洗眼即效白魚方出龍木論治眼翳用白魚末注少許翳上白者佳去翳方出肘後方治眼翳以東壁土亦可單用性平削末細篩點目中淚出即效又方出本草治目中一切浮花翳及眼中熱淚以烏賊魚骨細研水飛澄下比去水日乾