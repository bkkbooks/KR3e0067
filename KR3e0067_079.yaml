隱澀昏花常服清利頭目甘菊花開頭者五百箇荆芥五百穗木賊去節五百節楮實五百枚川椒去目閉口者五百粒右為細末煉蜜丸如彈子大每服一丸細嚼時咽下食後臨卧亦得忌酒蕎麵辛熱物增青膏出楊氏家藏方治眼生翳膜隱澀難開或暴赤眼腫痛盆硝五錢硼砂三錢馬牙硝一錢青鹽五分輕粉五分腦子五分麝香一字碙砂一字右件同研令極細每用粟米大點眼內羌活退翳膏出試效方一名復明膏治足太陽寒水膜子遮左右睛白翳在上視物不見東坦蘭室方椒樹西北根一分東南楊一分羌活七分正麻黃去節三分當歸屑六分黃連二錢防風根二分生甘草稍四分柴胡根三分升麻根三分生地黃三分蕤人六箇藁本二分漢防己二分右淨新水一大碗先將漢防己黃連生草稍當歸稍生地黃煎至一半下餘外藥再煎一􅊦去滓入銀石器中再煎如藥點之有力為度羌活退翳湯出東坦蘭室方治太陽寒水翳膜遮睛不能視物麻黃根二錢羌活一兩五錢防風一兩藁本七錢薄荷葉二錢荆芥穗七錢煎成藥加之細辛少川芎三錢當歸三錢酒生地黃一錢川椒五分黃柏四錢酒知母五錢右㕮咀每服稱三錢水二大􅊦煎至一盞半入荆芥穗再煎至一盞去滓熱服之食逺忌酒醋溫麵蝎附散出衛生寶鑑搐鼻退翳膜薑黃青黛附子尖各一分薄荷一兩鵝不食草五錢右為末含搐少許發雲散出衛生寶鑑治因眼發濕熱不退而作翳膜遮睛黑暗羞明隱澀難開川芎草龍膽荆芥穗楮實薄荷石決明羌活蒼术蜜蒙花白术大黃甘草甘菊花地膚皮木賊連翹川椒香白芷白蒺䔧桔梗石膏各五錢檳榔一銼石燕子一銼右揀淨細末每服三錢溫茶清一盞調下食後一日三服忌雜魚麵馬豬肉蕎及辛熱物還睛散出衛生寶鑑治眼生翳膜昏澀淚出瘀肉攀睛大芎草龍膽草決明石決明荆芥穗野菊花野檾子楮實木賊白茯苓炙甘草白蒺䔧川椒炒去目仙靈脾葉茵蔯蒿已上各五錢右為細末每服二錢食後茶清調下一日三服忌雜魚肉熱蕎麵又方出肘後方治目卒生翳拔獨鬚及熱以滴翳如滴泥再用三四鬚良逺年障翳論夫障翳之疾本於風熱毒氣攻積臟腑衝發眼目結摶而成蓋目為五臟精華肝外候令風邪毒氣在於臟腑不得宣泄上衝於目故為障翳初隱澀赤痛漸成翳膜遮障翳而不退或至粘睛非藥難瘥是為逺年障翳方大決明散出聖濟總録治眼目一切逺年障翳眥生弩肉赤腫疼痛石決明草決明青葙子甘草炙銼黃蘖去粗皮黃連去鬚榖精草龍骨白芷枳實麩炒牡蠣煅枸杞子蛇蛻各一兩羌活去蘆頭蒺䔧炒去角蟬蛻白附子炮黃耆銼各半兩魚子活水生下者半兩其子用硫黃水溫三洗過虎睛一隻切作七片文武火炙乾每一次一片右為末每服三錢更時五陳湯茶清調下日午臨臥再服眥弩肉赤腫疼痛不可忍者三五日見效赤白翳膜久不見者一七日減二七日其眼好安然眼枯者不藥活者可醫如煩惱傷酒色遇風兩眼中淚出疼痛者即是活眼若或眼中無淚不疼痛者乃為死眼更不用治一方有石決明蔓菁草忌毒魚麵豬肉酒色等件開明丸出危氏方治年深日近翳障青肓寂無所見一切眼疾熟地黃一兩五錢酒浸兔絲子酒洗車前子麥門冬去心蕤人去皮決明子地膚子茺蔚子枸杞子黃芩五味子防風去蘆頭澤瀉細辛去葉不見火杏仁炒去皮尖北葶瀝炒青葙子各一兩桂皮五錢羊肝須用白羊者只用肝薄切瓦上焙乾了作末或却以肝煮肝爛為丸少則以蜜湊之方可久留右為末丸如桐子大每服三十丸熱水下日三服仍戒忌生薑糟酒炙煿等熱物琥珀散方出聖惠方治積年瘀肉障翳琥珀珊瑚碙砂白者馬牙硝烏賊魚骨各五錢先於粗石上磨去其澀用好者一錢真珠末一兩右都入乳鉢內研三日令極細每日三五次點之羌活丸出聖濟總録治久患風毒氣攻目眼昏暗赤澀瘀肉生瘡翳膜遮障不明久患偏正頭疼眼目漸覺細小及夾腦風痛多視黑花羌活去蘆頭天南星炮天麻附子炮製去尖臍芎藭旋復花半夏湯浸十度青橘皮湯浸去白焙桑螵蛸藁本去苗一兩牽牛子六兩炒搗取末二兩右搗為細末煉蜜和丸如梧桐子大每服二十丸食後溫湯下漸加至三十丸決明煎出聖惠方治眼逺年翳障馬蹄決明一兩五錢蘆薈蕤人湯浸去赤皮一兩五錢秦皮搗碎黃蘖去粗皮馬琦烏賊魚骨紫貝燒熱各一兩鯉魚膽四枚波斯鹽緑三分細研右先煎決明等五味以水三大盞煎至一盞淨濾去滓次下鹽緑等五味更煎至一小盞於銅器中盛勿令泄氣每取一豆大許以人乳調點之閉目良久令淚出日二三度琥珀散出聖惠方治眼生翳障黏睛牢固經年不愈琥珀五錢真珠一兩貝齒燒灰珊瑚馬琦朱砂蕤人去皮決明子龍腦各一分零石五錢右為末入乳鉢內研如麵每以銅筯少許點之石膽散出聖濟總録治眼生翳障經年不瘥石膽半分琥珀真珠珊瑚紫貝馬琦決明子各一分硃砂蕤人湯浸去赤皮各五錢右為散入乳鉢內研令細勻每用藥一小豆大點大角眥頭日二三度妙補肝散出龍木論治三十年失明以蒺䔧子七月十七日收隂乾搗散食後搗散水服方寸匕治眼中一切障翳不消風毒氣上攻眼常翳膜不見物者不計年翳膜厚者此藥頻點極效方石膽研細波斯鹽緑細辛鉛丹石決明搗碎細研水飛過貝齒各一兩燒灰石鹽五錢碙砂五錢烏賊魚骨三分秦皮去皮雞舌香各五錢黃連一兩去須決明子三分右為末入研了藥更研和丸如麻子大夜臨臥大眥頭各一丸紫金膏治男女目疾逺年日近翳膜遮障攀睛努肉拳毛倒睫黑花爛眩畏風羞明冷淚及赤眼腫痛爐甘石好者火煅細研無聲將黃連當歸桃頭童子小便浸煎湯濾淨飛淘去砂石控乾粗者再研再淘一法只用楊梨亦名蓧採葉濃煎湯濾淨飛淘控乾一兩黃連一兩火飛研乳香碙砂雄黃沒藥白丁香真者當歸輕粉麝香腦子二錢各為末蜜四兩右用大建盞內熬蜜沸入丹砂以栁木箆子急手攪勻約熬三兩沸却入爐甘石復攪勻下乳香入碙砂又下雄黃次下白丁香再入沒藥又下當歸再入輕粉方下腦子麝香依次第下文武火各熬三兩沸須急用箆子不住手攪勻候熬成膏不黏手為度每雞頭大一塊沸湯化開浸湯半盞已下乘熱食後薰洗蕤人散出聖惠方治眼障翳多年不退方見本門目生花翳類石決明丸出聖惠方治眼障翳經年不消逺視不明石決明半兩搗細水飛過決明子酸棗人微炒葳蕤蕤人湯浸去皮胡黃連藍葉龍膽去蘆頭青葙子各半兩右為末用羊膽汁和搗百餘杵丸如桐子大每於食後以清粥飲下二十丸點眼生金絲膏治男女目疾逺年日近翳膜遮障攀睛弩肉拳毛黑花眩爛羞明冷淚及赤眼腫疼碙砂一錢研黃丹五錢晉礬一錢研黃連一兩去毛銼青鹽一錢研乳香好者三錢研細片腦二錢當歸五錢洗淨銼右用好蜜四兩除片腦外和七味內入青竹筒中油單紙裹筒口五七重緊緊繫定入湯瓶文武火煮一周時取出劈破新綿濾去藥滓方下片腦和勻瓷瓶收貯再用油單紙五十重封繫瓶口埋露地內去火毒候半月取出每用一粟米大黃連煎出聖濟總録治積年風眼赤眼障膜侵黑不見物黃連去須曾青研如粉地骨皮白者各一兩顆鹽一分蜜一升古錢十一文右搗碎以蜜清安新磁瓶中以湯煮一復時後取出重以綿濾去滓內于瓶子中著地上露兩宿後每以銅筯取少許點目中一日可三五度神仙水照膏出危氏方治逺年日近眼目羞明翳膜遮障或赤筋纏裹努肉攀睛黃丹水飛過同水銀研黃蠟一兩切片子水銀一錢細研如粉碙砂一字水飛為末蛇退一條碾細烏雞子殼不拘兒子者去膜細研右先溶蠟成汁次入諸藥在內須是鍋子熬成膏子為丸如芥子大捻餅子用硃砂為衣如患一切眼疾用藥一餅患雙眼兩餅臨夜臥時用筯頭水溫了蘸藥一餅點目中閉眼臥一宿直至天明起時先用水一盞如洗面照眼開放將眼缺動其藥落在水中少時即令眼明人仔細水中看藥上取下黃色或白翳膜病毒纏在藥上用手指撚去病再用之一餅可用三日一方無碙砂琥珀煎一名貝齒散出聖濟總録治眼逺年瘴翳不瘥方見本門目生釘翳類七寶散出聖惠方治眼翳障年深月久不能消散珊瑚琥珀曾青紫貝硃砂雞子去白膜各五錢玉屑五錢右研令細每用時仰臥以銅筯取如菉豆大點于翳上一食久乃起日三五度點之龍腦膏出朱氏集驗方治逺年近日翳膜遮障攀睛努肉連􅀈赤爛視物昏暗不覩光明隱澀多淚迎風難開立效蘆甘石不拘多少揀粉紅梅花者為妙用乾鍋盛火煅訖入黃連水淬再水浸一宿去滓將煅甘石淬七次同黃連水細研飛過暴乾羅過用三錢黃連不計多少捶碎龍腦草不拘多少淨洗晒乾不見火為末一錢桑柴灰二錢好黃丹五分右同白蜜四兩一處入於淨磁器內文武火慢熬以竹箆子攪如漆色不黏手為度勿犯生水藥成依舊以磁器盛頓每服如皂角子大新冷水半盞化開洗三日不用每日洗數次不妨藥盞用紙蓋不可犯灰極有功效祕金散出聖濟總録治目幼久疳風攻眼生翳久藥不瘥但翳膜遮障睛不損者並可治黃連去須沙參太隂元精石研決明子各一兩右為散每服五分用羊子肝一具竹刀切作縫子摻藥末在內以線繫入瓶中用米泔煮熟分作三服淡喫每箇分作三分朴硝散出聖惠方治眼久積頑翳蓋覆瞳人川朴硝二兩碙砂半分明者白礬五錢通明子右相和研為末將小磁瓶子以慢火炙令熱炒藥末徐徐入瓶內旋以柳枝子攪撥不令看瓶子四邊又入藥末續續添火候藥盡良久斷煙以乾瓶子蓋口更大火燒經一炊久去火須候瓶令其藥屑輕肥更盛即埋在濕土內七日去火毒訖取出細研每銅筯日三五度取少許點之又方出聖惠方真珠一兩地榆二兩銼右以水二大盞同煮水盡取出真珠以醋浸五日後用熟水淘無令醋氣研令極細每以銅筯取少許點翳上以瘥為度檾實散出聖濟總録治目生翳膜久不愈者檾實以栁木製磑子磨之馬尾篩取黃肉去其黑殼不用每十兩有四兩精肉非栁木磑不能去右為末取獖豬肝薄切一色入藥中缺著緩火炙肝熟為散臨臥陳米飲調下二錢一法用釅醋為丸每服二十丸一法取檾實內囊蒸一次暴乾為末或散或蜜丸以溫水下治積年失明方龍本以決明子二分杵為末食後以粥飲服治久患壅毒風熱翳膜并內外障眼出本事方真黃連去毛秦皮去皮黃柏小者去皮右等分為末每服一錢水一盞煎五七沸用夾絹濾去滓乘熱蕩洗候冷便止再暖又洗滓一併煎洗普濟方卷八十
