body:
  text: 普濟方卷一百七十三明周王朱橚撰積聚門久積癥癖附論癥之為病雖有形證推之不動癖之為病僻在脅肋按之水鳴此皆飲食留滯所致也不即治日漸增長盤結牢固邪氣日盛令人正氣衰微纍歲不已甚則身瘦腹大名曰久積癥癖方五石烏頭丸治男子女人百病虛弱勞冷宿寒久癖及癥瘕積聚或嘔逆不下食并風濕諸病無不治之者鐘乳錬硫黃礬石紫金英一作紫石英枳實赤石脂甘草白术紫苑防風白薇山茱茰桔梗天雄皂莢細辛蓯蓉人參附子去皮藜蘆一兩六銖麥門冬乾薑吳茱茰蜀椒桂心各二兩半烏頭三兩厚朴逺志茯苓各一兩半當歸二兩棗膏五合乾地黃一兩十八株右為末錬蜜和搗五千杵如梧子大酒服丸日三稍加之夾食丸一名丁香丸出聖濟總録治癥癖食氣食勞五隔痰逆并夾食血氣疼痛乳香别研如粉木香丁香肉豆蔲去殼當歸切焙青橘皮去白焙京三稜炮銼各半兩紫苑去苖土乾薑炮細銼附子炮裂去皮臍巴豆去皮心别研紙裹衣壓去油各一兩鱉甲去裙欄用醋蘸慢火炙令黃色二兩丹砂一分别研如粉右除乳香丹砂巴豆外搗羅為末然後乳香等三味同研令勻都入臼中用蕎麥麵與藥末臨時以意看多少如麵搗徐徐入新汲水搗候可丸即止丸如菉豆大煎淡漿水令沸旋旋入藥煮三五沸漉出於日中曝乾每服五丸食後用茶酒溫水下要轉時只以冷茶下熱茶投即行也紫金丹出聖濟總録治男子婦人久氣塊癥癖兩脅下積冷胸腹氣刺痛鐡滓一斤淘淨控乾硫黃半斤水飛過硇砂二兩右三味先取鐡滓硫黃二味於瓷器內用米醋一斗慢火煎硫黃火上無熖即煿乾刮此二味入瓷合內固濟了用大火煆三度畢取合內藥再用水飛不用鐡滓控硫黃令乾入細瓷合內坐在平地别用火一稱煆至火盡取出入硇砂二兩同研令細再入合內用火一斤就灰池中養三日放冷取二兩再入下項藥硇砂半兩木香末丁香末膩粉丹砂研肉豆蔲去殼末乾漆炒煙盡研胡椒末阿魏用醋化麵和作餅子燒熟為末各一錢砒霜末一分半右一十味研細再同硫黃研勻用酒醋鍾半煎五靈脂薄麵糊丸如梧桐子大每服從五丸漸加至二十丸以意加減服若取積滯癥癖及酒食積急氣冷氣一切滯氣等疾更入後藥巴豆仁研一兩大戟末半兩芫花末半兩草烏頭一分五靈脂末一兩膩粉二錢硇砂研半兩右七味以米釅醋二升入銚子內熬成膏便與前藥末搗為丸如梧桐子大量虛實加減服送一丸加用醋湯或茶清下礞石丸出華陀中藏經方治男子婦人逺年積氣消磨癥塊取虛中積脅肋堅硬腹刺痛及治脾滯氣酒食所傷飲食不化惡心嘔逆胸膈不快不思飲食胸腹脹滿臍脅有塊心脾冷痛口吐酸水停飲冷痰痃癖癥瘕發痛無度翻胃轉食面黃瘦乏四肢頭面浮腫臟腑不調裏急後重及十隔氣虛中有積婦人血氣塊硬悉主之礞石半兩青色者生用搗羅為細末硇砂丁香桂去粗皮乾薑炮各二兩木香京三稜煨銼蓬莪荗煨銼芫花醋浸一宿炒煎檳榔煨銼為末豬牙皂夾去皮炙黑肉豆蔲仁各一兩青橘皮湯浸去白焙白豆蔲仁墨燒八分熟各半兩巴豆一兩半去皮心膜出油浸胡椒一分大黃一兩半半兩生用半兩煨熟半兩炒焦粉霜細研一分右為末用醋三升飛硇砂於銀石器中文武火熬二十沸次入巴豆又熬五七沸次入礞石京三稜末又熬三五沸次取白麵二兩以無灰酒半升調入藥中又熬一兩沸次入大黃末又熬三兩沸次下諸藥末不住用栁木杖子攪勻候稠搗千杵丸如菉豆大每服三丸不問男女長幼心痛醋湯下左脅下疼煎薑棗湯下右脅下疼煎木香湯下婦人血癖血氣炒生薑醋湯下久患冷痢煎黃連湯下小兒常服冷水下有妊者不得服小兒以意減丸數陳橘皮煎丸出聖濟總録治久積冷氣攻心腹疼痛痰癖嘔逆腹脹滿不思飲食肌膚瘦瘁腰膝倦痛下痢泄㵼瘧疾腸風并婦人血海久冷無子陳橘皮湯浸去白焙十五兩别搗為末巴戟天去心石斛去根牛膝酒浸切焙萆薢各三兩肉蓯蓉酒浸切焙鹿茸去毛酒炙杜仲去粗皮炙銼菟絲子酒浸三日别搗銼附子炮裂去皮臍陽起石酒浸研如粉厚朴去粗皮生薑汁炙甘草炙銼一兩吳茱茰湯洗焙乾炒當歸切焙乾薑炮京三稜煨銼右為末先以好酒五碗於銀石器內煎橘皮末令如餳入藥攪勻再搗三五百杵稍乾更入酒少許和丸如小菉豆大每服二十丸至三十丸空心溫酒下鹽湯下亦得治一切塊癖積氣血聚等一二十年疾細墨半兩燒芫花醋浸炒焦赤青礞石大戟子乾漆炒五靈脂荆三稜蓬莪荗蜜陀僧陳皮牡蠣各半兩巴豆一兩去皮濕紙三四重裹燒紙焦整大棗十四箇去核白丁香硇砂研虻蟲去翅足班蝥去翅頭各一分右為細末酒醋煮糊為餅子每服十餅用煮麵湯送下宜食前服溫白丸出鮑氏方治心腹積聚久癥癖塊腹脹心下堅結大如杯碗傍攻兩脅心痛積年食不消化等病並治之紫苑淨洗二分吳茱茰二分淨擇鹽水洗過菖蒲一分去蘆米泔浸過一宿水洗柴胡二分去蘆頭水洗過厚朴去皮生自然汁浸炙香熟桔梗皂莢去皮尖子茯苓各二分桂心三分生用乾薑炮黃連各二分蜀椒三分用紙襯於銚內出汗去根枝用巴豆去皮了稱二分用麵炒令麩稍焦為度爛研巴豆以紙裹壓出油如此三度換新紙然後入衆藥人參各三分本方各二分烏頭十分炮裂後掘地坑內之用盞子蓋一饌間却出烏頭去尖皮再切用右搗篩以白蜜和更搗二千五杵丸如梧子大有病服一丸至二丸不知稍增至三丸五丸以知為度主心腹積聚久癥癖塊大如杯碗黃疸宿食朝起嘔吐肢滿上氣時時腹脹心下堅結上來搶心傍攻脅徹背連胸痛無常處繞臍攪痛狀如蟲咬又療十種水病八種痞塞翻胃吐逆飲食噎塞五淋九種心痛積年食不消化或婦人諸疾斷緒不生帶下淋瀝或痎瘧連年不差又療一切諸風身體頑痺不知痛癢或半身不遂或疼痛或眉髮墮落又療七十二種風三十六種遁尸疰或癲癎或婦人五邪失心夢與鬼神交通四肢沉重不能飲食昏昏默默口欲取死終日憂愁心中不樂或恐懼悲啼飲食無味月水不調直似懷孕連年纍月羸瘦困敝遂至於死或歌或哭為鬼所亂莫之知也但服此藥者莫不除愈臣之方驗便合藥與婦人服之十日下出癥癖蟲長二尺五寸三十枚下膿二升黑血一升青黃汁五升所苦悉除當日有子臣兄墮馬被傷腹內有積血天隂即發羸瘦異常命在旦夕與藥服下如雞肝黑血如手者二百餘片白膿二升赤黃水一升其病即除臣之方驗敢不獻上忌生冷酥滑豬雞魚犬牛馬鵝肉五辛油麵豆糯米陳臭等物一方無肉桂用生薑湯下木香丸出聖濟總録治逺年癥塊積聚木香硇砂研當歸切炒各一兩礞石研三分大黃煨銼陳麵不蚛者炒麥蘖炒墨研白麵各半兩大戟炒乾漆炒煙出豉少許膩粉各一分巴豆仁一錢一分不出油研右為末以臘月雪水同搗三二百杵丸如菉豆大每服一丸空心用乾柿爛嚼裹藥隨所傷物煎湯下不得吐津鱉甲丸出聖濟總録治久積癥瘕鱉甲大者一枚淨洗去筋膜麵裹外面二三分厚上面用紙固濟泥一風爐子安鱉甲在上面别入桃仁半斤去尖皮雙仁研以米醋四升無灰酒三斤硇砂三兩同攪拌旋入向鱉甲中煎為膏取出用合盛却將鱉甲去紙泥炙令黃色青橘皮去白炒麥藥炒沉香銼肉豆蔲去殼各三兩丁香木香檳榔半生半熟陳麴炒京三稜煨銼大黃生銼厚朴去粗皮生薑拌炒令紫各二兩柴胡去苖半斤桂去粗皮二兩右為末再研令勻用桃仁煎并熟蜜和丸如梧桐子大空心米飲下二十丸水銀丸治久虛損癥癖水銀豉研礞石末滴酒和勻瓷合內慢火逼乾各半兩膩粉京三稜末石三稜末雞瓜三稜末粉霜白丁香末硇砂研各三錢肉豆蔲去殼研檳榔各二枚為末丹砂三錢研右合研勻細用棗肉和丸如菉豆大每服五丸溫水下又一方治丈夫病入蘹香補骨脂各一分治婦人病入血竭沒藥各一分三稜丸治多年積氣癥癖京三稜煨銼雞瓜三稜煨銼陳橘皮青橘皮各湯浸去白焙巴豆去皮心膜出油石三稜煨銼各五兩檳榔十枚半生半熟銼肉豆蔲十枚去殼醋浸二宿丁香益智出皮各一兩木香二兩硇砂一兩半飛過右為末醋煮麵糊和丸如梧桐子大每服三丸如當心氣塊茱茰湯下左右氣塊木香湯下本臟氣塊蘹香子湯下人參丸治久癖塊聚心腹脹滿人參元參沙參丹參防風去叉苦參附子炮裂去皮臍各一兩巴豆去皮心煮研去油三十粒蜀椒去目并閉口炒出汗一分乾薑炮半兩蟅蟲三枚熬葶藶炮炒研一合右為末錬蜜和丸如梧桐子大每食後米飲下一丸未利再服一方用大黃四兩蓬莪荗散治久積癥癖氣不散脅下似覆杯多吐酸水面目萎黃或腹中疼痛蓬莪荗一兩鱉甲二兩鹽醋炙令黃去裙闌赤芍藥半兩肉桂一兩去皴皮枳殼一兩麩炒當歸一兩銼乾薑半兩京三稜一兩泡銼川大黃一兩銼碎微炒木香一兩柴胡一兩半去苖檳榔一兩右件為散每服三錢水一中盞入生薑半分煎至六分去滓不計時候溫服三稜沒藥丸治逺久沉積塊疼悶京三稜泡廣茂煨檳榔鱉甲醋炙石礬燒赤青皮去油乾漆炒煙盡雷丸各半兩丁皮硇砂沒藥各二錢右為細末醋糊為末如菉豆大每服五七丸白湯下食前日進四服丁香丸治久積食癖心腹時發疼痛胸膈不快痰逆惡心臟腑不調不思飲食或下痢膿血裏急後重𣪚惡氣逐滯結丁香木香桂去粗皮阿魏麵裹煨去麵研麝香研硫黃研水銀二味於盞內結成硇砂研粉霜胡粉研明一分巴豆去皮心右十一味搗羅三味為末與八味合研勻用安息香半兩酒化濾過入蜜少許重湯同熬和劑旋丸如梧桐子大每服三丸至五丸臨時煎生薑棗湯下更看虛實加減取下積聚惡物為效三稜湯治久積癥癖不散心下結成狀如伏梁京三稜炒鱉甲醋炙去裙襴大腹銼炒各一兩桂去粗皮白芍藥陳橘皮去白焙當歸切培枳殼去瓤麩炒髙良薑各三分木香訶梨勒煆去核半兩右細銼每服五錢水一盞半煎取八分去滓溫服鱉甲丸治久癖結兩脅臍下堅如石按之痛劇食飲不下鱉甲去裙襴醋炙二兩牛膝酒浸切焙芎藭防葵當歸切焙乾薑炮桂去粗皮附子炮裂甘草炙各一兩大黃銼一兩半巴豆一枚右為末錬蜜和丸如梧桐子大每服空心溫酒下三丸加至五丸日一服以利為度一方用細辛四分粥飲下大黃丸治久積癥癖堅牢羸瘦不能飲食宜服川大黃一兩銼乾薑一兩炮川芒硝一兩桔梗一兩石膏半兩甜葶藶一兩半赤茯苓半兩附子半兩泡杏仁半兩湯浸川烏頭半兩泡川椒半兩去膜右件藥為末入研了藥令勻錬蜜和搗三二百杵丸如菉豆大每服不計時候溫酒下二十丸蓬莪荗丸治久積癥癖氣攻左脅如覆杯及婦人血瘕蓬莪荗炒一兩桂去粗皮三分芍藥檳榔銼枳殼去瓤當歸切焙木香昆布洗去鹹汁沉香銼白芷炒各半兩右為末錬蜜和丸如梧桐子大每服二十丸煨薑木瓜湯下木香丸出聖濟總録治五毒五積五勞并一切氣疾癥癖塊及逺年積丁香半兩附子泡裂烏頭去皮檳榔銼芫花醋炒大戟炒甘遂炒紫苑去苖各一分硇砂醋飛過焙乾研一兩膩粉研一分半右一十味先將八味搗羅為細末入藥研和勻麵糊丸如梧桐子大每服七丸至十丸醋湯下消積丸出聖濟總録治久積癥癖冷熱不調痰逆否悶心腹刺痛喘滿膨脹泄利羸困不思飲食代赭煆醋三七遍研礞石研各一兩白茯苓去黑皮桂去粗皮青橘皮湯洗巴豆去皮心各半兩京三稜煨銼楝實肉各一分硇砂研三分右為末拌勻酒煮麵糊和丸如梧桐子大每服二丸木香湯下看虛實加減桃仁𣪚出聖惠方治久積癥癖氣結不散面色萎黃羸瘦食少宜服桃仁一兩湯浸去皮尖雙仁鱉甲二兩半塗醋炙令黃京三稜一兩泡銼當歸三分銼肉桂一兩去皮枳實一兩麩炒木香半兩檳榔三分川大黃三分銼右件藥為散每服三錢水一中盞入生薑半分煎至六分去滓不計時候溫服麝香丸出聖惠方治久積癥癖氣不差或於脅肋作塊形大如杯或如雞子大透隱皮膚或時疼痛堅硬如石宜服麝香一兩細研蓬莪荗三兩萆薢二兩銼芫花二兩醋拌炒神麴一兩炒鱉甲二兩塗醋炙大麥蘖一兩炒乾漆一兩搗碎炒京三稜二兩銼右件藥為末入麝香研令勻用醋煮麵和丸如梧桐子大每服食前溫酒下十丸附子丸治久積癥癖腹滿不能食附子一兩泡巴豆三十枚蟅蟲五十枚川椒一合去目乾薑半兩防葵一兩甜葶藶一合川大黃一兩銼右件為末研入巴豆令錬蜜和搗三二百杵丸如梧桐子大每服食前下三丸巴豆丸出聖惠方治久積癥癖及一切惡氣並服巴豆一兩去皮硇砂一兩飛研京三稜一兩銼香墨半兩青橘皮二兩湯浸附子一兩泡裂乾漆一兩川大黃一兩銼右件藥京三稜乾漆為末入在巴豆醋內同熬及一半次入硇砂更熬令稠後下大黃青橘皮附子香墨等和搗三二百杵丸如菉豆大每服空心煎橘皮湯下三丸血癥塊即用當歸酒下一切惡物溫酒下比金丸出聖濟總録治久積伏滯成塊婦人血癖血塊及産後敗血不行兒枕刺痛小兒如癖常服利胸膈除傷滯沒藥研一錢五靈脂研半兩皂莢去皮子末三錢白丁香雄者研硇砂研乳香各錢半巴豆一百粒去皮心右為細末用大棗十枚去核刮巴豆膏入在棗內線纒了慢火炙熟去線搗爛與前項藥末合勻搗成泥丸如菉豆大大人臟腑實者五丸虛者三丸小兒芥子大一嵗三丸五七嵗以上七丸十嵗以上十丸取積用燒皂子膿煎湯放冷下利胸膈用棗二枚爛嚼裹藥乾咽不得嚼藥並臨卧服急患不拘時一方粥飲下硇砂丸出王氏博濟方治久積癥癖塊心腹脹滿胸膈不利痰實胃脹喧硇砂好者二錢狼毒銼醋炒乾芫花醋浸一宿乾漆炒煙出鱉甲炙各一兩雄黃好者一分巴豆三七粒右為末和勻煮麵糊丸如豌豆大每服三丸食後臨卧溫生薑湯下京蓬煎丸出聖生拔萃方治痰癖消癥塊冷熱積聚胃膈疰悶通利三焦升降隂陽順一切氣消化宿穀京三稜二兩酒浸冬三日枳殼麩炒去瓤廣茂二兩醋浸冬二日木香末青皮去油茴香微炒檳榔各一兩右為細末水糊為丸豌豆大每服三十丸生薑湯下加硇砂水銀治肉積神麯麥蘖治酒積水蛭虻蟲治積血木香檳榔治氣積甘遂牽牛治水積雄黃膩粉治涎積礞石巴豆治食積要在臨時通變也療腹中癥癖兼虛熱者不用純冷專㵼藥宣羈縻攻之方鱉甲炙龜甲炙桑耳金色者泡大黃吳茱茰防葵各八分附子泡四分右搗篩蜜和為丸如梧桐子大酒服十丸日再服漸加一丸以微泄為度無所忌日晚服馬莧汁三四合以差為期馬齒菜即馬莧也忌豬肉冷水京三稜丸出聖惠方治久積癥癖氣不差令人羸瘦不思飲食京三稜二兩川烏頭一兩泡硇砂一兩陳橘皮二兩乾薑一兩泡雄雀糞一兩微炒右件藥為末入硇砂研令勻以醋煮麵糊和丸如梧桐子大每於食前以酒下十丸沉香三稜煎丸出聖濟總録治臟腑久積氣塊冷痞不思飲食沉香人參各一兩青橘皮湯浸去白焙一兩半京三稜三兩搗末右以三味為入三稜硇砂煎內和丸成劑有餘煎更於火上慢熬搗千百杵丸如桐子大每服三十丸食前米飲下婦人醋湯下日再三稜草煎方出夲草治癥癖又主鼓脹滿右以京三稜切一石水五石去滓更煎三斗汁銅器中重釜煎如稠糖出內蜜器中每服一匙用酒一盞服之日二每服常令酒氣相續尉癥癖方出聖惠方吳茱茰一升川烏頭三兩右件藥搗碎用醋拌炒令熱分作二包更畨尉之治久積癥癖及元氣急痛方出聖惠方川烏頭二兩泡川椒一兩去目右件藥為末用雞子白和丸如麻子大每服不計時候溫酒下十丸治久積癥癖及心腹鼓脹並宜服此方出聖惠方右用烏牛尿五升於銀器中微火煎如稀餳每服空心以熱酒調下一匙頭服後當腹中鳴轉病出隔日更服防葵丸出聖濟總録治癥癖氣塊脅肋妨滿腹脹腹痛不能飲食防葵銼碎柴胡去苖赤茯苓各三分桂去粗皮木香各半兩鱉甲去裙襴炙黃色檳榔銼各一兩半桔梗炒郁李仁湯浸大黃炒一兩當歸切焙京三稜泡銼五味子各半兩右除研外搗羅為末入郁李仁同研勻錬蜜丸如梧桐子大空腹溫酒下二十丸一方有赤芍藥無赤茯苓鱉甲丸出聖濟總録治癥癖氣塊鱉甲去欄醋炙黃色木香烏頭泡裂去皮柴胡去苗各一兩半當歸切焙京三稜泡銼桂去粗皮厚朴去粗皮陳橘皮各二兩甘草炙銼檳榔銼各半兩大黃銼碎炒朴硝研如粉各三兩右除朴硝搗羅為末同研令勻煉蜜和丸如梧桐子大空心服用溫酒下十丸米飲下亦得大戟丸出聖濟總録治癥癖化氣取食積及本臟氣水痰蟲脹大戟半兩芫花醋炒一兩巴豆一百粒去皮油甘遂乾薑炮陳橘皮去白焙硇砂薑黃桂去粗皮各一分右為末於銀器內炒令極熱勿令焦錬蜜丸梧桐子大常服生薑湯下一丸如取轉量臟腑虛實加減檳榔湯出聖濟總録治癥癖腹滿如鼓坐卧不安食即欲吐氣悶喘急檳榔二兩赤茯苓去黑皮芍藥京三稜陳橘皮湯浸各一兩半郁李仁湯浸退皮一兩食茱茰三分右粗搗篩每服三錢水一盞煎至七分去滓溫服空心午後用柴胡湯出聖濟總録治癥癖氣腹痛脅肋脹滿不思飲食柴胡去苖赤茯苓去黑皮各三分桔梗炒木通炙芍藥鱉甲去裙欄炙黃色郁李仁湯浸各半兩右粗搗篩每服三錢以水一盞煎至七分去滓溫服空腹午後用五食丸治虛積食氣蠱脹水氣年深癥癖大戟刮去皮甘遂各半兩豬牙皂莢生去皮子一兩胡椒一分芫花半兩醋浸一宿炒乾巴豆半兩去皮右為末合研勻水煮麵糊和丸如菉豆大每服五丸用米麵菜肉豆煎湯放溫下量病人大小加至七丸婦人有胎不可服牛膝丸出聖濟總録治癥癖積聚牛膝酒浸芍藥桔梗赤茯苓去黑皮厚朴去粗皮大黃銼炒茈胡去苖訶梨勒各三兩陳橘皮去白檳榔銼各一兩枳殼炒一兩右末錬蜜和丸如梧桐子大每服二十丸空心棗湯下加至三十丸通利為度消癖丸出危氏方治彌年經吐汗下營衛虧損邪氣伏藏脅間結為癥癖腹脅疼痛芫花炒硃砂各等分右為末鍊蜜丸如小豆大每服十丸濃煎棗湯下去癖須用芫花大戟破水之劑下後即與養胃湯治癥癖出本草右用馬莧汁飲之小兒服尤良金寶神丹楊氏家藏方治諸積癖塊血刺心腹下痢赤白及婦人崩中痛下一切虛冷之疾尤治飲食過多臟腑滑泄久積久痢並皆治之青礞石半斤細羅過將消石二兩細研右件滴水圎如小雞頭大候乾再入乾鍋內少火煆火紅收之每有虛冷病服一丸至二三丸空心溫水送下少食壓之久病泄痢加至五七圎或十丸不妨烏金餅子治堅瘕積塊狀如覆杯腹不下食及至婦人血氣刺痛乾漆一兩炒焙出為末沒藥一分硇砂一錢右為細末棗肉和圎如桐子大作餅子每服三餅子男子鹽湯婦人醋湯食後服治癥癖血瘕破血出本草右用馬鞭草作煎如糖酒服治風冷癥癖出本草右用木天苓苖藤切以酒浸服或以釀服大效治癥癖病又治痃癖氣鱉甲訶梨勒皮乾薑右各等分細末為丸空心下三十丸日再服如専治痃癖氣可醋炙鱉甲大黃為末以牛乳一合和一匙可朝朝服之又和琥珀大黃作散酒服二錢少時惡血即下若婦人小腸中血下盡即休服療癖令人肥悅出本草右用理石漬酒服之治老癖能為寒熱者出本草右用蛤蜊煮食之治積塊用山中生小蒜以醋服之甚效癥瘕附論夫癥瘕者皆由寒濕不調飲食不化與臟氣虛冷所生也其病不動者直名為癥若病雖有結瘕而可推移者名為瘕瘕者假也謂虛假也脈動可候其人發語聲嘶浥舌語而不出此人食結在腹其病寒口中常有水出四體灑灑常如發瘧飲食不能常自鬱鬱而痛此食癥病也診其脈沉而中散者寒食癥也脈絃緊而細癥也若在心下則寸口脈絃緊在冒管則關上絃緊在臍下則尺中絃緊診脈癥法左手脈橫癥在左右手脈橫癥在右又脈頭大在上頭小在下脈來遲而牢者為病癥也腎脈小急肝脈小急心脈若數皆為癥寸口脈結而伏者腹中有癥不可轉動必死不治方硇砂丸治血氣癥瘕氣塊黃瘦者肚痛不忍硇砂三錢全蝎二錢丁香二錢蓬术半兩三稜半兩沒藥半兩芫青二錢紅娘子二錢虻蟲二錢水蛭二錢阿魏半兩乾漆四錢炒地膽半兩炒斑蝥二錢炒海馬一對醋炒甘草半兩人參半兩當歸一兩狗脊半兩穿山甲三錢蛤粉麝香少許右為細末醋糊為丸梧子大每服二三十丸空心醋湯送下如意丸治積聚塊痛疝瘕癥癖等疾沉香木香大丁香萆澄茄使君子辣桂川白薑桃仁五靈脂硇砂醋浸半兩雄黃好沒藥大戟牽牛炒取末巴豆去油各一分荆三稜末蓬莪术肉豆蔲各半兩右為末水煮麵糊丸如麻子大每服二丸加至三丸止溫酒下化癥丸治丈夫婦人小兒年深日近沉積瘕塊面色青黃時上搶心吐水吞醋舌生白沫婦人積年月經不調漸成血氣或血蠱塊中焦之間覆如杯碗連年纍月漸至瘦瘠寒熱往來一切脾胃受寒久不痊愈之疾並皆治之巴豆五兩丁皮二兩木香一兩半蓬莪荗三兩荆三稜三兩丁香兩半厚朴三兩石菖蒲二兩良薑一兩半虻蟲一兩半川牛膝一兩石蓮子二兩薏苡仁一兩使君子三兩香附子四兩炒右為末稀麵糊為丸如菉豆大積年癥瘕成塊第一服用熟水下二十丸自後每日三丸更量虛實加減五日去盡積塊日近脾胃有積者每服五丸飯飲吞下婦人血氣成塊及血瘕每服二十丸蘇木用酒童子小便各一半煎五七沸溫酒空心吞下自後每日用溫酒下三丸其血塊逐旋消從大小二便去盡自知小兒蛔蟲腹痛不能忍日夜呌喚橘皮湯下七丸諸蟲皆宣下常服白湯或薑湯下三五丸中酒及酒積大便鮓臭者白湯舊酒各半吞下七丸一切噫塞心下硬痛加棗湯下五丸不拘時候大黃丸治久積癥瘕發動心腹疼痛不可忍大黃二兩雄黃半兩麝香二錢天雄一兩炮硃砂一分胡椒半兩巴豆十四枚檳榔四兩當歸一兩桂心一兩木香半兩京三稜二兩犀角屑一兩乾薑半兩炮右件藥為末入研了藥令勻錬蜜和搗三二百杵丸如小豆大每服空心以酒粥飲下七丸防葵丸治癥瘕喘嗽腹中疼痛喫食減少四肢乏力防葵三分桂心半兩木香半兩桔梗三分吳茱茰半兩鱉甲一兩半川大黃一兩銼京三稜三分當歸半兩赤芍藥三分五味子半兩檳榔一兩半郁李仁一兩湯浸右搗藥為末錬蜜和搗三二百杵丸如梧桐子大每服不計時候以酒下二十丸三聖丸治積年癥癖瘕塊諸藥療理不瘥至效舶上硫黃一兩水銀半兩硇砂一分右三物乳鉢內研如粉却以生鐵銚內用文武火熬鎔成汁以火筋攪令勻停冷刀剗下以紙裹置地坑內埋一宿取出再研細次以赤芍藥當歸京三稜蓬莪荗紅花各一分並細銼以法酒一升煎及一半漉出砂盆內研生布袋取汁再熬令冷入飛羅麵為糊搗丸如菉豆大治因産後傷於飲食結伏在腹脅特發疼痛不可忍者當歸酒浸一升逐旋一升暖每服磨癖塊空心溫酒下三丸至五丸所有藥渣瀝了焙乾為末别入乾地黃半兩真蒲黃芫花各一兩右為末以前一般糊丸如菉豆大治婦人血臟冷氣攻心疼一切血疾溫酒十丸木香丸治癥瘕心腹脹痛胸膈煩悶不欲飲食四肢少力木香三分肉桂三分砒霜一分大戟一分銼京三稜半兩附子半兩焙乾薑半兩炮乾漆半兩搗碎膩粉青橘皮半兩巴豆半兩去皮心右件藥為末入膩