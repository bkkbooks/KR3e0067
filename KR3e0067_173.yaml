獨活各一兩右為末蜜丸如梧桐子大茶酒米湯任下此藥補益通利疏風順氣治癥瘕癖氣痞積聚冷氣血塊宿食吐痰水用青黑大巴豆勿令白膜破但去其殼作兩片清麻油略潤之空心溫水吞下一枚以飲壓少時腹內如火利出惡物雖利不虛人若久服亦不利膜破者不用全而一兩頭尖如棗核者名剛字能殺人治癥瘕積聚去三尸益氣延年却老右雄黃二兩細研為末九度水飛過却入新淨竹筒內盛以蒸餅子一塊塞筒口蒸七度用好粉脂一兩為丸如菉豆大日三服酒下七丸十丸療癥瘕出本草右羊脂同蒜虀食一升良治腹內癥瘕出夲草右取鮀魚甲炙浸酒服之治癥瘕積聚去三尸輕身益氣延年却老百病不侵甚益人出本草右用天門冬不計多少去心皮為末每服方寸匕日三四服以酒飲之不絶治瘕出本草右用藊豆葉和醋煮服之治雞瘕出本草以蘇木一升煮服昔南齊褚澄善醫為吳郡太守百姓李道念以公事到郡澄見謂曰汝有重病答曰舊有冷病至今五年衆醫不瘥澄為診曰汝病非冷非熱當時食白瀹雞子過多所致令取紫蘇一升煮服乃吐一物如斤涎裹之能動開看是雞雛羽翅爪距具足能行走澄曰此未盡更服所餘藥又吐得如向者雞十三頭而病都差當時稱妙一説乃是用蒜煮服之治癥瘕氣塊琥珀一兩鱉甲一兩京三稜一兩延胡索半兩沒藥半兩大黃六銖右六味一處為末空心酒調服三錢每日二服神效莫及治癥瘕腰痛用淡菜先煮熱漉出除去半邊鎖殼及毛將汁澄清再將淡菜半邊殼肉入內却入蘿蔔或紫蘇冬瓜同煮食之妙治癥瘕用魚脂二升盛銅器中作大火炷脂上撚之令暖徹於癥上尉之以紙籍腹上晝夜勿息火良治蛟龍病誤食蛟龍子入腹中堅痞如石用寒食餳三升每服五合一日三服遂吐出蛟龍有兩頭及尾寒食餳即寒食節日餳是也昔開皇六年有人正月食芹得之其病發似癎面色青黃服寒食餳二升日吐出蛟龍有兩頭大驗諸癥積氣在腹中久不瘥牢固推之不移者癥也皆由寒溫失宜飲食不節致臟腑氣虛弱飲食不息按之其壯如杯盤牢結久不已令人身瘦而腹大至死不消診其脈弦而伏其堅不轉動者死之候也方蜥蝪丸治癥堅水腫蜚尸遁尸百注骨血相惡氣鬼忤蠱毒邪氣往來夢寤存亡留隱結積虎狼所嚙猘犬所咋鴆毒入人五臟服藥已消殺其毒食不消婦人邪鬼忤亦能遣之蜥蝪蜈蚣各二枚地膽五十枚蟅蟲虻蟲杏仁各三十枚蜣蜋十四枚朴硝巴豆各一兩欵冬花犀角切片桃奴澤瀉桑赤雞鬼督郵各十八銖芍藥虎骨各兩半甘草乾薑各一兩甘遂一兩右為末别治巴豆杏仁如膏內藥末研調下蜜搗二萬杵丸如麻子先食飲服三丸旦不知加知不敢吐下者一丸有人風冷注癖堅二十年者差乾漆丸出聖濟總録破癥塊消積氣乾漆四兩懷香子炒令香木香檳榔桂去粗皮附子泡青橘皮白牽牛陳橘皮大黃蓬莪荗京三稜芫花各二兩五靈脂取灰二兩皂角長五寸右為末錬蜜和丸如梧桐子大每服生薑湯下二十丸至三十丸忌豬魚熱麵等物半夏礞石丸出聖濟總録治癥塊氣積下結胸一切積滯半夏四十枚巴豆四十粒杏仁去皮豬牙皂莢去皮四十挺礞石研丁香木香沉香各二錢檳榔半兩膩粉硇砂粉霜各一分右將後八味搗研為末入在前膏子內一處再搗約令均丸小豆大看虛實煎棗湯下二丸爛嚼乾柿乾嚼下亦得硇砂丸治癥病不消四肢羸困不欲飲食久不差硇砂一兩硫黃一兩木香半兩檳榔一兩川大黃三兩牽牛子一兩吳茱茰半兩京三稜一兩當歸一兩銼肉桂一兩去皮青橘皮一兩鱉甲一兩右件藥為末入研了藥令勻錬蜜和搗三二百杵丸如梧桐子大每日空心及晚食前以溫酒下三十丸巴豆丸出聖惠方治癥病久不消令人萎黃羸瘦不欲飲食巴豆一兩去皮硫黃細研附子泡五靈脂乾薑丁香木香肉豆䓻檳榔硇砂乾漆已上各半兩右件藥為末入諸藥研令勻以麵糊和丸如黃米大每服空心以酒湯下五丸得下惡物為效大黃丸治癥病心腹妨悶不欲飲食四肢不知川大黃半兩銼木香半兩肉豆蔲半兩硇砂半兩乾薑半兩青橘皮三分湯浸吳茱茰一兩檳榔半兩桂心半兩蓬莪荗一兩巴豆一分去皮右為末入巴豆硇砂研令勻以醋熬成膏和丸如梧桐子大每服空心以粥飲下三丸鱉甲丸治癥塊衝心氣滿食不下手足煩悶鱉甲去裙襴訶梨勒各二兩防葵甘草炙人參大黃各一兩半白术郁李仁去皮桂去粗皮杏仁去皮尖各一兩右除研外搗羅為末入郁李仁杏仁同研勻錬蜜丸如梧桐子大空腹溫酒下二十丸漸加至三十丸以微利為度沒藥丸治癥積五積食氣諸藥無效者沒藥硫黃白丁香當歸芫花浸半日硇砂乳香丹砂各一兩巴豆四十九粒右為末合研勻用水浸炊餅和劑搗一千杵丸梧桐子大豆麻子三等大每一丸婦人血氣童子小便和酒下心頭髙鞕當歸酒下逺癥積氣生薑湯下小兒脾積癥氣臘茶清下大人與大丸十五以下與中等十嵗以下與第三等者取積一塊氣丸治男子婦人氣積牽牛末二兩檳榔末一兩杏仁末一兩羌活末一兩神麴半兩麥蘖半兩雷丸肉半兩江子一兩黃岑一兩右為細末湯浸蒸餅丸如梧桐子大硃砂為衣每服三嵗服三丸五嵗服五丸大人服十丸快利為度臨睡溫水服烏頭丸出聖惠方治食不消結成癥病川烏頭半兩京三稜半兩芫花半兩巴豆半兩去皮硇砂湯化硝石半兩川大黃半兩銼青橘皮半兩湯浸右件藥搗羅為末入巴豆研令勻以酒一升相和以慢火煎如稀餳火住後用丁香一分肉豆蔲半兩搗羅為末硃砂一分細研與前藥同和丸如菉豆大每日早晨以生薑橘皮湯下三丸夜臨卧時服京三稜丸出聖惠方治癥病結鞕心腹疼痛京三稜一兩半檳榔一兩木香一兩乾薑一兩炮陳橘皮一兩桂心半兩當歸一兩銼巴豆半兩右件藥為末用醋熬巴豆成膏入前藥末和丸如梧桐子大每服空心以生薑橘皮湯下五丸當歸煮𣪚治諸癥結痛起於脅下按之而堅妨痛不能飲食漸加羸瘦當歸鱉甲桂皮木香桔梗桃仁研如膏各一兩半吳茱茰半兩右除桃仁外搗羅為末入桃仁同研令勻每服三錢水一盞煎至六分去滓溫服逐日空腹日一服夜半一服保命丸治積年血氣癥塊往來疼痛吐逆不納飲食當歸烏頭芍藥桂各半兩大黃一兩乾薑半兩班蝥二十一枚右為末醋煮麵糊丸梧桐子大空心服食前溫酒下一丸木香𥚹丸治癥塊消食積止心腹疼木香硇砂各一錢半夏十枚桂去粗皮蓽撥四十九粒巴豆二十一粒杏仁二十一粒右為末先將杏仁巴豆同研入泥以好米醋八分一盞熬至二分以下成稠膏入前藥末和勻再入棗肉丸菉豆大揑𥚹丸常服食後良久一丸生薑湯下要轉三丸男子婦人心痛炒菜服醋湯下破積丸療積聚堅癥大黃一斤牡蠣三兩凝水石石膏石鐘乳理石各一兩右搗合下篩如蜜丸如梧桐子大先食酒服飲任下三丸日三不知稍增之以知為度治腹中積癥方出千金方右葶藶子一升炒以酒五升浸七日每服三合日三服粉砂餅出聖濟總録治癥塊輕粉胡粉各一兩硇砂丹砂白丁香膩粉各半兩右研為末入麵一兩水揑作餅如棊子大慢火燒熟每服一餅麝香米飲嚼破服五靈脂丸出聖惠方治癥病腹中結便五靈脂一兩防葵半兩桂心半兩豬牙皂莢半兩木香半兩右件藥為末入巴豆更研令勻用醋煮麵糊和丸如黍米大每服空心臨卧時以生薑酒下三丸木香丸治積年癥塊血氣凝滯吳茱茰木香青橘皮各半兩巴豆去皮十粒硇砂研一分右除硇砂外搗羅為末入巴豆硇砂研令勻於煻火中煨粟米飯丸菉豆大每服溫酒下三丸至五丸食後服溏痢勿怪老小減服硃砂丸治癥病腹中硬痛不欲食經久不差羸弱無力硃砂一兩肉桂一兩巴豆二十枚禹餘糧一兩紫石英一兩細研右件藥都研令勻以湯浸蒸餅和丸如菉豆大每服食前以溫酒下五丸治積年癥塊及血塊方出聖惠方砒霜粉霜各一分硇砂一分半膩粉三分右件藥細研令勻用肥棗去核入藥在棗裏面以綿繫定用白麵餅子逐筒裏燒熟餅子為度取出去棗皮研熟丸如菉豆大每服空心及臨卧時以薑棗湯下三丸治癥病腹中結硬出聖惠方硫黃一兩硇砂一兩巴豆一兩附子一兩泡裂右件藥先用頭醋二升煮巴豆令赤色即出之却入冷水碗中浸兩炊久洗淨去皮心研如粉又以醋二升與巴豆同煎至一升後下硫黃硇砂附子等末以文火熬令稀稠得所别入乾薑末一兩和黍米大每服空心以生薑棗湯下三丸夜臨卧時再服續隨子丸治積聚癥塊及涎積等續隨子三十枚膩粉二錢青黛炒一錢右先研隨子令爛次下二味合研勻細以燒糯米軟飯和丸如雞頭子大每服先燒大棗一枚剝去皮核爛嚼取藥一丸錐破并棗用同冷臘茶清下服後便卧並不攪至中夜後取下積聚惡物為效治癥堅心下有物大如杯不得食食則腹滿心腹絞痛方葶藶子大黃各二兩澤瀉四兩右别研葶藶為膏其二味搗五百杵入蜜更搗千杵和丸如梧桐子大每服五丸不知加之日三服治脅下有氣結者狼毒二兩旋覆花一兩附子二兩泡右搗篩蜜和丸如梧桐子大二丸稍加至三丸服之療癥病丸射菵二兩熬蜀椒三百枚右搗末細篩以雞子白和丸半如麻子大半如赤小豆先服如麻子漸服如小豆二丸不知稍增之以知為度尉癥方竈中黃土一斤生葫一斤右先搗葫熟納土復搗以好苦酒澆冷浥浥先以塗布一面仍㩉病上又塗布上乾復易之取冷消止一方有桂尉癥方右以吳茱茰三升碎之酒和煮熱布裹以尉癥上冷更炒更畨用癥之移走逐尉都消乃止也肘後方云亦可用菵五兩茱茰末以雞子白和塗上癥尉癥法右銅器受二升許貯魚膏令深三二寸作大火炷六七枚燃之令膏暖重紙覆癥上以器尉之盡夜勿息膏盡更益也凡癥堅之起多以漸生而有覺便年大者自難療也腹中微有結積便害飲食轉羸瘦療多用陷水王壺八毒諸大藥令止取小小易得者方右取虎杖根勿令影臨水上者可得石餘淨洗乾之搗作末以秫米五升炊飯內攪之好酒五斤漬封藥消飯浮可飲一斤半勿食他鮓鹽癥當出亦可取其根一斤乾搗千杵酒漬飲之從少起日三亦佳此酒療癥乃勝諸大藥又方大黃半斤朴硝三兩蜜一斤右合於湯上煎可丸如梧桐子大服十丸日三偹急文仲崔氏同惟崔氏用朴硝半斤蜜一斤半服二十丸日再服破癥散治心腹宿癥及卒得癥并治久積癥癖不差漸至羸弱宜服此方右以硃砂細研搜飯令硃多以雄雞一隻先餓二日後以硃飯飼之却置雞於板上收取糞曝燥為末溫清酒服五分七可至方寸匕日三服若病困急者盡夜可五六服一雞少更飼餘雞取足雞末食硃飯先飼令肥治癥積滿腹諸藥不差者人屎服之皆下血片塊二十日即出也椒尉方治患癥結病及瓜病似瓜形日月形或在臍傍左右或在臍上下或若别在左右肋下或當心合子大法先針其足以椒尉之右取新盆子受一斗者鑽一百二十孔上著一重紙上著冷灰上著熱灰半升上著則灰火一升經一食頃盆底熱徹當病上初安氈一重即安火盆火盤大熱以漸更加一重若火更熱不可忍加至三重暫歇進一冷日飲還上火硝二分許即停止經止日勿著令至七日決得稍瘥然後食美食自補若小不瘥作露宿丸服之保安丸治癥積心腹內結如拳漸上不止搶心疼痛久不止及繞臍腹痛不可忍者川大黃三兩乾薑一兩炮大附子半兩鱉甲一兩半右為末取三年米醋一大升先煎四五合然後合藥丸如梧桐子大每服十丸空心或醋或酒米飲下後取疾如魚腸膿血爛肉汁青泥當下京三稜湯治積年癥塊京三稜一兩青橘皮半兩桂去粗皮一兩大黃半兩木香一分檳榔銼半兩右粗搗篩每服五錢七分水一盞半煎至七分去滓溫服空腹日午夜卧各一服治諸瘕結氣出夲草右取赤龍浴水服之枳术湯出衛生寶鑑治心下堅如大盤飲水所作枳實白术各三兩右以水一斗煎至三升分三服腹中軟即消減之對病增損治癥結出本草右用磨石澆赤熱投酒中飲之暴癥附論病源云暴癥者中藏氣虛弱食生冷之物藏既夲弱不能消之結聚成塊卒然而無漸之暴癥也本中藏弱其癥暴生至於成病斃人最速方蜥蝪丸出聖惠方治暴癥堅結四肢瘦軟身無力蜥蝪一枚蜈蚣一枚鬼臼漢防己一兩半當歸二兩半川大黃二兩銼川芒硝赤芍藥二兩右件藥為末錬蜜和搗三二百杵丸如梧桐子大不計時候溫酒下十丸為度野葛丸出千金方治卒暴癥野葛一尺當歸附子雄黃細辛各一兩蜀椒半兩烏頭二兩巴豆右㕮咀以醋浸一宿豬膏一半斤煎附子色黃去滓內雄黃粉攪至凝傅布上以掩癥處復以油重布上復著紙重以尉斗盛火著其上常令熱日三夜二豬膏乾為度巴豆丸出聖惠方治暴癥氣攻心腹脹痛不欲飲食巴豆一分去皮心川大黃半兩銼乾薑半兩炮木香半兩蓬莪荗半兩右件藥為末入巴豆同研令勻錬蜜和丸搗三二百杵丸如小豆大每服空心以生薑湯下五丸治卒暴癥腹中有物如石痛如刀刺晝夜啼呼宜服此方出聖惠方右牛膝三斤去苗銼以酒一斗漬蜜封於熱灰中燒令味出每於食前量力頻服以差為度便吐去宿食神效又方出聖惠方右用商陸根不限多少銼搗蒸之以新綿裹尉病上冷即換之以衣物覆其上數日用旦夕勿息又方出聖惠方右蒴藋根二箇細銼以酒一斗浸三五日每於食前暖一小盞服之治卒暴癥腹中有物出聖惠方右以五月五日蒜十片去皮桂一尺二寸竈中黃土如鴨子一枚合搗以苦酒和塗以布㩉病不過三次又方出肘後方右取橉木燒為灰淋取汁八升以釀一斛米酒成服之從半合始不知稍稍增至二升不盡一劑皆愈此灰入染綘用葉中釀酒也又方出聖惠方右以蠶沙一年桑柴燒灰一斗以水淋之五度取生鱉長一尺者內中煮之爛熟去骨細擘銼更煎令可丸丸如梧桐子大一服七丸日三食前以溫酒下又方出肘後方右以大豬心一枚破頭去血搗末雄黃麝香當門子五枚巴豆百枚去心皮生用心縫以好酒於小銅器中煎之看心沒欲歇隨益盡三升當糜爛煎令可丸如麻子服三丸日三服酒盡不糜者出搗蜜丸之良久大黃末半斤朴硝三兩蜜一斤合於湯上煎丸如梧子服十丸日三服之治卒暴癥腹中有物硬如石痛刺晝夜若不治之百日內死方見本門主暴癥用虎杖根酒漬服之食癥附論夫脾胃虛弱飲食類傷積久不去結在腹內與正氣交爭則心復鞭痛妨害飲食肢體消瘦以手按之積塊有形謂之食癥方木香𣪚治食癥冷氣及傷寒後一切氣疾食物不消木香檳榔青橘皮肉豆蔲食茱茰紅豆蔲乾薑白术葛根草豆蔲虎杖麻黃厚朴桔梗桂去粗皮羌活人參芎藭已上各等分右為細末每服三錢空心炒薑鹽湯調下京三稜丸治食癥癖氣食勞宿食不消痰逆京三稜半兩乳香半兩木香半兩丁香半兩肉豆蔲半兩當歸半兩紫苑一兩五靈脂半兩青橘皮半兩乾薑一兩炮附子一兩炮硃砂半分硇砂一兩巴豆一兩半去皮豬牙莢一兩鱉甲二兩右件藥以乳香巴豆同搗如泥餘藥搗羅為末先以釅醋一斤化硇砂去石滓熬令稠入麵煮為糊和諸藥末令軟硬得所搗三五百杵丸如菉豆大每服以溫酒下三丸至五丸化積丸治食癥積氣成塊胸膈痞悶腹脅脹滿宿食不消心腹疼痛不能飲食一名五積丸硇砂芫花巴豆各半兩乾漆一兩烏頭豬牙皂莢去尖各三分大黃一兩鱉甲青橘皮京三稜當歸陳麴炒各一兩木香桂去粗皮各三分右十四味搗羅八味用前藥和丸如菉豆大每服二丸至三丸茶酒任下如取積量虛實加減三稜丸治食癥勞氣五積五隔脾胃久冷喫食無味飲食不化四肢少力痰毒氣脹胸膈不利京三稜石三稜雞瓜三稜黑三稜各煨銼巴豆乾薑蓬莪茂附子泡各一兩丁香木香桂檳榔青橘皮肉豆蔲各半兩右為末每稱一兩末别用巴豆七枚去皮心膜出油細研拌勻更用硇砂一分醋化煮麵糊和丸如麻子大丹砂為衣每服三丸至五丸生薑湯下黑金丸治食癥瘕癖聚血結刺痛一切疾沉香附子各半兩木香乾薑青橘皮炒細墨炒桂去粗皮京三稜蓬莪荗各一分大黃乾漆麝香各半兩硇砂研一兩右為末將京三稜蓬莪荗大黃硇砂四味用米醋煮爛研作糊入衆藥末和丸如梧桐子大每服十丸至十五丸薑鹽湯下不拘時丁香丸治食癥氣堅腹中疼痛方見久積類木香丸三稜丸治逺年食癥積氣并酒食所傷胸膈脹滿及婦人血塊木香京三稜補骨脂牽牛子丁香皮乾漆各一兩烏梅肉陳橘皮五靈脂末各二兩沉香半兩巴豆霜一分右搗羅九味為末入二味膏子和丸如菉豆大每服五丸至七丸食後臨卧生薑湯下檳榔丸治食癥氣檳榔木香郁李仁茈胡大黃枳殼桂訶梨勒草豆蔲乾薑右搗羅九味為末入郁李仁同研令勻錬蜜和丸如梧桐子大每服十五丸空心溫酒下日晚再服穿山甲丸治食癥破結塊取積年食及積惡血氣並宜服此穿山甲乾薑硇砂一分半夏一分葳靈仙半兩班蝥一分肉桂一分川烏頭芫花巴豆右件藥為末入巴豆硇砂令勻用糯米飯和丸如豆大每服食前煎橘皮湯放冷下三丸硇砂丸治食癥結塊疼痛發渴化氣消酒食硇砂乾漆各一分木香蓬莪荗丁香京三稜青橘皮芫花各半兩肉豆蔲五枚巴豆一分半右將米醋一碗浸蓬莪荗芫花三稜一宿後焙乾與五味同搗羅為末入硇砂巴豆拌勻醋煮麵糊和丸如麻子大每服三二丸如要取轉看虛實加減生薑湯下婦人血氣醋湯下小兒疳氣甘草湯下男子膈氣龍瑙湯下㵼痢甘薑湯下澤漆丸出聖惠方治食癥癖氣脾胃虛弱頭面四肢浮腫欲變成水病者澤漆半兩檳榔一兩附子一兩木香半兩肉桂半兩陳橘皮半兩湯浸澤瀉半兩川大黃半兩郁李仁半兩厚朴半兩去粗皮右件藥搗羅為末錬蜜和搗三二百杵丸如梧桐子大每服以溫水下二十丸日三四服麥蘖丸出聖濟總録治食癥咽酸吐津胸膈疼痛氣噎食飲進退麥蘖炒陳麴炒厚朴檳榔紫苑鱉甲當歸大黃各半兩右粗搗篩每服五錢用水一盞半煎至七分去滓溫服空心午時臨卧各一服八靈丸治食癥氣塊痃癖等疾京三稜石三稜雞爪大連木香檳榔各一兩肉豆蔲半兩巴豆硇砂研各一分右搗羅六味為末入巴豆霜硇砂末拌勻醋煮麵糊和丸如小豆大每服五七丸男子生薑湯下婦人醋湯下痃癖氣煎木香湯下硇砂丸出聖惠方治食癥及氣塊攻刺心腹疼痛不可忍硇砂半兩巴豆半兩乾薑一兩附子一兩炮青橘皮一兩湯浸京三稜一兩乾漆一兩香墨半錠右件藥各别搗細羅為散內取硇砂巴豆細研用頭醋兩碗煎為膏然後總入諸藥末相和丸如菉豆大每服食前以溫酒下三丸通靈丸出聖惠方治食癥及惡血氣五靈脂一兩巴豆一兩硫黃一兩杏仁一兩川烏頭一兩芫花半兩皂莢一兩自然銅一兩右件藥搗為末入巴豆研令勻别入生薑黑豆麵二兩拌和令勻滴水為丸如菉豆大每服以生薑湯下二丸膈上有涎即吐有滯食血氣即轉下礞石丸出聖惠方治食癥久不消礞石半兩硇砂半兩乾漆一兩附子一兩泡京三稜一兩青橘皮一兩香墨半挺巴豆一兩去皮右件為末以頭醋三升化硇砂研巴豆大銀鍋子內微火煎成膏入諸藥末和丸如菉豆大每服三丸宿食不消茶下婦人血癥當歸酒下心痛橘皮生薑湯下治食癥心腹疼痛脹滿面色萎黃不下食宜服此方出聖惠方巴豆半兩京三稜二兩乾漆半兩川大黃半兩青橘皮一兩附子半兩泡硇砂一分香墨半兩右件藥搗羅都細研為末以醋煮麵糊和丸如梧桐子大每服食前以醋湯下五丸當下惡物即差如聖散治男子婦人飲食所傷結成積塊痞痛陳皮乾薑各三錢巴豆一錢甘草一錢半三稜莪术芫花三味各半右為末和勻餘醋煮糊為丸如菉豆大每服六七丸淡薑湯下木香丸出聖惠方治食癥及喫食不著木香一兩桂心一兩五靈脂一兩乾薑一兩泡乾墨一兩豬牙皂莢一兩去黑皮巴豆半兩去皮心右研為末入巴豆研勻用軟糯米飲和丸如菉豆大每服食前以生薑橘皮湯下五丸治年積食癥方出聖惠方青礞石一兩硇砂半兩芫花半兩木香一分丁香一分巴豆三十枚去皮川大黃三兩銼右件為末入諸藥同研令勻以頭醋二升熬藥令稠可丸即如菉豆每服食前以生薑湯下三丸治食癥結塊在腹內不能飲食面色萎黃宜服此方出聖惠方硇砂半兩芫花一兩麥蘖半兩炒青橘皮半兩豬牙皂莢五挺巴豆半兩去皮右件為末入巴豆都研令勻先將皂莢汁於鍋子內慢火煎成膏然後取藥末一半更入米醋一大盞同煎令稀稠得所其餘藥為末丸如梧子大每服以生薑橘皮湯下三丸萬金丸出聖惠總録治食癥氣聚不消檳榔肉豆蔲青橘皮乾薑木香各一兩巴豆去皮心五十粒右搗羅五味為末入巴豆同研令勻浸鹽豉和丸如梧桐子大每服一二丸煎生薑橘皮湯下良久以粥飲投之以利為度麝香丸出聖惠方治積年食癥麝香一分硇砂半兩川大黃半兩神麯一兩巴豆三十粒寒食白麵一兩生用右件為末入研了藥令勻用易州墨汁和丸如梧子大如是十年至十五年食癥即先嚼乾柿半枚裹藥一丸同咽之如尋常食癥即丸如豌豆大茶酒任下一丸治卒食不消欲成癥積方出千金方右用煎艾汁如飴取半升作一服便盡吐出宿食一方用艾五尺圍一束苡薏根一大把二味同煎治雜食瘀滯不消心腹堅痛方出千金方右用水三升煮白鹽一升令消分三服吐去所食并治暴癥巴豆丸出聖惠方治積年食癥巴豆十枚陳橘一兩川大黃三錢硇砂一錢神麴三錢芫花二錢右件藥為末入巴豆等同令研勻磨香墨濃汁和搗令勻丸如梧桐子大每臨卧時用乾柿一枚分為三分爛嚼破裹藥一丸咽之如此服三丸後喫湯飲下之至明當利下宿食隔日再服取差為度五通丸出聖濟總録治食癥氣乾薑炮二兩巴豆米半分陳橘皮黃連白术各一分白皮煎湯下或鹽湯下婦人醋湯下進食方出儒門川牛一兩巴豆三箇右為末水丸每服二三十丸食後隨所傷物送下療凡所食不消方方見本門療食癥病取生蔥食之瘥昔有人每食飲七升并羊脂餅不論數因道中過飢食生蔥須臾吐出一蟲薄而圓繞畔有口試以食投之立消盡自吐此物後其人病便愈此名食癥無疑人有思肉不已食訖復思者為肉癥治之方出千金方右空腹飲白馬尿三升吐出肉不出必死治蠱食癥方出聖惠方右緑礬二兩搗研如粉以米醋一大碗於瓷器內煎之用栁木篾攪成膏入赤烏腳一兩細研和丸如菉豆大每服空心溫酒下五丸治食癥方出聖惠方右以青州棗三枚去核每箇入膩粉一錢以白麵裹燒熟即去麵空心以棗爛嚼咽水下之即瀉下癥塊白銀透羅丹治積塊食積大便不行疼痛難忍寒食麵七錢巴豆三錢天南星半夏各一錢半右為末滴水為丸搯作餅子如桐子大每服七丸食後熬煮二服冷漿淘過冷水送下忌熱物等積氣丸治積年食氣癥塊消酒食利噎塞木香半兩乾薑炮一兩硇砂半兩巴豆半兩川大黃一兩附子一兩官桂半兩筒子漆一兩荆三稜一兩蓬莪荗一兩芫花半兩青橘半兩細墨半兩檳榔半兩大戟半兩肉豆蔲五箇右一十六味先將荆三稜大黃二味為末研巴豆令細入醋一升半煎此二味至半碗許入硇砂又同研入醋麵一匙成膏加諸藥末合和得所再入臼杵三五百下丸如菉豆大每服五丸如食癥氣用生薑橘皮湯下本臟氣茴香湯下赤白痢二宜湯下婦人血氣當歸酒下常服任下普濟方卷一百七十三
