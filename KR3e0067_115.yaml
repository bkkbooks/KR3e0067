body:
  text: 普濟方卷一百十六明周王朱橚撰諸風門諸風雜治菊花煎出聖惠方治一切風其效如神甘菊花蒸濕搗如膏枸杞子搗爛神麯炒微黃搗末各二斤生地黃四斤研爛肉蓯蓉半斤刮去皺皮炙令乾搗末桂心半斤搗末右以無灰酒三斗與前藥拌勻入磁甕盛之上以磁碗蓋定用紙筋鹽泥固濟待乾入馬糞中埋四十九日即得停一年至十年其色轉黑其味芳香每服以暖酒調下一茶匙日三服牛蒡子浸酒方治一切風牛蒡子牛膝去苖生地黃枸杞子乾桑椹大麻子已上各半斤右細銼用生絹袋盛以無灰酒三斗浸之春夏七日秋冬十日每飲一小盞使酒氣相續日三五度飲之忌生冷毒滑動風物防風丸出十便良方治一切風及痰熱上攻頭痛惡心項背拘急頭目眩睴心怔煩悶手足無力骨節疼痛言語蹇澀口眼瞤動神思恍惚痰涎壅塞昏憒健忘虛煩少睡防風洗川芎洗天麻去苗酒浸一宿甘草灸各二兩硃砂研末半兩右為末煉蜜為丸每兩作十丸以硃砂為衣每服一丸荆芥湯化服茶酒嚼下亦得不計時候白龍丸治男子婦人一切風遍身瘡癬手足頑麻偏正頭疼鼻塞腦悶大解傷寒治頭風藁本去土細辛白芷川芎甘草右為細末各等分用藥四兩入石膏末一斤係煆過者水搜為丸每兩八粒薄荷茶嚼下每服一粒食後服風蟲牙痛一粒分作三服乾揩後用鹽湯嗽之更用蔥茶嚼下治風疥癬及癩浮萍一兩荆芥川芎甘草麻黃各半兩右為粗末每服一兩水一碗入蔥白根豆豉同煎至一半無時服汗出為度一方或加芍藥當歸天麻煎治風毒入骨及心腎經絡攻注百節疼痛頭目虛腫痰涎不利下注腰腳緩弱生瘡婦人血風男子癩風及風濕腳氣攻疰及皮膚瘙癢癮疹偏正頭風川烏頭洗淨灰炒製去皮尖草烏頭水浸三日洗去皮各四兩荆芥穗半斤乾薄荷五兩杜當歸水浸三日晒乾一斤切右為末醋糊丸如桐子大茶清下三十丸是齋回陽湯治風中氣手足癱緩口眼喎斜言語蹇澀川芎益智附子一箇七八錢重者生用切片乾薑一兩青皮半兩右㕮咀每服半兩水二盞薑十片棗一箇煎去滓入鹽少許空心溫服七寶丹治三十六種風火風為最眉毛脫落鼻梁崩倒四肢頑麻遍身生癳不問逺年近日此藥溫和不動元氣並皆治之大風子五斤去殼南木香沉香各四兩當歸五錢防風五錢先以大風肉碾爛為泥别藥為末和合用陳米飲為丸又將木香沉香白芷蒼耳為細末丸如梧桐子大隂乾服之治鼻內出涎方玄胡索炮黃者半夏川烏頭各三錢如無草亦得赤小豆錢半麝香真者少許右為細末用麵為餅如錢大遇疾人鼻塞氣不通用藥二餅湯溫泡開仰面噙水一口將藥灌入鼻內稍停吐出口中水其風涎即出如此三上次鼻氣通流一如平日病人鼻不塞不可以此藥嚾之柳葉煎治一切風不問逺近柳葉半斤細銼如無葉枝亦得荆芥半斤細銼已上二味以水五升煮二升去滓澄清白蜜五合竹瀝五合相和以新磁器盛用油單子蓋緊置釜中以重湯者勿令水入從五更初煮至日出後即住每服一小盞日三服碧霞丹出和劑方治卒中急風眩運僵仆痰涎壅塞心神迷悶牙關急緊目睛上視不轉及五種癎病涎潮搐搦石緑研九度飛十兩附子尖蝎稍烏頭尖各七十箇右將為末入石緑令勻麵糊為丸如雞頭大每服急用薄荷汁半盞化下一丸更入酒半合溫暖服之須更吐出痰涎然後隨證治之如牙關緊急斡開灌之立效驗青州白丸子一名白丸子治男子婦人手足癱瘓風痰盛嘔吐涎沫半身不遂頑麻口眼喎斜痰涎壅塞一切風他藥所不能療者小兒驚風大人頭風洗頭風婦人血風治一切風涎為患及中風偏廢之疾常服悉有功效咳嗽疾實咽喉聲作老人小兒皆宜服之半夏白者淸水浸洗過七兩生用川烏頭去皮臍生用半兩南星生用三兩白附子生用二兩右為細末以生絹袋盛用井花水擺未出者更以手揉令出如有滓更研再入絹袋擺盡為度放磁盆中日晒夜露至曉棄水别用井花水攪又晒至來日早再換新水攪如此春五日夏三日秋七日冬十日去水曬乾候如玉片碎研以糯米粉煎粥清為丸如菉豆大初服至五丸加至十丸生薑湯下不計時候如癱瘓風溫酒下二十丸日三服至二日後浴當有汗便能舒展服經三五日呵欠是應常服十粒以來永無風痰隔壅之患小兒驚風薄荷湯下兩三丸一方治酒家痰壅腫項白丸子二錢研末白豆蔲縮砂仁煎湯調下吐痰立愈自後二陳湯加荆芥服一方硃砂為衣大有效嚼蘇合香丸為尤妙藥此太平興國間聖製方彼時太宗以黃榜召天下方士一醫家進此方諸藥即前所開其製法以水浸經日太宗亦如此浸洗但藥力被浸出全無功余家治病修合只如此方修製服之極有效百全丸出御藥院方治流行經絡開發鬱滯何首烏雌雄各六兩半天南星二兩半生用薑二兩半製白附子炮製二兩半黃丹炒三兩入麵內打糊右除黃丹外為末用白麵二兩半醋調黃丹為糊和有色為度丸如梧桐子大每服六七十丸食後生薑湯下溫酒亦可通頂散出儒門事親方治諸風疾石膏川芎苽蒂各等分藜蘆少許右為細末鼻孔內嗅之三黃湯出千金方治中風手足拘攣百節疼痛煩熱心亂惡寒不欲飲食兼治賊風猥腳風半身不遂失瘖不語麻黃湯炮一分去節黃耆半兩黃芩三兩炙獨活一兩右銼散每服四錢水一盞半煎七分去滓不拘時服取汗為效心熱加大黃半兩脹滿加枳實一分氣逆加人參三分心悸加牡蠣三分渴加栝蔞根寒加附子一枝炮熱入一方有細辛四寶丹治男子一切風疾金毛狗脊鹽泥固濟火煆紅去毛用肉出火氣萆薢蘇木節川烏頭生用右各等分為細末米醋糊為丸如梧桐子大每服二十丸溫酒或鹽湯下病在上食後病在下空心服皂角丸治一切風及癱瘓口眼喎斜出本事方薄荷三兩皂角三莖刮去黑皮并子一莖酒浸一莖燒灰存性一莖燒黃黑牽牛三兩何首烏十二兩右將皂角為末入水須恰好熬成膏却入後三味搗一二千杵為丸如梧桐子大酒茶任意下不拘時每服二三十丸洗風及治筋骨攣急秫米一石麴三斤茵陳蒿一斤右炙令黃一依釀酒法服之牛蒡酒療一切風久至十年二十年不差者牛蒡根細切一升一方用子生地黃細切牛膝細切枸杞子微碎各三升右取無灰酒三升漬藥以踈絹袋盛之春夏七日秋冬十日每服皆須空心服仍須稍稍令有酒色釀酒法治諸風糯米一斗麴一升半防風半斤切蒼耳子三升右以水八升煎至六升入米麴一時拌於磁器中盛暖著一周時即熱若須重釀任情覺冷加五味子一升百靈藤煎治一切風用百靈藤五斤細切以水三斗慢火煎至五升去滓别於淨鍋中慢火煎成膏以磁器密盛每服以溫酒調下一茶匙日三服不老丹治一切風常服烏髭駐顔明目延年蒼术米泔浸軟竹刀刮去皮切作片子一斤用花椒三兩炒黃去花椒一斤用鹽三兩炒去鹽一斤用好釀酒一斤煮令汁盡再用好醋一斤煮令汁盡何首烏米泔浸竹刀刮去皮切作片子用瓦甑蒸先鋪黑豆三升乾棗二升上放何首烏更鋪棗二升黑豆三升用冷草覆著上用盆合定俟其黑豆棗香熟却然後取出豆棗不用地骨皮各一斤右於石臼內搗為細末後以椹汁搜和如軟麵劑相似磁盆內按平上更用椹汁藥上髙三指用紗綿帛覆護之晝取太陽夜取太隂候乾再搗羅為細末煉蜜為丸如梧桐子大空心溫酒下六十丸忌五辛之物三陪湯治風消痰理手足戰掉去諸風立效一名小省風湯方見風癱瘓類仙桃丸治男子婦人手足麻痺時發疼痛腰膝氣閉作痛不止或冷如拖氷血氣不運打撲閃肭痛不可忍及癱瘓等疾生川烏三兩不去皮臍五靈脂四兩葳靈仙五兩右各洗焙同研為末以醋糊丸如梧桐子大每服七粒加至十粒鹽湯吞下婦人當歸醋湯下空心服病甚者加至十五粒忌茶此藥豫家常用其效如神雄黃救命丹治中風卒然倒仆牙關緊急不省人事并胸膈壅熱痰涎不利咽喉腫閉一切熱毒一名解毒雄黃丸川鬱金二錢雄黃三錢巴豆四十粒出油研右為細末醋糊為丸如菉豆大每服三丸如神茶清下治病如纒喉風走馬風喉閉卒中仆地失音以致牙關緊急不知人事每服七丸熱茶下甚者不過二服吐出涎立蘇有至死者但心頭暖用鐡物拗開口灌之藥到咽喉無不活者或吐或㵼些小不妨或上膈壅腫並宜服之小兒驚風量大小加減與之一方用蜜為丸荆芥湯下若病當發煎槐膠薄荷酒調下小兒以荆芥湯下勿令乳食太飽一方麵糊或水為丸治老風及宿血以桑葉細銼大釡中煎取赤溏服燒竹瀝法出危氏方取新竹截尺許長用兩磚對立相去八寸置竹在上每截破作二片仰安磚上急著火磚上兩頭各置碗以盛瀝盡以絹袋濾澄清夏秋須沉冷水中防瀝酸大熱有風人亦可單服冷熱隨人勿過度神效烏頭煎出聖惠方治一切風生烏頭五斤以河水浸三日不住換水黑豆一斗淘淨生薑半斤右細銼以水一石煎取三斗去滓以生絹濾過復煎如稀餳以新磁瓶盛每日空心以溫酒調下半茶匙至半月未瘥添至一茶匙此外不可多服藥瓶常令近火如人體暖百靈藤釀酒方出聖惠方治風百靈藤十斤水一石煎取三斗神麴九兩微炒黃色搗末糯米三斗炊作飯右候飯冷即搗神麴末入飯中并藥汁同入於甕中一如醖酒法經三五日看沫盡即更炊一斗糯米飯候冷投入甕中即熟澄清更三日後每服不計早晚溫飲一小盞服後覺渾身汗出為效啇陸酒出千金方治大風眉鬚落赤白癩病八風十二痺筋急肢節緩弱飛尸遁注水腫癱瘓疥癬惡瘡腳攣手折眼誾洞泄痰飲宿澼寒冷方麴二十五斤啇陸根二十五斤銅刀切之右合於甕中水一斛漬之炊黍米一石釀如家法使麴米相淹三酘畢密封三七日開視麴酒浮熱澄清溫服三升輕者二升服後吐下為住宜食粥飲牛羊鹿肉美禁生冷醋滑及豬犬馬魚等物烏荆丸出和劑方治諸風緩縱手足不隨口眼喎斜言語蹇澀眉目瞤動頭昏腦悶筋拘攣不得屈伸遍身麻痺百節疼痛皮膚瘙癢血氣不順癮疹抓成瘡瘍又治婦人血風渾身痛癢頭疼眼暈及腸風臟毒下血不止服之尤效久服令人顔色和悅力強輕健髮不白川烏炮去皮臍一兩荆芥穗二兩右為細末醋糊丸如梧桐子大每服二十丸酒或熱水下有疾空心時日三四服無疾早辰一服少府郭監丞少病風寒搐頥頷寬嚲不收手承頷然後能食服此六七服即差長服之已五十餘年年七十餘強健鬚髮無白者此藥療腸風下血尤妙屢有人得效下血人服此而差者一嵗之內數人如諸瘡宜以油拌藥作膏塗二味苦參丸出和劑方治心肺積熱腎臟風毒攻於皮膚時生疥癩瘙癢難忍時出黃水及手足大風爛壞眉毛脫落一切風疾並皆治之方見本門大風癩病類芎藭天麻丸出御藥院方清利頭目消風化痰寬胸利膈心忪煩悶旋運欲倒頸緊急肩背拘倦神昏多睡肢煩疼皮膚瘙癢偏正頭疼鼻塞聲重面目浮腫並宜服之芎藭二兩天麻半兩右為細末煉蜜為丸每一兩半作二十丸每服一丸食後細嚼茶酒任下枸杞菖蒲酒治緩弱風四肢不遂行步不正口急及四體不得屈伸方見本門四肢拘攣不得屈伸類婆蒿根酒出治指方治風淫濕滯手足不舉筋節攣疼先與通關用全蝎七箇新瓦上微炒研末麝香右用酒三盞空心調作一服如覺已透則止未透次日再作一劑然病未盡除自後專以婆蒿根洗淨切碎酒煎日二服神效中丹出楊氏家藏方治中風癱瘓元氣不足一切危弱之疾補虛損滋榮衛砒好盆盛砒四兩分作十塊洗以出山鉛八兩乾鍋子熔成沙用鐵箝逐塊鈕砒搽入鉛汁中候盡化以杖攪極勻取出鍋子砒候人子破自然分開去鉛不用砒如琥珀色辰砂四兩右研勻砂合子固濟石灰池中淹七日七夜候泠開合取藥再研勻桑柴活火銚中成汁直候砒煙去盡候冷取藥細研稀糯米粥和丸豆大每服一粒空心溫酒鹽湯任下臨卧時將一粒入大大燒各候冷服凡老人身體倦怠飲酒不進服數粒便覺氣壯食美百病皆愈馬齒膏治三十六種風及患濕癬白秃燒灰傅之亦良服之延年長壽眀目馬齒一石水二石以一釡煮之澄清用蠟三兩右煎成膏亦治疳痢一切風又可細研切煮粥治痢及腹痛用蒼耳子和巨勝即胡麻子為散酒調服豆淋酒法出危氏方治一切風用黑豆半升揀洗令淨炒令煙出以無灰酒三升浸一晝夜去豆取酒用之亦可常服汗出即瘥甚佳蒼耳散出千金方治諸風以五月五日午時乾地刈取蒼耳葉洗曝燥搗下篩酒若將服一方寸匕日三作散若吐逆可蜜和為丸服十丸凖前服一方寸匕散也風輕易治者日一服若身體有風者皆作粟肌出或如麻豆粒此為風毒出也可以鈹針刺潰去之皆黃汁出盡乃止五月五日多取隂乾之著大甕中稍取用之此草殺惡若欲看病慮染者便服之令人無所畏若時氣不和舉家服之若病胃脹滿心悶發熱即服之并殺三蟲腸痔能進食一周年服之佳七月七日丸皆可採用一方用子炒令香搗去刺使腹破浸酒服能去風補一方取嫩葉一石切搗和五升麥麴團作塊放於蒿艾中盛二十日更用熱湯盡日頻洗朝塗若唾若治鴉臭藥自塗身上內外塗之當自平愈孩子不肯服令母含藥灌之痔疾祕澀氣痢絞結並治之葳靈仙一味洗焙不拘多少為細末用好酒和令微溫入竹筒內牢塞其口九蒸九曝如乾漆酒浸晒洗之以白米飯和丸如梧桐子大每服二十丸至三十丸或湯或灑任隨下之或用白蜜和丸一方以冬月丙子戊巳日採葳靈仙隂乾一月餘搗篩溫清酒和二錢空心服之如人本怪殺藥可加六七錢利過兩行則減之病除乃停服其性甚喜不觸諸藥但惡茶及麵湯以甘草梔子代飲可也一方生用煉蜜和丸服即愈四仙丹出儒門事親方治一切風常服烏髭駐顔眀目延年春甲子採杞葉夏丙丁採花秋庚辛採子冬壬癸採根皮為細末以桑椹汁為丸每服至五十丸茶清酒任下去風丹一名紫萍粒丹治癱風緩風大風一切諸風仍治腳氣并攧撲傷損及破傷風服過百粒即為全人尤能出汗世傳東京開河掘得石碑梵書天篆無人曉有林靈素者逐字辨解乃是治中風方出瑞竹堂方天生靈草無根幹不在山間不在岸始因飛絮逐東風泛梗青青飄水面神仙一味去沉疴採時須是七月半不論癱風與大風鐡幞頭上也出汗右以紫色萍浮者為上攤於竹篦上下著火盆曝方得乾碾為細末煉蜜為丸如彈子大每服一粒以豆淋酒化下空心食前纍經效驗虎骨酒治諸風緩弱及歷節風骨節酸疼方見風身體疼痛類五癎膏治諸風取痰如神用好肥皂角半斤去皮弦取淨用蜜四兩塗於皂角上用慢火炙透捶碎以熱水浸一時辰洗手淨搓成汁漉出滓慢火熬用成膏子為度攪令入麝香少許又攪勻攤夾綿紙上晒乾剪作四方紙花每用二三片入溫淡漿水約一小盞浸之須臾洗淋下藥汁用細蘆筒灌病人鼻中隨時痰涎流出待痰涎盡喫芝麻餅子一枚灌藥緩細嚾之令病人仰卧於床邉側身出痰快便也涎盡即愈立效治骨頭中一切風以驢毛一斤炒令黃投一斗酒中漬三日空心細細飲使醉大覆卧取汗明日更依前服忌陳倉米麵狸骨肉方治一切諸風并遊風等疾以狸頭灰酒服之治諸風及惡瘡瘙疥癢以半天河溫取洗瘡半天河在槐樹間者南燭煎出聖惠方治一切風疾等病服久能令人輕身明目延年黑髭駐顔用南燭樹春夏取枝葉秋冬取根皮揀擇細銼五斤水五斗慢火煎取二斗去滓别於淨鍋中慢火稀餳以磁瓶盛酒溫下一茶匙日三服之妙一名南燭木鱓魚方補五臟逐十二經風邪患氣人作常服用鱓魚煮熟空腹飽食更以衣蓋或少項當汗出如白膠汗從腰腳中出候汗盡暖五木湯浴須忌風一日更四日一服並治中風風濕五木者楮槐榆栁桑木治之治大風癱癎頭風濕痺毒在骨體以蒼耳三月以後七月以前刈晒乾為散夏水服日三服冬酒服日二服若丸服二十丸散服一二七服滿百日病當出如㾸疥或癢汗出或班駁干錯皮起後及皮落肌如凝脂令人好睡亦治瘈狗咬諸毒螫殺疳溫𧈟久服益氣耳目聰明輕身強志腰膝中風並宜服之忌豬肉米泔酒治偏風及一切風出肘後方用桑枝米泔水浸今年新嫩者銼一大升以水一大斗煎取二大升每日空心服一盞夏月恐壞汁即沉井日細取服服盡又煎服常服終身不患偏風若預防風能服一大升佳治六十二種風兼腹內血氣刺痛用紅花一大兩分為四分每服一大盞煎一半頓服不止再服天門冬酒出千金方治五臟六腑大風洞虛五勞七傷癥結滯氣冷熱諸風癩癎惡疾耳聾頭風四肢拘攣猥退歷節風萬病皆主之久服延年輕身齒落更生髮白再黑天門冬汁一斗漬麴二升令發以米二斗凖家法釀之春夏極冷下飯秋冬溫如人肌酒熱取清一盞常令酒氣接勿至醉吐慎生冷酸滑豬魚蒜特忌鯉魚亦忌油膩此是一斗汁法餘一石二石亦準此以為大率服藥十日覺身體大癢三十日乃漸止此是風氣出去故也四十日即覺心豁然大快似有所得五十日更覺大快當風坐卧覺風不著人諸風身中悉盡用米法洗淨淘米暴炕令乾臨欲用時更别取天門冬汁漬米灑炊之餘汁拌飲取天門冬汁法淨洗天門冬灑乾去水切之搗壓取汁三四遍令滓乾如草乃止此酒初熟味酸仍作臭泔醒氣但作式服之久停則香美餘酒不及封四七佳凡八月九月即少少合至十月合擬到來年五月三十日以來相續服之春三月亦得合服酒時若得散更得力倍散方如左法以天門冬去心皮曝乾搗作末以上件酒服方寸匕日三服至妙久服長生凡酒亦得服紫苑丸治一切風疾有孕不可服又治小兒癎病大癲狂亦治三十般疼痛及療腹內久患疾著床不起丁香廣木香藿香當歸人參白茯苓官桂白术大黃桔梗蓯蓉酒浸柴胡黃連防風陳皮車前子吳茱萸厚朴薑製檳榔砂仁石菖蒲蓬莪术川烏炮黃耆防己熟地黃天門冬肉豆䓻鱉蓋羌活紫苑川椒巴豆去油皂角去皮弦炒黃乾薑炮製已上各等五錢重右為細末煉蜜為丸搗千下油紙裹旋丸如梧桐子大每服五丸以利為度如不飲酒米飯湯下痛不止日再服小兒二三丸者看虛實若痔漏風邪酒送下有白痢訶子湯送下墜胎傷血溫酒送下中毒燒灰甘草湯送下一切風萆麻湯送下寸白等蟲檳榔湯送下霍亂吐㵼乾薑湯送下宿食不消煨薑湯送下隂毒熱酒送下吐逆生薑湯送下咳嗽杏仁湯送下㵼痢黃連湯送下頭痛熱湯送下膿痢米飯湯送下腹痛豆淋酒送下食微氣麵湯送下痺風陳皮湯送下大便不通燈草湯送下傷麵麵湯送下五勞七傷豬膽湯送下傷肉肉湯送下傷酒酒送下肺風杏仁湯送下腹痛芍藥湯送下時氣井花水訶子湯送下小兒五般驚風防己湯送下小兒乳疳乳送下氣逆薑湯下小兒疳痢蔥白湯送下婦人腹痛川芍藥湯送下酒氣衝心熱酒送下産後血痢當歸湯送下産難益智湯送下解內外障傷腹木香湯送下室女血氣不通酒送下胎死葵菜子湯送下赤白帶下酒煎蜀葵花湯送下月信不通艾湯送下又方出千金方治八風十二痺偏枯不隨宿食久寒虛冷五勞七傷及婦人産後餘疾月水不調皆主之礬石桂心白术狼毒半夏石南龍膽續斷芫花代赭䕡茹石韋白石脂玄參天雄防己桔梗䔧蘆白石英卷柏細辛烏頭躑躅蜀椒山茱萸白芷秦艽附子菖蒲各一兩寒水石逺志各二兩石膏二兩半蜈蚣一枝右㕮咀酒二斗漬四日每服一合日再十日後去滓曝乾搗篩為散酒服方寸匕日再以知為度胡洽四十二味無桂心細辛烏頭躑躅蜀椒防己加芒硝恆山黃芩黃連大連麻黃地黃前胡甘草兔絲子芍藥紫苑各一兩杏仁十枚同搗篩絹袋盛用水三斗麴三升黍米三斗作飯依釀酒法以藥袋置釀中春秋七日冬十日夏三日酒成服半雞子殼日三服曝藥為末酒服方寸匕以身體暖為度魯王酒出千金方治風昡心亂耳聾目暗淚出鼻不聞香臭口爛生瘡風齒瘰􅊓喉下生瘡煩熱厥逆上氣胸脅肩背痛痺手不能舉身不能帶衣腰脊不能俯仰腳酸不仁難以久立八風十二痺五緩六急半身不遂四肢偏枯筋攣不可屈伸賊風咽喉閉塞哽哽不利或如錐刀所刺行入皮膚中無有常處久久不治入人五臟或在心下或在膏肓遊走四肢偏有冷處如風所吹久寒積聚風濕五勞七傷虛損百病悉治之茵芋烏頭躑躅各三十銖天雄防己石斛各四十二銖細辛牛膝甘草柏子仁通草桂心秦艽茵陳山茱萸黃芩胡洽作黃耆附子瞿麥乾地黃杜仲石南澤㵼防風王不留行胡洽作天門冬千金翼作王孫遠志各十八銖右㕮咀以酒四斗漬十日每服一合加至四五合以知為度千金翼名此為魯公酒有乾薑胡洽無防己以絹囊盛藥用水二斗法麴二斤同漬三四宿出藥囊炒二斗黍米內汁釀之酒熱飲以雞子下日二服稍稍飲之以知為度虎骨丹出醫學切問方治一切風疾白芷六錢草芎八錢川芎半兩草烏三兩湯炮三次石膏蒼术一兩白薑一錢川烏三兩湯炮三次甘草防風羌活殭蠶一兩三錢炒當歸墨二錢肉桂各三錢北細辛右為末糯米糊丸如雞頭子大每服一丸細嚼常服茶清任下左癱右瘓生蔥酒下傷寒傷濕渾身疼痛炒薑䓤酒下跌破傷損松節酒下偏正頭風生蔥茶湯下卒中急風生薑皂角子煎湯送下風牙腫痛燒鹽同藥摻疼處遍身瘡癬炒烏頭淬酒送下腳氣木瓜酒送下小腸氣不通炒茴香灑送下病在上食後服病在下空心服孕婦人休服治諸風如吐先用十一味藿香氣散吐止後服此藥防風二兩南星二兩金沸草一兩加硃砂少許右為末用無灰酒調服或用梧桐子油煎豆腐食後吐痰淨用此藥炒烏麻地黃酒治風虛補不足除百病已試大效六月六日麴四斤淨剝刮銼之如棗許大王斯油麻六斗五升出吁州赤色者是如無别用良勝替之以脫去皮曝乾脫烏麻法以冷水浸經一宿出之置竹筲箕中灑水冷盡舂之即皮自脫去生地黃四斗冷熱湯洗待水氣盡收即便切之更取生地黃一石以水一石和熟粗布絞去滓即取汁六升又以蠟萆麻子塗甕內熬之令乾前三味並用大斗大升通寒溫得所總內甕中浸之丹參生石斛牛膝杜仲萆薢生薑各二斤人參八兩以上並藥稱之右七味切以生絹袋盛同內前件熟地黃汁甕中浸封閉七日外更取烏頭四大斗摩使光淨分作四度微熬令香取無灰重醖酒二斗八升三度合淋豆一熬三淋淋訖並去豆總計十二度淋豆取淋酒别器中盛然後更㵼麴汁等物及諸藥並出在大甕中以物閉頭及更將此酒先重蒸甕看冷暖還內麴汁及藥等安在甕中其日即用八斗精糯米炊作飯如常釀酒法酸酒即以豆淋酒投在甕中封閉經一兩宿看米消盡又炊四斗糯米飯酘之從此更封經七日其酒即熟任性飲多少量之不限時候常微微覺身運夜中稍加少許或出汗進避風及忌房室特忌毛桃芥生冷菜熱麵并酢蒜牛肉等物初醖酒法待此酒熟即將此酒更重醖其麴依當家常用法每一斗一升浸炊酒飲即量熟湯多少用沾飯如丸釀酒法更不得加生水每一斗米酒為佳釀重醖酒法待此酒熟即將酒二斗八升豆淋每一斗麴以熱水一斗浸其酒米每斗饋料以料四斗清酒淋其饋然後炊飯使熟更不得加水其所洗甑洗手盆甕等物皆須用此酒還投釀甕中藥酒法右欲和藥酒時先置五斗許藥在甕底然後加五斗許飯每次如此斟酌至半即內袋上亦使藥飯相參以至於盡然後閉封藥酒甕封甕口法閉頭用紙七重布一重其釀酒室唯造酒人得入自外貓犬婦人不得趨入室中川芎散出醫藥大成方治雞爪風手口搖動不能舉者五加皮海桐皮川烏牡丹皮川芎乾薑肉桂各一錢半赤芍藥各五錢右為末每服三錢水一盞將古銅錢一箇入清油內浸每煎藥入銅錢同煎不拘時候服不一散治虛風膩粉一兩以湯煎五度如茶慢火焙乾麝香半兩細研如粉右每服一字溫水調但是風疾臨時服半錢或一錢或一匕看虛實加減何首烏丸出聖惠方治七十二般風冷氣及腰腳疼痛補益下元黑鬢髮駐顔容神驗何首烏半斤桂心三兩熟乾地黃五兩附子二兩煨製去皮臍牛膝三兩去苗蕓臺子一兩桑椹子二兩柏子仁二兩五味子一兩地骨皮薯蕷二兩鹿茸二兩去毛塗酥炙黃肉蓯蓉三兩酒浸一宿刮去皺皮兔絲子二兩酒浸三日曝乾别搗為末右為末煉蜜搗和三五百杵丸如梧桐子大每服四十丸空心鹽湯送下加味烏藥順氣散專治男子婦人三十六種風七十二般氣右癱左瘓半身不遂口眼喎斜腰腳疼痛及治婦人胎前産後血虛血暈血氣不調四肢麻痺忽然手腳不能動之癱瘓一切血氣風治男子寒疝風濕腳氣下痛等疾悉皆治之白芷桔梗陳皮天台烏藥枳殼茴香􅒦砂天南星川芎當歸半夏南木香牛膝木瓜檳榔香附子甘草萆薢各等分右為粗末每服三錢水一大盞薑三片棗二枚煎至七分去滓不拘時候服如婦人患用當歸湯服之薄荷湯消風壅化痰涎治頭昏目眩鼻塞咽乾心煩胸悶精神不爽荆芥穗鹽炒各三斤雞蘇葉七斤半􅒦砂仁三兩苽蔞根十二兩甘草銼四兩炒右為末每服一錢沸湯點食後服荆芥豆淋酒若忽爾搖頭口噤背強直如發癎之狀此由風邪乘虛客於足大陽之經診其脈緩散而遲者蓋其人本虛風邪留於經絡日久而發謂之風痙其脈三部俱洪數者由藴熱搏於諸陽之經甚則日夜數十發正所謂熱則生風亦名曰痓風痙荆芥穗四兩大豆半斤炒令煙出好酒一升沃之去豆不用右用水三升并酒同煎至一半去滓溫服神化丹治一切風及癱緩枯偏癘風卒中瘖啞神昏志亂手足不隨天麻去苖附子炮製去皮臍牛膝酒浸一宿防風去蘆頭地龍去上炒蝎蛸去毒炒羌活去蘆頭白殭蠶炒去絲嘴獨活去蘆頭肉桂去粗皮當歸洗焙乾薑炮虎脛骨半夏生用敗龜醋洗炙黃烏蛇肉酒浸去皮骨天南星生用白附子生用黑參十九味各一兩右件為細末煉蜜為丸每一兩分作十五丸硃砂為衣每服一丸溫酒化下不拘時候麝香散出楊氏家藏方治一切風疾筋脈緩縱四肢嚲曵口眼喎斜足膝不能步履腰背不能屈伸頭目旋運瘙癢頑麻並宜服犀角屑細辛去葉土黑參牛蒡子一兩一分微炒麻黃去根節丹參沙參白花蛇酒浸一宿炙去皮骨取肉全蝎去毒炒獨活去蘆頭藁本去蘆頭白殭蠶炒去絲嘴人參羌活去蘆頭防風去蘆頭甘菊花已上十五味各一兩海桐皮三分敗龜醋炙二分天竹黃牛膝酒浸一宿焙乾天麻去苖赤箭白附子炮阿膠蛤粉炒如珠子石斛去根虎骨醋塗炙黃槐實半夏湯洗去滑已上十二味各半兩檳榔去枝肉桂去粗皮硃砂别研酸棗仁湯泡去皮麝香别研龍腦别研已上五味各一分右件為細末次入研者藥和勻每服一錢溫酒調下空心服加味勻氣散出德生堂治諸風疾必先順氣助脾為本神效白芷一兩烏藥二兩沉香七錢半白术四兩去蘆頭人參一兩陳皮一兩甘草半兩右為細末每服三錢用紫蘇木瓜煎湯調服不拘時候服之烏藥順氣散出德生堂治男子婦人一切風疾攻疰四肢骨節疼痛治腳氣遍身頑麻頭目旋運及療癱瘓語言蹇澀筋脈拘攣又治腳氣步履艱難腳膝軟弱婦人血氣老人冷氣上攻胸膈兩脅刺痛心腹臌脹吐㵼腸鳴並宜治之麻黃去根節陳皮去白烏藥各二兩川芎殭蠶炒去絲嘴枳殼麩炒甘草炒白芷桔梗天麻全蝎微炒獨活羌活防風細辛去土各一兩乾薑半兩右㕮咀每服五錢重半斤生薑三片棗一枚同煎七分去滓溫服不拘時候如碾為末者每服二錢好酒調下服乳香宣經圓出傳信道用方治男子婦人體虛氣弱寒濕相搏半身不遂手足麻痺行步少力骨節煩疼足脛腫浮皮膚不仁腳膝常冷狀若風吹或時作熱漸成腳氣腳膝生瘡痛癢不仁又治肝腎不足經絡留滯筋脈緩弱舉動皆難四肢攣急不可屈伸臂痛逰走或左右風毒攻疰年發肩背相引腰膝大痛風痺嚲曵血脈不周閃肭打撲內傷筋骨痛不可忍男子疝氣膀胱上下奔衝婦人月水不調多作腹痛常服活血脈止疼痛補虛損壯筋骨天台烏藥葳靈仙酒浸京萆薢茴香炒陳皮川練子肉各一兩半草烏七錢銼炒五靈脂半兩黑牽牛八分乳香半兩别研右為細末却入乳香拌勻醋糊為丸如梧桐子大每服三十丸溫酒下空心食前衛生家寶方有防風麝香無陳皮白术丸出經效濟世方治一切風疾草烏頭五兩去皮細切焙炒少許蒼术十兩米泔浸三日去皮切炒右為細末酒糊為丸如桐子大每服五丸加至十丸如覺麻即減至五丸食後茶酒任下至寶丹出經效濟世方治諸風草烏頭一斤用大豆二升鹽四兩入砂瓶內煮三伏時令烏頭極爛為度其豆取出埋土中一尺將烏頭入木臼內搗三百杵揑作餅子焙乾令為細末酒麵糊為丸如梧桐子大每服二十丸至三十丸空心或酒或鹽湯送下摩風膏出聖惠方治一切痛方當歸二兩白芷一兩細辛二兩附子三兩生用去皮臍桂心一兩乾薑一兩松脂半兩芎藭二兩生去皮臍醋三升硃砂一兩細研雄黃二兩細研天雄三兩生去皮臍生地黃三斤搗取汁豬脂五斤煉成者右件藥細銼以地黃汁及醋浸一宿漉出豬脂中慢火煎之候白芷色黃即膏成綿濾去滓入丹砂雄黃及松脂等以栁木箆攪令勻於甕中盛每取少許摩於病處如脅下聚如林者摩及塗之即瘥又面目黧黑消瘦是心腹積冷酒調半茶匙日三服病無不愈合時勿令婦人雞犬小兒見之茯苓菊花浸酒方出聖惠方治丈夫婦人骨節疼痛行步艱難肩背傴僂言語蹇澀口喎面斜中風失音半身不遂等疾宜服白茯苓五兩甘菊花二兩山茱萸二兩兔絲子酒浸三兩三日乾别搗末白术一兩丹皮二兩人參一兩去蘆頭肉蓯蓉二兩酒浸一宿刮去皺皮􅌝􅌣根二兩防風二兩去蘆頭天雄二兩炮製去皮臍乾熟地黃二兩牡蠣一兩燒為粉黃耆二兩菖蒲二兩紫苑一兩洗去黃土石斛二兩去皮柏子仁一升蛇床子一兩杜仲二兩去粗皮炙微黃逺志二兩去心乾薑二兩炮製赤芍藥二兩附子二兩炮製去皮臍蒼耳子二兩狗脊二兩萆薢二兩牛膝二兩去苖羌活二兩桔梗一兩去蘆頭鼠粘子一兩去沙虎脛骨一兩塗酥炙微黃牛蒡子二兩枸杞子半兩晚蠶沙三兩續斷二兩右件藥都細銼和勻每斤藥以生絹袋盛用酒二斗於磁器中浸密封二七開封每日平旦午時近晚各溫飲一盞常令有酒容不可過度每取各一盞如或酒淡藥力稍減即取滓隂乾搗羅為末煉蜜和丸如梧桐子大每服空心以酒溫下三十丸忌生冷油膩豬雞肉粘滑物天麻除風丸出十便良方治一切風及氣上壅頭目昏澀鼻塞耳鳴項背拘急肢體倦怠常服踈風順氣清利頭目天麻防風細辛藁本川芎香白芷乾山藥黃耆當歸已上各一兩蝎稍甘草八錢白附子五錢右件為細末煉蜜和丸每一兩作十一丸每服一丸茶酒任下食後省風湯出朱氏集驗方南星一兩半炮防風一兩半甘草半兩右㕮咀每服四錢重水三兩盞薑十片煎八分熱服氣逆加紫蘇南木香各二錢半氣虛加生附子一兩沉香二兩半胸膈不利有痰加半夏一兩神麯半兩頭暈目痛加天麻半兩全蝎一錢煎熱入麝香少許鄂渚小金丹出朱氏集驗方治諸風蠶沙炮熟草烏生用右各等分為末生地龍為丸如少則加醋糊為丸每服四五丸白湯下多則麻人甚妙靈寶丸出王氏博濟方治三十六種風疾服之必愈天麻鄆州者洗天南星獨活白附子新羅者白殭蠶川烏頭炮羌活洗乾蝎已上各一兩全者牛膝一分細研旋入麝香半兩旋研細龍腦一分細研旋入右件十一味各要上好藥淨洗日內晒乾不用近火杵為細末煉蜜為丸如豆蔲大諸色風疾薄荷溫酒下五丸女人血風更入少當歸末溫酒下如癱緩風下床不得先用白礬半兩為末蔥十莖煎湯溫沐後用薄荷汁溫酒下三十丸衣被蓋出汗别服補藥如是男子婦人疥癬瘰􅊓並須依前法澡浴服三十丸出汗當日必差小兒瘡疥亦須如常沐每一嵗一丸並須出汗永差忌熟麵豬肉魚毒物大羌活丸出王氏博濟方療夾腦風暗風旋但是三十六種風疾皆宜服之大效官桂去皮茯苓麻黃去節劒脊烏蛇酒浸去皮骨炙令香殭蠶防風枳殼酸棗仁苦參羌活獨活郁李仁去皮尖人參各一兩龍骨犀角鎊細如無即羚羊角充亦得烏脂炒過去皮心如無即以烏頭半兩代之炮製用右件一十六味同杵為末煉蜜為丸如梧桐子大每服七丸熱酒下功效繁多卒不及一一具述治大風疾方出王氏博濟方葳靈仙二兩洗淨羌活獨活丹參六兩銼炒令黑黃蒼耳四兩仙靈脾二兩黑參二兩人參去蘆頭沙參各二兩柴參一兩甘草生一兩黃芩半兩右為細末食後臨卧用溫熟水調下三錢若五心無瘡眼不斷瞳人鼻梁不塌服之一月以後乃瘥神寶丹出王氏博濟方大治一切風疾但服此藥無不應效自然銅半兩金星石礬禹餘糧石石膏已上各一兩先將上四味藥用炭煆通赤傾在釅醋內淬如此凡經七度了於乾後都搗羅為末入於磁盆內以湯淘洗二十度浮盡上面黑汗出只收在底真實藥放磁器內慢火逼盡水氣却細研乃用諸藥於後蔓荆子葳靈仙茯苓天竺黃白殭蠶天仙藤鉛白霜蛜􅖉去嘴尖炒白茯苓旋覆花莽草半夏湯洗去涎七遍麩炒黃色犀角鎊藿香已上各一分桑螵蛸二十箇劒脊烏蛇酒浸去皮骨炙黃用肉一兩檳榔半兩半生半熟人參半兩苽蒂二十箇真虎骨一兩酒浸炙黃赤小豆四十九粒白龍砂取白犬先繫定將粟米飼三日取其第三日糞淘取粟米焙乾用一兩上件藥修製搗羅了次用下項藥牛黃龍腦各一分麝香好硃砂一兩細研膩脂乳香少許右以六味藥研細如塵用前藥攪和令勻用槐膠水煮麵糊和搗同入鐡臼搗熟丸如彈子大焙乾每一丸豆淋酒下作十服每一服食後浸皂角水磨下服之小兒患病斟酌大小加減與服用薄荷金銀花湯磨下神效不可具述龍膽膏出王氏博濟方治大風疾神效消䔧烏蛇膽一箇冬瓜一枚截作五寸許去穰用右件三味掘地可深三尺以來拂拭令淨潔置冬瓜於其內以物載之安蛇膽消䔧其上即以土隔截蓋之至三七日看一度冬瓜未甚壞則候七七日看蛇膽消䔧瓜肉渾化為汁在冬瓜皮內取出一茶匙腳氣大風疾一匙小可風疾以匙頭溫過攪酒喫三兩服立愈靈砂丹出治風經驗方治諸風疾楊補之云朱選之嘗苦手足不舉服此丹乃愈檳榔生白附子炮天南星生硃砂一兩細研留一半為衣白殭蠶生狼毒炮沒藥半兩研炒烏蛇酒浸一宿攤乾並皮骨川烏頭炮去皮臍三兩大附子炮去皮臍已上各二兩五靈脂三兩不夾石者肉桂取有味者去粗皮不見火右為末入硃砂研勻更以麝香半兩研拌勻煉蜜和為衣每服一丸至二丸空心食前嚼溫酒下纍試皆驗獨活丸出治風經驗方治風退後但手足重運動不穩者獨活防風五加皮丹參已上各十分白菊花木香檳榔五分薏苡仁各十二分黑參五分大黃三分炒生乾地黃八分磁石燒紅入醋淬五七次搗研飛五分右為末入磁石拌勻煉蜜為丸如梧桐子大每服二十丸加至三十丸溫酒下寒則加桂八分而用不得大黃治風三十六味浸酒法凡男子女人骨節酸疼行步腳弱言語蹇澀口眼喎斜及中風半身不遂悉可療之白茯苓五兩菊花生乾地黃防風三味已上各二兩人參一兩續斷五兩天麻五兩兔絲子三兩淘揀淨牡丹皮二兩白术一兩黃芩二兩肉蓯蓉去粗皮三兩石斛菖蒲二兩紫苑半兩去苖牡蠣燒取粉三兩柏子仁一升杜仲去粗皮三分半芍藥三分蛇床子仁三分炒桔梗半兩去蘆牛膝三兩川萆􅐺二兩附子一兩炮製去皮臍蒼耳子取仁二兩牛蒡子炮三分虎脛骨醋炙一兩金毛狗脊一兩去苖羌活半兩枸杞子半斤晚蠶沙炒三兩牛蒡根碎切半斤山茱萸一兩右並杵令細入生絹袋盛以無灰酒三斗斗於乾磁甕內盛浸以紙封頭滿二七日平旦晚食前暖一盞服常令酒氣在口不得過餘令昏醉久患經年服一月愈稍淺者入口見效酒浸將袋內藥滓隂乾搗羅為末煉蜜為丸如梧桐子大每服日空心溫酒下三十丸此方殳鞠承之兵部親服得效又潞州劉士彥知泗州日中風肩骨脫臼吳總楊介勸服此藥立見效未幾拜起如常觀其藥味平常而有此神功乃知製方者之善而後人不能及也治風何首烏丸王半甫傳云其父禹王平生服此有效何首烏西京者尤佳米泔浸一宿用竹刀刮皮切片焙乾用一斤熟乾地黃四兩焙懷州牛膝酒浸一宿焙乾四兩右不得犯銅鐡器搗羅為末煉蜜為劑再入木臼杵一千下丸如梧桐子大每服空心酒下四五十丸忌羊血生蔥蘿葡藕不飲酒人以飯飲下大有功效天麻丸治一切風玄參六兩附子一兩羌活十兩天麻六兩酒浸三日曝乾稱生地黃十六兩當歸十兩牛膝六兩同上浸杜仲七兩銼炒去絲萆薢六兩另研為細末稱右為細末煉蜜為丸如梧桐子大常服五七十丸病大至百丸空心食前溫酒或白湯下平明服藥至日髙飢則止服藥大忌壅塞失通利故服藥半月稍覺壅微以七宣經迹之始藥在為用也牛膝杜仲治脊骨萆薢為之使天麻羌活和風之勝藥當歸地黃飬血能和榮衛玄參滋隂附子佐之行經也燒肝散治三十六種風二十四般冷五勞七傷一切痼疾脾骨久虛不思飲食四肢無力起立甚難小便赤澀纍年口瘡久醫不瘥但依此法服之必愈茵陳犀角石斛白术柴胡去苗柴參桔梗防風乾薑芍藥各半兩人參胡椒白蕪荑吳茱茰官桂去皮各一兩右十五味同為末以羊肝一具如無即豬肝代之分作三分洗淨去血脈脂膜細切用末五錢蔥白一兩細切相和油紙褁掘地坑內以火燒令香熟空心生薑湯下大段傷勞不過三服見效何首烏丸治風活血大補益何首烏十斤赤白色者各半兩米泔浸三宿取竹刀刮去皮切焙乾右為末煉蜜為丸如梧桐子大每服三十丸至五十丸食後溫酒或飯飲下一日三服只忌鐡器須細細修合知懷州李括與一武辨同官怪其年七十餘而輕健面如渥丹能飲食叩其故乃得方先是李括盛暑中半體無汗者二年竊自憂之服此藥一年許汗遂浹體初不知其能治此也蓋其活血之驗李公豫舅氏也面授此方已試之效可決然無疑何首烏久服頗作欲念更宜慎之王古尚書云于仙姑搜風丹甘草半夏炮洗七次防風去蘆洗細辛洗淨去土川芎天南星炮川烏頭炮白附子洗淨炮天麻香白芷草烏頭各去皮臍已上各一兩乾薑四錢地龍洗淨去土已上各半兩右焙乾為細末一兩用頭麵二兩半藥拌勻再羅過用新水和得所丸如雞頭大曬乾每服一丸至二丸茶酒嚼下合此藥時須是清潔萬金丹治一切風左癱右瘓筋拘急遍身生瘡及風毒攻疰婦人血風暗風夾腦風偏正頭痛等疾雖積年癱瘓服此藥無不見效忌熱物少時藿香葉躑躅花天南星炮製甘松去土已上各一兩麻黃不去節吳白芷甘草蔓荆子去白皮川烏何首烏各三兩草烏頭七斤生用五靈脂酒浸一宿去土炒白膠香研細麝香二錢沒藥三錢細研蛤粉為衣已上各一兩右件除蛤粉為衣外十五味並搗羅為末糯米一盞好酒一升煮粥丸如雞頭大隂乾每服一丸茶酒任下若牙關緊急酒磨灌下不拘時候活絡丹出衛生家寶方治一切風疾疼痛五靈脂破故紙赤芍藥川烏頭草烏頭兩項鳥頭並銼碎用蔥切作片子同和勻碗合一宿取出不用蔥山梔子去殼黑牽牛白牽牛何首烏已上各二兩土朱四兩右為細末酒糊為圓如梧桐子大每服五七丸打撲傷損用蘇木酒下腳氣木瓜酒下腰痛核桃酒下常服溫酒鹽湯下乳香丸出衛生家寶方治一切風疾沒香一兩研川烏頭一兩炮製去皮臍木香半兩生五靈脂三兩研硃砂一分研乳香一分研麝香一錢研右為細末薄糊為丸如梧桐子大每服三兩丸茶酒任下杜仲丸出衛生家寶方治風疾及腰腎風虛腳氣等疾杜仲去粗皮切稱用麥麩炒黃色去麥麩不用牛膝酒浸一宿晒乾兔絲子酒浸一宿漉出趂濕潤研破曬乾續斷酒浸一宿晒乾木瓜切碎晒乾稱萆薢炒黃色為度已上各二兩半金毛狗脊拭淨毛研稱五兩半好酒米醋於銀銚內煮切片子焙乾右為細末用好醋煮糊為丸如梧桐子大每服三十丸至五十丸空心溫酒下日進三服忌雞肉增減續命湯出衛生家寶方治諸風千金曰治諸風不以續命湯則不為治風豈聖賢之説白芍藥黃芩人參去蘆麻黃半兩去根節大川芎甘草微炙漢防己銼杏仁去皮尖麩炒當歸酒浸銼天麻蜜炒官桂不見火已上各一兩防風一兩半附子半兩炮製去皮臍尖右件藥為粗末外將附子杏仁切令細碎入藥內和勻每服三錢水一盞半薑五片煎至一盞去滓稍熱服食前十生丸出衛生家寶方治諸風及痰疾乾薑半夏天南星白殭蠶川烏去皮尖全蝎各一分人參白附子已上各一兩乾蝎三兩取一兩附子七錢重去皮尖右為細末生薑自然汁糊為丸如梧桐子大以蛤粉為衣每服三十丸生薑自然汁點湯吞下不拘時候忌熱物少時此藥治癱瘓神效透骨丹出衛生家寶方治諸風疼痛草烏一兩用鹽和炒焦甘草半兩黑牽牛一兩炒焦右為末加麝香一錢和勻酒糊為丸如梧桐子大每服二十丸溫酒下不拘時候大效小風丹出衛生家寶方治一切風疾草烏頭去皮尖何首烏以好酒同浸兩宿取出淨洗右件各等分為細末酒糊丸如梧桐子大每服七丸茶酒任下食後川烏丸出衛生家寶方治一切風疾并腳氣等疾病沒藥半兩為細末另研川烏四兩去皮尖切作片子分二處將一處用𧗆汁於砂石器內煮腐取用麝香一字别研草烏頭和後藥不用汁如無川烏草烏頭亦得右為末杵爛川烏為丸如雞頭大以硃砂為衣每服一丸至二丸如風疾食後茶酒下腳氣疾木瓜煎湯下腰痛核桃酒下頭風嚼生蔥茶下婦人赤白帶下艾醋湯下軟風金銀花煎酒下早晚進二服宿州蔡五經家餅子風藥出衛生家寶方香白芷一兩藿香一兩零陵香一分半夏一兩半炮七次蒼术半斤米泔浸一宿草烏頭去皮尖一兩右為末曬乾和薑為餅子一寸大餅分作八服茶酒嚼下南劒州醫僧白龍丸出衛生家寶方治諸風白芷生草烏頭用粗瓦片相拌水底踏洗去尖白川芎生銼大甘草生細辛洗淨生白殭蠶去絲薄荷葉生蒼术米泔浸一宿焙乾石膏半兩燒遍赤半生用已上各四兩右件生用為末蒸餅五箇泡糊為丸如彈子大每服一丸食後茶酒送下白大通丸出衛生家寶方治一切大風左癱右瘓口面喎斜手腳嚲掉言語蹇澀兼治偏正頭風此雖舊方已載然後人用以治風痺腳疾十有九愈藿香去土香白芷川芎川烏四兩各去尖春不去半生半炮雞蘇木瓜天南星甘草四兩春炙冬生官桂荆芥乳香白殭蠶二兩炒去絲足嘴藁本去土羌活桔梗洗甘松牛膝酒浸天麻川當歸沒藥别研麻黃二兩春不去節冬炙真細辛洗去苗已上各二兩烏蛇五兩水浸去皮骨好酒浸一宿酒炙軟石膏一斤煆過研稱四兩為衣餘者并入衆藥甘菊花已上各一兩右為末糯米糊為丸如彈子大隔日方焙半乾即上石膏為衣每服一丸薄荷茶酒溫下如腎氣疼炒茴香酒下青龍膏出朱氏集驗方治榮衛不和陽少隂多手足舉動不快出雞峯方天麻各二兩狗脊白花蛇肉不蚌者六兩好酒炙去皮骨新瓦上焙乾取肉一兩右為細末銀盂子盛無灰酒一升入此三藥重湯煮稠如膏銀匙攪細末生薑半兩取汁同熬勻瓦罐內收每服半匙頭好酒半盞攪勻或服湯亦得食前飲之極佳日二服神效宿州紅餅子出朱氏集驗方治男子婦人諸般風疾兼損傷陳氏家第一藥何首烏天南星川芎川烏各半兩蒼术殭蠶各三兩草烏一兩白芷各一兩藿香雄黃半錢右除殭蠶雄黃外以水淨洗曬乾為末粳米粉糊捻餅子如小錢大土硃為衣用刀切十字待乾一餅分作四服空心偏正頭風生蔥茶嚼下打撲傷損松花酒下鼓捶風膝腫浸川牛膝酒下如牙疼半餅嚼下疼處先以蔥湯下一服萬金湯出朱氏集驗方治風補榮衛通氣血及治腳膝無力醫官杜任以此治手足風纍驗桑寄生北細辛桂心防風人參白茯苓當歸芍藥杜仲薑製川牛膝川獨活甘草各一兩川芎秦艽熟乾地黃各半兩右㕮咀每服五錢以水二盞煎至一盞服柴胡半夏湯一名補肝湯治舊有風證不敢見風眼澀頭有痰眼黑惡心兀兀欲吐風來覺皮肉緊手足重難舉居暖處少時許便減再見風其病便復半夏二錢炒麴一錢生薑十片柴胡半錢升麻五錢蒼术一錢藁本半錢白茯苓七分右㕮咀麻豆大都作一服水三盞煎至一盞去滓稍熱服飬神湯治精神短不得睡項節腫急難伸禁甘溫宜苦味柴胡一分升麻四分當歸身半兩麥蘖麴半錢木香一分川芎三分橘皮一分黃芩酒製三分黃連半分黃蘖三分半夏七分黃茋一錢人參甘草七分蒼术半錢白术二錢右㕮咀如麻豆大每服五錢水二大盞煎至一盞去滓稍熱服食後萆薢散治一切風證腰腳疼痛徹骨酸楚此藥除風去濕止痛活血補腎防風川烏炮川續斷破故紙鹽炒萆薢赤芍藥熟地黃獨活白芷沒藥茴香白术各二兩杜仲薑製一兩右為細末煉蜜為丸如梧桐子大每服空心鹽湯酒下三五丸史衛王奉內祠日忽苦此疾足不能行發熱煩悶後得此藥三服頻安治天柱不倒用澡浴後忽患者用多年五苓散一年者亦可每服三錢重以燈心七莖淡竹葉三莖烏梅三箇同煎湯調之俞風丹暖風藥荆芥穗烏藥天南星川芎黑附子天麻甘草當歸各一兩右為細末煉蜜和丸如彈子大每服一丸茶酒任下一方加防風無敵丸除風疾百病不生杜仲十兩川牛膝木瓜二兩五錢萆薢各七兩五錢虎骨二兩淬醋天麻五兩乳香二兩五錢草烏頭五兩龍骨一兩五錢蒼术十兩沒藥二兩五錢金毛狗脊十兩右為細末酒糊為丸如梧桐子大每服四五十丸溫酒下早晚各進諸氣不通胸背痛結塞悶亂宜服醉仙丹治偏枯不遂皮膚不仁出囊中藏經方麻黃水煮焙乾一兩為末天南星七箇炮去皮地龍七條去皮右除麻黃外先為末次將麻黃末入酒一升熬成膏入前末丸如彈子大每日食後臨卧酒化下一丸汗出效偏枯不遂皮膚不仁者皆由五官虛氣風寒暑濕之邪蓄積久而不散乃成疾焉去一切風出本草以羊皮作臛食之治一切風變白宜老出本草單方以絡石草炙汁服之治患風數年不效朱真人靈驗篇云出本草掘坑令患者解衣坐於坑內逐內以熱湯上淋之良久後以簟蓋之治一切風疾虛羸冷血足疼痺無論老幼輕重出本草以木天蓼浸酒及煮汁服之十許日覺皮膚間風出如蟲行治風出本草以木槿花作湯代茶喫治一切三十六種風有不知者悉效出本草菖蒲薄荷切令曬乾有三斤以絹袋盛之玄水一斛清者玄水者酒也懸此菖蒲密封閉一百日出視之如緑菜色以一斗熱黍米內入封十四日開出飲酒治一切風出本草以驢肉釀酒服之治風疾出本草以韋葉石作湯服之治風出本草以秫稻根作湯洗之療風病身體如蟲行方見大風癩病類治一切風疾出本草以楝實冬春間取細銼炒令香袋盛於酒中浸每服取酒溫服之療風出本草以蘭炙水取浴之療風以五加實取酒清服之療風以丁公藤漬酒服南史解叔謙鴈門人母有疾夜於庭中稽顙祈告聞空中云得丁公藤治即瘥訪醫及本草皆無至宜都山中見一翁袋藥云是丁公藤療風拜泣求得之及漬酒法受之畢失翁所在母疾遂愈治酒風黃帝曰有病身熱懈惰汗出如浴惡風少氣此為何病岐伯曰病名酒風帝曰治之奈何岐伯對以此方以澤㵼术各十分御米五分合以三指撮飯後服治風以木天蓼一斤去皮細切以生絹袋盛好酒一斗浸之春夏一七日秋冬二七日後開每日空心日午初夜各溫飲一盞老幼臨時加減若常服日只每服一盞立有功效除風令人能飲食以胡桃漸食之治風緩諸節不隨皮膚頑痺腸內宿冷冷血瘀血腰腳疼痛以原蠶屎淨收取曬乾炒令黃袋盛浸酒服治一切風疾痰眩附子湯右生用附子取六七錢者用半箇切碎以水二鍾薑十片煎至一鍾以下濾過盞盛水中沉微冷服若不去皮臍及臨服入少鹽效尤速治風血疾積冷氣用藤浸酒服之去風血用鬼膊藤浸酒服亦名鬼腰者治風虛除百病杏酥法用搗爛杏仁一石好酒一石研濾取汁一石五斗入白蜜一斗五升攪勻封於新甕中勿泄氣三十日看酒上酥出即掠取內磁器中貯之取其酒滓團如拳大置空屋中作格安之候成飴脯狀日服一枚以前酒任性飲之治風水腹大臍腰腫痛不可轉動用麻子半升杵碎水濾取汁以米二合以麻子汁煮作稀粥著蔥椒薑候空心食之麻子者乃今人績麻布重子也治一切風用馬齒莧細切煮粥服之補虛療風用忍冬草煮汁釀酒可常採服治丈夫心肺中虛風及客熱膀胱間連脅下時有氣皮膚瘙癢癮疹飲食不多日漸瘦損常有憂愁心忪少氣等疾用莎草春收苖及花隂乾入冬採根切貯於風涼處有患前病者取苖二十餘斤銼以水二石五升取煮一石五斗浴之去風甚者用香麻煎作浴湯治風輕身以千金藤浸酒服之治一切風虛常惡頭痛欲破者以杏仁去皮尖曝乾為末水九升研濾如作粥法緩火煎令如麻腐取出和美粥酒內一匙服之每食前不拘多少服七日後大汗出慎風冷忌豬魚雞大蒜服一劑後諸風減瘥春夏恐酸少酢服之秋九月後煎之此法神妙可深祕之治風血羸老腹內諸冷血閉強腰腳以土鼓藤煮服浸酒服亦佳治筋骨風以酸棗仁炒末作湯服之治風血羸老腹冷及腰腳俱冷食不生肌膚以地龍藤浸酒服之治心風頭肢體諸風及解肌發汗出本草以杜荆根水煮服之治皮毛間習習如蟲行風出本草煮牛蒡根汁浴之夏浴避風腳疾取其子炒過為末代茶煎三七通利小便延年去風令光潤出本草以桃仁五合去皮用糯米飯和研之令桃仁盡即煎微溫用洗面極妙治因瘡中風方見風角弓反張類在三十六卷以灰麵和米一斗炊作飯看冷暖入蒼耳麥蘖麴作三大升釀之封二十四日成熟取此酒可兩重布不得全密密則溢出又不可食馬肉空心暖酒服枳茹酒出千金方一名枳茹酒服諸風藥不能愈者取枳實上青亂取不可至心須得茹五升微火炒去濕氣以酒一斗漬微火暖令得藥味隨性飲之治口僻眼急大驗治緩風急風並佳一方治身直不得屈伸反覆者枳樹皮亦得葳靈仙方出御藥院方去衆風通十二經脈此藥朝服暮效踈宜五臟冷膿宿變病微利不㵼人服此四肢輕健手足溫暖並得清涼時商州有人病重足不履地經十年不差忽過新羅僧云此疾有藥可理遂入山求之遺服數日平復後留此藥名而去治丈夫婦人中風不語手足不隨口眼喎斜筋骨節風胎頭暗風心風風狂人傷寒頭痛鼻清沸經二度傷寒即止頭旋目眩白癜風極治大風皮膚癢毒熱毒風瘡深治勞疾連腰骨節風繞腕風言語澀滯積塞不通五臟腹內宿食心頭痰水膀胱膿宿口中涎水好喫茶滓手足頑痺冷熱氣壅腰膝疼痛久立不得浮氣瘴氣憎寒壯熱頭痛尤甚攻耳成膿而聾又衝眼赤小腸祕脈立通飲食即注黃疸面無顔色瘰癧遍項産後祕澀暨腰痛曽經損墜心痛注氣膈氣冷氣攻衝腎臟風壅腹肚脹滿頭面腫注毒脾腑氣痰熱咳嗽氣急坐卧不安疥癬等瘡婦人月水不來動經多日血氣衝心除盜汗鴉臭穢氣息不動多服葳靈仙久浴斛中浸身令汗出五六度浸兼浴其肺中風皮膚癢即止每載四時常用之則癮疹風永差心中客熱膀胱間連脅下氣常憂愁不樂心忪者加沙草根一大斤切熬令香以生絹袋盛貯於三大斗無灰酒中浸之春三月浸一日即堪服冬十月後浸七日近暖處乃佳每空心服一盞日夜三四服之常令酒氣相續以知為度若不飲酒即取根十兩加桂五兩蕪荑三兩和搗為散以蜜和為團搗千杵丸如梧桐子大每服酒及薑蜜湯飲汁等下二十丸日再服漸加至三十丸以瘥為度莎草根即香附子苗治諸風腳膝疼痛不可踐地用鹿蹄四隻燖洗熟煮了取肉於䜴汁中著五味子煮熟空腹服之治風疾取消梨不限多少絞汁飲之昔有一朝士見梁奉御診之曰風疾已深請速歸去朝士復見鄜州馬醫趙鄂者復診之言疾危與梁所説同復云只有一法可試喫消梨不限多少咀齕不及絞汁而飲到家旬日唯喫消梨頓爽亦可以梨葉作煎服普濟方卷一百十六
