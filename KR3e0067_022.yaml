body:
  text: 普濟方卷二十二明周王朱橚撰脾臓門兼理脾胃夫人身之脾胃専藉之以容納五榖而尅化之脾屬土而居五臟之中寄旺於四時之内以土能容載萬物故好静其脉常喜沉細而緩帶浮𦂳洪數者即有病之脉也尋常理脾助胃之道當用以和平之藥又須時其饑飽不以生冷之物傷之不為寒暑所侵不為七情所傷如是則氣體自然充實百病不生將理失宜或為六滛七情相干為嘔為泄為滿為喘變生諸症矣方綾錦養脾丸出御藥院方治大補脾胃極進飲食調順三焦保養榮衛脾腎俱虚冷氣攻刺心胸脇小肚疼痛嘔逆痰水口苦噫氣吞酸及膀胱冷氣逩衝腰背臍腹絞痛手足㣲冷小便頻數又治卒暴心疼霍亂吐痢婦人血氣癥瘕心腹刺痛此藥誠如綾錦之美麗故以名木香丁香沉香紅豆大椒官桂去粗皮附子炮製去皮臍各一錢白茯苓去皮内豆䓻川薑炮製蓽撥蓽澄茄縮砂仁甘草剉炙黄人參去蘆頭白术訶子肉陳皮去白神麯打碎㣲炒良薑剉炒麥蘖炒黄各二錢半厚朴去粗皮生薑製破故紙㣲炒上二味各六錢右為細末煉蜜和丸每兩作六丸此藥雖有三五味辛熱煉蜜和成約四兩半藥并煉浄熟蜜約四兩半計九兩分作五十四丸一錢六分有餘若服此藥一料大補如前法每服一丸細嚼好酒或薑湯米湯沸湯送下不拘時候沉香温胃丸出御藥院方治脾胃虚弱三焦痞塞中脘氣滯胷膈滿悶宿寒留飲停積不消心腹刺痛脇肋膨脹嘔吐痰逆噫氣吞酸腸鳴泄痢水榖不化肢體倦怠不思飲食常服可益脾胃大進飲食温中消滯寛膈順氣沉香剉陳皮去白青皮去白人參去蘆頭大麥蘖炒亁薑炮神麴炒白茯苓桂並去粗皮甘草炙各一兩揀丁香髙良薑剉丁香皮白豆䓻仁蓽撥縮砂仁紅豆各半兩白术剉炒二兩大椒二錢半右為細末煉蜜和丸每兩作十丸每服一丸食前細嚼生薑湯送下和胃丸出和劑方治脾胃不和中脘氣痞心腹脹悶不思飲食嘔吐痰逆噫氣吞酸面色萎黄肌肉消瘦腹脇刺痛便利不調少力及嗜卧體重骨節痛及治虚勞脾胃虚弱飲食不化心腹痞滿並宜常服此藥老幼氣弱皆可常服能温中和脾胃進調飲食厚朴去粗皮碎以生薑二兩研爛同炒半夏一半湯洗日乾㣲炒一半生薑汁製作餅炙黄神麴碎炒鱉甲揀用大者一枚黄泥外裹以米醋二椀化硇砂一兩放鱉甲内漫火熬乾取二兩細研如粉用麥蘖㣲炒白术剉炒肉桂去粗皮各二兩枳殻去瓤麩炒三稜炮青皮去白炒人參各三兩陳皮去白訶子炮去核各四兩㯽榔當歸各一兩半芍藥甘草炒各一兩甘薑炮赤茯苓去皮各三分右為細末蜜丸小豆大每服十二丸㣲嚼破温水下不計時候大健脾丸出醫方大成調中養氣和胃健脾治中焦積寒胷膈氣痞嘔逆惡心腹脇疼臟腑虚滑飲食多傷困倦少力肢體怠惰少精神肉桂去粗皮剉用厚朴去粗皮細剉用生薑一兩研爛同浸一宿炒令香熟甘草各一兩炙肉豆䓻麵裹煨乾薑炮丁香胡椒附子炮去皮臍木香蓽撥神麴炒白术麥蘖炒人參去蘆白茯苓去皮白豆䓻各半兩訶子麵裹煨去核二錢半右為細末煉蜜為丸如彈子大每服一丸細嚼温米飲下食前吴茱萸丸一名木香利膈丸大理脾胃胸膈不通調中順氣方治冬三月隂氣在外陽氣内藏當外助陽氣不得發汗内消隂火勿令泄瀉此閉藏周宻之大要也盛冬乃水旺之時水旺則金旺子能令母實肺者腎之母皮毛之陽元本虚弱更以冬月助其令故病者善嚏鼻流清涕寒甚出濁涕嚏不止比常人大惡風寒小便數而短或上飲下便色清而多大便不調夜寒無寐甚則為痰咳為嘔為噦為吐為嘔白沫以至口開目瞪氣不交通欲絶者主之吴茱萸草豆䓻仁各一錢二分橘皮益智仁人參黄耆升麻各八分澤瀉白殭蠶薑黄柴胡各四分當歸身甘草炙各六分木香二分青皮三分大麥蘖一錢五分半夏一錢右為細末湯浸蒸餅為丸如菉豆大細嚼三十丸白湯下無時夏三月暑陽氣在外隂氣在内以此病而值此時是天助正氣而剉其邪氣不治而自愈矣然亦有當愈不愈者蓋隂氣極盛正氣不能伸故耳且如膈咽不通咽中如梗甚者前證作治法當從時利膈丸泄肺火以黄耆補中湯送下如兩足痿蹶行歩惟艱敧側欲倒臂臑如折及作痛而無力或氣短氣促而喘或不足以息以黄耆人參甘草白术蒼术澤瀉猪苓茯苓橘皮等作湯送下滋腎一百五十丸六七月之間濕熱之令大行氣短不能言者加五味子麥門冬如心下痞膨脹悶食不下以上件白术蒼术等湯送下消痞丸五十七九温脾散出醫方大成青皮陳皮縮砂仁舶上茴香炒桔梗白芷厚朴各一兩木香香附子白术各半兩甘草一兩五錢紅豆三分良薑一兩麥蘖五錢乾葛一兩右㕮咀每服三錢水一盞半棗一枚煎七分空心服導氣枳殻丸徳生堂方理順三焦調理脾胃去脹滿及痞悶不通氣不舒暢枳殻炒木通青皮炒陳皮炒桑白皮三稜炒莪术炒㯽榔麥蘖炒神麴炒黒牽牛小茴香西木香各五錢右為細末蘿蔔熬水煮麵糊為丸如梧桐子大每服五十丸温水下無時木香分氣丸出濟生㧞萃方善治脾胃不和心腹脹滿兩脇膨脹胷膈注悶痰𠻳喘息醋心乾嘔咽喉不利飲食不化並皆治之大有效木香㯽榔青皮去白陳皮去白穣薑黄𤣥胡蓬莪术炮乾生薑當歸白术赤茯苓去皮肉豆䓻枳殻荆三稜濕紙裹煨香秋冬加丁香炒各等分右為細末白麵糊丸如小豆大每服三十五丸生薑湯下忌生茄馬齒一方無枳殻陳皮大藿香散出百一選方大治一切心肺脾胃氣變為萬病服之皆愈盛季文傳於賀方回云前在河朔因食羊肝傷脾胃泄瀉膿血仍發脾氣嘔吐霍亂心腹撮痛時出冷汗四肢厥逆不可忍邑宰萬侯湜懐此藥煎以進用即定藿香葉二兩木香青皮去穣麩炒神麯炒人參去蘆肉豆䓻麵裹煨良薑炒大麥蘖炒訶子煨去核白茯苓甘草炒厚朴薑汁製炒陳皮各一兩去白白乾薑五錢炮右為細末每服二錢吐逆瀉痢不下食或嘔酸苦水翻胃惡心並用水一盞煨生薑半塊擘破同煎鹽一捻安盞中候前藥及七分熱呷水瀉滑洩腸風臟毒陳米飲熱調入鹽少許下赤白痢煎甘草黒豆湯下脾元受虚邪變為寒熱或脾胃虚冷醋心氣脹宿滯酒食噫滿不化膈上不快靣色積黒痰氣作暈頭目眩掉水一盞薑三片棗一枚擘破同煎至七分入鹽少許嚼薑棗湯執服胃氣逆噫生薑自然汁半茶鍾入鹽㸃熱呷絶不思食或喫少氣弱膈滿煨薑一小塊先嚼入鹽㸃熱服中酒亦如之或氣膈變成百病如上服之不拘時如湯㸃入薑鹽紫蘇尤佳大能消食順氣利膈開胃功不可細述又方出百一選方主脾氣不調有寒熱或下閉塞調五臓不利嘔逆飲食者大黄六分杏仁去皮附子炮當歸乾薑桂心各四分人參細辛芍藥茯苓半夏洗黄芩蜀椒各三分炒出汗𤣥參五分右搗篩蜜和丸如梧桐子大飲服六丸日三増至十丸忌猪羊肉冷水麵生葱生菜酢物等一方無半夏附子育氣湯出御藥院方通流百脉調暢脾元補中脘益氣海思進飲食大益脾虚疼痛袪寒止腸鳴白术丁香人參木香白茯苓藿香縮砂仁肉豆䓻蓽澄茄甘草各五錢炙乾山藥一兩陳皮去白青皮各一分去白右為細末每服三錢木𤓰湯空心㸃服鹽湯亦可一方加白檀香五錢瀉脾丸調中利飲食除胃中積聚寒熱老人長服長肌肉令人光澤黄芩杏仁去皮尖䨇仁熬澤瀉通草芎藭桂心白术乾薑各五分茯苓黄耆乾地黄各六分附子二分炮麥門冬四分去心右搗篩蜜和丸如桐子大每服二丸日三服忌猪肉冷水桃李雀肉生葱酢物蕪荑等白术沉香散出百一選方墜氣益脾胃沉香人參紫暈者白茯苓半夏麴訶子肉木香川薑各一兩白术乾山藥各一兩五錢甘草六錢丁香五錢附子兩筃炮右為細末每服二錢水一中盞生薑三片棗一枚木𤓰一片前至七分食前服桂麴丸出醫方集成健脾胃進飲食助尅化生冷温中下氣治食少易傷胸滿惡心或心腹疼痛病後衰弱氣不復常人參蓽撥白术乾薑炮髙良薑㣲炒縮砂仁肉豆䓻麵裹煨陳皮湯浸去白桂枝各一兩去粗皮甘草剉炒丁香各五錢神麴三兩剉煨炒熟右為末熟湯泡蒸餅和丸如梧桐子大食前一時米飲下五十丸以至七十丸荳䓻橘紅散出醫方集成温脾養胃升降隂陽和三焦化宿食丁香木香各一兩白豆䓻仁人參去蘆厚朴薑製神麴炒乾薑炮半夏麴炒橘紅去白甘草炙藿香葉白术各五錢右㕮咀每服三錢水一盞薑三片棗一枚煎七分温服和中益氣丸出御藥院方治脾胃不和氣不升降嘔吐減食口苦吞酸胸滿短氣肢體怠惰靣色萎黄中焦虚痞不任攻撃藏氣久寒不受峻補又療心胸愊愊如滿五飲停滯不散常服温中益氣進美飲食或大便不通尤宜服之木香丁香各五錢肉豆䓻茴香㣲炒香荆三稜炮剉白豆䓻仁人參去蘆頭桂各一兩去粗皮縮砂仁二兩青皮去白陳皮各四兩去白右為細末白麵糊和丸如桐子大每服六十丸至七十丸食前温生薑湯下通膈丸出醫方集成快氣進食利胸膈消膨脹丁皮蓽澄茄白豆䓻檀香粉草各五錢縮砂仁香附子各一兩木香二錢片子薑黄二兩甘松丁香各三錢右為末用蓽澄茄為母以布蘸水塗濕筐盤一邉滚蓽􅀢茄就乾筐盤一邉上藥末又滚就濕處一邉拌濕再就乾處一邉上藥末即法丸也丸如梧桐子大每服三十丸白湯送下宫方七香丸出直指方治消食快膈和胃止痛木香丁香檀香甘松净丁皮橘紅縮砂仁白豆䓻仁三稜醋炙蓬术各五錢醋炙焙乾大香附二兩五錢炒去毛右為末研米和丸如菉豆大每服三四十丸薑湯下一方用油餅湯泡和丸木香啟中湯治脾胃進飲食寛膈順氣人參白术茯苓甘草半夏枳殻香附縮砂白豆䓻木香陳皮各等分右如法修製為㕮咀每服六錢水一盞半生薑七片棗一枚同煎至八分去滓温服木香枳殻丸治寛胷膈進飲食消食快氣木香㯽榔陳皮去白黄連去鬚廣荗煨當歸去蘆枳殻去穰麵炒青皮已上各五錢黄蘖香附子各一兩五錢去毛麩炒牽牛頭末二兩右為細末滴水為丸如桐子大每服五六十丸食後薑湯送下若有瘡毒急服百丸至二百丸看人虚實加減服但利五七行立消毒腫丁香和胃丸治脾胃不和中脘氣痞胸膈停痰嘔吐惡心脇肋刺痛飲食無味肢體倦怠常服温中和胃止嘔進食丁香木香沉香各五錢藿香葉白茯苓去皮白豆䓻仁陳皮去白白术人參各一兩半夏三兩薑製右為細末生薑汁麵糊為丸如桐子大每服三十丸至五十丸煎生薑湯下不拘時候大七香丸治脾胃不和三焦滯氣不宣通腹脇脹滿胸膈噎塞飲食遲化氣刺氣疰中酒吐酒常服消榖進食方見胃腑門胃虚冷類殻神丸治消食健脾益氣進美飲食人參縮砂香附子炒去毛三稜炒莪术煨青皮陳皮神麴炒麥芽炒枳殻炒去穣各等分右為細末粳米糊丸如桐子大每服三十丸空心米飲吞下鹽湯下亦可足齊安中湯治脾胃一切疾不利三稜炮莪术炮川薑炮良薑炮陳皮連白草菓仁益智仁甘草各一兩一分炙神麴炒麥蘖各三分炒右為細末每服二錢食後鹽湯㸃服大蓽澄茄丸和脾胃進美飲食治脾胃虚滿消積滯化痰飲宜服蓽澄茄一兩青皮去白廣荗煨陳皮去白川丁皮半夏洗七次厚朴各二兩五錢去粗皮用薑製赤茯苓去皮四兩麥蘖三兩炒右為末生薑汁麵糊為丸如桐子大每服六七十丸温生薑湯送下不拘時候白术湯治理脾和胃順氣進食白术厚朴桂心乾薑桔梗人參當歸茯苓甘草各等分右㕮咀每服四錢水一盞棗二枚煎至八分去滓温服不拘時候茯苓分氣散治脾胃不和胸膈噎塞腹脇疼痛小腹氣促喘急下脹滿飲食不進嘔吐不止兼脾氣横泄四肢浮腫五味子