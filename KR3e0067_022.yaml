噦痰逆不思飲食及治小腸疝氣宜服蓽澄茄破故紙各十兩牽牛末三十兩一半炒用木香五兩㯽榔十兩酸陳粟米飯裹㯽榔又用紙裹炭火中煨紙焦去之右為末和匀米糊丸如菉豆大每服十五丸茶湯熟水送下如小腸疝氣發作疼痛用蟠葱散煎送下五十丸通利一二行即愈或用生料五苓散加漢茱萸灯草三十莖煎水送下不拘時一方食後服每酒食後可服五丸或七丸小兒一嵗一丸妊婦不可服之理中湯徳生堂方理中焦不和脾胃中寒胸膈噎塞嘔吐冷痰噫醋吞酸飲食減少短氣虚羸胸膈滿悶心腹攪痛怠惰嗜卧傷寒時氣内寒外熱上吐下痢心氣結痛手足冷傷胃吐血冷濕氣泄水榖不分腸内虚鳴霍亂之後氣體上虚未禁熱藥者並宜服温中散逐寒飲去濕固衛止汗人參乾薑炮白术甘草各一兩炒右㕮咀每服三錢水盞半煎取一中盞去滓空心服傷胃吐血服如本方過啖熱食廹血上行發為鼻衂加川芎能理中脘分利隂陽安定血脈用之效停痰留飲加茯苓半夏導利去之建理停飲心脾氣痛加炮過茱萸三十粒腎氣發動繞臍築痛去术加桂五錢腎惡燥故去术恐作奔豚故加桂以洩之小腸氣痛加桂枝川楝子四肢麻痺加附子天麻各四分之一霍亂後𫝊筋加煆石膏若誤服附子中毒者正用本方或只用乾薑甘草等分煎服仍以黒豆前湯佐之寒濕所中昏暈緩弱腰背强急心腹滿脹胸膈痞塞吐痢交作加附子等分名附子理中湯定齋於本方中甘草但用四分之一更作細末每服二錢入燒鹽㸃服若欲袪氣添入橘皮五錢名加減理中湯若虚寒洩瀉者加茯苓陳皮等分名補中湯若溏泄不已補中湯内加附子一兩若水榖不化食少翻胃更加縮砂五錢名附子理中湯若乾霍亂心腹作痛先以鹽湯少許頓服候吐出令透即進此藥若霍亂吐下心腹作痛手足逆冷於本方中去术加熟附名四順湯若渴者加栝蔞根枳實茯苓名枳實理中湯若悸多者加茯苓一兩若腹滿者去白术加附子一兩若渴欲飲水者添加术五錢若苦寒者添加乾薑五錢理中丸衛生寳鑑治温脾暖胃消痰逐飲順三焦進飲食辟風寒濕冷之邪亦及大病瘥後胷中有寒涕涶不止又治婦人新産五内俱虚血脉未定及産後腹痛作瀉最危急者並宜服之其餘治法理中湯同藥品在前理中湯正四味是也右為細末煉蜜為丸每兩作十丸每丸食前沸湯化服嚼食亦可或作小丸如梧桐子大熟水送下未病方云肺寒作𠻳加五味子阿膠等分脾肺俱受邪寒作嗽不止加胡椒八分之一名胡理中丸二方理脾温胃散寒止𠻳功効特異脾屬土肺屬金土能生金脾為肺母母能令子實肺受寒而濕理脾氣者此其意也治心腹繞痛霍亂轉筋一切沉寒痼冷加附子等分每一丸水煎化服名附子理中湯黒散子補益脾胃青州棗一斤生薑一斤厚朴一兩甘草一兩五錢右剉碎同淹三日慢火炒黒焦置地上出火毒三日為末每服二錢水一盞煎至七分空心服延年草邢和璞真人常服安神順氣消酒食益脾胃老人小兒皆可服昭陵每食後嚼數片神安體健賜吕申公劉斯立秘之名延年草上等白鹽花五兩再淋煎方用須要雪白新舶上茴香四兩甘草六兩炙剉碎青皮一斤湯浸三日換水浸苦味去盡然後去穰切作指靣大方片子右用甜水一斗同藥入銀鍋熬不住手攪勿令着底置宻器中收不得走氣候水盡取出慢火炒令乾不得有焦氣選勤謹者一人専一掌之去甘草茴香不用只取貯青皮如傷寒生冷及菓實蔬菜之類即嚼數片氣通即無恙常服一二片極佳以其尤宜老人邢和璞所以名萬年草斯立又以延年目之也加減平胃散治脾胃不和不思飲食心腹脇肋脹滿刺痛口苦無味胷滿短氣嘔噦惡心噫氣吞酸靣色萎黄肌體瘦弱怠惰嗜卧體重節痛常多自痢或發霍亂及五噎八痞膈氣反胃並宜服之常服煖胃消痰除山嵐瘴氣蒼术捒堅實者剉為兩叚以米泔浸一日一换一宿後以竹刀刮去皮再浸至濕透盡去油為度不可致爛再洗浄焙乾五兩五錢厚朴厚者去粗皮剉如小豆大生薑自然汁浸至浸過三日人換一畨浸五六日炒令去油嚼之不粘牙為度亦不可焦三兩五錢粉草劈片慢火炙令香熟不可傷火一兩橘皮揀真橘皮旋浸旋以瓦磨去白令盡不可久浸去味焙乾三兩五錢右為細末每服二錢水一盞入薑二片乾棗二枚同煎至七分去滓温服或去薑棗𢃄熱服空心食前入鹽一捻沸湯㸃服亦可一方以棗肉為丸如小豆大每服五十丸温生薑湯下空心食前常服調氣煖胃化宿食消痰飲辟風寒冷濕四時非節之氣一方加人參茯苓如小便赤色加白茯苓澤瀉如水榖不化飲食多傷加枳實如胸中氣不快心下痞氣加枳實木香如脾困弱不思飲食加黄耆人參如心下痞悶腹脹者加厚朴甘草減半如遇夏則加炒黄芩如遇雨水濕潤時加茯苓澤瀉如遇有痰涎加半夏陳皮凡加時除蒼术厚朴外依例加之每一服五錢有痰用半夏五分如𠻳飲食減少脉絃細加當歸黄耆用服如脉洪大緩加黄芩黄連如大便硬加大黄三錢芒硝二錢先嚼麩炒桃仁爛以藥送下一方名天下受拜平胃散一方加草菓名草菓平胃散一名棗肉平胃散治脾胃不和嘔吐痰水氣刺氣悶脇肋虚脹膓痛腸鳴胸膈痞滯不進飲食常服温養脾元平和胃氣寛中進食並皆治之又選竒方厚朴去皮陳皮湯浸去白生薑和皮甘草剉各三兩茅山蒼术去皮米泔浸一宿剉五兩南京小棗二百枚去核用水五升煮乾搗作餅子曬乾再焙研為末每服二錢鹽湯㸃服泄瀉薑五片烏梅兩箇鹽少許水盞半煎服若瀉脾濕加茯苓丁香白术為調胃散一法加藿香半夏若加乾薑為厚朴湯若温疫時氣二毒傷寒頭痛壮熱加連根葱白五寸豆䜴三十粒煎二三服㣲出汗即愈若五勞七傷手脚心熱煩燥不安百節酸疼加柴胡若痰嗽瘧疾加薑製半夏若本臓氣痛加茴香若水氣腫滿加桑白皮若婦人赤白帶下加黄耆若酒傷加丁香若飲冷傷食加髙良薑若滑腸泄瀉加肉豆䓻若風痰四肢沉困加荆芥若腿膝冷痛渾身虚壅拘急加地骨皮若腿膝濕痺加兎絲子若白痢加吴茱萸若赤痢加黄連若頭風加藁本若轉霍亂加南木香若七邪六極耳鳴夢泄盜汗四肢沉重膝腿酸痛及婦人宫藏久冷月脉不調者加桂若胃寒嘔吐加生薑一法加茯苓丁香各三兩共成六味若氣不舒快中脘痞塞加縮砂仁香附子各三兩生薑煎服若與五苓散相拌為對金飲子若六一散相合為調胃散若欲進食加神麯麥蘖吴茱萸蜀椒乾薑為茱萸湯若加藁本為和氣散治傷寒吐痢加半夏霍香為不換金正氣散若瘧疾寒熱者加柴胡若小腸氣痛加茴香苦梗一方老人飲食輙噎及痼冷加吴茱萸生薑煎心怔忪小便不通加木通生薑煎氣虚胃寒痼冷加附子生薑煎若風熱頭痛加𦍑活生薑煎有風頭痛加細辛生薑白痢加乾薑肉豆䓻生薑煎脾虚發寒熱作瘧加防風草豆䓻煎小兒脾虚吐瀉發驚加天麻川芎如禀氣弱入少附子氣實可不用婦人小便白濁為心胸寒熱不分加茯苓石葛蒲煎胃虚咳嗽加五味子生薑胃虚詭言如見鬼状身無大熱加防風逺志煎夜夢見鬼交加龍骨煎肺虚咳嗽加五味子生薑煎有邪熱發熱吐血加紫苑黄耆煎胃寒大嘔吐加吴茱萸半夏生薑煎食傷肚脹痛揉之益痛加枳殻一指大生薑煎有熱甚則欲上髙而歌棄衣而走數日不大便加大黄一錢煎以取利一行若便自利只用防風逺志若隂聞木音則惕然而驚心欲動獨閉户而處脉細氣弱不下飲食忽爾振寒皆胃虚寒所致加附子厚朴各一指頭大小兒不用附子用縮砂生薑煎久痢不愈者有二一瘦瘠腹脇滿此為積毒加神麯木香煎其胃虚腸滑瘦瘠不思飲食臍腹按必有痛加赤石脂肉豆䓻煎人經云按之有益則為内虚按之無益則為内實一凡腹痛按之遂止此為有益是虚加赤石脂豆䓻煎一凡腹痛按之愈痛為無益是内實加神麯木香煎内選一竒方云諸藥人常服獨此方者透滋味相和而美與衆方不同故佳大養脾丸百一選方丁香皮良薑各一兩藿香葉甘草各一兩五錢右並生用碾為細末煉蜜為丸如彈子大隨意服之扶老强中丸出百一選方温煖五臓大健脾胃充肌壮體通和血脉消食除痰破癥散積寛膨進食化水榖補中神麯炒二十兩吴茱萸揀净炒乾薑炮各四兩右為細末煉蜜丸如桐子大每服四五十丸不拘時米飲熱水任下又方加陳皮青皮各二兩麵糊為丸常服邢醫云加白茯苓四兩尤佳又一方加烏頭剉炒五兩一方薑湯下一百丸益中丸出簡易方健脾煖胃消化冷痰治中滿脹悶噫氣吞酸心腹時痛不進飲食神麯炒麥蘖炒良薑炒陳皮各一兩枳殻去穰麩炒肉豆䓻麩裹煨丁香各五錢右為細末麵糊丸如梧桐子大每服五十丸温米飲熱水任下不拘時候四倍散和劑方治大人小兒脾氣不順補虚進食定吐白茯苓去皮二兩人參去蘆一兩訶子煨去核五錢白术四兩右為末每服一錢水一盞薑三片棗二枚煎至六分空心温服如早辰常服大妙厚朴丸出御藥院方和脾煖胃補虚益氣治心腹疼痛胸膈虚痞腹脹腸鳴口苦吞酸肢體倦怠飲食減少痰逆惡心時發嘔吐大便不調或即泄瀉川厚朴生薑汁製去皮四兩乾薑炮川椒去閉口及目㣲炒桂去粗皮各二兩右為細末水煮麵糊為丸如梧桐子大每服三十丸至五十丸食前温米飲送下草豆䓻散出和劑方治脾胃不調胸膈滿悶飲食不化嘔逆惡心或霍亂嘔吐心腹刺痛腸鳴泄痢水榖不化草豆䓻去皮一斤生薑切竹片二斤甘草剉八兩右件拌匀入於銀器内水浸過三指許以慢火熬令水盡焙令乾杵為細末每服一錢用沸湯㸃服不計時候夏月煎作熱水常服調中吐逆除冷氣消冷食寛中丸治氣滯不快飲食不消胸膈痞塞凝痰聚飲状如傷寒頭疼胷痞用大附子炮去皮劑青皮大黄濕紙裹煨各等分右為細末醋糊丸如梧桐子大每服十丸薑湯送下三炒丹出百一選方治脾腎吴茱萸一兩去枝梗洗浄以破故紙一兩慢火炒候香熟去破故紙草菓仁二兩以舶上茴香一兩炒候香熟去茴香葫蘆芭一兩以山茱萸一兩炒候香熟去山茱萸右為細末酒煮麵糊丸如桐子大每服六十丸鹽湯下白术散出濟生㧞萃方治四肢懶倦小便不利大便易走沉困飲食減少白术芍藥茯苓各等分右為末水煎如發熱或惡熱或腹下痛而脉疾黄連為主如未見膿而惡寒乃太隂而𫝊少隂加黄連為主桂枝佐之如腹痛甚者加當歸倍芍藥如見白膿為主如見血黄連為主桂枝當歸佐之茴香丸出肘後方治脾胃進飲食茴香二兩味辛平生薑二兩味辛㣲温惡黄芩黄連天鼠糞右同搗令匀入浄器用濕紙蓋一宿次入銀石器中文武火炒令黄焦為末酒丸如梧桐子大每服十丸至十五丸茶酒下食藥三稜丸出百一選方治脾胃因饑飽不時生病陳倉米四兩揀净以新好色巴豆二十一粒刮去皮慢火同炒候倉米香黄巴豆黒色為度不令米焦揀去巴豆不用只用陳倉米橘皮去白焙乾與倉术等分稱右為細末白麵糊丸如黍米大每服三四十丸薑湯下少入甘草亦可一方治諸般積聚百物所傷陳米一升數年者巴豆一兩去殻同炒令紫色為度去巴豆不用秤炒米四兩入陳皮一兩麝香少許神麯丸如菉豆大每服二十丸薑湯下食後服小兒慢皮風只五丸甚妙一云食藥用巴豆者春冬可服夏秋不可服易動臓腑一方無巴豆製米以薑汁糊為丸米飲下名太倉丸指迷寛中丸出簡易方治脾胃不和冷氣客於中則氣收聚而壅遏不通是為脹滿橘皮四兩白术二兩右為細末酒糊丸如桐子大食前木香湯下三十丸治脾强胃弱用升麻湯加黄連厚朴二橘散養脾胃進飲食青橘皮湯浸去白焙陳橘皮湯浸去白焙各二兩益智去皮㣲炒蘹香子炒荆三稜煨研碎木香肉豆䓻仁各三分縮砂仁去皮人參各一兩薑黄甘草各五錢炙剉右搗羅為散每服二錢七入鹽少許沸湯㸃服空心食前奪命抽刀散出仁存方治男子婦人脾胃積冷中焦不和心下虚痞腹中疼痛胸膈逆滿噎塞不通嘔吐冷痰飲食不下噫氣吞酸口苦無味不思飲食婦人久病血氣刺痛不可忍者男子或當空露外或受風露之邪得心痛積年大効乾薑剉入巴豆五錢同炒至黑色即去巴豆良薑入斑毛一百箇同炒即去斑毛各二十兩糯米二十五兩炒石菖蒲不見火二十二兩右為細末每服二錢用鹽少許沸湯㸃服不拘時常服醒脾胃進飲食此藥大解酒毒空心食前服或温酒調尤佳一方以去殻巴豆炒蛤粉去巴豆入内煎服若尋常氣痛不用巴豆炒只加炒蛤粉亦得或甚而心腹痛大便秘者巴豆同粉研爛同油刀散醋糊丸服二三粒大腑通為度守中金丸出和劑方理中焦不和脾胃積冷心下虚痞腹中疼痛或飲酒過多胸脇逆滿噎塞不思飲食又治傷寒時氣裏寒外熱霍亂吐痢心腹繞痛手足不和身熱不渇腸鳴自利米榖不化及咳𠻳無時嘔吐冷痰飲食不下噫醋吞酸口苦無味怠惰嗜卧乾薑炮甘草炙蒼术米泔浸桔梗去蘆右各等分煉蜜為丸如彈子大每服一丸食前沸湯嚼下又治脾胃留濕體重節痛靣色萎黄肌肉消瘦常服温脾煖胃消痰逐飲順三焦進美飲食辟風寒濕冷五味湯出類鈐方温中益氣治胸膈痞滿心腹刺痛短氣噎悶咳嗽痰唾嘔逆惡心不思飲食五味子洗九斤良薑炒陳皮去白茴香炒一斤甘草炒七十斤半鹽炒一十二斤右為細末每服二錢沸湯㸃服撾脾湯出類鈐方治脾胃不和宿酲留滯嘔吐酸水心腹脹痛不思飲食傷冷洩瀉麻油四兩良薑十五兩茴香炒十兩半甘草十一兩七錢右炒鹽一斤同藥炒為細末每服一錢白湯下常服快氣大解中酒進美飲食秦綾錦家二十四味養脾丸傳信適用方治風冷寒濕邪氣腹脹痞滿刺痛腸鳴泄瀉吐逆吞酸羸弱困怠無力不思飲食一切脾胃之疾並治之丁香陳香木香各一錢五分附子六錢五分炮去皮臍秤陳皮去白五錢大腹皮神麯炒各五錢白术大麥蘖炒肉桂去皮不見火各一兩五錢厚朴去皮薑汁製三兩訶子炮去核一兩三錢人參去蘆茯苓各四錢縮砂仁八錢蓽澄茄白附子炮髙良薑油炒紅豆去紅皮楜椒炒甘草炙川薑炮各二錢生薑十四兩切作片焙乾調和胃氣本草以乾薑去皮於鐺鍋中㣲火緩逼乾為末量多少入生薑末為湯㸃凡遇處暑節暑猶未退宜㣲收實毛皮益衛氣秋以胃氣為本藥中加時藥使邪氣不能傷也以益元氣調胃主之人參三分益氣和平當歸身三分佐和血潤燥陳皮去白三兩順氣和平熟地黄三分佐養血瀉隂火潤燥白芍藥四分臣大補脾胃㣲收治風木之邪升麻三分使使陽明之氣上升以滋榮百脈柴胡二分使引少陽之氣出於胃中使風行於地之上黄茋五分臣實皮毛止自汗益元氣半夏湯洗三分佐療風痰胃氣進食麥門冬去心三分佐猶有暑氣未退安肺氣得秋分不用白术二分佐養胃氣厚腸胃和中炙甘草二分調和胃氣温中益氣右㕮咀都作一服水二盞煎至一盞去滓温服忌食辛熱之物及助暑氣秋氣不能收也正氣得復而安矣厚朴丸出十便良方治脾虚受濕濕勝則濡泄故腸鳴夜起四肢浮腫困怠少力厚朴一斤生薑半斤浄洗切作片附子七分者四枚大棗五十枚人參訶子白术白茯苓肉豆䓻木香以上六味各二兩右將前四味入銀石器中以水一斗慢火熬乾取棗去皮核四物一處搗如泥將人參等六味作細末和匀入少麵糊同搜和杵千下丸如桐子大每服五十丸米飲送下食前木麴丸出十便良方進飲食快中脘神麯四兩大麥蘖二兩橘紅白术各一兩白豆䓻五錢右為細末浸蒸餅心為丸如桐子大每服三五十丸不拘時候濃煎人參湯下日進三四服健脾人參丸出十便良方治脾胃乆虚飲食全減鍾乳粉二兩人參石斛各三分大麥蘖乾薑陳橘皮各五錢右為細末水煮麵糊為丸如桐子大每服二十丸空心米飲下厚朴煎出十便良方治脾胃虚冷腹脇刺痛飲食進退大便秘厚朴四兩陳皮三兩乾薑二兩附子一兩右為細末棗肉和丸如桐子大每服三十丸空心米飲下厚朴煎丸出十便良方補脾健胃强中逐寒大去冷痰兼止吐瀉倍進飲食厚朴一斤紫黒者去粗皮剉如指靣大以生薑半斤和皮切作片子水三升慢火熬乾去薑不用乾薑四兩炮附子炮去皮臍二兩右為細末生薑煮棗肉丸如桐子大每服三十丸至五十丸空心米飲下六君子湯出十便良方治胸膈痞悶脾寒不嗜食服燥藥不得者正宜服此甘草陳橘皮白术人參白茯苓半夏各等分右各等分為粗末每服五錢以水二盞加生薑五片同煎至一盞去滓温服不計時候丁香平胃散出十便良方理一切氣温和脾胃大進飲食止腹痛療泄瀉厚朴白术各六兩甘草陳橘皮各二兩五錢縮砂仁丁香各二兩右件為細末每服三錢水一盞生薑七片棗三枚同煎八分温服食前胃愛散出十便良方治脾乆虚中焦氣滯上壅或有冷痰上潮嘔惡或有胸腹疼痛不思飲食丁香一分人參一兩白术茯苓甘草各一分肉豆䓻三箇乾薑各五錢黄耆一錢右白米二盞同碾為細末每服二錢水一盞入生薑一片同煎至七分通口服如臓腑不調加丁香十四粒石蓮心七粒同煎七分通口温服空心食前厚朴煎丸醫方大成温中下氣理脾進食常云補腎不若補脾然胃既伏則飲食進飲食既進榮衛血氣自盛矣厚朴一斤極厚者去皮剉如指靣大用生薑二斤不去皮净洗切片用水五升同煮水盡去薑只焙乾厚朴乾薑舶上茴香各四兩附子二兩炮去皮臍甘草剉半寸長二兩二味再用水五升同焙厚朴處煮水盡不用丼草只將乾薑厚朴焙乾右同為末生薑煮棗肉丸如桐子大每服五十丸米飲下厚朴丸治風經驗方治脾胃氣弱胸中滯悶痰飲不思飲食或大便不調厚朴去粗皮塗薑汁炙香焦一兩木香一分陳橘皮去穰焙一兩㯽榔四箇肉豆䓻仁四箇右為末别用神麯一兩杵碎炒熟為細末以生薑自然汁調煎作糊丸如梧桐子大每服二十丸至三十丸生薑湯下稍空服紫蘇散王氏博濟方治肝氣盛行於脾胃致多飱泄調順中脘平和胃氣紫蘇葉一分㨂擇净控乾紫花白术五錢細剉㣲炒黄色肉豆䓻一分去殻青橘去白一分蠻薑半分炮縮砂仁一分芎一分天雄一分剉碎以鹽一分同炒令黄色佳右件九味同為細末每服二錢水一盞入生薑三片同煎至五分温服日進三服白豆䓻散王氏傳濟方補中益氣調順脾元心胸滿悶不思飲食上熱下冷宜服白豆䓻仁五錢肉豆䓻仁三箇肉桂去皮五錢白术一兩青橘皮去穰五錢甘草三分炙厚朴去皮薑汁炙五錢右件七味同為細末每服三錢水一盞入生薑二片粟米少許棗三枚同煎至七分去滓熱服之人參訶子散王氏博濟方和胃氣進飲食草豆䓻二枚煨甘草五錢炮茯苓五錢人參一分訶子二枚炮陳皮去白五錢蒼术一分炙右同為末每服二錢入煨生薑二塊水一盞煎至七分温服桂附丸衛生家寳方治脾胃進飲食香附子厚朴陳皮甘草蒼术桂心三稜肉豆䓻一箇煨阿魏各五錢别研右為末酒糊為丸如龍眼大每服一丸生薑一塊切開作孔安藥在内合定濕紙裹煨後熱鹽湯嚼下煮朴丸衛生家寳方補氣化痰温脾進食好厚朴去皮取四兩附子三兩去皮生用切作片陳皮二兩不去白川乾薑一兩剉青州棗取肉半斤右件入鍋内用水浸過二指煮盡為度慢火炒乾不得令焦入舶上茴香一兩炒白术一兩白茯苓一兩神麯二兩炒别為末右一處為末用神麯為丸如桐子大空心食前下一百丸米飲吞下平胃煮散衛生家寳方寛中利膈消酒進食快脾胃止嘔逆霍亂吐瀉辟四時惡氣時氣嵐瘴諸病或酒食後尤宜進之此藥療疾有異効不可盡述蒼术四兩洗浄剉細作片子先以米泔浸一宿了漉出復用淸水浸一宿漉出焙乾或曬乾用白术二兩橘皮去白取二兩棗四兩剉碎厚朴去粗皮取四兩先以生薑自然汁浸一宿火上炙令香剉細生薑四兩切作片甘草二兩剉作半寸許右件依數修合事了以磁鍋或銚或缾入藥在内以水淹浸二三寸許文武火煮乃不𦂳不慢火候煮藥同乾將出火焙燥碾羅為細末每服二錢水一盞入生薑二片棗一枚同煎至八分服白水煎亦可或沸湯㸃服並宜早晨空心常進一服九寳湯衛生家寳方和中化痰快脾胃用真厚朴去粗皮秤三兩半夏三兩沸湯炮九次切成片焙乾作粗末二味共六兩和作一處用生薑十二兩浄洗和粗皮搗令細同厚朴半夏浸一宿日曝乾却入後藥甘草炙桔梗一兩去蘆酒浸切碎炒令黄色藿香三兩陳皮三兩人參一兩紫蘇葉三兩右為粗末每服三錢水一盞入紫蘇十葉煎至六分去滓不拘時候服正脾散衛生家寳方調脾養胃順氣治倦怠腹痛進飲食此藥大治酒後數便如痢氣瀉脾疼等疾不可盡述凡嶺外瘴瘧若能空腹一服永無所苦𦂳實大蒼术一斤米泔浸一宿去皮薄切焙乾秤粉草二兩南木香一兩不見火桂心一兩去粗皮不見火吴白芷一兩粉薑一兩益智仁一兩陳橘皮二兩去穣荆南茴香一兩右為細末每服一錢水一盞紫蘇二葉或棗子一箇同煎至七分入鹽少許通口喫食前日三服如大便壅秘則食後時以青木香丸服得臓腑氣快為妙健脾丸經効濟世方温煖脾胃増進飲食厚朴一斤去皮切棗二斤去核切生薑一斤去皮切右三味先入鍋内猛火炒匀攪候紫焦傾出為粗末每末一斤入良薑四兩乾薑四兩炮製神麯四兩同為細末煉蜜為丸如梧桐子大每服三五十丸空心米飲送下加附子二兩炮去皮臍和中丸出濟生㧞萃方補脾胃進飲食乾生薑橘皮人參各一錢乾木𤓰二錢炙甘草二錢右為細末湯浸蒸餅為丸如梧桐子大温水送下調脾散續易簡方治脾胃少有不和可常服蒼术米泔水浸一宿冬月則浸二宿焙乾炒令赤色秤八兩厚朴去皮五兩薑汁炒甘草一兩炙右為細末每服二錢用燒鹽湯㸃七分温服或用水一盞薑三片棗二枚煎七分食前服或作丸散温脾煖胃散廣南四時橘生論陳橘皮白术厚朴各一兩右為散每服一大錢水一盞入薑棗同煎至七分空心温服沉香養脾丸華陀中藏經方人參白术川麵薑炮甘草炙丁香木香肉豆䓻麵裹煨縮砂八味各五錢沉香一分右為末煉蜜丸一兩作十粒每服一粒食前嚼下化下亦得枇杷葉散朱氏集驗方調理脾胃清膈下氣去積滯舒氣除痰推陳納新養生之要也不可缺也丁香乾薑半夏湯浸洗沉香枇杷葉薑汁塗炙肉豆䓻各三錢麵裹煨甘草各五錢五分白豆䓻仁炒陳皮縮砂仁炒各六錢茯苓去木白术各一兩檳榔二錢五分煨青皮四錢五分木香四錢右㕮咀每服三錢水一盞半生薑三片棗子一枚煎至七分不拘時候運脾散十便良方縮砂吴术人參藿香肉果丁香神麯各一兩甘草五錢右件為細末服時以橘皮湯㸃之通中健胃消食中和湯十便良方調適隂陽通流榮衛養脾進胃快飲食治脇肋脹滿止嘔逆惡心白术四兩黄橘皮厚朴人參甘草茯苓各二兩五錢右為細末每服二錢水一盞入生薑三片煎至七分去滓食前温服安胃丸衛生寳鑑方治寒邪傷胃温中補氣安胃進食縮砂二錢陳皮三錢木香一錢白术五錢青皮二錢白茯苓二錢乾薑三錢炮大麥蘖五錢右為細末湯浸蒸餅為丸如桐子大每服三十丸温水送下食後忌冷物補中丸衛生寳鑑方補脾虚調胃進飲食止瀉痢定痛厚朴一兩乾薑五錢炮白茯苓一兩去皮陳皮一兩去白甘草一兩炙右為細末煉蜜為丸如櫻桃大每服一丸空心食前白湯化下嚼亦可沉香湯楊氏家藏方温脾快膈進飲食除嘔逆沉香五錢甘草五錢炙檀香三分白豆䓻三兩縮砂仁六分半木香三分麝香半字另研右件為細末入麝香研匀每服一錢入鹽少許沸湯㸃服進食散朱氏集驗方調胃進食療腹脹吐逆青皮陳皮甘草肉桂附子炮草菓子訶子良薑白薑右等分㕮咀生薑三片棗子一枚水一盞半煎至一盞空心一日三服厚朴煎丸詵詵方凡補脾胃進飲食滋榮衛固精血孫兆云補腎不如補脾胃蓋脾能運化飲食也茴香炒黄川椒炒少時各四兩附子炮益智仁各二兩厚朴半斤去皮剉如指靣大用生薑半斤𢃄生薑切作片子用水三升慢火煮乾去薑乾薑四兩研如骰大用甘草二兩剉半寸長用水五升同煮焙乾去甘草右為末用生薑煮肥棗約一斤去皮取肉和丸如桐子大每服五十丸空心米飲下此藥温中升降氣血進飲食化痰涎極有神効人能常服此藥久則補助脾氣無白濁白滛之症自然無病丈夫婦人皆可服拾珍散出簡易方治大病之後氣不復常乏力短氣精神不足口苦無味揀參白术白茯苓黄耆蜜炙白扁豆薑製山藥各一兩縮砂仁桔梗五味子甘草各五分炙右為細末每服三錢水一盞薑三片棗二枚煎至七分食前服之助氣益脾胃用鶻嘲烏一枚煮炙食之頓盡一枚至驗鶻嘲似雀尾短黄色在深林間飛翔不逺一名鸛一名鳴鳩或呼為鶻硇砂丸以硇砂不計多少用罐子内著硇砂上靣更座罐子一箇用紙筋白土和上下俱泥了窨乾後從辰初時便用蒼耳草自在落下葉將來搗羅為末藥上鋪頭蓋紙上靣罐子内用水坐著水旋添火燒從罐子外五寸已来圍遶欲盡更添火移向前罐子周廻火盡更促向前計一伏時為度更不移火即閒雜人及婦人不得見一伏時住取来搗羅為末醋煮麵糊為丸如梧桐子大每服逐日十丸至十五丸温酒或米飲下並無忌若熟燒喫二三斤進食無病脾胃俱實附論夫右手闗上脉隂陽實者足太隂與陽明經俱實也病苦脾脹腹堅搶脇下痛胃氣不轉大便難時反泄痢腹痛上衝肺肝動五臟立喘鳴多驚身熱汗不出喉痺精少名曰脾胃俱實者也方瀉熱方出千金方大黄麻黄黄芩各四兩杏仁赤茯苓甘草橘皮芒硝澤瀉各三兩右㕮咀水九升煮三升絞去滓内大黄煮兩沸去滓下芒硝分三服大黄瀉熱湯出千金方治脾脉厥逆大腹中熱切痛舌强腹脹身重不下心注急痛大黄細切水一升半别漬一宿甘草各三兩澤瀉茯苓黄芩細辛芒硝各二兩橘皮二兩右㕮咀以水七升煮三升三合去滓下大黄更煎兩沸去滓下芒硝分三服瀉黄散出危氏方治脾胃壅實口内生瘡煩悶多渇頰痛心煩唇口乾燥壅滯不食藿香葉七錢石膏煆縮砂仁山梔子各五錢甘草各五錢防風去蘆四兩右剉同蜜酒炒香焙為末每服三錢水一盞煎至七分服不拘時候普濟方卷二十二
