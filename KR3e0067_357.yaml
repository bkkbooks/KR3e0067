末先用荷葉朴消湯浸出者塊肉令暖次以前末挼入以縮砂仁末二錢點服再不入或遇熱出以茅根湯洗訖用萆麻子糯米浸過研為末安頂上即取上急洗去家傳方取麥麩內踈布袋中置熱湯盆內擺洗候湯溫令産母坐其上腸浸其中頻以麥麩袋動其水須臾自收海上方細辛麝香右為末搐鼻中得噴嚏則腸收矣一方云凡通關藥皆可用葉氏方用朴消煎湯浸腸令暖自然收縮連氏方白礬末一兩調米醋一碗入淨小桶以硬炭火置內急令産母坐其上薰之千金方鱉頭燒灰傅膞上仍用水調服又方羌活酒煎服韓都事方蛇床子韶腦糊椒紫花梢右等分為末每服五錢煎湯薰洗又方全蝎細末口含水以藥搐鼻立效沈氏方卷柏半兩銼碎瓷瓶水煎熱薰溫洗治産後生腸出不收白扁豆花山豆根花右等分為末每服四錢溫紅花酒調下立收入腹又方枳殼荆芥煎湯薰洗五倍子末粉腸上又方令婦人坐臼上研萆麻子膏塗頂心密令以水噴其面倐然一忍擡身振動腸已收矣謝氏方血竭乳香右燒煙薰即入千金翼方海螵蛸硫黃右為末粉腸上催生附論夫五行論命以年月日時支干所遇五行所屬相生相植以推人之貴賤其間最切要者時也若林開命書以年為父母為己身月為兄弟僚友日為妻妾上官時為子孫帝座蓋人之生也得其時則終身冨貴失其時則終身貧賤信乎人生之時不可忽也然則人生之時正危急之時是知人有諸生産之難若産起坐既久勞力困倦又宜急趂以救其危當此之時又何暇論其時耶設夫妊娠行年法若行年有與本命相值産室內當求鞍轡仍布馬皮於灰草上令妊婦臨産時踐之手攀鞍轡頭則易産之醫者便以此等物為産卧所需之物誠謬論也其所以然者謂娠婦行年偶遇本命相值於所産嵗月慮有諸般艱難之厄故以此厭穰之取其快速之意耳如或不值則無用矣方石竹花湯石竹花三錢木通滑石葵子榆白皮各五錢枳殼五錢百草霜一錢右為末清油少許沸湯調服久而未生再服即下龍脫散催生祕傳蟬螁一兩燒存性大蛇蛻火燒存性一條滑石半兩葵子一兩微炒右為末每服一錢順流水微溫暖調下不可使熱湯催生大聖丹如無鮮腦用米飲搗和片腦麝香母丁香臘月兔腦子右用兔腦子搗和為丸用金箔為衣如梧桐子大臨産時用酒或羹湯米飲咽下男左女右手握出萬不失一是驗催生草藥用墻基邉煮銀酸草取一大握取順流水以砂盆順擂四十九轉以酒和汁與産婦食即降朱雄丸催生貼臍法一名萬金不傳遇仙方一名遇仙雄黃丹雄黃朱砂各一錢萆麻十四粒去皮蛇蛻一尺右為細末將水飯和丸如彈子大臨産時先以椒湯淋洗臍下次以藥安於臍中用醋紙數重付藥上以帛繫之須臾即生急取下一方用躐紙亦可一名金彈丸産畢將藥候乾再研細用飯丸每丸救三人治橫生倒生或胎死不出凡産難證候方書所不療者悉皆治之催生之藥如五苓五積如神如聖常用皆驗多具於右倘一時取藥不及即用此丸最效如聖散黃蜀花三錢焙乾無花用子爛研少半好當歸二錢焙乾右為末每服二錢熱酒調下如不飲酒用湯服必效伏龍肝散催生伏龍肝石燕右等分為細末研令極細每服二錢煎當歸湯調下入雞子清一箇尤妙亦下死胎糖油飲治催生橫逆死胎皆可一名二仙膏真麻油蜂糖各一兩右用新碗二隻各煎令沸又傾作一碗再煎令沸候溫作一服未産再服催生藥方暑月熱可用蜀葵子半合煎湯調五苓散冬月冷可用蜀葵子一撮煎生料五積散服千里馬散一名神驗散拾路上草鞋一隻燒灰淋汁用碗覆之飲其水效一方用鼻終小耳燒灰溫酒調服或木香湯調下三錢如得左足者男右足者女覆者兒死側者有驚自然理也似非切要之藥催生極驗蜾􅀈散是人家壁上呪兒蜂做底窠兒尋之泡湯以飲逢單則陽逢雙則隂是驗催生方用天仙子不以多少取梧桐根皮以順流水煎湯吞下立産此藥生於江村近水處生青熟黑八九月採又方用初生黃牛犢生下便剝取黃蹄焙為細末水煮薄糊為丸朱砂為衣順流水吞下日月餅治催生用杏仁一箇和皮劈破兩片寫日月兩字復合用菜葉包以酒吞下催生方用赤馬皮臨産鋪之令産婦坐上催生丹用兔頭二箇臘月內取頭中髓塗於紙上令風乾通明乳香二兩碎入前乾兔頭髓同研須臘月修合合時候夜星宿下安卓子上設香果茶同一處排定須是潔淨齊戒焚香望北帝拜告云大道弟子某修合救世上難生婦人藥願降威令助祐此藥速令生産禱訖再拜用紙帖同露之莭次燒香至來日日未出時以豬肉搗和丸如雞子大用紙袋盛貯透風處懸每服一丸醋湯下良久未産更用冷酒下丸即産催生方隨其便而用之以蛇含石火煆醋淬七次為末每服一錢醋湯調下催生方用蜀葵子四十九粒滑石白芷百草霜各三錢為末雞心炒酒調空心二服如人行五里即下催生極效真祕方用千人踏即路旁東厠上兩足所踏板上泥土以竹箆刮起研篩去沙加麝香少許擂早米飲丸如櫻桃大瓦罐封收候産婦坐草時痛至盛順取長流水送下不可服藥太早服催生方取老鴉醋草生用不以多少臨産時砂盆內搗爛不可擂布帛絞取汁半盞順流水半盞相和火上溫過如五月五日採隂乾為末收起臨産調服又方用乳香燈心同研細不用燈心却用蚌粉炒去粉二味不以多少以豬心血為丸如雞頭大朱砂為衣每服一丸冷酒磨下服之一名乳朱丸催生方用好京墨新汲水濃磨服之墨水褁兒立出效又方豬脂一兩臘月者蔥白一寸切右同熬成油去粗通口服一方熱酒調下一錢催生兔血散以臘兔血蒸餅切作片子蘸之紙袋盛挂當風處隂乾為末煎乳香調下二錢又方以臘月兔腦髓塗於一張簿紙上更用一張紙合拓以稱錘槌三五十下每遇難生看大小書天生兩字作符以醋湯調下一方用叉股夾定燒灰丁香酒調下催生神妙珠丹一名推生乳香膏右將乳香研細用豬心血為丸如梧桐子大以硃砂為衣晒乾每服一粒如大段難産時以蓮葉心蒂七枚水二盞煎一盞放溫化下二粒良久未下可再服此藥靈驗如神無有不下者如胞漿先破惡水來多胎乾不得下須先與四物湯及通真丸補養血氣次更濃煎蔥湯放冷如體冷坐婆洗産户頭是欵曲洗令氣上下通暢仍更用酥調右末塗産户裏次服前催生藥則萬全矣如死胎不下者用黑豆三合好酒半升煮令豆爛取汁一盞化下藥一粒須臾便下矣萬一未下亦可再服如胎下胞衣未下者服此亦便下也若胎橫逆不順即先服如聖黑神散方已見前類再服此藥催之無有不立下者矣又此方修合時須用五月五日午時其藥最為靈驗否則用七月七日三月三日及月初上辰日修合亦可一云乳香為末豬心血為丸硃砂為衣如用催生冷酒化下良久未下再服一粒一方用母豬血和入硃砂為丸催生用藥法一催生多用滑利迅速之藥如兔腦筆頭灰弩絃蛇皮等是也二催生若是水血先下子道乾澀不能下者如豬脂蜜油酒蔥白葵子牛乳榆白皮滑石等是也三催生若稽停勞動之久冷風乘虛挾於胞胎使氣血凝滯而不下者加牛膝蔥桂五積散加順元散之類是也四催生有觸犯禁忌如臘月兔腦硃砂乳香之類是也應急方催生隨其便用之用清油同蜜少許湯調頓服小品方令易産以飛生一枚槐子故弩箭羽各十四枚合搗丸桐子大以酒服二丸令易産也滑胎散催生滑胎冬葵子肉桂去皮澤㵼榆白皮右件各等分為㕮咀每服三錢水一盞生薑三片煎七分去滓乘熱服食前催生如聖散黃蜀葵子去蒂蕚蘆葵子尤妙右焙散為細末溫酒調服熱湯亦可若曽漏血臟連丸喫三服覺腹中氣寬一方用順流水溫暖調亦下死胎又方主催生槐子炒麥蘖炒當歸炮貝母炒滑石各等分右件五味同為細末每於産月十日前每日空心用酒調下二錢凡生産須服此四般第一於産前服滑胎散牽牛子一兩赤土右件二味研極細初覺疼陳頻時煎榆白皮湯調下五積散主催生陳皮製六兩麻黃三兩枳殼六兩白芍藥川芎當歸甘草炙茯苓半夏製肉桂厚朴白芷各三兩乾薑四兩桔梗十三兩蒼术二十四兩右㕮咀慢炒令色轉續入肉桂枳殼薑蔥煎麻黃名和氣飲如催生加杏仁南星阿膠酒水煎服催生雲母粉一塊如雞子大研細澄過醇酒服即順生治婦人臨産渾身痛漿破血下未得分解催生方須是漿破血下然後可喫若孕婦漿未破血未下但覺渾身痛甚腰痛及疼經數日身體困重亦可進服凡渾身痛必是腰痛方是欲産也若未是産誤喫此藥即損母牲命須是産不下方可吃也官桂二兩去皮牡丹皮去心當歸牛膝木通草滑石冬葵子各半兩右為細末每服六錢水一盞半蔥五枝煎一盞三分空心乘熱吃如人行一里再喫未下更喫以兒産為度治産婦令易産以鼺鼠皮毛與産婦臨蓐持之令兒易産令孕易産用冬葵子葉煮孕婦臨産食之則胎滑易産催生方以乳香一分黃明者細研為末取母豬血和令勻丸如桐子大每服五丸溫酒下令人易産以飛生蟲角臨時執之亦可燒末服少許令易産以蓮花一葉書人字吞之立産令易産以文鯉魚令産婦臨時帶之則易産亦可臨時燒為黑末酒調一錢匕令産婦易産取鸕鷀令産婦臨蓐時執之則易産令子易産取鼠燒末以井花水服方寸匕日三服治婦人易産取市門上土臨月帶之又臨月産時取一錢匕末酒服之易産令母帶獺皮易産用大蒜而多瓣有葷氣謂之蓧子宜煮汁與蓐婦飲之令易産以粳燒末服方寸催生用古鑑鼻燒酒淬服之主臨産催生方以黃蜀葵子焙乾為末井花水下三錢匕如無子以根細切煎汁令濃滑待冷服又方黃蜀葵子四十九粒研爛用溫水酒服良久産催生方用萆麻子研傅産人手足心産後拭去催生以鼠四足燒食之治婦妊娠臨月令産極易取榆白皮焙乾為末服方寸匕日三産下兒身上皆塗之信其驗也令易産以羚羊角一枚刮尖為末酒調方寸匕催生落胞并産後餘血不下以兔頭骨和毛髓燒灰為丸酒服孫真人催産方以鐵器燒赤淬酒喫便令分娩令易産以銅弩牙燒令赤投醋三合服良久頓服立産治孕婦令易産用酸漿水和水少許頓服立産催生及下胎以石蟹熟水磨服令易産大麻根三莖水一升煎取半頓服立産衣不下服之亦下催生方欲産時取井花水半升頓一服令子易産燒龜甲末酒服方寸匕易産以五月五日採莧菜和馬齒莧為末等分調與妊娠服之易産催生方以蒲黃地龍陳橘皮等分地龍洗去土於新瓦上焙令微黃各為末三處包之如經日不産各抄一錢匕新汲水調服立産嘗用之甚效斷産治婦人斷産方蠶子故紙方一尺燒為末酒服之終身不産又方油煎水銀一日勿息空肚服棗一大枚永斷不損人療妊娠催生并斷産方栝樓桂心各二兩豉一升右三味切以水四升煮取一升半分服之又方附子三枚為末以醇苦酒和塗右足去之大良主令婦人斷産無子以有印處故紙剪之燒灰服之一錢匕神效普濟方卷三百五十七
