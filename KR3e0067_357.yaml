body:
  text: 普濟方卷三百五十七明周王朱橚撰産難門橫産附論夫橫産者由初覺腹痛産時未至胎未轉動早已驚慌便用力産之故令橫也或觸犯禁忌所為將産坐卧處須順四時方面并避五行禁忌若有觸犯多致災禍也方貝母丸治橫産或顛倒胞衣不出毁傷不出産後餘病汗出煩滿不止少氣滿逆一名千金丸貝母煨黃甘草炙秦椒去目及閉口去汗大豆黃卷乾薑炮桂心粳米石膏細研黃芩石斛去頭各一兩當歸半兩犬膏細研右為末用棗肉和丸如彈子大不拘時候以溫酒研下一丸金液丸治將産忽見橫倒者因不能忌口恣情多食五臟氣滯六腑不和胎氣既肥或用力太早胎受驚觸急服此藥兒身自順生矣飛生毛火燒成灰用一錢血餘用男子髮燒灰硃砂半錢别研公母羊糞燒灰各半錢竈中心土一兩黑鉛三錢用水銚子火上鎔投水銀半錢攪成砂傾出細研右為細末用粽子和為丸如菉豆大遇難産時急以倒流水吞下五丸兒身自順則正産子母活矣一方五月五日合尤妙勿令雞犬婦人見滑石散治橫産逆産危急方葵子滑石末各一兩右為末每服五錢至一兩煎蠶退灰湯調下治橫倒産者或先出手足者明阿膠炒一方用酥滑石末各一兩葵子二合右取水二盞煎一盞去滓分二服治橫産及手足先出者取梁上塵竈突墨酒服之又方取車釭中脂書出字於兒腳下一方畫腋下及掌心催生鉛丹治橫逆難産以黑鉛一錢用小銚子火上鎔投水銀二錢急攪成砂子傾出用熟絹紐出汗衫角紐作丸子如菉豆大臨蓐香水吞下二丸一云胎前數證危急産後亦然此藥可預為偹急龍蛇散治橫産逆産以蛇蛻入罐子內鹽泥固濟燒存性為細末每服二錢榆白皮煎湯調下凡産不順手足先見者溫酒一錢仍用傅兒手足即順又治吹乳療橫産及側手足先出右可持粗針刺兒手足入二分許兒得痛驚轉即縮自當順産治橫産逆産如小兒手足先出將父名書腳心上隨即順生又將兒腳心搔抓亦妙治橫倒産手足先出法以水牛尿塗母腹上即便順産又方以三姓雞卯各一枚三姓鹽各一錢三姓水共一大盞相和煮五七沸分二服令母面向東服之妙又方用蘧麥二兩銼以水一大盞煎六分去滓分二服又方燒錢二七文令赤投一杯酒中候冷飲之倒産法橫倒逆産條目雖分方藥之類可參酌相當隨意救之若兒先出腳即以湯和鹽塗之并塗母腹塗兒腳後急以手搔之兒生手出取馬雞血塗於手掌上良天制順此三字相連成一符應産不如常者朱書服上并書紙上水吞之治難産及不順産立效方右乞取三家飯著手中即順産甚效治産婦橫産用萆麻子三十箇研爛婦人頂上剃去髮少許藥塗之須臾覺腹中提正便刮去藥却於腳心塗之自然順産也治倒産難産方用厚蠶子燒末飲服三錢治橫産不可出用車前子末酒服二錢匕治婦人橫産用鐵杵若無杵則將利斧燒令通赤乘熱入好酒內服之須臾即順生矣治橫産倒産用葵子花為末酒服之方寸匕治橫産以莵絲子為末酒調下一錢匕米飲調亦得治橫産不可出用梁上塵以酒服方寸匕亦治倒産治婦人倒産以麻子吞二七枚即正治倒産手足冷口噤以冬葵子炒令黃搗末酒服二錢匕則順産難子死腹中夫産難子死腹中者多因驚動太早或觸犯禁忌致令産難皆因穢汚先下産時未到穢露已盡而胎枯燥故子死腹中其後産母舌青黑及胎上冷者子已死也故産處坐卧須順四時方面并避五行禁忌若有觸犯多招災禍也胞衣未出危於胎之已降子死腹中危於胞之未下蓋胞胎未下子與母通其呼吸若子死腹中胞臟氣寒胎血凝聚由於子死氣不升降所以難産不觀古之方論多以行血順氣之藥及消石水銀硇砂之類蓋胎死則血凝氣聚不能轉動再服至寒之藥不惟無益而害母命者有矣然古人用藥不能無意但後覺不分爾子死理有二端用藥寒濕各從其宜有妊娠崩漏血盡子死者有緣攧撲內傷子死者有緣久病胎萎子死者若此之類須令坐人提潔妊婦使身體平正仍以禋褥自腰抵定令仰坐開足向地如欲産勢便進附子湯三服方見于後即以衣褁溫瓦數片三二人不住手自臍腹腰脅左右周回尉之使胞藏溫暖凝血流動蓋附子湯內能破寒墮胎服之少頃覺腹內痛陳連作惡血漸動良久必産此用溫藥之意也有妊婦因傷寒熱病溫瘧之類胎受寒邪熱毒氣內外攻逼因致死胎不即下留於胞藏古人慮胎受毒氣必致貽害故能使死胎化成腐爛隨惡血行下此用寒藥之意也臨産更令坐人以手墊體後胎有橫有逆有死有生以意治之庶免留難凡生産之理胎活則所懷之子日月已周臍繫不牢所以自下猶實果既熟不候剪伐若胎死日月未足臍繫尚固猶之果實未熟本質雖枯不折不離所以難治行之有法用之有度斯無虞矣凡審死胎當宜熟辨有妊婦緣病胎隱伏不動難忍存亡者宜先令坐人以暖手就臍下欵欵按至胎處覺冷應是胎已死稍溫即非更看妊婦外證面青舌冷舌下脈青黑者皆子死之候也方真珠湯熟真珠一兩榆白皮切一升右二味以苦酒三升煮取一升頓服之死胎立出治妊娠未足月胎卒死不出産母欲死方以苦酒濃煮大豆每服一升胎立出不能頓服分為二三服亦可兼治積聚成瘕治胎死腹中若母病欲下之方取榆白皮細切煮濃三升服之即下難生者亦佳蘧麥散治妊娠三五箇月胎死在腹內不出大腹子赤芍藥榆白皮各三兩當歸一兩炒滑石末二分瞿麥葵子炒茯苓子芩各半兩粉草右為粗末每服四錢水一盞煎七分去滓不拘時候溫服又須詳母虛實冷熱用之母患熱病薰蒸至此可用療死胎腹內不出母已危殆不得已者立驗方水銀半兩桂末一錢右只作一服溫酒調下粥飲亦可一方故鞋底熱炙尉小腹上下又方以利斧煆赤置酒中待溫飲之其子便下錫粉丸治妊娠胎死腹中其母面赤者是宜用此方水銀錫粉各一錢右同研不覺水銀為度以棗肉和丸莞豆大煎瞿麥湯下十全慱救療胎死腹中以好辰砂一兩水煮數沸研令細酒調服二錢又方以雞子黃一枚用薑汁一合調雞子黃令勻頓服分娩後吃藝薹粥良一方先用酒三分盞醋二分盞同煎沸入薑汁三分盞又煎令沸傾出用雞子黃一枚乘熱打轉稍熱服之須臾未下盡此三服下死胎方桂心末二錢麝香當門子一箇右同研溫酒服須臾如手推下比之用水銀等藥不損血氣一方無麝香用桂末二錢痛陳密時溫童子小便調下名觀音救生散兼治難産及橫倒生一方名桂香散又方主子死腹中用水銀如彈子大以棗肉勻和丸如大豆許水吞下立出朴消散療死胎不出以朴消為末每服二錢溫童子小便調下即出一云朴消入砂同研昔有産婦子死腹中號哭不已令用此藥灌之即下後用此方以救人無不驗也治死胎不下其證指甲青舌青脹悶甚者口中作屎臭先以平胃散一貼作兩服每服酒水各一盞同煎一盞却投朴消半兩研細再煎三五沸傾出候微溫服盡其胎即化血水而下一方童子小便調服進賢魯宰以此與貓及牛皆下死胎再活奪命散治胎死腹中危甚亦可用此藥取出以白萹豆生去皮為末米飲調下一錢不及末煎數服亦可治胎死腹中因打撲傷損所致右以局方至寶丹極妙然須自合者方效治胎死腹中因打撲傷損所致其證指甲頭青悶脹舌青甚者口中作屎臭以瓜蔞焙乾為末每服二錢倒流水調下一服取效仍先防備暈藥治生産不下死胎在腹橫生倒生胞衣不下一切危急者以蛇蛻一條全者斷者不可用以火筯挑起令直用麻油紙撚從尾燒上以乳鉢接貯研細羅過又蠮螉窠一箇須通透出過子者研細和勻作一股以無灰酒半盞暖熱再以童子小便半盞浸平之服下即便分娩蛇蛻須是雄墻頭籬上者是一方蛇退皮一條燒灰存性以榆白皮煎湯調下治妊娠胎死腹中若胎衣不下者上搶心者以雀麥一把水五升煮二升汁服烏金散治産難熱病胎死腹中或因頓仆或從髙墜下或房室驚搐或臨産驚動太早觸犯禁忌産生未到經血先下惡露已盡致胎乾子死不能自出但是産婦面舌赤青若是面青舌赤母死子活唇青吐沫子母俱斃又有雙懷或一死一活其後猶難須知臨期觀變熟地黃酒浸真蒲黃歸身交趾桂楊芍藥軍薑去皮粉霜各一兩小黑豆四兩百草霜五錢右為末每服二錢半醋半合沸湯六七合攪勻溫服疑二之際知之未的以酒水合煎三二服探之若未死子母俱安若胎已死立便逐下的知其胎死進此藥後更進香桂散須臾如手推下常用催生更加好滑石末半兩葵子五十粒槌碎黃竹葉七八片蔥白二寸順流水煎湯調下一方用滑石能利小便黃竹葉散風氣蔥白內通陽氣盛血行即産此藥療多功效硇砂散治胎死腹中不下硇砂細研當歸各一兩右二味當歸極細另研硇砂為細末只分作二服用溫酒調下無時服如重車行五里不下再一服立效治子死腹中不出方以牛屎塗母腹上立出極熱佳又方治橫逆不順子死腹中取竈下黃土三指撮酒服之立出土當著兒頭亦治逆生橫生不出手足先見者一方水調服之又方右服水銀三兩立出又方取夫尿二升煮令沸飲之又方用水槐吞子二七枚亦治逆生一方有蒲黃又方用瞿麥一斤以水八升煮取二升一服一升不出再服又方以酢二升拗口開灌之一字神散治子死胎不下胎破不生此方纍有效救人幾萬數用鬼臼不拘多少黃色者去毛碾為末以指撚之粉極細每服二錢用無灰酒一盞煎八分通口服立效此藥不用羅只碾令極細牡丹丸治産前子下血多子死腹中其人增寒手指青面白色黃黑或胎上搶心悶絶欲死冷汗自喘滿不食或食毒物或誤服草藥傷胎下血不止胎尚未損可安若已死服之可下一名奪命丹牡丹皮去骨白茯苓去黑皮桂心去粗皮赤芍藥桃仁湯浸去皮尖雙仁麩炒各等分右等分為末蜜丸彈子大每一丸細嚼淡醋湯送下連進二一方奪命丸治腐爛腹中危者亦出治子死腹中若衣不出欲搶心方取竈突中墨三指撮許以水苦酒調服立出當著兒頭生又方取炊蔽灰服之亦治胞衣不出牛膝丸治産數日子死不出母氣欲絶杜牛膝五升紫金藤十錢厚肉桂二錢土當歸四錢葵根十錢麝香半錢右末米飲為丸如梧桐子大硃砂為衣每服五十丸乳香湯下治子死腹中不出用雄雞糞二十枚水二升煎取五合下米作粥食即出一方用䳄雞糞治子死腹中用黃明乳香以端午日午時或嵗除夜取豬心相和研為丸如雞豆大以紅絹袋盛挂於門上如有患者冷酒磨下一丸養正丹治難産子死腹中昏沉脈微用每服一百二十粒濃煎乳香服兩手更把石燕子各一枚即當胎下人活或只用朴消末每服二錢重童便好酒調下效方見治胎死腹中身體如藍舌稍紅大劑芎歸湯多加肉桂牛膝葵子每服半服製三服每服水二盞煎一大盞服之又云産難母子生死之候若母面赤舌青者母活子死母面青舌赤口沫出子活母死母唇口皆青口兩邉沫出身重寒熱舌下青黑反唇上冷遇此證者子母俱死不可治者而不藥也治胎死腹中乾燥難産方葵子一升阿膠五兩右二味以水五升煮取二升頻服之未出再煮服治妊娠胎死腹中若子生胞衣不出腹中引腰背痛方甘草一尺筒桂四寸雞子一枚蒲黃二合香豉二升右以水六升煮取二升頓服之胎胞穢惡盡去大良附子湯治子死腹中桂去粗皮不得見火烏頭大者炮去皮臍各一兩右銼每服二錢匕水一盞煎七分去滓溫服須臾連三服粉霜散治子死腹中漸成脹滿粉霜消石各半兩蛇蛻灰二錢右各研細和勻每服二錢匕溫酒下醋湯亦得浸漸連併三兩服如更未下即服丹砂散地黃酒治妊娠因漏血傷胎子死未久用生地黃二斤洗淨切搗取自然汁每服用七分酒三分盞同煎才服稍熱便服連三服未下再服牛膝湯治子死腹中氣血凝結致子難下牛膝酒去苖朴硝研各三分生乾地黃一兩半桂去皮芎藭大黃炒蒲黃各半兩右為散每服三錢七水一盞煎七分去滓溫服連三五服未下再服牛膝湯治子死腹中氣血凝結難産或死子已久壞爛母欲悶絶者牛膝去苖一兩生地黃汁一盞當歸桂炒各三分芎藭蒲黃各半兩瞿麥去根消石研各三分右除地黃汁外搗為粗末每服五錢水一盞半煎一盞去滓再煎入地黃汁三分盞打轉煎沸稍熱服三兩服內惡露下也子出免生他病地黃湯治妊娠五六月子死腹中不出生地黃焙一兩牛膝去苖芎藭桂去皮當歸朴消各三分蒲黃研各半兩右粗搗篩每服三錢匕水酒各半盞煎七分去滓連服三五服豬脂湯治死子腹氣血凝滯不下豬脂一兩切白蜜半盞酒一盞半右三味相和同煎沸後分作三服未下再依前法製服甘草湯治妊娠攧撲內傷致子死腹中速服滑氣血甘草炙銼桂去皮各一兩右粗搗篩每服三錢匕水一盞煎七分去滓溫服連三五服未下再服甘草湯治子死腹中未下甘草炙桂去皮半兩香豉炒二兩右為末每服五錢匕水一盞半煎一盞去滓用雞子一枚取清打轉入藥內再同煎七分稍熱服須臾未下再作服芎藭湯治子死腹中不下芎藭當歸各一兩生切瞿麥去根三分右為散每服三錢匕水一盞醋少許同煎七分去滓連三二服必下黑豆湯治子死腹中溫氣滑血黑豆搗碎半升生薑細切四兩右以童子小便三碗同煎取二碗去滓每服一盞連二三盞未下再服龜甲湯治産難或子死腹中不下龜甲酒炙當歸各半兩亂髮一塊雞子大取産多者婦人髮于瓦上燒灰右先細研髮灰次入當歸末水一盞半煎八分然後下龜甲末煎五七沸分為三服後如人行四五里更服水銀丸治妊娠子死腹中不出水銀半兩硫黃一分與水銀約為砂子白礬灰半兩硇砂半兩右搗研令細煮棗肉為丸菉豆大煎榆白皮酒下五丸如覺腹痛子即下又方水銀一分以水棗肉研令星盡硃砂一分雄黃一分右同研令細煮棗肉和丸菉豆大不計時候以槐子湯下五丸治妊娠子死腹內不下方皂子黃四兩米醋三升多年為佳右用五升瓶盛文火煨熱用紙蓋瓶口將向婦人靣前去紙取氣薰少時即下又方蘇枋木一片細槌綿褁水銀一兩右以水五盞煎蘇木大盞每服取二分下水銀一分如人行三五里再服死胎當化水下下後三日須食暖物若食冷物即惡血不盡治胎死不出方用赤小豆一升醋煮令熱分二服死兒立出療妊身熱病子死腹中欲出之用烏豆一枚細搗水三升煮取二升稍稍摩臍下至隂下當立出療婦人傷娠及胎死腹中胞衣不出産後疾病及諸困篤欲死刺取羊血及熱飲之不能者人含吐與之能多飲益善不能咽噉少鹽又水潠其面治胎死腹中欲下之方用生地汁一升苦酒三合令熱服之不能頓服分再服亦得一方治血乾胎死為末一匕酒下煎亦可治婦人腹中有死胎面皮黑欲死不進飲食三箇紅娘半箇剛更加鵬砂共棗穰依方修合等分兩頭明恰似宰豬羊右為細末棗穰丸如菉豆大臨時看虛實加減空心熱酒服三五丸即下胎死腹中方用欎臭草搗以少許暖酒和絞取汁頓服又葵子一大升水五升煮取三升一服立下治子死腹中若衣不出欲上搶心方急取蟻蛭三升熬令熱囊盛尉心下令胎不得搶心良牛膝散治妊娠經五六箇月胎橫死在腹中不出牛膝一兩去苖蒲黃半兩當歸三分雄鼠糞半兩炒芎藭二分生乾地黃三分右為粗散每服三錢以水酒各半盞煎五分去滓不計時候溫服牡丹散治死胎下墜有敗血衝心悶絶上氣不停牡丹赤芍藥青皮湯去白荷葉當歸炒蒲黃乾薑川大黃已上各一兩右為散不計時候以溫酒調下二錢治妊娠胎死在腹無計可為宜用此方萆麻子三枚鼠粘子一分右為散以醋麵糊調塗於心上以紙貼之即生治妊娠胎死腹內不下方榆白皮二兩硃砂半兩細研右以酒一盞煎榆白皮至六分去滓分為二服每服調下硃砂一分又方麒麟竭一兩蒲黃三分赤芍藥三分右為散每服以溫酒調下二錢半頻服即下治子死腹中不出方鹽半合雞子一枚右相和頓服立效治子死腹中若衣不出欲上搶心用取夫內衣蓋井上立出治子死腹中不出方用三家雞卵各一枚三家鹽各一撮三家水各一升合煮之令産婦向東飲之立出黑神散治熱病胎死腹中者何答曰因母患熱病至六七日以後臟腑燥熱薰煮其胎是以致死緣兒身死冷不能自出但服黑神散熱藥暖其胎須臾胎氣暖即自出何以知其胎之已死但看産婦舌青者是其候也桂心不見火川當歸芍藥甘草乾薑炮生乾地黃黑豆去皮各一錢黑附子半錢炮右為細末作四服空心溫酒調下一方無治胎死腹中半産不下官桂去皮一兩牡丹皮去心川芎葵子各一分右細搗羅為末每服五錢濃煎䓤湯調下川芎散墜髙胎死用川芎為細末每服二錢酒下鱉甲湯下死胎至妙鱉甲二兩先取半兩火燒令赤醋淬如此二度餘一兩半只生用為末斧頭三箇鐵稱錘亦得燒紅投酒中令聲絶去斧頭右每服用藥末三錢酒一盞䓤芽三箇細切放溫調下至難産者無不便下覺心頭迷悶更以栁枝煎湯洗産母心頭或衣不下者服烏金散即下龍肝散治子死腹中母氣欲絶右用伏龍肝為末熟水調下若童子小便調尤妙其土當兒頭上戴出至妙川芎蒲黃黑神散地黃蒸曝九遍或二十一遍如黑角色不可經冷水稱一兩生者蒸取半兩當歸酒浸半焙稱一兩一分肉桂去粗皮不見火一兩一分川芎一兩乾薑一兩一分白芍藥一兩甘草炙半兩附子炮二錢真蒲黃白紙上焙一兩黑豆一兩半炒去皮右十味為細末每服三錢匕並用小便調下若胎已死腹中四肢冷口出沫爪青黑溫酒調服須臾胎暖自下及衣帶斷者但服此藥逐去血即下若血暈醫者不識呼為暗風服此即愈若乍寒乍熱或誤呼為瘧疾服此藥當若血崩不止取艾一團如雞子大濃煎湯調下若嘔逆惡心人參陳皮湯調下若中風牽搐加荆芥末半錢仍煎荆芥湯調下若血渴不止加蒲黃煎葛根湯調下若心腹刺痛加玄胡索末溫酒調下昨有永嘉法曹司馬逨坐倉受納閣中分娩亟贖黑神散三貼傳歸與服惡血稍多進第二服其血如傾扶䇿登床耳聞如鼓聲者數百二三婢重手按其頭稍定急服當歸鹿茸二物湯夜以繼日而鼓聲漸逺半月平復則知黑神散亦未易猛進也此盧祖常易簡糾繆中載然遇未産後自不可以易用藥况市中黑神散安可不辨其精粗真偽也曽有婦人熱而大便祕脈實子死腹中以致昏不知人醫用偹急丸胎下人活催生并死胎不出用萆麻三箇巴豆四箇乳鉢研細入麝香少許貼臍心上須臾間便見神效治死胎腹中不下須是分明知是死胎方下此藥水銀一分官桂一分為末麝香少許右以官桂末麝香相衮用乳鉢內投水銀令相衮成末濃煎牛膝湯下催生湯蒼术二兩桔梗一兩陳皮六錢白芷桂心甘草各三錢當歸烏藥乾薑厚朴芍藥半夏茯苓附子各二錢南星川芎各一錢半枳殼炒木香一錢杏仁阿膠一錢半右為末每服一大盞酒下或熱悶水㵼水調蜜服之主子死腹中不下用懸鈎根皮濃煎服之治女子因熱病胎死腹中搗益母草令熟以少許暖水和絞取汁頓服良治胎死腹中以紅藍花酒煮服之療子死腹中方以真珠二兩為末酒調服盡立出治子死腹中取天鼠屎灰酒服方寸匕治子死腹中搗茺蔚莖汁服之即下治妊娠子死腹中以雄鼠糞二七枚以水三升煮取一升去滓取汁以作粥食之胎即下治倒産子死腹中用艾葉半斤酒四升煮取一升服治小兒死腹中用冬葵子末酒服方寸匕若口噤不開撬開灌之藥下即活治倒産子死腹中以當歸末酒服方寸匕胞衣不出附論夫有産兒出胞衣不落者世謂之息胞由産初時用力太過兒出而體已疲憊不能更用力産胞停頓之間而外冷氣乘之則血道澀故胞衣不出須急以方藥救治庶不妨害於兒所以爾者胞係連兒臍胞不出即不便以時斷臍浴洗冷氣傷兒則成病也舊法胎衣不出恐損兒者依法截臍而已産處隨順四時方面并避五行禁忌者若有觸犯多令産婦難産雖腹痛者未産也必腹痛連腰痛甚者即産也所以然者腎候於腰胞係腎故也診其脈轉急如切繩無殊者即産也郭稽中論曰胎衣不下者何答曰母生子訖流血入衣中衣為血所脹是故不得下治之稍緩脹滿中以次上衝心胸疼痛喘急者但服奪命丹以逐去衣中之血血散脹消胎衣自下而無所患更有牛膝湯等用之甚效録以附之欲産之時用力太過産罷復被風寒冷氣所侵血氣凝澀乏力運用以致時久不惟有妨兒臍兼亦致害母命即須提潔産婦使形體平正息少時可以運動及以壯氣益血湯散助之俾氣血滑利其胞可下矣兼初生産婦未能諳練見胞未下恐妨兒體輒剪臍或誤牽斷或執之不固其胞直上掩心使盡天年者多矣昔人剪臍之法必欲坐人先備金銀鐵稱錘之類用軟衣帶一條就一頭綰定仍留一頭才下臍即將臍帶與衣帶相聨結定以緊牢為度所貴胞不上掩心也方壯氣益血湯治産後胎衣不下或被風寒所侵血氣凝澀或氣力疲乏不能運動胞衣停息宜服蒲黃微炒甘草炙陳皮湯去白桂去皮各三分牛膝酒浸去苖一兩右為散每服二錢熱酒調下不拘時以下為度又方取敗簸箕舌燒作灰細研每服三錢酒服之治胞衣不下法用小豆溫水或酒吞下如生男者一七枚生女者二七枚丹砂散治胞衣不出令胞爛葵子阿膠炒令燥牛膝酒浸當歸切焙各三分右為散每服五錢溫酒調下治胞衣不出取小麥合小豆煮令濃飲其汁立出亦治橫逆生者用米麥亦得又方取瓜瓣二七枚服之立出良又方取水煮弓弩絃飲五合即出亦可燒灰酒和服又方取宅中所埋柱掘出取坎底當柱下土大如雞子酒和服之良牛膝湯治胎衣不出臍腹堅脹急痛即殺人服此藥胞即爛下死胎及子死腹中不得出宜服之牛膝瞿麥各四兩當歸三兩滑石半斤葵子五兩通草六兩一方作木通一方用芥草右細切以水九升煮取三升分三服衣即爛出也一方用桂心二兩一方無通草用甘草一方有赤小豆治胞衣不出腹脹欲殺人及治未足月死胎取黑豆一合炒令熟入醋一盞煎三五沸去豆分三服酒煮亦可或取鞋底炙熱尉小腹上下松葉散治胞衣不下氣血衝心昏迷欲絶松葉炙墨細研紫葛各半兩右為散每服二錢溫水調下不拘時芎藭散治胞衣不出芎藭當歸切焙各半兩榆白皮銼一兩右為散每服三錢用生地黃汁溫調下未下再服以下為度香墨丸治産難胞衣不下心腹痛香墨麝香各一錢同研細右二味以臘月兔腦丸如梧桐子大每服三丸以溫酒下不拘時候以下為度蔥白散治胎衣不出蔥白三個麻油半合右先研蔥白汁少許入油相和服之未下再一服伏龍肝散治胎衣不出伏龍肝蒲黃炒各一兩右為散每服二錢溫酒調下不拘時以下為度牛膝散治胎衣不出胞爛取牛膝去苖一兩細銼以水三盞煎盞半去滓分三服治惡血不下盛於衣中方取蔥葉細切用三指撮以熟酒沃之去蔥服立下生乾地黃人參當歸各一兩代赭研半兩木香一分右為散每服五錢水一盞半生薑三片棗一枚擘破同煎七分去滓不拘時溫服以胞下為度瞿麥湯治産胞衣不出瞿麥穗一兩牛膝去苖酒浸桂去皮木通各兩右粗搗篩每服三錢水一盞煎七分去滓不拘時溫服未下再服牛膝湯治胞衣半出半不出或子死腹中數日不産血氣上衝宜服牛膝去苖酒浸葵子炒榆白皮生地黃