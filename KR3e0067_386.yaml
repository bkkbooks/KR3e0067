尅土脾隨水脹脾主四肢故流走而身面皆腫也若夫喘者重也何以然腎水勝而尅退脾土上勝心火心又勝肺為心尅故喘或問曰心勝肺肺本見虛今何喘曰此有二者肺大喘此五臟逆二者腎水氣上行傍侵於肺故大喘此皆難治腫者疳腫風腫氣腫積腫虛腫五者大同小異疳腫者肌體浮腫通身明亮狀如熟李寶鑑云若見皮膚如熟李此名疳水定無疑是也又有隂囊腫似琉璃疳水也或因疳食傷脾變為疳水風腫者面目浮腫色帶紫赤時常多癢陶隱君云風腫紫色而癢進退不定忽時有發牽牛散主之或有如痛㿔有成片腫者搔之隨手而起此風疹也素問云風邪客於肌中肌膚虛真氣逆散寒摶於皮膚入腠理濕氣行之則為腫癢也又云面腫曰風癎雖氣血尚虛而熱未盡從皮膚與氣相搏致令氣不宣泄故停留成腫也治之先益黃散補後牽牛散利之氣腫者目皰浮腫久嗽為之粗有痰食公曰目上瞼先腫次面背腫者久嗽為之曰氣腫若下臉先腫次面背腫者脾積為之曰水腫者素問云目下微腫如卧蠶起之狀曰水腫熱論曰水隂目下亦隂也腹者至隂之所居也故水在腹中者必使目下腫也又曰經腫也又曰脛腫曰水腫千金云有人患氣急久不瘥遂成水病麻黃甘草湯主之積腫者遍身浮腫因食悮脾久瘧亦爾日華子有云人久患寒熱不退必變浮腫因脾積氣所作也寶鑑云因宿痰飲成塊散後遍身浮腫喘粗或因不便食即飲水悮必作者也虛腫者四肢浮腫久痢為之多渴少食凡痢久不退虛腫少食㵼久不退虛腫煩渴大抵痢久則脾土虛虛則不能制腎水反尅土故腐腫於肌肉也其病十死八九若用涼藥立死治之宜用益黃散及五苓散候脾氣實則腫自消十愈五六凡瀉久能變虛腫也皆由不忌生冷恣食甘酸脾腎不調之所致也然取水之法諸有水人微腫見於目下水者隂也腹者至隂之所居故水在腹必使目下腫而不得卧卧則驚驚則咳甚夫取水法不可頓收盡必當再發則難治如病甚治者初隔一日一取候減三二分又兩日再一取候退六七分又隔三日一取減去八九分又隔四五日取其不取日即服補腎行水氣之藥全嬰方云丁氏二子大者七嵗自七月內寒熱四十餘日小者五嵗自七月內㵼痢四十餘日二子後來俱發腫招愚視之大者水寶散㵼十餘行五苓散二服翌日病除八九分後啇陸散二服平愈小者益黃散女麵散五苓散日二服三日服藥尚未見效主人曰大者服水寶散立效何不投之一服答曰服之即死是謂醫之用藥以療病如將之用兵料敵當其虛實隨其機變必獲勝效也蓋大者因食傷脾小者因痢損脾素問云陽病治隂隂病治陽大抵退熱以寒藥退寒以熱藥實病虛之虛病實之今二子證候虛實不等若水寶女麵服之交互二病俱亡小者止用益黃散服之十日脾實平安腫脹二證此由虛中有積久患失治漸傳作證候傳化多喘隨虛實按輕重察勝衰審表裏主治先固其本後正其摽得無恙矣凡腫有受濕腳手面目虛浮毒氣腫腹肚堅蠱脹急傷寒虛氣入腫腹氣虛腫㵼痢虛氣入腹脹腫血虛腫榮衛俱虛腫凡脹有疳極脹疳積脹氣積痞氣脹癖氣脹癥積脹鎖肚脹急膈脹中脘脹食腸臌脹蛔蟲脹脾氣脹冷積脹虛積脹以上腫脹虛積並當下之用藥各有法度凡受濕腫傷寒虛氣入腹食毒氣腫㵼痢虛氣入腹腫此四腫所患病不相同皆因虛盛而得之受濕謂脾胃受濕冷久不尅化氣浮四肢頭面皆腫食毒氣由脾胃傷之冷積毒氣停留胃脘致虛入腹作腫傷寒由下之太早乘虛入腹作腫㵼痢之久脾氣亦虛是以致腫以上宜平調胃氣補臟充實方可去腫先服四味理中丸減半乾薑加白术桑白皮同煎傷寒虛腫加枳實作喘加淡豆豉利虛腫服正氣調胃胃氣既壯以致生丹利之其腫即退再調補臟腑用觀音散良益固平復矣又有氣虛腫亦名氣毒榮衛俱虛亦名氣血蠱凡小兒所患腫脹一門最為要急前人少有究竟然腫脹已作皆由榮衛不順臟腑怯弱壅滯三焦流注百脈表裏俱虛邪正相亂所以致受四大浮盛腹肚􅂒滿多由食毒得之飲冷得之癥傷得之飲飽得之積久不化諸虛所入故成斯病病由虛得或忘亂通下因虛致虛根不能去盛是謂壞證智者怯而辭謝庸者暴以攻擊二醫不同誠屬難治再與智者啇之謂啇量斟酌輕重良者審之雖曰良工猶宜審其可否之意疑者謂之疑其病盛不可利只宜與塌其氣也啓其靈明酌定良方起死回生謹遵其理始可調治用藥至真對證剋效即無恙矣以上先與服榮衛飲子次服分氣飲子小兒臟腑嬌嫩乳食過傷脾胃虛冷不能消化乳食停滯腹間脾受積傷脾土衰弱不能制水故溢漬於皮膚腫有三證疳水積水驚水也蓋疳水者其候心中虛腳腫不可取宜用藥消之若積水者五積在於腹結化為水其候或冷或熱四肢頭面俱浮作虛積治之宜補而後取此是積在腹結後化為水其病難治而不可作虛中積治也驚水者前後重疊受驚致令心火躁渴飲水過多停積於脾其候四肢腫身上熱若其脈大者生小者死叔和曰水氣浮大得延生沉細當應是死别尺脈如絲或浮洪按之無根乃絶脈楊氏曰賈洛陽以腫為瘎疾則知病之危惡非他疾比也夫人全性命者水榖而已水則腎主之土榖則脾主之惟腎虛不能行水脾虛不能制水胃與脾合氣胃為水榖之海又因虛而能傳化故腎水泛溢侵脾土於是三焦停滯經絡壅塞水滲於皮膚注於肌肉而發腫矣其候目胞上下微腫四肢重著咳嗽喘怔忡股間清冷小便澀黃皮薄而光手按成窟舉手即滿治法楊氏曰身有熱者水氣在表可汗身無熱者水氣在裏可下次則通利小便順氣和脾不可緩也然證雖可下當審虛實權輕重不可通用芫花甘遂大戟猛烈之劑用之太過吾恐峻決者易因閉者難水氣復來何以治之也凡虛腫先起於腹而散於四肢者可活先自四肢而後歸腹者不可治蠱脹肚上有筋腹滿大便滑泄久瘧而轉作虛浮及唇黑傷肝缺盆平傷心臍突傷脾足平傷肺背平傷肺或男從足腫上女從身腫而下或肉硬或手掌平皆不治凡小兒通身浮腫是風水腫也小便不通者利之則愈內經曰三焦閉益水道不行水滿皮膚身體痞腫是風乘之故可用長流水加燈心煎五苓枝時時呷之更於不透風處浴之汗出則腫消一汗減半再汗減七八三汗消盡內外俱行也治水之法當利小便得其要妙之理則愈矣小兒浮腫有飲食所傷有濕傷皮膚有氣化為水治法當腰以上腫宜汗腰以下腫宜利小便然後調理脾胃也方榮衛飲子調治嬰孩氣血俱虛榮衛不順四肢頭面手足俱浮腫以至喘急者並宜服此川當歸熟乾地黃洗淨白茯苓川芎白术甘草炙白芍藥枳殼去瓤炒黃耆蜜炙陳皮右等分㕮咀每服二錢水一小盞煎半盞去渣通口不拘時服榮者氣溫流血於脈衛者氣順調和於絡是故榮衛脈行隂陽相實循環無止自幼以至長不唯呼吸無少滯礙其脈方調其氣方順呼吸之間脈不應息氣有違滯流注經絡隱伏臟腑虛實熱則發壅疸背莭實熱則患瘡疾瘑疥况其榮與衛隂及陽遍枯有作易感寒邪亦易致虛百病皆由兹始此方最良雖兒幼小並可與服以杜其根使血榮氣衛順且和矣腑寒臟虛溫且壯也盈虧自然而平怯弱自然而正隂陽均調氣脈充實分氣飲調理小兒腫脹作喘氣短促急坐卧不任四體浮腫飲食嘔逆神困喜睡宜服之五味子桔梗白茯苓甘草炙陳橘皮桑白皮草果去殼大腹皮白术枳殼去瓤切炒川當歸紫蘇蘇子半夏麯右等分每服二錢水一小盞生薑二片棗子半箇煎半盞去滓通口服不拘時兼八味理中丸煎服以上宜用救生丹通利清濁無混邪正不干上焦得之清涼下部受之溫暖氣滯則少升降血虛則多泄㵼雖是乳子呼吸一急其脈有志徐徐應指不違其數者亦同大人流行但通小大辨其短淺而已若留滯其脈遲數其間太過不及者作病善主療治鬱則分之逆則順之停則利之滯則降之調理之先宜通順其氣大抵嬰孩氣順即易治脈壯亦易理證候稍傳鬱逆停滯當先袪治不待傳入而究竟此方分氣預宜進與分水穀之治者為用不同大效神功勑生丹治小兒氣虛喘息四肢浮腫腹肚脹急衝滿脅肋乍寒乍熱或㵼或祕皆由久停虛積榮衛不順宜用此方去其毒惡之氣雄黃别研硃砂另研各一分巴豆二十粒去殼乾薑二錢右用米醋一盞以巴豆薑就煮令乾去薑不用將巴豆出油和雄硃研勻雪糕搜丸如麻子大每一嵗三丸並用酒浸赤芍藥少許送下夫幼兒受疾其來發端無過驚風痰熱疳積吐痢而已前賢衆多述論證候遍看方藥究竟推詳各有確實奧見其有無辜疳積異作證候著于篇集或有罕見其證未詳其理者盡難測知龜胸決肋飲漿是也又復有壞證惡候自服諸家丸散輕重相投愈之不得全功聽之加為他害肝脾風之類是也悠悠既久方法何宜學醫之士遇此等證未審術窮而屈若能此等觸類調理雖則未效猶尚庶幾多是肆意免強而為稍或得失利害甚重今議勑生丹方載談氏所療無辜積證效驗至良晚進後生聞而知之且驚且喜蓋渠未嘗知用若參究而又意到即細切以副全功然後知醫學無窮神妙難言世俗醫工於此等證候須當至誠施議起死回生十治十全百發百中矣療小兒身體滿氣急卧不得方右用郁李仁一合搗末和麵搜作餅子如常法與兒喫微利即瘥一方為末六分水七合和調去滓煮粥與兒喫之寬腹丸治小兒疳氣腹脹不思飲食或面腫者牽牛蘿蔔子陳皮青皮木香炮各一兩檳榔紫蘇子木瓜半兩巴豆七粒炒黃右為末糊丸小豆大三嵗三十丸紫蘇木瓜湯下黃耆茯神散治小兒榮衛氣虛精神不爽面無顔色唇口青白噦逆昏睡全不思飲食身體微腫黃耆蜜炙茯神去末天南星炮白扁豆炒黃防風去蘆白附子炮肉桂去皮白芍藥山藥各等分右每服二錢水一小盞生薑三片棗一枚同煎七分去渣食前溫服加味五苓散治腫滿因積而得既取積而腫再作小便不利豬苓赤茯苓白术澤㵼各一兩木香沉香檳榔各三錢白豆蔲一錢􅒦砂仁五錢右味煎樟栁木通燈心湯調下大黃湯治小兒咳腫壯熱有實方麝香三銖别研湯熟下大黃四兩甘遂石膏各三分黃芩甘草青木香各三分前胡四分右為粗末水七升煮一升九合每服三合日四服夜三服塌氣散治腫滿因積而得既積而腫再作小便不利赤小豆陳皮去白蘿蔔子白术炒茴香炒各五錢木香二錢炮甘草一錢炙青皮五錢加以巴豆二錢去殼炒去巴豆不用右為末飯湯下或薑棗湯下治疳用燈心湯下治小兒臍赤腫以杏仁杵加脂內體中相和傅臍腫上治男子婦人小兒積年腳氣腫痛及腹肚蠱腫服之痛止腫消方見大腳氣腫門椒目飲治小兒痢後虛腫并頭面浮腫或身熱白术秦芁椒目甘草香薷通草右等分為末一錢水半盞煎三分去滓食前不宜喫蠡魚鯉魚二物皆能腫史君子丸治小兒面黃大小便赤遍身浮腫此脾疳食積氣滯而成史君子一分麵裹煨熟去麵黑牽牛一兩五靈脂半兩黃連陳皮一分江子七粒同陳皮黃連炒江子不用右為末粟米糊為丸如菉豆大每服五七丸生薑橘皮湯下神助散治小兒頭面手足浮腫澤㵼豬苓去黑皮各二兩黑牽牛二兩半微炒取末葶藶三兩炒香别研椒目一兩木香一兩右為細末每服以蔥白三莖將水一盞煎至半盞調藥三錢絶早面向東服如人行十里久漿水䓤白煮稀粥至蔥爛入酒五合熱啜量人啜多少須啜一升許不得喫鹽并麵自早至午當利小便三升四升或大便利喘定腫減七分隔日再服五皮散治小兒諸般浮腫氣急不食桑白皮大腹皮茯苓皮薑皮陳橘皮各等分右㕮咀三嵗一錢紫蘇皮葉三五片水半盞煎三分去渣不拘時服澤苓散治小兒遍身浮腫氣急不食木通一兩半澤㵼苦蒲子各半兩木豬苓漢防己各一兩右㕮咀一錢水酒共半盞蔥白三寸煎三分去滓小便通利即瘥內消丸治小兒頭靣手足虛浮木香一錢煨防己一錢半丁香二十五粒青皮五錢去瓤銼用巴豆十四粒去殼同炒候黃色去巴豆不用右為末丸麻子大每服三二嵗五丸四五嵗七丸或十嵗小兒陳皮湯下女兒艾葉湯下一日三服又方實脾散消積飲能補脾消積進食五苓散通利水道藥合和用蘿蔔子木通薏苡仁車前子草赤小豆冬瓜仁糯米湯調入燒鹽蓋脾土固實去水腫消一方五味同炒黃色去巴豆麵糊為丸小豆大三嵗三十丸橘皮湯下紅粉散治小兒渾身虛腫氣喘不思飲食硃砂一錢檳榔一錢輕粉半錢右為末每服一字及半錢薄荷湯調下喫一服則取下仍用前觀音散人參散神术散調其胃氣忌生冷粗硬等物檳榔丸治小兒遍身浮腫黑牽牛三兩炒青木香青皮防風檳榔各一兩右為末麵糊為丸如芥子大每服二十丸桑白皮湯下香橘丸治小兒四肢腫滿杏仁十四枚巴豆十四枚青皮陳皮各半兩麩半升右一處炒為細末醋糊為丸如菉豆大每服十丸至二十丸冷薑湯下宣氣散治小兒腹急氣粗并治風腫氣腫通身腫及瘡痘盛出身熱煩渴腹脹喘促大小便澀面青悶亂又治久㵼不退脾虛生氣止與一服後補之木香一分檳榔橘皮甘草各半兩黑牽牛四兩半生半微炒用右㕮咀一錢水半盞煎三分去滓服三歲一錢香檳散治小兒疳食氣腹大氣粗一應浮腫並療木香檳榔黑牽牛青皮各半兩啇陸一兩右為末三嵗一錢煎木通湯調下或為糊丸小豆大三十丸米湯下肚大常服自消分氣飲治腫脹作喘氣短而急北梗赤茯苓陳皮桑白皮炒大腹皮枳殼製半夏麯真蘇子微炒紫蘇甘草各二錢炙草果仁一錢右銼散每服一錢半水一盞薑三片棗子一箇煎服若心臍起掌心平缺盆平背心平不治大喘氣粗不食乃腎水盈溢上行傍浸於肺亦不治葶藶煎治小兒腫滿服藥不退葶藶紙上炒三分防己一兩半澤㵼三兩澤漆葉一兩半赤茯苓去黑皮三分郁李仁去皮尖炒一兩一分柴胡去苗二兩杏仁湯浸去皮尖雙仁炒研如膏三兩右七味粗搗篩水一斗煎三升半去滓入杏仁膏又白蜜一斤慢火煎如稀餳每半錢溫水調下漸加之更量大小加減甘遂丸治小兒腫滿結實諸治不瘥甘遂炒葶藶紙上炒車前子豬苓去黑皮杏仁湯浸去皮尖雙仁炒研芍藥各三分澤漆葉黃芩去黑皮鱉甲去裙襴醋炙各半兩右搗研為末煉蜜和丸如菉豆大五六嵗兒每服五丸竹葉湯下以利為度量兒大小加減塌氣散退腫治積水驚水或飲水過多停積於脾故四肢腫而身熱宜用內消之其腫自退赤小豆陳皮蘿蔔子甘草各半兩木香一分炮右為末薑棗煎量大小加減通口服牽牛丸治小兒疳氣頭面及四肢腫黑牽牛白牽牛青皮陳皮右等分為末糊丸如小豆大三歲三十丸米湯下小腫常服自消塌氣丸治小兒疳腹脹喘急并靣浮腫丁香胡椒炒一分蘿蔔子炒白牽牛生各一兩右為末麵糊為丸小豆大三歲三十丸米湯下治小兒身腫并手足腫兼癮疹用巴豆五十枚去皮心水二升煎取一升用帛於湯中隨手拭之治小兒毒氣攻腮腫赤可畏者皂角二兩去核天南星二錢生用糯米一合為末右為細末薑汁調塗立效郁李丸治小兒疳食氣急腫滿郁李仁湯泡去皮炒檳榔各半兩牽牛一分炒右等分為末糊丸小豆大三嵗三十丸䓤白湯下不拘時量兒大小加減塌氣散治小兒腹脹氣粗并疳食攻面目浮腫木香一分青皮半兩巴豆三十粒同炒黃色去巴豆右為末三嵗半錢米湯調下食前連進即效量兒大小以意加減治小兒浮腫蒲種殼天羅燈草各等分右用蔥濃煎湯服之又煎洗之尤妙即愈郁李仁湯治小兒通體腫滿腹脹氣喘郁李仁湯浸去皮尖炒搗研用大黃煨銼柴胡去苗各一兩半芍藥豬苓去黑心澤㵼各一兩赤茯苓去黑皮麻黃去根節一分升麻杏仁湯浸去皮尖雙仁炒鱉甲去裙襴醋炙各三錢黃芩去黑心各一兩右粗搗篩每用二錢水一盞煎至五分去渣分溫二服日再以利為度量兒大小加減啇陸散治小兒浮腫腹滿氣急利小便澤㵼啇陸各等分右為末三嵗一錢煎桑白皮湯調下啇陸醋炒為末調塗腫毒妙醋調并治咽喉腫治小兒臍腫右取桂心炙令熱尉之日可四五度治小兒熱腫右用鯉魚膽塗之甘遂丸治小兒腫滿結實諸治無益者一名澤漆丸方見本門水腫類二牛丸治小兒腫病大小便不利黑牽牛白牽牛各四兩炒右為末井花水為丸如菉豆大每服二十丸蘿蔔子煎湯下沉附湯治腫面滿因積而得既取積而腫再作小便不利若再用利小便藥性寒而小便愈不通到此則束手矣蓋中下焦不升降為風寒痞隔故水凝而不通宜服沉附湯則小便自通喘滿自愈大小便通用久服無礙附子一隻生去皮臍切成片子右用生薑十片水三盞煎八分次用沉香一錢磨水入藥再煎三沸空心服胃苓丸治腫滿因積而得既取積而種作小便不利平胃散五苓散右等分和合蒸蒜丸木通湯下又方治腫滿因積而得既取積而腫再作小便不利平胃散二錢右煮蘿蔔子一碗取青汁一盞入藥用薑棗再入蘿蔔子同煎服附豆丸治脾虛受濕虛腫附子一隻生去皮切作四片赤小豆一盞右用水浸慢火煮候豆熟附子透軟取附子焙乾為末以薏苡仁煮糊丸空心蘿蔔子煎湯吞下仍以燒鹽和所煮赤小豆空心食之緊皮散治一切腫經取已消脾胃虛弱白术炮赤茯苓木香澤蘭厚朴薑製續斷肉桂檳榔陳皮去白麥芽炒神麯青皮椒目木通扁豆各等分右㕮咀每服加薑棗子蘇葉同煎空心溫服之海蛤散治小兒腫病大小便不利一名豬苓湯方見本門水腫類水腫附論夫小兒水氣腫滿者由將飬不調腎脾二臟俱虛故也腎主水其氣不通於隂脾主土候於肌肉而剋水腎虛不能傳其水液脾虛不能剋制於水故水氣流溢於皮膚故令腫也其水腫者則皮薄如熟李之狀若皮膚虛受風風摶於氣致腫者但虛腫如吹此風氣腫也方檳榔散治小兒水氣腫滿喘促坐卧不安檳榔煨熟炒大黃銼炒各三分葶藶紙上炒牽牛子炒各半兩右搗羅為散三四嵗每服半錢熟水調下以利為效量兒大小加減葶藶散治小兒水腫氣粗葶藶炒防己甘遂大戟右等分為末三嵗一錢桑白皮湯調下食前服澤漆丸治小兒水腫腹大諸藥不瘥澤漆葉葶藶紙上炒各半兩黃芩去黑心甘遂炒郁李仁湯浸去皮尖炒研芍藥豬苓去黑皮杏仁湯浸去皮尖雙仁炒研車前子各三分鱉甲去裙醋炙茈胡去苖各半兩右搗羅為末煉蜜和搗三五百杵為丸如菉豆大五六嵗兒每服五丸溫水下更看兒大小增減一方用竹葉湯煎下大戟丸治小兒水氣浮腫大戟葶藶炒各一錢青皮三錢江子半錢右為末飯為丸每五丸茶湯下㵼後用人參白术散補之葶藶散治小兒水腫葶藶隔紙妙一錢牽牛炒桑白皮炒檳榔等分右為末生薑蜜湯調下聖丸子治小兒水腫腹腫霍亂嘔逆腹冷食不下兩脅痛并下痢膿血小便赤澀又理肺氣喘急咳嗽用葶藶丸下痢松樹皮湯小便赤澀燈心湯喘急咳嗽人參杏仁湯下如痢後腫先服益黃散次與之二物湯有患氣積急積久不瘥遂成水病攻面目身從腰上腫此湯發汗悉愈麻黃去莭四兩甘草一兩右㕮咀三嵗一錢水半盞煎三分去滓服構皮湯治小兒腫滿構木白皮切五合即椿樹也赤小豆四合赤茯苓去黑皮一兩半右㕮咀每服一錢水七分煎至四分去渣溫服日再更量兒大小增減桑根白皮散治小兒水氣腫滿上氣喘促小便赤澀大便稍難一名豬苓湯一名海蛤湯桑白皮半兩銼海蛤一分漢防己一分赤茯苓白术甜葶藶隔紙炒令紫色豬苓去黑皮各一分川朴硝一兩右搗粗羅為散每服一錢水一小盞煎至五分去滓溫服更量兒大小加減服之桑白皮散治小兒水氣偏身腫滿喘促小便不利桑根白皮半兩炒射干赤茯苓黃芩木通銼澤漆澤㵼漢防己各半兩右搗細末為散每服以煮赤小豆湯調下半錢每日三四服看兒大小加減服之牡蠣散治大病瘥後腰以下有水氣者宜服之牡蠣煅澤㵼蜀漆洗炒啇陸葶藶海藻􅌝􅌣根各等分右為末三歲一錢燈心湯下小便利止赤茯苓散治水氣腫滿咳嗽喘不止赤茯苓桑根白皮銼貝母煨令黃各半兩川升麻甜葶藶隔紙炒令紫色杏仁湯浸去皮尖雙仁麩炒微黃桔梗去蘆各一分右搗粗羅為散每服一錢水一小盞煎至五分去渣溫服日三四服看兒大小加減服之白术散治小兒水氣腫白术木香炮甘草炙茴香炒青皮浸去皮切各半兩巴豆三十粒去皮膜同青皮一處炒好了仍去巴豆不要用右為末飯飲調下茯苓丸治小兒水氣面目腫小便澀腹脹滿赤茯苓杏仁湯浸去皮尖雙仁麩炒微黃陳橘皮浸去白瓤焙漢防己紫蘇子炒甜葶藶隔紙炒令紫色半兩右搗羅為散煉蜜和丸如菉豆大每服煎桑根白皮湯下十丸日三服五嵗以下減丸服之甜葶藶丸治小兒水氣通身腫滿心腹妨悶坐卧不安甜葶藶隔紙炒令紫色牽牛子微炒雄雀糞各半兩大戟一分巴豆十粒去皮心研紙裹壓去油膩粉一錢研入右搗羅為末都研令勻用棗穰和丸如菉豆大每服以溫水下一丸日二服五嵗已上加丸服之甘遂散治小兒水氣遍身腫滿大小便難喘促不得睡卧甘遂炒大黃銼炒牽牛子炒各三分葶藶紙上炒一分檳榔銼炒右為散每服一字熟水調下以利為度量大小加減水寶散治小兒疳水氣息通身虛腫狀如熟李者服之以利為度童子青橘皮珠子甘遂微炒右等分為末三嵗一錢用麥蘖煎湯點臘茶清調下食前通利為效忌醎酸食三五日凡治腫下氣虛只與五苓散補甘遂檳榔散治積水疳水並宜服之甘遂青皮去白檳榔取生用陳皮去白各一錢右末紫蘇木瓜湯點下忌服甘草藥積水疳水皆宜服之此候久而不痊必連隂腫脾腎俱壞之然如此已是危證不可取下只用利水道固脾土當用之五苓散和平胃散加麥門冬薑棗煎服一方無陳皮燈心蘿蔔子湯下腳腫木瓜湯下又方治小兒積水右用益黃散去丁香加木香去訶子加蘿蔔子為細末大小以意加減煎湯調下海蛤散治小兒疳水腫滿氣急澤㵼海蛤防己各一分苦蒲子三十粒右為末三嵗一錢酒調下連進二服小便利即效葶藶散治小兒水氣腫滿甜葶藶隔紙炒紫牽牛略炒取仁白桑皮炒雞心檳榔大黃各等分右為末每服半錢水半盞生薑三片蜜半匙煎湯調下或煎大流氣飲研青木香丸灌下山豆根湯治小兒氣腫滿小便澀山豆根車前子桑根白皮各半兩葵子赤小豆各半兩右細銼和勻每服取一分水一小盞煎至五分去渣分為二服每日三四服隨兒大小以意加減豬苓散治小兒水氣腫滿小便不利臍腹妨悶喘促豬苓去黑心桑根皮銼赤茯苓海蛤甜葶藶隔紙炒紫色各一分右搗粗羅為散每一錢水一小盞煎至五分去渣溫服日三四服量兒大小加減木香散治小兒水氣四肢浮腫腹脅妨悶木香赤茯苓各一分鱉甲塗醋炙令黃去裙襴川大黃銼碎微炒各一兩牽牛子微炒三分右搗細末為散每服以溫水調下半錢以利為度隨兒大小加減檳榔餅子治小兒水氣四肢浮腫脹脅妨悶檳榔一分郁李仁半兩湯浸去皮微炒用右搗羅為末以大麥麵一兩和作餅子煻灰內煨熟量兒大小與喫即得通利氣下也冬瓜圓治種種水氣大冬瓜一枚先於頭邉切一蓋子取去中間瓤以赤小豆水淘淨填滿冬瓜中間再用蓋子合了用竹簽定以麻線繫紙筯黃泥通身固濟窨乾用糯米榖舂取粳片兩大籮埋冬瓜在內以火著粳內煨之候火盡取出刮去泥將冬瓜薄切作片子并豆一處焙乾右為細末以煮麵糊為丸如桐子大每服五十丸煎冬瓜子湯送下不拘時候小便利為驗普濟方卷三百八十六
