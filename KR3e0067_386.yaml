body:
  text: 普濟方卷三百八十六明周王朱橚撰嬰孩諸熱疸腫門熱渴夫小兒血氣本自盛實腑臟之間易於生熱氣熏蒸液津乾枮故令兒渴而引飲方天麻人參煎治小兒上焦風熱熱渴引飲不止天麻人參白茯苓去黑皮各一分天竺黃研一錢甘草生用一錢鉛霜白研一錢龍腦研半兩丹砂研一錢右將先四味為細末再入研了四味和勻煉蜜煎為膏每服一大豆許用金銀薄荷湯化下枇杷葉湯一名香冬散治小兒上焦虛熱飲水不止枇杷葉去毛炙葛根胡黃連甘草炙銼玄參麥門冬去心焙各等分右粗搗篩每服一錢水一盞生薑一片煎至六分後入蜜少許再煎至五分去滓放溫二服食後服之苽蔞飲治小兒熱渴或虛熱吐下除熱止渴苽蔞三分黃芩去黑心一分知母焙小麥粟米各半兩右除粟米小麥外餘為粗末每二嵗水一小盞入小麥粟米各一撮同煎至六分去渣分作三服一日喫盡量兒大小以意加減麥門冬散治小兒夏天服藥大下後胃中虛熱渴唯飲水麥門冬去心焙龍膽各一兩甘草炙銼黃芩去黑皮各三分葛根銼一兩半右粗搗篩每服一錢用水七分煎至四分去滓溫服量兒大小以意臨時加減黃連飲治小兒多渴黃連去鬚半兩冬瓜瓤一分右細銼水一盞半同煎至八分去渣分溫三服量兒大小臨時加減蓮實湯治小兒熱渴不止蓮實三十枚炒黃細研浮萍一分右用水一盞生薑少許煎至五分去渣分溫三服量兒大小以意加減黃蘆散治小兒熱渴不止黃連去鬚炒蘆根右細銼水一盞半煎至五分去滓旋與服治小兒熱氣熏蒸臟腑煩躁津液枯渴欲引飲方右取桑枝一握細銼水一盞半煎至八分去渣分作三服加熱水與飲治小兒熱渴不止右用葛根半兩細銼水一鍾煎六分去渣頻溫服治小兒渴不止蘆籜扁豆藤各半兩人參一兩去蘆右細銼分為六服以水一小盞煎至五分去渣不拘時候量兒大小加減稍服治小兒煩熱渴以方諸向月取水飲之葛根湯治小兒體熱煩渴者尤宜服之葛根人參各一兩麥門冬白茯苓甘草澤㵼各半分右為細末每服一錢水八分入生薑二片薄荷三葉煎至六分去渣服寒熱往來羸瘦附論夫小兒風邪客於皮膚痰飲積於臟腑使血氣不和隂陽交爭故發寒熱往來也胃氣挾熱則消榖消榖則引飲食隂陽氣血不和不能充飬身體故寒熱雖能食不生肌肉也方鱉甲散治小兒寒熱往來腹脹漸瘦不能飲食服之有效鱉甲一兩塗醋炙黃去裙襴柴胡去苗訶梨勒皮陳橘皮去白各三錢檳榔三枚赤茯苓子芩赤芍藥當歸炒川大黃甘草炙各半兩右為散每服一錢水一小盞入生薑少許煎至五分不拘時溫服量兒大小加減三服為度柴胡散治小兒寒熱往來乳食不下四肢無力心腹脹滿上焦痰壅漸羸瘦柴胡去苗鱉甲塗醋炙黃去裙襴各一兩人參去蘆赤芍藥桔梗去蘆訶梨勒皮地骨皮杏仁湯浸去皮尖麩炒黃前胡去蘆陳橘皮去白甘草炙銼各半兩右為散每服一錢水一小盞煎至五分去渣不拘時候溫服量兒大小加減五味子散治小兒寒熱往來不欲乳食羸瘦心腹脹甘草半錢炙麥門冬半兩去心焙五味子當歸炒人參去蘆白术赤茯苓桔梗前胡黃芩各一分右為散每服一錢水一小盞煎至五分去渣服日三服更量兒大小以意加減人參散治小兒寒熱往來食少羸瘦人參去蘆黃耆柴胡去苗白茯苓鱉甲塗醋炙去裙襴木香各半錢訶梨勒皮二分白术一錢杏仁一分湯浸去皮尖麩炒微黃甘草一分炙右為末不計時以粥飲調下半錢量大小加減服之馬通粟丸治小兒脅下有氣腹痛喘逆氣息難為往來寒熱羸瘦不食馬通內粟細辛紫苑洗去土苗杏仁浸去皮尖麩炒各三分五味子石膏秦芁去苗白茯苓半夏湯浸七遍各一分右為末煉蜜和丸如麻子大每服以粥飲下五丸日三服量兒大小以意加減香甲散治小兒寒熱往來肌瘦木香鱉甲醋炙黃去裙襴各一分檳榔三枚川大黃陳皮去白柴胡知母甘草當歸各半兩洗焙右㕮咀每服一錢水一小盞生薑二片煎至六分去滓溫服量大小加減黃耆丸治小兒往來寒熱多汗心煩小便赤黃不欲乳食四肢羸瘦黃耆麥門冬去心焙赤茯苓白术黃芩甘草炙各一分柴胡去苗鱉甲炙去裙襴各半兩右為細末煉蜜和丸如菉豆大每服以粥飲下五丸日三服量大小加減服之訶黎丸治小兒寒熱往來頭痛嘔吐及乳癖訶黎勒皮木香人參去蘆赤茯苓桂心川大黃炙銼各半兩陳皮半兩湯浸去白皮焙柴胡去苗三分右為末煉蜜和丸如菉豆大不計時候以薄荷湯下五丸日三服量兒大小以意加減檳榔丸治小兒乳食不節傷於脾胃致成往來寒熱時復嘔吐不欲乳食漸至羸瘦宜服檳榔丁香桂心人參去蘆各一分川大黃銼炙陳橘皮浸去白訶黎勒皮各半兩右為末煉蜜和丸如菉豆大不計時候以薄荷生薑湯研下五丸看兒大小加減芍藥散治小兒寒熱往來啼呼腹痛宜服赤芍藥寒水石黃芩當歸炒甘草炙銼半兩桂心一兩右為散每服一錢水一小盞入生地黃半錢煎至五分去滓不計時候溫服量大小加減柴胡散治小兒寒熱往來面色萎黃柴胡去苗半兩石膏一兩川大黃炒麻黃去根節秦芁去苗恆山各一分右為末每服一錢水一小盞煎至五分去滓溫服日三服更量兒大小以意加減莾草湯治小兒寒熱往來不休不能乳食浴時避風乃愈莾草丹參各一兩菖蒲蛇牀子桂心各半錢雷丸一合右都銼以水五升煮至三升去渣適寒溫以浴兒宜避風冷芍藥湯治小兒寒熱往來赤芍藥一分黃芩當歸洗焙乾柴胡甘草各一分右㕮咀每服一錢水八分生薑二片棗子一枚煎至五分去滓溫服量大小加減秦芁湯治寒熱往來秦芁鱉甲醋炙微黃去裙襴川大黃微炒麻黃銼各半兩去根節竹茹甘草各一兩右㕮咀每服水一盞蔥白二寸煎五分去渣服量大小加減草果飲治小兒寒熱盜汗不思飲食面黃腹急草果一兩厚朴二兩甘草棗子各半兩生薑四兩不去皮同杵淹一宿焙右㕮咀三歲一錢水半盞煎至三分去滓一方治五瘧夜明砂為末冷水調下半錢即效鱉甲散治小兒寒熱往來四肢羸瘦鱉甲三分塗醋炙黃淡竹茹川大黃炒各一錢恆山一杏仁許大右為散每服一錢水一小盞入蔥白二寸煎至五分去滓入麝香豆大煎一沸溫服日三更量兒大小以意加減生地黃散治小兒寒熱往來啼呼腹痛生地黃桂心各等分右以水三升煮取一升周嵗以下服二合以上服三合一方七味有芍藥寒水石黃芩當歸甘草各半兩地骨皮散治小兒寒熱更作急體羸瘦煩渴引飲不思飲食人參去蘆白术白茯苓去皮三味各一兩前胡地骨皮當歸洗焙陳橘皮甘草半夏麯桔梗去蘆頭七味半兩右件㕮咀每服二錢水六分生薑一片棗一枚同煎至四分去滓溫服不拘時候寒熱結實附論夫小兒寒熱結實者此由風邪客於皮膚而內有痰飲積於臟腑使氣血不和隂陽交爭則發熱臟腑本實復為熱所乘則積氣在內使人胸脅心腹煩熱而滿大便難小便澀是謂寒熱結實也方柴胡丸治小兒寒熱結實或熱攻衝心肺氣急盡晝夜有汗日漸羸瘦不喫乳食柴胡半兩去蘆赤茯苓一分人參一分去蘆木香一分桂心一分川大黃半兩炒枳殼一分麩炒甘草一分鱉甲半兩塗醋炙微黃去裙襴右搗羅為末煉蜜丸如麻子大每服溫水下五丸日三服量兒大小加減服之大黃丸治小兒增寒壯熱發渴不定腹中結實不能乳食川大黃半兩炒柴胡赤茯苓一分木香一分桂心一分枳殼一分麩炒桃仁一分湯浸去皮尖炒黃檳榔半兩人參一分去蘆頭右為末煉蜜和丸如麻子大每服以溫水下五丸日三服量兒大小加減服之芒硝丸治小兒宿食痰癖寒熱臟腑結宜服之川芒硝半兩川大黃半兩炒甘遂一分半夏一分湯洗七次巴豆二七枚去皮心膜紙裹壓去油杏仁二七枚去皮尖别研代赭半兩右為末與巴豆仁膏一處研勻煉蜜和搗二三百杵丸如菉豆大五六嵗兒空腹以溫水下一丸利為度鱉甲散治小兒寒熱結實脅下妨悶不欲乳食鱉甲半兩塗醋炙黃赤茯苓半兩川大黃一兩炒枳殼二十粒麩炒川朴硝一分右為散每服一錢以水一盞煎五分去渣溫服不計時量大小加減五靈脂丸治小兒腹有積滯致生寒熱腑臟結實心腹氣脹食多少力五靈脂半兩陳橘皮三片湯浸去白木香半兩川大黃一分炒巴豆霜一分右為末入巴豆霜同研令勻用軟飯和丸如黍米大每服以粥飲下兩丸小兒一丸爽神湯治小兒清寒壅爽精神白术人參去蘆白茯苓各一兩桔梗瓜根甘草各半兩辛細一錢右㕮咀每服一錢水八分入荆芥薄荷各少許煎至五分去滓溫服冷熱不調附論夫小兒冷熱不調者蓋為乳食乖度寒溫失莭或隂陽相爭氣血不調致令冷歸下焦熱衝上膈若風冷入於腹胃則㵼痢不定或腹中氣滿或時嘔逆不能乳哺故謂之冷熱不調也方犀角湯療小兒冷上熱下熱上冷下難將息方犀角末甘草生地黃芍藥白术茯苓梔子各三分柴胡人參大黃生薑各四兩黃芩二分桂心一分右㕮咀水三升煮服一升分溫服之木香散治小兒冷氣不調胃氣壅滯少思飲食木香一分大腹皮一分人參赤茯苓青橘皮去白訶梨勒皮桂心前胡半夏丁香甘草各一分右為散每服一錢水一小盞入生薑半片大棗一枚煎至五分去滓放溫量兒大小以意加減犀角散治小兒冷熱不調或時下痢腹痛不能飲食犀角屑桂心甘草炙當歸炒黃連陳皮浸去白人參乾薑炮各半兩右為散每服一錢水一小盞煎至五分去渣日三服量兒大小加減訶黎勒散治小兒冷熱不調大便或壅或通不欲乳食訶黎勒皮半兩人參一分去蘆檳榔一分木香一分川大黃半兩炒桂心一分川芎一分右為散每服一錢水一小盞入生薑少許煎至五分去滓不計時候大小加減溫服赤芍藥丸治小兒冷熱不調不思飲食積不消赤芍藥三分桂心一分柴胡去苗半兩川大黃三分炒赤茯苓半兩鱉甲一兩塗醋炙令黃去裙襴右為末煉蜜丸桐子大二嵗以上粥飲化破三丸日三服如四嵗以上至七嵗七丸以粥飲下白术散治小兒冷熱不調腹內疼痛發渴不定白术半兩當歸半兩芎藭半兩乾薑一分炮青橘皮一分湯浸去皮甘草一分炙右為散每服一錢水一小盞煎至五分去渣不計時候量兒大小加減服之當歸丸治小兒冷熱不調大便青黃心腹多痛不欲乳食當歸炒人參去蘆白芍藥芎藭甘草炙白术各半兩右為末麵糊和丸如麻子大每服以粥飲下五丸日三服三嵗已上加丸數服之香連散治小兒冷熱不調腹痛下痢木香當歸微炒乾薑炮各一分黃連去鬚阿膠炒黃各半兩右為散每服以粥飲調下半錢量兒大小加減頻服木香丸治小兒冷熱不調腹痛不可忍或時寒熱下痢膿血木香一分芎藭當歸銼炒桔梗去蘆黃芩各半兩右為末煉蜜和丸如桐子大不計時候以溫生薑湯研破二丸服之量兒大小以意加減赤茯苓丸治小兒冷熱不調腹胃滯結壯熱時作兩肋刺痛赤茯苓川大黃銼微炒鱉甲塗醋炙令黃去裙襴各三分當歸川芎各一分右為末煉蜜和丸如菉豆大每服以粥飲下五丸日三服量兒大小以意加減調氣散治小兒四五嵗腹內冷熱不調不能飲食白术人參去蘆甘草炙各三分厚朴一兩去粗皮薑製右為散每服一錢水一盞入生薑少許煎至五分去滓服量兒大小以意加減黃疸病附論夫黃疸以身皮皆黃者病也身痛體背強大小便澀一面目指爪盡黃小便如屋漏色看物皆黃渴者難治此黃疸也此證多得於大病後身微黃者胃熱也大人亦同又有面黃腹大食吐渴者脾疸也又有自生身黃者胎疸也古書云諸疸皆熱色深黃者是也若淡黃兼白者胃怯胃不和也黃疸者由脾氣