body:
  text: 普濟方卷四百三明周王朱橚撰嬰孩痘疹門一切痘疹附論夫嬰孩患疹痘瘡子者皆是積熱在於臓腑蒸欝熱毒散於四肢小兒皮膚内嫩弱多成此疾凡食乳嬰孩湯藥不可與童兒同療用藥過劑必有損也盖由輕啜乳在於臟腑熱極方成此疾腑熱生於細疹臟熱生於痘瘡若用湯藥宜療於乳母也又絶乳嬰孩患者多由積熱伏在於脾肺之間而不早以湯藥療其病源則毒熱行於四肢榮衛之中漸透於肌膚之表疹痘乃隨邪熱而出也嬰兒之性自然陽盛而隂㣲臟腑隂陽氣逆大小便多秘不通纔覺是此疾即可便與疎利即輕患也若已出即不可踈轉若出定却宜利大小腸按扁鵲及倉公論云療於嬰孩服以湯散性有可餌之者不可餌之者宜先和莭隂陽調治榮衛方利臓腑即熱氣漸觧也凡絶乳嬰孩生於疹痘或未出已前是此疾候按扁鵲論云可先以油劑服之行觧四肢熱極或疹痘已出不可以油可服平和湯藥療於肝臓觧於敗熱慮熱毒攻肝後衝於眼目生障翳今覩時醫及疾患之家疹痘未出已前多是誤認疾候皆以他藥觧之其間或餌以躁藥或餌以冷藥不無失傷時醫用藥直候瘡疹子出病家方覺患者住餌醫者拱手已患之後俗多禁餌致大小便不通不能調於湯藥和於臓腑遂停敗熱在於臓腑之間攻於肝臓疹痘纔愈致令衝於眼目成於障翳不遇醫治瞳人遂損因兹無所見也凡㫁乳嬰孩童子患疹痘疾候初覺多似傷寒面色與四肢俱赤壮熱頭疼腰背疼足多厥冷眼睛黄色脉息但多洪数纔大不定小便赤少大便多秘纔覺四肢色候及脉息雖是疹痘疹未攻皮毛穴出者便可以服餌勻和臓腑踈洩逐下若疹痘已結右皮毛穴處㣲似出即不可踈洩也或疹出大盛竇穴膿水者却可䟱利也或未與䟱利轉即且急服紫草飲子方辯小児痘証呵欠嚏噴睡中發驚或耳尖冷眼澁辯復食口熱或口中醋氣妳瓣不消或腹中疼痛如斑證少具其斑未發乃與升麻湯三五錢帶熱服之待身表温和斑瘡已顕服藥乃止如其身凉其斑未出辨得斑証無問服数直候身表温和斑瘡顕後乃止只時時與桔梗湯寛利胸膈快咽喉方宣風散治小児瘡豆盛出身體熱煩渇腹脹氣喘大小便澁面赤悶乳及氣腫水腫并一逐脾間風又治風腫積腫又治熱筋脉攣縮作痛及豆瘡二三日瘡病不佳欲死者一服効盖熱氣蒸於皮膚故瘡痂不得焦也宜服此導一二行後服生犀磨水觧之瘡痂即焦其効如神㯽榔陳皮甘草各半両牽牛用四两半生半炒右為細末三二嵗蜜湯下半錢三嵗以下一錢食前易老加防風海蔵云與通膈丸相上下氣血也一方用一錢水半盞食前服風熱蜜湯調下牛蒡殭蚕散牛蒡子炒五錢白殭蚕去絲觜炒一分右為末每服一大錢水六分盞紫草二七寸煎四分連三服量児大小加减薄荷散家薄荷葉一两麻黄去莭甘草炙各五錢右為末入姜棗煎服量児大小為劑荆芥湯荆芥穗薄荷葉牛蒡子炒甘草炙各等分右㕮咀白术煎量児大小為劑安班散調理瘡疹已發未發皆可服之川升麻赤茯苓白者亦用黄耆羗活各一两人參去蘆枳殻去穰炒桔梗甘草各五錢右㕮咀每服二錢水半盞紫草少許薄荷一葉煎至五分去滓通口服之或加木通糯米同煎量児大小為劑余記治一小児瘡豆毒氣入心心煩強躁適無討腦子處極是束手無措余自處一方應手而愈用菉豆粉一錢硃砂五分研極細麥門冬濃煎候温調五分服隨即心神定自此而愈此乃觧圍活法耳余記一婦人年十八九嵗出豆正出後忽平伏低䧟適遇經脉行其家甚慌余曰証雖危然豆疹低伏乃是血動或苦無害遂用四物湯加人參黄茋四服痘子光壮後只是四物湯此病危甚而愈當歸丸當歸五錢甘草一錢黄連大黄各二錢半右先將當歸熬膏子入藥末三味為丸漸加服之以利為度消毒救苦散治班疹悉具消化令不出如已出稀者再不生斑仲冬立此方隨四時加减通造化明藥性者能此麻黄羗活防風各五分川芎藁本葛根蒼术黄芩酒炒生黄芩柴胡各二分細辛紅花蘇木橘皮白术各一分升麻生地黄酒黄栢各五分生甘草一分黄連當歸身各三分連翹五分吳茱莄半分右剉如麻豆大每服五錢水二盞煎至一盞去滓熱服空心食前夫斑瘡出者皆因内傷必出斑营氣逆故也大禁牽牛巴豆食藥宜用半夏枳术大黄益智之類去其青㵼止其吐若耳尖冷呵欠睡中驚嚏噴眼澁必出斑也諸大膿胞水小斑癮疹三色皆营氣逆而寒復其表宜以四味升麻湯中加當歸連翹此定法也如肺或膿斑先顯喘咳或氣髙而喘促加人參黄芩以㵼壮火而補元氣如心出小紅斑必先見血溢驚身熱肌肉腫脉弦洪少加黄連如命門出癮疹先必骨疼痛不敢動揺少加生地黄黄栢諸斑疹皆為隂証瘡湏因傷於乳食脾胃不足营氣逆行雖火勢内熾隂覆其外故錢仲陽製四物升麻湯發之如有𫝊變証依加减服之紫草飲子治小児痘瘡出被風吹復不見入皮膚内紫草人參芍藥蝉蛻甘草川山甲土拌炒各䓁分右為末每服一錢水一盞煎七分作三四次温服平和飲子治小児瘡疹人參白术茯苓甘草升麻各等分右為細末每服一二錢水煎去滓温細細飲之量嵗大小虚實以意詳之此藥治諸瘡疼痛煩渇不寕者皆可服之惟小児瘡疹尤佳連翹散治一切熱兼治瘡疹有神連翹防風梔子甘草各等分右為末水煎服海蔵云治熱在外而不厥此少陽藥也木香散藥性温平能和表裏通行津液清上實下救隂助陽治小児腹脹㵼渇其効如神瘡始出五六七日之間身熱或腹脹足指冷或㵼渇或身熱驚悸腹脹或㵼頻津液内耗血氣不勻瘡雖起而不靨如身温腹脹咬牙喘渇難治縁水糓去多津液枯竭飲水不止蕩散真氣故多死者急與木香散異功散救之若欲靨已靨忽不能靨腹脹煩渇及瘡已靨其痂欲落不落煩渇不止不可與水宻西𤓰紅柿食之轉生焦渇或頭温足冷或㵼咬牙難治急宜服之如腹脹㵼渇足指冷渇驚悸渇身温渇面色㿠白渇寒戰渇氣急咬牙渇水轉渇不已已上九證非熱也脾胃虚津液衰少也宜木香散不愈加丁香攻裏官桂發表表裏俱實其証不致痒塌喘喝而死木香大腹皮沉人參去蘆桂心赤茯苓去皮丁香前胡去蘆訶子肉青皮去穰一用陳皮半夏姜製甘草各三分右剉每服二錢姜三片煎温服空心量児大小以意加减異攻散能除風寒􅊜痺調和隂陽滋飬氣血使痘瘡易出易靨不致痒塌痘瘡欲靨已靨忽不能靨頭温足指冷或腹脹㵼渇氣促速宜服此瘡痘十日至十一日當靨不靨身不壮熱悶亂不寕不則硬氣煩渇咬牙急宜服此加木香官桂以救隂陽表裏木香官桂去皮人參去蘆赤茯苓去皮當歸丁香厚朴姜製陳皮去白肉豆䓻各二錢半白术一錢五分半夏一錢半製附子炮一錢半有熱去之右麄末每服三錢水一盞生薑三片枣五枚煎七分去滓空心稍熱服三嵗児作三度服五嵗児作两度服一週两嵗児作三五度與服病有大小以意加减此藥家傳五世累經効騐此藥専理瘡痘泄㵼寒戰咬牙氣急痘不光澤一方無陳皮半夏人參羗活散加麻黄用薄荷葱白煎服湯氏曰汗後尚熱宜服此去麻黄加紫草如已見三五㸃加紫草陳草皮赤芍藥使熱退瘡出亦輕更調辰砂末半錢以制胎毒瘡出亦輕胡荽酒治瘡疹令速出一名胡荽散用胡荽三两切先以好酒三盞煎至数沸入胡荽再煎便用噐盖定不令氣出候冷去滓㣲㣲從項已下以噴児背腹及两足不可噴頭面仍噴房内床帳常掛胡荽以群穢惡楊氏曰以胡荽酒噴身使瘡出快也若児虚弱及天氣隂寒則可用之若春夏晴熱陽氣登越之時及児壮實加以酒麴助虚以大益大胃中熱熾毒血蓄聚變成黒䧟急煎紫草湯入猪尾血和龍腦服之一方胡荽法令乳母飲酒為佳人參羗活散治小児疹痘因服熱藥多發而不透身體頭面两目皆腫連日風搐奮身硬直以荆芥薄荷煎湯服一方用天麻防風丸煎紫草湯同羗活散調服方見本門痘瘡未見乃可表發類消風散治痘瘡或發或未發忽面青暴吼為風邪所傷用此主之痘證以痘冷尻冷足下冷及耳後有紅縷之然湏見心胷間細㸃如粟起則真是人參川芎羗活白茯苓去皮殭蚕炒防風藿香蝉退荆苓穗甘草炙厚朴製陳皮各二錢右為末荆苓湯下紫草生䓤湯常服亦得紫背荷殭蚕散紫背荷葉霜後貼水者住真殭蚕炒去絲牛蒡子炒各等分右細末研胡荽汁和酒服一錢米飲亦可五積散方見風寒暑濕門中寒類凡遇冬春天寒恐被風寒侵襲去麻黄加肉桂當歸川芎紫草薑葱煎一方加木香砂仁薑棗煎服辟穢丹熏觧穢惡蒼术甘松川芎乳香降香北細辛右末水丸烈火焚之㵼膀胱法先用桂枝芍藥大㦸等分為末服一錢枣湯調次服加味宣風散方見瘡疹到靨類大功散治痘瘡未發正發及未受證者蒼术五錢米泔浸一宿陳皮五錢去白防風去蘆荆芥穢各三錢赤芍藥五錢厚朴薑製炒柴胡去蘆縮砂仁各二錢牛蒡子炒二錢當歸酒浸二錢紫草三錢川芎五分黄芩二錢乾葛二錢甘草炙一錢右晒乾為末每家用田螺靨七箇桃桞枝各七寸菉豆浸透取皮半盞浄先司命鍋入井水煎熟出滓取清汁再研雄黄末一錢同入鍋内攪匀用節子捧在中庭自東方起南西北中各倒一盞將藥與已出及方發熱及未受證者服聖功散治豆瘡已出未収服此觧熱消毒勻氣活血調脾歛瘡神効防風蒼术米泔浸荆芥穗陳皮去白牛蒡子炒木通人參去蘆川白芷厚朴薑製黄耆塩水炙黄芩當歸酒浸赤芍藥柴胡去蘆肉桂去皮木香枳殻煨赤茯苓甘草炙􅒦砂仁蟬蜕川芎紫草桔梗各等分右除製外餘藥不見火晒為細末先用米泔水温調一服次淡煑獖猪肉或鰱魚田螺泥鰍櫓藥與患者空心食之無熱者酒調肉櫓有熱者米泔汁調藥櫓肉食之如痘不起脹用常酒鉼藥與藥末等分酒調肉櫓食之瘡起脹便去酒藥如前櫓食如大便秘結加四順飲櫓食㣲利即去四順飲如前櫓食空心櫓食聖功散仍食後服神功散以解熱毒天花散治痘失音天花粉桔梗白茯苓去皮訶子肉石菖蒲甘草炙右末水調在椀内用小竹七莖縳作一束㸃火在椀内煎臨卧服茯苓湯治豆瘡痰盛白茯苓去皮桔梗去蘆天花粉半夏湯泡甘草右剉生薑夾門冬煎服蟬蜕一物散治瘡疹漸作身熱似傷寒候只耳尖脚稍或腹痛者是瘡疹用蝉蜕二十一箇洗去泥土為末用水一盞慢火煎至七分去滓量大小温服如覺疹已出更依前三五次若冷服即有瘡㾗苦不是瘡疹候誤服無害三豆飲治天行疹痘活血觧毒或覺鄉井有此證預防之則不染赤小豆菉豆黒豆各一升甘草五錢右掬净豆甘草以水煑熟逐日空心任性食豆飲汁已染者輕觧未染服之七日不發如冬月常服可消臓腑中藴熱惺惺散治小児風熱及傷寒時氣瘡疹發熱咳𠻳不已恐生疹子桔梗細辛去葉苽蒌根甘草炙白术人參去蘆白茯苓去皮川芎各等分右為末每服一錢小一小盞薄荷三葉同煎四分温服如要和氣入生薑煎服不拘時一方無川芎白虎加人參湯石膏知母一两甘草五錢炙粳米一合半人參五錢右剉水煎米熟為度温服天麻散天麻川芎升麻防風羗活半夏薑製各等分細辛蟬蜕去嘴足荆芥甘草炙各二分右剉薑棗煎夾寒加桂夾暑加柴胡黄芩夾濕加茯苓蒼术枳殻桔梗湯治胸腹脹滿桔梗枳殻麩炒去穰各一两右剉散每服二錢水二鍾煎至一盞分二服小児麻豆方用荆苓少許爛研以新井水將布帛裂過入一滴許麻油打勻令飯之便不悶亂麻已出用黄蠟煎青膠水即安青膠乃守皮膠是也紫草湯治絶乳嬰孩并童児患疹豆疾候初覺多似傷寒面色與肢俱赤壮熱頭疼腰脊疼足多厥冷眼青黄色脉息多浮洪至数大不定小便赤少大便多祕纔覺四肢色候及脉息雖是疹豆疾未攻以毛穴出者便可以服餌勻和臓腑䟱泄逐下藥按倉公論云可服油劑不可用燥藥不可用冷藥若疹已結在皮毛穴處㣲㣲出即不可䟱泄也或疹出大盛竇穴膿水者却可䟱利也或未與䟱轉急且即服此藥紫草二两新者細剉先以百沸湯浸好便以物合定勿令紫草氣出放入人體凡五十日至一百日嬰孩服藥注子一百五十日至二百日嬰孩服一注子一嵗至二嵗兒服半合三嵗至四嵗兒服一合並宜於食前午後服此湯疹痘雖出勢亦輕耳常服無妨治小兒未滿百日患痘瘡槐白皮湯浴方槐白皮一两益母草五两右以水五升煎至三升去滓浴兒了更取蕓薹菜濃汁煎再浴作蕓薹菜與乳母亦佳浮萍丸治小兒瘡子不出煩悶驚悸浮萍草隂亁晩蚕沙白薄荷葉各一分右為末用薄荷自然汁煑麵糊和為丸如鷄頭大每服一丸薄荷湯化下不拘時龍腦散治小児出瘡子不透旋出旋焦龍腦牛黄丹砂地龍去土取末麝香乳香木猴梨五十枚切焙雄黄各一錢研鯪魚甲五片燒灰紫草五錢甘草生剉二两右為散用猪尾上血拌勻入在竹筒子内用油单封褁綿纒定於深坑子内調稀猪糞浸二七日出净洗每服一皂子大龍腦水化下併三服見効定命散治小兒瘡疹毒氣不出或出後亁黒色服此藥發出毒氣瘡子細紅而出一名定命硃砂散丹砂研五錢龍腦研乳香研馬牙消研甘草為末各二錢右同研均用十二月新獖猪血半升同研勻用青竹筒長二尺留两頭節開一頭作竅注藥在内黄臘塞定以油絹𦂳褁封勿令透氣埋地坑中至一日五日取出水洗掛風中四十九日劈開取藥研為細散每服五分新水調下人參丸治小兒瘡子黒色用人參一分為末用牛李子汁瓷噐内熬成膏和為丸如豌豆大每服一丸杏膠湯化下不拘時中和散治小兒斑痘瘡退熱觧躁一名敗毒散白藥子甘草炙各一分雄黄一錢醋淬右為散每服五分量兒大小加减宻湯調下南朱散治小兒斑毒不退此方見瘡疹後觧餘毒類一名槐花散觧熱丸治小兒出瘡甘草生剉鐵粉青黛研各五錢右為末再研勻煉宻和丸如鷄頭大每服一丸熟水化下敗草散治小兒痘瘡抓搔成膏膿血淋漓肌肉敗壊縁血氣衰肌内故也用屋爛草乃盖屋多年爛草或盖墻頭草不以多少或曬焙為末用亁貼無時若渾身瘡破膿水不絶粘摻衣服難以坐卧可用三二升攤於席上令兒坐卧甚効神妙無時候以其草經霜雪雨露感天地隂陽之氣善觧毒竒功不可盡述又方用蕎麦粉或荔枝核燒灰摻瘡上亦好斑爛作膿痛甚者用細研黄土傅上或研芒硝末猪膽汁塗不能睡者麦麩或芭焦葉襯之綿繭散治小兒痘瘡後身體及肢節上生疳餌蝕瘡膿水不絶用出蛾綿繭不以多用白礬槌碎塞入繭以灰火燒候白礬汁盡取出研細每用亁貼痘瘡口内若不早治則潰筋骨以致難為醫治瘡爛成片方用黄牛糞亁傅膿多痛甚者亁净黄土為末傅之瘡遍口中痛不能食者五福化毒丹或生蜜浸漬黄栢取汁啖之為愈凡瘡欲成痂頻以面油酥清蜜潤之可揭血出無害若亁硬已乆必成瘢痕如茶醋如猪肝猪血之属每與食之則以脫之迹必為之黯慘然而瘡痂已脫肌肉猶嫩不可盥洗大早亦不可以手加之胡荽酒能避惡左右所不可無或蒼术降真用之亦可曰聖瘡七日熱而發七日泡而亁又七日則平復如瘡舊矣大抵調順血氣温和脾胃均平冷熱則瘡出為甚易若實實虚虚損不足而益有餘則瘡出為甚難調解之法無以逾此或豆豉燒存性作末傅之麥湯散治小兒斑毒傷寒熱咳水豆毒状如蚊咬變成赤生黒不治一名北骨皮散甜葶藶一分用隔紙炒麻黄一分去節甘草炙半分人參一两大黄一分濕紙褁煨亁滑石半分知母羗活各一分地骨皮五錢炒右為末每服半錢水一小盞入小粒同煎至十数沸服摻方治水泡豆瘡苦參滑石􅑕粉輕粉川白芷各等分右為末亁摻之立効治麸豆等瘡用山豆根水研服少許治小兒豌豆瘡衆醫不瘥服者神妙天麻甘草各一寸髮灰黄丹熬分一分馬牙硝三分五色豆各七粒黄塩一分右為散空心取一錢令水調服利下瘡隙瘥治小兒豌豆瘡方用臘月兎肉作醤食又方用臘月兎毛煎湯洗豌豆瘡及以毛傅甚良又方用肉爛煑取汁洗之亁脯亦得馬肉脯亦可治小兒發豌豆瘡用猪膽和朴消塗之治豌豆瘡取東壁土一塊許為細末傅之又方用馬齒草焼末傅瘡上其根湏臾逐藥出若不出更服良青黛散治小兒斑痘豌豆瘡青黛研如粉半两鐵精漿一升右將青黛為散臨時斟酌鐵漿調之一百日兒至二百日兒服一字七乳前服一嵗兒至二嵗半錢在食前午後各一服隨兒大小以意加減治小兒斑瘡豌豆瘡方取熟煑大豆汁服之佳又方用頭髮一两燒灰為末湯調服两字隨兒大小以意加减治豌豆瘡亁漆人中白瓦松灰各少許牙硝一分右同研細空心冷漿水調下半錢以吐為度再服一錢得利三两行其瘡自除神効治發豌豆瘡方以小兒着取月水汁和水浴之治小兒豌豆瘡入肚者用狗螢五七箇空心淡酒送下即可救之鼠粘湯治小兒瘡豆已出未能得透皮膚或出未能週遍熱攻咽喉涎盛咳𠻳赤眼心煩并消瘡癬癤如瘡豆後毒氣攻眼成翳障腫痛各以藥時時服之翳自消鼠粘子四两炒荆芥穗二两甘草一两防風五錢右為粗末三嵗一錢水半盞煎三分去滓温服不拘時臨卧逐日三服大利咽隔化痰涎止咳若春冬間常服免生瘡癤老㓜皆宜服海藏云大陽小陽藥也首論温平者此也一方沸湯㸃服一方治時氣發豌豆瘡用川大黄㣲炒水煎去滓服治小兒瘡豆方宜房室中用時時燒大黄蒼术以辟惡穢之氣不宜燒沉檀降真腦麝滴乳白膠等香加减異功散人參白术白茯苓京芍藥黄耆當歸桔梗厚朴紫草粉草炙各三錢右各㕮咀初加南木香二錢煨加肉豆蔲煨再加附子炮隨輕重旋加用水煎服之豆䓻丸肉䓻三兩木香縮砂三錢白术訶子二錢右為末米糊丸湯飲下量與𤣥參升麻湯治小兒觸胃必𫝊疹瘡未發之前並宜服之𤣥參去升麻葛根芍藥甘草炙各等分右㕮咀每服五錢水一大盞同煎至七分去滓熱服乳母多宜服升麻湯治發豆出後一向作熱山梔子柴胡黄芩升麻甘草赤芍藥亁葛等分右㕮咀薄荷湯同煎人參散治疹疽甘草一錢麻黄二錢芍藥荆芥白茯苓人參右為末每服半錢薄荷湯下括樓散治欲出豆疹括樓貝母荆芥各等分右為末用紫草同煎連三服治瘡疹不透畜伏危困者右用人牙五箇炙令黄研末乳香湯下㗜鼻亦妙香葛發斑湯治小兒四時感胃發熱皆可服惟療小兒痘瘡尚未出過者身發熱頭疼或手心冷耳冷即痘瘡之苗也宜連進此藥数服痘瘡縱出則必少十分稳當此方一大都夏真人家傳方云其家数代子孫痘斑雖有比他人自然稀少因得此方本堂屡用屡効真衛生之良劑也紫蘇一两五錢香附子一两五錢升麻一两五錢亁葛二两陳皮一两赤芍藥一两甘草一两紫草二两右㕮咀每服四錢重水一大盞姜三片葱白一根同煎七分去滓温服滓再煎服不拘時痘瘡出則不必服如痘瘡已出者不加紫草上服前藥黄耆六一湯治疹已出葛根湯痘出光壮地紅活色黄耆宻浸一两甘草一两右㕮咀入枣水煎服治卒發疹秘驗方以石灰隨多少和醋漿水調塗隨手即减治一切疹以水煑枳殻為煎塗之亁即又塗之治瘡疹用苦參五觔切以好酒三斗漬三十日每飲一合日三常服不絶若覺痺即差取根皮末服之亦良治一切疹以水煑芒消塗之治疹以苦楝皮濃煎服瘡疹已出未出附論夫瘡疹已出未出之間有類傷寒之狀其瘡之證自然増寒壯熱身體疼痛大便黄稠此乃正病若無他疾不宜服藥但當平調之如已出未出之間或㵼渇或腹脹或氣促裏虚也十一味木香散主之已出未出之間其瘡不光澤不起發窠不紅表虚也十二味異功散主之已出未出之間其瘡不光澤不起發根窠不紅而又腹脹㵼渇或氣促者表裏俱虚也宜與十二味異功散送下七味肉豆蔲丸方如聖湯治小兒身熱頭痛頰赤面紅呵欠清涕瘡疹已出未出川升麻赤芍藥甘草各二錢五分紫草五錢白术二錢陳皮一錢五分右㕮咀每服三錢水一盞煎至六分温服無時一方入薑二片葱白二根山楂子根三寸同煎熱服壮熱心煩加人參赤茯苓石膏麦門冬去心一方有全蝎木通無白术陳皮四妙湯治小兒麻豆瘡欲出渾身壯熱情緒不樂不思飲食此可以内消仍令瘡無瘢痕紫草茸川升麻糯米各五錢甘草二錢五分右為粗末每服三錢水一大盞煎七分去滓温服或有數㸃黒䧟毒攻内者如鄉村無藥便得紫草三二酒煎灌之即發出紅活二寳散治豆瘡未發服之内消已出服之觧毒不致大盛一名玳瑁散生玳瑁生犀角經湯酒泡煑者不用右二味磨水二合攪勻服一方每服半合㣲温服日四五服為佳紅子湯平調瘡疹及治瘡泡已出色不紅潤身熱喘急神志昏困一名紫草散紅花子紫草茸各一两麻黄去根節川升麻各半兩右為細末每服五分煎薄荷湯入酒一滴同調下快班散平和瘡疹貫衆陳浄洗焙亁赤芍藥甘草炮川升麻枳殻麩炒去滓各五錢右為細末每服一錢水一盞入竹葉七片煎至五分去滓温服量兒大小加减調中散白茯苓人參紫河車甘草炙各等分右為細末每服二錢水一盞姜三片棗二枚煎六分温作三两次服竹葉湯石膏四两知母二两麦門冬去心甘草炙各一两右為粗末每服五錢水二盞竹葉一握煎至七分去滓温服犀角飲子犀角甘草炙各五錢防風二两黄苓一两右為粗末每服五錢水二盞煎至一盞温服抱龍丸治小兒一切風熱中暑驚悸瘡疹欲出多睡咳𠻳延盛面赤手冷足冷發温壮睡中驚搐搦不寕脉洪数頭痛嘔吐小便赤黄天南星剉開裏白者生為末臘月内取黄牛膽汁和為劑却入膽内隂再為末半斤天竺黄朱砂二錢研水飛雄黄五錢水飛麝香好者一錢牛黄一字右同研極細滴水和丸鷄頭大每服二嵗兒竹葉或薄荷湯化下一丸不拘時候一出控心散治小兒班瘡全蝎二十四箇雄黄麻黄去節各一分右為細末用芫荽以酒煎令温調下羗活散治小兒風壅作瘡子觧熱散毒羗活獨活川芎桔梗蟬殻地骨皮前胡甘草炙柴胡天麻荆芥􅌝􅌣根防風以上浄洗等分右為細末每服一錢水三分薄荷二葉盞内煎二分通口服大小加减藥水奪命散治小兒瘡麻已發未發並宜服之升麻糯米紫草甘草各半兩木通二錢五分右為剉散每服一大錢水七分去滓温服六嵗五嵗以上量大小加减服之黄耆散治小兒熱退瘡疹黄耆柴胡亁葛甘草炙各一錢五分右為末每服一錢薄荷三葉水五分煎至三分均三呷空心治小兒麻痘已出未出便服此藥即稀牛蒡子一两同麸炒令黄色去麩甘草一錢炮右為末每服一字或二字用芫荽煎湯下四聖湯治身熱如火頭痛頰赤面紅呵欠鼻瘡瘡疹已出未出時服宜服白芍藥升麻各一两甘草紫草各五錢亁葛一两木通五錢去皮節右剉散每服二錢水一中盞入生姜二片葱白二根山楂子根三寸同煎熱服壮熱心煩加人參赤茯苓石膏麦門冬去心紫草飲治豆瘡欲發未發或未透者紫草白芍藥去蘆麻黄去節當歸甘草各等分右剉散每服二錢水一盞煎不拘時服活血散治豆瘡已出未出煩躁大人同右用北白芍藥不以多少為末白湯調下大能活血止豆瘡脹痛屡用屡効一方酒調海藏云張和之治四肢出不快加防風大効此止的大隂藥也一方剉碎水六分煎四分去粗分二服蟬蛻膏禦風邪辟惡氣透肌肉發痘瘡蟬蛻去土當歸防風甘草炙川芎升麻荆芥穗陳皮紫草赤芍藥各等分右為末煉宻為膏每一两作四十丸木香湯下一方無陳皮紫草芍藥煎荆芥湯下消毒散治小兒瘡疹已出未能勻透及毒氣澁遏雖出不快壮熱狂躁咽膈窒一寒睡卧不安大便秘澁及治大人小兒上膈攻熱咽喉腫痛胷膈不利並宜服之瘡疹初出最不宜服宣利藥恐内虚毒入於裏如五七日不大便只服消毒散微得利便即止服若别無他證不宜服藥一方并黶後餘毒未除牛蒡子六两甘草炙二两荆芥穗一两右為粗末每服二錢用水一盞煎至七分去滓温服食後小兒量力少少與之如治瘡疼若大便利者不宜服人參湯治小兒瘡痘將出人參一錢葡萄苗一分林檎一枚木猴梨七枚右剉碎以水二盞煎至一盞去滓放冷時時令喫治大人小兒瘡疹已出而復隱其勢危甚諸藥不効者治之萬不失一紫背何葉霜後貼水背紫者白殭蠶直者炙去絲右等分為末細每服一錢小兒半錢研胡荽汁和酒下米飲亦得梔子升麻湯治天行麻痘疹子未出潮熱如火讝語小便難澁升麻白芍藥亁葛山梔子藍葉甘草各等分右為末燈心同煎服之表觧散治天行水疹腥臊未出潮熱麻子等証防風川芎全蝎荆芥紅花麻黄去節當歸蟬退薄荷羗活茯苓白附子甘草各一分升麻一分硃砂研五分麝香少許右為末每服五分金銀薄荷湯調下治瘡泡將出以牛蒡子炒令熟杵為末每服一錢入荆芥穗水一盞同煎至七分放温服如瘡疹已出更服亦妙治天行瘡子不出以紅藍花子吞𢾗顆治時氣發瘡疹不出者以葡萄研酒飲之甚効痘瘡未見乃可速利附論嘗考聖思論瘡痘臓腑氣逆大小便多秘才覺似此即疾可便與䟱利而輕患也今覩時醫乆疾患之家疹痘未出已前多是悞認疾候皆以片藥治之其間或以燥藥或餌冷藥不無失傷痘瘡初覺多似傷寒證如疹痘未攻皮毛䆒出者便可服餌調和臓腑䟱洩遂下而活人書及云瘡痘與傷寒相類疑似之間只與升麻湯治瘡子已發皆可服不可䟱轉痘瘡已定却宜利大小膓此為大戒傷寒身熱固不可下瘡疹發熱尤不可轉世人乃云初覺以藥利之宣其毒氣悞矣如小兒傷寒頭痛潮熱咳𠻳氣粗煩渇心躁小便多赤大便不通熱盛於心精神恍惚即發驚搐涎盛悶亂瘡痘未分大證小兒若執前說只與升麻湯不可䟱轉其病可乎統言已發未發不可䟱轉疹痘發熱在表尤不可轉論中使洗心散治瘡痘用大黄服之能動臓腑莫有妨害乎又云痘瘡已出不可轉䟱出得已定或膿血大盛却用䟱利者亦非大抵瘡痘首尾皆不可下小兒身熱耳冷咳𠻳輙用利藥即毒氣入裏殺人論中洗心散治身熱咳𠻳麸瘡疹痘此藥性寒能利囙又如何既言瘡痘首尾皆不可下只此論中無此散内使硃砂腦射膩粉水銀等服取如爛魚膓豈不是下藥也二說俱未定董氏論瘡痘未出往往疑為傷寒即以麻黄等藥重發其汗遂使表虚裏實或稱欲出多以熱藥活人書云易流必散内用大黄麻黄治麸瘡痘疹并麻黄黄芩湯用黄芩休枚治瘡痘不快或出不快或出尚熱皆能發汗可不謂之無冷熱藥乎又云若為隂癎治之用温驚藥則熱愈盛至三四日證侯已定方用瘡痘藥所失多矣按諸書云隂癎者出於吐㵼之後大病之餘身體不熱而瘦癥者謂之隂癎不熱可得三四日證候已定方用痘藥諸書中表嘗見說有不身熱出瘡痘者不可不辨也張氏論云才覺是瘡痘便早䟱利熱輕易療又云應瘡痘早出若才出皆不可轉利既言才覺是瘡痘即是先證也又云早出不可䟱利於此自作两說使後人不能無疑惑也又錢氏論瘡痘惟用温凉藥不可妄吐下及攻發又云寒顫噤牙身黄紫腫以百祥丸下之又身熱煩渇腹滿而喘大小便澁面赤悶亂大吐當利小便不差宣風散下之嬰童寳鑑云疹痘是臓腑俱熱發皮膚為之熱在腑為疹熱在臓為痘未發同一治未出可不觧熱而退既出忌忽下及冷藥逼之其病不出在裏害人今考諸經方論有言之未盡者雖云痘瘡首尾皆不可下或云未出宜䟱利出定宜䟱利出盛宜踈利分證不明互說差殊騐之平日所治大抵瘡痘之病首尾証平下之者誤首尾有實熱證不下者誤切不可用巴豆去下之此藥乃攻食積爾首尾有虚寒證不補者誤痘瘡出透澤肥紅證平者不湏服藥寳鑑之說誠為可信錢氏之用必勝膏治五太尉而愈活人書用無比散治四惡候出不快及黒瘡子内使硃砂腦射牛黄輕粉水銀等服之取下如爛魚膓推之藥惟難用而寳鑑云未發同一治以此觀之但隨證用藥真明騐也醫官論云刑分輕重患别淺深刑法二罪俱發從重者論醫書云二病俱發從重者治誠良活法也盖瘡痘多是冬温所變若冬有非時之氣瘡毒未發之前常宜服温藥令大便稀薄四順飲服令温徴剉大黄甘草下之則濕毒内消又有時時行者大小𫝊染乗瘡毒未發之前亦可服餌兼飲油劑以預防之設有痘瘡必輕易療若身疼壮熱頭疼心煩頰赤氣粗不與小汗何由消散麻黄黄芩湯或洗心散薄荷散湯如臓腑乆秘毒攻腰膓心腹脹滿不與微利何由觧釋四聖飲大柴胡湯或調胃承氣湯然汗下之法不可造次今熱之藥用何詳審活人書云疑似之間只與升麻湯凡療瘡子已發未發皆不可䟱轉或云不可汗下寒熱之藥只可紫草湯一味飲之然此二說甚善若執其两端止治輕疾而以當治大病拱手待斃若當遇或汗或下之證而疑惑不决荏苒經時以致夭傷者多矣調瑟者必先移柱用藥者必先審證不可執一也方油劑法治小兒臓腑伏熱毒疹痘未盛四肢㣲覺有熱食物似减頭髮亁燥或熱進退右以生麻油一小盞温和熱水一小盞旋旋傾熱水入油盞内不住手以扙子打攪直候熟水盡更打令劑如蜜即止夜卧時三嵗半小盞一嵗内外者每服二蜆殻量大小加减直候大小便㣲利熱退瘡痘不生也萬全方云可先以油劑服之行觧四肢熱極或瘡痘已出不可以油可服平和湯藥療於肝蔵觧於敗熱虚熱毒大盛扁鵲油劑治預觧胎毒如已出及見紅㸃者不可服又以生甘草末或煎湯入清油用桃桞枝攪如宻量大小増减與兒服㣲利為度又方右以手蘸清油摩兒背脊中間亦騐化毒湯治小兒麻痘瘡欲出一名紫茸散紫草茸升麻少用陳皮等分右剉入糯米五十粒温服劉氏家傳方云服此一盞即内消只二服有効黄連散治小兒熱毒盛發疹痘瘡初發早覺者宜服此方右用黄連一两去鬚搗篩為散毎服一錢以水一小盞煎至五分去滓不許時候量兒大小分减温服清黛散治小兒斑瘡及疹痘心神煩躁眠卧不安右用波斯青黛如棗核大以水調服之疹痘論用磨刀水調下當歸散川當歸一两甘草一分右為細末每服二錢水一中盞豆豉十粒同煎至六分去滓量兒大小服以利動為度逐日冷喫甘草汁三嵗以下一嵗以上加减服治瘡候未作膿心膈躁睡不安者右用黒豆煮汁徐徐服亦觧油劑方治小兒方一二嵗發熱恐成瘡豆以此止之生麻油童子小便各半盞右逐旋夾和以桞枝頻攪令如蜜毎服二蜆殻許服畢令睡少時但三四服大小便利身體熱退即不成瘡痘之證若行迹以露不可服化毒散治小兒瘡痘始出纔有白泡忽䧟入於肉漸漸作紫色無膿日夜啼哭煩喿一名敗毒散欝金甘草炙一分右用水半椀令水亁去甘草將欝金切作片子令亁為末入生腦子半錢研令均用生猪血研成稀膏子煎薄荷湯化下一錢不過二服其毒氣從手足心出如癰状乃差此五死一生之疾候若便血瘡壊無膿者十死不治一法可用蟬蛻末半錢好腦子一皂子大猪心血三皂子大和作膏子用熱酒浸紫草令温下化服多時身上發大熱瘡毒頓出然後可依證調治之瘡疹出不快附論夫痘瘡出不快皆言毒氣壅盛妄謂其熱以藥宣利觧散致令臓腑受冷榮衛澁滯則血氣不能充實皮膚肌肉其瘡不起發不充滿不結實不成痂煩多痒塌煩躁喘渇死皆因宣利觧散之過也關人氏云出不快者数証不囬下可不辨者自紅斑出齊之後當滴成血泡血泡成膿膿泡成痂疕而愈若結斑已見三四日而不愈者乃毒氣内䧟其證危矣切不可妄發及妄下發之則為斑爛下之則為虚脫凡小兒藴毒在内遇冬温或春夏暄熱腠理蒸鬱遂出為瘡痘若正發之際忽天氣大寒毒氣交伏而不出則精神昏冐面青發熱或纔言妄語當此令用觧肌表而出之如紫草蟬蛻發散兼温飬如或血散之類或寒證畢偹者凡和觧散之劑皆可斟量用之又有紅班方出或内虚或因犯胃氣臓腑自利虚弱不食遂䧟而不出者亦用温裏之藥甚者雖硫黄薑㫿靈磣伏火丹砂等亦可用或將成血泡之際一半尚是紅斑㸃者此毒氣發越未透也宜半温裏半助飬之劑或内虚甚而生寒大便利者宜理中薑附軰以温之裏温則氣不消不䧟伏也内實者皮厚肉宻毒氣難於發越至服大黄梔子亁葛石膏之類而得乎順者或有通一當炎月觸暑者邪煩躁喘急大渇昏迷而發不映用白虎石膏湯抱龍五苓之類而得安靜者此皆臨病識證隨時審辨不可執一也凡瘡疹或成膿泡一半尚是紅㸃此毒氣發越未透必不能乳食大便如常者宜半温裏半助飬之劑理中湯四聖散紫草木香湯若内實之人皮膚厚肉理蜜熱毒難以發泄至服大黄梔子亁葛之類不得平順者宜服犀角消毒飲方藍根散治小兒瘡疹出不快及倒靨板藍根一两甘草剉炒三錢右為細末每服半錢或一錢取雄鷄冠血三两㸃同温酒少許食後調服下無證勿服四物湯治小兒時行疹痘熱已出未出不快又消瘡斑余毒大瘡痘不透者為血澁故也此藥能活血調順瘡痘無如此藥活人書用一味白芍藥為末治瘡痘不快以此如四物湯誠瘡痘之仙藥也一方加甘草尤妙白芍藥川芎熟地黄當歸各等分右為麄末三嵗一錢水半鍾煎三分去滓此本是婦人藥治血利痢入嬰粟殻同煎甚妙化毒散治小兒瘡痘未定或出不快紫草茸升麻甘草炙各等分右㕮咀三嵗一錢水半盞糯米五十粒同煎三分去滓不拘時劉氏傳云麩豆欲出渾身壮熱不思飲食若服此一盞即内消已有一两顆出即觧其半若全出即當日頭焦只三服消毒消飲同服妙紅花湯治小兒瘡痘不出紅花子紫草茸各五錢蟬蛻一分右㕮咀酒水中半煎去滓温服大小加减驅毒散治小兒瘡疹痘不快白花蛇酒浸一宿炙黄去骨為末麝香少許右為末三嵗一字酒調下蟬蛻湯亦得良乆便出無比散治小兒瘡疹出不快及黒瘡子應一切惡候及治痘毒灌咽喉聲啞涎喘硃砂一两好者牛黄麝香腦子膩粉各一分右為末一嵗一字水銀少許用猪血尾三两滴新汲水調服寕稳得睡然後取下如爛魚腸葡蔔穗之類涎臭亞物便安乳汁調尤妙一方無水銀大人半錢如聖紫草湯治瘡痘出不快或喫乳嬰兒與乳母兼服之四五嵗已外只令兒服紫草二両陳橘皮一両右㕮咀白水煎服一方為末毎服一錢水盞入葱白三寸煎至六分去滓温服量兒大小加减麝香膏治瘡疹不透右旋取猪心血調麝香少許塗两手心并口唇上無價散治斑瘡發出不快經驗名化毒散預取等分黄土窖五日砂鍋盛塩泥固濟日乾至臘日燒末入麝少許各徤效化毒散人猫猪狗臘晨燒少許㣲將蜜水調百者救生無一死萬鋌黄金也可銷右將前四物於臘日早晨日未出盛貯於銷一鋌銀锅子内用木炭火籠煆令烟盡白色為度但有發瘡以覺有瘡或發不快倒推黒靨一切惡瘡並皆治之毎遇小童但覺瘡証毎用藥一字用蜜調服萬無一失㨿此藥工効無名可揚故以無價散呼之上項用人猫猪狗四􅀈亁糞依上法治用救生散治小兒斑疹出不快倒䧟欲死者右用真蒲黄五月上旬丙丁子日采以銀噐内慢火炒令深紫色細研毎藥一両入真麝香一字研勻毎服一字至半錢入薄荷汁五㸃温酒調下斑疹黒䧟昏潰喘滿欲死者二三服神效萬金散治瘡疹已出未能勻遍色不紅潤防風三錢人參蟬蛻各二錢右為細末煎葡萄湯調下如無蜜葡萄亦可煎湯服了急用芥子末白湯調如膏塗兒脚心亁即再傅其毒漸復出瘡疹依前紅活神效散治小兒瘡泡欲出不出雖出不快倒靨者右用鷄抱子殻内白皮不以多少以木炭火燒為灰出火毒細研以新汲水調下毎服半錢日三服加味四聖散治瘡出不快及變黑䧟倒靨紫草茸木通黄耆炒川芎各等分甘草炙减半右剉白水煎服大便秘加枳殻大便如常加糯米百粒或曰糯米能觧毒發瘡一方加南木香同等分絲𤓰湯發瘡疹最妙右用絲𤓰連皮燒存性為末湯調服楊氏曰發痘瘡最妙或加甘草紫草安斑散黄耆赤茯苓去皮羗活人參去蘆桔梗去蘆紫草枳殻炒各五錢右剉紫草薄荷煎温服熱而實者加升麻或加白木通糯米煎快斑散紫草茸五錢陳皮二錢黄耆三錢赤芍藥五錢甘草炙三錢右剉加糯米百粒煎三嵗以上服三錢以下一錢服後瘡徧勻四肢住後服犀角觧毒飲治小兒内壅邪熱瘡不出快惡實四両炒即牛蒡子甘草一両炙防風五錢荆芥穗二両右為末煎紫草糯米園荽子湯調食後臨睡日三服或云瘡痘已出欲出熱盛服三四服消毒發瘡神效一方為散水煎服大便實加大黄猪苓湯治暑天冐熱渇昏迷瘡出不快猪苓去皮一両澤㵼二両白术一両五錢赤茯苓二両右末加辰砂末煎車前子草生地黄麥門冬下小柴胡湯右加生地黄紫草木通車前草同煎服方見瘡疹大盛類快毒丹治疹痘瘡氣勻則出快盖血隨氣行若内有邪熱使氣不勻宜服之黒牽牛南木香一方用各一分肉豆䓻一方用半両青皮各等分半生半炒一方用一両五錢右末滴水丸黍米大毎服七粒至十粒量大小加减丸数紫草葱湯下前賢處方有𤣥妙木香勻氣豆䓻青皮補脾又以牽牛㵼腎膀胱之腑也托裏散小兒痘瘡毒根在裏或氣血虚弱或風邪穢毒冲觸使瘡毒内䧟伏而不出出不勻者快此藥活血氣調胃補虚内托瘡毒使之盡易収易靨人參去蘆川芎防風苦桔梗去頭尾甘草生的當歸酒浸肉桂去皮取末二錢五分川白芷不見火黄耆寸截塩水蒸炙厚朴姜汁浸一夕晒右當歸人參黄耆各二両餘各一両為末拌勻木香紫草調下一名内托散又托裏散補虚活血氣發瘡通行血氣位加黄耆木香赤芍藥蟬退肉桂各等分右用白水煎服紅粉丹治腑熱瘡疹不勻龍腦細研一錢南星臘日醸牛膽中白日内隂乾者取末一両坯子染胭脂硃砂細研水飛天竺黄末各一両右研勻煉宻和丸如鷄頭大毎服一粒人參湯下滑石散滑石甘草炙各半両右為末毎服一錢半鷄子清酒少許調下一方燈心湯調下一名玉漿散脫齒散治瘡疹不出百藥不中者服此即出右以人牙齒脫落者不拘多少於瓷内固濟大火煅令通赤候冷取出為末用薄荷酒調下半錢良乆脉平和毒氣散瘡如粟米一方燒存性熱水調服紫金散療小兒瘡疹不快倒靨紫草蛇退皮炒焦牛李子炒各五錢右為麄末毎服一錢水七分煎至四分去滓温服如聖散療小兒斑瘡不快倒靨右用赤芍藥不以多少杵為細末毎服半錢煎葡萄酒冷調下白湯服亦可不拘時候鷄蜂方治小兒斑瘡出不快右用開花蘿蔔煎汁時時與飲之玉訣酒調散治發瘡疹不出牛蒡子五錢炒紫草麻黄去節各半錢當門子五粒末一字臭椿子去皮為末一錢右以温酒調下一字或半錢紫草湯治三十六種内瘡子候麻黄去節人參各一分杏仁七粒去皮右麄末用水二盞煎至一盞去滓却分為三四服温下分作二日服未可用諸藥治小兒痘瘡出不快并傷寒不語亁野人糞炭火煆為灰腦子麝香各少許右為末毎服一二錢新蜜水調下治小兒發斑瘡大蟬蛻三十一個去足洗甘草一錢半右用水半椀煎至一盞旋與服盡效已用驗治小兒斑瘡不發右以乳香研細用猪心血為丸櫻桃大水磨下一丸至聖未星飲子治小兒瘡子不出及不快硃砂一分欝金半両右為細末毎用一字或二字量兒大小入龍腦少許以新汲水茶脚少許用調勻然後刺獖猪尾血滳三㸃子入藥汁中令服不過一二時辰瘡子出便紅活兒無他病神效紫草膏治麻豆不快殭蚕炒二個麻黄去節甘草炙各二錢全蝎十個紫草白附子各一錢右為末用蜜一両酒半盞入紫草煎数沸後令旋旋同和煎藥丸如皂角子大毎服一粒用紫草湯化下續用黄耆散調之治瘡子未透黒靨者右用蟬蛻不以多少洗净為末一錢熟水調下立見出透食乳者乳母亦服一錢神效紫草木通湯治瘡疹出不快紫草人參木通茯苓糯米各等分甘草减半右剉散煎二錢温服内虚大便利者可入南木香去紫草一方無糯米用粳米加味四聖散治瘡痘出不快及變䧟倒靨小便赤澁餘熱不除一切候或被風吹復不見入皮膚内者紫草茸木通去皮節南木香黄耆炒川芎甘草人參各等分蟬蛻去足翼二箇右剉散毎服二錢水一盞煎不拘時候温服大便秘加枳殻少許大便如常加糯米百粒性觧毒能驤而發之快斑散治痘瘡出不快紫草蟬退去足翼及土人參白芍藥各一分木通一錢甘草炙半錢右剉散毎二錢水一盞温服神驗散治小兒瘡子黒色及出不快鯪鯉甲火炮黄色全老二十片地龍去土炒二十枚紫草五枚右為細末毎服半錢温酒調下後用衣盖紅色即出四君子湯痘疹論云胃主飢肉調脾進食活血勻氣其瘡不致痒塌倍加川芎當歸赤芍藥木香紫草縮砂仁陳皮枳殻各等分右為末糯米湯調服玳瑁散治小兒瘡疹熱毒内攻紫黒色出不快右用生玳瑁水磨濃汁取一合獖猪心一箇取中血一皂子大同研以紫草濃煎湯調都作一服殊聖奪命膏治小兒瘡疹毒氣不散出不快及觸犯黒色甲盛熟牛李子七日八日採於盆内研汁生絹裂去滓用銀噐盛慢火熬成膏瓷噐内収常令透風毎服皂子大煎杏膠湯化下如人行二十里更進一服其瘡疹自然紅色毒氣慢一切瘡疹出不快並可服一名牛李膏至秋結實黒圓成穗或無生者市肆中買亁者為末水熬代用薫汲治小兒瘡疹豆泡悪候於皮膚下不出或出而不長及黒紫内䧟亦用此藥仍云汲小年病此危悪殆極父母不認視過錢乙下此藥得安因懇求得其方遂傳於世惟於収時不知早晩故無全効今并収時載之九月後取研濾成膏毎膏二両研入好麝香半錢収貯不津噐中九䈁衛生方同但用桃膠半両牛李子一両炒為粗末毎服一錢水七分煎至四分去滓温服治療亦同一云牛李膏專治小兒瘡痘紫黒色䧟寒顫噤牙戞齒身黄紫腫三服不愈即死紫草回斑散治小兒㿀疹出不快或倒靨毒氣入服紫草茸黄耆桑白皮木通枳殻白术各等分右為粗末毎服三錢水酒各半盞麝香少許同煎四聖散治痘瘡出不快倒靨或小便赤澁餘熱不除一切悪候或被風吹復不見入皮膚内紫草木通甘草枳殻各等分右㕮咀毎服二錢水半盞煎三分温服一方治伏暑冐經暴發痘瘡欲作黒䧟心腹脹滿一切危証於本方中加黄耆等分名紫草散簡易云傷寒者表實而裏虚瘡疹者表虚裏實傷寒之邪始干於皮膚漸次傳於臓腑瘡疹之毒始蓄於臓腑而漸次泄於皮膚理傷寒之法宜先觧表然後觧飢切不宜轉㵼使毒氣轉深變為斑瘡或為倒靨其候危矣此疾亦多因傷寒失於汗下邪毒内蓄或天疫癘長㓜相似當隨証以施治焉四味散治小兒瘡疹欲出不快大鰕亁者為末獖猪亁血悪實甘草炙各等分右為散三嵗以下半錢七五嵗以上一錢七煎赤芍藥酒調下不拘時侯日夜各一服發毒散治小兒瘡疹出遲地龍去土防風去义各等分右為細末毎服一字用酒水各少許調下不拘時候一方治時疾發豌豆瘡子未透心煩狂躁氣喘妄語或見神鬼或已發而䧟伏龍腦生一錢右研細旋滴猪心血和丸如鷄頭大毎服一丸心煩躁者同紫草湯化下若瘡子䧟伏温酒化下少時心神便定得睡瘡子發透已發而不甚快或變悪候紫草湯治瘡疹熱盛而發不透者紫草茸紫蘇葉升麻甘草炙各等分半両右剉散水二盞糯米五十粒同煎一盞温分両服黄耆散治雪天瘡疹難出皮膚温壮頭燒脚冷呵欠困悶無時驚悸嫩黄茋嫩柴胡蘇木紫草各等分右㕮咀白水煎服大抵疹痘如見服表藥出更宜詳細審察若其色淡白根窠不紅經日不起發以倪温中木香散主之如此後黒䧟十救一二以文中異功散主之痘瘡未見乃可發表附論夫小兒纔覺傷風身熱未明是與不是痘疹便宜發散可服四味升麻葛根湯如瘡疹始出一日至五七日之間雖身熱腹脹足稍冷者不宜服也或身熱㵼渇及驚懼腹脹汗出者皆不宜服而以十一味木香散治之古人立升麻湯盖治痘瘡之常不治其變也未有斑㸃之前均發熱者常也已結痂疕之後均有餘熱弗欝而飢表未清凉者一變也是亦升麻湯方状云瘡疹已發未發謂未見斑㸃及作痂疕之後也若斑㸃既見痂疕未結其候萬變在隨証滲泄曽非一定可拘若傷寒之變患不一也豈可執一以應無窮之變或且升麻湯不過凉肌觧表而已未見斑㸃已結痂疕則可用之曷可用之於瘡疹正作之時乎若不䆒此令兒飢寒表弱䧟伏而危殆矣小兒壮熱昏睡傷風風熱瘡疹傷寒食相似未能變認間服升麻湯葛根湯惺惺散小柴胡湯甚驗盖此数藥通治之不致悞也惟傷食則大便歐臭不消化畏食或吐宜以藥下之海蔵云傷食宜以藥下之者當詳其所傷何物生硬寒熱不等者不可用巴豆之類大毒之藥下之升麻葛根湯太陽陽明惺惺散風熱咽不和脾不和少陽渇小便不利也小柴胡湯往來寒熱胷脇㣲痛少陽也然欲知其經當以脉别之小兒耳冷手足乍暖乍凉面赤時𠻳時嚏驚悸此瘡疹欲發也未能辨認間服升麻湯消毒散已發未發皆宜服仍用胡荽酒黄栢膏暑月煩躁食後與白虎湯玉露散熱盛與紫雪咽喉或生瘡與甘桔湯甘露散餘依前說大人小兒同治法惟劑小大不同耳消毒散太陽藥白虎湯治身熱目痛鼻亁不得卧陽明藥也正為泄暑之劑甘露飲子肺腎藥也甘桔湯少陽藥也紫雪天門冬麥門冬黄芩地黄為血劑玉露散肺腎藥石膏寒水石為氣劑方惺惺散治小兒風熱瘡疹時氣頭痛壮熱目澁多睡咳𠻳喘麄桔梗真細辛去葉人參去白茯苓去皮甘草炙白术各一両真川芎一両右為麄散毎服三錢水一大盞薄荷五葉生薑三片同煎至六分濾去滓温服不計時候量兒大小加减服四味升麻湯葛根湯治小兒熱欲作疹痘一日至五七之間或已發或未發但身熱肢體痛者先宜服之白芍藥一方作赤芍藥川升麻一両甘草葛根一両半右為粗散毎服三錢水一大盞煎至六分去滓温服無時大小以意加减一方加紫草羗活散治小兒寒邪時氣瘡痘變蒸潮熱涎盛頭疼心煩躁渇氣粗羗活獨活柴胡川芎細辛白茯苓人參甘草枳殻炒各一两天麻地骨皮前胡桔梗炒防風各五錢右為末三嵗一錢水半盞煎三分大小加减服之不拘時麻黄湯治瘡疹煩渇甚者用之及痘正出煩喘渇躁麻黄去節杏仁去皮尖桑白皮㣲炒甘草炙各等分右􅅹咀白水煎量兒大小為劑若肺数有熱未退入竹瀝一半和水煎或咽喉痛并𠻳入麝香少許煩喘咳𠻳加射干一分一名杳甘湯葛根湯治天時炎熱欲發豆瘡服此觧肌發表赤芍藥石膏火煆亁葛甘草炙各五錢黄芩五錢無汗加麻黄自汗加桂皮右剉葱白薄荷湯煎乳後服一方止用水煎參蘇湯治小兒凡覺身熱証似傷寒但未經瘡痘者先與此藥和觧之前胡去蘆人參去蘆紫蘇葉亁葛半夏茯苓去皮各三錢枳殻去穣炒陳皮去白甘草桔梗去蘆各五錢右剉姜棗煎㣲熱服一方加青皮或白青皮紫蘇亦能表汗催出豆加木香紅綿散治傷風傷寒麻豆身熱發搐疑是痘証天麻炮荆芥穗各三錢甘草炙麻黄去節各二分全蝎右末薄荷三葉紫草三寸入酒三五滳同水煎熱服如痘未出再進一服如二服不出即非痘証調觧散治痘瘡外為風寒所折榮衛不和内為乳食所傷内氣壅遏以致冷硬青皮陳皮桔梗枳殻製川芎半夏姜製木通亁葛柴胡紫蘇紫草甘草炙等分人參炙半右剉散毎二錢姜二片棗一枚水一盞煎服未効加楂根三寸一方無柴胡紫草一方無柴胡有當歸不換金正氣散治痘瘡外為風寒所折榮衛不和内為乳食所傷内氣壅遏以致冷硬蒼术橘紅半夏橘厚朴姜製甘草炙藿香葉各一両右剉用川芎姜枣煎悪寒加肉桂紫蘓人參羗活散治小兒寒邪温時疫瘡疹頭痛體痛壮熱多睡亦治潮熱煩渇痰實咳𠻳一名惺惺散羗活獨活柴胡人參芎藭枳殻麸炒甘草炙各二両前胡桔梗天麻酒浸炙地骨皮各半両白茯苓去皮二両右為散毎服二錢水一盞入薄荷少許同煎去滓温服不拘時候全嬰方加防風徳生方如𠻳加桑白皮八寳散治小兒瘡疹已發未發在疑擬之間白芍藥羗活升麻亁葛甘草防風撫芎山菓子各等分右㕮咀毎服二錢水一盞煎至六分去滓温服五積散方見傷暑湿門中寒類右加紫草木香縮砂仁姜枣煎後服去麻黄陳氏木香散異功散通用瘡疹壮熱煩渇附論夫痘瘡出而身熱大渇者七味人參白术散治之如不愈只服十一味木香散如腹脹者或㵼而渇或足指冷而渇或驚悸而渇或人温而渇身熱面㿠白色而渇寒戰而渇或氣喘咬牙而渇或飲水轉渇不已皆非熱乃脾胃虚而津液少也宜服十一味木香散如不愈更加丁香官桂攻發其表裏不致痒榻喘渇而死也出大盛而面黄大便黒煩躁喘渇或腹脹者此為有瘀血在裏宜犀角地黄湯及治瘡疹中衂血吐血毒氣彌盛若不觧利其害尤速如抱龍丸至寳丹生犀磨汁紫雪之類皆可選而用之若大便不秘實小便不赤黄恐外熱而内寒又當别求治法也方葛根麥門冬散治小兒熱毒斑痘頭痛壮熱心神煩悶葛根麥門冬去心各三錢人參去蘆二錢石膏五錢甘草川升麻各三錢茯苓三錢赤芍藥一錢右為粗末毎服三錢水一大盞煎至六分去滓温服不拘時候量兒大小增减服生地黄散治小兒斑駮疹癮身熱口亁咳𠻳心煩生地黄半両去土麥門冬去心七錢杏子去皮尖麸炒㣲黄欵冬花陳皮各三錢甘草二錢半炙右為粗散毎服三錢水一大盞煎至六分去滓温服不計時候量兒大小加减服人參清膈散治瘡豆靨後熱毒不觧涕唾稠黏鼻亁身熱咳𠻳痰喘潮熱煩渇咽膈不利大便如常小便黄赤人參去蘆柴胡去蘆當歸芍藥地骨皮桑白皮炒茯苓去皮白术黄耆知母紫苑甘草炙桔梗各一両黄芩半両石膏滑石各一両五錢右為粗末毎服三錢水一盞生姜三片同煎至六分去滓温服不拘時候量兒大小加减服前胡枳殻湯治痘瘡靨後痰實壮熱胷中煩悶卧則喘滿大便堅實前胡一両枳殻赤茯苓大黄甘草炙各半両右為粗散毎服三錢水一大盞煎至六分去滓温服不拘時候量兒大小加减如身温脉㣲并㵼者不可服人參白术散治小兒痘瘡已靨身熱不退此藥清神生津除煩止渇一名白术散人參白术藿香葉木香甘草白茯苓六味各一両亁葛二両右為粗散毎服三錢水一大盞煎至六分去滓温服不計時候如腹脹滿㵼渇足指冷者只服十一味木香散治之赤茯苓散治疹痘瘡出後欬逆脇痛吃食不下赤茯苓甘草炙㣲赤剉大青升麻枳殻麸皮炒黄各半両梔子仁一分右㕮咀毎服入竹葉淡豉煎量兒大小為劑犀角飲治小兒疹痘瘡其赤瘡子正盛令不入眼一名調肝散鈎藤鈎子川大黄甘草犀角屑桑白皮麻黄去根節各一分龍膽草半分石膏𤓰蒌根黄茋各半分右㕮咀白水煎量兒大小為劑錢氏方名調肝散治瘡疹大盛令不入目也一方瘡子退後用犀角濃磨塗之更良山梔子湯治麸疹及斑毒状如蚊蚤所嚙若毒盛色黒者宜服宣毒膏山梔子仁白鮮皮赤芍藥升麻各一両寒水石甘草各半両右為末入紫草薄荷各少許煎服量兒大小為劑牛黄丹牛黄川大黄各一両粉霜硃砂各一分右為末同研勻煉宻丸如黍米大煎人參湯下量兒大小為劑通關散治斑瘡水痘心躁發渇及小便赤色口舌生瘡通心經車前子木通甘草瞿麦山梔子仁赤茯苓人參滑石各一分大黄一錢萹蓄半両取嫩枝菓右為末灯心草畧煎四五沸服量兒大小為劑黄茋散退熱調飬黄茋柴胡亁葛甘草人參各等分右㕮咀白水煎量兒大小為劑一方無人參用薄荷葉三葉煎黄芩甘草湯治痘瘡閉熱不出煩喿不得服黄芩七錢半赤芍藥甘草各五錢右㕮咀毎服三錢水一盞若胃中虚冷其人能食飲水即噦脉浮發熱口鼻中躁能食者必衂加大枣三枚同煎若嘔者加半夏少許生姜三片同煎若食少者加參枣煎量兒大小各去滓加减服大青四物湯治熱病汗下後身熱不除斑出如綿紋煩躁不得卧大青阿膠甘草豆豉各一両右㕮咀毎服五錢水一盞半先將大青甘草豆豉煎至七分後入阿膠再煎令沸量兒大小加减服白虎湯治温熱及中暑煩渇并治小兒豆泡麸疹斑瘡赤黒出不快及疹毒餘熱石膏四両知母一両半人參四両甘草炙二両右剉糯米煎米熟為度子母同服但加生姜枣煎渇盛更加春夏秋寒有証亦服但加枣煎小兒减半楊氏方敗毒散方見傷寒門傷寒類右倍加甘草生枳殻糯米煎服一方加紫草黄芩生地黄煎服導赤散生地黄焙亁甘草炙右等分水煎服一方為末毎服三錢水一盞入竹葉同煎五分食後温服不用甘草用黄芩神功散治痘瘡大熱發狂譫語此藥清心凉肌退熱消毒服此藥觧利及熱毒已攻頭目咽喉黄芩柴胡去蘆桔梗去蘆防風去蘆荆芥穗木通陳皮去白枳殻煨去油牛蒡子炒赤芍藥紫草赤茯苓甘草各等分右剉灯心白附子麥門冬煎大便秘大熱加煨大黄糯米煎㣲利即止後服大熱加竹茹大熱加北薄荷山梔子仁天花粉甘草散治瘡痘畧出煩渇不止粉草㣲炙括蒌根等分右為末煎服一錢甘草通血脉發瘡痘烏梅湯治瘡痘熱渇小黒豆菉豆各一合烏梅二箇右㕮咀新汲水一盞煎至清汁旋服又方用羗活散消風散消毒飲合和竹葉生地黄土朱煎服人參麥門冬散治發渇煩熱及瘡痘身熱麥門冬一両去心人參去甘草炙陳皮白术厚朴姜製各半両右為粗散毎服三錢水一大盞煎至六分濾去滓温服不計時候量兒大小加减與服捻金散治小兒麻痘瘡疹欲出渾身壮熱情緒不樂飲食不思服此可以内消仍令瘡無瘢㾗方見本門瘡疹已出未出類一名四砂湯透飢散治臟腑藴熱毒氣蒸薫瘡出不快煩喘昏悶方見本門瘡疹出不快類一名化毒散消毒飲子治毒氣壅遏壮熱心煩痘疹難出未能透方見本門瘡疹攻咽喉類一名鼠粘子湯紅花升麻散治小兒疹痘麻子潮熱焦啼煩渇寒凝難出者升麻芍藥亁葛紅花蘇木麻黄去節黄芩甘草各等分右為散白水煎服瘡疹大盛附論瘡痘有可下証者以其出得大盛當結膿泡痂疕而不結者此是毒氣内外貫注若不速觧之毒氣内入攻心為害極大治法宜猪尾膏其有不結膿疱痂疕反能食而喘腹脹譫語不大便者當以承氣湯下之如甚而渇面赤悶亂大小便澁或大吐者合利其小便通關散主之或瘡疹已出定膿汁不亁而大便不通者宜牛黄丹或有瘡疹症而未見斑㸃胃熱潮作氣粗腹脹大小便秘驚悸煩渇脉沉滑而数者此是毒盛而不得泄亦當用藥下之則内無滯塞榮衛升降其勢將自出此皆合下証也方鼠粘子湯如斑子已出稠宻身表熱急與此藥以防己後青亁黒䧟粘子炒香當歸身酒浸甘草炙各一錢柴胡一錢五分連翹黄茋黄芩各一錢半地骨皮二錢右為粗末毎服二錢水煎去滓温服空心藥畢且休與乳食一證出大盛而面黄大便色黒煩躁喘渇或腹脹此有瘀血在裏宜與服小柴胡湯犀角地黄湯昔王子亨指迷方曰痘瘡半在表半在裏反熱毒大盛服此佐以快毒丹使氣調匀則出快不致倒靨及秋冬之間痘瘡發而不起由腎氣強盛胃氣稍弱瘡又黒䧟加减用之小柴胡湯柴胡去蘆人參去蘆黄芩甘草炙各一両半夏湯泡二両右剉姜三片枣一枚服冬春腎強脾弱黒䧟如𠻳加五味子二両柴胡三錢性寒治肝甘草一錢調脾生姜二錢正胃氣右加减煎服咳𠻳加五味子犀角地黄湯治瘡疱壅盛喘急浸滛成片及治傷寒温病應發汗而不發汗内有瘀血者及鼻衂吐血不盡内有餘瘀血面黄大便黒者此方消化瘀血并小兒體氣實熱瘡疹出得大盛此方觧之如體衰熱弱不宜用一名觧毒散犀角一両如無以升麻代之生地黄半觔赤芍藥七錢半牡丹皮一両右剉毎服五錢水一盞半煎取一盞温服有熱旋加黄芩二両其水脉大來遲不滑者是為無熱更不用黄芩也一證毒氣彌盛瘡中吐衂出大盛之時不能觧利其害尤速宜抱龍丸生犀汁小柴胡湯生犀方生犀角不用盛湯酒者右用新水磨汁食後服消毒散右紫草生地黄煎下抱龍丸天竺黄一両木草云乃破竹中黄末雄黄一錢辰砂五錢麝香一錢牛膽臘月釀南星四両如無生南星炒用右為細末甘草水丸皂角子大用温湯化下疹痘論甘草散若瘡未出及雖出燥渇者宜服右用大甘草不拘多少炙過為細末毎服一錢或二錢水一盞煎至六分去滓不計時候呷之以少觧利熱毒即止若瘡出遲當服紫草飲子大人當鍼両腕蜆子骨間男左女右取或更灸一壯亦助發出疹痘毒氣已發不必用之治小兒麻豆瘡子已出大盛發潰膿水黏衣着席不能轉動疼痛濕潤傅之便更不成瘢㾗用牛糞不拘多少曬亁火煆成灰取心中白者研令極細如用蛤粉相似用綿撲撲於有瘡處不拘時候瘡亁以陳酥潤之一方用烏牛糞一方用臘月黄牛糞日亁焼灰瘡疹潰爛者膿汁沾衣衾卧睡不得用灰鋪一寸許在床上令睡之或瘡大而成片無皮或成豆癰皆用黄牛糞糝之一方用菖蒲作末如前用尤佳一方麩麥亦如前用如嬰孩有此証用絹綳床子與之睡為妙治小兒因患瘡疹其間有瘡大成片或有成豆癰成膿爛痛不可忍者極好生葛不拘多少搗爛用絹袋子盛擺水中隨擺隨挼澄取粉攤紙上焙亁為末摻瘡濕處神効調肝散治瘡疹大盛宜服令瘡不入眼生犀二錢半龍膽一錢黄耆半両桑白皮半両炒黄大黄二錢麻黄去節一錢石膏半両鈎藤子一錢栝樓去皮甘草炒各二錢右為末毎服二錢水煎食後温服㣲利効普濟方卷四百三
