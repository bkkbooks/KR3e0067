body:
  text: 普濟方卷三百八十九明周王朱橚撰嬰孩諸血痔疾門總論夫鼻衄者是五臟熱結所為也血為氣行通流臟腑冷熱調和不失常度無有壅滯亦不流溢血得寒而凝結得熱而流散熱乘於血血隨氣發溢出於鼻竅也又有因傷寒溫疫諸陽受病不得汗熱每停聚五臟故從鼻而出也病瘥後唾血咯血下血者此熱毒積瘀犀角地黃湯主之初病亦宜服夫吐血者榮衛氣逆也榮者血也衛者氣也榮衛相濟不失常道一有所勝則致妄行血者水也決之東則東流決之西則西流氣之使血其勢如此巢氏云吐血者是有熱氣勝而血虛熱乘於血血得熱則流散妄行氣逆則血隨氣上故令吐血也又或飲食太飽之後脾胃內冷不能消化急吐所食之物氣血相衝因傷肺胃亦令吐血若久嗽氣逆面目浮腫而嗽血者是肺虛損也夫大便血者大腸熱結損傷所為也臟氣既傷風邪自入或畜熱或積冷或濕毒傳於脾胃或疳食傷於臟腑因兹冷熱交擊疳濕互作致動血氣停留於內凝滯無歸滲入腸中故大便下血也又有或腹脹冷氣在內攻衝亦令大便下血又因風冷乘虛客入脾胃或瘀血腸胃濕毒一如豆汁又疳傷於臟亦能便血若上焦心肺積熱流注大腸亦令大便下血也亡血脾弱必渴久則血虛其人必肌體萎黃頭髮不黑矣沈氏子十歲鼻衄不止或以果花煎湯或以犀角地黃湯并龍骨末吹鼻數法不效其血注下召愚視之急以濃鹽水下龍膽丸一服減半再進全除主人曰鹽水有何效愚曰夫血得熱而流溢鹽水醎冷能凝其血譬之屠豬就血得鹽水而凝結黃連龍膽味苦寒能堅其血所以知其醎苦入口即立效也凡兒生七日之內大小便有血出者此由胎氣熱盛之所致也母食濃酒麵麴炙煿醃醎等流入心肺兒在胎內受之熱毒亦傳心肺且女子之臟其熱即入心故小便有之男子之臟其熱即入於肺故大便有之血出淡淡有似坯水盛即其血加鮮凡遇有此不可用他藥但以生地黃根研取自然汁五七匙蜜半匙和勻溫溫與服移時安愈男女皆效不須疑慮甘露飲宜兼與服不必他藥萬一無恙勿得急遽妄投丸散吐血附論夫小兒湯氣盛壯上焦有熱伏於心肝二臟播流血脈血得熱則妄行下入胃中胃受之則脹滿與氣俱上衝擊故令吐血方紫參散出醫方妙選治吐血紫參山梔子乾生地黃各一兩刺薊一分燒灰亂髮燒灰一分蒲黃伏龍肝各一錢細研右都研勻每服半錢至一錢煎竹茹湯調下犀角散出聖惠方治小兒四五歲已上非時吐血犀角屑梔子仁生乾地黃子芩紫蘇刺薊各一分右為散每服一錢水一小盞煎至五分去滓不計時候量大小加減溫服茜根散出聖惠方治小兒吐血心躁煩悶茜根半兩犀角屑川升麻川大黃炒黃芩甘草炙已上各一分右為散每服一錢水一小盞入黑豆三十粒淡竹茹半分煎至六分去滓不計時候量兒大小加減辰膠散出全嬰方治小兒吐血阿膠炒蛤粉等分辰砂少許右為末和粉紅色三歲一錢藕汁和蜜調下一方藕節晒乾為末人參湯調下能消瘀血蒲黃散出聖惠方治小兒吐血不止蒲黃一分伏龍肝半兩亂髮灰一分右研勻細不計時候暖生地黃汁調下半錢量大小加減服之治小兒吐血不定刺薊自然汁不計多少朴硝半兩右先研朴硝為末二百日兒及晬兒每服用刺薊汁調朴硝末一字至半錢七日再服量兒大小加減大黃湯治小兒吐血大黃炒黃芩去黑心各一分右粗搗篩三四歲每服一錢匕水七分入黑豆三十粒同煎至四分去滓溫服日三服更量兒大小加減治小兒積熱攻肺卒吐血飛羅麵二兩生地黃汁二盞右相和勻曝乾研為末每服半錢匕新汲水調下日三服隨兒大小加減蒲黃散治吐血咯血生蒲黃油髮灰等分右研細每服一錢暖生地黃汁調下米飲亦可一方無油髮灰治小兒吐血用蛇蛻皮燒為末以乳服并治重舌又方用油三分酒一分和之分為二服青苔散治小兒鼻衄吐血并治淋瀝小便不通用船底青苔晒乾為末三歲一錢藕節汁入蜜少許調下淋瀝木通湯調下獨聖散治小兒吐血嗽血用赤芍藥為末取生地黃藕汁入蜜少許調下食後服又方桔梗煎湯調下及治衄血下血雙黃散治小兒吐血百治百瘥十無一失用大黃為末取生地黃汁微煎入蜜調下量大小加減三兩服立效又一方以白膠香為末新汲水調下桂心膏治小兒十歲已上久吐血氣虛胸膈不利用桂心為末取生地黃汁薑汁蜜等分熬稠為丸如雞頭大十歲兩丸取藕汁入蜜白湯化下一方為末藕汁蜜調和服之三嵗小兒服半錢亦治便血名桂心散生地黃汁方治小兒吐血衄血用生地黃汁取一合髮灰半錢調分作兩服食後少頃灌之治小兒吐血不止用黃連去鬚一兩搗為散每服一錢水七分入䜴二十粒同煎至五分去滓溫服量兒大小加減治小兒積熱攻肺卒吐血用刺薊花曝乾不拘多少搗為末每服黃牛乳調下一錢匕日三服治小兒吐血心躁煩悶用刺薊自然汁一合暖令溫不計時候調下元明粉半錢量兒大小加減又方用亂髮燒灰細研每服以溫水調下一字備急方治吐血即研藕汁或蘿蔔汁灌下即止次用小柴胡湯加生地黃煎服治小兒吐血不止以蒲黃細研每服半錢用生地黃汁調下量兒大小加減進之鼻衄附論凡小兒體本挾熱舍於經絡血脈揚溢則為鼻衄蓋血與氣循行經脈通於臟腑邪熱乘血血得熱則妄行隨氣上溢出於鼻者為鼻衄血虛受熱散漫失度出於七竅者為大衄小兒傷寒鼻衄者由熱摶於氣而乘於血肺候身之皮毛而主氣開竅傷寒先客於皮膚摶於氣而成熱熱乘於血血得熱即流散發從鼻中為鼻衄也凡候熱病如應衄者其人壯熱頭痛發汗不出或未及汗而鼻燥喘息鼻氣鳴即衄也凡小兒衄半升或數合者即因內熱得之若出一二升已上不止者即死方生地黃煎治小兒鼻衄不止生地黃半斤取汁刺薊半斤取汁杏仁一兩湯浸去皮尖麩炒别研蜜一合阿膠半兩搗碎炒令黃燥為末右都入銀鍋內以慢火熬為膏不計時候用新汲水調下一錢量兒大小加減服之地黃湯治榮中有熱及肺壅鼻衄生瘡一切丹毒生地黃赤芍藥當歸去蘆淨洗川芎各等分右㕮咀水煎去滓大小以意加減鼻衄臨熟入生蒲黃少許生瘡疥遍體加黃芩一味等分同煎丹毒加防風去蘆等分同煎用之纍驗蘗皮湯治小兒衄血至一二升悶絶蘗皮一兩梔子一兩甘草炙半兩右㕮咀三歲一錢水半盞煎至三分去滓服一方剪金花莖葉隂乾水煎服之又方白芨末調塗鼻上并𩕄門立止又方萆麻葉塗油炙熱尉兒𩕄上血止槐花散治衄血槐花一兩炒蒲黃半兩川薑一分右搗羅為細末每服半錢新水調下抵聖散治不以疾病鼻衄不止盆硝研亂頭髮燒灰研紅藍花各等分為末右同研勻細以綿纒揾藥塞鼻中柏枝散治小兒衄血吐血柏枝乾者藕節乾者右等分為末三歲半大錢藕汁入蜜沸湯調下一方白芍藥為末磨犀角汁調治咯血衄血又方龍骨為末吹鼻治衄血吐血咯血用藕汁調下半錢又方治吐血不止及唾血蒲黃冷水調生地黃汁亦可龍膽丸治小兒衄血不止黃連龍膽草右等分為末糊丸如小豆大三歲三十丸或作散子以濃鹽水送下三黃丸效一方研好墨滴鼻中一方燒頭髮吹鼻內茅花湯亦得石粉散治小兒衄血日夜不止頭痛心煩寒水石煆牡蠣煆右等分為末三歲半錢冷水調下連進二服一方人中白燒灰為末吹鼻立止一方青竹茹燒灰入麝香吹鼻立效一方蒜去皮研細攤餅子如錢大厚一豆許左鼻出血貼左足心繫定右亦如之兩鼻出血兩腳如之血止即洗去龍肝散治小兒壅腫鼻衄下血夜啼臍濕火丹赤逰腫湯火熱油瘡等證用竈心土名伏龍肝經十年以上者為末醋調塗腫處鼻衄入蜜水調服腸風下血米湯調服嬰兒夜啼鈎藤湯調下少許臍中瘡濕久不瘥乾火疸用屋漏水調塗冷水亦可赤逰腫行於身上至心即死雞子白調塗一方治湯火灼隂瘡石灰水調塗一方治衄釡底墨灰吹鼻即止一方治熱油湯火燒痛不可忍石膏末傅之又白石脂火煆為末傅并治臍中汁出赤腫治春冬衄者此乃血熱不循經而壅從鼻出也血隨其氣而肺主氣屬鼻故自鼻出而衄蓋榮衛者血氣之循位苟或血熱不循經氣盛而上升則血壅從鼻中出也出永類鈐方用生地黃細研取汁加生蒲黃少許沙糖井水浸服之愈治秋夏鼻衄用車前草一握洗淨研取自然汁同生薑一處研取汁入生蜜一匙先用滓塞兩鼻次用新汲井水和蜜并車前草薑汁飲之即愈凡有此候皆由榮熱可服涼血地黃湯若傷寒證小柴胡煎入地黃汁服妙治小兒鼻衄不止者急以生蘿蔔取根搗自然汁仰頭滴入鼻管中即止次以新汲水和蘿蔔汁薑蜜飲之良治小兒心肺藴熱及心血妄行鼻衄出血不止良方用故藤紙被一片作撚子包麝香燒熏入鼻或吹鼻中又令患人吸呷尤佳故藤紙被舊亦得或燒內小瓶中留性用酒調下量兒大小與服極妙黃芩膏治小兒衄血吐血下血用黃芩為末煉蜜丸如雞頭大三歲一丸濃鹽湯下一方石榴花為末吹鼻治衄血吐血一方定州瓷器末治吐血下血破血又方治鼻血久不止用剜耳入鼻立效又治小兒面目卒得黑丹如芥狀不急治遍身即死以豬脂調塗之即愈玉屑散治小兒中熱積驚及時疾後鼻衄寒水石研馬牙硝研各一兩貝母去心知母各一兩半荷葉一兩水煮七涎焙右搗研為細散每半錢蜜水調下食後服茅根湯出活幼口議治小兒傷寒後有後證忽然鼻中出血五七嵗以上至大人亦有此證為紅汗為不曽解表其汗原出於血故從鼻中出者自解生地黃汁生蜜酒各一小盞茅根一握搗煎汁如稠糖右同煎一盞相和溫服一小盞立效立應散出聖惠方治傷寒血熱妄行血衄不止蒲黃研乾葛根石榴花各半兩右為細末每服半錢取生地黃汁勻好服一方無葛根用新汲水調服治小兒傷寒鼻衄已經數日不止出聖惠方生地黃汁一小盞白蜜一小盞蒲黃一兩右相和微暖過每服半盞量大小加減頓服治小兒傷寒壯熱鼻衄不止出聖惠方用生地黃二兩銼於銀器中以酒一中盞煎至七分去滓不計時候分溫三服又方出聖惠方用生葛根汁一小盞分作二服即止治小兒傷寒鼻衄數日不止出聖惠方用亂髮燒灰細研頻頻吹少許於鼻中良九竅出血方膠黃散出全嬰方治小兒大衄口鼻耳出血不止十五六歲兒陽盛多此病阿膠一兩炒蒲黃半兩右為末三歲半錢生地黃汁微煎調下以帛急繫兩乳頭隨血左右兩竅俱出並繫兩乳刺薊散出全嬰方治小兒九竅出血用刺薊一握絞汁入好酒一合和服如無青者乾者為末冷水調下三歲一錢痔附論夫痔者有牡痔脈痔腸痔血痔牝痔皆因酒食勞傷過度損動血氣所生小兒未有虛損而患痔者是大便有血出腸內有結熱故也方鱉甲散出聖惠方治小兒痔疾肛邉生結核疼痛寒熱鱉甲一兩醋炙黃去裙襴蝟皮一兩炙黃蛇皮三分燒灰露蜂房半兩微炙豬懸蹄甲七枚炙黃檳榔三分麝香一分細研右搗細羅為散入麝香研勻每服食前以粥飲調下半錢量兒大小加減桑木耳散出聖惠方治小兒痔疾久不瘥肛邊痛癢桑木耳微炒蝟皮炙黃當歸炒羌活已上各半兩枳殼一兩麩炒右藥搗細羅為散每服以粥飲調下半錢日三四服量大小加減龜甲丸出聖惠方治小兒痔疾結硬焮痛不止龜甲二兩酥炙蛇蛻皮一兩燒灰露蜂房半兩炙麝香一分研豬後懸蹄甲一兩炙焦右細羅為散入麝香研令勻每服以溫酒調下半錢日三服量大小加減服之一方無麝香忌生冷以粉和丸槐蛾散治小兒痔疾下血不止熱毒流注發渴疼痛槐蛾側柏炙黃荆芥穗棕櫚燒灰黃牛角腮燒灰牛膝去苗炙已上各半兩右細羅為散每服以粥飲調下半錢日三四服量兒大小加減服之蝟皮散治小兒痔疾下血大腸疼痛蝟皮炙枳殼去穰麩炒木賊當歸炒槐蛾炒各一兩右細羅為散每服以粥飲調下半錢日三四服量大小加減櫸樹菌子丸治小兒痔下血不止肛邉生鼠乳疼痛櫸樹菌子一兩蝦蟇一枚炙黃葫荽子黃牛角腮各一兩炙鰻魚頭一枚炙黃右羅為末以煎白膠香水和丸如彈子大用瓶內如裝香法燒一丸薰下部瘥治小兒痔疾下部癢悶尉藥方枳實二兩麩炒鬼箭羽木香鬼臼已上各一兩右搗為散以頭醋和勻炒熱用青布裹尉日三用榼藤子散治小兒痔疾下血無時榼藤子一枚去殼炒皂莢子一伯枚與榼藤子穰同酥炒黃牛角腮灰醋石榴皮灰各半兩右細羅為散每服以溫酒調下半錢日三四服量兒大小加減服之雞冠散治小兒痔疾下血不止雞冠花一兩焙香棕櫚二兩燒灰羌活一兩右細羅為散每服以粥飲調下三錢日三四服量兒加減黃耆散治小兒痔疾下血不止黃耆枳殼去穰麩炒側柏葉各一兩炙黃右細羅為末每服以粥飲調下半錢日三四服量大小加減服之治小兒痔疾下血發歇不止荆芥薄荷枳殼去穰麩炒微黃各一兩右羅為末每服以粥飲調下半錢日三四服量兒大小加減服之木賊丸治小兒痔疾痛不可忍木賊一兩榼藤子一兩去殼塗酥炙黃烏賊魚骨二兩右羅為末煉蜜和丸如菉豆大每服以溫酒下五丸不計時候量兒大小以意加減服之治小兒痔疾疼痛腫硬不消宜用坐藥方蛇床子半兩為末荆芥半兩為末蝸牛十二枚右研爛塗紙上每發時先用白礬熱水洗痔頭後用被褥上安藥紙坐三兩上瘥槐子丸治小兒痔疾鼠乳生肛邉煩熱疼痛槐子一兩微炒黃芩一兩榼藤子二枚去殼炙令黃右羅為末以水浸蒸餅和丸如菉豆大每服以桑耳湯下五丸日三四服量兒加減穿山甲散治小兒痔生肛邉如鼠乳及成瘡痛楚至甚宜服穿山甲二兩炙令黃麝香半分細研右搗研令勻細每服於食前煎黃耆湯調下半錢量兒大小加減服之治小兒腸痔下血不止方榼藤子三枚大者右以七八重濕紙裹煨良久起出去殼用肉細切碾為散以黃耆湯調下半錢量大小加減又方用牛角腮二兩炙令黃焦搗羅為末每於食前以溫酒調下半錢量兒大小加減又方用蝟皮細銼於瓶內燒煙薰痔瘡上普濟方卷三百八十九
