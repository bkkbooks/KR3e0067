body:
  text: 普濟方卷四百四明周王朱橚撰嬰孩痘疹門瘡疹大小便不通瘡痘本因熱而出熱勢甚則其出愈難盖熱盛則榮衛為之閉塞毒氣滋蔓裏毒盛者大便不通小便如血表毒盛者或為癰瘡身上皮破裂此由不善觧利之故救之之法冝犀角地黄湯小柴胡加生地黄湯四順飲牛黄散紫雪散之類可選用之凡痘瘡盛出身熱煩渇腹脹而喘大小便澀面赤悶亂冝八正散四順飲不通用宣風散方利毒丸治小兒瘡疹欲出胃熱發温壮氣麄腹滿大小便赤澀睡中驚煩渇口舌乾手足微冷睡時發涎實脉沉大滑数便宜服之大黄半兩膩粉炒一錢大青一錢龍腦㯽榔硃砂各半錢生牽牛取末一錢半黄芩青黛各一錢一方作二錢右為細末麫糊為丸如黄米大每二嵗兒服八丸生姜蜜水下不動再服量兒大小虚實加减川黄散治麸瘡及斑瘡大便不通川大黄剉碎微炒川芎各一兩甘草炙黄芩微炙枳殻麸炒去瓤各半兩右為末每服一錢水一小盞入紫草少許煎五分去滓温服敗毒牛黄丹治瘡疹出定大便不通瘡出膿汁不乾真牛黄川大黄末各一兩粉霜真硃砂末各一兩右同研勻煉蜜為丸如黍米大每服十粒煎人参湯下量大小加减棗變百祥丸治斑疹大便秘結紅芽大㦸去骨一兩青州棗去核三十個右水一碗同煎至水盡為度大㦸不用将棗焙可作劑旋丸從少至多以利為度治小兒四五日不大便者用肥猪脿一塊白水淡煑切如豆大與兒食之令臓腑滋潤大便通利燈心散治瘡疹出後煩喘小便不利者燈心一把鱉甲二両醋炙黄右㕮咀白水煎服量兒大小為劑五苓散治小兒赤澀加燈心十莖麥門冬去心車前子各半錢煎湯調乂人参湯加枳殻去瓤切少許治大便秘結内煩外熱未效更加四順清凉飲少許瘡疹倒靨附論凡痘瘡内虚不䏻出者謂之陷伏外感風寒或被惡氣衝觸而不得出者謂之倒靨然有始末輕重不同如斑㸃之始熱毒方運出亦有陷伏亦有倒靨若外感風寒肌竅閉塞血凝不行必身疼四肢微厥斑㸃不長或變黒色或青紫癮疹此為倒靨也宜温服發散如紫草蝉退人齒殭蚕紫背荷葉之類温散寒邪然後熱氣復行而其斑出辛苦胃虚而不䏻副榮衛者則復沒斑㸃白色或黒色其人必不䏻乳食大便自利或吐或厥此胃虚而不䏻出謂之陷伏也冝用温中之劑令其胃暖榮衛復行則當自出矣冝理中湯丁香散之類即甚至附硫桂亦可用血泡為中者是紅斑出齊之後其狀如豆起於肌皮之上乃未結膿泡痂疕之前證也血泡七日當結膿窠痂疕當此或風寒乘襲而為倒靨或胃虚吐利而為陷伏者治之亦如前法又有房室等雜氣觸犯而然者當用諸甲蒼术乳香胡荽等法熏觧之良方腦子猪血酒治毒氣入臓而不出黒陷而耳尻及熱者瘡痘惟腎無証以其不納穢故也當其發作之初及血泡之際一身但熱而尻耳自凉此即腎之平證也盖尻耳皆属於腎今一旦黒陷是變壊歸腎邪既衰脾土復旺身熱氣温欲飲水者可治以脾䏻勝腎而去温熱也百祥丸主之即活人書論厥隂陽傷寒土敗木敗急用成氣湯皆是不得已而用之僥倖十救一二而已瘡黒有逆順者大凡黒靨陷伏本是逆証然亦有順者謂脾強可以勝腎雖黒靨而忽㵼膿血痂皮者為順此必舊服補脾藥故令脾氣不得衰毒雖入腹皆㵼出也經云脾病則五臓危今脾土既盛他悉無慮矣黒靨而逆者謂脾虚不能制腎乳食不消水糓雜下脾虚受毒四臓皆因而危殆然古人云病在腑者易治在臓者難治瘡黒乃變壊入臓雖得脾胃强盛是亦九死一生之證耳黒靨而發寒者瘡痘黒靨有四証一感風二毒氣大盛毒復入裏三内虚無陽氣以應之四房室雜氣等觸犯所得之因既不同用藥救療豈得不異感風寒則宜温散毒氣盛冝利小便觧毒内虚冝温裏觸犯冝熏觧大抵黒陷而發寒者重不發寒者輕其証乃脾弱為腎所勝錢氏用百祥丸以㵼膀胱之毒令陽氣復還脾土温暖所謂㵼膀胱經水必令脾土自勝也方大快斑丸治斑疹倒靨黒陷惡候辰砂一錢紫草耳半兩川升麻鈎籐鈎赤小豆各半兩甘草炒一錢乾地龍去土焙三錢右為細末煉蜜為丸如櫻桃大硃砂為衣每服一丸石榴湯化下末用温水與乳汁化下治瘡疹倒靨黒陷一名猪尾膏用小猪兒尾尖取血三五㸃研入生龍腦少許新水調下食後治小兒伏熱在心昏迷不醒或悮服熱藥搐搦冐昧不省人事瘡疹倒靨黒陷時發及赤瘡子未透心狂躁氣喘妄語或見鬼神用生梅花腦子一字或半字取新殺猪心一箇破其血同研作大丸用新汲水下之如未醒或瘡疹陷伏者再將温酒化下一名龍腦膏用紫草湯化下猪血膏治小兒瘡痘欲出及陷伏者皆冝速治不爾毒氣入臓必致危困臘月猪血取鉢盛掛當風處令乾右取半棗大以龍腦如大豆許酒調下蘓沉方云加菉豆粉半棗許同研病微者消之甚者發之瘡出而安一家小女病傷寒腸疼極甚晝夜號哭手足厥数日漸加昏篤形証危惡是時例發痘瘡予疑其為陷欲以此服之先不收此藥急就屠家買生猪血時當盛暑血至已敗惡無可奈何多以龍腦香灌之一服遂得少睡湏㬰身熱發瘡㸃遂安不爾幾至不救矣又方用黒狗糞日乾為末用麝香酒調下百祥丸治瘡疹倒靨黒陷寒顫噤牙戞齒身黄紫腫三服不愈死一名南陽丸右紅牙大㦸不拘多少隂乾漿煑極軟去骨日中暴乾復内汁中煑汁盡焙乾為末水丸如粟米大每服一二十丸研赤脂麻湯調下吐利用無時一方以煎藥為細末二嵗兒炒半錢研脂麻湯調下尋常小兒睡中戞齒者是腎經風熱或是驚風入骨一服即效後與驚藥更不再服宣毒膏治毒氣瘡疹已出不快倒靨急服此藥曽經大效臘月八日刺獖猪尾取血一升用新瓦盆盛好硃砂别研水飛乳香别研各一分甘草末馬牙硝别研各半兩腦子别研麝香别研各一分右修事畢同猪尾血拌和用一寛舊竹筒底下留一節入藥在内以紙数重繋合於筒口邉通一竅以麻索子縛了垂側屋梁上至清明日取出爆乾更入腦麝各一錢研細滴水丸如皂子大毎服量多少人参湯化下若毒盛瘡黒倒靨者服之即紅活再長神妙治瘡疹大便不固其痘漸黒陷靨即冝服此嬰兒乳母同服人参白茯苓白术肉荳䓻黄耆各半兩甘草炙二錢右㕮咀毎服一錢水半盞生姜一片棗子半枚煎至三分去滓服乳母倍之若大㵼手足厥冷加附子用驗方治小兒斑疹黒陷方用臘月秃梟腦子或一個或二個以好酒浸調服若乾者以好酒浸少時化開依上調服立效治瘡疹不透乾黒危困神效用柿楂子不拘多少為細末每服二錢紫草酒調下小兒量大小加减徐徐進三兩服即紅活蘇韜光云其家累世用此甚佳柿樝子圗紅本草名棠梂子第二十三卷云惟滁州者入藥治瘡疹黒陷鐵脚葳靈仙為末一錢炒腦子一分右用温水調下服之取下瘡痂為效治斑瘡倒靨方胡粉一箇燒灰存性乾胭脂三錢右研為極細末用胡荽煎酒每服調下一錢無時服之立效再甦散治小兒被諸惡觸着瘡子毒氣入裏瘡變黒色湏臾不救急冝用此藥服之白礬熬令汁枯地龍去土炒各二錢半右為末每服半錢用獖猪尾上血如龍眼核大同新水少許調服日三服效一方用蘇合香丸用胡荽酒化服或焚熏人齒散治小兒倒靨出不快發斑俗名蛇皮痘及變黒寒顫戞齒一名退陷散人齒五枚燒灰存性麝香半字右用硏為末分作三服温酒調下不飲酒湯亦可一方細研酒調入獖猪尾血三五滴同服之或紫草升麻湯皆可小兒齒尤佳治瘡子出未透黒靨者用乾㺅樝子肉為末湯調服微者汗出不妨纔覺紅却醋煑黄顙魚食之魚去腸肚不去涎立紅活又黒陷口渇荔枝殻煎湯温服立紅活治瘡痘倒靨不出牛蒡子半兩炒紫草一分右為細末每服一錢麝香少許温酒調下不過三服立愈又方乾葛一錢剉胡荽五分右用無灰酒一處煎濃汁令子母俱飲效治小兒一切斑瘡倒靨欲死者右用十二月八角兒七箇湏石榴樹上生空者不用以瓦盆上火煅成灰研細用葦筒吹入鼻中大有神效又方用人中白臘月者最佳通風處以火煆成煤水調三五錢陷者自出又方蝉退末一錢龍腦皂角子大猪心血三皂角子大右研為膏酒泡紫草化下即身熱紅活周天散治瘡黒陷項强目直視腹脹喘急發搐及一切惡候蝉退五錢地龍一兩去土右為末小者半錢大者一錢研乳香湯調服連二服瘡出即愈神通散治瘡疹毒氣少大小便利倒伏不出生乾地黄炒乾地龍𦂳曲者去上微炒各一兩已上搗羅為細末次用好硃砂一兩細研水飛右同拌勻每服一字煎胡荽酒少許同温湯調下倍金散療小兒瘡疹倒靨黒色虎杖花炒二兩神麯炒半兩杖花山果子和核各一兩右為麄末每服一錢水八分入荆芥七穂紫草一根煎至四分去滓温服抵聖散治小兒斑瘡不及出而反入者右取十二月老鵶左翅不拘多少風中令乾辰日燒為灰用中等獖猪嘴上刺血為丸如鷄頭大每一丸取獖猪尾上血少許温水同化下如或未效三兩時間更一服救生散治小兒瘡疹膿泡惡候危困陷下黒色獖猪血臘月内以新瓦罐子内盛掛於屋東角隂乾取末馬牙硝研各一兩硼砂腦麝硃砂牛黄各一錢右同研極細每二嵗兒取一錢新汲水調下大便下惡物瘡泡紅色為度不過再服脫殻散用鷄抱出殻子於新瓦上焙乾去膜取殻搗研如粉遇小兒斑瘡倒靨不出或臓腑糞黒頭瘡昏睡不醒用酒調一字塗兒唇上令兒䑛或以酒調塗風池背上心前或熱湯調一字喫化斑散治小兒斑瘡石膏火煆或濕紙褁炮令透為末或用泥團燒之取出去火毒為細末知母切片焙乾為細末右各等分熟水調一字服之或調塗唇上頭疼除昏發泄瘡子此名髙母化斑散治小兒斑瘡此二方極妙然後方恐太凉治小兒瘡疹倒靨不出者人齒一枚燒灰研細赤小豆七粒為末右同作一服薄荷温酒調下治小兒斑瘡倒靨并黒色者謂之鬼瘡子初出状光忽然黒陷心煩惟燥氣喘妄語或見鬼神並冝速治不然毒氣入臓必死用人齒不拘多少炭灰研細獖猪尾血調下二錢移時再服一方酒調下又方赤馬糞乾者白礬各一兩右入甘鍋子内以礬在下用泥固濟牢固用炭灰三斤煆以火盡為度候冷取出細研入腦麝各一字再研勻十嵗以下半錢匕十嵗已上一錢匕芫荽酒調下更有熱疾加减治瘡子倒靨方用臘月中犬糞燒灰為末入龍腦少許細研每服半錢新水下治大人小兒瘡子倒靨方白花蛇連骨一兩慢火炙令乾勿焦大丁香二十一粒右為末大人每服一大錢小兒半錢以水觧淡酒調下如黒靨者服之移時重紅治瘡子倒靨方用橄欖核中截斷水磨少許服立發麻黄湯治斑瘡倒靨用麻黄三十寸去節蜜炒令香紫色為度水一盞煎六分服余得此方後往知襄州仙源縣值工筆李用之子斑瘡倒靨已至危困投此藥一服瘡子便出其應如神未至胃爛便血者皆可治一法用灰治煎治瘡子倒靨用濕生蟲不計多少焙乾為末酒調下一字加味宣風散治腎虚証瘡疹變黒鷄心㯽榔二個陳皮去白青皮去穰甘草炙各二錢半黒牽牛二兩半生半炒熟右為末蜜湯調下氣怯者加南木香一錢先下黒糞次下乾糞後以四君子湯加厚朴木香陳米湯服和胃良乆糞黄瘡自微出以胡荽煎酒傅其身即發起獨聖散治瘡疹陷入發黒色而欲絶服此漸蘇紅潤用穿山甲湯洗净炒令焦黄為末每服半錢入麝香少許南木香煎湯調下一方葱白煎湯調下或紫草煎湯入紅酒少許服之一方用麝香當門子少許每一嵗半錢三嵗一錢只温酒調下一服見效雖遍身黒欲絶亦䏻漸蘇而發紅但目閉無魂者不治靈砂酒治疹瘡黒陷不起用靈砂以好酒磨化三五粒服之效紫雪湯治小兒瘡疹倒靨紫草茸地龍去土等分右為麄末每服二錢用水酒共七分煎至四分去滓温服丁香散治小兒瘡疹倒靨黒色及出不快丁香鹿肉乾者各半兩紫草一分右為細散每服二錢酒一盞入麝香少許煎至半盞放冷灌之如人行三二里再服立發紅色通聖散治小兒瘡痘靨伏黒陷雄黄通明者研水飛麝香用當上門子為末各半錢右同研細只作一劑一嵗兒作三服温酒調下治小兒瘡子倒靨黒陷方白殭蚕蝉退去上等分右為麄末水一盞半煎至半盞去滓分作二服微熱服立出黒金散治小兒瘡子黒陷不出猪懸蹄甲半兩蛇蛻皮三條鯪鯉甲一分猬皮一枚鵶翅一對蛤粉一分右六味都入在磁瓶内用塩泥固濟燒一宿研為細散一二嵗兒每服半錢猪尾血温湯調下不出再服再生散治小兒瘡泡正出忽變紫色或作黒陷喘急神昏人齒五枚燒灰蝎尾五条燒灰右件研勻每服半錢温酒或煎葱白湯調下不拘時服治小兒瘡痘作變惡証皆可服人参一錢茯苓一錢紫草一錢木香半錢附子三片右為㕮咀生姜三片棗子一枚水煎服神聖丸治小兒瘡疹黒陷倒靨服之速效無椒塩􅔻餅一箇去皮右用臘月活兎兒取血就和􅔻餅搗三四百下丸如梧桐子大毎服三五丸好酒化下不拘時候若嚥下咽喉湏㬰發瘡疹紅活大有神效發斑紫草散紫草甘草糯米亢云此味極好助胃氣黄茋等分右為末水煎服辛亥樵隠孫先出麻疹又發痘瘡黒陷亢拱辰出此方愈亢云錢氏紫草散有枳殻難服瘡疹發斑附論夫小兒斑毒之病者是熱氣入於胃也夫胃主肌肉其熱氣夾毒藴積於胃毒氣熏發於肌肉状如蚊蚤所囓赤斑徧體此病或是傷寒或時氣或温病由風熱不時以故熱入於胃變成此毒乃發斑也凡發赤斑者五生一死黒者十死一生也楊氏曰或陽証而誤温藥或當汗不汗當下失下或汗下未觧陽熱内盛蒸溽外廹熱毒入胃或胃寒毒至春始發或冬暖人受乖臭之氣至天氣暄熱始作皆能發斑盖熱必傷血血熱不散裏實表虚以致熱氣虚出於皮膚輕則如瘡子重則如錦紋謹勿妄汗之重令開泄瘡爛凡斑若見急冝早治日子稍延獨陽絶陽不可救治斑之方萌與蚊迹相似凡發斑之証若内外熱熾胃爛難救矣或如錦紋起如餅搭者難治若初發色紅漸次黯黒面色初黒及初發便如黒痣不治紅斑五生一死黒斑十死一生盖發斑者皆胃熱陽毒盛而隂脉伏或大便自利或氣短燥糞乆不通皆危証也發斑多在胸腰間闗前陽脉洪大病人昏憒先紅後赤者斑也蚊迹多在手足之間關脉不洪病人自静先紅後黄是也楊氏治法通用升麻葛根湯敗毒散犀角地黄湯熱盛𤣥参升麻湯生姜烏梅煎黄連一物湯米煎熱病發斑時氣發斑大青四物湯黒膏大熱可下少與調胃承氣湯孫兆用白虎加人参湯血熱内結小柴胡湯湏用紫草川芎倍加生地黄為佐方犀角散治小兒陽毒壅盛發斑心躁皮膚焮痛犀角屑川升麻白鮮皮梔子仁漏蘆川大黄炒剉赤芍藥甘草炙各半兩寒水石一兩右為散毎服一錢以水一小盞煎至五分去滓不拘時量兒大小加减服大青散治小兒熱毒發斑不止心神煩悶大青半兩炒𤣥参半兩川升麻半兩梔子仁半兩甘草半兩炙剉川大黄半兩炒右件為散每服一錢以水一小盞煎至五分去滓不拘時候量兒大小加减服之大黄散治小兒斑瘡大便壅滯冝服川大黄半兩剉炒甘草半兩炙黄芩半兩枳殻半兩麸炒黄右件為末不計時候以新汲水調下一錢三嵗以下可服半錢又方犀角屑一分川升麻一分川大黄半兩炒甘草半分炙右為散毎服一錢以水一盞煎至五分去滓量兒大小加减服之葛根橘皮湯治温毒發斑爛癮疹如錦紋或咳嗽心悶但嘔清汁知母甘草麻黄杏仁葛根橘皮黄芩各半兩右㕮咀毎服五錢水一盞煎至六分量大小温服𤣥参升麻湯治傷寒毒氣不散表虚裏實熱發於外身斑如錦紋甚者煩躁兼治咽閉腫痛𤣥参升麻甘草各半兩右㕮咀每服五錢水一盞煎至七分量兒大小服調胃承氣湯治熱留胃中發斑及服熱藥過多亦發斑此藥主之大黄芒硝甘草各等分右用水盞半先煎大黄甘草姜三片煎六分後入硝煎去滓温服紫草散發斑疹鈎藤鈎子紫草茸各等分右為細末毎服一字或半錢温酒調下無時黒膏治温毒發斑豆䜴一合生地黄四兩切右用猪脂半斤合和露之煎令三分取二分去滓再入雄黄麝末攪和量大小服之其毒從皮膚中出則愈忌蕪荑治小兒發斑散惡毒氣用葵菜葉絞取汁少與服之治斑瘡用屋上爛茅和醤汁研傅之治小兒斑瘡及痘瘡心躁眠卧不安用川升麻不計多少細剉水一盞煎滓取汁以綿霑汁洗拭瘡瘢上治小兒發斑瘡用石榴葉不拘多少為散毎服一字或半字温調下發斑藥用珠子七粒研碎用新水調勻服之瘡痘攻咽喉附論夫瘡痘攻咽喉者心胃有熱上攻於咽乾澀而疼如兼口舌生瘡齒浮齦腫者冝甘露飲水漿不下者紫雪散最妙如聖湯抱龍丸消毒飲皆可選而用之方神仙紫雪散治大人小兒一切熱毒胃熱發斑消痘泡麸疹及傷寒熱入胃發并小兒驚癎涎厥走馬急疳熱疳黄瘦喉脾腫痛及瘡疹毒攻咽喉水漿不下黄金一百兩寒水石石膏各三斤犀角羚羊角各十兩屑𤣥参一斤沉香丁香各五兩木香甘草八兩升麻六兩皆㕮咀右以水五斗煑金至三斗去金不用入諸藥再煎至一斗濾去滓投上好芒硝二斤半微火煎以栁木箆攪勿停手候欲凝入盆中更下研硃砂真麝香各三兩急攪勻候冷貯於宻器中勿見風毎服一錢温水化下小兒半錢一字咽喉危急捻少許乾嚥之地黄丸治小兒瘡疹口瘡咽喉腫痛牙疳臭爛天門冬麥門冬𤣥参各二兩甘草薄荷葉各一兩右為細末熬生地黄汁和丸櫻桃大毎服一丸温蜜水化服甘草桔梗升麻湯治小兒斑出欲透皮膚身熱咽喉不利甘草半兩桔梗升麻半兩右剉細末每服二錢水煎桔梗甘草防風湯治小兒疹子出已發熱咳𠻳或口舌生瘡咽乾壮熱飲水咳𠻳痰涎不利服之無不愈者桔梗甘草炙防風各等分右為粗散每服三錢水一大盞煎至六分去滓温服不拘時候量大小加减服甘露飲子治心胃熱咽痛口舌生瘡并瘡疹已發並可服又治熱氣上攻牙齗腫牙齒動搖兼大便秘甘草剉炒石斛去苗枇杷葉去毛山茵蔯葉枳殻麸炒去瓤黄芩去心生熟乾地黄焙秤天麥門冬各去心焙秤右各等分為粗末毎服二錢水一盞煎至八分食後温服牙齒搖齗腫熱含𠻳渫并服一方無枇杷葉如聖湯治小兒瘡疹毒攻咽喉腫痛及咽嗌口舌生瘡不䏻吮乳一名如聖麥門冬散桔梗甘草生牛蒡子炒各一兩麥門冬去心半兩右為細末每服二錢沸湯㸃細呷服入竹葉煎尤妙一方加荆芥防風重者入竹􅅹兒小乳母無孕者亦可服紫河車散療小兒斑瘡毒氣不觧攻咽喉音聲不出舌頰生瘡渇逆煩悶潮熱面赤紫河車茜草根貫衆各一兩芍藥甘草炙各半兩右為粗末每服一錢水七分生姜二片煎至四分去滓温服之一方加菜子一兩鼠粘子湯治小兒痘瘡收靨者身熱大便堅實口舌生瘡咽喉腫痛此是餘毒未散又名消腫飲鼠粘子一兩微炒甘草川升麻荆芥防風各二錢半右㕮咀每服三錢水一盞煎六分量大小加减服觧毒防風湯防風一兩地骨皮黄耆芍藥荆芥枳殻鼠粘子各半兩右為粗末每服四五錢水煎服桔梗湯如斑已出只時時與之快咽喉寛利胸膈桔梗二錢生甘草一錢右㕮咀作一服水一盞煎半盞不拘時候服之如見傷食証又見斑証先於不犯大黄巴豆藥尅化過再與升麻湯如食重傷煎藥不過再與犯大黄巴豆藥過之牛蒡散治小兒斑瘡及疹痘未出一切毒瘡咽喉腫痛凉膈去癈牛蒡子一兩炒荆芥二兩半白芷半兩全蝎三錢甘草三錢防風半兩右為末水七分盞煎服如大便自利者不冝服此治痘瘡後餘毒上攻咽喉閉塞語聲不出用蛇退不拘多少麻油潑上燒存性碾為末以砂糖拌和捻作餅子嚼下瘡疹吐利附論凡痘瘡正出吐泄不食忽増寒戞齒者瘡心黒陷喉中涎喘盖兒生受風冷血氣虚弱即變此証難治多死冝用益黄散甚者金液丹並食前服吐泄定後思食証平復方可用發瘡痘藥設或妄投亦必生癰腫也方一證紅斑方出胃虚吐利或傷凉藥侵損胃虚弱不食陷而不出冝用温裏之劑理中湯重者用薑附靈砂大抵用藥或熱隨証輕重以救一時之急不可拘以常法又不可太過也理中湯人参去蘆白术白薑炮甘草各等分右剉姜棗煎重者加炮附子或禀受怯弱脾膚虚冷大便自利手足厥冷冝理中湯益黄散軰可救裏温出也胃愛散調理小兒膚虚吐泄如斑瘡未出醫人不識形候将使冷藥氷却瘡子致令内伏不出将此胃愛散調理如身體汗即不用控心散發也如無汗出即用控心散發之後下羗活散與胃愛散糯米一兩乾淡木𤓰三分甘草一分藿香葉紫蘇葉各一分丁香二十五粒已上六味一處同炒燋黄為度右件藥同一處令乾碾為細末每服一錢半煎粟米棗子湯調下量兒大小為劑紫草木香湯治瘡出不快大便泄利紫草木香茯苓白术甘草炒各等分右剉散每服二錢水一盞加糯米三十粒煎温服盖紫草能利大便木香白术所以佐之也肉豆蔲丸治痘瘡已出泄㵼發渇水榖不化或澀或㵼淡黄色者致令瘡痘難出難靨非特痘瘡一證其餘蔵寒泄痢尤冝服之木香半兩縮砂仁三錢白龍骨半兩訶子肉半兩肉豆蔲赤石脂七錢半枯白礬七錢半右為細末稠麵糊為丸如黍米大一週嵗兒每服三五十丸三嵗兒服百丸温水飲下㵼甚者異攻散吞下㵼止住服不止多服一方或㵼水榖白色淡黄色木香散下五味香丸治瘡疹初出一日至七日如㵼三行者便可服木香半兩白龍骨訶子肉赤石脂各半兩肉豆䓻二錢半右為細末麫糊丸如黍米大一週嵗兒服三五十丸三嵗兒服百丸温米飲湯下日三服不拘時候三服不止者難救如㵼米榖者即難治之證瘡疹入眼附論凡痘瘡欲出先攻目赤腫不開次出瘡痘不甚紅活有痰者設或妄投湏損眼目冝以調肝散護目生銀丸并珍珠丸化痰更冝對証用藥也瘡痘盛出熱毒氣攻則斑瘡入眼多食毒物亦爾若覺眼腫或赤痛多淚時時與開看睛無瘡即不害若有瘡赤腫者冝用四順飲每日食後一服常令微利毒消平愈不爾害目幼幼新書云龍木論治小兒斑瘡入眼外障此眼初患時不論大小湏患斑瘡一度瘡子患時覺入眼中即湏将息慎忌若不忌口将息即便疼痛淚出赤澁怕日難開腫痛翳如銀色此為熱氣在肝上衝入眼肝膈壅毒致成膈翳冝用秦皮湯洗之然後服凉肝丸二方並見本門亦不冝藏洗出血㸃鍼桃撥疼痛定後即㸃退翳藥亦得方效恵濟論小兒疹瘡入眼候歌斑痘將生眼不開淚流頻有熱横顋如桃腫赤如錐痛此疾應知入眼來莫與醋漿及毒物鷄鵝少食免生災急敎製造葳靈散百日無踰尚可回小兒疹痘初發便令煎油渫散子之類令兒食之每哺兒切忌醤醋五味馬牛鷄鵝野味等物止令食淡熟猪肉淡粥飯餅餌之類不䏻乆食淡入少塩無害又於清晨久木起時抱兒於井上令自頭菉豆七粒於井中云使兒斑瘡不入眼又小兒瘡疹若食熟鷄鵝等物未有不損眼目者雖瘡疹已可尚冝数月勿食方調肝散治痘瘡熱毒大盛令不入目犀角如無以升麻代之大黄剉炒桑白皮鈎藤甘草炙各五錢天花粉石膏煆黄芩木通防風荆芥牛蒡子炒紫草陳皮去白龍膽草去蘆各二錢右剉白水煎食後温服鷄翎散治小兒斑瘡入眼輕粉半錢粉霜一錢右同研地上用炭火三兩塊傾在火上急以碗盖之頻頻掲碗看纔候無烟生即住掲用鷄翎掃碗内水銀作一處是一服如人患左眼傾入左耳内患右眼傾入右耳内所患眼便開得其瘡自愈仙靈脾散治斑瘡入眼仙靈脾葳靈仙各等分右為末食後米飲調下量兒大小用之黄蘗膏治小兒疹痘出後即湏愛護面目勿令沾染欲用胡荽酒噴時先用此方塗面上然後方可噴四肢大人嬰兒孩有此疾悉用之黄蘗一兩菉豆一兩半甘草四兩生用右為末再研令細後以生麻油調如薄膏從耳前眼唇並厚塗日三五遍上塗面後可用胡荽酒噴早用此方塗於面上令不生疹痘如此方塗遲縱出疹痘亦少諸家方愛護面目者皆以此方治療分兩用治皆同惟疹痘論一科用菉豆粉三兩半芥子膏治瘡痘令不入眼用白芥菜子為末水調傅足心熱毒歸下净心散治痘瘡出盡便冝服之如入眼自退蛇退一條燒灰甘草五錢生為末不蛀皂角五挺燒灰右研勻小兒半錢熟水調服治大人小兒瘡疹出䕶眼目右纔覺患以塩花少許湯浸了令温洗兩眼晝夕可服三兩度大人以指揾塩花水㸃眼内旋以帛子拭之初用眼即多痛用三上後即不覺痛不計大人小兒或患欲退時眼内有餘熱者亦冝用此法洗㸃治瘡疹入眼馬屁勃半兩皂角子十四粒蛇皮半兩右入小礶子内塩泥固濟燒存性研細温酒調下三錢食後服蛇皮散治瘡疹入目成翳一名子肝散栝蒌根半兩蛇皮二錢右為細末羊子肝一箇批開入藥末二錢麻線纒定米泔煮熟頻與食之未䏻食肝與乳母多食如少小未䏻食即半肝令熟研和為丸如黄豆大以米泔下十丸或乳上與亦可日三服又方仙退散治証與前同用蝉殻末水煎羊子肝湯調服二三錢凡痘瘡纔欲着痂用酥或面油不住潤之可掲再掲去若不潤及遲掲痂疕瘡硬即隠瘢痕蝉蜕散治斑瘡入眼半年已後者一月取效猪懸蹄甲二兩入礶内塩泥固濟燒存性蝉蜕去土用末一兩右為末入羚羊角細末一分令勻每服一字百日外兒半嵗三嵗已上一二錢温水或新水調下日三四夜一二服不服一年已外難治項孝忠守官江南每置羚羊角輙得山羊角正如石膏寒水石之相易也羚羊角纎細而節紋極宻京師僦馬人多用以馬啣鉄是也山羊角粗長又節紋稀當是京師用為正一方用猪肝湯調下糓精草散治小兒痘瘡已靨眼目翳膜遮障瞳人癮澁淚出久而不退者餘毒熏蒸眼目或因悮食煎煿熱物所致糓精草一兩生蛤粉二兩右為細末獖猪肝一葉用竹刀批作片子糁藥在内用草䋲縳定以甆器内貯米泔一碗慢火煮熟令兒食之一方臨卧細嚼却用原煮米泔送下忌一切毒物等項云猪肝煮熟入磁瓶内熏眼却服之一方用青竹葉十片同煎熏服一方用生黒豆皮二錢决明散治小兒瘡疹痘入眼一名𤓰蒌散决明子赤芍藥甘草炙各一分𤓰蒌根半兩右為末三嵗半錢蜜水調下食後日進三服效撥明散治小兒瘡痘入眼生翳一名撥雲散用桑螵蛸真者一兩炙令焦為末麝香少許和劑三嵗半錢米泔湯調下食後通聖散治小兒瘡痘入眼及生翳障一名豆皮飲白菊花菉豆皮糓精草去根各一兩右為末三嵗一錢乾柿一箇生粟米泔一盞共一處煎候米泔盡只将乾柿去核食之不拘時一日可三枚五七日可救逺者半月餘效一方有夜明沙一兩又名菊花散浮萍散治小兒患痘瘡入眼疼痛恐傷目用浮萍草隂乾為末三嵗一錢半肝一斤入盞内杖子搗碎爛入沸湯半盞絞汁調下食後三兩服立效一方投水半合甚者一服差傷目者十服差一方用羊子肝又治隂囊腫色如琉璃三嵗一錢葱白湯調下兎肝丸治小兒斑瘡入眼雖赤白障遮交眼睛但得瞳子不陷皆能治黄蘗去皮石决明生用蒼术各半兩右為末兎肝丸如小豆大三嵗三十丸米湯下食後服凉肝丸防風二兩人参赤茯苓一兩半茺蔚子黄芩黒参大黄知母各一兩右為末蜜丸菉豆大食後茶下量兒大小為劑秦皮湯秦皮二兩秦芁細辛防風各一兩甘草半兩右白水煎淋洗葳靈仙散治小兒斑瘡雀目眼生翳障遮䐽葳靈仙仙靈脾甘草赤茯苓子芩青葙子大青赤芍藥大黄各等分右為末羊肝掺藥篛葉麻皮纒縛米泔煑熟放冷吃量兒大小用之一方用獖猪膽二箇批開掺藥在内金華散治痘瘡入眼昏暗翳膜遮障黄連菊花枸杞子各一兩甘草三分牛蒡子半兩右為末薄荷湯調食後服量兒大小用之明目除昏暗退翳膜常服大效治小兒出瘡疹眼内有雲翳輕粉黄丹各等分右以竹筒吹在耳内左眼有翳吹在右耳右眼有翳吹在左耳即退透耳藥治斑瘡疹入眼硃砂一錢粉霜八分右研為極細末水調少許用銅匙頭傾一兩㸃於耳内中後用前通聖散治小兒斑瘡入眼硃砂腦子水銀麝香已上各等分右為細末用水銀調滴入耳中治瘡疹入眼右法候瘡疹安後以兎屎焙乾為末茶清下頻頻服即安仍治昏翳羗蝉散治小兒瘡疹後毒氣不散生翳障睛并治暴赤眼疼痛生翳遮障羞明一名羗菊散羗活蝉蛻去足翼土防風蛇退菊花糓精草木賊甘草梔子大黄白蒺藜黄連沙苑蒺藜各等分右為末毎服半錢白湯調下或米泔調下護目膏治小兒痘瘡不入眼内及截斑毒或瘡痘後熱毒壅盛眼目障翳或瘡痘入眼而生翳者一名黄蘗膏黄蘗一兩甘草四兩生用紅花二兩菉豆粉一兩半右為末生芝蔴清油調塗兩眼外四畔頻頻塗之面上不生瘡疹若塗此藥瘡痘稀少或胭脂傅之亦可若用胡荽酒尤能䕶目决明丸治小兒斑瘡入眼雖赤白障翳遮漫黒暗但得童子不陷者皆可治之石决明煆川芎黄蘗各一兩蒼术半兩右為細末用兎肝或無以白羯羊肝代之研爛搜和丸如菉豆大毎服三十丸食後臨卧米泔下治痘瘡入眼用糓精草煑白柿喫仍用菉豆根燒灰淋渫以上面澄清者洗下面濃者服之七退散治痘瘡後眼生翳雄鷄脚粗黄皮鵞脚黄皮抱鷄子殻人指甲蝉蛻猪後脚懸爪不㸃地者羯羊角右焙乾或日乾為細末煎羗活湯調下羊肝散治小兒痘瘡入眼及無辜氣入眼蜜䝉花三兩青葙子决明子車前子各一兩右為細末各别收之每取蜜䝉花末三錢餘藥各一錢拌勻用羊肝一大片薄批掺上濕紙裹煨熟量多少空心食之一名蜜䝉散治瘡入眼用局方洗心散洗肝散加乾柿菊花谷精草菉豆大殻同煎嚼生葱薄荷食後服養生必用治目暴赤腫痛少兒斑瘡入眼棘剛子炒香蔓菁子絹袋盛飯上蒸􅍄取出焙乾炒令香甘草炙木賊去節各等分右為末沸湯㸃一錢食後服日三决明丹治疹痘瘡後毒氣入眼决明子蜜䝉花各一兩青葙子車前子川黄連去鬚羯羊角屑各半兩右為細末煑羊肝一具切破同諸藥搗一二百下丸如黍米大每服二十粒荆芥湯下乳食後量兒大小加减㽔仁散㽔仁去皮炙黄芩梔子仁黄連黄蘗皮川升麻甘草炙各一兩右為細末每服二錢用水一盞煎至六分去滓食後温服量兒大小如生翳障重者兼蜜䝉花散蜜䝉花散治疹痘瘡并諸毒氣入眼昏生翳膜蜜䝉花三兩别為末井水石青葙子决明子車前子各一兩右為細末蜜䝉花散半錢末與蕤仁散半錢相和合羊肝一片切破掺藥末在肝内濕紙褁火煨令􅍄空心量力食翳膜退即止泉石散治小兒風熱攻眼及斑瘡入眼井泉石先為末再研水飛蝉蛻蛇皮甘草三味炙已上各一兩右為末每服半錢至一錢蜜水調下忌油膩羚羊角丸治眼昏澁赤腫侵睛淚多或作翳障羚羊角屑黄芩大黄芥菜子各二錢半當歸𤣥参甘草炙木賊蝉殻去足珍珠末一作硃砂决明子炒各半兩荆芥穂川白芷二兩蒼术用米泔汁浸一宿焙乾各二兩羗活一兩右為末煉蜜為丸如弹子大每服一丸食後用荆芥茶湯嚼下小兒斑瘡入眼看兒大小加减用蝉蛻湯化下食後服治孩子痘瘡入眼蕤仁桃仁各二箇去皮尖用膩粉龍腦硇砂牙硝各一錢研極細右用白沙蜜調末炙三次收之每用一粟米許㸃之立效治小兒斑瘡入眼黄連菊花蜜䝉花各半兩蛇皮一條燒灰存性甘草炙一分右為散煉蜜丸如菉豆大冷菉豆湯下五丸十丸加减用蛇退散治小兒斑瘡入眼蛇蛻皮馬屁勃皂角不蛀者殻精草右各等分同入瓦藏瓶内用塩泥固濟木炭火燒令通赤出於地坑子内出火毒候冷取出細研為末每服一字温米泔調下樺皮散治小兒斑瘡入眼及裹黒睛樺皮頭髮蛇蛻皮各半兩右細净器内㸃火燒之候煙盡研細每服半錢煎黒豆湯入酒三滴調下日五服又方用蚕沙燒灰為末毎服一錢以米泔研生菉豆七粒調下毎夜一服病去即止治斑瘡入眼方用黄芩為末臘月内黄牛膽内就弔於北隂中旋丸菉豆大麴湯下五丸只一服退隔年者三服三年外者不醫治小兒瘡疹入眼方地骨皮塩䜴等分於新瓦上焙焦右為末服一錢陳粟米飲調下日三服神效治小兒斑瘡入眼用生鱔魚以針刺血貯器内㸃入眼即愈甚佳治斑瘡入眼方斑瘡入眼豈尋常熱氣流来到此方鶴頂神膏君記取謂塗藥如鶴頂移時病退號醫良黄芩散黄芩山梔子黄丹各等分右為末用牛蒡子菜杵汁調塗在頂門蝉退散治斑瘡翳障眼不見光明冝服之如睛爆破不可醫蟬蜕去上蛇皮炙川升麻蒺藜炒去角黄連炒榖精草大青草仙靈脾葳靈仙井泉石各半兩硃砂研螺粉各一分右為細末每服半錢蜜水調下大人小兒加减服甘菊花散治小兒斑瘡入眼甘菊花糓精草石决明各等分右為末每服二錢水一盞入乾柿一箇同煎至七分乾柿細嚼服治小兒目中痘瘡成翳方大黄炒為末二錢水銀半錢右用男子口津唾化水銀為泥次入大黄末方入冷水調塗頰上如乾用水温之乃效治痘瘡入眼腫痛不可開黒靨不出用斷續即蝉蛻為細末以薄荷汁調傅一二次便䏻開若瘡黒靨不出温熟水調下一二錢即出乳母服亦可凡小兒初患痘瘡先用胭脂塗眼令瘡不入眼中不得洗面生水入眼即損眼治諸眼翳昏風痒方用真杏仁三五十粒水浸去皮尖細嚼和津液吞五更端坐常服杏仁潤肝去塵滓也加减四物湯治斑瘡入目或瘡痘收後服之當歸尾芍藥川芎蒼术白菊花乾葛羗活各等分右剉散毎服水一盞藥末二錢入生地黄少許搥碎同煎半盞量兒大小服之乳食後服忌一切動毒物雖愈後忌三二日方可蝉菊散治斑瘡入目或病後生翳障蝉退净洗去塵上白菊花各等分右剉散每服二錢水一盞入蜜少許煎乳食後量兒大小與之屡驗洗方用黄連去鬚白滑石調青絹帛包泡湯候温洗塞耳丹治疹瘡入眼用水銀一錢虢丹五錢同丸作六丸入鎔銀鍋中圓瓦上盖濕紙糊護定用香爐盛炭火燒一日後取出以薄綿裹之疹瘡在右則塞右耳在左則塞左耳立見墜下㵼青丸方見嬰孩肝臓門類海藏云東垣先生治斑後風熱毒翳膜氣暈遮睛以此劑㵼之大效初覺易治補肝丸四物湯内加防風羗活等分為細末煉蜜為丸是也銷肝散㵼青丸去梔子大黄治腹虚治小兒痘疹眼生翳膜用浄洗手用甆片刮指甲屑焙令燥研細成末㸃麻子大人翳上兩日間自落極妙透關散治小兒斑瘡初作眼患痛澁羞明怕日出淚頻多或已覺漸成白翳子冝用神效用蓽澄茄不拘多少為細末每以少許吹入鼻中於食後頻頻吹之諸證皆可用之大效㸃明膏治斑瘡眼患只在百日以内治之容易乆即氣定難以調理用掘取土中覆盆根處有生路傍樹髙五七尺者浄洗搗取粉澄濾令細日乾每用蜜和以少許㸃白丁上令其自消自散日二三次㸃用驗治小兒斑瘡入眼用蒺藜麸炒炙甘草𦍑活防風等分搗每服二錢漿水下撥雲見日直到老柴胡散治眼胞患斑瘡熱衝透睛中疼痛淚出翳如銀片腫澁難開柴胡黄芩芍藥各等分甘草一分右剉散每服三錢水二盞煎大人小兒加减服兼以藥煎洗之治小兒痘瘡後眼上生膜葳靈仙仙靈脾川芎等分右為末用不下水猪肝薄批片子撒藥末於上捲之用麻線縛之如此數捲碗内盛飯上蒸熟去線令兒喫之自然落下竒犀散治小兒斑瘡痘毒入眼但不枯破其餘證候悉治之半月即愈瘡子安後服此藥清肝膈永逺無疾證犀角鎊薄荷子如無以葉代之羗活麻黄去莭木賊去節各九錢石决明赤芍藥甘草白蒺藜炒去刺𤓰蒌根各一分人参去蘆九錢羚羊角鎊九錢右為細末每服一錢或半錢小兒蜜湯大人清茶調下夜卧食後服决明散治小兒斑瘡熱毒攻肝上衝目遂生障翳寒水石火煆通赤取出地上去火毒甘草生用各一兩坯子胭脂一錢右為細末每服半錢用生米泔水調下乳食後消翳丸治小兒斑瘡眼生障翳硃砂研指甲末不拘童男子女先以水净洗指甲拭乾用木賊草擦取細末右等分再同研令極細以露水搜和丸如芥子大每用一粒於夜卧時以新筆蘸水㸃在眼内至中夜更㸃一粒撥雲散治痘瘡入眼羗活去蘆防風甘草炙柴胡各等分右為細末每服二錢水一中盞煎至七分食後臨卧服忌藏塩鮓醤濕麫火上炙煿發風毒等物蜜蒙花散治如前蜜䝉花棟洗羗活去蘆菊花去枝梗并土木賊去根節石决明煆同東流水煑一伏時漉出搗碎如粉杜蒺藜炒去尖右等分為細末每服一錢臘茶清調下食後日二服烏豆麥門冬湯治瘡痘眼目赤腫癮澁疼痛淚出羞明烏豆小者二兩麥門冬去心一兩右二味用水三升同煑令烏豆爛熟為度将藥湯放温時時抄與兒服乳母喫烏豆麥門冬如三五嵗兒可令嚼喫如烏睛突髙者難治蒼术散治斑瘡入眼蒼术一兩槐花藁本蛇退防風枸杞白蒺藜各三錢黄芩川芎各半兩木賊甘草白菊花各二錢蟬退四錢乳香沒藥各半錢硬石膏煆半兩乾葛一兩右件為細末用白水煎食後加糓精草三錢半尤妙菊花散治痘瘡入眼白菊花三兩菉豆殻蜜䝉花旋復花糓精草甘草各一兩右為㕮咀每服一錢乾柿一枝粟米泔一盞煎乾泔為度取乾柿食後服復明散治小兒大人斑瘡入眼或成翳膜或眼睛髙出而不枯損者雖年嵗深逺並可治之草龍膽去蘆頭麻黄去節右二味各等分為細末每服三錢食後炙鼠肝香熟蘸藥食之二服服藥五六日後眼白睛與翳膜皆粉紅色眼覺痒澁不得揉動亦不可疑此是翳膜漸退也頻用温塩湯洗之瘡大者日三服小兒更量大小加减服之如不食鼠肝只用第二次淘粟米生泔水調下紫貝散治斑瘡丁子入眼紫貝一箇即田螺也右生為末用羊子肝批開掺末一錢線纒米泔煑香熟入小口瓶器盛乘熱燻候冷於星下露一宿来早空心喫不過一螺可愈治小兒痘瘡入眼方用蛇蜕五寸煑菉豆去皮只喫豆神效瘡疹便膿血附論夫瘡痘欲安而不曽傷食有肚疼者是痘毒大盛氣血凝結腹中不散久必作膿血痢冝用四物湯加罌粟皮大便堅實或㵼焦黄或熱或不熱有肚疼者四順飲若㵼白酸臭傷食肚疼者先益黄散後觧毒丸令微利再用益黄散便血或下黒糞睡不醒者裏毒大盛其證甚惡犀角地黄湯抱龍丸小柴胡加生地黄主之方薤白湯治小兒瘡疹其或下痢赤黄膿血及渾身熱當服薤白半錢切豆䜴一盞山梔子十枚右用水五盞同煎薤白爛為度去滓量大小服之觧去惡積牛黄散治小兒瘡疹陽毒入胃便血日夜無節度腹痛啼哭牛黄一錢欎金一兩右研為末每二嵗兒服半錢以漿水半盞煎至三分和滓温服量大小以此増减之日二服黄連阿膠湯治小兒斑疹餘毒下痢膿血黄連半兩微炒黄栢梔子微炒阿膠炒燥各三分右為麄末每服二錢水半盞煎六分去滓温服量大小加减日進二服治小兒瘡疹之後大便膿血用山梔子當歸煎湯下黄連阿膠丸瘡疹後觧餘毒附論病後觧利當觀虚實瘡疹後當觧利此世俗通論然小兒禀受既實榮衛充壮病後有熱者冝與觧利其証大便難小便赤䏻食而渇大叚熱甚者冝大黄散留熱在胃嘔吐而口舌生瘡或下利黄赤者冝黄連散煩渇而小便少者冝五苓散餘熱温壮齒疼或腫者冝甘露飲咽疼者冝抱龍丸如聖湯肝有熱毒多怒呌而不得眠者冝調肝散大膓下血疼痛者冝牛蒡散三黄熟艾湯生癰者冝小柴胡加生地黄湯犀角地黄湯無熱証者但當隨時安養而已或其人所禀素弱瘡痘既出之後榮衛大虚坐立振揺大便不秘小便不赤飲食不甚進者冝胃愛散異功散雙和湯之類以扶持之其後飲食如故起居稍勝榮衛既充然後微微觧利至虚之人不必觧利常見虚怯小兒不應觧利而強與觧利遂為寒中為下利生病多端也餘毒作嘔吐者有冷熱之不同如心煩作渇食乳甚急聚滿中膈吐出如射其人面帶赤手足心熱居處喜凉此熱吐也如乳食水漿隨吐面色清白手足冷大小便自利此冷吐也熱者竹茹湯五苓散竹葉石膏湯加橘皮之類主之冷者益黄散理中湯丸主之要之病後餘毒多是熱邪其間冷証十有一二也病後忽遍身青黒色手足瘛瘲口噤涎聲如鋸者此中風也冝消風散入蝉蜕投生姜薄荷汁酒各數㸃飲之或小續命湯去桂附子加荆芥亦可也病後非時發搐搦者冝抱龍丸小柴胡加生地黄之類病後胃弱不能勝糓謂之食蒸發搐其人潮熱及大便酸臭秘泄不調或嘔血腹疼冝紫雪丸小承氣湯其作痘癰結腫者冝用小柴胡湯加生地黄為佳如升麻湯消毒飲犀角地黄湯皆可選而用也病後大小便不通者四順飲承氣湯五苓散導赤散之類便膿血者牛黄散犀角地黄湯黄連觧毒散三黄丸等選而用之餘毒咳嗽脇痛者赤茯苓湯小柴胡加五味子桔梗枳殻等煩渇五苓散竹葉石膏湯黄連散燈心散主之方全功散治痘瘡收靨觧利餘毒天花粉防風黄芩升麻羗活荆芥穗川芎牛蒡子炒欎金紫草甘草枳殻木通赤茯苓猪苓黄連去毛縮砂仁陳皮糯米炒當歸麥門冬去心右等分白水煎不拘時服連翹散治瘡疹壮熱小便不通餘毒未觧連翹瞿麥荆芥車前子木通赤芍藥當歸去尾防風柴胡去鬚滑石蝉退甘草炒山梔子去殻黄芩各一錢右剉散每服二錢加紫草煎温服五福化丹丸治瘡疹餘毒上攻口齒及治藴積毒熱驚悸狂躁頰赤咽乾口舌生瘡夜卧不寧譫語煩渇頭面身體多生瘡癤赤眼等疾一名青黛丸人参半兩𤣥参半兩茯苓一兩青黛甘草炙各半兩桔梗一兩牙硝枯過半兩麝香腦子各半錢一方無腦子有金銀箔右為末蜜丸每兩作十二丸一嵗兒一丸分四服用薄荷湯下瘡疹上攻口齒涎血臭氣生地黄自然汁化一丸用鷄翎刷在口内熱疳肌肉黄痩雀目夜不見物陳粟米泔水化下食後臨睡服一方磨生犀水化下大和散治瘡痘後寒熱往來嗜卧煩躁悶亂生地黄地骨皮人参川當歸洗去蘆甘草赤芍藥各等分右㕮咀每服一錢水半盞煎至三分去滓通口服柴胡湯治痘瘡靨後渾身餘熱不退若有大熱經日不除一名二参飲一名柴胡麥門冬湯柴胡甘草𤣥参龍膽草各一錢半麥門冬三錢半去心人参去蘆二錢半右㕮咀每服三錢水一大盞煎六分去滓稍熱服不拘時候量兒大小加减服辛夷散治痘瘡出後有痘瘡生塞鼻中不能睡卧用辛夷即木筆花研為細末加麝香少許以葱白蘸藥末入鼻中数次即通三黄熟艾湯治瘡正出下利黄赤膿血身熱大渇乃毒入大腸冝觧其毒使瘡出也黄芩黄連黄栢熟艾各等分右剉水煎或加糯米紫草甘草煎服四順飲治瘡痘積熱壅盛心經藴毒熱氣如體虚弱者不可服又治一切丹毒積熱壅滯咽喉腫痛當歸赤芍藥甘草大黄虚者煨用實者生用右剉糯米煎服但令大便通潤大黄散治小兒疹痘瘡出盡後冝服之一名参黄散黄芩𤣥参川大黄剉碎微炒各半兩右麄羅為散每服一錢以水一盞煎至六分去滓方温量兒大小加减服之黄芩散若瘡毒出盡後冝服之以觧餘毒黄芩大黄各半兩𤣥参六錢山梔子仁三分右為麄末一兩水二升煎至八合去滓量大小服嘔吐當先定槐花散治嬰孩小兒斑瘡餘熱不退槐花赤小豆炒各二錢麝香少許研右為細末每服半錢用蜜湯調下三四嵗一字已上用温酒調下只進一服腹中微利即用調胃觀音散補之牛黄生金散觧利瘡子虎杖滑石各一兩甘草二錢半藿香一錢右為細末每服一錢半水八分煎至三分去滓通口服兒大増之射干鼠粘子散治痘瘡靨後身有小熱壮熱大便堅實口舌生瘡咽喉腫痛頥頷結核皆由瘡毒未盡而然鼠粘子炒一兩升麻甘草炙射干各三錢半右㕮咀每服三錢水一盞煎六分温服不拘時消毒加味犀角飲治毒氣壅遏壮熱心煩瘡疹雖出未能勻透口舌生瘡不䏸吮妳牛蒡子三兩炒荆芥穗五錢甘草炙一兩防風川升麻各一錢半右剉散每服二錢水一盞煎去滓令温時時令呷或頻灌之大便利者不冝服雄黄散治小兒因痘瘡牙齗生疳蝕瘡雄黄一錢銅緑二錢右同研極細量瘡大小乾掺其上觧毒散治小兒瘡痘毒盛身熱癰疽咳𠻳有痰氣急并瘡痘正出傷肚疼及觧諸藥毒雄黄一分巴豆二十七粒去油欎金一分右為末白糊為丸如小豆大三嵗三丸薄荷湯下食前如咳𠻳痰喘食後服一方加半夏一分百草膏治痘風瘡用羊糞晒乾燒灰清油調塗必勝湯治瘡疱将出未能勻徧透肌觧毒用惡實不拘多少炒熟粗搗晒每服二錢入荆芥二穗水一小盞同煎至六分去滓放温分作三服如瘡疹已出後與服亦妙黄連散治瘡毒出盡服黄芩散以觧餘毒嘔吐先定尚口赤有瘡下部亦有瘡自下利者黄連厚朴各一兩陳皮杏仁枳實麻黄去節乾葛各半兩右㕮咀白水煎服量兒大小為劑大承氣湯厚朴八兩大黄四兩枳實一兩右為粗末每服五錢水二盞煎八分入芒硝一錢匕去滓服比金丸治瘡痘後餘毒不觧輕粉滑石各一錢半南星一錢青黛半錢右為細末糊丸小豆大一嵗一丸薄荷湯下清肌散治瘡痘後餘毒未除瘡痍濕爛皮膚未平復者黄蘗一兩猪膽炙烏賊魚骨去硬皮半兩右為細末以臘月猪脂調塗患處瘡疹後㓕瘢痕附論凡痘瘡首尾不可出房宜虚爽處坐卧寒温得所忌食動風肥膩等味頻與稀粥易能安愈凡瘡痘纔欲着痂即用酥蜜面油不住潤之可掲則掲遲則瘡硬成瘢痕也纔發痂瘡人多不以油潤反以剥落早成瘢痕誤也然既剥之後却不可早見風冷湏當愛䕶不剥去或出風瘢痕蜜陀僧水調傅之蒺藜散鷹矢白散馬齒莧散青金散皆可選而用也傷寒發痘疹後减瘢候傷寒病發瘡者皆是熱毒所為其病折則瘡愈而毒氣尚未全散故瘡痂雖落其瘢諸靨或凹凸肉起所以冝用消毒㓕瘢之藥以傅之方韶粉散治小兒痘瘡纔愈而毒氣尚未全散瘡痂雖落其瘢猶或凹凸肉起當用此藥塗之韶粉一兩一用胡粉輕粉一錢一用膩粉右相研和入煉猪脂油拌和如膏薄塗瘡瘢上如痘瘡欲落不落當㓕瘢痕小兒痘瘡已靨未愈之間五臟未實肌肉尚虚血氣未得正復忽被風邪入於皮腠之間則津液澁滯故成疳蝕瘡也冝用雄黄散綿蠒散等藥治之乆而不愈者潰骨傷筋以致殺人一方用羊肉骨髓一兩煉入蜜瀼三沸入輕粉一錢研成白膏甆合盛之塗瘡上如痘瘡痒其誤搔成瘡及痂欲落不落用上等白蜜塗之其痂落亦無紫黒瘢痕神效蒺藜散㓕瘢白蒺藜子淡䜴各一兩山梔子仁三兩右為末用醋漿水調如泥每夜塗之來早以淡漿水洗去又方鷹屎白一兩衣中魚三十箇右研細入白蜜調和塗之又方馬齒莧自然汁一升煉成猪脂三兩右以漫火煎成膏日夜塗之簡易方名心腸膏加白蜜青金散治瘡麸疹痘瘢不消白蒺藜子取末山梔子取末青黛别研各一兩膩粉一分右研勻生麻油調塗瘡上治瘡痘瘢用櫻桃仁研細𫝊之百花膏治痘瘡痒甚誤搔成瘡痂欲落不落者用白蜜不拘多少塗於瘡上其痂易落且無疤瘢亦不臭穢或用羊筒骨髓一兩煉入蜜滚三沸入輕粉少許研成膏磁合内盛之塗於瘡上療小兒面上瘡痘子瘢用黄明膠漫火炙為末温酒調服一錢痘出服之無瘢未出服之㵼下療小兒痘瘡瘢靨以蜜陀僧細研水調夜塗之明日水洗去平復矣又方牡蠣煆為粉三兩土𤓰根一兩右搗細羅為散每夜取二錢用白蜜調塗面及瘡瘢明旦以暖漿水洗之又方羊􅏬一具用酒一升浸一宿来日攪濾去汁取羊􅏬盡去止取膜牛酥四兩右入銀銚子内漫火煎三五沸新綿濾入净器中盛每夜取塗面上來日用生甘草一兩以漿水二大盞煎七八沸去滓放温洗面又方猪􅏬一斤天鼠二枚右細切入銚子内煎煉令天鼠焦絞濾取膏日夜摩塗瘡瘢上又方用鸕鷀糞二兩研如粉以煉過臘月猪脂二合調攪令勻塗於瘡瘢上效又方䜴一升羊糞二升右相和以水一斗煎十餘沸去滓看冷暖洗浴瘡瘢又方用黄蘗細剉二兩以水二升煎取一升去滓摩拭瘡瘢上又方用赤小豆末一兩以雞子白調了如稀餳塗瘡瘢上療痘瘡愈後欲無瘢宜頻掲去痂勿令隠肌乃不成瘢縱掲傷有微血但以面膏塗即無苦也瘡痂不可食鷄鴨卵即時肓瞳子如卵白其應如神不可不戒楝實膏治小兒疹痘愈後㓕瘢痕楝實去核炒槐子各一兩右並拍碎用狗脂鵞脂各四兩同於銅銚内以文武火煎一二十沸去滓入在瓷合中候凝瘢㾗日二度又方用蜆子活者以淮水或江水養五日旋取此水洗手面日漸生肉乃無瘢痕一方用黄蜆煑汁洗面無蜆以螺螄代用治天行瘡斑發頭面及身湏臾周匝状如大瘡皆戴白漿隨决隨生不即療數日必死差後瘡瘢黯一嵗方滅此惡毒之氣世人云建武中南陽擊虜將軍患虜瘡諸醫叅詳療之方取上好蜜通摩瘡上以蜜煎升麻拭之治丹疹用蜜調硃砂入酒服仍研搽之又方用蕎麥粉醋調傅又方用梔子仁末水調傅治瘡疹出後滿身腐爛臭穢槐花黄栢皮白藥子等分右為末瘡爛處粉之乾處生地黄汁調傅普濟方卷四百四
