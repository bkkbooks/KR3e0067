為細末煉蜜為丸如桐子大每服七十丸空心食前鹽湯下固真散出聖惠方治才著即泄精白龍骨一兩韭子一合右為末每服二錢匕酒調空心服此二味藥性大能澀精固氣暖下元益元丸出仁存方暖精氣益元陽龍骨逺志右各等分為末用蜜丸桐子大每服三四十丸空心卧時冷水下二聖散出瑞竹堂方治失精漏泄久虛蓮子心一撮砂右為細末每服二錢空心白水調下白元方出仁存方治元氣虛冷精滑不禁大便滑泄瀉手足冷陽起石火煆紅研鍾乳粉各兩右為末酒煮附子糊丸桐子大每服五十丸空心米飲下羊脛灰丸一名理脾丸凡精遺泄只治小腎未有安者法當治脾此藥效蓋思慮傷脾脾不攝精遂致白濁出危氏方內厚朴去皮取肉略使薑汁製為末二兩羊脛炭火煆過通紅取出窨殺另研如粉一兩右為末糊丸桐子大每服百丸至三百丸空心米飲下枸杞丸補精氣枸杞子冬採者佳黃精右為細末二味相各搗成塊掝作餅子乾復搗末蜜丸如桐子大每服五十丸空心溫酒下治失精清有血父蛾二枚隂乾黑參銼碎少許右同為末以汁米調日一服令盡黃蓍散治男子精血出黃茋一錢桂心二分右為散酒服一錢日三治遺精白濁方赤芍藥豬苓各一兩右用黃臘二兩溶汁和藥丸如桐子大每服五六十丸空心鹽湯下神仙補益固真丸一名固真丹治元臟虛損日久及小腸腎膀胱疝氣五般淋病精滑精漏小便白濁并婦人赤白帶漏下血崩子宫久冷血海虛冷等症宜服出百一選方用蒼术洗去泥土乾米泔水浸遂日易泔春五日夏三日秋七日冬十日切作片子焙乾稱一片分作四處四兩用小茴香青鹽五分同炒黃色為度一方只用茴香炒四兩用川烏頭切作片子重五錢川揀子一兩重去皮併核炒黃色為度一方只用川川揀子炒四兩用酒半斤升醋半斤煮三十來次一方用青鹽炒四兩用川掓一兩重去核破故紙一兩同炒黃色為度一方只用川掓炒共一處為細末用酒醋打糊為丸如桐子大每服二十丸空心鹽湯或酒送下婦人醋湯下此藥性溫無毒小便頻數為效韭子丸出聖濟録治腎臟虛冷腰胯酸疼脮膝冷痹夜多小便及夢泄日漸羸瘦面無顔色兼治女人惡露赤白帶下用韭子七升淨揀以醋湯煮千百沸取出焙乾旋炒令作油麻香搗羅為末煉蜜丸如桐子大每服空心溫酒下二十丸加至三十丸治虛極尿精及男子女夢交精便泄出此內虛邪氣感發熱用韭子新者二升十月霜後採以好酒八合浸一宿明日一日色黃童子向南搗萬杵平旦溫酒服方寸七日再服立瘥治夢夫精用蘇子一升熟搗為末酒服方寸匕日再服療虛極尿精用乾膠三兩炙搗為末酒二升和酒服烏金散療虛夢泄精滑不禁用九肋鱉甲不以多少去裙襴淨洗遇燒存性研為細末每服一字用清油小半盞童便小牛盞陳蔥白七寸同煎至七分去蔥白和渣日西時服之須臾得得粘臭汗為度次日進粟米粥忌食他物祕真丹出三因方治作勞用意思夢泄腰背酸疼不能屈伸食不生肌兩腳無力不能行步川烏一兩五味子半兩牡蠣粉同炒烏頭令焦去粉不用右各為末用糯米糊為丸如桐子大每服三十九鹽湯食前下蓮子丹出三因方治真氣虛憊口苦舌乾心常慘戚夜多異夢晝倦怠或夢交通脫白濁小便遺􅅹目暗耳鳴面色黧黑新蓮肉四兩去皮心白龍骨一兩醋炙甘草一分右為末用車前子汁入少麵煮糊為丸如菉豆大每服三十丸用鹽湯或酒送下鹿角散治男子婦人夢交用鹿角三指一撮和酒服之即出鬼精茯苓散治腎氣不能攝精心不能攝念或夢而泄者或不夢而泄者用白茯苓去皮五兩為細末每服五錢用溫酒調下空心食前五度方書言夢泄皆緣腎虛但補腎澀精然未嘗有驗豫嘗論之腎疾三症一者至腎虛不能攝精心不能念夢而泄或不夢而泄此候皆重須大服補藥然人病此者甚少其餘皆心虛忽心熱因心有所感夢故而泄此候差輕人之患者多是此候但服茯苓散自瘥豫纍以拯人皆良驗又有少年氣盛或鰥夫道人強制情欲因念而泄此為無醫凡攝生家多言夢泄甚於房勞此殆不然豫嘗驗之人之病天行未復而房勞者死至於夢寐則未嘗至此因此決然之理但夢寐亦有輕重葛玄真人百補交精丸出華陀中藏經方熟地黃四兩酒浸一宿切焙乾稱山藥二兩五味子六兩去梗杜仲三兩削去粗皮刀銼碎火炒絲肉蓯蓉三兩酒洗切焙乾稱牛膝二兩去蘆銼寸酒浸一宿焙乾稱山茱萸酒浸澤㵼茯苓逺志去心巴戟赤石脂柏子仁微炒另研石膏各一兩火燒令赤出火毒用右蜜丸桐子大空心酒下二十丸男子服之固精丸出孟氏詵詵方治男子精氣不固夢遺白濁精氣自流逺志洗淨去心焙乾一兩石蓮肉一兩晉礬枯過一兩桑螵蛸一兩炒益智湘水浸三宿焙乾一兩真韭子一兩微炒兔絲子二兩酒浸三日乾用舶上茴香一兩用鹽炒去鹽不用右八味為細末以青鹽半兩打糊為丸如桐子大每服五十丸空心用茯苓湯黃蠟煎湯或鹽湯下祕真丹出孟氏詵詵方治夢遺白濁真氣不固等症白龍骨一兩綿黃茋生切焙乾白茯苓大硃砂另研桑螵蛸炒一兩白霜梅肉五錢家韭子三兩舊酒浸一宿搗碎焙乾右為末酒煮麵糊為丸如桐子大空心鹽湯下四十丸兔絲子丸出孟氏詵詵方治丈夫真氣不固隨尿走失不能飲食筋骨痿弱白茯苓熟地黃真龍齒石蓮肉逺志洗取肉各三兩兔絲子四兩如前製右為末用山藥打糊為丸如桐子大每服五十九溫酒鹽湯下仙茅丸出朱氏集驗方固精暖水臟仙茅糯米泔浸三宿一日一換絞取汁赤日乾四兩研為細末白茯苓去皮半夏湯泡七次各二兩茴香鹽炒去鹽各一兩半右為末酒糊為丸如桐子大任意溫酒鹽湯下煮附丸出朱氏集驗方附子八錢重者兩隻去皮臍切作片子酒二升煮熟為度茴香炒木香各五錢葫蘆巴一兩炒右為末酒糊為丸空心溫酒鹽湯下腹痛良薑湯下泄瀉米飲下四十丸養心丹出朱氏集驗方服之能寬神清思全志通神明不老硃砂乳香各二錢半酸棗仁茯苓各五錢右為末棗肉為丸如桐子大空心清淨水吞下十丸出雞蜂刀用果驗效衆妙方出朱氏集驗方蜀醫殿機何同顔方佳甚川吳茱萸破故紙人參火砂炒各一兩北五味子大附子炮鍾乳粉肉豆蔲麵包焙各二兩白茯苓一兩二錢鹿茸炙二兩半兔絲子搗去揀不碎者真酒浸蒸搗三兩右為細末大鉢內滚一二日令勻糯米糊丸桐子大焙乾磁瓶收常存暖處可與八味丸輕服沉香固丸散出朱氏集驗方常服為妙沉香木香茴香丁香烏藥川芎巴戟各者去心各半兩陳皮三錢葫蘆巴四錢右為末鹽湯調下此方得之蜀土用之果驗聚寶丹出衛生家寶方治諸虛男子遺精白濁淋病婦人赤白帶下血崩牡蠣一兩硫黃二錢白石膏五錢白礬三錢另研右為末入鍋子內將白礬蓋四味藥止二斤火煆無煙為度乳細酒糊丸雞頭大空心服每一粒鹽棗子湯下婦人赤白帶下血崩淡竹葉蔥湯下一丸血海泠艾醋湯下一丸無名丹出衛生家寶方保氣守神澀精固陽女人服之有産功效不能具説述其作用非神人不能處之無名以稱其妙因為此名白术一兩洗淨補骨脂二兩微炒川烏二兩泡去皮臍川揀子三兩銼碎微炒白龍骨杵碎細末後入茴香南京舶上者用二殷各兩半炒右為細末酒糊為丸桐子大硃砂為衣每服三十丸或五十丸溫酒鹽湯任下空心日午晚服交泰丸出衛生家寶方寧心養氣定魄安魂療諸虛不足生元氣補精枯髓竭去夜夢鬼邪治男子下元虛救婦人血海冷使人百病不侵四時安泰久服明目耳明夜視如晝石菖蒲一斤去鬚切無灰好酒浸冬三宿夏而宿乳香一兩另研逺志半斤志心浸作上法右為細末用浸藥酒煮糊為丸如桐子大每日空心溫酒下三五十丸王荆公妙香散出衛生家寶方安神祕精定心氣白茯苓茯神逺志去心各五錢人參益智去皮五色龍骨各一兩硃砂一分研甘草一分炙右為末每服二錢空心溫酒糊下既濟丹出衛生家寶方治水火不濟心有所感白濁遺精虛敗腎氣虛不攝精髓入而不治若多服熱藥遂致日增其病腿腳無力日漸羸弱天門冬去心麥門冬去心焙乾澤瀉桑螵蛸蜜炙黃連去鬚海螵蛸蜜炙牡蠣煆龍骨逺志去心雞膍胵炒以上各一兩右為末煉蜜為丸桐子大硃砂為衣服三十丸燈心棗湯吞下食前空心日三服桃仁丸出衛生家寶方治心腎脾俱虛水火不相濟少飲多驚遺溺失精日漸羸瘦桃仁麵炒去皮尖并雙仁石菖蒲茴香蒼术米泔浸一宿去皮葫蘆巴炒陳皮去白以上各一兩右為末酒糊為丸如桐子大每服四十丸空心溫酒鹽湯下固真丹去濟生拔萃方沉香丁香木香茴香炒人參當歸微炒滑石各五錢乳香叧研五錢沒藥叧研五錢乾胭脂另研一半為衣琥珀另研各半兩川山甲焙粉炒半兩代赭石飛水五錢乾蓮肉微炒三錢半木通頭末五錢全蝎微炒五錢燈草三錢桑螵蛸炒二錢半麝香另研二錢半血竭另研以上同川山甲搗半兩腽肭臍一對酒酥炙蛤蚧一對去頭足酥炙火枚草酒蜜炮晚蠶蛾蜻蜓右為末於辰日修合浸蒸飯為丸櫻桃大每服二三丸溫酒送下空心忌豬羊肉蒜羇馬服訖乾壓之呪曰三遍然後服之北海泠泠雪浪如銀三江四海盡入藥中能實骨髓能養精神誅殺鬼魅永保遐齡急急如律令奉敕攝右呪如左固陽丹出御醫院方養氣守神固精壯陽大補益真氣服有非常效驗黑附子三兩炮白龍骨一兩川鳥頭二兩炮補骨脂川楝子舶上茴香各一兩七錢右件六味各修製畢碾為細末酒糊為丸如桐子大每服五寸丸空心食前濕酒下神功七寶丹出御醫院方補益真元固精實髓通暢百脈澤顔色可延年益壽強力壯神腽肭臍黑附子炮鹿茸去毛酥炙各三兩鍾乳粉龍骨各二兩沉香一兩麝香五錢陽起石火燒通赤研二兩右八味同碾為末再入麝香研勻酒煮糊為丸桐子大每服五十丸空心溫酒下西川石刻安腎丸出永類鈴方治真氣虛憊腳膝緩弱夜夢遺精小便頻數青鹽水飛四兩鹿茸去皮酥炙一兩柏子仁擂水澄粉一兩附子炮川烏炮巴戟肉鹽浸肉桂兔絲子淘淨酒蒸蓯蓉酒浸焙韭子微炒葫蘆巴酒炒杜仲薑汁炒去絲破故紙酒炒石棗去核酒蒸蒼术製川楝子肉酒蒸川椒出汗茴香酒炒各二兩甘草炙二兩右為末山藥四兩洗淨同酒煮糊丸桐子大每服八十丸空心鹽湯下黃犬肉丸出永類鈴方治真陽衰憊臍腹冷疼小便頻數夜夢遺精足酸疼腰背俱疼肌體羸弱飲食無味磁石二兩煆水飛川烏炮附子炮桑寄生鹿茸麋茸酒蒸仙茆酒浸蓯蓉酒浸焙葫蘆巴炒各二兩沉香另研青鹽另研陽起石煆另研龍骨生用虎脛骨酥炙覆盆子酒浸各一兩右為細末用黃犬肉二斤以酒蔥茴香煮爛杵和丸桐子大每服七十丸空心鹽湯下七子散治丈夫風虛目暗精氣衰少無子補不足方五味子鍾乳粉牡荆子兔絲子車前子菥蓂子石斛乾地黃薯蕷杜仲鹿茸逺志去心各八錢附子蛇床子芎藭各六錢山茱萸天雄人參茯苓黃茋牛膝各五錢桂心十株蓯蓉十株巴戟天十株右二十四味為散篩酒服方寸匕如不知增至二匕以知為度如病人不能酒者蜜和丸服亦得一方如覆盆子八株求子法一依候房中篇香茸丸滋補精血益養真元治下焦陽竭臍腹絞疼飲食少目視茫茫夜夢鬼交精泄遺失肌肉消瘦鹿茸火燎去毛塗炙麋茸火燎去毛酥塗炙二味各四兩麝香半兩另研沉香五味子白茯苓去皮白龍骨火煆肉蓯蓉酒浸一宿切焙乾五味各一兩右件為細末和勻用熟地黃三兩焙乾令為細末用酒二升熬成膏子拌藥入臼內杵千百下如便更下少酒丸如桐子大每服五十丸溫酒鹽湯任下空心食前麋茸角既濟丸治水火不濟精神恍惚夢寐紛紜陽痿及耳內虛鳴小便白濁遺瀝失精常服使火不上炎而神自清水不下滲而精自固壯陽固氣益血駐顔功效特異麋角一具淨水浸三日括去粗皮鎊為屑盛在磁瓶內銀瓶更佳以牛乳浸一日牛乳耗更添只俟不耗於角屑上乳深於二指乃用大麥只看瓶器大小臨時安頓甑內約厚二寸上置瓶更用忝用大麥周回填實但露瓶口不在火熬一伏時如鍋內若水耗時可旋添真候角屑蒸得細膩如麵相似即去火取出細研别用下藥龍骨山藥人參去蘆頭逺志去心山茱萸石菖蒲硃砂另研五味子全竭艾葉炒去毒以上之十味藥各等分赤石脂巴戟去心附子炮去皮臍補骨脂炮兔絲子酒浸一宿焙天雄炮去皮臍兩以上各三柏子仁另研乾熟地黃洗焙肉蓯蓉酒浸焙以上三味各四兩右件為細末以鹿角膏子和勻搗千下丸桐子大每服一百丸空心溫酒下鹿角膠丸治真氣虛弱下元冷憊臍腹疼痛夜多小便腰腳軟肢體倦怠怔忪恍惚頭目昏暈面多黧黑及耳鳴飲食減少常服補養元陽滋榮氣血駐顔美食肉蓯蓉三兩浸酒煮一宿切焙牛膝二兩酒浸一宿附子泡去皮臍桑寄生兔絲子湯浸去浮皮别用酒浸取軟覆盆子乾地黃洗焙當歸洗焙山藥五味子山茱萸白蒺藜炒肉桂去粗皮以上十二味各三兩川萆薢四兩破故紙炒二兩半柏子仁二兩茴香炒二兩半茯神去木二兩鹿角膠炒焦二兩半右件為細末酒煮糊丸如桐子大每服五十丸空心食前溫酒或鹽湯送下兼治婦人諸疾不足一切冷疾久娠不成髮落面黑溫醋湯下煮鹿角膠法須用兩鍋一鍋常用溫湯難備藥用鹿角不用自死者不以多少三寸許截斷去其粗皮右將鹿角於河內浸七日其水每日一易俟日足洗淨鍋中煮每角五斤用桑白皮半斤楮實一斤舶上硫黃二兩同煮之如水盡即旋添湯及一服時自然已軟或火不相斷未軟再煮一服如軟候冷取出於當風處挂起便可入藥用煮角水濾去諸藥慢火再熬便可為膠世寶丸治下元氣損久積寒冷目暈耳鳴形體羸弱陰痿自汗夜遺精及肺痿喘嗽咯有血怯風畏寒手足冷其一切虛勞氣劣並宜服之附子炮去皮臍牛膝酒浸一宿焙乾肉桂去粗皮白茯苓去皮紅椒五味子茴香炒人參去蘆頭枳殼去穰麩炒熟地黃洗焙以上十味製精淨各稱一兩五錢為末次用精羯羊肉四兩細切肉蓯蓉淨洗二兩細切羊脂二兩細切黃臘二兩細切杏仁二兩細切去皮尖烏梅肉一兩蔥白一兩右件後七味用法酒五升同入銀入器中慢火煮令肉爛研成膏入前藥末一處搗和丸桐子大每服三十丸漸加至四五十丸溫酒或鹽湯送下肺痿咯血煎糯米阿膠湯送下常服補益元氣輕健腰腳實骨髓耐風寒滋養氣血空心食前服韭子丸出楊氏家藏方治水不足氣不升降夢寐遺泄精滑不禁鹿茸火燎去毛酥炙黃色茴香炒補骨脂微炒以上三味各一兩半逺志去心龍骨輕緊者醋淬七次用葫蘆巴炒附子炒去皮臍韭子炒香熟金鈴子捶碎去核麩炒六味各一兩麝香一分另研右件為細末將麝香同研勻酒煮麵糊丸桐子大每服五十丸煎人參白茯苓湯下日三服空心食前既濟固真丹出朱氏集驗方治水火不能既濟精神恍惚頭目昏暗且陽痿隂濕多汗遺瀝失精脾胃虛怯心腎不寧腎水欲升而沃心心火欲降而滋腎水則坎離既濟而協和火不炎上則神自清水不下滲而精自固常服固陽氣溫脾益血北五味子白茯苓附子沉香龍骨蓯蓉酒浸一宿無以鹿茸代酥炙各一兩益智子柏子仁去殼炒補骨脂酸棗仁去殼炒金鈴子去核炒紅椒去目當歸酒浸川芭戟去心各半兩兔絲子酒浸各研一兩半右為細末酒糊丸辰砂三錢為衣桐子大每服五七十丸空心鹽酒任下侍左王郎中鎔傳與右司謝大卿暨服之果是竒絶普濟方卷二百十七
