淡醋湯下陽衰隂痿依全方夏減桂附一半夏春秋三停減一痰去精走全減桂附只服六味地黃丸血虛隂衰熟地黃為君精滑山茱萸為君小便或多或少或赤或黃白茯苓為小便淋澀澤瀉為君心虛腸胃間積食心火盛心火不足牡丹皮為君皮膚燥澀乾山藥為君以上但言為君者其分兩與乾地黃分兩同乾地黃却依立為臣分兩同或曰八味丸久服可為地仙今老者服之而腹痛少者服之而發痛或小便頻數或小便結澀或眼昏精滑泄其故何哉蓋八味修事非失製度非方之罪今貨地黃以絲礬豆豉浸蒸易其欲乾地黃性本涼加以礬石性冷此老人所以腹痛附子多是重三四錢此是漏濫側子大熱有毒此少者所以瘡小便頻數澤瀉生也小便結澀小茱萸不去核也今具八味條事於後地黃生者去土水中浮者為天黃中者為人黃沉者為地黃先將地黃蒸良久天黃人黃搗汁取蒸地黃投其汁中候冷如此齊三爆乾酒浸一宿蒸爆乾山藥竹刀剖去皮布巾掗淨切作片子和皂角刺上爆乾茯苓為末水飛過掠去筋膜爆乾澤寫砍成塊子酒蒸一宿山茱萸酒浸良久取良肉去核每十斤得肉二斤二兩黑附子緊實重七錢鍋內以烈火灰炮製去皮臍牡丹皮去心及粗皮酒浸一宿桂削去外粗皮不可焙右搗為末不可犯銅器如是修合服之而仙復何疑哉久服去附子揀淨五味子代之祕精丸出仁存方治下虛胞寒小便白濁或如米泔或若凝脂腰重少力一名固精丸牡蠣煆兔絲子酒浸蒸焙另研龍骨生用五味子韭子炒白茯苓白石脂煆桑螵蛸酒浸炙各等八右為細末酒糊為丸如桐子大每服七十丸空心鹽湯送下小草湯出危氏方治虛勞憂思過度遺精白濁虛勞不安石蓮肉去皮鹿角霜熟地黃各四兩右為末用黃茋二斤捶捕水六升浸一宿次早按洗味淡去渣內於銀石器中熬汁成膏拌和得所搗數千杵丸如桐子大每服五十丸至百丸米湯溫酒任下空心食前服常服守中安神禁固精血益氣駐顔色延年不老無名丹出名童氏書補虛守神澀精固陽道男子服之有竒功筆難盡述其作用非至神不能處之遂無名可稱之故以無名茅山蒼术一斤不浸入藥臼以麵杵舂令稍滑淨篩去粗皮亦不須過當龍骨一兩另研如粉赤石脂二兩研破故紙三兩微炒川楝子三兩去核微炒用川烏頭大者一兩泡製削去皮臍茴香舶上并京者各一兩微炒用右為細末合和令勻酒煮糊為丸如桐子大硃砂為衣多可百丸少止三十丸食前溫酒或米飲鹽湯下如欲持藥力冷酒下五十丸女人無子服益子一方如逺志蓮肉並去心白茯苓三味各一兩用蘇合香丸酒下一方無赤石脂金鎖丹出余居士選竒方治男子本臟虛冷夜夢鬼交龍骨水飛兔絲子一兩破故紙韭子澤瀉牡蠣各半兩麝香少許右為細末酒糊為丸如桐子大每服三十丸溫酒下空心食前三服永壽丹出御醫院方補氣益精常服百日效蒼术米泔浸一宿一斤天門冬去心八兩熟地黃白茯苓何首烏地骨皮各四兩右為細末蜜丸如桐子大每服五十丸空心溫米湯送下漸加至八十丸神仙固真丹出百一選方治遺精不禁之疾禹餘糧石中黃赤石脂紫石英石燕子五件各一兩炭火煆通紅以米醋三斤滓浸為度龍骨瓦上焙乾火煆牡蠣鹽泥固濟火煆令白各一兩右同為細末以白茯苓四兩人參二兩青鹽一兩為末入無灰酒約度多少打糊和藥為丸以硃砂為衣如芡實大每服服之二丸或三丸用溫酒或鹽湯送下食前空心臨卧服此藥大有功效昔上元尉劉處厚服此竒效還元丹出聖濟總録固精補元氣恱色實丹田木香乾蓮子去心各二兩沉香末天雄長者湯浸一宿久新水又浸兩服去皮臍候乾文武火炮製地坑子內合一服時各一兩半龍骨末研千遍用粗甘草半兩泉水一升飛過更研二兩右為末研勻煮雞子黃和丸如桐子大每服空心新水或溫酒下三十丸五味子丸出御醫院方治肝腎俱虛收凝精氣補隂養陽光悅膚胃進美飲食蛇床子炒兔絲子逺志去心五味子蓯蓉各四兩右為細末酒麵糊為丸如桐子大每服四十丸空心溫酒下金鎖丸出瑞竹堂方治男子婦人滑精鬼交遺泄小便白濁茯神二錢逺志去心三錢五色龍骨三錢煆紅牡蠣四錢左顧者炒赤色堅白茯苓三錢亦作茯神右為細末酒糊為丸如桐子大每服三四十丸空心鹽湯或酒送下腎濁祕精丸治元氣不固及夜夢遺精夢泄方見腎臟門腎虛漏濁遺精類小草黃茋去蘆當歸去蘆酒浸麥門冬去心石斛去根酸棗仁炒去殼各一兩人參甘草炙各半兩右咀每服四錢水一鍾生薑五片煎八分去渣溫服不拘時候金鎖鎮元丹出醫方集成治真氣不足喘促心忪盜汗小便數遺精白濁元臟虛冷目暗耳鳴一切虛損及腎虛瀉四肢怠惰膝腳酸疼白茯苓去皮五味子各八兩補骨脂酒浸炒十兩紫巴戟去心葫蘆巴炒蓯蓉淨洗焙各一斤硃砂另研龍骨各三兩右為細末酒糊為丸如桐子大每服三十丸酒或鹽湯送下鎖金丹一名茴香丸治遺精夢泄關鎖不固舶上茴香葫蘆巴破故紙白龍骨木香胡桃肉羊石子三對切開鹽半兩擦炙熟研如膏右為末以下二味同研成膏和酒浸蒸餅杵熟丸如桐子大每服三十丸空心溫酒下補虛固精丸出聖濟總録補骨脂炒末半兩蓮子心末安息香各一分將安息香化湯為水用無灰酒一升熬膏丹砂研沉香末山茱萸末礬胡蝶枯如粉各半兩右除前膏外細研勻與前藥和丸如桐子大每服十丸煎桃仁酒下空心食前服耆絲丸出三因方治少年色欲過度精血耗竭心腎氣憊遺精白濁腰背痛面色黧色耳目昏聾口乾腳弱消渴及夢與鬼交陽事不舉當歸酒浸焙乾半斤兔絲子酒浸去土乘溫研破焙乾一斤薏苡仁茯神去木治泄精鹿茸一兩桂一尺韭子一升附子二枚半澤瀉一兩右為末每服五錢一日服三服麥冬