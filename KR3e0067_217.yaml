body:
  text: 普濟方卷二百十七明周王朱橚撰諸虛門總論夫人禀中和之氣以生若能保守真元則何由而病不善衛者由思慮役其智嗜慾亂其真而榮衛一虛積微成損積損成衰及其病也既不能御氣以全身又不能為之補餌不亦殆哉葢人之一身腎之液謂之精意有所存謂之志故經曰腎藏精與志也生性之本元氣之根精神之所舎名曰精神故靈樞經曰積精全神者是也人之精而後有神也今人之虛損皆出於心腎其盜汗其白濁之類奚可容乎且心之液自夢中出覺来則汗如雨未㡬便乾此則為盗汗腎之液泄自小便中出停久濁如泔或上有脂油或為夢遺則氣體弱神情倦怠眼目昏花精神脱已焉得而有神哉且心者神藏之腎者精藏之今心既受病則神不守舎日則有怔忡健忘恍惚失志之證夜則有登高涉險火發追捕之夢腎既受於病則髓海枯竭遂有脚氣膝軟精神倦怠體弱夢泄便濁消渇瘦瘁諸虚百損莫不自心腎而言然病既至此尚有不能守節或孳孳於財利或戀戀於色慾傷動坎離漸至沉羸去生逺矣養生之士聞此自當惻然有感於私謹起居節飲食静室有處勿貪富貴勿怨貧賤勿嗜酒色專心服藥治法當以寧心凝神為先次則澁精補腎則疾無不愈矣又有心經有熱心火爍腎水而為赤濁白濁夢泄此又可温補惟當精心學者更宜審焉難經云論損從皮毛至筋骨者此乃辨氣脉淺深次第也原其所由屬不内外或大病未復便合隂陽或疲極筋力饑飽失節盡神度量呌呼走氣所以諸症蠭起百疴交作吐血衂血便血泄血遺血白濁冷滑洞㵼白汗黄汗嘔吐咯啘涎沫痰飲遂使榮衛奔走虛羸損傷皆自此始葢由背於人身常理而致然也况婦人産蓐過於大病虛損尤多不可不知列而論之症狀非一當攷脈尋理推其元氣胃氣資始資成扶助隂陽辨别根本盖不可隨証冷熱交行施治也夫人稟隂陽五行運氣榮衛而保全其身凡一身中或有毫釐疾患無因臟腑虛冷則榮衛不調榮衛不調則疾生矣又况虛冷之疾極又其生其虛陽或手足腰腎眼目口齒三焦六腑值病之亟則各能死人且如左右手三隂三陽十二經脈皆用有胃氣或加之有疾而無胃氣者不問病之輕重斷然不救何謂頓用有胃氣然胃受穀氣生則能生氣血氣血壯則榮衛不衰榮衛不衰則病自去矣如五臟六腑表裏之間皆出自糓氣而相傳授生血氣而灌䕃五臟或氣不足則五臓六腑䕃無所自况加之如憂愁思慮喜怒不常起居勞役飲食不節房事過多衝雪冐霜伏暑觸熱損失耗散則病生焉且如季春季夏季秋季冬一十八日之間脾土於此時王極腎水受剋故當補腎所以心肺肝脾腎各有衰王各有相生相剋如心剋肺肺剋肝肝剋脾脾剋腎腎剋心遇王則以剋之愈甚凢受剋處故冝補然春補脾夏補肺秋補肝冬補心古之贒人平居無病易常用藥法度調䕶脾胃使進飲食而全糓氣凢百皆得其宜如今之庸醫用意皆錯如舉一二而為証然且如腎經衰敗則以天雄附子之類而言補腎且腎屬北方土癸水喜温惡燥返用天雄附子至燥之藥豈能補乎腎邪况腎經虛則乃五臟六腑衰極而漸至於腎則諸病生焉凢下部腎經虛者不必補之至妙之法有二一則補脾䕶胃使進飲食而全糓氣令生氣血所謂者何每日夜子時於北方正候當此之時腎水王極則攝血化精精氣全則丹田自實腎經不虚病自去矣男子則攝血化精女子盈為月事若糓氣不全則氣血不生氣血不生則當夜半子時腎水雖王則血不能償其腎所攝無精所化而丹由不固腎自虚矣以此觀之凢腎經并五臓虛敗醫者罔識源流枉用其法初不能損於病要當先補腎胃後調氣血耳虛損之疾寒熱因虛而感也寒感則損陽陽虚則隂盛故損則自上而下治之宜以辛甘淡過於胃則不可治也感熱則損隂隂虛則陽盛故損則自下而上治之宜以苦甘酸鹹過於脾則不可治也自上而損者一損損於脾故皮聚而毛落二損損於脾故血脈虚熱不能榮於五臟六腑婦人則月水不通而三損損於胃故飲食不為肌膚也自下而損者一損損於腎故骨痿不能起於床二損損於肝故筋骨緩不能自收持三損損於脾故飲食不能消剋也故心肺損則血弊肝腎損則形痿脾胃損則榖不化也損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒温損其肺者緩其中損其腎者益其精此補益之大法也夫人之氣血與天地同流不能無盈虛矣不能無損益矣治療之宜損者益之不足者補之隨其緩急而已是故有平補有峻補或益其氣或益其精或益其血脈或壯其筋骨至以益髭髮駐顔色其治不一要之隨宜適可無不及之患斯為善矣損其腎者益其精四十難曰損其腎者益其精辨云腎有两枚右為命門相火左為腎水同質而異性也夫損者當審損何臟而治之隂陽應象論曰形不足者温之以氣精不足者補之以味乂云氣化精生味和形長無陽則隂無以化當以味補腎真隂之虛隂本既固陽氣自生化成精髓若相火陽精不足宜用辛温之劑世之用辛熱之藥治寒甚之病非補腎經之藥又知腎之惡燥也凢人年四十以上日乆多言以致虛損面色黧黑飲食無味心胸痞滿四肢倦怠肌體餘熱大小便不利治之奈何内經云不可熱補之夫男子腎盧水不足也凢補虚之劑多用烏附天雄之類豈知腎惡燥也女子隂虚血不足也几補虚多以陽劑是以知陽盛而隂虧也不可用性熱之藥也補之虚心可服加减八物湯丸當歸飲子减桂五苓散煩渇加益原名曰淡滲散更服通解丸顯仁丸亦可服之大有神効凢病人虚勞多日無力别無熱症者宜服之可用無比山藥九則愈矣勞倦之疾百脈空虚非滋潤粘膩之物而以養之不能實也又用鹿角膠阿膠牛乳飴糖酥酪煎蜜人參杏仁當歸熟地黄之類正此意也或者妄施伏火金石附子燥熱等輩以致血氣乾涸心腎不交故火炎於上為痰嗽為咯血為口乾為五心煩熱水走於下為脚弱為遺精為赤白濁為小便滑數誤矣哉虚勞之脈大抵多弦或浮大或數皆虚勞之候也大者易治血氣未定可歛而正也弦者難治血氣已耗未易調補之若帯䨇弦則賊邪侵脾此尤難治加數則殆矣補虚固精附論夫腎主水授五臟六腑之精而藏之所謂天一生水在臟為腎本其始也若腎臓衰精氣不固或因溲而出或因聞見而溢或因虚勞漏泄精氣或因邪氣乘虚客於隂為夢皆腎虚也宜補以固之故法宜以澁去脱方沉香保生丸出徳生堂治男子精氣不固餘澁常流小便血濁夢頻數泄出口乾耳鳴腰膝痛隂囊濕癢陽事痿及治婦人血海乆冷胎氣不勝赤白帯漏下男子小便如泔能固精氣益精髓駐顔色安魂定魄延年不老壯陽事婦人暖子宫下元有益沉香母丁香巴㦸去心酒浸蓮蕊木香蓮心兎絲子酒浸葫蘆巴酒浸八角茴香塩炒肉蓯蓉酒浸韮子酒浸紅花各一兩雄蠶蛾一兩二錢川椒一兩净仙靈皮一兩醋炒川山甲炮二両二錢半水蛭糯米炒五錢青鹽五錢細墨五錢燒去油益智仁七錢半牛膝酒浸一両麝香酒浸一両蛤蚧一對别研去蟲生用川棟子一両炒以上二十四味為末川楝子四両搥碎知母一両二錢破故紙一両二錢甘草二両五味子二錢右五味為末用水一斗熬成濃膏和前藥末麵糊為丸如梧桐子大每服五十丸空心酒或鹽湯送下乾物壓之韮子丸出聖惠方治下元虛憊驚夢洩腰膝無力肌體羸顔色痿弱飲食减韮子微炒令香鹿茸去毛塗酥炙令黄色楮實水淘去浮皮亁微炒澤瀉肉蓯蓉酒浸一宿去皺皮炙亁附子炮製去皮臍各一両石斛逺志去心栢子仁桂心去皮牛膝去苗巴㦸川椒去目及閉口者微炒去汗白术薯蕷覆盆子各三分杜仲去粗皮炙㣲黄色黄耆剉狗脊去毛枳殻去穰麩炒蛇床子芎藭五味子亁薑剉製各半両右為末煉蜜為丸和搗三五百杵如梧桐子大每服空心以温酒下三十丸加四十丸為度又方治遺精車前子石菖蒲天門冬枸杞子山茱萸酒浸熟地黄巴㦸兎絲子肉蓯蓉各二両生地黄澤瀉人參白茯苓覆盆子赤石脂栢子仁牛膝花椒各二両地骨皮一両半杜仲三両熟山藥二両右為末煉蜜丸如桐子大每服五十丸鹽湯食前送下大補丸一名大神丸出三因方治元臟虛憊血氣不足白濁遺泄自汗自利口苦舌亁四肢羸痩婦人諸虛皆治之木香炮附子炮去皮臍茴香炒蓯蓉酒浸川椒炒去汗各十両桃仁去皮炙炒胡蘆巴牛膝酒浸巴㦸五味子黄茋白蒺藜炒去刺澤瀉各五両羌活梹榔天麻川芎桂心各二両右為末煉蜜丸如桐子大鹽酒任下三十丸或五十丸空心服葫蘆巴丸出瑞竹堂方治虚損之疾不可醫極能闗鎖精氣升降隂陽功效如神附子炮去皮臍川烏炮去黒皮沉香酸棗仁當歸去蘆川芎栢子仁去殻葫蘆巴巴㦸破故紙微炒龍骨牡蠣煨天雄炮赤石脂鹿茸酥炙茴香各二両澤瀉半両生硫黄一両半用明者佳右為末酒糊丸如桐子大每服五十丸空心鹽湯米飲下日一二凝真丹出仁存方治丈夫三丹不凝結致真氣不固精清滑飲食不美四支怠隋昬因嗜卧上丹不凝結則常多感冐鼻流清涕頭目昬疼右用益智仁二両餅藥搜麵裹煨令麵焦去麫為細末少許搐鼻中乆用清涕自止中丹不凝結則發熱自汗悸驚恍惚徤忘不能飲食右用益智仁二両酸醋三宿焙亁為細末醋煮麵糊為丸如桐子大每服三十丸至五十丸鹽湯吞下下丹不凝結則真氣不固夢遺白濁胸中短氣面黄體虛形瘦瘁情思不樂飲食减少驚悸恍惚右用益智仁四両以鹽水浸三宿焙亁為細末鹽煮麵糊為丸如桐子大每服三十丸至五十丸空心鹽湯吞下不可用酒服恐散真氣玉關丸出醫方大成治諸虛不足膀胱腎經痼敗隂陽不交致多病水欲升而沃心火欲降而温腎是則坎離既濟隂陽協和火不炎而神自清水不滲而精自固能閉精補益永無膏淋白濁遺精之患功効不能盡述辰砂一両鹿茸二両作片酥炙附子七錢重者四箇去皮臍各切下預剜空心中安辰砂在内以前頂子盖定用綿扎之木𤓰大者二箇去皮穰切開頂入硃砂附子四箇在内以木𤓰頂子盖之綿札定爛蒸訖取出附子切片焙亁為末硃砂細研水飛木𤓰研如膏宣𤓰為妙栢子仁炒别研當歸酒浸焙沉香别研巴㦸去心黄茋去蘆蜜浸炙茯神去木川牛膝去蘆酒浸石斛去根酒浸各一両兎絲子水淘净酒浸焙另研蓯蓉酒浸杜仲去粗皮酒浸五味子各一両逺志去心炒二両右為細末用𤓰膏杵和少入酒糊丸如桐子大每服七十丸空心米飲温酒鹽湯任下一方無當歸鎖精丸出瑞竹堂治精滑不禁川獨活川續斷谷精草石蓮肉去榖亁菱米生鷄頭去殻蓮心川揀子酥炙金櫻子𦂳龍骨白茯苓水猪苓小茴香藕節各等分右為細末鷄子清爲丸如桐子大每服四五十丸空心鹽湯送下亁物壓之五味子丸出簡易方理肝腎俱虛收斂精氣補真陽手虚汗益智仁炒蓯蓉酒浸炒川巴㦸去心人參去蘆五味子去梗骨碎補去毛小茴香炒白术覆盆子白龍骨熟地黄酒洗牡蠣兎絲子各等分右等分為末入青鹽同酒煮糊為丸如桐子大每服三十丸空心用鹽湯或酒送下亦可青鹽丸出危氏方補虛益腎氣明目治腰疼及治精滑涎多四肢困乏墨牽牛二両炒別研頭末蒼术切炒黄色杜仲炒㫁絲川烏泡去皮臍川揀子去核山藥去皮紅椒皮炒青鹽别入陳皮去白茴香附子炮去皮臍破故紙炒右等分為末入青鹽同浸酒煮糊丸如桐子大每服三十丸空心鹽湯下龍齒鎮心丹治腎氣不足驚悸徤忘夢寐不安遺精白濁面少光色四肢怠惰足脛酸疼常服益精髓養血氣明視聽悦色駐其顔色龍齒水飛一作龍骨逺志去心炒天門冬去心熟地黄酒浸蒸焙山藥炒各六両茯神去木白者麥門冬車前子白茯苓桂心地骨皮五味子各五両右為末蜜丸桐子大每服三十丸空心温酒米飲任下一方用硃砂為衣芡實丸出仁存方治思慮傷心疲勞傷臂心臂不交精元不固面少光驚悸徤忘夢寐不安小便赤澁遺精白濁足痠疼耳聾目昏口乾脚弱芡實蒸去殻蓮花鬚各二両茯神去木山茱萸取肉龍骨生用五味子枸杞子熟地黄酒蒸焙韮子炒蓯蓉酒浸川牛膝去蘆酒浸焙紫石英煆七次各一両右為細末酒煮山藥糊丸如桐子大每服七十丸空心鹽任下十補丸一名大補丸出仁存方治真氣虛損下焦傷竭臍腹强急腰脚痛亡血盗汗遺精白濁大便自科小便滑數或消渇疾飲食倍常肌肉消瘦顔色枯槁乆服補五臟行榮衛益精髓進飲食附子炮去皮臍亁薑炮桂心去心兎絲子酒浸焙研巴㦸去心厚朴去皮炒薑治逺志去心薑汁浸炒破故紙赤石脂炒川椒炒出汗去子者二両用右為末酒糊丸如桐子大每服三十丸至五十丸空心温酒或鹽湯任下水中金丹出仁存方治氣藏虚不足夢寐隂人走失精氣陽起石木香乳香研青鹽各一両白龍骨一両𦂳者搥捽絹袋盛大豆蒸豆熟取出焙亁研骨碎補炒茴香炒杜仲各半両去皮生薑炙絲盡用佳黄戍腎一對酒一升煮熟切作片子焙白茯苓一両與腎為末右為細末酒麵糊丸如皂子大每服二丸温酒下空心服忌房事九物金鎖丹出聖濟總録治虚損去風閉目精固陽龍齒敗龜扳雄蠶蛾一對巴㦸天去心蓮子心白蓮花葉各半両肉蓯蓉一両雄鷄肝山芋二両右同搗為末麫糊丸如桐子大每服十丸空心温酒下大建中黄茋湯出䆒原方治小腹急疼便溺失精虚熱盜汗且倦怠百節煩疼口苦舌澁心怔氣短日漸羸弱素問腎病傳心筋脈相引而急小腹痛熱出曰液在博云喪去心名為蟲症乃島元不守也若小便澀數日夜無度由脖門不閉水腋不藏因思慮過多心氣散外白芍葯四両綿黄茋蜜炙川當歸洗焙逺志去心用燈草煮澤瀉三両人參龍骨各一両甘草炙両右㕮咀每服四錢水二大種生薑五片煎至八分去渣温服若氣弱甚者加熟附子二両若要疼筋極加官桂一両定齋未病方滋氣養血充益五臟用蓯蓉酒浸一夕肉桂白芍葯甘草人參茯苓鹿茸蜜炙龍骨煆各等分生薑棗煎一名大建中湯聖㑹方治虛勞能益氣補不足用桂心黄茋蜜炙當歸白芍葯白术附子各一両炮熟亁地黄三両甘草五錢木香三分剉散每服四錢水一鍾生薑半分棗三枚煎取六分去渣下飴糖如紅棗大再煎一両沸食前温服名大建中散葉氏方治血氣虚少筋骨不舒身倦力弱心怯痰逆膝疼膝腰軟或失血後虚羸不復常及婦人月水不調帯下腹脇作疼用白芍葯桂心甘草炙黄茋蜜炙當歸酒浸人參白术茯苓逺志去心龍骨各一両澤㵼半両為粗末每服五錢水二盞生薑五片棗三枚煎取一盞臨時入飴糖一匙空心食前服名十味大建中湯補諸虚損滋養榮衛理勞傷虛汗盜汗用黄茋當歸熟地黄各一両人參白术白茯苓白附子酒浸製去皮五味子石斛剉酒浸半日炒牛膝酒浸蓯蓉薏苡仁白芍葯桂心各一両甘草炙三分為粗末每服三錢水一大盞半薑五片棗三枚小麥數粒煎七分去渣空心服名十五味大建中湯實齋方虚勞厭煩心怔口苦咽亁咳嗽五心煩熱用黄耆去蘆白术人參枳殻去穣前胡各三分杏仁去皮尖銀州柴胡白茯苓當歸川芎半夏湯泡七次甘草炙黄芩白芍葯羚羊角生地黄乾者麥門冬去心各二分為散每四錢水一大盞半薑四片煎八分去渣食後日二服各十七味名大建中湯衛生家寳方理補虛勞氣補倦骨疼羸廋少力心松胸滿痞悶不食及婦人血氣風勞月水不調服之令人有子如患氣塊立得消化神効用黄茋蜜炙官桂秦芃肉豆蔲煨柴胡荆芥白芷川芎鱉甲醋炙桔梗各二両當歸莪术炮麥門冬去心白芍葯人參去蘆茯苓甘草炙木香酸棗仁炒海桐皮枳殻去穰煨亁地黄各二両沉香梹榔各半両為細末每二錢半水一盞薑三片烏梅二箇煎至七分温服如覺臟腑冷即空心熱服小便多食後臨卧時服名二十四味建中湯太乙金鎖丹出聖濟總録治精氣不固諸虚百損鍾乳粗搗净淘淡竹葉地榆五錢剉同入炒銚内水煮一服時取乳食净淘净研細水飛取細者不住手研三日研無聲如麫焙取二両芡實和殻暴乾大豆黄卷微炒巴㦸天去心附子炮製去皮臍補骨脂炒熟鹿茸去毛塗酥炙各一両肉蓯蓉酒浸一夕切爛蒸再成膏三両右除膏外搗羅為末入蓯蓉膏搗千百下如鞭硬入煉蜜同搗丸桐子大每服十丸空心卧時鹽温酒送下一月精秘還元補腦面目光潤精神而爽百日肌膚充悦鬚髪光潤諸氣及積年傷憊疼冷疾皆愈常服補氣延年韮子丸出聖濟總録治秘精補脾元强志解虛煩韮子微炒巴㦸天去心桑螵蛸剉炒兎絲子酒浸另研牛膝酒浸焙牡蠣左旋者煨各一両亁薑炮五錢亁熟地黄一両右為末醋煮糊和丸如桐子大空心鹽湯下二十丸八味丸一名腎氣丸出仁存方治腎氣虛乏下元冷憊心火上炎渇欲飲水腎水不能攝養多吐痰唾及脾虛不得制腎水多吐痰唾而不咳者臍腹疼痛夜旋弱脚膝緩弱而倦怠面色痿黄或黧黑及虚勞不足渇欲飲水腰疼重小便不利脚氣上攷小腹不仁男子消渴小便多婦人轉胞小便不通並皆治之久服壯陽益精活血駐顔色强志輕身脾惡濕腎惡燥如硫黄附子鐘乳煉丹類皆剛劑也用以助陽補接真氣則可若補腎則正腎所惡者古人製方益腎皆滋潤之藥故仲景以八味丸本之腎氣丸以地黄為主正補腎經也附子為佐以助脾元也熟地黄八兩山藥山茱萸各四両肉桂去皮二両牡丹皮澤瀉各三両附子炮二両白茯苓去皮三両右為細末煉蜜為丸如桐子大每服五十丸温酒送下或湯亦得空服食前婦人淡醋湯下陽衰隂痿依全方夏减桂附一半夏春秋三停减一痰去精走全减桂附只服六味地黄丸血虛隂衰熟地黄為君精滑山茱萸為君小便或多或少或赤或黄白茯苓為小便淋澁澤瀉為君心虚腸胃間積食心火盛心火不足牡丹皮為君皮膚燥澁亁山藥為君以上但言為君者其分両與亁地黄分両同亁地黄却依立為臣分両同或曰八味丸久服可為地仙今老者服之而腹痛少者服之而發痛或小便頻數或小便結澁或眼昏精滑泄其故何哉盖八味修事非失製度非方之罪今貨地黄以絲礬豆豉浸蒸易其欲亁地黄性本涼加以礬石性冷此老人所以腹痛附子多是重三四錢此是漏濫側子大熱有毒此少者所以瘡小便頻數澤瀉生也小便結澁小茱萸不去核也今具八味條事於後地黄生者去土水中浮者為天黄中者為人黄沉者為地黄先將地黄蒸良久天黄人黄搗汁取蒸地黄投其汁中候冷如此齊三爆乾酒浸一宿蒸爆亁山藥竹刀剖去皮布巾掗净切作片子和皂角刺上爆亁茯苓為末水飛過掠去筋膜爆亁澤寫砍成塊子酒蒸一宿山茱萸酒浸良久取良肉去核每十斤得肉二斤二両黑附子𦂳實重七錢鍋内以烈火灰炮製去皮臍牡丹皮去心及粗皮酒浸一宿桂削去外粗皮不可焙右搗為末不可犯銅器如是修合服之而仙復何疑哉久服去附子揀浄五味子代之秘精丸出仁存方治下虛胞寒小便白濁或如米泔或若凝脂腰重少力一名固精丸牡蠣煆兎絲子酒浸蒸焙另研龍骨生用五味子韮子炒白茯苓白石脂煆桑螵蛸酒浸炙各等八右為細末酒糊為丸如桐子大毎服七十丸空心鹽湯送下小草湯出危氏方治虛勞憂思過度遺精白濁虚勞不安石蓮肉去皮鹿角霜熟地黄各四両右為末用黄茋二斤搥捕水六升浸一宿次早按洗味淡去渣内於銀石噐中熬汁成膏拌和得所搗數千杵丸如桐子大每服五十丸至百丸米湯温酒任下空心食前服常服守中安神禁固精血益氣駐顔色延年不老無名丹出名童氏書補虛守神澁精固陽道男子服之有竒功筆難盡述其作用非至神不能處之遂無名可穪之故以無名茅山蒼术一觔不浸入藥臼以麫杵舂令稍滑净篩去粗皮亦不須過當龍骨一両另研如粉赤石脂二両研破故紙三両㣲炒川楝子三両去核微炒用川烏頭大者一両泡製削去皮臍茴香舶上并京者各一両微炒用右為細末合和令匀酒煮糊為丸如桐子大硃砂為衣多可百丸少止三十丸食前温酒或米飲鹽湯下如欲持藥力冷酒下五十丸女人無子服益子一方如逺志蓮肉並去心白茯苓三味各一両用蘇合香丸酒下一方無赤石脂金鎖丹出余居士選竒方治男子本臟虛冷夜夢鬼交龍骨水飛兎絲子一両破故紙韮子澤瀉牡蠣各半両麝香少許右為細末酒糊為丸如桐子大每服三十丸温酒下空心食前三服永壽丹出御醫院方補氣益精常服百日効蒼术米泔浸一宿一斤天門冬去心八両熟地黄白茯苓何首烏地骨皮各四両右為細末蜜丸如桐子大每服五十丸空心温米湯送下漸加至八十丸神仙固真丹出百一選方治遺精不禁之疾禹餘糧石中黄赤石脂紫石英石燕子五件各一両炭火煆通紅以米醋三斤滓浸為度龍骨瓦上焙亁火煆牡蠣鹽泥固濟火煆令白各一両右同為細末以白茯苓四両人參二両青鹽一両為末入無灰酒約度多少打糊和藥為丸以硃砂為衣如芡實大每服服之二丸或三丸用温酒或鹽湯送下食前空心臨卧服此藥大有功効昔上元尉劉處厚服此竒効還元丹出聖濟總録固精補元氣恱色實丹田木香亁蓮子去心各二両沉香末天雄長者湯浸一宿乆新水又浸両服去皮臍候乾文武火炮製地坑子内合一服時各一両半龍骨末研千遍用粗甘草半両泉水一升飛過更研二両右為末研匀煮鷄子黄和丸如桐子大每服空心新水或温酒下三十丸五味子丸出御醫院方治肝腎俱虛收凝精氣補隂養陽光悦膚胃進美飲食蛇床子炒兎絲子逺志去心五味子蓯蓉各四両右為細末酒麫糊為丸如桐子大每服四十丸空心温酒下金鎖丸出瑞竹堂方治男子婦人滑精鬼交遺泄小便白濁茯神二錢逺志去心三錢五色龍骨三錢煆紅牡蠣四錢左顧者炒赤色堅白茯苓三錢亦作茯神右為細末酒糊為丸如桐子大每服三四十丸空心鹽湯或酒送下腎濁秘精丸治元氣不固及夜夢遺精夢泄方見腎臟門腎虛漏濁遺精類小草黄茋去蘆當歸去蘆酒浸麥門冬去心石斛去根酸棗仁炒去殻各一両人參甘草炙各半両右咀每服四錢水一鍾生薑五片煎八分去渣温服不拘時候金鎖鎮元丹出醫方集成治真氣不足喘促心忪盗汗小便數遺精白濁元臟虚冷目暗耳鳴一切虛損及腎虚瀉四肢怠惰膝脚酸疼白茯苓去皮五味子各八両補骨脂酒浸炒十両紫巴㦸去心葫蘆巴炒蓯蓉净洗焙各一斤硃砂另研龍骨各三両右為細末酒糊為丸如桐子大每服三十丸酒或鹽湯送下鎖金丹一名茴香丸治遺精夢泄關鎖不固舶上茴香葫蘆巴破故紙白龍骨木香胡桃肉羊石子三對切開鹽半両擦炙熟研如膏右為末以下二味同研成膏和酒浸蒸餅杵熟丸如桐子大每服三十丸空心温酒下補虛固精丸出聖濟總録補骨脂炒末半両蓮子心末安息香各一分將安息香化湯為水用無灰酒一升熬膏丹砂研沉香末山茱萸末礬胡蝶枯如粉各半両右除前膏外細研匀與前藥和丸如桐子大每服十丸煎桃仁酒下空心食前服耆絲丸出三因方治少年色慾過度精血耗竭心腎氣憊遺精白濁腰背痛面色黧色耳目昏聾口亁脚弱消渇及夢與鬼交陽事不舉當歸酒浸焙亁半斤兎絲子酒浸去土乘温研破焙乾一斤薏苡仁茯神去木治泄精鹿茸一両桂一尺韭子一升附子二枚半澤瀉一両右為末每服五錢一日服三服麥冬散治小便失精及夢失精韭子二升麥門冬三合兎絲子三両車前子澤瀉各六両右搗下節每服方寸匕酒調下日三夜一服一方云加龍骨四分芎藭八分服之佳玊真丸補中安神定魄去風濕勞氣治脚腰膝固元黒髭髪悦顔色龍骨搗羅水飛三遍重絹細研去水亁入熟絹袋盛縫各置五斗米下炊一遍乾重研細兔絲子酒浸一宿酒煮一日令爛去酒搗爛焙亁為末各八両鹿茸新嫩帯血去毛酥炙六両韭子净捒微炒四両五錢右為末煉白蜜和搗千下丸如小豆大每日温酒下七九日再服之補骨脂丸治夢泄補骨脂炒四両龍骨山茱萸巴㦸天去心各一両右為末煉蜜丸如桐子大每服空心或鹽湯酒下三十丸玊鎖丹治精血虚滑或遺而泄夢而脱不能得禁兼濇精養氣壯陽亦治夢遺漏精龍骨蓮花蕊芡實烏梅肉各等分右為末蒸山藥去皮研如膏和丸小豆大每服空心進三十丸米一方用温酒鹽湯下四精丸治思慮作勞損傷心氣遺泄脱精小便頻數此方主之白茯苓秋石各四両石蓮肉去殻皮心水鷄首生池沼中粉紅花結子埀下各二両右為末以蒸棗肉杵和為丸如桐子大每服三十丸鹽湯下或酒下金鎖丹治男子腎氣虛損夜夢鬼交精漏自出小便白濁方見虛勞門失精類摶金散治脱精自泄方見腎臟門腎虛漏濁遺精類秘精丹靈砂水飛龍骨火煆各飛一両縮砂仁訶子最小者熱灰畧炮取出搥取肉各五錢右為末糯米糊為丸如菉豆大每服十丸十五丸至二十三十丸早晨温酒下臨卧熟水下一方鹽酒下鄭府朱保義方靈砂二両陽起石一両火煆牡蠣雌雄各半両火煆飛砂仁一両訶子肉一両白茯苓五錢麥門冬去心二錢半以糯米飯丸空心酒下十丸臨卧冷水下五丸要通吃葱茶半盞無陽起石以龍骨代之名秘元丹龍骨散治男子失精方見虛勞門虚勞失精類鷄清丸治男子婦人精滑下元虛冷及疝氣症婦人經不調大人小兒皆可服之川獨活榖精草續斷茵陳各等分右為細末鷄清為丸如桐子大每服五十丸空心温酒送下以亁物壓之保神丹壯氣養精謂和心腎白术去皮半斤鹿茸酥和炙四両栢子仁四両右為末用菖蒲末四両酒蒸作薄膏加白麫四両熬成膏子和如硬再入熟蜜六錢丸如桐子大每服五十丸温酒食前服両砂丸補元養精令人少病半夏切作片子龍骨研末木猪苓切作片子各六両右先用用薑一斤切作片子換熱水洗半夏七次去生薑不用只將半夏一味木猪苓同一處拌匀炒候㣲亁碾破半夏為末用無灰酒麫糊為丸如桐子大用銀酒鍾炒藥丸子用木灰五升砂藥丸子不犯鐵器用磁罐一箇只用龍骨養藥丸子揀去木猪苓每日空心五十丸用生薑湯送下覺手足温暖住服秘真丹丸治腎水真隂本虛心火在陽過甚心有所欲速於動應之於腎疾於施泄此藥秘固真元降心火益腎水蓮花蕊益智各一両甘草炙黄栢各三両砂仁白茯苓去皮各五錢半夏木猪苓去皮各二錢半右搗為細末水浸蒸餅丸如桐子大每服五十丸空心温酒下鎖陽丹治脱精泄不禁方見腎臟門腎虛漏濁遺精類茯苓散治泄精方見腎臟門腎虚㵼濁遺精類秘真丹治思想無窮所願不協意淫於外作勞筋絶發為筋痿及白濁遺溲而下故為勞弱羊脛骨灰燒紅窨殺三両硃砂一両厚朴三両薑汁炒右為末用糊為丸如桐子大每服五十丸空心温酒下食前三仙丸治夢泄方見腎臓門腎虛遺精類治心腎不足漏精遺澁白术六両石菖蒲一寸九節者去毛四両破故紙入燒酒炒三両右為細末煉蜜丸如桐子大每服五十丸空心温酒鹽湯任下或加舶上茴香二両炒用天雄散治夢交接泄精及溺白濁尿精如泔汁及小便前後如鼻涕或有餘瀝沔衣此内傷虚絶方見虛弱門虛勞失精類治男子精常自出或聞見所如或動以發此皆腎氣乏少不能禁治巴㦸天石斛黄茋各等分右為細末每服二錢日三治男子夢交泄精由内邪所感龍骨三両石斛二両韭子五合右搗末每服方寸匕日三服固陽丹治夢泄兎絲子一両酒浸七日焙亁水淘净杜仲一両蜜炙薯蕷二両右為細末酒煮麫糊為丸如桐子大每服五十丸温酒鹽湯下空心食前任服清心丹丸出危氏方治經絡熱夢漏心忪恍惚膈熱黄蘖皮好者一両腦子一錢右為細末同研勻煉蜜丸如桐子大每服十丸至十五丸濃煎麥門冬湯下大智禪師方夢遺不可全作冷亦有經絡熱而得也煨腎附子散出聖濟總録治腎臟虚憊遺精盜汗夢交豶猪腎一隻附子末一錢右將豶猪腎批開入附子末濕紙裹煨熱空心稍熱服即飲酒一盞送下神効散出聖濟總録治夢泄白茯苓出黑皮一両猪苓去皮二錢右以水同煑合宜去猪苓將茯苓焙亁搗羅為散每服一錢温酒調下空心夜卧各一服半夏丸一名猪苓丸出聖濟總録治因多飲夢泄除痰和胸膈及滑精方見腎臟門腎虛漏遺精黄甘丸一名清心丸出聖濟總録治積熱自戕致夢泄黄蘖去粗皮甘草等分右生搗羅為末入腦子煉蜜和丸如桐子大每服二十丸空心夜卧熱水或門冬湯下破故紙散出醫方集成治丈夫元氣虚憊精氣不固餘瀝常流常白濁夢寐頻泄及婦人血海乆冷白帯白濁白淫下部濕小便如米泔或無子息方見腎臓門腎虛濁漏遺精類雙補丸出濟生方治精氣不足腎水涸燥咽亁多渇耳鳴頭暈目昏面色黧黑腰膝疼痛脚膝酸弱屡服藥不得全者兎絲子淘净酒蒸擂各二両五味子一両右為末煉蜜丸如桐子大每服七十丸空心鹽湯或酒送下鹿兎丸出濟生方固精氣補腎水生鹿角鎊一両兎絲子水淘酒蒸擂二両右為末酒糊為丸如桐子大每服七十丸空心食前鹽酒或湯任下心腎丸治心腎不足精少血燥心下煩熱怔忡不安口亁生瘡目赤頭暈小便赤濁五心煩熱夕渇飲水乃精血虛不受峻補悉宜服之兎絲子酒浸蒸二両麥門冬去心二両右為細末煉蜜為丸如桐子大每服七十丸空心食前鹽湯下固真散出聖惠方治纔着即泄精白龍骨一両韮子一合右為末每服二錢匕酒調空心服此二味藥性大能澀精固氣暖下元益元丸出仁存方暖精氣益元陽龍骨逺志右各等分為末用蜜丸桐子大每服三四十丸空心卧時冷水下二聖散出瑞竹堂方治失精漏泄乆虚蓮子心一撮砂右為細末每服二錢空心白水調下白元方出仁存方治元氣虚冷精滑不禁大便滑泄瀉手足冷陽起石火煆紅研鍾乳粉各両右為末酒煑附子糊丸桐子大每服五十丸空心米飲下羊脛灰丸一名理脾丸凡精遺泄只治小腎未有安者法當治脾此藥効盖思慮傷脾脾不攝精遂致白濁出危氏方内厚朴去皮取肉畧使薑汁製為末二両羊脛炭火煆過通紅取出窨殺另研如粉一両右為末糊丸桐子大每服百丸至三百丸空心米飲下枸杞丸補精氣枸杞子冬採者佳黄精右為細末二味相各搗成塊㩇作餅子亁復搗末蜜丸如桐子大每服五十丸空心温酒下治失精清有血父蛾二枚隂乾黑參剉碎少許右同為末以汁米調日一服令盡黄蓍散治男子精血出黄茋一錢桂心二分右為散酒服一錢日三治遺精白濁方赤芍葯猪苓各一両右用黄臘二両溶汁和藥丸如桐子大每服五六十丸空心鹽湯下神仙補益固真丸一名固真丹治元臟虚損日乆及小腸腎膀胱疝氣五般淋病精滑精漏小便白濁并婦人赤白帶漏下血崩子宫乆冷血海虚冷等症宜服出百一選方用蒼术洗去泥土乾米泔水浸遂日易泔春五日夏三日秋七日冬十日切作片子焙亁稱一片分作四處四両用小茴香青鹽五分同炒黄色為度一方只用茴香炒四両用川烏頭切作片子重五錢川揀子一両重去皮併核炒黄色為度一方只用川川揀子炒四両用酒半斤升醋半斤煮三十来次一方用青鹽炒四両用川掓一両重去核破故紙一両同炒黄色為度一方只用川掓炒共一處為細末用酒醋打糊為丸如桐子大每服二十丸空心鹽湯或酒送下婦人醋湯下此藥性温無毒小便頻數為効韭子丸出聖濟録治腎臟虚冷腰胯酸疼脮膝冷痹夜多小便及夢泄日漸羸瘦面無顔色兼治女人惡露赤白帶下用韭子七升浄揀以醋湯煑千百沸取出焙亁旋炒令作油麻香搗羅為末煉蜜丸如桐子大每服空心温酒下二十丸加至三十丸治虛極尿精及男子女夢交精便泄出此内虚邪氣感發熱用韭子新者二升十月霜後採以好酒八合浸一宿明日一日色黄童子向南搗萬杵平旦温酒服方寸七日再服立瘥治夢夫精用蘇子一升熟搗為末酒服方寸匕日再服療虚極尿精用亁膠三両炙搗為末酒二升和酒服烏金散療虛夢泄精滑不禁用九肋鱉甲不以多少去裙襴浄洗遇燒存性研為細末每服一字用清油小半盞童便小牛盞陳葱白七寸同煎至七分去葱白和渣日西時服之須臾得得粘臭汗為度次日進粟米粥忌食他物秘真丹出三因方治作勞用意思夢泄腰背酸疼不能屈伸食不生肌兩脚無力不能行步川烏一両五味子半両牡蠣粉同炒烏頭令焦去粉不用右各為末用糯米糊為丸如桐子大每服三十九鹽湯食前下蓮子丹出三因方治真氣虚憊口苦舌亁心常慘慽夜多異夢晝倦怠或夢交通脫白濁小便遺􅅹目暗耳鳴面色黧黑新蓮肉四両去皮心白龍骨一両醋炙甘草一分右為末用車前子汁入少麫煑糊為丸如菉豆大每服三十丸用鹽湯或酒送下鹿角散治男子婦人夢交用鹿角三指一撮和酒服之即出鬼精茯苓散治腎氣不能攝精心不能攝念或夢而泄者或不夢而泄者用白茯苓去皮五両為細末每服五錢用温酒調下空心食前五度方書言夢泄皆縁腎虚但補腎澀精然未嘗有驗予嘗論之腎疾三症一者至腎虚不能攝精心不能念夢而泄或不夢而泄此候皆重須大服補藥然人病此者甚少其餘皆心虚忽心熱因心有所感夢故而泄此候差輕人之患者多是此候但服茯苓散自瘥予累以拯人皆良驗又有少年氣盛或鰥夫道人强制情慾因念而泄此為無醫凡攝生家多言夢泄甚於房勞此殆不然予嘗驗之人之病天行未復而房勞者死至於夢寐則未嘗至此因此决然之理但夢寐亦有輕重葛𤣥真人百補交精丸出華陀中藏經方熟地黄四両酒浸一宿切焙乾稱山藥二両五味子六両去梗杜仲三両削去粗皮刀剉碎火炒絲肉蓯蓉三両酒洗切焙亁稱牛膝二両去蘆剉寸酒浸一宿焙亁稱山茱萸酒浸澤㵼茯苓逺志去心巴㦸赤石脂栢子仁㣲炒另研石膏各一両火燒令赤出火毒用右蜜丸桐子大空心酒下二十丸男子服之固精丸出孟氏詵詵方治男子精氣不固夢遺白濁精氣自流逺志洗净去心焙亁一両石蓮肉一両晉礬枯過一両桑螵蛸一両炒益智湘水浸三宿焙亁一両真韭子一両微炒兎絲子二両酒浸三日亁用舶上茴香一両用鹽炒去鹽不用右八味為細末以青鹽半両打糊為丸如桐子大每服五十丸空心用茯苓湯黄蠟煎湯或鹽湯下秘真丹出孟氏詵詵方治夢遺白濁真氣不固等症白龍骨一両綿黄茋生切焙乾白茯苓大硃砂另研桑螵蛸炒一両白霜梅肉五錢家韭子三両舊酒浸一宿搗碎焙亁右為末酒煑麫糊為丸如桐子大空心鹽湯下四十丸兎絲子丸出孟氏詵詵方治丈夫真氣不固隨尿走失不能飲食筋骨痿弱白茯苓熟地黄真龍齒石蓮肉逺志洗取肉各三両兎絲子四両如前製右為末用山藥打糊為丸如桐子大每服五十九温酒鹽湯下仙茅丸出朱氏集驗方固精暖水臟仙茅糯米泔浸三宿一日一換絞取汁赤日乾四両研為細末白茯苓去皮半夏湯泡七次各二両茴香鹽炒去鹽各一両半右為末酒糊為丸如桐子大任意温酒鹽湯下煑附丸出朱氏集驗方附子八錢重者両隻去皮臍切作片子酒二升煑熟為度茴香炒木香各五錢葫蘆巴一両炒右為末酒糊為丸空心温酒鹽湯下腹痛良薑湯下泄瀉米飲下四十丸養心丹出朱氏集驗方服之能寛神清思全志通神明不老硃砂乳香各二錢半酸棗仁茯苓各五錢右為末棗肉為丸如桐子大空心清浄水吞下十丸出鷄蜂刀用果驗効衆妙方出朱氏集驗方蜀醫殿機何同顔方佳甚川呉茱萸破故紙人參火砂炒各一両北五味子大附子炮鍾乳粉肉豆蔲麫包焙各二両白茯苓一両二錢鹿茸炙二両半兎絲子搗去揀不碎者真酒浸蒸搗三両右為細末大鉢内滚一二日令勻糯米糊丸桐子大焙亁磁缾收常存暖處可與八味丸輕服沉香固丸散出朱氏集驗方常服為妙沉香木香茴香丁香烏藥川芎巴㦸各者去心各半両陳皮三錢葫蘆巴四錢右為末鹽湯調下此方得之蜀土用之果驗聚寳丹出衛生家寳方治諸虚男子遺精白濁淋病婦人赤白帶下血崩牡蠣一両硫黄二錢白石膏五錢白礬三錢另研右為末入鍋子内將白礬盖四味藥止二斤火煆無煙為度乳細酒糊丸鷄頭大空心服每一粒鹽棗子湯下婦人赤白帯下血崩淡竹葉葱湯下一丸血海泠艾醋湯下一丸無名丹出衛生家寳方保氣守神澀精固陽女人服之有産功效不能具説述其作用非神人不能處之無名以稱其妙因為此名白术一両洗浄補骨脂二両微炒川烏二両泡去皮臍川揀子三両剉碎微炒白龍骨杵碎細末後入茴香南京舶上者用二殷各両半炒右為細末酒糊為丸桐子大硃砂為衣每服三十丸或五十丸温酒鹽湯任下空心日午晩服交泰丸出衛生家寳方寧心養氣定魄安魂療諸虚不足生元氣補精枯髓竭去夜夢鬼邪治男子下元虚救婦人血海冷使人百病不侵四時安泰乆服明目耳明夜視如晝石菖蒲一觔去鬚切無灰好酒浸冬三宿夏而宿乳香一両另研逺志半觔志心浸作上法右為細末用浸藥酒煑糊為丸如桐子大每日空心温酒下三五十丸王荆公妙香散出衛生家寳方安神秘精定心氣白茯苓茯神逺志去心各五錢人參益智去皮五色龍骨各一両硃砂一分研甘草一分炙右為末每服二錢空心温酒糊下既濟丹出衛生家寳方治水火不濟心有所感白濁遺精虛敗腎氣虚不攝精髓入而不治若多服熱藥遂致日増其病腿脚無力日漸羸弱天門冬去心麥門冬去心焙乾澤瀉桑螵蛸蜜炙黄連去鬚海螵蛸蜜炙牡蠣煆龍骨逺志去心鷄膍胵炒以上各一両右為末煉蜜為丸桐子大硃砂為衣服三十丸燈心棗湯吞下食前空心日三服桃仁丸出衞生家寳方治心腎脾俱虚水火不相濟少飲多驚遺溺失精日漸羸瘦桃仁麫炒去皮尖并雙仁石菖蒲茴香蒼术米泔浸一宿去皮葫蘆巴炒陳皮去白以上各一両右為末酒糊為丸如桐子大每服四十丸空心温酒鹽湯下固真丹去濟生㧞萃方沉香丁香木香茴香炒人參當歸㣲炒滑石各五錢乳香叧研五錢沒藥叧研五錢亁臙脂另研一半為衣琥珀另研各半両川山甲焙粉炒半両代赭石飛水五錢亁蓮肉微炒三錢半木通頭末五錢全蝎微炒五錢燈草三錢桑螵蛸炒二錢半麝香另研二錢半血竭另研以上同川山甲搗半両腽肭臍一對酒酥炙蛤蚧一對去頭足酥炙火枚草酒蜜炮晩蠶蛾蜻蜓右為末於辰日修合浸蒸飯為丸櫻桃大每服二三丸温酒送下空心忌猪羊肉蒜羇馬服訖乾壓之呪曰三遍然後服之北海泠泠雪浪如銀三江四海盡入藥中能實骨髓能養精神誅殺鬼魅永保遐齡急急如律令奉勅攝右呪如左固陽丹出御醫院方養氣守神固精壯陽大補益真氣服有非常効驗黑附子三両炮白龍骨一両川鳥頭二両炮補骨脂川楝子舶上茴香各一両七錢右件六味各修製畢碾為細末酒糊為丸如桐子大每服五寸丸空心食前濕酒下神功七寳丹出御醫院方補益真元固精實髓通暢百脈澤顔色可延年益壽強力壯神腽肭臍黑附子炮鹿茸去毛酥炙各三両鍾乳粉龍骨各二両沉香一両麝香五錢陽起石火燒通赤研二両右八味同碾為末再入麝香研勻酒煑糊為丸桐子大每服五十丸空心温酒下西川石刻安腎丸出永類鈴方治真氣虚憊脚膝緩弱夜夢遺精小便頻數青鹽水飛四両鹿茸去皮酥炙一両栢子仁擂水澄粉一両附子炮川烏炮巴㦸肉鹽浸肉桂兎絲子淘净酒蒸蓯蓉酒浸焙韭子㣲炒葫蘆巴酒炒杜仲薑汁炒去絲破故紙酒炒石棗去核酒蒸蒼术製川楝子肉酒蒸川椒出汗茴香酒炒各二両甘草炙二両右為末山藥四両洗浄同酒煑糊丸桐子大每服八十丸空心鹽湯下黄犬肉丸出永類鈴方治真陽衰憊臍腹冷疼小便頻數夜夢遺精足酸疼腰背俱疼肌體羸弱飲食無味磁石二両煆水飛川烏炮附子炮桑寄生鹿茸麋茸酒蒸仙茆酒浸蓯蓉酒浸焙葫蘆巴炒各二両沉香另研青鹽另研陽起石煆另研龍骨生用虎脛骨酥炙覆盆子酒浸各一両右為細末用黄犬肉二觔以酒葱茴香煑爛杵和丸桐子大每服七十丸空心鹽湯下七子散治丈夫風虚目暗精氣衰少無子補不足方五味子鍾乳粉牡荆子兎絲子車前子菥蓂子石斛亁地黄薯蕷杜仲鹿茸逺志去心各八錢附子蛇床子芎藭各六錢山茱萸天雄人參茯苓黄茋牛膝各五錢桂心十株蓯蓉十株巴㦸天十株右二十四味為散篩酒服方寸匕如不知増至二匕以知為度如病人不能酒者蜜和丸服亦得一方如覆盆子八株求子法一依候房中篇香茸丸滋補精血益養真元治下焦陽竭臍腹絞疼飲食少目視茫茫夜夢鬼交精泄遺失肌肉消瘦鹿茸火燎去毛塗炙麋茸火燎去毛酥塗炙二味各四両麝香半両另研沉香五味子白茯苓去皮白龍骨火煆肉蓯蓉酒浸一宿切焙亁五味各一両右件為細末和勻用熟地黄三両焙亁令為細末用酒二升熬成膏子拌藥入臼内杵千百下如便更下少酒丸如桐子大每服五十丸温酒鹽湯任下空心食前麋茸角既濟丸治水火不濟精神恍惚夢寐紛紜陽痿及耳内虛鳴小便白濁遺瀝失精常服使火不上炎而神自清水不下滲而精自固壯陽固氣益血駐顔功効特異麋角一具浄水浸三日括去粗皮鎊為屑盛在磁缾内銀缾更佳以牛乳浸一日牛乳耗更添只俟不耗於角屑上乳深於二指乃用大麥只看缾器大小臨時安頓甑内約厚二寸上置缾更用忝用大麥周回填實但露缾口不在火熬一伏時如鍋内若水耗時可旋添真候角屑蒸得細膩如麫相似即去火取出細研别用下藥龍骨山藥人參去蘆頭逺志去心山茱萸石菖蒲硃砂另研五味子全竭艾葉炒去毒以上之十味藥各等分赤石脂巴㦸去心附子炮去皮臍補骨脂炮兎絲子酒浸一宿焙天雄炮去皮臍両以上各三栢子仁另研亁熟地黄洗焙肉蓯蓉酒浸焙以上三味各四両右件為細末以鹿角膏子和勻搗千下丸桐子大每服一百丸空心温酒下鹿角膠丸治真氣虛弱下元冷憊臍腹疼痛夜多小便腰脚軟肢體倦怠怔忪恍惚頭目昏暈面多黧黑及耳鳴飲食減少常服補養元陽滋榮氣血駐顔美食肉蓯蓉三両浸酒煑一宿切焙牛膝二両酒浸一宿附子泡去皮臍桑寄生兎絲子湯浸去浮皮别用酒浸取軟覆盆子亁地黄洗焙當歸洗焙山藥五味子山茱萸白蒺藜炒肉桂去粗皮以上十二味各三両川萆薢四両破故紙炒二両半栢子仁二両茴香炒二両半茯神去木二両鹿角膠炒焦二両半右件為細末酒煑糊丸如桐子大每服五十丸空心食前温酒或鹽湯送下兼治婦人諸疾不足一切冷疾乆娠不成髮落面黑温醋湯下煑鹿角膠法須用両鍋一鍋常用温湯難備藥用鹿角不用自死者不以多少三寸許截斷去其粗皮右將鹿角於河内浸七日其水每日一易俟日足洗浄鍋中煑每角五觔用桑白皮半觔楮實一觔舶上硫黄二両同煑之如水盡即旋添湯及一服時自然已軟或火不相斷未軟再煑一服如軟候冷取出於當風處掛起便可入藥用煑角水濾去諸藥慢火再熬便可為膠世寳丸治下元氣損久積寒冷目暈耳鳴形體羸弱陰痿自汗夜遺精及肺痿喘嗽咯有血怯風畏寒手足冷其一切虛勞氣劣並宜服之附子炮去皮臍牛膝酒浸一宿焙亁肉桂去粗皮白茯苓去皮紅椒五味子茴香炒人參去蘆頭枳殻去穣麩炒熟地黄洗焙以上十味製精浄各稱一両五錢為末次用精羯羊肉四両細切肉蓯蓉浄洗二両細切羊脂二両細切黄臘二両細切杏仁二両細切去皮尖烏梅肉一両葱白一両右件後七味用法酒五升同入銀入器中慢火煑令肉爛研成膏入前藥末一處搗和丸桐子大每服三十丸漸加至四五十丸温酒或鹽湯送下肺痿咯血煎糯米阿膠湯送下常服補益元氣輕徤腰脚實骨髓耐風寒滋養氣血空心食前服韭子丸出楊氏家藏方治水不足氣不升降夢寐遺洩精滑不禁鹿茸火燎去毛酥炙黄色茴香炒補骨脂微炒以上三味各一両半逺志去心龍骨輕𦂳者醋淬七次用葫蘆巴炒附子炒去皮臍韭子炒香熟金鈴子搥碎去核麩炒六味各一両麝香一分另研右件為細末將麝香同研勻酒煑麫糊丸桐子大每服五十丸煎人參白茯苓湯下日三服空心食前既濟固真丹出朱氏集驗方治水火不能既濟精神恍惚頭目昏暗且陽痿隂濕多汗遺瀝失精脾胃虛怯心腎不寧腎水欲升而沃心心火欲降而滋腎水則坎離既濟而恊和火不炎上則神自清水不下滲而精自固常服固陽氣温脾益血北五味子白茯苓附子沉香龍骨蓯蓉酒浸一宿無以鹿茸代酥炙各一両益智子栢子仁去殻炒補骨脂酸棗仁去殻炒金鈴子去核炒紅椒去目當歸酒浸川芭㦸去心各半両兎絲子酒浸各研一両半右為細末酒糊丸辰砂三錢為衣桐子大每服五七十丸空心鹽酒任下侍左王郎中鎔傳與右司謝大卿暨服之果是竒絶普濟方卷二百十七
