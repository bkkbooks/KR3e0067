body:
  text: 普濟方卷二百十七明周王朱橚撰諸虛門總論夫人稟中和之氣以生若能保守真元則何由而病不善衛者由思慮役其智嗜欲亂其真而榮衛一虛積微成損積損成衰及其病也既不能御氣以全身又不能為之補餌不亦殆哉蓋人之一身腎之液謂之精意有所存謂之志故經曰腎藏精與志也生性之本元氣之根精神之所舍名曰精神故靈樞經曰積精全神者是也人之精而後有神也今人之虛損皆出於心腎其盜汗其白濁之類奚可容乎且心之液自夢中出覺來則汗如雨未幾便乾此則為盜汗腎之液泄自小便中出停久濁如泔或上有脂油或為夢遺則氣體弱神情倦怠眼目昏花精神脫已焉得而有神哉且心者神藏之腎者精藏之今心既受病則神不守舍日則有怔忡健忘恍惚失志之證夜則有登高涉險火發追捕之夢腎既受於病則髓海枯竭遂有腳氣膝軟精神倦怠體弱夢泄便濁消渴瘦瘁諸虛百損莫不自心腎而言然病既至此尚有不能守節或孳孳於財利或戀戀於色欲傷動坎離漸至沉羸去生逺矣養生之士聞此自當惻然有感於私謹起居節飲食靜室有處勿貪富貴勿怨貧賤勿嗜酒色專心服藥治法當以寧心凝神為先次則澀精補腎則疾無不愈矣又有心經有熱心火爍腎水而為赤濁白濁夢泄此又可溫補惟當精心學者更宜審焉難經云論損從皮毛至筋骨者此乃辨氣脈淺深次第也原其所由屬不內外或大病未復便合隂陽或疲極筋力飢飽失節盡神度量呌呼走氣所以諸症蜂起百疴交作吐血衄血便血泄血遺血白濁冷滑洞㵼白汗黃汗嘔吐咯啘涎沫痰飲遂使榮衛奔走虛羸損傷皆自此始蓋由背於人身常理而致然也况婦人産蓐過於大病虛損尤多不可不知列而論之症狀非一當考脈尋理推其元氣胃氣資始資成扶助隂陽辨别根本蓋不可隨證冷熱交行施治也夫人稟隂陽五行運氣榮衛而保全其身凡一身中或有毫釐疾患無因臟腑虛冷則榮衛不調榮衛不調則疾生矣又况虛冷之疾極又其生其虛陽或手足腰腎眼目口齒三焦六腑值病之亟則各能死人且如左右手三隂三陽十二經脈皆用有胃氣或加之有疾而無胃氣者不問病之輕重斷然不救何謂頓用有胃氣然胃受穀氣生則能生氣血氣血壯則榮衛不衰榮衛不衰則病自去矣如五臟六腑表裏之間皆出自穀氣而相傳授生血氣而灌蔭五臟或氣不足則五臟六腑蔭無所自况加之如憂愁思慮喜怒不常起居勞役飲食不節房事過多衝雪冒霜伏暑觸熱損失耗散則病生焉且如季春季夏季秋季冬一十八日之間脾土於此時王極腎水受剋故當補腎所以心肺肝脾腎各有衰王各有相生相剋如心剋肺肺剋肝肝剋脾脾剋腎腎剋心遇王則以剋之愈甚凡受剋處故冝補然春補脾夏補肺秋補肝冬補心古之賢人平居無病易常用藥法度調護脾胃使進飲食而全穀氣凡百皆得其宜如今之庸醫用意皆錯如舉一二而為證然且如腎經衰敗則以天雄附子之類而言補腎且腎屬北方土癸水喜溫惡燥返用天雄附子至燥之藥豈能補乎腎邪况腎經虛則乃五臟六腑衰極而漸至於腎則諸病生焉凡下部腎經虛者不必補之至妙之法有二一則補脾護胃使進飲食而全穀氣令生氣血所謂者何每日夜子時於北方正候當此之時腎水王極則攝血化精精氣全則丹田自實腎經不虛病自去矣男子則攝血化精女子盈為月事若穀氣不全則氣血不生氣血不生則當夜半子時腎水雖王則血不能償其腎所攝無精所化而丹由不固腎自虛矣以此觀之凡腎經并五臟虛敗醫者罔識源流枉用其法初不能損於病要當先補腎胃後調氣血耳虛損之疾寒熱因虛而感也寒感則損陽陽虛則隂盛故損則自上而下治之宜以辛甘淡過於胃則不可治也感熱則損隂隂虛則陽盛故損則自下而上治之宜以苦甘酸鹹過於脾則不可治也自上而損者一損損於脾故皮聚而毛落二損損於脾故血脈虛熱不能榮於五臟六腑婦人則月水不通而三損損於胃故飲食不為肌膚也自下而損者一損損於腎故骨痿不能起於床二損損於肝故筋骨緩不能自收持三損損於脾故飲食不能消剋也故心肺損則血弊肝腎損則形痿脾胃損則榖不化也損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肺者緩其中損其腎者益其精此補益之大法也夫人之氣血與天地同流不能無盈虛矣不能無損益矣治療之宜損者益之不足者補之隨其緩急而已是故有平補有峻補或益其氣或益其精或益其血脈或壯其筋骨至以益髭髮駐顔色其治不一要之隨宜適可無不及之患斯為善矣損其腎者益其精四十難曰損其腎者益其精辨云腎有兩枚右為命門相火左為腎水同質而異性也夫損者當審損何臟而治之隂陽應象論曰形不足者溫之以氣精不足者補之以味乂云氣化精生味和形長無陽則隂無以化當以味補腎真隂之虛隂本既固陽氣自生化成精髓若相火陽精不足宜用辛溫之劑世之用辛熱之藥治寒甚之病非補腎經之藥又知腎之惡燥也凡人年四十以上日久多言以致虛損面色黧黑飲食無味心胸痞滿四肢倦怠肌體餘熱大小便不利治之奈何內經云不可熱補之夫男子腎盧水不足也凡補虛之劑多用烏附天雄之類豈知腎惡燥也女子隂虛血不足也几補虛多以陽劑是以知陽盛而隂虧也不可用性熱之藥也補之虛心可服加減八物湯丸當歸飲子減桂五苓散煩渴加益原名曰淡滲散更服通解丸顯仁丸亦可服之大有神效凡病人虛勞多日無力别無熱症者宜服之可用無比山藥九則愈矣勞倦之疾百脈空虛非滋潤粘膩之物而以養之不能實也又用鹿角膠阿膠牛乳飴糖酥酪煎蜜人參杏仁當歸熟地黃之類正此意也或者妄施伏火金石附子燥熱等輩以致血氣乾涸心腎不交故火炎於上為痰嗽為咯血為口乾為五心煩熱水走於下為腳弱為遺精為赤白濁為小便滑數誤矣哉虛勞之脈大抵多弦或浮大或數皆虛勞之候也大者易治血氣未定可斂而正也弦者難治血氣已耗未易調補之若帶雙弦則賊邪侵脾此尤難治加數則殆矣補虛固精附論夫腎主水授五臟六腑之精而藏之所謂天一生水在臟為腎本其始也若腎臟衰精氣不固或因溲而出或因聞見而溢或因虛勞漏泄精氣或因邪氣乘虛客於隂為夢皆腎虛也宜補以固之故法宜以澀去脫方沉香保生丸出德生堂治男子精氣不固餘澀常流小便血濁夢頻數泄出口乾耳鳴腰膝痛隂囊濕癢陽事痿及治婦人血海久冷胎氣不勝赤白帶漏下男子小便如泔能固精氣益精髓駐顔色安魂定魄延年不老壯陽事婦人暖子宫下元有益沉香母丁香巴戟去心酒浸蓮蕊木香蓮心兔絲子酒浸葫蘆巴酒浸八角茴香鹽炒肉蓯蓉酒浸韭子酒浸紅花各一兩雄蠶蛾一兩二錢川椒一兩淨仙靈皮一兩醋炒川山甲炮二兩二錢半水蛭糯米炒五錢青鹽五錢細墨五錢燒去油益智仁七錢半牛膝酒浸一兩麝香酒浸一兩蛤蚧一對别研去蟲生用川棟子一兩炒以上二十四味為末川楝子四兩捶碎知母一兩二錢破故紙一兩二錢甘草二兩五味子二錢右五味為末用水一斗熬成濃膏和前藥末麵糊為丸如梧桐子大每服五十丸空心酒或鹽湯送下乾物壓之韭子丸出聖惠方治下元虛憊驚夢泄腰膝無力肌體羸顔色痿弱飲食減韭子微炒令香鹿茸去毛塗酥炙令黃色楮實水淘去浮皮乾微炒澤瀉肉蓯蓉酒浸一宿去皺皮炙乾附子炮製去皮臍各一兩石斛逺志去心柏子仁桂心去皮牛膝去苗巴戟川椒去目及閉口者微炒去汗白术薯蕷覆盆子各三分杜仲去粗皮炙微黃色黃耆銼狗脊去毛枳殼去穰麩炒蛇床子芎藭五味子乾薑銼製各半兩右為末煉蜜為丸和搗三五百杵如梧桐子大每服空心以溫酒下三十丸加四十丸為度又方治遺精車前子石菖蒲天門冬枸杞子山茱萸酒浸熟地黃巴戟兔絲子肉蓯蓉各二兩生地黃澤瀉人參白茯苓覆盆子赤石脂柏子仁牛膝花椒各二兩地骨皮一兩半杜仲三兩熟山藥二兩右為末煉蜜丸如桐子大每服五十丸鹽湯食前送下大補丸一名大神丸出三因方治元臟虛憊血氣不足白濁遺泄自汗自利口苦舌乾四肢羸瘦婦人諸虛皆治之木香炮附子炮去皮臍茴香炒蓯蓉酒浸川椒炒去汗各十兩桃仁去皮炙炒胡蘆巴牛膝酒浸巴戟五味子黃茋白蒺藜炒去刺澤瀉各五兩羌活檳榔天麻川芎桂心各二兩右為末煉蜜丸如桐子大鹽酒任下三十丸或五十丸空心服葫蘆巴丸出瑞竹堂方治虛損之疾不可醫極能關鎖精氣升降隂陽功效如神附子炮去皮臍川烏炮去黑皮沉香酸棗仁當歸去蘆川芎柏子仁去殼葫蘆巴巴戟破故紙微炒龍骨牡蠣煨天雄炮赤石脂鹿茸酥炙茴香各二兩澤瀉半兩生硫黃一兩半用明者佳右為末酒糊丸如桐子大每服五十丸空心鹽湯米飲下日一二凝真丹出仁存方治丈夫三丹不凝結致真氣不固精清滑飲食不美四支怠隋昏因嗜卧上丹不凝結則常多感冒鼻流清涕頭目昏疼右用益智仁二兩餅藥搜麵裹煨令麵焦去麵為細末少許搐鼻中久用清涕自止中丹不凝結則發熱自汗悸驚恍惚健忘不能飲食右用益智仁二兩酸醋三宿焙乾為細末醋煮麵糊為丸如桐子大每服三十丸至五十丸鹽湯吞下下丹不凝結則真氣不固夢遺白濁胸中短氣面黃體虛形瘦瘁情思不樂飲食減少驚悸恍惚右用益智仁四兩以鹽水浸三宿焙乾為細末鹽煮麵糊為丸如桐子大每服三十丸至五十丸空心鹽湯吞下不可用酒服恐散真氣玉關丸出醫方大成治諸虛不足膀胱腎經痼敗隂陽不交致多病水欲升而沃心火欲降而溫腎是則坎離既濟隂陽協和火不炎而神自清水不滲而精自固能閉精補益永無膏淋白濁遺精之患功效不能盡述辰砂一兩鹿茸二兩作片酥炙附子七錢重者四箇去皮臍各切下預剜空心中安辰砂在內以前頂子蓋定用綿扎之木瓜大者二箇去皮穰切開頂入硃砂附子四箇在內以木瓜頂子蓋之綿札定爛蒸訖取出附子切片焙乾為末硃砂細研水飛木瓜研如膏宣瓜為妙柏子仁炒别研當歸酒浸焙沉香别研巴戟去心黃茋去蘆蜜浸炙茯神去木川牛膝去蘆酒浸石斛去根酒浸各一兩兔絲子水淘淨酒浸焙另研蓯蓉酒浸杜仲去粗皮酒浸五味子各一兩逺志去心炒二兩右為細末用瓜膏杵和少入酒糊丸如桐子大每服七十丸空心米飲溫酒鹽湯任下一方無當歸鎖精丸出瑞竹堂治精滑不禁川獨活川續斷谷精草石蓮肉去榖乾菱米生雞頭去殼蓮心川揀子酥炙金櫻子緊龍骨白茯苓水豬苓小茴香藕節各等分右為細末雞子清為丸如桐子大每服四五十丸空心鹽湯送下乾物壓之五味子丸出簡易方理肝腎俱虛收斂精氣補真陽手虛汗益智仁炒蓯蓉酒浸炒川巴戟去心人參去蘆五味子去梗骨碎補去毛小茴香炒白术覆盆子白龍骨熟地黃酒洗牡蠣兔絲子各等分右等分為末入青鹽同酒煮糊為丸如桐子大每服三十丸空心用鹽湯或酒送下亦可青鹽丸出危氏方補虛益腎氣明目治腰疼及治精滑涎多四肢困乏墨牽牛二兩炒別研頭末蒼术切炒黃色杜仲炒斷絲川烏泡去皮臍川揀子去核山藥去皮紅椒皮炒青鹽别入陳皮去白茴香附子炮去皮臍破故紙炒右等分為末入青鹽同浸酒煮糊丸如桐子大每服三十丸空心鹽湯下龍齒鎮心丹治腎氣不足驚悸健忘夢寐不安遺精白濁面少光色四肢怠惰足脛酸疼常服益精髓養血氣明視聽悅色駐其顔色龍齒水飛一作龍骨逺志去心炒天門冬去心熟地黃酒浸蒸焙