也方十香丸出聖濟總錄治霍亂中惡不識人心痛腹脹不思飲食丁香蘇合香白檀香沉香木香莎草根炮去毛白术剉炒髙良薑安息香研麝香研薫陸香研丹砂研龍腦研各半兩蓽撥訶梨勒煨去皮犀角鎊屑厚朴去粗皮薑汁炙各一兩右除别研外為細末與别研者藥同令匀煉蜜丸如梧桐子大每服五丸溫酒下老少加減服之甚者溫酒研下收貯於甆盒中日四五服以瘥為度桃枝湯出聖濟總錄治中惡霍亂心痛胸脇㽲痛喘惡向東桃枝白皮一握丹砂碎一兩梔子仁十四枚當歸焙附子砲製去皮臍豉吳茱茰淘炒各一兩桂去粗皮各三兩右剉如麻豆大每服四錢匕水二盞生薑三片煎至一盞去滓溫服日三夜一木香散出聖濟總錄治中惡霍亂心腹痛煩悶木香炮三分梹榔剉一兩青橘皮湯浸去白穣桂去粗皮桃仁去尖皮雙仁炒研人參各半兩右為細末每服二錢匕溫酒調下不拘時白术湯出聖濟總錄治中惡霍亂吐痢手足麻痺或轉筋白术剉木𤓰去穣切焙人參各一兩甘草炙乾薑炮各半兩右搗篩每服三錢匕水一盞生薑三片棗一枚擘同煎七分去滓溫服不拘時橘皮湯出聖濟總錄中惡霍亂吐痢心煩陳橘皮湯浸去白穰木𤓰切焙桂去粗皮草豆蔲去皮甘草炙各一兩右搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時丹砂丸出聖濟總錄治中惡霍亂垂死丹砂研半分附子炮製去皮臍一分為末雄黄二豆許研右以巴豆七粒去心皮别研出油後入諸藥末研令極匀煉蜜丸如麻子大每服三丸米飲下若下痢未止加三丸至五丸與少冷粥食之即定麝香㪚出聖濟總錄治中惡霍亂心腹刺痛去惡氣麝香研一分犀角銷屑木香各半兩右為細㪚空心熱水調一錢日三麝醋方出聖濟總錄治中惡霍亂用麝香一錢細研和醋半盞調二服即瘥又方用沉香主心腹痛霍亂中惡邪鬼亡精失神並宜酒煮服之主霍亂中惡心腹痛鬼氣注忤飛尸喉痺蠱毒癰疽惡赤白遊疹出海藥闕本門用海桐根以酒及水磨服傅之亦住治霍亂中惡用海桐皮煮汁服之霍亂煩渇附論夫上焦如霧言五臟津液之所薫蒸其氣潤潯故能分佈令諸脉也今霍亂吐之人重亡津液則臟腑不和上焦熱津液不足故因霍亂而煩渇也煩渇不止則引飲引飲則利方藿香湯出聖濟總錄治霍亂吐逆冷熱不調心膈煩悶咽乾多渴藿香葉三分枇杷葉炙去毛陳橘皮浸去白焙丁香各半兩厚朴去粗皮生薑汁炙二兩白茅根麥門冬去心乾木𤓰各一兩甘草各一兩半右搗篩每服三錢匕水一盞生薑三片煎至七分去滓早晚食前溫服麥門冬湯出危氏方治霍亂已愈煩熱不解多渇小便不利麥門冬去心橘皮去白半夏湯泡七次白茯苓去皮白术各一兩人參甘草炙各半兩小麥半兩右㕮咀每服四錢水一盞半生薑五片烏梅少許煎至八分去滓溫服不拘時止渇湯治霍亂煩渇甘草人參麥門冬去心茯苓桔梗𤓰蔞根乾葛澤瀉各等分右為細末蜜湯調下二錢人參㪚出聖惠方治霍亂卒吐下痢不禁脉數煩渇人參去蘆頭白术白茯苓葛根剉陳橘皮湯浸去白穰焙麥門冬去心各一兩甘草半兩炙㣲赤剉右搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓溫服木𤓰湯出聖濟總錄治霍亂煩渇喘促無力食即嘔吐木𤓰一兩木香梹榔生薑各半兩黑豆炒一合甘草炙一分人參三分右剉如麻豆每服五錢水一中盞半煎取一盞去滓早晚食前溫服肉豆蔲丸出聖濟總錄治霍亂吐瀉渇燥煩悶不止肉豆蔲去殻炮丁香甘草炙陳橘皮湯浸去白焙髙良薑藿香葉各半兩右為細末用棗肉丸如梧桐子大每服三十丸溫生薑米飲下不拘時麥門冬湯出聖濟總錄治霍亂吐瀉不止渇甚麥門冬去心焙𤓰蔞仁陳橘皮湯浸去白焙半兩人參半兩厚朴去粗皮薑汁炙一兩右搗篩每服三錢匕水一盞煎至七分去滓溫服日三人參湯出聖濟總錄治霍亂吐痢渇燥不止人參三分葛根剉白术桔梗去蘆頭剉炒赤茯苓去黒皮各半兩右搗篩每服三錢匕漿水一盞煎至七分去滓溫服日三梔子散出聖惠方治霍亂吐下後煩渇梔子仁半兩豉一合不搗陳橘皮三分湯浸去白穰焙右搗篩為散分為三服每服以水一中盞入生薑半分去滓溫服麥門冬散出聖惠方治霍亂吐瀉煩渇心燥麥門冬去心生薑梁米各半兩桑葉一兩右細剉以水一大盞煎至六分去滓入蜜半合更煎三兩沸放令溫時服之石膏㪚出聖惠方治霍亂煩渇頭痛石膏二兩麥門冬一兩去心甘草三分炙㣲赤剉白茯苓一兩右搗篩為散每服三錢以水一中盞入生薑半分䜴一百粒竹葉二十七片煎至六分去滓不計時候溫服白茯苓散出聖惠方治霍亂心煩渇白茯苓一兩大棗十枚去􅜊麥門冬半兩去心右細剉分為五服以水一中盞煎至六分去滓溫頓服木𤓰㪚出聖惠方治霍亂吐痢煩渇不止木𤓰一枚桂心一兩麥門冬一両去心右細剉每服半兩以水一大盞煎至五分不計時候溫服青竹茹湯出聖濟總錄治霍亂津液少渇甚青竹茹一鷄子大人參半兩烏梅去核二枚右搗篩水三盞煎取一盞去滓溫服分三服不拘時蘆葉湯出聖惠方治霍亂吐瀉煩渇心燥蘆葉一兩剉糯半兩右以水一大盞入竹茹一分煎至六分後入蜜半合生薑汁半合更煎三兩沸去滓放溫時時呷之草豆蔲湯出聖濟總錄治霍亂心煩渇吐痢不下食草豆蔲去皮一兩黄連去鬚一兩右搗篩每服三錢匕水一盞烏豆五十粒生薑三片煎至七分去滓溫服香薷湯出聖濟總錄治霍亂吐痢四肢煩疼冷汗出多渇亦治乾霍亂及轉筋者一名水蓼飲香薷二兩蓼子一兩右搗篩每服二錢匕水一盞煎至七分去滓溫服日三薑藕飲出聖濟總錄治霍亂吐下止兼渇生藕一兩洗切生薑一兩洗切右研絞取汁分三服不拘時木𤓰湯出聖濟總錄治霍亂吐痢煩渇不止木𤓰一枚無生者乾者亦得桂去粗皮二兩右㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓溫服一方以豆䓻代桂厚朴桂心湯療霍亂復渇口乾腹痛不止病源云霍亂而渇者由大吐逆上焦虚氣不調理氣乗於心則煩悶也大痢則津液竭津液竭則臟燥臟燥則渇也煩渇不止則引飲引飲則痢亦不止厚朴四兩炙桂心三兩右切以水四升煮取一升二合絞去滓分六合細細飲之服了如其渇欲得冷水盡意飲之忌生葱糯米飲出聖惠方治霍亂渇甚不吐卒噦心煩渇不止卧不安用糯米二升淘取泔飲之即定研米粉取白汁飲之又以水煮澄清稍溫服黄梁米亦得一方研白米汁用蜜調療霍亂不吐不下胸腹脹滿方出聖惠方用木𤓰一枚切以水四升煮取二升細細飲盡更作吐不止者亦瘥若渇惟飲此湯佳枝莖亦可用此湯令取吐一方煮木𤓰汁服之治霍亂轉筋人參散出經驗良方治吐逆及瀉後除煩渇常服調中和氣人參白茯苓白乾葛各二兩藿香木香甘草嫩黄耆去蘆各二兩半右剉㪚每服三錢水一盞半煎七分去滓溫服瀉後渇甚者每服加滑石末二錢同煎一方無嫩黄耆茯苓澤瀉湯出危氏方治霍亂吐痢後煩渇欲飲水茯苓八兩澤瀉四兩甘草炙桂心各二兩白术二兩右剉散每服四大錢水一盞薑三片煎七分去滓食前服一方有小麥五兩豆蔲丸出仁存方治吐痢不定煩躁渇肉豆蔲炮丁香陳皮各半兩良薑藿香各一兩右為末棗肉丸如梧桐子大每服二十丸加至三十丸薑汁米飲送下香薷湯一名香藿㪚治吐瀉霍亂煩渇腹痛或轉筋體冷脉㣲方見本門霍亂吐痢類葛根散出指南方治霍亂有熱煩渇乾薑丁香藿香甘草赤茯苓枇杷葉等分右為細末每服三錢水一盞煎至七分溫服五苓散出和宣方治伏暑煩渇引飲吐痢澤瀉二兩半肉桂一兩白术猪苓赤茯苓各一兩半右末小麥煎湯治霍亂吐下後水渇多飲則殺人方出肘後方用黄米五升水一斗煮之令得三升澄清稍稍飲之莫飲餘物也主霍亂後虚渇煩悶不能食出本草以藕實生食之治霍亂煩躁出本草以黄梁米粉半升水一升半和絞如白飲頻服糯米亦得普濟方巻二百二
