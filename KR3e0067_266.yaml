齒閉口鼓令氣滿口即咽至九十一息春夏服冷氣秋冬服暖氣至五更兩掌掩口用力呵掌中津液生即摩拭面目令得光澤時時含棗蜜湯助之日日減食朝朝服氣氣即易成昔人謂飢食自然氣渴飲華池漿者是也出聖濟總録服氣法出聖濟總録凡欲服氣即正腳卧凡叩齒三十六下吐去濁惡氣即上下卷肚七下左右如之各七度此名練氣除萬病即閉氣令內不出外不入鼓腹令氣滿及微閉三五咽以下為一歇咽多為佳每咽皆以咽送至下丹田臍下三寸是一名氣海至十歇以下氣漸通二十歇即腹中六轉如減食大妙從子至巳以上六時為陽氣生氣在外從午至亥六時為隂氣生氣在內凡吐去濁氣若陽時鼻微微引外氣長取之術下丹田飽閉之食極口中微微吐之任依長息若隂時但閉口內咽之以飽依常息如有他疾即依六氣調適之若遇惡隂重霧雷電只得內咽不得取外氣出聖濟總録凡服氣先導引為佳每日能咽得三五十咽津液勝服諸藥凡運氣如屋漏注相連相續送至病處若患時疾瘴氣但能引外氣呵去之立效出聖濟總録凡服氣飲一兩合暖水水是氣母又每食前飲少暖水久久耐寒暑飲多不妨出聖濟總録凡為道者當淨盟潄勿住情性節減滋味不欲勞形疲躬髙聲呌呼嗔怒喜樂憂悲觸冒寒暑乃可反老還童出聖濟總録凡初服氣時須心意坦然勿疑勿畏懼氣即難行若四體調和意自欣樂不羡一切事即日勝一日快樂無極不得思食若忽思食必須抑撩即邪一失矣可用薜荔煎湯入生薑少許更煮一兩沸服其飢渴即薑蜜湯亦得若能自抑撩捺終日對佳饌亦無所苦出聖濟總録凡服氣但不失時節丹田常滿縱出人事亦不可廢行之日久雖失一時亦無所覺若服氣成者終日不服氣氣亦自足至妙不可窮盡服氣但臍下丹田常滿雖呌呼誦讀終日語言其氣力不衰但可行步出入少時令氣下大妙出聖濟總録凡服氣成欲食食亦不妨亦不障氣氣還作聲直至臍下一成以後兼食行氣皆無窒礙凡服氣欲得身中百物不食腸中滓穢既盡即易行能忍久作自覺精神有異四體日勝腸中既淨即閉目內視五臟歷歷分明知其處所然後五臟可安神常自衛久可别人善惡視表知裏亦能驅使五臟之神以治人病其內息法用氣日久即得多時日兼食飲酒漿水等即內息不成其有宿患但用意併氣注之患處不過三五次必愈若四肢有患亦可想氣以攻之即其病雖散然初攻病時當痢五色膿亦無足怪也出聖濟總録凡服氣面腫者為飲淡水上衝氣壅不行所以如此食中尤忌胡椒雲臺邪蒿韭薤菠薐蔥蒜等物皆木之精能損脾亂氣大不可食夫卒怒傷魄卒哀傷魂哭泣之事至人不為必不得已而為之可登時於一淨處晏坐安心用氣盡出然後依法服元氣使定又服丹田中氣使足出聖濟總録夫腸長者氣易固腸短者難固如腸中攪轉作聲即須右脅著抹以右手肢頭以左手牽腳令屈直身及直右腳咽氣令入右腳中出腸中即可久行氣每下作聲聲繞盤屈子腸屈處作聲皆自記得屈處其聲流轉􅊯􅊯然小聲即是流通腸中四緣又有節次以二十四坎久行每氣下即覺在節坎坎數亦自記得元氣與外氣不相離若咽生風須臾即從下泄出不得停腸中出聖濟總録調氣法彭祖曰道不在煩但能不思飲食不思聲色不思勝負不思曲直不思得失不思榮辱心無煩形勿極而撫之以導引行氣不已亦可得長年千嵗不死凡人不可無思當入漸遣除之彭祖曰和神導氣之道當得密室閉户安牀暖席枕髙二寸五分正身偃卧瞑目閉氣於胸膈中以鴻毛著鼻上而不動經三百息耳無所聞目無所見心無所思如此則寒暑不能侵蜂蠆不能毒壽三百六十嵗此鄰於真人也每旦夕旦夕者是隂陽轉換之時凡旦五更初暖氣至頻頻眼閉是上生氣至名日陽息而隂消暮日入後冷氣至凛凛然乃上床坐睡倒是下生氣至名曰陽消而隂息旦五更初暖氣至暮日入後冷氣至常出入天地日月山川河海人畜草木一切萬物體中代謝往來無一時休息一進一退如晝夜之更送如海水之消長是天地消息之道也面向丑展兩手於腳膝上徐徐按擦肢節口吐濁氣鼻引清氣凡吐者去故氣亦名死氣納者取新氣亦名生氣故老子經云玄牝之門天地之根綿綿若存用之不勤言口鼻天地之門可以出納隂陽死生之氣也良久徐徐乃以手左托右托上托下托前托後托瞑目張口叩齒摩眼押頭拔耳挽髮放腰咳嗽發陽振動也雙作隻作反手為之然後雙足仰振數八十九十而止仰下徐徐足心作禪觀之法閉目存思想見空中太和元氣如紫雲成蓋五色分明下入毛際漸漸入頂如雨初晴雲入山透頂皮入肉至骨至腦漸漸下入腹中四肢五臟皆受其潤如水滲入地若徹則覺有聲汩汩然意專思存不得外緣斯須即覺元氣達於氣海須臾則自達於湧泉則覺身體振動兩腳踡曲亦令趺坐有聲拉拉然則名一通二通至日别得三通五通則身體悅澤面色光輝鬢毛潤澤耳目精明令人食美氣力強健百病皆去五年十嵗長存不忘得滿千萬通作去仙不逺矣人身虛無但有遊氣氣息得理即百病不生若消息失宜即諸疴競起善攝生者須知調氣方焉調氣方療萬病大患百日生眉鬚自餘者不足言也凡調氣之法夜半後日出前氣生得調日中後夜半前氣死不得調調氣之時則仰卧抹鋪厚軟枕髙下共身平舒手展兩腳兩手握大拇指節去身四五寸數數叩齒飲玉漿引氣從鼻細引入出氣則停止有力更取久住氣悶從口細吐出盡逺從鼻細細入出氣一凖前法閉口以心中數數令耳不聞恐有誤亂兼以手下籌能至十則去仙不逺矣若夫隂霧惡風猛寒勿取氣也但閉之若患寒熱及卒患癰疸不問日中疾患未發前一食間即調如其不得好瘥明日依式更調之若患心冷病氣即呼出熱病氣即吹出肺病即噓出若肝病即呵出若脾病即唏出若腎病即呬出若夜半後八十一雞鳴七十二平旦六十二日出五十四辰四十五巳時三十六欲作四法先左右導引三百六十遍病有四種一冷腫二氣疾三邪風四熱毒若有患者安心調氣此法無有不瘥也凡百病不離五臟五臟各有八十一種疾心冷熱氣風計四百四病事須識其相類善以知之心臟病者體冷熱相法心色赤患者夢中見人著赤衣持赤刀杖火耒怖人瘴法用呼吸二氣呼療冷吹沾熱肺臟病者胸背滿脹四肢煩悶相法肺色白患者喜夢見美女美男許親附人共相抱持或作父母兄弟妻子療法如噓氣出肝臟病者憂愁不樂悲思喜頭眼疼痛相法肝色青夢見人著青衣提青刀杖或獅子虎狼來恐怖人療法用呵氣出脾臟病者體上遊風習習遍身痛煩悶相法脾色黃通土色夢作或小兒繫瀝人邪猶人或如旋風團欒轉治法用唏氣出腎臟病者體冷隂衰面色惡痿相法腎色黑夢見黑衣及獸捉刀杖相怖用呬氣出冷病者用大呼三十遍細呼十遍呼法鼻中引氣入口中吐氣出當令聲相逐呼字而吐之熱病者用大呼五十遍細呼十遍吹如吹物之吹當使字氣聲似字肺病者用大噓五十遍細噓十遍肝病者用大呵三十遍細呵十遍犯脾病者用大唏三十遍細唏十遍腎病者用大呬五十遍細呬三十遍此十二種調氣法若有病依此法恭敬用心無有不瘥皆須左右導引三百六十遍然後乃為之按摩法天竺國按摩此是波羅門法出聖濟總録兩手相捉紐捩如洗手法兩手淺相義翻覆向胸兩手相捉共按䏶左右同以手如挽五石弓左右同兩手相重按䏶徐徐捩身左右同作拳向前築左右同作拳却頓此是開胸左右同如拓石法左右同以手反捶背上左右同兩手據地縮身曲脊向上三舉兩手抱頭宛轉䏶上此是抽脅大坐斜身偏欹如排左右同大坐伸兩腳即以一腳向前虛掣左右同兩手拒地回顧此是虎視法左右同立地反拗身三舉兩手急相叉以腳踏手中左右同立起以腳前後虛踏左右同大坐伸兩腳用當相手勾所伸腳著膝中以手按之左右同右十八勢但是老人日行能依此三遍者著一月後百病除行及奔馬補益延年能食眼明輕健不復疲乏老子按摩法兩手捺䏶左右捩身二七遍兩手捻䏶左右紐肩二七遍兩手抱頭左右紐肩二七遍左右挑頭二十遍兩手抱頭三舉之一手托頭一手托膝三折左右同一手托頭一手托膝從下向上三遍左右同兩手攀頭下向三頓足兩手相捉頭上過左右三遍兩手相義托心前推却挽三遍兩手相叉著心三遍曲腕築助挽肘左右亦三遍左右挽前後拔各三遍舒手挽項左右三遍反手著膝手挽肩肘覆手著膝上左右亦三遍手摸肩從上至下使遍左右同兩手空拳築三遍兩手相叉反復擾各七遍外振手三遍內振手三遍覆手振亦三遍摩紐措三遍兩手反搖三遍兩手反義上下紐肘無數單用十呼兩手上聳三遍兩手下頓三遍兩手義頭上過左右伸助十遍兩手拳反背上屈脊上下亦三遍掘揩之也兩手反捉上下直脊三遍覆掌搦腕內外振三遍覆掌後從三遍覆掌兩手相義交橫三遍覆手橫直即聳三遍若有手患冷從上打至下得熱便休舒左腳右手承之左手捺腳聳上至下直腳三遍右手捺腳亦然前後捩足三遍左捩足右捩足各三遍前後却捩足三遍直腳三遍紐䏶三遍內外振腳三遍若有腳患冷者打熱便休細䏶以意多少頓腳三遍却直腳三遍虎據左右紐肩三遍推天推地左右三遍左右排山負山拔木各三遍舒手直前頓伸手三遍舒兩手兩膝亦各三遍舒腳直反頓伸手三遍捩內脊外脊各三遍導引法附論人之五臟六腑百骸九竅皆一氣之所湧氣流則形和氣盩則形病導引之法所以行血氣利關節辟除外邪使不能入也傳曰户樞不蠧流水不腐人之形體其亦猶是故修飬之士以導引為先夜半子少陽之氣生於隂分修生之士於子時修煉古人一日行持始於子一嵗功用起於復法轉脅舒足出聖濟總録混元經云戍亥子三時隂氣生而人寐寐則氣於百節飬生家睡不厭縮覺不厭伸故陽始生則舒伸轉掣務令榮衛周流也鼓腹淘氣出聖濟總録淘氣訣閉目仰面舉按脊鼓氣海中氣使內外轉吐而去之不使耳聞一九二九止若五臟三焦壅即以六氣治之所謂噓呵呼呬吹嘻是也噓屬肝呵屬心呼屬脾呬屬肺吹屬腎嘻屬三焦導引家不經師授大月從噓為順小月從嘻為逆行之理推之不應大如是大扺六字㵼而不補但覺壅即行本臟疾已即止豈可逐日行之古人言六氣不出不可過過則傷正氣導引按蹻出聖濟總録踴身令起平身正兩兩手義項後仰視舉手左右招搖使項與手爭次以手拔腳稍閉氣取太衝之氣太衝穴在大指本節後二寸骨鏬間陷者是左挽如引弓狀右挽亦如之左洞真按摩篇云義兩手乃度以掩項後仰面視上舉首使項與手爭為之三四令人精和血通風氣不入久能行之無病畢又屈動身體伸手四極反張側掣宣搖百關為之各三華陀别傳云人身欲行勞動但不當自極體常動搖榖氣自消血脈流通户樞不蠧流水不腐形體亦然真人按蹻蓋取諸此元道經云元氣難積而易散關節易閉而難開揑目四眥出聖濟總録太上三關經云常欲以手按目近鼻之兩眥閉氣為之氣通則止終而復始常行之眼能洞見又云導引畢以手按目四眥三九遍揑令見光明是檢眼神之道久為之得見神靈也摩手尉目出聖濟總録揑目四眥畢即用兩手側立摩掌如火開目尉睛數遍對修常居出聖濟總録內景經云常以兩手按眉後小穴中二九一年可夜書亦可於人中密行之勿語其狀眉後小穴為上元六合之府主化生眼暈和榮精光長珠徹瞳保錬目精是真人坐起之道一名真人常居真人所以能旁觀四達使八遐照燭者實常居之數名也紫微夫人曰仰和天真俯按山源天真是兩眉之角山源是鼻下人中也兩眉之角是徹視之津梁鼻下人中是引靈之上房俯按山源出聖濟總録紫微夫人云俯按山源是鼻下人中之本側在鼻下小谷中也楚莊公時市長宋來子灑掃一市常歌曰天庭發雙華山源障隂消清晨按天馬來指太清家真人無那隱又以滅百邪常歌此乞食一市無人解其語者宋來子西嶽真人馮延壽周宣王時史官也手為天馬鼻為山源每經危險之路廟兒之間心中有疑忌之意者乃先反舌內向咽津一二遍畢以左手第二指揑兩鼻孔下人中之本鼻中隔孔之內際也鼻中隔孔之際一名山源一名鬼井一名神池一名魂臺揑鼻因叩齒七遍又以手掩鼻手按山源則鬼井閉門手薄神池則邪根散分手臨魂臺則玉真守闕於是感激靈根走獸來衛千精震伏莫干我氣此自然之理也鼻下山根是一身之要津真邪之通府守真者所以遏萬邪在我運攝云耳營治城郭出聖濟總録消魂經云耳欲得數數仰左右令無數使人聽徹所謂營治城郭名書皇籍擊探天鼓出聖濟總録天鼓者耳中聲也舉兩手心緊掩耳門以指擊其腦中常欲其聲壯盛相續不散一日三探有益下丹田或聲散不續無壯盛者即元氣不集也宜整之拭摩神庭出聖濟總録真誥云面者神之庭髮者腦之華心悲則面黑腦減則髮素太素丹經云一面之上常欲得兩手摩拭之使熱髙下隨形皆使極匝令人面色有光澤皺班不生行之五年色如玉女所謂山澤通氣遵而行之手不離面乃佳也頴陽書云髮宜多櫛齒宜數叩液宜常咽氣宜常錬手宜在面此五者所謂子欲不死修崑崙矣上朝三元出聖濟總録真誥曰順手摩髮如理櫛之狀使髮不白以手乘額上謂之手朝三元固腦堅髮之道也頭四面以手乘順就結惟令多也於是頭血流散風濕不凝黃庭經云一面之神宗泥丸九真皆有房方圓一寸在其中下摩生門出聖濟總録黃庭經云兩部水王對生門生門者臍也關內氣鼓小腹令滿以手摩一周天櫛髮出聖濟總録榖神訣凡梳頭勿向北梳欲得多多則去風多過一千少不可數百仍令人數太極經云理髮法欲向玉池櫛之取多而不使痛亦可令侍者櫛之於是血液不滯髮根常堅太素經云櫛頭理髮欲得多過通流血氣散行風濕也數易櫛更畨用之亦可梳就結不須解髮也運動水土出聖濟總録真誥云食物過多多則生病飽食便卧卧則心蕩學道者當審之登真祕訣云食飽不可睡睡則諸疾生但食畢須勉強行步以手摩兩脅上下良久又轉手摩腎堂令熱此飬生家謂之運動水土即脾腎也自然飲食消化百脈流通五臟安和飬生論云以飢方食才飽即止每食後常服三黃丸又云養生人須絶欲節飲食導引般運行之三年自無疾病然後減榖食麵以遺榖氣漸漸胎息休糧從粗入細不可頓也申未之間時飲酒酒杯止飢代食酒能淘蕩隂滓得道之人熟榖之液皆所不廢酒能鍊人真氣靈劒子服氣經云酒後行氣易通然不可多極大吐反有所損吕公小成導引法臨江仙出余居士選竒方子後寅前東向坐瞑心卓齒三通瞑心即閉心存想兩目中如日月光也口中不出氣鼻中徴微出氣卓齒者乃鳴中炎齒三過也托天臨顧眼光摩托天乃兩手義向頭上托開去臨顧者謂微合眼想丹田如火摩者謂摩面上及用手背點津液㧓在目上也張弓仍踏弩張弓謂兩手如攀弓之狀升降轆轤多升降為隂陽升降也轆轤肩上下聳起各九轉也三度朝元九度轉三次咽津分為九咽以氣攻之丹田去也背摩雙擺攀拏要手摩腰腎精門九次也攀拏謂兩手互相伸縮是也龍虎交濟咽元和龍乃氣也虎乃津也氣厲陽津屬隂隂陽交錯入丹田之中浴身挑甲罷所謂浴身者乃遍摩身上想丹田火自下而上焚反遍身存想挑甲謂自手指印上歷至已復回寅上挑至已指下出也便可躡煙羅從此身輕夀永可漸入神仙之境界也普濟方卷二百六十六
