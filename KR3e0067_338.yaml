乃胞臟水少血多水出於外故現微腫則易生也宿有寒冷因所觸故令腹脹腫滿也妊娠自三月成胎之後兩足自腳面漸腫腿膝以下行步艱辛漸至喘悶飲食不美似水氣壯至於腳指間有黃水出者謂之子氣直至分娩方消此由婦人素有風氣或衝在二經有血風未可妄投湯藥亦恐大誤甚者慮將生之際費力有不則之憂故不可不治於未産之前也脾合土候肌肉土氣和平則能制水水自消化無有停積若妊娠脾胃氣虛經血壅閉則水飲不化濕氣隂溢外攻形體內注胞胎懷妊娠腫滿或傷胎氣如臨月而腳微腫者利其小便則病可愈方木通湯出聖惠方治妊娠身體浮腫心腹脹滿小便不通木通銼香薷桑根白皮銼各一兩木香訶梨勒皮黃芩各三兩枳殼去穰麩炒檳榔各半兩紫蘇莖葉半兩右粗搗篩每服四錢水一盞入生薑半分拍碎煎至六分去滓溫服食前日再當歸散出大全良方治胎前諸疾或因怒中氣沖子臟或沖脬脈腹急肚脹腰腹時疼不思飲食四肢浮腫氣急時喘大便忽難小便忽澀玉門忽腫當歸一兩赤茯苓枳殼白芍藥川芎各二兩川白薑炮木香煨粉草各半兩右㕮咀每服三大錢水一盞半生薑三片煎至八分去滓無時溫服如稟受氣弱及南人枳殼減半如氣實及北人於內加二分服服之或連日大便閉澀加蜜同煎八正散出危氏方治妊娠心氣壅胎氣八個月散墜手足浮腫急痛不安難産瞿麥銼木通銼去皮節滑石大黃銼麵裹煨切焙車前子右銼散服三錢水一盞茴香撮同煎熱服勝金散出濟生方小腹虛脹者何蓋飲食硬物傷胎胎既受病傳於脾胃氣虛冷逼小腹狀若奔豚或腰重大便閉澀兩脅虛鳴宜服勝金散和中下氣疾即安矣吳茱茰去枝梗酒浸炒陳皮去白乾薑川芎各一錢半厚朴去皮薑炒甘草炙縮砂仁炒各三錢右為細末每服二錢鹽湯調下不拘時候一方有木香無縮砂仁桑白皮湯出聖惠方治妊娠四肢腫滿小便不利喘促桑白皮銼一兩枳實去穰麩炒商陸各半兩澤㵼三分冬葵根赤茯苓去黑皮木香銼各一兩右粗搗篩每服四錢以水一盞半入生薑半分拍碎煎至八分去滓食前溫服以利為度鯉魚湯出大全良方治妊娠腹大胎間有水氣腳腫通身腫滿胸肚不分鯉魚一尾二斤生薑用五兩芍藥當歸各二兩白术五兩茯苓四兩右㕮咀以水一斗二升先煮魚熟澄清取八升內藥煎取三升分五服忌桃李雀肉鮓物等一方用陳皮少許同煎昔有妊娠腹脹小便不利吐逆諸醫雜進溫脾胃寬氣去脹等劑服之反致藥物不納轉加脹滿揍心驗之胎死腹中又服諸下胎藥不能通舉家憂惶因得鯉魚湯論曰腳腫俗呼為皺腳亦有通身腫滿心胸急脹名曰胎水證遂去心前衣服視之胸肚不分急以鯉魚湯三五服大小便皆下惡水腫消脹去方得分娩死胎可謂更生之人矣此證蓋緣懷身腹大娠不自知覺人人皆以謂身娠如此終不以為胎水病醫人何以得知故書此諭病家自當覺察也防己湯出聖惠方治妊娠通身浮腫喘息促小便澀防己大腹皮銼各三分桑根白皮銼紫蘇莖葉赤茯苓去黑皮各一兩木香一分右粗搗篩每服四錢水一盞入生薑半分拍碎煎至六分去滓食前溫服一方無大腹皮赤茯苓湯出聖惠方治妊娠身體浮腫心腹急滿小便赤澀及水腫赤茯苓去黑皮一兩白术旋復花各半兩木通杏仁湯浸去皮尖一兩黃芩炙三分右粗搗每服三錢匕水一盞入生薑半分拍碎煎至六分去滓食前溫服一方無木通用防己二兩不用薑煎茯苓丸出聖惠方治妊娠身體腫有水氣心腹脹滿小便澀喘息促赤茯苓去黑皮一兩郁李仁湯浸去皮研半兩檳榔銼半兩葶藶子炒令黃研三分枳殼去穰麩炒半兩白术炒三分右搗羅四味為末入二味同研令細煉蜜丸如梧桐子大每服二十丸煎桑白皮湯下一方加桑白皮名檳榔丸粥飲下天仙藤散出十便良方治妊娠足腫似水氣狀天仙藤洗略炒香附子炒陳皮甘草烏藥不須要天台者但得香而辣者良右等分淨稱為細末每服三錢水一盞薑三片木瓜三片紫蘇三葉同煎至七分放溫澄清食前服日三服小便利氣脈通體輕腫漸消更不須多服療妊娠身腫有水氣心腹脹滿小便少出大全良方茯苓四兩杏仁檳榔各三兩旋復花郁李仁各一兩右為粗末以水六升煮取三升去滓溫分三服小便通即止葶藶𣪚出大全良方療妊娠遍身紅腫葶藶子十分白术二錢茯苓二兩桑白皮二兩郁李仁八分右為粗末以水六升取二升分溫服小便利即瘥澤㵼湯出大全良方治妊娠經氣壅滯身體浮腫喘促大便難小便澀澤㵼桑根白皮銼木通枳殼去穰麩炒赤茯苓去黑皮檳榔銼各二兩右搗篩每服四錢匕水一盞半入生薑半分拍碎煎至八分去滓食前溫服稍利為度日再服腎著湯出三因方治妊娠腳腫痛茯苓白术各四兩乾薑甘草杏仁三兩右㕮咀每服四錢水一盞半煎至七分食前服五皮散出大全良方治胎水亦治尋常脾虛腫滿大腹皮桑白皮生薑皮茯苓皮橘皮各等分右㕮咀每服半兩水二盞濃磨木香一呷同煎至八分去滓空心溫服亦治男子脾虛腫滿一方無桑白皮有白术倍之名白术散治妊娠體腫有水氣心腹急滿出千金方茯苓白术各四兩一方無白术黃芩杏仁各二兩旋復花二兩右㕮咀以水六升煮取二升半三服忌桃仁雀肉鮓物寄生飲治妊娠遍身虛腫桑寄生一兩桑根白皮銼炒三分木香半兩大腹皮二分半紫蘇莖葉一兩右細銼如麻豆大拌勻每服三錢匕水一盞煎至七分去滓溫服桑白皮飲出聖惠方治妊娠四肢腫皮肉拘急小便不利桑根白皮銼炒一兩商陸根一兩半赤小豆三合羌活去蘆頭半兩右㕮咀如小豆大拌勻用水五盞入生薑七片同煮候豆熟濾去滓渴即飲汁並食豆小便利瘥一方無生薑名商陸湯豬苓散出聖惠方治妊娠身體浮腫腹脹小便不利渴引飲氣急豬苓二兩去黑皮紫蘇莖葉木通右搗細羅為散每服飲食以溫水調下二錢葵子散出聖惠方治妊娠身體浮腫小便不利灑淅惡寒葵子赤茯苓漢防己各一兩右搗羅為散每於食前以粥飲調下一錢商陸赤小豆湯一名赤小豆湯出危氏方治妊娠手足浮腫攣足赤小豆商陸各等分右㕮咀每服一兩水一碗煎至七分澄清汁服一方澤㵼一方無澤㵼一方有澤㵼桑白皮治妊娠從腳上至腹腫小便澀渴引飲出鮑氏方取豬苓五兩為末以熟水服方寸匕日三服燒稱錘方出肘後方治妊娠脹滿及妊娠卒下血方見諸血類治妊娠毒腫方出千金方用蕪菁根淨洗去皮搗酢和如薄泥勿令有汁猛火煮三四沸適性薄腫以帛急裹之日再易寒時溫服無根即用子若腫在咽中取汁含咽之又方出千金方用燒犍牛屎鮓和傅之乾則易亦可服方寸匕日三治妊婦兩腳浮腫名曰脆腳因脾衰不能制水血化為水所致用生料平胃散每服三錢薑煎服紫蘇湯服亦可治婦人身腫九月而瘖啞不能言者煎玉燭散二兩水半碗煎至七分去滓入蜜放溫時時呷之腰痛附論夫腎主腰足因勞傷動其經虛冷乘之則腰痛冷氣乘虛入腹則腹痛故令腹腰相引而痛其痛不止多動胎氣婦人腎以繫胞妊娠而腰痛甚者則胎墮也方五加皮散出聖惠方治妊娠腰疼痛不可忍或連胯痛先服此散杜仲四兩五加皮二兩阿膠炙防風金毛狗脊川芎北細辛白芍藥各二兩杏仁八十枚去皮炒萆薢三兩右㕮咀以水九升煮取二升去滓下阿膠作三服一方無芍藥生薑煎服續斷丸一名五加皮丸出聖惠方療妊娠二月三月腰痛不可忍者次服此丸續斷杜仲各十分芎藭獨活各三兩狗脊五加皮萆薢芍藥薯蕷訶子肉各八兩右為末煉蜜為丸如梧桐子大空心酒下四十丸日服三平胃散一名平安散治産前氣築刺兩脅疼痛方見咳嗽喘息類杜仲散出聖惠方療觸動胎不安以致腰痛背痛及臍腹內痛杜仲五加皮當歸芍藥川芎萆薢各三兩人參一兩半右細銼以水七升煮取二升半分溫三服無時防風湯治妊娠身痛防風去蘆炒藁本去蘆獨活去蘆細辛去葉甘草阿膠炒令燥右㕮咀每服三錢水一盞煎熱服之當歸散出大全良方療妊娠氣壅攻腰痛不可忍兼治腹痛二三月娠當歸三兩阿膠甘草各二兩蔥白一斤右細銼以水七升煮取三升去滓分溫五服無時大地黃丸治産前後腰腹疼一切血疼及治氣血虛四肢不舉骨體熱疼烏梅肉當歸各一兩熟地黃二兩右為細末煉蜜如彈子大丸每服一丸白湯嚼下空心大腹皮散治妊娠氣壅攻腰疼不可忍大腹皮銼郁李仁湯浸去皮尖微炒澤㵼各一兩右搗篩為散每服四錢水一盞生薑半分煎至六分去滓不計時候溫服治妊娠腰痛䜴二兩榆白皮三兩右熟搗蜜丸如梧桐子大服二十七丸亦治心痛溫酒亦可治妊娠腰痛不止方鹿角屑二兩微炒生乾地黃一兩半右搗細羅為散每于食前以溫酒調下二錢治妊娠腰痛用麻子三升以水五升煮取汁三分五服亦治心痛牛屎方治妊娠腰痛亦治心痛煩悶用燒牛屎焦末水服方寸匕日三服地黃酒治妊娠腰痛方見諸血類紫酒治妊娠腰痛如折亦治常人腰痛亦名聖酒方用大黑豆二合炒令香熟以酒一大盞煎取七分去豆空心頓服通氣散治妊娠腰痛狀不可忍此藥神妙用破故紙不拘多少瓦上炒令香熟為末嚼核桃肉半箇空心溫酒調下二錢療妊娠腰背痛反覆不得用鹿角長六寸燒令赤酒中淬再燒再淬以角碎為度取酒飲之為末服亦可治妊娠卒腰背痛如折以銀一兩水三升煎取二升飲之産前軟胯甘草生薑烏梅等分銼碎右用水一大盞煎至八分去滓服令胯軟産宫氣痛不攻作杜仲丸治衝任脈虛血海虛弱寒濕邪氣客摶胞絡妊娠腰痛小便牽連行步力弱艱于俯仰小便白濁晝夜頻併五加皮萆薢山茱茰二味各二兩杜仲四兩炒去絲阿膠粉炒珠子金毛狗脊炙去毛防風去蘆頭川芎細辛鹿角屑六味各二兩當歸洗焙生乾地黃各二兩右為細末蜜糊丸如梧桐子大每服三十丸溫酒送下或煎艾湯下空心食前服阿膠丸治妊娠胎臟受寒腰腹疼痛或因損動惡露頓下腹痛作陳香附子去毛天仙子炒令黑當歸洗焙各二兩五味子吳茱茰湯洗七遍各兩半阿膠蛤粉炒川芎乾薑炮各一兩蒼术三兩米泔水浸一宿焙乾右杵為細末醋煮麵糊為丸如梧桐子大每服三十丸煎艾湯下或木香醋湯下空心食前治妊娠腰痛不可勝舉兩足沈重行步無力臍腹痛不可忍杜仲去粗皮續斷茯苓川芎防風芍藥萆薢當歸各半兩枳殼切取青細辛各一分右細杵羅為末每服三錢水二盞二分同煎取一盞空心去滓喫蜜丸如梧桐子大早朝空心鹽湯下三十丸亦得普濟方卷三百三十八
