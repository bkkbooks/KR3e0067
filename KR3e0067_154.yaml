醫方大成治墜墮閃肭血氣凝滯腰痛者菴䕡子半兩没藥二錢半别研乳香二錢半别研杜仲去麄皮剉令絲斷補骨脂炒半兩葳靈仙洗去蘆半兩官桂不見火川當歸去蘆酒浸切焙各半兩右為細末酒糊丸如梧桐子大每服七十丸空心食前酒鹽湯任下大腹皮湯出聖恵方治䐴腰疼痛腹脇脹悶大腹皮三分剉桂心一分赤茯苓半兩赤芍藥半兩木香一分澤瀉三分枳殻半兩麩炒微黄去穣右為麄散每服四錢水一中盞入生薑半分煎至六分去滓每於食前温服治挫氣腰痛紅麯香附白芨乳香少許右為末用好酒食後調服桑寄生散出聖恵方治䐴腰痛疼及元藏虚冷桑寄生桂心鹿角屑微炒杜仲去皮麩炒㣲黄剉各一兩右為細散每於食前以温酒調下二錢㯽榔丸出聖恵方治䐴腰疼痛不能轉動㯽榔二枚牽牛子二兩微炒陳橘皮一分湯浸去白瓤焙食茱茰半兩右為末以稀餳為丸梧桐子大每於食前以温水下三十丸以利為効治䐴腰疼痛方出聖恵方菴䕡子一兩微炒甜𤓰子仁半兩微炒杜仲一兩去麄皮炙微炒剉右為細散每於食前以温酒調下二錢治䐴腰疼痛大便壅滯心腹閃痛方出聖恵方㯽榔三分木香一分川大黄半兩剉碎㣲炒右為散每於食前用生薑汁童子小便調下三錢以快利為度茴香酒出聖恵方治打墜凝瘀腰疼通用破故紙炒香茴香炒辣桂等分右為末每服二錢熱酒調食前進故紙主腰痛主行血治䐴腰疼痛久治不瘥方出聖恵方蛇床三兩鹿角膠一兩搗碎炒令黄燥右為麄散每服三錢水一中盞煎至五分去滓入酒二合更煎三兩沸每於食前温服治䐴腰疼痛不可㶸腰方出聖恵方桂心一兩附子半兩去皮臍生用右為細散以生薑汁調如稀糊塗紙上貼腰中立効治䐴腰腫痛展轉不得方出聖恵方附子一枚裂去皮臍羌活一分右為細散分為二服每於空腹以冷茶調服良久覺腰中煖為効治䐴腰中冷痛方出聖恵方硫黄一兩半細研針砂二兩右都研於銚子中煎熬過以冷水拌令得所用紙裹纒中冷痛處須臾腰中如火即瘥治䐴腰痛及䏶痛方出聖恵方棘針一升剉微炒鹿角屑二升微炒右以生絹袋盛用酒一斗於瓮瓶中浸七日後每於食前温一中盞飲之熟大黄湯出危氏方治墜閃腽腰痛不能屈伸打傷惡血瘀痛不可忍大黄切如豆大生薑各半兩右同炒令焦黄以水一大盞浸一宿五更去滓頓服天明所下如鷄肝者即惡物出即病止治挫氣腰痛出經驗良方猴香子去核四兩北茴香一兩微炒右為細末熱酒下不飲酒煎木香湯下治䐴腰腫痛展轉不得方用鹿茸四兩大火燒赤後入一升酒中淬如此五遍搗細羅為散每於食前以温酒下二錢療䐴腰出單方有血痛不可忍者病源云䐴腰者謂卒然損傷於腰而致痛也此由損血摶於背脊所為久不已令人氣自乏少面無顔色損腎故也右以桂心搗末以苦酒和塗痛處此令人喜卧可勤用之再為必瘥一方用桂節以好酒和塗治反腰痛又方出肘後方右以生地黄搗絞取汁三升煎得二升内蜜二升和煎之三五沸日服一升亦可一日盡三升以瘥止甚効治䐴腰痛出肘後方右為以生葛根嚼之嚥其汁多多益佳治䐴腰疼痛不可忍方出聖恵方􅒦砂一兩去皮為末右入釅醋二合攪令勻熬令稠次入茶末酌量拌和得所丸如梧桐子大每服於空腹以醋湯下三十丸晚食前再服治䐴腰連小腹膀胱痛方出聖恵方用巴豆半顆去皮猪腎一對去心中筋膜將巴豆入腎中以濕紙褁入於煻火中煨令熱去巴豆旋冷空腹服盡須臾以熱茶湯投之利下惡物當日見効茗葉丸出海上方治攻氣壅䐴腰痛轉動不得用煎茶五合投醋二合頓服治氣挫腰痛以一手按腰一手打噴嚏數箇氣行痛止又方用鹽炒茴香煎酒下七香丸卒腰痛論夫卒腰痛者為勞傷之人腎氣虚損故也腎主腰脚其經貫於腎絡於脊若風邪乗虚卒入腎經故卒然而腰痛也卒腰痛者謂氣脉凝滯經絡壅澁或舉重傷腰故卒痛也宜通行氣脉調順經絡平補腎臟則病可愈方杜仲湯出聖濟總録治動傷腰卒痛杜仲去麄皮酒浸剉炒桂去麄皮羌活去蘆頭椒去目并閉口者炒出汗秦芁去苖土石斛去根栝蔞根續斷五加皮剉炒牡丹皮芍藥當歸剉焙各半兩右麄搗篩每服三錢水一盞酒少許同煎至七分去柤温服不拘時桂心散出聖恵方治卒腰痛行立不得桂心一兩牛膝一兩去苗杜仲一兩去麄皮炙微黄剉五加皮三分獨活三分防風三分去蘆頭赤芍藥三分五味子半兩附子三分炮裂去皮臍右為細末每服四錢水一中盞入生薑半分煎至六分去滓每於食前温服桂心湯出聖濟總録治卒腰痛轉動艱難桂去麄皮牛膝去苗酒浸一宿剉焙芍藥當歸剉焙葳靈仙去土杜仲去麄皮酒浸剉炒芎藭大黄剉炒各一兩右麄搗篩每服二錢水一盞煎至七分去柤温服空心日午臨卧各一芎藭飲出聖濟總録治腎虛勞役腰卒痛芎藭丹參當歸剉焙細辛去苗葉桂去麄皮牡丹皮剉桃仁去尖雙仁炒各一兩大黄剉炒半兩右麄搗篩每服三錢水一盞半煎至一盞去柤温服空心日午臨卧烏頭丸出聖濟總録治腎虚寒冷傷腰氣血滯卒痛烏頭炮製去皮臍羌活去蘆頭牛膝去苗酒浸一宿剉炒㯽榔剉大黄剉炒木香各一兩芸薹子酒浸一宿研如膏一兩右為細末入研者藥和勻酒煮麵糊丸如梧桐子大每服二十丸温酒下空心日午臨卧各一服牡丹湯出聖濟總録治腰卒痛牡丹皮桂去麄皮續斷牛膝去苗酒浸一宿焙萆薢剉各一兩右麄搗篩每服三錢水七分酒三分同煎七分去滓温服不拘時候杜仲酒一名杜仲散出聖恵方療腰卒然痛病源云夫傷勞之人腎氣虛損而腎主腰脚其經冒腎絡脊裏虚風邪卒入腎經故卒然而腰痛也杜仲半觔丹參半觔桂心四兩細辛二兩芎藭五兩右切以酒一斗浸五宿隨多少飲之延年經心録同無桂心忌生葱生菜續斷散出聖濟總録治氣滯腰卒痛續斷葳靈仙去土剉炒桂去麄皮當歸剉焙各一兩右為散每服二錢温酒調下不拘時治卒腰痛不可忍出聖恵方狗脊一兩漏蘆一兩附子一兩炮裂去皮臍桂心一兩右為細散每服於食前以温酒下二錢又方出聖恵方附子一枚炮裂去皮臍木香半兩㯽榔半兩右為散每於食前以温酒調下二錢烙藥方治卒腰痛至甚起坐不得附子一兩生用吳茱茰一兩蛇床子一兩右為末每用半兩以生薑自然汁調如膏攤故帛上於痛處貼好用衣服繫定覺通熱即瘥未退再貼治卒腰痛連脚膝疼方出聖恵方胡麻三合新者附子一兩炮裂去皮臍右熬胡麻令香同搗細羅為散每於食前以温酒調下二錢治卒腰痛熨法方芫花半觔羊躑躅花半觔右以醋拌令濕炒令熱用帛裹分作兩包更畨熨痛處冷即復炒治卒腰痛暫轉不得用鹿角一枚長五寸酒二升燒鹿角令赤内酒中浸一宿飲之一方搗末酒服鹿茸尤佳大豆紫湯療卒腰痛拘急不得喘息若醉飽得之欲死者并治脇痛如打右用大豆一升熬令焦以好酒二升煮豆令熟隨多少飲勿至醉神効方治卒腰痛芸薹一兩右為末醋調塗於蠟紙上貼痛處覺劇即去之痛止普濟方卷一百五十五
