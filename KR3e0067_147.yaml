藥散施石菖蒲去毛川芎甘草藁本桑白皮乾葛木猪苓北柴胡各等分右為散每服五錢水一大盞加連鬚葱頭三個煎至七分如人行五里久再煎服鼈甲湯治天行病經七日以上熱勢彌固大便澁秘心腹痞滿食飲不下精神昏亂恍惚狂言浪語脉沈細諸狀之症一無可救鼈甲炙細辛桂心白术吳茱萸白鮮皮枳實炙茵陳各二兩生薑四兩附子一兩半焙大黄右切以水七升煑取二升六合去滓分三服如人行五里進一服忌生葱生菜莧菜猪肉桃李雀肉等時氣八九日論夫時氣病八九日以上不解者或是諸經絡重感之病或已發汗吐下之後毒氣未盡所以病不能除或一經受病未便相傳致使停滯累日病證不改皆當察其證候而治之也方前胡散出聖惠方治時氣八九日不解心腹堅滿身體疼痛内外有熱煩嘔不安前胡一兩去蘆頭半夏一兩湯洗七遍去滑黄芩三分麥門冬一兩去心枳殻三分麩炒微黄去瓤赤芍藥三分右為散每服五錢以水一大盞入生薑半分竹茹一分煎至五分去滓不計時候温服治時氣八九日煩躁壅悶喘麄方出聖惠方桔梗一兩去蘆頭甘草三分炙微赤剉麻黄一兩去根節黄芩三分麥門冬一兩去心杏仁一兩湯泡去皮尖雙仁麩炒㣲黄右為散每服五錢以水一大盞煎至五分去滓不計時候温服柴胡散出聖惠方治時氣八九日骨熱四肢煩疼背膞勞悶手足無力不能飲食柴胡一兩去苗黄耆一兩剉赤茯苓三分秦芁半兩去苗地骨皮半兩黄連三分去鬚葛根半兩剉枳殻半兩麩炒㣲黄去瓤甘草川大黄三分剉碎微炒鼈甲一兩半塗醋炙黄去裙闌右為散每服五錢以水一大盞煎至五分去滓不計時候温服鼈甲散出聖惠方治時氣八九日肢節疼痛熱毒不止乍寒乍熱乍劇乍輕發動如瘧鼈甲二兩塗醋炙微黄去裠闌知母烏梅肉微炒黄芩柴胡去苗地骨皮赤芍藥怕山牛膝去苗各一兩甘草半兩炙微赤剉右為散每服五錢以水一中盞煎至五分去滓不計時候温服黒奴丸出聖惠方治時氣八九日以後口乾狂語唯飲冷水麻黄去根節川大黄剉碎微炒川朴硝梁上塵竈突墨釜底墨小麥炒令黄色一兩右為散煉蜜和丸如彈子大每服不計時候以新汲水研下一丸服後更與新汲水任意飲之汗出為效時氣頭痛論夫時氣三陽受病猶在於表邪毒之氣攻注於外循於風府而入於腦故令壯熱頭痛胷膈壅滯其脉浮數者可發汗及吐即愈也方葛根散出聖惠方治時氣頭痛壯熱葛根一兩石膏二兩梔子仁柴胡去苗赤芍藥各一兩甘草半兩炙微赤剉右為散每服五錢以水一大盞入淡竹葉二七片煎至五分去滓不計時候温服聖濟總録用生薑一片棗一大枚煎無淡竹葉淋頂湯出聖惠方治時氣頭痛不可忍者石膏十兩搗碎梔子仁三兩竹葉一握甘菊花三兩豉心三合葱白十四莖切右以水六碗煮取三碗去滓内有觜瓶中稍熱淋注頂上治時氣頭痛壯熱絶甚者出聖惠方石膏二兩薺苨木通剉犀角屑各一兩甘草半兩炙微赤剉右為散每服五錢以水一大盞入竹葉三七片煎至五分去滓不計時候温服前胡散出聖惠方治時氣壯熱頭痛嘔逆不能飲食前胡去蘆頭知母犀角屑葛根剉赤芍藥各一兩石膏二兩右為散每服四錢以水一半盞入竹葉二十片生薑半分葱白七寸煎至六分去滓不計時候温服菊花散出聖惠方治時氣頭痛至甚及百骨節疼痛甘菊花麻黄去根節葛根剉黄芩各一兩羚羊角屑𤣥參梔子仁赤芍藥甘草右為散每服三錢以水一中盞煎至六分去滓不計時候温服治時氣二三日壯熱頭痛甚者出聖惠方以不蛀皂莢一梃去皮子以濕帋褁煨令焦黒搗細羅為散每服二錢以熱酒調下衣覆取汗仍先以白礬湯密室中浴後服之治時氣頭痛不止及治傷寒頭痛出聖惠方以川朴硝三兩為散用生油調塗頂上又方出聖惠方以梔子仁搗羅為散每服一錢以温水調下又方出聖惠方以東𤓰爛搗搨於疼痛處神効又方出聖惠方以石膏五兩為散研令極細每服不計時候以臘茶調下二錢參蘇飲出聖惠方治感冐發熱頭痛或因痰飲停積兼以胃熱並宜服若感冐發熱亦如服養胃湯法連進數服取微汗即愈若尚有餘熱更徐徐服之自然平治因痰飲發熱但連日頻進以熱退為期不可預止兼治中脘痞膈嘔逆惡心開胃進食及一切發熱咳嗽聲重涕唾稠粘此藥解肌熱寛中快膈或欲或勞療潮熱徃來小兒室女亦宜服之兼治發瘧木香半兩紫蘇葉乾葛洗半夏洗七次薑製炒前胡去苗甘草炙茯苓去皮人參各三分枳殻去瓤麩炒桔梗去蘆陳皮去白各半兩右㕮咀每服四錢水一盞半薑七片棗一箇煎至六分去滓微熱服不拘時候一方以氣盛者不用木香只十味參蘇敗毒散一名敗毒散出聖濟方治傷寒時氣頭痛項强壯熱惡寒身體煩疼及寒壅欬嗽鼻塞聲重風痰頭痛嘔噦寒熱並皆治之柴胡去苗甘草炙桔梗人參去蘆茯苓去皮芎藭枳殻去瓤麩炒前胡去苗洗羌活去苗獨活去苗各三十兩右為麄末每服二錢以水一盞生薑薄荷同煎至七分去滓不拘時寒多則熱服熱多則温服生薑薄荷各少許一方無獨活傷濕加白术脚氣焮赤熱重寒熱如瘧自汗惡風或無汗惡寒加大黄蒼术皮膚赤疹瘙痒加蟬蛻痢純下赤胃壯能食者與數服此方和劑方為末每服三錢匕三因方為散每服四錢匕今人或用四錢重非藥性凉自利及曽汗下脉虚手足冷者勿服心脇氣觸痛或發熱背寒者勿服七聖湯治時氣頭痛壯熱肢體煩疼麻黄去根節煎掠去沫炒焙三兩蒼术炒甘草炙二剉各兩橘皮湯浸去白焙木通剉山茵陳各一兩桔梗炒一兩半右麄搗篩每服三錢匕水一盞入生薑三片同煎至七分去滓温服防風散治頭痛壯熱惡風百節痠疼肩背拘急面赤虚煩聲重咳嗽厚朴薑製陳皮甘草炙藁本各二兩桔梗炒三錢獨活防風蒼术折去皮四兩右為細末每服三錢以水一大盞薑三片棗二枚煎至七分温服沸湯㸃亦可春夏宜用之羌活散治四時傷寒頭痛鼻塞或流清涕項背拘急惡風自汗柴胡四兩白芷川芎藁本各一兩桔梗甘草獨活羌活各半兩右㕮咀每服三錢以水一中盞半葱薑煎至七分熱服治傷寒及時氣温病頭痛壯熱脉盛始得一日用黄丹塗身令遍向火坐令汗出治傷寒時氣温病頭疼壯熱脉盛取生蘘荷葉根合搗絞汁服三四升山茵陳散治時行身熱頭痛四肢痠痛山茵陳四兩石膏碎研一兩麻黄去根節煎掠去沫焙一兩蒼术米泔水浸一宿去皮作片炒三兩右為散每服二錢匕熱葱茶清調下連併三服衣覆取汗五解湯治時氣頭痛五心煩熱語言狂亂麻黄去根節煎去沫二兩越桃一半生一半熟各一兩白术桔梗炒石膏碎杏仁去皮尖雙仁炒右麄搗篩每服三錢匕水一盞生薑三片豉七粒葱白一寸薄荷五葉同煎至七分去滓熱服如欲出汗併煎兩服衣被蓋覆瘥茵陳麻黄散治時氣頭痛壯熱或暑毒伏心狀如瘧疾山茵陳四兩麻黄去根節煎去沫焙五兩石膏碎一兩蒼术水浸去粗皮蜀椒去目并閉口者炒出汗各二兩右為細散每服二錢匕㸃茶調下如狂言熱躁沙糖冷水調下麻黄大黄散治時氣頭痛壯熱三日内宜服麻黄去根節一兩大黄剉桂去粗皮芍藥黄芩去黒心甘草炙剉乾薑炮各半兩右為散每服三錢匕暖酒調下衣被蓋取汗石膏湯治時行疫癘病壯熱頭痛唇乾石膏碎一兩葛根剉三分芍藥貝母百合升麻各半兩梔子仁甘草炙各一分右麄搗篩每服三錢匕水一盞半豆䜴五十粒葱白三寸同煎一盞去滓温服豉尿湯治天行熱氣頭痛骨月酸疼壯熱等疾若初病一日在毛髪二日在皮膚三日在肌肉必未得汗利且宜進此湯豉葱白切各一升小便三升童子者為佳右先熬豉及葱白令相得則投小便煮取一升澄清及熱頓服或汗或利但得則瘥如未歇依前更進一劑頻用有効如不除進柴胡湯麻黄陳者去根節甘草炙各二兩柴胡黄芩乾葛各三兩石膏五兩碎綿褁豉七合綿褁三沸葱白根切一升勿令有青夏青即熱白即冷一作桑根皮右切以水九升宿漬藥明旦先煮麻黄令沸掠去上沫然後并諸藥煮取二升七合分三服服别相去三食頃久覆取汗汗出以粉拭之惡寒多加桂心一兩忌海藻松菜等治傷寒時氣温病方及頭痛壯熱脉大始得一日取小蒜根葉合搗三升許和真丹一兩水一升合煮絞取汁頓服之得吐便瘥若重一升盡服厚覆取汗即瘥又方用小蒜一升搗取汁三合頓服之不過再作便瘥又方用烏梅二七枚鹽五合以水三升煮取一升去滓頓服之神明白术散出活人書治瘟疫病頭痛壯熱惡寒不解白术剉炒附子炮製去皮臍各二兩桔梗細辛去苖葉各一兩烏頭炮製去皮臍四兩右為散以絹囊盛帶之居閭皆無病有病疫癘者温酒服方寸匕覆取汗或得吐即差若經三四日抄三錢匕水二盞煎一盞半去滓分温三服治時氣頭痛壯熱方見本門時氣一日頭痛壯熱方時氣譫語論夫時氣熱毒攻心則心神煩亂陽氣大盛遂譫言目赤心煩不得睡卧精神驚悸言語失常毒氣不除腸中結燥其脉洪數者是其候也方秦芁散出聖惠方治時氣熱毒躁悶譫言口舌乾渴不止秦芁去苗黄芩木通剉犀角屑梔子仁𤣥參藍葉麥門冬去心桔梗去苗頭各一分甘草炙微赤分剉各三赤芍藥白鮮皮散出聖惠方治時氣大熱悶亂譫言白鮮皮犀角屑川升麻大青甘草炙微赤剉各一兩右為散每服五錢以水一大盞煎至五分去滓不計時候温服治時氣譫語欲走出聖惠方生雞子白一枚川芒硝一兩細研生甘草末一錢右以井華水一中盞攪令匀吹去沫不計時候服之生地黄飲子出聖惠方治時氣心膈大熱煩悶言語失度生地黄三兩𤣥參赤茯苓各一兩麥門冬二兩去心犀角屑一兩甘草半兩炙微赤剉右細剉和匀每服半兩以水一大盞煎至五分去滓不計時候温服治時氣煩熱如火譫語欲走出聖惠方人參去蘆頭甘草炙令微黄各一兩右為散每服一錢以新汲水調服須臾更令病人多飲冷水得吐之為效猪苓散出聖惠方治時氣但譫言煩躁不安猪苓去黒心白鮮皮澤㵼赤茯苓大青各三分麥門冬一兩去心焙川大黄三分甘草半兩炙微赤剉右為散每服不計時候以新水調下三錢犀角丸出聖惠方治時氣熱毒在臟譫語口乾煩燥犀角屑梔子仁川大黄剉碎微炒鐵粉細研馬牙硝各一兩甘草三分炙微赤剉右為末煉蜜和丸如梧桐子大每服不計時候以温竹葉湯下三十丸大黄丸出聖惠方治時氣大熱不退譫語大便難川大黄二兩剉碎微炒黄芩猪芩去黒皮犀角屑枳殻麩炒微黄去瓤川朴硝各一兩右為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以麥門冬湯温温下三十丸水利散出千金方治天行病煩熱如火狂言妄語欲走白芷一兩甘遂二兩熬右二味搗篩以水服方寸匕須臾令病人飲冷水滿腹則吐之小便當赤色也一名濯腹湯此方療大急者治天行壯熱狂言謬語五六日者鷄子三枚芒硝方寸匕井花水一杯右三味合攪盡服之心煩下即愈水導散治時氣病煩熱如火狂言妄語欲走甘遂半兩白芷二兩大黄四兩厚朴八兩枳實五枚芒硝三合右四味㕮咀以水一斗先煮厚朴枳實取五升去滓内大黄煎取二升去滓芒硝更煎一兩沸分再服得快利止普濟方卷一百四十八
