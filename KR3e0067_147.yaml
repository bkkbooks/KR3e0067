body:
  text: 普濟方卷一百四十八明周王朱橚撰時氣門總論易稱天地變化各正性命然則變化之迹無方性命之功難測故有炎涼寒燠風雨晦冥水旱妖災蟲蝗怪異四時八節種種施化不同七十二候日月運行各别終其度方得成年是謂歲功畢矣天地尚且如然在人安可無事故人生天地之間命有通塞時有否泰吉凶悔吝苦樂安危喜怒愛憎存亡憂畏關心之慮日有千條謀身之道時生萬計乃度一日是故天無一歲不寒暑人無一日不憂喜故有天行瘟疫病者即天地變化之一氣也斯蓋造化必然之理不得無之故聖人雖有補天立極之德而不能廢之而能以道御之其次有賢人善於攝生能知撙節與時推移亦得保全天地有斯瘴癘還以天地所生之物以防備之命曰知方則病無所侵矣然此病也俗人謂之橫病多不解治皆曰滿日自差以此致枉者天下大半凡始覺不佳即須救療迄至於病愈湯食競進折其毒勢自然而差必不可令病氣自然恣意攻人拱手待斃斯為誤矣夫天時氣病者是春時應暖而反大寒夏時應熱而反大涼秋時應涼而反大熱冬時應寒而反大溫者此非其時而有其氣是以一歲之中病無長少率多相似者此則時行之氣也從立春節後其中無暴大寒又不冰雪而人有壯熱為病者此屬春時陽氣發於冬時伏寒變為溫病也從春分以後至秋分節前天有暴寒者為時行寒疫也一名時行傷寒此時節候有寒傷於人非觸冒之過也若三月四月或有暴寒其時陽氣尚弱為寒所折病熱熱猶小輕也五月六月陽氣已盛為寒所折病熱則重也七月八月陽氣已衰為寒所折病熱亦小微也其病與溫及暑病相似但治有殊耳問一歲之中長幼病狀多相似此名溫疫也四時皆有不正之氣春夏亦有寒清時秋冬或有暄暑時人感疫癘之氣故一歲之中病無長少率相似者此則時行之氣俗謂之天行是也老君神明散務成子螢火丸敗毒散冬氣溫春氣寒夏氣冷秋氣熱為時氣與傷寒同而治有異者蓋因四時不正之氣而變更不拘以月數淺深吐下隨證施行若春應暖而清氣折之則責邪在肝三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕升麻散解肌湯主之夏應暑而寒氣折之則責邪在心五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微調中湯射干湯半夏桂枝甘草湯可選用也秋應涼而反大熱抑之則責邪在肺溫熱相薄民多病瘴黃也宜白虎加蒼术湯煎茵陳汁調五苓散冬應寒而反大溫折之則責邪在腎其冬有非節之暖者名為冬溫此屬春時陽氣發於冬時則伏寒變為溫病宜萎㽔湯仲景云冬溫之毒與傷寒大異蓋傷寒者傷寒氣而作冬溫者感溫氣而作寒疫者暴寒折人非觸冒之過其治法不同所施寒熱溫涼之劑亦異不可拘以日數發汗吐下隨證施行要之治熱涼以寒溫而行之治溫以清冷而行之治清寒以熱涼而行之治清以溫熱而行之以平為期不可以過此為大法也然得時行病一日在皮毛當摩膏火灸愈不解者二日在膚可法針服解肌散汗出愈不解者三日復發汗若大汗則愈不解者止勿復發也四日在胸服藜蘆丸微吐之愈若病固服藜蘆丸不吐者服赤小豆瓜蒂散吐之即愈視病者尚未了了復一法針之當解不愈者六日熱已入胃乃與利湯下之愈百無不如意但當諦視節度與病耳若食不消病亦與時行病俱發熱頭痛食病當速下之時行病當待六七日下之時行病始得一日在皮二日在膚三日在肌四日在胸五日入胃乃可下也熱在胃外而下之則熱乘虛便入胃然病要當復下去之不得留於胃中也胃若實熱致此為病三死一生此輩皆多不愈胃虛熱入爛胃也其熱微者赤斑出劇者黑斑出赤出者五死一生黑斑出者十死一生但論人有強弱病有難易功效相倍耳病者過日不以時下之熱不得泄亦胃爛斑出矣若得病無熱但狂言煩躁不安精采言語與人不相主當者勿以火迫之但以豬苓散一方寸水和服之當以新汲冷水令強飲一升若一升半可至二升益佳以指刺喉中吐之隨手愈不即吐者此輩病多不善勿強與水水停即結心下也更當以餘藥吐之皆令相主當者不爾必危若此病不急以豬苓散吐解之者其死殆速亦可先以去毒物及法針之尤佳又云此病方家呼為傷寒有二種有隂有陽隂傷寒者反於陽是也陽傷寒狀表裏相應心熱則口乾苦肝熱則放赤暈脾熱則谷道稍澀腎熱則耳熱赤肺熱則鼻乾渴胃熱則嘔逆大腸熱則大便祕澀小腸熱則小便赤少皮膚熱則脈洪數身體熱反此者乃隂傷寒夫傷寒者則為寒所傷也寒主隂隂主殺凡人隂陽調則無病氣既為寒所傷便致斯病也又云隂陽傷寒者則毒氣傷隂陽氣也人身中有隂陽之氣隂陽者則寒熱也本以隂為毒所傷則不能流行陽熱獨王故天行多熱者也此病於諸病之中最為難療隂陽二病隂尤可憂耳時聞有此病而倉卒死者不少或由證候不能精審方藥未達指歸飲食乖宜寒溫失節故致爾自心不全甄别他醫難得精妙與其療也寧可任之但能滋味適寒溫將理中間冷暖守過七日此最為得計其中事須服藥不可徒然者唯多日大便不通暫須一轉泄耳又時氣病一日太陽受病太陽為三陽首主於頭項故得病一日頭項腰脊痛又時氣二日陽明受病陽明主於肌肉其脈絡鼻入目故病二日內熱鼻乾不得眠夫諸陽為表表始受病皮膚之間故可摩膏火灸發汗而愈又時氣病三日少陽受病少陽脈循於脅上於頸耳故得病三日胸脅熱而耳聾也三陽經絡始相傳病未入於臟故可汗之而愈又時氣四日太隂受病太隂為三隂之首是知三日已後諸陽受病訖即傳之於隂而太隂受病焉其脈主於咽嗌故得病四日腹滿而嗌乾其病在胸膈故可吐而愈也又云夫得病四日毒在胸膈故宜取吐有得病二三日便即煩滿此為毒氣已入或有五六日已上毒氣猶在上焦者其人有痰實故也所以復宜取吐也又時氣五日少隂受病少隂脈貫腎絡肺係於舌本故得病五日口熱舌乾渴而引飲其病在腹故可下而愈又時氣病六日厥隂受病厥隂脈循隂器絡於肝故得病六日煩滿而囊縮也此為三陽三隂俱受病毒氣入於腸胃故可下而愈又時氣病七日法當小愈所以然者陽隂諸經傳病竟故也今病不除者欲為再經病再經病者謂隂陽諸經重受病也又時氣病八九日以上不解者或是隂陽諸經重受於病或已發汗吐下之後毒氣未盡所以病不能除或一經受病未即相傳至于停滯纍日病證不改者故皆當察其證而治之凡病傷寒而成溫病者先夏至日者為病溫後夏至日者為病暑故曰冬三月早卧起必待日光使志若伏若慝若有私意若己有得去寒就溫無泄皮膚使氣亟奪又因於寒欲如運樞故冬傷於寒春必病溫也又有冬時傷非節之暖名為冬溫之毒與傷寒大異也有病溫者乃天行之病耳其冬月溫暖之時人感乖候之氣未即發病至春或被積寒所折毒氣不得泄至天氣暄熱溫毒始發則肌肉斑爛也經曰虛邪賊風避之有時恬淡虛無真氣從之精神內守病安從來故曰人清淨則肉腠閉拒雖有大風苛毒弗之能害又云四時隂陽者萬物之根本也是以聖人春夏養陽秋冬養隂以從其根也從隂陽則生逆之則死故曰精者身之本藏於精者春不病溫也有病溫汗出輒復熱而脈躁病不為汗衰狂言不能食病名為何曰病名隂陽交交者死人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉之間而得汗者是邪却而精勝也精勝則當能食而不復熱熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精氣竭而病留者其壽可立而傾也汗出而脈尚躁盛者死今脈不與汗相應此不勝其病也其死明矣狂言者是失志也失志者死今見三死不見一生雖愈必死凡膚熱其脈盛躁者病溫也其脈盛而滑者汗且出也凡溫病人三二日身軀熱脈疾頭痛飲食如故脈直疾八日死四五日頭痛脈疾喜吐脈來細十二日死此病不療八九日脈不疾身不痛目不赤色不變而反利脈來牒牒按不彈手指時時大心下硬十七日死病三四日已下不得汗脈大疾者生脈細小難得者死不療也下利腹中痛甚者死不療也凡熱病新差及大病之後食豬肉及腸血肥魚油膩等必大下痢不能療也必至於死若食餅餌萊黍飴脯鱠灸棗栗諸果及堅實難消之物胃氣尚虛弱不能消化必更結熱適以藥下之則胃中虛冷必大利難禁不下必死下之必危皆難救也熱病之後多坐此死不可不愼也病新差但得食糜弱寧可少食令飢慎勿飽不得他有所食雖思之勿與計日轉久可漸食羊肉糜若羮汁雉鹿肉愼不可食豬犬肉也新差後當靜卧愼勿令人梳頭洗面非但體勞亦不可多言語用心使意勞凡此皆令勞復故督郵顧子獻得病已差未健詣華敷視脈敷曰雖差尚虛未復陽氣不足勿為勞事餘勞尚可御內即死臨死當吐舌數寸其妻聞其夫病除從百餘里省之宿交接中間三日發舌出數寸而死病新差未經百日未得氣平復而行房室大略無不死者蓋正疾愈後六十日已能行射獵行房室則吐涎而死凡熱病房室名為隂陽易之病皆難療多死近者有士大夫小得傷寒發汗已十餘日能乘馬行來自為平復故以房室則小腹急痛手足拘拳而死深師説天行病未復強食黃花菜手足稍重一方云青花天行病差食雞魚必變成疷又食雞魚肉結氣不化天行病差飲酒合隂陽復必死天行病差未滿三月食鯔鱔肉則復下血食鹽豉令人四支不舉天行病差食諸菜有花者三年肌膚不充天行病未好食生瓜芥菜三月浮腫也天行病差食菜合隂陽復必死千金天行病差後未滿五日食一切肉麵者病更發困天行病差食芥鱔發病天行病差新起飲酒及食韭菜病更發天行病差食生魚作下利必不止天行病食生菜顔色絶身不平復天行病新汗解飲冷水者損心包令人虛不復天行病未復食犬肉并葫以合食之復則死天行病差食生棗及羊肉者腸腹作熱蒸天行病新差食犬肉食羊肉作骨中蒸熱天行病差食魚肉并瓜生菜者令人身腫天行病食蒜者病發大困問曰傷寒溫病何以辨脈答曰溫病冬傷於寒所得也至變為溫病傷寒汗下不愈而過經其證尚在而不除者亦溫病也經曰溫病之脈行在諸經不知何經之動隨其經所在而取之如太陽證汗下後過經不愈診得尺寸俱浮者太陽溫病也如身熱目疼汗下後過經不愈診得尺寸俱長者陽明溫病也如胸脅痛汗下後過經不愈診得尺寸俱弦少陽溫病也如腹滿嗌乾診得尺寸俱沈細過經不愈者太隂溫病也如口燥舌乾而渴診得尺寸俱沈過經不愈者少陽溫病也如煩悗囊縮診得尺寸俱微緩過經不愈者厥隂溫病也是故隨其經而取之隨其證而治之如發斑乃溫毒也又云黃帝曰傷寒熱病死候有九太素云不可刺者九一曰汗不出大熱發噦者死太素云汗不出大熱發噦者死二曰泄而腹滿甚者死甚一作黃三曰目不明熱不己者死四曰老人嬰兒熱病腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不己者死七曰咳而衄汗不出出不至足者死八曰體熱者死九曰熱而痙者死熱病痙者腰反折瘈瘲齒噤齘也熱病七八日脈微小病者便血口中乾一日半而死脈代者一日死熱病七八日脈不躁不數後三日有汗三日不汗四日死熱病己得汗而脈尚躁盛此隂脈之極也死其得汗而脈靜者生熱病脈常盛躁而不得汗者此陽脈之極也死脈盛躁得汗者生疫癘傳染老幼皆相似調治一也寸虛弱尺弦緊或肝脈濡細是雖責邪四時然發汗吐下條例通行故曰明知順逆正治從治不外隂陽表裏條例通行固也然其毒癘之氣藴畜于中亦隨其溫涼權其輕重而利導之庶毒有所泄則易為力也病源云挾毒癘之氣狀熱煩毒發為心腹脹滿若不治春感清邪在肝升麻葛根湯解肌湯夏感寒邪在心調中湯射干湯半夏桂枝甘草湯秋感熱邪在肺白虎加蒼术湯發黃疸茵陳調五苓散冬感溫邪在腎亦名冬溫萎㽔湯土無正行因火而名當隨經取之此大槩然耳寒證者聖散子螢火丸神明散可選用聖散子內用木附豆䓻良羌只可施之寒濕毋惑於通用之説凡溫病可針刺五十九穴又身之穴六百五十有五其三十六穴灸之有害七十九穴刺之有災時氣一日論夫時氣一日太陽受病太陽為三陽之首而主於頭項故得病一日頭項腰脊皆痛也方解肌散出聖惠方治時氣一日頭痛壯熱四肢煩疼麻黃一兩去根節川升麻一兩石膏一兩甘草半兩炙赤微銼赤芍藥一兩貝齒三枚杏仁一兩湯浸去皮尖雙仁麩炒微黃右搗粗羅為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候熱服衣覆取汗便食豉粥補虛桂枝散出聖惠方治時氣一日頭痛壯熱骨節疼痛桂枝黃芩麻黃去根節各三分石膏一兩右為散每服五錢以水一大盞入生薑半分棗三枚煎至六分去滓不計時候熱服衣覆取汗解表石膏散出聖惠方治時氣一日頭項腰脊痛惡寒石膏二兩豉二合葛根二兩白术二兩桂心一兩麻黃一兩去根節白芷芎藭當歸微炒銼各一兩右為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候熱服衣覆取汗葛根散出聖惠方治時氣一日壯熱心神煩躁頭痛四肢不利葛根銼赤芍藥麻黃去根節黃芩石膏各一兩大青甘草各半兩炙微赤銼右為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候熱服衣覆取汗治時氣一日頭痛壯熱方出聖惠方取生葛根淨洗搗取汁一大盞內䜴一合煎至六分去豉不計時候分為二服有汗即差未得汗即任服若心中熱加梔子仁十枚內葛根汁中同煎去滓服之治時氣一日初覺便宜發汗方出聖惠方用麻黃二兩去根節以水三大盞煮麻黃去沫取汁一盞半去滓後入米一匙䜴汁二合煮為稀粥不計時候頓服衣覆取汗法導引法云清旦初起以左右手交互從頭上挽兩耳夆又引鬢髮即流通令頭不白耳不聾又摩手掌令熱以摩面從上下二七止去腳氣令面有光又摩手令熱從體上下名曰乾浴令人勝風寒時氣寒熱頭痛百病皆愈時氣二日論夫時氣二日陽明受病陽明主於肌肉其脈絡於鼻入於目故得病二日內熱鼻乾不得眠也夫諸陽在表表始受病故可摩膏火炙發汗而愈也方水解散出聖惠方治時氣二日頭痛壯熱心躁麻黃去根節用二兩川大黃銼碎微炒黃芩桂心甘草炙微赤銼赤芍藥各一兩右為散每服不計時候以溫水調下二錢良久再服未服藥前先以熱湯淋浴後便服此藥衣蓋取汗重者不過三服強實人服二方寸匕此調風實之人三伏中宜用之若去大黃即春夏用之治時氣二日壯熱頭痛宜服此方出聖惠方甘草一兩炙微赤銼生薑三分􅌝􅌣一顆大者取瓤去子于碗內盛之右先將生薑甘草用無灰酒一大盞煎取六分去滓熱入􅌝􅌣碗中絞取汁不計時候分溫二服柴胡散出聖惠方治時氣二日壯熱增寒頭痛腰脊強重柴胡去苗麻黃去根節各一兩葛根三分銼桂心二分甘草一分炙微赤銼右為散每服四錢以水一中盞入豉五十粒薄荷二七葉煎至六分去滓不計時候先喫粥少許後以熱水淋浴然後服此藥衣覆取汗梔子散出聖惠方治時氣二日頭痛背強身熱惡寒梔子仁黃芩各一兩石膏二兩葛根銼兩杏仁湯浸去皮尖雙仁麩炒微黃用一兩甘草半兩炙微赤銼右為散每服五錢以水一大盞入蔥白二莖豉五十粒煎至五分去滓不計時候熱服衣覆取汗葛根散出聖惠方治時氣二日頭背痛強心煩壯熱葛根銼麻黃去根節犀角屑各一兩右為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候熱服衣覆取汗三物湯治天行病經一二日覺身體壯熱頭痛骨肉酸楚背脊強口鼻乾手足微冷小便黃赤此是其候若如此宜先合煮桃栁葛湯浴之桃枝細切五斗栁葉細切五斗酢醬水一斗右先以水一石煮桃枝栁葉二物取七斗汁去滓內醋醬水覺帶熱以浴浴訖拭身體令乾以粉摩之勿觸風則於密處刺頭眼後兩邊及舌下血斷以鹽末厭刺處則入被卧又後服解肌乾葛等五物飲微覆取汗如病根輕者因此或歇葛根切五合蔥白切一升生薑切二合䜴心一升綿裹粳米二合研碎右切以水五升煮取汁豉心以上四味取三升半汁去滓內粳米屑煮令米爛帶熱頓啜候盡微覆取汗無所忌又依前浴等法不覺歇宜更作雞子湯重泄之新殼雞子五枚各破頭㵼置一盞中别加一雞子水以筯攪令極渾别用水一升煮極沸則投雞子於湯中微攪才似熱則㵼置碗中內少醬清以變腥氣帶熱啜令盡覆使汗出又依前雞子湯出汗汗泄當歇如不覺退合梔子等六味散以下之梔子三十枚乾葛五兩茵陳二兩蜀升麻三兩大黃五兩芒硝五兩右切合搗為散以飲服三方寸匕服之須臾當覺轉則利也如經一兩食頃不利且以熱飲投又不利即須更服一方寸匕還以飲投得利為度後適寒溫將息無須服此也又依前梔子等六味散取利復不覺退加嘔逆食不下口鼻喉舌乾燥宜合生蘆根八味飲子細細服之生蘆根切一升生薑五兩人參二兩知母二兩生麥冬二升去心烏梅十顆白蜜一合竹瀝三合右切以水八升煮取三升去滓內蜜瀝等攪調細細飲不限遍數冷暖亦不限食前後服此飲子雖不能頓除熱病然於諸症不覺有加體氣安穩心復不冷意又欲得此飲任重合但依前服之如熱勢不退心腹妨滿飲食漸少心上痞結則不可重服之又依前生蘆根等八味飲