body:
  text: 普濟方卷四十四明周王朱橚撰頭門總論夫人頭者諸陽之所聚諸隂脈皆至脛而還獨諸陽脈皆上至頭耳則知頭面皆屬陽部也且平居之人陽順於上而不逆則無頭痛之患陽逆於上而不順衝壅於頭故頭痛也風寒在腦邪熱上攻痰厥腎厥氣虛氣攻皆致頭痛但氣虛氣攻頭痛愈而復作延引歲月者多有之矣偏正頭風婦人氣盛虛産後失血過多氣無所主皆致頭痛惟蝎附丸治氣虛氣攻頭痛尤合造化之妙其間所用附子取其助陽以扶虛鍾乳取其補陽以鎮墜全蝎取其鑽錐之義蔥涎則取通行其氣湯使用以椒鹽蓋椒能下逹鹽能引用使虛氣歸於其下對證用之無不作效者矣頭者諸陽之會上丹産於泥丸宫百神所集凡頭痛者乃足太陽受病上連風府眉角而痛者皆可藥愈或上穿風府陷入于泥丸宫而痛者是為真頭痛不可藥愈夕發旦死旦發夕死責在根氣先絶也原其所因有中風寒暑濕而痛者有氣血飲食厥而痛者有五臟氣鬱厥而痛者治之之法當先審其三因三因既明則所施無不切效夫頭風者亦有陽氣虛弱及當風取涼外傷陽經致頭目昏痛眩不能起或頭皮腫癢或兩太陽血穴痛眉稜骨痛嘔吐不可食起則頭眩或泥丸冷痺皆頭風證也頭面風者是體虛陽經脈為風所乘也諸陽經脈上走於頭面運動勞役陽氣發㵼腠理開而受風謂之首風病狀頭面多汗惡風病甚則頭痛又或新沐中風則為首風又沐未乾不可以卧使頭重身熱反得風則煩悶診其脈寸口隂陽表裏互相乘如風在首久不差則風入腦遂變為頭眩養生云飽食仰卧久成氣病頭風又云飽食沐髮作頭風又云夏不用露面卧露墜面上冷面皮厚致成癬有一種腦㵼亦緣風邪入於髓海凝滯不散化為膿輕則黃膿濁涕重則敗壞臭穢不可聞久而頭虛昏重莫舉亦能致斃者治之之法不與頭風相類當用活血去膿補虛方可用內托散加川烏乾薑以酒調服仍用附子建中湯補虛更灸𩕄會天穴左漏灸左右漏灸右脈訣云頭痛短澀應須死浮滑風痰皆易除頭痛附論夫諸陽之脈皆上行於頭面若人氣血俱虛風邪傷於陽經入於腦中則令頭痛也又有手三陽之脈受風寒伏留而不去者名厥頭痛厥者逆也言其脈厥逆而不順行逆壅而衝於頭故也又有入連在腦痛甚手足冷者名真頭痛由風寒之氣循風府入於腦中故云入連在腦則痛不可療又有風熱痰厥氣虛腎厥皆令人頭痛也方防風散出聖惠方治上焦風壅頭痛口乾煩熱防風一兩去蘆頭甘菊花一兩赤芍藥一兩石膏四兩葛根二兩銼柴胡二兩去苗蔓荆子一兩甘草一兩炙微赤銼杏仁一兩湯浸去皮尖雙仁麩炒微黃右搗篩為散每服四錢以水一中盞入生薑半分煎至五分去滓入竹瀝半合更煎二三沸不計時候溫服忌炙煿熱麵大蒜等上清散御藥院方治頭痛眉骨痛眼痛不可忍者川芎鬱金芍藥荆芥穗芒硝各半兩乳香沒藥薄荷葉各一錢腦子半錢右為細末每用一字鼻內搐之人參順氣散活人方治頭痛憎寒壯熱四肢疼痛麻黃去節一兩半乾葛甘草炙白术人參桔梗去蘆香白芷各一兩白薑炮片半兩右為末每服三錢水一盞薑三片蔥白二寸同煎連進取汗摩頂散一名附子摩頂散治風毒攻腦疼痛方見首風類麝香茶芽散治頭疼不已諸藥不效者茶芽一兩川芎細辛荆芥川烏甘草已上各半兩麝香少許右為粗末每服三錢水一盞半煎至八分去滓溫服食後神芎丸出危氏方治一切頭痛昏眩利咽膈能令遍身結滯通呻除痰飲解諸熱大黃黃芩各二兩黑牽牛炒白滑石各四兩黃連大川芎薄荷葉各半兩右為末水丸如小豆大溫水下十丸至十五丸日三服或煉蜜丸亦可六神散治頭痛眼睛痛馬芽硝研雞蘇芎藭各二錢石膏研乳香研龍腦研一字右為細末每用一字含水搐鼻中芎藭湯治頭疼痛芎藭五兩細辛人參一兩半甘草炙三分半夏麴一分用生薑和半夏末作麴用右㕮呾如麻豆每服三錢水一盞生薑三片薄荷五葉同煎至七分去滓溫服不拘時候芎辛湯出三因方治一切頭疼但發熱者不宜服其餘痰厥飲厥腎氣氣厥等證偏正頭疼痛不可忍者只以此藥并如聖餅子服之不拘病退但多服自能作效若氣虛年高之人仍服養正丹黑錫丹并用此藥調鍾乳粉間服諸證頭疼緊健之法無以踰此但頭疼多用石膏蓋取其能墜痰飲然恐性寒故以鍾乳粉代之腎厥頭疼尤得其治或疑鍾乳粉煅煉之藥則凡軟石膏煅過為末服之亦驗生附子生烏頭天南星乾薑細辛川芎各一兩甘草三分右㕮咀每服四錢水二盞薑七片茶芽少許煎至六分去滓食前服中脘素寒者不用茶芽若氣壅盛只用川芎一兩細辛半兩甘草二錢煎如前法一方治頭風以細辛二錢川芎白芷減半為細末搐入鼻中一方用高良薑晒乾不見火碾為細末口含冷水以少許搐入鼻中如此數搐即愈久患頭疼尤能作效一方治氣虛人頭疼以附子一隻生去皮切作數片用生薑自然汁一盞浸一宿漫炙乾再炙再蘸候滲薑汁為度高良薑等分為末臘茶調服名必效散一方用白芷四錢生烏頭一錢為末每服一字許茶調服有人患眼睛痛者先令含水次用此藥搐入鼻中其效尤驗治受濕者頭重眩暈用川芎白术生附各等分官桂甘草減半每服四錢薑十片煎服名芎术除眩湯千金方加防風一兩川芎羌活散治頭痛羌活二兩半細辛二兩川芎二兩藁本二錢荆子二兩白芷半兩防風一兩半右為粗末每服二兩水煎去滓臨卧旋咽服旋復花散出聖惠方治胸膈風壅上攻頭痛不止旋復花半兩蔓荆子一兩石膏二兩枳殼二兩麩炒微黃去瓤甘草半兩炙微赤銼甘菊花半兩右搗篩為散每服三錢水一中盞煎至六分去滓不計時候溫服忌熱麵炙􅏼物石膏丸出聖惠方治頭痛不止心神煩悶石膏一兩細研水飛馬牙硝半兩太隂元精石半兩雄黃半兩硃砂半兩右細研入麝香末一錢重研令勻用湯浸蒸餅和丸梧桐子大每服五丸不計時候蔥茶下太陽丹出惠氏方治頭疼傷寒感風氣積偏正夾腦一切頭疼及風壅痰盛即川芎羌活散得效方治腦寒之病皆邪攻於上焦令人頭痛晝夜引痛不能安寧川烏川芎白芷甘草各一兩石膏煅二兩腦子半錢右為末蜜為丸如指大硃砂為衣每服一丸薄荷嚼下食後得效方每兩作十八丸食後以生蔥茶嚼下或五丸以水磨爛塗患處一方出海上方治男女一切頭痛不可忍者川芎藿香葉乾葛桔梗各半兩甘草一分軟石膏三兩煅右㕮咀每服三錢水一盞半煎至一盞去滓溫服不拘時候連進三二服立止石膏散經驗方治頭痛不可忍如神效麻黃去根節稱一兩石膏一兩何首烏半兩乾薑七錢半川芎一兩右為細末每服四錢水一盞生薑三片煎至七分稍熱服極者三服必效白芷散一名搐藥鬱金散試效方治風熱頭痛石膏白芷各二錢薄荷葉芒硝各三錢鬱金一錢右為極細末口含水鼻內搐之烏罌散治諸種頭疼不可忍者川烏炮去皮臍御米殼去蒂蜜汁炒甘草橘皮各一兩右㕮咀每服三錢水一盞半煎至七分去滓溫服立效四川丸一名鶴頂丸危氏方治頭痛如破大川烏一箇生去皮臍川白芷川細辛去葉大川芎各一兩右為末韭菜自然汁丸黃丹為衣每服一丸細嚼蔥白淡清茶下寬中丸三因方治滯氣不快飲食不消胸膈痞塞凝痰聚飲狀如傷寒頭痛胸痞大附子炮去皮臍木香炮青皮大黃濕紙裹煨各等分右為末醋煮麵糊丸如梧桐子大每服十丸薑湯下頭疼甚則調救生散下天南星丸一名硫黃丸宋氏集驗方治厥頭痛齒痛骨寒胃脈同腎脈厥逆頭疼不可忍者硫黃研石膏研天南星炮熖硝各等分右為末麵糊丸如梧桐子大每服三十丸空心食前溫酒下藿香散三因方治傷寒風挾涎飲上厥頭疼偏正夾腦諸風藿香半兩川烏頭湯浸七次去皮尖一兩乳香三皂角子大草烏頭炮製去皮尖一兩右為末每服一次薄荷茶清調下食後服硫硃丹三因方治痰厥腎厥諸證頭疼百藥不效風頭痛太陽經受病上連風府眉角皆可藥治而愈如痛上穿風府又干泥丸者是為真頭痛藥不可愈腎厥頭痛或腦後有一道冷氣如氷厚衣被覆額上是也硫黃生研川烏去皮尖各半兩硃砂水飛二兩天南星一兩炮製右為末薑汁煮糊丸如梧桐子大每服十五丸生薑薄荷湯下一方用硫黃硝石南星半夏製度治證如前玉真丸經驗方治腎厥頭痛不可忍其脈舉之則弦按之則石堅生硫黃二兩别研石膏硬者不煅半夏湯泡七次一兩硝石别研各一兩右為細末研和勻生薑汁煮糊為丸如梧桐子大每服四十丸食前用薑湯或米湯下虛寒甚者去石膏用鍾乳粉一兩更灸關元百壯一名中黃丸素問云頭癲疾下虛攻實過在足少隂巨陽甚則入腎徇蒙招搖目瞑耳聾下實上虛過在足少陽厥隂甚則在肝下虛者發虛也故腎厥則頭痛上虛者肝虛也故肝虛則頭暈徇蒙者如以物蒙其首招搖不定目眩耳聾皆昏之狀也故肝厥頭暈腎厥癲痛不同如此治肝厥鈎藤散佳治頭痛發歇不止聖惠方蘿蔔一枚剜去中心留蓋子寒水石一兩硫黃一分細研膩粉一分右先將寒水石內蘿蔔中用蓋子蓋却以泥裹候乾燒令通赤良久取出候冷去蘿蔔入二味藥同研令勻以湯浸蒸餅和丸如菉豆大每服五丸不計時候以新汲水下三生丸濟生方治痰厥頭疼半夏白附子天南星各等分右為細末生薑自然汁浸蒸餅為丸如菉豆大每服四十丸食後薑湯送下太白散仁存方治頭痛石膏煅二兩川芎半兩甘草一分右為末茶芽少許熱湯調二分食後服一方無甘草備急丸危氏方治積聚頭疼大黃乾薑巴豆去皮心出油右等分為末煉蜜為丸如豌豆大米飲下一丸羸人服半丸菉豆大以大便利為度楊梅散本事方定頭痛楊梅清硝石地龍干各等分右為細末搐鼻立效治風毒攻注頭目痛不可忍者一名附子散聖惠方黑豆一合㨂令淨附子一兩炮製去皮臍别搗細篩為末生薑一兩與豆同炒豆熟為度右件藥以酒一大盞煎薑豆至七分去滓分為二服每服調附子末一錢不計時候服之又方聖惠方治頭痛不止丁香一分白芷半兩瓜蒂一兩右藥搗羅為散每用半匙以來吹鼻內即差治頭痛鼻塞頭不利出聖惠方白殭蠶一分黃丹一分炒令紫色溺垽一分右搗羅為末用蔥白略以火煨軟搗絞取汁先調藥末一遍晒令乾又調之如此三度丸如菉豆大每服五丸以冷茶下蝎附丸一名乳附全蝎散出淡寮方治氣虛頭痛大附子一枚全蝎二枚去毒鍾乳粉二錢半右用附子剜去心安全蝎附子內即以餘附為末同鍾乳粉麵少許水和作劑包煨令熟並為細末蔥涎為丸如梧桐子大每服七十丸空心食前同椒鹽湯下一作散蔥茶湯下又方宣腦散川練三分苦丁香二十箇山梔子二個右為細末用一匙鼻內搐之葫蘆芭散出三因方治氣攻頭痛如破葫蘆芭炒乾薑炮三稜銼醋浥一宿炒乾各一兩右為末每服二錢溫生薑湯或酒調下凡氣攻疼如破者或瘴瘧瘥後頭痛呼號服之即愈一方用生薑治一切頭疼出本事方防風川芎各半兩附子七分重者一箇炮去皮臍右為末每服一次荆芥薄荷茶調下治丈夫婦人風虛頭疼氣虛頭疼婦人胎前産後傷風頭痛一切頭疼並皆治之出本事方茵陳五兩㨂淨麻黃石膏煅留性各二兩右為末每服一錢臘茶調下食後服畢仰卧霎時細辛散出聖惠方治頭疼眼睛痛方見首風類治頭痛不可忍方童子小便一盞䜴心半合右件藥同煎至五分去滓溫頻服恆山散出聖惠方治頭疼往來寒熱心膈痰壅冝服恆山一兩搗羅為末雲母粉一兩右件藥相和研令勻每服以溫水調下一錢良久當吐如吐未快即再服之一方用鹽湯調下治頭痛不止冝服一方烏頭散出聖惠方伏龍肝一兩附子半兩炮裂去皮臍右搗羅為散每服以冷水調下二錢一方溫酒調下治齒痛又方一方烏頭散出聖惠方川烏頭一枚炮裂去皮臍搗令碎生薑一分切右以水一鍾煎至五分去滓入蜜半合相和服之又方出聖惠方胡粉半兩硫黃一兩右件藥同研令細以軟飯和丸如梧桐子大當頭痛以冷水下五丸良久服之治頭痛鼻塞目不利冝服出聖惠方牛酥三分川朴硝二兩細研右藥同研令勻頻用少許點鼻內差又方出聖惠方附子一枚生去皮臍地龍一分右為末每用一匙以生薑汁調塗兩眼及頂上一方地龍膏又方出聖惠方龍腦半分鐵粉二兩右細研令勻每於食後以新汲下調下半錢薤根丸出經驗良方治頭眼痛如刀刺大川烏去皮尖微炒全蝎糯米炒各等分右以薤根汁丸每服十五丸薄荷茶清食後下神砂丸出本事方治頭疼及腦風硫黃鹽各等分右為末水調生麵為丸如梧桐子大每服十五丸用薄荷茶食前下荆芥酒亦得附子方出淡寮方治頭痛附子炮石膏煅各等分右為末入腦麝少許茶酒下半錢附芎散出本事方治風虛頭疼大川芎二箇銼作四十片大附子一箇和皮生為末右以和附子末如麵劑裹芎作四處如附子末少入少麵裹畢以針穿數孔子用真腦麝薰有穴處內香再捻合穴子如未覺內有香即再薰一炷細羅灰用銚子內熱灰炮熟取出每服半錢蔥茶湯下不拘時候芎术湯出御藥院方清神爽志祛風消瘟治頭目昏痛止鼻塞聲重川芎二兩半天台烏藥白术二兩七錢半右為粗末每服三錢水一盞入生薑五片煎至七分去滓稍熱服或細末白湯點亦得川烏散一名芎香散治男女氣厥頭疼婦人氣盛頭疼及産後頭痛悉主之鮑氏方川芎天台烏藥一作用香附及烏頭右等分為末每服二錢臘茶清調服或用蔥茶湯調服食後止痛太陽丹出醫方大成川芎天南星各等分右為細末用蓮鬚蔥白搗爛調藥末貼於太陽痛處治氣攻上頭疼不可忍者萆麻子乳香各等分右搗貼太陽穴上如痛定急去頂上解開髮出氣即去藥治頭痛不可忍方右用蒜一顆去皮研取自然汁令病人仰卧垂頭以銅筯點少許瀝入鼻中急令搐入腦眼中淚出瘥栝蔞方治熱病頭疼發熱進退用栝蔞一枚大者去瓤細銼置瓷碗中用熱湯一中盞沃之蓋却良久去滓不計時候頻服蜂房方治頭痛煩熱口乾小便赤少用蜂房十二分炙水二升煎取八合分為二服當利小便惡熱毒隨小便出又方凡飲酒頭痛用竹茹三兩水五升煮取三升去滓令冷打入雞子三枚攪調更煮三沸飲之朴硝方出百一選方治時氣頭痛不止方見腦風類治大病後虛頭痛用四柱散將煎熱時入好臘茶一錢服之良甚立效散専治氣虛頭痛用上春茶末調成膏置瓦盞內覆轉以巴豆四十粒作二次燒煙薰之曬乾用乳鉢研爛為末每服一匙别入好茶末食後點服治頭痛出肘後方用水調決明子貼太陽穴一方作枕去頭風明目葛根方治時氣頭疼壯熱右用生葛根淨洗搗取汁一大盞豉一合煎至六分去滓不計時候分作二服汗出即差未汗再服若熱加梔子十枚同煎去滓服茗葉方出肘後方治卒頭痛如破非中冷非中風其病是胸膈有痰厥風上衝所致名為厥頭痛吐之即差右用煮茗作飲二三升適冷暖飲一二升須臾吐吐畢又飲能如此數過劇者須吐膽汁止不損人待渴即差治頭痛不可忍者是多風痰所致用梔子末和蜜濃傅舌上吐即止神效一方出肘後方治頭痛欲死右用硝石末吹鼻內愈當歸方出肘後方治頭痛頭欲裂右用當歸二兩清油一升煮取六合飲之再服瘥治一年深日近太陽分痛右用酒薄荷共磨水正貼太陽上芎辛丸出本事方治頭痛面赤煩悶因干上膈風痰頭目暈昏百節疼痛背項拘急川芎防風殭蠶獨活各一兩桔梗三兩天麻四兩細辛白附子羌活甘草各半兩薄荷荆芥各一兩半右為細末煉蜜和丸如彈子大每服一粒茶酒吞下食後龍腦丸治頭疼旋眼花及喉痺纒喉風等龍腦研丹砂研馬牙硝研各一分麝香研半錢右同研勻細於碟內盛用羊膽滴汁入藥旋和成丸如黑豆大以淨合盛每用一粒以蘆管吹入鼻中以手小指送近上兩鼻皆如此去枕仰卧少時候藥溶入腦涎唾從喉內出其病立瘥治頭痛或偏攻一邊痛不可忍出聖惠方苦參一分銼半夏一分桂心一分右為細散以米醋調如糊塗故帛上當痛處貼之神效石膏湯治頭痛石膏碎莎草根炒去木毛天麻藿香葉各一兩右粗搗篩每服三錢水一盞入臘茶半錢煎至七分去滓溫服不拘時候神朱石膏丸治頭痛石膏煅二兩芎藭一兩龍腦少許研右為細末用麵糊和丸如櫻桃大丹砂為衣細嚼一丸茶酒任下食後服烏星膏出肘後方治太陽穴痛不可忍川烏南星桂心各等分右為末酒調塗傅痛處通頂散治頭痛鼻塞腦悶藜蘆研半兩黃連去鬚三分右為散每用少許搐入鼻中治卒頭痛如破右以鹽湯吐不吐摘出又云熟湯先作一升復投冷水一升乃食三合鹽以此湯送之如未出盡更服二合湯二升良麝香散治頭痛不可忍吹鼻右用藜蘆和州者一莖暴乾搗為散入麝香麻子少許研勻吹鼻中龍珠丸治頭痛目暈及喉痺纒風等右用長蚯蚓不拘多少五月五日取以龍腦麝香相和研勻丸如麻子大每以生薑汁塗鼻中逐邊各內一丸立愈治落枕方用香白芷為末搗生薑自然汁調敷患處次用厚衣被蓋頭飲少熱粥湯取汗自出即愈導引法養生方云一手拓頥向後勢一手向後長舒急努四方顯手掌一時俱極勢四七左右換手皆然拓頥手兩向共頭欹側轉身二七去臂膊頭風眠睡又云解髮東向坐握固不息一通舉手左右導引手掩兩耳治頭風令髮不白以手復將五通脈也又云熱食枕手卧久成頭風目澀又云端坐伸腰左右傾頭閉目以鼻內氣除頭風自極七息止又云頭痛以鼻內除吐出氣三十過休又云欲治頭痛閉氣令鼻極偃卧乃息汗出乃止又云義兩手頭後極勢振搖二七手掌翻覆按之二七頭欲得向後仰之一時一勢欲得欲邪四角急挽之三七去頭腋膊肘風石膏散治頭痛不可忍麻黃去根節石膏各一兩何首烏半兩乾葛七錢半右為細末每服三錢生薑三片水一盞半煎稍熱服寸金散出續易簡方治一切頭疼未為盡善若風熱痰作不已例用此方透明天麻川芎自芷藿香防風人參各半兩雄黃三錢研地龍去土一分甘草一分蝎一分右為細末每服半錢茶酒調下食後服立效若風寒客於頭中偏痛無時久久牽引兩目遂至失明宜用白附子一兩炮麻黃不去節川烏炮去皮尖天南星各半兩全蝎五箇去毒乾薑炮硃砂水飛麝香各一兩為細末酒調一匙服之去枕少時若偏頭風痛不可忍用細辛一兩雄黃半兩别研為細末每服用一匙如左邊痛搐右鼻右邊痛搐左鼻選竒湯治眉痛骨痛不可忍東垣先生蘭室祕藏方羌活二錢防風三錢甘草根二錢夏月生冬月炙黃芩一錢酒浸冬月不用此一味如能食熱痛加之右㕮咀每服三錢水二盞煎至一盞去滓稍熱食後時時服之煅石膏通紅去炭取石膏為未食後茶調出永類鈴方太陽頭痛惡寒出衛生寶鑑川芎少陽頭痛脈弦細往來寒熱出衛生寶鑑柴胡陽明頭痛自汗發熱惡寒出衛生寶鑑白芷太隂頭痛必有痰體重或腹痛為痰癖出衛生寶鑑半夏少隂頭痛手三部三陽經不流行而足寒氣逆為寒厥頭痛出衛生寶鑑細辛厥隂頭痛項痛其脈浮微緩知入太陽病痰矣諸血虛頭痛出衛生寶鑑黃耆諸氣血俱虛頭痛出衛生寶鑑黃耆治頭痛傷風偏正夾腦太陽穴痛或涎痰不利白芷細辛川芎各等分龍腦牛黃雄黃各少許右各為末用少許搐鼻大解暑毒可用黑錫丹出海上方治真頭痛茴香炒附子製葫蘆芭破故紙炒揀子巴戟已上六味各一兩木香沉香肉豆蔲製桂已上四味各半兩錫硫砂四兩右為末同砂子末酒和丸如梧桐子大隂乾布袋擦令光瑩每服四十粒空心薑鹽湯下一方有陽起石麻黃吳茱萸湯出試效方治頭痛胸中痛食物減少咽嗌不利右寸脈弦急麻黃半錢吳茱萸三分黃芩二分川芎一分羌活五分蔓荆子一分細辛一分藳本二分柴胡一分黃耆三分蒼术一錢黃連一分半夏一分黃蘖二分升麻三分紅花少許當歸二分右件㕮咀都作一服水二盞去滓煎至一盞稍熱食後服太陽經嚏藥出試效方防風二分羌活二分紅豆三箇右為細末鼻內搐之紅豆散出試效方治頭重如山濕氣在頭也麻黃苦丁香半錢紅豆半箇羌活根燒連翹各三分右五味為細末鼻內搐之神效參謀柏德仲實年六十一嵗壬子歲二月間患頭痛不可忍晝夜不得眠郎中曹通甫邀往視之參謀云近在燕京患痛昏悶微痛醫作傷寒解之汗出痛轉加復併解二服痛尤甚遂還家每過郡邑醫藥雷同到今痛甚不得安卧惡寒風不喜飲食診其脈弦細而微氣短促懶語言內經曰春氣病在頭年高氣弱清不能上升頭面故昏悶本無表邪發汗數四清陽之氣愈汚損不能上榮亦不外固所以頭苦痛苦風寒不喜飲食氣短弱宜升陽補氣頭痛自愈名之曰順氣和中湯出衛生寶鑑黃耆一錢半君人參一錢使白术五分佐陳皮五分使當歸五分使白芍藥五分使炙甘草七分佐升麻三分引柴胡三分引川芎二分使細辛二分使蔓荆子二分使內經曰陽氣者衛外而為固也今年高氣弱又加發汗衛外之氣愈損故以黃耆甘溫補衛實表為君人參甘溫當歸辛溫補氣補血芍藥酸寒收衛氣為臣白术陳皮炙甘草苦甘溫養胃氣生發陽氣上實皮毛肥腠理為佐柴胡升麻苦平引少陽陽明之氣上升通百脈灌溉周身者也川芎蔓荆子細辛體輕浮清利空竅為使也右銼如麻豆大都作一服水二盞煎至一盞去滓溫服食後服之減半再服而愈明年春赴召至六盤山曹郎中以古風贈云東垣李明之嘗以能醫稱易水得奧訣為竭黃金籝一燈靜室窮內經黃帝拊掌岐伯驚日儲月積不易售半世但聞三折肱所長用藥有活法舊方堆案白魚生不聞李延同居且同病一下一汗俱得其平乃知古人一證一方後世以方合證此理殊未明公心審是者誰子有以異已喧謗聲先生飲恨卧泉壤門生卓卓醫中英活人事業將與相一旦去已權非輕連年應召天策府廉臺草木欣向榮好藏漆葉靑黏散莫使樊阿獨擅名大柴胡湯出指南方治頭痛柴胡黃芩芍藥甘草各炙三兩大黃二兩枳實一兩麩炒去穰右為粗末每服五錢水二盞薑十片棗二箇同煎一盞去滓溫服苦茶散出指南方治頭痛苦茶一合水三盞煎至半絞汁熱服愈草烏頭散出指南方治頭痛茶芽細辛各一兩草烏頭半兩炮右為粗末每服三錢水三盞煎至一盞去滓溫服玉壺丸出指南方治痰飲頭痛雄黃細研藜蘆去苗為末丹砂研巴豆去皮心出油礬石黃泥裹燒灰研如麵細八角附子各等分右和勻清明吉日煉蜜和丸杵三五百下如豌豆大每服一粒米飲下早晨臨卧痰滯胸上以熱服投之則吐積痰在下則利永除根本一服未止再服以止為度薑附湯出指南方治腎厥頭痛大附子不去皮臍生薑半兩右㕮咀以水一升煎至半升分三服淸上㵼火湯出東垣先生蘭室祕藏方燕京溫官人年少時氣弱常於氣海三里灸火節次約五七十壯至半老添熱厥頭痛雖冬天大寒猶喜寒風其頭痛則愈微來暖處或見煙火其痛復作五七年不愈皆灸之過也羌活根三錢防風七分柴胡根半錢藁本半錢細辛少許川芎二分升麻七分荆芥穗七分曼荆子三分黃連酒浸半錢黃芩酒浸一錢半黃耆一錢黃柏酒浸一錢知母酒浸一錢半蒼术三分炙甘草一錢生地黃半錢當歸身三分紅花少許甘草根半錢右件銼如麻豆大分作二服每服水二盞煎至一盞去滓稍熱服食後補氣湯出東垣先生蘭室祕藏方服前藥之後服此藥黃耆八分炙甘草四分當歸身二錢升麻三分柴胡一分紅花少許右件銼如麻豆大每服稱五錢水二盞煎至一盞去滓稍熱服食前白芷散出朱氏集驗方治頭痛及目睛痛白芷四錢生烏頭一錢右為末每服一匙茶調服有人患眼睛痛者先含水用此藥搐入鼻中其效更速細辛丸出朱氏集驗方治頭痛久不差烏梅藁本川芎北細辛甘草各半兩右為末石膏半斤研細入乾鍋子內火煅過飛去石末滴石膏水和丸彈子大茶酒任下一丸無時候葛根蔥白湯出危氏方治頭痛不止葛根白芍藥知母各半兩川芎生薑各一兩䓤白一握右銼散水三升煎取一升半去滓每服一盞半熱服參蘇飲出如冝方治頭痛發熱咳嗽痰稠凝痰為熱木香枳殼桔梗甘草炙陳皮製各半兩乾葛紫蘇葉半夏製前胡人參茯苓各七錢半右㕮咀薑七片棗一枚水二盞煎至一盞去滓熱服氣盛者去木香以參蘇飲對四物湯名補心湯治咳嗽有血本方又治婦人妊娠阻惡升麻白芍藥葛根甘草各等分右㕮咀水煎溫服或鄰家有痘􅂒亦宜服內用芍藥甚穩金沸草散出如冝方治頭目昏疼發熱鼻寒清涕咳嗽痰稠荆芥穗四兩半夏製甘草各一兩麻黃製前胡旋復花各三兩赤芍藥一兩㕮咀薑棗煎熱服如頭久疼作苦及偏正頭疼宜川芎一兩香附二兩為末茶清調下出如冝方子瞻記荆公治頭痛法出如冝方軾聞荆公云僕平昔苦頭痛有道人教云取生萊蔔汁一蜆殼許注鼻中移時立效果驗如神以此法治人不可勝數張粹道治頭痛法出十便良方豫與陳孚先史聖自應靈步月而歸龍德井至曉二人並頭痛粹道於箱中探得大烏頭二枚去皮急蒸過細切焙乾為末以好細茶滚過薑湯煎各一服而愈孚先二服方瘥加之吐逆故也藍機聖砭腦膏治兩額角並頭頂痛出江陽方桂附子半夏各等分並生用右以薑汁調膏貼之芎茶湯出聖惠方治氣虛頭痛右用好川芎半兩為末每服二錢臘茶清調下甚捷曽有婦人産後頭疼一服愈清香散出楊氏家藏方治三陽伏留風邪頭疼不可忍附子炮去皮臍白附子炮川烏頭炮去皮臍當歸洗焙上四味各一兩天竺黃天麻去苗肉桂去粗皮朱砂别研山藥已上五味各半兩腦子一錢别研麝香半錢别研右件為細末每服一錢薄荷茶調下不拘時候更生散出楊氏家藏方治風壅上攻頭目昏項背拘急白附子炮二兩天南星二兩同白附子研碎用新水浸三日每日換水日滿取出焙乾羌活二兩去蘆頭川芎二兩雄黃三錢研水飛生腦子半錢别研朱砂三錢别研水飛麝香二兩一錢别研白殭蠶一兩炒去系嘴右件為細末每服二錢溫酒調下茶調亦得食後玉真丸出指南方治腎厥頭痛石膏火煅通赤放地上出火毒半夏各一兩硫黃半兩細研右為末研勻薑汁煮糊為丸如梧桐子大每服三十六粒食前生薑湯下中書左丞姚公茂年六十七歲宿有時毒至元戊辰春因酒再發頭面赤腫而痛耳前後尤甚胸中煩悶咽嗌不利身半月不卧於炕飲食減少精神困弱脈得浮數按之弦細上熱下寒明矣內經云熱勝則腫春氣者病在頭難經云熱在頭身冝砭刺之取其陽散故也遂於腫上約五十餘刺其血紫黑如露珠之狀頃時腫痛消散又於氣海穴中大艾炷灸百壯乃助下焦陽虛退其隂寒次於三里二穴中各灸三七壯治足胻冷亦引導熱氣下行故也遂處方云熱者寒之然病有高下治有逺近無越度其制度君以黃芩黃連苦寒酒製炒亦為因用以瀉其上熱桔梗甘草辛甘溫上升佐諸苦藥以治其熱柴胡升麻苦平味之薄者隂中之陽散發上熱以為臣連翹苦辛平以散結消腫當歸身辛溫和血止大黃苦寒酒煨引苦性上行至巔驅熱而下以為使也投劑之後腫痛全減大便利再服減大黃慎言語節飲食不旬日良愈既濟解毒湯出衛生寶鑑治上熱頭目赤腫如痛胸膈煩悶不得安卧身半已下皆寒足胻尤甚大便微祕桔梗炙甘草黃芩酒製炒黃連酒製炒大黃煅二錢大便利勿用柴胡去苗升麻去腐當歸身各一錢連翹一錢右件銼如麻豆大都作一服水二盞煎至一盞去滓食後服忌酒濕麵大料物之類及生冷硬物治頭痛出本草石膏和蔥煎茶服治卒頭痛出本草以皂角末吹鼻中令嚏則止治人初得頭痛出本草以人溺一升飲之亦多愈合蔥䜴湯彌佳治熱煩痰結頭痛明目鎮心出本草用戎鹽水研服之治頭疼利丈夫助隂力出本草用薯蕷為末和麵作餺飥食之及熱煎和蜜或為湯煎或為粉食之治頭重心躁背膊勞悶出本草以荔枝食之治病酒頭痛出本草以水豆花於豉中煮五味調和作羮食之石膏散出衛生寶鑑治頭痛川芎石膏碎者白芷右等分為細末每服四錢茶淸調下偏頭痛論夫偏頭痛之狀由風邪客於陽經其經偏虛者邪氣湊於一邊痛連額角故謂之偏頭痛也夫偏頭痛者由人氣血俱虛客風入於諸陽之經偏陽傷於腦中故也又有因新沐之後露卧當風或讀學用心牽勞細視經絡虛損風邪入於肝而引目系急故令頭偏痛也方芎犀丸治偏頭痛一邊鼻塞不聞香臭常流清涕或作臭氣一陳加芎蝎等遍服無效服此不十數服或作嚏突一鋌稠膿即愈石膏細研四兩生龍腦别研硃砂研飛四兩用一兩為衣生犀角一兩人參去蘆二兩茯苓去皮二兩川芎四兩阿膠碎炒一兩半細辛去苗二兩麥門冬去心三兩甘草炙二兩山梔子一兩右除别研藥後入並為末煉蜜丸每服一丸至二丸細嚼茶酒任下食後服搐藥治偏頭痛眼疾蒼耳即道人頭薄荷葉盆硝石膏各一錢亂文者水飛乳香華細辛貫芎各等分右為細末晨午夕三時搐之天南星散治偏頭痛南星半兩乾薑二錢白附子三錢麻黃一錢半全蝎三箇硃砂一分麝香一分右為細末酒調服然後側卧令痛處半邊在下天南星散治偏頭痛天南星酸漿水煮透心軟切晒乾一兩菊花三分自然銅燒紅醋淬一兩防風半兩用水一碗同菊花自然銅防風三味煮水盡為度去防風自然銅不用只用菊花芎藭一兩右除二味不用外搗羅為細散每服半錢七臘茶清少許調只作一口呷盡分作三咽點頭一點四神散治偏頭痛地龍去土炒乾蝦蟇燒灰存性各一錢藜蘆半錢龍腦研少許右除龍腦外搗羅為細散再研勻每用半匙許先滿口含水男左女右搐半匙入鼻內揉痛處良久痛定川芎散治偏頭疼神效甘菊花石膏川芎各三錢白殭蠶半錢生用右為細末每服三錢茶清調下一方無白殭蠶忌豬肉蕎麵細辛散治偏頭疼連牙齒風痛不可忍細辛去葉夏枯草各錢蓽撥高良薑各一錢右為細散每用少許隨痛左右搐入鼻內如牙痛用時須開口流涎不得噴候涎盡以冷水點臘茶飲之神聖散治偏頭痛不可忍方見腦風類治偏頭痛方蚌蟬二枚生用乳香半分細研硃砂細研右以蟬研水汁都和丸如小豆大痛發時左邊痛內在左邊鼻中右邊痛內在右鼻中出青黃水為效白雪丹治偏頭痛硝石一兩硫黃一兩白礬一兩右以固濟磁瓶子一箇先下硝石次下硫黃後下白礬其瓶蓋上留一小竅固之以慢火逼之候竅中相次煙出盡却即泥之後用大火煅令通赤候冷開瓶取出藥於紙上攤用甘草水令濕以盆覆之二日出火毒了細研用菉豆粉以水調和丸如梧桐子大每於食後以冷水下五丸丁香散治偏頭痛丁香一粒大者研棘針燒灰存性為末倒鉤者四十九枚麝香一皂子大右用研勻以紙撚揾藥隨痛左右搐之烏豆散治久患偏頭痛草烏頭尖一分生用赤小豆三十五粒麝香一匙研右麝香外為細末研勻每服半錢煎薄荷茶清放冷調下更於痛處一邊鼻內搐少許治偏頭痛方旋復花半兩萆薢半兩銼虎骨頭酥炙今黃右為細末欲發時以溫酒調下兩錢衣蓋出汗立差又方一名吹鼻散生薑汁二合於瓷器中煅煉為末桂心末一匙麝香一匙右同研令細每用少許吹於鼻中即差烏金丸出聖惠方治偏頭痛皂莢二兩燒灰細研石膏二兩細研水飛過右都研令勻以軟飯和為丸如梧桐子大每服以薄荷湯下十五丸又方出聖惠方碙砂一分細研豉心一分入湯少許浸令軟右都搗和為丸如皂莢子大以綿裹露出一頭左邊痛將藥內左邊鼻中右邊痛即內右邊鼻中即差治夾腦風及偏頭痛方出聖惠方蕓薹子一分川大黃三分右為細末每取少許吹鼻中後有黃水出其疾永差如有煩麻以釅醋調塗之亦效治頭偏痛不可忍方出聖惠方萆麻子半兩去皮棗十五枚去核右都搗令熟塗在紙上用筯一隻卷之去筯內左鼻中取下清涕治偏頭痛方出聖惠方苦葫蘆子一合鬱金一顆右為細末用白絹子裹藥末一錢於新汲水內浸過滴向患處鼻中水出差硫黃丸一名如神九出聖惠方治頭痛并中暑硫黃一兩硝石一兩右同研入銚子內鎔作汁候冷取出更入石膏末一兩又同研令細用軟粳米飯和丸如梧桐子大每服以溫水下五丸頻服之差一方空心臘茶下一丸如神陳州懷醫用藥如梧桐子大每服十五丸中暑氷水下當即灑然傷冷即以艾湯下通頂散出聖惠方治偏頭痛硝石一分滑石一分右於銚內同炒令黃色候冷細研為末每用少許吹入鼻中差立效散出聖濟總録治偏頭疼地龍去土炒為末一兩麝香研少許右同研勻每服半錢糝紙上作紙撚於燈上燒隨痛左右薰鼻中乳香散出聖濟總録治偏頭痛不可忍乳香如皂子大高良薑如指頭大右於火上燒煙薰鼻隨痛左右用之至靈散治偏頭痛方見偏正頭疼類治偏頭痛連晴頭痛出濟生拔粹石膏黍粘子炒各等分右為末茶酒調食前治婦人病頭痛出經驗良方右用香附子為末每服三錢臘茶調下食後日三五服一用建茶神妙方出經驗良方治偏頭風痛右用生蘿蔔汁仰卧注鼻中左痛注左右痛注右滿頭痛兩鼻皆注數十年病皆能愈一方出海上方治偏頭風右用白芥子一兩研細醋麵調攤紙上貼於痛處仙靈脾浸酒方治偏痛手足不遂皮膚不仁宜服右用仙靈脾一斤好者細銼以生絹袋盛於不滲器中用無灰酒二斗浸之以厚紙重密封不通氣春夏三日秋冬五日後旋開每日隨性暖飲之常令醺醺不得大醉若酒盡再合服之無不效驗合時切忌雞犬見之又方出肘後方治偏頭痛右用京芎細銼酒浸服之佳一方用臘茶調下甚捷蓽撥方出朱集驗方治偏頭痛及風右以蓽撥為細末每用一匙先令病人滿口含溫水然後用藥搐入鼻中效左邊疼令左鼻吸一匙右邊疼令右鼻吸一匙絶妙治偏頭痛方右以芫花不拘多少釅醋浸一宿焙乾搗羅為末或左邊疼即於左鼻吸藥或右痛即於右鼻吸藥一匙入藥時先含水一口防入喉內鼻中涕泣出差川芎散治風盛膈壅鼻塞淸涕熱氣攻眼下淚多眵齒間緊急作偏頭痛川芎柴胡各一兩半夏麴甘草炙甘菊細辛人參前胡防風各半兩右為粗末每服四錢水一盞生薑四片薄荷五葉同煎至七分去滓溫服透關散治偏頭疼方見本門偏正頭疼類一字散治偏頭疼不可忍者乳香别研延胡索盆硝别研已上三味各一錢川芎三錢雄黃三錢别研右件為細末每用少許左疼搐左鼻右疼搐右鼻即愈細辛散治偏頭疼細辛二分川芎七分柴胡二錢炒黃芩一錢黃芩三錢酒浸生黃芩半錢瓦粉二錢甘草一錢半炙黃連七分酒浸芍藥半錢右為粗散每服二錢或三錢水一大盞半煎至一盞取清食後服之或發燥即不治有婦人偏頭一邊鼻塞不聞香臭常流清涕或作臭氣一陳加芎蝎等藥遍服無效或曰腦癰偶一善醫教服局方芎犀九不十數服忽作嚏涕突出一錠稠膿疾愈醫説淡寮方如偏頭痛宜芎芷辛良薑為末右搐右左搐左仍先含水方搐藥宜大芎辛湯小芎辛湯如聖餅子川芎茶調散斟冷熱服之如聖散治眼目偏頭疼頭風麻黃燒灰半兩盆硝二錢半麝香腦子各少許右件為細末鼻內搐之神效通關膈下肺壅除上虛熱止偏頭疼進食藿煮散方藿香棟子人參桔梗枳殼去白麥門冬去心旋復花去蕚各半兩白术半夏薑汁煮透心黃焙青橘皮木通草柴胡去頭麻黃去根甘草各一分桑白皮三分右件藥並銼焙乾杵粗篩為煮散食後水一盞生薑二片煎兩錢取八分去滓熱服重煎一度服大腑祕則加郁李仁十五枚拍碎同煎食後服普濟方卷四十四
