body:
  text: 普濟方卷四百二十四明周王朱橚撰鍼灸門婦人諸疾治女子心痛逆氣善吐食不下資生經穴幽門治婦人驚悲不樂又療大風卧驚視如見鬼穴陰蹻治婦人裏急瘈瘲穴帶脉治女子逆氣穴幽門治婦人小腹滿石水穴關元治女子淋穴陰蹻治女子小便淋瀝穴水泉委陽志室中髎治婦人淋瀝陰挺出又四肢淫濼心悶及諸淋穴陰蹻小腸腧治婦人小便不通穴曲骨治婦人遺尿穴横骨灸七壯治婦人泄痢不止穴氣穴治婦人飱泄穴陰陵泉治婦人赤白裏急瘈瘲穴五樞治婦人水泄痢穴氣海灸百壯三報治婦人腸鳴注泄穴下􅐎治婦人目昏昏不能逺視穴水泉治姙娠三月數堕胎穴膝下一寸灸七壯治婦人漏血不止小腹急引陰痛腹脹如蠱女子如姙娠濟生拔粹方穴陰右灸三壯治婦人轉胞不得小便又主胞閉塞及小腹急六脉虚弱仁存方穴關元灸七壯便得小便次服八味丸調理治婦人陰腫穴氣衝治婦人小腹腫脹隂痛直引心下穴曲泉治婦人陰疝穴衝門治女子疝及小腹腫溏泄癃遺尿陰痛靣黒目眥痛漏血穴太衝治婦人傷寒過經不解使經不傳穴針期門治婦人汗出穴陰蹻治婦人八部諸疾穴伏兎治女子背脊急痛穴支溝治男子如蠱女子如阻身體腰脊如解不欲食有此病者宜用此法治之驗穴湧泉陰谷治㿗疝崩中腹上下痛腸澼陰暴敗痛穴合陽中都治女人陰中痛引心下及小腹内絞痛腹中五寒穴灸交儀治婦人口噤語言不出風癎之疾穴承漿治婦人疝氣客於膀胱難於前後泄而溺赤穴灸足厥陰左右各一所資生經云太倉公診司空命婦曰疝氣客於膀胱難於前後溲而溺赤灸足厥陰脉左右各一所即不遺溺而溲清更為火齊湯飲之而疝氣散治婦人傷風發熱惡寒經水適來得七八日熱除脉遲身凉和胸脇下滿如結胸狀譫語者此為熱入血室也當刺期門穴隨其實而取之期門穴在乳直下肋骨近腹處是穴也凡婦人病法當刺期門不用行子午法恐纒臟膜引氣上但下鍼令病人吸五吸停鍼良久徐徐行鍼此是平㵼法也凡鍼期門必㵼勿補可肥人二寸瘦人寸半深也資生經云凡婦人傷寒過經不解當鍼期門使經不傳衞生寶鑑云一婦人患熱入血室證醫者不識用補血調血補氣藥亟養數日遂成血結胸或權用前藥予曰小柴胡用已遲不可行也無已則有一為刺期門可用矣予不能鍼請善鍼者治之如言而愈或者問曰熱入血室何為成結胸也予曰邪氣傳入經絡與正氣相搏上下流行或遇經水適來適斷邪氣乗虚而入血室為邪廹上入肝經肝受邪則讝語而見鬼復入亶中則血結於胸中何以言之婦人平居水當養於木血當養於脾也方未受孕則下之為月水既姙娠則中畜之以養胎及已產則上壅之以為乳皆血也今邪逐血併歸肝經聚於亶中結於乳下故手觸之則痛非劑可及故當刺期門也治婦人小便數泄不止及治不覺遺瀝穴關元治女遺尿穴太衝治咳逆其法婦人屈乳頭向下盡處骨間是穴丈夫及乳小者以一指為率男左女右與乳相直間陷中動脉處是穴艾炷如小豆許灸三壯又乳根穴在兩乳下一寸艾炷如小豆大灸三壯即止婦人則屈乳頭下盡骨間動脉陷中是穴治婦人脊急目赤穴支溝治疝瘕按之如以湯沃股内至膝飱泄陰中痛小腹痛堅急重下濕不嗜食刺陰陵泉入二分灸三壯在膝下内側輔骨上䧟中伸足乃得之治㿗疝崩中穴中都治婦人陰痛引心下小腹絞痛灸膝外遍上去一寸宛宛中治胞中有大疝瘕積聚與陰引穴太谿治疝瘕陰疝穴太陰郄衝門治臍下疝積胞中有血穴四滿治腹滿疝積穴石門治疝瘕穴四滿中極治婦人癥瘕腸鳴泄利遶臍絞痛穴天樞灸百壯三報之勿鍼治婦人瘕聚瘦瘠穴三焦俞灸百壯三報内疎後宛宛中隨年壯又氣海灸百壯治婦人癥癖腸鳴泄痢遶臍絞痛穴天樞百壯三報勿鍼婦人血氣痛治子臟有惡血内逆滿痛資生經穴四滿治生胞中有血穴石門治婦人血臟積冷穴四滿治婦人血氣穴陽蹻治婦人本臟氣血癖走刺痛坐卧不得或大小便不通不思飲食左右脚第二指第一節曲紋中心各灸十壯每炷亦如小豆大甚驗治婦人賁豚搶心穴關元中極治女人腹痛穴天樞治婦人賁豚穴關元中極陰交石門四海期門治女子血瘕按之如湯沃股穴曲泉血塊治婦人因產惡露不止遂結成塊崩中漏下資生經穴石門治血結成塊穴中極治因產惡露不止遂成疝瘕或因月事不調血結成塊穴下極治血瘕穴漏谷曲泉治血癃穴曲骨治血淋穴復溜治血淋穴丹田灸七壯治胸中瘀血穴三里治内有瘀血穴商曲中府治婦人瘕聚穴關元治女子瘕聚脚膝無力穴膀胱俞治血塊腹痛穴陰交治瘕聚灸氣海天樞各百壯治小便淋赤尿道痛臍下結塊如覆盆或因食得或因產得惡露不下遂成疝瘕或因月事不調血結成塊皆鍼之穴間使血崩治血崩不止資生經穴大敦治崩中穴合陽治崩中漏下穴石門氣海治崩中因產惡露不絶穴中都治女子血不止穴交信陰谷太衝三陰交治崩中漏下湧穴石門治漏下惡血月事不調逆氣腹脹穴氣海治女子漏下不止穴三陰交太衝治漏血小腹脹體寒熱腹腫及漏血小便黄穴陰谷治經漏穴太衝然谷治陰挺下血陰腫或癢漉清汁若葵汁穴陰蹻治白崩及血傷帶下赤崩灸小腹横紋當臍孔直下百壯又内踝上三寸左右百壯治崩中穴陰蹻石門治漏下赤白及腹大堅食不化靣色蒼蒼穴天樞治經候過多其色瘀黒甚者崩下吸吸少氣臍腹冷極則汗出如雨尺脉微小由衝任虚衰為風冷客乗胞中氣不能固灸關元百壯宜鹿茸丸治女子月事不絶帶下産後惡露不止繞臍冷痛穴陰交治惡露不止穴氣海中都關元治因産惡露不止穴中極石門治漏胞下血不禁灸關元兩傍三寸百壯治産難月水不禁横生胎動鍼三陰交治胎動崩中下痢賁氣上逆鍼石門一寸四分治漏胞見赤灸胞門五十壯氣門五十壯治崩中帯下穴鍼灸中極治婦人經血過多不止并崩中者穴三陰交行間通里用毫鍼刺後各灸二七壯凡灸虚則炷火自滅實則火吹滅月事治月水不利身熱腹痛㿉疝陰腫難乳子上搶心痛不得息氣衝腰痛不得俛仰穴氣衝治女子經不通穴會隂治月脉斷絶穴關元治月事不利季脇支滿乳癰心痛周身痺痛無常逆氣喘不能行穴足臨泣治婦人斷緒又因惡露不止月事不調血結成塊穴中極治月事不時血結成塊腸鳴腹痛不嗜食穴天樞治月事不來來即多心下悶痛目不能逺視陰挺出小便淋瀝腹痛穴水泉治下月水驚悲不樂如墮墜汗出靣黒病饑不欲食婦人淋瀝陰挺出四肢淫濼心悶及月水不調嗜卧怠惰手足偏枯不能行穴陰蹻治月水不通穴太衝治月水不調穴陰包交儀治經逆四肢淫濼陰暴跳小腹偏痛又云主女子淋陰挺出月水不來穴陰蹻治月事不利見赤白有身則敗陰寒穴行間治月水不利見血而有身則敗乳腫穴足臨泣治月閉溺赤脊强互引反折汗不出穴腰俞治經閉不通穴中極治女人從小至大月經未嘗來服黄芩牡丹湯兩劑後灸乳下一寸黒員際各五十壯治胎中痛惡血月水不以時休止腹脹腸鳴氣上衝胸穴天樞治月水不利或暴閉塞腹脹滿癊淫濼身熱乳難子上搶心若胞不出衆氣盡亂腹中絞痛不得反息穴氣衝正仰卧屈一膝伸一膝並氣衝鍼上入二寸氣至㵼之治月經不斷灸内踝下白肉際青脉上隨年壯治小腹堅痛月水不通穴帶脉夾谿治小腹脹滿痛引陰中月水不至則腰背痛胞中瘕子門寒大小便不通水道刺入二寸半灸五壯在大巨下三寸治女子下蒼汁不禁中痛引小腹疼大便不利寒濕内傷穴下髎治月事過時不止穴隱白刺立愈治婦人月事不調至月則閉男子失精尿有餘瀝刺足少陰經治陰在足内踝下動脉是也治婦人經脉不通穴曲池支溝三里三陰交如經脉壅塞不通者㵼之立通如經脉虚耗不行者補之經脉益盛即通行矣治月事不調泄痢不止賁氣上下引腰脊痛穴氣陽治月脉不調穴血海帶脉治月事不絶穴陰交治月水不利灸四滿治月水不調血結成塊穴間使治產後月水不禁横生胎動穴三陰交治月水不利賁氣上下無子穴四滿灸三十壯治月事不調帶下崩中因產惡露不止絞臍疼痛穴氣海治血不通衛生寶鑑刺會陰入二寸留七呼灸三壯治子臟中有惡血内逆滿痛穴石門刺入一寸灸五壯赤白帶下治帶下瘕聚因産惡露不止月脉斷絶下經冷資生經穴關元治帶下穴氣海小腸俞治帶下赤白及脇下氣轉連背痛不可忍穴帶脉治帶下月事不調穴中髎治帶下穴陰交治帶下赤白惡合陰陽小便閉澁不通俱是虚冷之極皆宜灸穴曲骨治白瀝穴上􅐎治赤白瀝心積腰痛不可俛仰穴次􅐎治赤白淫時白氣癃月事少淫濼及主下蒼汁不禁赤瀝陰癢痛引小腹控抑不可俛仰穴中􅐎腰尻交刺腰尻交者及胛上以月死生為痏數發鍼立愈一云下􅐎治赤白沃中陰乾痛惡合陰陽小腹䐜堅小便閉穴曲骨治女子赤沃穴大赫資生經王氏云有來覓赤白帶藥者並以鎮靈丹與之鎭靈丹能活血溫中故也以其神效故書於此但有孕不可服耳若有灸帶脉穴尤竒於此丹也有婦人患赤白帶林氏得予鍼灸經初為灸氣海穴未效次日為灸帶脉有鬼附患身云昨日灸亦好只灸我未著今灸著我我今去矣可為設酒食祭我其家如其言祭之其病立起此實事也予初怪其事因思晉景公膏盲之病蓋有二鬼焉以其虚勞甚矣鬼得乗虚而居之今此婦人之疾亦有鬼者豈其用心虚損故有此疾鬼乎亦乗虚而居之耳灸既著穴其鬼不得不去雖不祭之可也自此來覔灸者必為之按此穴莫不應手痠疼予知是正穴也灸之無有不愈其穴在兩脇季肋之下一寸八分有此疾者速宜灸之婦人患此疾而喪生者甚多切不可忽若更灸百會尤佳此疾多因用心使然故也治帶下穴間使灸三十壯治絶嗣不生漏下赤白穴泉門十壯三報治下血泄痢赤白漏血穴足太陰五十壯腹中有寒百壯治漏下赤白月水不利穴交儀灸三七壯一作三十壯治下血漏赤白穴營池四穴二十壯一作三十壯在内踝前後兩邊泡上脉治漏下赤白四肢痠削穴漏陰三十壯在内踝上五分微動脉上治赤白漏洩注陰陽穴灸隨年壯三報之在足拇指下屈裏表頭白肉際是也治崩中帶下因產惡露不止婦人斷緒最要穴鍼中極四度即有子若未有更鍼入八分留十呼得氣即㵼灸亦佳不及鍼日灸三十至三百止治女子疝赤白淫下時多時少暴腹痛穴蠡溝治女子下赤白穴腰俞治女子漏下赤白及血灸三陰交難產治難產子上衝心不得息及陰疝穴衝門治横產先出手諸符藥不效右脚小指尖頭灸三壯炷如小麥下火立産治小腹大字難嗌乾嗜飲夾臍疝穴中封治字難若胞衣不出泄風從頭至足穴上崑崙治胞不出穴氣衝治子上搶心穴氣衝治産生理不順或横或逆胎死腹中胞衣不下穴太衝鍼八分補百息次補合谷次㵼三陰交立時分解其驗如神治產難鍼兩肩井入一寸㵼之須臾即分娩治產子上逼心令病人正坐用人抱頭抱腰微偃以毫鍼刺任脉巨闕二穴舉手下鍼即刺至即止令人立甦醒不悶次鍼補手陽明經合谷二穴次㵼足太陰經三陰交二穴應鍼而落如子手掬心生下手心内有鍼㾗如子頂母心向前人中有鍼㾗向後枕骨上有鍼㾗是驗產後餘疾治產後餘疾及治食不下賁豚上下傷食腹滿胸脇滿心切痛資生經穴期門治婦人產後渾身疼鍼百勞穴遇痛處即鍼避筋骨及禁穴又云產後未滿百日不宜灸治產後小便不通腹脹如皷悶亂不醒縁未產之先内積冷氣遂致產時尿胞運動不順危氏方用鹽於產婦臍中塡可與臍平却用葱白剥去麄皮十餘根作一束切作一指厚安鹽上用大艾炷滿葱餅子大小以火灸之覺熱氣直入腹内即時便通如神驗不可細述治產後惡露不止絞臍冷痛穴陰交治產後陰下脫灸臍下横紋二七壯一云因産脱出者灸臍中二七壯因寒冷脫者灸臍中隨年壯治婦人産後氣血俱虚灸臍下一寸至四寸灸百壯炷如小麥大治産後惡露不止及諸淋穴氣門治婦人産前産後乍傷風邪頭目昏重及血風頭疼穴𩕄會灸七壯眞頭痛者其痛上穿風府陷入泥丸宫不可以藥愈夕發旦死旦發夕死蓋頭中人之根根氣先絶也治産婦血暈不省人事穴支溝三里三陰交治墮胎後手足厥逆鍼肩井立愈灸更勝鍼可七壯治産後善噫穴陷谷期門乳癰治乳癰寒熱卧不安資生經穴膺窓治乳癰穴臨泣治乳洒浙惡寒穴神封治乳癰悽慘寒熱痛不可按及陰腫穴乳根治乳癰有熱腫痛諸藥不能止痛者穴三里鍼五分痛即止治乳癰驚痺脛重喉痺䯒腫足跗不收跟痛穴下廉治乳癰寒熱短氣卧不安穴神封膺䆫治乳癰腫潰穴太谿俠谿治妬乳論曰産後宜勤擠乳不宜令汁畜積畜積不去便結不復出惡汁於内引熱溫壯結牽堅掣痛大渇飲引乳急痛手不得近成妬乳非癰也急灸兩手魚際二七壯斷癰脉也不復惡手近乳汁亦自出便可手助迮捋之則乳汁大出皆如膿狀内服連翹湯外以小豆薄塗之便瘥法以繩横度口以度從乳上行灸度頭二七壯資生經云女人患乳癰四十以下治之多瘥四十以上治之多死不治自終天年王氏云有婦年七十生乳癰不信此論令外科用刀割開其時雖快未幾而殂方知千金猶信也有𢷬地黄汁敷有𢷬蔓菁葉或根敷熱即易之有用白芷末溫湯調敷效治癰疽發於乳者不可治之自得終其天年然無坐視之理今錄驗方於後令患人斂足正立張兩手以小竹須要平直量兩中指尖盡處為則却用薄蔑比如竹長截斷兠從項下兩頭垂向背心㑹於一處㸃定當中不偏又以小蔑比患人右中指自指根横紋至指尖截斷為則安於㸃處對中兩頭盡處是穴左患灸右右患灸左或三壯或五七壯乳腫痛治乳痛資生經穴乳根治婦人乳有餘疾穴肓門治乳餘疾穴中極治乳汁少又云妳脉滯無汁下火立愈穴亶中治厥氣兩乳穴府舍治妬乳膺胷痛穴太泉治乳腫賁膺穴太谿治乳腫穴梁邱地五會治乳腫缺盆中腫穴天牖治乳腫穴足臨泣陰挺出治陰挺出資生經穴大敦治陰挺長穴少府治陰挺出穴陰蹻治婦人陰挺出不禁穴上髎治婦人陰挺出穴陰蹻照海水泉曲泉絶孕治婦人絶産若未經産者資生經穴陰臁灸三壯即有子治絶子帶下月事不調穴中髎治絶子穴次髎漏泉商邱治婦人斷緒及療失精絶子穴中極治絶子藏有惡血上衝腹㽲痛不可忍及腹厥痛絞刺穴石門治女子疝瘕按之如以湯沃两股中小腹腫陰挺出痛經水來下陰腫或癢漉青汁如菜羮血閉無子不嗜食穴曲泉治女子不字陰暴出淋漏月水不來多悶心痛穴水泉陰蹻治不字陰暴出經痛穴然谷治絶子瘧寒熱陰挺出不禁白􅅹痙脊反折穴上窌治拘攣腹滿疝月水不下乳餘疾絶子陰癢賁䐁上䐜腹堅痛下引陰中不得小便穴陰交治絶子有惡血在内不下胞轉不得尿小腹滿石水痛及治引脇下脹頭痛身背熱賁豚寒小便數泄不止穴關元治婦人懷孕不論月數及生産之後未滿百日不宜灸若絶子則灸臍下二寸五分間動脉中三壯治子門不端小腹苦寒陰癢及痛賁豚搶心饑不能食腹脹經閉不通小便不利乳餘疾絶子及拘攣腹疝陰癢穴中極治大疝絶子穴華賓治女子無子欬而氣短穴湧泉治無子小腹痛穴氣衝治絶産若未曽産穴陰廉治婦人絶子穴然谷灸五十壯治婦人絶嗣不生胞門閉塞穴關元灸三十壯報之治婦人姙子不成若墮落腹痛漏見赤穴胞門灸五十壯治婦人絶嗣不生穴氣門灸百壯治婦人子藏閉塞不受精疼穴胞門灸五十壯治婦人絶嗣不生漏赤白穴泉門灸十壯三報治月水不利賁豚上下并無子穴四滿灸三十壯治婦人胞落頹臍中灸三百壯身交灸五十壯三報在臍下横紋中又臍對脊骨五十壯又玉泉灸五十壯三報治婦人下胞垂注陰下脫穴俠玉泉灸五十壯三寸灸隨年壯三報治婦人陰冷腫痛穴歸來灸三十壯三報治婦人斷緒帶下穴中極治斷緒産道冷穴關元日灸百壯止治姙不成數墮落穴玉泉灸五十壯三報玉泉即中極又龍門三十壯治婦人無子穴關元灸七壯治婦人無子反心痛不嗜食五指端盡痛足不得履地穴湧泉宜鍼灸治婦人欲斷産右踝上一寸灸三壯即斷治腹滿疝積乳餘疾絶子陰癢賁豚上䐜小腹堅痛下引陰中不得小便穴石門資生經云石門忌灸絶孕鍼之絶子懐胎必不鍼關元若鍼而落胎胎多不成出鍼外崑崙立出陰交灸多絶孕又云石門關元相去一寸鍼關元治婦人無子鍼石門則終身絶嗣其道幽隱豈可輕侮哉治婦人無子咳𠻳身熱穴湧泉治絶子灸臍中令人有子治婦人無子及已經生子久不再孕及懐孕不成者以女人右手中指中節一寸及指向上量之用草一條量九寸舒足仰卧以所量草自齊心直垂下至草盡處以筆㸃定此不是穴却以原草平摺横安前㸃處其草兩頭是穴按之有動脉各灸三壯如筯杪大神效治婦人足逆寒絶産帶下無子陰中寒刺足少陰經治陰資生經云凡婦人姙娠不可刺昔宋太子善醫行出苑逢一姙婦太子診曰女又令徐文伯診曰一男一女鍼之㵼三陰交補合谷應鍼而落果如文伯之言故姙娠不可刺小兒諸疾治小兒初生三四日二七日内著噤不吮妳多啼者是客風中於臍循流至心脾二經遂使舌本强唇痙嗍妳得斯疾所施方藥不能十全大抵宜去風無過灸承漿次灸頰車二穴穴承漿頰車各七壯如雀屎大治小兒初生臍風口禁痿厥洞洩及臍風撮口諸藥不效者灸然谷穴在内踝前起大骨下陷中可灸三壯鍼入三分不宜見血立效治臍風目上挿刺絲竹穴治小兒臍風口不開善驚穴然谷治小兒臍腫灸腰對臍骨節間三壯治小兒中風客忤而吐不止者灸手心主間使大都隱白三陰交各三壯治小兒中客忤惡氣灸臍上下左右半寸及心鳩尾下一寸凡三處三十壯不在大此兼治小兒百病治小兒夜上燈啼雞鳴止全嬰方灸中衝一壯在中指甲後一分驚風治急慢驚風色危極不可救者危氏方右先當兩乳頭上即乳中穴男左女右灸三壯次灸髮際眉心𩕄會三壯又手足大指當甲角以物縳兩手作一處以艾騎縫灸男近左邊半甲半肉之間灸三壯先脚後手亦可治陰陽諸癎病艾炷如麥子大治小兒慢脾驚危惡証候藥力不到者但看兩脚面中間陷處有太衝脉灸百㑹穴其穴直取前後髮際折中横取兩耳尖折中在頭之中心端正旋毛處是也如有䨇旋及旋毛不正者非所揑艾炷約如小麥許但三五壯而止灸後仍與醒脾之劑治月内嬰兒胎風驚風慢風潮搐涎堵目直口禁乳食不下一切驚風皆治衞生寶鑑灸頂中央百㑹穴三七壯鼻下人中穴三壯又灸𩕄週四角各三壯鼻上天庭穴三壯治小兒緩驚風灸尺澤各一壯王氏云夫急慢驚風非風也古人謂之陰陽癎猶傷寒之有陰陽證也陽癎如陽證當治以凉藥陰癎如陰證當治以溫藥庸醫不知此例以風藥治之風藥多凉或是慢驚未有不罹其害者戒之戒之若灸驚風惟灸慢驚風慢脾風為穏當云治小兒急驚風及驚癎等灸前頂三壯若不愈須灸兩眉頭及鼻下人中治小兒睡中驚目不常合灸屈肘横紋中上三分各一壯治小兒驚恐穴瘈脉治小兒睡中驚掣及驚癎全嬰方灸足大指次指端去爪甲如韮葉各一壯治驚不得卧灸陰交氣海大巨治卧驚視如見鬼灸陰蹻治驚恐畏人神氣不足灸大鍾郄門治心中悚惕恐人將捕之灸然谷治瘈瘲而驚灸解谿治太息煩滿少氣悲驚灸少衝治心下澹澹喜驚灸曲澤治心痛數驚心痛不樂灸行間治風眩驚捲灸陽谷治多卧好驚灸厲兊治喜驚妄言面赤灸液門治數噫恐悸少氣灸神門治喜驚瘖不能言灸間使治喜驚灸三間合谷治瘈驚灸陽谿天井治心下悸灸通里治心中澹澹驚恐灸太陵治氣驚心痛灸手少陽陰郄治淚出而驚灸後谿治煩滿驚灸腕骨治小兒善驚穴然谷治小兒驚恐失精穴長强治小兒驚啼及多哭穴百㑹治一切慢驚風厥危病證灸百㑹穴七壯至七七壯量輕重加减艾壯數又兩足外踝下赤白肉際陷中金門穴灸七壯至七七壯諸風治小兒中風角弓反張多哭言語不擇發無時節盛則吐沫濟生拔萃灸百㑹七壯治卒中風毒如口眼喎斜語言不得全嬰方灸合谷三壯在手大拇指合足處喎左灸左喎右灸右治角弓反張灸神庭在髮際直鼻下及椎骨并鼻上入髮際三分各三壯治風痙角弓反張口噤不語四肢拘急全嬰方灸百會間使神庭各三壯百㑹在髮上五寸間使在掌後二寸兩筋中間神庭在髮際直鼻治小兒喘脹俗謂馬脾風又謂風喉者濟生拔粹方以草莖量病兒手中指裏近掌至中指尖截斷如此三莖自乳上微斜直上立兩莖於稍盡頭横一莖兩頭盡㸃下各灸三壯此法多曾見效治小兒喜欠穴上關治小兒身强角弓反張灸鼻上入髮際三分三壯次大椎下節間三壯治小兒大風癩病灸曲池二穴各隨年壯發即灸之神良治小兒但是風病諸般醫治不瘥灸率谷癎病附論凡小兒新生無疾愼不可逆鍼灸之如逆鍼灸則忍動痛其五脈因喜成癎河洛關中土地多寒兒喜病痙其生兒三日多逆灸以防之又灸頰以防噤有噤者舌下脈急牙車筋急其土地寒皆决舌下去血灸頰所以防噤也呉蜀地溫無此疾也方既傳之今人不詳南北之殊便按方而用之是以多害於小兒也所以田舍小兒任其自然皆得無有夭横小兒驚啼眠中四肢掣動攣蒸未解愼不可鍼灸爪之動其百脈仍因驚成癎也惟陰癎噤痙可鍼灸爪之凡灸癎當先下兒使虚乃承虚灸之未下有實而灸者氣逼前後不通殺人若身體不甚熱心腹下脹滿便可灸之若壯熱滿者先須下後灸癎發平旦者在足少陽晨朝發者在足厥陰日中發者在足太陽黄昏發者在足太陰人定發者在足陽明夜半發者在足少陰右癎發時病所在視其發早晩灸其所也癎有五臟之癎六腑之癎或在四肢或在腹内當其候隨病所在灸之雖少必瘥失其要則為害也王氏云小兒髮逆上啼笑面暗色不變是癎候或鼻口青時小驚或目闕青時小驚或身熱頭常汗出或身熱吐哯而喘或身熱目時直視或卧惕惕而驚手足振揺或卧夢笑手足動揺或意氣下而妄怒或咽乳不利或目瞳子卒大黒於常或喜欠上視或身熱小便難或身熱目視不清或吐痢不止厥痛時起或弄舌揺頭諸候二十條皆癎之初也見其候便爪其陽脈所應灸爪之皆重手令兒驟啼及足絶脈亦依方與湯瞳子直視腹滿轉鳴下血身熱口噤不得乳反張脊汗出發熱嗜卧不悟手足掣瘲喜驚凡八條癎之惡者也如有此非復湯爪所能救當時而灸之法治肝癎病面青目反視手足揺灸足少陽厥陰各三壯治心癎病面赤心下有熱短氣息微數灸心下第二肋端宛宛中此為幽門也又灸手心主及少陰各三壯治脾癎病面黄復大下利灸胃腕三壯俠胃腕傍灸二壯足陽明太陰各二壯治肺癎病面白口沫出灸肺腧三壯又灸手陽明太陰各二壯治腎癎病面黒正直視不揺如尸狀灸心下二寸二分三壯又灸肘中動脈各二壯又灸足太陰少陽各二壯治膈癎病目反四肢不舉灸風府又灸頂上鼻下人中下唇承漿皆隨年壯灸之治陽癎病不動揺灸兩承山又灸足心兩手勞宫又灸兩耳後完骨各隨年壯又灸臍中五十壯治馬癎病張口揺頭馬鳴欲反折灸項風府臍中三壯病在腹中燒馬蹄末服之甚良又灸僕參治牛癎病目正直視腹脹乃發灸鳩尾骨及大椎各三壯燒牛蹄末服之良治羊癎病喜揚目吐舌羊鳴灸大椎上三壯又灸第九椎下節間三壯治猪癎病如屍厥口噦喜吐沫灸完骨兩傍各一寸七壯又法灸巨闕三壯在鳩尾下一寸陷中治犬癎病手屈拳攣灸兩手心一壯灸足太陽一壯肋户一壯又法灸足陽明脚頭兩空各一壯治雞癎病揺頭反折喜驚自揺灸足諸陽各三壯又法灸手少陰三壯在掌後去腕半寸陰郄穴陷中治小兒暴癎灸兩乳頭女兒灸乳下二分治小兒暴癎身軀正直如死人及腹中雷鳴灸太倉及臍中上下兩傍各一寸凡六處又灸當腹度取背以繩繞頸下至臍中竭便轉繩向背順脊下盡繩頭灸兩傍各一寸五壯若面白啼聲色不變灸足陽明太陰若目反上視眸子動當灸𩕄中取之法横度口盡兩吻際又横度鼻下亦盡兩邊折去鼻度半都合口盡為度從頰上髮際上行度之灸度頭一處正在𩕄上未合骨中隨手動者是此最要處也灸三壯次灸當頭上入髮二分許直望鼻為正次灸其兩邊目瞳子直上入髮際二分許次灸頂上迴毛中次灸主客人穴在眉後際動脈是次灸兩耳門當耳開口則骨解開動張陷是也次灸兩耳上捲取之當捲上耳頭是也一法大人當耳上横三指小兒各自取其指也次灸兩耳後完骨上青脈亦可以鍼刺令血出次灸玉枕項後高骨是也次灸兩風池在項後兩轅動筋外髮際陷中是也次灸風府當項中央髮際亦可與風際三處高下相等次灸頭兩角當迴毛兩邊起是也又灸鼻人中口上灸當令近鼻次灸承漿至此又有太極者可灸兩眉頭是也出嬰孺方已上頭部凡十九處兒生十日可灸三壯三十日可灸五壯五十日可灸七壯病重俱灸之輕者只要灸𩕄中風池玉枕也艾使熟炷令平正著肉火勢乃至病所也艾若生炷不平正不著肉徒灸多炷無益也若腹滿短氣轉鳴灸肺募在兩乳上第二肋間宛中懸繩取之當童子是次灸膻中次灸胸堂次灸臍中次灸薛息薛息在兩乳下第一肋間宛宛中是也次灸巨闕大人去鳩尾下一寸小兒去臍作六分之寸去鳩尾下一寸是也次灸胃脘次灸金門金門在穀道囊之後當中央是也從陰囊下度至大孔前中分之已上腹部十二處胸堂巨闕胃脘十日兒只可灸二壯一月以上可灸五壯陰下縫中可灸二壯或云隨年壯若脊强反張灸大椎并灸諸臟腧及督脊上當中從大椎度至窮骨中屈更從大椎度之灸度下頭是督脊也已上背部十二處十日兒可灸三壯一月已上可灸五壯若手足掣瘲驚者灸尺澤次灸陽明次灸少商次灸勞宫次灸心主次灸合谷次灸三間次灸少陽已上手部十六處其要者陽明少商心主尺澤合谷少陽也壯數如上又灸伏兔次灸三里次灸腓腸次灸陽明次灸少陽次灸然谷已上足部十四處皆要可灸壯數如上手足陽明謂人四指凡小兒驚癎皆灸之若風病大動手足掣瘲者盡灸手足十指端又灸本節後治小兒癲癎瘈瘲脊强低引項灸長强穴三十壯在脊㡳端跦地取之乃得治小兒癲癎驚風目眩灸神庭穴七壯在鼻直上入髮際五分治小兒風癎者先屈指手如數物乃發也灸鼻柱上髮際宛宛中三壯治小兒驚癎先驚怖啼呌後乃發也灸頂上旋毛中三壯及耳後青絡脈旋毛中即百㑹穴也治癎頭目眩痛頸項强急胷脇相引不得傾側癲疾不嘔沫灸本神在曲差傍一寸半在髮際又直耳上入髮際四分足少陽陽維之㑹灸五壯治小兒驚癎灸臨泣當目上眥直上入髮際五分陷者中足少陽太陽之㑹灸三壯主頰青不得視口沫出兩目眉頭痛小兒驚癎反視外臺甲乙絰云灸筋縮在第九椎節下間督脈氣所發俛取之灸三壯主小兒驚癎瘈瘲狂走疾急脊强目轉上挿聖惠灸長强一穴在腰腧下脊體骸端陷者中灸五壯主腰脊急强不可俛仰癲狂病大小便難洞泄不禁五淋久痔小兒驚癎病又灸瘈脈二穴一名資脈在耳後雞足青脈是穴主頭風耳後痛小兒驚癎瘈瘲嘔吐泄注驚恐失精視瞻不明䏧瞀灸二壯鍼入一分又小兒驚癎灸鬼祿穴一壯右唇中央絃上炷如小麥大用鋼刀尖斷更住又秦承祖灸小兒胎癎妳癎驚癎狐魅神邪及癲狂病諸般醫治不瘥者以併兩手大拇指用軟絲繩子急縳之灸三壯艾炷著四處半在甲上半在肉上四處盡焼一處不燒其灸不愈神效不可量也諸開灸上一壯如小麥大嬰孺方審是癎候急灸頂上旋髮中若眼直視灸兩目直瞳子髮際各一處心下一寸宛宛中脊上一處當兊骨上一處大觀一處各灸二七壮頂上多灸亦良更見有癎候兩乳内各一寸七壯屢試大效小兒食癎者先寒熱洒淅乃發也灸鳩尾已上各穴不可一時下灸特諸處無效即續次灸之輕者𩕄中額上髮際鼻人中耳門風池玉枕可也凡灸頭風大多者不過三十壯此則沉者不可懶灸可日日灸之也又灸口吻各二七壯又灸諸癎穴不可悉灸候諸處無效方灸之千金翼云灸第二椎及下窮骨兩處以繩度中折繩端一處是脊中骨也凡三處復斷此繩作三折令合等叅合如厶字以一角注中央灸下二角夾脊兩邊便灸之凡五處也以丹注灸所五處各百壯削竹為籐繩嬰孺又云凡灸癎得啼為輕易治不得啼為重難治小兒生十數日便得癎者皆可灸也可灸一壯其要極若三五壯治小兒驚癎灸囊下縫二七壯又兩乳頭三壯又灸天䆫百會又灸耳上髮際各五壯治小兒癎喘不得息耳聾穴取顱息治癎驚如有見者穴列缺并取陽明經治癎瘈遺精若虚則病諸瘕癲實則閉癃少腹中熱善寐穴大敦治癎瘈手足擾目昏口禁溺黄穴商邱治風從頭至足癎瘈口閉不得開每大便腹暴滿按之不下一作噫悲喘穴崑崙癎病腹滿常噎氣灸亶中巨闕各五壯亶中在乳中間平乳取之巨闕在臍上六寸風眩癎病角弓反張全嬰方灸上星三壯治馬癎穴金門僕參治羊癎穴㑹宗下空中治小兒但是風癎病證諸醫治不瘥明堂經穴率谷治小兒發癎瘈瘲嘔吐涎沫驚恐赤頰瞻視不明穴顱𩕄治小兒發癎瘈瘲穴崑崙治小兒發癎瘈瘲穴瘈脈神道顱𩕄治小兒發癎張口揺頭身反折穴金門治狂癎不識人及治風癎全嬰方灸百會五壯治風癲灸督脈在鼻直中入髮際三壯治癲厥狂走欲死灸足大指毛中三壯治狂發無常披髮大呌欲殺人不避水火灸間使在掌後三寸兩筋中間男左女右隨年壯治小兒驚癎風癎瘈瘲發即先時鼻多清涕頂腫穴前頂治小兒驚癎穴長強身柱治小兒驚癎瘈瘲嘔吐泄注驚恐失精瞻視不明穴瘈脈長强治小兒驚癎穴𩕄會前頂本神大椎治小兒驚癎張口揺頭啼呌反折全嬰方灸臍中三壯治癎發目上挿穴攅竹治小兒癎喘不得息穴𩕄會治小兒二十四種瘹法第一瘹牙關緊口不開灸耳門相對一寸七壯穴在直耳門近眼第二鬼瘹手臍冷眼不轉睛口中亂道灸大拇指後紋每七壯在大指節上第三獐瘹渾身壯熱兩手如梳頭啼哭聲促灸兩手心及頂前一寸各灸二七壯第四牛瘹弄唇撮口灸鬼門穴在乳下麥粒七壯第五瘹渾身壯熱上氣擡肩喘息不調頭足俱冷肚脹灸兩肋頭并髮心各七壯兩肋是章門穴第六虎瘹目不轉睛兩手不開乍寒乍熱灸百㑹穴大拇指節上各三七壯第七猫瘹連牙欠口吐舌上唇灸人中穴鼻柱下玉泉穴在枕骨下一寸第四椎兩邊各一寸半各七壯第八風瘹灸玉枕穴在腦杓尖頭二七壯第九螳蜋瘹撮口吐沫兩手在胷前灸肩上頭臍心各三七壯第十蛇瘹吐舌不狂灸耳垂下七壯第十一脾瘹胸内氣結喘息不匀灸臍下一寸三七壯未瘥灸胃脘臍上四指并穴兩傍各四指各七壯腹中鳴是效第十二血瘹瀉血不定灸大腹穴三壯在足大指去爪甲如韮葉第十三搜腹瘹脚冷瀉痢不常灸脊腧腰眼上四寸是又灸穴兩傍各一寸半各三七壯未瘥灸腰眼三七壯第十四心瘹吐逆不定身體壯熱灸百會穴三七壯未瘥後心三七壯第十五瘖瘹不語言灸玉泉穴在玉枕下一寸灸乳上三指各二七壯第十六臘瘹不熱乳食尋常多睡眼不開灸足踝骨上四寸男内踝女外踝各三七壯髮際二七壯第十七雞瘹手愛􅎲人口黒色灸後心五壯未瘥灸兩手心各三七壯第十八猴瘹搐一邊眼不住灸前後心三七壯或有手如梳頭者灸第六椎兩傍各一寸半各三七壯第十九弓瘹身體壯熱脊骨涼急如反弓灸後心三七壯未瘥灸第九椎兩傍各一寸半三七壯第二十瘹乾嘔不定四肢無力灸氣腧十五壯第十二椎兩傍灸各一寸半第二十一癎瘹握兩手如弓不轉眼睛灸後心五十壯第二十二瘹面青撮口眼中淚下此是破軍星所作灸後心五十壯第二十三瘹驚哭不定咬牙作聲此是廉貞星所作灸第五椎下兩傍各一寸半各三七壯第二十四瘹揉眼睛咬指甲此是文曲星所作灸兩手心三七壯未瘥灸中指頭七壯治小兒驚瘹牙關硬百㑹上灸三七壯又灸耳後一寸當時得效舌䑛唇連牙欠口此名牛星瘹灸人中三七壯愛吐逆舌不住名蛇驚灸承漿穴二壯愛咬人名狐瘹灸後心一百壯下元虚腹脹氣塊排連臍上臍心灸一七壯翻眼擡睛名天瘹於足大拇指當節上灸一七壯破腹害肚米穀不消脚脈不行是搜腹瘹病凖前之穴灸之多睡㝠目不開内踝上面正四寸急灸之疳病治小兒疳瘦於胷下鳩尾骨尖上灸三壯次於脊下端尾翠骨尖上灸三壯兼小兒疳瘦脫肛體瘦渴飲形容瘦瘁諸方不瘥尾翠骨上三寸骨陷中灸三壯治小兒驚疳黄瘦塊腹脹㵼痢一切損虚灸鳩尾下臍上中停中脘穴二七壯又脊骨從上第十椎下兩傍各一寸半脾俞穴二七壯甚佳治小兒脾神法未灸之前先於土田地上畫箇十字中心先灸一炷令云不灸天神不灸地神只灸脾神灸畢後灸病兒男左女右手用竹片四五寸長令小兒搦定拳頭將竹片於中指背節頭為凖比至中節盡處將竹虚折過再比囘一般齊折折作如此様令㸃腰眼下左右隱然有二坑窩處將此様竹二尖頂一窩穴中尖落處即腰眼也如此比定窩窩以上尖為腰眼穴其艾炷視小兒歳數大小病勢輕重加減小者如筯頭大大者如小指尖大多者灸四七少者灸三七灸畢男於左脚腕上凹中窩穴内拔出火氣小兒三歳以下灸三炷五歳以上灸七壯灸畢將竹杖如上者通長舒直於病兒心坎上邊立直竹片下邊盡處為穴心坎作如此様心穴亦看小兒大小及病勢輕重輕則灸三炷重則灸二七病發者中病也如不發可用發瘡物令小兒食之即發既發之後却須忌口十數日於瘡則有效驗只在十日半月之間進飲食退黄色變容顔取竟取萬全之效吾家之孫頼此以活餘人愈者甚多如若灸時得一知穴法之人㸃定尤佳治小兒腹大灸分水治小兒無辜疳腦後頂邊有核如彈子按之轉動軟而不疼其間有蟲如米粉不速破之則蟲隨熱氣流散淫蝕臟腑以致肢體作惡瘡便利膿血壯熱羸瘦頭露骨立皆因氣血虚憊所致或因灑濯兒衣露於簷下為鴟鳥落羽所汚兒著此衣蟲入皮毛亦致斯疾凢曬兒衣隨須微火烘之用鍼刺破以膏藥貼則愈治小兒癖氣久而不瘥者灸中脘一穴章門一穴在大横外直臍季肋端側卧曲上足舉臂取之右中脘章門二穴各灸七壯臍後脊中灸二七壯取中脘從􅐳􅚯下取病人四指是穴灸之無不效也治小兒乳癖用麄線兩條各量兩乳頭中間濶狹於兩乳頭上垂下照端直方停對兩乳於左右肋上灸七壮炷如麥大治小兒癖出危氏方灸兩乳下一寸各三壯治小兒哺露灸大椎又灸尺澤在腕内横紋中尖又灸九角治小兒疳蝕瘡灸第十五椎俠脊兩傍七壯未瘥再加七壯治小兒腹滿不能食飲穴懸鍾治羸瘦不肥食飲少不生肌膚出資生經灸胃腧三壯一作一壯在第十二椎下兩傍各一寸半治小兒身羸瘦賁豚腹腫四肢懈惰肩背不舉出濟生拔粹方灸章門二穴二七壯在大横外直臍季肋端側卧屈上足伸下足舉臂取之嘔吐治嘔吐出全嬰方灸上脘中脘各三壯上脘在臍上五寸中脘在臍上四寸治小兒嘔吐奶汁出幼幼新書灸中庭一穴一壯在亶中穴下一寸陷者中治吐痢過多手足厥冷六脈沉細灸第二脚指上中節紋三壯立愈男左女右治小兒嘔吐泄痢穴瘈脈治小兒嘔吐涎沫穴顱𩕄治霍亂已死無命有暖氣者出全嬰方取草圍一足從指頭至跟匝捻取等折一半以度從足跟着地處上行度盡是穴灸七壯瘧治小兒瘧疾灸大椎百㑹各隨年壯治小兒瘟瘧灸兩乳下一指三壯治小兒瘧久不愈灸足大指次指外間陷者中各一壯内庭穴也泄痢治小兒秋深冷痢不止者灸臍下二寸三寸間動脈中三壯治小兒洞泄穴然谷治小兒脫肛㵼血深秋不止及疳痢脫肛灸龜尾一壯脊端窮骨也治小兒大腸虚肛門出出直指方灸百㑹穴直取前後髮際折中横取兩耳尖折中在頭之中心端正螺毛處是也兩手握蒜灸灸則肛腸自收治小兒脫肛瀉血每發臟腑撮痛不可忍者出明堂經灸百㑹七壯治小兒痢下赤白秋末脫肛每厠腹痛不可忍者明堂作肛疼灸十二椎下節間名接脊穴一壯治臟熱肛門脫出及疳痢脫肛體瘦渴飲形容瘦瘁諸治不瘥灸頂上旋毛中三壯即入又灸尾翠骨三壯又灸臍中隨年壯岐伯曰兼三伏内用桃枝水浴兒午時當日灸之後用青綿子拭當有疳蟲隨汗而出此法神妙目病治小兒雀目疳眼及眼闇冷淚穴睛明治小兒疳眼灸合谷一壯治目澁怕明狀如青肓灸中渚各一壯治小兒妳癖目不明灸肩中俞各二十壯明堂作各一壯治小兒二三嵗忽發兩眼大小角俱赤灸大指次指後間一寸五分陷者中各三壯治小兒熱毒風盛眼睛疼痛灸手中指本節頭三壯名拳尖也治小兒三五嵗兩眼每至春秋忽生白翳遮瞳子疼痛不可忍者灸九椎上一壯治雀目夜不見物出全嬰方灸手大指甲後一寸内兼横紋頭白肉際各一壯亦治翳障治小兒斑瘡入眼灸大抒二穴各一壯項後第一椎下兩傍各一寸半陷者中炷如小麥大治小兒目不明穴肝俞可灸一二七壯治小兒口吐臭氣出幼幼新書灸手心一炷治小兒口中腫或有瘡蝕斷腥臭穢氣衝人灸勞宫七壯口耳喉舌病治小兒重舌灸行間隨年壯穴在足大指岐中又灸兩足外踝上三壯治喉中鳴咽乳不利穴璇璣灸三壯治小兒急喉病出幼幼新書灸天突穴一壯治喉痺哽噎咽腫不得息水漿不下出全嬰方灸膈腧在第七椎下兩傍各一寸半又灸鳩尾在蔽骨下五分治耳聾嘈嘈無所聞出全嬰方灸浮白在耳後入髮一寸治小兒耳聾穴顱𩕄鍼牙疼出幼幼新書鍼隨左右邊疼手大指次指掌間入一寸得氣絶補三十九息大小便病治小兒遺尿亦治尿血灸臍下一寸半隨年壯又灸大敦三壯治小兒尿血灸第七椎兩傍各三寸隨年壯治大小便不利欲作腹痛灸榮衝四穴百壯穴在胸背脊四面各一寸治腹熱閉時大小便難腰痛連胸灸團罔百壯穴在小腸俞下二寸横三寸間灸之治大小便不通灸臍下一寸三壯又灸横百壯治小兒大小便不通灸口兩吻各一壯治小兒卒不尿右安鹽於臍中灸之治大小便不通灸八窌穴在腰目下三寸背脊相去四寸邊各四穴計八穴故名八窌治小便不利大便泄注灸天樞百壯穴在俠臍相去一寸魂魄之舍不可鍼大法在臍傍一寸合臍相去可三寸也治小便不利大便數注灸屈骨端五十壯㿗病治小兒㿗法右將兒坐碓頭祝之曰坐汝令兒某甲陰囊㿗故灸汝三七二十一枚灸訖便牽小兒令雀頭下向者囊縫當陰頭灸縫上七壯即消已驗艾炷蝟簪頭大耳治小兒氣㿗灸厥陰大敦左灸右右灸左各一壯治小兒胎疝痛不得乳穴築賔治小兒卒疝嘔逆惡寒喉乾腹腫内踝前痛淫濼䯒痠腋下腫穴太衝又云治小腹痛小便不利如淋治小兒偏墜若非胎中所有在後生者出濟生拔粹方灸莖下堅囊前中門强子上七壯即愈治小兒疝氣陰囊核腫痛如一歲兒患甚向陰下縫小下有血灸三壯瘥如五歲兒以上患即從陰上有穴灸之即愈又法灸大敦七壯治小兒胎產疝卵便腫者灸囊後縫十字文當上三壯春灸夏較夏灸秋較秋灸冬較冬灸春較治小兒陰腫灸内崑崙二穴三壯即太谿穴治小兒陰疝腫發便腫痛灸足大指本節三炷隨痛左右灸之雜病治小兒多涕者是腦門被風拍著及肺寒也灸𩕄㑹治小兒飲水不歇面目黄者灸陽綱各一壯治小兒五六歲不語者心氣不足舌本無力撥轉難灸心腧三壯或足兩踝各三壯治小兒卒患肚皮青黒不急治須臾即死灸臍上下左右去臍半寸并鳩尾骨下一寸凡五處各灸三壯治小兒𩕄陷灸臍上下各寸半及鳩尾骨端又足太陰各一壯治小兒𩕄不合灸臍上下各五分二穴各三壯灸瘡未發𩕄門先合治水氣四肢浮腫及腹大灸分水三壯在臍上一寸炷如小麥大小兒龜背者生時被客風拍着脊骨風達於髓也以致如是灸肺腧心腧膈腧各三壯然法亦累用十有三得效亦無全效之功符直殿之孫紹熈辛亥春灸即效治小兒龜胸緣肺熱脹滿攻胸膈所縁生又縁乳母食熱麫五辛致使轉更胸高起也灸兩乳前各一寸五分上兩行三骨罅間六處各三壯炷如小麥大春夏從下灸上秋冬從上灸下若不依此法灸十患不愈一二也治失欠頰車蹉灸背第五椎一日二七壯滿三日未瘥灸氣衝二百壯胸前喉下舊骨中是亦名氣堂治頰車蹉閃灸足内踝上三寸宛宛中或三寸五分百壯三報此三陰交穴也治小兒食每頭痛及五心熱者穴譩譆治小兒脇下滿瀉痢體重四肢不收痃癖積聚腹痛不食痰瘧寒熱灸脾腧二穴在十一椎下兩傍相去各一寸五分又治腹脹引背食飲多漸漸黄可灸七壯黄疸者可灸三壯治癮疹痒痛方灸曲池二穴小兒隨年壯發即灸之神良治邪病卧瞑瞑如死灸風府五壯在後髮際上一寸大筋内宛宛中禁鍼妄語鬼言灸鬼祿五壯刀子决斷尤佳凡人中惡先掐鼻是也又法大呌狂走灸足三里在膝下三寸脛外又法邪病四肢重痛并諸雜候尺澤主之在動脉中治咳嗽久不瘥灸肺腧五壯在三椎下兩傍各一寸半治咳而泄不欲食穴商邱治小兒心疼灸足大拇指中節上三艾即止男左女右治小兒頂腫穴前頂治小兒鼻多清涕穴前頂普濟方卷四百二十四
