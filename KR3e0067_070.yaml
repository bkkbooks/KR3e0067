body:
  text: 普濟方卷七十一明周王朱橚撰眼目門總論黄帝問曰余嘗上清冷之臺中陛而顧匍匐而前余私異之竊内怪之或獨㝠視安心安氣久而不解披髮長跪俛而視復久之又不已卒然自止何氣使然岐伯對曰五臟六腑之精氣皆上注於目而為之睛睛之果者為眼骨之精為瞳子筋之精為黒眼血之精為其絡果氣之精為白眼肌肉之精為約束果氣筋骨血氣之精而與脈并為絲絲上屬於腦後出於頂中故邪中於頂因逢身之虛其入深則隨眼絲以入於腦入於腦則轉轉則引目絲急急則目眩以轉矣邪中其睛則其睛所中者不相比不相比則睛散睛散則岐故見兩物目者五臟六腑之所注也營衞魂魄之所營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黒眼法於陰白眼赤脈法於陽故陰陽端而精明矣目者心之使也心者神之舍也故神分精亂而不專卒然見非常之處精神魂魄各不相得故曰惑帝曰余疑何其然也余每之東菀未嘗不惑去之則復余惟獨為東菀勞神乎何其異也岐伯曰不然夫心有所喜神有所惡卒然相感則精亂視誤故神惑神移乃復是故間者為迷甚者為惑心臟神肝臟魂腎臟志肝為中將取决於膽㑹氣於心而主於目目者五臟之精氣也五臟有病皆形於目目色赤病在心目色白病在肺目色青病在肝目色黄病在脾目色黒病在腎不辨色者病在胸中陽氣失則目瞑陰氣絶則目盲肝氣通於目肝氣通和則辨五色肝有病則目奪精而眩肝中寒則目昏而瞳子痛邪傷肝則目青黒瞻視不明肝實熱則目痛如刺肝虛寒則目􅉩􅉩諦視生花肝勞寒則目澁閉不開肝氣不足則目昏暗風淚視物不明肝熱衝睛目眥赤痛生瘜肉及目睛黄膽與肝合膽虛為隂邪所傷目中生花肝熱則目中多赤痛淚出肝不利則目昏肝熱中風則目欲脱而淚出目熱則内外皆爛肝久熱實則目赤而生淫膚瘜肉故目者五臟之精氣所成也眼有五輪風輪血輪氣輪水輪肉輪五輪應於五臟隨氣之主也肝者在臟為肝其色青其味酸屬東方甲乙木也王於春肝氣通於目左目屬甲為陽右目屬乙為陰肝生風眼有風輪也雖有其名形狀難曉與水輪相輔也心者在臟為心其色赤其味苦屬南方丙丁火也王於夏心生血眼有血輪也血輪與肉輪相連也赤黒色是也此輪忌針脾者在臟為脾其色黄其味甘屬中央戊巳土也王於四季十八日脾生肉眼有肉輪也肉輪在外鬱鬱黄白色今俗為白睛也肺者在臟為肺其色白其味辛屬西方庚辛金也王於秋肺生氣眼有氣輪也氣輪在肉輪之下隱而不見也腎者在臟為腎其色黒其味醎屬北方壬癸水也王於冬眼有水輪也水輪在四輪之内為四輪之母能射光明能視萬物今呼為瞳人也肝臟病者應於風輪風輪病即望風淚出覩物煙生夜退晝増磣痛畏日或如青衣拂拂時似飛蠅聯聯此是肝臟之疾宜治肝也心臟病者應於血血輪病即飛花競起散亂縱横努肉漸漸沾睛兩眥淚淹赤爛此是心臟之疾宜治心也脾臟病者應於肉輪肉輪病即瞼内腫疼眥頭澁痛眼見飛絲繚亂又如毛髪縱横夜半甚於黄昏日没増於早起此是脾臟之疾宜治脾也肺臟病者應於氣輪氣輪病即忽如雲飛遮日逡廵却漸分明或而雪影中花或似飛蠅相趂此是肺臟之病宜治肺也腎臟病者應於水輪水輪病即黒花簇簇霧氣紛紛昏視一物如見兩般覩太陽如同水底此是腎臟之疾宜治腎也夫眼目者法天地日月也天地清靜日月光明天地晦暝日月昏暗經云眼應於肝王春三月作魂神宫眼為户牗所通萬事無不視之好惡是非自然分别自少及長疾狀多般皆是攝養有乖致使眼目生患凡人多餐熱食或嗜五辛喜怒不時淫欲不節凌寒冒暑坐濕當風恣意呌呼任情號泣長夜不寐永日不眠極目視山登髙望遠或久處煙火或博奕經時抄寫多年雕鏤綉畫燈下看字月中讀書用其眼力皆失光明也更有馳騁畋獵冒涉雪霜向日迎風晝夜不息皆是喪目之因也恣一時之快意為百疾之深源所以疾生眼目也諸凡養性之士必須慎焉若能終身保惜可使白首無患目者肝之外候也肝取木腎取水水能生木故肝腎之氣充則精彩光明肝腎之氣乏則昏䝉暈眩烏輪赤暈刺痛浮漿此肝熱也膽生清淚枯黄遶睛此肝虛也瞳人開大淡白偏斜此腎虛也瞳人焦小或帶㣲黄此腎熱也一虛一實以此驗之然人知肝腎之氣相依而行孰知心者神之舍又所以為肝腎之副焉所謂一而二二而一者也何則心主血肝藏血血能生熱凡熱衝發於眼皆當清心凉肝又不可面執水生木之説大抵拘急牽颼瞳青胞白癢而清淚不赤不疼是之謂風眼烏輪突起胞硬腫紅眵淚濕漿裏熱刺痛是之謂熱眼眼昏而淚胞腫而軟上壅䑃朧酸澁微赤是之謂氣眼其或風與熱并則癢而浮赤風與赤搏則癢澁昏沉血熱交聚故生淫膚粟肉紅縷偷針之類血氣不至故有眇視胞垂雀眼盲障之形淡紫而隱紅者為虛熱鮮紅而妬赤者為實熱兩眥呈露生努肉者此心熱血旺白睛紅膜如傘紙者此氣滯血凝熱證瞳人内湧白睛帶濕色浮而赤者冷證瞳人青綠白睛枯槁氣沉而濁者眼熱經久復為風冷所乗則赤爛眼不赤但為痰飲所疰則作疼肝眼不順而挾熱所以羞明熱氣蓄聚而傷胞所以胞合又曰睛帶赤或紅筋者其熱在肺上胞下胞或目唇間如疥㸃者其熱在脾脾主味五味之秀養諸中則精華發見於其外肺主氣水火升降營衞流轉非氣孰能使之眼之為患多生於熱其間用藥大抵以清心凉肝調血順氣為先有如腎家惡燥設遇虛證亦不過以當歸地黄軰潤養之輕用温藥不可也肺能發燥肝亦好潤古方率用杏仁柿乾飴糖沙蜜為佐果非潤益之意乎至於退瞖一節尤闗利害凡瞖起於肺家受熱輕則朦朧重則生瞖真珠瞖狀如碎米者易散梅花瞖狀如梅花葉者難消雖瞖自熱生然治法先退瞖而後退熱者謂熱極生瞖若先去熱則血為之氷而瞖不能去其有赤眼與之凉藥過多又且滌之以水不反掌而氷凝眼特一團水耳水性清澄尤不可規規於㸃洗諺曰眼不㸃不瞎耳不斡不聾風眼腫則軟熱眼腫則硬傷風冷則淚出虛煩則昏䝉勞力則眥赤白腫則脾家受毒生瘡則風熱侵肺黄乃酒傷於脾血灌瞳人及赤色俱是心家有熱羞明見紅花為肝冷黒花則腎虛青花膽有寒五色花為腎虛兼熱不可一槩為治若虛不補而實不瀉亦難收效然上虛乃肝虛下虛乃腎虛肝虛則頭暈耳聾目眩腎虛眼生花耳作蟬鳴大宜補肝益腎其有熱淚交流兩瞼赤痛乃肝之極熱迎風有淚為腎虛客熱凉肝瀉腎必得其宜至於五臟各以類推虛則生寒實則生熱至如暴赤一證多因泛熱衝上或眠食失時飽食近火得之加以勞役失於調攝過食毒物變成惡證醫者不原本始但知暴赤屬陽或以散血之劑或以凉心之藥縱使退散遂致脾經受寒飲食不進頭目虛浮五臟既虛因成内障亦有見其不進飲食俾更服熱藥遂致三焦暴燥熱氣上攻昏澁眵淚或犯盛怒辛苦重勞遂生努肉心氣不寧風熱交併變為攀睛證狀不一是為外障又若讀書博奕等過度而致疾者名曰肝勞不可但投以治肝之劑及作他證治之卒於莫效惟須閉目珍䕶不極遠視庶乎可瘳若夫患風疹者必多眼暗先攻其風則暗自去婦人胎前産後用藥亦須避忌小兒所患切宜善治惟畧加淋洗披鎌針灸斷不可施猶須戒其用手頻揉或因茲睛破至於莫救有人患眼漸膜膜狀與青盲相似而眼中一無所有此名黒盲如瞳子大者名曰烏風如瞳子瞖緑者名曰緑瞖青盲皆是虛風所作急須治療若眼自闇多時不復可療此疾之源皆從内肝管缺少眼孔不通所致也亦宜須初欲覺時即須速療之若已成病不復可療若因時病後得眼生白障者此名為瞖也若因病後生肉者此為膚障也若眼赤痒淚出者為熱虛風若見黒煙赤光瞳子黒大者為烏風勞水動故宜服車前空青丸以消息之若或爾赤痛者此是天行眼痛風熱所作故應宜早急療之不者當生於瞖後難療若人眼痛當黒珠生白瞖并黒子等大如米凡如此者名為痛損眼此不可易療診目痛赤脈上下者太陽病從上下者陽明病從外走内者少陽病鼻洞者濁下不止傳為鼽瞢瞑目故得之氣厥足陽明有夾鼻入於面者名曰懸顱屬口對入係目本視有過者取之損有餘益不足反者益甚足太陽有通頂入於腦者正屬目本名曰眼糸頭目固痛取之在頂中兩筋間入腦乃别隂蹻隂陽相交陽入隂出陽交於兌眥陽氣盛則瞑目隂氣絶則眠凡人年四十五已後漸覺眼暗至六十已後還漸目明治之法五十以前可服瀉肝湯五十已後不可瀉肝目中有疾可傅石膽散藥等無病不可輙傅散但補肝而已自肝中有風熱令人眼目暗者當灸肝腧及服除風湯丸散數十劑當愈眼之病在腑則為表當除風散熱在臟則為裏宜養血安神暴發者為表而易治久病者在裏而難愈除風散熱者瀉青丸主之養血安神者定志丸主之婦人則熟地黄丸主之凡眼藥率多凉劑必於食後服之或者徒泥其説往往食未下咽藥即入口是致食氣與藥氣衝摶釀積於脾胃之上不惟藥無其效且使脾家受冷旋至虛弱須當食歇片時候胷膈稍寛然後隨意服之尤貴冷熱得所大熱則非肝肺所宜大冷則脾胃停積不化宜自酌量之耳凡㸃眼之藥腦麝之類通入闗竅毛孔易至引惹風邪㸃眼之時向密室端坐然後以銅筯㸃少許藥放入眼内㸃畢以兩手對挼魚尾二穴次合眼良久候血脉稍定漸漸放開若是夜卧用藥則又不拘此法也或向當風去處或是㸃罷即開則風邪乗入血脈凝滯難散疾勢愈増切須致意風輪病因喜怒不常作勞用心書凝視遠物夜勤讀細書眼力既勞風輪内損其後眥頭尤澁睛内偏疼視物不明胞眩緊急宜去風藥血輪病因憂愁思慮悲喜煩勞内動於心外攻於目其候赤筋纒眥白障侵睛胞腫難開昏暗多澁日久不治失明愈深宜洗眼涼血藥肉輪病因多餐熱物好喫五辛遠道奔馳駐睛驟騎食飽眈眼積風痰壅其候胞眩赤腫暴赤昏蒙眼淚常盈倒睫澁痛瘀血侵睛宜疎醒脾藥氣輪病因凌寒冐暑愛飲寒漿肌體虛疎寒邪入内或痛或昏傳在白睛筋多腫赤視日如隔霧觀物似生煙日久不治變為白膜黒暗難開水輪病因勞役不止嗜慾無厭大驚傷神大怒傷志加之多食酒麯好啖醎辛因動腎經通於黒水冷淚鎮流於瞼上飛蠅相趂於睛前積聚風虛或澁或痒結成瞖瘴多暗多昏宜補腎藥天廓病因雲中射雁月下看書多食腥膻侵冐寒暑致天廓有内動視物生煙眥疼難開不能辨認地廓病因濕漬頭上冷灌睛眸致令有病眼眩緊急瘀血生瘡火廓病因心神恐怖赤脉侵眥血灌瞳人熱淚如傾其證瞼頭紅肺睛内偏疼熱淚難開水廓病因大勞努力爭鬭擊棒開弓驟騎强力致令生病常多暗昏睛眩淚多風廓病因枕邊牕穴有風不能遮閉坐卧當之腦中邪風攻於風廓以致黒睛多痒兩瞼常爛或昏暗多淚雷廓病因失枕睡卧酒後行房血脉溢滿精宣閉滯風虛内聚上攻故令眥頭赤腫瞼上生瘡倒睫拳毛遮睛努肉山廓病因撞刺磕損致令肉生兩瞼瞖閉雙睛若不早治永沉昏暗瘀血侵睛澤廓病因春不宣解冬聚陽毒多喫脂肥過飱熱物致令腦脂凝聚血淚攻潮有如霧籠復見飛蜂繚繞黒花常滿難於瞻視肝虛眼論夫肝虛眼其證不一有忽然發腫者有淚出不止者有睛生瞖暈者有視物漠漠不能遠視者有精彩昏濁黒白不明而暈者葢肝開竅於目腑臟精華之所聚也血氣既衰不足以榮養故證狀之異如此龍木論云肝虛積熱外障眼初患之時忽然發動赤澁淚出痒痛摩隱瞳人黒睛漸生瞖障或退或散或聚初時即輕如經一二年間漸重於目不明此皆因肝間勞熱所作毒風入腦眼中覺患切宜服藥將息不得燒灸頭面宜服瀉肝湯青葙子丸及硃砂煎㸃之立效歌曰用力勞心赤痛來睛疼怕日淚難開有時發動有時轉怨鬼愁神作禍災忽爾瞖生還自可須知肝膈熱勞排急求湯藥旋除去根株莫遣臟中埋一眼初時生作患招呼後眼不相違今年發動輕輕過後歲應多轉轉危藥丸青葙須志服披鎌雙瞼血漼漼眼中宜㸃硃砂煎莫灸頭中即易為方還睛補肝丸治肝虛兩目昏暗衝風淚下白术細辛去苖葉當歸切焙決明子㣲炒芎藭羌活去蘆頭五味子白茯苓去黒皮人參防風去叉地骨皮苦參𤣥參菊花車前子㣲炒桂去麤皮黄芩去黒心青葙子甘草炙剉右等分為末煉蜜和丸如梧桐子大每服三十丸米飲下加至四十丸不拘時服鎮肝丸龍木治肝經不足内受風熱上攻眼目昏暗痒痛隱澁難開推眵多淚怕日羞明時發腫赤或生障瞖並宜服之和劑方白茯苓去皮一兩甘菊半兩甘草炙各半兩地骨皮去土半兩蔓荆子去白皮一兩人參一兩茺蔚子一兩遠志去心一兩地膚子一兩車前子半兩青葙子炒半兩茈胡去蘆半兩山藥半兩决明子一兩防風去蘆叉各一兩細辛去苖一分栢子仁半兩炒𤣥參半兩右為末蜜水煑糊丸如梧桐子大每服二十丸米飲下食後日三服栢子仁丸聖濟總録治肝虛視物漠漠不能遠見睛輪昏暗澁痛瞖暈時聚時散補肝丸栢子仁研薏苡仁烏麻仁車前子枸杞子菴䕡子兎絲子酒浸别搗末各一兩牡荆子青葙子五味子蛇床子桂去麤皮菊花山芋各半兩熟乾地黄焙肉蓯蓉酒浸切焙白茯苓去黒皮各一兩右為末煉蜜和丸如梧桐子大每服二十丸空心温酒下龍腦青葙子丸出聖惠方治肝臟虛風時多冷淚眼目昏暗龍腦細研牛黄細研曽青燒細研各半兩青葙子人參去蘆頭車前子白茯苓芎藭羌活細辛天麻防風去蘆頭黄耆剉石决明細研水飛各一兩旋復花三分麝香一分細研右為末研了藥都拌令勻煉蜜和搗三二百杵丸如梧桐子大每於食後湯下十丸𤓰子散出千金方補肝治眼漠漠不明亦名十子散方冬𤓰子青葙子茺蔚子枸杞子牡荆子蒺藜子兎絲子蕪菁子决明子地膚子蒺藜栢子仁各二合牡桂蘡薁根各二兩𬎼仁一合一云二兩車前一兩細辛半兩一云一兩半右治篩食後以酒服方寸匕日二神驗遠志丸出直指方治清益心肝明目退瞖人參茯神去木蘆薈研琥珀蔓荆子各半兩生地黄川芎熟地黄冼焙茺蔚子各半兩蟬殻一兩洗曬全蝎五枚白蒺藜去刺炒細辛車前子遠志水浸去心乾薑汁醮焙各七錢半右為細末煉蜜丸梧桐子大每服五十丸空心米粥飲下臨卧食後菖蒲湯下羌活散龍木鎮肝明目暴赤眼亦治赤眼一切内外障瞖本事方羌活川芎旋復花防風各半兩甘草楮葉蒼术泔浸不去皮自乾不見火桑葉並八月採陰乾秤已上各一兩楮實甘菊花蟬蜕木賊各一兩右為末茶清調下二錢早晩食後臨卧各一服合時不得焙及犯鐵器此方取楮葉復取實者何也葢陰陽二物相配有實者陽也無實取葉者隂也所以咸得其宜忌濕麵及酒諸藥悉無效青葙子丸龍木治肝虛積熱外障青葙子二兩車前子細辛乾地黄兎絲子防風茺蔚子五味子人參澤瀉茯苓各一兩右為末煉蜜為丸如梧桐子大空心茶下十丸乾地黄丸聖濟總録治肝虛淚出不止瞖暈侵睛視物不遠或睛昏濁黒白不眀熟乾地黄焙五味子㽔仁去皮研兎絲子酒浸一宿别搗車前子各一兩細辛去苗葉甘草炙剉防風去蘆栢子仁研白茯苓去黒皮各半兩右為末煉蜜和丸如梧桐子大每服二十丸空心温酒下羊肝丸龍木鎮肝明目本事方甘菊花羌活栢子仁細辛官桂白术五味子各半兩黄連三分羯羊肝一具新瓦盆中􅏼乾更焙之肝若大止用一半右為細末煉蜜為丸如梧桐子大空心温水下三十四丸一方有地黄無栢子仁地黄丸一名菊花丸治用力勞心肝虛風熱攻眼赤腫羞明漸生瞖膜兼肝腎風毒熱氣上衝目痛久視傷血血生肝故勤書則傷肝而目昏肝傷則目生風而熱氣上湊目昏益甚不宜專服補藥常益血鎮肝而目自明黄連决明子各一兩没藥甘菊花防風羌活桂心光明硃砂各半兩熟乾地黄一兩半右為細末煉蜜為丸如梧桐子大每服三十丸熟水下食後日三服晉范寗嘗苦目痛就張湛之戲曰有方宋楊子少得其術以授魯東門伯次授左丘明遂世世相傳以及漢杜子夏晉左太冲凡此諸賢並有目候得此方云用捐讀書一減思慮二專内視三簡外觀四旦起晩五夜早眠六凡六物熬以神煉以氣藴於胷七日然後納諸方寸修之一時近数目睫逺視天末長服不已洞見墻壁之外非但明目且可延年審如是而行之非可謂之嘲戲亦竒方也補肝湯治肝虛兩脇滿痛筋脉拘急不得喘息兩目昏暗面多青色防風去蘆苗細辛去苖葉栢子仁白茯苓去黒皮桂去粗皮甘草㣲炙剉山茱萸桃仁湯浸去皮尖雙仁炒蔓荆實去浮皮右等分麤搗篩每服五錢水一盞半大棗三枚劈破同煎至八分去滓温服不拘時日再服甘草湯聖濟總録治肝氣不足兩脇拘急疼痛寒熱目不明甘草炙剉防風去蘆桂去粗皮烏豆一合細辛去苖葉各半兩㽔仁去皮一兩研爛白茯苓去黒皮二兩右麤搗篩每服五錢水一盞半棗三枚劈破同煎至七分去滓食後卧時服㯽榔湯聖濟總録治肝虛寒眼目昏暗脇下痛脹滿氣急㯽榔剉生用陳橘皮湯浸去白桔梗各一兩白茯苓去黒皮一兩半白术二兩附子炮製去皮臍桂去粗皮吳茱萸湯洗焙乾炒各半兩右麤搗篩每服五錢水一盞半入生薑一片大棗一枚劈碎同煎至八分去滓温服不拘時候若氣喘急加半夏半兩薑湯洗去滑芎藭甘草各一兩石决明丸治肝虛血弱目久昏暗石决明五味子兎絲子酒浸一宿别搗末各一兩細辛去苗葉知母焙山芋熟乾地黄焙各一兩半右為末煉蜜和丸如梧桐子大每服三十丸空心米飲下硃砂煎龍木治肝虛積熱外障龍腦一分乳香二分硃砂半兩細辛白芷黄連秦皮各一兩右為末以水浸一伏時去滓用汁以蜜五兩煎之㸃眼地黄丸龍木治男子婦人肝臟積熱肝虛目暗膜入水輪滿睛眵淚眼見黒花視物不明混睛冷淚瞖膜遮障腎臟虛憊肝受虛熱久近暴熱赤眼風毒氣眼乾濕脚氣清中消渴諸風氣等疾由腎氣虛敗者但服此能補肝益腎驅邪明目甚效生乾地黄洗焙熟乾地黄洗焙各一斤枳殻去穰麩炒石斛去苗防風去苗各四兩杏仁去皮尖麩炒黄去油二兩牛膝酒浸二兩右為末煉蜜為丸如梧桐子大空心温酒鹽湯米飲任下三十丸忌動風物唐相李恭扈從在蜀患眼或澁或痛或生瞖膜或見黒花如豆大累累數十不斷或如飛蟲翅羽百方不效僧智深云相公此病緣受風毒葢五臟實則瀉其子虛則補其母母能令子實子不能令母虛腎是肝母今腎受風毒故令肝虛則目視昏昏用藥與上地黄丸同但為末不許犯鐵器空心豆淋酒下五十丸豆淋酒法用黒豆半升炒令煙出以酒三升沃之去豆用酒以此酒煑獨活即時紫湯也一方無防風流氣飲出和劑方治肝經不足内受風熱上攻眼目昏暗視物不明常見黒花當風多淚怕日羞明推眵赤腫隱澁難開或生瞖障倒睫拳毛眼眩赤爛及婦人血風眼時行暴赤眼胞紫黒並宜服之方見本門目風赤類菊花散出危氏方治肝受風毒眼目昏朦漸生瞖膜蟬脱去足白蒺藜炒焦去刺羌活各三兩甘菊去蕚四兩木賊去節童便内浸一宿曬乾三兩荆芥穗甘草各二兩右為末每服二錢食後茶清調下湯泡散治肝虛風熱攻眼赤腫差明漸生瞖障當歸尾赤芍藥黄連去鬚杏仁各五錢銅青二錢防風五錢薄荷葉三錢右剉散每用二錢極沸湯泡乗熱先薫後洗冷則再煖用日兩三次一方白鹽入少許閉目沃洗鹽亦散血還睛丸治肝臟虛血弱不能上助目力視物昏暗方見本門内障眼類雷巖丸宣明論治男子婦人肝經不足風邪内乗上攻眼目昏暗淚出羞明怕日多見黒花瞖膜遮睛瞼生風粟或痒或痛隱澁難開兼久患偏正頭疼牽引兩目漸覺細小視物不明皆因腎水不能既濟於肝木此藥久服大補腎臟目力加添肉蓯蓉巴㦸浸一宿去皮心牛膝各一兩菊花枸杞子各二兩川椒三兩去目黒附子青鹽二錢以泔水三升同煑乾為度去皮臍一兩右為末同浸藥酒煑麵糊為丸如梧桐子大每服十丸空心酒下世人服藥多不知根源往往不效五加皮湯聖濟總録治肝虛受風筋脉拘急手足癉痺目視不明五加皮剉𤣥參獨活去蘆頭桑白皮剉各一兩茯神去木麥門冬去心焙各一兩右麤搗篩每服五錢水一盞半煎至八分去滓投荆瀝半合再煎三兩沸空心晩食前温服升麻湯聖濟總録治肝虛中風頭疼目眩昏暗胷中客熱心煩悶升麻羚羊角鎊葛根剉前胡去蘆頭酸棗仁地骨皮各一兩右麤搗篩每服五錢水一盞半煎至七分去滓入竹瀝半合食後臨卧温服瀉肝湯龍木治肝虛積熱外障黒參大黄黄芩知母芒硝各一兩桔梗二兩右為末以水一盞散一錢煎至五分去滓食後温服還睛丸治肝虛眼目昏暗及一切眼病惡實炒半升青鹽半兩蜀椒去目及閉口者一兩半醋石榴二箇去皮已上四味用好酒二升於銀石器内慢火煎酒乾取出木賊半兩附子炮製去皮臍一枚右為末醋煑麵糊丸如梧桐子大每服十五丸至二十丸空心食後鹽湯下補肝丸治肝氣不足甘草炙黄芩人參桂心各二兩右切用水六升煑取二升分三服忌海藻菘菜生葱菊花散聖濟總録治肝虛風毒氣眼多淚澁痛菊花半兩牛蒡子半兩炒甘草半兩炙微赤剉右為末每服一錢七分温水調下金蓮子散一名湯泡散治肝虛風熱攻眼赤毒腫痛羞明漸形瞖膜等疾方見本門一切眼疾雜治類春雪膏龍木治肝經不足内受風熱上攻眼目昏暗痒痛隱澁難開及推眵赤腫怕日羞明不能遠視迎風有淚多見黒花並皆治之腦子二錢半㽔仁二兩去皮油殻秤取二兩細研去油右用生蜜六錢重將腦子㽔仁同捜和每用銅筯子或以金銀釵股時復㸃放眥頭治連眶赤爛以油紙塗膏貼之治悶氣血虛氣虛肝虛眼白俱赤日夜如雞啄生浮瞖經驗方老蚌殻燒灰木賊草焙剉為末等分㸃眼古錢煎治積年赤眼胎赤古銅錢三十文食鹽末二分釅醋一升右將錢重以食鹽末填孔中令滿以五月五日午時於石上用炭火燒令極赤然後投醋中候冷傾向小磁瓶中盛用紙三十九重封瓶口一日去一重每以銅筯蘸如黍米㸃目眥中治積年風赤眼出聖惠方取長明燈盞内油少許以銅錢一文於乳鉢内細細磨之令油凝鉢底覆却以艾煙薫之一夜每以銅筯㸃之柴胡湯出聖濟總録治積年風毒瘀熱攻目赤痛柴胡川芎大黄㣲炒羚羊角鎊茯神去木各二兩大黄炒一兩芍藥三兩石膏五兩右麤搗篩每服五錢水一盞半入竹葉七片煎至一盞去滓投入芒硝半字放温空心頓飲以利為度如利頓去芒硝以粥止之如秋月肝弱不宜瀉肝宜加補藥不用此方藳本湯一名補肝湯出龍木治積年風眼赤痛多熱淚歲月寖久暴風外障客熱之眼藳本去苗二兩芍藥天麻防風去蘆細辛去苗各一兩白芷石决明搗為粉車前子各半兩右搗篩每服五錢水一盞半煎取一盞去滓食後温服卧再服一方為散每服一錢空心米飲調下黄連湯膏治風毒久赤痛爛怕風磣痛不可忍方見本門目赤爛類龍腦膏出聖惠方治遠年風赤爛胎爛及熱毒龍腦半錢空青半分大黄半兩黄連三分去鬚野駝脂半兩鵝脂三兩去滓熊膽一兩馬牙硝一錢另研右先將牙硝黄連大黄三味末内入脂中於微火上煎五七沸去滓次將龍腦熊膽空青末研令極細入前脂中攪令勻内磁瓶中盛每用銅筯取一黍米大㸃目眥頭日兩三度用之五參散出聖濟總録治風毒眼赤痛久患不差苦參沙參丹參枳殻𤣥參紫參各一兩蒺藜子二兩右為細末每服二錢七分空心以温酒調下疾甚者日三服㸃眼七寶飲出聖濟總録治風熱上衝目赤疼久不差珊瑚琥珀玉屑曽青紫貝硃砂雞子殻各半兩右研極細㸃時仰卧以銅筯取一菉豆大㸃眼三五上㸃之洗眼方出聖惠方治年遠赤眼青鹽半兩决明子一兩半柴胡去苗一兩半秦皮防風去苗蛇啣草各一兩生乾地黄一兩半右剉以水一大碗煎至二盞半用絹濾過每取三合候冷洗眼日二三度烏麻油膏出聖惠方治胎赤眼三二十年風赤生烏麻油半雞子許著銅器内以細粗石磨之使濃下能流乃止熟艾二升杏仁一升黄連一兩雞糞一升亂髮小盞大一塊鹽一合右穿地作一坑子其形如瓶口外小裏大先以火燒令乾於别處開一小風孔以前六味藥重重布着坑中加艾炷用火燒之令煙却將前所磨銅器葢坑口煙盡即去銅器刮去煙令細研以粉磁盒盛每以銅筯㸃如黍米大在目眥頭臨卧㸃妙治遠年風赤眼出聖惠方用柟樹皮隨多少左搓合繩盤著放在南牆下隂乾後於磁碗内燒為白灰紙貼内收勿令灰塵入不計大小患目日二三度取粟米大㸃之榖精草散出聖濟總録治風毒赤眼無問新久榖精草去根一兩豉焙乾一合井中苔焙乾井泉石淨洗研半兩右為末散每服二錢空心以井華水調下㸃眼杏仁膏出聖濟總録治風毒積年赤兼瞖膜膩粉一錢鹽緑研黄連為末杏仁湯浸去皮尖右和重研令勻真酥調如膏於銅碗中研勻於碗内以熟艾如雞子大掘小坑於内燒艾烟出便覆銅碗於坑子上薫勿令洩氣候烟盡為度重研每服少許以綿裹用人乳汁浸一宿㸃目日三度𬎼仁散出聖惠方治遠年風赤眼古文錢四十九文字竅分明先以青鹽二兩作末一行錢上用一行鹽末如此排盡錢鹽為度安於一淨磚上以火燒令通赤吹去灰塵㽔仁湯洗去赤皮黄連黄柏各二分右為散取前件鹽錢一處用水二大盞煎一鍾去滓更以綿濾過不計時候㸃之又方出聖惠方治眼風赤經年不差石膽鹽緑細辛研各一兩㽔仁半兩浸去皮尖右共研勻用生驢脂三兩研如膏内諸藥相和於磁盒盛不計時候少許㸃之㸃眼小黄連膏治風毒赤爛不以年月久近發歇頻併視物淚出不止黄連蘆薈各研一兩龍腦别研半錢右先將黄連蘆薈末以新綿裹用水二盞於磁器中以重火煑取汁三分之二即將綿濾去藥入龍腦以磁瓶子内收每日三兩上㸃之㸃眼方出聖濟總録治久患赤眼眥爛痒痛淚下不止視物昏暗鉛丹羅過一分朴硝研半兩蜜五兩右以銅器内慢火熬三十沸不住手攪乗熱以綿濾候冷㸃眼治遠年風赤眼腫痛方出聖惠方硼砂青鹽石膽各等分右用醋醬一盞於磁器浸日中曝之候其藥著於器中四畔乾刮取如粟米大夜卧時著兩眥不過三四度效杏仁膏出聖惠方治遠年風赤眼腫澁痛杏仁一合浸去皮尖鹽緑一分印成鹽一分右取杏仁先擣如膏放磁器内次入鹽緑并印成鹽相和宻封至二七日後每夜卧時少許㸃眼四眥上每日三兩度黄連膏煎出聖惠方治遠年風赤宜㸃黄連二兩𬎼仁二兩去皮硼砂一分右先取黄連以水三大盞煎取一盞綿濾去滓又取㽔仁以絹裹别以水一盞揉令漿盡却和前黄連汁同煎似稀膏刮取攤磁盒中後以新磚一塊上安艾如雞子大燒之以藥合復葢勿令煙出薫之以艾盡為度復研令勻每以銅筯取如菉豆大㸃之㽔仁㸃眼方治眼風赤經年不差𬎼仁半兩去赤皮膩粉一分青錢一錢右相和細研如粉後以乳汁少許和研如膏徧塗於茶碗中以熟艾一塊如小雞子大掘地作一坑子安艾團于坑内燒之以藥茶碗葢候煙盡為度取出一月入乳汁研成膏每次銅筯取少許㸃之治遠年風赤眼不差蛔蟲是小兒吐出者隂乾為末膩粉一錢石膽半錢右都細研如粉日㸃二三度㸃眼黄連膏出聖濟總録治積年風毒熱氣不散目角赤爛磣痛黄連去鬚研半兩馬牙硝研一錢右將黄連用水浸於日内曝令色濃以綿濾過後下硝末於黄連汁中又曝令乾細研每以一豆許水調㸃注目眥療積年風赤眼方取生油生猪脂胡粉各等分和研傅眼中二日内赤總除人乳方治赤眼遠年赤爛尅日見效用頭首男兒乳汁不計多少和膏子白磁碟上攤開用大盞艾火薫乾刮下藥用前乳汁為丸如梧桐子大用新汲水將前藥化㸃四順飲治遠年赤腫大便不通大黄一兩半川芎山梔仁赤芍藥朴硝各一兩當歸枳殻甘草炙各一兩右㕮咀每服二錢加生地黄三寸煎兼氣加香附痛加人乳没藥目赤腫痛論夫目赤腫痛者以心肺壅滯積熱不散邪氣毒氣干於足厥陰之經風熱交作上攻於目及兩瞼間故其色赤腫痛宜祛風邪蠲熱氣疏瀹壅滯此眼先患赤腫疼痛怕日淚澁難開忽生瞖膜赤腫或初患一目不見以致兩目齊患此因作勞用力肝膈熱勞方紫金膏專治赤腫風爛眼目銅青研硇砂硼砂羚羊角雄黄青鹽琥珀明礬各七錢半當門子片腦膽礬深中青各八錢半𤣥精石黄連乳香水銀各半兩小丁香爐甘石一斤火炮七次醋淬七次石燕子二兩火煅醋淬七次金星石一兩七錢半煉大紅黄丹八兩銀星石一兩二錢半火煉海螵蛸一兩七錢半為末輕粉一錢沙糖三斤水三升右以水同蜜於鍋内熬沸去沫入黄丹以柳木箆急手攪匀約熬三兩沸却下爐甘石又復攪入乳香硇砂又下雄黄次下丁香再入輕粉方下腦子依次第下藥文武火各熬二三沸須不住手攪勻成膏候粘手為度每用雞頭大沸湯化開浸湯半盞乗熱温洗掃瞖散治眼赤腫痛瘀肉攀睛視物茫茫及時行紅眼暴發者防風羌活川芎甘草蒺藜决明各半兩前胡𤣥參各二兩白芷荆芥瞿麥木賊木通赤芍梔子生地天花粉夏枯草薄荷榖精草各一兩五靈脂甘菊花蟬脱白皮大黄各七錢半右㕮咀每服四錢水一盞半煎八分去滓食後服流氣飲治風熱攻眼赤肪痛方見本門目赤風類梔子散治眼赤迎風淚出痒及胎赤障瞖瞼急痛梔子仁半兩秦皮蔓荆子白芷細辛防風𤣥參决明子䓆蓂子車前子各三分赤茯苓二分枳殻三分麩炒𬎼仁三分湯浸去赤皮菊花黄芩各三分右擣為散於食前竹葉湯下一錢忌炙煿油膩生菓熱麵等物防風散治眼赤暴腫痛多眵淚宜服退上焦壅熱止痛消腫防風芎藭川升麻犀角屑羚羊角屑赤芍前胡各半兩細辛秦皮硃砂細研甘草炙㣲赤各一分牛黄二錢細研右搗羅為散入牛黄硃砂都研令勻食後煎地黄湯下羚羊角飲治肝臟風毒上衝眼赤腫痛難開頭額偏痛羚羊屑一兩細辛去苗一分甘菊花萎𬎼芎藭人參各三分赤芍藥黄芩梔子防風去蘆甘草各半兩右麤擣篩每服三錢水一盞煎至六分去滓食後温服石决明丸治眼腫赤痛石决明淨洗地膚子黄連青葙子大黄茺蔚子各一兩皂莢去黒皮黄芩人參甘草各三分右為末煉蜜和丸如梧桐子大每服食後淡漿水下三十丸臨卧再服千金漏蘆湯治熱眼赤腫䑃霧白芨漏蘆黄芩麻黄芍藥升麻白微枳殻大黄甘草炙各等分右為末每服三錢新汲水煎熱服通利為度祛毒散治赤眼及目睛腫疼痛不得眠睡射干山梔子當歸防己龍膽黄芩芎藭黄連石决明各一兩右為散每服一錢温酒調下茶調亦可生犀飲治目赤侵黒腫痛兼白睛腫起犀角鎊黄芩萎㽔防風地膚子羚羊角甘草各一兩麥門冬黄連各一兩右剉如麻豆大每服三錢用水一盞煎至七分去滓入馬牙硝半錢食後服八寶飲治熱眼腫痛車前子龍膽草榖精草仙靈脾藁本威靈仙荆芥穗秦皮甘草各二錢半右細剉每服二錢食後煎服石决明散治患目赤腫疼痛怕日淚澁難開忽生瞖膜石决明一兩草决明炒羌活山梔子各半兩大黄煨荆芥一分木賊青葙子芍藥各等分右為末每服二錢麥門冬去心煎湯調食後服防風丸治目赤腫痛防風决明子人參車前子各一兩黄連菊花槐實炒藍實各一兩右為末煉蜜為丸如梧桐子大食後温漿水下三十丸臨卧再服三十丸治赤暴眼以生薑為末水調貼脚掌心良黄連散治眼赤腫痛黄連㽔仁細辛梔子各一兩生乾地黄一兩甘草一兩半青鹽二分苦竹葉二握右為散水三升煎一升去滓稍熱温服洗眼不計時候上清龍膽散治赤眼腫痛漸生雲膜川芎欝金廣芩盆硝各三錢榖精半錢龍骨麝香各一分乳香一錢半右為細末研勻鼻内少㗜效玉柱膏治赤眼暴腫生翳硼砂龍腦馬牙硝青鹽輕粉熊膽各一錢並研細杏五枚去皮右一處再研煉蜜為膏每㸃粟米大於目眥頭水龍膏治赤眼腫痛翳膜黄連一分當歸乳香各二錢榖精青鹽硼砂各一錢硇砂皂子大小塊枯礬龍腦各五分右搗研為末一處和勻煉蜜共入竹筒内蠟紙密封重湯内煑令蜜熟取綿濾過㸃粟米大目眥頭不計時候决明子散治眼赤腫痛不可忍及生障决明子梔子仁地膚子茺蔚子藍葉朴硝各一兩川升麻一兩半石膏二兩右為散每服二錢水一鍾入苦竹葉七片煎至六分去滓食後服大黄湯治肝經邪熱赤澁腫痛大黄梔子黄連龍膽欝金黄栢甘草一兩右每服三錢用薑棗同煎和滓通口服補肝散一名還精散龍木治肝虛眼睛疼冷淚不止筋脉痛及羞明怕日氣瞖退障夏枯草半兩香附子一兩右為末茶調下每服二錢無時候服治肝虛或當風眼淚龍木臘月牯牛膽盛黒豆一百粒後百日開取食後夜間吞五七粒鎮肝明目黒豆盛浸不計多少枸杞方龍木治肝虛或當風眼淚用枸杞子最肥者二升搗破内絹袋置罐中以酒一斗浸訖宻封勿泄氣三七日每日飲之勿醉治肝風虛熱目赤暗痛熱病後失明者龍木用青羊肝或子肝薄切水浸服之極效小片吞之尤妙車前子丸楊氏家藏方治肝氣虛下元不足眼目常昏或生瞖障車前子一兩兎絲子酒浸取末一兩蔓荆子炒决明子揀淨炒白茯苓去皮黄連去鬚白芍藥五味各一兩地骨皮淨洗去土牛膝酒浸一宿焙乾黄耆三味各一兩二錢半附子炮去皮臍一兩右為細末煉蜜和丸如梧桐子大每服五十丸温酒鹽湯下不拘時服補精丸楊氏家藏方養肝益精滋榮目力兎絲子地黄各一斤車前子枸杞子白茯苓甘菊花各半斤地骨皮半斤右搗羅為細末煉蜜丸梧桐子大每服温酒鹽湯下五十丸食後服二妙散楊氏家藏方養肝氣治目昏視物不明淚下方當歸熟乾地黄右等分搗羅為細散以無灰酒下二錢七分非時服養肝丸出經驗良方治肝血不足眼目昏花或生眵淚久視不明當歸去蘆酒浸車前子酒蒸焙防風去蘆白芍藥𬎼仁别研熟地黄右等分為末煉蜜為丸如梧桐子大每服五六十丸温熟水送下養肝丸澹寮方治肝血不足眼目昏花或生眵淚久視無力當歸去蘆酒浸車前子酒蒸焙防風去蘆白芍藥㽔仁别研熟地黄酒焙川芎楮實子各等分右為細末煉蜜為丸如梧桐子大每服七十丸熱水送下不拘時候萬壽地芝丸廣命集治目能近視不能遠視局方中定志丸能遠視不能近視生薑四兩焙天門冬四兩去心枳殻三兩去穰炒甘菊二兩右為細末煉蜜為丸如梧桐子大茶清或温酒下一百丸食後服此藥能愈大風熱治邪氣入肝眼痛又多見鬼物本草以死人枕煑服之竟可埋枕於故處昔沈僧翼患此疾嗣百日邪氣入肝教以死人枕煑服之竟可埋枕於故處如其言即愈夫邪氣入肝故使眼痛而見魍魎須邪物以釣之故用死人枕之氣因而去之故埋於塜間也普濟方卷七十一
