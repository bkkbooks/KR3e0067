合博子濟方伏龍肝散兼白礬丸服之愈白芍藥散出聖惠方治婦人赤白帶下臍腹疼痛年月深久不差者乾薑三兩白芍藥半兩右各炒黃色同為末空心米飲調下方寸匕又云加香附子等分甘草減半一方不加附子甘草治婦人赤白帶下年月深逺日漸羸瘦起止不得宜服此方出聖惠方取刺薊根不限多少爆乾稱每一斤以童子小便五升浸一伏時爆乾搗細羅為散每日空心及晚食前以暖酒調下二錢桑耳散出聖惠方治婦人帶下五色無問新舊方見本門崩中漏下類艾葉散出聖惠方治婦人赤白帶下日夜不止體黃瘦不思飲食方見本門崩中漏下類搐鼻香出大全良方治婦人子宫久冷赤白帶下牡蠣煆黃狗頭骨煆紫稍花韶腦母丁香蛇床子故破紙桂心各等分右為細末煉蜜丸如雞頭大臨時用一粒治赤白帶下骨立者出大全良方用地榆一斤先銼用水三斗煮至一半去滓再煎如稠餳絞濾空心服三合日二服醋煎丸出楊氏家藏方治血海久冷赤白帶下月候不調臍腹刺痛髙良薑銼碎入油炒黃二兩乾薑炮二兩金狗頭脊去毛二兩附子四枚重六錢炮去皮臍尖右為細末别用艾葉末二兩釅醋三升煎至一升半次入麵一兩再熬成膏和前藥末為丸如梧桐子大每服三十丸淡醋湯下空心食前一方出鮑氏方蓮蓬燒灰一倍白礬研末半倍右米飲調下赤白帶下十年者亦愈出鮑氏方春綿棕櫚茅花敗荷蓮蓬帽紗與綿同燒百草霜右為末每服二錢入腦麝溫酒醋湯下茱茰浴湯出楊氏家藏方治下焦虛冷臍腹疼痛帶下五色月水崩漏淋瀝不斷杜仲炒去絲吳茱茰湯洗七遍蛇床子丁香皮五味子各一兩木香半兩丁香半兩右銼如麻豆大每用半兩以生絹袋盛之水三大碗煎數沸乘熱薰下部通手淋浴早晚兩次薰洗金銀丸出楊氏家藏方治婦人衝任不足子宫久寒肢體煩疼帶下冷病牡蠣一兩煆粉硫黃二兩生用右為細末麵糊丸如梧桐子大每服三十丸米飲下食前服玄胡苦練湯出試效方治臍下冷撮痛隂冷大寒帶下方見本門胎前雜病類調經固真湯出試效方冬後一月微有地泥水泮其白帶再有隂户中寒立此方一服而愈麻黃不去節半錢杏仁二箇桂枝少許炙甘草半錢黃耆七分人參當歸身各半錢髙良薑一錢白术半錢蒼术二分澤㵼羌活各一錢防風二分柴胡四分獨活藁本各二分升麻生黃芩各五分乾薑炮二分白葵花七朵去蕚右㕮咀如麻豆大除黃芩麻黃各另外都作一服先以水三大􅊦半煎麻黃一味令沸掠去沫入餘藥同煎至一􅊦七分再入生黃芩煎至一􅊦去滓空心宿食消盡日髙時熱服之待一時許可食早飯桂附湯出試效方治白帶腥臭多悲不樂大寒肉桂一錢附子三錢黃蘗半錢為引用知母半錢不思飲食加五味子煩腦面上麻如蟲行乃胃中元氣極虛加黃茋一錢五分人參七分炙甘草升麻五分右㕮咀都作一服水二􅊦煎至一􅊦去滓稍熱服食逺一方如少時常飽有時似腹脹夯加白芍藥半錢升陽燥濕湯一名助陽湯出衛生寶鑑治白帶下隂户痛控心而急痛身黃皮膚燥身重如山隂冷如氷防風一錢柴胡一錢半良薑一錢乾薑半錢橘皮半錢白葵花二錢生黃芩半錢一作黃柏郁李仁一錢甘草一錢右銼如麻豆大分作二服水二􅊦煎至一􅊦去滓稍熱服食前少時以美膳壓之當歸附子湯出衛生寶鑑治臍下冷痛赤白帶下良薑一錢乾薑一錢附子一錢柴胡七分升麻五分當歸二錢蝎稍五分炙甘草三分炒鹽三分黃蘗少許為引用右為粗末每服五錢水五􅊦煎至一􅊦去滓稍熱服或為細末酒糊為丸亦得固真丸出試效方治白帶久下不止臍腹冷痛隂中亦然目中溜火壅其上視物昏昏然無所見牙齒惡熱飲痛須得黃連細末擦之乃止惟喜乾食六惡湯飲此病皆寒濕乘其胞內故喜乾而惡濕肝經隂火上益走於標故上壅而目中溜火腎水浸肝而上溢致目昏昏而無所見齒惡熱飲者是少陽陽明經伏火也白石脂一錢以火燒赤水飛研細日乾乾薑炮四錢黃蘗酒製白芍藥各半錢白龍骨二錢柴胡一錢當歸身酒製二錢前證乃寒濕為之也治法當大㵼寒濕以丸子藥治之故曰寒在下焦治主病宜緩以時大忌湯散以白石脂白龍骨以枯其濕以炮乾薑大辛熱㵼寒水以黃蘗之大寒為佐用又為鄉導故云古者雖有重罪不絶人之後亦為之伏其所生先其所因之意其㵼齒中惡熱飲也以柴胡為本經之使以芍藥半錢導之恐辛熱之藥太甚損其肝經故微㵼之當歸身辛溫大知其血脈此用藥之法完備矣右除石脂龍骨水飛研外同為極細末水煮稀麵糊為丸雞頭子大日乾空心候宿食消盡煎百沸湯令大溫多用送下無令胃中停滯待少時以早膳壓之是不令熱藥犯胃也忌生冷硬物酒與溫麵小隂丹朱氏集驗方治婦人赤白帶下月候不調諸虛不足當歸白芍藥各四兩白术茯苓藁本白芷延胡索各一兩熟地黃酒蒸牡蠣草鞋包煆各半兩人參沒藥各二兩甘草炙南木香各一兩赤石脂煆七錢大附子一兩炮去皮臍蠶退紙燒以多為貴右細末煉蜜為丸如彈子大每服一丸空心酒服石脂散朱氏集驗方治白冷精帶下隂脡脫出或青黑黃白彈下攻痛腹悶頭旋眼昏耳聾啾啾痰上壅赤芍藥四兩炒乾薑香附子二兩右為細末每服三錢空心酒下如帶赤冷即用陳米飲下煎阿膠艾湯尤炒若要順氣加茴香妙應丹出衛生家寶治婦人一切冷氣赤白帶下吳茱茰當歸艾葉蒼术禹餘糧火煆淬為末另右等分用米醋煮數沸焙乾仍用醋糊丸如梧子大每服五十丸醋湯下治婦人脫隂白帶下無藥可治服之此藥立有應出衛生家寶附子七錢去皮尖生黃狗頭燒灰四兩白礬一兩枯綿灰半兩棕櫚灰半兩腦麝少許右為細末醋糊為丸如梧桐子大每服二十丸空心用麝香醋湯吞下一日三服堅中丸出十便良方治室女白帶下半夏一兩豬苓二兩銼别為末右同半夏炒令黃色取半夏為末水糊為丸如梧桐子大焙乾白湯下二十丸不以時留豬苓末養此丸子鹿角膠散治婦人白帶下不止面色痿黃繞臍冷痛鹿角膠白龍骨附子桂心當歸白术各一兩右搗羅為散每服於食前以粥飲調下二錢乾薑丸治婦人久赤白帶下臍脹冷痛方乾薑阿膠伏龍肝細研各一兩白石脂熟乾地黃各二兩右搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服食前以熱酒下三十丸海蛤丸出王氏博濟方取小腸積敗婦人赤白帶下并五淋舶上茴香半夏芫花醋炒令乾紅娘子去翅頭足略炒玄胡索川苦楝􅔈砂去砂石取霜用海蛤芫青去上頭足略炒各等分右件藥味一處細研抄出羅為末醋煮麵糊丸桐子大用硃砂為衣每服一丸鹽湯下婦人醋湯下五淋生薑湯下心氣痛生薑醋湯下取惡物為效治婦人血海虛冷赤白帶下肌肉消瘦臟氣虧損弱絶無骨肉宜服此方六腑熱不可喫出護命方石斛去根白芷蓽薢狗脊去毛益智子去皮山茱茰牡蠣火煆杜仲去皮赤石脂龍骨各半兩艾葉半兩甘草藁本各一分當歸一兩右為細末每服三錢水一盞二分大棗三枚同煎四五沸空心去滓喫白薇丸出衛生家寶方治婦人血臟氣弱四肢倦怠不思飲食氣冷微疼赤白帶下血崩婦人一切諸病皆治白薇五兩淨洗地黃二兩洗焙牛膝酒浸一宿焙山茱茰焙肉桂不見火白术訶子皮石斛附子炮熟去皮尖黃連乾薑肉豆蔲生人參焙蓽撥焙檳榔生茯苓焙沒藥生研麒麟竭生大黃焙肉蓯蓉去皮毛切焙木香焙薯蕷焙已上各一兩當歸一兩酒浸一宿焙右為末煉蜜為丸如梧桐子大每服二十丸空心日午鹽酒下鹽湯亦得主婦人帶下出本草以榆莢和牛肉作羮食之破血壅脹帶下崩中不止者出本草以麻根洗淨搗碎用水煮服之效治婦人帶下漏下出本草以淡菜羮食之任意治女子帶下出本草以白殭蠶七枚為末用酒調方寸匕服立效治婦人赤白帶下出本草以薤作煮食之治婦人赤帶下出本草用懸鉤根皮濃煮服之治婦人帶下五色俱治之出本草取黃磚石燒令微赤熱以五味和作煎餅七箇安磚上以黃苽蔞傳麵上又以布兩重墊令病人坐下令藥氣入腹布上靣有蟲出如蠶子不過三五度差治女子帶下便溺不利出本草以雀卵白和天雄兔絲子末為丸空心酒下五丸治赤白帶下臍腹冷痛面色萎黃日漸虛困白帶下用禹餘糧一兩味甘寒用醋淬過研為末乾薑一兩味辛大熱研為末赤帶下用禹餘糧一兩味甘寒用醋淬過研為末石薑半兩味苦溫赤名淬補研為末右二方各隨證令和用藥每服二錢空心溫酒調下治月侯湛濁赤白帶下多年不差者用石燕子淨洗刷去泥土杵羅為末以磁石協去杵頭鐵眉更以堅甕鉢內以硬乳槌研細水飛過取白汁如甘乳者澄去曝乾服半錢至一錢清飯飲調下溫水亦得須常服勿令歇服之及一月諸疾皆愈赤白濁附論夫婦人小便白濁白淫者皆由心腎不交養水火不升降或由勞傷於腎腎氣虛冷故也腎主水而開竅在隂隂為溲便之道胞冷腎損故有白濁白淫宜服局方金鎖正元丹或因心虛而得者宜服平補鎮心丹降心丹威喜丸若因思慮過當致使隂陽不分清濁相干而成白濁者然思則傷脾故也宜服四七湯吞白丸子此藥極能分利更宜小烏沉湯每貼加茯苓一錢重益智二十八枚去殼碾鹽煎服二豆散出危氏方治耳鳴心躁腰腳疼重腹內虛鳴臍下冷痛頻下白水如泔湛濁白豆䓻肉豆䓻丁香巴戟丁皮白茯苓蒼术桂心黑附火煨各一兩白术人參山藥桔梗茴香粉草各五錢右銼散每服三錢水一盞半生薑三片紫蘇葉三片煎空心服溫服鹿茸丸治婦人久積虛冷小便白濁滑數不禁方見本門前小便數類勝金丸出危氏方治渾身壯熱頭疼臍下㽱痛下淡紅水當歸去尾白芍藥鹿茸燎去毛酒炙鱉甲川芎白术大艾炒側柏葉赤石脂醋煆川白芷烏賊魚骨各等分右為細末蜜丸如龍眼大每服一丸空心鹽酒下或敗棕燒灰調酒吞下薑黃散出大全良方治血臟久冷腹脹疼痛小便濃白如泔片子薑黃二兩大附子炮一兩赤芍藥栁桂紅藍子三稜各半兩牡丹皮芫花醋浸炒木香郁李仁去皮沒藥各一分右為細末每服一錢酒煎服如腹痛用當歸沒藥為末以水七分酒三分同煎至七分熱服內金鹿茸丸出醫方集成治婦人勞傷血脈胞絡受塞小便白濁晝夜無度臍腹疼痛腰膝無力黃耆雞內金牡蠣鹿茸逺志肉蓯蓉五味子龍骨桑螵蛸附子各等分治白濁及婦人赤白帶下以豬脂入白礬一塊安在鍋銚中煆熱以白礬屎清泡吃治婦人久積虛冷小便白濁滑數不禁用鹿茸屑炒黃為細末空心溫酒調服二錢又方用雞䏶胵炙為末空心酒調二錢一分婦人白濁出永類鈴方用百草霜一錢入椒末炒鹽少許豬肝一片三指大批開入上藥紙裹慢火煨熟細嚼以濁酒空心下食後服酸棗仁湯普濟方卷三百三十一
