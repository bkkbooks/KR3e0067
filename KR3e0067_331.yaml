分桑耳禹餘糧各六分吳茱茰乾地黃各八分烏賊魚骨五分右為細末空心用飯飲調下二錢補經固真湯白文舉正室白帶常漏久矣諸藥不效診得心包尺脈極微其白帶流而不止叔和八裏脈訣云崩中月久為白帶漏下時多骨木枯言崩中者始病血崩不已久下則血少復亡其陽故白滑之物下流不止是本經血海時枯津液復亡枯乾不能滋養筯骨以本部行經藥為引用為使以大辛甘油膩之藥潤其枯燥而滋潤津液以大辛熱之藥劑補其陽道生其血胍以苦寒之藥泄其肺而救上熱傷氣以人參補之微苦溫之藥佐之益元氣名曰補經固真湯炙甘草柴胡各一錢乾薑末三錢橘皮半錢不去皮人參一錢白葵花十六箇去心剪碎生黃芩一錢另銼郁李仁一錢去皮尖另研如泥右件除黃芩外以水三大盞煎至一盞七分再入黃芩同煎至一盞去滓空心大熱服之候少時以早膳壓之丁香膠艾湯治崩漏不止蓋心氣不足勞役及飲食不節所得試診其兩手尺胍必俱弦緊浮洪按之無力其證自覺臍下如氷求厚衣覆以禦其寒白帶白滑之物間有如屋漏水或時有鮮血故尺胍時洪浮也屋漏水暴多下者是急弦脈寒多如洪脈時見乃熱少合而明之急弦者此必寒水多也洪脈時出者是命門包絡之火少也黑物多赤物少合成屋漏水之狀也當歸身一錢半熟地黃白芍藥川芎各半錢阿膠煬六分丁香四分生艾葉一錢右川芎地黃丁香為細末當歸酒洗銼艾亦銼都作一服水五大盞先煎作一盞半去滓入膠煬再上火煎至一大盞帶熱空心候宿食消盡服之三兩服愈治婦人白帶下不止面色萎黃繞臍冷痛牡蠣一兩燒為粉當歸一兩銼微炒龜甲一兩塗醋炙令黃白馬蹄屑一兩炒微黃白石脂二兩乾薑一兩炮裂銼右件藥搗細羅為散每於食前以艾葉湯調下二錢硇砂丸治婦人白帶下臍腹冷痛面色萎黃日漸虛困硇砂一兩細研白礬灰半兩乾薑半兩炮裂銼川烏頭一兩生去皮臍右件藥搗細羅為末醋煎湯為膏丸如菉豆大每於食前以溫酒送下十丸肉豆蔲丸治婦人白帶下腹內疼痛肉豆䓻一兩去殼附子二兩炮裂去皮臍白石脂一兩右件藥搗細羅為末煉蜜和丸如梧桐子大每於食前以熱酒下二十丸又方禹餘糧一兩醋燒淬七遍龍骨一兩乾薑一兩炮裂銼附子一兩炮裂去皮臍右件藥搗羅為末煉蜜和丸如梧桐子大每於食前以溫酒下二十丸煮附丸治婦人白帶下元虛冷香附子二兩醋煮吳茱茰白薇一兩右為細末酒糊為丸如梧桐子大每服五十丸米湯下空心服白薇丸治婦人白帶不止白薇揀一兩赤芍藥烏賊魚骨去甲各半兩右為末煉醋一盞熬成膏丸如梧桐子大每服二十丸食前熟水下日再治婦人白帶下臍腹冷痛面色萎黃日漸虛困乾薑一兩炮裂銼禹餘糧二兩燒醋淬七遍阿膠一兩搗碎炒令黃燥右件藥搗細羅為散每於食前以粥飲調下二錢又方蛇床子一兩白芷一兩右件藥搗細羅為散每於食前以粥飲調下二錢治婦人白帶下臍腹冷痛面色萎黃日漸虛困及排膿血惡物以白葵花一兩隂乾為末空心溫酒下二錢如赤帶不用赤芷治婦人白帶下白下用禹餘糧一兩乾薑等分赤下禹餘糧一兩乾薑半兩將禹餘糧用醋淬同薑為末空心任湯酒下二錢女人白帶用天文柳搗汁井花水調服治婦人白帶春澤湯一貼後服生料五苓散一貼庾五錢銀五錢共作一鍋鎔了授些少明砂及牙硝淬淨㵼出打小片子用足色藥在鍋內插小片子於用瓦陀蓋了煮煆如藥得下則添藥末一次却煮三兩箇時辰提鍋出候冷破鍋出牌片出再為坯關色足不走而分兩不折足色藥􅀈銅板朱成者是青鹽各一兩明礬金綿礬各五錢重生硫黃熖硝各二錢半重辰砂一錢半膽礬一錢右合細末以􅀈瓶用時候用柸開之法以柸關入鍋底神子在上蓋頭并瓦蓋頭發火自微至著時是藥洋著時牌洋作汁連出候取出却用淨鍋子倒子所是前是色藥及後坯關在鍋者久後多在再用所惡恐有物在內坯關法青鹽黃鉛即黃丹也同研為末入鍋在火作汁候取面上者乾淨稱一兩用沉在底者不用礬紅兩絲是將泥礬過煆成紅礬右二件和勻研細安用時在用鹽調用禹餘糧丸治婦人帶下五色臍腹冷痛漸加黃瘦四肢少力禹餘糧二兩燒醋淬七遍白芍藥一兩桑蛾一兩半微炙黃連一兩去須當歸二兩銼微炒艾葉一兩微炒芎藭三分川大黃三兩銼碎微炒生乾地黃二兩龍骨二兩阿膠一兩搗碎炙令黃燥右件藥搗羅為末煉蜜和搗三五百杵丸如梧桐子大不計時候以酒下三十丸柏葉散治婦人帶下五色四肢黃瘦心煩食少柏葉一兩微炙牛角䚡一兩燒灰芎藭三分黃耆一兩銼禹餘糧二兩燒醋淬七遍白芍藥三分龍骨一兩白术三分丹參三分枳殼一兩麩炒微黃去穰右件藥搗細羅為散每於食前以溫酒調下二錢禹餘糧散治婦人帶下五色久不止一名阿膠散禹餘糧煆醋淬七遍鹿茸去毛酥炙牡蠣煆炙赤石脂各二兩阿膠炙燥當歸銼炒白芍藥蒲黃各一兩烏賊魚骨燒赤一兩半右為散每服二錢食前溫酒調下鹿茸丸治婦人帶下五色久不瘥漸加黃瘦鹿茸一兩去毛塗酥令炙黃白芍藥三分桑我一兩微炙黃連一兩去須艾葉一兩微炙芎藭一兩當歸一兩銼微炙阿膠二兩搗碎炒令黃燥禹餘糧一兩燒醋淬七遍右件藥搗細羅為末煉蜜和搗三五百杵如梧子大每於食前以溫酒三十丸當歸丸治婦人帶下五色腹痛羸瘦食少常歸一兩銼微炒鱉甲一兩塗醋炙微黃去裙襴川大黃一兩銼碎微炒白术三分蓽撥半兩胡根半兩訶梨勒皮三分檳榔三分枳殼三分麩炒微黃去瓤右件藥搗羅為末煉蜜和搗三二百杵丸梧子大每於食前以溫酒下三十丸續斷丸治婦人帶下五色久不止臍腹下痛續斷三分丹參三分當歸三分微炒白芷半兩艾葉三分