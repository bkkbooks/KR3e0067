body:
  text: 普濟方卷九十明周王朱橚撰諸風門心中風附論心中風之狀多汗惡風舌焦善怒赫赤色病甚則言不快診在口其色赤夫心受風風盛則生熱熱盛則汗不止心之液為汗故也汗多則腠理踈踈則懼邪相薄是以惡風又心惡熱熱極則唇焦內燥多怒心之聲為言病甚則言不快心氣通於舌故也又其證胸背拘急不可傾側手心熱盛靣赤頭痛熻熻發熱不能安卧忪悸汗出恍惚不安以心主血脈其風日久隨榮衛行內外相搏藴積而然也若唇正赤尚可治急灸心腧百壯服續命湯若唇或青或白或黃或黑此為心已壞為水面目不時悚動者不可復治在五六日而斃矣方定神琥珀丸出聖濟總録治心中風發動不知漸成癩癎驚悸恍惚琥珀搗研真珠搗研末牛黃研天竺黃搗研鐵粉研龍齒研各一兩膩粉研犀角鎊甘草炙銼龍膽升麻露蜂房微炒丹砂研防風去義黃芩去黑心麥門冬去心焙白石藥鈎藤人參遠志去心知母焙天門冬去心焙茯神去木各三分乾蠍酒炒一兩半麝香研一分金箔一百片銀箔一百片與金箔丹砂同研斷星菖蒲九莭者去莭鬚令淨米泔浸切焙三分右除别研外為末入研者同研令斷星煉蜜和搗三百杵丸如梧桐子大每服二十丸食後臨卧煎甜竹葉湯下日二夜一芎麝丸出聖濟總録治心中風驚恐愁憂煩燥錯亂若風邪流入五臟則往來煩悶悲啼吸吸短氣發熱恍惚喜卧心中胸湧怒起顛倒手足厥冷飲食嘔逆芎藭龍骨白茯苓去黑皮紫石英搗研防風去義細辛去苖藥鐵精搗研甘草炙銼厚朴去粗皮生薑汁炙銼各一兩枳實去穰麩炒丹參蜀椒去目并開口炒出汗桂去粗皮人參大黃銼炒附子炮裂去皮臍乾薑各一兩分炮白芥子生研三分遠志吳茱茰湯浸焙炒三分禹餘糧煆醋淬兩三分菖蒲九莭者去鬚米泔水浸切焙用一兩一分右先將一十九味為末與别研參味和勻煉蜜丸如梧桐子大每服七丸溫熱水下食後臨卧各一服牛黃散出聖惠方治心臟中風心神恍惚恐畏悶亂不得睡卧志意不定言語錯誤牛黃一分細研犀角屑一分朱砂半兩細研麝香一分細研羚羊角屑一分防風一分去蘆頭天麻一分獨活一分人參一分去蘆頭茯神一分沙參一分去蘆頭天竺黃一分細研鐵粉半兩細研川神麻一分龍齒一分麥門冬半兩去心焙白鮮皮遠志一分去心龍腦半分細研甘草一分炙微赤銼右為細散都研令勻每服一錢煎麥門冬湯調下不計時候服荆瀝湯出千金方治心風虗熱發即恍惚煩悶半身不仁攣急方見中風半身不遂類羚羊角散出聖惠方治心藏中風言語蹇澀恍惚驚悸神志錯亂面赤心煩四肢不利羚羊角一分麻黃一兩去根莭獨活三分赤茯苓三分黃耆三分銼黃芩三分秦芄三分去苖遠志三分去心桂心三分芎藭三分麥門冬一兩去心葛根三分銼石膏一兩赤箭三分白鮮皮三分人參三分去蘆炙沙參三分去蘆頭甘草半兩炙微赤銼杏仁三分湯浸去皮尖雙仁麩炒微黃右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時溫服牛黃丸出聖濟總録治心中風忽忽驚悸言語不利短氣煩悶口苦舌強牛黃研一分麥門冬去心焙丹參炙各一兩一分銀屑一分半别入水銀少許同研遠志去心一兩一分甘草炙防葵防風去義細辛去苖葉茯神去木紫石英研各一兩桂去粗皮一兩蜀椒去目并閉者妙出汗一兩乾薑炮一兩人參附子炮裂去皮臍各一兩紫菀去土菖蒲九莭者去鬚莭米泔浸切焙各三分本方丹參一方作丹砂右先將一十五味為末與别研三味和勻煉蜜丸如梧桐子大每服五丸食後煎人參茯苓湯下日二夜一忌海藻菘菜豬肉䓤血物餳犀角丸出聖惠方治心藏中風言語顛倒錯亂頭面心胸煩熱或時舌強語澀不安忪悸犀角屑三分天麻三分防風三分去蘆頭遠志三分去心羌活三分沙參三分去蘆頭茯神三分龍齒一兩川升麻三分天門冬三分去心焙葳𬎼三分羚羊角三分鐵粉一兩細研金銀薄各五十片細研玄參三分牛黃一分細研朱砂一兩細研水飛過麝香一分細研右為末入研了藥都研勻煉蜜和丸搗五七百杵丸如梧桐子大每服不計時以薄荷湯下十五丸人參飲出聖濟總録治因於驚邪風入心包或加胸背悶痛驚怖小腹微痛寒熱心煩悶色變青黃赤白兼治虗勞驚懼風邪諸疾人參甘草炙獨活去蘆頭麻黃去根莭煎掠去沫焙乾當歸切焙芎藭石膏碎秦芄去苖土各二兩白术細辛去苖葉桂去粗皮各三分附子炮裂去皮臍一枚防風去義一兩一分赤芍藥炮半兩乾薑炮半兩黃芩去黑心一兩杏仁湯浸去皮尖雙仁炒四十枚右銼如麻豆每服三錢匕水一盞煎至七分去滓溫服日三人參丹砂丸出聖濟總録治心中風恍惚驚悸安神志化痰涎人參丹砂研各三兩紫石英研白石英研龍齒研細辛赤箭天門冬去心焙遠志去心生乾地黃焙龍腦研各一分犀角鎊菖蒲九莭者米泔浸切焙一分沙參各半兩麝香研半分防風去義半兩白茯苓去黑皮三兩右為末煉蜜丸如小雞頭大每服一丸溫酒嚼下不拘時候服牛犀丸出御藥院方治心虗善忘煩悸風涎不利聰明耳目治諸顫掉及治三十六種風益精神壯心氣或多健忘寢寐定驚心常似憂或忪或動往往欲倒狀類暗風四肢顫掉多生怯懼每起煩燥悲涕愁煎並皆屬心臟氣虧冝服此藥以鎮心神生犀鎊一兩天麻炙黃半兩牛黃研敗龜酥炙半兩茯苓去皮遠志去心人參去蘆頭肉桂去粗皮龍腦研龍齒酥炙黃朱砂研各一分麝香别研半兩石菖蒲銼半兩金箔銀箔各五十片羚羊角屑半兩右搗極細煉蜜為丸如梧桐子大食後臨卧溫水化下二丸或加四丸至七丸朱砂丸出聖惠方治心藏中風手足驚掣心神狂亂恍惚煩悶言語蹇澀朱砂一兩細研水飛過龍齒一兩犀角屑一兩天麻三分人參一兩去蘆頭秦芄三分去苖川升麻三分羚羊角屑一兩防風半兩去蘆頭茯神一兩黃芩半兩鐵粉一兩半細研麥門冬一兩半去心焙遠志半兩去心漢防己三分鉛霜三分細研右為末都入乳鉢內同研令勻煉蜜和搗三二百杵丸如梧桐子大每服不計時以粳米粥飲下二十丸荆瀝湯出千金方治心虗寒隂氣傷寒損心驚掣悸語聲寬急混濁口喎冒昧好自笑厲風心方荆瀝三升母薑取汁一升麻黃白术芎藭各四升防風桂心升麻茯苓遠志人參羌活當歸各三兩防己甘草各三兩右㕮咀以水一斗五升煎麻黃兩沸去沫以下諸藥煮取三升去滓下荆瀝薑汁煎取四升分四服日三夜一忌海藻菘萊酥生蔥桃李雀肉等犀角散出聖惠方治心臟中風語澀昏昧四肢不利翕翕發熱胸中煩悸犀角屑三分防風三分去蘆頭沙參三分去蘆頭羚羊角屑三分羌活三分甘菊花三分麻黃三分去根莭麥門冬三分去心茯神三分遠志三分去心杏仁三分湯浸去皮尖雙仁麩炒微黃白鮮皮三分人參三分去蘆頭柴胡三分去蘆頭甘草一分炙微赤銼右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時溫服茯神散出聖惠方治心藏中風冒昧不知胸背拘急心煩語澀翕翕熱時自汗出四肢不利茯神三分獨活三分當歸三分銼微炒桂心三分黃芩三分防風三分去蘆頭赤芍藥三分秦芄三分去苖杏仁三分湯浸去皮尖雙仁麩炒微黃沙參三分去蘆頭羚羊角屑一分甘草一分炙微赤銼麝香研一分天南星牛膽匱者半兩右為末煉蜜丸如雞頭大每服一丸細嚼荆芥人參湯下食後臨卧服麻黃散出聖惠方治心臟中風虗寒顫心驚掣悸語聲混濁口喎冒昧好笑麻黃一兩去根莭白术一兩防風一兩去蘆頭桂心三分川升麻三分芎藭一兩茯神二兩一分遠志三分去心人參三分去蘆頭羌活三分當歸三分銼微炒漢防己半兩甘草半兩炙微赤銼右為散每服三錢水一中盞入生薑半分煎取五分去滓入荆瀝半合更煎一兩沸不計時溫服沙參散出聖惠方治心藏中風虗煩目旋恍惚不定沙參三分去蘆頭麥門冬半兩去心石膏三分防風三分去蘆頭人參三分去蘆頭獨活三分枳殼一兩麩炒微黃去穰赤茯苓一兩芎藭三分羚羊角屑三分遠志半兩去心甘草半兩炙微赤銼右為散每服四錢以水一中盞煎至五分去滓入竹瀝半合更煎一兩沸不計時溫服金箔琥珀丸出聖濟總録治心中風恍惚忪悸言語不正金箔三十片研琥珀研丹砂研白茯苓去黑皮真珠研人參犀角鎊天南星炮各一兩麝香研龍腦研各半兩雄黃研四錢安息香二兩酒研去沙熬牛黃研六錢虎睛研一對甘草炙半兩右為末和勻酒煮安息香膏并蜜和丸如雞頭大每服一丸食後人參湯化下牛黃定志丸出聖濟總録治心中風精神不寧壓驚鎮心化涎安神牛黃研龍腦研乾蠍炒白殭蠶炒白附子炮各半兩雄黃研一兩丹砂研二兩天麻酒浸焙甘草炙各一兩半夏湯洗七次焙乾炒黃二兩琥珀研三分烏蛇酒洗去皮骨灸一兩右為散每服四錢水一中盞生薑半分煎至伍分去滓入竹瀝半合更煎一兩沸不計時溫服茯神散出聖惠方治心臟中風語澀昏悶四肢沉重精神不守茯神一兩羌活一兩蔓荆子三分龍齒一兩人參三分去蘆頭薏苡仁三分防風三分去蘆頭赤芍藥半兩麥門冬一兩去心遠志三分去心犀角屑三分麻黃一兩去根莭甘草半兩炙微赤銼右為散每服四錢水一中盞生薑半分煎至六分去滓不時溫服防風丸出聖惠方治心臟中風驚悸言語混濁煩熱恍惚心神不安防風三分去蘆茯神一兩人參三分去蘆頭龍齒一兩天麻三分麥門冬一兩去心焙白鮮皮一兩犀角屑一兩薏苡仁三分小草三分天竺黃三分牛黃一分研入右為末入研了牛黃令勻煉蜜和搗二三百杵丸如梧桐子大每服不計時以糯米飲下二十丸辰砂天麻丸出聖濟總録鎮飬心神擒截諸風和流榮衛滋潤筋絡通開膈胸密表腠丹砂半兩天麻一兩半夏溫煮軟焙乾天南星各半兩蠍梢一分炒白附子半兩硼砂一分研入麝香一分研入牛黃半兩研入白殭蠶半兩炒右為末水煮麵糊為丸如梧桐子大每服六十丸荆芥湯下不計時候葳𬎼散出聖惠方治心臟中風精神昏昧煩熱多汗口靣赤驚悸頭痛葳𬎼一兩薏苡仁一兩白鮮皮三分麥門冬一兩去心茯神三分犀角屑三分石膏一兩防風三分去蘆頭遠志三分去蘆炙甘草半兩炙微赤銼右為散每服四錢以水一中盞煎至五分去滓入竹瀝半合煎一兩沸不計時溫服丹砂煎出聖濟總録治心中風邪神不寧虗熱朝歇丹砂三分研雄黃一錢研甘草炙大黃銼炒當歸切焙各二錢芍藥六錢乳香研沒藥研各半錢膩粉研錢半右為末與生白蜜和勻入銀石器中重湯煮成煎每服櫻桃大一粒煎薄荷湯化下小兒可常服烏犀散出聖濟總録治心中風精神冒悶語聲錯誤恍惚多驚烏犀角二兩鎊丹砂研獨活去蘆頭遠志去心人參各一兩防風去義一兩半海荆子炒一兩丹參一兩右為散每服二錢匕食後酒調下日三解語丹出永類鈴方治心脾中風舌強不語半身不遂白附子炮石菖蒲遠志肉天麻全蝎去毒酒炒羌活殭蠶各一兩木香半兩牛膽一兩南星一兩右為細末丸梧桐子大朱砂為衣每三十丸薄荷湯下脾中風附論脾中風者其脈浮緩惡風多汗舌強語澀口靣喎僻肌膚不仁身體怠惰四肢不欲舉色薄微黃不嗜食診在鼻上其色黃又曰踞而腹滿身痛吐酸汁又曰熻熻發熱形如醉人腹中煩重皮肉瞤動􅀈氣脾埤諸藏灌四旁者也所主四肢故脾中風則身體怠惰四肢不欲動脾者倉廪之官故病則不嗜食診在鼻中央之位也其色黃黃土之色煩重發熱風之候也形如醉人者邪氣之甚若吐醎汁不絶者先尚可疹療急灸脾腧百壯服續命湯若目下青手足青者不可復治矣