銼散每服三錢水一盞半煎食後服神效膏出聖濟總録治翳膜遮障目風淚出點藥鉛丹二兩蜜半斤以絹濾過硐砂一豆大明淨者青鹽一錢馬牙硝三錢白龍腦一錢白礬一大豆燒過大豬膽兩枚好新者右並入瓷瓶內和勻用重湯於鍋內煮候紫色為度兼不住手攪之藥成只於瓶內盛貯封固每遇使時旋取些少以井華水調用銅筯子點有淚下以絹帛拭之候淚住即再點每盡夜可三五度洗眼湯出千金方治熱上攻目生障翳目熱痛淚出秦皮黃蘖決明子黃連黃芩蕤仁各十八銖梔子七枚大棗五個右㕮咀以水二升浸煮取六合澄清仰臥洗日一次洗眼紫金膏出和劑方治逺年日近翳膜遮障攀睛弩肉昏暗淚多瞻視不明或風氣攻注瞼生風粟或連眶赤爛怕日羞明隱澀難開並能治之硃砂别研乳香别研鵬砂别研赤芍藥當歸洗焙各一分雄黃研飛二錢麝香别研五分黃連去鬚五錢右為細末入研藥拌勻再擂煉蜜搜和為丸如皂莢子大每次用一丸安淨盞內以沸湯泡開於無風處洗藥冷開目少時候三兩時再煨令熱依前洗一貼可洗三五次不得犯銅鐵器內洗如暴赤眼腫者不可洗之通神膏出百一選方一名金水膏有數人兩目厚翳皆磨去甚妙方見本門目赤爛類補腎圎出危氏方治圎翳巴戟去心山藥破故紙炒茴香牡丹皮各五錢肉蓯蓉一兩洗枸杞子一兩青鹽一分後入右為末煉蜜圎如梧桐子大每服三十丸空心鹽湯下八味還睛散出危氏方主散翳白蒺藜炒去尖防風粉草炙木賊各五錢山梔子五錢草決明一兩炒蟬退一分青葙子一分微炒右為末麥門冬去心煎湯食後調下春雪膏治眼生翳膜上星者用川黃連四兩洗淨用水三碗煎至半碗滓再用水一碗煎至一盞二項并作一處慢火熬一小盞用磁器盛不犯鐵器又用豶豬膽一箇取汁生薑一兩洗淨和皮搗取汁用白砂蜜一斤用熬成膏濾過入麝香片腦輕粉各五分同乳香少許細研膏內攪勻磁器合密盛用時加入撥雲膏撥雲膏班毛三箇去頭灰麵炒過青娘子紅娘子各二箇先製硼砂一錢蕤人五箇去殼油右研極細同春雪膏一日五六次點愈仙木散出聖濟總録治眼目翳膜遮障昏暗退翳蛇蛻洗焙一錢蒼术米泔水浸一宿切焙二兩黃芩去黑心五錢甘草炙銼木賊各一兩右為散每服一錢空心臨臥冷水調下通肝散出危氏方治水翳山梔子蒺䔧炒去尖枳殼去白荆芥各五錢車前子牛蒡子各一分炒甘草炙銼各一兩右為末每服二錢苦竹葉湯調食後服撥雲散出聖濟總録治風毒眼翳膜遮障菊花防風去叉白蒺藜炒去角羌活去蘆頭柴胡去苗甘草各一兩右為細散每服二錢水一盞煎至六分食後臨臥和滓溫服重明散出經效濟世方治兩眼生翳膜連眼眶赤爛久不效者並治之若一時赤眼一服效黃鷹條一錢細研白丁香一錢細研乳香一錢細研爐甘石一分燒赤白礬一錢飛過右為細末每以燈心頭點入眼眥內有點膏出東垣蘭室方治翳膜不問六七年遮障瞳人者當歸身六分甘草六分防風八分蕤人去皮三分黃連揀淨洗二錢銼如麻豆大水一大碗熬至一半再入前項藥右各銼麻豆大蕤人别研如泥同熬至滴水中不散去沫入蜜少許再熬少時為度臨臥點一云令病人心靜點之至目微痛為度日點五七次但欲多點使藥力相繼也故名有點膏昔有張濟明者眼病翳六年以至遮瞳人視人如覺雲氣遮障點此藥五七日翳退一半道人開障散出直指方治諸障翳蛇退洗焙剪細蟬退洗焙黃連去鬚五錢菉豆一兩甘草生二錢右銼細每服二錢食後臨臥新水煎服曾青散主退翳方見本門目眵壞類五神散出經效濟世方治眼疾退翳膜荆芥穗烏魚骨木賊白术各一兩甘草五錢炙右為細末每服一錢食後米飲調下點翳子方烏頭蝎稍硐砂信白丁香右為細末豬鬃點之照水丸出聖濟總録治目生翳障龍腦丹砂通明者烏賊魚骨去甲滑各一錢右研細再同研勻先用黃蠟皂子大兩三塊於新白瓷盞內慢火上鎔用紗帛子濾過再淨盞內再鎔了將前藥末同共拌和捏作餅子如半破豌豆大用薄絹或紗袋子盛了以硐砂半兩放在淨碗內上交橫安竹片放藥在上面鋪著借硐砂氣熏用大糕子一片合碗口勿令透氣撅一地坑放藥碗在坑內用竹簟子一片蓋了然後以黃土蓋之七日出淨磁瓶中收其硐砂不用如患浮翳膜侵瞳人及一切目疾但臨臥將一餅貼在眼眥頭即睡至曉用水一碗向東覷水其藥自落在水中淨浴却用絹帛子包裹起安潔淨處臨臥依前再使每餅可用半月藥力慢時方易餅如兩餅缺重明膏出瑞竹堂一名洗眼藥治眼內雲翳無問逺年不退者及諸般眼疾昏花只內障不治輦真八提點眼內生白翳十二三年治不效得此方點退翳即日安痊復故白砂蜜二兩水飛過訶子四箇水洗煮去液右將蜜煉淨用絹濾過盛於磁器內將訶子黃丹入蜜內於爐上熬用手一順攪之文武火不許太過熬成金絲膏用手撚不粘手為度又用東南上槐條手折寸長一白碗用水三大碗煎至一碗將前膏子用槐條水解稀稠得所用淨磁器收貯蓋封於地上頓放三日令去火毒再用絹濾過方用熬藥時忌雞犬婦人水照丹出經效濟世方治眼中翳膜真珠末一字朱砂象牙半字烏魚骨半錢右為細末鎔蠟丸如黍米大每服臨臥置眼中隨左右用來早以水一盞開眼放藥水中翳膜盡下神妙摩頂膏出聖濟總論治一切眼疾翳膜遮障兼能生髮涼腦治頭痛蓮子草藍清各一握油一斤右將二味細銼納瓶中以油浸之紙封頭四十九日每夜臥時令人以鐵匙點藥摩頂腦上四十九遍至一百二十遍住此藥須五月五日平旦時合白末眼藥去雲翳朵梯水飛一兩碗糖霜淨五錢大海螺火煅為末一兩水飛右為細末用少許點眼青末眼藥明目去翳安白蘆海螵蛸黑丁香各三錢即鼠糞右為細末用少許點眼蜜蒙花丸出聖濟總録治眼障翳蜜蒙花黃蘖根洗銼各一兩右為末煉蜜和丸如梧桐子大每服十丸至十五丸食後臨臥用熟水下或煎餳湯下黃金膏出聖濟總論一名黃蘖膏治一切眼退翳方見本門暴赤眼類復明膏出聖濟總録治目障翳肉昏暗馬牙硝研一兩五錢酸漿草乾者五兩右於六月六日用童子尿浸於日中暴之夜或隂雨覆之晴即露之尿耗即旋添至七月初去酸漿草只空暴小便令乾收之别以新盆蓋藥埋淨地深可五寸已來至來年夏至前二日收之其霜飛上盆子蓋以烏雞毛掃取患者以一米粒安大眥頭避風照水丹出危氏方治眼翳及外障赤翳貫瞳人攀睛等惟翳厚者效辰砂五分海螵蛸一錢右於乳鉢內細研水飛過澄取用黃蠟少許鎔開入藥待用時就火上施丸如蘿蔔子大臨睡用一丸點眼角內緊合眼睡著次日用溫湯洗下未過更用一次妙王居用云常病眼障全不見物止用生辰砂一塊每日眼中擦之海上方云不數日障醫盡退目明如效通光散出聖濟總録治攀睛翳膜昏澀風毒腫痛洗眼方用栝蔞一枚割下頂蓋取瓤并子同豬膽搗勻再入栝蔞內用元蓋却蓋之坐淨土上取桑條子十兩約長四五寸簇栝蔞上用炭火燒扇之煙盡將成炭即住扇冷和灰通研極細每用二錢沸湯浸澄清去腳洗之杏仁膏出聖濟總録治眼翳障膜遮但瞳子不破者以杏仁三升湯浸去皮尖雙仁每一升以麵裹於糖灰慢火中炮熟去麵研杏仁厭去油取銅緑一錢與杏仁同研以銅筯點眼瘥白龍散一名馬牙硝方治翳明目方見本門目生努肉類治眼生翳膜出聖濟總録以薺菜和根莖葉不拘多少洗淨焙乾研為細末每夜臥時先淨洗眼了挑半米許安大兩眥頭澀痛莫疑翳膜不日自落治翳目方出聖濟總録以芥子一粒輕手挼入眼中候日出以井華水雞子清洗之治熱翳瞞睛方出千金方以羊筋漱口熟嚼夜臥開目內之即閉目睡明日即差亦治眯目不明立消膏出直指方治浮翳粟翳霧膜遮睛用雪白鹽於淨器中生研少許以大燈草蘸鹽輕手指定浮翳就點凡三次不痛勿驚屢效去翳障生血止痛方出家藏經驗方用蠐螬汁滴目中及飴炙食之陳氏經驗方云晉書盛彥母氏失明躬自侍養母食必自哺之母既病久至於婢使數見捶撻婢忿恨因彥暫行取蠐螬炙飴之母食以為美然疑是異物密藏以示彥見之抱母慟哭絶而復蘇母目豁然從此遂愈孟子曰陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見也井上有李螬食者過半矣匍匐往將食之三咽然後耳有聞目有見本草云蠐螬汁滴目中去翳障余在曲江有將官以瞽離軍因閲晉書見此參以孟子之言證以本草之説呼其子俾羞事而供勿令父知旬日後目明趨庭伸謝因録以濟衆指甲散出龍木論治眼翳兼諸物入眼以左手中指甲洗淨候乾以刀刮其屑用燈草蘸點眼中翳處一二次即去或用懷孕婦人爪甲屑置目中去障翳鼓槌草方出人存方退翳將鼓槌草根獨莖者寸截用薄綿裹塞鼻內即退隨目左右塞之神聖粉治目生翳方見本門班痘瘡入眼內黑運方治眼中脹膜方見本門眯目類明目去障翳解熱毒出本草以菥蓂子食之久食視物鮮明四月八日收實良治眼上生翳用頭上膩垢丸如梧桐子大更以指甲刮些末安眼中以些水滴之令人仰臥傾以手揉眼兩邊淚出却以燈心一莖於眼中撚起翳膜即去旋復花散出聖惠方治眼從下生赤翳膜上黑睛旋復花桑根白皮銼羚羊角屑赤芍藥各一兩黃連去須耳草各五錢微炙川升麻黃芩各三分右為粗散每服三錢以水一盞煎至六分去滓每食後溫服忌炙煿豬肉還睛膏出聖濟總録治一切障翳黃連去須鉛丹水飛過各一兩黃蘖去粗皮五錢桃仁去皮尖雙仁者杏仁去皮尖雙仁者各七粒龍腦研五分白砂蜜四兩右除龍腦鉛丹蜜外各搗碎用井水二盞及蜜鉛丹攪勻浸三日後入銀石器內文武火熬及一半綿濾過滓入龍腦成膏瓷合子內密封掘地埋一宿出火毒不拘時候點之撥雲散出德生堂治散風毒退翳障及赤爛眩者白蒺䔧防風羌活川芎荆芥甘菊花蟬退各二兩右為細末每服二錢桑白皮熬水食後服珊瑚散出聖惠方治眼赤痛生翳障逺視不明癢澀珊瑚三分龍腦五分硃砂二分右先研珊瑚硃砂如粉次入龍腦研令勻每服用筯取一米許日三四度點之神效蕤人煎出聖濟總録治眼生翳障昏暗點大小人眼澀腫赤隱痛蕤人去皮尖鋪在銀盂底黃連去須淨洗鋪蕤人上各二兩右古錢四十九文鋪在黃連上次井華水二盞浸不得過錢用七年熟艾四兩緊打成一炷在古老錢上燒密蓋盂口不令出氣候燒過艾炷出灰并古老錢黃連蕤人等取下艾煙在水內入白蜜二兩同煎一盞去滓又用麝香龍腦各二分硼砂一錢細研和膏再熬熟密封入井水內浸七日出火毒凡遇障翳先用白湯洗眼燈心點眼內日三勿令見風亦治暴赤眼及風眼淚癢蘖竹瀝膏出龍本論黃蘖去粗皮刮細者滿傾竹內慈竹一段去兩頭節右用磚對立置竹磚上兩頭各安淨碗以乾竹火燒令瀝出盡收之以叉股銅筯點眼摩障翳方用雞卵殼研摩之治熱翳赤障更無甘汁出本草用斫斷千歲虆藤以水浸從一頭吹取氣滴目中藤如通草者又名櫻蘿藤石決明方出龍本論用石決明味醎無毒去目障翳止痛兼治青肓殼摩障翳亦名九孔螺也圖經云決明殼大者如手小者如三兩指海人不噉其肉亦取其殼清水洗眼七孔九孔者良十餘孔者不佳決明散出永類鈴方治障膜石決明煅枸杞子酒浸一宿木賊去節荆芥穗羌活晚桑華榖精草去根粉草旋復花蛇退蜜炙蒼术製菊花各等分右為細末每服二錢茶清調食後服枸杞丸出衛生家寶方治年逺日近翳膜遮障內外障眼木賊一兩去節童便浸一宿淨洗三五次枸杞子一兩炒乾家菊花一兩去枝葉削皮蒼术三兩泔浸右為末煉蜜丸如禾穗子大每服一丸食後用好茶嚼下神妙散出衛生家寶方點翳膜障眼朴硝二兩安豆腐淋過將建盞煅辰砂五分乳香五分元明粉一分腦子三字射香三字膽礬五分碙砂五分南硼砂五分右為細末以銅筯點之研須極細海洲聖婆婆眼藥出衛生家寶方治一切翳障攀睛赤脈瘀肉或癢或疼朴硝一兩硼砂研細硃砂研細腦麝各少許右用建盞一隻於火上鎔朴硝成珠子却入硼砂等細研用蜜丸如芥子大吹一粒入眼中通利膏出鮑氏方治翳膜障明時多熱淚方見本門目赤痛類和膏五退散出淡療方治眼中翳障蟬退蛇退蟬退殼豬退蹄鯪甲鯉菊花防風草決明石決明甘草各等分右為末每服二錢薄荷葉水小􅊦煎服秦皮丸出聖濟總録治黏睛翳秦皮去粗皮黃蘖去粗皮黃芩去心防風去叉柴胡去苗黃連去須一兩萎蕤炙木通銼各一兩五錢甘草炙右為末煉蜜丸如梧桐子大每服三十丸食後卧時溫水下治赤障白膜風淚出本草以青羊膽點之普濟方卷七十八
