分甘草炙半兩右搗篩一歳毎一錢水半盞生薑二片同煎至三分去滓食前分温二服日再服隨兒大小加減訶梨勒丸治小兒冷痢訶梨勒煨去核半兩桂去粗皮一分赤石脂半兩右為末煉蜜和更入臼中搗三百杵丸如麻子大一二歳三丸三四歳五丸空心午後各一服米飲下阿膠飲治小兒白痢阿膠炙令燥一兩一分黄芩去黒心一兩黄連去鬚半兩右剉末一二歳毎服一錢水半盞煎至三分去滓分温二服空心日晚各一量兒大小増減蜀椒丸治小兒秋深冷痢止腹痛蜀椒去目及閉口者炒汗出一兩乾薑炮製一分右為末煉蜜和丸如小豆大一歳兒空心麫湯下未止日午再服量大小加減木香丸治小兒冷痢白膿臍下絞刺痛木香訶梨勒煨去核各一兩右為末以粳米飯和為丸如麻子大一二歳三丸五歳五丸米飲下食前服醋石榴皮散治小兒冷痢百藥無效醋石榴皮一兩剉碎炒令㣲焦硫黄一分右為細散毎服以粥飲調下半錢日三四服量兒大小加減麝香丸治小兒久患冷痢脾胃冷極致使大腸滑泄不絶麝香一分細研鹿茸一兩去毛塗酥炙黄右為末煮棗肉合丸如菉豆大毎服以粥飲下五丸日三四服量兒大小加減又方當歸半兩炒大蒜一顆右為細末燒蒜熟和丸如菉豆大毎服以粥飲下七丸日三四服量兒大小加減治小兒冷痢方用蓼菜搗汁量大小與之一方作芥菜治冷痢内因脾胃虚冷外觸冐風啖食冷物積滯下痢其證面青或白腸鳴腹脹乳食不化手足清冷下痢青白或成白凍右用不換金正氣散理中湯加茯苓厚朴入燒鹽下感應丸或實脾散加白薑下五積丸或五積散加白薑棗子粳米煎空心服治患冷痢用附子一枚炮水五升合煮鷄子一枚令熱以哺兒瘥治小兒冷痢多時宜服此方用川椒三分去目及閉口者㣲炒去汗為末煉蜜和丸如菉豆大毎服以粥飲下五丸日三四服量兒大小加減調胃散治冷痢人參去蘆陳皮去白白术蒼术白茯苓去皮桔梗縮砂仁厚朴薑汁炒肉豆䓻稨豆姜汁炒薏苡仁炒山藥石蓮肉去心粉草以上各等分右為末猪肉拌食痢不止加訶子肉吐不止加丁香吐痢内虚可酌加附子木香重者加白薑保嬰艾葉湯治冷痢肚痛陳艾葉炒當歸各一兩乾薑木香製厚朴肉豆䓻各半兩草菓半兩良薑丁香各一錢甘草五分右為末粟米煎服温臟湯治小兒因驚滯乳氣不宣導冷摶腸間下痢青沫或乳多傷脾妳癖不化常服温臟腑暖脾胃化宿冷進乳食人參去蘆一兩白附子炮陳皮去白白术各半兩神麴炒黄麥蘖炒黄甘草炙丁香已上各二兩右為細末毎服半錢空心棗湯調下雄朱散方治嬰孩小兒腸胃虚冷下痢頻併日夜痛不可忍雄黄一分細研飛過乳香一錢研細白礬一錢燒右為末毎服嬰孩一字二三歳半錢陳米飲調下一日三服鷄子餅療小兒秋夏冷痢腹脹乍熱白滯下方用鷄子一枚胡粉一丸碎絹篩合鷄子黄共搗研調勻熬令熟作鷄子餅兒一歳一食半餅日再不過二餅即瘥兒大倍之凡羸弱冷痢用生薑汁蜜水各半佐以木香豆䓻普濟方卷三百九十六
