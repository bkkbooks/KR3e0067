body:
  text: 普濟方卷三百九十六明周王朱橚撰嬰兒下痢門一切痢總論夫小兒八痢曰冷曰熱曰疳曰驚曰冷熱不調曰休息曰滚痢曰蠱毒諸痢無積不能成冷痢白積熱痢赤積冷熱不調積下赤白疳痢黄白積下無度驚痢青積休息痢糞黒如魚腸愈而復作滚痢停積不下肚大飲食不為肌膚氣息大便秘澁疼痛啼呌蠱毒痢下紫黒不可不詳察略具數方量大小以大方藥斟酌用之痢與瀉名雖不同感受之源一也胃為水榖之海其精英則流布以飬五臟其糟粕則傳送以歸大腸菖氏曰内由腸胃虚冷乳食積滯外因感冐寒熱所傷遂成瀉痢楊氏曰傷風者自汗惡風痛引腰脊鼻塞項強夾寒者筋節拘急靣慘惡寒傷暑者面垢煩躁渇飲水漿背寒自汗傷濕者肌肉虚浮身痛重着冷則腸鳴肚冷而手足清冷熱則煩躁身熱而手足温熱不調者乍熱乍冷熱積於内者不能去其積徒以冷藥觧之熱氣無所發泄故冷熱相摶而下注或冷積於中不能去其滯徒以熱藥壓之冷積不能宣通故冷熱相干而或泄外則傷食一證食飢傷飽胃不能消心腹膨脹所下酸臭夜熱晝凉泄者若脾胃合氣以消水穀水穀既分安有所謂脾積而泄也痢之赤白其赤者熱乗於血血渗大腸則赤也若風邪夾熱則所下黄而赤焉白者冷摶腸間精凝滯則白也若寒邪併之則所下白而黒焉冷熱相交故赤白相半重者狀若濃涕而雜之輕者白涕中間㣲有黒縷内挾風邪故清血注毒如腸胃之間則下如豆汁或有瘀血也痢頻不食腹脹喘粗下糞如黒澤身熱渇脉大者皆不可治也楊氏曰究以受病之源决以對病之藥大要散風邪行滯氣消積滯開胃脘為先不可便用肉豆䓻訶子白术軰補住寒邪不可悞投罌粟殻龍骨榴皮等閉澁腸胃邪氣得補而愈勝腸胃澁滯則腫脹日久淹延而未愈也至若泄瀉之後腹滿身疼厥逆是為表裏俱病急與理中湯温裏仍以桂皮湯觧表活人書已言之泄瀉而面色青慘者肝經受寒寒肝之賊木能勝土古人慮之特設當歸厚朴湯以活之𤣥機論曰大便黑者難瘥痢出於積滯積物積也滯氣滯也物積欲出而氣滯之不與出是以下墜裏急乍起乍止日夜頻併多因傷暑伏熱食啖熱毒之物而得物積用巴豆大黄軰氣滯用枳殻桔梗青皮蓬术等以黄連丸佐之阿膠丸乃大腸虚滑有熱毒留滯則能疎導無熱毒則能安愈無阿膠丸即以當歸青皮赤茯苓黄連阿膠炒作劑入烏梅濃蜜同煎甚能蕩滌惡穢積滯既去痢數漸疎調以木香茯苓縮砂白豆䓻陳皮甘草和胃食後以真人養臟湯易簡㫁下湯可止則止下痢雖曰有積有暑如用藥不效即是腸胃有風邪冷熱如熱者赤者宜敗毒散冷者白者宜不換金正氣散加木香下痢壯熱須用敗毒散如陳米飲調五苓散佐之或下阿膠丸凡卒暴注下皆因乳食不節脾胃傷冐濕熱水穀不分洞泄不止夏熱飲水食冷之由多有之不可便服止瀉及温煖之劑必成裏急後重成痢積也凡痢疾不進乳食此乃邪氣疫毒傳入臟腑必成噤口痢九死一生先當用敗毒散加陳糯米一百二十粒服經效傷食痢乃乳哺太飽損傷脾胃不能消化遂成積痢其證夜熱晝冷氣急發渇目胞腫肚腹硬下痢酸臭湯氏曰此瀉難止亦不宜補當應紫霜丸或五積丸白湯下取其積虚者調消積飲吞下補脾止痢消積飲同益黄散煎縮砂湯調服熱血痢裏急而痛已疎通而下吐乃榮血虧少當於藥中以川芎為佐以調榮血凡小兒患痢之時未熱久積氣虚其臟腑虚急作熱此屬惡候終見痢後作熱此兒臟腑虚弱同於虚熱主治其或三焦熱引飲不歇四肢浮腫者理宜温補臟腑散除濕氣喘則難治凡痢熱疳熱吐瀉熱不可發散退熱不佐寒凉藥但理其病源調其臟腑和其榮衛生其胃氣令進飲食加與痢藥服之參酌赤白多少膿血相雜裏急後重用行血後腸胃和中脘温臟腑其熱自然退愈凡小兒患痢不問輕重忌葷腥冷熱炙􅏼醃醎應毒之物若恣口腹愈而復作若要永安須用戒絶之矣赤痢當用黄連地榆罌粟殻阿膠等藥白痢當用乾薑訶子龍骨人參豆䓻等藥赤白痢當用沒石子黄連豆䓻噤口痢治當用先助胃壯脾漸能入食始用木香橘皮等藥若更虚弱加以附子依此調理數日飲食頗進漸有黄糞夾雜脾胃漸能充化當以去積藥下之若據幼幼新書皆用褊銀丸今之小兒非上古禀受之比久痢腸胃已薄豈宜用膩粉等藥以取之若執方反成大害余治痢之法若欲取積只用官局進食丸甚穏雖取積而又能治痢萬無一失積已下而急以四君子湯加豆䓻訶子補之常服厚腸香丸此得效之法然當斟酌恐孩兒有虚實又當隨機變化虚極者加以附子之屬凡痢久則冷腫滿下焦偏令上焦熱結熏蒸於肝則眼昏生翳古今八痢者因觸八邪所得故名八痢八邪者飢飽勞疫風驚暑濕八般痢者強而為名其實皆冷熱所作也下痢舌黄燥不渇胷中實熱腹滿身熱讝語者復有燥糞大柴胡湯下之後與澁腸痢藥如覺有食積或久痢不退先補脾次與妙靈丸下之後再補脾胃若下痢者舌白而渇小柴胡加罌粟無如此妙也大柴胡湯亦宜加之虚腫者女麵散痢後成疳眼生翳者六甲丸并温平疳藥治之楊達柙綱子五歳七月中患痢自與治不退召愚視之見兒攢眉乃痢之後作煩主人問兒欲思酒可與否遂問兒平日曽飲酒曰不曽飲痢忽思酒時欲飲之荅曰此病不治素問云病不治者治之無功盖痢欲思酒者是大腸已虚津液已枯榮衛不能相滋是猶日薄西山無住之况主人怒曰兒痢方十餘日久又能食而不熱證候平稳何相駭也若果不能治㡬日當絶荅曰今未絶直候兒兼藥食喉中鳴响三日内涎潮肺絶當卒有氣急者五日不退再七日而死矣肺與大腸為表裏表裏俱絶即死正如齊侯抱將死之疾怒扁鵲之先見也乃長揖而退楊别易數醫旬日病雖不退皆言不妨忽一日咽湯飲喉中鳴响再告召愚楊慚對曰果如君言能救之否答曰不可果三日内涎潮而卒後楊請問此二証出何書而説死答曰諸書皆不載厯試三十年累見斯証試之多驗故敢言不治也知縣冷世修子三歳八月中患膿血痢累醫作食痢或作暑痢或作疳痢或餘用感應丸或用胃風湯紫丸子下之并雜藥共治五十日皆無應效召愚視之其証面黄憔悴多睡露睛温熱温疼大便黯血或如豆汁雜色腥臭愚曰病久可危可喜者面白而不昏是形氣相得色黄而滋潤是色澤以浮脉沉而有力是脉從四時素問曰形氣相得謂之可治也澤以浮謂之易兼脉從四時又手足不冷雖危可治盖此病脾胃有風虚中有積前後醫者雖以胃風湯主風下氣紫丸子下積滯猶在所以進退日久也問曰何知有風積錢氏曰多睡露睛身温風在脾胃故大便不聚孫氏曰大便雜色米穀不化腥臭肥膩虚中有積或腸中沉冷今用四君子湯胃風湯四物湯此三藥助氣和胃調脾活血共治五日日各二服次與宣風散連進二服令㣲利去脾間風再進前藥二日空心與妙靈丸一服去沉積㵼数行再四君子湯加訶子末一日六服後用訶子膏駐車治愈方大效至聖千金飲子活幼口議治小兒脾積虚痢下五色先由嘔吐復作泄瀉臍腹㽲痛脇肋脹滿受濕虚鳴膿血相雜下如豆汁亦如瘀血日夜無度食少羸瘦宜服綿黄耆蜜炙甘草陳皮罌粟炙木香白芍地榆川當歸枳殻麩炒黑豆炒烏梅淮棗白术訶子炮去核黄連右等分㕮咀毎服一錢水一小盞煎半盞去滓通口與服議曰臟腑虚中加燥故患熱痢或爾虚寒或患冷痢或有暑氣冐之水穀不分或受濕氣臨之腸胃有作因食毒傷觸脾肺或因宿冷停積臟腑或因表裏不解因冷熱相承或因飲過多或因飲饌不及多飡醃醎常噉魚腥或是母懐胞胎恣其口腹積之日久氣不宣通遂令患疾有加發作無度畢竟腸胃虚損日夜呷冷痢下頻併宜服此方效驗生熟飲子活幼口議治嬰孩小兒虚積痢腹肚痛疼裏急後重日夜無度罌粟殻大者四箇一半炙此一味去盡内瓣及筋蔓者佳陳皮二片半炙甘草二寸半炙烏梅兩箇半煨淮棗二箇半煨生薑二塊指大半煨木香一兩作兩片半煨訶子大者二箇一半煨黒豆六十粒半炒黄耆二寸半炙白术二塊大半煨當歸二寸半煨右件各半生熟㕮咀和勻毎服三錢水一盞入磁瓶内煮濾去滓任意與服至多勿慮所有生黒豆不要破只完全同煎效議曰病有冷熱藥有生熟病有陰陽藥有造化病有虚實藥有君臣按君臣以理虚實分生熱而均冷熱治療主本之法也平和腸胃之方也順益三焦之功也安調五臟之至也陰陽既分冷熱既散腸既厚三焦既益五臟既順良由藥有造化且水穀自分榮衛自正糟粕自去治其瀉與痢何患不愈生熟飲子之功乃盡天下之妙不可忽澤漆茱萸湯治小兒夏月暴寒寒入胃則暴下如水四肢被寒所折則壯熱不除經月許日變通身虚滿腹痛其脉㣲細服此方一劑漸漸安神澤漆青木香海藻各二分吳茱萸茯苓白术桔梗芍藥當歸各三分大黄一分右㕮咀以水四升煮取一升半一百日至一歳兒一服二合半一歳已上至二歳一服四合飬臟湯治冷熱不調泄瀉裏急後重木香白芍藥各八分訶子肉三錢人參白术當歸各三錢甘草炙肉桂各錢罌粟殻去筋蔓蜜炙一兩右剉薑棗煎服生金牛黄湯治小兒積下不止因發癎生金三銖一方用六銖無生金用熟亦得法用作屑今方盡成噐者牛黄三銖麻黄二分黄連乾薑人參甘草各一分細辛半分右㕮咀以水一升六合煮取八合去滓臨卧服研牛黄以煮湯中如兒熱者用生薑代乾薑今世之生金但用成噐金亦善二三兩皆得用也胃風湯全嬰方治小兒風冷乗虚客入腸胃水穀不化洩瀉注下胸脇虚滿腹鳴肚疼及腸胃温毒下如豆汁或下瘀血日夜無度身熱不食人參白茯苓去黑皮白术白芍藥當歸焙川芎官桂去粗皮粟米少許右等分為末三錢水半盞煎三分空心日二服量大小加減訶子湯醫方大成治冷熱不調泄瀉裏急後重訶子肉炮人參去蘆白茯苓去皮白术各一兩木香炮陳皮去白甘草炙肉豆䓻各等分右為末薑棗煎服手足厥冷加附子梅肉散醫方妙選治渇痢不止眼生翳障身體浮腫烏梅肉炒綿黄耆乾葛各一兩川黄連𤓰蔞根乾薑甘草各半兩右為細末毎服一錢水一盞煎至六分去滓随時服厚朴丸治小兒臟腑怯弱風冷邪氣客之令兒腹脹氣不宣通甚者變為下痢厚朴薑汁炙丁香木香白术各一兩青皮去白半兩牽牛子一分炒右為細末煉蜜搗成膏如黍米大毎服十粒煎陳米湯下木沉散醫方妙選治証同前木香沉香益智各一兩去皮草豆䓻麫裹煨蓬术白豆䓻各半兩右為細末毎服一錢水八分生薑三片煎至五分去滓温服丹砂丸聖濟總録治小兒一切痢疾丹砂研半錢砒霜研半錢巴豆霜研硫黄研麝香研菉豆粉研各一分右細研令匀燒飯為丸如豆大毎服二丸血痢煎黄芩湯下白痢煎附子湯下疳痢蛤粉湯下龍骨丸一名香連丸和劑方治小兒冷熱不調泄瀉煩渇米穀不化腹痛腸鳴或下膿血裏急後重夜起頻併不思乳食肌肉消瘦漸變成疳龍骨白石脂乾薑炮黄連去鬚㣲炒白礬煆各半兩右為末醋煮麫糊和丸如麻子大毎一歳兒服十丸米飲下乳食前服如煩渇煎人參湯下更量大小加減日三四服益黄散儒門事親治小兒一切痢冷熱不調泄瀉裏急後重脾胃虚弱腹痛泄利不思乳食嘔吐不止困乏神懶心脇膨脹顔色青黄懨懨不醒陳皮去白訶子肉丁香甘草炙青皮去穰各等分右為末米湯調服楊氏曰本用青皮陳皮太疎利宜加肉豆䓻去青皮久痢由腸胃虚冷滑泄下痢罌粟訶子龍骨等皆澁腸止痢之藥必先以縮砂湯下感應丸去積等劑候其積消方可服此粟殻本用治嗽今用治痢功能澁氣令人滿悶不食能消息去之尤為妙也一方水煎服梅煎散治小兒暑毒下痢煩渇肚疼發熱赤芍藥黄連甘草各一兩罌粟殻三兩右為末三歳一錢水半盞烏梅一箇煎三分去滓食前服訶子膏全嬰方治小兒新久痢煩渇不食訶子炮赤石脂甘草罌粟殻炒等分右為末煉蜜丸鷄頭大毎服一丸米湯化下豆䓻散活幼口議治嬰孩小兒膓胃虚弱糟粕不聚泄瀉不止或赤或白冷熱不調日夜頻併愈而又發宜服殢腸豆䓻散良方肉豆䓻火煨一箇胡粉炒二錢龍骨生一錢白礬枯一錢右為末毎服一錢温飯飲調服不拘時薄糊丸如麻子大五十丸議曰胡粉即真鉛粉也以鉛法造出韶州名韶粉定州名定粉總名光粉其性殢故用之以滯其腸令不虚滑豆䓻温臟之藥安和腸胃龍骨白礬澁腸止痢所患大腸虚滑下痢日夜無度者隨時痊瘥一應葷腥之物醃醎之屬悉與禁止亦治秋間白痢至效白餅子活幼口議治小兒秋痢號曰毒痢純下白膿肚痛白礬枯白净膩粉一錢重白麫半兩胡粉炒一分右件和勻水搜作餅如錢大毎服半餅大者一餅飯飲磨化議曰秋氣金旺則母虚矣夏月火燥則子虚矣夫人五臟六腑乃循四時而行故曰秋温脾胃若胃口有毒禁閉不食輕粉却毒次用豆䓻麫喫兼雞清生熟飲子間服開胃醒脾乃愈等住丸出危氏方治溏瀉并一切瀉痢立效當歸硫黄牡蠣煆木香各一分右為末麫糊丸粟米大毎服二十丸糯米飲入薑汁三滴送下小駐車丸出危氏方治小兒冷熱不調或乳食失節泄瀉不止或下痢鮮血或赤多白少腹痛裏急後重腸胃虚滑便數頻併減食困倦一切泄痢並宜服之當歸二兩訶子炮去核一兩乾薑炮黄連去鬚各三分右為末用阿膠一兩三分煎成汁搜和為丸如粟米大毎一歳兒服十粒至二十三十粒温米飲下隨乳亦得更量歳數加減與服一方無訶子醋糊丸草罌飲出仁存方治小兒新久痢疾不食身熱木𤓰草一兩一方作馬齒莧罌粟殻甘草各半兩右㕮咀三歳一錢水半盞煎三分去滓食前服神效雞清丸醫方大成治嬰孩小兒一切痢疾久瀉無時度冷瀉白痢木香二錢土黄連一分去鬚肉豆䓻一箇大者生用右三味先碾為麄末取雞子清搜藥作餅於慢火上炙過令黄色變紅者稍乾擘破碾羅為末白麫糊丸麻子大毎服三五十丸温米飲下一方以黄連半兩用茱萸一分同炒令紫色去茱萸不用肉豆䓻半兩煨木香一分用雞子清糊丸如麻子大毎服五丸飯飲下赤痢粟米湯下白痢厚朴湯下名木香丸一方粟米飯為丸如米粒大米飲下治泄瀉隂陽不調腹痛腸鳴豆䓻木香丸治泄瀉痢赤白議曰木香黄連一隂一陽藥木香善導水利氣脉黄連厚腸胃二味君臣相佐陰陽相順加之豆䓻温和臟腑止瀉痢功效彌良凡兒患瀉與痢不問證輕重並宜首先與服不問臟腑冷熱愈多愈效然雞子清為物有毒是以毒氣引藥致效若去此一味其功不作矣治惡痢家傳方湯氏方南沒石子豆䓻各等分右於砂器上磨水煎數沸服之肚疼加木香血多加臘茶此乃備急妙方香連丸湯氏方厚腸胃除餘積黄連一兩一半生一半熟茱茰炒木香半兩炮右為末化蒸餅丸如黍米大湯下一歳十丸大小以意加減一方煉蜜丸治冷熱痢橘薑湯治小兒痢後虚手足心熱痢縱未㫁亦可服之橘皮生薑各三分右切以水一升煎取六合分服雜痢此方並治之烏賊骨散全嬰方治小兒痢肚疼後重用烏賊骨為末三歳半錢米湯調下一名海螵蛸炒雞子方危氏方治休息痢疳瀉日久不能安者兼小兒痢日夜數十行者遷延日月百藥俱試飲食不方便下痢不止百用百中無不獲安神效昔項文學從龍在臨安見鄉人潘省幹之子方三歳有此證服之效用雞子一枚打破用黄蠟一塊如指大銚内以雞子拌和炒熟空心食之一方雞子白和釀醋攪如白酒煎如餳灌之勿令吐一方用黄脚雞子和蠟作煎餅與兒食之止痢治小兒水痢形羸不勝大湯藥用白石脂半兩研如粉和白粥空腹食之治小兒痢用林擒構子杵取汁服以意多與服之瘥乳母方肘後方用稨豆莖一升炙令為炭切之人參三兩以水三升煎取一大升去滓取汁煮粟粥與乳母食良常食仍復乳勿令住又法乳母常食粥仍欲乳母先捻去少許即當住療小兒三歳即患痢初患膿少血多四日後膿多血少日夜四十餘行肘後方用生地黄汁五小合入羊腎脂令煖分三四服立效預知丸傅氏活嬰方治一切痢疾預知子一錢去殻别研訶子二錢煨去核木香半錢白附子半錢海金沙半錢炒石决明二錢煆研肉豆䓻一錢右為末冷水滴丸如菉豆大毎服二十丸藿香湯下調中散傅氏活嬰方治下痢純白人參一錢白茯苓一錢白术煨木香御米稨豆藿香各一錢訶子二箇煨甘草石蓮肉各一錢右為末毎服一錢陳米飲下或甘草湯下如和氣紫蘇木𤓰湯下吐瀉氣虚不食頭汗不止鹽湯下胃氣虚弱嘔吐腹脹陳皮湯下盤腸氣痛木𤓰鹽湯下一方加丁香枳殻蓽澄茄肉豆䓻四味尤佳治小兒肝受疳氣相刑於脾所下之痢多是鮮血忽是膿血忽赤白相雜宜喫此方楊子建萬全䕶命方防風地榆白蒺藜去刺川芎各一錢史君子半兩蒸四五回焙乾木香甘草各三銖黄連四銖右為末毎服一錢半無時食後任意煎冷服香連丸儒門事親木香訶子肉麫炒黄連炒已上各半兩龍骨二錢右為細末飯丸如黍米大毎服二十丸米飲湯下硃砂丸楊氏家藏方治小兒一切泄㵼痢疾硃砂半錢人言半錢黄丹三錢右為細末水丸粟米大毎服五七丸乾薑甘草湯下雞子湯肘後方小兒病食不消腹滿下痢用亂髮如雞子一枚去垢㕮咀之雞子七枚去白以黄并髮煮雞子汁熟數按之令汁出取服治小兒下痢腹大且堅方千金方用故衣帶多垢者切一升水三升煮取一升分三服又方以腹上磨垢衣中白魚服之亦治