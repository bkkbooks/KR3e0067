異香散加五靈脂末煎紫蘇湯調下少吞紫霜丸治疳脹肚皮緊史君子丸出醫方妙選治小兒五疳下利能飲食不生飢肉或㧓頭揉目或頭焦筋青下痢頻久而不痊轉羸瘦並皆治之亦小兒便白濁史君子三兩炒丁香木香厚朴沒石子胡黃連肉豆䓻各一兩蘆薈麝香各一兩右為末粟飲為丸黍米大每服十二丸米湯送下一方煎陳皮湯乳前下楊氏家藏方無麝香名胡黃連丸千金丸出經驗良方治小兒五種疳氣面痿黃肌瘦不食乳川芎川楝肉煨等分右為細末獖豬膽汁和丸麻子大空心食前米飲下三丸日進三服即愈更量嵗數加減與之蟲上旬頭向上五服若中下旬則弗效經驗方云此得於上蔡朱丞相之孫子新所藏疳方最多未若此簡而效者淡豆豉丸治小兒面色痿黃不食腸脹如鼓或生青筋日漸羸瘦此是乳母未斷乳而又致孕其乳為交乳實者取而後補虛者補而後取淡豆䜴十粒巴豆一粒略去油右研勻如泥丸粟米大每服十丸薑湯下無時服取下魚凍汁病根除矣急與補脾脂連丸出仁齋直指方治五疳潮熱肚脹髮焦胡黃連半兩五靈脂一兩右為末獖豬膽汁丸麻子大每服十五丸米飲下五疳潮熱謹勿用大黃桃柳方醫方妙選治小兒疳服諸藥後用此法助之桃枝二兩柳枝二兩右銼碎水兩大碗煎數沸通身浴兒畢用一青衣蓋疳蟲自出為驗吹鼻散出聖惠方治小兒一切疳右取棘針瓜蒂等分搗細羅為散每服用黍粒大吹鼻中日二度一方有棘刺花消疳麝香丸出鮑氏方治疳勞肌熱面黃髮穗骨立羸弱減食嗜卧蟲積驚癎並宜服之麝香研蘆薈研胡黃連為末各等分右為研細末滴水為丸如黃米大一嵗兒三丸五嵗兒五丸至七丸人參湯下日進三服竒效無比止後於本方中加後藥宣黃連青皮陳皮史君子肉木香檳榔各等分右以糕糊丸黍米大每服十丸米飲下食後卧各一服消疳化蟲長肌肉止疳痢療溫瘧尤勝凡癲癎驚風五疳三蟲服之立效蛔動作形神枯瘁久利不止調護最難用此如神疳藥雖多功效皆不及此香橘丸治小兒疳瘦泄㵼無時不思飲食史君子去皮一兩訶子肉麵裹煨麥蘖甘草厚朴薑汁製各半兩陳皮木香各二錢半右為末蜜丸櫻桃大米湯化下一丸丁香丸出聖惠方治小兒一切疳脹母丁香二七枚胡黃連半兩黃連半兩去鬚硃砂一分細研蕪荑一分豬膽五枚取汁牛黃一分蝦蟆一枚酒二升爛煮去骨淨入豬膽汁更熬成膏右為末入諸藥蝦蟆膏內和丸如粟米大空心粥飲下五丸日晚再服蝸牛丸出聖惠方治小兒一切疳蝸牛四十九枚蛇蛻二條乾蟾一枚截取前脾前用之上三味都燒為灰細研蘆薈一分研入夜明砂一分微研瓜蒂二七枚黃連一分去鬚麝香半分細研熊膽一分研入右為末都研令勻用豬膽汁和丸如菉豆大每服以溫水下三丸量兒大小加減服之保童丸出聖惠方治小兒一切疳體瘦皮乾毛髮焦黃心熱煩渴殺五疳宜服青黛一兩熊膽一分黑狗膽一枚麝香半分蘆薈一分鯉魚膽五枚蟾頭灰一分蝸牛一分炒令黃為末水銀一分同棗肉研炒以令星盡右以青黛等細研次下豬膽研令勻煉蜜和丸如黍米大每服以冷水下五丸量兒小大加減服之通頂散出聖惠方治小兒一切疳吹鼻黃連一分去鬚白礬灰一分細研赤小豆一百粒藜蘆一分去蘆頭丁香一分乾蝦蟇灰一分細研麝香一分細研熊膽一分細研胡黃連一分右為細末都研令勻每用少許吹鼻中當有蟲出保生丸出聖惠方治小兒五疳能充肌膚悅澤顔色宜常服此乾蝦蟆一枚於小罐子內以瓦子蓋勿令透氣燒灰蜣蜋微炒去翅足母丁香麝香研細夜明砂微炒甜葶藶隔紙炒令紫色葫蘆子胡黃連熊膽細研已上各半分右為末以軟粟飯和丸如菉豆大每服以粥飲下三丸量兒大小以意加減牛黃丸出聖惠方治小兒五疳百病無辜一切泄痢肌膚羸瘦牛黃一分細研代赭半兩細研赤石脂半兩研細牡蠣粉一分人參一分去蘆頭虎睛一對酒浸一宿微炙硃砂一分細研杏仁一分湯浸去皮并犬雙仁研如泥巴豆十枚去皮心研紙褁壓去油右件藥除杏仁巴豆外為末都研令勻煉蜜和丸如菉豆大每一嵗以冷水下一丸治大人小兒腹中諸疳濕用羊尿煮湯灌下治小兒腹中疳出本草右以蜘蛛燒熱噉之治小兒疳後虛熱尿莖見腫出經驗良方右煻火煤灰為末清油調塗尿莖上并治腹大又方出經驗良方以朴硝為末雞子清調塗尿莖上蒸雞丸一名雞肉煎丸方在全嬰治小兒疳勞骨蒸潮熱盜汗瘦弱腹急面黃飲食不生肌肉日哭夜啼多渴少餐黃連一兩柴胡一兩蕪荑鶴虱各半兩秦芁知母黃芩史君子炮去殼各一兩右為末黃雄雞一隻重一斤籠之專以大麻子飼之至五日後去毛令淨於臀後開孔去腸肚淨拭乾入前藥於雞腹內以線縫之取小甑先以黑豆鋪甑底厚三寸安雞在甑中四旁以黑豆圍褁上亦以黑豆蓋好自日出時蒸至晚候溫冷取雞淨肉研和得所如硬入酒麵糊同藥末為丸如小豆大二嵗十二丸以意加減米湯下無時服如十五嵗病者以溫酒送下忌豬肉一方麥門冬湯下空心臨卧服香黃丸出全嬰方治小兒疳黃腹大潮熱心躁臟腑不調食物不化飲食雖多不生肌肉黃連木香肉豆䓻青皮陳皮史君子蚵蚾酒浸一夜去骨炒蘆薈已上各一兩右為末糊丸小豆大三嵗用十丸米湯下人參散出活幼口議治小兒疳熱虛煩作渴不思飲食四體沉重人參蓬莪术川當歸龍膽草根去泥土炒令黃色甘草炙赤芍藥枳殼浸去穰切作小片麩炒令黃赤色白茯苓已上各等分右為末每服半錢煎麥門冬湯調服不拘時通神丸出仁齋直指方治小兒冷熱疳其泄㵼多膿血日加瘦弱胡黃連川黃連各三錢木香蕪荑炒各二錢丁香肉豆䓻史君子肉炒各一錢大乾蝦蟆一枚銼碎水煮爛研膏右為末膏和麻子大每服十丸米飲下集聖丸德生堂經驗方治諸疳通用蘆薈北五靈脂夜明砂焙縮砂橘皮青皮去白蓬莪术煨木香史君子略煨取肉二錢鷹爪黃連蝦蟇日乾炙焦各三錢右為末雄豬膽二枚取汁和藥糕糊丸麻子大每五十丸米飲下疳勞瘦弱本方加當歸一錢半川芎三錢治小兒疳右用茺蔚子益母草絞汁稍服疳啞不能發聲出仁齋直指方右以肥兒丸每服十五丸用蘇合香丸一粒入硃砂五靈脂末各少許菖蒲煎湯調開下靈砂丹出醫方妙選治因嗽成疳最宜服之人參半兩葶藶五靈脂胡黃連各一分辰砂半兩麝香蘆薈杏仁炒去皮尖研各一分右為細末粳米和丸如黍米大每服十粒煎人參湯下量兒大小加減豬肚丹出醫方妙選治小兒疳瘦盜汗多倦少力大便有蟲曽經大效川黃連胡黃連木香各一兩羌活蘆薈肉豆䓻鱉甲酥炙白蕪荑各半兩右為末獖豬肚一箇洗淨先以好香白芷二兩內肚蒸蒸熟去白芷不用却入諸藥縫合再蒸如泥取出同豬肚搗二三百下成膏圓如黍米每服十丸米飲下不拘時候量兒大小加減青金丸出聖惠方治小兒一切疳蝦蟆三枚塗酥炙黃焦夜明砂微炙鶴虱半兩去泥黃連去鬚麝香細研腽肭臍酒刷炙微黃砒霜以熱絹裹取豬肉脂一斤重裹炙熟去肉各一兩右為末研入麝香令勻煮棗肉和丸如梧桐大三嵗以下以粥飲研破一丸服三嵗以上相度加丸服之通頂散出聖惠方治小兒一切疳白礬灰一分赤小豆一百粒藜蘆一分去蘆頭丁香二十枚黃連一分去鬚田父一枚麝香一錢細研定粉一錢右為散入麝香同研令勻每使時候兒睡著以指甲抄內入鼻中有蟲出似馬尾長三二寸便去病也延命牛黃丸出聖惠方治小兒五疳羸瘦牛黃硃砂雄黃麝香龍腦已上各一錢瓜蒂三十枚為末丁香一分末蟾酥半分右細研用溫水浸蟾酥和丸如黍米粒大每服先以溫水化二丸滴兩鼻中令嚏五七聲再溫水下三丸日三服肥兒丸出全嬰方治小兒疳病者多因乳食太早至此或因久患臟腑胃虛蟲動日漸羸瘦腹大不能行好食泥土髮豎發熱面無精光此藥殺蟲黃連神麯炒各一兩史君子炮去殼麥蘖炒各半兩肉豆䓻炮檳榔三錢木香炮三錢右為末糊丸小豆大三嵗兒十丸米湯送下無時日進三服大小以意加減忌生硬冷物一方豬膽汁為丸鱉甲散出楊氏家藏治疳勞骨蒸鱉甲九肋湯浸洗用童子小便塗炙黃連黃耆蜜炙白芍各一兩生熟地黃地骨皮當歸洗去蘆人參去蘆各半兩右為末每服二錢水半盞煎至三分去滓不拘時服宫氣方出政和本草治小兒一切疳疼日漸羸瘦取舊死蝸牛殼七枚皮薄色黃白者水淨洗不得少有塵滓晒乾內酥於殼中以瓷盞盛之紙糊盞面飯上蒸下饙時坐甑中裝飯再蒸即已取出細研如水淀漸與喫令一日盡為佳一方用蜜同蒸名蝸牛煎蘆薈丸出聖濟總録治小兒氣疳蘆薈研鈎藤别搗末各一兩雄黃青黛各半兩研蟾酥研熊膽研麝香研末各一錢右同研勻入豬膽為丸如菉豆大每服日空心臨卧荆芥湯下三丸至五丸二嵗以下兩丸肥肌丸出仁存方治小兒疳瘦羸手足枯細腹筋青食不生肌苦參一兩龍膽草一錢右為末以糊丸如麻子每服二三十丸米飲下與後藥相間服川楝子去核川芎各一兩右為末以糊丸如麻子大每服三十丸米飲下鱉血丸出危氏方治疳癆人參半兩川芎蕪荑北柴胡各一兩史君子二十一枚胡黃連川黃連各半兩右用鱉血一盞吳茱茰一兩拌和二連淹一宿次早炒乾透去茱茰并血只用二連夾餘藥杵末粟米粉糊丸如麻子大每服二十丸食前熱水下木香丸出錢氏小兒方治小兒冷疳多渴好睡冷地煩躁啼呌飲食不進漸瘦其候難明上件證候有若熱證但大便滑泄百藥不效者是也木香青黛别研檳榔白豆䓻去皮各二錢半續隨子去皮炙一兩淨麝香少許小蝦蟆三隻須用街市間繩繫連皮盆中所賣自死者燒灰存性右為末煉蜜丸麻子大薄荷湯下一嵗十丸加至三十丸香蟾丸出醫方妙選治肌瘦面黃胸髙腳細乾蟾五枚水浸去骨用瓶一箇頂頭上有蓋入蟾瓶內鹽泥固濟炭火燒留竅子煙息為度取出置地一宿出火毒胡黃連二兩蛇蛻一兩燒灰地龍半兩炒天竺黃一分蟬殼一分已上並研為細末硃砂半兩研麝香一錢右一處研勻糯飯和丸黍米大每服十粒米飲下不拘時候量兒大小加減金靈散出全嬰方治小兒久患疳疾體虛不食及諸病候天柱骨倒醫者不識謂之五軟白殭蠶直者炒右為末三嵗半錢薄荷酒調下用生筋散貼之方在本類後椿白皮丸出本草治小兒疳右以椿白皮日乾二為末淘粟米去泔研濃汁糊和丸如梧子大十嵗三四丸量數加減一丸內竹筒中吹入鼻中度差服丸以飲下香甲湯出醫方妙選治截疳辟邪漏蘆一兩沉香牛蒡子微炒訶子肉微炮安息香鱉甲塗酥炙黃乳香各半兩右為末同乳香拌勻每服一錢水八分人參少許煎四分去滓放溫服量大小加減青金丹一名全命保生丹治小兒一切疳神祕百發百中極驗方雌蟾三枚仍以端午日午時取之繩子繫雙腳稍寬得所勿損傷以胡黃連一寸許當以線繫一半令入蟾口中須繫定令倒懸之以生銅器盛取蟾涎至黃昏却解放勿令傷損取其涎蟾肚下有班點者是雄不堪用白淨者是雌蟾也青黛蘆薈人糞蟬殼豬牙皂莢雄黃上各一分右用瓷瓶一箇內藥瓶中密蓋黃泥固濟以炭火燒之通赤去火待冷打破瓶取藥研為末用蟾涎并麝香一分和研令勻圓如菉豆大生銅合子盛之如有小兒患一切疳先令暖漿水浴以軟帛子拭乾後便以溫水下五圓量兒大小加減服之若藥乾便以乳汁浸化破與食須臾似醉勿怪此是藥力蟾涎較少和藥較硬即便添入乳汁相和研為妙田父丸出聖惠方治小兒一切疳田父一枚塗酥炙蛇蛻一條母丁香二七枚夜明砂一分微炒乾漆半兩搗碎炙令煙出硃砂半兩麝香一分俱細研右為末先取半兩用醋一鍾熬成膏後入餘藥和丸黍米大每服以粥飲下三丸量兒大小以意加減青黛散出聖惠方治小兒一切疳吹鼻問命散如嚏多疾輕易療如不嚏者必死矣青黛半兩研細細辛半兩瓜蒂一分麝香一分細研乾地龍一分微炒蘆薈一分細研黃連一分去鬚右為末散每用少許吹在鼻中得嚏則吉蘆薈丸出和劑方治疳氣羸瘦面黃痿腹脅脹滿頭髮作穗揉鼻咬甲好喫泥土痢色無定寒熱往來目澀口臭舌齗爛黑常服長肌退黃殺蟲進乳食大皂角燒存性一兩青黛一分研蘆薈硃砂研飛麝香研各一錢乾蝦蟆燒存性為末一兩右研勻用湯浸蒸餅和丸如麻子大每服三嵗兒服三十丸不計時候溫米飲下更量大小加減蛇蛻皮丸出聖惠方治小兒五疳形體羸瘦蛇蛻皮一條燒灰麝香半分細研蚱蟬四枚微炒去翅足夜明砂一分微炒地龍一分微炒乾蟾一枚炙令黃焦青黛一兩細研右為末以糯米飯和丸菉豆大每服以粥飲下五丸日三服量兒小大減增服之胡黃連丸出聖惠方治小兒五疳面色黃瘦身體壯熱雖喫乳食不能消化眼澀痛胸膈痰涎愛食酸醎常多㵼痢胡黃連母丁香黃連去鬚微炒蘆薈細研熊膽已上各半兩蟾頭一枚塗酥炙焦黃麝香一分細研右為末用牛黃丸如菉豆大若小兒心臟疳煎蕪荑甘草湯下三丸食疳㵼血成赤白者以新水下三丸吐逆不止及水㵼生薑湯下三丸眼疳羊肝血和酒看多少微煎過下三丸量兒大小以意加減服之雄黃丸治小兒五疳羸瘦毛髮乾黃喫食不恆雄黃細研麝香細研蟾頭一枚酥炙令黃胡黃連蘆薈細研已上各二分硃砂半兩水飛過右為末都研令勻以豬膽汁和丸如菉豆大每一嵗一丸以新汲水下日三服麝香丸出錢氏方治疳氣羸瘦白蟲作胡黃連白蕪荑去皮各一兩半黃連木香各半兩辰砂一分别研細麝香一錢别研右為細末麵糊為丸如菉豆大米飲下五七丸至十丸五嵗已上者可十五丸二十丸無時麝香丸出全嬰方治小兒諸疳消瘦骨熱面黃愛喫泥土灰炭茶紙髮稀焦黃小便白濁口鼻生瘡腹急氣粗常服化蟲蚵蚾酒浸去骨炙黃胡黃連蘆薈各半兩史君子半兩炒木香二錢半麝香一字右為末豬膽為丸小豆大三嵗貌十丸米湯下豬肚丸出楊氏方治骨蒸疳勞人羸瘦神效木香半兩宣連生地黃青皮各一兩銀柴胡去蘆鱉甲九肋者童子小兩便炙如前法一右為末用豬肚一枚入藥於內麻線扎定口將肚煮熟取出細研豬肚為丸如麻子大米飲下不計時日三服大小以意加減肥兒丸出活人書治小兒一切疳氣肌瘦體弱神困力乏常服殺蟲㵼疳開胃進食黃連一分去鬚川棟子肉各半兩炒川芎半兩陳皮香附子各一分木香二錢右為末水煮細麵糊為丸麻子大每服三五十丸溫飲下之議曰驚疳積痢各分證候用藥今有小兒患疳虛困又作痢疾二候相加最為患重疳痢併行臟腑虛乏之極熱毒差重皆係積之久滯雖久積因虛受之其病難療然既知其虛乏又親見其證不得良方以何治之雖獲其方不審其候亦難療也必須脈與病同藥與證對醫工運巧扶而起之乃得安然胡黃連丸無以加也肥䏎良方亦名佐勝六神丸出全嬰方治小兒羸瘦臟腑怯弱泄利虛滑乳食減少引飲無度心腹脹滿丁香木香肉豆䓻去殼各半兩三味用麵裹同入慢火煨令麵熟為度取出放冷訶子煨去核史君子各半兩蘆薈細研入藥一兩右為末以棗肉和丸如麻子大每服三五丸溫米飲下食前服或爛飯丸如黍米大一嵗二十丸一方以豬脂鎔入雞子一箇碎和炒熟令兒食盡吞下上丸即令休息㵼疳如神湯氏一方不用棗肉為丸飯飲下入脾也五疳消食丸出和劑方治小兒五疳八痢腹臟蟲蝕療疳勞及走馬牙疳齒疼唇爛肚大青筋此藥大能進食悅顔色長肌膚麥蘖史君子去皮炒黃連去鬚微炒橘紅龍膽草蕪荑等分右為末粟米糊為丸如粟米大每服二三十丸空心米湯吞下不拘時候量兒嵗數加減蝦蟆丸出和劑方治小兒五疳八痢腹脹面黃肌膚瘦瘁時作寒熱不思乳食愛喫泥土揉鼻咬甲頭髮作穗不長肌肉多生瘡癬大便無時小便如泔嘔吐乳食痢色無定或喫交妳漸黃瘦變成疳疾並宜服之蝦蟆史君子炒皂角燒各二兩青黛研二兩半龍膽草四兩雄黃研細水飛二兩右為末入研藥令勻水糊為丸如粟米大每一嵗兒七粒二嵗十粒三嵗二十粒隨乳下飯飲亦得不計時候史君子丸治小兒五疳史君子一兩黃連二兩丁香半兩訶子二兩煨去皮木香一兩肉豆䓻一兩右為末用薄荷糊為丸小豆大每服二十丸米飲湯下普濟方卷三百七十九
