異香散加五靈脂末煎紫蘇湯調下少吞紫霜丸治疳脹肚皮𦂳史君子丸出醫方妙選治小児五疳下利能飲食不生飢肉或㧓頭揉目或頭焦筋青下痢頻乆而不痊轉羸痩並皆治之亦小児便白濁史君子三両炒丁香木香厚朴沒石子胡黄連肉豆䓻各一両蘆薈麝香各一両右為末粟飲為丸黍米大每服十二丸米湯送下一方煎陳皮湯乳前下楊氏家藏方無麝香名胡黄連丸千金丸出經驗良方治小兒五種疳氣面痿黄肌痩不食乳川芎川楝肉煨等分右為細末獖猪膽汁和丸麻子大空心食前米飲下三丸日進三服即愈更量嵗数加减與之䖝上旬頭向上五服若中下旬則弗効經驗方云此得於上蔡朱丞相之孫子新所藏疳方最多未若此簡而效者淡豆豉丸治小兒面色痿黄不食腸脹如鼓或生青筋日漸羸痩此是乳母未斷乳而又致孕其乳為交乳實者取而後補虚者補而後取淡豆䜴十粒巴豆一粒畧去油右研勻如泥丸粟米大每服十丸薑湯下無時服取下魚凍汁病根除矣急與補脾脂連丸出仁齋直指方治五疳潮熱肚脹髪焦胡黄連半両五靈脂一両右為末獖猪膽汁丸麻子大每服十五丸米飲下五疳潮熱謹勿用大黄桃柳方醫方妙選治小児疳服諸藥後用此法助之桃枝二両柳枝二両右剉碎水両大碗煎数沸通身浴児畢用一青衣盖疳蟲自出為驗吹鼻散出聖惠方治小児一切疳右取棘針𤓰蒂等分搗細羅為散每服用黍粒大吹鼻中日二度一方有棘刺花消疳麝香丸出鮑氏方治疳勞肌熱面黄髪穗骨立羸弱减食嗜卧蟲積驚癎並宜服之麝香研蘆薈研胡黄連為末各等分右為研細末滴水為丸如黄米大一嵗児三丸五嵗児五丸至七丸人参湯下日進三服竒効無比止後於本方中加後藥宣黄連青皮陳皮史君子肉木香㯽榔各等分右以糕糊丸黍米大每服十丸米飲下食後卧各一服消疳化蟲長肌肉止疳痢療温瘧尤勝凡癲癎驚風五疳三蟲服之立效蚘動作形神枯瘁乆利不止調護最難用此如神疳藥雖多功效皆不及此香橘丸治小児疳痩泄㵼無時不思飲食史君子去皮一両訶子肉麵裹煨麥蘖甘草厚朴姜汁製各半両陳皮木香各二錢半右為末蜜丸櫻桃大米湯化下一丸丁香丸出聖惠方治小兒一切疳脹母丁香二七枚胡黄連半両黄連半両去鬚硃砂一分細研蕪荑一分猪膽五枚取汁牛黄一分蝦䗫一枚酒二升爛煮去骨凈入猪膽汁更熬成膏右為末入諸藥蝦蟆膏内和丸如粟米大空心粥飲下五丸日晩再服蝸牛丸出聖惠方治小児一切疳蝸牛四十九枚蛇蛻二條乾蟾一枚截取前脾前用之上三味都燒為灰細研蘆薈一分研入夜明砂一分㣲研𤓰蔕二七枚黄連一分去鬚麝香半分細研熊膽一分研入右為末都研令勻用猪膽汁和丸如菉豆大每服以溫水下三丸量児大小加减服之保童丸出聖惠方治小児一切疳體痩皮乾毛髪焦黄心熱煩渴殺五疳宜服青黛一兩熊膽一分黒狗膽一枚麝香半分蘆薈一分鯉魚膽五枚蟾頭灰一分蝸牛一分炒令黄為末水銀一分同棗肉研炒以令星盡右以青黛等細研次下猪膽研令勻煉蜜和丸如黍米大每服以冷水下五丸量児小大加减服之通頂散出聖惠方治小児一切疳吹鼻黄連一分去鬚白礬灰一分細研赤小豆一百粒藜蘆一分去蘆頭丁香一分乾蝦蟇灰一分細研麝香一分細研熊膽一分細研胡黄連一分右為細末都研令勻每用少許吹鼻中當有䖝出保生丸出聖惠方治小児五疳能充肌膚悅澤顔色宜常服此乾蝦蟆一枚於小礶子内以瓦子盖勿令透氣焼灰蜣蜋㣲炒去翅足母丁香麝香研細夜明砂㣲炒甜葶藶隔紙炒令紫色葫蘆子胡黄連熊膽細研已上各半分右為末以軟粟飯和丸如菉豆大每服以粥飲下三丸量児大小以意加减牛黄丸出聖惠方治小児五疳百病無辜一切泄痢肌膚羸痩牛黄一分細研代赭半両細研赤石脂半両研細牡蠣粉一分人參一分去蘆頭虎睛一對酒浸一宿㣲炙硃砂一分細研杏仁一分湯浸去皮并犬雙仁研如泥巴豆十枚去皮心研紙褁壓去油右件藥除杏仁巴豆外為末都研令勻煉蜜和丸如菉豆大每一嵗以冷水下一丸治大人小児腹中諸疳濕用羊尿煮湯灌下治小児腹中疳出本草右以蜘蛛燒熱噉之治小児疳後虛熱尿莖見腫出經驗良方右煻火煤灰為末清油調塗尿莖上并治腹大又方出經驗良方以朴硝為末鷄子清調塗尿莖上蒸鷄丸一名鷄肉煎丸方在全嬰治小児疳勞骨蒸潮熱盗汗痩弱腹急面黄飲食不生肌肉日哭夜啼多渴少飡黄連一両柴胡一両蕪荑鶴虱各半両秦芁知母黄芩史君子炮去殻各一両右為末黄雄鷄一隻重一斤籠之專以大麻子飼之至五日後去毛令凈於臀後開孔去腸肚凈拭乾入前藥於鷄腹内以線縫之取小甑先以黒豆鋪甑底厚三寸安鷄在甑中四旁以黒豆圍褁上亦以黒豆盖好自日出時蒸至晩候温冷取鷄凈肉研和得所如硬入酒麵糊同藥末為丸如小豆大二嵗十二丸以意加减米湯下無時服如十五嵗病者以温酒送下忌猪肉一方麥門冬湯下空心臨卧服香黄丸出全嬰方治小兒疳黄腹大潮熱心躁臟腑不調食物不化飲食雖多不生肌肉黄連木香肉豆䓻青皮陳皮史君子蚵蚾酒浸一夜去骨炒蘆薈已上各一両右為末糊丸小豆大三嵗用十丸米湯下人参散出活幼口議治小児疳熱虛煩作渴不思飲食四體沉重人参蓬莪术川當歸龍膽草根去泥土炒令黄色甘草炙赤芍藥枳殻浸去穰切作小片麩炒令黄赤色白茯苓已上各等分右為末每服半錢煎麥門冬湯調服不拘時通神丸出仁齋直指方治小児冷熱疳其泄㵼多膿血日加痩弱胡黄連川黄連各三錢木香蕪荑炒各二錢丁香肉豆䓻史君子肉炒各一錢大乾蝦䗫一枚剉碎水煮爛研膏右為末膏和麻子大每服十丸米飲下集聖丸徳生堂經騐方治諸疳通用蘆薈北五靈脂夜明砂焙縮砂橘皮青皮去白蓬莪术煨木香史君子畧煨取肉二錢鷹爪黄連蝦蟇日乾炙焦各三錢右為末雄猪膽二枚取汁和藥糕糊丸麻子大每五十丸米飲下疳勞痩弱本方加當歸一錢半川芎三錢治小児疳右用茺蔚子益母草絞汁稍服疳啞不能𤼵聲出仁齋直指方右以肥兒丸毎服十五丸用蘇合香丸一粒入硃砂五靈脂末各少許菖蒲煎湯調開下靈砂丹出醫方妙選治因嗽成疳最宜服之人參半両葶藶五靈脂胡黄連各一分辰砂半両麝香蘆薈杏仁炒去皮尖研各一分右為細末粳米和丸如黍米大每服十粒煎人參湯下量兒大小加减猪肚丹出醫方妙選治小兒疳痩盗汗多倦少力大便有䖝曽經大效川黄連胡黄連木香各一両羌活蘆薈肉豆䓻鱉甲酥炙白蕪荑各半両右為末獖猪肚一箇洗凈先以好香白芷二両内肚蒸蒸熟去白芷不用却入諸藥縫合再蒸如泥取出同猪肚搗二三百下成膏圓如黍米每服十丸米飲下不拘時候量兒大小加减青金丸出聖惠方治小兒一切疳蝦䗫三枚塗酥炙黄焦夜明砂㣲炙鶴虱半両去泥黄連去鬚麝香細研腽肭臍酒刷炙㣲黄砒霜以熱絹裹取猪肉脂一斤重裹炙熟去肉各一兩右為末研入麝香令勻煮棗肉和丸如梧桐大三嵗以下以粥飲研破一丸服三嵗以上相度加丸服之通頂散出聖惠方治小兒一切疳白礬灰一分赤小豆一百粒藜蘆一分去蘆頭丁香二十枚黄連一分去鬚田父一枚麝香一錢細研定粉一錢右為散入麝香同研令勻每使時候兒睡着以指甲抄内入鼻中有䖝出似馬尾長三二寸便去病也延命牛黄丸出聖惠方治小兒五疳羸痩牛黄硃砂雄黄麝香龍腦已上各一錢𤓰蔕三十枚為末丁香一分末蟾酥半分右細研用温水浸蟾酥和丸如黍米粒大每服先以温水化二丸滴両鼻中令嚏五七聲再温水下三丸日三服肥兒丸出全嬰方治小兒疳病者多因乳食太早至此或因乆患臟腑胃虛蟲動日漸羸痩腹大不能行好食泥土髪䜿發熱面無精光此藥殺蟲黄連神麯炒各一両史君子炮去殻麥蘖炒各半両肉豆䓻炮㯽榔三錢木香炮三錢右為末糊丸小豆大三嵗兒十丸米湯送下無時日進三服大小以意加减忌生硬冷物一方猪膽汁為丸鱉甲散出楊氏家藏治疳勞骨蒸鱉甲九肋湯浸洗用童子小便塗炙黄連黄耆蜜炙白芍各一両生熟地黄地骨皮當歸洗去蘆人參去蘆各半両右為末每服二錢水半盞煎至三分去滓不拘時服宫氣方出政和本草治小兒一切疳疼日漸羸痩取舊死蝸牛殻七枚皮薄色黄白者水凈洗不得少有塵滓晒乾内酥於殻中以瓷盞盛之紙糊盞面飯上蒸下饙時坐甑中裝飯再蒸即已取出細研如水淀漸與喫令一日盡為佳一方用蜜同蒸名蝸牛煎蘆薈丸出聖濟総錄治小兒氣疳蘆薈研鈎籐别搗末各一両雄黄青黛各半両研蟾酥研熊膽研麝香研末各一錢右同研勻入猪膽為丸如菉豆大每服日空心臨卧荆芥湯下三丸至五丸二嵗以下兩丸肥肌丸出仁存方治小兒疳痩羸手足枯細腹筋青食不生肌苦參一両龍膽草一錢右為末以糊丸如麻子每服二三十丸米飲下與後藥相間服川楝子去核川芎各一両右為末以糊丸如麻子大每服三十丸米飲下鼈血丸出危氏方治疳癆人參半両川芎蕪荑北柴胡各一両史君子二十一枚胡黄連川黄連各半兩右用鼈血一盞吳茱茰一両拌和二連淹一宿次早炒乾透去茱茰并血只用二連夾餘藥杵末粟米粉糊丸如麻子大每服二十丸食前熱水下木香丸出錢氏小兒方治小兒冷疳多渴好睡冷地煩躁啼呌飲食不進漸痩其候難明上件證候有若熱證但大便滑泄百藥不效者是也木香青黛别研㯽榔白豆䓻去皮各二錢半續隨子去皮炙一両净麝香少許小蝦䗫三隻須用街市間䋲繫連皮盆中所賣自死者焼灰存性右為末煉蜜丸麻子大薄荷湯下一嵗十丸加至三十丸香蟾丸出醫方妙選治肌痩面黄胸髙脚細乾蟾五枚水浸去骨用缾一箇頂頭上有葢入蟾缾内鹽泥固濟炭火焼留竅子煙息為度取出置地一宿出火毒胡黄連二両蛇蛻一両焼灰地龍半両炒天竺黄一分蟬殻一分已上並研為細末硃砂半両研麝香一錢右一處研勻糯飯和丸黍米大每服十粒米飲下不拘時候量兒大小加减金靈散出全嬰方治小兒乆患疳疾體虛不食及諸病候天柱骨倒醫者不識謂之五軟白殭蠶直者炒右為末三嵗半錢薄荷酒調下用生筋散貼之方在本類後椿白皮丸出本草治小兒疳右以椿白皮日乾二為末淘粟米去泔研濃汁糊和丸如梧子大十嵗三四丸量数加减一丸内竹筒中吹入鼻中度差服丸以飲下香甲湯出醫方妙選治截疳辟邪漏蘆一両沉香牛蒡子㣲炒訶子肉㣲炮安息香鼈甲塗酥炙黄乳香各半兩右為末同乳香拌勻每服一錢水八分人參少許煎四分去滓放温服量大小加减青金丹一名全命保生丹治小兒一切疳神祕百𤼵百中極驗方雌蟾三枚仍以端午日午時取之䋲子繫雙脚稍寛得所勿損傷以胡黄連一寸許當以線繫一半令入蟾口中湏繫定令倒懸之以生銅噐盛取蟾涎至黄昏却觧放勿令傷損取其涎蟾肚下有班㸃者是雄不堪用白净者是雌蟾也青黛蘆薈人糞蟬殻猪牙皂莢雄黄上各一分右用瓷瓶一箇内藥瓶中宻盖黄泥固濟以炭火焼之通赤去火待冷打破瓶取藥研為末用蟾涎并麝香一分和研令勻圓如菉豆大生銅合子盛之如有小兒患一切疳先令暖漿水浴以軟帛子拭乾後便以温水下五圓量兒大小加减服之若藥乾便以乳汁浸化破與食須臾似醉勿怪此是藥力蟾涎較少和藥較硬即便添入乳汁相和研為妙田父丸出聖惠方治小兒一切疳田父一枚塗酥炙蛇蛻一條母丁香二七枚夜明砂一分㣲炒乾漆半両搗碎炙令烟出硃砂半両麝香一分俱細研右為末先取半両用醋一鍾熬成膏後入餘藥和丸黍米大每服以粥飲下三丸量兒大小以意加减青黛散出聖惠方治小兒一切疳吹鼻問命散如嚏多疾輕易療如不嚏者必死矣青黛半両研細細辛半両𤓰蔕一分麝香一分細研乾地龍一分㣲炒蘆薈一分細研黄連一分去鬚右為末散每用少許吹在鼻中得嚏則吉蘆薈丸出和劑方治疳氣羸痩面黄痿腹脇脹滿頭髪作穗揉鼻咬甲好喫泥土痢色無定寒熱往来目澀口臭舌齗爛黒常服長肌退黄殺蟲進乳食大皂角燒存性一両青黛一分研蘆薈硃砂研飛麝香研各一錢乾蝦䗫焼存性為末一両右研勻用湯浸蒸餅和丸如麻子大每服三嵗兒服三十丸不計時候温米飲下更量大小加减蛇蛻皮丸出聖惠方治小兒五疳形體羸痩蛇蛻皮一條焼灰麝香半分細研蚱蟬四枚㣲炒去翅足夜明砂一分㣲炒地龍一分㣲炒乾蟾一枚炙令黄焦青黛一両細研右為末以糯米飯和丸菉豆大每服以粥飲下五丸日三服量兒小大减増服之胡黄連丸出聖惠方治小兒五疳面色黄痩身體壯熱雖喫乳食不能消化眼澀痛胸膈痰涎愛食酸醎常多㵼痢胡黄連母丁香黄連去鬚㣲炒蘆薈細研熊膽已上各半两蟾頭一枚塗酥炙焦黄麝香一分細研右為末用牛黄丸如菉豆大若小兒心臟疳煎蕪荑甘草湯下三丸食疳㵼血成赤白者以新水下三丸吐逆不止及水㵼生薑湯下三丸眼疳羊肝血和酒㸔多少㣲煎過下三丸量兒大小以意加减服之雄黄丸治小兒五疳羸痩毛髪乾黄喫食不恒雄黄細研麝香細研蟾頭一枚酥炙令黄胡黄連蘆薈細研已上各二分硃砂半両水飛過右為末都研令勻以猪膽汁和丸如菉豆大每一嵗一丸以新汲水下日三服麝香丸出錢氏方治疳氣羸痩白蟲作胡黄連白蕪荑去皮各一両半黄連木香各半両辰砂一分别研細麝香一錢别研右為細末麵糊為丸如菉豆大米飲下五七丸至十丸五嵗已上者可十五丸二十丸無時麝香丸出全嬰方治小兒諸疳消痩骨熱面黄愛喫泥土灰炭茶紙髪稀焦黄小便白濁口鼻生瘡腹急氣粗常服化蟲蚵蚾酒浸去骨炙黄胡黄連蘆薈各半両史君子半両炒木香二錢半麝香一字右為末猪膽為丸小豆大三嵗皃十丸米湯下猪肚丸出楊氏方治骨蒸疳勞人羸痩神效木香半両宣連生地黄青皮各一两銀柴胡去蘆鼈甲九肋者童子小両便炙如前法一右為末用猪肚一枚入藥於内麻線扎定口将肚煮熟取出細研猪肚為丸如麻子大米飲下不計時日三服大小以意加减肥兒丸出活人書治小兒一切疳氣肌痩體弱神困力乏常服殺蟲㵼疳開胃進食黄連一分去鬚川棟子肉各半両炒川芎半両陳皮香附子各一分木香二錢右為末水煮細麵糊為丸麻子大每服三五十丸温飲下之議曰驚疳積痢各分證候用藥今有小兒患疳虛困又作痢疾二候相加最為患重疳痢併行臟腑虚乏之極熱毒差重皆係積之乆滯雖乆積因虚受之其病難療然既知其虚乏又親見其證不得良方以何治之雖獲其方不審其候亦難療也必須脉與病同藥與證對醫工運巧扶而起之乃得安然胡黄連丸無以加也肥䏎良方亦名佐勝六神丸出全嬰方治小兒羸痩臟腑怯弱泄利虛滑乳食减少引飲無度心腹脹滿丁香木香肉豆䓻去殻各半両三味用麫裹同入慢火煨令麫熟為度取出放冷訶子煨去核史君子各半両蘆薈細研入藥一両右為末以棗肉和丸如麻子大每服三五丸温米飲下食前服或爛飯丸如黍米大一嵗二十丸一方以猪脂鎔入雞子一箇碎和炒熟令兒食盡吞下上丸即令休息㵼疳如神湯氏一方不用棗肉為丸飯飲下入脾也五疳消食丸出和劑方治小兒五疳八痢腹臟蟲蝕療疳勞及走馬牙疳齒疼唇爛肚大青筋此藥大能進食悅顔色長肌膚麥蘖史君子去皮炒黄連去鬚㣲炒橘紅龍膽草蕪荑等分右為末粟米糊為丸如粟米大每服二三十丸空心米湯吞下不拘時候量兒嵗數加减蝦䗫丸出和劑方治小兒五疳八痢腹脹面黄肌膚痩瘁時作寒熱不思乳食愛喫泥土揉鼻咬甲頭髪作穗不長肌肉多生瘡癬大便無時小便如泔嘔吐乳食痢色無定或喫交妳漸黄痩變成疳疾並宜服之蝦䗫史君子炒皂角焼各二両青黛研二両半龍膽草四両雄黄研細水飛二両右為末入研藥令勻水糊為丸如粟米大每一嵗兒七粒二嵗十粒三嵗二十粒隨乳下飯飲亦得不計時候史君子丸治小児五疳史君子一両黄連二両丁香半両訶子二両煨去皮木香一両肉豆䓻一両右為末用薄荷糊為丸小豆大每服二十丸米飲湯下普濟方卷三百七十九
