body:
  text: 普濟方卷三百七十九明周王朱橚撰嬰孩諸疳門總論凡兒童二十嵗以下其病為疳二十嵗以上其病為勞疳與勞皆氣血憊心腸胃受傷致之同實而異名也疳之為侯頭皮光急毛髪焦稀鼻乾口嚵唇白両眼昏爛揉鼻撏眉脊聲體黄闘牙咬舌焦渴自汗尿白㵼酸肚脹腸鳴癖結潮熱酷嗜𤓰果鹹炭生米泥土而飲水吐飯者其候也心疳即驚疳由乳食不調心臟受熱所致也盖其血氣未定乳哺有傷易生壅滯内有滯熱未得䟽通故心神驚欎而作驚疳之候外證身體壯熱臉赤唇紅口舌生瘡胸膈煩悶小便赤澁五心皆熱盗汗𤼵渴齧齒虚驚是謂心疳肝疳即風疳由乳食不調肝臓受熱所致也若乳母寒暄不調滋味不節或外感風寒内傷喜怒邪氣未徹遽爾乳兒多成風疳風入眼腫翳生眵涕是謂疳眼外證揺頭揉目白膜遮睛眼青淚多頭焦髪立筋青腦熱甲痒筋攣躁渴汗多下痢瘡癬是謂肝疳腎疳即急疳由乳食不調臟腑伏熱所致也凡甘味入於脾而動蟲蟲動則掃蝕臟腑遂使孩提心下擾悶若上蝕齒齗則口瘡出血齒色紫黒下蝕腸胃則下利肛爛濕痒生瘡療治不蚤肌體消耗難以有瘳蟲者􅉶也目為濕䘌多因疳傷乆痢腸胃受濕得之狀如孤感傷寒齒蝕之證或以走馬命名盖齒屬腎主筋纔受熱邪疳氣直奔上焦故以走蝕為喻初作口氣名曰臭口次第齒黒名曰崩砂盛則齗爛名曰潰槽熱血迸出名曰宣露甚者齒皆脱落名曰腐根其根既腐縱得全活齒不復生外證腦熱肌削手足如氷寒熱時來滑泄肚痛口臭乾渴齒齗生瘡爪黒靣黧身多瘡疥是謂腎疳肺疳即氣疳由乳食不調壅熱傷肺所致也肺主乎氣鼻乃肺氣所通其氣不和則風濕乗虛客於皮毛入於血脉故鼻下两傍赤痒瘡濕是為鼻疳瘡鼻不通汁所流處即成瘡亦名疳䘌外證欬嗽喘逆壯熱惡寒皮膚粟生鼻痒流涕咽喉不利頥爛唾紅氣脹毛焦泄利頻併是謂肺疳脾疳即肥疳由乳食不節脾胃受傷所致也或乳母恣食生冷肥膩或乳児過飽或飯後與乳致使吐乳多脹乆則變為乳癖腹脇結塊亦名妳疳外證面黄身瘦肚大脚細吐逆中滿乏力哭啼水榖不消泄下酸臭合面困睡减食喫泥是謂脾疳析而論之曰五疳出蟲曰蜖疳曰脊疳曰腦疳曰乾疳曰疳渇曰疳㵼曰疳腫脹曰疳勞曰無辜疳曰丁奚曰哺露證狀非一五疳出蟲者疳傷之源雖起於乳餔不調然臟腑停積已乆莫不化而為蟲或如絲髪或如馬尾多有此積者皆於頭項腹背之間黄白或赤者可醫青黒則難療也蛔疳者失乳飯食肉太早或膓胃停蓄甜膩化為蜖蟲皺眉多啼嘔吐清沫腹中乍痛肚脹青筋唇口紫黒痬頭齒痒是也蛔雖食蟲不可動從口鼻出者難治脊疳者蟲蝕脊膂身弱羸黄積中生熱煩温下痢拍背如鼓鳴脊骨如鋸齒或十指皆瘡頻嚙爪甲是也腦疳者胎中素挾風熱生下乳餔越常頭皮光急滿頭迸瘡腦如火髪結如穗徧身多汗顋腫顖髙是也乾疳者聲焦皮燥大便乾結其病在肺搭伏癡眠腦脘乾渴其病在脾総為乾疳是也疳渴者臟中夙有疳氣加乳母恣食五辛酒麵炙􅏼使小児心腹壅熱日則煩渇引飲乳食不進夜則渇止是也疳㵼者毛枯唇白額上青紋肚脹腹鳴㵼下糟粕是也勿用熱藥止之疳痢者挾受風寒暑濕冷熱不調或停積宿滯水榖不聚頻下惡物是也疳腫脹者虚中有積其毒與湿交并故令腹肚𦂳脹由是脾復受濕故令頭面脚手虛浮是也法當磨積調氣疳勞者潮熱往来五心煩熱手足心及腦前熱而𤼵瘡盗汗骨蒸𠻳喘枯悴是也或渴而復㵼飲水惡食肚硬如石面色如銀斷不可活無辜疳者腦後項邊有核如彈子按之轉動軟而不疼其間有蟲如米粉不速破之則蟲隨熱氣流散滛蝕臟腑以致肢體癰瘡便利膿血壯熱羸瘦頭露骨高是也針刺破膏藥貼上或濯兒衣露於簷下為鴻鳥落羽所汚兒着此衣蟲入皮毛亦致無辜之疾兒衣已曬湏㣲火烘之其若手足極細小骨髙尻削體痿腹大臍突號哭腦䧟或生瘕癥是為丁奚虚熱来往頭骨分開翻食吐蟲煩渴嘔噦是為哺露皆因脾胃乆虚不能化水榖以榮血氣故肌肉消鑠腎氣不足復為風冷所傷使柴骨枯露亦有胎中受毒臟腑少血致之皆無辜種之疾病而至此不幾殆哉又有小兒乆患腎疳内虚不食甚者天柱倒治法當用錢氏地黄丸加驅疳等劑仍與貼項强筋不識證謂之五軟非也天柱骨倒凡有三種有吐㵼日乆羸弱成者有肝膽伏熱面赤唇紅忽變此者有傷寒不及𤼵表或者更被風邪入肝以致筋絡放弛吐㵼者當調胃氣肝熱者隨輕重以凉肝並與强筋貼項惟傷寒天柱骨倒者難療聖惠方云凢小児疳在諸腹脹痢色無常或如内脹日漸羸瘦此可療若鼻下赤爛自揉其鼻頭上有瘡嗔痴痛痒其漸可治泔淀流引逹於兩耳時時目赤頭髪稀踈腦皮光𦂳頭大項小肌體羸瘦亦可治也若唇口被蝕齒齗作五色或盡峭黒舌下有白瘡上齶有竅子下痢時有臭氣齒齗漸軟欲爛不可治也若下部開張有時亦爛痒不可忍脊骨如鋸無完不可治也若疳蝕脊膂十指背痒自咬指甲髪竪作穗有時腹脹有時下痢若急治之無不瘥也凢小児肝臓疳若睛帶青脉左脇下硬多吐涎沫眼角左右有黒氣聚腫不可治也心與脾疳若受驚啼好飲水更食辛味臉有脉舌上有靨者不可治皮枯臓乾若肚大唇無血色人中平䧟下痢無度水榖不消好吃泥土骨露不可治也凡小兒疳大約有冷熱二種熱疳之病常見於外五心煩熱掀衣氣麄飲冷水煩躁卧地肚熱脚冷潮熱往来皆熱疳也冷疳病多在内痢色無常其吻青白肢體軟弱目腫面黧又一證燥渴卧地似有熱狀而飲食不進滑㵼無已亦冷疳也其有㵼多膿血日加痩弱此則謂之冷積大抵疳之受氣皆虚使然熱者虚中之熱冷者虚中之冷治熱不可妄表過凉治冷不可峻温驟補故錢氏又曰小児易為虚實脾胃虚不受寒温服寒則生冷服温則生熱當識此而勿誤上醫處此消積和胃滋血調氣隨順藥餌以扶之淡薄飲食以飬之榮衛調和臟腑自然充實取積之法又當權衡積者疳之母由積而虛謂之疳極諸有積者無不肚熱脚冷湏酌量虚實而取之若積虚而甚則先與扶胃使胃氣内充然後為之㣲利若積勝於虚則先與利道設得一泄急以和胃之劑為之扶虚然取積宜疎利如白豆䓻蘿蔔子縮砂蓬术消疾等般亦不可無脇間癖痛亦虚中之積聚也先寒後熱飲水不食或飲水以致喘𠻳錢氏有癖為潮熱之治法觧散寒熱即與下癖合是而觀𤼵作不同療治不一又可無權度於此哉若夫諸疳惡證心疳飲水不已食則驚啼耳邊紋多舌上黯黒者不治肝疳右脇結硬頻数吐涎目睛青筋眼角黒氣者不治腎疳飲水好醎小便如乳耳焦肩聳牙黒骨枯者不治肺疳欬逆氣促頻㵼白沫身上粟生其色斑黒者不治脾疳喫泥泄痢水榖不消唇白腹髙人中滿者不治其或滑泄不休脱肛咳逆抱起昏沉手足垂軟足及脚心全不知覺項筋舒展身體變冷是則為五絶證候甚者胸䧟嘔噦乳食直㵼腫滿不痢腹脇脹疼皮𤼵紫瘡肌肉光紫與夫疳勞渴㵼面槁色痩骨露齒脹肚不食者皆危篤矣凡疳在内目腫腹脹利色無常或沫青白漸痩弱此冷證也疳在外鼻下赤爛自揉鼻頭上有瘡不痛痂漸破鼻瘡遶耳此熱證也宜蘭香散白粉散主之肝疳當補肝地黄丸主之心疳當補心定神丸主之脾疳當補脾益黄散主之腎疳當補腎地黄丸主之肺疳當補肺益黄散主之筋疳㵼血而瘦當補肝地黄丸主之疳喜卧冷地當補腎地黄散主之諸疳皆當補其母及與治疳藥冷則木香丸是脾臟虚也臟實而内𤼵虚即當補母而㵼本臟則愈假令日中𤼵潮熱是心虚熱也肝為心母則宜先補肝肝實而後㵼心心得母氣而内平而潮熱愈也醫見潮熱妄謂其實乃以大黄牙硝輩諸冷藥利之利既多矣不能禁約而津液内亡即成疳也又有病癖其疾發作寒熱飲水脇下有形硬痛治癖之法當漸消磨醫反以巴豆硇砂輩下之小児易虚易實下之既過胃中液津耗損漸令疳痩有病傷寒五六日間有下證以冷藥下之太過致脾胃液津少即使引飲不止而生熱也熱氣内耗肌肉外消他邪相干證變諸端因亦成疳病又有吐㵼乆病或醫妄下之其虚益甚液津燥損亦能成疳又有肥疳即脾疳也身痩黄虚而煩渇引飲小便赤澁更兼有瘡疥其候不一種種異端目澁或生白膜唇赤身黄乾或黒喜卧冷地或食泥土身有瘡疥㵼青白黄沫水痢色變易腹滿身耳鼻皆有瘡髪鬂作穗頭大項細極痩飲水皆其證也大抵疳病當辨冷熱肥痩其初病者為肥熱疳乆病者為痩冷疳冷者木香丸熱者黄連丸至冷熱之疳尤宜如聖丸故小児之臟腑柔弱不可痛擊大下必亡津液而成疳凡病可量大小虚實而下之則不至為疳也初病津液少者當生胃之津液白术散主之津多則愈積痛口中氣冷面黄白目無精光或白睛多及多睡少食或大便酸臭者當磨積宜消積丸甚者當用白餅子下之後和胃白术散主之小便初出㣲赤良乆白濁者乃是熱疳疳之新也初黄白乆白濁者乃是冷疳疳之乆也熱疳牛黄丸大黄丸冷疳益黄散六甲丸冷熱之疳蘆㑹丸香蟾丸小便白濁厚朴丸諸失津液成疳參术散大便如油硃砂丸子益黄散補更於後擇用馬氏女五嵗疳黄腹大消痩骨熱盗汗或時飲食全然不喫或時乳食不知飢飽但好食泥土炭灰紙有一醫用千金方猪肉一斤䋲繫曵地行数里乃燒炙與食無效一醫以疳藥服半年無効召愚視曰食已如飢胃熱也好食泥土者脾疳也脾胃有疳熱積主人曰何知也愚曰素問云食已如飢者胃疳是腸胃熱也則消榖故令已食如飢也又寳鑑云與乳食而不喫逢泥土而湏吞要訣云脾疳食土面萎黄盖胃有積熱脾有疳積所以不知飢飽好食泥土主人曰何治也荅曰去胃熱逐脾疳當以黄土丸㵼十餘次次日熱脾疳積等俱下後益黄散補蘆㑹丸香蟾丸治之七日平愈痛張氏女十嵗忽臍下疼痛臍下透起自言覺脬囊轉不可言有時面青吐清水小便如常一月一𤼵半月一𤼵十数日一𤼵進退不定似此一年累醫或作淋治者小便不澁或作脬冷者小便如常或作脬熱者小便不赤或作積疳痛止腹中或作䖝痛者只口雖飲水䖝痛不在臍下衆醫不曉召愚徃視之此證亦不曉諸書亦未曽詳載幾無法以治之移時思之憶得錢氏曽用白祥丸治瘡此必有㣲妙處深求其故遂師其意以藥投之不𢾗日而疾已瘥焉人問用藥亦甚無多而取效抑何其速也余曰夫兵不必衆而収功藥不必多而取效盖醫者能機變即可用也後别一女十四歳與前證同三月一發毎發時五六月方退累藥無効病起先從心腹中疼後至臍下余曰其病先心腹者有食積也後至臍下者膀胱病也調大㦸散送下紫丸子㵼十餘次即安又一小女三嵗與前証同累藥以木通滑石之類無効召愚視之用大㦸茴香等分㣲炒為末每服一錢䀋湯調下小児嬭疳者面色青黄或口内有瘡或哯乳多睡乆則成嬭癖結塊腹中皆乳食不節故也又有小児疳積者其狀漸黄色拍背如鼓鳴脊骨如鋸乃積而生熱成疳也宜服蘆薈丸又宜服猪肚丸又宜服露星膏又小児冷疳多渴好卧冷地煩燥啼呌飲食不進漸成羸痩其候難名上件證候有若熱證但大便滑泄有藥不効者是也唯錢氏論此冷疳候宜服木香丸余用之經驗乆矣初因女子以此病方三嵗百藥俱試而無偶中者因閲錢氏方遂合取木香丸数服而愈自後凡有此證無不獲痊治小児一切疳附論夫小児疳者其狀多端雖輕重有殊形證各異而細窮根本主療皆因乳哺乖宜寒溫失節臟腑受病氣血不榮致成疳也其五疳及諸疳等今以一方同療之故謂一切疳也方青黛散出聖惠方治小児一切疳腹肚脹滿手脚枯細眼目口鼻生瘡身體壯熱痢下泔淀日漸羸痩面無光澤青黛細研雄黄細研硃砂細研水飛過石塩細研白礬燒令沬盡薫陸香研入已上各一两麝香細研蚺蛇膽研入細辛黄連去鬚青礬燒令通赤塩緑黄蘖剉苦參剉桂心杏仁湯浸麩炒㣲黄乾薑炮裂剉藜蘆去蘆頭已上各半分莨菪子水淘去浮者水煑令芽出焙乾炒令黒黄色附子炮裂去皮尖熊膽研入石膽細研已上各一分蝦蟇一枚塗酥炙㣲焦黄礬燒令通赤用半分右為散同研令勻如疳在内三嵗兒服以新井水一合調下半錢一嵗一字三嵗已上臨時加之若口内疳瘡以蒜一片研和少許散每夜塗之湏㬰自然流引涎出若鼻内瘡用蒜如皂莢子大研和少散内入鼻中麝香丸治小児一切疳黄連洗净青皮去白三􅏢炮莪术炮㯽榔鶴虱炒蕪荑川楝肉苦楝根史君子神麯麥芽厚朴姜製川芎胡黄連夜明砂蘆薈各五分蟾一枚炙右研麝香末拌勻蜜丸量大小米飲湯下五疳陳米飲下寒熱徃来薄荷湯下䖝動若楝湯下疳痢紫蘇木𤓰湯下退疳熱麥冬湯下冷痢丁香湯下不思飲食縮砂仁湯下腹脹木香陳皮湯下井黄煎出全嬰方治小児諸疳諸痢食傷氣脹頭大體羸頭髪作穗壯熱不食多困齒爛鼻瘡疳瘡潮熱腹急骨蒸消痩髪堅面黄蝦蟇一枚去皮骨膓胃炙焦搗末以無灰酒一盞獖猪膽一枚取汁熬成膏訶梨勒皮炮史君子去殻胡黄連蟬蛻無食子蘆薈研蕪荑熊膽夜明砂丹砂研雄黄木香一分肉荳䓻去殻春夏半分秋冬一分牛黄研一錢麝香研一錢右搗研十六味為末猪膽膏丸如麻子大每服五七丸米飲下驚疳金銀薄荷湯下疳瘡腹脹桃仁蘹香湯下疳蟲東引石榴苦楝根湯下此丸尤治疳痢若挾熱而痢者不可服一方有龍胆草無龍胆史君子煉蜜為丸無蕪荑天漿子七隻去殻青黛研烏蛇酒浸去骨炙熱麝香研各一分丹砂研葶藶子隔紙炒龍腦研雄黄研膩粉各半分白附子研獨角仙去翅足各一枚乾蠍五枚炒蟬蛻十隻去足蟾酥一分右為細末用生猪膽為丸如黄米大一服一粒早晨日晩各一服五疳丸聖惠方治小児五疳乳食不成肌膚心腹脹滿或時下痢壯熱昏沉眼澁口乾愛喫生冷毛髪乾堅揉鼻多嚏日漸羸痩青黛細研雄黄細研麝香細研蘆薈研熊膽研入胡黄連黄連去鬚龍膽去蘆頭苦楝根白鮮皮炙令燋黄蝦蟆灰蝸牛炒令㣲黄夜明砂㣲炒蟾頭一枚炙令燋黄五倍子各等分右為末都研令勻用三服量児大小以意加减夜明丹醫方妙選治五疳腹脹目澁多睡夜明砂㣲炒胡黄連草龍膽苦楝根各半兩乾蝦蟆五枚焼存性已上為細末青黛麝香蘆薈各一分并細研右一處拌勻粳米飯和丸如黍米大每服十粒米飲下不拘時候量兒大小加减傅藥危氏方治疳後虚熱隂莖腫右以韭菜内地龍糞煆為末出火毒清油調傅保童丸和劑方治小児五疳盖其骨肉輕軟腸胃㣲細若乳哺有節則臟腑相調或乳母寒温失理飲食無常醉飽喜怒及小児百晬以後五嵗以前乳食漸多不擇生冷好飡肥膩甘酸之物即成五疳一曰肝疳其候揺頭揉目白膜遮睛流汗遍身合靣而卧目中澁痒肉色青黄髪立頭焦筋青腦熱腹中積聚下痢頻多乆而不痊轉甚羸痩二曰心疳其候渾身壯熱吐痢無常頰赤面黄胸膈煩滿鼻乾心躁口舌生瘡痢乆不痊多下膿血有時盗汗或乃虚驚三曰脾疳其候腹多筋脉喘促氣麄乳食不多心腹脹滿多啼欬逆面色萎黄骨立毛燋形枯力劣胸膈壅悶水榖不消口鼻常乾好吃泥土情意不恱愛靜憎明腸胃不和便多酸臭四曰肺疳欬𠻳氣逆皮毛乾燋饒涕多啼咽喉不利揉鼻咬牙壯熱憎寒口鼻生瘡唇邊赤痒腹内氣脹乳食漸稀大腸不調頻頻洩痢糞中出食皮上粟生五曰腎疳其候肌肉消痩齒齗生瘡寒熱作時口鼻乾燥腦熱如火脚冷如冰吐逆既増乳食减少㵼痢頻併下部開張肛門不収疳瘡痒痛已上疾狀並皆治療黄連去鬚白鱔頭炙令燋黄無即炒白蕪荑充代草龍膽去蘆雄黄研飛青橘皮去白五倍子夜明砂㣲炒蟾頭一枚炙令黄色苦棟根天漿子㣲炒胡黄連麝香青黛研熊膽研蘆薈研各分右為細末用糯米飯和丸如麻子大每服一歳兒一丸不計時候温米飲下日進三服尤妙一方有蠋虫㣲炒一分肥兒丸治肥熱疳治小兒寒熱徃来欲𫝊疳候急宜補脾進食磨積消疳又實皮散米飲湯調勻空心與服以補益禆氣青皮去白陳皮去白各一两三稜炮莪术神麯麥芽各五錢巴豆十五粒去皮作二片右剉將巴豆同炒少時傾去巴豆不用川楝肉五錢史君子一两黄連蕪荑各三錢胡黄連五錢蘆薈青黛末各三錢蝦䗫去足焼灰三錢右剉一處入銚内再用巴豆㣲炒去巴豆不用和前藥同為末麵糊丸米湯下凡乆積欲𫝊疳宜作虚中積治之虚則補而後取實則取而後補不必便用胡黄連蘆薈等治疳藥史君子㯽榔丸活㓜口議治嬰孩小兒食肉太早傷及脾胃水榖不分積滯不化痰作疳氣等候宜服之肉豆䓻二箇炮㯽榔一箇生宣連胡黄連陳皮青皮川楝子炒去土蘆薈川芎各一錢麝香一字右為末獖猪膽汁薄荷為丸如麻子每服三五十丸温飲下議曰積是疳之母所以有積不治乃成疳候又有治積不下其積存而臟虚成疳尤重大抵小児患疳泄㵼無時不作風候何也惟疳㵼名熱㵼其臟腑轉動有限所以不成風候雖㵼不風亦轉他證作渴虚熱煩燥下痢腫滿喘急皆疳候虚證古云疳虚宜補虚是知疳之為疾不可更用利導之藥以致臟腑皆虚發作之初名曰疳氣腹大脹急名曰疳虚㵼痢頻併名曰疳積五心虛煩名曰疳熱毛髪結穗肚青大筋好喫異物名曰疳極受病𫝊臟已極熱發往来形體枯槁靣無神彩肉無色血名曰疳勞手足細小項長骨露凥臋無肉肚脹臍突名曰丁奚食已嘔噦頭骨分開作渴引飲蟲從口出名曰哺露此皆疳候又因多食生冷甘粘肥膩積滯中脘不化亦能成疳治疳之法量候輕重理其臟腑順其中脘自然調貼令氣脉和疳消蟲化漸次安愈若以藥攻之五臟疎怯腸胃不去積毒取出蟲子雖曰醫療却非治法盖小児臟腑虚則生蟲虛則積滯虛則肌羸虛則腸滿何更利下若更轉動腸胃致虛此兼疳虛證候乃作無辜無辜之孩難救矣小児疳藥此方十分靈驗紫蘇嫩梗陳皮甘草乾葛香附子白茯苓白术青皮茅香凈藿香凈苦楝皮三稜蓬术㯽榔川楝子去皮各等分史君子肉加倍右㕮咀水二盞薑三片煎八分去柤通口食前服如為丸米飲湯空心送下亦得小児三嵗已下每服一錢半服藥停一个時辰方可食乳食三嵗已上每服三錢上半月服去䖝下半月去積實如咳嗽加人参地骨皮桑白皮蘆薈丸出聖惠方治小児五疳靣黄髪枯頭熱盗汗卧則合靣飢即食土疳蟲蝕於口鼻㵼痢目疾無恒肌體羸痩無力蘆薈半两細研硃砂半两細研水飛過麝香半錢細研龍腦半分細研胡黄連半两牛黄細研蟬殻蝸牛殻㣲炒夜明砂蜣蜋㣲炒去趐足熊膽研入蚺虵膽𤓰蒂已上各一分蟾酥一錢研入右為末都研令勻煉蜜和丸如菉豆大每服以乳汁研一丸㸃入鼻中後以桃桞湯洗兒以青衣盖褁候有蟲子自出即以粥飲下三丸日三三嵗已上加丸服之史君子丸出聖濟總録治小児五疳羸痩腹脹下利不思飲食史君子用水和麵裹炮以麵熟為度止取史君子用丁香無食子熊膽研胡黄連夜明砂㣲炒青黛研肉豆䓻仁研黄連去鬚㣲炒蘆薈研各一两熊膽乾者一枚炙黄蟾酥一皂子大麝香一錢研龍腦半錢研右為末拌令勻研大棗粟米飲和丸如麻子大毎三嵗服五丸至七丸用温米飲下日食遲進黄耆湯出仁存方黄耆蜜炒燋當歸川芎白芍藥生地黄蝦蟆去足炙焦鱉甲醋炙焦各三錢人參白茯苓橘皮半夏麯北柴胡史君子畧煨甘草各二錢炙右剉散每服三錢水一盞薑二片棗二枚煎食前服蘆薈丸出聖惠方治小児一切疳頭髪成穗面目萎黄鼻痒口乾愛食泥土心腹虛脹肚有青筋四肢壯熱蘆薈半两細研麝香一分細研胡黄連一分木香一分牛黄一分細研龍腦一分細研熊膽半錢細研狗膽一枚牛蒡子一分鷄膽十枚蟾頭一枚塗酥炙㣲燋蝟膽七枚右為末用猪膽汁和丸如麻子大每服以冷水下一丸二嵗已上加丸数服之保童丸出聖惠方治小児五疳驚熱青黛細研乾蟾頭炙㣲焦黄黄連去鬚蘆薈細研熊膽研入已上各半两夜明砂㣲炒蝸牛殻㣲炒史君子地龍㣲炒牛黄細研蟬殻㣲炒已上各一分龍腦一錢細研硃砂一錢細研麝香一錢細研右為末入研了藥令勻以糯米飲和丸如米粟大每服以粥飲下五丸量児大小加减服之乾蟾丸出聖惠方治小児五疳不生飢肉乾蟾一枚用無灰酒一升煎其酒半升已来却去蟾骨更煎令熟爛後於乳鉢内并酒一時細研如膏次用後藥肉豆䓻二枚去殻㯽榔一枚甘草一寸炙㣲赤剉乳香半两研入硃砂一錢細研麻黄半两去根節膩粉一錢研入胡黄連半两丁香一分蘆薈一分研入麝香一錢研細牛黄一錢研細黄連半两去鬚右為末都研令勻入蟾膏内和丸如菉豆大每服以粥飲下五丸日三四服胡黄連丸出活㓜口議治嬰孩小児一切疳候及一切虛痢他藥無効而服此藥極効胡黄連蘆薈肉豆䓻炮桂人參硃砂史君子去殻木香鈎藤龍齒白茯苓以上重各一錢右為細末取獖猪膽两枚裂汁和末令勻却入袋内盛之以䋲紥定湯煑半日取出切破袋子更入莨菪子二錢重㣲炒黄丹一錢重二味别研如粉入前藥和勻𢷬五百杵為丸如菉豆大但是疳與痢用粥飲下五七丸幼者三丸不喫粥飲乳勿令飽能治一十二種疳痢及無辜者功效非常議曰疳之疾危發由於漸痢之後𫝊至於疳延乆為逆初見其輕延之日長後知其重告之無門是以疳痢皆由積毒驕恣口腹因虛以致虛因害而傷害醫工見有此等自是憂疑病家欲得便甦豈無性急更遷取活展轉愈深或疳極而腹不利或熱盛而加作渴或煩躁四體虛浮或飲食一時嘔吐常方不能安愈快劑恐越傷和惟宜服此熊膽散出聖濟総録治小児二十四種疳熊膽牛黄雄黄五靈脂丹砂麝香各半两蚺蛇膽已上細研黄連去鬚乾蠍去毒天麻蝸牛炒馬兠鈴根乾者大黄剉碎炒各一分右熊膽等七味研令如粉黄連等六味再同研令極細每服一字至半錢用飲調下早晨午間臨卧各一服量児大小加减服之或以蜜為丸如麻子大每服三丸至五丸史君子丸出聖濟総錄治小児疳氣身體壯熱毛髪焦黄目有淚滿口生瘡脚手細弱腹脇脹滿好喫泥土史君子去皮夜明砂炒白蕪荑炒各半兩胡黄連一兩麝香細辛去苗葉蘆薈研雄黄研蟾酥㯽榔剉蟬蛻去翅足炒各一分蝸牛十枚乾蝦蟇二枚酒一升同熬成膏腸肚用温水洗去垢慢火炙黄色為度搗羅要細并骨爪為末用右除蝦蟆外搗研為細末入膏子和為丸如麻子大每服五丸至七丸米飲下不拘時候日三服青金定命丸出聖濟縂錄治一切疳氣胡黄連一両為末蘆薈研各三分肉豆䓻二枚去殻為末青黛研各三分訶梨勒五枚炒去皮為末麝香研丹砂研蜜陀僧木香為末紅雪研鶴虱為末各一分右同研令勻用酒煎獖猪膽膏丸如菉豆大每服五丸至七丸妳疳臘茶下氣疳丁香湯下腦疳黄連湯下急疳笋湯下食疳生姜湯下脾疳棗湯下腎疳塩湯下猪肚黄連丸出危氏方治疳瘡自孩提至弱冠潮熱發瘡乃疳氣使然疳䖝食其肌膚空疳熱流注遍身熱瘡𤼵歇無已膽酥丸相間服尤妙雄猪肚一具凈洗鷹爪黄連去鬚凈一両右剉作小截少水和納猪肚内用線縫宻頓在五升粳米上蒸十分爛取於臼中入蒸飲搗千餘杵粘實得所衆手揑丸如小豆大每服二十丸米飲下童子倍之冠者又倍之仍以川芎生地黄茯苓茯神與之調血清心熱多者間服生犀散方見前二十嵗以上潮熱𤼵瘡為虛勞皆比種病也用藥同前児童病不出於疳則出於熱熱則生痰須當識也異香散治疳脹乃虛中有積其毒與氣交并故令腹脹脾腹受濕腎水不能宣通故頭面手足浮腫三稜炮莪术青皮陳皮半夏麯藿香苦楝益智仁枳殻煨香附子炒縮砂仁各五分丁香二錢甘草炙三分右剉姜棗煎服一方加五靈脂用胡黄連丸專治小児毛髪焦落腹大氣喘肌體羸痩喫食灰土生米寒熱往来下痢脱肛亦治咬嬭不長肌肉情性不恱咬嬭者乳母又有孕陳皮去白一両川棟肉炒宣連神麯青皮去白史君子煨去殻麥芽龍膽草各半分胡黄連夜明砂白蕪荑炒乾薑烏梅各二分右為末麵糊丸黍米大飲下三十丸煞疳丸治小児五疳寒熱腹脹四肢羸弱青黛二錢蟬殻五枚㣲炒硃砂一錢細研雄黄一錢細研胡黄連一分𤓰蒂二枚田父一枚炙令黄虵蛻皮灰一錢膩粉一分研細蘆一錢細研麝香一錢細研蟾酥兩皂莢子許大研入熊膽一錢研細右為末都研令勻熱獖猪膽湯化破服三丸量児大小以意加减史君子丸治小児五疳面色萎瘁頭熱髪乾胃氣不和心腹滿悶宿食不消或時不利痩熱無方冝常服史君子丁香没石子熊膽細研胡黄連夜明砂㣲炒青黛細研黄連㣲炒去鬚肉豆䓻去殻蘆薈細研已上各一分龍腦一錢細研蟾頭一枚炙焦黄麝香一錢細研右為末粟米飯和丸如菉豆大每服以粥飲或新汲水下五丸日三服三嵗已上加丸服之膽礬丸治消疳癖進食止㵼和胃遣蟲緑礬湏真者二両膽礬真者一錢為麄末大棗四十箇去核好醋一升以上四物熬令棗爛和後藥史君子二両去皮枳實三両去穣炒黄連一両巴豆二十箇去皮破之訶梨勒去穰皮一两各為粗末以上五味同炒令黒多三分乾入後藥夜明砂一两蝦蟆灰存五分性一両北棗根皮末半两已上三味候同炒乾同煎四物杵羅為細末右同前膏和一臼中杵千下如未成旋入熟棗肉亦可太多恐服之難化太堅則入温水可丸如菉豆大每服十丸米飲温水下不拘時五疳保童丸治五種疳疾青黛夜明砂布裹洗五倍子生苦棟根蘆薈熊膽研入蟬殻去土等分黄連去毛龍膽草生乾蟾酒炙去皮骨麝香研入蕪荑取仁右為末用粟糊為丸如麻子大一嵗児二十丸飯飲下日二三服磨積丸專治小児疳積泄㵼等疾京三稜蓬莪术陳皮去白青附子炒去毛與三稜莪术皮青皮同炒麥芽川欝金胡黄連神麯炒一遍用米醋煑一晝夜焙乾雷丸白者史君子肉切焙蘆薈已上各等分右為末米醋糊為丸如菉豆大每服三十丸糯米湯下茶湯亦可虛弱加木香虛極加附子疳極加癩蚵蚾肉香膽丸治小児疳氣靣黄肌痩發熱多困好喫泥土撏眉咬甲時伏土地並皆治之乾蟾一枚炙焦麝香研半錢牛黄研蛇蛻焼灰雄黄研天竺黄研熊膽研蟬蛻炙各一分天仙子半合水浸出芽為度焙乾為細末肉豆䓻去殻一枚右為細末糯米飯為丸如黄米大每服七丸至十丸米飲下不拘時候日三服生熟地黄湯治疳氣揺頭揉目白膜遮睛流汗合靣而卧肉色青黄髪立筋青腦熱羸痩及眼合不開内生䑃霧生乾地黄洗熟地黄洗净蒸各半兩川芎半夏茯苓枳殻煨去穰杏仁去皮研川黄連去鬚用半夏麯天麻地骨皮甘草炙當歸各二錢半右剉散每服二錢生薑二片黒豆十五粒水煎臨卧温服一方無當歸通治蟾酥丸治諸疳殺䖝止腹痛虛熱大效或因病後通泄太過成疳陳皮川棟子木香史君子去殻龍膽草蟾蜍二箇酥塗炙去骨胡黄連宣連去鬚蕪荑各一兩麝香半分或不入巴豆三七粒去油茴香一両炒右為末猪膽汁丸或糊丸青黛為衣常服紫蘇湯下史君子丸出聖惠方治小児一切疳神效史君子沒石子木香胡黄連黄連去鬚天靈盖塗酥炙令黄熊膽細研蘆薈細研訶梨勒皮阿膠搗碎炒令黄色仙靈脾已上各半分麝一分細研右為末用水浸蒸餅和丸如麻子大每服以粥飲下三丸隨児大小加减用之蟾頭丸治小兒五疳毛髪乾枯痩羸煩熱肚大脚細蟾頭一枚炙令黄焦青黛研細龍腦研細巴豆去皮心研裹壓去油再炒用乾蠍㣲炒白附子炮裂膩粉研以上各用半分牛黄細研麝香細研天竺黄細研雄黄細硃砂細研以上各用一分右為末青黛等同研令勻以水浸蒸餅和丸如菉豆大每服一嵗粥飲下一丸麝香丸出全嬰方治小児疳積多汗不思乳食黄連一兩酒浸一分史君子鱉甲米醋炒柴胡各半両陳皮半分蕪荑去皮半兩青皮剉碎巴豆七粒炙黄去心油㯽榔木香各一分麝香半錢秦芁半分右為末酒糊丸如豆大三嵗三十丸米湯下無時候無食子丸出聖濟総録治小児五疳無食子三枚大者煨熟用牛黄研麝香研丁香雄黄研水飛青黛木香丹砂研水飛各一分蟾酥三片如栁大焙過再研熊膽半両研蝸牛殻乾者三枚右水浸蒸餅為丸如黍米大一二嵗臨卧乳汁下一丸三四嵗二丸五六嵗三丸七八嵗五丸米飲下亦得日再服之青黛丸出聖濟総錄治疳殺蟲化食長肌肉退風熱青黛别研細半兩史君子㯽榔剉夜明砂白蕪荑醋炒令紫各一两蛇蛻一条炙肉豆䓻麵裹煨去殻一分巴豆半分用麵炙令黄去殻别研麝香一錢研黄連去鬚炒一分蝦蟇一枚酒浸炙令黄色去骨右先研巴豆令細次用猪膽一枚取汁同研令勻旋入其餘藥末搜和為丸未就更用少軟飯再研得所丸如麻子大每三嵗以下者一丸湯下五丸至七丸以通利為度麝香金膽丸出聖濟総錄治小兒一切疳疾三服見效黄連黄蘖青皮陳皮三稜莪术㯽榔鶴虱蕪荑川楝子煨苦棟根等分右為末獖猪膽汁浸蒸餅丸如黍米大疳㵼黄白紫蘇木𤓰鹽米飲下疳䖝蝕腹痛史君子湯下傷食不止藿香湯下退疳熱麥門冬下腹脹胃虛木香陳皮湯下不思乳食棗湯下赤白痢乾老薑