世之珍其效可知金花散治室女骨蒸熱勞霍香零陵香延胡索芍藥白芷川芎當歸桂心各一分蓮子心晚蠶蛾各二分右為細末溫酒調下二錢日二服鱉甲丸出聖惠方治婦人骨蒸勞月水不通脅下痃癖往往腹痛鱉甲二兩塗醋炙令黃去裙襴土瓜根桂心荆三稜牡丹牛膝去黃川大黃銼碎微炒訶梨勒皮各一兩桃仁二兩湯浸去皮尖雙仁麩炒微黃琥珀一兩細研右為末煉蜜和搗三二百杵丸如梧桐子大不計時候以桃仁湯下三十丸豬肚丸出永類鈴方治骨蒸勞唇頰赤氣粗口乾遍身壯熱或多虛汗大腸澀祕小便赤黃飲食全少青蒿鱉甲醋炙北柴胡木香生乾地黃各一兩青皮半兩宣黃連二兩右為末以豬肚一箇洗淨內入藥在內繫定蒸令極軟研如泥為丸如菉豆大湯下十五丸空心日三服忌溫酒麵毒物石膏散出永類鈴方治骨蒸寒熱外寒內熱附骨蒸盛之時四肢微瘦足跌腫者病在臟腹中用真石膏不以多少研令極細汲新水和服方寸匕取身無熱為度鱉甲丸治男子婦人童男室女五勞七傷傳疰飛尸注八極骨蒸肺痿黃瘦虛勞無肉肌肉不生婦人血蒸五心煩熱血蒸勞氣室女月閉黃瘦氣塊腸痛經脈不調乾嗽咽膈不利癥瘕積塊臉赤口瘡已上等疾黃耆柴胡枳殼知母白茯苓沉香人參附子木香升麻肉桂胡黃連杏仁當歸常山羌活荆三稜烏梅肉安息香明者同胡桃肉細研右共十九味修製了各稱一兩為末用活鱉一箇重十兩或半斤者河水養七日須逐日換新水用童子小便五升無灰酒五升於銀石器內漫火熬百沸先更加桃桞枝東南上者各銼三條烏梅五十箇拍破此三味用綿裹同鱉煎煮至半去桃桞三味鱉爛取出將肉研入膏骨并殼焙乾為末再入汁中熬如漆色或更入酒少許此在臨時斟酌盛放磁器中搜和藥入臼中杵千下丸如梧桐子大丈夫婦人十五歲已上二十至三十丸溫酒下婦人荆芥酒下所煮膏子須斟酌多少勿令剩下却但少些子不妨却别熬酒若膏剩恐鱉不全故也凡服此藥恐熱三五更須服八仙飲子一服解之八仙飲子常山白术秦芁洪州鬼臼甘草紫蘇赤芍藥銀州柴胡又等分洗淨為粗末每服半兩水碗烏梅肉二箇蔥白薤白桃槐枝各七寸同煎至一盞去滓溫服滓併煎殺鬼丸出聖惠方治婦人骨蒸傳尸勞瘦鬼氣伏連麝香三分犀角屑木香白术各一兩虎頸骨醋炙鬼箭羽天靈蓋醋炙桃仁去皮尖雙仁麩炒黃雄黃各半兩辰砂半兩右為末煉蜜丸如梧桐子大溫水下二十丸藥亦辟瘟疫亦可帶之牡丹湯治婦人骨蒸經脈不通漸增瘦弱牡丹皮一兩半桂去粗皮木通銼炒各一兩土瓜根一兩半芍藥一兩半鱉甲醋炙去裙襴二兩桃仁湯浸去皮尖雙仁麩炒右粗搗莭每服五錢水一盞半煎至一盞去滓溫服空心食後天門冬丸出大全良方治伏連傳注腹中有堅硬積氣壅心胸作痺痛引脅皆痛脘膈妨悶鬼臼天門冬去心各三分巴豆芥子不蛀皂角醋炙各半兩葉子雄黃一兩右為細末煉蜜為丸如小豆大每服一丸漸加至三十丸空心湯水吞下臨卧一服常宜斟酌勿令泄瀉忌鯉魚山豬蘆笋飛尸血厥附論夫飛尸者遊走皮膚穿臟腑每發刺痛變作無常遁尸者附骨入肉攻作血脈每發不可近見尸喪聞哀便發風尸者淫濯四肢不知痛之所在每發昏沉得風雪便作沉尸者纒骨結臟衝心脅每發絞切遇寒冷便作注尸者舉身沉重精神錯雜常覺昏廢每節氣至變輒成大惡宜服忍冬葉方人平居無疾苦忽如死人身不動搖默默不知人目閉不能開口噤不能言或微知人惡聞人聲但如眩冒移時方寤此由汗多血少氣併於血陽獨上而不下氣壅塞而不行故身如死氣過血還隂陽復通故移時方寤名曰鬱冒一名血厫婦人多有之宜服白薇湯倉公散方雄朱散出大全良方治因喪驚憂悲哀煩惱感尸氣而成變動不已似冷似熱風氣觸則發雄黃研朱砂研苦梗羌活當歸川烏炮升麻龍齒别研犀角屑白术芍藥木香鬼箭羽白殭蠶虎頸骨醋炙紫蘇子炒川芎南星炮山梔子陳皮芥草枳殼去穰麩炒黃芩各一分麻黃半兩去根莭蜈蚣二條炙去頭足檳榔二個全蝎一分炒右為末每服二錢溫酒調下一日三服白薇湯出大全良方治婦人鬱冒血厥忽如死不動不知人目閉口噤移時微寤由汗多血少氣併於血陽獨上而不下氣壅塞而不行氣過血還隂陽復通故移時方寤婦人多有此病白薇當歸各一兩人參半兩甘草一分右㕮咀每服五錢水二盞溫服倉公散出大全良方治卒鬼擊鬼疰鬼刺心腹如刺下血便死不知人及卧夢魘嚙腳趾不覺者并諸毒氣等疾瓜蒂藜蘆末雄黃研礜石右為末研停用少許吹入鼻中得嚏氣通便活未嚏再吹以得嚏為度此藥能起死人恐皂角者為正樟鎮寶金寺僧傅脘王善醫術一日偶皆往鋪中市藥藥鋪主人請僧就視一病僧因拉手同到病者榻前扶一病婦年約五十閉目昏默醫者五六輩環視問之皆以生飲順元散對僧診脈後一揖而出病家邀之不來主人曰以倉公散吹入鼻中嚏而醒後與藥問之則曰諸醫得將不察耳此病乃鬱冒血厥許學士本事方白薇湯其證也若風藥則謬矣服至二十丸乃安治傳尸血厥出大全良方右以忍冬葉銼數斛煮令濃取汁煎之如雞子大日三服鼻衄附論夫婦人鼻衄者由傷動血氣所致也凡血氣調和則循環表裏經絡澀則不散若傷損動因而生熱氣逆流溢入於鼻者則成鼻衄也只有産後見衄者不可治評曰凡鼻衄雖多因熱而得此疾亦有因怒氣而得之者曾趙恭人鼻衄不止諸治不差召豫治之先用蘇合香丸四粒次用五苓散濃煎白芽花湯調服即止亦用芎歸湯調理又有一富室男子鼻衄不止脈法數究竟云服丹藥太過遂用黃連黃芩大黃為末水煎服愈調服亦可方解肌湯出氏方治勞傷體熱鼻血能退熱柴胡麻黃木通茯苓犀角赤芍藥蒲黃黃芩葛粉生地黃甘草各等分右銼散每服四錢水一盞半生薑三片紅棗二枚煎不計時候溫服阿膠散出聖惠方治婦人鼻衄出血數升不知人事阿膠一兩摶炒黃燥桂心半兩細辛半兩龍骨半兩當歸半兩銼微炒蒲黃一兩亂髮灰一兩右為散每服二錢溫酒調下不計時候治婦人鼻衄出血數升不知人事出聖惠方用搗楮葉汁飲一中盞效又方出聖惠方用艾灰吹鼻中又方出聖惠方用研紫檀木令細吹鼻中又方出聖惠方用梁上塵塞鼻中刺蘇散出聖惠方治婦人鼻衄血不止刺蘇二兩桑耳二兩亂髮灰艾葉各一兩炒生地黃二兩蒲黃一兩半右為細末每服二錢無時粥飲調下一方為散每服三錢水一中盞入淡竹茹一分煎至六分去滓不計時候溫服黃連散出聖惠方治婦人鼻衄不止心神煩燥黃連一兩去髮犀角屑一兩刺蘇二兩雞蘇葉二兩生地黃一兩右為末散每服四錢水一中盞入生薑半分煎至六分去滓溫服不計時候生乾地黃散出聖惠方治鼻衄血出數升不知人事生乾地黃二兩黃芩一兩阿膠二兩搗碎炒黃燥柏葉一兩甘草一兩炙微赤銼右為散每服三錢水一中盞煎至六分去滓溫服不計時候藕汁飲出聖惠方治婦人鼻衄出血數升不知人事生藕汁三合生地黃汁三合刺蘇汁三合牛旁汁三合白蜜三合右相和令勻每服一合不計時候犀角地黃湯出大全良方治內有瘀血鼻衄吐血靣黃大便黑心胸徹背痛芍藥三分生地黃半斤牡丹皮去心一兩犀角屑一兩如無升麻川者代右㕮咀每服五錢水煎服有熱如狂者加黃芩二兩蒲黃散出聖惠方治婦人鼻衄出血數升不知人事鹿角膠三兩摶炒黃燥艾葉一兩微炒續斷一兩蒲黃一兩右為細散每服二錢煮竹茹粥飲調下不計時候麝香散出聖惠方治婦人鼻衄出血數升不知人事人中白一分石榴花一錢故錦灰一錢麝香半兩右細研為散每取少許吹鼻中伏龍肝散出聖惠方治婦人鼻衄出血數升不知人事生地黃汁六合刺蘇汁六合生麥門冬汁六合伏龍肝末右暖三味汁調下伏龍肝末一錢生地黃飲出聖惠方治婦人鼻衄出血數升不知人事生地黃一兩生薑二兩阿膠一兩摶碎炒黃燥别研為末右先研地黃生薑取入阿膠末於銀器內暖過每服一合麥門冬飲子出濟生拔粹治衄血不止麥門冬生地黃右銼每服一兩水煎衄血先硃砂蛤粉次木香黃連大便結下之大黃芒硝甘草生地黃瘡軟子黃芩黃連可選而用之又方治婦人鼻衄出血數升不知人事錦灰一分人中白一錢右相和研令勻分為二服以溫水調下立效又方石膏牡蠣右等分搗羅為末更研以新汲水調如煎餅面滴於鼻中立止又方蓮子心末刺蘇汁右研令勻每用酒鼻中治産後鼻黑色及鼻衄脈當在血海起攻於鼻口血交左右於其産後氣消血敗榮衛不理散亂入於經內不還故令口鼻黑起及變鼻衄緣此産後虛熱變生大病日久不可治名曰胃絶肺敗遇有此病疾用緋線一條挂在産婦項髮兩條縳在婦人兩手中指莭間其血衄即止又方治婦人鼻衄出血數升不知人事用白米粉以新汲水調下一錢又方用燒蝟皮灰細研入大豆少許綿裹內鼻中塞之又方用飲白馬尿一合即止又方用飲赤馬通汁一合并􅂒入鼻中立止又方用青箱草汁灌入鼻中又方用人中白細研吹鼻又方用石榴花柏葉等分細研吹鼻中又方用搗苧根汁一合飲之立止桑白皮散治心胸積氣作胸痺引兩脅痛昏悶不收音聲不清虛熱上壅作鼻衄桑白皮三分枳殼木通生乾地黃白芍藥子苓甘草右為粗末每服三錢重水盞半煎至七分去滓溫服食後普濟方卷三百十九
