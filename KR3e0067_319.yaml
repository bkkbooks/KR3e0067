body:
  text: 普濟方卷三百十九明周王朱橚撰婦人諸疾門客熱附論夫婦人有氣血隂陽臟腑虚則生熱虚則受邪邪熱加人隂陽冷熱自相承也今云客熱者是體虚而將温過度外熱加之非腑臟自生故云客熱其状上焦胸膈之間虚熱口燥心煩手足壮熱者是也方羚羊角散治婦人客熱心神煩躁體熱四肢疼痛不思飲食羚羊角屑三分紅花子半兩赤芍藥半兩當歸半兩剉碎㣲炒枳殻半兩麩炒㣲黄去穣赤茯苓一兩犀角屑半兩生乾地黄一兩人参三分去蘆頭麥門冬三分去心㯽榔甘草炙㣲赤剉各半兩右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時生乾地黄丸治婦人客熱面赤頭疼口舌生瘡心胸煩壅飲食無味生乾地黄一兩羚羊角屑白鮮皮葳蕤各半兩黄連三分去頭鬚黄耆半兩炙㣲赤炒羚羊角麥門冬三兩去心焙𤣥参地骨皮各半兩川大黄一兩甘草半兩炙㣲赤炒右為細末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以温水下三十丸黄耆丸治婦人客熱心神壅悶肢莭煩疼少思飲食麥門冬一兩半去心生乾地黄一兩犀角屑人参三分去蘆頭茯神三分􅌝􅌣子仁半両黄芩半兩甘草半兩右為細散每服不計時候以竹葉湯二錢一方無麥門冬丹砂散治婦人客熱心神煩躁口乾舌澀飲食無味丹砂一兩細研水飛過犀角屑天竹黄胡黄連各半兩麥門冬三兩去心焙寒水石細研馬牙硝一分細研鈆霜半兩細研右為細散入研了藥令勻每服不計時候以竹葉湯調下一錢治婦人客熱煩渴頭疼痰湧如泉一名玉雙散石膏二兩細研水飛過寒水石一兩細研右為散同研勻每服不計時候以生地黄湯調下一錢犀角散治婦人客熱四肢悶煩疼痛不下飲食犀角赤芍藥地骨皮紅花冬草半兩人参北柴胡黄耆一兩半麥門冬赤茯苓各三分右㕮咀每服二錢水二盞薑三片煎至七分去滓無時温服一方有生地黄七分半麥門冬散治婦人客熱四肢煩悶頭疼不下飲食麥門冬北柴胡赤茯苓各一兩羚羊角屑赤芍藥桑白皮黄耆各三分生乾地黄甘草各半両右㕮咀每服四錢水二盞薑三片煎六分去滓温服無時候治客熱以白油麻作飲汁服之寒熱附論夫陽虚在外則寒隂虚在内則熱陽盛則熱隂盛則寒故婦人勞傷氣血虚寒熱相搏令隂陽二氣虚實不調故令寒熱也方桃仁丸治婦人頭目昏重心神煩悶或時寒熱肢莭疼痛不欲飲食桃仁一兩湯浸去皮尖雙仁麩炒㣲黄芎藭白术各半兩柴胡一兩去黄赤茯苓三分枳殻半兩麩炒㣲黄去穣赤芍藥半兩訶梨勒皮三分人参一兩去蘆頭酸棗一兩㣲炒生乾地黄一兩右為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以生薑荆芥薄荷湯下三十丸地骨皮散治婦人血風氣體虚發歇寒熱如瘧經曰三陽不足則先寒後熱三隂不足則先熱後寒隂陽交争虛實不調方見木陽血風勞氣類鼈甲一兩黄去裙令生乾地黄一兩當歸人参各三分去蘆頭甘草半兩炙㣲赤剉木香半兩白术一兩桂心二分桃仁一兩湯浸去皮尖右為末煉蜜和三百丸如梧桐子大每於食前以温酒下三十丸鼈甲散出聖惠方治婦人寒熱肌痩煩疼鼈甲二兩塗醋炙令黄去裙襴白茯苓枳殻麩炒微黄去穣白芍藥當歸五加皮羗活桃仁湯浸去皮尖炒微黄菴䕡子白术柴胡各一両去苖甘草半兩炙㣲赤剉右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服黄耆散出聖惠方治婦人血脉不調發歇寒熱胸膈煩躁不思飲食四肢疼痛黄耆一兩去蘆頭赤芍藥半兩麥門冬三分去心赤茯苓白术各三分羚羊角屑半兩湯洗半夏半兩前胡去蘆頭三分當歸一兩枳殻一兩麩炒微黄去穣甘草半兩炙㣲赤剉右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服七寳湯治寒熱往來防風去蘆知母去蘆生地黄各半兩柴胡去蘆秦芁甘草各二錢半炙前胡去蘆二錢半右㕮咀每服五錢水一盞半加人参三寸煎至七分熱服油煎散出永類飲治血虚寒熱四肢酸倦無力痩瘁不進飲食川烏海桐皮地骨皮五加皮牡丹皮陳橘皮桂心白芍藥川芎當歸烏藥白芷莪茂各等分右為末每服二錢入生麻油三四㸃煎至七分温服無時候日三服柴胡散出聖惠方治婦人寒熱體痩肢莭疼痛口乾心煩不欲飲食北柴胡黄耆赤茯苓白术各一兩地骨皮人参枳殻製生乾地黄黄苦梗桑白皮赤芍藥各三分鼈甲炙二兩麥門冬三兩甘草半兩右㕮咀每服四錢水一盞半薑三片煎至七分去滓温服無時候一方無鼈甲青蒿散出永類鈴方治男子婦人肢體倦疼虛勞寒熱用青蒿八九月間成實時採去枝梗以蒿用童子小便浸三日晒乾為末每服二錢烏梅一箇煎至七分服生乾地黄散出聖惠方治婦人風血氣或時寒熱體疼不思飲食方見本門虛損類諸勞鼈甲煎出大全良方治勞鱉碓一箇重一斤者杏仁去皮尖雙仁麩炒柴胡貝母去心知母各四兩右除鱉外諸藥細剉以好酒五升入鍋内将活鱉在中以藥和勻圍定上用版子石壓之令活鱉在藥内喫酒藥候來日却以慢火煮候酒盡為度却取鱉令患人喫盡次將鱉甲用醋炙黄入在前項諸藥内焙乾為細末酒煮麫糊為丸如梧桐子大用米飲吞下三十丸無時候日五服治一切婦人室女思慮所感變化勞候其病變状多端骨莭軟弱背膊勞倦或乍寒乍熱夜夣不祥或項頸酸疼四肢無力小便下水濃似米泔忽頭骨冷痛精神倦怠忽血氣刺痛攻心飲食减少口無滋味此皆肝腎感傷之所致也但臓腑傷冷體氣虛弱宜喫此方若經候行少忽不通不宜服出楊子建獲命方當歸一兩萆蘚益智去皮鼈甲醋炙川芎杜仲去皮茱茰石觧獨活茯苓藁本各半兩木香荆三稜各一分右為細末每服三錢水一盞煎兩三沸空心去滓服和蜜丸如梧桐子大早朝空心塩湯下三十丸亦佳治一切婦人室女虚勞證候既喫前方藥了仍喫此清心煎藥對當前方藥服餌若更似有發𠻳急修合下靣保肺藥喫也出楊子建獲命方桑寄生半兩木香鼈甲醋炙天靈盖蘇炙黑色前胡去毛柴胡去毛沉香麥冬去心茯苓各一分黄連三銖右為細末砂盆内水磨犀角取汁一盞煎藥二錢取服食後治一切婦人室女有前方所説虛勞之候下部脉㣲上部脉盛即将此藥對前靣補藥喫也上部脉不盛大却㣲有𠻳亦請依法加减此方服餌出楊子建獲命方桔梗紫蘇杏仁去尖紫苑黄芩鼈甲醋炙蛤蚧蘇炙深黄色天靈盖蘇炙焦黑色柴胡去毛各一分麻黄去根半兩右為末每服二錢水一盞生薑一小片同煎三沸食後徐徐去滓服若上部脉不盛却减黄芩一味不喫也明月丹出大全良方治諸勞兎屎四十九粒􅗠砂如兎屎大四十九粒右為研生蜜丸如梧桐子大以甘草半兩碎之水浸一宿取汁五更初下七丸勿令病人知勞病下後頻看若有蟲急打殺以桑火油煎使焦棄急水中三日不下更服須在月望前日服忌見䘮衣婦人猫犬之類後服治勞補氣藥取差沈内翰云威愍孫元規藏此方類能活人江人隂萬融病勞四體如焚埀危夜夣神人膓壅一月如大盤明爛不可正視逼人心骨背寒已而悸寢俄頃扣關乃威愍使人遺之藥服之遂差問其名則明月丹也始悟向之所夣大體此藥最治熱勞又方云傷寒煩躁骨熱皆治療一方有硼砂等分勞瘵附論夫骨蒸硽殜傷連尸疰蟲疰毒疰熱疰食疰鬼疰等皆曰傳尸以疰者疰也病自上疰下與前人相似故曰疰其變二十二種或三十六種或九十九種大略令人寒熱盗汗夣與鬼交遺泄濁髪乾而聳或腹中有塊或腦後兩邉有小結核連腹類箇或聚或散沉沉黙黙咳𠻳痰涎或咯膿血如肺痿肺癰状或後下利羸痩困乏不自勝持積月累年以至於死死後乃疰易傍人乃至㓕門者是也更有蜚尸寒尸䘮尸尸疰等謂之五尸乃大小附着等證不自知其所苦無處不思以三因攻之内非七情所忤外非四氣所襲蟲苦麗乎不内奈其證多端轉變遷移難以推測故自古及今愈此病者十不保一所謂闕病者憎寒發熱自汗靣白目乾口苦精神不守恐畏不能獨外其傳在肝病者憎寒發熱靣黒鼻燥忽忽喜忘大便若難或復泄瀉口瘡其傳在心病者憎寒發熱靣青唇黄舌本强不能嚥飲食無味四體羸痩吐涎沫其傳在脾病者增寒發熱靣赤鼻白乾燥毛折咳𠻳喘急時吐白涎或有血線其傳在肺病者増寒發熱靣黄耳輪焦枯胻骨疼痛小便白濁遺瀝胸痛其傳在腎所謂勞􅀢者二十四種隨證皆可考尋毛折髪焦肌膚甲錯其蒸在皮外人覺熱自反惡寒身振癎其蒸在外髪焦鼻衂或傷屈血其証在肉血身熱煩燥痛如針刺其蒸在脉爪甲焦枯眼昏兩脇急痛其蒸在筋版齒黒燥大牙酸疼其蒸在骨背膂疼痛胻骨酸􅤙其蒸在髓頭眩熱悶口多濁涎眼多眵淚其蒸在腦男子失精女子白滛其蒸在房乍寒乍熱中脘興膻心中煩悶其蒸在三焦小便赤黄凝濁如膏其蒸在膀胱傳道不均或秘或泄腹中雷鳴其蒸在小腹大腹隠痛口鼻乾疼其蒸在大腹口鼻乾燥腹脹睡卧不安自汗時出其蒸在胃耳聾脇下痛其蒸在膽裏脹急後重肛門澀秘其蒸在回腹小腹疼痛筋脉縱緩隂器自强其蒸在宗筋眼昏淚下時復眩暈燥怒不常其蒸在肝舌焦黒氣短煩悶洒洒浙浙其蒸在心唇乾口瘡胸腹脹悶畏寒不食其蒸在脾咳嗽喘滿咯痰吐血聲嘶音喑其蒸在肺耳輪焦枯脚氣酸疼起居不適其蒸在腎情想不能無故泄精白物綿綿而下其蒸在右腎心主胞絡心膈噎塞攻擊疼痛俛仰煩寃其蒸在膈諸證雖不同其根多有蟲囓其心肺治之不可不絶其根也内經曰有病胸脇支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目腫時時前後血病名血枯此得有所大脱血若醉入房中氣竭肝傷故月事衰少不來也夫肝藏血受天乙之氣以為滋榮者也其經上胃膈布脇肋令脱血失精肝氣已傷故血枯涸而不榮胸脇支滿以經絡所貫然也妨於食則以肝病傳於脾胃病至則先聞腥臊臭出清液以肝病肺乘之先唾血四肢清目眩時時前後血皆肝病血傷之證也方河車丸出大全良方治勞嗽一切勞瘵虛損骨蒸等疾河車一枚初生男子者尤良長流水中蕩洗紫血凈入鍋熟煮用手擘成数小片焙乾須在一日内便碾成末纔經宿即不乾碾不成末矣本草方於内治療病瘵病胞衣飄生者尤佳血氣羸痩婦人勞損靣黯皮黒腹内諸病漸漸痩瘁者以五味和之如鐩􅀈法與服之勿令病者知亦治天行熱病之效胞衣埋地中七八年化成水澄清如眞水南方之人以甘草升麻和諸藥羅盛埋之三五年發之此為藥服雪白茯苓半兩乾山藥一兩揀参一兩右為細末麫糊為丸如梧桐子大以少麝香末為衣每服三五十丸米飲温酒塩湯送下空心服嗽甚者五味子湯下蓯蓉丸治婦人胸脇支滿聞腥臊氣唾血目眩不能飲食泄瀉不已日乆血枯蓯蓉酒浸熟地黄白茯苓兎絲子製附子炮當歸炒白石英研五味子各一兩禹餘粮製研一兩人参半兩烏賊魚骨去甲一兩右為末煉蜜為丸如梧桐子大酒下二三十丸米湯亦可空心日中臨卧各一服掌中金丸出投粹方治婦人乾血氣川山甲炮甘草苦丁香川椒苦葶藶白附子草烏頭猪牙皂角各二錢巴豆一錢全用研右通為細末生葱絞汁和丸如彈子大每用一丸新綿包定内隂中日即白二日即赤三日紅肉蓯蓉丸治婦人胸脇支滿聞腥臊氣唾血目眩不進飲食泄血不已日乆使血枯燥肉蓯蓉酒浸切焙熟地黄焙白茯苓去皮各一兩人参半兩兎絲子酒浸别為末一兩半白石英五味子烏賊魚骨去甲各一兩右為末煉蜜為丸如梧桐子大每服二十丸至三十丸温酒或米飲下藥汁化阿魏再煮十數沸去滓候温作二次調下件藥末朱砂半兩小㯽榔半兩麝香半兩右三味研令極細分為二服用湯使調下五更初一服三㸃再一服屁時間取下蟲遂絶根本若見蟲色白者此病必瘥若黒色則已傳入腎經不可救也服藥後只以淡粥補支并不動原氣效騐無比切須秘之世傳勞蟲有靈輕易傳之則傷醫者此説殆醫者秘惜其方不可以援人耳要須宻重之則無洩慢天機乃起死還生功同造化鬼神䕶助自有靈效大凡𫝊尸勞者必須先服此一藥後十五方隨證治不可以槩用藥調治三五箇月再服此取蟲藥則永除根本如取下蟲色已黑縱服後藥亦無補也然則能使不𫝊他也養正膏出大全良方治𫝊尸出汗取蟲辟邪鼈甲一兩醋炙青蒿一握淡頭三七粒葱白二莖安息香二分研桃桞桑各七莖桃仁四十九箇去皮尖雙仁天靈盖用七頭大片醋炙右十味隔夜以水一升浸至五更煎至半升再以童便半升同煎取四合又用㯽榔一箇為末麝香一錢七将所煎藥去滓調下至日高二丈時放温頓服以出汗審㸔十指汗出如藕絲五色臭穢汗出後仍瀉下蟲状惡物盡甚者旬再服大靈明月丹治𫝊尸雄黄木香各半兩輕粉一分天靈盖炙一兩鼈甲醋炙一兩兎屎二兩右為末用法酒一大升大黄半兩為末熬膏入前藥為丸如彈子大朱砂為衣𫝊尸勞肌痩靣黄嘔吐咳嗽不定先燒安息香令煙出空心日午夜卧各一乾地黄湯治婦人先有所脱血或醉中房勞傷肝致使月事不來血枯燥熟地黄澤蘭葉白茯苓去黒皮人参五味子附子炮製去皮臍當歸切焙禹餘粮火煨醋淬各一兩右粗搗莭每服三錢水一盞煎至七分去滓温服空心日午夜卧日三一方用薑五片磁石丸治婦人隂氣衰弱血枯不榮月事不來磁石火煨醋淬三七徧白茯苓去黒皮附子炮製去皮臍各一兩人参當歸切炒乾地黄焙各一兩右為末煉蜜為丸如梧桐子大每服二十丸至三十丸温酒或米飲下空心日午夜卧日三服破經丸出仁存方治婦人乾血氣乆渫腿臍腹冷痛寒熱往來血塊血刺痃癖癥瘕四肢無力飲食漸减乆變成虚勞痰嗽川大黄一兩硇砂研川芎各半兩紅娘子四十九箇馬鳴退灰三錢當歸六錢切焙右煎小醋一盞入大黄末作膏和後五味如米豆大每服十丸至十五丸煎紅黄酒下食前三兩時間覺臍腹下㣲痛藥行大小便取惡血濃粘為效如未覺加至二十丸三五服效要内消只服三五丸每日常服覷患老少輕重以意加减烏賊魚骨丸出大全良方治婦人血枯胸脇支滿妨於飲食病至即聞腥臊之氣先唾血出清液或前後泄血四肢清目眩轉月事衰少不來烏賊魚骨去甲四兩䕡如一兩右為末用雀卵不拘數和成劑令得所丸如小豆大每服五丸加至十丸以鮑魚湯下後以飲食壓之食後日三服行經丹出仁存方治婦人乾血氣滯腰脚臍下痛寒熱血脉阻渫斑猫二十箇去頭翅杏仁二十箇去皮炒右同研白麫糊為丸如小豆大每服十丸煎桃仁湯下日未出小便内取下血片覺臍下痛治婦人乾血氣赤雹児七箇燒存性隂乾亦可當歸一兩炒乾右為末每服三二錢空心温酒調下血極膏出濟生㧞方治婦人乾血氣川大黄釅醋右二味熬成膏就如雞子大每服一丸熱酒化開卧温服大便利一二行後紅脉自下是婦人僊藥也加歸頭更妙治婦人血枯出神效方右用川大黄為末醋熬成膏就如雞子大作餅児酒磨化一餅治婦人血氣不行上氣衝心變作乾血氣用絲𤓰児一箇燒存性每服一箇用弦絲燒灰為飲子空心温酒調下神仙秘出大全良方取𫝊屍勞蟲服此藥須先擇良日焚香禱祝令病人設榻靣向福德方服即有神效不可使病人知其藥味青桑皮楊桞枝梅枝桃枝口南枝取東引者各七莖葱白七莖阿魏二分青蒿一握如無以子代眞安息香一分研去石已上八味除阿魏外用童子小便一升半煮取藥耗及一半去滓將吸之不嗽非傳尸也不可用此藥若煙入口不能禁止乃𫝊屁宜用此藥五更初服勿令病人知以童便共酒一盞化一丸服如暇人行十里乃必吐出蟲如燈草細長及寸或如爛𤓰李又如蝦蟇状各不同未效次日再服以應為度熱勞附論夫婦人熱勞者由心肺壅熱傷於氣血不調臟腑壅滯熱毒積蓄在内不得宣通之所致也其後心神煩燥頰赤頭疼唇澀乾四肢状煩熱煩渇不止口舌生瘡神昏沉少起多卧飲食無味舉體疲熱煩疼或時心怔或時盗汗肌膚日漸消痩故名熱勞也陽不足則先寒後熱隂不足則先熱後寒夫婦人勞傷氣血虛弱又隂陽交争虚實不調故令寒熱如瘧也方胡黄連丸治婦人熱勞煩悶四肢黄痩疼痛時有咳嗽不欲飲食胡黄連半兩柴胡一兩去苖赤芍藥三分鼈甲二兩塗醋炙令黄去裙襴知母半兩犀角屑三分川升麻半兩𤣥参半兩人参半兩去蘆頭地骨皮三分當歸半兩茯神三分杏仁三分湯剉浸去皮尖雙仁麩炒㣲黄麥門冬一兩半去心焙紫苑三分洗去苗土川大黄三分剉碎㣲炒甘草半兩㣲赤􅀈秦芁三分去苖枳殻三分麩炒㣲黄去穣桔梗半兩去蘆頭右為末煉蜜和擣三二百杵丸如梧桐子大不計時候以粥飲下三十丸益母草煎丸治婦人熱勞煩悶四肢疼痛經脉滯澀腹脇煩悶不欲飲食益母草汁一升青蒿汁一升生薑汁三合童子小便一升已上四味於銀器中以漫火熬成膏柴胡一兩去蘆人参三分去蘆頭麥門冬一兩去心焙琥珀三分細頭桃仁一兩湯浸去皮尖雙仁麩炒㣲黄地骨皮三分枳殻三分麩炒㣲黄去穣白术三分桔梗三分去蘆頭鼈甲二兩塗醋炙令黄去裙襴赤芍藥一兩當歸三分生乾地黄一兩鬼箭羽一兩麝香一分細研右為末用上熬成膏和擣三二百杵丸如梧桐子大食前以温水下三十丸青蒿丸出聖恵方治婦人熱勞咳嗽肌體消痩心膈煩熱後多盗汗四肢痠痛食少無力青蒿一兩半天門冬一兩去心焙柴胡一兩