世之珍其效可知金花散治室女骨蒸熱勞霍香零陵香延胡索芍藥白芷川芎當歸桂心各一分蓮子心晩蚕蛾各二分右為細末温酒調下二錢日二服鼈甲丸出聖惠方治婦人骨蒸勞月水不通脇下痃癖往往腹痛鼈甲二両塗醋炙令黄去裙襴土瓜根桂心荆三稜牡丹牛膝去黄川大黄剉碎㣲炒訶梨勒皮各一両桃仁二両湯浸去皮尖雙仁麩炒㣲黄琥珀一両細研右為末煉蜜和擣三二百杵丸如梧桐子大不計時候以桃仁湯下三十丸猪肚丸出永類鈴方治骨蒸勞唇頰赤氣粗口乾遍身壮熱或多虛汗大腸澀秘小便赤黄飲食全少青蒿鼈甲醋炙北柴胡木香生乾地黄各一両青皮半両宣黄連二両右為末以猪肚一箇洗净内入藥在内繫定蒸令極軟研如泥為丸如菉豆大湯下十五丸空心日三服忌温酒麫毒物石膏散出永類鈴方治骨蒸寒熱外寒内熱附骨蒸盛之時四肢㣲痩足跌腫者病在臟腹中用真石膏不以多少研令極細汲新水和服方寸匕取身無熱為度鼈甲丸治男子婦人童男室女五勞七傷傳疰飛尸注八極骨蒸肺痿黄痩虚勞無肉肌肉不生婦人血蒸五心煩熱血蒸勞氣室女月閉黄痩氣塊腸痛經脉不調乾嗽咽膈不利癥瘕積塊臉赤口瘡已上等疾黄耆柴胡枳殻知母白茯苓沉香人参附子木香升麻肉桂胡黄連杏仁當歸常山𦍑活荆三稜烏梅肉安息香明者同胡桃肉細研右共十九味脩製了各稱一兩為末用活鼈一箇重十兩或半斤者河水養七日須逐日換新水用童子小便五升無灰酒五升於銀石器内漫火熬百沸先更加桃桞枝東南上者各剉三條烏梅五十箇拍破此三味用綿裹同鼈煎煮至半去桃桞三味鼈爛取出將肉研入膏骨并殻焙乾為末再入汁中熬如漆色或更入酒少許此在臨時斟酌盛放磁器中搜和藥入臼中杵千下丸如梧桐子大丈夫婦人十五歲已上二十至三十丸温酒下婦人荆芥酒下所煑膏子須斟酌多少勿令剩下却但少些子不妨却别熬酒若膏剩恐鼈不全故也凡服此藥恐熱三五更須服八仙飲子一服觧之八仙飲子常山白术秦芁洪州鬼臼甘草紫蘇赤芍藥銀州柴胡又等分洗净為粗末每服半兩水碗烏梅肉二箇葱白薤白桃槐枝各七寸同煎至一盞去滓温服滓併煎殺鬼丸出聖惠方治婦人骨蒸𫝊尸勞痩鬼氣伏連麝香三分犀角屑木香白术各一兩虎頸骨醋炙鬼箭羽天靈盖醋炙桃仁去皮尖雙仁麩炒黄雄黄各半両辰砂半両右為末煉蜜丸如梧桐子大温水下二十丸藥亦辟瘟疫亦可帶之牡丹湯治婦人骨蒸經脉不通漸增痩弱牡丹皮一兩半桂去粗皮木通剉炒各一両土瓜根一両半芍藥一両半鼈甲醋炙去裙襴二兩桃仁湯浸去皮尖雙仁麩炒右粗搗莭每服五錢水一盞半煎至一盞去滓温服空心食後天門冬丸出大全良方治伏連𫝊注腹中有堅硬積氣壅心胸作痺痛引脇皆痛脘膈妨悶鬼臼天門冬去心各三分巴豆芥子不蛀皂角醋炙各半両葉子雄黄一兩右為細末煉蜜為丸如小豆大每服一丸漸加至三十丸空心湯水吞下臨卧一服常宜斟酌勿令泄瀉忌鯉魚山猪蘆笋飛尸血厥附論夫飛尸者遊走皮膚穿臟腑每發刺痛變作無常遁尸者附骨入肉攻作血脉每發不可近見尸䘮聞哀便發風尸者滛濯四肢不知痛之所在每發昏沉得風雪便作沉尸者纒骨結臟衝心脇每發絞切遇寒冷便作注尸者舉身沉重精神錯雜常覺昏廢每節氣至變輙成大惡宜服忍冬葉方人平居無疾苦忽如死人身不動揺黙黙不知人目閉不能開口噤不能言或㣲知人惡聞人聲但如眩冐移時方寤此由汗多血少氣併於血陽獨上而不下氣壅塞而不行故身如死氣過血還隂陽復通故移時方寤名曰欝冐一名血厫婦人多有之宜服白薇湯倉公散方雄朱散出大全良方治因䘮驚憂悲哀煩惱感尸氣而成變動不已似冷似熱風氣觸則發雄黄研朱砂研苦梗𦍑活當歸川烏炮升麻龍齒别研犀角屑白术芍藥木香鬼箭羽白殭蚕虎頸骨醋炙紫蘇子炒川芎南星炮山梔子陳皮芥草枳殻去穣麩炒黄芩各一分麻黄半両去根莭蜈蚣二條炙去頭足㯽榔二個全蝎一分炒右為末每服二錢温酒調下一日三服白薇湯出大全良方治婦人欝冐血厥忽如死不動不知人目閉口噤移時㣲寤由汗多血少氣併於血陽獨上而不下氣壅塞而不行氣過血還隂陽復通故移時方寤婦人多有此病白薇當歸各一両人参半兩甘草一分右㕮咀每服五錢水二盞温服倉公散出大全良方治卒鬼擊鬼疰鬼刺心腹如刺下血便死不知人及卧夢魘嚙脚趾不覺者并諸毒氣等疾𤓰蔕藜蘆末雄黄研礜石右為末研停用少許吹入鼻中得嚏氣通便活未嚏再吹以得嚏為度此藥能起死人恐皂角者為正樟鎮寳金寺僧傅脘王善醫術一日偶皆往舖中市藥藥舖主人請僧就視一病僧因拉手同到病者榻前扶一病婦年約五十閉目昏黙醫者五六軰環視問之皆以生飲順元散對僧診脉後一揖而出病家邀之不來主人曰以倉公散吹入鼻中嚏而醒後與藥問之則曰諸醫得将不察耳此病乃欝冐血厥許學士本事方白薇湯其證也若風藥則謬矣服至二十丸乃安治𫝊尸血厥出大全良方右以忍冬葉剉數斛煮令濃取汁煎之如雞子大日三服鼻衂附論夫婦人鼻衂者由傷動血氣所致也凡血氣調和則循環表裏經絡澀則不散若傷損動因而生熱氣逆流溢入於鼻者則成鼻衂也只有産後見衂者不可治評曰凡鼻衂雖多因熱而得此疾亦有因怒氣而得之者曾趙恭人鼻衂不止諸治不差召予治之先用蘇合香丸四粒次用五苓散濃煎白芽花湯調服即止亦用芎歸湯調理又有一富室男子鼻衂不止脉法數究竟云服丹藥太過遂用黄連黄芩大黄為末水煎服愈調服亦可方觧肌湯出氏方治勞傷體熱鼻血能退熱柴胡麻黄木通茯苓犀角赤芍藥蒲黄黄芩葛粉生地黄甘草各等分右剉散每服四錢水一盞半生薑三片紅棗二枚煎不計時候温服阿膠散出聖惠方治婦人鼻衂出血數升不知人事阿膠一両摶炒黄燥桂心半両細辛半両龍骨半両當歸半両剉㣲炒蒲黄一両亂髪灰一両右為散每服二錢温酒調下不計時候治婦人鼻衂出血數升不知人事出聖惠方用𢷬楮葉汁飲一中盞效又方出聖惠方用艾灰吹鼻中又方出聖惠方用研紫檀木令細吹鼻中又方出聖惠方用梁上塵塞鼻中刺蘇散出聖惠方治婦人鼻衂血不止刺蘇二両桑耳二両亂髪灰艾葉各一兩炒生地黄二兩蒲黄一両半右為細末每服二錢無時粥飲調下一方為散每服三錢水一中盞入淡竹茹一分煎至六分去滓不計時候温服黄連散出聖惠方治婦人鼻衂不止心神煩燥黄連一両去髪犀角屑一両刺蘇二両雞蘇葉二両生地黄一両右為末散每服四錢水一中盞入生薑半分煎至六分去滓温服不計時候生乾地黄散出聖惠方治鼻衂血出數升不知人事生乾地黄二兩黄芩一兩阿膠二両𢷬碎炒黄燥栢葉一両甘草一両炙㣲赤剉右為散每服三錢水一中盞煎至六分去滓温服不計時候藕汁飲出聖惠方治婦人鼻衂出血數升不知人事生藕汁三合生地黄汁三合刺蘇汁三合牛旁汁三合白蜜三合右相和令勻每服一合不計時候犀角地黄湯出大全良方治内有瘀血鼻衂吐血靣黄大便黒心胸徹背痛芍藥三分生地黄半斤牡丹皮去心一兩犀角屑一両如無升麻川者代右㕮咀每服五錢水煎服有熱如狂者加黄芩二両蒲黄散出聖惠方治婦人鼻衂出血數升不知人事鹿角膠三両摶炒黄燥艾葉一両㣲炒續斷一兩蒲黄一両右為細散每服二錢煮竹茹粥飲調下不計時候麝香散出聖惠方治婦人鼻衂出血數升不知人事人中白一分石榴花一錢故錦灰一錢麝香半両右細研為散每取少許吹鼻中伏龍肝散出聖惠方治婦人鼻衂出血數升不知人事生地黄汁六合刺蘇汁六合生麥門冬汁六合伏龍肝末右煖三味汁調下伏龍肝末一錢生地黄飲出聖惠方治婦人鼻衂出血數升不知人事生地黄一両生薑二両阿膠一両摶碎炒黄燥别研為末右先研地黄生薑取入阿膠末於銀器内煖過每服一合麥門冬飲子出濟生㧞粹治衂血不止麥門冬生地黄右剉每服一兩水煎衂血先硃砂蛤粉次木香黄連大便結下之大黄芒硝甘草生地黄瘡軟子黄芩黄連可選而用之又方治婦人鼻衂出血數升不知人事錦灰一分人中白一錢右相和研令勻分為二服以温水調下立效又方石膏牡蠣右等分搗羅為末更研以新汲水調如煎餅面滴於鼻中立止又方蓮子心末刺蘇汁右研令勻每用酒鼻中治産後鼻黑色及鼻衂脉當在血海起攻於鼻口血交左右於其産後氣消血敗榮衛不理散亂入於經内不還故令口鼻黑起及變鼻衂緣此産後虛熱變生大病日乆不可治名曰胃絶肺敗遇有此病疾用緋線一條掛在産婦項髪兩條縳在婦人兩手中指莭間其血衂即止又方治婦人鼻衂出血數升不知人事用白米粉以新汲水調下一錢又方用燒蝟皮灰細研入大豆少許綿裹内鼻中塞之又方用飲白馬尿一合即止又方用飲赤馬通汁一合并􅂒入鼻中立止又方用青箱草汁灌入鼻中又方用人中白細研吹鼻又方用石榴花栢葉等分細研吹鼻中又方用𢷬苧根汁一合飲之立止桑白皮散治心胸積氣作胸痺引兩脇痛昏悶不收音聲不清虛熱上壅作鼻衂桑白皮三分枳殻木通生乾地黄白芍藥子苓甘草右為粗末每服三錢重水盞半煎至七分去滓温服食後普濟方卷三百十九
