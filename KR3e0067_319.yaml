藥大治經事不調或腹有血塊或乆無子息服之數月其效特異但非可數服責其無功或因下血過多發為寒熱當用當歸地黄之類如大建中湯藥令湯養榮湯十神飲雙和散軰是也然有痰飲停積之人則難用此盖當歸地黄與痰不得其宜由是不進飲食遂成眞病至於困頓者多矣痰飲中致生寒熱者宜以二陳湯参蘓飲等藥療之應手而效更有服退熱冷藥太過因而咳嗽不利發熱自汗皆可用惟眞武湯増損名故陽湯仍佐以震靈丹其詳更於眞武湯方中求之如早灸膏肓其效尤着但是病虚損發熱若虚勞寒熱及乆患瘧疾皆宜灸之輕者穴五七十壯養其火力重者三數寅夜熱若永除次日再灸數十壮或有餘熱逐日炙三七壮養其火力以熱退為期今人見病人畏灸多謂無力勝火當候少愈此大不然倘能漸安又何必灼艾此皆悠悠之語成則悔無及矣凡灸比穴者切不可炙三脘腹中臍下等處若前後受火則灸氣交攻中脘隔截往往嘔吐清水或氣息喘急或渴欲引飲名為水刑灸有致斃治法以黒豆煎湯徐徐觧之輕者尚可療也或謂炙膏肓多致不救然乃灼艾傷脘已不及耳秦芁散出大全良方治血經有熱月脉凝滯五心煩倦麥門冬秦芁各一兩生地黄當歸各半兩地骨皮欝金蘇木各半兩右為細末每服一錢半水一盞紅花少許同煎至七分温服若經脉調不用紅花忌酒熱物此方可服一年冷勞附論夫冷勞者由血氣不足表裏俱虛臟腑乆挾宿冷致令飲食不消腹内積聚臍下冷痛月候不調骨莭痠痛手足無力肌膚羸痩面色痿黄故曰冷勞也方木香丸出聖惠方治婦人冷勞經脉不調臟腑氣滯四肢疼痛飲食無味漸加羸痩木香琥珀吳茱茰炮當歸牡丹皮三稜赤芍藥附子炮延胡索川芎各三分北柴胡乾薑人参桂心白术厚朴熟地黄鼈甲醋炙去裙襴陳橘皮各一兩右為末煉蜜為丸如梧桐子大每服三十丸空心服温酒下栢子仁丸出聖惠方治婦人冷勞腹脇疼痛不思飲食四肢少力漸加羸痩栢子仁三分乾漆三分搗碎炒令煙出當歸三分剉碎㣲炒麝香半兩細研鼈甲一兩半塗醋炙令黄去裙襴紫石英三分細研水飛過熟乾地黄白术肉蓯蓉酒浸一宿剖去皺皮乾乾薑炮製剉牛膝去苖桂心赤芍藥附子炮製去皮臍芎藭木香琥珀桃仁各三分湯浸去皮尖雙仁麩炒㣲黄右為末入麝香令勻煉蜜和擣三二百杵丸如梧桐子大空心及晚食前以温酒下三十丸猪肝散出聖惠方治婦人冷勞脾胃虚乏大腸轉洩水榖不化四肢羸痩口内生瘡不思飲食漸加無力宜服此藥北柴胡縮砂仁蒔蘿蓽撥各三分蕪夷仁白术白芷胡椒白薑陳皮茵陳人参木香紫苑白芍藥北細辛桂心各半兩右為細末以獖猪肝一具去脂膜切如桞葉片以新汲水洗過入葱白三寸細切入藥末半兩於銚内以新水二大盞入塩酌少許甆椀合着令水盡空心以意食之喫粥飲下食後良乆飲煖酒一盞為妙晚食前再服亦佳煮肝散出聖惠方治婦人冷勞靣色痿黄不多思食或時腹痛四肢少力積漸羸痩白芍藥川芎苦梗厚朴桂心各三分白薑當歸荆芥穗蒔蘿胡椒蕪夷仁膏永柴胡紫苑各半兩陳皮一兩半右為細末每服半兩以獖猪肝一具用塩醋葱白各少許相和如尋常煮熟空心任意食之然後喫温酒二盞尤佳治經脉不調少思飲食熟乾地黄鼈甲陳皮各半兩北五味子當歸川芎桂心各半兩川牛膝人参白附子白芍藥白茯苓黄耆各二分甘草一分右為細末煉蜜丸如梧桐子大空心温酒下三十丸厚朴散治婦人冷勞氣靣色痿黄四肢羸痩多卧少起不欲飲食身體虛困厚朴一兩去麄皮塗生汴薑炙令香熟木香半兩當歸三分剉碎㣲炒白术人参去蘆頭各三分熟乾地黄一兩半夏半兩湯浸七日去滑牛膝二分去苖白茯苓三分乾薑半兩炮製剉白芍藥半兩附子三分炮製去皮臍陳橘皮三分湯浸去白穣焙甘草半兩炙㣲赤剉右為麄散每服四錢以水一中盞入生薑半分去滓不計時候温服牡丹丸治婦人冷勞血海氣虚經絡不利四肢疼痛不欲飲食漸加羸痩牡丹三分牛膝一兩去苖桂心三分附子一兩炮製去皮臍木香三分桃仁一兩湯浸去皮尖雙仁麩炒㣲黄熟乾地黄一兩水蛭三分炒令黄乾漆三分搗碎炒令煙出芎藭三分菴䕡子三分䖟蟲三分去翅足㣲炒延胡索半兩當歸三分剉碎㣲炒右為細末煉蜜和擣三二百杵丸如梧桐子大空心及晚睡前以温酒下三十丸牛膝丸治婦人冷勞血氣凝滯靣色痿黄四肢羸痩不思飲食腹中多痛牛膝一兩去苗川椒一兩去目及閉口者㣲炒出汗青橘皮三分湯浸去白穣焙芎藭三分木香半兩附子一兩炮製去皮臍當歸三分剉碎㣲炒白术乾薑各三分炮製剉碎熟乾地黄一兩澤蘭三分肉豆蔲一兩去殻蓬莪茂一兩硇砂一兩半研入右為末煉蜜和擣三二百杵丸如梧桐子大空心及晚食以煖酒下三十丸訶棃勒散治婦人冷勞氣攻脾胃腹脇妨悶四肢不和喫食减少漸至虚羸訶梨勒皮厚朴去粗皮塗生薑汁炙令香熟柴胡各一兩去苖木香半兩當歸半兩桂心半兩芎藭三分白芍藥三分白术三分陳橘皮二分湯浸去白穣熟乾地黄三分人参三分去蘆頭牛膝一兩去苖甘草一分炙㣲赤剉右為粗散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候温服桃仁散治婦人冷勞氣滯經脉不通腹脇妨悶四肢羸痩不思飲食一方有鼈甲木香呵子皮白薑桃仁人参各半兩陳皮琥珀桂心各一兩赤芍藥延胡索赤茯苓川牛膝當歸白术各三分右㕮咀每服四錢水一盞生薑三片煎至七分去滓空心温服厚朴湯治婦人下焦勞冷膀胱腎氣損弱白汁小便俱出用厚朴如手大長四寸以酒五升煮兩沸去滓取桂一尺為末内汁中調和一宿勿食旦頓服一方無桂用水濃煎空心温服治月水不通硇砂煎丸治婦人冷勞