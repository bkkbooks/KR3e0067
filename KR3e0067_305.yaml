body:
  text: 普濟方卷三百五明周王朱橚撰杖瘡門總論論曰凡杖瘡入水則兩胻外臁作瘡年深未差膿汁常有涓涓不乾之狀蓋由中焦有緑水之注故也且人被杖之時感驚氣入腹驚則膽傷足少陽經也兼兩外臁皆少陽之部此膽中甲木受邪甲木色青當有緑水少陽在中焦如漚既伏驚涎在中焦飲冷水咽為驚涎所阻水隨經而旁入瘡中故飲水則瘡中水出乃上湧寒痰汗如水流若緣水下盡而痂自乾證亦無患矣昔一男子被杖瘡痛焮發毒氣入裏驚涎堵塞牙禁不開粥藥不下前後月餘百治無功遂以三聖散吐青蒼驚涎次以利膈丸百粒下臭惡燥糞復煎通聖散數錢熱服之又以酸辣蔥醋湯發其汗吐交出其人自活杖瘡方乳香膏出危氏方治老金瘡杖瘡神效乳香沒藥各七錢白芷當歸羌活獨活川牛膝五錢川芎自然銅七錢石膏劉寄奴黑牽牛熟地黃赤芍藥黃丹紫金皮各五錢黃蠟一兩右為末用清油四兩煎沸即入藥同煎留膠香黃蠟黃丹末入用柳枝不住手攪試將欲成膏却去三味更試成膏生布濾淨用瓦器盛水傾在水中用箄攤開貼傅瘡口孔深者撚成膏條穿入孔中不問淺深放瘡上作熱加輕粉梅花腦子朴硝入膏內貼之濕摻藥沒藥三錢乳香三錢輕粉蜜陀僧自然銅血竭各一錢黃蠟四錢磁片末少許十分細藥油少許膏藥少許右先以藥油膏藥于銚內熬次入黃蠟令化諸藥不住手攪勻然後傾在瓦盞內如杖瘡有孔者用滚湯潑開候溫傾少許加於瘡孔內仍以膏藥貼之洗藥天南星草烏大黃貝母荆芥劉寄奴川椒降真纒野紫蘇右不以多少用水半小桶煎滚熟去粗傾於桶內入炒鹽煨蔥布帛蘸湯淋洗瘡靨上候瘡微癢然後徐徐揭靨以湯淋洗治杖瘡腦子五分重麝香五分重龍骨胭脂蜜陀僧輕粉熟寒水石乳香沒藥各一錢為末右為細末乾摻瘡上周圍用生麵糊圍定次用緋紅絹帛貼之乳香散出儒門事親治貼杖瘡腫痛大黃黃連黃蘖黃芩已上各三錢乳香另研沒藥另研已上各一錢腦子少許右為末後入三味冷水調勻攤於緋絹上貼杖瘡上杖丹大黃黃連黃芩梔子白芷芒硝南星各等分右先將油紙用皂莢湯煎去油水洗淨却用藥銼碎布汁中煮三二次除乾入白芨末摻煮依舊撈起隂乾若敷時用水浸濕貼於杖瘡上神讓散亦名鬼代丹出德生堂方治打著不痛地龍二兩蜜陀僧三兩無名異三兩自然銅火煆三兩木耳一兩乳香沒藥各半兩右為細末臨受杖時先用熱酒調服不然驚氣奔心惡血入腹若杖瘡少差以藥油調此藥傅之用膏藥貼之一方無木耳蜜陀僧用木鱉子蜜為丸彈子大每服一丸蔥湯送下溫酒亦可杖瘡有血一名如聖散方見金瘡門金刃所傷類七味如聖散杖瘡藥真緑豆粉一斤槐樹皮四兩右同入鍋內文武火炒令黃色去槐枝加乳香少許為末用井花水調立刻不疼痛五黃散一名乳香膏出濟生拔萃方治杖瘡定痛拔毒消腫黃丹黃連黃芩黃蘖大黃乳香各等分右為細末新水調成膏用緋絹帛上攤貼一方無乳香治杖瘡方血竭輕粉乾胭脂蜜陀僧乳香沒藥右各等分為末冷水洗淨拭乾豬脂調搽扯碎紅紙貼自愈龍腦潤肌散出宣明論治杖瘡熱毒疼痛黃丹一兩蜜陀僧半兩麝香半兩輕粉一錢半龍腦一字右為細末摻藥在瘡上用青帛子塗之內留一孔治枚瘡神效方一名乳香散出濟生拔萃乳香沒藥各三錢茴香四錢自然銅火燒醋蘸七遍當歸各半兩右為細末每服五錢溫酒調下治金瘡及棒瘡風化石灰入黃丹狗血研細作餅子挂當風令待乾血竭乳香龍骨沒藥炒右為細末傅傷處立愈加赤石脂尤良一方有蔥無石灰治棒瘡方黃連黃柏白斂白芨五靈脂右等分為末井水調塗綿貼不用洗一服便好沒藥散治杖瘡止瘡痛令瘡不移蜜陀僧沒藥乳香各一兩乾胭脂一兩半膩粉半兩右為細末次入龍腦少許若多更妙燒蔥與羊骨髓生用同研如泥攤在緋帛上貼之靈異膏治杖瘡金瘡攧撲皮破湯火所傷久年惡瘡川鬱金三兩真者生地黃二兩去土粉草一兩臘月豬板脂一斤右銼如豆粒大入脂內煎黑焦色濾去藥渣入明淨黃蠟四兩熬化逐旋入攪勻用磁器盛貯水浸之久去水收之每用時先以冷水洗瘡挹乾却敷藥在瘡上外用白紙貼之止血定疼且無瘢痕湯炮火燒不須水洗治陳瘡尤妙沒藥散出濟生拔卒治杖瘡乾胭脂乳香沒藥輕粉各等分右同研極細泄洗了摻瘡上圍藥治若四下腫脹不破用於四下不破處圍定消腫定疼痛無名異一錢半炒木耳去土一錢半炒大黃一錢半炒右研極細用蜜并藥油調圍腫處治杖瘡及諸般腫毒白芨黃連黃丹右為末入磁碗內用新水攪打候藥澄結去水以黑傘紙攤膏藥貼上其冷如氷神效治杖瘡出千金方石灰七斤新豬血一升右和為丸熟燒之破更丸燒三遍止為末傅上治杖瘡方木耳生芝麻右搗碎圍於杖瘡上其出血小毒甚妙治杖瘡出千金方用釡臍下土為細末以油和塗訖卧羊皮上瘥又方出千金方服小便甚良治杖瘡不作瘢止痛出本草用黍米燒為灰和油塗之治杖瘡出本草以爵牀汁塗患處立瘥俗名赤根老母草治杖瘡并打損瘡中風疼痛者出本草炒馬驢濕糞分取半替换熱尉之冷即易之日五十遍極效治杖瘡方用冬青樹葉搗汁取乳雞毛刷數次即效又方用平胃散嚼帶殼銀杏用蜜調傅之鬼代丹療人打著不痛甚妙用地龍去土炒為細末每服三錢溫酒調下後食黃蠟為丸如桐子大每服三十丸細嚼溫酒一盞生䓤三五莖臨決時用之神效杖瘡惡瘡膏出永類鈐方黃丹二兩水飛清油六兩白膠香四兩淨黃連半兩檳榔六箇杏仁一十箇生用如作膏法一方加桃仁乳香沒藥有損加白膠香治棒瘡出永類鈐方用連鬚䓤煨熱擦甚妙杖瘡不問輕重先逐寒邪方治瘡口切不可與酒則寒邪不散生他證不能便愈看老弱先服香蘇散元有熱服敗毒散三四服然後服十宣散除杖瘡上用水調膏用菉豆粉清油白水各半調塗住痛用一黑散赤龍鱗煆存性採即古松皮退腫用一黃散鬱金四錢赤石脂三錢白芷二錢天花粉三兩腫甚加荆芥一云紅內消如不用白芷加獨活並用搽調貼瘡口外留口其他瘡如無膿熱酒調貼如有膿薑汁三分茶清七分調杖瘡用乳香煎油調傅瘡口內外皆有用仍加善應等膏藥貼肉潰爛用生肉藥摻或腫不消用破血藥外以針刺去瘀血用一黃散傅貼一黃散逐時調下早調下則不驗如臭洗藥中加藿香或杖後被人施毒藥急燒百沸湯候溫以芒掃梗五六寸二百莖乾淨一橫一直磊病臀上用二人於病腿上壓出瘀血扛出於熟冷水中淨洗至無血為度忌毒食行房不淨席卧登厠薰觸或有杖後苦痛只加乳沒二藥出永類鈴方治杖瘡出本草以七仙草搗枝葉傅之治杖瘡出本草取牛蒡葉貼之永不畏風不膿亦搗傅之治杖瘡出本草取古厠木燒煙於瘡上熏之冷風不入治杖瘡出本草用馬齒莧搗傅之普濟方卷三百五
