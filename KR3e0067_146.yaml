body:
  text: 普濟方卷一百四十七明周王朱橚撰傷寒門傷寒雜治附論夫風寒暑濕飲食勞倦皆能為病是謂五邪冬傷於寒春必病溫春傷於風夏必飱泄夏傷於暑秋必痎瘧秋傷於濕冬必咳嗽是乃四時之氣然五邪所中雖不同本皆外邪大率同類惟冬時嚴寒其毒厲尤甚人或中之病在冬時正名傷寒若邪毒藏於肌膚至春時乘盛暑而發為暑病所謂先夏至日為病溫後夏至日為病暑是也其病傳之次先客於太陽其病令人頭頂痛腰脊強其脈尺寸皆浮太陽不已傳於陽明其病體熱目疼鼻乾不得卧其脈尺寸皆長陽明不已傳於少陽其病胸脅痛而耳聾其脈尺寸皆弦少陽不已太隂受之其病腹滿體重其脈尺寸俱微太隂不已少隂受之其病口燥舌乾而渴或背微惡寒其脈尺寸俱沉少隂不已厥隂受之其病煩舌囊縮其脈尺寸俱緩病之所傳不過三陽三隂而已其未滿三日者邪在陽經未入於裏其病在表宜汗之而愈若經四日者邪入隂經其病在裏宜下之而愈特其大略爾蓋有一日而傳至數經者亦有數日而尚在太陽者陽病雖宜發汗陽明之病或宜下之隂病雖宜下之少隂之病或宜溫之由人之稟受虛盛其傳有遲速又不傳經者當審其脈證凡此五經受病五邪脈證各不同傷風者必惡風其脈浮緩傷寒者必惡寒其脈浮緊以至傷暑脈虛傷濕脈緩於人迎緊盛為傷寒氣口急盛為傷食診得五邪之症知其本也診得六經知其標也有病雖在表而不可汗者或在裏而不可下者或若汗之太多則津液燥竭遂至亡陽下之太早則邪氣動膈乃或成結胸清濁相干則變為霍亂熱毒內瘀則變為瘀血又或為發黃者濕熱相蒸也或為發班者陽毒太盛陽盛之人得之於熱乃為陽毒隂盛之人得之於寒乃為隂毒蠱動則為狐惑壞病之甚則為百合若勞動復傷隂陽易之類雖瘥猶宜節慎變態多端不可備舉當以類推皆以適當為良唯二感之病表裏皆受邪難治其他或隂證似陽陽證似隂或隂盛隔陽陽盛隔隂者在診病者以意詳之夫人生天地間以氣血籍其真是故天無一嵗不寒暑人無一日不憂苦故有傷寒天行溫疫之病蓋冬令為殺厲之氣君子善攝生者當嚴寒之時行住坐卧護身周密不受寒毒彼奔馳荷重房勞之人皆辛苦之徒耳當閉藏而反擾動之則鬱結臟腑津液強耗為寒所搏則腠理不密寒毒與榮衛相渾當是之時壯者氣行則己怯者則著而成病矣不即病者寒氣藏於肌膚之間春則病溫夏則病熱此皆一氣使然也古之治法一日在皮當摩膏而火灸之二日在顱依法針解而發散之汗出愈三日在肌亦發汗愈四日在胸宜吐之五日在腹六日在胃宜下此華陀之治法也若按三隂三陽之法傳變無出仲景之論蓋治傷寒有傷寒之法治雜病有雜病之方豈能異其傳者同其治調理隂陽當按定法也至初得病者頭旋惡心振寒此即素問所謂時欲作嘔起居如驚神氣乃浮者是也傷寒如仲景明六經受病轉變者及素問所謂熱病也若病作無次第初得病表裏不明或先熱而渴不惡寒此即江南謂之黃病北方謂之汗病或長幼遞相染著又是天行時氣新傷寒以輕劑散之如蔥白散和解散皆可用如六經傳變者當如仲景法有表證者麻黃湯桂枝湯有寒證互見者各半湯見裏證者小承氣湯十棗湯深者大承氣湯半表半裏小柴胡湯見痞及結胸者小陷胸湯皆可用腹滿者理中丸此遇太隂者傳少隂便見厥逆脈浮細即當投四逆湯若見厥隂證用藥不可造次大凡仲景法皆可間用發表則用防風通聖散雙解散入腑三乙承氣湯大柴胡湯結胸痞滿大陷胸湯寒入隂經附子四逆湯半表半裏和解多用涼膈益元散傷暑亦依仲景用白虎湯桂苓甘露飲益元散備見真恪方子和法發表勝黃湯青龍湯和解涼膈散當發表用通聖散逐去水腫必須禹切散舟車丸如大水中滿用之極驗方人參輕骨散治傷寒頭痛壯熱項背拘急百節煩疼增寒惡風肢體困倦大便不調小便赤澀嘔逆煩渴傷風頭痛體熱鼻寒聲重咳嗽傷山嵐瘴氣潮熱往來及五勞七傷心腹痞滿冷氣奔沖攻注刺痛又婦人血傷撮痛經候不調貝母去心白茯苓焙半夏煮各一兩枳殼去穰炒二兩五錢蒼术泔浸一宿六兩人參白术焙白芷不見火陳皮去白秦艽去蘆赤芍藥各二兩川芎當歸去蘆焙肉桂去粗皮乾薑柴胡去蘆麻黃去根節各三兩桔梗去蘆甘草炙各四兩厚朴薑製四兩右細末每服三錢水一盞薑三片同煎七分通口熱服身體倦加烏梅一箇咳嗽加棗子二枚同煎不拘時服蔥白散解四時傷寒頭痛壯熱項背拘急骨節煩疼憎寒惡風肢體困倦大便不調小便赤澀嘔逆煩渴不思飲食及傷寒頭痛體熱鼻寒聲重咳嗽痰涎山嵐瘴氣時行疫癘並皆治之川芎蒼术米泔浸白术各二兩甘草炙石膏煆甘葛焙各一兩麻黃去根節三兩右細末每服三錢水一盞薑三片蔥白二寸煎至七分熱服不拘時侯要出汗併三服厚蓋取汗神仙百解散一名神仙四季加減百解散治傷寒無問隂陽二易證其間所用藥味各隨經絡治病如傷寒在表未傳入經發熱惡寒腰痛連進二服汗出而愈若已傳經絡胸滿頭痛肢體煩疼目睛微痛耳聾口燥咽乾或渴手足自溫或肢厥自利或不自利小便反快服之則調中順氣袪逐寒邪如頭靣感寒風傷腠理頭痛項強發熱增寒鼻流清涕咳嗽涎痰及治風濕相摶骨節煩疼肢體沉重灑淅惡風時自汗出此藥大能調順三焦解表攻裏溫潤肺經正四時之氣升降隂陽能進飲食不問傷風傷寒中暑中寒骨蒸頭疼氣逆胸滿吐逆眩暈惡心及已經汗後不解下之不當吐之不中此藥清而不涼溫而不壅無問老年虛弱男婦人並皆服之如連進數服無不取效常服免瘟疫之疾不中暑寒之病秋服之即無瘧痢冬服之不致傷寒毒真神仙衛生妙藥也功效不可盡述山茵皮一兩柴胡去蘆前胡人參羌活獨活甘草蒼术米泔浸銼炒藿香去梗白术半夏薑汁製各一兩乾葛白芍藥升麻防風去苖藁本去蘆立春以後不加減立夏以後一料加柴胡一分赤茯苓當歸酪立秋以後酌減柴胡一分不用當歸茯苓只加乾薑炮肉桂去粗皮各一兩麻黃去半兩立冬以後並無加減一方無當歸有黃茯苓去蘆半兩右為細末每服三錢水一盞半薑三片栆三枚煎至一盞熱服不計時侯併進二服如要表散加蔥白三寸淡豆䜴三粒同煎服以衣被厚蓋出汗而愈一方無山茵蔯前胡八解散出和濟方治四時傷寒頭疼壯熱傷風多汗及療勞傷過度骨節酸疼飲食無味四肢疼痛行步喘乏靣色痿黃怠惰少力咳嗽寒熱羸弱自汗胸膈不快嘔逆惡心人參去蘆茯苓甘草炙陳皮去白白术藿香去上各一兩厚朴去粗皮銼生薑自然汁浸一宿炒紫色二兩半夏湯洗七次一兩右為細末每服二錢水一盞生薑三片棗子一枚蔥白三寸同煎七分溫服不拘時侯白术散出危氏方治傷寒氣脈不和憎寒壯熱鼻塞腦悶涕唾稠粘痰嗽壅滯或冒涉風濕憎寒發熱骨節疼痛或中暑嘔吐眩暈及大病後調理失宜飲食勞復病證如初又治五勞七傷氣血虛損靣色痿黃精神恍惚睡卧不寧肢體倦怠潮熱盜汗脾胃虛弱面色痿黃飲食不美口吐酸水臟腑滑泄腹內虛鳴反胃吐逆心復絞痛久瘧久痢及膈氣咽塞上氣喘促坐卧不安或飲食所傷胸膈痞悶腹脅膨脹婦人胎前産後血氣不和霍亂吐㵼氣厥不省人事常服辟四時不正之氣及山嵐瘴疫神效不可盡述山藥桔梗茯苓去皮甘草白芷陳皮去白青皮去白香附子各三錢白术四兩乾薑炮三兩右為細末每服二錢水一盞薑三片棗一枚木瓜乾一片紫蘇葉三片煎七分食前服若吐㵼入白梅煎喘入桑白皮杏仁煎傷寒再復入薄荷膈氣入木通三寸麝香少許中暑嘔逆入香薷産前産後氣血不和入荆芥霍亂入藿香氣厥入鹽湯調下一方無陳皮嗽入粟殼烏梅煎藿香正氣散出德生方治傷寒頭疼憎寒壯熱上喘咳嗽五勞七傷八般風痰五般膈氣心腹冷痛反胃嘔惡氣㵼霍亂臟腑虛鳴山嵐瘴瘧遍身虛腫婦人産後血氣刺痛小兒疳傷並宜服之大腹皮白芷紫蘇茯苓去皮各一兩半夏麯白术陳皮去白厚朴去粗皮用薑汁炙苦梗各二兩藿香去土三兩甘草炙二兩半右為細末每服二錢水一盞薑三片棗三枚同煎至七分熱服如欲出汗衣被蓋如再汗不出加蔥白根煎服冷嗽喘滿每服加人參一錢鹽梅一箇杏仁七粒去皮尖北五味子十粒就吞青州白丸三十五粒效氣促氣壅加人參一錢沉香五錢心腹痛加木香半錢玄胡索七粒切焙嘔惡甚加生薑三片木瓜二片痰嘔加烏梅一箇寒濕腰痛心腹膨滿加生薑三片木瓜二片蒼术功砂枳殼煨去穰各半錢檳榔半箇切片一方治憂鬱血氣流注遍體刺痛緊滿加木香一錢縮砂五粒增減順氣木香丸荆芥散出和劑方治傷寒頭疼鼻寒流涕聲重咽乾胸膈滿悶頭疼如破天南星湯浸生薑自然汁炙輕切培乾草烏頭炮去皮荆芥穗各半兩石膏研一兩右為細末每服二錢陳茶末一錢生薑自然汁半呷薄荷三葉水二盞同煎八分通口服赤散出千金方治傷寒頭痛項強身熱腰脊痛往來有時乾薑防風沙參細辛白术人參蜀椒茯苓麻黃黃芩代赭桔梗吳茱茰各一兩附子二兩右製下篩先食酒服一錢鐡青湯出千金方治三隂三陽厥逆寒食胸脅支滿不能言氣滿肩息四肢時寒時熱喘悸煩亂吸吸少氣言輒飛揚虛損黃鐡三十斤以流水淘二三千遍炭五十斤燒鐡令赤投冷水中又以燒七遍如此澄清取汁二斗煮藥半夏麥門冬各一升白薇黃芩甘草芍藥各四兩人參三兩石膏五兩生薑二兩大棗三十枚右㕮咀內前沖中煮取六升服一升日三服兩日令盡百解散出百選方治傷寒頭痛肢體沉重惡寒發熱痰逆咳嗽困倦少力及偏正頭痛此藥專解四時傷寒常服清神爽氣瘟疫瘴癘不生防風去蘆三兩半麻黃三兩半去蘆根白芷白芍藥各二兩川烏梅五錢炮去皮尖甘草荆芥穗乾薑各三兩右為細末每服二錢蔥茶或蠟茶點服不拘時候煎服亦可正氣散出和劑方治傷寒隂證增寒惡風正氣虛冷胸膈噎悶脅肋膨脹痞滿吐利嘔逆酸水咳逆怠惰嗜卧不思飲食甘草皮七錢陳皮藿香葉白术各一兩厚朴半夏同厚朴各三兩為末生薑四兩研爛為餅子微炒右為細末每服二錢薑三片棗一枚水一盞煎至七分食前熱服又治久患瘧疾膈氣心痛日三服常服寬中辟除瘟疫辰砂五苓散出和劑方治傷寒表裏未解頭疼發熱心胸鬱悶唇口乾焦神思昏沉狂言讝語如見神鬼又治瘧瘴煩悶未省等症辰砂研白术去蘆木豬苓去黑皮澤瀉先銼赤茯苓去皮各十二兩肉桂去粗皮八兩右為細末每服二錢沸湯點服不拘時如中暑作渴小便赤澀新汲水調下小兒惡心煩熱焦燥多哭咬牙上攛欲為驚風狀服半錢熱水調李子湯出危氏方治陽明傷風能食口苦咽乾腹滿微喘發熱惡風自汗嗜卧身重小便難潮熱而噦其脈浮弦長而數悉主之杏仁去皮尖半夏湯去滑五味子各二錢半芍藥桂心細辛乾薑炮大黃蒸甘草各二錢炙茯苓右㕮咀每服四錢水一盞半煎至七分去滓食前服白术散出仙明論治傷寒雜病一切吐瀉煩渴霍亂虛損氣弱衰老保養又治酒積嘔噦等證白术茯苓去皮人參各半兩甘草一兩半炙木香一分藿香半兩葛根一兩右為細末白湯調下二錢煩渴者加滑石二兩甚者加薑汁續飲茯苓半夏湯出宣明論治傷寒雜病一切嘔吐或喘咳疼痛痞滿痛者茯苓一分去皮半夏一錢生薑一分取汁右銼如麻豆大水一盞煎至四分絞汁下生薑汁溫服不計時侯一方加黃芩去腐甘草陳皮去穰各一分治風痰解肌湯出經驗良方治大人小兒傷寒病大人全服麻黃去節半兩各用七錢半人參川芎芍藥獨活各半兩前胡二錢半右㕮咀每服四錢水半盞生薑一片薄荷二葉煎至三分去滓三嵗已下小兒一服分作三服口乾加乾葛二錢半川芎茶調散出和劑方治男婦諸風上攻頭目昏重偏正頭疼鼻寒聲重傷風壯熱肢體煩疾肌肉蠕動膈熱痰盛婦人血風攻疰太陽穴疼但見是外感風氣悉皆治之薄荷葉不見火八兩川芎荆芥去梗各四兩香附八兩炒防風去蘆一兩白芷羌活甘草炙各三兩右為細末每服二錢食茶清調下常服清頭目一方無香附增損四順湯治少隂病寒多表無熱但若煩憒默然而寂不欲見光有時腹痛其脈沉細而喜渴經日不瘥舊用四順湯除其熱不可用也若隂病利而體猶有熱者不可復與黃連龍骨湯若已十日餘而下利不止手足徹冷及無熱候者可服甘草三兩炙人參二兩龍骨二兩黃連乾薑各一兩附子中形者一枚炮黑皮右切以水六升煮取二升分再服不差復服甚良若下而腹痛加當歸二兩嘔者加橘皮一兩忌海藻菘菜豬肉冷水陟釐丸出浩涼方治少隂病二十日後下不止陟釐四兩不用􅀈者當歸四兩汗防己三兩黃連三兩紫石英三兩煆研細末豉三升厚朴三兩炙苦酒五升右切以二升苦酒漬防己一宿出切炙燥復入苦酒中浸又以三升苦酒漬䜴一宿小蒸之研絞取汁搗下篩諸藥以酒豉和丸如梧桐子大冷漿水服二十丸忌豬肉冷水通氣丸治少隂不足腎氣微少忽為寒熱太陽下陷入腎中腎氣奔迫內動三焦或發熱頭疼咳嗽痰促或右脅牽痛或傳為疹子等證不一其脈左尺沉而弦按之則虛大而澀此方主之又治上氣神驗葫蘆巴一兩炒補骨脂七錢半玄參五錢杜仲一兩炒斷絲川練子一兩半酒浸三稜五錢羌活茴香各五錢麻黃去節二錢春夏三錢右為細末麵為丸空心薑湯下五七十丸鹽酒下亦可順解散出宣遮方治傷寒凡初受疾未分隂陽表裏皆可服之蒼术半斤藁本水浸桔梗甘草防風獨活各四兩厚朴薑汁炒右為細末每服二錢薑七片水一盞半煎至八分去滓溫服祭酒朴謙之説韶州醫人劉公從周言盛夏熱證有傷寒冒暑二證若熱有進退則為暑若一熱而不間斷者則為傷寒但當以此别之普救散出經效濟世方一名不傳散治解四時傷寒肌熱惡寒頭疼身痛汗與未汗但是隂陽二證皆可服蒼术半斤去皮淨炒葛根四兩甘草二兩炙右為細末每服二錢水一盞半煎至七分去滓溫服或加蔥白三寸一方蒼术米泔浸炒甘草生用或只入山茶蔥湯調下亦可服藥訖欲出汗者須衣被蓋之酒調亦妙萬安散出經驗良方治傷寒輕清發散紫蘇葉陳皮香附去毛桔梗白芷半夏湯炮薑製甘草前胡去頭藁本各一兩乾薑二兩右為粗末每服五錢水一大盞生薑五片棗一枚煎八分去滓食前服加乾薑少許嗽加桑白皮少許欲出汗極熱服無汗用麻黃去節加減法如熱多口渴心煩臟腑堅硬再加前胡臟腑單弱體虛不出汗加桂少許風赤眼目羞明不開再加前胡半兩無熱出汗太過加麻黃根少許六君子湯出德生堂治傷寒汗下之後將見平復宜服此調理助脾進食辟邪大妙人參白术黃蓍白茯苓甘草山藥各等分右㕮咀每服四錢水一盞半生薑三片棗一枚同煎至七分去滓溫服不拘時侯此溫輕之劑如渴加乾薑烏梅煎大便自利加陳皮厚朴砂仁肉豆蔲煎餘熱加銀州柴胡煎對金飲子出德生堂治諸疾無不愈者然傷寒後病退調理大宜時常服固元陽益氣血健脾進食和胃袪痰自然榮衛調暢寒暑不侵此藥療四時傷寒極有功效厚朴甘草蒼术各二兩陳皮四兩一方炒黃半斤一治四時瘟疫之氣二毒傷寒頭疼發熱加淡豆豉三十多粒蔥白三根同煎一治五勞七傷手足心熱煩燥不安肢節疼痛加柴胡半兩捶碎或豬骨亦可煎服一治痰嗽瘧疾寒熱之證加草果檳榔烏梅半夏同煎一治小腸疝氣疼痛發寒熱者加鹽炒小茴香同煎一治大便虛滑頻見加肉豆䓻一兩用麵褁煨過白术一錢同煎一治發熱口渴加地骨皮銀州柴胡烏梅同煎一治赤白痢赤痢加黃連白痢加吳茱茰煎一治服固陽益氣健脾和氣祛痰自然寒暑外邪不侵加人參白术黃耆同煎有虛汗加浮麥煎一治病後體虛加羊骨髓或豬骨髓其骨槌碎同煎服數劑汗出得安如未得汗以稀粥投之厚蓋衣服取汗立愈如水氣腫滿加桑白皮煎婦人帶下加黃耆煎酒傷加丁香食傷加良薑四時泄瀉加肉豆蔲風疾加荆芥穗腿膝冷疾加牛膝其拘急及虛壅加地骨皮腿膝加兔絲子頭風加藁本轉筋霍亂加南木皮以上助使止加一銖此藥無論老少胎前産後五勞七傷耳鳴目昏夢泄盜汗四肢沉重腿膝酸疼婦人宫臟久冷月水不調若能每日一服即美容顔豐肌體調三焦壯筋骨祛冷氣快心胸神效莫述右㕮咀每服五錢水一盞半生薑三片棗一枚同煎至七分去滓溫服不拘時候其滓再煎日進二三服雙解散出經驗良方治傷寒渾身壯熱氣粗煩渴多汗升麻乾葛甘草荆芥蔓荆子薄荷天麻殭蠶知母貝母各半兩右為細末每服四錢水一大盞薑二片蔥白一寸煎至五分去滓溫服小兒作三服通關散出活劑方治中風傷寒發熱惡心頭疼目眩鼻寒聲重肩背拘急身體酸疼肌肉瞤動牙關緊急久新頭風痼疾眼暗並宜服之撫芎二兩川芎一兩川烏二兩薄荷一兩白芷甘草各二兩細辛半兩右為細末每服一錢蔥白茶清調下薄荷湯亦可不拘時候破證奪命散出百選方治隂陽二證不明或投藥錯誤以致患人困重垂危七日以後皆可服傳者云千不失一右用人參一兩去蘆薄切水一大升銀石器內煎至一盞新水澄之取冷一服而進汗不自出只在鼻梁尖上涓如水是其應也妙慧蘇韜光云侍郎方公曾救數十餘人申屠行父子之婦産後病時疫二十餘日已成壞證偶見問因勸其服一味人參遂安是時方知與此方偶然暗合耳一方有生薑桂附湯出危氐方治足少隂腎經傷風胸滿心煩咽痛自汗腰連胻骨酸痛嘔逆吐涎沫頭痛其脈沉弦者附子生去皮劑桂心乾薑芍藥甘草茯苓桃仁去皮尖麩炒各一兩右為散每服四錢水二盞煎至七分去滓食前服或咽痛加桔梗半兩八物湯出危氏方治足厥隂肝經傷風惡風而倦自汗小腹急痛寒熱如瘧骨節煩疼其脈尺寸俱微而遲者桂心當歸川芎前胡防風各二兩芍藥一兩半甘草炙茯苓各半兩右銼散每服四錢水一盞半薑五片棗三枚煎八分去滓空心溫服青膏方出千金方治傷寒頭疼項強四肢煩疼者當歸芎藭蜀椒白芷吳茱茰附子烏頭甘草各三兩右㕮咀以醇苦酒漬之再宿以豬脂四斤煎令藥色黃絞去滓以溫酒服棗核大三枚日三服取汗不效稍增加服黃髙方出千金方治傷寒頭痛項強四肢煩疼者大黃附子細辛乾薑蜀椒桂心各半兩巴豆五十枚右㕮咀以醇苦酒漬一宿以臘月豬脂一斤煎之調適其火下藥成赤色熱酒服梧桐子大一枚又以火摩身數百遍兼治賊風遊走肌膚患處更宜摩之神效白膏出千金方治傷寒頭痛向火摩身體酒服如杏核一枚溫服取汗摩身當千遍藥力及行并治惡瘡小兒頭瘡牛領馬鞍皆治之先以鹽湯洗瘡以布拭之傅膏癰腫火炙摩千下自消天雄烏頭莽草羊躑躅各三兩右㕮咀以苦酒三升漬一夕作東向露竈煎藥令沸下著土聚上沸定復上如是數遍藥成去滓傷寒咽喉痛含如棗核大一枚日三摩用時令勿近目蔥豉湯出肘後方治傷寒有脈數腫痛人不能分别令取一藥兼療者若初覺頭痛肉熱脈洪起一二日便服此方蔥白一擡豉一升綿褁右以水三升煮取一升頓服取汗若汗不出更加乾葛根三兩一方更加升麻三兩水五升煮取二升分溫再服徐徐服亦可必得汗即差若不得汗更加麻黃三兩去節以蔥白湯研米三合水五升煮之少時下淡豆豉蔥白四根令火煎取三升分服出汗為妙又方出肘後方用豉一升綿褁以童便三升煮取二升分溫再服汗出為效五積散出濟生拔萃方調中順氣除風冷化痰治脾胃宿冷腹脅脹痛肩背拘急肢體怠惰寒熱往來飲食不進及婦人血氣不順心腹撮痛經候不調白芷川芎甘草茯苓去皮當歸去蘆肉桂去粗皮芍藥半夏洗七次各三兩陳皮去白枳殼去穰炒麻黃去根節各六兩蒼术米泔浸去皮二十四兩厚朴去粗皮四兩人參二兩一方無人參右㕮咀每服四錢水一盞半生薑三片蔥白連根三寸煎至六分去滓食前熱服尋常皮風濕氣交互為病頸項強直或半身偏疼或肢體麻痺宜用此藥加麝香少許煎服婦人經候不調寒濕腰疼每服加桃仁七枚去皮尖微炒碎同煎婦人經候不調心腹撮痛加白膠香太隂經傷寒手足逆冷或積聚腹痛及虛汗不止脈細面青嘔吐加熟附子數片炒茴香一捻冷氣煨薑三片鹽少許煎腳氣下疰焮然赤腫增寒壯熱亦加大黃一錢利之久虛脾瀉傷食腹痛冷瀉不止加用炒陳米一撮烏梅一箇煎名和氣散心腹膨脹不食亦效乳癰初起加川牛膝生地黃各二根産後或尋常血氣痛加木香玄胡索半錢醋炒陳艾葉七片烏藥半錢婦人體虛腳疼加川烏去皮臍夏令熱寒氣折之秋發寒疫大效一治感冒四時傷寒之病先服前方發散諸藥不效者二三日後汗不出表裏未解此乃汗證傳經必先問其患者渴與不渴大便虛實熱與不熱身上有無紅靨或有自利者有嘔逆者有狂言譫語者變證不一須要詳審是何病證以方對症服藥宜以小柴胡湯服之如有後證加減依方用藥如後方五積散性溫敗毒散性涼凡人偶小感冒對半析和煎服名交加散亦多驗小小感冒因風寒冷所襲猝然劇之正氣未耗邪氣未深用此前數方先以助其氣使正旺則邪氣自散若倉卒未能辨只以蔥白鬚數莖淡豆豉一捻生薑數片水煎熱啜連進三兩盞亦能發散邪氣已入經絡及時行疫癘則須依經按法表裏汗下不可差殊喝起散蒼术泔浸麻黃去節荆芥各二兩石膏煆三兩大黃一兩半蔞根乾葛芍藥白芷甘草各一兩右為細末每服二錢水一盞半生薑三片蔥白三寸煎至七分食前服川芎湯出神效方解利一切傷寒川芎藁本蒼术右件各等分為細末沸湯點三錢須臾覺嘔逆便解如不解再服不卧散出神效方川芎一兩半石膏七錢半藜蘆半兩去土甘草二兩半生右為細末口噙水鼻內各嗅之少許喫白湯半碗汗出解白芷散出百選方治傷寒鼻寒出清涕不已香白芷一兩荆芥一錢右為細末臘茶清調服如不用荆芥薄荷一錢亦佳清膈湯治發散四時不正之氣又傷寒未分證候癍疹欲出而未出並宜服之又療脾寒瘧疾潮熱往來狀如骨蒸久而耳黯唇青面色黧黑舌苦咽乾四肢倦怠飲食無味苦桔梗荆芥穗薄荷葉紫蘇葉甘草節栝樓根牛蒡子乾葛各等分右各無炮製為粗末每服三錢水一盞煎至七分去滓不拘時溫服日進三五服解肌湯出千金方治傷寒天行頭痛壯熱葛根四兩麻黃三兩黃芩芍藥甘草各二兩大棗十二枚右㕮咀水一斗煮取三升飲一升日三服三四日不解脈浮者宜重服發汗脈沉實者宜以駃豉丸下之延年祕録有桂心一兩一方無麻黃治中風傷寒及時氣溫病頭疼壯熱脈盛始得用真丹塗身令遍向火令汗出不拘時萬勿見風使汗出而又閉蓋汗透而邪氣出則愈矣桂枝湯治初得傷寒時氣桂去粗皮甘草炙銼芍藥各半兩杏仁去皮尖炒黃色四十枚乾薑炮半兩麻黃去根節一兩右粗搗篩每服五錢水一盞半煎至八分去滓併兩服以衣被蓋令汗透涼膈散出濟生拔萃方治傷寒表不解半入於裏下證未全下後燥熱怫結於內煩心懊憹不得卧臟腑積熱煩渴頭昏唇焦咽燥目赤煩渴口舌生瘡咳唾稠粘譫語狂言腸胃燥澀便溺悶結風熱壅滯瘡癬發瘢驚風熱極黑陷將死一名連翹飲子亦有加減法連翹一兩山梔大黃薄荷甘草一兩半朴硝黃芩各半兩右為末每服二錢水一盞蜜少許同煎至七分去滓溫服諒虛實加之咽喉痛涎嗽加桔梗一兩荆芥穗半兩咳而嘔者加半夏半兩每服加生薑三片同煎血衄嘔血加當歸芍藥各半兩生地黃一兩淋者加滑石四兩茯苓一兩去皮風昡加川芎防風各半兩石膏三兩酒毒加葛根一兩瘢疹加葛根一兩荆芥穗赤芍藥川芎防風桔梗各半兩三嵗小兒可服七八分或熱甚黑陷復滿喘急小便赤澀而將死者更加大承氣湯約以一錢下之得利者亦便效凡言加者皆自本方加也以意加減之退表裏熱加益元散一方用竹葉七片同煎錢氏去連翹加藿香石膏為瀉黃散雙解散出神效方巴豆六箇去皮油天麻二兩半胭脂錢許右將巴豆天麻為末酒水丸如秝米大胭脂為衣一日一丸二日二丸三日三丸已外不解先喫冷水一口後用熱水下如人行十里以熱湯投之太和湯百沸湯是也治無藥處初覺傷寒傷食傷酒風便服右避風處先飲半碗或以酸虀汁亦妙以手揉肚覺恍惚更服半碗又用手揉至恍惚更服以至厭心腹無所容探吐汗出則已普救散出百選方治傷寒不問隂陽表裏但三日以前皆可服甘草四兩生薑二斤切片蒼术一斤銼右三味淹拌罨一宿次日焙乾碾為粗末每服不拘時候如頭痛加白芷腹痛加香附汗出即愈桂枝石膏湯出千金方治傷寒三日外與藥不差脈勢仍數者陽猶在經絡未入臟腑者桂枝黃芩甘草各二兩升麻葛根生薑各三兩芍藥六兩石膏八兩梔子二十枚右㕮咀以水九升煮二升七合分三服相去十里久若前兩服訖即得汗後服即停不得汗更進一服得汗即止如不得汗者至明日於內去梔子却加麻黃足水二升再依前方煮服之得汗即止一方用白藥子無芍藥還魂丸治傷寒四五日及數年諸癖結堅心下飲食不消目眩四肢疼痛咽喉不利壯熱脾胃逆滿腸鳴兩脅裏急痞石尸鬼注邪氣或為驚恐傷瘦背痛手足不仁口舌乾燥天行發作有時風溫不能久住吐惡水方巴豆去心皮熬甘草炙硃砂芍藥麥門冬二兩去心右五味各搗下篩合以搗三千下丸如梧桐子大每服二丸蔥棗湯下小兒二嵗以上服如麻子大二丸日二服忌海藻菘菜野豬肉蘆笋生血物神术煮散出百選方治感寒凡人寒則傷榮血為榮風則傷衛氣為衛故治傷寒當用當歸數藥蒼术六兩當歸薑汁製厚朴薑製各二兩人參一兩白芍藥川芎陳皮各半兩右㕮咀每服三錢水一盞半薑五片棗二枚煎八分食前去滓熱服一方無厚朴不傳散出百選方治傷寒感冒風邪蒼术七兩以竹藎水中洗淨不須去皮乾葛三兩半甘草二兩七錢半右為細末每服三錢水一盞煎八分服若細切蔥頭與茶同點見效尤速酒調亦可治一切傷寒感冒不問隂陽證初覺即服甚效出百選方蒼术米泔浸一宿焙乾稱一兩大菖蒲半兩銼甘草四錢半炙右㕮咀每服五錢蔥白三寸水一盞半煎七分熱服微汗乃效濟生方名中和散用石菖蒲不用蔥白煎生薑橘皮飲子出經驗良方治患有傷寒者不辨隂陽咳噎而大小便不通勢極危殆及夾食傷寒諸證生薑四兩切片陳皮四兩去白右二味銼碎水三大碗煎取兩碗去滓分三服喫良久上下氣皆通遂出汗而愈保真湯出和濟方治四時傷寒疫氣不問隂陽二證才覺疾作痛服此方立效藁本去蘆川芎各四兩甘草二兩炒蒼术十六兩洗銼炒右㕮咀每服三錢水一盞半薑三片同煎至七分去滓熱服不拘時候一方加棗一枚煎如久傷風不解加蔥白三寸同煎尋常感冒只一二服立愈消風百解散治四時傷寒頭疼項強壯熱惡寒身體煩疼四肢倦怠行步喘乏及塞壅咳嗽鼻塞聲重涕唾稠粘痰涎壅盛氣急滿悶並宜服之荆芥白芷陳皮洗去白蒼术麻黃去節各四兩甘草右為細末每服二錢水一大盞薑三片烏梅一箇同煎七分不拘時溫服或茶酒調下欲發散風邪入蓮鬚蔥白三寸同煎截傷寒不問隂陽決有神效乾薑乾葛白芷甘草右等分為末若藥減少不效須每服三錢水一盞半煎八分入生薑棗同煎不拘時候服了被蓋睡少時汗出即愈雙解散治風寒暑濕飢飽勞疫內外諸邪所傷無問自汗後雜病但覺不快便可通解愈小兒生瘡疹使利出邪毒亦能宣通而愈益元散七兩防風通神散七兩右二藥一處相和名為雙解散各七兩攪勻每服三錢水一盞半蔥白五寸鹽豉五十粒生薑三片煎至一盞溫服防己黃茋湯防己一兩黃茋一兩白术三分甘草半兩炙右銼每服五錢生薑四片棗一枚水一盞半煎至八分去滓溫服良久再服喘者加麻黃半兩胃中不和者加芍藥三分氣上衝者加桂枝三分有陳寒者加細辛三分服後當如蟲行皮中從腰下如米後坐被上又以被繞腰以下溫令微汗瘥甘草麻黃湯治四肢腫水氣在皮膚甘草二兩麻黃四兩右以水五升先煮麻黃去上沫內甘草煮取二升溫服一升重復汗出不汗再服慎風寒麻黃附子湯治水病發汗已其脈沉小麻黃三兩甘草三兩附子一枚炮右以水七升先煮麻黃去上沫內諸藥取二升半溫服八分日三服華陀赤散治傷寒頭痛身熱腰背強引頸及風口噤瘧婦人産後中風寒經閉腹大丹砂十二硃蜀椒蜀漆乾薑細辛黃芩防己桂心茯苓人參沙參桔梗女萎烏頭各十八銖雄黃一十四銖吳茱茰三十銖麻黃代赭各三兩半右治下篩酒服方寸匕日三耐藥者倍覆令汗出欲治瘧不發一時併服藥二匕半以意消息之細辛丹桂丹砂雄黃不熬餘者皆熬之實表散治腠理不密易致感冒先服此藥則感冒自然解散附子炮去皮劑蓯蓉酒浸一宿焙乾細辛去葉五味子各等分右為粗末以四味黃茋建中湯相對合和令停如本方煎服不過三四即安妙甚有理治傷寒用梅實三十枚去核豉一升苦酒三升煮取一升半去滓服治傷寒有數種庸人不能分别今復取一藥兼治天行內熱脈洪起至二日用葛根四兩水三升內豆豉一升煮取半升服搗生葛根主一切傷寒用甘草如中指長炙銼取童便一升煎七合空心服日再服治老少晚發傷寒三月至年末為晚發名梔子升麻湯生地黃一斤打碎梔子三十枚擘升麻三兩柴胡石膏各五兩右五味切以水八升煮取三升分五服頻頻服若不解更若頭靣赤去石膏用乾葛四兩無地黃用豉一升煮取三升分三服忌蕪荑雪煎治傷寒麻黃十斤杏仁三斗四升大黃一斤十二兩如金色者右三味㕮咀以雪水五斛四斗漬麻黃入東向竈釡中三宿內大黃攪勻調炊以桑薪煮得二斛汁去滓復內釡中搗杏仁內汁中復炊之可餘六七斗汁絞去滓置銅器中又以雪水三斗合煎之攪令調得二斗四升藥成可丸冷凝丸如彈子大病者以三服白湯五合研一丸入湯中適寒溫服之立汗出若不愈者復服一丸密盛藥勿令泄氣神仙百解散出衛生家保方治男子婦人四時傷寒八般痞氣山嵐瘴瘧渾身壯熱憎寒或中暑或風疾曲攣手足咽喉噎塞十種膈氣不思飲食無論百病初覺意思不快便先進一二服無不效驗婦人産前産後及小兒一嵗有病皆可服之白术茯苓各二兩藿香葉去土橘皮去穰甘草炙半夏擘破生薑汁製厚朴薑汁蘸炙各三兩右先將厚朴半夏為粗末用生薑四兩爛研同厚朴半夏一處拌勻淨器中淹一宿次日焙乾却入前五味藥拌和勻並搗為粗末每服四錢水一盞半生薑五片或七片煎七分去滓熱服傷寒併喫二服常服寬中進食或冷物傷脾臟腑不調並皆神效柴胡散出十便良方治邪入經絡體瘦肌熱推陳致新解利邪傷寒時疾中臘伏暑柴胡四兩甘草一兩右為細末每服二錢水一盞同煎至八分食後熱服此藥冬月可以潤心肺止咳嗽除壅熱春夏可以禦傷寒時氣解暑毒常不可闕兼不以長幼皆可服之倉卒可以便得一方治急傷寒急傷寒氣不能言斯病難醫永無傳半夏研末熱酒飲時間免得赴黃泉一方治傷寒傷寒不覺甚半錢好茱茰水煎空心服所患即消除發汗散治傷寒一米二芎四草麻諸般發汗不如他依方修合休交錯強如神仙聖手拿神仙不卧散出德生堂解利四時傷寒併一切風疾細辛甘草人參藜蘆川芎等分石膏半兩為末詞曰管甚傷寒壯熱遍醫夾腦頭風若嗅一字在鼻中嗅下教賢無病五苓散出醫方治傷寒溫熱病表裏未解頭痛發熱口燥咽乾煩渴飲水水入即吐或小便不利及汗出表解煩渴不止者宜服之亦治霍亂吐利傷暑門以五苓散加甘草一兩炙夫疫雖以五種而成若天行時症多假六淫及錯悶鬱折而致之者既有溫寒兩疫風濕豈可不辨但證傷濕而脈色不同與夫一方相染長幼同病即當作疫治除辟法外治濕五苓散加炙甘草治風用桂枝湯加黃芩無不愈者其如淫邪交結互織當以類推之治主一切天行病右取白藥研如麵漿水一大盞空腹服之便仰卧一飯頃時候心頭悶亂或惡心腹內如車鳴㽱刺痛良久當有吐利數行勿怪欲服藥時先令煮漿水粥於井中懸著待令若吐利過度即喫冷粥一碗止之不喫即困人治天時行熱病亦堪發汗甚有功右用浮萍草一兩四月十五日者麻黃去節根桂心附子炮裂去皮臍各半兩四物搗細篩每服二錢以水二中盞入生薑半分煎至六分不計時候去滓熱服汗出及差又治惡疾遍身瘡者取水中浮萍濃煮汁清浴半日多效此方甚可也火焰散出永類鈴方治傷寒惡候舶上硫黃附子去皮銼用新臘茶各一錢右為細末先將好酒一升調藥入大新碗口中加火攤蕩令乾合於瓦上每一碗下燒熱艾一拳大以瓦撑起無令火著直至煙盡冷即刮取細研入磁合盛每服二錢酒一盞共煎七分有火熖起勿訝傷寒隂毒者四肢冷脈沉細或吐瀉惡心煩燥胸中結鞕或傳作伏陽在內湯水不下先喫一服如吐却更進一服服後心中熱其病已瘥如表未解渾身壯熱脈氣洪大宜用發表藥或表解者更不發熱便得眠卧渾身有汗若少有痞結脈實方可下之漸用調和脾胃補治元氣之藥也急提盆散出千金方雜病非隂候者主之右用草烏頭不以多少生研極細為末蔥一枝肥者削去鬚頭圎上有蔥汁濕蘸之從榖道中治病後鬚亂不可理通右生麻油二升將髮解開安淨銅器中用油淹漬之細將叉子領髮斯須並自通一方出肘後方治傷寒手足疼痛欲死右取羊屎煮汁以灌之差止亦療時疾隂囊及莖熱腫亦可煮黃蘗洗之無憂散出危氏方治傷寒調理失序毒氣內結胸腹脹滿坐卧不安日久不瘥狂言妄語大小便不通或復吐逆臘月黃牛膽以天南星為末置膽內縛令緊當風避日懸之侯乾取用右為末以人參半兩煎湯七分盞調末二錢乘熱服遲頃更以熱人參湯投之或唾便溺下黃黑惡物是效治傷寒阮和南蒸法右以薪火燒地良久掃除去火可以水小灑取蠶砂若桃葉桑柏諸米粳及麥麩皆可趣用易得者牛馬糞亦可用但臭耳桃葉欲落時可益收取乾之以此等物著火令厚二三寸布席卧上溫復用此發汗汗皆出若過熱當審細消息大熱者可重席汗出周身輒使止當厚衣覆身勿令遇風治暴傷寒用荆芥豉汗煎服之治傷寒無論隂陽神驗方用皂角一梃肥者燒令赤為末以水五合和頓服隂陽傷寒以酒和服治太陽傷寒用栝樓根二兩水五升煮取一升半分二服小便利即差神丹丸出聖惠方治傷寒脈澀惡寒發熱體痛硃砂二兩細研水飛過附子一兩半炮裂去皮臍赤茯苓一兩川烏頭一兩半炮裂去皮臍半夏一兩湯洗七次去滑人參一兩去蘆頭右為細末煉蜜和丸如梧桐子大每服生薑湯下五丸良久喫熱粥一盞投之得汗為度若不汗汗少不解復服如前法若得汗足應解而不解者當服桂枝湯此藥多毒熱者令飲水寒者溫飲解之治瘧初發服二丸要略用細辛不用人參别有射干棗一枚名赤丸治寒氣厥逆六味清散方出聖惠方川烏頭一兩炮裂去皮臍桔梗一兩去蘆白术一兩附子一兩炮裂去皮臍防風一兩去蘆細辛一兩右為散每服二錢以生薑湯調服服藥後食頃不汗出者飲稀粥一盞以發之暖復汗出漐漐可也勿令流離汗出若汗大出不止者薄衣覆之如未得汗者當更服之以得汗為度橘皮湯出聖惠方治太隂病不解雖暴煩下利十餘行而自止所以自止者脾家實腐穢已去故也陳皮一兩湯浸去白穰焙生薑一兩右細銼和勻分為四服每服以水一中盞煎至六分去滓不計時候溫服桂枝芍藥湯出聖惠方治太隂病下之後腹滿時痛桂枝赤芍藥人參去蘆各一兩甘草半兩炙微赤銼右為散每服四錢以水一中盞入生薑半分棗三枚煎至五分去滓不計時候熱服一方無甘草术附子湯出脈類鈐方治風虛頭重眩苦極不知食味暖肌補中益精氣白术二兩附子一枚半炮去皮甘草一兩炙右銼每五錢匕薑五片棗三枚水一盞半煎至七分去滓溫服七物黃連湯治夏月傷寒四肢煩疼發熱其人善煩嘔逆支滿劇如遇祟寒熱相摶故令善煩黃連十八銖茯苓十八銖黃芩十八銖芍藥葛根各一兩甘草一兩六銖小麥三合右㕮咀以水七升煮取三升冷分三服不能一升者可以稍服之病勢安乃卧藥主解毒氣服後胸中熱及咽喉痛皆差其明日復煮劑如法服之此湯無毒但除熱下氣安病人小兒服者三分之一以水四升煮得二升稍稍服柴胡飲子解利大小人傷寒餘熱不已柴胡黃芩人參甘草升麻地骨皮赤茯苓赤芍藥龍膽草各半兩右㕮咀每服四錢水一盞加薄荷沙糖同煎七分溫服無時小兒分作三服加減五苓散藥中之寶五苓散專治傷寒有大功陽證見時須去桂隂加附子水煎澄狂言亂語辰砂末頭目疼痛入川芎咳嗽多加五味子心氣不定麥門冬胃中嘔逆人參炒痰多半夏喜相逢定喘馬兜苓最好蒼术去濕腹中空小便閉澀加瞿麥黃芩能使大便通腹中氣塊三稜末青皮能退熱如烘麻黃用根除盜汗下部赤腫便椒紅飲水煩渴加乾葛鼻衄烏藥却為功眼中黃色茵陳炒勞復桔梗有神功目赤令添赤芍藥茵陳退腫又相逢眼目肉赤石膏末陳皮止瀉又參同急醫水氣甜葶藶伏暑燈心浸水中二十四證真如決專心盡救效無窮半夏橘皮湯治傷寒病雜病嘔噦風眩痰逆咳喘頭痛并風熱反胃吐食諸證半夏炮如法陳皮湯浸洗去穰甘草炙人參茯苓黃芩去腐心各一分葛根半兩厚朴去皮一分右銼如麻豆大用水三盞生薑一分煎至一盞半絞取汁分四服作日食後溫服真方金不換正氣散治四時傷寒五種膈氣和脾胃止吐瀉溫中下痰飲止腹痛脹滿吞酸噫痞噎塞乾嘔惡心內受寒濕外感風邪身體沉重肢節酸疼頭昏鼻塞未分隂陽之間尤宜服之則氣自正而邪氣退又能止汗解山嵐瘴氣八般瘧疾遍身浮腫五勞七傷或風氣所灌手足腫痛全不思飲食孕婦産後産前皆可服餌霍亂吐瀉心腹疼痛又治脾氣虛弱臟腑時鳴小兒脾胃不和時氣諸疾及治四方不伏水土凡過嶺南北藥不可闕厚朴二兩去粗皮銼如韭葉濶長半寸以生薑自然汁罨一宿半夏二兩湯洗七次以生薑四兩取汁浸旬日橘紅二兩甘草二兩銼炒過用藿香二兩洗葉取水蒼术二兩去皮尖米泔浸一宿甘果子二兩取葉水洗右先用砂鍋炒厚朴令香次入蒼术炒令紫色又半夏炒香熱又入甘草炒黃又入橘紅炒破方始將藿香葉二兩斡開衆藥安藿香葉在中心用藥遍蓋罨定少時約藿香葉乾方可用取出同為粗末每服二大錢水一大盞生薑五片棗一枚煎至七分去滓空心服食前亦可常服和一切氣亦無瘟疫此乃不換金真方也煎時不得犯銅鐡器黃連龍骨湯治少隂脈沉腹痛咽痛苦煩體猶有熱黃連一兩黃芩芍藥各一分龍骨半兩右分三服每服水一盞半煎至八分去滓服葛根湯葛根一兩麻黃三分熱湯炮去黃汁焙乾甘草半兩炙桂枝去皴芍藥各半兩右煎煮服餌如桂枝湯小青龍湯麻黃去節半夏湯洗芍藥細辛乾薑甘草炙桂枝去粗皮各三分五味子二錢右銼如麻豆大每用八錢水一盞半生薑四片煎至七分絞汁溫服木香檳榔丸木香檳榔青皮去穰陳皮去白商枳殼麩炒去穰廣茂炮溫黃連各一兩黃蘗皮香附子揀炒大黃銼炒各三兩黑牽牛半斤生取頭末四兩右為細末滴水和丸如梧桐子大每服三十丸或五十丸至微利為度食後生薑湯送下化鐡丹烏梅八斤不去皮巴豆十六粒不去皮油胡椒四十八粒陳皮去白五錢右為細末醋煮麵糊為丸如菉豆大每服五丸至七丸食後溫生薑湯送下枳殼丸京三稜炮三兩二錢蓬莪术炮三兩二錢白术一兩半青皮去白一兩五錢陳皮去白一兩五錢木香一兩枳殼麩炒去白一兩白茯苓去皮一兩半半夏湯洗七次一兩黑牽牛炮二兩右為細末水麵糊為丸如梧桐子大每服五十丸溫生薑湯送下食後服之又方無牽牛一名導飯丸木香三稜丸出集書木香一兩荆三稜二兩蓬莪术三兩大麥葉微炒六兩黑牽牛微炒六兩右為細末薑汁麵糊和丸如梧桐子大每服三十丸食後薑湯送下木附湯出十便良方若但寒頭重則眩暈肌肉酸疼牽急不得轉側漐漐汗出惡寒小便不利大便反快短氣眩暈足寒或時咽痛發熱此由寒濕之邪客摶經絡陽氣不得發泄藴於肌肉之間謂之寒濕之邪其脈遲而小弦蒼术四兩芍藥茯苓各三錢人參甘草各一兩附子一兩半右為粗散每服五錢水二盞煎一盞去滓溫服通解散出直指方治四時傷寒內外一功所傷蒼术四兩輕杵去粗皮甘草二兩滑石六兩黃芩二兩石膏四兩右杵同為粗末每服三錢水一盞煎至七分去滓溫服日進四服如發汗用蔥白鹽豉同煎熱服如和解用生薑五片棗五枚去核同煎去滓熱服食前進三服三一承氣湯出宣明方治傷寒雜病內外所傷日數逺近腹滿咽乾煩渴譫妄心下按之硬痛小便赤澀大便反快或濕熱內攻而為滑泄熱甚喘咳悶亂驚悸狂顚目痛口瘡舌腫喉痺癰腫陽明胃熱發瘢脈沉可下者小兒熱極驚風搐揑喘塞并瘢疹黑陷小便不通腹滿欲死或瘢疹後熱不退久不作痂或作瘢癰瘡癬久不已者怫熱內成疹癖堅積黃瘦疳積新久卒暴心痛風痰酒膈積滯痰壅風熱暴傷酒食煩心悶亂脈數沉實或腎水隂虧虛熱獨甚而僵仆卒中一切暴病不語一名失音畜熱甚陽厥極深脈反沉細欲絶或表乏沖和正氣與邪熱并之於裏則熱亢極似隂反為寒症或産婦死胎不下及兩感表裏熱甚可下者大黃半兩錦文芒硝半兩去皮厚朴半兩去皮枳實半兩甘草一兩右銼如麻豆大每服水一盞半生薑三片煎至七分內硝煎二服去滓服黃連解毒湯出宣明論治傷寒煩燥熱毒煩悶乾嘔口燥吟呻喘滿陽厥極深畜熱內甚俗妄傳為隂毒者及汗下吐後寒涼諸藥不能退熱勢並兩感證者黃連去鬚黃蘗黃芩大梔子各半兩右銼如麻豆大每服稱半兩水一茶盞煎至四分絞去滓溫服後或腹滿嘔吐或欲作利者每服加半夏三箇生合用厚朴二錢去皮穰茯苓三錢去皮銼用水一盞半生薑三片煎至半盞絞汁溫服名曰半夏黃連解毒湯一笑散出德生堂方治傷寒感冒蔥白七根漿水二碗煎一碗去蔥先喫後用帶拴緊腰再服酸漿水一碗即吐羌活湯出保命集方通解利傷寒不問何經中受病皆能釋然解之即或於各經受病雖不盡解亦無壞證羌活二兩防風一兩川芎一兩黃芩一兩細辛二錢半甘草一兩炙黑地黃一兩白术二兩如用蒼术加一兩右㕮咀每服五錢水二盞煎至一盞無時溫服清如覺發熱引飲加黃芩甘草各一兩更隨證加頭痛惡風於白术湯一兩內加羌活散三錢都作一服羌活散出保命集方羌活一兩半川芎七錢細辛根一錢半如身熱依前加石膏湯四錢石膏湯出保命集方石膏二兩知母半兩白芷七錢如腹中痛者加芍藥散三錢芍藥散出保命集方芍藥二錢桂枝五錢如往來寒熱而嘔加柴胡散二錢半柴胡散出保命集方柴胡根一兩半夏五錢洗右加生薑煎如心下痞加枳實一錢如有裏證加大黃初服一錢次二錢又三錢論曰有汗不得服麻黃無汗不得服桂枝然春夏汗孔疏雖有汗不當用桂枝宜用黃耆湯和解秋冬汗孔閉雖無汗不當用麻黃宜用川芎湯和解春夏有汗脈乃微而弱惡風惡寒者太陽證冬之脈也亦宜黃耆湯無汗亦宜川芎湯秋冬有汗脈盛而浮發寒身熱者乃陽明證春夏之脈也亦宜黃耆湯無汗亦宜川芎湯大抵有汗者皆可用黃耆湯無汗者亦可用川芎湯黃耆湯出保命集方有汗則止也黃耆白术防風各等分右㕮咀每服五錢至十餘錢或半兩水煎溫服清汗多惡風甚者加桂川芎湯出保命集方無汗則發也川芎白术羌活各等分右㕮咀同黃耆湯稍熱服惡寒甚則反脈大浮半加麻黃法云五臟之脈寸關尺也今止言尺寸隂陽也如陽緩而隂急表和而裏病隂緩而陽急裏和而表病若傷寒食少發渴只可和胃止渴不可以太涼藥止之恐涼藥止之損著元氣必不能食也和胃白术湯出保命集方白术茯苓起卧不能謂之濕身重是也小柴胡湯黃芩芍藥湯起卧不安眠睡不穩謂之煩梔䜴湯竹葉石膏湯解利四時傷寒能解六經邪氣大白术湯出保命集方白术二兩防風一兩羌活一兩川芎一兩黃芩五錢細辛三錢白芷一兩半石膏二兩知母七錢甘草五錢或二錢枳實五錢去穰右為粗末每服半兩水一盞半煎至一盞大溫服清未解更一服兩服藥滓又作一服春倍防風羌活夏倍黃芩知母季夏雨淫倍白术白芷秋加桂五錢冬桂八錢或一兩立夏之後至立秋處暑之間傷寒者身多微涼有自汗四肢沉重謂之濕溫又謂濕淫冝蒼术石膏湯出保命集方蒼术細銼半兩石膏末三錢知母銼一錢半甘草銼一錢右同和勻都作一服水兩盞煎至一盞溫服清謂內有濕熱也多不欲飲食如身熱脈洪無汗多渴者是熱在上焦積於胸中宜桔梗散出保命集方薄荷一錢黃芩一錢甘草一錢炙桔梗半兩連翹二錢山梔子二錢右銼每服五錢或七錢稱半兩水煎加竹葉如大便祕結加大黃太乙丹出楊氏家藏方治傷寒傷風肢節煩痛如破服之解寒清熱或發熱惡寒似瘴非瘴煩燥迷悶面色紅赤頭痛如破服之微汗出立愈天南星四兩銼炒赤勻令焦石膏四兩甘草取粉稱三兩半前胡二兩川芎二兩一分白殭蠶炒去絲嘴白附子炮防風去蘆頭各一兩右件為細末用生薑自然汁煮麵糊和丸每一兩作十丸隂乾每服一丸細嚼用蔥白薄荷茶清送下不拘時侯祛毒散出楊氏家藏方解風邪截傷寒蒼术四兩米泔浸一宿甘草炙黃芩赤芍藥各一兩赤茯苓半兩去皮麻黃去根節半兩右為細末每服三錢水一盞半生薑五片黑豆十五粒同煎至一盞熱服不拘時侯祛寒湯出楊氏家藏方祛逐寒邪解利傷寒時行瘟疫青橘皮二兩不去白陳橘皮二兩半不去白丁香皮甘草炙乾薑炮各一兩右為細末如覺身熱頭疼即抄藥一錢沸湯點下不拘時侯順氣散出王氏傳濟方調順冷氣解利傷寒吳茱茰洗令淨春夏用一兩秋冬用半兩麻黃一兩去節人參半兩訶子半兩炒去掖稱大黃三分官桂一兩去皮厚朴一兩去皮薑汁炙乾薑炮半兩陳橘皮一兩去白甘草二兩炙右為末每服一錢水一盞入薑棗煎六分通口服如外傷邪即先服此三服次服發汗丸散效益元散出直指方治身熱嘔吐泄瀉腸澼下利赤白淋漓癃閉悶痛小腑不利胸中積聚寒熱失冝大益精氣通九竅六腑生津液去鬱結消畜水止渴利中除煩熱心燥胸腹脹痛益五臟大養脾腎之氣或腎水不足胃土衰弱風寒外感七情內傷隂痿陽衰安魂定魄五勞七傷一切虛損並皆治之滑石六兩膩好者甘草右為細末每服三錢蜜少許溫水調下或無蜜亦可無論時日三服或欲冷新水調下亦得解利發汗煎蔥白豆豉湯下四錢每水一盞蔥白五寸豆豉五十粒煮取汁七分調下併三服以效為度此藥治寒涼解散鬱熱設病甚不解多服無害但有益爾本世傳名大白散俗惡性寒兼易得之賤物而又不明素問造化之理故不取本草神驗之言而多不用焉若以隨證驗之乃凡人之仙藥不可闕也夫傷寒當汗則不可下當下亦不當汗者若能急服此藥則汗自不出而裏熱亦獲小效即有裏熱便得宣通而愈者或半在表半在裏可解和而不可吐下發汗者若服此藥多愈或不愈再服加減涼膈散和解尤妙或必當汗解者更加蒼术粗末三錢同煎蔥豉湯調服尤良或孕婦不宜滑石麻黃桂枝單發汗即用甘草一兩蒼术二兩同為粗末每服四錢水一盞蔥白五寸豉五十粒同煎至六分去滓熱服併二三服取微汗是名逼毒散非孕婦皆可服或大白散加麻黃去節二兩如前法煎服世云神白散更加滑石末與蒼术末二味最為發汗之妙藥乃此方唯正可汗者即用誤服之則轉加熱也名曰大逼毒散或解利兩感煎涼膈散調下益元散四錢或下乳用豬肉麵羹或酒之類調下四錢不拘時候日三服又宜食肉麵羹粥催産溫油漿調下五錢併二三服以産為度或死胎不下者三一承氣湯一服調下五錢須臾更頻用溫油漿調服前藥數服而胎出可活産母也難産或死胎不下皆由風燥澀熱聚斂結而不能舒緩故産户不得自然開通也藥力至則結熱頓開而産矣後慎不可溫補而反生燥熱也俗未知産後已損血液疼痛怖懼以致神狂氣亂則隂氣損虛邪熱大甚而為諸熱證由不明素問造化故不識隂陽反以謂産後諸虛百損便為虛冷而無熱也誤以熱味藥溫補或煩渴者不令飲水本雖善心為害多矣豈知治病之道但以臨時審其臟腑六氣虛實名其標本如法治之而已矣此藥泛常無竒然為效至大而俗以為小使忽之此所以反招侮也今以加黃丹桃紅名曰經玉散加青黛令輕碧色名碧玉散加薄荷葉一分細羅同為末名曰雞蘇散治療並同但以廽避愚俗之妄侮爾柴胡飲子退五臟虛熱四時加減出金匱方冬三月加柴胡八分白术八分大腹檳榔四板并支子用陳皮五分生薑五分桔梗七分春三月加枳殼三分減白术共六味夏三月加生薑三分枳實五分甘草三分共八味秋三月加陳皮三分共六味右各㕮咀分為三貼一貼以水三升煮取二升分溫三服如人行四五里進一服如四體壅滯甘草少許每貼分作三小貼每小貼以水一升煮取七合溫服再合滓為一服重煮都成四服訶梨勒丸長服出金匱方訶梨散煨陳皮厚朴各三兩右末之煉蜜丸如梧桐子大酒飲服二十丸加至三十丸五積散出三因方治太隂傷寒脾胃不和及有積聚腹痛蒼术泔浸一宿二十兩桔梗十兩陳皮六兩白芷甘草炙當歸二兩川芎一兩半芍藥半夏浸去滑各一兩白茯苓麻黃去節春夏二兩秋冬三兩乾薑春夏兩半秋冬二兩枳殼浸炮去穰銼炒四兩桂心春夏三兩秋冬四兩厚朴薑製炒二兩右先將前十二味㕮咀微炒令香取出當風晾之入後枳殼桂朴三味同為細末每服三錢水一盞薑三片棗二枚煎七分食前溫服傷寒手足逆冷自汗不止脈沉細面青嘔逆加順元散一錢同煎熱服産婦難産經三兩日不能生胎死腹中或産母氣乏委頓産道乾澀加順元散水七分酒三分煎並服氣血和即瘥胎死者不過三服當下其順元散多少量産母虛實加減傷寒發熱挾內寒者加蔥白二寸豉七粒同煎服以汗解順元散出三因方烏頭炮去皮尖二兩附子炮去皮臍天南星炮各一兩木香半兩右為末同前法煎此藥治內外感寒脈沉伏遲細手足冷毛髮恂栗傷寒隂證大啜一二盞氣和汗出即愈和氣治中湯治傷寒初受病服散吐後宜服藿香人參各半兩白术陳橘皮各三兩甘草乾薑白茯苓各一兩右件藥搗羅為散每服二錢以水一中盞入生薑半分煎至五分即去生薑和滓不計時候溫服小柴胡湯治傷寒後肺萎勞出如宜方黃芩人參甘草各三兩半夏製二兩半柴胡八兩右㕮咀薑五片棗一枚煎如譫語潮熱胃實大便利脈洪數宜服亡陽譫語不可下宜加桂枝芍藥湯如自利挾熱或垢赤煩渴寒熱往來宜加茯苓如傷寒喜睡脅痛胸滿有熱脈數宜服不煩渴身冷脈遲宜四逆湯如傷寒瘥後寒熱往來似瘧又治乾嘔日晡發熱宜服如勞復宜服如腹色青難治死必吐舌如嘔逆煩躁作渴有寒熱脈數喜冷加竹茹湯靈夀縣董監軍癸丑年冬十二月間雪霽因事至真定忽覺有風氣暴至診侯六脈俱弦甚按之洪實有力其證手攣急大便祕澀不通面赤而熱此風寒客加於身也四肢者脾也以風寒之邪傷之作搐急而攣痺乃風淫末疾而寒在外也內經云寒則筋攣正謂此也本人素飲酒近日為覺風氣不飲內有實熱乘於腸胃之間故大便祕澀而面赤熱手足陽明受邪外則足太隂脾之經受風寒之邪用桂枝甘草炙以却其寒邪而緩其急搐用黃蘗之苦寒滑以瀉實而潤燥急救腎水用升麻葛根以升陽氣行手足陽明之經不令遏絶便以桂枝性熱入手陽明之經為引用潤燥復以芍藥甘草專補脾氣使不受風寒之邪而退本邪專益肺也加人參以補元氣為之輔佐當歸身去裏急而潤燥和血名活血通經湯升麻葛根各一錢桂枝二錢當歸二錢人參一錢芍藥半錢甘草一錢炙黃蘗二錢酒製右㕮咀都作一服水二大盞煎至一盞去滓稍熱服令暖房中近火摩搓其手一服而愈木桂湯東垣蘭室祕藏治寒溫所客身體沉重胃脘痛面色痿黃麻黃一錢桂枝半錢杏仁十箇草䓻仁半夏各半錢炒麴半錢蒼术二錢橘皮一錢澤瀉一錢白茯苓一錢豬苓半錢黃蓍三錢甘草二分炙右都作一服煎法如常治傷寒熱病服轉藥後病已效可臟腑仍兩三日不出後喫食減少仍覺精神不快出護命方柴胡去毛桔梗去根麻黃去根杏仁黃芩荆芥穗大黃炮熱牡丹皮去心羌活沉香木香獨活各一分升麻半兩右為細末每服二錢水一盞煎一沸急瀉出食後和滓熱服治傷寒熱服傷脾渾身肌肉辟痛聞食即惡心思嘔吐遍身發熱兩唇乾焦診其脈即右手關上脾脈一指遍洪緊如衆脈此即為病氣在脾宜服此方出護命方桔梗羌活杏仁麻黃去根麥門冬去心大黃荆芥穗各一分半夏二銖牽牛一兩青橘皮四兩右先杵牽牛半夏二味為末所餘衆藥只作一處杵為末每服五錢水一盞半生薑三片蔥三枝煎衆藥末三錢沸一兩沸瀉出取汁一盞用調下牽牛半夏等末二錢食後服交加散出如宜方治憎寒壯熱或外感風寒內傷生冷及風寒二證敗毒散五積散右等分薑棗煎如體虛宜養胃湯三建湯出危氏方治脈微身體冷重自然汗嘔吐加丁香胡椒各半兩方見積熱痼冷門痼冷類不卧散截傷寒出十便良方蒼术川芎甘草藁本各一兩右為粗末每服三錢水一盞蔥白三寸同煎至八分去滓熱服不以時茯苓利膈湯出保生回車論茯苓一兩牛蒡子二兩炒荆芥穗一兩桔梗一兩微炒甘草半兩炙紫色右為粗散每服三錢水一盞薑三片同煎六分去滓溫服日二三服不拘時侯解肌湯出保生回車論麻黃一兩去根節蒼术四兩去皮羌活半兩甘草半兩炙荆芥穗半兩右為粗末每服三錢水一盞薑三片煎至六分去滓溫服續續二三服微汗出即解千金不傳散出淡寮方治傷寒兼主感風蒼术七兩竹籃盛水中攪洗不去皮乾葛三兩半甘草七錢半右為細末每服三錢加蔥煎茶調亦可桂枝湯出鮑氏方治傷風頭痛鼻鳴乾嘔發熱自汗惡風或寒熱汗出則少解如瘧狀脈浮洪虛大桂枝一兩白芍藥一兩半甘草一兩右為散每服五錢煎八分食前服訖蓋被取微汗或發滯漏不止小便難四肢拘急加炮附一分或項強漐漐反汗出惡風加乾葛一兩半或汗後身痛脈沉遲加芍藥生薑各半兩人參一兩半或嘔逆更加茯苓半夏人參陳皮冬末春初宜桂枝湯五積散盛夏時及淋家酒家衄家於桂枝湯加黃芩或夏日只用本方增芍藥名建中湯治氣痛等疾加烏藥香附炒加減香蘇葉出醫方大成香附子一兩紫蘇梗二兩陳皮一兩甘草半兩右為末銼散每服四錢水一盞半煎至一盞生薑三片連根蔥白二莖同煎熱服頭痛加川芎白芷頭痛如斧劈加石膏連鬚蔥頭偏正頭風加細辛石膏薄荷太陽穴痛加荆芥穗石膏傷風自汗加桂枝傷風無汗加麻黃去節并乾薑傷風惡寒蒼术傷風發熱不退加柴胡黃芩傷風咳嗽不止加半夏杏仁去皮尖傷風胸膈痞塞加製枳殼傷風鼻聲風重咽鬲不和加苦梗旋覆花傷風痰涎壅盛加白附子天南星傷寒鼻內出血加茅花傷寒氣促不安加大腹皮桑白皮傷風鼻塞不通頭昏加羌活荆芥傷風不解咽喉腫痛加苦梗傷風中脘寒不思飲食加去白青皮枳殼傷寒嘔吐惡心不止加丁香半夏傷寒後時作虛熱不退加人參傷風飲食不能消化加縮砂仁青皮傷風一向不解作潮熱白日至日中不退日日如是加地骨皮柴胡人參菴䕡初感風寒頭疼作熱鼻塞聲重加羌活川芎感風腰痛不能伸屈加官桂桃仁感風渾身痛不止加赤芍藥紫金皮感風脛項強急不能轉動加羌活官桂腹肚疼痛加木香腹肚疼刺不可忍加薑製吳茱茰七粒小腹疼痛時刻不可忍加木香薑棗婦人忽然大便疼痛不能下地加木香木瓜吳茱茰婦人被性所苦胸膈痞疼脅肋痛小便急疼加木香枳殼婦人被氣疼所苦加木香縮砂仁􅠛胃不和中脘不快加谷茅神麯傷食吐嘔泄瀉腹痛加乾薑木香心卒痛者加延胡索酒一盞飲酒太過忽遍身發疸或兩目昏黃加山茵陳山梔子中酒吐惡加烏梅丁香婦人經水將行先期發熱加蘇木紅花婦人産後作虛熱不退煩渴加人參地黃産後發熱不退加人參黃耆産後腰疼不止加當歸官桂冷嗽不已加乾薑五味子杏仁脾寒加良薑青皮草果腳氣加木香木瓜牛膝紫金皮茱茰川練子感風寒發熱頭疼加不換金正氣散感寒頭痛壯熱惡寒身痛不能轉動加料五積散飲食不進欲吐不吐加丁香與蘿蔔子感寒頭痛發熱身疼分隂陽加敗毒石膏婦人産後風腳手疼痛生料五積散人參敗毒散加木瓜不換金正氣散加地黃川芎同煎术附湯出保生回車論白术二兩銼如麥豆附子一枚以半兩為率炮裂去皮臍銼如麥豆粒右如法製一處於杵臼中良時治之勿令作末每四錢以水一盞半煎及七分去滓溫服日三服不拘時後凡言日進三服者疾勢稍重當促數服而未痊當作湯劑半夏中和湯出保生回車論半夏二兩湯浸七次切片焙乾厚朴四兩銼去粗皮銼碎蒼术四兩刮去粗皮銼令極碎獨活二兩銼碎草豆蔲十五箇去殼銼碎以上四味一處杵碎生薑屑一斤同杵摩爛又慢炒紫色甘草三兩炒令紫色右如法製一處杵為粗散每服炒四錢水一盞半生薑三片棗二枚同煎至七分去滓溫服食前日進三服胃損人可常服嵐瘴諸邪皆不能為害茯苓茱茰丸出保生回車論茯苓吳茱茰浸五次焙乾芍藥不問赤白皆可用黃連去鬚右等分為細末煉蜜和丸如梧桐子大每服十五丸二十丸溫熱水下如無蜜即用飯丸量大小加減不計時候升麻葛根湯出保生回車論麻黃二兩銼葛根二兩細銼芍藥四兩銼甘草一兩炙紫色銼右件篩為粗末每服四錢水一盞半生薑五片同煎至六分去滓溫服日三服不拘時候麻黃桂枝湯出保生回車論麻黃二兩去根節桂枝一兩葛根三兩芍藥三兩甘草一兩炙紫色右為粗散每服四錢水一盞半生薑五片棗二枚同煎至七分去滓溫服日三服夜一服三苓散出保生回車論茯苓一兩桂一分白术二兩右為細末每服二錢匕粥飲調下日二三服不計時候桂苓散出保生回車論茯苓二兩銼桂一分右為細末每服二錢粥飲調下日二三服不計時候每服藥後飲沸湯或粥飲一盞或半盞為佳豬苓散出保生回車論豬苓茯苓澤瀉白术阿膠先杵碎炒為末右四味等分如法製為粗末每服四錢水一盞半煎八分去滓入阿膠末二錢再上火沸溫服日二三服术桂湯出保生回車論白术三兩銼桂一分右為細末每服二錢粥飲調下日二三服不計時候以上三藥服餌主療並與五苓同聖僧散出衛家寶治時行一切傷寒不論隂陽不拘輕重應老幼及孕婦皆可服香白芷一斤生銼甘草半兩生銼右二味焙乾碾為粗末每服二錢水一盞棗二枚生薑三片蔥白三寸同煎至七分熱服用衣被蓋覆如人行五六里更進一服汗出即愈此藥可卜病之好惡如煎得黑色或誤打翻即難愈如煎得黃色無不愈者煎藥之時要在志誠加減正氣散出衛生家寶治傷寒傷風不論表裏但連進二服立效藿香葉半夏研細用薑汁搜和炙黃色厚朴去皮薑炙陳皮去白甘草研以上味乃局方正氣散再加白茯苓草果仁右各等分細末每服二錢水一盞薑三片棗一枚煎七分食前稍熱服和中益胃湯出誠效方治太隂陽明腹痛大便常泄若不泄却祕而難見在後傳作濕毒下鮮紅血腹中微痛脅下急縮脈緩而洪弦輕之可得按之空虛熟地黃三分當歸酒製四分升麻半錢蘇木一分藁本二分炙甘草三分柴胡半錢益智仁二分右件都作一服水三盞煎至一盞去滓溫服食前一服而愈茯苓白术湯出十便良方治傷寒服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝加此方芍藥生薑白术茯苓各三兩甘草二兩大棗二十箇右切每服半兩以水二大盞煎取一盞溫服小便利則愈忌海藻菘菜酢桃李雀肉等隂陽應象論曰人之汗以天地之雨名之又曰濕盛則霖霪驟注蓋以真氣已虧胃中火盛汗出不休胃中真氣已竭若隂火亦衰無汗皮燥乃隂中之陽陽中之隂俱衰四時無汗其形不久濕衰燥旺理之常也其形不久者秋氣主殺生氣者胃之榖氣也乃春少陽生化之氣也張耘夫因閏二月盡天隂雨隂寒濕相雜緣官事飲食失節勞役所傷病解之後汗出不止沾濡數日惡寒重添厚衣心胸間時作煩熱頭目昏憒上壅食少此乃胃中隂火熾盛與外天雨之濕氣峻熱兩氣相合令濕熱大作汗出不休兼見風邪以助東方甲乙之風藥去其濕以甘寒藥瀉其熱羌活勝濕湯主之炙甘草三分黃耆七分生甘草五分生黃芩酒黃芩各三分人參羌活防風藁本獨活細辛蔓荆子川芎各三分升麻柴胡各半錢薄荷一分右件都作一服水二大盞煎至一盞半細辛以下入輕清四味再上火煎至一盞去滓熱服之一服而止諸證悉去胡洽大露宿丸出本草主寒冷百病方礬石煉乾薑桂心皂莢桔梗各二兩附子三兩右搗篩蜜丸服如梧桐子大五丸日三漸增以知為度治傷寒方右用半夏一升洗滑焙乾搗末小麥麵一升合和以水溲令熱丸如彈子大以水煮令麵熟則藥成初吞四五枚日二稍增至五十枚旋合旋服覺病減欲更重合亦佳禁食餳與羊肉治傷寒汗不出搐攣手腳出本草右用海蛤川烏頭各一兩川山甲二兩為末酒糊和丸大一寸許揑扁置所患足心下劈蔥白蓋藥以帛纒定於暖室中取熱水浸腳至膝上久則水寒又添熱水候遍身汗出為度丸一二日一次浸腳以愈為度治傷寒熱壯在臟腑狂躁煩滿大小便閉塞出本草取苦棗肉蜜為丸服佳治傷風寒熱骨節碎痛出汗治中風靣目浮腫咽喉不通安胎婦目除肝穢邪氣安中利五臟益目睛殺百藥出本草以蔥葉作羹粥煠作虀食之良治傷寒大毒嗽出本草以飴糖於蔓箐薤汁中煮一服頓服之治傷寒熱毒出本草以人屎水漬飲彌善病人兩手脈浮數而緊名曰傷寒若關前寸脈力小關後尺脈力大雖不惡風不自汗此乃降氣已盛先見乎脈也宜投藥和之表之也調脈湯陽明少陽也葛根一兩防風半兩前胡七錢半炙甘草半兩右為末每服五錢水二盞生薑一塊如棗大拍碎同煎如寸脈依前力小加棗三枚同煎服葛根柴胡湯陽明少陽也葛根一兩柴胡一兩芍藥桔梗甘草各五錢右為末每服五錢生薑一塊蔥白三寸同煎服薄荷湯陽明也薄荷一兩炙甘草防風各半兩人參七錢半右為末水煎服防風湯陽明也防風一兩炙甘草四錢旋覆花桔梗各半兩製厚朴七錢半右為末生薑一塊加荆芥穗五錢同煎六物麻黃湯太陽陽明也麻黃去節一兩葛根七錢半人參半兩炙甘草半兩蒼术去皮七錢半右為末棗二枚同煎服後猶惡風加荆芥穗七錢丁香皮半兩七物柴胡湯太陽少陽也柴胡三兩蒼术荆芥穗麻黃去節各一兩炙甘草七錢加當歸一兩右為末生薑一塊棗三枚蔥白三寸同煎太陽證頭項痛腰脊強發熱惡風自汗脈尺寸俱浮緩者是勞也桂枝湯主之是隂經榮藥也間衛氣使隂氣不泄此藥為衛虛而設也若發汗過多發熱頭面搖卒口噤反背張反背張者太陽兼陽明也去風養血防風當歸散主之防風當歸川芎地黃各一兩右銼每服一兩水三盞煮至二盞去滓溫服如無汗者葛根湯主之如有汗者桂枝加葛根白术湯治傷風寒上解三陽下安太陽神方白术二兩如汗之改蒼术右㕮咀煎服若發熱引飲加黃芩生一兩若頭痛惡風加羌活散三錢半太陽證頭項痛腰脊強發熱惡寒無汗脈尺寸俱浮而緊是病發於陽陽者衛也麻黃湯主之是陽經衛藥也開腠理使陽氣伸泄此藥為衛實也傷寒見風脈傷風見寒脈二證大青龍湯主之老用桂枝麻黃各半湯後改用九味羌活湯黃蓍建中加當歸湯黃蓍當歸各一兩半白芍藥三兩桂一兩一分甘草一兩右粗末每服五錢生薑三片棗二枚水一盞半煎至八分去滓取七分清汁日三夜二服尺脈尚遲再作一劑發表湯太陽也麻黃去節一兩半蒼术舶上丁香皮各七分炙甘草半兩人參半兩當歸半兩加桂枝五錢細辛半兩如多減半汗不止則多右為末生薑一塊棗三枚同煎經云有汗不得服麻黃無汗不得服桂枝若差則其變不可勝言故立此法使不犯三陽禁忌解表神方羌活一兩半治太陽支節痛君主之藥也然非此無主也却亂反正之主也故大無不通小無不入關節痛非此不治防風一兩半治一身盡痛卒伍卑下之職一聽君命將而行隨所使所引而至蒼术一兩半别有雄壯上行之氣能除濕下安太隂使邪氣不內傳之于足太隂脾細辛五錢治足少隂腎苦頭痛川芎一兩治厥隂頭痛在腦白芷一兩治陽明頭痛在額生地黃一兩治少隂心熱在內黃芩一兩治太隂肺熱在胸甘草一兩能緩裏急調和諸藥故有國老之稱以上九味雖為一方然一不可執中無權猶執一也當視其經絡前後左右之不同從其多少大小輕重之不一增損用之其效如神㕮咀水煎服若急汗熱服以羹投之若緩汗溫服而不用湯投之也脈浮而不解者先急後緩脈沉而不解者先緩後急九味羌活湯不獨解利治雜病有神中風行經者加附子中風祕澀者加大黃中風并三者合而成痺等證隨十二經上下內外地寒熱溫涼四時邪氣加減補瀉用之煉蜜作丸亦可加生地黃各半治兩感傷寒如神用豆淋酒煎治破傷風太陽經傷寒得裏胸中有熱胃有邪氣傳陽明本也腹痛欲嘔者熱在內也宜黃連湯甘草黃連乾薑人參各七錢半大棗三枚右銼細每服五錢水煎服發熱惡寒自汗脈緩發熱惡風無汗脈緩此二證易老原用桂枝二麻黃一湯後亦改用九味羌活湯無論有汗無汗並宜服之易老利發九味羌活湯治傷寒唇緊右用鱉甲及頭燒灰作末傅之治傷寒大熱心悶右用槐子燒存性為末酒服方寸治汗不出拘攣腰腳并耳聾右用荆三稜茯苓米醋浸夏月浸四日冬月浸六日杵為末醋湯調下三錢治汗後霍亂者右用敗扇燒為末和粉粉身上發汗法出活人書凡發汗欲令手足俱能濈濈然一時許為佳不欲如水淋漓服湯中病即已不必盡劑然發汗須如常服須腰以上厚衣覆之令腰以上汗出淋漓而腰以下至足心覺微潤病即可解若病證仍在者三日內可三汗之令腰腳周遍為度一法無藥處可用兩手指相交緊叩腦後風府穴向前禮百餘拜汗出自解出神效方普濟方卷一百四十七
