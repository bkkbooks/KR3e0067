body:
  text: 普濟方卷二百五十七明周王朱橚撰食治門總論夫天産動物地産植物隂陽禀貸氣味渾然飲和食德節適而無過則入於口達於脾胃入於鼻藏於心肺氣味相成神乃自生平居暇日頼以安平日兼足於此一有疾痰資以治􅓼者十去其九是以别五肉五菓五菜必先之五榖以夫生生不窮莫如五榖為種之美也辨五益為助為充必先之為養以夫五物所養皆欲其充實之美也非特如此精順五氣以為靈若食氣相惡則為傷精形受五味以成體若食味不調則為損形隂勝陽病陽勝隂病隂陽和調人乃平康故曰安身之本必資於食不知食冝不足以存生人日食有成敗百姓日用而不知茍明此道則安臟腑資血氣悦神爽志平疴去疾夫豈淺淺耶扁鵲云人之所依者形也亂於和氣者病也理於煩毒者藥也濟命扶危者醫也安身之本心資於食救疾之速必慿於藥不知食冝者不足以存生也不明藥者不足以除病也此上二事有靈之所要也若忽不學誠可悲夫是故食能排邪而安臟腑悦神爽志以資血氣若能用食平疴釋情遣疾者可謂良工長年餌老之竒法極養生之術也夫為醫者當須先洞暁病須知其所犯以食治之食療不愈然後命藥藥性剛烈猶若御兵兵之猛暴豈容妄發用乖其冝損傷處衆藥之投疾殎濫亦然高平生喜稱食不欲雜雜則或有所犯有所犯者或有所傷或當時雖無灾者苦積乆為人作惡又食噉鮭肴務令簡少魚肉果實取益人者而食之凡常飲食毎令節儉若貪味多餐臨盤太飽食訖覺腹中膨脝短氣或致暴疾仍為霍亂又夏至以後迄至秋分必須勝肥膩餅臛酥油之属此物與酒漿𤓰果理極相妨夫在身所以多疾者皆由春夏取冷太過飲食不節故也又魚鱠諸腥冷之物多損於人㫁之益善乳酪酥等常食令人有筋力膽幹肌體潤澤卒多食之亦使臚脹洩利漸漸自己黄帝曰五味入於口也各有所走各有所病酸走筋多食酸令人癃不知所以然方俞曰酸入胃也其氣濇以収也上走兩膲兩膲氣濇之不能出入不出即流於胃中胃中和温即下注膀胱膀胱走胞胞薄以耎得酸則縮卷約而不通水道不利故癃也隂者精筋之所中聚也故酸入胃走於筋也鹹走血多食鹹令人渇何也答曰鹹入胃也其氣走中膲注於諸脈脈者血之所走也與鹹相得即血凝凝則胃中汁泣汁泣則胃中乾渇甲乙云凝則胃中汁注之注之則胃渇渇則咽焦焦故舌乾喜渇血脈者中膲之道也故鹹入胃走於血皇甫士安云腎合三膲之脈雖属胼心而為中焦之道故鹹入而走血也辛走氣多食辛令人愠心何也答曰辛入胃也其氣走於上膲上膲者受使諸陽者也薑韭之氣重至榮衛榮衞下時受之却留於心下故愠愠痛也辛味與氣俱行故辛入胃而走氣與俱出故氣盛也苦走骨多食苦令人變嘔何也答曰苦入胃也其氣燥而涌泄五榖之氣皆不勝苦苦入下脘下脘者三膲之道皆閉則不通不通故氣變嘔也齒者骨之所終也故苦入胃而走骨入而復出齒必黧踈皇甫士安云水火相濟故骨氣通於心甘走肉多食甘令人惡心何也答曰甘入胃也甘氣弱劣不能止進於上膲而與榖俱留於胃中甘入則柔柔則緩蚘動蚘動則令人惡心其氣外通與肉故甘走肉則肉多栗起而胝皇甫士安云其氣通於皮故曰甘入走皮矣皮者肉之附雖属肺於肉連體故甘潤肌肉并於皮也黄帝問曰糓之五味所主可得聞乎伯高對曰夫食風者則有靈而輕舉食氣者則和静而延夀食榖者則有知而勞神食草者則愚癡而多力食肉者則勇猛而多嗔是以肝木青色宜酸心火赤色冝苦脾土黄色冝甘肺金白色冝辛腎水黒色冝鹹内為臟外主五行色配五方肝合筋其榮爪心合脈其榮色脾合肉其榮唇肺合皮其榮毛腎合骨其榮髮多食酸則皮槁而毛失多食苦則筋急而爪枯多食甘則骨痛而髮落多食辛則肉胝而唇蹇多食酸則脈凝泣而色變肝病宜食麻犬肉李韭心病冝食麥羊肉杏薤脾病冝食稗米牛肉棗葵肺病冝食黄粟雞肉桃葱腎病冝食大豆黄黍豕粟藿素問云肝色青冝食甘粳米牛肉棗葵皆甘心色赤冝食酸小豆大肉李韭皆酸肺色白冝食苦麥羊肉杏薤皆苦脾色黄冝食鹹大豆豕肉粟藿皆醎腎色黒冝食辛黄黍雞肉桃葱皆辛酸走筋筋病勿食酸苦走骨骨病勿食苦甘走肉肉病勿食甘辛走氣氣病勿食辛鹹走血血病勿食鹹米飯甘素問云粳米甘麻酸素問云小豆酸大豆鹹麥苦棗甘李酸栗鹹杏苦桃辛黄黍辛葵甘韭酸藿鹹薤苦葱辛牛甘犬酸豕鹹羊苦雞辛肝苦急急食甘以緩之肝欲散急食辛以㪚之用酸㵼之禁當風心苦緩急食酸以収之心欲耎急食酸以耎之用甘㵼之禁温食厚衣脾苦濕急食苦以燥之脾欲緩急食甘以緩之用苦㵼之禁温食飽食濕地濡衣肺苦氣止逆息者急食苦以泄之肺欲収急食酸以収之用辛㵼之禁無寒飲無寒衣腎苦燥急食辛以潤之開腠理潤致津液通氣也腎欲堅急食苦以結之用鹹㵼之無犯焠無熱衣温食是以毒藥攻邪五榖為養五肉為益五菓為助五菜為充精以食氣氣養精以榮五色形以食味味養形以生力此之謂也神藏有五五五二十五種形藏有四方四時四季四肢共為五九四十五以此輔神可長生乆視也精順五氣以為靈也若食氣相惡則傷精也形受味以成也若食味下調則損形也是以聖人先用禁以存性後治藥以防命也故形不足者温之以氣精不足者補之以味氣味温補以存形精岐伯云陽為氣隂為味味歸形形歸氣氣歸精歸化精食氣形食味化生精氣生形味傷形氣傷精化為氣氣傷於味隂味出下竅陽氣出上竅厚者為隂薄者為隂之陽氣厚者陽氣薄者陽之隂味厚則泄薄則通流氣薄則發泄厚則秘塞素問作發熱壮火之氣在衰少火之氣壮壮火食氣氣食少火壮火㪚氣少火生氣辛甘發散為陽酸苦涌泄為隂隂勝則陽病陽勝則隂病隂陽調和人則平安春七十二日省酸増甘以養脾氣夏七十二日省苦増辛以養肺氣秋七十二日省辛増酸以養肝氣冬七十二日省鹹増苦以養心氣季月十八日省甘増鹹以養腎氣果實㯽榔味辛温濇無毒消糓逐除痰澼殺三蟲去伏尸治寸白豆蔲味辛温濇無毒温中主心腹痛止嘔吐去口臭葡萄味甘辛平無毒主筋骨温脾益氣倍力强志令人肥健耐飢忍風寒乆食輕身延年治腸間水調中釀酒常飲益人利小便覆盆子味甘辛平無毒益氣輕身令髮不白大棗味甘辛熱滑無毒主心腹邪氣安中養脾氣平胃氣通九竅補少氣津液身中不足大驚四肢重可如百藥補中益氣强志除心煩治腸澼乆服輕身不飢神仙生棗味甘辛多食令人熱氣脹若寒熱羸痩者彌不可食傷人藕實味甘寒無毒食之令人心歡止渇去熱補心養神益氣除百病乆服輕身耐老不飢延年一名水芝生根寒止熱渇破流血雞頭實味甘平無毒主食脾腰脊膝疼補中除暴疾益精氣强志意耳目聰明乆服輕身不飢耐老神仙芰實味甘辛平無毒安中補五臓不飢輕身一名莢黄帝云七月勿食生菱芰作蟯蟲栗子味鹹温無毒益氣厚腸胃補腎氣令人耐飢生食之甚治腰脚不遂櫻桃味甘平濇調中益氣可多食令人好顔色美志性橘柚味辛温無毒主胸中不熱逆氣利水榖下氣止嘔欬除膀胱留熱停水破五淋利小便治脾不能消榖却胸中吐逆霍亂止㵼利去寸白乆服去口臭下氣通神輕身長生一名橘皮陳乆者良津符子味苦平滑多食令人口爽不知五味梅實味酸平濇無毒下氣除熱煩滿安心止肢體痛偏枯不仁死肌去青黒誌惡疾止下利唾口乾利筋脈多食壊人齒柿味甘寒濇無毒通和五氣主腸澼不足及火瘡金瘡止痛木𤓰實味酸鹹温濇無毒主濕脾氣霍亂大吐下後脚轉筋不止其生樹皮無毒亦可煑用榧實味甘平濇無毒主五痔去三蟲殺蠱毒鬼疰惡毒甘蔗味甘平濇無毒平氣和中補脾氣利大腸止渇去煩解酒毒耎棗味苦冷濇無毒多食動宿病益冷氣發欬𠻳芋味辛平滑有毒寛腸胃充肌膚滑中一名土芝不可多食動宿冷又鳥芋味苦甘微寒滑無毒主消渇痺熱益氣一名籍姑一名水萍三月採杏核仁味甘苦温冷而利有毒主欬逆上氣腸中雷鳴喉痺下氣産乳金瘡寒心奔肫驚癎心下煩熱風氣去来時行頭痛解肌消心下急殺狗毒五月採之其一核兩仁者害人去之杏實尚生味極酸其中核猶未變者採之曝乾以食甚止渇去冷熱毒扁鵲云杏仁不可乆服之令人目肓眉髮落動一切宿病桃核仁味甘苦辛平無毒破淤血血閉逐邪氣殺小蟲治欬逆上氣消心下煩除卒暴繫血破癥瘕通目水止心痛七月採凡一切果核中有兩仁者並害人不可用其實味酸無毒多食令人有熱黄帝云飽食桃入水浴成淋病李核仁味苦平無毒主僵仆躋瘀血骨痛實味苦酸微温濇無毒除故熱調中冝心不可多食令人虚黄帝云李子不可和白蜜食蝕人五内梨味甘微酸寒濇有毒除客熱止心煩不可多食令人寒中金瘡産婦勿食令人萎困寒中林檎味酸苦平濇無毒止渇好唾不可多食令人百脈弱柰子味酸苦寒濇無毒耐飢益人心氣不可多食令人臚脹乆病人食之其病尤甚安石榴味甘酸濇無毒止咽燥渇不可多食損人肺枇杷葉味苦平無毒主惡不止下氣正爾削取生樹皮嚼之少少咽汁亦可煑汁冷服大佳胡桃味甘冷滑毒不可食多動痰飲令人惡心吐水吐食菜蔬枸把葉味苦平濇無毒補虚羸益精髓諺云去家千里勿食蘿藦枸把此則强陽道資隂氣速疾也蘿藦味甘平無毒一名苦丸其葉厚大作藤生摘之有白汁出人家多種亦可茹或作生噉亦可蒸煑食之補益與枸把葉同𤓰子味平無毒令人光澤好顔色益氣不飢乆服輕身耐老又除胸滿心不樂乆食寒中可作面脂一名水芝一名白𤓰子即冬𤓰仁也八月採白冬𤓰味甘微寒無毒除小腹水脹利小便止消渇凡𤓰味甘寒滑無毒去渇多食令隂下瘡濕生瘡發黄疸黄帝云九月勿食被霜𤓰向冬發寒熱及温病初食時即令人欲吐也食竟心内作停水不能自消或為反胃凡𤓰入水沉者食之得冷病終身不瘥越𤓰味甘平無毒不可多食損腸胃胡𤓰味甘寒有毒不可多食動寒熱多瘧病積瘀血熱早青𤓰味甘寒無毒食之去熱煩不可乆食令人多忘冬葵子味甘寒無毒主五臓六腑寒熱羸痩破五淋利小便婦人乳難血閉乆服堅骨肌肉輕身延年十二月採葉甘寒滑無毒宜脾乆食利胃氣其心傷人百藥忌食心心有毒黄帝云霜葵陳者生食之動五腫流飲飲盛則吐水凡葵菜和鯉魚食之害人四季之月圡王時勿食生葵菜令人飲食不化發宿病莧菜實味甘寒濇無毒主青肓白翳明目除邪氣利大小便去寒熱殺蚘蟲乆服益氣力不飢輕身一名馬莧一名莫實即馬齒莧菜也治反花瘡小莧菜味甘寒滑無毒可乆食益氣力除熱不可共鱉肉食成鱉瘕蕨菜亦成鱉瘕邪蒿味甘温濇主胸膈中臭惡氣利腸胃苦菜味苦大寒滑無毒主五臓邪氣厭榖胃脾腸大渇熱中暴疾惡瘡乆食安心益氣聰察少卧輕身耐老耐飢寒一名茶草一名選一名遊冬冬不死四月上旬採薺菜味甘温濇無毒利肺氣和中殺諸毒其子主明目目痛淚出其根主目濇痛蕪青及蘆服菜味苦冷濇無毒利五臓輕身益氣冝乆服蕪青子明目九蒸曝療黄疸利水便乆服神仙根主消風熱毒腫不可多食令人氣脹菘菜味甘温濇無毒乆食通利腸胃除胸中煩解消渇本是蔓菁也種之江南即化為菘亦如枳橘所生土地隨變芥菜味辛温無毒歸鼻除腎邪大破欬逆下氣利九竅明目聰耳安中乆食温中又云寒中其子味辛辛亦歸鼻有毒主喉痺去一切風毒黄帝云芥菜不可共兎肉食成惡邪病苜蓿味苦辛平濇無毒安中利人四體可乆食荏子味苦辛無毒主欬逆下氣温中補髓其葉主調中去臭氣九月採隂乾用之油亦可作油衣蓼實味温辛無毒明目温中觧肌耐風寒下水氣面目浮腫却癰疽其菜辛歸舌治大小腸邪氣利中益智黄帝云蓼食過多有毒發心痛和生魚食之令人脫氣隂核疼痛求死婦人月事不用食蓼及蒜喜為血淋帯下二月勿食蓼傷人腎扁鵲云蓼乆食令人寒熱損骨髓殺丈夫隂氣少精葱實味辛温無毒冝肺氣辛歸頭明目補中不足其莖白平滑可作湯主傷寒寒熱骨肉辟痛能出汗治中風面目浮腫喉痺不通安胎殺桂其青葉温辛歸目除肺中邪氣安中利五臟益目精發黄疸殺百藥毒其根鬚平主傷寒頭痛葱中涕及生葱汁平滑止尿血解黎蘆及桂毒黄帝云食生葱即噉蜜變作下利食焼葱并噉蜜擁氣而死正月不得食生葱令人面上起遊風格葱味辛微温無毒除瘴氣惡毒乆食益膽氣强志其子主洩精薤味苦辛温滑無毒冝心辛歸骨主金瘡瘡敗能生肌肉輕身不飢耐老菜芝也除寒熱去水氣温中散結氣利産婦病人諸瘡中風寒水腫生搗𫝊之骨在咽不下者食之則去黄帝云薤不可共肉作羮食之成瘕疾韭亦然十月十一月十二月勿食薤令人多涕唾韭味辛酸温濇無毒辛歸心冝肝可乆食安五臟除胃中熱不利病人其心腹有痼冷者食之必加劇其子主泄精尿色白根煑汁以養髮黄帝云霜韭凍不可生食動宿飲飲盛必吐水五月勿食韭損人滋味令人乏氣力二月三月冝食韭大益人心白蘘荷味辛微温濇無毒主中蠱及瘧病搗汁服三合日二生根止諸瘡菜味苦大寒無毒主時行壮熱解風熱惡毒紫蘇味辛微無毒下氣除寒中其子尤善雞蘇味辛微温濇無毒主吐血下毒一名水蘇羅勒味苦辛温平濇無毒消停水㪚毒氣不可乆食濇榮衞諸氣蕪荑味辛平熱滑無毒主五内邪氣散皮胃骨莭中淫淫温行毒去三蟲能化宿食不消逐寸白散腹中温喘息一名無菇一名蓎盛器物中甚辟水蛭其氣甚臭即北山榆子作之凡榆葉味甘平滑無毒主小兒癎小便不利傷暑熱困悶煑汁冷服生榆白皮味甘冷無毒利小便破五淋花主小兒頭瘡葫荽子味酸平無毒消榖能復食味葉不可乆食令人多忘華陀云葫荽菜患氣臭􅉶齒人食之加劇復肉患利氣者彌不得食食之發宿病金瘡尤忌海藻鹹寒滑無毒王癭瘤結氣散頸下鞭核痛者腸内上下十二水腫利小便起男子隂氣昆布味鹹寒滑無毒下十二水腫癭瘤結氣瘻瘡破積聚茼蒿味辛平無毒安心氣養脾胃消痰飲白蒿味苦辛平無毒養五臓補中益氣長老髮乆食不死白兎食之仙呉葵一名蜀葵味甘微寒滑無毒花定心氣葉除客熱利腸胃不可乆食鈍人志性若食之被狗􅲪者瘡永不瘥藿味鹹寒濇無毒宜腎主大小便数去煩熱香菜辛微温主霍亂腹痛吐下散水腫煩心去熱甜瓠味甘平滑無毒主消渴惡瘡鼻口中肉爛其葉味甘平主耐飢扁鵲云患脚氣虛脹者不得食之患永不除蓴味甘寒滑無毒主消渇熱脾多食動痔漏病落葵味酸寒無毒滑中散熱實光澤人面一名天葵一名蘩露蘩蔞味酸平無毒主積年惡瘡不愈者五月五日日中採之即名滋草一名雞腸草乾之焼作焦灰用扁鵲云丈夫患惡瘡隂頭及莖作瘡膿爛疼痛不可堪忍乆不痊者以灰之分蚯蚓新出屎泥二分以少水和研緩如煎餅麵以泥瘡上乾則易之禁酒麵五辛并熱食等黄帝云蘩萎合䱉鮓食之發消渇病令人多忘别有一種近水渠中温濕䖏冬生甚壮類葫荽一名雞腸菜可以療痔病一名天葫荽蕺味辛㣲温有小毒主蠳尿瘡多食令人氣喘不利人脚多食脚痛葫味辛温有毒辛歸五臓散癰疽治慝瘡除風邪殺蠱毒氣獨子者最良黄帝云生葫合鯖魚鮓食之令人腹内生瘡腸中腫又成疝瘕多食生葫行房傷肝氣令人面無色四月八月勿食葫傷人神損膽氣令人喘悸脇肋氣急口味多爽小蒜味辛温無毒主歸脾腎主霍亂腹中不安消榖理胃氣温中除邪痺毒氣五月五日採曝乾葉主心煩痛解諸毒小児丹疹不可乆食損人心力黄帝云食小蒜噉生魚令人奪氣隂核痛求死三月勿食小蒜傷人志性茗葉味苦鹹酸冷無毒可乆食令人有力恱志微動氣黄帝云不可共韭食令人身重蕃荷菜味苦辛温無毒可乆食却腎氣令人口氣香潔主辟邪毒除勞弊形痩疲倦者不可乆食動消渇病蒼耳子味苦甘温葉味苦辛微寒濇有小毒主風頭疼寒痛風濕痺四肢拘急攣痛去惡肉死肌膝痛溪毒乆服益人氣耳目聰明强志輕身一名相葈一名地葵一名葹一名長思蜀人名羊負來秦名蒼耳魏名隻刺黄帝云戴甲蒼耳不可共諸肉食害人食甜粥復以蒼耳甲下之成走注又患兩肋立秋後忌食之食茱茰味辛苦大温無毒九月採停陳乆者良其子閉口者有毒不可用止痛下氣除欬逆去五臓中寒冷温中諸冷實不消其生白皮主中惡腹痛止齒疼其根細者去三蟲寸白黄帝云六月七月勿食茱茰傷神氣令人起伏氣咽喉不通徹賊風中人口僻不能語者取茱茰一升去黒子及合口者好豉三升二物以清酒和煑四五沸取汁冷服半升日三得小汗瘥薑螫人嚼茱茰封上止蜀椒味辛大熱有毒主邪氣温中下氣留飲宿食能使痛者癢癢者痛乆食令人乏氣失明主逆逐胃中寒冷去死肌濕痺痛心下冷氣除五臓六腑寒百骨節中積冷温瘧大風汗自出者止下利散風邪合口者害人其黑子者有小毒下水仲景云􅘮用之黄帝云十月勿食椒損人心腸傷血脈乾薑味辛温無毒主胸中滿欬逆上氣温中止漏血出汗逐風濕痺腸澼下利寒冷腹中痛惡霍亂脹滿風邪諸毒皮膚間結氣止唾血生者尤良生薑味辛微温無毒辛歸五臓主傷寒頭疼去痰下氣通汗除胃中寒欬逆上氣止嘔吐去胸中膈上臭氣通神明黄帝云八月九月勿食薑傷人神損夀胡居士云薑殺腹