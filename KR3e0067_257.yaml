利大腸黄帝云食甜酪竟即食大酢者變作血瘕及尿血華佗云馬牛羊酪蚰蜒入耳者灌之即出沙牛及白羊酥味甘微寒無毒除胸中客氣利大小腸又治口瘡牝牛酥味甘平無毒去諸風濕痺除熱利大便去宿食醍醐味辛平無毒補虚去諸風痺百鍊乃佳甚去月蝕瘡添髓和中填髓乆服増年熊肉味甘微寒微温無毒主風痺不仁筋急五緩若腹中有疾聚寒熱羸痩者食熊肉病永不除其脂味甘微寒治法與肉同又去頭瘍白禿皮䵟䵳食飲嘔吐乆服强志不飢輕身長年黄帝云一切諸肉煑法不熟生不斂者食之成瘕熊及猪二種脂不可作燈其烟氣入人目失明不能逺視羖羊角味酸苦温無毒微寒主青脂明目殺疥蟲止寒泄心畏驚悸除百節中結氣及風傷蠱毒吐血婦人産後餘痛焼之殺鬼魅辟虎狼乆服安心益氣輕身勿令中濕有毒髓味甘温無毒主男子婦人傷中隂陽氣不足却風熱止毒利血脈益經氣以酒服之亦可乆服不損人青羊膽汁冷無毒能生人身脈治青脈明目肺平補肺治痩止渇多小便傷中止虚補腎不足去風邪肝補肝明目心主憂上志膈中逆中氣腎補腎氣虚弱益精髓頭痛主小兒驚癎煑以浴之蹄温平主丈夫五勞七傷肉味甘苦大熱無毒主煖中止痛安乳餘疾及頭腦中大風汗自出虚勞寒冷能補中益氣力安心止驚利産不利時患病頭肉平主風眩痩疾小兒驚癎丈夫五勞七傷其骨熱主虚勞寒中羸痩其宿有熱者不可食生脂止下利脫肛去風毒婦人産後腹中絞痛肚主冐反治虚羸小便数至虚汗黄帝云羊肉酢食之傷人心亦共生魚酪和食之害人凡一切羊蹄甲中有珠子白者名羊懸筋食之令人癲白羊黒頭食其腦作腸癰羊肚共飯飲常食乆成反胃作噎病甜粥共肚食之令人多唾喜吐青水羊腦猪腦男子食之損精氣少子若飲食者爛研如粉和醋食之然終不若不食為佳青羊肝和小豆食之令人目少明一切羊肝生共椒食之破人五臟傷心最損小兒彌忌水中栁木及白楊木不得同器中煑羖羊肉食之丈夫損陽女子絶隂暴雨後不可食羊肉髓及骨汁成煩熱難解還動利凡六畜五臓著草自動揺及得鹹酢不變色又隨地不汚又與犬犬不食者皆有毒殺人六月勿食羊肉傷人神氣沙牛髓味甘温無毒平胃氣通十二經脈理三膲微温骨髓補中續絶傷益氣力止泄利去消渇皆以清酒和暖服之肝明目膽可丸百藥味苦大寒無毒除心腹熱渇止下利去口焦燥益目精心主虚弱腎主濕痺補腎氣益精力主小兒驚癎肉味甘平無毒消渇止唾涎出安中益氣力養脾胃氣不可常食發宿病自死者不可食喉嚨主小兒痺黄犍沙牛黒牯牛尿味苦辛温微平無毒主水腫腹脚俱滿者利小便黄帝云烏牛自死七首食其肉害人一切牛盛熱時卒死者總不堪食食之作腸癰患甲蹄牛食其蹄者誤食蹄中巨筋令人作肉刺獨肝牛肉食之殺人牛食蛇者獨肝患疥牛馬食之令人身體癢牛肉共猪肉食之必作寸白蟲凡丹黍米白酒牛肉共食亦作寸白蟲尤忌人下利者自死牛肉心加劇一切牛馬乳汁及酪共生魚食之成魚瘕六畜脾人一生莫食十二月勿食牛肉傷人神氣馬心主喜忘肺主寒熱莖痿肉味辛苦平冷無毒主傷中除熱下氣長筋强腰脊壮健强志利意輕身不飢黄帝云白馬自死食其肉害人白馬元頭食其腦令人癲白馬鞍下烏色徹肉裏者食之傷人五臟下利者食馬肉必加劇白馬青蹄肉不可食一切馬汗氣及毛不可入食中害人諸食馬肉必煩悶者飲以美酒則解白酒則劇五月勿食馬肉傷人神氣野馬隂莖味酸鹹無毒温主男子隂痿縮少精肉辛平無毒主人驚癎筋肺不能自収周痺飢不仁病死者不任用驢肉味酸平無毒主風狂愁憂不樂能安心氣病死者不任用其頭焼却毛煑取汁以浸麴釀酒甚治大風動揺不伏者皮膠亦治大風狗隂莖味酸平無毒主傷中丈夫隂萎不起腦主頭風部痺下䘌瘡中息肉肉味酸鹹温無毒宜腎安五臟補絶傷勞損乆病大虚者服之輕身益氣力黄帝云白犬合海鮋食之必得惡病白犬自死不出舌者不可食犬春月狂若鼻赤起而燥者此欲狂其肉不任食九月勿食犬肉傷人神氣㹠卵味甘温無毒除隂莖中痛驚癎鬼氣蠱毒除寒熱賁豚五隂邪氣攣縮一名㹠顛隂乾勿令敗㹠肉味辛平有小毒不可乆食令人遍體筋肉碎痛乏氣大猪後脚蹄甲無毒主五痔伏熱在腹中腸癰内蝕取酒浸半日炙焦用之四蹄小寒無毒主傷撻諸敗瘡母猪蹄寒無毒煑汁服之下乳汁甚解石藥毒大猪頭肉平無毒補虚乏氣力去驚癎鬼毒寒熱五癃腦主風眩心平無毒主驚邪憂患悸氣逆婦人産後中風聚血氣驚恐腎平無毒除冷利理腎氣通膀胱肝味苦平無毒主明目猪喙微寒無毒補中益氣止渇㫁暴利虚弱腸微寒無毒主消渇小便數補三膲虚竭其肉間脂肪平無毒主煎諸膏藥破冷結散宿血解斑猫芫青毒主洞腸挺出血多者猳猪肉味苦酸冷無毒主狂病多日不愈凡猪肉味苦微寒宜腎有小毒補腎氣虚竭不可乆食令人少子精發宿病益筋骨閉血脈虚人肌有金瘡者食之瘡尤甚猪血平澁無毒主卒下血不止美酒清者和炒服又主中風絶傷頭中風眩及諸淋露賁肫暴氣黄帝云凡猪肝肺共魚鱠食之作癰疽肝共鯉魚腸魚子食之傷人神㹠腦損男子陽道八月勿食猪肺及􅏁和食之至冬發疽十月勿食猪肉損人神氣鹿頭肉平主消渇多夢接見生血治癰腫莖主勞損蹄肉主脚膝骨中疼痛不能踐地骨主肉虚續絶傷解骨可作酒髓味甘温主丈夫婦人傷中脈絶筋急痛欬逆以酒和服腎平主補腎氣肉味苦温無毒補中强五臟益氣力肉生者主中風口僻不正細細碎剉以薄僻上華佗云和生椒搗薄使一人專㸔正則去之不爾復牽向不僻處角鎊取屑一升白蜜五升㳛之微火熬令小變色暴乾更搗篩服方寸匕日三令人輕身益氣力强髓補絶傷黄帝云鹿膽白者食其肉害人不可和蒲白作羮食發惡瘡五月勿食鹿肉傷人神氣胡居士云鹿性驚烈多别良草恒食九物餘者不常羣處必依山岡産歸下澤饗神用其肉者以其性烈清浄故也凡餌藥之人不可食鹿肉服藥不得力所以然者以鹿常食解毒之草是故能治毒散諸藥故也九草者葛葉花鹿葱鹿藥白蒿水芹甘草齊頭蒿山蒼茸齊苨麞頭微温無毒主虚損泄精肉味甘温無毒補益五臟髓益氣力恱澤人面麞無膽所以怯弱多驚恐黄帝云五月勿食麞肉傷人神氣麋脂味辛温無毒主癰腫惡瘡死肌寒熱風寒濕痺四肢拘緩不収風頭腫氣通腠理柔皮膚不可近男子隂冷痿一名宫脂十月取黄帝云麑肉共蝦肉食之令人心痛生麑肉共雉肉食之令人作痼疾虎肉味酸無毒主惡心欲吐益氣力止多唾不可熱食壊人齒虎頭虎肉治風邪眼睛主驚癎豹肉味酸温無毒冝腎安五臟補絶傷輕身益氣冬食利人狸肉温無毒補中輕身益氣亦治諸注黄帝云正月勿食虎豹狸肉傷人神損夀兎肝主目闇肉味辛平濇無毒補中益氣止渇兎無脾所以能走盖以属二月建卯木位也木尅土故無脾焉馬無脾亦能走也黄帝云兎肉和獺肝食之三日必成遁尸共白雞肝心食之令人面色一年成癉黄共薑食變成霍亂共白雞肉食之令人血氣不行二月勿食兎肉傷人神氣生䑕微温無毒主踒折續筋補骨搗薄之三日一易獺肝味甘有小毒主鬼㾏蠱毒却魚鯁止乆渇皆焼作灰酒和服之獺肉味苦温無毒主時病疫氣牛馬時行病皆取汁停冷服之六畜灌之狐隂莖味甘有小毒主女子絶産隂中癢小兒隂㿗卵腫肉并五臟及腸肚味苦微寒有毒主蠱毒寒熱蠱臟痼冷小兒驚癎大人狂病見鬼黄帝云麝肉共鵠肉食之作癥瘕野猪青蹄不可食及獸赤足者不可食野獸自死首伏地不可食獸有岐尾不可食家獸自死共鱠汁食之作疽瘡十一月勿食經夏自臭脯成水病作頭眩丈夫隂痿甲子日勿食一切獸肉大吉鳥飛投人不肯去者口中必有物口中無物㧞一毛放之大吉一切禽獸自死無處傷不可食三月三日勿食鳥獸五臓及一切果菜五辛等物大吉丹雄雞肉味甘微温無毒主女子崩中漏下赤白沃補虚温中能愈乆傷之瘡不瘥者通神殺惡毒黄雌雞肉味酸鹹平無毒主傷中消渇小便数而不利腸澼泄利補益五臓絶傷五勞益氣力雞子黄主除熱火灼爛瘡痓可作琥珀神物卵白汁微寒主目熱赤痛除心下伏熱止煩滿欬逆小兒泄利婦人産難胞衣不出生吞之白雄雞肉味酸微温無毒下氣去狂邪安五臟傷中消渇烏雄雞味甘温無毒補中止心痛黑雌雞肉味甘平無毒除風寒濕痺五緩六急安胎黄帝云一切雞肉合魚汁食之成心瘕雞居五色者食其肉必狂若有六趾四距元雞白頭家雞及野雞烏生子有文八字雞及野烏死不伸足爪此種食之害人雞子白共蒜食之短氣雞子共鼈肉蒸食之害人雞肉獺肉共食之作遁尸注藥所不能治食雞子噉生葱變成短氣雞肉犬肝腎共食之害人生葱共雞犬肉食令人榖道終身流血烏雞肉合鯉魚肉食生癰疽雞兎犬肉共食必利泄野雞肉共家雞子食之成遁尸尸鬼纒身四肢百節疼痛小兒五嵗以下飲乳未㫁者勿食雞肉二月勿食雞子令人常惡心丙午日食雉肉丈夫焼目首女人血死妄見四月勿食暴雞肉作内疽在胸腋下出痛孔丈夫少陽婦人絶孕虚勞乏氣八月勿食雞肉傷人神氣雉肉酸微寒無毒補中益氣止洩利乆食令人痩嘴主蟻螻黄帝云八月建酉日食雉肉令人短氣八月初勿食雉肉損人神氣白鵝脂主耳卒聾消以灌耳毛射工水毒肉味辛平利五臓鶩肪味甘平無毒主風虚寒熱肉補虚乏除寒熱利臓腑及水道黄帝云六月勿食鶩肉傷人神氣鴛鴦肉味苦微温無毒主瘻瘡清酒浸之炙令熱以薄止亦灸服之又治夢思慕者鴈肪味甘平無毒主風攣拘急偏枯血氣不通利肉味甘平無毒乆服長髮鬂眉益氣不飢輕身耐暑黄帝云六月勿食鴈肉傷人神氣越燕屎味辛平無毒主殺蠱毒鬼注逐不祥邪氣破五癃利小便熬香用之治口瘡肉不可食入水為蛟龍所殺黄帝云十一月勿食䑕肉損人神氣石蜜味甘平微寒無毒主心腹邪氣驚癎痙安五臟治不足益氣補中止腹痛解諸藥毒除衆病和百藥養痺氣消心下煩食飲不止腸澼去肌中疼痛治口瘡聰明耳目乆服强志輕身不飢耐老延年神仙一名石飴白如膏者良是今諸山崖處味酸噞食之心煩其蜂黒色似䖟黄帝云七月勿食生蜜令人暴下發霍亂黄蜜蠟味甘微温無毒主下利濃血補中續絶傷除金瘡益氣力不飢耐老白蠟主乆泄澼瘥後重見血者補絶傷利小兒乆服輕身耐老不飢生於蜜房或木石上惡芫花百合此即今所用蠟也蝮蛇肉平有毒釀酒止癩疾諸凡瘻心腹痛下結氣主益精氣强男子陽道交接不倦甚女泄精不用相連者魚味甘無毒主百病鰻鱺魚味甘大温有毒主五痔漏殺諸疾䱉魚肉味大温黒者無毒主補中養血治瀋唇五月五日取頭骨平無毒焼服止乆利鱓魚平無毒主少氣吸吸足不能立地黄帝云四月勿食蛇肉鱓肉損神害氣烏賊魚骨味鹹微温無毒主女子漏下赤白經汁並閉隂蝕腫痛寒熱癓瘕無子驚氣入腹腹痛環臍丈夫隂中痛而腫令人有子肉味酸無毒益氣强志鯉魚肉味甘平無毒主欬逆上氣癉黄止渇黄帝云食桂竟食鯉魚肉害人腹中宿癥病者食鯉魚害人鯽魚味甘平無毒主一切瘡焼作灰和醤汁傅之三日二又去腸癰黄帝云魚白目不可食之魚有角食之發心驚害人魚無腸膽食之三年丈夫隂痿不可起婦人絶孕魚身有黒㸃不可食魚目赤作鱠食瘕病酢食之害人一切魚共菜食之作蛔蟲一切魚尾食之不益人多有勾骨者人咽害人魚有角白皆不可食凡魚赤鱗不可食魚無腮不可食魚無全腮食之發癰疽鯆魮魚不益人其尾有毒治齒痛鰕魚有毒不可食二月庚寅日勿食魚大惡五月五日勿以魚子共猪肝食必不消化成惡病下利者食一切魚必加劇致困難治穢飯鯘肉臭魚不可合食之害人三月勿食鮫龍肉及一切魚肉令人飲食不化發宿病傷人神氣失氣恍惚鼈肉味甘平無毒主傷中益氣補不足療脚氣黄帝云五月五日以鼈子共包魚子食之作癉黄鼈腹下成王字不可食鼈肉兎肉和芥子醤油食之損人鼈三足食之害人鼈肉共莧蕨菜食之作鼈瘕傷人蟹殻味酸寒有毒主胸中邪熱百結痛喎僻面腫散漆焼之致䑕其黄解結散血愈漆瘡癢益筋氣黄帝云蟹目相向足斑者食之害人十二月勿食蟹鼈損人神氣又云龜鼈肉共猪肉食之害人秘菓菜共龜肉食之令人短氣飲酒龜肉並菰白菜令人生寒熱六甲勿食龜鼈害人心神螺蚌共菜食之令人心痛三日一發蝦鱠共猪肉食之令人常惡心多唾損精色蝦無鬚腹下通黒色者食之害人大忌勿輕十一月十二月勿食蝦蚌著甲之物凡魚頭無正白連珠至春上不可食也無腸膽魚不可食魚非黒黙不可食魚頭似有角不可食魚無腮不可食鯷魚赤目鬚不可食食不可合烏雞肉食生魚目赤不可作鱠食魚不可合鸕鷀食鯷魚不可合鹿肉食之鯽魚不可合猪肝及猴肉青魚不可合小豆藿食魚汁不可合六畜自死肉食青魚鮓不可合胡荽及生葵麥醤食鯉魚酢不可合小豆藿食鰕不可合雞肉食鰕無鬚及腹下通黒及煑之白皆不可食鯉魚不可合白犬肉食鯉魚不可合繁蒌菜作蒸鼈目凹不可食鼈腹下有如王字不可食鼈不可合雞鴨子食之鼈肉不可合莧菜食之亦不可合龜共煑之龜不可合𤓰共飲酒共秋菓食蟹目相向及足斑目赤者不可食之病人不可食鯷魚鱠魚䱉魚等姙身不可食龜魚鱠桂天門冬忌食鯉魚又云人有食蟹中毒煩亂欲死服五蠱黄凡得吐下皆差夫蟹未被霜多毒熱煑乃可食之或云是水莨所為彭蜞亦有毒蔡謨食之幾死食治中風附論夫風者四時五行之氣八布八方順十二月終三百六十日各以時從其鄉来為正氣之風風在天地為五行在人為五臟之氣生長為萬物非毒厲之氣人人當觸之遇不勝之氣乃病人之身唯在血與氣故身内血氣為真身外風氣為邪邪者風也是以聖人言避風如避矢故令人中風多病死者是不避邪毒氣也冝以食治之方發汗䜴粥方出聖惠方治中風傷寒壮熱頭痛三二日䜴一合荆芥一握麻黄三分去根節葛根一兩梔子仁三分石膏三兩搗碎綿褁葱白七莖切生薑半兩切粳米三合右以水三大盞都煎至二盞去滓内米煑作稀粥服之汗出為效如未有大汗冝再合服之葛粉撥刀方出聖惠方治中風手足不遂言語蹇澁精神昏憒葛粉四兩荆芥五錢䓤白一握生薑半兩切香䜴一合鹽花半兩羊腎骨髓一兩川椒五十枚去目并閉口者右以水五大盞先煎荆芥等取汁三盞和葛粉切作撥刀入汁中煑熟頓食之䜴粥方出聖惠方治中風手足不遂口面喎僻言語蹇澁精神昏悶䜴半升荆芥一握薄荷一握葱白一握切生薑五錢鹽花五錢羊髓五錢右藥先以水三大盞煎䜴荆芥等十餘沸去滓下薄荷等入米煎作粥食之羊肚食方出聖惠方治中風羊肚浄治如食法一枚粳米浄淘一合葱白七莖䜴一合生薑細切一分蜀椒去目并合口炒去汗三十枚右六味将五味藥拌勻入於羊肚内爛煑熟切如常食法淡五味日食一枚十日止葱䜴薏苡仁方出聖惠方治中風頭疼心煩苦不下食手足無力筋骨疼痛口面喎斜言語不止葱白一握䜴三合薄荷一握薏苡仁三合牛蒡根切半升洗去麄皮右藥以水五大盞煑葱白牛蒡根薄荷䜴等煎去二盞半去滓入薏苡仁煑粥空腹食之薏苡仁粥方出聖惠方治中風筋脈攣急不可屈伸及風濕等薏苡仁三合薄荷一握荆芥一握葱白一握䜴一合右以水三大盞煎薄荷等取汁二盞入薏苡仁作粥空腹食荆芥粥方出聖惠方治中風言語蹇澁精神昏憒口面喎斜白粟米浄淘二合半荆芥穗一握剉薄荷一握䜴三合右四味先将三味以水三升煑至二升去滓取汁一升半投米煑粥空心食之一方用白粱米冬麻子粥方出聖惠方治中風五臟風熱言語蹇澁手足不隨大便壅滯冬麻子炒搗研用仁半升白粟米浄淘三合薄荷一握荆芥穗一握右四味先以水三升煑薄荷荆芥二味去滓取汁二升以此汁研麻子仁濾過下白粟米煑粥空腹食之一方用青粱米惡實根粥方出聖惠方治中風不語惡實根去黒皮切一升生薑三兩切陳橘皮去白切二兩青粱米浄三合淘右四味以水五升先煑三味二升去滓下米煑粥空腹食之良葛粉索餅方出聖惠方治中風心痺熱言語蹇精神昏憒手足不隨葛根半斤搗取粉四兩荆芥穗一握剉䜴三合右三味以水四升煑䜴并荆芥六七沸去滓汁次将葛粉和作索餅於二味熟中煑熟毎空腹少入滋味食之人參粥方出聖濟總録治中偏風冐悶噪煩食飲不得人參一兩剉如粟以水四升煑至二升去滓下米粟米五合雞子一枚去黄用清薤白一合切右先用人參汁煑粟米粥将熟下雞子清入薤白切一合候熟食之如食不盡可作兩次葛粉飯方一名葛粉粥出聖惠方治中風狂邪驚走心恍惚失忘及治手足不遂言語蹇澁嘔吐昏憒不下葛粉搗取粉四兩粱粟米飯半升右以醤水浸飯漉出入葛粉拌勻於豉汁内急火煑熟著五味葱白食之日三仍勿雜食補益大棗粥方出聖濟總録治中風虚恐驚悖如人将補之四肢沉重大棗七枚去核青粱粟米二合右以水三升半先煑棗取汁一升半去滓入米煑粥食之葛實葉葅方出聖惠方治中風煩燥口乾手足不隨及皮膚熱瘡葛實葉嫩肥者一斤切酥五錢右先以湯煑葛實葉三五沸取出以新水淘過布絞去汁入於五味汁中畧煑㸃酥食之蒼茸葉根方出聖惠方治中風頭痛濕痺四肢拘攣痛蒼茸葉嫩苗一斤酥一兩右先煑蒼茸三五沸漉出用䜴取汁一合水二大盞半煎汁取一盞半入蒼茸及五味作羮入酥食之煑黒豆方出聖惠方治中風濕痺筋攣急痛胃中積熱口瘡煩悶大腸澁秘黒豆半升煑令熟酥五兩右相合令勻不調食前後食一兩匙酸棗仁粥方出聖惠方治中風筋骨風冷頑痺或不睡酸棗仁半兩炒令黄研末以酒三合浸汁粳米三合右以粳米煑粥臨熟下酸棗仁汁更煑三五沸空心食之天蓼粥方出聖惠方治中風半身不隨腰背反張用天蓼木三斤細剉以水一石煑取二斗去滓毎取汁一升内粳米一合煑粥稍熟食之一方用糯米治癩疾烏雞酒方出聖濟總録治中急風背强口噤舌直不得語目睛不轉煩熱苦渇或身重或身癢用烏雌雞一隻去毛嘴脚破開去腸肚以酒五升煑取二升去滓分温三服相繼服盡汗即愈不汗者用熱生薑葱白稀粥投之葢復取汗又雞腸肚勿去中屎𦂳急兩頭勿傷動煑汁服之作羮亦可皂莢芽葅方出聖濟總録治中風用皂莢嫩芽不限多少先煑熟絞去汁炒過入五味與紅粳米飯隨意食不可多烏驢皮食方出聖惠方治中風手足不遂骨筋煩痛心懆口乾面目喎偏用烏驢皮一張揉洗如法蒸令極熟條切於豉汁中著五味調和更煑過空腹食之羊頭膾方出聖惠方治中風頭眩羸痩手足無力用白羊頭一枚治如食法蒸熱細切以五味調和作膾食之熊肉羹方出聖惠方治中風手足不隨及風痺不仁筋急脚氣等疾用熊肉一斤去筋膜熟煮細切如常法調和作羮入五味任意食之烏驢頭肉方出聖惠方治中風頭眩心肺浮熱手足無力筋骨煩痛言語蹇澁一身動揺又主風壮憂愁不樂能安心氣用烏驢頭一枚洗如法蒸令熟細切更於汁中煑著葱蒜鹽等并㸃少許酥任性食之驢肉亦可作腌臉或煑食之亦得及作粥並可治中風濕痺五緩六急方出聖惠方用野駝脂一斤錬熟濾去滓収於磁盒中毎日空服温酒一中盞調下半匙治中風攣急疼痛方出聖惠方用鴈脂五兩錬熟濾過収於盒中毎日空心温酒一中盞調下半匙薯蕷撥刀方出聖惠方治心虚風眩頭痛用生薯蕷不限多少去皮磨如稀糊如白麵作撥刀䜴汁五味調和食之薏苡仁粥方出聖惠方治中風四肢拘攣不得屈伸言語蹇澁大腸壅滯筋骨疼痛薏苡仁三合冬麻子搗碎半斤右等分以水三升研麻子取汁用煑薏苡仁粥空腹食之治中風濕痺五緩六急骨中疼痛不能踏地冝喫烏雌雞羮方出聖惠方用烏雌鷄一隻治如食法煑令熟細攣以䜴汁薑葱蒜醬調和作羮空腹食之治中風脚膝疼痛不能踐地冝食鹿蹄肉羮方出聖惠方用鹿蹄一具洗如法煑令熟擘細於五味汁中煑作羮空腹食之耐風寒方出本草用熊掌得酒醋水三件煑熟則嗔大如皮毬食之耐風寒食治癎風癲附論夫風邪癲癎者内血氣虚風邪入於隂經故也人有氣血榮養肺腑若氣血少則心虛而精神離散恍惚不安因為風邪所傷則發癲也又癎病者亦曰積血風熱發則仆地涎沫無所覺者是也冝以食治之方猪心羮方出聖惠方治風癎驚癎憂恚虚悸氣逆及婦人産後中風驚邪恍惚猪心一枚枸把葉半斤葱白五莖切右各細切於䜴中調和作羮食之作粥及蒸炒食之亦得石膏粥方出聖惠方治風邪癲癎口乾舌難心煩頭痛暴熱悶亂石膏半斤粳米三合右以水五盞煑石膏取二大盞去石膏用米煑粥欲熟入葱白二莖䜴汁三合更同煑候熟空心食之石膏可三度用野狐肉方出聖惠方治驚癎風癎精神恍惚言語錯謬歌笑無度兼五臟疾冷蠱毒寒熱用野狐肉一斤及五臟治如食法於䜴中作羮調以五味食之或作粥臛炙蒸並得或以羊肉或鯽魚汁替汁亦得然不如䜴汁病人吐出清涎為效白雄雞羮方出聖惠方治風邪癲癎不欲睡卧自能驕倨妄行不休言語無度安五臓下氣用白雄雞一隻治如食法以水煑爛熟擘開肉於汁中入葱白薑五味作羮空心食之猪頭膾方出聖惠方治風邪癲癎發歇不定用猪頭一枚水煑熟停冷切作膾以五味食之驢肉腌臉方出聖惠方治風邪癲癎及愁憂不樂安心下氣用驢肉五斤水煑肉細切於䜴汁中著葱醬作腌臉食之或作羮亦得猳猪肉膾方出聖惠方治風邪癲狂病經乆不瘥或歌或笑行走無時用猳猪肉五斤水煑熟切作膾入五味取任食之食治風熱煩悶附論夫風熱者由膚腠虚風熱之氣先傷皮毛而入於肺風在心胸膈肺壅滯則令人頭面浮熱心神昏悶故謂之風熱也冝以食治之方酸棗仁煎餅方出聖惠方治風熱心胸煩悶不得睡卧酸棗仁三分炒熟搗末人參一分末茯神一分末糯米四兩水洗細研白麵四兩右藥末入米麵中水調作煎餅食之并着肉臑五味食之可淡竹瀝粥方出聖惠方治熱毒風心膈煩悶或小便赤澁淡竹瀝一合石膏一兩搗碎黄芩一分搗碎粟米三合蜜半合右以水二大盞半煎石膏黄芩至一盞半去滓下米煑粥熟入竹瀝及蜜攪勻候熟任意食䜴粥方出聖惠方治風熱攻心煩悶不已䜴二合青竹茹一兩米二合右以水三大盞煎䜴竹茹取汁一盞半去滓下米煑粥温食茯苓粥方出聖惠方治心胸結氣煩悶恐悸風熱驚邪口乾赤茯苓一兩麥門冬一兩去心粟米一合右細剉先以水二大盞半煎至一盞半去滓下米煑粥温食大棗粥方出聖惠方治風熱煩悶心眩膓癖腹中邪氣養皮膚氣力十二脈絡周通安神除恍惚大棗二十七枚茯神半兩粟米二合右細剉水二大盞煑至一盞半去滓下米煑粥温食之良煑梨湯方出聖惠方治風熱攻心煩悶恍惚神思不安梨三枚切沙糖半兩右以水一大盞煎至六分去滓食後分二次温服煑天門冬方出聖惠方治風熱煩悶口熱多渇天門冬二斤去心蜜二合右以水五升煑天門冬各十餘沸漉出以新汲水淘三五徧瀝乾又以水三升和蜜又煑五七沸和汁収於不津器中逐日吃三兩飲汁一合立效木通粥方出聖惠方治風多熱多睡頭痛煩悶木通二兩剉粳米二合右以水二大盞煑木通取汁一大盞半去滓下米煑粥温食竹葉粥方出聖惠方治風熱風癎心煩驚悸甜竹葉二握細切粟米二合浄淘右以水二升煑竹葉取一升去滓投米作粥食或作白粥即入竹瀝二合擾勻食之亦得又方用苦竹葉煎牛蒡方出聖惠方治風熱解丹石諸藥用牛旁嫩葉一斤洗如法好酥隨多少煉牛旁葉熟更洗去苦味重以酥及五味拌炒食之兼堪下飯秋冬用根佳春夏用葉妙木通粥方出聖惠方治風壅心膈煩熱口舌乾渇木通三兩剉生地黄五兩切粳米三合右以水三大盞煎取二盞去滓入米煑粥食之食治傷寒諸病方杏仁粥方出聖濟總録治傷寒吐下發汗後虛羸喘急欬𠻳不思食杏仁一兩湯浸去皮尖䨇仁細研入黄牛乳三合攪和濾取汁大棗去核七枚桑根白皮一兩剉人參一兩生薑半斤切片粳米浄洗三合右先用水三升煎人參棗生薑桑白皮至二升去滓澄清下米煑粥欲熟即下杏仁汁攪令勻空心任意食之地黄散方出聖濟總録治傷寒後脚膝無力四肢羸劣熟地黄一兩焙地骨皮一兩五味子一兩桂五錢去粗皮黄耆一兩半剉右搗羅為散毎服五錢先用水三盞将羊腎一具去筋膜切片同煎至一盞半先取出羊腎食之次去滓服藥空心食之枸把粥方出聖濟總録治傷寒後虚羸勞熱背膊頭疼枸杞四兩切葱白七莖切薤白十四莖切䜴一合炒粳米浄洗三合右用水三升先煎枸把葱薤䜴等取一升半去滓下米煑作粥空心食之薤白生葱粥方出聖濟總録治傷寒後氣虚羸劣薤白七莖切生薑三錢半切羊腎去脂膜細切一具粳米浄洗二合右先将米用水煑作粥候熟下羊腎生薑薤白鹽少許攪和令白空心食之牛膝粥方出聖濟總録治傷寒後虚勞四肢煩頭痛口乾壮熱牛膝苖葉一兩龍葵葉一兩生地黄一兩切焙粳米浄洗二合右用水二升先煎牛膝龍葵地黄取一升去滓下米煑粥空心食又方出聖濟總録猪腎去脂膜細切二具生地黄三兩研取汁粳米浄洗三合䜴一合炒右先将䜴并猪腎用水二升煎至一升去滓下米及生地黄汁煑作粥入五味和食不計時又方出聖濟總録羊腎去脂膜細切二具薤白七莖切黄耆一兩剉生薑切三錢半右先将黄耆生薑用水二升煑至一升去滓下羊腎及薤白煑作羹入五味調和食不計時候參苓粥方出聖濟總録治傷寒胃氣不和不思食日漸虚羸人參一兩剉白茯苓去黒皮剉半兩粳米浄洗二合生薑切二錢右先将人參茯苓生薑用水三升煎至一升去滓下米煑作粥臨熟下鷄子白一枚及鹽少許攪令勻空心食之薤白麵方出聖濟總録治傷寒後水榖痢薤白切半兩生薑切半兩麵一匙右以醋煑薤白生薑拌勻次用水同煑令熟空腹温食小豆食方出聖濟總録治傷寒後水榖痢小豆㨂擇浄洗一升黄蠟三兩右以水二升旋旋下水煑令極爛隨意食之不拘時候葱粥方出聖濟總録治傷寒後小便赤澁臍下急痛葱白十四莖細切牛酥半兩荳蔲一兩良薑半兩麵一兩右以水一升先煎荳蔲高良薑二合去滓并葱薑汁和米麵作粥煑熟以羊肉臛調和空腹食之蒸猪肚方治脾胃氣弱不下食猪肚一枚浄洗去脂人參一兩陳橘皮湯浸去白焙一兩粟米飯半升猪肺一枚切右搗人參橘皮為末以猪肺拌飯入二味末及鹽醬椒薑等末三錢共和内猪肚中縫合蒸熟空腹食山芋撥刀方治脾骨氣虚不嗜食日漸羸痩乾山芋末二兩白麵四兩羊肉四兩炒臛生薑二合右先用生薑汁和麵并山芋末切作撥刀煑熟以羊肉臛調空腹食之半夏碁子粥方治脾冐氣弱痰噦嘔吐不下飲食半夏二錢湯洗七遍令滑乾薑一錢炮裂白麵三兩雞子白一枚右搗羅為末與麵及雞子白相和㳛切碁子熟煑别用熟水淘過空腹食之羊肉索餅方治脾胃氣弱見食嘔逆痩劣白麵四兩雞子二枚取清生薑一合羊肉四兩炒右将雞子清生薑汁和麵作餅煑熟入羊肉臛調和空腹食之生薑煎方出聖惠方治脾胃氣弱不能下食黄痩生薑汁一合蜜二合生地黄汁一升右先和以微火煎如稀餳毎服一匙和水一盞入焼酒二合攪令勻空心食之羊脊骨羮方出聖惠方治脾氣虚冷羸痩不下食羊脊一具搥碎以水一斗煑取五升米二合右取汁二大盞半著米及薑鹽葱作粥或作羮空心食之高良薑粥方出聖惠方治脾胃冷氣虛勞羸痩不能下食高良薑二兩剉羊脊骨一具搥碎右以水一升煑二味取五升去骨等再取汁二大盞半用米二合入葱椒鹽作粥食之或以麵食䬪飥作羮並得硫黄粥方出聖惠方治脾胃氣弱不思飲食硫黄一分細研白粱米二合右以水煑作粥入硫黄末及酒二合攪令勻空心食之訶梨勒粥方出聖惠方治脾胃氣不和消去宿食訶梨勒二枚煨用皮搗羅為末粟米二合右以水二大盞煎取一大盞下米煑粥入少鹽空心食之猪肝方出聖濟總録治脾胃氣虚不下食雖食米糓不化猪肝半斤去脂膜野雞胸臆肉四兩右細切於細瓦上暴乾搗羅為末空腹粥内調一方猪肝一味依法暴乾為末白粥調食毎五錢日再食服之薑汁索餅方出聖惠方治脾胃氣弱食不消化羸劣痩弱白麵二兩麯末二兩右以生薑汁三合和作索餅着熟羊肉臛調和空腹食之雞子索餅方治脾冐氣弱見食嘔吐痩羸無力雞子五枚取清白麵一兩右以雞子清和麵作索餅入䜴汁中煑熟入椒薑葱等空腹食之或以羊肉臛和之糯米飯方出聖濟總録治脾冐氣弱糯米三升浄洗麯米五合研如粉右蒸糯米熟以麯米末拌勻器盛經宿毎日空腹食半盞猪脾粥方出聖濟總録治脾冐氣弱不下食米榖不化猪脾一具猪胃一枚右浄洗細切入好米兩合如常法煑粥空心食之羊肉索餅方出聖惠方治脾氣弱不下食四肢無力日漸消痩及治初欲有姙中憒悶嘔吐惡聞食氣頭重眼腫四肢煩痑多卧少起寒汗出疲乏羊肉四兩細切炒臛麵四兩右以生薑汁和麵作索餅以羊肉合䜴汁中熟煑空腹食之鯽魚羮方出聖濟總録治脾氣弱不下食四肢無力日漸羸痩蓴菜四兩鯽魚紙褁炮令熟研四兩右入橘皮生薑葱白煑羮空腹食之虎肉方出聖濟總録治脾氣弱常欲嘔吐用虎肉四兩切片以竹筋貫炙熟放冷食鯽魚熟鱠方出聖惠方治脾胃冷氣不能下食虚弱無力用鯽魚一斤鮮者治如食法細切作鱠以羊肉汁入椒乾薑一時羅蓽芰橘皮醬醋等煑令熟空心食之治脾胃氣冷喫飯嘔逆下赤白痢如麵腰臍切痛出本草方用猪腎一對研着胡椒橘皮鹽醬末等㳛麵如常法作餛飩熟煑空服二碗立差治脾胃冷氣不能下食虚弱無力冝鱠䜴羹出本草方用鯽魚一斤細切作鱠沸䜴汁熟再著胡椒乾薑蒔蘿橘皮等末空心食之治脾胃冷弱腹中積冷脹滿刺痛出本草用肥猪肉半斤以米鹽䜴等煑粥頻喫一兩頓普濟方卷二百五十七
