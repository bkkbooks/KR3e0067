body:
  text: 普濟方卷一百九十五明周王朱橚撰黃疸門總論夫五疸者黃汗黃疸榖疸酒疸女勞疸是也黃汗之狀身體俱腫汗出而不渴狀如風水汗出染衣黃如蘖汁其脈自沉此由脾胃有熱汗出入水浴水入汗孔中故汗黃也黃疸之狀食已即飢身體靣目爪甲牙齒及小便悉黃欲安卧或身體多赤多青皆見必發寒熱此由酒食過度臟腑熱急水榖相併積於脾胃復為風濕所搏結滯不散熱氣欎蒸所為也大抵發於陰部其人必嘔發於陽部必振寒而發熱榖疸之狀食已即頭眩心中怫欎不安而發黃此由大飢大食胃氣衝蒸所致也酒疸之狀身目皆黃心中煩痛足脛滿小便黃靣發赤斑此由飲酒多進榖少胃內生熱因大醉當風水入所致也女疸之狀身目皆黃發熱惡寒小腹滿急小便不利此由大勞大熱不能保攝房事復入水所致也其間多渴而腹脹者其病難療又有時氣傷風傷寒伏暑意令人發黃五疸口淡怔忡耳鳴腳弱微寒發熱小便白濁當作虗證治不可妄投涼劑愈傷血氣臨病之際不可不辨明也五疸雖不同其為黃則一自本自根未有非熱非濕而能致病者也濕氣勝則如薰黃而晦熱氣勝則如橘黃而明蓋脾主肌肉土色尚黃濕熱內蒸或重或輕不容掩於外矣自其濕熱瘀而傷血此又為血證發黃何以明之疸證之黃小便不利血證之黃則小便自利耳况夫脾受濕熱欎而不行意多有腹脹之候治法綱領大要疏導濕熱於大便小便之中人徒見茵陳湯五苓散黃連散三黃丸等隨試輒效則目之以尋常不思單陽無陰病勢已極疸而不渴猶可用攻疸而復渴其或腹膨全濟者鮮甚則寸口無脈鼻出冷氣與夫形如煙薰垂頭直視為心絶環口黧黑油汗發黃為脾絶此皆倉扁所望而驚焉者也脾與腎俱病為黑疸疸脈大順弦急而堅逆已食而飢胃熱消榖也黃疸附論論曰內經謂目黃者曰黃疸又曰安卧脈盛謂之黃疸其外證身體靣目及爪甲小便盡黃其內證食已即飢此由酒食過度脾胃有熱復為風濕所搏瘀結不散熱氣欎蒸故發是疾若靣色微黃身體或青赤黑色皆見者與純熱之證不同當於濕家求之諸黃疸發於陰部其人必嘔發於陽部其人振寒而微熱疸而不渴者可治其渴而疸者難治夫黃疸病發熱煩喘胸滿口燥者或因火劫其汗或從濕得熱在裏當下之方茯苓滲濕湯出濟生拔粹方治黃疸寒熱嘔吐而渴欲飲冷身體靣色黃小便不利不得安卧不思飲食白茯苓五分梔子二分茵陳蒿六分澤瀉三分木豬苓三分生黃芩黃連漢防己白术蒼术陳皮青皮各二分右㕮咀作一服水煎空心服知母湯經濟總録治中熱黃疸寒熱往來脈數煩困四肢勞倦知母焙赤茯苓去黑皮常山茵陳犀鎊黃連去鬚人參羚羊角鎊各一分柴胡鱉甲醋炙去裙襴甘草炙五錢龍膽半分右為散别入丹砂末半分合研勻磁合收每服二錢匕食前人參湯調下日再黃連湯聖經總録治黃疸遍身黃靣目皆黃黃連去鬚大青山梔子仁柴胡去苗茵陳蒿地骨皮黃芩去黑心芒硝各一兩大黃二兩細銼醋炒右粗搗篩每服五錢匕水一盞半煎八分去滓不拘時服茵陳湯聖濟總録治黃疸目黃小便如血心煩躁悶口苦頭痛茵陳蒿山梔仁各三分木通一兩炙甘草五分葀蔞根柴胡去苗各一兩麥門冬去心焙一兩五錢右粗搗篩每服五錢匕水二盞入竹葉草七片同煎至一盞去滓食後溫服木通湯治黃疸脾胃積熱皮肉皆黃煩躁口苦小便赤澀木通銼瞿麥各一兩赤茯苓去黑皮白茅根大青秦芁去苗土各三分生乾地黃焙一兩五錢右粗搗篩每服五錢匕水一盞半煎至八分去滓食前溫服茵陳散聖惠方治黃疸食已即飢身體靣目爪甲牙齒小便悉黃或寒熱身體多赤多青皆由酒食過度為風濕所搏熱氣欎蒸而成茵陳木通梔子仁各一兩大黃炒葀蔞一箇石膏各二兩炙甘草五分右㕮咀每服四錢水一盞生薑五片蔥白一莖煎至八分去滓不拘時候溫服大小便祕加枳實赤茯苓葶藶子又有傷寒瘀血不解欎發於表為黃疸其脈浮緊當以汗解獨煎麻黃節飲之木香丸治諸般黃疸婦人血氣不和男子諸積皆治之木香三錢皂礬五分百藥煎五分蒸餅八箇去皮捻碎平胃散紅棗肉四分針砂一兩醋炒右為末用好醋和蒸餅紅棗肉入前藥為一處丸如梧桐子大每服十五丸薑湯送下日進二服茵陳散治黃疸心神煩躁小便赤大便難不得安卧茵陳一兩犀角五錢升麻一兩梔子仁三分甘草三分炙微赤黃芩一兩朴硝一兩右為散每服四錢水一盞煎六分去滓無時溫服大小便利為度雞舌香湯聖濟總録治黃疸靣黃眼如金色四肢羸弱或時煩渴雞舌香秦艽去苗土各二分胡黃連丁香芎藭各五分柴胡去苗一兩右為粗散每服三錢匕水一盞煎至六分去滓食前溫服山茵陳散直指方治黃疸大小便祕澀梔子一兩枳實七枚製赤茯苓葶藶甘草炙各一兩每銼每服三錢薑三片煎服治黃疸夲草以亂髮燒灰水調服一錢匕日三服又方夲草以風延母煮服之土瓜根散聖惠方治黃疸其小便自利白如泔色此狀得之因酒過傷宜服土瓜根白石脂桂心蔞根兔絲子酒浸一日暴乾為末牡蠣燒為末各一兩右為末每服煮大麥粥飲調下二錢日三四服加減五苓湯濟生方治飲酒伏暑欎發黃煩渴小便不利赤茯苓去皮豬苓去皮澤瀉白术茵陳各等分一方用桂心無茵陳右㕮咀每服四錢水一盞半煎至八分去滓溫服不拘時候一方治黃疸利小便為散渴時水服方寸匕極飲水即利小便及汗出愈一清飲危氏方治黃疸發熱諸熱通用柴胡三兩赤茯苓二兩桑白皮製一兩川芎一兩甘草炙五錢右銼碎每服三錢生薑棗子水一盞煎服茵陳丸聖惠總録治黃疸靣目身體皆黃口乾煩躁發熱狂悶茵陳蒿常山各五錢大黃二分炒朴硝一分研豉一台炒右為末煉蜜和丸如梧桐子大每服二十丸食後煎竹葉湯溫送下必效散直指方治黃疸通用葶藶子隔紙炒龍膽草山梔子仁山茵陳黃芩各等分右為粗末每服三錢新水煎服茵陳丸聖濟總録治黃疸身靣悉黃小便如濃梔子汁茵陳二兩黃芩枳殼一兩炒黃去白大黃微炒升麻各一兩五錢右為末煉蜜為丸如梧桐子大每服三十丸清粥飲下日三四服大黃硝石湯千金方治黃疸腹滿小便不利靣赤自汗出為表和裡實當下之大黃黃蘗硝石各四兩梔子十五枚擘破右㕮咀水煎去滓納硝石礬石煮一升頓服茵陳湯治黃疸小便赤茵陳山梔仁秦芁升麻各四錢右搗為末每服三錢水一盞煎服柴胡湯聖濟總録治黃疸通身並黃柴胡去苗茵陳各一兩升麻龍膽各三分右銼碎每服五錢七水一盞半煎至八分去滓入地黃汁一合攪令勻食後溫服茵陳丸聖濟總録治黃疸身體靣目皆黃茵陳三分大黃銼炒黃連去鬚黃芩去黑心各一兩右為末煉蜜和丸如梧桐子大每服十五丸食後臨卧溫水送下黃連散出濟生拔粹方治黃疸身體靣目皆黃小便祕澀臟腑壅熱黃連去鬚川大黃細銼醋炒各二兩黃芩去黑心甘草炙各一兩右為散每服二錢匕食後溫水調下日三服治水腫不利小便非其法也故內經云濕氣在上以苦吐之濕氣在下以苦瀉之吐瀉後長服益元散加海金砂煎以長流水服之則愈矣大忌腳膝上針刺出水取一時之效後必死矣尤忌房室濕麵酒醋鹽味犯之必死鐵刷湯治黃疸靣目遍身如金色良薑六兩油炒茴香二兩炒甘草八兩五錢蒼术八兩右為細末每服二錢重薑三片鹽少許水一盞煎至七分和滓空心服四七湯治黃疸半夏五錢茯苓四錢紫蘇二錢厚朴三錢右為粗末每服五錢水一盞生薑棗煎至七分去滓無時服治黃疸靣目遍身如金色一名吹鼻散出聖惠方瓜蒂十四箇母丁香一箇黍米四十九粒右先搗瓜蒂為末次入二味同為細末每用半字夜卧令病人先噙水一口兩鼻內各吹半字吐了水便睡至夜或明日取下黃水旋用熟帛揾了直候取水定便服黃連散一方溫水調下頓服令盡吐利黃水兩服永除病輕者五日重者半月一方有赤小豆梔子蘗皮湯經驗良方治黃疸頭微汗小便利而微發黃者濕熱相摶微者宜服亦治瘟病發黃黃蘗皮二兩甘草一兩山梔仁十五箇右為粗末每服五錢水一盞半煎至七分溫服不計時候梔子湯聖濟總録治黃疸心中懊惱煩熱山梔子仁五錢枳殼去白麩炒一分大黃一兩銼炒右為粗末每服三錢匕水一盞入䜴二十粒煎至七分去滓溫服不拘時金匱方用枳實不用枳殼豬苓散肘後方治黃疸病及狐惑病豬苓茯苓白术各等分右共為末每服方寸匕水調下赤小豆散肘後方治黃疸心膈躁熱小便赤澀赤小豆一百粒秫米一百粒雞糞白一兩微炒右為末每服以新汲水調下一錢日三四服黃汗當出此通治靣目黃即瘥大黃丸聖濟總録治黃疸靣目飢瘦大黃銼一斤芎藭八兩右為末用蜜和成劑甑上炊七遍丸如梧桐子大每服三十丸熟水下空心食前日三服治黃疸本草以麻草一把去節綿褁以美酒五升煮取半升去滓頓服如治傷熱表發亦宜汗之則愈如人行十里汗未出則冉服冬月用酒春宜用水煮之良治黃疸本草以芭蕉子生食之消疸黃本草以鳬茨作粉食之秦椒散千金方治黃疸飲少溺多秦椒六銖瓜蒂五錢右治下篩水服方寸匕日三瓜丁散本草治黃疸目黃遍身如金色微腫五疸汗如黃柏汁瓜蒂四十九箇六月六日採自然落者用如末用以檳榔葉裹於東墻有風處挂吹令乾丁香四十九粒右用乾鍋子燒煙盡為度細研作末小兒用半字吹鼻內及揩牙大人用一字吹鼻內立瘥一方為末如大豆許納鼻中令病人深吸取鼻中黃水出梔子酒治黃疸梔子茵陳各一束右以無灰酒二大碗煎至八分三更時分服之忌油膩濕麵豆腐生冷等物柴胡湯出直指方柴胡去苗五錢甘草炙一分右銼以水一碗白茅根一握同煎至七分去滓溫服葶藶丸一名大黃丸千金方治黃疸大小便難喘急促甜葶藶炒二兩大黃炒一兩右為末煉蜜和丸如梧桐子大每服二十丸溫米飲下食後臨卧服喘慢即藥止治黃疸心膈燥熱小便赤澀聖惠方茅根三把細銼豬肉八兩細切右以水三大盞煎茅根至二盞去滓入肉合作羹盡一服愈茵陳五苓散出濟生拔粹方治黃疸茵陳蒿末一錢五苓散五分同煎右和食前服方寸匕日三治黃疸身眼黃如金色危氏方用東引桃根切細如筯若叉股者以下一握以水一大升煎取適溫空腹頓服後三日其黃離離如薄雲散聚百日方平復可時飲一盞清酒飲之則眼中易散不飲則散遲忌食麵豬魚等肉採桃根之時不可使婦人雞犬見修製此是徐之才家祕方治黃疸經驗良方用自死大螺燒灰存性平胃散各等分無灰酒煎茵陳湯調服不能飯煎湯調服解熱方直指方治黃疸解諸熱淋用生車前草研極細井水調下一方炒子為末米飲調下立止洞瀉治寒熱黃疸濕瘴本草取端午日南行豬苓合大丹是也治黃疸百藥不瘥本草用驢頭一枚煮熟以薑虀噉之并隨多少飲汁即效療男子女人黃疸病耳目悉黃飲食不消胃中脹熱生黃衣在胃中此腸間有燥糞使病宜服聖惠方用煎煉豬脂五兩每服炒大半匙以蔥白湯調服頻頻服之以通利為度一方無蔥白止用豬脂溫熱服之燥屎下愈治黃疸并利小腸作虀喫甚益顔色毒氣欎蒸面目盡黃寒熱發渴聖惠方用小麥苗杵絞汁飲六七合盡飲之三四日便愈大麥苗亦可服六七合日三四此酒疸也治黃疸皮膚眼睛如金色小便赤肘後方用生蔓菁子末熟水下方寸匕日三先後十日愈治患疸黃聖惠方用苜蓿根生搗絞汁服之良治黃疸肘後方用栁枝以水一斗煮取濃汁半升服令盡治大熱黃疸傷寒頭痛身熱瘴瘧利小便聖惠方用茵陳細切煮羮食之亦宜又一方以茵陳為散水煎服治黃疸熱毒結在胸膈上壅煩悶目赤口乾宜服之聖惠方用藜蘆一兩炮令小變色搗為末每服以溫水調下五分以吐為效不過數服此祕方也治黃疸本草用麗春草根搗取汁一盞空心頓服之服訖須臾即利三兩行其疾立已一劑不能全愈隔七日更一劑永瘥忌酒麵豬魚蒜粉酪等治黃疸大渴煩悶聖惠方用苦瓠白瓤及子三兩炒令微黃搗為細末每服五分匕不拘時候以溫粥飲調下用瓠瓤有吐者則當詳之一方每服五分匕日一服十日愈治黃疸靣目盡黃昏重不能眠卧聖惠方用苦葫蘆瓤如彈子大以童子小便二合浸之三兩食頃取兩酸棗許分納兩鼻中病人深吸氣及黃水出良治黃疸聖惠方用柞樹皮以三兩燒灰細研為末每服以新汲水調下日三服一方可服方寸匕治黃疸小便不異欲自利腹滿而喘者不可除熱熱去必噦三因方一名小半夏湯以半夏銼散每服用三錢以水二盞薑十片煎至七分不拘時服治黃疸本草取鹽麩子乾搗為末食之秦芁煮散聖惠方治黃疸身體靣黃及目爪甲小便俱黃心神煩悶秦芁去苗土三兩五錢芒硝一兩右為末用牛乳二盞半煎至一盞半食前溫分二服治黃疸千金方大黃二兩黃連三兩黃蘗一兩黃芩一兩麥苖五合右五味為末蜜和丸如梧桐子大先食服三丸日三不知加至五丸茵陳湯千金方治黃疸身體靣目盡黃茵陳黃連各三兩黃芩二兩大黃甘草人參各一兩梔子仁二十七枚右㕮咀以水一斗煮取三升分三服日三亦治酒疸酒癖治黃疸初得稍覺心中煩熱滿身黃色眼白睛黃覺如此者宜先合白鮮皮等七味湯以泄之黃連十味丸以壓之白鮮皮三兩乾葛五兩黃芩三兩欎金䜴五兩綿褁梔子十枚擘芒硝六兩右以水八升煮至二升半去滓內芒硝分溫三服服相去如人行二十里久更服此湯當得利利後將息一二日則合後黃連等十味丸服之黃連丸黃連五兩黃芩五兩苦參六兩沙參五兩乾地黃六兩乾葛六兩梔子仁三兩麥門冬一升去心茯芩五兩地骨皮五兩右搗篩為末蜜和丸以米飲下初服十丸日三服稍稍加至三十丸大如梧子黃疸亦有單服豬脂得瘥者忌豬肉冷水大酢蕪荑等物三物茵陳蒿湯治黃疸身目皆黃皮膚麴塵出茵陳蒿一把石膏一斤千金方加大黃二兩右以水八升煮取二升半去滓以猛火燒石膏令正赤投湯中沸定取清汁適寒溫服一升自覆令汗出周身遍以濕粉傅之則愈更一汗更一服一升汗出乃愈也治黃疸靣目爪甲皆黃心膈躁悶千金方一名瓜蒂散瓜蒂秫米赤小豆各二十七枚右治下篩病重者取如大豆二枚內著鼻孔中痛縮鼻須臾當出黃汗或從口中出汗升餘則愈病輕者如一豆不瘥間日復用又下里間以筒使人極吹鼻中無不死大愼之刪繁療天行毒熱通貫臟腑沉伏骨髓之間或為黃疸黑疸赤疸白疸榖疸馬黃等病喘息須臾不絶一方治酒疸為細末每服半錢匕米飲調下以吐為度增味導赤散如宜方治黃疸有熱小便赤澀靣目黃黃芩車前子山梔子川芎赤芍藥生地黃木通甘草炙各等分右㕮咀竹葉薑煎加茵陳龍膽草甘露飲子旅舍􅊀要方治胃熱卒黃疸遍身色黃腹滿小便赤澀并治齒齦宣露口乾齒痛涎血臭氣飢而不欲食小兒瘡牽出而不快石斛生地黃天門冬去心麥門冬去心枇杷葉去心黃芩枳實麩炒去瓤甘草茵陳去枝梗各一兩熟地黃右為散每服二錢水一盞煎至七分去滓溫服三黃散千金方治黃疸靣目身體盡黃方見本門內黃類治黃疸本草用秦芁一大兩細銼作兩貼子以上好酒一升每貼丰升酒絞取汁去滓空心分二服或利便止就中好酒人易治凡黃有數種傷酒曰酒黃夜食誤食鼠糞亦作黃因勞發黃多痰涕目有赤脈日益憔悴或靣赤惡心者是崔元亮用之及治人皆得力極效秦芁須用新好羅文者又方肘後方用黃雌雞一隻治之銼生地黃三斤內腹中急縛仰置銅器中蒸極熟絞取汁再服之治黃疸本草以臘雪小溫服之治黃疸皮膚眼睛如金色小便赤本草取小麥杵取汁一合治諸黃疸本草以樺木皮濃煮汁飲之良針砂丸治黃腫針砂八兩水淘淨醋浸三日炒成土色為度平胃散四兩縮砂一兩香附子四兩陳皮青皮各一兩右為細末醋糊為丸如梧桐子大每服四五十丸飯飲酒下紫金丹一名胋凡丸濟生拔粹方治男子婦人患食勞氣勞遍身黃腫欲變成水及久患痃癖小腸膀胱靣目悉黃膽􅈨三兩黃蠟一兩青州棗五十枚右于磁合內用頭醋五升先下􅈨棗慢火熬半日取出棗去皮核次下蠟一處更煮半日如膏入好臘茶末二兩同和丸如梧子大每服二三十丸茶酒任下如久患腸風痔漏陳米飲下日三昔趙彥才下血靣如蠟不進飲食蓋酒病授此方服之終劑而血止靣一月見效色鮮潤食亦倍常新安有一兵士亦如是與三百粒作十服亦愈治黃腫用皂􅈨同棗肉搗爛湯泡開蒸餅為丸如梧桐子大每服四五十丸茶湯任下鐵砂丸鮑氏方治黃腫鐵砂水淘淨晒乾醋炒碎八兩蓬术三稜醋煮厚朴陳皮茱茰泡各二兩右為細末神麯醋煮作糊丸每服五十丸米飲下忌生冷油膩毒物鮑氏又方治證同前鐵砂一兩黑牽牛一兩香附子五兩酒浸右用鐵砂淘淨擦去鏽盡入銚子入好醋炒赤紅指撚可碎方可用又勿炒太過乃和二藥末醋糊為丸每服四五十丸飲下鮑氏又方附子乾薑良薑白芷神麯麥蘖川椒茱茰陳皮青皮三稜蓬术右通前十五味各一兩治黃腫冷證又方鮑氏方治冷氣通身腫獨腹腫四肢軟不行氣喘黃腫者良薑乾薑陳皮各一兩江子四十九粒去殼袋江盛四味同煮乾去子不用附子砂仁草果三稜丁香香附子烏藥澤㵼檳榔蓬术各一兩鐵砂醋炒碎二兩右通共為末入陳倉米半升炒黃同研醋糊為丸生薑湯下以上并鐵砂丸治通身黃腫神效方瓜蒂焙乾三四錢右為細末每用半字於鼻內吹上日一度併吹三日如不愈後用黃芩末煎湯下五錢諸黃附論論曰諸黃病者一身盡痛發熱靣色潤黃七八日後壯熱口裏有血當下如豬肝狀其人小腹滿若其人眼睛澀痛鼻骨痛兩膞及項強腰背急即是患黃也黃病多大便澀但令小便快即不慮死不令大便多澀澀即心脹不安此由寒濕在表則熱搐於肝胃腠理不開瘀熱與宿榖相搏煩欎不得消則大小便不通故身體靣目皆變黃色凡黃病其寸口近掌無脈口鼻氣冷並不可治方白鮮皮散聖濟總録治諸黃皮肉如金色小便赤黑口乾煩渴白鮮皮二兩黃連去鬚土瓜根芍藥大青梔子仁茵陳蒿栝蔞根柴胡去苗各一兩五錢芒硝三兩五錢研黃芩去黑心一兩真珠三十枚燒赤研大黃三兩右為散每服三錢匕煎茅根汁調下空心頓服取利至晚不利冉服服了以小蔥豉粥投之無忌紫金丸危氏方治積黃理脾胃退黃針砂醋煮通紅紫荆皮酒浸香附子炒三稜醋浸一宿煮蒼术米泔浸青皮去皮陳皮去白厚朴薑製􅒦砂各一兩右為末醋糊和丸每服三十丸酒椒湯下熟水下亦可苦參方千金方治人無故忽然振寒皮膚麯塵出小便赤澀大便時祕氣力無異飲食不妨諸藥湯不除因為久黃苦參黃連瓜蒂黃柏去皮大黃蒸各一分葶藶炒五錢右為末每服一大錢米飲調服當吐下隨時消息加減一方用黃芩茵陳蒿丸聖濟總録治一切黃病茵陳蒿四兩大黃銼黃芩去黑心梔子仁各三兩右生用為末煉蜜和丸如梧子大每服二十丸米飲下日二服量病與之小便金色身皮皆黃並治之豬膏髮煎聖惠方治諸黃豬膏八兩亂髮如雞子大三塊右和膏中煎之髮消藥成分冉服病從小便出一方不計時候溫水調下半雞子殼治黃病多效本草用酸漿根搗汁飲之治黃病身作金色本草用煮稻穰汁浸之一方服之又稻榖芒炒令黃細研作末酒服之治五種黃病女子白沃漏下止血飬精保血脈嗜食生筋力去伏熱本草用芹菜作虀葅及煮食之治熱黃結實不通少頃當瀉一切惡物沙石草髮並出不利小便本草用蔓菁子水和服治黃病潤心肺用生王瓜子治發黃方千金方大黃茵陳黃蘖梔子仁各三兩黃連二兩右㕮咀以水九升煮取三升分三服先服湯後服丸又丸方千金方大黃五兩茵陳梔子各三兩黃蘖黃連黃芩各二兩右為末以蜜丸如梧子大白飲服二十丸令微利茵陳丸千金方治氣淋臚脹腹大身體靣目悉黃及酒疸短氣不得息茵陳天門冬梔子各四兩大黃桂各三兩通草石膏各二兩半夏半升右蒸大黃天門冬通草半夏梔子曝令乾合搗篩蜜丸如豆大服三丸日三忌生魚以豆羹服不得用酒一方去石膏內滑石二兩不知加至十丸治發黃身靣目悉黃如金色小便如濃蘖汁衆醫不能療者千金方茵陳梔子各四兩黃芩大黃柴胡升麻各三兩龍膽二兩右㕮咀以水八升煮取二升七合分三服若身體羸去大黃加梔子仁五六兩生地黃一升延生祕録無茵陳有梔子四兩栝蔞三兩芒硝二兩近效方有枳實二兩夫發黃色久變作桃皮色心下有堅嘔逆不下飲食小便極赤色少四肢逆冷脈深沉極微細遲者不宜服此方得下必變厄也宜與大茵陳湯除大黃與生地黃五兩服湯盡消息看脈小浮出形小見不甚沉微便可治也脈浮見者黃當明不復作桃皮色心小自寬也大茵陳湯治內實熱盛發黃如金色脈浮大滑實緊數者夫發黃多是酒客勞熱或溫毒內熱者故黃如金色也茵陳黃蘖各一兩五錢大黃三兩黃芩白术各一兩甘草茯苓栝蔞根前胡枳實各二兩梔子二十枚右㕮咀以水九升煮取三升分三服得快下消息三四日更治之療黃心煩熱口乾皮肉皆黃肘後方秦芁一錢二分牛乳一大升右同煮七合去滓分溫服冉服痊治一切發黃方朱氏集驗方山茵陳川棟子麥門冬山梔子甘草右等分以燈心煎服不拘時候破黃七神丹華陀中藏經方朴硝二斤硃砂五兩大黃七兩濕紙包煨梔子二兩䜴半升以絹袋盛甘遂二兩膩粉一兩右以水二斗熬令盡除甘遂豉梔子大黃只取朴硝硃砂粉末糊丸如彈子大每服一丸水下以吐瀉為度棗礬丸治食勞黃目黃身黃者用皂礬不拘多少砂鍋內木炭燒通紅赤米醋內點之赤紅為細末棗肉為丸如梧子大每服二十三十丸食後生薑湯下去目黃好睡本草用葈耳葉挼安舌下令涎出治患熱黃本草用扁蓄搗汁頓服一升重者冉服治熱黃及心痛本草以白蒿生搗汁飲之治黃本草以髮髲燒灰水服一寸匕日三治五種黃病本草用翹搖生搗汁服一升日二瘥甚益人黃汗附論論曰黃汗者汗出如蘖汁沾衣黃色故謂之黃汗由脾胃有濕瘀熱伏留熏發肌肉散而為汗其證使人身體虗浮骨節疼痛發熱汗出而不渴者是也方黃耆湯聖惠方治黃汗身體腫發熱不渴狀如風水汗出染衣黃耆去蘆蜜炙赤芍藥茵陳蒿各二兩石膏四兩淡䜴一兩麥門冬去心一兩炙甘草五錢右㕮咀每服四錢水一盞生薑五片煎至七分去滓食前服一方入竹葉十四片不用生薑一方無甘草吳籃湯聖濟方治黃汗身體發黃汗出而不渴狀如風水汗出著衣皆黃吳籃芍藥麥門冬去心桑根白皮銼防己白鮮皮山梔子各一兩五錢右銼如麻豆每服三錢匕水一盞煎至八分去滓空心溫服未效再服茵陳蒿湯聖惠方治黃汗身體熱不退大小便不利茵陳蒿赤芍藥炙甘草銼木通銼赤茯苓去黑皮黃耆各一兩大黃炒二兩右銼如麻豆每服五錢匕水一盞半煎至八分去滓溫服如人走十里再服以大小便通利為度桂枝黃耆湯治黃汗自出發熱身腫小便不利白芍藥一兩五錢辣桂一兩甘草炙一兩黃芩五錢黃耆炙二兩右銼散每服四錢水一盞半薑五片棗三枚煎服覆取微汗未汗冉服桂枝加黃耆湯千金方治黃汗病兩脛自冷假令發黃此屬歷節食已則汗出又身常夜卧盜汗出者此勞氣也若汗出即發熱者久久身必甲錯也發熱不止者必生惡瘡也若身重汗出已輒輕者久久必身瞤瞤則胸中痛又從腰已上必汗出下無汗腰寬弛如蟲在皮中狀劇者不能食身疼重煩躁小便不利者名曰黃汗桂枝湯加黃耆五兩主之桂去粗皮白芍藥各三兩甘草炙三兩黃耆五兩右銼如麻豆每服五錢匕水一盞半入生薑半分棗二枚擘破同煎取七分去滓溫服覆取微汗須臾不汗者食稀熱粥助湯力未汗冉服直指方有黃芩名桂枝黃耆湯甘草湯聖惠方治脾臟瘀熱不散心神煩亂小便赤澀或汗出如蘖汁甘草微炙梔子仁黃蘖白术各一兩右為散每服四錢以水一盞煎至六分去滓溫服日四五服黃耆苦酒方千金方治黃汗身體腫發熱汗出而不渴狀如風水汗水沾衣色黃如蘖汁脈自沉此由汗出入水中浴水入汗孔從外而得之黃耆五兩芍藥桂去皮各三兩右銼如麻豆每服五錢匕苦酒一盞半煎至七分去滓溫服服之當心煩苦酒阻故也一方用苦酒三合水一盞半同煎梔子丸聖惠方治黃汗體熱大小便不利梔子仁括蔞銼炒苦參各一兩右為末醋漬雞子全用二枚丸如梧桐子每服三十丸溫水下日四五服一方除熱不吐下即自消也治黃汗汗出如蘖汁沾衣身體虗浮用蔓菁子二兩每服二錢匕井花水調下空心日三三服以知為度急黃附論論曰諸發熱心戰定必發為急黃謂其卒然發黃心滿氣喘命在須臾故名急黃也有初得病即身體靣目發黃者有初不知是黃死後變黃者但先辨其證當急治之此由脾胃有蓄熱榖氣欎蒸因熱毒所加故有斯疾方龍膽湯聖惠方治急黃靣目如金色渴欲飲水龍膽一兩木通銼土瓜根各一兩五錢石膏二兩碎犀角屑一兩梔子仁五錢大黃銼炒一兩五錢白茅根銼朴硝各一兩右粗散每服三錢匕用水一盞煎至七分食後溫服白鮮皮散聖惠方治急黃頭目四肢煩熱疼痛小便赤大便難心躁不得睡白鮮皮升麻各五錢朴硝二兩茵陳一兩黃芩五錢梔子仁大青葛根各五錢大黃炒二兩右為散每服以新汲水調服三錢須臾當利三兩行如人行十里未利再服茵陳湯聖惠方治急黃目如梔子色小便赤心煩悶茵陳蒿梔子仁黃芩去黑心大黃銼炒白鮮皮黃連去鬚各一兩朴硝貝齒煆各五錢右除朴硝外粗搗篩每服五錢匕水一盞半煎至一盞去滓入朴硝末一錢冉煎令沸食後溫服犀角湯治急黃熱毒攻發舌急眼黃犀角屑三分茵陳蒿梔子仁升麻各五錢黃芩去心三分大黃炒一兩朴硝研一兩五錢甘草五錢右為散每服五錢水一盞半入竹葉四五片同煎至一盞食後溫服赤小豆散聖惠方治急黃煩熱口乾皮肉悉黃赤小豆一合丁香秫米一勺瓜蒂薰陸香另研各一分青布五寸燒灰研麝香另研一分右各研散和勻每服一錢匕米飲調下食後服當吐下黃水即瘥一方少許吹鼻中犀解散治急黃心膈煩躁目赤痛犀角屑黃芩升麻梔子仁各一兩茵陳朴硝各二兩右為散每服四錢以水一盞入竹葉三七片煎至六分去滓不拘時候溫服升麻湯聖濟總録治急黃靣目如金色煩渴飲水升麻三分秦芁去苗土一兩凝水石研一兩五錢括蔞根三分朴硝三分右粗散每服三錢匕用水一盞煎至七分去滓食後溫服日三丁香散聖惠方治急黃宜服吐之丁香瓜蒂赤小豆各七粒右為散以雞子一枚相和用新汲水調服之當吐利即效未應再服麥門冬飲子吐訖及炙了計即渴仍服麥門冬去心四兩括蔞三兩竹葉一升茯苓四兩升麻二兩生蘆根一升甘草炙一兩右切以水七升煎取二升五合絞去滓分溫三服服後相去如人行八九里久服此飲渴即止黑豆煎治急黃心膈煩躁遍身悉黃黑豆一升生地黃汁麥門冬生藕汁各二兩酥五錢右先用水五盞煎黑豆至二盞去豆取汁再煎一盞然後下蜜生地黃麥門冬生藕等汁并酥相和慢火煎成膏磁器盛候冷每服半匙或一匙食後含化日三服瓜豆散治急黃心上堅硬渴欲飲水氣息喘粗眼黃瓜蒂二合熬赤小豆二合為末暖漿水五合右服方寸匕一炊久當吐不吐再服五分匕若吹鼻中兩三黑豆許黃水出歇芒硝散千金方治急黃熱氣骨蒸兩目赤腫生地黃汁八合芒硝一兩大黃一兩五錢右每用二服五合日二以利為度不須二服熱甚方可用大黃散治急黃兼治氣痛黃大黃芒硝各二兩以水三升半漬一宿平旦煎絞汁一升半納芒硝二兩絞服之須臾當快利雞子方聖惠方治急黃及心黃狂走煩躁不解生雞子二枚去黃用白朴硝五錢細研右相和熟調頓服之效治急黃小便赤黑口乾煩躁聖惠方用蔓菁子取油不計時候頓服如無油即以蔓菁子搗汁絞取一盞服之候顔色黃或精神憊用之有效未效再服治暴熱身黃祕塞用苦菜煮汁服之治急黃欲死本草用雄雀屎兩枚細研調水溫服之治五般急黃本草用山豆根末空心以水調下二錢治心急黃本草用百合蒸過蜜和食之作粉尤佳紅花者名山丹不堪食黃蒸湯黃蒸麥麴豬屎各一升以水五升漬一宿煮取三升絞去滓頓服一升治急黃本草取苦瓠一枚開口以水煮中攪取汁滴鼻中治急黃黃疸及內黃腹結不通本草用蕪菁搗為末水絞汁服當得嚏鼻中出黃水及下利治卒患急黃熱盛欲死者本草於沙土中掘坎斜埋患人令頭出土上灌之久乃出曾試有效當是土能收攝熱也陰黃附論論曰陰黃者靣色黃頭痛不發熱不欲聞人聲此由陽伏於陰邪熱沉潛散於肌肉身黃如橘故謂之陰黃昔人有説下之後謂身目發黃者當於寒濕中求之此其類也方茵陳散治陰黃身體靣目俱黃小便如䜴汁色茵陳白鮮皮黃芩栝蔞根梔子仁赤芍藥木香各一兩枳殼一兩去白炒黃柴胡去苗黃連去鬚朴硝土瓜根茅根大黃炒各二兩大青一兩右為散每服五錢水一大盞入䜴五十粒煎至五分去滓溫服如人行十里再服以利一二行為度便煮稀蔥䜴粥食之忌豬肉冷水魚蒜粘膩及熱食一方以茅根煮飲待冷空腹以茅根飲服一方有紫雪無朴硝秦艽丸聖惠方治陰黃身靣悉黃大便澀小便如梔子汁秦艽去苗梔子仁茵陳檳榔各一兩啇陸一分陳皮湯浸去白甜葶藶隔紙炒令紫色各一兩右為末煉蜜丸如梧子大每服二十丸溫水下日三茵陳散聖濟總録治陰黃身如橘色小便不利茵陳二兩桂去皮五錢澤瀉一兩赤茯苓去皮白术豬苓去皮各三分右為散每服二錢匕溫水調下日三服大黃散聖惠方治陰黃小便不利靣赤身汗出者表和裏實也宜下之大黃炒黃蘖梔子仁甘草炙木通各一兩朴硝二兩右為散每服四錢水一盞煎至六分溫服如人行十里再服以利為度赤小豆散聖惠方治陰黃赤小豆丁香各三七粒麝香一錢研瓜蒂二七枚青布灰二錢右為散每服一錢匕熟水調下日二服以吐為度更取少許吹鼻中即有黃水出為效半夏湯聖惠方治陰黃小便色不變欲自利腹滿而喘者宜服下人參去蘆頭葛根各二兩半夏一兩湯泡洗七次去滑焙右銼如麻豆每服四錢匕水一盞生薑半分切煎取七分去滓不拘時候溫服秦艽湯一名秦艽散聖惠方治陰黃不欲聞人言小便不利秦芁去土一兩旋覆花赤茯苓去皮甘草炙各五錢右為粗末每服四錢匕以牛乳一盞煎至六分去滓溫服不計時候龍膽湯聖惠總録治陰黃龍膽秦芁去苗各一兩五錢升麻一兩右為粗末每服五錢匕水一盞半浸藥一宿平旦煎至八分入黃牛乳五合再煎至一盞去滓空心分溫服日二服再取利為度治陰黃汗染衣涕唾黃肘後方用蔓菁子搗末平旦以井花水服一匙日加至兩匙以知為度每夜小便中浸少許帛子各書記日色漸退白則瘥不過服五升以來治陰黃眼黃汗染衣涕唾黃聖惠方用大黃五兩飯下蒸一炊取出曝乾為散以溫水調下日三四服常要大小便利為度又方用好黃蒸二大升每夜以水二大升浸微暖令熱勿令沸銅器中平旦絞取汁半升飲之餘汁須飲則飲冬日微暖服夏日冷服每夜則浸依前服之亦得每夜小便中浸帛片取色退為驗忌麵豬羊魚等肉療因將息傷熱變成隂黃通身壯熱小便黃赤眼如金色靣又青黑心頭氣痛繞心如刺頭旋欲倒兼肋下有瘕氣及黃疸等經用有驗本草用麗春草以春三月採花隂乾有前病者取花一升搗為散每平朝空腹取三方寸匕生麻油一盞頓服之日惟一服隔五日再進以知為度治陰黃黃疸及暴急黃本草瓜蒂丁香各七枚小豆七粒右為末黑豆許吹於鼻中少時黃水出瘥內黃附論夫內黃者由熱毒之氣在於脾胃與榖氣相摶熱蒸於內不得宣散先心腹脹滿氣急然後身靣悉黃名為內黃也方治內黃梔子仁黃芩柴胡升麻栝蔞根大黃炙芒硝各一兩龍膽五錢右為散每服四錢水一盞煎至六分去滓不拘時候溫服茵陳散聖惠方治內黃身靣眼延黃如金色小便如濃蘖汁衆醫不能療茵陳二兩黃芩梔子大黃炒龍膽枳殼去白炒黃秦芁去苗各一兩升麻三兩右為散每服四錢水一盞煎至六分去滓不計時候溫服三黃散一名三黃丸聖惠方治內黃身體皆黃宜服之大黃炒黃連去鬚黃芩各二兩右為末每服以溫水調下二錢一方以蜜為丸不拘時服治內黃用桞枝二兩銼水一盞半煎至六分不拘時候溫服又方用大黃一兩銼水一盞煎至六分不拘時候溫服又方用黃栝蔞一枚大者以新汲水一盞半浸栝蔞搗絞汁下蜜半合入三分細研攪令勻分三服頓服之黃病小便下淋澀附論夫黃病小便下淋澀者由積熱在於心臟流於小腸則令小便澀少下物如沙而多疼痛也方木通散治心臟黃結靣目四肢通黃乾嘔大便不通小便赤色腹痛心煩木通一兩大黃炒一兩五錢枳殼黃芩各五錢赤芍藥一兩前胡去蘆一兩五錢白术梔子仁各三分甘草微炙五錢半夏湯洗七次去􅉸三分右為散每服五錢水一盞生薑半分煎至五分去滓不拘時溫服以大小便利為度茅根散治心脾熱壅皮肉靣目悉黃煩躁小便赤澀茅根麥門冬去心各二兩秦芁去苗一兩犀角三分大黃一兩五錢黃芩一兩赤芍藥三分朴硝一兩右為散每服四錢水一盞至六分溫服如人行十里再服以利為度蘧麥散治黃病小便赤澀心神煩悶蘧麥茵陳黃芩麥門冬去心各一兩大黃一兩五錢梔子仁二兩右為散每服四錢水一盞煎至六分無時服小便利為度大黃散治黃病腹脹滿小便赤而澀大黃炒朴硝梔子仁各二兩黃蘖冬葵子各一兩右為散每服四錢水一盞煎至六分溫服日四五服以利為度茵陳散治黃病心下橫堅小便赤黃不利疼痛茵陳木通各一兩赤茯苓前胡各三分椒目炒一分赤芍藥三分右為末每服二錢以粥飲調下日四五服普濟方卷一百九十五
