攣急遍體疼痛逰走無定百藥不效川山甲十五斤石灰炒去灰全蝎七個去毒麝香一研别地龍去土一兩草烏生去皮一兩沒藥乳香别研各三錢松脂半兩蜈蚣七條生用五靈脂去砂石三錢白殭蠶薑汁炒半兩班貓七個糯米炒去頭目右為末酒糊丸如菉豆大以青黛為衣每服二十丸不拘時溫酒送下忌食熱物木通丸出聖劑總録治風走注身體疼痛榮衛凝澀石斛一兩去根牛膝去苖酒浸一宿切焙一兩附子二枚共及一兩者炮製去皮臍乾薑炮三分肉豆䓻四枚去皮麵裹煨麵熟為度檳榔銼四兩木香一分甘菊炒二兩石硫黃一分白花蛇酒浸去皮骨焙二兩枸杞子九蒸九暴炒黃二兩右為末以酒煮麵糊和丸如桐子大每服二十丸空心溫酒下如服了轉覺腦骨內疼甚者乃藥效婦人當歸酒下作細散每服一錢半匕溫酒粥飲任調下防風天麻散出宣明論治風麻痺走注肢節疼痛中風偏枯或暴瘖不語內外風熱壅滯解昏眩出儒門事親防風天麻川芎香白芷草烏頭去蘆白附子荆芥穗羅淨當歸焙甘草各半兩滑石二兩羌活半兩右為末熱酒化蜜少許調半錢加至一錢覺藥力運行微麻為度或鍊蜜為丸如彈子大熱酒化下一丸或半丸細嚼白湯化下或細嚼酒愈妙日三服此藥微有熱性甚能開發風熱鬱結以使氣血宣通而愈或風多熱少寒涼諸藥不能退者亦宜以開發或三服兩服不中效即却服防風通聖散得熱勢少減復與服之熱勢大甚者及目疾口瘡咽喉腫痛者不宜服之但宜退風熱辛寒之藥也少尤宜服之如意丸出聖劑總録治風毒走注筋骨疼痛草烏頭去皮臍五靈脂蘹香子炒青橘皮去白焙藝薹子陳皮去白焙木鱉子去殼防風去義生用各一兩巴豆四十九粒去皮心膜研出油班貓八十一個去頭足炒木香一分右為末用宿炊餅以釅醋煮作糊和丸如豌豆大每服一丸酒下不計時骨碎補丸出聖劑總録治風毒走注疼痛骨碎補去毛兩半葳靈仙洗焙草烏頭炮去皮各二兩天南星炮地龍去土炒自然銅醋煆焠木鱉子去殼楓香脂各一兩沒藥乳香研各半兩右為末酒煮麵糊和丸如梧桐子大每服五丸溫酒下空心服之虎骨散出聖惠方治風疼痛走注不可忍虎脛骨白芷當歸漏蘆紫笋茶各一兩桂半兩碙砂醋塗虎骨上慢火炙黃半兩芫花醋拌炒黑色地龍微炒各一分赤芍藥三分右細羅為散每服不拘時以溫酒調下一錢天麻丸出聖濟録治風毒上攻下注逰走不定衝繫疼痛天麻地龍去土羌活去蘆頭獨活去蘆桂去粗皮附子去皮臍生用沒藥研荆芥穗各二兩麝香研一錢右為末生蜜和丸如櫻桃大瓷器內收每服一丸用荆芥臘茶嚼下如注破腳至甚者不過二十日上攻則食後服下注則食前服烏頭散出聖惠方治風走注疼痛及手足拘急頭疼不可忍川烏頭炮去皮臍乾薑炮製川椒去目及閉口者微炒去汗硃砂細研細辛桂心各半兩天雄炮製去皮臍莽草微炙雄黃細研各一兩右細羅為散每服不拘時以溫酒調下半錢桂心散出聖惠方治風走注疼痛桂心地龍微炒白殭蠶微炒漏蘆葳靈仙芎藭白芷當歸木香已上各半兩右細羅為散每服不拘時以熱酒調下二錢乾地黃丸出聖劑總録治走注疼痛生地黃焙白芷當歸切焙沒藥研防風烏頭炮製去皮臍木香赤小豆炒各等分右為末水浸蒸餅心和丸如梧桐子大每服五丸冷酒下空心食前服日二應痛丸出聖劑總録治風毒內攻走注疼痛不定五靈脂黑色者炒地龍去土炒白芥子草烏頭去皮臍生用自然銅煆醋淬研各一兩乳香研半錢巴豆七枚去皮心膜醋煮黃色右為末酒煮麵糊和丸如小豆大每服五丸溫酒下葳靈仙丸出聖劑總録治風氣走注疼痛無常處葳靈仙去苖土五靈脂各一兩烏頭炮去皮臍木鱉子去殼乳香研各半兩芍藥右為末滴酒和丸如梧桐子大每服七丸食前冷酒下加至十丸活絡丹治一切痛風走注渾身疼痛方見諸風雜治類漢椒散出聖惠方治風走注疼痛及白虎歷節風等漢椒去目及閉口者微炒去汗側子炮去皮臍各一兩桂心麻黃去根節當歸木香各一分右細羅為散每服不拘時以溫酒調下半錢治風走注疼痛不定隨痛處尉之芫花漢椒去目桑根白皮各二兩栁蚛屑桂心一兩麩一升右用醋一升拌炒令熱以青布裹尉痛處冷即更入醋重炒依前尉之以差為度又方出聖惠方針砂五兩砒霜碙砂雌黃磁石各半兩麝香一分右為末臨時以醋拌炒令熟用熱帛裹尉患處立差羌活丸出王氏博濟方治風毒走注疼痛及體內多風疾者羌活獨活去蘆頭各二兩地龍去土炒一兩天麻三分烏頭炮製去皮臍半兩右為末用生蜜和丸如梧桐子大每服二十丸薄荷湯或溫酒下食前服莎草根丸出聖劑總録治風走注循入經絡及腰膝疼痛莎草根用豬膽炒令香草烏頭用淨水浸一半炒去皮尖各二兩劉寄奴一兩葳靈仙去土躑躅花各兩半右為末用乳香沒藥各半兩入醋煮麵糊和丸如梧桐子大火煆自然銅研為衣每服五丸漸加至十丸煨蔥酒下仙靈脾散治風走注疼痛往來不定仙靈脾葳靈仙芎藭桂心蒼耳子各二兩右細羅為散每服不拘時候以溫酒調下一錢神效膏治風走注疼痛上下不定隨處貼之牛皮膠水溶作膏一兩藝薹子安息香附子生去皮臍漢椒生用各半兩右細羅為散入膠中和成膏塗紙上隨貼之立定烏頭丸治走注疼痛不可忍烏頭炮去皮臍乾蝎去土炒地龍去土炒躑躅花去心各等分右為末醋麵糊和丸如菉豆大每服五丸婦人當歸酒下男子荆芥酒下治風走注疼痛水銀一兩棗十五枚蒸熟取穰和水銀研星盡天南星炮三分乾蝎半兩羌活三分右為末入水銀棗一處研和丸如小豆大别以膩粉拌令日色隂乾每服不拘時以豆淋酒下五丸一方無羌活趁痛丸治風毒留客日深氣虛邪實攻繫不定走注疼痛大戟刮去皮甘遂白芥子各一兩右為末用大麥麵一兩和勻醋調作餅子慢火炙黃熟再搗羅用薄麵糊為丸如梧桐子大每服十丸漸加至十五丸空心冷酒下病痛甚不入大麥麵亦得藝薹子散治風毒走注疼痛如虎囓藝薹子天南星草烏頭並生各一兩右為散每用五錢匕量入生麵一釅醋生薑汁各少許調成膏攤紙上厚一分貼痛處即止消毒膏治風毒走注疼痛筋脈攣急馬牙硝燒赤研一兩烏頭大者二枚燒存性三分研右同研令勻每用三錢匕白麵三錢匕生薑汁一盞同熬成膏攤於帛子上熱貼日二換之治風走注疼痛地龍微炒一兩麝香細研入一分右細羅為散每服不拘時以溫酒調下一錢芥子膏治風毒走注疼痛及白虎歷節風用芥子為末雞子白調傅之一方治中風口噤舌本縮無雞子白用醋調塗頷下及傅頸周圍立效一方芥子同酢煮傅之虎骨木瓜丸治飲酒過度寒濕停滯經絡不和傷敗氣血走注筋骨疼痛晝靜夜甚或冒所傷亦治筋骨走注并婦人血風疼痛並治之虎骨酥炙南乳香研沒藥各一兩木瓜天麻蓯蓉牛膝已上四味各二兩用好酒浸十日取出焙乾右為細末將原浸酒作糊為丸如梧桐子大每服三十丸至五十丸空心食前溫酒送下日進二三服透骨膏治一切風濕走注疼痛生地黃馬鞭草各半斤吳茱茰白麵各三兩骨碎補乾生薑屑各四兩鱉甲二個炙蒲黃二兩右為細末用米醋調似膏子於火上溫熱攤於痛處用飯裹蒸候冷再炒如此七次於避風處用地黃丸大治走注風及風氣四肢倦怠不思飲食出大全集謂之四聖丹熟地黃洗銼焙當歸同上玄參並同上羌活銼焙揀節種者右四味各等分為細末鍊蜜為丸如梧桐子大每服三十丸或溫酒鹽湯空心食前服藥良久仍進飲食忌豬雞羊以羌活之故忌熱麵以當歸之故忌羅蔔以地黃之故忌豬羊血以耗藥力之故餘皆不忌治走注風散血止痛以石蠶節搗篩末酒溫服之治走注風用建水草葉焙乾碾末暖酒服風入腹拘急切痛論夫風入腹拘急切痛者風邪搏於隂經也風邪搏於隂經則腸縮踡腸縮踡則絀急風寒之氣與正氣相繫故裏急而切痛也方竹瀝湯治風毒入人五內短氣心下發熱手足煩疼四肢不舉皮肉不仁口噤不言竹瀝一斗九升防風茯苓秦艽各三兩當歸黃芩一方作芍藥人參芎藭一方作防己細辛桂心甘草升麻一方作通草麻黃白术各二兩附子二枚蜀椒一兩葛根五兩生薑八兩右㕮咀以竹瀝煮取四升分五服初得病即須摩膏日再痺定止一方無麻黃蜀椒生薑大巖蜜湯出聖惠方治賊風腹中絞痛並飛遁注發作無時發即搶心脹滿脅下如錐刀刺并主少隂傷寒梔子十五枚甘草乾地黃細辛茯苓羊脂靑羊角亦得吳茱茰芍藥小器用芎藭乾薑當歸桂心各一兩右㕮咀以水八升煮取三升去柤內脂令拌分三服溫酒服如人行十里頃若痛甚者羊脂三兩當歸芍藥人參各一兩心腹脹滿堅急者加大黃三兩一方不用梔子羊脂茯苓桂心名巖蜜湯一方無羊脂用水酒煎服名乾薑散乾地黃湯出聖劑録治風入腹兼尸疰入心腹㽱痛氣短喘息不得宜服熟地黃焙一兩當歸焙一兩半芍藥一兩半甘草炙銼人參桂去粗皮附子炮去皮臍厚朴去粗皮塗生薑炙煙起各一兩細辛去苖葉乾薑炮各兩半吳茱茰湯洗焙乾炒三分右粗搗篩每服三錢匕以水一盞煎去滓取七分空腹服日三夜一天雄散出聖惠方治風入腹臟腑中切痛拘急天雄炮去皮臍當歸桂心木香各一兩雄黃細研地黃微炒乾蝎生用硃砂細研各半兩獨活三分麝香細研一分天南星微炒半兩右細羅為散入研了藥令勻每服不計時以溫酒調下一錢烏頭散出聖惠方治風氣入腹拘急切痛煩寃不可過時川烏頭炮去皮臍黃芩各一兩乾薑炮銼人參去蘆天雄炮去皮臍甘草炙各半兩當歸銼炒白术漢防己各三分細辛三分右為散每服三錢以水一中盞煎至六分去滓不計時候少熱服之甘草湯出聖劑總録治風入腹中㽱痛并飛遁注發作無時發則搶心脹滿脅下如錐刀刺甘草炙銼細辛去苖葉乾薑炮當歸切焙桂去粗皮白茯苓去黑皮赤芍藥吳茱茰湯洗焙炒熟地黃切各一兩右粗搗篩每服五錢匕以水一盞半入切羊脂少許同煎至八分去柤空心日午夜卧服人參湯一名茵散出聖惠方治風入腹拘急㽱痛人參一兩附子炮去皮臍一兩半麻黃去根節一兩半防己三分茵芋去苖一兩黃芩去黑心一兩防風去義芎藭各三分甘草炙三分右粗搗篩每服三錢匕以水一盞生薑三片煎至七分去柤少熱服不計時候附子散出聖惠方治風入腹㽱痛無時發則搶心脹滿拘急附子炮去皮臍細辛甘草炙當歸銼微炒桂心赤芍藥生地黃青橘湯浸去白微炒各一兩吳茱茰湯浸七遍焙乾炒半兩右粗羅為散每服三錢以水一中盞入生薑半分煎至六分去柤不計時候稍熱服甘草飲出聖劑總録治風入心腹㽱痛脹滿拘急不得息并轉筋溫中止痛利大小便甘草炙防風去義各一兩半吳茱茰湯浸炒赤芍藥當歸焙細辛去苖乾薑炮各一兩熟地黃一兩一方作生右粗搗篩每服五錢匕以水一盞半煎去滓取八分空腹溫服日二服一方有桂心無甘草名防風湯聖惠方名桂心散鬼箭湯出聖劑總録治風入腹攣急及賊風所中鬼箭羽如雞子大一塊甘草一尺炙銼石膏如雞卵一塊麻黃去根節沫焙四兩右粗搗篩每服五錢匕水一盞半煎至八分去柤空心臨卧各一服慎外風一方㕮咀以東流水煮服之桂心湯出聖濟總録治風入腹五臟拘急四肢不隨腹滿欲絶桂去粗皮防風去義黃芩去黑心乾薑炮秦艽去苖根吳茱茰湯浸炒甘草炙銼各一兩右粗搗篩每服五錢匕水一盞半煎至八分去柤溫服不拘時候服後忌海藻菘菜生蔥烏頭湯出千金方治寒疝腹中絞痛賊風入腹攻五臟拘急不得轉側呌呼發作有時使人隂縮手足厥逆烏頭十五枚要略用五枚大棗十枚甘草二兩芍藥四兩桂心六兩老薑一斤右㕮咀以水七升煮五味取三升去滓别搗烏頭去皮劈破蜜二升微火煎令減五六分內湯中煮兩三沸去滓服一合日三間食強者三合以如醉狀為知不知增之一方無大棗赤芍藥散出聖惠方治風入腹攻五臟拘急不得轉側隂縮手足厥冷腹中㽱痛赤芍藥桂心甘草各炒微赤銼防風去蘆頭芎藭各一兩烏頭炮製去皮臍二兩右搗羅為散每服三錢以水一中盞入生薑半分棗二枚煎至六分去柤不拘時候稍熱服理中湯出聖劑總録治風入腹心腹㽱痛痰逆惡心或時嘔吐隔塞不通人參乾薑甘草炙銼白术各二兩右粗搗篩每服三錢以水一盞煎至七分去滓稍熱服空心食前服治中風寒熱腹中絞痛以乾鯽魚一頭作末三指撮以苦酒服之溫覆取汗良食鹽方治中風但腹中切痛以鹽半斤熬令水酒著口中飲熱湯二升得吐愈普濟方卷九十八
