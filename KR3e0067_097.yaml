灰酒服並瘥枳殻散治風氣壅滯腰脚疼痛方見風口眼喎斜類豆豉飲治風毒脚膝攣急骨節痛用豉心五斗九蒸九晒以酒一斗取浸經宿空心隨意煖飲貼脅烏頭散治風腰脚冷痺疼痛烏頭三分去皮臍生用右為散以釅醋調塗於故帛上傅之須臾痛止治風血補衰老起陽强腰脚除痺變白逐冷氣排風邪出本草以南藤煮汁服亦浸酒冬月用之治諸風腰膝疼痛不可踐地出本草以鹿蹄四隻燖洗如法熟煮了取肉於䜴汁中著五味煮熟空腹飲之治腰脚風血積冷筋急拘攣疼痛者用茄根五十斤細切凈洗訖以水五斗煮取濃汁濾去柤更入小鐺器中煎至一升以來即入生栗粉同圓如梧桐子大每日旦用秫米酒送三十丸近暮再服一月乃瘥男子女人通用皆效風走注疼痛論夫風走疼痛之病其痛無常處故也氣血流通筋脉和同則骨肉滑利一有不調風邪乘虚與血氣偕行使榮衛凝澁隨所注處悉為疼痛故謂走注痛也方骨碎補丸出聖惠方治一切風毒走注疼痛骨碎補桂心狗脊木香仙靈脾葳靈仙山茄子當歸補骨脂㣲炒白附子炮製虎脛骨酥塗炙黄自然銅細研各一兩乾蝎㣲炒天南星炮製没藥硃砂細研甘草炙㣲赤半兩白花蛇肉酒浸炙黄二兩附子炮去皮臍川烏頭炮去皮臍甜𤓰子麻黄去根節芎藭赤芍藥羌活白芷各三分右為末入研了藥令勻錬蜜和搗五七百杵丸如梧桐子大每服不計時候以温酒下二十丸獨活散出楊子建獲命方治走注風其病狀兩足疼痛腫起或偏在一足痛行履不得其痛䖏逰走不定忽項上頭目昏亂或走在右手或走在左手或在一手指頭上或在一脚指頭上只有一㸃疼痛不可勝忍宜服此一方服了未轉加衆藥作四錢牽牛半夏作三錢共七錢為一服也其逰走痛䖏一㸃常赤色甚則遍身有赤色或攻項背或把腰膊或注脚下或攻胸脇腿骨與脛骨俱小惟有膝阿頭瘨腫吃此藥後或在痛處指甲交或在脚指甲下破出得惡血或在鼻中出得惡血其病方可除根又有白虎風治之亦同此方服之便愈但有人患白虎風必常夢一猫一虎一牛一羊四足畜類等物或夢見小兒婦人女孩将花翠果食與己其疾與走注風十分相類但甚則下青糞並宜服此方獨活去蘆頭阿魏麵少許和薄餅子火上焙乾搗為末各一錢桂去粗皮大黄炒牛膝去苖羌活去蘆頭鱉甲醋炙當歸焙乾蝎炒黄芪芎藭赤茯苓去黒皮木香麻黄蔓荆子半夏洗去滑各一分吳茱茰炒一錢半荆芥穗二錢虎骨酥炙四錢芫花一兩狼毒搥碎以醋三升同芫花石器内煮乾半兩白花蛇酒浸去骨仍用酒又炙乾如此二十次用一兩麝香少許研牽牛子右将芫花狼毒二味别作一䖏為末牽牛子半夏二味亦别一䖏為末其餘衆藥共作一䖏為末每服芫花狼毒末一錢半夏牽牛子末一錢衆藥末一錢計三錢匕共作一服臨卧葱湯調下海桐皮煎丸出聖惠方治風毒走注肢節疼痛不可忍海桐皮半斤牛膝去苖半斤已上二味並細剉以水一斗於大鍋中煎至一升用砂盆内爛研絞取濃汁即却於銀鍋中漸漸入酒三升煎為膏附子炮去皮臍川烏頭炮去皮臍各二兩川大黄剉炒三兩桃仁湯洗去皮尖雙仁麩炒㣲黄二兩虎脛骨酥塗炙黄四兩五加皮赤芍藥肉桂去粗皮麻黄去根節當歸赤箭地龍微炒木香獨活没藥防風去蘆頭骨碎補乳香麒麟竭乾蝎天南星炮各一兩麝香細研半兩右為細末入麝香都研令勻入前膏和搗三五百杵丸如梧桐子大每服不計時以温酒送下二十丸忌食生油毒魚滑物麝香虎骨散出聖惠方治男子因氣虚血弱風毒邪氣乘虚攻注皮膚骨髓之間與氣相搏往来交繫痛無常䖏逰走不定或日輕夜重少得睡卧筋脉拘急不能屈伸皆治之虎脛骨酥炙敗龜板炙各半兩麒麟竭硏赤芍藥没藥研自然銅醋淬硏白附子炮蒼耳子炒當歸去苖防風去苖骨碎補去毛肉桂去粗皮白芷各一分牛膝去苖酒浸五加皮川羌活去蘆㯽榔川天麻各二錢半右入麝香在内為末每二錢用熱水少許調空心服之或温酒調下亦可比服此藥之先煎生料五積散三服次日服此藥一方無麝香名虎骨散狼毒丸出聖惠方治風走注疼痛狼毒一分天南星附子各半兩右並生用臨搗合時以凈布裹搥碎用木臼内搗羅為末後以石鍋内煎釅醋成膏和丸如梧桐子大不拘時以冷酒下二丸如不飲酒用冷水下亦得治風走注疼痛不定隨痛䖏熨之出聖惠方黒豆五升芫花一斤生薑半斤右都炒旋入醋拌用青布裹熨痛上更番炒以效為度虎骨丸出聖惠方治風毒走注疼痛不定虎脛骨酥塗炙黄二兩牛膝去苖天雄炮製去皮臍天麻羌活各一兩白附子炮製防風去蘆桂心酸棗仁㣲炒天南星硃砂細研各三分烏蛇酒浸去皮骨炙黄二兩桑螵蛸㣲炒桃膠各半兩槐膠當歸川大黄炒各一兩麝香研一分右為散入研了藥令勻錬蜜和丸如梧桐子大不計時候以温酒下二十丸獨聖黒龍丸出聖惠總録治一切風氣走注四肢百節痠痛及閃肭肢節等疾甘松去土零陵香各半兩白殭蠶生用一兩莎草根炒去毛白附子生白芷麻黄去根節芍藥各一兩半夏洗去滑焙乾一兩墨二兩草烏頭炮去皮半斤天南星烏頭炮去皮臍各二兩藿香葉一兩山芋一兩右為末以法酒二升米醋一升麵二兩熬作糊丸如彈子大每服半丸用薄荷茶送下酒化亦量虚實服之牛膝丸一名接骨丹出御藥院方治風氣下注脚膝無力筋骨痠疼或上攻頭目腫痛遍身疼倦壮熱並皆治之蓯蓉牛膝並酒浸防風去蘆萆薢切炒葳靈仙去土海桐皮去粗皮自然銅醋浸七次狗脊去毛川烏頭生去皮臍已上各一兩没藥别研乳香别研各半兩地龍去土二兩骨碎補去毛四兩木鱉子去殻别研四兩右為細末酒麵糊為丸如桐子大每服五十丸温酒送下食前服妙應丸一名青龍妙應丸出危氏方治諸風攣急遍體疼痛逰走無定百藥不效川山甲十五斤石灰炒去灰全蝎七個去毒麝香一研别地龍去土一兩草烏生去皮一兩没藥乳香别研各三錢松脂半兩蜈蚣七條生用五靈脂去砂石三錢白殭蠶薑汁炒半兩班猫七個糯米炒去頭目右為末酒糊丸如菉豆大以青黛為衣每服二十丸不拘時温酒送下忌食熱物木通丸出聖劑總録治風走注身體疼痛榮衛凝澁石斛一兩去根牛膝去苖酒浸一宿切焙一兩附子二枚共及一兩者炮製去皮臍乾薑炮三分肉豆䓻四枚去皮麵裹煨麵熟為度㯽榔剉四兩木香一分甘菊炒二兩石硫黄一分白花蛇酒浸去皮骨焙二兩枸杞子九蒸九暴炒黄二兩右為末以酒煮麵糊和丸如桐子大每服二十丸空心温酒下如服了轉覺腦骨内疼甚者乃藥效婦人當歸酒下作細散每服一錢半匕温酒粥飲任調下防風天麻散出宣明論治風麻痺走注肢節疼痛中風偏枯或暴瘖不語内外風熱壅滯觧昏眩出儒門事親防風天麻川芎香白芷草烏頭去蘆白附子荆芥穗羅凈當歸焙甘草各半兩滑石二兩羌活半兩右為末熱酒化蜜少許調半錢加至一錢覺藥力運行微麻為度或鍊蜜為丸如彈子大熱酒化下一丸或半丸細嚼白湯化下或細嚼酒愈妙日三服此藥㣲有熱性甚能開發風熱鬰結以使氣血宣通而愈或風多熱少寒凉諸藥不能退者亦宜以開發或三服兩服不中效即却服防風通聖散得熱勢少减復與服之熱勢大甚者及目疾口瘡咽喉腫痛者不宜服之但宜退風熱辛寒之藥也少尤宜服之如意丸出聖劑總録治風毒走注筋骨疼痛草烏頭去皮臍五靈脂蘹香子炒青橘皮去白焙芸薹子陳皮去白焙木鱉子去殻防風去义生用各一兩巴豆四十九粒去皮心膜研出油班猫八十一個去頭足炒木香一分右為末用宿炊餅以釅醋煮作糊和丸如豌豆大每服一丸酒下不計時骨碎補丸出聖劑總録治風毒走注疼痛骨碎補去毛兩半葳靈仙洗焙草烏頭炮去皮各二兩天南星炮地龍去土炒自然銅醋煆焠木鱉子去殻楓香脂各一兩没藥乳香研各半兩右為末酒煮麵糊和丸如梧桐子大每服五丸温酒下空心服之虎骨散出聖惠方治風疼痛走注不可忍虎脛骨白芷當歸漏蘆紫笋茶各一兩桂半兩碙砂醋塗虎骨上慢火炙黄半兩芫花醋拌炒黒色地龍㣲炒各一分赤芍藥三分右細羅為散每服不拘時以温酒調下一錢天麻丸出聖濟録治風毒上攻下注逰走不定衝繫疼痛天麻地龍去土羌活去蘆頭獨活去蘆桂去粗皮附子去皮臍生用没藥研荆芥穗各二兩麝香研一錢右為末生蜜和丸如櫻桃大瓷器内收每服一丸用荆芥臘茶嚼下如注破脚至甚者不過二十日上攻則食後服下注則食前服烏頭散出聖惠方治風走注疼痛及手足拘急頭疼不可忍川烏頭炮去皮臍乾薑炮製川椒去目及閉口者㣲炒去汗硃砂細研細辛桂心各半兩天雄炮製去皮臍莽草㣲炙雄黄細研各一兩右細羅為散每服不拘時以温酒調下半錢桂心散出聖惠方治風走注疼痛桂心地龍㣲炒白殭蠶㣲炒漏蘆葳靈仙芎藭白芷當歸木香已上各半兩右細羅為散每服不拘時以熱酒調下二錢乾地黄丸出聖劑總録治走注疼痛生地黄焙白芷當歸切焙没藥硏防風烏頭炮製去皮臍木香赤小豆炒各等分右為末水浸蒸餅心和丸如梧桐子大每服五丸冷酒下空心食前服日二應痛丸出聖劑總録治風毒内攻走注疼痛不定五靈脂黒色者炒地龍去土炒白芥子草烏頭去皮臍生用自然銅煆醋淬研各一兩乳香研半錢巴豆七枚去皮心膜醋煮黄色右為末酒煮麵糊和丸如小豆大每服五丸温酒下葳靈仙丸出聖劑總録治風氣走注疼痛無常處葳靈仙去苖土五靈脂各一兩烏頭炮去皮臍木鼈子去殻乳香硏各半兩芍藥右為末滴酒和丸如梧桐子大每服七丸食前冷酒下加至十丸活絡丹治一切痛風走注渾身疼痛方見諸風雜治類漢椒散出聖惠方治風走注疼痛及白虎歴節風等漢椒去目及閉口者㣲炒去汗側子炮去皮臍各一兩桂心麻黄去根節當歸木香各一分右細羅為散每服不拘時以温酒調下半錢治風走注疼痛不定隨痛處熨之芫花漢椒去目桑根白皮各二兩栁蚛屑桂心一兩麩一升右用醋一升拌炒令熱以青布裹熨痛䖏冷即更入醋重炒依前熨之以差為度又方出聖惠方針砂五兩砒霜碙砂雌黄磁石各半兩麝香一分右為末臨時以醋拌炒令熟用熱帛裹熨患處立差羌活丸出王氏博濟方治風毒走注疼痛及體内多風疾者羌活獨活去蘆頭各二兩地龍去土炒一兩天麻三分烏頭炮製去皮臍半兩右為末用生蜜和丸如梧桐子大每服二十丸薄荷湯或温酒下食前服莎草根丸出聖劑總録治風走注循入經絡及腰膝疼痛莎草根用猪胆炒令香草烏頭用凈水浸一半炒去皮尖各二兩劉寄奴一両葳靈仙去土躑躅花各両半右為末用乳香没藥各半兩入醋煮麵糊和丸如梧桐子大火煆自然銅研為衣每服五丸漸加至十丸煨葱酒下仙靈脾散治風走注疼痛往来不定仙靈脾葳靈仙芎藭桂心蒼耳子各二兩右細羅為散每服不拘時候以温酒調下一錢神效膏治風走注疼痛上下不定隨處貼之牛皮膠水溶作膏一兩芸薹子安息香附子生去皮臍漢椒生用各半兩右細羅為散入膠中和成膏塗紙上隨貼之立定烏頭丸治走注疼痛不可忍烏頭炮去皮臍乾蝎去土炒地龍去土炒躑躅花去心各等分右為末醋麵糊和丸如菉豆大每服五丸婦人當歸酒下男子荆芥酒下治風走注疼痛水銀一兩棗十五枚蒸熟取穣和水銀研星盡天南星炮三分乾蝎半兩羌活三分右為末入水銀棗一處研和丸如小豆大别以膩粉拌令日色隂乾每服不拘時以豆淋酒下五丸一方無羌活趁痛丸治風毒留客日深氣虚邪實攻繫不定走注疼痛大㦸刮去皮甘遂白芥子各一兩右為末用大麥麵一兩和匀醋調作餅子慢火炙黄熟再搗羅用薄麵糊為丸如梧桐子大每服十丸漸加至十五丸空心冷酒下病痛甚不入大麥麵亦得芸薹子散治風毒走注疼痛如虎囓芸薹子天南星草烏頭並生各一兩右為散每用五錢匕量入生麵一釅醋生薑汁各少許調成膏攤紙上厚一分貼痛處即止消毒膏治風毒走注疼痛筋脉攣急馬牙硝燒赤研一兩烏頭大者二枚燒存性三分研右同研令匀每用三錢匕白麵三錢匕生薑汁一盞同熬成膏攤於帛子上熱貼日二換之治風走注疼痛地龍㣲炒一兩麝香細研入一分右細羅為散每服不拘時以温酒調下一錢芥子膏治風毒走注疼痛及白虎歴節風用芥子為末鷄子白調傅之一方治中風口噤舌本縮無鷄子白用醋調塗頷下及傅頸周圍立效一方芥子同酢煮傅之虎骨木𤓰丸治飲酒過度寒濕停滯經絡不和傷敗氣血走注筋骨疼痛晝靜夜甚或冐所傷亦治筋骨走注并婦人血風疼痛並治之虎骨酥炙南乳香研没藥各一兩木𤓰天麻蓯蓉牛膝已上四味各二兩用好酒浸十日取出焙乾右為細末将原浸酒作糊為丸如梧桐子大每服三十丸至五十丸空心食前温酒送下日進二三服透骨膏治一切風濕走注疼痛生地黄馬鞭草各半斤吳茱茰白麵各三兩骨碎補乾生薑屑各四兩鼈甲二個炙蒲黄二兩右為細末用米醋調似膏子於火上温熱攤於痛處用飯裹蒸候冷再炒如此七次於避風䖏用地黄丸大治走注風及風氣四肢倦怠不思飲食出大全集謂之四聖丹熟地黄洗剉焙當歸同上𤣥參並同上羌活剉焙揀節種者右四味各等分為細末鍊蜜為丸如梧桐子大每服三十丸或温酒鹽湯空心食前服藥良久仍進飲食忌猪鷄羊以羌活之故忌熱麵以當歸之故忌羅蔔以地黄之故忌猪羊血以耗藥力之故餘皆不忌治走注風散血止痛以石蠶節搗篩末酒温服之治走注風用建水草葉焙乾碾末煖酒服風入腹拘急切痛論夫風入腹拘急切痛者風邪搏於隂經也風邪搏於隂經則腸縮踡腸縮踡則絀急風寒之氣與正氣相繫故裏急而切痛也方竹瀝湯治風毒入人五内短氣心下發熱手足煩疼四肢不舉皮肉不仁口噤不言竹瀝一斗九升防風茯苓秦艽各三兩當歸黄芩一方作芍藥人參芎藭一方作防己細辛桂心甘草升麻一方作通草麻黄白术各二兩附子二枚蜀椒一兩葛根五兩生薑八兩右㕮咀以竹瀝煮取四升分五服初得病即須摩膏日再痺定止一方無麻黄蜀椒生薑大巖蜜湯出聖惠方治賊風腹中絞痛幷飛遁注發作無時發即搶心脹滿脇下如錐刀刺并主少隂傷寒梔子十五枚甘草乾地黄細辛茯苓羊脂靑羊角亦得吳茱茰芍藥小器用芎藭乾薑當歸桂心各一兩右㕮咀以水八升煮取三升去柤内脂令拌分三服温酒服如人行十里頃若痛甚者羊脂三兩當歸芍藥人參各一兩心腹脹滿堅急者加大黄三兩一方不用梔子羊脂茯苓桂心名巖蜜湯一方無羊脂用水酒煎服名乾薑散乾地黄湯出聖劑録治風入腹兼尸疰入心腹㽲痛氣短喘息不得宜服熟地黄焙一兩當歸焙一兩半芍藥一兩半甘草炙剉人參桂去粗皮附子炮去皮臍厚朴去粗皮塗生薑炙煙起各一兩細辛去苖葉乾薑炮各兩半吳茱茰湯洗焙乾炒三分右粗搗篩每服三錢匕以水一盞煎去滓取七分空腹服日三夜一天雄散出聖惠方治風入腹臟腑中切痛拘急天雄炮去皮臍當歸桂心木香各一兩雄黄細研地黄㣲炒乾蝎生用硃砂細研各半兩獨活三分麝香細硏一分天南星㣲炒半兩右細羅為散入研了藥令勻每服不計時以温酒調下一錢烏頭散出聖惠方治風氣入腹拘急切痛煩寃不可過時川烏頭炮去皮臍黄芩各一兩乾薑炮剉人參去蘆天雄炮去皮臍甘草炙各半兩當歸剉炒白术漢防己各三分細辛三分右為散每服三錢以水一中盞煎至六分去滓不計時候少熱服之甘草湯出聖劑總録治風入腹中㽲痛并飛遁注發作無時發則搶心脹滿脇下如錐刀刺甘草炙剉細辛去苖葉乾薑炮當歸切焙桂去粗皮白茯苓去黒皮赤芍藥吳茱茰湯洗焙炒熟地黄切各一兩右粗搗篩每服五錢匕以水一盞半入切羊脂少許同煎至八分去柤空心日午夜卧服人參湯一名茵散出聖惠方治風入腹拘急㽲痛人參一兩附子炮去皮臍一兩半麻黄去根節一兩半防己三分茵芋去苖一兩黄芩去黒心一兩防風去义芎藭各三分甘草炙三分右粗搗篩每服三錢匕以水一盞生薑三片煎至七分去柤少熱服不計時候附子散出聖惠方治風入腹㽲痛無時發則搶心脹滿拘急附子炮去皮臍細辛甘草炙當歸剉㣲炒桂心赤芍藥生地黄青橘湯浸去白㣲炒各一兩吳茱茰湯浸七遍焙乾炒半兩右粗羅為散每服三錢以水一中盞入生薑半分煎至六分去柤不計時候稍熱服甘草飲出聖劑總録治風入心腹㽲痛脹滿拘急不得息并轉筋温中止痛利大小便甘草炙防風去义各一兩半吳茱茰湯浸炒赤芍藥當歸焙細辛去苖乾薑炮各一兩熟地黄一兩一方作生右粗搗篩每服五錢匕以水一盞半煎去滓取八分空腹温服日二服一方有桂心無甘草名防風湯聖惠方名桂心散鬼箭湯出聖劑總録治風入腹攣急及賊風所中鬼箭羽如鷄子大一塊甘草一尺炙剉石膏如鷄卵一塊麻黄去根節沫焙四兩右粗搗篩每服五錢匕水一盞半煎至八分去柤空心臨卧各一服慎外風一方㕮咀以東流水煮服之桂心湯出聖濟總録治風入腹五臟拘急四肢不隨腹滿欲絶桂去粗皮防風去义黄芩去黒心乾薑炮秦艽去苖根吳茱茰湯浸炒甘草炙剉各一兩右粗搗篩每服五錢匕水一盞半煎至八分去柤温服不拘時候服後忌海藻菘菜生葱烏頭湯出千金方治寒疝腹中絞痛賊風入腹攻五臟拘急不得轉側呌呼發作有時使人隂縮手足厥逆烏頭十五枚要畧用五枚大棗十枚甘草二兩芍藥四兩桂心六兩老薑一斤右㕮咀以水七升煮五味取三升去滓别搗烏頭去皮劈破蜜二升㣲火煎令减五六分内湯中煮兩三沸去滓服一合日三間食彊者三合以如醉状為知不知増之一方無大棗赤芍藥散出聖惠方治風入腹攻五臟拘急不得轉側隂縮手足厥冷腹中㽲痛赤芍藥桂心甘草各炒㣲赤剉防風去蘆頭芎藭各一兩烏頭炮製去皮臍二兩右搗羅為散每服三錢以水一中盞入生薑半分棗二枚煎至六分去柤不拘時候稍熱服理中湯出聖劑總録治風入腹心腹㽲痛痰逆惡心或時嘔吐隔塞不通人參乾薑甘草炙剉白术各二兩右粗搗篩每服三錢以水一盞煎至七分去滓稍熱服空心食前服治中風寒熱腹中絞痛以乾鯽魚一頭作末三指撮以苦酒服之温覆取汗良食鹽方治中風但腹中切痛以鹽半觔熬令水酒著口中飲熱湯二升得吐愈普濟方卷九十八
