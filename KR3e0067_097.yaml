body:
  text: 普濟方卷九十八明周王朱橚撰諸風門中風百節疼痛論夫中風百節疼痛者由體虚受風風邪中關節故令百節筋脉拘急疼痛寒熱更作不可屈伸此皆真氣怯弱不勝風邪真邪相搏所以痛也方麝香丸出聖劑總録治中風手足拘攣痰涎不利精神昏昧百節疼痛麝香牛黄並研蔓荆實去皮木香人參赤茯苓去黒皮芎藭獨活去蘆頭麻黄去根節海蛤牛膝酒浸切焙羌活去蘆頭附子炮去皮臍乾蝎炒去皮土防風去义白殭蠶炒海桐皮剉龍齒煆敗龜酒浸炙萆􅐺赤箭酒炙酸棗仁炒甘菊花天南星桂去粗皮乾薑炮虎骨酒浸炙各一兩烏蛇酒浸去皮骨炙四兩右為末再同研勻鍊蜜和丸如彈子大每服一丸薄荷酒下服之仙茅散出危氏方治臂膞手足頭目筋脉虚掣一切風證疼痛不可忍立有效仙茅無則好蒼术代之一兩陳皮枳實炮厚朴製官桂秦艽各一錢當歸白茯苓白芍藥白芷川芎半夏餅各一錢半麻黄不去節二錢半没藥甘草川烏炮各半兩白姜乳香各二錢獨活二錢全蝎七枚麝香半錢右除桂芷麝乳没餘並炒轉色却入不炒藥同為末每服三錢炒大黒豆同木𤓰葉浸酒旋温調服不拘時候羌活湯出聖劑總録治中風百節疼痛頭目昏眩及傷寒頭疼壮熱肢節疼痛肩背拘急羌活去蘆頭官桂去粗皮防風去义各半兩天麻甘菊花旋覆花白附子炮甘草炙欒荆去藥信謂之頑荆也天南星水浸七日切作片子焙乾麻黄去根節烏頭鹽水浸一日切作片焙乾各四兩葳靈仙六兩防子炮去皮臍蒼术米泔浸一宿切炒各半斤陳橘皮湯浸去白焙半斤牽牛子搗取粉三兩右剉如麻豆每服三錢匕水一盞入薄荷七葉生薑三片同煎至七分去滓温服羌活散出聖劑總録治中風百節疼痛寒熱更作不可俯仰方見中風類七味羌活散捜風趁痛散出聖劑總録治中風身體筋脉骨節疼痛白附子炮附子炮製去皮臍赤小豆天南星炮去臍狼毒海桐皮剉自然銅醋煆碎地龍炒去土各等分右為散每服半錢至一錢匕葱酒調下豆淋酒亦得空心服白花蛇散出聖劑總録治中風肢節疼痛言語蹇澁白花蛇酒浸炙去皮骨二兩何首烏去黒皮切牛膝三味用酒浸半日焙乾蔓荆實去黑皮各四兩葳靈仙去土荆芥穗旋覆花各二兩右為末每服一錢以温酒調空心臨卧時服三黄湯一名麻黄湯治中風手足拘攣百節疼痛煩熱心躁惡寒經數日不欲飲食加减方見中風四肢拘攣不得伸屈類芎桂散出三因方治中風四肢疼痛及兩足俱軟行履不便川烏頭三兩水浸切作筭子條更以米泔浸一宿不洗日乾麩炒㣲赤為度乾了秤川芎一兩半桂心一兩甘草炙乾薑炮各一分右為末每二錢温鹽酒調下日三服神术湯出聖劑總録治外傷風邪百節痠疼頭疼身重遍體發熱氣麤眼痛蒼术剉碎四兩甘草麻黄去根節各三兩猪牙皂莢四挺去皮右並生用粗搗篩每服三錢匕水一盞煎至七分去滓不拘時温服厚被蓋出汗入葱白三寸杏仁二枚碎豉七粒同煎服尤佳治諸風痛攻四肢百節黑豆炒去皮半升葳靈仙二兩桑根白皮剉一兩右用醇酒一升半煎至八合去滓頓服又方出聖劑總録杏仁湯浸去皮尖雙仁炒黄研半兩虎骨酒塗炙黄取半兩為細末右用醇酒一升熱調頓服芍藥方一名虎骨酒出十使良方治風毒骨髓疼痛芍藥二分虎骨一兩炙右為細末夾絹袋盛酒三升漬五日每服二合日三服白頭翁酒出聖劑總録治諸風痛攻四肢百節用白頭翁草一握爛研以醇酒投之頓服又方出聖劑總録用生惡實根磨酒服痛即止住治骨髓風毒疼痛不可運動者方見本門風毒類治中風筋攣附骨疼痛用羚羊角生磨和水塗腫上及惡瘡良虎骨散出十便方治筋骨疼痛祛風邪通血脉方見偏枯類治大風攻疰四肢筋骨疼痛遍身生瘡皮膚破爛大便祕黄小便熱赤宜服此方牡丹皮去心麻黄去根白花蛇酒浸如前法炙黄芩芍藥山梔牛旁根子羌活荆芥穗細辛去葉虎杖乾蝎大黄秦艽各一分連翹半兩右為細末每服三錢水一盞煎一沸急㵼出食後去滓熱服孫盈仲常患手足十指疼痛麻木其祖善醫云有風而非虚以此方治之而愈附子木香右二味剉為粗末用薑如常法煎木香隨氣虚實加减如治從弱去附子用烏頭治中風氣壅言語蹇澁精神昏亂筋脉拘急犀角獨活湯方髙士英職方傳云屢有效犀角屑獨活茯神人參石菖蒲川芎甘草炙一分漢防己防風已上各一兩黒參一分酸棗仁半兩炒桂一分右十二味為麤末每服四錢匕水一盞半生薑三片薄荷七葉同煎至七分去柤不計時候服再甦丹出華陀經中藏經方治骨節疼痛言語不正行歩艱難手足戰掉搐拽川烏頭二兩草烏頭一兩五靈脂四兩右為末滴水為丸如鷄頭子每服一丸研碎入酒一盞生薑三片地黄三條乳香少許同煎至七分臨卧通口服吃了須摩擦患處令熱徹以助藥力如合時入乳香一錢即煎時更不須入主風在骨節間及血痰出本草以虎杖煮汁作酒服之治筋骨風急痛出本草以虎骨和通草煮汁空腹服半升被蓋卧之少時即汗出切忌熱食損齒一方治骨風毒以虎骨煮湯浴之良治中風手足不隨骨節煩疼心躁口面喎斜出本草取烏驢皮一領燖洗如法蒸令極熟切於豉汁中煮五味和再煮空心服之治筋骨急强中風出本草以羚羊角加五味子炒之投酒中經宿飲之治諸風筋骨攣縮及皮頑痺手足不遂無眉髪疥癬諸疾在皮膚骨節者出本草入温湯浴之浴乾當大虚􅉵可隨病與藥及飲食補養治中風骨節攣急五勞七傷及皮膚風用五加皮葉作蔬菜食效風腰脚疼痛附論夫腰者腎之府也腎主腰脚其氣不足故腰脚濕痺有是風濕冷三氣相攻而成也氣勝則通行流轉不為留滯風濕冷氣勝則注於腰脚而與正氣交爭經脉凝滯不能榮養於腰脚故屈伸歩履皆痛是為濕痺風濕痺亦如蟲行覺則以手捫之復不痛春多入於筋肉間夏入人氣脉中秋入人皮膚内搔之濕痒生瘡冬多中人血脉腠理則為諸風矣本由外風邪入於經絡氣命也方乾蝎丸治元臟風氣攻疰腰膝疼痛及一切風氣乾蝎去土㣲炒天麻羌活去蘆頭附子炮去皮臍㯽榔剉沉香剉木香牛膝酒浸切焙狼毒切作塊先用醋煮三五沸焙乾剉白附子㣲炒桂去粗皮當歸切焙枳殻去穰麩炒防風去义巴㦸天去心昆布醎汁洗炒牽牛子炒半熟人參髙良薑蘿蔔子㣲炒蒺蔾子炒去角肉荳䓻去殻没藥白术防己剉焙碙砂醋化盡去夾石煉霜各一兩獨活去蘆頭一兩阿魏一分右先將碙砂没藥阿魏三味用好酒一升熬成膏餘藥同搗羅為末鍊蜜和丸如梧子大每服五更後空心薄荷酒下二十丸向曉利一行即差虎骨散治風腰脚疼痛下注脚膝行歩不得或腫痒或在兩膝疼腫痛久療不差漸至足脛細小少力虎脛骨酥炙二兩天麻木香羌活去蘆頭芎藭黄茋剉蒺蔾子炒去角青橘皮去白切大腹皮桂去粗皮㯽榔剉沉香剉白茯苓去黒皮桃仁去皮尖雙仁麩炒山芋乾葛剉海桐皮剉五味子敗龜醋浸炙白蘚皮各一兩肉蓯蓉酒浸切焙附子炮去皮臍各一兩半甘草炙半兩右為散每服二錢匕空心臨卧或温酒鹽湯任下虎骨浸酒方治風氣攻注腰脚骨髓疼痛虎脛骨半斤酥塗炙㣲黄熟地黄二兩石斛去根獨活防風去蘆頭牛膝去苖丹參桂心當歸萆薢芎藭酸棗仁㣲炒山茱茰仙靈脾五加皮附子炮製去皮臍骨碎補去毛川椒去目及閉口者㣲炒出汗白蒺蔾㣲炒去刺已上各一兩烏蛇一條重半斤者酒浸去皮骨酥塗炙㣲黄色右細剉以生絹袋盛以好酒三斗於磁瓮中浸之宻封經七日後每日空心日午近晩各温服飲一盞常令醺醺以差為度忌生冷油膩猪鷄粘滑物虎骨丸治肝腎藏風毒流注腰脚疼痛痺冷及筋骨拘急行履不得虎脛骨一兩酥塗炙令黄沉香乾蝎㣲炒天南星炮製芎藭白附子炮製赤芍藥硫黄細研川烏頭炮去皮臍白殭蠶㣲炒已上各半兩白花蛇二兩酒浸去皮骨炙令㣲黄天麻防風去蘆頭羌活桂心羚羊角屑已上各三分海桐皮麻黄去根節牛膝去苖已上各一兩右為末鍊蜜和搗三二百杵丸如梧桐子大每服食前以温酒下二十丸虎骨散治風腰脚冷痺疼痛行履不得虎脛骨一兩酥塗炙令黄敗龜酥塗炙令黄附子炮製去皮臍各一兩芎藭天麻白附子炮製各一兩防風去蘆頭一兩牛膝去苖一兩羌活乾薑炮製剉萆薢剉各半兩烏蛇一兩酒浸去皮骨炙海桐皮桂心骨碎補去毛熟地黄當歸㣲炒三分麝香三分研右為散入研了藥令勻每服食前以温酒調下二錢忌生冷猪鷄等物白花蛇浸酒方治風骨髓及腰脚疼痛行歩稍難兼風毒攻注皮膚痒痛不知白花蛇一條重半斤去皮骨炙黄虎脛骨一對酥塗炙黄當歸芎藭各一兩半附子炮製去皮臍桂心熟地黄防風去蘆頭山茱茰萆薢石斛去根牛膝去苖細辛去苖土天麻黄芪已上各二兩獨活三兩枳殻二兩麩炒㣲黄色去穰肉蓯蓉二兩半酒浸一宿刮去粗皮用右細剉以生絹袋盛以好酒三斗於瓷瓮子内宻封浸七日後隨性煖飲常令醺醺勿令大醉其酒旋添酒味少薄即換藥忌生冷粘滑動風物防風湯治風濕脚脉腫痛防風去义麻黄去根節煎去沫焙石韋去毛絡石桑白皮大腹皮芎藭生地黄各一兩半附子炮製去皮臍二兩白术桂心去粗皮羌活去蘆頭牡丹皮射干各一兩草荳䓻去皮四枚桃仁二十枚去皮尖雙仁炒右剉如麻豆每服五錢匕水一盞半生薑五片同煎取八分去滓温服茄子根浸酒方治風毒攻注脚腰骨髓疼痛皮膚冷痺筋脉拘急屈伸不得茄子根二斤洗令淨晒乾蒼耳子一升㣲炒搗碎鼠粘子一升㣲炒搗牛膝一斤去苖牛旁根一斤防風三兩去蘆頭萆薢桂心羌活秦艽去苖附子一兩炮去皮臍晩蠶沙半升大麻子一升虎脛骨酥塗炙黄枸杞子一升半蒸半炒右細剉用生絹袋盛以無灰酒五斗浸之封閉勿令透氣經十日後開取開時不得面向瓶口每日空腹午時近夜各温飲一盞常令醺醺為妙忌毒滑魚肉動風物續斷湯出聖劑總録治腎氣虚弱卧冷濕地風邪乘之流入腰脚冷痺疼痛續斷杜仲去粗皮剉炒桂心去粗皮防風去叉牛膝酒浸切焙細辛去苖葉白茯苓去黒皮人參當歸切焙各二兩白芍藥二兩獨活去蘆頭芎藭秦艽去苖土生地黄焙甘草炙各三兩右粗搗篩每服五錢匕水一盞半煎至一盞去柤温服宜服蒴藋葉火燎候安牀上及熱卧上冷即易之冬月取根搗用一方生薑三片棗一枚同煎空心服之虎骨湯出聖劑總録治風腰脚疼痛筋脉拘急虎頭骨牙齒炙三兩天雄炮去皮臍當歸切焙各二兩菝葜代赭醋煆碎黄芪桂心去粗皮羌活去蘆頭各一兩赤芍藥防風去义芎藭桔梗絡石桑耳山茱茰各一兩半右剉如麻豆每服五錢匕水酒共一盞半入生薑一棗子大切煎取八分去柤温服不拘時虎脛骨湯出聖劑總録治風毒脚膝痠痛履地不得嘔逆吐食憎寒沉重宜服之虎脛骨酥塗炙當歸焙附子炮製去皮臍桔梗炒各一兩半赤石脂酸棗仁炒各一兩白芷桂心去粗皮白术地榆木香黄連去須各半兩厚朴去粗皮生薑汁炙半兩肉豆䓻一枚去殻黄芩去黑心半兩右剉如麻豆每服五錢匕水一盞半煎至八分去柤温服牛膝丸出聖惠方治風腰脚疼痛冷痺筋骨無力牛膝去苖萆薢剉杜仲去粗皮炙令黄色剉附子炮製去皮臍乳香安息香石斛去根剉已上各二兩酸棗仁㣲炒防風去蘆頭丹參芎藭當歸剉㣲炒桂心羌活白茯苓已上各三分右為末鍊宻和搗三二百杵丸如梧桐子大每服空腹以酒下二十丸晩食前再服忌生冷油膩猪魚鷄犬肉杜仲浸酒方出聖惠方治風冷腰脚疼痛屈伸不得杜仲去粗皮炙黄蛇床子當歸芎藭乾薑炮製秦艽去苖附子