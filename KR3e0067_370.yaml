芥麻黄去節全蝎炒殭𧖟紅花紫草茯苓硃砂麝香南星甘草右件為末㪚每服一錢薄荷金銀環用綿子褁定同煎以綿紅為度治急驚風發熱眠睡不穩傅氏治嬰酸棗仁膩粉寒水石麫炒胡黄連使君子麫褁炮各等分右件為末酒煮麫糊為丸如小豆大金銀薄荷湯下參苓㪚治急驚風傷寒咳𠻳身熱胸膈下不快睡臥不安鎮心化痰涎或疹豆不能匀遍並宜服之人參一錢茯神一錢麻黄去節半兩白术二錢乾葛一錢半白芍藥一錢升麻一錢甘草二錢右為末每服半錢水五分盞薄荷一葉同煮三二分服如熱盛再與青金丹桃桞條七寸煮湯下㣲利相間服蝎尾㪚治小兒急驚風神効蝎尾二七枚生用白附子二七枚生用黒鉛一錢水銀一錢二味同結炒子附子尖二七枚生用半夏七枚湯洗出滑天南星底一七枚生用烏頭尖一七枚去皮生用右件藥擣細羅為㪚每服以薄荷湯調下半字若兒在百日内者一字可分為四服如要作丸即以棗肉和丸如菉豆大以馬藿草湯下一丸臨時更量兒加减五福丸治急驚風生蚯蚓一條研爛入五福化毒丹一丸再研如泥煎薄荷湯少許調化旋灌量兒大小加减服之無不効者梁國材云洋州進士李彦直家專貨此藥一服千金以糊十口梁大有恩於李故得是方親試屡効不可不筆於冊以救嬰孩麝犀膏治小兒壮熱涎盛恍惚不安夜臥强語咬牙弄舌急驚潮𤼵目睛直視牙關𦂳急手足驚掣項背强直精神昏亂天竺黄白附子㣲炮欝金人參去蘆頭四味各一分真珠末犀角膏各一錢牛黄别研硃砂别研二味各半分麝香别研龍腦别研二味各一錢金箔銀箔各十片右七件各為細末次入硃砂腦麝金銀箔同研令匀鍊蜜為丸每一兩作四十丸每服一丸煎薄荷湯化下食後臨臥清餅子治小兒内積實熱外冐風邪遂作急驚徧身壮熱筋脉抽掣涎潮壅盛目睛上視牙關𦂳急大小便秘棘剛子十四枚去殻取䖝子㣲炒青黛别研滑石别研大㦸好酒半盞煮酒浸取出焙乾天南星炮取心用荆芥穗五味各五分右件為細末水和令匀丸如梧桐子大揑作餅子青黛為衣每服一餅子煎薄荷湯化下不拘時候至寳㪚治小兒氣與血不和素有實熱復因外受風邪遂致急驚涎盛目睛直視身熱瘈瘲大便多秘觧潮搐清神志虎睛一對酒浸㣲炒牛黄别研鐡粉别研犀角屑細研白附子炮天竺黄人參去外蘆頭各二錢半青黛細研硃砂别研大黄三味各半兩細松煙墨一兩燒煙盡地上去火毒龍腦一錢别研麝香一分别研右件為細末次入研者藥和匀如半晬兒每服一字周晬兒半錢煎葱白薄荷湯調下或涎盛咽喉腫痛更加細研龍腦半錢煎薄荷湯調下不計時候奪命㪚治小兒急驚風搐又治肺脹喘胸膈氣急出入兩脇搐動䧟下作坑病甚者兩鼻竅張擡肩悶亂煩渴咳嗽聲嗄不鳴痰涎潮塞睡卧不稳死即在朝夕世俗不識若作咽喉風或作馬脾風治之悮矣切忌不得於胸腹上灸之反為禍矣慎宜戒之方見本門慢脾風類普濟方卷三百七十
