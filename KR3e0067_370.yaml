治小兒急驚風天南星一枚重一兩者用新薄荷一束搗碎同水浸七日夜取出切作片子曝乾丹砂研半錢蜈蚣赤足全者一枚膩粉炒研二錢右搗末為散研勻每服一字用薄荷熟水調下一嵗以上漸加至半錢若欲作丸用棗肉丸如萊蔔子大一嵗十丸一嵗已上加至十五丸亦薄荷熟水下水銀丸出聖惠方治小兒急驚風咽膈痰壅迷悶口噤手足搐搦水銀以棗肉一分半同研令星盡天南星炮乾蝎微炒各一分膩粉研一分右搗研為末同令勻再添棗肉丸如黍米大每服五丸乳香湯下薄荷亦得量兒大小如意加減服之利驚丸出危氏方治小兒急驚身熱靣赤又口中氣熱大小便黃赤抽掣青黛輕粉各一錢牽牛末半兩天竺黃二錢右為末水糊丸如小豆大每服二十丸一嵗一丸薄荷湯下或蜜為丸如雞頭大一粒化下金星丸治急驚壯熱痰潮大便多日不便方見本門一切驚風類碧霞丹出全嬰方治小兒急中卒風牙關緊急不省人事石碌一兩膽礬半兩白礬輕粉各一錢右為末􅔇糊丸如雞頭大五嵗一丸生油化下吐涎立效比驚丸出全嬰方治小兒急驚壯熱喘粗涎盛頰赤大小便不利輕粉滑石各一錢半南星一錢青黛半錢右為末糊丸如小豆大一嵗二丸薄荷湯下如急驚頭熱足冷口噤靣青筋抽脈掣上膈頑痰熱壯盛者加一丸煎桃皮一名桃符即是桃木皮也作湯送下踈流蘊積涎熱立安痘瘡餘毒不解宜服之又去青黛加蝎稍半錢名小青丸同治鶴頂丸一名紅丸子一名桃符丸出聖惠方治小兒急驚風壯熱吐涎丹砂研細蝎稍炒各半兩膩粉一錢巴豆去皮心膜出油七粒右搗研為末煮􅔇糊丸如黍米大每服一丸煎桃仁湯下量兒大小加減服之碧霞丹出聖惠方治小兒急驚風必效方見本門一切驚風類搐聖丸出聖惠方治小兒急驚風搐搦墜涎水銀半兩麝香半分天南星一兩生用右搗天南星為末次入水銀又以石腦油同搗硬軟得所又入麝香搗三二百杵如菉豆大不計時候以薄荷湯下化破一丸服之量兒大小加減又方出聖惠方治急驚如搐搦偏墜風痰口眼喎邪天漿子三枚生用硃砂一錢乾蝎一兩生用右為末以軟飯為丸如粟米大不計時候以薄荷湯下兩丸量兒大小加減服之水銀丸出聖惠方治小兒急驚風化頑涎利胸膈水銀一分以棗肉研令星盡天南星一分生用蛜􅀈半兩生用去足右為末以棗肉和丸如菉豆大不計時候以薄荷湯下兩丸量兒大小以意加減萬金散出御藥院方治急驚辰砂輕粉蜈蚣一條全者右等分為末用隂陽乳汁為丸如菉豆大每嵗一丸逐旋加減乳汁下中分散治小兒急驚定搐螳螂一個中分蜥蜴一個中分赤足蜈蚣一條中分右件各隨左右一邉同為研末右治女子左治男子有患急驚搐者每用一剜耳吹鼻內搐左即左定搐右即右定太白散出全嬰方治小兒急驚搐搦涎盛粉霜二錢輕粉白牽牛炒各一錢右為末每服一字薄荷湯調下吐涎為效吐風散出全嬰方治小兒急中卒風口噤不開不省人事全蝎一個炒瓜蒂一箇炒赤小豆三十粒右為末一嵗一字溫米飲調下未吐再服硃砂丸治小兒胸膈脹滿急驚風吐瀉不止方見本門急慢驚風類碧雲散出全嬰方治小兒急驚風卒中涎潮氣粗不省人事石碌四錢輕粉一錢右為末一字薄荷湯入酒少許同調下良久先吐後利一方緑雲丹以銅青為末醋糊丸如雞頭大一丸薄荷湯磨下須臾頑痰如膠以手拽出神效聖紅散治小兒急風搐搦天南星一箇重一兩者先炮裂于五月一日用好酒浸每日換酒浸至端午日用大蝎七枚熟蜇窨乾去蝎用天南星丹砂半兩細末與天南星同研令勻右為末同研為散每服一字薄荷湯調下治小兒急驚風手腳掣動不住用蘇合香丸廣州的最好用一錢重薄荷湯同生薑自然汁各等分化下如小兒不省人事斡開牙關灌之即效治急驚風用逺年螺殼白者燒灰加麝香少許水調灌之金箔如錦丸出楊氏家藏方治小兒急驚壯熱手足搐搦大便祕小便澀潮發無度精神不省金箔别研七片蘆會别研硃砂别研二味各二錢輕粉半錢别研蜈蚣一條炙黃胡黃連天南星炮製半夏炮已上三味各二錢右件為細末次入前四味研者藥一處勻研糯米粉糊和丸每一兩作四十丸日中晒乾勿用火焙每服一丸煎金銀薄荷湯磨化下不拘時候梨汁餅子出楊氏家藏方治小兒急驚壯熱涎盛膈實目睛上視手足抽掣一切驚熱涎潮悉治之朱砂别研粉霜别研馬牙硝别研各二錢水銀硫黃各二錢同水銀結成沙子牛黃别研龍腦别研麝香别研三味各半錢鐡粉半兩别研天南星二錢為末牛膽打和却入在膽內綿繫於通氣處風乾用右拌同研為細末煮麵糊和丸如梧桐子大揑作餅子每服一餅子梨汁化下量兒大小加減不拘時候天竺黃散出楊氏家藏方治小兒心驚蘊熱急驚搐搦神志恍惚睡不安天竺黃蟬蛻去土山梔子仁微炒甘草微炒鬱金白殭𧖟炒出系嘴龍齒七味各等分右拌為細末每服半錢煎薄荷湯調下硃砂粉散出楊氏家藏方治小兒身體壯熱急驚搐搦涎潮壅塞悶亂不醒硃砂一錢别研鐡粉二錢别研右拌為末同研令勻半嵗兒服一字一嵗兒服半錢煎薄荷湯調下不拘時候人參羌活散出永類鈴方治初作急驚散風邪除風熱羌活獨活柴胡川芎人參甘草白茯苓前胡桔梗地骨皮天麻酒浸焙各半兩枳殼一兩㕮咀每服一錢水半盞薑一片薄荷一葉棗半箇調搐掣緊急者去節麻黃煎湯調或惺惺散加荆芥防風亦可免得遽施腦麝利痰丸出如宜方治驚風熱痰盛潮作搐搦明礬枯甘草製南星滑石白附子各半兩巴豆去油成霜三錢右為末麵糊丸如粟蘇子大桑白皮湯下又金銀薄荷湯下又宜杏珠丸紅綿散傅氏活嬰治急驚初作潮熱發搐手足搦促口眼斜身手反張並宜服之天麻人參白附子蘇木防風羌活荆芥麻黃去節全蝎炒殭𧖟紅花紫草茯苓硃砂麝香南星甘草右件為末散每服一錢薄荷金銀環用綿子褁定同煎以綿紅為度治急驚風發熱眠睡不穩傅氏治嬰酸棗仁膩粉寒水石麵炒胡黃連使君子麵褁炮各等分右件為末酒煮麵糊為丸如小豆大金銀薄荷湯下參苓散治急驚風傷寒咳嗽身熱胸膈下不快睡臥不安鎮心化痰涎或疹豆不能勻遍並宜服之人參一錢茯神一錢麻黃去節半兩白术二錢乾葛一錢半白芍藥一錢升麻一錢甘草二錢右為末每服半錢水五分盞薄荷一葉同煮三二分服如熱盛再與青金丹桃桞條七寸煮湯下微利相間服蝎尾散治小兒急驚風神效蝎尾二七枚生用白附子二七枚生用黑鉛一錢水銀一錢二味同結炒子附子尖二七枚生用半夏七枚湯洗出滑天南星底一七枚生用烏頭尖一七枚去皮生用右件藥搗細羅為散每服以薄荷湯調下半字若兒在百日內者一字可分為四服如要作丸即以棗肉和丸如菉豆大以馬藿草湯下一丸臨時更量兒加減五福丸治急驚風生蚯蚓一條研爛入五福化毒丹一丸再研如泥煎薄荷湯少許調化旋灌量兒大小加減服之無不效者梁國材云洋州進士李彥直家專貨此藥一服千金以糊十口梁大有恩於李故得是方親試屢效不可不筆於册以救嬰孩麝犀膏治小兒壯熱涎盛恍惚不安夜臥強語咬牙弄舌急驚潮發目睛直視牙關緊急手足驚掣項背強直精神昏亂天竺黃白附子微炮鬱金人參去蘆頭四味各一分真珠末犀角膏各一錢牛黃别研硃砂别研二味各半分麝香别研龍腦别研二味各一錢金箔銀箔各十片右七件各為細末次入硃砂腦麝金銀箔同研令勻鍊蜜為丸每一兩作四十丸每服一丸煎薄荷湯化下食後臨臥清餅子治小兒內積實熱外冒風邪遂作急驚遍身壯熱筋脈抽掣涎潮壅盛目睛上視牙關緊急大小便祕棘剛子十四枚去殼取蟲子微炒青黛别研滑石别研大戟好酒半盞煮酒浸取出焙乾天南星炮取心用荆芥穗五味各五分右件為細末水和令勻丸如梧桐子大揑作餅子青黛為衣每服一餅子煎薄荷湯化下不拘時候至寶散治小兒氣與血不和素有實熱復因外受風邪遂致急驚涎盛目睛直視身熱瘈瘲大便多祕解潮搐清神志虎睛一對酒浸微炒牛黃别研鐡粉别研犀角屑細研白附子炮天竺黃人參去外蘆頭各二錢半青黛細研硃砂别研大黃三味各半兩細松煙墨一兩燒煙盡地上去火毒龍腦一錢别研麝香一分别研右件為細末次入研者藥和勻如半晬兒每服一字周晬兒半錢煎蔥白薄荷湯調下或涎盛咽喉腫痛更加細研龍腦半錢煎薄荷湯調下不計時候奪命散治小兒急驚風搐又治肺脹喘胸膈氣急出入兩脅搐動陷下作坑病甚者兩鼻竅張擡肩悶亂煩渴咳嗽聲嗄不鳴痰涎潮塞睡卧不穩死即在朝夕世俗不識若作咽喉風或作馬脾風治之悮矣切忌不得於胸腹上灸之反為禍矣慎宜戒之方見本門慢脾風類普濟方卷三百七十
