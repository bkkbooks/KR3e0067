body:
  text: 普濟方卷三百七十明周王朱橚撰嬰孩驚風門急驚風附論夫急驚風證候上竄反張搐搦口流痰涎壮熱并有之其或視左視右者有僵有仆僵仰也屬陽仆俯也屬隂拳握指有裏有外醫分男女定隂陽順逆之理有左右引搐連脚手身體顫動初則搐搦俱作久而搐作只搦有急有緩但只肩動曰瘈瘲者候之輕也搐則甚也搦又重也反張牙關𦂳急喉中有涎即是驚風候如牙關不𦂳口無痰涎只反張搐搦上竄者未可便作驚風候蓋夾驚夾食傷寒疹豆或三焦蘊熱五臟不宣流入經絡熱在筋脉亦作搐搦錢氏云搐有真假不言病也前有云急驚量其分数者是約熱之輕重而與利之若是證候氣粗涎潮其證候猛急不只徐徐而來搐即急促唇口眼眼眨引連併諺云急驚驚爺娘慢驚驚藥王然雖説之有法輕重調理先當定搐搐由風也風由熱也搐既已定方可下熱退驚熱若不退驚亦不㪚不移其時搐搦又作謂過街候乃是醫家不明纔見搐定便言勿藥急驚風難治有三初驚時其風癎發作斟酌輕重去風定搐隨而愈之斯恐庸醫或常人執見妄便下之既下了諸證猶存者一難治也又其兒正搐親人便執定不令渠搐其風癎不得縱恣逆入經絡藥力不及雖病减瘥根在血脉或注經絡二難治也又兒患候有順有逆順既易理逆自難療惟恐病延既久不得良餌證候傳變越去原因而作他證三難治也湯氏急驚𤼵熱證歌先自有驚身體熱那更傷寒傷風兼失節兩臉斑紅一似丹口開氣促心欲絶先表方知醫有功次與觧驚神妙訣㣲㣲利過自清凉但管安和必懽悦忽然身熱便生驚髪竪毛乾㵼又青且㸔額間㣲有汗次觀印内上青筋掌裏一如桃色潤心中怕忽作涎聲良醫妙手施湯藥若得安和便可生方𤼵驚風㸔握拳指内指外細須言隂内陽外為順候男左女右搐令全用藥開闗雙眼下又將形候細詳看只怕毒涎衝入肺心中若聚更堪憐速與控涎為妙手療驚觧熱未為然仰頭逆搐難求效目瞪身强入九泉多啼急搐更頭偏定是風𫝊氣不宣先看眼中微淚下始知此病有根源面紅病作非瘥候愛哭心中且聚涎臉有紅筋癎已變指紋青亂患相𫝊紅净為安體則寧如逢紅黒便為驚更兼紅亂青尤甚取下風涎藥有靈先看孩兒眼色青次看背上冷如氷陽男搐左無妨事忽逢搐右使人驚女搐右邊猶可治搐於左畔病非輕歪斜口眼終為害妙藥靈方不㑹寧搐來三度便成癎何故胸中聚毒涎恐被醫人重疊取驚風不定候相傅兩眼有如羊白腫更加眵膿不能痊大衝有脈猶堪治如沒醫人不敢言凡嬰孩急驚風候切須審察四證之中而作八候八候者一搐二搦三掣四顫五反六引七竄八視也一搐者臂與足時搐縮二搦者十指開合搦之不已即成握拳男子㸔大拇指其指握在外為順在裏為逆女子反㸔之三掣者肩膊搐掣或連身跳起四顫者或手或脚或頭或身四體顫動五反者身手反張六引者以手有如挽弓状男子左手直右曲為順右直左曲為逆女子反㸔之至所云七竄者看其眼上竄覷髙男子上竄為順下竄為逆女子反㸔之八視者男子斜目視左為順視右為逆女子反㸔之四證八候次苐隨生若只去得驚風其痰熱不㪚未可言安痰與熱聚将來必致癎疾所治之法其痰與熱須詳察可否即下之痰熱既下驚風未盡消去則病依前又有發作所言四證相須本無痰而後痰盛初有搐而後不作者此證候所𫝊之至甚人少知之盖有明醫之人常能審量輕重下之得于其中為良且驚風頓去痰熱又已化不作後患所下之藥稍稍多巴霜膩粉為重即傳慢候無疑急驚欲下之理須在急驚上竄斜視反張所作之時方可若傳過即已搐定少緩之間未可即便𦂳下急驚用藥先與服截風定搐次與下熱熱去則無風風㪚則不搐急驚有上竄者有搐有搦有引有反有僵有仆有呌者或唳者有痰涎潮盛有溫狀𤼵作各隨四證輕重而受之急驚截風定搐為要風搐既定諸證漸消定搐須用通關非出鼻之謂通截風乃用調絡急驚風吼呌三兩聲者難治心受驚觸痛絶於内乃傷其根本之謂急驚風未投藥四證俱全已服藥四肢垂軃者難治急驚噴藥者難治又藥不下者難治急驚搐搦之後四體俱輭者難治急驚𤼵作之時脚作擺跳者難治急驚搐搦之時目睛翻轉不可治驚風搐搦已住神情緩慢手撏姆衣或撏自身體者亦不可治急驚迺卒然得之初發潮熱目直視牙關𦂳急手足搐搦靣紅甚頭額遍身汗出口中熱氣大小便黄赤其脉浮數宜用通關服通心飲大凡驚風乃心受驚肝主風致筋脉搐搦肝又主筋宜凉肝丸大青膏錢氏云治急驚風世人多用一藥有性溫性凉不可執用宜審别之又治慢驚宜去龍腦縱須合用必以藥為佐宜少用之凡小兒實熱踈轉後如無虚證不可妄泄邪熱必須主治驚風痰熱堅疳能不用水銀輕粉甚便如不得已用之僅去痰即止蓋腸胃易傷亦損口齒方定生丸出聖惠方治小兒急驚風遍身壮熱筋脉不利手足抽掣口噤面青痰涎壅滯及疳氣所攻肌體瘦弱雀兒飯甕一兩内有物者蟾蜍一兩塗酥炙令焦黄猪牙皂莢一分去皮塗酥炙令焦黄去子烏蛇半兩酒浸去皮骨炙令黄天麻一分藜蘆半分去蘆頭乾蝎一分炙㣲黄𤓰蔕一分天南星一分炮製龍腦一分細研雄黄一分細研麝香一分細研膩粉一分曲頭棘針一分蜣蜋一分㣲炒去翅足半夏半分湯洗七遍去滑熊膽一分牛黄一分細研右為末以猪膽汁和丸如菉豆大每服先以溫生薑湯研一丸灌在鼻内得嚏後以生薑薄荷湯下三丸量兒大小以意加减救生丹出聖惠方治小兒急驚風四肢搐搦多涎沫身熱如火心神驚悸𤼵歇不定龍腦鉛霜雄黄硃砂蘆㑹胡黄連麝香牛黄天竺黄曽青真珠末犀角屑乾蝎末金箔銀箔各五十片雀兒飯甕三七枚内有物者右都研末五月五日合用大活蟾十枚於眉間各取酥少許同研令匀入飯和弹子大着甆椀内黄稍活蝎四十九枚着椀内令藥彈觸蝎毒螫入藥内候毒盡放蠍然後重研藥彈令匀丸如菉豆大不計時候以薄荷汁先研一丸滴在鼻内男左女右候嚏即以薄荷湯服兩丸量兒大小以意加减犀角丸出聖惠方治小兒急驚風遍身壮熱心多驚悸睡卧不安手足跳掣胸膈多涎犀角屑一分牛黄一分細研麝香一分細研龍腦一分細研水銀一分天麻一分天南星一分天竺黄一分細研白附子一分炮製桂心一分蟬殻一分烏蛇肉一分乾蠍一分鈆霜一分硫黄一分與水銀結砂子細研右並生用擣羅為末入牛黄等同研令匀鍊蜜和丸如菉豆大不計時候以薄荷湯下三丸量兒大小臨時加减定命丹出聖惠方治小兒急驚風蟾酥紅豆大桑螵蛸一枚獨角仙半錢去皮及翅足天漿子七枚犀角屑半兩牛黄半兩細研雄黄半兩細研硃砂半兩細研水飛過天竺黄半兩細研麝香一分細研青黛半兩細研天南星半兩白附子半兩乾蠍稍一分膩粉一分龍膽右並生用擣羅為末以獖猪膽汁和丸如黄米粒大每服先以溫水化破一丸吹鼻内得嚏五七聲即以薄荷水下二丸量兒大小以意加减龍腦丸出聖惠方治小兒急驚風身熱口噤四肢攣搐龍腦細研雄黄細研蘆㑹細研丁香牛黄細研木香犀角屑鈆霜細研天漿子胡黄連蠍尾㣲炒白花蛇酒浸去皮骨炙㣲黄已上各一分蟾酥半分研入右為末錬蜜和丸如梧桐子大每服以桃心湯研下三丸量兒大小以意加减天麻丸出聖惠方治小兒急驚風四肢抽掣拘急壮熱或則口噤天麻雄黄細研烏蛇肉蟬殻乾蝎麝香細研天竺黄細研桂心天南星白芷白附子膩粉各一分半夏一分湯洗七遍去滑右並生用擣羅為末研匀煮棗肉為丸如菉豆大不拘時候薄荷酒下三丸量兒大小以意加减服之硃砂丸出聖惠方治小兒急驚風痰涎口噤手足抽掣硃砂細研犀角屑鈆霜研入天南星炮製半夏湯洗七遍去滑白附子炮製細辛桂心白殭𧖟㣲炒乾蝎㣲炒以上各一分右為末一半用無灰酒一中盞熬為膏入其餘藥末同和如菉豆大每服用生薑自然汁少許入竹瀝一合煖令溫下二丸量兒大小以意加减服之定搐㪚出永類鈴方治小兒嬰孩急驚風四證八候俱作者宜服天麻白附子炮天南星炮各半兩硃砂一錢雄黄一錢乳香一錢代赭石一兩火煅醋淬七次白花蛇頭一分酒浸腦子一字麝香赤脚蜈蚣一條酒浸右為末每服半錢煎金銀薄荷湯調下錬蜜丸如雞頭大亦佳搐證未作痰熱壅盛故生風風不自㪚流於筋脉又入經絡遂發搐搦定其搐搦先用截風風若不加則搐搦自息矣且搐搦已作痰熱尤盛證候傳極其風不可得而截搐不可得而定由如遺漏炎熾猛烈難以撲滅如此患者理宜下之大抵陽癎用下乃良隂癎何以加之兒分長幼用藥惟有𤼵風作搐大小皆然風之為疾猖獗衝突乃五臟虚處受之察之在證療之在未萌由驚而作或疾與熱而審其源而定其疾者要也有其風即𤼵搐有其搐即因風截風定搐其議相續今述截風㪚不待搐搦纔覺風痰驚熱有作便與服之令不搐搦故曰截風既已搐搦併作宜與定搐㪚禦之禦之不㪚與服煖金丹其勢加重即與下之且下不用截風定搐之藥得失議皆由忽遂皆感煖金丹治嬰孩小兒急驚八候四證未全脱去尚存風熱痰涎其驚風證候欲再發作宜與服之天麻一分全蝎二十一個麸炒白花蛇炙取肉二錢如無以烏稍蛇代用天南星炮半兩辰砂另研半兩麝香一錢蜈蚣赤脚者二條炙去了毒白附子炮一分白殭蠶二錢重去絲炒黒附子尖三枚牛黄一分如無以黄牛膽代之加用右為末錬蜜為丸如皂角子大煎金銀薄荷磨化下所患驚風痰熱四證皆上竄斜視反張惟是驚風作搐名曰真搐為其病受不傳即作痰熱所發或因傷寒等疾𤼵作總名假搐為其更有傳變其時倉惶醫者昏惑投藥不當發作致久雖假搐失治或不當則傳入經絡又成真搐無可疑貳其病在痰熱手不促拳目無斜視且兒知其非常動作故驚惕驚成傳風驚風相襲何謂候假之有又其醫工察無全功療治有失節藥叅證候不同禍害生焉煖金丹者清心肺而攻痰涎妙餌夫風候出乎肝驚病𤼵乎心若清心肺則肝受制而風不加傳即可療理白附子丸出聖惠方治小兒急驚風手足抽掣白附子一分炮製白薑一分炮製蜣蜋一分㣲炒去翅足麝香一分細研乾蝎半兩㣲炒蟾酥半錢烏蛇肉三分酒拌炙令黄牛黄一分細研硃砂半兩細研水飛過青黛半兩細研甜葶藶一分隔紙炮令紫色天漿子一七枚内有物者右為末以猪膽汁和丸如菉豆大每以冷水研一丸滴在鼻中候嚏一兩聲後便以溫水研三丸服之或吐出粘涎得睡便瘥芎活湯出千金方治急驚風角弓反張不隨并軃擗不能行歩人參黄芩杏仁石膏各一錢麻黄甘草桂心芎藭升麻當歸去尾獨活各三錢右剉㪚每服二錢水一盞生薑二片煎服少取汗得汗以粉粉之保命丹出活幼口議治嬰孩小兒急驚風後傳慢驚宜服麝香半字白茯苓硃砂另研白附子炮天南星炮牛黄如無以膽星代用各一錢全蝎炒半兩天麻炒一錢半甘草炙一錢硼砂一錢腦子半錢右為末薄糊為丸如雞頭大每服一丸金銀薄荷湯化下義曰此一方已述靈秘所治急傳慢候用之極良此藥純和却驚安神能化痰定搐功効非常然急驚傳來初入慢候須較隂陽虧盈乃為法則隂盛陽虧方謂隂癎榮虚衛弱方傳隂癎心驚神㪚方傳熱熱經渠絡弱方傳熱熱癎之為病四體不收精神失守百病干邪五臓受虚但隨四證而作八候醫工當察標本理之若證傳候變即入慢肝十死一生至為難事請䆒所受療理合于古意或太過不及總為虚設定搐㪚出直指方治急驚風定搐赤蜈蚣大者一條酒浸炙麻黄去