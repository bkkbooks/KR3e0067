  - {type: page-break, offset: 0, content: '', id: KR3e0067_WYG_082-1a, image: WYG0749/WYG0749-0457a.png}
body:
  text: 普濟方卷八十三明周王朱橚撰眼目門雀目論晝而明視暮不覷物名曰雀目言如鳥雀不能有見於夜也夫衛氣晝行於陽夜行於隂隂血受邪肝氣不能上榮於目肝受血而能視今邪在於肝隂血澀滯至暮則甚故遇夜目睛昏不能覷物世謂之雀目龍木論云肝虛雀目內障此眼初患之時或多癢或澀發歇時時暗已後極重之時雖黃昏都不見惟視直下之物宜服卓肝飲㵼肝湯即瘥歌曰雀目雖欺不可欺小兒患者作疳醫大人肝臟虛勞事更被風來助本基花發眼前隨顧現不憂後患即無知年深百日雙亡目欲覩三光後世稀髙風雀目內障此眼初患之時肝有積熱上衝腎臟虛勞亦兼患風衝肝氣不足致患此疾與前疾不同見物有别唯見直上之物然後為青盲切宜服補肝散還睛丸即得效痊歌曰雀目前篇已辨根此時何要再三論只緣病狀同中異為是風髙要别陳一種黃昏無所見若觀天象總能分多年瞳子如金色欲識髙風只是真兩目初醫何藥妙卓肝入口火燃薪風勞更若除根本永保千秋與萬春方還睛丸治雀目人參細辛去蘆葉白茯苓去黑皮木香知母焙芎藭一兩石決明茺蔚子各二兩右為細末煉蜜和丸如梧桐子大空心茶清下十丸鎮肝丸一名石決明子九治雀目方見本門內障眼類補肝散治髙風雀目內障人參茯苓車前子川大黃黃芩各一兩五味子防風各二兩黑參兩半右為末以水一盞散一錢煎至五分去滓溫服防風煮肝散治雀目不計大人小兒久患不瘥防風去蘆黃連去鬚榖精草黃芩去黑心甘草炙銼天南星炮各二兩蛤粉半分右為細散每服一錢用羊子肝一片銅竹刀批開摻藥在內以麻縷纒定研粟米一大盞銀石鍋內煮熟放溫臨卧嚼服切不得犯鐵器一方無蛤粉療雀目方以生雀血傅目鬱金散治雀目鬱金蛤粉研各三兩大黃銼炙黃連去鬚雄黃研各一分新牛膽豬膽二枚右將五味為細散并豬膽拌入牛膽中填滿隂乾為細散每服大人一錢小兒半錢食後新汲水調下赤眼氣眼疳眼並治大黃連前子湯一名卓肝散出龍木論治雀目大黃煨銼車前子黑參黃苓細辛去蘆葉茺蔚子各二錢右搗粗篩每服二錢以水一盞散半錢入黑豆三七粒煎至五分去滓空心臨卧各一服㵼肝湯出龍木論治肝虛雀目內障大黃芍藥桔梗芒硝黃芩防風各二兩右為末以水一盞散半錢煎至五分去滓食後溫服夜明散治雀目久昏榖精草甘草夜明沙青蛤粉蒼术各等分右為細末每服三錢豬肝二兩批開摻藥入內麻扎定米泔水煮薰眼至熱分三五次細嚼肝湯下日均一光明散治雀目白斂赤斂井泉石虢丹龍骨等分右為細末每服一兩水二大碗入豬肝四兩切片同煎一碗先喫豬肝然後服煎藥送下食後白皮散出聖惠方治雀目至暮無所見宜服老白柏皮細辛地膚子各四兩烏梅三兩熟右為散每食後淸酒服二錢過七日三四服或溫水調下又方出聖惠方治雀目不計大人小兒久病不瘥黃芩榖精草蛤粉羚羊角屑各半兩右為細散每於食後以溫水調下一錢又方出聖惠方細辛地膚子決明子松脂以上各二兩右為細散每於食後以竹葉湯調下一錢鉛丹丸出聖濟總録治雀目年深不瘥鉛丹半兩黃芩去黑心二兩蛤粉一兩半右為細末别鎔黃蠟一兩入藥內研勻更入薄麵糊丸如彈子大批豬肝作薄片裹藥米泔水煮肝熟為度爛嚼用煮肝米泔湯下空心食前臨卧再服槐芽散一名空心散出聖濟總録治雀目及內外障眼風毒青盲暴赤眼羊梅青好者水浴過空乾研胡黃連水浴過為細末各一分槐芽初出如雀舌時於日未出勿食不語摘之不計多少入一青竹筒內不令雞犬等見於背日通氣處候乾為末一錢半用之右同研勻細如粉入龍腦一字許更研勻密收每夜卧先水淨嗽口仰面卧用葦筒子吹藥一字入兩鼻中但令如常喘息便自睡著眼中覺涼冷隔夜一次用之效如聖散出聖濟總録治肝虛雀目夜不見物蛤粉青葙子石決明各半兩右為細散用羊肝二兩批開摻藥三錢七在內麻縷扎定用米泔水煮熟為度細嚼米飲下臨卧服雞兔肝煮藥亦可石斛散出聖濟總録治雀目石斛去根仙靈脾銼各一兩蒼术米泔浸切炒半兩右為散每服三錢空心米飲調服日再煮肝散出儒門事親書治雀目青蛤粉夜明沙榖精草各等分右為細末每服五七錢豬肝內煮熟細嚼茶清下蛤粉散出龍木論治雀目不拘久近但日落便不見物黃蠟上色蛤粉細研各等分右鎔蠟拌粉為丸如棗子大每用豬肝一片二兩許批開裹藥一九麻縷纒磁器內水一碗煮熟取出乘熱薰眼候溫臨卧喫肝以瘥為度一方用豬腰子又方治雀目石決明一兩燒存性蒼术三兩去皮右為細末切開豬肝入藥在內麻綿封縛入砂罐內煮令香熟乘熱薰眼都食此肝治雀目青盲方出聖惠方地膚子五兩決明子一升右為細末以米飲汁和丸食後服二十丸至三十丸日二一方為細散每服一錢淸粥飲調下煮肝散出聖濟總録治雀目夜不見物用紫芥菜子真香炒令黑色碾為細散用羊肝一具分作八股每用散二錢捻在肝上以笋籜裹藥煮令熟放冷服以煮肝湯下卧時服夜明散一名聖散出聖惠方治雀目不計日月宜服亦治小兒雀目以蒼术四兩米泔水浸一宿切作片焙乾為末每服三錢豬肝二兩批開摻藥在內用麻縛定粟米一合水一碗砂鍋內熬熟薰眼候溫臨卧服之一方用羊肝却用河水浸蒼术去黑皮雀盲散一名炒肝散出直指方治遇夜目不能視以建昌運螺兒拌粉三錢為末雄豬肝一葉竹刀批開納蚌粉於中麻縷扎定米泔煮七分熟又别蘸蚌粉細嚼以汁送下無蚌粉以夜明沙代之夜明沙治內外障裹入豬肝煮帶生和汁細嚼效魚膽方出肘後方治雀目及熱毒痛以鯉魚膽及腦傳之燥痛即明療雀目方出聖惠方以七月七日九月九日取地衣草淨洗隂乾末之酒和眼方七日三服一月愈雀目方出聖惠方以豬肝一大具細切以水一斗煮熟置小口器中及熱以目臨上須大開勿閉冷復溫之以瘥為度治雀目立驗以貛肉爛煮食一飱愈榖精九出衛生家寶方治大人小兒雀目攀睛榖精草三兩為末羊肝一具薄切片子三指大用精草以水二碗同煮右和黑豆不拘多少時嚼喫如恐人不肻喫時煮出乘熱入臼內搗成丸如菉豆大每服三十丸茶淸湯食後服小兒加減隨大小服光明散出衛生家寶方治雀目不見路夜明沙炒蚌粉炒蒼术米泔浸炒海螵蛸各等分加黃丹右為細末用羊肝作片子安藥在中用水一盞煮乾為度細嚼用白湯吞下開明餅子出楊氏家藏方治夜眼烏賊魚骨半斤黃蠟三兩右以烏賊魚骨為細末鎔黃蠟共和丸揑如小錢大每服一餅子用豬肝二兩竹刀子批開著藥在肝內用麻皮扎定米泔水半碗煮先食肝次用元煮藥湯送下食後療目晚不見物取鼠睛汁點之治雀目術令雀目人至黃昏時看雀宿處打令驚起雀飛乃咒曰柴公柴公我還汝盲汝還我明如此口宣三過作之眼即明曾試有驗肘後方云蒯繁載支太醫法又方用蒼术味苦甘溫三兩搗羅為末每服一錢不計時候以羊肝一箇竹刀批開摻藥在內麻繩扎定以米泔一大升煮熱為度患人先薰眼藥氣盡即喫之簡要濟衆亦治小兒雀目療雀目方及逺時以生雀熱血傅目可多傅之又一方用雄雀頭點之又方以地膚子搗取汁洗之地膚子即所結子也右搗篩為末散每服三錢以水一盞煎至六分每於食後溫服決明子散出聖濟總録治客熱衝眼赤多淚出生瘡決眀子一兩川升麻枳殼麩炒微黃去穰柴胡去苗梔子仁車前子以上各一兩細辛防風去蘆頭黃連去鬚各等分甘草半兩微炙赤銼右為細末散每服三錢以水一盞煎至六分去滓食後溫服忌炙煿熱酒麵梔子湯出聖濟總録治肝心熱毒目生瘡及磣痛梔子仁半兩犀角屑一兩木通銼黃芩去黑心各半兩決明子黃連去鬚三分大黃銼炒車前子瞿麥穗各一兩右粗搗篩每服五錢以水一盞半入竹葉七片煎至八分去滓投芒硝半錢放溫食後服臨卧再服㵼脾湯出龍木論治風赤瘡痍外障人參黃芩茯苓大黃桔梗芒硝各一兩茺蔚子二兩黑參一兩半右為細末以水一盞散一錢煎至五分去滓溫服黃連散出聖惠方治肝熱衝眼生瘡黃連一兩半去鬚赤芍藥蕤仁湯浸去赤皮木通銼決明子梔子仁黃芩甘草各炒赤銼各一兩右為粗散每服三錢以水一盞入竹葉二七片煎至六分去滓每於食後溫服墜膈丸出龍木論治風赤瘡痍外障澤㵼五味子車前子知母乾山藥石決明各一兩防風一兩半右為末煉蜜丸如梧桐子大空心茶下十丸細辛丸出聖惠方治眼赤生瘡細辛半兩黃連去鬚半兩蕤仁二兩湯浸去赤皮蘆薈半兩桑根白皮一兩銼龍腦一錢細研甜葶藶一兩隔紙炒令紫色右為末以龍腦同研令勻煉蜜和搗二三百杵丸如梧桐子大每服食後以溫漿水下二十丸蕤仁膏出聖惠方治眼肝熱風赤兩角生瘡腫爛癢痛方見本門赤目磣痛赤腫類犀角散出聖濟總録治風熱上攻目瞼生瘡疼痛不止犀角屑黃連去鬚大黃銼炒令香甘草炙銼青竹茹各二兩秦皮去粗皮銼半兩右粗搗篩每服三錢以水一盞煎至六分去滓投芒硝半錢放溫食後臨卧再服菊花散出御藥院治眼暴赤腫痛目自淚出薄荷去兩三甘草微炒二兩大黃去粗皮芒硝各一兩甘菊花去淨土縮砂仁各半兩右為細末每服三錢茶清調服去滓食後蒺䔧子丸治眼內生瘡但睛不損者蒺藜子炒去角蟬蛻炙決明子炒各一兩木賊以合盛之略燒存性為末一兩兔糞餵豆後收者二兩焙乾右為末用淡豆䜴一兩麵一匙先爛研䜴入水和麵煮糊丸如梧桐子大每服用淡竹葉湯下十丸加至二十丸早晚食後秦皮丸出聖惠方治一切風赤眼生瘡秦皮二兩辛夷二兩黃柏五兩黃連一兩去鬚元參一兩芥草一兩微炒甘草一兩炙微赤銼右為粗散每服三錢以水一盞煎至六分去滓每於食後溫服白微散出危氏方治眥頭結聚流出濃汁粘睛上下不痛仍無翳膜此因心氣不寧并風熱停留在驗中宜服白薇半兩防風白蒺藜去角炒石榴皮羌活右為末米粉糊丸如梧桐子大每服二十丸白湯下杏仁龍腦膏一名點眼良膏出聖濟總録治眼赤有瘡及生努肉日夜難開疼痛朴硝一錢龍腦一匙一方用二錢杏仁湯浸去皮研七粒豶豬膽乾者如棗許大右先將杏仁入乳鉢中研令細次下三味同研以銅盒盛經一宿每點如黍米大納目眥中眼如冷淚出至十日自瘥止之其藥密封覆勿令見風蕤仁膏出聖濟總録治肝虛風癢生瘡淚多出蕤仁去皮研一分龍腦一錢胡粉如棊子許大于火上燒變赤如金色者佳酥真者如杏核許右先將胡粉蕤仁别研再取酥同研入龍腦令如膏用油帛裹或銅盒子盛勿泄氣見風或小兒胎赤大人久患赤眼癢痛宜先取鹽花少許用絶酸漿水一升煎三五沸以綿濾取汁夜卧洗以清水次以鹽花水洗眼候令乾以爪甲挑取麻子許點眼眥須臾淚出目中冷涼豬膽膏出聖惠方治眼目有瘡及努肉日夜不開疼痛豬膽一枚取汁川朴硝半兩膩粉一錢龍腦一匙右細研與豬膽相和經宿每用一小豆大點之蕤仁膏出聖濟總録治風熱目赤生瘡蕤仁去皮研如膏半兩青鹽末一錢龍腦少許右同研用兒孩子乳少許調和如膏每以麻子大日三五度點眼黃連散出聖濟總録治眼風赤澀隱腫疼生瘡黃連去鬚末蕤仁去皮各一分胡粉一錢右先將蕤仁去膜於銅器中用槐木杵研令極細如粉次入黃連末胡粉和更研細為度每夜卧點一黍米在目眥頭瘥碧霞膏出聖濟總録治大人小兒赤眼腫疼生瘡黃丹二兩枯白礬一兩淨蜜半斤右先將黃丹炒紫色入枯白礬同蜜熬紫色入水一盞再煎稀稠合宜磁器內盛每用皂子白湯半盞化開熱蕩眼冷即再溫洗八九次不用嗅鼻散出聖濟總録治赤眼生瘡腫疼乳香一錢道人頭二兩為末右為末每用一錢香餅子上燒煙嗅鼻內治瘡入眼出龍木論仙靈皮威靈仙等分右為末食後米飲調下二錢小兒半錢青錢湯出聖惠方治目眥爛作瘡青錢三十文鹽半合右相和以紙裹又著鹽泥裹於猛火中燒一時取出剝去泥以湯二大盞攪攄去滓乘熱淋洗冷即重暖用之清涼包子出聖濟總録治眼熱赤生瘡及退膜翳用宣州黃連一分為末以新水一碗面東撲取倒流水些小將黃連末勻摻在碗內用熟艾一塊如雞子大安在古老錢七文上四面更用青銅錢四十文圍住安盆內覆黃連碗在上點火燒艾候煙盡便掃下黃連末用夾絹袋盛之取孩兒乳汁浸開時時點眼中覺口中苦透為度如暴赤眼用之立效治眼瞼裏生瘡或癢或痛愈而復發出聖惠方用萎蕤仁一分去赤皮研令細以好酥和勻每用麻子大每日三四度點時時暖鹽水洗之廣大重明湯出誠效方治兩目瞼赤腫楞生瘡目多淚隱澀難開及熱痛並稍赤及眼瞼癢栻之至破爛赤腫痛不可忍龍膽草防風甘草生細辛各錢右杵㕮咀如麻豆大內甘草不銼只作一定先以水一碗半煎草龍膽一味至一半再入後三味煎至少半碗濾去滓用清帶熱洗以重湯坐令熱日用五七次但洗畢少合眼須臾許開努肉泛常及癢赤驗治眼瞼赤皮上生濕瘡發作有時出讓命方黃蘗一兩用蜜浸一時右以無皮炭燒火炙令乾不要焦細杵為末每用五六錢煎湯洗數次便效目青盲論夫眼者輕膜裹水也其性靜其鑒明瞻視分别物無不矚也如其氣清神爽臟乃安和稍有一臟氣傷風邪卒至日夜痛癢卒然而失明為肝膽邪毒氣所傷毒氣不散上注於目故令目靑盲也龍木論稱內障有變青盲者初患之時昏暗不痛不癢亦無翳膜至於失明與不患者相似是知青盲之狀外無異症瞳子分明而不見物由肝腎氣虛精血弱不能上榮故青而無所見也經曰肝氣通於目目和作為白黑飬生方乃以塞路井水瀆令人青盲豈其本哉方還睛散出聖濟總録治青盲障翳積熱但瞳人未損即無不治人參細辛去苖葉決明子車前子防風去蘆芎藭丹參升麻覆盆子地膚子黃連去鬚逺志去心茺蔚子桂去粗皮蒺䔧子炒厚朴去粗皮生薑汁炙銼槐實麥門冬去心焙柏子仁白芷蜀漆白茯苓去黑心木通銼黃芩去黑心麻黃去根莭湯煮涼去沫五味子附子炮製去皮臍菥蓂子禹餘糧煅醋淬枸杞子各一兩右為散每服二錢食前白米飲調下日再漸加至三錢填睛丸出聖濟總録治青盲及內外障或因幼小淚出或久視傷明或因熱病差後兩目俱赤或因打損即有努肉覆睛或喫食藥熱發兩目作瘡或傷煙火眇視或兩目畏日視不許青赤或兩眥爛瘡石決明一兩洗淨别搗磁石飯上蒸五度研陳橘皮湯浸去白皮白陽起石飯上蒸五度研梔子花肉蓯蓉去焙皮切黑石飯上蒸五度研人參生薑切焙苦參白芷黃芩去黑心甘草炙銼白茯苓去黑皮桂去粗皮厚朴去粗皮生薑汁防風去蘆杏仁去皮尖雙仁者炒研各二兩生乾地黃焙升麻各八兩龍腦研一分黃連去鬚麥門冬去心焙槐子炒黃蘗去粗皮車前子乳香研各四兩蕤仁青葙子各三兩烏賊魚骨去甲并鹹味一兩右為末煉蜜和搗三萬杵丸如梧桐子大每服六丸空心米飲下服訖即食後更服十丸加至二十丸食後即加食前不加食後仍以牛乳煎湯二年勿食五辛熱麵陳物一年勿食羊頭肝肚驢馬兔肉毒魚澤㵼湯出聖濟總録治肝臟熱衝目赤瞻視模糊積年青盲不見物澤㵼升麻杏仁湯浸去皮尖雙仁研決明子微炒大黃銼炒黃芩去黑心甘草枳實去根麩炒芍藥各一兩梔子仁人參赤茯苓去黑心黃蘗去粗皮細辛去苖葉白术各半兩柴胡去苖四兩青葙子二兩桑根白皮銼炙二兩右粗搗篩每服五錢水一盞半入薑半分慢火同煎至一盞去滓入芒硝半錢放溫食後臨卧服日再補肝散療肝臟病眼青盲內或生障惡風赤痛乾薑丹參黃耆各六分甘蕤三分桂心茯苓附子炮黃連甘草炙當歸乾漆熬具齒燒豬苓白术各五兩防風七分乾地黃八分右為散酒服方寸匕日五服忌海藻菘菜生菜豬肉冷水桃李雀肉等撥雲退翳丸治雲翳青盲眼疾川芎當歸白藥子楮實藁本羌活各一兩半白蒺藜各一兩蛇皮三錢甘菊花荆芥密蒙花川椒七錢半蟬殼三兩黃連三兩地骨皮薄荷各半兩右為末煉蜜丸每兩分作十丸食後氣障木香湯下睛暗青盲當歸湯下有翳青米泔下眼昏好酒下甘草湯下婦人血暈當歸薄荷下綿鳩丸一名羊肝丸治內外障青盲雀目眼生黑花十年翳不見光明一月有效方見本門一切眼疾雜治類蓯蓉丸一名還睛丸治眼青盲並無赤腫但不見物無翳方見本門腎肝虛眼黑睛類補肝丸一名地膚丸出聖惠方治眼青盲無所見物方見本門目昏暗類百合湯出聖濟總録治眼欲變青盲百合黃耆銼各二兩麥門冬去心焙半兩白茯苓去黑皮人參防風去蘆木通銼桑白皮銼各兩半蒺藜子炒去角酸棗仁枳殼去根麩炒石膏各一兩薏以仁一合右為散每服三錢水一盞煎至六分去滓食後溫服蒼术丸出聖濟總録治青盲眼瞳子分明亦無翳膜不痛不癢內障不見物蒼术水浸知母黃芩去黑心元參甘草人參細辛去蘆葉芎藭白茯苓木香貝母去心石決明刮洗淨茺蔚子右為細銼焙過搗羅為末鍊蜜和丸如梧桐子大每服三十丸食後溫水下臨卧再服空青決明膏出聖濟總録治青盲內障翳暈無間冷熱風等但瞳子不破者悉皆治之空青研細一兩決明子馬蹄者妙乾薑炮各一兩黃芩去黑心蕤仁各三分細辛去苖葉車前子黃蘗去粗皮黃連去鬚各半兩白蜜好者二斤右為末和蜜內銅器中蓋頭勿令透氣以米五升安藥器於上蒸飯熟為度乘熱以綿濾去滓盛磁瓶中以銅筯點眼眥若多年青盲點二十日見物每點兩日即用摩須膏防風補煎出聖濟總録治肝虛寒目青盲視物多不明漸生障翳防風去苖白鮮皮陳橘皮去白川芎甘草炙獨活去蘆頭前胡去蘆頭細辛去苖葉各一兩右粗搗篩每服五錢水一盞半大棗二枚擘開同煎至一盞去滓放溫服決明散王氏博濟方治青盲眼夫五臟六腑之精氣皆上注於目若臟空有風邪疾便乘之有熱則赤痛無熱則內生障蓋臟肺氣血不榮盛於目故外狀不異而只不見物或加之有痰熱則生翳如蠅翅狀覆在睛上此方乃至人傳授大效石決明草決明青􅀢蛇蛻炙細辛去苖葉甘草炙井泉石已上各等分右用木杵臼搗羅為散次用豶豬肝一具去膽膜淨洗瀝乾用竹刀子隨肝具切作縫用藥末一兩摻入綿縛了入生絹袋內再縛定沙鍋內米泔煮更入青竹葉一握枸杞一握黑豆三合同煮肝熟為度取出候冷食後用竹刀逐片切食之用原煮汁送下患久者兩三具見效只須潔淨不可犯鐵器服之未有不驗也真珠散出聖惠方治眼青盲真珠末三分胡黃連三分地膚子一兩石決明三兩搗碎細研水飛過琥珀三分天靈蓋三分燒灰母豬肝半兩切炙乾右為散每服二錢食後溫水調下臨卧再服日二牛肝散出聖惠方治眼青盲積年不瘥黃牛肝一具細切暴乾土瓜根三兩羚羊角屑二兩蕤仁一兩湯浸去赤皮細辛一兩車前子二兩右為細散每服二錢空心溫水調下明目地膚子散出聖惠方治眼青盲地膚子一兩石決明一兩半搗細研水飛過羚羊角屑一兩半川芎車前子酸棗仁微炒各一兩右為細散每服一錢以黑豆湯調下不計時候服抵聖丸出聖濟總録治一切眼昏障翳將至青盲不問新久皆可治家菊花去梗蒂取葉焙四兩附子炮製去皮臍切如指面大一兩蒺藜子炒去角二兩肉蓯蓉淨洗酒浸一宿切片大黃銼日暴乾各一兩右以無灰酒二升半同拌和入銀石器內盛貯蓋了於飲甑中蒸自早及晡取出焙乾搗羅為末如有浸藥剩酒煮黃粟米入瓶子內蠟紙封口勿令透氣於廊廡間取一穴次以水一盆傾在土中浸瓶一宿來日取出淨洗瓶研入腦子南硼砂麝香一塊如皂子大攪勻點粟米許入眼大眥頭神仙取藥出華陀中臟經方秦皮去粗皮三錢研細乳香一塊如棗大胡黃連三錢燈心一握七寸長棗子二箇斑蝥一箇去翅頭足古老錢七文不銼右都為粗末入無油余救切器尤佳用井花水一大碗熬去半碗用綿絹濾過將滓以水一碗煎取一盞濾過同煎汁入新碗中熬似粥樣入小瓷盒中或角盒中盛將空青並硼砂一塊如兩豆大飛過熬乾空青不熬再研入腦子多不妨麝香少許四味同入藥膏內攪勻每點一粟米許在眼眥頭將手和勻仰面候藥微澀過將沸鹽湯用軟帛片蘸洗快則已之種空青法出華陀中臟經方朴硝半錢白蒺藜一分龍腦草一分仙靈脾葉一錢旋覆花一錢右為細末用黃泥一塊拳大同藥和勻水調如軟飯相似作土餅一箇用太平錢五文按五方排定光面黑書金木水火土五字所寫字向下錢字向上隨五方按用硵砂如豆大每粒按四錢上在四字孔罅中須要乾黃土食須著土餅將新砂盆一箇蓋之又將燥黃土蓋冬月十日夏月五日取出於錢上摘取下細研入藥此為種空靑法不可嫩亦不可老須得中也能逺視不能近視者陽氣不足陰氣有餘也乃氣虛而血盛者陰火有餘氣虛者氣弱也此老人桑榆之象也能近視不能逺視者陽氣有餘陰氣不足也乃血虛氣盛血虛氣盛者皆火有餘元氣不足火者元氣殼氣真氣之賊也元氣來也徐而和細細如線邪氣來也緊而強如巨川之水不可遏地芝丸出誠效方治眼不能逺視能近視或赤或妨近及大癘風成癩悉皆治之生地黃四兩焙乾稱天門冬四兩去心稱枳殼二兩麩炒去穰稱甘菊花三兩去枝稱右為細末煉蜜為丸如梧桐子大茶清送下一百丸溫酒亦可食後琥珀金絲膏出楊氏家藏方治一切眼疾退翳除昏黃連去鬚二兩草龍腦黃蘗去粗皮山梔子一處搗碎以上三味各一兩乳香一分别研硼砂一分别研白沙蜜半斤青竹葉二百葉大者剪碎右前七味用水三升同浸一伏時於銀石器內漫火熬至一升退火放冷用絹袋作五七次絞取藥汁滓腳不用於不透風處放一伏時澄下腳滓又復去之四日再傾取清藥汁更於銀器內再以漫火熬去一半次入白沙蜜同攪不得住手候有蜜香用枚子挑出藥試之放冷再挑起有絲為度內於絹袋子又濾去滓以磁盒盛之方入研細生腦子一升用膏子攪令勻每用少許以銅筯點之熊膽膏出楊氏家藏方退翳膜赤障除昏澀隱痛及風毒上攻努肉侵睛或暴赤腫痛羯羊膽一枚大者白沙蜜半兩杏仁七枚去皮尖研黃連去頭鬚三寸捶碎南硼砂半錢别研乳香少許别研輕粉少許馬牙硝半錢别研右先將膽汁并蜜傾入磁盞內次用黃連杏仁浸一宿綿濾過次下餘藥用紙兩三重緊封口掘地坑五寸入藥盞坐定蓋之三七日取出點之頑荆散出楊氏家藏方治一切眼疾頑荆藥全蝎去毒炒躑躅花川芎四味各一兩香白芷細辛去葉土鵝不食草上三味各半錢雄黃别研沒藥别研乳香别研三味各半錢鬱金二字以上九味同為細末盆硝四錢别研腦子别研薄荷四錢右杵細末入研者藥令勻每用少許合水搐鼻中青玉散出楊氏家藏方治退翳除昏消瘀止淚及療隱澀龍骨一錢白堊土一錢銅靑半錢輕粉一匙腦子一匙右並研令細每用一字白湯泡洗神明椒菊丸出家藏方治目睛失明而睛不損者或十分不見半月取效見三二分服藥一百日收全功如冷淚及瞼緊瞼腫肝虛肝熱邪風攻注眼目及患昏花服之立愈川椒一兩甘菊二兩生地黃洗一升右生地黃控斷水脈入木臼內爛搗或沙盆內爛研以絹袋瀝取自然汁可得十二兩以上去滓不用將川椒甘菊入地黃汁內浸少時漉出候水脈斷入漫火焙之約八九分乾再入地黃汁再漉再焙如此以汁盡為度一法焙令透乾木臼內搗為細末煉蜜丸如梧桐子大以溫水下三十丸椒靈丹出家藏方治一切眼此方治人眼見一物為二之症神效不可言青鹽二兩川芎防風附子炮各一兩菊花半兩椒子四兩去蒂並子及有閉者右杵藥先將青鹽椒用好醋一碗煮盡為度後將四味藥搗羅為細末將椒裹藥為丸每服三十丸空心鹽湯下如有此症宜與丹藥門飛靈丹相間服屢經大效洗眼方出讓命方五倍子去塵土蔓荆子去蔓各一分秦皮半兩右為細末每服三錢以十分水一碗於器內煎取八分淋洗便得通明快利兼治風癢點眼方廣南四時攝生論腦子百文砂糖一錢黃連末半錢銅青飛過水浸半錢蘆甘石末一字右入糖一處研勻罐兒盛了點時少許點眼頭用水一盞銅筯洗之搐鼻方出廣南四時攝生論川芎甘草細辛桔梗蠋硝七箇龍腦薄荷右各二錢重為末再入乳鉢內研細入雄黃一錢重研勻方可用搐鼻藥明眼又去頭風還睛菩薩水出家藏方真龍膽一錢槐角洗切碎一錢雪水少許生真珠二十七粒别研為細末白沙蜜少許竹上露水少許須用天雨時以磁器內收右以新磁盒盛甑上蒸兩次研令極爛以新綿重濾過入别磁盒內再以雪水隔盒子蒸一夜又將腦子少許乳鉢內先研為細末却入前蒸雪水藥再研勻每日早時用新筆抄如米粒大以新汲水蘸濕點入眼中寬閉眼候藥行淚出方醒連使兩次右史曾南仲用之真有竒效撥雲退翳丸出德生堂方治一切眼疾內障青盲瘀肉攀睛視物不明川芎當歸各一兩半楮膏子薄荷各半兩黃連蟬殼各五錢瓜蔞根六錢蔓荆子六錢甘菊花密蒙花各一兩荆芥穗蛇退皮甘草湯炙各三錢地骨皮一兩白蒺藜一兩半炒川椒一兩半去目右為細末煉蜜丸如梧桐子大每一兩作十丸每服一丸食後臨卧茶清下當歸連翹湯出衛生家寶治眼白睛紅隱澀難開當歸三分黃連五分甘草三分連翹四分南黃柏五分右都作一服水二盞煎一盞去滓熱洗之目痛纍年或三四十年方出本草以生螺一枚以水洗之竹筯抉螺口開以黃連一枝納螺口中令其螺飲黃連汁以此綿注取汁著眥中除風明目去骨熱消渴益陽事出本草以枸杞葉和羊肉作羮患人若渴煮作飲代茶飲之白色無刺者良與乳酪相惡治眼花出本草北夢瑣言云有少年眼中常見一鏡子趙卿診之曰來晨以魚膾奉候及期延於閣內從容久飢候客退方得攀接俄而臺上止施一瓶芥醋更無他味少年飢甚聞芥醋香輕啜之逡巡再啜遂覺胸中豁然眼花不見卿云君喫魚膾太多芥醋不快故權誑而愈其疾也除目障暗出本草用越砥石磨極細汁滴目中明目出本草以菊花作枕枕之明目除熱淚頭腦心胸間熱風煩悶風眩欲倒心頭吐涎如醉漾漾如坐車上者出本草以槐實合房折取曝乾煮服味一如茶明目出本草以風延母煮服之明目鎮心安神定志出本草以生銀水磨服之明目消翳出本草以線鹽點眼常服明目洞視出本草以胡麻一石蒸之三十遍為末酒服每日一升明目去翳出本草以琥珀摩之明目出本草取柏葉上露飲之針眼論夫針眼者以邪熱搏於血脈上攻眼目發於瞼眥結焮腫痛赤眼白頭包裹濃汁痛如針刺治法當詳其外症隨宜針刺決邪毒後以消腫敗熱之劑斷其根本方大黃散出聖惠方治風熱毒血脈上攻瞼生如米豆名曰針眼目睛似水泡疼痛不可睡卧川大黃銼碎微炒黃連去鬚藍葉川朴硝各一兩川升麻決明子微炒黃芩梔子仁各三兩甘草半兩炙微赤銼右為散每服三錢以水一盞煎至六分去滓每於食後及夜臨卧溫服忌炙煿油麵生菜玄參散出聖惠方治針眼赤腫心燥風熱壅滯眼開即澀痛玄參防風去蘆頭馬牙硝子苓各一兩甘菊花羚羊角屑蔓荆子赤芍藥各三兩甘草半兩炙微赤銼右為散每服三錢以水一盞煎至六分去滓每於食後溫服臨卧再服之牛黃散治針眼瞼內生皰如大豆隱睛腫痛牛黃細研黃連去鬚玄參犀角屑川升麻決明子鬱金梔子仁各一兩柴胡三兩去苖右為細散入牛黃研勻每服於食後竹葉湯調下一錢臨卧再服之羚羊角散治肝膈虛熱生針眼腫赤羚羊角屑枳實麩炒微黃蕤仁各三分茯神防風去蘆頭地骨皮各一兩麥門冬各一兩半去心焙右為散每服三錢以水一盞煎至六分去滓入生地黃汁半合更煎至一沸每於食後溫服之麥門冬湯治目內皆成泡三五日間生濃汁者麥門冬去心焙旋復花木通銼大靑各一兩半茯神去木黃連去鬚各一兩右粗搗篩每服五錢水一盞半煎至七分去滓入生地黃汁半合芒硝末半錢更煎三二沸食後臨卧溫服前胡湯治熱氣盛目內皆腫起方見本門目赤腫痛類石膽散治針眼暴腫痛不得開點之眼上石膽研如粉一分黃連去鬚搗黃蘗去粗皮搗各三分羚人去皮研銅青研芒硝各半兩右為末更入乳鉢中重研令極細勻每取如黍米大點目眥頭協毒膏治針眼磣澀腫痛川大黃三兩木香一兩玄參白斂射干川芒硝各二兩右為散以雞子白調如膏貼於眼瞼上乾即易之半夏湯治熱客目眥結成腫泡俗呌偷針兼治眼赤腫痛半夏湯洗七遍洗滑細辛去苖葉各一兩前胡去蘆頭枳殼去穰麩炒各二兩烏梅肉半兩右粗搗篩每服五錢水一盞半入生薑一棗大拍碎同煎至六分去滓食後臨卧溫服大黃湯治眼暴熱痛眥頭腫起大黃銼炒枳殼去穰麩炒芍藥各三兩山梔子仁黃芩去黑心各二兩右粗搗篩每服五錢水一盞半煎至七分去滓食後臨卧服石膽散治眼忽結腫石膽煆令白去火毒滑石研各一兩秦皮半兩為末膩粉二錢右同研勻用一字湯浸候溫閉目洗兩眥頭以冷為度熁眼方治針眼暴赤成瘡疼痛羞明玄參黃芩黃連去鬚各一兩右為細散以豬膽汁和令稠剪帛可眼大小勻攤藥貼瞼上乾即易之治針眼疼痛黃連去鬚杏仁湯浸去皮尖黃蘗各半兩右搗令碎以綿裹內生地黃汁中浸頻點眼中治偷針眼用燈心二寸蘸香油點之偷針眼方治脾間積熱兼宿食不消用秦皮銼細夾沙糖水調大黃末少許利之芍藥湯一名玄參湯治熱毒攻眼眥腫起有濃汁者宜服此藥方見本門目風赤類普濟方卷八十三
