body:
  text: 普濟方卷八十三明周王朱橚撰眼目門雀目論晝而明視暮不覷物名曰雀目言如鳥雀不能有見於夜也夫衞氣晝行於陽夜行於隂隂血受邪肝氣不能上榮於目肝受血而能視今邪在於肝隂血澀滯至暮則甚故遇夜目睛昏不能覷物世謂之雀目龍木論云肝虛雀目内障此眼初患之時或多痒或澀發歇時時暗已後極重之時雖黄昏都不見惟視直下之物宜服卓肝飲㵼肝湯即瘥歌曰雀目雖欺不可欺小兒患者作疳醫大人肝臟虚勞事更被風來助本基花𤼵眼前隨顧現不憂後患即無知年深百日雙亡目欲覩三光後世稀髙風雀目内障此眼初患之時肝有積熱上衝腎臓虚勞亦兼患風衝肝氣不足致患此疾與前疾不同見物有别唯見直上之物然後為青盲切宜服補肝散還睛丸即得效痊歌曰雀目前篇已辨根此時何要再三論只縁病狀同中異為是風髙要别陳一種黄昏無所見若觀天象總能分多年瞳子如金色欲識髙風只是真兩目初醫何藥妙卓肝入口火燃薪風勞更若除根本永保千秋與萬春方還睛丸治雀目人参細辛去蘆葉白茯苓去黑皮木香知母焙芎藭一両石决明茺蔚子各二両右為細末煉蜜和丸如梧桐子大空心茶清下十丸鎮肝丸一名石决明子九治雀目方見本門内障眼類補肝散治髙風雀目内障人參茯苓車前子川大黄黄芩各一両五味子防風各二両黑參両半右為末以水一盞散一錢煎至五分去滓温服防風煮肝散治雀目不計大人小兒久患不瘥防風去蘆黄連去鬚榖精草黄芩去黑心甘草炙剉天南星炮各二両蛤粉半分右為細散每服一錢用羊子肝一片銅竹刀批開摻藥在内以麻縷纒定研粟米一大盞銀石鍋内煑熟放温臨卧嚼服切不得犯鐵器一方無蛤粉療雀目方以生雀血傅目鬱金散治雀目鬱金蛤粉研各三両大黄剉炙黄連去鬚雄黄研各一分新牛膽猪膽二枚右將五味為細散并猪膽拌入牛膽中填滿隂乾為細散每服大人一錢小兒半錢食後新汲水調下赤眼氣眼疳眼並治大黄連前子湯一名卓肝散出龍木論治雀目大黄煨剉車前子黑参黄苓細辛去蘆葉茺蔚子各二錢右搗粗篩毎服二錢以水一盞散半錢入黑豆三七粒煎至五分去滓空心臨卧各一服㵼肝湯出龍木論治肝虚雀目内障大黄芍藥桔梗芒硝黄芩防風各二両右為末以水一盞散半錢煎至五分去滓食後温服夜明散治雀目久昏榖精草甘草夜明沙青蛤粉蒼术各等分右為細末每服三錢猪肝二兩批開掺藥入内麻扎定米泔水煑薰眼至熱分三五次細嚼肝湯下日均一光明散治雀目白斂赤斂井泉石虢丹龍骨等分右為細末每服一兩水二大碗入猪肝四兩切片同煎一碗先喫猪肝然後服煎藥送下食後白皮散出聖惠方治雀目至暮無所見宜服老白栢皮細辛地膚子各四両烏梅三両熟右為散每食後淸酒服二錢過七日三四服或温水調下又方出聖惠方治雀目不計大人小兒久病不瘥黄芩榖精草蛤粉羚羊角屑各半両右為細散每於食後以温水調下一錢又方出聖惠方細辛地膚子决明子松脂以上各二兩右為細散毎於食後以竹葉湯調下一錢鉛丹丸出聖濟總録治雀目年深不瘥鉛丹半両黄芩去黑心二両蛤粉一両半右為細末别鎔黄蠟一兩入藥内研勻更入薄麵糊丸如彈子大批猪肝作薄片裹藥米泔水煮肝熟為度爛嚼用煮肝米泔湯下空心食前臨卧再服槐芽散一名空心散出聖濟總録治雀目及内外障眼風毒青盲暴赤眼羊梅青好者水浴過空乾研胡黄連水浴過為細末各一分槐芽初出如雀舌時於日未出勿食不語摘之不計多少入一青竹筒内不令雞犬等見於背日通氣處候乾為末一錢半用之右同研勻細如粉入龍腦一字許更研勻宻收每夜卧先水浄𠻳口仰面卧用葦筒子吹藥一字入兩鼻中但令如常喘息便自睡著眼中覺凉冷隔夜一次用之效如聖散出聖濟總録治肝虚雀目夜不見物蛤粉青葙子石决明各半両右為細散用羊肝二兩批開掺藥三錢七在内麻縷扎定用米泔水煑熟為度細嚼米飲下臨卧服雞兔肝煮藥亦可石斛散出聖濟總録治雀目石斛去根仙靈脾剉各一両蒼术米泔浸切炒半両右為散每服三錢空心米飲調服日再煮肝散出儒門事親書治雀目青蛤粉夜明沙榖精草各等分右為細末毎服五七錢猪肝内煮熟細嚼茶清下蛤粉散出龍木論治雀目不拘久近但日落便不見物黄蠟上色蛤粉細研各等分右鎔蠟拌粉為丸如棗子大毎用猪肝一片二兩許批開裹藥一九麻縷纒磁器内水一碗煮熟取出乗熱薰眼候温臨卧喫肝以瘥為度一方用猪腰子又方治雀目石决明一両燒存性蒼术三両去皮右為細末切開猪肝入藥在内麻綿封縛入砂礶内煮令香熟乗熱薰眼都食此肝治雀目青盲方出聖惠方地膚子五両决明子一升右為細末以米飲汁和丸食後服二十丸至三十丸日二一方為細散每服一錢淸粥飲調下煑肝散出聖濟總録治雀目夜不見物用紫芥菜子真香炒令黑色碾為細散用羊肝一具分作八股每用散二錢捻在肝上以笋籜裹藥煮令熟放冷服以煮肝湯下卧時服夜明散一名聖散出聖惠方治雀目不計日月宜服亦治小兒雀目以蒼术四兩米泔水浸一宿切作片焙乾為末每服三錢猪肝二兩批開摻藥在内用麻縛定粟米一合水一碗砂鍋内熬熟薰眼候温臨卧服之一方用羊肝却用河水浸蒼术去黑皮雀盲散一名炒肝散出直指方治遇夜目不能視以建昌運螺兒拌粉三錢為末雄猪肝一葉竹刀批開納蚌粉於中麻縷扎定米泔煮七分熟又别蘸蚌粉細嚼以汁送下無蚌粉以夜明沙代之夜明沙治内外障裹入猪肝煮帶生和汁細嚼效魚膽方出肘後方治雀目及熱毒痛以鯉魚膽及腦𫝊之燥痛即明療雀目方出聖惠方以七月七日九月九日取地衣草净洗隂乾末之酒和眼方七日三服一月愈雀目方出聖惠方以猪肝一大具細切以水一斗煮熟置小口器中及熱以目臨上須大開勿閉冷復温之以瘥為度治雀目立驗以貛肉爛煮食一飱愈榖精九出衞生家寶方治大人小兒雀目攀睛榖精草三両為末羊肝一具薄切片子三指大用精草以水二碗同煮右和黑豆不拘多少時嚼喫如恐人不肻喫時煮出乗熱入臼内搗成丸如菉豆大毎服三十丸茶淸湯食後服小兒加减隨大小服光明散出衛生家寳方治雀目不見路夜明沙炒蚌粉炒蒼术米泔浸炒海螵蛸各等分加黄丹右為細末用羊肝作片子安藥在中用水一盞煮乾為度細嚼用白湯吞下開明餅子出楊氏家藏方治夜眼烏賊魚骨半斤黄蠟三兩右以烏賊魚骨為細末鎔黄蠟共和丸揑如小錢大每服一餅子用猪肝二兩竹刀子批開著藥在肝内用麻皮扎定米泔水半碗煮先食肝次用元煮藥湯送下食後療目晩不見物取鼠睛汁㸃之治雀目術令雀目人至黄昬時看雀宿處打令驚起雀飛乃咒曰柴公柴公我還汝盲汝還我明如此口宣三過作之眼即明曾試有騐肘後方云蒯繁載支太醫法又方用蒼术味苦甘温三兩搗羅為末每服一錢不計時候以羊肝一箇竹刀批開掺藥在内麻繩扎定以米泔一大升煮熱為度患人先薫眼藥氣盡即喫之簡要濟衆亦治小兒雀目療雀目方及逺時以生雀熱血傅目可多傅之又一方用雄雀頭㸃之又方以地膚子擣取汁洗之地膚子即所結子也右搗篩為末散每服三錢以水一盞煎至六分每於食後温服决明子散出聖濟總録治客熱衝眼赤多淚出生瘡决眀子一両川升麻枳殻麩炒㣲黄去穰柴胡去苗梔子仁車前子以上各一兩細辛防風去蘆頭黄連去鬚各等分甘草半両微炙赤剉右為細末散每服三錢以水一盞煎至六分去滓食後温服忌炙煿熱酒麵梔子湯出聖濟總録治肝心熱毒目生瘡及碜痛梔子仁半両犀角屑一両木通剉黄芩去黑心各半両决明子黄連去鬚三分大黄剉炒車前子瞿麥穗各一両右粗搗篩每服五錢以水一盞半入竹葉七片煎至八分去滓投芒硝半錢放溫食後服臨卧再服㵼脾湯出龍木論治風赤瘡痍外障人参黄芩茯苓大黄桔梗芒硝各一両茺蔚子二両黑参一両半右為細末以水一盞散一錢煎至五分去滓温服黄連散出聖惠方治肝熱衝眼生瘡黄連一両半去鬚赤芍藥蕤仁湯浸去赤皮木通剉决明子梔子仁黄芩甘草各炒赤剉各一両右為粗散每服三錢以水一盞入竹葉二七片煎至六分去滓每於食後温服墜膈丸出龍木論治風赤瘡痍外障澤㵼五味子車前子知母乾山藥石决明各一両防風一両半右為末煉蜜丸如梧桐子大空心茶下十丸細辛丸出聖惠方治眼赤生瘡細辛半両黄連去鬚半両蕤仁二両湯浸去赤皮蘆薈半両桑根白皮一両剉龍腦一錢細研甜葶藶一両隔紙炒令紫色右為末以龍腦同研令勻煉蜜和搗二三百杵丸如梧桐子大每服食後以温漿水下二十丸蕤仁膏出聖惠方治眼肝熱風赤兩角生瘡腫爛痒痛方見本門赤目碜痛赤腫類犀角散出聖濟總録治風熱上攻目瞼生瘡疼痛不止犀角屑黄連去鬚大黄剉炒令香甘草炙剉青竹茹各二両秦皮去粗皮剉半両右粗搗篩每服三錢以水一盞煎至六分去滓投芒硝半錢放温食後臨卧再服菊花散出御藥院治眼暴赤腫痛目自淚出薄荷去両三甘草微炒二両大黄去粗皮芒硝各一両甘菊花去净土縮砂仁各半両右為細末每服三錢茶清調服去滓食後蒺䔧子丸治眼内生瘡但睛不損者蒺藜子炒去角蟬蜕炙决明子炒各一両木賊以合盛之畧燒存性為末一両兔糞餵豆後收者二両焙乾右為末用淡豆䜴一兩麵一匙先爛研䜴入水和麵煮糊丸如梧桐子大每服用淡竹葉湯下十丸加至二十丸早晩食後秦皮丸出聖惠方治一切風赤眼生瘡秦皮二両辛夷二両黄栢五両黄連一両去鬚元参一両芥草一両㣲炒甘草一両炙微赤剉右為粗散每服三錢以水一盞煎至六分去滓每於食後温服白㣲散出危氏方治眥頭結聚流出濃汁粘睛上下不痛仍無翳膜此因心氣不寧并風熱停留在騐中宜服白薇半両防風白蒺藜去角炒石榴皮羌活右為末米粉糊丸如梧桐子大每服二十丸白湯下杏仁龍腦膏一名㸃眼良膏出聖濟總録治眼赤有瘡及生努肉日夜難開疼痛朴硝一錢龍腦一匙一方用二錢杏仁湯浸去皮研七粒豶豬膽乾者如棗許大右先將杏仁入乳鉢中研令細次下三味同研以銅盒盛經一宿每㸃如黍米大納目眦中眼如冷淚出至十日自瘥止之其藥宻封覆勿令見風蕤仁膏出聖濟總録治肝虚風痒生瘡淚多出蕤仁去皮研一分龍腦一錢胡粉如棊子許大于火上燒變赤如金色者佳酥真者如杏核許右先將胡粉蕤仁别研再取酥同研入龍腦令如膏用油帛裹或銅盒子盛勿泄氣見風或小兒胎赤大人久患赤眼痒痛宜先取鹽花少許用絶酸漿水一升煎三五沸以綿濾取汁夜卧洗以清水次以鹽花水洗眼候令乾以爪甲挑取麻子許㸃眼眦須㬰淚出目中冷凉豬膽膏出聖惠方治眼目有瘡及努肉日夜不開疼痛豬膽一枚取汁川朴硝半両膩粉一錢龍腦一匙右細研與豬膽相和經宿每用一小豆大㸃之蕤仁膏出聖濟總録治風熱目赤生瘡蕤仁去皮研如膏半両青䀋末一錢龍腦少許右同研用兒孩子乳少許調和如膏每以麻子大日三五度㸃眼黄連散出聖濟總録治眼風赤澀隱腫疼生瘡黄連去鬚末蕤仁去皮各一分胡粉一錢右先將蕤仁去膜於銅器中用槐木杵研令極細如粉次入黄連末胡粉和更研細為度每夜卧㸃一黍米在目眥頭瘥碧霞膏出聖濟總録治大人小児赤眼腫疼生瘡黄丹二両枯白礬一両净蜜半斤右先將黄丹炒紫色入枯白礬同蜜熬紫色入水一盞再煎稀稠合宜磁噐内盛每用皂子白湯半盞化開熱盪眼冷即再温洗八九次不用㗜鼻散出聖濟總録治赤眼生瘡腫疼乳香一錢道人頭二兩為末右為末每用一錢香餅子上燒烟㗜鼻内治瘡入眼出龍木論仙靈皮威靈仙等分右為末食後米飲調下二錢小兒半錢青錢湯出聖惠方治目眥爛作瘡青錢三十文鹽半合右相和以紙裹又著鹽泥裹於猛火中燒一時取出剥去泥以湯二大盞攪攄去滓乘熱淋洗冷即重煖用之清凉包子出聖濟總録治眼熱赤生瘡及退膜翳用宣州黄連一分為末以新水一碗面東撲取倒流水些小將黄連末勻掺在碗内用熟艾一塊如雞子大安在古老錢七文上四面更用青銅錢四十文圍住安盆内覆黄連碗在上㸃火燒艾候烟盡便掃下黄連末用夾絹袋盛之取孩兒乳汁浸開時時㸃眼中覺口中苦透為度如暴赤眼用之立效治眼瞼裏生瘡或痒或痛愈而復發出聖惠方用萎蕤仁一分去赤皮研令細以好酥和勻每用麻子大每日三四度㸃時時煖鹽水洗之廣大重明湯出誠效方治兩目瞼赤腫楞生瘡目多淚隱澀難開及熱痛並稍赤及眼瞼痒栻之至破爛赤腫痛不可忍龍膽草防風甘草生細辛各錢右杵㕮咀如麻豆大内甘草不剉只作一定先以水一碗半煎草龍膽一味至一半再入後三味煎至少半碗濾去滓用清帶熱洗以重湯坐令熱日用五七次但洗畢少合眼須臾許開努肉泛常及癢赤驗治眼瞼赤皮上生濕瘡𤼵作有時出讓命方黄蘗一両用蜜浸一時右以無皮炭燒火炙令乾不要焦細杵為末每用五六錢煎湯洗數次便效目青盲論夫眼者輕膜裹水也其性静其鑒明瞻視分别物無不矚也如其氣清神爽臟乃安和稍有一臓氣傷風邪卒至日夜痛癢卒然而失明為肝膽邪毒氣所傷毒氣不散上注於目故令目靑盲也龍木論稱内障有變青盲者初患之時昏暗不痛不癢亦無翳膜至於失明與不患者相似是知青盲之狀外無異症瞳子分明而不見物由肝腎氣虚精血弱不能上榮故青而無所見也經曰肝氣通於目目和作為白黑飬生方乃以塞路井水瀆令人青盲豈其本哉方還睛散出聖濟總録治青盲障翳積熱但瞳人未損即無不治人參細辛去苖葉决明子車前子防風去蘆芎藭丹参升麻覆盆子地膚子黄連去鬚逺志去心茺蔚子桂去粗皮蒺䔧子炒厚朴去粗皮生薑汁炙剉槐實麥門冬去心焙栢子仁白芷蜀漆白茯苓去黑心木通剉黄芩去黑心麻黄去根莭湯煮凉去沫五味子附子炮製去皮臍菥蓂子禹餘糧煅醋淬枸杞子各一両右為散每服二錢食前白米飲調下日再漸加至三錢填睛丸出聖濟總録治青盲及内外障或因㓜小淚出或久視傷明或因熱病差後両目俱赤或因打損即有努肉覆睛或喫食藥熱𤼵兩目作瘡或傷烟火眇視或兩目畏日視不許青赤或兩眥爛瘡石决明一両洗浄别搗磁石飯上蒸五度研陳橘皮湯浸去白皮白陽起石飯上蒸五度研梔子花肉蓯蓉去焙皮切黑石飯上蒸五度研人参生薑切焙苦参白芷黄芩去黑心甘草炙剉白茯苓去黑皮桂去粗皮厚朴去粗皮生薑汁防風去蘆杏仁去皮尖雙仁者炒研各二両生乾地黄焙升麻各八両龍腦研一分黄連去鬚麥門冬去心焙槐子炒黄蘗去粗皮車前子乳香研各四両蕤仁青葙子各三両烏賊魚骨去甲并鹹味一両右為末煉蜜和搗三萬杵丸如梧桐子大毎服六丸空心米飲下服訖即食後更服十丸加至二十丸食後即加食前不加食後仍以牛乳煎湯二年勿食五辛熱麵陳物一年勿食羊頭肝肚驢馬兔肉毒魚澤㵼湯出聖濟總録治肝臟熱衝目赤瞻視模糊積年青盲不見物澤㵼升麻杏仁湯浸去皮尖雙仁研决明子㣲炒大黄剉炒黄芩去黑心甘草枳實去根麩炒芍藥各一両梔子仁人參赤茯苓去黑心黄蘗去粗皮細辛去苖葉白术各半両柴胡去苖四両青葙子二両桑根白皮剉炙二両右粗搗篩每服五錢水一盞半入薑半分慢火同煎至一盞去滓入芒硝半錢放温食後臨卧服日再補肝散療肝臓病眼青盲内或生障惡風赤痛乾薑丹参黄耆各六分甘蕤三分桂心茯苓附子炮黄連甘草炙當歸乾漆熬具齒燒猪苓白术各五両防風七分乾地黄八分右為散酒服方寸匕日五服忌海藻菘菜生菜猪肉冷水桃李雀肉等撥雲退翳丸治雲翳青盲眼疾川芎當歸白藥子楮實藁本羌活各一両半白蒺藜各一両蛇皮三錢甘菊花荆芥宻䝉花川椒七錢半蟬殻三両黄連三両地骨皮薄荷各半両右為末煉蜜丸每兩分作十丸食後氣障木香湯下睛暗青盲當歸湯下有翳青米泔下眼昏好酒下甘草湯下婦人血暈當歸薄荷下綿鳩丸一名羊肝丸治内外障青盲雀目眼生黑花十年翳不見光明一月有效方見本門一切眼疾雜治類蓯蓉丸一名還睛丸治眼青盲並無赤腫但不見物無翳方見本門腎肝虚眼黑睛類補肝丸一名地膚丸出聖惠方治眼青盲無所見物方見本門目昏暗類百合湯出聖濟總録治眼欲變青盲百合黄耆剉各二両麥門冬去心焙半両白茯苓去黒皮人参防風去蘆木通剉桑白皮剉各両半蒺藜子炒去角酸棗仁枳殻去根麩炒石膏各一両薏以仁一合右為散每服三錢水一盞煎至六分去滓食後溫服蒼术丸出聖濟總録治青盲眼瞳子分明亦無翳膜不痛不癢内障不見物蒼术水浸知母黄芩去黑心元参甘草人參細辛去蘆葉芎藭白茯苓木香貝母去心石决明刮洗净茺蔚子右為細剉焙過搗羅為末鍊蜜和丸如梧桐子大每服三十丸食後温水下臨卧再服空青决明膏出聖濟總録治青盲内障翳暈無間冷熱風等但瞳子不破者悉皆治之空青研細一両决明子馬蹄者妙乾薑炮各一両黄芩去黑心蕤仁各三分細辛去苖葉車前子黄蘗去粗皮黄連去鬚各半両白蜜好者二斤右為末和蜜内銅器中盖頭勿令透氣以米五升安藥器於上蒸飯熟為度乗熱以綿濾去滓盛磁瓶中以銅筯㸃眼眦若多年青盲㸃二十日見物每㸃兩日即用摩須膏防風補煎出聖濟總録治肝虚寒目青盲視物多不明漸生障翳防風去苖白鮮皮陳橘皮去白川芎甘草炙獨活去蘆頭前胡去蘆頭細辛去苖葉各一兩右粗搗篩每服五錢水一盞半大棗二枚擘開同煎至一盞去滓放溫服决明散王氏博濟方治青盲眼夫五臓六腑之精氣皆上注於目若臓空有風邪疾便乗之有熱則赤痛無熱則内生障盖臓肺氣血不榮盛於目故外狀不異而只不見物或加之有痰熱則生翳如蠅翅狀覆在睛上此方乃至人傳授大效石决明草决明青􅀢蛇蜕炙細辛去苖葉甘草炙井泉石已上各等分右用木杵臼搗羅為散次用豶猪肝一具去膽膜浄洗瀝乾用竹刀子隨肝具切作縫用藥末一兩掺入綿縛了入生絹袋内再縛定沙鍋内米泔煮更入青竹葉一握枸杞一握黑豆三合同煮肝熟為度取出候冷食後用竹刀逐片切食之用原煮汁送下患久者兩三具見效只須潔浄不可犯鐵噐服之未有不騐也真珠散出聖惠方治眼青盲真珠末三分胡黄連三分地膚子一両石决明三両搗碎細研水飛過琥珀三分天靈盖三分燒灰母猪肝半両切炙乾右為散每服二錢食後温水調下臨卧再服日二牛肝散出聖惠方治眼青盲積年不瘥黄牛肝一具細切暴乾土𤓰根三両羚羊角屑二両蕤仁一両湯浸去赤皮細辛一両車前子二両右為細散每服二錢空心温水調下明目地膚子散出聖惠方治眼青盲地膚子一両石决明一両半搗細研水飛過羚羊角屑一両半川芎車前子酸棗仁微炒各一両右為細散每服一錢以黑豆湯調下不計時候服抵聖丸出聖濟總録治一切眼昏障翳將至青盲不問新久皆可治家菊花去梗蒂取葉焙四両附子炮製去皮臍切如指面大一両蒺藜子炒去角二両肉蓯蓉浄洗酒浸一宿切片大黄剉日暴乾各一両右以無灰酒二升半同拌和入銀石噐内盛貯盖了於飲甑中蒸自早及晡取出焙乾搗羅為末如有浸藥剰酒煮黄粟米入瓶子内蠟紙封口勿令透氣於廊廡間取一穴次以水一盆傾在土中浸瓶一宿來日取出净洗瓶研入腦子南硼砂麝香一塊如皂子大攪勻㸃粟米許入眼大眥頭神仙取藥出華陀中臟經方秦皮去粗皮三錢研細乳香一塊如棗大胡黄連三錢燈心一握七寸長棗子二箇斑蝥一箇去翅頭足古老錢七文不剉右都為粗末入無油余救切器尤佳用井花水一大椀熬去半椀用綿絹濾過將滓以水一椀煎取一盞濾過同煎汁入新椀中熬似粥樣入小甆盒中或角盒中盛將空青並硼砂一塊如兩豆大飛過熬乾空青不熬再研入腦子多不妨麝香少許四味同入藥膏内攪勻每㸃一粟米許在眼眥頭將手和勻仰面候藥微澀過將沸鹽湯用軟帛片蘸洗快則已之種空青法出華陀中臟經方朴硝半錢白蒺藜一分龍腦草一分仙靈脾葉一錢旋覆花一錢右為細末用黄泥一塊拳大同藥和勻水調如軟飯相似作土餅一箇用太平錢五文按五方排定光面黑書金木水火土五字所寫字向下錢字向上隨五方按用硵砂如豆大每粒按四錢上在四字孔罅中須要乾黄土食須著土餅將新砂盆一箇盖之又將燥黄土盖冬月十日夏月五日取出於錢上摘取下細研入藥此為種空靑法不可嫩亦不可老須得中也能逺視不能近視者陽氣不足陰氣有餘也乃氣虚而血盛者陰火有餘氣虚者氣弱也此老人桑榆之象也能近視不能逺視者陽氣有餘陰氣不足也乃血虚氣盛血虚氣盛者皆火有餘元氣不足火者元氣殻氣眞氣之賊也元氣來也徐而和細細如線邪氣來也𦂳而强如巨川之水不可遏地芝丸出誠效方治眼不能逺視能近視或赤或妨近及大癘風成癩悉皆治之生地黄四両焙乾秤天門冬四両去心秤枳殻二両麩炒去穰秤甘菊花三両去枝秤右為細末煉蜜為丸如梧桐子大茶清送下一百丸温酒亦可食後琥珀金絲膏出楊氏家藏方治一切眼疾退翳除昏黄連去鬚二両草龍腦黄蘗去粗皮山梔子一處搗碎以上三味各一両乳香一分别研硼砂一分别研白沙蜜半斤青竹葉二百葉大者剪碎右前七味用水三升同浸一伏時於銀石噐内漫火熬至一升退火放冷用絹袋作五七次絞取藥汁滓脚不用於不透風處放一伏時澄下脚滓又復去之四日再傾取清藥汁更於銀器内再以漫火熬去一半次入白沙蜜同攪不得住手候有蜜香用枚子挑出藥試之放冷再挑起有絲為度内於絹袋子又濾去滓以磁盒盛之方入研細生腦子一升用膏子攪令勻每用少許以銅筯㸃之熊膽膏出楊氏家藏方退翳膜赤障除昏澁隱痛及風毒上攻努肉侵睛或暴赤腫痛羯羊膽一枚大者白沙蜜半両杏仁七枚去皮尖研黄連去頭鬚三寸搥碎南硼砂半錢别研乳香少許别研輕粉少許馬牙硝半錢别研右先將膽汁并蜜傾入磁盞内次用黄連杏仁浸一宿綿濾過次下餘藥用紙兩三重𦂳封口掘地坑五寸入藥盞坐定盖之三七日取出㸃之頑荆散出楊氏家藏方治一切眼疾頑荆藥全蝎去毒炒躑躅花川芎四味各一両香白芷細辛去葉土鵞不食草上三味各半錢雄黄别研没藥别研乳香别研三味各半錢欝金二字以上九味同為細末盆硝四錢别研腦子别研薄荷四錢右杵細末入研者藥令勻每用少許合水搐鼻中青玉散出楊氏家藏方治退翳除昏消瘀止淚及療隱澁龍骨一錢白堊土一錢銅靑半錢輕粉一匙腦子一匙右並研令細每用一字白湯泡洗神明椒菊丸出家藏方治目睛失明而睛不損者或十分不見半月取效見三二分服藥一百日收全功如冷淚及瞼𦂳瞼腫肝虚肝熱邪風攻注眼目及患昏花服之立愈川椒一兩甘菊二両生地黄洗一升右生地黄控斷水脉入木臼内爛搗或沙盆内爛研以絹袋瀝取自然汁可得十二兩以上去滓不用將川椒甘菊入地黄汁内浸少時漉出候水脉斷入漫火焙之約八九分乾再入地黄汁再漉再焙如此以汁盡為度一法焙令透乾木臼内搗為細末煉蜜丸如梧桐子大以温水下三十丸椒靈丹出家藏方治一切眼此方治人眼見一物為二之症神效不可言青鹽二両川芎防風附子炮各一両菊花半両椒子四両去蒂並子及有閉者右杵藥先將青鹽椒用好醋一碗煮盡為度後將四味藥搗羅為細末將椒裹藥為丸每服三十丸空心鹽湯下如有此症宜與丹藥門飛靈丹相間服屢經大效洗眼方出讓命方五倍子去塵土蔓荆子去蔓各一分秦皮半両右為細末每服三錢以十分水一碗於器内煎取八分淋洗便得通明快利兼治風癢㸃眼方廣南四時攝生論腦子百文砂糖一錢黄連末半錢銅青飛過水浸半錢蘆甘石末一字右入糖一處研勻罐兒盛了㸃時少許㸃眼頭用水一盞銅筯洗之搐鼻方出廣南四時攝生論川芎甘草細辛桔梗蠋硝七箇龍腦薄荷右各二錢重為末再入乳鉢内研細入雄黄一錢重研勻方可用搐鼻藥明眼又去頭風還睛菩薩水出家蔵方眞龍膽一錢槐角洗切碎一錢雪水少許生眞珠二十七粒别研為細末白沙蜜少許竹上露水少許須用天雨時以磁器内收右以新磁盒盛甑上蒸兩次研令極爛以新綿重濾過入别磁盒内再以雪水隔盒子蒸一夜又將腦子少許乳鉢内先研為細末却入前蒸雪水藥再研勻每日早時用新筆抄如米粒大以新汲水蘸濕㸃入眼中寛閉眼候藥行淚出方醒連使兩次右史曾南仲用之眞有竒效撥雲退翳丸出徳生堂方治一切眼疾内障青盲瘀肉攀睛視物不明川芎當歸各一両半楮膏子薄荷各半両黄連蟬殻各五錢𤓰蔞根六錢蔓荆子六錢甘菊花宻䝉花各一両荆芥穗蛇退皮甘草湯炙各三錢地骨皮一両白蒺藜一両半炒川椒一両半去目右為細末煉蜜丸如梧桐子大每一兩作十丸每服一丸食後臨卧茶清下當歸連翹湯出衞生家寶治眼白睛紅隱澀難開當歸三分黄連五分甘草三分連翹四分南黄栢五分右都作一服水二盞煎一盞去滓熱洗之目痛累年或三四十年方出本草以生螺一枚以水洗之竹筯抉螺口開以黄連一枝納螺口中令其螺飲黄連汁以此綿注取汁著眥中除風明目去骨熱消渴益陽事出本草以枸杞葉和羊肉作羮患人若渴煮作飲代茶飲之白色無刺者良與乳酪相惡治眼花出本草北夢𤨏言云有少年眼中常見一鏡子趙卿診之曰來晨以魚膾奉候及期延於閣内從容久飢候客退方得攀接俄而臺上止施一瓶芥醋更無他味少年飢甚聞芥醋香輕啜之逡廵再啜遂覺胸中豁然眼花不見卿云君喫魚膾太多芥醋不快故權誑而愈其疾也除目障闇出本草用越砥石磨極細汁滴目中明目出本草以菊花作枕枕之明目除熱淚頭腦心胸間熱風煩悶風眩欲倒心頭吐涎如醉瀁瀁如坐車上者出本草以槐實合房折取曝乾煮服味一如茶明目出本草以風延母煮服之明目鎭心安神定志出本草以生銀水磨服之明目消翳出本草以線鹽㸃眼常服明目洞視出本草以胡麻一石蒸之三十遍為末酒服每日一升明目去翳出本草以琥珀摩之明目出本草取栢葉上露飲之鍼眼論夫鍼眼者以邪熱搏於血脉上攻眼目發於瞼眦結焮腫痛赤眼白頭包裹濃汁痛如鍼刺治法當詳其外症隨宜鍼刺决邪毒後以消腫敗熱之劑斷其根本方大黄散出聖惠方治風熱毒血脉上攻瞼生如米豆名曰鍼眼目睛似水泡疼痛不可睡卧川大黄剉碎㣲炒黄連去鬚藍葉川朴硝各一兩川升麻决明子㣲炒黄芩梔子仁各三兩甘草半兩炙㣲赤剉右為散每服三錢以水一盞煎至六分去滓每於食後及夜臨卧温服忌炙煿油麫生菜𤣥參散出聖惠方治鍼眼赤腫心燥風熱壅滯眼開即澁痛𤣥參防風去蘆頭馬牙硝子苓各一兩甘菊花羚羊角屑蔓荆子赤芍藥各三兩甘草半兩炙㣲赤剉右為散每服三錢以水一盞煎至六分去滓每於食後温服臨卧再服之牛黄散治鍼眼瞼内生皰如大豆隱睛腫痛牛黄細研黄連去鬚𤣥參犀角屑川升麻决明子鬱金梔子仁各一両柴胡三両去苖右為細散入牛黄研勻每服於食後竹葉湯調下一錢臨卧再服之羚羊角散治肝膈虚熱生鍼眼腫赤羚羊角屑枳實麩炒微黄蕤仁各三分茯神防風去蘆頭地骨皮各一両麥門冬各一両半去心焙右為散每服三錢以水一盞煎至六分去滓入生地黄汁半合更煎至一沸每於食後温服之麥門冬湯治目内皆成泡三五日間生濃汁者麥門冬去心焙旋復花木通剉大靑各一両半茯神去木黄連去鬚各一両右粗搗篩每服五錢水一盞半煎至七分去滓入生地黄汁半合芒硝末半錢更煎三二沸食後臨卧温服前胡湯治熱氣盛目内皆腫起方見本門目赤腫痛類石膽散治鍼眼暴腫痛不得開㸃之眼上石膽研如粉一分黄連去鬚搗黄蘗去粗皮搗各三分羚人去皮研銅青研芒硝各半兩右為末更入乳鉢中重研令極細勻每取如黍米大㸃目眦頭協毒膏治針眼磣澁腫痛川大黄三両木香一両𤣥参白斂射干川芒硝各二両右為散以雞子白調如膏貼於眼瞼上乾即易之半夏湯治熱客目眦結成腫泡俗呌偷鍼兼治眼赤腫痛半夏湯洗七遍洗滑細辛去苖葉各一両前胡去蘆頭枳殻去穰麩炒各二両烏梅肉半両右粗搗篩每服五錢水一盞半入生薑一棗大拍碎同煎至六分去滓食後臨卧温服大黄湯治眼暴熱痛眦頭腫起大黄剉炒枳殻去穰麩炒芍藥各三両山梔子仁黄芩去黑心各二両右粗搗篩每服五錢水一盞半煎至七分去滓食後臨卧服石膽散治眼忽結腫石膽煆令白去火毒滑石研各一両秦皮半両為末膩粉二錢右同研勻用一字湯浸候温閉目洗兩眦頭以冷為度熁眼方治針眼暴赤成瘡疼痛羞明𤣥參黄芩黄連去鬚各一両右為細散以猪膽汁和令稠剪帛可眼大小勻攤藥貼瞼上乾即易之治鍼眼疼痛黄連去鬚杏仁湯浸去皮尖黄蘗各半兩右搗令碎以綿裹内生地黄汁中浸頻㸃眼中治偷鍼眼用燈心二寸蘸香油㸃之偷鍼眼方治脾間積熱兼宿食不消用秦皮剉細夾沙糖水調大黄末少許利之芍藥湯一名𤣥參湯治熱毒攻眼眦腫起有濃汁者宜服此藥方見本門目風赤類普濟方巻八十三
