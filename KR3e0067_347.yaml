body:
  text: 普濟方卷三百四十七明周王朱橚撰産後諸疾門吹乳附論夫産後吹妳者因兒喫乳之次兒忽自睡呼氣不通乳不時泄蓄積在內遂成腫硬壅閉乳道津液不通腐結疼痛亦有不癢不痛腫硬如石名曰吹妳若不急治腫甚成癰産後吹妳最冝急治不爾結癰漸至死者速與服皂角散栝蔞散傅以天南星散以手揉之則散矣大全良方總論云産後乳汁自出蓋是身虛所至冝服補藥以止之若乳後脹滿急痛者溫帛尉之産經有是論却無方以治之若有此證但以漏蘆散亦可亦有未産前乳汁自出者謂之乳泣生子多不育經書未曾論及方漏蘆湯出瘡科精要治婦人吹妳初覺漏蘆楝實大黃黃芩芍藥甘草各半兩右為末每服三錢水一盞半燈草三十莖同煎至一盞去滓溫服無時治吹妳出瘡科精要及一切惡瘡初覺一二日立效瓜蔞一箇去皮生薑一兩去皮大黃半兩甘草半兩右共搗作一塊以米半碗同煎至七分去滓入沒藥乳香末共二錢半通一服鯪鯉甲散一名通利散治吹乳癰疼痛不可忍者出聖惠方鯪鯉甲一兩炙黃又名穿山甲木通一兩自然銅半錢生用右搗羅為散溫酒下一錢不拘時服治婦人吹妳出聖惠方馬明退五錢燒灰輕粉三錢麝香少許右為細末每服二錢熱酒調下服之栝蔞散出永類鈐方治産後吹妳腫硬疼痛欲結癰輕則為吹妳妬乳重則為乳癰乳香一錢半栝蔞根末一兩右研令勻溫酒調二錢服一方天南星末溫湯調塗之治婦人吹奶痛不可忍出瑞竹堂鼠糞五十粒麝香一字右為細末食後用熱酒一盞調服立愈一方雄鼠糞兩頭尖者昔劉汝翼治一屠户妻立效但不令病人知恐不肯服二消散治吹奶烏鰂骨朴硝各等分右為細末用葦筒兒盛藥吹入鼻中仍令人用藥末傅腫痛處徐徐消去立效治吹奶腫痛出海上名方右用胡桃二箇大者取皮細嚼以熱酒二盞送下二服立效一方連皮燒存性為末調下治乳癰吹奶結實疼痛出危氏方右陳皮一兩甘草一錢水二碗煎一碗分二次服次用荆芥羌活獨活煎湯薰之溫則洗之即安連翹消毒飲出經驗良方右用連翹三錢牛旁子防風荆芥穗各一錢甘草一錢並為粗末每服四錢水一盞半煎七分去滓食後服甜蔞實內子每一箇取四分之研碎入藥又方出經驗良方右以生甜蔞去殼取子同生薑一小塊研勻炒酒隨意服治吹奶出永類鈐方右用皂角刺燒灰蚌蛤粉乳香少許並為細末熱酒調服手揉散即可一方無乳香吹乳奶方右小車耳上油脂垢丸雞頭大每服加一丸一日三服一日加一丸七日自消八日濃自出有大效治吹奶右用甜菜根酒一碗水一碗蔥三根同煎至八分服之立效勝金丹出衛生寶鑑治婦人吹奶立有效百齒霜今梳上髮之垢也右一味不拘多少用無根水為丸桐子大每服三丸倒流水送下食後令病左乳者左卧右乳者右卧於溫處汗出愈用新水傾於屋上接之乃倒流水也葡萄酒治吹乳右單用葡萄一枚於燈熖上燎過研細熱酒調服治婦人患吹乳導經散右用皂角十挺銼細火內燒過煙盡黑色為末次入乳香沒藥令勻每服二錢溫酒調下白丁香散治婦人吹乳初覺身熱及胸乳腫硬是其候也服之能令下乳汁通其血脈立能自消矣右用白丁香直者研細每服二錢酒調服腫硬者服之立消甚者不過三服治吹奶不癢不痛腫硬如茄右以青橘皮三兩湯浸去瓤焙為末非時溫酒下二錢匕治吹妳右以水調麵煮如糊欲服即投無灰酒一盞共攪之極熱令如稀米粥可飲即熱喫令人徐徐按之藥行即散也治吹妳惡寒壯熱右以牝豬肋脂冷水浸拓妳上立效治小兒吹妳疼痛腫欲作急疼方右取蛇蛻皮一尺寸尺燒令黑細研以好酒一盞微暖頓服未甚較煎服消毒飲右用連翹三錢黃瓜蔞仁三十粒捶碎每服四錢水一盞半煎食後溫服之治吹妳有時發動脅痛如打右以六月七月取地膚子乾末酒服方寸七日五六服治婦人吹妳右以淘米木杓中砂子七粒酒下以洗帚枝透乳孔連翹散治吹妳因兒鼻中氣吹著妳房便遍體熱結聚或如桃李核疼痛者冝服此消之即免作膿連翹一兩半犀角屑一兩川大黃一兩半銼碎微炒川升麻一兩木通一兩銼黃耆一兩銼黃芩一兩川芒硝二兩赤芍藥一兩右為散每服三錢以水一中盞入淡竹葉二七片煎至六分去滓不計時候溫服治吹妳右用常使木杓柄上尖燒灰存性傅之吹妳乳香散治婦人吹妳增寒發熱堅硬腫痛未成膿者服之即消白丁香揀直者半兩乳香三錢右件二味同研極細分作三服好酒調下食後併進三服立消穿山甲丸治吹妳腫硬疼痛日夜不歇穿山甲燒灰豬牙皂角燒灰王不留行皂莢針炙微黃自然銅研細蟬殼蛤粉胡桃瓤燒灰各半兩右為末以車脂和丸梧桐子大不計時候以熱酒下二十丸治吹妳方槐花三分蛤粉三合麝香一分細研右為細散不計時候以熱酒調下一錢露蜂房散治吹妳疼痛不止或時寒熱露蜂房一兩鹿角一兩右並燒為灰細研不計時候以熱酒調下二錢又方用葛布五尺燒灰細研為散不計時候以熱酒調下二錢每日三服又方烏蛇二兩酒浸去皮骨炙微黃穿山甲一兩炙黃焦右為細散不計時候以熱酒調下一錢又方蔓荆子一合炒黃搗末車脂一兩右以麵糊和丸如菉豆大不計時候以溫酒調下十丸又方桑螵蛸三枚燒令斷煙皂莢一寸去黑皮塗酥炙微黃去子右藥搗為末用酒一中盞煎至六分去滓溫服又方出聖惠方狗糞中骨燒灰半兩麝香一錢右同研令細不計時候以熱酒調下一錢蛤粉丸出聖惠方治吹妳不癢不痛硬腫如石右用蛤粉半兩車脂和丸如小豆大每服溫酒送下二十丸不過三服差又方出聖惠方右用龍骨一兩細研為散每服以熱蔥酒調下一錢日三四服又方出聖惠方右以無子皂莢刺一斤點火燒候著撒蔓荆子四兩在內待總為灰即細研每服以熱酒調下二錢服了便按三二十下不過再服效又方出聖惠方右以胡桃燒令煙盡去皮每一顆胡桃瓤用金一片同研以熱酒服服了以手漸按乳上令消如有頭即外破如無頭即內消日三五度服之以得效為度又方出聖惠方右用半夏一兩湯洗七遍去滑搗羅為散以生薑汁一匙和酒一小盞調下一錢又方出聖惠方右以青蒿末二錢醋漿水一大盞煎五六分放溫頓服相次服熱酒一盞即差又方出聖惠方雀糞一十枚丁香三枚末右同研如粉以熱酒調服之治産後乳汁多無故流出待其乳汁冷然後喫此方出護命方當歸五味子續斷白术萆薢各半兩細辛官桂人參杜仲防風炙艾葉蓯蓉川芎各一分川椒三銖右為細末煉蜜丸如桐子大空心鹽湯鹽酒任下三十丸喫至半月後自然安效平復如故也亦可喫金液丹治産後乳汁多其乳汁無故自流出喉中乾非時渴不輟思飲湯冝服此方病皆由虛冷所致但色黃瘦喫食減少忽未經數月後行脈氣微弱即喫此方但世多以喉乾誤下涼藥蓋浮汁無故流出則其喉乾并渴從可知也出護命方舶上黃細研當歸各一兩石斛艾葉五味子白芷牡蠣火煆川芎山茰各半兩防風藁本茯苓豆蔻吳茱茰各一分右為細末煉蜜丸如梧桐子大早朝空心鹽湯送下五十丸消毒紅玉膏出德生堂治吹乳腫疼寒水石煆二兩黃丹炒半兩右為細末新涼水調塗兩乳腫處日換二三次即可消腫治吹妳出華他中藏經水茸角不拘多少瓦上焙乾右為細末酒調服二錢匕次日即愈如已破者略有黃水亦效水茸角狀如腰帶作小窠子生三四月間開小黃花葉如夜合葉六七月採兩浙呼為合萌皂角膏出楊氏家藏方治吹妳腫痛皂角不拘多少右用河水揉濃汁去滓熬成膏塗即愈樺皮散海岱居士祕方治吹妳樺皮手指大一方皂角子七個右二味燒成灰好酒空心調服治吹妳出危氏方右用鱉甲生為末酒下二錢治吹妳出本草右用户垠下土和雄雀糞暖酒服方寸匕治吹妳右取不患病人妳中汁一茶匙多令飲訖卧患一邊良久即安又方右用生薑自然汁調蚌粉塗之留妳頭不塗産後乳結核夫産後乳結核者以氣血虛弱邪摶之乳脈凝滯故結為核日久不差藴積生熱甚則腫甚則成癰也方枳殼湯治産後乳結核或成癰腫發熱疼痛枳殼去瓤麩炒芍藥人參黃耆銼木通銼當歸切焙桂去粗皮蒺藜子炒去角雞骨醋炙大黃銼炒各一兩右粗搗篩每服二錢水一盞煎七分去滓溫服不拘時當歸散治産後乳結核堅硬疼痛當歸切焙芍藥黃耆銼蒺藜炒去角雞骨炙附子炮製去皮臍枳實去瓤麩炒各二兩桂去粗皮薏苡仁人參各一兩右為散每服三錢酒調服日三莽草散治産後乳結核或堅硬疼痛莽草葉一兩紫葛大黃各半兩赤小豆二兩右為末醋和如糊傅結核上頻易之每易則先以熱蔥湯洗之傅膏方治産後乳腫熱痛黃連去鬚三分大黃生鼠糞炒各半兩右為末用米醋調傅四邊頻易之每易先用熱蔥湯洗麥門冬湯治産後乳結核及初結作癰服此麥門冬去心焙黃芩去黑心黃耆銼芍藥甘草赤茯苓去黑心木通銼各三兩桑寄生防風去乂人參各三兩右㕮咀如麻豆大每服五錢水一盞半入棗二枚擘煎取一盞去滓入糖一棗大令消溫服不拘時乳漸銷減即服後門冬丸方天門冬方治産後乳結核天門冬去心焙二兩半木通銼黃耆銼防風去乂桑寄生銼生乾地黃焙人參各一兩羌活去蘆一兩半大黃一兩白芷升麻各三分澤蘭去枝梗茯神去木天雄炮去皮臍黃芩去黑心枳實去瓤麩炒五味子各半兩右為末煉蜜丸如梧桐子每服二十丸加至三十丸溫酒下日三外消膏治産後乳結核疼痛或腫欲成癰伏龍肝半兩大黃銼半兩生薑一兩洗切焙研細右除生薑外為末和勻用醋調作膏隨小大攤貼病上早晚易之效托裏散治産後乳結核欲壞不壞威靈仙洗焙當歸切焙牡丹皮芍藥銼黃耆銼桂去粗皮各一兩大黃炮半兩右為散每服三錢溫酒調下不拘時候升麻湯治産後乳腫或結核敗壞熱悶升麻白斂各一兩大黃生半兩黃芩去黑心桂去粗皮各一兩芒硝研半兩人參黃耆銼各二分右為粗末每服三錢水一盞煎七分去滓溫服不拘時大黃湯治産後乳結核腫痛發熱煩悶大黃銼微炒楝實劈破炒去子芍藥馬蹄炙黃焦各一兩右搗篩每服二錢水一盞煎七分去滓溫服不拘時蔓荆實散治産後乳腫痛煩悶熱蔓荆實炒二兩甘草炙五錢右為散每服二錢溫酒調下不拘時候服黃芩湯治産後初覺有核漸發熱痛纍日不退欲成癰黃芩小者甘草炙銼桑寄生銼防風去義木通銼黃耆銼麥門冬去心焙大黃各一兩赤芍藥一兩右搗篩每服五錢水一盞半煎至一盞去滓溫服不拘時當歸散治乳結核堅硬當歸切焙桂去粗皮各半兩芍藥人參各三分蒺藜子炒去角雞骨炙各一兩木通銼黃耆銼各一兩枳實去穰麩炒三分右為散每服二錢空腹酒調下日再治婦人乳生結核堅硬或腫疼痛冝用消毒止疼痛藥水膏方黃蘖一兩糯米二合赤小豆一合露蜂房半兩鹽一兩右為散搗生地黃取汁調令稀稠得所量痛腫處大小剪絹一方厚塗貼之乾則換之髮灰散出聖惠方治乳中結塞腫痛亂髮灰蛇蛻皮灰各半兩蔓荆實微炒一兩右為散每服二錢溫酒調下日三無名異散治乳結顆塊膿水宿滯血脈壅閉惡血疼痛久不瘥者無名異牡丹皮虎杖根當歸切焙白芷白茯苓去黑皮各三分沒藥研麒麟竭研木香黃芩去心黃耆人參桂去粗皮熟乾地黃焙各半兩右為散每服三錢空腹煎棗湯調下日三服又方治妳結鞕疼痛用百藥煎為細末每服三錢酒一盞煎數沸熱服冉以滓傳腫痛處又方用鱓魚皮燒灰存性為末空心酒調服療乳瘰止痛方大黃黃連各三兩右用水五升煮取二分三服下即愈內消散治婦人乳癰毒始生核川大黃黃芩黃連去鬚黃藥子地龍炒令黃乳香各一兩右為細散用生地黃汁調勻塗于腫毒上若乾即易之不過三五度瘥當歸散治婦人乳生結核疼痛散毒氣止疼痛當歸三分銼微炒甘草一兩銼川芒硝一兩黃連三分去鬚黃藥子三分川大黃一兩蒲公草三分玄參三分右為細散用雞子白調為膏於生絹上塗貼取效為度治婦人乳生結核及腫疼藍草根生蒻頭各二兩右搗如泥貼之立效療産後乳初結脹不消令敗乳自退方瓜蔞一箇半生半炒大粉草一寸半生半炒生薑一塊半生半煨右同銼用酒一碗煮取一盞去滓服之其痛一會如不可忍即搜去敗乳安臥每一服順所患處乳側臥於床上令其藥行故也産後乳結癰附論産後衝任不足氣血俱虛潛行入于足陽明之脈其直行者從缺盆下乳內兼下夾臍入氣衝中衝脈者起于氣衝並足陽之經夾臍上行至胸中而散也其經為邪熱衝則血為之擊摶氣為之留滯擊摶則痛作留滯則腫生內經所謂營氣不從逆于肉理乃生癰腫此疾者以乳汁藴積與氣相摶故也方當歸飲治産後乳癰欲結發熱腫痛當歸切焙芍藥牡丹皮生乾地黃焙人參黃耆銼大黃生升麻連翹各一兩右粗搗篩每服五錢水一盞去滓溫服不拘時黃耆湯治産後乳結核或腫痛漸成癰煩熱黃耆銼生乾地黃焙麥門冬去心焙升麻各一兩半人參赤茯苓去黑皮各一兩當歸切焙芍藥逺志去心甘草生各半兩右粗搗篩每服五錢水一盞半去滓溫服不拘時候蛇蛻皮散治乳癰疼痛寒熱發歇晝夜不可忍蛇蛻皮燒灰半兩麝香二錢右研細每服二錢熱酒調下不拘時芍藥湯治産後乳結癰濃敗壞不散發熱疼痛芍藥桂去粗皮黃耆銼赤茯苓去黑皮當歸切焙生乾地黃焙各一兩甘草銼麥門冬去心焙人參各一兩右㕮咀如麻豆大每服五錢水一盞半再入生薑一棗大煎至八分去滓下朴硝末一錢再煎令沸溫服不拘時甘草飲治産後乳癰熱痛未結膿者甘草半兩半生半炙栝蔞一枚去皮用穰右先以酒三盞煎甘草至二盞入栝蔞穰煎至一盞去滓溫服半盞如痛即以酒少許解之未效再作栝蔞散治産後乳癰膿潰未潰熱痛不已栝蔞實二兩敗醬細辛去苗葉乾薑炮厚朴去粗皮薑汁炙桔梗炒防風去乂人參各半兩右為散每服三錢溫酒下水一盞煎至八分溫服亦得不拘時黃耆膏治産後乳癰欲結未結膿攻痛黃耆銼芎藭當歸切炒黃芩去黑心黃連去鬚白斂芍藥防風去乂各一兩右為末用雞子白調隨大小貼之每日一易豬蹄湯洗方治産後乳癰破後膿血不盡豬蹄一具當歸切炒芍藥黃芩去黑心獨活去蘆頭莽草大黃銼碎炒芎藭各半兩右搗羅七味為末將豬蹄銼洗令淨以水五升煮熟去滓澄清內藥再煎令熱通水手洗乳上令透拭乾良久又暖洗不拘次數漏蘆膏治乳汁不時泄蘊積于內遂成癰漏蘆黃芩去黑心各一兩米粉半兩右為末新水調如膏塗之麥門冬治乳腫初覺有異生麥門冬去心黃耆銼防風去又各一兩半桑寄生一兩半甘草炙三分木通二兩半黃芩去黑心赤芍藥各一兩右㕮咀如麻豆大每服五錢水一盞半入棗二枚煎至八分去滓內乳糖一分再煎一兩沸去滓溫服芍藥散療乳癰腫消核芍藥通草桂心昆布白斂附子炮黃耆人參海藻木占斯各一兩右搗散以清酒服一錢日三當先食并療頤下氣結瘰癧柏皮膏乳癰衆醫不能療用豬膏年多者佳柏皮三斤去黑皮以豬膏煎之當消煎柏皮熟黑便漉出更煎餘柏皮如初膏盡以塗瘡處甚驗三物桂心貼治乳癰桂心烏頭甘草各二分右搗散以苦酒和塗腫上以濕紙覆濡其上將乳居其中以乾布置乳下須臾布當濡有膿水也又方研米捶二枚煮令熱以絮布巾覆乳上用二槌更互尉腫數十過差止已用大驗治乳癰堅硬痛不可忍右茛菪子半大匙當年新者服時不得嚼破以清水一大盞和頓服痛即止治婦人乳癰覺痛色未變時以飼豬米研汁飲之即瘥仍取豬槽木厚如匙面火炙數尉治婦人乳癰疼痛冝薰方十便良方露蜂房半斤細銼右件藥以醋五升煮令熱相和傾於瓶中熱薰乳上日三五度即差冷即再煎之效又方十便良方大黃一分竈上黃土一分生薑二分右三味搗羅為末醋和塗乳痛即止極驗劉消子不用生薑用生魚三味等分魚必用鯽魚妙三能散十便良方治妳癰綿黃耆皂角刺燒存性各一兩右搗羅為散以酒調二錢服能穿能散香蛤散楊氏家藏方治婦人妳癰才覺作痛氣欲結者便服此藥令內消車螫殼火煆一兩乳香半兩炙銼膩粉五分右件為細末每服一錢用乳香溫酒送下食後日進三服聖棗散楊氏家藏方治乳癰用棗四十九枚燒灰留性不拘癰大小盡用棗灰及糞堆上土研細三四錢和勻以新汲水調傅治奶癰結聚成塊疼痛難忍護命方好肥皂角二條香蔥十枚右先捶皂角碎水一碗揉取汁煉成膏却碎揉蔥入內更煎三兩沸紙攤貼痛處露奶頭令清水出只初痛一兩日可使已成膿者便不可使通和湯衛生寶鑑治婦人乳癰疼痛不可忍者亦治吹奶疼痛不可忍穿山甲一兩炮黃木通銼一兩自然銅半兩醋淬七次右為細末每服二錢熱酒調下食逺服之又方衛生寶鑑治奶癰瘡凡未成瘡才覺腫硬作痛以蔥早尉之其法用中樣小瓷瓶瓶口寬者以炭火入瓶內上以熱灰填滿瓶口將蔥葉蔥白捶損令遍覆瓶口以手帕子褁定熱將瓶口向腫處任意輕輕尉之有驗治産後忽然乳痛堅硬成塊欲成癰腫先喫此方但臟腑熱覺得乳痛即喫此方麻黃去根連翹子各半兩知母射干當歸大黃蔓荆子芍藥荆芥穗牡丹皮去心各一分半夏三錢木通四銖右為細末每服三錢水一盞生薑三片同煎取九分食後臨卧去滓喫再煎連喫以大腑通為度治吹奶癰腫痛疼熱發渴晝夜呻吟蛇蛻皮一兩燒灰赤小豆一兩右件藥搗羅為散以雞子白和調傅之治乳癰結硬欲作癰十便良方用真樺皮溫尉腫處一夕即消又方永類鈐方用萱草根又名射干研爛生酒濾過以滓貼瘡久患此腐爛見骨膜垂死者用萱草根其葉柔其根如麥門冬并萹蓄根如殭蠶葉硬如劒者傅之神效治産後不自乳兒畜積乳汁結作癰肘後方取蒲公草搗傅腫上日四度易之俗呼為蒲公英語訛為蒲公明者是也火煮汁服亦得治産後患乳癰腫痛因産後不見乳汁結作癰用蒲黃炒熱杵傅腫上日三度易之又以井華水煎葉汁飲之亦佳食之亦得妬乳及癰並瘥又方千金方用皂角十條以酒一升揉取汁硝石半兩煎成膏傅之連翹湯拔萃方治産後妬乳並癰連翹升麻芒硝各十分玄參芍藥白斂防己射干各二分大黃十二分甘草六分杏仁八十枚去皮尖右以水九升煎取三升次下大黃硝分三服復元通氣散永類鈐方治乳癰瓜蔞青皮烏藥白芷各等分初發服甚效病已半勿多服穿山甲等藥惟専發散也懸癰通用治乳癰本草取人齒燒灰細研酥調貼癰上治乳癰本草以烏雌雞膽汁傅之日三療乳癰痛寒熱者本草取蔓青根并葉淨擇去土不用水洗以鹽搗傅乳上如熱即換不過三五易之即瘥冬月無葉但單用根亦可切須避風産後悶煩附論夫産後煩悶者由産後臟腑勞傷血氣虛損而風邪乘之摶于血使氣不宣而否澀則生於熱或肢節煩疼口乾因虛生熱則多煩悶此乃表裏俱虛血氣未復而氣逆乘之故悶煩也新産之後血氣俱虛或因亡血過多或因惡血下少致血氣不利陰陽相勝陽勝則發煩悶經所謂陽勝則熱是也方淡竹葉湯治産後血不利心煩喘悶淡竹葉麥門冬去心焙小麥白茯苓去黑皮各一兩右為散粗搗篩每服二錢水一盞生薑三片煎至七分候去滓溫服空心日午臨臥各一蒲黃散治産後血氣痛煩悶渴燥蒲黃一兩乾薑炮半兩薑黃切當歸切桂去粗皮右為散每服一錢煎人參湯調下空心日午臨臥服麥門冬湯治産後煩悶或血氣不快麥門冬去心焙二兩甘草炙銼白茯苓去黑皮人參各一兩右粗搗篩每服三錢水一盞生薑三片棗一枚煎至七分候入竹瀝半合再煎數沸去滓溫服黑金散治産後血氣煩悶腹痛脹滿赤龍鱗燒灰研亂髮燒灰研當歸切焙人參二分麝香别研一錢白茯苓去黑皮二分碙砂去沙石研一分犀角鎊枳殼去瓤麩炒大黃銼炒各一分右除髮灰并麝香外搗羅為細散合研勻每服一錢溫熱水調下空心日午臨卧服羚羊角散治産後血氣煩悶腹痛羚羊角燒灰延胡索黃耆銼枳殼燒灰芍藥白茯苓去黑皮劉寄奴各半兩右為散每服二錢煎人參湯調下空心日午臨卧服地黃飲出聖惠方治産後血氣不利心胸煩悶脅肋滿口乾壯熱不思飲食生地黃汁一盞當歸切焙搗末二兩酒生薑汁各半兩童子便一盞人參搗末一兩右四汁相合每服用汁半盞水半盞入人參當歸末各半錢同煎至七分空心日午臨卧溫服一方無人參名曰地黃飲子不拘時候服紫葛飲出聖惠方治産後心中煩悶不解紫葛銼麥門冬去心焙人參羚羊角鎊小麥甘草炙銼各半兩右粗搗篩每服三錢水一盞入生薑三片棗一大枚擘煎至七分去滓溫服不拘時候竹茹散治産後悶煩氣短竹茹人參白茯苓去黑皮黃耆銼當歸切焙生地黃焙各半兩右為散每服二錢溫酒調下不拘時候人參散治産後虛煩氣短心下不利人參烏藥各一兩檳榔銼半兩黃耆銼三分木香一分熟乾地黃焙一兩麥門冬去心炒甘草炙銼各三分右為末每服二錢沸湯調下不拘時候人參丸治産後虛煩氣血滯攻腰腹疼痛煩悶少力人參一兩延胡索桂去粗皮芎藭木香當歸切焙白茯苓去黑皮厚朴去粗皮生薑汁炙蒲黃白芷各一兩熟乾地黃焙二兩右為末煉蜜和丸如梧桐子大每服三十丸酒下每日三服白茯苓湯治産後氣血虛心膈煩滿身腫體熱惡露不行白茯苓去黑心赤芍藥芎藭各一兩半桂去粗皮大腹皮銼枳殼去穰麩炒熟乾地黃焙各一兩右粗搗篩每服三錢以水一盞生薑三片煎至七分即去滓溫服日三當歸湯治産後虛煩腹痛當歸切焙芍藥木通銼各一兩右粗搗篩每服二錢水一盞半入生地黃二寸許切碎同煎煎至八分去滓溫服不拘時候真氣湯治初産後血氣煩悶童子小便三合生地黃汁一合右相和微煎三四沸分溫二服逍遙湯出危氏方治産後無陰血虛心煩自汗精神昏冒心忪頰赤并口燥咽乾發熱頭痛或寒熱如瘧白茯苓去黑皮白术當歸切焙芍藥柴胡去苗各一兩右粗搗篩每服二錢水一大盞入乾生薑一塊切破薄荷五葉同煎七分去滓熱服不拘時候人參當歸湯出千金方治産後隂虛生內熱煩悶不安人參當歸麥門冬乾地黃桂心各一兩大棗二十枚粳米芍藥四兩淡竹葉三升右㕮咀以水一斗二升先煮竹葉及米取八升去滓內藥再煎煮取三升去滓分三服若煩悶不安者當取豉一升以水三升盡服之甚良地黃用生乾者虛甚則用熟者赤小豆散出千金方治産後煩悶不能食虛滿用赤小豆三七枚燒作末以冷水和頓服之治血氣煩悶脅肋脹滿及痛一名荷葉散芍藥八分蒲黃延胡索各四分當歸六分荷葉蒂三箇炙右以水二升煎取七合後入蒲黃空心分三服治血氣煩悶方出大全良方右以竹瀝飲一盞甚效或生藕汁飲二升亦效知母湯出千金方治産後乍寒乍熱通身不快心胸煩悶知母三兩芍藥黃芩炙二兩桂心甘草炙一兩右㕮咀以水五升煮取二升半分三服一方不用桂心加生地黃竹葉湯出千金方治産後心中煩悶不解生淡竹葉一升麥門冬一升甘草二兩生薑茯苓各三兩大棗十四枚小麥三合右㕮咀以水一斗先煮竹葉小麥取八升內諸藥煮取三升去滓分三服若心中虛悸者加人參二兩其人食少無穀氣者加粳米五合氣逆者加半夏二兩大全良方不用茯苓蒲黃散便産須知治産後煩悶虛煩悶去血多則除虛而生內熱其證心胸燥滿短氣頭痛悶亂骨節痛脯時輒甚用蒲黃紙上炒以東流水和服方寸匕極良治産後煩悶不能食用白犬骨一味燒研以水服方寸匕療産後心悶不識人汗出乃血氣衝心及胸脅腹肚熱時作時止出肘後方用羚羊角燒如末以東流水服方寸匕未瘥再服治産後煩躁用禹餘糧一枚放入醋瓶內入地埋一半四面緊築用炭一稱發頂火一斤煆去火三分耗二為度用溫砂土罨一宿取出打去外面一重只使裏內細研淘澄五七度將紙襯乾再研數千遍患者用甘草煎湯調二錢匕只一服立效治産後惡血煩悶用羚羊角燒灰酒服方寸匕未瘥再服亦治産難治産後心悶眼不得開出千金方即當頂門上取髮如兩指大使人強牽之眼即開紫葛飲子治産後心中煩悶不解紫葛半兩麥門冬半兩去心生地黃半兩小麥半合生薑一分甘草一分炙微赤銼右細銼和勻分為三服以水一大盞煎至五分去滓不計時候溫服麥門冬散出聖惠方治産後因虛生熱致生心神煩悶麥門冬去心一兩羚羊角半兩屑人參一兩半去蘆蒲黃一兩甘草半兩微炙銼右搗篩為散每服三錢以水一盞入竹葉二七片小麥半合煎至六分去滓不計時候溫服黃耆散出聖惠方治産後口乾煩悶心躁黃耆一兩銼麥門冬一兩去心赤茯苓一兩生乾地黃一兩當歸半兩甘草半兩炙微赤銼右搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓溫服不計時候蒲黃散出聖惠方治産後血氣上攻胸膈煩悶不安蒲黃一兩當歸一兩麥門冬去心一兩赤芍藥一兩鬼箭羽半兩生乾地黃一兩右搗篩為散每服三錢以水一中盞入竹葉二七片粳米五十七粒煎至六分去滓不計時候溫服竹茹飲子出聖惠方治産後內虛煩悶短氣竹茹一兩人參一兩去蘆頭黃耆一兩一作黃芩甘草一分炙微赤銼白茯苓一兩右細銼和勻每服半兩以水一大盞入棗三枚煎至五分去滓不計時候溫服一方無棗紅藍花飲子出聖惠方治産後血氣攻心煩悶氣欲絶不識人紅藍花半兩紫葛半兩銼赤芍藥半兩銼生地黃汁三合後下童子小便三合後下蒲黃半兩右件以水一大盞酒半盞煎至八分去滓下地黃汁并小便更煎三兩沸不計時候分溫三服琥珀散出聖惠方治産後惡血不下心膈煩悶琥珀一兩蒲黃一兩劉寄奴一兩赤芍藥一兩蓮子心半兩鬼箭羽半兩右搗細羅為散每服不計時候以豆淋酒調下二錢芝麻散出聖惠方治産後燥熱心神煩悶芝麻一兩紅藍花半兩當歸半兩銼微炒赤芍藥半兩琥珀半兩嫩荷葉半兩右搗細羅為散每服不計時候以生地汁調下二錢治産後心神悶煩眩迷不省唇口冷脈欲絶面青血氣上衝宜急服此方聖惠方釅醋三合雞子一箇打破㵼在碗中右先煎醋一沸傾入雞子碗中頓熱服之立效治産後煩悶手腳燥熱懨弱氣欲竭血暈心頭硬乍寒乍熱用此方聖惠方用續斷枝一握水一盞半煎至一盞分三服治産後惡血不盡心膈煩悶腹中刺痛宜服此方聖惠方延胡索一兩益母草半兩右搗羅為散不計時候以溫酒調下一錢又方聖惠方用生地黃四兩細切酒二大盞煎至三五沸去滓分為五次服不計時候服之又方聖惠方當歸一兩銼微炒鬼箭羽二兩右搗羅為散每服不計時候以紅藍花酒調下二錢治産後虛勞心熱煩悶不識人方聖惠方取生雞子一枚打破去殼吞之又方聖惠方童子小便一小盞生薑汁一合生地黃汁一合右相和煎一沸放溫分為二服頻頻服之又方聖惠方生地黃汁一中盞童子小便一中盞蒲黃半兩右相和攪令勻不拘時候分溫四服又方聖惠方以生藕搗絞取汁暖飲一小盞頻頻服之凡産後忽冒悶汗出不識人者暴虛故也危氏方用破雞子三枚可與童子小便一升吞之便醒不然丈夫小便一升亦得切不可用病人者又若久不識人或時復發者此為有風因産血氣暴虛風行脈中故也若産後去血多者又增此疾與雞子不醒者可急作竹瀝汁一服五合須臾不定再與五合頻與三五服即瘥治婦人産後胸滿悶不思飲食四肢潮熱用柴胡湯一帖黃芩三兩用水二盞煎盞半空心服治産後血悶血竭用藕節和生地黃搗汁熱酒并小便調下治産後血脹悶用甘蕉根搗汁服之治諸虛煩熱以竹葉石膏湯溫膽湯服之但産後與尋常不同如石膏等藥不宜輕用人參葳靈散衛生家寶治産後痞氣胸膈不快噎悶不進飲食人參茯苓藿香葉白芷甘草炙桔梗各一兩葳靈仙一分微炒右件為末每服一大盞棗二枚薑二片水一盞慢煎至八分空心食前溫服治産後血脹悶欲死者本草以水和苦酒煮蘇方木五兩取濃汁服之效治産後血悶止痛本草以折傷木酒煮濃汁飲之治産後血腹悶本草以蕘花搗汁服之産後煩渴附論夫産後煩渴者由産時水血俱下臟腑乾燥津液不足因虛則生熱故令煩渴也方地黃散聖惠方治産後煩渴壯熱不思飲食生地黃一兩赤茯苓一兩麥門冬三分去心葛根半兩銼石膏一兩研甘草一分炙微赤銼右為散每服三錢以水一中盞入生薑半分棗三枚約煎至六分去滓不計時候溫服􅌝􅌣根散聖惠方治産後煩渴體熱食少􅌝􅌣根一兩甘草一兩炙微赤銼人參一兩去蘆麥門冬一兩去心生乾地黃一兩蘆根二兩銼赤茯苓一兩益母草一兩右為散每服三錢以水一中盞入生薑半分棗三枚約煎至六分去滓不計時候溫服黃耆散聖惠方治産後體虛煩渴喫食減少乏力黃耆一兩銼麥門冬去心半兩生乾地黃一兩甘草一分炙微赤銼人參三分去蘆頭陳皮三分湯浸去白穰焙白茯苓一兩桑寄生半兩右為散每服三錢以水一中盞生薑半分棗三枚竹葉二十七片同煎至六分去滓不計時候溫服紅藍花散聖惠方治産後煩渴不止紅藍花一兩芝麻一兩栝蔞根一兩生乾地黃一兩甘草半兩炙微赤銼菰根一兩右為散每服三錢以水一中盞入生薑半分棗三枚同煎至六分去滓不計時候溫服人參散聖惠方治産後煩渴體熱食少人參一兩去蘆頭麥門冬一兩去心石膏一兩當歸一兩銼微炒甘草半兩炙微赤銼􅌝􅌣根三分生地黃三分柴胡三分去苖赤茯苓三分右搗篩為散每服三錢以水一中盞入生薑半分棗三枚同煎至六分去滓不計時候溫服蓮子房散聖惠方治産後煩渴不止蓮子房二兩秋前者甘草一分炙微赤銼人參一兩去蘆頭麥門冬三分去心蘆根一兩銼右搗篩為散每服三錢以水一中盞入生薑半分大棗三枚煎至六分去滓不計時候溫服益母草散聖惠方治産後血運煩渴口乾心燥益母草一兩人參半兩去蘆頭黃耆半兩銼葛根半兩銼生乾地黃半兩甘草一分炙微赤銼右為散每服三錢以水一中盞入生薑半分約煎至六分去滓不計時候溫服羚羊角飲子聖惠方治産後心胸煩渴不解羚羊角屑一分竹葉二十七片小麥半兩棗五枚生薑一兩赤茯苓半兩右細銼和勻分為五服以水一中盞煎至六分去滓不計時候溫服又方聖惠方生藕汁三合生地黃汁半升童小便五合白蜜二合右相和煎三五沸不計時候分溫三服治産後忽口內煩渴狂語方聖惠方右蘇枋木一兩水二大盞煎至一盞去滓放溫漸漸服盡其渴立止紅藍花散楊氏家藏方治産後調順氣血治虛煩渴燥或乳脈欲行頭昏寒熱川芎當歸洗焙蒲黃各等分右件為細末每服三錢水一盞入荷葉心一斤黑豆三十粒同煎至七分溫服不拘時候桃花散保命集方治産後不煩而渴新石灰一兩黃丹半錢右為細末渴時冷漿水調一錢普濟方卷三百四十七
