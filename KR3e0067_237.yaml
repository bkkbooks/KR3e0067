body:
  text: 普濟方卷二百三十七明周王朱橚撰尸疰門諸尸附論夫人身自有三尸諸蟲與人俱生而其來能與鬼相通常接引外邪為此患害其發作之狀或沉沉默默不的知所苦而無處不惡或腹痛脹急或痞塊踊起作痛引腰脊或精神雜錯變狀多端其病大體略同而有小異以一方共治之者故名諸尸方大度世丸出千金方治萬病癥結積聚伏尸長病寒熱疰氣流行皮中久病著床肌肉消盡四肢煩熱嘔逆不食傷寒時氣惡疰汗出口禁不開心痛等證病皆治之牛黃大黃雄黃細辛附子真硃甘草人參射罔丹砂鬼臼莽草各一兩蜀椒麝香鬼箭羽茯苓桂心紫苑各二兩乾薑三兩野葛一尺蜥蜴蜈蚣各一枚地膽五十枚芫青二十枚樗雞三枚巴豆八十枚右為末蜜丸如小豆大飲服二丸日二先食服之牛黃丸出聖惠方治諸尸及中惡疰忤不測之病牛黃川大黃三分銼碎微炒雄黃一分細研附子一分炮製去皮臍真硃一分細研甘草一分炙微赤銼細辛一分人參一分去蘆頭硃砂一分細研鬼臼一分去鬚莽草一分微炙川烏頭一分炮製去皮臍麝香半兩細研川椒半兩去目及閉口者微炒去汗紫苑半兩洗去苖土巴豆二十枚去心皮研炒紙褁壓去油鬼箭羽半兩赤茯苓半兩桂心乾薑二分炮製銼地膽五枚糯米拌炒令黃色去翅足芫青七枚糯米拌炒令黃色去翅足野葛一分蜥蜴一枚微炒樗雞半兩微炒右羅為末合研將藥及巴豆都研令勻煉蜜和搗五七百杵丸如菉豆大每服不計時以溫酒下三丸甘草散出千金方治卒中惡賊風寒冷入腹便絞痛或飛尸遁尸發作無時搶心胸滿脅痛如刀刺口噤者甘草乾薑茯苓乾地黃羊脂當歸細辛各一兩芍藥吳茱茰桂心各二兩梔子仁十五枚炒右㕮咀以水八升煮取三升去滓內脂煬盡分三服欲利者加大黃三兩一方有芎藭無細辛痛甚者可加羊脂二兩當歸人參各加一兩芍藥一兩一方有防風無羊脂犀角丸出聖惠方治諸百病惡氣腹內疼痛毒腫犀角屑半兩天雄半兩炮製去皮臍鬼臼半兩去鬚桂心半兩莽草半兩微炒真硃半兩細研川大黃半兩銼碎微炒雄黃半兩細研蜈蚣五莭微炒貝齒五枚燒赤川烏頭半兩炮製去皮臍射香一分細研巴豆十五枚去皮心研紙褁壓去油羚羊角屑半兩右羅為末入研了藥及巴豆都研令勻煉蜜和搗五七百杵圓如梧桐子大每服空腹以粥飲下一丸漸增至二丸卒腹痛飛尸服大豆一丸若惡氣腫以醋和塗之甚良以囊盛之男左女右繫之臂上袪邪氣極效雄黃丸出聖惠方治諸尸癥積及中惡心痛蠱疰鬼氣雄黃細研真硃細研白礬燒令汁盡牡丹附子炮製去皮臍藜蘆去蘆頭炙桂心已上各一兩蜈蚣一枚微炒去足巴豆半兩去皮心細研紙裹壓去油右羅為末入研了藥及巴豆都研令勻煉蜜和丸五七百杵丸如梧桐子大每服不計時候以粥飲下三丸亂髮灰丸出聖惠方治諸尸鬼疰中惡心痛亂髮灰一兩細研桂心半兩杏仁一兩湯浸去皮尖雙仁麩炒微黃右細煉蜜為丸如梧桐子大不計時以暖酒下五丸又方出聖惠方雄黃一兩酥一兩右相和丸如彈丸大內二合熱酒中研服之須臾再服瘥已有尸疰者常蓄此藥甚良又方出聖惠方烏臼根皮一斤切硃砂三兩細研水飛過右用水五升先煮烏臼根令濃去滓不計時用汁一合調下硃砂一錢治諸尸雜疰相連續亦治三十年衆疰方出千金方右用桃根白皮一斤㕮咀以水二斗煮取一斗去滓分為八九服須令二日服盡一方治疰在心腹痛不可忍者又方出千金方右用芥子末雞子白和傅尸疰鬼疰者即五尸之中患尸疰又挾諸鬼邪為害者也其變動乃有三十六種以至九十九種大略令人寒熱淋瀝沉沉默默不能的知其所苦而無處不惡纍年漸積日就頓滯以漸至于死死後復疰易傍人乃至滅門覺知此候者必冝急療之蜥蜴丸出千金方治癥堅水腫飛尸寒尸喪尸疰骨血相疰惡氣鬼忤蠱毒邪氣往來夢寤存亡流飲結積虎狼所齧猘犬所咋鴆毒入人五臟服藥以殺其毒即凡婦人邪鬼忤亦能遣之蜥蜴一名守宫蜈蚣各三枚蠻蟲杏仁各三十枚地膽五十枚蟲四十枚蜣蜋十四枚朴硝巴豆各七分澤漆鬼督郵桑赤雞桃奴一方用桃仁犀角各二分乾薑四分虎骨六分甘草一兩芍藥甘遂各五分欵冬花三分右别治巴豆杏仁如膏內諸藥末研調下蜜搗二萬杵丸如麻子大食前三丸日一不下加之若已吐下者一丸旦服有人曽患疰癖堅二十年得愈一方無蜈蚣以暖酒下尸疰附論夫尸疰者尸病疰於人也是五尸之一挾外鬼邪毒之氣流疰於身多因哭泣感染尸氣而然令人寒熱淋瀝沉沉默默不的知其所苦而無處不惡也或腹痛脹滿喘急不得息止橫心胸旁攻兩脅或瘰塊踊起或攣引腰脊或舉身沉重而精神不爽每更莭令愈加頓滯積年纍月以至於死死則疰易傍人以致滅門故名尸疰凡諸心腹痛服衆方熱藥入腹寂然不動但益氣息急者此尸疰病也冝先服甘草汁一升消息少時服瞿麥湯飲一劑得下便覺稍寬并暴癥堅結宿食及癥血堅痛發作無定者方雄硃散出千金方治因喪驚憂悲哀煩惱感尸氣而成諸變動不已似冷似熱風氣觸則發雄黃硃砂龍齒桔梗羌活當歸升麻川烏川芎犀角芍藥鬼箭白殭蠶炒白术南星炮山梔子陳皮木香黃芩已上各等分虎骨頸醋炙紫蘇子炒莽草枳殼麻黃半兩蜈蚣二條酒炙檳榔二分乾蝎炒一分右為細末每服二錢酒調下日三服頃在微城日常修合神精丹一料庚申豫家一婦人夢中見二倉頭一在前一在後手中持一物云到也未應云到也擊一下爆然有聲遂魘覺後心一點痛不可忍昏悶一時許豫忽意神精丹有此一證以三粒令服之遂至府城經少頃婦已無病矣今服藥竟痛止神醒今如常矣日後相識稍有邪氣與一二服無不應驗方在千金中治中風之要藥但近世少得曽青磁石為難合耳大麝香丸治疼痛積年尸疰蠱毒癥癖氣承心兩脅下有塊溫瘴精魅邪氣或悲或哭蛇蝎蜂等所螫並療之方麝香牛黃藜蘆炙硃砂蜀當歸茯苓桔梗鬼箭羽金牙烏頭炮桂心吳茱茰貫衆丹參各一分蜈蚣去足炙乾薑人參虎骨各三分鬼臼半分芍藥雄黃各一分半巴豆二十枚去心皮熬蜥蜴半枚炙右搗篩蜜丸如梧子以飲下三丸至辰時下利不利以熱飲投之即利三兩行後冷醋飲止之即定然後煮取食之勿食冷水明日依前服之永瘥忌熱麵生菜柿子梨等蛇蝎蜂螫取一丸研破和醋塗之便瘥精鬼狐狸之屬拋磚瓦或如兵馬行夜發者是鬼魅無早晚每日服前藥兩丸只三兩日服即瘥仍每日燒一丸薰身體及衣裳宅中燒之亦好無患之人以三五丸緋絹袋盛繫左臂上辟虎毒蛇諸精鬼魅忌狸肉生血物豬肉生蔥蘆笋一方無鬼臼丹參五香丸療諸毒疰尸氣心腹脹滿大小便不通鬼疰心痛不可忍者牛黃研犀角屑各三分升麻沉香薰陸香當歸桂心青木香麝香雄黃研如粉鬼箭羽巴豆去皮心熬訶梨勒皮硃砂研檳榔仁乾薑吳茱茰甘草炙豆蔲各四分桃仁去尖皮熬附子炮各五分右搗篩蜜和丸如梧子大暖水服三丸至五丸如不利更服以利為度此方甚驗人久不傳忌海藻松菜豬肉冷水生蔥蘆笋生血物件治滯冷積年不瘥出風科積類右以死人枕煮服之嘗有嫗人患滯冷積年不瘥徐君嗣伯為診曰此尸疰也當以死人枕煮服之乃愈嫗於是往古塜取枕已一邉爛缺嫗服之即瘥尸疰症者鬼氣也伏而未起故令人沉滯得死人枕治之則魂氣飛越不復附體故尸疰自瘥五香散療尸疰忤邪氣或熱或寒時氣在骨莭間似瘥似劇兼主百病沉香丁香麝香薰陸香鬼箭羽當歸豆蔲各四分牛黃鬼臼橘皮金牙各三分燒犀角屑羚羊角屑大黃各六分升麻桔梗桃仁去皮尖熬光明硃砂研安息香各五分研右為散湯飲酒隨病服方寸匙日再瘥止亦可蜜丸如梧子服十丸桃奴湯出千金方治十惡諸尸蠱毒心腹卒絞痛桃奴當歸人參乾薑各一兩芎藭甘草各三兩丹砂麝香茯苓犀角鬼箭羽桂心各一兩右㕮咀以水九升煮取二升半去滓分二服食前大便不通腹滿加大黃三兩芒硝二兩一方有雄黃一兩無丹砂芎藭江南度世丸出千金方治萬病癥結積聚伏尸長病寒熱疰氣流行皮中久病著床肌肉消化四肢煩熱嘔逆不食傷寒時氣惡中汗出口禁不開心痛等證并皆治之蜀椒三兩人參細辛甘草各二兩茯苓真珠大黃乾薑丹砂一方作硃砂野葛桂心雄黃麝香鬼臼各一兩烏頭牛黃各三分附子紫苑各六分巴豆六十枚蜈蚣二枚右為末煉蜜和丸如小豆大飲服二丸可加至四丸日二服更加獺肝一具尤良一方無牛黃以暖酒下亦可桃奴丸出三因方治心氣虛有熱恍惚不常言語錯亂尸疰客忤魘夢不祥小兒驚癎並皆服之桃奴七枚别研為末辰砂半兩别研桃仁十四枚去皮麩炒别研為末龍腦别研一分生玳瑁鎊過為末一兩牛黃别研碎一分雄黃用桃葉煮水研飛取三分黑犀石上以水磨澄去水取細末半兩麝香别研一分琥珀别研三分安息香一兩以無灰酒斟酌多少研飛去砂土銀器入桃仁琥珀熬成膏右以各末和入膏丸如雞頭大隂乾密器封閉靜室安置煎人參湯研下一丸食後臨臥服五尸丸療諸尸疰方芍藥桂心各八分吳茱茰一合丹砂研芎藭烏頭炮乾薑各四分蜀椒一兩去目汗梔子仁五分巴豆四十枚去心皮熬研右搗下篩蜜和丸如豆大一服三丸日三忌豬肉生蔥蘆笋生血等物赤茯苓散出聖惠方治尸疰發作無時心胸痛喘息氣傷攻兩脅赤茯苓三分當歸半兩銼微炒赤芍藥半兩鬼箭羽三分桂心三分乾地黃半兩川升麻三分木香芎藭桃仁三分湯浸去皮尖雙仁麩炒微黃右搗為散每服三錢水一中盞煎至五分去滓溫服不拘時一方無川升麻桂香湯治尸疰發歇無時心腹切痛桂去粗皮芍藥木香柴胡去苖各一兩芎藭鱉甲去裙襴醋炙乾薑炮各三分吳茱茰湯浸焙乾炒常山各三分右粗搗每服三錢水一盞半煎至八分去滓溫服不拘時候虎掌丸出聖惠方治尸疰寒熱不思飲食心腹刺痛虎掌丹砂研各半兩白茯苓去黑皮龍齒各一兩當歸焙蓬莪茂煨銼各三分阿魏一兩右為末用酒煮阿魏麵糊丸如梧桐子大每服二十丸生薑烏梅湯下一方用赤茯苓鸛骨丸出聖惠方治尸疰邪氣流傳忽然悶絶時發寒熱淋瀝或腹痛脹滿鸛骨酒炙一方用鸛骨酥炙雄黃研各一兩桂去粗皮三分大黃銼炒三分麝香研半兩丹砂研一分一方用硃砂赤足蜈蚣酒浸炙一條右為末煉蜜丸如梧子大每服二十丸桃枝煎湯下防己散治尸傳尸服送下藥後補虛防己人參白茯苓去黑皮鬼臼鬼箭羽附子炮製去皮臍麴炒各一分右為散每服二錢以桃仁研泔一盞煎至六分溫服日五服杜衡散出肘後方治尸疰及惡氣中令人心胸滿悶神思昏迷服此效杜衡一兩莖豉一兩人參半兩瓠子仁二十枚松蘿六鉢赤小豆二十枚右為散平旦溫酒服方寸匙晚當吐百種物若不盡後更服之硃砂丸出肘後方治尸疰鬼邪毒氣流疰身體令人寒熱淋瀝腹痛脹滿精神錯亂硃砂一兩細研水飛過一方用丹砂雄黃一兩細研水飛過鬼臼半兩去鬚莽草半兩微炒巴豆十四枚去皮心研紙褁壓去油蜈蚣一枚微炙去走足右羅為末入研了藥令勻煉蜜丸如小豆大每服不計時候酒下三丸鸛骨丸出聖惠方治尸疰惡氣寒熱悶絶兼治百病鸛骨一寸炙一方用鸛鵲皮方三寸炙桂去粗皮半兩虻蟲斑貓各十四枚去翅足炒巴豆二十枚去皮心膜炒右為細末煉蜜丸如小豆大每服三丸溫水下日三粥飲亦可還魂湯一名追魂湯出范氏方治卒感忤鬼擊飛尸諸疰奄忽氣絶無復知覺或已死咬口口禁不開撬齒下湯湯入口不下者分病人髮左右捉定踏肩引之藥下復增取盡下一升須臾立蘇金匱云寸脈沉大而滑沉則為實滑則為氣實氣相摶血氣入臟則死入胃則愈若卒厥唇口青身冷入臟即死身和汗出愈麻黃三兩桂心二兩甘草一兩杏仁七十粒右㕮咀以水八升煮取三升分三服一方無桂心只三味淮南丸療疰易滅門女子小兒多疰諸般疰證心悶亂頭痛吐有此證者冝此方又有華陀狸骨散龍牙散羊脂丸諸大藥等並在大方中及成帝所受車前子車下李根皮石長生徐長卿各數兩等分右粗搗作方囊貯半合繫衣帶及頭若疰一家暴慘以和此共帶之若初覺尸疰取此藥自燒作屑以水服之蜜陀僧散治臨尸哭尸氣入腹沉滯臟腑有時發動取此方神效蜜陀僧半斤醋煆淬淘研控乾取六兩京三稜煨搗末二兩訶梨勒不去核生用搗羅一兩右合研勻每服二錢用煮麵濃湯調下當晚不食臨臥一服餘時勿服併服三夜次夜當下惡物不下第三夜加生牽牛子末一錢同調下治卒得尸疰毒痛往來出聖惠方杏仁亂髮灰各等分右研如脂丸如梧子大每服酒下三丸日三一方豬膏和丸一方蜜丸治遁尸尸疰心腹及身有痛處不得近者出千金方右取艾小握令碎著痛上厚一寸餘熱湯和灰令強忍熱置艾上冷即易不過三二度瘥治尸疰邪氣右用狸骨頭骨最妙燒為灰酒服二錢亦主食野鳥獸肉物中毒腫腫再服之即瘥五月豬糞極神妙五月中勿食肉傷神治尸疰鬼疰腹痛右用鸛骨大寒亦可單用炙令黃末空心暖酒服方寸許似鵠而巢樹者為白鸛治尸疰出肘後方右燒髮如雞子大為末水服之瘥治尸疰蜀椒尉方并治走疰出聖惠方右用蜀椒一斤帛裹於疰上以尉斗頻尉椒令熱汗發出神效死人席湯療尸疰損鼻或聞臭聲或見尸常發右取死人眠席斬棺內餘棄路者一虎口長三寸止此一物以水三升煮取一升為一服立效萬病丸治五勞七傷尸疰所侵心腹疼痛飲食不化兩脅膨脹皮膚攣縮等病逺志去心澤㵼石斛去根柏子仁别研雲母水飛石韋去毛杜仲去粗皮炙天雄炮製去皮臍牛膝去油酒浸切焙白茯苓去黑皮菖蒲山芋熟乾地黃焙續斷肉蓯蓉酒浸切焙乾薑炮甘菊花桂去粗皮五味子蛇床子炒山茱茰各半兩桔梗炒防風白术各一兩附子炮製去皮臍四枚天門冬去心焙一兩半細辛去苖華三分右為末煉蜜杵千下丸如梧桐子大每服二十丸空心溫酒下春秋日再服夏季日一服冬季日三服如久服即減天雄附子各一兩赤芍藥丸出聖惠方治五尸疰并諸尸鬼疰中惡心痛赤芍藥銼一兩吳茱萸湯浸焙乾炒丹砂研各半兩蜀椒去目閉口者炒去汗烏頭炮裂去皮臍各半兩乾薑炮三分桂去粗皮一兩右為末煉丸如小豆大每服十丸空腹溫酒下日三丹砂丸出聖惠方治五尸疰瘦病伏連諸鬼氣惡疰并傳尸勞乏鬼疰殗殜肌體羸瘦丹砂研一兩麝香研三分桃仁湯浸去皮尖雙仁炒研七十二枚右各細研再和研勻入少蜜煉丸如小豆大每服十丸米飲下日三服忌生羊血物治尸疰腹痛痔痿出本草右以胡狸炙令香為末酒服二錢餘重者不過十服後即見驗治尸疰心痛及反胃右用田螺殼燒灰米飲下之傳尸復連殗殜附論夫傳尸復連殗殜者皆起於骨蒸遁尸故也此病多因臨死哭泣尸氣入腹連綿不已或三年至五年有能食不作肌膚或三日五日若微勞即發當頭額間骨節痛壯熱翕翕然死後家中更染一人如此相傳故右復連也方大金牙散治傳尸骨蒸肺痿殗殜及諸蠱毒疰忤鬼魅野狸蟲蛇蜂蝎等毒或惡瘡腫瘤中卒心痛大小便不通心腹鼓脹疫癘瘴毒積癖邪氣金牙曽青研飛雄黃研大黃銼炒丹砂研飛牛黃研凝水石煨研野葛皮龍骨朴硝研犀角鎊獺肝片切乾炙狸骨醋炙鸛骨炙黃各三分升麻一兩半附子去皮臍生用桂去粗皮鬼臼鬼督郵黃環青木香常山牡蠣煆研人參知母切焙徐長卿各半兩鬼箭羽桔梗炒代赭石莽草蜀漆當歸切焙白薇巴豆去皮心膜炒研露蜂房各一分蜀椒四十九粒去目及閉口炒汗出蜈蚣二條去足炙芫青去翅足炒斑貓去翅足炒亭長去翅足各二十一枚右搗研為散再和研細勿令穢汚觸犯并孝服人見當於淨室中焚香密蓋之勿透氣如傳尸骨蒸殗殜疰癖冷氣積聚每服半錢熱湯調下日再病瘥即止仍以絳囊盛方寸匙帶之辟諸鬼氣如有諸邪氣病狂言妄見者帶二三錢若卒惡心痛疰忤喘滿蠱脹悶亂諸疾四服四錢米飲調下吐利為應若蛇蟲毒瘡以津唾調傅之若瘟疫瘴癘服如前法若蠱毒咄吐即瘥若卒死中惡湯調一錢灌下即瘥卒中野道狐狸鬼魅壓邪毒眼不正視狂言者亦用湯化三錢未瘥更服若忽有惡瘡腫以湯和傅之日一易瘥即止獺肝金牙散治傳尸復連殗殜骨蒸痃癖冷氣五尸疰相染及蠱疰瘟瘧疰忤心痛卒死疫癘獺肝一具炙乾金牙研丹砂水飛研狸骨炙搗研牛黃研麝香研龍膽白薇附子炮裂去皮臍當歸水洗切焙乾蒲黃炒鬼督郵銅照鼻燒醋淬炒苦參龍骨研沙參蜈蚣炙去足蜀椒去目及閉口者炒出汗丹砂各半兩寒水石燒研硝石研禹餘糧燒紅醋淬元參牡丹皮鬼臼各一兩人參鱉甲去裙襴醋炒乾薑炮裂各一兩一分菴䕡三合右為細散再同研勻如粉每服一錢熟水調下空心夜臥各一服漸加至一錢半大黑虎丹出聖惠方治傳尸伏連及一切勞證不問冷熱大小冝服蛤蚧三對微炒蝦蟆一枚塗酥炙令黃丹砂五銖細研金箔五片細研銀箔五片研白鮮皮苦參三銖蛇蛻皮一兩微炙白狗糞一分微炒布巾子三年者六銖令炙黃金剛子三銖烏驢蹄三銖炙黃硫黃一銖細研雄黃一分細研天靈蓋麝香一兩細研沉香一分甲香三銖微炙乳香二銖夜明沙六銖雄者兩頭尖人中白一分右搗羅為末更都研令勻用豬膽汁并軟飯和搗五七百杵丸如菉豆大每服藥先以新汲水一盞入少許麝香沙糖以藥十丸浸於露下但先用煎香湯浴後泄淡麵一小盞便和藥服了以衣被厚蓋臥直候汗出若是傳尸蟲白伏連蟲赤皆背上出骨蒸則汗出並瘥獺肝丸治傳尸勞病并諸冷熱勞疾日月將久面色萎黃漸漸羸瘦獺肝一具生用柴胡去苖青蒿一握肉蓯蓉去皺皮酒內淹浸切焙二兩半黃連去鬚炒一兩黃耆銼二兩半知母木香地骨皮桃仁去皮尖雙仁炒附子炮裂去皮臍桂去粗皮天靈蓋炙陳橘皮去白炒當歸切焙澤㵼生乾地黃焙各一兩甘草炙銼一兩檳榔銼柏木脂研各一兩半右為末煉蜜和丸如梧桐子大每服空心酒下四十丸麝香飲治男子婦人傳尸骨蒸一切勞疾柴胡去苖銼一兩阿魏三分炒為末甘草如病人中指大銼青蒿桃枝栁枝金櫻枝各一握細銼薤白蔥白各七莖切檳榔一兩為末分作三帖右以童子小便四升宿浸諸藥於密室內至更初煎煎時忌生人婦人等見并不祥之語取吉善之言以卜善惡之候又用刀一口放藥鐺上此藥通神冝加専志煎取一升半去滓下麝香一分研分作三服第一服入檳榔末一帖頓服如人緩行三二里地二服亦下檳榔末頓服眠時掩却鼻服才了以白梅含之莫令心頭惡吐却藥須臾或吐必有物出或未吐如前更服第三服必吐㵼㵼下惡物并勞蟲等不可名狀或瓜眼下并身上出如蟻其㵼下蟲惟白色必愈餘色者難瘥才吐㵼了便以薤白粥并軟飯補之仍如法將息烏雞丸治傳尸勞疾尸疰骨蒸眼目昏澀面色青黑咽喉噎塞痰涕咳嗽或痃癖攻刺疼痛胸膈滿悶時或恚怒或多感傷情思不樂夢寐虛驚精藏滑泄失血冒寒潮熱盜汗肩背拘急腰膂肢莭煩疼四肢少力不喜飲食小便黃赤大便不調乍進乍退服攻藥後宜服此黃連去鬚附子炮製去皮臍各二兩柴胡去苗白附子生當歸切焙秦艽去苖土槐膠甘草炙銼續斷蓯蓉薄切酒浸焙逺志去心芭戟天各一兩陳橘皮去白焙乳香研雄黃研丹砂研各半兩丁香乾薑炮各一分右搗極細先養烏雌雞一隻以硫黃三兩為末分作三十分每日拌飯餵一月日用大麻子一升餵盡宰治去毛皮嘴爪并肚腸留心肝將前藥末入在雞腹以麻線纒定再用無灰酒一斗銀石鍋內用文武火煮令雞熟取出除去粗骨將雞并腸內同細研更將雞骨焙乾搗羅為末同研藥攪和入臼中搗千百下丸如梧桐子大每服二十丸以溫酒吞下空心日午臨臥各一服犀角紫河車丸治傳尸勞服三月必平復其餘勞證只數服愈紫河車一具孩兒胞衣是也米泔淹一宿洗淨焙乾用鱉甲酥炙桔梗胡黃連芍藥大黃敗鼓皮心醋炙貝母去心龍膽子黃藥子知母已上各二錢半廣茂犀角末芒硝各錢半硃砂二錢另研右為細末煉蜜丸如梧子大硃砂為衣每服二十丸酒下空心服蘇合香丸一名乞力伽丸療傳尸骨蒸殗殜肺痿疰忤鬼氣卒心痛霍亂吐痢時氣鬼魅瘴赤白暴痢月血閉痃癖疔腫驚癎鬼忤中人小兒吐乳大人狐狸等病蘇合香油一兩入安息香膏內安息香二兩别研用無灰酒一升熬成膏麝香研白檀香香附子去毛訶梨勒煨取皮青木香丁香不見火沉香硃砂研水飛烏犀鎊白术蓽撥各二兩龍腦别研薰陸香别研各一兩右除研藥外餘并細末拌停用安息香膏并煉蜜和成劑每一丸雞頭子大沸湯化下卒中惡昏不知及霍亂暴症心腹絞痛鬼疰客忤驚癎顛狂諸傷損氣暈欲絶此丸主倉卒之患悉皆治之如牙噤不能開者抉開口灌之如灌不下搐鼻灌即蘇此藥隨身不可暫闕辟諸惡氣并禦山嵐瘴氣無以踰此若危急病尤不可無市肆疾取多用龍腦附子當於火土辟去能飲酒以酒調服若精神用過度夜睡不穩人參湯化服其功不在妙香散寧膏之下倉卒人參不得只白湯亦佳此藥安血氣却外邪凡病自內作不曉其名者服此往往得效兼治氣疰氣厥氣逆氣不和吐利榮衛阻隔尤有神效凡諸證暴亡之疾用之最健傷寒日久形證危惡但心頭尚暖藥下即漸蘇若大㵼氣欲脫目視天地皆轉神思已不理諸藥不效服此兩彈丸許神氣即輕爽㵼亦自止妙不可言有人嘔血甚久遂奄奄而絶瘦敗之甚足手甚冷鼻息欲絶計無從出惟研蘇合香丸灌之凡盡半兩即蘇也一方無龍腦小麝香丸出千金方治傳尸骨蒸鬼疰百病風寒客轉經絡走疰疼痛久不愈者及一切惡氣邪毒並皆治之麝香芥草炙犀角屑梔子仁各三分雄黃研當歸炒丹砂研各四分乾薑炮芍藥桂各五分巴豆五十枚去皮膜油七錢八分蜈蚣一條炙去頭足附子炮去皮臍各五枚一枚準半兩烏頭裂法並同上細辛五分右合搗千杵蜜和丸如小豆大每服三丸日三服可加至五丸溫水下一方無當歸忌生蔥生菜蘆笋豬肉冷水牛黃丸出聖惠方治傳尸惡疰復連瘦病宜服牛黃半兩細研麝香一分細研人參半兩去蘆頭沉香三分丁香半兩木香三分胡黃連一分柴胡三分去蘆犀角屑三分枳殼三分麩炒微黃去穰桃仁一兩湯浸去皮尖雙仁炒鱉甲一兩醋炙令微黃去裙襴右搗羅為末入研了藥勻煉蜜和搗三二百杵丸如梧桐子大每於食前以粥飲下二十丸忌莧菜麝香散治男子婦人傳尸骨蒸冷熱五勞麝香研半兩甘草如病人中指長男左女右東引桃枝青蒿東引栁枝石榴皮犀角鎊半兩阿魏柴胡䓤白薤白各七莖右除麝香外銼碎同用童子小便二升半浸一宿别入檳榔末三錢同煎至一升半溫分三服男病女煎女病男煎勿令孕婦六畜見初服訖如人行五里又進一服恐惡心可含白梅病在上即吐在下即瀉各出惡物如蟲類及頭髮馬尾狀兼身上如蟻行㵼後以蔥粥及軟飯補之仍服後方茯神湯和調五臟避風一月若逺年重病不過兩劑其吐下蟲如紅色者可治黑色者或瘥或否白色者不可治茯神湯治傳尸骨蒸先服麝香散取蟲後補五臟茯神去木人參逺志去心甘草炙銼龍腦陳橘皮去白焙熟乾地黃焙各一兩五味子一兩半麥門冬去心焙桂去粗皮各一兩半黃耆銼二兩當歸切焙一兩右粗搗篩每服五錢水二盞入棗七枚擘破生薑五片煎至一盞去滓空心溫服日三療瘦病伏連傳尸鬼氣疰忤惡氣方一名斑貓散出聖惠方斑貓去頭足熬射干根各四分石膽七分别研桂心牛黃各二分别研犀角三分生者屑人參三分生蜥蜴一枚炙紫石七分别研蜈蚣四寸炙麝香少許别研右研為細末相和每日空腹服一寸匙日三服用井花水二合溫即頓服勿臨吃與白米粥吃如覺小便澀好如合藥勿使婦人小兒狗見忌熱麵果子五辛酒肉生血生蔥一方加甘草真硃丸一名獺肝丸出聖惠方治傳尸骨蒸咳嗽上氣痰喘寒熱四肢瘦弱真硃末獺肝炙乾茯神貝母去心柴胡去蘆龍膽草黃連去鬚赤芍藥各一兩半白檳榔煨銼旋覆花各一兩右為末煉蜜和丸如梧桐子大每服十五丸食後溫漿水下日再一方有川大黃以溫水下三十丸黑虎丹出聖惠方治傳尸骨蒸勞乾蝦蟆一枚去頭足為二各一半將一半熟炙黃者蛤蚧一對各取一半泥塗和炙黃蘆會研天靈蓋酥炙白狗糞炒黃雄黃研各一分麝香一分研烏驢頭炙乾一兩乳香研一兩半豬膽一枚取汁於碗中慢火煨如膏和藥右搗研九味為末合研勻細以豬膽膏同粟米飯和丸如梧桐子大先吃熱麵一碗次以芽香水沭浴次以沙糖麝香少許調次冷水一盞投藥一丸於星月下浸一宿平旦空腹服之厚被蓋臥若是傳冷勞者脊骨中出白蟲或出赤蟲若骨蒸勞則汗出腰腳疼痛不遂腳下出汗如膠漆諸風氣水病並服一粒瘥小兒患此可服半粒如前法有蟲出鼻內如線狀是效驗之至麝香丸出聖惠方治骨蒸傳尸勞瘦鬼氣復連麝香三分研犀角鎊鬼箭羽木香各一兩白术微煨一兩虎頭骨醋炙天靈蓋醋炙雄黃研桃仁湯浸去皮尖雙仁炒研丹砂各一兩半右為末和勻煉蜜丸如梧桐子大每服十丸愈以醋湯下日二凡瘟疫病亦可帶之一方清粥飲下二十丸地黃湯治復連傳尸骨蒸等病生乾地黃酒洗切焙二兩半續斷桔梗炒各一兩半五味子一兩半紫苑去苗土甘草炙銼羚羊角鎊各半兩肉蓯蓉酒浸切焙桑根白皮炙銼各一兩赤小豆一合右粗搗篩每服五錢以水一盞半入竹茹彈子大煎至一盞去滓溫服空心食後各一服服後若渴唇口乾加麥門冬去心地骨皮各半兩阿魏丸治傳尸尸疰心神錯亂狂言驚悸夢與鬼交病熱逐莭改變阿魏醋化去沙石麵和作餅炙半兩安息香酒浸研如粉一兩甘草炙銼木香檳榔銼各半兩䜴一合炒豬牙皂角十四挺去皮子冷醋炙天靈蓋醋炙麝香研人中白研各一兩右為末煉蜜和丸如桐子大用童子小便浸烏梅三枚并蔥白三莖切同煎下二十丸五更初服桃仁丸出聖惠方治傳尸骨蒸復連殗殜氣咳嗽冝服桃仁一兩半湯浸去皮尖雙仁微炒豬牙皂莢半兩塗醋炙令微黃紫苑三分去苖土鱉甲一兩半塗醋炙微黃去裙襴芫花根一兩甜葶藶一兩炒令微黃白礬三分燒令汁盡蛤蚧一對塗醋炙令微黃麝香一分細研入右搗羅為末煉蜜和搗一二百杵如梧桐子大每服不計時候以清粥飲下二十丸陳麴丸治傳尸多服冷藥旬月未愈或損脾臟致食少難消氣滿兼利溫脾陳麴末炙令黃色五兩白术一兩附子炮裂去皮臍三兩枳殼去穰麩炒令黃色一兩甘草炙銼乾薑炮裂人參各二兩吳茱茰水淨洗焙乾炒桔梗炒各一兩右為細末煉蜜為丸如梧桐子大每日空心米飲下二十丸夜臥再服漸加至三十丸紫苑湯一名續斷散出衛生寶鑑治傳尸骨蒸復連殗殜肺氣咳嗽紫苑去苖土桑根白皮炙銼桔梗炒續斷各一兩半赤小豆一合甘草炙銼五味子各一兩生乾地黃酒浸切焙二兩半右粗搗篩每服五錢水一盞半入青竹茹彈子大煎至一盞去滓食後溫服良久再服若熱甚加麥門冬去心一兩石膏一兩半一方入小麥二十粒桃仁湯出聖惠方治傳尸復連病本因極熱熱氣相易續不斷遂名伏連鬼氣亦名骨蒸傳尸發即四肢無力日漸黃瘦不能飲食乍惡乍好桃仁湯浸去皮尖雙仁炒三兩重研一方用桃奴鬼箭羽赤芍藥人參陳橘皮去白焙各二兩白茯苓去黑皮三兩一方作茯苓白檳榔銼一兩麝香研三分右粗搗篩六味入桃仁和內每服五錢以水一盞半生薑三片拍碎煎至一盞去滓入麝香末一捻空腹溫服良久再服忌火醋生冷五辛桃枝飲治一切鬼氣邪氣傳尸復連骨蒸桃枝栁枝各一握細銼取東南枝豉半兩蔥白三莖細研童子小便一升地膽一錢為末蜀椒去目及閉口者炒去汗半兩生薑細切一兩右粗篩五味與薑豉和勻用童子小便一升浸一宿至四更煎取半升去滓分二服五更初一服雞鳴時一服服後汗出慎風仍取米粉摩身上若或微利即愈隔日再服重者不過三劑天靈蓋丸治傳尸天靈蓋如無即骷髏骨有十字縫者取中心一片以牙香湯洗以安息香酒塗炙黃色紫河車一枚頭首生兒孩衣胞是也於石上用新草鞋踏洗令淨控乾以麝香一兩摻拌令勻入餅以泥固臍如法火煆通赤留性勿煆過石蜥蜴一條和腸臟醋炙黃令冷乾獺肝一具薄切於瓦上焙乾赤足蜈蚣一條酒浸炙焦黃鷹糞半合金線蝦蟆端午日收者以醋炙令黃用頭蛤蚧一對酥炙令黃只取頭尾用右為細末以醋煮豬膽令熱成膏和搜為丸如梧桐子大以槐花版青各一錢研為末熟絹篩過藥衣令黃色每服四十丸溫煎生薑湯下初更一服二更初再一服獺肝丸治傳尸病遁疰骨蒸伏連殗殜此病多因臨尸哭泣尸氣入腹連綿或三年五年有能食不長肌膚或三日五日有微勞即發大都當額頭間骨尋常熱熻熻然死後家中更易一人如此乃至滅門獺肝一枚令炙乾鱉甲一枚去裙襴醋浸炙黃野狐骨用頭骨一枚令炙黃色防己一兩半紫苑去苗圡蜀漆葉