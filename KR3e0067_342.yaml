川續斷酒浸川芎香附去毛炒茯神去木阿膠蛤粉炒成珠子白术各一兩人參甘草炙各半兩陳艾葉一兩烏梅去核半兩右銼散每服四錢水一盞半生薑五片煎不拘時服龍骨散出聖惠方療婦人因損娠下血不止方見墮胎門血出不止類蟹爪湯出千金方治妊娠僵仆失據胎動轉上搶心甚者血從口出逆不得息或注下血一斗五升胎不出子死則寒尉人腹中急如産狀虛乏少氣困頓欲死煩悶反覆服藥母得即安下血亦止其當産者立生并妊娠兩兒一死一生服令死者出生者安蟹爪一升甘草桂心各二錢阿膠二兩或鹿角膠右㕮咀以東流水一斗煮取三升去滓內膠煬盡服能為一服佳不能者食頃再服若口急不能飲者格口灌之藥下便活也與母俱生若胎已死獨母活也若不僵仆平安妊娠無有所見下血服此湯即止一方無桂心或云桂不安胎亦未信耳煎藥作東向竈用葦薪煮竹茹酒出大全良方治妊娠誤有失墜損築胎損疼痛或八九月者青竹茹二合好酒一升右煮三五沸分作三服即安療婦人懷妊數傷胎一名鯉魚臛方出大全良方鯉魚二斤粳米一升右如法作臛少著鹽多著蔥豉醋食之甚良一月中須三遍作效安穩無忌一方有生薑無醋芎藭散出肘後方治妊娠因墜倒仆胎不轉動腹內疼痛腰重及子死腹中不出須臾三服立下用川芎為細末以熱酒調服方寸匕日三四服立出一方用熱水調服治妊娠因失所胎動困絶千金方亦治子煩出大全良方取竹瀝飲一升立愈製法云取淡竹斷兩頭節火燒中央器盛兩頭得汁取之療損娠用朱砂末一錢以生雞子三顆取白和朱砂頓服胎若死即出如未死即安治妊娠損動後腹痛用冬麻子一升杵碎熬以水二升煮取汁熱沸分為三四服治孕婦胎損亦治白丹用苧根濃煮水浴之日三四瘥産寶方川芎黃耆湯胎産急救方治傷胎腹痛下黃汁川芎黃耆等分右銼每服五錢秫米炒一合水煎服鄭氏勝金散出永類鈐方治妊娠因食傷胎傳于脾胃氣虛冷逼小腹脹痛或腰重大便祕吳茱萸酒浸陳皮淨去白川芎乾薑炮生薑切焙各一錢半甘草炙厚朴薑製炒各三錢右末每服三錢陳米飲下入鹽煎尤妙濟生加砂仁治妊娠誤有失墜忽推築著疼痛出本草方見本門前心腹痛類竹茹湯胎冷附論夫胎冷腹脹虛痛兩脅虛鳴臍下冷疼欲泄小便頻數大便虛滑者何答曰胎氣既全子形成質或食瓜果甘甜飲冷不時之物當風取涼受不時之氣則令胎冷子身不能安處皮毛疼痛筋骨拘急手足攣拳致使母有此危證急服安胎和氣散方安胎和氣散出醫方集成治胎冷腹脹虛痛兩脅虛鳴臍下冷疼欲泄小便頻數大便虛滑訶子麵褁煨去核白术各一兩陳皮去白髙良薑炒銼木香不見火白芍藥甘草炙各半兩右㕮咀每服四錢水一盞半薑五片煎七分去滓不拘時服忌生冷木香散一名安胎和氣散出醫學類證治胎冷成效生薑熟地黃良薑南木香芍藥陳皮陳大米各等分右為細末每服二錢水一盞生薑三片煎八分通口服當歸飲治妊娠腹中冷胎不安當歸切焙人參生薑切各七錢厚朴去粗皮生薑汁炙陳皮湯浸去白焙各兩半大棗擘破五枚右銼如麻豆大分為二劑以水四盞煎取一盞半去滓食前分二服如人行三五里再服也漏胎附論夫妊娠漏胎者謂妊娠數月而經水時下也此由衝任脈虛不能約制手太陽少隂之經血也衝任之脈為經絡之海起于胞內手太陽小腸脈也手少隂心脈也是二經為表裏上為乳下為月水有娠之人經水所以斷者壅之養胎畜之以為乳汁也衝任氣虛則胞內泄不能制其經血故月水時下亦名胞漏血盡則人斃矣又有因勞役喜怒哀樂不節飲食生冷觸冒風寒遂致胎動若母有宿疾子臟為風冷所乘氣血失度使胎不安故令下血也妊娠卒然有損動或冷熱不調和致傷于胎故卒痛而下血若不止之則墮胎也方阿膠湯治妊娠胎漏下血不止阿膠炒燥劉寄奴赤石脂黃連去鬚白龍骨各一兩半烏梅五枚碎焙桑寄生甘菊花當歸切焙旋覆花炒地榆白术各一兩枳殼去瓤麩炒一兩二錢艾葉炒半兩石膏碎二兩右粗搗篩每服五錢以水一盞半入生薑五片同煎八分不拘時服續斷丸治妊娠漏胎下血不止腹內疼痛夫妊娠將理失宜經血時下謂之漏胎由衝任虛弱不能固養胞胎故經血時下如器之漏也久漏不已則胎氣無所稟養必致萎燥矣續斷附子炮製去皮臍蒲黃乾薑炮芍藥芎藭山茱茰各一兩半肉蓯蓉酒浸焙乾白术兔絲子酒浸焙别杵黃耆炙銼山芋熟地黃焙各二兩右為末煉蜜和丸如桐子大每服二十丸空心日晚溫酒送下截訶散一名人參散出醫學類證治胎未實或房室驚觸勞力過度傷動胞胎或食毒物致子宫虛滑經血瀝淋若不急治敗血湊心子母難保日漸胎乾危亡人參去蘆黃耆蜜炙阿膠麵炒甘草炙苧根木香不見火青竹茹芎藭陳皮去白附子炮生薑糯米各等分右為末每服二錢水一盞煎至八分通口服忌生冷雞鴨魚麵艾葉湯治妊娠胎漏下血艾葉炒黃芩去黑心各半兩黃連去鬚茯神去木桑耳代赭石厚朴去粗皮生薑汁炙銼白茅根切白芷阿膠炒各一兩白术三錢右粗搗篩每服五錢以水一盞半生薑五片煎至八分去滓溫服不拘時阿膠散一名地榆散治漏胎下血不止方見墮胎後血出不止類續斷飲出大全良方治妊娠漏胎下血不止臍腹疼痛續斷銼二兩艾葉去梗焙乾熟地黃焙當歸切焙各一兩竹茹新者阿膠炙燥雞蘇去根莖各半兩右為粗末每服三錢用水一盞煎七分去滓空心溫服早晚各一黃耆飲治妊娠胎漏月水時下此由衝任脈虛不能制約太陽少隂之經故令血下蓋衝任之脈為經絡之海皆起于胞內今不能制其經血故為漏胎血乾則死黃耆銼地榆桑寄生各一兩半艾葉半兩白龍骨研二兩生地黃二兩生薑半兩右銼如麻豆大每服五錢以水一盞半煎取八分去滓食前服如人行三五里再服熟乾地黃散出聖惠方治妊娠胎漏腹痛不止心神虛煩熟地黃人參去蘆頭芎藭各二兩阿膠三兩搗碎炒令黃燥白龍骨一兩當歸三錢銼微炒麥冬三錢去心右搗為散每服四錢以水一中盞入棗三枚煎六分去滓食前溫服榆白皮散出和濟方滑胎易産治妊娠漏胎去血及臨産驚動太早産時未至穢露先下致使胞胎乾燥臨産艱難並宜服之白榆皮葵根一方用子瞿麥各一兩大麻仁去殼木通半兩川牛膝三錢去苖酒浸切焙右銼散每服三錢水一盞半煎溫服不拘時竹茹寄生湯出聖惠方治妊娠漏胎心腹㽱痛或時下血竹茹桑寄生阿膠炙燥艾葉芍藥白术各等分右銼如麻豆大拌勻每服三錢以水一盞煎至七分去滓溫服薑黃湯出聖惠方治妊娠胎漏下血不止腹痛薑黃當歸切焙熟地黃焙艾葉焙乾鹿角膠炒燥各一兩右粗搗篩每服五錢以水一盞半入生薑半錢切棗三枚擘破煎至八分去滓食前溫服治妊娠胎漏腹痛不止心神虛煩出聖惠方熟地黃二兩半鹿茸一兩半去毛塗酥炙微黃鹿角膠二兩搗碎炒令黃燥艾葉一兩微炒苧麻根一兩半銼右為細散每于食前以米飲調下二錢艾葉飲治妊娠漏胎淋瀝不止艾葉陳者半兩乾薑炮當歸炙銼各三錢芎藭一兩右粗末每服三錢以水一盞入生薑一棗大拍碎煎七分去滓空心日午晚後各一一方治冷熱腹內不調致胎不安無薑棗止用水煎芎藭飲治妊娠漏胎下血過多腹中刺痛止血安胎方見諸血類桑寄生湯治妊娠漏胎淋瀝下血臍腹疼痛方見諸血類膠艾湯出大全良方治妊娠漏胎下血過多亦治漏胎不安阿膠炙燥半兩艾葉焙乾一兩右粗搗篩每服三錢以水一盞煎七分去滓溫服早晨午時晚間各一一方醋糊為丸如桐子大每服三十丸空心米飲湯下名二氣丸地黃散出聖惠方治妊娠胎漏下血不止腹痛又云治妊娠下血如月信者若胞乾非特損子亦損母矣熟地黃焙乾薑炮各三錢右為散每服二錢食前溫酒調下一方有赤石脂等分同油蜜煎出便産須知治胎氣因漏血乾澀難産者清油半兩好蜜一兩右同煎數十沸溫服滑胎即下蓋緣無血胎乾所以難産他藥無益以此助血即效二黃散出保命集治婦人有孕胎漏生地黃熟地黃各等分右為細末煎白术枳殼湯調下二兩日二服治妊娠血下如注名曰漏胞胞乾便死出千金方用生地黃半斤㕮咀以清酒三升煮三沸絞去滓服一方加黃雌雞一頭治如食法一方取雞血和藥中服無時多服亦佳一方熟地黃為末以三指撮許酒服不過三服瘥療妊娠數月日猶經水時時來者名曰漏胞若因房室勞有所去名曰傷胎用赤小豆五升濕地種之令生牙乾之下篩懷身數月日經水尚來以溫酒服方寸匕日三得效便停治妊娠血下不止名曰漏胞血盡子死用雞子十四枚取黃以好酒二升煮使如餳一服之未瘥更作服之以瘥為度治妊娠胎漏非時下血方出大全良方熟地黃桑寄生續斷人參各半兩艾葉炙銼細川芎當歸白术各一錢右為細末每服三錢水一盞五分煎取一盞空心連滓服服兩盞不妨苧麻湯治漏胎無故下血腹痛不可忍或下黃汁稠如漆如小豆汁野苧麻根二兩銼炒右以酒一碗水一碗加金銀花無則休用煎一碗服家種亦可用鄭氏人參湯出永類鈐方治漏胎敗血湊心日漸胎乾子母危困忌生冷雞鴨魚麵人參黃耆炙阿膠炒竹茹木香不見火甘草炙附子炮各半錢川芎一錢陳皮一錢苧根一錢生薑三錢炮黑右㕮咀每服四錢糯米三七粒水煎熱服尅效散出朱氏集驗方治漏胎用五倍子一味為末酒調下又方出朱氏集驗方用蓮子房燒化以麵糊丸湯酒任下治妊娠下血不止名曰漏胎取雞肝細銼以酒一升和服普濟方卷三百四十二
