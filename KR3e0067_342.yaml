body:
  text: 普濟方卷三百四十二明周王朱橚撰姙娠諸疾門安胎附論夫婦人姙娠常胎動不安者有衝任經虚胞門子戸受胎不實故也并有飲酒房室過度有所損動不安者巢氏云婦人衝任二經挾風寒而有胎故不以日月多寡因誤有擊觸而胎動者有喜怒不常氣宇不舒傷扵心肝觸動血脉衝任經虚乃至胞門不固或因登髙上厠風攻隂戸入扵子宫如此皆令胎動不安也或姙婦月信不絶而胎不損者何盖婦人血氣盛衰其人必肥既娠之後乃信常來而胎不動若誤以漏胎治之則胎必墮誠有此也又云婦人經閉不利别有所苦者是謂有子以其經血畜之以養胎擁之為乳汁也有子之後畜養胎矣豈可復能散動邪所以然者盖有娠而月信復至是亦未必因血盛也謂婦人榮經有風則經血喜動以其風勝則可也既榮經為風所勝則所來者非養胎之血以此辨之亦作漏胎治之必宜用保養補胎之藥且胎不損强以藥滋之乃所謂實實虚虚也其胎終墮宜矣若醫者知榮經有風之理專以一藥治風經信可止或不服藥胎亦無恙然而有胎不固或因房室不能節先漏而後墮者湏作漏胎治之此又不可不審也亦有婦人年方壮嵗致服補暖之藥而使胞門子戸反為藥所燥摶使新血不滋舊血不下設或有子不以遲晚則必墮中年之後氣宇漸衰必有崩中帶下之疾或月信愆期漸覺黄痩腰背不伸五心煩熱五勞七傷之疾從此而生不獨胞門子戸風寒而生也故千金翼方有朴硝盪胞湯正為此疾今之醫者未見有用又論姙娠胎動其由有二一因母病兒胎動但療母疾其胎自安若胎不堅固自動其母疾唯當安胎其母自愈一因勞役氣力或觸冒冷熱或飲食不節或居處失宜輕者轉動不安重者便致傷墮當以母形色察之母面色赤舌青者兒死母活唇口青兩邊沫出者子母俱死面青舌赤口中沫出者母死子活也又云孕婦不語非病也間有如此者不須服藥臨産月但服保生丸四物湯之類産下便語得亦自然之理非藥之功也醫家不說與人臨月則與尋常之藥産後能語則以為功豈其功哉按素問黄帝問曰人有重身九月而瘖也為何也岐伯對曰胞之絡脉也帝曰何以言之岐伯曰胞絡者繫扵腎少隂之脉貫腎繫舌本故不能言帝曰治之奈何岐伯曰無治也當十月復又云姙娠将養得所則血氣調和故兒在胎則安當産亦易若節適失宜則血氣乖理兒在胎則亟動至産育亦難而子上逼扵心者由産難用氣力胎動氣逆胎上衝逼於心者凡胎上逼於心則悶絶胎下乃甦甚者至死也又曰姙娠之人有宿挾疴疾而後有娠或有娠時節適乖理致生疾病並令臟腑衰損氣力虚羸令胎不長故湏服藥去其疾病益其氣血以扶養胎也夫姙娠羸痩或挾疾病臟腑虚損氣血枯竭既不能養胎致胎動而不堅固終不能安者則可下之免害姙婦也又云姙娠胎動有因母病以動胎有因胎動以病母二者皆不得安也母病則先治其母胎自安矣胎病則先治其胎母自安矣間有誤食毒物起居不慎氣疾為梗寒熱更作胎漏血下皆致胎動又宜隨所因以調䕶之方通靈散出醫學類證治姙娠三兩月胎動不安者何男女隂陽會通血氣調勻乃成其娠設若下血腹痛盖緣子宫久冷血海虚羸致令胎墮其危甚扵正産若姙娠曽受此苦可預服通靈散養胎人參附子炮熟地黄木香煨白术乾薑牡丹皮白芍藥陳皮去白黄耆蜜炙薯蕷甘草炙芎藭右各等分為細末每服二錢水一盞糯米四十九粒煎八分去米温服日二服忌一切毒物一方無人參保生丸出危氏方治姙娠将理失宜或勞役胎動不安腰腹痛重胞阻漏胎惡露時下或子臟挾疾乆不成胎或受姙不能固養痿燥不長過年不産日月雖滿轉動無力或致損墮及臨産節適乖宜驚動太早産時未至惡露先下胎胞枯燥致令産難或横或逆痛極悶亂連日不産子死腹中腹上冰冷口唇青黒吐出冰冷沫新産惡血上充連悶不省喘促汗出及瘀血未盡臍腹㽲痛寒熱徃來或因産勞損虚羸未復面黄體痩心怔盜汗飲食不進漸成蓐勞八月常服壮氣養胎正順産理潤胎易産産後常服滋養血氣和調隂陽宻腠理實腑臟治風虚除痼冷一切疾麻仁去殻一两當歸半两微炒乾薑炮肉桂去皮石斛去根秦椒去目閉口者炒出汗石膏硏如粉黄芩糯米貝母甘草炙赤大豆黄卷各一錢右為末煉蜜丸彈子大每一丸温酒棗湯化下空心嚼下亦可方内用黄芩麻仁性寒之藥人疑不服殊不知娠中有風風中有熱風熱既静其胎必固黄芩能去子熱麻仁能去子風亦可服參苓白术散一方用蒲黄一兩參苓白术散方見大方科胃腑門胃虚冷類安胎飲大腹皮洗人參去蘆陳皮去白白芍藥當歸中截川芎炒香附子炒縮砂仁炒紫蘇莖葉赤茯苓去皮甘草炙各等分右剉燈心七莖糯米半撮同煎服仍以猪肉擼聖功散食之仍服神功散解熱毒如治漏胎加阿膠百草霜桑寄生湯治姙娠胎動不安桑上寄生剉當歸切焙赤茯苓去黒皮木通剉訶梨勒炮取皮生乾地黄焙陳橘皮去白炒各一两白术芎藭各一两半莎草根去毛炒半两木香一錢右麄搗篩每服三錢以水二盞入生薑二片同煎至六分去滓温服日三加减安胎飲出危氏方凡婦人晝眠不起倦扵梳飾乾惡心擇食怕聞飯氣但醎酸止經候明矣氣血弱者宜服此兼進脾藥安胎温養令母臟氣平和隂陽全備免有損墮之患盛者受胎母無疾耳温胎保養之劑恐非所宜此方兼治胎動不安腹痛漏下或胎奔上刺心短氣大效漏胎下血不可用辛燥熱藥條參去蘆嫰黄耆去蘆湯芍藥大川芎粉草熟地黄酒洗切焙川續㫁去蘆側栢葉炒阿膠麸炒當歸去尾各等分右每服四錢水一盞半生薑三片金銀煎之如漏下不止加熟艾一握如胎動口噤唇青下利不止用熟艾一兩酒三盞煮至二盞去滓灌之即安桑寄生散出澹寮方治姙娠胎動不安下血不止胎漏經血妄行者何荅曰姙娠成形胎息未實或因房室驚觸勞力過度從髙墜下重物所壓傷動胞胎或食毒物致令子宫虚滑經血淋瀝若不急治敗血湊心子母難保日漸胎乾危亡不乆桑寄生當歸去蘆酒浸川續㫁酒浸芎藭香附子炒去毛阿膠剉蛤粉炒成珠茯神去木白术已上各一两人參甘草炙各半两右㕮咀每服四錢水一盞半薑五片煎至七分去滓温服不拘時候旋覆花湯出千金方治姙娠六七月胎不安常服之旋覆花一两半夏芍藥生薑各二两枳實厚朴去皮白术黄芩茯苓各三两右㕮咀以水一斗煑取二升半分五服日三夜二先食服忌羊肉餳醋桃李雀肉厚朴橘皮丸治胎動不安心腹痛厚朴去麄皮生薑汁炙一两陳橘皮湯去白焙一两木香一两白术一两半阿膠炙燥半两當歸剉焙乾薑炮訶梨勒皮各半两吳茱茰洗焙乾炒一錢右搗羅為末煉蜜丸如梧桐子大每服二十丸食前米飲下安胎飲治姙娠胎氣不安腹痛煩悶芎藭阿膠炙燥艾葉當歸切焙人參甘草炙剉白茯苓去黒皮黄耆剉麥門冬去心焙各一两右麄搗篩每服五錢以水一盞半煎八分去滓空心温服不拘時候紫蘇飲治姙娠胎氣不和懐胎近上脹滿疼痛謂之子懸兼治臨産驚恐氣結連日不下出簡易方當歸三錢甘草一錢大腹皮製人參川芎陳橘皮去白白芍藥各半两紫蘇一两右㕮咀每服半兩水一盞半薑四片葱白七寸煎至七分去滓空心温服一方加木香一方無川芎名七寳散昔日曽有一婦人累日産不下服遍催生藥不驗予曰此必坐草心懐恐慮氣結而然非順不順也素問云恐則氣下葢則精却却則上氣閉閉則氣還還則下焦氣乃不行矣得此藥服便産及婦人六七月子懸者予用此藥數數有驗不十服胎便近下注云恐則陽精却上而不下流故却則上焦閉也上焦既閉氣不行流下焦隂氣亦還廻不散而聚為脹也然上焦固禁下焦氣各守一處故氣不行也方出本事丁未六月間羅新恩孺人黄氏有孕七箇月逺去而歸忽然胎上衝心而痛坐卧不安兩醫治之無效遂說胎已死矣已用萆麻子皮硏爛加麝香調貼臍中以下之命在垂危召僕診視兩尺脉沉絶他脉平和僕問二醫者曰契兄作何證治之荅曰死胎也何以知之荅曰两尺脉絶以此知之僕問之曰此說出在何經二醫無荅遂問僕曰閣下作何證治之荅曰此子懸也若是胎死却有辨處面赤舌青者子死母活面青舌赤吐沫者母死子活唇舌俱青者母子俱死是其驗也今面色不赤舌色不青其子未死其證不安衝心而痛是胎上逼心謂之子懸宜紫蘇飲子治藥十服而胎近下矣若两足腫滿及身腫不必治産後自平亦有産後腫不退煮菉豆汁并豆任意食之自退安胎飲出仁存方治胎動不安非時轉動無故下血腰腹疼痛四肢沉重懈怠不欲執作及姙娠一切疾病並治之盖安胎之法必湏以藥順氣和胃自然無害川芎當歸熟地黄砂仁陳皮白芍藥炒白茯苓阿膠各一两右㕮咀每服四錢水一盞半葱白一根煎至七分去滓温服不拘時候阿膠散出聖惠方治姙娠胎動不安心神虛煩腹内疼痛阿膠一两搗碎炒令黄燥白茯苓麥門冬去心柴胡去苗各三錢甘草炙微赤剉黄芩當歸剉微炒各半两芎藭一两右搗篩為散每服四錢以水一鍾入生薑半分棗三枚煎至六分去滓不計時候稍熱服芎藭飲子出聖惠方治胎動不安心神虚煩芎藭三錢艾葉半两微炒阿膠三錢搗碎炒令黄燥糯米半合熟地黄一两棗五枚青淡竹茹生薑各半两右細剉和勻以水二大盞煎至一盞五分去滓不計時候分温三服如聖湯出濟生方治胎動腹痛胎動腹痛者何荅曰胎動腹痛其理不一盖緣飲食冷熱動風毒物或因再交揺動骨節傷犯胞胎其後多嘔氣不調和或服熱藥太過氣血相干急服順氣藥安胎不然變成漏胎則難安矣鯉魚皮當歸去蘆酒浸熟地黄酒蒸白芍藥川芎阿膠剉蛤粉炒成珠子川續㫁酒浸甘草炙各等分右㕮咀每服四錢水一盞半入苧根少許生薑五片煎至七分去滓温服空心食前縮砂湯出直指方治胎動腹脇腰痛或忍痛失氣胎又不動或血水間下縮砂桑寄生各半两當歸川芎艾葉炒阿膠酥炒各三錢南木香甘草炙各二錢右剉散每服三錢薑五片棗二枚煎服下血水者更以真料理中湯加縮砂佐之續㫁湯治姙娠胎動腹痛腰痛續㫁當歸焙芎藭桑上寄生剉各一两糯米一两阿膠炒燥艾葉炒竹茹各半两右㕮咀每服三錢水一盞煎至七分去滓温服不拘時候大安散治姙娠胎動腹痛蘹香子三两炒白茯苓去黒皮一两阿膠炒燥半两芎藭當歸桑上寄生剉甘草炙陳橘皮湯浸去白焙各三錢右為細散每服二錢温酒調下食前服如聖散出醫學類證治證同前如聖湯鯉魚皮阿膠麩炒芎藭當歸去頭尾青竹茹生薑乾地黄各二錢右㕮咀用水二盞煎至一盞去滓温服一方有乾薑白术散出十便良方治姙娠腹中冷胎動不安白术三錢草荳蔲去皮當歸剉微炒各一两甘草炙微赤剉乾薑炮裂剉芎藭各半两厚朴一两去麄皮生薑汁炙令香熟右搗篩為散每服三錢以水一中盞入棗三枚煎至六分去滓每於食前温服阿膠散出大全良方治姙娠不問月數深淺或因毒藥胎動不安腰痛腹滿或有所下或胎上搶心短氣熟地黄二两白芍藥艾葉當歸甘草阿膠黄耆各一两右㕮咀每服半兩水一大盞薑三片棗一枚煎至七分去滓温服無時一方有川芎無芍藥白术丸出大全良方調補衝任扶養胎氣治姙娠宿有風冷胎痿不長或失扵将理傷胎氣多治損墮娠孕常服益血保胎白术川芎阿膠炒地黄炒令焦六錢當歸去尾炒各一两牡蠣煆為粉二錢川椒三錢如常製右為末煉蜜為丸如梧子大空心米飲吞三四十丸酒醋湯亦可阿膠散出聖惠方治姙娠胎動腹中㽲