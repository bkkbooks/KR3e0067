body:
  text: 普濟方卷一百十九明周王朱橚撰積熱痼冷門總論一陰一陽之謂道偏陰偏陽之謂疾夫人一身不外乎陰陽氣血相與流通焉耳如陰陽得其平則疾不生陰陽偏勝則為痼冷積熱之患也所謂痼冷者陰陽沈痼而不解也積熱者陽毒藴積而不散也故陰偏勝則偏而為痼冷陽偏勝則偏而為積熱古賢云偏勝則有偏害偏害則治偏勝不可不察也大抵真陽既弱胃氣不溫復啖生冷氷雪以益其寒陰沍於內陽不能勝遂致嘔吐涎沫畏冷憎寒手足厥逆飲食不化大腑洞泄小便頻數此皆陰偏勝而為痼冷之證也其或陰血既衰三焦已燥復餌酒炙丹石以助其熱陽熾於內陰不能制遂致口苦咽乾涎稠目澀膈熱口瘡心煩喜冷大便閉結小便赤淋此皆陽偏勝而為積熱之證也施治之法冷者熱之熱者冷之痼者解之積者散之使陰陽各得其平則二者無偏勝之患矣常政大論云治熱以寒溫而行之治寒以熱涼而行之治溫以清冷而行之治清以溫熱而行之夫治熱以寒溫而行之者有三皆同大熱在身止用黃芪人參甘草此三味者皆甘溫雖表裏皆熱躁發於內捫而肌熱於外能和之汗自出而解矣此溫能除大熱之至理一也熱極生風及左遷入地補母以虛其子使天道右遷順行諸病得天令行而必愈二也況天熱在上大寒必伏於內溫能退寒以助地氣地氣者在人乃胃之生氣使正氣旺三也治寒以熱涼而行之者何也此亦有三皆同北方之人為大寒所傷其足腫脹乃寒勝則浮使之然也若火炙湯浴必烙肌見骨以新汲涼水浴之少時見完復矣更有大寒凍其面或耳若近火湯浴必脫皮或瘡須先於涼房處停步時以溫手烙尉必能完復此涼而行之除其大寒之理一也大寒之氣必令毋實乃地道右遷入肺逆行於天以涼藥投之使天道右遷而順天令諸病得天令行而必愈二也況大寒在外其大熱伏於地下者乃三焦包絡天真元氣所居之根蒂也熱伏於中元氣必傷在人之身乃胃也以涼藥和之則元氣充實而不傷三也諸熱論黃帝曰病熱當何禁之歧伯曰病熱少愈食肉則復多食則遺此其禁也因熱稍愈猶未盡除不戒飲食勞動情欲擾亂致脾胃氣虛未能消化堅食故熱復生五臟皆熱者以熱病乃傷寒之類也人之傷於寒則為病熱寒毒薄於肌膚陽氣不能散發而內為欎結故傷寒者反病為熱熱雖甚不死奈巨陽為首巨陽者諸陽之屬也諸陽為熱主氣諸陰為寒主血為熱病已愈其有復作謂病已衰而熱有餘所藏熱與穀氣相搏兩熱相合故有所遺之熱也雖邪氣稍退因遺熱在故當復作五臟俱熱者皆可覘肝熱左頰先赤心熱額先赤脾熱鼻先赤肺熱右頰先赤腎熱頤先赤肝熱者小便黃腹痛多卧身熱熱爭則狂驚脅滿手足躁而不得安卧心熱者不樂數日乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗脾熱者頭重頰痛心煩顔青欲吐身熱熱爭則腰痛不可仰腹滿泄兩頷痛肺熱者毫毛淅然厥起惡風寒舌上黃身熱熱爭則喘咳痛走胸壅背不得直頭痛不堪汗出而寒腎熱者腰痛䯒骨若折數飲身熱熱爭則項痛而強䯒寒且痠足下熱不欲言經曰汗出脈躁盛一死脈不與汗相應其病二死狂言失志者三死皆是怫熱鬱結不能解散以致危殆素問諸熱瞀瘛暴瘖冒昧躁擾狂越罵詈驚駭胕腫疼痠氣逆皆手少陽相火心胞絡三焦之氣也夫腎水真陰本虛心火狂陽積熱已甚以致風熱壅滯頭面昏眩肢體麻痺皮膚瘙癢筋脈拘倦胸膈痞滿時或痛悶或鼻窒齀衄口舌生瘡咽喉不利牙齒疳蝕或遍身生瘡癬疥或睡語咬牙驚惕虛汗或健忘心忪煩燥多睡或大小便澀滯或煩熱腹滿或酒食積毒勞役過度中外一切勞損神狂氣少心志不寧口苦咽乾飲食減少變生風熱諸疾虛羸困倦或久病瘦捽及老弱虛人或脾腎經虛風熱燥鬱色黑齒稿身瘦焦痿或熱中煩滿飢不欲食或脾盛消食善食而瘦或消渴頭靣多虛浮數小便或服甘辛熱藥過度變成三消上則消渴中則消中下則消腎小便白膏也凡人患大熱皆須候脈若人大熱者不得一準方用藥皆準病用藥大熱不可那者當兩倍三倍若大熱甚乃至十倍用之乃可制之爾有人若熱不已皆由服金石所致種種服餌不能制止惟朴硝煎可以定之武德中有髙貴人師市遺之紫雪散方此方祗用二硝寒水石石膏可也可不用金有金者髙貴人所加也有表而熱者謂之表熱無表而熱者謂之裏熱有暴熱者病在心肺有積熱者病在腎肝治暴熱者局方雄黃解毒丸積熱者局方妙香丸暴熱心肺上喘者謂之高喘木香金鈴散主之上焦熱而煩者大黃散主之臟腑祕者牛黃散主之有上焦熱而無他證者桔梗湯主之有病久憔悴發熱盜汗謂之五臟齊損此熱勞骨蒸之病也損瘦弱虛煩腸癖下血皆蒸勞也治法宜養血益陰熱能自退此謂不治而治也錢氏地黃丸主之煎酒麵煎􅏼雄附峻補皆能生熱謂之積者何哉夫人偏陰不可以無陽偏陽不可以無陰惟在冷熱得中而已矯枉過正識者憂焉然則欲去積熱將何如曰三黃湯丸第一藥耳雖丸熱甚則能傷血熱出於心洗心散所不可闕熱能傷血四順清涼飲又不可無此窮源探本之論也若夫酒後之麵飯後之酒最易積熱又當防於未然經曰諸轉反戾水液渾濁皆屬於熱諸燥狂越皆屬於火內嗅而潮燥言讝結中便澀外攻即腫毒目赤瘡堵咽喉火熱炎上治以寒涼酸苦滌腸泄而勿補方紫雪出和劑方療腳氣毒遍內外煩熱不解口中生瘡狂易呌走瘴疫毒厲卒死溫瘧五尸五疰心腸諸疾疞刺痛及解諸熱藥毒發邪熱卒黃等并解蠱毒鬼魅野道熱毒又治小兒驚癎百病黃金一百兩石膏寒水石磁石滑石已上四味各三兩斤搗碎水一斛煮至四斗去滓入下項犀角屑羚羊角屑青木香搗碎沈香搗碎各五兩玄參洗焙搗碎升麻各一斤甘草銼炒八兩丁香一兩搗碎已上八味入前藥汁中再煮取一斗五升去滓入下項朴消精者十斤肖石四升如闕芒肖亦得每升重七兩七錢半已上二味入前藥汁中微火上煎栁木箆攪不住手候有七升投在木盆中半日欲凝入下項硃砂飛研三兩麝香當門子一兩三錢半研已上二味入前藥中攪調令勻寒之二日右藥成霜雪紫色每服一錢或二錢用冷水調下大人小兒臨時以意加減食後服消痞丸出宣明論治積濕熱毒甚者身體面目黃心脅腹滿嘔吐不能飲食痿弱難以運動咽嗌不利肢體焦尫眩悸膈熱坐卧不寧心火有餘而妄行上為咳血衄血下為大小便血腸風痔痿三焦壅滯悶痺熱消渴傳化失常小兒疳積熱黃連去鬚乾葛各一兩青黛研一兩牽牛二兩黃芩大黃黃蘗梔子薄荷藿香厚朴去皴皮茴香炒各半兩木香㨂桂各二兩右為細末滴水丸如小豆大每服十丸新水下溫水亦得小兒丸麻子大病本濕熱內餘本自利者去大黃牽牛忌發熱諸物龍腦丸出本事方治胸中鬱熱肺熱喘嗽口臭喉腥脾疸口乾丈夫吐血婦人血崩並皆治之真蒲黃一兩麥門冬去心二兩阿膠一兩甘草一兩半人參一兩川當歸去蘆一兩黃耆一兩半木通一兩生乾地黃三兩龍腦薄荷五兩淨葉柴胡右為細末鍊蜜丸如桐子大每服二十丸病上焦飯後用熟水吞下微嚼破更好病下焦空心服小兒加減與之犀角丸治積熱胸膈有停滯犀角黃連黃芩橘皮滑石大黃各三兩牽牛頭末四兩檳榔木香薄荷青皮川芎各一兩右為細末滴水為丸如桐子大每服丸數量人虛實常服溫暖丹田麝香上清丸出仁存方治心經有熱咽膈不利目赤口渴小便不利辰砂一兩馬牙硝天竺黃甘草各半兩海金砂防風滑石麝香腦子各一分牛黃半錢吉荷半兩右研細蜜丸每一兩作十五丸金箔為衣每服一丸細研薄荷湯下一方有川芎防風石膏各一兩餘藥同煎一方無吉荷真珠散出和劑方治男子婦人五臟積熱毒氣上攻心胸煩悶口乾舌燥精神恍惚心忪悶亂坐卧不寧並宜服之苽蔞根末琥珀真珠粉寒水石煅碎醋研鐵粉硃砂研飛甘草生川大黃牙硝枯研右等分為末拌勻每服一錢以竹葉湯溫調下不拘時候防風散治積熱上衝頭熱火痛入頂中防風去蘆羌活去蘆薄荷去粗根當歸去尾大黃梔子去皮川芎各一兩蟬退二十箇去足翼粉草五分右為散每服四錢水一盞半燈心二十莖苦竹葉十片煎食後服一方無粉草碧雪治一切積熱咽喉腫痛口舌生瘡心中煩燥咽食妨悶或喉閉壅寒水漿不下天行時疫發狂昏憒並皆治之芒硝青黛石膏煅過研飛寒水石研飛朴硝硝石甘草馬牙硝各等分右將甘草煎湯二升去滓却入諸藥再煎用栁木箆不住手攪令硝溶得所却入青黛和勻傾入砂盆內候冷結凝成霜研為細末每用少許含化咽津不拘時候如喉閉塞壅不能咽物者即用小竹筒吹藥入喉中即愈頻神效天門冬飲治上膈壅盛咽喉腫痛唇焦舌乾腮頰生瘡痰熱煩渴天門冬去心三分紫蘇葉半兩百藥煎半兩黑參細實者湯浸洗焙乾牛旁子炒甘草微炙已上三味各一兩人參去蘆頭硼砂别研腦子别研已上三味各二分右為細末和勻煉蜜為丸每一兩作二十丸每服一丸細嚼生薑湯下食後臨卧服涼膈散治大人小兒腑臟積熱煩燥多渴面熱頭昏唇焦咽噪舌腫喉閉目赤鼻衄頷頰結硬口舌生瘡疾實不利涕唾稠粘睡卧不寧譫語狂妄腸胃燥澀便溺祕結一切風壅冝服一方加黃連半兩名黃連清心湯川大黃朴硝甘草爁各二十兩山梔子仁薄荷葉去梗黃芩各十兩連翹二斤半右粗末每服三錢水一盞入竹葉七片蜜少許煎至七分去滓食後溫服小兒可服半錢更隨歲數加減服之得利主服一方咽嗌不利腫痛并涎嗽者加桔梗一兩荆芥穗半兩咳而嘔者加半夏二錢半生薑煎鼻衄嘔血者加當歸芍藥生地黃各半兩一料內如淋閟加滑石四兩茯苓一兩或閟而不通臍下收如覆碗痛悶不可忍乃腸胃乾涸膻中氣不下故經所謂膀胱者州都之官津液藏焉氣化則能出矣故膻中者臣使之官名三焦相火下合在腎為氣海也王注曰膀胱津液之腑胞內居之腹少處間毛內藏胞器若得氣海之氣施化則溲便下注氣海氣之不及則閟飲不通故不得便利也先用木香沈香各三錢酒調下或八正散甚則宜上湧之令氣通達小便自通經所謂病在下上取之王注曰熱攻於上不利於下氣盛於上則溫辛散之苦以利之七寶洗心散治寒壅不調鼻塞聲重咽乾多渴五心煩熱小便赤澀大便祕滯及風壅壯熱頭目昏痛肩背拘急肢節煩疼熱氣上衝口苦唇焦咽喉腫痛痰涎壅塞涕唾稠粘心神煩燥眼澀睛疼一名瀉散大黃麵裹煨去麵焙芍藥甘草炙麻黃不去節當歸荆芥穗各六兩白术右為細末每服二錢水一盞薑二片薄荷三葉同煎七分溫服小兒麩豆瘡疹欲發先狂語多渴及驚風天吊可服一錢並臨卧服大人五臟壅實欲要溏泄加至四五錢熱服天笠散治臟腑積熱煩燥多渴口舌生瘡咽喉腫痛山梔子去殼連翹各三錢甘草三兩二錢苽蔞根二兩六錢雞冠雄黃半錢鬱金用皂角水浸切片焙乾三錢天竺黃五錢右為末每服一錢食後臨卧新汲水調一方無天竺黃朴硝煎朴硝一斤芒硝八兩寒水石四兩石膏金各二兩右先納二硝於八升湯中攪令消以好紙密封一宿澄取清納銅器中别搗寒水石石膏碎如豆粒大以絹袋盛之納汁中以微火煎候其上有沫起以筯投中著筯如凌雪凝白急下瀉著盆中待凝取出烈日曝乾積熱困悶不已者以方寸匕白蜜一合和冷水五合攪和令消頓服之日三服熱定即止治積熱方枳實黃芩大黃黃連芒硝各二兩右為末蜜丸如桐子大空心酒服三十丸加至四十丸日一服治熱𧈟煩滿不能食以狶蘞生搗汁服三四合多則令人吐治熱氣消食以簷羅