右㕮咀水三升煎至一升去滓分三服不拘時候服竹茹散出楊氏家藏方治大腸實熱心神煩燥口內生瘡羚羊角三分青竹茹一兩黃芩山梔子仁黑參紫蘇葉木通杏仁湯浸去皮尖麩炒微黃色朴硝一兩别研甘草半兩炙赤大黃一兩銼炒右為粗末每服三錢水一盞至六分去滓入生地黃汁一合再煎一兩沸溫服不拘時候利膈湯出濟生方治上膈壅熱口苦咽乾痰唾稠粘心煩喜冷咽喉生瘡疼痛但是一切上壅之證皆可服之防風去蘆雞蘇葉桔梗去蘆牛旁子川升麻人參甘草炙各半兩荆芥穗右㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候黃耆膏子煎丸出濟生拔萃方除煩解勞去肺熱􅠲衄心熱驚悸脾胃熱口乾吐血肝膽熱泣出口苦腎熱神志不定上而酒毒膈熱消渴下而血滯五淋血崩等疾人參白术各一兩半柴胡黃芩各一兩白芷知母各半兩甘草半兩炒鱉甲一箇半手大者酥炙右為細末黃耆膏子丸如桐子大每服三五十丸百沸湯下空心右用黃耆半斤粗末水二斗熬一斗去滓再熬令不住攪成膏至半斤入白蜜一兩再熬令蜜餳熟得膏十兩放冷丸藥神芎丸出鮑氏丸治感熱氣閉藏氣不舒而成痛大黃三兩黃芩二兩滑石四兩黑牽牛四兩薄荷半兩川芎半兩右為末蜜丸每服十丸欲泄多服冷氣加丁香通膈丸出本事方治上焦虛熱肺脘咽膈有氣如煙搶上黃連茯芩人參各三兩硃砂一分真腦子少許右細末研勻煉蜜丸如桐子大熟水下三五丸日三二服牛黃宣毒丸治壅熱內攻胸膈不利或遍身搔癢口唇生瘡咽膈不利與當歸順氣飲子為表裏大黃芒硝黃連不見火黃蘗黑牽牛微炒各等分右為細末水丸如梧桐子大每服百丸用當歸順氣飲子送下渾身瘙癢足脛生瘡膿爛腥臭久而不已用蜜水下二百丸治膈上熱方苦參十兩玄參五兩麥門冬二兩車前子二兩右為末蜜丸如桐子大一服十五丸日二服大黃散治上焦虛煩熱不能睡卧梔子仁大黃欎金各半兩甘草二錢半右為細末每服三四錢水煎食後服微利則已滋腎丸治不渴小便閉邪熱在血分也黃蘗三兩細銼酒拌陰乾知母二兩酒浸隂乾肉桂一錢半右上二味氣俱隂以同腎氣故能補而㵼下焦火也桂與火邪同體故曰寒因熱用凡諸病在下焦皆不渴也熟水為丸百沸湯下青金丹清心解熱陰潮治譫語舌生白胎痰盛氣壅煩渴引飲反時行熱極生風大人小兒均可服並時行熱疫發熱如火連日不愈者天門冬去心麥門冬各一兩天麻二分全蝎大者五箇牙硝二錢天竺黃二分硼砂一錢雄黃一錢白附子二錢紫粉四錢辰砂一錢片腦子半錢生麝香半錢金銀箔各十片水粉一兩右另研腦麝辰砂水粉金銀箔同前藥末入白麵二兩水丸以靛花為衣如筯頭大每丸用麥門冬生地黃燈心薄荷煎湯磨化服合時加甘草人參尤妙地黃煎治熱地黃汁四升三合茯神知母萎㽔各四兩栝萎根五錢竹瀝三合一方用竹葉生薑汁生地骨皮白蜜生麥門冬汁各二升石膏八兩右㕮咀以水一斗二升先煮諸藥取汁三升去滓下竹瀝地黃麥門冬汁微火煎四五沸下蜜薑汁微火煎取六升初服四合日三夜一加至五六七合四月五月作散服之半夏湯治胸中客熱心煩滿氣上大小便難半夏一升生薑八兩前胡四兩茯苓白术各五兩甘草一兩黃芩人參各二兩杏仁枳實各三兩右㕮咀以水九升煮取三升分三服胸中大熱者沈冷服之大小便澀加大黃二兩一方用梔子仁二兩為十一味防風當歸飲子如煩渴發熱虛煩蒸病空心服地黃丸食後服此藥柴胡人參黃芩甘草各一兩滑石三兩大黃當歸芍藥各半兩防風半兩右為粗末生薑同煎服如痰實咳嗽半夏一方無防風發表解表升麻湯治遍身壯熱骨節疼痛升麻一錢柴胡七分當歸五分羌活蒼术各一錢防風八分甘草七分藁本五分橘皮三分加麻黃春加去節冬加不去節右㕮咀作一服水煎去滓溫服後以蔥醋湯發之和中丸治口燥舌乾咽嗌不利胸膈痞滿心腹痛悶小便赤澀大便結實治風氣怫鬱頭目昏眩筋脈拘急肢體疼倦一切風壅常服寬膈美食消痰止逆牽牛滑石各二兩官桂木香各一分大黃紅花一作紅皮黃芩茴香各半兩右為末滴水如小豆大每服二十丸煎生薑湯下溫水亦得日三服無時候大黃湯治大人小兒五臟積熱煩燥多渴唇烈喉閉赤鼻衄頷頰結硬口舌生瘡陽明正傷寒發狂見鬼譫語大小便祕一切風壅並皆治之川大黃二兩山梔子一兩朴硝二兩連翹二兩薄荷二兩去枝根梗甘草一兩乾葛二兩赤芍藥一兩右為銼末每服二錢水一盞入竹葉七片蜜三匙同煎至七分去滓食後服唯陽明證傷寒空心下又方白术荆芥赤芍藥各三兩大黃車前子各二兩生用木通三兩甘草二兩川當歸右為細末大便祕結米泔調三錢空心服上膈壅熱或生丹毒或如癰癤用水二盞煎二錢服小便結如淋狀用蘆根打碎淨洗煎湯調下五心煩熱生薑二片同煎三錢服涼藥丸子治五臟伏熱痰壅煩燥口舌生瘡大便祕小便赤澀小兒驚疳連翹一兩半牙硝甘草生各一兩二錢大黃一兩石膏半兩薄荷葉梔子菉豆粉各二分右為末煉蜜為丸如彈子大每服一二丸水化食後日進二服治心肺五臟熱毒氣用苦竹根細銼一斤水五升煮取汁一升分三服木通散治諸熱利小便生乾地黃木通荆芥地骨皮桑白皮炒甘草炙北梗各等分右銼每服三錢薑三片同煎服竹茹湯治虛心煩悶內熱不解竹葉麥門冬去心人參茯苓去皮小麥炒半夏泡各一兩甘草半兩炙右㕮咀每服四錢用水一盞半薑五片煎至七分去滓不拘時候溫服木香金鈴散治暴熱心肺上喘不已大黃半兩金鈴子三錢木香三錢輕粉少許朴硝二錢右為末桑白皮湯調下食後三錢或四錢以利為度喘止則已犀角散治五臟積熱黃連大黃芍藥犀角甘草各等分右為粗末每服五錢水一盞煎至七分去滓溫服無時細丸治客熱結塞不流利方大黃葶藶各三錢香豉二合杏仁巴豆各五分右五味為末蜜丸如桐子大每日飲服二丸以利為度管仲散解一切諸熱毒或中食毒酒藥毒等並皆解之黃連管仲甘草各三錢駱馳峯五錢右為細末每服三錢冷水調下神芎丸治一切熱證常服治腎水真陰本虛心火狂陽積甚以治風熱壅滯頭目昏眩肢體麻痺皮膚瘙癢筋脈拘倦胸膈痞滿時或痛悶或鼻窒􅍠衄口舌生瘡咽喉不利牙齒甘蝕或遍身多生瘡疥或睡語咬牙驚惕虛汗或健忘心忪煩燥多渴或大小便澀滯或煩熱腹滿或酒過積毒或勞役過度中外一切勞損神狂氣亂心志不安口苦咽乾飲食減少變生風熱諸疾虛羸困倦或酒病瘦悴及老弱虛人尤宜服之或脾腎陰虛風熱燥鬱色黑齒稿身瘦耳焦或熱中煩滿飢不欲食或疸成消中善食而瘦或消渴多飲而數小便宜常服大黃黃芩各二兩牽牛滑石各四錢右為細末滴水為丸如小豆大溫水下十丸至十五丸每服加十丸一二服冷水下亦得或煉蜜丸愈佳或久病熱鬱無問瘦悴老弱并一切須可下者始自十丸每服加十丸以利為度如常服此藥但除腸垢積滯不傷和氣推陳致新得便快並無藥燥搔擾亦不困倦虛損頗遂病人心意或熱甚必須及下者便服四五十丸未利再服以意消息三五歲孩兒丸麻子大凡此一法此藥至善常服二三十丸下利臟腑但有益且無損或婦人血下惡物加桂枝半兩病微者常服病重者亦取利因而結滯開通惡物自下也此方除臟腑滑泄者或重寒脈遲者或婦人經病産後血不止者但孕婦等則不宜服此外一切風熱雜病煩悶壅塞神氣不和或平人保養常服自顯其功若以效驗觀其藥味則非明本草造化之理者不可得而知其然也猶孔子讚易道明顯應化萬仁之善而不見其大道之功用故曰顯諸仁藏諸用因名藏用丸一法加黃連川芎薄荷等各半兩治一切頭目昏眩者愈大金花丸治中外諸熱寢汗咬牙睡語驚悸溺血淋悶嗽血衄血瘦弱頭痛並骨蒸肺痿喘嗽大便黃米榖完出一法去大黃加梔子名梔子金花丸又名既濟解毒丸黃連黃蘗黃芩大黃各半兩右為末滴水丸如小豆大每服三十丸新汲水下自利去大黃加梔子半兩小兒丸如麻子大三五丸四生丸治一切熱疾常服潤肌膚奈老諸熱證皆可服大黃牽牛皂角各二兩朴硝半兩右為末滴水和丸如桐子大每服三十丸白湯下百十丸服至三十丸食後服之當歸承氣湯治熱攻於上不利於下陽狂奔走罵詈不避親疏大黃當歸各一兩甘草炙半兩芒硝九錢右㕮咀每服二兩水一大碗入生薑五片棗十枚煎半碗熱服此陽有餘陰不足大黃芒硝去胃中實當歸補血益陰甘草暖中加生棗胃屬土此引至於胃中也經所謂微者逆之甚者從之此之謂也以大利為度微緩以瓜蒂散加防風䔧蘆得吐立愈後調法洗心散涼膈散解毒湯等藥調治之黃連解毒湯治五臟積熱赤目口瘡咽喉糜爛酒毒煩燥傷寒蓄熱在中身熱狂燥昏迷不食黃連黃蘗黃芩大梔子已上各等分右銼為麻豆大每服五錢水二盞煎至八分去滓溫服如腹滿嘔吐欲作利者加半夏茯苓厚朴各三錢生薑同煎如白膿下痢後重者加大黃三錢海藏加防風連翹為金花丸治風熱加柴胡治小兒潮熱與四物湯相合各半亦治婦人潮熱八正散治大人小兒心經邪熱一切藴毒咽乾口燥大渴引飲心忪面熱煩燥不安目赤睛疼唇焦鼻衄口舌生瘡咽喉腫痛又治小便赤澀或癃閉不通及熱淋血淋車前子瞿麥萹蓄或用薄荷代白滑石甘草梔子仁木通去皮節大黃各半斤右銼散每服三錢水一盞半用燈心十莖煎食後臨卧溫服小兒量力少與之或加麥門冬去心尤妙儒門事親書加木香一兩尤佳海先丸治諸伏熱頭目不清神志昏塞解諸大毒以取水之精漬於船板木中縷見風日久則日灸變為清色以取大陽之氣水見太陽之氣而熾曝中有陰陽之氣結而不散聚而為清服之分陰陽去邪熱調腑臟聖人處治以度物之氣味所用且如東壁牆上土取之以新水調化取清氷服之治腑臟不調謂脾主於土脾受濕濡瀉取以太陽真火其土引入於脾藉太陽真火之氣以除去其濕而吐瀉得止又以魚骨入喉中肉不出燒魚網灰新水調服其魚骨即時便出又有月蝕瘡不愈者令人燒救月鼓杖灰乾糝瘡上立已聖人取其物類相感故也且船板青與上同意船板青五兩酥油餅末一兩半右為細末稀麵和丸如桐子大每服四五十丸酒送下無時候黃耆當歸湯治熱上攻頭目沿身胸背發熱目赤面紅煩渴引飲晝夜不息其脈洪大而虛重按全無通評虛實論云脈虛血虛脈實血實又云血虛發熱證象白虎惟脈不長實為辨也若誤服白虎湯死此病得之於肌困勞役當歸身一錢酒洗黃耆半兩右㕮咀水煎服之食前牛黃散治一切熱毒黃疽衄血發班口咽瘡爛吐血便血時氣發狂神昏不省川大黃鬱金各一兩右為細末每服二錢雞子清汁調下加減服之黃連湯治一切熱血熱眼熱酒熱並主之用黃連去鬚銼碎以井水浸良久磁碗盛之置鐵銚血膈湯洮取清汁服再洮治五臟邪氣厭穀者治脾胃腸澼大渴熱中暴疾惡瘡用邪蒿以煮令熟和醬醋食之治骨節熱積漸黃瘦用大黃四分以童子小便五大合煎取四合去滓空腹分為兩服如人行四五里服普濟方卷一百十九
