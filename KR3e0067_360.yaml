body:
  text: 普濟方卷三百六十明周王朱橚撰嬰兒初生門總論辨小兒初受氣凡小兒受氣在娠一月胚二月胎三月血脈生四月形體成五月動六月筋骨立七月毛髮生八月臟腑具九月骨氣入胃十月百神備而生生後六十日目瞳子成能頦笑識人百日任脈生能反覆百八十日尻骨成能倨二百一十日掌骨成能匍匐三百日髓骨成能獨倚三百六十日為一期膝骨成乃能行此是定法若有不依期者必不壽也相貌壽法兒初生呌聲連延相屬者壽絶而復揚急者不壽啼聲散不成人啼聲短不成人臍中無血者好臍小者不壽通身軟弱如無骨者不壽鮮白長大者壽自開目者不成人目視不正數動者大非佳汗血者多厄不壽汗不流不成人小便凝如脂膏不成人頭四破不成人常搖手足者不成人早坐早行早齒早語者皆惡性非好人頭毛不周匝者不成人髮稀少者強不聼人頭上有旋毛者早貴妨父母兒生枕骨不成者能言而死尻骨不成者能踞而死掌骨不成者能匍匐而死踵骨不成者能行而死臏骨不成者能立而死身不收者死魚口者死股間無肉者死頥下破者死隂不起者死隂囊下白者死赤者死卵縫通達黑者壽小兒三嵗已上十嵗已下視其性氣髙下即可知其夭壽大略兒小時識悟通敏過人者多夭大則項橐顔回之流是也小兒骨法成就威儀回轉遲舒稍費人精神雕琢者壽其預知人意回旋敏達者亦夭即楊修孔融之徒是也由此觀之夭壽大略可知也亦猶梅花早發不覩嵗寒甘菊晚成凋於霜後是知晚成者壽之兆也論初生諸疾并治法夫今之孕婦懷胎習以為常飲食不節起居不冝未誕之前勞役衆苦男子視胎以為常恣其所欲任其所施頻受觸穢所以生兒之後百脈致虛三焦不順關竅不通榮衛不和者初生之間便作疾患怪異多端不可得而詳述今舉二十有六證候槩而言之審其彼此兼與之療理而助其榮衛調順經絡得冝而已呵者即張口而又合之欠者謂神不足故名呵欠非是疾病初生孩兒多有此象不足怪訝錢氏有謂呵欠遁悶良由胎氣怪弱榮血不壯衛氣少順即不蔭心血不蔭心血則神不守神不守則呵欠遁悶無他患也古方有硃砂審法用煎人參湯調和飲之者不若定志丸五七粒麥門冬湯化開與服至妙也伸者突其胸堂展其氣脈舒者引其頭頸直其手足努而作之良久復作初生孩兒多有亦非病也良由母懷胎胞起坐不得寬展或將絹帛兜束肚皮或繫襠褌勒縳太緊或卧後盤旋或睡不轉側是故偃抑胎囊氣失舒暢降生之後自然如此老嫗知與挼揉未知調其百脈冝將五术湯浴之功效用桃李槐桞皂策各取枝煎湯候溫與浴仍與觀音散少少與服效肺口之氣壅腠理不通外感寒邪或已傷風關竅閉塞鬱鬱于中及至噴嚏方有少解不能發漸入胸堂遂生痰熱既有痰疾即加之咳嗽輕則氣促短急重則驚風搐搦搐搦之利若在初生尚云不可冝與消風散服咳嗽冝與金沸草散人參羌活散二藥皆和且順雖則嫩弱服之無恙其劑溫純化痰利膈口胎乃育形臍乃根本胎氣固則形體壯肚臍深則根命長受氣乖遺形萎臍突凡兒斷臍後漸長漸深吮乳調和愈固愈實是血脈之相順致形體之相資初生之兒有熱在胸堂則頻頻伸引厄厄作聲努脹其氣抑入根本之源所以臍突腫赤虛大無可畏無識之夫將謂斷臍之不利而使之然者非也臍斷不盈尺一月之內隨其根蒂而腐實者深之弱者淺之深淺之理以其稟賦得此乃多由胎中母多驚悸或因食熱毒之物有此宜與大連翹飲子其熱自散其臍歸本不必以藥傅之恐毒傷入為害初生三五日之間使有舉目上竄將身反張雖其非疾所致情實駭人凡醫工必作驚風療之其實非也推其所由兒在胎中受飲食熱毒之氣藴在胸生下三日之前宜與黃連去熱膩粉散毒古人預計利害且又與人參朱蜜湯皆清心肺積毒既化兒獲無恙若不如此所生箇箇反張上竄或有不患此者鄙婦不思恣噉熱毒之物何足怪哉或投驚風涼藥亦愈但須明其所以用藥智者裁之萬一不由驚風所傳當與詳悉凡嬰兒失之灌溉長必焦萎兒誕後失乳哺壯必怯弱凡兒在胎前和氣養之降生則美乳蔭之其氣襄則胎不壯其乳敗則兒不長食不兼乳乳飽即不食亦無咎也惟食無乳禍害生焉是故乳不可失食不可不節乳失時兒不病自衰食失時兒無疾自怯乳者壯其肌膚食者厚其腸胃所謂乳哺二周三嵗則益其體今人未周奪其乳入月恣肥甘豈不致疾鐘洪聲大澗達流長緣處胞胎之中受氣充足水火兼濟心腎不虧耳目兩竅相通大小二腸相佐喉以發聲清響洪亮者根固本壯稟賦崇實乃自然之理也初生啼哭發聲不出厄厄而作鬱鬱而為其或短吸上下氣不相乘醫與果訣云此由胎氣不足何用投藥假使成人父母不恱根本不壯何煩藥餌如果木之萎又奚宜也古方常用父母呼呵及以蔥尉令聲發越難挽自無根本産子育兒當知其理人之受胎應數降生之後不拘貧富其子皆以精神全氣脈壯視聽欣喜取與喜怒周晬之間於人事情懷意旨撫叱以知其逆順方可謂孩兒性識之本也其或周晬已過不認名不偎親常常皺顔容喎臉含啼東喚西向南呼北面其坐若木其臥若尸其行即蹶其立若掇筋氣脈柔怯虗弱食不辭飽渴不知飲若或長成一定庸蠢如此胎氣月數不足者難保千日胎氣已滿産降必令畫一而氣包血養開九竅以通連在乎十月之中形骸已具分娩片時之內榖道無穿或緣其在胎中已空九竅若不通利如何四體百骸遂能生長斯由熱壅所致肺經之極結於肛口閉而不通降生之後無復滋潤乾燥而合若投寒涼之藥愈閉不通若下溫平之藥而又不通者即是兒氣不順腸胃虛澀榖道乾燥閉合可畏方不詳載藥無速驗至於此等所受須當以物透而通之金叉為上玉簪次之蘇合香丸內入孔中凡刺三寸許屎出為快曽見肛門肉合小便通利大便至死無能通者愚鄙燒火筯刺之事出不得已既然肉合決無竒方試以金玉重力刺之有勝火筯又有初生胎熱一二日不通者與服洗心散以通為度四順飲加荆芥煎亦良産婦血敗者當下榮者化乳血下不盡毋致其疾乳有不調兒招其病凡兒吮其乳有不到於胸堂氣滯積阻或令兒餓久乃吮出或問其無恙否曰不宜也久吮令兒困力乏氣怯肌羸脾家若虛遂作癎疾及至成疾脾風定矣初生與周晬之兒胃氣未備榖食未全藉吮乳快和無恙自然臟腑充百脈順肌體壯神氣清其或母用性不順則氣血亂而乳汁不和乳汁不和令兒哯逆宜乎速與療理若作尋常必致害生小沉香煎及鹽豉丸兼與服之乳母宜服藿香正氣散加枳术至良論新生將護法小兒初生先以綿裏指拭兒口中及舌上青泥惡血此謂之王衡音作御若不急拭啼聲一發即入腹成百病矣兒生落地不作聲者取暖水一器灌之須臾當啼兒生不作聲者此由難産少氣故也可取兒臍帶向身却呵之令氣入腹仍呵之至百度啼聲自發亦可以蔥白徐徐鞭之即啼兒已生即當舉之舉之遲晚則令中寒腹內雷鳴須先浴之然後斷臍不得以刀子割之須令人隔單衣物咬斷兼以暖氣呵七遍然後纒結所留臍帶令至兒足䟗上短則中寒令兒腹中不調當下痢若先斷臍然後浴則或水入臍中致令發腹痛其臍斷訖連臍帶中多有蟲宜急剔撥去之不爾入兒腹成疾斷兒臍者當令長六寸長則傷肌短則傷臟不拘時斷若挼汁不盡則令暖氣漸微自生寒令兒臍風生兒宜用其父故衣褁之生女宜其以母故衣皆勿用新帛為善不可令衣厚令兒傷皮膚害血脈發雜瘡而黃兒衣綿帛特忌厚熱慎之慎之凡小兒始生肌膚未成不可暖衣暖衣則令筋骨緩弱宜時見風日若都不見風則令肌膚脆軟便易中傷皆當以故絮衣之勿用新綿也凡天和暖無風之時令母將兒日中嬉戲數見風日則血凝氣剛肌肉牢密堪耐風寒不致疾病若常在幃帳之中重衣溫暖譬猶隂地之草木不見風日軟脆不堪風寒也凡褁臍法椎治白練令柔軟方四寸新綿厚半寸與帛等合之調其緩急急則令兒吐哯兒生二十日方解視臍若十日兒怒啼似衣有刺者此或臍燥還刺其腹當解之易衣更褁褁臍時閉戶下帳然火令帳中溫暖換衣亦然仍以溫粉粉之此謂冬時寒也若臍不愈燒絳帛末粉之若過一月臍有汁不愈燒蝦蟆灰粉之日三四度若臍中水及中冷則令兒腹絞痛大糾啼呼面目青黑此是中水之過當炙綿絮以慰之不時治護臍至腫者當隨輕重即便灸之乃可至八九十壯輕者臍不大腫但出汁時時啼呼者搗當歸末和胡粉傅之炙絮日尉之至百日愈以啼呼止為候若兒糞青者冷也與臍中水同兒洗浴斷臍竟綳袍畢未可與朱蜜宜與甘草湯以甘草如手中指一節許打碎以水二合煮取一合以綿纒沾取與兒吮之連吮汁計得一蜆殼入腹止兒當快吐吐去心胸中惡汁也如吐餘藥更不須與若不得吐可消息計如飢渴須臾更與之若前所服及更與並不得吐者但稍稍與之令盡此一合如得吐去惡汁令兒心神智慧無病也飲一合盡都不吐者是兒不含惡血耳勿復與甘草湯乃可與朱蜜以鎮心神安魂魄也兒新生三日中與朱蜜者不宜多多則令兒脾胃冷腹脹喜隂癎氣血變噤痙而死新生與朱蜜法以飛鍊硃砂如大豆許以赤蜜一蜆殼和之以綿纒筯頭即取與兒吮之得三沾止一日令盡此一豆許可三日與之則用三豆許也勿過此則傷兒也與朱蜜竟可與牛黃如朱蜜多少也牛黃益肝膽除熱定精神止驚辟惡氣除小兒百病也新生三日後應開腸胃助穀神可研米作厚飲如乳酪厚薄以豆大與兒咽之頻咽三豆許止日三與之滿七日可與哺也兒生十日始哺如棗核二十日倍之五十日如彈丸百日如棗若乳少汁不得從此法當用意小增之若三十日而哺者令兒無疾兒哺早者不勝榖氣令生病頭面身體喜生瘡愈而復發令兒尫難養三十日後雖哺勿多若不嗜食勿強與之強與之不消復生疾病哺乳不進者腹中皆有痰癖也當以四物紫微丸下之節哺乳數日便自愈小兒微寒熱亦當爾利之并當下之然後乃瘥凡乳兒不欲太飽飽則嘔吐凡兒嘔吐者乳大飽也以空乳乳之即消四十日兒若臍未愈乳食大飽令風中臍也夏不去熱乳令兒嘔逆冬不去寒乳令兒咳痢母行房以乳兒令羸瘦交脛不能行母有熱以乳兒令變黃不能食母怒以乳兒令喜驚發氣疝又令上氣癲狂母新吐下以乳兒令虛羸母醉以乳兒令身熱腹滿凡新生小兒一月內常飲豬乳大佳凡乳兒母當先極挼散其熱氣勿令汁奔出令兒噎輒奪其乳令得息息已復乳之如是十返五返視兒飢飽節度知一日中幾乳而足以為常又常捉去宿乳兒若卧乳母當以臂枕之令乳與兒頭平乃乳令不噎母欲寐則奪其乳恐填口鼻又不知飢飽也浴兒法凡浴小兒湯必須冷熱調和冷熱失所令兒驚亦致五臟疾也凡兒冬不可久浴浴久則傷寒夏不可久浴浴久則傷熱數浴背冷則發癎若不浴又令兒毛落新生浴兒者以豬膽一枚取汁投湯中以浴兒終身不患瘡疥勿以雜水浴之兒生三日宜用桃根湯浴桃根李梅根各二兩枝亦得㕮咀之以水三斗煮二十沸去滓浴兒能除不祥令兒終身無瘡疥治小兒驚辟惡氣以金虎湯浴金一斤虎頭骨一枚以水三升煮為湯浴常煮用之凡小兒初生出腹有鵝口者其舌上有白屑如米劇者鼻外亦有之此由兒在胎中受穀氣盛故也或妊娠時嗜糯米使之然治之之法以髮纒筯頭沾井花撩拭之三日如此便脫去也如不脫可煮栗抉汁令濃以綿纒筯頭拭之若春夏無栗木皮仍用井花水法小兒初出腹有連舌舌下有膜如石榴子中隔連其舌下後當令兒言語不發不轉也可以爪摘斷之微有血出無害若血出不止可燒髮作灰末傅之血便止也小兒出腹六七日後其血氣收斂成肉則口舌喉頰裏清淨也若喉裏舌上有物如蘆籜盛水狀者若懸癰有脹起者可以綿纒長針留刃處如粟米許大以刺決之令氣泄去青黃赤血汁也一刺之止消息一日未消者來日又刺之不過三刺自消除餘小小未消三刺亦止自然得消也有著舌下如此者名重舌有著頰裏及上腭如此者名重腭有著齒齗上者名重齗皆刺去血汁也小兒生喉癰輒死治法當喉視兒口中懸癰前上腭有泡者以指摘取頭決令潰去血勿令血入咽殺兒急急慎之小兒初出腹骨肉未斂肌肉猶是血也凝乃堅成肌肉耳其血沮敗不成肌肉則使面目繞鼻口左右悉黃啼哭閉目聚口撮面口中乾四肢不能伸縮者皆是血散不斂也主不育若有如此者皆宜龍膽湯也論乳兒法擇乳母須精神爽健情性和悅肌肉充肥無諸疾病知寒溫之宜能調節乳食嬭汁濃白則可以飼兒不得與嬭母大噉酸醎飲食仍忌才衝寒衝熱來便餧兒嬭如此則必成嬭癖或驚疳㵼痢之疾切須忌之夜間不得令兒枕臂須作一二豆袋令兒枕兼左右附之可近乳母之側蓋覆衣衾須露兒頭面一向仰卧恐成驚疾須時復回動之夏月須涼簟如夜間餧嬭須嬭母起身坐地抱兒餧之如隂陽交接之間切不可餧兒嬭此正謂之交嬭也必生癖或換衣綳須三月後房中不可太暖嬭母不可頻喫酒恐兒作痰嗽驚熱昏眩之疾至於變成諸疾嬭乳所傷夜啼潮熱之類若能調和嬭食并看承愛護如法則别無疾病亦不須令兒常服湯藥此尤宜審之也乳生病雜治凡小兒飲食乳哺不能無痰癖常當節適若微不進仍當將護凡不能進乳哺則宜下之不致寒熱也又小兒始生生氣尚盛無有虛勞微惡即須下之所損不足言其益多矣若不時下則疾成難治冬月下之最難將護然有疾者亦不可不下夏月下後腹中常小脹滿當節哺乳護之兒之乳哺宜令多少有常兒稍大食哺自能稍增若減少者是腹中已有小不調便當微與藥服復哺之但乳之而已甚者十餘日輕者五六日自當如常若都不食哺而但飲乳者此是有癖不可不下不下即致寒熱或吐發癎或致下痢若先致其輕則病速愈矣小兒有少病癎者母懷娠時役動骨肉血即令氣強若侍御多血氣微胎養弱即兒軟脆易傷故多病癎兒須多著項衣取燥菊花為之枕母乳兒時摸兒風池若壯熱即須尉使微汗微汗不瘥便灸兩風池背第三顀第五顀第七顀第九顀兩邉各二穴與風池凡為十穴一嵗兒七壯兒大者以意增之可至三十壯唯風池特宜多七嵗已上多至百壯小兒當切慎護風池風池在頸項筋兩邉有病乃治之尋常不可妄施針灸亦不可輕於吐下緣針灸傷經絡吐下動腑臟故也但當以除熱湯浴之除熱散粉之除熱赤膏摩之又以臍中膏塗之令兒處涼時以新水飲之新生無疾慎不可逆針灸逆針灸即忍痛動脈因而成癎河洛間土地多寒兒喜病痙其俗生兒三日多逆灸以防之又灸其頰以防噤又決舌下以去血江東吳蜀地溫無此疾古方雖傳有逆針灸之法今人不詳南北之殊便按方用之為害最多惟田舍小兒任其自然皆無此患又云春夏不可下以小兒腑臟軟弱易虛易實下之則下焦必虛上焦生熱熱即增痰自非當下之病不可下也嬰兒初生斷臍之後宜著艾厚褁愛護若乳母不慎或因浴而水入臍或屎於繃袍之內濕氣傷臍或解脫風冷所侵令兒臍腫多啼不能乳哺即成臍風用裹臍法通大小便法嬰兒初生腹脹欲絶大小便不通急令婦人潄口汲咂兒胸背心手足心臍下共七處以紅赤色為度須臾自通胎肥生下肌肉厚遍身血色紅滿月以後漸漸肌瘦目白晴粉紅色五心熱大便難時時生涎浴體法主之又云胎怯生下面色無精光肌肉薄大便白身上無血色時時哽氣多噦目無精采當浴體法主之新生小兒煎益母草湯洗之則不生瘡又以薏苡葉煎湯浴則一生少病小兒初生七日內患臍風撮口百無一活坐視其斃良可憫哉惟有一法極驗世人罕知其兒齒齦上有小泡子如粟米狀但以溫湯蘸熱帛褁手指輕擦破即開口便安不用服藥或用真珠天麻丸治之胎驚風以孕婦調適乖常飲酒嗜欲忿怒撲責母有所觸胎必感之或外挾風邪有傷於胎故子乘母氣生下即病也其候月內常翻眼握拳噤咬口牙身腰強直涎潮嘔吐搐掣驚腮縮囟開口或頰赤或面眼青胎風眼合不可誤作泄脾妄用溫藥其有著噤撮口之類亦此一種之所發也視其眉間氣色紅赤鮮碧者可治若黯黑者不治虎口指紋曲入裏者可治紋反出外者不治治法解散風邪利驚化涎調氣貼囟甚則以朱銀丸利之初生方法虎頭湯方出聖惠方虎頭骨五兩苦參四兩白芷二兩右用水一升煮二十沸入豬膽汁少許適寒溫浴兒治兒少小身熱李葉湯方出聖惠方右用李葉不拘多少以水煮熱去滓適寒溫浴兒又方出聖惠方用白芷根苗煎湯浴兒良又方出衛生寶鑑方用苦參煎湯浴兒良浴體方出衛生寶鑑方天麻末二錢蝎尾去毒為末硃砂各半錢匕烏蛇肉酒浸焙白礬各三錢七麝香一錢匕青黛三錢七右同研勻每用三錢水三碗桃枝一握并葉五七枚同煎至十沸溫熱浴之勿浴背御藥院名浴天麻散治小兒百日內發搐真者不過三兩次必死假者頻發不為重真者內生發癎假者外傷風冷蓋氣未實不能勝任乃發搐也欲知假者口中氣出熱也治之可發風邪用浴體塗囟法凡尋常浴兒出聖惠方右以湯添水著少鹽浴兒後以粉傅之若無病勿數浴恐遇風冷令兒發驚成癎李梅湯出聖惠方浴兒辟溫惡氣療百病去皮膚沙粟桃根梅根李根各一把細辛蛇牀子各一兩右都銼以水二斗煎至一斗澄濾候冷暖得所浴兒佳一方加麝香少許不用細辛蛇牀子治新生兒卒寒熱不住不能服藥用六物莽草湯浴之方出聖惠方莽草丹參蛇牀子桂各三兩菖蒲半兩雷丸一斤右銼碎水五升煮三五沸適寒溫浴兒避日向隂處治小兒卒客忤吐下乳哺面青黃色變弦急浴方出聖惠方用錢七十文以水三升煮令有味適寒溫浴兒浴兒法出聖惠方凡浴兒不可先斷臍帶候洗了方斷不致水濕可免傷臍風瘡等證仍以清油調髮灰傅臍凡洗兒並不可用水打濕臍帶切宜戒之又法出聖惠方右用益母草五兩銼水一斗煎十沸溫浴面不生瘡疥初生浴兒良日出聖惠方寅卯酉日大吉壬申丁巳癸巳大凶右用虎頭骨煎湯浴之令兒不驚辟邪惡氣金虎湯出聖惠方治小兒驚辟惡浴金十兩虎頭骨一枚右以水一斗煮至七升候冷暖得所將用浴兒心安甚良浴新生兒方出聖惠方右用豬膽一枚煎湯在盆中取膽汁投於沸中適寒溫以浴兒終身不患瘡切不得湯中入著生水甘草法出湯氏寶書妊婦臨月預辦甘草細切少許産卧時以綿褁沸湯泡盞內蓋定收生之際急以軟帛褁指蘸甘草汁拭其口次用黃連法黃連法出湯氏寶書産婦臨月內黃連細切捶碎將綿裹入百沸湯同用甘草一處泡入前法拭口次用硃蜜法硃蜜法出湯氏寶書用甘草黃連法拭口吐其惡汁稍定更與硃蜜安神定魄用硃砂一大豆細研以蜜一蜆殼許和硃砂旋抹口中非獨鎮心安神能解惡物之毒一生免瘡痘之患一方韭根汁灌之去惡血令兒無病牛黃湯出湯氏寶書先與硃蜜竟可與牛黃服牛黃法亦如硃蜜多少也牛黃益肝膽除熱定精神止驚邪辟惡氣除小兒百病也豬乳法出湯氏寶書取豬乳須令豬兒飲母次便撮著豬兒後腳起口自離乳急用手挼之即得乳矣非此法不可取也千金張渙論初生嬰兒或未與乳産婦之乳未下亦可用豬乳代之此法甚良先用硃蜜而豬乳次之可免驚癎瘡痘乳兒法出湯氏寶書湯氏云顱𩕄論經夏中盛暑時乳母浴後或兒啼不可與乳能使兒成胃毒秋成赤白痢凡浴後可令定息良久熱揉乳之乃無患也千金論凡乳兒不過飽滿而止溢則成嘔吐乳或來猛取去挼後再乳凡初乳時須常揑去宿乳然後與之兒若卧乳母當以臂枕之令乳與頭平令兒不噎母欲寤即奪其乳睡著不知飽足而成嘔吐父母交合之間乳兒卧於側或驚哭起不可乳兒氣亂未定恐傷兒巢氏云兒啼未定氣息未調乳母勿遽以乳飲之固不得停滯胸膈而嘔吐此患有之可不必深慮也擇乳母法出湯氏寶書乳母者其血氣為汁也五情善惡悉是血氣所生凡乳兒當宜善其喜怒之氣解忌勿乳兒必令逆也乳母形色惡陋甚多不可求備但無胡臭癭哮喘瘑疥癲癡白秃癧頸缺唇耳聾齆鼻臉瘡麻風癎疾獨眼跛足龜背背駝鬼形惡貌諸般殘患者餘皆可用也沾染之久識性亦同猶如接木之造化也其理甚詳凡為乳母皆有節度已上諸候病中犯得者皆為惡疾候也內八片錦紅淨為安體則寧如逢紅黑便須驚更兼紅亂煎人甚轉下除驚藥有靈赤段輕微是外驚若如米粒熱非輕紅散多因喜怒乳搐搦將來豈得平忽逢相間有青色看來立便急風生逢青競碎風將起不見風疳氣隔澄亂投湯藥兼青紫急急醫治命免傾若如淨紫體還熱須知五臟有風生黑輕可治死還活紅青傷寒痰疾停赤青已受脾風了青黑脾風作慢驚紫細紅因驚六畜紫赤相間則痔成紫點若同如米粒夾食傷寒論可聽紫散風傳脾臟裏紫青多渴即風癎隱隱紫深難療治去風痰毒命須還紅赤連兮非絶症必然乳母不相應有時兩手俱無見定知衝犯惡神明已上歌訣無形但觀五色浮沉長短可定死生小兒面部氣色總現五位總作流波泛濫隔窗照藍青色者驚積不散欲發風候其神彩觀覷不穩上上下下證變風生五位總作閃爍焰射丹爐映火紅色者疾積壅盛悸增進其神彩視物不定恍恍惚惚候變驚速五位總作混衮泥漿衣傅土墻黃色者食積癥傷欲作疳候或痞癖有之其神看顧散漫昏昏沈沈其候寒熱潮發飲食不惞氣粗短促困倦喜睡嘔噦㵼痢皆有之五位總作濈浮虛野露入谷白色者肺氣不利大腸滑泄水榖不分欲作吐利其神眸凝濁失其精神朦朦朧朧性情不立光滑全無五臟少實二水多虛或吐痢之後有失調補五位總作漫漫黯黯塵灰稱覆黑色者傳不順證變即逆候表裏有虧臟腑欲絶其血不榮其氣不衛榮衛失序經絡流注凝滯於脈為疾急惡其神昏冒沈沈默默者為人不久虎口三關指掌圖食不禁雜物未能克化今之患食癖疳積肚腑疼面黃肚大脛小好覆冷地者得患皆由此也嬰兒生下兩月目瞳子成能識笑認人勿令生人抱之及不可見非常之物因成客忤百日任脈生能反覆乳母當適寒溫半嵗尻骨成乳母當令學坐二百日掌骨成當教匍匐三百日臏骨成當教獨立周嵗膝骨成當令行步此皆定法今富貴之家不按此法但令嬭子懷抱亦不令出見風日亦不曽見地氣致令筋骨柔弱雖生嵗數亦未能行誠非愛護之法余觀田舍小兒未嘗愛護及此終日暴露拖泥帶土而絶無他疾者譬之草木生於深山峻嶺及大澤之中容易合抱至於園圃竒林異果縱加培壅多有秀而不實者此豈貴賤之理有異哉回氣法出危氏得效方小兒初生氣欲絶者必因難産或冒寒冷所致不可使斷臍帶急烘綿絮包懷中以胎衣置火中燒仍以大紙捻點清油燒燃於臍帶上往來燎之使暖氣入腹須臾氣回方洗洗了即斷臍帶聖惠方預治三證凡兒初生預防臍風著噤撮口最為急證十難救一以軟帛包揩拭兒口牙根上如有黃筋兩條便用竹刀輕輕刮斷以豬乳點之又用黃連半錢豉三十五粒白米四十九粒生甘草二寸蔥白二寸以童子小便煎取三合兒初生未喫嬭前便以綿濡點藥口中二七滴逡巡兒腹中轉即利出臍糞後與喫嬭至七月已來每日滴三七滴永無此疾經極效也又方抱兒向明看臍上有赤脈直上於赤脈頭上灸三壯可起死封臍散出醫方妙選川當歸半兩去土蘆天漿子三箇亂髮灰一錢燒存性傅臍散出直指方瓜蒂南星白斂赤小豆等分右為末每三錢用芭蕉自然汁調傅臍四邉剃頭法出集驗方初剃頭俱不擇日但於滿月日剃之蓋風俗所尚前此産婦未得出房滿月與兒俱出以謂胎髮穢惡恐觸神竈令小兒不安故用此日當就溫暖避風處剃之即以生油杏仁膩粉頭上擦之以避風邪爾後剃頭皆宜用此外臺崔氏初剃頭良日出湯氏寶書寅日丑日吉丁日未日凶不可剃令生瘡塗𩕄法出錢氏方治寒傷百日內發搐麝香一字七蝎尾去毒為末半錢七薄荷葉半錢匕蜈蚣末牛黃末青黛末各一字七右同研勻熟棗肉為膏新綿上塗貼𩕄上四方可出一指許火上炙手頻尉百日裏外兒可用此塗治法哺兒良日法以平定成日大吉其哺不得令鹹又寅丑辰巳酉良又男戊巳日不得女丙丁日不得小兒初生不飲乳及不小便出百一選方右蔥白一寸四破之以嬭汁三合銀石器煎至一合灌之效曽氏女生兒移時不飲乳及不小便皆驚以為惡證急撿外臺得此方用之木瓜丸出百一選方治兒初生下口中穢惡不盡入喉中即便自然吐才啼聲一發則又咽下因生黑疾木瓜麝香膩粉木香檳榔末各一字右水煮麵糊為丸如小黃黍米大每服一二丸甘草水下不拘時候米粉丸出經驗良方治小兒初生下遍身無皮俱是紅肉宜速以白占米研為細末乾撲候皮肉生就方止陀僧散出經驗良方治小兒生下遍身如魚泡又如水晶破則成水流滲又生用蜜陀僧研入紗絹滲之仍服局方蘇合香丸雄黃丸出御藥院方治小兒諸般驚顫瘈初降誕下便與乳母帶辟諸忤之氣雄黃一兩白龍腦一分虎頭骨炙三分麝香猴猻頭骨乳香各一分降真香末箋香白膠香鬼臼去毛各一兩為末大蛇頭一枚炙右細研勻用熟棗肉和丸如彈子大初降誕兒煎熱一丸次用緑絹袋子帶一丸於身辟一切驚忤之氣茯苓丸出直指方治小兒初出胞胎其聲未發急以手拭掠其口令惡血淨盡不得下咽則無他病若拭口不盡惡穢入腹則腹滿氣短不能飲乳或産婦取冷過度胎中受寒則令兒腹痛不肯飲乳惡穢入腹宜用赤茯苓川黃連枳殼炒等分右為末煉蜜丸桐子大每一丸乳汁調灌下丁香散出直措方治惡穢入腹令兒嘔吐不止方木香乾生薑茯苓甘草焙各一分酸木瓜丁香各等分右粗末一捻水煎以綿沾與之初生小兒産下有皮膜如榴子膜褁舌或遍舌根出肘後方可以指甲刺破令血出燒礬灰細研傅之半菉豆許若不摘去兒必啞水銀膏出聖惠方療小兒噤其病在喉中如麻豆許令兒沫不能乳哺右取水銀如米粒與服覺病無早晚水銀下咽便愈以意量之不過小麻子許與服也治小兒不能乳出聖惠方右用雀屎四枚為末著乳頭飲兒兒大十枚通便法出危氏效方小兒初生大小便不通腹脹欲絶者急令婦人以溫水潄口了吸咂兒前後心并臍下手足心共七處每一處凡三五次嗽口吸咂取紅赤為度須臾自通不無生意有此證遇此法可謂再生保命散出醫方妙選治初生七日間胎毒者其舌上有白屑如米連舌下有膜如石榴子大令兒語不發如鵝口狀名曰鵝病白礬一分燒灰馬牙硝半兩細研硃砂一分水飛右同再研每服一字取白鵝糞以水攪取汁調塗舌上頷頰內未用藥時先以手指纒亂髮指拭舌上垢然後使藥傅之治小兒出腹六十日舌上喉裏齗腭上有物如蘆籜貯水狀者右以綿纒上針鋒如米刺以決之令去一刺且止若不消待明後日各一刺不過冉刺愈孩子要用藥物硃砂牛黃麝香蘆薈青黛蛇黃犀角蜣螂虎頭骨蝸牛殼蜈蚣雀兒飯甕天竺黃白藥竹瀝吹鼻散虎睛鈎藤飲子虎骨紫雙丸錦灰五味虎睛丸封臍散烙臍丸髮灰好綿一兩黑散子胡粉紙燭柔粉入紙作燭防暖撮口須要綿繩子要繫臍已上藥物入月皆須是一一題記恐與産婦藥相雜藏胎衣法崔氏凡藏胎衣法凡胎衣先以清水洗之勿令沙土草汚又以清酒洗之仍內錢一文在衣中盛於新瓶內以青帛褁之其瓶口上仍密蓋頭且置便宜處待滿三日然後依月吉地向陽髙燥之處入地三尺埋之瓶上土厚一尺七寸仍須牢築令兒長壽有智慧若藏衣不謹為豬狗所食者令兒癲狂蟲蟻食者令兒病惡鷹犬鳥食之令兒兵死近社廟傍者令兒見鬼近深水汙池令兒溺死近故竈傍令兒驚惕近井傍令兒聾盲棄道路街巷者令兒絶嗣無子當門戶者令兒聲不出耳聾若水流下令兒不育棄於火裏者令兒生爛瘡著抹木頭者令兒自絞死如此諸忌皆須慎之又安産婦及藏胎衣天德月空法正月天空德在在丙丁月壬二月天空德在在甲申月庚三月天空德在在丙壬月壬四月天空德在在甲辛月庚五月天空德在在丙乾月壬六月天空德在在甲甲月庚七月天空德在在丙癸月壬八月天空德在在甲艮月庚九月天空德在在丙丙月壬十月天空德在在甲乙月庚十一月天空德在在丙巽月壬十二月天空德在在甲庚月庚凡藏胎衣皆依此法天德月空處埋之若有遇反支者宜以衣內新瓶盛密封塞口挂於宅外福德之上向陽髙燥之處待過月然後依法埋藏之大吉又法甲寅旬日十日不得藏埋胎衣以瓶盛密封安置空處度十日即藏埋之又法甲辰乙巳丙午丁未戊申此五日亦不藏胎衣還盛瓶中密塞勿令氣通挂著兒生處過此五日即埋之亦不得更過此日又法甲乙日生兒丙丁日藏衣吉丙丁日生兒戊巳日藏衣吉戊巳日生兒庚辛日藏衣吉庚辛日生兒壬癸日藏衣吉小兒初生搜口法一出保嬰方嬰兒初出母胎愚老娘不明保嬰之法兒啼一聲則口中惡物咽入喉腹令兒多病亦多瘡疹凡有孕婦臨月之家前一二日備下甘草黃連各半錢沸湯浸至次日去滓入細硃砂少許候兒初出母胎老娘即用左手托住嬰兒肩背以右手輕提兩足令兒倒啼一聲吐出口中惡物隨手用綿包手指蘸甘草藥水搜兒口中令淨然後以溫水浴之能令兒不驚哭後出瘡疹必輕長大病亦少此乃保嬰之第一法也小兒初生斷臍法二出保嬰方初生斷臍者忌用冷鐡刃器蓋嬰柔弱易引寒氣入腹冷臟腑滑㵼多致生病宜用火炙剪刀乘熱斷之更就斷臍袋上著艾如麥粒灸二十壯助暖氣入腹則臟腑堅固元氣充實令子病少壽長大有益焉小兒初生洗浴法三出保嬰方小兒初生浴法先用虎骨一兩捶碎入連根蔥白三莖同熬數沸去滓以豬膽一枚取汁入浴湯攪勻溫熱自手至足遍浴洗令子肌膚通身瑩淨以後不生瘡癬可無驚風之患將護小兒法出保嬰方小兒初生先要乳母將息氣體平和為上蓋熱即生風冷即傷氣乳母受病兒亦感之況初生小兒肌膚軟脆腸胃細微宜得乳母按時乳之無令兒飢亦不可令兒傷飽易致嘔吐切要調和臟腑所用襁褓衣絮宜時令見風日洗曝乾淨若見天氣中和令乳母抱兒日中嬉戲便氣血通流筋骨強徑外邪不侵每見富貴之家憐惜太過厚之以綿飽之以乳食閉於帷帳兒受客熱多致驚癎不保其生才有此證急令乳母依前法調理隨兒所感治之當服之藥如紫霜丸五色之類選而用之拭兒口法出淡寮方嬰兒在胎口有惡物生下啼聲未出急令軟綿拭口惡汁古人有黃連甘草法硃蜜法豬乳法用之則免惡物咽下伏之於心遇天行時氣久染不除乃乘於心心主血脈得熱而散流溢於胃胃生肌肉發出於外故成瘡疹之候世之小兒無有可免者或幼年不出年至四十餘者亦未能免此嗚呼今之醫者殊不知病之源流初生拭口若依此法得免痘瘡之患或有時氣侵染只生膚瘡細疹前輩方書雖多未嘗講究及此余嘗遇至人得其妙理況試之纍驗故編集成此方汞粉法出醫方妙選嬰兒初生第一日才斷臍綳袍訖看兒形色若面紅潤色赤啼聲響快者宜用汞粉半錢旋旋令兒吮之良久有臍糞便下為佳次用甘草法甘草法出醫方妙選用好原州甘草中指一節許拍碎以水二蜆殼煎一蜆殼以綿纒蘸令兒吮之令吐出惡汁為佳若服一蜆殼不吐即不須更服不問嬰兒虛實寒熱皆須服之次宜用硃蜜法硃蜜法出醫方妙選好硃砂一大豆許細研水飛煉赤蜜一蜆殼看稀稠和成膏每用一豆大乳汁化下時時滴口中三日內用三粒臨時更看形色多青白啼聲不響即不須服次用牛黃法牛黃法出醫方妙選用真牛黃一錢許用好蜜煉熟和成膏每服一大豆大乳汁化時時滴口中形色不實者不宜多服若嬰兒胎熱或身體黃色宜多服之嬰兒初生至滿月內常時時旋取豬乳滴口中最為佳法出醫方妙選刺泡法出危氏方小兒才生下即死用此法可救活急看兒口中懸舌前腭上有泡手指摘破用帛揑拭血令淨若血入喉即不可治小兒初生六日溫腸胃壯血氣方出肘後方煉成硃砂如大豆許細研以蜜一棗大熟調以綿溫取令兒吮之一日令盡小兒初生褁寒出淡寮方候浴水未得且以綿絮包褁抱大人懷中暖日亦當如此雖暑月亦未可遽去綿絮漸漸去之乍出母腹防冷氣也預煎下沸湯以瓶收之臨用漸暖不犯生水則兒不生瘡如此一月為佳矣小兒初生服藥出淡寮方急以綿褁指拭盡口中惡血若不急拭啼聲一出即入腹成百病矣亦未須與乳且先捶破黃連浸湯取濃汁調硃砂細末抹兒口中打盡腹中舊屎方可與乳兒若多睡聽之勿強與乳則自然長而少病地黃湯出傅氏方初生嬰兒吞惡血方赤芍三錢當歸二錢桂心一錢茯苓二錢山藥三錢芷稍二錢粉草三錢生地黃三錢右等分為末每服半錢生地黃湯調下治小兒初生用五香湯熬水洗之出德生堂經驗方茅香藿香陵苓香檀香木香各二錢右㕮咀水一升熬湯濾去滓以溫水洗小兒極妙治小兒一嵗至兩嵗無故乾號出本草右取夜明砂熬搗為散任意拌飯喫食與喫三嵗治小兒初生九日助榖神以導達腸胃出本草研粟米煮粥飯厚薄如乳每日研與半粟榖哺兒浴兒易長出本草以兜納香與茒香栁枝合為湯浴小兒易長治小兒新生三日應開腸胃助榖神用糯粳米濃煎汁飲如乳酪與兒大豆許數含飲之頓與三豆令兒無病出本草小兒初生取韭根搗汁灌即吐惡血令無病治小兒未滿月著驚似中風欲死者本草方用硃砂以新汲水濃磨汁塗五心上兩手心兩腳心胸立差最有神驗治小兒速語出本草以社酒內小兒口中小兒初生以虎骨煎湯浴其孩長大無病臍風撮口附論臍風者斷臍之後為水濕風冷所乘風濕之氣入於臍而流於心脾遂令肚脹臍腫身體重著四肢強直日夜啼不能吮乳其疾發為風搐若臍邊青黑撮口不開是為內搐不治爪甲黑者即死其或熱在胸堂伸引弩氣亦令臍腫可與千金龍膽湯如前三者受病療之非一朝夕大抵裏氣鬱結壅閉不通並用取下胎毒天麻丸定命丹硃銀丸輩可量與之千金論云小兒始生其氣尚盛若有微患即須下之若不時下則成大疾疾難療矣紫霜丸紫丸子可量用之撮口者面目黃赤氣息喘急啼聲不出蓋由胎氣挾熱驚風邪入臍流毒心脾之經故令舌強唇青聚口撮面飲乳有妨若口出白沫四肢冷者不可投藥其或肚脹青筋吊脹卵疝內氣引痛皆腸胃鬱結不通致之治法貴平踈利撮口最為惡候一月內見之尤急綳斷臍後為水濕所傷或屎在綳袍之內乳母失於覷當換綳濕氣所浸及當風解脫風濕之氣傷於內即令腫突多啼漸致風搐也先撮口而生驚乃此候也初生當洗浴然斷其臍後便當以􅍄艾封褁之或灸數壯勿令犯濕若先斷臍然後洗浴揩拭不乾或為邪氣所傷或為水入臍中皆致臍瘡也瘡過百日者雖差或風邪入裏則變為癎矣小兒患諸風疾傳入惡候至於撮口病至危急凡有臍風撮口鎖肚撮口弔腸撮口卵疝撮口諸病悉本於風風入心脾俱能撮口者皆由結鬱於中肝及腸胃閉澀不通氣不能化腹中滿脹肚上青筋以撮口為常則候轉深豈可投藥應急用珍珠天麻丸利之才通疾去氣和兒活在用者敬信而已方封臍散巢氏曰因浴兒水入臍中或尿濕綳袍臍中受濕腫爛成瘡或解脫風邪所襲入於經絡則成風癎若臍腫爛不乾久則發搐甑帶灰亂髮灰白薑灰紅綿灰四灰不可加别灰南星白斂當歸赤小豆五倍子一錢末血蝎龍骨赤石脂煅海螵硝百草霜胭脂六味各半錢别研右為末濕則乾摻乾則清油塗忌生水撮風散赤足蜈蚣半條炙直殭蠶七箇麝香一字以上三味别研川烏炮半夏薑製南星薑製鈎藤天麻炮荆芥穗以上六味各一錢同研和煎藥右為末豬乳或竹瀝或用東引槐枝十根各五寸槐枝入火煨候津液出拭去灰以烏驢乳或豬乳內浸以槐枝點滴口中丹硃九治小兒臍風撮口丹砂研麝香研牛黃研各一錢丁香白附子鐵粉半夏湯洗之七遍切焙天麻天南星各半兩右搗研為末用粳米飯丸如麻子大每服五丸荆芥湯下空心午後各一服量兒大小以意加之天麻丸出危氏方治因斷臍後為水濕風冷所乘入於臍流於心脾遂令肚脹臍腫身體重著四肢柔直日夜多啼不能吮乳甚則發為搐此藥散驚下痰凡釣腸鎖肚撮口皆可用南星炮二錢白附子炮牙硝天麻五靈脂全蝎烙輕粉半錢巴霜一字右為末稀糊丸麻子大每服一丸薄荷薑煎泡湯送下若臍邉青黑及爪甲黑者不治益脾散此方在本類散後四君子湯加陳皮厚朴木香薑棗煎服辰砂膏出直指方治噤風眼閉口噤啼聲漸小舌上聚肉如粟狀吮乳不得口吐白沫大小便皆通蓋由胎中感受熱氣流毒於心脾故形見於喉舌或為風邪擊搏致之辰砂三錢硼砂馬牙硝各一錢半元明粉二錢全蝎真珠末各一錢麝香一字右為末好細紙封褁自然成膏每服一豆粒許治諸驚月內用乳汁調傅乳頭上吮下金銀薄荷湯下有潮熱甘草湯服蝎稍散出危氏方治百日內撮口臍風及胎風右用蝎稍四十九箇每一箇用薄荷葉捲定以綿扎放砂銚中滚轉炒令薄荷乾酥為度冉用白殭蠶四十九箇生薑炒乾去絲嘴同為末以腦子生麝香少許研勻紫雄雞肝三片煎湯調下撮風散出直指方治撮口紫腳蜈蚣半條炙鈎藤一分硃砂直殭𧖟蝎稍各一錢麝香一字右為末每服一字取竹瀝調下竹瀝解熱神灰散出聖惠方治小兒臍風腫雄鼠七枚兩頭尖者是乾薑棗大一塊甑帶一團緋錦灰胡粉炒如金色白石脂各半兩右燒為灰存性相和細研加少許麝香為散看臍欲落不落即封臍便差如未患傅之終不患也燒藥時不得令有别灰入外臺方無白石脂甑帶聖惠方無白石脂而有錦灰控痰散出聖惠方治噤口風撮臍風蝎稍甘草銅青膩粉麝香各等分一方加半夏南星生薑煎調前藥入豬乳點入口中吐下風疾天漿子散一名安臍散出聖惠方治小兒初誕斷了臍便傅此散免一臘內疾天漿子三枚亂髮燒灰存性半錢蜈蚣二寸燒灰羚羊角燒灰一錢麝香一小豆大右研令極細才斷臍了便用少許傅之􅀈風散出方醫大成噤風者一名著禁曰胎受熱毒流於心脾或生下為風邪侵襲自滿月至百二十日見此名犯風禁不止撮口者初生臘乃娩七日也由胎受風熱入臍流毒心脾之經或成臍風胎風鎖肚弔腸卵疝等證皆令氣促舌強唇青撮口如囊不乳其證面目黃赤撮口不乳臍風由斷臍為水濕風冷之氣流於心包絡或綳袍尿濕所浸或當風解脫為風邪所襲能令臍腫爛四肢柔不直多啼不乳先撮口而生驚若臍邊青黑撮口不閉是為水搐不治爪甲青黑即王氏曰其或熱在胸堂伸引努氣亦令臍腫千金龍膽湯在胎驚類小兒始生其氣尚盛若有疾病即須下之若不時下則成大疾小兒在胎受病非一大扺裏氣鬱結壅閉不通並宜散胎毒紫霜九五積丸熱盛四順飲法當先與􅀈風散次與吐取控痰湯次為和胃益脾散方與利風驚撮風散蜈蚣一條炙全蝎七箇直殭蠶一錢炒瞿麥半錢半夏半錢右為末鵝管吹入鼻中入如噴嚏啼呌則可醫一方無半夏用薄荷湯調服錦灰散出聖惠方治小兒初生至七日臍風發腫欲落者錦帛燒灰微存性一錢雄鼠糞微炒七枚大棗去核三分麝研一錢右搗研為末散看臍欲下落即用藥封之切忌風入一方有胡粉半兩香礬散出聖惠方治小兒斷臍之後不乾及膿出耳中枯礬半兩龍骨一錢黃丹一錢麝香少許研右為細末每用乾摻之立聖散出直指方治小兒口噤蝎稍七箇乾蜘蛛一箇去口足先以新竹於大上炙取竹油一箇蛤殼許乃竹瀝也浸蜘蛛一宿炙令焦右同末研極細入膩粉少許每一字用乳汁調時時滴入口中鈎藤湯一名撮口散出聖惠方治小兒初生撮口鈎藤升麻黃芩去黑心各半兩蜣螂二枚去翅足微炒右粗搗篩每服一錢水一小盞入蘆根半分煎取五分去滓放溫徐徐服量兒大小加減一方有甘草用甘草湯時時點之當歸散出直指方治小兒著臍風汗出當歸切焙半兩甘草炙銼一分鉛丹研半分右除鉛丹外搗為散入鉛丹合研令勻以傅臍中瘥安臍散治臍中汗出或赤腫臍痛或因水與乳入臍所致右當歸為末傅蝦蟆燒灰白石脂末油髮灰傅皆可蘗墨散治小兒斷臍後為水濕所傷或綳袍濕氣傷於臍中或解脫風冷所乘致令小兒四肢不和臍腫多啼不乳哺宜速療之黃蘗末釡下墨煤亂髮燒灰存性各等分右為細末每用少許傅之蜈蚣方治口噤不開不能收乳赤腳蜈蚣半枚去足炙令焦右為末入麝香少許以豬乳一合和之分三服豬乳主小兒口噤不開最良麝香散治小兒生下三四日臍風撮口者蓋因生下時剪臍不定傷動臍帶外風入臍故有此症下乳不得其候面青啼聲不出唇青口撮若口出白沫四肢逆冷此惡候也赤腳蜈蚣半條酒炙麝香少許川烏尖三箇生右為末同麝香研極細每半字先吹入鼻內連嚏可治用前金銀薄荷湯調下此方治小兒驚風尤妙若初生孩兒更斟酌多寡用之蜘蛛方治噤口不開不能吮乳蜘蛛一枚去足及口炙令焦細研右用豬乳一合調和為三服徐徐灌之神效牙疳亦用蜘蛛并麝香胡粉散治臍瘡腫濕經久不瘥若至百日即危急宜用胡粉一錢為末乾薑一錢燒灰灰為末白石脂一錢燒存性右同冉研細用藥一字至半錢傅臍中時時用麝香散治小兒初生胎熱撮口麝香研丹砂研各一錢蛇蛻皮一尺炙令赤為末右細研為末每用半字匕津唾調塗兒唇上日五七次金黃散治嬰臍瘡不瘥風氣傳於經絡變為癎疾者川黃連一錢胡粉一錢龍骨一錢燒灰另研右為末每用少許時時傅臍一方加亂髮灰三灰散治小兒臍濕逾月不止乾蝦蟇燒白礬燒皂策子燒各一分右細研少少傅臍中一方蝦蟇燒為末封臍烙臍丸豆䜴一分黃蠟一分麝香少許右同搗令爛熟稔作餅子斷臍訖安臍上灸三壯艾炷如小麥大若不啼灸至五七壯灸了以封臍散封之不得令濕著恐臍腫白龍散治小兒風臍天漿子有蟲者一枚白殭蠶直者炒一枚右搗羅為細散入膩粉少許以薄荷自然汁調灌之取下毒物神效量兒大小分二服亦得牡蠣散牡蠣一枚蝦蟇一枚右并燒灰細研如粉每以少許傅臍中甚驗甘草散治小兒臍風汁出甘草炙銼螻蛄炙焦各一分右搗羅為末摻傅臍中瘥枯礬散一名白龍骨散治嬰兒因臍風傷於外致臍瘡不乾白礬煅白龍骨右等分為末每用少許傅之方用枯礬白末貼之烏蛇散治初生小兒撮口不收乳飲烏蛇酒浸去皮骨炙令黃熟半兩麝香一分研右將烏蛇搗羅為末同麝香冉研勻每服半錢煎荆芥湯調灌之治臍風濕腫右以鹽䜴相和炙熱安臍上再用黃柏末傅之治小兒撮口病先拭小兒口傍令見血用之右取雀甕搗汁用生鼠婦并雀甕汁塗之小兒多患此病漸漸撮口不得飲乳者是杏骨膏出聖惠方治小兒臍腫汁出久不瘥杏仁半兩湯浸去皮豬牙頰骨中髓半兩右先研杏仁如膏加髓和令勻以塗臍中甘草湯出聖惠方治撮口取吐甘草生一錢右銼煎服令吐出痰涎却以豬乳點入口中即瘥蜈蚣丸出聖惠方治小兒撮口赤腳蜈蚣一條棘剛子五枚右二味燒成灰飯和為丸如麻子大每服三丸至五丸乳汁下一方燒為末用一字飲湯調下牛黃竹瀝散出危氏效方治小兒胎風熱撮口法噤亦治心熱發驚牛黃研一分淡竹瀝半合右每服牛黃一字七用淡竹瀝調下一二嵗兒服之三四嵗兒每服半錢日三服量兒大小以意加減一方豬乳點口中螵蛸散出聖惠方治小兒臍中血若臍中膿出令乾右用胭脂海螵蛸為末油調搽蝸牛散出聖惠方治小兒胎熱撮口蝸牛子十枚去殼細研如泥蒔蘿末半分右同研勻用妳汁和塗於口畔立瘥烏槐散出聖惠方治撮口當兩乳中髙下平以線量灸之三壯起死仍用後方烏驢乳一兩合東引槐枝十根各長三寸右以煻灰煨槐枝入火一半出頭一半津出取枝拭却灰內於驢乳浸須臾便以槐枝點兒乳間大驗白石脂膏出聖惠方治小兒臍赤腫汁出不止初生未滿月多啼哭致使臍中血出右用白石脂一兩研為散熬令溫撲臍中日三未愈冉貼仍不得剝揭又方出海上名方綿不拘多少燒灰為末乾摻之傅氏活嬰方名綿灰散一方舊者亦佳治臍傷水腫出醫方集成用肉桂碎如米粒大炙熱熟絹帛兜包尉臍即安治臍赤腫出醫方集成以杏仁爛研傅牛沫方出聖惠方取未行牛口沫塗兒口及額上即效治小兒口噤乳不下出聖惠方用白棘燒末水服一錢匕或塗乳上治小兒臍濕將爛若不早治即成臍風或赤腫及膿水出出聖惠方右以當歸為細末乾摻濕處一方用胡粉等二味相和傅臍中頻用自瘥試之最驗此一方傅而乾後因尿入瘡病復作又一貼愈治臍腫出危氏效方右先用荆芥水洗了蔥葉一皮火上炙過地上出火毒以手指甲刮薄內搭放腫處次日便消用通心飲殭蠶方出聖惠方治撮口面目黃赤氣息喘急啼聲不出蓋由胎氣挾熱流毒心脾故令舌強唇青聚口撮面飲乳有妨及發噤口者用直殭蠶二枚去嘴略炒為末蜜調傅唇中效晚蠶蛾二枚炙黃為末蜜傅亦得治小兒撮口風但看舌上及上下腭有瘡如粟米大者是也以指甲刮破用蜈蚣生研傅兩頭間立差如無生以乾作末點之治小兒臍風用獨頭蒜切片安臍上以艾灸口中有蒜氣即止立效治小兒撮口病取夜合花枝濃煮汁拭口并洗治小兒臍風腫濕久不瘥出聖惠方用蜜蜂房燒末傅之治小兒未滿月不飲乳亦不哭口吐白沫者用丁香七粒同乳汁於磁器內煎灌即愈治小兒臍風鎖口出聖惠方歌曰臍風鎖口為何緣千箇醫來千箇難收取猢猻拋下糞乳調吃下便安然治小兒撮口風出聖惠方歌曰小兒撮口風猢猻糞最強燒灰兼妳汁塗口自宜良又方出聖惠方取壁魚子細研作末每服少許令兒吮之又方出聖惠方以初生時豆牙爛研以乳汁調與兒喫或生研絞取汁少許與服亦得又方出聖惠方以蝸牛子五枚去殼取汁塗口上已瘥即止又方出聖惠方取柏樹白皮穿作小孔安於臍上以艾炷入柏皮孔中灸之即瘥又方出聖惠方以甑帶燒灰研傅之效又方出聖惠方以瓜蒂燒灰研傅之良治小兒生來臍內有汁出經久不瘥方出聖惠方右燒緋帛灰研傅臍中演山真珠天麻丸出永類鈐方治撮口弔腸鎖肚鬱結腹脹青筋阻乳急與踈利量重輕截風定搐南星炮天麻白附子炮各一錢膩粉半錢巴霜一字蕪荑炮全蝎麵炒滑石各一錢半右為末麵糊丸麻子大嬰兒三日三丸五日五丸七日七丸加青黛末名青黛丸薄荷湯茶清下治小兒撮口臍風法出保嬰方小兒生後至七日或臍口受風令兒生病宜囑老娘或乳母每日晌午前後仔細看兒口內上腭但有粟米白泡隨用手指輕輕磨破之可免他疾治褓中小兒臍風撮口法出德生堂經驗方右治小兒上下齗腭當口中心處若有白色如江豆大此病發之源也急以手爪正當中掐之自外而內掐令匝微血出亦不妨又於白處兩盡頭亦依此掐令內外斷只掐令氣脈斷不可見血破肉指爪勿令大銛恐傷兒甚此法乃東坡家藏方內具述趙郡一老人用此治小兒已活千餘人矣信哉是言用之大應治小兒撮口及發噤方出聖惠方右取鼠婦蟲絞取汁與兒少許服之又方出聖惠方右取棘科上雀兒飯甕子未開口者取甕子內物和妳汁研灌之五聖散出傅氏活嬰方治撮口朴硝一分豆豉二十粒白米五十粒蔥白二寸甘草炙一分右用童子小便半盞煎至二三分未乳前先用綿子拭口中一二次逡巡用之令兒腹中自轉然後護養至五七日冉用五七滴與之永無胎疾蟬退散出傅氏活嬰方治撮口蟬退蛇退硃砂麝香腦子各等分右研令勻點兒唇上有效牛黃飲子出傅氏活嬰方牛黃另研少毒雄黃另研寒溫硃砂另研微寒右等分為末淡竹葉煎湯點服竹瀝湯出傅氏活嬰方硃砂麝香各等分右研細收之如用先將苦竹一束除去兩頭節火燒取油一二合入淡竹葉湯點服五靈丸出朱氏集驗方治臍風南星一錢五靈脂一錢草烏半錢為末右用羊膽汁調貼之又方出淡寮方凡臍濕而腫者可用枯過白礬末腦子同傅然恐小兒肉嫩用礬則痛痛則啼哭而又努力迸損也莫若以烏賊魚骨為妙治小兒口噤出經驗良方右用麝香少許入大黑豆末中和乳飲之治小兒臍風瘡厯年不瘥方出子母祕録本草右東壁土傅之治小兒臍中汁出不止并赤腫用礬燒灰細研傅之治小兒患風臍及臍瘡久不瘥者出本草以蝦蟇燒杵末傅之日三四度瘥治小兒口噤出本草右以蛇莓草汁灌口中死亦冉活治小兒口噤體熱者及吐沫不能乳哺者用竹瀝三合暖之分三四服兒新生切不可逆加針灸忍痛動其五脈因而成癎是以田舍小兒任其自然皆無此疾可審之治小兒牙關不開出本草用天南星一箇煨熱紙褁封角末要透氣於細處剪雞頭大一竅子透氣塞于鼻孔牙關立開治小兒撮口右用鹽䜴傅臍上以艾於上灸之普濟方卷三百六十
