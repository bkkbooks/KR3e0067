結睛久不差損於眼目故號疳眼也方夜明砂散治小兒眼漸急少白多赤夜明砂二兩微炒天竹黃半兩犀角屑半兩芎藭一兩羚羊角半兩白殭蠶半兩微炙甘菊花半兩車前子半兩右為細散每日常於午時以溫水調半錢量兒大小加減服之硃砂散出聖惠方治小兒眼疳夾風生障翳不開雄黃半兩細研硃砂半兩細研水飛過川大黃一兩銼炒石決明一兩胡黃連一兩神麯一兩微炒右為細散每服以蜜水調下半錢日三服量兒大小加減鈴石散治小兒眼疳生翳膜遮睛欲失明鈴石一分石決明一分甘菊花一分甘泉水一分夜明砂一分微炙黃連一分去鬚右為細末每服二錢以米泔同煮豬子肝一具令爛熟量兒大小加減服之天南星散治小兒疳及雀目天南星半兩炮製榖精草半兩甘草半兩炙微銼黃芩半兩麝香一分細研右為末散用羊子肝一具切破入藥末二錢用串子炙令熟空心服後用不淘米煮粥半盞壓之夜明散治小兒眼疳生翳膜體熱夜明砂半兩微炙蝸牛殼半兩微炙子芩半兩研豆豉半兩炙乾硃砂一兩細研右為細散每服一錢水一中盞入菉豆半匙煮熟令冷量兒大小和滓分減服之又方治小兒眼疳榖精草半兩川大黃半兩銼碎微炙薑石半兩搗細水飛過甘草半兩炙右為細散以羊子肝一枚用竹刀子切破內藥末一錢在肝裏使綿纒定以醋煮熟放冷任意食之不過三五枚羊子肝見效榖精草散治小兒眼疳赤癢榖精草一兩蒼术一分要去皮炙蛇蛻皮灰一分定粉一分右為細散每服一錢用羊子肝一具以竹刀子批開摻藥在內用綿纒定米泔煮熟先薰過眼次服其汁後食其肝兒小即分減服之又方白芷一分薑石一兩搗研水飛桑耳一分槐白皮一分銼右為末細散每用豬子肝一片兩指大切入藥末三錢却繫定以米泔內煮熟量兒大小斟酌與服之史君子散治小兒眼疳諸藥未效史君子五顆訶梨勒皮三顆乾蟾頭一枚塗酥炙焦黃甘草一分微赤炙銼右為細散以羊子肝一枚用砂盆內生米泔一盒爛研絞汁食後調下半錢三嵗以下即可服一字又方治小兒眼疳夜明砂微炒薑石搗研水飛過芎藭已上各三分右為細散用羊子肝一枚以米泔半盞同研絞取汁調下半錢日三服三嵗以下可服一字又方黃連末麝香細研硃砂細研各一分右都研令勻每服半錢用豬子肝切破入藥以絹袋子盛用米泔煮熟放冷食之量兒大小增減又方寒水石一兩薑石一兩細細搗研飛過豆豉一合微炒右為細散每於食後以米泔調下半錢量兒加減服又方決明子半兩蕤仁半兩湯浸去赤皮黃連半兩去鬚右搗碎用水一盞入古錢四十文煎取五分綿濾澄清日點三四度差薑石散治小兒眼疳怕日赤爛淚下疼痛不久眼睛將落宜早治之薑石以濃米疳浸七日乾搗研水飛過桑耳搗羅為末用豆豉乾為末已上兩右研令勻三嵗以下每服半錢三嵗以上至七嵗每服一錢用羊肝或豬肝牛肝兩指大去膜細切以水研絞取汁調下日三服清神散治小兒眼疳及疱瘡入眼惡實微炒木通銼晚蠶砂各一分右為細末每服以溫水調下半錢日三服量兒大小以意加減又方羯羊肝一具切爛決明子一兩右搗羅決明子為細散摻入肝內用米泔兩碗煮汁盡為度不計食前後量兒大小任意食之治小兒眼疳不見物者出聖惠方寒水石一兩為末水銀右相和點水銀研令水銀盡為度每服米泔研豬子肝半具絞取汁調下半錢量兒大小加減服之治小兒眼疳睛腫欲垂落者出聖惠方右以生雞子清塗掌中徐徐拓之遂至漸差治小兒眼疳及雀目醫膜遮障右取蛤粉一分化黃臘汁與蛤粉相和如皂角子大用羊子肝一枚批破內藥一丸在內著綿子繫定入米泔內用夜明砂一錢黃芩末一錢同煮令熟將肝於臨時任意服之又方出聖惠方右以紫草花爛搗以生油調塗之便差聖散子出家藏方治小兒疳眼并豆入眼右以天靈蓋一片翻覆塗酥炭火燒令通赤點酥煙絶取出放在地上研細使羊子肝如兩指一片生用細切鑲藥末半錢許不可多使以麵片包蒸熟食後喫神效鼻疳附論夫肺氣通於鼻鼻者肺之侯若小兒乳食不調上焦壅滯令蟲上於鼻也其候鼻癢壯熱多啼皮毛乾焦肌膚消瘦咳嗽上氣下痢無恆連唇生瘡赤爛故曰鼻疳也方雄黃丸治小兒鼻疳壯熱多睡昏沉毛髮焦黃體無潤澤雄黃細研熊膽細研黃連去鬚青黛細研麝香研細辛乾漆搗碎炒令煙出蘭香子蛇脫皮微研狗頭骨灰蜣蜋微炒蘆薈細研龍膽去蘆頭蝸牛殼燒令微黃地龍微炒蟬殼微炒已上各半分右為末入研了藥都令勻以軟飯和丸如菉豆大每服以冷水下三丸日三服量兒大小增減服之甘草散治小兒鼻疳生瘡痛癢不止甘草一分炙微赤銼地榆一分銼蚺蛇膽一錢蝸牛殼一兩炒令微黃麝香一錢細研蘭香根一分燒灰人糞灰一分龍腦半錢細研右為細散入腦麝等研令勻每服以粥飲調下半錢亦可吹於鼻中三嵗以下可服一字麝香散治小兒疳蟲蝕兒唇鼻麝香一分細研石膽一分細研茛菪子半兩生用人糞灰半兩莽草一分炙微炒雄黃半分細研地龍右為末都研令勻貼於瘡上日三用之吹鼻蟬殼散治小兒鼻疳癢蟬殼微炒青黛細研蛇蛻皮灰滑石麝香細研已上各一分右為細散都研令勻每用菉豆大吹入鼻中日三用之疳蟲盡出石膽散治小兒疳蟲蝕兒鼻石膽三分雄黃一分人糞灰三分頭髮灰半兩鯽魚一枚長三寸者開肚塗鹽燒作灰右都細研令勻先以甘草湯洗瘡拭乾後貼此散日三用之治小兒鼻疳羸瘦壯熱口鼻生瘡一名天靈蓋丸胡黃連半兩砒霜一分人糞半兩天靈蓋一兩茛菪子一分右都入瓷瓶子內以黃泥固濟燒令通赤放冷取出别入木香一分同研為末用麵糊和丸菉豆大每一嵗以乳汁研一丸服之或為傅瘡上亦良吹鼻散治小兒鼻疳常用地榆一分銼青黛一分細研人糞灰一錢麝香半錢細研蝸牛殼二七枚炒令微黃右為末每用半兩黃米吹鼻中蘆薈散治小兒鼻疳蟲蝕鼻癢痛不止蘆薈一分黃蘖末青黛半兩雄黃半兩右四味研極細為散每日三度以少許傅瘡上即瘥矣治小兒疳癢方益母草根末一分麝香一錢定粉一分蜜陀僧一分右都研令細乾貼鼻內立效吹鼻方治小兒鼻疳瘥地龍二條微炒瓜葉一分麝香半錢細研蝦蟆頭一枚燒灰右為細散研入麝香令勻日二三度用少許吹鼻中吹鼻散一名海半散治小兒鼻眼耳癢類橘皮髮乾毛竪宜用蝸牛殼一分燒令微黃蝦蟇灰一錢麝香一錢細研瓜蒂七枚右為細散研入麝香令勻用少許吹入鼻中日三四度兼點少許口中甚佳後更煮益母草葉粥與吃澤㵼散治小兒肺積鼻內生瘡及鼻下赤爛川澤㵼甘鬱金甘草炙山梔子炒右各一分為末每服嬰孩一字二三嵗半錢五七嵗一錢甘草湯調下一日二服宜再用紫金散傅之麝香散治鼻疳肺氣通於鼻其鼻中赤癢壯熱多啼毛皮乾焦肌膚瘦削鼻下連唇生瘡赤爛麝香半錢研雄黃研升麻各二錢半白礬枯半兩右為末每用少許乳調白傅於瘡上乃服蘆薈丸等藥蝦蟇灰一分人中白半分麝香一錢右都研細乾貼鼻內日三用之又方黃蘖一分研雄黃一分細研麝香一錢細研右都研細令勻以生油調日三四上塗之青金散治小兒鼻疳爛銅青白礬生等分右為末每用少許傅鼻下治小兒鼻口疳蝕生瘡黃瘦不食乳石膽一分蘆薈一分右細研為散摻在蝕處其所傷處當化為膿但頻摻在好肉亦别有損動漸差治小兒疳瘡蟲鼻黃連半兩去鬚搗為末石膽一分細研右都令勻以生油調塗於鼻中又方雄黃一分細研瓜蒂一分右細為散研令勻以生油調塗於鼻中又方雄黃一分細研瓜蒂一分右細為散研令勻以生油調塗於鼻中又方乾蝦蟆一枚塗酥炙焦黃麝香一錢又方蘆薈一分細研黃蘖一分銼右為細散以水一合於瓷盞中浸經一食久用雞毛點於鼻中清膈散一名清肺湯治肺疳即氣疳由乳哺不調壅熱傷肺肺主氣通於鼻風濕之氣乘虛客於皮毛入於血脈故鼻下兩傍瘡濕癢爛是名􅉶其瘡痛汁所流處却又成瘡外證咳嗽喘逆壯熱惡寒皮膚粟生鼻乾流涕咽喉不利頥爛唾紅氣脹毛焦泄痢頻併多啼揉鼻咬甲寒熱一方有生乾地黃桑白皮炒五錢研用紫蘇黃芩當歸前胡連翹防風北梗天門冬去心赤茯苓甘草炙各二錢半右銼散每服二錢水一盞煎溫服不拘時候次服化􅉶丸化􅉶丸蕪荑蘆薈青黛乾川芎白芷稍胡黃連右末豬膽汁浸糕糊丸麻子大每服二十丸食後臨卧杏仁煎湯下其鼻常用熊膽泡湯小筆蘸洗候前藥各進數服却用青黛當歸赤小豆瓜蒂地榆黃連蘆薈等分雄黃少許細末入鼻斂瘡食疳夫小兒食疳者由脾胃不調乳食過度傷於臟腑之所致也是以小兒百日之內腸胃尚嫩哺乳猶少三嵗之外氣血漸盛乳食漸多其乳母須在調適寒溫節減五味令氣血和平則孩孺無病也若飲食不節生冷過多積滯不消在於腸胃致成食疳也其狀面色萎黃肌體羸瘦腹大腳細毛髮乾焦鼻口常乾好喫泥土腦中大熱肚上青筋口舌生瘡水榖不化下痢無度漸漸困羸者是其候也方木香丸出聖惠方治小兒食疳腹中多痛大腸或痢鼻癢乾瘦時有體熱木香麝香細研胡黃連蘆薈細研蟾酥炙令焦黃香墨青黛細研雄黃細研熊膽已上各一分史君子半兩右為末煉蜜和丸如菉豆大每服以粥飲下五丸量兒大小以意加減大黃丸出聖惠方治小兒食疳心腹空脹妨悶或時熱渴川大黃銼微炒黃連去鬚桂心代赭細研已上各一兩硃砂一分細研木香半兩麝香一分細研肉豆䓻二顆去殼杏仁半兩先洗去皮尖兩人麩炒黃研膏巴豆一分去皮心研紙褁壓去油右為末巴豆杏仁都研令勻煉蜜丸如麻子大每服粥飲下三丸量兒大小加減服之檳榔丸出聖惠方治小兒食疳氣長肌膚益顔色化宿食治腹脹利氣調𠂻能破積聚檳榔硃砂細研代赭細研乳香研入木香五靈脂麝香阿魏麵裹煨麵熟為度肉豆䓻去殼已上各一分蟾頭一枚炙黃色巴豆七枚去皮心研紙裹壓去油右為末同研令勻以麵糊丸黍米大每服以溫薑湯下二丸量兒大小以意加減桃花散出聖惠方治小兒食疳腹脹桃花一分乾蟾塗酥炙令黃青黛細研赤芍藥肉豆䓻去殼紫笋茶已上各半兩右為末每服以溫粥飲調下半錢看兒大小臨時加減代赭丸出聖惠方治小兒食疳腹脹體瘦宿食不消多啼壯熱代赭一分赤石脂一分硃砂一分細研巴豆十枚去皮心研紙裹壓去油杏仁二七枚銅針穿燈上燎作聲為度别研右件藥並須新好入乳鉢同研令勻用飲和丸如粟米大每服以粥飲下一丸乳汁亦得量兒大小以意加減抵聖散出聖惠方治小兒食疳不欲乳食羸瘦蟾一枚塗酥炙微黃蜣蜋一分去趐足微炒麥蘖一分微炒神麯一分微黃右為散每服以粥飲調下半錢量兒大小加減服之靈脂丸治脾疳即食疳由乳食不節脾胃受傷或乳母恣食生冷甘肥或乳食過飽或後與之乳致吐乳多睡久則成癖腹脅結塊其證面黃身黃肚大腳小吐逆中滿乏力多啼水榖不消泄下醋臭合面困睡減食吃泥北五靈脂縮砂仁麥芽白豆䓻仁莪术炒青皮去白蝦蟆炙史君子炒胡黃連乾蟾二個酥炙巴豆七粒去心膜去其油研麝香一分研右為細末滴水於石臼中搗一二百下和丸如黍米大每服二粒至三粒溫生薑湯送下乳食後加減訶子散治小兒脾疳丁香白丁香舶上硫黃蜜陀僧訶子一對石燕子一對輕粉少許右為細末如病大者七嵗以下每服半錢七嵗以上者每服一錢溫水調下治小兒脾疳蘆薈史君子已上各等分右為細末米飲調下一二錢服之治小兒未行或母有孕飲交妳羸瘦方右伏翼熟炙噉之日三兩度食之一名蝙蝠黃連丸治小兒食疳頭面虛腫腹內泄㵼面色萎黃頭髮作穗心腹脹滿肚上青筋癩蝦蟆一個去腸肚以酒浸一宿炙令香熟木香一分胡黃連半兩木鱉子半兩燒令煙盡研沉香一分丁香一分麝香少許乾薑一錢燒令存性用巴豆二十一枚以水淘洗去心膜以紙裹用重物壓出油再研如麵右細杵為末以水浸蒸餅為丸如蘿蔔子大空心臨卧米飲下一丸三嵗已上二丸至三丸忌粘滑物普濟方卷三百八十一
