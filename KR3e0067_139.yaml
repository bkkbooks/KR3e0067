body:
  text: 普濟方卷一百四十明周王朱橚撰傷寒門治傷寒心腹脹痛論夫傷寒心腹脹痛者其中人臓腑久冷因染斯疾未得汗間心神煩熱遂服凉藥及飲冷水傷於心脾動於風冷故令心腹脹痛也或有經吐下已後不解内外有熱亦心腹脹痛此為内有結實故也歌曰腹痛腎兮通脈湯肺兼表症桂加黄實疼便結虛痢利脹則陳皮梗下良又論云邪在裏陽邪入裏與正氣搏則為腹痛所以痛者有異焉脈實腹痛滿大閉者實痛也脈虛腸鳴而大便泄者虚痛也隂陽異症用藥不同大抵痛為邪氣實法當疎利隂受病則只宜用養正丹輩温而利之少隂腹痛四逆或欬或悸或小便不利或泄利下重四逆㪚下利清穀脈微欲絶通脈四逆湯腹痛小便不利用真武湯誤下太陽因而腹滿時痛是有表復有裏為太隂太陽俱病用桂枝芍藥湯痛甚桂枝加大黄湯實痛者關脈實煩燥腹滿大便閉結桂枝加大黄湯小承氣湯胸中熱胃中邪氣腹痛欲嘔吐則用黄連湯虛痛者寸脈濇尺脈閉腸鳴泄利先與小建中湯不瘥小柴胡去黄芩加芍藥投之間用建中湯加逺志腹中冷痛四肢厥逆用薑附湯腹脹者隂陽不和也桔梗半夏湯最良活人書云本太陽病醫反下之因而腹滿時痛病有表有裏仲景所以用桂枝加芍藥湯主之痛甚者加大黄桂枝加芍藥即是小建中也太隂脈弱自利設當行大黄芍藥者宜减之其人胃虛陽氣易動故也下利者先煎芍藥十餘沸難經云痛為實大抵痛宜下仲景云發汗不解腹滿痛者急下之宜大承氣湯又曰腹中滿痛此為實當下之属大柴胡湯腹痛有二症有熱痛有冷痛尺脈弦腸鳴泄利而痛者冷痛也小建中湯主之仲景云陽脈濇隂脈弦法當腹中急痛先與小建中湯不瘥者與小柴胡湯小柴胡去黄芩加芍藥隂症腹痛即四逆㪚通脉四逆加芍藥腹小便不利者真武湯也關脈實腹滿大便閉澁按而痛者實痛也桂枝加大黄湯黄連湯大承氣湯主之又有腹脹滿者何也隂陽不和也桔梗半夏湯最良仲景論太陽症發汗復腹脹滿者厚朴生薑半夏甘草人參湯下後心煩腹滿卧起不安者梔子厚朴湯吐後腹脹滿者與調胃承氣湯少隂病六七日腹脹不大便者急下之宜承氣湯也方厚朴㪚出聖恵方治傷寒因有熱服冷藥過度心腹脹痛厚朴去粗皮塗生姜汁炙令香熟一兩當歸剉微炒枳殻麩炒微黄去穰木香大腹皮剉各半兩訶梨勒煨用皮一兩右粗搗篩毎服四錢水一中盞入生薑半分煎六分去滓不計時候稍熱服木香㪚出聖恵方治傷寒冷氣積在腹中脹滿疼痛木香枳殻麩炒微黄去穰柴胡去苖當歸剉微炒各三分乾薑炮製剉半兩呉茱茰湯浸七遍焙乾微炒一分右粗搗篩毎服三錢水一中盞入棗三枚煎六分去滓稍熱不計時候服一方呉茱茰用生薑半分同煎桃仁散出聖恵方治傷寒心腹脹滿疼痛桃仁湯浸去皮尖雙仁麩炒微黄枳殻麩炒微黄去穰神麯炒令微黄麥蘖炒令微黄各三分桂心白术各一兩右為粗㪚毎服三錢水一中盞煎六分去滓稍熱不計時服之當歸㪚出聖恵方治傷寒脾胃虛心腹脹痛不思飲食當歸剉㣲炒乾薑炮製剉各半兩桂心芎藭陳皮湯浸去白穰焙梹榔各一兩右為㪚毎服三錢以水一中盞煎六分去滓稍熱不計時候服赤芍藥㪚出聖恵方治傷寒脾胃氣滯心腹脹痛不欲飲食赤芍藥訶梨勒煨用皮當歸剉微炒肉荳蔲去殻人參去蘆頭郁李仁湯冼去皮尖微炒桂心各三分陳橘皮湯浸去白穰焙梹榔各一兩右為㪚毎服三錢以水一中盞入棗三枚煎六分去滓不計時候温服柴胡㪚出聖恵方治傷寒發汗氣壅不㪚攻心脹痛柴胡去苖黄芩赤芍藥梹榔各三分枳殻麩炒微黄去穣半夏湯洗七遍去滑大腹皮剉木香各半兩右為㪚毎服三錢以水一中盞入生薑半分煎六分去滓不計時候温服赤茯苓㪚出聖恵方治傷寒卒心腹痛脹滿不下飲食赤茯苓桔梗去蘆頭陳橘皮湯浸人參半兩去蘆頭梹榔三分右為㪚毎服三錢以水一中盞入棗三枚煎六分去滓稍熱不計時候服大黄丸出聖恵方治傷寒大腸氣壅心腹脹滿疼痛四肢骨節酸疼煩悶不得眠卧川大黄一兩剉碎微炒木香桂心甘草炙微赤剉各一分枳殻麩炒微黄去穰梹榔各半兩郁李仁三分湯浸去皮尖微炒右為末煉蜜和搗一二百杵丸如梧桐子大毎服不計時候以温酒服下三十丸以利為度治傷寒冷氣攻心腹脹滿疼痛不下飲食方出聖恵方木香赤芍藥厚朴去粗皮生姜汁炙令香熟各三分甘草一分炒微赤剉呉茱茰湯浸七遍焙乾微炒桂心乾薑炮製剉白术青橘皮湯浸去白穰焙各半兩右為㪚毎服四錢以水一中盞入棗三枚煎六分去滓不計時候稍熱服半夏㪚出聖惠方治傷寒心腹脹滿疼痛胸膈壅滯或嘔噦不能飲食宜服半夏湯洗七遍去滑前胡去蘆頭訶梨勒皮赤芍藥人參去蘆頭各三分桂心木香梹榔各半兩陳橘皮一兩湯浸去白穰右為㪚毎服四錢以水一中盞入生薑半分煎六分去滓稍熱不計時候服厚朴㪚出聖恵方治傷寒汗後腹脹疼痛厚朴二兩去粗皮塗生姜汁炙令香熟川大黄剉碎微炒人參去蘆頭各一兩芎藭赤芍藥陳橘皮湯浸去白穰各三分右為㪚毎服四錢以水一中盞入生薑半分煎六分去滓稍熱不計時候服桃仁湯出聖濟總錄治傷寒後心腹脹痛桃仁湯浸去皮尖雙仁炒令黄陳麴炒大麥蘖炒桑皮各一兩白术桂去粗皮各一兩右粗搗篩毎服三錢水一盞煎半盞去滓食前温服烏藥㪚治厥隂病脇脹引小腹而痛者此為疝也烏藥茴香青皮赤豆各一兩乾漆沒藥各二兩硇砂滑石髙良薑各一兩右除硇砂别入搗篩為㪚取一盞温酒或白飲和服仍以鈐按伏之患釋柴胡芍藥湯出聖濟總錄治傷寒發汗後邪熱不除腹脇脹痛柴胡去苖芍藥黄芩去黒心各三分大腹皮半夏湯洗去滑炒乾枳殻去穰麩炒各半兩梹榔剉一分右粗搗篩毎服三錢水一盞入生薑半分拍碎同煎至半盞去滓温服又治傷寒發汗惡氣心腹脹滿以薄荷煮汁服大解利之傷寒厥逆論夫傷寒病手足逆冷其名曰厥此因陽氣衰隂氣盛隂盛則陽脈逆而不通于四肢所以逆冷其症令人惡寒不飲水下利清穀或清便自調或小便數症黙静是其候也宜温之炙之若炙之而手足不温者為難治然厥亦有熱厥者先發熱而後厥熱深厥亦深熱微厥亦微脈雖沈伏按之當滑若或畏熱或飲水揚手擲足煩躁不得眠大便閉小便赤外症昏憒者雖厥不可温也宜下之隂陽相乗而生寒熱厥者脈症似同而大異寒厥者初得之四肢冷脈沈微而不數多惡寒引衣自覆下利清穀外症多惺熱厥者初得之必發熱頭疼脈雖沈伏按之必數其人或畏熱喜冷揚手掉足煩躁不眠大小便閉赤外症多昏冒傷寒亦然治之各有方傷寒厥者冷也甚於四逆也經曰厥有隂陽氣不相順接便為厥厥者手足逆冷是也謂陽氣内陷熱氣逆伏而手足為之冷也經曰傷寒一二日至四五日厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微是知内陷者手足為厥矣少隂病但厥無汗而强發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭亦是言發動其熱也先熱而後厥者熱伏於内也先厥而後熱者隂退而陽氣得復也若始得之便厥者則是陽氣不足而隂氣勝也大抵厥逆為因所主寒者多矣而又有進退之别經曰病厥五日熱亦五日設六日當復厥不厥者自愈發熱四日厥反三日厥少熱多其病自愈厥畏熱反厥五日其病為進寒多熱少陽氣退故病進也病至厥隂傳經盡也當是之時陽氣勝隂厥少熱多其病則愈若或隂氣反勝陽不得復厥多熱少其病則逆厥為隂氣至也熱為陽寒復也至於下利則曰先厥後發熱而利必自止見厥復利厥者復為熱為陽氣得復而利必自止熱者復為厥是隂氣還勝也故復下利矣諸陽受氣於胸中邪氣客感於胸中欝欝留結則陽氣不得敷布而手足為之厥經曰手足厥冷脈乍𦂳邪結在胸中必中滿而煩饑不能食病在胸中鬰結者是矣厥為隂之盛也若更加之惡寒而倦者隂氣之極也則難制治經曰少隂病惡寒身倦而利手足厥冷者不治是厥冷之逆者神丹不能救也厥有二症有隂厥有陽厥仲景所謂熱深則厥深也盖陽極則發厥也不可一例作隂症治之初得病而身熱至三四日熱後氣方深大便閉小便赤或譫語煩躁昏憒及别有熱症而反發厥者陽厥也急用大柴胡湯大承氣湯隨輕重用之若冇大叚輕者白虎湯初得病身不寒熱大便不閉引衣自盖或下利或小便數無熱症而厥逆者隂厥也四逆湯理中湯通脈四逆湯當歸四逆加茱茰生薑湯隂陽二厥脈皆沈所以最難辨也隂厥脈沈遲而弱陽厥脈沈而滑或去𦂳又陽厥指爪時時温隂厥常冷也症治論云若兩脈不見者只以外症辨冷熱也若未辨隂陽者且與四順丸試之若是陽厥則當見熱症若是隂厥不發熱矣手足指頭微寒者謂之清此疾為輕只可服理中之類已成厥者則用四逆也脈不至者通脈四逆等湯厥而脈乍結者邪氣結在胸中也亦令人厥爪蒂㪚吐法厥而怔忡者有水也宜洗治水属厥隂藏厥傷寒四逆四肢逆而不温者是也積凉成寒積温成熱非一朝一夕之故其所由來者漸矣傷寒始者邪在皮膚當太陽陽明受邪之時則一身手足盡熱當少陽太隂受邪之時則手足自温是表邪漸緩而欲傳裏也經曰有傷寒四五日手足温而渇者小柴胡湯主之是太陽之邪傳之陽也傷寒脈浮手足自温者其病係在太隂是少陽邪傳於太隂也是知邪氣在半表半裏則手足不熱而自温也至於邪傳少隂而裏症已深雖未至厥而手足又加之不温是四逆也若至厥隂則手足厥冷矣經曰少隂病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之方用柴胡枳實芍藥甘草四者皆是寒冷之物而専主四逆之疾是知四逆非虚寒之症也又有四逆諸湯亦治四逆手足寒方用乾薑附子熱藥者其㫖微矣若手足自熱而至温從四逆而至厥者傳經之邪也四逆散主之若始傳之手足便厥而不温者是隂經受邪陽氣不足可用四逆湯温之然須識此勿令悞也四逆與厥相近而非也經曰諸四厥者不可下是四逆與厥者異也吐利煩躁見四逆者死是難治者四逆也診視之間宜詳究之歌曰四逆須将腎症詳病來手足但微凉枳柴芍藥傳經劑邪中隂經四逆湯又論云手足不温謂之四逆隂經之邪主之太隂受病手足自温傳至少隂則有手足四逆之症四逆之與厥冷實相逺也或曰均是四逆耳而四逆湯㪚一寒一熱用藥何不類耶盖手足自熱而至温由温而至四逆是傳經之邪非虛寒之候也四逆㪚主之若得病已來手足不温便成厥逆此則隂經受邪陽氣不足也可以四逆温之臨診要當審此雖然吐利煩惡見四逆四逆下利惡寒而倦並属少隂又為不治之診故併及之少隂四逆其人或咳或悸或小便不利或腹中痛滿或泄利下重並用四逆㪚初病以來厥冷四逆即用四逆湯温之兩足脛逆冷有本條凢厥逆冷厥初來厥有源沈遲而弱冷常存熱深發厥初身熱沈滑時平指爪温陽氣伏藏隂氣越出隂陽不相接所以厥也其手足厥冷之症乎盖諸陽會於四肢陽微而為隂所勝初病便厥者是為冷厥其脈沈遲按之則弱醒醒而静惡寒引衣足多攣卧或身上粟形或下利清穀也熱伏於内失熱而後厥者是為熱厥脈閉沈滑按之則數昏塞狂言發渇露手揚衣或燥不得眠或大便不得利也外症皆可驗之若先厥而後得熱是則隂邪退而陽氣復矣傷寒熱多厥少其病當愈厥多熱少其病則延下利則發厥一條亦厥者復為熱為有瘳熱者復厥為已甚盖下虛則厥隂實使之陽長隂消可治也雖然傷寒血症亦有四肢厥以至昏迷悶絶者此又不可知至若少隂下利惡寒而拳手足厥冷與胃臓厥一症皆為不治之診厥之為厥可無辨乎冷厥初病便作四肢逆冷足攣惡寒引衣自盖白通湯大小便而有滑泄外症黙黙而醒四逆湯理中湯白通加猪膽湯當歸四逆湯加茱茰生薑湯可選諸方用之又痰厥氣厥腎厥宜用易簡芎辛湯最良熱厥初病身熱然後發厥其人則畏熱揚手擲足及煩躁飲水頭汗大便閉小便赤怫欝昏憒盖當下失下血氣不通故四肢逆冷所謂熱深則厥深下症悉具而見厥逆者此也可與大承氣湯及大柴胡湯或白虎湯熱厥與冷厥相類但指爪時温為異耳若疑似尚未的當且以四順丸試之陽厥則有熱隂厥則無熱寒熱而厥者一手或兩手無脈面色闇昧不澤急投五味子并麻黄細辛甘草湯人參調血通脈可以為佐服無汗解則生投藥無汗或脈不至者不治水氣厥者心下怔忡可用茯苓甘草湯邪氣結胸中而厥者脈乍𦂳結乍心煩滿飢不欲食可與𤓰蒂㪚吐之臓厥者七八日逆冷下利發躁無時暫安則不能治痰飲厥逆眩運少與三牲飲妙方呉茱茰湯出聖恵方治傷寒吐利手足逆冷心煩悶絶宜服呉茱茰湯浸七遍焙乾微炒甘草一分炙微赤剉棗五枚生薑人參去蘆頭厚朴各半兩去粗皮塗生姜汁炙香熟右都細剉以水三大盞半煎至一盞半去滓不計時候分温四服益智子㪚出聖恵方治傷寒曽經發汗吐下寒氣未退脾胃氣虛胸膈煩滿手足逆冷宜服益智子川烏頭炮製去皮臍肉桂去皮當歸剉微炒乾薑炮製剉細辛髙良薑剉甘草炙微赤剉各半兩前胡去蘆頭厚朴各一兩去粗皮塗生姜汁炙令香熟右搗篩為㪚毎服三錢以水一中盞入棗三枚煎至六分去滓不計時稍熱服通脈㪚出聖恵方治傷寒病脈沈厥逆宜服麻黄一兩半去根節肉桂去皺皮附子各二兩炮製去皮臍甘草半兩炙微赤剉右搗篩為㪚毎服四錢以水一中盞入生薑半分棗三枚煎六分去滓不計時稍熱服治傷寒吐下之後胃氣虛寒食即吐逆四肢厥冷宜服此方出聖恵方人參去蘆頭白术桂心附子炮製去皮臍厚朴各一兩去粗皮塗生姜汁炙令香熱乾薑炮製剉陳橘皮湯浸去白穰焙甘草各三分炙微赤剉右搗篩為散毎服四錢以水一中盞煎六分去滓不計時候稍熱服附子散出聖恵方治傷寒手足厥冷脈細欲絶者宜服附子炮製去皮臍白术各一兩髙良薑各二分剉厚朴一兩半去粗皮生姜汁炙令香熟甘草一分炙微赤剉右搗篩為㪚每服四錢以水一中盞煎至六分去滓不計時候稍熱服白术湯出聖恵方治傷寒四逆手足厥冷汗出脈微及内有久寒白术一兩半人參三分去蘆頭桂心乾薑各半兩炮製剉附子一兩炮製去皮臍一作半兩甘草一分炙微赤一作三分右搗篩為㪚毎服五錢以水一大盞煎至五分去滓不計時候稍熱服附子湯出聖恵方治傷寒大熱出汗熱不去腹内拘急四肢厥冷并不利方甘草炙微赤剉乾薑炮製剉赤芍藥各一兩附子半兩炮製去皮臍右搗篩為㪚每服五錢以水一大盞半煎至一盞去滓不計時候稍熱服治傷寒手足厥逆嘔吐涎沫頭痛宜服此方呉茱茰半兩湯浸七遍焙乾微炒人參一兩去蘆頭右搗篩為㪚毎服三錢以水一大盞入生薑半分棗三枚煎六分去滓不計時稍熱服芍藥湯治傷寒下利清穀裏寒外熱汗出而厥腹痛兼嘔芍藥一兩附子炮製去皮臍三分人參甘草炙各半兩右剉如麻豆每服五錢水一中盞半入生薑半分拍碎同煎八分去滓服日晚再服呉茱茰湯治傷寒手足厥冷脈細欲絶者吳茱茰湯淘三遍焙乾炒當歸切焙芍藥各一兩甘草炙三分乾薑炮製半兩桂去粗皮一兩細辛去苗葉三分右粗搗篩毎服五錢水一盞酒半盞棗三枚擘破同煎八分去滓温服人參湯治傷寒裏寒外熱手足多厥人參白术各一兩細辛去苗葉乾薑炮製三分甘草炙赤半兩右粗搗篩毎服五錢水一盞半煎至一盞去滓食前温服陽起石丸治傷寒四逆陽起石太隂𤣥精石硝石附子炮製去皮臍各等分右搗篩研為細末湯浸蒸餅和丸如梧桐子大毎服五丸至十丸新汲水下汗出解正陽丸治傷寒手足厥冷脈沈細方見本門隂毒類澤潻湯治脈沈者半夏半升紫參五兩一作紫苑澤漆三斤以東流水五斗煮取一斗五升生薑五兩白前五兩甘草黄芩人參桂枝各三兩右㕮咀内澤漆汁中煮取五升温服五合至夜盡青龍湯下已多唾口燥寸脈沈尺脈微手足厥逆氣從小腹上衝胸咽手足痺其面翕如醉状因腹下流隂股小便難時復嘔者與茯苓桂心甘草五味子湯治其氣衝茯苓四兩桂心甘草各二兩五味子半升右㕮咀以水八升煮取三升去滓分三服温服衝氣即低而反更咳胸滿者用茯苓甘草五味子去桂加乾薑細辛以治其咳滿方五味子半升甘草乾薑細辛各一兩茯苓去黒皮四兩右㕮咀以水八升煮取三升去滓温服半升日三咳滿即止而更復渴衝氣復發者以細辛乾薑為熱藥也服之當逆渇而渇反止者為支飲也支飲胸當冐冐者必嘔嘔者復用半夏以去其水力半夏五味子各半升茯苓四兩細辛乾薑甘草各二兩右㕮咀以水八升煮取三升去滓温服半升日三水去嘔止其人形腫者應用麻黄以其人遂痺故不用麻黄用杏仁方出千金方杏仁五味子半夏各半升茯苓四兩乾薑細辛甘草各三兩右㕮咀以水一升煮取三升去滓温服半升日三若逆而用麻黄者其人心厥所以然者以其人血虛麻黄發其陽故也若面熱如醉此為胃熱上衝其面加大黄利之方大黄乾薑細辛甘草茯苓四兩五味子半夏杏仁各半升右㕮咀以水一斗煮取三升去滓温服半升日三咳而上氣肺脹其脈浮心下有水氣脇下痛引缺盆設若有實者必躁其人常倚仗小青龍加石膏湯主之方石膏乾薑桂心細辛各二兩芍藥甘草各二兩麻黄四兩半夏半升五味子一升右㕮咀以水一斗先煮麻黄减二升下藥煮取二升半强者服一升羸者减之小兒四合仲景常用治肺脹咳而上氣煩躁而喘脈浮者心下有水外臺秘要同赤丸方治傷寒氣厥逆茯苓半夏各四兩洗一方用麯烏頭二兩炮細辛一兩一作人參右為末用真珠砂為衣煉蜜丸如麻子大先食酒飲下三丸日夜一服不知稍増之以知為度附子㪚治傷寒時氣附子炮製去皮臍桂去粗皮各半兩右搗羅為㪚每服三錢熱酒調頓服厚衣盖汗出為度奪命川附湯治體虛感冐傷寒頭痛發熱或日輕夜重或午或早或晩或終日單發大熱雖渇不喜冷脈沈細氣虛者可服予嘗以此藥醫十數人凡所醫者皆效故錄附之川附一雙去皮臍炮切片右㕮咀作一服水一碗生薑十三片煎七分濾出水中沈冷再露一宿次早五更冷服一二口暫停看腹中有無發熱如無熱再進作二三次服其熱自退其效神速四逆湯治傷寒厥逆表熱裏寒下利清穀食入則吐或乾嘔或大汗大吐下之後四肢氷冷五内拘急舉體疼痛不渇脈沈伏大附子生用去皮臍半兩乾薑半兩甘草炙一兩右剉㪚每服四錢水二盞煎七分去滓食前温服連進取效返隂丹出王氏博濟方治傷寒厥逆太隂𤣥精石一兩為末硫黄一兩為末硝石一兩為末膩粉半兩右依次第放在乾熨斗内用濃墨染紙作盖子覆之以慢火煨久掲看藥上有黄芽生便止入乳缽内閇氣細研五七百下用蒸餅丸如皂子大傷寒脈細四肢冷逆及曽轉㵼者濃煎艾湯一盞先熱與喫一半細嚼一丸下須臾汗出便差重者不過二丸必愈傷寒後不得眠論夫衛氣晝行於陽夜行於隂隂主夜主卧謂陽氣盡隂氣盛則目瞑矣今熱氣未㪚於諸陽所以陽獨盛隂偏虛今病後不得睡者隂氣未復故也榮衛之氣晝行於陽則寤夜行於隂則寐傷寒差後臓腑皆虛榮衛出入不能循常縁熱邪未㪚與陽氣并衛氣獨行於陽入隂則陽盛隂虛故不眠歌曰不眠腎症利而煩大熱膀胱胃裏乾吐汗出下餘懊憹熱多熱少數般看經云胃不和卧不安不和者津液乾焦邪熱煩躁陽獨盛而隂偏虛故爾盖夜以隂為主隂盛則目閉而卧安惟夫隂為陽奪故終夜煩擾而不得寜所謂隂虛夜不静者此也若陽虛而隂反盛又有夜静晝煩之症矣少隂不利而渇不得眠猪苓湯此停水也若二三日以上心煩不得眠黄連阿膠湯主之甚良太陽發汗多或大汗出胃中乾煩熱不得眠欲飲水者與之和胃即愈矣若脈浮小便不利渇可與五苓㪚吐汗下後心中懊憹虛煩顛例不得眠梔子豉湯或酸棗湯大熱乾嘔呻吟錯語不得眠黄連解毒湯凡陽毒熱病皆不得眠下後發汗無大熱脈微沈不嘔渇無表症夜静晝煩而不得眠可與乾薑附子湯陽勝隂則狂眠亂夢可與梔子䜴湯隂勝陽則驚悸昏沈宜用酸棗湯瘥後不得眠者熱氣與諸陽相併隂氣未復故也宜用梔子烏梅湯或湯簡温膽湯加竹茹此可通用又多眠歌曰神昏多睡病堪憐汗風温黙黙然狐惑唇瘡腎脉弱太陽浮細亦癡眠隂邪陽盛人多昏黙昏昏閉目者隂司闔也黙黙不言者隂主静也多眠四症二者病在經若太陽惡寒其脈浮細是陽氣未盡復也若狐惑淹沈素得之下利則不亡陽可知矣此所以為隂盛與風温症尺寸俱浮自汗喘息體重不收嘿嘿然欲眠不可發汗可與萎㽔湯病在少隂厥隂二經狐惑經四肢沈重咽乾聲啞上下唇瘡害人甚急有本條少隂症尺寸俱沈細且欲寐急與四逆湯復其陽氣又少隂欲吐不吐煩而多寐五六日自利而渇張氏無治法若是少便白者可用四逆湯甚妙張氏又云少隂病脈微沈細多寐汗出不煩欲吐若變症者五六日自利煩躁及不得寐者死少隂症變難活貴乎詳審而治之也太陽症頭痛惡寒嗜卧脈浮細或胸脇滿者宜用小柴胡湯脈且浮宜麻黄湯胃傷風發黄嗜卧自有本條嘗為歌云差後昏沈似伏妖或時寒熱或時嘲語言錯謬精神少毒在心胸汗未消傷寒差半月以來終不能惺惺謬錯言語精神短少或寒或熱似瘧或嘲熱頰赤醫者若以風魅治之非也是由發汗不盡餘毒在心胞絡開使之然也瘥後沈昏不醒可與知母麻黄湯再取微汗瘥後勞復食復見下後有熱條瘥後胃脘餘熱虛煩而吐用竹葉湯加生薑差後喜睡膈上有寒宜用理中丸差後從腰以下有水氣宜用牡蠣澤㵼㪚差後日暮㣲煩以其病方差强與穀食而不消也節飲則可愈矣方麥門冬㪚出聖恵方治傷寒後體虛煩熱不得睡卧少思飲食宜服麥門冬去心黄芩各三分茯神熟乾地黄人參去蘆頭黄耆剉各一兩甘草炙半兩㣲赤剉右搗篩為㪚每服五錢以水一大盞入生薑半分棗三枚粳米五十粒煎至五分去滓不計時候服治傷寒後虛煩不得眠睡心中懊憹宜服梔子烏梅湯出活人書甘草炙微赤剉梔子仁黄芩各半兩烏梅肉十四枚微炒柴胡一兩去苖右搗篩為㪚每服四錢以水一中盞入生薑半分竹葉二十七片豉五十粒煎至六分去滓不計時候温服熟乾地黄㪚出聖恵方治傷寒後體虛心煩不得眠卧四肢少力熟乾地黄一兩半白芍藥羚羊角屑茯神黄耆剉麥門冬去心酸棗仁微炒人參去蘆頭一兩右搗篩為㪚毎服四錢以水一中盞煎六分去滓入鷄子清一枚攪令勻温服又方出聖恵方半夏三分湯洗七遍去滑白茯苓一兩半黄芩一兩右搗篩為㪚每服五錢以水一大盞入生薑半分粳米五十粒煎至五分去滓温服酸棗仁㪚出聖恵方治傷寒後體虛乏力筋脈拘急四肢疼痛不得睡卧宜服酸棗仁一兩㣲炒麥門冬去心防風去蘆頭芎藭各半兩當歸㣲炒剉白茯苓羚羊角屑人參去蘆頭黄耆剉各三兩右搗篩為㪚每服四錢以水一中盞入生薑半分棗三枚煎六分去滓不計時候温服麥門冬㪚出聖恵方治傷寒後胃氣虛乏不思飲食四肢少力心神煩悶不得睡卧麥門冬去心黄耆剉人參去蘆頭各三分白术白茯苓各一兩酸棗仁甘草炙微赤剉芎藭桂心半夏湯洗七遍去滑各半兩陳橘皮三分湯浸去白穣焙右搗篩為㪚每服四錢以水一中盞入生薑半分竹葉七片棗三枚煎六分去滓不計時候温服茵蔯㪚出聖恵方治傷寒後伏熱在心中恍惚多驚不得睡卧宜服茵蔯犀角屑赤芍藥麥門冬黄芩梔子仁甘草各半兩炙微赤剉柴胡去苖茯神各一兩右搗篩為末每服四錢以水一中盞入生薑半分竹葉二七片生地黄一分煎至六分去滓不計時候温服梔子豉湯出徳生堂方治傷寒汗後虚煩不得眠卧劇者必反覆顛倒心中懊憹感冐發為寒熱頭疼體痛並皆治之梔子十四枚香豉四合右㕮咀麻豆大毎服三錢水一盞煎至七分去滓温服一二服得吐止後服一方有薤白一握一方黑砂糖一小塊嚼下用服以漿水投之即吐酸棗仁湯出活人書治傷寒吐下後心煩氣乏晝夜不得眠酸棗仁炒一兩麥門冬去心焙二合甘草一分炙知母切焙半兩白茯苓去黑皮芎藭乾薑各一兩右㕮咀如麻豆大毎服四錢水一盞半煎至一盞温服酸棗仁甘草湯出聖濟總錄治傷寒後勞損煩躁不得眠酸棗仁微炒四兩甘草炙剉當歸切焙桂去粗皮人參白茯苓去黒皮石膏碎芎藭各三兩逺志去心一分右粗搗篩每服五錢水一盞半煎至一盞去滓温服不拘時酸棗仁湯出聖濟總錄治傷寒汗後不得眠睡酸棗仁微炒二兩人參一兩石膏碎桂去粗皮知母切焙甘草炙各半兩赤茯苓去黒皮三分右粗搗篩每服五錢水一盞半煎至八分去滓温服不拘時酸棗仁黄芩湯出聖濟總錄治傷寒餘熱未㪚不得眠睡酸棗仁微炮二兩黄芩去黒心麥門冬去心焙甘草炙各半兩逺志去心萆薢各一兩人參切茯神去木各一兩桂去粗皮三分右粗搗篩每服五錢水一盞半生薑五片煎至一盞去滓食前温服日再梔子仁湯出聖濟總錄治傷寒後虛煩不得眠睡吐逆梔子仁豉炒各一兩酸棗仁炒一兩芎藭陳橘皮去白焙人參去蘆頭白茯苓去黒皮各半兩右粗搗篩每服三錢水一大盞生薑三片煎至七分去滓食前温服日再人參湯出聖濟總錄治傷寒後虛勞不得眠煩悶四肢乏力方見傷寒門虚類柴胡湯出聖濟總錄治傷寒後虛煩熱驚悸不得眠睡方見傷寒門虛煩類麥門冬茯苓飲出聖濟總錄治傷寒後煩滿心神恍惚不得眠睡方見傷寒門虛煩類地骨皮飲出聖濟總錄治傷寒後虛煩客熱累夜不得眠頭疼眼疼迷悶地骨皮洗麥門冬去心各二兩酸棗仁炒三兩右粗搗篩每服五錢水一盞半入生薑五片煎至七分去滓食後温服梅實丸出聖濟總錄治傷寒後虚煩不得睡梅實肉大棗肉酸棗仁炒等分右同搗成膏丸如彈子大每服一丸卧含化服酸棗仁湯出聖濟總錄治大病後及虛勞不得眠酸棗仁炒榆皮切各三兩右粗搗篩每服三錢水一盞煎至七分去滓温服黄連阿膠湯出肘後方治傷寒少隂病得之二三日以上者心中煩不得卧黄連一兩阿膠三分鷄子黄半箇黄芩一分芍藥半兩右剉㪚每服四錢水二盞煎取一盞去滓内膠消盡鷄子黄攪令和温服日二服半夏茯苓湯出肘後方治差後煩虛不得眠眼中疼痛懊憹半夏三兩洗秫米一升茯苓四兩右切以千里流水一石揚之萬遍澄取二斗合煮諸藥得五升去滓温分五服忌羊肉餳醋等物治差後虛煩不得眠眼中痛疼懊憹出肘後方䜴七合烏梅十七枚右以水四升先煮烏梅取一升半内豉取一升半分再服無烏梅用梔子十四枚亦得温膽湯出易簡方治大病後虛煩不得睡兼治心膽虛怯觸事易驚或夢寐不祥或異象眩惑遂致心驚膽懾氣欝生涎與氣傳變生諸症或氣短悸乏或復自汗或四肢浮腫飲食無味心虛煩悶坐卧不安悉能治之半夏枳實各一兩橘紅一兩半甘草四錢茯苓三分右㕮咀每服四錢水一盞半生薑七片棗一枚竹茹一塊如錢大煎至六分去滓食前熱服竹茹即刮竹青也此藥大治傷寒後及一切病後虚煩夜睡不寜者並宜用之若傷寒後尚有餘熱并熱在上焦又兼汗下後表裏俱虛不可攻者宜用竹葉石膏湯不利發熱竹葉湯中去石膏如熱附子名既濟湯嘔者二陳湯一法治傷寒重症時或發消渇燥煩用新羅參不拘多少煎湯浸令水冷後盛渇之時與之頓服熱則隨去大抵傷寒渇者不可多與之水水積胸中便為結胸然亦須濡㵼之可也結胸治法見于理中湯方中傷寒後咳逆其症最為危當用半夏一兩生薑一兩半白水煎服其他病亦惡咳逆當用丁香十粒乾柿蒂十五枚煎湯半盞乗熱頓服傷寒虚汗不止論夫傷寒自汗者謂不因發散而自然汗出者是也内經曰陽氣衛外而為固也衛為陽言衛䕶皮膚肥實腠理禁固津液不得妄泄汗者干之而邪出氣干于衛氣氣不能衛故于外則皮膚為之緩腠理為之疎由是而津液妄泄濈濈然閏浆浆然出謂之自汗也如發熱自汗出而不愈此衛氣不和風邪干于衛也太陽中暍汗出惡寒身熱而渇者暑邪干于衛者也是知衛氣固䕶津液不令妄泄心為邪氣干之而出也風寒暑濕之毒為四脈之氣中人則為傷寒風與暑濕為邪皆冷自汗惟寒邪傷人獨不出寒傷榮而不傷衛無邪氣所干則皮腠得以宻津液得以固是以不出也及其寒漸入裏因而為熱則亦使自汗出也葢熱則榮衛通腠理開而汗泄矣然自汗之症又有表裏之别焉虚實之異焉若汗出惡風㣲惡寒者此表未解也必待發散而後愈至於漏不止而惡風及發汗發惡寒者又皆表之虚也必待温經而後愈諸如此者皆邪氣在表者也汗出不惡寒者此為表解而裏未和也經曰陽明發熱汗出此為熱越又曰陽明病發熱汗多者急下之又非若邪氣在表而汗出之可緩也傷寒自汗之證為常也設或汗出髮閏又或出之如油或大如貫珠著身出而不流皆為不治之證也必手足俱周遍身悉皆潤澤一時間許煩熱已而身凉和乃為佳矣此則隂陽氣和水升火降榮衛通流邪出而解之也内經曰陽之汗以天地之雨名之此之謂也歌云汗多要自傷風始風濕風温胃不和中暑亡陽并霍亂陽明柔痓亦同科又論云傷風桂枝湯渇者五苓散不渇者茯苓甘草湯自汗出而小便難者桂枝附子湯自汗出而小便數者不可用桂枝也芍藥甘草湯風濕風温各有本條衛不和病人臟無他病時發熱自汗是也桂枝湯亡陽丸發汗多而漏不止者曰漏風亡陽桂枝附子湯尺寸脈俱𦂳主無汗而反汗出曰亡陽属少陽法當咽痛猪膚湯甘桔湯四肢冷而厥逆惡汗者四逆湯大扺隂病四肢逆冷額上及手背冷者發當無汗而有汗者曰亡陽四逆湯煩燥惡風汗出防風白术牡蠣湯次服小建中湯汗多不止者温粉投之霍亂手足逆冷者四逆湯有熱症而霍亂及中暑者香薷㪚信効多用小柴胡湯依常法前後極冷服之効陽明汗多而渇者調胃承氣湯陽明法當多汗者不可不知也小便自利者不可用承氣湯攻之宜服蜜導法惡寒者表未解桂枝湯反無汗惡寒者升麻葛根湯反無汗而喘者麻黄湯陽明症自汗出應小便不利而反利者津液内竭也屎雖硬不可攻之宜蜜導法猪膽導法方石膏㪚出聖恵方治傷寒頭痛惡寒虛汗不止宜服石膏牡蠣各三分燒為粉地骨皮白术五味子黄耆剉麻黄根各半兩右搗篩為㪚每服五錢以水一中盞煎六分去滓不計時候温服白术㪚出聖恵方治傷寒體虛汗出心煩頭痛惡風宜服白术麻黄不去根節石膏芎藭三分甘草炙㣲赤剉羌活羚羊角屑桂心知母各一兩右搗篩為㪚每服五錢以水一大盞入生薑半分煎五分去滓不計時候温服治傷寒汗出不歇宜服此方出聖恵方川大黄剉碎微炒黄連去鬚梔子仁黄蘖塗蜜微炒剉麻黄根去土各一兩右搗篩為㪚每服五錢以水一大盞煎至五分去滓不計時候温服治傷寒體虛夜卧汗出不止時發頭旋惡心不食宜服此方人參去蘆頭半夏湯洗七遍去滑黄耆剉各一兩麻黄根一兩半牡蠣二兩燒為粉防風三分去蘆右搗篩為㪚每服五錢以水一大盞入生薑半分煎五分去滓不計時候温服麻黄根湯出聖恵方治傷寒虛汗不止麻黄根黄耆剉龍骨各一兩五味子半兩牡蠣二兩燒為粉甘草三分炙㣲赤右搗篩為㪚每服五錢以水一大盞煎至五分去滓不計時候温服白茯苓㪚出聖恵方治傷寒脈㣲細汗出不止漸覺虛羸宜服白茯苓人參去蘆頭麻黄根牡蠣燒為粉肉蓯蓉酒浸一宿刮去皺皮炙乾各一兩白术白芍藥各三分五味子半兩右搗篩為㪚每服五錢以水一大盞煎至五分去滓不計時候温服人參㪚出聖恵方治傷寒虛汗不止多煩躁時時驚悸宜服人參去蘆頭逺志去心白茯苓麥門冬去心黄耆剉柴胡去苖各半兩甘草一分炙微赤剉龍骨一兩右搗篩為㪚毎服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候温服入竹茹一分同煎牡蠣㪚出聖濟總錄治傷寒脈候軟弱神氣羸劣虛汗不止宜服牡蠣一兩燒為粉白茯苓人參去蘆頭白术白芍藥麻黄根各三分右搗為㪚每服不計時候以粥飲調二錢治傷寒體虛汗出不止時時心悸宜服此方出聖恵方茯神伏龍肝各一兩牡蠣一兩半燒為粉麻黄根二兩右搗細羅為㪚每服不計時候煎金銀湯調二錢治傷寒汗出不止漸至困羸宜用此方出聖恵方牡蠣燒為粉麻黄根各五兩滑石三兩丁香一兩甘松香二兩右搗羅為㪚每度用生絹包藥五兩挨身體以汗止為度治傷寒濕温汗出徧身如水虚汗不止宜服出聖恵方杜仲一兩半去粗皮炙㣲黄剉牡蠣二兩燒為粉右搗羅為㪚每服不計時候以温水調下二錢一方等分搗篩向暮卧以水服一錢午後汗止者不再服服之令人乾燥若汗不止者復服一錢不過再服必有驗天行及百病後虛吸漏汗遂温之無不止者牡蠣㪚出聖恵方治傷寒汗不解宜服牡蠣燒為粉熟乾地黄白术龍骨人參去蘆頭各一兩甘草炙㣲赤剉白芍藥麥門冬去心各半兩黄耆二兩剉右搗篩為㪚每服四錢以水一中盞入生薑半分棗三枚煎六分去滓不計時候温服又方出聖恵方麻黄根牡蠣粉黄耆剉人參去蘆頭地骨皮龍骨各一兩右搗篩為㪚毎服五錢以水一大盞入棗三枚煎至五分去滓不計時候温服又方出聖恵方牡蠣粉麻黄根杜仲去粗皮炙㣲黄剉黄耆剉各一兩右搗細羅為㪚不計時候煎蛤粉調二錢又方出聖恵方麻黄根一兩半故蒲扇燒灰半兩右搗細羅為㪚每服不計時候以牛乳汁調下二錢治大病差後多虚汗及眼中流汗方出肘後方甘草石斛各一兩右搗末以浆水服方寸匕日二服差治大病後虚汗出不禁粢粉豉各等分炒焦故竹扇如掌大燒灰右合搗以絹囊盛粉身立止治汗不止方出千金方右用地黄三斤切以水一斗煮取三升分三服又方出千金方右以白术葉作飲飲之一方白术方寸匕日以飲服之治卒得汗不止方出千金方右以温酒服牛羊脂一方服尿亦止温肺湯出指南方治感寒多汗五味子細辛去苗半夏湯洗七次甘草乾薑各一兩右為粗末每服五錢水二盞棗一枚擘破同煎一盞去滓服甘草附子湯出指南方甘草一兩附子一兩炮去皮臍桂四兩去皮右為粗末毎服五錢水二盞煎一盞去滓服治吹霎冒雨頭痛惡寒虛汗出不止脈氣沈細頭冷痛嘔逆惡心出䕶命方麻黄去根芎藿香白术黄橘皮各一分甘草細辛各二銖右細羅為末每服二錢水一盞煎取八分食後空心去滓服傷寒毒攻手足論夫傷寒毒攻手足者熱勝則腫也熱毒之氣客于腑臓邪結在裏循經而出注於四肢故令人手足煩熱赤腫疼痛也病源熱毒氣從臓腑中出攻于手足則手足焮熱赤腫疼痛也人五臓六腑并榮衛皆出于手足指故此毒從内而出攻于手足也方連翹㪚出聖恵方連翹當歸麥門冬去心黄芩犀角屑各一兩川大黄剉碎微炒木香防風去蘆頭羌活枳殻麩炒微黄去穰牛蒡子微炒半兩麝香一錢細研右搗篩為㪚每服四錢以水一中盞煎至六分去滓不計時候温服治傷寒毒氣攻四肢虛腫宜服此方出聖恵方澤㵼柴胡去苖甜葶藶隔紙炒令紫色各三分半夏湯洗七遍去滑甘草炙微赤剉各半兩右搗篩為㪚每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候温服細辛散出聖恵方治傷寒發渇寒熱唇口乾焦毒氣攻四肢皆浮腫細辛芎藭郁李仁各一兩湯浸去皮尖微炒赤茯苓麥門冬去心各一兩半桑根白皮二兩剉甘草三分炙微赤剉右搗篩為㪚每服五錢以水一大盞煎至五分去滓不計時候温服治傷寒毒氣攻手足虛腫宜貼膏方一名鉛丹膏出聖恵方黄丹半兩蠟三兩松脂麻油各一兩乳香麝香各一兩右各别研為末以瓷器内先煉松脂并油次下蠟及黄丹乳香等慢火煎少時候冷攤于絹上貼腫處一切腫毒并用之一方無麻油又方出聖恵方清油一合蠟半兩鹽花一合右以瓷器中煉油熟次下蠟并鹽花用文武火煎成膏貼於腫處治傷寒毒氣攻手足虛腫疼痛宜服此方出千金方右用赤馬通一升水一斗五升煮取一斗絞取汁㸔冷熱以漬手足又方出千金方羊糞末一兩煉成猪脂二兩右相和令勻用塗腫處又方出千金方治時氣傷寒毒攻手足腫疼痛欲斷方右用虎杖半斤細剉以水一斗五升煎至一斗去滓㸔冷熱以漬手足一方令踝上有水尺許止之又方出聖恵方右用苦參半斤以水一斗煎至五七沸去滓㸔冷熱漬手足至踝上一尺止豉酒方治傷寒毒氣攻手足及身體虛腫宜服此方出聖恵方右用豉五合微炒以酒一升半煎五七沸去滓隨性稍熱飲之治傷寒毒氣攻手足腫方出聖恵方猪蹄一具葱白連鬚十莖右以水五升煮令猪蹄熟去滓入鹽二錢㸔冷熱漬腫處治傷寒毒氣攻手足虛腫及疼痛欲脱方出聖恵方䜴一斤猪肉一斤右以水一斗煮令猪肉熟去滓㸔冷熱用漬手足治傷寒時氣瘟病毒氣攻手足虛腫及疼痛欲脱亦治毒攻隂腫出聖恵方右用黄蘗二斤細剉以水一斗五升煎至五七沸去滓㸔冷熱漬手足又方出聖恵方猪肉一斤桃葉一斤右以水一斗五升煮令肉熟去滓㸔冷熱漬手足又方出聖恵方右用蒼耳苖絞取汁以漬手足又方出千金方右以稻穰燒灰淋汁漬之治傷寒毒攻手足痛右煮羊桃汁漬之佳少加鹽豉尤好療傷寒手足疼欲脱出千金方右取羊屎煮汁以灌之一方漬之差止疼療時疫隂囊及莖熱腫亦可煮黄蘖等洗之並除傷寒之疾防己丸出聖濟總錄治傷寒後毒氣攻四肢虛腫及喘息促急防己葶藶子炒郁李仁炒赤茯苓去黒皮百合各半兩桑根白皮剉木通剉各三分澤漆炒一分右搗羅為末煉蜜和更搗三五百杵丸如梧桐子大每服二十丸空心煎桑白皮湯下五香湯出聖濟總錄治傷寒毒氣攻四肢兩胸背虛腫沈香木香薰陸香鷄舌香别研各三分麝香研一錢白薇三分枳實麩炒麻黄去根節防風去叉萎㽔秦艽去苗土獨活去蘆頭甘草炙各半兩右除五香别搗外粗搗篩每服三錢用水一盞煎至七分去滓下五香末一錢再煎令沸温服食前臨卧日三服治傷寒餘熱不退論夫傷寒病其人已經發汗吐下或服藥已後而脈洪大實數腹内脹滿小便赤黄大便難或煩或渴面色變赤此為蔵有結熱故也傷寒後餘熱不解者盖隂陽未和邪氣未盡摶留經絡藴而生熱潮作如瘧鼻衂煩躁面赤目黄腹滿小便不利大便乾澀或即譫言渇欲水飲脈沈數者當以裏症求之脈若但浮者當消息治其外又云下之而熱不退者盖病人脈㣲而濇為醫所病大發其汗使陽氣㣲細大下之後隂氣弱其人亡血病當惡寒後乃發熱無休止時盖陽㣲則惡寒隂弱則發熱陽微惡寒四逆湯主之隂弱發熱為内熱葶藶苦酒湯主之大抵傷寒八日已上大發熱者此為難治仲景云脈隂陽俱虛熱不止者死又有醫人多用丸子藥下之身熱不住微煩者梔子乾薑湯主之傷寒五六日大下之後不去心中結痛者未欲解也梔子湯主之方犀角㪚治傷寒餘熱不退心神煩躁犀角屑木通剉各三分黄芩土𤓰根龍膽去蘆頭各一兩川朴半兩右粗搗篩每服四錢以水一中盞去滓不計時候温服柴胡㪚出聖恵方治傷寒餘熱不退發渇煩燥胸膈氣滯不思飲食柴胡去苗川大黄剉研㣲炒枳殻麩炒微炙去穰鼈甲去裙襕塗醋炙令黄㯽榔人參去蘆頭木香子芩赤芍藥赤茯苓紫苑去苗已上各三分犀角屑甘草炙微赤剉各半兩桑根白皮一兩剉右粗搗篩每服四錢水一中盞入生薑半分煎至六分去滓不計時候温服葳蕤散出聖恵方治傷寒十日已上餘熱不解時發増寒葳蕤柴胡去苗桑根白皮剉各一兩羚羊角屑川朴硝各三分甘草半兩炙微赤剉石膏二兩厚朴三分去粗皮塗生姜汁炙香熟肉桂半兩去粗皮右粗搗篩每服四錢水一中盞入生薑半分煎六分去滓不計時候温服知母㪚出聖恵方治傷寒已汗下後餘熱未退頭痛口乾煩燥知母􅌝􅌣根麥門冬去心各一兩甘草半兩炙微赤剉石膏一兩右粗搗篩每服四錢水一中盞入生薑半分粳米五十粒竹葉二七片煎六分去滓不拘時温服梔子湯出聖恵方治傷寒五六日大下之後餘熱不去心中結痛方見本門傷寒後不得眠類梔子䜴湯但加生薑半分煎人參㪚出聖恵方治傷寒發汗大下之後餘熱不去心中多煩人參一兩去蘆頭陳橘皮湯浸去白穰焙麥門冬去心梔子仁茯神各半兩右粗搗篩每服四錢水一中盞煎六分去滓不計時候温服茵蔯㪚出聖恵方治傷寒後餘熱在心恍惚多驚不得眠睡茵蔯梔子仁赤芍藥生乾地黄各三分犀角屑半兩麥門冬去心茯神各一兩甘草一分炙微赤剉右粗搗篩毎服四錢水一中盞入生薑半分青竹葉二七片煎六分去滓不計時候温服黄芩丸出聖恵方治傷寒後餘熱不退口乾煩燥黄芩梔子仁川大黄剉碎微炒鐵粉已上各二兩甘草半兩炙微赤剉右為細末煉蜜和丸如梧桐子大不計時候温水下二十丸龍膽丸出聖恵方治傷寒後餘熱在於胸中煩渇悶亂龍膽去蘆頭青葙子各一兩黄芩梔子仁苦參剉各半兩􅌝􅌣根半兩升麻黄蘖剉各三分右為細末煉蜜和搗三百杵丸如梧桐子大不計時候温水下三十丸麻黄湯出聖濟總錄治傷寒後餘熱脈浮者麻黄去根節煎掠去沬焙芍藥甘草炙令微赤剉各一兩桂去粗皮細辛去苖葉各半兩右粗搗篩每服五錢以水一盞半煎取八分去滓温服日三葛根湯出聖濟總録治傷寒及天行後頭痛餘熱不解葛根剉柴胡去苖各一兩芍藥黄芩去黒心甘草炙剉桂去粗皮各半兩麻黄去根節掠去沫焙三分右粗搗篩每服五錢水一盞半棗二枚劈煎至六分去滓不計時候温服葛根湯出聖濟總録治傷寒後餘熱不除及寒熱頭重體痛表症尚未罷葛根芍藥白茯苓去黒皮黄芩去黒心烏頭炮製去皮臍芎藭各一兩梔子仁半兩右㕮咀如麻豆大每服五錢水一盞半入豉三七粒煎至七分去滓温服茯苓湯出聖濟總録治傷寒後餘熱不退心神煩躁赤茯苓去黒皮一兩半人參一分甘草炙剉半兩右粗搗篩每服三錢用水一盞煎至七分去滓不拘時温服茯苓湯出聖濟總錄治傷寒餘熱不除及四肢拘急痛胸膈不利嘔逆不思飲食赤茯苓去黒皮柴胡去苗枳殻去穣麩炒桑根白皮剉各半兩麥門冬去心焙半兩葛根剉三分甘草剉半兩炙肉桂去粗皮人參各一兩右粗搗篩每服三錢水一盞生薑三片大棗二枚劈煎至七分去滓温服葛根人參湯出聖濟總錄治傷寒發汗及吐下後餘熱不退頭痛滿悶口乾葛根剉一兩人參一兩麥門冬去心焙半兩黄芩去黒心半兩黄耆剉一兩地骨皮石膏碎各半兩右粗搗篩每服五錢用水一盞半煎至八分去滓温服萎蕤湯出聖濟總錄治傷寒數日餘熱不解時發寒熱萎㽔柴胡去苗羚羊角鎊各半兩石膏碎半兩右粗搗篩每服五錢水一盞半煎至八分去滓不計時候温服人參湯出聖濟總錄治傷寒後餘熱不退人參一兩知母一分甘草炙剉黄芩去黒心石膏碎各半兩右粗搗篩每服三錢水一盞入竹葉粳米各少許同煎至七分去滓不計時候温服柴胡湯出聖濟總錄治傷寒後餘毒不解頰赤口乾四肢煩熱柴胡去苗茵蔯蒿甘草炙剉人參各一兩大黄剉炒半兩右粗搗篩每服三錢水一盞小麥五十粒同煎七分去滓温服不拘時候返魂丹出衛生家寳方治傷寒後餘熱在心譫言妄語甚者顛狂如失心狀但是一切心疾服之無不尅效新羅人參一兩硃砂半兩酸棗仁一兩湯浸去皮取仁焙乾净秤右先将人參為末别研硃砂極細和之酸棗仁焙急研入藥勿羅獖猪心血圓如桐子大參湯下二十圓日三服後畧卧少時𤣥參㪚出王氏博濟方治汗後餘熱未解川大黄𤣥參朴硝白藥子各半兩甘草二分右件五味同為末每服一錢水一盞煎至八分放冷服再服差退黄㪚出王氏博濟方治汗後餘毒未解皮膚黄色石膏牙硝川大黄山梔子紅雪甘草各等分右件六味同為末每服一錢水一盞入寒石末少許同煎至八分温服立效普濟方卷一百四十
