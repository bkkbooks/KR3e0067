body:
  text: 普濟方卷一百九十一明周王朱橚撰水病門總論黃帝問岐伯曰水與膚脹鼓脹腸覃石瘕何以别之岐伯曰水之始起也目窠上微腫如新睡起之狀頸脈動時咳隂股間寒足脛腫腹乃大其水之盛也以手按其腹隨手而起如裹水之狀轉動有聲此其候也膚脹何候之膚脹者寒氣客於皮膚之間勃勃然而堅腹大身盡腫皮厚按之其腹陷而不起腹色不變此其候也鼓脹如何鼓脹者腹脹身腫大大與膚脹等其色蒼黃腹筋起此其候也腸覃如何腸覃者寒氣客於腸外與胃氣相傳正氣不得榮因有所繫瘕而內著惡氣乃起息肉乃生始也如雞卵稍以益大及其成也若懷子之狀久者離嵗月按之即堅推之則移月事時下此其候也石瘕如何石瘕者生於胞中寒氣客於子門子宫閉塞氣不得通惡血當瀉不瀉衃以留止日益大狀如懷子月事不以時下皆生於女子可導而下之曰膚脹鼓脹可刺耶曰先瀉其脹之血絡後調其經刺去其血脈師曰病有風水有皮水有正水有石水有黃汗風水其脈自浮外證骨節疼痛其人惡風皮水其脈亦浮外證浮腫按之沒指不惡風其腹如鼓不滿不竭當發其汗正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汗其脈沉遲身體發熱胸滿四肢頭面普腫久不愈必致癰膿心水者其人身體重而少氣不得臥煩而躁其人隂大腫肝水者其人腹大不能自轉側而脅下腹中痛時時津液微生小便續通脾水者其人腹大四肢若重津液不生但若少氣小便難也肺水者其人身體腫而小便難時時鴨溏腎水者其人腹大臍腫腰痛不得溺隂下濕如牛鼻上汗足為逆冷其面反瘦師曰治水者腰以下腫當利小便腰以上腫當發汗即愈問曰有病不利利後渴飲水小便不利腹滿因腫何故師曰此法當病水若小便自利及汗出者自當愈內外傷辨云金匱要略腰已上腫者發汗腰已下腫者一利小便又云治濕不利小便非其治也大病后腰下有水氣牡蠣澤㵼散主之治濕則五苓散主之孫真人治皮膚腫以五皮散主之又述類象形之故也若果有水則小青龍加芫花湯主之病人乾嘔微利發熱而咳此為表有水表證罷咳而脅下痛為裏有水十棗湯主之於病又當詳審此病皆從虛損所致大病或下利後婦人産後飲水不即消三焦決滿小便不利仍相結漸漸生聚遂流諸經絡故也水有十腫不可治者有五第一唇黑傷肝第二缺盆平傷心第三臍出傷脾第四背平傷肺第五足下平滿傷腎此五傷必不可治凡水病忌腹上出水出水者一月死大忌之夫腎主元氣天一之水生焉肺主沖化地四之金屬焉元氣乃水中之火所以太陽合少隂主精髓以滋血沖化乃土中之金所以太陽合陽明主肌肉以養氣今腎虛則大虧致傷陽水凝滯肺滿則土隘使隂金沉潛衛氣凝滯而不理血淖經絡而不通上為喘急下為腫滿故經云腎為少隂肺為太隂其本在腎其末在肺皆至隂以精水也所以能聚水而生病者蓋腎為關鍵關鍵不利樞機不轉水不運行滲透經絡皮膚浮腫諸證不同以短氣不得臥為心水兩脅疼痛為肝水大便鴨溏為肺水四肢若重為脾水腰痛足冷為腎水口苦咽乾為膽水乍虛乍實為大腸水腹急肢瘦為膀胱水大小便祕澀為胃水小腹急滿為小腸水惟腎水謂之正水又有風水皮水石水黃汗以義考之風合歸肝皮合歸肺黃汗歸脾石水歸腎雖名理不踰證候少異如風水脈必浮惡風皮水脈浮按不沒指石水脈沉腹滿不喘黃汗脈沉遲致發熱多涎治療之法當辨其隂陽脈證若隂水為病者脈來沉遲色多青白不煩不渴小便澀少而清大腑多泄陽水為病者脈來沉數色多黃赤或煩或渴小便赤澀大腑多祕腰已上腫者宜發汗腰已下腫者宜利小便然後實其脾土土盛自能攝養腎水其腫自消虛弱者又當溫補下元又有內挾七情之氣停滯涎飲腹滿脅脹名為氣分及少血血熱生瘡變為腫痛名為內熱又當隨證施治不可一塗而取要知此證浮大者生沉細者死臨證施治宜詳審焉治法大要身有熱者水氣在表可汗身無熱者水氣在裏可下其間通利小便順氣和脾胃俱不可緩耳然而證雖可下又當推其重輕不可過用芫花大戟甘遂猛烈之劑一發不收吾恐峻決者易固閉者難水氣復來而無以治之也然水之為腫特一目曰風曰氣曰血合而有三焉風腫者皮粗麻木不仁走注疼痛氣腫者皮厚四肢瘦弱腹脅脹膨或煩躁漱水迷忘驚狂嘔逆煩悶皮間有紅縷赤痕者是血腫者婦人經脈壅閉敗血停腐尤多見之然婦人懷胎亦有氣遏水道而虛腫此但順氣安脾飲食無阻既産而腫自消若産後發虛則虛退而告殂矣大凡虛腫先起於腹而後散於四肢者可治先起於四肢而後歸於腹者不治至若蠱脹而肚上有筋腹滿而大便滑泄久瘧而轉作虛浮男從腳下腫而上女從身上腫而下或肉硬或手掌平並不治當審而察之也大凡水病難治産後特須於口味又復病水人多嗜食不亷所以此病難愈也代有醫者隨逐時情意在財物不理本性病人欲食而於貴勝之處勸全食羊頭蹄肉如此者未見有一愈者又此病百脈之中氣水俱實治者皆欲令㵼之使虛羊頭蹄極補那得瘳愈所以治水藥多用葶藶子等諸藥本草云葶藶久服令人大虛故水病非久虛不得絶其根本有蠱脹但腹滿不腫水脹脹而四肢面目俱腫大在醫者久不善診候治蠱以水藥治水脹以蠱藥或但見脹滿皆以水藥如此者仲景所云愚醫殺之此疾所忌者喪孝産乳音樂一切生冷一切魚蒜房室喧戲酢滑一切肉粘食米豆油膩並禁不得食及不得用心其房室等當三年慎之永不復發不爾者雖瘥復發發後更不可治也古方有十水丸歷驗多利小便所以不能述録也水腫附論夫水腫之病以脾腎氣虛不能制於水水氣妄行溢於皮膚其證股冷膚腫時作咳嗽不得安臥小便黃澀以手按腫處隨手而起是也又方徐王煮散出千金方治水腫利小便牛角䚡防己羌活人參丹參牛膝升麻防風秦芁生薑屑榆皮紫菀杏仁附子石斛各三兩桑白皮六兩橘皮二兩白术澤㵼茯苓郁李仁豬苓黃連各一兩右為末篩為粗散以水五升煮三升取一升頓服日再不能者但一服二三日以前可服主利多而小便澀者用之大驗檳榔丸出聖濟總録治水腫及療老小虛腫大病後客腫作喘檳榔微煨附子炮去皮臍吳茱茰水浸暴乾炒乾薑炮防己厚朴去粗皮塗薑汁炙甘草炙各一兩葶藶紙上炒紫色杏仁浸去皮尖雙仁炒椒目微炒赤茯苓去黑皮黃耆銼炒麻黃去根節炒桂去粗皮栝蔞去皮白术銼微炒海藻洗去醎汁各一兩半右為細末煉蜜丸如梧桐子大每服米飲下十丸日三稍加至十五丸未知加至二十五丸得小便利為度丁香散治腹脹硬滿水腫遍身小便澀少丁香一錢胡椒益智各一錢半青皮去白陳皮去白甘草炒各三錢茯苓白术連翹桑白皮炒木香枳殼去瓤麩炒木通車前子炒各二錢右為細末每服三錢水一盞半生薑五片煎至七分和滓溫服食前日進三服復元丹出醫方大成治水腫夫心腎真火能生脾肺真土今真火氣虧不能滋養真土故土不能制水水液妄行三焦不瀉氣脈閉塞樞機不通喘息奔急水氣盈溢滲漏經絡皮膚溢滿足頸尤甚兩目下腫腿股間冷口苦舌熱乾心腹堅脹不得正偃則咳嗽小便不通夢中虛驚不能安臥附子炮二兩南木香煨茴香炒川椒炒去汗獨活一方用羌活厚朴去皮銼薑製炒白术煨炒陳橘皮吳茱茰炒桂各一兩澤㵼一兩半肉豆蔲煨半兩檳榔半兩右為末麵糊丸如梧桐子大每服五十丸紫蘇湯下不以時空心食前服此藥世傳屢驗其君臣佐使與造物同妙一日三服先次旋利頃次乃腫消喘止蓋藥能助真火以養真土運動樞機安平必矣法當禁絶醎半年乃不再作當歸散出醫方集成治如前當歸洗木香煨赤茯苓桂心檳榔赤芍藥牡丹皮陳皮木通白术各銼炒乾等分右為末腳膝頭面腫大小便不快每服二錢水一盞紫蘇淡竹葉淡木瓜一片如指大同煎八分溫服日三如已愈常服早晚二覺氣下或小便快是效臟寒去檳榔臍已凸添大腹皮木通豬苓各一兩忌烏雞肉醎酸海味物一方無白术茯苓丸出千金方治水腫茯苓白术椒目各四分木防己葶藶桂心各二兩澤㵼各五分甘遂十二分赤小豆前胡芫花芒硝七分别研右為末煉蜜和丸如梧桐子大蜜湯下五丸日一稍加以知為度消腫丸出醫方大成治水腫喘滿小便不利滑石木通白术黑牽牛炒通脫木赤茯苓茯神半夏洗各一分陳皮一分木香半分瞿麥穗丁香各一錢右為末以酒糊為丸如梧桐子大每服四五十丸燈心麥門冬湯下導水茯苓湯出聖生堂治水腫頭面手足遍身腫如爛瓜之狀手按而拓陷手起隨手而髙突喘滿倚不息不能轉側不能著床而睡飲食不下小便塞澀溺出如割便絶少雖有而如黑豆汁煮服喘嗽氣逆諸藥不效本堂用此即愈亦嘗驗其病重之人服此藥時要如熬阿剌吉酒相似藥水一斗止取藥一錢服後小水行時即漸添多直至小便變清白色方為全愈澤㵼赤茯苓白术麥門冬去心各三兩紫蘇木瓜檳榔各一兩陳皮砂仁木香大腹皮各七錢半如病重者前藥計一十九兩重可均作三大服每服再加去心麥門冬二兩重燈草一大把均半兩重水一斗於砂鍋內下藥五兩重熬一大碗再下小銚內煎至一大盞五更空心服滓再煎服連進三服自然利小便右㕮咀五錢重水二盞燈心二十五根煎八分去滓空心服後一方沉香琥珀丸與導水茯苓湯是一對藥服之自見其效沉香琥珀丸出德生堂治水腫一切急難證小便不通者琥珀杏仁去皮尖赤茯苓各半兩澤㵼半兩紫蘇真者沉香葶藶炒郁李仁去皮殼各一兩半橘皮去白防己各七錢半右為末煉蜜為丸如梧桐子大以麝香半錢為衣每服二十五丸加三十至五十丸煎人參湯送下空心量稟氣虛實加減用藁本丸出聖濟總録治水腫久不瘥藁本去苖葶藶炒紫色各一分大戟微炒蜀椒去目及閉口者炒出汗澤漆微炒巴豆去皮心麩炒出油者赤小豆微炒澤㵼各半兩甘遂微炒一兩牽牛子炒熱一分連翹微炒半兩右為末煉蜜丸如梧桐子大每日空心溫酒下一丸加至二丸服後小便多白水即住鬼箭羽散出千金方有人患水腫腹大其堅如石四肢細小勞苦足脛腫飲食便氣急此終身疾服利下藥不瘥者宜服此藥將以微除風濕利小便消榖嵗久服之乃可得力瘥後可常服鬼箭羽丹參白术獨活各五兩秦艽豬苓各三兩知母海藻茯苓桂心各二兩右㕮咀以酒三斗浸五日服五日服五合日三任性量加漸加之大腹皮湯出醫方大成治濕氣熱內攻心腹脹滿并水腫小便不利大便滑泄並宜服之橘皮去白一兩半木香二錢半滑石六兩檳榔三錢白术一兩茯苓去皮一兩木豬苓去皮澤㵼肉桂各半兩甘草二錢右㕮咀每服四錢水一盞薑五片煎六分溫服大小便祕澀先服十棗湯後服此葶藶丸出醫方集成治腹中有濕熱氣自下作腫如新臥起之狀兩足脛腫病在腎少隂故也標在肺肺太陽也故腹滿氣急咳嗽喘息有音每就臥則右脅有氣上衝肩腋與血盆相牽引不快少思飲食甜葶藶半兩郁李仁湯去皮熬紫色稱三分將二味别研如膏令極勻白术半兩牽牛子半兩一半生一半熟桑白皮赤茯苓漢防己羌活陳橘皮澤㵼右為細末與上二味同研煉蜜和入臼內杵之丸如梧桐子大初服十丸空心晚食前日二服生薑皮湯下不知加至二三十丸以知為度葶藶木香湯出醫方集成治水腫腹脹小便滑泄葶藶炒香白术豬苓去皮各一分茯苓三分桂枝二錢滑石三兩澤㵼木通甘草炒各三錢木香半錢一方無白术右為細末白湯調二三錢食前日夜四服若小便不得通而返滑者此濕熱痞悶極深而攻之不開是能反為注泄此正氣已衰而多難救也不可強攻之恐無益爾勉以救之則少少與服之使稍稍導散微以得所漸以加之以意消息木通散出儒門事親治水腫海金沙舶上回香巴戟大戟甘遂芫花木通滑石通草右各等分為細末每服三錢大麥麵和作餅子如常二錢大爛嚼生薑湯送下郁李仁圓治水腫利小便郁李仁湯浸去皮尖微炒三分海藻洗去醎水炒桂去粗皮各半兩大黃銼碎醋炒葶藶紙上炒紫色各一兩一分川黃連半兩去鬚木通銼石葦各一分去毛微炒松羅三分右為末煉蜜丸梧桐子大每服米飲下十五丸日三稍增以知為度白粉霜丸出宣明論治病水鼓滿不食四肢脬腫大便閉不進食粉霜硇砂海蛤玄精石寒水石燒研粉白丁香頭白麵各二錢輕粉三錢海金砂一錢右研勻著紙褁數重便麵裹又紙裹又冷酒蘸了桑柴火燒麵熟為度宿􅔻餅和丸如梧桐子大每服三丸生薑湯下一日三服二日加一丸至六日不加即止以粥補之行水圓出直指方治水腫氣腫葫蘆巴炒破故紙炒縮砂仁蓽澄茄各二錢半木香半兩真川椒去目紙炒出汗烏梅肉焙乾各二錢半牽牛炒半兩巴豆略去油一錢半右為末麵糊丸菉豆大每服五丸食薑湯下水銀葶藶圓出聖惠方治水腫利小便水銀三兩煮三日三夜葶藶子椒目各一升衣魚二枚水萍瓜蒂滑石各二兩芒硝五兩右搗葶藶令細下水銀更搗令不見水銀止别搗椒目令細搗瓜蒂水萍下篩合和餘藥以蜜和更搗三萬杵成丸初服一丸如梧桐子次服二丸次服三丸次服四丸次服五丸次服六丸至七丸還從一丸始起次服二丸如是每至六丸還從一丸起如服藥當咽喉上有癧子腫起頰車腫滿齒齗皆浮唾碎血出物怪也不經三五日即消苦皆瘥以上服藥若下多停藥以止利藥五下止病未瘥更服病瘥止此治諸體肉肥按之不陷甚者臂粗著之油不受及千里大水悉生之漆師集驗陶氏古今録驗無衣魚水萍瓜蒂滑石泄水丸出儒門事親治水腫大戟芫花甘遂海帶海藻郁李仁續隨子各半兩章柳根一兩右為細末水煮棗肉為丸如小豆大每服五七十丸水下商陸圓出聖惠方治水腫商陸微炙一兩半芒硝研一兩甘遂微炒大黃銼碎醋炒芫花微炒蕘花微炒各三分麝香研四錢豬苓去黑皮一兩右為末煉蜜丸梧桐子大每服米飲下五丸日三服以微利為度華陀方酒客虛熱當風飲冷腹冷脹加麝香豬苓各一兩一方無大黃牡蠣澤㵼散出衛生寶鑑治脾胃氣虛不能制約腎水水溢下焦腰以下有腫也金匱要略曰腰以下有腫當利小便牡蠣澤㵼栝蔞根蜀漆洗去腥葶藶子商陸已上各等分右為末白飲和服方寸匕小便利止後服醎味漏泄牡蠣澤㵼海藻之醎以㵼水氣內經曰濕淫於內平以苦佐以醎辛以苦泄之蜀漆葶藶栝蔞根商陸之酸辛與苦以導腫泄小便以散水實脾散出醫方集成治隂水先實脾土為病腫脈沉遲不煩渴小便澀清大便多泄厚朴去皮白术木瓜去瓤木香不見火草果仁大腹子附子炮去皮臍白茯苓去皮乾薑炮各二兩甘草炙半兩右㕮咀每服四錢水一盞半薑五片棗二枚煎至七分去滓溫服不拘時候一方治脾元虛浮腫附子一箇草果乾薑各一兩甘草一兩大腹皮連皮六兩木瓜一箇去穰切片入水砂器內同煮乾薑擘開薑心內不白為度不得全乾恐近焦焙乾右為末空心日午用沸湯點服治大腸水乍虛乍實上下來去出千金方赤小豆五升桑白皮切二升鯉魚四箇白术八兩右為末空心日午用沸湯點服以水三斗煮魚取爛勿鹽去魚盡食并取汁四升許細飲下葶藶丸治內虛外實久有積聚榮衛不通甚者變水此為病從心起入於皮膚腫滿皮厚體重上氣不卧煩布而躁葶藶炒令紫半合防己椒目大黃銼碎醋炒各一兩半萞麻子去皮半合郁李仁湯浸去壳炒一兩右為末煉蜜同棗肉和丸如小豆大每服十丸空心溫酒下如不動加至十五二十丸牽牛子丸治水腫上氣大便澀牽牛炒一兩半葶藶炒熟二兩杏仁去皮尖雙仁麩炒一百枚别研芒硝半兩研牛酥半合灸大棗煮去皮核十枚研右為先搗前二味為末入杏仁等研勻次入牛酥搗萬杵丸如菉豆大每丸至十丸空心粥飲下澤漆根湯治水在肺令人咳喘上氣腹大腳腫目下如臥蠶衛渴不得臥有頃及復小便難少而數胸滿隱痛此水氣迫肺氣也宜利小便澤漆根生四兩麥門冬去心焙甘草炙人參赤茯苓去黑皮各一兩鯉魚一斤者去頭右將五味粗搗篩先用水三升煮取汁一升去魚每服三錢汁一盞煎至七分去滓溫服日三以小便利為度不利增服如大便利小便未利者增至四合初服一日氣即下得安臥有寒可加生薑三兩切焙芫花圓出危氏方消水腫大巴豆二十五枚去壳葶藶大黃桂皮芫花杏仁各等分右為末米糊丸每服五十丸空心溫酒吞五更早喫下水效牽牛湯出危氏方催發巴豆甘遂各二錢檳榔大戟當歸各五錢青皮黑牽牛取頭末各一兩右為末用大戟葶藶子煎湯調下五更初喫下水效蓯蓉散出危氏方用補木香五錢肉豆蔲煨肉蓯蓉酒洗炙各二兩右為末每服一大錢米飲調下忌生冷油麵第一退水圓出三因方化氣退水腫去厄逆利濕通小便蓬术炮三稜煨桂心青皮益智各半兩巴豆二兩去皮出油别研右為末麵糊丸如梧桐子大用黃梔子十箇劈破荆芥黑牽牛酸漿草各少許煎湯空心下二三十丸第二退水餅出三因方服前藥未效即服此方甘遂大戟各等分右為末入麵打水調為餅如碁子大火煨熟五更淡茶湯下一錢餅可用大麥麵不用白麵五更後服至曉下極多如病未退隔日再服第三大腹子散出三因方取轉後調正胃氣進食大腹子炒桂心茴香炒陳皮各半兩右為末每服二錢米飲調下三花神佑圓出衛生寶鑑治中滿腹脹喘嗽淋閟水濕腫滿變生疾久病不已黃瘦困倦氣血壅住不得宣通或風熱燥鬱肢體麻痺走注疼痛瘧疾不已癥瘕積聚堅滿痞悶酒積食積一切痰飲嘔逆及婦女經病不快帶下淋瀝無問赤白并男子婦人濕熱腹滿實痛兼㵼久新腰痛一切痢疾及小兒驚疳積熱乳癖並宜服之甘遂大戟芫花醋伴濕炒各半兩大黃一兩輕粉一錢黑牽牛二兩頭末右為細末滳水為丸如小豆大初服五丸後服五丸溫水下每日三服加至快利利後却當服病去為度設病安後老弱虛人平人常服保養宣通氣血消進飲食病痞滿極甚者更多服則頓攻不開轉如痛悶初服二丸每服如二丸至快利為度以意消息小兒丸如麻子大隨弱壯增減二錢四嵗者三五丸依前法大黃湯出聖濟總録治水腫大黃銼碎醋炒二兩桂去粗皮甘草炙銼人參細辛去苖葉各一兩桑根白皮炒黃色銼二兩右粗搗篩每服用水三盞藥五錢匕入棗二枚劈破同煎至九分去滓入蔥白餳一匙頭更煎一沸溫服日三利小便瘥桑白皮圓治水腫桑根白皮取上有白椹者北隂下根白皮銼炙黃二兩郁李仁湯去皮炒商陸微炙葶藶紙上炒紫色牽牛子炒熟巴豆清水煮一日去皮尖心膜出油各盡一兩右為末煉蜜丸梧桐子大每服茶湯下十五丸利三五行見效即止烏鯉魚湯出危氏方治水腫消腫又治四肢腫烏鯉魚一箇赤豆桑白皮白术陳皮各一兩蔥白五根右用水三碗同煮不見愈入鹽先喫魚後服藥正陽丹出三因方治水腫宣木瓜乾四兩濕者一箇銼童子小便法酒各一升煮爛絞汁大豆煮去皮乾十兩人參一兩附子炮半兩銀朱二錢右為末入銀硃研勻以木瓜膏丸如梧桐子大每服五十丸米湯下牽牛子湯出聖濟總録治水腫牽牛子檳榔煨銼木香赤茯苓去黑皮陳皮去白炒各一兩右粗搗篩每服二錢匕水一盞煎三兩沸去滓溫服此藥不獨療水病凡肺氣腳氣賁豚氣上築心胸不可忍皆治之芫花湯出聖濟總録治水腫及肢滿痰飲芫花炒黃色大黃銼碎醋炒甘遂微炒甘草微炙銼大戟去皮微炒各一兩右粗搗篩每服三錢匕水二盞棗二枚擘破同煎至九分下芒硝半錢七更煎一沸去滓溫服以利為度防己丸出聖濟總録治水腫眠臥不得防己海蛤研各一兩葶藶一升蒸熟甘遂微炒一分杏仁十枚湯去皮尖雙仁炒碎研右先將以葶藶杏仁一處拌和後以三味為末再研勻然後入棗肉和丸梧桐子大每服米飲下漸加至二十五丸以微利為度青木香丸出直指方通水寬中利膈行滯氣消飲食治胸噎食塞腹脅脹痛心下痞悶腸中水聲嘔噦痰逆不思飲食青木香五兩蓽澄茄補骨脂炒檳榔炒各十兩牽牛子六十兩炒香搗取末三十兩右為末入牽牛末令勻漸入清水和令得所丸如菉豆大每服二十丸茶湯熟水任下食後服每酒食後可服五丸或七丸小兒一嵗一丸妊婦不可服木防己丸療水病木防八分蜀大黃八分如錦紋者别搗人參八分葶藶十分熬杏仁八分去皮尖雙仁熬紫色别搗右搗篩蜜和丸先食後初服七丸如梧桐子大日再日加一丸至十二丸還日減一丸至七丸復漸加至十二丸循還服之以白飲服若病人熱多加黃芩各八分如病人冷多加厚朴八分如病人久心驚加鈎藤八分忌酒麵羊肉其牛肉一色永斷不得食多外禁食酢物并鵝鴨獐兔鯉魚鱧魚等肉牛黃桂枝湯療水腫牛黃六銖研桂枝十二銖又一方云桂六銖牡蠣十二銖熬研椒目十二銖一方泡葶藶半升熬一方云用一升右搗篩蜜和丸如梧桐子大米飲服七丸日再小便利為度忌生蔥越婢如术湯出指南方治水腫從腰以上俱腫惡風小便不利腎水上溢其狀大腹喘滿不得臥宜此湯發汗麻黃去節一兩半石膏三兩甘草半兩白术一兩右㕮咀為末四錢用水一盞半煎至七分去滓服不以時候導水圓出瑞竹堂治水腫黃芩二兩去粗皮大黃二兩去粗皮酒浸二三時紙裹煨滑石四兩研細飛去石灰牽牛四兩其治法正用一斤炒香取頭末四兩右為細末滳水為丸如桐子大每服五七十丸臨臥溫水送下如加黃連薄荷葉川芎各二錢半即神芎丸也詳證加後藥甘遂一兩久雨則加除濕熱腰痛泄水濕腫白芥子一兩除通身走注疼痛朴硝退熱散腫止痛久旱則加郁李仁散滯結通關節行腸胃通滯樟柳根去腰疼沉重已上各一兩妙香湯治一切水氣四肢腫滿蘹香子炒烏藥生用髙良薑湯浸焙乾青橘皮去白各一兩右粗搗篩每服二錢匕酒半盞煎數沸去滓稍熱服逐氣散治水氣兼治水腫白商陸去粗皮薄切暴乾黃顙魚三枚大蒜三莖菉豆一合右搗羅為散用水一升同煮以豆爛為度先食豆汁送下又以汁調下藥散二錢匕水氣內消一方以商陸根煮菉豆令熟去商陸取菉豆任意食之不用大蒜大麝香圓療三焦決滿水在脅外名曰水病腹獨腫大在腹表麝香三銖研雄黃六銖研甘遂十二銖熬芫花十二銖熬右搗合下篩和以白蜜丸如大豆二丸酒下日三服可至四丸節飲食禁肥肉生菜之類大黃圓治水腫利小便大黃白术一作葶藶木防己各等分右為末蜜丸如梧桐子大米飲下十丸利小便為度不知增之三仁圓治水腫喘急大小便不利郁李仁杏仁炮去皮尖薏苡仁已上各一兩右為細末用米糊為丸如桐子大每服四十丸不拘時候米飲下原闕吳茱茰丸治水腫腹脹吳茱萸四兩葶藶二兩炒甘遂一兩水煮右焙乾為末蜜丸桐子大晨午卧米飲服七丸歸表湯治水氣四肢俱腫羌活二錢半青皮半兩炒黑牽牛頭末一兩右為末每服一錢以樟栁根菉豆桑白皮煎湯調下通經散治水腫陳皮去白當歸各一兩甘遂以麵包不令透水煮百餘畨取出用冷水浸過去麵焙乾一兩用右為細末每服三錢溫淡酒調下臨卧服益腎散甘遂依前治度右為細末每服三錢以獖豬腰子細批破以椒鹽等物淹透爛切摻參藥在內以荷葉褁燒鹽溫酒調下服玉并散苽蔞根二兩甘遂一兩治用右為細末以麝香湯調下三錢臨臥白茯苓湯治水腫白茯苓澤㵼各二兩郁李仁五錢右㕮咀作一服水一碗煎至一半常服無時從少至多服或煎得澄入生薑自然汁在內和麵麵或做粥飯作常食五七日後覺脹下再益以白术散大戟散治水腫腫大如鼓或遍身皆腫大戟木香白牽牛頭末各等分右為細末每服用三錢以豬腰子一付批開摻藥在內燒熟空心食之如食左腰子拓左臂右腰子拓右臂如腫不能全去於腹逺臍塗生甘遂末甘草水少許其腫盡去如腫因氣水氣為腫者加橘皮前白茯苓湯內加之如因水為濕腫者煎防己黃耆湯調五苓散如因熱為腫者八正散如以熱燥於肺為腫者乃絶水之源也當清肺除濕水自去矣於梔子豉湯中加黃芩如熱在下焦隂消使氣不得化者當抑隂而陽氣自化黃藥內加黃連是也如鼓脹之病治之以雞屎醴酒調如水脹之病當開鬼門決潔淨府也前白茯苓湯主之大戟丸治水腫久不差大戟炒陳橘皮去白焙各一分巴豆一粒去皮大麥內微炒熟不用大麥右為末用大麥麵糊丸如桐子大每服三丸生薑湯下空心日晚服麝香丸治水腫麝香研半分芫花炒黃三分甘遂微炒去皮半兩右為末煉蜜丸桐子大強壯人酒下一十五丸老弱人十丸桃皮酒療水腫桃皮三斤削去上黑取裏黃皮麥麴一升秫米一升右以水三斗煮桃皮令得一斗以五升汁漬麥麴五升斗饙飯釀如酒法熱漉去滓可服一合日三耐酒者增之以體中有熱為候小便多者即是病去便愈忌生冷并一切毒物大戟湯療水病無問半月深淺雖復脈惡亦主之大戟當歸橘皮各一大兩右切以水一大升煮取七合頓服利水二三斗而怪至重不過再服便瘥禁毒食一年水下後更服永不作此方出張尚谷治水腫利小便葶藶四兩生用桂心一兩右為末蜜丸桐子大米飲下凡日三又方亦療身體腫滿水氣急臥不得郁李仁末麵各一升右和作餅子七枚燒熟空心服熱食四枚不知加一枚以至七枚大便通利氣便瘥麻黃甘草湯治水腫從腰上俱腫以此湯發汗麻黃四兩去根節甘草二兩右㕮咀每服三錢水一盞半煮麻黃再沸內甘草煎至八分取汁慎風冷有患氣促積久不得瘥遂成水腫之病服之有效但此藥發表老人虛人不可輕用宜詳審桃紅散治正水脹急大小便不利逆欲死方甘遂半兩半生半炒用坯十文研右為末研勻每用一錢以白麵四兩水調入藥搜和切作碁子白水煮浮更不得使鹽料物只淡飲候大小便利去五六分却用後藥調補平胃散一兩附子炮白术各一兩丁香半兩右為末和勻每服二錢水一盞薑七片棗三枚煎七分不拘時候日三五服若腫未退可炙三隂穴及風門穴腫退必矣治大小便閉水腫大黃防己各二錢半右為末蜜丸梧桐子大米飲下十丸利小便為度白术澤㵼各等分右為細末煎服或為丸煎茯苓湯下之末治之法黃耆芍藥建中之類以調養之忌房室魚酒等物二氣湯治水腫腹滿牽牛子甘遂一分微炒右粗搗篩分作二服每服水二盞煎至五分放溫細細呷不拘時候又方治水腫及暴腫河水裴氏傳經效葶藶三兩漢防己末四兩右葶藶杵六千下令如泥即下防己取緑頭鴨就藥臼中截頭瀝血臼中血盡和鴨頭更搗五千下丸如桐子患甚者空腹白湯下十丸稍可者五丸頻服五日止此藥利小便有效右各别搗節令以蜜和更搗二萬杵藥成飲服二丸如梧實不知增之當以小便利及下為候若下者但可清旦一服若不下但小便利者日再三服常將服腫消耳療水腫方皂莢一挺去皮子焙烏餳五兩右以酒二升煮取六沸絞去滓頓服之須臾即小便二三升腫消忌一切肉麵生冷醎酢食一年療水病方烏頭一大升粒小者桑根白皮五大升細切右為末以水五升和煮可有一大斗汁濾去滓於銅器中重湯煎如餳可作丸即成所患人每服取利小便復舊色身上腫除體中熱煩即服之禁房室及生死馬肉油膩麵酒等經數日得食羊頭肉兔肉永忌食羊頭蹄此云得食恐悮也治水腫出千金方商陸一斤白者炒羊肉六兩右以水一斗煮取六升去滓和肉蔥豉作腫如常法食之加鹽亦可一方雜生鯉魚作湯煮服治水腫利小便出千金方用牽牛子末水服方寸匕日一以小便利為度治水腫出保命集方用螻蛄去頭尾與蒲萄心同研露七日曝乾為末淡酒調下暑月用佳治水腫出保命集方用棗一斗鍋內入水止有四指用大戟并根苗蓋之遍身盆合之煮熟為度去皮尖大戟大用旋喫無時盡棗決愈治水腫出經驗良方用椒目茯苓皮二味不以多少煎湯水飲治水氣虛浮脹昔滁州公候使酒庫攢司陳通此一病垂死醫者已不下藥偶一婦人云是道人所授服之病自小便而下幾數桶遂愈用大蒜一箇爛研以蛤粉和無分兩可丸即止如梧桐子大每服十丸白湯下若氣不升降即以大蒜一頭每瓣切開逐瓣內入茴香七粒濕紙褁煨香熟爛嚼湯送下不以多少若臟腑不止即以丁香加茴香法煨服每瓣用三粒出百一選方治水腫有小女子發腫臍凸服之效出百一選方用黑楮皮乾為末米飲調下一二錢建炎初江吳內翰友孫發腫臍凸無醫者吳撿外臺得此方服之立效下水腫方亦治小便澀肘後方用黃犍牛溺一飲三升不覺更加服老小減半亦可日至夜小便利差勿食鹽治溫毒水腫方用生大豆煮食之腫腹有白大豆不入藥用也治水腫坐臥不得頭面腫及身體出肘後方取芫花桑枝燒灰淋汁煮赤小豆空心食冷飽飢即食盡不得飲葛氏方取東引者黃雌雞方治腹腫水癖水腫用雌雞一隻理加赤小豆一升同煮候豆爛即出食之其汁日二夜一每服四合補腎扶陽氣治冷氣若瘦者休漸食之良先患骨熱者不可食也鯉魚方出肘後方用鯉魚一頭極大者去頭尾及骨唯取肉以水二斗赤小豆一大升和魚肉煮可二者已上汁生布絞汁去滓頓服盡如不能盡分為二服後溫冷暖服訖當下利利盡即瘥一方療腫腳滿下氣用鯉魚白煮食之腹有宿石瘕可食治卒刺手水腫用搗韭及藍置上以火灸熱即差香薷方出十便良方治水病腫脹不消食用香薷乾者五十斤銼內釡中以水淹之水出香薷上寸煮使氣力都盡清澄之微火煎令可丸一服五丸如梧桐子大日漸增之以小便利一方用香薷銼煮令濃及熱以漬並服之治頭上皮虛腫薄如蒸餅狀如褁水用口嚼小麵麥傅之瘥大豆酒療水腫兼治風虛水氣用大豆三升以水六升煮令熟出豆澄汁更內美酒五升微火煎如餳服一升漸增之令小便利則腫歇也療水腫用黃連末以蜜和搗萬杵丸如梧桐子大米飲服二丸可至三四丸禁飲水并冷物又方出鮑氏方用苦酒一升飲之一方取鹽豉各一撮以飲之一方取用木蒂滿虎口搗取汁飲之散腫丸治水腫小便澀用葶藶二兩微炒為末棗肉丸如桐子大桑白皮湯下每服三十丸日進二服一方用甜葶藶甘遂散治水腫甘遂炒蓬莪荗炮青橘皮湯浸去白焙各一兩大戟微煨桂去粗皮各二分石菖蒲米泔浸炒乾木香各半兩右為散每服用蔥湯下一錢空腹服漸加至二錢微吐㵼為度亦治腳氣治水癊海蛤二兩先研三日漢防己二兩棗肉二兩杏仁二兩葶藶子六兩加料五加皮散出朱氏集驗方治水腫先用五加皮飲加澤㵼薑棗煎可先服三服次用大戟甘遂等分為末麵糊為丸如彈子大用樟栁根桑白皮菉豆濃煎湯細嚼空心下赤小豆粥出朱氏集驗方治水腫屢效赤小豆炒焙加樟栁根頭細切片黃魚生細切豬腰一對生細切燒鹽少許右先將赤小豆煮濾去汁不用將豆樟栁根頭大白陳米飲若得大樟蓼同煮尤妙無亦可候粥七分熟却入黃魚與獖豬腰同煮覺魚與豬腰皆熱方入燒鹽喫之不過月立愈病輕者其效尤速治腫疾安後多不絶䀶迹或以病未除方乙復作又難以更用去水茶宜此方以防之出淡療方右以子烏為末先用酒調一服仍用醋調遍塗腫處二三次自不作矣子烏恐麻人服時只一錢分水散出楊氏家藏方治面浮腫土狗一枚輕粉一字右作細末每服少許搐鼻中其黃水盡從鼻出一方出鮑氏方商陸煮菉豆任意食之一方出鮑氏方白茯苓棗核仁等分米飲下二錢末治水病初得危急出本草即用冬瓜不限多少喫神效無比治水腫浮氣結聚宿滯消腹中虛鳴出本草以越王餘等煮服之治水腫出本草以椰子漿飲之治水腫下水氣出本草以楓香煮汁服治水病初得危急出本草以烏牛尿每服一合瘥治水腫浮氣及風瘧出本草以瓶香土薑芥子等煎浴湯洗之治水腫出本草以緑鴨頭煮服之治水腫出本草以水松蒂食之生海底治水腫利小便出本草以水萍搗汁服之壓用石消水腫出本草以榆嫩葉作羮食之凡治水病也若脈先當觀其病證診其脈氣察其大便小便赤色小便黃赤即是肝熱相刑於脾遂生水病也若脈氣滯絃屑皮焦赤小豆小便赤色小便黃赤是肝刑於脾宜喫此方若無此病證不是肝熱只因飽食忽生忽頑硬所傷即便不須喫此藥蓋恐因脾氣虛弱不能製水也楊子建獲命方治肝臟實熱相刑於脾遂生浮腫漸欲成水病並宜喫此方川芎羌活獨活細辛荆芥穗防己連翹各一分木香三銖半夏三銖右為細末每服二錢食後熱湯下空心喫下藿香散方草豆䓻黃橘皮藿香川芎甘草乾薑赤小豆煮熟焙乾杵為末稱牽牛各半兩右為細末每服三錢空心熱調下和滓喫但初患水病之有肝熱證候常將此病兩方藥對當服餌以取平安若無肝熱證候只喫此方也但一切水病之及不可暴取使踈藥過度即傷損正氣在徐徐取之一度盡取未盡停待一兩日更取一度莫令傷正氣治初受水之人腹肋脹滿頭面兩足皆腫宜喫此方浮氣亦可喫乾薑三分半夏羌活牽牛各二兩右為細末每服四錢用白麵一兩與藥末相衮和作麵羮入水一碗蔥五根煮麵熟和汁盡喫取輕一行又腫藥用針砂鐵蛾即鐵匠家打下氣飛落者以入元子一生須斷鹽性濡潤腫再作可不為炙製法用上等醋煮半日去鐵蛾取醋和蒸餅為丸薑湯服三十四十丸以效為度亦得借鐵蛾氣耳出類鈐方日華子云煎汁服之不留滯於臟腑借鐵蛾之氣以制肝木弱不能克脾土伐其土之邪而水腫自消矣治水腫坐臥不得頭面身體悉腫用蒴藋根刮去皮搗汁一合酒一合暖空心服當微吐利治水腫水氣用樟木煎汁服之導引法養生方法十一月勿食經夏自死肉脯內動於喜成水病其湯尉針石正方補食養宣導今附于後又法蝦蟇行氣正坐動搖兩臂不息十二通以治五勞水腫之病也又云人臥勿以腳懸踏髙處不久必成腎水十水附論夫十水之病腫從腳起上氣而咳名為白水其根在肺腫從面目起名為青水其根在肝腫從胞起名為黃水其根在脾腫從股起名為黑水其根在腎腫從心起名為赤水其根在心腫從腹起名為氣水乍實乍虛乍去乍來其根在大腸腫從頭面起至足名為懸水其根在膽腫從內起堅塊四肢小腫名為石水其根在膀胱腫從四肢起腹大名為風水其根在胸腫從腹起名為褁水其根在小腸凡此十水生於臟腑各從其根究其所本肺與腎而已故內經曰其本在腎其末在肺皆積水也又曰津液充廓其魄獨居精孤於內氣耗於外形不可與衣相保蓋腎氣虛弱水氣脹滿上攻於肺肺氣孤危腎為水害子不救母故隂精損於內陽減於外三焦閉溢水道不通水滿皮膚身體否腫治之之法備見於內經云故曰平治權衡去菀陳銼微動四極溫衣繆刺其處以腹其刑開鬼門潔淨府以時服五陽以布疏滌五臟故精自生形自成骨肉相保巨氣乃平也紫金膏出傳信適用方治十腫水氣蛇含石二兩用炭一稱蛇含石用辛鐵定盛內入炭通紅用米醋二升搗蛇含石入醋中赤石脂一兩研細末針砂五兩水淘洗焙乾用米醋二升同禹餘糧於砂鍋內煮乾為度再入鐵銚內於炭中煆紅取出冷吹灰研細至無聲木香一兩切作片子焙乾肉豆蔲二兩洗紙褁炮焙熟禹餘糧三兩羌活一兩去蘆頭川白薑一兩炮川芎一兩白茯苓一兩當歸一兩去蘆頭切片子酒浸一宿杜茴香一兩炮香白蒺藜一兩川附子一隻重七錢者炮去皮尖三稜一兩炮青皮一兩去穰陳皮二兩去穰牛膝一兩切酒浸一宿官桂一兩切蓬术一兩炮右為細末用無鹽蒸餅湯泡為糊丸如梧桐子大每服三十丸至五十丸溫酒吞下空心食前如不食酒白鹽亦得忌鹽三月房室一年患人若介甲眼黑臍凸肚皮光有青筋起或炙並可下藥患人所食之物精作豬肉肚尖肚子白魚蘆魚白菘菜只用蔥椒醋食切不宜用鹽除此外食大海藻湯出聖濟總録治十種水病海藻洗去醎焙芫花炒焦豬苓去黑皮連翹澤漆炒郁李仁去皮尖雙仁研陳橘皮湯浸去白瓤桑根白皮銼炒白蒺藜炒各一兩藁本去苗土昆布洗去醎大戟炒防己葶藶炒朴硝甘遂炒微黃杏仁去皮尖雙仁炒各半兩檳榔煨銼七枚右粗搗篩每服四錢匕水一盞半生薑棗大拍碎同煎至八分去滓空腹溫服日一以利為度神仙萬金丸出醫方大成專治十種水氣逐隂固陽扶危正命足膝微腫上氣喘滿小便不利便是水氣證速服此藥取全效耳此藥效神功取水藥不同用蛇黃大而圓者三兩以新乾鍋子盛用炭火一稱煆過赤鉗鍋子出火急傾入釅米醋二升內候冷取出研至無聲上用針砂真者五兩賣者多雜鐵屑宜精揀擇水淘極淨磚上候冷一處研至無聲如粉即止以上三物為主其次量人虛實入後藥治水氣多是冷藥惟有此方上三物既非甘遂葶藶芫花之比有下項藥輔佐故老人虛人皆可服次入後藥羌活川芎牛膝酒浸一宿木香炒黃白茯苓肉豆䓻炮桂心去粗皮杜茴香略炒蓬莪术炮乾薑炮白蒺藜已上各半兩更量虛實老人斟酌入三服內虛人老人全用實人減半用青橘皮去白炒附子炮去皮臍製京三稜煨當歸酒浸一宿炒陳皮右為細末拌極勻湯浸蒸餅握去水和藥再搗極勻丸如桐子大空心酒或白湯下三五丸忌鹽三箇月圭撮不可入口淡且以醋少許調和飲食病者不能忌服藥後徒勞無功果欲救病即須忌鹽至誠服藥只於小便內旋去並不動臟腑病已即服此藥每服一二服兼以溫和調補元血氣藥將理此神方也又名禹餘糧丸溫白圓出直指方治十種水病積聚脹滿癥癖塊痛久瘧諸風吳茱茰湯浸七次炒柴胡桔梗石菖蒲乾薑肉桂黃連茯苓人參川椒去目隔紙炒出汗厚朴製皂莢去皮巴豆去皮膜出油紫苑茸各半兩川烏頭炮去皮臍一兩半右為細末和勻煉蜜丸桐子大每服三丸食後薑湯下加至五七丸止治水腫溫白丸五苓散加炒牽牛入比薑汁略煎送下集香湯沉香丁香各二錢木香青木香藿香葉川芎赤茯苓檳榔枳殼甘草乳香一錢半麝香一字别研右為細粗末每服二錢生薑三片紫蘇三葉煎服凡虛腫先用諸香以透其關絡然後審察證療補藥方肉桂去粗皮青皮去白乾薑炮蓬术醋煮軟肉豆蔲雞心檳榔桔梗各等分依法治右為末每服三錢百沸湯點服空心日午晚食前項二方治水腫病余見鄉人有患水疫半年後得名醫獲瘥余遂百計求得此醫人多酬黃白之物遂得此二方余試用之百發百中獲濟者可無數世間所有水病方藥無出此二方之上者余初出本事方前集尚有此集後二三帙初深祕之今有所前集已盛行世余此後集今亦略傳其一二人者使天下皆得躋盡天年毋慎枉斃云方無川芎檳榔圓治水十種氣腹喘嗽大小便澀檳榔一兩甜葶藶一兩微隔紙炒甘遂半兩煨微黃木通一兩漢防己半兩川椒目一兩當歸一兩微炒滑石一兩川大黃一兩微炒澤㵼半兩商陸一兩牽牛子一兩微炒陳橘皮一兩湯浸去白豬牙皂角半兩去皮微炒右為末醋飯和搗三五百杵為丸桐子大每服空心粥飲下二十丸以利為度未得快利再服之芫花散治十種水氣證候極惡諸醫不療芫花醋拌炒乾澤㵼郁李仁湯浸去皮微炒牽牛子微炒甜葶藶炒紫色漢防己各一分滑石三分海蛤半兩細研甘遂半兩煨微黃蘧麥半兩檳榔半兩大戟一分微炒右為細末每服一錢空心煎橘皮湯調下當先瀉下碧緑水後下如爛羊脂即差如末羊脂日再服之牽牛子圓出聖惠方治十種水氣遍身浮腫小便澀喘促不止牽牛子三分微炒甘遂一分煨微黃漢防己一分滑石半兩蘧麥半兩椒目一分微炒檳榔半兩澤漆一分微炒桑白皮半兩甜葶藶半兩炒紫色郁李仁一兩湯浸去皮微炒右為末煉蜜和丸桐子大每服空心煎木瓜木通燈心湯下二十丸以利為度未得快利即再服之十水圓出聖濟總録療十種水腫腫從頭諸書云腳起名為白水其根在肺椒目主之腫從面起名為青水其根在肝甘遂大戟主之腫從胞起名為黃水其根在脾甘遂主之腫從腹起名為氣水乍實乍虛其根在大腸芫花主之腫從腹起名為裹水其根在小腸澤瀉主之腫從股起名為黑水其根在腎玄參主之腫從頭面起至足名為懸水其根在膽赤小豆主之腫從內起堅塊四肢腫名為石水其根在膀胱桑根白皮主之腫從四肢起腹大名為風水其根在胸巴豆主之腫從胞中起名為赤水其根在心葶藶主之椒目炒大戟炒甘遂麩炒玄參葶藶炒芫花醋炒赤小豆桑根白皮炙澤㵼巴豆去心皮膜研出油右等分隨其病始所在增其所主藥皆自一分巴豆四分去心皮搗末下篩蜜和丸服桐子大三丸得下為度不下日三亦可散末食服半錢匕便利明朝復服如法再服病愈節禁飲但得乾物耳又十水圓出本草方治水腫大戟炒治青水葶藶炒治赤水甘遂炒治黃水藁本去苗土治白水連翹去心治黑水芫花炒令焦治氣水桑根白皮炙銼治泥水赤小豆治懸水巴豆去皮心炒油出治裏水右等分隨證所主倍之搗羅為末煉蜜丸如菉豆大每服三丸至五丸米飲日三人弱者以意節之萬勝散治十種水氣海帶海藻海蛤芫花炒醋浸甘遂大戟甜葶藶樟栁根續隨子巴戟去心各等分右為末每服三錢至五盞溫調下臥間日再服大戟圓出聖惠方治十種水氣遍身腫滿喘急煩悶心腹壅滯大小便不利又用赤茯苓湯下忌鹽一百二十日緣鹽能化水故也外忌魚鮓麵食一切毒物及生冷等物此方千金難用此藥獲瘥之後更用後藥補之大戟炒甜葶藶炒紫色芫花炒醋拌令乾甘遂煨令微黃澤㵼桑根白皮赤小豆炒熟巴豆去皮心出油澤漆右為末入巴豆研勻煉蜜和丸桐子大每服三丸空心粥飲下檳榔圓出聖濟總録治十種水氣檳榔三箇炮大戟炒半兩牽牛子炒滑石碎海蛤瞿麥穗旋復花甘遂炒各一兩右為末用軟飯和丸菉豆大每服七丸至十丸煎商陸湯下若作散每服一錢匕亦煎商陸湯調下如躁米飲食調下如取利動維服葶藶丸葶藶圓出聖濟總録葶藶炒杏仁不去皮各一分右為末糊和丸如小豆大每服十五丸煎杏仁湯下三消圓出聖濟總録治十種水病朴硝色青白者錬熟二兩芒硝色青白者硝石色青白燒之有金色者各一兩同上二味研令極細椒目微炒各一兩搗羅為末研令勻去三消腫葶藶炒紙上茛菪子炒各一兩杏仁二兩去皮尖雙仁以上味别為末與前藥各搗一千杵右用大棗二十一枚煮熟去皮核炒食令水氣瀝盡和為劑或鞕即添少許熟蜜杵千下為丸如小豆大每服十五丸空心煎生薑湯下加至二十丸以利為度不宜食飽衝冒霜寒并單衣受風冷雖夏中亦宜就溫禁食醎味難消之物不宜悲喜憂勞兼不得近生産房室等事惟宜喫粳米蔥薤生薑橘皮禁鹽年永不發動檳榔湯出聖濟總録治十種水氣遍身洪腫氣喘小便澀檳榔三枚牽牛子炒葶藶炒桑根白皮一兩赤小豆炒半兩郁李仁一兩炒去皮尖防己豬苓各三錢去黑皮右粗搗篩每服五錢匕水二盞生薑一棗大拍碎同煎至一盞去滓溫服空心日日三服以利為度大戟圓出宣明論治十種水氣腫脹滿熱寒咳嗽心胞痞悶背項拘急膀胱緊腫於小腹小便不通反轉大便溏泄不能坐臥并急喘大戟芫花醋炒甘遂海帶海藻郁李仁續隨子各半兩樟栁根一兩右以上八味為末每料抄藥末十五錢匕便入後藥硇砂輕粉粉霜各一錢龍腦半錢水銀砂珠一皂子大巴豆二十粒去皮生用右八味已下同研勻用棗肉為丸如菉豆大每服五丸至七丸龍腦臘茶送下食後臥虛實加減陳橘皮散出聖惠方治十種水腫氣皮膚脹滿三焦壅閉上喘大便不通陳橘皮一兩木香半兩牽牛子一兩川大黃一兩枳實半兩羌活半兩烏桕皮半兩漢防己一兩右為末每日空心濃煎桑根白皮湯調下三錢以利為度大戟圓出聖惠方治十腫水氣遍身腫滿上氣喘促小便澀大戟一兩微炒牽牛子一兩微炒白莢一兩去皮塗酥炙黃焦去子海蛤一兩細研甜葶藶一兩炒紫色川大黃一兩銼微炒桑根白皮一兩郁李仁一兩湯浸去皮微炒右為末煉蜜和丸搗百杵如桐子大每日空心溫酒下一十丸以利為度續隨子圓出聖惠方治十種風氣喘促腹脅鼓脹小便不通續隨子海蛤細研甜葶藶漢防己甘遂煨微黃郁李仁湯浸一兩去皮微炒滑石半兩已上各膩粉一分右為末煉蜜和丸如桐子大每日空心粥飲下七丸當得快利如未利晚食前再服川朴硝圓出聖惠方治十種風氣此方出神仙密藏經人間無本因鄭鍊師向天台金壇上石壁所記有數本緣得傳療諸疾自行此方二十餘年得效者甚多凡水氣有十種此方俱療一瘥已後永不再發但能斷得醎物無不效者此是先得之石壁金壇所記有靈驗有人先患腳氣十餘年發盛便成水病四時之中遍身腫滿腹硬如石水飲難下靡覺飢渴但喘粗不得睡臥頭不著枕二百餘日無問晝夜即呷粥食常須倚物而生羸弱異常因服此藥當日氣散十日後肚硬盡二十餘日後氣力如舊甚神效川朴硝二兩微研川芒硝一兩細研馬牙硝半兩細研川烏頭去皮臍為末椒目微炒為末甜葶藶炒紫色莨菪子各一兩去浮著水者芽出候炒黃色杏仁二兩湯浸去皮尖雙仁麩炒黃右件葶藶杏仁莨菪等相和先搗一千杵取大棗十枚藥與上件藥細研勻煉蜜和丸如桐子大每服二十七丸煎桑根白皮湯下空心服大黃圓出聖惠方治十種水氣面目四肢滿腫心腹虛脹三焦壅滯坐臥喘急大黃銼炒消石大戟去皮炒甘遂炒芫花醋炒焦椒目炒出牙葶藶炒各一分右為末煉蜜為丸如小豆大每服一丸空心桑白皮湯下日再漸增以知為度一方粥飲下四石圓出聖濟總録治十種風氣滑石甘泉石白石英續子仁寒水石研硇砂研細和作餅子用濕麵四兩褁藥餅燒紫色去麵各二兩白丁香半兩右為末麵糊丸如桐子大每服五丸生薑湯下第一日三服第二日四服第三日五服以利為度利已用次藥補之木香圓出聖濟總録取下水氣補藥木香青橘皮湯浸去白焙各一錢蓬莪术二錢右為末麵糊為丸如菉豆大每服十丸白湯下再蘇圓出聖濟總録治十種風氣大通三焦大戟炒甘遂炒春麥麵炒巴豆去心膜麩炒去油盡乾薑炮桂心去皮大黃銼炒各半兩右為末煉蜜丸如小豆大每服十丸空心茶清下以利為度巴戟圓出聖惠方治十種水氣通身不消化心腹脹滿巴豆十枚去皮心紙褁去油大戟半兩微炒甜葶藶半兩生用川大黃半兩銼炒桂心半兩芫花半兩醋伴炒乾杏仁半兩去皮尖雙仁炒黃右為末入巴豆杏仁研勻煉蜜和丸桐子大每服空心溫茶下七丸如人行五里熱茶投利下粘滑物者效神助散一名葶藶散出醫方集成方治十種水氣面目四肢遍身俱腫以手按之隨手而起咳嗽喘急不得安臥腹脹口苦舌乾小便赤澀大便不利澤㵼二兩豬苓二兩去黑皮黑牽牛二兩半微炒去末葶藶二兩炒香别研椒目一兩炒香木香右為末每服以蔥白三莖漿水一盞煎至半盞入酒半盞調藥三錢絶早面向東服本事方人行十里久漿水蔥白粥稀粥至蔥爛入酒五合熱啜量人啜多少須一升許不得喫鹽并麵自早至午當利小便三四升或大便利喘定腫減七分隔日再服既平之後必須大將息及斷鹽房室等二年一方無木香本香湯出聖濟總録治十種水腫氣木香陳橘皮焙湯浸去白白术桑根白皮炙銼桂去皮各半兩木通炒三分右粗搗篩别用牽牛子二兩於鐵銚內以紙襯手攪乘熱搗羅為末每服以前藥末三錢匕同牽牛末一錢半匕水一盞半煎至八分去滓五更溫服平明時喫冷生薑茶粥次用蕪荑桑根白皮各一分煮白羯羊肉半斤爛熟與喫檳榔丸出聖濟總録治十種水氣防己檳榔煨銼郁李仁去皮尖各研炒三分葶藶右為末煉蜜丸如小豆大每服十丸至二十丸空心服用後方葶藶湯下葶藶湯出聖濟總録葶藶炒桑根白皮炙銼百合各一兩右粗搗篩每服三錢匕水一盞煎至六分前藥日三以便利為度若鼓氣微結加甘遂一兩防己丸出聖濟總録治十水定喘急防己陳橘皮湯浸去白焙大戟炒苦葶藶紙上炒各半兩右為末棗肉為丸如桐子大每服二十丸溫水下不拘時大戟芫花散出聖惠方治十種水病腫滿喘急不得臥大戟一兩微炒芫花一兩炒醋半苦葫蘆子二兩炒苦葶藶一兩炒右為散末每服一錢陳大麥麵二錢水一盞煎至四分每日空心和滓溫服良久腹內作雷聲更喫熱茶投之使大小腸通利不過三服效胡椒丸出海上名方治十種水氣腳腫脹上氣喘滿巴豆十粒去皮膜用竹紙數重出油盡為度頻換紙胡椒二百粒生用右為末醋糊為丸如菉豆大每日一丸淡薑湯下食後實者日二服虛者一服如小便頻數為效服一兩月不效忌麵食鹽物淹藏大忌濕麵虛寶丸出聖濟總録治十種水氣滑石好白者二兩膩粉一兩右先搗研滑石令極細次入膩粉和勻熬木瓜濃汁成膏丸如菉豆大每服七丸五更空心溫米飲下日只一服至五七丸覺腹撮痛小便多為效忌鹽一百日久見效便服補脾胃藥此水病瘥後常服此藥永不發方出聖惠方大麻仁二兩微炒研如膏黑豆三兩炒熟去皮右為末煉蜜和丸如桐子大每日三十丸空腹粥飲下治十種水氣腫水病腫滿喘促不得臥出聖惠方生戟一錢蕎麥麵二錢右件藥水和作餅子慢火燒令黃熟碾為末空心茶清調下相次以大小腸利為度治十種水氣不瘥垂死出鮑氏方用青頭鴨一隻治如食法細切米并五味煮令極熟作空腹食之治十種水病腫滿喘促不得臥出肘後方用螻蛄五枚乾為末食前湯調半錢匕至一錢小便通效治十種水病不瘥垂死出鮑氏方用鯉魚一頭重一斤煮熟取汁和之瓜蔥白作羮食之效澤漆方出聖惠方治十種水氣用澤漆十斤于夏間採取嫩葉入酒一斗研令汁二斗於銀鍋內慢火熬如餳止瓷器內收每日空心溫酒調下一茶匙以愈為度治十種水不瘥垂死出肘後方用猯肉半斤切粳米三合水三升蔥椒䜴作粥食亦可十水圓出楊氏家藏方治十種水氣四肢腫滿面目虛以手按之少時方起喘急不得安臥小便赤澀逺志去心石菖蒲寸九節者椒目炒羌活去蘆頭巴戟肉豆蔲麵褁煨六味各一兩澤㵼甜葶藶研炒黃木豬苓去皮白牽牛炒黃各半兩右件為末麵糊為丸如桐子大每服二十丸加至三十丸溫米飲送下空心食前冬瓜圓出聖家藏方治十種水氣浮腫喘滿大冬瓜一枚先于頭邉切一字取中間瓤不用以赤小豆水淘淨增淨填滿冬瓜中再用蓋子合定用竹簽簽定以麻線繫紙筋黃泥通身固濟隂乾用糯米穀破取粳片兩大蘿甘冬瓜在內以火炙著粳內煨熱之俟火氣盡取出泥刮冬瓜令盡薄切片子并豆焙乾右為末煮麵糊為丸如桐子大每服五十丸煎冬瓜子湯送下不拘時候小便利為度商陸散出楊氏家藏方治十種水氣取水商陸根取自然汁一盞甘遂末一錢右用土狗一枚自死者細研同調上藥只作一服空心服日午水下忌食鹽一百日忌食甘草三日製菉豆出朱氏集成菉豆二合半水三碗半入瓷器瓶內煮候乾熟大附子一雙去皮臍切作兩片用右取出乘熟空心只喫菉豆其附子留住次日將附子兩片分四片再用菉豆三合半水三碗半同煮乾熟乘熟空心喫菉豆第三日再别用附子菉豆二合半如前過度服之又第四日亦如前第二日法度服之每一日臨臥時喫豆但依此製為丸服四日其水從小便下腫自消退如未退以前藥服之忌生冷毒物鹽酒六十日無不效者治十種水氣方大戟芫花甘遂續隨子大黃牽牛末各一兩肉果二錢硇砂一錢右為散子作三服水調下或作丸子末消再服忌房事又方治十種水氣并根源證狀方法出存仁方一蒸水先從左右肋腫起根在肝大戟炒黃二赤水從舌根腫起根在心葶藶隔紙炒三黃水從腹腫起根在脾甘遂炒黃四白水從腳腫起根在肺藁本五黑水從隂腫起根在腎連翹六玄水從面腫起根在外腎芫花醋煮炒七風水從四肢腫起根在胃澤㵼八石水從腎腫起根在膀胱桑白皮九蒿水從腹滿腫起根在小腸巴豆去油盡十氣水或盛或衰根在腹赤小豆右十種水病各有根苖種種不同看十種病根除一味將九味等分遂製者依法修合為末煉蜜為丸如桐子大每服二十丸赤茯苓湯下不拘時候日三服忌鹽一百二十日及魚鮓麵食一切毒物忌房事此病去生甚逺取死將近甚勿忽涌水附論夫內經言肺移寒於腎為涌水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊褁漿水然也夫腎為肺之子而住水大腸為肺之附而為傳道之官肺受寒邪宜傳入腎皆受寒邪則水閉鬱而不流且無所歸故客於太陽而不下夫水腫流下令及倉於大腸不得宣通宜其證滿溢如囊褁漿也旋復花丸出聖濟總録治涌水腹中動撣作水聲兼痰飲肋脹滿旋復花桂心去粗皮枳實去穰麩炒人參各一兩一錢乾薑炮芍藥白术各一兩半赤茯苓去黑皮三兩烏頭炮去皮臍毒狼礬石各三兩細辛去蘆頭土焙大黃炒黃芩去黑心葶藶隔紙炒厚朴去粗皮吳茱茰炒湯浸芫花炒焦醋浸半日陳橘皮焙去白各一兩甘遂炒三分右為末煉蜜丸桐子大每服五丸酒下二日不知稍加丸數以知為度大黃附子丸出聖濟總録治涌水腹滿大黃炒銼旋復花附子炮去皮臍赤茯苓去黑皮椒目桂心去皮芫花炒焦醋浸狼毒乾薑炮芍藥枳實炒細辛去苖葉各二兩右為末煉蜜丸桐子大每服三丸熟水下漸增之早晚食前臨臥各一服豬苓丸出聖濟總録治涌水豬苓去皮三分牽牛炒一兩葶藶炒半兩桑根白皮一兩赤小豆炒半合郁李仁去皮炒湯浸防己各二兩大腹皮三箇去皮生薑焙一兩右為末煉蜜丸小豆大每服十五丸米湯下未效加至二十丸日三葶藶丸治涌水腹滿不堅疾行則濯濯有聲葶藶炒澤㵼各一兩豬苓去皮椒目桑根白皮杏仁去皮尖雙仁麩炒大戟炒甘遂炒大黃炒黃芩各一兩去黑心芫花炒焦一兩酒浸蕘花半兩右㕮咀如麻豆大每服五分匕水一盞煎七分早晚食前溫服以利為度檳榔丸治涌水檳榔煨牽牛子炒赤小豆炒郁李仁炒湯浸去皮桑根白皮銼肉豆䓻去殼杏仁去皮尖雙仁麩炒各一兩右為末煉蜜丸小豆大每服十丸以溫水下日再豬苓飲治涌水小便澀臥即喘急豬苓去皮桑根白皮炒防己百合郁李仁各一兩半研瞿麥一兩木通二兩銼右粗搗篩每服三錢水一盞半煎至一盞去滓食前溫服如人行五里再服通草飲治涌水腸鳴腹大木通二兩銼桑根白皮炒石葦去毛赤茯苓去皮防己澤㵼各一兩半大腹子炮四枚右粗搗篩每服三錢匕水一盞半煎至一盞去滓食食溫服如人行五里再服海蛤湯治涌水海蛤紫苑去苖土逺志去心各一兩大戟木香防己各半兩右粗搗篩每服二錢匕水一盞半煎至八分熱服若取惡水即以白粥補之禁鹽一百二十日再不得服芫花甘遂藥商陸丸治涌水諸般水腫商陸一斤焙陳橘皮二兩湯浸焙木香一兩赤小豆麵四兩右為末以汲水和丸如菉豆大每服二十丸橘皮湯下椒目丸一名防己丸治涌水腹滿腸間有水聲方見本大腹水腫類葶藶丸出聖濟總録治涌水腹滿小便難葶藶炒一兩半子硝石二兩杏仁湯浸去皮尖雙仁二兩半研右為末棗肉和丸桐子大食前木通湯下十丸日二服萞麻單方出聖濟總録治涌水心下如數升油囊作聲日不用食但欲飲水則成瘕用萞麻子去皮二十枚服如上法以病盡為度五日內只喫白糜粥普濟方卷一百九十一
