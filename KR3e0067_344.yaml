半分為五服瘥坐月方位圖并産婦湏知法附論夫婦人姙娠之後以至臨月臟腑壅塞關節不利切不可多睡湏時時行歩不宜食粘硬難化之物不可多飲酒不可亂服藥亦不可以妄行針灸湏寛懐减神思慮不得負重或登髙渉險若偶然胎不安腰痛者湏服安胎藥一二服得安即止又云生産雖然觸穢排次湏要在先入月一日貼産圖并日遊胎殺所在并借地法扵姙婦房内北壁上仍依位設床帳厚鋪茵蓐周宻使無孔竅夏月亦鋪厚荐用好油單薄席紗帳以備之常焚香令潔浄備辦湯藥器物既覺欲産不得喧閙人力雜亂大小愴惶驚動産婦宜預擇年髙歴練坐婆一人并穏當曽經慣婦人一兩人扶持不得揮霍恐産婦憂驚又忌閑雜外人并䘮孝穢觸之人看視切不得驚動傷早若坐婆拙不能體候胎氣方轉動之際便為欲生多端下手驚動傷早則横倒之憂從此而致也産寳方云姙婦欲産腹雖痛而腰不甚痛者未産也且令扶行熟忍如行不得則凭物扶立行得又行或衣漿先下然後作陣若腹痛眼中如火生此是胎離腎經兒逼産門也即取藥一二服即扶上蓐草切不可坐草早務要産婦用力存養調停床令坐婆先說論之如覺心中煩悶可取白蜜一匙用新汲水調下或覺飢即喫軟飯或粥少許亦湏預備勿令飢渇恐産婦無力困乏也若不飢渇亦不湏强食大凡生産自有時候不可强服催生滑胎等藥或因坐草早勢不獲已則服之若無事強服恐變生他疾又湏戒之若姙娠已滿十月形體成就神識咸備分氣趨産宜服滑胎湯藥凡婦人姙娠入月不可沐頭濕冷流于足太陽之經多令子横逆不順誡之誡之夫人之受胎隂注陽生造物已有分定豈容置一毫人力扵其間耶竊聞有以命書䆒其吉凶剋害臨産之際私心意謂時乖故不令坐草驀遇胎轉便為時良催發坐草急産意迎就好時而避惡時殊不知姙婦欲産不得産未當産而强取生以至蹉跌逼迫使産母不勝痛憤而失全生豈有巢毁卵不破乎又如愛指失掌掌既已失指何存焉世之評命書者心雖自愧不可追悔但以數終藉初舉之意而殞者只得聴其不幸哀哉大凡懐孕雖云十月之胎有七八月而先産者或過月而方生者如尭母姙十四箇月廼娠禀受氣血壮弱之不同盖猶命書所謂五行欲其自足勿用胎元者是也且晝夜十二時分作百刻人之氣息一萬三千五百呼吸之間便生賢愚安可力取時之好惡而避貧奪富哉然命書曰人之在幼禍福未萌當考目擊之端倪騐作他年之證兆是已生之人猶不可前知休咎况以未生之子伺候好時預定貴賤可乎若如所欲則是不由造物而反由人嗜命書者故當窮其造物限量之數察其天地盈縮之理無以偏見而枉殺人胡不聞窮娠偷生而獲康寧者何盖無它阻傷犯得任情性生于自然也今若為誠言切宜戒若以為狂言聴其為之且聞之者尚不寒而慄奈母子何為之者後雖悟殁扵非命然已獲殺人之過隂譴亦自難逃余切思之可謂恩生扵害而恩未生則害先至矣吁可畏哉婦人産乳忌反支月若值此月當在牛皮上若灰上勿令水血惡物著物則殺人及浣濯衣水皆以器盛過此忌月乃止凡生産不依産圖脫有犯觸扵後母子皆死若不至死即母子俱病諸事皆不稱心若能依圖無所犯觸母即無病子亦易養凡欲産時特忌多人瞻視惟得三二人在傍總待産脫乃可告諸人也若人衆視看無不難産凡産婦第一不得匆匆忙怕傍人極湏穏審皆不得預緩預急及憂悒則難産若腹痛眼中火生此兒回轉未即生也兒出脫一切人及母皆忌問是男是女始落地與新汲水五咽忌與暖湯物勿令母看視穢物凡産婦慎食熱藥麵食當識此飲食當如人肌温温也又云胎神逐月所值方位不可修造正月在床二月在户三月在門四月在竈五月在身六月在竈七月在房八月在厠九月在門十月在户十一月在竈十二月在床臨月産室貴乎無風不可太煖煖則生風汗出腠理開便中風昏冒而不知人急服愈風散繼以交加散服後以右手搔頭大豆紫蘇湯獨活湯皆可收産傷胎者盖婦人臨産之時必召穏媪三人其二媪極拽婦之臂其一媪頭抵婦之腹中兩手扳其腰極力為之胎死于腹良久乃下兒亦如血乃媪婦殺之也豈知𤓰熟自落何必如此乎于是因兹經脉㫁閉腹如刀刺大渇不止小便閟絶主病者禁水不與飲口舌枯燥牙齒黧黒臭不可聞食飲不下昏憒欲死宜先以氷雪水恣意飲之約二升許痛緩渇止次以舟車丸通經散前後五六服下數十行食大進仍以桂苓甘露散六一散柴胡飲子調之則安又有一婦患此前證急取秤鈎續以壮繩以膏塗其鈎令其母分兩足向外偃坐左右各一人脚上立足次以鈎其死胎命一壮力婦人咬牙拽出死胎下敗血五七升其母昏困不省待少頃以新氷水灌之漸嚥二日大醒食進次日四物湯血數日方愈凡婦人産前或煩渇欲水喫者不若飲米飲為佳月空方位正月三月五月七月九月十一月已上在丙壬二月四月六月八月十月十二月已上在甲庚逐月安産藏衣忌向方位凡安産藏衣方位並扵卧閣内分布太平聖惠方云凡姙娠初入月便冩産圖一本以朱書某月某日空貼在位如正月在丙壬可扵壬位安産婦床帳丙位藏衣之類貼掛在産婦房内北壁上若值閏月只看節氣用之又云每月産圖有雷公招揺運鬼力士天狗軒轅大時咸池吳時豊隆白虎夫人天候狂虎凡十三神並從月建易其位所謂月空者按内經云月廓空無寫王氷注云論月輪中空日也即非十三神之数今太平聖惠方以六陽月在丙壬六隂月在甲庚正如外臺所言正月在丁壬至十二月在甲庚之類其理一也但外臺言之詳聖惠言之簡耳今人多依聖惠方者特從其簡而已或云凡逐月安産藏衣並向月徳月空方位所有十三神殺並從節氣更換若交次月節便