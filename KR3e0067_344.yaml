body:
  text: 普濟方卷三百四十四明周王朱橚撰妊娠諸疾門諸血附論夫妊娠吐血者皆由臟腑所傷為憂思驚怒皆臟腑氣逆吐血吐血而心煩悶胸滿木欲止心悶甚者死妊娠病此多墮胎也又云妊娠之人將護為難若觸冒風寒飲食生冷及喜怒勞動之過悉致胎動胎動則氣血失度故下血也古方又云母有宿疾子臟為風冷所乘者亦令胎動下血皆失將護所致又云妊娠經血暴下小腹或痛者由冷熱之氣內擊于胞絡或舉重勞煩暴傷衝任之經其血忽下隨其經養而補之所下不已腰腹痛者其胎多墮又云妊娠僵仆或從髙墮下傷損胞絡致血下動胎而血傷氣逆者胎墮氣上搶心其死生之候其母舌青者兒死母活唇口無沫兒生唇青沫出者母子俱死唇口赤舌青者母死兒活若下血不住胞絡燥胎枯則令胎死者也又云妊娠尿血者由勞傷經絡而有熱熱乘于血血得熱則沉溢滲入于胞故尿血也方桔梗湯治妊娠驚胎勞傷心腹急痛卒下血胎動不安桔梗炒茯神去木各一兩人參當歸炙銼各半兩鈎藤皮一錢桂去粗皮獨活去蘆頭芍藥銼炒各半兩生乾地黃焙各一兩桑上寄生微炒銼半兩石膏一兩甘草炙黃半兩右粗搗篩每服三錢以水一盞煎至七分去滓空心溫服日三服陟釐丸一名定神丸治妊娠胎動腹痛下血宜服保胎安定神思方見胎驚類桑寄生湯一名阿膠散出聖惠方治妊娠胎動時有所下血腹脅疼痛桑寄生一兩半阿膠炙燥當歸切焙白茯苓去黑皮芎藭白术乾熟地黃焙甘草炙各一兩龍骨燒乾薑炮各一錢右粗搗篩每服三錢以水一盞棗二枚擘皮石煎至七分去滓不拘時溫服阿膠散出聖惠方治妊娠胎動時有所下血腹脅疼痛阿膠三錢搗碎炒令黃燥艾葉半兩微炒當歸銼三錢微炒赤石脂龍骨各半兩芎藭三錢黃耆銼熟地黃乾薑炮製銼各一兩甘草一錢炙微赤銼右為散每服四錢用水一盞入生薑五片棗三枚煎至六分去滓不計時候稍熱服半夏湯治妊娠卒下血不止腹疼手足寒熱腰背痠疼半夏湯洗七遍麥門冬去心焙各二兩甘草炙銼當歸微炙黃耆銼各兩半阿膠炙令燥二兩人參黃芩去黑心旋覆花各一兩右粗搗篩每服三錢以水一盞入蔥白二寸生薑半錢切同煎至七分去滓空心溫服人參湯治妊娠卒下血致胎不安小腹疼痛人參當歸切微炒阿膠炙令燥各二兩甘草炙令赤芎藭黃芩去黑心艾葉各一兩吳茱茰湯洗焙生乾地黃微炒各二兩右搗篩每服三錢以水一盞入生薑一棗大切同煎至七分去滓空心溫服日三阿膠湯治妊娠胎動腹痛下血暈悶阿膠炙燥一兩生薑切炒乾三錢芎藭續斷各半兩側柏當歸切焙桑寄生艾葉各三錢竹茹雞子大一團右粗搗篩每服三錢以水一盞入棗二枚擘破煎七分去滓溫服之伏龍肝湯治妊娠胎動不安腹內疼痛下血不止伏龍肝桑寄生續斷銼微炒芎藭炒各一兩龍骨三錢當歸切焙阿膠炙燥各一兩乾薑炮甘草炙各一兩右粗搗篩每服五錢以水一盞半入生薑三片棗二枚擘破同煎至八分去滓空心食前溫服伏龍肝散出聖惠方治妊娠胎動腹痛下血不止伏龍肝當歸銼微炒各一兩龍骨三錢煆阿膠一兩搗碎炒令黃燥蒲黃三錢艾葉半兩淨微炒熟乾地黃一兩炒牛角䚡炙黃燥芎藭各半兩右搗細羅為散每服不計時候以粥飲調下二錢茯神湯治妊娠八九月或臨月因用力勞乏便即胎動忽然下血心腹急痛面目青黑冷汗出氣息欲絶茯神去木熟乾地黃焙各一兩甘草炙半兩鈎藤一兩桔梗炒人參當歸切焙芍藥銼炒各一兩半右為粗散每服三錢以水一盞煎至七分去滓溫服一方有桑寄生禹餘糧丸治妊娠胎動腹痛下血不止禹餘糧煆醋淬七遍二兩木賊銼炒半兩乾薑炮龍骨附子炮裂去皮臍各一兩白芷當歸切焙芎藭各半兩右為末煮麵糊和丸如梧桐子大每服三十丸以溫酒食前服之人參飲治妊娠胎動不安腰腹痛血下不止人參芎藭當歸切焙阿膠炙燥各二兩艾葉一握杜仲去粗皮炙二兩熟乾地黃焙一兩甘草炙銼一兩右粗搗篩每服五錢以水一盞半棗一枚擘破煎至一盞去滓溫服下不拘時阿膠散出聖惠方治妊娠從髙墮下腹痛下血面色青黃阿膠一兩搗碎炒微黃燥木香不見火芎藭熟乾地黃各半兩乾薑一錢炮裂銼當歸銼微炒桑寄生桂心各半兩右搗篩為散每服四錢以水一中盞煎至六分去滓不計時候溫服膠艾湯治妊娠卒下血胎動腹痛保血安胎方見安胎類蒲黃散一名當歸散治妊娠卒下血令胎不安臍腹撮痛蒲黃微炒當歸焙令香銼龍骨阿膠炙令燥芎藭各半兩生乾地黃焙各半兩一方用熟乾地黃牛角䚡黃牛角上者炙令焦一兩右為散研勻細每服二錢以同煎艾煮米飲調下食前服艾葉湯治妊娠卒下血不止腰腹疼痛一名地黃艾葉湯艾葉炒二兩熟乾地黃焙二兩一方用生乾地黃人參地榆乾薑炮裂阿膠炒燥當歸切焙各一兩右粗搗篩每服五錢以水一盞半煎至八分去滓溫服不拘時候阿膠散治妊娠損動胎氣腹內結痛血下不止暈悶阿膠炙燥桑寄生各二兩續斷一兩半熟乾地黃焙芎藭白芷人參各一兩右為散每服三錢煎青竹茹糯米湯調下不拘時秦芁湯治妊娠胎動下血身體煩熱倦怠秦芃去苖土鹿角膠炙燥地榆銼甘草炙銼白芷人參芎藭各半兩右粗搗篩每服五錢以水一盞半糯米五十粒煎至一盞去滓不拘時溫服側柏丸治妊娠胎動臍腹㽱痛下血不止側柏芍藥各一兩代赭石研黃耆銼木賊銼炒芎藭禹餘糧煆各半兩右為末酒煮麵糊和丸如梧桐子大每服二十丸濃煎木賊酒下食前服芎藭散出聖惠方治妊娠五六箇月從髙墜下胎腹內不安兼臍下㽱刺疼痛不住下血芎藭三錢炒阿膠搗碎炒令黃燥一兩當歸一兩銼微炒艾葉半兩微炒熟乾地黃一兩桑寄生赤石脂各三錢右搗細羅為散每服不計時候以溫酒下二錢苧根湯出大全良方療勞損動胎腹痛去血胎動向下苧根乾地黃各二兩當歸銼微炒芍藥阿膠炙令黃燥甘草炙各一兩右㕮咀以水六升煮取二升去滓內膠煬分三服忌海藻菘菜蕪荑杜仲湯治妊娠卒然下血不定令胎不安小腹疼痛連腰杜仲去粗皮銼炒二兩人參一兩阿膠炙令燥芎藭各一兩當歸微炙二兩艾葉一把焙右粗搗篩每服三錢以酒一盞入棗三枚擘破同煎至七分去滓溫服相次三服腹中當暖即血止一方無艾葉止用水酒共煎服名人參湯鈎藤湯治妊娠八九箇月或胎動不安因用力勞乏心腹痛卒然下血面目青冷汗出氣息欲絶方見安胎類麥門冬湯治妊娠胎動不安忽然下血寒熱往來腹痛如欲産手足煩悶麥門冬去心焙二兩甘草炙銼人參生乾地黃焙黃芩去黑心阿膠炙令燥各一兩右為粗散每服三錢以水酒各半盞入生薑半錢切棗三枚擘破同煎至七分去滓食前溫服芍藥散治妊娠胎動下血不止臍腹㽱痛迷悶昏塞白芍藥一兩炒牡蠣煆半兩熟乾地黃焙半兩木賊銼炒一兩烏賊魚骨去甲乾薑炮各半兩右為散每服三錢以米飲或溫酒調下食前當歸散治妊娠胎動下血不止當歸切焙乾桑根白皮銼續斷芍藥芎藭各一兩乾薑炮半兩右為散每服二錢以酒調下不拘時桑寄生散出聖惠方治妊娠損動腹內結痛血下暈悶桑寄生當歸銼微炒各一兩阿膠二兩搗碎炒令黃燥續斷一兩銼艾葉半兩微炒芎藭一兩右搗篩為散每服用藥五錢先以水一大盞半入銀三兩煎至一盞次入藥并竹茹一錢糯米一百粒煎至六分去滓食前分溫二服卷柏散出聖惠方治妊娠傷動腹痛下血心煩卷柏阿膠搗碎炒令黃燥龍骨當歸銼微炒熟艾微炒銼熟乾地黃各半兩右搗細羅為散每服不計時候煎黑豆湯調下二錢黃耆湯出聖惠方治妊娠五月六月血不止黃耆炙銼一兩半桑寄生炙銼地榆銼熟乾地黃焙各一兩艾葉焙乾龍骨研各三錢右粗搗篩每服五錢以水一盞半生薑半錢切棗三枚擘破同煎至六分去滓食前溫服鹿膠湯出仁存方治妊娠胎動不安腰痛下血當歸川芎苧根各一兩鹿角膠艾葉各二兩右㕮咀每服四錢以水一盞蔥白二箇銀半兩煎至一盞去滓熱服空心食前阿膠散出聖惠方治妊娠胎上逼心下血不止阿膠搗碎炒令黃燥芎藭當歸銼微炒熟乾地黃各一兩銀一斤水一斗煎至五升右為散每服四錢以銀汁中盞煎至六分去滓不計時候溫服馬通湯出肘後方治妊娠卒驚奔走或從髙墮下暴出血數升馬通汁一升乾地黃阿膠各四兩當歸艾葉各三兩右㕮咀以水五升煮取二升半去滓內馬通汁及膠令煬分三服不瘥重作治妊娠忽暴下血數升胎燥不動出千金方榆白皮三兩當歸生薑各三兩乾地黃四兩葵子一升肘後不用右以水五升煮取二升半分三服不瘥更作服之芎藭湯一名地黃湯治妊娠已數月卒然下血不定方見安胎類芎藭散出聖惠方治妊娠忽胎動下惡血腹痛不可忍心神煩悶芎藭一兩當歸銼微炒鹿角膠搗碎炒令黃燥各一兩半桑寄生熟乾地黃各一兩右為散每服四錢以水一盞入生薑五片棗三枚煎至六分去滓不計時候稍熱服烏賊魚骨散治妊娠胎動不安下血不止臍腹㽱痛烏賊魚骨去甲一兩白芍藥芎藭龍骨赤石脂各半兩右為散每服二錢以米飲或溫酒調下食前桂枝茯苓丸治婦人宿有癥病經未及三月而得漏下不止胎動在臍上者為癥痼害妊娠六月動者前三月經水利時胎下血者後斷三月衃也所以血不止者其癥不去故也當下其癥桂枝茯苓牡丹皮去心桃仁去皮尖熬芍藥各等分右為末煉蜜和丸如兔屎大每日食前服一丸不瘥加至三丸當歸散出聖惠方治妊娠勞熱胎動不安下血腹痛不止手足煩悶當歸銼微炒芎藭各一兩黃芩半兩炒熟乾地黃一兩半焙伏龍肝一兩右搗篩為散每服四錢以水一中盞入淡竹茹一錢煎至六分去滓不計時候溫服乾地黃散一名益母散出聖惠方治妊娠從髙墜下腹痛下血煩悶生地黃益母草各一兩當歸黃耆各半兩右㕮咀每服四錢水一盞薑四片煎至六分去滓無時候服一方加芎藭當歸散治妊娠卒下血腰腹疼痛當歸切焙桑寄生續斷各半兩赤芍藥一錢右搗羅為散每服三錢正空心食前溫酒調下有冷加乾薑一兩腹痛加芎藭一兩治妊娠胎動下血不住腹痛不止宜服此方出聖惠方當歸銼微炒一兩桑木耳微炙半兩重乾薑炮裂銼續斷各一兩右搗細羅為散每服不計時候以溫酒調下二錢若由頓仆及舉重致胎動去血者及腹痛出肘後方膠三兩炙當歸二兩甘草一兩炙右㕮咀以水五升煮取二升分兩服忌菘菜海藻治妊娠注下不止出千金方阿膠艾葉酸石榴皮各二兩右以水七升煮取二升去滓內膠令煬分三服苧根湯出三因方治胎無故下血腹痛不可忍或下黃汁如漆如小豆汁者野苧根銼炒金銀各一兩右用水酒各一盞煎至一盞去滓分服不拘時候膠艾飲出危氏方治妊娠忽下血胎上衝心手足逆冷欲死生艾汁二盞阿膠白蜜各二兩右同煎一盞半稍熱服之無生艾即濃煎熟艾一方加竹茹一大塊同煎一兩沸分三服治妊娠損動下血不止出聖惠方甘草一兩炙可令微赤阿膠三兩蚌粉炒右先以水一大盞煎甘草去滓次下雞子阿膠同煎候膠消熱攪分作三服不拘時服一方無蚌粉枳殼湯出拔萃方治婦人胎漏下血及因事下血枳殼去穰麩炒黃芩各半兩白术一兩右為末水煎食前溫服甘草湯治妊娠卒下血胎動不定連腹㽱痛甘草炙令赤阿膠炙令燥各一兩生乾地黃焙半兩右粗搗篩為散每服三錢正以水一盞煎至七分去滓溫服之良鹿角膠湯治妊娠胎動漏血不止鹿角膠炙燥一兩人參白茯苓去黑皮各銼一兩右粗搗篩為散每服三錢