body:
  text: 普濟方卷三百四十四明周王朱橚撰姙娠諸疾門諸血附論夫姙娠吐血者皆由臟腑所傷為憂思驚怒皆臟腑氣逆吐血吐血而心煩悶胷滿木欲止心悶甚者死姙娠病此多墮胎也又云姙娠之人将護為難若觸冐風寒飲食生冷及喜怒勞動之過悉致胎動胎動則氣血失度故下血也古方又云母有宿疾子臟為風冷所乘者亦令胎動下血皆失将䕶所致又云姙娠經血暴下小腹或痛者由冷熱之氣内擊扵胞絡或舉重勞煩暴傷衝任之經其血忽下隨其經養而補之所下不已腰腹痛者其胎多墮又云姙娠僵仆或從髙墮下傷損胞絡致血下動胎而血傷氣逆者胎墮氣上搶心其死生之候其母舌青者兒死母活唇口無沫兒生唇青沫出者母子俱死唇口赤舌青者母死兒活若下血不住胞絡燥胎枯則令胎死者也又云姙娠尿血者由勞傷經絡而有熱熱乘扵血血得熱則沉溢渗入扵胞故尿血也方桔梗湯治姙娠驚胎勞傷心腹急痛卒下血胎動不安桔梗炒茯神去木各一两人参當歸炙剉各半两鈎藤皮一錢桂去粗皮獨活去蘆頭芍藥剉炒各半两生乾地黄焙各一两桑上寄生微炒剉半两石膏一两甘草炙黄半两右麄搗篩每服三錢以水一盞煎至七分去滓空心温服日三服陟釐丸一名定神丸治姙娠胎動腹痛下血宜服保胎安定神思方見胎驚類桑寄生湯一名阿膠散出聖惠方治姙娠胎動時有所下血腹脇疼痛桑寄生一两半阿膠炙燥當歸切焙白茯苓去黒皮芎藭白术乾熟地黄焙甘草炙各一两龍骨焼乾薑炮各一錢右麄搗篩每服三錢以水一盞棗二枚擘皮石煎至七分去滓不拘時温服阿膠散出聖惠方治姙娠胎動時有所下血腹脇疼痛阿膠三錢搗碎炒令黄燥艾葉半两微炒當歸剉三錢微炒赤石脂龍骨各半两芎藭三錢黄耆剉熟地黄乾薑炮製剉各一两甘草一錢炙微赤剉右為散每服四錢用水一盞入生薑五片棗三枚煎至六分去滓不計時候稍熱服半夏湯治姙娠卒下血不止腹疼手足寒熱腰背痠疼半夏湯洗七遍麥門冬去心焙各二两甘草炙剉當歸微炙黄耆剉各两半阿膠炙令燥二两人参黄芩去黒心旋覆花各一两右麄搗篩每服三錢以水一盞入葱白二寸生薑半錢切同煎至七分去滓空心温服人參湯治姙娠卒下血致胎不安小腹疼痛人参當歸切微炒阿膠炙令燥各二两甘草炙令赤芎藭黄芩去黒心艾葉各一两呉茱茰湯洗焙生乾地黄微炒各二两右搗篩每服三錢以水一盞入生薑一棗大切同煎至七分去滓空心温服日三阿膠湯治姙娠胎動腹痛下血暈悶阿膠炙燥一两生薑切炒乾三錢芎藭續㫁各半两側柏當歸切焙桑寄生艾葉各三錢竹茹雞子大一團右麄搗篩每服三錢以水一盞入棗二枚擘破煎七分去滓温服之伏龍肝湯治姙娠胎動不安腹内疼痛下血不止伏龍肝桑寄生續㫁剉微炒芎藭炒各一两龍骨三錢當歸切焙阿膠炙燥各一两乾薑炮甘草炙各一两右麄搗篩每服五錢以水一盞半入生薑三片棗二枚擘破同煎至八分去滓空心食前温服伏龍肝散出聖惠方治姙娠胎動腹痛下血不止伏龍肝當歸剉㣲炒各一两龍骨三錢煆阿膠一两搗碎炒令黄燥蒲黄三錢艾葉半两浄微炒熟乾地黄一两炒牛角䚡炙黄燥芎藭各半两右搗細羅為散毎服不計時候以粥飲調下二錢茯神湯治姙娠八九月或臨月因用力勞乏便即胎動忽然下血心腹急痛面目青黒冷汗出氣息欲絶茯神去木熟乾地黄焙各一两甘草炙半两鈎藤一两桔梗炒人参當歸切焙芍藥剉炒各一两半右為麄散每服三錢以水一盞煎至七分去滓温服一方有桑寄生禹餘粮丸治姙娠胎動腹痛下血不止禹餘粮煆醋淬七遍二两木賊剉炒半两乾薑炮龍骨附子炮裂去皮臍各一两白芷當歸切焙芎藭各半两右為末煮麵糊和丸如梧桐子大每服三十丸以温酒食前服之人参飲治姙娠胎動不安腰腹痛血下不止人参芎藭當歸切焙阿膠炙燥各二两艾葉一握杜仲去粗皮炙二两熟乾地黄焙一两甘草炙剉一两右粗搗篩毎服五錢以水一盞半棗一枚擘破煎至一盞去滓温服下不拘時阿膠散出聖惠方治姙娠從髙墮下腹痛下血面色青黄阿膠一两搗碎炒㣲黄燥木香不見火芎藭熟乾地黄各半两乾薑一錢炮裂剉當歸剉微炒桑寄生桂心各半两右搗篩為散毎服四錢以水一中盞煎至六分去滓不計時候温服膠艾湯治姙娠卒下血胎動腹痛保血安胎方見安胎類蒲黄散一名當歸散治姙娠卒下血令胎不安臍腹撮痛蒲黄微炒當歸焙令香剉龍骨阿膠炙令燥芎藭各半两生乾地黄焙各半两一方用熟乾地黄牛角䚡黄牛角上者炙令焦一两右為散研匀細每服二錢以同煎艾煮米飲調下食前服艾葉湯治姙娠卒下血不止腰腹疼痛一名地黄艾葉湯艾葉炒二两熟乾地黄焙二两一方用生乾地黄人参地榆乾薑炮裂阿膠炒燥當歸切焙各一两右麄搗篩毎服五錢以水一盞半煎至八分去滓温服不拘時候阿膠散治姙娠損動胎氣腹内結痛血下不止暈悶阿膠炙燥桑寄生各二两續㫁一两半熟乾地黄焙芎藭白芷人参各一两右為散毎服三錢煎青竹茹糯米湯調下不拘時秦芁湯治姙娠胎動下血身體煩熱倦怠秦芃去苖土鹿角膠炙燥地榆剉甘草炙剉白芷人参芎藭各半两右麄搗篩每服五錢以水一盞半糯米五十粒煎至一盞去滓不拘時温服側柏丸治姙娠胎動臍腹㽲痛下血不止側柏芍藥各一两代赭石研黄耆剉木賊剉炒芎藭禹餘粮煆各半两右為末酒煮麵糊和丸如梧桐子大毎服二十丸濃煎木賊酒下食前服芎藭散出聖惠方治姙娠五六箇月從髙墜下胎腹内不安兼臍下㽲刺疼痛不住下血芎藭三錢炒阿膠搗碎炒令黄燥一两當歸一两剉微炒艾葉半两微炒熟乾地黄一两桑寄生赤石脂各三錢右搗細羅為散毎服不計時候以温酒下二錢苧根湯出大全良方療勞損動胎腹痛去血胎動向下苧根乾地黄各二两當歸剉微炒芍藥阿膠炙令黄燥甘草炙各一两右㕮咀以水六升煮取二升去滓内膠烊分三服忌海藻菘菜蕪荑杜仲湯治姙娠卒然下血不定令胎不安小腹疼痛連腰杜仲去粗皮剉炒二两人参一两阿膠炙令燥芎藭各一两當歸微炙二两艾葉一把焙右粗搗篩毎服三錢以酒一盞入棗三枚擘破同煎至七分去滓温服相次三服腹中當暖即血止一方無艾葉止用水酒共煎服名人参湯鈎藤湯治姙娠八九箇月或胎動不安因用力勞乏心腹痛卒然下血面目青冷汗出氣息欲絶方見安胎類麥門冬湯治姙娠胎動不安忽然下血寒熱徃來腹痛如欲産手足煩悶麥門冬去心焙二两甘草炙剉人参生乾地黄焙黄芩去黒心阿膠炙令燥各一两右為麄散毎服三錢以水酒各半盞入生薑半錢切棗三枚擘破同煎至七分去滓食前温服芍藥散治姙娠胎動下血不止臍腹㽲痛迷悶昏塞白芍藥一两炒牡蠣煆半两熟乾地黄焙半两木賊剉炒一两烏賊魚骨去甲乾薑炮各半两右為散毎服三錢以米飲或温酒調下食前當歸散治姙娠胎動下血不止當歸切焙乾桑根白皮剉續㫁芍藥芎藭各一两乾薑炮半两右為散毎服二錢以酒調下不拘時桑寄生散出聖惠方治姙娠損動腹内結痛血下暈悶桑寄生當歸剉微炒各一两阿膠二两搗碎炒令黄燥續㫁一两剉艾葉半两微炒芎藭一两右搗篩為散每服用藥五錢先以水一大盞半入銀三两煎至一盞次入藥并竹茹一錢糯米一百粒煎至六分去滓食前分温二服卷柏散出聖惠方治姙娠傷動腹痛下血心煩卷柏阿膠搗碎炒令黄燥龍骨當歸剉微炒熟艾微炒剉熟乾地黄各半两右搗細羅為散毎服不計時候煎黒豆湯調下二錢黄耆湯出聖惠方治姙娠五月六月血不止黄耆炙剉一两半桑寄生炙剉地榆剉熟乾地黄焙各一两艾葉焙乾龍骨研各三錢右麄搗篩毎服五錢以水一盞半生薑半錢切棗三枚擘破同煎至六分去滓食前温服鹿膠湯出仁存方治姙娠胎動不安腰痛下血當歸川芎苧根各一两鹿角膠艾葉各二两右㕮咀每服四錢以水一盞葱白二箇銀半兩煎至一盞去滓熱服空心食前阿膠散出聖惠方治姙娠胎上逼心下血不止阿膠搗碎炒令黄燥芎藭當歸剉微炒熟乾地黄各一两銀一斤水一斗煎至五升右為散毎服四錢以銀汁中盞煎至六分去滓不計時候温服馬通湯出肘後方治姙娠卒驚奔走或從髙墮下暴出血數升馬通汁一升乾地黄阿膠各四两當歸艾葉各三两右㕮咀以水五升煮取二升半去滓内馬通汁及膠令烊分三服不瘥重作治姙娠忽暴下血數升胎燥不動出千金方榆白皮三两當歸生薑各三两乾地黄四两葵子一升肘後不用右以水五升煮取二升半分三服不瘥更作服之芎藭湯一名地黄湯治姙娠已數月卒然下血不定方見安胎類芎藭散出聖惠方治姙娠忽胎動下惡血腹痛不可忍心神煩悶芎藭一两當歸剉微炒鹿角膠搗碎炒令黄燥各一两半桑寄生熟乾地黄各一两右為散毎服四錢以水一盞入生薑五片棗三枚煎至六分去滓不計時候稍熱服烏賊魚骨散治姙娠胎動不安下血不止臍腹㽲痛烏賊魚骨去甲一两白芍藥芎藭龍骨赤石脂各半两右為散毎服二錢以米飲或温酒調下食前桂枝茯苓丸治婦人宿有癥病經未及三月而得漏下不止胎動在臍上者為癥痼害姙娠六月動者前三月經水利時胎下血者後㫁三月衃也所以血不止者其癥不去故也當下其癥桂枝茯苓牡丹皮去心桃仁去皮尖熬芍藥各等分右為末煉蜜和丸如兎屎大毎日食前服一丸不瘥加至三丸當歸散出聖惠方治姙娠勞熱胎動不安下血腹痛不止手足煩悶當歸剉微炒芎藭各一两黄芩半两炒熟乾地黄一两半焙伏龍肝一两右搗篩為散每服四錢以水一中盞入淡竹茹一錢煎至六分去滓不計時候温服乾地黄散一名益母散出聖惠方治姙娠從髙墜下腹痛下血煩悶生地黄益母草各一两當歸黄耆各半两右㕮咀每服四錢水一盞薑四片煎至六分去滓無時候服一方加芎藭當歸散治姙娠卒下血腰腹疼痛當歸切焙桑寄生續㫁各半两赤芍藥一錢右搗羅為散每服三錢正空心食前温酒調下有冷加乾薑一兩腹痛加芎藭一兩治姙娠胎動下血不住腹痛不止宜服此方出聖惠方當歸剉微炒一两桑木耳微炙半两重乾薑炮裂剉續㫁各一两右搗細羅為散每服不計時候以温酒調下二錢若由頓仆及舉重致胎動去血者及腹痛出肘後方膠三两炙當歸二两甘草一两炙右㕮咀以水五升煮取二升分兩服忌菘菜海藻治姙娠注下不止出千金方阿膠艾葉酸石榴皮各二两右以水七升煑取二升去滓内膠令烊分三服苧根湯出三因方治胎無故下血腹痛不可忍或下黄汁如漆如小豆汁者野苧根剉炒金銀各一两右用水酒各一盞煎至一盞去滓分服不拘時候膠艾飲出危氏方治姙娠忽下血胎上衝心手足逆冷欲死生艾汁二盞阿膠白蜜各二两右同煎一盞半稍熱服之無生艾即濃煎熟艾一方加竹茹一大塊同煎一两沸分三服治姙娠損動下血不止出聖惠方甘草一两炙可令微赤阿膠三两蚌粉炒右先以水一大盞煎甘草去滓次下雞子阿膠同煎候膠消熱攪分作三服不拘時服一方無蚌粉枳殻湯出㧞萃方治婦人胎漏下血及因事下血枳殻去穰麩炒黄芩各半两白术一两右為末水煎食前温服甘草湯治姙娠卒下血胎動不定連腹㽲痛甘草炙令赤阿膠炙令燥各一两生乾地黄焙半两右麄搗篩為散毎服三錢正以水一盞煎至七分去滓温服之良鹿角膠湯治姙娠胎動漏血不止鹿角膠炙燥一两人参白茯苓去黒皮各剉一两右麄搗篩為散每服三錢