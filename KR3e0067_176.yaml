body:
  text: 普濟方卷一百七十六明周王朱橚撰痟渇門總論夫三痟者本起腎虚或食肥美之所發也腎為少隂膀胱為太陽膀胱者津液之府宣行陽氣上蒸入肺流化水液液達五臓調陽養髓其次為脂膚為血肉上餘為涕淚經循五臓百脈餘為小便黄者血之餘也臊者五臓之氣鹹者潤下之味也腰腎冷者陽氣已衰不能蒸上穀氣盡下而為小便隂陽阻隔氣不相榮故陽阻隂而不降隂無陽而不昇上下不交故成疾矣夫痟者痟渇痟中痟腎也此由少年服乳石熱藥耽嗜酒肉葷辛熱麵炙煿荒淫色慾不能將理致使津液耗竭元氣受克熱毒積聚扵心肺腥羶并傷扵胃腑脾中受熱水臓乾枯四體尫羸精神恍惚口苦舌乾日加躁渇飲水多而小便少者痟渇也喫食多而飲水少小便赤黄者痟中也飲水味甘隨飲便下小便而白濁腰腿痟痩者痟腎也斯皆五臓精液枯竭經絡血澁榮衛不行熱氣留滯遂成斯疾矣渇病有三曰痟渇痟中痟腎痟渇屬心故煩必致心火散漫渇而引飲經云脈軟散者當病痟渇諸脈軟散皆氣實血虚也痟中屬脾脾熱則成為痟中復有三中寒中熱中强中寒中隂勝陽鬰乆必為熱中經云脈洪大隂不足陽有餘則為熱中多食數溲為寒中隂狂興盛不交精泄則為强中三痟病至强中危矣痟腎屬腎盛壯之時快情縱慾年長腎衰多服丹石之所致經云腎實則痟不渇而小便自利名曰痟腎亦名内痟痟渇以渇而不利引飲過甚言之痟中以不渇而利熱氣内痟言之痟腎以渇而復利腎燥不能制約言之盖以上盛下虚心脈多浮腎脈必弱故經云脈洪大隂不足陽有餘則為熱中即痟熱氣上騰心虚受之病屬上焦謂之痟渇熱蓄扵中脾虚受之病熱中焦謂之痟中熱伏扵下腎虚受之病屬下焦謂之痟腎凡三痟肺痟腎痟可治惟有脾痟不可治肺痟熱在上焦可用凉藥如黄連等皆可用此疾多出扵飲酒人冬月盛寒多以䓤椒鳩鴿煮酒或加食熱麵遂得此疾故可用凉藥觧之如脾痟則飲食入腹如湯澆雪随小便出落扵溷僻清渠中凝結如脂日可倍食數餐膚腹日益痟痩用熱藥則熱愈甚用凉藥則愈見虚羸故無治腎痟者渇而多飲水小便白濁肌膚雖日痟痩然小便不如脾痟之凝結堅硬飲食亦不倍多是腎虚弱心氣渙散所致故可補心腎去煩熱則其疾可愈天地自太虚至黄泉有六位人身自頭至足亦有六位人胷腹之間自肺至腎又有六位故立天之氣曰金與火立地之氣曰土與水立人之氣曰風與火故金火合則熱而清水土合則濕而寒風火合則温而炎肺最在上為金主燥清心次為君火主熱肝又次之為風主温膽又次之為相火主極熱又次之為濕土主凉腎又次之黄泉為寒水主寒故肺象天脾腎象地肝膽象人夫土為萬物之夲水為萬物之元水土合德以隂居隂同處乎下以立地萬物根扵地是故水土濕寒若燥熱陽實則地之氣不立萬物之根索澤而枝葉為枯由是觀之則五臓六腑四脉百體皆禀受扵脾胃行其津液相與濡潤滋養今醫者故以燥熱之劑養脾胃濕土之氣不亦舛乎痟渇夲濕寒之隂氣極衰燥熱之陽氣太甚更服燥熱之藥則脾胃之氣竭矣叔世不分五運六氣之虚實而一槩執熱為實而寒為虚彼但知心火陽熱一氣之虚實而非臓腑六氣之虚實也盖肺夲清虚則温心夲熱虚則寒肝夲温虚則清脾夲濕虚則燥腎夲寒虚則熱假若胃冷虚者乃胃中隂水寒氣濕甚而陽火熱氣衰虚也非胃土温氣之夲衰故當温補胃中陽火之衰退其隂水寒氣之甚又如胃熱為實者乃胃中陽火實而隂水虚也故當以寒藥㵼胃中之實火而養其虚水然此皆補㵼胃中虚熱水火所乗之邪非胃為實者之夲也夫補㵼脾胃濕土之夲氣者潤其温是補燥其温是㵼土夲濕故也凢臓腑諸氣不必腎水獨當寒心火獨當熱要知每臓諸氣和同宣而平之可也是故水少火多為陽實隂虚而病熱也水多火少為隂實陽虚而病寒也其為治者㵼實補虚以平為其道可矣故治消渇者補腎水之隂虚而㵼心火之陽熱除膓胃燥熱之甚漸使津液生而不枯氣血利而不澁則病日已矣三痟者其燥熱一也但有㣲甚耳余聞古之方多一方而通治三痟消者以其善消水榖而喜渇也然叔世論痟渇者多不知夲其言痟渇者上實熱而下虚冷上熱故煩渇多飲下寒故小便多出夲因下部腎水虚而不能制其上焦心火故上實熱而下虚冷又曰水數一為物之夲五行之先故腎水者人之夲命之元不可使之衰弱夲不堅則枝葉不茂元氣不固則形體不容痟渇病下部腎水極虚冷者更服寒藥則元氣轉虚而下部腎水轉衰則上焦心火尤甚而難治也但以暖藥補養元氣若下部腎水得實而勝退上焦心火則自然心渇止小便如常而病愈也巧言似是扵理實違者也誤已乆矣或又謂腎與膀胱属水虚則不能制火故小便多者愈失之逺矣彼謂水氣實者乃能制火虚則不能制火故隂虚而熱燥其液小便淋而常少隂實陽虚不能制水小便利而常多豈知痟渇小便多者非謂此也盖燥熱太甚而三焦膓胃之腠理怫鬰結滯緻宻塞壅而水液不能渗泄浸潤扵外榮養百骸故膓胃之外燥熱太甚雖復多飲扵中終不能浸潤扵外故渇不止小便多出者知其多飲不能渗泄扵膓胃之外故數溲也内經有言心肺氣厥而渇者有言肝痺而渇者有言脾熱而渇者有言腎熱而渇者有言胃與大膓熱結而渇者有言小膓痺熱而渇者有因病瘧而渇者有因肥甘石藥而渇者有因醉􅀈入房而渇者有因逺行勞倦逼而大熱而渇者有因傷害為胃乾而渇者有因病風而渇者雖五臓之部分不同而病之所過各異其為燥熱一也夫有謂心肺氣厥而渇者論曰心扵熱移肺𫝊為隔痟注曰心熱入肺乆而𫝊化内為隔熱痟渇多飲也所謂肝痺而渇者痺論曰肝痺者夜以多驚多飲數小便如脾熱而渇者痿論曰脾氣熱則胃乾而渇肌肉不仁發為肉痿所謂腎熱而渇者刺熱論曰熱病者先腰痛胻酸苦渇數飲身熱熱論曰少隂脈實腎絡扵肺繫舌夲故口燥舌乾而渇叔世惟言腎虚不能制心火為上實熱而下虚冷以熱藥温補腎欲令勝退心火者未眀隂陽虚實之道也夫腎水為隂而夲寒虚則為熱心火属陽而夲熱虚則為寒若腎隂虚則心火陽實是謂陽實隂虚而上下俱熱眀已故氣厥論曰腎氣衰陽獨宣明五氣論曰腎惡燥由腎枯水涸臓氣時發論曰腎苦燥急食辛以潤之夫寒物属隂能養水而㵼心熱物属陽能養火而耗水今腎水既不勝心火則上下俱熱柰何以熱藥養腎水欲令勝心火豈不闇哉又如胃與大膓熱結而渇者隂陽别論二陽結為之痟注曰二陽結胃及大膓俱熱結也膓胃蔵熱善痟水榖又氣厥論曰大膓移熱扵胃善食而瘦而脈要精㣲論曰痺成為痟中善食而瘦如脾痺而渇者數飲而不得中氣喘而終時發飡泄夫數飲而不得中其大便必不停留然則痟渇數飲而小便多者止是三焦燥熱怫鬰而氣衰也眀矣豈可以燥熱毒藥助其强以伐衰隂乎此真實實虚虚之罪也夫痟渇者多變聲音瘡癬痤疿之數皆膓胃燥熱怫鬰水液不能浸潤扵周身故也或熱而膀胱怫鬰不能渗泄水以妄行而面上腫也如小膓痺熱而渇者舉痛論曰熱氣留扵小膓膓中痛痺熱焦渇則便堅不得出矣注曰熱渗津液而小便堅矣如言病瘧而渇者瘧論曰陽實則外熱隂虚則内熱外内皆熱則喘渇故致飲冷也然陽實隂虚而為病熱法當用寒藥養隂㵼陽是謂㵼實補衰之道也如因肥甘石藥而渇者脾病論曰有口乾者病名為何岐伯曰此五衰氣之所病溢名脾痺痺為熱也脾熱則四臓不禀故五氣上因也先溢脾熱故脾痺又經曰五味八口蔵扵内脾胃為之其精氣津液在脾故令人口甘也此肥羙之所發也此人必數食甘羙而多肥肥者令人内熱甘者令人中滿故其氣上溢轉而為痟渇通許虚實論曰痟痺仆擊偏枯痰厥滿發迤肥實之人膏粱之疾也或言人惟胃氣為夲脾胃合為表裏脾胃中州當受温補以調飲食今渇痟者脾胃極虚溢宜温補若用寒藥耗損脾胃夲氣虚乏而難治也此言乃不眀隂陽寒熱虚實補㵼之道故妄言也豈知腹中論曰帝云夫子數言熱中痟中不可服芳草石藥發癲芳草發狂注言多飲數溲謂之熱中多喜曰癲多怒曰狂芳羙味也石謂英乳及發熱之藥經又曰熱中痟中皆富貴人也今禁膏粱是不合其心禁草石藥是病不愈願聞其説岐伯曰芳草之味羙石藥之氣悍二者之氣急疾堅致故非緩心和人不可服此二者帝曰何以然岐伯曰夫石氣慓悍熱氣亦然所謂飲一而溲二者當肺氣從水而出也其水榖海竭矣凡痟渇便用熱藥誤人多矣故内經應言渇者皆如是豈不昭晰歟然而猶有惑者諸氣過極反勝己者是以人多誤也如陽極反似隂者是也若不眀標夲為認似是始終乖矣故凡見下部覺冷兩腋如氷此皆心火不䧏狀類寒水宜加寒藥下之三五次則火䧏水升寒化則退然而舉世皆同執迷故處其方必眀病之標夲逹藥之所能通氣之所宜治而無害者可以治其病也以所為標夲者先病而為夲後病而為標此為病之本末也標夲相𫝊先當救其急也又云六氣為夲三隂三陽為標盖為標病蔵病最急也又云六氣為胃之夲假若胃熱者胃為標熱為夲也處其方者當除胃中之熱是治其夲也故六氣乃以甚者為邪病衰者為正法當㵼甚補衰以平為其養正除邪之道也酸能収甘能緩辛能散苦能堅鹹能軟酸属木也燥金注扵散落而木反之温土主扵緩而木勝之故能然也苦能燥濕而堅耎者葢以凡物燥則堅也甘能緩苦急而散結甘者土也燥能急結故緩則散也辛能散主散結潤燥辛者金也金主散落金生水故也况抑結散則氣液宣行而津液生也臓氣發特論曰腎苦燥急食辛以潤之開腠理致津液通氣也鹹能軟堅鹹者水也水潤而柔故勝火之堅矣此五臓之味也其為五味之夲者淡也淡胃土之味也胃土屬地土者地為萬物之夲胃為一身之夲澹能渗泄利竅夫燥能急結甘而能緩之淡為剛土其能潤燥緩其急結令氣通行而致津液渗泄也故痟渇之人其藥與食皆宜淡齊至真大要論曰辛甘發散為陽酸苦漏泄為隂淡味渗泄為陽五者或散或收或緩或急或燥或潤或堅或軟所以利而行之調其氣也凢三痟者内經所謂腎痟也痟渇等可取生藕汁服之則愈夏月暑毒入心心旺不受邪熱移扵肺肺葉焦津液乾好飲水名曰膈痟宜以冷参湯進玉壺丸之類效寒暑之交氣壅不調鼻塞聲重咽乾煩渇二腑癃閉法當洗心滌其熱去而肺經清潤渇自止矣宜用洗心散之類飲酒無度食炎熱過多邪熱蓄積扵胃腑多令煩渇當用龍腦飲之類制其脾化其滯導其熱也色欲無莭耗損腎元水火不交火必炎上熏蒸扵肺金與火燥渇生飲冷當因其夲宜腎氣八味丸之類若不先固其夲又將何以禦其渇哉診其脉數大者生細小浮者死又沉小者生實牢大者死有病口乾此病何以得之葢五氣之溢也名曰脾疸夫五味入扵口蔵扵脾為之行其精氣溢在扵脾令人口乾此肥羙之所發也此人飲不欲食甚者則欲吐下肥人内熱甘者令人中滿故其氣上溢為痟渇也厥隂之為病痟渇氣上衝心中疼熱欲必數食甘美而多肥者令之不肯止養氣法云人睡眼合卧勿張口乆成痟渇反失血色凢積乆飲酒未有不成痟渇然則太寒凝酒而海不凍眀其酒性酷熱物無以加臠炙鹽鹹之味酒客躭嗜不離其口入膓之後制不由己飲噉無度咀嚼將不擇酸鹹積年長夜酣飲不懈遂使三焦猛熱五臓乾燥木石猶且枯焦在人何能不渇治之安可緩在病者若能如方莭慎旬月可瘳如不愛惜死不旋踵其所慎者有三一飲酒二房室三鹹食及麵能慎此者雖不服藥而自可無他不知此者縱有金丹亦不可救痟渇之人愈與未愈常須慮有大癰也當預備癰藥以防之有人病渇利始發扵春經一夏服栝樓㪷汁得其力渇漸瘥然小便猶數甚晝夜二十餘行常至三四升極瘥不减二升也轉乆便止漸食肥膩日就羸痩咽喉唇口焦燥呼吸少氣不得多語心煩熱兩脚酸食乃兼倍扵常而不為氣力者當知病皆由虚熱所致治法可常服栝樓汁以除熱牛乳杏酪善扵補此治最有益痟渇之疾或服五石而致者又有疾乆飲酒而致者如觧五石毒者飲罌粟粥而能止渇並宜服兎絲圎大渇而加煩熱者栝樓根湯馬通散之數凢病人兼有燥渇之證用烏梅栝樓根乾葛甘草宣補丸凢人生放恣者衆盛壯之時不自慎惜快情縱慾極意房中稍至年長腎氣虚竭百病滋生又年少懼不能房多服食石散真氣既盡石氣孤立日惟虚耗唇口乾燥精液自洩或小便赤黄大便堅實或渇而且利日夜一石或渇而不利所食之物皆作小便此皆由房室不莭之所致也凡平人夏月喜渇者由心熱也心熱便汗汗則腎中虚燥故渇而小便少也冬月不汗故小便多而數也此為平人之證也名為痟渇但小便利而不飲水者腎實也經云腎實則消消者不渇而利是也所以服石之人扵小便利也石性歸腎歸腎則實實則能消水浆故利利多則不得潤養五臓五臓衰則生諸病張仲景云熱結中焦則為腎熱結下焦則為溺血亦令人淋閉不通眀知必有患小便利信矣内有熱者則喜渇除熱則止渇熱虚者須除熱補虚則瘥矣痟渇附論夫痟渇者雖為渇而不小便是由少年服五石諸圎經年嵗石勢結扵腎中使人下焦虚熱及至年衰血氣减少不復能制扵石石勢獨盛則腎為之燥故引水而小便少也其病變者多發癰疽此由滯扵血氣留扵經絡不能通行血氣壅澁故成膿也診其脉數大者生細小浮者死又沉小者生實大者死病有口甘者名之為何何以得之此氣之溢也名曰脾痺夫五味入扵口蔵扵胃脾之所為行其氣液在扵脾令人口甘此肥羙之所發此人必數食甘羙上溢為痟渇也辨六經渇并治少衛生寳鑑大陽渇脉浮無汗者五苓散滑石之類皆不作效遂至引飲過多兩脚浮腫此證不可以為裏熱盖腎水不上升心火不降故也須用交感丹為主却以烏梅濃蜜生姜甘草煎湯嚥之腎水一升心火一降其渇止脚亦不腫治上焦膏痟而不欲多食小便清利宜小柴胡白虎湯或錢氏地骨皮散加芍藥黄茋石膏黄芩桔梗之類是也若痟渇者倍黄連痟中者倍栝樓腎痟者加芒硝六分服鈆丹丸得小便鹹苦如常後恐虚􅉵者並宜服肉蓯蓉丸足太陽者是膀胱之經也膀胱者是腎之腑也而小便數此為氣盛則消榖大便硬實則為痟渇也宜八味腎氣此主之凢痟渇者經百日以上者不得灸刺恐扵瘡上漏膿水不歇遂成癰疽羸痩而死亦忌有誤傷皮肉若作鍼孔許大瘡者所飲之水皆扵瘡中變成膿水而出不止者必死慎之初得痟渇者可依後方灸刺之為佳孫氏云痟渇者百日外概不許鍼刺所飲之水皆化為膿水不止者皆死特須慎之又云仍不誤傷皮肉若小有瘡亦能致死今者既得痟渇且未免飲水水入瘡即損人今初得日豈得令其刺致此誤傷之禍輙將未順其理且俟百日以上或能未誤初炙之説故不録灸刺凢炙刺則外脱其氣痟渇皆是虚疾灸刺特不相宜唯脚氣宜即炙之夫内痟之為病當由熱中所致小便多扵所飲令人虚極短氣夫内痟者食物皆消作小便也而又不渇正觀十年梓州刺史李文博先服白石英既乆忽陽道强盛經月餘漸患渇經數日小便大利日夜百行以来百方治之漸以増劇四體羸惙不能起止精神惚慌口舌焦乾而卒此病雖稀甚可畏也利時脉沉細㣲弱服枸杞湯即效但不能長愈服鉛丹散亦即减其間將復除熱陽眀渇脉長有汗者白虎凉膈散之類少陽渇脉弦而嘔者小柴胡加栝樓湯太隂渇脉細不欲飲水思湯不思水者四君子理中湯主之少隂渇脉沉自利者猪苓湯三黄湯之類厥隂渇脉㣲引飲者少少與之滑石治渇夲為竅不利而用之以其燥而能亡津液也天令温氣太過者當用之是為犯禁假令小便利或渇或不渇内有濕熱也小便自利而渇者内有禁燥也濕宜渗泄之燥則潤澤之可矣維證有汗而渇者以辛潤之無汗而渇者以苦堅之傷寒食少而渇者當以和胃之藥止之不可用凉藥止之恐復損胃氣不能食也白术茯苓即是和胃之藥也大陽無汗而渇者不宜白虎湯若汗後脉洪大而渇者宜與之陽眀有汗而渇者不宜與五苓散若小便不利汗少脉浮而渇者宜與之人病心肺熱而不渇者知不在太陽少隂之夲而只在標也在標則不渇矣是在夲也爛金圓出三因方治熱中痟渇止後將補精血益諸虚觧勞倦去骨莭間熱寜心强志安神定魄固臓腑進飲食免生瘡瘍大猪肚一箇黄連三兩蜜生姜各二兩研右先將猪肚净洗復以葱麵醋椒等洗烘乾用藥同水酒入銀石器内煮半日漉出黄連洗去蜜酒令盡剉研為細末再酒調成膏入先洗猪肚内縫定入銀石器内水熬爛硏為膏搜下項藥人参二兩黄蓍四兩五味子山藥山茱茰杜仲去皮剉姜汁拌炒絲斷石斛車前子鼈甲醋炙熟地黄新蓮肉去皮當歸各三兩槐角子炒白茯苓磁石各一兩煆碎川芎一兩沉香半兩不焙兎絲子五兩酒浸温研麝香一錢别研入右為末用猪肚膏搜和得所膏少則添熟蜜杵數千下丸如梧桐子大食前温酒糯米湯任下五十丸一法有白术二兩陽起石一兩蓯蓉丸出三因方治心虚煩悶或外傷暑熱内積愁煩酣飲過多皆致煩渇口乾舌燥引飲無度小便或利或不利蓯蓉酒浸磁石煆碎熟地黄山茱茰桂心山藥炒牛膝酒浸茯苓黄蓍塩湯浸澤瀉鹿茸去毛塗酥炙逺志去心炒石斛覆盆子五味子蓽撥破故紙炒巴㦸酒浸兎絲子酒浸龍骨杜仲去皮剉姜汁製炒㫁絲各半兩附子炮去皮臍箇重六錢右為末蜜為丸如梧桐子大毎服五十丸空心米湯飲下丹砂散出聖濟總録治三痟病小便頻數皮燥毛焦飲食雖多肌肉痟痩渇燥引飲丹砂研水飛黄連去鬚鐡粉研栝樓各一兩一分赤石脂蘆薈研龍齒澤瀉各三分胡粉研鈆研各半兩牡蠣煆一分桑螵蛸十個炙雞肶胵五枚蜜炙黄甘草一兩半炙右除别硏外搗羅為散再和匀毎服二錢用水煎小麥湯調下毎日三服白术散出千金方治痟渇隂脉絶胃反而吐食生白术乾地黄生姜各二兩橘皮人参甘草黄蓍逺志各三兩桂心當歸芍藥各三兩大棗三枚右㕮咀先取屋上瓦三十年者碎如雀腦三升東流水二石煮取二斗納藥瓦汁中煮三升分四服或單飲瓦汁亦佳真珠丸出仁存方治心虚煩悶或外傷暑熱内積煩悶酣飲過多皆致煩渇口乾舌燥引飲無度小便或利或不利知母一法一兩一分川黄連去毛一法一兩苦参一法一兩鐡鏵粉一兩一分研元参一法無牡蠣煆一兩一分硃砂别研二兩麥門冬去心天花粉分各半八兩金箔銀箔二百片一法白扁豆煮去皮一兩右為末煉蜜入生栝樓根汁少許丸如梧桐子大用金銀箔為衣毎服二十丸先用栝樓根汁下一服次用麥門冬熟水下病退日二服忌煿酒色次投蓯蓉丸補一方有蘆薈二錢半白扁豆二兩炒天花丸出經騐良方治渇通用痟渇數中痟腎病三焦五臓生虚熱唯有膀胱冷似氷嘗思飲水無休歇小便晝夜不停行骨冷皮焦心肺裂夲因飲酒炙煿多四體肌膚淋轉渇莫教便利白如泔口苦咽乾舌如血若如此状病須危幸遇神仙談妙訣黄連净三兩童便浸三宿焙白扁豆姜製去皮炒二兩辰砂白茯苓牡蠣粉知母苦参天花粉鐡粉各半兩蘆薈一分金銀箔各二十片右為末取栝樓根生汁和生蜜丸如梧桐子大毎服三十丸麥門冬湯送下一方無白茯苓鐡粉丸出聖恵方治痟渇不問年月深淺困篤者宜服此鐡粉二兩研雞肶胵一兩㣲炒土𤓰根一兩苦参三分黄連三分麥門冬一兩去心牡蠣三分燒為粉桑螵蛸三分㣲炒金箔五十片銀箔五十片栝樓根三分右為末入硏了藥更硏令匀煉蜜和搗三五百杵丸如梧桐子大毎服不計時候以清粥送下三十丸降心湯出直指方治心火上炎腎水不濟煩渇引飲氣血日消人参去蘆逺志取肉薑汁炒當歸去毛川芎熟地去土白茯苓去皮黄蓍蜜炙去蘆五味子去梗甘草㣲炙各半兩天花粉一兩右剉細毎服三錢薑棗煎食前服金英丸出聖濟總録治痟渇鉛丹麥門冬去心焙牡蠣煨研如粉知母焙各一兩黄連去皮鬚栝樓根苦参各二兩金箔一百片生栝樓二兩研如膏銀箔一百片右搗羅為末用生栝樓根和為丸如梧桐子大毎服四十丸食後米湯飲下日夜再當服渇止十日已来漸覺减即日兩服服三十五丸一月外毎日一服服三十丸夏月即用蜜為丸服藥之次腹中忽冷痛即取厚朴二兩去粗皮姜汁炙陳橘皮三分去白焙生姜二兩切水二升煎取半升去滓分温二服食乆以飯壓之如腹中不痛即止梅花取香湯出得生堂方又名斬龍劊子手消渇飲水至石斗病極者可服之即瘥天花粉烏梅肉人参乾葛枇杷葉黄蓍栝樓子麥門冬五味子各一兩檀香五錢右為細末随意不時水調服之猪肚丸出千金方治諸渇疾川黄連五兩净白乾葛知母茯神麥門冬去心大熟地洗焙各二兩栝樓根粟米各一兩人参半兩右木臼中同搗為散入净猪肚内縫宻置甑内蒸極爛乗熱再杵細若硬加少蜜為丸如梧桐子大蒸汁下五十丸或粥飲下麥門冬散出聖恵方治痟渇體熱煩悶頭痛不能食麥門冬二兩去心茅根二兩剉栝樓二兩蘆薈石膏二兩甘草一兩㣲炙赤剉右為散毎服四錢以水一中盞入小麥一百粒煎至六分去滓不計早晚時候温服鐡粉散出聖恵方治痟渇不止心神煩亂宜服此鐡粉一兩細研麥門冬二兩去心焙牡蠣一兩研為粉知母一兩黄連二兩去鬚苦参二兩剉栝樓根二兩金箔一百片細研銀箔二百片細研右件藥搗細羅為散入鐡粉等同硏令匀毎服不計時候以清粥飲調下一錢鉛丹散一名胡粉散治痟渇不止小便數兼痟中心神悶煩頭痛出千金方鉛丹胡粉各二兩甘草栝樓根各十分澤㵼白石脂肘後作貝母石膏赤石脂各五分右為細末毎服一錢用米湯調熱水調亦可量人羸壯服之食後臨卧如肚疼以浆水調或作丸一年病者一日愈二年病者二日愈渇甚者夜二服腹痛者减之丸服亦佳毎服十丸備急方云不宜酒不用麥汁下之古今録驗云服此藥了經三兩日宜爛煮羊肚腹服之或作羹亦得宜湯淡食之候小便數鹹苦即宜服蓯蓉丸兼煮散將息亦治渇利患十年者菝葜調下童子桑白皮湯出三因方治三痟渇病或飲多利少或不飲自利肌膚痩削四肢倦怠常服補虚止渇利渇有三痟渇属心内積煩愁心火炎上與暑熱或飲食相挺而動痟者属脾有隂勝陽致成寒中者有隂不勝陽成熱中者有狂隂興盛不交精泄成强中者痟腎属腎少不謹惜壯乃腎衰多服丹石以致發唇焦咽竭精益自泄不飲而利亦曰内痟病亦危矣童根桑白皮即新種者去粗皮晒乾不焙茯苓人參麥門冬去心乾葛乾山藥桂心各一兩甘草半兩生用右剉散水一盞半煎至七分去滓温服麥門冬煎出三因方治諸渇病麥門冬去心人参黄蓍各二兩白茯苓山茱茰山藥桂心各一兩半黒豆三分煮去皮别研右為末地黄自然汁二碗牛乳二盞熬為膏丸如梧桐子大大麥煮飲下五十丸縮氷丸出楊氏家蔵方治痟渇甘遂半兩用麩炒透裏黄褐色黄連去鬚一兩右為細末水浸蒸餅為丸如菉豆大毎服二丸薄荷湯送下不拘時候忌甘草三日八味腎氣丸一名八味丸出三因方治痟渇小便多以飲水一斗利小便反倍亦主婦人病飲食如故煩熱不得卧而反倚息者如胞轉不得溺也以胞系反戾故致此病但利小便則愈乾熟地半斤山藥四兩茯苓牡丹皮附子桂心各三兩澤㵼四兩山茱茰五兩右為細末煉蜜丸如梧桐子大酒送下二三十丸忌猪肉冷水蕪荑胡荽千金地黄丸亦佳仲景云常服去附子加五味子桃公云加五味子三兩蓯蓉四兩張文云五味子蓯蓉各四兩肘後方云地黄四兩附子澤㵼各一兩餘各二兩先服八味腎氣丸訖後服此藥壓之黄連蜀者二十分苦参粉乾地黄知母各十分牡蠣煆八分呉麥門冬去心十二分栝樓七分右為細末搗篩牛乳和為丸如梧桐子大併手作丸曝乾油袋盛用浆水或牛乳下日再服二十丸一方服十五丸患重者渇瘥後更服一年以来此病特慎麞鹿肉須慎酒炙肉鹹物喫素餅五日一頓細切精羊肉勿著脂胞凡喫羊肉須着桑根白皮食一方云瘥後須服此丸一載以上即永絶根源此病特忌房室熱麵并乾補一切熱肉粳米飯李子等若覺渇熱加至二十五丸亦得定後還依前减其方神效無比餘並准前十方忌猪肉蕪荑家寳方大救生丸一名猪肚丸出三因方治理三痟渇病日夜飲水百盃不歇若飲酒則渇愈甚者専心服餌之數日後見酒與水若仇頓爾口中津潤小便縮减五日後小便赤色是病毒歸扵下也或令人吐或腰背脚膝疼痛或嘔逆惡心精神昏困此乃藥驗使病毒消散也或有不𫝊扵下者主生子母瘡或生扵背或生發鬂間五漏瘡並能致命俱服此藥至八九服其病自除患人大忌酒色熱麵鹹物豚魚䓤蒜炙煿等物一百日病根永除三焦之疾自風毒酒色所傷扵上焦乆則其病變為小便頻數其色如濃油上有浮膜味甘甜如蜜淹浸之乆諸虫聚食是惡候也此名痟渇中焦得此病謂之脾痟喫食倍常徃徃加三兩倍只好飲冷入口甚羙早夜小便頻數腰膝無力小便如泔日漸痩弱此名痟中也下焦得此病謂之痟腎腎宫日耗飲不多喫食漸少腰脚細痩遺泄散盡手足乆如柴形其疾已牢矣庸醫不識義理呼為癆疾或云下冷日乆不見其痊病之乆或變為水腫或發背瘡或足膝發為惡瘡至死不救牡蠣生用苦参生為末栝樓生搗知母生為末蜜陀僧生用各一兩白蠟鎔研水銀研八分黄丹半斤研右為末男子患用未生子牡猪肚女人患用獖猪肚一箇貯藥以線縫合用繩子繫在新瓦磚上不令走轉更用栝樓根半斤細切入在水中一處和磗煮早辰至午取猪肚細切與諸藥末杵丸梧桐子大隂乾空心米飲下三十丸日三服家蔵方用黒鉛與水銀結砂不用蠟一方有天花粉半兩一方有灰坯無蜜陀僧参蓍湯出危氏方治痟渇人参去蘆桔梗去蘆天花粉甘草各一兩綿黄蓍塩湯浸炙白芍藥各三兩白茯苓去皮北五味子各一兩半右剉散毎服四大錢水盞半煎八分日進四服留滓合煎一方有木𤓰乾葛烏梅三味猪肚兒丸一名黄連猪肚丸出如宜方治痟渇猪肚一具治如倉方黄連梁米各五兩栝樓根白茯苓各四兩知母二兩麥門冬二兩右為末納猪肚中縫好安甑中蒸極爛乗熱入藥木臼中搗可丸若硬加蜜和丸如梧桐子大毎服三十丸日二加至五十丸渇即服一方加人参熟地黄乾葛直指方用雄猪肚黄蓍湯出直指方治痟渇黄蓍茯神栝樓根麥門冬去心各一兩北五味甘草炙各半兩生乾地黄一兩半右剉細毎服四錢新水煎服澄源丹出三因方治氣實血虚熱在上焦心煩燥渇引飲無度小便數晝夜乃至一二十行有麩片狀者此疾多得之飲啖炙煿日就羸痩咽喉唇口焦燥呼吸少氣不能多語兩脚痠食倍扵常不為氣力牡蠣粉苦参蜜陀僧知母水銀以白爉半錢結砂五味各一兩栝樓根一兩半黄丹一兩與水銀同研右為末男用牡猪肚一箇女人用雌猪肚一箇入藥在内以線縫定用䋲縛在新磚别用生栝樓半斤切碎同煮早辰至午時取藥出不用栝樓根只爛硏猪肚和藥為丸如梧桐子大毎服三十粒食前米湯下日三服十日可去病根麥門冬湯治痟渇生麥門冬去心苧根切小麥各二升蘆薈切栝蔞生薑各五錢石膏研六分右水二斗煮取六升去滓毎服一升渇時任意飲未瘥更作取利茯苓湯出千金方治痟渇隂脉絶胃反而吐食者茯苓八兩澤㵼四兩白术生姜桂心各三兩甘草一兩右㕮咀水一㪷煮小麥三升取汁三升去麥下藥煮取二升半毎服二合日再六神湯出仁存方治三痟渇疾蓮房乾葛枇杷葉去毛甘草炙栝樓根黄耆各等分右剉為散毎服四錢水一盞煎至七分去滓温服小便不利加茯苓天花散出直指方治痟渇天花粉生乾地黄洗各一兩乾葛麥門冬去心北五味子各半兩甘草二分右為麄末毎服三錢粳米百粒同煎服殊勝散一名硃砂散出衛生家寳方治痟渇海浮石烏賊魚骨去甲丹砂研水飛虎杖燒過各一兩右為末渇時煎麥門冬調下二錢日午空心及夜卧時各進一服忌酒色濕麵油煎生冷鮓醤一方有人參無葛根桃紅散出聖濟總録治痟渇赤石脂石膏各研栝樓根剉白赤脂鉛丹各一兩甘草炙半兩右為細散冷水調下二錢黄連丸治痟渇療中焦熱渇苦参一大斤黄連七分栝樓知母牡蠣粉麥門冬去心各五兩右搗篩攪使匀以牛乳和併手捻丸如梧桐子大曝乾日再服飽食訖以浆水下之服二十丸如㣲利减十丸如食熱麵酒等即加服五丸忌猪肉六物丸出聖恵方治痟渇熱中加减栝樓根八分麥門冬去心六分知母五分人参苦参粉土𤓰根各四分右為末牛膽和為丸如梧子大毎服二十丸日三服麥粥汁下未知稍加至三十丸咽乾者加麥門冬舌乾加知毋脇下滿加人参小便數加土𤓰根随患加之各一分易老門冬飲子出㧞粹方治老弱虚人大渇人参枸杞白茯苓甘草各三兩五味子半兩麥門冬去心五錢右㕮咀毎服一兩一錢水一盞半生姜三片煎至七分去滓温服不拘時𤓰蔞散出危氏方治盛壯之時不自謹惜恣情縱慾年長腎氣虚弱因不能房事多服丹石真氣既孤舌唇乾焦發渇精液洩小便赤黄大便乾實小便晝夜百十行須當除熱補虚白茯苓去皮天花粉宣連白扁豆人参去皮石膏甘草莭寒水石白术去皮猪苓各等分右為末毎服二錢熱湯調服立效栝樓根散出千金方治痟渇栝樓根麥門冬鉛丹各八分茯苓一作茯神甘草各六分右為細末浆水服方寸匕日三外臺方無茯苓烏梅木瓜湯出三因方治食過度中焦藴熱煩渇枯燥小便併多遂成痟中兼治瘴渇所謂瘴渇者北人徃南方受瘴多有此疾木瓜乾烏梅打破不去仁麥蘖炒甘草草菓去皮各半兩右剉散毎服四大錢水盞半姜五片煎七分去滓不拘時服烏梅五味湯出聖恵方治痟渇生津液五味子巴㦸酒浸去心百藥煎烏梅甘草各等分右㕮咀毎服四錢水一盞空心煎服茯苓丸出聖恵方治三痟渇疾果有效五倍子去瓤四兩蓮肉一兩龍腦一兩半煆左顧牡蠣煆二兩右用茯苓二兩為末煮糊丸如梧桐子大毎服五十丸空心鹽湯下仍兼服靈砂黒錫黄連牛乳丸出聖濟總録治痟渇黄連去鬚一斤為末麥門冬去心二兩研爛牛乳地黄汁葛根汁並一合右合研衆手丸如梧桐子大毎服二十丸空心粥飲下日漸再加至四十丸麥門冬散出聖恵方治痟渇不止宜服此黄連一兩炒令紫色栝樓根一兩麥門冬一兩去心焙甘草一兩炙㣲赤剉赤茯苓右為散入黄丹研令匀毎服不計時候以温水調下一盞人参散出聖恵方治痟渇鉛霜半兩細研黄連半兩去鬚栝樓根半兩人参半兩去蘆頭黄丹半兩炒令紫色右為散入研了藥令匀不計時候以温水半盞下栝樓丸治痟渇四肢煩熱口乾心燥宜服此栝樓根三兩麥門冬二兩去心焙苦参三兩分焙剉人参三分去蘆頭知母三分右為末用牛膽汁和丸如小豆大不計時候清粥飲下二十丸銀寳丸一名澄源丹治痟渇方在夲類猪脊湯出三因方治三痟渇疾大棗四十枚去皮核新蓮肉四十粒去心西木香一錢半甘草二兩炙右用雄猪脊骨一尺二寸同煎藥用水五碗扵銀器煮去肉骨濾滓取汁一碗空心任意呷服忌生冷塩等物以滓减去甘草一半焙乾為末米湯調服不以時人参散一名参梅出百一選方治痟渇牛鼻木二箇洗净細剉男患用雌女患用雄甘草人参各半兩白梅大者十箇右用水四碗煎至三碗濾去滓熱服為妙化水丹出濟生㧞粹治手足少隂渇飲不止或心疼痛者及消化水飲川烏頭大者四箇炮去皮臍甘草炙三兩牡蠣三兩生用蛤粉六兩用厚者炮右為細末醋浸蒸餅少糊為丸如梧桐子大毎服十丸十五丸心痛者醋湯下其疾立愈黄連膏出濟生㧞粹治痟渇病黄連末一斤生地黄自然汁白蓮花藕汁各一斤牛乳一斤右將汁熬成膏子搗黄連末為丸桐子大毎服二十丸少呷温水送下進十服渇病立止元骨飲出聖濟總録治痟渇猪脊骨五寸棗二十枚劈碎甘草㣲炙剉乾姜炮各半分右㕮咀水三升同煎至二升若發時量意加熱水服生地黄膏出危氏方治渇證通用生地黄束如常椀大一椀冬蜜一椀人参半兩白茯苓去皮一兩右將地黄洗切硏細新水一碗調開同蜜煎至半次入参茯苓末拌和磁器宻封匙挑服清脾湯出如宜方治煩渇飲水小便赤黄蓍白芷升麻人参甘草炙半夏製各半分右㕮咀毎服四錢姜五片棗二枚煎食後服猪苓散此即五苓散治痟渇脉浮小便不利㣲熱者及病欲水而復吐之為水逆冬時寒慄如瘧状猪苓白术茯苓各三分澤㵼五分桂心二分右細搗篩水服方寸匕日三多飲暖水汗出即愈滑石散出聖恵方治痟渇喫水漸多小便澁少皮膚乾燥心神煩熱宜服此蜜陀僧半兩研黄連半兩去鬚滑石半兩細研栝樓根半兩右為細末入硏了藥不計時候用清粥飲調下一錢黄連散出聖恵方治渇潤肺心黄連三兩净為末生地黄汁三分生栝樓汁三合牛乳三合右用三味汁相和毎服三合不計時候調下黄連末一錢三黄丸出千金方治男子五勞七傷痟渇不生肌肉婦人帶下手足寒熱者治丹石毒及熱渇以意測度須大實者方用春三月黄芩四兩大黄三兩黄連四兩夏三月黄芩六兩大黄一兩黄連七兩秋三月黄芩六兩大黄二兩黄連三兩冬三月黄芩三兩大黄五兩黄連二兩右随時加减搗為末以蜜為丸如大豆大米飲服五丸日二稍加至七丸取下為已服一月病愈乆服走逐奔馬常試有驗效一夲云夏三月不服大黄甘草飲子出宣明論治男子婦人一切痟渇不能止者大豆五升先煮三沸淘出苦水再煮大黄一兩半甘草大粗者四兩長四指打碎右用水一桶将前藥同煮三五時如稠䊜水少更添煮豆軟盛於盆中俟冷令病人食豆渇食湯汁無時候服食盡如渇止即已不止再煮前藥不三次病悉去矣川黄連丸一名麥門冬丸出直指方治諸渇川黄連净五兩白天花粉麥門冬去心各三錢半右為末以生地黄汁并牛乳汁夹和搗丸如梧桐子大毎服三十丸粳米湯飲下一方無生地黄汁牛乳用麥門冬搗匀為丸食後煎麥門冬湯下硝石散出聖濟總録治三痟渇疾硝石葛根鉛霜各一兩右為細末毎服一錢冷水調下澄水飲出聖濟總録治痟渇銀缾内湯兼鹵水萍焙乾葛根剉各等分右各件粗搗篩毎服五錢水一盞半煎至一半去滓温服鉛黄散出聖恵方治痟渇不止水銀三兩先鎔鉛旋入水銀候鉛面上有花暈上便以鐡匙掠取扵乳鉢内研細皂莢一挺不蛀者塗酥炙令黄去皮子入麝香一錢同研為末鉛一斤右為散毎抄皂莢末一錢水一中盞煎至六分去滓飲食後調下鉛黄散半錢服之浮石散出夲事方治痟渇浮石舶上青黛各等分麝香少許右為細末毎服一錢温湯調下枳椇子丸出危氏方治飲酒多發積為酷熱蒸薰五臓津液枯燥血泣小便併多肌肉消鑠専嗜冷物寒浆枳椇子二兩麝香一錢右為末麵糊丸如梧桐子大毎服三十丸空心塩湯吞下三神湯出危氏方治證同前烏梅肉逺志去心甘草水煮過却以姜汁拌炒各一兩枳實去瓤一兩夏加黄連五錢春秋冬不用右剉散毎服四錢水二盞糯禾根一握煎至七分去滓不拘時候温服若無糯禾白茅根亦可如無白茅稈繩代之亦可牡蠣散出聖恵方治痟渇潤肺白羊肚一具切熬乾牡蠣三兩燒為粉胡燕窩中草燒灰一兩右為散毎服扵食後以新汲水調下三錢龍鳯丸出危氏方治痟渇鹿茸火燎去毛一兩酒浸炙山藥兎絲子酒浸各二兩右為末煉蜜丸如梧桐子大毎服三十丸食前米飲下濃煎人参湯亦可一方麵糊丸塩酒湯下名龍肝鳯髓丸浮萍丸出千金方治痟渇乾浮萍栝樓根各等分右為末以人乳汁為丸如梧桐子大空腹飲服三十丸日三三年病者三日愈治虚熱大佳百日還丹出儒門事親治痟渇佛茄子橦栁根各等分右為末枸杞汁和為丸如雞頭大毎服丸數加减新水送下烏金散出三因方治熱中多因外傷燥熱内用意傷脾飲啖肥膩熱積胸中致多食數溲小便過扵所飲亦有不渇而飲食自消為小便者黄丹炒細墨燒各一兩右硏匀毎服三錢食後先用水一兩碗潄口待心中熱索水便以冷水調下止渇丸専止渇黄連二兩無名異一兩右為細末用蒸餅打糊為丸菉豆大毎服百丸用茄根蠒殻煎湯送下姜湯亦得竹龍散出三因方治痟渇五靈脂黒豆生去皮各半兩右為散毎服二錢煎冬𤓰湯調下無冬𤓰即用冬𤓰苗葉子煎湯俱可一日二服小渇只一服差渇定後不可服熱藥唯宜服八味丸仍更宜用五味子代附子冬𤓰飲一名黄𤓰湯出十便良方治痟渇熱盛心神煩亂及飲水小便如脂日夜無度大冬𤓰一枚黄連去鬚半斤右先搗黄連為末将冬𤓰三停中截去一停取二停净去瓤子納黄連末扵冬𤓰中取截下一頭盖却搜白麵厚裹冬𤓰令徧即更以黄土破泥裹一重候㣲乾坐𤓰在炭火中四靣簇炭火燒令泥赤即止候冷打去泥并剥去麵搗開𤓰頭裏靣有黄連汁不限多少濾過毎服一盞渇即飲之立瘥未瘥更作一服冬𤓰皮肉晒乾兼治骨蒸勞及酒黄多年者為散每扵食後温水調下二錢甚效栝樓根出聖濟總録治因好食熱麵炙肉及服補治熱藥并乳石三焦氣隔心肺乾熱口乾舌焦飲水無度小便日夜不知㪷數心欲狂亂服此救急止渇栝樓一枚黄熟者去皮用瓤并子冬𤓰一枚中様者割破頭納栝樓瓤子在冬𤓰心内右用黄土泥裹冬𤓰令匀可半指厚候乾簇炭火燒令泥通赤即止去泥取𤓰就熱切碎爛硏布絞取汁約七八合更入白蜜兩匙頭攪令調匀候稍冷即分三度臓腑熱歇即不思水自無小便如不是栝樓熟時莭燒冬𤓰令服人参煎出聖濟總録治痟渇人参一兩葛根剉二兩右為末毎發時須得燖猪湯一升已来入藥末三錢又入蜜二兩同一處扵鐺子内慢火熬之至三合以来似稠黒餳便取出扵新磁器内毎夜飲後取一匙頭含化嚥津重者不過三服硃砂黄連丸出醫方集成治心虚藴熱或因飲酒過多發為痟渇硃砂一兩另研宣連二兩生地黄三兩右為末煉蜜丸如梧桐子大毎服五十丸燈心棗湯下神白散出儒門事親治真隂素被損虚多服金石燥熱之藥或嗜煿炙鹹物遂成痟渇之疾桂府滑石六兩甘草一兩生用右為末毎服三錢温水調下或大渇欲飲冷者以新汲水調䨇補丸出仁存方治渇補養氣血五味子兎絲子酒浸炒右等分為末煉蜜丸如梧桐子大毎服三四十丸空心米湯飲吞下茯神湯一名黄蓍湯治痟渇方見夲門胃熱渇類人参湯出聖濟總録治痟渇初因酒得人参甘草半生半炙各一兩右粗搗篩用燖猪水去滓澄清取五升同煎至二升半去滓渇即飲之永瘥麵餅丸一名神效丸又名神授丸出楊氏家蔵方治痟渇有驗蜜陀僧一兩别研極細川黄連一兩為細末右用蒸餅丸如梧桐子大毎服五丸煎蠒殻茄根湯下卧時服次日加至十丸以後毎日五丸至三十丸止服藥後以見水惡心為度即住服不過五六服必效若覺惡阻毎日食乾物壓之旬日後自定竒甚竒甚蠒空是出蠶蛾子空蠒殻一方為細末毎遇渇時抄一字扵舌上以水下之經驗方陳氏云昔沈德和帥西蜀時得此方偶然其壻章木苦斯疾服之數日頓愈余得扵章屢試有效記得向有一客病此疾宿疾逆旅終夜求水不得偶釜中有湯酌而沃其渇即止旦起視之乃繰蠒湯也近授閬州權軍任忠裕即日而差内金散出經驗良方治痟渇日飲水一石小便不禁雞内金即雞肚内黄菠薐根各等分右為末米飲調服二錢黄連丸一名熱痟丸出十便方治患熱痟渇常服有驗豉心二兩以塩醋拌蒸晒乾如此者三熬㣲黄川黄連三兩右為細末蜜和為丸毎日空腹服二十五丸食後服二十丸取烏梅十顆水二小升煎之數沸取湯下前件丸藥如無烏梅以小麥子二升煮取汁替亦得一方忌猪肉一方用胡黄連治渇小便利復非淋者出千金方榆白皮二斤切右以水一斗煮取五升毎服三合日三又方出千金方薔薇根一把右水煎服之佳肘後方以治睡中遺尿又方出千金方鵲巢三年重者右燒末以飲服之肘後方以治睡中遺尿又方出千金方桃膠右丸如彈子大含之咽津又方出千金方蠟如雞子大右以酢一升煮二沸適寒温頓服之又方出千金方小豆藿一把右搗取汁頓服三升治痟渇熱或心神煩亂出聖恵方黍米泔右用一大盞温服之水火既濟丸出得生堂經驗方治上盛下虚心火炎燥腎水枯竭不能交濟而成渇證此藥主之黄連一斤白茯苓一斤右為細末熬天花粉水作麵糊為丸如梧桐子大毎服五十丸温湯送下不拘時候黄𤓰根丸出聖恵方治痟渇熱或心神煩亂宜服此藥黄𤓰根三兩黄連三兩右為末煉蜜丸如梧桐子大毎服扵食後以温水送下二十丸兎骨飲出仁存方治痟渇羸痩小便不禁兎骨一具㣲炙黄搗碎大麥苗二斤右以水一斗煮取汁五升毎服一小盞日三兩服又宜食兎肉棘枸子散出百一選方治痟渇眉山楊穎臣長七尺健飲啖倜儻人也忽得痟渇疾日飲水數斗食倍常而數溺渇藥服之逾年疾日甚自度必死治棺余嘱其子延良醫張䏙隐之子不記其名為診脉笑曰君㡬誤死取麝香當門子以酒濡之十許丸用棘枸子作湯吞之遂愈問其故張云痟渇痟中皆脾弱腎敗上不莭陽水腎水不上升乃成此疾今穎臣脾脉極熱下腎不衰當由果實與酒過度熱在脾所以飲食過人而多飲水飲水既多不得不多溺非痟渇也麝香能敗酒果𤓰花棘枸亦勝酒屋外有此木屋内醸酒不熟以木為屋屋下亦不成醸故以此二物為藥以去果酒之毒也以其實如雞距别鷄来巢今俗謂之雞距亦謂之癩漢指頭盖取其似也食之如牛乳小兒喜食之夲草木部作枳椇普濟方卷一百七十六
