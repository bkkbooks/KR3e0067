body:
  text: 普濟方卷一百七十六明周王朱橚撰痟渴門總論夫三痟者本起腎虛或食肥美之所發也腎為少隂膀胱為太陽膀胱者津液之府宣行陽氣上蒸入肺流化水液液達五臟調陽養髓其次為脂膚為血肉上餘為涕淚經循五臟百脈餘為小便黃者血之餘也臊者五臟之氣鹹者潤下之味也腰腎冷者陽氣已衰不能蒸上穀氣盡下而為小便隂陽阻隔氣不相榮故陽阻隂而不降隂無陽而不升上下不交故成疾矣夫痟者痟渴痟中痟腎也此由少年服乳石熱藥耽嗜酒肉葷辛熱麵炙煿荒淫色欲不能將理致使津液耗竭元氣受克熱毒積聚于心肺腥羶并傷于胃腑脾中受熱水臟乾枯四體尫羸精神恍惚口苦舌乾日加躁渴飲水多而小便少者痟渴也喫食多而飲水少小便赤黃者痟中也飲水味甘隨飲便下小便而白濁腰腿痟瘦者痟腎也斯皆五臟精液枯竭經絡血澀榮衛不行熱氣留滯遂成斯疾矣渴病有三曰痟渴痟中痟腎痟渴屬心故煩必致心火散漫渴而引飲經云脈軟散者當病痟渴諸脈軟散皆氣實血虛也痟中屬脾脾熱則成為痟中復有三中寒中熱中強中寒中隂勝陽鬱久必為熱中經云脈洪大隂不足陽有餘則為熱中多食數溲為寒中隂狂興盛不交精泄則為強中三痟病至強中危矣痟腎屬腎盛壯之時快情縱欲年長腎衰多服丹石之所致經云腎實則痟不渴而小便自利名曰痟腎亦名內痟痟渴以渴而不利引飲過甚言之痟中以不渴而利熱氣內痟言之痟腎以渴而復利腎燥不能制約言之蓋以上盛下虛心脈多浮腎脈必弱故經云脈洪大隂不足陽有餘則為熱中即痟熱氣上騰心虛受之病屬上焦謂之痟渴熱蓄于中脾虛受之病熱中焦謂之痟中熱伏于下腎虛受之病屬下焦謂之痟腎凡三痟肺痟腎痟可治惟有脾痟不可治肺痟熱在上焦可用涼藥如黃連等皆可用此疾多出于飲酒人冬月盛寒多以䓤椒鳩鴿煮酒或加食熱麵遂得此疾故可用涼藥解之如脾痟則飲食入腹如湯澆雪隨小便出落于溷僻清渠中凝結如脂日可倍食數餐膚腹日益痟瘦用熱藥則熱愈甚用涼藥則愈見虛羸故無治腎痟者渴而多飲水小便白濁肌膚雖日痟瘦然小便不如脾痟之凝結堅硬飲食亦不倍多是腎虛弱心氣渙散所致故可補心腎去煩熱則其疾可愈天地自太虛至黃泉有六位人身自頭至足亦有六位人胸腹之間自肺至腎又有六位故立天之氣曰金與火立地之氣曰土與水立人之氣曰風與火故金火合則熱而清水土合則濕而寒風火合則溫而炎肺最在上為金主燥清心次為君火主熱肝又次之為風主溫膽又次之為相火主極熱又次之為濕土主涼腎又次之黃泉為寒水主寒故肺象天脾腎象地肝膽象人夫土為萬物之夲水為萬物之元水土合德以隂居隂同處乎下以立地萬物根于地是故水土濕寒若燥熱陽實則地之氣不立萬物之根索澤而枝葉為枯由是觀之則五臟六腑四脈百體皆稟受于脾胃行其津液相與濡潤滋養今醫者故以燥熱之劑養脾胃濕土之氣不亦舛乎痟渴夲濕寒之隂氣極衰燥熱之陽氣太甚更服燥熱之藥則脾胃之氣竭矣叔世不分五運六氣之虛實而一槩執熱為實而寒為虛彼但知心火陽熱一氣之虛實而非臟腑六氣之虛實也蓋肺夲清虛則溫心夲熱虛則寒肝夲溫虛則清脾夲濕虛則燥腎夲寒虛則熱假若胃冷虛者乃胃中隂水寒氣濕甚而陽火熱氣衰虛也非胃土溫氣之夲衰故當溫補胃中陽火之衰退其隂水寒氣之甚又如胃熱為實者乃胃中陽火實而隂水虛也故當以寒藥㵼胃中之實火而養其虛水然此皆補㵼胃中虛熱水火所乘之邪非胃為實者之夲也夫補㵼脾胃濕土之夲氣者潤其溫是補燥其溫是㵼土夲濕故也凡臟腑諸氣不必腎水獨當寒心火獨當熱要知每臟諸氣和同宣而平之可也是故水少火多為陽實隂虛而病熱也水多火少為隂實陽虛而病寒也其為治者㵼實補虛以平為其道可矣故治消渴者補腎水之隂虛而㵼心火之陽熱除腸胃燥熱之甚漸使津液生而不枯氣血利而不澀則病日已矣三痟者其燥熱一也但有微甚耳余聞古之方多一方而通治三痟消者以其善消水榖而喜渴也然叔世論痟渴者多不知夲其言痟渴者上實熱而下虛冷上熱故煩渴多飲下寒故小便多出夲因下部腎水虛而不能制其上焦心火故上實熱而下虛冷又曰水數一為物之夲五行之先故腎水者人之夲命之元不可使之衰弱夲不堅則枝葉不茂元氣不固則形體不容痟渴病下部腎水極虛冷者更服寒藥則元氣轉虛而下部腎水轉衰則上焦心火尤甚而難治也但以暖藥補養元氣若下部腎水得實而勝退上焦心火則自然心渴止小便如常而病愈也巧言似是于理實違者也誤已久矣或又謂腎與膀胱屬水虛則不能制火故小便多者愈失之逺矣彼謂水氣實者乃能制火虛則不能制火故隂虛而熱燥其液小便淋而常少隂實陽虛不能制水小便利而常多豈知痟渴小便多者非謂此也蓋燥熱太甚而三焦腸胃之腠理怫鬱結滯緻密塞壅而水液不能滲泄浸潤于外榮養百骸故腸胃之外燥熱太甚雖復多飲于中終不能浸潤于外故渴不止小便多出者知其多飲不能滲泄于腸胃之外故數溲也內經有言心肺氣厥而渴者有言肝痺而渴者有言脾熱而渴者有言腎熱而渴者有言胃與大腸熱結而渴者有言小腸痺熱而渴者有因病瘧而渴者有因肥甘石藥而渴者有因醉􅀈入房而渴者有因逺行勞倦逼而大熱而渴者有因傷害為胃乾而渴者有因病風而渴者雖五臟之部分不同而病之所過各異其為燥熱一也夫有謂心肺氣厥而渴者論曰心于熱移肺傳為隔痟注曰心熱入肺久而傳化內為隔熱痟渴多飲也所謂肝痺而渴者痺論曰肝痺者夜以多驚多飲數小便如脾熱而渴者痿論曰脾氣熱則胃乾而渴肌肉不仁發為肉痿所謂腎熱而渴者刺熱論曰熱病者先腰痛胻酸苦渴數飲身熱熱論曰少隂脈實腎絡于肺繫舌夲故口燥舌乾而渴叔世惟言腎虛不能制心火為上實熱而下虛冷以熱藥溫補腎欲令勝退心火者未眀隂陽虛實之道也夫腎水為隂而夲寒虛則為熱心火屬陽而夲熱虛則為寒若腎隂虛則心火陽實是謂陽實隂虛而上下俱熱眀已故氣厥論曰腎氣衰陽獨宣明五氣論曰腎惡燥由腎枯水涸臟氣時發論曰腎苦燥急食辛以潤之夫寒物屬隂能養水而㵼心熱物屬陽能養火而耗水今腎水既不勝心火則上下俱熱奈何以熱藥養腎水欲令勝心火豈不暗哉又如胃與大腸熱結而渴者隂陽别論二陽結為之痟注曰二陽結胃及大腸俱熱結也腸胃藏熱善痟水榖又氣厥論曰大腸移熱于胃善食而瘦而脈要精微論曰痺成為痟中善食而瘦如脾痺而渴者數飲而不得中氣喘而終時發餐泄夫數飲而不得中其大便必不停留然則痟渴數飲而小便多者止是三焦燥熱怫鬱而氣衰也眀矣豈可以燥熱毒藥助其強以伐衰隂乎此真實實虛虛之罪也夫痟渴者多變聲音瘡癬痤痱之數皆腸胃燥熱怫鬱水液不能浸潤于周身故也或熱而膀胱怫鬱不能滲泄水以妄行而面上腫也如小腸痺熱而渴者舉痛論曰熱氣留于小腸腸中痛痺熱焦渴則便堅不得出矣注曰熱滲津液而小便堅矣如言病瘧而渴者瘧論曰陽實則外熱隂虛則內熱外內皆熱則喘渴故致飲冷也然陽實隂虛而為病熱法當用寒藥養隂㵼陽是謂㵼實補衰之道也如因肥甘石藥而渴者脾病論曰有口乾者病名為何岐伯曰此五衰氣之所病溢名脾痺痺為熱也脾熱則四臟不稟故五氣上因也先溢脾熱故脾痺又經曰五味八口藏于內脾胃為之其精氣津液在脾故令人口甘也此肥美之所發也此人必數食甘美而多肥肥者令人內熱甘者令人中滿故其氣上溢轉而為痟渴通許虛實論曰痟痺仆擊偏枯痰厥滿發迤肥實之人膏粱之疾也或言人惟胃氣為夲脾胃合為表裏脾胃中州當受溫補以調飲食今渴痟者脾胃極虛溢宜溫補若用寒藥耗損脾胃夲氣虛乏而難治也此言乃不眀隂陽寒熱虛實補㵼之道故妄言也豈知腹中論曰帝云夫子數言熱中痟中不可服芳草石藥發癲芳草發狂注言多飲數溲謂之熱中多喜曰癲多怒曰狂芳美味也石謂英乳及發熱之藥經又曰熱中痟中皆富貴人也今禁膏粱是不合其心禁草石藥是病不愈願聞其説岐伯曰芳草之味美石藥之氣悍二者之氣急疾堅致故非緩心和人不可服此二者帝曰何以然岐伯曰夫石氣慓悍熱氣亦然所謂飲一而溲二者當肺氣從水而出也其水榖海竭矣凡痟渴便用熱藥誤人多矣故內經應言渴者皆如是豈不昭晰歟然而猶有惑者諸氣過極反勝己者是以人多誤也如陽極反似隂者是也若不眀標夲為認似是始終乖矣故凡見下部覺冷兩腋如氷此皆心火不降狀類寒水宜加寒藥下之三五次則火降水升寒化則退然而舉世皆同執迷故處其方必眀病之標夲逹藥之所能通氣之所宜治而無害者可以治其病也以所為標夲者先病而為夲後病而為標此為病之本末也標夲相傳先當救其急也又云六氣為夲三隂三陽為標蓋為標病藏病最急也又云六氣為胃之夲假若胃熱者胃為標熱為夲也處其方者當除胃中之熱是治其夲也故六氣乃以甚者為邪病衰者為正法當㵼甚補衰以平為其養正除邪之道也酸能收甘能緩辛能散苦能堅鹹能軟酸屬木也燥金注于散落而木反之溫土主于緩而木勝之故能然也苦能燥濕而堅耎者蓋以凡物燥則堅也甘能緩苦急而散結甘者土也燥能急結故緩則散也辛能散主散結潤燥辛者金也金主散落金生水故也况抑結散則氣液宣行而津液生也臟氣發特論曰腎苦燥急食辛以潤之開腠理致津液通氣也鹹能軟堅鹹者水也水潤而柔故勝火之堅矣此五臟之味也其為五味之夲者淡也淡胃土之味也胃土屬地土者地為萬物之夲胃為一身之夲淡能滲泄利竅夫燥能急結甘而能緩之淡為剛土其能潤燥緩其急結令氣通行而致津液滲泄也故痟渴之人其藥與食皆宜淡齊至真大要論曰辛甘發散為陽酸苦漏泄為隂淡味滲泄為陽五者或散或收或緩或急或燥或潤或堅或軟所以利而行之調其氣也凡三痟者內經所謂腎痟也痟渴等可取生藕汁服之則愈夏月暑毒入心心旺不受邪熱移于肺肺葉焦津液乾好飲水名曰膈痟宜以冷參湯進玉壺丸之類效寒暑之交氣壅不調鼻塞聲重咽乾煩渴二腑癃閉法當洗心滌其熱去而肺經清潤渴自止矣宜用洗心散之類飲酒無度食炎熱過多邪熱蓄積于胃腑多令煩渴當用龍腦飲之類制其脾化其滯導其熱也色欲無莭耗損腎元水火不交火必炎上熏蒸于肺金與火燥渴生飲冷當因其夲宜腎氣八味丸之類若不先固其夲又將何以禦其渴哉診其脈數大者生細小浮者死又沉小者生實牢大者死有病口乾此病何以得之蓋五氣之溢也名曰脾疸夫五味入于口藏于脾為之行其精氣溢在于脾令人口乾此肥美之所發也此人飲不欲食甚者則欲吐下肥人內熱甘者令人中滿故其氣上溢為痟渴也厥隂之為病痟渴氣上衝心中疼熱欲必數食甘美而多肥者令之不肯止養氣法云人睡眼合卧勿張口久成痟渴反失血色凡積久飲酒未有不成痟渴然則太寒凝酒而海不凍眀其酒性酷熱物無以加臠炙鹽鹹之味酒客耽嗜不離其口入腸之後制不由己飲噉無度咀嚼將不擇酸鹹積年長夜酣飲不懈遂使三焦猛熱五臟乾燥木石猶且枯焦在人何能不渴治之安可緩在病者若能如方莭慎旬月可瘳如不愛惜死不旋踵其所慎者有三一飲酒二房室三鹹食及麵能慎此者雖不服藥而自可無他不知此者縱有金丹亦不可救痟渴之人愈與未愈常須慮有大癰也當預備癰藥以防之有人病渴利始發于春經一夏服栝樓斗汁得其力渴漸瘥然小便猶數甚晝夜二十餘行常至三四升極瘥不減二升也轉久便止漸食肥膩日就羸瘦咽喉唇口焦燥呼吸少氣不得多語心煩熱兩腳酸食乃兼倍于常而不為氣力者當知病皆由虛熱所致治法可常服栝樓汁以除熱牛乳杏酪善于補此治最有益痟渴之疾或服五石而致者又有疾久飲酒而致者如解五石毒者飲罌粟粥而能止渴並宜服兔絲圎大渴而加煩熱者栝樓根湯馬通散之數凡病人兼有燥渴之證用烏梅栝樓根乾葛甘草宣補丸凡人生放恣者衆盛壯之時不自慎惜快情縱欲極意房中稍至年長腎氣虛竭百病滋生又年少懼不能房多服食石散真氣既盡石氣孤立日惟虛耗唇口乾燥精液自泄或小便赤黃大便堅實或渴而且利日夜一石或渴而不利所食之物皆作小便此皆由房室不莭之所致也凡平人夏月喜渴者由心熱也心熱便汗汗則腎中虛燥故渴而小便少也冬月不汗故小便多而數也此為平人之證也名為痟渴但小便利而不飲水者腎實也經云腎實則消消者不渴而利是也所以服石之人于小便利也石性歸腎歸腎則實實則能消水漿故利利多則不得潤養五臟五臟衰則生諸病張仲景云熱結中焦則為腎熱結下焦則為溺血亦令人淋閉不通眀知必有患小便利信矣內有熱者則喜渴除熱則止渴熱虛者須除熱補虛則瘥矣痟渴附論夫痟渴者雖為渴而不小便是由少年服五石諸圎經年嵗石勢結于腎中使人下焦虛熱及至年衰血氣減少不復能制于石石勢獨盛則腎為之燥故引水而小便少也其病變者多發癰疽此由滯于血氣留于經絡不能通行血氣壅澀故成膿也診其脈數大者生細小浮者死又沉小者生實大者死病有口甘者名之為何何以得之此氣之溢也名曰脾痺夫五味入于口藏于胃脾之所為行其氣液在于脾令人口甘此肥美之所發此人必數食甘美上溢為痟渴也辨六經渴并治少衛生寶鑑大陽渴脈浮無汗者五苓散滑石之類皆不作效遂至引飲過多兩腳浮腫此證不可以為裏熱蓋腎水不上升心火不降故也須用交感丹為主却以烏梅濃蜜生薑甘草煎湯咽之腎水一升心火一降其渴止腳亦不腫治上焦膏痟而不欲多食小便清利宜小柴胡白虎湯或錢氏地骨皮散加芍藥黃茋石膏黃芩桔梗之類是也若痟渴者倍黃連痟中者倍栝樓腎痟者加芒硝六分服鉛丹丸得小便鹹苦如常後恐虛􅉵者並宜服肉蓯蓉丸足太陽者是膀胱之經也膀胱者是腎之腑也而小便數此為氣盛則消榖大便硬實則為痟渴也宜八味腎氣此主之凡痟渴者經百日以上者不得灸刺恐于瘡上漏膿水不歇遂成癰疽羸瘦而死亦忌有誤傷皮肉若作針孔許大瘡者所飲之水皆于瘡中變成膿水而出不止者必死慎之初得痟渴者可依後方灸刺之為佳孫氏云痟渴者百日外概不許針刺所飲之水皆化為膿水不止者皆死特須慎之又云仍不誤傷皮肉若小有瘡亦能致死今者既得痟渴且未免飲水水入瘡即損人今初得日豈得令其刺致此誤傷之禍輒將未順其理且俟百日以上或能未誤初炙之説故不録灸刺凡炙刺則外脫其氣痟渴皆是虛疾灸刺特不相宜唯腳氣宜即炙之夫內痟之為病當由熱中所致小便多于所飲令人虛極短氣夫內痟者食物皆消作小便也而又不渴正觀十年梓州刺史李文博先服白石英既久忽陽道強盛經月餘漸患渴經數日小便大利日夜百行以來百方治之漸以增劇四體羸惙不能起止精神惚慌口舌焦乾而卒此病雖稀甚可畏也利時脈沉細微弱服枸杞湯即效但不能長愈服鉛丹散亦即減其間將復除熱陽眀渴脈長有汗者白虎涼膈散之類少陽渴脈弦而嘔者小柴胡加栝樓湯太隂渴脈細不欲飲水思湯不思水者四君子理中湯主之少隂渴脈沉自利者豬苓湯三黃湯之類厥隂渴脈微引飲者少少與之滑石治渴夲為竅不利而用之以其燥而能亡津液也天令溫氣太過者當用之是為犯禁假令小便利或渴或不渴內有濕熱也小便自利而渴者內有禁燥也濕宜滲泄之燥則潤澤之可矣維證有汗而渴者以辛潤之無汗而渴者以苦堅之傷寒食少而渴者當以和胃之藥止之不可用涼藥止之恐復損胃氣不能食也白术茯苓即是和胃之藥也大陽無汗而渴者不宜白虎湯若汗後脈洪大而渴者宜與之陽眀有汗而渴者不宜與五苓散若小便不利汗少脈浮而渴者宜與之人病心肺熱而不渴者知不在太陽少隂之夲而只在標也在標則不渴矣是在夲也爛金圓出三因方治熱中痟渴止後將補精血益諸虛解勞倦去骨莭間熱寧心強志安神定魄固臟腑進飲食免生瘡瘍大豬肚一箇黃連三兩蜜生薑各二兩研右先將豬肚淨洗復以蔥麵醋椒等洗烘乾用藥同水酒入銀石器內煮半日漉出黃連洗去蜜酒令盡銼研為細末再酒調成膏入先洗豬肚內縫定入銀石器內水熬爛研為膏搜下項藥人參二兩黃蓍四兩五味子山藥山茱茰杜仲去皮銼薑汁拌炒絲斷石斛車前子鱉甲醋炙熟地黃新蓮肉去皮當歸各三兩槐角子炒白茯苓磁石各一兩煆碎川芎一兩沉香半兩不焙兔絲子五兩酒浸溫研麝香一錢别研入右為末用豬肚膏搜和得所膏少則添熟蜜杵數千下丸如梧桐子大食前溫酒糯米湯任下五十丸一法有白术二兩陽起石一兩蓯蓉丸出三因方治心虛煩悶或外傷暑熱內積愁煩酣飲過多皆致煩渴口乾舌燥引飲無度小便或利或不利蓯蓉酒浸磁石煆碎熟地黃山茱茰桂心山藥炒牛膝酒浸茯苓黃蓍鹽湯浸澤瀉鹿茸去毛塗酥炙逺志去心炒石斛覆盆子五味子蓽撥破故紙炒巴戟酒浸兔絲子酒浸龍骨杜仲去皮銼薑汁製炒斷絲各半兩附子炮去皮臍箇重六錢右為末蜜為丸如梧桐子大每服五十丸空心米湯飲下丹砂散出聖濟總録治三痟病小便頻數皮燥毛焦飲食雖多肌肉痟瘦渴燥引飲丹砂研水飛黃連去鬚鐡粉研栝樓各一兩一分赤石脂蘆薈研龍齒澤瀉各三分胡粉研鉛研各半兩牡蠣煆一分桑螵蛸十個炙雞肶胵五枚蜜炙黃甘草一兩半炙右除别研外搗羅為散再和勻每服二錢用水煎小麥湯調下每日三服白术散出千金方治痟渴隂脈絶胃反而吐食生白术乾地黃生薑各二兩橘皮人參甘草黃蓍逺志各三兩桂心當歸芍藥各三兩大棗三枚右㕮咀先取屋上瓦三十年者碎如雀腦三升東流水二石煮取二斗納藥瓦汁中煮三升分四服或單飲瓦汁亦佳真珠丸出仁存方治心虛煩悶或外傷暑熱內積煩悶酣飲過多皆致煩渴口乾舌燥引飲無度小便或利或不利知母一法一兩一分川黃連去毛一法一兩苦參一法一兩鐡鏵粉一兩一分研元參一法無牡蠣煆一兩一分硃砂别研二兩麥門冬去心天花粉分各半八兩金箔銀箔二百片一法白扁豆煮去皮一兩右為末煉蜜入生栝樓根汁少許丸如梧桐子大用金銀箔為衣每服二十丸先用栝樓根汁下一服次用麥門冬熟水下病退日二服忌煿酒色次投蓯蓉丸補一方有蘆薈二錢半白扁豆二兩炒天花丸出經驗良方治渴通用痟渴數中痟腎病三焦五臟生虛熱唯有膀胱冷似氷嘗思飲水無休歇小便晝夜不停行骨冷皮焦心肺裂夲因飲酒炙煿多四體肌膚淋轉渴莫教便利白如泔口苦咽乾舌如血若如此狀病須危幸遇神仙談妙訣黃連淨三兩童便浸三宿焙白扁豆薑製去皮炒二兩辰砂白茯苓牡蠣粉知母苦參天花粉鐡粉各半兩蘆薈一分金銀箔各二十片右為末取栝樓根生汁和生蜜丸如梧桐子大每服三十丸麥門冬湯送下一方無白茯苓鐡粉丸出聖惠方治痟渴不問年月深淺困篤者宜服此鐡粉二兩研雞肶胵一兩微炒土瓜根一兩苦參三分黃連三分麥門冬一兩去心牡蠣三分燒為粉桑螵蛸三分微炒金箔五十片銀箔五十片栝樓根三分右為末入研了藥更研令勻煉蜜和搗三五百杵丸如梧桐子大每服不計時候以清粥送下三十丸降心湯出直指方治心火上炎腎水不濟煩渴引飲氣血日消人參去蘆逺志取肉薑汁炒當歸去毛川芎熟地去土白茯苓去皮黃蓍蜜炙去蘆五味子去梗甘草微炙各半兩天花粉一兩右銼細每服三錢薑棗煎食前服金英丸出聖濟總録治痟渴鉛丹麥門冬去心焙牡蠣煨研如粉知母焙各一兩黃連去皮鬚栝樓根苦參各二兩金箔一百片生栝樓二兩研如膏銀箔一百片右搗羅為末用生栝樓根和為丸如梧桐子大每服四十丸食後米湯飲下日夜再當服渴止十日已來漸覺減即日兩服服三十五丸一月外每日一服服三十丸夏月即用蜜為丸服藥之次腹中忽冷痛即取厚朴二兩去粗皮薑汁炙陳橘皮三分去白焙生薑二兩切水二升煎取半升去滓分溫二服食久以飯壓之如腹中不痛即止梅花取香湯出得生堂方又名斬龍劊子手消渴飲水至石斗病極者可服之即瘥天花粉烏梅肉人參乾葛枇杷葉黃蓍栝樓子麥門冬五味子各一兩檀香五錢右為細末隨意不時水調服之豬肚丸出千金方治諸渴疾川黃連五兩淨白乾葛知母茯神麥門冬去心大熟地洗焙各二兩栝樓根粟米各一兩人參半兩右木臼中同搗為散入淨豬肚內縫密置甑內蒸極爛乘熱再杵細若硬加少蜜為丸如梧桐子大蒸汁下五十丸或粥飲下麥門冬散出聖惠方治痟渴體熱煩悶頭痛不能食麥門冬二兩去心茅根二兩銼栝樓二兩蘆薈石膏二兩甘草一兩微炙赤銼右為散每服四錢以水一中盞入小麥一百粒煎至六分去滓不計早晚時候溫服鐡粉散出聖惠方治痟渴不止心神煩亂宜服此鐡粉一兩細研麥門冬二兩去心焙牡蠣一兩研為粉知母一兩黃連二兩去鬚苦參二兩銼栝樓根二兩金箔一百片細研銀箔二百片細研右件藥搗細羅為散入鐡粉等同研令勻每服不計時候以清粥飲調下一錢鉛丹散一名胡粉散治痟渴不止小便數兼痟中心神悶煩頭痛出千金方鉛丹胡粉各二兩甘草栝樓根各十分澤㵼白石脂肘後作貝母石膏赤石脂各五分右為細末每服一錢用米湯調熱水調亦可量人羸壯服之食後臨卧如肚疼以漿水調或作丸一年病者一日愈二年病者二日愈渴甚者夜二服腹痛者減之丸服亦佳每服十丸備急方云不宜酒不用麥汁下之古今録驗云服此藥了經三兩日宜爛煮羊肚腹服之或作羹亦得宜湯淡食之候小便數鹹苦即宜服蓯蓉丸兼煮散將息亦治渴利患十年者菝葜調下童子桑白皮湯出三因方治三痟渴病或飲多利少或不飲自利肌膚瘦削四肢倦怠常服補虛止渴利渴有三痟渴屬心內積煩愁心火炎上與暑熱或飲食相挺而動痟者屬脾有隂勝陽致成寒中者有隂不勝陽成熱中者有狂隂興盛不交精泄成強中者痟腎屬腎少不謹惜壯乃腎衰多服丹石以致發唇焦咽竭精益自泄不飲而利亦曰內痟病亦危矣童根桑白皮即新種者去粗皮晒乾不焙茯苓人參麥門冬去心乾葛乾山藥桂心各一兩甘草半兩生用右銼散水一盞半煎至七分去滓溫服麥門冬煎出三因方治諸渴病麥門冬去心人參黃蓍各二兩白茯苓山茱茰山藥桂心各一兩半黑豆三分煮去皮别研右為末地黃自然汁二碗牛乳二盞熬為膏丸如梧桐子大大麥煮飲下五十丸縮氷丸出楊氏家藏方治痟渴甘遂半兩用麩炒透裏黃褐色黃連去鬚一兩右為細末水浸蒸餅為丸如菉豆大每服二丸薄荷湯送下不拘時候忌甘草三日八味腎氣丸一名八味丸出三因方治痟渴小便多以飲水一斗利小便反倍亦主婦人病飲食如故煩熱不得卧而反倚息者如胞轉不得溺也以胞系反戾故致此病但利小便則愈乾熟地半斤山藥四兩茯苓牡丹皮附子桂心各三兩澤㵼四兩山茱茰五兩右為細末煉蜜丸如梧桐子大酒送下二三十丸忌豬肉冷水蕪荑胡荽千金地黃丸亦佳仲景云常服去附子加五味子桃公云加五味子三兩蓯蓉四兩張文云五味子蓯蓉各四兩肘後方云地黃四兩附子澤㵼各一兩餘各二兩先服八味腎氣丸訖後服此藥壓之黃連蜀者二十分苦參粉乾地黃知母各十分牡蠣煆八分吳麥門冬去心十二分栝樓七分右為細末搗篩牛乳和為丸如梧桐子大併手作丸曝乾油袋盛用漿水或牛乳下日再服二十丸一方服十五丸患重者渴瘥後更服一年以來此病特慎麞鹿肉須慎酒炙肉鹹物喫素餅五日一頓細切精羊肉勿著脂胞凡喫羊肉須著桑根白皮食一方云瘥後須服此丸一載以上即永絶根源此病特忌房室熱麵并乾補一切熱肉粳米飯李子等若覺渴熱加至二十五丸亦得定後還依前減其方神效無比餘並準前十方忌豬肉蕪荑家寶方大救生丸一名豬肚丸出三因方治理三痟渴病日夜飲水百杯不歇若飲酒則渴愈甚者専心服餌之數日後見酒與水若仇頓爾口中津潤小便縮減五日後小便赤色是病毒歸于下也或令人吐或腰背腳膝疼痛或嘔逆惡心精神昏困此乃藥驗使病毒消散也或有不傳于下者主生子母瘡或生于背或生發鬢間五漏瘡並能致命俱服此藥至八九服其病自除患人大忌酒色熱麵鹹物豚魚䓤蒜炙煿等物一百日病根永除三焦之疾自風毒酒色所傷于上焦久則其病變為小便頻數其色如濃油上有浮膜味甘甜如蜜淹浸之久諸蟲聚食是惡候也此名痟渴中焦得此病謂之脾痟喫食倍常往往加三兩倍只好飲冷入口甚美早夜小便頻數腰膝無力小便如泔日漸瘦弱此名痟中也下焦得此病謂之痟腎腎宫日耗飲不多喫食漸少腰腳細瘦遺泄散盡手足久如柴形其疾已牢矣庸醫不識義理呼為癆疾或云下冷日久不見其痊病之久或變為水腫或發背瘡或足膝發為惡瘡至死不救牡蠣生用苦參生為末栝樓生搗知母生為末蜜陀僧生用各一兩白蠟鎔研水銀研八分黃丹半斤研右為末男子患用未生子牡豬肚女人患用獖豬肚一箇貯藥以線縫合用繩子繫在新瓦磚上不令走轉更用栝樓根半斤細切入在水中一處和磗煮早辰至午取豬肚細切與諸藥末杵丸梧桐子大隂乾空心米飲下三十丸日三服家藏方用黑鉛與水銀結砂不用蠟一方有天花粉半兩一方有灰坯無蜜陀僧參蓍湯出危氏方治痟渴人參去蘆桔梗去蘆天花粉甘草各一兩綿黃蓍鹽湯浸炙白芍藥各三兩白茯苓去皮北五味子各一兩半右銼散每服四大錢水盞半煎八分日進四服留滓合煎一方有木瓜乾葛烏梅三味豬肚兒丸一名黃連豬肚丸出如宜方治痟渴豬肚一具治如倉方黃連梁米各五兩栝樓根白茯苓各四兩知母二兩麥門冬二兩右為末納豬肚中縫好安甑中蒸極爛乘熱入藥木臼中搗可丸若硬加蜜和丸如梧桐子大每服三十丸日二加至五十丸渴即服一方加人參熟地黃乾葛直指方用雄豬肚黃蓍湯出直指方治痟渴黃蓍茯神栝樓根麥門冬去心各一兩北五味甘草炙各半兩生乾地黃一兩半右銼細每服四錢新水煎服澄源丹出三因方治氣實血虛熱在上焦心煩燥渴引飲無度小便數晝夜乃至一二十行有麩片狀者此疾多得之飲啖炙煿日就羸瘦咽喉唇口焦燥呼吸少氣不能多語兩腳痠食倍于常不為氣力牡蠣粉苦參蜜陀僧知母水銀以白爉半錢結砂五味各一兩栝樓根一兩半黃丹一兩與水銀同研右為末男用牡豬肚一箇女人用雌豬肚一箇入藥在內以線縫定用繩縛在新磚别用生栝樓半斤切碎同煮早辰至午時取藥出不用栝樓根只爛研豬肚和藥為丸如梧桐子大每服三十粒食前米湯下日三服十日可去病根麥門冬湯治痟渴生麥門冬去心苧根切小麥各二升蘆薈切栝蔞生薑各五錢石膏研六分右水二斗煮取六升去滓每服一升渴時任意飲未瘥更作取利茯苓湯出千金方治痟渴隂脈絶胃反而吐食者茯苓八兩澤㵼四兩白术生薑桂心各三兩甘草一兩右㕮咀水一斗煮小麥三升取汁三升去麥下藥煮取二升半每服二合日再六神湯出仁存方治三痟渴疾蓮房乾葛枇杷葉去毛甘草炙栝樓根黃耆各等分右銼為散每服四錢水一盞煎至七分去滓溫服小便不利加茯苓天花散出直指方治痟渴天花粉生乾地黃洗各一兩乾葛麥門冬去心北五味子各半兩甘草二分右為粗末每服三錢粳米百粒同煎服殊勝散一名硃砂散出衛生家寶方治痟渴海浮石烏賊魚骨去甲丹砂研水飛虎杖燒過各一兩右為末渴時煎麥門冬調下二錢日午空心及夜卧時各進一服忌酒色濕麵油煎生冷鮓醬一方有人參無葛根桃紅散出聖濟總録治痟渴赤石脂石膏各研栝樓根銼白赤脂鉛丹各一兩甘草炙半兩右為細散冷水調下二錢黃連丸治痟渴療中焦熱渴苦參一大斤黃連七分栝樓知母牡蠣粉麥門冬去心各五兩右搗篩攪使勻以牛乳和併手捻丸如梧桐子大曝乾日再服飽食訖以漿水下之服二十丸如微利減十丸如食熱麵酒等即加服五丸忌豬肉六物丸出聖惠方治痟渴熱中加減栝樓根八分麥門冬去心六分知母五分人參苦參粉土瓜根各四分右為末牛膽和為丸如梧子大每服二十丸日三服麥粥汁下未知稍加至三十丸咽乾者加麥門冬舌乾加知毋脅下滿加人參小便數加土瓜根隨患加之各一分易老門冬飲子出拔粹方治老弱虛人大渴人參枸杞白茯苓甘草各三兩五味子半兩麥門冬去心五錢右㕮咀每服一兩一錢水一盞半生薑三片煎至七分去滓溫服不拘時瓜蔞散出危氏方治盛壯之時不自謹惜恣情縱欲年長腎氣虛弱因不能房事多服丹石真氣既孤舌唇乾焦發渴精液泄小便赤黃大便乾實小便晝夜百十行須當除熱補虛白茯苓去皮天花粉宣連白扁豆人參去皮石膏甘草莭寒水石白术去皮豬苓各等分右為末每服二錢熱湯調服立效栝樓根散出千金方治痟渴栝樓根麥門冬鉛丹各八分茯苓一作茯神甘草各六分右為細末漿水服方寸匕日三外臺方無茯苓烏梅木瓜湯出三因方治食過度中焦藴熱煩渴枯燥小便併多遂成痟中兼治瘴渴所謂瘴渴者北人往南方受瘴多有此疾木瓜乾烏梅打破不去仁麥蘖炒甘草草果去皮各半兩右銼散每服四大錢水盞半薑五片煎七分去滓不拘時服烏梅五味湯出聖惠方治痟渴生津液五味子巴戟酒浸去心百藥煎烏梅甘草各等分右㕮咀每服四錢水一盞空心煎服茯苓丸出聖惠方治三痟渴疾果有效五倍子去瓤四兩蓮肉一兩龍腦一兩半煆左顧牡蠣煆二兩右用茯苓二兩為末煮糊丸如梧桐子大每服五十丸空心鹽湯下仍兼服靈砂黑錫黃連牛乳丸出聖濟總録治痟渴黃連去鬚一斤為末麥門冬去心二兩研爛牛乳地黃汁葛根汁並一合右合研衆手丸如梧桐子大每服二十丸空心粥飲下日漸再加至四十丸麥門冬散出聖惠方治痟渴不止宜服此黃連一兩炒令紫色栝樓根一兩麥門冬一兩去心焙甘草一兩炙微赤銼赤茯苓右為散入黃丹研令勻每服不計時候以溫水調下一盞人參散出聖惠方治痟渴鉛霜半兩細研黃連半兩去鬚栝樓根半兩人參半兩去蘆頭黃丹半兩炒令紫色右為散入研了藥令勻不計時候以溫水半盞下栝樓丸治痟渴四肢煩熱口乾心燥宜服此栝樓根三兩麥門冬二兩去心焙苦參三兩分焙銼人參三分去蘆頭知母三分右為末用牛膽汁和丸如小豆大不計時候清粥飲下二十丸銀寶丸一名澄源丹治痟渴方在夲類豬脊湯出三因方治三痟渴疾大棗四十枚去皮核新蓮肉四十粒去心西木香一錢半甘草二兩炙右用雄豬脊骨一尺二寸同煎藥用水五碗于銀器煮去肉骨濾滓取汁一碗空心任意呷服忌生冷鹽等物以滓減去甘草一半焙乾為末米湯調服不以時人參散一名參梅出百一選方治痟渴牛鼻木二箇洗淨細銼男患用雌女患用雄甘草人參各半兩白梅大者十箇右用水四碗煎至三碗濾去滓熱服為妙化水丹出濟生拔粹治手足少隂渴飲不止或心疼痛者及消化水飲川烏頭大者四箇炮去皮臍甘草炙三兩牡蠣三兩生用蛤粉六兩用厚者炮右為細末醋浸蒸餅少糊為丸如梧桐子大每服十丸十五丸心痛者醋湯下其疾立愈黃連膏出濟生拔粹治痟渴病黃連末一斤生地黃自然汁白蓮花藕汁各一斤牛乳一斤右將汁熬成膏子搗黃連末為丸桐子大每服二十丸少呷溫水送下進十服渴病立止元骨飲出聖濟總録治痟渴豬脊骨五寸棗二十枚劈碎甘草微炙銼乾薑炮各半分右㕮咀水三升同煎至二升若發時量意加熱水服生地黃膏出危氏方治渴證通用生地黃束如常碗大一碗冬蜜一碗人參半兩白茯苓去皮一兩右將地黃洗切研細新水一碗調開同蜜煎至半次入參茯苓末拌和磁器密封匙挑服清脾湯出如宜方治煩渴飲水小便赤黃蓍白芷升麻人參甘草炙半夏製各半分右㕮咀每服四錢薑五片棗二枚煎食後服豬苓散此即五苓散治痟渴脈浮小便不利微熱者及病欲水而復吐之為水逆冬時寒栗如瘧狀豬苓白术茯苓各三分澤㵼五分桂心二分右細搗篩水服方寸匕日三多飲暖水汗出即愈滑石散出聖惠方治痟渴喫水漸多小便澀少皮膚乾燥心神煩熱宜服此蜜陀僧半兩研黃連半兩去鬚滑石半兩細研栝樓根半兩右為細末入研了藥不計時候用清粥飲調下一錢黃連散出聖惠方治渴潤肺心黃連三兩淨為末生地黃汁三分生栝樓汁三合牛乳三合右用三味汁相和每服三合不計時候調下黃連末一錢三黃丸出千金方治男子五勞七傷痟渴不生肌肉婦人帶下手足寒熱者治丹石毒及熱渴以意測度須大實者方用春三月黃芩四兩大黃三兩黃連四兩夏三月黃芩六兩大黃一兩黃連七兩秋三月黃芩六兩大黃二兩黃連三兩冬三月黃芩三兩大黃五兩黃連二兩右隨時加減搗為末以蜜為丸如大豆大米飲服五丸日二稍加至七丸取下為已服一月病愈久服走逐奔馬常試有驗效一夲云夏三月不服大黃甘草飲子出宣明論治男子婦人一切痟渴不能止者大豆五升先煮三沸淘出苦水再煮大黃一兩半甘草大粗者四兩長四指打碎右用水一桶將前藥同煮三五時如稠糰水少更添煮豆軟盛於盆中俟冷令病人食豆渴食湯汁無時候服食盡如渴止即已不止再煮前藥不三次病悉去矣川黃連丸一名麥門冬丸出直指方治諸渴川黃連淨五兩白天花粉麥門冬去心各三錢半右為末以生地黃汁并牛乳汁夾和搗丸如梧桐子大每服三十丸粳米湯飲下一方無生地黃汁牛乳用麥門冬搗勻為丸食後煎麥門冬湯下硝石散出聖濟總録治三痟渴疾硝石葛根鉛霜各一兩右為細末每服一錢冷水調下澄水飲出聖濟總録治痟渴銀瓶內湯兼鹵水萍焙乾葛根銼各等分右各件粗搗篩每服五錢水一盞半煎至一半去滓溫服鉛黃散出聖惠方治痟渴不止水銀三兩先鎔鉛旋入水銀候鉛面上有花暈上便以鐡匙掠取于乳鉢內研細皂莢一挺不蛀者塗酥炙令黃去皮子入麝香一錢同研為末鉛一斤右為散每抄皂莢末一錢水一中盞煎至六分去滓飲食後調下鉛黃散半錢服之浮石散出夲事方治痟渴浮石舶上青黛各等分麝香少許右為細末每服一錢溫湯調下枳椇子丸出危氏方治飲酒多發積為酷熱蒸薰五臟津液枯燥血泣小便併多肌肉消鑠専嗜冷物寒漿枳椇子二兩麝香一錢右為末麵糊丸如梧桐子大每服三十丸空心鹽湯吞下三神湯出危氏方治證同前烏梅肉逺志去心甘草水煮過却以薑汁拌炒各一兩枳實去瓤一兩夏加黃連五錢春秋冬不用右銼散每服四錢水二盞糯禾根一握煎至七分去滓不拘時候溫服若無糯禾白茅根亦可如無白茅稈繩代之亦可牡蠣散出聖惠方治痟渴潤肺白羊肚一具切熬乾牡蠣三兩燒為粉胡燕窩中草燒灰一兩右為散每服于食後以新汲水調下三錢龍鳯丸出危氏方治痟渴鹿茸火燎去毛一兩酒浸炙山藥兔絲子酒浸各二兩右為末煉蜜丸如梧桐子大每服三十丸食前米飲下濃煎人參湯亦可一方麵糊丸鹽酒湯下名龍肝鳯髓丸浮萍丸出千金方治痟渴乾浮萍栝樓根各等分右為末以人乳汁為丸如梧桐子大空腹飲服三十丸日三三年病者三日愈治虛熱大佳百日還丹出儒門事親治痟渴佛茄子橦栁根各等分右為末枸杞汁和為丸如雞頭大每服丸數加減新水送下烏金散出三因方治熱中多因外傷燥熱內用意傷脾飲啖肥膩熱積胸中致多食數溲小便過于所飲亦有不渴而飲食自消為小便者黃丹炒細墨燒各一兩右研勻每服三錢食後先用水一兩碗潄口待心中熱索水便以冷水調下止渴丸専止渴黃連二兩無名異一兩右為細末用蒸餅打糊為丸菉豆大每服百丸用茄根繭殼煎湯送下薑湯亦得竹龍散出三因方治痟渴五靈脂黑豆生去皮各半兩右為散每服二錢煎冬瓜湯調下無冬瓜即用冬瓜苗葉子煎湯俱可一日二服小渴只一服差渴定後不可服熱藥唯宜服八味丸仍更宜用五味子代附子冬瓜飲一名黃瓜湯出十便良方治痟渴熱盛心神煩亂及飲水小便如脂日夜無度大冬瓜一枚黃連去鬚半斤右先搗黃連為末將冬瓜三停中截去一停取二停淨去瓤子納黃連末于冬瓜中取截下一頭蓋却搜白麵厚裹冬瓜令遍即更以黃土破泥裹一重候微乾坐瓜在炭火中四靣簇炭火燒令泥赤即止候冷打去泥并剝去麵搗開瓜頭裏靣有黃連汁不限多少濾過每服一盞渴即飲之立瘥未瘥更作一服冬瓜皮肉晒乾兼治骨蒸勞及酒黃多年者為散每于食後溫水調下二錢甚效栝樓根出聖濟總録治因好食熱麵炙肉及服補治熱藥并乳石三焦氣隔心肺乾熱口乾舌焦飲水無度小便日夜不知斗數心欲狂亂服此救急止渴栝樓一枚黃熟者去皮用瓤并子冬瓜一枚中樣者割破頭納栝樓瓤子在冬瓜心內右用黃土泥裹冬瓜令勻可半指厚候乾簇炭火燒令泥通赤即止去泥取瓜就熱切碎爛研布絞取汁約七八合更入白蜜兩匙頭攪令調勻候稍冷即分三度臟腑熱歇即不思水自無小便如不是栝樓熟時莭燒冬瓜令服人參煎出聖濟總録治痟渴人參一兩葛根銼二兩右為末每發時須得燖豬湯一升已來入藥末三錢又入蜜二兩同一處于鐺子內慢火熬之至三合以來似稠黑餳便取出于新磁器內每夜飲後取一匙頭含化咽津重者不過三服硃砂黃連丸出醫方集成治心虛藴熱或因飲酒過多發為痟渴硃砂一兩另研宣連二兩生地黃三兩右為末煉蜜丸如梧桐子大每服五十丸燈心棗湯下神白散出儒門事親治真隂素被損虛多服金石燥熱之藥或嗜煿炙鹹物遂成痟渴之疾桂府滑石六兩甘草一兩生用右為末每服三錢溫水調下或大渴欲飲冷者以新汲水調雙補丸出仁存方治渴補養氣血五味子兔絲子酒浸炒右等分為末煉蜜丸如梧桐子大每服三四十丸空心米湯飲吞下茯神湯一名黃蓍湯治痟渴方見夲門胃熱渴類人參湯出聖濟總録治痟渴初因酒得人參甘草半生半炙各一兩右粗搗篩用燖豬水去滓澄清取五升同煎至二升半去滓渴即飲之永瘥麵餅丸一名神效丸又名神授丸出楊氏家藏方治痟渴有驗蜜陀僧一兩别研極細川黃連一兩為細末右用蒸餅丸如梧桐子大每服五丸煎繭殼茄根湯下卧時服次日加至十丸以後每日五丸至三十丸止服藥後以見水惡心為度即住服不過五六服必效若覺惡阻每日食乾物壓之旬日後自定竒甚竒甚繭空是出蠶蛾子空繭殼一方為細末每遇渴時抄一字于舌上以水下之經驗方陳氏云昔沈德和帥西蜀時得此方偶然其壻章木苦斯疾服之數日頓愈余得于章屢試有效記得向有一客病此疾宿疾逆旅終夜求水不得偶釜中有湯酌而沃其渴即止旦起視之乃繅繭湯也近授閬州權軍任忠裕即日而差內金散出經驗良方治痟渴日飲水一石小便不禁雞內金即雞肚內黃菠薐根各等分右為末米飲調服二錢黃連丸一名熱痟丸出十便方治患熱痟渴常服有驗豉心二兩以鹽醋拌蒸晒乾如此者三熬微黃川黃連三兩右為細末蜜和為丸每日空腹服二十五丸食後服二十丸取烏梅十顆水二小升煎之數沸取湯下前件丸藥如無烏梅以小麥子二升煮取汁替亦得一方忌豬肉一方用胡黃連治渴小便利復非淋者出千金方榆白皮二斤切右以水一斗煮取五升每服三合日三又方出千金方薔薇根一把右水煎服之佳肘後方以治睡中遺尿又方出千金方鵲巢三年重者右燒末以飲服之肘後方以治睡中遺尿又方出千金方桃膠右丸如彈子大含之咽津又方出千金方蠟如雞子大右以酢一升煮二沸適寒溫頓服之又方出千金方小豆藿一把右搗取汁頓服三升治痟渴熱或心神煩亂出聖惠方黍米泔右用一大盞溫服之水火既濟丸出得生堂經驗方治上盛下虛心火炎燥腎水枯竭不能交濟而成渴證此藥主之黃連一斤白茯苓一斤右為細末熬天花粉水作麵糊為丸如梧桐子大每服五十丸溫湯送下不拘時候黃瓜根丸出聖惠方治痟渴熱或心神煩亂宜服此藥黃瓜根三兩黃連三兩右為末煉蜜丸如梧桐子大每服于食後以溫水送下二十丸兔骨飲出仁存方治痟渴羸瘦小便不禁兔骨一具微炙黃搗碎大麥苗二斤右以水一斗煮取汁五升每服一小盞日三兩服又宜食兔肉棘枸子散出百一選方治痟渴眉山楊穎臣長七尺健飲啖倜儻人也忽得痟渴疾日飲水數斗食倍常而數溺渴藥服之逾年疾日甚自度必死治棺余囑其子延良醫張醓隱之子不記其名為診脈笑曰君幾誤死取麝香當門子以酒濡之十許丸用棘枸子作湯吞之遂愈問其故張云痟渴痟中皆脾弱腎敗上不莭陽水腎水不上升乃成此疾今穎臣脾脈極熱下腎不衰當由果實與酒過度熱在脾所以飲食過人而多飲水飲水既多不得不多溺非痟渴也麝香能敗酒果瓜花棘枸亦勝酒屋外有此木屋內釀酒不熟以木為屋屋下亦不成釀故以此二物為藥以去果酒之毒也以其實如雞距别雞來巢今俗謂之雞距亦謂之癩漢指頭蓋取其似也食之如牛乳小兒喜食之夲草木部作枳椇普濟方卷一百七十六
