二服升麻湯出聖濟總録治肝虛中風頭痛目眩胷中客熱氣壅五心煩悶升麻一兩半𤣥參地骨皮各一兩前胡一兩半去蘆頭葛根二兩羚羊角屑二兩酸棗仁一兩右粗搗篩每服五錢匕水一盞半煎至八分去滓入竹􅅹半合重煎一兩沸放温食後服如人行五六里更進一服竹􅅹湯出聖惠方治肝中風心神煩熱言語蹇澁少得眠竹􅅹三合荆􅅹二合生薑汁二合白蜜半合葛根汁二合右藥相和令勻每服一合服宜頻服羚羊角散出聖惠方治肝中風筋脉拘急舌强語澁羚羊角屑一兩獨活一兩附子一兩炮裂去皮臍右為末每服三錢水一中盞生薑半分煎五分去滓入竹􅅹半合更煎一二沸温服治肝元風壅侵傷痺氣非時兩肋下鳴當胃脘上疼痛靣多赤色宜喫此方白蒺藜去刺京三稜芫花醋炮炒黒色芍藥木香㯽榔羗活各等分右為細末非時熱湯調下二錢白散子出徳生堂治肝腎虛為風所襲卒中涎潮昏塞不語嘔吐痰沫頭目眩暈上實下虛真陽耗竭兼治隱症傷寒六脉沉絶昏不知人事又治霍亂吐㵼飲食不進及小便淋􅅹不通並及赤口瘡咽喉冷痛一方治痰涎上厥頭疼旋暈四肢逆冷口眼喎斜語言不出牙闗𦂳急如有風涎証皆可服之大附子桂府滑石圓白半夏右為末每服二錢水二盞薑七片蜜半匙煎至七分空心冷服如心燥加辰砂如霍亂加藿香如小便不利加木通燈心茅根煎此藥雖有差互亦無所苦普濟方卷八十九
