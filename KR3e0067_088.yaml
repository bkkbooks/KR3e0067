body:
  text: 普濟方卷八十九明周王朱橚撰諸風門中風秦芁散一名桂心散出聖濟總録治中風汗出不止秦芁去苖土白术桂去粗皮附子炮裂去臍皮石斛各一兩去根右為散每服三錢匕空腹溫酒調下日再葛根湯出聖濟總録治中風因飲酒過節不能言語手足不隨精神恍惚得病一兩日服生葛根長一尺有六寸竹瀝二升生薑乾一合右先取生葛根洗刮去皮土搗研壓取汁葛滓再搗以竹瀝沃復壓取汁盡為度將生薑汁和勻同用厚綿濾過銀石銚內煎三五沸磁器盛不拘時候食前溫服如覺腹內氣轉作聲似痛即食後溫服如此服七日後可服九味附子湯補之治中風靣目相引口偏著耳牙車急舌不得轉方出仁存方獨活三兩竹瀝生地黃汁各一升右合煎取一升頻服之即愈大豆紫湯治中風頭眩惡風自汗吐冷水及産後百病或中風痱疰背強口噤直視煩熱方見風疰類木香羌活散出經驗方治中風頭目昏痛心胸煩悶氣逆痞滯調順榮衛進飲食南木香藁本各三分羌活川芎人參白术炮薏苡仁大檳榔各一兩枳殼去􅂒麩炒白茯苓荆芥穗各半兩右為末每服三錢匕水一盞生薑二片煎至七分去滓稍熱服治中風但腹中切痛出肘後方方見本門風入腹拘急切痛類即食鹽方星附湯出濟生方治因中風痰涎壅塞不省人事脈來沉伏服涼藥不得者附子生去皮南星生去皮各一兩木香不見火半兩一方用沉香右㕮咀每服四錢水一盞半薑九片煎至七分去滓溫服不以時兼寒者用熟附子沉困而手足厥冷者加川烏名三生飲弱甚者加天雄名三建湯痰涎壅塞聲如拽鋸服藥不下宜於關元丹田二穴灸之氣才正人事稍蘇痰下却只用南星八錢木香二錢名星香湯或兼用小續命湯在臨時量輕重治法前方生薑十片煎服解毒雄黃丸一名雄黃救命丹出醫方大成治中風卒然倒撲牙關緊急不省人事并解上焦壅熱痰涎咽喉腫閉一應熱毒方見諸風雜治類夢仙備成丹一名烏龍丹治卒急風中癱瘓口眼喎斜語言不正不省人事一切風證川烏五兩炮微黃色五靈脂取淨二兩半沒藥乳香各一錢右研為末煉蜜丸彈子大每一丸如服藥先以酒一盞薑七片薄荷七葉同煎七分去滓後入溫腦子一匙細嚼藥一粒窨氣少時用前酒送下臨卧服治手足嚲曳言語蹇澀行履不正大川烏五兩去皮臍生用沒藥半兩研五靈脂五兩擇去石右入麝香不拘多少研細拌和滴水丸如彈子大每服一丸生薑汁研化熱酒浸量力服之三建湯出如宜方治中風風涎不省人事附子天雄烏頭各等分生用去皮臍薄切右每藥一兩生薑一兩同水三大盞煎至一盞半去滓溫服人參訶子散治中風涎盛不省人事人參訶子青白者炒去核甘草右件各等分為末每服二錢白沸湯點服如卒中風痰壅不省人事急投此藥神效無比即便省也桂枝湯治中風汗出乾嘔桂甘草炙三兩大棗十二枚擘右切以水五升煮取二升半分三服一方用生薑五兩忌生蔥海藻菘菜三生飲出簡易方治卒中風昏不知人事口眼喎斜半身不遂咽喉作聲痰氣上壅無問外感風寒內傷喜怒或六脈沉伏或脈大浮盛并宜服之兼治痰厥飲厥及氣虛眩暈悉有神效但口開手散眼合遺尿聲如鼾睡者難療方見卒中風類烏龍丸一名錫藥丸治中風肢體麻痺頑疼少力方見偏風類吐痰白礬散出聖濟總録治初中風失音不語昏冒不知人事先宜吐風痰令省覺次可服諸湯散白礬二兩生用生薑一兩連皮擦碎水二升煮取一升二合右先細研白礬為末入濃煎薑湯研濾分三服漸漸灌須臾吐出痰毒眼開風退方可救治若氣衰力弱不宜用猛性藥吐之設吐得痰毒别增疾勢取涎丸出聖濟總録治中風病不語喉中如拽鋸口中沫出藜蘆一分天南星大者一枚去浮皮剜中作坑入醋令八分滿四靣用火逼醋乾黃色銼右為末用麵糊丸如梧桐子每服三丸溫酒下良久吐出涎為效吐不止用冷蔥湯呷即止治中風涎伏在膈上難出者并咽作聲出海上名方藜蘆一兩去皮瓜蒂三七個右為細末每服半錢臘茶清調下吐出風涎為效楊氏神柏散出危氏方治中風不省人事涎潮口噤語言不出手足嚲曳得病之日便進此藥可使風退氣和不成廢人卒有此證無藥去處用之得力柏葉一握去枝蔥白一握同根右研如泥用無灰酒一升同煎一二十沸去滓溫服不拘時如不飲酒須分作四五服服盡方進他藥二聖飲治中風雄黑豆半升皂角針銼半升右用無灰酒二升同煎至半升去柤服汗為度薑附湯出簡易方治中風口噤四肢強直失音不語或卒然暈倒口吐涎沫狀如暗風手足厥冷或復煩躁兼治隂證傷寒大便自利而發熱者及中脘虛寒久積痰水心腹冷痛霍亂轉筋四肢厥逆乾薑熟附子各二兩右㕮咀每服四錢水二盞煎至六分去滓溫服若其人未蘇蘇則先用三生飲方中治法後方服此或慮此藥大燥即以附子理中湯相繼服餌薑湯本治傷寒經下之後又復發汗內外俱虛身無太熱晝日煩躁夜即安靜不嘔不渴六脈沉伏一方附子生用名白通湯治傷寒發熱大便自利一方用白通湯倍加白术甘草減半名生附白术湯治中風濕昏悶恍惚腹痛身重手足緩縱津津自汗失音不語便利不禁一方用薑附湯加麻黃白术甘草人參等分名附子麻黃湯治中寒濕昏暈緩弱腰背強急口眼喎斜語聲混濁心腹腫脹氣上喘急不能動轉已上證候各宜詳審用之淡寮方云千金方治卒中風痰塞壅生薑八兩附子減半並用生者同陳氏三因方用等分炮熟薑附王氏因之改乾薑為生薑附子用熟者然既知其未穩當從古方可也乃持兩端以嘗試未為切當其云治中寒口禁與隂證傷寒下利不渴手足逆冷小便反利汗出過多脈微欲絶此氣脫證兼服炮薑炮附子亦未為過今中寒昏倒口吐痰沫而遽服熟附烏知寒邪不因補而盛耶當先以生薑附與之或未效徐投以半生半熟者人或虛甚然後以熟薑附未晚也是雖陳氏不審之故而王氏不能發明之安得不任其咎木香湯治丈夫婦人中風氣痺其疾作之初切不可以治風瞑昡之藥與服若大段有痰即略與不損氣者下涎藥方定如手足緩弱不遂即便與此藥服方見風癱緩類蘇青丸和氣血散風痰亦可常服右以蘇合香丸與青州白丸子打和薑蘇湯化下桂心丸出十便良方治中風雖能舉動尚口眼不正右用桂一兩碾為細末每用半兩好酒一盞煎藥成膏塗尚不喎處次用紙或軟帛子貼蓋定取新瓦二片火上頻換炙令熱尉貼藥上候才覺口正便速去藥用溫湯洗之如左喎拓右右喎拓左一方以酒煮汁蘸拓病上一方治舌強不語以桂末著舌下漸漸咽汁水漿嗽去涎沫一方治中風失音用水煎服之復取汁亦可旋覆丸治中風不省人事涎潮口禁語言不出手足嚲曳得病之日便進此藥可使風退氣和不成廢人卒有此證無藥處用之得效又治中風及壅滯用旋覆花即金沸草淨洗為末蜜丸如梧桐子大夜卧茶湯下五丸至七丸治風涎暴作氣塞倒卧用瓜蒂約半寸許暴極乾不限多少為細末量疾每用一二錢以膩粉一錢匕水半合同調勻灌之良久涎自出或覺有涎用諸藥行化不下但如此服即出或服藥良久涎未出含沙糖一塊下咽即涎出此物甚不損人治中風不省人事牙關緊急者用藜蘆一兩去蘆頭濃煎防風湯浴過焙乾碎切炒微褐色為末每服半錢溫水調下以吐出涎為效如人行三里未吐再服治中風心肺風熱手足不遂及風痺不仁筋脈散緩恍惚煩躁用熊肉一斤切如常法酒調和作腌臘空腹服之治筋骨急強中風方見本門中風百節疼痛類治中風取杏仁去皮熬令赤和桂末研如泥綿褁如指大含之活鼠方治項強身中急痛者取活鼠破其腹去五臟就熱傅之即可一方治中卒風腰脊反張牙關口禁四肢強直用鼠一頭和尾燒灰為末以臘月豬脂傅之又方療患風疾數年不效者朱真人治風坑湯野人間話朱真人靈驗篇云有病者患風疾數年不效風科集驗方掘坑令患者解衣坐於坑內遂以熱湯上淋之良久復以簟蓋之瘥敗龜散治中風賊風麻痺風疾龜卜師處鑽了者以酥塗炙搗羅細末酒下二錢用雞卵和豆淋酒服之一方治中風手足顫掉嚲曳者為末以飯為丸每服二十丸溫酒下治中風立有竒效出聖惠方用木天蓼一斤去皮細銼以生絹袋盛好酒一斗浸之春夏一七日秋冬二七日後開每空心日午初夜各溫飲一盞老幼臨時加減若常服日只每朝一盞破棺散出經驗良方治中風牙已緊無門下藥方見本門卒中風類名開關散治三十六種風方見本門諸風雜治類即馬齒膏出本草荆瀝湯出指南方治中風虛熱狂言恍惚驚悸牛黃三分别研人參麥門冬去心各二兩升麻鐵精各一兩龍齒茯苓天門冬去心梔子仁各二兩右除牛黃鐵精外餘藥為末每五錢水二盞入竹􅅹荆􅅹各一合煎一盞去滓入牛黃鐵精二樣訖再煎一兩沸溫服瀉青丸出保命集治中風自汗昏冒發熱不惡寒不能安卧此是風熱煩躁當歸龍膽川芎梔子羌活大黃防風各等分右為細末煉蜜為丸如彈子大每服一丸竹葉湯下五珍丹出楊氏家藏方治男子婦人中風涎潮不語牙關緊急半身不遂口眼喎斜天南星炮白殭蠶炒去絲嘴川烏頭炮去皮臍半夏切片了湯浸七遍蠍稍用糯米一合炒黃黑色㨂去米不用已上五味各一兩右件為細末醋煮麵糊為丸每一兩作十五丸每服一丸用生薑自然汁化下不拘時候川芎散出朱氏集驗方治中風中氣先服此藥川芎人參枳殼各一兩沉香香附子各二錢木香一兩右為細末每服三錢以沸湯入鹽點灌之治中風手足偏痺筋縮急腳膝痿瘁不能行步余居士選竒方牛膝川當歸防風芍藥五加皮生薑各六兩羌活乾葛桂心各八分甘草四分薏苡仁十二分右銼為末作七貼每一貼水一升棗子二枚同煎至六合無時服大省風湯出楊氏家藏方附子吳未一兩肉果一方使丁香天南星防風各半兩藿香一分右為飲片每服三錢生薑五片煎去滓服常服以防天隂雨作硃砂丸治中風涎停留胸上令吐生薄荷豬牙皂角二味研碎各二兩以水一升搓令如草葉絞取汁用銀器中熬成膏瓜蒂一兩半藜蘆去苖半兩為末硃砂半兩研右將三味研勻用前膏子和丸雞頭大每服二丸溫酒吞下口噤者用物幹開口灌之得藥下立吐為佳治中風論如是病人無汗者方可用麻黃表之夫中風者蓋五臟俱虛乃得是病醫者不治其本先以治風藥如續命湯排風湯之類投之間有見牙關急緊便下靈寶至寶硃砂牛黃之屬以搐鼻吐涎無不極至有一於此不復得為全人矣蓋續命排風湯中有杏仁麻黃之類若投一劑一表而虛必為左癱右瘓之人矣良由真氣乘虛應表而出筋脈乾枯也大凡治風之藥往往性涼未宜遂服若醫者察證辨脈的知是中風之候亦有痰厥類中風者宜先服生附子湯加黑豆三十粒煎得痰涎不作口眼端正能辨人事然後以术附湯加木香煎服間服六味順氣散月餘候補正氣血脈息稍勻尚有風痰餘證然後服續命排風湯以驅逐之以此救療百無一失中風甚不難治蓋內外之證分明唯在醫者謹其始耳或初得疾便有熱證亦須開關調氣化涎消滯未宜遽用太熱之藥更在詳審之也安樂後須宜清居絶欲若更能不食毒物則必保天年矣如欲調氣化涎宜先服六味順氣散六味順氣散出衛生寶鑑方白术五兩微炒黃白茯苓二兩人參二兩陳皮三兩半去白麩炒青皮二兩去白甘草二兩炮再麩炒右為細末每服三大錢水一盞半棗子一枚薑二片煎至七分溫服日三四服羌桂湯治中風有汗及一切風壅加倍桂枝極佳川羌活二兩銼桂枝一兩銼芍藥五兩銼甘草一兩半炙右為粗散每服四錢水一盞半生薑五片棗二枚同煎七分去滓溫服日三服不拘時候治男子婦人雞爪風等疾手口動搖不能舉物服兩料全安方見本門諸風雜治類川芎散犀角升麻湯出衛生寶鑑治中風麻痺不仁鼻額間痛唇口頰車髮際皆痛不可開口雖言語飲食亦相妨左額頰上如以手觸之則痛此乃足陽明經受風毒血微滯而不行故也犀角一兩二錢半升麻一兩防風羌活各七錢川芎白附子黃芩各半兩白芷半兩甘草二錢半右為細末每服五錢水二盞煎至一盞去滓溫服食後日三服足陽明胃也經云腸胃為市如市㕓無所不有也六經之中血氣俱多腐熟飲食故飲食之毒聚於腸胃故此方以犀角為主解飲食之毒也陽明經絡環唇挾口起於鼻交額中循頰車上耳前過客主人循髮際至額顱故王公所患此一經絡也以升麻佐之餘藥皆滌除風熱黃芩升麻專入胃經為使也稀涎散出聖驗良方治風涎不下喉中作聲狀如牽鋸半夏大者十四枚生切片豬牙皂角一條炙右作一服水二盞煎一盞去滓入薑汁少許溫服不能咽徐徐灌之奪命通關散出衛生寶鑑治中風涎上不省人事躑躅花川芎華隂細辛龍腦右四味等分日乾碾為末用少許以筆管吹入鼻中如噴嚏乃可救急將生附子一枚須重一兩以上者去皮薄切入厚朴切連皮老生薑十大片水一碗半同煎至半碗通口灌服小續命湯出淡寮方治八風五痺痿厥等證麻黃去節人參去蘆黃芩芍藥甘草炙川芎防己杏仁去皮尖炒官桂各一兩防風一兩半附子炮去皮半兩本草序列云有人腳生瘡出外中風頭面暴腫紫黑色多睡耳輪上有浮胞小瘡黃汁出不止乃即與小續命湯倍加羌活服之而愈歌曰中風氣逆有痰涎蘇合薑調唯下咽次用省風小續命多增木麝二香煎往往中風之證多因喜怒不常或飲食停滯或怒氣傷神思慮過多損於心臟用局方蘇合香丸三丸生薑自然汁化開灌下咽喉次用局方省風湯小續命湯各加麝香木香依法煎服一方無麝香衛生寶鑑附子酒出三因方治中風冷痰癖脹滿諸痺大附子一枚去皮臍切作四片右用醇酒一升春浸五日夏三日秋冬七日每服一合日二三服以痺住為效未知再作淡寮方云凡中風一時諸證蜂起則為困篤倉卒之間藥不可入名醫多用蘇合香丸擦起牙關或以生半夏皂角末吹入鼻竅或灌陳霜梅汁收其痰或服真清油調麝香以疏通其氣又或用麝香煎五積散為之兼行要藥倘或不然殆至風氣日增不得安愈凡中風人湯食不下不能咽藥口禁不開即用黑豆二三升以青布緊褁熱醋鍋內蘸稍熱尉病人前後心胸膺脊令風氣散其口自開然後藥易下耳或炒鹽醋或用微熱灰尉皆可稀蘞丸出風科集驗方治中風口眼喎斜時吐涎沫語言蹇澀手足緩弱稀蘞草一名水草生於沃壤間帶豬腥氣者是成訥云江陵府節度使進稀蘞丸方云臣有弟訮年三十一中中風床枕五年百醫不瘥有道人鍾針者因覩此患曰可餌稀蘞丸必愈其藥多生沃壤高三尺許節葉相對其葉當夏五月已來收每去地五寸剪刈以溫水洗泥土摘其葉及枝頭凡九蒸九暴不必大燥但取蒸熟為度仍熬搗為末丸如梧桐子大空心溫酒或米飲下二三十丸服至二千丸所患忽加不得憂慮是藥攻之力服至四千丸必得復故五千丸當復丁壯臣依法修合與欣服果如其言鍾針又言此藥與本草所述功效相異蓋出處盛在江東彼土人呼豬為稀呼臭為蘞氣緣此藥如豬蘞氣故以為名但經蒸暴蘞氣自泯每當服後須喫飯三五匙壓之五月五日採者佳奉宣付醫院詳録治男子女人中風出本草以羊乳和脂作羮食之治中風急喉痺欲死者出本草用白殭蠶以火焙乾令黃色搗篩為末用生薑自然汁調灌喉中效治中風靣目相引偏僻牙車急舌不可轉出本草用桂心以酒煮取汁故布蘸㩉病上正即止左喎㩉右右喎㩉左常用大效瓊田草出本草治中風用瓊草根葉生搗羅蜜為丸服之治三十年風不效者出本草以松葉一斤細切之以酒一斗煮取三升頓服汗出立瘥療暴中風出本草用緊細牛蒡根取時須避風以竹刀或荆刀刮去土用生布拭搗絞取汁一大升和灼然如蜜四大合溫分為兩服每服相去五六里初服得汗汗出便瘥此方得之鄂鄭中丞鄭頃年至潁陽因食一頓熱肉便中暴風外甥盧氏為潁陽尉有此方當時便服得汗隨瘥神效牛蒡根本草名惡實一名鼠粘草治鍍金燒人多患風者出本草須飲酒并食肥豬肉及服鐵漿可禦其毒又方出本草用紅藍子一升搗碎以無灰酒一大升八合拌子暴令乾重搗篩蜜丸如梧桐子空服以酒下四十丸紅藍子乃紅花子也療中風才覺不問輕重便須吐涎然後次第治之用羌活五大兩以水一大升煎取五升去滓更入好酒半升和之以牛蒡子半升炒下篩令極細以前湯酒斟酌調服取吐如已昏眩即灌之更不可用下藥及繆刺灸但服用補治湯餌自瘥葉氏十味銼散出醫方集成治中風血弱臂痛連及筋骨舉動艱難附子三兩炮去皮臍當歸去土洗切黃耆炙白芍藥各二兩川芎不見火防風去蘆白术各一兩半肉桂去粗皮不見火一兩茯苓熟地黃洗淨用少酒蒸令乾焙之各七錢半右㕮咀每服四錢水一盞薑八片棗三枚煎食後臨卧服治中風心煩恍惚或腹中痛滿或時絶而復蘇者出本草取釜下土五升搗末以冷水八升和之取汁盡服之口已禁者強開以筒灌之使得下入便愈甚效神力圓出經效濟世方治手足失力麻痺悶肭打撲風血凝滯走㾏作痛及癱緩等疾乳香沒藥當歸洗淨去蘆頭各半斤草烏好酒浸春夏三日秋冬五日去皮晏木葳靈仙各一兩五靈脂二兩右為末用好酒煮麵糊丸如梧桐子大食後臨卧用溫酒下五丸旋加至七八丸服藥後忌熱物少時亦豫家常用甚效治中風語澀四肢拘急産後婦