body:
  text: 普濟方卷二百八十七明周王朱橚撰癰疽門癰内虛夫癰内虛者榮衛腐為膿血經絡不足則五臟之氣虛之也其證多生虛熱而心神為之驚悸以癰熱不散乘虚而入又心獨惡熱故驚悸不定也方黄茋散出聖惠方治癰内虚不足膿水不絶四肢乏力不能飲食久不瘥必為内漏黄茋剉一兩山茱萸五味子各半兩白茯苓去黒皮三分當歸切焙半兩石斛去根三分逺志去心焙一兩附子炮去皮臍巴㦸天去心肉蓯蓉酒浸切焙麥門冬去心焙熟乾地黄焙各一兩莵絲子酒浸三日焙乾半兩為末人參三分石韋去毛一兩白芍藥三分芎藭半兩甘草炙剉三分右為散每服二錢荆芥湯調下日三四服一方有地􅎃半兩肉蓯蓉散出聖惠方治癰經年不瘥膿血過多補虛乾薑炮半兩巴㦸天去心一兩莵絲子酒浸别搗三分肉蓯蓉酒浸切焙二兩逺志去心人參各一兩甘草炙剉麥門冬去心焙各二兩石韋去毛白芍藥桂去麄皮芎藭各一兩熟乾地黄焙各一兩半山茱萸當歸切焙各二兩五味子二兩附子炮製去皮臍二兩白茯苓去黒皮一兩半右為散每服二錢荆芥湯調下空心食前服一方有地黄三分五香丸出聖惠方治癰膿血至甚不生肌肉内補沉香乳香木香藿香葉丁香續斷各一兩白芍藥一兩熟乾地黄焙二兩附子炮製去皮臍石長生各一兩敗醬人參白茯苓去黒皮各一兩厚朴去粗皮薑汁炙一兩半鹿角屑虎脛骨酥炙黄各二兩薫陸香一兩右為末煉蜜和搗三百杵丸如梧桐子大每服三十丸以白湯下蜀椒散出聖濟總録治癰内虚蜀椒去目并閉口炒出汁半兩熟乾地黄焙白歛防風黄芩去黒心人參桂附子去皮臍焙乾各一兩芎藭甘草炙各一兩赤小豆一合炒令熟右為散每服二錢溫酒調下早晩食前服熟地黄散出聖惠方治癰疽發背發乳大去血膿後内虛少氣熟乾地黄黄茋剉人參去蘆頭各一兩當歸半兩剉碎微炒芎藭二兩白芍藥半兩白茯苓一兩甘草半兩炙微赤剉桂心半兩麥門冬去心續斷各一兩右為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓溫服日三四服之效人參散出聖惠方治癰疽内虛不足人參一兩去蘆頭黄茋二兩剉甘草半兩炙微赤剉當歸白芍藥半兩熟乾地黄二兩白茯苓一兩桂心半兩枸杞子一兩白术一兩右為散每服四錢水一中盞入生薑汁半分棗三枚煎至六分去滓不拘時溫服黄茋散出聖濟總録治癰潰漏血空竭内塞痛黄茋剉芍藥細辛去苗葉瞿麥穗白芷薏苡仁人參附子炮去皮臍熟乾地黄焙各一兩赤小豆二合右為散每服二錢空心溫酒調下晩再服痛甚加芍藥口乾加薏苡仁膿多加黄耆黄耆湯出聖濟總録治癰疽内虚黄耆剉人參甘草炙剉白术逺志去心各半兩芍藥當歸切焙各一兩熟地黄焙白茯苓去黒皮桂去麄皮各三分右麄搗篩每服五錢水一盞半入生薑半分拍碎乾棗三枚劈破同煎至八分去滓空心溫服日晚再服生地黄湯出聖濟總録治癰内虚熱生乾地黄切焙二兩人參一兩芍藥一兩白茯苓去黒皮芎藭一兩當歸切焙二分黄茋剉一兩黄芩去黒心一兩木通剉二分右麄搗篩每服五錢水一中盞半入竹葉七片棗二枚劈破同煎至八分去滓空心溫服日晩再服之排膿生肌散出聖惠方治癰發背膿不止内虚當歸剉微炒黄耆剉各半兩人參一兩去蘆頭芎藭半兩厚朴一兩去皮生薑汁炙香熟防風半兩去蘆頭白芷半兩桔梗半兩去蘆頭甘草半兩炙微赤剉右為細散每服二錢以木香湯調下日三四服癰潰後附論夫癰者由寒氣客於肌肉血氣結聚乃成癰也癰潰之後有逆順其眼白睛青黒而眼小者一逆也服藥而嘔者二逆也傷痛渇甚者三逆也有髆中不便者四逆也音嘶色脫者五逆也此五者並為逆也腸胃受冷而變下利利則腸胃俱虚而冷摶於胃氣則變嘔逆氣若不通遇冷折之則變噦也方黄耆散出聖惠方治癰潰後補虛去客熱黄茋二兩剉知母二兩石膏二兩白芍藥麥門冬去心各一兩甘草半兩炙微赤剉白茯芩桂心川升麻熟乾地黄人參去蘆頭各一兩右為麄散每服四錢水一中盞煎至六分去滓溫服日三四服梔子散出聖惠方治癰已潰後散腫氣梔子仁一兩川大黄二兩黄連去鬚白芨牡礪白歛木通剉川升麻黄芩各一兩右為細散每用以鷄子白調塗故帛上貼腫處燥復易之内塞散療癰疽潰漏血脉空竭黄耆細辛芍藥薏苡仁白芷瞿麥各二兩赤小豆七兩乾地黄人參防風各一兩右先以新成白苦酒置新器中内赤小豆須臾出銅器中熬令燥復須内苦酒中更熬下五丸及止合搗為散酒服方寸匕日夜六七度腹痛甚倍芍藥口未閉倍薏苡仁膿多倍黄茋忌生菜葱蕪等物洗藥猪蹄湯藁本去苗川當歸去蘆杜獨活去蘆􅀢草一方作茴香黄連去鬚薔薇根狼牙草甘草大黄芍藥各二兩右為麄末先用豶猪前蹄一隻煮取濃汁澄去滓肉與上面油花每用藥末半兩蹄汁一椀葱白一根漢椒二十餘粒同煎三五沸去滓熱通手遂洗之黄茋茯苓湯出千金方治癰疽潰後膿大多虚熱黄茋麥門冬各三兩五味子四合芎藭二兩生薑四兩茯苓一兩桂心二兩大棗二十枚右為麄㕮咀以水一斗半煮取四升分六服千金翼有逺志當歸人參各二兩甘草六兩猪蹄湯出經驗方治一切癰疽腫毒消毒氣去惡肉凡瘡有口便用此洗香白芷不見火切生甘草老羌活露蚌房取有兒者黄芩去心赤芍藥去皮川當歸去蘆洗焙各等分右為麄末看疽大小用藥如疽大加料用先將豶猪前蹄兩隻一斤只用白水二升煮軟將汁分為兩次澄去面上油花并下面滓肉每次用藥一兩投於汁中再用文武火煎十數沸去滓以故帛蘸藥湯候温徐徐揩瘡上死肉惡血隨洗而下淨洗訖以故帛挹乾仍避風忌人口氣吹之有狐臭人并現行月經婦人尤不許入病人房洗瘡切勿以手觸看洗疽之方所傳甚多惟此方極神效其用露蚌房極有理蓋以毒去毒也一方無羗活澹寮方無黄芩猪蹄洗湯療癰疽等毒潰爛猪蹄一具治如食法薔薇根一斤甘草五兩炙芍藥五兩白芷五兩右以水二斗煑猪蹄取八升去滓下諸藥味取四升稍稍洗瘡上洗肌散治膿水不乾者以藥夾黄葱洗之青木香白歛㯽榔貫衆荆芥右同煎洗之甚妙白芷摩膏療疽已潰白芷甘草各二分烏頭三分薤白十五挺青竹茹鷄子大一枚右以猪膏一升合煎白芷黄膏成絞去滓塗瘡四邊勿著瘡中白歛湯出聖惠方治癰腫已潰後結强宜搨方白歛黄芩赤芍藥丹參各一兩右藥細剉以水三升煮至一升半以帛浸搨腫上頻頻换之為妙白芷散出聖惠方治癰瘡已潰白芷黄連去鬚地榆剉各一兩右為細散以鷄子白調塗布上貼日三四度換之去水膏出直指方治癰疽破穴後誤入皂角水及諸毒水以致疼痛甘草一分生為末砂糖糯米粉各三分右為膏攤在絹上貼之毒水自出驢馬汗及尿糞一切毒水皆法之治癰瘡潰後爛方出聖惠取陳久醤汁和麺搽瘡上日三易之治癰後流膿不盡或更移結腫松脂封方出聖惠方以松脂蠟等分同溶成汁宻封之久癰附論夫人之肌肉皮膚待血氣以溫養癰久不瘥熱毒未盡風冷乘之客於瘡孔肌不得溫故腫結不消乍瘥乍發名曰久癰不治則變成瘻方五香連翹丸出聖濟總録治諸癰腫熱毒蘊積或久出膿水煩熱疼痛瘡口不合排膿去死血木香一兩半沉香剉人參鷄舌香乳香芍藥𤣥參海藻洗去鹹汁各一兩當歸切焙連翹各一兩半麝香研半兩桂去麄皮大黄剉芒硝研各一兩惡實二兩桃仁去皮尖䨇仁炒黄一兩半右為末煉蜜和丸如梧桐子大每服二十丸至三十丸空心酒下量虚實加減黄耆散出聖惠方治癰久出膿水過多四肢虚羸黄耆一兩剉敗醬三分絡石一兩防風三分去蘆頭漏蘆一兩白歛三分白薇一兩𤣥參三分白茯苓三分白芍藥一兩沉香藿香各三分熟乾地黄一兩甘草半兩炙微赤剉右為麄散每服四錢水一中盞煎至六分去滓溫服日三四服之占斯散出聖惠方治久癰及風毒留積穿穴久出膿水疼痛生肌肉補虚占斯黄耆剉各半兩細辛木香連翹桔梗去蘆頭芎藭甘草炙㣲赤剉白芍藥續斷人參去蘆頭獨活各一兩熟乾地黄半兩右為細散每於食前以粥飲調下二錢木香湯出聖惠方治一切癰疽及乳癰風腫留積疼痛不止或膿水不快久不生肌木香乳香鷄舌香各半兩沉香射干連翹升麻黄耆剉炒獨活去蘆頭木通桑寄生剉甘草炙剉大黄剉炒各三分右麄搗篩每服五錢水一盞半煎至一盞下芒硝五分麝香半字更煎一二沸濾去滓空心溫服不利再服蝟皮散出聖濟總録治一切癰疽諸瘻㧞毒氣生肌肉止膿血蝟皮杜仲剉炒厚朴去粗皮薑汁炙透各一兩續斷地榆藁本去土附子炮去皮臍當歸切焙桂去麄皮各半兩小露蚌房半枚炙右為散每服二錢溫酒調晚再服麥門冬湯一名内補散麥門冬去心焙黄耆炙剉五味子炒白茯苓去黒皮各一兩芎藭桂去粗皮各半兩當歸切焙人參甘草炙各三分逺志去心焙一兩右麄搗篩每服五錢水一盞半入生薑半分拍碎大棗二枚擘開同煎至一盞濾去滓空心温服晚再服生肌膏取瘥殺蟲散出聖惠方治癰疽發背久不瘥白蕪荑藜蘆去蘆頭雌黄細研各一兩麝香一分細研青礬半兩雄黄半兩細研苦參一兩剉附子半兩炮裂去皮臍右為細散與麝香相和研勻每用時先以呉藍甘草煎湯洗瘡口去痂乾日二傳之麥門冬散出聖惠方治久癰膿水出不盡心中煩悶不已麥門冬一兩去心紫葛三分剉木通一兩剉黄耆一兩剉川升麻三分犀角屑三分甘草半兩炙微赤剉右為麄散每服四錢水一中盞煎至六分去滓不拘時温服之白鮮皮湯出聖濟總録治癰疽日月久逺膿水不盡心中煩悶白鮮皮桑根白皮剉𤣥參漏蘆去蘆頭升麻各一兩犀角屑半兩敗醤三分右搗篩每服五錢以水一盞半煎至一盞入芒硝半錢濾去滓空心温服晚再服稍覺瘡痛即去芒硝蟾蜍膏出聖濟總録治一切瘡腫癰疽瘰癧等疾經月不瘥成冷瘻蟾蜍一枚去頭用石硫黄别研乳香别研木香桂去粗皮各半兩露蚌房一枚燒灰用右為末用清油一兩調藥入瓷椀盛於銚子内重煬熬不住手攪令成膏攤絹上貼之候瘡上清水出更換新藥瘡甚者厚攤貼之黄耆湯出聖濟總録治癰疽惡瘡久逺膿水不盡變為瘻黄耆剉炒一兩升麻半兩犀角鎊半兩紫葛木通剉各三分右麄搗篩每服五錢水一中盞半煎至一盞下朴硝半錢濾去滓空心温服取利三兩行為度未利再服如神散出聖濟總録治瘡久不瘥時常痛痒皮縮肉消黄汁膿血不斷天南星炮一枚草烏頭炒一兩礬石煨半兩右為散先入熱湯洗次用散子調生油攤紙上貼之黄連散出聖濟總録治一切癰疽久不瘥黄連去鬚滑石碎各一兩右為散先濃煎甘草湯温洗瘡了拭乾爛嚼胡麻子傅之後乾貼此散日三易良又方出聖濟總録治久癰巴豆五枚去心皮令研細魚脂三兩右先熬脂令沸入巴豆煎攪令勻以瓷盒盛塗傅瘡上日三易又方出聖濟總録巴豆五枚燒灰令細研斑猫五枚燒灰細研右為散𫝊瘡上以綿貼之日一治癰癤潰後膿不斷及諸物刺傷瘡出聖惠方硫黄粉二兩牛筋一片椎碎右以筋内硫黄中以刺瘡孔内取瘥治癰疽瘡久不瘥出聖惠方松脂三兩薫陸香三兩右合搗内少許鹽為餅貼瘡上得汁出盡瘥治久癰塗傅方出聖濟總録用白楊葉乾者一掘為末傅瘡上日二又方出聖恵方用飴糖一分取火溶灌瘡中日三又方出聖濟總録用鶴骨剉半兩為末以猪脂調如糊塗傅瘡上故帛裹之須臾痒發當有蟲出瘥治癰久不瘥用馬齒菜搗汁煎以傅之癰腫貼熁附論凡療暴熱欲成癰腫者所貼熁藥初時熱勢猛盛炎熾難當腫處若有頭即當上貼溫熱膏藥引出其熱毒此乃火就燥之義也四畔赤焮處搗生寒藥貼熁之折伏其熱勢亦如驅逐邪惡撲火之義大生藥勢氣力精全性味雄壮古来療者不本物理皆通草膏已經油煉氣味微欲使尫療者敵其勇夫不亦難矣況癰者壅也要在踈通若初時便令以黏膏貼熁豈得盡於鬱結不成膿乎其中若熱氣不甚或熱已衰即任貼膏藥求瘥凡貼熁腫藥皮厚者以藥塗故軟布着肉貼之腫皮薄者即隔踈紋縠塗藥熁之熁勿令藥在内着肉或慮藥乾即皮隨藥起其所換藥腫皮厚者乾換腫皮薄者宜濕換列諸熁方於後方重臺散出聖惠方治癰疽一切風毒熱腫發背乳癰等疾重臺一兩黄茋一兩剉川大黄一兩生用洋桃根三分剉硝石三分半夏三分白歛三分莽草三分丁香半兩木香半兩沒藥半兩白芷半兩赤芍藥半兩右為細末看患大小醋旋調稀稠得所塗故布或踈絹上日三貼之以腫退為度大黄散出聖惠方治癰瘡不消欲結成瘻川大黄生用黄芩龍骨甘草黄連去鬚當歸剉微炒牡礪白歛白芨赤芍藥赤石脂各一兩右為細末每用猪膽汁調塗於細布上看腫大小貼之燥則易寒水石散出聖惠方治癰疽熱毒疼痛攻焮肌肉赤色虛腫手不可近欲成膿及有膿者四畔赤腫寒水石二兩洋桃根一兩剉硝石一兩木香半兩白歛半兩丁香半兩榆皮半兩剉赤小豆一合漢防己半兩川大黄一兩生用右為細散用頭醋旋調和稀稠得所塗故軟布上貼瘡頭四畔赤焮處候乾即易之其瘡頭别研波斯青黛少許水和時以鳥翎傅之勿令乾燥紫葛散出藥院方治癰腫及發背有赤腫熱痛不可忍紫葛三兩剉川大黄三兩生用白歛二兩𤣥參二兩黄芩二兩升麻二兩榆白皮二兩剉木通一兩赤小豆五合黄連三兩右為細散以新汲水調如麵糊塗於腫上乾即再塗勿令燥𤣥參散出聖惠方熁癰腫毒熱疼痛𤣥參紫葛剉川大黄生用木香卷柏川芒硝黄藥紫檀香各半兩剉右為細散以鷄子白調和稀稠得所薄塗患處有瘡腫已破者去芒硝栁木耳餅出聖惠方治癰疽瘡腫熱焮疼痛栁木耳龍葵根剉各一兩黄連三分去鬚川芒硝一兩麥飯石三分燒醋淬三遍雄雀糞一分乳香一分杏仁一兩其瘡有頭作孔者湯浸去皮尖無孔和皮搗用之右為細散用漿水和揑作餅子如五文錢厚貼瘡頭以單帛蓋之日三易蛇退皮方治癰疽發背未結膿血散腫氣蛇蛻皮二兩燒灰鷄子白三枚芸臺子二兩末赤小豆三合末米醋三合蔓菁子三合末生馬齒莧一握竈中黄土二兩末右都研令爛熟用塗腫上乾即易之大黄散出聖惠方治發癰腫皮剥爛汁流出如火燒熱甚不可耐貼此令消川大黄一兩生用赤小豆一兩牡礪黄連白歛土𤓰根當歸剉微炒各一兩右為細散每以鷄子白調塗故布上貼腫處燥即易之野葛散出聖惠方治癰腫疼痛不止野葛剉川大黄生剉半夏莽草川芒硝白歛各半兩右為細散以豬膽和如膏攤於布上貼腫處乾則易之清水膏出聖惠方治癰疽及一切毒腫堅硬疼痛攻衝四畔焮腫抽熱毒散腫氣羊蹄根剉川大黄生剉黄芩黄蘖菉豆粉各一兩赤小豆一合右為細散用芸臺菜搗汁自然者以蜜少許相和調藥令稀稠得所看四畔腫赤處大小剪生絹攤貼之厚一錢乾即易繁栁乾散出聖恵方治癰未有頭赤腫疼痛宜貼之繁栁乾四兩燒灰川大黄一兩生剉白歛一兩白芷一兩赤小豆二合右為細散以新汲水調如膏塗腫上乾則易之硝石散出聖惠方治癰初結赤腫熱焮急痛熁毒散腫川硝石雄黄細研白芷白礬𤣥參各三分右為細散用生油和蜜調塗痛處乾則易之腫消為度水調膏出聖惠方治癰腫毒熱赤焮疼痛川大黄生用杏仁去皮生研如膏鹽花各三分右為細散入杏仁膏都研令勻以新汲水和令稀稠得所旋取塗腫上乾即易之清凉膏出聖惠方治癰初結腫振焮散毒糯米半升炒令焦黒於地上出火毒甘草二兩生用右為細散看患大小取雪水調塗腫上燥易之貼熁方出聖惠方治癰發背槐子一合慎火草一握右搗爛以水和調塗之又方出聖惠方治癰腫用天靈蓋一枚惟陳者佳炙令微黒為細末以蜜調如麫脂塗腫上亦令内消治已覺有膿未作頭方出聖惠方用木香以醋磨塗之乾即再塗不經數遍當便作頭治癰初發熱毒腫痛方出聖惠方用蔓青子一升為細末以醋和如膏封貼腫上乾再易治癰腫發背貼熁方出聖恵方用菖蒲不限多少濕者搗爛揑作餅子約瘡大小貼之乾則易之如冬月無濕者即取乾者為末用驢乳和搗為餅子用之如不住瘡上以帛縳之又方出聖惠方用搗百合根𫝊之治癰膿不出方出聖惠方用栁根細切封之以布掩燥復易之治癰初結腫及發背方用馬齒莧一斤搗令爛置於銅挲鑼中安於新汲水上候馬齒冷即敷腫上熱即易之當時其腫自消治癰腫未有頭必穴方出聖惠方用搗水芹傅之又方出聖惠方用搗水葒草傅之又方出聖惠方用搗夏枯草傅之又方出聖惠方用搗積雪草傅之又方出聖惠方用搗酸漿葉傅之又方出聖惠方用搗蒼耳傅之又方出聖惠方用搗蓼藍𫝊之又方出聖惠方用搗景天草一名䕶火草𫝊之治癰腫發背貼熁用搗苧蔴根𫝊之諸疽附論夫疽者五臟不調所生也五臟主裏氣行經絡而況若喜怒不測飲食不節隂陽不和則五臟不調榮衛虚者腠理則開寒客經絡之間經絡為寒所折則榮衛稽留於脉榮者血也衛者氣也榮血得寒則澀而不行衛氣從之與寒相摶亦壅遏不通氣者陽也陽氣藴積則生於熱寒熱不散故積聚成疽臟氣沉行主裏故疽腫深厚其上皮强如牛領之皮久則寒勝熱熱氣内盛藴結傷肉也血肉腐壞化而為膿乃至傷骨爛筋不可治初發疽時一粒如麻豆大身體便發熱生疽處肉赤熱腫大而髙多生疼痛破後肉色紅紫此為外發雖大若盆盌如用藥有理百人可百活如初發疽時不拘大小身體無熱自覺倦怠生疽處亦不熱數日之間漸漸開大不腫不髙不疼不痛低陷而壞爛破後肉色紫黒此為内發有此証者未發見之先臟腑已潰爛百人百不救雖有良藥亦付之無可柰何黄帝問曰有疽死者奈何岐伯曰身有五部伏莵一腓二背一云膊三五臟之腧四項五五部有疽死也有緩疽者初結腫形似癰囬囬無頭尾其色不異但痛有根核又與皮相親著外耳一名肉癰其有大者如拳小者如桃李狀積日不消喜變紫色黯黒久即皮肉俱爛如牛領瘡狀遍體通青黯色而不作頭穿潰出膿初作服五香連翹湯鑱去血以小豆薄塗之其間數針鑱去血又薄塗之取消也若不消色不變青黯者以錬石薄之若失時不得療已潰者猶服五香連翹湯及漏蘆湯下之隨熱多少投方也外以升麻湯搨洗之𫝊升麻膏若生臭惡者可以單行一物白䕡茹散傅之青肉去盡便停也好肉既生但傅升麻膏若不生肉單服一物黄耆散也若傅白䕡茹散積日青惡肉不盡者可以漆頭赤皮䕡茹取半錢上和三大錢上白䕡茹散中合和傅之惡肉去盡還以純用白䕡茹散也視好肉欲生可傅黄耆散也黄耆散方白䕡茹散方漆頭䕡茹散方並一味單行隨多少搗篩為散治疽之法灼艾之功勝於用藥縁熱毒中隔上下不通必得毒氣發泄然後觧散古人立論譬諸盗入主人之家必開其門户逐之使去萬一門户閉塞無從而出傷主而後已人不幸而有此疾適處貧困適居僻邑村鄉難得藥材則灼艾尤為利便灼艾之功湏初發一日之内尖頭如麻豆大時便好措手其法用大獨頭蒜薄切如小錢厚亦如大錢貼於疽頂尖上以艾炷安蒜上灸之三壮一易痛者灸至不痛不痛者以痛為度大槩以百壮為凖用大蒜取其毒有力多用艾炷取其火力通透如法灸之瘡一發膿潰繼以神異膏貼之即日而安一能使瘡不開大二肉不壞三口易合一舉而三得之然人未知之而多遲疑未决至二日之後疽大如指毒氣開散病者不能堪火不可灼艾矣可不預知之乎但頭上見疽或頂以上見疽決不可用此法灸灸則反増其疾也疽疾既成先服取毒之藥只用麥飯石膏塗貼五七日之後病漸減退合服川烏丸二烏丸驅餘毒活氣血生肌肉排宿膿去風邪既破之後合服内補十宣散多服為妙大凡疽口𦂳小而硬者盖為風毒所勝合用蚣蝎散糝於神異膏上止於近瘡處參一小錢大不必遍地糝藥疽疾既安之後或未安之際口中乾燥舌上堅硬如鷄内金者非渇之所能比非水之所能潤此乃亦是腎家枯渇而搬運不上致令心火上炎故也此證最惡非惟有疽疾之人見此可慮每見尋常不問男女無疾之人見之亦日危矣諸家方論未嘗載此古人云玉華池竭七朝亡者此也多見庸醫不究其源各立新說自出已見投之丹藥為鎮墜心火以升腎水病家不曉信而服之禍如反手殊不知腎水既竭更投之以丹遂令腎水愈涸古人云脾惡濕腎惡燥非滋潤之藥不能療之所用加減八味丸正合其意外有桑枝煎及五味子湯皆良藥也疽疾將安及七八分便當服加料十全大補湯以補氣血每日當與排膿内補十宣散相間服大凡疽疾多因怒氣而得之若有此疾必多怒但服附子之藥進食寛氣疽之証甚惡多有陷下透者服狗寳丸瘡四邊必起用烏龍膏解毒散訖湏要針刀開瘡口其内已潰爛不復知有痛乃納追毒丹於孔中以速其潰既潰後割去死肌洗以豬蹄湯敷以生肌散覆以乳香膏若證之善者自然腫起紅活乃即如前法方乳香圓出危氏方治發背及一切疽瘡潰爛痛不可忍者當歸川芎交趾桂真菉豆粉川香芷各五錢羗活獨活五靈脂乳香别研沒藥别研各三錢白膠香五錢右為末煉蜜為丸如彈子大每服一丸用薄荷湯嚼下手足損痛不能起者加大草烏一味用木𤓰鹽湯細嚼下漏蘆湯出鮑氏方治疽作後二日服此退毒下膿可與五香連翹湯相間連日服之生黄耆去蘆頭連翹沉香漏蘆有白茸者各一兩生粉草半兩大黄微炒一兩右為細末每服二錢煎薑棗湯調下四虎散治癰疽腫硬厚如牛皮按之痛天南星草烏頭半夏生狼毒各等分右為細末醋蜜調傅留頭出毒氣治疽潰後出千金方以鹽湯洗拭了燒皂莢灰粉上良一方皂角去皮子治瘭疽潰後又方出千金方用梁上塵和車􅤧中脂傅之又方出千金方用生麻油滓綿褁布瘡上蟲出又方出千金方用沸水湯灌瘡中三四遍湯一作餳蕓薹熨散出千金方治疽似癰而小有異膿如小豆汁今日去明日滿者用蕓薹熟搗濕布袋盛之埋熟灰中更互熨之不過再三度安瘥冬月乾者一方將甘草湯洗瘡令净乾以黄栢末塗傅熨了即用以瘥為度又方出千金方用皂莢煎湯洗瘡拭乾以蘖皮為末傅之勿令作痂治疽瘡并治軟癤用多年螺殻燒灰麻油調傅治疽初作方出肘後方用赤小豆為末醋調傅之大薊散出濟生方治飲啖辛熱熱邪傷肺嘔吐出血名曰肺疽大薊根犀角升麻桑白皮蒲黄炒杏仁去皮尖桔根炒各一兩甘草炙半兩右每服四錢以水一盞半薑三片煎七分去滓食後服三灰散出三回方治肺疽血病者因飲啖辛熱熱燥傷肺血得熱則溢因作嘔吐出血一合或半升許名肺疽傷於腑則属胃傷於臟則属肺右以此不可究紅棗和核燒存性百藥煎燒存性各等分右為末每服二錢蜜調成膏軟杮和嚼自效或米湯下亦可治疽潰後出千金方用牛耳中垢傅之良疽發人貼雲母膏痛如刀割不可不審不可不知也亦不得用生肌藥只貼膏藥自然歛合如醫治後時為庸醫藥貼或刀割傷風重者兼以五香連翹湯木香麝香乳香沉香藿香連翹右等分為細末每服二錢水一盞煎至七分放溫服瘡四邊以金箔先用津液次㸃之也五香連翹湯出仁存方治疽作二日後宜與此湯並漏蘆湯相兼連日服之木香沉香丁香去核並不見火各半兩連翹射干升麻黄耆生剉木通乳香桑寄生獨活各三分麝香一錢右為麄末每服三錢水二盞煎至一盞去滓取清汁為度或下惡物未生肉以前服不妨以析毒熱之氣氣盛用大黄竹瀝芒硝恐用藥之後不能斟量是故不載知者當自相度用之治久疽瘡無不瘥方出本草以伊洛水中石蠏形叚不同其黄傅之治黒疽多死宜急治之用王𤓰根一斤搗絞取汁六合頻服當有黄水隨小便出更服之瘥王𤓰根亦名土𤓰根石疽附論夫石疽與石癰之證同此石癰為深以寒客經絡氣血結聚而不得散隱於皮膚之内重按如石故謂之石疽癰疽皆熱氣所作今寒氣為梗故凝結不化其毒内著結硬如石治宜溫其經絡使熱氣得通其毒外泄故能腐熟而發散化膿血而出也方沉香散出聖惠方治石疽腫毒結硬口乾煩熱四肢拘急不得卧沉香防風去义木香各三分地骨皮麥門冬去心焙當歸切焙升麻𤣥參枳殻去瓤麸炒羚羊角屑獨活去蘆頭甘草生剉赤芍藥各一兩大黄剉炒二兩右麄搗篩每服四錢水一盞半煎取七分去滓不拘時温服占斯散出聖惠方治石疽結堅若壞或已成疽者木占斯厚朴去麄皮姜汁炒生乾地黄焙栝蔞乾者去皮敗醤防風去义桔梗炒人參細辛去苗葉各一兩桂去麄皮半兩右為散每服二錢食前温酒送下用搗殻子傅之亦治金瘡地黄煎出聖濟總録治石疽堅硬不消用生地黄凈洗三斤剉碎細研以布絞去汁入銅器内盛重湯上煮栁箆攪勻如糖以瓷合盛每日空心取一丸如彈子大温酒調下日午晚間服瘥附骨疽附論夫附骨疽者以其無故附骨成膿故名附骨疽喜著大節解中丈夫産婦喜著陛中小兒亦著脊背大人急著者先覺痛不可動揺按之應骨痛經日便覺皮肉漸急洪腫如肥状是也小兒纔手近便六腑呼即肢節有痛後也大人綏著者先覺肌烘烘然經日便覺痛痺不隨小兒四肢不能動揺亦如不隨状看肢節解中若有崩烘烘處不知是附骨疽令遍身盛腫至不潰體皆有青黯大人亦有不别呼為賊風風腫不知是疽也凡人身體患熱當風取凉風入骨解中風熱相摶便成附骨疽其候嗜眠沉重忽忽耳鳴又秋夏露卧為冷所析風熱伏結而作此疾急者熱多風少緩者熱少風多小兒未知取風冷何故而有此疾由其血盛肌嫩為風析之即使凝結故也凡初得附骨疽即湏服漏蘆湯下之傅小豆散得消可服五香連翹湯凡賊風其人體卒無熱中暴風冷即骨解深痛不廢轉動按之應骨痛久即結痛或結瘰􅊓其附骨疽久即腫而結膿以此為異宜若治附骨為賊風則増益病深膿多若治賊風作附骨即加風冷遂成瘰􅊓偏枯攣曲之疾也療之效皆在善始耳若候附骨與賊風為異者附骨之始未腫但痛而已其賊風但痛不熱附骨則其上壮熱四體乍寒乍熱小便赤大便澀而無汗若得下却熱開發腠理便得消也縱不消盡亦得浮淺近外凡賊風但夜痛骨不可按仰而不得囬轉痛處不壮熱亦不乍寒乍熱多覺身體索索然冷欲得熱熨痛處即小寛時復有汗出此為賊風證也宜針灸熨􅏼諸服治風藥即愈有久癰餘瘡敗為深疽者在腨脛間喜生瘡中水惡露寒凍不瘥經年成骨疽亦名胻瘡深爛青黒四邊堅强中央膿血汁出百藥不瘥汁潰好肉處皆虚腫亦有碎骨出者可温赤龍皮湯漬夏月日日洗冬月四日一洗青肉多傅白䕡茹散食去惡肉可三日傅之止後長傅家猪屎散得瘥止取猪屎燒灰作末如粉致瘡中令滿白汁出吮去隨更傅之瘥止若更青肉復着白䕡茹散如前法家猪屎散取平復凡骨疽百療不瘥者可瘡上以次灸之三日三夜便瘥如瘡不瘥瘥而復發骨從瘡中出者名為骨疽先取烏鷄一隻去肉取骨熬燋如炭取三家牛棓木刮取屑三家甑算各一兩皆燒成灰合導瘡中碎骨當出數片瘥附骨疽與白虎飛尸􅊓節風皆相類􅊓節風則走注不定白虎飛尸痛淺按之則便止附骨疽痛深按之無益一說白虎飛尸亦能作膿著骨而生及其腐潰碎骨出盡方愈如是則附骨疽與白虎飛尸是一病但深淺不同耳白虎飛尸又俗名風煞然痛附骨疽少有骨出者宜㧞毒熱不可一向泥於五香連翹漏蘆之属當先温腎如靈寳膏及神藥唯在針烙淺深刺㧞其毒根則易愈不爾則順脉流走遍體洪腫卒致不救附骨疽治之宜去熱毒又當温腎未可専用凉劑若在針烙其病務詳淺深刺拔其毒根則易愈不爾則順脉流走遍體洪腫卒致不救至於所患之時猶或當於外證未潰以前發渇乃臟腑焦燥痢下乃引飲無度已潰而渇則膿血去多津液中乾或腹膓胃暴虚遂成下痢體虚受寒則𠻳聲不息氣逆挟熱則痰盛於胷熱毒不泄為二便祕塞毒氣迫心為嘔噦驚悸隂陽交争血氣不和寒熱併作臟腑傷敗便血逆出毒氣攻外煩懆異常惟湏大方料藥同治可也方牛黄散出聖惠方治附骨疽及一切惡瘡宜此藥牛黄細研麝香細研木香丁香蘹香子乳香細研硃砂細研雄黄細研黄丹黄蘖剉苦參剉膩粉各一分右為細散入研了藥同研令勻剪單紙條子看瘡眼子大小每一條子紙用藥末一字已下撚藥末在紙條子内維於瘡中不計近逺如藥無力紙條子自退即依前更用藥末為紙條子更維候紙維漸短直至好痊為度若患惡瘡不計在甚處看瘡眼子大小皆用維子不計箇數以瘥為度連翹湯出聖濟總録治附骨疽連翹射干升麻防己黄芩去黒心大黄剉炒甘草炙芍藥杏仁湯浸去皮尖雙仁各一兩柴胡去苗三兩右麄搗篩每服五錢水一盞半煎至七分入芒硝一錢去滓空心服漏蘆湯出聖濟總録治附骨疽漏蘆去蘆頭升麻連翹麻黄去根節各一兩大黄剉炒一兩半防己木香白歛沉香各二分右麄搗篩每服五錢水一盞半煎入竹葉七片至八分再入芒硝一錢攪勻去滓空心温服取利三二行未利再服赤术散出危氏方治附骨疽膿出淋瀝久而不瘥已破未破赤术一斤米泔浸三宿取出洗净晒乾再以大麻腐汁浸术止餘二寸許入川椒二十一粒葱皂根煮黒油出洗凈焙乾秤破故帋炒川楝剉炒茯苓舶上茴香炒杜茴香白芷桃仁去皮尖炒各半斤右為末煉蜜丸如桐子大每服五十丸酒鹽温湯送下一方老人加黒附子天靈盖散出聖惠方治附骨疽腫痛有膿久而不瘥天靈盖一兩燒灰狗骨頭半兩燒灰麝香一錢細研黄連一分去鬚黄栢一分白礬半兩燒令汁盡右為細散入麝香令勻每用先煎甘草湯洗拭乾用生油調塗之天南星散出聖濟總録治附骨疽天南星炮附子炮裂去皮臍黄蘖去麄皮各半兩鉛丹研一分麝香研半分右附子麝香鉛丹外搗篩為末入二味和勻乾傅瘡上日三騏驎竭散出聖濟總録治附骨疽塗傅騏驎蝎檳榔剉黄連去鬚馬腸根各一兩右為散先以油炒葱豉入膩粉半兩和搗捻作餅子二片用鹽漿水洗瘡用餅搨瘡上以生帛縛定三日後再用鹽湯洗即塗傅散子日三應痛丸出瘡科精要治走注痛疼疑是附骨疽者蒼术去皮當歸草烏頭炮黑牽牛各一兩右為細末用醋糊為丸如小豆大每服三十丸空心醋湯下亂髪湯出聖濟總録治附骨洗方亂髪灰半兩杏椎碎二十一枚甘草剉五寸鹽花半兩右以漿水五升煎至二升濾去滓通手洗疽上有膿血洗取淨後以絹縳定每日三兩遍洗妙天靈蓋散出聖濟總録治附骨疽瘡及隂瘡久不瘥塗傅天靈蓋酥炙一兩狗骨燒灰一兩半白礬燒灰一兩半麝香研一錢半右為散乾傅瘡口日三次皂莢膏出聖恵方治附骨疽腫皂莢十挺肥實無蚛者槌碎呉茱萸二兩末杏仁二兩湯泡去皮尖研如泥水銀一兩以去棗穣同研令星盡右件藥以頭醋三升煎皂莢取一升五合濾去滓下茱萸杏仁以文火煎成膏次下水銀和勻置不津器中於故帛上塗貼患處治附骨疽多年不瘥多年油脚一兩麝香一錢細研豶猪骨髓一兩右都研為膏塗於瘡上龍骨粉膏名蟾蜍膏出千金方治久瘡癰敗壞成骨疽或骨從瘡孔出以龍骨粉瘡四面厚三分以膏着瘡中日二易蟲出於髪盡愈膏方如左大蝦蟇一枚自死者亂髪一塊鷄子大猪脂一斤右取二味内脂中煎畧消盡下待冷更内鹽一合攪勻充前用之一方先以桑白皮烏豆煎湯淋洗拭乾後用藥貼敗醤湯出聖濟總録治附骨疽敗醤二兩大黄剉炒一兩桃仁二兩右麄搗篩每服五錢先取皂莢刺一兩剉碎以水二盞煎至一盞半濾出下藥及朴硝一錢同煎至八分去滓空心温服麝香散出聖濟總録治附骨疽久不瘥麝香研一分騏驎竭蜜陀僧煆各一兩右為散先用鹽湯洗瘡拭乾取活鱔魚一條剉碎研搨瘡上一宿明旦掲看有蟲即去再拭乾塗傅散子日三烏鷄散出聖惠方治附骨疽久不瘥骨從瘡口出烏雌鷄骨燒灰牛棓木刮燒灰三家者炊單燒灰三家者各一兩右合和研細傅瘡上日三五度碎骨出瘥又方出聖濟總録治附骨疽積年發膿骨出不瘥黄丹細硏膩粉研各三錢鷄子五枚煮熟去白用黄右將鷄子黄於銚子内以慢火炒令黑候自然為膏於盞内入黄丹膩粉和勻用時先以米泔煎湯洗患處拭乾用藥傅之治附骨疽及魚眼瘡出聖惠方亂髪灰一兩膩粉二錢杏仁五十枚燒令灰右同研細入油二合蠟半兩煎攪令勻入瓷合盛净洗貼之效小豆散出聖濟總録治附骨疽内消赤小豆一合糯米炒黒五合右為散水調如糊攤故帛上塗貼乾即易之治附骨疽積年發膿骨出不瘥出聖惠方白礬枯别研新枸杞子自然汁右先将杞子汁慢火熬成煎後入白礬團合堅實隂乾搗羅為末每用時以甘草水洗之拭乾先唾塗瘡上次用藥末固匝傅之治附骨疽及冷瘻一切惡瘡等一名蜣螂丸出聖惠方蜣螂燒灰一兩巴豆半兩去皮心研紙裹壓去油右為細散用傅瘡上旦換之多時患者不過三上效一方用津調入孔中治瘡久不瘥瘥而復發骨從孔中出者名為骨疽出千金方用蜜陀僧為末以猪脊髓調傅之兼治痔漏不愈秦芃散出聖濟總録治附骨疽久不瘥或瘥經年再發用秦芃去苗土搗羅為散塗傅瘡上以帛縳定日二三次牛膠散出聖濟總録治附骨疽積年發膿骨出不瘥用水牛皮膠炙焦細研為散塗傅瘡上用生鯽魚破開外面貼定時看有小蟲出更以鹽湯洗傅上藥再加魚貼蟲行盡更傅藥黑鯽膏出千金方治附骨疽未破或膿出不盡并久疽不瘥用黒色鯽魚一箇去腸入白鹽令腹滿用綿縳定以水盞銅石器中煮水盡乾燋為末用猪油調傅已破者乾糝小疼無怪療髓疽日鋌深嗜卧方用牡礪澤瀉二味主之治附骨疽及魚眼瘡出聖惠方以蜣螂七枚和大麥麺爛搗封之又方出聖惠方用蜣螂乾者為末以烏鷄脂塗瘡口上以散傅之又方出聖惠方用猪骨頭燒煙薰之治瘡久不瘥瘥而復發骨從孔中出名為骨疽穿地作口外小裏大深三尺取乾鷄屎二升以艾及荆葉搗碎和鷄屎令可然火坑中燒之令煙出内疽於坑中薫之以衣覆坑口勿泄氣半日當有蟲出治附骨疽出千金方用檞皮燒末飲服方寸匕檞葉亦可又方出千金方用新剥䑕皮如錢孔大貼腫上即膿出已潰者取猪脊上脂貼之柢聖散王氏𫝊濟方治骨疽瘡及冷漏久不合者的乳香膩粉白礬各等分燒存性右為細末每遇患時先以鹽水洗之以津唾調瘡上必效治附骨疽蝕等瘡本草以螲蟷燒為末和臈月猪脂傅之治骨癩病及㾦㿔本草以牛膝為末酒服方寸匕日三瘭疽附論夫瘭疽為病毒發疾轉不旋踵而害人故其字從票音同於飄風之飄治之不可稍緩也古人謂人受惡風入於肌脉變成斯病盖厲氣藴伏初未知覺毒鬱既發則若火熾烈不可嚮邇是以其伏隱少而深實黯黑而不明其痛復應於心毒氣已深故其證如此瘭疽者肉中或生㸃子如豆粒小者如黍粟極者如梅李或赤或黑或青或白其狀不定有根不浮腫痛傷之應心根深至肌經久便四面悉腫疱黯熟紫黒色能壞爛筋骨若毒散遂脉入臟殺人南人名為榻著毒厚肉處即割去之亦燒鐵烙之令燋如炭或灸百壮或飲葵根汁或飲藍根汁若犀角汁及升麻汁竹瀝黄龍湯等諸單方治専去其熱取瘥其病喜著十指故與伐指相似人不識之呼作伐指不急治之亦遂脉上入臟殺人南方人得之皆斬其指初指頭先作黯疱後始腫赤黒黯慘痛入心是也復有惡肉者身上忽有肉如赤豆粒突出便長推出如牛馬乳上如鷄冠狀不治自長出不止亦不痛癢此由春冬之時受惡風入肌脉中變成此疾治之宜服漏蘆湯外燒鐵烙之急為之令燋盡即以升麻膏傅上積日乃瘥其發赤黒青白色變不常或臂或臀或口齒或肚臍發無定處大槩多見於手指之間根深入肌走臂逆腫毒血流注貫串筋脉爛肉見骨出血及多令人串痛狂言痛入於心即死毒氣出於外腎者亦死此瘡最慮引風治法宣毒行血尤當於心腎焉盖心為萬病之門敗血鬱滯煩懆噯悶皆毒氣攻心之故也心家為毒所攻若於小便利之又恐外腎虚怯易至傷風勢得宣毒於大便如𤓰蔞酒之入没藥五靈脂皂莢刺帶生灰是也是雖大便引導毒氣然清心行血去風邪之劑如何為廢心清血行風邪解散庶乎有瘳矣經云在指則截在肉則割盖慮毒氣隨風走肌隨脉入腹倐忽害人此疾初因感受惡風入於脉理或傷寒瘴瘧之後毒變所生凡癰疽發開一寸則一寸引風非必風入於中虛處自引風也惟風邪襲虛則肉爛透骨惡血横流天南星生半夏白芷稍散能去風可以頻傅其瘡療兼推廣疽癰發度行之瘭疽一名蛇瘴南地多有蛇毒吐毒於蠻煙瘴雨之鄉人有伏水土風氣感而觸之者數月已還未有不發為蛇瘴也惟赤蜈蚣伏蛇最為上藥雄黄白芷次之諸蛇藥亦可以制其毒矣雄黄有毒爛肌但冝和蛇藥用胷中痛少氣急入闇中以手掩左眼竟視右眼見光者胷中結癰也若不見光瘭疽内發若吐膿血此不療之疾宜以灰掩膿血上不爾著傍人也又齒間臭熱血出是瘭疽也七日死療所不瘥宜以灰掩地血方麝香摩膏出聖惠方治瘭疽散毒氣麝香半兩細研莽草二兩川升麻三兩寒水石黄芩各二兩羚羊角屑射干各三兩丹砂細研芎藭各二兩川大黄三兩鷄舌香二兩生地黄二升羊脂一斤木香二兩右藥細剉以猪脂二斤入地黄汁羊脂諸藥煎候黄芩黒色綿濾去滓入麝香丹砂末攪令勻收瓷合中頻頻以摩瘡上丹砂膏出聖惠方治瘭疽丹砂細研犀角屑射干大黄剉炒芎藭黄芩去黒心升麻前胡去蘆頭沉香木香各一兩猪脂二斤半生地黄二兩麝香半分研右除丹砂麝香猪脂外剉碎以醋半升和勻浸一宿先熬脂令沸次下諸藥煎候地黄赤黒色以綿絞去滓入丹砂麝香末以栁笓攪勻瓷合盛傅患處日三五上又取二匙以温酒調空心日午服一方温水調下半匙犀角丸出聖濟總録治瘭疽初覺宜速取利犀角屑一兩半大黄剉炒黄芩去黒心各三分防風人參當歸切焙黄耆梔子仁黄連去鬚乾鹽甘草炙剉各半兩巴豆十二粒去皮心右除巴豆外搗羅為末研入巴豆令勻煉蜜丸如桐子大每日空心米飲下三丸如未利加五七丸以利為度猪蹄湯出千金方治瘭疽諸疽十指頭焮赤痛癢白芷大黄芎藭黄芩黄連甘草各一兩細辛藁本當歸藜蘆莽草各一兩右㕮咀以水二斗先煮猪蹄一具取一斗煮藥取五升浸瘡即瘥一方無藜蘆枳實湯出千金方治瘭疽射干甘草枳實升麻乾地黄黄芩各二兩麝香二分前胡三分犀角六分大黄十分右㕮咀以水九升煮取三升下大黄沸去滓内麝香分三服瘥一方無大黄倍加黄芩麻黄白薇枳實升麻松葉忌海藻漏蘆湯治瘭疽漏蘆去蘆頭白歛黄芩去黒心麻黄去根節白薇枳實炒升麻芍藥甘草炙剉大黄剉炒各一兩右麄搗篩毎服五錢水二盞煎至一盞去滓空心温服日三服一方無白薇射干散治瘭疽皮肉中忽生㸃子如麻豆大或如桃李腫痛不可忍射干升麻枳實麸炒微黄川大黄各一兩剉碎微炒麝香一分細研前胡一兩去蘆頭犀角屑三分羚羊角屑三分甘草一兩生剉右為麄散入麝香令勻每服四錢水一中盞煎至六分不拘時温服欵冬花膏治瘭疽手足累累如米起白色刮之汁出愈後復發欵冬花半兩黄耆剉一兩半升麻一兩赤小豆附子炮去皮臍苦參各一兩一分右為散毎服一錢空心温酒調服日再加至二錢消毒散治瘭疽熾甚藜蘆大黄剉炒黄栢黄連當歸甘草各一兩右㕮咀如麻豆以水一斗煮至五升去滓浸淋瘡處即瘥薄搨湯一名甘草湯主瘭疽浸淫欲作未成如桃李核或如鷄子赤焮方甘草炙黄芩大黄黄連當歸芒硝各一兩右切以水一斗煮取三升絞去滓置鐺中下芒硝一沸攪之貼布帛中以搨上數百遍青木香散治瘭疽着手足肩背累累如米起色白刮之汁出瘥後復發青木香滑石龍骨各三兩糊粉一兩米粉一升右為末稍以糝病上日三次黄連散治瘭疽浸淫多汁日漸大黄連二兩糊粉甘草䕡茹各二分右治下篩以糝瘡上日三四度肘後名報粉散瘭方生髪燒存性莢刺燒帶生各二分赤蜈蚣半燒厚黄栢各一分右為細末用雄猪膽汁調傅又方鷄内金生髪各燒存性莢和天南星半夏各等分生右為細末乾摻之洗湯瘭疽方荆芥穗白芷漢椒去目連根葱白各等分右用井水煎入鹽候温自手背上盪下日三次瘭疽毒氣走背腫所至處𦂳繫之又方治瘭疽著手足肩臂累累如米起白色刮之汁出瘥後復發竈屋塵釡下土各一升右合研令勻以水一斗煮三沸取汁洗日三四度魚髪膏治如前鯽魚長三寸者亂髪鷄子大猪脂一斤右煎為膏傅又方治瘭疽皂莢刺燒帶生白芨少許右為細末摻諸瘡上黄連散治卒得瘭疽一名爛瘡黄連去鬚搗末胡粉各一兩右藥相和研令勻細以油調塗之此瘡初起作􅪊疼痛焮赤宜用生鐵燒赤二七遍入水中日二三度以洗之治瘭疽無頭腦出在指甲上獨頭蒜一兩杏仁一兩去皮尖湯浸右藥爛研相和炒令熱傅瘡上以軟帛繫之數易治瘭疽著手肩背累累如米起色白刮之汁出瘥後復發出千金方用虎屎白者以馬屎和暴乾燒為灰糝之良一方單用馬屎傅之亦可又方出千金方用麻子熬作末摩上良又方出千金方用酒和麫傅之又方出千金方以猪胆傅之良又方出千金方剥去瘡痂温醋泔清洗之以胡燕窠和百日男兒屎如膏傅之用煮芸薹菜取汁一升服之并食乾芸薹數頓少與鹽醬冬月研子水煎服之又方出千金方用枸杞子根并葵根煮汁如餳糖隨意服之又方出千金方用臈月糖晝夜連浸數日乃愈瘭方出千金方用生髪燒灰存性為末米湯調服兼傅漏瘡一方治發背宜服之治卒得瘭疽一名爛瘡出聖惠方用燒牛糞作灰細研用油調傅之治瘭疽着手足累累如米豆刮之汁出出聖惠方用蔓青子二兩炒熟為細散以猪脂和傅其上一方無猪脂綿裹傅之治瘭方出直指方用燕巢和百雀兒糞研膏傅之治瘭疽徹骨痒者出本草以狗屎燒灰傅疽瘡勿令病者知治時行熱瘭瘡用羊膽以醋和服之良風疽附論夫風疽者本由風濕之氣入於腠理流注血脉凝澀不利攣曲腫起發作瘡疽所以疼痛經久不瘥者是也蓋風勝則動故其疽留止無常得之醉卧出汗當風入膚腠客於經絡與榮衛而相成方黄耆丸出聖濟總録治酒醉汗出風入經絡久成風疽黄耆剉犀角黄連去鬚茯神去木當歸切焙芍藥升麻黄芩去黒心各五分木通八分甘草生剉三分防風去叉五分麝香另研半分右為末拌勻煉蜜丸如桐子大每服二十丸空心生薑湯下食後再服即煎麥門冬湯下麻黄湯出聖濟總録治酒醉汗出風入經絡成風疽麻黄去根節三兩五加皮一兩半防風去义獨活去蘆頭桂去麄皮當歸切焙芎藭乾薑炮各二兩附子生去皮臍一枚牛膝二兩半杏仁去皮尖䨇仁八十枚右細剉以水九升先煎麻黄掠去沫入諸藥煎取三升絞去滓每用一盞温服併三服温覆微汗忌風防風湯出聖濟總録治風毒中人留血脉不散與榮衛相搏結成風疽身體煩熱昏冐腫痛防風去叉柴胡去苗白芷桔梗炒木通剉當歸切焙各一兩半羗活去蘆頭麻黄去根節煎去沫畧焙附子炮去皮臍甘草炙剉各一兩右㕮咀如麻豆每服五錢水一盞半煎至八分去滓温服食後臨卧各一如欲出汗空心併兩服後以熱薑稀粥投盖覆取汗慎外風海桐皮浸酒方出聖濟總録治熱毒風結成疽腫痛行履不得海桐皮剉五加皮剉獨活去蘆頭防風去叉乾蝎炒杜仲去麄皮牛膝去苗酒浸切焙薏苡仁炒各一兩生乾地黄焙三兩右麄搗篩生絹囊貯以好酒一斗五升浸於瓷瓶中宻封秋夏三日春冬七日開取食煎温酒合加至四五合不拘時甚者常令酒氣相續秦芃丸出聖濟總録治風毒氣客於經絡成風疽秦芃去土苦參升麻黄芩去黒皮枳殻麸炒防風去叉惡實炒各四分烏蛇酒浸去皮骨炙蒺藜子炒各五分右為末煉蜜丸如梧桐子大早晚食後以蒺藜子煎湯下二十丸大豆酒方出聖濟總録治熱毒風腫成疽日夜熱痛大豆𦂳小者三升麻子仁細研二升烏蛇一條去頭尾皮骨重四両搥碎右相和令勻就甑内蒸令熟去甑底湯將好酒一斗五升就甑中淋候酒熱又淋凡七八遍入瓷甑内宻封候冷量性飲常帶酒氣住大豆汁塗方出千金方治風疽搔之黄水出凡脚腨及曲䐐中痒搔則黄汁出是大豆一升馬尿二升一作屎白蜜半斤右拌令勻用青竹筒盛實築架在炭火上當中慢燒將瓷椀兩頭盛服取汁先用泔清入鹽少許和温洗瘡上拭乾後以藥汁塗日三五度一方無白蜜入糠馬屎又方出千金方用嚼胡麻傅以綿褁之至旦易緩疽附論夫緩疽者以寒氣客於經絡榮衛凝澀甚寒氣盛則腫痛深伏其狀無頭尾大如常人之拳小如桃與皮肉相附著其腫與肉色相似亦不甚赤積日不潰久乃變紫黯色肉俱爛如牛領瘡以其初勢緩慢故名緩疽以其腫色與肉色相似故又名肉色疽方黄耆散出聖惠方治緩疽及諸癰腫膿血結聚皮肉堅厚日久不潰疼痛黄耆沉香薰陸香連翹各二分羚羊角屑一兩鷄舌香漏蘆去蘆頭黄芩去黒心梔子仁甘草生剉防風去叉栝蔞根各半兩右麄搗篩每服五錢水一盞半煎至八分去滓不拘時温服一方有漢防己三分排膿散出聖惠方治緩疽日久穿潰出膿水不盡具齒一兩黄耆剉當歸剉微炒生地黄焙赤芍藥黄連去鬚升麻桂去麄皮白歛犀角屑各三分甘草半兩生剉麝香一分細研右為散拌勻再羅過毎服二錢不拘時温酒調下生地黄乾散出聖惠方治緩疽風熱侵腫不住肉欲成膿四肢煩熱生乾地黄一兩川大黄剉碎微炒人參去蘆頭黄芩各一兩當歸半兩逺志一兩去心麥門冬一兩半去心川升麻半兩赤芍藥一兩半黄耆一兩剉赤茯芩一兩羚羊角屑一兩右為麄散毎服四錢水一中盞入生薑半分煎至六分不拘時去滓温服犀角散出聖惠方治緩疽風熱毒氣結聚腫痛寒熱不止犀角漏蘆各一兩川大黄一兩半剉碎微炒川升麻半兩梔子仁一兩甘草三分生剉木通麥門冬去心枳殻麸炒微黄去瓤知母𤣥參各一兩右為麄散每服四錢水一中盞煎六分去滓入地黄汁半合更煎三兩沸不拘時温服飛黄散出聖惠方治緩疽惡瘡蝕惡肉丹砂雄黄磁石曽青白石英礜石石膏鍾乳粉雌黄各二兩雲母粉三兩右各細研為散用瓦盆一口丹砂安南雌黄安中磁石向北曽青在東白石英在西礜石當上石膏次更下鍾乳雄黄雲母覆盖更用一盆覆盖定以泥封厚一寸於竈底以陳葦燒一日取出看取飛上者研細傅瘡上日二遍莽草散出聖惠方治緩疽初結微腫疼痛莽草鹿角屑白歛白芨半夏天南星附子去皮臍各一兩蛇蛻皮一條炙皂莢兩挺黒皮及子右為散用醋麫薄糊調為膏塗貼腫處乾即再上腫散為度黄栢膏出聖惠方治緩疽黄蘖剉桐葉切各一兩半龍骨一兩黄連一兩半去鬚敗龜拳大燒灰細研麝香一分細研右藥以猪脂二斤煎前四味十餘沸布濾去滓拭鐺令凈却入鐺中再煎入後五味攪令勻收於不津器中毎用以故帛上勻攤貼之木香散出聖惠方治風毒氣留滯榮衛不通欲結為緩疽熁之令内消貼木香一兩半桂心二兩白歛一兩半赤小豆一合莽草一兩半附子一兩去皮臍半夏一兩半洋桃根二兩右為細散以酸漿水旋調稀稠得所塗故軟布及生布絹上貼之乾即易之以腫消為度䕡茹膏出聖惠方治緩疽腫痛内堅厚如牛領皮下針烙乾即用生薑維縁疽氣沉澀乾薑味辛辛能散氣消痛又善引膿化惡肉可以綿褁薑末深絍瘡中日三二遍換以腫退為度蝕出瘡中惡肉䕡茹三分藜蘆半兩去蘆頭珍珠末硫黄細研右為細散都研令勻瘡上如惡肉挍深可以綿褁入瘡中候惡肉化盡貼生肌膏取瘥為度芍藥湯出聖惠方治緩疽芍藥當歸各一兩黄耆剉生乾地黄焙赤茯苓去黒皮各半兩人參甘草炙各三分右麄搗篩每服五錢水一盞半入生薑半分拍碎棗二枚擘破煎至八分去滓空心温服晩再如法服之蛇床散出聖惠方治緩疽蛇床子一分研杏仁湯泡去皮尖雙仁細研入黄連去鬚搗末乳香細研各半兩鹽一分研蔓菁根三兩切爛搗右以蔓菁根和藥末細研令勻塗傅腫上乾即易之雄黄散出聖惠方治緩疽以飛黄散蝕惡肉盡薰之雄黄乾鷄屎白藜蘆去蘆頭丹砂細研乾􅀈鱺魚炙焦各一兩右為散以青布褁之安小土竈内燒薰患處如是薰三日即止後用黄耆散常法傅之一方用蛇衘膏摩之黄耆散出聖惠方治緩疽用黄耆二兩細剉搗羅為散傅瘡上一方不計時候以温水調下二錢匕治緩疽方出聖惠方用䕡茹一兩搗為末不計時候温酒調下二錢一方用二兩為散傅之追蝕一切瘡腫附論夫癰腫若寒多及毒深外證雖結聚􅜬鞕不消疼痛難任未能腐化或已穿穴經久不瘥在外者須以藥蝕在裏者須以藥托令毒氣發泄榮衛流通則癰疽得瘥矣所以有追引蝕癰之方方覆煎散治諸般癰疽腫毒癤毒歸稍一錢歸身二錢防風稍一錢風身二錢蘇木半錢黄栢二錢甘草二錢半全蝎一錢陳皮一錢羗活一錢人參五分黄芩一錢防己五分連翹三分藁本一錢黄耆一錢桔梗二錢澤瀉五分知母五分生地黄五分芍藥一錢右為麄散只作一服煎先用井水浸藥一箇時辰再用長流水一大椀煎七分又用好酒數十滴入藥内作一服温飲看病上下食前後治發背腦疽疔瘡惡腫發背疔瘡與腦疽麝香没藥乳當歸膩粉官粉二錢各等分一對蜈蚣丸焙枯粉霜砒信各半字一錢腦子細羅酥蟾汁振尖如菜子通針深送入瘡疽半熱半痛過半日管取醫交命再甦千金漏蘆湯治腫癰癤無名腫毒皆可服生大黄白歛甘草赤芍藥黄芩白芨升麻麻黄枳殻山梔子當歸鬚各等分右㕮咀水一盞半煎七分去滓空心服又治諸毒腫丁香散治癰疽發背熱毒攻焮肌肉赤色疼痛欲成膿令速潰丁香赤小豆各半兩寒水石一兩洋桃根硝石研大黄各一兩木香白歛榆皮剉防己各三分右搗羅為散先以雄雀屎七粒乳香一小塊細研以醋調和塗瘡頭上以醋調藥末如糊攤故帛上貼之乾則易龍射破棺散治一切癰疽發背腫惡霍香地丁𤓰蔞紅藤甘草紫草各一兩黄耆五錢當歸五錢右為細末每服二錢水調下通闗散治一切癰疽無頭腫痛宣通立愈大黄一兩牡礪半兩燒山梔子三錢地龍二錢甘草三錢炒右為末每服五錢水一盞煎至六分去滓温服以利為度乳香㧞毒散治一切癰腫瘡癤消毒止痛黄蘖去麄皮黄芩去肉各二兩地骨皮一兩乳香另研三錢没藥另研三錢右為末井水調作膏子攤在紙花上貼於瘡處追毒丸治癰疽已潰蝕惡肉巴豆去皮心膜十四枚白丁香二十一枚豆䜴二十一粒屁盤蟲七枚右同研細滴水丸撚如雀糞大絍瘡内追汁盡即止搜膿散出瘡科精要治年深不瘥惡瘡有膿不能自出芎藭二兩白芷一兩白芍藥三兩輕粉二錢右為細末每用乾摻瘡口深者絍之搜膿散出御藥院方治諸瘡膿汁不絶腐肉未盡黄耆白芍藥香白芷各等分右為細末乾掺患處只可少許却用膏藥敷貼日一換透肌丸治癰疽腫未有頭疼痛不可忍硼砂研斑猫去趐足米炒烏頭尖右等分搗研為末醋煮麫糊丸如小豆大捻令匾貼在瘡上却用膏藥花子盖透為度如惡物出盡次用後方合瘡口生肌散生肌散白礬燒令汁盡一兩黄連末一分輕粉一分右同研細不拘多少摻瘡口上候生肉滿膿水盡瘡口乾即止為效追膿散治癰腫癤毒出膿疼痛濕生蟲五十枚瓦上􅏼乾小麥五十粒麝香研半錢右搗研為末毎用一字絍在瘡内通闗膏治瘡癤癰疽等無頭者乳香輕粉各等分右研勻津唾調塗腫處以紙貼之敗毒丸治一切癰疽未破巴豆去皮心膜三枚鉛丹少許右同研入生􅔇少許再研勻丸麻子大每以一丸安瘡口外以膏藥貼之膿即出括蔞酒治癰癤多日不熟無頭者括蔞一枚甘草三寸右剉碎用酒一盞水一盞量人虚實入膩粉少許煎三五沸去滓臨卧温服夜半踈動一行其瘡自消葱香塗傅方治腫毒及癰癤不穴煨葱一莖乳香如棗核大一枚右爛研塗腫上即潰治無名腫毒發背腦疽皆可治之炒黄小粉五分炒半夏末一分將黄下灯草末同炒要研草法陽手送隂手接下盆研細右研細無根水調傅之甚效治膿潰後瘡不合方出千金方用燒䑕皮一枚為末傅瘡孔中又方出千金方熟嚼大豆以傅之又方出千金方炒烏芝蔴令黑熟搗以傅之又方出千金方以牛屎傅之乾即易又方出千金方燒破蒲蓆灰臈月猪脂和納孔中治腫毒未成頭熱痛方以蠐螬不計多少生研細入少􅔇并醋三兩滴調紙花子上攤剪一眼子時以水潤覺藥力盡再用候痒掲去自然膿為效治癰未有頭使必穴方取茅錐一枚尖正同具者以水煎十數沸服之立潰若兩莖即生兩孔或斷折一錐為二亦兩孔嚥葵子方治癰癤無頭取葵子一合以津嚥三五枚多嚥即頭出多假令嚥一粒穿一穴也隨癰癤大小不可過多雀糞塗傅方治癰腫速穿潰以雄雀糞二十一枚用醋研和如糊塗傅腫上膿便出未穴再塗即破地黄膏塗貼方治熱癰腫結熱振焮欲作膿以生地三斤細切搗汁用麻布絞其汁出於銅器内慢火煎攪成膏取傅腫處以故帛塗貼之亦得日三五次易其癰即潰治癰癤諸腫難穿者用已出未變全生蜂兒瓦上焙乾研末一分生蝦肉擂碎二分合和敷患處四邊留中心須臾或穿或散極妙治背癰搭背無名腫毒瘡用葡桃根搗碎敷患處先用虀水洗淨後敷上葡桃根野者妙又方以捻拈草用粳米醋調敷患處良治諸般背疽無名腫毒用水一椀熬至四分後用好石灰少加七家鍋煤同下水内調勻用磁器内成收㸃患處有頭無頭皆可㸃之神效普濟方卷二百八十七
