body:
  text: 普濟方卷二百四十八明周王朱橚撰㿗疝門心疝附論夫疝者痛也由隂陽氣積于內寒氣不散上衝心故使用痛謂之心疝也其痛也或如錐刀所刺或隂隂而疼或四肢逆冷或唇口變青皆其候也內經謂診得心脈而急疾名心疝少腹當有形也心為牡臟小腸為之使故曰小腹當有形也夫臟病必傳於腑今心不受邪病傳於腑故小腸受之為疝而痛當有形也世之醫者以疝為寒濕之疾不知心氣之厥亦能為疝心疝者當兼心氣以治之方牡丹丸治心疝心痛如錐所刺牡丹皮桂去皮芍藥烏頭炮去皮細辛甘草炙木香吳茱茰湯浸焙炒檳榔各一兩右為末煉蜜丸如梧桐子大每服三十丸溫酒下不拘時赤芍藥丸出聖惠方治心疝心腹中如錐刺疼痛脅下脹滿赤芍藥去蘆桔梗去蘆頭細辛桂心川椒去目及閉口微炒出汗乾薑炮製銼附子炮製去皮臍木香檳榔各一兩右為末煉蜜和搗三百杵丸如梧桐子大每服以熱酒下三十丸日四五服木香散治心疝心痛不可忍木香羌活去蘆頭檳榔生銼牡丹皮當歸切炒桂去皮青橘皮湯浸去白皮炒蓬莪术煨各一兩右為散每服二錢沸湯或溫酒調下不拘時蓬莪荗散治心疝痛肢體虛冷蓬术煨檳榔生銼附子炮製去皮臍甘草銼桂去粗皮胡椒半兩芎藭白术各三分右為末每服二錢水一盞煎七分溫服不拘時桃仁丸出聖惠方治心疝心痛四肢逆冷面色青黑桃仁湯浸去皮尖雙仁麩炒微黃沒藥安息香乳香麝香細研桂心木香吳茱茰湯浸七遍焙乾微炒各一分右為末都研令勻用蒸餅和丸如小豆大不拘時以少酒嚼下二十丸治心疝心腹中如錐刀所刺疼痛出聖惠方巴豆木香檳榔各半兩附子去皮臍生用川烏頭去皮臍生用共一兩乾漆搗碎炒令煙盡桃仁湯浸去皮尖雙仁麩炒黃蓬莪荗各三分右件藥先以巴豆附子烏頭等三味以水煮一日久取出各去皮巴豆去心膜一處搗如泥諸藥别搗羅為末相和巴豆等分入醋麵糊丸菉豆大不拘時醋湯下五丸芍藥丸治心疝心脅痛及繞臍痛芍藥桔梗去蘆炒細辛去苖葉蜀椒去目閉口炒去汗桂心去皮乾薑炮共三分附子炮製去皮臍半兩右為末煉蜜丸如梧桐子大每服二十丸溫酒或鹽飲不拘時木香散治心疝心脅痛及繞臍痛芍藥桔梗去蘆頭細辛去苖葉蜀椒去目閉口炒去汗桂去皮乾薑各五分附子炮去皮臍一兩牡丹丸治疝氣心腹痛牡丹桂心川烏頭炮製去皮臍木香吳茱茰湯浸七遍檳榔各一兩右為末煉蜜和搗三二百杵丸如菉豆大每服以溫酒服十丸日四五服硃砂丸治心疝心腹中㽱刺疼痛不可忍硃砂細研半兩桂心半兩桃仁湯浸去皮尖雙仁麩炒黃半兩附子炮製去皮臍一兩麝香半錢細研巴豆二十一枚去皮心研紙煨去油右為末麵糊和丸如梧桐子大每服醋湯下二丸治心疝發作有時激痛難忍者以麝菵吳茱茰等分搗末蜜丸如麻子大每服二丸日三服勿熱食一方以茱茰一升麝菵如彈子大服一丸合搗以雞子白和丸如小豆大服二丸即止紫桂丸治隂交攻心疝疼痛桂去粗皮半兩當歸焙三分吳茱茰湯洗焙一兩右為末醋煮麵糊丸如梧桐子大每服二十丸炒生薑鹽酒下米飲亦得日三服治心疝心腹內攻刺疼痛腹脅虛脹宿食不消或時吐逆少思飲食硃砂細研水飛過半夏湯洗七次去滑共一兩川烏頭半兩去皮臍生用右為細末醋煮麵糊和丸如小豆大不拘時以生薑橘皮湯下三溫散治心疝冷痛不可忍附子炮製去皮臍蓬莪荗煨銼各一兩右為散每服一錢匕熱酒調下不拘時婦人醋湯下治三十年心疝神效方射干半兩吳茱茰二兩湯浸七次焙乾微炒右為末煉蜜和丸如菉豆大每服五丸以粥飲下日三服藥勢欲盡乃可喫熱食良木香散治心疝小腹痛悶已絶者木香陳皮各一兩良薑乾薑訶子皮赤芍藥枳實各半兩草豆蔲川芎黑牽牛各三錢右為末每服二錢水一盞煎至七分去滓溫服厥疝附論夫內經謂脈黃之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風夫疝臟疾言隱而難見隂沉而伏也今脾虛風寒客於膜腹之間不能興通行水穀之氣結而成積使氣道厥而通故謂之厥疝方蘹香丸治厥疝上攻腹痛無時蘹香子炒吳茱茰酒浸焙乾炒桂去粗皮胡椒楝實銼碎麩炒延胡索各半兩虻蟲去翅足炒海蛤芫花醋炒焦碙砂研木香共一兩右為末酒煮麵糊和丸梧桐子大每服十丸鹽酒下食前山茱茰丸治厥疝上搶心腹冷痛山茱茰吳茱茰湯洗焙乾食茱茰楝實銼碎麩炒馬藺花蘹香子焙青橘皮湯浸去白焙陳橘皮湯浸去白焙乾薑炮荆三稜炮各三兩附子一枚重兩半者炮製去皮臍右為末醋煮麵糊和丸如梧桐子大每服二十丸酒或鹽湯下空心服細辛丸治厥疝冷逆攻心腹痛細辛去苖葉芍藥吳茱茰湯浸焙乾炒人參白术桂去粗皮乾薑炮甘草炙銼當歸切焙附子炮製去皮臍各一兩右為末稀麵糊丸梧桐子大空心米飲下三十丸日三服木香湯治厥疝逆上攻心腹冷痛木香檳榔生銼烏頭炮製去皮臍細辛去苖葉當歸切焙吳茱茰湯浸焙乾炒枳壳去瓤麩炒甘草炙各一兩右㕮咀如麻豆每服三錢水一盞煎至七分去滓溫服不拘時吳茱茰湯出宣明論治厥疝腹中隂冷痛積氣上逆吳茱茰湯洗焙乾炒二兩烏頭炮製去臍皮細辛去苖葉各三分當歸切焙髙良薑銼炒乾薑炮桂去粗皮各一兩右銼如麻豆大每服五錢水三錢煎一盞去滓溫服日三當歸乾薑湯治厥疝腹中冷痛當歸切焙乾薑炮附子炮製去皮臍人參甘草炙細辛去苖葉芍藥各一兩右㕮咀如麻豆每服三錢水一盞煎七分去滓溫服不拘時卒疝附論夫卒疝者腎臟虛弱之人形寒飲冷暴受邪氣傳入經脈蓋是少隂腎經與太陽膀胱二經合為表裏卒然感寒熱相傳則津脈不得流通氣道結澀而腸滿攻臍腹牽引於隂暴發疼痛或曰汗出悶絶不省難可堪忍故卒疝也方蘹香煮散治卒疝攻小腸疼痛蘹香子炒枳壳去瓤麩炒木香芍藥厚朴去粗皮生薑汗炙陳皮桂去粗皮青橘皮湯浸去白焙乾薑炮製人參白茯苓去黑皮荆三稜各半兩生地黃焙三分右為散每服三錢匕水一盞蔥白二寸鹽少許煎七分熱服木香丸治卒疝腹痛不可忍木香桂去粗皮檳榔銼蓬莪术煨蘹香子炒桃仁去皮尖雙仁研膏共三分萊蔔子炒青橘皮湯浸去白焙各半兩厚朴去粗皮生薑汁炙一兩右將八味搗羅為末入桃仁膏和勻酒煮麵糊丸梧桐子大每服二十丸空心溫酒下食前茱茰湯治卒疝攻臍腹痛汗出悶絶吳茱茰湯浸焙乾炒半兩細辛去苖葉附子炮製去皮臍人參白茯苓去黑皮桂去粗皮半夏生薑汁製乾當歸右㕮咀如麻豆每服三錢水一盞生薑一片大棗二枚擘破煎七分去滓溫服不拘時乾薑湯治卒疝繞臍腹卒暴疼痛乾薑炮製白茯苓去黑皮椒去目并閉口炒出汗附子炮製去皮臍桂去粗皮芎藭當歸切乾芍藥一兩右㕮咀如麻豆每服二錢水一盞煎七分去滓溫服不拘時蜀椒散治卒疝心痛如刺繞臍腹中盡痛自汗出氣欲死方出本門寒疝心腹痛類薑术散治卒疝少腹中相引疼痛不可忍蒼术米泔浸切炒乾薑炮製馬藺花芫花醋炒焦五靈脂去皮烏頭炮製去皮臍各一兩右為末醋煮麵糊丸如梧桐子大每服十丸食前溫酒或鹽湯下當歸湯治卒疝心腹痛裏急當歸焙生薑芍藥各二兩羊肉切去脂膜半斤右將三味細切先以水五升煮羊肉爛熟去肉以汁煮藥候熟去滓澄清每服一盞不拘時走馬湯出聖惠方治卒疝無故心煩腹痛隂縮手足厥逆並治飛尸氣擊有尸􅠰兼治中惡心痛腹脹大便不通巴豆三個去皮心炒杏仁三個去皮心炒右味綿纒捶令碎熟湯二合捻取白汁飲之當下老少量與服之尤妙療鬼擊有尸􅠰者當蓄此藥用驗忌野豬肉蘆笋等物寒疝夫寒疝為病隂冷內積胃氣不行結於腹內故遇寒則發其狀惡寒不欲食手足冷繞臍痛自汗出遇寒則發其脈弦緊是也疝之為病隨臟氣虛實感傷外邪寒泣風散暑鬱濕著絞刺擊摶無有定處倉卒之際痛不堪忍世人稱為橫弦堅弦膀胱小腸氣賊風入腹等名義不同症狀則一寒則溫之風則散之暑則利之濕則燥之各有成法方四製茱萸香煉丹出德生堂方専治小腸疝氣陽事衰敗下元虛冷效吳茱茰一兩分作四分醋一分裝豬尿胞帶尿者酒浸煮一分浸去膜一分童子小便浸炒一分鹽澤㵼四兩川楝子四十九個巴豆二十個炒黃去巴豆枳壳去瓤炒木香陳皮青皮茴香鹽炒石菖蒲炒檳榔三稜煨桃仁去尖炒萆薢蓬术煨官桂白茯苓乳香共三兩别研荔枝核四十九枚右為細末酒糊為丸如梧桐子大每服五十丸空心鹽湯或酒下常服辟除邪氣食前空心服治腎經虛弱寒腫痛諸種疝氣吳茱萸湯出聖惠方治寒疝腰腹痛胸中冷氣上搶心脅支滿不得卧面目痛風寒悸悼多驚不能飲食已即嘔寒熱往來吳茱茰湯浸七遍焙乾微焙半夏浸七次去滓乾薑炮裂銼人參去蘆頭當歸銼碎微炒赤芍藥各三分細辛紫苑去苖土附子炮裂去皮熟乾地黃前胡去蘆頭赤茯苓白术桂心木香各一兩甘草炙微銼旋復花各半兩訶黎勒一兩半用皮右為末煉蜜和搗三二百杵丸如梧桐子大不拘時生薑湯下二十丸補腎湯出醫方集成治寒疝入腹上實下虛小腸疼痛時復泄㵼胸膈痞滿不進飲食常服溫脾補腎人參茯苓白术一兩黃蓍附子炮製去皮臍各一兩沉香四錢木瓜一兩半羌活半兩甘草炙芎藭各一分紫蘇三錢右為末每服三錢水一盞薑三片棗二枚煎七分去滓食前服嘔加半夏半兩添水作盞半薑七片煎治脅下風氣作塊寒疝發則連小腹痛湊心其積名屬肝在右脅下故病發則右邊手足頭面昏痛不思飲食止頭痛乾葛一兩麻黃三分側子一個川芎防風枳實芍藥桂枝羌活甘草當歸各四錢右為末每服四錢水一盞半薑三片同煎七分去滓通口服日三四服有汗避風木香湯方治寒疝攻注胸脅滿痛汗出木香三分檳榔銼細辛去苖葉赤茯苓去黑皮人參芍藥當歸切焙桂去粗皮前胡去蘆頭青橘皮湯浸去白焙已上各一兩右為散每服三錢水一盞煎七分去滓溫服不拘時茱茰內消丸出和劑方治腎與膀胱經虛為邪氣所摶結成寒疝伏留不去臍腹㽱痛刺小腸氣奔豚痃癖痛不可忍隂核偏成大膚囊癰腫結硬牽急重大滋長瘙癢疼痛時黃水瘡癢腰腿沉重足脛腫滿行步艱難纍經治療不見減瘥服之漸漸內消不動大腸亦不搜絞補虛消疝溫飬腎經此藥不熱無毒若至心服餌其效如神吳茱茰湯浸七次焙陳皮去白川楝子蒸去皮核肉桂去粗皮不見火馬藺花醋炙青皮去白山藥焙茴香炒山茱茰去核共二兩木香一兩不見火右為末酒糊丸梧桐子大每服三十丸至五十丸空心溫酒或鹽湯吞下桂心丸治寒疝胸脅支滿食飲不化臍腹㽱痛及嘔痢風痙齊項強急不得俯仰桂去粗皮五分吳茱茰湯浸焙乾炒三兩白薇一兩烏頭防葵各半兩蜀椒去目及閉口者炒白芷各三分乾薑炮芎藭各一兩右為末煉蜜丸如梧桐子大每服十丸溫酒下食前一方忌生蔥豬肉冷水茴香丸出儒門事親書治冷氣攻刺疝氣疼痛腎虛腳弱茴香八兩炒川楝子炒川烏炮去臍皮葳靈仙洗去土防風去蘆陳皮各三兩地龍一兩去土微炒烏藥五分赤小豆八兩右為末酒糊為丸每服三五丸茶酒下蓬莪术湯治寒疝四肢冷逆氣弱汗出蓬莪茂炮附子炮製去皮臍桂去粗皮檳榔芍藥各一兩芎藭白术共三分乾薑半兩炮右銼如麻豆大每服三錢水一盞煎七分去滓溫服不拘時人參湯治寒疝冷痛氣弱汗出不欲食人參白茯苓去黑皮共一兩蜀椒去目及閉口者炒出汗乾薑炮半兩附子炮製去