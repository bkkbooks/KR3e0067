時以熱酒調下一錢當歸散出聖恵方治寒疝心腹痛不下飲食痛甚引脇肋間及腹裏急者當歸剉碎炒乾姜炮製剉白术陳橘皮湯浸去白穰焙羊肉半斤細切蓽茇半兩右件藥除羊肉外為散以水三大盞合煮取兩大盞半去滓不拘時稍熱服一小盞椒附散出聖恵方治寒疝心腹痛如刺不下飲食自汗出氣欲絶川椒去目及閉口者微炒出汗乾姜炮製剉共半兩附子炮製去皮臍梹榔白术青橘皮湯浸去白穰共一兩右為散毎服三錢水一中盞入生姜半分棗三枚煎六分去滓不拘時稍熱服髙良姜羊肉湯出聖恵方治寒疝心腹痛及脇肋裏急不下飲食髙良姜剉赤芍藥剉當歸剉微炒桂心共一兩羊肉一斤半細切右件除羊肉外為散水五大盞合煮取兩盞半去滓不拘時稍熱服一小盞附子丸療寒疝下牽小腹心腹痛附子二兩炮去皮桃仁三兩去皮尖双仁熬蒺藜子一升去角尖熬右為末蜜和丸如梧子大空心酒下十丸漸加十五丸及二十丸日再服忌生菜熱麵炙肉笋蒜猪魚治寒疝心腹痛四肢逆冷不欲食出聖恵方髙良姜剉當歸剉微炒桂心各一兩右為細末不拘時熱酒送下一錢當歸湯出金匱方治寒疝心腹痛裏急當歸切三兩生姜切五兩羊肉去脂膜切作片一斤右以水一斗煮取五升去滓毎服一盞不拘時日三夜二若寒多者加生姜切一斤痛多而嘔者加橘皮二兩白术一兩加生姜者亦加水五升煮取三升二合服之治寒疝心腹脇引痛諸藥不可近者出本草以烏頭五枚大者去芒角及皮四破以白蜜一升煎令透潤取出焙乾搗篩又以熟蜜丸冷鹽湯吞下二十丸如梧子永除又法用煎烏頭蜜汁以桂枝湯五合解之飲三合不知加五合其知者如醉者以為中病寒疝積聚附論夫積聚者由寒氣在内所生也血氣虚弱風邪摶於腑臓寒多則氣澁而生積聚也積者隂氣五臓所生如發不離其部故上下有所窮也聚者陽氣六腑所成也故無根本上下無所留心但諸臓腑受邪初未能為積聚邪氣留滯不去乃成積聚其為病也或左右脇下如覆杯或臍上下如臂或胃管間覆大如盤羸痩少氣或洒淅寒熱四肢不收飲食不為肌膚或累累如桃李或腹滿嘔泄寒則痛故云寒疝積聚也其脉駃而𦂳積聚浮而牢積聚牢强急者生虛弱急者死也方續命散一名食茱茰圓治寒疝積聚邪氣徃来厥逆搶心痛羸瘦少氣胸脇滿不嗜食食茱茰二兩芍藥細辛去苖葉前胡去蘆頭各一兩一分乾姜炮烏頭炮裂去皮臍各二兩半紫苑去苖葉黄芩去黒心白术白薇芎藭人参生乾地黄焙各一兩一分方用熟地黄蜀椒去目及閉口炒出汗桂去粗皮各二兩半右為末煉蜜和丸如梧桐子大毎服七丸米飲或温酒下食前服一方無黄芩有當歸忌生冷油膩滑物桂心湯治寒疝積聚心腹疼痛結塊不消桂去粗皮大黄畧炮皮桔梗剉炒附子炒製去皮臍木香白术當歸切焙梹榔赤芍藥各一兩芎藭髙良姜剉炒枳實去穰麩炒共半兩右㕮咀如麻豆毎服三錢水一鍾煎七分去滓温酒服不拘時芫花丸出聖恵方治寒疝積聚動揺大者如鼈小者如杯乍来乍去在於胃管大腸不通風寒則腸鳴心下寒氣上搶胸脇支滿芫花二兩醋拌炒令乾椒目川大黄剉碎㣲炒細辛川烏頭炮製去皮臍赤芍藥赤茯苓桂心木香各一兩半夏湯洗七遍去滑桔梗去蘆頭吳茱茰湯浸七遍焙乾㣲炒各半兩右為末煉蜜和擣三二百杵丸如梧桐子大毎服以温酒下七丸日三服當下如泥其病即愈鼈甲湯治寒疝積聚心腹結痛飲食不下鼈甲醋炙去裙襴荆三稜炮剉大黄剉炒各一兩當歸切焙桂去麄木赤芍藥木香枳殻去瓤麩炒訶梨勒炮去皮梹榔各半兩剉右為散毎服三錢水一盞生姜三片煎七分去滓温服不拘時候桔梗丸治寒疝邪氣徃来堅固積聚不散多寒不得臥苦汗出大小便不利桔梗剉炒藜蘆去蘆頭炙各半兩葶藶子紙上熬厚朴去麄皮生姜汁塗炭剉附子去皮臍炮製各一兩一分人参沙参桂去麄皮各三分杏仁去皮尖双仁炒五十枚特生礜石一兩燒半日許右為末煉蜜和丸如梧桐子大毎服五丸或七丸米飲或温酒下日三桔梗丸出聖恵方治心腹牢強寒疝邪氣徃来堅固積聚苦寒煩悶不得眠臥夜苦汗出大便堅小便不利食不生肌桔梗去蘆頭甜葶藶㣲炒令香藜蘆去蘆頭微炙桂心厚朴去麄皮塗生姜汁炙令香熟附子炮製去皮臍當歸剉微炒鼈甲塗醋炙微黄去裙襴川大黄剉碎微炒各一兩杏仁五十枚湯浸去皮尖双仁麩炒微黄右為末煉蜜和擣三二百杵丸如梧桐子大毎於食前温酒下十五丸梹榔湯治寒疝積聚結塊攻注心腹脹滿梹榔生剉芎藭桔梗剉炒當歸切焙桂去麄皮赤芍藥白术木香各半兩大黄剉碎㣲炒一兩右為散毎服二錢七水一盞煎六分去滓温服不拘時木香湯治寒疝積聚来去攻擊疼痛不欲飲食木香訶梨勒皮炮梹榔剉厚朴去粗皮塗生姜汁炙青橘皮湯浸去白焙各半兩赤茯苓去黒皮三分白术人参桂去麄皮各一分右為散毎服三錢水一盞生姜三片煎七分去滓温服不拘時鼈甲丸出聖恵方治寒疝積聚固結不通繞臍切痛腹中脹滿風入五臓憂患所積用力不莭筋脉勞傷羸瘦不能飲食鼈甲一兩塗醋炙微黄去裙襴甘草炙㣲赤剉甜葶􅐗㣲炒令香桂心川烏頭炮製去皮臍川大黄剉碎微炒芎藭赤芍藥梹榔各半兩右為末煉蜜和搗三二百杵丸如梧桐子大毎服食前生姜橘皮湯下二十丸白术湯治寒疝凝結積聚不散攻注腹内疼痛不下飲食白术二兩赤茯苓去黑皮枳殻去瓤麩炒人参桔梗剉炒桂去麄皮荆三稜炮製梹榔剉各一兩右為散毎服三錢水一盞煎七分去滓温服不拘時梹榔湯治寒疝積聚胸腹堅急脹滿不飲食梹榔生剉桃仁去皮尖双仁炒郁李仁炒去皮木香荆三稜炮各一兩桂去麄皮青橘皮湯浸去白焙各半兩右為散毎服三錢水一盞生姜三片煎七分去滓温服不拘時候附子丸治寒疝冷心腹積聚繞臍切痛飲食不下附子炮製去皮臍吳茱茰湯浸七遍焙乾㣲炒細辛藁本川烏頭炮裂去皮臍梹榔各一兩右為末煉蜜和搗三二百杵丸如梧桐子大毎服以燒酒下二十丸日三四服蘹香子丸一名香橘散治寒疝積聚臍腹疼痛兩脇脹滿及一切冷氣刺痛皆治蘹香子炒梹榔炮剉荆三稜炮剉青橘皮湯浸去白鹽炒黄各半兩木香一分右為散毎服二錢入鹽少許沸湯㸃服不拘時香豉丸療積年腹内宿結疝冷氣及諸癖癥等香美爛豉曝乾㣲蒸令香即止小芥子揀去土石㣲熬令疝即止各一升右為末煉蜜丸空腹酒服二十丸漸加至三十丸日二服初服半劑以来腹中㣲繞痛勿怪之是此藥攻病之候隂疝附論黄帝鍼經曰足厥隂之脉環隂器抵小腹是動則病丈夫㿗疝即隂疝也嗜慾傷腎水涸竭無以滋榮肝氣故留滯内結發為隂疝之病也世俗論隂疝者為腎餘氣殊不知邪實又本於肝經也治法宜㵼邪氣之實補肝經之虛方昆布丸治隂疝腫大偏墜昆布洗去鹹炙海藻洗去鹹炙蒺藜子炒去角蕪荑仁炒梹榔剉各一兩半枳殻去瓤麩炒大麻仁研各二兩木香黄蓍剉訶梨勒炮去核各三分陳橘皮去白炒桃仁去皮尖双仁炒研兎絲子酒浸一宿别搗各一兩右為末和匀煉蜜丸如梧桐子大毎服三十丸空心食前温酒或鹽湯下葫蘆巴煮散治隂疝攻痛葫蘆巴沉香馬藺花蓬莪荗煨剉蘹香子炒各半兩楝實取肉麩炒木香姜黄梹榔剉桂去麄皮各一兩附子炮製去皮臍三分甘草炙剉半兩右為散毎服三錢水半盞煎七分空心食前和滓温服葫蘆巴丸治隂疝氣攻疼痛葫蘆巴補骨脂白豆蔲去皮青橘皮去白焙萆薢蘹香子炒附子炮製去皮臍肉蓯蓉酒浸切焙牛膝酒浸切焙桂去麄皮防風去蘆兎絲子酒浸搗各一兩右為末酒煮麵糊為丸如菉豆大毎服二十丸空心生姜鹽湯下桃仁湯治隂疝牽引小腹痛桃仁去皮尖双仁炒吳茱茰湯洗焙乾炒陳橘皮去白切焙桂去麄皮海藻湯洗去鹹炙各一兩白茯苓去黑皮羗活去蘆頭蒺藜子炒去角各一兩半梹榔十枚剉右為散毎服五錢水一盞半生姜五片煎八分去滓温服不拘時川烏頭丸出聖恵方治隂疝積聚繞臍腹疼痛飲食不下川烏頭炮製去皮臍荆三稜煨剉桂心木香郁李仁湯洗去㣲剉各一兩吳茱茰湯浸七遍焙乾微炒細辛甘草炙微赤剉藁本各半兩右為末煉蜜和搗三二百杵丸如梧桐子大毎服二十丸生姜湯下川烏頭散治隂疝腹腰痛手足逆冷身體疼痛針炙諸藥所不能任者川烏頭十枚炮製去皮臍桂枝二兩右為散毎服二錢水一盞生姜半分煎五分下蜜半合更煎三沸令熱食前和滓温服椒附丸治隂疝腫痛上攻臍腹蜀椒去目并閉口炒出汗一兩附子炮製去皮臍桂去麄皮巴㦸天去心桃仁去皮尖双仁炒研芎藭當歸切炒各半兩右為末煉蜜丸如梧桐子大毎服二十丸空心日午夜臥温酒下木香丸治隂疝急脹疼痛卵腫木香陳橘皮去白炒莱菔子炒青橘皮去白炒桂去麄皮各一兩牽牛子炒二兩右為末煉蜜丸如梧桐子大毎服二十丸温酒下以利為度二氣丸治隂疝上而不下臍腹疼痛石硫黄研黑鉛各一兩右先以鉛於銚内鎔成汁次下硫黄炒煙㷔透移下候冷取出研為細末糯米糊丸如梧桐子大毎服二十丸温酒下蒺藜湯出衛生寳鑑治隂疝牽引小腹痛諸厥疝即隂疝也嘻欲勞痛不可忍之蒺藜子炒去角附子炮製去皮臍山梔子仁各一兩右㕮咀如麻豆毎服五錢水一盞半煎八分去滓食前温服控睾證茴香陳實丸亦治沙参散治隂疝牽引疼痛沙参一兩半桂去麄皮半兩桃仁四十九枚去皮尖双仁炒研右為散毎服二十丸温酒調下不拘時應痛丸治隂疝撮痛不可忍者韭子炒芎藭右等分為末煉蜜丸如梧桐子大毎服三十丸空心温酒下隂疝腫縮附論夫隂疝腫縮者寒邪客於厥隂之經而陽氣不能自温故令諸筋拘急隂器𦂳縮而腫痛也肝者筋之合也筋者聚於隂器而絡於舌本脉不榮即筋縮急則引卵與舌故舌卷卵縮者皆厥隂為病也方碙砂丸治隂疝腫縮疼痛碙砂研木香各半兩楝實去核炒蘹香子炒荆三稜炮各一兩右為末煉蜜丸如梧桐子大毎服二十丸空心酒下消腎丸治下部腎囊脹腫擊攻疼痛牽牛半斤取頭末四兩二兩炒熟二兩生用香附子净一兩半兩炒半兩生用破故紙一兩半兩炒半兩生用青木香一兩半兩炒半兩生用川楝子半兩半炒半生用右為細末用大蒜二十箇半煨半生爛搗三五百下丸如梧桐子大毎服五十丸空心葱鹽湯下取大便三二行不利再加如利大减忌濕麵狼毒丸治隂疝腫縮疼痛氣欲絶狼毒炙二兩防葵炮附子炮製去皮臍各一兩右為末煉蜜丸如梧桐子大毎服十丸温酒下空心日午臨臥服黄連丸治隂疝腫縮黄連去鬚熟艾炙杏仁去皮尖白研各半兩右為末煉蜜丸如梧桐子大毎服二十丸用鹽湯下空心服萵苣熨方治隂疝腫縮疼痛萵苣切半斤皂莢剉碎三挺蜀椒去目及閉口者炒出汗一兩右三味少用水煮令相得不可太稀乗熱用布三兩重褁熨腫處冷即易頻熨自消雄黄洗方治隂疝腫縮痛人所不能忍及隂腫大如斗核痛者雄黄研甘草各一兩礬石研二兩右為末毎用藥一兩熟湯五升通手洗腫處良乆再煖洗至冷候汗出瘥集驗方無礬石只二味雞翅灰散治隂疝腫縮雞翅左右俱用不限多少燒灰以細研為散毎服二錢温酒調下不拘時槐子丸治隂疝腫縮槐子炒一兩右為末煉蜜丸如梧桐子大毎服二十丸温酒下空心服蔓菁散塗方治隂疝腫縮蔓菁根不拘多少剉碎右為散温水調塗腫處或以絹帛敷之以瘥為度車前子塗方治隂疝腫縮車前子不拘多少右為末湯調塗腫處一方酒調服之狼毒丸治男子隂乆卒縮入腹急痛欲死名隂疝狼毒四兩防風二兩附子三兩右為末鍊蜜丸如梧桐子大毎服三丸日夜三度治男子隂疝右用槐白皮煎淋浴普濟方卷二百四十八
