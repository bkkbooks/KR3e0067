時以熱酒調下一錢當歸散出聖惠方治寒疝心腹痛不下飲食痛甚引脅肋間及腹裏急者當歸銼碎炒乾薑炮製銼白术陳橘皮湯浸去白穰焙羊肉半斤細切蓽茇半兩右件藥除羊肉外為散以水三大盞合煮取兩大盞半去滓不拘時稍熱服一小盞椒附散出聖惠方治寒疝心腹痛如刺不下飲食自汗出氣欲絶川椒去目及閉口者微炒出汗乾薑炮製銼共半兩附子炮製去皮臍檳榔白术青橘皮湯浸去白穰共一兩右為散每服三錢水一中盞入生薑半分棗三枚煎六分去滓不拘時稍熱服髙良薑羊肉湯出聖惠方治寒疝心腹痛及脅肋裏急不下飲食髙良薑銼赤芍藥銼當歸銼微炒桂心共一兩羊肉一斤半細切右件除羊肉外為散水五大盞合煮取兩盞半去滓不拘時稍熱服一小盞附子丸療寒疝下牽小腹心腹痛附子二兩炮去皮桃仁三兩去皮尖雙仁熬蒺藜子一升去角尖熬右為末蜜和丸如梧子大空心酒下十丸漸加十五丸及二十丸日再服忌生菜熱麵炙肉笋蒜豬魚治寒疝心腹痛四肢逆冷不欲食出聖惠方髙良薑銼當歸銼微炒桂心各一兩右為細末不拘時熱酒送下一錢當歸湯出金匱方治寒疝心腹痛裏急當歸切三兩生薑切五兩羊肉去脂膜切作片一斤右以水一斗煮取五升去滓每服一盞不拘時日三夜二若寒多者加生薑切一斤痛多而嘔者加橘皮二兩白术一兩加生薑者亦加水五升煮取三升二合服之治寒疝心腹脅引痛諸藥不可近者出本草以烏頭五枚大者去芒角及皮四破以白蜜一升煎令透潤取出焙乾搗篩又以熟蜜丸冷鹽湯吞下二十丸如梧子永除又法用煎烏頭蜜汁以桂枝湯五合解之飲三合不知加五合其知者如醉者以為中病寒疝積聚附論夫積聚者由寒氣在內所生也血氣虛弱風邪摶於腑臟寒多則氣澀而生積聚也積者隂氣五臟所生如發不離其部故上下有所窮也聚者陽氣六腑所成也故無根本上下無所留心但諸臟腑受邪初未能為積聚邪氣留滯不去乃成積聚其為病也或左右脅下如覆杯或臍上下如臂或胃管間覆大如盤羸瘦少氣或灑淅寒熱四肢不收飲食不為肌膚或纍纍如桃李或腹滿嘔泄寒則痛故云寒疝積聚也其脈駃而緊積聚浮而牢積聚牢強急者生虛弱急者死也方續命散一名食茱茰圓治寒疝積聚邪氣往來厥逆搶心痛羸瘦少氣胸脅滿不嗜食食茱茰二兩芍藥細辛去苖葉前胡去蘆頭各一兩一分乾薑炮烏頭炮裂去皮臍各二兩半紫苑去苖葉黃芩去黑心白术白薇芎藭人參生乾地黃焙各一兩一分方用熟地黃蜀椒去目及閉口炒出汗桂去粗皮各二兩半右為末煉蜜和丸如梧桐子大每服七丸米飲或溫酒下食前服一方無黃芩有當歸忌生冷油膩滑物桂心湯治寒疝積聚心腹疼痛結塊不消桂去粗皮大黃略炮皮桔梗銼炒附子炒製去皮臍木香白术當歸切焙檳榔赤芍藥各一兩芎藭髙良薑銼炒枳實去穰麩炒共半兩右㕮咀如麻豆每服三錢水一鍾煎七分去滓溫酒服不拘時芫花丸出聖惠方治寒疝積聚動搖大者如鱉小者如杯乍來乍去在於胃管大腸不通風寒則腸鳴心下寒氣上搶胸脅支滿芫花二兩醋拌炒令乾椒目川大黃銼碎微炒細辛川烏頭炮製去皮臍赤芍藥赤茯苓桂心木香各一兩半夏湯洗七遍去滑桔梗去蘆頭吳茱茰湯浸七遍焙乾微炒各半兩右為末煉蜜和搗三二百杵丸如梧桐子大每服以溫酒下七丸日三服當下如泥其病即愈鱉甲湯治寒疝積聚心腹結痛飲食不下鱉甲醋炙去裙襴荆三稜炮銼大黃銼炒各一兩當歸切焙桂去粗木赤芍藥木香枳殼去瓤麩炒訶梨勒炮去皮檳榔各半兩銼右為散每服三錢水一盞生薑三片煎七分去滓溫服不拘時候桔梗丸治寒疝邪氣往來堅固積聚不散多寒不得臥苦汗出大小便不利桔梗銼炒藜蘆去蘆頭炙各半兩葶藶子紙上熬厚朴去粗皮生薑汁塗炭銼附子去皮臍炮製各一兩一分人參沙參桂去粗皮各三分杏仁去皮尖雙仁炒五十枚特生礜石一兩燒半日許右為末煉蜜和丸如梧桐子大每服五丸或七丸米飲或溫酒下日三桔梗丸出聖惠方治心腹牢強寒疝邪氣往來堅固積聚苦寒煩悶不得眠臥夜苦汗出大便堅小便不利食不生肌桔梗去蘆頭甜葶藶微炒令香藜蘆去蘆頭微炙桂心厚朴去粗皮塗生薑汁炙令香熟附子炮製去皮臍當歸銼微炒鱉甲塗醋炙微黃去裙襴川大黃銼碎微炒各一兩杏仁五十枚湯浸去皮尖雙仁麩炒微黃右為末煉蜜和搗三二百杵丸如梧桐子大每於食前溫酒下十五丸檳榔湯治寒疝積聚結塊攻注心腹脹滿檳榔生銼芎藭桔梗銼炒當歸切焙桂去粗皮赤芍藥白术木香各半兩大黃銼碎微炒一兩右為散每服二錢七水一盞煎六分去滓溫服不拘時木香湯治寒疝積聚來去攻擊疼痛不欲飲食木香訶梨勒皮炮檳榔銼厚朴去粗皮塗生薑汁炙青橘皮湯浸去白焙各半兩赤茯苓去黑皮三分白术人參桂去粗皮各一分右為散每服三錢水一盞生薑三片煎七分去滓溫服不拘時鱉甲丸出聖惠方治寒疝積聚固結不通繞臍切痛腹中脹滿風入五臟憂患所積用力不莭筋脈勞傷羸瘦不能飲食鱉甲一兩塗醋炙微黃去裙襴甘草炙微赤銼甜葶􅐗微炒令香桂心川烏頭炮製去皮臍川大黃銼碎微炒芎藭赤芍藥檳榔各半兩右為末煉蜜和搗三二百杵丸如梧桐子大每服食前生薑橘皮湯下二十丸白术湯治寒疝凝結積聚不散攻注腹內疼痛不下飲食白术二兩赤茯苓去黑皮枳殼去瓤麩炒人參桔梗銼炒桂去粗皮荆三稜炮製檳榔銼各一兩右為散每服三錢水一盞煎七分去滓溫服不拘時檳榔湯治寒疝積聚胸腹堅急脹滿不飲食檳榔生銼桃仁去皮尖雙仁炒郁李仁炒去皮木香荆三稜炮各一兩桂去粗皮青橘皮湯浸去白焙各半兩右為散每服三錢水一盞生薑三片煎七分去滓溫服不拘時候附子丸治寒疝冷心腹積聚繞臍切痛飲食不下附子炮製去皮臍吳茱茰湯浸七遍焙乾微炒細辛藁本川烏頭炮裂去皮臍檳榔各一兩右為末煉蜜和搗三二百杵丸如梧桐子大每服以燒酒下二十丸日三四服蘹香子丸一名香橘散治寒疝積聚臍腹疼痛兩脅脹滿及一切冷氣刺痛皆治蘹香子炒檳榔炮銼荆三稜炮銼青橘皮湯浸去白鹽炒黃各半兩木香一分右為散每服二錢入鹽少許沸湯點服不拘時香豉丸療積年腹內宿結疝冷氣及諸癖癥等香美爛豉曝乾微蒸令香即止小芥子揀去土石微熬令疝即止各一升右為末煉蜜丸空腹酒服二十丸漸加至三十丸日二服初服半劑以來腹中微繞痛勿怪之是此藥攻病之候隂疝附論黃帝針經曰足厥隂之脈環隂器抵小腹是動則病丈夫㿗疝即隂疝也嗜欲傷腎水涸竭無以滋榮肝氣故留滯內結發為隂疝之病也世俗論隂疝者為腎餘氣殊不知邪實又本於肝經也治法宜㵼邪氣之實補肝經之虛方昆布丸治隂疝腫大偏墜昆布洗去鹹炙海藻洗去鹹炙蒺藜子炒去角蕪荑仁炒檳榔銼各一兩半枳殼去瓤麩炒大麻仁研各二兩木香黃蓍銼訶梨勒炮去核各三分陳橘皮去白炒桃仁去皮尖雙仁炒研兔絲子酒浸一宿别搗各一兩右為末和勻煉蜜丸如梧桐子大每服三十丸空心食前溫酒或鹽湯下葫蘆巴煮散治隂疝攻痛葫蘆巴沉香馬藺花蓬莪荗煨銼蘹香子炒各半兩楝實取肉麩炒木香薑黃檳榔銼桂去粗皮各一兩附子炮製去皮臍三分甘草炙銼半兩右為散每服三錢水半盞煎七分空心食前和滓溫服葫蘆巴丸治隂疝氣攻疼痛葫蘆巴補骨脂白豆蔲去皮青橘皮去白焙萆薢蘹香子炒附子炮製去皮臍肉蓯蓉酒浸切焙牛膝酒浸切焙桂去粗皮防風去蘆兔絲子酒浸搗各一兩右為末酒煮麵糊為丸如菉豆大每服二十丸空心生薑鹽湯下桃仁湯治隂疝牽引小腹痛桃仁去皮尖雙仁炒吳茱茰湯洗焙乾炒陳橘皮去白切焙桂去粗皮海藻湯洗去鹹炙各一兩白茯苓去黑皮羌活去蘆頭蒺藜子炒去角各一兩半檳榔十枚銼右為散每服五錢水一盞半生薑五片煎八分去滓溫服不拘時川烏頭丸出聖惠方治隂疝積聚繞臍腹疼痛飲食不下川烏頭炮製去皮臍荆三稜煨銼桂心木香郁李仁湯洗去微銼各一兩吳茱茰湯浸七遍焙乾微炒細辛甘草炙微赤銼藁本各半兩右為末煉蜜和搗三二百杵丸如梧桐子大每服二十丸生薑湯下川烏頭散治隂疝腹腰痛手足逆冷身體疼痛針炙諸藥所不能任者川烏頭十枚炮製去皮臍桂枝二兩右為散每服二錢水一盞生薑半分煎五分下蜜半合更煎三沸令熱食前和滓溫服椒附丸治隂疝腫痛上攻臍腹蜀椒去目并閉口炒出汗一兩附子炮製去皮臍桂去粗皮巴戟天去心桃仁去皮尖雙仁炒研芎藭當歸切炒各半兩右為末煉蜜丸如梧桐子大每服二十丸空心日午夜臥溫酒下木香丸治隂疝急脹疼痛卵腫木香陳橘皮去白炒萊蔔子炒青橘皮去白炒桂去粗皮各一兩牽牛子炒二兩右為末煉蜜丸如梧桐子大每服二十丸溫酒下以利為度二氣丸治隂疝上而不下臍腹疼痛石硫黃研黑鉛各一兩右先以鉛於銚內鎔成汁次下硫黃炒煙焰透移下候冷取出研為細末糯米糊丸如梧桐子大每服二十丸溫酒下蒺藜湯出衛生寶鑑治隂疝牽引小腹痛諸厥疝即隂疝也嘻欲勞痛不可忍之蒺藜子炒去角附子炮製去皮臍山梔子仁各一兩右㕮咀如麻豆每服五錢水一盞半煎八分去滓食前溫服控皋證茴香陳實丸亦治沙參散治隂疝牽引疼痛沙參一兩半桂去粗皮半兩桃仁四十九枚去皮尖雙仁炒研右為散每服二十丸溫酒調下不拘時應痛丸治隂疝撮痛不可忍者韭子炒芎藭右等分為末煉蜜丸如梧桐子大每服三十丸空心溫酒下隂疝腫縮附論夫隂疝腫縮者寒邪客於厥隂之經而陽氣不能自溫故令諸筋拘急隂器緊縮而腫痛也肝者筋之合也筋者聚於隂器而絡於舌本脈不榮即筋縮急則引卵與舌故舌卷卵縮者皆厥隂為病也方碙砂丸治隂疝腫縮疼痛碙砂研木香各半兩楝實去核炒蘹香子炒荆三稜炮各一兩右為末煉蜜丸如梧桐子大每服二十丸空心酒下消腎丸治下部腎囊脹腫擊攻疼痛牽牛半斤取頭末四兩二兩炒熟二兩生用香附子淨一兩半兩炒半兩生用破故紙一兩半兩炒半兩生用青木香一兩半兩炒半兩生用川楝子半兩半炒半生用右為細末用大蒜二十箇半煨半生爛搗三五百下丸如梧桐子大每服五十丸空心蔥鹽湯下取大便三二行不利再加如利大減忌濕麵狼毒丸治隂疝腫縮疼痛氣欲絶狼毒炙二兩防葵炮附子炮製去皮臍各一兩右為末煉蜜丸如梧桐子大每服十丸溫酒下空心日午臨臥服黃連丸治隂疝腫縮黃連去鬚熟艾炙杏仁去皮尖白研各半兩右為末煉蜜丸如梧桐子大每服二十丸用鹽湯下空心服萵苣尉方治隂疝腫縮疼痛萵苣切半斤皂莢銼碎三挺蜀椒去目及閉口者炒出汗一兩右三味少用水煮令相得不可太稀乘熱用布三兩重褁尉腫處冷即易頻尉自消雄黃洗方治隂疝腫縮痛人所不能忍及隂腫大如斗核痛者雄黃研甘草各一兩礬石研二兩右為末每用藥一兩熟湯五升通手洗腫處良久再暖洗至冷候汗出瘥集驗方無礬石只二味雞翅灰散治隂疝腫縮雞翅左右俱用不限多少燒灰以細研為散每服二錢溫酒調下不拘時槐子丸治隂疝腫縮槐子炒一兩右為末煉蜜丸如梧桐子大每服二十丸溫酒下空心服蔓菁散塗方治隂疝腫縮蔓菁根不拘多少銼碎右為散溫水調塗腫處或以絹帛敷之以瘥為度車前子塗方治隂疝腫縮車前子不拘多少右為末湯調塗腫處一方酒調服之狼毒丸治男子隂久卒縮入腹急痛欲死名隂疝狼毒四兩防風二兩附子三兩右為末鍊蜜丸如梧桐子大每服三丸日夜三度治男子隂疝右用槐白皮煎淋浴普濟方卷二百四十八
