𤓰子各一兩右將五味搗羅細末入研藥和勻别用麻黄去根節二兩搗羅為末以酒一升慢火熬為膏更入煉蜜同和藥丸如梧桐子大每服十五丸至二十丸温酒下荆芥湯亦得羌活湯一名葛根湯出聖惠方治柔風身體疼痛四肢緩弱欲起不遂并治産後中風四肢不能收攝羌活熟乾地黄焙桂去粗皮葛根剉芍藥麻黄去根節先煮掠去沫焙甘草炙各一兩半右搗篩每服五錢匕清酒一盞水一盞入生薑半分切碎煎至一盞去滓温服日二夜一一方有芎藭一兩用棗三枚同煎忌生冷油膩猪鷄魚等物附子煎治柔風四肢不收腹中拘急附子炮製去皮臍黒豆洗一升天雄炮製去皮臍五兩防風去义三兩已上四味將三味細研并豆用酒一斗五升煮候豆爛絞去滓汁取更用天麻芎藭各五兩右共六味將此二味搗羅為散與前豆藥汁同煎如稀餳每日空心熱湯或温酒調服一匙頭紫葛散治柔風四肢不収腹内拘急兼治婦人産後中風葛根剉防風去义羌活去蘆頭甘草炙剉黄連去鬚半兩右為散每服二錢匕温酒調下㯽榔湯治柔風四肢不能收攝并風毒脚氣行履不得㯽榔煨七枚剉黒豆小者炒二升桑根白皮炙剉二兩郁李仁去皮尖炒半兩右麄搗篩每服五錢匕水一盞入生薑半分碎切煎至一盞去滓空心臨卧温服地膚子散治柔風肢體弛緩不收裏急不能飬息兼治婦人産後中風地膚子炒二兩紫葛剉兩半白頭翁剉炒一兩右為散毎服二錢半加至三錢匕温酒調下蓯蓉丸治柔風舉體無力四肢緩弱不能行立肉蓯蓉酒浸切焙牛膝去苗酒浸切焙兔絲子酒浸别搗各一兩右為末用白麵二兩附子生去皮臍為末一兩共用酒煑為丸如梧桐子大每服二十丸食前温酒下石膏散治柔風身體疼痛自汗出石膏别研如粉一兩甘草炙剉三分右為散每服二錢匕温酒調下日四服不拘時仙人杖浸酒方治柔風脚膝痿弱久積風毒上衝肩膊胷皆疼痛婦人産後中風用仙人杖一個四兩先刮去土皮剉枸杞根白皮是也用生絹囊貯以酒二斗浸七日每日温飲一盞至二盞不拘時酒欲盡再入五升依前浸服兼治一切熱毒風附子湯一名煑豆法出十便良方治柔風筋骨緩弱不能行立及治頭風用附子炮去皮臍一兩㕮咀如麻豆大以水五升菉豆五合同煑至三升絞去滓每服半盞細細飲之空心日午卧服柳蚛糞熨方治柔風筋骨疼痛手脚拳攣用柳蚛糞二升甑上炊一飯頃如無柳蚛糞用大豆五斗蒸熱攤於床上著舊夾衣盖襯令人卧蒸熨所患處牛蒡子酒出聖惠方治柔風乆不差四肢緩弱牛蒡子三兩生薑地黄三兩枸杞子三兩牛膝五兩去苗右藥細剉用生絹袋盛以好酒二㪷於瓷器内浸宻封夏春七日秋冬二七日後每日空心温服一小盞晩食後再服常令醺醺為妙風嚲曵附論夫人假水榖之精化為氣血周流一身使四肢相随筋脉相續猶挈衣領無所不從若脾胃虛弱水榖不化筋脉無所禀養復遇風邪外摶膚腠流傳筋脉縱緩則肢體嚲曵其嚲偏而不舉曵則弛而不遂是皆不能收攝也方赤箭丸出聖惠方治風邪所攻肌膚虛弱手足嚲曵筋脉不利赤箭二兩天雄去皮臍丹参川烏頭天南星獨活防風去蘆頭五加皮桂心白花蛇肉芎藭白附子牛膝去苖仙靈脾白殭蠶桑螵蛸㯽榔細辛酸棗仁乾蝎野狐肝蒺藜子萆薢剉各一兩麻黄一兩半去根節牛黄半兩細剉硃砂一兩細研水飛過麝香半兩細研龍腦一分細研右並生用都搗為末研了藥都研令勻煉蜜和搗五七百杵丸如梧桐子大每服食前以温酒下二十丸忌生冷油膩毒滑魚肉羊血犀角丸出聖惠方治風嚲曵手脚不能收攝肌膚頑痺筋脉不利心神恍惚骨節疼痛犀角屑羚羊角屑各半兩牛黄細研麝香細研各一分天麻白附子炮裂各一兩蟬殻牛膝去苗防風去蘆頭各半兩桂心當歸芎藭羌活白殭蠶㣲炒五加皮各半兩烏蛇肉二兩酒浸炙㣲黄薏苡仁半兩麻黄去根節硃砂細研水飛過各一兩逺志半兩去心金薄五十片細研銀薄五十片細研仙靈脾道人頭各一兩地骨皮半兩右搗羅為末入研了藥令勻煉蜜和搗五七百杵丸如梧桐子大每服食前以温酒下二十丸加至三十丸忌生冷羊血生犀天麻丸治一切風手足嚲曵肢體麻痺不仁及骨節疼痛口面偏斜痰涎語澁心忪驚悸並宜服之犀角鎊一兩天麻酒浸二兩地榆去苗𤣥参丁香烏頭炮裂去皮臍烏藥木香丹砂研各一兩乳香研龍腦研麝香研牛黄研真珠研琥珀研自然銅火醋淬各半兩安息香一兩細研酒化慢火熬綿絹濾去砂石冄熬成膏用麻黄去根節一兩白花蛇酒浸一宿去皮骨一兩蝎稍一分炒天南星用牛膽内櫃者防風去义各半兩右除别研膏外為細末再合研令勻將安息膏更别煉蜜和丸如櫻桃大每服一丸温酒或荆芥薄荷湯嚼下其諸藥末丸如梧桐子大每服二十丸温酒下當歸散治毒風嚲曵手脚不遂身體緩弱或風入五臟精神恍惚多言善忘有時恐怖肢節煩疼頭眩心悶腹滿不食當歸羚羊角屑各二分黄芩川烏頭半兩炮裂去皮臍赤芍藥逺志去心各半兩獨活三分五味子防風去蘆頭芎藭各半兩麻黄一兩去根節秦艽三分去苗桂心石斛去根節五加皮三分石膏一兩杏仁三分湯浸去皮尖雙仁麩炒㣲黄甘草炙㣲赤剉半兩右搗羅為散每服四錢以水一中盞入生薑半分煎六分去滓不拘時候稍熱忌生冷猪鷄犬肉毒魚滑物天麻丸治一切風手足嚲曵肢體不遂及骨節疼痛口面偏斜痰涎語澁心忪驚悸犀角鎊一兩天麻酒炙二兩獨活去蘆頭人参丁香木香烏藥麻黄去根節各一兩牛膝研龍腦研琥珀研乳香真珠研麝香研各一分天南星牛膽櫃者防風去义各半兩白花蛇酒浸去皮骨炙三分蝎稍炒一分芎藭一兩安息香酒化研去砂石熬成膏右除研化外為細末再研令匀入安息膏并煉蜜和丸如梧桐子大每服二十丸温酒下荆芥湯亦得不拘時候仙靈脾丸治風嚲曵手足麻痺屈伸不得仙靈脾牛膝去苗芎藭各一兩牛黄一分細研麻黄去根節一兩烏蛇肉二兩酒浸炙㣲黄天麻莽草一兩㣲炒白附子炮製各一兩天雄半兩炮製去皮臍防風去蘆頭獨活去蘆當歸剉㣲炒硃砂半兩細研桂心各一兩細辛半兩白殭蠶㣲炒一兩麝香一分細研右搗羅為末都研令匀煉蜜和搗三五百杵丸如梧桐子大每服食前以豆淋酒下十丸忌毒滑魚肉羊血等獨活散治卒中惡風口噤不能言四肢嚲曵緩弱疼痛風經五臟恍惚恚怒無常獨活二兩白芍藥白术葛根剉白茯苓防風去蘆頭茵芋細辛甘草炙㣲赤剉漢防己芎藭酸棗仁桂心人参去蘆頭各一兩五加皮二兩麻黄二兩去根節川烏頭一兩炮製去皮臍右搗麄羅為散每服四錢以水一中盞煎至五分去滓入竹瀝一合更煎一兩沸不計時候稍熱服側子丸治毒風嚲曵四肢不收或攣急頑痺側子一兩炮製去皮臍白附子炮製天南星炮製白殭蠶㣲炒防己萆薢剉躑躅花酒拌炒乾牛膝去苖芎藭各半兩烏蛇肉酒浸炙㣲黄天麻各一兩羚羊角屑細研麝香細研一分硫黄細研乾蝎㣲炒各半兩桂心右搗羅為末研入牛黄麝香等以水煮槐膠三兩更入少熟蜜同和搗五七百杵丸如梧桐子大每服食前以熱酒下十丸研服忌生冷油膩毒滑魚肉天南星丸治一切風手足麻痺嚲曵或即腫痒疼痛天南星臘月牛膽匱者三分白芷一兩半麻黄去根節一兩防風去义一兩半羌活去蘆頭獨活去蘆頭芎藭天麻白芍藥桔梗剉炒細辛去苖葉白殭蠶炒各半兩甘草炙一分半乾薑焙一分龍腦研一錢麝香研一分右除研外為細末和令勻煉蜜丸如杏核大丹砂為衣每服一丸嚼細以薄荷温酒下不計時候傷寒頭昏痛肢疼者薄荷茶下併喫三兩服尤妙小八風散治風虛百病肢體嚲曵不遂人参去蘆頭當歸天雄炮製去皮臍附子炮製去皮臍防風去蘆頭獨活各一兩川椒半兩去目及閉口者炒㣲去汗用天門冬一兩去心焙乾薑三分炮製剉山茱茰五味子各半兩麻黄半兩去根節前胡一兩去蘆頭白芷三分莽草半兩㣲炙右搗細羅為散每服不計時候以温酒調下二錢忌生冷油膩鯉魚猪肉附子湯治風嚲曵手足不遂身體不能俛仰附子炮製去皮臍乾薑炮甘草炙防風去义獨活去蘆頭各一兩半石膏碎白茯苓去黒皮白术芎藭柴胡去苖當歸酒浸切焙人参各一兩杏仁去皮尖雙仁炒研二十枚細辛去苖葉一兩右剉如麻豆每服五錢匕水酒共一盞半煎至一盞去滓温服日三羸弱者只用水煎服羚羊角湯治風嚲曵及癱緩不遂等疾羚羊角鎊一兩半防風去义半兩防己杏仁去皮尖雙仁炒研各一兩半側子炮製去皮臍半兩五加皮二兩磁石生杵碎八兩薑炮芍藥麻黄去根節各一兩半薏苡仁二兩芎藭秦艽去苖土甘草炙各半兩右㕮咀如麻豆每服三錢七水一盞煎至七分去滓温服日三夜一防風散出聖惠方治風奄忽不能言四肢嚲曵皮肉痛痒不知防風去蘆頭獨活各二兩芎藭赤茯苓當歸葛根剉桂心各一兩麻黄去根節附子炮製去皮臍各二兩細辛漢防己甘草炙㣲赤剉各一兩右麄搗羅為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服獨活湯治風嚲曵肢體不能收攝方見中風半身不遂類天麻丸出王氏普濟方治中風嚲曵手足不收口眼不正語言蹇澁大治筋骨疼痛天麻附子炮製去皮臍乾蝎全者炒白殭蠶直者炒芎藭牛膝去苖酒浸切焙各一兩乾薑炮甘草炙各半兩右為細末煉蜜丸如梧桐子大每服二十丸温酒下常服大治筋骨疼痛至妙獨活湯治中風手足嚲曵不能言獨活去蘆頭甘草炙桂去粗皮生葛根芍藥括蔞實各一兩右剉如麻豆每服五錢匕水一盞半生薑三片煎取一盞去滓温服日三夜一羚羊角丸治中風顫掉嚲曳語澁羚羊角鎊一兩犀角鎊三分羌活去蘆頭防風去义薏苡仁炒秦芁洗各二兩右為末煉蜜丸如梧桐子大每服二十丸煎竹葉湯下漸加至三十丸薑附湯一名乾薑附子湯治風嚲曵肢體緩弱不相繼續方見中風半身不遂類百部散治中風嚲曵攣躄不能起百部一兩烏頭炮製去皮臍各一兩牛膝去苖切灑酒焙白术各半兩右為散每服一錢匕温酒調下漸加至二錢匕日三夜一烏頭丸一名大聖丸治中風手足嚲曵口眼喎斜語言蹇澁歩履不正神效方見風癎類敗龜丸一名敗龜散治中風手足顫掉嚲曵方見中風類蘇木煎丸出經驗方治中風手足嚲曵或麻痺不仁羌活獨活川芎各一兩附子醋酒浸一宿炮製去皮臍雄黄二錢研入右别用好大蘇木一兩剉搗碎以米醋法酒各一升銀石器中慢火熬至半升以來濾去滓和上件藥末入臼杵五七百下丸如小豆大粒每服七丸加至十丸十五丸煎開化了蘿蔔根湯下中風手足不遂用海桐皮并金銀煎湯下空心時一服三服神效普濟方卷九十五
