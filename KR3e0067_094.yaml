body:
  text: 普濟方卷九十五明周王朱橚撰諸風門風脚軟附論夫脚軟者腎氣不足風濕所乘也腎主腰脚若其氣不足則骨髓虛弱榮衞乏竭重以風濕内攻流注於脚故令膝腕樞紐不用歩履無力也方烏頭丸出聖濟總録治風脚膝軟腕樞紐不用烏頭一斤劈破以冷水浸兩宿洗浄去臍不去皮用新黑豆一斤與烏頭同煑自早至夜以豆爛為度取烏頭去皮薄切焙乾後與諸藥同杵為末其豆亦同炒别研為末用防風去义白附子炮製獨活去蘆頭海桐皮剉羌活去蘆頭桑螵蛸炮製烏藥剉芎藭白頭翁當歸剉焙狼毒烏賊魚皮去甲牛膝去苗酒浸天南星剉焙葳靈仙去苗葉白殭蠶炒各二兩半白花蛇酒浸取肉焙二兩半乾蝎炒一兩半右為細末用前黑豆末醋煑麵糊和拌得所入臼内杵五七百下丸如梧桐子大每日空心温酒或鹽湯下二十丸透骨丸出聖濟總録治風脚軟不能行歩附子一枚重七錢者麵裹炮製去皮臍草烏頭去皮二兩半蝎白殭蠶炮地龍白項者炒乾蝎全者三十枚炒五靈脂骨碎補乾者去毛麻黄去根節各一兩已上九味同為末麝香半錢丹砂水銀硝石朴硝各一兩馬牙硝乳香沒藥甜硝一分龍腦半錢已上一十味同研細右拌和令匀用飛羅麵二兩無灰酒二兩煑糊為丸每一丸重一錢三字以布袋盛掛當風處年乆不妨若脚手麻軟每服半丸滴酒研碎用生薑汁一茶盞麝香少許好酒一盞相和温過早晩各一服五日見效若卒中暗氣風取兩丸研入生薑汁半盞麝香半匙好酒四盞分温四服效服如一食乆下第二服漸見手開即下第三服見遍身汗出即下第四服空心日午臨卧各進一服若口開而不能合不可治仙靈脾散出聖惠方治風脚膝軟弱筋骨緩縱不能行立仙靈脾天雄炮製去皮臍石斛去根剉天麻牛膝去苗麻黄去根節各一兩芎藭五加皮萆薢剉丹参桂心當歸防風去蘆頭羌活各三分虎脛骨塗酥炙令黄㯽榔各一兩右細羅為散每服食前以温酒調下一錢忌生冷油膩猪鷄肉側子丸出聖惠方治風脚膝軟轉弱行立不得及補益腎强壯骨髓利風毒除緩弱側子炮製去皮臍安息香各一兩半天麻獨活石斛去根節杜仲去粗皮炙㣲黄剉鹿茸去毛塗酥炙㣲黄牛膝去苗附子炮製去皮臍當歸葳靈仙五加皮丹参海桐皮剉各一兩肉桂去皺皮虎脛骨塗酥炙令黄二兩右為末煉蜜和丸搗三五百杵丸如梧桐子大毎服以豆淋酒下三十丸漸加至四十丸空心及晩食前服天雄散出聖惠方治風毒攻腎臟流注脚膝軟弱無力或時疼痛天雄炮製去皮臍石斛去根剉麻黄去根節赤箭牛膝去苗薏苡仁㯽榔各一兩羌活萆薢剉防風去蘆頭赤芍藥當歸木香枳殻麩炒㣲黄去穣各三分肉桂去皺皮一兩半右擣篩為散每服四錢以水一中盞入生薑半分煎至六分去滓食前温服之海桐皮浸酒方出聖濟總録治風毒脚膝軟弱行立不得海桐皮五加皮獨活天雄炮製去皮臍石斛去根桂心防風去义當歸杜仲去粗皮炙㣲黄仙靈脾萆薢牛膝去苖薏苡仁生乾地黄各二兩虎脛骨塗酥炙令黄三兩右細剉以生絹袋盛用清酒二斗春夏浸七日秋冬浸三七日每日時時煖飲一小盞常令醺醺不得太醉此不過兩劑若酒盡旋旋添之以藥味盡即止獨活散治風毒攻兩脚軟弱無力行立艱難獨活石斛去根剉海桐皮剉防風剉當歸附子炮製去皮臍羚羊角屑芎藭牛膝去毛五加皮仙靈脾桂心漢防己各一兩右搗羅為散毎服二錢以水一中盞入生薑半分煎至六分去滓食前温服忌生冷油膩毒魚滑物烏金煎方出聖惠方治風脚膝軟弱骨節疼痛肢節無力行歩艱難黒豆二升茄子根三斤碎研剉以水三斗與豆同煑至爛熟去滓更煎取汁五升入後藥味桂心羌活芎藭酸棗仁㣲炒防風去蘆頭虎脛骨塗酥炙今黄萆薢剉當歸仙靈脾牛膝去苗各一兩附子炮製去皮臍二兩右為末入於前二味汁中以慢火煎栁木箆攪勿令住手可一炊時止盛於瓷器中毎日早辰以煖酒調下一茶匙日晩再服仙靈脾煎丸出聖惠方治風膝軟緩不能履歩骨節無力時有疼痛宜服仙靈脾葳靈仙牛膝桑根白皮各五兩黒豆一升右以上五味細剉以水二斗煮至一斗濾去滓再煎至五升入後藥味天雄炮去皮臍天麻酸棗仁㣲炒安息香各二兩肉桂去皺皮虎脛骨塗酥炙令黄各三兩當歸右為末入前藥煎汁中以慢火熬令稠以栁木箆不住手攪候可丸即丸如梧桐子大毎日空心及晩食前以温酒下三十丸忌生冷油膩猪鷄肉牛膝飲出聖濟總録治風冷傷中兩足側軟筋緩不能收攝或兩足手能舉浮腫者牛膝酒浸切焙乾薑炮草烏頭生用烏頭炮製去皮臍黒豆炒赤小豆地龍炒樟柳根各一兩附子炮製去皮臍防風去义各半兩山慈姑一兩半右剉如麻豆每以藥半兩好酒一大盞貯瓷器内同煎至七分去滓毎日早晩旋温五分一盞服漸加至一盞如覺麻即减分數以知為度蒴藋煎丸出聖惠方治風脚膝軟弱履歩不得骨節疼痛蒴藋葉二升海桐皮剉牛膝去苖羌活當歸側子炮製去皮臍桂心仙靈脾石斛去根剉郁李仁湯洗去皮尖㣲炒各一兩右為末先以好酒二升和蒴藋葉於銀鍋中熬令稠和諸藥末搗三二百杵丸如梧桐子大每服空心及晩食前以温酒下二十丸桑枝煎方出聖惠方治風脚膝軟弱桑枝剉二升黒豆一升附子生用剉碎五兩茄子根剉一升已上四味用水三斗煑至一斗濾去滓再煎取五升入後藥末石斛天雄炮製去皮臍天麻芎藭牛膝去苗桂心各二兩右為末入前汁中於銀鍋内慢火熬用柳木箆不停手攪候如膏盛於瓷盒中每日空心以熱酒調下一茶匙晩食前再服尤妙海桐皮酒治風冷流於膝行立不得海桐皮五加皮獨活去蘆頭防風去义枳殻去穰麸炒杜仲去粗皮炙一兩牛膝去苗薏苡仁各二兩生地黄半斤右細剉綿褁以無灰酒二升春夏浸七日秋冬二七日毎日空腹温酒一大盞日三常令酒氣不絶重者不過兩劑差巴㦸天飲出聖濟總録治冷痺脚膝疼痛行履不得巴㦸天去心三兩五加皮三兩牛膝切酒浸焙石斛去根萆薢甘草炙剉各一兩防風去义白茯苓去黑皮各一兩三分附子炮製去皮臍二兩右剉如麻豆大毎三錢匕以水一盞入生薑一分拍碎煎取六分去滓空心温服巴㦸酒出聖濟總録治風痺脚軟弱急痛行履不能巴㦸天生去心牛膝生去苗石斛生去根各二兩蜀椒去目并閉口者炒出汗生薑羌活去蘆頭當歸各三兩右㕮咀如麻豆大以生絹盛用酒一斗五升浸毎日三度煖服随性多少旋添酒候藥味薄即止白术丸治風虛脚弱無力肌瘦不能食白术牛膝去苗酒浸切焙巴㦸天去心兎絲子酒浸别搗各一兩半熟乾地黄焙三兩桂去粗皮一兩右為末煉蜜丸如梧桐子大空心晩食前温酒下二十丸漸加至三十丸木𤓰丸出聖濟總録治風脚軟膝腕樞紐不用歩履不能木𤓰大者一枚切去盖子入􅔈砂半兩在内取盖合蒸熟去皮用附子炮製去皮臍羌活去蘆頭白附子炮製木香各一兩沒藥半兩右先以五味搗羅為末與木𤓰同搗成劑丸如梧桐子大每日空心鹽湯下三十丸附子羌活散出余居士選奇方治風脚軟筋骨緩弱行履不得附子去皮劑㯽榔剉芎藭羌活去蘆頭各一兩右為細散每服一錢匕空心日午煎菉豆湯調下萆薢丸治風冷下注腰脚痿弱歩履無力萆薢㣲炒八兩牛膝去苖酒浸切炒四兩兔絲子酒浸别搗二兩右搗羅細末煉蜜和丸如梧桐子大空腹温酒下二十丸漸加至三十丸附子丸治風冷腰脚痿弱􅍙痺不仁附子炮製去皮臍二兩乾薑炮黄耆剉各一兩右為末先以牛乳一升二合慢火煎至六合入藥末慢火再煎可丸即丸如梧桐子大毎服空心食前温酒下二十丸加至三十丸服十日後知痛天雄煎丸出聖惠方治風脚膝軟弱筋骨攣急疼痛天雄二兩半生半炮製去皮臍牛膝二兩去苖躑躅花選其好者酒浸一宿來日取出於甑内蒸一次飯乆却晒令乾又入酒中浸少時更蒸如此三度即止晒乾後即用一兩半右為末以安息香一兩生蜜五兩熬令稠和前藥末令軟硬得所擣三二百杵丸如梧桐子大每日空心及晩食前以温酒下十丸何首烏丸治風脚腰軟膝疼行履不得遍身瘙痒方見風腰脚痛類石髓丸治風内襲舉動歩履不穏大腑𫝊送間或冷痺食不美非時呵欠倦怠皆可服健脾胃助陽氣快胸膈美飲食壯筋骨恱顔色和五臟久服無炎上之火牛膝一兩天麻半兩續斷半兩人参大防風各半兩五味子十銖大㦸十八銖杜仲半兩附子半兩兔絲子一兩虎脛骨半兩陽起石半兩當歸半兩白术一兩鹿茸大芎各十八銖右各依法製了碎剉焙乾為細末以西山木𤓰二十枚去皮穰片切用羊筋髓二兩雄羊腰子二枚去筋膜片切好酒半升細切入青鹽八銖椒末少許好蓯蓉一兩洗切銚内煑令爛沙盆内研如膏用牛膝等末杵至硬軟得所丸如梧桐子大每服五十丸至八十丸任下空心鹽酒米湯皆可服日二服四斤丸補治風强脚膝蓯蓉天麻牛膝各一升共酒五升浸一宿木𤓰去穰一斤右件焙乾為細末煉前浸藥酒如膏用和丸如梧桐子大空心湯酒任下三十丸如浸藥酒少不盡更添酒煉之活血丹若一邊足膝無力漸漸瘦細肌肉不澤上牽脇肋下連筋急不能行歩此由大病之後衰竭津液血少不榮氣弱不能運行肝氣虧損肝虛無以養筋筋不榮則乾急而痛手足亦不能舉乾地黄二兩當歸白芍藥續斷白术各一兩右為細末酒煑麵糊和丸如梧桐子大温酒下三十丸漸加至五十丸治風軟脚出本草以丹参酒浸服可逐奔馬治遊風脚手軟痺出本草以人肝藤煮服之生研服亦可一名承露仙治風軟脚用龜殻炙之為末酒服之風不仁附論夫風不仁者由榮氣虛衞氣實風寒入於肌肉使血氣行不宣流凝痺結滯皮膚􅍙厚無所覺知内經曰皮膚不榮故為不仁其狀搔之皮膚如隔衣是也診其寸口脉緩則皮膚不仁脉虛數者生牢急疾者死方苦参散出聖濟總録治風皮膚􅍙痺不仁積年疥癬補諸不足苦参炒蒺藜子去角石南葉面脂㣲炒芎藭細辛去苖葉白术秦艽去苖土白蘝防己芍藥甘草炙逺志去心沙参白茯苓去黒皮人参石膏搗研如粉前胡去蘆當歸切焙獨活去蘆黄耆剉乾薑炮山茱萸各一兩附子炮製去皮臍防風去义各二兩蜀椒去目并閉口者炒出汗半兩羚羊角用上一半鎊二兩右拌和再羅為散每服一錢半至二錢匕漸加至三錢匕空腹酒調下湏臾以食壓之日再以知為度大八風烏蛇散治風不仁皮膚􅍙麻手足攣急烏蛇酒浸去皮骨炙青葙子防風去义獨活去蘆麻黄去根節先煎掠沫焙桔梗炒秦艽去土各一兩一分羌活去蘆一兩當歸切炮細辛去苗葉桂去粗皮各三兩芎藭白芷㣲炒各二兩半白芍藥蒺藜子炒去角人参天麻各二兩附子炮製去皮臍二兩半右搗羅極細每服二錢匕空心温酒調下日三㣲汗為度烏蛇散治頑麻風搔之皮膚不知痛痒烏蛇肉五兩酒浸炙令黄白天麻桂心防風去义麻黄去根節白殭蠶㣲炒赤茯苓葳靈仙枳殻麩炒㣲黄去穣天蓼花各二兩羌活躑躅花酒拌令匀炒乾人参去蘆赤芍藥芎藭各半兩白蒺藜二分㣲炒去角右細羅為散每服空腹及晩食前以温酒下二錢忌猪鷄肉烏頭摩風膏治風痛及皮膚不仁筋脉拘急川烏頭生用去皮臍防風去蘆桂心白芷藁本川椒去目吳茱萸白术細辛芎藭白附子漏蘆芥草羌活各半兩黄臘五兩煉了猪油一斤生薑三兩右件藥細末先以猪脂内鐺中煎足次入諸藥煎令白芷色黄候藥味出盡以新布絞去滓更以綿濾過拭鐺令浄重入膏於鐺中慢火熬之次下黄臘令稍去火待稍凝収於瓷器中毎有痛處於火邊恊手承熱取膏摩之一二百遍以手澁