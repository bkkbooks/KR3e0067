body:
  text: 普濟方卷二百九十三明周王朱橚撰瘰癧門諸瘻附論夫漏者諸瘻之潰漏也狼瘻鼠瘻螻蛄瘻蜂瘻蚍蜉瘻蠐螬瘻瘰癧瘻轉脈浮疽瘻所謂九瘻也狼瘻者由大怒傷隂氣上而不下所致也鼠瘻者由飲食之間有蟲鼠餘毒所致也螻蛄瘻者因食果瓜蟲噉之所致也蜂瘻者因倦飲水即得蜂毒所致也蚍蜉瘻者因中寒毒腹中臚脹所致也蠐螬瘻者恐懼憂思哭泣不止所致也浮疽瘻者恚結馳思往返變化所致也轉脈瘻者大醉驚嘔轉側失枕所致也瘰癧瘻者則瘰癧諸證論之為詳三因方云狼漏根於肝得之憂怒鼠漏根於胃得之食鼠毒螻蛄漏根於大腸得之食果蜂漏根於脾得之飲流水有蜂毒蚍蜉漏根於腎得之食中有蚍蜉毒蠐螬漏根於心得之喜怒哭泣浮蛆漏根于膽得之思慮瘰癧漏根於腎得之新沭髮轉脈漏根於小腸得之驚卧失枕此等因證文不明未知所始若以理例較之怒根在肝鼠毒在胃食瓜果在大腸蜂水在脾姑且通俗易曉如轉脈漏因驚根當在膽却云在小腸蜉蛆漏因思慮根當在脾却云在膽瘰癧因沭髮亦不當在腎名義不通以難考據又况哭泣得蠐螬之名思慮浮蛆之名此尤不可曉也其外更有風漏冷漏蝎漏蟻漏蜣螂漏蚯蚓漏蝦蟆漏等名狀不一諒皆出于土俗隨象命名耳難以考據治法觀其末著於肌肉而為膿血者從本引可使衰去針之炙之敷之角之從其所因宣通本臟皆有成法甲乙針經云寒熱瘰癧論黃帝問曰寒熱瘰癧在於脛腋者皆何氣所生岐伯對曰此皆鼠瘰癧寒熱之氣也稽留於脈而不去者也鼠瘻之本皆在於臟其未上出於頸腋之間其浮於脈中未著於肌肉而外為膿血者去易問曰去之奈何對曰請從其末引其本可使衰去而絶其寒熱審安其道以瞳子之徐來徐來以去之其小如麥者一刺之三刺而已決其生死法反其人目視之其中有赤脈從上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死此赤脈不下貫瞳子者可療大抵外傷四氣內窘七情與夫飲食乖常染觸蠢動含靈之毒未有不變為瘻瘡穿孔一深膿汁不盡得冷而風邪併之於是涓涓而成漏矣漏喜發於項腋亦喜發於隂僻肛門之間療治失時即生寒熱不特瘻能為漏凡癰疽諸發隨所在處茍有宿膿敗肉朽骨停蓄其間皆一切漏瘡之萌蘖也聖惠云瘻病初發之由不同至瘻成於狀亦異病源所載復有三十六種經方不依次第顯其名目也又有蜣蜋蚯蚓等諸瘻非九瘻之名此即應是三十六種瘻之數也但瘻病之生或因寒暑不調故血氣壅結所作或因飲食不節狼鼠之精入於臟腑毒流經脈變化而生皆能使血脈結聚寒熱相交久則成膿而潰漏也其生身體皮肉者亦始有結腫與石癤相似所可異者其腫之中挼之壘壘有數脈喜發於脛邉或兩邊俱起便是瘰證也音瘻赤發兩腋下及兩顳顬之間初作喜不痛不熱若不諳治即生寒熱也所發之處而有輕重重者有二一則發口上腭有結核大小無定或如桃李大此蟲之窠止在其中發口下無有結核而穿成瘡又蟲毒之居或縱橫無定故瘻發身體亦有雜處其相應通者多死治法用濕散風冷為急收水次之生肌又次之藿香厚朴半夏橘皮瘡术音蒼細辛川芎白芷以官桂乾薑一匕佐之此足以濕散風冷矣然近年漏者近則淡紅或帶微腫或留小核久則上而稿白內而黑爛淫蟲惡臭生焉近者不過前藥數品而久者復其元陽亦當以蘆輩加減而用之如其不當用而輕用又恐熱氣乘虛變移結核夤緣相通而孔竅為尤甚若夫收水一節蓋水屬腎也腎虛不能傳道而役水溢於腎水溢則滲灑於漏瘡行腎之水無如黑牽牛取米入豬腎漫火煨熟隨而溫酒下之則借腎入腎一縱一擒兩得其便惡水既泄不復淋漓繼以當歸黃香川芎官桂川續斷葫蘆巴等修治細末佐以髮灰空心溫􅀈音酒調下仍以安腎丸山藥丸兼而濟之庶幾腎得所飬真元凝合夫然後以龍骨牡蠣人齒犬牙加之血竭乳麝髮灰內外相維生機必矣然新肉方生又當以膂肉豬蹄米鋪為飬不維滋味益腎而陽明之生生肌肉亦籍穀氣以充之此則自本自根之論也凡項邊腋下先作瘰癧者欲作漏也宜禁五辛酒麵及諸熱食凡漏有以石癰瘰癧纍然作癧子有核在兩頸及腋下不痛不熱治者皆錬石散敷其外內服五香連翹湯下之已潰者治癰法諸漏結核未破火針針使者結核中無不瘥者內經云陷脈為瘻留連肉湊脈得寒即下陷凝滯肌肉故曰留連肉腠肉冷亦能為濃血故為冷漏須用溫藥陷脈散專治漏瘡及二三十年癭瘤或大如杯盂久久不瘥致有漏潰令人骨肉消盡或堅或軟潰令人驚惕寐卧不安體中掣痛愈而復作者宜用之濟生方云瘻瘡當探其深淺渠在裏間時有一人害瘻瘡於脅間稽以榆細皮枝取線以綿褁其尖以線牢繫之以榆皮探瘡中瘡之穴乃自脅而達于腰在膚皮之間稽遂于病者腰間以針決破用追毒丹三粒內于瘡中三日即潰而脅間之漏遂止則膿悉自腰針孔中出膿盡則其肌遂愈其服狗寶丸敷烏龍膏乳香膏生肌散并如治癰疽治法方蝟皮散出聖濟總録治諸漏蝟皮炙燋半枚蜀椒去閉目并子炒出汗當歸切焙露蜂房炙焦地榆醋炙各三分斑貓去足翅糯米炒蛇蛻銼炒烏賊骨去甲葛上亭長去頭足翅糯米炒各半兩鱗鯉甲炙燋四兩䕡茹一兩細辛去苗葉半兩樗雞四兩四枚蜈蚣去黃足炒一枚蜥蜴去頭足炙一枚薏苡仁乾漆炒煙出用蒺䔧子炒去角桂去粗皮漏蘆去蘆頭木通銼附子炮製去皮臍牡丹皮龍膽土瓜根各三分鶴骨酒炙狸骨酒炙雄黃研細蛇床子大黃銼炒苦參各一兩半右為細末每服二錢匕空心用溫酒調下日曉再服漸加至三錢治九瘻方出千金方蝟皮半枚鱗鯉甲樗雞各四枚蜥蜴蜈蚣各一枚蜀椒附子當歸蜂房地榆桂心通草乾漆牡丹薏苡仁蒺䔧子漏蘆一作瞿蘆龍膽一作骨土瓜各三分斑貓四分蛇床子苦參大黃雄黃蛇蛻䕡茹細辛各三分鶴骨六分右為末每服五分以溫酒調下以知為度日三服治九瘻方出千金方空青商陸知母狸骨桔梗防風荏子礬石黃芩白芷芍藥甘草雄黃白术地膽斑貓雄黃各等分右為末蜜丸豆大以作服三丸三十日知四十日愈六十日平復百日內慎房室一方為散醋服一刀圭日二老者少者減半服續斷散出仁濟直指方治止漏活血益腎氣續筋脈搕藤子去稍微炙當歸川芎川續斷洗酒黃耆微炙葫蘆巴炊紫荆皮生乾地黃洗酒牡蠣粉布糊各半兩木香辣桂各三錢甘草炙二錢右為末每服二錢空心溫酒調下或加髮灰佐之溫解散出仁濟直指方治濕散漏瘡風冷藿香厚朴製半夏麵橘皮蒼术細辛川芎白芷各二分辣桂川白薑生甘草炙各半分右銼散每服三錢水一盞生薑棗子煎服蝟肝膏出聖濟録治諸癧隂遍腫堅硬或發潰膿血不絶蝟肝炙令熟二兩芍藥芎藭細辛去葉各半兩牛􅏬脂五錢當歸切焙蠟黃連去鬚黃芩去黑心松脂各一兩右除牛脂蠟松脂外搗羅為末先熬脂令沸下蠟松脂銷鎔即下諸藥末攪令勻以瓷合盛塗瘡上日三度換陷脈散出三因方治漏瘡及二三十年瘻瘤或大如盂杯久久不瘥致有漏潰令骨肉消盡或軟或潰令大驚惕寐卧不安體中掣痛愈而復作乾薑炮琥珀研大黃附子炮去皮各一兩丹參三錢石硫黃研鍾乳粉研烏賊魚骨研各半兩右為末貯以瓷合韋囊勿令泄氣若瘡濕即敷無汁即煎豬脂和敷之以乾為度或死肌不消加芒硝二兩益佳一法用胡燕屎一枚芫青丸出千金方治一切瘻斑貓四十枚豉四十九枚芫青二十枚生大黃地膽各十枚蜈蚣一條半犀角牛黃各棗核大右為末蜜丸如桐子大服二丸須臾多作酸漿粥冷飲之病從小便出屎盆中相視如有蟲形狀又似膠汗此病出也間日一服飲粥如常小弱者各三四日候無蟲出瘡漸瘥時忌膩一切器物皆須灰洗乃作食一方以溫酒服之一方虛悶可煮食蔓菜羮後仍作二十日將息便不須服麝香散治漏瘡麝香研樓蔥白蜣蜋蜜陀僧研石灰研青蒿心膩粉流黃研各半兩右搗研拌勻先以鹽漿水洗瘡用散子填滿瘡口以帛縳定三兩日若有惡物除去依前換藥如無不用換不過三兩上即瘥葛上亭長丸出聖濟録治諸漏葛上亭長地膽斑貓三味並去頭足翅糯米各炒二十枚鼠婦六十枚炙衣中白魚四十枚真珠研各一分檳榔銼二枚雄黃研右為末煉蜜丸如桐子大每服三丸每日空心溫酒下日晚再服漸加五丸芫青散出聖惠方療瘻有九種久不瘥不過此方芫青四十枚足翅熬海藻八分洗昆布八分洗雄黃研八分狸骨炙五分牡蠣四分煆地膽二十枚熬青木香三分右為細末酒服一錢匕日二服痛從小便出如爛筋忌生冷粘食豬肉陳臭物桂附丸出三因方治氣漏冷漏諸瘡附子炮製米醋中浸再炮淬三五次去皮臍桂心厚朴薑製粉草炙白术各一兩木香一分乳香二味别研右為細末煉蜜丸如桐子大空心米飲下二三十丸青金錠子出瘡科精要治諸惡瘡膿水出不快及多年疳瘻瘡愈而後復發白丁香銅青硼砂粉霜各五分輕粉一字龍腦一字麝香一字右為細末麵糊為丸撚作錠子每用絍入瘡口中膿水出快治漏瘡滑石輕粉赤石脂海螵蛸膩粉乳香明礬右各等分研細末以筒子吹藥入漏孔內一夜再用耳鑷子取出孔內敗肉物再用荆芥湯淨洗復用藥仍前天靈蓋膏出聖惠方治一切瘻天靈蓋一分淨洗塗酥炙黃虎下頷骨一分炙令黃臘月豬脂四兩附子一分炮製去皮臍人參一兩去蘆頭鐡精一分川烏頭一兩炮製去皮臍右為細末用豬脂和令稀稠得所可塗之四畔不得侵瘡口麝香丸治漏瘡絍瘡麝香研石膽研膩粉研杏仁去皮尖雙仁炒各一分香鼠一枚去腸胃洗淨炙乾巴豆一粒去皮心膜出油盡右為末用麵糊和丸黍米大絍在瘡內一日一二次通治諸瘻方班貓一枚一方云三分去頭足翅杜蘅枳殼根酸棗根虎薊根貓薊根各一把右搗羅為末蜜丸日一服如棗一枚以丸著瘡口中漏瘡方真龍骨蜂房炙黃各三錢黃丹煆降真節五倍子枯骸骨瓦煆一錢各炙右為細末敷之丸惡核漏瘡並戒怒氣不然核大漏則水多也安息膏仁存方有治膿水不絶骨中疼痛成漏安息香花乳石火煆紅血竭乳香各半錢麝香減半右為細末用蠟少許入麻油些小同鎔開搜藥捻作米粒大依前方看大小深淺逐粒屑入藥於瘡孔中以滿為度藥透內從內生肉一二日退出一粒漸生肉漸退出出盡則瘡中自然平復其功效如神如瘡口冷痛淺濶只用少許乾敷治漏瘡木香丁香乳香麝香各末三錢黑牽牛頭末右分作十服每服用烏雞子一箇去其項去黃用白調藥再入雞子殼中用頂蓋頭紙糊定於飯甑上蒸熟取出細嚼溫酒下日進一服空心服未效再作即愈矣斑貓散出聖濟總録治諸漏斑貓去頭足翅糯米炒七枚真珠研桂去皮水銀與衆藥研令星盡各半兩葛上亭長去足翅糯米炒七枚右為末每服半錢匕米飲調下空心午後服小便有所出瘥乳麝雲母膏出仁濟直指方治漏瘡效穿山甲浸一宿去肉用一百片真蚌粉同炒候香熟起泡出粉以甲為末四兩右入麝香末一錢夾雲母膏十五貼為丸桐子大每服三十丸溫酒仍以鹿角膠調鹽酒服下神授丸方見勞瘵門勞瘵類兼服之生地黃膏出仁濟直指方治漏通用露蜂房炙黃五倍子木香各三錢滴乳香二錢輕粉一匙右細末用生地黃一握搗細和為膏攤生絹貼瘡蛇蛻散出仁濟直指方治漏瘡血水不止蛇皮洗焙焦五倍子龍骨各一分川續斷洗酒三分右細末入麝香少許唾津調敷人牙散出仁濟直指方治漏瘡惡瘡生肌裏欲乾則用人牙油髮二味燒存性雄雞肉骨各等分右為末入麝香輕粉少許濕則乾摻乾則麻油調敷生肉膏出肘後方療瘻棟白皮二兩鼠肉二兩薤白三兩當歸二兩生地黃五兩右五味以臘月豬膏叄升煎薤白色黃成膏敷瘡孔上令生肉也班貓散出千金方治一切瘻及瘰癧瘻生於項上結腫有膿並皆治之斑貓十枚去頭足翅以糯米炒黃為度用真珠半兩細研蝟皮半兩炙黃雄黃一分細研右為細末每日空心以溫酒調下半錢午後再服可日三服白花蛇散出三因方治九漏瘰癧發於項腋之間癢痛憎寒發熱白花蛇酒浸軟去皮焙乾三兩犀角半錢黑牽牛半兩一半生一半熟炒青皮半兩右為末每服二錢膩粉半錢研勻五更糯米飲調下以利下惡毒為度十餘日再進一服可絶根源如已成瘡一月可效忌發風壅熱物治一切瘻出千金方斑貓三十枚雄黃桂心犀角各一兩右為治下篩酒一錢匕服日再服病從小便出煆落鐡屑膏出千金方治一切漏方煆落屑虎糞狗頰車連齒骨炙鹿皮合毛燒為灰各等分右治下篩以豬膏和內瘡中須臾即易日五六度一方無鹿皮有鹿角治漏瘡胭脂血竭輕粉各一錢麝香半錢右碾為末乾敷之又方五倍子一兩青黛臘茶各半兩麝香隨用右為細末於漏瘡上乾摻或用生油調敷之輕粉少許尤妙芫青散出聖濟總録治諸漏腫芫青斑貓葛上亭長三味並去足翅糯米炒各十枚桂去粗皮一兩右為散每服半錢匕空心酒調下日晚再服更冝炙陽明絡脈在肩前申頭二寸陷中有青脈至上向卧交兩臂勿令開乃夾取之炙隨年壯即瘥治諸瘻涓涓出膿血疼痛日夜不止漸加羸瘦冝服此方出千金方赤小豆白斂牡蠣燒赤細研黃耆各等分右為散每服三錢七酒一盞半煎至一盞去滓不拘時黑靈散出仁濟直指方治漏瘡通用露蜂房銼二分牡蠣粉􅉑丹硫黃研各一分右同炒令煙盡為細末入髮一分麝香少許拌和敷患處麝能引藥透達亦殺蟲鐡屑膏出仁濟直指方治漏瘡露乾則用煆落鐡屑半兩鹿角燒灰一兩真輕粉一錢狗頭連齒骨炙黃一兩右為細末用豬脂敷調薰漏瘡方出仁濟直指方艾葉五倍子白膠苦棟根等分右銼如燒香法置長桶內坐薰瘡處角鷹散出仁存方角鷹屎乳香蔥白右等分為末先鹽水洗瘡口看小大以燈心探入瘡口深淺內藥入明日其骨及蟲惡水自出不過兩次治一切漏瘡惡瘡生肌止痛出余居士選竒方人牙不以多少燒過麝香各少許右都研令勻濕則乾摻乾則用生油調敷莉蘆塗傅方出聖惠方治諸漏浮核不盡及諸惡瘡癰疽息內在於肌中藜蘆以雞子三箇取白塗炙令乾䕡茹各一兩雄黃研一兩右研為末塗敷息肉上日五度即瘥敷瘡上不得入眼治漏藥出御藥院方獨角仙一箇火去殼河南地方出者佳甜葶藶砒各半錢同研右為末細煉蜜為錠子每用臨時覷瘡口大小旋揑作餅子圍於瘡口內其蟲俱出即時見效班貓丸出聖惠方治一切瘻方斑貓四十枚去足翅糯米拌炒令米黃地膽三十枚去足翅首糯米拌炒令米黃蜥蜴三枚炙右搗之千杵蜜和如大豆服二丸空心臨晚溫酒下神驗伏翼糞丸出聖惠方治一切瘻瘡及治久瘻伏翼糞四兩微炒斑貓三分去頭足翅以糯米拌炒令米黃皂莢子一兩炒黃一作皂莢花右搗為細末煉蜜和丸如梧桐子大每日空心以莢白皮塗酥炙微黃搗末煎湯下一丸服至三丸病根並於小便中出馬齒莧膏出聖惠方治一切瘻馬齒莧隂乾臘月燭燼各等分一作臘月鼠灰右為末以臘月豬脂和其瘡先以暖泔清淨洗拭乾然後以藥敷之日三又方出千金方乾牛屎乾人屎各等分右搗末先用綿著瘡上綿著屎蟲聞屎香即出若癢即舉綿止之更别取屎及綿著其上如前蟲盡乃止蜂窠膏出千金方治漏作瘡孔方見本門蜂瘻類治漏心胸以下者方松脂武都雄黃各三兩右為末和塊刀子刮為散飲服一方寸匕日三服不瘥再合附子塗傅方治漏瘡晝開出膿夜復合附子一枚搗末鯽魚頭間去肚腸右將附子末內魚肚中滿以泥固濟炭火上燒通赤取出去泥研細為末冷敷瘡口內日用三五次以瘥為度伊蘭草塗敷方治漏瘡伊蘭草七葉狗頭骨燒過二兩右為末塗敷瘡口內日一換之以瘥為度巴豆塗敷方治漏瘡巴豆一分去心皮出油盡用肥棗十枚去核皮右細研以水一升煮稀稠放布中絞出取汁塗敷瘡上日一次地鱉散治漏瘡乾地鱉末麝香各研少許右研勻乾摻或貼隨乾溫治之蝕瘻瘡生油髮燒留性四錢白芨一錢右為細末摻敷之療瘻方右用槲木皮長一尺濶六寸去黑皮細切以水一斗煮取五升去津內白糖十挺煎取一升三分服以銅器吐出看視之治一切瘻出聖惠方用死蛇白礬各一兩燒灰細研敷之螻蛄一十四枚燒為灰研如粉右件藥以煉雄豬脂和作膏著瘡中治一切瘻出千金方用成煉松脂末填瘡孔令滿日三四度七日瘥大有神驗又方出千金方用霜下瓠花曝乾為末敷之洗漏瘡方出危氏方治漏瘡孔中多有惡穢常須避風洗淨用露蜂房白芷煎湯洗或用大腹皮苦參煎湯洗如洗畢候水出拭乾先用東向石榴皮曬為末乾摻以殺淫蟲少傾敷藥即愈苦瓠方出千金方治一切瘻及蟻瘻大妙用苦瓠四枚大如盞者各穿一孔如指大置湯中煮十數沸取一竹筒長一尺一頭內瓠孔中一頭注瘡孔上冷則易之遍止治一切瘻出千金方用煮鹽花以麵擁病上內鹽花麵匡中厚二寸實下以桑葉三重籍候冷熱得所可忍冷無益熱則以內一日一度俟瘰癧根株勢消則止若已作瘡者搗穄殼為末粉之一方用鹽麵燒灰敷之槲皮煎出千金方治一切瘡瘻用槲皮北隂白皮三十斤銼碎以水一石煮取一斗去滓煎如糖又取屋厠上雌雄鼠屎各四十枚燒令汗盡為末內煎中又酒溫一升投煎中合攬之羸人服五合當有蟲出治一切瘻出千金方用搗土瓜根敷之燥則易不限時節杏仁塗膏出千金方治一切瘻用死蛇去皮肉取骨為末和封瘡上生油調方得大痛杏仁研膏摩之以方死蛇和臘月豬脂燒灰為末內孔中一方單用死蛇灰醋和敷一方治蛇瘻用蛇蛻皮燒灰臘豬脂和封之又方出千金方用燒死蜣蜋為末醋和塗乾摻亦得一方用鹽湯洗瘡塗敷一方蜣蜋屎為末敷之治一切瘻方出千金方用故布褁鹽如彈丸大燒令赤為末酒調服又方出千金方用白馬屎絞取汁每服合水和屎取汁亦可又方出千金方用豬脂一升酒五合煎沸頓服一方用臘豬脂塗敷瘡二用紙貼定治一切惡瘻中冷應肉方出聖惠方用正月雄狐屎隂乾搗末汲水和服一錢食前治一切冷瘻方出聖惠方用所吐蛔蟲燒為灰先用甘草湯洗去瘡然後著灰無不瘥者慎口味治膿瘻方用桃花末以豬脂和封之佳治漏瘡用嚼五倍子和血竭末塞之治脅下生漏瘡如牛眼之狀膿水不止用鹽少許安白牛耳內然後取耳中垢以敷瘡上即瘥如不用鹽即牛耳不癢難取垢治漏瘡口子不乾用蝦蟆膽肝不見水拭乾用銀箆擉碎搽入口子內外用尋常膏藥貼之久之其乾肝就變為好肉啄酒散治瘻有頭出膿水不止方見痔漏門痔漏類治漏方右以巴豆用青紅紙各一張減去油推麝香少許絍入瘡內却用紅紙作捻子蘸藥末入瘡口內填滿瘡孔如四邊有紅點是漏瘡未發却用銅筋或銀叉尖按破用前藥搽之後用黃連黃丹龍骨雄黃四味封口七八日可治漏瘡用多年海船底土泥石灰為末以烏雞子清調火煆為末敷之自然生肌提出元藥朝生暮落花敷方治漏瘡用朝生暮落花隂乾為末取塗敷瘡上日三次雞子塗敷方出肘後方治諸漏亦治鼠瘻用雞子三枚蒸熟去殼白取黃炒黑色先用鹽湯洗瘡後塗日三五次即愈一方治下血不止肌體黃瘦四肢無力宜服此方又方用取新生鼠屎一百日已來者收置蜜器中取塗敷瘡口日度即瘥豬腎酒治通行漏中惡水自大腸出用牽牛碾細去皮取末一分入豬腎中以綿扎青竹葉包用慢火煨熟空心溫酒嚼下治漏若著口裏用取東行棟根細銼水煮濃汁含之數內吐再咽治瘻瘡用鴛鴦肉以清酒炙食之則美麗又主夫婦不和作羮臛私與食即相憐愛又方治諸瘻瘡喉嚨痛及喉痺並宜煎服用通草或礬亦得急即含一方治項上瘤漏用通草根煎服治瘻有九種不過此方用芥子搗碎以水及蜜和滓敷喉上下乾易之治瘻用鯉魚腸切作五斷火上炙之洗瘡拭乾以腸封之冷即易自暮至旦乾止覺癢開看蟲出瘥效驗方療瘻衆不瘥用牡蒙數兩搗之湯和適寒溫取一升許敷瘡上冷易經宿者佳生肉膏療瘻用桑新灰三升水四升淋之復重淋之取三升石灰熬令黃內灰汁中以兩重帛褁絞去滓更入日煎去二升勿用急火煎隨瘻孔深淺初時作服散而瘥孔若深四寸新藥與孔裏薤白使糯安藥薤白入藥孔裏若深四寸隨瘻根而炙兩處四十壯椎勿炙瘻孔隨深淺去膿散與膏安著瘡孔裏十五過少遷延日月取瘥肉滿膿亦斷神良無比通治諸瘻方右以八月多取斑貓蟲即內苦杏酒中半日許出曝乾使十取六七枚著銅器中微火上延熬令熟搗作屑巴豆一粒去皮熬之又拔取黃犬背上毛三七根亦熬作屑好朱以錢五分匕都合和以苦酒頓服之蟲當盡出若一服未效先時可預作三兩劑後日服逺不過三兩劑又方若先著下部邊或上出耳後頸項諸處者苦參切五升以苦酒一斗浸三四日冝服一斗亦如之但多作以知為度不過三四度必瘥皮膏療瘻用槲皮白皮切取五升以水八升煮令泠絞出滓重令成膏日服半棗漸加至一棗許亦敷瘡上無忌患瘡唯冝煮飯苜蓿鹽醬又不得多食之療諸瘻方用葶藶子搗細羅取加白蜜和丸每於著藥先溫泔洗著瘡孔中以丸內之若塞以物道開日三度瘡痛是瘥候勿停藥又方先以泔清溫洗以綿拭之取葵葉微火暖貼之瘡引膿不三二百葉膿盡出即肉生忌食諸魚蒜房室治瘻方用煎桃葉枝作煎淨洗瘡內孔中大驗治諸惡瘻方用杏仁二兩去皮以水研取汁每二合溫服一方治一切瘻治􅀈蟷瘻方用取甜瓜根搗羅為末敷之立瘥慎口治石瘻兩頭出者其狀堅實令人寒熱方用大錍針破之次用鼠粒葉二分為末和雞子白一枚封之又方用搗槐子和井花水封之治蜣蜋漏方用黑牛屎燒灰臘豬脂和敷之先用鹽湯洗瘡一方用乾牛屎為末敷之癢即撥去根厚封瘥乃止一方用熱牛屎塗之數易應有蜣蜋出亦治鼠瘡治蚯蚓漏方雞屎蚯蚓屎右為末用牡豬下頷髓和敷之治蝎瘻五六孔皆相通者方用搗茅根汁著孔中又方用半夏搗羅為末以甲煎調塗之一分治蝦蟆瘻方用五月五日蛇頭及野豬脂同水衣封之佳治蚯蚓漏用胡粉不限多少用豬脂和調塗摩瘡上日再塗即瘥治蛙瘻􅀈蟷瘻方用取母豬屎燒灰臘月豬膏和敷之當蟲出如雀形溫經丸治陷脈瘻厚朴薑製官桂去皮白术炙甘草炙乾薑炮木香各一兩附子二兩醋浸炮淬次去皮臍右為細末煉蜜和為丸梧子大每服三十丸食後飲湯下鴨脂膏治蚯蚓瘻鴨脂三兩胡粉三兩巴豆去殼研去油盡半兩右先鎔脂入二味調如膏每日三五度塗瘡上即瘥內瘻方用橘皮白搗丸綿裏內下部中敷效一方治瘡有漏孔即以桑蟲五條焙乾末摻之即愈治一切漏瘡三方甘草草果右等分碎切煎湯洗瘡口又方馬骨敗龜殼各等分右為細末用麻油調敷瘡口如藥不細則瘡疼又方皂角刺天蘿乾者各等分右燒留性為細末加燒酒調下用火筯挾燒服三錢治瘻用馬莧搗揩之治瘻以柴荆木煮汁服之療下瘻右取鼠尾草膿煮取汁令可丸服之亦用作飲治毒腫下瘻右以紫珠煮汁服之療諸瘻瘡及妬乳癰腫右以白狗骨燒屑敷之治瘻瘡及溪毒丁腫出根右以狗屎和臘月豬脂敷治諸蟲瘻惡瘡右取木通花上粉內瘡中良治瘻右剪草根作煎淨洗瘡