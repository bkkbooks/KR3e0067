根結核瘰癧毒腫出本草單方以射干塗肉四畔漸漸近瘡習習逐病至骨瘡若有熟膿及黃水出者塗之若無膿水有生血及傷肉破即不可塗即殺人治瘰癧鼠瘻出本草單方右以夏枯草初生嫩時採之須浸洗淘去苦水作菜食之治瘰癧瘻瘡及風頑疥瘙出本草單方以鱉甲炙燒酒浸服之治癰瘡腫瘻繫結等出本草單方以山慈菰根醋摩敷之治瘰癧成瘻孔者出本草單方右取露蜂房二枚炙末臘月豬脂和塗孔上瘥治瘰癧五痔瘻癯瘤瘡根惡腫出本草單方右以石黃空青桂心並四兩乾薑一兩為末鐡片闊五寸燒赤以藥置鐡上用瓷碗以豬脂塗碗底藥飛上得冷即開如此五度隨瘡孔大小以藥如兒屎內孔中麵封之三度根出也無孔者鐡皮內之轉脈瘻附論夫轉脈瘻者因飲酒大醉夜卧不安多驚欲嘔轉側失枕之所生也始發之時在其頸項脈轉身如振使人寒其根在於小腸也方斑貓白芷丸出千金方治轉脈漏始發於頸濯濯脈轉苦驚愓身振寒熱此得之因驚卧失枕其根在小腸集驗方以班貓主之白芷為之佐斑貓白芷緑青大黃各三兩升麻鍾乳甘草防風地膽續斷麝香礬石各一兩人參當歸桂心各二兩白术麥門冬各一兩右為末蜜丸如大豆大酒服十丸日三勿食菜慎房室百日外臺無大黃桂心麥門冬白术鍾乳斑貓丸出聖惠方治轉脈瘻發於頸腫痛寒熱出膿水斑貓一分以糯米拌炒黃為度去米頭足翅人參三分去蘆頭地膽一分以糯米炒黃去翅足當歸三兩川升麻三分麥門冬去心一分焙白术三分川大黃三分微炒鍾乳粉三分桂心三分甘草一分炙微赤銼防風半兩去蘆續斷三分麝香一分白礬一兩燒汗盡右為細末米後入研了藥令勻煉蜜搗三二百杵丸如梧桐子大每服以酒下十丸日三服連翹散一名連翹丸出聖惠方治轉脈瘻發於頸項寒熱有膿方見本門瘰癧寒熱類漏蘆膏一名五白膏出聖惠方治轉脈瘻方見本門鼠瘻類風瘻附論夫風瘻者由風邪在結脈結聚所成或得諸風不即瘥變作瘻也其得風者是因瘡遇冷膿汁不盡乃成也其風在經脈者初生之時其狀如腫有似覆手搔之則皮脫赤汁出乍腫乍減漸漸生根結實附著骨間不知首尾後潰成瘻若至五十日不消不潰變成石腫名為石癰久久不治令人寒熱惡氣入腹絶悶刺心及咽項皆腫不治者死也方神效斑貓丸出聖惠方治風瘻赤腫出膿汁不止斑貓一分去頭足翅以糯米拌炒令米黃為度連翹三兩玄參三分烏蛇三分去皮骨酒浸一宿炙令黃漏蘆三分荏子三分空青三分細研燒過川大黃一兩銼碎微炒牛蒡子一兩半微炒黑豆黃一分右為細末入空青研令勻煉蜜和搗三二百杵為丸如菉豆大每日空心及晚夜卧時以溫酒下五丸漸加至十丸露蜂房膏出聖惠方治風瘻消腫化膿方見本門諸毒類槲皮散出聖惠方治風瘻出赤水腫痛槲皮炙分黃玄參一分蟬殼五枚苦參一分銼斑貓二七枚去頭翅足糯米拌炒令米黃為度白殭蠶四十九枚微炒右為細末每日空心以鹽茶調下二錢良久以鹽茶投之小便內當取下惡物赤豆小散治風瘻結腫常出惡膿水方見本門諸毒類松脂煎治風瘻方見本門諸毒類蜂窠膏治風瘻結腫常出惡膿水方見本門諸瘻類蟻瘻附論夫蟻瘻者由飲食有蟻精氣毒入五臟流出結脈多著頸項濈濈生瘡微腫核細而乃遍於身體也方鱗鯉甲散治蟻瘻鱗鯉甲二兩炙令黃色礬石一兩泥褁炒半日赤足蜈蚣二枚炙令黃色雄雞膍黃皮一具炙乾右為末以三年好醋調敷於瘡上治蟻瘻雄黃雌黃各等分右件藥研細敷瘡上死蛇鼠膏治蟻瘻鼠瘻用死蛇腹中鼠取臘月豬脂煎候燋去滓敷之一方用死鼠燒灰為末敷瘡亦可又方用大鮆鮓燒耕犛土令赤以苦酒浸犛土時合壁土令熱以鮆鮓著壁土展轉令熱敷瘡上鱗鯉甲膏治蟻瘻用鱗鯉甲二七枚燒末以豬膏和敷瘡上鯉魚鱣甲赤可用之又方用半夏一枚搗末鴨脂和敷瘡上一方無鴨脂以水調敷之又方用雄雞糞燒為灰細研敷瘡日三度用之鯷􅾒塗敷方治蟻瘻用鯷􅾒燒灰研細以醋調如糊塗敷瘡上日三度立即瘥又方用螻蛄以酒研細塗敷瘡上日三五度即瘥除蟻瘻用水蘇挼碎敷之治蟻瘻孔容針亦有三四孔者方用蝟皮蝟肝蝟心燒灰為末酒服一錢匕一方炙黃為末服之治蟻瘻惡瘡右取黃褐候鳥五味淹炙食之鳥形如鳩緑褐色聲如小兒吹竽冷瘻附論夫冷瘻者亦是謂得心風冷久不瘥因成瘻膿汁不絶故為冷瘻方生肌丁香膏治冷瘻瘡及瘰癧瘻疼痛丁香三分沒藥三分安息香三分麝香一分研細當歸三分乳香三分細研附子三分去皮臍白芷三分桂心三分雄雀糞四十粒蕪荑仁二分黃丹三分微炒麻油一斤右件藥都細銼入油以漫火煎候白芷黃燋色去滓入黃丹更微煎攪勿住手膏成牧於不津器中頻取貼之一方無香白芷外硃膏治冷瘻及諸瘻瘡丹砂三分細研川大黃一兩雄黃二兩細研苦參一兩黃連一兩去鬚莽草三分䕡茹一兩礬石三兩細研硫黃三分細研右件藥銼入臘月豬脂一升二合以漫火煎黃連等藥燋絞去滓下丹砂雄黃礬石硫黃末更煎攪勻入瓷合盛取旋貼雄黃膏治積年冷漏黃水不止雄黃硫黃研細各一分頭髮黃蠟各半兩右用麻油二兩煎熬頭髮鎔盡去滓次入雄黃硫黃碎片黃蠟浸火上桑枝頻攪為膏攤生絹貼用藥先以赤耳草頭煎湯洗或露蜂房白芷煎湯常洗常貼易青黛散治多年冷瘡瘻青黛一分細研麝香一分細研莨菪子一分䕡茹一分右為末都研令勻用一捻內瘡孔中更以後用雄黃膏貼之治冷瘻及諸瘻瘡出聖惠方蜣蜋三枚麝香一錢研細松脂一兩乾膽一枚右為細末入蜜少許和捻作餅子先淨洗瘡上貼以瘥為度治冷瘻及骨疽瘡一切癬數年不瘥者出聖惠方附子一分生用為末硫黃半分細研膩粉一分右件藥都研勻以生油調塗之甚切效治冷瘻及諸瘻瘡出聖惠方皂莢一兩藜蘆一兩右件藥都燒為灰細研漸漸敷之又方出聖惠方硃砂一分砒黃一分右件藥同研合細以粳米飯和丸如麻子大填入瘡口內旬日便瘥乳香丸出仁濟直指方治泠漏白淨滴乳香一分牡蠣半分右為細末雪糊糕丸麻子大每服三十丸道地川白薑生用煎湯空心送下久瘻附論夫久瘻者是諸瘻連滯經久不瘥或暫瘥後復發或移易三兩處更相應通故為久瘻也方五方帛膏出聖惠方治積年瘻瘡及一切惡瘡救急者五方帛炙一分亂髮二兩洗令淨黃芩一兩紫苑洗去苖土莨菪子倒釣棘針乳香二兩石鹽一兩黃蠟二兩麝香一兩細研黃丹七兩胡粉生麻油一升松脂一兩與乳香著油同搗水銀一兩并胡粉點少水研令星盡用右件藥各搗研就先將油入鐺中鍊煙少出即下五方帛亂髮用武火煎髮帛消盡後下黃芩等四味良久下松脂乳香二味又攪良久下麝香黃蠟又熟攪次下黃丹胡粉石鹽水銀又微用火急攪勿住手取一碗泠水點著硬即收之每用攤放帛上貼日二三換之截疳散出瘡科精要治年深疳瘻瘡黃連半兩白斂白芨黃丹各一兩輕粉一錢龍腦麝香各半錢别研蜜陀僧一兩右為細末和勻乾摻或捻上以膏貼之生肌散出濟生拔萃方寒水石銼滑石一兩烏魚骨龍骨各一兩定粉蜜陀僧白礬灰乾胭脂各半兩右為極細末乾摻用之黃耆丸治漏瘡連年不瘥出膿水不止黃耆銼牡丹皮各三分犀角鎊甘草炙銼各一兩玄參惡實炒木通銼各一兩半右為末煉蜜和丸如梧桐子大每服二十丸空心酒溫送下晚再服之治久瘻核易三數處皆生瘡孔者出聖惠方烏蛇一兩半酒浸去皮骨炙令微黃蒺莉子三分曲頭棘針半兩馬齒莧三分墻上者頭髮半兩燒灰雄黃一分細研緋帛半兩燒灰右件都搗研為末以酒調下內瘡中看乾即更著以瘥為度平肌散出仁濟直指方治漏瘡久不合露乾則用老狗頭骨露蜂房生髮各存性燒一分新桑白皮半分右為細末入麝香少許輕粉津唾調敷乾則摻露蜂房散出仁濟直指方治久年漏瘡或暫瘥復發或移於别處多孔露蜂房炙黃三分穿山甲炙燋龍骨右末入麝香以臘月豬脂調敷濕則摻治久瘻移易三數處皆生瘡孔者出聖惠方蝙蝠糞一兩半白殭蠶半兩雄蠶蛾半兩乳頭香半兩蜀茶末半兩右為細末敷瘡上以瘥為度久漏方出仁濟直指方右用九孔蜂房炙黃為末臘月豬脂研敷候收汁以真龍骨降真香節細末入些乳香研瘡上敷之又捷效方出危氏方用信石新瓦上火煆過為末以津液潤紙探子醮少許推入瘡孔內如瘡孔多不可齊上藥免使害人烏藥膏出聖濟總録治諸漏久不瘥烏藥二兩末豬膽三枚右以膽汁和烏藥末令勻以薄綿褁內瘡口日三五度神助散出危氏方治瘻瘡十餘年不瘥檳榔黃連去鬚右為細末先活鱔魚一條擲於地候鱔因盤屈以竹針五七枚貫之覆瘡良久取視當有白蟲數十如針著鱔上取去復覆之如此五六度即已用藥量多少覆之一方敷藥明日以乾艾作湯投白湯三二錢洗不一月全愈蓋老人血氣冷必候艾力以佐陽而艾性亦能殺蟲凡瘡一月蟲蠕動氣血亦隨之故瘡不可即合則結痛實蟲所為治瘻瘡多年不瘥出於胸前或脅肋腳脛間者無不效方出聖惠方用江淮多年破船上泥縫脂灰不限多少搗羅為末以雞子清和作團用炭火燒令通赤待冷準前團燒之如此三遍即搗細羅末入麝香蜂窠膏治久瘻生九孔者方見本門蜂瘻類又方出聖惠方用梔子燒成灰細研以羊髓調塗之治逺年漏瘡黍葉褁敷方用黍葉爛搗褁敷瘡上日三度又方用栝樓根搗羅為末塗敷瘡上日三五度殭蠶塗敷方治逺年漏瘡不瘥用殭蠶炒搗為末塗敷瘡口以熟艾作炷炙之癢痛初惡膿出後清血出便用蠶末塞瘡內以帛褁定三竒散出衛生家寶治漏瘡久不生肌臭爛不可治麒麟竭黃連白礬各半兩右為末敷於瘡上用膏藥寬貼之蜣蜋丸出衛生家寶治惡漏瘡經久不瘥惡肉內潰蜣蜋蟲自死者一分燒灰巴豆一錢去殼燒灰微存性右碾細以津丸如麻子大內一丸入漏瘡孔內治漏瘡成孔子膿水淋漓經時不瘥用之立驗出衛生家寶降真香三兩雄黃一兩有泥土者研水飛過躑躅花半兩麝香少許别研右為末用紙撚子蘸上藥任瘡竅中痛即止治漏腮膿水淋漓不止出衛生家寶右用豬蹄殼用鹽泥固濟燒為灰末以麻油輕粉調塗瘡口三兩上即瘥普濟方卷二百九十三
