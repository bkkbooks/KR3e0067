薑藁本桂心蜀椒各一分汁右搗下篩先食茱萸一分以酒服一撮忌生蔥赤小豆散出聖惠方治鼠瘻及出膿水項強頭底四肢寒熱赤小豆一合炒熟白斂一兩露蜂房一兩燒灰蛇皮二條燒灰右為細末每服食前以溫調下一錢死鼠膏出聖惠方治鼠瘻死鼠一枚中形者亂髮松脂二兩黃丹六兩炒令紫色右件藥用油一斤以文火煎鼠髮候消以綿濾去滓又入鐺中然後下松脂黃丹以栁木箆攪令勻膏成於瓷器中盛每月塗貼日二易之外正膏治鼠漏死貓兒骨酒和醋炙一片三寸長皂莢去皮子醋炙一挺木鱉子去殼生用二七粒重粉半錢匕研右為末每用三錢匕用米醋熬成膏敷之如一兩日未效即用溫酒調二錢匕服畢衣被蓋出汗即瘥馬齒莧膏出聖惠方治一切癰疽皆是瘡痕根本所患癰之後膿汁不止冷即是鼠瘻是以漏者急須療之馬齒草五升切槲白皮一斤水五升煮取一升清澄麝香半臍乾之仍研作末杏仁半升油煎令黑搗如膏右以瓷器貯之合和以三四重帛密繫口病已成瘡者以泔清淨洗拭乾煎作貼子塗藥貼著瘡上日三易若未作瘡如作瘰癧子者以艾一升薑黃如棗大乾漆如棗大末之釡月下土三味並末和艾作炷炙三七壯馬靈丹烏魚骨二錢半狗脊二錢半輕粉二錢半銅緑二錢半右用成日姓人不犯紅日搗為末竹紙包就大效斑貓散出聖惠方治鼠瘻著頸生小者如杏大者如杯斑貓十枚去頭翅足糯米拌炒令黃色牡丹三分海藻一兩洗去醎味焙乾右為末每日空心及夜臥時以蔥白湯調下半錢病根當於小便中出加魚脬利後只得喫粥一方有牡蠣無牡丹酒調服忌蒜仙人曉散出聖濟總録治鼠漏黑貓死者取骨一兩燒灰存性甘草炙為末三分麝香别研半分右研細分作六服每服臨卧時溫酒調下療鼠瘻諸惡瘡方苦參三斤露蜂房三兩麵二升右以水三斗漬藥三宿去滓黍米二升釀熱飲日三一方得蝟皮一具又方治老鼠瘡久不瘥用臘月八日醋浸川烏五箇五月初五日午時烏頭切作三十五塊與同醋浸三十五日却用三味胡椒三十枚麥門冬三十粒川烏搗爛為末右為末黃蠟為丸忌用鐡器用黃丹用丙午日合黃蠟為丸鼠糞大右卧左點左卧右點之即可死蛇鼠膏治鼠瘻方見本門蟻瘻類槲皮煎治鼠瘻方見本門蟻瘻類貓腦骨散出聖惠方治鼠瘻方見本門諸瘰癧類半夏膏出聖惠方治鼠瘻半夏一兩搗羅為末鯸鮧魚脂一兩煎肥者右一處調如膏旋取塗瘡上狐頭散出聖惠方野狐頭一枚炙令黃狸頭一枚炙令黃右搗為末漿水洗拭乾以豬脂調敷之杏仁塗膏治鼠瘻方見本門諸瘻方治鼠漏瘡方出聖惠方死鼠一枚中形者亂髮如雞子大一枚右臘月豬脂一斤煎二味合消盡濾去滓成膏分作二分一分稍稍塗瘡一分稍稍酒服之瘥鼠子當從瘡中出良療鼠瘻方烏頭炮附子炮合二兩右㕮咀著五升淳苦酒中漬之待乾復內苦酒中燥復內以苦酒浸盡曝令乾搗末酒服方寸匕日三忌豬肉冷水等療鼠瘻方馬齒礬石燒真珠粉右為末厚塗瘡上不過三愈療鼠瘻方出肘後方礬石三分燒班貓一分去頭足翅熬右為細末用酢醬服半匕須臾瘻蟲從小便出麝香塗方出聖惠方療鼠瘻穿穴成瘡痛不可忍麝香研雌黃研一作雄黃右等分研為末取蝦蟆背白汁和塗瘡孔中日一度一方用酥和內瘡孔中治鼠瘻方出聖惠方用糞燒為灰細研敷上又方出聖惠方用瓠花曝乾搗羅為末敷之地黃膏出千金方治鼠漏瘡瘥後復發及不愈出膿血不止用不落水豬脂㕮咀生地黃內脂中令脂與地黃足相掩和煎六七沸其瘡先用桑灰汁洗去惡汁次以地黃膏敷瘡上日一易之治鼠漏方出千金方右將蛇腹所吞鼠燒灰末服方寸匕日再不過三服此大驗但難過耳并敷瘡口中外臺祕要有蝦蟆一方蝮蛇腹中所吞鼠乾之末敷治鼠漏腫核痛未成膿者出肘後方用柏葉敷腫上熬鹽著葉上尉之令熱氣下即消治鼠漏已有口膿血出者出肘後方用白鮮皮煎汁服一升當吐出鼠子愈治鼠漏腫核痛若有瘡口出膿水者出肘後方用蜘蛛二七枚燒敷良治鼠瘻用新鼠屎一百粒以粒收入密器中五六十日杵碎以敷瘡孔中又方用蝮蛇磨著物皆透治鼠瘻鼠扐齒人瘡用狸頭骨燒灰敷之療鼠瘻方用五月五日核桃搗末先鹽湯洗拭之令乾以末敷瘡上療鼠瘻要方出肘後方用柞木皮五升水一斗煮熟去皮煎令汁得二升稍稍服盡當有宿油出即愈療鼠瘻久不瘥方用狼鼠不限多少常作羮粥任喫之必驗療鼠瘻方兼治螻蛄瘻用槲葉搗末敷腫上熱炒鹽尉之即消良效治鼠漏腫核痛若已有瘡口膿血出者出肘後方用牛熱屎傅之日三有蜣蜋出雞子塗敷方出肘後方治鼠瘻方見本門諸瘻類治鼠漏惡瘡用蟾酥眉脂以麻油調塗立效治鼠瘻腫核痛若有瘡口膿血出者出肘後方用貓狸一物料理作羹如食法空心進之鼠子死出又當生吞其功彌效一方單用貓作羹食之治卒得鼠瘻有瘰癧未發瘡而速熱者出肘後方用搗烏雞足并車前治老鼠瘡久不瘥用綿絮燒灰或瘡乾用者油調敷如濕乾末摻之又方用竈心焦土碎研香油調敷之班烏散出衛生家寶治瘰癧鼠漏班貓何首烏糯米右等分同炒令黃色去班貓用二藥為末酒調服取蟲出如鼠能動其病息愈五靈脂散出衛生家寶塗瘡口治鼠瘻出本草右用死蜣蜋燒作末苦酒和敷之數過即愈先以鹽湯洗之治鼠瘻瘡出本草右以通草煎服之磨亦得療諸毒鼠瘻出本草以玄參又名馥草酒漬飲之療鼠瘻瘰癧出本草取臘月豬脂調塗之治鼠瘻用雞卵一枚米下蒸半日取出黃炒令黑色先拭瘡上汗令乾以炒煮雞子黃內瘡孔中三度即瘥又方用堇菜乾為末和油煎成膏摩瘻上三度瘥堇菜野生非人所種名堇葵葉似折子如米花紫色螻蛄瘻附論夫螻蛄瘻者由食果瓜子不避有蟲即便噉食內傷子腸有毒不去變化所生也始發之時在於頭上狀如蝸形癮疹而出其根在大腸也方荏子桔梗丸出千金方治螻蛄漏始發於頸項狀如腫此得之食瓜果實毒不去其根在大腸荏子主之桔梗為之佐荏子龍骨各半兩附子一兩蜀椒一百粒桂心桔梗乾薑外臺祕要作礬石獨活芎藭各五分右為末以棗十枚合搗醋漿和丸如大豆溫漿下五丸加至十丸丹參散出聖惠方治螻蛄瘻生於項門腫硬疼痛丹參二兩蒴藋根二兩甘草半兩炙微赤銼秦芁一兩去苖獨活一兩牛蒡子一兩躑躅花半川椒半兩去日及閉口者微炒去汗牛膝一兩去苖右㕮咀每服三錢水一中盞煎至六分去滓每日空心及晚食前服之桂心丸出聖惠方治螻蛄瘻疼痛出膿水桂心一分黃耆半兩銼礬石鍊子者一分芎藭一分大黃半兩銼碎微炒烏喙半兩炮去尾川椒一百粒去日及閉口者微炒去汗虎脛骨半兩塗用炙黃右為細末煉蜜和丸如菉豆大每日空心及晚食前以溫漿水下二丸長亭散出聖惠方治螻蛄瘻亭長六枚去頭足翅糯米拌炒令黃色川大黃半兩銼碎微炒細辛半兩桂心一分鱗鯉一兩炙令黃楓樹中蟲糞三指撮右為細末每日空心溫酒調下一錢晚食前再服馬齒莧膏治螻蛄瘻方見本門諸瘻類治螻蛄瘻出聖惠方用槲葉燒灰細研右以泔别漬槲葉取汁洗瘡拭乾內少許灰於瘡中蜂瘻附論夫蜂瘻者由飲食勞倦渴乏多飲流水即蜂毒不去變化所生也如發之時其根在頭瘰癧三四處俱腫潰生瘡狀如癰形瘥而復生其根在脾也方雄黃黃芩散出千金方治蜂漏如發於頸瘰癧三四處俱相連以潰此得之飲流水中有蜂毒不去其根在脾雄黃主之黃芩為之佐雄黃黃芩各一兩蜂房一具鱉甲茴香吳茱萸乾薑各半兩蜀椒三百粒右治下篩敷瘡口上日一度十日止外臺祕要無雄黃黃芩五香散出聖惠方治蜂瘻發於頸項纍纍相連腫痛沉香一兩半丁香一兩木香一兩半薰陸香二兩半川升麻一兩半連翹二兩半麝香一分細研右件藥搗細羅為散同研藥令勻每服一錢以水一中盞煎至六分每空心及晚食前溫服露蜂散出聖惠方治蜂瘻有頭露蜂房一枚鱉甲一分吳茱茰一分川椒三百粒乾薑一分雄黃一分細研右為細末研入雄黃以生油調塗瘡口上日三度用之皂莢丸出聖惠方治蜂瘻生於項間三五相連如彈子腫赤疼痛皂莢八兩四兩捶碎以新汲水二升浸一宿搗絞取汁四兩去皮以酥一兩塗炙令黃燋牛蒡子蝸牛牽牛子微炮以上各兩半右為細末取前皂莢汁於銀器中漫火熬至一升以未入藥味更熬令可丸即丸如梧桐子大每服二十丸以黃香湯下每日空心及晚食前服索豆散出聖惠方治蜂瘻索豆二兩炒熟白斂一兩牡蠣一兩燒灰右為細末每服以溫酒調下一錢日三服治蜂瘻方出聖惠方用人屎蛇蛻皮灰臘月豬脂和敷之一方有麝香蜂窠膏出聖惠方治蜂瘻用蜂窠燒灰炙黃為末亦可用臘月豬膏和敷孔中一方療鼻內肉外查瘤膿血出者是蜂瘻方單用蜂房炙燋為末酒調一錢服粥飲調亦得空心日一服蜂瘻初生狀如桃而癢搔之則引大如雞子如覆手者出聖惠方用熬鹽尉之三宿四日瘥不瘥至百日成瘻其狀大如四五子石廣三寸中生蜂作孔乃有數百以石硫黃隨多少燃燭燒令汁出著瘡孔中須臾間見蜂數十蜂盡瘥又方出聖惠方用死蜣蜋燒為灰細研醋和塗之又方出聖惠方用鴉頭燒灰細研敷之蚍蜉瘻附論夫蚍蜉瘻者因寒腹中臚脹所得寒毒不去變化所生也始發之時在其頸項使人壯熱若傷寒有似疥癬瘻瘻孔出其根在肺也方礬石防風散出千金方治蚍蜉漏始發於頸初得如傷寒此得之食中有蚍蜉毒不去其根在腎礬石主之防風為之佐礬石防風知母雄黃桃白皮乾地黃獨活青黛班貓白芷松脂一作白脂芍藥海藻當歸各一分白术蝟皮各四分蜀椒一百粒右治下篩每服一錢日三服外臺祕要無礬石防風礬石散出聖濟總録治蚍蜉瘻始發在項如患傷寒此因喫食中蚍蜉其根在腎可皆治之白礬燒令汁枯半兩李白皮桃白皮獨活去蘆頭知母生乾地黃雄黃研令一分蝟皮白术各三分青黛研斑貓去足翅糯米炒白芷桐皮蜀椒去目并閉口炒出汗一百粒芍藥海苔當歸焙各一分右為細末每日空心溫酒調下一錢日三桃白皮散出聖惠方治蚍蜉瘻發於頸上初得壯熱後却成瘡出膿水疼痛桃白皮半兩銼川大黃半兩銼碎微炒知母生地黃乾半兩雄黃一分細研蝟皮一兩炙令黃獨活半兩青黛一分細研川椒一百粒去目及閉口者微炒去汁白芷一分松脂赤芍藥一分海苔一分右為細末都研令勻每日空心及晚食前溫粥調下一錢治蚍蜉瘻出聖惠方龜膽三枚犬牙三枚炙令黃琥珀半兩虺蛇頭一枚炙令黃雄黃半兩細研豬牙三枚炙令黃色右為細末以醋和勻敷瘡一宿神驗赤小豆散出聖惠方治蚍蜉瘻方見本門鼠瘻類蠐螬瘻附論夫蠐螬瘻者由恐懼愁憂思慮哭泣不止餘毒變化所生也始發之時在頸項無頭尾如棗核或移動皮中使人寒熱心悶其根在心也方礬石白术散出千金方治蠐螬漏始發於頸下無頭尾如棗核塊纍移在皮中使人寒熱心悶得之因喜怒哭泣其根在心礬石主之白术為之佐礬石白术空青當歸各三分細辛一兩蝟皮一作乾蝟肉斑貓枸杞一作根地膽各一分去翅足乾鳥腦脂二七豆許右治下篩以酢漿服方寸匕日三病在上側轉卧在下高枕卧使藥下流忌生菜桃李雀肉生血物玄參散出聖惠方治蠐螬瘻結核腫痛玄參二兩川升麻二兩獨活二兩漢防風一兩甘菊花一兩連翹三兩犀角屑半兩川大黃半兩銼碎微炒右㕮咀每服四錢水一中盞煎至六分去滓每於食前溫服空青散出聖惠方治蠐螬瘻發於頸如棗核在皮中不能消散結腫痛疼空青三分燒過細