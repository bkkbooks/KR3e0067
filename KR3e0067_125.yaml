body:
  text: 普濟方卷一百二十六明周王朱橚撰傷寒門辨脈法第一問曰脈有陰陽者何謂也答曰凡脈大浮數動滑此名陽也曰沉澀弱弦微此名隂也凡隂病見陽脈者生陽病見隂脈者死內經曰微妙在脈不可不察察之有紀從隂陽始始之有經從五行生兹首論脈之隂陽者以脈從隂陽始故也陽脈有五隂脈有五以脈從五行生故也陽道常饒大浮數動滑五者謂之平脈也有餘故謂之陽隂道常虗沉澀弱弦微五者謂之平脈也不及故謂之隂傷寒之為病邪在表則見陽脈邪在裡則見陰脈隂病見陽脈而主生者則邪氣自裏之表欲汗而解也如厥隂中風脈微浮為欲愈不浮為未愈者是也陽病見隂脈而主死者則邪氣自表入裏正虛邪勝如讝言妄語脈沉細者死是也金匱要略曰諸病在外者可治入裏者即死此之謂也問曰脈有陽結隂結者何以别之答曰其脈浮而數能食不大便者此為實名曰陽結也期十七日當劇其脈沉而遲不能食身體重大便反鞕名曰隂結期十四日當劇結者氣偏結固隂陽之氣不得而雜之陰中有陽陽中有隂隂陽相雜以為和不相雜以為結浮數陽脈也能食而不大便裏實也為陽氣結固隂不得而雜之是名陽結沉遲隂脈也不能食身體重隂病也隂病見隂脈則當下利今大便鞕者為隂氣結固陽不得而雜之是名隂結論其數者傷寒之病一日太陽二日陽明三日少陽四日太隂五日少隂六日厥隂至六日為傳經盡七日當愈七日不愈者謂之再經言再經者再自太陽而傳至十二日再至厥隂為傳經盡十三日當愈十三日不愈者謂之過經言再過太陽之經亦以次而傳之也陽結為火至十七日傳少隂水能制火火邪解散則愈隂結屬水至十四日傳陽明土土能制水水邪解散則愈彼邪氣結甚水又不能制火土又不能制水故當劇內經曰一候後則病二候後則病甚三候後則病危也問曰病有灑淅惡寒而復發熱者何答曰隂脈不足陽往從之陽脈不足隂往乘之曰何謂陽不足答曰假令寸口脈微名曰陽不足隂氣上入陽中則灑淅惡寒也何謂隂不足答曰假令尺脈弱名曰隂不足陽氣下陷入隂中則發熱也一隂一陽謂之道偏隂偏陽謂之疾隂偏不足則陽得而從之陽偏不足則隂得而乘之陽不足則隂氣上入陽中為惡寒者隂勝則寒矣隂不足陽氣下陷入隂中為發熱者陽勝則熱矣陽脈浮隂脈弱則血虛血虛則筋急也陽為氣隂為血陽脈浮者衛氣強也隂脈弱者榮血弱也難經曰氣主詬之血主濡之血虛則不能濡潤筋絡故筋急也其脈沉者榮氣微也內經云脈者血之府也脈實則血實脈虛則血虛此其常也脈沉者知榮血內微也其脈浮而汗出如流珠者衛氣衰也針經云衛氣者所以溫分肉充皮毛肥腠理司開闔者也脈浮汗出如流珠者腠理不密開闔不司為衛氣外衰也浮主候衛沉主候榮以浮沉別榮衛之衰微理固然矣然而衰甚于微所以于榮言微而衛言衰者以其汗出如流珠為陽氣外脫所以衛病氣甚于榮也微者加燒針則血流不行更發熱而躁煩也衛陽也榮隂也燒針益陽而損隂榮氣微者胃隂虛也內經曰隂虛而內熱又加燒針以補陽不惟兩熱相合而榮血不行必更外發熱而內躁煩也脈藹藹如車蓋者名曰陽結也藹藹如車蓋者大而厭厭聶聶也為陽氣鬱結于外不與隂氣和雜也脈纍纍如循長竿者名曰隂結也纍纍如循長竿者連連而強直也為隂氣鬱結于內不與陽氣和雜也脈瞥瞥如羮上肥者陽氣微也輕浮而主微也脈縈縈如蜘蛛絲者陽氣衰也縈縈滯也若縈惹之不利也陽衰宜矣脈綿綿如㵼漆之絶者亡其血也綿綿者連綿而軟也如㵼漆之絶者前大而後細也正理論曰天樞開發精移氣變隂陽交會胃和脈生脈復生也陽氣先至隂氣後至則脈前為陽氣後為隂氣脈來前大後細為陽氣有餘而隂氣不足是知亡血脈來緩時止復來者名曰結脈來數時止復來者名曰促脈陽盛則促隂盛則結此皆病脈脈一息四至曰平一息三至曰遲小駃於遲曰緩一息六至曰數時有一止者隂陽之氣不得相續也陽行也速隂行也緩緩以候隂若隂氣勝而陽不能相續則脈來緩而時一止數以候陽若陽氣勝而隂不能相續則脈來數而時一止傷寒有結代之脈動而中止不能自還為死脈此結促之時止是隂陽偏勝而時有一止即非脫絶而止云此皆病脈隂陽相搏名曰動陽動則汗出隂動則發熱形冷惡寒者此三焦傷也動為隂陽相搏方其隂陽相搏而虛者則動陽動為陽虛故汗出隂動為隂虛故發熱也如不汗出發熱而反形冷惡寒者三焦傷也三焦者原氣之別使主行氣于陽三焦既傷則陽氣不通而微致身冷而惡寒也金匱要略曰陽氣不通即身冷經曰陽微則惡寒若數脈見於關上上下無頭尾如豆大厥厥動搖者名曰動也脈經曰陽出隂入以關為界關為隂陽之中也若數脈見于關上上下無頭尾如豆大厥厥動搖者是隂陽之氣相搏也故名曰動陽脈浮大而濡隂脈浮大而濡隂脈與陽脈同等者名曰緩也陽脈寸口也隂脈尺中也上下同等無有偏勝者是隂陽之氣和緩也非若遲之有邪也隂陽偏勝者為結為促隂陽相搏者為動隂陽氣和者為緩學者不可不知也脈浮而緊者名曰弦也弦者壯如弓弦按之不移也脈緊者如轉索無常也脈經云弦與緊相類以弦為虛故雖緊如弦而按之不移則不足也經曰弦則為藏以緊為實是切之如轉索無常而不散金匱要略曰脈緊如轉索無常者有宿食也脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人半産漏下男子則亡血失精弦則為減減則為寒寒者謂陽氣少也大則為芤芤則為虛虛者謂血少不足也所謂革者言其既寒且虛則氣血改革不循常度男子得之為真減而不能內固故主亡血失精婦人得之為隂血虛而不能滋養故主半産漏下問曰病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出而解也浮為陽緊為隂芤為虛隂陽爭則戰邪氣將出邪與正爭其人本虛是以發戰正氣勝則戰戰已復發熱而大汗解也若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也浮數陽也本實陽勝邪不能與正爭故不發戰也問曰病有不戰而汗出解者何也答曰脈大而浮數故知不戰而汗出解也陽勝則熱隂勝則寒隂陽爭則戰脈大而浮數皆陽也故不戰而汗出解也不戰不汗出而解者何也答曰其脈自微此以曽經發汗若吐若下若亡血以內無津液此隂陽自和必自愈故不戰不汗出而解也脈微者邪氣微也邪氣已微正氣又弱脈所以微既經發汗吐下亡陽亡血內無津液則不能作汗得隂陽氣和而自愈也問曰傷寒三日脈浮數而微病人身涼和者何也答曰此為欲解也解以夜半脈浮而解者濈然汗出也脈數而解者必能食也脈微而解者必大汗出也傷寒三日陽出入隂之時病人身熱脈浮數而大邪氣傳也若身涼和脈浮數而微者則邪氣不傳而欲解也解以夜半者陽生于子也脈浮主濈然汗出而解者邪從外散也脈數主能食而解者胃氣和也脈微主大汗出而解者邪氣微也問曰脈病欲知愈未愈者何以别之答曰寸口關上尺中三處大小浮沈遲數同等雖有寒熱不解者此脈隂陽為和平雖劇當愈三部脈均等即正氣已和雖有餘邪何害之有立夏得洪大脈是其本位其人病身體苦疼重者須發其汗若明日身不疼不重者不須發汗若汗濈濈自出明日便解矣何以言之立夏得洪大脈是其時脈故使然也四時倣此脈來應時為正氣內固雖外感邪氣但微自汗出而亦解爾內經曰脈得四時之順者病無他問曰凡病欲知何時得何時愈答曰假令夜半得病明日日中愈日中得病夜半愈何以言之日中得病夜半愈者以陽得隂則解也夜半得病明日日中愈者以隂得陽則解也日中得病者陽受之夜半得病者隂受之陽不和得隂則和是解以夜半隂不和得陽則和是解以日中經曰用陽和隂用隂和陽寸口脈浮為在表沈為在裏數為在府遲為在藏假令脈遲此為在藏也經曰諸陽浮數為乘府諸隂遲澀為乘藏趺陽脈浮而澀少隂脈如經也其病在脾法當下利何以知之若脈浮大者氣實血虛也今趺陽脈浮而澀故知脾氣不足胃氣虛也以少隂脈弦而浮才見此為調脈故稱如經也若反滑而數者故知當屎膿也趺陽者胃之脈診得浮而澀者脾胃不足也浮者以為氣實澀者以為血虛者此非也經曰脈浮而大為氣實大為血虛若脈浮大當為氣實血虛今趺陽脈浮而澀浮則胃虛澀則脾寒脾胃虛寒則榖不消而水不别法當下利少隂腎脈也腎為肺之子為肝之母浮為肺脈弦為肝脈少隂脈弦而浮為子母相生故云調脈若滑而數者則客熱在下焦使血流腐而為膿故屎膿也寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼當發其汗也脈經曰風傷陽寒傷隂衛為陽榮為隂風為陽寒為隂各從其類而傷也易曰水流濕火就燥者是也衛得風則熱榮得寒則痛榮衛俱病故致骨節煩疼當與麻黃湯發汗則愈趺陽脈遲而緩胃氣如經也趺陽脈浮而數浮則傷胃數則動脾此非本病醫特下之所為也榮衛內陷其數先微脈反但浮其人必大便鞕氣噫而除何以言之本以數脈動脾其數先微故知脾氣不治大便鞕氣噫而除今脈反浮其數改微邪氣獨留心中則飢邪熱不殺穀潮熱發渴數脈當遲緩脈因前後度數如法病者則飢數脈不時則生惡瘡也經常也趺陽之脈以候脾胃故遲緩之脈為常也脈浮數則為醫妄下傷胃動脾邪氣乘虛內陷也邪在表則見陽脈邪在裏則見隂脈邪在表之時脈浮而數也因下裏虛榮衛內陷邪客於脾以數則動脾今數先微則是脾邪先陷于裏也胃虛脾熱津液乾少大便必鞕針經曰脾病善噫得後與氣則快然如衰今脾客邪熱故氣噫而除脾能消磨水穀今邪氣獨留于脾脾氣不治心中雖飢而不能殺穀也脾主為胃行其津液脾為熱燥故潮熱而發渴也趺陽之脈本遲而緩因下之後變浮為數榮衛內陷數復改微是脈因前後度數如法邪熱內陷於脾而心中善飢也數脈不時者為數當改微而復不微如此則是邪氣不傳于裏但鬱于榮衛之中必出自肌皮為惡瘡也師曰病人脈微而澀者此為醫所病也大發其汗又數大下之其人亡血病當寒後乃發熱無休止時夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒隂弱則發熱此一發其汗令陽氣微又大下之令隂氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著復衣十一月之時陽氣在裏胃中煩熱以隂氣內弱不能勝熱故欲裸其身又隂脈遲澀故知亡血也微為亡陽澀則無血不當汗而強與汗之者令陽氣微隂氣上行陽中則惡寒故曰陽微則惡寒不當下而強與下之者令隂氣弱陽氣下陷入隂中則發熱故曰隂弱則發熱氣為陽血為隂陽脈以候氣隂脈以候血隂脈遲澀為榮血不足故知亡血經曰尺脈遲者不可發汗以榮氣不足血少故也脈浮而大心下反鞕有熱屬藏者攻之不令發汗浮大之脈當責邪在表若心下反鞕者則熱已甚而內結也有熱屬藏者為别無虛寒而但見裏熱也藏屬隂為邪在裏故可下之攻之謂下之也不可謂脈浮大便與發汗病源曰熱毒氣乘心心下痞滿此為有實宜速下之屬府者不令溲數溲數則大便鞕汗多則熱愈汗少則便難脈遲尚未可攻雖心下鞕若餘無裏症但見表證者為病在陽謂之屬府當先解表然後攻痞溲小便也悮為飲結而利小便使其溲數大便必鞕也經曰小便數者大便必鞕謂走其津液也汗多則邪氣除而熱愈汗少則邪熱不盡又走其津液必便難也鞕家當下設脈遲則未可攻以遲為不足即裏氣未實故也脈浮而洪身汗如油喘而不休水漿不下形體不仁乍靜乍亂此為命絶也病有不可治者為邪氣勝於正氣也內經曰大則邪至又曰大則病進脈浮而洪者邪氣勝也身汗如油喘而不休者正氣脫也四時以胃氣為本水漿不下者胃氣盡也一身以榮衛為充形體不仁者榮衛絶也不仁為痛癢俱不知也針經曰榮衛不行故為不仁爭則亂安則靜乍靜乍亂者正與邪爭正負邪勝也正氣已脫胃氣又盡榮衛俱絶邪氣獨勝故曰命絶也又未知何藏先受災其若汗出髮潤喘不休者此為肺先絶也肺氣之主為津液之帥汗出髮潤者為津液脫也喘不休者氣脫也陽反獨留形體如煙薰直視搖頭者此心絶也肺主氣心主血氣為陽血為隂陽反獨留者則為身體復熱是血先絶是氣獨在也形體如煙薰者為身無精華是血絶不榮於身也心脈挾咽系目直視者心經絶也頭為諸陽之會搖頭者隂絶而陽無根也脣吻反青四肢漐習者此為肝絶也脣吻者脾之候肝色青肝絶則真色見于所勝之部也四肢者脾所主肝主筋肝絶則筋脈引急發于所勝之分也漐習者為振動若搐搦手足時時引縮也環口黧黑柔汗發黃者此為脾絶也脾主口脣絶則精華去故環口黧黑柔汗冷汗也柔為隂脾胃為津液之本陽氣之宗柔汗發黃者脾絶而陽脫真色見也溲便遺失狂言目反直視者此為腎絶也腎司開闔禁固便溺溲便遺失者腎絶不能約制也腎藏志狂言者志不守也內經曰狂言者是失志矣失志者死針經曰五藏之精氣皆上注于目骨之精為瞳子目反直視腎絶則骨之精不榮於瞳子而不轉也又未知何藏隂陽前絶若陽氣前絶隂氣後竭者其人死身色必青隂氣前絶陽氣後竭者其人死身色必赤腋下溫心下熱也陽主熱而色赤隂主寒而色青其人死也身色青則隂未離乎體故曰隂氣後竭身色赤腋下熱則陽未離乎體故曰陽氣後竭針經曰又有兩死而無兩生者此之謂也寸口脈浮大而醫反下之此謂大逆浮則無血大則為寒寒氣相搏則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人必䭇經云脈浮大應發汗若反下之為大逆浮大之脈邪在表也當發其汗若反下之是攻其正氣邪氣得以深入故為大逆浮則無血者下後亡血也大則為寒者邪氣獨在也寒邪因裏虛而入寒氣相搏乃為腸鳴醫見脈大以為有熱飲以冷水欲令水寒勝熱而作大汗裏先虛寒又得冷水水寒相搏使中焦之氣澀滯故令䭇也趺陽脈浮則為虛浮虛相搏故令䭇言胃氣虛竭也脈滑則為噦此為醫咎責虛取實守空迫血脈浮鼻中燥者必衄也趺陽脈浮為䭇脈滑為噦皆醫之咎責虛取實之過也內經曰隂在內陽之守也陽在外隂之使也發汗攻陽亡津液而陽氣不足者謂之守空經曰表氣微虛裏氣不守故使邪中于隂也隂不為陽守邪氣因得而入之內搏隂血隂血失所血乃妄行未知從何道而出若脈浮鼻燥者知血必從鼻中出也諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常者畜積有膿也浮數之脈主邪在經當發熱而灑淅惡寒病人一身盡痛不欲食者傷寒也若雖發熱惡寒而痛偏著一處飲食如常者即非傷寒是邪氣鬱結於經絡之間血氣壅遏不通血欲聚而成癰膿也脈浮而遲面熱赤而戰惕者六七日當汗出而解反發熱者差遲遲為無陽不能作汗其身必癢也脈浮靣熱赤者邪氣外浮于表也脈遲戰惕者本氣不足也六日為邪傳經盡當汗出而解之時若當汗不汗反發熱者為裏虛津液不多不能作汗既不汗邪無從出是以差遲發熱為邪氣浮於皮膚必作身癢也經曰以其不能得小汗出故其身必癢也寸口脈隂陽俱緊者法當清邪中於上焦濁邪中於下焦清邪中上名曰潔也濁邪中下名曰渾也隂中於邪必內栗也表氣微虛裏氣不守故使邪中於隂也陽中於邪必發熱頭痛項強緊頸攣腰痛脛酸所謂陽中霧露之氣故曰清邪中上濁邪中下隂氣為栗足膝逆冷便溺妄出表氣微虛裏氣微急三焦相溷內外不通上焦怫鬱藏氣相薰口爛食齗也中焦不治胃氣上衝脾氣不轉胃中為濁榮衛不通血凝不流若胃氣前通者小便赤黃與熱相搏因熱作使遊于經絡出入藏腑熱氣所過則為癰膿若隂氣前通者陽氣厥微隂無所使客氣入內嚏而出之聲嗢咽塞寒厥相逐為熱所擁血凝自下狀如豚肝隂陽俱厥脾氣孤弱五液注下下焦不闔清便下重令便數難臍築湫痛命將難全浮為陽沈為隂陽脈緊則霧露之氣中於上焦隂脈緊緊則寒邪中于下焦上焦者太陽也下焦者少隂也發熱頭痛項強頸攣腰痛脛酸者霧露之氣中於太陽之經也濁邪中下隂氣為栗足脛逆冷便溺妄出者寒中少隂也因表經也微虛邪入而客之又裏氣不守邪乘裏弱遂中於隂陽虛遇邪內為懼栗致氣微急矣內經曰陽病者上行極而下隂病者下行極而上此上焦之邪甚則下干中焦下焦之邪甚則上干中焦由是三焦溷亂也三焦主持諸氣三焦既相溷亂則內外之氣俱不得通膻中為陽氣之海氣因不得通于內外怫鬱於上焦而為熱與藏相薰口爛食齗內經曰膈熱不便上為口糜中焦為上下二焦之邪溷亂則不得平治中焦在胃之中中焦失治胃氣因上衝也脾坤也坤助胃氣磨消水榖脾氣不轉則胃中水榖不得消磨故胃中濁也金匱要略曰穀氣不消胃中苦濁榮者水穀之精氣也衛者水穀之悍氣也氣不能布散致榮衛不通血凝不流衛氣者陽氣也榮血者隂氣也陽主為熱隂主為寒衛氣前通者陽氣通而熱氣得行也內經曰膀胱者津液藏焉化則能出以小便赤黃知衛氣前通也熱氣與衛氣相搏而行出入藏腑逰于經絡經絡客熱則血凝肉腐而為癰此見其熱氣得行若隂氣前通者則不然陽在外為隂之使因陽氣厥微隂無所使遂隂氣前通也內經曰陽氣者衛外而為固也陽氣厥微則不能衛外寒氣因而客之鼻者肺之候肺主聲寒氣內入者客于肺經則嚏而出之聲嗢咽塞寒者外邪也厥者內邪也內外之邪合併相逐為熱則血凝不流今為熱所擁使血凝自下如豚肝也上焦陽氣厥下焦隂氣厥二氣俱厥不相順接則脾氣獨弱不能行化氣血滋養五藏致五藏俱虛而五液注下針經曰五藏不和使液溢而下流于隂闔合也清圊也下焦氣脫而不合故便數而下重臍為生氣之原臍築湫痛則生氣欲絶故曰命將難全脈隂陽俱緊者口中氣出脣口乾燥踡卧足冷鼻中涕出舌上滑胎勿妄治也到七日以來其人微發熱手足溫者此為欲解或到七日八日已上反大發熱此為難治設使惡寒者必欲嘔也腹內痛者必欲利也脈隂陽俱緊為裏客寒寒為隂得陽則解口中氣出脣口乾燥者陽氣漸復正氣方溢也雖爾然而隂未盡散踡卧足冷鼻中涕出舌上滑胎知隂猶存也方隂陽未分之時不可妄治以偏隂陽之氣到七日已來其人微發熱手足溫者為隂氣已盡陽氣得復是為欲解若過七日不解到八日以上反發大熱者為隂極變熱邪氣勝正故云難治陽脈緊者寒邪發于上焦上焦主外也隂脈緊者寒邪發于下焦下焦主內也設使惡寒者上焦寒氣勝是必欲嘔也腹內痛者下焦寒氣勝是必欲利也脈隂陽俱緊至於吐利其脈獨不解緊去人安此為欲解若脈遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解脈隂陽俱緊為寒氣干上下至于吐利之後緊脈不罷者為其脈獨不解緊去人安為欲解若脈遲至六七日不欲食者為吐利後脾胃大虛內經曰飲入于胃遊溢精氣上輸于脾脾氣散精上歸于肺通調水道下輸膀胱水精四布五經並行脾胃氣強則能輸散水飲之氣若脾胃氣虛則水飲內停也所謂晚發者後來之疾也若至六七日而欲食者則脾胃已和寒邪已散故云欲解病六七日手足三部脈皆至大煩而口噤不能言其人躁擾者必欲解也煩熱也傳經之時病人身煩口不能言內作躁擾則隂陽爭勝若手足三部脈皆至為正氣勝邪氣微陽氣復寒氣散欲解也若脈和其人大煩目重臉內際黃者此為欲解也脈經曰病人兩目眥有黃色起者其病方愈病以脈為主若目黃大煩脈不和者邪勝也其病為進目黃大煩而脈和者為正氣已和故云欲解脈浮而數浮為風數為虛風為熱虛為寒風虛相搏則灑淅惡寒也內經曰有者為實無者為虛氣并則無血血并則無氣風則傷衛數則無血浮數之脈風邪并于衛衛勝則榮虛也衛為陽風搏于衛所以為熱榮為隂榮氣虛所以為寒風并于衛者發熱惡寒之證具矣脈浮而滑浮為陽滑為實陽實相搏其脈數疾衛氣失度浮滑之脈數疾發熱汗出此為不治浮為邪氣并于衛而衛氣勝滑為邪氣并于榮而榮氣實邪氣勝實擁于榮衛則榮衛行速故脈數疾一息六至曰數平人脈一息四至衛氣行六寸今一息六至則衛氣行九寸計過人之半是脈數疾知衛氣失其常度也浮滑數疾之脈發熱汗出而當解若不解者精氣脫也必不可治經曰脈隂陽俱盛大汗出不解者死傷寒咳逆上氣其脈散者死謂其形損故也千金方云以喘嗽為咳逆上氣者肺病散者心脈是心復賊肺金也內經曰心之肺謂之死隂死隂之屬不過三日而死以見其損傷故也平脈法第二問曰脈有三部隂陽相乘榮衛血氣在人體躬呼吸出入上下於中因息遊布津液流通隨時動作效象形容春弦秋浮冬沉夏洪察色觀脈大小不同一時之間變無經常尺寸參差或短或長上下乖錯或存或亡病輒改易進退低昻心迷意惑動失紀綱願為具陳令得分明師曰子之所問道之根源脈有三部尺寸及關寸為上部關為中部尺為下部榮衛流行不失衡銓衡銓者稱量重輕內經曰春應中規夏應中衡秋應中矩冬應中權榮行脈中衛行脈外榮衛行而脈相隨上下應四時而不失其常度腎沉心洪肺浮肝弦此自經常不失銖分腎北方水旺於冬而脈沉心南方火旺於夏而脈洪肺西方金旺於秋而脈浮肝東方木旺於春而脈弦此為經常銖分不差也出入升降漏刻周旋水下二刻一周循環人身之脈計長一十六丈二尺一呼脈行三寸一吸脈行三寸一呼一吸為一息脈行六寸一日一夜漏水下百刻人一萬三千五百息脈行八百一十丈五十度周於身則一刻之中人一百三十五息脈行八丈一尺水下二刻人二百七十息脈行一十六丈二尺一周於身也脈經之行周而復始若循環之無端也當復寸口虛實見焉經脈之始從中焦注于手太隂寸口二百七十息脈行一周身復還于寸口寸口為脈之經始故以診視虛實焉經曰虛實死生之要必皆見於寸口之中變化相乘隂陽相與風則浮虛寒則堅固沉潛水畜支飲急弦動則為痛數則熱煩風傷陽故脈浮虛寒傷隂故脈牢堅畜積於內者謂之水畜故脈沉潛支散於外者謂之支飲故脈弦急動則隂陽相搏相搏則痛生焉數為陽邪氣勝陽勝則熱煩焉設有不應知變所緣三部不同病各異端脈與病不相應者必緣傳變之所致三部以候五藏之氣隨部察其虛實焉太過可怪不及亦然邪不空見中必有姧審察表裏三焦別焉知其所舍消息診看料度府藏獨見若神為子條記傳與賢人太過不及之脈皆有邪氣干於正氣審看在表在裏入府入藏隨其所舍而治之師曰呼吸者脈之頭也難經曰一呼脈行三寸一吸脈行三寸以脈隨呼吸而行故言脈之頭也初持脈來疾去遲出疾入遲名曰內虛外實也初持脈來遲去疾名曰內實外虛也外為陽內為隂內經曰來者為陽去者為隂是出以候外入以候內疾為有餘有餘則實遲為不足不足則虛來疾去遲者陽有餘而隂不足故曰內虛外實來遲去疾者陽不足而隂有餘故曰內實外虛問曰上工望而知之中工問而知之下工脈而知之願聞其説師曰病家人請云病人苦發熱身體疼痛自卧師到診其脈沉而遲者知其差也何以知之表有病者脈當浮大今脈反沉遲故知愈也望以觀其形證問以知其所苦脈以别其表裏病苦發熱身疼邪在表也當卧不安而脈浮數今病人自卧而脈沉遲者表邪緩也是有裏脈而無表證則知表邪當愈也假令病人云腹內卒痛病人自坐師到脈之浮而大者知其差也何以知之若裏有病者脈當沉而今脈浮大故知愈也腹痛者裏寒也痛甚則不能起而脈沉細今病人自坐而脈浮大者裏寒散也是有表脈而無裏證也則知裏邪當愈是望證問病切脈三者相參而得之可謂十全之醫針經曰知一為上知二為神且明矣師曰病家人來請云病人發熱煩極明日師到病人向壁卧此熱已去也設令脈不知處言已愈發熱煩極則不能靜卧今向壁靜卧知熱已去設令向壁卧聞師到不驚起而盻視若三言三止脈之咽唾者此詐病也設令脈自和處言此病大重當須服吐下藥針灸數十百處乃愈詐病者非善人以言恐之使其畏懼則愈醫者意也此之謂也師持脈病人欠者無病也針經曰陽引而上隂引而下隂陽相引故欠隂陽不相引則病隂陽相引則和是欠者無病也脈之呻者病也呻為呻吟之聲身有所苦則然也言遲者風也風客于中則經絡急舌強難運利也搖頭言者裏痛也裏有病欲言則頭為之戰搖行遲者表強也表強者由經絡引急而行步不利也坐而伏者短氣也短氣者裏不和也故坐而喜伏坐而下一腳者腰痛也內經曰腰者身之大關節也腰痛為大關節不利故坐不能正下一腳以緩腰中之痛也裏實護腹如懷卵物者心痛也心痛則不能伸仰護腹以按其痛師曰伏氣之病以意候之今月之內欲有伏氣假令舊有伏氣當須脈之若脈微弱者當喉中痛似傷非喉痺也病人云實咽中痛雖爾今復欲下利冬時感寒伏藏於經中不即發者謂之伏氣至春分之時伏寒欲發故云今月之內欲有伏氣假令伏氣已發當須脈之審在何經得脈微弱者知邪在少隂少隂之脈循喉嚨寒氣客之必發咽痛腎司開闔少隂治在下焦寒邪內甚則開闔不治下焦不約必成下利故云雖爾咽痛復欲下利問曰人病恐怖者其脈何狀師曰脈行如循絲纍纍然其面白脫色也內經曰氣血者人之神恐怖者血氣不足而神氣弱也脈形如循絲纍纍然面白色脫者針經曰血奪者色夭然不澤其脈空虛是知恐怖為血氣不足問曰人不飲其脈何類師曰脈自澀脣口乾燥也澀為隂雖主亡津液而脣口乾燥以隂為主內不飲也問曰人愧者其脈何類師曰脈浮而面色乍白赤愧者羞也愧則神氣怯弱故脈浮而面色變改不常也問曰經説脈三菽六菽重者何謂也師曰脈者人以指按之如三菽之重者肺氣也如六菽之重者心氣也如九菽之重者脾氣也如十二菽之重者肝氣也按之至骨者腎氣也菽豆也難經曰如三菽之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指來疾者腎部也各隨所主之分以候藏氣假令下利寸口關上尺中悉不見脈尺中時小見脈再舉頭者腎氣也若見損脈來至為難治脈經曰冷氣在胃中故令脈不通下利不見脈則冷氣客于脾胃尺中時一小見為脾虛腎氣所乘脈再舉頭者脾為腎所乘也若尺中之治脈更或減損為腎氣亦衰脾復乘之鬼賊相刑故云難是脾勝不應時也問曰脈有相乘有縱有橫有逆有順何也師曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘火名曰順也金勝木水勝火縱者言縱任其氣乘其所勝橫者言其氣橫逆反乘所不勝也縱橫與恣縱恣橫之義通水為金子火為木子子行乘母其來逆也母行乘子其氣順也問曰脈有殘賊何謂也師曰脈有弦緊浮滑沉澀此六者名曰殘賊為諸脈作病也為人病者名曰八邪風寒暑濕傷於外也飢飽勞逸傷於內也經脈者榮衛隂陽也其為諸經脈作病者必由風寒暑濕傷於榮衛客于隂陽之中風則脈浮寒則脈緊中暑則脈滑中濕則脈澀傷於隂則脈沉傷於陽則脈浮所以謂之殘賊者傷良曰殘害良曰賊以能傷害正氣也問曰脈有災怪何謂也師曰假令人病脈得太陽與形證相應因為作湯比還送湯如食頃病人乃大吐若下利腹中痛師曰我前來不見此證今乃變異是名災怪又問曰何緣作此吐利答曰或有舊時服藥今乃發作也故名災怪耳醫以脈證與藥相對而反變異為其災可怪故名災怪問曰東方肝脈其形何似師曰肝者木也名厥隂其脈微弦濡弱而長是肝脈也肝病自得濡弱者愈也難經曰春脈弦者肝東方木也萬物始生未有枝葉故脈濡弱而長也故曰弦是肝之平脈肝病得此脈者為肝氣已和病自愈也假令得純弦脈者死何以知之以其脈如弦直是肝藏傷故知之也純弦者謂如弦之直而不軟是中無胃氣為真藏之脈內經曰死肝脈來急益徑如新張弓弦南方心脈其形何似師曰心者火也名少隂其脈洪大而長是心脈也心病自得洪大者愈也心旺於夏夏則陽外勝氣血淖溢故其脈來洪大而長也假令脈來微去大故名反病在裏也脈來頭小本大者故名覆病在表也上微頭小者則汗出下微本大者則為關格不通不得尿頭無汗者可治有汗者死心脈來盛去衰為平來微去大是反其候內經曰大則邪至小則平微為正氣大為邪氣來以候表來微則知表和去以候裏去大則知裏病內經曰心脈來不盛去反盛此為不及病在中頭小本大者即前小後大也小為正氣大為邪氣則邪氣先在裏今復還于表故名曰覆不云去而止云來者是知在表脈經曰在上為表在下為裏汗者心之液上微謂浮之而微頭小謂前小則表微中氣虛故主汗出下微謂沉之而微本大謂後大沉則在裏大則病進內經曰心為牡藏少腹為之使今邪甚不行格開小腸正氣不通故不得尿名曰關格脈經曰陽氣上出汗見於頭今關格正氣不通加之頭有汗者則陽氣不得下通而上脫也其無汗者雖作關格然陽氣未衰而猶可治西方肺脈其形何似師曰肺者金也名太隂其脈毛浮是肺脈也肺病自得此脈若得緩遲者皆愈得數者則劇何以知之數者南方火火尅西方金法當癰腫為難治也輕虛浮曰毛肺之平脈也緩遲者脾之脈脾為肺之母以子母相生故云皆愈數者心之脈火尅金為鬼賊相刑故劇肺主皮毛數則為熱熱客皮膚留而不去則為癰瘍經曰數脈不時則生惡瘡問曰二月得毛浮脈何以遽言至秋當死師曰二月之時脈當濡弱反得毛浮者故知至秋死二月肝用事肝脈屬木應濡弱反得毛浮者是肺脈也肺屬金金來尅木故知至秋死他皆倣此當春時反見秋脈為金氣乘木肺來尅肝奪旺脈而見秋脈令肺旺則肝脈絶故知至秋當死師曰脈肥人責浮瘦人責沉肥人當沉今反浮瘦人當浮今反沉故責之肥人肌膚厚故脈當沉瘦人肌膚薄故脈當浮今肥人反浮瘦人反沉必有邪氣相干使脈反常故當責而求之耳師曰寸脈下不至關為陽絶尺脈上不至關為隂絶此皆不治決死也若計其餘命死生之期期以月節尅之也脈經曰陽生於寸動於尺隂生於尺動於寸寸脈下不至關者為陽絶不能下應於尺也尺脈上不至關者為隂絶不能上應於寸也內經曰隂陽離缺精氣乃絶故皆決死期以月節尅之者謂如陽絶死於春夏隂絶死於秋冬師曰脈病人不病名曰行尸無王氣卒眩仆不識人者短命則死人病脈不病名曰內虛以無穀神雖困無苦脈者人之根本也脈病人不病為根本內絶形雖且強卒氣脫眩暈殭仆而死不曰行尸而何人病脈不病則根本內固形雖且羸止內虛耳穀神者穀氣也穀氣既足自然安矣內經曰形氣有餘脈氣不足死脈氣有餘形氣不足生問曰翕奄沉名曰滑何謂也沉為純隂翕為正陽隂陽和合故令脈滑關尺自平陽明脈微沉食飲自可少隂脈微滑滑者緊之浮名也此為隂實其人必股內汗出隂下濕也脈來大而盛聚而沉謂之翕奄沉正如轉珠之狀也沉為藏氣故曰純隂翕為府氣故曰正陽滑者隂陽氣和不為偏勝也關尺自平陽明脈微沉者當陽部見沉脈則隂偏而陽不足也陽明胃脈胃中飲多故食飲自可少隂脈微滑者當隂部見陽脈則陽偏而隂不足也以陽溱隂分故曰隂實股少隂之部也今陽熱溱隂必薰蒸津液泄達於股內汗出而隂下濕也問曰曽為人所難緊脈從何而來師曰假令亡汗若吐以肺裏寒故令脈緊也假令下利以胃中虛冷故脈緊也金匱要略曰寒脈急內經曰諸緊為寒寸口衛氣盛名曰髙髙者暴狂而肥內經曰隂不勝陽其陽則脈流薄疾并乃狂衛為氣衛盛而暴狂者隂不勝陽也針經曰衛氣者所以溫分肉充皮毛肥腠理司開闔者也衛氣盛為肥者氣盛於外也榮氣盛名曰章章者暴澤而光榮者血也榮華於身者也榮盛故身暴光澤也髙章相搏名曰綱綱者身筋急脈直榮衛俱盛則筋絡滿急衛氣弱名曰惵惵者心中氣動迫怯衛出上焦弱則上虛而心中氣動迫怯也榮氣弱名曰卑卑者心中羞愧針經曰血者神氣也血弱則神弱故常自羞愧惵卑相搏名曰損損者五藏六府之虛惙也衛以護陽榮以養隂榮衛俱虛則五藏六府失於滋養故俱乏氣虛惙也衛氣和名曰緩緩者四肢不能自收衛氣獨和不與榮氣相諧則榮病內經曰目受血而能視足受血而能步手受血而能握指受血而能攝四肢不收由榮血病不能滋養故也榮氣和名曰遲遲者身體重但欲眠榮氣獨和不與衛氣相諧則衛病身體重而欲眠者衛病而氣不敷布也遲緩相摶名曰沉沉者腰中直腹內急痛但欲卧不欲行榮氣獨和於內衛氣獨和於外榮衛不相和諧相搏而為病腰中直者衛不利於外也腹內痛者榮不和於內也但欲卧不欲行者榮衛不利也寸口脈緩而遲緩則陽氣長其色鮮其顔光其聲髙毛髮長遲則隂氣盛骨髓生血滿肌肉緊薄鮮鞕隂陽相抱榮衛行剛柔相得名強也緩為胃脈胃合衛氣溫分肉充皮毛肥腠理司開闔胃和氣舒則顔色光潤聲清毛澤矣遲為脾脈脾合榮氣榮養骨髓實肌肉濡筋絡利關節榮血滿則骨髓生肌肉緊硬矣隂陽調和二氣相化而不相戾榮衛流通剛柔相得是為強壯趺陽脈滑而緊滑者胃氣實緊者脾氣強持實擊強痛還自傷以手把刃坐作瘡也趺陽之脈以候脾胃滑則榖氣實是為胃實緊則隂氣勝是為脾強以脾胃一實一強而相搏擊故令痛也一強一弱相搏則不能作痛此脾胃兩各強實相擊藏腑自傷而痛也譬如以手把刃而成瘡豈非自貽其害乎寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆經曰浮為虛內經曰大則病進浮則為正氣虛大則為邪氣實在尺則邪氣關閉下焦裏氣不得下通故不得小便在寸則邪氣格拒上焦使食不得入故吐逆趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格伏則胃氣伏而不宣中焦關格正氣壅塞故吐逆而水穀不化澀則脾氣澀而不利邪氣拒於上焦故食不得入脈浮而大浮為風虛大為氣強風氣相搏必成癮疹身體為癢癢者為泄風久久為痂癩痂癩者眉少髮稀身有乾瘡而腥臭內經曰脈風為癘寸口脈弱而遲弱者衛氣微遲則榮氣寒榮為血血寒則發熱衛為氣氣微者心內飢飢而虛滿不能食也衛為陽榮為隂弱者衛氣微陽氣不足也遲者榮中寒經中客邪也榮客寒邪摶而發熱也陽氣內微心中雖飢飢而虛滿不能食也趺陽脈大而緊者當即下利為難治大為虛緊為寒胃中虛寒當即下利下利脈當微小反緊者邪勝也故云難治經曰下利脈大者為未止寸口脈弱而緩弱者陽氣不足緩者胃氣有餘噫而吞酸食卒不下氣填於膈上也弱者陽氣不足陽能消穀陽氣不足則不能消穀食緩者胃氣有餘則胃中有未消之穀物也故使噫而吞酸食卒不下氣填於膈上也金匱要略曰中焦失和不能消穀故令噫趺陽脈緊而浮浮為氣緊為寒浮為腹滿緊為絞痛浮緊相搏腸鳴而轉轉則氣動膈氣乃下少隂少隂脈不出則虛寒之氣聚於隂而隂腫大也浮為胃氣虛緊為脾中寒胃虛則滿脾寒則痛虛寒相搏腸鳴而轉轉則膈中之氣因而下泄也若少隂脈不出則虛寒之氣至于下焦結於少隂而聚於隂器不得發泄使隂腫大而虛也寸口脈微而澀微者衛氣不行澀者榮氣不足榮衛不能相將三焦無所仰身體痺不仁榮氣不足則煩疼口難言衛氣虛則惡寒數欠三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不能消榖引食下焦不歸者則遺溲人養三焦者血也護三焦者氣也榮衛俱損血氣不能相將而行三焦無所依仰身體為之頑痺而不仁內經曰榮氣虛則不仁針經曰衛氣不行則為不仁榮為血血不足則煩疼榮屬心榮弱心虛則口難言衛為陽陽微則惡寒衛為氣氣虛則數欠三焦因榮衛不足無所依仰其氣不能歸其部金匱要略曰上焦竭善噫上焦受中焦之氣中焦未和不能消穀故令噫耳下焦竭即遺溺失便以上焦在膈上物未化之分也不歸者不至也不至其部則物未能傳化故噫而酢吞中焦在胃之中主腐水穀故水穀化則思食中焦之食不歸其部則水穀不化故云不能消穀引食下焦在膀胱上主分别清濁溲小便也下焦不歸其部不能約制溲便故遺溲趺陽脈沉而數沉為實數消穀緊者病難治沉為實者沉主裏也數消穀者數為熱也緊為肝脈見於脾部木來尅土為鬼賊相刑故云難治寸口脈微而澀微者衛氣衰澀者榮氣不足衛氣衰面色黃榮氣不足面色青榮為根衛為葉榮衛俱微則根葉枯稿而寒栗咳唾腥吐涎沫也衛為氣面色黃者衛氣衰也榮為血面色青者榮血衰也榮行脈中為根衛行脈外為葉榮為隂衛為陽根葉俱微則隂陽之氣內衰致生寒栗而咳逆唾腥涎沫也趺陽脈浮而芤浮者衛氣衰芤者榮氣傷其身體瘦肌肉甲錯浮芤相搏宗氣衰微四屬斷絶經曰衛氣盛名曰髙髙者暴壯而肥榮氣盛名曰章章者暴澤而光其身體瘦而不肥者衛氣衰也肌肉甲錯而不澤者榮氣衰也宗氣者三焦歸氣也四屬者皮肉脂髓也榮衛衰傷則宗氣亦微四屬失所滋養致絶矣寸口脈微而緩微者衛氣踈踈則其膚空緩者胃氣實實則穀消而水化也穀入於胃脈道乃行水入於經其血乃成榮盛則其膚必踈三焦絶經名曰血崩衛為陽微為亡陽脈微者謂衛氣踈衛溫分肉肥腠理衛氣既疏皮膚不得溫肥則空虛也經曰緩者胃氣有餘為實故云緩者胃氣實內經曰食入於胃淫精於脈是穀入於胃脈道乃行也針經曰飲而液滲於絡和合於血是水入於經其血乃成也胃中穀消水化而為血氣今衛踈榮盛是榮氣強而衛氣弱也衛氣弱者外則不能固密皮膚而氣為之踈內則不能衛護其血而血為之崩也經常也三焦者氣之道路也衛氣不循常度三焦亦絶其常度也趺陽脈微而緊緊則為寒微則為虛微緊相搏則為短氣中虛且寒氣自短矣少隂脈弱而澀弱者微煩澀者厥逆煩者熱也少隂脈弱者隂虛也隂虛則發熱也以隂部見陽脈非大虛也故生微煩厥逆者四肢冷也經曰隂陽不相順接便為厥厥者手足厥冷是也少隂脈澀者隂氣澀不能與陽相順接故厥冷也趺陽脈不出脾不上下身冷膚鞕脾胃為榮衛之根脾能上下則水穀磨消榮衛之氣得以行脾氣虛衰不能上下則榮衛之氣不得通融於外故趺陽脈不出身冷者衛氣不溫也膚鞕者榮血不濡潤也少隂脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸隂股與隂相動令身不仁此為尸厥當刺期門巨闕尸厥者為其從厥而生形無所知其狀若尸故名尸厥少隂脈不出則厥氣客於腎而腎氣微少精血厥氣上奔塞胸膈壅遏正氣使宗氣反聚而血結心下針經曰五穀入於胃其精液糟粕宗氣分為三隊宗氣積於胸中出於喉嚨以貫心肺而行呼吸又曰榮氣者別其津液注之於脈化而為血以榮四末今厥氣太甚宗氣反聚而不行則絶其呼吸血結心下而不流則四肢不仁陽氣為厥氣所壅不能宣發退下至隂股間與隂相動仁者柔也不仁者言不柔和也謂寒熱痛癢俱不覺知者也陽氣外不為使內不得通榮衛俱不得行身體不仁狀若尸也經曰厥氣上行脈滿去形刺期門者以通心下結血刺巨闕者以行胸中之宗氣血氣流行厥氣退則蘇而復矣寸口脈微尺脈緊其人虛損多汗知隂常在絶不見陽也寸微為亡陽尺緊為隂勝陽微隂勝故云虛損又加之多汗則愈損陽氣是隂常在而絶不見陽也寸口諸微亡陽諸濡亡血諸弱發熱諸緊為寒諸乘寒者則為厥鬱冒不仁以胃無穀氣脾澀不通口急不能言戰而栗也衛陽也微為衛氣微故云亡陽榮血也濡為榮氣弱故云亡血血弱為隂虛虛則發熱緊為隂勝故為寒諸乘寒者則隂陽俱虛而為寒邪乘之也寒乘氣虛抑伏陽氣不得宣發遂成厥也鬱冒為昏冒不知人也不仁為強直而無覺也為尸厥也以胃無穀氣致脾澀不通於上下故口急不能言戰者寒在表也栗者寒在裏也無他故問曰濡弱何以反適十一頭師曰五臟六腑相乘故令十一濡弱者氣血也往反有十一頭者五藏六府共十一也問曰何以知乘府何以知乘藏師曰諸陽浮數為乘府諸隂遲澀為乘藏也府陽也陽脈見者為乘府也藏隂也隂脈見者為乘藏也夫人迎左手關前一分是也肝膽之位脈緊盛傷於寒在結喉旁一寸半動脈應手是穴夫氣口右手關前一分是也脾胃之位脈緊盛傷於食黃帝曰氣口何以獨為五藏主岐伯曰胃者水穀之海六腑之大源也五味入口藏於胃以養五氣氣口太隂也兼屬脾是以五藏六腑之氣味皆出於胃變見於氣口夫太溪在足內踝骨上動脈陷中傷寒何以須診太溪脈耶太溪穴是少隂腎之經男子以右腎為命門女子以左腎為命門生死之要病人有命脈即活無即死仲景云少隂病手足逆冷發熱者不死脈不至者灸太溪五壯故傷寒必診太溪以察其腎之盛衰也八難曰寸口脈平而死者何謂也説曰十二經脈皆係於生氣也故腎為五藏六腑之本十二經脈之根呼吸之門三焦之原守邪之神故氣者人之根本也根本絶莖葉枯灸寸口脈平而死者生氣獨絶於內也十四難曰上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無能為害也所以然者人之有尺如樹之有根枝葉將枯稿根本當自生脈有根本人有元氣故知不死夫衝陽一名會源在足跗上五寸骨間動脈上去陷谷三寸傷寒何以須診衝陽脈耶答曰衝陽穴是足陽明胃之經人受氣於穀穀入於胃乃傳與五藏六腑皆受氣於胃其清者為榮榮血也濁者為衛衛氣也榮行脈中衛行脈外隂陽相貫循環無端胃為水穀之海土稟四時皆以胃氣為本是胃四時之變病死生之要會故傷寒必診衝陽以察其胃氣之有無也夫結促代脈脈有結有促有代結者隂也隂盛則結脈來緩時一止復來曰結主胸滿煩躁促者陽也陽盛則促脈來數時一止復來曰促主積聚氣痞憂思所成大抵結促之脈雖時一止為病脈非死脈也唯代脈則死矣往來緩動而中止不能自還因而復動者名曰代也代者死也仲景傷寒脈結代心動悸炙甘草湯夫又據脈論云傷寒治法據脈為要證次之證如此脈亦如此條例徑行若證熱而脈遲證寒而脈數切不可惑於倉卒須是略去外證專以脈為主領會斟酌而調理之庶無差誤雖然偏陽之脈又何也曰人稟隂陽二氣隂根於陽陽根於隂往來流通而無間斷者也或偏勝而病生焉蓋偏陽則多熱偏隂則多寒偏隂則脈多虛濡按之無力頗有細澀之狀病生沉寒法當溫散人所易知若夫病軀內外有熱其脈不數不洪但指下急澀而小緊如枝條刮刮之狀此則為陽勝隂當用寒涼之劑以解陽熱愆伏之邪以行血熱凝結之毒不可錯認以為脈小脾虛誤以溫藥益其疾也縱或嘔逆亦是熱邪乘虛熱氣閉隔斷不可以虛脾之劑投之否則墮厝火積薪之轍矣凡病皆當審斯夫外有脈內無脈為外實內虛外無脈內有脈為內實外虛虛實之義隨其脈之有無者言之人所共知也若夫傷寒書所謂隂陽虛實則精微之義不無辨析於其間四十八難曰病之虛實出者為虛入者為實蓋外有脈者表之真陽氣虛故隂邪以盛出而乘陽是以脈浮於外之時不可自忽以為陽脈盛也內有脈者裏之真隂虛故陽邪以盛入而乘隂是以脈實於內其病在裏法當下之當其陽熱入裏脈實於內之時不可自惑以為隂脈盛也是説非古人之立異也蓋使人知如此之為隂盛則抑隂而助陽如彼之為陽盛則抑陽而助隂隂盛而邪出於外者發表之藥當性溫以助陽如桂枝湯之類也陽盛而邪入於內者攻裏之藥當性寒以抑陽如承氣湯之類是也或曰隂出而乘於外是陽之不足也發汗則亡陽而汗之何哉是大不然隂邪搏於外不汗之則邪何由去桂枝之性溫溫之乃所以助陽陽有所助而長則隂邪之所由以消甘辛發散為陽者此也張氏所謂承氣入胃隂盛以亡正恐隂盛外出而誤以承氣下之外得寒以助邪內攻虛而損正安得而不亡或者又曰陽入而乘於內是隂之不足也隂受病則當有以溫養而下之何哉是又不然邪入於內不下之則邪何從出承氣之性寒寒之乃所以抑陽陽有抑而微則真隂之所由以長酸苦涌泄為隂者此也張氏所謂桂枝下咽陽盛即斃者正恐陽盛入內而誤以桂枝汗之內得熱以助邪外撤虛而損正又安得而不斃觀古人發表之藥多溫攻裏之藥多寒則知隂陽虛盛之意微非止為汗下設正所以為用藥寒溫設也可不明辨哉傷寒治法內則審脈外則審證大要辨表裏虛實為先病在表有表虛有表實病在裏有裏虛有裏實又有表裏俱虛表裏俱實毫釐之分貴乎早辨表虛者脈浮而緩自汗惡風用桂枝湯以解肌表實者脈浮而緊無汗惡寒用麻黃湯發汗裏實者脈伏而牢心腹痛結或大便堅小承氣湯大柴胡湯以下之裏虛脈沉而弱自利膈冷理中湯四逆湯以溫之至若表裏俱虛則舉按脈虛如急救表裏之類下利身疼先與四逆湯清便自調後與桂枝湯是也表裏俱實則舉按脈實如表裏俱見之類脈浮尿赤與五苓散誤下腹痛桂枝大黃湯是也大抵出入轉變各有處所淺深輕重時刻異情順逆無差立當見效矣夫太陽屬膀胱非發汗不能愈必用桂枝麻黃以助陽却邪陽明屬胃非通泄不能痊必用大黃芒硝以疏利陽明少陽屬膽無出入道柴胡半夏能利能汗消解血熱黃芩佐之太隂脾土性惡寒濕非乾薑白术不能溫燥少隂腎水性惡寒燥非附子不能以溫厥隂肝木藏血榮筋非芍藥甘草不能滋養此用藥經常之道也然三陽汗下和解人皆知之若太隂溫燥不行則亦當溫利如桂枝加大黃之類是太隂自陽明而出也少隂雖用附子亦有麻黃細辛之證是少隂自太陽而出也厥隂類例其間有用桂者是厥隂自少陽而出也其或太陽少陽二經欎閉則三隂皆自陽明出焉故三隂皆有下證如太隂腹滿時痛為有積少隂咽乾口燥為腎汁乾厥隂煩滿耳聾舌卷囊縮為毒氣入臟皆當下之知乎此則傷寒用藥之法隨變隨應而不窮矣雖然傷寒七日傳遍六經此約法也或首尾只在一經或間傳一二經而止又不可拘但據脈與外證驗之是為活法發熱憎寒體痛時脈浮解表定無疑不憎寒却頻憎熱多汗咽乾裏下之表證脈浮身體肢莭煩疼惡風惡寒裏證脈實而不浮不惡風寒反惡熱身不疼自汗讝語自大便或咽乾腹痛滿表裏俱見症張氏用五芩散真人桂枝大黃甘草湯一塊生薑兩箇棗肉桂大黃等甘草滿盞水煎存七分表裏傷寒只一掃夫三陽三隂脈陽屬膀胱胃膽間隂居脾腎更連肝浮長弦細沈微緩審脈仍將外證看夫三陽外證腰脊頭疼熱惡寒目疼汗出鼻中乾耳聾口苦時乾嘔胸脅肋疼寒熱干太陽證腰脊強頭項痛發熱惡寒若傷風則鼻塞惡風陽明證目疼身熱鼻乾不惡寒反惡熱自汗出不得卧內實大便難少陽證耳聾胸脅痛或口苦咽乾目眩或往來寒熱而嘔陽病體輕脈輕外證壯熱煩渴大小便祕頭面有汗昏潰氣粗揚手擲足夫三隂外證腹滿肢溫利不煩舌乾燥渴或憎寒脣青舌卷多煩滿筋急囊間縮又攣太隂證腹滿或痛手足溫自利不渴喉下乾少隂證口燥舌乾而渴或口中和背惡寒常默默欲寢不欲見光明有時腹痛又有咽痛二證厥隂證唇青舌卷煩滿筋急囊縮或消渴飢不欲食食即吐蛔隂病體重脈重外證厥冷脣青腹滿不渴大小便自利惺惺而靜引衣自蓋足攣而卧三隂病無身熱無頭痛其或渴者隂極發躁也隂證脣青舌黑或白胎或卷強者用生薑頻擦脣口續又易之薑能回陽生胃解毒溫血散氣擦之後隂消陽長黑轉而紅最為良法夫汗溫正法太陽傷風自汗惡風桂枝湯傷寒無汗惡寒麻黃湯風寒俱盛則以麻黃湯兼用自汗小便數者勿用桂枝可用乾薑甘草湯芍藥甘草湯桂枝麻黃湯夏月用之須加黃芩陽明不惡寒反惡熱自汗大便難用小承氣大柴胡汗多者胃汁乾急下大承氣無汗惡寒升麻湯有汗脈遲微惡寒為表未解桂枝湯無汗脈浮發喘麻黃湯少陽並屬小柴胡湯輩冬月用之須加官桂太隂自利不渴為臟寒理中湯四逆湯隂證手足必微厥若手足溫便是太隂胸膈脹滿枳實理中湯腹滿脈浮桂枝湯腹滿時痛桂枝加芍藥湯痛甚桂枝加大黃湯少隂脈沉口不乾舌不燥及背惡寒者並用四逆湯小便白者亦用四逆始得病脈沉反發熱麻黃細辛附子湯口燥咽乾而渴急下之用大承氣湯厥隂脈微浮為欲愈不浮未愈小建中湯脈浮緩如瘧狀者囊不縮者亦欲愈桂枝麻黃各半湯脈沉短者囊必縮為毒氣入臟可用承氣湯下之利不止用四逆湯三隂中寒微則理中湯稍厥或中寒下利則乾薑甘草湯大段重者用四逆湯無脈者用通脈四逆湯六經惟少隂難治大要以口燥而渴别其熱脈沉而遲别其寒然亦有表裏俱熱但煩憒默默不欲見光明其脈沉細或時腹痛此可四順湯增加乾薑對之增損理中丸亦可矣凡隂證白通湯四逆湯通脈湯條例未敢遽用者且以理中湯甘草乾薑湯代之雖然隂寒亦可毒乃病氣也滯須行之養正丹金液丹半硫丸皆可疏利又為要藥夫三部之位左右手去魚際一寸名曰寸口去尺澤一尺名曰尺部兩境之間名曰關位六分陽部出三分隂部出三分關前為陽關後為隂為隂陽之關津寸脈下不至關為陽絶尺脈上不至關為隂絶陽得寸內九分取陽竒之數隂得尺一寸取隂耦之數是名關尺也寸上一分為魚際關上一分為神門左關為人迎右關為氣口三陽從地長故男子尺脈常沉三隂從天生故女子尺脈常浮男子陽多而隂少其脈在關上故寸盛尺弱女子隂盛而陽微其脈在關下故寸沉而尺盛所以男子不可久㵼女子不可久吐男得女脈為不足女得男脈為太過所謂反也今人以男子尺脈常弱女子尺脈常盛謂大反非也男子陽有餘脈在上尺脈必弱女子隂有餘脈在下寸脈必微乃是正也非反也又以男子以右尺為命門女子以左尺為命門謂之反亦非也男子得隂以生先生右腎女子得陽以長先生左腎乃是正也非反也所謂反者只是男子尺脈當弱今反盛女子尺脈應盛今反弱謂之反耳聖人以察隂陽以決死生雖經絡流注如環無端豈能逃於三部者哉夫診候之法凡初下指先以中指揣按得關位乃齊下前後二指為三部脈前指寸口也後指尺部也若人臂長乃疏下指若臂短乃密下指先診寸口男先左手女先右手浮按消息之次中按消息之次重按消息之次上竟消息之次下竟消息之次推指外消息之次推指內消息之醫家責肥人脈浮為肌肉厚實重取乃得若舉手而得其浮也甚矣責瘦人脈沉為皮脈相附而易見若按之始應則其沉也亦甚矣凡診脈以氣息平定方下指一呼一吸為一息之間脈息四至或五至不大不小與所屬部分四時相應者為平和脈也過則增至不及則為損至之脈難經言之詳矣所屬部分謂心位洪肺位浮腎位沉肝位弦脾位緩也四時謂春脈弦夏脈洪四季緩秋脈浮冬脈沉也假令心脈本位雖當見洪得冬須微帶沉乃四時相應餘皆倣此夫脈息之證脈之字從肉從瓜又作脈蓋脈以肉為陽脈以血為隂華陀云脈者氣血之充也氣血盛則脈盛氣血衰則脈衰氣血熱則脈數氣血寒則脈遲氣血微則脈弱氣血平則脈緩又長人脈長短人脈短性急脈急性緩脈緩反此者逆按內經云形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死形氣相得者生參伍不調者病難經云數者府也遲者臟也數則為熱遲者為寒諸陽為熱諸隂為寒王叔和云脈沉為在裏脈浮為在表遲則在臟數則在腑滑為實為下數為虛為熱張仲景云脈大浮數動滑此名陽也脈沉澀弱弦微此名隂也隂病陽脈見者生陽病隂脈見者死大抵陽脈常浮而速隂脈常沉而遲七表屬腑病在於陽春夏見之易治八裏屬臟病在於隂秋冬見之猶輕假令數在左寸浮之得者熱入小腸沉之得者熱入於心餘皆倣此脈理精微非言可盡論其梗槩不出於此矣王叔和云在心易了指下難明亦在乎人熟之而已矣夫七表浮芤滑實弦緊洪七表陽也陽數竒夫浮按之不足舉之有餘寸口浮其人有風發熱頭疼關上浮腹滿尺中浮小便難趺陽浮即為虛夫芤浮大而軟按之中央空兩邊實芤主失血寸口芤主吐血微芤者衄關上芤大便血尺中芤小便血夫滑往來疾却流利替替然與數相似脈滑為陽寸口滑為陽盛關上滑為嘔逆尺中滑小便赤婦人經脈不利然而尺脈滑者亦本形也趺陽脈滑者胃中實夫實大而長按之應指愊然浮沉皆得寸口實主上焦熱關上見主腹脹尺中有此主小腹痛小便澀夫弦舉之無有按之弓弦狀又曰浮緊乃為強狀如弓弦按之不移陽弦則頭痛隂弦則腹痛大抵傷寒脈必弦蓋人迎脈盛寒傷於人迎者少陽之分少陽脈主弦故也寒邪中人其脈必弦弦則多兼洪數為其先有邪熱也洪數甚者即為陽證若沉細而弦疾乃正陽毒也夫緊按之實數似切繩狀緊則為寒寸口緊頭痛關緊心下滿痛尺緊臍下痛隂陽俱緊當清邪中上濁邪中下也夫洪極大在指下舉按滿指寸口洪主胸膈煩熱關洪主胃熱尺中洪主大小便有血三部洪三焦俱熱夫八裏微沉緩澀遲伏濡弱八裏隂也隂數耦夫微若有若無極細而軟微則為虛寸口微為陽不足陽微則惡寒隂微則下利夫沉舉之不足按之有餘沉為在裏尺寸俱沉者少隂受病也然沉而遲者乃隂證也宜溫之沈而數者有熱也宜下之夫緩去來亦遲小駃於遲緩則為虛太陽病其脈緩者為傷風惟脾得之即是本脈夫澀細而遲往來難時一止澀則為少血寸口澀少氣上焦冷關上澀胃冷脾痛尺澀小便數腹冷三部俱澀腹生氣結王冰曰陽有餘則血少故脈澀也又曰澀者隂血不足陽氣有餘為身熱無汗夫遲呼吸三至去來極遲遲則為寒寸口遲則上焦冷關上遲胃冷不欲食吞酸吐冷水尺中遲小便多并白濁夫伏極重按之指著骨乃得伏主物聚寸口伏胸中逆氣關上伏有水氣溏泄尺中伏水穀不化大抵關前得之多為熱陽結或冷或熱不定當以餘證參之夫濡按之似無舉之全無力形與緩澀遲脈雖稍殊其為冷證皆一也夫弱極耎而沉細按之指下欲絶弱為虛寸口弱陽氣虛汗自出關弱無胃氣胃中有熱脈弱為虛熱病作不可大攻熱去寒起尺中弱氣少發熱夫脈按之來緩時一止復來又脈來動而中止不能自還因而復動夫有結脈有促脈有代脈結者隂也隂盛則結脈來緩時一止復來曰結主胸滿煩躁促者陽也陽盛則促脈來數時一止復來曰促主積聚氣痞憂思所成太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微寒者桂枝去芍藥加附子湯主之太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯主之大抵結促之脈雖時一止為病脈非死脈也唯代脈者真死矣往來緩動而中止不能自還因而復動名曰代也代者死也仲景傷寒脈結代心動悸炙甘草湯主之夫脈浮而緊澀頭疼身體拘急惡寒無汗寒多熱少面色慘而不舒腰脊疼痛手足指末微厥不煩躁蓋傷寒之候發熱惡寒頭疼腰脊痛脈緊澀無汗宜發汗而解麻黃湯主之經曰只與桂枝麻黃各半湯雜方中人參順氣散蔥枝湯蒼术散麻黃葛根湯可選而用之然太陽病亦有熱多寒少者須仔細看脈與證也熱多寒少不嘔清便自可宜桂枝麻黃各半湯若脈浮者雖熱多寒少自可發汗若脈弱者無陽也桂枝二越婢一湯主之熱多寒少而尺脈遲者榮氣不足血少故也先以小建中湯加黃耆最良尺脈尚遲再作一劑或太陽宜汗而其人適失血及下利則頻頻少與桂枝湯使體潤熱漐連日當自解假如淋家衄家法不可汗亦可以小柴胡之類和解之夫脈浮而緩寸大而尺弱自汗體熱頭疼惡風熱多寒少其面光而不慘煩躁手足不冷蓋傷風之候頭疼汗出發熱脈緩惡風當須解肌宜桂枝湯主之輕者柴胡桂枝湯雜方中敗毒散獨活散可選用治太陽中風有汗用桂枝湯凡脈緊必無汗唯濡而緊却自汗勿宜用桂枝當用小建中湯也須是脈浮而緩者方可用桂枝也項背強者桂枝湯加葛根也本草葛根主傷風有濕開竅解肌蓋桂枝加葛根者謂中風有濕當加之去其風濕取微汗者去風濕也裏寒者桂枝去芍藥加附子湯也不飲水者是也凡發汗後汗不止者為屬風桂枝加附子湯主之腹滿者太隂證脈浮者可服桂枝湯微發汗腹痛者桂枝加芍藥湯痛甚者桂枝加大黃湯也雖然桂枝湯自西北二方居人四時行之無不應驗自江淮間唯冬及春初可行自春末及夏至已前桂枝證可加黃芩半兩陽旦湯是也夏至後有桂枝證可加知母一兩石膏二兩或加升麻半兩若病人素虛寒者正用古方不在加減岐伯所謂同病異治者此也大抵用溫藥當避春熱藥當避夏素問所謂用溫逺溫用熱逺熱者也又問傷寒與傷風何以别之傷寒者脈緊而澀傷風者脈浮而緩傷寒者無汗脈澀故也傷風者有汗傷寒者畏寒不畏風傷風者畏風不畏寒大抵太陽病者必脈浮發熱惡風惡寒也惡寒者不當風而自憎寒惡風者當風而憎寒也六經皆有傷寒傷風其證各異太陽脈浮有汗為中風脈緊無汗為傷寒陽明善飢為中風不食為傷寒少陽兩耳聾目赤胸滿而煩為中風口苦咽乾目眩為傷寒若三隂傷風無變異形證但四肢煩疼餘證同三陽有發熱惡寒煩躁手足溫而脈反浮緊者有寒多熱少煩躁手足微冷而脈反浮緩者蓋發熱惡風煩躁手足溫為中風候脈浮緊為傷寒脈是中風見寒脈也寒多熱少不煩躁手足微厥為傷寒候脈浮為中風是傷寒見風脈也中風見寒脈傷寒見風脈宜服大青龍湯蓋大青龍證脈似桂枝反無汗病似麻黃反煩躁是也脈弱有汗為桂枝證脈緊不煩躁為麻黃證大青龍湯治病與麻黃湯證相似但病尤重而又加煩躁者用大青龍湯也以其中風并傷寒俱盛故青龍添麻黃作六兩又似合桂枝湯藥味在內添石膏所以為緊此治榮衛俱病若證不審誤用大青龍湯則發汗多傷人以其有煩躁一證故須用大青龍大抵感外風者為傷風感寒冷者為傷寒故風則傷衛寒則傷榮桂枝主傷衛麻黃主傷榮大青龍主榮衛俱傷故也風傷衛者病在皮膚之間也以衛行脈外為陽主外皮膚之間衛氣之道路故也其病淺寒傷榮者寒氣中於肌肉也以榮行脈中為隂主肌肉之間榮氣之道路故也其病深所以桂枝麻黃所施各異戒勿誤用以有淺深之别風寒之殊醫宜審諦大青龍尤宜慎用仲景云脈微汗出惡風者不可服青龍服之則厥逆筋惕肉瞤此為逆也類纂云凡發汗過多筋惕肉膶振搖動人或虛羸之人微汗出便有此證俱宜服真武湯以救之羸甚者芍藥或量多少與之惡熱藥者去附子餘依加減法仲景製真武湯乃為合用桂枝却用麻黃之類發汗多亡陽致有此證故用真武湯若調理順者無此證也夫夏月發熱惡寒頭疼身體肢莭痛重其脈洪盛者蓋冬傷于寒因暑氣而發為熱病治熱病與傷寒同有汗宜桂枝湯無汗宜麻黃湯加煩躁者宜大青龍湯然夏月藥性須帶涼不可太溫桂枝麻黃大青龍須加減法夏至前桂枝加黃芩半兩夏至後桂枝麻黃大青龍加知母一兩石膏二兩或加升麻半兩也蓋桂枝麻黃湯性熱地暖之處非西北之比夏月服之必有發黃斑出之失熱病三日外與湯不差脈仍數邪氣猶在經絡未入臟腑者桂枝石膏湯主之此在夏至後代桂枝證用若加麻黃半兩可代麻黃青龍湯用也古方三月至夏為晚發傷寒梔子升麻湯亦可選用又問夏至後皆可行白虎湯耶白虎湯治中暑與汗後一解表藥耳今之醫者見六月中病多云中暑不辨熱病用藥太涼又况夏月隂氣在內最難調治白虎湯尤宜戒之夏月自汗惡寒身熱而渴其脈微弱者此名中暑也大抵中暑與熱病外證相似但病熱者脈盛中暑者脈虛以此别之甲乙經云脈盛身寒得之傷寒脈虛身熱得之傷暑蓋寒傷形而不傷氣所以脈盛熱傷氣而不傷形所以脈虛傷寒即身體肢莭痛重其脈洪盛按之有力此是冬月感寒深至夏發耳中暑即背寒面垢其面如塗油類纂云面垢者陽證也一名面塵若塵垢之者手足微冷煩渴口燥但覺倦怠四肢却不痛重其脈微弱按之無力白虎湯主之痰逆惡寒者橘皮湯主之不惡寒者竹葉湯主之頭痛惡心煩躁心下不快者五苓散最妙又問中暑何故灑灑然毛聳惡寒答曰經云四時八風之中人也因有寒暑寒則皮膚急腠理閉暑則皮膚緩腠理開開則灑然寒閉則熱而悶近人多不明中暑或作熱病法治之服溫熱藥必致發黃斑出更為畜血尤宜戒之夏至已前發熱惡寒頭疼身體痛其脈浮緊此名溫病也春日傷寒謂之溫病冬傷於寒輕者夏至以前發為溫病蓋因春溫暖之氣而發也非溫疫也治溫病與冬月傷寒夏月熱病不同蓋熱輕故也春初秋末陽氣在裏其病稍輕雖不用藥治之五六日亦自差也升麻湯解肌湯柴胡桂枝湯最良熱多者小柴胡湯主之不渴外有微熱者小柴胡加桂枝也渴者小柴胡加五味子也或煩渴發熱不惡寒與虛煩者並竹葉石膏湯次第服之麻黃桂枝大青龍唯西北二方四時行之無有不驗若江淮間地偏暖處唯冬月及正初乃可用正方自春末至夏至已前桂枝麻黃大青龍內宜加減也病人先熱後寒尺寸脈俱盛此名溫瘧也重感於寒變成溫瘧小柴胡湯主之瘧疾寒熱相等及先熱後寒者俱宜與小柴胡湯主之先寒後熱者小柴胡加桂枝湯有熱多者白虎加桂湯有多寒者但寒者柴胡桂薑湯有汗多煩渴小便澀赤素有瘴氣及不伏水土嘔吐甚者可服五苓散脈小緊寒熱嘔吐間日頻日發作無時大便祕者可服大柴胡湯下之脈浮大寒熱往來者可服祛邪丸吐之久不愈者服瘧母煎丸當自愈治瘧之法無以過也大抵瘧脈弦數者多熱弦遲者多寒弦小緊者可下弦遲者可溫弦緊者可發汗弦浮者可吐之夏傷於暑秋必病瘧此非傷寒之謂以其觀傷寒溫瘧一證故因而及之脈尺寸俱浮頭疼身熱常自汗出體重其息必喘四肢不收默默但欲眠此名風溫也其人素傷於風因復傷於熱風熱相搏即發風溫主四肢不收左傳曰風淫末疾頭疼身熱常自汗出不解治在少隂厥隂少隂火厥隂風不可發汗即譫言獨語內煩躁擾不得卧若驚癎目亂無精療之者復發其汗如此死者醫殺之也風溫不可發汗宜萎蕤湯風溫身灼熱者知母乾葛湯風溫如渴甚者栝蔞根湯風溫脈浮身重汗出者防己湯辨傷寒受病日數次第病證傷寒一日足太陽受病太陽者膀胱之經也為三陽之首故先受病其脈絡於腰脊主於頭項故得病一日頭項腰脊痛也傷寒二日足陽明受病陽明者胃之經也主肌肉其脈絡於鼻入於目故得病二日內熱鼻乾不得眠也諸陽在表表始受病在皮膚之間故可摩膏火灸發汗而愈也凡五臟不和六腑不通榮衛不行如是之後三日乃死何也夫足陽明胃者十二經之長也其氣血盛故不通三日其氣乃盡而死爾其未滿三日者可汗而已其滿三日者可下而已也傷寒三日足少陽受病少陽者膽也其脈循於脅上於頸耳故得病三日胸脅痛而耳聾也三陽經絡終始相傳未入於臟可汗而解也傷寒四日足太隂受病太隂者脾之經也為三隂之首是故三日已後陽受病訖傳之於隂而太隂受病焉其脈絡於脾主於喉嗌故得病四日腹滿而嗌乾其病在胸膈故可吐而愈也傷寒五日足少隂受病少隂者腎之經也其脈貫腎絡肺繫於舌故得病五日口燥舌乾渴而引水也其病在腸可下而愈也傷寒六日足厥隂受病厥隂者肝之經也其脈循隂器絡於肝故得病六日煩滿而囊縮也此則隂陽俱受病毒氣在胃可下而愈也七日太陽病衰頭痛小愈又傷寒七日病法當小愈隂陽諸經傳病終故也今七日已後病反甚者欲為再經病也再經病者經絡重受病也傷寒八日陽明病衰身熱小愈又八日不解者或是諸隂陽經絡重受於病或因發汗吐下之後毒氣未盡所以病證猶在也傷寒九日少陽病衰耳聾微聞又九日已上病不除者或初一經受病者不能相傳或已傳三陽訖而不能傳於隂致停滯纍日病證不解故日數多而病候改變也傷寒十日太隂病衰腹胃如故則思欲飲食傷寒十一日少隂病衰渴止不煩滿舌乾已也傷寒十二日厥隂病愈囊少縱腹微下毒氣皆去病日已矣傷寒例第三隂陽大論云春氣溫和夏氣暑熱秋氣清涼冬氣冷冽此則四時正氣之序也春夏為陽春溫夏熱者陽之動始于溫盛于熱故也秋冬為隂秋涼冬寒者隂之動始于清盛于寒故也冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳冬三月純隂用事陽乃伏藏水氷地坼寒氣嚴凝當是之時善攝生者出處固密去寒就溫則不傷于寒其涉寒冷觸冒霜雪為病者謂之傷寒也其傷於四時之氣皆能為病春風夏暑秋濕冬寒謂之四時之氣以傷寒為毒者以其最成殺厲之氣也熱為陽陽主生寒為隂隂主殺隂寒為病最為肅殺毒厲之氣中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為熱病熱病者熱極重於溫也內經曰先夏至日為溫病後夏至日為熱病溫熱之病本傷于寒而得之故大醫均謂之傷寒也是以辛苦之人春夏多溫熱病皆由冬時觸寒所致非時行之氣也凡時行者春時應溫而反大寒夏時應大熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也四時氣候不正為病謂之時行之氣時氣所行為病非暴厲之氣感受必同是以一歲之中長幼之病多相似也夫欲候知四時正氣為病及時行疫氣之法皆當按斗厯占之四時正氣者春風夏暑秋濕冬寒是也時行者時行之氣是也溫者冬時感寒至春發者是也疫者暴厲之氣是也占前斗建察其時候之寒溫審其邪氣之輕重而治之如下文云云九月霜降莭後宜漸寒向冬大寒至正月雨水莭後宜解也所以謂之雨水者以氷雪解而為雨水也至驚蟄二月莭後氣漸和暖向夏大熱至秋便涼冬寒春溫夏熱秋涼為四時之正氣也從霜降以後至春分以前凡有觸冒霜露體中寒即病者謂之傷寒也九月十月寒氣尚微為病則輕十一月十二月寒冽已嚴為病則重正月二月寒漸將解為病亦輕此以寒時不調適有傷寒之人即為病也此為四時正氣中而即病者也其冬有非節之暖者名曰冬溫冬溫之毒與傷寒大異冬溫病有先後更相重沓亦有輕重為治不同證如後章此為時行之氣前云冬時應寒而反大溫者是也從立春節後其中無暴大寒又不氷雪而有人壯熱為病者此屬春時陽氣發泄冬時伏寒變為溫病此為溫病者內經云冬傷於寒春必病溫是也從春分以後至秋分節前天有暴寒者皆為時行寒疫也三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微其病與溫及暑病相似但治有殊耳此為疫氣也是數者以明前斗厯之法占其隨時氣候發病寒熱輕重不同耳十五日得一氣於四時之中一時有六氣四六名為二十四氣也節氣十二中氣十二共二十四氣內經曰五日謂之候三候謂之氣六氣謂之時四時謂之歲然氣候亦有應至而不至或有未應至而至者或有至而太過者皆成病氣也疑漏或有至而不去一句金匱要略曰有至而至有至而不至有至而不去有至而太過何也師曰冬至之後甲子夜半少陽起少隂之時陽始生天得溫和以未得甲子天已溫和此為未至而至也以得甲子而天未溫和此為至而不至以得甲子而天大寒不解此為至而不去也以得甲子而天溫如盛夏五六月時此為至而太過也內經曰至而和則平至而甚則病至而反者病至而不至者病未至而至者病即是觀之脫漏明矣但天地動靜隂陽鼓擊者各正一氣耳內經曰隂陽者天地之道清陽為天動而不息濁隂為地靜而不移天地隂陽之氣鼓擊而生春夏秋冬寒熱溫涼各正氣也是以彼春之暖為夏之暑彼秋之忿為冬之怒春暖為夏暑從生而至長也秋忿為冬怒從肅而至殺也是故冬至之後一陽爻升一隂爻降也夏至之後一陽氣下一隂氣上也十月六爻皆隂坤卦為用隂極陽來陽生于子冬至之後一陽爻升一隂爻降於卦為復言陽氣得復也四月六爻皆陽乾卦為用陽極隂來隂生于午夏至之後一陽氣下一隂氣上於卦為姤言隂得遇陽也內經曰冬至四十五日陽氣微上隂氣微下夏至四十五日隂氣微上陽氣微下斯則冬夏二至隂陽合也春秋二分隂陽離也陽生于子隂生于午是隂陽相接故曰合陽退于酉隂退于卯是隂陽相背故曰離內經曰氣至之謂至氣分之謂分至則氣同分則氣異隂陽交易人變病焉天地隂陽之氣既交錯即不正人所以變病內經曰隂陽相錯而變由生也此君子春夏養陽秋冬養隂順天地之剛柔也內經曰養生者必和順乎時春夏養陽以涼以寒秋冬養隂以溫以熱所以然者從其根故也小人觸冒必攖暴疹須知毒烈之氣留在何經而發何病詳而取之不能順四時調養觸冒寒溫必成暴病醫者當在詳審而治之是以春傷於風夏必飧泄夏傷於暑秋必病瘧秋傷于濕冬必咳嗽冬傷于寒春必病溫此必然之道可不審明之當春之時風氣大行春傷于風風氣干肝肝以春適王風雖入之不能即發至夏肝衰然後始動風淫末疾則當發於四肢夏以陽氣外盛風不能外發故攻內而為飱泄者下利水穀不化而色黃當秋之時濕氣大行秋傷於濕濕則干於肺肺秋適王濕雖入之不能即發至冬肺衰然後濕始動也雨淫腹疾則當發為下利動以陽氣內固濕氣不能下行故上逆而為咳嗽當夏之時暑氣大行夏傷于暑夏以隂為主內暑雖入勢未能者動及秋隂出而陽為內主然後暑動傳隂而為痎瘧痎二日一發瘧者一日一發當冬之時寒氣大行冬傷於寒冬以陽為主內寒雖入勢未能動及春陽出而隂為內主然後寒動傳陽而為溫病是感冒四時正氣為病自然之道也傷寒之病逐日淺深以施方治內經曰未滿三日者可汗而已其已滿三日者可泄而已也今世人傷寒或始不早治或治不對病或日數久淹困乃告醫醫人又不依次第而治之則不中皆宜臨時消息制方無不效也今搜採仲景舊論録其證候疹脈聲色對病真方有神驗者擬防世急也仲景之書屆今千年而顯用于世者王叔和之力也又土地溫涼髙下不同物性剛柔餐居亦異是以黃帝興四方之問岐伯舉四治之能以訓後賢開其未悟者臨病之工宜須兩審也東方地氣溫南方地氣熱西方地氣涼北方地氣寒西北方髙東南方下是土地溫涼髙下不同也東方安居食魚西方陵居華食南方溫處而嗜酸北方野處而食乳食居之異也東方治宜砭西方治宜毒藥南方治宜微針北方治宜炙􅡒是四方醫治不同也醫人治病當審其土地所宜食居之異也凡傷于寒則為病熱雖甚不死內經曰風寒客於人使人毫毛畢直皮膚閉而為熱是傷寒為病熱也針經曰多熱者易已多寒者難已是熱雖甚不死若兩感於寒而病者必死表裏俱病者謂之兩感尺寸俱浮者太陽受病也當一二日發以其脈上連風府故頭項痛腰脊強太陽為三陽之長其氣浮於外故尺寸俱浮是邪氣初入皮膚外在表也當一二日發風府穴名也在項中央太陽之脈從顛入絡腦還出别下項是以上連風府其經循肩膊內俠脊抵腰中故病頭項痛腰脊強尺寸俱長者陽明受病也當二三日發以其脈俠鼻絡于目故身熱目疼鼻乾不能卧陽明血氣俱多尺寸俱長者邪併陽明而血氣淖溢也太陽受邪不已傳於陽明是當二三日發其脈俠鼻者陽明脈起於鼻交頞中旁約太陽之脈會於睛明穴故繫目系絡于目身熱者陽明主身之肌肉針經曰陽明氣盛則身以前皆熱目疼鼻乾者經中客邪也不得卧者胃氣逆不得從其道也內經曰胃不和則卧不安尺寸俱弦者少陽受病也當三四日發以其脈循脅絡于耳故胸脅痛而耳聾內經曰陽中之少陽通于春氣春脈弦尺寸俱弦者知少陽受邪也三日陽明之邪不已傳于少陽是當三四日發胸脅痛而耳聾者經壅塞而不利也此三經皆受病未入于府者可汗而已三陽受邪為病在表法當汗解然三陽亦有便入府者入府則宜下故云未入于府者可汗而已尺寸俱沉細者太隂受病也當四五日發以其脈布胃中絡于嗌故腹滿而嗌乾陽極則隂受邪傳三陽既遍次乃傳于隂經在陽為在表在隂為在裏邪在表則見陽脈邪在裏則見隂脈陽邪傳隂邪氣內陷故太隂受病而脈寸尺俱沉細也自三陽傳於太隂是當四五日發也邪入于隂則漸成熱腹滿而嗌乾者脾經壅而成熱也尺寸俱沉者少隂受病也當五六日發以其脈貫腎絡於肺繫舌本故口燥舌乾而渴少隂腎水也性趨下故少隂受病脈寸尺俱沉也自三陽四五日太隂之邪不已五六日則傳于少隂也是少隂病五六日發也人傷於寒則為病熱謂始為寒而終成熱也少隂為病口燥舌乾而渴邪傳入裏熱氣漸深也尺寸俱微緩者厥隂受病也當六七日發以其脈循隂器絡於肝故煩滿而囊縮緩者風脈也厥隂脈微緩者邪傳厥隂熱氣已劇近于風也當六七日發以少隂邪傳于厥隂煩滿而囊縮者熱氣聚於內也此三經皆受病已入於府可下而已三隂受邪為病在裏於法當下然三隂亦有在經者在經則宜汗故云已入于府者可下而已經曰臨病之工宜須兩審若兩感於寒者一日太陽受之即與少隂俱病則頭痛口乾煩滿而渴二日陽明受之即與太隂俱病則腹滿身熱不欲食讝語三日少陽受之即與厥隂俱病則耳聾囊縮而厥水漿不入不知人者六日死若三隂三陽五臟六府皆受病則榮衛不行府藏不通則死矣隂陽俱病表裏俱傷者為兩感以其隂陽兩感病則兩證俱見至于傳經則一隂一陽兩經俱傳也始得一日頭痛者太陽口乾煩滿而渴者少隂至三日則太陽傳于陽明而少隂亦傳于太隂身熱讝語者陽明腹滿不欲食者太隂至三日陽明傳于少陽而太隂又傳于厥隂耳聾者少陽囊縮而厥者厥隂水漿不入不知人者胃氣不通內經曰五臟已傷六府不通榮衛不行如是之候三日乃死何也岐伯曰陽明者十二經脈之長也其氣血盛故云不知人三日其氣乃絶故死矣謂三日六經俱病榮衛之氣不得行之于內外藏府之氣不得通于上下至六日府藏之氣俱盡榮衛之氣俱絶則死矣其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈八日陽明病衰身熱少歇也九日少陽病衰耳聾微聞也十日太隂病衰腹減如故則思飲食十一日少隂病衰渴止舌乾已而嚏也十二日厥隂病衰囊縱少腹微下大氣皆去病人精神爽慧也六日傳遍三隂三陽大邪之氣皆去病人精神爽慧也若過十三日以上不間尺寸陷者大危間者瘳也十二日傳經盡則當瘳愈若過十三日已上不瘳尺寸之脈沉陷者即正氣內衰邪氣獨勝故云大危若更感異氣變為他病者當依舊壞證病而治之若脈隂陽俱盛重感於寒者變為溫瘧異氣者謂先病未已又感别異之氣也兩邪相合變為他病脈隂陽俱盛者傷寒之脈也難經曰傷寒之脈隂陽俱盛而緊澀經曰脈盛身寒得之傷寒則為前熱病未已再感於寒寒熱相搏變為溫瘧陽脈浮滑隂脈濡弱者更遇於風變為風溫此前熱未歇又感于風者也難經曰中風之脈陽浮而滑隂濡而弱風來乘熱故變風溫陽脈洪數隂脈實大者遇溫熱變為溫毒溫毒為病最重也此前熱未已又感溫熱者也陽主表隂主裏洪數實大皆熱也兩熱相合變為溫毒以其表裏俱熱故為病最重陽脈濡弱隂脈弦緊者更遇溫氣變為溫疫以此冬傷於寒發為溫病脈之變證方治如説此前熱未已又感溫氣者也溫熱相合變為溫疫凡人有疾不時即治隱忍兾差以成固疾凡覺不佳即須求治茍延時日則邪氣入深難可復制千金曰凡有小苦似不如平常即須早道若隱忍不治兾望自差須臾之間以成固疾此之謂也小兒女子益以滋甚小兒女子氣血未全女子血室多病凡所受邪易于滋蔓時氣不和便當早言尋其邪由及在腠理以時治之罕有不愈者腠理者津液腠泄之所文理縫會之中也金匱要略曰腠者是三焦通會元氣之處為血氣所注理者是皮膚藏府之文理也邪客于皮膚則邪氣浮淺易為治治之罕有不愈者矣金匱玊函曰主候長存形色未病未入腠理針藥及時服將調節委以良醫病無不愈患人忍之數日乃説邪氣入藏則難可制此謂家有患備慮之要邪在皮膚則外屬陽而易治邪傳入裏則內屬隂而難治內經曰善制者治皮毛其次治肌膚其次治筋脈其次治大府其次治五藏治五藏者半死半生也昔齊桓怠於皮膚之微疾以至骨髓之病家有患不可不偹慮之也凡作湯藥不可避晨夜覺病須臾即宜便治不等早晚則易愈矣千金曰凡始覺不佳即須治療無至于病湯食競進折其毒勢自然易差若或差遲病即傳變雖欲除治必難為力傳有常也變無方也傳為循經而傳如太陽傳陽明是也變為不常之變如陽證變隂症是也邪既傳變病勢深也本草曰病勢已成可得半愈病勢已過命將難全也服藥不如方法縱意違師不須治之內經曰拘于鬼神者不可與言至德惡于針石者不可與言至巧病不許治者病必不治治之無功矣凡傷寒之病多從風寒得之凡中風與傷寒為病自異通謂之傷寒千金曰夫傷寒病者起自風寒入于腠理與精氣分爭榮衛偏隔周身不通而病始表中風寒入裏則不消矣始自皮膚入于經絡傳于藏府是也未有溫覆而當不消散者風寒初客于皮膚便投湯藥溫覆取暖發散而當者則無不消散之邪矣不在證治擬欲攻之猶當先解表乃可下之先解表而後下之則無內陷之邪也若表已解而內不消非大滿不可下猶生寒熱則病不除表證雖罷裏不至于大堅滿者亦未可下是邪未收斂成實下之則裏虛而邪復不除猶生寒熱也若表已解而內不消大滿大實堅有燥屎自可徐下之雖四五日不能為禍也外無表證裏有堅滿為下證俱具外臺云表和裏病下之則愈下症既具則不必拘于日數若不宜下而便攻之內虛熱入協熱遂利煩躁諸變不可勝數輕者因篤重者必死矣下之不當病輕者證猶變易而難治矧又重者乎夫陽盛隂虛汗之則死下之則愈陽虛隂盛汗之則愈下之乃死表為陽裏為隂隂虛者陽必湊之陽盛之邪乘其裏虛而入于府者為陽盛隂虛也經曰尺脈弱名曰隂不足陽氣下陷入隂中則發熱者矣下之清其內熱而愈若反汗之則竭其津液而死隂脈不足陽往乘之陽脈不足隂往從之隂邪乘其表虛客于榮衛之中者為陽虛隂盛也經曰假令寸口脈微名由陽不足隂氣上入陽中則灑淅惡寒者是矣汗之散其表寒則愈若反下之則脫其正氣而死經曰本發汗而復下之此為逆也本先下之而反汗為逆夫如是則神丹安可以誤發甘遂何可以妄攻虛盛之治相背千里吉凶之機應若影響豈容易哉神丹者發汗之藥也甘遂者下藥也若汗下當則吉汗下不當則凶其應如影隨形如響應聲也况桂枝下咽陽盛則斃承氣入胃隂盛以亡桂枝湯者發汗藥也承氣湯者下藥也金匱玊函曰不當汗而強與汗之者令人奪其津液枯稿而死不當下而強與下之者令人開腸洞泄便溺不禁而死死生之要在乎須臾視身之盡不暇計日投湯不當則災禍立見豈暇計其日數哉此隂陽虛實之交錯其候至微發汗吐下之相反其禍至速而醫術淺狹懵然不知病源為治乃誤使病者殞殁自謂其分至今寃魂塞于冥路死尸盈于壙野仁者鑒此豈不痛歟凡兩感證俱作治有先後發表攻裏本自不同而執迷妄意者乃云神丹甘遂合而飲之且解其表又除其裏言巧似是其理實違夫智者之舉錯也常審以慎愚者之動作也必果而速安危之變豈可詭哉世上之士但務彼翕習之談而莫見此傾危之敗惟明者居然能護其本近取諸身夫何逺之有焉兩感病俱作欲求治法醫者大宜消息審其先後次第而治之若妄意攻治以求速效者必致傾危之敗凡發汗溫服湯藥其方雖言日三服若病劇不解當促其間可半日中盡三服若與病相阻即便有所覺重病者一晝夜當晬時觀之如服一劑病證猶在故當復作本湯服之至有不肯汗出服三劑乃解若汗不出者死病也發汗藥須溫暖服者易為散也日三服者藥勢續也病勢稍重當促急服者以折盛熱不可拘于本方設藥病不相對湯入即便知之如隂多者投以涼藥即寒逆隨生陽多者飲以溫劑則實熱即起是便有所覺晬時者周時也一晝一夜湯藥盡劑更看其傳如病證猶在當復作本湯以發其汗若服三劑汗不出不解者邪氣大甚湯不能勝必成大疾千金曰熱病脈躁盛而不得汗者此陽脈之極也死凡得時氣病至五六日而渴欲飲水飲不能多不當與也何者以腹中熱尚少不能消之便更與人作病也至七八日大渴欲飲水者猶當依證與之與之常令不足勿極意也言能飲一斗與五升若飲而腹滿小便不利若喘若噦不可與病人忽然大汗出時為自愈也熱在上焦則為消渴言熱消津液而上焦乾燥則生渴也大熱則能消水熱少不能消之若強飲則停飲變為諸病至七八日陽勝氣溫向解之時多生大渴亦須少少與之以潤胃氣不可極意飲也若飲而腹滿小便不利若喘若噦者為水飲內停而不散不可便與之忽然陽氣通水氣散生發于外作大汗而解也凡得病反能飲水此為欲愈之候其不曉病者但聞病飲水自愈小渴者乃強與飲之因成其禍不可復數小渴者腹中熱少若強與水水飲不消復為諸飲病也凡得病厥脈動數服湯藥更遲脈浮大減小初躁後靜此皆愈證也動數之脈邪在陽也湯入而變遲者陽邪愈也浮大之脈邪在表也而復減小者表邪散也病初躁亂者邪所擾也湯入而安靜者藥勝病也是皆為愈證之驗矣凡治溫病可刺五十九穴五十九穴者以寫諸經之溫熱針經曰熱甚取之諸陽五十九穴刺以寫其熱而出其汗實其隂而補其不足所謂五十九刺者兩手內外側各三穴凡十二病五指間一凡八病頸入髮際一寸旁三分各一凡六病更入髮三寸邊五凡十病耳前後口下各一項中一凡六病顛上一𩕄會一髮際一亷泉一風府二天柱二又內經曰熱愈五十九頭上五行者以寫諸陽之逆熱也大杵臼愈缺盆背俞此八者以寫胸中之熱氣衛三里巨虛上下亷此八者以寫胃中之熱也雲門髀骨委中髓空此八者寫四肢之熱也五藏俞旁此五者以寫五藏之熱也凡此五十九穴者皆熱之左右也又身之穴三百六十有五其三十九穴灸之有害七十九穴刺之為災并中髓也穴有三百六十五以應一歲其灸刺之禁皆肉薄骨解之處血脈虛少之分針灸并中髓也凡脈四損三日死平人四息病人脈一至名曰四損脈五損一日死平人五息病人脈一至名曰五損脈六損一時死平人六息病人脈一至名曰六損四藏氣絶者脈四損五藏氣絶者脈五損五藏六府氣絶者脈六損脈盛身寒得之傷寒脈虛身熱得之傷暑內經曰脈者血之府也脈實血實脈虛血虛寒則傷血邪併於血則血盛而氣虛故傷寒者脈盛而身寒熱則傷氣邪併於氣則氣盛而血虛故傷暑者脈虛而身熱也脈隂陽俱盛大汗出不解者死脈隂陽俱盛當汗出而解若汗出不解則邪氣內盛正氣外脫故死內經曰汗出而脈尚躁盛者死千金曰熱病已得汗脈尚躁盛此陽脈之極也死脈隂陽俱虛熱不止者死脈隂陽俱虛者真氣弱也熱不止邪氣勝也內經曰病溫虛者死脈至乍疏乍數者死為天真榮衛之氣斷絶也脈至如轉索者其日死為緊急而不軟是邪實胃虛故不出其日而死讝言妄語身微熱脈浮大手足溫者生逆冷脈沉細者不過一日死矣讝言妄語陽病也身微熱脈浮大手足溫為脈病相應若身逆冷脈沉細為陽病見隂脈脈病不相應故不過一日而死難經曰脈不應病病不應脈為死病此以前是傷寒熱病證候也辨痓濕暍脈證第四傷寒所致太陽病痓濕暍三種宜應别論以為與傷寒相似故此見之痓當作痙傳寫之誤也內經曰肺移熱于腎傳為柔痓柔謂筋柔而無力痓謂骨徑而不隨痙者強也千金以強直為痙經曰頸項強急口噤背反張者痓即是觀之痓為痙字明矣太陽病發熱無汗反惡寒者名曰剛痓千金曰太陽中風重感寒濕則變痓太陽病發熱無汗為表實則不當惡寒今反惡寒者則太陽中風重感於寒為痓病也以表實感寒故名剛痓太陽病發熱汗出不惡寒者名曰柔痓太陽病發熱汗出則為表虛當惡寒其不惡寒者為陽明病今非陽明證則是太陽中風重感於濕為柔痓是也表虛感濕故成柔痓太陽病發熱脈沉而細者名曰痓太陽主表太陽病發熱為表病脈當浮大今反沉細既不愈則太陽中風重感于濕而為痓也金匱要略曰太陽病其證痛身體強几几然脈反沉遲此為痓括蔞桂枝湯主之太陽病發汗多因致痓太陽病發汗太多則亡陽內經曰陽氣者精則養神柔則養筋陽微不能養筋則緊急而成痓也病身熱足寒頸項強急惡寒時頭熱面赤目脈赤頭搖口噤背反張者痓病也太陽中風為純中風太陽中寒為純中寒皆不作痓惟是太陽中風重感寒濕乃變為痓也身熱足寒者寒濕傷下也時頭熱面赤目脈赤風傷上也頭搖者風主動也獨頭搖者頭為諸陽之會風傷陽也若純傷風者身亦為之動搖手足為之搦搐此則內挾寒濕故頭搖也口噤者寒主急也卒口噤者不常噤也有時而緩若風寒相搏則口噤而時開此皆加之風濕故卒口噤也足太陽之脈起于目內眥上額其支别者從顛入絡腦還出别下項循肩膊內俠脊抵腰中貫下臀以下至足風寒客于經中則筋脈拘急故頸項強急而背反張也太陽病關節疼痛而煩脈沉而細者此名濕痺之候其人小便不利大便反快但當利其小便金匱要略曰霧傷皮毛濕流關節疼痛而煩者濕氣內流也濕同水也脈沉而細者水性趣下為痺痛也因其關節煩疼而名曰濕痺非腳氣之痺也內經曰濕勝則濡腹滿小便不利大便反快者濕氣內勝也但當利其小便以宣㵼腹中濕氣古云治濕不利小便非其治也濕家之為病一身盡疼發熱身色似熏黃身黃如橘子色者陽明瘀熱也此云色如熏黃則非陽明瘀熱身黃發熱者梔子柏皮湯主之為表裏有熱則身不疼痛此一身盡疼非傷寒客熱也知濕邪在經所致脾惡濕濕傷則脾病而色見是以身發黃者為其黃如煙熏非正黃色也濕家其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如胎者以丹田有熱胸中有寒渴欲飲水而不能飲則口燥煩也濕家有風濕有寒濕此寒濕相搏者也濕勝則多汗傷寒則無汗寒濕相搏雖有汗而不能周身故但頭汗出也背陽也腹隂也太陽之脈俠脊抵腰太陽客寒濕表氣不利而背強也裏有邪者外不惡寒表有邪者則惡寒欲得被覆向火者寒濕在表而惡寒也若下之早則傷動胃氣損其津液故噦而胸滿小便不利下復裏虛上焦陽氣因虛而陷于下焦為丹田有熱表中寒邪乘虛入于胸中為胸中有寒使舌上生白滑胎也藏燥則欲飲水以胸中客寒濕故不能飲而但口煩燥也濕家下之額上汗出微喘小便利者死若下利不止者亦死濕家發汗則愈金匱要略曰濕家身煩疼可與麻黃加至四兩發其汗為宜若妄下則大逆額上汗出而微喘者乃陽氣上逆也小便自利或下利者隂氣下流也隂陽相離故云死矣內經曰隂陽離間精氣乃絶問曰風濕相搏一身盡疼痛法當汗出而解值天隂雨不止醫云此可發汗汗之病不愈者何也答曰發其汗大出者但風氣去濕氣在是故不愈也若治風濕者但微微似欲汗出者風濕俱去也值天隂雨不止明其濕勝也內經曰陽受風氣隂受濕氣又曰傷於風者上先受之傷於濕者下先受之風濕相搏則風在外而濕在內汗大出者其氣暴暴則外邪出而裏邪不能出故風去而濕在汗微微而出者其氣緩緩則內外之邪皆出故風濕俱去也濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈病有淺深濕證有中外此則濕氣之淺者也何以言之濕家不云關節煩疼而云身上疼痛是濕氣不流關莭而外客周表也不云發熱身似熏黃復云發熱面黃而喘是濕不注于脾脾受濕氣則濕邪為深今頭痛鼻塞而煩是濕邪客于陽而不客于隂也濕家之脈當沉細為濕氣內流脈大者陽也則濕不內流而外在表也又以自能飲食胸腹别無痞滿為腹中和無病要知其濕氣微淺內藥鼻中以宣泄頭中寒濕病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也一身盡疼者濕也發熱日晡時劇者風也若汗出當風而得之者則先有客濕而後感寒風若久傷取冷得之者則先傷風而後中濕可與麻黃杏仁薏苡仁甘草湯見金匱要略方中太陽中熱者暍是也其人汗出惡寒身熱而渴也汗出惡寒身熱而不渴者中風也汗出惡寒身熱而渴者中熱也白虎湯加人參主之見金匱要略方中太陽中暍者身熱疼重而脈微弱此亦夏月傷冷水水行皮中所致也經曰脈虛身熱得之傷暑身熱脈微弱者暍也身體疼重者水也夏時暑熱以水浴洗而致一味瓜蒂散主之見要略中太陽中暍者發熱惡寒身重而疼痛脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚下之則淋甚病有在表在裏者有表裏俱病者此則表裏俱病者也發熱惡寒身重疼痛不足也小有勞身即熱者為勞動其陽而暍即發也口開前板齒燥有熱也內經曰因於暑喘呵開口不止故前板齒燥若發汗以去表邪則外虛陽氣故惡寒甚若下之以除熱則內虛而膀胱淋甚普濟方卷一百二十六
