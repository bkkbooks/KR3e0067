香銼六兩腦子研九兩麝香研九兩蜜比香稱兩加倍用煉和香右為末入研藥用蜜搜和令勻如常法燒降真香紫檀香銼三十兩以建茶細末一兩湯調兩碗濕香令勻慢火燒兩三時勿令焦木氣盡為度白茅香細銼三十兩青州棗二十斤劈破水二升同煮變色炒令色變㨂去棗及黑不用用好者十五兩紫潤降真香銼四十兩黃熟香銼三十兩熖硝湯化飛淘去粗熬霜半斤丁香皮十兩瓶香二十兩麝香十五兩甘松㨂淨十兩粉草銼五兩藿香十兩龍腦二兩右為末入研藥煉蜜搜和如常法燒清逺香降真香係紫藤者銼六兩零陵香銼六兩茅香六兩元參㨂五兩丁香皮五兩香附子㨂淨十兩藿香銼二兩白芷三兩麝香半斤右為細末煉蜜搜和令勻用如常法衣香方茅香二兩銼蜜炒零陵香二兩白檀五錢甘松去土一兩三奈子七錢麵包香白芷一兩麝香少許右件精新搗為粗末以絹囊盛之辟衣魚令衣香以榅桲實初熟時置衣笥中其氣芬馥濕香以榠櫺生壓汁以甘松元參合和作末甚爽神又方以甲香不限多少先用黃土泥水煮一日以溫水浴過次用米泔或灰汁煮一日依前浴過後用蜜酒煮一日又浴過煿乾任用令人體香採甘松作湯浴之辟惡氣令人衣香以迭迷香燒之去鬼合香方每甲香一斤以泔一斗半於鐺中以微火煮經一復時即換新泔又經三換即濾去衆手刮去香上惡物訖用白蜜三合水一升又煻火煮一復時水乾又以蜜三合水一升再煮都三復時以香爛止炭火熱燒漉清酒令潤鋪香於其上以新瓷瓶蓋令密泥一復時待香冷後即臼中用木杵搗令爛以沉香三兩麝香一分和合略搗令相亂入印香成以磁瓶貯之更能埋之經久方燒尤佳令人身香以大棗和桂心白瓜仁松樹皮為丸久服身香并衣亦香諸煎方楊梅煎取熟楊梅於瓦器內淹一宿即爛用絹袋濾出慢火熬成膏瓦罐盛貯每用入蜜少許沸湯點服金櫻煎用候霜時取金櫻子先擦去刺然後去穰搗爛用魚酢取汁絹帛濾過慢火熬成膏後入檀香諸香在內瓦罐收貯沸湯點服酒調能駐顔木瓜湯用木瓜去穰子煎過爛研如泥入鹽少許用瓦罐盛貯沸湯點服醍醐膏用烏梅一斤捶碎甜水四大碗煎一碗濾去粗白沙糖五升砂仁末半兩入沙石器內慢火熬成赤色膏為度取下放冷加白檀香四錢麝香一字令勻磁石器內收貯封口一宿夏月冷水調冬月沸湯調用詩曰烏梅化痰止煩渴蜜生津液潤心肺白檀大能解暑毒麝香通竅辟邪氣甲煎湯甲香二兩沉香六兩丁香藿香各四兩薰陸香楓香膏麝香六兩大棗十枚取肉右㕮咀如豆片又以蜜二合和勻內瓷坩中以綿褁口將竹篾交絡蔽之又油六斤零陵香四兩甘松二兩綿褁內油中銅鐺緩火煎四五沸止去滓更用酒一升半并內煎坩中亦以竹篾蔽之然後剜地為坑置坩於上使出半復內將煎小香坩合此口上以濕紙纒兩口仍以泥塗上使厚一寸訖竈下暖坩火起從旦至暮暖至四更止明發待冷看上坩香汁半流瀝入下坩內成矣燒甲煎香澤合口脂方蘭澤香半斤零陵香一斤甘松香五兩吳藿香六兩新壓烏麻油一升右并用大斤兩揀擇精細燒水淨洗以酒水漬使調勻經一日一夜并著銅鐺中緩火煮之經一宿通前蔽兩日兩宿須緩火煎訖取出香澤澄去滓以綿濾絞訖內著磁坩中勿令香氣泄封如法同後藥合沉香一斤丁香二兩麝香薰陸香艾納各半小兩白膠香蘇合香各一兩甲香二兩右并大斤兩令别搗如麻子大先煉白蜜去上沫盡即取沉香等於漆盤中和之使調勻若香乾取前件香澤和使勻散內著瓷器中使實看瓷大小取香多少别以綿褁以塞瓶口緩急量之仍用竹青篾三條􅳞之即覆瓶口於前件所燒香澤瓶口上仍使兩口上下相合然後穿地埋著香澤瓶口共地平覆合香瓷瓶令露乃以濕紙纒瓶口相合處然後以麻搗泥裹瓶口邉厚三寸盛香瓶上亦令遍厚三寸以炭火燒瓶四邉緩炙使薄乾然後使用煻火馬糞火亦佳燒經三宿四日勿得斷火看之必使調勻不得有多少之處香汁即下不勻三宿四日燒訖即住火其香澤傷多即焦令帶少生氣佳仍住經兩日使香餅冷訖始開其上瓶揔除却更取别研內一分香於瓶中燒之一依前法若無别瓶還取舊瓶亦得其三分者香并燒訖未得即開仍經三日三夜停除火訖又經兩日其甲煎成訖澄清斟量取依色鑄㵼其沉香少許少著香澤只一遍燒上香瓶亦得好脂五升銅鐺一口銅鉢一口黃蠟一大斤又拌蠟置于鐺中緩火煎之使沫消盡然後傾鉢中停經少時使蠟冷凝還取其蠟依前銷之即擇紫草一大斤用長竹箸挾取一握置於蠟中煎取紫色然後擢出更著一握紫草以紫為度煎紫草盡一斤蠟色即足若作紫口脂不加餘色若造肉色口脂著黃蠟紫蠟各少許若朱色口脂丸一兩蠟色中和兩大豆許朱硃即得但鑄前件三色口脂法一兩色蠟中著半合甲煎相和著頭點置竹上看堅柔得所㵼著竹筒中斟酌冷即用之煎甲煎先造香油方零陵香藿香各一兩并銼之以酒拌微溫用綿褁內烏麻生油二斤緩火煮一宿去滓油安三斤瓶中掘地作坑埋瓶於中瓶口向地面平沉香一斤小甲香八兩麝香三兩蘇合香一兩右並㨶如大豆粒以蜜拌內一小角瓶中用竹篾封其口勿令香漏將此角瓶倒垂土中瓶口內以紙泥泥兩瓶接口處不令土入用泥泥香瓶上厚六七分用粳火一石燒其上瓶其火微微不得烈使粳盡煎乃成矣甲煎方沉香甲香各五兩檀香半兩麝香一分香附子甘松香蘇合香白膠香各一兩右㨶碎以蜜和內小瓷瓶中令滿綿蓋口以竹篾十字絡之又生麻油二斤零陵香一分半藿香二分茅香二分右相和水一升漬香一宿著油內微火上煎之半日許澤成去滓别一瓷瓶中盛將小香瓶覆著口入下瓶口中以麻泥封并瓶厚五分埋土中口與地平瓶上泥訖以粳火微燒半日許著瓶上放火燒之欲盡粳勿令絶三日三夜煎成停二日許待冷取澤用之云停二十日轉好火燒不熱即不香須熟燒此方妙又方蠟蜜各十兩紫草一兩半右和蠟煎令調紫草和朱砂併澤㵼竹筒中任用甲煎方沉香六兩丁香箋香四兩楓香青木香各二兩麝香兩大棗十枚肉甲香三兩右銼以蜜一合和拌著坩內綿褁竹篾絡之油六升零陵香四兩甘松香二兩綿褁著油中煎之緩火可四五沸即止去香草著坩中埋出口將小香坩合大坩濕綿纒口泥封可七分須多著火從旦至午即須緩火至四更即去火至明待冷發看即成煎矣甲煎脣脂治脣裂口臭方先以麻搗泥泥兩口好瓷瓶容一斗已上各厚半寸暴令乾甘松香五兩艾納香苜蓿香茅香各一兩藿香三兩零陵香四兩右六味先以酒一升水五升相合作湯洗香令淨切碎又以酒水各一升浸一宿明旦取一斗五升烏麻油六味內其中微火煎三上三下去滓內上件一口瓶中令少許不滿然後取後藥上色沉香三斤雀頭香蘇合香各三兩白膠香白檀五兩丁香麝香甲香各一兩右八味先酒水相和作湯洗香令淨各各别搗不用絶細以蜜二升酒一升和香內上件瓷瓶中令實滿以綿裹瓶口又以竹篾交橫約之勿令香出先掘地埋上件油瓶令口與地平以香瓶合覆油瓶上令兩口相當以麻搗泥泥兩瓶口際令牢密可厚半寸許用粳壅瓶上厚五寸燒之火欲盡即加粳三日三夜勿令火絶計粳十二石訖停三日令冷出之别煉蠟八斤煮數沸內紫草十二兩煎數十沸取一莖紫草向爪甲上研看紫草骨白出之又以綿濾過與前煎相和令調乃內硃砂粉六兩攪令相得少冷未凝之間傾置竹筒中筒上用紙褁麻纒之待凝冷解開任意用之計此可五十挺金櫻子煎用金櫻子經霜後者以竹挾子摘取于大木臼中轉杵去刺勿損之擘為兩片去其子以水淘洗過爛搗入大鍋以水煎不得絶火煎約水耗半取出滓濾過仍重煎以稀湯每服取一匙用暖酒一盞調服其功不可盡述普濟方卷二百六十七
