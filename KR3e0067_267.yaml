body:
  text: 普濟方卷二百六十七明周王朱橚撰諸方香煎門諸湯御愛靈黍湯出百一選方大小麥各二兩甘草四兩炒縮砂仁二兩半生薑一斤連皮切鹽六兩白者佳右將大小麥炒熟入諸藥焙乾為細末用磁器盛食前後可服暖脾補元宿飲甚佳大小麥恐有粗皮難服先别多碾取淨末用加肉豆蔲八枚尤佳雞香散方出百一選方茴香半兩㨂淨細研為末甘草銼細炒鹽白者佳各一兩良薑乾薑已上二味細銼以麻油搽過用慢火炒金紫色各一兩川胡椒五錢㨂淨用水淘過細研為末右為細末點服每服加胡椒半兩忌生蔥蒜及水果韻梅湯出百選方半黃梅一百枚捶去核仁青椒四兩揀淨稱薑一斤去皮研鹽半斤甘草細銼為末稱一兩新會皮切細絲淨稱一兩乾山藥晒乾去皮研為末一兩右於淨盆中一處拌勻安烈日中晒半月捴以色變稍紫為度如半月內不能變紫不妨多晒三伏中晒易變色更約度稀稠得所為佳如遇隂雨忌辰晦日及起風月忌日宜避忌安淨磁器中每用少許沸湯送下不宜多服橙湯出百一選方橙子十枚正黃色乾山藥去皮切細一兩白鹽炒四兩甘草二兩鹽白梅四兩捶去核不去仁右先用橙子山藥白梅一處研細揑成餅子焙乾再研為細末入檀香半兩尤佳一方入生薑二兩沸湯點集香湯出百一選方縮砂五兩去皮甘草三兩胡椒檀香各半兩青鹽四兩右先炒鹽甘草次下餘藥炒令香熟為細末如常點如無青鹽只用海鹽清中湯出百一選方菖蒲半斤須水中生者淨洗切作片子桔梗生薑切作片各四兩鹽二兩甘草二兩半炙右和勻罨一宿晒乾為細末入瓶窨一月如常點見火即色不白一方有人參紫薑湯出百一選方生薑一斤片切慢火炒令熟舶上丁香皮二兩甘草二兩銼鹽三兩炒丁香五十枚右件攪焙乾為度搗羅為末溫中湯出百選方縮砂仁二兩甘草炙鹽炒各三兩丁香一分生薑半斤去皮右將薑搗碎與縮砂甘草鹽一處拌勻淹一宿焙乾次入丁香同為細末湯點下一方只用甘草一兩四順生薑湯出百一選方神麴四兩生薑半斤肥嫩者洗淨細切與神麴同和作餅焙乾草豆䓻一兩半炮熟去皮稱大麥蘖一兩微炒甘草一兩半炙右為細末如常入鹽少許沸湯點下一方無草豆䓻小煮香湯出百一選方香附子四兩不去皮只淨洗略於炒盆內擦去毛用水三升煮草果子一兩取仁縮砂甘草各一兩丁香一分檀香半兩右先煮香附子次用餘藥同煮乾切香附子碎焙乾為細末入鹽點服醍醐湯出百一選方神麴官桂乾薑煨各二兩鹽三兩炒過甘草七兩淨者烏梅八兩淨洗拍碎右先將內五味焙乾搗羅為細末後入炒鹽滚合作一處用新淨磁罐收白湯點下暗香方出百一選方清神爽氣香附子一兩揀大而無皮者炒縮砂仁一兩半炒木香一分檀香一錢甘草二兩炙胡椒一錢炒右件同為末入鹽點服不拘時檀香湯出和劑局方治精神不爽頭目昏眩心忪煩躁志意不定川芎不見火白芷不見火各二兩桔梗焙三十兩檀香不見火三兩甘草炒六兩右為細末每服一錢入鹽少許沸湯點服常服調中順氣安神定志清爽頭目煮香湯出醫方集成木香丁香檀香沉香人參各二兩甘草一兩檳榔半兩白茯苓二兩去皮右細銼以清水二升同煎煮令水盡為度或於銀器內貯重湯乾窨尤妙先擇軟爛者切焙令半乾入體燥者一處焙乾搗羅為末不入鹽如茶點一方入藿香半兩八神湯出百一選方溫脾益胃消酒化食治胸膈痞悶嘔吐惡心神麴炒麥蘖炒甘草炙各三兩丁香一分胡椒一分鹽三兩生薑四兩細切草豆䓻三箇銼去皮右件除丁香胡椒二味餘藥共一處水浸一宿次日焙乾連丁香胡椒同為末沸湯點服一名薑麴湯金粟湯出百一選方粟米一升生薑十兩甘草四兩草果二兩淨肉右件將粟米淘淨同生薑研碎淹一宿作餅子焙乾却同將甘草草果搗羅為細末若更入白术二兩絶妙每服二三錢入鹽少許沸湯點下不計時服粉浸湯出百一選方生薑十兩去皮稱洗淨切作餅子杏仁五兩湯去皮尖白鹽五兩甘草五兩微炙别搗為末右先將杏仁細研次下生薑次下甘草鹽一處研如泥拍作薄餅子一日焙乾碾為細末經宿則色不白沸湯點服鹽薑湯出百一選方生薑一斤甘草五兩鹽六兩縮砂仁三兩右先將甘草炙過用薑鹽為碎磈子同淹一宿焙乾乘熱罨一宿為細末湯點如常服龍砂湯出百一選方縮砂仁十兩去白膜丁香一兩二錢甘草二兩銼鹽三兩半右先以文武火炒鹽乾次下甘草粗末候黃下細末次下縮砂微炒香熟盡傾入磁罐子中先入丁香然後以厚紙急蓋令密不得透氣候冷取出為末點之荔枝湯出濟生拔粹方烏梅肉甘草各二兩百藥煎一兩白芷半兩白檀二錢右為細末湯點服川芎湯出百一選方川芎一兩甘草菖蒲縮砂仁右等分於銚子內紙襯微妙黃同為細末入鹽點服橄欖湯出百一選方百藥煎三兩細切作餅子檀香銼焙白芷各五錢甘草炙一兩半右為細末沸湯點服乾木瓜湯出百一選方紫蘇五兩切生薑三兩切鹽三斤木瓜十枚去穰切片子右件將鹽入在三味內一處拌和勻淹兩日洗淨為細末入在瓶子內收之喫時湯米一升甘草三兩炙為末入在湯內如常點服濕烏梅荔枝湯出百一選方烏梅三十枚大者有肉右先以湯浸三五次去酸水取肉研爛與榶同熬用桂末兩入湯內毬糖一斤臨時添減與烏梅同熬得所即止生薑半斤取汁加減多少用右件熬成膏看可便住火用湯或水調點止渴甚妙密封瓷器收貯乾䜴湯又名元液湯出百一選方好鹽䜴二斤焙乾别搗羅為細末蒔羅茴香馬芹子各半兩椒半兩去目炒乾乾茵蔯一兩鹽五兩炒乾乾薑半兩炮甘草半兩炒右同作細末與䜴末同入臼杵勻以馬尾羅隔令極勻用湯點服清韻湯出百一選方縮砂仁三兩石菖蒲一兩甘草半兩炙右為細末入鹽少許沸湯點服桂花湯一名桂香湯出百一選方甘草略炙一兩桂花三升㨂去青柄子細研以磁器盛貯覆合略蒸花須就團摘墜地者亦可乾薑一兩右件為細末同桂打勻量入炒鹽少許磁器盛貯莫令漏氣如常法點梅花湯出醫方集成旋摘方開者鎔蠟封花口投蜜罐子過時用之以匙桃花兩朵連蜜一匙沸湯斟服桂漿法出百一選方夏月飲之解渴消痰氣味香美格韻絶高以桂二兩桂須四兩去粗皮無味者取二兩白沙蜜一升以水二斗先煎取一斗待冷入新磁瓶中後下二味攪二三百轉令勻先以油單一重覆上加紙七重以繩封之每日開一重七日開之藥成矣三伏中或懸之井底蠟紙密封泥七日出井熟矣洞庭湯出百一選方以細皮黃橘子一斤於淨盆內以一砧子就盆內薄切去核留汁生薑去皮半斤甘草四兩搗碎鹽三兩一處拌淹一兩宿取出焙再以橘汁浸沫盡為度焙乾為細末如常法點若添神麯炒麥糵炒各四兩以拌橘汁即不須再浸尤妙風流藴藉非其他洞庭湯比以其不去橘肉故也鳯池湯成伏中合臘中方可成故名造化湯肥烏梅去仁留核甘草鹽右各件合時三味各一斤為凖炒鹽為妙等分不焙先以烏梅甘草杵為粗末次以鹽一處拌勻入罐子實按收起取臘月或伏內各半年後方取出焙乾為細末如常點夏月宜飲水仙术湯出和劑方辟瘟疫除寒熱溫脾胃進飲食蒼术去皮四十八斤棗去核二斗四升乾薑炮二十兩甘草炒十四斤鹽炒二十三斤杏仁去皮尖麩炒别搗三斤右為細末入杏仁和勻每服一錢沸湯點服延年明目駐顔輕身不老煎甘草膏子法出百一選方右好粉草一斤慢火炙黃細銼研為粗末以百沸湯五六碗泡著竹杖攪成濃汁生絹袋濾過再將甘草渣别用水煎以無味為度併前濾過汁作一處使熟鍋子內先以麻油少許乘熱擦了入甘草汁煎數十沸以鹽一斤將汁就化開紗片濾去鹽滓再熬成膏子如米飲相似投入乾瓶器內臨時修合每用膏子一升入後項藥大率一斤甘草熬成膏子可分作五料不必限以五七升也檀香湯膏子一升檀香細末三錢腦麝各一分許研細入生薑自然汁三兩點同碾投入膏內點時少許湯化開飲丁香湯入丁香細末三錢餘依法辰砂湯入辰砂細末二三錢看顔如何腦麝並依前法胡椒湯入胡椒細末一兩腦麝並依前法縮砂湯入縮砂細末二兩半丁香乾薑細末各少許不用腦麝茴香湯入炒黃茴香細末一兩檀香白檀細末各少許不用腦麝已上只看滋味如何隨意加減近侍湯出傳信適用方丁香一兩桂去粗皮半兩甘草銼一兩半縮砂仁四兩鹽三兩麝香一錢鹽後入右先將鹽炒令乾次入縮砂甘草慢火炒黃色乘熱入淨器先入一半在底次下丁香在中又以一半蓋之密封口候冷入桂急碾為細末却入麝香同拌勻磁盒盛罨三五日每服一錢沸湯點服八神湯出傳信適用方神麴三兩搗碎略炒大麥蘖三兩搗碎略炒甘草三兩炙草果子四箇炒去皮橘紅一兩丁香三錢不焙胡椒三錢粟米一兩炒熟右為細末入鹽點服洞庭湯傳信適用方陳皮四兩檀香半兩甘草一兩右為細末入鹽點服快氣湯傳信適用方生薑一斤切作片子以鹽三兩淹兩宿焙乾神麴三兩白术三兩橘皮二兩不去白淨洗荆三稜半兩炮蓬莪茂半兩甘草三兩微炒大麥蘖二兩草豆䓻一箇煨去皮子微炙用右為細末每服一錢入鹽湯點服又方傳信適用方香附子一兩木香一兩甘草半兩炒縮砂半兩右為細末每服一錢入鹽湯點服無時半夏湯傳信適用方半夏先以水煮透軟焙乾為末薑汁和餅子焙乾甘草炙杏仁去皮尖茯苓去皮右各等分為末入鹽點服棖湯傳信適用方棖麴四兩甘草一兩檀香一分白鹽一兩右一處為末點服加龍腦少許尤竒木瓜湯傳信適用方木瓜生去皮穰薄切片子稱三斤生薑洗去皮切片子稱一斤鹽篩淨稱一斤二兩右同入盆內拌勻淹一宿後于日中晒不住攪轉候水脈盡慢火焙乾碾為細末入磁器貯之每服二錢白湯點服六和豆䓻湯傳信適用方生薑一斤切片晒乾草果半斤去殼及白皮甘草四兩炒只如此名豆䓻湯入鹽湯用鹽二兩不晒生薑淹一夕名三倍湯添縮砂分量與甘草同名四神湯添胡椒半兩名五順湯添蓽撥半兩成六和湯添半夏二兩名七氣湯右為末入鹽如常服丁香調氣湯出朱氏集驗方白豆䓻八升五合丁香七錢縮砂仁乾薑木香白术炒各半兩甘草炙一兩半炒鹽一兩三錢右為細末熱湯點服經進過院湯出朱氏集驗方草豆䓻一兩生薑五兩切片同拌以水三升慢火煮水乾為度取焙乾白豆䓻仁蓬莪术益智仁各半兩粉草炒鹽各一兩半右為細末熱湯點服寇相入朝湯出衛生家寶方衝冒霧氣春天不可少服空心進餌沉香木香甘草人參茴香肉豆蔲草豆䓻蓽澄茄各等分右為細末每服一錢沸湯點入鹽少許桂漿出御藥院方桂去粗皮為細末赤茯苓去皮為末三兩大麥蘖為末半兩細麯為末半兩生蜜三斤杏仁湯浸去皮一百箇生研如泥熟水一斗右用前件藥末蜜杏泥并水一處攪勻了和水共量三大建盞入於磁罐子內以油紙封口上用數重紙蓋泥固濟入水窨內三日用熟絹濾去滓水浸飲之桂沉漿出御藥院方沉香三錢紫蘇葉烏梅肉各一兩乳糖六兩右件四味用水三碗熬至二碗濾滓入桂漿一升半合作漿飲之袪濕逐痰順氣止渴神仙不老湯出余居士選竒方香附子㨂圓者去盡黑皮微炒四兩薑黃湯浸一宿洗淨焙乾稱二兩甘草一兩炙右三味同搗羅成細末每一錢入鹽點空心服皇祐至和間劉君錫以事竄嶺南至桂州遇仲逺先生口授此方仲逺此時已百餘歲君錫服此方間關嶺表數年竟免嵐瘴之患後還襄陽壽至九旬常云聞之仲逺説晨盥櫛訖未得議飲食且先服此湯可保一日無事旦旦如此