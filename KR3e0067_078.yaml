障荆芥穗四兩菊花防風木賊去節各三兩白蒺䔧炒去刺一兩粉草炙一兩蒼术製人參羌活右㕮咀每三錢煎食後服還睛散出濟生方治散瞖内障人參茯苓細辛五味子桔梗防風車前子各一兩右為末以水一􅊦散一錢煎至五分夜食後去滓溫服復明散出東垣蘭室方治内障黄茋一錢五分蒼术柴胡一錢連翹一錢甘草炙一錢當歸身一錢生地黄一錢橘皮五分川芎五分青皮三分右件如麻豆大都作一服水二大􅊦煎去滓稍熱服之食後忌酒醋温麫辛熱大料物之類冲和養胃湯一名圓瞖内障升麻湯治内障眼得之脾胃元氣衰弱心火與三焦俱盛逺出外飲食失節形體勞役心不得休息故生此疾服之神效出試效方柴胡七錢羌活一兩五錢防風五錢炙甘草一兩五錢當歸酒製白术白芍藥各六錢乾薑一錢五味子二錢人參葛根各二兩黄茋一兩五錢升麻二兩白茯苓三錢右㕮咀每服五六錢水三􅊦煎至二􅊦入黄芩黄連三錢同煎至一􅊦食後去滓稍熱服瀉熱黄連湯出試效方黄芩酒製炒黄連酒製草龍膽酒製生地黄酒製各三兩升麻五分柴胡一兩右件㕮咀毎服二錢將先煎前藥水内入瀉熱黄連湯再煎至一􅊦去滓於日午飯間熱服之午後服之則陽道不行臨臥休服反助隂故也益氣聰明湯出試效方治飲食不節勞役形體脾胃不足致内障耳或鳴聾目暗視物不能令目廣大久服無内障耳鳴聾之患又令精神過倍元氣自益身輕體健耳目聰明黄茋甘草各五錢芍藥一錢黄蘖一錢酒製剉炒黄人參五錢升麻葛根各三錢蔓荆子一錢五分右㕮咀每服稱三錢水二􅊦煎至一􅊦去滓熱服臨臥近五更再煎服之得腫更妙如煩悶或有熱漸加黄蘖春夏加之盛暑夏月倍之若此味多則不效如脾胃虚者去之有熱者少用之如舊有熱麻木或熱上壅頭目三兩服之後其熱皆除治老人腰已下沈重疼痛如神此藥久服令人上重乃有精神兩足輕浮不知髙下若此空心服之或少加黄蘖輕浮自減若治倒睫去黄蘖芍藥忌烟火醋物羌活退瞖丸一名地黄丸治内障右眼小眥青白瞖大眥頭微白瞖腦痛瞳子散大上熱燥大便澀滯小便如常遇天熱暖處頭痛睛􅀈能食日沒後天隂則暗昏此證亦可服滋隂地黄丸出試效方熟地黄一錢防已二錢酒製生地黄酒製當歸身酒製焙黄蘖各五錢酒製芍藥一兩三錢川芎知母三錢酒製丹參五錢茺蔚子五錢羌活三錢牡丹皮三錢寒泉石一錢生丹柴胡五錢或三錢黑附子一錢炮右為末煉蜜丸如小菉豆大空心每服五七十丸白湯送下如消食未盡候飢時服之忌言隨後以食物壓之東垣秘藏云瞖在眥加葛根升麻瞖小加柴胡羌活是也圎明膏出試效方治内障生瞖及瞳子散大皆勞心過度因飲食失節之所致也此方收睛圓明柴胡五錢麻黄微搗五錢去節當歸身三錢生地黄黄連五錢甘草二錢訶子皮二錢濕紙裹煨右先以水二碗熬麻黄至一碗掠去沫外六味各㕮咀如豆大節去沫稱勻入在内同熬入在水中不散去沫入蜜少許再熬勤如常㸃之蒼术丸出朱氏集驗方治内障右以蒼术半斤切作片黑豆一升用水二碗煮乾焙研為末糊丸每服三十丸空心鹽湯下外障眼論夫膜入冰輪外障此眼初患之時肝臟積熱虚勞年多發歇作時睛上有瘡可後便生障瞖漸入冰輪因大腸壅滯致使然也此宜服退熱飲子鉤割熨烙兼宜補虚鎮心丸歌曰黒上生瘡可服痕續生努肉漸相侵時多長覆過痕了因此名膜入冰輪雖即三光微可見烏珠底下碧氣氛忍痛孟浪强鉤割遂使雙眸轉更昏瞖玉浮瞞外障此眼初患之時或疼痛此是毒風上衝入腦積熱在乎肝膈之上致令眼内有瞖如玉色相似遮瞞瞳人如此疾狀並不宜割熨針烙但只宜服退瞖散立效歌曰黑上浮雲如玉色還因瘡可後留痕枉施摩瞖膏和散拱手神醫𤣥妙門服藥去風兼治熱還睛丸散是其因燒香供養依櫳柱覓取從來清淨根旋螺尖起外障此眼初患之時忽然疼痛作時由積熱壅毒留在於肺間切補治恐損眼也宜服搜風湯瀉肝飲子宣揚立效歌曰眼前生瞖處尖起似旋螺挈治雖依舊根源更奈何時時疼痛發風起未消磨湯藥雖勤服醇濃莫妄過日河但将丸與散觧毒定由他失熱消除後明如秋眼黄膜上衝外障此眼初患之時疼痛發歇作時赤澀淚出漸生外膜直覆黒睛難辨人物皆因脾臟風冷胃家極熱切宜鐮鉤熨烙然後宜㸃青膏服通胃瀉脾湯歌曰黒暗從下生黄膜脾胃寒風熱與并痛疼發時多計較門冬犀角便能徵或鐮或㸃依經法若信邪巫不用爭更過燒灸無效後再來求療為施行赤膜下垂外障此眼初患之時忽然赤澀淚下疼痒摩隠瞳人黒睛漸生瞖障赤膜下垂直覆珠睛有此障蔽如雲霞之色如此狀切宜鐮洗出血熨烙然後㸃清涼散服羚羊角飲子即瘥歌曰黑睛從上赤來遮臟腑元知受熱邪客氣交肝愁内壅睛輪被覆似雲霞上臉還令瘀氣盡洗䥥除去血方佳消停又㸃清涼散請瞖臨時減與加風牽瞼出外障此眼初患之時乍好乍惡發歇無時多因淚出不止葢因胃受風氣肝膈積熱壅毒在眼眥之間致使眼皮翻出切宜鐮洗散去瘀肉熨烙三五度然後服黄耆湯用摩風膏摩之瞼内塗白臉膏瘥歌曰一般風熱入雙眸此疾何縁障莫除肝臟毒風翻出瞼腎因傳送入烏珠若是瞼翻還易療毒風入黒即難除銅箆輕熨摩風孽白臉為膏瞼内塗雞冠蜆肉外障此眼初患之時皆因脾胃積熱肝臟受風漸漸入眼致生瞖膜如雞蜆内或青或赤此疾宜令鉤割鐮洗熨烙然後宜服抽風湯散熱茺蔚子丸即瘥歌曰瞼中生瞖是雞冠瞖者先須翻出看蜆内或青又赤黒不嫌割烙始能痊要除風熱憑湯散曾用曾青㸃病原雞冠凝睛外障此眼初患之時忽然痒痛涙出五輪脹起皆硬難以囘轉難辨人物宜針引血脉以摩風膏塗之此疾皆因五臟熱壅衝上腦中風毒入眼致使然也宜服瀉肝湯抽風散歌曰五輪目硬難為轉鶻眼凝睛是本神欲知根源何所起腦中風熱臟中蒸先將針引開風壅藥壓塗抹血脉行風熱直須從内洩除嗔戒行即時平瞳人乾缺外障此眼初患之時忽因疼痛發歇作時難忍夜不得臥遂即瞳人乾缺或上下或東西長不圎正雖辨三光久後俱損大人多患其瞳人或白或黑不定白者腦脂下流為患黑者膽氣腎臟俱勞肝氣為患宜服瀉膽散鎮肝丸補腎散立效歌曰瞳人乾缺水全無或黒或白作形模白即腦脂來閉塞黒色其中本自虚此狀必須疼痛後膽家風熱作堪虞㵼膽鎮肝丸與散更冝補腎散資扶轆轤轉關外障此眼初患之時皆因膈中壅毒肝臟極熱風熱入腦致令眼帶弔起瞳睛難以囘轉不辨人物有胎患者乃不可治也若初患急須療之宜服天門冬飲子瀉肝散歌曰上瞼藏中下瞼藏囘還不肯定中央轉關恰似轆轤轉皆因風熱腦中傷初患之時冝急療門冬飲子㵼肝當方補腎丸出龍木論治黒瞖如珠外障人參茯苓五味子細辛肉桂桔梗各一兩乾山藥栢子仁各二兩五錢地黄一兩五錢右為末煉蜜為丸如梧桐子大空心茶下每服十丸茺蔚散出龍木論治冰瑕瞖深外障茺蔚子防風各二兩黒參細辛大黄枳殻知母芒硝各一兩芍藥一兩五錢右為末以水一盞散一錢煎至五分食後去滓溫服人參湯出龍木論治冰瑕瞖深外障人參茯苓桔梗五味子大黄黒參車前子各一兩黄芩知母各一兩五錢右為末以水一盞散一錢煎至五分食後去滓溫服補勞人參丸出龍木論治逆順生瞖外障人參乾地黄茯苓桔梗乾山藥防風木香細辛桂心各一兩右為末煉蜜和丸如梧桐子大空心茶下十丸烏犀丸出龍木論治兩瞼粘睛外障兼弩肉烏犀茯苓芍藥細辛黑參人參各一兩乾山藥羌活各二兩右為末煉蜜丸如梧桐子大空心茶下一十丸一方用米飲下曾青膏出龍木論治眼黄膜上衝外障曾青秦皮細辛白芷各一兩乳頭香乾腦各一分黄連三分訶子木香各五錢右為末研令勻細以水二碗浸三日後煎至一碗以重綿濾滓後更入蜜四兩同煎為膏盛在磁瓶中封之勿令洩氣用之㸃眼立效黄耆湯出龍木論治風牽瞼出外障黄耆茺蔚子各二兩防風一兩五錢人參茯苓川大黄地骨皮黄芩各一兩甘草五錢右為末以水一盞散一錢煎至五分食後去滓溫服退熱飲子出龍木論治膜入冰輪外障黄芩防風茺蔚子桔梗各二兩大黄五味子黒參細辛各一兩右為末以水一盞散一錢煎至五分食後去滓溫服鎮心丸出龍木論治證同前石決明人參茯苓大黄各一兩逺志乾山藥細辛防風各二兩右為末煉蜜丸如梧桐子大空心茶下十丸搜風湯出龍木論治旋螺尖起外障防風五味子天門冬大黄桔梗各一兩細辛芍藥各一兩五錢茺蔚子二兩右為末以水一盞散一錢煎至五分食後去滓温服通脾瀉胃湯出龍木論治眼黄膜上衝外障麥門冬茺蔚子各二兩防風黑參天門冬黄芩各一兩五錢大黄知母各一兩右為末以水一盞散一錢煎至五分食後去滓溫服羚羊角飲子出龍木論治眼赤膜下垂外障羚羊角一兩五錢茺蔚子黄耆各二兩黄芩天門冬黑參知母桔梗各一兩右為末以水一盞散一錢煎至五分食後去滓溫服大效紫金膏出聖濟總録治外障退瞖膜􅓼氣毒上衝眼疼赤腫或眼眥痒痛時多熱淚昏澀槐嫩枝牙三十條中春采嫩枝子亦好鉛丹細研飛過三分黄連緊實者七條各二寸半長輕粉三錢烏魚骨去皮為末二錢乳香明淨者一錢龍腦少許白蜜四兩右先將槐枝并黄連用雪水或井水一碗半入銀石器内慢火熬及半盞去滓次入乳香又熬之如茶脚許將蜜別熬去滓放冷入煎膏及去沫攪勻再熬如金漆色瓷器收每用少許㸃眼退瞖散出龍木論治瞖玉色浮滿外障石決明車前子大黄黄芩細辛各一錢防風二兩芍藥一兩五錢右為末以水一盞散一錢煎至五分食後去滓溫服瀉肝飲子出龍木論治旋螺尖起外障大黄車前子細辛芒硝黄芩桔梗知母各一兩右為末以水一盞散一錢煎至五分食後去滓温服炙肝散出聖濟總録治外障肉瞖膜遮不明石決明洗榖精草洗各四兩皁角炙去皮子一分甘草炙剉二兩木賊剉黄芩去心各五兩蒼术米泔浸七日切焙半斤右為散每用須猪肝一葉去筋膜切數縫摻藥末五錢於縫内仍摻鹽一錢合定用家園中栁枝三四條閣起慢火炙香熟早晨空心冷喫盡喫冷飯一匙壓之仍于三里穴灸三五七壯後有淚下為驗七日瞖膜必退每旦用新水潄口青金丸出聖濟總録治風毒攻眼成外障瞖膜銅青真者蕤人去皮尖與銅青共浸三日去水研生犀角淨水磨紙水飛過石決明淨水磨瀝乾一錢龍腦研白丁香水研去滓瀝乾海螵蛸水飛過各五分右將銅青與蕤人先研如糊次入白丁香研次四味研細用好墨研濃汁於淨器中熟為丸如菉豆大每用人乳汁化開㸃眼未用者常以龍腦養于瓷中青涼煎出龍木論治赤膜下垂外障龍腦粉馬牙硝秦皮各一兩防風黄連各三分右先將四味為末以水二碗浸藥二日後煎二大盞濾去滓更煎三五沸内磁合子内盛之別入龍腦粉攪勻㸃眼水照丸一名神仙照水膏治眼外障瞖出龍木論黄蠟片切一兩蛇退燒灰研一分鉛丹水飛研一兩水銀一分丹砂研少許雞卵殻烏雞始生須完全去裏面清並殻研如粉一枚右先將黄蠟溶汁投諸藥用栁枝同攪成膏候不見水銀星即丸豌豆大作餅子以丹砂為依仍置用砂末養之每用一餅臨臥安在眼内至天明開眼遺放水盞内上有瞖膜再洗以丹砂末衣過養之其水盞先置于頭邊一方無丹砂石決明散出經驗良方治眼生外障不拘男女大小並皆治之石決明火煅薄荷葉各一兩蒺䔧子炒去刺荆芥穗各二兩人參五錢蜜炙右于地上出火毒研為末食後砂糖冷水調服白劒膏出龍木論治風牽瞼出外障白劒白芷白芨各一兩突厥白一兩五錢右為末用牛酥五兩煎為膏早晨塗在眼瞼内夜半塗亦得復明膏出儒明事親書治外障白丁香臘月收者尤妙稱八錢水飛過揀黄連一兩防風去蘆錯碎一兩新栁枝長一寸者三右以新水一升半雪水尤妙春秋兩三時冬月一宿藥于銀石器内熬至六分去滓另用蜜一斤蜜陀僧研末三字入蜜攪勻另熬以無漆匙撩㸃下蜜中急攪候沸湯定一人旋又攪藥汁都下在内入蜜攪勻再熬三兩沸俟色稍變用生綿三兩濾滓盛器内㸃眼如常一方每藥半合用片腦一麥粒大亦可睛明散出龍木論一名金子散治外障退瞖膜風毒上攻眼疼赤腫瞼眥痒爛時多熱淚方見本門一切雜治類猪膽方出龍木論治外障眼以猪膽一枚用銀銚或瓷銚煎成膏入水腦粒如黍米大㸃入眼中覺瞖輕又將猪膽白膜皮隂乾合作小繩如釵股大小止用一頭燒灰待冷㸃瞖數日後瞖退雙目如舊此治瞖重者尤良不過三五度好羚羊角飲子出龍木論治黑瞖如珠外障羚羊角五味子細辛大黄知母芒硝各一兩防風二兩右為末以水一盞散一錢煎至五分食後去滓溫服細辛散出龍木論治因他患後生瞖外障細辛茺蔚各二兩黒參黄芩桔梗大黄各一兩車前子一兩右為末水一盞散一錢煎至五分食後去滓溫服知母飲子出龍木論治逆順生瞖外障知母茺蔚子車前子各二兩桔梗大黄五味子黄芩各一兩右為末以水一盞散一錢煎至五分食後去滓溫服排風散出龍木論治兩瞼黏睛外障天麻桔梗防風二兩五味子烏蛇細辛芍藥乾蝎右為末食後空心米飲調下一錢抽風散出龍木論治雞蜆肉外障防風二兩大黄桔梗細辛各一兩黄芩黑參芒硝車前子各一兩右為末以水一盞散一錢煎至五分食後去滓溫服茺蔚子丸出龍木論治證同前茺蔚子人參乾山藥各三兩茯苓大黄黄芩黑參石決明各一兩乾地黄一兩五錢右為末煉蜜丸如梧桐子大空心茶下十丸摩風膏出龍木論治鶻眼凝睛外障黄耆細辛當歸杏仁各一兩防風松脂黄蠟各二兩白芷一兩五錢小麻油四兩五錢右為末煎成塗之抽風散出龍木論治證同前石決明車前子茯苓五味子各一兩人參細辛知母各一兩五錢右為末食後米飲調下一錢瀉膈湯出龍木論治證同前防風大黄茺蔚子黄芩黑參桔梗芒硝各一兩右為末以水一盞散一錢煎至五分食後去滓溫服瀉膽散出龍木論治瞳人乾缺外障茺蔚子黄耆各一兩五錢麥門冬地骨皮黑參黄芩知母各一兩右為細末以水一盞散一錢煎至五分去滓食後溫服鎮肝丸出龍木論治證同前乾山藥二兩人參茯苓車前子石決明五味子細辛各一兩五錢右為末煉蜜丸如梧桐子大空心茶下十丸補腎散出龍木論治證同前澤瀉二兩乾地黄人參各一兩五錢茯苓乾山藥菖蒲各一兩右為末每服一錢空心米飲調下天門冬飲子出龍木論治轆轤轉關外障天門冬茺蔚子知母各二兩五味子防風各一兩人參茯苓羌活各一兩五錢右為末以水一盞散一錢煎至五分食後去滓溫服麥門冬湯出龍木論一名瀉肝散治證同前方見本門血灌瞳人類透明丸治外障熱腫臟府實熱不通苦參四兩黄蘖二兩去皮寒水石二兩芎藭一兩洗升麻一兩山栀子仁一兩右為末麵糊為丸青黛為衣食後麥門冬湯下硃砂煎治外頑瘴瞖赤脉明硃砂研細水飛朋砂蕤人去内外心海螵蛸去殻腦子右研令細如粉無暇入少麝香同研于㸃障白厚重加馬牙硝少許同研將變内障眼論夫眼疾始于淺浮久而弗圖變為内障非一端也龍木論内障皆有其漸蓋從一眼先患後乃相牽俱損是肝腎氣虚風邪熱毒上攻眼目氣血衰微久則為害但不疼不痛久無眵淚目視如輕烟薄霧或見垂絲或見蠅翅飛蚊其初無足慮及其成是慢不知省今以將變内障者叙之蓋圖難于易之意也龍木論云五風毒此眼初患之時亦是臓府虚勞肝風為本或因一眼先患兼腦熱相侵致令眼目失明初覺即須急藥宜服除風湯通明丸補肝丸即效詩曰烏絲青風及黑黄甚嗟宿世有災殃後有腦脂流結白真如肉色又如霜醫人不知將針撥瞖胳非眀却自傷頭雷頭風變内障此眼初患之時頭面多受熱毒風衝旋猶如熱病相似俗號為頭風或嘔逆惡心年多衝入内失明或從一眼先患大小不定後乃俱損宜服瀉肝丸磁石丸效詩曰俗號雷風熱毒風年多衝入眼睛中瞳人或大及或小坐對三光黒不紅腦熱流脂來結白醫師不了便針通雖然瞖墜風猶在須把根株洗一空㵼肝磁石丸俱服依法何難立見功方補肝丸治眼昏暗將變内障杏仁茺蔚子青葙子枸杞子五味子茯苓去皮決明子各一兩乾地黄三兩兔絲子山芋車前子地骨皮栢子仁大黄細辛去苗甘草炙人參黄芩去心黄連去須防風各一兩五錢右為末煉蜜丸如梧桐子大每服二十丸食後米飲下臥時加三十丸秦皮散治眼昏暈多歴年月恐變為内障秦皮去皮菥蓂子車前子大藍實防風去叉決明子炒各二兩瞿麥穗升麻枳殻去穰炒黄連去須前胡去蘆頭栀子仁各一兩黄蘖去皮炙羚羊角􅀢實各一兩右為末每服三錢溫水湯調下食後臨卧服空青丸治眼目昏暗漸變内障空青五錢別研茺蔚子五味子炒細辛去苗蔓荆實栢子仁別研蒺䔧子去角炒枸杞子人參去蘆防風石龍芮各一兩決明子炒兔絲子酒浸別𢷬為末二兩右為末入空青研勻煉蜜丸如梧桐子大食後以竹葉湯下服三十丸日三菊花丸治眼昏暗漸成内障菊花二兩黄連去須槐子各一兩五錢車前子茺蔚子青葙子地膚子決明子炒菥冥子苦參防風去叉黄芩去心蕤人各一兩右為末煉蜜丸如梧桐子大每服二十丸食後米飲下晚又服黄耆丸治肝虚勞及膀胱久積冷目眩見花不明漸成内障黄耆剉白茯苓去黒皮石斛去根各二兩鹿茸去毛酥炙一兩五錢五味子炒二兩防風去叉生乾地黄焙牡丹皮酸棗仁覆盆子各三兩右為末煉蜜丸如梧桐子大每服二十丸空心酒下加三十丸瀉肝湯治雷頭風變内障防風茺蔚子各二兩五味子細辛黄芩桔梗大黄芒硝各一兩車前子一兩五錢右為末以水一盞散一錢煎至五分食後去滓溫服除風湯治五風變内障羚羊角車前子各二兩芍藥人參茯苓大黄黄芩芒硝各一兩右為末水一盞散一錢煎至五分食後去滓溫服通明補腎丸治證同前車前子石決明桔梗芍藥各一兩細辛一兩大黄一分茺蔚子生乾地黄各二兩右為末煉蜜丸如梧桐子大空心茶下十丸石決明丸治眼昏暗漸成内障石決明一兩槐子熟乾地黄一兩陽起石一兩酒煮半月細研飛過磁石一兩五錢燒醋淬七遍細研水飛過兔絲子一兩酒浸三日暴乾別研桂心五錢肉蓯蓉一兩酒浸一宿刮去皮炙乾右為末煉蜜和𢷬三二百杵丸如梧桐子大食前鹽湯下二十丸補腎丸治目暗浮花恐變成黑風内障澤瀉去苗葉細辛去苗葉各一兩五味子炒一兩熟地黄焙茺蔚子各二兩山芋一兩五錢一作乾山藥兔絲子酒浸焙別𢷬一兩右除兔絲子別𢷬外搗羅為末再和勻煉蜜丸如梧桐子大每服二十丸空心鹽湯下磁石丸治雷頭風變内障磁石燒醋浸三遍五味子炒牡丹乾薑黒參各一兩附子炮製去皮臍五錢右為末煉蜜丸如梧桐子大食前茶下十丸羚羊角飲治眼漸暗及覩浮花恐變成青風内障羚羊角地骨皮洗人參羌活去蘆元參車前子各一兩右粗𢷬篩每服三錢水一盞煎至七分去滓食後臨臥温服瀉肺飲治肝虚省目恐變成内障防風去叉黄芩去心桔梗剉炒大黄剉炒芍藥各一兩右粗𢷬篩每服三錢水一盞半煎一盞入芒硝半錢去滓放溫食後臨臥服内眼障鍼後用藥論夫弩肉攀睛滛膚垂瞼之類皆為外障審其輕重則有服食㸃洗之劑鉤割熨烙之法以外去者蓋其勢微淺所以除治在皮膚之表爾内障之症異于是有不痒不痛者虚實特未定也有冰澀浮沈棗花偃月之瞖淺深固不一也亦有清明無瞖若未疾苦者與未患又相似也是以治内障每重於瞖藥必候之歲月其瞖成熟乃用鍼撥或一用而愈若覩青天之快方且對閉以持安寧而又服藥以攻其内所以掃除根本復其自然而已世之專治者甚多不可盛舉大抵以龍木為模法龍木内障二十有二可以鍼者一十有二皆言鍼後用其湯丸則知内障非鍼無以取效且治眼至于鍼誠出于不得已豈輕用妄投耶鍼法具載別叙今姑以鍼後用藥次第列之于左方防風湯治内障圎瞖針後及澀瞖防風去义茺蔚子五味子知母焙桔梗炒車前子元參大黄剉炒細辛去苗黄芩去心各一兩右粗搗篩每服三錢以水一盞煎至六分去滓溫服食後臨臥日二次決明散治内障浮瞖或如眼花或若銀釘浮淺透外方見本門膜遮障類七寶散治内障冰瞖如冰凍堅結睛上以鍼撥取後及散瞖石決明搗研二兩人參茺蔚子各一兩琥珀𢷬研三分龍腦研一分真珠𢷬研熊膽各五錢右為末煉蜜丸如梧桐子大每服十五丸食前茶下加至二十丸七寶湯治内障横瞖瞳人中起如劒脊鍼後羚羊角鎊犀角鎊胡黄連車前子石決明刮洗𢷬研甘草炙各五錢丹砂研一兩右除丹砂決明外𢷬粗篩每服三錢以水一盞煎至七分去滓入丹砂末五分決明末一字再兩沸食後溫服人參湯一名還睛湯治内障散瞖狀如酥㸃清爛以針撥如涎散亂針後又驚振内障眼方見本門目血失瞳人類四膽丸治内障偃月瞖如凝脂一邊厚一邊薄狀如偃月鍼後及内障棗花瞖象膽五錢鯉魚膽七枚熊膽一分牛膽麝香研一錢石決明𢷬研兩右為末麵糊丸如梧桐子大每服十丸空心茶下普濟方卷七十九
