body:
  text: 普濟方卷七十九明周王朱橚撰眼目門内障眼論凡病眼不痛不痒端然漸漸昏暗遂至失明眼狀雖如尋常瞳人中潛生障瞖作青白色漸不辨人物微見三光名曰内障也多從一眼先患久後相牽俱成此狀若不預服湯丸除其本根必至為瞖在内肉脉相連雙目俱損此皆熱風衝腦腦脂流下灌睛亦有黑水凝結而作障也若忽然而暗經三五十日瞖成者則是腦脂流下所致若三五百日之内漸漸昏昏者即是黑水凝結所成纔覺急療治驅其疾勢不爾昏昧障瞖内成非草石療之見功惟金鍼撥之乃效内障眼凝結數重異象多般有浮有沈或滑或澀或形如皓雪或狀似清水或散若梨花或半分片月風攝明覈熱攻瞖開鐵角無垣斜喎有異或瞖嫩難見或瞖老黏睛向陽色之不通背日閃之不動更有蒼黄非等灰色殊形異如斯之類窮論莫盡其中亦有不可治者初患之時腦痛眼疼又有雖不疼痛霍之不動者名曰死瞖其瞖作黄赤色不可治也又有瞖狀或作破散或深或淺中心宻布濃厚者亦不可治也凡學針開必須審細辨其証候明其淺深脫或不曉病原未達機要妄行針藥遂致損傷深可戒也圎瞖内障此眼初患之時眼前多見蠅飛花發垂蟻薄烟輕霧漸漸加重不痛不痒端然漸漸不明眼與不患眼相似不辨人物惟覩三光患者不覺先從一眼先患向後相牽俱損此腦脂流下風腫上衝瞖青白瞳人端正陽看則小隂看則大其眼須針然後眼藥補治用防風散羚羊角飲子謌曰瞖中最好是團圎一㸃然如水上盤陽裏看時應自小隂中見則又還寬金針一撥蠅飛去朗日舒光五月天不是醫人誇巧妙難提逺地宻相傳水瞖内障此眼初患之時頭旋額角偏痛連眼臉骨及鼻頰骨痛眼内赤澀有花或黑或白或紅皆因肝臟積熱肺受風勞或心煩或吐大腸秘澀夜見燈光如蜂初患之時宜令針治諸血脉忌督脉處出血過多恐加昏重宜令服食還睛丸歌曰水瞖猶如水凍堅隂中陽裏一般般傍觀瞳人透表白針下分明是誰言來往用針三五撥志心服藥必能痊若遇痛瞖强撥下瞳人淨洗不能觀滑瞖内障此眼初患之時不痒不痛還從一眼先患後乃相牽俱損端然漸漸失明皆因腦脂流下肝風衝上瞳人内有瞖如水銀珠子不辨人物遂使然也宜令金針撥之將息後服補肝湯石決明丸即瘥歌曰滑瞖看時心且專微含黄色白翩翩才開速大還速小有似水銀珠子旋針撥雖然隨手落凝神針出却歸源縮針穿破青涎散五月金烏照逺天澀瞖内障此眼初患之時䑃朧如輕烟薄霧漸漸失明還從一眼先患後乃相牽俱損猶辨三光瞖如凝脂色瞳人端正狀宜令金針針之然後宜服還睛散九寶丸立効歌曰澀瞖隨開聚瞼遲隂陽大小亦些微傍觀瞳子凝脂色先哲留言不用疑此障撥時依本法用針三五下還離牢封七日圎瘡可將息應當莫自欺散瞖内障此眼初患之時不痒不痛漸漸失明還從一眼先患惟瞳人裏有障瞖作青作白不辨人事猶見三光此眼宜令金針撥之然後宜服還睛散補肝散湯治之即瘥歌曰散瞖内障又何為形状如酥㸃綴之一隨針了和延散未得分明自覺知封畏安存須苦巧莫令患者致狐疑殷勤遣服還睛散再覩三光百日期忌慎一如僧戒行不須恣意縱貪痴深言向說何為切忌取冥冥萬暗時浮瞖内障此眼初患之時都無痒痛還從一眼先患後乃相牽俱損此狀皆因腦中熱風衝入腦中腦脂流下凝結作瞖如銀釘色雖不辨人物猶見三光宜令金針撥之然後宜服決明散墜瞖丸立效歌曰浮瞖正觀如透外乍看色白似銀釘隂寬陽小隨開合此則深知是本形辨認既能無錯繆金針撥出近烏睛但依教法施心力免觸凝脂破不明沈瞖障眼此眼初患之時肝臟勞熱還從一眼先患或見黑花後即相牽俱損腦中熱氣流下要辨三光宜令金針撥之然後服羚羊角飲子空青丸效謌曰一般内瞖又名沈隱隱藏形黑水深向日細看方得見自古相傳不是今此障撥時須逺見勸君先用短頭針墜瞖强過五十息只圖牢固沒他心横瞖内障此眼初患之時還從一眼先患皆是五臟虛勞毒風腫上腦脂流下令眼失明猶辨三光宜用金針撥之宜服還睛丸七寶散瘥歌曰惟有横關内障瞖醫家挑撥㝡宜知細看横心如劒脊上頭下畔薄微微開時先向中心撥隨手還應若霧披改往修來何所作一生志行願歸依偃月瞖内障此眼初患之時微有頭旋額角痛亦因肝氣不足及熱風衝入致使生瞖如偃月之狀還用金針撥之然後宜服通明散墜瞖丸立效歌曰眼中一種腦脂凝何得偏稱偃月名一畔厚而一畔薄醫工不可即疑生欲知巧妙行醫法厚處先宜撥便明丸散還睛應遣服堅牢百歲得安寧棗花瞖内障此眼初患之時微有頭旋眼澀漸漸昏暗眼中時時痒痛腦熱有花黄黑不定此狀宜令針治諸六然後宜服還睛散墜瞖丸立效歌曰瞖中何名是棗花週迴鋸齒沒諸他撥時從上輕輕撥狀似流星落逺霞細意便看瞳子内莫流斷却作攔遮依前不斷還睛藥百歳光明覩物華白瞖黄心内障此眼初患之時肝藏勞熱皆從一眼先患後乃相牽俱損初覺急治即瘥先須憑服湯藥丸散將息即宜針刺諸穴後更宜金針輕撥之然後服墜瞖散即效歌曰可憐白瞖便黄心患者商量懼具針來往用針三五撥不隨針落藥能沈還睛方術須通秘百日如風捲霧隂期苦丁寧須向說窺看神效直千金黑水凝瞖内障此眼初患之時不痒不痛微有頭旋眼澀見花黄黑不定瞳人微有大瞖或青白宜用金針輕撥之然後宜服蘆薈丸通明散立效歌曰黑㬾水結凝靑色可憐内障沒真容隂陽開處難開聚如覺風疴在膽中還用金針三五撥藥憑蘆薈作神功期成百日丁寕說玉兔中秋照逺空驚振内障此眼初患之時忽因五臟虚勞受疾亦由肝氣不足熱毒衝於腦中即或因打築著腦惡血流下漸入眼内後經三五年間變成白瞖一如内障形狀不宜針撥先患之眼更一隻牽損之眼却待瞖成依法針之立效然後服鎮肝丸還睛散即效歌曰或然撞振不全傷疼痛微微目下長便即腦脂為白色一如内障覩三光不須錯悞將針撥却恐為災難可當在後若牽非損者醫元如法始開張混睛外障眼初患之時先痛後痒磣澀淚出怕日羞明白睛先赤發歇作時無定准漸漸眼内赤脉横立遮精如隔絹看物難辨此是毒風在肝藏積血在瞼眥之間致使然也初覺患宜令鎌洗鉤割瞖膜熨烙去除根本然後宜服涼肝散㸃七寶膏服退瞖丸歌曰白精先赤作根基痛痒風吹淚出眵磣澀難開旬日内發無定准有抽時年深漸變睛為碧滿目凝脂始覺之赤脉如絲横與竪混睛外障莫狐疑毒風赤血成其暈如此誰言易可醫冷澀藥中須得妙㸃摩瞖膜盡為期頻兼雙瞼同施箆風熱平時即住之湯藥稍和年歳服要除根本莫嫌遲濃内障眼根源歌曰不痒不痛漸昏䑃薄霧輕烟漸漸或見蠅飛花亂出或如懸喜在虚空此般狀樣因何得肝臟停留熱及風大呌大啼驚與怒腦脂流入黑睛中初時一眼先昏暗次第相牽與一同苦口何須陳逆耳只原肝氣不相通此時眼藥期先定將息多乖即沒功日久既應全暗黑時名内障障雙瞳名字隨形分十六龍師聖者㑹推窮靈藥這囘難得效金針一撥日當空强將修息依言說莫遣依前說復同凡内障之眼形候甚多好惡非一有水有澀有滑有散水者撥之不下滑者閉之不牢澀者收之稍遲散者刮之難聚如此之類宜鑒辨之或浮或深或老或嫩用針輕重粗細則量宜淺宜深宜遲宜疾患人或冷或熱或實或虚若熱多者宜先服涼藥令熱毒先除方始開之不爾恐氣開吐逆若有風虚者先宜以祛風鎮心之藥候四體平和方宜下針不爾暈悶驚悸切在臨時消息隨其虚實所宜也又性熱者腦脂流下其瞖易老性冷者其瞖難老老障者可用小針嫩薄者可用大針障浮者去烏珠近下針之障沈者須逺下針瞖若沈下針近撥之則其瞖不牢瞖若浮下針逺撥之則瞖多破若婦人有姙娠及新産後有斯疾者未宜下針直候體立安平方可開之不爾則必有所損凡開内障及諸瞖膜等必須候天氣晴明仍靜處斷除喧亂安心定意方可行針隨眼左右宜向小眥頭下針隔鼻開眼者鼻碍於手下針不妙令患人正面坐手捉醫人腰帶勿令放手先將銳針拄穴令定便得穴道勿令轉動定呼吸氣五十息徐徐進針勿令過重亦不可全輕初且須輕輕未入即須稍重針頭或偏即有損傷血則隨針出即不可止亦不得重手按之恐血更多可輕輕裛之又須緩氣徐徐用力逼之血即自止若血不止即見大傷則待血凝塞針孔則合也可依舊法用藥將息轉針不過子午若針覺緊急者則是入膜若放平猶滑及未得全入若已入了其眼覺痛若痛且住歇少時漸漸進之臨過膜痛即更甚方便用意針過待痛稍定即可倒針向瞳人齊用平撥之向下不得絶重手也離瞳人微近開眼便見物既見物便合眼緩緩抽針出了停五十息久開得明朗見物即以綿封之依法將息勿失度稍失其宜即瞖暈却上準前開亦得若撥後有動靜隨狀止之若有痛處以手隨處掐之即定若大痛不定即以火熨之凡欲下針預向人說勿恐下手疾人驚惡嘔吐亦須藥止痛以大黄木香等為末以醋漿水和如泥作餅子搦之即定或吐不定含白梅咽津仍預先含之吐逆盛即難止凡諸藥須預備擬不可臨時闕也痛久不可忍即見損也開眼後綿封七日喫䜴粥仰臥不得轉動側臥常須人看不可離人勿髙聲呌喚大小便緩扶起勿令患人用力及不得洗面避風將息七日後開封若見物猶白色或如霜雪蓋是眼嫩故也亦未可全除封看物即可時時一開若看物甚即睛疼必有所損二七日後方可除封有物狀如衣帶飛蟲懸針之動水輪未定喫藥漸漸自已三七日外眼或痒無慮也凡開時患人不得太飽亦無令飢也既開見物或有痛處隨左右針之及掐捻左右督脉顳顬風府等穴若針痕痛二三日即自定也一月内不用洗面恐水入針孔即有損也宜以綿漬鹽湯微微拭之七日内不得喫飯恐入口動牙關應著水輪故須喫粥及軟爛之物夫治眼不論障瞖及諸雜狀候之眼皆不得當風看日及喜怒房事五辛酒麫炙􅘤毒物並宜斷之唯須寬緩性情慎護調攝即無不差也若縱恣乖違觸犯禁忌則自貽其咎矣龍木論云針内障眼法歌曰内障由來十六般學醫人子審須看分明一一知形狀下針方可得安然若將針法同圓瞖誤損神光取差難冷熱先用虚與實調和四體待全安不然氣悶違將息嘔逆勞神瞖却翻効驗震頭皆未得多驚先服鎮心丸丸求涼藥銀膏等用意臨時休後看老瞖細針初撥嫩針形不可一般般病虚新産還娠月下手應知將息難不雨不風兼吉日清齋三日在針前安心定意行醫道念佛親姻莫雜喧患者向明盤膝坐捉師腰帶待心安針者但行賢哲行惻隠之情實善縁有血莫驚須住手裹封如舊再開看忽然驚振瞖重下服藥三旬見朗然七日解封須見物花生水動莫他言還睛丸散堅心服百日分明復舊根針内障後法歌曰内障金針有了時醫師言語要深知綿包黒豆如毬子眼上安排吊係之頭安豆枕須安穏仰臥三朝莫厭遲卧後忽然微有痛頭風牽動莫他疑或針或烙依經法痛極仍前火熨之擬備白梅含咽汁吐來仰臥却從伊起則恐因遭努損雖然稀有也須知七朝䜴粥溫温服震著牙關事不宜大小便時須緩緩無令自起與扶持髙聲呌言多驚動睛輪驚動見雪飛如此忌必三十日漸行出外認親知狂心莫憶隂陽事夫婦分牀百日期一月不須臨洗面針痕須妨濕微微五辛酒麫周年斷服藥平除病本基縁風内障此眼初患之時頭旋額角偏痛連臉骨及鼻頰骨痛眼内痛澀見花或因惡心欲吐或因吐逆後便令一眼先患後相牽損目前花生或紅或黑為肝肺受勞致令然也切宜服羚羊角飲子還睛丸兼鍼治諸血睂骨血脉令住疾勢也歌曰初患頭旋偏腦額痒角相牽是縁風眼眶連鼻時時痛悶澀生花黑白紅肝臟只因先患左肺家右眼作先鋒續後相牽俱總患縁他脉帶氣相通風勞入肺肝家壅濕熱潛流倒瞖宮祕澀大腸猶自可每覺心煩土築胷多是有時加吐逆風痰積聚在心中羚羊湯藥須當服還睛丸散成其功頻針睂骨兼諸穴能令病本住行蹤忌鐵昇脉多出血恐因此後轉昏䑃童子開張三曜絶效藥名醫更謾逢烏風内障此眼初患之時不疼不痛漸漸昏沈如不患眼人相似先從一眼起後乃相牽俱損瞳子端然不開不大惟小不覩三光此是臟氣不和光明倒退眼帶障開經三五年内昏氣結成瞖如白青色不辨人物以後相牽俱損瞳人微小鍼之無效惟宜服藥補治五臟令住病勢宜服決明丸補肝湯立效歌曰都因但痒不頭疼漸漸昏朦似物瞞沒瞖恰如昏不患烏風根本更何言有花藏府虚勞是無即肝家氣壅之兩種既知虚與實分明用藥補和時治之先服涼藥飲空腹宜吞磁石丸食後補肝須早治瞳人未小即能痊襄陽年老還相似醫者披尋細意看目絶三光應不救瞳人乾定是為難黑風内障此眼初患之時頭旋額角偏痛連眼瞼骨及鼻頰骨時時亦痛兼眼内痛澀有黑花來往還從一眼先患以後相牽俱損亦因腎臟虚勞房室不節致令為黑風内障不宜鍼撥切宜服藥將息鍼治諸穴脉宜服羚羊角飲子補腎丸立效歌曰黑暗形候縁風同眼府推尋别有蹤黑即腎家來作禍縁風本自肺中攻欲知何藥能為療也要羚羊瘥病宗將息亦針除赤脉澀即輕輕鐮臉中忌房勞作啼嗔恨恣意之流切莫從瞳子開張三曜絶明醫拱手謾相逢青風内障此眼初患之時微有痛澀頭旋腦痛或眼先見有花或無花瞳人不開不大漸漸昏暗或因勞倦漸加昏重宜令將息便須眼藥終久結為内障不宜鍼撥皆因五臟風勞所作致令然也宜服羚羊角湯還睛散即瘥歌曰曾無痒痛本原形一眼先昏後得明瞳人端然如不患青風便是此元因初時微有頭旋悶或見花生又不生忽思勞倦加昏暗知爾還應自失驚服藥更須將息到莫遣風勞更發萌還服羚羊湯與散還睛鎮墜自相應頭摩膏藥勤作力免使雙眸失却明患者無知違法度已時還道是前生又方日精月華光明膏治能開一切内障善治瞖膜遮睛及攀睛弩肉不日掃除無問年久日深或一目兩目俱患但能見人影者悉可去之如雲開而見日好琥珀一錢五分别研馬牙硝飛過二錢五分銅緑一錢五分真膽礬一錢五分别研硼砂一錢五分别研沒藥四兩别研乳香三錢别研青鹽一錢五分南硼砂硃砂各一錢五分輕粉一錢别研麝香五分别研片腦五分别研防風一錢天花粉五分前藥各研候後藥成膏却下黄連四錢研當歸一兩碾訶子一對去核碾石決明二兩去穰細研石膏一兩用臘八雪浸三日大鵝梨二十个槌碎用布扭去粗猪胰俱用草夾細去筋膜爐甘石四兩童便浸滓燒五次黄丹一兩用臘八雪浸右先用首五味浸三日却用大砂鍋一口藥水再添滿七分熬重綿濾過至四五碗却將鵝梨猪胰二味入内又熬至三碗再用濾過入鍋下爐甘黄丹同熬至二碗又濾過却下牙硝等十二味不住手用槐栁條攪勻後成膏如前濾淨入瓶内却入麝香片腦琥珀十分攪勻用油紙重封放冷水浸三日然後旋取膏入瓶内以銅筯㸃眼良陽起石丸治肝腎久虛眼目昏暗漸成内障陽起石一兩酒煮半日細研水飛過烏犀角屑三分防風三分去蘆頭羚羊角屑三分石決明一兩搗研水飛過麥門冬一兩去心焙真珠末虎睛一對酒一宿炙甘菊花川升麻空青葳蕤細辛車前子蔓荆子人參去蘆頭芎藭赤芍藥青葙子槐子炒黄芩蕤仁湯浸去赤皮前胡去蘆頭決明子漢防已黄連去須茺蔚子枳實麩炒川大黄炒甘草炙已上各五錢右為末令勻煉蜜和擣三十杵丸如梧桐子大每于食後用麥門冬湯下三十丸乳香當歸散治内障傷風寒攀睛瘀肉多年眼中倒睫拳毛鳳凰臺當歸薄荷荆芥穗藁本榖精草石膏煅末藥研兔絲淘去砂酒蒸白葛根蔓荆子苦丁香漢防已川芎赤小豆乳香研百節菖蒲去毛炒香白芷自然銅火煅醋淬七次研火龍爪鬱金各一錢雄黄研定風子細辛各一錢五分右為細末每日三次早午臥鼻内㗜之麥門冬丸治内障并久患者熟地黄麥門冬車前子右等分旋研煉蜜丸如梧桐子大每服二三十丸酒下屢效一方不用酒服下其法三藥皆羅搗細和合再加盧甘石真竒方也大全集退瞖散出秘方治目内瞖障或瘡疹後餘毒不散真蛤粉别研細榖精草生令為末各一兩右同一處拌勻毎服二錢同生猪肝一片三指大批開摻藥在上捲定再用麻線扎之濃米泔一盞煮肝熟為度取出於冷食後臨臥細嚼却用原煮肝米泔送下忌一切毒物如齋素只用白柿同煎前藥冷乾去藥食白柿孫盈仲云凡患瘡疹不可食雞鴨子心生瞖膜錢季華之女年數歳瘡疹兩眼皆生瞖只服此藥各退白膜三重瞳子方療蜜蒙花散出危氏方治十六般内障多年昏暗及近日不明淚出眩爛並皆治之蜜蒙花二兩羚羊角水煑剉炒乾人參覆盆子蠐螬醋浸地膚子甘草枸杞子各一兩茺蔚子菥蓂子菊花槐花各五錢右為末每服二錢食後用飯飲調下甘菊散出聖惠方治肝臟風毒上衝眼目始則昏暗久成内障甘菊花人參去蘆石膏決明子各一兩旋復花防風去蘆羚羊角屑車前子黄芩杏仁湯浸去皮尖雙人麩炒微黄川升麻三分甘草一分炙赤剉右為粗散毎服三錢以水一盞入生薑半片煎至六分去滓食後溫服忌炙煿熱麵羚羊角丸出聖惠方治縁風障肝肺風熱壅滯見紅白黑花頭額偏疼漸漸昏暗不見物