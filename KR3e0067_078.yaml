障荆芥穗四兩菊花防風木賊去節各三兩白蒺䔧炒去刺一兩粉草炙一兩蒼术製人參羌活右㕮咀每三錢煎食後服還睛散出濟生方治散翳內障人參茯苓細辛五味子桔梗防風車前子各一兩右為末以水一􅊦散一錢煎至五分夜食後去滓溫服復明散出東垣蘭室方治內障黃茋一錢五分蒼术柴胡一錢連翹一錢甘草炙一錢當歸身一錢生地黃一錢橘皮五分川芎五分青皮三分右件如麻豆大都作一服水二大􅊦煎去滓稍熱服之食後忌酒醋溫麵辛熱大料物之類沖和養胃湯一名圓翳內障升麻湯治內障眼得之脾胃元氣衰弱心火與三焦俱盛逺出外飲食失節形體勞役心不得休息故生此疾服之神效出試效方柴胡七錢羌活一兩五錢防風五錢炙甘草一兩五錢當歸酒製白术白芍藥各六錢乾薑一錢五味子二錢人參葛根各二兩黃茋一兩五錢升麻二兩白茯苓三錢右㕮咀每服五六錢水三􅊦煎至二􅊦入黃芩黃連三錢同煎至一􅊦食後去滓稍熱服瀉熱黃連湯出試效方黃芩酒製炒黃連酒製草龍膽酒製生地黃酒製各三兩升麻五分柴胡一兩右件㕮咀每服二錢將先煎前藥水內入瀉熱黃連湯再煎至一􅊦去滓於日午飯間熱服之午後服之則陽道不行臨臥休服反助隂故也益氣聰明湯出試效方治飲食不節勞役形體脾胃不足致內障耳或鳴聾目暗視物不能令目廣大久服無內障耳鳴聾之患又令精神過倍元氣自益身輕體健耳目聰明黃茋甘草各五錢芍藥一錢黃蘖一錢酒製銼炒黃人參五錢升麻葛根各三錢蔓荆子一錢五分右㕮咀每服稱三錢水二􅊦煎至一􅊦去滓熱服臨臥近五更再煎服之得腫更妙如煩悶或有熱漸加黃蘖春夏加之盛暑夏月倍之若此味多則不效如脾胃虛者去之有熱者少用之如舊有熱麻木或熱上壅頭目三兩服之後其熱皆除治老人腰已下沈重疼痛如神此藥久服令人上重乃有精神兩足輕浮不知髙下若此空心服之或少加黃蘖輕浮自減若治倒睫去黃蘖芍藥忌煙火醋物羌活退翳丸一名地黃丸治內障右眼小眥青白翳大眥頭微白翳腦痛瞳子散大上熱燥大便澀滯小便如常遇天熱暖處頭痛睛􅀈能食日沒後天隂則暗昏此證亦可服滋隂地黃丸出試效方熟地黃一錢防已二錢酒製生地黃酒製當歸身酒製焙黃蘖各五錢酒製芍藥一兩三錢川芎知母三錢酒製丹參五錢茺蔚子五錢羌活三錢牡丹皮三錢寒泉石一錢生丹柴胡五錢或三錢黑附子一錢炮右為末煉蜜丸如小菉豆大空心每服五七十丸白湯送下如消食未盡候飢時服之忌言隨後以食物壓之東垣祕藏云翳在眥加葛根升麻翳小加柴胡羌活是也圎明膏出試效方治內障生翳及瞳子散大皆勞心過度因飲食失節之所致也此方收睛圓明柴胡五錢麻黃微搗五錢去節當歸身三錢生地黃黃連五錢甘草二錢訶子皮二錢濕紙裹煨右先以水二碗熬麻黃至一碗掠去沫外六味各㕮咀如豆大節去沫稱勻入在內同熬入在水中不散去沫入蜜少許再熬勤如常點之蒼术丸出朱氏集驗方治內障右以蒼术半斤切作片黑豆一升用水二碗煮乾焙研為末糊丸每服三十丸空心鹽湯下外障眼論夫膜入冰輪外障此眼初患之時肝臟積熱虛勞年多發歇作時睛上有瘡可後便生障翳漸入冰輪因大腸壅滯致使然也此宜服退熱飲子鉤割尉烙兼宜補虛鎮心丸歌曰黑上生瘡可服痕續生努肉漸相侵時多長覆過痕了因此名膜入冰輪雖即三光微可見烏珠底下碧氣氛忍痛孟浪強鉤割遂使雙眸轉更昏翳玉浮瞞外障此眼初患之時或疼痛此是毒風上衝入腦積熱在乎肝膈之上致令眼內有翳如玉色相似遮瞞瞳人如此疾狀並不宜割尉針烙但只宜服退翳散立效歌曰黑上浮雲如玉色還因瘡可後留痕枉施摩翳膏和散拱手神醫玄妙門服藥去風兼治熱還睛丸散是其因燒香供養依櫳柱覓取從來清淨根旋螺尖起外障此眼初患之時忽然疼痛作時由積熱壅毒留在於肺間切補治恐損眼也宜服搜風湯瀉肝飲子宣揚立效歌曰眼前生翳處尖起似旋螺挈治雖依舊根源更奈何時時疼痛發風起未消磨湯藥雖勤服醇濃莫妄過日河但將丸與散解毒定由他失熱消除後明如秋眼黃膜上衝外障此眼初患之時疼痛發歇作時赤澀淚出漸生外膜直覆黑睛難辨人物皆因脾臟風冷胃家極熱切宜鐮鉤尉烙然後宜點青膏服通胃瀉脾湯歌曰黑暗從下生黃膜脾胃寒風熱與并痛疼發時多計較門冬犀角便能徵或鐮或點依經法若信邪巫不用爭更過燒灸無效後再來求療為施行赤膜下垂外障此眼初患之時忽然赤澀淚下疼癢摩隱瞳人黑睛漸生翳障赤膜下垂直覆珠睛有此障蔽如雲霞之色如此狀切宜鐮洗出血尉烙然後點清涼散服羚羊角飲子即瘥歌曰黑睛從上赤來遮臟腑元知受熱邪客氣交肝愁內壅睛輪被覆似雲霞上臉還令瘀氣盡洗鐮除去血方佳消停又點清涼散請翳臨時減與加風牽瞼出外障此眼初患之時乍好乍惡發歇無時多因淚出不止蓋因胃受風氣肝膈積熱壅毒在眼眥之間致使眼皮翻出切宜鐮洗散去瘀肉尉烙三五度然後服黃耆湯用摩風膏摩之瞼內塗白臉膏瘥歌曰一般風熱入雙眸此疾何緣障莫除肝臟毒風翻出瞼腎因傳送入烏珠若是瞼翻還易療毒風入黑即難除銅箆輕尉摩風孽白臉為膏瞼內塗雞冠蜆肉外障此眼初患之時皆因脾胃積熱肝臟受風漸漸入眼致生翳膜如雞蜆內或青或赤此疾宜令鉤割鐮洗尉烙然後宜服抽風湯散熱茺蔚子丸即瘥歌曰瞼中生翳是雞冠翳者先須翻出看蜆內或青又赤黑不嫌割烙始能痊要除風熱憑湯散曾用曾青點病原雞冠凝睛外障此眼初患之時忽然癢痛淚出五輪脹起皆硬難以回轉難辨人物宜針引血脈以摩風膏塗之此疾皆因五臟熱壅衝上腦中風毒入眼致使然也宜服瀉肝湯抽風散歌曰五輪目硬難為轉鶻眼凝睛是本神欲知根源何所起腦中風熱臟中蒸先將針引開風壅藥壓塗抹血脈行風熱直須從內泄除嗔戒行即時平瞳人乾缺外障此眼初患之時忽因疼痛發歇作時難忍夜不得臥遂即瞳人乾缺或上下或東西長不圎正雖辨三光久後俱損大人多患其瞳人或白或黑不定白者腦脂下流為患黑者膽氣腎臟俱勞肝氣為患宜服瀉膽散鎮肝丸補腎散立效歌曰瞳人乾缺水全無或黑或白作形模白即腦脂來閉塞黑色其中本自虛此狀必須疼痛後膽家風熱作堪虞㵼膽鎮肝丸與散更冝補腎散資扶轆轤轉關外障此眼初患之時皆因膈中壅毒肝臟極熱風熱入腦致令眼帶弔起瞳睛難以回轉不辨人物有胎患者乃不可治也若初患急須療之宜服天門冬飲子瀉肝散歌曰上瞼藏中下瞼藏回還不肯定中央轉關恰似轆轤轉皆因風熱腦中傷初患之時冝急療門冬飲子㵼肝當方補腎丸出龍木論治黑翳如珠外障人參茯苓五味子細辛肉桂桔梗各一兩乾山藥柏子仁各二兩五錢地黃一兩五錢右為末煉蜜為丸如梧桐子大空心茶下每服十丸茺蔚散出龍木論治冰瑕翳深外障茺蔚子防風各二兩黑參細辛大黃枳殼知母芒硝各一兩芍藥一兩五錢右為末以水一盞散一錢煎至五分食後去滓溫服人參湯出龍木論治冰瑕翳深外障人參茯苓桔梗五味子大黃黑參車前子各一兩黃芩知母各一兩五錢右為末以水一盞散一錢煎至五分食後去滓溫服補勞人參丸出龍木論治逆順生翳外障人參乾地黃茯苓桔梗乾山藥防風木香細辛桂心各一兩右為末煉蜜和丸如梧桐子大空心茶下十丸烏犀丸出龍木論治兩瞼粘睛外障兼弩肉烏犀茯苓芍藥細辛黑參人參各一兩乾山藥羌活各二兩右為末煉蜜丸如梧桐子大空心茶下一十丸一方用米飲下曾青膏出龍木論治眼黃膜上衝外障曾青秦皮細辛白芷各一兩乳頭香乾腦各一分黃連三分訶子木香各五錢右為末研令勻細以水二碗浸三日後煎至一碗以重綿濾滓後更入蜜四兩同煎為膏盛在磁瓶中封之勿令泄氣用之點眼立效黃耆湯出龍木論治風牽瞼出外障黃耆茺蔚子各二兩防風一兩五錢人參茯苓川大黃地骨皮黃芩各一兩甘草五錢右為末以水一盞散一錢煎至五分食後去滓溫服退熱飲子出龍木論治膜入冰輪外障黃芩防風茺蔚子桔梗各二兩大黃五味子黑參細辛各一兩右為末以水一盞散一錢煎至五分食後去滓溫服鎮心丸出龍木論治證同前石決明人參茯苓大黃各一兩逺志乾山藥細辛防風各二兩右為末煉蜜丸如梧桐子大空心茶下十丸搜風湯出龍木論治旋螺尖起外障防風五味子天門冬大黃桔梗各一兩細辛芍藥各一兩五錢茺蔚子二兩右為末以水一盞散一錢煎至五分食後去滓溫服通脾瀉胃湯出龍木論治眼黃膜上衝外障麥門冬茺蔚子各二兩防風黑參天門冬黃芩各一兩五錢大黃知母各一兩右為末以水一盞散一錢煎至五分食後去滓溫服羚羊角飲子出龍木論治眼赤膜下垂外障羚羊角一兩五錢茺蔚子黃耆各二兩黃芩天門冬黑參知母桔梗各一兩右為末以水一盞散一錢煎至五分食後去滓溫服大效紫金膏出聖濟總録治外障退翳膜􅓼氣毒上衝眼疼赤腫或眼眥癢痛時多熱淚昏澀槐嫩枝牙三十條中春采嫩枝子亦好鉛丹細研飛過三分黃連緊實者七條各二寸半長輕粉三錢烏魚骨去皮為末二錢乳香明淨者一錢龍腦少許白蜜四兩右先將槐枝并黃連用雪水或井水一碗半入銀石器內慢火熬及半盞去滓次入乳香又熬之如茶腳許將蜜別熬去滓放冷入煎膏及去沫攪勻再熬如金漆色瓷器收每用少許點眼退翳散出龍木論治翳玉色浮滿外障石決明車前子大黃黃芩細辛各一錢防風二兩芍藥一兩五錢右為末以水一盞散一錢煎至五分食後去滓溫服瀉肝飲子出龍木論治旋螺尖起外障大黃車前子細辛芒硝黃芩桔梗知母各一兩右為末以水一盞散一錢煎至五分食後去滓溫服炙肝散出聖濟總録治外障肉翳膜遮不明石決明洗榖精草洗各四兩皂角炙去皮子一分甘草炙銼二兩木賊銼黃芩去心各五兩蒼术米泔浸七日切焙半斤右為散每用須豬肝一葉去筋膜切數縫摻藥末五錢於縫內仍摻鹽一錢合定用家園中栁枝三四條閣起慢火炙香熟早晨空心冷喫盡喫冷飯一匙壓之仍于三里穴灸三五七壯後有淚下為驗七日翳膜必退每旦用新水潄口青金丸出聖濟總録治風毒攻眼成外障翳膜銅青真者蕤人去皮尖與銅青共浸三日去水研生犀角淨水磨紙水飛過石決明淨水磨瀝乾一錢龍腦研白丁香水研去滓瀝乾海螵蛸水飛過各五分右將銅青與蕤人先研如糊次入白丁香研次四味研細用好墨研濃汁於淨器中熟為丸如菉豆大每用人乳汁化開點眼未用者常以龍腦養于瓷中青涼煎出龍木論治赤膜下垂外障龍腦粉馬牙硝秦皮各一兩防風黃連各三分右先將四味為末以水二碗浸藥二日後煎二大盞濾去滓更煎三五沸內磁合子內盛之別入龍腦粉攪勻點眼水照丸一名神仙照水膏治眼外障翳出龍木論黃蠟片切一兩蛇退燒灰研一分鉛丹水飛研一兩水銀一分丹砂研少許雞卵殼烏雞始生須完全去裏面清並殼研如粉一枚右先將黃蠟溶汁投諸藥用栁枝同攪成膏候不見水銀星即丸豌豆大作餅子以丹砂為依仍置用砂末養之每用一餅臨臥安在眼內至天明開眼遺放水盞內上有翳膜再洗以丹砂末衣過養之其水盞先置于頭邊一方無丹砂石決明散出經驗良方治眼生外障不拘男女大小並皆治之石決明火煅薄荷葉各一兩蒺䔧子炒去刺荆芥穗各二兩人參五錢蜜炙右于地上出火毒研為末食後砂糖冷水調服白劒膏出龍木論治風牽瞼出外障白劒白芷白芨各一兩突厥白一兩五錢右為末用牛酥五兩煎為膏早晨塗在眼瞼內夜半塗亦得復明膏出儒明事親書治外障白丁香臘月收者尤妙稱八錢水飛過揀黃連一兩防風去蘆錯碎一兩新栁枝長一寸者三右以新水一升半雪水尤妙春秋兩三時冬月一宿藥于銀石器內熬至六分去滓另用蜜一斤蜜陀僧研末三字入蜜攪勻另熬以無漆匙撩點下蜜中急攪候沸湯定一人旋又攪藥汁都下在內入蜜攪勻再熬三兩沸俟色稍變用生綿三兩濾滓盛器內點眼如常一方每藥半合用片腦一麥粒大亦可睛明散出龍木論一名金子散治外障退翳膜風毒上攻眼疼赤腫瞼眥癢爛時多熱淚方見本門一切雜治類豬膽方出龍木論治外障眼以豬膽一枚用銀銚或瓷銚煎成膏入水腦粒如黍米大點入眼中覺翳輕又將豬膽白膜皮隂乾合作小繩如叉股大小止用一頭燒灰待冷點翳數日後翳退雙目如舊此治翳重者尤良不過三五度好羚羊角飲子出龍木論治黑翳如珠外障羚羊角五味子細辛大黃知母芒硝各一兩防風二兩右為末以水一盞散一錢煎至五分食後去滓溫服細辛散出龍木論治因他患後生翳外障細辛茺蔚各二兩黑參黃芩桔梗大黃各一兩車前子一兩右為末水一盞散一錢煎至五分食後去滓溫服知母飲子出龍木論治逆順生翳外障知母茺蔚子車前子各二兩桔梗大黃五味子黃芩各一兩右為末以水一盞散一錢煎至五分食後去滓溫服排風散出龍木論治兩瞼黏睛外障天麻桔梗防風二兩五味子烏蛇細辛芍藥乾蝎右為末食後空心米飲調下一錢抽風散出龍木論治雞蜆肉外障防風二兩大黃桔梗細辛各一兩黃芩黑參芒硝車前子各一兩右為末以水一盞散一錢煎至五分食後去滓溫服茺蔚子丸出龍木論治證同前茺蔚子人參乾山藥各三兩茯苓大黃黃芩黑參石決明各一兩乾地黃一兩五錢右為末煉蜜丸如梧桐子大空心茶下十丸摩風膏出龍木論治鶻眼凝睛外障黃耆細辛當歸杏仁各一兩防風松脂黃蠟各二兩白芷一兩五錢小麻油四兩五錢右為末煎成塗之抽風散出龍木論治證同前石決明車前子茯苓五味子各一兩人參細辛知母各一兩五錢右為末食後米飲調下一錢瀉膈湯出龍木論治證同前防風大黃茺蔚子黃芩黑參桔梗芒硝各一兩右為末以水一盞散一錢煎至五分食後去滓溫服瀉膽散出龍木論治瞳人乾缺外障茺蔚子黃耆各一兩五錢麥門冬地骨皮黑參黃芩知母各一兩右為細末以水一盞散一錢煎至五分去滓食後溫服鎮肝丸出龍木論治證同前乾山藥二兩人參茯苓車前子石決明五味子細辛各一兩五錢右為末煉蜜丸如梧桐子大空心茶下十丸補腎散出龍木論治證同前澤瀉二兩乾地黃人參各一兩五錢茯苓乾山藥菖蒲各一兩右為末每服一錢空心米飲調下天門冬飲子出龍木論治轆轤轉關外障天門冬茺蔚子知母各二兩五味子防風各一兩人參茯苓羌活各一兩五錢右為末以水一盞散一錢煎至五分食後去滓溫服麥門冬湯出龍木論一名瀉肝散治證同前方見本門血灌瞳人類透明丸治外障熱腫臟府實熱不通苦參四兩黃蘖二兩去皮寒水石二兩芎藭一兩洗升麻一兩山梔子仁一兩右為末麵糊為丸青黛為衣食後麥門冬湯下硃砂煎治外頑瘴翳赤脈明硃砂研細水飛朋砂蕤人去內外心海螵蛸去殼腦子右研令細如粉無暇入少麝香同研于點障白厚重加馬牙硝少許同研將變內障眼論夫眼疾始于淺浮久而弗圖變為內障非一端也龍木論內障皆有其漸蓋從一眼先患後乃相牽俱損是肝腎氣虛風邪熱毒上攻眼目氣血衰微久則為害但不疼不痛久無眵淚目視如輕煙薄霧或見垂絲或見蠅翅飛蚊其初無足慮及其成是慢不知省今以將變內障者敘之蓋圖難于易之意也龍木論云五風毒此眼初患之時亦是臟府虛勞肝風為本或因一眼先患兼腦熱相侵致令眼目失明初覺即須急藥宜服除風湯通明丸補肝丸即效詩曰烏絲青風及黑黃甚嗟宿世有災殃後有腦脂流結白真如肉色又如霜醫人不知將針撥翳胳非眀却自傷頭雷頭風變內障此眼初患之時頭面多受熱毒風衝旋猶如熱病相似俗號為頭風或嘔逆惡心年多衝入內失明或從一眼先患大小不定後乃俱損宜服瀉肝丸磁石丸效詩曰俗號雷風熱毒風年多衝入眼睛中瞳人或大及或小坐對三光黑不紅腦熱流脂來結白醫師不了便針通雖然翳墜風猶在須把根株洗一空㵼肝磁石丸俱服依法何難立見功方補肝丸治眼昏暗將變內障杏仁茺蔚子青葙子枸杞子五味子茯苓去皮決明子各一兩乾地黃三兩兔絲子山芋車前子地骨皮柏子仁大黃細辛去苗甘草炙人參黃芩去心黃連去須防風各一兩五錢右為末煉蜜丸如梧桐子大每服二十丸食後米飲下臥時加三十丸秦皮散治眼昏暈多歷年月恐變為內障秦皮去皮菥蓂子車前子大藍實防風去叉決明子炒各二兩瞿麥穗升麻枳殼去穰炒黃連去須前胡去蘆頭梔子仁各一兩黃蘖去皮炙羚羊角􅀢實各一兩右為末每服三錢溫水湯調下食後臨卧服空青丸治眼目昏暗漸變內障空青五錢別研茺蔚子五味子炒細辛去苗蔓荆實柏子仁別研蒺䔧子去角炒枸杞子人參去蘆防風石龍芮各一兩決明子炒兔絲子酒浸別搗為末二兩右為末入空青研勻煉蜜丸如梧桐子大食後以竹葉湯下服三十丸日三菊花丸治眼昏暗漸成內障菊花二兩黃連去須槐子各一兩五錢車前子茺蔚子青葙子地膚子決明子炒菥冥子苦參防風去叉黃芩去心蕤人各一兩右為末煉蜜丸如梧桐子大每服二十丸食後米飲下晚又服黃耆丸治肝虛勞及膀胱久積冷目眩見花不明漸成內障黃耆銼白茯苓去黑皮石斛去根各二兩鹿茸去毛酥炙一兩五錢五味子炒二兩防風去叉生乾地黃焙牡丹皮酸棗仁覆盆子各三兩右為末煉蜜丸如梧桐子大每服二十丸空心酒下加三十丸瀉肝湯治雷頭風變內障防風茺蔚子各二兩五味子細辛黃芩桔梗大黃芒硝各一兩車前子一兩五錢右為末以水一盞散一錢煎至五分食後去滓溫服除風湯治五風變內障羚羊角車前子各二兩芍藥人參茯苓大黃黃芩芒硝各一兩右為末水一盞散一錢煎至五分食後去滓溫服通明補腎丸治證同前車前子石決明桔梗芍藥各一兩細辛一兩大黃一分茺蔚子生乾地黃各二兩右為末煉蜜丸如梧桐子大空心茶下十丸石決明丸治眼昏暗漸成內障石決明一兩槐子熟乾地黃一兩陽起石一兩酒煮半月細研飛過磁石一兩五錢燒醋淬七遍細研水飛過兔絲子一兩酒浸三日暴乾別研桂心五錢肉蓯蓉一兩酒浸一宿刮去皮炙乾右為末煉蜜和搗三二百杵丸如梧桐子大食前鹽湯下二十丸補腎丸治目暗浮花恐變成黑風內障澤瀉去苗葉細辛去苗葉各一兩五味子炒一兩熟地黃焙茺蔚子各二兩山芋一兩五錢一作乾山藥兔絲子酒浸焙別搗一兩右除兔絲子別搗外搗羅為末再和勻煉蜜丸如梧桐子大每服二十丸空心鹽湯下磁石丸治雷頭風變內障磁石燒醋浸三遍五味子炒牡丹乾薑黑參各一兩附子炮製去皮臍五錢右為末煉蜜丸如梧桐子大食前茶下十丸羚羊角飲治眼漸暗及覩浮花恐變成青風內障羚羊角地骨皮洗人參羌活去蘆元參車前子各一兩右粗搗篩每服三錢水一盞煎至七分去滓食後臨臥溫服瀉肺飲治肝虛省目恐變成內障防風去叉黃芩去心桔梗銼炒大黃銼炒芍藥各一兩右粗搗篩每服三錢水一盞半煎一盞入芒硝半錢去滓放溫食後臨臥服內眼障針後用藥論夫弩肉攀睛淫膚垂瞼之類皆為外障審其輕重則有服食點洗之劑鉤割尉烙之法以外去者蓋其勢微淺所以除治在皮膚之表爾內障之症異于是有不癢不痛者虛實特未定也有冰澀浮沈棗花偃月之翳淺深固不一也亦有清明無翳若未疾苦者與未患又相似也是以治內障每重於翳藥必候之歲月其翳成熟乃用針撥或一用而愈若覩青天之快方且對閉以持安寧而又服藥以攻其內所以掃除根本復其自然而已世之專治者甚多不可盛舉大抵以龍木為模法龍木內障二十有二可以針者一十有二皆言針後用其湯丸則知內障非針無以取效且治眼至于針誠出于不得已豈輕用妄投耶針法具載別敘今姑以針後用藥次第列之于左方防風湯治內障圎翳針後及澀翳防風去義茺蔚子五味子知母焙桔梗炒車前子元參大黃銼炒細辛去苗黃芩去心各一兩右粗搗篩每服三錢以水一盞煎至六分去滓溫服食後臨臥日二次決明散治內障浮翳或如眼花或若銀釘浮淺透外方見本門膜遮障類七寶散治內障冰翳如冰凍堅結睛上以針撥取後及散翳石決明搗研二兩人參茺蔚子各一兩琥珀搗研三分龍腦研一分真珠搗研熊膽各五錢右為末煉蜜丸如梧桐子大每服十五丸食前茶下加至二十丸七寶湯治內障橫翳瞳人中起如劒脊針後羚羊角鎊犀角鎊胡黃連車前子石決明刮洗搗研甘草炙各五錢丹砂研一兩右除丹砂決明外搗粗篩每服三錢以水一盞煎至七分去滓入丹砂末五分決明末一字再兩沸食後溫服人參湯一名還睛湯治內障散翳狀如酥點清爛以針撥如涎散亂針後又驚振內障眼方見本門目血失瞳人類四膽丸治內障偃月翳如凝脂一邊厚一邊薄狀如偃月針後及內障棗花翳象膽五錢鯉魚膽七枚熊膽一分牛膽麝香研一錢石決明搗研兩右為末麵糊丸如梧桐子大每服十丸空心茶下普濟方卷七十九
