菖蒲去毛獨活逺志去心防風各五錢茯神去木石膏麥門冬去心龍齒别研白鮮皮各一兩人參生地黃各三分右為粗咀一服三錢水一盞半煎至七分溫服無時虎睛散治婦人風邪顛狂發歇無時跳躑大呌張目揮臂恆欲打人或時大走不避水火虎睛一對新者文火炙黃乾入露蜂房一兩炙石長生一兩楓樹寄三兩茯苓一兩茯神亦可防風一兩去蘆獨活天雄各一兩炮裂去皮臍當歸一兩炒桂心一兩雞頭一具炙甘草三分炙硃砂半兩細研麝香一分研入雞肝一具炙右為細末入研了藥令勻每服一錢不拘時溫酒調服逺志散治婦人風邪悲思愁憂喜怒無常夢寐不安心神恐懼逺志二分去心白术一兩炒桂心半兩茵芋半兩天雄半兩炮裂去皮臍龍齒半兩菖蒲半兩附子半兩炮裂去皮臍生乾地黃半兩細辛半兩甘草半兩炙栁寄生一兩右為細末每服一錢空心溫酒送下珍珠散治婦人風邪神思不安言語失次顛狂如見神鬼珍珠三分研水飛過水精三分研水飛過鉛霜三分研人參一兩去蘆銀箔五十片研茯神一兩去木硃砂一兩研水飛過雄黃半兩研金箔五十片研琥珀三兩研右為細末務要研極細令勻每服五分用薄荷汁調服加味逍遙散治顛疾歌唱無時踰垣上屋乃血迷於心包絡也所致此症右以逺志去心桃仁去皮尖蘇木紅花各一錢水一盞半煎服後病退却用平胃散內減厚朴三分之二加生蒼术二倍川升麻等蒼术一半水一盞半煎至一盞服之全安須常服以絶其根小柴胡湯治血熱顛狂右加生薑生地黃同前日進三服須服百餘服即安凡婦人顛狂即可頓服補心藥多治婦人風邪顛狂大呌奔走用蝦蟇一枚大者去腸中滓令淨并腸胃却內腹中入瓶子中固劑以文火燒通赤入土中埋出火毒隔日取出入麝香一錢同研細新汲水調下一錢一服神效散用伏龍肝研極細每服一錢以東流水調下日進三服效又方治肝邪傳心日夜煩躁忽如顛狂常覺不安後主方桔梗貝母去心黃芩獨活麥門冬去心桑寄生沈香茯苓荆芥穗玄參硃砂升麻各等分右為細末每服二錢滚白湯調非時服躁時服治肝心受邪日夜煩躁不得眠者酸棗仁茯苓地榆防風各等分右為細末每服三錢以水一盞倉米五十粒米熟去米入藥末冉煎二三沸空心溫服血風煩悶附論夫婦人血風煩悶者由臟腑勞傷血氣虛而風邪乘之搏於血使氣不宣而否澀則生於熱或肢節煩疼口乾少卧皆因虛弱而氣血壅滯故煩悶也又云氣憑血運血依氣行二者不可須臾離天和日暖則氣血淖溢天寒日陰則氣血凝沮茍風寒客於血腑則變生諸病蓋風善行而數變或為寒熱或為痛疼或為拘攣或為偏枯其候不同當隨症治之方香桂丸出聖濟總録治婦人血風榮衛氣澀經脈不調皮膚不澤肢體煩熱頭目昏眩骨節痠疼桂心去粗皮炙芎藭肉豆蔲去殼人參去蘆赤茯苓木香白芷當歸焙檳榔黃耆山芋澤㵼京三稜炮枳殼麩炒乾漆炒去煙楮實炒牛膝去蘆酒浸焙牡丹皮湯浸橘紅炒獨活各半兩防風去蘆芍藥吳茱萸湯浸炒各三分附子炮裂去皮臍右為末煉蜜和丸梧桐子大每服二十丸食前溫酒送下酸棗仁散出聖惠方治婦人血風煩悶四肢疼痛心神多躁飲食減少酸棗仁赤芍藥當歸羚羊角屑赤茯苓紅花子生地黃各三兩防風羌活川牛膝麥門冬桂心川芎地骨皮甘草各半兩右㕮咀每服四錢水一鍾半薑三片薄荷少許煎七分溫服朱賁琥珀丸一方作散出大全良方治婦人血風煩悶琥珀研沒藥研木香當歸芍藥乾地黃白芷羌活延胡索川芎各半兩土瓜根牡丹皮白术桂心各一兩右為末一服一錢水一盞煎七分入酒三分冉煎少時熱服重者數服效紫石英散出聖惠方治婦人血風煩悶心神恍惚眠臥不安紫石英一兩茯神麥門冬去心人參去蘆逺志去心酸棗仁炒當歸炒黃芩各三分羚羊角屑防風去蘆黃耆各半兩甘草一分炙右為粗散每服三錢水一鍾生薑半分棗二枚煎至六分去滓不拘時溫服蓬香散出和劑方治婦人血風每至天陰即先頭旋眼睛痛頭目昏躁煩悶怔忡手足熱痛飲食減少經水不勻有時腹痛或多便利蓬莪术炮京三稜炮荆芥穗沈香銼厚朴薑汁炙桂心烏藥當歸延胡索天麻附子炮裂去皮臍各一兩右為末每服二錢生薑自然汁合酒調服日三服一方無沈香名莪术散當歸散出聖惠方治婦人血風暴衝心煩悶昏沈不能言語腸內刺痛不可忍當歸三分炒赤芍藥芎藭鬼箭羽木香牛蒡子各一分牡丹皮延胡索桂心桃仁湯泡去皮尖雙仁麩炒黃檳榔各半兩右為散每服三錢水一鍾生薑半錢煎至六分去滓不拘時溫服羚羊角散出聖惠方治婦人血風氣攻心煩悶頭目昏重羚羊角燒灰鯉魚鱗紅藍花蒲黃荷葉亂髮桂心木香各半兩麝香一錢研右為末入諸藥同研令細每服一錢生薑童便調不拘時服當歸散出永類鈐方治婦人血風潮熱當歸二兩芍藥延胡索不灰木熟地黃各一兩大黃三分蒸桂心半兩甘草一分右為散每一服二錢水一盞胭脂一小角子煎至六分去滓服如躁時放冷服細呷清者黃連地黃湯出拔萃方治婦人血風症因大脫血崩漏或前後血因而枯燥其熱不除循衣撮空摸床閉目不省擲手揚視搖動不寧錯語失神脈弦浮而虛內燥熱之極也氣粗鼻乾而不潤上下通燥而難治川芎生地黃當歸各七錢赤芍藥梔子黃芩黃連各三錢防風一兩右為散每服三錢水二盞煎至八分去滓無時徐徐服之若脈實者加大黃下之大承氣湯氣藥也自外而內者用之生地黃連湯血藥也自內而外者用之氣血合病循衣撮空證同自氣而之血血而復之氣大承氣湯下之自血而之氣氣而復之血生地黃連湯主之也二者俱當審用大黃散出聖惠方治婦人血風氣衝心煩悶腸疼痛川大黃煨赤芍藥牡丹皮薑黃當歸炒羚羊角屑各半兩蒲黃一兩薄荷三片一方用荷葉右為散每服三錢水一盞煎至七分不拘時溫服犀角散出聖惠方治婦人血風心神煩悶坐臥不安犀角屑一兩白殭蠶半兩炒地龍半兩炒人中白一分麝香一錢細研天竺黃半兩研右為末同研勻用生地黃汁二合蜜一茶匙調下一錢不拘時服逍遙散出聖濟總録治婦人血風氣煩躁口乾咳嗽四肢無力多臥少起肌骨蒸熱百節疼痛柴胡去苗白茯苓赤芍藥白术麩炒當歸炒各三兩右㕮咀每服二錢水二鍾薑三片棗一枚大甘草一寸同煎七分去滓不拘時服赤芍藥散出王氏博濟方治婦人氣血不和心胸煩悶不思飲食四肢少力頭目昏眩身體疼痛風邪乘之以生熱牡丹皮白茯苓赤芍藥白芷甘草各一兩柴胡一兩半右㕮咀每服二錢水一鍾生薑三片棗一枚煎至七分食後溫服羚羊角散出聖惠方治婦人血風上攻心神煩悶羚羊角屑二兩燒灰亂髮半兩燒灰硃砂半兩細研麝香一錢細研右同研令極細每服一錢以苦竹瀝調服不拘時赤馬蹄散出聖惠方治婦人血風心神煩悶赤馬蹄屑炒令焦黃白殭蠶炒羚羊角屑各三錢麝香一錢研細右為細末入麝香同研令勻每服一錢不拘時溫酒調服一方治婦人血風氣衝心煩悶腹痛生薑汁半合生地黃汁二合雞子白一枚赤馬糞酒調絞汁二合右相和攪令勻暖令溫分為二服不拘時服治少女血熱風毒四肢皮膚生癮疹并行經脈方本草一方治婦人方見本門月水不通類即紫葳散治煩悶腹痛血不盡用鹿角燒灰研末豆䜴汁服方寸七日二服漸加至三錢匕治一切血風出本草以陀羅花煎酒服治血風心煩渾身麻癢搔抓不已成風疹端午日取浮萍草瓦上焙乾為末每服二錢酒調服普濟方卷三百十七
