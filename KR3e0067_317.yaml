body:
  text: 普濟方卷三百十七明周王朱橚撰婦人諸疾門風痺手足不隨附論夫婦人風痺者由風寒濕三氣合而為痺風多者為風痺其狀肌膚盡痛諸陽之經皆起於手足而循行於身體風寒之氣客於肌膚始為痺復伏陽經隨其虛處而停滯與血氣相搏血氣行則遲緩使機關弛縱故風痺而復手足不隨也夫婦人臂痛筋脈攣急不得伸屈遇寒則劇由肝虛為風寒邪氣流於血脈客於經絡搏於筋筋不榮則乾急而痛其脈緊細宜服柏子仁丸舒經湯若臂痛不能舉或左或右時復轉移一臂由中脘伏痰脾氣滯而不行上與氣相搏四肢皆屬於脾脾氣滯而不下攻於臂故痛其脈沈細宜服茯苓丸控涎丹方萆薢散出聖惠方治婦人風痺手足不仁腰膝疼痛筋脈攣急萆薢天麻烏蛇肉酒拌炒黃虎脛骨酥炙黃各一兩防風去蘆當歸微炒獨活芎藭麻黃去根節天雄炮裂去皮臍牛膝去苗蒼耳子杜仲去皮微炙薏苡仁酸棗仁各三分五加皮川烏炮裂去皮臍各半兩仙靈脾三分右為細末每服一錢食前豆淋酒調服烏蛇散出聖惠方治婦人風痺手足頑麻筋脈抽搐口眼不正言語蹇澀烏蛇肉酒拌炒黃天南星炮天雄炮裂去皮臍土蜂兒微炒赤箭麻黃去根節薏苡仁芎藭各一兩乾蠍炒桑螵蛸微炒羚羊角屑桂心硃砂細研水飛過各半兩酸棗仁柏子仁當歸微炒各三分麝香細研一分右為細末入研過藥令勻每服一錢食前溫酒調服三痺湯出大全良方治血氣凝滯手足拘攣風痺氣痺皆療川續斷杜仲去皮薑汁炒防風桂心華陰細辛人參白茯苓當歸白芍藥甘草各一兩秦芁生地黃川芎川獨活各半兩黃耆川牛膝各一兩右㕮咀每服五錢水二鍾薑三片棗一枚煎至一鍾去滓熱服無時但腹稍空心服之有人病左臂不隨後已痊平而手指不便無力諸藥不效服之即安獨活散出聖惠方治婦人風痺手足不隨身體疼痛言語蹇澀筋脈攣急獨活桑寄生牛膝去苗秦芁去苗赤茯苓桂心防風去蘆附子炮裂去皮臍當歸微炒生乾地黃各一兩杜仲去粗皮炒微黃細辛芎藭赤芍藥甘草半兩炙微赤右為散每服四錢水二鍾煎七分去滓不拘時溫服牛膝丸出聖惠方治婦人中風手足頑痺不隨骨節疼痛筋脈拘急行履稍難牛膝去苗威靈仙虎脛骨酥炙黃各一兩半當歸微炒防風赤箭天雄炮裂去皮丹參五加皮杜仲桂心石斛仙靈脾道人頭川烏頭炮裂去皮臍各一兩右為細末煉蜜和丸如梧桐子大每服十五丸加至二十丸食前溫酒送下烏頭丸出聖惠方治婦人風痺手足不隨關節沈重行動無力川烏頭炮裂去皮臍天南星炮裂白殭蠶微炒仙靈脾防風去蘆海桐皮赤箭去苗牛膝去苗天雄各一兩烏蛇肉一兩酒拌炒黃石楠葉柏子仁萆薢茵芋各三分銼法同前獨活湯出大全良方治風虛昏憒不自覺手足棄縱坐臥不能或發寒熱血虛不能服發汗藥及中風自汗尤宜服之川獨活羌活人參防風當歸細辛茯神去木半夏桂心白微逺志去心菖蒲去毛川芎各半兩甘草三分右㕮咀每服五錢水一鍾半薑五片煎七分去滓不拘時溫服川烏頭散出聖惠方治婦人風痺疼痛四肢不隨川烏頭炮裂去皮臍甘草炙細辛川椒去目并閉口者微炒去汗赤茯苓各半兩乾薑炮防風去蘆當歸微炒各一兩秦芁去苗附子炮裂去皮臍桂心赤芍藥牛膝去苗各一兩半獨活二兩右為散每服三錢水一鍾半入棗三枚煎至七分去滓不拘時候溫服狗脊浸酒出聖惠方治婦人風痺手足不隨肢節急強狗脊去毛當歸微炒芎藭桂心防風去蘆萆薢仙靈脾各二兩牛膝去苗五兩丹參三兩天蓼木半兩川椒去目并閉口者微炒出汗右細銼用生絹袋盛以好酒二斗五升浸經七日每服溫飲下一小盞常令有酒氣每取一升即添酒一升至五斗即住羌活散出聖惠方治婦人風痺手足不隨筋脈拘急不能行動羌活牛膝當歸微炒防風去蘆赤芍藥各一兩五錢附子炮裂去皮臍桂心五加皮甘草炙各一兩薏苡仁三兩右為散每服四錢水一鍾半生薑半分煎至七分去滓不拘時溫服五加皮散出聖惠方治婦人風痺手足不隨行立無力五加皮萆薢海桐皮各一兩虎脛骨酥炙黃一兩五錢牛膝防風去蘆薏苡仁鼠粘子仙靈脾當歸微炒續斷附子炮裂去皮臍杜仲去粗皮微炒熟乾地黃各一兩右為細末每服二錢食前溫酒調下舒筋湯出大全良方治臂痛又名五痺湯亦治腰下疾片子薑黃四兩甘草羌活各一兩白术海桐皮當歸赤芍藥各二兩右㕮咀為末每服三錢水一盞半煎至七分去滓溫服如疾在腰以下空心服腰以上之疾食後服附子丸出聖惠方治婦人風痺手足不隨附子炮裂去皮臍天麻牛膝去苗仙靈脾川烏頭炮裂去皮臍防風去蘆各一兩虎脛骨二兩酥炙黃右為細末以酒煮麩糊和丸如梧桐子大每服十丸溫酒送下仙靈脾浸酒出聖惠方治婦人風痺手足不隨仙靈脾牛膝去蘆附子炮裂去皮臍杜仲去皮炙各二兩右㕮咀用生絹袋盛將好酒一斗五升浸經七日每次服一小盞通靈丸出大全良方治婦人男子手足痛風目忽眩者白附子殭蠶炒去絲各一兩全蠍半兩炒麝香一字右為末煉蜜丸如梧桐子大每服七丸溫酒下一日三次服天麻酒出十便良方治婦人風痺手足不隨天麻牛膝附子杜仲各二兩右件藥細銼以生絹袋盛用好酒一斗五升浸經七日每服一小盞風眩頭痛附論夫婦人風眩是體虛受風風入于腦也諸臟腑之精皆上注於目其血氣與脈併上屬于腦循脈引於目系目系急故令眩也其眩不止風邪甚者變為癲疾也凡婦人患頭風者十居其半每發必掉眩如住車上蓋因血虛肝有風邪襲之爾素問云徇蒙招尤目冥耳聾上虛下實過在足少陽厥陰甚則歸肝蓋謂此也又云一婦人年四十餘病額角上耳上痛俗呌為偏頭痛如此五七年每痛大便燥結如彈丸兩目赤眩暈昏澀不能逺視世之所謂頭風藥餅子風藥白龍丸芎犀丸之類連進數服其偏雖稍愈則大便稍祕兩目轉昏澀其頭上用艾灸數年矣連年著灸其兩目且將失明由病而無子一日問戴人戴人診其兩手脈急數而有力風熱之甚也余諳此四十五年矣遍察病目者不問男子婦人必偏正頭痛必大便澀滯結硬此無他頭痛或額角痛是三焦相火之經及陽明燥金勝也燥金勝乘肝則腑氣鬱肝血氣壅血氣壅則上下不通故燥結於裏尋至失明治以大承氣湯冷河水煎二兩加芒硝一兩煎令溫合作三五服連服盡蕩滌腸中垢滯結燥積熱下利如湯二十餘行次服宜神功丸潤之菠羮葵菜豬羊血為羮以滑之後五七日十日但遇天道晴明以大承氣夜進一劑是痛隨利減也三劑之外目豁首輕燥澤結釋得三子而終又云凡婦人頭風眩暈登車乘船眩運眼澀手麻髮脫健忘善怒皆胸中宿痰所致可用瓜蒂散吐之次以長流水煎五苓散大人參半夏丸凡頭痛發熱多汗六脈虛細尺脈或絶作血虛治之先服术附湯加川芎次服十全大補湯加附子又服萬安丸神水散內補丸芎藭湯若因被風吹頭目昏眩太陽并腦俱痛項背拘急可與蠍附散都梁丸治項筋強痛不可轉側者以木瓜煎主之方旋覆花散出聖惠方治婦人風眩頭痛痰壅煩悶不下飲食旋覆花白芷芎藭藁本蔓荆子各半兩赤茯苓一兩防風半兩去蘆枳殼半兩麩炒獨活細辛羌活各半兩石膏二兩半夏半兩湯泡七次前胡一兩去蘆杜仲三分羚羊角屑三分甘草半兩炙甘菊花半兩右㕮咀每服三錢水一鍾半生薑半分薄荷七葉煎至七分去滓不拘時溫服紫石英柏子仁丸出千金方治女子遇冬天時行溫風至春夏病熱頭疼熱毒風虛百脈沈重帶下赤白不思飲食而頭眩心悸酸嘶恍惚不起紫石英柏子仁烏頭桂心當歸山茱萸澤瀉芎藭石斛逺志寄生肉蓯蓉乾薑甘草各二兩蜀椒杜蘅一名杜仲辛夷各一兩細辛一兩半右為細末煉蜜和丸如梧桐子大一服二十丸酒下日進三服一方加牡蠣一兩蔓荆子散出聖惠方治婦人風眩頭目昏悶煩疼言語蹇澀痰逆不下飲食蔓荆子防風羌活川芎羚羊角屑枳殼前胡石膏赤茯苓麻黃荆芥穗各三兩北細辛甘菊花白芷藁本甘草旋覆花各半兩右為粗散每服四錢薑三片水一鍾半煎至七分去滓不拘時服羚羊角散出聖惠方治婦人風眩頭疼四肢煩熱疼痛痰逆不思飲食羚羊角屑半兩人參三分去蘆茯苓三分半夏半兩湯泡七次防風半兩去蘆犀角屑半兩赤箭一兩枳殼半兩麩炒黃蔓荆子半兩石膏二兩芎藭三分杜仲三分細辛半兩前胡一兩去蘆甘草半兩炙右為粗末每服三錢水一鍾半生薑半分煎至七分去滓不拘時服石膏散出聖惠方治婦人風眩頭疼心神悶亂肩背四肢煩疼不欲飲食石膏一兩羌活三兩防風半兩去蘆桑白皮三分赤茯苓三分枳殼三分麩炒赤芍藥三分芎藭黃芩三分當歸三分炒甘菊花半兩柴胡一兩去苗羚羊角屑半兩酸棗仁半兩炒甘草半兩炙右為粗散每服四錢水一鍾半薑半分煎至七分去滓不拘時服天雄散出聖惠方治婦人風眩頭疼心神昏悶四肢緩弱天雄一兩炮裂去皮臍防風一兩去蘆山茱萸一兩薯蕷一兩人參一兩去蘆白术一兩芎藭一兩獨活一兩桂心一兩葛根一兩逺志一兩去心莽草一兩石膏二兩甘菊花三分茯神一兩去木右為散每服四錢水酒各一鍾半煎至七分去滓不拘時溫服追風散出大全良方治年深日近偏正頭痛又治肝臟久虛血氣衰弱風毒之氣上攻頭眩目暈心忪煩熱百節疼痛腦昏目痛鼻塞身重項背拘急皮膚瘙癢面上遊風狀若蟲行及一切頭風兼療婦人血風攻疰頭目昏痛並皆治之川烏炮去皮臍防風去蘆石膏煆川芎甘草炙荆芥穗白殭蠶炒去絲各一兩天南星炮羌活天麻地龍白附子炮全蠍去尾針白芷各半兩草烏炮去皮臍尖沒藥研乳香研雄黃研各一分右為細末每服半錢入好茶少許同調食後及卧間服常服清頭目利咽膈消風化痰牡丹皮湯出聖濟總録治婦人血風攻頭目不利不思飲食手足煩熱肢節拘急疼痛胸膈不利大腸不調陰陽相干心下忪悸或時旋運牡丹皮一兩桂心去粗皮半兩橘皮三兩焙延胡索半兩芎藭一兩木香三分白术甘草芍藥各二兩三稜煨乾薑炮各半兩訶梨勒三分半夏湯泡七次薑汁製炒半兩右㕮咀每服四錢水一鍾半煎至六分不拘時溫服蠍附散出大全良方治一切風邪頭痛夾腦風痰涎壅盛嘔逆惡心口吐清水暗風旋暈眼見黑花牙關緊急口眼喎斜面目瞤動頭項拘急肩背引疼耳癢目昏四肢麻木及沐浴出暴感風邪頭目昏痛兩太陽穴疼逺年頭風經久嵗月乍瘥乍發並皆治之附子炮去皮臍川烏炮去皮尖麻黃去節殭蠶炒南星防風去蘆各二錢雄黃水飛硃砂水飛全蠍各半錢白芷藁本各半兩右為細末每服半錢蔥茶調下食後服孕婦不可服兼嚼如聖餅子治眼生眵糞䀮䀮不明見日多淚視物不清一方有川芎細辛旋覆花乳香麝香亦妙都梁丸出大全良方治偏正頭風一切頭疼之症用香白芷揀大塊白色者先刷去塵土用沸湯泡洗至四五次為細末煉蜜丸如彈子大一服一丸多用荆芥點臘茶細嚼食後服只乾嚼亦可都無忌此藥大治諸風眩暈婦人産前産後乍傷風邪頭目昏重及血風頭疼服之令人目明凡沐浴後服一二粒尤佳暴寒乍暖神思不清傷寒頭目昏暈並宜服之木瓜煎出大全良方治頭項強痛不可轉側宣木瓜二枚切頂作蓋刳去瓤沒藥二兩另研乳香二錢半另研右將藥入木瓜內用原蓋子合了竹簽定之飯上蒸三四次爛研成膏子每服三匙生地黃汁半盞無灰酒二盞和之用八分盞熱膏子不拘時服有人患此病自午後發黃昏時定豫曰此患必先從足起經言十二經絡各有筋惟足下少陰之筋自足至頭大抵筋者肝之合也日中至黃昏天之陽陽中之陰也又曰陽中之陰肺也自離至兊陰旺陽弱之時故靈寶祕法云離至乾腎氣絶而肝氣弱肝腎二臟受陰氣故發於是時豫授此方三服而愈芎羌散治婦人血風頭痛心膈壅滯少思飲食川芎一兩赤茯苓去皮赤芍藥酸棗仁炒桂心當歸去蘆木香牛膝酒浸各七錢半羌活去蘆枳殼去瓤麩炒甘草各半兩炙右㕮咀每服三錢水一大盞半薑五片煎至一大盞去滓熱服不拘時候茯神散治婦人血風五臟大虛驚悸安神定志茯神去木人參去蘆龍齒另研獨活去蘆酸棗仁微炒各一兩防風去蘆逺志去心桂心細辛去苗白术各七錢半甘草炙乾薑炮各半兩右㕮咀每服五錢水一中盞半煎至一大盞去滓溫服不拘時候鈎藤散治肝厥頭暈清頭目鈎藤陳皮去白半夏湯洗七次切片子麥門冬去心茯苓去皮茯神去木人參去蘆甘菊花防風去蘆各半兩甘草炙二錢半石膏二兩右㕮咀每服四錢水一盞半生薑七片煎至一盞去滓熱服日進二服獨活散治婦人風眩頭疼嘔逆身體時痛情思昏悶獨活一兩白术去蘆防風去蘆細辛去苗人參芎藭荆芥各七錢半半夏湯泡七次切片子炙甘草赤芍藥各半兩石膏二兩右㕮咀每服八錢水一中盞半生薑七片薄荷七葉煎至一大盞去滓溫服不拘時金烏散出聖惠方治婦人風眩頭旋卒倒痰涎壅滯四肢拘急烏鴉一隻去嘴足狐肝一具已上入罐子內細泥固劑候乾燒令赤抽火以土護定罐子冷取出搗為末入後藥同研用天麻半兩白附子半兩炮裂白殭蠶半兩炒桑螵蛸半兩炒甘菊花天南星半兩炮麝香一分研細右為細末前燒了藥末及麝香研令勻每服一錢以豆淋薄荷酒調服不拘時候又方出聖惠方天雄三分炮裂去皮臍蔓荆子三分甘菊花半兩山茱萸一兩薯蕷一兩半右為細末每服一錢溫酒調不拘時服又方出聖惠方槐子一兩炒牛蒡子一兩炒右為細末每服一錢食前溫酒調下牡丹皮湯出聖濟總録治婦人血風攻頭目疼痛口苦舌乾或發熱牡丹皮赤芍藥防風去蘆甘菊花各二兩芎藭羌活去蘆各半兩半夏湯泡七次薑汁製炙甘草炙各一兩右㕮咀每服三錢水一鍾半薑三片薄荷三葉煎至七分去滓溫服玉餅子治婦人頭風惡寒風冷昏悶嘔逆川烏炮乾薑炮天南星炮各半兩川芎甘草炒防風各一兩天麻半夏薑製各一錢右為細末蒸餅和丸如彈子大捻作餅子每服一丸荆芥穗同嚼茶送下細辛散出聖惠方治婦人風眩頭疼目被風牽引偏視不明細辛三分秦芁一兩去苗獨活一兩桂心一兩山茱萸一兩天雄一兩炮裂去皮臍薯蕷一兩右為細末每服一錢不拘時溫酒調服七生丸出大全良方治男子婦人八般頭風及一切頭痛痰厥腎厥飲厥傷寒傷風頭痛不可忍者並皆主之川烏甘草南星炮半夏冷水洗去滑川芎石膏白芷並生用各等分右為細末研韭菜自然汁丸如梧桐子一服七丸加至十丸嚼生蔥茶送下芎辛湯出大全良方治狀如前症但發熱者不可服生附子生烏頭去皮尖南星乾薑炮北細辛川芎各一兩甘草三兩右㕮咀每服四錢水二鍾薑七片芽茶少許煎至七分去滓食前溫服中脘素有寒者不用芽茶川芎散出十便良方治風眩頭暈小川芎山藥白茯神甘菊花野菊不用人參各半兩山茱萸肉右為細末無時候溫酒調二錢日進三服當歸川芎散出宣明論治風壅頭目昏眩痛悶筋脈拘攣肢體冷痺保護胎氣調和榮衛當歸川芎甘草二兩黃芩四兩薄荷一兩縮砂仁一分右為末溫水調下一錢漸加至二錢食後日進三服養正丹出大全良方治婦人虛風頭旋吐涎不能已此藥升降陰陽補接真氣非止頭旋而已黑鉛水銀硫黃研硃砂研各一兩右用建盞一隻火上鎔鉛成汁次下水銀用栁杖子打停取下歇少時入二味攪停候冷取下研為粉以糯米軟飯丸如菉豆大每服三十丸棗湯吞下空心食前日二服四神散出大全良方治婦人血氣眩暈頭痛菊花當歸旋覆花荆芥穗各等分右為末每服一錢水一鍾半蔥白三寸茶末一錢煎至七分通口調服良久去枕仰臥少時甘菊花飲子出聖惠方治婦人頭痛目眩心神煩渴甘菊花一兩石膏一兩捶碎葛根三兩銼薄荷一握切生薑一分拍碎蔥白一握切䜴一合右以水二大盞煎至一盞去滓不拘時候溫三服玉真丸出大全良方治頭痛筋攣骨重少氣噦噫腹滿時驚不嗜臥咳嗽煩躁其脈舉之則弦按之如石堅由腎氣不足而內著其氣逆而上行謂之腎厥頭痛服此併硫黃丸局方內如聖餅子加北細辛同半夏等分合服之見效甚石膏一兩煅半夏一兩洗為末硫黃硝石一分並碎右研令勻生薑自然汁打糊為丸如梧桐子大生薑湯送下三十丸一方無半夏用南星硫黃丸出大全良方治頭痛不可忍或頭風年深暴患無所不治服此除根硝石一兩硫黃二兩右研令極細滴水丸如指頭大空心臘茶清嚼下中暑以氷水服之下咽即灑然治傷冷艾湯送下白附子散出大全良方治頭痛連齒時發時止連年不已此由風寒中於骨髓留而不去腦為髓海故頭痛齒亦痛謂之厥逆頭痛宜白附子散灸曲鬢穴此穴在耳上將耳掩前正尖上可灸七壯左痛灸左右痛灸右神效麻黃不去節烏頭炮去皮南星炮各半兩白附子炮一兩全蠍炒五枚辰砂研一分麝香研一錢白殭蠶炮一分右為細末酒調一字服訖枕臥少時治偏頭疼方用生蘆蔔汁一蜆殼仰卧注鼻孔中左痛注左右痛注右或兩鼻皆注亦可數十年患皆一注而愈治頭風痛不可忍者出大全良方硝石人中白腦子各等分右研令極細用一字搐入鼻中石南酒出千金方治婦人自少患風頭痛眼眩石南一方用石葦細辛天雄茵芋各二兩防風去蘆薯蕷貫衆蘼蕪各四兩乾薑山茱萸各三兩右㕮咀以酒三斗浸五日初飲二合日三服後稍稍加之龍膽丸出半合方治婦人經脈阻滯忽患頭痛項冷煩渴又心胃躁熱眉骨眼皆癢痛有時生瘡喉中乾燥四肢痛癢括萎根麥門冬龍膽草各三兩大黃二兩杏仁二升土瓜根八兩右為末蜜丸梧桐子大每服十丸酒下三日後漸加之急風散出大全良方治年深日近偏正頭痛又治肝臟久虛血氣衰弱風毒之氣上攻頭眩目暈心忪煩熱百節痠痛腦昏目痛鼻塞身重項背拘急皮膚瘙癢面上遊風狀若蟲行及一切頭風疾治婦人血風攻疰頭目昏痛並皆治之草烏頭三兩一半燒存性於醋內蘸令冷餘一半生用生黑豆二錢同草烏一處為末丹砂一兩研麝香一錢研右為細末研令勻停酒調塗有痛處治女人頭旋名曰心眩非血風也出大全良方以膽礬一兩細研用麵餅劑一箇拌勻放板子上按手一指厚勒如骰子大塊不須界斷於瓦上焙乾每服一骰子大為末煎燈心竹茹湯調下靈砂丹出危氏方治婦人頭痛惡風發熱六脈沈取無根浮取却有乃是虛證用人參一二兩銀銚煎湯空心下二十粒五更又下二十粒天明而愈治婦人一切頭目攻痛用天南星一箇掘地坑子燒令赤於坑中安放南星以醋一盞淬之蓋好不令透氣候冷取出為末每服一字以酒調服重者半錢速效斗門方出危氏方治婦人血風攻腦頭旋悶絶忽死倒地不知人事者用喝起草不以多少取其嫩心陰乾為末以酒服一大盞無時服多連腦蓋通頂門即蒼耳草也治婦人偏頭疼用香附子為末每服三錢臘茶調下食後服日進三五服效甚加味補虛湯出朱氏集驗方治婦人頭痛發熱多汗六脈虛細尺脈或絶作血虛治之服後藥效术附湯加川芎先服十全湯加附子次服又服鹿茸丸內補丸芎藭湯神木散治婦人血風頭痛發作有時不可勝忍方無問老少皆可服之出護命方伏牛花一兩川芎防風各一分甘草三銖右為細末每服二錢不拘時白湯調下風瘙病丙穩禾疹附論夫婦人體虛受風邪氣客於皮膚復逢風寒相折則起風瘙癮疹若赤疹者由涼濕折于肌中極熱故成赤疹也得天熱則劇取冷則瘥白疹者由風氣折於肌中邪熱與風相搏所以為白疹也得天陰雨冷則劇出風中亦劇得晴暖則減著衣暖亦瘥也脈洪而浮浮即為風洪即為氣風氣相搏則生癮疹身體瘙癢凡人汗出不可露臥及浴素問云汗出見濕方生疹痱使人身振寒熱生風疹也凡治婦人時發遍身瘙癢赤腫癮疹五心煩熱血風攻疰與人參荆芥散消風散四物湯加荆芥煎或人參當歸散或逍遙散兼服導赤丸如不通者食後服皂角丸氣虛老人不可久服如服皂角丸不退者此凝滯熱甚者宜先服青木香丸二三服以開氣道却服前藥立效也方蒴藋膏治婦人風瘙身癢生病丙穩禾疹久不瘥蒴藋根三兩白蒺藜獨活生附子去皮臍防風犀角屑漏蘆香白芷苦參白及川升麻漢防己枳實茺蔚子莽草蛇銜草各一兩川椒木香各半兩右細銼以醋浸一宿明旦用鐺中入煉成豬膏三斤內藥於炭火上慢熬候白芷色黃赤膏成去滓入瓷器中盛取塗摩之日可搽上三次或五次效蒺藜散治婦人風瘙皮膚中如蟲行及生癮疹搔之作瘡面腫心煩之疾白蒺藜炒去刺羚羊角屑各三分黃芩細辛人參去蘆苦參蛇床子秦芁防風去蘆麻黃去節當歸炒甘草炙枳殼麩炒各半兩莽草炙二分右㕮咀每服三錢水一鍾半煎至七分去滓不拘時服莽草散治婦人風瘙癮疹遍身瘙癢狀如蟲行或發或歇莽草一兩麻黃去節沙參去蘆白蒺藜炒去刺天門冬去心各三兩獨活黃耆炙凌霄花防風去蘆芎藭犀角屑甘草炙各半兩右㕮咀每服三錢水一鍾半煎至七分去滓不拘時溫服烏蛇丸治婦人風瘙發則至頭面皮膚生癮疹搔之成瘡烏蛇肉酒拌炒黃白蒺藜炒去刺苦參各一兩半沙參去蘆秦芁獨活莽草蛇床子白鮮皮川大黃酒炒枳實麩炒各一兩天門冬一兩半去心焙右為細末煉蜜和丸搗二三百杵丸如梧桐子大每服三十丸荆芥湯下不拘時服莽草膏治婦人風瘙遍身生病丙穩禾疹癢搔之隨手腫起莽草三分苦參當歸芎藭大戟細辛芫花川椒附子躑躅花景天蒴藋根各一兩右細銼用煉成豬膏二斤入藥煎附子黃赤色膏成去滓傾入瓷合中盛塗瘡上日二三次淋蘸方治婦人風瘙癮疹身癢不止馬藺蒴藋根茺蔚子白礬羊桃根白蒺藜茵芋凌霄花各二兩萞麻葉一兩右㕮咀以水二斗煮取一斗去滓於避風處蒸洗之又方蛇床子景天蒺藜子各半斤右用水一斗煮取五升去滓綿漬拭之日四五度瘥又方凌霄花三兩蒴藋根半斤右用水七升煮取三升濾去滓入白礬末二兩攪勻以綿漬頻拭于疹上後煮槐栁湯浴之又方用景天搗碎絞汁塗之又方用醋漿水磨白礬塗之治病丙穩禾疹用白蜜不以多少好酒調下已試有效治皮膚有風熱遍身病丙穩禾疹方牛蒡子水煮一兩晒乾炒香浮萍蒸過焙乾各等分右為細末每服二錢薄荷湯調下二服每日服治婦人風毒瘙癢病丙穩禾疹用蒼耳子花葉皆可為末豆淋酒服二錢即愈一方治風氣入皮膚瘙癢用蜂房炙過及蟬退等分為末酒調下半錢蒼耳子丸治婦人風瘙皮膚生病丙穩禾疹癢痛或有細瘡者蒼耳子三兩苦參二兩白蒺藜三兩炒去刺蟬退一兩炒右為末煉蜜為丸如梧桐子大每服二十丸溫酒送下不拘時治風瘙病丙穩禾疹用燕窠內土為末水調傅之風瘙癢附論夫婦人風瘙癢者由體虛受風邪故也風入腠理與血氣相搏而俱往來在於皮膚之間邪氣微不能為痛但瘙癢也方皂角刺散治婦人血風皮膚瘙癢不止皂角刺炙黃烏喙炮裂去皮臍茵芋秦芁蛇床子天麻獨活白蒺藜去刺景天花麻黃去節莽草炙槐子仁炒躑躅花酒炒楓香枳殼麩炒各三分白花蛇肉二兩酒浸炙黃麝香二分細研右為末每服一錢荆芥酒調服不拘時候烏蛇散治婦人血風瘙癢烏蛇二兩酒