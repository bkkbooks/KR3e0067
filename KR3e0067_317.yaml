body:
  text: 普濟方卷三百十七明周王朱橚撰婦人諸疾門風痺手足不隨附論夫婦人風痺者由風寒濕三氣合而為痺風多者為風痺其狀肌膚盡痛諸陽之經皆起於手足而循行於身體風寒之氣客於肌膚始為痺復伏陽經隨其虚處而停滯與血氣相搏血氣行則遲緩使機關弛縱故風痺而復手足不隨也夫婦人臂痛筋脈攣急不得伸屈遇寒則劇由肝虚為風寒邪氣流於血脈客於經絡搏於筋筋不榮則乾急而痛其脈𦂳細宜服柏子仁丸舒經湯若臂痛不能舉或左或右時復轉移一臂由中脘伏痰脾氣滯而不行上與氣相搏四肢皆屬於脾脾氣滯而不下攻於臂故痛其脈沈細宜服茯苓丸控涎丹方萆薢散出聖恵方治婦人風痺手足不仁腰膝疼痛筋脈攣急萆薢天麻烏蛇肉酒拌炒黄虎脛骨酥炙黄各一兩防風去蘆當歸微炒獨活芎藭麻黄去根節天雄炮裂去皮臍牛膝去苗蒼耳子杜仲去皮微炙薏苡仁酸棗仁各三分五加皮川烏炮裂去皮臍各半兩仙靈脾三分右為細末每服一錢食前豆淋酒調服烏蛇散出聖恵方治婦人風痺手足頑麻筋脈抽搐口眼不正言語蹇澀烏蛇肉酒拌炒黄天南星炮天雄炮裂去皮臍土蜂兒㣲炒赤箭麻黄去根節薏苡仁芎藭各一兩乾蠍炒桑螵蛸㣲炒羚羊角屑桂心硃砂細研水飛過各半兩酸棗仁柏子仁當歸微炒各三分麝香細研一分右為細末入研過藥令勻每服一錢食前温酒調服三痺湯出大全良方治血氣凝滯手足拘攣風痺氣痺皆療川續斷杜仲去皮薑汁炒防風桂心華陰細辛人參白茯苓當歸白芍藥甘草各一兩秦芁生地黄川芎川獨活各半兩黄耆川牛膝各一兩右㕮咀每服五錢水二鍾薑三片棗一枚煎至一鍾去滓熱服無時但腹稍空心服之有人病左臂不隨後已痊平而手指不便無力諸藥不効服之即安獨活散出聖恵方治婦人風痺手足不隨身體疼痛言語蹇澀筋脈攣急獨活桑寄生牛膝去苗秦芁去苗赤茯苓桂心防風去蘆附子炮裂去皮臍當歸㣲炒生乾地黄各一兩杜仲去麄皮炒㣲黄細辛芎藭赤芍藥甘草半兩炙微赤右為散每服四錢水二鍾煎七分去滓不拘時温服牛膝丸出聖恵方治婦人中風手足頑痺不隨骨節疼痛筋脈拘急行履稍難牛膝去苗威靈仙虎脛骨酥炙黄各一兩半當歸微炒防風赤箭天雄炮裂去皮丹參五加皮杜仲桂心石斛仙靈脾道人頭川烏頭炮裂去皮臍各一兩右為細末煉蜜和丸如梧桐子大每服十五丸加至二十丸食前温酒送下烏頭丸出聖恵方治婦人風痺手足不隨關節沈重行動無力川烏頭炮裂去皮臍天南星炮裂白殭蠶㣲炒仙靈脾防風去蘆海桐皮赤箭去苗牛膝去苗天雄各一兩烏蛇肉一兩酒拌炒黄石楠葉柏子仁萆薢茵芋各三分剉法同前獨活湯出大全良方治風虚昏憒不自覺手足棄縱坐臥不能或發寒熱血虚不能服發汗藥及中風自汗尤宜服之川獨活羌活人參防風當歸細辛茯神去木半夏桂心白微逺志去心菖蒲去毛川芎各半兩甘草三分右㕮咀每服五錢水一鍾半薑五片煎七分去滓不拘時温服川烏頭散出聖恵方治婦人風痺疼痛四肢不隨川烏頭炮裂去皮臍甘草炙細辛川椒去目并閉口者㣲炒去汗赤茯苓各半兩乾薑炮防風去蘆當歸微炒各一兩秦芁去苗附子炮裂去皮臍桂心赤芍藥牛膝去苗各一兩半獨活二兩右為散每服三錢水一鍾半入棗三枚煎至七分去滓不拘時候温服狗脊浸酒出聖恵方治婦人風痺手足不隨肢節急强狗脊去毛當歸㣲炒芎藭桂心防風去蘆萆薢仙靈脾各二兩牛膝去苗五兩丹參三兩天蓼木半兩川椒去目并閉口者㣲炒出汗右細剉用生絹袋盛以好酒二斗五升浸經七日每服温飲下一小盞常令有酒氣每取一升即添酒一升至五斗即住羌活散出聖恵方治婦人風痺手足不隨筋脈拘急不能行動羌活牛膝當歸㣲炒防風去蘆赤芍藥各一兩五錢附子炮裂去皮臍桂心五加皮甘草炙各一兩薏苡仁三兩右為散每服四錢水一鍾半生薑半分煎至七分去滓不拘時温服五加皮散出聖恵方治婦人風痺手足不隨行立無力五加皮萆薢海桐皮各一兩虎脛骨酥炙黄一兩五錢牛膝防風去蘆薏苡仁䑕粘子仙靈脾當歸微炒續斷附子炮裂去皮臍杜仲去麄皮微炒熟乾地黄各一兩右為細末每服二錢食前温酒調下舒筋湯出大全良方治臂痛又名五痺湯亦治腰下疾片子薑黄四兩甘草羌活各一兩白术海桐皮當歸赤芍藥各二兩右㕮咀為末每服三錢水一盞半煎至七分去滓温服如疾在腰以下空心服腰以上之疾食後服附子丸出聖恵方治婦人風痺手足不隨附子炮裂去皮臍天麻牛膝去苗仙靈脾川烏頭炮裂去皮臍防風去蘆各一兩虎脛骨二兩酥炙黄右為細末以酒煮麩糊和丸如梧桐子大每服十丸温酒送下仙靈脾浸酒出聖恵方治婦人風痺手足不隨仙靈脾牛膝去蘆附子炮裂去皮臍杜仲去皮炙各二兩右㕮咀用生絹袋盛將好酒一斗五升浸經七日每次服一小盞通靈丸出大全良方治婦人男子手足痛風目忽眩者白附子殭蠶炒去絲各一兩全蠍半兩炒麝香一字右為末煉蜜丸如梧桐子大每服七丸温酒下一日三次服天麻酒出十便良方治婦人風痺手足不隨天麻牛膝附子杜仲各二兩右件藥細剉以生絹袋盛用好酒一斗五升浸經七日每服一小盞風眩頭痛附論夫婦人風眩是體虚受風風入扵腦也諸臓腑之精皆上注於目其血氣與脈併上屬扵腦循脈引於目系目系急故令眩也其眩不止風邪甚者變為癲疾也凡婦人患頭風者十居其半每發必掉眩如住車上盖因血虚肝有風邪襲之爾素問云狥䝉招尤目冥耳聾上虚下實過在足少陽厥陰甚則歸肝盖謂此也又云一婦人年四十餘病額角上耳上痛俗呌為偏頭痛如此五七年每痛大便燥結如彈丸兩目赤眩暈昏澀不能逺視世之所謂頭風藥餅子風藥白龍丸芎犀丸之類連進數服其偏雖稍愈則大便稍秘兩目轉昏澀其頭上用艾灸數年矣連年著灸其兩目且将失明由病而無子一日問戴人戴人診其兩手脈急數而有力風熱之甚也余諳此四十五年矣遍察病目者不問男子婦人必偏正頭痛必大便澀滯結硬此無他頭痛或額角痛是三焦相火之經及陽明燥金勝也燥金勝乗肝則腑氣鬱肝血氣壅血氣壅則上下不通故燥結於裏尋至失明治以大承氣湯冷河水煎二兩加芒硝一兩煎令温合作三五服連服盡盪滌腸中垢滯結燥積熱下利如湯二十餘行次服宜神功丸潤之菠羮葵菜猪羊血為羮以滑之後五七日十日但遇天道晴明以大承氣夜進一劑是痛隨利减也三劑之外目豁首輕燥澤結釋得三子而終又云凡婦人頭風眩暈登車乗船眩運眼澀手麻髮脱健忘善怒皆胷中宿痰所致可用𤓰蒂散吐之次以長流水煎五苓散大人參半夏丸凡頭痛發熱多汗六脈虚細尺脈或絶作血虚治之先服术附湯加川芎次服十全大補湯加附子又服萬安丸神水散内補丸芎藭湯若因被風吹頭目昏眩太陽并腦俱痛項背拘急可與蠍附散都梁丸治項筋强痛不可轉側者以木𤓰煎主之方旋覆花散出聖恵方治婦人風眩頭痛痰壅煩悶不下飲食旋覆花白芷芎藭藁本蔓荆子各半兩赤茯苓一兩防風半兩去蘆枳殻半兩麩炒獨活細辛羌活各半兩石膏二兩半夏半兩湯泡七次前胡一兩去蘆杜仲三分羚羊角屑三分甘草半兩炙甘菊花半兩右㕮咀每服三錢水一鍾半生薑半分薄荷七葉煎至七分去滓不拘時温服紫石英柏子仁丸出千金方治女子遇冬天時行温風至春夏病熱頭疼熱毒風虚百脈沈重帶下赤白不思飲食而頭眩心悸酸嘶恍惚不起紫石英柏子仁烏頭桂心當歸山茱萸澤瀉芎藭石斛逺志寄生肉蓯蓉乾薑甘草各二兩蜀椒杜蘅一名杜仲辛夷各一兩細辛一兩半右為細末煉蜜和丸如梧桐子大一服二十丸酒下日進三服一方加牡蠣一兩蔓荆子散出聖恵方治婦人風眩頭目昏悶煩疼言語蹇澀痰逆不下飲食蔓荆子防風羌活川芎羚羊角屑枳殻前胡石膏赤茯苓麻黄荆芥穂各三兩北細辛甘菊花白芷藁本甘草旋覆花各半兩右為粗散每服四錢薑三片水一鍾半煎至七分去滓不拘時服羚羊角散出聖恵方治婦人風眩頭疼四肢煩熱疼痛痰逆不思飲食羚羊角屑半兩人參三分去蘆茯苓三分半夏半兩湯泡七次防風半兩去蘆犀角屑半兩赤箭一兩枳殻半兩麩炒黄蔓荆子半兩石膏二兩芎藭三分杜仲三分細辛半兩前胡一兩去蘆甘草半兩炙右為麄末每服三錢水一鍾半生薑半分煎至七分去滓不拘時服石膏散出聖恵方治婦人風眩頭疼心神悶亂肩背四肢煩疼不欲飲食石膏一兩羌活三兩防風半兩去蘆桑白皮三分赤茯苓三分枳殻三分麩炒赤芍藥三分芎藭黄芩三分當歸三分炒甘菊花半兩柴胡一兩去苗羚羊角屑半兩酸棗仁半兩炒甘草半兩炙右為麄散每服四錢水一鍾半薑半分煎至七分去滓不拘時服天雄散出聖恵方治婦人風眩頭疼心神昏悶四肢緩弱天雄一兩炮裂去皮臍防風一兩去蘆山茱萸一兩薯蕷一兩人參一兩去蘆白术一兩芎藭一兩獨活一兩桂心一兩葛根一兩逺志一兩去心莽草一兩石膏二兩甘菊花三分茯神一兩去木右為散每服四錢水酒各一鍾半煎至七分去滓不拘時温服追風散出大全良方治年深日近偏正頭痛又治肝臓乆虚血氣衰弱風毒之氣上攻頭眩目暈心忪煩熱百節疼痛腦昏目痛鼻塞身重項背拘急皮膚瘙癢面上遊風狀若蟲行及一切頭風兼療婦人血風攻疰頭目昏痛並皆治之川烏炮去皮臍防風去蘆石膏煆川芎甘草炙荆芥穂白殭蠶炒去絲各一兩天南星炮羌活天麻地龍白附子炮全蠍去尾針白芷各半兩草烏炮去皮臍尖沒藥研乳香研雄黄研各一分右為細末每服半錢入好茶少許同調食後及卧間服常服清頭目利咽膈消風化痰牡丹皮湯出聖濟總録治婦人血風攻頭目不利不思飲食手足煩熱肢節拘急疼痛胷膈不利大腸不調陰陽相干心下忪悸或時旋運牡丹皮一兩桂心去麄皮半兩橘皮三兩焙延胡索半兩芎藭一兩木香三分白术甘草芍藥各二兩三稜煨乾薑炮各半兩訶梨勒三分半夏湯泡七次薑汁製炒半兩右㕮咀每服四錢水一鍾半煎至六分不拘時温服蠍附散出大全良方治一切風邪頭痛夾腦風痰涎壅盛嘔逆惡心口吐清水暗風旋暈眼見黑花牙關𦂳急口眼喎斜面目瞤動頭項拘急肩背引疼耳痒目昏四肢麻木及沐浴出暴感風邪頭目昏痛兩太陽穴疼逺年頭風經乆嵗月乍瘥乍發並皆治之附子炮去皮臍川烏炮去皮尖麻黄去節殭蠶炒南星防風去蘆各二錢雄黄水飛硃砂水飛全蠍各半錢白芷藁本各半兩右為細末每服半錢葱茶調下食後服孕婦不可服兼嚼如聖餅子治眼生眵糞䀮䀮不明見日多淚視物不清一方有川芎細辛旋覆花乳香麝香亦妙都梁丸出大全良方治偏正頭風一切頭疼之症用香白芷揀大塊白色者先刷去塵土用沸湯泡洗至四五次為細末煉蜜丸如彈子大一服一丸多用荆芥㸃臈茶細嚼食後服只乾嚼亦可都無忌此藥大治諸風眩暈婦人産前産後乍傷風邪頭目昏重及血風頭疼服之令人目明凡沐浴後服一二粒尤佳暴寒乍暖神思不清傷寒頭目昏暈並宜服之木𤓰煎出大全良方治頭項強痛不可轉側宣木𤓰二枚切頂作盖刳去瓤沒藥二兩另研乳香二錢半另研右将藥入木𤓰内用原盖子合了竹簽定之飯上蒸三四次爛研成膏子每服三匙生地黄汁半盞無灰酒二盞和之用八分盞熱膏子不拘時服有人患此病自午後發黄昏時定予曰此患必先從足起經言十二經絡各有筋惟足下少陰之筋自足至頭大抵筋者肝之合也日中至黄昏天之陽陽中之陰也又曰陽中之陰肺也自離至兊陰旺陽弱之時故靈寶祕法云離至乾腎氣絶而肝氣弱肝腎二臓受陰氣故發於是時予授此方三服而愈芎羌散治婦人血風頭痛心膈壅滯少思飲食川芎一兩赤茯苓去皮赤芍藥酸棗仁炒桂心當歸去蘆木香牛膝酒浸各七錢半羌活去蘆枳殻去瓤麩炒甘草各半兩炙右㕮咀每服三錢水一大盞半薑五片煎至一大盞去滓熱服不拘時候茯神散治婦人血風五臓大虚驚悸安神定志茯神去木人參去蘆龍齒另研獨活去蘆酸棗仁微炒各一兩防風去蘆逺志去心桂心細辛去苗白术各七錢半甘草炙乾薑炮各半兩右㕮咀每服五錢水一中盞半煎至一大盞去滓温服不拘時候鈎藤散治肝厥頭暈清頭目鈎藤陳皮去白半夏湯洗七次切片子麥門冬去心茯苓去皮茯神去木人參去蘆甘菊花防風去蘆各半兩甘草炙二錢半石膏二兩右㕮咀每服四錢水一盞半生薑七片煎至一盞去滓熱服日進二服獨活散治婦人風眩頭疼嘔逆身體時痛情思昏悶獨活一兩白术去蘆防風去蘆細辛去苗人參芎藭荆芥各七錢半半夏湯泡七次切片子炙甘草赤芍藥各半兩石膏二兩右㕮咀每服八錢水一中盞半生薑七片薄荷七葉煎至一大盞去滓温服不拘時金烏散出聖恵方治婦人風眩頭旋卒倒痰涎壅滯四肢拘急烏鵶一隻去嘴足狐肝一具已上入罐子内細泥固劑候乾燒令赤抽火以土䕶定罐子冷取出搗為末入後藥同研用天麻半兩白附子半兩炮裂白殭蠶半兩炒桑螵蛸半兩炒甘菊花天南星半兩炮麝香一分研細右為細末前燒了藥末及麝香研令勻每服一錢以豆淋薄荷酒調服不拘時候又方出聖恵方天雄三分炮裂去皮臍蔓荆子三分甘菊花半兩山茱萸一兩薯蕷一兩半右為細末每服一錢温酒調不拘時服又方出聖恵方槐子一兩炒牛蒡子一兩炒右為細末每服一錢食前温酒調下牡丹皮湯出聖濟總録治婦人血風攻頭目疼痛口苦舌乾或發熱牡丹皮赤芍藥防風去蘆甘菊花各二兩芎藭羌活去蘆各半兩半夏湯泡七次薑汁製炙甘草炙各一兩右㕮咀每服三錢水一鍾半薑三片薄荷三葉煎至七分去滓温服玉餅子治婦人頭風惡寒風冷昏悶嘔逆川烏炮乾薑炮天南星炮各半兩川芎甘草炒防風各一兩天麻半夏薑製各一錢右為細末蒸餅和丸如彈子大捻作餅子每服一丸荆芥穂同嚼茶送下細辛散出聖恵方治婦人風眩頭疼目被風牽引偏視不明細辛三分秦芁一兩去苗獨活一兩桂心一兩山茱萸一兩天雄一兩炮裂去皮臍薯蕷一兩右為細末每服一錢不拘時温酒調服七生丸出大全良方治男子婦人八般頭風及一切頭痛痰厥腎厥飲厥傷寒傷風頭痛不可忍者並皆主之川烏甘草南星炮半夏冷水洗去滑川芎石膏白芷並生用各等分右為細末研韭菜自然汁丸如梧桐子一服七丸加至十丸嚼生葱茶送下芎辛湯出大全良方治狀如前症但發熱者不可服生附子生烏頭去皮尖南星乾薑炮北細辛川芎各一兩甘草三兩右㕮咀每服四錢水二鍾薑七片芽茶少許煎至七分去滓食前温服中脘素有寒者不用芽茶川芎散出十便良方治風眩頭暈小川芎山藥白茯神甘菊花野菊不用人參各半兩山茱萸肉右為細末無時候温酒調二錢日進三服當歸川芎散出宣明論治風壅頭目昏眩痛悶筋脈拘攣肢體冷痺保䕶胎氣調和榮衛當歸川芎甘草二兩黄芩四兩薄荷一兩縮砂仁一分右為末温水調下一錢漸加至二錢食後日進三服養正丹出大全良方治婦人虚風頭旋吐涎不能已此藥升降陰陽補接真氣非止頭旋而已黒鉛水銀硫黄研硃砂研各一兩右用建盞一隻火上鎔鉛成汁次下水銀用栁杖子打停取下歇少時入二味攪停候冷取下研為粉以糯米軟飯丸如菉豆大每服三十丸棗湯吞下空心食前日二服四神散出大全良方治婦人血氣眩暈頭痛菊花當歸旋覆花荆芥穂各等分右為末每服一錢水一鍾半葱白三寸茶末一錢煎至七分通口調服良乆去枕仰臥少時甘菊花飲子出聖恵方治婦人頭痛目眩心神煩渴甘菊花一兩石膏一兩捶碎葛根三兩剉薄荷一握切生薑一分拍碎葱白一握切䜴一合右以水二大盞煎至一盞去滓不拘時候温三服玉真丸出大全良方治頭痛筋攣骨重少氣噦噫腹滿時驚不嗜臥欬嗽煩躁其脈舉之則弦按之如石堅由腎氣不足而内著其氣逆而上行謂之腎厥頭痛服此併硫黄丸局方内如聖餅子加北細辛同半夏等分合服之見効甚石膏一兩煅半夏一兩洗為末硫黄硝石一分並碎右研令勻生薑自然汁打糊為丸如梧桐子大生薑湯送下三十丸一方無半夏用南星硫黄丸出大全良方治頭痛不可忍或頭風年深暴患無所不治服此除根硝石一兩硫黄二兩右研令極細滴水丸如指頭大空心臈茶清嚼下中暑以氷水服之下咽即洒然治傷冷艾湯送下白附子散出大全良方治頭痛連齒時發時止連年不已此由風寒中於骨髓留而不去腦為髓海故頭痛齒亦痛謂之厥逆頭痛宜白附子散灸曲鬢穴此穴在耳上將耳掩前正尖上可灸七壮左痛灸左右痛灸右神効麻黄不去節烏頭炮去皮南星炮各半兩白附子炮一兩全蠍炒五枚辰砂研一分麝香研一錢白殭蠶炮一分右為細末酒調一字服訖枕臥少時治偏頭疼方用生蘆菔汁一蜆殻仰卧注鼻孔中左痛注左右痛注右或兩鼻皆注亦可數十年患皆一注而愈治頭風痛不可忍者出大全良方硝石人中白腦子各等分右研令極細用一字搐入鼻中石南酒出千金方治婦人自少患風頭痛眼眩石南一方用石葦細辛天雄茵芋各二兩防風去蘆薯蕷貫衆蘼蕪各四兩乾薑山茱萸各三兩右㕮咀以酒三斗浸五日初飲二合日三服後稍稍加之龍膽丸出半合方治婦人經脈阻滯忽患頭痛項冷煩渴又心胃躁熱眉骨眼皆癢痛有時生瘡喉中乾燥四肢痛癢括萎根麥門冬龍膽草各三兩大黃二兩杏仁二升土𤓰根八兩右為末蜜丸梧桐子大每服十丸酒下三日後漸加之急風散出大全良方治年深日近偏正頭痛又治肝臓久虛血氣衰弱風毒之氣上攻頭眩目暈心忪煩熱百節痠痛腦昏目痛鼻塞身重項背拘急皮膚瘙癢面上遊風狀若蟲行及一切頭風疾治婦人血風攻疰頭目昏痛並皆治之草烏頭三兩一半燒存性於醋内蘸令冷餘一半生用生黒豆二錢同草烏一處為末丹砂一兩研麝香一錢研右為細末研令勻停酒調塗有痛處治女人頭旋名曰心眩非血風也出大全良方以膽礬一兩細研用麪餅劑一箇拌勻放板子上按手一指厚勒如骰子大塊不須界㫁於瓦上焙乾每服一骰子大為末煎燈心竹茹湯調下靈砂丹出危氏方治婦人頭痛惡風發熱六脈沈取無根浮取却有乃是虚證用人參一二兩銀銚煎湯空心下二十粒五更又下二十粒天明而愈治婦人一切頭目攻痛用天南星一箇掘地坑子燒令赤於坑中安放南星以醋一盞淬之盖好不令透氣候冷取出為末每服一字以酒調服重者半錢速効斗門方出危氏方治婦人血風攻腦頭旋悶絶忽死倒地不知人事者用喝起草不以多少取其嫩心陰乾為末以酒服一大盞無時服多連腦盖通頂門即蒼耳草也治婦人偏頭疼用香附子為末每服三錢臈茶調下食後服日進三五服効甚加味補虚湯出朱氏集驗方治婦人頭痛發熱多汗六脈虚細尺脈或絶作血虚治之服後藥効术附湯加川芎先服十全湯加附子次服又服鹿茸丸内補丸芎藭湯神木散治婦人血風頭痛發作有時不可勝忍方無問老少皆可服之出䕶命方伏牛花一兩川芎防風各一分甘草三銖右為細末每服二錢不拘時白湯調下風瘙病丙穩禾疹附論夫婦人體虚受風邪氣客於皮膚復逢風寒相折則起風瘙癮疹若赤疹者由凉濕折扵肌中極熱故成赤疹也得天熱則劇取冷則瘥白疹者由風氣折於肌中邪熱與風相搏所以為白疹也得天陰雨冷則劇出風中亦劇得晴暖則减著衣暖亦瘥也脈洪而浮浮即為風洪即為氣風氣相搏則生癮疹身體瘙癢凡人汗出不可露臥及浴素問云汗出見濕方生疹疿使人身振寒熱生風疹也凢治婦人時發遍身瘙癢赤腫癮疹五心煩熱血風攻疰與人參荆芥散消風散四物湯加荆芥煎或人參當歸散或逍遙散兼服導赤丸如不通者食後服皂角丸氣虛老人不可乆服如服皂角丸不退者此凝滯熱甚者宜先服青木香丸二三服以開氣道却服前藥立効也方蒴藋膏治婦人風瘙身癢生病丙穩禾疹乆不瘥蒴藋根三兩白蒺藜獨活生附子去皮臍防風犀角屑漏蘆香白芷苦參白及川升麻漢防己枳實茺蔚子莽草蛇銜草各一兩川椒木香各半兩右細剉以醋浸一宿明旦用鐺中入煉成猪膏三斤内藥於炭火上慢熬候白芷色黄赤膏成去滓入瓷器中盛取塗摩之日可搽上三次或五次効蒺藜散治婦人風瘙皮膚中如蟲行及生癮疹搔之作瘡面腫心煩之疾白蒺藜炒去刺羚羊角屑各三分黄芩細辛人參去蘆苦參蛇床子秦芁防風去蘆麻黄去節當歸炒甘草炙枳殻麩炒各半兩莽草炙二分右㕮咀每服三錢水一鍾半煎至七分去滓不拘時服莽草散治婦人風瘙癮疹徧身瘙癢状如蟲行或發或歇莽草一兩麻黄去節沙參去蘆白蒺藜炒去刺天門冬去心各三兩獨活黄耆炙凌霄花防風去蘆芎藭犀角屑甘草炙各半兩右㕮咀每服三錢水一鍾半煎至七分去滓不拘時温服烏蛇丸治婦人風瘙發則至頭面皮膚生癮疹搔之成瘡烏蛇肉酒拌炒黄白蒺藜炒去刺苦參各一兩半沙參去蘆秦芁獨活莽草蛇床子白鮮皮川大黄酒炒枳實麩炒各一兩天門冬一兩半去心焙右為細末煉蜜和丸搗二三百杵丸如梧桐子大每服三十丸荆芥湯下不拘時服莽草膏治婦人風瘙徧身生病丙穩禾疹癢搔之隨手腫起莽草三分苦參當歸芎藭大㦸細辛芫花川椒附子躑躅花景天蒴藋根各一兩右細剉用煉成猪膏二斤入藥煎附子黄赤色膏成去滓傾入瓷合中盛塗瘡上日二三次淋蘸方治婦人風瘙癮疹身癢不止馬藺蒴藋根茺蔚子白礬羊桃根白蒺藜茵芋凌霄花各二兩萞麻葉一兩右㕮咀以水二斗煮取一斗去滓於避風處蒸洗之又方蛇床子景天蒺藜子各半斤右用水一斗煮取五升去滓綿漬拭之日四五度瘥又方凌霄花三兩蒴藋根半斤右用水七升煮取三升濾去滓入白礬末二兩攪勻以綿漬頻拭扵疹上後煮槐栁湯浴之又方用景天𢷬碎絞汁塗之又方用醋漿水磨白礬塗之治病丙穩禾疹用白蜜不以多少好酒調下已試有効治皮膚有風熱遍身病丙穩禾疹方牛蒡子水煮一兩晒乾炒香浮萍蒸過焙乾各等分右為細末每服二錢薄荷湯調下二服每日服治婦人風毒瘙癢病丙穩禾疹用蒼耳子花葉皆可為末豆淋酒服二錢即愈一方治風氣入皮膚瘙癢用蜂房炙過及蟬退等分為末酒調下半錢蒼耳子丸治婦人風瘙皮膚生病丙穩禾疹癢痛或有細瘡者蒼耳子三兩苦參二兩白蒺藜三兩炒去刺蟬退一兩炒右為末煉蜜為丸如梧桐子大每服二十丸温酒送下不拘時治風瘙病丙穩禾疹用燕窠内土為末水調傅之風瘙癢附論夫婦人風瘙癢者由體虚受風邪故也風入腠理與血氣相搏而俱往來在於皮膚之間邪氣微不能為痛但瘙癢也方皂角刺散治婦人血風皮膚瘙癢不止皂角刺炙黄烏喙炮裂去皮臍茵芋秦芁蛇床子天麻獨活白蒺藜去刺景天花麻黄去節莽草炙槐子仁炒躑躅花酒炒楓香枳殻麩炒各三分白花蛇肉二兩酒浸炙黄麝香二分細研右為末每服一錢荆芥酒調服不拘時候烏蛇散治婦人血風瘙癢烏蛇二兩酒浸去骨酥炙黄獨活蛇床子桂心防風去蘆白蒺藜當歸藁本細辛楓香凌霄花牛蒡子枳殻麩炒莽草各三分乾蠍半兩炒右為細末每服一錢温酒調下不計時候莽草散治婦人血風皮膚瘙癢心胷煩悶莽草一兩羌活羚羊角屑景天白蒺藜炒去刺茺蔚子凌霄花鬼箭羽丹參防風去蘆細辛枳殻麩炒各等分右㕮咀每服三錢水一鍾煎至六分去滓不拘時温服鬼箭羽散治婦人血遊風遍身瘙癢不止鬼箭羽白蒺藜炒去刺麻黄去節各一兩桂心蛇床子甘草炙各半兩赤箭獨活芎藭薏苡仁枳殻麩炒各三分右㕮咀每服三錢水一鍾煎至六分去滓無時温服何首烏散治婦人血風皮膚瘙癢心神煩悶及血遊風不定何首烏防風去蘆白蒺藜炒去刺枳殻麩炒天麻胡麻白殭蠶炒茺蔚子蔓荆子各半兩右㕮咀每服一錢煎茵陳調下不拘時候或作細末服白蒺藜湯洗方治婦人血風瘙癢不可忍者白蒺藜防風道人頭蛇床子卷柏漏蘆黄耆各一兩半羊桃根蒴藋根各三兩右以水一斗煎至五升去滓看冷暖避風處洗之蛇床子湯洗方治婦人血風舉體癢如蟲行皮膚上搔之皮起欲成瘡蛇床子蒺藜子茺蔚子各三兩防風二兩川大黄一兩大㦸白礬各二兩右以水一斗煎至五升次入酒二升更煎十餘沸去滓看冷暖於避風處洗之防風湯治婦人血風皮膚病丙穩禾疹癢痛或有細瘡防風去蘆蒼术苦參蒺藜子炒各二兩枳殻麩炒半兩右為末煉蜜丸如梧桐子大一服二十丸温酒下荆芥茶下亦可不拘時服附子酒治痛風婦人血風身上瘙癢生附一兩一枚皂角刺二十一根右細剉分為二處用好酒二瓶入藥慢火煨乾至半瓶却合作一處蜜縛泥頭經二宿每服一盞温服未効又服一方加黒豆一合治風氣客於皮膚搔之不已方用薄荷蟬退等分為末酒調服如有痰涎加苦參末二兩皂角末二兩治婦人血風生面㿔當歸去蘆防風去蘆大川芎生地黄洗赤芍藥黄耆去根荆芥各等分甘草炙半兩右為細末每服二錢水一鍾煎至七分食後通口服日二服亦名清肺湯治婦人血風遍身瘙癢五心煩躁肢節拘急碎痛口苦咽乾大小腸秘熱出䕶命方牡丹皮去心荆芥穂山梔子防風去蘆麻黄去節升麻黄芩麥門冬去心柴胡貝母去心獨活各二錢右為細末每服二錢食後臨睡滚白湯調下去風血除風瘙出本草用玉柏莖根浸酒服風邪顛狂附論夫婦人顛狂病者由血氣虚受風邪所為也人稟陰陽之氣而生而風邪入并於陰則為顛入并於陽則為狂陰之與陽有虚有實隨其虚時為邪所并則發也顛者卒發意不樂直視仆地吐涎沬口喎目急手足撩戾無所覺知良乆乃甦狂者少臥不飢自髙賢也自辨智也自貴倨也妄笑好歌樂妄行不休故曰顛狂也又素問云陽厥狂怒飲以鐵落狂怒出於肝經肝屬木鐵落金也以金制木之意予曽治一女人眼見鬼物言語失常循衣直視衆醫多用心藥治之無効予投養正丹二貼煎乳香湯送下以三生飲佐之立愈又一男子亦曽病此證亦用此藥收効然養正丹與百一方抱膽丸無異抱膽丸内無硫黄有乳香也内加獨活逺志各半兩妙方安神鎮心琥珀丸出聖恵方治婦人風邪凌心言語不定精神恍惚乃成顛狂發熱無時琥珀細研真珠細研水飛過天竺黄細研鐵粉龍齒細研如粉各一兩牛黄細研半兩光明粉細研三分金箔五十片細研銀箔五十片細研膩粉半兩研入麝香一分細研犀角屑二分露蜂房半兩㣲炙龍膽半兩川升麻半兩天門冬三分去心焙鈎藤三分茯神三分菖蒲三分逺志三分去心麥門冬三分去心焙人參三分去蘆白鮮皮三分黄芩半兩蚱蟬半兩微炒乾蠍半兩微炒甘草半兩炙微赤剉右為細末入研了藥令勻煉蜜搗三五百杵和丸如梧桐子大每服竹葉湯下十五丸虎睛丸出聖恵方治婦人風邪發顛狂及諸癎虎睛一對微炙秦芁半兩去苗龍齒半兩防葵半兩黄芩半兩雄黄半兩細研水飛過漢防己半兩羌活一分川升麻二分寒水石三分茯神半兩逺志三分去心石膏一兩細研鬼箭羽一分天雄半兩炮裂去皮臍蛇蛻皮五寸炒露蜂房一分白鮮皮一分白薇一分貫衆一分麝香一分細研牛黄半兩細研右為細末入研了藥同研令勻煉蜜和搗五七百杵丸如梧桐子大每服二十丸温水下不計時候牛黄散出聖恵方治婦人風邪顛狂發作無時牛黄半兩細研麝香一分細研琥珀二分細研桂心半兩赤箭三分白附子三分炮裂鉛霜二分細研金箔五十片細研銀箔五十片細研朱砂三分水飛人參三分去蘆頭羚羊角屑三分虎頭骨三分煅茯神三分全蠍一兩炒雄黄三分細研羌活三分犀角屑三分右為細末研勻每服一錢不拘時酒調服菖蒲散出聖恵方治婦人風邪恍惚悲啼或狂走不定如有鬼神所著口噤水浆不下面目變色甚者不識人菖蒲一兩九節者秦芁桂心各半兩禹餘粮搗碎人參去蘆頭附子炮裂去皮臍黄芩逺志去心防風去蘆頭各半兩龍骨赤石脂赤茯苓芎藭赤芍藥漢防己各一兩甘草三分炙微赤剉當歸半兩右為散每服三錢以東流木一中盞煎温服効鐵粉丸出聖恵方治婦人風邪顛狂每發狂亂妄語倒錯不識人鐵粉二兩細研蛇蛻皮半兩燒灰鬼督郵二分龍齒寒水石各二兩敗天公一兩燒灰防風一兩去蘆頭沙參半兩去蘆頭羚羊角屑一兩半龍膽二兩蚱蟬一兩㣲炙地骨皮二兩商陸一兩牛黄一分細研石膏二兩細研水飛過黄連去鬚半兩右為細末入研了藥同研令勻煉蜜和搗一千杵丸如梧桐子大每服二十丸煎地骨皮湯下不拘時服防風散出永類鈴方治婦人風邪顛狂或啼泣不止或歌笑無度或言語失常防風茯神獨活人參逺志去心龍齒菖蒲去毛石膏牡蠣煅各一兩秦芁禹餘粮桂心甘草二分蛇蛻一尺炙右為麄末每服三錢水一盞半煎至七分去滓温服羚羊角散羚羊角屑三分菖蒲去毛獨活逺志去心防風各五錢茯神去木石膏麥門冬去心龍齒别研白鮮皮各一兩人參生地黄各三分右為麄咀一服三錢水一盞半煎至七分温服無時虎睛散治婦人風邪顛狂發歇無時跳躑大呌張目揮臂恒欲打人或時大走不避水火虎睛一對新者文火炙黄乾入露蜂房一兩炙石長生一兩楓樹寄三兩茯苓一兩茯神亦可防風一兩去蘆獨活天雄各一兩炮裂去皮臍當歸一兩炒桂心一兩鷄頭一具炙甘草三分炙硃砂半兩細研麝香一分研入鷄肝一具炙右為細末入研了藥令勻每服一錢不拘時温酒調服逺志散治婦人風邪悲思愁憂喜怒無常夢寐不安心神恐懼逺志二分去心白术一兩炒桂心半兩茵芋半兩天雄半兩炮裂去皮臍龍齒半兩菖蒲半兩附子半兩炮裂去皮臍生乾地黄半兩細辛半兩甘草半兩炙栁寄生一兩右為細末每服一錢空心温酒送下珍珠散治婦人風邪神思不安言語失次顛狂如見神鬼珍珠三分研水飛過水精三分研水飛過鉛霜三分研人參一兩去蘆銀箔五十片研茯神一兩去木硃砂一兩研水飛過雄黄半兩研金箔五十片研琥珀三兩研右為細末務要研極細令勻每服五分用薄荷汁調服加味逍遙散治顛疾歌唱無時踰垣上屋乃血迷於心包絡也所致此症右以逺志去心桃仁去皮尖蘇木紅花各一錢水一盞半煎服後病退却用平胃散内减厚朴三分之二加生蒼术二倍川升麻等蒼术一半水一盞半煎至一盞服之全安須常服以絶其根小柴胡湯治血熱顛狂右加生薑生地黄同前日進三服須服百餘服即安凡婦人顛狂即可頓服補心藥多治婦人風邪顛狂大呌奔走用蝦蟇一枚大者去腸中滓令浄并腸胃却内腹中入瓶子中固劑以文火燒通赤入土中埋出火毒隔日取出入麝香一錢同研細新汲水調下一錢一服神効散用伏龍肝研極細每服一錢以東流水調下日進三服効又方治肝邪𫝊心日夜煩躁忽如顛狂常覺不安後主方桔梗貝母去心黄芩獨活麥門冬去心桑寄生沈香茯苓荆芥穂𤣥參硃砂升麻各等分右為細末每服二錢滚白湯調非時服躁時服治肝心受邪日夜煩躁不得眠者酸棗仁茯苓地榆防風各等分右為細末每服三錢以水一盞倉米五十粒米熟去米入藥末冄煎二三沸空心温服血風煩悶附論夫婦人血風煩悶者由臓腑勞傷血氣虚而風邪乗之搏於血使氣不宣而否澀則生於熱或肢節煩疼口乾少卧皆因虚弱而氣血壅滯故煩悶也又云氣憑血運血依氣行二者不可須臾離天和日暖則氣血淖溢天寒日陰則氣血凝沮茍風寒客於血腑則變生諸病盖風善行而數變或為寒熱或為痛疼或為拘攣或為偏枯其候不同當隨症治之方香桂丸出聖濟總録治婦人血風榮衛氣澀經脈不調皮膚不澤肢體煩熱頭目昏眩骨節痠疼桂心去麄皮炙芎藭肉豆蔲去殻人參去蘆赤茯苓木香白芷當歸焙檳榔黄耆山芋澤㵼京三稜炮枳殻麩炒乾漆炒去煙楮實炒牛膝去蘆酒浸焙牡丹皮湯浸橘紅炒獨活各半兩防風去蘆芍藥吳茱萸湯浸炒各三分附子炮裂去皮臍右為末煉蜜和丸梧桐子大每服二十丸食前温酒送下酸棗仁散出聖恵方治婦人血風煩悶四肢疼痛心神多躁飲食减少酸棗仁赤芍藥當歸羚羊角屑赤茯苓紅花子生地黄各三兩防風羌活川牛膝麥門冬桂心川芎地骨皮甘草各半兩右㕮咀每服四錢水一鍾半薑三片薄荷少許煎七分温服朱賁琥珀丸一方作散出大全良方治婦人血風煩悶琥珀研没藥研木香當歸芍藥乾地黄白芷羌活延胡索川芎各半兩土𤓰根牡丹皮白术桂心各一兩右為末一服一錢水一盞煎七分入酒三分冄煎少時熱服重者數服効紫石英散出聖恵方治婦人血風煩悶心神恍惚眠臥不安紫石英一兩茯神麥門冬去心人參去蘆逺志去心酸棗仁炒當歸炒黄芩各三分羚羊角屑防風去蘆黄耆各半兩甘草一分炙右為麄散每服三錢水一鍾生薑半分棗二枚煎至六分去滓不拘時温服蓬香散出和劑方治婦人血風每至天陰即先頭旋眼睛痛頭目昏躁煩悶怔忡手足熱痛飲食减少經水不勻有時腹痛或多便利蓬莪术炮京三稜炮荆芥穂沈香剉厚朴薑汁炙桂心烏藥當歸延胡索天麻附子炮裂去皮臍各一兩右為末每服二錢生薑自然汁合酒調服日三服一方無沈香名莪术散當歸散出聖恵方治婦人血風暴衝心煩悶昏沈不能言語腸内刺痛不可忍當歸三分炒赤芍藥芎藭鬼箭羽木香牛蒡子各一分牡丹皮延胡索桂心桃仁湯泡去皮尖雙仁麩炒黄檳榔各半兩右為散每服三錢水一鍾生薑半錢煎至六分去滓不拘時温服羚羊角散出聖恵方治婦人血風氣攻心煩悶頭目昏重羚羊角燒灰鯉魚鱗紅藍花蒲黄荷葉亂髮桂心木香各半兩麝香一錢研右為末入諸藥同研令細每服一錢生薑童便調不拘時服當歸散出永類鈐方治婦人血風潮熱當歸二兩芍藥延胡索不灰木熟地黄各一兩大黄三分蒸桂心半兩甘草一分右為散每一服二錢水一盞胭脂一小角子煎至六分去滓服如躁時放冷服細呷清者黄連地黄湯出㧞萃方治婦人血風症因大脫血崩漏或前後血因而枯燥其熱不除循衣撮空摸床閉目不省擲手揚視揺動不寧錯語失神脈弦浮而虚内燥熱之極也氣麄鼻乾而不潤上下通燥而難治川芎生地黄當歸各七錢赤芍藥梔子黄芩黄連各三錢防風一兩右為散每服三錢水二盞煎至八分去滓無時徐徐服之若脈實者加大黄下之大承氣湯氣藥也自外而内者用之生地黄連湯血藥也自内而外者用之氣血合病循衣撮空證同自氣而之血血而復之氣大承氣湯下之自血而之氣氣而復之血生地黄連湯主之也二者俱當審用大黄散出聖恵方治婦人血風氣衝心煩悶腸疼痛川大黄煨赤芍藥牡丹皮薑黄當歸炒羚羊角屑各半兩蒲黄一兩薄荷三片一方用荷葉右為散每服三錢水一盞煎至七分不拘時温服犀角散出聖恵方治婦人血風心神煩悶坐臥不安犀角屑一兩白殭蠶半兩炒地龍半兩炒人中白一分麝香一錢細研天竺黄半兩研右為末同研勻用生地黄汁二合蜜一茶匙調下一錢不拘時服逍遙散出聖濟總録治婦人血風氣煩躁口乾欬嗽四肢無力多臥少起肌骨蒸熱百節疼痛柴胡去苗白茯苓赤芍藥白术麩炒當歸炒各三兩右㕮咀每服二錢水二鍾薑三片棗一枚大甘草一寸同煎七分去滓不拘時服赤芍藥散出王氏博濟方治婦人氣血不和心胷煩悶不思飲食四肢少力頭目昏眩身體疼痛風邪乗之以生熱牡丹皮白茯苓赤芍藥白芷甘草各一兩柴胡一兩半右㕮咀每服二錢水一鍾生薑三片棗一枚煎至七分食後温服羚羊角散出聖恵方治婦人血風上攻心神煩悶羚羊角屑二兩燒灰亂髮半兩燒灰硃砂半兩細研麝香一錢細研右同研令極細每服一錢以苦竹瀝調服不拘時赤馬蹄散出聖恵方治婦人血風心神煩悶赤馬蹄屑炒令焦黄白殭蠶炒羚羊角屑各三錢麝香一錢研細右為細末入麝香同研令勻每服一錢不拘時温酒調服一方治婦人血風氣衝心煩悶腹痛生薑汁半合生地黄汁二合鷄子白一枚赤馬糞酒調絞汁二合右相和攪令勻暖令温分為二服不拘時服治少女血熱風毒四肢皮膚生癮疹并行經脈方本草一方治婦人方見本門月水不通類即紫葳散治煩悶腹痛血不盡用鹿角燒灰研末豆䜴汁服方寸七日二服漸加至三錢匕治一切血風出本草以陀羅花煎酒服治血風心煩渾身麻癢搔抓不已成風疹端午日取浮萍草瓦上焙乾為末每服二錢酒調服普濟方卷三百十七
