小兒胃中熱日漸肌痩梔子仁甘草炙剉黄連去鬚黄芩半兩右為散每服一錢水一小盞煎至五分去滓量兒大小以意加减竹茹湯治胃中熱嘔若汗青竹茹弹子大半夏三个湯泡七次粳米四十粒乾葛右㕮咀一服生薑三片水一盞煎至半盞去滓量兒大小以意加减與服大黄散治小兒胃中熱日漸痩甘草半兩炙川大黄半兩炙苽蔞三分右為散每服一錢水一小盞煎五分温服量大小以意加减骨熱附論夫水為隂骨熱火為陽火精骨熱氣也火者陽氣也小兒精氣和盛體性多熱若表裏傷原過熱食物或患時氣大病之後重亡津液陽氣偏盛水不濟火腑臓積熱熏灼肌體甚則消鑠骨髓是為骨熱之病乆不巳變成骨蒸凡小兒一歳至十歳衣服皆不得着新綿又得冬天以火烘炙衣服與者亦令兒體熱勿食桃杏令兒體熱因傷寒病後未滿百日勿食羊肉狗肉令兒體熱或作骨蒸也方龍胆丸治小兒骨熱生風龍胆一兩熊胆研一分馬牙硝研山梔子去皮朴硝研𤣥參人參枳殻去瓤炒陳橘皮去白焙各半兩柴胡去苖當歸切各半兩焙赤茯苓去黒皮一兩甘草炙剉一兩麝香研半錢沉香半兩右除研外搗羅為末共研勻煉蜜為丸如梧桐子大一嵗一丸温水化下生犀散治骨熱蒸肌痩頰赤口乾日晚潮熱夜有盗汗五心煩躁大病瘥後餘毒不觧犀角地骨皮秦芁麥門冬去心枳殻煨大黄煨柴胡茯苓赤芍藥桑皮黄耆人參鼈甲醋炙一錢知母各等分有痰加半夏右剉散每服二錢水一盞陳青蒿少許煎温服加桃枝三寸亦可疳病熱似骨蒸有及乆病後或虛熱時復來瘧疾亦用胡蜣蜋散治小兒骨熱黄痩不食多卧胡蜣蜋兩个去趐足㣲炒赤芍藥七分柴胡半兩去苗川大黄一分研赤茯苓鼈甲一分塗醋炙令黄去裙襴研用細枳殻一个麩炒㣲黄去瓤紫苑一个洗去土苗甘草一分炙㣲剉蛇黄一兩細研人參一分去蘆頭熊胆半分細研生姜半分切燒灰麝香一錢細研右為細散每服以温水調下半錢日三服量兒大小以意加减羚羊角湯治小兒骨蒸潮熱痩瘁頰赤煩躁盗汗食不生肌病後餘毒乆不觧者及五心躁熱四肢困倦或傷寒病後因食羊肉體熱不除並宜服之一名生犀散羚羊角鎊地骨皮秦芁去苖土麥門冬去心焙大黄剉炙枳殻去瓤麩炒柴胡去苗赤茯苓去黒皮桑白皮剉芍藥黄耆剉人参鼈甲去裙襴醋炙各一兩右麄搗篩每服一錢水一盞入青蒿少許煎至六分去滓食後温服量兒大小加减胡黄連丸治小兒骨熱煩躁黄痩飲食無味胡黄連一分人參一分去蘆柴胡半兩去苗羚羊角屑一分麥門冬半兩去心焙鼈甲半兩塗醋炙令黄地骨皮一兩秦芁半兩去苖黄耆一分剉木香一分犀角屑一分甘草一分炙㣲赤剉葳𬎼一分右為末煉蜜和丸如菉豆大每服以温水下七丸日三服更量兒大小加减服之胡黄連散治小兒骨熱痩瘁心神煩躁不得睡卧胡黄連一分知母一分鼈甲半兩醋炙去裙襴柴胡半兩去苗地骨皮一分黄芩梔子仁川升麻犀角屑各一兩甘草一分剉炙㣲黄杏仁一分湯浸去皮尖雙仁麩㣲炒黄右為麄散每服一錢水一小盞煎至五分去滓不計時候温服量兒大小分减服之獺肝丸治小兒骨熱羸痩雖食不生肌肉獺肝半兩㣲炙麥門冬一兩去心焙人參半兩去蘆黄芩半兩黄連半兩去鬚龍胆半兩去蘆白术半兩柴胡半兩枳殻半兩炒㣲黄去瓤鼈甲半兩塗醋炙令黄去裙襴桃仁二十枚湯浸去皮尖雙仁麩炒㣲黄色右為末煉蜜和丸如菉豆大每服以温水下七丸日三服更隨兒大小以意加减犀角湯治小兒骨熱日晩發熱面赤五心煩躁四肢無力飲食减少夜多盗汗面色萎黄亦治大小盗汗犀角鎊柴胡去苖枳殻去瓤麩炒麥門冬去心焙芍藥鼈甲半兩去裙襴醋炙細研右麄搗篩每服一二錢再入桃仁七枚去皮尖將水煮過麥門冬四十九粒去心煎至七分去滓分温三服食後臨卧服麥門冬丸治小兒不生肌膚羸痩骨熱小便黄赤麥門冬去心焙一兩人參黄耆剉青蒿子黄連去鬚柴胡三分去苗地骨皮各半兩桑白皮剉半兩枳殻半兩去瓤麩炒右搗羅為末煉蜜和丸如菉豆大每服五丸至七丸温熱水下量大小加减柴胡飲子治小兒自小傷抱脚脛軟細無力行立不得或骨熱疳痩柴胡三分去苗鼈甲半兩醋炙令黄去裙襴知母半兩桔梗半兩去蘆頭𤣥參半兩川升麻半兩研枳殻半兩麩炒㣲黄去瓤桃嫰枝三分剉甘草一分炙㣲黄右細剉和勻每取一分水一盞煎六分去滓不計時候分為三服更量兒大小以意加减知母飲子治小兒骨熱口乾煩悶不欲飲食四肢羸痩知母半兩柴胡三分去苖川大黄半兩剉研㣲炒去瓤恒山半兩犀角半兩鼈甲半兩塗醋令黄去裙襴枳殻半兩炒㣲黄去瓤龍胆半兩去蘆頭右細剉和勻每取一分水一盞煎至六分去滓分為三服或吐㵼三兩行便安量兒大小以意加减服之連翹湯治小兒骨熱皮膚生瘡肌體痩弱身熱連翹山梔子去皮甘草炙黄芩去黒皮秦芁去苗上防風去皮知母焙荆芥穗各半兩麥門冬去心焙一兩右麄搗篩每服一錢水七分煎至四分去滓食後臨卧服秦芁散治小兒五嵗至十嵗骨熱及手足心煩悶不欲飲食秦芁去苗甘草炙剉各一兩右為麄散每服一錢煎至五分去滓不計時候温服更隨兒大小以意加减鼈甲飲治小兒骨熱潮熱盗汗咳嗽不食多渇心躁多驚面黄消痩鼈甲醋炙地骨皮秦芁柴胡枳殻麩炒知母當歸各等分右一錢水半盞桃桞枝各三寸烏梅一个煎三分去滓無時服犀角散飲治小兒骨蒸潮熱盗汗肌痩犀角屑鼈甲酥炙柴胡知母各等分地骨皮胡黄連各一兩大黄桃仁各半兩右㕮咀三歳一錢水半盞煎至三分去滓無時服一方用桃桞枝光明砂丸治小兒骨熱日漸痩弱不能飲食光明砂半兩細研水飛石子花半兩雄黄半兩細研㯽榔三枚逺志一分去心金箔三片研桃仁一分湯浸去皮尖雙仁麩炒㣲黄紫石英半兩細研水飛右為末都研令勻煉蜜和丸如麻子大每服以粥飲下五丸日三更量兒大小加减服之胡黄連丸治小兒骨熱勞疾面黄肌痩發熱夜卧有汗胡黄連夜明砂五靈脂各半兩柴胡去苗一兩麝香研半兩人參各半兩鼈甲去裙襴醋炙右搗羅為末用猪胆汁煮麵為丸如菉豆大每服十丸十五丸米飲下不拘時服桃仁青蒿煎丸治小兒十五嵗以下骨蒸勞盗汗體熱欬嗽煩躁發熱渴不長肌肉退熱桃仁湯浸去皮尖研半兩麝香研一分柴胡去苗紫苑去苗去土丹砂研鼈甲去裙襴醋炙各一兩右除麝香丹砂外並搗羅為末共研勻用青蒿汁童子小便生地黄汁各半兩一盞於銀石噐内熬汁入藥末一半火再熬得所有餘藥末盡和勻杵三四百下煉丸如菉豆大每服五七丸至十丸空心食前煎陳米飲下日三服連芁散治小兒骨熱肌痩黄連秦芁各一兩天靈盖一枚酥炙黄甘草半兩右為細末每服半錢粥飲調下量大小加减胡黄連丸治小兒骨熱胡黄連乾蟾酒浸去皮骨㣲炙各三分麝香一分細研右為末都研令勻煉蜜和丸如菉豆大每服以粥飲下五丸日三四服更量兒大小以意加减丹砂丸治小兒骨熱五嵗以下骨熱勞徧身如火日漸黄痩夜卧多汗咳嗽煩渴丹砂二兩水飛研柴胡去苗末四兩右研勻用獖猪胆汁拌和飯甑上蒸一次丸如菉豆大每服十丸用桃仁烏梅煎湯下日三服天靈盖散治小兒骨熱體痩心神煩躁天靈盖一枚塗酥炙令黄黄連半兩去鬚右為細末每服粥飲調下半錢日三服量大小加减生犀散治小兒骨熱痩弱頰赤口乾晚潮熱夜盗汗五心煩躁四肢困倦飲食雖多不長肌肉及大病瘥後餘毒不觧或傷寒病後因食羊肉體熱不除並宜服此一名羚羊角湯方在本類前犀角散治骨蒸熱肌痩頰赤口乾日晚潮熱夜有盗汗五心煩躁四肢困倦飲食雖多少肌肉及大病瘥後餘毒不觧或傷寒病後因食羊肉體熱不除宜之犀角地骨皮芍藥柴胡甘草乾葛等分右剉散每服二錢水一盞薄荷五葉煎服瘧疾生姜二片薄荷五葉煎一方不用薄荷生姜煎肥兒丸治小兒蒸熱腹脇脹满面色痿黄飲食遲化大小便不調川黄連去鬚大蕪荑各半兩胡黄連麥蘖炒神麯炒各半兩右為細末獖猪胆丸如麻子大每服十丸温米飲送下食前乳母忌酒濕麵靈犀飲治小兒蒸潮熱盗汗肌痩犀角屑胡黄連各半兩人參川芎秦芁甘草羌活柴胡桔梗地骨皮各一兩右㕮咀三嵗水一盞鳥梅竹葉各少許煎團參丸治小兒肌痩骨蒸潮熱夜多盗汗人參去蘆龍胆草防風去蘆枳殻炒白茯苓甘草炙黄耆胡黄連炒鼈甲醋炙右等分為末以猪胆汁為丸如菉豆大每服十五丸食後米飲下普濟方卷三百八十四
