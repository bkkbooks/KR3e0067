小兒胃中熱日漸肌瘦梔子仁甘草炙銼黃連去鬚黃芩半兩右為散每服一錢水一小盞煎至五分去滓量兒大小以意加減竹茹湯治胃中熱嘔若汗青竹茹彈子大半夏三個湯泡七次粳米四十粒乾葛右㕮咀一服生薑三片水一盞煎至半盞去滓量兒大小以意加減與服大黃散治小兒胃中熱日漸瘦甘草半兩炙川大黃半兩炙苽蔞三分右為散每服一錢水一小盞煎五分溫服量大小以意加減骨熱附論夫水為隂骨熱火為陽火精骨熱氣也火者陽氣也小兒精氣和盛體性多熱若表裏傷原過熱食物或患時氣大病之後重亡津液陽氣偏盛水不濟火腑臟積熱熏灼肌體甚則消鑠骨髓是為骨熱之病久不巳變成骨蒸凡小兒一歲至十歲衣服皆不得著新綿又得冬天以火烘炙衣服與者亦令兒體熱勿食桃杏令兒體熱因傷寒病後未滿百日勿食羊肉狗肉令兒體熱或作骨蒸也方龍膽丸治小兒骨熱生風龍膽一兩熊膽研一分馬牙硝研山梔子去皮朴硝研玄參人參枳殼去瓤炒陳橘皮去白焙各半兩柴胡去苖當歸切各半兩焙赤茯苓去黑皮一兩甘草炙銼一兩麝香研半錢沉香半兩右除研外搗羅為末共研勻煉蜜為丸如梧桐子大一嵗一丸溫水化下生犀散治骨熱蒸肌瘦頰赤口乾日晚潮熱夜有盜汗五心煩躁大病瘥後餘毒不解犀角地骨皮秦芁麥門冬去心枳殼煨大黃煨柴胡茯苓赤芍藥桑皮黃耆人參鱉甲醋炙一錢知母各等分有痰加半夏右銼散每服二錢水一盞陳青蒿少許煎溫服加桃枝三寸亦可疳病熱似骨蒸有及久病後或虛熱時復來瘧疾亦用胡蜣蜋散治小兒骨熱黃瘦不食多卧胡蜣蜋兩個去趐足微炒赤芍藥七分柴胡半兩去苗川大黃一分研赤茯苓鱉甲一分塗醋炙令黃去裙襴研用細枳殼一個麩炒微黃去瓤紫苑一個洗去土苗甘草一分炙微銼蛇黃一兩細研人參一分去蘆頭熊膽半分細研生薑半分切燒灰麝香一錢細研右為細散每服以溫水調下半錢日三服量兒大小以意加減羚羊角湯治小兒骨蒸潮熱瘦瘁頰赤煩躁盜汗食不生肌病後餘毒久不解者及五心躁熱四肢困倦或傷寒病後因食羊肉體熱不除並宜服之一名生犀散羚羊角鎊地骨皮秦芁去苖土麥門冬去心焙大黃銼炙枳殼去瓤麩炒柴胡去苗赤茯苓去黑皮桑白皮銼芍藥黃耆銼人參鱉甲去裙襴醋炙各一兩右粗搗篩每服一錢水一盞入青蒿少許煎至六分去滓食後溫服量兒大小加減胡黃連丸治小兒骨熱煩躁黃瘦飲食無味胡黃連一分人參一分去蘆柴胡半兩去苗羚羊角屑一分麥門冬半兩去心焙鱉甲半兩塗醋炙令黃地骨皮一兩秦芁半兩去苖黃耆一分銼木香一分犀角屑一分甘草一分炙微赤銼葳𬎼一分右為末煉蜜和丸如菉豆大每服以溫水下七丸日三服更量兒大小加減服之胡黃連散治小兒骨熱瘦瘁心神煩躁不得睡卧胡黃連一分知母一分鱉甲半兩醋炙去裙襴柴胡半兩去苗地骨皮一分黃芩梔子仁川升麻犀角屑各一兩甘草一分銼炙微黃杏仁一分湯浸去皮尖雙仁麩微炒黃右為粗散每服一錢水一小盞煎至五分去滓不計時候溫服量兒大小分減服之獺肝丸治小兒骨熱羸瘦雖食不生肌肉獺肝半兩微炙麥門冬一兩去心焙人參半兩去蘆黃芩半兩黃連半兩去鬚龍膽半兩去蘆白术半兩柴胡半兩枳殼半兩炒微黃去瓤鱉甲半兩塗醋炙令黃去裙襴桃仁二十枚湯浸去皮尖雙仁麩炒微黃色右為末煉蜜和丸如菉豆大每服以溫水下七丸日三服更隨兒大小以意加減犀角湯治小兒骨熱日晚發熱面赤五心煩躁四肢無力飲食減少夜多盜汗面色萎黃亦治大小盜汗犀角鎊柴胡去苖枳殼去瓤麩炒麥門冬去心焙芍藥鱉甲半兩去裙襴醋炙細研右粗搗篩每服一二錢再入桃仁七枚去皮尖將水煮過麥門冬四十九粒去心煎至七分去滓分溫三服食後臨卧服麥門冬丸治小兒不生肌膚羸瘦骨熱小便黃赤麥門冬去心焙一兩人參黃耆銼青蒿子黃連去鬚柴胡三分去苗地骨皮各半兩桑白皮銼半兩枳殼半兩去瓤麩炒右搗羅為末煉蜜和丸如菉豆大每服五丸至七丸溫熱水下量大小加減柴胡飲子治小兒自小傷抱腳脛軟細無力行立不得或骨熱疳瘦柴胡三分去苗鱉甲半兩醋炙令黃去裙襴知母半兩桔梗半兩去蘆頭玄參半兩川升麻半兩研枳殼半兩麩炒微黃去瓤桃嫩枝三分銼甘草一分炙微黃右細銼和勻每取一分水一盞煎六分去滓不計時候分為三服更量兒大小以意加減知母飲子治小兒骨熱口乾煩悶不欲飲食四肢羸瘦知母半兩柴胡三分去苖川大黃半兩銼研微炒去瓤恆山半兩犀角半兩鱉甲半兩塗醋令黃去裙襴枳殼半兩炒微黃去瓤龍膽半兩去蘆頭右細銼和勻每取一分水一盞煎至六分去滓分為三服或吐㵼三兩行便安量兒大小以意加減服之連翹湯治小兒骨熱皮膚生瘡肌體瘦弱身熱連翹山梔子去皮甘草炙黃芩去黑皮秦芁去苗上防風去皮知母焙荆芥穗各半兩麥門冬去心焙一兩右粗搗篩每服一錢水七分煎至四分去滓食後臨卧服秦芁散治小兒五嵗至十嵗骨熱及手足心煩悶不欲飲食秦芁去苗甘草炙銼各一兩右為粗散每服一錢煎至五分去滓不計時候溫服更隨兒大小以意加減鱉甲飲治小兒骨熱潮熱盜汗咳嗽不食多渴心躁多驚面黃消瘦鱉甲醋炙地骨皮秦芁柴胡枳殼麩炒知母當歸各等分右一錢水半盞桃桞枝各三寸烏梅一個煎三分去滓無時服犀角散飲治小兒骨蒸潮熱盜汗肌瘦犀角屑鱉甲酥炙柴胡知母各等分地骨皮胡黃連各一兩大黃桃仁各半兩右㕮咀三歲一錢水半盞煎至三分去滓無時服一方用桃桞枝光明砂丸治小兒骨熱日漸瘦弱不能飲食光明砂半兩細研水飛石子花半兩雄黃半兩細研檳榔三枚逺志一分去心金箔三片研桃仁一分湯浸去皮尖雙仁麩炒微黃紫石英半兩細研水飛右為末都研令勻煉蜜和丸如麻子大每服以粥飲下五丸日三更量兒大小加減服之胡黃連丸治小兒骨熱勞疾面黃肌瘦發熱夜卧有汗胡黃連夜明砂五靈脂各半兩柴胡去苗一兩麝香研半兩人參各半兩鱉甲去裙襴醋炙右搗羅為末用豬膽汁煮麵為丸如菉豆大每服十丸十五丸米飲下不拘時服桃仁青蒿煎丸治小兒十五嵗以下骨蒸勞盜汗體熱咳嗽煩躁發熱渴不長肌肉退熱桃仁湯浸去皮尖研半兩麝香研一分柴胡去苗紫苑去苗去土丹砂研鱉甲去裙襴醋炙各一兩右除麝香丹砂外並搗羅為末共研勻用青蒿汁童子小便生地黃汁各半兩一盞於銀石器內熬汁入藥末一半火再熬得所有餘藥末盡和勻杵三四百下煉丸如菉豆大每服五七丸至十丸空心食前煎陳米飲下日三服連芁散治小兒骨熱肌瘦黃連秦芁各一兩天靈蓋一枚酥炙黃甘草半兩右為細末每服半錢粥飲調下量大小加減胡黃連丸治小兒骨熱胡黃連乾蟾酒浸去皮骨微炙各三分麝香一分細研右為末都研令勻煉蜜和丸如菉豆大每服以粥飲下五丸日三四服更量兒大小以意加減丹砂丸治小兒骨熱五嵗以下骨熱勞遍身如火日漸黃瘦夜卧多汗咳嗽煩渴丹砂二兩水飛研柴胡去苗末四兩右研勻用獖豬膽汁拌和飯甑上蒸一次丸如菉豆大每服十丸用桃仁烏梅煎湯下日三服天靈蓋散治小兒骨熱體瘦心神煩躁天靈蓋一枚塗酥炙令黃黃連半兩去鬚右為細末每服粥飲調下半錢日三服量大小加減生犀散治小兒骨熱瘦弱頰赤口乾晚潮熱夜盜汗五心煩躁四肢困倦飲食雖多不長肌肉及大病瘥後餘毒不解或傷寒病後因食羊肉體熱不除並宜服此一名羚羊角湯方在本類前犀角散治骨蒸熱肌瘦頰赤口乾日晚潮熱夜有盜汗五心煩躁四肢困倦飲食雖多少肌肉及大病瘥後餘毒不解或傷寒病後因食羊肉體熱不除宜之犀角地骨皮芍藥柴胡甘草乾葛等分右銼散每服二錢水一盞薄荷五葉煎服瘧疾生薑二片薄荷五葉煎一方不用薄荷生薑煎肥兒丸治小兒蒸熱腹脅脹滿面色痿黃飲食遲化大小便不調川黃連去鬚大蕪荑各半兩胡黃連麥蘖炒神麯炒各半兩右為細末獖豬膽丸如麻子大每服十丸溫米飲送下食前乳母忌酒濕麵靈犀飲治小兒蒸潮熱盜汗肌瘦犀角屑胡黃連各半兩人參川芎秦芁甘草羌活柴胡桔梗地骨皮各一兩右㕮咀三嵗水一盞鳥梅竹葉各少許煎團參丸治小兒肌瘦骨蒸潮熱夜多盜汗人參去蘆龍膽草防風去蘆枳殼炒白茯苓甘草炙黃耆胡黃連炒鱉甲醋炙右等分為末以豬膽汁為丸如菉豆大每服十五丸食後米飲下普濟方卷三百八十四
