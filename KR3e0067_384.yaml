body:
  text: 普濟方卷三百八十四明周王朱橚撰嬰孩諸熱疸腫門諸熱附論經曰火氣不調舉身蒸熱風氣不調令身强直水氣不調身體浮腫土氣不調四肢不舉凡小兒之疾多因風熱不順乳氣不調致生諸疾潮熱驚熱夜熱餘熱食熱疳熱壯熱煩熱骨熱風熱虚熱客熱癖熱寒熱血熱疹熱十六者大同而小異凡熱必乗陽邪而發經云邪之所凑其氣必虚留而不去其病則實邪正分爭客摶於皮膚或恍惚啼呌或悶亂啼麄其變多端或在表或在裏或似實而似虚或半表而半裏或半實而半虛皆由血氣盛實臟腑生熱隂陽氣交薫蒸於外致令身熱焉凡病熱者左臉先赤肝受熱也額上先赤心受熱也右臉先赤肺受熱也大抵熱則風生風生則驚悸潮熱發歇有時驚熱顛呌恍惚夜熱夕發旦止餘熱寒邪未盡食熱肚背先熱疳熱骨蒸盗汗壯熱一向不止煩熱心躁不安積熱頰赤口瘡風熱汗出身熱虚熱困倦少力客熱來去不定癖熱涎嗽飲水寒熱發如瘧狀血熱發辰已耳鼻尖冷諸熱得之各有所歸其間有三兩證交互者宜隨其輕重而治之潮熱者血氣盛實臟腑生熱或傷寒時疫觸受邪氣隂氣不足陽氣有餘陽邪暴傷則血氣凝滯不即通流壅遏無歸傳於陽明之經遂成潮熱休作有時其夜間發熱者乃是隂中有陽邪也潮熱或留宿寒夾伏熱者大便黄而臭氣滯宿寒者大便白而酸臭潮熱者實熱也當日間潮熱或即増寒手足俱冷能乳即痩再加盗汗此食疳之候也發熱日可夜間熱甚天明復凉謂之傷寒餘熱失觧小兒傷乳者或時發熱發熱有退時熱退後但復熱或夜間熱者此傷乳食也夜熱者由宿食在小腸當暮發熱明旦復止諸家所説夜熱各自不同皆有應驗食疳亦能夜熱傷寒失觧亦能夜熱風傷脾胃亦能夜熱寒熱者隂陽盛也先寒而後熱陽不足先熱而後寒隂不足寒多而熱少隂勝陽也熱多而寒少陽勝隂也寒熱相半隂陽交攻也寒熱隔日隂陽乍離也陽盛發熱隂盛發寒寒而頰赤隂中有陽邪也熱而靣青陽中有陰邪也寒而靣青隂中有隂邪也熱而頰赤陽中有陽邪也熱而面青陽中有隂邪也寒而面赤隂中有陽邪也其有頭疼汗出者有嘔吐不食者有増寒而飲水者壯熱而欲湯者有筋骨疼痛者或袐或㵼或内寒而外熱或内熱而外寒又有寒而腹中痛熱而腸中鳴是有食積也大抵寒熱囙於露風或觸暑毒致隂陽不順邪正不和逆順之法當從乎天地順乎隂陽順之則安逆之則危小兒寒熱多因食積而得當下之次用補助先寒後熱寒多熱少小柴胡湯加桂先熱後寒熱多寒少用白虎􅣚加桂寒熱相半小柴胡湯壯熱者亦由血氣盛實五臟生熱邪火蒸鬱於内則眠卧不安精神恍惚薰發於外則連滯不巳舉動驚惶表裏發熱則煩躁喘麄甚則發癎也潮熱者因其觧脱風邪所傷客於皮毛入於臟腑則惡風發熱呵欠靣青目澁多睡陽氣有餘身熱無汗隂氣有餘身寒有汗陽氣有餘無寒而寒隂氣有餘素問云汗出而身熱者風熱也錢氏論云風温潮熱者時間發熱過時即退來日依時發此為熱壯熱相似潮潮則發驚也壯熱者一向熱而不已甚則發驚癎也風熱者身熱口中氣有風證渴壯者但温而不熱也急飲乳者不能食者由客熱入兒臍流入心脾經即舌厚唇燥口不能乗郭當凉心脾也積熱者由陽氣盛實積於臟腑上盛則唇舌生瘡下盛則腰腿癰腫表裏俱盛則精神恍惚頰赤口乾大小便澁遍身體發熱下之即退有後熱者是裏熱已去表熱未退汗之則觧表熱去後再熱者表裏俱虛陽浮於外隂沉於内所以又熱者乃虛也因傷寒及諸熱汗下之後去津大過氣血未調食飲勞傷致令虛熱困倦少力其有乆嗽乆㵼乆痢乆血乆瘧致諸疾之後而成者皆虛熱也凡病乆者則氣血虛氣虗則發厥血虛則發熱血氣虛則身熱而足手厥疳熱者由乳母好飱肥膩恣食甘酸或喜怒氣浮醉飽勞傷乳兒遂成疳熱或兒食無常生冷過度致令骨熱不除羸痩煩渴頰赤面黄不長肌肉凡疳食之熱先起於腹背皮膚不堪熱近之骨間如火或睡中有汗乆變疳勞者渾身如火手足如氷孫氏云骨熱如湯蒸欝不退時常有汗癖熱者由兒不肯食哺而但欲飲乳乳壅不能消化伏結腹中致成涎癖塊也或痰嗽而驚或嘔逆而渇日中嗞煎夜間啼呌辰熱申凉與潮相類也先與白术散滋飬津液次珍珠丸下痰涎食積再白术散及妙丸子磨積血熱者每日巳午間發熱而遇夜則凉是陽中有陽血氣盛實也盖血者榮也氣者衛也榮行脉中衛行脉外營周不息巳午者當心火用事之時也心生血氣行至巳午則陽氣盛陽氣盛則與正相擊故至期而發熱非其時非血熱也客熱者為陽邪干於心也心若受邪則熱形於額故先起頭靣次而身熱恍惚多驚聞聲恐悸良由真氣虛而邪氣勝邪氣勝真邪交爭發渴無時進退不定如客之徃來故曰客熱湯氏曰第一傷寒熱初起尚踈稀鼻塞并多涕呵氣漸傷肢此病非難治因知及早醫若逄筋脉冷傷寒豈便宜第二變蒸熱唇上赤生光四肢多熱毒涕乳亦為殃熱躁還啼哭須當解膈涼三旬餘兩日一度定非常第三食積熱氣急不尋常寒熱常如瘧渴㵼要壺漿與食頻煩躁多痰更滑傷睡要合地卧本是積為殃此侯先當取積清熱只用平胃散治之次常服進食丸第四虛驚熱長啼汗出多糞青兼吐乳兩眼慢雲和咬乳流涎出脚冷病難蘇若逄頭仰視早治莫蹉跎此候宜服薄荷散并紅綿散急退熱解驚可以療之第五麻豆熱中指冷如氷目澁長如睡乳食不曾名耳冷眼中赤麻豆出將呈或時寒熱起困惡沒心情此候乃天行之病又乃時熱不除發出胎毒故成此疾不可妄下及妄攻始當温凉藥治之法與傷寒相似後當發散使毒氣出腑則出細疹俗云膚瘡也若不發散便是傷寒未表一也則毒氣在臟故發豆瘡遍身無縫又寒又熱變成惡證十死八九小兒瘡證之熱腹痛靣腮燥赤呵欠睡困眼澁多膿乃瘡疹欲出之候急與羌活防風湯三服如未有前證則不可用先與解肌散二服發汗使氣出臟毒如汗後熱退只用升麻湯汗後尚熱宜服羌活散如己見兩三㸃於皮膚加紫草少許如熱平瘡出稍輕但用辰砂米飲調下半錢其豆稀而輕盖欲製其胎毒也故第六疳為熱鼻赤齒頻揺乳食常無飽頭瘡髮又焦麩炭餐如飯肌膚不自揚心煩兼肚熱盛此是疳勞此候當用進退丸常服磨化積丸仍兼服化疳丸後服鼈甲散退熱次服肥兒丸治虚第七渾身熱細看手脚知神昏常不識肚急更如癡見食還憎受渴㵼糞如脂終日無歡色唇紅不可醫此候不可發散只宜補脾仍服十金丹去其積第八風痰熱晩起早還凉喫水無時度粥飲亦知香夜多喘呌候氣息豈為昌患宜頻進藥莫待服驚張此候乃痰作而朝凉夜熱即宜用金星丸或氣弱不了不宜服奪命散急宜服惺惺散要加南星白附子温壯者由臟腑不調内有伏熱挾宿寒皆𫝊於胃致胃氣不和留滯壅塞故藴積體熱名曰温壯大便黄而臭者内有伏熱大便白而酸臭夾宿寒故也而又有小兒壯熱者是熱氣薰發於外故令身體壯熱其發無漸大體與温壯相似有小異者熱加甚也此候宜服輕藥惺惺散羌活散皆可如有宿寒宜服四味理中湯加桂煎服若有伏熱宜服五苓散并白虎湯二藥俱效有驚熱即有風熱此言驚風熱又有邪熱乃感風成病類同傷寒熱又傷寒熱類同瘡疹熱又瘡疹麻豆之有餘毒作熱傷寒後亦有餘毒作熱積熱有同痞熱又有膚熱其信如潮縂曰潮熱潮發有期丹熱疳熱不類諸證血熱即遍體生瘡痍瘑疥瘙痒及重發作丹毒龍帶之屬骨熱即外冷内熱其病骨蒸熱也實熱即氣脉壯實五臟氣充大便硬少或閉不通虛熱三焦不順五臟不和欲作疳候啼哭煩躁夜出虛汗或㵼疾後有熱三焦熱即上膈虛煩作渴頰赤驚悸夜夜啼哭睡中言語五心熱虛煩多驚小便赤澁睡不安穏氣麄或作瘈瘲肝經熱眼目赤腫疼痛多淚羞明或筋脉拘急有夾風痰肺經熱鼻塞生瘡不聞香臭或餘毒不散胎熱兒在胎中受母食毒榮衛不順有餘毒之熱發作衆疾或從䧏生之後常作熱證傷寒後餘毒熱雖曽觧表餘熱𫝊脉或入經絡乆而不散瘡疹餘毒熱其兒多患瘡大槩皆因有餘熱留滯在百脉之間項上生核作熱軟大㣲紅者名驚氣核更有大小相連長短相雜者是為餘毒熱亦名驚癧初生乳幼者患之三焦藴熱毒攻咽喉之外名痄顋熱氣血凝滯經絡不行熱毒攻注故生癰􅟻麻豆作熱類似疹候麻子乃腑受病屬陽故易調理雖不服藥亦能自愈只恐喫毒冐風為之逆也又或襲温熱毒氣致令小兒染時氣之症未經患瘡疹者即薰蒸之相搏也皆作是疾小腸熱心經不利小便淋澁或胃脘内疼痛胃熱作氣口臭或發嘔逆不思飲食亦有胃家虗熱得之脾熱口苦昏困喜睡因喫食毒物積聚在脾不化脚稍氷冷邪熱肺經或受寒邪隂陽二氣不正痰涎咳嗽寒熱謂先寒後熱其狀如瘧乃虛中有積凡兒患痞癖癥瘕皆作寒熱潮熱傷風熱鼻聲重頭疼脚熱類如傷寒候傷暑熱煩躁引飲頭目昏重時正盛暑或曽感冐榮熱即血熱也衛熱即氣熱也榮衛不順即血氣不相參虛之致也筋熱咬指甲見血腎熱病作崩砂齒黒齗爛以至馬疳極候煩熱即啼之不巳躁熱即哭之不巳皆由三焦不順心中積熱虛煩躁悶變蒸熱只在五百七十四日之内三十二日一變六十四日一蒸在其数發作者應也大腸熱肺家有熱在裏流入大腸秘結不通病丙穩禾疹熱乃是肺經有風在表肺主皮毛故生病丙穩禾疹風痰熱因感風生痰在上膈乆不化熱吐逆惡心驚氣熱良由小兒受驚其驚氣不散留在上膈無得自化故作熱毒攻在頥項之間肚熱即是積熱證若加脚冷當與下之客熱初生之兒親戚外來兒觸其邪以亂其正故作熱癎熱驚風不散聚在經絡或入臟腑其候常發不省人事瘈瘲熱驚之所受入經未𫝊散畧作搐搦小兒有病惟熱最多明理論曰發熱者怫怫然發於皮膚之間熇然散而成熱也輕重不思有所謂翕翕發熱者若翕所覆明其熱在外在表屬乃風寒客於皮膚陽氣抑欝所致宜發汗而散之所謂蒸蒸發熱者謂若薰蒸之蒸明其熱在内屬裏乃氣下䧟而入隂中也法當攻下以滌之表證未罷邪氣𫝊裏裏未作實是為半表半裏之間則表裏俱發熱又輕於絶在表也發熱惡寒發於陽也無熱惡寒發於隂也陽明裏實熱盛當攻之以裏大陽風寒外搏陰盛惡寒雖熱尤當温散少陽宜和觧雖屬小柴胡湯如㣲熱不渴又當加桂明理曰發熱傷寒之常經云脉隂陽俱虛熱不止多下痢發熱或汗後復熱或汗後復熱而脉躁疾不為汗衰狂言不能食為隂陽不交皆不治之證小兒熱有實則靣赤舌黄氣麄口熱燥渴唇腫大小便難掀揭露衣煩啼暴呌虛則靣色青白恍惚神緩口中清冷虚氣軟弱泄㵼多尿夜出虛汗其或伏温怫欝悸傷上盛下泄水榖不分此則冷熱不調如調虛熱惺惺散實熱四順清凉飲加柴胡冷熱不調則敗毒加木香當歸若夫升䧏隂陽則來復母三丸薄荷湯研下小兒表裏俱熱面黄頰赤唇燥口乾小便赤澁大便焦黄先以四順清凉飲為之疏利其熱即去既去而復熱者裏已消而表未觧也隨當用惺惺散或即用紅綿少加去節麻黄以取㣲汗則表熱盡除其或裏已觧而熱又属表裏俱虛氣不歸元陽浮於外不可再用凉藥再與觧表當為和其胃氣使陽歛而身體大凉參苓白术散姜棗畧煎服熱重者用銀白散朱監簿子歲忽發熱醫曰此由心熱腮赤唇紅煩燥引飲遂用牛黄丸三服以一物㵼心湯下之朱曰不愈反加無力而不能食又下之便利黄沬錢曰心經虗而胃中津液以生犀角散治之朱曰大便黄色如何曰胃氣正即㵼自止虚熱也朱曰醫用㵼心湯如何錢曰㵼心湯者惟黄連一物黄連性寒多服則利能寒脾胃也坐久衆醫至曰虚熱若實熱何以㵼心湯下之不安又加靣黄頰赤五心煩燥不食而引飲醫曰既虛熱何大便黄沫錢笑曰大便黄沫者多服㵼心湯故也錢後與胡黄連丸治愈監簿子五嵗夜發熱曉即如故衆醫有作傷寒者有作實熱者以凉藥觧之不愈其候多涎而加睡他醫以鉄粉圓去涎病益甚至五日大引飲錢氏曰不可下之乃取白术散末一兩煎藥汁三升使随其意取足朱曰飲多不作㵼否錢曰無生水不能作㵼不足怪也但不可下耳朱曰先冶何病錢曰止㵼治痰退熱清神皆此藥也至晚服盡錢曰更可服三升又煎白术散三升服盡得稍安三日又服白术散三升其子不渴無涎又投阿膠散三升服而安鄭人齊郎中者家好収藥散施於人其子或臟熱齊自取青金膏三服併一服而餌之服畢至三更㵼五行其子困睡齊言子睡多亦驚又與青金膏一服又㵼二行加口乾而身熱召錢氏曰成虛羸先命多煎白术散時時服之後又用香苽丸三十三日乃愈皇都徐氏子三嵗病潮熱每日西則發搐身㣲熱而目㣲露睛四肢冷而喘大便㣲黄錢與李醫同法錢問李曰病何搐也有風何身熱㣲温曰四服所作何目斜何肢冷曰搐則曰冷厥心熱内何喘曰搐之甚也曰何以治之曰建經丸鼻中灌之必搐之錢又問曰既胃風病壯搐引目斜露睛内熱肢冷及搐甚而喘併以何藥冶之李曰皆此藥也錢曰不然搐者肝實也故令搐也目斜㣲露而身㣲熱者肺潮熱用事肺主身且熱也為肺虚熱所以目㣲斜露睛者肺腑相勝也肢冷者脾虚也肺若虛甚母脾亦虛木氣乗脾四肢即冷治之當先用益黄散阿膠散得脾虚調和退後以㵼清丸導赤散凉驚丸治之後九日愈㓜㓜新書云巢氏病源曰張户侍其子女藴積結聚已經年矣其候腹滿壮熱大小便閉不食諸藥醫皆云虛熱作胃寒下食既不能食自然大小便少或作疳熱有藥俱試而無一日間巳窘迫一日間來招扣之曰合服何藥余答曰當服甘遂大黄驚駭其説言以前諸醫皆補助之此人乆不進食豈宜利動余荅曰信我者生逆我者死侍郎云更有無甘遂而次於藥力者可否余謾令即服大承氣湯二服而愈次日見之尚餘滯實必過數日而復閉須服前藥始可除根數日後果然再閉滿痞結再投以此藥一服而痊全嬰方云朱氏子五嵗六月中身熱此心煩燥渴可食召一醫作傷寒治用温熱藥取汁不令見風治之三日其證熱盛狂躁煩渴昏悶驚搐作醫見證變以珍珠丸下痰熱後用驚藥又易一醫作豆搐有作急者無效其證潮搐神昏怕明就暗大便而常召愚視之曰伏熱生痰燥多憂見食悲向明憎不樂入暗稍相宜無故閉䨇目時時動四肢渴燥尋冷地暑毒作驚危盖見兒怕明就暗目赤面紅唇口乾燥身熱煩渴手足不定令他虚冷處將水傾颺兒見水欲梭衿内知其暑熱之甚也以甘露散雪水或新汲水調二錢再須冷服飲七分坐須潮熱稍輕進之一服更以白虎湯頓冷服半盞少時又一服諸證减半即思飲食後以香薷湯亦冷服之同煎藥相間治之三日而安主人曰前日累驚藥不退今不用驚藥何搐定也荅曰孫氏云熱名不安煩乆而驚風多不定躁乆而搐所以知其潮搐也盖因暑熱躁甚心神不定引於肝風熱相摶加之昏胃所以潮搐也觧暑熱而安若認為驚風則無效後之人學者當察用寒暑也錢塘尉王觀國子五嵗六月中身熱心躁煩渇吐逆而不食召三五醫家俱作傷寒用温熱藥取汗不令兒見風治三日其證熱盛狂躁喘喝胸膈涎流吐逆全不作聲手青唇黯面黒多汗驚搐神昏狀若角弓召愚視曰暑毒傷心狀若驚頭疼熱渇煩躁無聲昏沉喘􅥾涎流㣲汗手足搐抽服間睛此乃暑毒發驚非聲寒也以甘露散下偏銀丸醫曰寒胃増過主人曰何知傷伏暑荅曰傷寒者惡寒伏暑者惡熱盖見兒身熱神昏驚搐大欲飲水喜風凉處知其暑熱之盛苟不速用寒冷消暑藥則致躁而死又問吐逆不食如何荅曰暑毒痰熱所作不食亦胃熱不食也主人聴之令兒就地上周迴以水近風凉遇以甘露散水調送下偏銀丸百餘粒少頃不痰而愈吳亨秀才子三嵗身熱㣲汗自與惺惺散升麻湯鼠粘湯并驚藥調治四日熱盛召愚視之其目睛青觧臉赤氣精神恍惚大便如常愚曰風熱也主人曰何知風熱荅曰素問云汗出兒身熱風熱也今熱盛驚候目即之間必發驚搐主人駭然荅曰無慮素問又云水寒而静故為隂火熱而躁故為陽譬之水性静因風而波生火性炎因風而煙生其病風熱盛則引於肝風肝有風則心火生心火生則肺金鎔故風火相摶則正壅而驚搐當以驗風膏連進三服風止則火滅火㓕則金堅於是乃更與珎珠丸下涎後不再服驚藥驚搐即定也主人曰何不用驚藥而更安對曰先退肝風熱心火即自㓕墜下肺經涎驚風方始歇𫝊曰揚湯止沸不其若絶其火利溜澄波不若清其源大抵治病不可不究源也小兒四嵗六月中潮熱心躁大便如常與四順飲三服㣲利熱或再日復作來與四順飲雖大便如常黄熱㣲從耒日舌白乾躁仍舊潮熱自此逐日四順飲雖大便利十余日纔㵼退来日依然大柴胡湯滯而熱减来日復熱自得病不减食愚妻曰自得病用藥㵼半月餘日尚未除若更㵼别生患否愚曰能乆勝寒藥必有大熱能乆服熱必有大寒此而乆勝寒藥熱尚未退知有大熱甚明㵼之不妨與調胃承氣湯連三服㵼数次尚未全除又二服自此五日服承氣湯連三服前後二十日冷藥服之始熱除後忽左膝疼伸縮艱難將甹結癰又無紅腫處但筋骨間疼行力不能用藥淋洗膏藥貼治十餘日不退遍尋小兒方書皆無此證惟有嬰童寳鑑云風冷寒筋四肢全不仁疼因夾冷熱是遍痛生又無治法也素問云風冷寒筋四肢熱中氣血則痺不仁寒寒氣傷形故為腫痛又云寒傷形熱傷氣傷形痛傷腫亦無治法思之病在筋則屈而不能伸病在骨則伸而不屈風冷傷筋骨則疼因閲其蘇况方左經丸稱女子膝腕軟不能行立治愈遂合二服即㓕三分逐日進服十余日如舊後有一兒十餘歳膝脱疼軟舉動呌與左經丸乳香酒下三两服即時全效又治熱凉同病身熱强直者欲作急驚肝經風熱驅風膏四順飲或加細辛或加獨活兼用凉藥身凉强直者欲作慢驚肝經虛風神寳丹虎珀散續命湯若大便實無虛證驅風膏琥珀散身熱不能食者脾胃熱不能食必大便堅或焦黄四順飲或洗心散八正散身凉不食者脾胃氣虛或因吐㵼後以益黄散并食藥或傷食不食必噯哺與食藥如大便食不化紫丸下後補脾身熱飲水者熱在内或中暑吐㵼而渴者五苓散香薷散白虎湯甘露散便堅或寒邪所作四順飲身熱不渴熱在外宜觧表薄荷麻黄黄芩湯活人書云身熱不渴表有熱小柴胡湯加桂身熱有渴不喫水但要湯者是内寒故也五苓散姜棗煎連進則退身凉飲水者因吐㵼失亡津液多與白术散如大渴不止龍涎散藕漿散魚涎散擇用之或以史君子湯加訶子汁身熱身黄者傷寒小便不利必發黄茵陳湯并煎茵陳汁調五苓散三四服立效身凉身黄者㵼黄散凉疳熱并三黄丸如大便實煎牽牛子汁吞下與取食積藥下之後并益黄散身熱咳嗽者寒邪在表無汗而嗽五味子麻黄湯洗心散潤肺湯涎盛鉄粉丸下之嗽而有汗羌活散惺惺散鼠粘湯涎盛下之有傷食嗽其狀嗽嘔下之小兒嗽證下之立効參术散人參丸更於嗽方中擇用之身凉嗽咳者寒邪在内肺失觧潤散欵冬散冐冷嗽喉中呀呷乳食不化因胃寒肺冷人參丸又因乆嗽咯膿血者肺虛難治補肺散阿膠散如乆嗽膿血喘急聲嗄膿如黄疱瘡内膿者必死又一等因傷暖嗽急咯血者易治栢枝散犀角地黄湯胃冷嗽不因風得名胃嗽霍香散身熱喘急者麻黄杏仁散湯五味子湯潤肺散身凉喘急者蘇子阿膠散甚者疑氣杏霜丸人參丸身熱有痰者小柴胡湯生銀丸南星丸生金丸身凉有痰者人參丸黄龍丸南星丸身熱夜啼者安神膏鈎藤膏虎珀散蘇香丸身熱肚疼者四順飲送妙丸子凉肚疼者消食藥紫丸子令微利後益黄散身熱腹急者宣風散牽牛散并子丑散身凉腹急者宣風散導聖散失肚丸塌氣丸分氣丸身熱浮腫者宣風散子丑散擬目飲商六飲後以益黄散身凉浮腫者如乆㵼痢浮腫者女面散益黄散五苓散大便堅金蓮散身熱嘔吐者隂陽丸玉散子夏月五苓散黄龍丸身熱嘔吐者妙丸子感應丸消食藥㣲㣲送下後沉香丸身熱洩㵼者黄龍丸五苓散香薷散杏仁丸身凉洩㵼者千金丸益黄散人參膏川椒丸身熱吐㵼五苓散香薷散黄龍丸白虎湯身凉吐㵼者千金丸金粟散并如聖丸飲身凉下痢者小車丸阿膠丸如聖膏金粟散身熱㵼血者胃風湯刺蘇湯三效散五倍丸身凉㵼血者訶灰散篛葉桂心散三效散身凉衂血者栢枝散蘃皮散龍胆丸身熱衂血者犀角地黄湯青苔散并龍胆丸身熱吐血者黄芩膏獨金散桂心散身凉吐血者桂心散秦芁散刺蘇散身熱淋瀝者玉漿散立效八正散桃膠丸身凉淋瀝者龍香丸桃符丸身熱自汗者麻黄散參茋湯鼈甲丸粉汗丸身凉自熱者麥煎散鼈甲丸參术散黄茋湯粉汗散凡驚熱癎熱驚風氣熱瘈瘲熱客忤心熱傷寒熱傷風熱傷暑熱夾食熱疳熱虚熱煩躁熱筋熱骨熱腎熱以上並宜與服葱根脫甲散風熱痰熱變熱蒸熱肝熱大腸熱癮疹熱並宜加麥冬丹熱食熱三焦小腸熱龍𢃄熱並宜加大黄及燈心瘡癮疹熱麻子食巳出證熱温氣熱未出證熱並宜加紫草川芎當歸餘毒熱胎熱肺熱傷寒後餘毒熱瘡疹後餘毒熱並宜加薄荷項上生核作熱乍顋熱癰癤毒熱並宜加大黄朴硝以上宜服大連翹飲子隨證加前件湯使潮熱榮熱衛熱瘴氣兩日一發三日一發熱積熱脾熱胃熱痞熱肚熱瘧熱邪熱寒熱脾熱瘧鬼瘧夜發單瘧獨熱以上宜服梨漿飲子八種虛痢作熱吐熱㵼熱霍亂吐㵼熱以上並宜服正氣丸調胃散調助胃氣不可以凉藥退熱補胃氣和其熱自散虛中積熱腹痛積熱以上並推下積方龍膽湯治因胎驚月内氣盛心驚發熱足胎風攝口壯熱皆可服龍膽草鈎藤柴胡赤芍藥茯苓甘草各半兩蜣蜋二枚去趐足炙大黄一錢温紙裹炙用黄芩一錢半防風麥門冬去心各一錢右㕮咀每服一錢水一小盞北棗二枚同煎七分凝神散出永類鈴方收歛胃氣清凉肌表人參白术茯苓山藥各一兩白扁豆粳米知母生地黄甘草各半兩淡竹葉地骨皮麥門冬右㕮咀每服二錢水一鍾生姜二片棗子二枚煎至七分去渣不拘時服凡經汗下熱已去而復作者由表裏俱虛氣不復元陽浮于外熱自發也非實熱證當和其胃使六陽真氣復歸于内身體即凉凝神散一方神異所施輙效不可不知也寒水石散出千金方治小兒身熱不能服藥粉兒方寒水石碎芒硝滑石碎赤石脂碎青木香大黄剉黄芩去黒心防風去皮芎藭麻黄根石膏碎右各等分為細末蛤粉一升藥末三合相和再篩細粉兒日三外臺以牡蠣代防風餘並同清觧散一名歡喜散出直指方治感風發熱頭疼鼻汗流涕無汗惡風温壯噴嚏北參防風天麻北前胡茯苓二錢北梗二錢枳殻甘草各一錢細辛柴胡各一錢丰川芎三錢右末每服一錢小盞薄荷乾三葉略煎温和服五服化毒丹出和劑局方治小兒藴積毒熱驚惕狂躁頰赤咽乾口舌生瘡夜卧不寜譫語煩渴頭身體多生瘡􅟻服此清膈凉血右為末入研藥令匀煉蜜為丸每兩作一十二丸每一嵗兒一丸分服用薄荷水入研化下及瘡疹毒上攻口齒瘡生犀角水下涎血臭氣以生地黄自然汗化一丸用雞翎掃安口熱疳内黄痩雀目不見物陳粟米泔水化下食後卧時服清凉飲子出仁存方治小兒由將飬乖莭或犯寒暑乳哺失時乍傷饑