十服愈沉香丸出聖惠方治冷勞四肢疼痛體瘦力少不思飲食沉香一兩白术三分柴胡二兩去苗桂心乾薑各三分炮裂銼訶梨勒煨用皮附子炮裂去皮臍木香人參去蘆頭白茯苓各一兩當歸檳榔各三分鱉甲一兩五錢醋炙微黃焦去裙襴陳橘皮湯浸去白瓤焙肉豆䓻各一兩去殼右為末煉蜜和搗三五百杵丸如梧桐子大每服食前以粥飲下三十丸忌莧菜木香丸治冷勞便利不調腹脹嘔逆羸困少力木香肉豆䓻去殼陳橘皮湯浸去白焙乾薑炮裂附子炮裂去皮臍郁李仁去皮尖炒别研麥門冬去心焙各一兩艾葉炒鱉甲醋浸炙去裙襴陳麴炒柴胡去苗各二兩厚朴去粗皮塗生薑汁炙三兩鍾乳煉成粉桂去粗皮各五錢右搗羅十三味為末入郁李仁相和研勻用豬肝一具去脂膜細切以頭醋三升同熬令醋浸爛研入藥末相和為丸如梧桐子大每服空心溫酒下二十丸米飲亦得虎杖飲治男子婦人冷勞身體羸瘦虎杖柴胡去苗五味子炒熟乾地黃焙白茯苓去黑皮川大黃銼碎微炒黃芩黃連去頂當歸赤茯苓各一兩五錢陳橘皮去白焙麥門冬去心焙黃芩去黑心甘草炙銼各一兩五錢人參一兩黃耆銼生乾地黃赤芍藥柴胡去苗各三兩梔子仁五錢右為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以溫水下二十丸除熱三黃丸療骨熱身多瘡瘰􅊓癰腫大黃黃芩黃連當歸茯苓桂心乾薑芍藥梔子二十四枚擘柴胡各三分右搗篩蜜和丸先食服如小豆大三丸不知增至十丸欲取微利以意增之久服有益忌生蔥醋物豬肉冷水白湯下知母散出聖惠方治虛勞骨熱四肢煩疼漸漸羸瘦日晚口乾頰赤知母三兩前胡一兩去蘆頭地骨皮三兩犀角屑一兩五錢白鮮皮龍齒川芒硝各一兩右為散每服四錢水一中盞煎至六分去滓每於食後溫服療骨熱身多瘡瘰􅊓癰腫大黃黃連黃芩各一兩芒硝一兩右搗篩蜜和丸一服五丸漸加以知為度忌豬肉冷水白湯下豬骨煎出醫方大成治男子婦人發熱有多等若虛勞發熱從脊骨起此藥有神效更宜審細病狀服之獖豬脊骨一條五尺五寸細銼用好法酒五升青蒿一握烏梅十箇柴胡一兩去蘆秦艽十箇去蘆慢火同熬耗一半去滓入蜜半斤再熬成膏子人參去蘆白茯苓去皮當歸去蘆川芎肉蓯蓉酒浸巴戟去心酒浸五味子牛膝去蘆酒浸茴香微炒破故紙炒各一兩龞甲去裙襴醋炙黃沉香各五錢鹿茸酒浸酥炙附子炮去皮臍各二兩右為細末用前豬骨膏子搜和得所丸如梧桐子大每服三十丸漸加至五十丸米飲下不以時候普濟方卷二百三十
