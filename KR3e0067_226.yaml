body:
  text: 普濟方卷二百二十六明周王朱橚撰諸虛門補益諸疾參附湯出醫學切問専治男子婦人諸虛百損恍惚健忘神昏氣短頭暈目眩咳嗽多疾氣不升降夜多盜汗虛勞喀血遺精白濁腸鳴泄㵼並宜服之此藥補氣養血調和五臟溫暖脾元進美飲食久服無病不除川當歸川芎北防風北芍藥陳皮白桂大附子黃耆各一兩鹽水炙人參丁香益智仁白薑縮砂白豆蔲焙肉豆蔲煨北五味子各五錢南木香四錢沉香甘草各三錢右為粗末每服四錢水一盞半生薑三片棗子一枚煎八分空心棗湯下脹氣虛滿者去之膽虛不得眠加酸棗仁虛勞咳嗽痰多加半夏麴杏仁北細辛紫苑欵冬花久嗽不愈喀血者煎地黃汁調鍾乳粉下黑錫丹氣壅加紫蘇葉腹脹加萆薢澄茄夜多小便加茴香益智鹽湯溫服心熱小便澀加茯苓口乾加五味子嘔者加藿香冷氣脹痛加茱茰良薑又方補虛損填骨髓長肌肉去客熱黃耆三分人參三分防風二分茯神二分甘草八分右搗篩為散納煎蜜中更煉為丸服之大效忌海藻菘菜酢物補益方昔禇氏患腰腳服之瘥顔色如三十歲時蓯蓉三兩桂心五兩絲子酒浸三兩乾漆熬三兩蛇床子三兩另搗為末生地黃一斤切以上好酒一斗漬之晝曝夜漬酒盡則止曝乾搗篩以和前藥右蜜和丸如彈子大酒飲任下一丸嚼破日三常服髓滿骨健忌生蔥蕪荑石斛散治男子隂衰腰背疼痛小便餘瀝囊下濕癢虛乏方見腎臟門白淫類伏火二氣丹出和劑方主治真元虛損精髓傷敗腎氣不足靣黑耳焦下虛上盛頭目眩暈腹脹刺痛翻胃吐逆虛勞盜汗水氣喘滿全不入食婦人血氣久冷崩中漏下癥瘕塊癖此藥奪隂陽造化之功濟心腎交養之妙大補諸虛硫黃四兩黑錫水銀丁香不見火乾薑各五錢右先用錫後下水銀結砂子與硫黃一處再研成黑灰色次入餘藥研勻用生薑自然汁煮糊為丸如梧桐子大每服十粒至十五粒濃煎生薑湯空心食前下助神丸治隂氣不能運用滋隂助陽益氣血黑髭鬢潤澤皮膚榮養肌肉明目壯筋骨益精補髓何首烏用千里水淘米泔浸軟用竹刀去皮曝乾雌雄各五錢稱三十兩赤者為雄白者為雌生地黃投水中浸沉底於桞木甑內鋪勻瓦釜中用千里水於釜內桑柴火蒸熟待通透曝用地黃汁灑勻再曝乾如此蒸曝九遍乾稱十兩當歸洗淨去蘆頭焙乾七兩五錢穿心巴戟七兩酒浸焙乾五味子去核炒焙乾七兩右同於木臼杵搗羅為細末用地黃自然汁銀石器熬成膏為丸如梧桐子大用磁器中貯放每服七十丸食前各進一服用溫酒與地黃煎各半相和送下畏蕪荑忌豬羊血至如誤食亦無大惡只是解當日藥力無效如小便渾濁加澤㵼七兩如大便祕澀加柏子仁七兩氣不順加木香七兩楮實丸出聖惠方能治積冷氣衝胸背及心痛有蛔蟲痔漏痃癖氣塊積聚心腹脹滿兩脅氣急食不消化急行氣奔心肋并疝氣下墜飲食不下吐水嘔逆上氣咳嗽眼花少力心虛健忘冷風偏風等坐則思睡起則頭旋男子冷氣腰疼膝痛冷痺風頑隂汗盜汗夜多小便泄痢陽道衰弱婦人月水不通小腹冷痛赤白帶下一切冷氣無問大小服之能明目益力輕身補暖楮實一升水淘去浮者微炒搗為泥桂心四兩牛膝半斤去苖乾薑三兩炮製銼右為末煮棗肉和丸搗五七百杵丸如梧桐子大每日空心以溫酒下五十丸大補丸出宣明論専治男子脾腎不足不問久新者陳蘿蔔陳韭子並炒蕤仁去皮各五錢麝香少許穿山甲七片酒浸右為細末蜜和丸如櫻桃大每服一丸溫酒送下食前空心服人參固本丸一名地黃固本丸出如宜方夫人心生血血生氣氣生精精盛則髭髮不白顔貌不衰延年益壽其夭閼者多由服性熱之藥不能滋生精血也而藥之滋補者無出生熟二地黃天麥二門冬人徒知服二地黃不知服二門冬為引也蓋生地黃能生精血天門冬引入所生之地熟地黃能補精血用麥門冬引入所補之地四味互相資助本草又以人參為通心氣之主五味并歸于心而藥之滋補誠無過也生地黃洗熟地黃洗又蒸天門冬去皮麥門冬去心各一兩人參五錢右為細末煉蜜丸如梧桐子大每服五十丸空心溫酒鹽湯送下十日明目二十日不渴自此可致長生也生地黃煎補虛損填骨髓長肌肉去客熱生地黃汁五升棗六枚白蜜一升犛牛酥三合好酒三合右先煎生地黃汁如稠糖攪不停手次入棗膏蜜煉如糖煎成可丸如彈丸日以酒服一日一服漸至二服食訖以酒送含咽並得無所忌唯禁蕪荑祕元丹一名祕精丸出御藥院方能助陽消隂正氣溫中治內虛裏寒冷氣攻心脅肋脹滿臍腹刺痛嘔逆泄㵼自汗時出小便不禁陽氣衰微手足厥逆久虛下冷真氣不足一切虛冷並宜服之方見本門補虛固精類磁石酒出千金方善療丈夫虛勞冷氣骨中疼痛陽氣不足隂氣下疥一作痛熱方磁石石斛澤㵼防風各五兩杜仲桂心各四兩天雄桑寄生天門冬黃耆各二兩石南二兩狗脊八兩右㕮咀以酒四斗浸漬服三合漸加至五合日再服亦可單漬磁石服之雞清丸出瑞竹堂能治男子婦人精滑下元虛冷及疝氣症婦人經脈不調大人小兒皆可服方見本門內補虛固精類金液丹出聖濟總録硫黃十兩精瑩者研碎入罐子及八分為度黃土一掬同搗為泥只用益母草根泥搗亦可水鑑草兩握稻田中生一莖四花如田字亦名水田草獨莖佳石龍苪兩握又名狗蹄草右固濟藥罐子均厚半寸置地以瓦覆罐口四靣炭五斤堆定以熟火一斤自上燃之候藥罐瓦通赤口縫有碧熖急退火以微火三斗覆至冷剖罐取藥削去沉底滓濁如前再煆通以五煆為足藥熟如雞卵氣急可用三煆止取出罐埋潤地一宿又以水煮半日取藥桞木椎研頻滴水候揚之無滓更研令乾每藥一角用蒸餅一兩湯浸同杵丸之曝乾金液丹舊方治病甚多大體治氣羸凡久疾虛困久吐痢不瘥老人臟祕傷寒脈微隂厥之類皆氣羸所生服此多瘥大人數十丸至百丸小兒以意裁度多少皆粥飲下羸甚者化開灌之小兒凡吐痢垂困藥乳皆不入者併與數十丸往往自死得生一每遇患者才覺腑臟稍祕及飲食或少似有乍寒壯熱立便取溫米飲服藥五十丸早晨一服日午一服晚更一服如此頻服一二百丸其疾當時減退必逐下腹中積滯次日又更一兩服小便清便是效也差了日只可一服一無患逐日早服二十丸至三十丸諸疾永不生一旦遇有患更不問疾之冷熱但取藥服之以效為度自然見神效别藥更不宜雜服亦不得著别藥吐㵼此藥自然㵼與常不同不問丈夫婦人老少有患並服無忌一生子留末細研以米飲調以匙子灌之夜啼心驚彌月有疾涎者並速研藥一分已來令服之日二服自然便效逐下積物多多與服並無忌若三五歲患者無論㵼痢並服得一患㵼痢不止以黃連貝母二味煎湯下藥恐嫌苦杵羅入等分蒸餅丸如梧桐子大米飲下一若患腸風痔漏用前末等分依前法丸服亦米飲下四柱散治丈夫元臟氣虛真陽耗散兩耳常鳴臍腹冷痛頭旋目暈四肢倦怠小便滑數泄㵼不止凡臟氣虛弱者悉宜服之方見本門補虛益氣駐顔補益人出本草以麋角刮取屑熬香酒服之巨勝丸一名烏銀丸出御藥院方治男子筋痿小腹不利小便頻數腰背疼痛不能久立立則腿膝麻冷難以屈伸思意多忘耳內蟬鳴久服不闕滋血氣壯元陽髭鬢反黑令人不老添精補髓益壽延年婦人服之亦可巨勝子甘菊花去心旋復花去萼吳白芷切白茯苓去皮肉桂去粗皮蓽澄茄去枝牛膝去苖酒浸覆盆子去枝逺志去苖心熟乾地黃焙各一兩旱連去莖葉七錢五分右各修治畢除野芝麻外共為末再與野芝麻同碾羅勻細酒煮麵糊丸如梧桐子大每服四五十丸空心溫酒下日進二服忌羊血生蔥蘿蔔等碙砂丸出聖濟總録能補諸虛碙砂飛研五錢硫黃研三分白礬研附子炮製去皮臍各一兩木香一分白附子炮蘹香子炒乾薑炮蓽澄茄乾葛去土炒芎藭青橘皮湯浸去皮焙各一兩右為末水浸炊餅和丸如雞頭實大空心鹽湯或溫酒嚼下一兩服甘草丸安養五臟長肌肉調經脈下氣補脾胃益精神令人能食強健倍力甘草四兩炙人參二兩白术二兩芍藥二兩黃耆二兩逺志二兩去心大麥蘖二兩右為散以棗膏和蜜攪調和藥令成丸食後少時以酒或飲任下五十丸如桐子大漸加至七十丸日再長服勿絶盡即更合非止一劑即停多分兩恐難盡又壞分兩少服盡更合常得新藥服忌海藻生菜桃李雀肉陽液方治諸虛百損氣血勞傷因病久深變生膈腹脅肋刺痛噎痞心胸食結不消噦逆嘔水翻胃吐食大便硬祕形瘦體枯以致難救者黃米二升醋煮粥麯細末三升糯米二升醋煮粥右量寒溫和器內停貯候其沉澄之時又入餳稀六斤等候成糟粕訖自然上清下沉以成湯液晝夜十二時辰分三度一度一服俟藥氣澄沉後停待一時溫服湯液一盞液後又候一時更吃白餳數塊日夜長短勻服三飲液食餳均九度飲食陽液造作如前食藥相應順生養氣諸虛勞損百日獲安如故三建湯出和劑方能治真氣不足元陽久虛寒邪攻衝肢節煩疼腰背酸楚自汗厥冷大便滑泄小便白濁及中風潮涎不省人事傷寒隂症厥逆脈微皆可服之天雄附子大川烏各炮去皮臍淨稱一兩右銼散每服四錢水二盞薑十片煎不計時服氣不順加木香沉香胃冷加丁香胡椒名丁胡三建湯自汗加肉桂小麥補虛損出本草取山藥以乳作水煮服之治虛損出本草以牡蠣肉煮食之服附子法出十便良方虛人合服附子欲其不濕不燥以沉香烏藥磨水令濃厚以附子切片約重三錢和生薑三錢重用此水一盞半煎至七分空心食前溫服烏藥沉香須各磨欲得其濃方可無烏藥不可無沉香蒼术丸出瑞竹堂主治腰腿疼痛明目暖水臟并小腸疝氣大有補益蒼术一斤用泔浸去皮切作片用生蔥白一斤加鹽二兩同炒蒼木黃色為度揀去蔥不用川椒微炒白茯苓去皮小茴香各四兩微炒右為末酒糊丸如梧桐子大每服五七十丸空心酒送下坎離丸滋腎水益元氣補下元不足去膀胱積熱知母一兩黃柏黃連各二兩右為末水丸如梧桐子大食前服又方出東垣蘭寶方苦葶藶酒洗炒石膏五錢覺肚冷勿用薑黃一錢五分苦參二錢黃柏酒炒各五錢知母酒炒黃連淨一錢肉桂三分右為極細末打薄糊為丸如梧桐子大每服一百丸空心下用食壓之靈砂丹一名靈砂丸出和劑方藥性溫無毒主五臟百病益精養神補氣明目安魂魄通血脈止煩熱鬱滿殺邪魅善治榮衛不交及隂陽不升降上盛下虛頭旋氣促心腹疼痛翻胃吐逆霍亂轉筋臟腑滑泄赤白下痢久服通神輕身不老令人心靈此丹按仙經服餌之法會五行符合之妙體性輕清不隨煙焰飛走男女老幼皆可服方見本門補壯元陽類茸附湯出危氏方能治精血俱虛榮衛耗損潮熱自汗怔忡驚悸肢體倦乏凡是一切虛弱之症皆宜服之鹿茸去毛酒蒸一宿附子炮去皮臍一兩右㕮咀分作四處服水二盞生薑十片煎至八分去滓食前溫服椒附散出直指方専治腎氣上攻項背不能轉側冷痺不仁熟附子末好川椒右每服附子末二大錢川椒二十一粒用白麵塞滿水盞半薑七片煎半盞去椒入鹽少許通口空心服療性熱虛羸補益用生地黃一石細切蒸之極熟以好酒一斗灑之於篩子上曝乾搗併手丸每食前含一丸如胡桃大咽令盡日三五度坎離丸黃柏酒炒知母酒炒各等分右為細末滴水為丸如桐子大每服一百丸至一百五十丸又方出本事方専治下部冷極臍下及小腹痛不可忍者一服取效赤石脂乾薑各十兩右二味為末麵糊為丸如豆大每服十丸至二十丸空心飯飲下日進三服主聰明調血氣令人強壯及主五臟益精去三蟲輕身不老變白潤肌膚暖腰腳出本草取萎㽔根花葉隂乾和漆葉服有熱不可服晉嵇紹有胸中寒疼每酒後苦唾服之得愈昔華陀入山見仙人所服以告服之壽百歲也治男女傷中隂氣不足利血脈益精氣用羊髓和酒服之集驗鹿茸丸出直指方能治諸虛勞倦補養心腎滋養血氣鹿茸酥炙熟地黃當歸酒浸焙枸杞子附子炮酸棗仁慢火炒去皮逺志薑汁醃取肉炒沉香牛膝酒浸焙山藥炮蓯蓉酒浸焙各一兩麝香五錢右為末煉蜜丸如桐子大每服五十丸空心鹽湯下薯蕷散出千金方能補丈夫一切病不能具述也續斷一方用逺志茯苓一方用茯神薯蕷荆實一方用枸杞子牛膝兔絲子巴戟天杜仲各一兩蓯蓉二兩五味子山茱茰一用防風蛇床仁二分右為末篩酒服方寸七日二夜一惟禁醋蒜外無忌腹疼加逺志茯苓體澀加柏子仁服三兩劑益肌肉亦可為丸每服三十丸日二夜一以頭靣身體暖為度其藥和平不熱調五臟久服健力不可當婦人服之靣生彩色人參丸一名青春丸出本事方能治後生丈夫婦人房事不節漸至虛損行步如踏空夜夢從髙墜下及夢大水溺水諸般水夢並皆治之常服永無虛病雖十歲亦可服人參白茯苓地骨皮真者川牛膝去苖酒浸一宿川當歸去蘆酒浸一宿熟地黃各等分右為末煉蜜丸如梧桐子大每服三十丸酒下或鹽湯空心下常服只二十丸用三五匙乾飯壓下服三五日後飽飯後及臨睡時服局中雞蘇丸五十粒不嚼破熟水吞下須如此相間服前藥百病皆去雖百歲髭髮不白牡蠣散一名黃耆散出德生堂専治諸虛不足及新病暴虛津液不固體常自汗夜卧即甚久而不止羸脊枯瘦心忪驚悸短氣煩倦黃耆去苖土麻黃根洗各一兩牡蠣米泔浸刷去土火燒通赤右為粗末散每服三錢水一盞半小麥十餘粒同煎至八分去滓熱服日一服不拘時候一方入蔥白三寸煎治虛勞盜汗一方酒煎服治夢遺精淋澀一方有知母碙砂丸出聖惠方専治元氣虛冷臍腹疼痛碙砂一兩細研硫黃一兩細研水飛過自然銅一兩細研桃仁一兩湯浸去皮尖雙仁麩炒微黃乾蝎一兩炙黃木香一兩阿魏一兩麵裹煨令熟為度右研為末諸藥令勻燒粟米飯和丸如小豆大每日空心以鹽湯下十五丸陸杭膏出千金方専治虛冷枯瘦身無精光虛損諸不足牛髓羊脂二升酥經心録用豬油生薑汁白蜜各三升右先煎酥令熟次入薑汁次入蜜次入羊脂牛髓微火煎三五沸令薑汁水氣盡即膏成攪令凝溫酒隨人量飲不限多少服之令人肥健去熱一云治百病勞損風濕補益神效男女通服之小鹿骨煎出千金方能治一切虛羸鹿骨一具碎一云鹿茸骨枸杞子切二升右各以水一斗别器各煎汁五升去滓澄清乃合一器共煎取五升日二服皆用大斗麋角丸出聖惠方能治五臟虛損腰腳疼痛久服益肌填骨髓好顔色耐寒暑祛風破氣髭髮潤黑麋角屑一斤以酥拌炒微黃熟乾地黃巴戟黃耆牛膝人參去蘆頭獨活萆􅐺白茯苓桂心附子澤㵼肉蓯蓉酒浸一宿刮去皺皮炙乾續斷芎藭製檳榔當歸防風鹿角膠搗碎炒令黃色白蒺藜微炒去刺以上各一兩右為末以生地黃汁一大盞酒一大盞相和入酥半合煎成膏和諸藥末若硬即用煉蜜同和搗五七百杵丸如梧桐子大每日空心以溫酒下三十丸加至四十丸鹿血丸治諸虛百損精血俱耗血少不能養筋精虛不能實骨筋骨痿弱靣色黧黑耳鳴氣短目暗昏花腰脊疼痛足膝酸弱步履艱難小便頻數但是一切虛損之症悉能治婦人虛弱亦宜服桑寄生二兩鹿角鎊川續斷銼酒潤鹿茸麋茸去毛酒蒸麋角煆附子炮去皮川烏炮去皮鍾乳粉陽起石煆川巴戟捶碎沉香川牛膝去蘆酒浸川萆􅐺各一兩五味子絲子淘酒蒸擂焙二兩宣木瓜二枚去皮穰蒸爛椒紅去目及閉口者微炒出汗取紅五錢右為細末刺鹿血乘熱搜和搗千百下丸如桐子大每服一百丸空心食前用鹽湯溫酒任下婦人用淡醋湯下補益還少丸出簡易方服此藥大補虛損氣血凝滯目暗耳聾恍惚精神困倦脾胃怯弱飲食無味肌瘦體倦山藥牛膝各一兩酒浸白茯苓去皮枳實五味子杜仲去皮薑汁拌酒炙香熟山茱茰巴戟逺志去心熟地黃肉蓯蓉酒浸一宿切焙石菖蒲枸杞子各五錢蒼术八兩蓮肉四兩此藥並為末入棗餅肉為丸如梧桐子大每服五十丸空心食前溫酒鹽湯任下日進三服若一服加一丸數服五日眼頭有力十日眼明半月筋骨盛二十日精神爽一月夜思飲食此藥無毒平補性溫百年無忌久服牢牙明目壯髓百病俱除永無腫痢行步輕健看時加減若熱加山梔子心氣不寧加麥門冬精神恍惚加五味子陽氣不舉加續斷常服牢牙去風顔色光澤功效非常大薯蕷丸出千金方能治男子婦人虛損傷絶目暈頭眩骨節煩痛飲食微少羸瘦百病薯蕷附子人參澤㵼各八分天門冬乾地黃黃芩當歸各十分乾漆杏仁阿膠各三分白术白斂古今録作防風芍藥石膏前胡桔梗各四分乾薑桂心各五分大黃六錢五味子一錢六分甘草二錢大棗一百枚大豆卷五分古今録作黃耆右為末蜜和棗膏搗三千杵丸如梧桐子大酒服五丸日三漸增至十丸麋茸丸出聖惠方能治虛損益下元暖水臟治風冷氣調三焦利腰腳麋茸二兩去毛塗酥炙各一兩腽肭臍酒洗微炙巴戟附子炮製去皮臍肉蓯蓉酒浸一宿刮去皺皮炙乾各一兩石斛一兩去根銼澤㵼逺志去心山茱茰續斷天麻五味子酸棗仁微炒蘹香子微炒柏子仁各一兩桂心白茯苓蛇床子絲子一兩酒浸一宿曝乾杜仲去皮炙微黃銼枳殼麩炒微黃去穰各三分芎藭當歸萆􅐺銼各五錢牛膝一兩五錢去苖漢椒五錢去目及閉口者微炒去汗揀淨右為末煉蜜和搗五七百杵丸如梧桐子大每服空腹及晚食前以溫酒下四十丸椒附丸出和劑方能補氣溫和五臟治下經不足內臟積冷臍腹強急痛引腰背四肢倦怠靣色黧黑唇口乾燥目暗耳鳴心忪短氣夜多異夢話少精神時有盜汗小便滑數夢遺白濁腳膝緩弱舉動乏力心腹脹滿不進飲食並宜服之附子炮製去皮臍川椒去子炒出汗檳榔各五錢陳皮牽牛微炒五味子石菖蒲乾薑炮各一兩右銼碎以好米醋於磁器內用文武火煮令乾焙為細末醋煮麵糊為丸如梧桐子大每服三十丸溫熟酒或鹽湯下或空心食前吞下婦人血海冷當歸酒下泄㵼飯飲下冷痢薑湯下赤痢甘草湯下極暖下元治腎氣虧乏兼療腰疼正元丹開三焦破積聚消五穀益精髓祛冷除風能令陽氣入腦補益極多不可盡述黃精揀淨二斤銼蒼术去皮北棗各一斤右三味煮爛為度漉出曝乾揀去棗子將二味入青鹽一兩小茴香二兩同炒香熟為末却將棗肉為丸如梧桐子大每服三十丸溫酒鹽湯任下碙砂丸出聖惠方能治腎臟虛憊腰間疼痛小便滑數冷氣攻逐虛損不足方見本門補虛固冷類補虛乏出本草以肉蓯蓉作羊肉羮服之極佳亦可生噉益人出本草取初生嫩色皂莢葉芽作蔬茹食之通靈玉粉方一名扁鵲玉壺丸出聖惠方能治腰膝暖水臟益顔色其功不可具載用硫黃半斤以桑柴灰五斗淋取汁煮三伏時時以鐵匙抄於火上試之候伏火即止候乾以火煆之如未伏更煮以伏為度細研為散又穿地作坑深一尺二寸投水於中待水清取和硫黃末於磁鍋內煎之候欲乾即用鐵𨫼子一個仰著入細砂砂上布紙下著微火令熬熱即於磁鍋內抄硫黃於紙上滴之自然如玉色光彩射人此號通靈玉粉細研以飯和丸如麻子大每日空心以鹽湯下十丸作散服亦以鹽湯調兩匙極有功效余鄉人王昭遂合服之年九十顔貌如童子夜視細字力倍常人彭祖丸一名神仙丹無所不療延年益夀通臟腑安神魄寧心意固榮衛開益智慧寒暑風濕氣不能傷人又療勞虛風冷百病方見本門平補類益夀地仙丸一名草還丹能補五臟填骨髓續絶傷黑髭髮和血脈輕身健體延年益夀補益丹田治頭風聰耳目方見本門補虛明耳目類蜜煮硃砂煎丸出十便良方有大效固中下益脾胃光明成顆粒硃砂每一兩用蜜四兩先將硃砂用綿裹定將蜜置銀器內或磁器中下硃砂於蜜內於重湯煮三晝夜取出用新井水洗淨又用溫熟水再洗蜜盡微火焙乾研令細極右用蒸熟軟爛棗肉去核研爛絹帛裹硃砂取出同和丸如梧桐子大每服五七十丸米湯下忌羊血空心食前日進二服紫金丹出衛生藏家寶方治一切虛憊消腹中痞塊惡心泄㵼不食鹿脊一具帶骨肉全者銼作小塊舶上硫黃五錢好碙砂二錢以上各研細入無灰酒三升同浸鹿骨一日取焙乾再浸再焙酒盡為度末另用破故紙三兩禹餘糧四兩火煆醋淬三次舶上茴香三兩炒用川烏頭三兩炮巴戟一兩去心石中黃一兩醋淬太隂玄精石一兩右件同為末入前鹿脊骨末拌和極勻酒煮糯米糊為丸如雞頭大硃砂為衣每服一丸空心溫酒下臘月合之可久收若無鹿脊骨以羊脊骨代之亦得覆盆子丸出衛生藏家寶方熟乾地黃二兩兔絲子五味子枸杞子覆盆子牛膝葫蘆巴綿黃耆以上各一兩右為末煉蜜丸如桐子大每服三十五十丸食前以生地黃汁熬成膏每服半匙用酒調送下神禹疏鑿丸出衛生藏家寶方治元氣衰少膀胱津液雖藏而不化又遇上焦有寒不能引導隂陽開通閉塞決瀆之官自失所司水道無從而出與氣相壅停留膈間久而為痰飲漸漬脾土脾既得濕而化鬱蒸淫於肢腹上浮於肺腎尤虛者則獨乘於下部是以人素盛而令衰瘦膈間常有水聲脅肋脹滿上氣喘急四肢沉重遍身浮腫或偏注腰腳小便減少飲食不思此藥壯元氣補脾腎逐痰飲除濕腫非若破故紙輩以反收水液甘遂類以虛經氣老幼虛皆可服餌久之大有效吳茱茰六兩銼茴香揀蒼术銼陳橘皮銼青鹽以上各四兩川椒去子閉目者厚朴銼去皮乾薑銼以上各三兩右以水一斛同於磁器內煮水盡為度取出焙乾附子炮去皮臍枳實去瓤麩炒焦黃各六兩木瓜四兩乾者川烏炮赤茯苓各三兩木香一兩五錢天雄如無以大附子代之椒目炒木通炮好硫黃舶上者去沙石另研以上各三兩陽起石二兩五錢真者酒煮半日另研極細右同為細末然後入陽起石硫黃二味拌勻生薑自然汁打麵糊為丸如梧桐子大每服五十丸溫酒或米飲下固真丹出祕方木香二錢母丁香二錢沉香二錢麝香五分頭紅花三錢川楝子三錢細墨二錢韭子三錢酒浸一宿絲子三錢酒浸一宿擂細成餅曝乾為末牛膝三錢酒浸一宿破故紙三錢同前製巴戟三錢同前肉蓯蓉三錢同前蓮肉三錢青鹽三錢蓮心五錢茴香三錢穿山甲三錢酥炙黃益智三錢地龍去土三錢川木通三錢葫蘆巴三錢硃砂三錢右二十三味青鹽蓮心細墨另研共為末酒糊為丸如桐子大每服三十丸溫酒送下空心服訖乾物壓之羊肉湯出楊氏家藏方能治男子婦人一切虛損不足肌體羸弱不思飲食生羊肉半斤精者分作八服生薑半斤切片子當歸洗焙川芎人參去蘆頭白术肉豆蔲麵裹煨附子炮去皮臍以上各二兩右件㕮咀每一料分作八服水三盞煎至一盞熱服韓魏王自養丸出衛生藏家寶方治真氣逐風冷填骨髓治肌體羸瘦精神昏倦減食痞滿嘔吐心腹常痛腰重腿痛泄㵼無時川烏頭四兩切作小塊蛤粉炒黃紅椒一兩酒浸去目川楝子取肉三兩舶上茴香四兩炒牛膝一兩去苗酒浸破故紙四兩酒浸炒巴戟一兩半酒浸葫蘆巴一兩半酒浸絲子二兩酒浸蒸熟研焙入衆藥附子一兩炮去皮臍山藥四兩右為細末醋糊為丸如梧桐子大空心鹽湯或酒下三十丸棗附丸出太醫局方能治諸虛不足臟腑不調常服資血氣進飲食大附子三個右用貢棗五十個煮附子五分去皮臍另用留棗五十個再煮附子軟片切乾搗為細末以棗肉為丸如桐子大每服二三十丸空心米飲下黃耆建中湯出太醫局方治男女人諸不足小腹急疼痛脅肋腫脹臍下虛滿胸中煩躁靣色萎黃唇口乾燥少力身重胸滿短氣腰背強痛骨肉痠疼行動喘乏不能飲食或因勞傷過度或因病後不復並宜服之方見本門前補虛益血氣延壽丹出劉先生直指方用治元臟虛冷筋骨緩弱肝腎不足精神困乏久服清心益志和血駐顔延年益壽牛膝去蘆酒浸一宿絲子酒浸一宿逺志去心地骨皮石菖蒲甘菊花熟乾地黃右七味各等分同為細末用浸藥酒熬麵糊為丸如梧桐子大每服十五丸空心臨卧日進三服溫酒下百無所忌大金液丹出淡療方硫黃三斤取火鼎煉取一斤半鹿茸真蜀地者十二兩炮去皮毛鹿角霜如上大天雄大川烏大附子並真蜀地者各十二兩炮去皮臍肉蓯蓉四斤真佳者川牛膝真地道者右用鹿角膠為丸原方無蓯蓉牛膝愚恐其燥雖添之亦非常服之劑然大㵼大吐大虛脫證得之極妙此丹燥甚本難以許人服餌然卒暴虛脫孤隂絶陽救急之際又不可廢古人之法也且人之臟腑不同有宜於丹者有不宜於丹者嘗聞有一趙知府雖平生酒色作喪然其服藥亦甚有不可曉處每日早晨煎乾薑熟附湯吞此丹百粒方能健痰否則身體倦弱不能支持遂與此丹相依為命壽至九十他人進一粒半粒恐為害此老服之猶家常茶飯賴之以夀其身臟腑之不同如此真不可曉也靈乳丹出淡療方靈砂一兩另研鍾乳五錢另研沉香五錢鎊末乳香五錢桑葉上炙細研沒藥五錢研右為末乳鉢內搗令無聲為度却用半夏為末煮糊為丸如菉豆大另用好硃砂細研為衣建盞內出光磨沉香湯下茸附養氣丹出淡療方専治諸虛不足壯真氣斂元陽代赭石紫石英禹餘糧石赤石脂各二兩右四味用醋淬煆七八次以酥為度共研為末入瓦瓶內鹽泥固濟炭火煆養一日一夜後移埋别地三晝夜出火毒同後藥修合天雄一個去皮臍附子一個炮去皮臍乾薑炮鹿茸煆去血毛鹽酒炙當歸去苖酒浸沉香丁香肉桂去粗皮陽起石肉蓯蓉磁石石燕葫蘆巴炮炒破故紙炒肉豆蔲煨舶上茴香炒胡椒蓽澄茄去蒂牡蠣蝦乳香另研血竭另研硃砂另研沒藥另研鍾乳粉各一兩右二十八味共為細末糯米糊丸如桐子大每服五粒七粒或九粒早晨棗湯吞下或參湯鹽湯下妙在諸丸之上大陽丹出鮑氏方治諸虛百損妙廬山談先生服此百四十餘歲硃砂雄黃雌黃五錢末乳汁半斤生男者右以酒一升同熬乾三次丸如麻子每一丸至三丸米飲下空心服兼服地仙酒老仙酒更妙又方老硫黃不換川椒季一換四兩訶子七十二個七十二日一換各用絹袋盛酒浸七日入半杯酒飲下不必多杯也衛真湯出本事方能治丈夫婦人元氣衰憊榮衛怯弱真陽不固三焦不和上盛下虛夜夢鬼交覺來盜汗靣無精光唇口乾燥耳內蟬鳴腰背倦痛心氣虛乏精神不寧驚悸健忘飲食無味日漸瘦悴外腎濕癢夜多小便腰重冷痛牽引小腹足膝緩弱行步艱難婦人血海久冷經後不調或過期不至或一月兩來赤白帶下漏分五色子宫感寒久不成孕並皆治之此藥大生氣血遇夜半子時腎水旺極之際仗藥力收攝血化精實丹田填五臟諸病未萌之前皆能制治便不復為梗是此藥也每服多寡具列在後川當歸三兩酒浸一宿人參一兩五錢金叉石斛五兩白茯苓木香肉豆蔲山藥以上各三兩生地黃三兩五錢丁香一兩熟地黃溫水洗三兩青皮一兩去白川牛膝二兩童子小便酒各半浸一宿右為細末每服三錢溫酒調鹽湯亦得空心食前一服婦人諸疾用童子小便同溫舊酒調空心下瓜砂丹出朱氏集驗方能治男子婦人諸虛不足心氣不寧夢寐不安手足疼痛腰膝拘攣步履艱難及婦人腳氣衝心嘔吐藥不能下咽者並皆治之蜀醫何殿機傅方硃砂四兩以木瓜十數個每木瓜開蓋去瓤底以下根鋪藥末少許中以紗片塞硃砂一兩蜜拌濕坐於其間仍蓋藥末令滿以木瓜蓋子蓋定篾筌定紗片塞木瓜全個不令散失之如此者二三十個酌以銀盒大小坐於其中銀盒上下仍鋪末藥封蓋定於銀鍋甑中勿用鐵器以桑柴燒文武火蒸七晝夜再換木瓜藥末一次又蒸七晝夜乃止取出硃砂一味攤乾研細以薏苡粉煮稀糊為丸如梧桐子大每服二三十丸茶酒任下諸藥在後黃耆炙當歸逺志去心柏子仁川烏炮木香茯神去木益智仁人參乳香龍齒五味子石斛川椒熟地黃麥門冬白芍藥仙靈脾各一兩鹿茸炙酸棗仁附子炮去皮鍾乳粉各二兩加瓜砂二兩磁石丸出朱氏集驗方専治心腎諸虛不足磁石醋煆黃耆蜜炙覆盆子赤茯苓去皮各五錢乾薑巴戟去心桂心鹿茸蜜炙各三錢蓯蓉酒浸焙乾牛膝酒浸焙乾川椒炒各四錢柏子仁另研防風地骨皮逺志去心各三錢五分大附子一個炮去皮大川烏一個去皮紫稍花去蒂各一兩右為細末酒煮糊為丸如梧桐子大每服三十丸湯酒任下婦人白帶下及男子泄精加龍骨五錢海螵蛸一兩牡蠣五錢鹽泥固濟火煆巴戟丸出朱氏集驗方能治諸虛不足真氣衰憊服之有效川楝子去核葫蘆巴炒白薑炮川椒炒茴香川牛膝酒浸焙破故紙炒山藥木通肉桂去皮牡蠣煆附子炮去皮臍赤石脂右等分為末酒糊為丸如梧桐子大每服五十丸空心溫酒鹽湯下隨症加味子後腎虛頭疼加川芎肺虛咳嗽加五味子欵冬花背勞倦加沉香脾胃不和加蓽澄茄虛瘧寒熱加蜀漆葉心神不寧加龍齒酸棗仁炮去皮殼玉女砂出朱氏集驗方能治男子婦人諸虛百損暖下元固陽暖子宫産後諸虛尤宜服之又専治虛病寒熱自汗尤神此乃潼州許德修名醫遇仙人得此方極驗好辰砂八兩或六兩或十兩絹袋盛若塊打令稍小惟紅者為上再入後藥金毛狗脊去毛熟地黃吳茱茰絲子杜仲瓦松古屋瓦上青毛焙乾去土五味子人參肉豆蔲麵包煨研細桑寄生川萆薢芍藥巴戟去心黃耆牡丹皮去心肉蓯蓉當歸茯神去木茴香洗逺志山茱茰右各一兩裝在一斗瓶內著童子小便五七升將砂袋懸挂瓶中如煮酒法於鍋內著水亦懸藥瓶於鍋中桑柴或間松柴煮五日夜火不要急小便不住增添煮令乾日足取出將砂袋以溫水滌十餘次又換溫水浸半日棄藥不用將辰砂又洗三兩次糯米團子和丸空心棗湯下五粒至十粒加味大建中湯出朱氏集驗方大補諸虛白芍藥官桂黃耆蜜炙附子炮五味子乾薑炮人參鹿茸酒蒸白茯苓去皮川芎半夏當歸酒浸陳皮各一兩甘草五錢右為粗末每服四錢水一盞半薑七片棗一枚煎六分去滓空心服大防風湯出如宜方能治諸虛損兼治風冷腰膝筋骨疼痛熟地黃防風白术當歸杜仲製黃茋炙白芍藥以上各二兩羌活牛膝製人參甘草各一兩右㕮咀每服四錢薑七片棗一枚煎服一方有附子炮川芎各一兩五錢青春丸一名人參丸出如宜方専治少年夢髙墜下水溺行似踏空方見本類前人參丸詵詵絲子丸出如宜方熟地黃逺志龍齒各二兩兔絲子三兩右為細末用山藥糊和為丸如梧桐子大每服五十丸溫酒或鹽湯下空心服沉附湯出如宜方能治上盛下虛氣不升降胸痞氣急附子炮乾薑各五錢沉香白术各一兩甘草一兩五錢右㕮咀薑五片煎空心服又大附子炮作二服薑十片煎磨沉香入藥黑錫丹出如宜方能治五臟俱虛隂陽衰損上盛下虛痰生頭眩沉香葫蘆巴附子製陽起石肉桂破故紙炒茴香炒肉豆蔲製金鈴子木香錫硫砂子各四兩右為末同砂子末酒糊丸如梧桐子大隂乾入布袋令光瑩每四十粒空心薑鹽湯下附子鹿茸丸出十便良方能補諸虛不足鹿茸麋茸附子白龍骨各一兩麝香一分右為末以糯米糊丸如梧桐子大空心晚食前溫酒下一二十丸若覺得力即止不可多服鍾乳散出十便良方専治諸虛不足羸弱不能起止煉成鍾乳麥門冬人參熟乾地黃黃蓍杜仲肉蓯蓉薯蕷石斛各一兩白茯苓甘草各一兩右件藥搗羅為散入鍾乳研令勻每服空心及晚食前以溫酒下二錢黃耆白术散出十便良方能治大人小兒諸虛不足靣黃食少困倦潮熱有時黃耆白术芍藥桂茯苓甘草人參去蘆神麯各一兩右㕮咀每服三錢加生薑棗子煎不計時候日進三四服重校定香茸丸出十便良方専補諸虛不足麝香二錢研鹿茸熟地黃肉蓯蓉牛膝各四兩沉香二兩右搗羅為細末拌勻煉蜜和丸如梧桐子大每服三四十丸空心溫酒或鹽湯任下附子黃耆湯出十便良方能治諸虛不足及大病後氣血不復虛羸少氣腹脅疼痛精神倦怠飲食不進附子黃耆白术當歸蓯蓉厚朴各一兩人參桂心各三分半夏乾薑各五錢甘草一分右件藥搗篩為細末每服三錢以水一盞半生薑三片棗子一枚同煎至八分去滓食前溫服肉丹出十便良方補益老人一切虛症治胃弱飲食不進精羊肉一斤去盡筋皮橫文塊切以好酒半斤加水五升爛煮焙乾研為細末白术神麯各二兩附子肉果縮砂仁乾生薑製陳蒼术半斤右搗羅為細末拌勻以沸湯洗泡蒸餅和為丸如梧桐子大每服五十丸食前溫酒或米飲湯任下固真丹一名補益固真丸出十便良方能治諸虛不足五勞七傷元陽氣虛及小腸腎餘膀胱疝氣諸般淋疾及治婦人産前十八般冷病赤白帶下血出崩漏子宫久冷血海虛弱靣色痿黃並宜此藥方見本門前補虛固精類神仙補益固真丸神仙保真丸出楊氏家藏方能治真元不足臟氣虛弱及胃觸寒氣閉塞下元心腹疼痛自汗厥逆及奔豚發痛上下有聲小腹急脹川楝子去核一兩炒蓬莪茂半兩肉豆蔲半兩麵煨香木香半兩檳榔三枚當歸七錢五分洗淨神麯五錢炒香茴香揀淨者半兩半一半炒香一生用附子一兩炮製去皮臍令取末碙砂光明不夾石者二分用無灰酒一大盞將砂入酒內銀石器內慢火熬化濾去滓放冷將附子細末打糊搜和餘藥末右件除附子碙砂外餘藥並為末將熬下附子碙砂糊搜和和上件細末為丸如梧桐子大每服五十丸將炒桃仁七枚同藥用溫酒一盞送下鹽湯亦得空心食前如大痛時併進二服保真丸出衛生藏家寶方治真氣虛憊下焦傷竭臍腹強急腳膝痠疼精神困倦靣色枯稿小腸疝氣奔豚腎餘夜夢遺精小便滑數常服壯陽補腎益精髓肉蓯蓉酒浸一宿舶上茴香炒香川牛膝白蒺藜炒搗去尖葫蘆巴炒香補骨脂炒香黃耆鹽水浸炙附子炮去皮臍杜仲去粗皮炒斷絲絲子酒浸二宿蒸熟研細白茯苓山茱茰薯蕷炮桂心去粗皮川楝子去油南木香濕紙裹煨以上各一兩右為細末煉蜜為丸如梧桐子大每服五十丸鹽酒任下食前服坎離丹出朱氏集驗方能兼濟水火伏火靈砂陽起石酒煮磁石火煆醋淬鍾乳粉各一兩五錢龍齒二兩黑豆蒸右為細末麵糊丸如菉豆大每服十五粒空心用棗肉湯下既濟丹出朱氏集驗方専治心腎不足靈砂陽起石煆鍾乳粉磁石煆鹿茸茯神各一兩沉香半兩硃砂一錢為衣右為細末麵糊丸如梧桐子大每服二十丸空心棗湯下既濟丹出朱氏集驗方能升降心腎磁石好者煆醋淬研細水飛辰砂蜜煮尤妙酸棗仁人參各二兩乳香五錢右為細末神麯和為丸如梧桐子大每服三五十丸燈心棗湯下不拘時候既濟玉關丸出朱氏集驗方能治憂思過度心腎不足水火不能交養神志不寧此藥壯真氣益心腎水火既濟不生諸疾真辰砂一兩滳乳香五錢法麯一升以上用銀器以慢火煮令極乾刮下為末却入附子罐內大附子四隻生去皮臍作罐子留頂蓋却將煮了辰砂等勻在附子罐內附子肉亦入在內有餘木瓜肉以元頂蓋定線扎牢固為妙宣州花木瓜兩隻大者中分作兩片去皮穰却將扎定附子四隻分入木瓜內以竹簮定用大麥坐木瓜蒸之候兩時辰木瓜香熟却取出取附子切作片子焙乾其辰砂另研細末木瓜即另研為膏補骨脂熟地黃酒浸兔絲子杜仲薑炒各一兩五錢鹿茸川當歸逺志柏子仁沉香巴戟肉蓯蓉牛膝北五味子石斛綿茋各一兩右件修製了同附子為細末入辰砂乳香令勻更用山藥白茯苓各一兩右為細末或以末入木瓜亦得打糊用木瓜膏子作一處搜和為丸每服五七十丸至一百丸溫酒鹽湯吞下久服腰膝不痛小便如水功效甚驗不可具述理諸虛人榮衛不調和者本草以萎蕤煮汁飲之療虛損絶傷出本草以續斷葉莖搗取其汁飲之補虛損出本草以水雞食之兼縮小便茯苓散大補益縮小便右用好白茯苓不拘多少用湯數滚取出曝乾為末每服二錢空心溫酒湯下五痿附論三因方論云夫人身之有皮毛血脈筋膜肌肉骨髓以成形內則有肝心脾肺腎以主之若或妄用喜怒不節勞佚兼致內臟精血虛耗榮衛失度發為寒熱使皮血筋骨肌肉痿弱無力以運動故致痿躄狀與柔風腳氣皆相類以脈證并所因别之不可混濫柔風腳氣皆外所因痿躄則內臟氣不足之所為也又曰病患肺熱皮虛弱薄者足痿躄其色白而毛敗名曰皮痿由肺熱葉焦使然也肺為五臟長有所失亡所求不得則發肺熱而肺葉焦論曰五臟因肺熱焦發為痿躄病患心下熱膝腕樞細如折去而不相提挈脛筋促緩不能任其地其色赤而脈絡溢名脈痿皆由心衰太甚陽氣內動數溲血故病論曰大經空虛發為脾痺傅為脈痿病者肝熱口苦筋膜急攣其色蒼而爪枯名曰筋痿由思想無窮所願不得意淫於外入房太甚宗筋弛緩及為白淫故下經曰筋痿者生於肝使然也病者脾熱胃乾而渴肌肉不仁其色黃而肉蠕動名曰肉痿由漸於濕地也用水為事居處下澤潰濡痿而不仁故下經曰肉痿者得之濕地下也病者腎熱腰脊不舉骨枯而髓減其色黑而齒稿名曰骨痿因逺行勞倦遇大熱而渴陽氣內乏熱舍於腎致水不勝火則骨枯而髓虛故下經曰骨痿者生於大熱也方龍骨丸治膀胱賢冷坐起欲倒目􅉩􅉩氣不足骨痿方龍骨柏子仁乾地黃甘草防風各五分禹餘糧石白石英桂心黃耆茯苓各七分五味子羌活人參山茱茰附子各六分玄參芎藭各四分磁石杜仲乾薑各八分右為末煉蜜和丸如梧桐子大空心服三十丸加至四十丸起痿丹出永類鈐方能治諸痿法當養陽明與衝脈陽明主胃乃五臟六腑之海主潤宗筋束骨之利機關衝脈者諸經之海主滋灌溪谷與陽明合養於宗筋會於氣衝屬於帶脈絡於督脈故陽明虛則宗筋縱滯筋不引故足痿不用也治之各補其榮而通其虛實和其逆順至筋脈骨肉各得其時病乃已矣腎經虛敗遂成骨痿腰腳難舉日加困乏附子炮去皮臍枸杞子揀去枝梗肉蓯蓉酒浸焙乾沉香不見火官桂硃砂另研熟地黃酒浸蒸焙母丁香各一兩木香不見火陽起石火煆天雄炮去皮臍或用鹿茸亦可硫黃麝香另研各一兩膩粉五錢白丁香少許右為末煉蜜丸如彈子大每用一丸以薑汁火上入藥鎔化用手點藥於腰眼上磨擦至藥盡用至二十丸大有神效若有他處癱瘓風疾加皂角一片去筋捶爛薑汁浸一宿瓦上焙乾為末入前藥內依法用藿香養胃湯出三因方能治胃虛不食四肢痿弱行立不能皆由陽明虛宗筋無所養遂成痿躄藿香白术白茯苓神麯烏藥去木縮砂仁炒薏苡仁炒半夏麴人參各五錢蓽澄茄甘草炙各三錢五分右銼散每服四錢水一盞半生薑五片棗二枚同煎七分去滓不時服芎桂散出危氏方能治四肢疼痛軟弱行履不便川烏二兩切作片子水浸一宿切作蒜子條更以米泔浸一宿不洗曝乾麩炒微赤為度乾了稱川芎一兩五錢桂心一兩甘草炙乾薑炮各一分右為末每服二錢溫酒下日三服麋角丸出危氏方能治五痿皮緩毛瘁血脈枯稿肌肉薄著筋骨羸弱飲食不進房事不與四肢無力爪枯髮落眼昏唇燥疲憊不能支持熟地黃四兩大附子生去皮臍一兩五錢麋角鎊一斤重酒浸一宿右用大麥粉二升以一半在上以二布巾隔覆炊一日取出藥與麥另焙乾為末以浸藥酒添清酒煮麥粉為糊搜和得所杵三千下丸如梧桐子大每服五十丸溫酒或米飲下食前服治筋痿兩手握固無力兩腿行動無力急飢食少此名筋痿其病症候多口舌生瘡忽生痰涎忽然睡中涎溢身上燥熱忽時增寒項背強急小便赤白不定大便忽冷忽熱不調宜喫此方荆芥穗蔓荆子連翹防風羌活獨活研木香牡丹皮山梔秦芁去土炒麻黃去根牽牛子醋煮以上各一分右細杵羅為末每服一錢食後熱湯調下連滓喫金剛丸出保命集方能治腎損骨痿不能起于床宜益精萆薢杜仲炒去絲蓯蓉酒浸兔絲子酒浸等分右為細末酒煮豬腰子為丸每服五七十丸空心酒下牛膝丸出保命集方能治腎肝損骨痿不能起于床筋緩不能收持宜益精暖中牛膝酒浸萆薢杜仲炒去絲蓯蓉酒浸防風絲子酒浸白蒺藜各等分右為細末酒煮豬腰子搗丸如梧桐子大空心酒下五七十丸煨腎丸出保命集方能治腎肝及脾損榖不化宜益精暖中消榖牛膝萆薢杜仲蓯蓉絲子防風白蒺藜葫蘆巴破故紙等分桂五錢右和劑服如金剛丸法腰痛不起者甚效治莖痿出本草以筆頭灰酒服之良普濟方卷二百二十六
