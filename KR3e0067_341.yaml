body:
  text: 普濟方卷三百四十一明周王朱橚撰妊娠諸疾門大便不通附論夫妊娠腸胃有風加之挾熱津液不足氣道否澀故令腸胃枯燥大便不通甚則呼吸奔喘腹脹乾嘔方羌活丸治妊娠熱在臟腑大便祕澀羌活二兩半大麻仁三兩檳榔五枚防風枳殼各一兩大黃一兩半木香一兩右搗羅六味為末與麻仁同研勻煉蜜和丸如梧桐子大每服二十丸溫水下食前服日三以微利為度檳榔丸治妊娠大便熱結旬日不通檳榔一兩木香半兩大黃二兩青橘皮焙半兩牽牛子二兩用一半生一半炒右為末煉蜜和劑更於臼內塗酥杵勻丸如梧桐子大每服二十丸空心下溫水服麻仁丸治妊娠大便不通腹痛不能食養津液潤腸胃大麻仁四兩人參訶梨勒各二兩大黃半兩右先搗後三味為末次入麻仁煉蜜和劑更於臼內塗酥杵勻丸如梧桐子大每服三十丸空心溫水下大便通即止踈氣黃耆丸治妊娠大便不通黃耆枳殼各一兩威靈仙二兩右為末用麵糊和丸如小豆大每服三十丸溫水下不拘時未通稍加之大棗湯出永類鈴方治妊娠臟燥悲傷欲哭伏如神靈伸欠者甘草三兩小麥一斤大棗十枚右㕮咀每服半兩水二碗煎至一盞去滓溫服治妊娠大便祕澀出大全良方枳殼三兩防風二兩甘草炙一兩右為細末沸湯點服一二錢日三枳殼丸治妊娠大便結塞不通臍腹鞕脹不能安臥氣上喘逆枳殼一兩半大黃二兩半右為末煉蜜和丸如梧桐子大每服二十丸空心米湯下未通再服以通為度潤腸丸治妊娠大便不通腹脅堅脹枳殼大麻仁各一兩右研勻煉蜜和丸如梧桐子大每服三十丸食前溫水下生薑湯亦得蔥膠湯治妊娠大便不通蔥白牛皮膠二斤右以水一盞半煎令膠煬盡去滓頓服之治虛羸大便祕枳殼製阿膠炒等分右為末煉蜜和劑杵二三千下丸如梧子大别研滑石末為衣溫水下二十丸半日來未通再服三十丸加至五十丸小便不通附論夫妊娠小腸夾熱熱結胞內使氣道否澀故小便不通令人腹脅脹滿臍下急痛是其證也方茯苓湯治妊娠小便不通赤茯苓白术郁李仁杏仁旋復花各一兩檳榔五枚銼右粗搗篩每服二錢匕水一盞煎至七分去滓空心服大黃湯治妊娠子淋小便不通木通丸治妊娠小便不通及轉胞臍下脹痛木通黃芩冬葵子生乾地黃焙各二兩右為末用麵糊和丸如梧子大每服二十丸燈心湯下食前服冬葵子散治妊娠小便不通小腹脹滿冬葵子榆白皮滑石阿膠各二兩右為散每服二錢匕溫水調服不拘時四味葵根湯治妊娠小便不通臍下滿痛冬葵根車前子木通各三兩阿膠二兩右粗搗篩每服五錢匕水一盞半煎至八分去滓食前溫服鯉魚湯治妊娠小便不利身重惡寒起則眩暈及水腫苦參丸治妊娠小便難飲食如故當歸貝母苦參各三兩滑石半兩右細末蜜和為丸如小豆大以米飲下二十丸不拘時榆白皮散治妊娠小便不通心神悶亂小腹急痛榆白皮王不留行滑石各一兩右為細散每服二錢匕煎燈心湯調下豬苓湯治妊娠小便不通臍下鞕痛豬苓木通桑根白皮銼各一兩右粗搗篩每服三錢匕水一盞入燈心同煎至七分去滓食前溫服治妊娠小便不通臍下妨悶心神煩亂葵子榆白皮切各一兩蔥白七莖右以水二大盞煎取一盞三分去滓分三服一方無蔥白又方葵子赤茯苓蘧麥已上各一兩右搗細羅為散每服不計時候以溫水調下一錢又方葵子滑石寒水石各一兩右搗為散每服三錢水一盞蔥白七寸煎六分去滓無時候溫服冬葵子散治妊娠小便不利身重惡寒起則眩暈及水腫妊娠小便不通冬葵子二錢赤茯苓二錢右為末每服三錢米飲調服無時候利則住服如不通恐是轉胞加髮灰少許神效一方無茯苓有榆白皮昔有妊娠婦腹脹小便不利吐逆諸醫雜進溫脾胃寬氣去脹等劑服之反吐藥物不納轉加脹滿揍心驗之胎死腹中又脹諸下胎藥不能通解舉家憂惶因得鯉魚湯論曰腳腫俗呼為皺腳亦有通身腫滿心胸急脹名曰胎水遂去妊婦心前衣服看之胸肚不分急以鯉魚湯三五服大小便皆下惡水腫消脹去方得分娩死胎可謂更生之人矣此證蓋緣懷身腹大妊婦不自知覺人人皆以為身娠如此不以為胎水病醫人何以得知故此書論病須自家覺察大腸與膀胱水不出入淋瀝急數尿時痛大便赤裏急如痢以手按胸間至臍方可出不然小便逆上出而不禁其浮腫先以涼藥踈利却用上藥治妊娠卒然小便不利滑石末杏仁等分右先搗杏仁令爛次入滑石末以軟餅搗和為丸如小豆大每服二十丸蔥白湯送下療妊娠卒不得小便用杏仁二十箇去皮尖熬令變色搗丸如豆大燈心煎湯吞七粒得利又方以滑石末水和泥臍下二寸小便即利未利更塗之又方用車前草汁調滑石末塗臍四畔方四寸熱即易之治妊娠小便不通臍下妨悶心神煩悶用紫苑去苗為末井花水調下二錢一方用紫草蔓荆實散治妊娠小便澀不通利用蔓荆實二兩搗羅為散每服二錢溫水調服空心午前各一服衛生實鑑濃煎蔥白湯調下治妊娠卒小便不通蔓菁子右搗細羅為散每服不計時候煎蔥白湯調下一錢治妊娠小便不通利方用無青子七合為末水和服方寸匕日三治妊娠遍身浮腫喫前方未得全效小便未得通快宜服此方若遍身不腫止小便不通一兩日亦可服此藥一二盞山梔知母前胡升麻麥門冬冬葵子葶藶桔梗右細杵羅為末每服三錢水一盞二分蔥白五枝同煎取一盞食後和滓喫遺失不禁夫腎主水入胞為小便腎氣和乃能約制溲出以時若妊娠腎虛胞冷不能約制故小便利下而多也其證令人背項憎風少腹急痛治法當加以扶養胎氣之劑方熟乾地黃丸治妊娠小便不禁臍腹疼痛熟地黃巴戟天肉蓯蓉五味子山茱茰蒺䔧子萆薢蜀椒山芋續斷菟絲子杜仲沉香右為細末煉蜜和丸如梧子大每服十五丸食前溫酒下椒菊丸治妊娠小便日夜頻數蜀椒甘菊花肉蓯蓉菖蒲巴戟天逺志黃耆附子右為細末酒煮麵和丸如桐子大每服二十丸空心食前溫酒下菟絲子丸治妊娠小便利日夜無度菟絲子菖蒲肉蓯蓉蛇牀子五味子防風逺志右為末煉蜜和丸搗三百杵丸如桐子大每服十丸空心溫酒下溫氣除寒補下丸治妊娠小便利葫蘆巴龍骨菖蒲逺志補骨益智肉蓯蓉右為細末煉蜜和丸如桐子大每服三十丸空心溫酒下桑螵蛸丸治妊娠小便滑數桑螵蛸人參鹿茸黃耆牡礪粉甘草右搗粗篩每服三錢水一盞生薑一片棗二枚擘煎至七分去滓食前溫服雞胵散治妊娠遺尿雞胵熟乾地黃當歸牡礪粉黃耆厚朴右搗羅為散每服二錢匕食前溫酒調下鹿茸丸治妊娠下焦冷氣小腹疼痛小便多鹿茸一兩白龍骨三分桑螵蛸半兩牡礪粉二兩右為末酒煮麵糊和丸如梧子大每服二十丸空心食前溫酒下艾葉丸治妊娠小便利小腹痛艾葉炙乾薑各一兩厚朴益智各半兩右為末煉蜜和丸如桐子大每服三十丸米飲湯下以飯壓之秦椒丸治妊娠小便利秦椒六兩蘹子炒一兩黃蠟四兩右搗羅二味末鎔蠟和丸如桐子大每服二十丸空心用溫酒下白薇散治妊娠小便無度尿不知出時胎滿故也白薇白芍藥各一兩右搗羅為散每服一錢匕食前溫酒調下日三雞翎酒療妊娠尿不知出時胎滿故也用雞子燒灰末之酒調方寸匕桑螵蛸散治妊娠小便不禁用桑螵蛸十二箇炙為細末每服三錢空心食前米飲調下治小便利燒遺尿人薦草灰服之瘥治小便遺失阿膠三錢牡礪四錢鹿茸四錢右銼末挑三錢水一盞半煎至一盞空心服或米飲調亦得瘧疾附論夫妊娠病瘧者由夏傷於暑客於皮膚至秋因勞動血氣腠理虛而風邪乘之動前暑熱隂陽交爭陽乘則熱隂盛則寒隂陽相雜寒熱俱歇若邪動氣至交爭則發故瘧休作有時其發寒時節漸晏者此由風邪客於風府循膂而下衛氣至一日一夜常大會於風府故發日晏其發日早者衛氣之行風日夜下一節二十一日至尾骶二十二日入脊內上注於伏衛之脈其行九日出缺盆之內其氣既止故發更早其間日發者由風邪內搏五臟橫連募厚其道逺其氣深其行遲不能日作故間日蓄積乃發也妊娠而發則寒熱之氣相迫傷於胎故多損動也又云凡懷孕婦人病瘧可煎白虎湯小柴胡柴胡飲子等藥如大便結梗可用大柴胡湯微通利之不可大吐㵼恐傷其孕也經曰夏傷於暑秋必病瘧方松羅散治妊娠患瘧發時增寒壯熱口乾多吃冷水腹內㽱刺疼痛不止松羅半兩鱉甲半兩恆山半兩烏梅肉七枚朱砂漢防己各一兩澤㵼半兩麥門冬一兩知母連翹各半兩黃丹石葦虎杖各一分生乾薑一兩右搗細羅為散每服不計時候以溫酒調下二錢清脾湯治妊娠作瘧熱多者青皮厚朴白术草果仁柴胡茯苓半夏黃芩甘草人參各等分常山一半右銼散每服四錢生薑五片真地骨皮少許煎不時溫服或加麥門冬去心二十粒未效宜服勝金丸阿膠散治妊娠患瘧發時增寒壯熱頭目眩暈不思飲食阿膠一兩半赤芍藥當歸柴胡黃芩白茯苓白术各一兩麥門冬一兩半甘草半兩右搗篩為散每服四錢水一盞入薤白二莖煎至六分去滓不計時候溫服人參散治妊娠瘧疾頭疼增寒壯熱面黃不思飲食人參知母麥門冬柴胡桑寄生白茯苓厚朴各一兩甘草半兩右搗篩為散每服四錢水一盞煎至六分去滓不計時候溫服驅邪散妊娠瘧疾者謂何蓋榮衛虛弱脾胃不足或感風寒或傷生冷轉成瘧疾急服驅邪散莫待吐逆見食不思卒難醫療髙良薑白术草果仁橘紅藿香葉縮砂仁白茯苓各一兩甘草炙半兩右㕮咀每服四錢水一盞半生薑五片棗一枚煎至八分去滓不拘時候七寶散治男子婦人一切瘧疾或先寒後熱或先熱後寒或寒多熱少或熱多寒少一日一發或一日兩三發或連日或間日發或三四日一發不問鬼瘧不伏水土山嵐瘴氣似瘧者亦治婦人妊娠六七月而患瘧疾皆可服之常山厚朴青皮陳皮甘草檳榔草果去皮各等分右㕮咀每服半兩於未發隔夜用水一碗酒一盞煎至一大盞濾出露一宿却將滓再用酒水更依前煎一次去滓别以碗盛貯亦露一宿來日當發之早蕩溫面東先服頭藥少歇再服藥滓大有神效嘗治一妊婦六七個月而沾瘧疾先寒後熱六脈浮緊衆醫用藥柴胡桂枝無效因言此疾非常山不愈也衆醫不肯因循數日病難無計黽勉治之遂用七寶散一服愈黃帝問曰婦人重身毒之奈何岐伯曰有故無殞帝曰願聞其故何謂也岐伯曰大積大聚其可犯也衰其大半而止豈不以審藥之性味明治療之方處以中痛與疾適好於半而止之勿過而於則何疑余攻治哉當歸散治妊娠患瘧憎寒體顫當歸白芍藥茯苓枳殼白术各一兩鱉甲一兩甘草銼一兩右搗篩為散每服四錢水一盞煎至六分去滓不計時溫服知母散治妊娠瘧疾憎寒壯熱口乾煩悶知母白茯苓麥門冬柴胡各一兩烏梅三分大青甘草各半兩右搗篩為散每服四錢水一盞煎至六分去滓不計時候溫服治妊娠患瘧疾湯恆山二兩甘草一兩黃芩三兩烏梅十四枚石膏八兩右㕮咀以酒水各一升半合漬藥一宿煮三四沸去滓初服六合次服四合後服二合凡三服一方有麥冬去心一兩無石膏名恆山散忌海藻菘菜生蔥黃芩散治妊娠婦患瘧疾寒熱頭痛心煩黃芩麥門冬各一兩石膏二兩甘草半兩烏梅十四個右㕮咀每服四錢水一盞煎至六分去滓溫服不計時候烏梅散治妊娠瘧疾寒熱頭疼煩渴烏梅黃連桑寄生人參甘草各一兩右搗篩為散每服四錢以酒一盞煎至六分去滓不計時候溫服治妊娠患瘧疾湯恆山竹葉各三兩石膏八兩粳米一百粒右㕮咀以水六升煮取二升半去滓分三