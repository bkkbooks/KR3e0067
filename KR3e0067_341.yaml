妊娠痰飲不除胸脅支滿嘔逆不思飲食漸加羸瘦赤茯苓前胡白术紫蘇各半兩半夏大腹皮人參麥門冬各半兩右粗搗篩每服四錢水一盞半入生薑半分煎取八分去滓不計時候溫服木香丸治妊娠痰飲咳嗽嘔逆不思飲食木香甘草白术陳橘皮各一兩天南星半夏白芷乾薑一分右為末同粟米飲為丸如梧桐子大每服二十丸食後煎生薑棗湯下人參丸治妊娠痰盛調脾胃進飲食人參髙良薑白茯苓陳橘皮厚朴各一兩半夏二兩乾薑甘草炙各半兩右為末用生薑汁浸蒸餅心和劑為丸如梧桐子大每服三十丸食後臨臥生薑湯下百合散治妊娠風壅相交咳嗽痰多心胸滿悶百合紫苑茸貝母白芍藥前胡赤茯苓桔梗各一兩甘草生半兩右㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候麥門冬湯治妊娠痰逆不思飲食止煩渴定咳嗽麥門冬半夏貝母炮各半兩青橘皮乾薑甘草炙各一兩右粗搗篩每服三錢生薑三片水一盞慢火煎至七分去滓通口空心食前服天南星丸治妊娠痰飲膈脘痞悶嘔逆惡心天南星半夏二味并去臍用生薑自然汁浸三宿細切焙乾用人參白茯苓各一兩白礬一兩半右搗羅四味為末入白礬和藥再研令勻用生薑汁煮麵糊軟硬得所和丸如梧桐子大每服十五丸熱水下空心日午晚食前各一服乾薑丸治妊娠痰飲浸漬膈脘目運頭旋乾薑白礬芎藭半夏各一兩白术二兩右為末煮棗肉和丸如小豆大每服十五丸溫淡生薑湯下不計時候服枳殼丸治妊娠痰盛嘔逆惡心頭目旋運枳殼四兩乾薑二兩白术三兩半夏二兩右為末生薑汁煮麵糊和丸如梧桐子大每服十五丸溫米飲下食前服漸加至二十丸妊娠諸瘡附論夫妊娠之人若肝經有熱播流血脈散於雞肉榮氣不從於肉理則生癰腫諸瘡之類內經謂諸痛癢瘡皆屬於心治法宜調經絡平腑臟則邪壅之疾自差方分氣湯治妊娠諸瘡利心經散壅滯麥門冬檳榔當歸大腹皮甘草木通羌活芎藭桑根白皮銼各一兩大黃炒三分右粗搗篩每服三錢水一盞煎至六分去滓空心日午臨臥溫服薄荷丸治妊娠氣血壅滯致身體生瘡瘙癢乾薄荷葉二兩荆芥穗一兩半蔓荆實去白皮玄參甘草大黃人參麥門冬去心各一兩羌活細辛去苗各一兩半右為末煉蜜丸如雞頭大每服一丸茶酒嚼下不拘時白芷丸治妊娠風氣壅頭目不利身體生瘡白芷三兩芎藭天南星水煮各一兩羌活半兩菊花三分藿香葉一兩防風半兩細辛一兩當歸二兩右搗羅為末酒煮麵糊丸如梧桐子大每服二十丸薄荷湯下不拘時候地黃丸治妊娠諸瘡生乾地黃黃耆人參荆芥梔子仁黃芩甘草乾薄荷葉各一兩右為末煉蜜和丸如梧桐子大每服二十丸溫湯下不拘時皂策子散治妊娠氣壅生瘡皂策子二百枚槐實甘草乾薄荷葉黃耆荆芥穗各一兩芎藭天麻各半兩右搗羅為散每服一錢匕溫酒調下沸湯亦得不拘時荆芥湯治妊娠血氣壅滯身體生瘡心神不寧荆芥穗芎藭細辛葳靈仙甘草各一兩炙皂莢半兩不蛀者去皮塗酥炙右粗搗篩每服二錢匕水一盞煎至六分去滓食後臨臥溫服之黃耆湯治妊娠氣血壅滯生瘡黃耆苦參羌活獨活惡實甘草炙各一兩右粗搗篩每服三錢匕水一盞煎至七分去滓溫服秦艽丸治妊娠瘡疥煩熱瘙癢秦艽半兩黃耆枳殼漏蘆防風各一兩半黃連去鬚半兩右為末煉蜜和丸如梧桐子大每服二十丸溫酒空心日午夜臥服袪風散治妊娠風熱氣盛致身體生瘡皮膚燥澀大便結滯羌活去蘆頭二兩大黃濕紙褁煨二兩黃耆銼三兩芎藭二兩朴硝别研半兩當歸切焙一兩半右㨶羅為細散與朴硝勻每服一錢匕日午夜臥用溫蜜水調下微利為度治瘡婦人妊娠患此疾者並治之黃桑條去皮銼碎熬灰蒼耳草熬灰右相和冷水濾過又將童子小便一處相和煎用抹在瘡口裏三五日有丁去厭根為妙治孕癰方立效用烏藥研出洪州軟白香辣者良水一盞牛皮膠一片同煎至七分溫服治腦疽瘡治妊娠婦人患此瘡者用地石榴草煎酒吃為妙罩胎散治孕婦痘瘡已發急宜服之以解熱毒不治傷胎赤茯苓去皮白术當歸中截白芍藥赤芍藥柴胡乾葛人參去蘆桔梗去蘆黃芩防風陳皮去白荆芥枳殼紫草阿膠炒糯米炒川白芷甘草炙川芎縮砂仁炒大熱加鬱金右銼每服三錢水一盞半乾柿蒂七枚野苧根七寸甜瓜蒂七枚同銀器煎以小荷葉蓋定去滓盞盛仍用荷葉蓋覆空心服之咱氏方曰金銀能安胎如蕪銀器以瓦器煎入金箔銀箔研入藥內治妊娠上膈有熱唇口生瘡非時頭痛不安小便黃赤升麻杏仁前胡去毛桔梗黃芩麥門冬去心葛根知母各等分右細杵羅為末每服二錢水一盞生薑二片同煎取八分食後臨臥服普濟方卷三百四十一
