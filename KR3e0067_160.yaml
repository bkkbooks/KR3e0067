body:
  text: 普濟方卷一百六十一明周王朱橚撰喘嗽門咳嗽短氣類附論肺主于氣候于皮毛氣虛為微寒客於皮毛傷於肺肺氣不足則成咳嗽夫氣得溫則宣利得寒則痞澀虛則氣不足而為寒所迫併聚于肺間不得宣發故令咳而短氣也方紫菀丸出聖惠方治肺咳嗽氣短不得睡卧紫菀一兩去苖土漢防己一兩貝母一兩煨欲黃人參去蘆頭用一兩欵冬花一兩桑白皮一兩銼天門冬一兩半焙去心木香一兩甜葶藶一兩隔紙炒令紫色甘草半兩炙微赤銼檳榔一兩杏仁半兩湯浸去皮尖雙仁麩炒黃右為細末煉蜜為丸如梧桐子大不拘時以粥飲送下每服二十丸肉蓯蓉湯療傷中咳嗽短氣胸中痛痰飲厥逆宿食不消化寒熱邪癖五內不調肉蓯蓉五兩乾地黃四兩大棗三十枚擘烏頭一兩炮甘草一兩炙桂心麥門冬去心各一兩紫菀五味子各一兩生薑石膏碎綿裹右切以水一斗五升煮取七升去滓分為七服日四夜三一方大棗五十枚水一斗二升煮取九升忌海藻生蔥菘菜蕪荑豬肉冷水五味子散治咳嗽鼻塞清涕顫掉緩弱少氣不足時時欲嘔五味子黃耆細切各三分甘草炙銼一分人參桂去粗皮羌活去蘆頭乾薑炮細辛去苖葉附子炮裂去皮臍白术各五錢右為細末每服二錢生薑烏梅湯調下紫蘇散出聖惠方治咳嗽短氣體煩發熱發作無時紫蘇莖葉一兩貝母三分煨微黃紫菀三分去苖土麥門冬三分去心陳橘皮半兩湯浸去白穰甘草半兩炙作赤銼桑白皮三分銼赤茯苓三分五味子三分右為散每服四錢水一中盞入生薑半分煎至六分去滓不拘時溫服五味子湯出聖惠方療逆氣咳嗽胸膈中寒熱短氣不足五味子一兩前胡三兩紫菀甘草炙桂心生薑各二兩棗三十枚擘山茱茰三兩右切以水一斗煮取七升攪去滓服一升日三夜二忌生蔥海藻菘菜一方用三錢水一盞煎日二夜一又一方用橘皮不用茱茰延年紫蘇飲治咳嗽短氣唾涕稠喘乏風虛煩損發無時者宜服紫蘇貝母各二兩紫菀二兩麥門冬去心棗五枚擘葶藶子一兩炒令黃别研搗甘草一兩炙右切以水六升煮取二升分為四服如人行七里禁豬肉魚肉蒜海藻菘菜海藻湯出聖惠方治咳嗽而下痢胸中痞而短氣心中時悸四肢不欲動手足煩不欲食肩背痛時惡寒海藻四兩五味子半夏各半斤生薑一兩細辛茯苓六兩杏仁五十枚右㕮咀水一斗煮取三升去滓分為三服日三又方無五味生薑五味湯出宣明論治胸膈痞滿心復刺痛短氣噎悶咳嗽痰唾嘔逆惡心不思飲食溫中益氣五味子九兩良薑乾薑各一兩半紅皮去白茴香炒各二兩甘草炙七兩鹽一斤炒右為末每服一錢百沸湯點空心食前甚者日三服一方無乾薑訶梨勒散出聖惠方治咳嗽短氣腹脅痛訶梨勒皮三分陳橘皮三分湯浸去白穰人參一兩去蘆頭桔梗三分去蘆頭吳茱茰半兩湯浸七遍焙甘草半兩炙黃銼杏仁三分湯浸去皮尖雙仁麩炒微黃右為散每服三錢水一中盞入生薑半分煎至六分去滓不拘時溫服又方出聖惠方治咳嗽短氣體煩熱發作無時麻黃三兩去根節桂心半兩乾薑一分煨裂銼甘草半兩炙微赤銼杏仁三分去皮尖雙仁炒右為散每服三錢水一中盞煎至六分去滓不拘時溫服治咳嗽短氣喘急出聖惠方麻黃一兩去根節甘草一兩炙微赤銼甜葶藶一兩隔紙炒令紫赤茯苓杏仁一兩湯浸去皮尖雙仁炒研如膏右為末煉蜜和搗三百杵如梧桐子大每服二十丸不拘時以粥飲下薑椒湯療咳嗽及短氣脅痛生薑椒去目炒出汗各一兩右切以水五升煮取三升每服一合咳嗽上氣附論夫諸氣皆屬于肺肺氣和平則升降自若若為寒邪所傷則肺氣壅澀不得宣通故咳嗽而上氣其證喘咳多涕唾甚者面目浮腫久而不已肺氣虛極風邪停滯令人胸背痛以至唾膿血也咳嗽上氣者為肺氣有餘也肺感于寒甚者則成咳嗽也肺主氣氣有餘則喘上氣此為邪搏于氣氣壅滯不得宣發是為有餘故咳嗽而上氣也久咳嗽上氣者肺氣虛極風邪停滯故其病積月纍季久不得瘥則胸痛面腫而上氣唾膿血也方地黃煎治肺臟氣不和上氣咳嗽地黃汁一升半麥門冬汁生薑汁天門冬汁各五合射干一兩黃牛乳一升蜜二升黃牛酥五升黃耆銼炒桂去粗皮人參二兩五味子欵冬花紫菀去苖土貝母去心各二兩杏仁去皮尖雙仁研五及玄參赤茯苓柴胡去苖各一兩右為末次將自然汁及酥乳蜜等入銅器中以文武火煎百十沸時時攪轉然後旋旋調下諸藥末攪令勻煎百餘沸來日封閉于甑上蒸兩炊久待冷以臘紙緊封閉十數日時復一看莫令損動每日飲後服一匙頭便仰卧漸漸咽之令藥浸潤心肺至夜臨睡時如前再服治上氣咳嗽兼水氣癖氣葶藶子炒貝母桔梗鱉甲炙防葵各六分白术四兩茯苓大戟枳實炙紫菀旋覆花杏仁去皮尖熬橘皮各四兩芫花二分大黃一錢皂莢一分炙去皮子右搗篩蜜和為丸空心以飲服如梧子五丸日二服漸漸加至十九丸以微利為度忌桃李雀肉莧菜醋豬肉陳臭等物木香枳殼湯治咳嗽氣促木香枳殼去穰麩炒黃連去鬚各一兩麻黃去根節貝母去心百合紫菀去苖土欵冬花去梗桑根白皮天雄炮裂去皮臍白石脂昆布洗去鹹焙各一兩半黃芩去黑心半兩旋覆花微炒三分杏仁湯浸去皮尖雙仁炒十枚右銼如麻豆每服五錢水一盞半生薑三片同煎至八分去滓溫服欵冬花丸治三十年上氣咳嗽膿血喘息不得卧欵冬花去梗乾薑炮蜀椒去目及閉口者炒出汗桂去粗皮吳茱茰洗淨焙乾炒菖蒲銼米泔浸半日炒乾各一兩一分細辛去苖葉芫花醋浸炒乾紫菀去苖土甘草炙銼桔梗炒白茯苓去黑皮皂莢炙去皮子各三分人參三分右為末煉蜜和為丸如梧子大每服五丸酒下加至十丸每日三服桑白皮湯治咳嗽上氣促急心躁寒熱四肢煩疼夜間甚者柴胡去苖桑根白皮天雄炮裂去皮臍羌活去蘆頭枳殼去穰麩炒大腹連皮銼各一兩半黃連去鬚當歸切焙麻黃去根節桂去粗皮甘草炙銼各一兩白梅拍碎四磈黃芩去黑皮旋覆花微炒各半兩右銼如麻豆每服五錢水一盞半入生薑三片同煎八分去滓溫服潤膈丸一名天阿膠丸治積年咳嗽上氣涎唾稠粘五心煩躁不思飲食心肺留熱方見本門肺虛類紫蘇散出聖惠方治人久咳嗽上氣胸滿不能飲食頭面浮腫唾膿血紫蘇子一兩微炒半夏三分湯洗七分去臍五味子三分麻黃三分去根節細辛三分紫菀三分去苖土赤茯苓一兩黃芩半兩甘草半兩炙赤銼陳橘皮一兩湯浸去白穰桂心半兩甜葶藶一兩隔紙炒令紫桑白皮一兩銼右為散每服五錢水一大盞入生薑半分煎至五分去滓不拘時溫服皂莢丸出聖惠方治久咳嗽上氣心胸滿悶喫食減少皂莢一兩去黑皮酥炙令黃去子紫菀三分去苖土欵冬花半兩細辛三分陳橘皮三分湯浸去白穰桂心半兩麥門冬一兩去心焙紫蘇子三分微炒乾薑三分炮裂銼當歸三分銼微炒甘草半兩炙赤銼川椒一兩去目及閉口微炒去汗杏仁一兩湯浸去皮尖雙仁炒微黃研如膏右為末煉蜜和搗五七百杵丸如梧桐子大每服三十丸不拘時以薑湯下五味子湯治咳嗽上氣語聲不出心胸痞悶頭昏痰涎小便赤澀五味子炒人參桑根白皮炙銼麥門冬去心焙麻黃去根節防風細辛甘草炙銼白前杏仁湯浸去皮尖雙仁麩炒枳殼去穰麩炒各五錢甜葶藶隔紙炒右為散每服三錢水一盞入生薑三片同煎至七分去滓食後臨卧溫服蜀椒丸出千金方治咳嗽上氣甚良蜀椒五分烏頭杏仁菖蒲皂莢礜石以上五味各十兩細辛欵冬花紫菀乾薑各三分吳茱茰四分麻黃四分右為細末每蜜丸梧桐子大暮卧吞二丸治二十年久嗽不過二十丸紫菀煎出聖惠方治久咳嗽上氣涕唾稠黏頭面虛腫宜服阿膠三兩搗碎令黃射干三兩細辛乾薑一兩炮裂銼竹瀝一盞芫花根半兩去土桑白皮三兩銼欵冬花二兩附子半兩炮去皮臍甘草半兩炙赤銼白蜜一盞右為散先以水二斗于銀鍋中煎至一斗去滓入蜜及竹瀝以慢火熬成膏每服半匙以溫粥調飲送下日三四服又方治咳嗽胸脅支滿多唾上氣礜石一作􅀢石烏頭一方不用菖蒲各一分細辛黃環各二分欵冬花紫菀杏仁各三分吳茱茰四分乾薑五分蜀椒五合右為末煉蜜和丸如梧桐子大每服一丸著牙上咽汁每一日六服劇者常服不止射干煎出千金方治咳嗽上氣生射干欵冬花各二兩紫菀細辛桑白皮附子甘草各二兩白蜜竹瀝生薑各一升一云乾薑飴糖五兩右以射干先內白蜜并竹瀝中煎五六沸去之㕮咀六物以水一升合浸一宿煎七上七下去滓乃合飴薑汁煎如餳服如酸棗大十丸日三劇者夜二不知加之以知為度外臺祕要用芫花根半兩又方療咳嗽上氣時時嘔白唾沫數十歲不愈者吳茱茰五味子大黃桂心甘草炙細辛人參紫菀欵冬花各一兩大戟竹茹各三分右切以水一斗煮取三升分為三服亦療隂冷咳至良忌海藻菘菜生蔥深師方百合丸出聖惠方治咳嗽上氣心胸煩悶胸中不利含化百合一兩紫菀一兩洗去苖土桂心半兩麥門冬二兩去心焙白莢子仁半兩微炒貝母二兩煨微黃五味子乾薑一分炮裂銼杏仁一兩湯浸去皮尖雙仁炒微黃訶梨勒皮半兩甘草半兩炙微赤銼右為細末入杏仁同研令勻以棗肉和如半棗大小不計時以綿裹一丸含咽津生地黃煎出聖惠方治咳嗽上氣心膈煩悶痰唾不利生地黃汁二升生天門冬汁二升蜜五合酥三合生薑汁二合貝母二兩煨微黃五味子二兩紫菀二兩去苖土甘草一兩炙微赤銼鹿角膠五兩搗碎炒黃杏仁三兩湯浸去皮尖雙仁麩炒右為末研令極細後取諸藥汁及杏仁酥蜜等同于銀器中慢火熬不住手攪候如膏即收于不津器中不計時候含一茶匙咽津華蓋煮散治咳嗽上氣欵冬花去梗知母焙貝母去心炒各一兩紫菀去苗土桔梗炒各三分木香甜葶藶微炒各半兩杏仁去皮尖雙仁炒二分防己半兩蟬殼一兩右為散每服三錢水一盞入酥少許煎七分食後溫服通氣丸出千金方治久上氣咳嗽咽中腥臭氣攪心痛眼疼耳中嘈嘈風邪毒注時氣食不生肌胸中隔塞嘔逆多唾惡心心下堅滿飲多食少惡疰淋痛飴糖三升蜀椒二升杏仁一升蜈蚣五節大附子五枚乾薑四分人參四分桂心六分烏頭七分天門冬十分右為末别治杏仁如脂稍稍內藥末搗千杵洋糖乃內藥末中令調和含如半棗一枚日六七夜三四服以胸中溫為度若夢與鬼交通少飲食者全用蜈蚣食不消加杏仁五合小腹急腰痛加天門冬杜仲有風加烏頭三枚附子一枚立夏後勿用加有留飲加葶藶一兩馬兜鈴散治肺熱上氣喘逆咳嗽咯血馬兜鈴黃芩去黑心知母切焙白茯苓去黑皮紫菀去苖土麻黃去根節甘草炙銼杏仁去皮尖雙仁炒黃貝母去心大黃銼炒各半兩右為散每服二錢煎桑根白皮棗湯調下加減三竒湯出拔萃方治咳嗽上氣痰涎喘促胸膈不利桔梗去蘆半兩半夏湯洗七錢陳皮去白五錢甘草五錢青皮去白五錢人參去蘆五錢杏仁三錢研五味子四錢紫蘇葉桑白皮各五分右㕮咀每服四錢水二大盞生薑三片煎至一盞去滓食後溫服麻黃散出聖惠方治久咳嗽肺壅上氣坐卧不安麻黃一兩去根節桑白皮銼一兩甜葶藶一兩隔綿紙炒紫色五味子三分白前三分甘草半兩炙微赤銼木通三分銼川大黃三兩半銼碎微炒黃耆一兩銼陳橘皮三分湯浸去白右為散每服四錢水一盞入薑半分煎至六分去滓不拘時溫服杏仁散出聖惠方治咳嗽上氣肺寒鼻中不利杏仁一兩湯浸去皮尖雙仁炒黃五味子二兩甘草半兩炙微赤銼麻黃一兩去根節陳橘皮三分湯浸去白穰欵冬花三