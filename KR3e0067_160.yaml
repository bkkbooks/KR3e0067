body:
  text: 普濟方卷一百六十一明周王朱橚撰喘𠻳門咳𠻳短氣類附論肺主于氣候于皮毛氣虚為㣲寒客於皮毛傷於肺肺氣不足則成咳𠻳夫氣得溫則宣利得寒則痞澀虛則氣不足而為寒所迫併聚于肺間不得宣發故令咳而短氣也方紫菀丸出聖惠方治肺咳𠻳氣短不得睡卧紫菀一兩去苖土漢防己一兩貝母一兩煨欲黄人參去蘆頭用一兩欵冬花一兩桑白皮一兩剉天門冬一兩半焙去心木香一兩甜葶藶一兩隔紙炒令紫色甘草半兩炙微赤剉㯽榔一兩杏仁半兩湯浸去皮尖雙仁麩炒黄右為細末煉蜜為丸如梧桐子大不拘時以粥飲送下每服二十丸肉蓯蓉湯療傷中咳𠻳短氣胸中痛痰飲厥逆宿食不消化寒熱邪癖五内不調肉蓯蓉五兩乾地黄四兩大棗三十枚擘烏頭一兩炮甘草一兩炙桂心麥門冬去心各一兩紫菀五味子各一兩生薑石膏碎綿裹右切以水一斗五升煑取七升去滓分為七服日四夜三一方大棗五十枚水一斗二升煑取九升忌海藻生蔥菘菜蕪荑猪肉冷水五味子散治咳𠻳鼻塞清涕顫掉緩弱少氣不足時時欲嘔五味子黄耆細切各三分甘草炙剉一分人參桂去粗皮羌活去蘆頭乾薑炮細辛去苖葉附子炮裂去皮臍白术各五錢右為細末每服二錢生薑烏梅湯調下紫蘇散出聖恵方治咳𠻳短氣體煩發熱發作無時紫蘇莖葉一兩貝母三分煨微黄紫菀三分去苖土麥門冬三分去心陳橘皮半兩湯浸去白穰甘草半兩炙作赤剉桑白皮三分剉赤茯苓三分五味子三分右為散每服四錢水一中盞入生薑半分煎至六分去滓不拘時溫服五味子湯出聖恵方療逆氣咳𠻳胷膈中寒熱短氣不足五味子一兩前胡三兩紫菀甘草炙桂心生薑各二兩棗三十枚擘山茱茰三兩右切以水一斗煑取七升攪去滓服一升日三夜二忌生蔥海藻菘菜一方用三錢水一盞煎日二夜一又一方用橘皮不用茱茰延年紫蘇飲治咳𠻳短氣唾涕稠喘乏風虛煩損發無時者宜服紫蘇貝母各二兩紫菀二兩麥門冬去心棗五枚擘葶藶子一兩炒令黄别研搗甘草一兩炙右切以水六升煑取二升分為四服如人行七里禁猪肉魚肉蒜海藻菘菜海藻湯出聖恵方治咳𠻳而下痢胷中痞而短氣心中時悸四肢不欲動手足煩不欲食肩背痛時惡寒海藻四兩五味子半夏各半斤生薑一兩細辛茯苓六兩杏仁五十枚右㕮咀水一斗煑取三升去滓分為三服日三又方無五味生薑五味湯出宣明論治胷膈痞滿心復刺痛短氣噎悶咳𠻳痰唾嘔逆惡心不思飲食溫中益氣五味子九兩良薑乾薑各一兩半紅皮去白茴香炒各二兩甘草炙七兩塩一斤炒右為末每服一錢百沸湯㸃空心食前甚者日三服一方無乾薑訶梨勒散出聖恵方治咳𠻳短氣腹脇痛訶梨勒皮三分陳橘皮三分湯浸去白穣人參一兩去蘆頭桔梗三分去蘆頭吴茱茰半兩湯浸七遍焙甘草半兩炙黄剉杏仁三分湯浸去皮尖雙仁麩炒微黄右為散每服三錢水一中盞入生薑半分煎至六分去滓不拘時溫服又方出聖恵方治咳𠻳短氣體煩熱發作無時麻黄三兩去根節桂心半兩乾薑一分煨裂剉甘草半兩炙微赤剉杏仁三分去皮尖雙仁炒右為散每服三錢水一中盞煎至六分去滓不拘時溫服治咳𠻳短氣喘急出聖恵方麻黄一兩去根節甘草一兩炙微赤剉甜葶藶一兩隔紙炒令紫赤茯苓杏仁一兩湯浸去皮尖雙仁炒研如膏右為末煉蜜和擣三百杵如梧桐子大每服二十丸不拘時以粥飲下薑椒湯療咳𠻳及短氣脇痛生薑椒去目炒出汗各一兩右切以水五升煑取三升每服一合咳𠻳上氣附論夫諸氣皆屬于肺肺氣和平則升降自若若為寒邪所傷則肺氣壅澀不得宣通故咳𠻳而上氣其證喘咳多涕唾甚者面目浮腫久而不已肺氣虛極風邪停滯令人胷背痛以至唾膿血也咳𠻳上氣者為肺氣有餘也肺感于寒甚者則成咳𠻳也肺主氣氣有餘則喘上氣此為邪搏于氣氣壅滯不得宣發是為有餘故咳𠻳而上氣也久咳𠻳上氣者肺氣虚極風邪停滯故其病積月累季久不得瘥則胷痛面腫而上氣唾膿血也方地黄煎治肺臟氣不和上氣咳𠻳地黄汁一升半麥門冬汁生薑汁天門冬汁各五合射干一兩黄牛乳一升蜜二升黄牛酥五升黄耆剉炒桂去粗皮人參二兩五味子欵冬花紫菀去苖土貝母去心各二兩杏仁去皮尖雙仁研五及𤣥參赤茯苓柴胡去苖各一兩右為末次将自然汁及酥乳蜜等入銅噐中以文武火煎百十沸時時攪轉然後旋旋調下諸藥末攪令勻煎百餘沸来日封閉于甑上蒸兩炊久待冷以臘紙𦂳封閉十數日時復一看莫令損動每日飲後服一匙頭便仰卧漸漸嚥之令藥浸潤心肺至夜臨睡時如前再服治上氣咳𠻳兼水氣癖氣葶藶子炒貝母桔梗鱉甲炙防葵各六分白术四兩茯苓大㦸枳實炙紫菀旋覆花杏仁去皮尖熬橘皮各四兩芫花二分大黄一錢皂莢一分炙去皮子右搗篩蜜和為丸空心以飲服如梧子五丸日二服漸漸加至十九丸以微利為度忌桃李雀肉莧菜醋猪肉陳臭等物木香枳殻湯治咳𠻳氣促木香枳殻去穣麩炒黄連去鬚各一兩麻黄去根節貝母去心百合紫菀去苖土欵冬花去梗桑根白皮天雄炮裂去皮臍白石脂昆布洗去鹹焙各一兩半黄芩去黒心半兩旋覆花㣲炒三分杏仁湯浸去皮尖雙仁炒十枚右剉如麻豆每服五錢水一盞半生薑三片同煎至八分去滓溫服欵冬花丸治三十年上氣咳𠻳膿血喘息不得卧欵冬花去梗乾薑炮蜀椒去目及閉口者炒出汗桂去粗皮吴茱茰洗浄焙乾炒菖蒲剉米泔浸半日炒乾各一兩一分細辛去苖葉芫花醋浸炒乾紫菀去苖土甘草炙剉桔梗炒白茯苓去黒皮皂莢炙去皮子各三分人參三分右為末煉蜜和為丸如梧子大每服五丸酒下加至十丸每日三服桑白皮湯治咳𠻳上氣促急心躁寒熱四肢煩疼夜間甚者柴胡去苖桑根白皮天雄炮裂去皮臍羌活去蘆頭枳殻去穣麩炒大腹連皮剉各一兩半黄連去鬚當歸切焙麻黄去根節桂去粗皮甘草炙剉各一兩白梅拍碎四磈黄芩去黒皮旋覆花㣲炒各半兩右剉如麻豆每服五錢水一盞半入生薑三片同煎八分去滓溫服潤膈丸一名天阿膠丸治積年咳𠻳上氣涎涶稠粘五心煩躁不思飲食心肺留熱方見本門肺虚類紫蘇散出聖恵方治人久咳𠻳上氣胷滿不能飲食頭面浮腫唾膿血紫蘇子一兩微炒半夏三分湯洗七分去臍五味子三分麻黄三分去根節細辛三分紫菀三分去苖土赤茯苓一兩黄芩半兩甘草半兩炙赤剉陳橘皮一兩湯浸去白穣桂心半兩甜葶藶一兩隔紙炒令紫桑白皮一兩剉右為散每服五錢水一大盞入生薑半分煎至五分去滓不拘時溫服皂莢丸出聖恵方治久咳𠻳上氣心胸滿悶喫食减少皂莢一兩去黒皮酥炙令黄去子紫菀三分去苖土欵冬花半兩細辛三分陳橘皮三分湯浸去白穣桂心半兩麥門冬一兩去心焙紫蘇子三分㣲炒乾薑三分炮裂剉當歸三分剉㣲炒甘草半兩炙赤剉川椒一兩去目及閉口㣲炒去汗杏仁一兩湯浸去皮尖雙仁炒㣲黄研如膏右為末煉蜜和搗五七百杵丸如梧桐子大每服三十丸不拘時以薑湯下五味子湯治咳𠻳上氣語聲不出心胷痞悶頭昬痰涎小便赤澀五味子炒人參桑根白皮炙剉麥門冬去心焙麻黄去根節防風細辛甘草炙剉白前杏仁湯浸去皮尖雙仁麩炒枳殻去穣麩炒各五錢甜葶藶隔紙炒右為散每服三錢水一盞入生薑三片同煎至七分去滓食後臨卧溫服蜀椒丸出千金方治咳𠻳上氣甚良蜀椒五分烏頭杏仁菖蒲皂莢礜石以上五味各十兩細辛欵冬花紫菀乾薑各三分吴茱茰四分麻黄四分右為細末每蜜丸梧桐子大暮卧吞二丸治二十年久𠻳不過二十丸紫菀煎出聖恵方治久咳𠻳上氣涕唾稠黏頭面虚腫宜服阿膠三兩搗碎令黄射干三兩細辛乾薑一兩炮裂剉竹瀝一盞芫花根半兩去土桑白皮三兩剉欵冬花二兩附子半兩炮去皮臍甘草半兩炙赤剉白蜜一盞右為散先以水二斗于銀鍋中煎至一斗去滓入蜜及竹瀝以慢火熬成膏每服半匙以溫粥調飲送下日三四服又方治咳𠻳胷脇支滿多唾上氣礜石一作􅀢石烏頭一方不用菖蒲各一分細辛黄環各二分欵冬花紫菀杏仁各三分吴茱茰四分乾薑五分蜀椒五合右為末煉蜜和丸如梧桐子大每服一丸着牙上嚥汁每一日六服劇者常服不止射干煎出千金方治咳𠻳上氣生射干欵冬花各二兩紫菀細辛桑白皮附子甘草各二兩白蜜竹瀝生薑各一升一云乾薑飴糖五兩右以射干先内白蜜并竹瀝中煎五六沸去之㕮咀六物以水一升合浸一宿煎七上七下去滓乃合飴薑汁煎如餳服如酸棗大十丸日三劇者夜二不知加之以知為度外臺秘要用芫花根半兩又方療咳𠻳上氣時時嘔白唾沫數十歲不愈者吴茱茰五味子大黄桂心甘草炙細辛人參紫菀欵冬花各一兩大㦸竹茹各三分右切以水一斗煮取三升分為三服亦療隂冷咳至良忌海藻菘菜生葱深師方百合丸出聖恵方治咳𠻳上氣心胸煩悶胸中不利含化百合一兩紫菀一兩洗去苖土桂心半兩麥門冬二兩去心焙白莢子仁半兩㣲炒貝母二兩煨㣲黄五味子乾薑一分炮裂剉杏仁一兩湯浸去皮尖雙仁炒㣲黄訶梨勒皮半兩甘草半兩炙㣲赤剉右為細末入杏仁同研令勻以棗肉和如半棗大小不計時以綿裹一丸含嚥津生地黄煎出聖恵方治咳𠻳上氣心膈煩悶痰唾不利生地黄汁二升生天門冬汁二升蜜五合酥三合生薑汁二合貝母二兩煨㣲黄五味子二兩紫菀二兩去苖土甘草一兩炙㣲赤剉鹿角膠五兩搗碎炒黄杏仁三兩湯浸去皮尖雙仁麩炒右為末研令極細後取諸藥汁及杏仁酥蜜等同于銀器中慢火熬不住手攪候如膏即収于不津器中不計時候含一茶匙嚥津華葢煮散治咳𠻳上氣欵冬花去梗知母焙貝母去心炒各一兩紫菀去苗土桔梗炒各三分木香甜葶藶㣲炒各半兩杏仁去皮尖雙仁炒二分防己半兩蟬殻一兩右為散每服三錢水一盞入酥少許煎七分食後溫服通氣丸出千金方治久上氣咳𠻳咽中腥臭氣攪心痛眼疼耳中嘈嘈風邪毒注時氣食不生肌胷中隔塞嘔逆多唾惡心心下堅滿飲多食少惡疰淋痛飴糖三升蜀椒二升杏仁一升蜈蚣五節大附子五枚乾薑四分人參四分桂心六分烏頭七分天門冬十分右為末别治杏仁如脂稍稍内藥末搗千杵洋糖乃内藥末中令調和含如半棗一枚日六七夜三四服以胷中溫為度若夢與鬼交通少飲食者全用蜈蚣食不消加杏仁五合小腹急腰痛加天門冬杜仲有風加烏頭三枚附子一枚立夏後勿用加有留飲加葶藶一兩馬兠鈴散治肺熱上氣喘逆咳𠻳咯血馬兠鈴黄芩去黒心知母切焙白茯苓去黒皮紫菀去苖土麻黄去根節甘草炙剉杏仁去皮尖雙仁炒黄貝母去心大黄剉炒各半兩右為散每服二錢煎桑根白皮棗湯調下加减三竒湯出拔萃方治咳𠻳上氣痰涎喘促胸膈不利桔梗去蘆半兩半夏湯洗七錢陳皮去白五錢甘草五錢青皮去白五錢人參去蘆五錢杏仁三錢研五味子四錢紫蘇葉桑白皮各五分右㕮咀每服四錢水二大盞生薑三片煎至一盞去滓食後溫服麻黄散出聖恵方治久咳𠻳肺壅上氣坐卧不安麻黄一兩去根節桑白皮剉一兩甜葶藶一兩隔綿紙炒紫色五味子三分白前三分甘草半兩炙㣲赤剉木通三分剉川大黄三兩半剉碎㣲炒黄耆一兩剉陳橘皮三分湯浸去白右為散每服四錢水一盞入薑半分煎至六分去滓不拘時溫服杏仁散出聖恵方治咳𠻳上氣肺寒鼻中不利杏仁一兩湯浸去皮尖雙仁炒黄五味子二兩甘草半兩炙㣲赤剉麻黄一兩去根節陳橘皮三分湯浸去白穣欵冬花三