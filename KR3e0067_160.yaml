子一兩半欵冬花一兩半百部根切炒二兩蜈蚣半枚炙杏仁去皮尖雙仁炒二兩半桑根白皮銼一兩半麻黃去根節煎去沫焙紫菀去苖土各一兩右為細末錬蜜和丸如梧桐子大每服五丸稍加至十五丸煎棗湯下鍾乳湯治風冷搏肺氣塞不通聲嘶不出鍾乳紫蘇子白石英研麻黃去根節五味子炒桂去粗皮赤茯苓去黑皮人參杏仁湯浸去皮尖雙仁麩炒微黃各一兩麥門冬去心焙欵冬花各半兩右先以十味為粗末次入鍾乳粉再研勻每服三錢水一盞生薑半分切棗三枚擘破同煎至七分去滓不拘時稍熱服之補肺丸治肺上壅久病咳嗽嗝咽隘塞語聲不出津液乾燥痰毒頭痛心神恍惚又勞咳咯血呀呷等疾百部焙貝母去心山羊血阿膠炙令燥各二兩天門冬去心焙桔梗炒各一兩防風去義人參各一兩半甘草生三兩半夏二兩搗羅為末先以鵝梨汁一盞生薑自然汁一盞同熬及一半入半夏末熱成膏右除半夏膏外搗羅為末以膏和如乾更入錬蜜少許丸如雞頭實大每服一丸食後卧時含化紫菀丸治肺感風冷咳嗽失聲紫菀去苖土貝母去心桂去粗皮欵冬花各一兩半百部白茯苓去黑皮人參陳橘皮去白焙各一兩甘草炙銼杏仁去皮尖雙仁炒黃細研各二兩右為末煉蜜和丸如梧桐子大每服二十丸食後米飲下熱水亦得杏仁煎出仁存方治咳嗽失聲語不出杏仁去皮尖雙仁炒一升研五味子紫菀去苖土貝母去心各一兩生薑汁飴糖各一升或研糖木通四兩桑根白皮五兩白蜜三合右先將五味㕮咀分作三劑以水四盞煎至一盞半去滓入研杏仁薑汁蜜糖各三分之一更煎成每服一匙含化一方入牛乳一大盞入煎熬一方加知母欵冬花各一兩潤肺湯一名人參潤肺散出直指方治風冷寒肺氣道不利語聲不出亦治咳嗽喘痰壅鼻塞麻黃去根節人參各二兩杏仁湯浸去皮尖雙仁焙乾麩炒黃貝母去心麩炒黃各二兩半甘草炙銼一兩桔梗去蘆頭炒半兩陳橘皮湯浸去白焙一分阿膠炙令燥半兩右粗搗篩每服三錢水一盞半煎至一盞去滓食後溫服一方加紫蘇葉三片同煎小兒通服石菖蒲散治風冷傷肺聲嘶不出菖蒲銼石上者五味子炒陳橘皮湯浸去白皮細辛去苖葉紫菀去苖土乾薑炮裂各半兩訶梨勒炮去核杏仁湯浸去皮尖雙仁麩炒微黃各一兩右八味為細散以溫酒調服每一錢食後服辛甘煎治肺氣為風寒所傷語聲嘶嗄氣息喘急上氣咳嗽酥直者蜜飴糖生薑百部取自然汁棗炊去皮核研柑皮五枚為末杏仁湯浸去皮尖雙仁研各一升右合煎和不住攪約一炒久取藥汁減半止每服溫酒調一匙頭細細咽之日二夜一薑髓煎治肺感風邪氣道凝泣不利聲音嘶嗄生薑汁六合牛髓油别煉各三合桂去粗皮一兩芎藭獨活去蘆頭防風去義各三兩秦椒去目並閉口炒出汗三分右搗羅為散與薑髓油等和勻于微火上煎五七沸又以酒一升二合和前令成煎每服一匙頭含化每日三五度桂心散治咳嗽聲不出桂心三分訶梨勒皮三分乾薑炮裂銼三分赤茯苓半兩甘草一分炙微赤銼人參半兩去蘆杏仁湯浸去皮尖雙仁炒黃半兩右為散每服三錢水一中盞入棗二枚煎至六分去滓溫服日進三服又一方無人參百合湯治咳嗽潤益咽喉發利聲音生津液解勞百合人參甘草炙銼甜葶藶隔紙炒過桑根白皮銼欵冬花微炒右等分粗搗篩每服三錢水一盞入去皮尖杏仁七枚糯米百粒烏梅一個同煎至六分去滓食後溫服杏仁煎出聖惠方治風冷失聲語音不出杏仁湯浸去皮尖雙仁研如膏桂去粗皮各二兩紫菀去苖土五味子炒貝母去心麩炒黃細辛去苖葉各一兩右除杏仁外搗羅為細末以水一盞入生薑汁一合飴糖二兩蜜二合下杏仁慢火熬成膏每服一匙頭不計時候以熱酒調下桂心丸出聖惠方治咳嗽咽喉乾燥語無聲音桂心一兩杏仁一兩湯浸去皮尖雙仁炒研如膏甘草一分炙微赤銼乾薑一分炮裂銼百合一分麥門冬一兩去心焙右為末煉蜜和丸如半棗大不計時候以綿裹一丸含咽津溫肺湯治中冷聲嘶止喘嗽溫肺氣杏仁湯浸去皮尖雙仁炒黃桂去粗皮麻黃去根節各半兩糯米三合甘草炙銼一分右粗搗篩分作五服每服用水三盞煎取一盞濾去滓用雞子白一枚和藥溫服貝母散出聖惠方治咳嗽上氣喘急失聲貝母一兩煨微黃紫菀去苖土三分麥門冬一兩半去心人參三分杏仁三分湯浸去皮尖炒右為散每服三錢水一中盞煎至六分去滓溫服日進三服麻黃湯治咳嗽失聲麻黃去根節煎去沫焙二錢甘草三錢生用烏梅七枚搗碎杏仁二十一枚去皮尖雙仁麩炒右㕮咀用水三盞石器內煎去滓取一盞半分作三服食後溫服又一方無烏梅欵冬花丸治塞壅咳嗽語聲不出欵肺氣化痰涎欵冬花麻黃不去根節甘草生杏仁不去皮尖各一兩右為末煉蜜和丸如櫻桃大每服一丸含化桂杏丸治咳嗽語聲不出及傷風冷氣不通溫肺潤氣桂去粗皮半兩杏仁一兩半去皮尖雙仁麩炒右為末煉蜜和丸如櫻桃大每服一丸含化咽津一方不用蜜療暴中冷傷寒鼻喘咳喉中啞塞失音聲者右取芫花根一虎口切爆冷病人以薦自榮就裏舂芫花根令飛揚入其七孔中當眼淚出口鼻皆羅刺郎達切畢畢耳勿住令芫花根盡則止病必于此瘥治久嗽上氣失聲以人尿服之普濟方卷一百六十一
