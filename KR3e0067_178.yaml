心一兩焙栝樓根二兩茅根竹茹各五兩小麥三合烏梅去核七枚右㕮咀每服五錢水一盞半煎至一盞去滓溫服不拘時天竺黃散出聖惠方治痟渴心神煩躁口乾舌澀天竺一兩細研黃連半兩去鬚梔子半兩研川大黃半兩微炒馬牙硝半兩細研甘草一分炙微赤銼右為細末每服二錢煎竹葉水調下食後茯苓湯出聖濟總録治痟渴口乾唇焦心脾臟熱唯欲飲水白茯苓去黑皮麥門冬去心焙各四兩石膏五兩茅根銼一升右㕮咀每服四錢水一盞半入冬瓜一片同煎去滓溫服煎至七分不拘時黃連散出聖惠方治痟渴口舌乾燥煩熱不能飲食宜服黃連二兩去鬚葛根二兩銼麥門冬一兩去心枇杷葉二兩拭去毛炙微黃右為細散每服四錢水一中盞入生薑半分淡竹葉二七片煎至六分去滓不計時候溫服鉛霜丸出鄭氏家傳渴濁方治痟渴口乾煩燥飲水無度鉛霜半兩青黛栝樓根各一兩龍腦少許右細末令勻煉蜜和丸如梧桐子大每服二十丸微嚼煎竹葉湯下新汲水下亦得食後日三生麥門冬湯治痟渴口乾體瘦枸杞根白皮銼生麥門冬去心乾小麥各一升右三味以水一斗煮取五升去滓渴即飲之枸杞湯出聖濟總録治痟渴唇乾舌燥枸杞二兩銼石膏一兩碎小麥一兩五錢右㕮咀每服三錢水一盞煎至七分去滓溫服不拘時地黃煎聖濟總録治痟渴口舌乾燥生地黃三斤細切生薑半斤細切生麥門冬二斤去心右一處于石臼搗爛生布絞取自然汁用銀石器盛慢火熬稀稠得所瓷合貯每服一匙用溫湯化下不拘時冬瓜飲出聖濟總録治痟渴口乾日夜飲水無度渾身壯熱冬瓜一枚重三斤去皮瓤分作十二片麥門冬二兩去心黃連一兩五錢去心右二味㕮咀作十二服每服水三盞入冬瓜一片擘碎同煎至一盞去滓溫日三夜二服栝樓根丸出聖濟總録治痟渴飲水不止小便中如刺舌乾燥渴喜飲栝樓根五兩黃連一兩去鬚浮萍草二兩右為末用生地黃汁半盞于石臼內木杵搗令勻再入麵糊丸如梧桐子大每服三十丸食後臨卧牛乳湯下日三煎菖蒲湯下亦得地骨皮散出千金方治痟渴口乾燥骨節煩熱地骨皮一兩小麥半兩生麥門冬一兩去心右細銼和勻每服半兩水一盞煎至五分去滓溫服食後再服玊夜膏出本事方生津液紫蘇四兩桂一兩甘草二兩炙白梅肉四兩右為末搗白梅為丸如雞頭子大每服含化三丸甘草湯一名半髓煎聖惠方治痟渴口乾舌燥煩熱宜服此藥羊髓三合甘草一兩炙微赤切白蜜二合右先以水一大盞煮甘草至七分去滓後下髓蜜更煎至五七沸每于食後溫服一合豬膽丸出聖濟總録治口中乾燥無津液而渴雄豬膽五枚定粉一兩右酒煮膽候皮爛即入粉研細同煎成膏丸如雞頭子大每服二丸含化津咽治痟渴口舌乾燥骨節煩熱芭蕉根生右搗絞取汁時飲一二合治痟渴舌焦口乾飲水無度小便數出肘後方野雞一隻右用五味煮令極熟取汁二升半已來去肉取汁渴即飲之肉亦可食一方云細切和鹽豉作羔食和血益氣湯一名地黃飲子出試效方治口乾舌乾小便數舌上赤脈此藥生津液除乾燥生肌肉服此藥忌酒醋濕麵房事鹽血杏仁六箇生甘草三分已上二味治口乾舌乾也石膏六分治小便數也黃連酒浸八分治舌上赤脈也生地黃酒浸七分黃柏酒浸一錢柴胡三分當歸稍酒浸四分甘草炙三分升麻一錢紅花少許知母酒浸五分麻黃三分防己酒浸五分羌活五分桃仁九箇右㕮咀作一服水二大盞煎至一盞去滓稍熱食後服昔張安撫服此大效酸棗丸出千金方治口乾燥內痟酸棗三升五合酸安石榴子乾五合覆盆子三兩烏梅十枚葛根三兩栝樓根茯苓各三兩半麥門冬四兩石蜜四兩半桂心一兩六錢右為末蜜丸含化不限晝夜口中津液為度復取含無忌之木瓜丸出十便良方生津液止渴思飲食好木瓜二兩烏梅肉半兩茴香炒丁皮白芷各二錢半甘草二錢右為細末煉蜜為丸如彈子大每服一丸含化橄攬丸生津液壓壅百藥煎一兩白梅一錢檀香二錢蒲黃二錢腦子一分研麝香一分研右件研勻甘草少許和丸如菉豆大每服二三丸含化地黃煎丸出聖濟總録治痟渴口乾燥生地黃取汁二升半生栝樓根取汁二升半羊脂碎切半升白蜜一斤黃連一斤去鬚别搗為末右五味先取地黃汁等四味入銀石器內慢火煎令脂消熱傾出將黃連末同搗令得所衆手丸如梧桐子大每服二十丸粟米飲下日三五服麥門冬丸出聖濟總録治痟渴口乾燥方見本門痟渴飲水過度類栝樓湯一名枸杞湯出聖惠總録治痟渴口乾舌焦精神恍惚方見本門渴利類加減腎氣丸出濟生方治腎水不足心火上炎口舌乾燥多渴引飲肢體消瘦山茱茰取肉白茯苓去皮牡丹皮去木熟地黃酒蒸五味子澤㵼鹿角鎊山藥炒各一兩沈香不見火官桂不見火各半兩右為末煉蜜丸如梧桐子大每服七十丸鹽湯米飲任下弱甚者加附子一兩兼進黃耆湯參苓飲子出衛生寶鑑治口乾燥生津液思飲食黃耆熟地黃白芍藥五味子麥門冬各三兩去心白茯苓一分甘草半兩人參半兩天門冬半兩去心右為細末每服三錢水一盞半生薑三片棗二枚烏梅一箇同煎至一盞去滓溫服食後蘿蔔煎出聖惠方治痟渴發動飲水無限口乾渴蘿蔔右爛搗絞汁二升任性渴即飲之一方入粳米攪作粥飲喫甚效又方海上名方北五味子右濃煎湯飲之又方海上名方兔絲子右煎汁任意服之渴止為度治痟渴口乾本草方粟米右炊飲食之良治痟渴飲水日夜不止口乾小便數本草方田中螺五升右以水一斗浸經宿渴飲之每日一度易水換生螺為妙除煩止悶口乾渴疾止怒令人喜本草方蓮藕右以生研服之治痟渴口乾本草方小麥右炊作飯及煮粥食之普濟方卷一百七十八
