body:
  text: 普濟方卷一百七十八明周王朱橚撰痟渴門痟中附論夫痟中病者由渴少而飲食多也一名內痟此由脾臟積熱故使痟穀也亦有服五石之藥熱結于腎內石性歸腎腎得石則實實則生熱熱則痟水故小便少也又臟腑虛冷小便利多津液枯竭則不得潤養五臟而生諸疾皆由勞傷過度愛欲恣情致使脾腎氣虛石勢孤盛則作痟中故渴少食多而小便赤黃也宜滋腎水養津液則差也肉蓯蓉丸出聖濟總録治痟中虛極小便無度肉蓯蓉酒浸一宿切焙二兩澤㵼熟地五味子巴戟天去心地骨皮人參栝樓根韭子甘草炙牡丹皮各一兩桑螵蛸炙三十枚赤石脂研龍骨磁石煆醋淬二七遍研禹餘糧煆醋淬七遍研各一兩半右為末煉蜜丸如梧桐子大每服三十丸牛乳汁送下牡蠣散出聖惠方治痟中心神煩熱肌肉乾瘦小便赤黃腳膝無力喫食不成肌膚牡蠣三分燒為末硃砂半兩細研龍齒三分蘆薈三分黃連二兩去鬚鐡粉一兩細研澤㵼半兩甘草半兩炙微赤銼黃丹一分栝樓根雞肶胵三兩令黃色桑螵蛸胡粉一分赤石脂二兩右為散入研了藥令勻每服不計時候煎大麥仁湯調下一錢天門冬丸出聖濟總録治初得痟中食已如飢手足煩熱背膊疼悶小便稠濁天門冬去心焙二兩半雞內金三具微炒桑螵蛸十枚炙土瓜根乾者肉蓯蓉酒浸一宿切焙乾熟地栝樓根知母焙澤㵼銼鹿茸去皮毛酒浸炙五味子牡蠣煆二兩赤石脂一兩半苦參一兩右為末煉蜜和丸如梧桐子每服二十丸煎粟米下牡蠣丸出聖濟總録治痟中食已即飢手足煩熱背膊悶疼小便稠濁牡蠣研赤石脂研栝樓根各一兩黃連三兩去鬚肉蓯蓉酒浸一宿切焙乾一兩土瓜根銼黃芩去黑心知母焙澤㵼天門冬去心焙鹿茸去皮毛酒浸炙五味子桑螵蛸麩炒各三兩熟乾地黃焙一兩半右為末别研二味和勻煉蜜丸如梧桐子大每服三十丸煎陳粟米飲下日三夜一附子豬肚丸出三因方治痟中多因外傷疸熱內積憂思喜啖鹹食及麵致脾胃乾燥飲食倍常不生肌膚大便反堅小便無度附子炮去皮臍檳榔不焙各一兩鱉甲醋炙兩半當歸知母木香炮川棟銼炒秦艽去苖土大黃酒蒸龍膽草白芍破故紙酒浸炒各半兩枳殼麩炒去瓤子半兩右為末分作三分將二分入豬肚內縫定以蒸酒二升童子小便五升同入砂鉢內熬乾研爛細入一分末同搜搗為丸如梧桐子大每服五十丸溫酒米湯下豬腎薺苨湯出千金方治痟中日夜尿七八升者豬腎一具大豆一升薺苨石膏各二兩人參茯苓一作茯神磁石知母葛根黃芩甘草栝樓各二兩右㕮咀以水一斗五升先煮豬腎大豆取一斗去滓下藥煮取三升分三服渴即飲之下焦熱者夜輒合一劑病漸歇即止鉛霜散出聖惠方治痟中久不差令人乾瘦少力心神煩亂眠卧不安鉛霜三分細研金箔銀箔麥門冬一兩半去心焙黃連半兩子芩半兩犀角半兩人參半兩去蘆頭雞肶胵一兩半微炙土瓜根半兩知母半兩苦參半兩銼右為散入前三味同研令勻每服不計時候以清粥飲調下一錢黃蓍丸出聖惠方治痟中渴不止小便赤黃腳膝少力縱食不生肌膚黃蓍一兩切牡蠣三兩燒為粉栝樓根半兩甘草半兩炙微赤切麥門冬一兩去心焙地骨反半兩白石脂半兩澤㵼半兩知母半兩黃連半兩薯蕷半兩熟乾地黃半兩右為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以清粥飲下三十丸薺苨丸出濟生方治強中為病莖長興盛不交精液自出痟渴之後多作癰疽多由過服丹石所致薺苨大豆去皮茯神去木磁石煆研極細元參栝樓去根地骨皮去末石斛去根熟地黃酒蒸鹿角各一兩沈香不見火人參各半兩右為末用豬腎一具煮如食法爛杵和為丸如梧桐子大每服七十丸空心用鹽湯送下如不可丸少入酒糊亦可煉蜜丸亦可薺苨湯出聖濟總録治內痟所食物皆作小便兼治強中薺苨大豆人參白茯苓去黑粗皮切磁石搗如米粒葛根銼石膏碎黃芩金去黑心栝樓根甘草炙銼知母焙各二兩右件㕮咀每服五錢水二盞煎至一盞去滓溫服日三夜一茯神丸出直指方治痟中煩熱消穀小便數人參去蘆茯神去木生乾地黃去土黃連淨麥門冬去心枳殼去瓤牡蠣粉各一兩蓮肉去心黃蓍炙知母去毛各半兩栝樓根七錢半右為末煉蜜和搗三百杵丸如梧桐子大每服五十丸清粥飲下之花蓯蓉丸治渴多者不問食宜服煮散桑根白皮薏苡仁五味子各六兩通草紫蘇莖葉各四分覆盆子枸杞子各八分乾地黃九分茯苓菝葜各十二分黃蓍二分右㕮咀分為五貼每貼用水一升八合煎取七合去滓溫服忌鮓物蕪荑石子薺苨湯出三因方治強中多因耽嗜色欲及快意飲食或服丹真氣既脫藥氣隂發致煩飲水飲食倍常隂氣常興不交精自出中焦虛熱注于下焦三痟之中最為難治薺苨石膏各三兩人參茯神栝樓根磁石煆碎知母乾葛黃芩甘草各二兩右銼為散每用水三盞腰子一箇去脂膜黑豆一合煮至盞半去腰子大豆入藥四錢煎至七分去滓食後服下焦熱則夜間服渴止勿服次投補藥黃蓍湯出千金方治痟中虛勞少氣小便數黃蓍芍藥生薑桂心當歸甘草各二兩大棗二十枚黃芩乾地黃麥門冬各一兩右㕮咀以水一斗煮取三升分三服日三水銀丸出聖濟總録治痟中食飲無度小便日夜頻數轉加羸瘦水銀一兩銀箔二百片與水銀共研鐡粉别研牡蠣煆各三兩栝樓根麥門冬去心焙黃芩去心焙苦參黃連梔子仁各二兩右七味為末别研三味和勻用棗肉研搗為丸如梧桐子大每服四十丸煎蘆根湯下日二夜一白术散出直指方治消穀痟中善飢人參白术白茯苓甘草炙藿香葉去土各一兩白乾葛二兩木香半兩加北五味去梗根柴胡去毛枳殼去瓤右銼散每服三錢新火煎去滓不拘時脾痟中之證飲食之腹如湯澆雪隨小便而出落于溷僻溝渠中皆旋結如脂肌膚日益消瘦用熱藥則熱愈甚用涼藥則愈見虛羸不能起止精神慌惚口舌焦乾或陽強內下盛不交而泄其斃不久無治法姑録一二方聊為備用云耳知母丸出聖濟總録治痟渴痟中久不差知母焙麥門冬去心焙各一兩犀角鎊鉛霜雞肶胵炙土瓜根各半兩白茯苓去黑皮黃連去須各二分金箔二十片右為末煉蜜為丸如梧桐子大每服十丸煎人參湯飲下薺苨散出聖惠方治痟中煩熱喫食旋消四肢瘦弱薺苨一兩人參一兩去蘆頭葛根一兩石膏二兩黃芩栝樓根知母甘草各一兩微炙赤銼右為散每服四錢以水一盞半入大豆一百粒煎至六分去滓不計時候溫服黃蓍散出聖惠方治痟中煩悶熱渴不止黃蓍一兩銼麥門冬一兩去心蘆根一兩栝樓根兩紫蘇莖葉一兩生乾地黃銼桑根白皮銼澤㵼各半兩甘草一兩炙微赤銼右為散每服四錢以水一中盞入生薑半分竹葉二七片煎至六分去滓不計時候溫服鉛霜丸出聖惠方治痟中渴飲水不多心神煩亂四肢燥熱少眠宜服鉛霜三分細研栝樓根一兩半甘草半兩炙微赤銼石膏三分細研知母三分子芩三分鐡粉半兩細研黃連半兩硃砂半兩細研右為末入研了藥令勻煉蜜和搗二三百杵丸梧桐子大每服食後以清粥飲下二十丸茯神丸出危氏方治痟中煩熱小便數茯神一兩地骨皮黃蓍銼知母各半兩牡蠣一兩燒為粉栝樓根三分黃連三分去須麥門冬三分去心焙熟乾地黃一兩右為末煉蜜和丸如梧桐子大不計時候清粥飲下二十丸黃連丸出聖濟總録治痟中小便數黃連五兩去心栝樓根白龍骨碎苦參牡蠣粉山茱茰土瓜根切萎㽔各三兩右為末煉蜜丸如梧桐子大每服二十丸至三十丸大麥飲下日三夜一服澤㵼丸出聖惠方治痟中渴不止小便數熱四肢無力澤㵼一兩麥門冬三兩去心焙車前子半兩黃連三分去須牡蠣一兩燒粉桑螵蛸半兩微炒雞肶胵一兩微炒金箔五十片研入右為末入研了藥令勻煉蜜和搗三二百杵丸梧桐子大不計時候以蠶蛹湯下三十丸黃芩湯出聖濟總録治痟中脾胃熱極消穀引食化為小便黃芩去黑心麥門冬去心焙栝樓根梔子仁石膏碎淡竹葉各一兩右㕮咀每服四錢水一盞半煎至八分去滓溫服不拘時地骨皮散出聖惠方治痟中虛羸煩熱口苦眠卧不安地骨皮二兩栝樓根一兩石膏二兩黃連一兩甘草一兩炙微赤銼右為散每服四錢以水一中盞煎至六分去滓不計時候溫服之順氣散出濟生拔粹治痟中者熱在胃而能飲食小便黃赤以此下之不可多利微利至不欲食而愈厚朴一兩製大黃四錢枳實二錢右銼水煎五錢食逺服薑粉散出危氏方治痟中多因外傷脾熱內積憂思喜啖鹹食及致脾胃乾燥飲食倍常不為肌膚大便反堅小便無度生薑研汁控粉輕粉右搜勻每服二錢長流水調下齒浮是效投豬肚丸補黃蘗丸出聖濟總録治痟中黃蘗二兩去粗皮黃連半斤右為末用酥拌和搗三百杵丸梧桐子大每服三十丸溫漿水下豬肚黃連丸出直指方治久痟渴變為痟中者飲食到胃即時消化小便多而色白所食多而不覺飽者豬肚一枚洗去脂膜不切破黃連五兩搗羅為末右以大麻子仁二合爛研水四升調如杏酪汁煮豬肚候爛取出入黃連末在內密縫肚口蒸令極爛乘熱細切和黃連末以木臼搗可丸如梧桐子大曝乾每服三十丸溫水下不拘時神效散出聖惠方治痟中渴不止心神煩熱皮膚乾燥宜服此浮萍草三兩乾者土瓜根一兩半右為末每服二錢以牛乳汁調下不計時候兔絲子丸出指南方治精血枯竭肌膚消瘦發渴兔絲洗淨酒浸炒乾右為末蜜丸梧桐子大每服五七十丸米飲吞下為末調服亦得一方煎兔絲子湯下又方蜜合麵糊丸治痟中日夜尿七八升者出千金方鹿角炙令焦右為末以酒服五分匕日三漸加至方寸匕又方出千金方漚麻右汁服一升佳黃連豬肚丸出三因方治強中痟渴服石子齊苨湯方在本類前瘥退可服此補養方見本門痟渴類治痟中日夜尿七八升出千金方用葵根如五升盆大兩束外臺云五十斤以水五斗煮取三斗宿不食平且二服三升即冬葵俗呼葵菜蓯蓉丸出指南方治痟渴蓯蓉五味子山茱茰各等分右為細末煉蜜丸如梧桐子大每服三十丸用鹽酒飲下栝樓散出聖濟總録治內痟肌膚羸瘦或轉筋小便利甚栝樓根黃連防己銼鉛丹研各一兩半右為散與鉛丹和勻每服二錢用醋半合沸湯調下日二夜一黃連豬肚丸出危氏方治強中渴服栝樓根散方見痟渴類薺苨湯方在本類後便可服此亦能補養豬肚一枚治如食法黃連小麥炒各五兩天花粉茯神去木各四兩麥門冬去心右為末納豬肚中縫塞安甑中蒸之極爛木臼小杵可丸如梧桐子大每服七十丸米飲送下隨意服之如不能丸入少煉蜜茱茰丸出十便良方若其人素渴引飲一旦不渴小便日夜數十行氣乏內痟謂之痟中宜服此藥蓯蓉五味子山茱萸乾山藥右件藥等分搗羅為細末以酒煮麵糊為丸如桐子大每服三十丸空心米飲下止渴潤燥湯出鮑氏方治痟中大便祕澀燥硬兼喜溫飲隂頭退縮舌白乾燥唇口乾眼澀黑處見浮雲升麻一錢半柴胡七分甘草二分黃柏一錢酒浸知母一錢石膏七分杏仁六箇桃仁泥一錢麻仁泥一錢當歸身八錢紅花少許防風根三錢荆芥穗一錢熟地黃三分小椒二分細辛一分右㕮咀都作一服水二碗煎至一盞去滓食後溫服忌辛熱物清涼飲子一名生津甘露湯出誠效方治痟中能食而瘦口乾舌乾自大便結燥小便頻數羌活一錢柴胡一錢升麻四錢防風五分當歸身六分生甘草五錢炙甘草一錢石膏一錢半知母一錢酒浸漢防己五分草龍膽酒製一錢五分黃蘗一錢五分紅花少許桃仁五箇杏仁十箇生地黃酒製五分黃蓍一錢黃