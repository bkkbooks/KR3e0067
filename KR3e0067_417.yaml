body:
  text: 普濟方卷四百十七明周王朱橚撰鍼灸門諸風附論凡諸百邪之病源起多塗其有種種形相示表癲邪之端而見其病或有黙黙而不聲或復多言而慢說或歌或哭或吟或笑或眠坐溝渠噉食糞穢或祼形露體或晝夜遊走或嗔罵無度或是蜚蠱精靈手亂目急如斯種類癲狂之人今針灸與夫方藥並主治之凡占風之家亦以瘋為鬼斷扁鵲云百邪所病者針有十三穴也凡針之體先從鬼宮次針鬼信便至鬼壘又至鬼心未必須併針止五六穴即可知矣若是邪蠱之精便自言説論其由來往驗有實立得精靈未必須盡其命求去與之男從左起針女從右起針若數處不言便遍穴針也依訣而行針灸等處並備主之仍須依掌訣捻目治之萬不失一黄帝掌訣别是術家祕要縳鬼禁刼五嶽四瀆山精鬼魅並悉禁之有目在人兩手中十指節間第一針人中名鬼宫從左邊下針右邊出第二針手大指爪甲下名鬼信入肉三分第三針足大趾爪甲下名鬼壘入肉二分第四針掌後横文名鬼心入半寸即太淵穴也第五針外踝下白肉際足太陽名鬼路火針七鋥鋥三下即申脉穴也第六針大椎上入髪際一寸名鬼枕火針七鋥鋥三下第七針耳前髪際宛宛中耳垂下五分名鬼牀火針七鋥鋥三下第八針承漿名鬼市從左出右第九針手横文上三寸兩筋間名鬼路即勞宮穴也第十針直鼻上入髪際一寸名鬼堂火針七鋥鋥三下即上星穴也第十一針隂下縫灸三壯女人即玉門頭名鬼藏第十二針尺澤横文外頭接白肉際名鬼巨火針七鋥鋥三下此即曲池穴第十三針舌頭一寸當舌下縫刺貫出舌上名鬼封仍以一板横口吻安針頭令舌不得動已前若是手足皆相對針兩穴若是孤穴即單針之岐伯曰中風大法有四一曰偏枯二曰風痱三曰風懿四曰風痺夫諸急卒病多是風初得輕微人所不悟宜速與續命湯依腧穴灸之夫風者病之長岐伯所言四者説其最重也經驗方云凡覺心中憒亂神思不怡或兼手足麻木此是風将發之候不問是風與氣宜速灸百㑹風池大權肩井曲池間使足三里七穴兩邊依次序自上及下灸之如灸稍遲氣塞涎上或失音将欲絶者便可依此次序灸之艾炷如蒼耳大灸三壯足三里灸五壯輪日以次灸之至隨年壯乃止大凡每遇春秋二時可於此七穴時復灸之以泄風氣如體中素有風氣者尤湏留意此灸法可保無虞此法能灸卒死醫書云凡民風發强忍怕痛不肯灸忽然卒死者是何病謂入藏故也有患風病者不可不知此灸法又云先賢論曰風中脉則口眼喎邪風中腑則肢體癈中臟則性命危凡治中風古方雖用續命防風等藥然此只可扶助疾病若要救危急收全功必湏火艾灼灸為良又云凡喎向左者謂左邊脉中風而緩也宜灸左凡喎向右者謂右邊脉中風而緩也宜灸右其艾炷大如麥粒各灸二七壯宜頻灸之以取盡風氣口眼正為度又云凡覺手足或麻或痛良灸乃已者是風将中腑之㑹宜灸百㑹等七穴病在右即灸右病在左即灸左如因循失灸手足已癈者春較秋灸秋較春灸以取盡風氣手足輕安為度凡風名從背五臟腧入諸臟受病肺病最急肺主氣息又冒諸臟故也中風治肺中風者其人偃卧而胷滿短氣胃悶汗出者肺風之證視目下鼻上兩邊下行至口色白者尚可治肺腧急灸百壯服續命湯小兒减之詩曰肺風喘促滿胷堂偃卧漿漿燥異常口鼻之間須要白尋衣肺壞色憂黄資生經王氏云若急黄者此為肺已傷化為血不可復治若為急風邪所中便迷漠恍惚妄言狂語或少氣惙惙不能復言若不求師即治宿夕而死即覺便灸肺腧及膈腧肝腧數十壯急服續命湯可救若涎唾出不收者即灸當立與湯池也諸陽受風亦恍惚妄言與肺病相似然著緩可經久而死治肝中風者其人但踞坐不得低頭繞兩目連額上色微有青者肝風之證若唇色青面黄尚可治肝腧急灸百壯服續命湯詩曰肝家踞怒不低頭左脇偏疼筋急搜額目唇青為可療目黄目白使人愁治心中風者其人但得偃卧不得傾側悶亂冐絶汗出者心風之證若唇正赤尚可治心腧急灸百壯服續命湯詩曰心風偃卧熱而瘖唇赤其身有汗青白黒青黄唇上見停停時悚扁醫驚治脾中風者其人但踞坐而腹滿身通黄吐涎汗出者尚可治脾腧急灸百壯服續命湯詩曰脾中風兮肌肉瞤踞而腹滿吐涎酸唇并肢體通黄疾手足眸青療已難治腎中風者其人踞坐而腰痛視脇左右未有黄色如餅粢大者尚可治腎腧急灸百壯服續命湯詩曰腎中踞而腰脊疼面浮耳黒賊風生脇無黄跡能痊愈直髪泥容旦暮傾治胃中風者腹滿填脹隔塞不通張口喘急額上多汗孫地仙所謂新食竟取為胃是也或曰風中諸臟不關諸府是亦一説然胃為水谷之海五臟皆取氣於胃故並存之胃腧急灸百壯服續命湯詩曰胃病根源飲食來擡肩喘息氣難開口張額汗腹中滿浮診䨇開脉大哉治大腸中風者卧而腸鳴不止大腸腧灸百壯可服續命湯治中風眼戴上及不能語者第二椎上及第五椎上灸各十壯齊下火炷如半棗核大立瘥治中風半身不遂資生經云黄帝岐伯曰中風半身不遂如何答曰凡未中風一兩月前或三五月前非時足脛上忽酸重頑痺良久乃解此将中風之候急灸三里絶骨四處三壯後用葱薄荷桃柳葉煎湯淋洗以驅逐風氣於瘡口出灸瘡春較秋灸秋較春灸常令兩脚有瘡為妙治飲食不節酒色過度忽中風言語蹇澁半身不遂宜七處齊下火各三壯風在左灸右右灸左穴百㑹耳前髪際肩井風市三里絶骨曲池七穴神效不能具錄依法灸無不愈治風中府手足不隨其狀覺手足或麻或痛良久乃已此将中府之候病左灸右病右灸左因循失灸癈者灸瘡春較秋灸秋較春灸取盡風氣集効穴百㑹曲鬢一作髪際肩髃曲池風市足三里絶骨治風中藏氣塞涎上不語極危者下火立効其狀覺心中憒亂神思不怡或手足麻此将中藏之候不問風與氣但依次自上及下各灸五壯日别灸隨年壯凡遇春秋常灸以泄風氣素有風人可保無虞此能灸暴卒穴百㑹風池大椎肩井曲池間使足三里集効方云治風莫如續命防風排風湯之類此可扶助疾病若救危急必火艾為良此論亦當資生經云范子黙自壬午年五月間口眼喎斜灸聽㑹等三穴即正右手足麻無力灸百㑹髪際等七穴得愈癸未年八月間氣塞涎上不語金虎丹加膩粉服至四丸半氣不通涎不下藥從鼻中出魂魄飛揚如墜江湖中頃欲絶灸百㑹風池等左右共十二穴氣遂通吐㡬一碗許斷又下十餘行伏枕半月餘遂平爾後不覺意思少異於常心中憒亂即便灸百㑹風池等穴立効本事方云十二穴者謂聽㑹頰車地倉百㑹肩髃曲池風市足三里絶骨髪際大椎風池也依而用之立効凡氣塞涎上不能語心中風候也巢氏病源常論之古方雖謂但得偃卧悶絶汗出者心中風之候恐未盡也范公灸得氣通盖灸百㑹之力其吐㡬一碗下十行者豈金虎丹加膩粉所致耶治大患風者先補後㵼少可患以經取之穴風池治中風支滿短氣不食食不消吐血目不明閉塞穴肝腧治偏枯不能行大風暴不知人卧驚視如見星穴隂蹻治卒中風不識人穴臨泣治風面浮腫顔黒厥氣上衝腹脹大便下重瘈驚膝股䯒􅀈轉筋目眩頭痛穴解豁治中風喜恐悲笑不休手痺穴勞宮治中風肘攣實則心暴痛虚則心煩惕惕風頭耳後痛煩心足不收失履口眼喎僻頭項瘈痛牙車急穴内關完骨治心中風語悲泣穴心腧治風癎中風角弓反張或多哭言語不擇發即無時盛即吐沫心驚煩健忘穴百㑹治狂易大風穴崑崙治風眼腿脚不隨灸巨室上㢘二穴各灸三壯治大風黙黙不知所痛視如見星穴照海治大風黙黙不知所痛悲傷不樂穴天井治清風心風穴百㑹治偏風熱風穴肩髃治肝風占候其口不能言穴鼻下人中大椎肝腧灸五十壯餘處隨年壯眼暗人灸之得明二三百壯良治心風寒穴心腧灸各五壯治心風穴心腧兩邊各一寸二分灸各五七壯治心風食脹滿食不消化吐血酸痛四肢羸露不欲食飲鼻血目眩􅉩􅉩不明肩頭脇下痛小便急穴肝腧二穴灸二三百壯瘥即止一云灸心腧治卒中惡風心悶煩毒欲死穴足大指下横文急灸隨年壯立愈内踝筋急不能行者内踝上急灸四十壯外踝筋急不能行者外踝上急灸三十壯立愈眼戴精上挿自兩背後灸二七壯不能語第三椎上灸百壯不識人季肋頭灸七壯眼反口噤腹中切痛陰囊下第一横理灸十四壯灸卒死亦良治大風卒風緩急諸風卒發動不自覺知或心腹脹滿或半身不隨或口噤不言涎唾自出目閉耳聾或舉身冷直或煩悶恍惚喜怒無節或唇青口白戴眼角弓反張始覺發動穴神庭灸七壯次曲差次上關次下關次頰車次㢘泉次𩕄㑹次本神次天柱次陶道次風門次心腧次肝腧次腎腧次膀胱腧次曲池次肩髃次支溝次合谷次間使次陽陵泉次陽輔次崑崙已上各七壯治風穴上星灸二百壯前項二百四十壯百㑹二百壯腦戸風府各三百壯治大風穴百㑹灸七百壯治百種風腦後項大椎平處兩相量二寸三分須取病人指寸量兩相各灸百壯得瘥治風耳鳴從耳後量八分半裏許有孔灸一切風得瘥狂者亦瘥兩耳門前後各百壯治卒病惡欲死不能語及肉痺不知人第五椎名曰藏腧灸百五十壯三百壯便愈治風腹中雷鳴腸澼泄食不消化小腹絞痛腰脊疼彊或大小便難不能飲食穴大腸腧灸百壯三日一報治風穴掖門灸五十壯治風身重心煩足脛疼穴絶骨灸百壯治惡風邪氣泣注喜忘穴百㑹天府曲池列缺治風入腹中穴湧泉治耳中風生穴商陽治大風目痛及目外背痛穴臨泣治面黒濕風穴關衝治風從頭至足面目赤穴解谿治風寒熱穴掖門治手中風熱穴内關治頭身風熱穴間使治身風寒穴後谿治胷中寒如風壯及治頭眩兩頰痛穴俠谿治肺寒穴肺腧灸百壯治腎寒穴腎腧灸百壯治大風逆氣多寒穴大横王氏云鄉里有人忽覺心腹中熱甚急投藥鋪説其狀鋪家以為此中風之候與治風藥而風不作中心藏之至夷陵見一太守中夏忽患熱甚不免以水洒地設簟卧其上令人扇之次日忽中風數日而殂人皆咎其卧氷簟而用扇也暨到澧陽見一老婦人夏中亦患熱夜卧㕔上次日中風遇其子預合得小續命湯服更召醫調理數日愈始知人之中風心腹中多大熱而後作而小續命湯不可不服也王令患風醫以青州白丸子排風湯續命湯四物湯黄耆建中湯术附湯嘉禾㪚各為一處同和分數服每服水一碗棗三枚生姜五片同煎至七分去滓温服自後與人服皆効周户傳三湯四㪚子用四君子排風續命湯嘉禾急風正氣匀氣㪚一切風氣無不瘥又云凡中風用續命排風等湯神精丹茵芋酒更加灸必愈治熱風兩乳頭各灸一七壯足外踝後一寸各灸三壯頂中旋毛灸一七壯治風頭耳後痛煩心及足不收失履口喎僻頭項摇瘈痛牙車急穴完骨治風身熱穴後谿治風十指筋攣不行屈伸兩手踝骨上各灸一七壯治中風手足不隨穴百㑹肩髃聽㑹曲池三里懸鍾風市等七穴左治右右治左以取盡風氣輕安為度治繞踝風刺曲池二穴如繞外踝痛兼刺絲絡二穴如繞内踝痛兼治大都二穴針入三分如腚前痛兼刺行間二穴針入六分中風不語治脾風占候聲不出或上下手當灸手十指頭次灸人中次大椎次兩耳門前脉去耳門上下行一寸是次兩大指節上下各七壯治脾風穴脾腧脊兩邊灸各五十壯凡人脾腧無定所隨四季月應病即灸藏腧是脾穴此法甚妙治脾風者總忽為八風猥腿風半身不遂失音不語者穴百㑹灸百壯次本神次承漿次風府次肩髃次手五冊次手隨孔次手少陽次足五冊次足髓孔次足陽明各灸五百壯治中風失瘖不能言語緩縱不隨及風痱不能語手足不隨卒病欲死不能語肺中風不能言穴天牕先灸五十壯息火百㑹仍移灸五壯畢天牕還灸五十壯若發先灸百㑹則風氣不得泄内攻五藏喜閉伏仍失音也所以先灸天牕次百㑹佳一灸五十壯悉泄火勢復灸之視病輕重重者一處三百壯大効凡中風服藥益劇者但是風穴悉皆灸三壯無不愈神良决定勿疑不至心者勿浪為灸巢氏云脾脉絡胃夾咽連舌本㪚舌下心之别脉繫舌本心脾受風邪故舌强不語三陽之經並絡入頷頰夾於口諸陽為風寒所客則筋急故口噤不得開治卒中風口噤不得開機關千金翼名頰車二穴各灸五壯即得語又灸隨年壯僻者逐僻左右灸治卒中風口喎葦筒長五寸以一頭刺耳孔中四畔以麫密塞勿令泄氣一頭内大豆一顆并艾燒令燃灸七壯差右灸左左灸右千金不傳耳病亦灸之治中風口喎手交脉灸三壯左灸右右灸左炷如鼠屎形横安兩頭下火治口喎穴刺承泣治風中脉口眼喎斜若久不治亦傳入藏慎不可忽穴聽㑹頰車地倉經驗方云自崇寧壬午年五月間忽口眼喎斜灸聽㑹等穴即正後右手足麻木無力灸百㑹髪際等七穴得愈癸未年八月間氣塞涎上不能語取金虎丹膩粉服至四丸半氣不通涎不下藥從鼻中出魂魄飛揚如墜江湖中頃刻欲絶灸百㑹風池等左右共十二穴氣遂通吐涎㡬一碗許繼又下十餘行伏枕半月餘遂平復方覺意思惶快每遇心中憒亂即灸百㑹風池等穴無不立效固知灸有神聖之功非藥所能及也甲申十月既望正思識治風口喎穴列缺二穴别走陽明者灸三壯患左灸右患右灸左治風失音不語穴合谷各灸三壯治不能言穴通理治中風口喎僻口吻口横絞間灸覺火熱便去艾即愈勿盡艾則大過若口左僻灸右吻右僻左吻又手中指節上灸一炷治口喎斜耳垂下麥粒大艾灸三壯左灸右右灸左治風寒之氣客於藏間滯而不能發故瘖不能言及候痺失聲皆風邪所為也入藏皆能殺人穴百㑹灸百壯鍼入三分補一治中風卒失聲聲噎不出穴大椎旁一寸五分又刺其下停針之治風痱不能語手足不遂度病者手小指内岐間至指端為度以置臍上直望心下以丹注度上端畢又作兩度續所注上合其下開其上取其本度横置其間上令三合其壯如倒作某字形男度左女度右手嫌不分了故上丹注三處同時起火灸之各一百壯愈治中風口噤牙關不開刺水溝針入四分次針頰車令人側卧張口取之針入四分得氣㵼治中風不能語第二顀或第五顀上灸五十壯治風入臟使人瘖啞卒口眼相引牙車急舌不轉喎僻者口吻邊横紋赤白際逐左右灸隨年壯報之至三日不瘥更報之治中風氣塞涎上不語昏危者穴百㑹風池大顴肩井曲池間使三里等七穴左治右右治左以取盡風氣精神為度其病並依穴針灸或有不愈者一則不中穴二則雖中穴刺之不及其分三則雖及其分氣不至出針四則雖氣至不明補㵼故其病或有隨針而卒者一則不知刺禁假令刺中心即死之類是也二則不明脉候假令下痢其脉忽大者死不可刺之凡針灸者先須詳審脉候觀察病證然後知其刺禁辨其經絡穴道遠近氣候息數深淺分寸其病刺之獲時而愈者矣不可一途而取不可一理而推治中風失音刺任脉天突一穴在結喉下一寸宛宛中陰維之㑹針入五分次針手少陰經神門二穴在掌後兊骨之端䧟中刺入三分次針手少陽經支溝二穴在腕後三寸兩骨之間䧟中針入三分次針足少陰經湧泉二穴在足心屈足卷指宛宛中針入五分如舌急不語刺瘖門一穴在頂中央入髪際五分宛宛中仰頭取之針入二分如舌緩不語刺風府一穴在頂髪際上一寸大筋内宛宛中針入三分偏風治偏風口喎手腕無力半身不遂欬嗽掌中熱口噤不開穴列缺治偏風口目喎牙車急穴下關治偏風口面喎頸項痛不得顧小便赤黄喉痺頰腫穴完骨治偏風口喎面腫穴承漿治偏風口喎穴衝陽地倉治偏風口喎面痒浮腫風動葉葉狀如蟲行或唇腫痛穴迎香治冷風濕痺風疹偏風半身不遂腰胯痛不得轉穴環跳治偏風不遂熱風癮疹手臂攣急捉物不得挽弓不開臂細無力筋骨酸疼又治手不得向頭穴肩髃若灸偏風可七七壯不宜多治偏風半身不遂刺風疹疼痛冷緩捉物不得挽弓不開屈身難隠脉風臂肘細無力穴曲池治偏風不遂穴陽陵泉環跳曲池治大風偏枯半身不遂穴照海治偏風腰腿手足不仁穴上㢘治半身不遂穴下崑崙委中治偏風穴地倉承山上㢘下㢘治手足偏枯穴陰蹻治猥腿半身不遂失音穴灸百㑹半身不遂男女皆有此患但男尤忌左女忌右耳若得此疾後風藥不宜暫闕常令身上有灸瘡可也最忌房室或能如道釋修養方能保其無他若灸則當先百㑹𩕄㑹次風池肩髃曲池合谷環跳風市三里絶骨不必拘舊經病左灸右病右灸左之説但按酸疼處灸之若兩邊灸亦佳但當自上而下灸之治偏枯手足不能伸穴刺委中試効方云陜師郭巨濟病偏枯二指著足底不能伸迎先師于京師治之至則以長鍼刺委中深至骨而不知痛出血三升其色如墨又且繆刺之如是者六七刺服藥三月病良愈治偏風宜針下項七處灸亦得穴風池肩髃曲池支溝五樞陽陵泉巨虚下亷治風腰脚不隨不能跪起穴上髎環跳陽陵泉巨虚下亷風勞治風勞氣欬嗽胷中鬰鬰身熱目眩穴大杼治風勞食氣穴大椎治風勞嘔逆上氣胷背痛喘氣卧不安穴風門治風勞腰脊痛穴膀胱腧治風勞驚恐吐血肘臂痛嗜卧四肢不得動穴五里治風勞臂肘不仁穴附分治風勞失精身體極痛洩水下痢膿血陰腫䯒痛穴曲泉治風勞腰痛穴膀胱腧關元腧治風勞痺逆狂邪膝冷手節攣縮身病丙穩禾疹腹脹少氣頭重風勞穴伏兎灸腦户五壯針三分補之治風勞發背癰疽用麻䋲一條蠟過從手中指第二節量至心坎骨截斷須直伸臂折過自前項下取中纒至後心相對合齊閉口量兩吻闊狹以此為則對灸七壯神効風痙治風痙穴顱𩕄治風痙口噤牙疼頰腫惡寒舌强不能言穴大迎治寒熱風痙脊强反折瘈瘲穴瘂􅂒治癲疾風痙牙齗腫善驚穴天衝治熱痙引骨痛穴脾腧膀胱腧治瘈瘲沫出寒熱痙引骨痛穴上關治寒熱痙反折穴腎腧中膂腧長强治筋寒熱痙筋急手相引穴肝腧治痙上氣失音不能言穴魚際治反折穴腰腧治角弓反張穴百㑹治脊强反折穴上窌腰腧風眩治風眩項痛頭强寒熱穴完骨治卒不識人風眩鼻塞穴當陽臨泣治風眩穴後頂玉枕頷厭治風眩擎手棬甲乙手棬作手腕痛泄風汗出腰項急穴陽谷治風眩頭痛嘔吐心煩穴承光治坐如在舟車中穴申脉治風頭眩穴神庭上星𩕄㑹治風眩穴天牖前頂治頭目風眩穴攅竹王氏云千金方載徐嗣之言曰風眩之病起於心氣不足胷上蓄熱實痰熱相感而動風風心相亂則悶瞀故謂之風眩瞀大人曰癲小兒曰癎則是風眩癲癎本一疾也不知後人何為拆而三之予因分為三門且從為之辭以釋世醫之疑云治醉酒風熱發两目眩痛及治不能飲煩憊嘔吐穴率谷治風眩穴天柱治風眩心中恍惚不定以繩横度口至兩邊既得口寸數便以其繩一頭度鼻盡其兩邊兩孔間得鼻寸數中屈之取半合於口之全度中屈之先覔頭上廻髪當廻髪灸之以度四邊左右前後當䋲端灸之前以面為正並依年壯多少一年凡三灸皆須瘡瘥又灸壯數如前若數處廻髪則灸其近當鼻者或廻髪近額一宜灸治諸風眩暈穴𩕄㑹灸七壯真頭痛者其痛上穿風府䧟入于泥丸宫不可以藥愈夕發旦死旦發夕死盖頭中風人之根氣死絶也風痺治驚悸瘈瘲風痺臂肘痛捉物不得穴天井治風痺手臂不舉肩中熱痛穴肩真治風痺攣手臂不舉穴尺澤治寒熱風痺項痛肩背急頭痛穴消濼治風痺膝内痛引臏不可屈伸喉咽痛穴膝關治痿厥風痺頭重䪼痛髀樞股䯒痛瘈瘲風痺不仁時有寒熱四肢不舉穴附陽治風痺不仁穴陽輔陽關治風痺穴委中又穴少海治風濕痺穴委中下㢘治冷風濕痺及治卒病肉痺不知人穴環跳治週身痺大風穴膈腧二穴各灸二壯岐伯曰中風大法有四四曰風痺巢氏曰風寒湿三氣合而為痺風多者為風痺風痺之状飢膚盡痛復手足不随也治當以此求之速與續命湯依腧穴灸之風癎治癲風不識人羊鳴穴神庭治風癎青風心風角弓反張羊鳴多哭言語不擇發時即死吐沫心熱悶頭風多睡心煩驚悸無力忘前失後食無味頭重飲酒面赤鼻及療登髙而歌棄衣而走角弓反張羊鳴吐舌穴百㑹治風癎中風角弓反張或多哭言語不擇發即無時盛即吐沫心煩驚悸穴百㑹治風癎目在上不識人穴神庭絲竹空治心中煩悶熱風風癎浪言或作鳥聲不能食無心力穴巨關治肌膚痛耳聲風癎穴㑹宗治風癎穴脊中湧泉治風癎穴前頂治風癎熱痛可㵼而後補穴上管治風癎癲邪穴脊腧治風癎穴湧泉神封强間治癎病羊鳴吐舌穴天井治馬癎張口搖頭馬鳴欲反折穴項風府臍中灸三壯治牛癎目正直視腹脹穴鳩尾骨大椎各灸三壯治羊癎喜揚目吐舌穴大椎灸三壯治猪癎喜吐沫穴完骨兩旁各一寸灸七壯治犬癎手屈拳攣穴兩手心足太陽肋户各灸一壯治雞癎搖頭反折喜驚自搖穴足諸陽灸各三壯治風癎穴神庭脊腧徐嗣曰風眩之病起於心氣不足胷上蓄熱實痰熱相感而動風風心相亂則悶瞀故謂之風眩瞀大人曰癲小兒曰癎此方為治萬無不愈困急時但度灸穴使大針鍼之無不瘥者初得針竟便灸最良余業此以來三十餘年所救活者數千百人病此而死不逢嗣故也續命湯主眩發煩悶無知口沫出血體角弓月反上口噤不得言竹瀝一升二合生地黄汁一升龍齒沫生姜防風麻黄去節各四兩防己附子炮三兩石膏十兩桂二兩右十味水一斗煮三升分三服有氣加附子一兩紫蘇五合橘皮一両其諭風眩癲癎甚有理故併其方附於此更有意此湯詳見千金方但小兒癎非心氣不足爾千金有風食驚癎三種本事有陰陽癎慢脾風三證慢脾即言食癎宜醒脾充人参散古方有癎元治小兒百二十種驚癎荆芥穗一兩礬一兩半生半枯為末糊丸黍米大硃沙衣姜湯下二十丸吾謂慢驚用來復丹急驚三癎丸食癎醒脾丸可也治癲疾馬癎穴金門僕参治目五般癎頭痛鼻塞穴眉衝治風癎熱病心風驚悸霍亂吐痢伏梁氣狀如覆杯穴上脘一穴三里二穴凡灸癎當先下便虚乃乗虚而灸之未嘗有實而灸者氣逼前後不通殺人若身體不甚熱心腹不脹滿便可灸之若壯熱滿者須先下後灸癲癎治卒暴癎眩足不任身穴天柱治癎發瘈狂走不得心中煩穴攅竹小海後頂强間治癲癎癲疾涎沫狂煩滿穴絲竹空通谷治癲癎陰囊下谷道正門當中門灸隨年壯治癲羊癎吐舌羊鳴戾頸穴天井小海治癲疾恆善驚羊鳴穴懸釐束骨治驚癎狂走癲疾穴筋縮曲骨陰谷行間治熱癎驚而有所見穴列缺治失笑無時癲癎語不識尊卑乍喜乍哭牙關不開穴水溝治發癎悲泣穴心腧治驚癎狂走癲疾脊急强目轉上垂穴筋縮治癲癎穴僕参金門治風癲癎邪穴脊中治大人小兒五癎穴神門治腫氣風癎癲風不識人羊鳴角弓反張披髪而上歌下哭多學人語驚悸不安寢穴神庭治癲癎吐舌沫出羊鳴穴少海治癲癎穴肺腧僕参治狂癎風癎吐血穴胃管灸百壯不針治狂癎不識人癲眩亂穴百㑹灸九壯難經䟽云狂病之後不愛眠卧不消飲食自言賢智歌樂行走此是陽氣盛之所為故經言重陽者狂今世以此為癲病謬矣癲病發即僵仆倒地故有癲蹶之言陰氣大盛故不得行立而倒也今世以為癎病者誤也其剖析癲狂之病曉然如此而人終不信豈亦傳習之誤難以改歟凡發狂則欲走或自髙貴稱神聖皆須備諸火灸之乃得求瘥悲泣呻吟此則為邪非狂也自依邪方治法治驚風癲癎痓病發搐神昏不語穴百㑹灸七壯至七七壯量輕重加減艾壯又兩足外踝下赤白肉際陷中金門穴灸七壯至七七壯癲疾治癲疾煩心悲泣穴觧谿治癲疾頭重穴瘂門治癲疾頭面浮腫齒齲穴完骨治頭痛癲疾風痙牙斷腫善驚穴天衝治癲疾脊强穴筋縮治癲疾穴申脉後谿前谷治癲疾嘔逆吐舌穴骨肉門治癲疾吐沫穴本神兊端治癲疾寒痛穴飛揚治寒熱癲疾穴承山崑崙治癲疾不可尚手臂不得尚頭穴尺澤治癲疾穴解谿陽蹻治癲疾嘔穴神庭上星百㑹聽㑹聽官偏厯攅竹身本築賔陽谿後頂强間腦户絡却玉枕治癲疾嘔沫寒熱痙互引穴兊端斷交承漿大迎絲竹空𩕄㑹天柱商立治寒熱悽􅀈鼓頷癲痙口噤穴承漿大迎治癲疾膝氣穴臑㑹申脉治癲疾手臂不得尚頭穴尺澤然谷治癲疾多言耳鳴口僻穴偏厯治癲疾互引善驚羊鳴穴懸釐束骨治癲疾大痩頭痛穴腦空束骨治頭痛癲疾互引數驚穴天衝治心中憒憒數欠癲心下悸恐咽中澹澹穴通谷治寒熱癲仆穴風池聽㑹復溜治癲疾僵仆狂瘧穴完骨治癲疾穴曲池治狂癲穴灸胃脘或灸巨陽王氏云有人患癎疾發則僵仆在地久之方蘇予意其用心所致多灸百㑹又疑是痰厥致僵仆為灸中管其疾稍减未除根也後關脉訣後通真子有愛養小兒謹䕶風池之説人來覔灸癎疾必為之按風池穴皆應手痠疼使灸之而愈小兒癎悲加可灸此治卒癲疾兩乳頭灸三壯足大指本業毛中灸七壯足小指本節灸七壯治狂癲癎疾穴足少陽灸隨年壯治癲背第二顀及下窮骨兩處以䋲度中折䋲端一處是脊骨上也凡三處畢復斷䋲作三折令各等而参合如某字以一角注中央灸下二角俠脊兩邊凡五處各一百壯削竹皮為度勝於䋲足大指上聚毛中又灸七壯陰囊下縫又灸二七壯兩乳頭又灸三壯督脉又灸三十壯三報天牕又灸至三百壯炷惟小作百㑹又灸至三百壯耳上髪際又灸各五壯驚癎治驚癎戴目上不識人穴顖㑹治驚癎破心吐血穴巨骨治心驚癎發狀如鳥鳴破心吐血中氣悶不喜聞人語心痛腹脹穴鳩尾治驚癎吐舌沫出穴少衝治驚癎癲狂身寒熱頭痛目眩穴束骨治驚癎狂走癎病多言脊强兩目轉上及目瞪穴筋縮治狂邪驚癎及驚狂走穴承命灸三十壯治狂癲風驚厥逆心煩穴巨陽灸五十壯治驚癎穴行間治驚風穴完骨風癲狂附論黄帝問曰人生而病癲疾者安所得之岐伯對曰此得之在腹中時其母有所數大驚也氣上而不下精氣并居故令子發為癲疾病在諸陽脉且寒且熱諸分且寒且熱名曰往刺之虚脉視分盡熱病已止病癲初發嵗一發不治月一發不治四五日一發名曰癲疾刺諸分其脉尤寒者以鍼補之病已止癲疾始生不先藥頭重直視舉目赤其作極已而煩心候之於顔取手太陽陽明太陰血變而癲疾始發而反强因而脊痛候之足太陽陽明太陰手太陽變血而已癲疾始作而引口啼呼者候之手陽明太陽右强者攻其左左强者攻其右血變而止治癲疾者常與之居察其所當取之處病至視之有過者即㵼之置其血於瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者尾骶也筋癲疾者身拳變急脉大刺項大經之本嘔多涎沫氣下泄不􅓼癲疾者暴仆四肢脉皆脹而從滿脉盡刺之出血不滿俠項灸太陽又灸帯脉於腰相去三寸諸分肉本腧嘔多涎沫氣泄不􅓼法治癲狂吐舌穴飛揚太乙滑肉門治風狂先以錢五枚内頭髻中以器盛之水新布覆之横大口於上乃矜莊呼視其人其人必欲起走慎勿聽因取水一噴之一呵視三次乃熱拭去水指彈額上迎髪際間欲愈乎真人必不肯答如此二七彈乃答仗鍼刺鼻下人中近孔内側空停針兩耳根前宛動中停針又刺鼻直上入髪際一寸横刺又刺鼻直上醒悟乃止治狂易多言不休穴風府崑崙束骨治風癲兩乳頭灸各三壯又大指甲後聚毛中灸各七壯治狂仆穴温溜掖門京骨治笑若狂穴神門陽谷治風熱喜怒心中悲喜思慕歔欷喜笑不止穴勞宮太陵治癲疾吐舌鼓頷狂言見鬼穴温溜僕参治癲發如狂面皮敦敦者不治及療癲狂穴長强治狂走欲自殺及目注視穴風府肺腧治驚癎狂走癲疾穴筋縮曲骨陰谷行間治狂走瘈瘲恍惚不樂穴終却聽㑹身柱治癎瘈瘲狂走不得卧穴攅竹小海後頂强間治狂妄行登髙而歌棄衣而走穴衝陽豐隆治狂易多言不休目上反穴天柱臨泣治狂言穴止正魚際合谷少海曲池腕骨治狂言非常穴下亷丘墟治狂易妄言怒罵穴巨關築賔治吐舌戾頸妄言穴陽谿陽谷治驚狂喜悲面赤目黄瘖不言穴間使治驚癎狂走癲疾脊急强目轉上垂穴筋縮治癲疾强走穴陽谷身柱腦空京骨治狂走欲自殺目反妄視穴風府治癲狂穴束骨治卒狂穴光明治尸厥癲邪神狂鬼魅穴攅竹治久狂登髙而歌棄衣而走穴衝陽治卒狂胷中澹澹惡風寒嘔吐怵惕寒中少氣掌熱腋腫肘變及療卒狂驚悸穴間使治小腹熱欲走穴胃腧治發狂吐涎沫穴絲竹空治癲疾狂走心煩吐舌穴太杼治癲疾狂走穴陽谷治心中風狂走發癎語悲泣心胷悶亂煩滿汗不出結積寒熱嘔吐不下食欬唾血穴心腧治狂易穴完骨治發狂不識人驚悸少氣穴巨關治發狂穴曲泉膏肓治身熱狂悲哭穴神門治寒厥驚狂穴陽交治目眩發狂嘔吐涎沫煩不得顧穴少海治風虚狂易穴支正治狂言不樂穴太陵治妄言左右顧瘈瘲目眩穴陽谷治狂言喜笑見鬼穴陽谿治癲癎狂言見鬼穴僕参治癲疾多言穴偏厯治癲疾吐涎狂言見鬼又治癲癎吐舌鼓頷狂言穴温溜治狂言穴下㢘治癲疾狂言又治小兒癲病吐舌穴築賔治卒面腫煩心狂言穴公孫治狂言口僻穴太淵治驚悸妄言穴液門治吐舌戾頸妄言不得左右顧瘈瘲頭痛目痛穴陽谷治癎病多言穴筋縮治癲癎狂歌不擇言穴鳩尾治鬼邪魅及癲狂語不擇尊卑灸上唇裏面中央内絃上一壯炷如小麥又用鋼刀决斷更佳治語不識尊卑穴水溝治妄言穴掖門治狂言恍惚穴天樞灸百壯治狂邪發無常披頭大喚欲殺人不避水火及狂言妄語驚飛歌哭穴間使灸三十壯治狂癲鬼語穴足太陽灸四十壯治狂癲驚走風恍惚嗔喜罵笑歌哭鬼語穴腦户風池手陽明太陽太陰足陽明陽蹻少陽少陰陰蹻足跟悉灸皆隨年壯治狂走刺人或欲自死罵言不息稱神鬼語灸口吻頭赤白際一壯又兩肘内屈中五壯又背胓中間三壯報灸之倉公法神効治卒狂言鬼語以甑大急合聮兩手大指便灸左右脇下對屈肋頭兩處火俱起各七壯須臾鬼自到姓名乞徐徐問之乃解其手治卒狂鬼語針其足大拇指爪甲下入少許即止治邪病語不止及諸雜候穴人中凡人中惡先搯鼻下是也治邪鬼妄言穴懸命灸十四壯治肺中風狂言狂邪鬼語穴天窻伏兎治悲泣鬼語穴天府慈門王氏云有四人妄語異常且欲打人病數月矣予意其是心疾為灸百㑹百㑹治心疾故也又疑是鬼邪用李承祖灸鬼邪法併兩手大拇指用軟帛䋲急縳定當肉甲相接處灸七壯四處皆着火而後愈更有二貴子亦有此患有醫僧亦為灸此穴愈治狂走癲疾穴項後二寸灸百壯治狂走瘲穴玉枕上三寸灸百壯一法項後一寸灸百壯治狂走驚癎穴河口灸五十壯治狂走癲疾穴大幽灸百壯治狂走癲癎穴季肋端灸三十壯治狂走喜怒悲泣穴巨覔灸隨年壯治狂走驚恍惚穴足陽明灸三十壯治狂走易罵穴百㑹灸隨年壯治狂走穴筋縮治邪病大喚罵走遠穴三里治狂走癲厥如死人穴足大指聚毛中灸九壯治狂走易氣穴灸絶骨凡鬼語狂走當依法灸之若傷寒鬼語癲狂惟宜用四物湯加黄蓍等分七八錢重作一服水一碗煎七分服滓即用水一碗煎半碗連服嘗用之屢神効故附著於此治卒發癲狂病陰莖上宛宛中灸三壯得小便通則愈陰囊下縫灸二七壯治狂風罵撾打人灸熱陽風灸口兩吻邊燕口處赤白際各一壯又陰囊縫三十壯仍勿近前中狠核恐害陽氣也癲邪治神邪鬼魅穴灸間使又穴攅竹治狐魅神邪及癲狂病醫治不瘥者併兩手大指用軟絲䋲急縳灸三壯艾炷著四處半在甲上半在肉上四處盡燒一處不齊燒疾不愈神効小兒胎癎妳癎依此灸一壯炷如麥治狂言見鬼穴陽谿僕参温溜治狂邪鬼語穴天窻灸九壯或伏兎百壯治悲泣鬼語穴天府灸五十壯治悲泣邪語鬼忙歌哭穴慈門灸五十壯治卒中邪魅恍惚振噤灸鼻下人中及兩手足大指爪甲本節令艾炷半在爪上半在肉上各七壯不止十四壯炷如雀屎治風邪穴間使灸隨年壯承漿又灸七壯三里又灸七壯治鬼魅灸入髪一寸百壯間使手心又各灸五十壯治狐魅合手大指縳指灸合間使三七壯當狐鳴即瘥治邪病卧瞑瞑不自知穴風府治邪病鬼癲四肢腫穴顖上治邪病四肢腫痛諸雜候穴尺澤治狂癎哭泣穴手逆注艾三十壯癲癎瘈瘲治瘈瘲裏急腰腹相引痛穴命門治瘈瘲氣實脇滿穴大杼治瘈瘲不仁穴屋醫治瘈瘲穴陽谷又穴曲澤又穴少澤治瘈瘲脚酸穴承筋治瘈瘲癲疾穴少澤曲池治癲疾瘈瘲怒欲殺人身熱狂走讇言見鬼穴身柱治癲瘈穴商丘治癎發瘈瘲狂走穴攅竹少海後項强間治癎瘈口閉不開穴崑崙治驚瘲穴陽谿井肩治瘈瘲而驚穴解谿治瘈瘲沫出寒熱痙引骨痛穴上關治瘈瘲引臍腹短氣穴巨關照海治骨痠眩狂瘈瘲口噤喉鳴沫出瘖不能言穴腦户聽㑹聽官風府醫風治脊强反折瘈瘲癲疾頭痛穴五處身柱委中委陽崑崙治狂走瘈瘲恍惚不樂穴􅀈脚聽㑹身柱治寒熱風痙脊强反折瘈瘲癲疾頭重穴瘂門治頭風目眩瘈瘲目戴上不識人穴五處治瘈瘲口喎穴巨髎治瘈瘲口沫出目眩牙車不開口噤穴上關治臂痛瘈瘲咳𠻳頸項急不可顧穴少澤治瘈瘲穴付陽天井治驚風瘈瘲五指掣穴腕骨治癲病瘈瘲身熱目眩項急卧不安穴大椎治癲癎瘈瘲穴陽蹻晝發者灸二七壯陰蹻夜發者灸二七壯風疹治風疹臂肘腕善動揺穴曲澤治熱風病丙穩禾疹及刺風風虚穴肩髃治風病丙穩禾疹舉體痒如虫行搔之成瘡穴曲池隨年壯灸治風疹穴湧泉環跳治刺風疹熱風冷痺穴下崑崙治刺風疹疼痛穴曲池治癮疹穴伏兎治大小人偏身風疹穴合谷曲池資生經云人有風疹多必眼暗先攻其風其暗自瘥然則人之目暗亦有多因風疹而得者風疹可不先治乎治風熱赤疹癢搔之逐手作瘡以一條艾蒿長者以兩手極意尋之着壁立兩手并蒿芉拓着壁伸十指當中指頭以大艾炷灸蒿芉上令蒿芉斷即止灸十十瘥瘥後重發更依法灸永瘥治病丙穩禾疹穴曲池灸隨年壯治頭痛病丙穩禾疹穴曲池二穴各灸年壯發即灸之神良又兩手約指中理左右及手足指兩虎口中各灸隨年壯一云各灸三壯厯節風治厯節汗出穴後頂飛揚湧泉頷厭治厯節風足指不得屈伸頭目眩逆氣穴飛揚資生經云射香丸尤治白虎厯節諸風疼痛遊走無定狀如虫行晝夜劇許叔微在歙川有一貴家婦人遍身走注疼痛至夜則發如蟲嚙其肌多作鬼邪治王氏曰此正厯節病也三服愈治體痛癢如蟲嚙搔之皮便脱作瘡穴曲池灸七壯又隨年壯王氏云良方服治癩藥半月兩膝眼灸二七壯丞相長安公醫人無數麻風惡疾千金諸方藥甚多或効或不効惟兼絲細末地暴米糊丸梧子大日二三服每服四五十丸茶湯下調藥末服尤効速只難服爾病去後亦宜服屢施與人神効若更灸曲池合谷三里絡骨等穴尤佳予與人按此等穴皆痠疼故也普濟方卷四百十七
