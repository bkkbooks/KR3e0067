青箱子一兩半黃連一兩半去鬚苦參一兩半銼桃仁三分湯浸去尖雙仁麩炒微黃右為細散每服二錢粥飲調下食前又將散子綿褁如杏仁大內於下部中良聖濟方再同研勻每服一錢七若𧈟在下部以綿裹一錢內下部良久去之麝香散治傷寒𧈟心中懊憹下部有瘡疼痛麝香一分研細雄黃一分細研硃砂一分細研羚羊角屑一分青箱子二分黃連一分去鬚貝齒一分川升麻一分桃仁一分湯浸去皮尖雙仁麩炒微黃右為細散每服二錢煎麥飲調下食前青箱散出聖惠方治傷寒初有𧈟下部生瘡疼痛青箱子一兩雚蘆二兩狼牙一兩陳橘皮一兩湯浸去白穰焙萹竹一兩右為細散每服粥飲調下食前阿膠散出聖惠方治傷寒下唇內生瘡蟲蝕下部疼痛或時泄痢阿膠二分搗碎炒令黃燥黃蘖半兩微炒炙銼當歸半兩銼微炒檳榔半兩木香半兩龍骨半兩槐子一兩微炒右為細散每服二錢煎黃耆湯調下食前棟根皮丸出聖惠方治傷寒𧈟蝕下部腹中㽱痛東引苦根棟白皮一兩銼狼牙一兩白礬灰一分豬膽三枚取汁用酒三合相和重湯煮如膏右為細末用豬膽膏和丸如梧桐子大每服二十丸以桃枝湯下食前䔧蘆丸出聖惠方治傷寒下部生𧈟瘡時久不瘥䔧蘆半兩去蘆頭桂心一兩芭豆一分去皮心研紙裹壓去油附子一兩炮去皮臍右為末入巴豆研令勻煉蜜和丸如梧桐子大每服一丸粥飲送下食前槐子仁丸出聖惠方治傷寒下部𧈟瘡痛癢不止槐子仁一兩微炒苦參一兩銼熊膽半兩木香一兩乾漆三分搗碎炒令煙出檳榔一兩桃仁二兩湯浸去皮尖雙仁麩炒微黃右為末煉蜜和丸如梧桐子大每服二十丸荆芥湯下食前治傷寒𧈟病唾血上唇內有瘡如粟心中痛悶此蟲在上蝕其五臟若下唇內生瘡其人喜眠此蟲蝕於下部右以雞子一枚小頭敲破出白和熟漆半合攪和令勻空腹吞之食頃或半日或下蟲或吐蟲盡則熱除病愈若不治即殺人又方出聖惠方右用豬膽二枚取汁以醋一中盞入膽汁相和煎三五沸放溫空腹服之一合蟲則自死聖濟方用膽一具治傷寒下部生𧈟瘡方出聖惠方地龍一兩去土微炒狼牙二兩右細銼和勻每服二字水一大盞煎至五分去滓食前溫服又方右以蛇莓草搗絞取汁每於食前溫服一小盞又方出聖惠方右以烏梅肉二兩炒令燥為細末煉蜜和丸如梧桐子大每服十丸以石榴根皮湯下食前聖濟方用三兩又方出聖惠方右以梓樹皮三兩細銼水三大盞煎至一盞半去滓空心分溫三服治傷寒下部𧈟瘡蟲蝕肛爛方出聖惠方熟艾彈子大雄黃末半錢右相和作炷燒用竹筒引煙熏下部中桃仁湯出永類鈐方治傷寒後𧈟瘡方見本門傷寒狐惑類黃連犀角湯出活人書方治傷寒及諸病後瘡出下部黃連去鬚微炒半兩烏梅七枚去核焙犀角鎊一兩無升麻代木香四錢右粗搗篩每服五錢水一盞半煎至一盞去滓食前溫服羚羊角散治傷寒後心中煩燥唇口生瘡蟲食下部羚羊角鎊三分龍膽半兩黃耆銼三分升麻半兩玄參茈胡去苗各三分右搗羅為散每服二錢煎槐子湯調下空心食前日三服麝香散治傷寒後𧈟瘡麝香研雄黃醋煮研丹砂研各一分羚羊角鎊犀角鎊黃連去鬚微炒青箱子升麻具齒煅研各半兩桃仁湯浸去皮尖雙仁炒研三分右搗研為散再同研勻每服二錢以食後煎麥仁粥飲調服又以綿褁半棗大內下部中良久去之苦參湯治傷寒後𧈟瘡苦參一兩槐白皮銼二兩熊膽半兩研右除熊膽外粗搗篩每服五錢水一盞半煎至八分去滓入熊膽末半錢攪勻空心溫服下部有瘡者更灌下部桃皮湯治傷寒後𧈟蟲食下部桃皮銼槐子棐實各一兩石榴根銼半兩右粗搗篩每服五錢水一盞半棗三枚擘破同煎至八分去滓食前溫服犀角湯治傷寒後唇口生瘡心中懊憹蟲食下部時或下痢犀角鎊龍骨各一兩木香三分阿膠炙令燥一兩升麻半兩桃仁湯浸去皮尖雙仁炒一兩右粗搗篩每服三錢水一盞煎至六分去滓溫服晚再服治傷寒天行下部𧈟瘡烏梅去核搗爛半兩獨頭蒜一頭搗爛屋塵三合右一處入苦酒一升和勻於銅器中煎候可丸丸如棗核大內下部中若病人齒齗無色舌上白者或喜眠憒憒不知痛癢處或下痢宜急療下部不曉此者但攻其上不以為意下部生瘡蟲食其肛門爛見五臟死也療之方出肘後方右用燒馬蹄作灰細末豬膏和塗綿以導下部日數度瘥桃仁苦酒湯出肘後方治症同前桃仁五十枚去皮尖及雙仁苦酒二升鹽一合右煮取六合去滓盡服之龍骨湯出肘後方治傷寒已七八日至十餘日煩渴熱盛而三焦有瘡𧈟者多下或張口吐舌呵吁日爛口鼻生瘡吟語不識人宜服此方除熱毒止痢神方右以龍骨半斤碎以水一斗煮取四升沈之井底令冷服五合餘漸漸進之恣意取飲尤宜老少無味殆如飲水懊憹散出聖惠方治傷寒心中懊憹下痢穀道中爛傷當服懊憹散以𧈟藥內穀道中雚蘆十分聖濟方用二兩乾漆二分聖濟方搗碎炒令煙出半兩萹蓄二分聖濟方乾者用半兩右各異搗篩粉粥飲服一錢先食日再服聖濟方治傷寒心中悶下痢下部生𧈟瘡爛傷每服二錢粥飲調下食前服療傷寒兼𧈟瘡其候口唇皆生瘡唾血唇內有瘡如粟者則心中懊憹痛如此則此蟲在上乃食五臟若下唇內生瘡其人喜眠者此蟲在下食下部方出肘後方右取雞子一枚扣頭出白與漆一合熟和令調如漆還內殼中仰吞之食頃或半日或下蟲或吐蟲劇者再服乃盡熱除病愈凡得熱病腹內熱食少三蟲行作求食食人五臟及下部人不能知可服此藥不爾𧈟蟲殺人有病𧈟下不止者出肘後方烏頭二兩女萎雲實各一兩桂二分右蜜丸如梧桐子大水服五丸一日三服一方出肘後方治下部卒痛如鳥啄赤小豆大豆各一升右合搗兩囊貯蒸之令熟更互坐即愈療𧈟蟲食下部方右以泥作罌以竹筒如指所橫穿罌肚筒一頭內下孔中內如雞子艾燒之就罌口吹之常令艾燒強人可益艾甚良一方治病人齒無色舌上白或喜睡不知痛癢處或下利者急治下部不曉此者但攻其上不以為意下部生蟲食其肉爛見五臟便死右用艾葉於管中熏下部令煙入更入少許普濟方卷一百四十三
