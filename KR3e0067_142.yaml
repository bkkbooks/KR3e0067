body:
  text: 普濟方卷一百四十三明周王朱橚撰傷寒門傷寒下痢論夫傷寒病若表實裏虛熱氣乘虛而入攻於腸胃則下赤黃汁若濕毒氣盛則腹痛壯熱下膿血如魚腦或爛肉汁若寒毒入胃則腹滿身熱下痢者不可攻其表汗出必脹滿表裏俱虛故也傷寒六七日下利更發熱而痢者其人汗不止者死但有隂無陽故也下痢有微熱其人渴脈弱者今自愈脈沈弦者為下重其脈大者為未已脈微數者為欲自止雖發熱不死少隂病八九日而身體手足盡熱在膀胱必便血下痢陽明病下痢其脈浮大此皆為虛強下之故也傷寒下痢日十餘行其人脈反實大者死又云傷寒下痢其種固多然皆由表實裏虛寒熱濕氣乘虛客搏於腸胃之間腸胃隨其所傷而下若寒則青白熱則黃赤若寒熱相雜則赤白俱下兼以濕毒則又下膿血如魚腦如爛肉也其候不同有下痢而脈虛者有下痢而脈實者有濕毒勝而腹痛者有熱氣盛而煩渴者有津液搏滯而腸垢者有燥屎結聚而譫語者其要固在審别虛實治之也下利須别隂陽三陽下利身熱太隂下利手足溫少隂厥隂下利身涼無熱此大槩也自利不渴小便色白脈微清穀厥冷惡寒凡此皆寒渴欲飲水屎色如常泄不赤黃發熱後重凡此皆熱毒之風邪入胃木來勝土故大腸暴下其裏虛脅熱者下利尤多或解散或攻泄或溫中或固下焦或利下便隨症有條但不容發汗蓋邪氣內攻若外復泄其津液則胃氣轉虛必脹滿矣然則下利之脈何如曰身涼脈小者順身熱脈大者逆大則為虛微弱則自止滑而數者是又有宿食也若夫下利譫語而目直視下利厥燥而不得眠下利發熱汗不止或厥不止下利厥冷無脈灸之身不溫而脈不回矣張仲景傷寒論陽明無下痢症不可下或有云下利其脈浮大者此皆為虛以強下之故也設脈浮革因爾腸鳴當溫之與水即噦脅熱利者曰腸垢臍下必熱便中垢戚赤黃或飲水乃熱也黃芩湯白頭翁湯蘖皮湯此症惟黃芩最妙凡脅熱下利通用之胃寒利者曰鳴溏臍下必寒腹脹滿便中黃白青黑或清穀四逆湯理中湯白通加附子湯寒毒下利面帶陽者下虛也溫毒利者腹必痛下膿血如魚腦如爛肉汗桃花湯地榆散黃連阿膠湯或用除濕湯胃風湯加木香下利譫語有燥屎也脈不微細可下之用小承氣湯三部脈平心下硬而下利者腸胃積結也急下之隂毒陽毒亦有下利下痢身痛腹滿清榖急救裏用四逆服藥後清穀止但身痛者急解表用桂枝湯風邪入胃下利熱敗毒散冷則金不換正氣散或加乾薑木香假如他病脹風失血崩中漏血之人繼而下利大腸裏急痛不可忍雖與巴粉取積已行疏導其痛獨存者此非積也榮血虧少陽剛勝隂故爾後藥當以川芎為佐榮氣一調其痛立止誤或小便不通五苓散不能作效當以分心氣飲加川芎麥門冬與之自然快利或藴熱血利腹中痛甚疏通滁熱痛未得平亦當為之調血詩曰臟結無陽舌結胎隂筋結痛引臍來雖然飲食全如故下利頻頻不可回臟結者臟氣閉結而不復流布也一息不運機緘窮一毫不讀穹壤判臟其可結乎外症有如結胸但飲食如故時時下利為異耳其脈寸浮關沉細而緊無陽舌胎隂筋者亦名臟結於此而圖其痊濟豈不難矣哉臟結無陽症不往來寒熱或寒而不熱其人反靜舌白胎者皆不可下也蓋其邪未全成熱猶帶表寒可刺關元穴仍與小柴胡湯加生薑方黃連散出聖惠方治傷寒吐下後毒氣不解致成下痢是隂陽二氣未和黃連三分去鬚微炒人參一兩去蘆頭黃芩三分乾薑半兩炮製銼右為散每服五錢水一中盞煎至六分去滓不計時候溫服阿膠散出聖惠方治傷寒吐熱頭痛四肢煩疼未經發汗之大早遂令汗出下痢不止阿膠一兩搗碎炒令微燥黃連三分去鬚微炒葛根一兩銼黃芩三分右為散每服三錢水一中盞煎至六分去滓不計時候溫服治傷寒夾熱腹痛下痢方出聖惠方川升麻黃連去鬚微炒當歸銼微炒赤芍藥桂心黃蘖微炙銼甘草炙微赤銼已上各三兩分聖濟方已上各半右為散每服四錢水一中盞煎至六分去滓不計時候溫服聖濟方銼如麻豆每服三錢水一盞煎至七分去滓食前溫服名升麻黃連湯犀角散出聖惠方治傷寒熱毒攻腸胃下痢困絶犀角屑一兩黃連一兩去鬚微炒龍骨一兩當歸一兩銼微炒人參三分去蘆頭阿膠一兩搗碎炒令黃燥右為散每服五錢水一大盞煎至五分不計時候溫服聖濟方水一盞半煎至八分去滓食前溫服名龍骨湯赤芍藥散出聖惠方治傷寒下痢腹痛不可忍赤芍藥當歸銼微炒黃芩去黑心黃連去鬚微炒已上各三分聖濟方已上各三兩伏龍肝一兩聖濟作一兩五錢右為散每服四錢水一中盞煎至五分去滓不計時候溫服聖濟方每服三錢水一盞煎至六分去滓食前溫服名芍藥湯黃耆散出聖惠方治傷寒下痢煩熱不止每有所往澀滯疼痛黃耆一兩銼枳殼半兩麩炒微黃去穰大腹皮一兩銼黃連三分去鬚微炒赤茯苓一兩赤芍藥一兩甘草三分炙微赤銼阿膠一兩搗碎炒令黃燥右為散每服四錢水一中盞煎至六分去滓不計時候服大青散出聖惠方治傷寒煩熱不解下痢困篤大青一兩甘草一兩炙微赤銼聖濟作半兩阿膠一兩搗碎炒令黃燥赤石脂一兩聖濟作半兩梔子仁半兩右為散每服五錢水一大盞入豉五十粒薤白三莖煎至五分去滓不計時候溫服聖濟方作水一盞半入豉一百粒薤白五寸同煎至八分服名大青湯治傷寒泄痢或渴不得下食虛而煩嘔方出聖惠方附子半兩炮製去皮臍乾薑半兩炮製銼甘草半兩炙微赤銼犀角屑三分右為散每服四錢水一中盞入蔥白五寸煎至六分去滓不計時候溫服秦皮散出聖惠方治傷寒腹中微痛下痢不止秦皮三分黃連三分去鬚微炒白頭翁半兩阿膠三分搗碎炒令黃燥當歸半兩銼微炒右為散每服三錢水一中盞煎至六分去滓不計時候溫服一方無當歸豉薤湯出千金方治傷寒暴痢腹痛及溫毒內虛外攻胃下黃赤汁爛肉汁赤滯諸毒熱豉一合薤白一握長三寸梔子仁五枚擘右以水一大盞煎至六分去滓不計時候溫服惠草散出聖惠方治傷寒熱毒在胃下痢惠草一兩外臺祕要作二兩黃連二兩去鬚微炒外臺祕要作四兩當歸一兩銼微炒外臺祕要作二兩右為散每服三錢水一中盞煎至六分去滓不計時候溫服外臺祕要方水六升煮得二升適寒溫飲五合日三忌豬肉冷水等物名惠草湯治傷寒除熱上下痢黃連散出聖惠方治傷寒下痢荒語心中虛熱黃連一兩去鬚微炒牡蠣三分燒為粉龍骨一兩當歸三分銼微炒人參三分去蘆頭赤石脂一兩甘草半兩炙微赤銼右為散每服三錢粥飲調下不計時候牡蠣散出聖惠方治傷寒壯熱下痢煩渴牡蠣一兩燒為粉龍骨一兩半黃連一兩去鬚微炒烏梅肉三分微炒右為散每服二錢粥飲調下不拘時候聖濟方空心食前調服又方出聖惠方黃連三分去鬚微炒當歸三分銼微炒赤石脂二兩子芩三分右為末煉蜜和丸如桐子大每服三十丸粥飲送下不計時候治傷寒下痢不能食出聖惠方方見本門下膿血痢類黃連丸治傷寒後痢日久津液枯竭四肢浮腫口乾出本草右用冬瓜一枚黃土泥厚裏五寸煨令爛熟去土絞汁服之赤石脂禹餘糧湯治傷寒下痢不止心中痞勒利在下焦者主之方見本門辨太陽脈症并治中第六訶梨勒九治傷寒後膿血痢下部疼痛訶梨勒炮去核人參各一兩白茯苓去黑皮當歸切焙木香白芷各三分牡丹皮半兩右搗羅為末煉蜜和搗五百下丸如梧桐子大每服三十丸食前米飲下日再香豉湯治傷寒後下痢赤白如爛肉壯熱大腸痛豉半合山梔子仁烏梅肉甘草炙各一分薤五莖右銼如麻豆分二服每服水一盞半煎至八分去滓食前溫服黃連當歸丸出肘後方一名赤石脂丸治傷寒後熱痢黃連去鬚銼炒當歸切焙各一兩乾薑炮各半兩赤石脂半兩右搗羅為末煉蜜和搗五百下丸如梧桐子大每服三十丸食前米飲下日進三服地榆飲治傷寒後下痢赤白地榆二兩赤石脂一兩右粗搗篩每服三錢水一盞煎至七分去滓食前溫服日再當歸湯治傷寒時氣後下痢不止當歸切焙黃連去鬚銼炒黃蘖去粗皮地骨皮各一兩右銼如麻豆每服三錢水一盞煎至七分去滓下蜜一合攪勻食前溫服龍骨丸治傷寒後臟腑虛冷下痢白膿腹痛龍骨乾薑炮附子炮製去皮臍等分右搗羅為末醋煮麵糊為丸如梧桐子大每服三十丸食前米飲下日再黃連丸治傷寒後一切痢疾無問冷熱腹痛黃連去鬚炒二兩木香吳茱茰湯洗三遍炒乾各一兩右搗羅為末麵糊和丸如梧桐子大每服二十丸空心食前米飲下千針散治傷寒後下血及瘡子後下血千針草地榆防風去蘆生乾地黃焙定粉炒各半兩硼砂二錢右搗研為散每服一錢空心食前米飲調下貫衆散治大人小兒傷寒後餘毒有熱下血不止貫衆逐葉摘下令淨黃蘖去粗皮蜜炙等分右搗為散每服一錢至二錢以煎黑豆汁放溫調下勝金散出肘後方治傷寒後陽毒入胃下血頻併疼痛不可忍鬱金大者五枚搗牛黃研皂子大右搗研為散每服一錢以醋漿水一盞同煎二沸溫服黃連散治傷寒後挾熱下血不止右用黃連去鬚為末一兩雞子白和餅燒黑再搗羅為末每服一錢溫酒調下不拘時候日再責毒湯治太隂病下痢赤白痛下重此涼折熱或水穀寒熱所致罌粟殼地榆白术訶子青皮甘草當歸紫橘葉各一兩乃旱蓮葉是照堂紅者右水五升煮取二升去滓溫服七合若但下血有寒濕者加乾薑一兩調中湯出醫方集成治秋夏之間暴寒拆於盛熱熱結於四肢則壯熱頭痛自汗寒傷於胃則下痢或血或水脈數弦洪胃熱不停飲食而吐宜服和之大黃去皮酒洗三兩葛根芍藥桔梗黃芩茯苓藁本白术甘草炙各一兩右以水七升先煮葛根減三升去上沫內諸藥再煮取三升去滓溫服一升得快利壯熱便歇小兒減與服安常云久年腸風下之亦瘥化毒散治厥隂病大便膿血或黃赤者宜消其毒槐花貫衆各等分右搗篩取艾一分糯米七合水一升煮取五合和方寸匕服大便頻色變為度堅止湯治傷寒下痢赤白膿血腹中痛者黃連吳茱茰厚朴各一兩右以水四升煮取二升五合去滓溫服五合欲作丸煉蜜丸如梧桐子大白飲下三十粒熱多減吳茱茰半兩一方乾薑代茱茰瞿麥湯治傷寒下痢赤白膿血下重或不能便或小便少當逐其邪則愈以腸痺故也瞿麥二兩扁竹甘草車前子各一兩大黃二兩梔子木通滑石各五錢右以水五升煮取二升去滓溫服五合下其畜毒排其膿血未愈再服增損四物湯出永類鈐方治少隂下痢手足冷無熱候者甘草炙二兩人參龍骨各二兩黃連乾薑各一兩附子一枚炮裂去皮臍右銼散每服三錢水一盞煎七分日三服不差復作下痢腹痛加當歸二兩嘔者加橘皮一兩豉薤湯治傷寒暴下及滯痢腹痛䜴一升薤白一把寸切右以水三升煮令薤熟漉去滓分為再服不差復服通草湯治傷寒下痢脈微足厥冷通草乾薑各一兩枳實四兩炙附子一枚炮令裂破人參一兩右切以水六升煮取二升適寒溫飲五合日三不差稍加至七合忌豬肉阮氏桃華湯出金匱方治傷寒後赤白帶下無數赤石脂八兩冷多白滯者減四兩粳米一升乾薑四兩冷多白滯者加四兩右以水一斗煮米熟湯成去滓服一升不差復服熱多則帶赤冷多則帶白張仲景傷寒論煮湯和赤石脂末一方寸匕服犀角湯治傷寒下痢惡血不止乾薑一兩犀角一兩末地榆一兩蜜二合右切以水五升煮取一升半去滓下蜜更煮至一升分三服自愈又治熱毒蠱利治傷寒下痢後更煩按之心下耎者虛損也梔子十四枚擘豉四合右以水四