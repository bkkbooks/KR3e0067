body:
  text: 普濟方卷一百三十一明周王朱橚撰傷寒門傷寒九日已上候論夫傷寒九日已上病不除者或初一經受病即不能相傳或已傳三陽訖而不能傳於隂至停滯纍日病症不罷或三隂三陽傳病已畢又重感於寒名為兩感傷寒則臟腑俱病故曰數多而病候改變也方前胡湯出聖惠方治傷寒九日不解心腹堅滿身體疼痛內外有熱煩嘔不安前胡去蘆頭半夏湯浸七遍去滑白术枳實麩炒微黃赤芍藥黃芩各一兩甘草半兩炙微赤銼厚朴一兩去粗皮塗生薑汁炙令香熟右為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服石膏陽出聖惠方治傷寒病九日曽經發汗吐下未解三焦生熱其脈滑數昏憒沈重欲入百合狀症石膏三兩黃蘗黃芩各一兩麻黃一兩去根節豉二兩黃連去鬚川大黃二兩銼碎微炒甘草一兩炙微赤銼梔子仁一兩右細銼和勻每服半兩以水一大盞入生薑半分煎至五分去滓不計時候溫服如人行十里再服以微利為度茯苓湯出聖惠方治傷寒九日下之後胸膈煩滿小便不利譫語一身不可轉側赤茯苓柴胡去苗龍骨各二兩川大黃二兩銼碎微炒黃芩人參去蘆頭牡蠣燒為粉桂心半夏湯浸七遍陳橘皮湯浸去白穰焙甘草炙微赤銼各一兩右為散每服四錢水一大盞入生薑半分棗三枚煎至六分去滓不計時候溫服犀角散出聖惠方治傷寒九日心肺熱氣急喉中有膿血犀角屑柴胡去苗青竹茹各一兩桔梗去蘆頭川大黃銼碎微炒麥門冬去心各一兩半右為散每服五錢水一大盞煎至五分去滓下芒硝末一錢攪令和勻不計時候溫服檳榔散出聖惠方治傷寒九日心中滿悶腹脹喘急檳榔訶梨勒皮陳橘皮湯浸去白穰焙甘草炙微赤銼各半兩桑根白皮三分銼右為散每服五錢水一大盞入生薑半分蔥白一莖煎至五分去滓不計時候溫服半夏散治傷寒九日不解往來寒熱狀如瘟瘧胸膈滿悶時有痰逆不止半夏湯浸七遍去滑柴胡去苗各二兩葛根銼白术人參去蘆頭陳橘皮湯洗去白穰焙黃芩厚朴去粗皮塗生薑汁炙令香熟甘草炙微赤銼各一兩右為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服芒硝散治傷寒九日不解胸脅滿逆日晚即潮熱此由失下內實故也川芒硝二兩前胡一兩去蘆頭枇杷葉半兩去毛炙微黃葛根一兩銼川大黃二兩銼碎微炒半夏一兩湯浸七遍去滑右為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服以利為度大前胡湯治傷寒八九日不解心腹堅滿身體疼痛內外有熱煩嘔不安半夏半升洗生薑五兩枳實八片炙前胡半升黃芩三兩乾棗十二枚擘芍藥四兩右切以水一斗煮取三升分四服日三夜一服忌羊肉餳等物張仲景用柴胡不用前胡本云加大黃二兩不知大黃恐不名大柴胡湯石膏湯治傷寒病已八九日三焦熱其脈滑數昏憒身體壯熱沈重拘攣或呼呻而已內攻體猶沈重拘攣由表未解令直用解毒湯則攣急不瘥直用汗藥則毒因加劇而方無表裏療者意思以三黃湯以救其內有所增加有解其外是故名石膏石膏黃連黃蘖黃芩各三兩香豉一升綿褁梔子十枚擘麻黃三兩去節右切以水一斗煮取三升分為三服一日併服出汗初服一劑小汗其後更合一劑分兩日服常令微汗出拘攣煩憒即差得數行利心開令諸毒折也忌豬肉冷水桂附湯治傷寒八九日風濕相搏身體疼痛煩不能自轉側不嘔不渴脈浮虛而澀者此主之若其人大便小便自利者去桂加白术湯主之一名桂附散屬太陽方見本門中風類术附湯治傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便自利者此主之屬太陽白术二兩甘草一兩炙附子一個半炮去皮右銼如麻豆大每服五錢生薑五片大棗一枚水一盞半煎至七分去滓溫服一服覺身痺半日許再服三服都盡其人如胃壯忽快也即是附子與术並走皮中逐水氣未得除故使之耳法當加桂一兩其大便堅小便自利故不加桂也療傷寒八九日至十日餘大煩渴熱盛而三焦有瘡𧈟者多下或張口吐舌呵􅀈目爛口鼻生瘡讝語不識人除熱毒止利以龍骨半斤碎以水一斗煮取四升沈之井底令冷服五合漸進之隨意飲尤宜老少治傷寒八九日間發熱如狂不解小腹滿痛有瘀血桃仁三十個去皮尖麩炒赤色别石虻蟲三十枚去趐水蛭二十枚各炒川大黃一兩右為末再與桃仁同搗令勻煉密丸如小豆大每服二十丸桃仁湯下旋下瘀血惡物便愈未利再服傷寒可汗附論夫傷寒病汗之而愈者以初得病一日至三日陽經受邪未傳諸隂其邪在表故當發汗此大約也然病數日脈浮太陽症不罷者亦可汗之當以脈症為凖凡頭疼發熱惡風憎寒是為可汗之症其脈浮者是為可汗之脈陽虛則惡寒脈浮為在表或浮而弱或浮而緊或浮大而數皆宜汗之衄家脈雖得之不可汗故內經曰其在脾者汗而發之若變汗發陽明與太陽合病有惡寒症屬表可汗用升麻湯又太陽陽明合病胸滿而喘麻黃湯陽明本多汗若脈浮無汗而喘可發汗亦用麻黃湯又陽明病脈遲汗出多微惡寒者表未解也可與桂枝湯又陽明煩熱汗出如瘧或日晡發潮熱而脈浮虛者並與桂枝湯若脈實者當用承氣湯太隂腹滿脈浮桂枝湯凡太陽症有用五積散者非謂發汗蓋去積耳少隂初得病脈沈反熱者溫之而微取其汗用麻黃細辛附子湯下利手足冷而身熱者非屬通脈四逆湯又少隂病二三日常見少隂而無陽熱中滿之症者用麻黃附子甘草湯微汗之二藥皆隂症傷寒解表之劑隂症初病便屬少隂不待傳次方蔥豉湯治傷寒初覺一二日頭項腰脊痛惡寒蔥白十二莖䜴半合炒乾薑炮製一分麻黃去根節桂去粗皮芍藥各半兩右㕮咀每服五錢水二盞煎至一盞去滓溫服良久投蔥䜴熱粥蓋覆出汗蔥粥方治傷寒服蔥䜴湯後未得汗再服蔥白十一莖䜴三合炒生薑半兩拍碎右用水五盞入前三味煎至二盞半去滓入白米依常法煮粥入少鹽攪勻任意食之衣蓋出汗未汗再服葛根湯治傷寒服蔥䜴湯不得汗可服蔥白十四根豉一升綿褁葛根三兩切右㕮咀以水五升煮取二升分為再服溫服取汗不出更服余時用此一服輒汗略不再服救數十人甚效麻黃葛根湯治傷寒初得一二日出汗麻黃一兩半去根節葛根銼柴胡去苗各一兩芍藥三分右搗篩每服五錢水一盞半䜴一百粒開口椒一七粒連鬚蔥白三寸薄荷二十葉同煎至八分去滓熱服後蔥䜴湯一盞投之衣覆取汗汗未快再服解毒湯治傷寒初覺煩熱頭腳疼痛柴胡半兩去苗黃芩去黑心荆芥穗各一分右銼如麻豆大每服五錢水一盞半生薑一棗大拍碎煎至八分去滓入生地黃汁一合白蜜半斤匙更煎三五沸熱服葛根湯治傷寒三日頭疼壯熱遍身疼痛其脈洪數葛根銼白术乾薑炮各半兩芍藥半兩麻黃去根節桂丢粗皮各三分甘草炙一分半右搗篩每服五錢用水一盞煎至八分去滓熱服如脈微即加附子半兩石膏人參解肌湯治傷寒初得一二日頭疼壯熱惡寒脈浮緊者石膏碎麻黃去根節各一兩柴胡去苗人參各半兩桂去粗皮甘草炙各一分葛根銼二兩右搗篩每服三錢用水一盞入蔥豉生薑煎至七分去滓熱服不拘時荆芥湯治傷寒初得一二日至三日頭疼痰逆肢體煩懆惡風身熱憎寒者荆芥穗四兩前胡去蘆頭旋復花各三兩甘草炙二兩白术半夏湯洗七遍焙乾麻黃芍藥各一兩右搗篩每服三錢水一盞生薑三片棗三枚擘煎至七分去滓熱服不拘時五味桂枝湯治傷寒一二日頭痛體疼發表桂去粗皮葛根銼各一兩麻黃去根節一兩山梔子仁半兩石膏一分右搗篩每服三錢水一盞蔥白一莖切䜴三十粒煎至七分去滓熱服良久再服以蔥白稀粥投之微汗即差五解湯治傷寒三日內表症不解者麻黃去根節二兩白术一兩半葛根銼甘根炙銼山梔子仁桔梗炒石膏碎杏仁湯浸去皮尖雙仁麩炒各一兩右搗篩每服三錢水一盞入蔥白鹽䜴同煎至七分去滓連併熱服不拘時汗出為度六味桂枝湯治傷寒頭痛發熱惡寒解表桂去粗皮麻黃去根節石膏乾薑炮白术生用蒼术米泔浸麩炒各一兩右為散每服三錢用水一盞生薑三片蔥白二寸豉七粒同煎至八分去滓熱服不拘時人參湯出聖濟總録治傷寒一日至三日頭痛壯熱煩悶其脈洪數人參一兩白术半兩甘草炙半兩麻黃去根節桂去粗皮各三分右搗篩每服三錢水一盞生薑三片煎至七分去滓連併溫服不拘時衣覆出汗十味人參湯出聖濟總録治傷寒頭痛體疼寒熱不解調理榮衛進飲食解利經絡去久滯風邪人參厚朴去粗皮生薑汁炙桂去粗皮甘草炙銼白术乾薑白茯苓去黑皮杏仁湯洗去皮尖雙仁麩炒陳橘皮湯浸去白焙各一兩麻黃去根節湯煮掠去沫二兩右搗篩每服三錢水一盞入生薑三片棗一枚擘破煎至七分去滓熱服才覺傷風併三兩服汗出立差香术湯出聖濟總録治傷寒二三日頭痛肌熱煩躁不解四肢倦痛可汗蒼术米泔浸一宿切焙二兩陳橘皮湯洗去白焙防風麻黃去根節湯煮掠去抹焙乾當歸切焙桂去粗皮甘草炙各一兩白茯苓去黑皮吳茱茰洗焙乾炒人參厚朴去粗皮生薑汁炙羌活去蘆各半兩右除桂外銼碎慢火炒黃入桂同粗搗篩每服三錢水一盞入蔥白一寸生薑二片同煎至六分去滓溫服不拘時候蔥豉湯出聖濟總録治傷寒一日至三日以前身體熱脈洪大體疼痛汗不出者蒼术米泔浸去皮銼麩炒黃麻黃去根節湯煮掠去沫焙各二兩甘草炙銼桂去粗皮各一兩右搗篩每服三錢水一盞入蔥白三寸鹽豉二十粒同煎至七分去滓熱服不拘時候前胡湯出聖濟總録治傷寒表不解取汗前胡去蘆頭柴胡羌活去蘆頭芎藭人參枳殼去穰麩炒甘草炙芍藥各半兩麻黃去根節湯煮掠去沫焙一兩右搗篩每服三錢用水一盞入蔥白三寸煎至七分去滓熱服如要發汗更入薄荷三五葉同煎服訖以厚被蓋覆如人行五里再服徐令汗透遍身即旋去被避風若傷寒後餘毒未解潮熱往來數服即解消飲茯苓湯治傷寒表未解氣脈閉塞津液不通水飲氣停在胸腑結而成痰膈脘痞悶倚息短氣體重多唾頭目旋暈嗜卧好睡額角偏痛腠理開疏體常汗出白茯苓去黑皮前胡去蘆芎藭羌活去蘆頭桔梗炒人參獨活去蘆頭甘草炙柴胡去苗各半斤陳橘皮去白四兩右為散每服三錢沸湯點服不計時候或銼如麻豆用前件藥半兩水三盞煎至一盞半去滓分溫二服前胡湯治傷寒頭痛惡寒發熱肢體疼倦前胡去蘆頭羌活去蘆頭各六兩防風去叉四兩薺苨去蘆頭二兩銼桔梗炒三兩蛇蛻皮一兩煎碎炒令黃蟬殼去土一兩陳橘皮湯浸去白乾稱四兩甘草炙銼一兩半人參二兩右搗篩每服四錢水一盞半入生薑二片薄荷七葉煎至五分去滓溫服桂心湯治四時傷寒初覺桂去粗皮芍藥甘草炙葛根銼各等分右搗篩每服四錢水一盞半生薑二片棗三枚擘同煎至八分去滓溫服麻黃桂枝各半湯治傷寒表解不明麻黃去節桂枝各三兩芍藥杏仁去皮尖各一兩半右㕮咀如法修製每服三錢水一盞半生薑三片棗一枚同煎至七分去滓熱服汗出為愈蔥䜴湯治傷寒一二日頭項及腰背脊拘急疼痛渾身煩熱惡寒脈緊無汗一名麻黃湯麻黃一兩去節豉二大合乾薑二兩蔥白十五莖右㕮咀每服以水二升先煎麻黃六七沸掠去白沫乾薑煎二十餘沸再下蔥豉煎取八大合去滓分溫兩服如人行五六里服訖良久煮蔥豉粥熱喫即以衣覆出汗又方治傷寒不得汗取汗最妙方良薑一兩丁香五錢右為細末醋和為丸加在掌中