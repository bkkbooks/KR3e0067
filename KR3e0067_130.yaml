解風濕症面赤自汗默默不欲語但欲寐兩手脈浮而緩或微弱此症不宜發汗若汗之令人筋惕肉瞤或譫語獨語或煩燥不卧若下之直視失溲便若火之發狂似驚癎一逆尚引日再逆促命期活人本方葳㽔湯以有麻黃故不敢用宜上白术湯主之若頭眩汗出筋惕肉瞤者加牡蠣若腰背強硬者加羌活若舌乾發渴者加人參若身灼熱甚者加知母若體重多汗者加黃耆若內傷寒者不加可下論夫傷寒邪入於隂其病在裏法當下之諸腹滿不大便或口燥舌乾而渴或潮熱譫語皆為可下之病諸診得脈沉而實即為可下之脈但脈症已具不必拘以日數急宜攻裏若病雖過經而裏症未備者未可下也故經曰陽盛隂虛下之而愈其法謂此變下法太陽發熱汗出不解嘔吐下利而心中痞硬者大柴胡湯下之又太陽病十餘日熱結在裏往來寒熱亦用大柴胡湯無表裏症發熱七八日脈雖浮數可大下柴胡若大便難身微熱者大柴胡急下太隂腹滿悶時痛甚者桂枝加大黃湯少隂口燥咽乾而渴大承氣急下之若口乾燥下利清水心下痛者為積症亦用承氣湯又少隂症六七日腹脹滿不大便用承氣湯又少隂惡寒而踡時煩不欲衣被為表寒裏熱大柴胡下之厥隂脈沈短舌卷囊縮為毒氣入臟承氣湯下之若厥冷耳聾囊縮而脈沉弦脈為少隂厥隂兩感下治條又厥隂下利譫語六脈不微細用小承氣湯方調胃承氣湯出聖濟總録治陽明病不吐不下心煩者可與調胃承氣湯太陽病三日發汗不解蒸熱者可與調胃承氣湯傷寒吐後腹脹滿者可與此方諸發汗和解不惡寒但發熱蒸蒸然者或日深心下溫溫欲吐胸中痛大便溏腹滿鬱鬱微煩此時吐下者或日深裏熱譫語法當下之以銀粉巴豆燥熱大毒丸藥下之致真隂損虛邪熱轉甚因而協熱下利不止及表裏熱下之太早乘虛而入不成結胸俱為熱利不止心下滿鞭或痛煩渴咽乾脈滑數而實諸腹滿實痛者煩渴譫妄小便赤大便鞕脈滑實緊甘草二兩炙大黃以消酒洗四兩右㕮咀每服五錢水一盞半煎至一盞去滓入芒硝一錢匕更煎三沸溫服調胃承氣加橘皮湯出聖濟總録治傷寒發熱汗不解蒸蒸發熱者大黃銼醋炒一兩甘草炙陳橘皮湯洗去白焙各半兩右細銼每服四錢水一盞半煎至一盞入芒硝一錢攪令勻更煎三兩沸溫服茈胡大黃湯出聖濟總録治傷寒日數過多心中氣悶或發疼痛狂言不定煩躁不得眠大小便不通茈胡去苗大黃濕紙裏煨朴硝枳殼去稂麩炒各一兩甘草炙銼半兩右粗搗篩每服五錢水一盞半煎至一盞去滓溫服日二服不可過多若大小便通則汗自出宣毒散出聖濟總録治傷寒脈大潮燥伏熱大黃銼炒甘草炙銼各半兩朴硝研一分牽牛子一兩半生用半炒右為散每服二錢用龍腦膩粉蜜水調下一方煉蜜為丸如梧桐子大每服十五丸龍腦膩粉水下小黃芩湯出聖濟總録治傷寒八九日大便不通心神悶亂黃芩去黑心枳殼去穰麩炒大腹皮銼醋炒各一兩大黃銼炒二兩右粗搗篩每服三錢水一盞煎至七分去滓不計時候溫服如人行三五里未通再服以利為度大青散出聖濟總録治陽盛發狂有斑大小便祕澀大青知母黃芩去黑心大黃煨山梔子仁升麻黃連去鬚各一兩甘草炙銼半兩右為散每服三錢入朴硝一錢用蜜水調下承氣丸出聖濟總録治傷寒時氣溫熱病大便不通大黃銼炒三分郁李仁湯浸去皮研枳實去穰麩炒朴硝研各一兩右為末和勻煉蜜為丸如梧桐子大每服二十丸生薑湯下未利再服不拘時候桃仁承氣湯出儒門事親桃仁去皮尖十二個官桂甘草芒硝已上各半兩右銼如麻豆大每服三五錢水一大盞煎至七分去滓溫服握宣丸出儒門事親白檳榔肉桂乾薑附子甘遂良薑韭子巴豆已上各等分入硫黃一錢右為細末軟米和丸桐子大早辰先椒湯洗手放溫揩乾用生油少許塗手心男左女右磨令熱握一丸宣一二行可吐論夫諸病吐之而愈者邪在胸中也傷寒大法謂四日以上若入隂經其傳未深邪氣髙而裏實客於胸膈下之則動胃發之則亡陽宜吐而出之然亦不必拘此凡寒邪熱毒痰實在胸中者及有宿食在胸脘者當吐之但診其脈寸口或浮或滑或數或緊與諸部不同者其症胸中心痞滿鬱鬱而痛不能息多涎唾飲食入則吐欲吐復不能出或手足厥冷反心下滿而煩飢不能食吐下後心中懊憹者是也內經所謂其髙者越因而越之即其法也方治溫病胸中滿悶取吐出聖濟總録豬膽三枚苦酒二合右同攪勻綿濾過頓服未吐再服人參湯出聖濟總録治傷寒出汗後心胸煩悶煩熱未通人參半兩燈心一小束枳殼去穰麩炒一分大腹皮一枚銼茶末二錢生甘草半兩右除茶末各細銼用淡漿水二大盞煎至一盞去滓入茶末攪勻分溫二服以紙撚子於咽喉中引取吐為度治胸心痰飲傷寒熱病瘴瘧須吐者出肘後方以鹽末一大匙一水或暖湯送下須臾則吐吐不快明旦更服良肘後用鹽一升治傷寒汗出不解已三四日胸中悶取吐以豉并鹽一合水四升煎取一升半分服當吐一方無鹽用蜜一兩煮三沸頓服安卧當得吐不差更服取差又方出肘後方以生地黃三斤細切水一斗煮取三升分三服亦可服藜蘆吐散及苦參龍膽散治傷寒心胸中滿悶取吐右以豬膽一枚取汁醋一小盞酒一小盞內豬膽汁相和溫過分為二服當吐立差傷寒過經不解論夫傷寒為病六經受邪始傳於三陽病在表者可汗其病三日傳於三隂病入裏者可下其不兩感於寒更不傳不加異氣者至七日大陽病衰頭痛少愈八日陽明病衰身熱少歇九日少陽病衰耳聾微聞十日太陽病衰腹遂減如故十一日少隂病衰渴止舌乾而嚏其十二日厥隂病衰囊縱少腹微下邪氣皆去病人精神爽適也故傷寒愈者皆在十二日若過此經病猶不解者為熱結於裏其狀或譫言妄語或鬱鬱微煩或腹滿吐下皆緣治之失宜邪氣稽留故病過經不能解也當隨其證以治若更感異氣變為他病者當依壞病法藥之方犀角湯出聖濟總録治傷寒過經不解熱結在裏往來寒熱煩渴躁悶犀角屑一兩柴胡去苗吳藍各三分大青升麻各一兩烏梅去核黃芩去黑心各三分甘草炙銼半兩右搗篩每服五錢水一盞半入竹葉三十片煎取七分去滓食後溫服鱉甲湯治傷寒過經半月不解鱉甲去裙襴醋炙柴胡去苗升麻各一兩烏梅去核半兩枳實去穰麩炒犀角屑黃芩去黑心各一兩甘草炙銼半兩右搗粗篩每服五錢水一盞半煎至七分去滓地黃汁二合攪勻食後分溫二服木通湯治傷寒十三日過經不解臍腹脹滿小便淋澀煩悶躁渴木通銼葛根銼檳榔銼滑石瞿麥穗青橘皮湯洗去白炒各一兩右搗篩每服三錢水一盞入蔥白二寸同煎至六分去滓溫服不計時候萬應散治傷寒過經心胸痞滿煩躁狂言積熱毒氣及婦人血風血氣經候不調寒熱有積甘遂連珠者威靈仙去土五靈脂各一兩右為散每服一錢如傷寒日數多有積熱者用雞子清蜜水調下如婦人前見件病症者綿灰酒調下尋常熱氣蜜水調下冷即用蔥湯調下陽毒積熱入膩粉白丁香各半錢生薑汁蜜水調下柴胡湯治傷寒發汗下之後過經不解胸脅滿結而不嘔但頭汗往來寒熱小便不通柴胡去苗二兩桂去粗皮黃芩去黑心各一兩牡蠣生用甘草炙各半兩栝蔞根一兩半木通銼一兩右粗搗篩每服五錢水一盞半入生薑半分拍碎蔥白五寸同煎至七分去滓食後溫服保安散治傷寒過經不解三焦滯悶身重疼痛黃耆銼木通銼青橘皮湯浸去白焙桑根白皮銼白术陳橘皮湯浸去白焙各半兩木香三分黑牽牛炒搗取末一兩右搗羅為散每服二錢濃煎棗湯調下麥奴丸治傷寒五六日以上不解熱在胸中口噤不能言惟欲飲水為壞傷醫所不能治為成死人情魂已竭心下才溫以箸發其口開灌藥咽中藥得下則愈麥奴一曰黑奴丸二曰水解丸釡底墨竈底墨梁上墨麥奴黃芩一方無黃芩大黃芒硝各一兩麻黃二兩右為末蜜丸彈子大以新汲水五合研一丸破置清水中當藥消盡服之病者渴欲飲飲水極意不問升數欲止復強飲能多飲為善不欲飲水當強飲之服須臾當寒寒竟汗出便解若服藥日移五尺許不汗如前法不過再三服住小麥黑殼名麥奴乃小麥未熟時叢中不成麥捻之成黑勃是也無此亦得此藥須是病人大渴倍常盛渴者乃可與之不渴者與之反為禍耳柴胡飲子治解一切肌骨蒸積熱作發寒往來表熱裏和則發寒裏熱表和則發熱邪熱半在表半在裏出入進退無和積寒熱往來隂陽相盛也畜熱寒戰表之陽和正氣與邪熱並畜脈道不行故身冷脈絶寒戰而反煩渴也及傷寒發汗不解或中外諸邪熱口乾煩渴或下後未熱愈汗後榮復或骨蒸痿喘嗽婦人餘疾産後經病及治小兒傷寒五七日隂陽不和唇焦口乾燥咽乾大便祕澀柴胡人參黃芩甘草大黃當歸芍藥各半兩右為末每服炒三錢水一盞生薑三片煎至七分溫服日三服病熱甚者加減之崔氏方加半夏五味子桔梗各三錢劉氏方用柴胡甘草各二兩黃芩當歸芍藥大黃各一兩人參半夏各半兩右如大勞熱病則用五七錢以利為度未利更加使病不再發也和解湯治氣血虛若外感寒邪身體疼倦壯熱惡寒腹中疼痛鼻塞頭昏痰多咳嗽大便不調白芍藥桂各三分厚朴甘草乾薑白术各一兩人參茯苓各一兩半右為粗末每服二錢水一盞生薑三片棗一枚煎至六分去滓溫服不計時候順氣人參散溫和表裏祛逐風寒治壯熱頭痛項強腰痛心胸氣痞咳嗽痰多發熱惡寒咽膈不利人參桔梗乾薑白芷白术各一兩甘草半兩右為粗末每服二錢水一盞薑三片蔥白二寸煎至七分去滓溫服大神术湯出濟生拔萃方通解四時傷寒蒼术四兩製羌活防風川芎藭黃芩枳殼一作枳實甘草各半兩白芷一兩半石膏二兩半細辛三兩知母七錢右㕮咀石膏為細末入藥水煎汁飲之熱服湯投春倍防風羌活夏倍黃芩知母季夏淫雨倍蒼术五錢各加至一兩亦可以意消息隨症增損非發熱而渴非裏實心下滿不可用枳實也麻黃升麻湯出直指方治傷寒發汗解利不律血氣壅滯謂紅汗者是也麻黃去節湯炮二兩半升麻一兩黃芩芍藥石膏煅甘草生茯苓各一兩右銼散每服四大錢水一盞半薑三片煎至七分去滓熱服微汗散敗毒散出直指方傷寒熱症通用人參赤茯苓川芎北梗羌活獨活前胡柴胡枳殼製甘草炒等分右銼散每服三錢薑五片三服人參順氣散出鮑氏方治傷寒壯熱肢節疼痛手足冷麻半身不遂麻黃三兩乾薑一兩乾葛白术白芷桔梗各六兩川芎茯苓陳皮各四兩甘草三兩人參二兩右為末每服用二錢薑三片蔥白三寸薄荷三葉煎不以時有汗人勿服中風傷寒論夫中風傷寒三陽三隂候各不同太陽中風其脈陽浮隂弱其症發自汗蓋陽浮熱自發隂弱汗自出嗇嗇惡寒浙浙惡風熻熻發熱鼻嗚乾嘔又曰太陽病發熱汗出脈緩者名為中風不可燔炙若以火發其汗邪風為火熱所劫血氣流溢榮衛失常兩陽熏灼其身發黃陽盛即衄隂虛即小便難隂陽俱虛竭則身體枯燥但頭汗出齊頸而還腹滿微喘口乾咽爛或不大便久則譫言甚者至噦手足搔擾循衣摸牀其小便利者可治陽明中風積熱陽明病能食為中風其症口苦咽乾腹滿微喘發熱惡寒脈浮若緊下之則腹滿小便難不能食為中風少陽中風兩耳無聞目赤胸中滿而煩不可吐下吐下之則悸而驚太隂中風四肢煩疼其脈陽微隂澀而長為欲愈少隂中風其脈陽微隂浮為欲愈厥隂中風其脈微浮為欲愈不浮為未愈凡此六經中風之病其狀雖異大抵其脈皆浮經所謂浮為風是也又曰人之冒風也輕則為傷重則為中足之三隂三