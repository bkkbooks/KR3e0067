稍熱服衣覆出汗若大便鞕小便自利去桂加白术一兩三錢治傷寒中風骨節疼痛煩悶不得屈伸近之則痛劇汗出短氣小便不利惡寒或身微腫麻黃二兩去根節附子一兩炮製去皮臍白术桂心各二兩赤芍藥甘草各一兩炙微赤銼右為散每服四錢以水一中盞入生薑半分煎至六分去滓溫服日四五服柴胡散治傷寒中風汗後虛躁頭疼四肢乏力柴胡一兩半去苗石膏三兩人參去蘆頭茯神枳實麩炒微黃桑根白皮銼麥門冬去心各一兩桂心白术防風去蘆頭地骨皮甘草各三分炙微赤銼右為散每服四錢以水一中盞入生薑半分煎至六分去滓溫服日三服夜一服藿香散治傷寒中風頭昏皮膚疼痛藿香一兩白附子半兩炮製零陵香一兩半夏半兩湯浸七遍去滑甘松香一兩川烏頭半兩炮裂去皮臍牛黃細研射香各一錢細研右為細散與牛黃麝香同研令勻每服以熱蔥酒調下二錢日三服夜一服天麻散治傷寒中風筋脈拘急天麻附子炮製去皮臍川烏頭炮裂去皮臍乾蠍微炒石膏白附子炮製天南星炮製各半兩雄黃一分細研麝香一錢細研右為細散每服生薑湯調下一錢日三四服白附子散治傷寒中風頭疼項強身體壯熱服諸藥不得汗者用白附子附子天麻各半兩天南星硃砂細研乾蠍各一錢半夏烏頭各半分麻黃半兩去根節右為細散入研了朱砂令勻每服以生薑湯調下一錢良久以熱蔥豉粥飲投之當便出汗烏頭散治傷寒中風語澀四肢拘急壯熱川烏頭半兩炮裂去皮臍防風去蘆頭羌活各一分丹參麻黃去根節各半兩桂心白术各一分乾蠍一分微炒黑豆一合炒熟右為細散每服不計時候以熱酒調下二錢良久再服以汗出為度治傷寒中風頭強汗不出煩悶麻黃去根節防風各一兩去蘆頭川烏頭炮裂去皮臍桂心乾薑各半兩炮製銼右為散每服不計時候以溫酒調下二錢頻二服以衣覆之汗出為度桂苓甘露散治傷寒中風冒暑飲食內外一切所傷傳受濕熱內甚頭痛口乾或吐㵼煩渴或小便赤澀大便急痛或㵼痢間作病一切濕熱霍亂吐㵼轉筋急痛腹滿痛悶或中外諸邪所傷而并吐㵼者溫之熱時尤宜服之桂半兩茯苓白术各半兩甘草炙澤㵼石膏寒水石各一兩滑石二兩右為細末熱湯調下三錢欲飲冷者新水調下或生薑湯調下尤良小兒服一錢一方有豬苓半兩薑附湯治傷寒已經轉下又當發汗內外俱虛邪氣未解表證不見身無大熱晝日煩躁不得眠睡夜即安靜不嘔不渴脈候沉細者宜服之又治暴中風冷久積痰水心腹冷痛霍亂轉筋一切虛寒並皆治之乾薑一兩附子生去皮臍細切一枚右令勻每服三錢水一盞半煎至一盞去滓食前溫服桂枝麻黃各半湯治風症見寒脈寒症見風脈桂枝二兩麻黃芍藥生薑各半兩杏仁十四個大棗二個右為散每服四錢煎溫服羌活湯治傷寒協熱羌活麻黃去節石膏細辛去苗前胡川芎防風各一兩黃芩枳殼炒去穰甘草炙各半兩薄荷葉一分右為粗末每服五錢水二盞薑三片煎至一盞去滓溫服細辛湯治傷風協寒細辛去苗甘草炙各一兩麻黃去節桂枝去粗皮各二兩杏仁半兩去皮右為粗末每服五錢水二盞煎至一盞去滓服神术散治傷風肌踈多汗蒼术二兩泔浸去皮薄切用麥麩炒川芎藁本洗荆芥各一兩右為粗末每服五錢水二盞薑三片煎一盞去滓熱服十棗湯治太陽中風吐下嘔逆者芫花熬甘遂大戟各等分右各篩末取大棗十枚水一升半煮取八合去滓內諸藥強人一錢嬴人半錢溫服之不下明旦更加半錢下後糜粥自養病懸飲者亦主之治傷寒鼻塞右以東霜作團食之普濟方卷一百三十一
