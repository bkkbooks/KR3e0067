body:
  text: 普濟方卷二百九十四明周王朱橚撰癭瘤門總論夫癭瘤者多由喜怒不節憂思過度而成斯病焉大扺人之氣血循環常欲無滯留之患調攝失宜氣凝血滯為癭為瘤為癭者多結於頸項之間瘤者隨氣凝結於皮肉之内忽然腫起狀如桃李子久則滋長醫經所謂癭有五種瘤有六證五癭者石癭肉癭筋癭血癭氣癭是也六瘤者骨瘤脂瘤血瘤石瘤膿瘤肉瘤也法治療之五癭不可决破决破則膿血崩潰多致夭枉六瘤者脂瘤可破去脂粉則愈外五瘤亦不可輕昜决潰慎之諸癭瘤附論夫氣血凝滯結為癭瘤癭則憂患所生着於眉項皮寛不急槌槌而垂是也瘤則隨氣瘤住初作桃李之狀皮嫩而光漸如盃卵是也其肉色不變者謂之肉癭其筋脉呈露者謂之筋癭其赤脉交絡者謂之血癭隨憂患而消長者謂之氣癭堅硬而不可移者謂之石癭癭之名有五者此也一曰骨瘤二曰脂瘤三曰肉瘤四曰膿瘤五曰血瘤六曰石瘤瘤之名有六者此也癭瘤一者雖無痛癢最不可決破決破則膿血崩潰渗漏無已必至殺人其間肉瘤攻療尤所不許若夫脂瘤氣癭隨順用藥尚庶幾焉海藻丸海蛤煆松蘿各七錢半當歸川芎官桂白芷細辛藿香白歛明礬煆昆布洗晒海藻洗晒一兩右為細末煉蜜丸弹子大每一丸含咽下穿癭丸治癭瘤結硬通草二两杏仁去皮尖研牛蒡各一合出油五射干昆布去醎呵黎勒海藻去醎各四兩右為末煉蜜為丸如弹子大噙化嚥津下日進三服海藻散治癭瘤海藻洗去醎焙各一兩二分昆布洗去醎焙一兩半白茯苓去黑皮半兩海蛤研木通剉桂去粗皮半兩羊黶十枚去脂炙令黄右為散非時温酒下三錢匕夜一服治癭瘤方昆布洗去醎焙桂心逆流水根桞髮各一兩海藻洗去醎焙乾薑各二兩炮製羊黶七枚隂乾右為末蜜丸小弹子大含一丸咽津無時忌五辛濕麫熟物海蛤散治癭瘤海蛤研海藻馬苫者洗去醎焙白茯苓去黒皮人參半夏火煮一两洗去滑切焙各半两右為散每服一錢匕入豬黶子末錢匕甜藤一尺去根五寸取之甘草一寸水五盞同煎取一盞半分三次每次調散二盞匕臨卧服男人四服女人八服次用丸藥宣下除毒丸治癭瘤服海蛤散後宜服此巴豆鐡串穿燈上燒了去心大黄末各半兩右為末午日粽子丸如菉豆大空心冷茶下三丸良久熱茶投之下多以冷粥止之連殻丸治氣瘤成癭連殻微炒二两石榴皮醋焙乾薑炮各三分枳殻麩炒去穣一两右為末更入百草霜一兩射香少許各細研打醋麫糊為丸如小豆大每日空心用胡椒米飲湯下三十丸至五十丸豬黶散治氣癭瘤豶豬黶二七枚久人半夏洗去滑二十二枚右為散每服温酒調一錢匕臨卧垂頭服海藻酒方治頸下卒結核漸大欲成瘤癭用海藻法去鹹一觔酒二升漬一宿取三合飲之酒盡將海藻爆乾搗末酒調一錢匕日三即差如浸用絹袋盛了漬春夏二日秋冬三日桞根酒治癭瘤用桞根三觔須水所經露出者水一斗煮取五升用米三升釀之酒成每服飲半升空心日午臨卧各一服治癭瘤鬼氣疰用鉛錫為末和香油傅之癭附論夫癭者由憂患氣結所生亦由飲沙水沙隨氣入於脉摶頸下而成之初作與癭核相似而當頸下也皮寛不急垂槌槌然是也患氣結成癭者但垂核槌槌然無脉也飲沙水成癭者有核㿔㿔然無根浮動在皮中又云有三種癭有血癭可破也息肉癭可割之有氣癭可具針之養生方云諸山水黒土中出泉流者不可久居常食令人作癭病動氣增患癭病者始作與癭核相似其癭病喜當頸下當中央不偏兩邉也乃不急槌然則是癭也中國人息氣結癭者但垂槌槌無核也長安及襄陽蠻人其飲沙水喜癭有核瘰瘰耳無根浮動在皮中其地婦人患之腎氣實沙石性合於腎則令腎實故病癭也地方婦人飲沙水者其産乳甚難非針不出是以比家有不救者良由此也凢癭袋脹悶養生論云兩山夾水其人多癭瘧土厚水深其人多癭地勢使然也此可服人参化癭丹自消癭藥多用海藻海帶味屬鹹寒儒門事親書云新寨一婦人年四十餘有癭三年戴人以鹹令吐三涌三汗三下癭也半消次服化癭之藥遂大消去夫病在上者皆冝吐亦自有消息之法耳治癭名化癭丹海藻海帶昆布澤㵼木通豬黶羊黶各三枚海蛤連翹右為細末研黶為丸如鷄頭子大每服一丸臨卧噙化一方無木通療癭昆布六分洗海藻七分洗松蘿乾薑桂心各四分通草五分右搗篩蜜為丸如梧桐子大每服吞七丸即住在頸下癭處欲至食時即先飲少酒下却丸子然後食禁酢蒜鹽酪臭肉倉米若癭大者加藥令取差又方療頸下卒結囊欲成癭昆布洗海藻洗各一觔右細切好酒五升浸七日量力取數服酒更浸两遍藥力盡當以此酒下藥彌良一方為末蜜合丸如杏核大含稍咽汁日四五度佳木通散治頸下卒生結嚢欲成癭木通剉海藻昆布各洗去鹹味松蘿桂心蛤蚧塗酥炙令㣲黄白歛琥珀各一两右為末散每服不時計候以温酒調下二錢海藻散療癭海藻八兩去鹹味貝母二兩土𤓰根二分小麥麫二分炙右作散酒服方寸匕日三昆布丸治一切癭病不問久新昆布洗一兩海藻洗一两小麥好醋煮乾一兩右為細末煉蜜為丸如杏核大每服一丸食前噙嚥治癭項蒲黄三两如無用寒食代之豬黶羊黶各五两去脂焙乾右為細末用餳糖為丸如弹子大噙化療癭方昆布洗松蘿各三分海藻洗五分右搗蜜丸如杏核大含咽津日三夜二佳治忽生癭病一二年者用萬州黄藥子三觔須𦂳重者為上如輕虗即是他州者力澷須用一倍取無灰酒一斗投藥其中固濟瓶口以糠火燒一服時停剰待酒冷即令患者時時飲一盞不令絶酒氣經三五日後常把鏡自照覺銷即停飲不爾令人頸細也糠火不可多堆焼使酒氣香出瓶頭有津即止火不可待經宿也已騐如神忌毒食療癭方用淳苦酒一升漬小麥一升含温瀝出曝燥後不須使苦酒浸曝麥燥搗篩以海藻五两别搗以和麥末令調酒服方寸匕日三禁䀋生魚生菜生肉又方用秫米三升依酒法飲取圓葉白楊皮十两去土蒼者損勿令見風細切五升煮取二升濃汁漬麴末五两用前件秫末依酒法釀之熟訖封塞一七日後空心腹服一大盞日再服三日即效又方用小麥三升三年米醋三升漬麥暴乾更浸使醋盡又暴乾搗篩為散别搗昆布為散每服取麥散二匕昆布散一匕但飽食訖清酒和服之若不能飲酒者以水和服亦得服盡即瘥多服彌善無所禁但不用舉重及悲啼煩惱等事救急療癭方用鼠粘草根大一升湯洗細切除皮者一升以水三升煮取一升半分温三服服相去如人行四五里一服冝頓服六劑病即差又一方削皮細切取三大升搗篩為散蜜和丸如梧桐子大一服一十丸日再服之稍稍加至三十丸以無灰酒進之治癭以杜蘅食之五癭附論石癭泥癭勞癭憂癭氣癭是為五癭石與泥則因山水飲食而得之憂勞氣則本於情情之所感氣則隨之或上而不下或結而不散是也破結散下治五癭堅硬不可移名石癭皮色不硬名肉癭筋絡露結名筋癭赤脉交絡名血癭隨憂愁消長名氣癭五癭皆不可妄决破則膿血崩潰多致夭枉服此五癭丸菖蒲二两海蛤白歛續斷海藻松蘿官桂心蜀椒倒掛草半夏各二两神麴三两羊黶百枚右治下篩以牛羊髓脂為丸如梧桐大日服三丸一方以醬浸牛羊髓脂為丸破結散一名􅽴結散治五癭等證海藻洗龍膽草海蛤通草昆布洗海帶各三分礬石枯松蘿各三分麥麴四两半夏三分右為末每服方寸匕酒調日三服忌豬鷄魚豆辛生蒙及諸毒物十日知二十日愈一方有貝母無海帶海藻散治五癭海藻洗去鹹焙海蛤各三两昆布洗去鹹半夏湯洗七遍去滑北細辛土𤓰根松蘿各一两木通剉白歛龍膽各二两右為細末每服一錢匕酒調服日再不得作勞用力昆布散治五癭昆布洗去鹹焙三两白歛木通剉海蛤研松蘿各二两桂去粗皮海藻洗去鹹焙各三两右為細末每服温酒調下二錢匕日二服不拘時候禁生冷醋滑鷄豬肉魚蒜玉壼散治三種癭海藻海帶昆布雷丸各一两青鹽廣茂各五錢右為細末陳米飲為丸如榛子大每服一丸含化嚥津不拘時候常令藥力不斷煉蜜和丸亦可一方無青鹽廣荗又方小麥麫一斗海藻一升時生礬石十两右以三年米醋浸小麥麫曝乾各搗為散合和服一方可日四五服含極乃嚥之禁薑五辛豬魚生菜忌吹及讀誦耳語等又方取鹿黶以佳酒浸令没汁炙乾内酒中更炙令香含嚥汁味盡更易盡十具愈治五癭右以昆布一两並切如脂大酢漬含嚥汁愈氣癭附論夫癭之初結者由人憂志氣逆藴蓄之所成也又飲沙石流水毒氣不散之所致也皆是肺脾壅滯胷膈否澀不得宣通邪氣摶咽頸故令漸漸結聚成癭宜早療之便當消散也白前湯治氣癭初作白前昆布洗去鹹炙乾厚朴去粗皮生姜汁炙杏仁湯浸去皮尖䨇仁炒陳橘皮湯浸去白切乾附子炮製去皮濟海藻洗去鹹炙乾半夏湯洗七遍甘草炙剉各一两小麥醋浸一宿暴乾三合右剉如麻豆每服三錢匕水一盞半生薑一棗大拍碎煎至八分去滓食後温服日三杏仁丸治氣結頸項蓄聚不散成癭杏仁去皮尖雙仁炒令黄連殻各一两海藻洗去鹹焙一两一分訶黎勒煨去核二两半昆布洗去鹹焙木香各二两蔓荆實搡去皮羊黶炙各一两㯽榔剉陳橘皮去白焙各半两右為末煉蜜丸如梧桐子大每服三十丸空心米飲下仍常含化一丸因氣成癭海藻海帶昆布木通甘草各一两訶子薄荷各半两杏仁雙仁浸煎右為細末煉蜜為丸如鷄頭大噙化忌油膩醎物必效主氣癭方一名白頭翁丸兼治氣癭白頭翁半两昆布十分洗海藻七分洗通草七分𤣥參連殻子各八分桂心三分白歛六分右搗篩蜜丸如梧桐子大每服五丸用酒服藥忌蒜麫豬魚生䓤治氣結喉中蓄聚不散成癭白茯苓去黑皮三两半夏湯洗去滑生薑切焙各二两昆布洗去鹹焙海藻洗去鹹各五两桂去粗皮陳橘皮去白焙各一两右為末煉蜜丸如杏仁大含化一粒細細嚥津令藥不絶紫蘇膏治咽喉氣噎塞成氣癭紫蘇子炒桂刮去粗皮大黄剉炒當歸切焙乾薑炮各半两陳橘皮湯浸去白焙一两蜀椒去目并閉口者炒出汗一分猪脂臘月者煎去滓半觔右㕮咀如麻豆大先以水六升煎至二升綿濾過去滓肉猪脂再煎成膏取塗癭上日二夜一以差為度忌生䓤治氣癭問荆一两出海島羯羊黶五具去明炙白歛椒目甘草炙各一分小麥麴米二两熬右為散羊黶一種别搗為末相和如好將水浸更搗作丸如小棗大一服五丸無禁昆布丸治癭氣初結喉中壅悶不治即漸腫大冝服昆布洗去鹹味訶黎勒皮一两㯽榔一两松蘿半两乾薑半两炮剉桂心半两海藻一两洗去鹹味木通二两剉右為末煉蜜和丸如梧桐子大每於食煎後以温酒下二十丸又方昆布一两洗去鹹味海藻一两洗去鹹味訶黎勒皮一两枳殻半两麩炒去穰右為末煉蜜和丸如杏核大常以含一丸嚥津又方琥珀一两大黄一两剉微炒昆布半两洗去鹹味右為末煉蜜和丸如梧桐子大每日空心及晩食後温酒下二十丸又名琥珀丸又方㯽榔三两海藻二两洗去鹹味昆布三两洗去鹹味右為末煉蜜和丸如小彈子大每日常含一丸徐徐嚥津一名㯽榔丸忌鹽治氣癭海藻海帶海螵蛸右等分為細末酒煮空心服治氣癭用海藻為末露一宿侵晨不須洗面旋汲井花水調面東禮拜面東服每日如此服之至半月如已消㓕不可再服則差細矣針砂方専治氣癭用針砂浸於水缸平日飲食皆用此水十日一換針砂服之半年自然消散針砂不能漬也治氣癭用羊黶一具去脂生含汁盡去療氣癭方用平旦手捝癭令難搯其下眼脉斷愈一日一度搯昜愈者七日難愈者三七日礬蝎散治項氣又名癭氣白礬一两生令細全蝎半两右將礬為末用耳鍋一箇將用麻黄包了線扎定將礬分作兩處一半在底一半在上全蝎在中心用瓦片子葢定再用鹽泥固濟候乾用熱火二觔煆一伏取出為細末每服一錢入麝香少許將獖猪奄一箇切入藥在内用濕紙包五七重火煨熟取出臨卧細嚼只將津液送下海帶丸治癭氣久而不消海帶南貝母青皮陳皮右各等分為細末煉蜜和丸如彈子大食後噙化一丸海藻潰堅丸治癭氣盛大久而不消散海藻海帶昆布各一两青鹽半分廣荗半两右為細末煉蜜為丸如指尖大每服一丸噙化食服治一切癭已結成欲結已潰欲未潰右用皂角刺四兩牽牛子四兩洗凈掃濶塼石上鋪定皂角刺掺牽牛子在上拍火燒之成火速以盆椀合之候冷勿使成灰為末每服一錢半或二錢飯飲調下癭病咽喉噎塞附論夫癭病咽喉噎塞者由憂患之氣在於胷膈不能消散摶於肺脾之故咽門者胃氣之道路喉嚨者肺氣之往來今二經為邪氣所乗致經絡否澀氣不宣通結聚成癭在於咽喉下抑欝滯留則為之出納者噎塞而不通病癭者是以為急也半夏散治癭氣咽喉腫塞心胷煩悶半夏湯洗七遍去滑射干牛蒡子微炒各一两杏仁湯浸去皮尖雙人麩炒㣲黄羚羊角屑木通剉桔梗去蘆頭昆布㯽榔赤茯苓各三分枳殻半两麩炒㣲黄去穰甘草半两炙微赤剉右為散每服四錢以水一中盞入生姜半分煎至六分去滓不計時候温服桂心散治癭氣咽喉腫塞桂去相皮昆布海藻洗去鹹味甘草炙剉白麫炙一两龍膽剉海蛤洗去鹹味土𤓰根半夏為末生薑汁和作餅子暴乾呉茱茰洗湯去涎焙炒牡蠣燒各一两半右為散每服二錢匕酸漿水調下食後臨卧治癭氣咽喉腫塞防悶冝服此方木通一两剉昆布一两洗去鹹味乾薑一分炮製剉射干三分甜葶藶一两隔紙炒令紫色羚羊角屑三分人参半两去蘆頭海藻半两洗去鹹味㯽榔三分右為末煉蜜和丸如梧桐子大不計時候以温酒下二十丸治癭氣咽喉胷中滿悶腫塞昆布三两大黄一两木通一两剉海藻一两射干一两枳殻半两杏仁二两牛蒡子二两海蛤一两右為末煉蜜和丸如梧桐子大每服不計時候以粥飲湯下二十丸昆布散治癭氣結腫胷膈不利冝服昆布洗去鹹味海藻洗去鹹味松蘿細辛半夏洗七遍去滑海蛤細研甘草炙微赤剉白歛各一两龍膽去蘆二两土𤓰根㯽榔各一两右為散每於食後以温酒調下二錢不得用力勞動療癭結氣方昆布十二分洗馬尾海藻十分洗杏仁去皮尖八分通草麥門冬去心連翹分六乾薑陳橘皮各六分茯苓八分松蘿三两右蜜丸含之齒㣲㣲嚼藥袋子汁出入咽中日夜勿停㸔有問荆加四分自忌嗔及勞油膩粘食二黶散一名實金散治癭氣豬羊黶各十枚煖水洗去脂膜切焙海藻洗去鹹炙乾海帶各一两丁香木香琥珀麝香研各一两真珠半分研右為散每服一錢匕熱酒一盞調下垂頭卧少時若是去室男女不十服見效男子婦人患者百日見效婦人有孕不可服治癭腫結漸大宜服此方海藻洗去鹹味海帶海蛤細研昆布木香以上各一两金箔五十片細研猪黶七枚炙乾羊黶七枚炙乾右為散每夜臨卧時以温酒調下二錢仍不得着枕卧如是食癭即難治訶黎勒丸治年深癭氣噎塞訶黎炒去枝㯽榔海藻洗去鹹焙各一两乾薑炮白茯苓去黒皮龍膽桂去粗皮各三分昆布洗去鹹焙一两右為末煉蜜和丸如酸棗大每服一丸含化不拘時海藻丸治咽喉中噎悶成癭海藻洗去鹹炙乾㯽榔剉昆布洗去鹹炙乾訶黎勒皮文蛤研各三两海蛤研半夏湯洗七遍生薑切焙各十一兩小麥米醋浸三宿爆乾三合右為末煉蜜和丸如彈子大每服一丸含化日三通氣丸治癭氣咽喉腫塞毒氣壅悶不通木通剉射干杏仁湯浸去皮尖雙人炒訶黎勒煨去核海藻洗去鹹焙黄耆各一两白茯苓去黒皮三分惡實微炒昆布洗去鹹味右為末煉蜜和丸如彈子大每服一丸含化日晩再服治癭氣胷膈壅塞咽喉漸麄宜服此方商陸二两昆布二两洗去鹹味射干一两木通一两剉海藻一两去鹹羚角屑一两杏仁一两湯浸去皮尖雙仁麸炒微黄牛蒡子一两半微炒右為散每服三錢水一盞入生薑半分煎至六分去滓不計時候温服羊黶丸治咽喉不利項頸漸麄將成癭病羊黶二七枚炙黄切人参一两半木通剉一两海蛤研昆布去鹹炙乾三两右為末蜜煉和丸如梧桐子大每服十五丸至二十丸米飲湯下再服昆布丸治咽喉塞冷氣上築摶防悶漸成癭氣昆布去鹹炙乾杏仁去皮尖雙仁炒研犀角人参二两半吳茱茰洗焙乾炒海藻去鹹炙乾各二两乾姜炮葶藶子紙上炒各一两右為末煉蜜和丸如梧桐子大每服二十丸米飲湯下日三連翹丸治癭病咽喉噎氣塞連翹木通剉乾姜炮各一两羊黶尖七枚昆布去鹹焙各一两杏仁去皮尖雙人炒一十七枚車前子微炒一两半夏為末生薑汁和作餅子暴乾一两右為散每服二錢匕米飲調下日二服食後臨卧治癭氣咽喉腫塞宜服此方松蘿一两昆布二两洗去鹹味海藻二两洗去鹹味羚羊角屑一两木通一两剉桞根鬚一两㯽榔一两右為末煉蜜和丸如梧桐子大每服不計時二十丸粥飲下茯苓湯白茯苓去黑枝人参各一两海藻洗去鹹味海蛤甘草炙剉菴蕄子各一两半夏為末生薑汁和作餅子爆乾一两右為麄搗篩每服三錢匕水一盞煎至七分去滓温服治癭氣咽喉腫塞妨悶半夏湯洗七遍去滑海藻洗去鹹味龍膽去浄頭昆布洗去鹹味土𤓰根射干小麥麫各三分右為散每服不計時候生姜酒調下一錢治癭氣神驗方琥珀半两昆布一两洗去鹹小麥三分酒煮熟晒乾烏賊魚骨二兩桔梗半兩去蘆右為末煉蜜丸如小彈子大綿裹一丸常含嚥津治癭氣結腫心胷不利煩滿冝服此方海藻一两去鹹昆布一两洗去鹹木通一两剉連翹一两麥門冬一两半去心焙杏仁二两湯浸去皮尖雙仁麩炒微黄赤苓一两人参半两去蘆頭陳橘皮半两水浸去白焙牛蒡子一两羊黶二十枚炙乾右為末煉蜜和丸如小彈子大綿裹一丸含嚥津日三四服蛤蚧丸治癭氣腫塞蛤蚧全者醉炙一對真珠末海藻洗去鹹焙各一分右為末棗肉為丸如桐子大每服二十丸木通湯下麥門冬治癭腫悶麥門冬去心焙昆布洗去鹹焙各三分黄耆焙大黄剉一蒸陳橘皮湯浸去白焙杏仁湯浸去皮尖雙仁炒甘草炙剉各一兩右為末煉蜜為丸如彈子大每服一丸含化治癭氣胷膈壅塞咽喉漸麄冝服羊黶一百枚去脂炙大棗二十枚去皮核右同杵作丸梧桐子大每服水下七丸治癭氣令内消方用黄牛食系三具乾者於瓷瓶中以瓦子葢頭䀋泥固濟候乾燒令通赤待冷取出細研為散每於食後以粥飲調下一錢海藻酒方治咽喉噎塞冷氣妨悶結成癭氣用海藻洗去鹹二兩細剉以清酒四升浸兩宿漉去滓每服半盞細細含嚥日三不拘時以差為度治癭氣結核癗腫􅀈用昆布一两洗去鹹搗為末每以一錢綿囊於醋中浸含嚥津藥末盡再含之一方蜜丸含化自消治癭氣結硬腫大諸藥無效服之百日必得全差方黄牛食系五具以猛炭灰火㷎為灰研為末於瓷瓶内放蜜葢瓶口不得見風海藻五两昆布五两以上二味以清水漬五日旋換清水洗去鹹味暴乾白殭蚕五两㣲炒右為末散入牛食系末研令勻每服以温酒調下二錢日三服以差為度治癭氣結腫方昆布洗去鹹味馬芹子半兩茵芋半兩蕪荑仁半兩蒟醬半兩右為末以醋浸蒸餅和丸如小彈子大以綿褁一丸含化嚥津日四五服以差為度治癭氣咽喉腫塞心胷煩悶琥珀半兩皂莢子仁㣲炒牛蒡子右為散每服食前以䓤白湯調下二錢通氣丸治咽喉氣悶胷膈滿塞項頸漸麄木通剉海藻洗去鹹味炙乾海蛤研各一兩昆布洗去鹹味炙乾一兩羊黶二十枚炙黄切右為末煉蜜和丸如彈子大每服一丸含化忌生菜熱麫炙肉蒜笋羚羊角丸治癭氣胷悶壅塞咽喉漸麄宜服大效羚羊角屑一兩昆布一兩洗去鹹味桂心一兩大黄一兩剉㣲炒木通一兩剉右為末煉蜜為丸如梧桐子大每服不計時以粥飲下二十丸治癭氣經久不消神效方海帶一兩海藻昆布各一兩洗去鹹味右為末煮赤小豆并棗肉同研為丸如小栗子大以綿褁每月如大盡取二十八日夜小盡取二十七日至月終三夜臨卧時凈灌潄含卧嚥津不語至明别日不得服松蘿丸治癭氣結核癗癗腫硬松蘿昆布洗去鹹味木通剉桞根鬚逆水生者洗焙乾以上各二两右為末煉蜜和搗三二杵丸如小彈子大常含一丸細細嚥津令藥在喉中相接為妙瘤附論瘤之為義留滯而不去也氣血流行不失其常則形體和平無或餘贅及欝結壅塞則乗虗投隙瘤所以生初為小核浸以長大若盃盂然不痒不痛亦不繼強方劑所治與治癭法同但癭有可鍼割而瘤慎不可破決爾儒門事親書云戴人在西華衆皆訕以為吐㵼一日魏夀之與戴人在食肆中見一夫病一瘤正當目之上納皆色如灰李下垂覆之目暗不能視物戴人謂夀之曰吾不待食熟立取此瘤魏未之信也戴人曰吾與爾取此瘤何如其人曰人皆不敢割戴人曰吾非用力割别有術焉其人從之乃引一小室中令晚卧一床以䋲束其眶刺委中人出血先令以手揉其自瘤止亦刺出雀糞立平出户夀之大驚戴人曰人之有之技可盡觀手部戴人之鄉有一女子未嫁年十八兩手背皆有瘤一類鷄距一類角丸腕不能馴向明望之如桃膠然夫家欲弃之戴人見之曰在手皆為膠瘤在面者為粉瘤此膠瘤也以䤵鍼十字刺破按出黄膠膿三兩匙立平核更不復作婚事復成非素明不敢用此法耳外䑓秘要時後云皮肉中忽有腫起初如梅李漸長大不痒不痛又不堅强按之揉軟此血瘤也不療至如盤大則不可消而非殺人病耳亦慎不可破方乃有大療今如覺但依癭家療療若不消更别有大方䧟腫散治二三十年瘤及骨瘤肉瘤膿血瘤瘜肉大如盃盂久不瘥致有癰潰令人骨消肉盡或潰令人驚愓寢寤不安身體瘈縮愈而復發冝服此方烏賊魚骨半兩燒灰硫黄半兩細研白石英分半兩鍾乳分半兩丹参三分琥珀末二兩附子一兩炮製去皮劑乾薑一兩炮製剉大黄一兩川芒硝二兩右為散以囊盛勿泄氣若瘡濕即乾傅之若瘡乾以猪脂和傅之日三四以上效為度若消不盡者至五劑十劑止藥令人之不痛若不消加芒硝二兩一方有紫石英治癭腫悶冝服此大黄二兩剉鹹炒昆布一兩洗去鹹味海藻二兩洗去鹹味𤣥参一兩枳殻一兩麩炒微黄去穰芎藭一兩杏仁一兩湯浸去皮尖雙人麩炒微黄延胡索一兩琥珀一兩右為末煉蜜和丸如梧桐子大每服以木通湯送下二十丸枯瘤方砒硼砂黄丹雄黄粉霜輕粉以上各一分班猫二十箇生用硃砂一錢乳香没藥一錢右同研為末粥糊為丸揑作碁子様曝乾先炙破瘤頂三炷然後以藥餠葢上用黄水末以水調貼上數日自然乾枯下落餠金散治枯瘤子砒霜一兩砒黄脚一兩巴豆半兩去皮出油木鱉子一兩去皮研如泥右同為細末入石腦油和一塊用紙二十四重裹藥磁合内盛入地二尺埋兩箇月取出隂乾後入輕粉一錢雄黄半錢粉霜二兩乳香一錢没藥二錢蟾酥一錢右同前藥研為細末先放瘤子頂上炙三炷唾調塗之上用紙封三重每日上次先藥休去了金黄散作定子瘤子破了用此藥任在四邊自落薑酒下早晩各一丸如小腸氣三丸切生薑三錢炒焦酒下如傷酒二丸飛白礬生薑自然汁調下婦人心氣痛醋湯下二丸紫蘇子膏治項氣成瘤方見本門氣癭類生肉膏治癰瘤潰漏及金瘡百瘡方當歸附子甘草白芷芎藭各一兩薤白生地黄右咀㕮以猪脂三升半煎白芷黄去滓稍以傅之三日蔓荆實丸治瘤蔓荆實去白皮炒一兩甘草炙剉一兩羊黶二十枚去脂膜别搗白歛半兩椒目一分小麥麫㣲炒一兩昆布黄耆湯一名麥門冬丸治瘤腫方見癭瘤咽喉噎塞本類右將五味為末與羊黶末相和以好醬更搗丸如梧桐子大每服酒下五丸消毒散治毒氣項下結核成為瘤者皂角子五百枚慢火炒烈薄荷乾者二兩㯽榔剉半兩甘草炙剉連翹各一兩右為散每服二錢匕食後臨卧米飲調下臘茶亦可深思療瘤脂細瘤方吳茱茰一分礬石燒芎藭當歸大黄黄連芍藥白歛黄芩右合搗下篩和和鷄子塗著細故布上便瘤大小薄厚貼之燥輙昜之著藥當熟作膿貼細細從孔中出探之知膿血盡著生肉膏若膿血不盡後起故也繫瘤子自落方砒黄砒霜硼砂各半兩巴豆五粒去皮心芫青去翅足七枚班猫去頭足翅七枚右研為末先取蜘蛛網及絲共搓為線子水濕塗藥末於上貼子中常以藥末養遇有患者以線繫之留線頭如痒即繫之如痛即不用繫其瘤自黒乾如胡桃大者三四日自落如茄子大者半月落更大者不過二十八日如𤓰者不過一月如血瘤繫之血出者服定血藥燕服藥治之黄芩散治諸瘤血出黄芩去黑心黄蘗去粗皮剉黄連去鬚欝金各半兩右為散入寒食麫五錢匕水調貼之小黄膏治瘤黄蘗黄芩大黄各等分右為末以水調為糊比枯瘤藥大一遭塗之三日一昜至八九上不取直候可取治小瘤方先用甘草煎膏筆蘸粧瘤四傍乾後復粧凢三次以藥大㦸芫花甘遂右䓁分為末米醋調别筆粧𫝊其中不得近著甘草處次日縮小又以甘草膏粧小暈三次中門仍用大㦸芫花甘遂如前自然焦縮凡膏瘤肉瘤膿瘤血瘤石瘤皆不可决惟脂瘤决去其脂粉則愈葢六種瘤尤不可治治則殺人信一兩硫黄一兩井泉石二兩𤣥精石一兩右將藥研作小塊入砂鍋内赤石脂并鹽泥固濟勿令透氣乃入於文武火内燒煙盡取出放在地上冷定取藥後入輕粉一錢乳香二錢硼砂二錢没藥二錢雄黄二錢右同研為細末用蒸餠心和為小錠子在四邉為效治瘤贅如破者用藥一餅安破處漸漸腐化去之不破者用針挑動用藥信五錢研硫黄五錢研白丁香四錢班猫十六箇去頭足巴豆十六箇去殻油雄黄四錢輕粉右為細末用油餠邉和丸如彈子大揑作餠子龍膽丸治氣瘤龍膽去蘆頭炙一兩昆布洗去鹹味炙海藻洗去鹹炙各二兩馬刀研海蛤研香草各半兩大黄剉炒一分右為末煉蜜為丸如梧桐子大用破日綿褁一丸朝暮含嚥之白頭翁丸治氣瘤方見本門氣癭類二色丸治一切腫赤皮膚毒及瘤天南星半夏甘遂大㦸各三錢乾薑胡椒桂􅒝撥各三錢代赭石一兩大黄生用右取前四味以漿水一升煮水盡為度晒乾餘六味同搗為末每用一錢巴豆三枚燒得𦦨起盞合却候冷每一錢藥一處研更用醋一盞煎成膏共藥同丸如菉豆大丸分兩處丹砂為衣一用膩粉為白衣此兩䓁顔色白者或揑作餠子亦可用治瘤子每服一丸生薑湯下神效散治項氣瘤結附贅日漸増長豬羊黶各三十枚旋入䀋膳内焦過今人乾只用䀋亦得陳皮去白焙炒一兩右為散每服二錢匕空心米飲下初結不過數服覺消不用久服治瘤雄黄一錢人言一錢一分右研為細末稀粥糊調藥攤在瘡頂児上用針鍼破用貼藥紙封治白瘤方白礬硫黄等分右為末以醋和封止治候子獨掃子本草名地膚子白礬右等分為末煎湯洗不數次即盡去陳郎中親曽用之果然枯瘤方用銅碌為細末刺破瘤掺在上以膏藥貼之南星膏治皮膚頭靣生瘤不可輙有鍼炙大者如拳小者如栗或軟或硬不疼不痛冝服用生南星大者一枚去土薄切細研桐粘為膏滴好醋五七滴如無生者以乾者為末投醋研為膏先將小刺病處令氣透以藥膏攤紙上像瘤大小貼覺痒三五昜瘥繫瘤法兼去䑕妳痔用芫花根凈洗帶濕不得犯鐡器於木石器中掲取汁用線一條浸半日或一宿以線繫定經宿即落未落再換線不過兩次自落後以龍骨并訶子末𫝊瘡口即合依上法繫䑕妳痔累用得效繫瘤法蘇沈良方亦有用蜘蛛者然費力也不如此徑捷如無根只用花泡濃水浸線亦得昔趙氏甞用以繫腰間一瘤不半日即落亦不痛治果報靣生贅瘤用艾圓炙十壯即用醋磨雄黄塗紙上剪如枼螄奄子大貼所炙處更用膏藥重貼二日一換候痒搔出膿如菉豆粉即愈治瘤方用舊牛皮洗煎凍常食之瘤若破如豆腐極臭治瘤方用鹿草鹿二種肉剖如厚脯炙令熱榻掩一日四炙四昜痛攬出膿便愈不除更炙新肉用之良治瘤用人精一合半亦得青竹筒盛火上燒炮之以器蒸取汁蜜置器中數𫝊瘤上良萞麻子方治大人小児項下結核漸成癭瘤用􅒝麻子炒黄風中吹乾每服温湯下一枚不拘時候日服三五枚服之五日後搗𤣥参為散食後温米飲調下一錢匕與萆麻相間服三日後依前只服􅒝麻五日後却與𤣥参同服三日周而復始繫瘤方用稲上花蜘蛛十餘枚置桃李枝上候絲垂下取東邉者撚為線子繫定子七日候換瘤子自落昔人病瘤如拳大以此繫之至三換瘤子遂乾一夜忽失所在天明於枕邉得之如一乾栗又方用狗屎拌雞子傅之去濃水如前方說傅生肉膏取瘥治肉瘤先將麻布擦令血熱方上藥大者用藥四五次小者用藥三四次以致根頭不痛有巨暈即止辨瘤數種於後軟筋瘤帶經絡垂畨花瘤形如石榴花米瘤肉如米粉瘤肉如粉肉瘤色紅茄子瘤氣瘤肉實骨瘤硬實血瘤色如繫茄軟自沺瘤擦開如牛血右十般瘤子惟有七般可醫如軟瘤畨花瘤并自有破者不可療用藥之際切須審察贅瘤方用錦紋大黄醋磨塗瘤上漸消白瘤方令先極搔刮以䋲縛之即愈又取東向木空中水熟刮瘤上洗之凢一日三即愈治身上生贅肉用海藻為末𫝊仍煎海藻酒服之則去治贅瘤用茄子咬去蔕於贅瘤上擦千百遍以茄撇於地上茄若爛瘤平復矣平復以㸃贅瘤法凡剪去薄皮以藥㸃之痁落即去大者内捻出一肉片子仍須擦令血熱方可用藥治候子用濃研好京墨筆抺在候子上候乾更抺以多為妙數次即失去又方用買路紙不令人見揩後宻藏撇於路上街磚下紙爛則疾愈矣又方用青柴燒出水搽之治流腫悶方羊黶一兩乾者青橘皮一兩湯浸去白焙燒銀沙鍋一兩右為末用糯米飲和丸如梧桐子大每於食後以木通下二十丸井金散枯瘤􅊓大有神效土黄二錢雄黄二錢硼砂二錢研粉霜一錢輕粉一錢乳香半錢没藥半錢右為細末假令瘤子如胡桃許用藥末少許半用津唾調稀糊得所攤去瘤子項上如小不許唾津濕紙花兩重葢之後用黄龍膏葢之間且度上藥次添藥徹的周回大韮葉如比之上無徒漸瘤斬之後根銀自然有動隨後然下來一方入麝香少許黄龍膏用黄蘗一味為細末唾調攤去紙上生肌青龍散訶子皮髙茶龍骨右等分為細末乾掺上做土法砒黄另為末三兩木鱉子用半兩去殻巴豆半兩不去油硼砂另為末二兩右砒黄一處為末後用木鱉子同石腦油和成一塊油紙褁定埋於坑内四十九日取出收於磁噐盛劈作小塊枯瘤子藥方桑柴灰二椀膩白石灰三椀朽木三兩乾桑耳三兩草烏頭半觔川烏頭四兩右朽木等四味燒灰作性同煎桑柴灰匀用水一桶淋汁如法殻火成膏用之治頭靣生瘤子用蛛絲勒瘤子根三二日自然退落治宿肉贅瘤右以􅀈􅀈燒為末和臘月猪脂傅之治癭根瘤贅瘜肉右用愽落迪和百丈青鷄桑灰為末傅之治繫指并贅瘤方右以花蜘蛛網絲於黄丹中飬之繫指與瘤夜至旦自下釘棺木斧聲去人身上努肉可候有候時専聽其聲聲發之時便下手速捻二七遍已後自得消平也産婦勿用普濟方卷二百九十四
