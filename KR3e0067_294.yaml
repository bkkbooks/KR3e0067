body:
  text: 普濟方卷二百九十四明周王朱橚撰癭瘤門總論夫癭瘤者多由喜怒不節憂思過度而成斯病焉大扺人之氣血循環常欲無滯留之患調攝失宜氣凝血滯為癭為瘤為癭者多結於頸項之間瘤者隨氣凝結於皮肉之內忽然腫起狀如桃李子久則滋長醫經所謂癭有五種瘤有六證五癭者石癭肉癭筋癭血癭氣癭是也六瘤者骨瘤脂瘤血瘤石瘤膿瘤肉瘤也法治療之五癭不可決破決破則膿血崩潰多致夭枉六瘤者脂瘤可破去脂粉則愈外五瘤亦不可輕昜決潰慎之諸癭瘤附論夫氣血凝滯結為癭瘤癭則憂患所生著於眉項皮寬不急槌槌而垂是也瘤則隨氣瘤住初作桃李之狀皮嫩而光漸如杯卵是也其肉色不變者謂之肉癭其筋脈呈露者謂之筋癭其赤脈交絡者謂之血癭隨憂患而消長者謂之氣癭堅硬而不可移者謂之石癭癭之名有五者此也一曰骨瘤二曰脂瘤三曰肉瘤四曰膿瘤五曰血瘤六曰石瘤瘤之名有六者此也癭瘤一者雖無痛癢最不可決破決破則膿血崩潰滲漏無已必至殺人其間肉瘤攻療尤所不許若夫脂瘤氣癭隨順用藥尚庶幾焉海藻丸海蛤煆松蘿各七錢半當歸川芎官桂白芷細辛藿香白斂明礬煆昆布洗晒海藻洗晒一兩右為細末煉蜜丸彈子大每一丸含咽下穿癭丸治癭瘤結硬通草二兩杏仁去皮尖研牛蒡各一合出油五射干昆布去醎呵黎勒海藻去醎各四兩右為末煉蜜為丸如彈子大噙化咽津下日進三服海藻散治癭瘤海藻洗去醎焙各一兩二分昆布洗去醎焙一兩半白茯苓去黑皮半兩海蛤研木通銼桂去粗皮半兩羊黶十枚去脂炙令黃右為散非時溫酒下三錢匕夜一服治癭瘤方昆布洗去醎焙桂心逆流水根桞髮各一兩海藻洗去醎焙乾薑各二兩炮製羊黶七枚隂乾右為末蜜丸小彈子大含一丸咽津無時忌五辛濕麵熟物海蛤散治癭瘤海蛤研海藻馬苫者洗去醎焙白茯苓去黑皮人參半夏火煮一兩洗去滑切焙各半兩右為散每服一錢匕入豬黶子末錢匕甜藤一尺去根五寸取之甘草一寸水五盞同煎取一盞半分三次每次調散二盞匕臨卧服男人四服女人八服次用丸藥宣下除毒丸治癭瘤服海蛤散後宜服此巴豆鐡串穿燈上燒了去心大黃末各半兩右為末午日粽子丸如菉豆大空心冷茶下三丸良久熱茶投之下多以冷粥止之連殼丸治氣瘤成癭連殼微炒二兩石榴皮醋焙乾薑炮各三分枳殼麩炒去穰一兩右為末更入百草霜一兩射香少許各細研打醋麵糊為丸如小豆大每日空心用胡椒米飲湯下三十丸至五十丸豬黶散治氣癭瘤豶豬黶二七枚久人半夏洗去滑二十二枚右為散每服溫酒調一錢匕臨卧垂頭服海藻酒方治頸下卒結核漸大欲成瘤癭用海藻法去鹹一斤酒二升漬一宿取三合飲之酒盡將海藻爆乾搗末酒調一錢匕日三即差如浸用絹袋盛了漬春夏二日秋冬三日桞根酒治癭瘤用桞根三斤須水所經露出者水一斗煮取五升用米三升釀之酒成每服飲半升空心日午臨卧各一服治癭瘤鬼氣疰用鉛錫為末和香油傅之癭附論夫癭者由憂患氣結所生亦由飲沙水沙隨氣入於脈摶頸下而成之初作與癭核相似而當頸下也皮寬不急垂槌槌然是也患氣結成癭者但垂核槌槌然無脈也飲沙水成癭者有核㿔㿔然無根浮動在皮中又云有三種癭有血癭可破也息肉癭可割之有氣癭可具針之養生方云諸山水黑土中出泉流者不可久居常食令人作癭病動氣增患癭病者始作與癭核相似其癭病喜當頸下當中央不偏兩邉也乃不急槌然則是癭也中國人息氣結癭者但垂槌槌無核也長安及襄陽蠻人其飲沙水喜癭有核瘰瘰耳無根浮動在皮中其地婦人患之腎氣實沙石性合於腎則令腎實故病癭也地方婦人飲沙水者其産乳甚難非針不出是以比家有不救者良由此也凡癭袋脹悶養生論云兩山夾水其人多癭瘧土厚水深其人多癭地勢使然也此可服人參化癭丹自消癭藥多用海藻海帶味屬鹹寒儒門事親書云新寨一婦人年四十餘有癭三年戴人以鹹令吐三涌三汗三下癭也半消次服化癭之藥遂大消去夫病在上者皆冝吐亦自有消息之法耳治癭名化癭丹海藻海帶昆布澤㵼木通豬黶羊黶各三枚海蛤連翹右為細末研黶為丸如雞頭子大每服一丸臨卧噙化一方無木通療癭昆布六分洗海藻七分洗松蘿乾薑桂心各四分通草五分右搗篩蜜為丸如梧桐子大每服吞七丸即住在頸下癭處欲至食時即先飲少酒下却丸子然後食禁酢蒜鹽酪臭肉倉米若癭大者加藥令取差又方療頸下卒結囊欲成癭昆布洗海藻洗各一斤右細切好酒五升浸七日量力取數服酒更浸兩遍藥力盡當以此酒下藥彌良一方為末蜜合丸如杏核大含稍咽汁日四五度佳木通散治頸下卒生結囊欲成癭木通銼海藻昆布各洗去鹹味松蘿桂心蛤蚧塗酥炙令微黃白斂琥珀各一兩右為末散每服不時計候以溫酒調下二錢海藻散療癭海藻八兩去鹹味貝母二兩土瓜根二分小麥麵二分炙右作散酒服方寸匕日三昆布丸治一切癭病不問久新昆布洗一兩海藻洗一兩小麥好醋煮乾一兩右為細末煉蜜為丸如杏核大每服一丸食前噙咽治癭項蒲黃三兩如無用寒食代之豬黶羊黶各五兩去脂焙乾右為細末用餳糖為丸如彈子大噙化療癭方昆布洗松蘿各三分海藻洗五分右搗蜜丸如杏核大含咽津日三夜二佳治忽生癭病一二年者用萬州黃藥子三斤須緊重者為上如輕虗即是他州者力漫須用一倍取無灰酒一斗投藥其中固濟瓶口以粳火燒一服時停剩待酒冷即令患者時時飲一盞不令絶酒氣經三五日後常把鏡自照覺銷即停飲不爾令人頸細也粳火不可多堆燒使酒氣香出瓶頭有津即止火不可待經宿也已驗如神忌毒食療癭方用淳苦酒一升漬小麥一升含溫瀝出曝燥後不須使苦酒浸曝麥燥搗篩以海藻五兩别搗以和麥末令調酒服方寸匕日三禁鹽生魚生菜生肉又方用秫米三升依酒法飲取圓葉白楊皮十兩去土蒼者損勿令見風細切五升煮取二升濃汁漬麴末五兩用前件秫末依酒法釀之熟訖封塞一七日後空心腹服一大盞日再服三日即效又方用小麥三升三年米醋三升漬麥暴乾更浸使醋盡又暴乾搗篩為散别搗昆布為散每服取麥散二匕昆布散一匕但飽食訖清酒和服之若不能飲酒者以水和服亦得服盡即瘥多服彌善無所禁但不用舉重及悲啼煩惱等事救急療癭方用鼠粘草根大一升湯洗細切除皮者一升以水三升煮取一升半分溫三服服相去如人行四五里一服冝頓服六劑病即差又一方削皮細切取三大升搗篩為散蜜和丸如梧桐子大一服一十丸日再服之稍稍加至三十丸以無灰酒進之治癭以杜蘅食之五癭附論石癭泥癭勞癭憂癭氣癭是為五癭石與泥則因山水飲食而得之憂勞氣則本於情情之所感氣則隨之或上而不下或結而不散是也破結散下治五癭堅硬不可移名石癭皮色不硬名肉癭筋絡露結名筋癭赤脈交絡名血癭隨憂愁消長名氣癭五癭皆不可妄決破則膿血崩潰多致夭枉服此五癭丸菖蒲二兩海蛤白斂續斷海藻松蘿官桂心蜀椒倒挂草半夏各二兩神麴三兩羊黶百枚右治下篩以牛羊髓脂為丸如梧桐大日服三丸一方以醬浸牛羊髓脂為丸破結散一名􅽴結散治五癭等證海藻洗龍膽草海蛤通草昆布洗海帶各三分礬石枯松蘿各三分麥麴四兩半夏三分右為末每服方寸匕酒調日三服忌豬雞魚豆辛生蒙及諸毒物十日知二十日愈一方有貝母無海帶海藻散治五癭海藻洗去鹹焙海蛤各三兩昆布洗去鹹半夏湯洗七遍去滑北細辛土瓜根松蘿各一兩木通銼白斂龍膽各二兩右為細末每服一錢匕酒調服日再不得作勞用力昆布散治五癭昆布洗去鹹焙三兩白斂木通銼海蛤研松蘿各二兩桂去粗皮海藻洗去鹹焙各三兩右為細末每服溫酒調下二錢匕日二服不拘時候禁生冷醋滑雞豬肉魚蒜玉壼散治三種癭海藻海帶昆布雷丸各一兩青鹽廣茂各五錢右為細末陳米飲為丸如榛子大每服一丸含化咽津不拘時候常令藥力不斷煉蜜和丸亦可一方無青鹽廣荗又方小麥麵一斗海藻一升時生礬石十兩右以三年米醋浸小麥麵曝乾各搗為散合和服一方可日四五服含極乃咽之禁薑五辛豬魚生菜忌吹及讀誦耳語等又方取鹿黶以佳酒浸令沒汁炙乾內酒中更炙令香含咽汁味盡更易盡十具愈治五癭右以昆布一兩並切如脂大酢漬含咽汁愈氣癭附論夫癭之初結者由人憂志氣逆藴蓄之所成也又飲沙石流水毒氣不散之所致也皆是肺脾壅滯胸膈否澀不得宣通邪氣摶咽頸故令漸漸結聚成癭宜早療之便當消散也白前湯治氣癭初作白前昆布洗去鹹炙乾厚朴去粗皮生薑汁炙杏仁湯浸去皮尖雙仁炒陳橘皮湯浸去白切乾附子炮製去皮濟海藻洗去鹹炙乾半夏湯洗七遍甘草炙銼各一兩小麥醋浸一宿暴乾三合右銼如麻豆每服三錢匕水一盞半生薑一棗大拍碎煎至八分去滓食後溫服日三杏仁丸治氣結頸項蓄聚不散成癭杏仁去皮尖雙仁炒令黃連殼各一兩海藻洗去鹹焙一兩一分訶黎勒煨去核二兩半昆布洗去鹹焙木香各二兩蔓荆實搡去皮羊黶炙各一兩檳榔銼陳橘皮去白焙各半兩右為末煉蜜丸如梧桐子大每服三十丸空心米飲下仍常含化一丸因氣成癭海藻海帶昆布木通甘草各一兩訶子薄荷各半兩杏仁雙仁浸煎右為細末煉蜜為丸如雞頭大噙化忌油膩醎物必效主氣癭方一名白頭翁丸兼治氣癭白頭翁半兩昆布十分洗海藻七分洗通草七分玄參連殼子各八分桂心三分白斂六分右搗篩蜜丸如梧桐子大每服五丸用酒服藥忌蒜麵豬魚生䓤治氣結喉中蓄聚不散成癭白茯苓去黑皮三兩半夏湯洗去滑生薑切焙各二兩昆布洗去鹹焙海藻洗去鹹各五兩桂去粗皮陳橘皮去白焙各一兩右為末煉蜜丸如杏仁大含化一粒細細咽津令藥不絶紫蘇膏治咽喉氣噎塞成氣癭紫蘇子炒桂刮去粗皮大黃銼炒當歸切焙乾薑炮各半兩陳橘皮湯浸去白焙一兩蜀椒去目并閉口者炒出汗一分豬脂臘月者煎去滓半斤右㕮咀如麻豆大先以水六升煎至二升綿濾過去滓肉豬脂再煎成膏取塗癭上日二夜一以差為度忌生䓤治氣癭問荆一兩出海島羯羊黶五具去明炙白斂椒目甘草炙各一分小麥麴米二兩熬右為散羊黶一種别搗為末相和如好將水浸更搗作丸如小棗大一服五丸無禁昆布丸治癭氣初結喉中壅悶不治即漸腫大冝服昆布洗去鹹味訶黎勒皮一兩檳榔一兩松蘿半兩乾薑半兩炮銼桂心半兩海藻一兩洗去鹹味木通二兩銼右為末煉蜜和丸如梧桐子大每於食煎後以溫酒下二十丸又方昆布一兩洗去鹹味海藻一兩洗去鹹味訶黎勒皮一兩枳殼半兩麩炒去穰右為末煉蜜和丸如杏核大常以含一丸咽津又方琥珀一兩大黃一兩銼微炒昆布半兩洗去鹹味右為末煉蜜和丸如梧桐子大每日空心及晚食後溫酒下二十丸又名琥珀丸又方檳榔三兩海藻二兩洗去鹹味昆布三兩洗去鹹味右為末煉蜜和丸如小彈子大每日常含一丸徐徐咽津一名檳榔丸忌鹽治氣癭海藻海帶海螵蛸右等分為細末酒煮空心服治氣癭用海藻為末露一宿侵晨不須洗面旋汲井花水調面東禮拜面東服每日如此服之至半月如已消滅不可再服則差細矣針砂方専治氣癭用針砂浸於水缸平日飲食皆用此水十日一換針砂服之半年自然消散針砂不能漬也治氣癭用羊黶一具去脂生含汁盡去療氣癭方用平旦手捝癭令難搯其下眼脈斷愈一日一度搯昜愈者七日難愈者三七日礬蝎散治項氣又名癭氣白礬一兩生令細全蝎半兩右將礬為末用耳鍋一箇將用麻黃包了線扎定將礬分作兩處一半在底一半在上全蝎在中心用瓦片子蓋定再用鹽泥固濟候乾用熱火二斤煆一伏取出為細末每服一錢入麝香少許將獖豬奄一箇切入藥在內用濕紙包五七重火煨熟取出臨卧細嚼只將津液送下海帶丸治癭氣久而不消海帶南貝母青皮陳皮右各等分為細末煉蜜和丸如彈子大食後噙化一丸海藻潰堅丸治癭氣盛大久而不消散海藻海帶昆布各一兩青鹽半分廣荗半兩右為細末煉蜜為丸如指尖大每服一丸噙化食服治一切癭已結成欲結已潰欲未潰右用皂角刺四兩牽牛子四兩洗淨掃濶磚石上鋪定皂角刺摻牽牛子在上拍火燒之成火速以盆碗合之候冷勿使成灰為末每服一錢半或二錢飯飲調下癭病咽喉噎塞附論夫癭病咽喉噎塞者由憂患之氣在於胸膈不能消散摶於肺脾之故咽門者胃氣之道路喉嚨者肺氣之往來今二經為邪氣所乘致經絡否澀氣不宣通結聚成癭在於咽喉下抑鬱滯留則為之出納者噎塞而不通病癭者是以為急也半夏散治癭氣咽喉腫塞心胸煩悶半夏湯洗七遍去滑射干牛蒡子微炒各一兩杏仁湯浸去皮尖雙人麩炒微黃羚羊角屑木通銼桔梗去蘆頭昆布檳榔赤茯苓各三分枳殼半兩麩炒微黃去穰甘草半兩炙微赤銼右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服桂心散治癭氣咽喉腫塞桂去相皮昆布海藻洗去鹹味甘草炙銼白麵炙一兩龍膽銼海蛤洗去鹹味土瓜根半夏為末生薑汁和作餅子暴乾吳茱茰洗湯去涎焙炒牡蠣燒各一兩半右為散每服二錢匕酸漿水調下食後臨卧治癭氣咽喉腫塞防悶冝服此方木通一兩銼昆布一兩洗去鹹味乾薑一分炮製銼射干三分甜葶藶一兩隔紙炒令紫色羚羊角屑三分人參半兩去蘆頭海藻半兩洗去鹹味檳榔三分右為末煉蜜和丸如梧桐子大不計時候以溫酒下二十丸治癭氣咽喉胸中滿悶腫塞昆布三兩大黃一兩木通一兩銼海藻一兩射干一兩枳殼半兩杏仁二兩牛蒡子二兩海蛤一兩右為末煉蜜和丸如梧桐子大每服不計時候以粥飲湯下二十丸昆布散治癭氣結腫胸膈不利冝服昆布洗去鹹味海藻洗去鹹味松蘿細辛半夏洗七遍去滑海蛤細研甘草炙微赤銼白斂各一兩龍膽去蘆二兩土瓜根檳榔各一兩右為散每於食後以溫酒調下二錢不得用力勞動療癭結氣方昆布十二分洗馬尾海藻十分洗杏仁去皮尖八分通草麥門冬去心連翹分六乾薑陳橘皮各六分茯苓八分松蘿三兩右蜜丸含之齒微微嚼藥袋子汁出入咽中日夜勿停看有問荆加四分自忌嗔及勞油膩粘食二黶散一名實金散治癭氣豬羊黶各十枚暖水洗去脂膜切焙海藻洗去鹹炙乾海帶各一兩丁香木香琥珀麝香研各一兩真珠半分研右為散每服一錢匕熱酒一盞調下垂頭卧少時若是去室男女不十服見效男子婦人患者百日見效婦人有孕不可服治癭腫結漸大宜服此方海藻洗去鹹味海帶海蛤細研昆布木香以上各一兩金箔五十片細研豬黶七枚炙乾羊黶七枚炙乾右為散每夜臨卧時以溫酒調下二錢仍不得著枕卧如是食癭即難治訶黎勒丸治年深癭氣噎塞訶黎炒去枝檳榔海藻洗去鹹焙各一兩乾薑炮白茯苓去黑皮龍膽桂去粗皮各三分昆布洗去鹹焙一兩右為末煉蜜和丸如酸棗大每服一丸含化不拘時海藻丸治咽喉中噎悶成癭海藻洗去鹹炙乾檳榔銼昆布洗去鹹炙乾訶黎勒皮文蛤研各三兩海蛤研半夏湯洗七遍生薑切焙各十一兩小麥米醋浸三宿爆乾三合右為末煉蜜和丸如彈子大每服一丸含化日三通氣丸治癭氣咽喉腫塞毒氣壅悶不通木通銼射干杏仁湯浸去皮尖雙人炒訶黎勒煨去核海藻洗去鹹焙黃耆各一兩白茯苓去黑皮三分惡實微炒昆布洗去鹹味右為末煉蜜和丸如彈子大每服一丸含化日晚再服治癭氣胸膈壅塞咽喉漸粗宜服此方商陸二兩昆布二兩洗去鹹味射干一兩木通一兩銼海藻一兩去鹹羚角屑一兩杏仁一兩湯浸去皮尖雙仁麩炒微黃牛蒡子一兩半微炒右為散每服三錢水一盞入生薑半分煎至六分去滓不計時候溫服羊黶丸治咽喉不利項頸漸粗將成癭病羊黶二七枚炙黃切人參一兩半木通銼一兩海蛤研昆布去鹹炙乾三兩右為末蜜煉和丸如梧桐子大每服十五丸至二十丸米飲湯下再服昆布丸治咽喉塞冷氣上築摶防悶漸成癭氣昆布去鹹炙乾杏仁去皮尖雙仁炒研犀角人參二兩半吳茱茰洗焙乾炒海藻去鹹炙乾各二兩乾薑炮葶藶子紙上炒各一兩右為末煉蜜和丸如梧桐子大每服二十丸米飲湯下日三連翹丸治癭病咽喉噎氣塞連翹木通銼乾薑炮各一兩羊黶尖七枚昆布去鹹焙各一兩杏仁去皮尖雙人炒一十七枚車前子微炒一兩半夏為末生薑汁和作餅子暴乾一兩右為散每服二錢匕米飲調下日二服食後臨卧治癭氣咽喉腫塞宜服此方松蘿一兩昆布二兩洗去鹹味海藻二兩洗去鹹味羚羊角屑一兩木通一兩銼桞根鬚一兩檳榔一兩右為末煉蜜和丸如梧桐子大每服不計時二十丸粥飲下茯苓湯白茯苓去黑枝人參各一兩海藻洗去鹹味海蛤甘草炙銼菴蕄子各一兩半夏為末生薑汁和作餅子爆乾一兩右為粗搗篩每服三錢匕水一盞煎至七分去滓溫服治癭氣咽喉腫塞妨悶半夏湯洗七遍去滑海藻洗去鹹味龍膽去淨頭昆布洗去鹹味土瓜根射干小麥麵各三分右為散每服不計時候生薑酒調下一錢治癭氣神驗方琥珀半兩昆布一兩洗去鹹小麥三分酒煮熟晒乾烏賊魚骨二兩桔梗半兩去蘆右為末煉蜜丸如小彈子大綿裹一丸常含咽津治癭氣結腫心胸不利煩滿冝服此方海藻一兩去鹹昆布一兩洗去鹹木通一兩銼連翹一兩麥門冬一兩半去心焙杏仁二兩湯浸去皮尖雙仁麩炒微黃赤苓一兩人參半兩去蘆頭陳橘皮半兩水浸去白焙牛蒡子一兩羊黶二十枚炙乾右為末煉蜜和丸如小彈子大綿裹一丸含咽津日三四服蛤蚧丸治癭氣腫塞蛤蚧全者醉炙一對真珠末海藻洗去鹹焙各一分右為末棗肉為丸如桐子大每服二十丸木通湯下麥門冬治癭腫悶麥門冬去心焙昆布洗去鹹焙各三分黃耆焙大黃銼一蒸陳橘皮湯浸去白焙杏仁湯浸去皮尖雙仁炒甘草炙銼各一兩右為末煉蜜為丸如彈子大每服一丸含化治癭氣胸膈壅塞咽喉漸粗冝服羊黶一百枚去脂炙大棗二十枚去皮核右同杵作丸梧桐子大每服水下七丸治癭氣令內消方用黃牛食系三具乾者於瓷瓶中以瓦子蓋頭鹽泥固濟候乾燒令通赤待冷取出細研為散每於食後以粥飲調下一錢海藻酒方治咽喉噎塞冷氣妨悶結成癭氣用海藻洗去鹹二兩細銼以清酒四升浸兩宿漉去滓每服半盞細細含咽日三不拘時以差為度治癭氣結核癗腫􅀈用昆布一兩洗去鹹搗為末每以一錢綿囊於醋中浸含咽津藥末盡再含之一方蜜丸含化自消治癭氣結硬腫大諸藥無效服之百日必得全差方黃牛食系五具以猛炭灰火暍為灰研為末於瓷瓶內放蜜蓋瓶口不得見風海藻五兩昆布五兩以上二味以清水漬五日旋換清水洗去鹹味暴乾白殭蠶五兩微炒右為末散入牛食系末研令勻每服以溫酒調下二錢日三服以差為度治癭氣結腫方昆布洗去鹹味馬芹子半兩茵芋半兩蕪荑仁半兩蒟醬半兩右為末以醋浸蒸餅和丸如小彈子大以綿褁一丸含化咽津日四五服以差為度治癭氣咽喉腫塞心胸煩悶琥珀半兩皂莢子仁微炒牛蒡子右為散每服食前以䓤白湯調下二錢通氣丸治咽喉氣悶胸膈滿塞項頸漸粗木通銼海藻洗去鹹味炙乾海蛤研各一兩昆布洗去鹹味炙乾一兩羊黶二十枚炙黃切右為末煉蜜和丸如彈子大每服一丸含化忌生菜熱麵炙肉蒜笋羚羊角丸治癭氣胸悶壅塞咽喉漸粗宜服大效羚羊角屑一兩昆布一兩洗去鹹味桂心一兩大黃一兩銼微炒木通一兩銼右為末煉蜜為丸如梧桐子大每服不計時以粥飲下二十丸治癭氣經久不消神效方海帶一兩海藻昆布各一兩洗去鹹味右為末煮赤小豆并棗肉同研為丸如小栗子大以綿褁每月如大盡取二十八日夜小盡取二十七日至月終三夜臨卧時淨灌潄含卧咽津不語至明别日不得服松蘿丸治癭氣結核癗癗腫硬松蘿昆布洗去鹹味木通銼桞根鬚逆水生者洗焙乾以上各二兩右為末煉蜜和搗三二杵丸如小彈子大常含一丸細細咽津令藥在喉中相接為妙瘤附論瘤之為義留滯而不去也氣血流行不失其常則形體和平無或餘贅及鬱結壅塞則乘虗投隙瘤所以生初為小核浸以長大若杯盂然不癢不痛亦不繼強方劑所治與治癭法同但癭有可針割而瘤慎不可破決爾儒門事親書云戴人在西華衆皆訕以為吐㵼一日魏夀之與戴人在食肆中見一夫病一瘤正當目之上納皆色如灰李下垂覆之目暗不能視物戴人謂夀之曰吾不待食熟立取此瘤魏未之信也戴人曰吾與爾取此瘤何如其人曰人皆不敢割戴人曰吾非用力割别有術焉其人從之乃引一小室中令晚卧一床以繩束其眶刺委中人出血先令以手揉其自瘤止亦刺出雀糞立平出户夀之大驚戴人曰人之有之技可盡觀手部戴人之鄉有一女子未嫁年十八兩手背皆有瘤一類雞距一類角丸腕不能馴向明望之如桃膠然夫家欲棄之戴人見之曰在手皆為膠瘤在面者為粉瘤此膠瘤也以扉針十字刺破按出黃膠膿三兩匙立平核更不復作婚事復成非素明不敢用此法耳外臺祕要時後云皮肉中忽有腫起初如梅李漸長大不癢不痛又不堅強按之揉軟此血瘤也不療至如盤大則不可消而非殺人病耳亦慎不可破方乃有大療今如覺但依癭家療療若不消更别有大方陷腫散治二三十年瘤及骨瘤肉瘤膿血瘤瘜肉大如杯盂久不瘥致有癰潰令人骨消肉盡或潰令人驚愓寢寤不安身體瘈縮愈而復發冝服此方烏賊魚骨半兩燒灰硫黃半兩細研白石英分半兩鍾乳分半兩丹參三分琥珀末二兩附子一兩炮製去皮劑乾薑一兩炮製銼大黃一兩川芒硝二兩右為散以囊盛勿泄氣若瘡濕即乾傅之若瘡乾以豬脂和傅之日三四以上效為度若消不盡者至五劑十劑止藥令人之不痛若不消加芒硝二兩一方有紫石英治癭腫悶冝服此大黃二兩銼鹹炒昆布一兩洗去鹹味海藻二兩洗去鹹味玄參一兩枳殼一兩麩炒微黃去穰芎藭一兩杏仁一兩湯浸去皮尖雙人麩炒微黃延胡索一兩琥珀一兩右為末煉蜜和丸如梧桐子大每服以木通湯送下二十丸枯瘤方砒硼砂黃丹雄黃粉霜輕粉以上各一分班貓二十箇生用硃砂一錢乳香沒藥一錢右同研為末粥糊為丸揑作碁子樣曝乾先炙破瘤頂三炷然後以藥餅蓋上用黃水末以水調貼上數日自然乾枯下落餅金散治枯瘤子砒霜一兩砒黃腳一兩巴豆半兩去皮出油木鱉子一兩去皮研如泥右同為細末入石腦油和一塊用紙二十四重裹藥磁合內盛入地二尺埋兩箇月取出隂乾後入輕粉一錢雄黃半錢粉霜二兩乳香一錢沒藥二錢蟾酥一錢右同前藥研為細末先放瘤子頂上炙三炷唾調塗之上用紙封三重每日上次先藥休去了金黃散作定子瘤子破了用此藥任在四邊自落薑酒下早晚各一丸如小腸氣三丸切生薑三錢炒焦酒下如傷酒二丸飛白礬生薑自然汁調下婦人心氣痛醋湯下二丸紫蘇子膏治項氣成瘤方見本門氣癭類生肉膏治癰瘤潰漏及金瘡百瘡方當歸附子甘草白芷芎藭各一兩薤白生地黃右咀㕮以豬脂三升半煎白芷黃去滓稍以傅之三日蔓荆實丸治瘤蔓荆實去白皮炒一兩甘草炙銼一兩羊黶二十枚去脂膜别搗白斂半兩椒目一分小麥麵微炒一兩昆布黃耆湯一名麥門冬丸治瘤腫方見癭瘤咽喉噎塞本類右將五味為末與羊黶末相和以好醬更搗丸如梧桐子大每服酒下五丸消毒散治毒氣項下結核成為瘤者皂角子五百枚慢火炒烈薄荷乾者二兩檳榔銼半兩甘草炙銼連翹各一兩右為散每服二錢匕食後臨卧米飲調下臘茶亦可深思療瘤脂細瘤方吳茱茰一分礬石燒芎藭當歸大黃黃連芍藥白斂黃芩右合搗下篩和和雞子塗著細故布上便瘤大小薄厚貼之燥輒昜之著藥當熟作膿貼細細從孔中出探之知膿血盡著生肉膏若膿血不盡後起故也繫瘤子自落方砒黃砒霜硼砂各半兩巴豆五粒去皮心芫青去翅足七枚班貓去頭足翅七枚右研為末先取蜘蛛網及絲共搓為線子水濕塗藥末於上貼子中常以藥末養遇有患者以線繫之留線頭如癢即繫之如痛即不用繫其瘤自黑乾如胡桃大者三四日自落如茄子大者半月落更大者不過二十八日如瓜者不過一月如血瘤繫之血出者服定血藥燕服藥治之黃芩散治諸瘤血出黃芩去黑心黃蘗去粗皮銼黃連去鬚鬱金各半兩右為散入寒食麵五錢匕水調貼之小黃膏治瘤黃蘗黃芩大黃各等分右為末以水調為糊比枯瘤藥大一遭塗之三日一昜至八九上不取直候可取治小瘤方先用甘草煎膏筆蘸粧瘤四傍乾後復粧凡三次以藥大戟芫花甘遂右等分為末米醋調别筆粧傳其中不得近著甘草處次日縮小又以甘草膏粧小暈三次中門仍用大戟芫花甘遂如前自然焦縮凡膏瘤肉瘤膿瘤血瘤石瘤皆不可決惟脂瘤決去其脂粉則愈蓋六種瘤尤不可治治則殺人信一兩硫黃一兩井泉石二兩玄精石一兩右將藥研作小塊入砂鍋內赤石脂并鹽泥固濟勿令透氣乃入於文武火內燒煙盡取出放在地上冷定取藥後入輕粉一錢乳香二錢硼砂二錢沒藥二錢雄黃二錢右同研為細末用蒸餅心和為小錠子在四邉為效治瘤贅如破者用藥一餅安破處漸漸腐化去之不破者用針挑動用藥信五錢研硫黃五錢研白丁香四錢班貓十六箇去頭足巴豆十六箇去殼油雄黃四錢輕粉右為細末用油餅邉和丸如彈子大揑作餅子龍膽丸治氣瘤龍膽去蘆頭炙一兩昆布洗去鹹味炙海藻洗去鹹炙各二兩馬刀研海蛤研香草各半兩大黃銼炒一分右為末煉蜜為丸如梧桐子大用破日綿褁一丸朝暮含咽之白頭翁丸治氣瘤方見本門氣癭類二色丸治一切腫赤皮膚毒及瘤天南星半夏甘遂大戟各三錢乾薑胡椒桂􅒝撥各三錢代赭石一兩大黃生用右取前四味以漿水一升煮水盡為度晒乾餘六味同搗為末每用一錢巴豆三枚燒得𦦨起盞合却候冷每一錢藥一處研更用醋一盞煎成膏共藥同丸如菉豆大丸分兩處丹砂為衣一用膩粉為白衣此兩等顔色白者或揑作餅子亦可用治瘤子每服一丸生薑湯下神效散治項氣瘤結附贅日漸增長豬羊黶各三十枚旋入鹽膳內焦過今人乾只用鹽亦得陳皮去白焙炒一兩右為散每服二錢匕空心米飲下初結不過數服覺消不用久服治瘤雄黃一錢人言一錢一分右研為細末稀粥糊調藥攤在瘡頂兒上用針針破用貼藥紙封治白瘤方白礬硫黃等分右為末以醋和封止治候子獨掃子本草名地膚子白礬右等分為末煎湯洗不數次即盡去陳郎中親曽用之果然枯瘤方用銅碌為細末刺破瘤摻在上以膏藥貼之南星膏治皮膚頭靣生瘤不可輒有針炙大者如拳小者如栗或軟或硬不疼不痛冝服用生南星大者一枚去土薄切細研桐粘為膏滴好醋五七滴如無生者以乾者為末投醋研為膏先將小刺病處令氣透以藥膏攤紙上像瘤大小貼覺癢三五昜瘥繫瘤法兼去鼠妳痔用芫花根淨洗帶濕不得犯鐡器於木石器中揭取汁用線一條浸半日或一宿以線繫定經宿即落未落再換線不過兩次自落後以龍骨并訶子末傳瘡口即合依上法繫鼠妳痔纍用得效繫瘤法蘇沈良方亦有用蜘蛛者然費力也不如此徑捷如無根只用花泡濃水浸線亦得昔趙氏嘗用以繫腰間一瘤不半日即落亦不痛治果報靣生贅瘤用艾圓炙十壯即用醋磨雄黃塗紙上剪如枼螄奄子大貼所炙處更用膏藥重貼二日一換候癢搔出膿如菉豆粉即愈治瘤方用舊牛皮洗煎凍常食之瘤若破如豆腐極臭治瘤方用鹿草鹿二種肉剖如厚脯炙令熱榻掩一日四炙四昜痛攬出膿便愈不除更炙新肉用之良治瘤用人精一合半亦得青竹筒盛火上燒炮之以器蒸取汁蜜置器中數傳瘤上良萞麻子方治大人小兒項下結核漸成癭瘤用􅒝麻子炒黃風中吹乾每服溫湯下一枚不拘時候日服三五枚服之五日後搗玄參為散食後溫米飲調下一錢匕與萆麻相間服三日後依前只服􅒝麻五日後却與玄參同服三日周而復始繫瘤方用稻上花蜘蛛十餘枚置桃李枝上候絲垂下取東邉者撚為線子繫定子七日候換瘤子自落昔人病瘤如拳大以此繫之至三換瘤子遂乾一夜忽失所在天明於枕邉得之如一乾栗又方用狗屎拌雞子傅之去濃水如前方説傅生肉膏取瘥治肉瘤先將麻布擦令血熱方上藥大者用藥四五次小者用藥三四次以致根頭不痛有巨暈即止辨瘤數種於後軟筋瘤帶經絡垂畨花瘤形如石榴花米瘤肉如米粉瘤肉如粉肉瘤色紅茄子瘤氣瘤肉實骨瘤硬實血瘤色如繫茄軟自沺瘤擦開如牛血右十般瘤子惟有七般可醫如軟瘤畨花瘤并自有破者不可療用藥之際切須審察贅瘤方用錦紋大黃醋磨塗瘤上漸消白瘤方令先極搔刮以繩縛之即愈又取東向木空中水熟刮瘤上洗之凡一日三即愈治身上生贅肉用海藻為末傳仍煎海藻酒服之則去治贅瘤用茄子咬去蒂於贅瘤上擦千百遍以茄撇於地上茄若爛瘤平復矣平復以點贅瘤法凡剪去薄皮以藥點之痁落即去大者內捻出一肉片子仍須擦令血熱方可用藥治候子用濃研好京墨筆抹在候子上候乾更抹以多為妙數次即失去又方用買路紙不令人見揩後密藏撇於路上街磚下紙爛則疾愈矣又方用青柴燒出水搽之治流腫悶方羊黶一兩乾者青橘皮一兩湯浸去白焙燒銀沙鍋一兩右為末用糯米飲和丸如梧桐子大每於食後以木通下二十丸井金散枯瘤􅊓大有神效土黃二錢雄黃二錢硼砂二錢研粉霜一錢輕粉一錢乳香半錢沒藥半錢右為細末假令瘤子如胡桃許用藥末少許半用津唾調稀糊得所攤去瘤子項上如小不許唾津濕紙花兩重蓋之後用黃龍膏蓋之間且度上藥次添藥徹的周回大韭葉如比之上無徒漸瘤斬之後根銀自然有動隨後然下來一方入麝香少許黃龍膏用黃蘗一味為細末唾調攤去紙上生肌青龍散訶子皮髙茶龍骨右等分為細末乾摻上做土法砒黃另為末三兩木鱉子用半兩去殼巴豆半兩不去油硼砂另為末二兩右砒黃一處為末後用木鱉子同石腦油和成一塊油紙褁定埋於坑內四十九日取出收於磁器盛劈作小塊枯瘤子藥方桑柴灰二碗膩白石灰三碗朽木三兩乾桑耳三兩草烏頭半斤川烏頭四兩右朽木等四味燒灰作性同煎桑柴灰勻用水一桶淋汁如法殼火成膏用之治頭靣生瘤子用蛛絲勒瘤子根三二日自然退落治宿肉贅瘤右以􅀈􅀈燒為末和臘月豬脂傅之治癭根瘤贅瘜肉右用博落迪和百丈青雞桑灰為末傅之治繫指并贅瘤方右以花蜘蛛網絲於黃丹中飬之繫指與瘤夜至旦自下釘棺木斧聲去人身上努肉可候有候時専聽其聲聲發之時便下手速捻二七遍已後自得消平也産婦勿用普濟方卷二百九十四
