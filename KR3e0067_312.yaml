body:
  text: 普濟方卷三百十二明周王朱橚撰折傷門從髙墜下附論黃帝曰中風有所墮墜惡血留內若有所大怒氣上而不行下積於脅則傷肝又中風及有所擊仆若醉入房汗出當風則傷脾又頭痛不可取於腧者有所擊墮惡血在內傷痛未已可則刺不可逺取之也夫從髙墮下惡血留於內不分十二經絡聖人俱作風中肝經留於脅下以中風療之血者皆肝之所主惡血必歸於肝不問何經之傷必留於脅下蓋肝主血故也痛甚則必有自汗但人有汗出皆為風證諸痛皆屬於肝况敗血凝結從其所屬入於肝也從髙墜下逆其上之血氣非肝而何非傷寒無汗既自汗必是風化也以破血出經藥治之夫肝膽之經俱行於脅下經屬於厥隂少隂宜以柴胡為引用為君以當歸活血脈又急者痛也甘草緩其急亦能生新血陽生隂長故也為臣川山甲栝蔞根桃仁紅花破血潤血為之佐大黃酒製以蕩滌敗血為之使氣味相合使血氣各有所歸痛自去矣方蒲黃散出聖惠方治從髙墜下落馬墜車碾著腕損骨碎筋傷內損惡血攻心悶絶坐臥不安宜先須按摩排正筋骨宜服此藥止痛散血蒲黃一兩當歸三分玄胡索一兩芎藭三分赤芍藥一兩淹䕡子三分沒藥一兩附子一兩炮裂去皮臍栗子二兩去殼隂乾川大黃一兩銼碎微炒藝臺子一兩右搗羅為散每服以溫酒調下二錢不拘時候頻服沒藥散出聖濟總録治墜墮損傷筋骨皮肉發熱疼痛沒藥研澤瀉切焙桂去粗皮檳榔甘草炙銼白芷蜀椒去目并閉口者炒出汗附子炮裂去皮臍芎藭各一兩當歸三分右為散每服三錢溫酒調下不拘時候鎮心散出聖惠方治因傷折後驚悸心神煩悶宜服定魂魄虎睛一對用生羊血浸一宿漉出隂乾金箔銀箔各五十片細研茯神逺志去心人參去蘆頭各半兩麥門冬去心焙蒲黃羚羊角屑各一兩硃砂二兩細研水飛過右為末用棗肉入煉蜜同和搗三五百杵如梧桐子大每服於食後并夜臥時以茯神湯下三十丸續斷散出聖濟總録治從髙墜下傷損筋骨發熱腫痛續斷銼生乾地黃焙當歸切焙芎藭附子炮裂去皮臍桂去粗皮各一兩澤蘭葉蜀椒去目并閉口者炒出汗甘草炙銼各半兩右為散每服三錢溫酒調下不拘時候破血散痛湯治從髙損傷墜馬惡血流於脅下痛甚不能轉側妨其飲食羌活防風中桂各一錢柴胡連翹各二錢當歸稍二錢麝香少許别研蘇子一錢半一方無水蛭炒去煙盡另研右分為二服每服酒二大盞除水蛭麝香外另研如泥煎餘藥依一大盞去滓上火令稍熱調二味飢服之乾地黃散治從髙墮下傷損疼痛生乾地黃一兩當歸一兩銼微炒附子一兩炮裂去皮臍川大黃半兩續斷半兩桂心一兩琥珀半兩枳殼半兩麩炒微黃去穰桃仁一兩湯浸去皮尖雙仁微炒右為細散溫酒調下一錢不拘時候芎藭散治從髙墜下車馬諸傷腕折疼痛不可忍芎藭玄胡索桂肉去粗皮桃仁湯浸去皮尖雙仁微炒附子炮去皮臍各一兩澤蘭半兩虎脛骨二兩塗酥炙黃右為細末溫酒調下二錢不拘時候大膠艾湯治男子傷絶或從髙墜下傷五臟微者唾血及金瘡傷經者阿膠艾葉甘草當歸芎藭各一兩乾薑一兩乾地黃芍藥各三兩右以水八升煮取三升去滓內膠令煬分服羸人分三服兼治婦人産後崩傷下血過多虛喘欲死腹中激痛下血不止復元活血湯治從髙墜下惡血流於脅下及疼痛不可忍柴胡五錢當歸三錢甘草川山甲炮紅花瓜蔞根各二錢大黃酒浸一兩桃仁去皮尖五十粒右桃仁研爛餘藥銼如豆大每服一兩水二盞半酒半盞煎至七分去查溫服食前以利為度得利後痛或不盡服乳香神應散方見本類後黃帝針經云有所墮墜惡血流內若有所大怒氣上而不行下積於脅則傷肝肝膽之經俱行於脅下經屬厥隂少陽宜以柴胡為引用為君以當歸和血脈又急者痛也甘草緩其急亦能生新血甘草生血陽生隂長故也為臣山甲瓜蔞根桃仁紅花破血潤血為之佐大黃酒製以蕩滌敗血為之使氣味和合氣血各有所歸痛自然去矣接骨丹治從髙墜墮傷損疼痛當歸切焙二兩甘草銼炒三兩桂去粗皮一兩半沒藥另研乳香另研各半兩澤蘭一兩自然銅火燒紅淬七次一兩研右為細末入研藥令勻水麵糊和丸如梧桐子大每服三十丸溫酒調下不拘時候日進三服牽牛子散治從髙墜下傷折有瘀血不散脅肋疼痛牽牛子生取末當歸切焙各一兩檳榔銼桂心去粗皮木香炮各半兩郁李仁湯浸去皮細研青橘皮湯浸去皮白各一兩右為散和勻每服一錢空心溫酒調下取瘀血為效外以敗龜膏貼方見本類後附子散治從髙墜下落馬車碾一切傷折理血止痛附子炮裂去皮臍沒藥蒲黃當歸芎藭薑黃赤芍藥已上各一兩右為細散溫酒調下二錢不拘時候接骨草散治從髙墜下損骨折筋傷肉接骨草巴戟各二兩紫葛根銼石斛去根銼丁香續斷阿魏麵裹煨麵熟為度已上各一兩右為細散溫酒調下二錢不拘時候沒藥膏治從髙墜下傷損筋骨打破皮肉疼痛沒藥當歸銼微炒麒麟竭蒲黃牡丹皮骨碎補橘仁微炒各一兩右為細末以溫酒調下二錢不拘時候葵根散治從髙墜墮損折車碾馬墜筋骨蹉跌甚者大小腸不通皆被瘀血與衛氣不和致令不通葵根一兩木通蘧麥川大黃銼碎微炒各二兩甘草炙赤銼半兩鹿蔥葉并根一兩右搗粗羅為散每服四錢以水一盞煎至六分去渣不拘時候溫酒調下滑石末一錢桃仁湯治從髙墮下落大木車馬間胸腹中有血不得氣息者桃仁四十枚大棗二十枚大黃硝石甘草各一兩蒲黃一兩半右㕮咀以水三升煮取一升絞去渣適寒溫盡服之當下下不止漬麻汁一杯飲之即止乳香神應散治從髙墜下疼痛不可忍及腹中疼痛者乳香沒藥雄黑豆桑白皮獨科栗已上各一兩破故紙炒三兩右為末每服五錢醋一盞砂石器內煎至六分入麝香少許溫服巴戟湯治從髙墜下及打撲內損昏冒嗜睡不能飲食此謂血閉及臟腑不通巴戟去心半兩當歸地黃芍藥川芎各一兩大黃半兩右為粗末水煎服以利為度桃仁散治從髙墮下傷損腹中瘀血滯疼痛桃仁半兩湯浸去皮尖生研細當歸一分搗末牽牛子半兩生搗琥珀末一分膩粉一分右研令勻分為三服生地黃二兩生薑一兩切細炒令紫色入小便一小盞酒一大盞煎至一大盞去滓空心調下一服當取下惡血疼痛立定藝臺散治從髙墜下墮損惡血在骨節間疼痛荆芥藕節隂乾各二兩淨藝臺子馬齒莧隂乾川芒硝各一兩右為細末用蘇枋木半兩酒一大盞煎至七分調下二錢不拘時候敗龜膏治從髙墜下傷折有瘀血不散脅肋疼痛一名靈龜膏敗龜酒浸炙二兩半大黃生銼一兩木鱉子去殼研二兩當歸切焙一兩桂去粗皮二兩右為末好酒一升煎至半升住火稍冷入藥末半兩以栁木椑不住手攪成膏以油單紙上攤貼傷損痛處立效阿膠湯治從髙墮下傷五臟微者唾血甚者吐血及瘡經傷金崩中皆主之阿膠艾葉乾薑各二兩芍藥三兩右㕮咀以水八升煮取三升去滓內膠令稍冷分二服羸人分三服兼治女人産後崩傷下血過多虛喘腹中絞痛下血不止者服之悉愈蒲黃散治因墜墮內損血結不行蒲黃當歸切焙赤芍藥銼桂去粗皮各一兩右為細末每用二錢溫酒調下不拘時候接骨散治從髙墮下遂至傷折筋斷骨碎痛不可忍接骨續筋止痛活血方見本門接骨類一名神授散奪命散治金瘡打損及從髙墜下木石所壓內損瘀血心腹疼痛大小便不利氣絶欲死大黃黑牽牛皮各二兩水蛭石灰漫火炒令焦黃色半兩右為末每服三錢熱酒調下如人行四五里再用熱酒調牽牛末二錢催之須臟腑轉下惡血成塊成片其惡血淨即愈當歸湯治從髙墜墮傷損肢體發熱疼痛當歸切焙四兩大黃生銼二兩生乾地黃焙五兩右粗搗篩每服五錢水一盞半煎至七分去滓溫服不拘時候立效蘇合香丸治從髙墜下挾驚悸血氣錯亂昏迷不省急服大效方見諸氣門沒藥散治被重物壓砟傷筋骨疼痛血不散沒藥虎脛骨塗酥炙黃當歸銼微炒玄胡索各二兩補骨脂白芷生乾地黃微炒川大黃銼微炒蒲黃微炒獨頭栗子黃乾者各一兩右為細末不拘時候以溫酒調下二錢藝臺子散治壓砟傷損筋骨或墜墮內損瘀血攻心腹脹滿悶亂下惡血藝臺子沒藥蒲黃膩粉各一分水蛭七枚炒令微黃生薑汁一合酒二合生地黃汁四合川大黃半兩銼碎微炒右除汁藥外為細末研入膩粉令勻先將地黃生薑等汁及酒同煎三兩沸調藥散二錢空心服之當轉下惡血疼痛立止矣桃仁散治被壓損瘀血在腹中㽱痛不散心胸短氣大小便不通荆芥半兩大黃生用蒲黃各二兩芎藭木通當歸桂各一兩桃仁四十枚湯浸去皮尖麩炒右為細末每服二錢酒調下不拘時候微利為度又方出聖惠方治壓傷損筋骨或墜墮內損瘀血攻心腹脹滿悶亂下惡血水蛭七枚炒令微黃硇砂三分膩粉二分研入虻蟲七枚去翅足炒微黃乾漆半兩搗碎炒令煙出竈突墨半兩右為細末不拘時候以溫酒調二錢又方出肘後方治被砟墜墮骨斷車碾馬踏牛觸胸腹破陷四肢摧折氣悶欲死以烏雞一隻合毛杵一千二百杵好苦酒一升相和得所以新布拓病上取藥塗布乾再易覺寒振欲吐不可輒去藥須臾復上一隻少則再作并以地黃酒佳荆芥湯出聖濟總録治墜墮損煩悶方見本門傷墮吐唾出血類蒲黃散出千金方治從髙墮下有瘀血蒲黃八兩附子一兩右為末酒服方寸匕日三服不止增之以意消息導滯散出聖惠方治傷重物壓砟或從髙墜下作熱五內吐血不禁或瘀血在內胸腹脹喘粗氣短崩中當歸大黃或加桃仁或蘇木或芒硝亦可如大便實可加大黃半兩别後下右等分炒為末溫酒調下每服二錢不拘時候或㕮咀水酒各一盞煎一盞空心服雞鳴散出醫方大成治從髙墜下及木石所壓凡是傷損瘀血凝積氣絶欲死并久積瘀血煩躁疼痛呌呼不得並以此藥利去瘀血即愈推陳致新治折傷神效大黃一兩酒蒸杏仁三七粒去皮尖應驗加紅花一錢當歸二錢右研細酒一盞煎至六分碗濾去滓雞鳴時服次日取下瘀血即愈若便覺氣絶不能言取藥不及急擘開口以熱小便灌之麝香散一名接骨散出肘后方治從髙墜下及打撲損傷麝香水蛭各一兩右用水蛭銼碎炒煙出研為末入麝香再研勻每服酒調下一錢當下蓄血未效再服又治折傷用水蛭熱酒調一錢食頃知痛更進一服痛止便將折骨藥封直至安平方去地黃糟裹方出聖濟總録治墜墮撲損筋內疼痛瘀血凝滯腫熱不消生地黃洗切細杵酒糟各一斤右拌和令勻隨腫處用藥逐旋以大碗盛甑上蒸熱用布絹之類裹腫處日一易桃仁散出聖濟總録療從髙墜下傷內血在腹聚不出療下血方好大黃二兩桃仁三十枚去皮尖及雙仁者右搗以水五升煮取三升分為三服去血後作地黃酒服隨能服多少益血過百日成微堅者不可復下之虛極殺人也或用酒一碗煎去滓服之治從髙墜下或打撲損傷腰脅心痛出危氏方用木香調氣散加紅麯末少許童子小便同酒調空心熱服如無麯酒亦可治破血從髙墜下損瘀在腹刺痛出本草以蒲席可常用此令卧破敗者良取蒲黃赤芍藥當歸大黃朴硝煎服一方蒲席燒灰二錢酒服橘子酒出聖濟總録治墜墮打撲閃肭腰痛惡血蓄瘀痛不可屈伸以橘子炒去皮破細每服二錢酒調未止再作或用豬腰子一隻去筋膜破開入藥用蔥白茴香鹽濕紙裹熟煨細嚼溫酒下一方治氣滯腰痛橘核炒香研酒濾去滓下青木香丸一方橘核入大蒜內濕紙裹煨令香熟酒吃一半盞研爛入少炒麵為丸用蒜白炒酒吞下俱治風氣腰痛及肭閃腰痛豆汁方療足痛從髙墜下瘀血脹心面青氣短欲死用大豆或小豆令熟飲汁數升和酒服之一方以大豆五升水一斗煮二升去豆服令盡或黑豆炒熟水煎服即蘇加芎歸芍藥酒煎更妙又方出朱氏集驗方治墜墮腕折瘀血留滯衄鼻吐血用生地黃搗取汁服一升或二升尤佳一方用米醋調傅瘡上又方出本草治從髙墜下瘀血脹心面青氣短者用烏鴉翅羽二七枚燒末酒和服如吐血即見效如得左翅羽尤佳又方出聖惠方療從髙墮下若為重物所頓管得瘀血用䜴三升沸湯二升漬之食頃絞去滓內蒲三合投中攪調頓服之不過三四服神良雞鳴散出三因方治墜墮欲死兼打撲悶絶者急以手袖掩其口鼻一食頃眼開先與熱小便服若覺氣絶不能言急擘開口以熱小便灌或以酒小便服火傷冷小便灌皆能起死甚驗治為重物所頓欲死出十便良方以半夏如大豆者為末內鼻孔中此療五絶法五絶一曰溺絶二曰牆壁所絶三曰壓絶四曰自縊絶五曰産乳絶並可用內鼻孔立活雖經一日而心溫者亦可救竹皮湯出十便良方治為兵杖所加木石所血在胸背及脅中痛不得氣息青竹刮取茹亂髮各如雞子大二枚右放炭火炙焦燥合搗篩以酒一升煮三沸上一服盡之三服愈治從髙墜下傷損筋骨疼痛呌喚不得瘀血著在內出本草以鼠屎燒為末以豬脂和傅痛上急裹不過半日乃止苦杖散出保命集方治從髙墜下涎潮昏冒此驚恐併也以苦杖不拘多少為細末熱酒調下如産後瘀血不散或聚血皆治之療壓撲損傷出本草搗胡桃肉和酒溫頻服便瘥治人忽被墜腸出出本草以冷水噴之令身噤腸自入也治墜撲內損散敗血止痛及惡瘡發背等出本草以重陽日收取茄子百枚去蒂四破切之硝石十二兩碎搗以不津器皿大小約可盛內茄子者於器中先鋪茄子一重乃下硝石一重覆之如此令盡然後以紙數重密封之安置淨處上下以新磚墊覆令得地氣不犯地氣至有五月後取出去紙兩重日中暴之逐日如此至二三月度已爛即開瓶傾出濾出滓别入新器中以薄紙蓋頭又暴直成膏乃可用內損酒調半匙空腹飲之再惡血散則痛止而愈矣諸瘡腫亦先飲酒半匙又用膏於瘡面塗之當覺冷如氷雪瘡乾便瘥其有根本在膚腠者亦可內消若膏久乾硬即以飯飲化動塗之整骨丸出楊氏家藏方治從髙墜下筋斷骨折內外皆損疼痛難忍不問輕重並皆治之白礬一十二兩飛過黃蠟六兩黃丹蜜陀僧另研自然銅另研為末已上三味各四兩乳香另研硃砂沒藥另研已上三味各一兩豬脂一十二兩臘月者右件用銀石器或新鍋內先下豬脂熬成膏去筋膜滓次下蠟候鎔退火候稍冷方下蜜陀僧黃丹自然銅末添慢火熬以栁木箆子攪候滴入水不散為度擡下鍋子於冷地上入硃砂乳香沒藥白礬更以箆子攪勻丸如梧桐子大每服二十丸熱蔥酒送下蔥白切如絲於熱酒中以盞合少時勿出氣如昏困不能咽藥者即用蔥酒化開灌下仍將二三十丸切開於紙下以火炙之如不化入油少許隨所傷大小攤成藥靨恐此藥不黏以雲母膏塗靨周圍貼之良久痛變成癢若骨碎及蹉跌者並皆平正不成蘆節其傷破處便生肌肉多年傷折每遇隂晦發作疼痛者亦可服不拘時候又方出永類鈐方用水蛭茴香各一兩先以茴香三錢同水蛭炒去茴香又以茴香七錢微炒共為末用水煎蘇木加酒和調烏藥順氣散一帖作三服又法硇砂水蛭竹膜絲頭四味將砂炒蛭去砂用蛭為末竹絲燒灰和蔥酒調服治從髙墜下瘀血脹心面青氣短欲死者用飛駮鳥味甘寒翅羽七枚燒末酒服之得右翅者最良飛駮鳥即雄鵲也若燒作灰以右接中散解者是雄也又燒毛作屑內水中沈者是雄也又其翼左覆者是雄又方用韶粉味辛寒一錢匕和水服之即瘥治從髙墜下頭破腦出血中風口噤用黑豆味甘平一升炒去腥勿使太熟杵末蒸之氣遍令甑下盆中以酒一升淋之溫服一升覆被取汗傅膏瘡上墜車落馬附論夫或因乘車馬或登陟危險誤多倒仆輕則蹉跌筋脈蹴損不得伸屈甚者乃至踒折筋骨治宜速以養血脈續筋骨之劑服之則其效速矣方乳香烏龍丹治落馬墜車打撲閃肭損傷筋骨疼痛悶亂活血止疼及中風癱瘓口眼喎斜婦人血風腰腹四肢走注痛痺等疾骨碎補葫蘆巴炒破故紙炒川烏炮去皮臍蓯蓉酒浸牛膝酒浸金毛狗脊牡蠣燒赤甜瓜子炒黑牽牛赤芍藥自然銅燒赤醋蘸七次川楝子茴香炒牡丹皮五靈脂白芍藥各一兩蒼术二兩去皮炒官桂半兩細墨七錢木鱉子七箇沒藥二錢半乳香二錢右為細末研勻醋麵糊丸如梧桐子大每服七丸至十丸溫酒下日三服神聖膏出德生堂凡跌傷後用此藥敷貼仍服後藥赤小豆木鱉子去殼另研萆麻子去殼另研羌活薑黃草烏血竭大黃知母白芷川烏白芨白蘞防風各一兩右為細末和勻隨病大小用好米醋密調敷傷損處乾再敷即痛止骨接當歸散出德生堂治落馬墜車傷損當歸桂心川椒附子各二錢澤蘭一錢芎藭六錢甘草五錢沒藥乳香各二錢半另研右為細末每服二錢溫酒調病上食後服病下空心服三日筋骨相連二十日痊可止痛虎骨散出聖惠方治馬墜傷損虎脛骨三兩塗酥炙微黃敗龜塗酥炙微黃當歸銼微炒陽起石酒煮半日細研骨碎補自然銅細研赤芍藥甜瓜子沒藥薑黃各一兩右為細末每服以暖酒調下二錢日三四服芍藥散治倒仆筋脈蹴損方見本門閃肭類芎藭湯出聖濟總録治墜墮倒仆蹴損筋脈芎藭一兩半澤蘭取葉一兩生乾地黃焙三分桂去粗皮半兩附子炮裂去皮臍牛膝酒浸切焙各一兩蜀椒去目并閉口者炒出汗右銼如麻豆大每服三錢水酒共一盞煎至七分去滓溫服不拘時候槐子煎出聖濟總録治倒仆諸筋蹴損槐子炒為末用酒一升浸一宿桂去粗皮秦芁去苗土白术銼炒續斷附子炮裂去皮臍各一兩右除槐子外搗為粗末將槐子酒先煎次入豬脂半斤再煎沸入藥末再煎熱絞去渣磁合盛每服一匙溫酒調服不拘時候虎骨散出聖濟總録治倒仆蹴損筋骨疼痛虎骨酥炙别為末一兩酒一升生地黃汁一升右將地黃汁并酒煎沸入虎骨末同煎數沸每服一盞溫服不拘時候當歸湯出聖濟總録治倒仆蹴損筋骨疼痛當歸切焙芎藭各二兩熟乾地黃焙四兩右粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時候地黃酒出肘後方治倒仆筋蹴不得展舒及瘀血不散亦療馬墜生地黃洗切研八兩酒三升右共煎數沸去滓每服一盞溫服不拘時候桃仁地黃酒出聖濟總録治倒仆蹴損筋脈生地黃汁一升酒一升桃仁去皮尖别研一兩右將地黃汁酒煎沸下桃仁再煎數沸每服一盞溫服不拘時候骨碎補散出聖惠方治一切磕損落馬碾著傷折等服之接骨散惡血骨碎補一兩木香半兩蒲黃一兩玄胡索一兩當歸半兩銼微炒桂心芎藭各半兩檳榔一兩右為細末不拘時候以溫酒調下二錢虎骨散出聖惠方治一切磕損落馬車碾失墜傷折疼痛虎脛骨二兩塗酥炙令黃桂心牛膝去苗淹䕡子續斷澤蘭郁李仁湯浸去皮微炒各一兩右為細末不拘時候以溫酒調下二錢赤芍藥散出聖惠方治墜車落馬傷折內損疼痛赤芍藥芎藭桂心各一兩買子木夜合花當歸銼微炒骨碎補各三兩右為細末不拘時候以溫酒調下二錢牡蠣散出聖惠方治墜車落馬傷損筋骨疼痛皮肉破裂出血不止牡蠣一斤濕紙裹後却以水洗更裹候乾用大火燒通赤白礬三兩燒令汁盡黃丹三兩膩粉雄黃細研淨麒麟竭各一兩雌黃半兩細研麝香二錢細研右為細末仍於烈日中攤曬半日後入磁瓶中盛如有墮損及骨折筋斷用生油稠調塗之如已後瘡乾傅之骨碎補散出聖惠方治馬墜車碾踠折呼呌疼痛聲音不絶當歸一兩半微炒銼碎骨碎補牡丹皮虎脛骨塗酥炙令黃白芷芎藭赤芍藥敗蒲燒灰各一兩右為細末每服以暖酒調下二錢日四五服敗龜散出聖惠方治馬墜傷折止痛敗龜塗醋炙全黃虎脛骨塗酥炙全黃牡丹皮赤芍藥熟地黃桂心續斷各一兩當歸一兩半銼微炒右為細末每服以溫酒調下二錢日三四服敗蒲散出聖惠方治馬墜傷損筋骨疼痛內有瘀血腹中㽱刺不可忍敗蒲細銼舊麻甑帶各一橛許細銼用亂髮如雞子大一團火燒灰當歸一兩銼微炒赤芍藥桂心各半兩桃仁四十九枚浸去皮尖雙仁微炒右為散每服四錢以水一小盞煎至半盞去滓不拘時候熱服當歸散出聖惠方治落馬墜車諸傷腕折臂腳痛不止呼呌不絶服此藥呼吸之間一服止痛三日筋骨相連昔公實錢季毅皆曽合以救人當歸炒桂心蜀椒炒出汗附子各二分炮去皮臍澤蘭一分芎藭六分甘草五分右並熬令香篩酒服方寸匕日三丸是傷損皆服之十日愈如小兒被奔車馬所損裂其膝皮內決見骨即絶死小蘇啼不忍聞服之便睡十數日便行走其神驗如此一方有檳榔一兩忌生蔥豬肉冷水菘菜海藻五傷接骨丸治墜馬傷折及閃肭疼痛不可忍方見本門打撲傷損類五骨散出聖惠方治落馬墜車腕折骨碎筋傷壓損疼痛不止鯪鯉項骨獼猴項骨虎項骨黃犬項骨野貓項骨各一兩天雄半兩炮裂去皮臍肉蓯蓉半兩酒浸一宿刮去皺皮炙乾右味骨細銼用酒醋各半升浸一宿漉去炙令黃色候冷入二味藥同為細散每服二錢以溫酒調下不拘時候又將黃米半升作糊入散藥一分調令勻塗貼骨折筋傷處疼痛立止大黃湯出肘後方治墮馬一切筋骨損傷腹中有驚風瘀血煩悶不省人事此藥利大便去驚風或血大黃一兩切浸湯盛下緋帛如手大燒灰用亂髮如雞子大一團燒灰用敗蒲一握三寸桃仁四十九個去皮尖甘草如中指節一段炙銼久用紗單布一尺燒灰右以童子小便量多少煎湯盛內酒一大盞次下大黃去渣三分溫服先銼敗蒲席半領煎湯浴衣被覆斯須通利數行痛楚立瘥利及浴水赤勿怪即瘀血治墜馬撲傷痛不可忍者用仙鼠屎三兩細研以熱酒投之取其清酒服之立可止痛更三兩服便瘥仙鼠屎即蝙蝠屎也療落馬墜車及墜屋坑踒傷身體頭面四肢內外刺痛煩躁呌喚不得臥方出肘後方急覔鼠屎無問多少燒末以豬膏和塗封痛處急裹之仍取好大黃如雞子大以亂髮如鴨子大以人所裁白越布衫領巾餘布以裹髮外乃令火燒煙斷搗末屑以薄酒服日再三無越布可強用常布當預備此物為要緊急用療墜馬內損方取􅂒藥一小兩搗為末牛乳一盞煎五六沸和服或以羊肉汁和服一日內忌菜極效􅂒藥見陳威本草白膏治一切墜落打撲及腫毒疼痛栁白皮切半兩白蠟四錢鉛丹二錢胡粉三兩油四兩商陸根切三分右先以熟油入栁白皮商陸根煎候變色去滓入諸藥數攪良久膏成每用看腫大小以故帛或軟紙攤貼神異立效方治馬墜損傷桃仁四十九粒湯浸去皮尖雙仁爛研川大黃一兩切銼碎微炒敗蒲麻甑帶各一握燒灰亂髮如雞子大燒灰右為散以無灰酒三大盞煎至一盞去滓分為二服食前服沒藥散治馬墜撲損內有敗血㽱刺疼痛不可忍者沒藥末麒麟竭末黃丹微炒白礬燒灰各一分右為細末不拘時候以溫酒調下一錢沒藥雞子酒治墮落車馬筋骨疼痛不止沒藥半兩研末生雞子三枚細酒一升右先將雞子開破取白去黃盛碗內入沒藥以酒暖令熱投於碗中令勻不拘時候溫服治馬墜傷損腰肋疼痛不可忍方益州麻布一尺燒灰細研蒲索一握燒灰細研此索船家名纜索如無即以蒲黃代之川大黃三兩切細如大豆右先以酒一大盞半浸大黃一宿煎三五沸去滓入前藥灰攪勻微溫分為二服如人行三二里再服當利出惡血片效羊腦方治被馬墜損腫疼痛不可忍羊腦一合龜甲一兩半屑生地黃三兩切右以酒醅和搗如泥微熱裹損處冷即易之烏頭散治一切墜馬傷折損者先服此藥然後用手接骨當歸草烏白芷各二錢半右為細末每服半錢至一錢用溫酒調下微麻用手整骨平正方可用藥敷貼患處當歸導滯散治落馬墜車打撲損傷瘀血大便不通洪腫暗傷疼痛昏悶畜血內壅欲死川大黃一兩川當歸一分麝香少許右除麝香另研外為極細末研勻每服三錢熱酒一盞調下食前內瘀血去或骨節傷折疼痛不可忍以接骨類紫金丹服之或以醋煎服亦可治墮車馬間馬鞍及諸物隱體肉斷疼痛方以酢和麵塗之一方如肢體碎折者用小麥粉子炒黃好酒調敷趁熱用杉木夾住一方用小麥和醋蒸之搗爛裹所傷處一方麵和醋蒸裹傷處亦可治墜馬失足或為物所壓痛極不可忍先用香白芷末和降真末等分童子小便和酒調服二錢外以澤蘭同當歸末擂爛微炒盫傷處止痛治墜馬折傷用沒藥一味能推陳置新生好血丸服此皆須研爛以熱酒調下效治墜車落馬筋骨疼痛不止用玄胡索一兩搗羅為散不拘時候以豆酒調下二錢治墜馬拗損疼痛不可忍方以桑根白皮五片為末水一斗煎成膏傅於損處已後終無宿血亦不發動一方用桑根白皮一片以水三大盞酒一大盞煎取一盞去滓以故烏氊可於損處大小揾藥汁裹冷即易之十遍痛止腫消治墜馬撲損用稻稈燒灰用新熟酒未壓者和糟入鹽和淋煎灰取汁以淋痛處立瘥直至骨損亦可淋好糟灰亦得不必新壓酒也摩風膏出聖惠方羌活躑躅花甘菊花當歸烏蛇莽草細辛白蘞各半兩防風去蘆桂心鯪鯉甲各三分附子去皮臍川烏頭去皮臍皂莢去皮子芎藭白芷露蜂房白芨括蔞根紫葛蝟皮杏仁湯浸去皮尖雙仁各一分漢椒一兩半去目苦參一兩蠟五兩豬脂三斤切右細銼以米醋二升拌勻經二宿後以火微微炒之令乾用豬脂和藥以慢火煎一日以綿濾於磁合內盛不令水汚如有傷折處將用摩之挺子膏出聖惠方治傷折麒麟竭沒藥亂髮灰蜜陀僧丁香麝香木香膩粉雄黃雌黃自然銅黑狗肝膽右各一兩細研先於鐺中鎔黃蠟然後入藥末熬鍊成膏取一小竹筒子熱灌之待冷方可取出於黃丹中出色若有患者先以熱水洗病上用生油於漆捺中磨藥塗痛處立效乳香膏治傷折皮肉破冷久不合宜用長肉合瘡口方見膏藥門瘡腫傷折類摩痛膏出聖惠方治傷折筋骨腫痛不可忍細辛去苗葉牛膝去苗各半兩駝脂十兩臘月豬脂十二兩木鱉子去殼丁香别搗為末麝香别研羌活去蘆頭芎藭防風去義附子去皮臍生用括蔞根各一兩右除駝脂豬脂丁香麝香外細銼以米醋二升拌勻經三宿入鐺中抄令乾下駝脂及豬脂等以慢火再煎候諸藥焦黃色即住火用綿濾去滓後下丁香攪勻內磁合中盛傷折處取摩之治為馬墜內損出本草用錦紋大黃一兩杵羅以為末用頭醋半斤同熬成膏丸如梧桐子大患者用溫醋七分盞化五丸服之良久下瘀血長安石史居嘗至通衢有從後呼其姓第者曰吾無求於人念汝有難故來救汝出一紙卷授石曰有難即用之乃治折傷內外損方書也明年因趨朝坐馬為他馬所踶折足墜地又踏一臂折家人急合此藥且灌且裹至夜半痛止後手足皆堅牢如未傷時方出良方用川當歸鉛粉各半兩鵬砂三錢同研令細濃煎蘇木汁調服一大錢匕損在腰以上先喫淡粥半碗然後服藥在腰以下即先藥後食仍頻頻呷蘇枋汁别以糯米飲入藥末拌和攤紙上或絹上封裹傷處如骨碎用竹夾之乃以紙或衣物包之紙閉氣口宜紗絹之類其妙如此故表而出之治墜馬撲損瘀血在內煩悶右取東引杏枝三兩細銼微熬好酒三升煎十餘沸去滓分為三服空心下如人行三四里再服治諸傷折淋尉貼熁附論凡傷折有輕重淺深久新之異治法亦有服食淋尉貼熁之殊當詳所損之勢而藥之去毒散滯生肌長肉亦各有序無致差紊乃明傷折之本末也方神驗摩風麝香膏出聖惠方治折傷蹉跌筋骨黯腫疼痛及傷外風毒風口面不正但是傷風等宜用此軟筋骨潤皮肉止疼痛麝香細研虎脛骨細辛防風去蘆獨活桂心當歸芎藭白芷白殭蠶生乾地黃白芨白蘞附子去皮臍生用旋覆花赤芍藥連翹甘菊花木鱉子去殼天南星牛膝去苗躑躅花甘菘香石斛去根各一兩川椒去目并閉口者括蔞根烏蛇各一兩半野駝脂十兩蠟五兩鍊針二兩臘月豬膏二斤醋好酒各三升右淨洗曬乾細銼入酒醋中浸三宿漉出隂乾却入臘月豬脂駝脂內以慢火煎候白芷黃焦藥成以綿濾去滓入麝香末調勻以磁合盛有患者火上熁手心點藥摩痛處五七度亦用溫酒調半匙服之芫花粗散尉方治傷折瘀血不散芫花原蠶沙各三兩生地黃二斤生薑四兩蜀椒去目及閉口者當歸各一兩牛膝桑根白皮艾葉白芷各二兩右細銼粗搗以醋拌炒熱用青布裹尉之立效淋煠芎藭湯治傷折疼痛芎藭甘草炙蜀椒去目及閉口者當歸切焙吳茱萸浸炒各一兩桑根白皮炙銼澤蘭各二兩松樹脂一兩黑豆一升研碎入松脂內炒右粗搗篩每用藥三兩水一斗煎沸淋煠痛處立效淋煠頑荆散治從髙失墜及一切傷骨碎并瘀血結痛頑荆葉一兩半蔓荆子白芷細辛去苗防風去蘆桂心川芎丁皮羌活各二兩右為細末每用藥二兩鹽半匙蔥白連根五莖將水五升煎五七沸去滓用手淋煠痛處冷則再換淋煠時宜避風暖蓋量病大小臨時加減用藥治傷折浮腫疼痛膏厚朴去粗皮白芷各二兩檳榔芎藭各一兩桂心二兩半沒藥麒麟竭各半兩當歸三兩銼微炒硃砂三分細研右為散以酒二升熬藥成膏於帛上攤貼於痛處立效如食前熱酒調下二錢亦佳桂附貼熁膏治接骨因傷損筋脈時發痛楚遇寒則甚一名止痛貼熁膏桂去粗皮附子去皮臍生用乳香研蜀椒去目并閉口者炒出汗白礬研吳茱萸浸炒各一兩生薑汁酒各五合右搗碎六味為散將薑汁并酒各五合共煎取七合入藥末調勻於油單紙上攤貼患處急裹縛之其痛立定一方無白礬有白芨應驗塗貼猢猻膏治一切傷折并蹉跌骨碎壓腫曉夜疼痛不可忍者猢猻骨穿山甲骨狗食系骨虎脛骨野狸骨水獺骨貓兒食系骨各三兩腽肭臍三兩右粗搗以米醋拌入瓶子以蜜封頭令乾以文火燒令稍熱為度候冷取出搗羅為末磁器中密盛每用時先以醋煮黃米粥看損折痛處大小入藥末半錢調令勻攤於油單紙上裹之上面以綿裹繫縛重者不過三度驗其傷折處骨先依法度排正後即封裹如貼藥時疼痛先用溫酒調藥末半錢服之藥入口其痛立定塗藥方乳香緑礬各二兩骨碎補川朴硝川椒去目并閉口者桔梗去蘆白礬燒令汁盡各一兩鹽梅肉三兩炒乾右為末煎米醋如膏勻攤於帛上貼之每日一易塗貼方治傷折踠損蹉跌黯腫皮肉疼痛菉豆末五兩桂心附子川椒去目蛇床子松脂各二兩吳茱萸當歸銼微炒各一兩右為末用薑汁調如膏貼於患處乾即再換如有瘡口不可用之貼熁敗龜膏治傷折止痛消腫化毒氣散瘀血敗龜塗酥炙令黃沒藥川大黃各三兩百草霜木鱉子仁當歸銼微炒桂心芎藭各二兩右為散每用之時先以好酒一升煎至半升下火停酒稍冷入藥末一兩却於火上重煎一時不住攪成膏攤於紙上貼走馬貼熁乳香膏治傷折骨筋疼痛不止乳香二兩蛇床子皂莢炙去皮子附子生用各一兩桂心一兩半芥菜子赤小豆各三兩右為末用生薑汁一中盞調如膏看傷損處大小攤於油單上封裹候乾即易之當歸湯治傷折車碾落馬蹉跌筋脈俱傷疼痛不可忍先用通和氣血脈止痛當歸頑荆藁本蔓荆子白芷各二兩芎藭丁香皮各一兩右為散每度用藥三兩入鹽半匙蔥白一握漿水一斗煎十餘沸漸添淋煠痛處日二用之桂附散治傷折筋骨疼痛方見本門傷折疼痛類洗瘡湯治傷損烏鵲飲老干根松樹兒樟葉忍冬藤雞腳草烏掞樹兒令洗者用之煎湯虎骨湯出聖惠方治傷折後或人腳膝腰胯被冷風攻擊疼痛行履不得虎脛骨桑根白皮銼五加皮白礬各二兩松木節樟木節各十兩川椒一兩去目右為散每度用藥三兩以水一斗煎十餘沸漸漸煠痛處尉藥方出聖惠方治傷折踠損蹉跌筋傷骨碎黯腫疼痛筋脈急腫展縮俱難立坐不得生地黃二斤切研生薑半斤細切川椒去目研末白礬搗末各一兩蠶沙五兩乳香搗末芫花各二兩右相和於鐺中醋拌炒令熱以青布裹尉痛上并四向筋急腫痛處冷即重炒尉後便用接骨止痛膏封貼如是傷損骨碎即先須依法度排正碎骨及蹉跌歸原後用綿裹栁木箆繫縛夾正便服補益丸散神效軟骨塗藥方出聖惠方治傷折海桐皮木鱉去殼陳橘皮各二兩五加皮兩半逺志去心百合各一兩右為末每日以米醋調如膏勻攤於帛上貼之尉藥方出聖惠方治傷折踠損蹉跌筋骨俱傷黯腫痛無瘡口生地黃一斤細切生薑半斤細研艾葉川椒去目及閉口各三兩芫花松脂各五兩右搗篩入前二味攪和令勻分為三分用醋三合於鐺內炒令熱用熱布裹尉痛處冷則再炒尉之又方出聖惠方生薑一斤芫花鹽各五兩白芷桑根白皮各五兩故烏氊一尺右細銼用醋一升炒令熱以絹裹尉之痛處冷即再炒尉之三二十度木鱉子貼熁膏出聖惠方治折傷筋骨木鱉去殼二兩蜀椒去目及閉口炒出汗虎脛骨酒炙龜甲醋炙各一兩松節二兩細銼醋一升炒令醋盡右為細散用小黃米半升作稠粥調藥五錢攤於絹上封裹損折處效又方出聖惠方治傷折筋骨疼痛不止松脂三兩當歸銼微炒細辛白芷各一兩川椒二兩右為散用生地黃汁并醋相和調如膏臨時看患處大小塗貼每日換之又方出聖惠方治從髙失墜及一切傷折筋骨傷碎瘀血結痛黑豆二升乳香白礬桑根白皮銼各三兩接骨草五兩右為末每用漿水一斗藥末三兩煎至七沸去滓用手淋煠患處冷即換之法煉黑豆尉藥方出聖惠方治傷折生黑豆三升蔥并根三十根細切右用青布裹之湯內煮承熱替換尉痛處立效淋洗方出永類鈐方右用生蔥切荆芥蓼杜當歸等入煎湯放溫洗或連翹防風白芷黃連又方出永類鈐方用南蓼杜獨活藁本黃柏生薑煎洗如有口除薑蓼損而青腫用此二味若肉冷痺痛骨斷而腫不可洗傷口有膿水别用合口藥如前風流散治涼血消腫出永類鈐方右用千金草即荆芥山查皮藁本石南藤皂角連根蔥煎水洗普濟方卷三百十二
