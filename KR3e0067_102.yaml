body:
  text: 普濟方卷一百三明周王朱橚撰諸風門風熱論夫肺為五臟華蓋候身之皮毛若膚腠虛則風熱之氣先傷皮毛乃入肺也令人頭面熻熻發熱皮膚痛咳嗽咽乾上焦不利故謂之風熱也又令人惡風寒戰目欲脫涕唾出候三五日內目不精明者是也若七八日微有青黃膿涕如彈丸大從口鼻內出者為善也若膿涕不出者則傷于肺變為咳唾膿血也方祛風至寶丹出濟生拔粹方治諸風熱等證川芎當歸各二兩半防風芍藥各一兩半甘草二兩白术一兩三錢滑石三兩石膏桔梗熟地黃天麻人參羌活獨活黃芩各一兩大黃連翹荆芥穗薄荷麻黃去根不去節芒硝黃連黃蘗細辛全蝎各半兩山梔子六錢右為末錬蜜為丸彈子大每服一丸細嚼茶酒任下臨卧服靈砂丹出御桑院方治風熱鬱結氣血藴滯頭目昏眩鼻塞清涕口苦舌乾咽嗌不利胸膈痞悶咳嗽痰實腸胃燥澀小便赤黃或腎水陰虛心火熾甚及偏正頭疼髮落齒痛遍身麻木疥癬瘡瘍一切風熱並皆治之天麻獨活羌活細辛石膏防風薄荷葉連翹寒水石生用桔梗各二兩川芎山梔子去皮芍藥荆芥穗當歸黃芩大黃生用全蝎微妙一方作蟬蝎菊花人參白术各半兩朱砂為衣二兩滑石四兩縮砂仁一分甘草三兩生用右為細末煉蜜為丸每兩作十丸朱砂為衣每服一丸細嚼茶清下食後服羚羊角湯出聖濟録治風熱上膈煩滿疏氣羚羊角屑葳靈仙去苗土黃連去鬚白檳榔甘草炙郁李仁去皮尖炒大黃銼炒枳殼去瓤麩炒各一兩車前子桑根白皮銼炒決明子炒防風去義萆薢各一兩半桂去粗皮旋覆花炒各半兩右㕮咀每服五錢以水一盞半煎八分去滓溫服食後日二真珠丸治風熱心神壅悶頭目不利口舌乾燥皮膚枯稿苦參石膏細研水飛過各一兩金箔三十片牛黃一分真珠細研鐡粉朱砂細研天竺黃玳瑁胡黃連犀角屑沙參去蘆頭玄參龍齒細研甘草各半兩炙微赤銼右為末入研了藥令勻煉蜜和搗三二百杵丸如梧桐子大每服不計時候以麥門冬湯下十五丸龍腦玉壺丸出聖濟總録治一切風熱人參防風去義各二錢乾蝎去土炒半錢赤茯苓去黑皮一錢半白殭蠶炒蓬砂研各一錢白附子炮天麻麝香研天南星炮玄明粉研各一分甘草炙銼龍腦研各半兩凝水石煆通赤水浸出火毒後研十兩內七兩入藥三兩為衣用右為細末煉蜜丸雞頭子大用凝水石粉為衣每服一丸食後細嚼以荆芥湯下茶清亦得搜風丸出經驗良方治邪氣上逆以致上實下虛風熱上攻眼目昏矇耳鳴鼻塞頭痛眩暈燥熱上壅痰逆涎嗽心腹痞痛大小便結滯常服清利頭目開通鼻竅聰耳明目宣通血氣調順飲食天南星人參茯苓各半兩乾生薑寒水石白礬半夏各一兩蛤粉大黃黃芩各二兩牽牛滑石各四兩薄荷葉半兩藿香葉二錢半右為末滴水為丸如小豆大每服十丸生薑湯下加至二十丸日三無時服天門冬丸出聖濟總録治風熱心肺氣壅多渴天門冬去心焙三分防風去義赤茯苓去黑皮知母焙麥門冬去心焙黃耆銼細黃連去鬚桑根白皮判炒黃芩升麻生乾地黃焙栝蔞根别搗碎炒各半兩甘草炙銼一分右為細末鍊蜜丸如梧桐子大每服十五丸生薑湯下日午臨卧各一服茯苓丸出聖濟總録治風熱攻頭面虛浮心下滿悶煩燥熱渴腰胯痠疼咳逆咽乾小便赤澀白茯苓去黑皮一兩半赤芍藥炒柴胡去苗百合訶黎勒皮羚羊角鎊陳橘皮湯浸去白焙防風去義菊花各一兩郁李仁去皮炒一兩半大麻仁研四兩生乾地黃焙三兩右為末鍊蜜丸如梧桐子大每服三十丸煎麥門冬湯送下皂莢丸出聖濟總録治風熱痰壅面發熱皮膚痛涼心膈潤肺臟皂莢實肥者半斤芎藭四兩甘草一兩同皂莢于罐器內燒不走煙出惡實微炒二兩馬牙硝研細四兩玄參暴乾一兩甘松去土藿香葉各一兩零陵香一兩龍腦研一錢蒺藜子炒去角二兩菊花微炒四兩右為末鍊蜜和丸如櫻桃大每服一丸嚼破茶酒任下食後臨卧服治虛熱恍惚驚邪恐懼出千金方荆瀝三升竹瀝二升香豉三合牛黃研八分麥門冬生人參各三兩升麻鐡精天門冬龍齒茯苓梔子各二兩右㕮咀以水二斗煮取三升去滓下牛黃鐡精更煎五六沸取二升七合分五服溫服相去十里久苦參丸療風熱未退頻服湯飲力不能攻苦參乾薑芎藭各六兩玄參丹參人參沙參白术各五兩地骨白皮獨活各四兩薏苡仁二升蜀升麻二升右為末蜜和丸用薏苡仁飲下初服十五丸日再服稍稍加至二十丸如梧桐子若覺冷即去玄參沙參加桂心四兩細辛三兩若覺熱别加十兩生地黃若覺有痛處去沙參加當歸六兩若覺有氣去玄參加橘皮六兩若大便澀加大檳榔仁二枚忌桃李生䓤生菜蕪荑又方以九月以後二月以前宜合五加皮等藥酒細細用下前丸飲之五加皮薏苡仁大麻仁熬各五升丹參生薑生地黃各四斤桂心五兩大豆一斗熬右藥切以絹袋盛用無灰清酒六斗浸六七日細細取下前丸初服三合再服稍稍加至五六合能至一升亦佳忌生䓤蕪荑丹砂散出聖惠方治風熱心肺壅滯恆多煩悶朱砂三分細研水飛過犀角屑天竺黃秦芁去苗白蘚皮沙參去蘆頭馬牙硝研入川升麻甘草各半兩炙銼寒水石一兩麥門冬二兩去心焙乾龍腦一錢研入右為末研令勻每服不拘時候以溫水調下一錢地黃煎出千金方治熱風心煩悶及脾胃間熱不下食冷補生地黃汁枸杞根汁二升生薑汁酥各三升荆瀝竹瀝各五升天門冬人參各八兩茯苓六兩大黃梔子仁各四兩右搗篩五味為散先煎地黃等汁成煎次內散藥攪調每服一匙日再漸加至三匙覺利減之犀角湯出聖濟總録治風熱毒氣心胸痰滯兩耳虛聾頭重目眩犀角鎊甘菊花前胡去蘆頭枳殼去瓤麩炒菖蒲澤瀉羌活去蘆頭木通銼生乾地黃焙各半兩甘草炙銼一分麥門冬去心焙一兩右㕮咀每服三錢匕水一盞煎至七分去滓食後溫服羚羊角散出聖惠方治風熱頭痛肢節煩疼項背拘急羚羊角屑枳殼麩炒去瓤獨活防風去蘆頭黃芩細辛赤芍藥甘草炙銼人參各一兩去蘆頭麻黃二兩去根節石膏三兩右㕮咀每服三錢以水一中盞煎至六分去滓不計時溫服麥門冬散出聖惠方治風熱攻于肝心語澀煩躁或四肢拘急麥門冬去心焙川朴硝各三兩甘草炙銼木通各二兩半銼川升麻防風各一兩半去蘆頭茯神二兩犀角屑獨活人參去蘆頭酸棗仁各一兩炒右㕮咀每服五錢以水一大盞煎至五分去滓入荆瀝半合煎一兩沸放溫不計時服忌炙煿熱麵牛黃散出聖惠方治風熱心神煩悶卧即多驚口舌乾燥頭目不利牛黃細研甘草各一分炙銼龍齒半兩研細犀角屑梔子仁川升麻茯神天竺黃研人參去蘆頭天麻白鮮皮各三分右為末入研了藥令勻不拘時以竹葉湯調下一錢犀角丸出聖惠方治風熱語澀心懆舌根急四肢痛腰背悶氣壅不通犀角屑檳榔羚羊角屑茯神桂心馬牙硝地骨皮各一兩人參去蘆頭防風去蘆頭赤芍藥川大黃各一兩半銼碎微炒右為末煉蜜和丸如梧桐子大不拘時以溫水下三十丸小通聖散出危氏方治風熱上攻目赤頭疼咽疼齒牙兩頰腫滿口乾煩懆筋脈攣急并解酒毒當歸薄荷羌活防風梔子粉草大黃川芎防己桔梗右銼散每服四錢水一盞半燈心二十莖青竹葉七片煎食後服小兒急驚可服二錢天麻丸出御藥院方治肺臟風熱鼻塞不通常服涼膈明目治頭昏腦悶天麻荆芥穗甘草炙各二兩半龍腦薄荷十兩川芎馬牙硝羌活白芷玄參各一兩半川烏二錢半炮裂去皮臍右為細末煉蜜和丸如雞實大每服一丸至二丸細嚼食後茶清下治積熱風方出千金方地骨皮葳㽔丹參黃耆麥門冬澤瀉各三兩清蜜薑汁各一合生地黃汁一升右以水六升煮取二升去滓內地黃汁更暖火煮減一升內蜜及薑汁又煮一沸藥成溫服三合日再茯神散出聖惠方治風熱恍惚煩懆及筋脈拘急茯神防風去蘆頭黃芩葳𬎼人參去蘆頭羚羊角屑酸棗仁微炒白鮮皮甘草半兩炙銼右㕮咀每服五錢以水一大盞入蔥白二莖豉五十粒煎至五分去滓不拘時溫服人參丸出聖惠方治風熱發即頭痛煩悶不能食飲睡卧不安心神恍惚人參去蘆頭鐡粉甘草炙微赤銼茯神麥門冬各一兩半去心焙石膏二兩黃連去鬚葳㽔黃芩各一兩右為末煉蜜和搗丸如梧桐子大不拘時以溫水下二十丸忌豬肉熱麵炙􅘤犀角湯出聖濟總録治風熱煩懆祛風利小腸犀角鎊黃芩去黑心山梔子仁升麻葛根銼山茵陳擇生乾地黃焙甘草炙銼各等分右粗搗篩每服三錢水一盞入麥門冬十粒竹葉十片煎至七分去滓溫服獨活湯出聖濟總録治風熱上攻頭面生瘡及腫痛獨活去蘆頭羌活去蘆頭防風去義柴胡去苗白术甘草炙銼麻黃去根節煎掠去米焙乾各一兩甘菊花半兩右粗搗篩每服三錢匕水一盞入荆芥五穗同煎取七分去滓食後溫服羌活散出聖濟總録治風熱頭面生瘡羌活去蘆頭防風去義芎藭荆芥穗麻黃去根節甘草炙銼木通銼惡實炒各等分右為散每服二錢匕茶酒調下不拘時治熱風心煩悶及脾胃間熱不下食冷補出千金方黃芩乾藍芍藥鼠耳草各三兩梔子仁生葛各六兩羚羊角五兩豉一升綿曩右㕮咀以水七升煮取二升五合分三服龍腦清膈湯出御藥院方治風熱化痰利咽膈清頭目消瘡疹龍腦二錢黍粘子六兩淨炒荆芥穗四兩甘草銼炒赤色瓜蔞根紫蘇子炒一方用葉桔梗炒黃各二兩雞蘇葉去土一兩半右為細末每服一二錢食後或臨睡白湯點服一方無龍腦通關散出御藥院方治風熱上攻頭目筋脈拘急痰涎壅滯肢節煩疼羌活獨活防風天麻大黃山梔子甘草各一兩滑石二兩右為粗末每服三錢水一盞生薑五片煎至七分去滓食後溫服知母湯出聖濟總録治風熱上攻頭面壅盛虛煩涼心經知母焙人參赤茯苓去黑皮麥門冬去心焙甘草炙銼地骨皮去土各半兩黃芩去黑心一分右粗搗篩每服三錢匕水一盞入竹葉十片煎至七分去滓食後溫服牽牛子丸一名大通丸出王氏博濟方治風熱氣祕疏風順氣牽牛子不限多少淨洗飯上炊氣才透便出攤令微冷搗為末青橘皮去白焙木通銼陳橘皮去白焙桑根白皮銼芍藥焙各一兩栝蔞根洗焙二兩右搗羅六味為末每牽牛子末一斤入餘藥末四兩拌和令勻以煉蜜和杵三五千下丸如梧桐子大每服二十丸隨具湯使瘰􅊓茶湯下産前安胎補損芎酒下産後血竭肚痛蘇子酒下婦人血氣芍藥酒下血風瘙癢枳殼酒下五淋榆白皮酒下癱痪風豆淋酒下腸風瀉血萎𬎼酒下肺氣訶藜勒酒下傷寒蔥白酒下風祕蔥薑茶下洗心散出淡療方治風壅壯熱頭目昏痛肩背拘急肢節煩疼熱氣上衝口苦唇焦咽喉腫痛痰涎壅滯涕唾稠粘心神煩懆眼澀睛疾及塞壅不調鼻塞聲重咽乾多渴五心煩熱小便赤澀大便祕滯白术麻黃當歸荆芥芍藥甘草黃芩各等分右㕮咀用生薑薄荷煎服如小兒麩豆疹欲發先狂語多渴及驚風積熱可臨卧服一錢如大人五臟實欲溏乘熱服四五錢如宜方有大黃無黃芩加桑白皮杏仁半夏名清肺飲子地骨皮湯出聖濟總録治風熱毒氣身體煩熱頭目不利口乾舌裂夜卧不安地骨皮去土人參甘草炙銼柴胡去苗葛根麥門冬去心焙各半兩右粗搗篩每服三錢匕水一盞入竹葉二十片生薑三片同煎至七分去滓溫服此藥兼解利傷寒汗後餘熱煩懆羌活湯出王氏博濟方治風熱心胸壅滯煩懆羌活去蘆頭人參連翹防風去義鈎藤各一兩甘草炙銼三分右粗搗篩每服三錢匕水一盞煎至七分去滓溫服川芎神功散出宣明論方治風熱上攻偏正頭痛無問微甚久新頭面昏眩清神川芎四錢甘草分川烏頭吳