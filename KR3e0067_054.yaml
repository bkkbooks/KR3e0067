鹽半兩細研乳香半兩黃蠟一兩半清油一斤右件先煎油令沸即下亂髮以盡為度後下諸藥同煎令色焦黃濾去滓更以綿重濾過再以慢火煎之然後入乳香黃蠟等攪令稀稠得宜於磁器中盛以鵝翎取塗之蛇床子膏治耳生瘡濕癢不止蛇床子枯白礬五倍子海桐皮舶上硫黃海螵蛸雄黃雌黃松香各少許棗子燒灰存性右各等分為末用輕粉清油調傅瘡上一方無雌黃香脂膏治米疽生耳中連頭腫疼不可忍鬱金一兩地骨皮一兩礬石一錢研龍腦半錢右為細末用臘月豬脂油調塗之若用鼠腦調更佳曽青散出海上方治耳有惡瘡雄黃三分曽青半分黃芩一分右細研為末每用少許納耳中有汁出即以綿子撚乾用之大黃散出聖惠方治耳有惡瘡塞耳大黃半兩黃連一分龍骨一分右為細散每用少許綿裹棗核大塞耳中黃連散出聖惠方治耳有惡瘡黃連半兩礬石三分右搗研為細散每以少許綿裹納耳中兼療耳痛有膿土馬騣塗方出聖濟總録治耳瘡土馬騣井中苔各等分右為末以燈盞內油調塗之黃馬散出聖惠方治耳內外惡瘡及頭瘡肥瘡瘑瘡黃蘖半兩馬齒莧乾者一兩右為細末每用小豆許綿裹納耳中耳外傅之羊糞方出聖惠方治耳有瘡用羊糞曝乾為末每以少許綿裹塞耳中治凍耳成瘡出聖惠方柏白皮二兩榆白皮二兩桑根白皮二兩杏仁二兩甘草一兩羊腦髓一斤右細銼以羊腦髓煎令黃去滓於瓷器中盛鵝翎點塗之又方出聖惠方取兔腦髓塗之又方出聖惠方治凍耳用杏仁一斤湯浸去皮壓取油塗之又方出聖惠方以棗爇傅立愈後用麥葉煮水洗之一方出聖惠方治耳爛出血用赤腳蜈蚣乾為末吹之治耳瘑瘡用黑雌雞膽傳之日三次百蟲入耳論夫百蟲入耳其類不一古方或灌以藥或導以物皆以意出之也獨驢乳牛酪二物最為良法諸蟲入耳灌之即化為水其入腹者則連服攻劑取瘥方立驗散出聖濟總録治蚰蜒入耳芎藭三分天南星炮三分夜明沙炒三分豬牙皂莢炙三分白丁香四錢百部四錢藜蘆四錢草烏頭半兩海金沙一分砒霜二錢别研蓽撥二錢右為散與砒霜合和研勻臨時更用鉛丹調勻磁合收如蚰蜒入耳取少許用醋一兩滴調化以細翎毛蘸藥入耳竅為吹令藥氣行立出藥不得多多即化蚰蜒成水不出如蝎螫先點少醋在螫處摻藥半字許擦令熱立效麝香膏出聖惠方治蚰蜒入耳麝香半錢阿魏半錢麒麟竭一字乾漆一字白芨一字膩粉一錢碙砂半錢石膽一字生鐡屑一字右研細末以豬膽汁生薑汁䓤白汁等各少許相和令稀稠得宜每用少許點入耳中其蟲即化立驗烏頭散出王氏方治蚰蜒入耳烏頭三枚木鱉子七枚礬石一分白丁香一撮夜明沙一分烏雞屎三塊鉛丹一分豬牙皂莢三挺小麥衣帶三條右為散每用一匙釅醋調灌入耳內少時蟲盡出備急散出聖濟總録治蚰蜒百蟲入耳芫青二十一枚斑貓二十一枚金星石一錢銀星石一錢栁絮礬二錢狼毒一錢青黛半錢右為散每用一字水少許調入耳立出灌耳散出聖惠方治蚰蜒百蟲入耳雄黃一兩萵苣子一兩蕪荑一兩緑礬半錢板藍根一兩沒心草一兩麝香一分研右於五月五日午時合和納磁瓶中燒為灰入麝香研勻每用藥一字生薑一塊如棗大蔥白一莖同研取汁入藥末攪和勻更用清油一合調藥灌入耳中食頃其蟲淺者自出深者自死如入腹中者以羊肉半斤作羮除油不用以前藥入在羹盆內和勻令人於盆內浸一飯時其蟲自出塞耳黃耆丸治諸蟲入耳耳腫不聞語聲有膿血黃耆銼一兩芍藥半兩當歸切半兩乾薑炮半兩蜀椒一分右為末入生地黃三兩切和杵薄綿裹棗核大塞耳中日夜易之麝香驢乳汁方出聖惠方治蚰蜒入耳麝香三分緑礬半兩米醋驢乳汁各少許右調和為汁以一蜆殼傾入少許蟲即化為水唯存腳在為驗雄黃灌耳方出聖濟總録治蚰蜒入耳雄黃一分緑礬一分礬石一分半夏一分右為末以醋調一字灌入耳兼治蜈蚣諸蟲入耳黃耆汁方療蟲入耳不聞人語聲有膿出黃耆四分乾薑二分蜀椒一分右搗末以生地黃取汁和用綿裹棗核大塞耳中日三夜一以瘥止治蚰蜒入耳出聖惠方白蜜半兩黃丹半兩酥半兩右相和於磁器內同熬成膏如有蚰蜒入耳者以杏仁一枚和皮尖塗膏於上綿裹塞耳門其蟲聞藥香即奔耳門來便急抽藥以攝物出清油膏治蚰蜒入耳及百蟲入耳痛不可忍清油一斤大蜈蚣三對入油內浸右加腦麝每用少許點碙砂吹耳方出聖濟總録治蚰蜒入耳碙砂研一分膽礬研一分右研細用雞翎管子吹一字許入耳蟲化為水治蜈蚣入耳方出肘後方桑葉一握鹽一撮右以桑葉裹鹽炙令熱掩耳上冷即易豬脂枕耳方出經驗良方治蟻及蜈蚣入耳豬脂一片豬肉一斤右將豬脂煎豬肉令香安耳孔邊枕睡即出治百蟲入耳出聖濟總録桃葉心十四枚胡麻一升炒令香右先以桃葉心塞耳中其蟲必出未出將胡麻以葛袋枕耳邊蟲自出又方出聖濟總録麻油一升蔥白一莖右將蔥與麻油拌勻以瓶子盛當耳門安側睡令瓶口向耳勿令傾側蟲從耳出至瓶子內即去之又方出聖濟總録草烏頭尖礬石各等分右為末用醋調灌耳中立出又方出聖濟總録豬膏二合青錢十四文右以錢納豬膏中煎之去錢以豬膏少許灌入耳中治蚰蜒入耳方出肘後方雞小者一隻油右以油煎雞令黃筯穿作孔枕之又方出聖惠方萵苣葉一分雄黃一分右為末用麵糊和丸如皂莢子大以生油少許化破一丸納耳中其蟲自出車脂膏千金方治百蟲入耳取車轄脂傅耳孔蟲自出肘後方以療聤耳綿裹塞耳中又方出聖惠方以蔥涕灌耳中蟲自出亦治耳聾一方生蔥汁亦可治蚰蜒入耳中用貓尿灌耳中立出取貓尿用盆盛以生薑擦其牙生蔥納其耳又方出衛生寶鑑以濕生蟲研爛塗於耳邊自出一方攤紙撚安耳中治百蟲入耳出十便良方用雞冠血滴入耳中即出又方出聖惠方以酒少許灌耳中起行即出又方出衛生寶鑑用生油調銅緑滴耳中治蚰蜒入耳方用緑礬為末水調灌耳中即出又方出海上方用雄黃釅醋調灌耳中立出又方用蝸牛一個全捶碎置於耳中即出一方去殼研爛滴水五七點再研勻灌耳內乾者亦可研末吹耳中紙糊耳其蟲自出治百蟲入耳出肘後方搗韭汁和醋灌耳中即出單韭汁亦佳治蜘蛛瓦蛆咬耳出海上方用香油和鹽調塗立效治蟲入耳出直指方用桑皮搗汁灌耳即出治諸蟲及虱等入耳出本草方用白膠香燒薰耳中令孔內知暖蟲自出治蚰蜒入耳出本草用生半夏為末麻油調塗耳門外蟲聞香自出治飛蟲入耳出聖惠方用好酸米醋一味滴入耳內蟲必出不出必死治蚰蜒入耳出聖惠方用牛乳一盞少少灌入耳內即出若入腹者飲三升當化水出未出再飲一方用牛酪又方出聖惠方用驢乳三合側灌耳中有蟲從左耳出香油方出聖惠方治蚰蜒及百蟲入耳用生油三合少少灌入耳中若入腹者空腹服酢酩一升仍以麵和餅乘熱傅耳門須臾即出又方出聖惠方用水銀一豆大傾入耳中令耳孔向下於耳上擊銅器物數聲其蟲即出又方出聖惠方用小便少許灌入耳中即出又方出聖濟總録用百部切炒搗羅為末以一字生油調塗於耳門上其蟲自出又方出聖惠方用胡麻半升炒令香搗碎以葛袋盛側卧枕耳蟲聞香自出治蟻入耳出聖濟總録用醬汁兩合灌耳中即出又方出聖濟總録用小蒜三兩搗研取汁灌入耳中一切蟲入耳同妙又方出聖惠方用鯉魚甲半兩燒為灰以水調濾過滴耳中即出治百蟲入耳出聖濟總録以火照之即向明出又方出聖惠方用板藍葉一握研取汁少少灌入耳中又方出聖惠方用桃葉微炙熱塞耳中或搗爛薄綿裹枕之蟲自出或造酥煎餅枕之一方用桃葉裹鹽炙令熱療蟲入耳冷即易之並佳又方出聖惠方用鱓魚頭燒灰取屑以綿裹塞耳中立出又方出聖惠方用生薑汁一合少少灌入耳中立出又方十便良方以兩刀於耳上相擊蟲即出治蜈蚣入耳十便良方用閉氣氣滿即吐復閉取令出或死耳中徐徐以物鈎出之日積久不出者新熱豬肉安耳竅上即出又方出聖濟總録革帶鈎向耳孔鈎之蟲即出勿令鈎缺耳竅內蟲或死在耳中即取之治飛蟻及百蟲入耳出聖濟總録先大吸氣仍閉口掩鼻呼出氣蟲即隨氣出又方出聖惠方以葦管吹之即出又方出聖濟總録以指彈齒隨左右易又方出聖濟總録以雞肉塞耳中蟲即出治飛蟲入耳出聖濟總録以石斛數條去根如筒子紉一邊耳竅中四畔以蠟閉塞以火燒石斛盡則止薰右耳蟲從左耳出未出再作治蟻子及蚊子入耳用豬羊脂炙令香安耳孔自出一方單用豬脂塗入耳門治蚰蜒入耳以羊乳灌耳中即成水治小蟻入耳挑不出者出本草以燈心草浸油釣出療百蟲入耳出千金方以膽礬末和醋少許灌之即出一方以溫湯灌耳中治蒼蠅入耳出危氏方用皂莢子研爛以生鱓魚血調灌入耳中治惡蟲入耳出危氏方用香油稻稈汁灌耳中追毒膏治百蟲入耳不出用白礬雄黃各半兩細研以香油調和成膏用皂莢子大塞耳中蟲出即止治百節蚰蜒蟻入耳或乾耵聹不出出千金方取酢三年者灌之最良次用綿塞耳日許必有物出又方出聖惠方以麻繩剪令頭散傅好膠著耳中使其物粘之徐徐引出效用弓絃尤妙治蚰蜒入耳方出聖惠方用磁器於耳門打作聲蟲聞其聲即出又方出聖惠方用銅器於耳邊打蟲自出又方出聖惠方用地龍一條納蔥葉中化為水滴耳中其蚰蜒亦化為水治蜈蚣入耳出聖惠方火炙豬肉令香掩耳即出治飛蛾入耳出聖惠方用醬汁灌入耳即出一方擊銅於耳傍即出治諸蟲入耳出危氏方用桃葉為枕蟲自鼻出蚰蜒入耳往往食髓至盡又能孳生凡蟲麻油灌妙又方出聖惠方用桃葉火尉之捲而塞耳蟲即出一方絞滴耳內不一時愈治水入耳方出危氏方以薄荷汁點立效治蚰蜒及百蟲入耳出聖濟總録用雞心血以生油和滴入耳內蚰蜒即出治百蟲入耳出危氏方以川椒為末一錢醋半盞浸一宿即用少許灌入耳中蟲自出又方出十便良方治百蟲入耳以油膩香物著向耳門蟲自出蚰蜒入耳方出廣南四時攝生方麻油四兩藍根二兩於油內浸五日取出藍根不用右取雞冠血烏驢乳各少許同入油中如蚰蜒入左耳緊塞右耳向左耳內灌藥少許如經年內有蚰蜒子者先於耳內灌藥少許後用藥以手從額揩至頂隨即蓋覆臥定其蚰蜒化為黃水流出即瘥治百蟲入人耳鼻中出本草將古鑑就彼敲其蟲自出治蟲入耳出本草以萵苣汁滴耳中即出治百節蚰蜒并蟻入耳出本草以苦醋注之起行即出治馬陸蚰蜒入耳及諸竅中出本草以驢乳灌之即化為水治蚤虱入耳痛出本草以菖蒲作末炒乘熱裹塞之甚驗治百蟲入耳用車釭音工脂塗耳孔中自出車釭脂乃車釭中油膏也普濟方卷五十五
