body:
  text: 普濟方卷五十四明周王朱橚撰耳門勞聾論夫勞聾者腎氣虛勞所致也足少隂腎經宗脈所聚其氣通於耳腎氣虛勞弱宗脈耗損則氣之所通安得聰徹而不瞶哉舊説謂因勞則甚要當節嗜欲慎起居而無損腎臟方補腎石斛丸治勞聾耳中久瞶瞶石斛去根附子肉蓯蓉山茱萸莵絲子酒浸一宿肉桂去粗皮澤瀉當歸蛇床子炒巴豆去皮白茯苓去皮乾薑焙熟地黃菖蒲米泔浸芍藥細辛逺志黃耆各一兩防風去義三分右除莵絲子為末再入莵絲子末重羅錬蜜為丸如梧桐子大每服十五丸肉蓯蓉丸治勞聾腎虛損腰腳無力面黑體瘦小便滑數肉蓯蓉一兩酒浸菖蒲一兩附子一兩炮磁石一兩燒令赤巴戟一兩鹿茸一兩去毛莵絲子一兩酒浸三日石斛一兩去根節桂心一兩半桑螵蛸半兩杜仲一兩去粗皮牡蠣粉一兩補骨脂一兩微炒熟地黃一兩半右為末煉蜜搗五七百杵為丸如梧桐子大每服三十丸空心溫酒下薯蕷丸治勞聾臟腑久虛腎氣不足肌體羸瘦腳無力薯蕷一兩熟地黃一兩附子一兩桂心一兩天門冬一兩半石斛一兩人參一兩去蘆逺志半兩去心肉蓯蓉酒浸鹿茸一兩去毛白茯苓一兩鍾乳粉二兩莵絲子一兩酒浸磁石一兩燒令熱醋淬右為末入飛鹽同藥煉蜜和搗五七百杵丸如梧桐子大每日空心以溫酒下三十丸晚食前再服地黃丸治勞損耳聾大熟地黃當歸川芎辣桂大川椒莵絲子故紙白蒺藜葫蘆巴杜仲白芷石菖蒲各一兩磁石一分半右為細末煉蜜為丸如梧桐子大每服五十丸以蔥白溫酒空心吞下晚飯前又服內補丸治腎虛勞聾熟乾地黃附子桂去皮研肉蓯蓉鹿茸人參各一兩山芋一兩半柴胡三分胡黃連一分逺志半兩細辛半兩白芷去皮一分鍾乳三兩右除研藥餘為細末再研勻煉蜜為丸如梧桐子大空心溫酒下二十丸補腎磁石湯治耳聾耳中瞶瞶然磁石二兩山茱萸芎藭菖蒲牡荆子茯神白芷枳殼甘草陳橘皮各一兩天門冬一兩半地骨一兩半右搗粗篩每服三錢水一盞半入生薑半分竹瀝二合同煎至七分去滓溫服日三熟乾黃散出聖惠方治勞聾腎氣不足耳無所聞附子半兩芎藭牡荆子一兩當歸一兩銼牡丹皮半兩白茯苓一兩右為散每服先以水一大盞半入羊腎一對去脂膜切煎至一盞去腎入藥五錢棗三枚生薑半分同煎至五分去滓食前溫服菖蒲散出聖惠方治勞聾塞耳菖蒲半兩山茱萸半兩土瓜根半兩牡丹皮半兩牛膝半兩附子半兩萞麻子半兩磁石一兩燒令赤右為末每用半錢用綿裹塞耳中一日一易之又菖蒲散出聖惠方治勞聾腎氣損耳無所聞菖蒲莵絲子酒浸三日附子山茱萸桂心各一兩車前子半兩肉蓯蓉一兩右為散每服以溫酒調下一盞空心及晚食前各二服羊腎附子丸出聖惠方治勞聾附子一兩焙磁石一兩燒牛膝一兩去苖莵絲子一兩酒浸肉蓯蓉一兩酒浸遠志一兩去心右為細末用羊腎五對去脂膜細切爛研入酒三升於銀鍋中微火煎如膏然後入藥和搗二三百杵丸如梧桐子大空心及晚食前溫酒下三十丸鹽湯下亦可治勞聾滴耳出聖濟總録以童子小便少許灌入耳中即瘥暴聾論夫卒耳聾者由腎氣虛為風邪所乘摶於經絡隨其血脈上入於耳正氣邪氣相擊故令耳暴聾也方菖蒲膏出聖惠方治卒耳聾細辛菖蒲各六銖杏仁麵末各十銖右和搗為丸即著少豬脂取如棗核大綿裹納耳中日一易小瘥二日易夜去日一塞之一方有蒲黃無菖蒲不用豬脂亦可又方出聖惠方龍腦二錢硝石二錢蔥涕二錢蔥管二莖右藥並蔥涕同研納入蔥管中繫定勿令漏氣於飯甑上蒸一炊後取汁滴耳中菖蒲丸治卒耳聾不聞及痛石菖蒲萞麻仁附子炮右等分為末蔥涎為丸如杏仁大綿裹塞耳中治卒耳聾出聖惠方龍腦半兩椒目半兩杏仁一分湯浸去皮右研令勻綿裹如棗核大塞耳中日二易之草還丹治失飢冒暑及風熱憂愁使耳暴聾或一耳塞咽咽氣而開咽已復塞令人煩悶烏頭黑豆各四兩鹽一兩右瓷瓶盛藥坐水中慢火煮令烏頭透取出細切同黑豆焙為末麵糊丸桐子大每服十五丸空心服治耳暴聾出海上方雄黃一錢巴豆一個去殼右為末用蔥涎和作一錠子紙捲塞耳中又方出聖惠方巴豆一枚斑貓二枚炒黃右同研令勻綿裹塞耳中瘥又方出聖惠方雞膏一合磁石半兩焙令赤右以雞膏和撚如棗核大綿裹塞耳單用雞膏亦佳治暴耳聾用黃蠟不拘多少和茯苓嚼下良一方和建茶嚼下又方出聖惠方用巴豆一粒蠟裹之用針刺蠟令內外通透塞耳中耳內忽腫痛出膿枯礬末吹之一方不用枯礬又方出本草以凌霄葉爛杵自然汁灌耳內瘥又方出本草以鯉魚腦髓煮粥服食良治卒聾及腎虛耳內作風水聲鐘聲穿山甲大片拌粉炒赤去粉蝎梢七個麝香少許右為末以蠟丸并入麻油一滴綿裹納耳內治暴耳聾用雞心檳榔一箇以刀子從臍剜取一眼如錢眼大實以麝香著於所患耳內從上以艾炷灸之不過二三次效暴熱耳聾論夫耳者腎之候也若腎氣實則生熱熱則上焦壅滯經絡否塞不得宣通邪熱之氣入於耳脈則令四肢滿急腰背強直胸脅切痛好忌不安耳無所聞也方犀角散出聖惠方治風毒壅滯兩耳虛聾頭重目眩犀角屑半兩甘菊花半兩前胡半兩枳殼半兩菖蒲半兩麥門冬一兩澤瀉半兩羌活半兩木通半兩生地黃半兩甘草一分右為散每服三錢水一盞煎至五分去滓食後溫服茯神散出聖惠方治上焦風熱耳忽聾鳴昏悶不利茯神一兩羌活半兩蔓荆子半兩薏茹子半兩防風半兩黃耆半兩銼菖蒲半兩麥門冬一兩五味子半兩甘草一分右為散每服三錢水一鍾入生薑半分煎至五分去滓食後溫服羚羊角散出聖惠方治耳聾不聞言語利腎氣退熱羚羊角一兩銼屑沙參三分防風三兩木通三兩銼旋覆花半兩澤瀉三分前胡三分菖蒲半兩牽牛子一兩右為散每服三錢水一鍾生薑半分煎至五分去滓食後溫服又羚羊角散出聖惠方治腎氣實上焦風熱壅滯耳暴聾頭重羚羊角一兩銼屑白术三分防風三分黃耆三分玄參三分澤瀉三分赤茯苓三分赤芍藥二分甘草一分右搗篩為散每服四錢以水一鍾入生地黃一兩竹葉二十七片同煎至六分去滓食後溫服大黃丸出聖惠方治風熱毒氣攻耳暴聾由腎氣實熱所致川大黃半兩梔子仁半兩黃耆半兩川升麻半兩川朴硝半兩黃連半兩生乾地黃半兩玄參半兩磁石一兩燒醋淬七遍右為末煉蜜和丸如梧桐子大食後以溫酒服二十丸以利為度磁石散出聖惠方治暴熱耳聾心膈壅悶宜服此方磁石一兩搗碎木通一兩銼防風一兩枳殼三分桑根白皮一兩生地黃一兩右為散每服五錢水一大盞煎至五分去滓空心服久聾論夫耳聾者腎臟虛血氣不足風邪停滯故也足少隂經宗脈所聚其氣通於耳若腎臟勞傷宗脈虛損血氣既衰風邪乘之致耳聾積久不瘥勞傷過甚邪氣凝滯故為久聾也方塞耳磁石丸出聖濟總録治久聾磁石半兩研菖蒲半兩狼牙半兩木通半兩食鹽半兩薰陸香半兩松脂半兩杏仁半兩蠟半兩鎔入藥搗巴豆半兩生地黃半兩洗研右為末搗二三百杵丸如棗核大綿裹塞耳日一易塞耳木通丸出聖濟總録治久聾不瘥木通半兩菖蒲半兩磁石半兩薰陸香半兩杏仁半兩巴豆半兩蠟半兩附子去皮一分右為末入鵝膏同搗撚如棗核大綿裹塞耳日一易萞麻子丸出直指方治久聾萞麻子二十個逺志二錢乳香二錢皂角半錢生地龍一條全蝎二個焙磁石二錢右為細末蠟搗丸塞耳中治久聾出聖惠方松脂一兩食鹽半兩巴豆半兩萞麻子半兩薰陸香半兩杏仁半兩磁石三分右為細末以豬脂一兩黃蠟一兩先於銚子中鎔化後入藥攪勻捻如棗核大中心通小孔如米許以薄綿裹納耳中三日一易磁石丸出聖惠方治耳聾多時不瘥塞耳磁石一兩菖蒲半兩木通半兩薰陸香半兩杏仁半兩松脂半兩右為末用黃蠟鎔和丸如蓮子大長半寸穿孔塞耳楓香丸出聖惠方治耳聾二十年不瘥者楓香半兩松脂三兩半黃耆半兩婆律膏半兩胡桃仁半兩巴豆七枚去皮心右搗楓香巴豆入松脂又搗次銷蠟下之搗令相和後下婆律膏胡桃仁熟搗如泥膏成丸如棗核大以綿裹日三兩度塞耳內中有汁出盡即愈一方有麻油無胡桃仁塞耳麒麟竭丸治久聾麒麟竭二兩鉛丹二兩硝石一分巴豆一分研右研勻蜜丸如棗核大新綿裹塞耳中有膿出即拭去再易一枚避風以瘥為度桃仁膏出聖惠方治久聾桃仁三分松脂三分椒目末一分半巴豆三粒右研膏撚如棗核大中穿一孔綿裹塞耳中數日易蠶香散出聖濟總録治耳聾久不瘥蠶紙一錢烏賊魚骨一錢染胭脂一錢麝香半錢研右研搗為散滿塞耳中不動候自落未瘥再用天雄雞子方出聖惠方治三十年耳聾久不瘥天雄一分雞子一枚附子一枚右搗末取雞子開一孔取黃和藥納雞子中封合其頭還令復之藥成以綿裹塞耳中取瘥為度塞耳山茱萸丸出聖惠方治久聾山茱萸一兩乾薑一兩巴豆一兩去皮殼炒别研右先搗前二味為末入巴豆同研令勻絞蔥汁和丸如棗核大綿裹塞耳中食頃乾即易新藥塞之凡如此五日當小愈十日聞人聲瘥即止常以髮塞耳孔避風一方用吳茱茰治耳久聾出聖惠方鼠脂半合青鹽一錢蚯蚓一條右以鼠脂蚯蚓汁調青鹽湯以綿蘸側臥捻滴耳中繼塞耳中即瘥又方出聖惠方烏驢乳一合皂莢半挺蠟一兩右相和於銚子內鎔成膏丸如棗核大用針穿透安耳中一宿至來日看之有物在耳門中即取出再用一兩度即瘥通氣散治久聾諸藥不效穿山甲五兩螻蛄五兩麝香一錢右以蔥涎和搗塞耳或為細末每用少許以蔥管盛藥納耳中仍以耳聾類追風散搐鼻妙治耳久聾出聖惠方芫青一枚巴豆一枚萞麻子一枚右細研以蜜二兩文武火熬半日不得令焦只可為三丸以綿裹塞耳內仍留一綿頭垂在外耳中膿出便可聞聲用時令熱為妙柘根酒出聖惠方治耳聾鳴汁出皆由腎寒或三十年不瘥柘根三十斤菖蒲切五斗各用水一石故鐵二十斤燒赤水五斗右合二石五斗同米二石并麯二斗釀如常法酒熟一月封頭開時用磁石吸鐵者三斤搗為末納酒中浸三日飲之日夜常飲取小醉而眠聞人語乃止水銀方出聖惠方治久聾滴耳水銀一分蚯蚓生者一條右就蔥叢內以一莖去尖頭入水銀蚯蚓在內即擊去蔥頭令傾出候蚯蚓化為水即取滴耳中立愈二膽方出聖惠方治耳久聾熊膽一分鼠膽二枚右取水和旋取如菉豆大滴耳中日一兩度瘥磁石酒治三十年久聾用故鐵三十斤以水七斗浸三宿取汁入麯釀米七斗如常造酒法候熟取磁石一斤研末浸酒中三日乃可飲取醉以綿裹磁石納耳中覆頭臥酒醒去磁石即瘥又方出簡易方用菖蒲一寸九節者為末以萞麻子去殼研為膏如棗核大用綿裹塞耳中早晚易之又方出聖濟總録用濕土瓜根截長半寸塞耳向上以艾灸七壯每易以瘥為度古吊脂方出聖惠方治久聾無問年嵗者用古吊脂於琉璃瓶子中貯之以樟木合盛瓶每日一度滴半杏仁許入耳中此方極驗此物出南海福建有之瓶子若不以樟木襯之即透却大蒜方出直指方治耳聾久不效者用大蒜一瓣一頭剜一坑子以巴豆一粒去皮慢火炮令極熱入在蒜內用新綿裹之塞耳中不過三四次效􅌝􅌣根方用􅌝􅌣根細切三十斤水煮以釀酒如常法服之甚效治久耳聾用磁石打作細塊綿包塞耳中舊鐵釘五個燒紅淬入酒溫服澤瀉湯治腎間有水耳聾經年不瘥澤瀉一兩半乾熟地黃二兩焙五倍子一兩半丹參一兩半玄參一兩半防風一兩半肉桂一兩半去粗皮人參一兩半當歸一兩半