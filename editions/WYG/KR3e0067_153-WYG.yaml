body:
  text: 普濟方卷一百五十四明周王朱橚撰身體門總論凡人百骸四體肌肉皮膚關節脉絡總而謂之身風淫濕滯血刺痰攻皆能作痛至於骨之酸疼或熱入裏徹骨則倍蓰千萬大不侔焉盖骨為髓之藏髓者飲食五味之實秀也髓虛勢所必至矣痛在於身風之証以走注知之濕之証以重作驗之血有筋脉鑚刺之証痰有眩暈咳唾之証驅風除濕行血豁痰對証一投猶冀可以旦暮起病入於骨此勞極損傷之不可救藥者也然則身痛之與骨痛毫釐千里之差於此不可以無辨然醫家之辨多為項腫臂痛盖熱在上焦不能清利則醖釀日久生痰涎聚飲氣流入於項臂之間不腫則痛耳然而曰痰曰涎曰飲又有理一分殊之别伏於包絡隨氣上浮客肺壅𠻳而發動者痰也聚於脾元隨氣上溢口角流出而不禁者涎也惟飲生於胃腑為嘔為吐此則胃家之病學者不可不知身體胷膈隱熱隱疼拘急足冷此血之為病也以其飲酒嗜慾伏熱受暑得之惟熱毒暑酒毒為能傷血瘀血未去新血不榮身體所以隱痛拘急其裏熱足冷者血之証也用柴胡黄芩青皮枳殻靈脂桃仁木通甘草作劑多入大黄以利之俟其流利已盡小腹畧無結急即以當歸川芎一兩橘皮半夏枳殻桔梗木通甘草半之調其氣血於是有瘳血屬於心木通通心心竅既通經絡之流行可知矣胷脇痛引背上頭面兩手浮腫腎虚不能納氣歸元氣逆而上奔則胷膈滿痛以手摩挲痛走背上又從背摩挲則其氣循泄於後分而痛不作矣此氣之為病固也柰何腎虚又不能行水故隨氣奔上乗於肺頭面兩手浮腫氣短而喘由是血化為水與之俱沉滯其人舊來有風曰水曰血曰氣四者合而為病其痛非常如沉香木香烏藥㯽榔之類好能施其巧治法將何如曰先以二十四味流氣飲加獨活枳殻靈脂炒牽牛入薑蜜烏梅同煎嚥下養正丹二十粒雄黄升降水火引導大便次用桑皮紫蘇木通阿膠當歸桃仁青皮桔梗芫花大黄作劑依煎以薑蜜烏梅取盡大便黑物即收全功肚皮疼腎虚不能得水加之酒麵無度後輙睡酒與水交聚於腹中而麵毒復纒滯其氣是以水滲於肚皮而作痛矣治法錢氏宣風散用蜜水煎嚥下神效俟其大便流行然後以青木香丸一分安腎丸倍之用二陳湯入少鹽并生薑同煎空心嚥下脾腎氣復自然平安胷膛氣膈有肺經伏熱而氣膈者有痰水在上而氣膈者大槩以茯苓半夏枳殻桔梗為治法其肺熱者如聖湯加桑白皮佐之心下水氣者小半夏茯苓湯効胷煩活人書用山梔子身體疼痛論夫身體疼痛非濕則痰固也人有挾刀鋸之驚而又餒在其中為風寒水濕所傷致使心竅凝滯於是經絡壅閉血不流行腸肉骨節為之刺痛治法當歸川芎芍藥白芷靈脂大黄甘草利之黑物小片而不甚痛可瘳方治背痛方出海上名方治臂痛外連肌肉牽引背脾時發時止用當歸二三兩切作薄片酒浸三日飲其酒酒盡别換當歸浸服三兩日即愈流氣飲子出指南方治臂痛外連肌肉牽引背脾時發時止此由榮衛之氣循行失度流滯經絡與正氣相摶其發則有似癱瘓紫蘇葉青皮苦梗當歸芍藥烏藥茯苓枳殻去穰麸炒一作枳實黄耆川芎防風各半兩甘草炙橘皮各三分陳皮大腹子剉薑汁炒木香各二兩右剉散每服水二盞薑三片􅀥一枚煎至一盞去滓服一方治腰臂痛發大黄橘皮拈痛散出御藥院方當歸去蘆頭防風去蘆頭黒狗脊骨碎補並去毛藁本去土細辛去苗土赤芍藥自然銅醉淬七遍桂去麄皮萆薢以上各一兩右為麄末每二兩用手帕包定上用熱鹽包納在痛處熨之枳殻煑散出簡易方治悲哀煩腦肝氣至兩腋骨疼筋脉拘急腰脚滯重兩股筋急兩脇牽痛四肢不能舉漸致背攣急大治脇痛防風川芎細辛枳殻桔梗各四錢甘草二錢乾葛錢半右為粗末每服四錢水一盞薑三片煎七分空心服白芥子散出危氏方治背痛外連肌肉牽引背脾時發時止皆榮衛之氣循行失度流滯經絡與正氣相摶其發則似癱瘓真白芥子木鱉子去皮各二兩没藥桂心木香各半兩右為末入研藥令匀每服一錢温酒調下𤓰蔞實丸出濟生方治胷痞胷中痛徹背脇喘急妨悶𤓰蔞實别研枳殻去穰麸炒半夏湯炮七次桔梗去蘆頭各一兩右為細末薑汁打糊丸如梧桐子大每服五十丸食後用淡薑湯下控涎丹出危氏方凡人忽患背手脚腰胯隱痛不可忍連筋骨牽引釣痛坐卧不寧時走易不定俗醫不曉謂之走注便用風藥及針灸皆無益又是風毒結聚欲為癰疽亂以藥貼亦非也此乃是痰涎伏在心膈上下變為此疾或令人頭痛不可舉或神意昏倦多睡或飲食無味痰唾稠粘夜間喉中如鋸聲多流睡涎手脚重膇冷痺氣脉不通誤認為癱瘓亦非也凡有此疾但以是藥不過數服其疾如失甘遂去心紫大㦸去皮白芥子真者各等分右為末煮糊丸如梧子大曬乾食後臨睡薑湯或熱水下五七丸至十丸如疾猛氣實加丸數不妨其効如神加味控涎丸一方見喘急類治頭身無不痛顛倒煩滿欲死方取頭垢如大豆大服之并囊貯大豆蒸熟逐痛處熨作兩囊更畨為佳若無蒸豆鼠壤土熨之亦可治諸處皮膚裏面痛右用何首烏為末生薑自然汁調成膏敷痛處以絹帛裹之用火炙鞋底熨之神妙虎骨酒法出本草治腎經疼痛不得屈伸走注痛苦不問淺深用虎脛骨新芍藥二兩以無灰酒浸春夏七日秋冬二七日浸後須以銀石器盛於慢火上温養三日兩日即得服一方有黄羚羊角一大兩貼藥芫花散出經驗良方治臂腿間忽一兩㸃痛著骨不可忍者芫花根一把右研為末米醋調隨大小傅之如痛不止以紙花覆其上用綿帛扎定此方曽治一婦人産後而得此疾者良驗治臂痛出經驗良方用桑枝細切一升炒香以水三升煎取二升日服數次安治手足煩疼出肘後方用地膚子草三兩水四升煮二升半分作三服日一劑一方取六七月者隂乾服舒筋散出直指方治風淫血刺身體疼痛四肢拘攣延胡索炒辣桂去麄當歸等分右為末每二錢調酒下延胡索活血除風理氣葛根湯出千金方治四肢緩弱身體疼痛不遂婦人産後中柔風及氣滿方葛根芍藥桂心乾地黄亁薑各三兩麻黄甘草各二兩生薑六兩右八味以清酒三升水五升煮取三升温服五合日三三皮散出朱氏集驗方治風毒濕氣流注脚膝四肢攣拳筋脉不伸脚足疼痛歩履難艱用此藥酒斷根不問三二十年者皆有効海洞皮去皮五加皮新採者桑白皮川獨活生乾地黄六升半製杜仲各一兩黑附子炮去皮斟酌多少薏苡仁生用二兩川牛膝一兩右為粗末用綿褁作一包以無灰好酒一斗許春浸七日秋冬二七日夏三五日撈起藥空心温服一盞一日三五次服如服藥酒時却飲它酒常令酒氣相接勿令大醉重者不過兩劑服此藥後旬日兩腿必發大􅇙漸漸破出紫黑血候乾貼磨風膏脂瘡上自然好也日逐脚上如數百條蛇自足而出此其効驗如患足疾之人脚後有條筋直凑腎囊疼痛拘攣用妙香散一貼分作三二服空心食前温酒鹽湯下自然伸也拈痛散出御藥院方治肢節疼痛熨烙藥羌活去蘆頭獨活去蘆細辛去苖肉桂去麄皮防風去蘆白术川烏生去皮臍良薑剉麻黄不去節天麻去苖吳茱茰生用葛根乳香另研川椒去子井閉口者全蝎生用當歸各一兩去苖川薑生用半兩右為麄末入乳香匀炒一十錢痛甚者加至十五錢同細鹽一處炒令極熱用絹袋内貯藥熨烙痛處不拘早晚頻用為効如藥冷即再炒一次用畢其妙藥不用薏苡仁散治濕傷腎不養肝肝自生風遂成風濕流注四肢筯骨或入左肩髃肌肉疼痛漸入左指中薏苡仁一兩當歸酒浸人參川芎白术羌活川烏炮去皮臍桂心防風去蘆茵芋炒麻黄去根節乾薑炮獨活甘草炙各半兩右為細末每服二錢空心臨卧酒調下日三服徐神翁神効地仙丹治筋骨疼痛打撲傷損仙术湯送下除寒濕進飲食神効川烏一個炮製草烏五個炮製白芥去根半兩蒼术半兩米泔浸一宿炒白芷半兩自然銅一研地龍没藥各半兩研乳香半錢研萵苣種黄𤓰種稍𤓰種木鼈子各一錢半兩錢二文右為末醋糊丸如桐子大每服十丸食後温酒送下虎骨丸治經絡凝澁骨節疼痛筋脉攣急遇隂寒愈痛南乳香别研没藥另研赤芍藥熟地黄虎脛骨酥炙黄當歸各一兩血竭五錢右為細末用木𤓰一枚切破去子入乳香在内以麻縷紥勿令透氣好酒二升煮至酒盡取木𤓰去皮研如泥更入熟蜜少許杵和為丸如桐子大每服三十丸至五十丸病在上食後在下食前温酒下治骨節疼痛煩不得屈伸近之則痛短氣得汗出或欲腫者桂四兩术三兩甘草二兩右用水六升煮取三升分三服汗出愈治卒得胸痛瘥而復發者取薤根五觔搗絞汁飲之立止加減當歸飲子治肩忽疼防風當歸柴胡生地黄大黄各一兩半芍藥人參黄芩各一兩甘草一兩二錢黄連五錢滑石六兩右為散以白水煎服無時活絡湯治風濕臂痛諸藥不効者此方專主之白术薄切一兩當歸淨洗薄切乾秤羌活淨洗去蘆切焙獨活淨洗甘草炙川芎各半兩右剉散每服三大錢水一盞半薑五片慢火煎至一盞去滓温服並滓不拘時候一方用蒼术切炒川白芷各二兩為末每服二錢酒調趁痛丸治腰臂痛五靈脂赤芍藥各半兩川烏一個没藥四錢麝香一錢右為末酒糊丸空心温酒送下葉氏方十味剉散治中風血弱臂痛連筋及骨舉動難艱此藥亦補心益血氣養筋生力附子三兩炮去臍皮當歸去土洗切黄耆炙白芍藥各二兩川芎不見火防風去蘆白术各一兩半肉桂去麄皮一兩不見火茯苓熟地黄洗淨用少酒熬乾焙之各七錢半右修製了再稱㕮咀每四錢水一大盞薑八片棗三枚擘開煎七分去滓通口服食後臨睡日三服温覆厚衣將養一方去黄耆熟地黄用當歸去蘆净洗乾焙白芍藥川芎白术人參附子白茯苓桂心川獨活防風甘草細剉每三錢薑八片水一盞半煎八分去滓食前服除寒邪益血氣名川獨活湯製地黄法須洗淨以好酒浸令乾焙之五靈脂散治臂脾痛五靈脂荆芥穂防風羌活獨活甘草節穿山甲骨碎補草烏各五錢麝少許右為末用温酒調下臨睡服如渾身損痛加没藥木香酒調下空心芎活湯治水飲停蓄注於脾脉發為臂痛皆因脾土有虧平日多飲水漿不能傳化所致川芎半夏湯洗白茯苓獨活陳皮枳殻去穰炒各半兩白术甘草各一分右為散每服三錢水一盞半生薑五片同煎去滓食後少停温服舒經湯一名五痺湯出澹療方治臂痛不能舉有人常苦左臂痛或以為飲或以為風為温諸藥悉投繼以針艾俱不効得此方而愈盖是氣血凝滯經絡不行所致非風飲非濕腰以下食前服腰以上食後服片子薑黄四兩無則用嫩莪术代甘草一兩炙羌活一兩海桐皮去麄皮當歸赤芍藥白术各二兩右㕮咀每服三錢水一鍾半生薑三片磨沉香水少許同煎服之陳氏經驗方云沈自聞嘗苦此臂痛或以為飲或以為風濕諸藥悉投繼以針艾俱不効一日見陳君卿云亦常患此徳清尉傳一方云可三服而愈盖是血氣留滯經絡不行所致非風非飲非濕非氣但其方只前四味止能治腰以上疾若腰以下則不及也後見王伯舉因話及此伯舉云吾有方謂之五痺湯又添後三味腰以下疾則食前服腰以上疾食後服一名白术薑湯獨活湯治病人胷背相引而痛者此為衛不和也獨活四兩葛根桂枝芍藥防風甘草乾薑各二兩右件㕮咀以水一斗先煮葛根減三升去上沫内諸藥煮取二升去滓温服一升覆取微汗似若病止宜消散者服湯則無汗而解若咽痛而渇加括蔞二兩或欬或嘔者加半夏二兩惡熱藥者去乾薑面赤齗痛者加鷄蘇二兩水増二升治皮肉痒痛用酒二升水五升茱茰子半升煎取三升去滓微暖洗立止治關節疼痛蒲黄八兩附子一兩炮右為末服一錢匕日三稍増至方寸匕茯苓丸出仁存方若臂痛不能舉手或左或右時復輪移由伏痰在中内脘氣滯脾氣不流行上與氣摶四肢屬脾滯而氣不下上行攻臂其脉沉細者是後人謂此臂痛乃痰證也作痰治無不効者白茯苓一兩半夏二兩枳實一作枳殻風化朴硝各半兩右為末薑汁糊為丸如梧桐子大每服三十九丸薑湯下食後服累有人為痰所苦夜間兩臂常若有人抽撁兩手戰灼至於茶盞亦不能舉只以此藥治之皆隨服隨愈世間所謂痰藥未有如此之神妙也調氣丸出指南方牽牛末一兩陳皮半兩青皮一分右為細末麵糊丸如桐子大每服十丸薑湯下理氣湯出指南方半夏五兩橘皮四兩官桂三兩人參二兩甘草一兩右為麄末服五錢水三盞薑十片煎一盞去滓服栢子仁丸出指南方栢子仁炒黄耆茯苓楮實五味子覆盆子附子石斛鹿茸炙去毛酸􅀥仁枳實官桂沉香地黄等分右為細末煉蜜丸如桐子大每服三十丸米飲下天麻除濕湯一名白术散出楊氏家藏方治濕留肢節身體煩疼手足腫痛或時麻木白术四兩天麻三兩人參去蘆頭三兩乾薑二兩全蝎二兩用糯米一盞炒黄色去糯米不用附子生去皮臍切開取生薑自然汁一盞浸一宿取出炙盡元浸薑汁為度薄切秤二兩右件為細末每服三錢空心温酒調下食前天仙散出楊氏家藏方治遍身麻木腰脚疼痛節急骨疼天仙子草烏頭生去皮臍蛇床子牡蠣煆乾薑炮以上五味各半兩右件㕮咀平分作兩次每用水五升煎五七沸淋㳿以被盖之汗出是驗臂痛多曰風其脉濡而來反急明其濕用出永類鈐方蒼术附子各等分木香一分薑煎帛盖屋上露星一宿次日重湯煖服愈麻黄湯煎出東垣試効方治隂濕中汗出懶語四肢困倦無力走注疼痛乃下焦伏火而不得伸浮而躁熱汗出一身盡痛盖氣濕相摶也以升陽發汗漸漸發之在經者亦宜發汗如正值季春之月脉緩而遲尤宜發汗令風濕去而陽升以此困倦乃退氣血俱得生旺也麻黄二錢去節微硏不令作末水五大盞煎令沸去沫煎至三盞入下項藥再煎黄耆白术半錢人參半錢甘草三錢羌活一錢柴胡根半錢防風半錢杏仁三個去皮黄栢一錢生地黄半錢一方無白术人參甘草羌活右剉如麻豆大都作一服入麻黄湯煎至一盞臨卧服之勿令食飽取漸次有汗則効治背氣發作攻背并兩臂兩脇忽攻腰坐卧不安出䕶命方枳殻二兩去穰巴荳半兩去皮膜右件於鐺内熬炒令香熟去巴荳不使却入沉香甘草各一分同杵為末空心葱湯調下半錢不轉第二度加服一錢治一切男子女人忽然身體勞倦四肢百節疼痛大腑秘熱小便黄赤出䕶命方升麻山梔黄芩麥門冬去心柴胡去心牡丹皮去心貝母去心虎杖山茵陳木香大黄杏仁麻黄去根各一兩右為細末每服二錢水一盞煎一服後卧和滓徐熱喫沉香鱉甲散出直指方治勞倦身痛沉香人參牛膝茯苓秦芃木香黄耆微炙熟附子辣桂去麄皮鱉甲浸去裙襴醋炙黄各一兩柴胡荆芥各半兩巴㦸去心當歸半夏製𦍑活熟地黄洗酒煎蒸七錢半全蝎三錢半大肉豆蔲四箇右為末每二錢葱白二寸薑三片􅀥二枚食前煎服温酒調下尤妙治渾身走注疼痛及顛撲閃肭痛出衛生家寳方每用晚蠶沙一升分二處每用鹽二兩各炒熱右用絹帛包熨痛處冷即易之昔楊惜患背腫馬嗣明以煉石塗之便差煉石法以麄黄色石如鵝鴨卵大猛火燒令赤内醇醋中自有石屑落頻燒至石盡取屑曝乾搗篩醋和塗腫上無不愈出澹療方治氣滯風壅手臂脚膝痛出本草以醋糟裹之兩易當差百一選方云治臂腿之間忽一兩㸃痛著骨不可忍者芫花根一味研為細末米醋調隨大小傅之立止廬州郭醫云此是陶成一醫者方曽治一婦人産後而得此疾者良驗但敷貼不住須以紙花覆其上用絹綿繫定也治身體手足腫出本草驢脂和鹽傅之治臂腕痛出本草取死蝮蛇一條以水煮取濃汁浸腫冷痛易之治四肢疼痛出本草用山龍膽草根細剉用生薑自然汁浸一宿去其性烘乾搗水煎一盞許温服之治身體手足腫卒大出本草用醋和蚯蚓屎傅之治身脚酸疼兼微腫出本草治身體手足卒痛腫出本草用搗蒼耳傅之立効春用心冬用子又方以烏麻五升熬碎之酒一升浸一宿隨多少飲之腰痛附論凢腰痛有五一曰少隂少隂腎也十月萬物陽氣皆衰是以腰痛二曰風痺風寒著腰是以腰痛三曰腎虚役用傷腎是以腰痛四曰腎腰墜墮傷腰是以腰痛五曰取寒服地氣所傷是以腰痛痛不止引牽腰脊皆痛大抵腰痛之脉皆沉弦而緊者寒弦而浮者風沉弦而濡者濕又有墜墮閃肭氣血凝滯而痛者脉多沉弦而實盖諸經皆貫於腎而絡於腰脊腎氣一虛丸衝風受濕傷冷蓄熱血瀝氣滯水積墮傷與夫失志作勞種種腰疼疊見而層出矣衝風者汗出乗風風邪風毒之胵胎也受濕者踐雨卧濕重著腫滯之萌蘖也腰間如水為傷冷發渇便閉為蓄熱血瀝則轉側如錐之所刺氣滯則欝悶悶而不伸積水沉重則小腸不得宣通墜損傷則瘀血為之凝結閃挫失志者腎之戕舉是數證腎家之感受如此腰安得而不為痛乎内經曰腰者腎之府轉搖不能卧將憊矣審如是則痛在少隂必究其受病之源而處之為得然宗筋聚於隂器肝者腎之同系也五臟皆取氣於殻脾者腎之倉廩也鬱怒傷肝則諸筋縱弛憂思傷脾則胃氣不行二者又能為腰痛之冦太陽腰痛引項舂尻骨如重狀陽明腰痛不可以顧則如有所見善悲少陽腰痛如針刺其皮循循然不可俛仰不可以顧太隂腰痛煩熱腰下如有横木居其中甚則羸瘦少隂腰痛痛引舂内厥隂腰痛中强弩弦狀此舉六經以為外因治備大抵太陽少隂多中寒少陽厥隂多中風熱太隂陽明多燥濕以數推之當隨脉别其如經中有解脉散脉同隂㑹隂陽維衡絡直陽飛陽肉里尻交等宂皆不出六經流注但别行各有所主不欲繁引請尋内經刺腰痛論以備明之准此從所因汗不施治失志傷腎鬱怒傷肝憂思傷脾皆致腰痛者以肝腎同系脾胃表裏脾滯胃閉最致腰痛其證虚羸不足面目黧黑逺行久立不能盡失志所為也腹怠脇脹目視􅉩所祈不得意滛於外宗筋弛縱及為白淫鬱怒所為也肌肉削弱痺而不仁飲食不化腸胃脹滿閉墜腰脇憂思所為也准此從内所因調理施治腎著腰冷如水身重不渴小便自利食飲如故腰以下冷重如帯五千錢因作勞汗出身衣裏冷濕久久得之䐴公對切腰痛者傴僂腫重引季脇痛困於墜墮惡血流滯及房勞疲力耗竭精氣致腰疼痛准此從不内外因補瀉施治夫腰痛者属乎腎也多因勞後傷腎臟氣空風寒冷濕得以襲之鬱怒憂思得以傷之皆致腰痛但墜墮閃肭血氣凝滯而痛者未有藥也葳靈仙丸主之今人每患腰痛不問空實多進牽牛之藥殊不知牽牛之為性能傷腎氣服之未見作効腎氣先有虧損矣倘的是氣滯腰痛進三服則可如服之不効用橘核入鹽炒浸酒放温送下小七香丸最佳頭看不上面自有竒功萬一腎虛腰痛牽牛豈宜服也謹之謹之一男子六十餘病腰尻脊胯皆痛數載不愈盡靜夜躁大痛徃來屢求自盡天且夕其痛作必令人以手搥擊至五更鷄鳴則漸減向曙則痛止左右主病者皆作鬼神隂譴白虎齧朝禱暮祝覡巫僧道禁師至則其痛以減又夢鬼神戰鬭相擊山川神廟無不祭者淹延嵗月肉瘦皮枯飲食減少暴怒日増惟候一死有書生曰既云鬼神虎齧隂譴之禍如此禱祈何無一應聞陳郡有張戴人精於醫可以問其鬼神白虎與病乎彼若術窮可以委命其家從之戴人診其兩手脉皆沉滯堅勁力如張絙謂之曰病雖瘦難於食然腰尻脊胯皆痛者必大便堅燥其左右曰有五七日或八九日見燥糞一兩塊如弹丸結硬不可言必令人剜取之彊下一兩塊渾身燥痒皮膚掲破枯澁如麸片戴人既得病之虚實隂用大承氣湯以薑棗煎之加牽牛頭末三錢不敢書是瀉劑盖病者聞煖則悦聞寒則懼説補則從説瀉則逆此蔽非一日也及煎成使稍熱咽之從少至多累至三日天且晩臟腑下泄四五行約半盆以燈視之皆燥糞碎塊及瘀血雜腥穢不可近須臾痛減九分昏睡鼻息如常睡至明日將夕覺飢而索粥食温凉與之又困睡一二日其痛盡去次令飲食調養日服導引丸甘露散滑利便溺之藥四十餘日乃復靈樞經謂刺與㽲雖久猶可拔而雪結與閉雖久猶可解而决夫腰脊胯痛者足太陽膀胱經也胯痛足少陽膽經之所過也難經曰諸痛為實内經曰諸痛痒瘡疾皆屬火注曰心寂則痛㣲心燥則痛甚人見巫覡僧道禁師至則病稍去者心寂也然去其後來者終不去其本也古之稱痛隨利減不利則痛何由去病者既痊夀至八十嵗故凢燥證皆三陽病也北人衛德新因之析津冬月飲寒致冷病腰常直不能屈伸兩足沉重難於行歩塗中以床舁遞程程問醫皆云背虛凢蓯蓉巴㦸附子鹿茸皆用之大便反秘潮熱上周將經嵗矣乃求拯於戴人曰此疾十日可取效衛曰效則不慮遲戴人曰是太陽經血多病則腰似折􅀈如結腨如裂太陽所至為屈伸不利况腰者腎之府也身中之大闗節今既强直而不利宜醎以耎之數服則和柔矣難經曰强力入房則腎傷而髓枯竭鬲胃乃壊而不用與此正同今君之證太陽為寒所逼血隧下滯腰間當必有積血非腎也節次用藥利數十行約去血一二十次以四面玲瓏竈蒸之汗出三五次而愈初蒸時至五日問曰腹中鳴否徳新曰未也至六日覺鳴七日而起已能揖人戴人曰病有熱者勿蒸蒸則損人目也今子病腰腎久衰視聴半失此隂氣乗陽而上氣短精神不足且肺弦皆陽氣衰弱伏匿於隂中故爾癸卯嵗六七月間因雨隂寒踰月不止時人多病泄利乃濕多成五泄故也一日體重肢節疼痛大便泄併下者三而小便閉塞黝黒内經云在下者引而㵼之是先利小便也又云諸瀉而小便不利先分利又云治濕不利小便非其治也皆當利其小便必用淡㵕之劑以利之下其法也今客邪寒濕之勝自外入裏而甚暴若以淡㵕之劑以舒之病雖即已是降之又降復益其隂而重竭其陽也則陽氣愈削而精神愈短矣隂重强而陽重衰也兹以升陽之藥是為宜爾羌活獨活升麻各一錢防風炙甘草各半兩同㕮咀水三盞煎至一盞去滓熱服一服乃愈夫經云寒濕之勝助風以平之又曰下者舉之此得陽之升勝故愈也是因曲為直也夫聖人之法可以類推舉一則可以知百矣方專治腰疼方香白芷紅麯各二錢半右為末空心温酒調服麻子方治風水腹大臍腰重痛不可轉動用冬麻子半升碎水研濾取汁米二合以麻子汁煮作稀粥著葱椒薑䜴空心食之萆薢湯治腰痛動轉難艱似有氣注萆薢一兩半當歸切焙一兩桔梗炒一兩半牡丹皮一兩黄連去鬚一兩杏仁湯浸去皮尖雙仁炒十枚附子炮裂去皮臍二兩代赭一兩半桑白皮剉炒一兩半貫衆一兩大腹皮一兩半桂去麄皮白茯苓去黒皮覆盆子去梗黄芩去黒心各一兩吳茱茰先焙炒半兩草豆䓻去皮一枚桃仁湯去皮尖雙仁十枚蛇床子炒一兩半乾薑炮半兩大𤓰去皮子焙乾一兩右剉如麻豆大每五錢匕水一盞半煎一盞去滓空心温服杜仲酒出聖恵方治腎脉逆小於寸口膀胱虚寒腰痛胸中動通四時用之方通治五種腰疼杜仲乾薑各四兩一云乾地黄萆薢𦍑活天雄蜀椒桂心芎藭防風秦芃烏頭細心各半兩五加皮石斛各五兩栝蔞根地骨皮續斷桔梗甘草各一兩右㕮咀以酒四斗浸四宿初服五合加至七八合日再通治五種腰痛獨活寄生湯出和利方夫腰痛皆由腎氣虛弱卧冷濕地當風所得不得過治善流入脚膝為偏枯冷痺緩弱疼重或腰痛攣脚重痺弱或皮肉紫破有瘡者宜服之秦艽去土茯苓去皮白芍藥桂心不見火杜仲裂炒斷絲桑寄生録驗用續斷無寄生細辛去苖土洗牛膝酒浸去蘆防風去蘆各二兩甘草各半兩人參熟地黄當歸各二兩獨活三兩右為散每服四大錢水二盞煎七分去滓空心服氣虛不利或中脘不快者除地黄加生薑婦人新産腹痛不得動轉及腰脚攣痛痺弱不得屈伸此湯最除風消血肘後有附子一枚無寄生人參甘草當歸近人將治厯節風并脚氣流注甚効一方有生薑煎服湯取蒴藋葉火燎厚安蓆上及熱眠上冷復燎之冬月取根春取莖燎火卧之佳其餘薄熨不及蒴藋蒸為愈也諸處風濕亦用此法獨活湯出試効方治因勞役得腰痛如折沉重如山羌活防風獨活肉桂煨大黄澤㵼各三錢桃仁五個當歸稍連翹各半兩甘草炙二錢防已黄連各一兩一方用黄蘖酒製無黄連右㕮咀每服半兩酒半盞水一盞半同煎去滓熱服立愈巴㦸丸治諸腰痛或腎虚冷腰疼痛隂痿乾漆熬煙絶巴㦸天去心杜仲牛膝各十二分桂心狗脊獨活各八分五加皮山茱茰乾薯蕷各十分防風六分附子四分右煉蜜為丸如梧桐子大空心腹酒下二十丸再加減以止為度調肝散出直指方治鬱怒傷肝發為腰痛半夏製三分辣桂宣木𤓰當歸川芎牛膝好細辛各二分石菖蒲酸􅀥仁湯浸去皮㣲炒甘草炙各一分右剉細每三錢薑五片􅀥二枚煎服牛膝丸牛膝酒浸萆薢杜仲剉炒蓯蓉酒浸兎絲子防風葫蘆巴炒桂減半破故紙沙苑白蒺藜等分右為末酒煮猪腰子為丸每服五七十丸空心温酒下如腰痛不起者服甚効神應膏藥治貼腰痛川烏馬藺子官桂乾薑杜仲木鼈子去殻絲油另研五錢没藥五錢另研乳香三錢另研破故紙炒五錢右細末醋糊調藥末敷貼腰上紙盖綿帛拴住日换三二次牛膝酒一名海桐皮酒出醫方大成治腰膝痛不可忍庸醫以腎傷風毒攻刺服之步履漸重均州刺史王紹顔云余患腰痛不可忍醫以腎臟風毒攻刺諸藥莫療因服此劑便減五分步履便輕牛膝川芎羌活地骨皮五加皮薏苡仁各一兩甘草生地黄十兩海桐皮二兩右剉散帛裹入無灰酒二斗浸冬二七日夏七日分數服旋浸三五宿每服一盃日三四盃長令酒氣不絶為佳一法加杜仲一兩炒絲斷用之尤妙合時不用添減禁毒食木香丸治腰痛沉重腹肚不能轉動木香半兩㯽榔剉桂去麄皮附子炮裂去皮臍萆薢芍藥郁李仁去皮别研如膏各二錢右為末煉蜜丸如梧桐子大每服二十丸温酒下空心日午夜卧服微利為効小七香丸出危氏方治鬱怒憂思氣滯腰疼因閃攧撲甘松炒十一兩甘草炒十五兩香附子炒去毛十五兩丁香皮十五兩蓬莪术煨乗熱碎二兩半縮砂仁二兩半益智仁炒七兩半右為丸每服五十丸橘皮一錢鹽少許煎湯空心服或用沉香降氣湯打和勻氣散服治腰痛牽引足膝脚膕痿用如神出經驗良方杜仲薑汁炒去絲續斷黒牽牛破故紙炒桃仁炒去皮尖𤣥胡索各等分右為細末酒煮麵糊丸如梧桐子大每服五七十丸湯酒任下加胡桃肉同丸為妙治腰疼穿山甲一錢火煨花錫一錢研末水銀一錢乳香一錢萆麻子七枚麝香少許右各研為細末用谷樹漿合成小銅錢大貼之治氣滯腰痛出經驗良方陳赤麴生薑焙乾骨碎補薄切去毛大茴香各等分右為末每服二錢空心熱酒調下治腰痛不得立方出千金方甘遂桂心一作附子杜仲人參各二錢右為末以方寸匕内羊腎中炙令熟服之治腰疼痛用轉下膿水黒牽牛炒白术各一分桑白皮一兩木通半兩右為細末每服三錢茶清調下四更時服轉了粥補寄生散治腰痛桑寄生切炒牡丹皮鹿茸酒浸炙各半兩桂去麄皮半兩右為細末每服二錢温酒調下空心日午夜卧服一方出海上方治腰痛金毛狗脊生鼈甲醋炙赤牛膝草根葉下數根赤紅長生不死草各等分右㕮咀以水同煎服葳靈仙丸一名定痛丸出經驗良方治氣滯腰疼葳靈仙去土半兩金櫻子去核一兩剉碎炒焦舶上茴香半兩川烏炮去皮臍一兩右為細末酒煮麵糊為丸如梧桐子大每服二十丸空心温酒下食前二服為効治血瀝腰痛用續斷牛膝桃仁炒煎湯磨沉麝丸下白术散出十便良方治腰痛隂然以熱物著痛處即少寛此由久處卑濕復感風邪傷於足太陽之經與血氣相摶診其脉緩澁並宜服之白术二兩芍藥三兩官桂一兩半附子半兩右為細末每服二錢空心酒調服余居士史載之指南方嚴州公庫有版療腰疼痛下膿水石鹽一方作食鹽乾薑杏仁去尖醬瓣各等分右為末以綿裹導之六七過下膿水腰下疼痛差止一方無醬瓣牛膝散療腰腎病膿水并治停水腰痛牛膝六分㯽榔仁十枚防已六分牽牛子八分炒右為散空腹以酒下三錢以宣瀉即差如利三五行即少投醋於下内慎生冷油膩蒜等物後以補腎氣湯丸投之可治腰痛不可忍者出海上方芸薹炒菴䕡子橘子仁各等分右為細末每服二錢酒一盞煎至七分空心熱服治腰痛单方出徳生堂官桂𤣥胡索杜仲去皮炒絲斷等分右為細末每服三錢空心熱調下杜仲酒治腰痛杜仲去麄皮丹參各八兩芎藭五兩右細剉用酒一斗五升浸五日為滿隨性多少温飲當歸丸出仁存方治腰痛不可轉側如錐刀所刺大便黑小便赤澁或黑此血汗滯於腰間謂之血瀝腰痛診其脉弦者是也當歸三兩水蛭三十個炒去足桃仁三十箇去皮尖右為細末酒糊丸如梧桐子大每服十五丸漸加至三十丸酒下食前服速効散出經驗良方治男女腰痛不可忍者川楝子取肉巴豆五粒去殻同炒赤去巴豆茴香各一兩鹽炒熟去鹽破故紙炒一兩右為細末每服一錢熟酒調下神應散一名如神湯出家藏經驗方治腰痛神効亦治閃肭滯牽引足膝不能行動𤣥胡索一兩桂心當歸各半兩右為末酒調三錢食前服一方用猪腰子一隻批開摻藥在内濕紙煨熟五更細嚼熱酒下名舒筋散陳氏經驗方云潭人滕珂云北方得於徽之祈門老醫真是如神故以名之葫蘆巴散葫蘆巴杜仲胡椒等分右為細末每服二錢先嚼胡桃二箇食前酒調服治腰疼痛降真香節檀香節沉香節共一兩重右用煎湯空心服腰便不疼治腰如神出徳生堂杜仲炒去絲木香官桂各一兩右為細末每服二錢温酒調下空心此藥活血化氣第一品藥也治腰痛方胡桃肉四兩杜仲四兩補骨脂四兩右㕮咀水煎服熨法延年療腰痛菊花二升芫花二升羊躑躅二升右以醋拌令濕潤分為兩劑内二布囊中蒸之如炊一斗米許頃適寒温隔衣熨之冷即易熨痛處定即差出集騐方治腰疼方草烏頭火燒香五靈脂右用葱心同搗爛丸如小指面大臨卧凉酒下治腰痛單方出百一選方葳靈仙橘核各等分右為細末熱酒調下一方以猪腰子煮食猪肚亦可服藥後忌茶飯兎絲子丸出百一選方治腰痛極有驗效兼治腎虛葳靈仙兎絲子酒浸杜仲去皮炒斷絲各等分右為細末以山藥糊丸如梧桐子大每服五十丸鹽酒或鹽湯下亦得鹿茸丸出百一選方治腰痛鹿茸去毛酥炙微黄附子炮裂去皮臍右各二兩鹽花三分同為細末煮棗肉丸如梧桐子大每服三十丸空心温酒食前下日再服附牛丸一名趂痛丸出仁存方治腰痛亦治閃肭腰痛不可轉側痛不可忍此由勞役用動傷經絡或因從髙墜下氣滯於足太陽之經留而不得行為正氣衝繫而致傷痛附子半兩炮黑牽牛炒止取一頭末右為末酒煮麵糊丸如梧桐子大每服三十丸空心温酒下半邊痛各半生半熟並去皮一方鹽湯下立安散出醫方大成治腰痛杜仲炒去絲臭橘子核各等分右㕮咀用好酒浸春秋三日夏二日冬五日空心温酒令酒熱連藥嚼服或為末麵糊丸梧桐子大温酒下三十丸空心服日三服一方為末入鹽少許酒調服食前茸角丸出千金方治腰疼單方無鹿茸用角亦得鹿角去上尖取白者熬令黄心中黄不中服鹿茸新者良陳者不佳右為末酒服方寸匕日三服特禁生魚餘不忌一方用鹿角屑熬黄酒服透骨丸治男女腰痛腿冷婦人胎冷小膓疼痛不止針砂一兩硇砂半兩右先將硇砂為細末次後共針砂相和一處用冷水拌勻候少痛時用好夾綿紙重包前藥如熱透於痛冷處熨之用罷就攤藥乾治腰疼青木香乳香各二錢右用無灰酒放藥在碗内用酒浸藥於飯甑内蒸得乳香化温服之三日即愈倉卒散治氣滯腰腹間攣急疼痛不可屈伸腹中冷重如石痛難忍自汗如洗手足氷冷久不差垂死方山梔子四十九箇連皮燒半過附子一枚炮去皮臍右為末每服二錢酒一小盞入鹽少許煎七分温服又治胷痞切痛白蒺藜散出御藥院方治腰痛白蒺藜右為細末每服三錢温酒調下空心食前服皂角膏出神効方右用乾酒三大碗皂角一觔去皮弦搗碎熬至一半濾去滓再用前汁入石器熬為膏子隨痛處貼之散滯丸出衛生家寳方治腰痛不可忍者右牽牛不拘多少碾取頭末去滓不用取大蒜每一瓣入巴豆肉一粒在内用濕紙褁定煨令蒜熟去巴豆將蒜研細和牽牛為丸如梧桐子大每服五丸醋茶湯下空心食前量虛實服一方無巴豆硃砂為衣每服二十丸酒下只一服便安治腰痛單方出百一選方用生橘核炒香研入酒去滓下青木香丸治腰痛不可忍者出經驗良方右用破故紙一兩好酒浸一宿去酒入麥麩炒令焦黄黒去麩為末入杏仁桃仁各半兩並去皮尖爛研後用浸藥酒拌麵糊為丸如梧桐子每服二十丸空心鹽湯或酒下治感寒濕與脾氣蔽腰出海上方五積散加桃仁煎空心食前服傷臓人不可服五積散見本類後神麴酒出續易簡方治挫閃着腰痛不能轉側陳久神麴一大塊燒通紅淬老酒去神麴通口呑青蛾丸兩服頓愈一方不用青蛾丸服後仰卧片時効再服治腰痛方風濕轉動不得出十便良方用蒴藋葉火燎厚鋪床上趂熱卧眠於上冷復易之冬月取根舂碎熬及熱凖前用并治風濕冷痺及産婦患傷冷腰痛不得動亦用之治腰疼氣痛五靈脂右為末好酒送下婦人加當歸煎酒調下一二分薑附湯出直指方治體虛傷冷腰痛加官桂製杜仲各五錢食前服方見中寒類敗毒散治風熱腰痛加續斷天麻薄荷木𤓰各等方見傷寒陽語類治腰重疼出肘後方用㯽榔為末酒下八錢或五錢治腰痛出外臺秘要方取黄狗皮炙裹痛腰處取煖徹為度頻即差也治反腰有血痛方出肘後方用搗杜仲三升許以苦酒和塗痛上乾復塗并灸足踵白肉際三壯杜仲酒方治腰背痛用杜仲半觔去皮酒二升浸七日每日三度服之甚妙宋明帝宫人患腰痛牽心發則氣絶徐文白視之曰髪瘕以油灌之吐物如髮引長二尺頭已成蛇能動搖懸之滴唯一髪病即瘥出風科集驗方治腰痛用皺面草研細好酒調下即愈治一切腰痛以安胎飲下保生丸青蛾丸亦妙一方以炒鹽下又方以菴䕡紅麴擂爛好熱酒調下又方以紅麴末熱酒服又方出直指方以茴香根同紅麯擂爛好熱酒調服妙一方只用茴香根擂爛好酒調下立愈雪溪𫝊甚妙一方用八角茴香炒末食前温酒調下又方以蒼术紙裹入小火内煨過待冷刮去皮為末每服三錢酒一盞調服之療腰痛大豆方出聖恵方用大豆六升拌令温炒令熱以布褁隔一重衣熨痛處令煖氣徹冷即易之切須避風仍取白楊皮濃煎汁洗濯之甚佳治氣滯腰痛出直指方用人參順氣散烏藥順氣散加五加皮入少甘草煎湯調下或用木香流飲立効方見風門風類氣門氣類安腎丸治腎虛腰疼橘皮鹽煎湯呑加萆薢尤佳獨活續斷湯療腰痛皆氣虛弱卧冷濕地當風所得不時差久久流脚膝冷痺疼弱重滯或偏枯腰脚疼攣脚重急痛獨活三兩續斷二兩杜仲二兩桂心二兩防風二兩芎藭三兩牛膝二兩細辛二兩秦艽三兩茯苓二兩人參二兩當歸二兩芍藥二兩白者乾地黄甘草各三兩炙右以水一斗煮取三升分三服温服將息勿取冷用蒴藋葉火燎厚安床上及熱卧上冷即易之冬月取根搗用亦須熬之忌蕪荑生葱生菜海藻菘菜酢物肘後有附子無續斷甘草牛膝人參當歸止十二味神仙磨腰丹駱冲虚𫝊頭丹腰下如火二丹知血脉流通三丹骨髓盈實十丹永無非横之患修合之時宜於淨室中切忌婦人鷄犬見婦人不生子者十丹則血臟煖成胎孕附子炮去皮白礬燒灰丁香研硃砂研硫黄研陳皮去白乾薑炮為末吳茱茰為末杏仁去皮尖木香為末麝香一錢别研膩粉一錢别研右除麝香膩粉各淨秤一兩為末併入乳鉢内為末粉麝一處研入極細蜜為丹如中指大每一丹丸用生薑秤七錢取自然汁於銀石器煎五沸傾於盞内投藥良久以手指研極細勿令有砂用手􅀢磨腰間逡巡如火熱以盡為度便將軟熟褁肚上下繫定隔日不須解善療男子婦人水臟久虛五勞七傷衰弱鬢髪早白腰膝疼痛婦人水臟久虛血散子宫耳聾目暗穢惡之病風勞等證並治之療男子患腰腎疼痛髀膝有風冷耳鳴食飲無味幷有冷氣方乾地黄四兩茯苓三兩白术二兩澤㵼三兩山茱茰三兩蓯蓉二兩五味子三兩桂心二兩石斛二兩巴㦸天三兩防風二兩人參二兩磁石二兩研右為末蜜丸如梧桐子大酒下二十丸日再忌桃李雀肉生葱酢物蕪荑治腎虛氣衰腰脊痛疼或當風卧濕冷入頭中不速治流入膇膝為偏枯冷痺緩弱宜速治之方出肘後方獨活四分附子一枚大者炮杜仲茯苓桂心各八分牛膝秦艽防風芎藭芍藥各六分細辛五分乾地黄十分切右水九升煎取三升空腹分三服如人行八九里進一服忌如前項服三劑三至丸出澹療方治老人虛弱人腎氣虛損腰痛不可屈伸鹿角鎊三兩麋角鎊二兩附子炮去皮臍桂心不見火補骨脂炒各一兩杜仲去皮剉炒㫁絲一兩鹿茸酒蒸焙一兩青鹽另研半兩右為末酒糊丸如梧桐子大每服七十丸空心用胡桃肉細嚼以鹽酒鹽湯任下惡熱藥去附子加肉蓯蓉一兩酒浸微炙乾用療腰痛少氣隂弱寒冷小便清冷瀝滴隂下濕癢少腹急無子息方甘草十分炙續斷三分麥門冬三分薯蕷三分附子三分炮乾薑三分棘刺四分右為末酒服方寸匕日三忌猪肉冷水海藻菘菜必効一方無乾薑木𤓰丸出御藥院方治腰痛補益壯筋骨牛膝二兩温酒浸切焙木𤓰一枚去頂穣入艾葉一兩蒸熟巴㦸去心茴香炒木香各一兩桂心半兩去皮右為細末入熟木𤓰并艾同杵千下如硬更下蜜丸如梧桐子大每服二十丸空心鹽湯下腎氣丸主短氣腰痛身重調中補筋脉不足方乾地黄續斷人參各五分萆薢阿膠炙各三分右為末蜜和丸如梧桐子大每以酒下十丸加至二十丸日再服忌蕪荑生冷杜仲丸出千金方補方杜仲一兩石斛二分乾薑乾地黄各三分右為末蜜丸如梧桐子大每服二十丸日再酒送下萆薢散出千金方治腎虛腰痛萆薢桂心白术各三分牡丹皮三分右為末酒服方寸匕日三亦可作湯服之甚良一方入鹽少許杜仲散出徳生堂治腎虚腰疼痛俛仰惙惙短氣此由腎氣虛弱勞傷過度杜仲一両去皮杵令爛以名酒浸一宿焙乾肉桂牡丹皮各半兩右為細末每服二錢温酒下治腎虛腰痛方出聖恵方附子二分桂心牡丹皮各一兩右為末酒服一方無桂亦驗寄生散療氣腎腰痛桑寄生鹿茸炙杜仲各一分右為散酒服方寸匕日三服青蛾丸出醫方大成治腎氣腰痛益精助陽烏鬚髪去風濕脚氣常服壯筋補虛破故紙四兩炒香杜仲去麄皮剉四兩用右為細末用胡桃肉三十箇研膏入少熟蜜丸梧子大每服五十丸每日服食前下青蛾丸出如宜方治腎虛勞力腰疼益精助陽烏髭徤脚神効破故紙四兩炒香杜仲去麄皮切薑汁拌炒去絲八兩右為末用胡桃肉五十枚大蒜二十箇研膏如梧桐子大每服三十五丸鹽湯服虛極人十補湯呑服一方加川續斷桃仁去皮尖𤣥胡索黒牽牛炒酌量入十補湯方見虚勞門虛損類鹿茸丸出百一選方治腎氣虛弱腰痛鹿茸三兩切作片子酥炙黄右為細末酒糊為丸如梧桐子大每服三十丸鹽湯下食後治脇下痛用葱白煎湯調滑胎枳殻散服方見婦人門滑胎類摩腰膏治老壯一切腰痛痼冷腿脚寒濕此治之大壯筋骨助元陽極有補益用之自見陳皮去白一兩陽起石五錢乾薑沉香官桂去麄皮舶上硫黄吳茱茰雄黄蛇床子以上各五錢枯白礬一兩杏仁一兩去皮尖輕粉一錢麝香一錢半附子一個須一兩者炮去皮臍母丁香一兩硃砂一錢二分右除輕粉朱砂麝香另研外餘藥併為細末後入上三味和勻煉蜜丸如弹子大臨用時取生薑自然汁煎濃後入藥一丸良久浸化研之令人手蘸藥塗於腰腹上摩之以盡為度須用綿褁肚褁腰上其熱如火每日一次用之極有竒功薏苡仁丸出醫方大成治腰脇疼痛手足枯瘁薏苡仁一兩石斛用細者七錢半附子半兩牛膝桃仁各一分一作椒仁生乾地黄各二分細辛人參甘草栢子仁枳殻川芎當歸各半兩右為末煉蜜丸如梧桐子大每服四十丸酒呑下空心日三服芎葛湯出本事方治脇下疼痛不可忍者桂枝川芎細辛乾葛防風各半兩芍藥枳殻麻黄人參甘草各一分右㕮咀每服五錢水一盞薑三片煎七分温服枳實散出醫方大成治兩脇疼痛肝氣不足枳實一錢白芍藥川芎各一兩人參各半兩右為末空心薑􅀥湯調服二錢酒亦可一方薑鹽湯服推氣散出危氏方治右脇疼痛腹滿不下食枳殻炒半兩桂片薑各半分甘草三錢右為末每服二錢薑􅀥湯調酒亦可不拘時枳芍散出醫方大成治左脇刺痛不可忍枳實炒川芎半兩甘草二錢半右為末每服二錢薑􅀥湯下不拘時酒調亦可治一切走疰疼痛氣攻腰脚攣急者出經驗濟世方黑五虎脂大香附子各等分右為末醋糊丸蠶豆大每服十二丸丈夫鹽湯婦人醋湯下桃仁酒出經騐良方治腎虛風勞傷腫牽引小腹連腰痛用桃仁一味麩炒去皮尖研細每服四錢熱酒調下得汗愈順氣丸出如宜方治腰膝無力大腸閉則痛發膝下似水冷大黄五兩半生半熟車前子㯽榔麻仁炒牛膝酒浸郁李仁湯去皮兎絲子酒浸蒸山藥山茱茰防風枳殻獨活各二兩右為末蜜丸如梧桐子大茶酒米湯任下此藥補益通利疏風順氣又方出海上方治腰痛及遍身酸疼者金橘子仁炒令黄色去殻為末每服三錢温酒調下不拘時服治腰脊善痛不遂方出千金方用大豆三升熬一斗水煮蒸一斗酒以六斗甕一口蒸令極熱蒸豆亦熱内甕中封閉口秋冬二七日於甕中作孔出取服五合日夜二三服見効一方用生大豆二升酒三升煮取二升頓服佳又方出千金方用地黄花為末酒服方寸匕日三又方出千金方用三月三日收桃花取一斗一升井花水三斗麴六升依數用之同入米六斗炊之一時釀熟去糟每服一升日三服若作食飲用河水治急引腰脊痛出本草用蒺藜子為末蜜和丸酒服如胡豆大二丸日三服封臍艾治腰膝痛臍腹冷痛老人弱婦人小兒泄瀉并宜用之每日熨烙為効海艾蛇床子各半兩木鼈子二對生用去殻右為細末與艾三味相和勻作一紙圏於内可以容熨斗將藥可用綿包褁定安在紙圏内在於臍上用熨斗熨之治腰臍坎痛用猪腎一對研着胡椒橘皮鹽醬椒末等搜麵似常法作餛飩熟煮空腹與兩碗差專治腰痛方阿魏乳香菖蒲達達茴香各五錢乾薑五錢右為末煉蜜為丸如梧桐子大每服六十丸好酒空心送下熟鷄蛋壓之便食飲忌醋治腰痛方出海上方方見風濕腰痛類萆薢酒方治腰痛神妙出本草用破故紙為末温酒下三錢治積年久病腰痛有時發動脇疼如打出肘後方六月七月取地膚子乾末酒服方寸匕日五六服二香五子三茱丸出永類鈴方治腰痛青木香半兩大腹子一兩川楝子肉三兩香附子炒一兩蘿蔔子炒二兩黑牽牛三兩半生半熟八角茴香半兩炒去子吳茱茰食茱茰山茱茰去核各三兩右為末酒糊丸空心温酒鹽湯下補髓膏出衛生家寳方治腰痛破故紙一兩鍋内炒令八分熟再入麻油半兩同炒麻油香為度右放冷入胡桃内同煎藥并油麻爛嚼鹽酒或鹽湯送下五加皮散出衛生家寳方治腰疼五加皮杜仲炒右等分為末酒糊丸如梧桐子大每服三十丸温酒下内補散出衛生家寳方治逺年近日腰疼丈夫婦人腎臟久虛腰疼不可忍者青皮去穰秤破故紙炒葳靈仙去蘆洗焙以上三味各一兩黑牽牛三兩右為細末每服二錢温酒調下空心食前川烏丸出朱氏集驗方治男女腰脚滯重川烏當歸杜仲骨碎補五靈脂右等分酒糊為丸空心酒下牽牛散出朱氏集驗方治腰痛神妙黑牽牛不拘多少攤熱瓦上勻鋪不可撥動盖欲半生半熟右為末酒調加茴香尤佳又方出朱氏集驗方治風腰痛最妙小續命湯加桃仁七粒炒去皮尖煎服川芎肉桂湯出誠効方治腰痛丁未冬曹通甫自河南來有役夫小翟靈君卧寒濕地腰痛不能轉側兩脇搐急作痛已經月餘不愈矣腰痛論中說皆為足太陽足少隂血絡中有凝血作痛間有一二證属少陽膽經外絡脉病皆去血絡之凝乃愈其内經有云冬三月禁不得用針只用服藥通其經絡破其血絡敗血羌活一錢半獨活半錢柴胡肉桂桃仁去皮尖研當歸尾蒼术甘草炙各一錢炒麴半錢防風三錢漢防已酒製三分川芎三分一方無川芎右㕮咀作一服好酒三盞煎一盞去滓温服早飯前數服良愈宜温煖處服之羌活湯一名暖筋湯出試効方治兩目如火腫痛兩足如伏兎骨筋疼痛膝胻少力身重腰疼夜惡寒痰𠻳項筋皆急目外眵目系急食不下羌活三錢麻黄三分甘草二分炙生甘草二分升麻黄皮酒製草豆蔲當歸黄芩各三分柴胡二分生地黄三分藁本三分蘇木二分熟地黄一分蒼术半分獨活二分紅花二分右件㕮咀如麻豆大都作一服水二大盞煎至一盞去滓稍熱每食逺服地龍散出試効方治腰脊痛或打撲傷損從髙墜下惡血在太陽經中令人腰脊或脛腨臂中痛不可忍鼻壅塞不通官桂四分桃仁六個羌活二分獨活一錢黄蘖一錢麻黄半錢當歸尾地龍四分甘草一錢蘇木六分右件㕮咀每服五錢水二盞煎至一盞去滓温服剋効餅子出衛生寳鑑方治腰疼及腱膝累得神効甘遂一兩麩炒黄色黑牽牛㨂淨四兩半生半熟頭末二兩半蕎麵一兩右三味為末每服三錢夜卧滴水和成餅子熳火燒黄色取出氣實者作一服爛嚼後煎半生半熟葱白酒送下如氣虛作兩服先嚼一多半葱白酒送下至明取動又嚼一半生一半熟葱白酒送下取利一行婦人有胎不可服仙靈丸出余居士選竒方治逺年近日腰痛葳靈仙没藥乳香𤣥胡索黑牽牛破故紙各一分炒黄陳皮三分巴豆一粒去殻入蒜内紙包慢火煨熟去巴豆用蒜右用前件為末酒煮糊丸如梧桐子大每服三丸五更初茶清送下蒼术湯出試効方治濕熱腰腿疼痛蒼术三錢去濕上痛柴胡二錢行經黄蘖一錢始得之時寒也久不愈寒化為熱除濕止痛防風一錢風勝濕右件作一服水二盞去滓稍熱服空心食前一方無防風麻黄蒼术湯出試効方治濕寒頭容身體沉重腰痛面色痿黄不澤麻黄一錢桂枝半錢杏仁十箇草豆蔲半錢半夏半錢炒麵一錢蒼术二錢橘皮一錢澤瀉一錢白茯苓一錢猪苓半錢黄耆三分炙甘草二分右件㕮咀如麻豆大作一服水二盞煎至一盞去滓稍熱服食前烏藥順氣散出如宜方治氣滯腰疼或俛仰趖閃白殭蠶製川芎白芷枳殻桔梗甘草炙各一錢麻黄製陳皮製右為末加薑酒煎或頭痛加葱白煎又宜炒桃仁温酒服五積散出如宜方治寒濕傷腎氣滯腰疼不可俛仰陳皮製六兩甘草炙茯苓半夏製肉桂麻黄三兩枳殻六兩白芍藥川芎白芷厚朴乾薑各四兩桔梗十二兩蒼术製二十四兩右㕮咀慢火炒令色轉續入肉桂枳殻薑葱加桃仁煎固真丹出如宜方治寒濕及腎氣蒼术一觔米泔浸逐日換春五日夏三日秋七日冬十日漉出切作片子焙乾分為四處四兩好醋酒各半升一處煮三十沸出焙乾四兩用茴香一兩鹽一兩同炒术黄為度四兩川椒去目并合者一兩破故紙一兩同炒术黄為度四兩川烏一兩製去皮臍作片子川楝一兩去皮核劈開炒黄為度右共為末煮藥酒打糊丸如梧桐子大每服三十丸温酒鹽湯下補腎湯出本草治主腰痛以杜仲一大觔五味子半大升二物細切分十四劑每夜取一劑以水一大升浸至五更煎三分減一濾取汁以羊腎三四枚切下之再煮三五沸如法作羮空腹頓服用鹽酢和之亦得一方不用五味子治腰痛腎冷出本草用芥子和生薑研㣲暖塗貼王方平通靈玉粉散治腰膝煖水臟益顔色其功不可具載硫黄半觔右用桑柴灰五斗淋取汁煮三伏時以鐡匙抄於火上試之伏火即止候乾以大火鍜之如未更煮以伏為度鍜了研為散穿地坑一尺二寸投水於中待水清取水和硫黄末水不得多於鍋中煎熬令如膏又用鐵鍋一面不著火止以細砂隔紙慢炒將硫黄於紙上滴之自然如玉色光彩射人此號為玉粉散細研要丸以飰丸如麻子大空心每日鹽湯下十丸散服亦鹽湯調兩匙極有効驗余鄉人王昭遂合服之年九十顔貌如童夜讀字倍常人法導引法凢學將息人先須正坐並膝頭足初坐先足指相對足跟外於坐上少欲安穩須兩足跟向内相對坐上足指外入覺悶痛漸漸舉身似欵便坐足上待共内坐相似不痛始䨇立足跟向上坐上足指並及向外每坐常學去膀内冷風膝冷足疼上氣腰疼盡自消適又法出危氏方治腰䐴痛正東坐手抱心一人於前據躡其兩膝一人後捧其頭徐牽令偃卧頭倒地三起三卧便瘥一法治男子婦人腰痛不可忍者用左右帶研索於朝太陽長伸卧地以紙研如左用右研入鼻中如右用左以涕為驗便安適即起行步普濟方卷一百五十四
