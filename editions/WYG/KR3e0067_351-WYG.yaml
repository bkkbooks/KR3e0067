半分煎至六分去滓每於食前温服白荳蔻㪚治產後臓腑氣虚兩脇脹滿不思飲食四肢無力白荳䓻去皮人參去蘆頭桂心各半兩半夏湯浸七徧去滑半兩白术陳橘皮湯浸去白瓤焙乾各一兩枳殻三分麩炒㣲黃去瓤甘草一分炙赤剉右搗粗羅每服三錢以水一中盞入生薑半分􅀥三枚煎至六分去滓不計時候温服厚朴㪚治產後兩脇脹滿胸腹妨悶不下飲食厚朴一兩去粗皮塗生薑汁炙令香熟赤茯苓人參去蘆頭當歸剉㣲炒訶梨勒皮陳橘皮湯浸去白瓤焙各三分甘草一分炙㣲赤剉右為粗㪚每服四錢以水一中盞入生薑半分棗二枚煎至六分去滓不計時候温服白聖㪚治産後腹大堅滿喘不能卧樟柳根三兩大㦸一兩半甘遂一兩半右為細末每服二三錢熱湯調下取大便宣利為度此藥主水氣之勝藥也桂心㪚桂心當歸剉㣲炒各一兩乾薑炮裂剉芫花醋拌炒令乾木香各半兩右搗細羅為散每服食前以熱酒調下一錢治産後腹脹腫疼不可忍用䑕粘根煮為飲一服即愈治產後膨脹氣不通轉用麥糵為末酒調二三錢服之漸通匠勝湯治產後腹脹滿悶嘔吐不定者何答曰敗血㪚於脾胃脾受之不能運化精㣲成腹脹胃受之則不得受納水榖而吐逆醫者不識以尋常治脹止吐藥療之病與藥不相干轉更傷動正氣疾愈難治但服必瘥赤芍藥半夏湯洗切碎澤蘭葉人參去蘆頭陳皮去白各一錢甘草炙一錢生薑半兩右為粗末用水一碗同煎至兩盞去滓温熱分二服治產後亂吃物早非特腹脇脹滿飲食不快當歸鼈甲以醋少許化硇砂少許用炙黄色各一兩桔梗細辛厚朴羌活木香芎藭檳榔各一分草荳蔻去皮半兩藿香三銖半夏二銖右為細末每服三錢水一盞生薑二片同煎取九分空心和滓喫治產後雖甚通利但心腹滿悶脇脹咳𠻳不食大便不通眼澁行坐心腹時痛白术當歸桑白皮大黃各三兩細辛桂心各二兩生薑四兩右㕮咀以水二升煎一升分三服當得㣲利即止大黄產後不可輕用此縁病熱不得已也身體腰脚疼痛附論産後遍身疼痛者葢由產後百節開張血脈流㪚遇氣弱則經絡分肉之間血多留滯累日不㪚則骨節不利筋脈急引故腰背不得轉側手足不能動搖身熱頭痛也若以傷寒治之則汗出而筋􅀈動惕手足厥冷變生他病但以趁痛㪚治之若腰脚痛者葢腎主腰脚女人腎位繫於胞産則勞傷腎氣損動胞絡虗未平復而風冷客之冷氣乘腰故令腰痛也若寒冷邪氣宿滯背脊則痛久未已後忽有娠必致損動葢胞絡屬腎腎主腰故也方趁痛㪚治産後身痛氣弱血滯骨節不利筋脈急引牛膝當歸桂心白术黃耆獨活生薑各半兩甘草薤白各一分右㕮咀每服半兩以水三盞煎至盞半去滓食前服陳無擇評曰趂痛㪚不特治產後氣弱血滯兼能治太陽經感風頭痛腰背痛自汗發熱若感寒傷食憂恐驚怒皆致身疼發熱頭痛况蓐勞之證尤甚趂痛㪚皆不能療不若和劑局方五積㪚入醋煎用却不妨又方加桃仁能治腰疼逐敗血袪風濕加桑寄生半兩尤佳杜仲㪚治産後傷虛腰間疼痛四肢少力不能飲食杜仲去粗皮炙㣲黄色剉碎熟乾地黃附子炮裂去皮臍萆薢剉牛膝去苗剉木香石斛去根剉各一兩桂心續斷各半兩五味子三分當歸剉㣲炒芎藭各三分右為㪚每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓食前服石斛㪚治産後虛損腰間疼痛四肢無力氣血不和石斛去根剉丹參附子炮裂去皮臍延胡索熟乾地黄枳殻麩炒黃去瓤芎藭桑寄生各一兩續斷當歸剉㣲炒各三分桂心三分牛膝去苗一兩半右為末煉蜜和搗五七百杵丸如梧桐子大每服食前以温酒或生薑湯下三十丸杜仲酒治產後臓虚腰間疼痛肢節不利杜仲去粗皮炙㣲黃剉二兩桂心丹參當歸菴䕡子芎藭牛膝去苗桑寄生附子炮裂去皮臍熟乾地黃剉各一兩川椒半兩去閉口及目㣲炒右細剉以生絹袋盛用好酒一斗甆瓶中浸經七日密封後開取每日空心及午食前温飲一盞牡丹湯治產後腰痛沉重舉動艱難牡丹皮柴胡去苗犀角鎊杜仲去粗皮剉炒當歸切焙桂剉去皮枳殻去瓤麩炒㯽榔煨剉丹參桔梗剉炒郁李人湯浸去皮尖各一兩右粗搗篩每服三錢水一盞煎至七分去滓温服不拘時候人參湯治産後虛冷氣血不和腰痛人參當歸切附子炮裂去皮臍㯽榔生剉桂去粗皮甘草炙厚朴去粗皮塗生薑汁炙鬼箭羽各一兩乾薑炮木香各半兩右剉如麻豆大每服三錢水一盞煎至七分去滓温服不拘時候赤芍藥㪚治産後血氣壅滯攻刺腰間疼痛赤芍藥三分延胡索桂心芎藭當歸剉㣲炒牡丹桃仁湯浸去皮尖雙人麩炒各半兩牛膝去苗川大黃剉㣲炒各二兩枳殻麩炒㣲黄去瓤半兩右為㪚每服四錢以水一中盞入生薑半分煎至五分次入酒二合煎三二沸去滓食前温服療産後風冷腰痛不可轉者腎經繫於胞脈腎主腰也獨活川芎桂心芍藥續斷生薑桑寄生各六分當歸防風各八分右㕮咀以水三升煮取一升去滓空心分二服牛膝㪚治産後敗血不㪚攻刺腰間疼痛日夜不止牛膝去苗川大黃剉碎㣲火炒各一兩桂心赤芍藥各三分羚羊角屑劉寄奴芎藭當歸剉㣲炒桃仁湯浸去皮尖雙人麩炒㣲黃各半兩右為㪚每服四錢以水一中盞煎五分次入酒二合更煎三二沸去滓食前温服没藥㪚治産後餘血未盡攻腰悶疼痛没藥牛膝去苗桂心琥珀赤芍藥菴䕡子桃仁湯浸去皮尖雙人麩炒㣲黃狗脊去毛各一兩當歸剉微炒半兩右為細㪚每服食前以温酒調下二錢仙靈脾㪚治産後血氣攻刺腰間疼不可忍仙靈脾牛膝去苗當歸剉㣲炒各三兩鬼箭羽地龍炒令黃没藥桂心威靈仙骨碎補各半兩右為細㪚每服食前以温酒調下二錢丹參丸治産後虚損氣血不和腰痛難忍丹參剉續斷當歸切焙牛膝去苗酒浸切焙桂去粗皮鬼箭羽剉各一兩沒藥用醋少許化開半兩琥珀右除沒藥外並為末入沒藥拌勻煉蜜和丸如梧桐子大每服三十丸以温酒下不計時候續斷飲治產後腫重痛不可轉側續斷芎藭桂去粗皮生乾地黃焙黃耆細剉芍藥黃芩當歸去粗皮右粗搗篩每服三錢水一盞煎至七分去滓温服不拘時候芎藭湯治産後腰痛沉重夫産後腎氣不足或惡露所出未盡遇風寒客搏皆令氣脉凝滯留注於腰邪正相撃故令腰痛也芎藭牛膝去苗酒浸切焙當歸切炒萆薢剉桂去粗皮桃仁湯浸去皮尖雙人炒芍藥各一兩右粗搗篩每服三錢水一盞入生薑三片棗二枚擘破同煎至七分去滓温服不拘時候芍藥湯治產後氣血凝滯腰重痛赤芍藥延胡索當歸切焙枳殻去瓤麩炒牛膝去苗酒浸炒石斛附子炮裂去皮臍各一兩右剉如麻豆大每服三錢水一盞入生薑三片棗二枚擘破同煎至七分去滓温服不拘時候附子丸治産後腰疼不可忍附子炮裂去皮臍人參當歸切焙熟乾地黃焙桂去粗皮延胡索威靈仙去苗土各一兩右搗羅為末煉蜜為丸如彈子大每服一丸細嚼温酒下胡桃茶亦得不拘時候當歸㪚治産後腰痛不能轉側壯熱汗出身體急强當歸剉微炒骨碎補牛膝去苗赤芍藥琥珀桃仁湯浸去皮尖雙人麩炒㣲黃芎藭各一兩右為細㪚食前以豆淋酒調下二錢生地黃湯療産後三日患腰疼腹中餘血未盡并手脚疼不下食生地黄汁一升芍藥甘草各二兩丹參四兩蜜一合生薑汁半合右切以酒三升煮取一升去滓内地黃汁并蜜薑汁㣲火煎一二沸一服三合日二夜三利一兩行中間進食與藥更進服熟乾地黃㪚治產後氣血凝滯攻腰痛熟乾地黄焙三兩當歸切炒一兩半細辛去蘆葉三分甘草炙剉吳茱茰湯浸焙乾炒半兩芍藥各一兩右搗羅為㪚每服二錢温酒調下不拘時候羚羊角㪚治産後腰痛舉動不得羚羊角鎊紅藍花牛膝酒浸切焙剉各二兩桂去粗皮芍藥各一兩生乾地黃焙四兩右粗搗羅每服三錢水一盞煎至七分去滓温服不拘時候治婦人産後遍身疼痛腰背不得轉側手足不得動搖身熱頭疼若作傷寒醫遲則變生他病及婦人女子遍身疼痛脚不能動牛膝酒浸炒當歸去蘆白术黃耆蜜炙肉桂不見火獨活去蘆頭右各等分㕮咀每服三錢水一盞半薑五片薤白七寸煎七分去滓熱服敗醬㪚療産後虚冷血氣流入腰腿痛不可轉或痛引腹中如錐刀所刺及疼痛敗醬當歸各八分川芎芍藥桂心各六分右㕮咀以水二升煮取八合空心分温二服忌葱一方有延胡索北五味各等分無芍藥入酒煎或水酒同煎當歸黃耆湯治産後失血過多脚腰痠疼轉側不得壯熱汗出氣短心怔身强當歸剉焙黃耆細剉芍藥各二兩生薑切焙五兩右粗搗篩入作八服每服水二盞半煎至一盞去滓温服楮實丸治一切風勞冷氣女人冷血氣産後腰痛等證楮實一觔炒牛膝酒浸切焙乾薑炮各一兩右搗羅為末煉蜜和丸如梧桐子大每服食前空心酒下二十丸生薑湯療産後餘血不盡血流入腰脚疼痛胸滿氣急兩脇痛方見本門惡露不盡類治腹中惡露不除身強痛方用生薑三斤㕮咀以水一斗煮取三升分為三服當下惡血治産後腰痛起動不得方萆薢官桂石斛茯苓兎絲子芎藭山茱茰當歸胡蘆芭炒各一分牛膝一兩右杵羅為細末每服三錢水一盞入塩少許同煎三四沸空心和滓熱喫羊肉杜仲湯治産後腰痛􅠲𠻳羊肉四觔杜仲紫苑當歸桂心白术各三兩五味子細辛欵冬花人參厚朴芎藭附子萆薢甘草黃耆各二兩生薑八兩大棗二枚右㕮咀以水二斗半煮肉取汁一斗五升去肉内藥煎取三升半去滓分五服日三夜二雙俱㪚治產後腰痛石菖蒲一兩當歸半兩右為末每服三錢空心熱酒調下普濟方卷三百五十一
