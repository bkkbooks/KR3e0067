body:
  text: 普濟方卷三百五十一明周王朱橚撰産後諸疾門語言妄亂附論夫人憂愁思慮則傷心心虚故邪從之新産之人内亡津液而血虚志弱使人精神昏亂言語錯謬恍惚不寧甚者變狂癲之證治宜補血益心安神定志則病自愈矣方逺志丸治産後血虚或因驚恐神志不寧言語錯謬妄有所見逺志去心甘草炙白茯苓去黑皮桂去粗皮白术山芋麥門冬去心焙人參當歸切焙澤㵼獨活去蘆頭阿膠炙令燥菖蒲各一兩半乾薑炮一兩熟乾地黃二兩焙右㨶羅為末煉蜜丸如梧桐子大每服二十丸煎人參湯下空心日午夜卧服人參丸治産後血虚狂語卧起不安妄有所見人參茯神去术剉羚羊角鎊炒芎藭各一兩檳榔剉三兩桃仁湯浸去皮尖雙人炒三十個逺志去心桂去粗皮木香白芷各半兩阿棃皮一兩枳殻去穰麩炒一兩半右㨶羅為末煉蜜和丸如梧桐子大每服二十丸煎人參湯下空心日午夜卧服羊腎湯治産後血虚心氣不足言語謬妄眠卧不安羊腎一對去脂細切以水三升煎至二升澄清逺志去心黃芩去黑皮防風去义白茯苓去黒皮人參獨活去蘆頭甘草炙剉各半兩芍藥剉熟乾地黃焙各一兩右除羊腎外粗搗篩毎服三錢用腎汁一盞煎至七分去滓温服不拘時茯苓丸治産後血氣虚神不安言錯謬白茯苓去黑心菖蒲各一兩半人參澤㵼熟乾地黃焙當歸切焙各一兩逺志去心一兩一分麥門冬去心焙半兩桂去粗皮一兩半右為末煉蜜丸如梧桐子大每服二十丸煎人參湯下不拘時候逺志湯治産後心虚風邪所搏言語妄亂逺志去心赤芍藥黃芩去黒心白茯苓去黑皮人參防風去义獨活去蘆頭甘草炙各一兩熟乾地黃焙二兩右粗搗篩每服五錢水一盞半煎至七分去滓温服不拘時候茯苓㪚療産後狂語志意不定精神昏亂由心氣虚為風邪所致茯苓一方用茯神生地黃各一十二分逺志去心白薇龍齒各十分防風人參獨活各八分右同為末以銀一大觔水一斗五升煎取七升下諸藥煎取三升温分三服忌食菘菜猪肉生冷一方治産後風邪心神恍惚不定加荆芥八分甘草五分當歸湯治産後血氣不調言語謬亂人參當歸切焙芍藥酸棗仁去皮黃芩去黑心白鮮皮甘草炙剉各一兩右粗搗篩每服三錢水一盞煎七分去滓温服不拘時麥門冬湯治産後心虚言語謬誤恍惚不安麥門冬去心焙二兩白茯苓去黑皮一兩半赤芍藥當歸切焙乾人參甘草炙剉各一兩右粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時茯苓湯治產後血虚亂語心志不寧茯神去术二兩人參芍藥剉各一兩半甘草炙剉當歸切焙桂去粗皮各一兩右粗搗篩每服二錢水一盞生薑三片棗二枚劈破煎至七分去滓温服不拘時一方有茯苓頭痛附論夫頭者諸陽之㑹也凡産後五臓皆虛胃氣虧弱飲食不充榖氣尚乏則令虚熱陽氣不守上凑於頭陽實隂虛令頭痛又有因產後敗血及氣血虚損風邪客搏經陽注於腦絡不得疏通亦令頭痛也方鹿肉湯治産後風虛頭痛壯熱言語邪僻鹿肉三觔芍藥獨活秦艽黄芩黃耆各三兩半夏一升乾地黃桂心芎藭各一兩生薑六兩甘草阿膠各一兩茯苓千金翼作茯神人參各四兩右㕮咀以水二斗煮肉得一斗二升去肉内藥煎取三升去滓内膠令烊分四服日三夜一茯神㪚治産後風虚頭痛四肢煩疼口乾㣲渇茯神甘菊花𦍑活當歸剉㣲炒生乾地黄白􅆚藥前胡去蘆頭桂心甘草炙㣲赤剉各半兩葛根剉三分石膏二兩蔓荆子一兩麥門冬去心焙一兩半右為粗㪚每服四錢以水一中盞入生薑半分煎至六分去滓温服不計時候羚羊角㪚治産後風虛頭痛身體壯熱言語錯亂心神煩悶羚羊角屑茯神黃耆剉人參去蘆頭各三分防風去蘆頭生乾地黃芎藭各一兩麥門冬去心焙一兩半赤芍藥獨活秦艽去苗各半兩石膏二兩甘草一分炙㣲赤剉碎右為㪚每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服加减四物湯治産後頭痛血虚氣弱痰癖寒厥皆令頭痛一名加减羌活湯羌活川芎防風香附子炒各一兩甘草炙當歸各五錢石膏二兩半熟地黃一兩香白芷細辛各一兩半蒼术一兩六錢去皮右為粗末每服一兩水煎如有汗是氣弱頭痛也前方中加芍藥三兩桂一兩半生薑煎如頭痛痰癖者加半夏三兩茯苓二兩半生薑煎如熱厥頭痛加白芷三兩石膏三兩知母一兩半如寒厥頭痛加天麻三兩附子一兩半生薑煎白术㪚治產後體虚勞動過多致頭痛熱汗出不止四肢少力不思飲食白术白茯苓黃耆剉各三分石膏麥門冬去心焙各一兩半白芍藥五味子各半兩生乾地黃牡蠣粉各一兩人參去蘆頭三分甘草五分炙㣲赤剉右為粗㪚每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候温服石膏㪚治產後體虚頭痛煩熱石膏二兩當歸剉㣲炒羚羊角屑白芍藥白术子芩生乾地黃甘草炙㣲赤剉各半兩茯神前胡去蘆頭各三分麥門冬一兩去心焙右為粗末㪚每服四錢以水一中盞入生薑半分棗二枚煎至六分去滓不計時候温服治産後頭疼目暗方細辛川當歸白术芍藥等分右為末每服二錢白湯點服治頭痛頭暈好川芎半兩為末每服二錢臈茶清調下甚捷曽有一婦人産後頭痛一服愈麻黃湯治產後頭痛目眩傷風麻黃去根節湯煮掠去沫葛根石膏火煅桂去粗皮附子炮裂去皮臍芍藥甘草秦艽去土防風當歸切焙各一兩右剉如麻豆每服三錢水一盞煎至七分去滓温服不拘時候人參㪚治產後因傷風冷頭痛壯熱胸膈滿悶不得睡卧運旋乾嘔不能飲食一名人參煮㪚人參去蘆頭三分葛根剉酸棗仁㣲炒芎藭各三分前胡去蘆頭一兩石膏二兩枳殻麩炒㣲黄去穰白术甘草炙㣲赤剉碎桂心各半兩右為粗㪚每服四錢以水一中盞入生薑半分煎至六分去滓不計時候一方無生薑煎防風湯治產後傷風冷頭目疼痛煩眩惡心防風去义獨活去蘆頭黃耆羚羊角鎊枳殻去穰麩炒烏頭炮裂去皮臍旋覆花生乾地黃焙桂去粗皮各一兩右剉如麻豆每服三錢水一盞入生薑三片薄荷三葉同煎至七分去滓温服不拘時候茯苓黄耆湯治產後風頭痛目昏眩白茯苓去黑心黃耆剉菊花獨活去蘆頭枳殻去瓤麩炒當歸切焙生乾地黃焙人參烏頭炮裂去皮臍各一兩右剉如麻豆每服三錢水一盞煎至七分去滓温服不拘時候羚羊角㪚治產後頭目熱痛羚羊角鎊石膏火煅當歸切焙芍藥生乾地黃白茯苓去黑皮麥門冬去心焙前胡去蘆頭甘草炙各一兩右粗搗篩毎服三錢水一盞煎至七分去滓温服不拘時候黄耆㪚治產後虛熱頭痛四肢煩疼不思飲食黃耆剉生乾地黃麥門冬去心焙牡蠣粉各一兩桂心黄芩甘草㣲炙剉各半兩石膏二兩赤芍藥半兩右為粗㪚每服四錢以水一中盞入生薑半分去滓不計時温服前胡㪚治產後痰壅頭痛心胸不利少思飲食前胡去蘆頭半夏湯洗七遍去滑旋覆花當歸剉㣲炒甘菊花甘草炙微赤剉碎赤茯苓各半兩石膏二兩枳殻一兩炒㣲赤去瓤剉碎右為㪚每服四錢以水一中盞入生薑半分煎至六分去滓不計時温服羌活湯治產後風虚頭痛昏眩羌活去蘆頭當歸切焙白茯苓去黑皮甘菊花石膏火煅烏頭去皮臍甘草炙剉芍藥各一兩右粗搗篩每服三錢水一盞煎至七分去滓不計時候温服防風湯治產後風熱頭痛目掣動防風剉升麻黃芩去黑心芍藥石膏生碎葛根剉芎藭羌活各一兩右粗搗篩每服三錢水一盞煎至七分去滓服不計時候防風葛根湯療產後風虚頭目痛語言時僻防風甘葛茯苓各八分麥門冬去心八分芍藥黄芩各六分犀角四分甘草三兩右㕮咀以水二升煎取七合分為二服茯苓前胡湯治産後風頭疼眩悶倒旋白茯苓去黑皮前胡去蘆頭菊花附子炮裂去皮臍白术細辛去苗葉芎藭麻黃去根節各一兩右剉如麻豆每服二錢水一盞煎七分去滓温服不拘時候茯苓湯治産後氣血虚頭痛不定目眩嘔逆白茯苓去黑皮羌活去蘆頭當歸切焙人參芎藭附子炮裂去皮臍石膏火煅黃耆剉各一兩右剉如麻豆每服三錢水一盞煎至七分去滓温服一方無黃耆名羌活湯大三五七㪚治産後風頭痛風眩口喎耳聾天麻炮裂去皮臍細辛去苗葉各二兩山茱茰乾薑炮裂五兩山芋防風去义各七兩右搗羅為㪚每服二錢清酒調下日再未知稍加麥門冬湯治產後虚煩頭疼短氣欲死心下亂不觧麥門冬去心二兩石膏十二分淡竹茹五分小麥二合甘草六分乾葛七分右以水二升煎至八合去滓食後分三服一名淡竹茹湯芍藥㪚治産後體虚頭痛白芍藥生乾地黃牡蠣粉各一兩桂心半兩甘草一分炙㣲赤剉碎石膏二兩右為粗㪚每服四錢以水一中盞生薑半分棗三枚煎至六分去滓不計時候温服白殭蠶丸治産後頭痛白殭蠶㣲炒白附子炮裂地龍㣲炒黄丹㣲炒各一兩人中白半兩炒灰右為末用葱瀝和丸如梧桐子大不計時候荆芥湯下十丸吹鼻方治産後頭痛地龍炒一錢麝香半錢右合研細末每用小豆許吹兩鼻中川芎散治産後頭痛一名川烏散大川芎真天台烏藥皮各等分右為細末每服三錢以秤錘淬酒調服芎附散治産後敗血作梗頭痛諸藥不効者大附子一枚釅醋一碗用火四畔炙透蘸醋令盡去皮臍剉碎川芎一兩右為細末每服二錢茶清調下二竒散治産後頭痛一名芎藭湯方見本門諸疾類獨活湯治産後氣虛頭痛不可忍用大附子一枚炮裂去皮臍剉如麻豆每服三錢水一盞入生薑三片棗一枚擘同煎至七分去滓温服不拘時吹鼻方治産後頭痛用苦葫蘆子搗羅為末吹半字入鼻中其痛立止偏痛者随左右吹之治産後血逆頭痛面赤如醉聞身體如在虛空大腑秘熱語聲微細湏是大腑秘熱方可添大黄喫黃芩大黃杏仁去皮尖吉更牡丹皮去心麻黄去根升麻羌活烏藥防風荆芥穂麥門冬去心各一分右為細末每服三錢水一盞薑三片煎一沸食後和滓喫治産後大腑秘熱經八九日不通頭痛靣赤惡心輕喫些熱物則煩嘔逆宜服此方杏仁去皮尖黃芩木香羌活枳殻只用青獨活桔梗貝母去心大黃荆芥穗各一兩連翹子半兩牽牛二兩半夏三銖右為細末每服四錢滴熱水丸梧桐子大食後葱湯下心腹痛附論夫產後心腹痛者由產後氣血俱虛遇寒乘之與血氣相摶隨氣上衝於心或下攻於腹故令心腹痛也若久痛不止則變成疝瘕也方白术㪚治產後冷氣攻心腹疼痛四肢不和不思飲食白术三分木香半兩當歸剉㣲炒三分陳橘皮湯浸去白瓤焙三分人參去蘆頭三分附子炮裂去皮臍三分芎藭三分桂心半兩㯽榔半兩乾薑炮裂去皮半兩厚朴去粗皮塗生薑汁炙香熟三分赤芍藥半兩甘草炙㣲赤剉吳茱茰湯浸七遍焙乾炒各一分右為粗㪚每服三錢以水一中盞入棗三枚煎至六分去滓不計時候稍熱服芍藥黃耆湯治產後心腹痛芍藥四兩黃耆白芷桂心生薑人參芎藭當歸乾地黃甘草各二兩茯苓三兩大棗十枚右㕮咀以酒水各五升合煮取三升去滓先食服一升日三千金翼無人參當歸芎藭地黃茯苓為七味芎藭湯療產後心腹切痛不能飲食乏氣忽然往來寒熱當歸川芎黃芩人參甘草芍藥防風生薑各三分大黃二分可量人強弱方可服之桃仁八十枚右以水七升煮取二升下大黃更煎三沸分作三服硇砂丸治產後腹中有餘血不㪚致心腹疞痛硇砂細研芫花醋拌勻㣲炒令乾各一兩當歸剉㣲炒赤芍藥木香没藥蓬莪茂狗脊一分去毛白芷一分右為末用釅醋一升同熬成膏候可丸即丸如豌豆大不計時以當歸酒下五丸羊肉當歸湯治產後腹中心下切痛不能食往來寒熱若中風乏氣力羊肉二觔當歸黃芩一方作黄