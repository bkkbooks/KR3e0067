body:
  text: 普濟方卷一百七十明周王朱橚撰積聚門肥氣附論凡積氣在左脇下如覆杯有頭足名曰肥氣肝之積也肝臟血故隂多而陽少病為氣積此由肺病傳肝肝傳脾以季夏適王而不受邪氣留於肝故結為積久不愈令人發欬逆痎瘧連嵗不已以仲夏戊巳日得之以隂盛陽虚故也方酸棗仁丸出聖濟總録治肝積肥氣久不已變瘧令人熱多寒少小便赤澀酸棗仁生用薏苡仁紫蘇子炒研木通剉黄茋剉枳殻去蓏麩炒升麻大黄剉炒坐挐草麥門冬去心焙木香赤茯苓去黒皮各一兩右為末煉蜜丸如梧桐子大每服二十丸漸加至三十丸煎麥門冬湯下蓬虆根湯出聖惠方治久積結癖氣不散左脇下如覆杯咽酸吐水面目黄痿此名肥氣並女子血瘕蓬虆根剉二兩牡丹皮剉赤芍藥各一兩桂去粗皮梹榔剉枳殻去瓤麩炒各三分當歸切焙生薑去皮切焙半兩生地黄焙用一兩半右粗搗篩每服三錢水一盞煎至七分去滓温服空心日晩各一服防葵散出聖惠方治肥氣在右脇下結聚成塊腹䐜脹不欲飲食防葵訶棃勒皮白术各三分郁李仁三分湯浸去皮微炒呉茱萸半兩湯浸七遍焙乾微炒桂心三分枳實半兩麩炒微黄木香三分梹榔三分右為散每服三錢水一中盞生姜半分煎六分去粗食前稍熱服三稜丸出聖惠方治肥氣在左脇下如覆杯有頭足令人羸瘦發寒熱不能食荆三稜川烏頭一兩炮烈去皮臍雄黄半兩細研硼砂一兩不夾石者細研青橘皮半兩湯浸乾去白乾漆半兩搗碎炒令烟出鱉甲一兩塗醋炙令黄色去裙攔防葵一兩麝香一分研右為末研前藥令勻以米醋一升熬令稠少入麵作糊和丸如菉豆大每服十丸空心温酒送下青蒿湯治久積肥氣寒熱痎瘧青蒿自然一合汁生薑自然汁半合童便半合常山剉三分鱉甲去裙攔醋炙黄烏梅肉焙各半兩甘草炙剉一分柴胡去苖三分右除汁外粗搗篩每五錢水一盞半煎至八分入煎三味汁合少許同煎至一大盞去滓臨卧温服麝香丸左脇下如覆杯有頭足不已令人發痰瘧熱瘧間日作始由肺病傳肝肝多傳脾脾乗王而不受邪其氣流於肝故結而為積謂之肥氣其脈澁結或弦而細蓬莪术炮一兩桂心當歸人参各半兩細辛烏頭炮去皮各一分巴豆去油一分麝香一錢右為末煉蜜為丸如菉豆大米飲下五丸至十丸食前服一方壯人五丸弱人三丸鱉甲散治肥氣在左脇下按之堅不能食脈復弦而𦂳肌體痿瘦鱉甲一兩半醋塗炙令黄去裙欄大黄一兩剉碎微炒當歸一兩剉微炒荆三稜一兩炮剉訶棃勒皮一兩枳殻半兩麩炒微黄去瓤呉茱萸半兩湯浸七次焙黄桃仁一兩湯浸去皮尖雙仁麩炒微黄右為散每服三錢水一中盞生薑半分煎六分去滓食後稍熱服牽牛煎丸治肥氣結聚不散腹脇脹滿嘔逆酸水飲食减少牽牛子末三兩以生薑汁半斤酒一升慢火熬如膏木香一兩附子一兩炮製去皮臍鱉甲一兩半醋塗炙令黄去裙攔梹榔一兩桃仁一兩半湯浸去皮尖雙仁麩炒微黄細研呉茱萸半兩湯浸七遍焙乾微炒硼砂一兩不夾石者細研入右為細末入牽牛子煎和鎔為丸如桐子大每服二十丸食前生薑湯送下肥氣丸治肝之積在左脇下如覆杯有頭足如龜鱉狀久不愈發嘔逆痎瘧連嵗月不已其脈弦而細青皮炒二兩當歸鬚蒼术各一兩蛇含石殻醋淬三分蓬术切三稜切鐵孕粉各三兩與三稜蒼术同入醋煮一伏右為末醋煮米糊丸如菉豆大每服四十丸當歸浸酒下蓬虆根散治肥氣在脇下似覆杯咽酸嘔水面目痿黄胷膈不利蓬虆根二兩剉牡丹一兩枳殻三分麩炒微黄去瓤赤芍藥一兩桂心三分梹榔一兩荆三稜一兩炮裂右為散每服三錢水一中盞煎至六分去粗食前稍熱服石韋丸出聖濟總録治肝積氣石韋拭去毛焙荆三稜煨剉附子炮裂去皮臍呉茱萸水洗七遍焙乾炒陳橘皮湯浸去白焙蜀椒揀去閉口及目炒出汗各一兩右為末煉蜜為丸如梧桐子大空腹煎荆芥湯下二十丸大黄丸出聖惠方治肥氣結聚在左脇下堅牢疼痛食少體瘦大黄二兩剉碎微炒防葵一兩木香三分乾薑三分炮裂剉川烏頭一兩炮裂去皮臍鱉甲一兩半醋炙令黄剉右為細末以陳米醋三斤熬令稠入神麯末半兩煮成火鎔和諸藥為丸如梧桐子大每日空心温酒下二十丸以微利為度鱉甲丸出聖惠方治肥氣體瘦無力少思飲食鱉甲一枚約重二兩浄洗以醋和黄泥固濟背上約厚三分令乾荆三稜三兩炮剉川大黄二兩剉碎微炒枳殻三兩麩炒微黄去瓤木香一兩半桃仁二兩湯浸去皮將雙仁麩炒微黄細研如膏右件藥除鱉甲外搗羅為末後以泥風爐子上開口可安得鱉甲取前藥末並桃仁膏内鱉甲中用好米醋二斤時時旋放入鱉甲内以慢火熬令稠取出藥即將鱉甲浄洗去泥焙乾搗羅為末與前藥同和搗為丸如梧桐子大每日空心以温酒服二十丸晩食前再服三稜煎丸出聖惠方治腹氣固結不散脇腹急疼食少體痩石三稜七斤净洗去泥剉碎川大黄三兩芫花一兩醋拌炒令乾木香一兩鱉甲三兩塗醋炙令黄去裙攔右件藥先以水二升煮三稜至一升去滓搗羅諸藥為末入前藥於銅器内慢火熬之更入米醋一升同煎熬稠後稍冷並手丸如梧桐子大每日空心以温酒下十丸硼砂煎丸出聖惠方治肥氣積年不散在左脇下狀如覆杯天隂即疼痛硼砂二兩不夾石者細研以酒醋各一斤熬如膏乾漆一兩搗碎炒令烟出防葵一兩川大黄一兩右為細末入硼砂煎中入小蒸餅和溶為丸如菉豆大每日空心温酒下十丸木香丸出聖惠方治肝積肥氣結鞕不散木香剉兩大黄剉二兩鱉甲去裙攔剉二兩米醋三斤與大黄同煎醋净為度焙乾右為末酒煮糊為丸如梧桐子大每服二十丸空心食前生薑湯送下治肝積氣滯左右脇下遇病作則兩邊手足頭面昏腫乾葛一錢麻黄三錢側子一個川芍防風枳實芍藥桂心羗活甘草當歸各四錢右㕮咀生薑煎服肝之積肥氣丸出試效方治積在左脇下如覆杯有頭足不愈令人發欬逆痻瘧連嵗不已厚朴半兩黄連七錢柴胡二兩椒炒出汗四錢川烏頭炮去皮一錢二分乾薑炮半錢皂角去皮弦子煨一錢半巴豆霜五錢白茯苓去皮一錢半廣茂炮二錢半人参去蘆二錢半甘草炙二錢昆布二錢半右件除茯苓皂角巴豆霜餘為細末另碾茯苓皂角細末和勻另碾巴豆霜旋旋入末和勻煉蜜為丸如梧桐子大初服二丸一日加一丸二日加二丸漸漸加至大便微溏再加兩丸服周而復始如積减大半勿服春夏依此法服秋冬另有加减法在各條下秋冬加厚朴半兩通前一兩减黄連一錢半若治風癎於一料中加人参茯苓菖蒲各三錢黄連祗依春夏用七錢雖秋冬不减空心淡醋湯下伏梁附論内經謂病有小腹痛上下左右皆有根名曰伏梁裏有膿血居腸胃之外不可攻治之每切按之欲死又曰人有身體脾股胻皆腫環臍而痛病名伏梁此風根也夫氣之所聚名曰聚氣之所積名曰積夫聚者陽氣也故無所留止積隂氣也故有形伏梁心之積也起於臍下故小腹痛上下左右皆有根裏有膿血居腸胃之外故環臍而痛此風水之病故身體脾胻皆腫名曰伏梁以其若梁之隠伏也其症有淺深居臍上為逆以邪氣之逆上行也居臍下為從以邪之順下行也治法不可動動之為溺墻之病故治在刺法中夫心之積名曰伏梁起於臍大如臂上至心下以秋庚辛得之何以言之腎病傳心心當傳肺肺以秋適王王者不受邪心欲復還腎腎不肯受故留結為積故知伏梁以秋得之也千金方云經絡受病入於腸胃五臟積聚發伏梁息賁肥氣痞氣奔豚積聚始生至期已成奈何曰積之始生得寒乃生厥止乃成積人之善病腸中積者何以候之曰皮薄而至澤肉不堅而淖澤如餓則腸胃受惡惡則邪氣留則積聚乃生則腸胃之積寒温不次和氣消止至其𤣥積留止不聚乃起病有身體腰脾股胻皆腫環臍而痛是為何病曰病名伏梁此風根也不動動之為水溺墻之病小腹痛左右上下皆有根者伏梁也裏膿血居腸胃之外不可攻治之每切按之欲死以下則因隂必下膿血上則廹胃管王永生云當臍出膈脥胃管内癰以久病也難療居臍上為逆慎勿動亟奪其氣益於大腸而着於肓肓原在臍下故環臍而痛方訶棃勒丸出聖濟總録治憂積伏梁氣訶棃勒煨去核二兩梹榔剉三兩半赤茯苓去黒皮柴胡去苖枳殻去瓤麩炒羚羊角鎊黄連去鬚防葵剉生薑切焙各一兩半黄芩去黑心一兩大黄剉炒三兩半木通剉一兩一分右為末煉蜜和丸梧桐子大每服十丸空腹米湯下日再漸加至三十丸以利為度療痞結痃癖氣積横梗伏梁右以鯉魚作膾以濃蒜虀食之昔患痃癖者常夢人教毎日三顆大蒜初時依遂至瞑眩而愈半夏散出聖惠方治伏梁氣心下硬結滿悶不能食胷背疼痛半夏一兩半湯浸七遍去川大黄一兩剉碎微炒桂心一兩前胡一兩去蘆頭荆三稜一兩炮剉當歸一兩剉焙微黄青橘皮一兩浸去白瓤焙鱉甲一兩半醋塗炙令黄去裙攔梹榔訶棃勒皮木香各一兩右為散每服三錢水一中盞生薑半分煎至六分去滓不拘時候稍熱服丹砂丸出聖濟總録治伏梁氣胷中痞痛小便赤澀及驚悸不安夜多夢寐丹砂金邪馬牙硝以上三味同研細人参赤茯苓去黑皮麥門冬去心焙升麻逺志去心一兩生薑乾地黄焙二兩䜴一兩右除研者搗羅為末將研者拌勻煉蜜和丸如梧桐子大每服二十丸臨卧煎桑根白皮葱湯下川烏頭丸出聖惠方治伏梁氣結固在心下横大如臂飲食漸少肢體消痩川烏頭半兩炮裂去皮臍莞花半兩醋拌炒令乾荆三稜半兩剉醋拌炒桂心防葵各半兩鱉甲一兩塗醋炙令黄去裙攔乾漆半兩搗碎炒令烟出木香一兩硼砂一兩半不夾石者細研川大黄二兩剉碎醋拌微炒右為細末先以米醋三斤熬令稍稠入少麵作糊和鎔搗三百杵為丸如菉豆大每服空心以温酒下七丸漸加至十丸以取下積滯物為度隔兩日再服鱉甲湯出宣明論治伏梁積氣心下如臂痞痛不消小便不利鱉甲去裙攔醋炙黄荆三稜剉大腹剉芍藥各一兩當歸切焙右麄搗篩每服三錢水一盞木香末半錢同煎至七分去滓空心温服日再服防葵散出聖惠方治伏梁氣在臍上心下固結如梁之狀胷膈不利飲食减少防葵荆三稜炮裂桂心赤芍藥各一兩鱉甲一兩半塗醋炙令黄去裙攔當歸一兩訶棃勒皮一兩川大黄一兩剉碎微炒枳殻三分麩炒微黄去瓤右為散每服三錢水一鍾生薑半分煎至六分去滓食前熱服乾漆丸出聖惠方治伏梁氣在心下堅牢不散胷中連背多痛乾漆一兩搗碎炒令烟出川烏頭半兩去皮臍剉碎研半炒黄色芫花一兩剉拌炒令黄桃仁半兩湯浸去皮尖雙仁麩炒微黄雄黄一分細研鱉甲一兩塗醋炙令黄去裙攔木香半兩硼砂一兩不夾石者細麝香一分細研右為細末入研前藥令勻以醋煮麵糊為丸如菉豆大每服食前以温酒送十丸治奔豚伏梁氣陳皮青皮當歸白芍藥蔞根梔子甘草各一兩川山甲右為麄末每服半兩水二盞生薑三片煎至八分去柤温服硼砂煎丸出聖惠方治伏梁氣久積在心下横大如臂發欬疼痛胷背拘澁腹脇滿悶硼砂二兩不夾石者細研以酒醋各半斤熬如膏乾薑半兩炮製剉附子一兩炮裂剉去皮臍梹榔一兩川大黄二兩剉碎微炒右為細末入硼砂煎更入蒸餅少許和鎔為丸如梧桐子大每服空心温酒下十五丸至二十丸大黄煎丸出聖惠方治伏梁氣心胷妨實背膊煩疼不能食四肢無力川大黄三兩剉研微炒别羅搗末以酒醋各一升熬如膏木香一兩荆三稜一兩剉碎醋拌炒令乾桃仁一兩湯浸去皮尖雙仁麩炒微黄訶棃勒皮一兩桂心梹榔青橘皮各一兩湯浸去白瓤焙右為細末入大黄煎更入蒸餅少許和鎔為丸如梧桐子大每日空心温酒下十丸至十五丸伏梁丸出三因方治心之積起於臍上上至心大如臂久久不愈病煩心身體重股背腫環臍而痛其脈沉而芤茯苓厚朴薑汁製炒人参枳殻麩炒去瓤白术半夏湯洗七次三稜慢火煨熱乘熱温製右等分為末煮糊丸如梧桐子大米飲下二十丸食前日兩服作散酒調服絶勝氣塊石燕散出直指方治飲食傷冷心下結塊狀如伏梁又攻左脇車􅢗殻蛤蜊殻並燒灰存性為末各一兩乾薑生官桂甘草各炙一兩右為末每服二錢臨發時沸湯㸃服車􅢗蛤蜊殻治塊伏梁丸出指南方臍下如臂時起至心下又或身體肢脛皆腫始由腎病傳心心傳肺肺乗王不受邪氣留於心結而為積其脈大而時一結或沉而芤謂之伏梁其病裏有膿血居腸胃之外按之欲死比下則因隂必下膿血上則追胃腕内癰居臍上為逆居臍下為從始萌可治久則難以變成水青皮白馬尿浸三日令軟透切三兩巴豆去皮十五個與青皮同炒乾去巴豆不用羗活半兩右為末糊為丸如菉豆大米飲下十五丸未知加至十丸治伏梁氣横在心下不能飲食出聖惠方木香一兩硼砂一兩夾石者細研入川大黄二兩剉碎措拌炒令乾右為細末入研過硼砂令勻以酒煮麵糊為丸如梧桐子大每服食前生薑湯下七丸治伏梁氣在心下結聚不散出聖惠方硝石半兩牽牛子一兩木香半兩右為細末以米醋二斤内藥末慢火煎令稠入少麵糊和鎔為丸如桐子大每服空心温酒下十丸治伏梁氣方右白馬尿銅器中盛取每旦服一斤治伏梁氣在心下結聚不散出聖惠方右以桃奴三兩為末空心温酒調二錢服人参丸治心積伏梁人参一兩陳橘皮湯浸去白焙二兩搗末醋一斤煎膏射干自然銅研如粉金屑研如粉枳殻去瓤麩炒知母剉當歸切焙細辛去苖葉梹榔剉石菖蒲泔浸一宿切焙赤茯苓去黒皮麥門冬去心焙各一兩右除煎研者外搗羅為末入煎研者和勻煉蜜和丸如梧桐子大每服二十丸空心炒生薑黒豆湯下日再服稍加至三十丸鱉甲散出聖惠方治伏梁氣横在心下堅硬妨悶不能食鱉甲一兩半塗醋炙炮令黄去裙攔呉茱萸半兩湯浸七遍焙乾微炒郁李仁一兩湯浸去皮焙炒荆三稜一兩炮剉枳實三分麩炒微黄柴胡三分去苖桂心三分梹榔一兩右件藥搗篩為散每服四錢水一中盞入薑半分煎至六分去滓食前稍熱服心之積茯苓丸出試効方起臍上大如臂上至心不愈令人煩心黄連鬚一兩半厚朴去皮薑製半兩人参去蘆五錢桂去皮一錢乾薑炮半錢茯神去皮末一錢丹参炒一錢右件除巴豆霜外為細末另研巴豆霜旋旋入末煉蜜為丸如梧桐子大初服二丸每日加一丸二日加二丸漸加至大便溏再從兩丸加服淡黄連湯送下食逺週而復始積减大半勿服秋冬加厚朴半兩通前称一兩减黄連半兩即用一兩黄芩治心下結伏氣用甘藍平煮作葅經宿浸色黄和鹽食之痞氣附論凡積氣在胃脘腹大如盤者脾積也痞結不通故名痞氣此本肝病𫝊脾脾當傳腎腎以冬適王而不受邪氣留於脾故結為積以冬壬癸日得之久不愈令人四肢不収發黄疸飲食不能肌膚所以然者脾藏肌肉之氣能與胃行其津液以榮養四肢若為積氣所留不能榮養故有四肢不收飲食不為肥膚之症方麯术香稜丸徳生堂方治男子婦人小兒脾積氣滯胷膈痞悶肚腹脹滿痃痞氣塊徃來走注刺痛大傷酒食嘔吐酸水飲食不思婦人血氣癥瘕小兒脾滯並皆治之此方比瑞竹堂方略有加味荆三稜莪术陳皮香附子各四兩作一處用好醋二斤煮一伏時去醋焙乾白豆蔲沉香􅒦砂仁蓽澄茄木香川薑烏藥各二兩枳殻炒梹榔乾葛半夏麯炒神麯乾葛花二兩右為末熬蘿蔔水煮糊為丸如菉豆大每服五七十丸隨意酒生薑湯下金露紫苑丸出宣明論治一切脾積兩脇虛脹臍腹疼痛草烏頭去皮尖生黄連半兩官桂桔梗乾地黄乾生薑川椒蕪荑紫苑去皮柴胡防風厚朴甘草人參川芎鱉甲酒浸貝母枳殻甘遂以上各一兩巴豆三兩醋煎半日出油硼砂三錢右為末水煮麵糊為丸如梧桐子大每服五丸空心臨卧米湯下或微疎動詳虚實加减消痞丸一名大消痞丸出衞生寶鑑治一切心下痞悶及積年久不愈者黄連去鬚煉炒六錢黄芩刮黄色六錢薑黄白术各一兩乾生薑一錢甘草炙三錢􅒦砂仁三錢枳實麩炒黄五錢橘皮四錢人參四錢半夏湯洗七次四錢神麯炒黄色二錢厚朴三錢猪苓二錢半一方加澤瀉右為細末湯浸蒸餅為丸如梧桐子大每服五十丸至七十丸一百丸白湯送下食後一方無人參甘草蒜紅丸出百一選方治脾積腹脹如皷青筋浮起坐卧不得者揀丁香木香沉香梹榔青皮去白陳皮去白􅒦砂仁蓬莪茂炮去皮青皮去白牽牛草菓子各一兩肉豆蔲麵褁煨粉霜各一兩白茯苓去黒皮人參各半兩蒜二百枚一半生用一半火焙熟右為細末以生熟蒜研細生細絹取汁旋用末藥為丸如梧桐子大每服五七丸至十五丸食後淡鹽湯送下忌醎酸魚鮓茶醬醃藏雞鴨生冷馬牛雜肉之類只喫淡白粥一百日金液丸出聖濟總録治脾積痞氣痰逆惡心腹脇滿悶胷膈噎塞不思飲食荆三稜炮蓬莪茂炮白术丁香皮刮去麄皮牽牛子麩炒青橘皮陳橘皮並湯浸去白焙肉豆䓻大者去殻梹榔炮各一兩乾薑炮硼砂研各半兩丁香巴豆半兩和皮稱去皮研如膏紙壓油去盡以不汚紙為度右為末攪拌勻用頭醋煮稠麵糊為丸如菉豆大每服五丸食後米湯飲下萬安丸出仁存方治腹中成形作塊按之不移推之不動動輙微喘令人寒熱腹中時痛漸漸羸痩久不治者多變成水虛腫亦由憂思驚恐寒熱得之隂陽痞㿃氣結成形其脈結澁謂之積氣大㦸炮甘遂牽牛半生半炒五靈脂呉茱萸浸七次炒𤣥胡索炒各二