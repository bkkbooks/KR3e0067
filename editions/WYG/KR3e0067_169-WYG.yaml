小兒臨時加减與服一方有阿魏四兩醋浸入糊同丸治大人小兒脾胃等患極有神效但荆三稜蓬莪茂本能破癥消癖其性猛烈人不以此為常服之劑然今之所用者以出産之處隔絶二藥不得其真乃以紅蒲根之類代之性雖相近而功不同以之治病不能傷耗真氣瘦人虚人小兒姙婦皆可服之無疑但修合之際務在蒸治用好米醋煮陳米粉為丸仍去阿魏礬紅最宜常服飲食所傷中脘痞滿服之應手而愈大病之後糓食難化及治中脘停酸並用薑湯嚥下脾寒瘧疾生薑橘皮湯下心腹脹滿紫蘇橘皮湯下脾痛作楚菖蒲湯下酒疸糓疸遍身皆黄大麥湯下兩脇引乳作痛沉香湯下酒積面黄腹脹時或乾嘔煨薑湯下婦人脾血作痛及血癥氣瘕並經血不調或過時來或發為寒熱並用醋湯下男子婦人有癲癎之患辰砂為衣此藥用橘葉湯下姙婦惡阻嘔出納食百藥不療惟此藥最妙仍佐以二陳湯五膈寛中散服之但人疑丸子不利胎氣未必信服當易名用之特有竒效然恐姙婦服此之後偶爾傷動必致歸咎故不敢極言其妙耳鱉甲丸出聖惠方治痞氣當胃腕結聚如杯積久不散腹脇疼痛體痩成癆不能飲食鱉甲三兩去裙攔以米醋一小盞化硼砂一兩用塗炙鱉甲令醋浄為度附子一兩炮裂去皮臍荆三稜一兩微炮炒乾漆一兩搗碎炒令烟出木香一兩川大黄二兩剉碎醋拌炒令乾呉茱萸半兩湯浸七遍炮乾微炒右為細末以醋煮麵糊和鎔搗三二百杵為丸如梧桐子大每日空心温酒下二十丸蕪荑丸出聖濟總録治脾積痞氣微有滑泄不思飲食蕪荑四兩陳橘皮湯浸去白焙乾四兩為末米醋一斤附子炮裂去皮臍二兩木香一兩莎草根去毛三兩白术一兩右除橘皮外搗羅為末入橘皮煎和鎔煉蜜為丸如梧桐子大空心用陳米飲下三十丸牽牛子丸出聖惠方治脾積痞氣大便不通身腫少力肢節疼痛兼治心腹脹硬臟腑壅滯牽牛子一兩半㣲炒甘遂半兩微炒荆三稜炮剉木香一兩陳橘皮湯浸去白焙乾方用青橘皮訶棃勒煨取皮三分右為末生薑汁二兩蜜四兩同煎至四兩鎔和前藥末為丸如梧桐子大臨卧米飲下二十丸或生薑湯下甘遂方甘遂黄芩芒硝桂心細辛各一兩大黄三兩右咬咀以水八升煎取二升半分三服痞氣丸出三因方治脾之積在胃管覆大如盤久不愈四肢不收黄瘴飲食不為肌膚心痛徹背背痛徹心脈浮大而長大烏頭一分去皮炮煎附子半兩炮去皮臍赤石脂煆醋碎川椒炒出汗乾薑炮各二兩桂心半兩右為末蜜丸如桐子大硃砂為衣每服五七丸米湯下漸加至十丸白术丸治積聚癖氣不能飲食心肋下滿四肢骨節酸疼盗汗不絶白术黄耆剉人參赤茯苓去黒皮烏頭炮裂去皮臍乾薑炮當歸切焙甘草炙剉梹榔剉各兩半牡蠣芍藥麥門冬去心焙細辛去苖葉前胡去蘆頭鱉甲去裙攔醋炙各一兩防葵剉紫苑去苖土桔梗炒桂去粗皮各三分右為末煉蜜和丸如梧桐子大每服二十丸空腹日晚温酒下漸加至三十丸忌莧菜桃李雀肉生葱海藻菘菜生菜大蒜猪肉秘方勝紅丸出醫方大成治丈夫脾積氣滯胷膈滿悶腹脇四肢無力酒積不食乾嘔不止背脾連心胷及兩乳痛婦人脾血積氣諸般血癥氣瘕小兒食積骨痩面黄肚腸氣急不嗜飲食漸成脾癆陳皮青皮三稜莪术二味同用醋炙切片乾薑炮良薑各一兩香附炒去毛二兩右為細末醋糊為丸如桐子大每服三十丸薑湯下一方加神麯麥芽小兒量大小加减此方即局方紅丸子去礬紅阿魏胡椒增良薑香附子極為穏當應老人虛人姙婦小兒服之無疑以其治病有功不能傷耗真氣尋常飲食所傷中脘痞滿服之應手而愈大病之後榖氣難化及治中腕停酸功效特異脾寒瘧疾生薑橘皮湯心腹脹滿蘇梗橘皮湯脾痛作楚菖蒲湯酒疸穀疸遍身皆黄大麥煮飲兩脇引浮作疼磨沉香温水酒積食積面黄腹脹時或乾嘔煨薑湯婦人脾血作痛及血癥氣瘕並經血不調或過時不至醋湯下寒熱徃來尤宜與服産後敗血上攻心神迷亂狀若癲癎熱醋湯下其效尤速男子婦人癲癎者未必皆由心經蓄熱亦有因脾氣不舒致痰飲上迷心竅而成斯疾者若伏梁過臍多愈見昏亂宜用此藥衣以硃砂用橘皮葉湯下名小鎮心丸化鐵散治痞積威靈仙楮桃兒各一兩右為細末每服三錢用温酒調下寛膈丸療氣不升胷膈痞結木香荆三稜煨青橘皮去白各半兩半夏二兩湯洗七次大腹子三錢半右為細末生薑汁麵糊為丸如梧桐子大每服七十丸食後生薑湯下桂花散出直指方治脾積氣痛香附五兩炒去毛蓬术醋煮焙良薑桂花甘草炙各一兩右為末每服二錢空心沸湯鹽㸃服半夏湯出聖濟總録治脾積冷氣痞結胷滿痰逆四肢怠惰半夏陳皮湯去滑焙乾葶藶紙上炒各一兩麥門冬去心焙乾二兩蘆根剉碎三兩右粗搗篩每服三錢水一盞入小麥淘淨半合生薑半棗大切同煎至八分去滓空心日午夜卧各一服如病人痩弱即加桂心栢子仁各一兩礬石丸治脾積痞氣泄瀉日夜下痢白膿礬石燒冷汁枯訶棃勒煨去核各二兩黄連去鬚三兩木香一兩右為末水浸蒸餅濾如糊為丸如梧桐子大空心食前陳米飲下二十丸以泄止為度金露丸出保命集治脾積内傷心下痞不降米榖不化大黄二兩枳實半兩炒桔梗二兩牽牛頭末二錢半右為細末薑糊為丸蒸餅亦得丸梧桐子大温水下二三十丸金真丸治三焦氣壅結痞心胷大便不通傷寒下症已服承氣不利服此百粒安穏而通川大黄啇枳實麵炒梹榔黑牽牛各等分一半生一半熟右為細末滴水為丸如梧桐子大每服五七十丸米飲下以大便和利為度去梹榔枳實倍加黄芩滑石名藏用丸治心腹大痛脹滿大小便不通潮熱燥渇服𦂳峻藥必吐了服五七十丸至百丸必通服藥過多肛門下燥結不得便即用提盆散導之硫黄丸出聖惠方治痞氣結固不散心腹疼痛食少體痩硫黄二兩細研水飛過木香一兩半為末川大黄二兩剉碎微炒為末桃仁四十九枚湯浸去皮尖雙仁别研右藥四味先取大黄末用酒洒濕納新竹箆子内開口入炊飯甑中蒸令飯熟為度取出與桃仁同研極爛入硫黄末研勻入少許麵糊和為丸如梧桐子大每日空腹以酒下二十丸治脾積氣痛婦人諸般氣痛出聖惠方香附子五兩炒去毛赤色止莪木醋煮甘草各二兩右為細末每服二錢入鹽少許百沸湯㸃空心熱服又方出本事方良薑四兩甘草一兩桂心半兩右為末每服一錢入鹽沸湯㸃服木香丸出聖惠方治痞氣心腹堅脹飲食不消木香一兩川大黄二兩剉碎醋拌令炒乾硫黄一兩研細水飛過右為細末研入硫黄令匀以酒煮麵糊和丸如梧桐子大每服空心生薑湯下十丸治男子婦人腹痞病脾積大有神效蒸餅先用發酵者五六個隂三宿擘碎晒乾為細末皮硝一斤為細末黄沙牛腦子一個鮮者去了腦皮紅筋搯細用粗濾過入硝末和丸右一䖏和勻酵麵糊為丸如梧桐子大每服二十丸空心好酒送下日進三服忌食生冷物雞猪肉酢韭豆麵麩青菜忌一百日有效驗矣治痞疾信砒二兩别研如粉寒水石三兩别搗為末右用生鐵銚子先鋪石末後堆砒末在上以石末葢頭然後盛葢之用麵醋紙條子密封約十重以炭火一斤以來銚子在候紙條子黑取出置冷地上候冷取開之揀淨刮取砒石末一處入乳鉢内細研以軟粟米飯和丸如梧桐子大更别搓小丸一等以備小兒服以飛過辰砂為衣候乾磁瓦合收每日服時於發日早以茶清下一丸一日内不得喫熱物合時先掃灑一淨室中合之不得令婦人猫犬雞䑕等見收得時亦然若婦人患則男著在口中男子亦然治夏秋之交露夜坐久痞如羣石在腹生大豆半升生薑八分右以水二升闕頓服瘥治飲食過度不消成痞馬牙硝一兩呉茱萸半斤右用水濃煎汁服愈竇羣在常州此方得效通膈丸一名道開散出御藥院方治胷中痞氣不通水飲停滯梹榔三兩枳實四兩麩炒右為細末煉蜜為丸如梧桐子大每服三十丸至五十丸食後生薑湯下温水亦得一方作散五積丹出宣明論治心腹痞滿嘔吐不止破積聚者皂莢一鋌一尺二寸火燒存性磁盆合之四面土壅勿令烟出巴豆十二個白麵一兩二錢同巴豆炒令麵黄為度右末醋糊為丸如菉豆大每服十丸鹽湯食後加减服治大人小兒痞症脾疾絶妙白礬一兩為末重羅生用雞冠雄黄二錢為極細末重羅生用右先用白麵一匙用井花涼水不要調稀後入煎藥一䖏調成膏子湏要攪至一二千遍務使勻調看疾大小用厚紙攤藥一錢厚貼於患䖏用糨粉絹帛縛定如乾用涼水輕掃次日藥窩様封時三日換前藥三遍利白膿即瘥此方大有神效不可盡述忌犯鐵器治痞氣心腹堅脹飲食不消訶棃勒一兩鱉甲一兩半塗醋炙令黄去裙䦨右為粗散每服二錢食前生薑橘皮煎湯調下治脾方右以一淨紙心内畫一十字炙三倍擲七遍此方有神效治脾痞塊積闕此藥名為透脾膏不用爐火不煎熬甘遂各等分硼砂木鱉不相饒皂莢穿山火炮過杏仁啇陸等體髙葱白七根並沙蜜將來一䖏搗成膏貼在脾上連磨轉有似神仙用手搯别脾散治痞症發熱盜汗胷背疼痛右以甘遂不拘多少用麵包於漿内煮十數沸去麵後將細米糠火炒黄色為末大人每服三錢小兒一錢忌諸等肉用冷蜜水卧服忌油膩濕麵腥物大黄丸治五臟積聚癖氣或有墜損腹滿大黄剉炒梹榔煆炒桃仁去皮尖雙仁炒研如膏各三兩鱉甲去裙闌醋炙荆三稜煨剉乾薑炮烏頭炮裂去皮臍各三兩桂去粗皮呉茱萸陳者湯浸炒乾各一兩右搗羅八味為末與桃膏研勻以蜜丸如桐子大每服三十丸空腹日午夜煎橘皮湯各一服一方用醋煮麵糊為丸生薑湯温酒下亦得厚朴丸治痞氣積年瘥結聚在於胃管大如覆杯心腹脹痛食少無力厚朴一兩半去粗皮塗薑汁炙令煮熱木香一兩梹榔一兩半青橘皮一兩湯浸去白瓤焙川大黄一兩剉碎醋拌炒令乾硫黄一兩細研水飛過右為細末入研過硫黄令勻以酒煮麵糊和丸如梧桐子大每服食前生薑湯下十丸硼砂煎丸治痞氣積聚不散心腹疼痛硼砂一兩不夾石者細研莞花一兩醋拌炒令乾荆三稜一兩㣲煨炒鱉甲一兩塗醋炙令黄去裙闌川烏頭去皮臍半兩剉研鹽拌炒令黄右藥除硼砂外研羅細末先以米醋一升慢火熬硼砂次下諸藥同熬令稠入小蒸餅和鎔為丸如菉豆大每服食前生薑湯下十丸葛根丸治脾積痞氣煩渇口乾薏芢根剉葛根剉附子炮裂去皮臍蘆根剉各一兩糯米二合右為末入桃膠湯浸煮為糊和丸如小豆大食後臨卧燈心枇杷葉煎湯下十丸至二十丸木香梹榔煎治脾積塊腹脇走痛口吐清水木香一兩梹榔七枚七分乾漆半兩炒令烟盡硼砂半兩别研肉桂去皮一兩肉豆蔲五枚胡椒四十九粒炒右為末次入硼砂和勻煉蜜為丸如梧桐子大每服七丸橘皮湯下取積丸硃砂雄黄輕粉各三錢硼砂川烏九錢巴豆一兩五錢去油白麵一兩五錢右為末醋糊丸如梧桐子大薑湯下鐵刷湯治男子脾積氣痛婦人血氣刺痛及治中酒惡心一切瘧痢氣疾腸風下血臟毒滑腸泄瀉蒼术八兩米泔浸一宿良薑六兩半炒炙茴香二兩炒右為細末每服二錢生薑三片鹽一捻水一盞煎至七分酒服熱湯調下亦得如脾寒用酒一盞煎臨發時連進三服兼治四方人不伏水土小兒臟寒脫肛並用薑三片棗子一枚煎如冐暑伏熱擣生薑冷水調下若行路早起棗子一個去核包藥少許同生薑三片嚼下能辟四時八節疫癘砂瘴等疾枳實消痞丸一名失笑散出衞生寳鑑治右闗浮弦心下虚痞惡食懶倦開胃進食枳實麩炒黄連各五錢乾生薑一錢半夏麴三錢人參二錢炙甘草二兩白术二錢白茯苓二錢厚朴炙四錢麥蘖麵二錢右為細末湯浸蒸餅為丸每服三十丸温水送下不拘時候量虚實加减脾之積痞氣丸出試效方在胃脘腹大如盤久不愈令人四肢不收發黄疸飲食不為肌膚厚朴去皮四錢半黄連去鬚八錢呉茱萸洗三錢黄芩二錢白茯苓去皮一錢另為末澤瀉一錢另為末川烏頭炮裂去皮半錢人參去蘆一錢茵蔯酒製炒二錢半巴豆霜四分乾薑炮一錢半白术二錢􅒦砂仁去皮一錢半桂去皮四分川椒炒半錢右除巴豆霜另研茯苓另為末旋入外同為細末煉蜜為丸如梧桐子大初服二丸一日加一丸二日加二丸漸加至大便溏再從二丸加服淡甘草湯送下食前周而復始積减大半勿服秋冬加厚朴五錢半通前一兩减黄連一錢减黄芩一錢黄疸並積大不通透一料中加巴豆霜一分附子炮一錢砒少許加减痞氣丸出試效方孟秋合治脾之積黄芩酒製三分黄連酒製三分厚朴一錢半夏半錢益智三分呉茱萸三分紅花半分青皮二分當歸尾二分茯苓二分澤瀉二分麴炒二分廣茂二分昆布二分橘皮去白二分熟地黄二分人參二分附子三分葛根二分甘草炙二分巴豆霜二分右為細末蒸餅為丸如梧桐子大初服二丸一日加一丸二日加二丸漸加至大便溏再從二丸加服煎淡甘草湯送下食前服沉香飲子出華陀中臟經治痞氣升降隂陽沉香白茯苓木香羗活獨活人參桑白皮紫蘇葉以上各等分右㕮咀為粗末每服三錢水一盞半大棗二個姜五片煎至七分去滓食前温服二滓又作一服枳實理中丸出御藥院治胷痺心下痞留氣結胷滿脇下逆氣搶心枳實麩炒人參去蘆頭乾薑炒一兩甘草炙白术茯苓去皮各一兩附子炮去皮臍半兩右為細末煉蜜為丸每兩作四丸每服一丸水一大盞煎至六分和滓温服不拘時候黄連消痞丸出試效方治心下痞滿壅滯不散煩熱喘促不安黄連去鬚炒一兩枳實炒七錢橘皮五錢乾生薑二錢半夏九錢黄芩炒黄色二兩茯苓三錢白术三錢炙甘草三錢薑一錢澤瀉一錢猪苓去黒皮半兩右為細末湯浸蒸餅為丸如梧桐子大每服五十丸食逺温水送下人參順氣飲子一名葶藶丸出試效方治心下痞胷中不利苦葶藶酒浸炒人參各三錢甘草炙羗活柴胡獨活各三錢黄芩三錢半炒拌酒製縮砂仁白豆蔲仁茵陳酒製炒各一錢乾葛一錢青皮石膏厚朴炒半夏洗半錢當歸七分右為細末湯浸蒸餅為丸和勻篩子内擦如米大每服三錢臨卧用白湯送下木香化滯湯出試效方治因憂氣結中脘腹皮底徹痛心下痞滿不思飲食食之不散常常痞氣柴胡四錢橘皮三錢甘草炙五錢半夏一兩生薑三錢當歸尾二錢草豆蔲仁五錢木香三錢紅花半錢枳實麩皮炒二錢右㕮咀如麻豆大每服二錢水二盞煎至一盞去渣大温服食逺忌酒濕麵消痞湯出東垣蘭室方治因憂氣中脘腹皮底微痛心下痞滿不思飲食柴胡四兩橘皮三錢炙甘草半夏一錢半生薑三分當歸梢二分紅花少許右剉如麻豆大都作一服煎法如常忌酒濕麵枳實丸出楊氏家藏方治脾胃積寒氣不升降中腕痞悶心腹作痛發渇不常枳實麩炒黄色一兩半陳橘皮去白一兩半蘿蔔一兩炒木香半兩人參去蘆頭半兩右為細末麵糊為丸如梧桐子大每服五十丸濃煎木𤓰湯下三稜丸心下如盤久不已令人四肢不收發黄疸飲食不為肌膚始由肝病傳脾脾當傳腎腎乘王而不受邪故留於脾胃成痞氣其脈緩澁兼治食癥酒癥血蠱血瘕氣塊時發刺痛婦人血分男子脾氣横泄三稜莪术各四兩芫花二兩右三味用米醋三斤煮令醋盡獨炒芫花令乾將二味切片子焙乾同為末麵糊丸如豌豆大橘皮湯下五丸以知為度普濟方卷一百七十
