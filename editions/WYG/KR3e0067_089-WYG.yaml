body:
  text: 普濟方卷九十明周王朱橚撰諸風門心中風附論心中風之狀多汗惡風舌焦善怒赫赤色病甚則言不快診在口其色赤夫心受風風盛則生熱熱盛則汗不止心之液為汗故也汗多則腠理踈踈則懼邪相薄是以惡風又心惡熱熱極則唇焦内燥多怒心之聲為言病甚則言不快心氣通於舌故也又其証胸背拘急不可傾側手心熱盛靣赤頭痛熻熻𤼵熱不能安卧忪悸汗出恍惚不安以心主血脉其風日久隨榮衞行内外相搏藴積而然也若唇正赤尚可治急灸心腧百壯服續命湯若唇或青或白或黄或黒此為心已壊為水面目不時悚動者不可復治在五六日而斃矣方定神琥珀丸出聖濟摠録治心中風發動不知漸成􅋪癎驚悸恍惚琥珀搗研真珠搗研末牛黄研天竺黄搗研鉄粉研龍齒研各一两膩粉研犀角鎊甘草炙剉龍膽升麻露蜂房㣲炒丹砂研防風去义黄芩去黒心麥門冬去心焙白石藥鈎藤人參遠志去心知母焙天門冬去心焙茯神去木各三分乾蠍酒炒一两半麝香研一分金箔一百片銀箔一百片與金箔丹砂同研㫁星菖蒲九莭者去莭鬚令淨米泔浸切焙三分右除别研外為末入研者同研令㫁星煉蜜和𢷬三百杵丸如梧桐子大每服二十丸食後臨卧煎甜竹葉湯下日二夜一芎麝丸出聖濟總録治心中風驚恐愁憂煩燥錯亂若風邪流入五臟則徃来煩悶悲啼吸吸短氣𤼵熱恍惚喜卧心中胸湧怒起顛倒手足厥冷飲食嘔逆芎藭龍骨白茯苓去黒皮紫石英搗研防風去义細辛去苖藥鉄精搗研甘草炙剉厚朴去粗皮生姜汁炙剉各一两枳實去穣麸炒丹參蜀椒去目并開口炒出汗桂去粗皮人參大黄剉炒附子炮裂去皮臍乾姜各一两分炮白芥子生研三分遠志吳茱茰湯浸焙炒三分禹餘粮煆醋淬两三分菖蒲九莭者去鬚米泔水浸切焙用一两一分右先將一十九味為末與别研參味和匀煉蜜丸如梧桐子大每服七丸温熱水下食後臨卧各一服牛黄散出聖惠方治心臟中風心神恍惚恐畏悶亂不得睡卧志意不定言語錯誤牛黄一分細研犀角屑一分朱砂半两細研麝香一分細研羚羊角屑一分防風一分去芦頭天麻一分獨活一分人参一分去芦頭茯神一分沙参一分去芦頭天竺黄一分細研鉄粉半两細研川神麻一分龍齒一分麥門冬半两去心焙白鮮皮遠志一分去心龍腦半分細研甘草一分炙㣲赤剉右為細散都研令匀每服一錢煎麥門冬湯調下不計時候服荆瀝湯出千金方治心風虗熱𤼵即恍惚煩悶半身不仁攣急方見中風半身不遂類羚羊角散出聖惠方治心藏中風言語蹇澁恍惚驚悸神志錯亂面赤心煩四肢不利羚羊角一分麻黄一两去根莭獨活三分赤茯苓三分黄耆三分剉黄芩三分秦芄三分去苖遠志三分去心桂心三分芎藭三分麥門冬一两去心葛根三分剉石膏一两赤箭三分白鮮皮三分人参三分去蘆炙沙參三分去蘆頭甘草半两炙㣲赤剉杏仁三分湯浸去皮尖雙仁麸炒㣲黄右為散每服四錢以水一中盞入生姜半分煎至六分去滓不計時温服牛黄丸出聖濟總録治心中風忽忽驚悸言語不利短氣煩悶口苦舌強牛黄研一分麥門冬去心焙丹参炙各一两一分銀屑一分半别入水銀少許同研遠志去心一两一分甘草炙防葵防風去义細辛去苖葉茯神去木紫石英研各一两桂去粗皮一两蜀椒去目并閉者妙出汗一两乾薑炮一两人参附子炮裂去皮臍各一两紫菀去土菖蒲九莭者去鬚莭米泔浸切焙各三分本方丹参一方作丹砂右先將一十五味為末與别研三味和匀煉蜜丸如梧桐子大每服五丸食後煎人参茯苓湯下日二夜一忌海藻菘菜猪肉䓤血物餳犀角丸出聖惠方治心藏中風言語顛倒錯亂頭面心胸煩熱或時舌強語澁不安忪悸犀角屑三分天麻三分防風三分去蘆頭遠志三分去心𦍑活三分沙参三分去蘆頭茯神三分龍齒一两川升麻三分天門冬三分去心焙葳􅅋三分羚羊角三分鉄粉一两細研金銀薄各五十片細研𤣥参三分牛黄一分細研朱砂一两細研水飛過麝香一分細研右為末入研了藥都研勻煉蜜和丸搗五七百杵丸如梧桐子大每服不計時以薄荷湯下十五丸人参飲出聖濟總録治因於驚邪風入心包或加胸背悶痛驚怖小腹㣲痛寒熱心煩悶色變青黄赤白兼治虗勞驚懼風邪諸疾人参甘草炙獨活去蘆頭麻黄去根莭煎掠去沫焙乾當歸切焙芎藭石膏碎秦芄去苖土各二两白术細辛去苖葉桂去粗皮各三分附子炮裂去皮臍一枚防風去义一两一分赤芍藥炮半两乾薑炮半两黄芩去黒心一两杏仁湯浸去皮尖䨇仁炒四十枚右剉如麻豆每服三錢匕水一盞煎至七分去滓温服日三人参丹砂丸出聖濟總録治心中風恍惚驚悸安神志化痰涎人参丹砂研各三两紫石英研白石英研龍齒研細辛赤箭天門冬去心焙遠志去心生乾地黄焙龍腦研各一分犀角鎊菖蒲九莭者米泔浸切焙一分沙参各半两麝香研半分防風去义半两白茯苓去黒皮三两右為末煉蜜丸如小雞頭大每服一丸温酒嚼下不拘時候服牛犀丸出御藥院方治心虗善忘煩悸風涎不利聦明耳目治諸顫掉及治三十六種風益精神壯心氣或多徤忘􅃦􅄰定驚心常似憂或忪或動徃徃欲倒狀類暗風四肢顫掉多生怯懼每起煩燥悲涕愁煎並皆属心臟氣虧冝服此藥以鎮心神生犀鎊一两天麻炙黄半两牛黄研敗龜酥炙半两茯苓去皮遠志去心人参去蘆頭肉桂去粗皮龍腦研龍齒酥炙黄朱砂研各一分麝香别研半两石菖蒲剉半两金箔銀箔各五十片羚羊角屑半两右搗極細煉蜜為丸如梧桐子大食後臨卧温水化下二丸或加四丸至七丸朱砂丸出聖惠方治心藏中風手足驚掣心神狂亂恍惚煩悶言語蹇澁朱砂一两細研水飛過龍齒一两犀角屑一两天麻三分人参一两去蘆頭秦芄三分去苖川升麻三分羚羊角屑一两防風半两去蘆頭茯神一两黄芩半两鉄粉一两半細研麥門冬一两半去心焙遠志半两去心漢防己三分鉛霜三分細研右為末都入乳鉢内同研令匀煉蜜和搗三二百杵丸如梧桐子大每服不計時以粳米粥飲下二十丸荆瀝湯出千金方治心虗寒隂氣傷寒損心驚掣悸語聲寛急混濁口喎冐昧好自􅀏厲風心方荆瀝三升母姜取汁一升麻黄白术芎藭各四升防風桂心升麻茯苓遠志人参𦍑活當歸各三两防己甘草各三两右㕮咀以水一斗五升煎麻黄两沸去沫以下諸藥煮取三升去滓下荆瀝姜汁煎取四升分四服日三夜一忌海藻菘莱酥生葱桃李雀肉等犀角散出聖惠方治心臟中風語澁昏昧四肢不利翕翕發熱胷中煩悸犀角屑三分防風三分去蘆頭沙参三分去蘆頭羚羊角屑三分𦍑活三分甘菊花三分麻黄三分去根莭麥門冬三分去心茯神三分遠志三分去心杏仁三分湯浸去皮尖䨇仁麸炒㣲黄白鮮皮三分人参三分去蘆頭柴胡三分去蘆頭甘草一分炙㣲赤剉右為散每服四錢以水一中盞入生姜半分煎至六分去滓不計時温服茯神散出聖惠方治心藏中風冐昧不知胸背拘急心煩語澁翕翕熱時自汗出四肢不利茯神三分獨活三分當歸三分剉㣲炒桂心三分黄芩三分防風三分去蘆頭赤芍藥三分秦芄三分去苖杏仁三分湯浸去皮尖雙仁麸炒㣲黄沙参三分去蘆頭羚羊角屑一分甘草一分炙㣲赤剉麝香研一分天南星牛膽櫃者半两右為末煉蜜丸如雞頭大每服一丸細嚼荆芥人参湯下食後臨卧服麻黄散出聖惠方治心臟中風虗寒顫心驚掣悸語聲混濁口喎冐昧好􅀏麻黄一两去根莭白术一两防風一两去蘆頭桂心三分川升麻三分芎藭一两茯神二两一分遠志三分去心人参三分去蘆頭𦍑活三分當歸三分剉㣲炒漢防己半两甘草半两炙㣲赤剉右為散每服三錢水一中盞入生姜半分煎取五分去滓入荆瀝半合更煎一两沸不計時温服沙参散出聖恵方治心藏中風虗煩目旋恍惚不定沙参三分去蘆頭麥門冬半两去心石膏三分防風三分去蘆頭人参三分去蘆頭獨活三分枳殻一两麸炒㣲黄去穣赤茯苓一两芎藭三分羚羊角屑三分遠志半两去心甘草半两炙㣲赤剉右為散每服四錢以水一中盞煎至五分去滓入竹瀝半合更煎一两沸不計時温服金箔琥珀丸出聖濟總録治心中風恍惚忪悸言語不正金箔三十片研琥珀研丹砂研白茯苓去黒皮真珠研人参犀角鎊天南星炮各一两麝香研龍腦研各半两雄黄研四錢安息香二两酒研去沙熬牛黄研六錢虎睛研一對甘草炙半兩右為末和匀酒煮安息香膏并蜜和丸如雞頭大每服一丸食後人参湯化下牛黄定志丸出聖濟總録治心中風精神不寧壓驚鎮心化涎安神牛黄研龍腦研乾蠍炒白殭蠶炒白附子炮各半两雄黄研一两丹砂研二两天麻酒浸焙甘草炙各一两半夏湯洗七次焙乾炒黄二两琥珀研三分烏蛇酒洗去皮骨灸一兩右為散每服四錢水一中盞生姜半分煎至伍分去滓入竹瀝半合更煎一两沸不計時温服茯神散出聖惠方治心臟中風語澁昏悶四肢沉重精神不守茯神一两𦍑活一两蔓荆子三分龍齒一两人参三分去蘆頭薏苡仁三分防風三分去蘆頭赤芍藥半两麥門冬一两去心遠志三分去心犀角屑三分麻黄一两去根莭甘草半两炙㣲赤剉右為散每服四錢水一中盞生姜半分煎至六分去滓不時温服防風丸出聖惠方治心臟中風驚悸言語混濁煩熱恍惚心神不安防風三分去蘆茯神一两人参三分去蘆頭龍齒一两天麻三分麥門冬一两去心焙白鮮皮一两犀角屑一两薏苡仁三分小草三分天竺黄三分牛黄一分研入右為末入研了牛黄令勻煉蜜和𢷬二三百杵丸如梧桐子大每服不計時以糯米飲下二十丸辰砂天麻丸出聖濟總録鎮飬心神擒截諸風和流榮衞滋潤筋絡通開膈胸宻表腠丹砂半两天麻一两半夏温煑軟焙乾天南星各半两蠍梢一分炒白附子半两硼砂一分研入麝香一分研入牛黄半两研入白殭蠶半两炒右為末水煑麺糊為丸如梧桐子大每服六十丸荆芥湯下不計時候葳􅅋散出聖惠方治心臟中風精神昏昧煩熱多汗口靣赤驚悸頭痛葳􅅋一两薏苡仁一两白鮮皮三分麥門冬一两去心茯神三分犀角屑三分石膏一两防風三分去蘆頭遠志三分去蘆炙甘草半两炙㣲赤剉右為散每服四錢以水一中盞煎至五分去滓入竹瀝半合煎一兩沸不計時温服丹砂煎出聖濟總録治心中風邪神不寜虗熱朝歇丹砂三分研雄黄一錢研甘草炙大黄剉炒當歸切焙各二錢芍藥六錢乳香研沒藥研各半錢膩粉研錢半右為末與生白蜜和匀入銀石器中重湯煮成煎每服櫻桃大一粒煎薄荷湯化下小児可常服烏犀散出聖濟總録治心中風精神冐悶語聲錯誤恍惚多驚烏犀角二两鎊丹砂研獨活去蘆頭遠志去心人参各一两防風去义一两半海荆子炒一两丹参一两右為散每服二錢匕食後酒調下日三觧語丹出永類鈴方治心脾中風舌強不語半身不遂白附子炮石菖蒲遠志肉天麻全蝎去毒酒炒𦍑活殭蠶各一两木香半两牛膽一两南星一两右為細末丸梧桐子大朱砂為衣每三十丸薄荷湯下脾中風附論脾中風者其脉浮緩惡風多汗舌强語澁口靣喎僻肌膚不仁身體怠惰四肢不欲舉色薄㣲黄不嗜食診在鼻上其色黄又曰踞而腹滿身痛吐酸汁又曰熻熻發熱形如醉人腹中煩重皮肉瞤動􅀈氣脾埤諸藏灌四旁者也所主四肢故脾中風則身體怠惰四肢不欲動脾者倉廪之官故病則不嗜食診在鼻中央之位也其色黄黄土之色煩重發熱風之候也形如醉人者邪氣之甚若吐醎汁不絶者先尚可胗療急灸脾腧百壮服續命湯若目下青手足青者不可復治矣