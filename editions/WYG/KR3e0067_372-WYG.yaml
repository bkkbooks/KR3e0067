七竅壅聚痰塞經絡闗膈不通潮涎灌心眼目翻騰頭項仰强赤蜈蚣一條酒炙滴乳香一錢别研天竺黄二錢半臘茶二錢雄黄二錢别研甘草二錢炙荆芥穗一錢炒白礬一錢煆菉豆半生半炒右為末每服半錢毎一嵗一錢煎人參薄荷湯調下天麻丸治小兒天瘹眼目翻上手足抽掣發歇不定天麻末硃砂龍齒鉛霜天竺黄已上各一分麝香半分五味並細研白芥子微炒一分天漿子七枚右為末煉蜜和丸如黄米大不計時候以薄荷酒研下一丸稍急加至三丸或五丸立效牛黄散治小兒天瘹眼目喎斜手足驚掣發歇不定牛黄細研乾蝎生用各半分木香一分羗活獨活白殭蠶生用硃砂細研水飛過各半兩乳香一顆如粟米大右為末羅為散同研令勻不計時候以乾槐枝煎湯調下一字量兒大小加减服之胡黄連丸治小兒驚風天瘹并一切疳痢胡黄連半兩肉豆􅅳去殻一枚㯽榔煨炒訶梨勒煨去殻紅雪蜜陀僧丁香各半兩右為末麫糊為丸如麻子大每服三丸五丸空心米飲下心疳黄連湯肺疳米飲脾疳羸瘦紅􅀥湯食疳吐血生薑湯驚疳瀉血鹽湯肝疳目皮中生瘡甘草湯腎疳冷地卧食泥土紫笋茶湯氣疳腹脹橘皮湯一方入麝香一分和勻牛黄膏治驚風天瘹白附子全蝎欝金雄黄各一分蟬蜕六十箇膩粉半錢巴豆肉一分水浸一宿右研細末蜜和丸入龍腦麝香各少許每服皂子大薄荷冷水下硃砂丸治小兒天瘹心神煩亂搐搦不定硃砂細研白殭蠶微炙胡黄連熊膽各一分黄牛黄麝香並細研各半兩乾蝎七枚微炙右為末同研令勻以粟米飯和丸如菉豆大不計時候以金銀薄荷湯下三丸量兒大小加减服之定命丸治小兒慢驚風天瘹撮口搦乳癎壯熱困重一名定命丹方見本門急慢驚風類蟬退散治兒驚風天瘹撮口搐搦乳癎心熱夜啼驚癎蟬退六十箇去土足翅荆芥穗一兩甘草半兩蜜炙大黄半兩紙褁煨黄芩半兩生用蝎梢五十箇去毒右剉散每服二錢水一盞白茅根煎服夜啼蟬退疹瘡紫草得利止木香丸治兒内瘹肚痛驚啼木香没藥舶上茴香炒鈎藤等分全蝎乳香各半兩右以乳香没藥别研次入諸藥末合畢大蒜少許研細和丸桐子大日乾每二丸鈎藤湯調下芸薹散治小兒瘹氣治腹肚瘹芸薹子炒蓬莪荗炮茴香炒青橘皮去白甘草炙已上各一兩木香炮一分右為末每服半錢用鹽酒熱調下抵聖丹治天瘹胷膈不利乳食不下急驚風錫恡脂一兩研極細水飛淘去黒水令净牛黄鉛霜熊膽各一分並細研麝香蟾酥一錢研右研勻粳米飯和丸如黍米大每服五粒至七粒新汲水下牛黄散治天瘹清心截風一名清心散牛黄半兩細研硃砂細研水飛麝香細研各一錢鈎藤蝎梢各為末天竺黄研各半兩右研勻每服一字新汲水下膩粉丸治小兒天瘹臟腑風熱壅滯四肢抽掣大小便不利膩粉巴豆霜麝香細研各半兩欝金地龍馬牙硝各一分右研令細以糯米飯和丸如菉豆大一嵗一丸以薄荷湯下三嵗已上即服二丸牛黄丸治小兒天瘹牛黄硃砂鈎藤各一分末蟾酥麝香蝸牛去殻十枚右研細令以糯米飯和丸如黍米大不計時候先以水化破二丸滴在鼻中相次即以温水更下三丸量兒大小加减服之保生定命丹治小兒天瘹四肢抽掣眼目戴上精神恍惚皮膚乾燥身體似火夜卧不安心中煩躁熱渇不止冝服此藥光明砂研水飛過水銀煑􅀥肉研令星盡各一兩膩粉牛黄腦麝金箔四十片右研如粉入水銀更都令研勻用粟米飯和丸如麻子大三嵗兒每服用新汲水研破三丸服之三四嵗兒每服五丸不計時侯量兒大小以意加減服之鈎藤飲治天瘹潮熱鈎藤人參去蘆犀角屑各半兩甘草炙半分全蝎天麻各一分右為末每服一錢水半盞煎至一半去渣服赤靈丸治小兒瘹癎病急慢驚風丹砂研水飛過人參為末各一兩酸􅀥研二兩白麫二錢乳香研半兩右和研令勻用生蜜和膏入新竹筒内以油紙封扎定坐飯甑上炊候飯熟為度分作三十丸每一丸分四服薄荷湯化下更量兒大小以意加减服之麝香散治小兒驚風天瘹小兒卒然驚悸眼目翻騰壯熱不已四肢抽掣上仰如釣縳之狀名曰天瘹乍作乍止此風熱痰涎之所發也良由乳母恣噉五辛熱酒之類毒熱氣流入乳中因即乳兒兒飲乳臟腑風熱脾胃生涎痰涎既生心肺壅滯不得宣通致令心神不安為天瘹之病麝香研膩粉研牛黄研乾蝎去土炒白附子炮一分右研極細每服一字薄荷湯調下早晩各一服乳香丸治驚風内瘹腹痛驚啼鷄心㯽榔一錢半乳香半錢没藥沉香各一錢蝎梢十四箇右為末煉蜜和丸如梧桐子大每服二丸菖蒲鈎藤煎湯調下靈花歸丹治感厥急風心邪癎疾小兒天瘹驚風及疳熱等病蛇黄四兩紫色者佳用火煅令通赤取出以紙襯地上出火毒一宿杵羅為末更入乳鉢研如麫獖猪糞二兩野放小硬者用瓶子固濟燒纔烟盡為度勿令白過恐藥劣候冷研令細硃砂半兩鐡粉一兩麝香一錢研右乳鉢内同研極細以糯米粥為丸如鷄豆大一切風用薄荷湯酒磨下一丸小兒半丸疳熱用冷水磨下一丸分作四服修合時忌婦人雞犬見如是大人小兒中風口噤反張涎滿者灌下一服立醒小兒被驚及發熱並以薄荷煎湯磨下此藥又名神穴丹合子挑漆盤於日内曬之及乾翻看每丸下有一小穴通丸内其藥中空也舊法須用端午及甲午日合急即不須靈砂丹治衆疾及小兒瘹風硃砂半兩大附子炮青橘去白杏仁去皮尖各一兩巴豆春冬用一百箇秋夏用五十枚以水五升慢火煑三十沸右先將巴豆以水五升煑令油出水盡為度細研與衆藥末和勻以粳米飯和丸如豌豆大小兒瘹風桃柳枝一握煎下小兒肚脹石榴湯下小兒及患人相度虚實加减服一方用炮薑一兩南星丸治小兒天瘹口噤戴目手足搐搦不定天南星天雄白附子水銀於銚子内先鎔黒錫半分後下水銀結為沙子細研半夏湯洗七遍去滑各一分右為末用槐膠和丸如黄米大一嵗一丸三嵗三丸不計時候以温薄荷湯化下治小兒天瘹多涎搐搦𤼵歇不定乾蝎微炒羗活鉛霜細研各半兩麝香細研一錢蟾酥研入半錢右為末同研令勻煉蜜和丸如菉豆大不計時候以薄荷汁破兩丸服之量兒大小以意加减茴香散治四十八候茴香炒芸薹子各半錢田螺殻二錢甘草三寸炙川楝子一分用肉右為末每五分煎沉香湯調下木香湯亦可治小兒天瘹牙闗急硬筋脉搐掣乾蝎七枚生用硃砂一分細研麝香牛黄各細研猢猻頭骨塗酥炙黄各半分右細羅為散不計時候用新汲水調下五分極者不過三服瘥量兒大小以意加减服之一字散治小兒天瘹四肢拘急時復搐搦喉内多涎夜即驚厥宜服天南星炮製蕎麫研入各一分壁魚兒十枚半夏七枚生用醋石榴殻右為末入在石榴殻内以鹽泥封裹于竈下慢火燒以泥乾燥為度取出去殻焙乾搗細羅為散如孩兒小弱只可用一字以乳汁調灌之一嵗已上用酒調一字服汗出為效殭蠶散治天瘹白殭蠶炒馬牙硝研欝金乾蝎去土炒各半兩右搗研為末每服一字乳汁調服甚者五分不拘時候治小兒天瘹驚風搐搦牙闗𦂳閉目吐涎天竺黄雄黄燕脂各一分阿魏半分右同研為末以醋一茶碗煎成膏入蛜􅖉天麻烏蛇末各半分和丸米粒大不計時候温酒下三丸乳汁下亦得量兒大小加减服之治小兒天瘹多涎搐搦發歇不定天竺黄硃砂各細研乾蝎㣲炒白附子炮製各一分右為末同研勻以煉蜜和丸如菉豆大不計時候以淡竹瀝研一丸量兒大小臨時加减治小兒天瘹臟腑風熱壅滯四肢抽掣大小便不利巴豆霜一分乾蝎微炒藿香白殭蠶㣲炒各半兩右為末以麫糊和丸如菉豆大三嵗以金銀犀角煎湯下一丸如無動静更服二丸下惡物炲煤及𤓰汁相似便瘥量兒大小加减服之一字散治天瘹醒風爽精神天南星半兩微炮製蟬殻一分微炒白殭蠶乾蝎各一分右為細末次入蕎麫一分用醋石榴殻一枚將諸藥入在石榴殻内以鹽泥封裹于竈下慢火燒之泥乾為度取出再研勻每服一字温酒調下歸命丹治小兒天瘹多涎及搐搦不定水銀一分以少􅀥肉研細令星盡牛黄麝香各半分錫恡脂一兩細研水淘黒水令盡右細研用軟粳米飯和丸如黍米大不計時候以新汲水下二丸量兒大小加减服之治小兒天瘹及驚風𤼵歇不恒方鸛鵲糞微炒牛黄細研半分乾蝎五枚微炒麝香一分右為末不計時候新汲水調下五分量兒大小加減服之蚱蟬散治小兒天瘹眼目搐上筋脉急蚱蟬㣲炒牛黄雄黄並細研各一分乾蝎七枚生用右為散不計時候薄荷湯調下一字量兒大小加减服之治小兒天瘹臟腑壅滯壯熱搐搦五靈脂一兩白附子生用南星生用各一分右為末以醋一升熬成膏後入蝸牛末二錢麝香一錢和丸如菉豆大每服一嵗一丸以乳汁研破服之如無乳汁即以金銀湯下入口瘥保生丸治小兒天瘹臟腑壅滯壯熱搐搦巴豆七粒生用去皮心天南星一枚炮製蛜􅖉五枚生用右將前藥晴明時初夜于北極下露之一宿明旦搗羅為末取䜴四十九粒口内含不語脱脚皮爛研和丸黍米大隨年丸數以温水下殭蠶散治小兒天瘹及急驚風搐搦白殭蠶二枚微炒蛜􅖉一枚微炒茛菪子一枚微炒令黄右細羅為散用温酒調注入口中令睡汗出即瘥如睡乆不可驚起如一二嵗患急即頓服之稍慢即分三服𤣥參丸治小兒天瘹驚風搐搦牙闗急閉目吐涎元參水銀各半兩乾蝎一分微炒右為末以棗瓤研水銀星盡内少煉蜜同藥末和丸如菉豆大三嵗已下用薄荷湯研破三丸服之三嵗已上即加丸數服定命散治小兒天瘹驚風不能哭泣藜蘆欝金川芎各等分右為細末鼻中嘀㗜之如哭可醫欝金散治小兒天瘹急驚風盛熱方見本門急驚風類治天瘹翻眼向上硃砂通明者菉豆大三粒乾蝎一箇全者銚内炒過右為細末以飯少許和丸如菉豆大患者用硃砂少許細研入酒内化下一丸頓愈塗􅇟法治小兒天瘹驚風草烏一作川烏芸薹子等分右為末用新汲井水塗􅇟頂上雙金散治天瘹驚風目久不下眼見白睛兼角弓反張聲不出者蜈蚣一箇去頭足尾真酥塗慢火炙黄置砧子上面南用竹刀子當脊縫中停剖作兩箇在邊者入一左貼内寫左字右邊者亦入一貼子内寫右字不得交錯大悮矣麝香一錢細研分二處先將左邊者同入乳鉢内研作細末却入在左字貼内收起别用乳鉢將右邊字者入麝香同研極細却入右字貼内不得相犯收之右以細葦筒子取左字貼内藥少許吹入左邊鼻右亦如之用藥不可多若眼全未下更添些小其眼便下即止治小兒天瘹眼目搐上并口手掣動冝服此方用壁魚兒十五枚如已乾者以乳汁相和研爛更入乳汁用灌入口立效南星散治小兒天瘹用天南星大者一枚掘地作坑安瓦一片先用火燒赤後放天南星於瓦上用酒半升傾天南星上即以盞子覆之候冷剉搗羅為散每服一字温酒調下二嵗已下以乳汁調普濟方卷三百七十二
