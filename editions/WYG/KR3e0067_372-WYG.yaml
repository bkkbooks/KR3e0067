body:
  text: 普濟方卷三百七十二明周王朱橚撰嬰孩驚風門慢脾風附論小兒生下中慢脾風候時吐嘔頻咬牙手足掣瘲舌捲頭低兩眼上視先頭低而次視髙此候久瀉痢而下冷藥只止瀉痢不治得脾是以脾胃虚臟腑乗虚故此所致先用均氣散調一日後便下一醉膏下後用治脾散夾真心丸健脾散常服之即愈若使喘吐咽哽角弓反風死候不治小兒慢脾風候是傷寒疹子庸醫未明表裏便即宣利臟腑更使冷熱藥相通故小兒眼不開脾困極不省手足不收此病但回陽醒脾調治方愈若更吐瀉必定損命也曽經吐痢不止損傷肝胃或慢驚之後病已𫝊極總歸虚處惟脾所受故曰脾風若逐風則無風可逐若治驚則無驚可治但脾間痰涎虚熱往來爾其眼合者脾困氣乏神志昏迷痰涎凝滯然爾所謂慢驚難治者慢脾風是也一名虚風凢小兒或吐痢之後面色虚黄大勢虚損若因虚而發熱即𫝊慢脾矣纔見搖頭斜視以手摸人昏迷喜睡額上汗多身亦粘汗其聲沉小而焦即是脾風證未必皆由急慢驚風𫝊次而得醫者詳之三闗紋紫絲或青絲或黒絲隠隠相雜似出不出其證面青額汗舌短頭低眼合不開搖頭困睡常常吐舌頻嘔腥臭噤口咬牙手足㣲搐而不收或身冷身温而四肢厥脾氣困乏神志昏迷虚熱往來痰涎凝滯治法大要醒脾回陽黒附湯川烏散生附四君子湯靈砂若眼半開半合手足不冷尚在慢驚不可回陽或已𫝊慢脾陽氣未脫先服薑附回陽之劑手足漸暖冝漸退回陽熱劑以醒脾等藥調理慢驚慢脾危惡之證可畏而大衝有脉眼中睛光瞳人動活顖門未䧟面色不至黯黒襯脚知痒猶可用力即灸百㑹次服附子理中湯研回陽丹同服之百㑹穴取前後髪際至頂門拆中又取两耳尖至頂門拆中是穴用線量之艾炷麥子大或五壯七壯慢脾風候兒病至此所以難醫葢由其證為驚與風𫝊經已極總歸虚處惟脾所受故不曰胃風胃属陽其病既𫝊陰臟故無胃候兒既尚有胃氣可以一向生胃兼與回陽即漸甦省若更加攻擊驚風脾亦不受而又𫝊散諸經不可得而加藥若見眼合即是脾風冝服下項藥治慢脾風乃是不得已而設其疾危如燈無油漸見昏滅錢氏所用金液丹又青州白丸子各半細研和勻飯飲薄荷湯下一錢半錢許此乃截風回陽一方四君子湯加黒附末四分之二脚手氷冷者可和對半生薑棗子煎服之此方古人用之豈不周當所録下項良方亦盡世之善也治慢驚慢脾須禁腦麝膩粉水銀粉霜之類及寒凉動臟等或以燥熱俱不可用只宜回陽醒脾湯與服慢脾風候十箇孩兒有九箇以艾灸之須當斟酌病候巳未脉絶之理若一臟絶即不可用藥謂如眼無光指甲青四肢垂軃五體俱冷不可勉强用藥慢驚慢脾欲絶之時虚痰上攻咽喉引氣粗大脉來浮數是謂隂盛强陽或誤認為陽氣已復又有喉中痰壅不識覆燈將絶之證又强用藥痰隨氣下氣隨痰絶人以醫殺咎之茅先生小兒受慢脾風歌四肢逆冷候吐瀉補還遲脾胃伏除涎擁肺心生毒熱面青時如此呼為慢脾候更加喘𠻳不能醫小兒形證論四十八候慢驚𫝊慢脾歌慢脾只是傷寒轉吐唇瀉虚涎脾胃存四肢逆冷頻頻嘔沉困難醒豈易明紅目閉手㣲搐病行心藏及脾神醫者鎮心為上法更開闗竅細詳論莫令加喘頭先軟眼白矇矇命不存四十八胃兼有虚涎下大青丹一二服更將搐鼻散開闗次用醒脾散四十八候慢脾將死候歌驚入風癎𫝊在脾直眼不動卧如尸搐搦已休牽掣定為他安好不生疑便通大小難收歛徧體如氷汗若泥眼日不開常似睡睡中不覺赴幽期又四十八候慢脾侵肺歌慢脾多睡證何如吐㵼相𫝊脾胃虚逆冷四肢多重困虚涎脾伏盛難除生風肺臟添邪熱任喚千聲氣不舒更使目瞪兼項㰱十中難保一人甦大醒脾散治脾風内虚昏迷不醒亦可釀乳全蝎焙白附子炮天麻炮甘草炙人參去蘆白茯苓去皮木香炮石菖蒲白术陳皮去白南星炮石蓮肉肉豆􅅳山藥各二分縮砂仁一分丁香一分右為㕮咀薑棗煎服回陽加附子白薑鳥蛇丸出傳信適用方治小兒慢脾風及慢驚風鳥蛇一兩酒浸一宿天漿子二十箇去殻天麻半兩乾蝎一分天南星半兩炮白附子半兩川附子一兩炮防風半兩半夏半兩洗七次方用已上並酒浸用火焙乾為細末入後藥牛黄硃砂麝香雄黄已上各一錢右並研以糯米粥和丸如黄米大每十丸一計時候煎荆芥湯下以風搐止為度鈎藤煎治小兒虚風鈎藤防風去皮芎藭天麻酒浸切焙麻黄去根節各一分荆芥穗蟬殻去土蝎梢炒各半兩白殭蠶十四粒炒薄荷心二十六枚酒浸焙龍腦麝香各一字研右𢷬研為細末鍊蜜和成煎每服皂子大荆芥紫參湯下羗活膏出㓜㓜新書治小兒急慢驚風或因吐瀉後脾胃虚𫝊作慢脾之疾羗活獨活人參白茯苓肉桂木香防風已上各三錢水銀硫黄全蝎各三錢金銀箔各十片真麝香一錢右為細末蜜和為膏每服一黄豆大薄荷湯化下醒脾散四君子湯加全蝎陳皮木香白附子炮南星炮陳米川鳥剉半夏麯右為末薑􅀥煎逐旋服急服則吐醒脾丸出十便良方治小兒慢脾風因吐利後虚困昏睡欲生風癎厚朴白术舶上硫黄天麻各半兩全蝎防風人參官桂各一分右為末酒浸蒸餅和丸如雞頭大每服一丸搥研温米飲下沉附湯出直指方治慢脾風厥冷吐瀉沉香丁香木香黒附子炮白附子焙全蝎藿香天麻各等分右為末每半錢炙甘草生薑煎湯調下身温則去附子硃砂散出幼幼新書治慢脾風硃砂天麻各一錢殭􅁞七箇天南星一箇白花蛇項下肉一塊皂子大麝香少許蜈蚣右為末每服一匙薄荷湯下沒石散出幼幼新書治慢脾候此藥醒脾沒石子二箇硃砂三錢滑石研白礬丁香各三錢半夏一兩生薑三兩搥爛同浸水一宿後將半夏劈碎又以水同煮乾取出以麫一錢乳鉢搥爛揑作餅子炙熟為末右為末每服半錢以冬𤓰子煎湯調下不拘時候一醉膏治小兒慢脾風候花蛇鼻蝎尾天南星心川烏臍大附子側白附子耳蜈蚣蟲肚右各半錢生用以􅀥肉五十箇和前藥研成一塊以腦麝滴水和丸如梧桐子大每服一丸用薄荷自然汁磨化下銀白散出幼幼新書治小兒胃虚吐㵼煩渇成慢脾者乾葛人參去蘆白茯苓山藥白扁豆各半兩半夏一分湯洗去滑姜製成餅炒黄糯米一合淘漲姜汁浸一宿炒黄右為細末每服二錢水八分生薑二片同煎温服丁沉散治小兒慢脾驚風似搐此名瘈瘲常似睡而四肢與口中氣温合眼露睛或啼泣如鴉聲丁香沉香人參白茯苓白术炒白扁豆右各等分為末每服半錢飯飲調下看大小加减白殭蠶丸出活幼口議治嬰孩小兒慢風候痰涎盛不化牛膽製南星一錢白殭蠶去􅁝炒錢子地龍五靈脂川者全蝎炒黄以上四味各一錢半夏末一錢用生薑汁浸右為末水煮半夏末糊丸麻子大每服三十丸煎金銀薄荷湯下一方薑湯下脾家有風乃虚所致驚搐所由生也痰涎是故作也隂癎不暴其實駭醫若以衝烈之味投之愈見害重誠為不可所以禁却腦麝通利闗竅之藥悉無利益治法所宜者即今選用妙方頼以活人白殭蠶一味去痰尤能截風既已𫝊入慢脾則風痰混致驚熱交臨醫工看候用藥當權緩急决其可否候未脱去陽者直宜與服之若陽虧隂盛至危至急候變非常精神色脉俱足駭人者當服下項良方一方無南星鈎藤飲子出㓜㓜新書治嬰孩小兒因吐瀉體虚發搐作慢脾魚口眼直視睡不醒目不開鈎藤防風麝香麻黄各一分去節用蝎稍蟬殻各半分右為末每服半錢或一錢量大小加减薄荷湯調入醋一滴調勻服如四肢厥逆入附子三兩片同水五分薄荷一葉煎二分熱服連進三二服或吐瀉體冷多睡用附子半錢炮去皮臍為末或作剉散白术一錢白豆蔲一箇甘草炙一寸􅀥一箇水八分慢火煎至三分温服作兩服體便暖只煎四君子湯加入沉香橘皮喫五六分更喫暖驚藥三兩服乳毋忌口不再驚黒附湯出活幼口議治慢脾痰盛四肢逆冷黒附子炮取末重二錢白术一錢南星炮一錢甘草炙一錢半夏湯洗七次一錢右㕮咀每服二錢水一小盞生薑三小片棗一箇煎至半盞去渣通口以時時與服所覺手足暖其候漸省藥即止之术附湯出醫方集成治慢脾風身弓髮直吐乳貪睡汗流不已大附子一箇炮白术一兩煨木香半兩肉豆蔲一枚麫煨甘草半兩右㕮咀每服二錢水半盞姜三片􅀥一枚煎服辰砂膏治慢脾冷痰壅滯手足冷而微搐黒附子一枚八錢重去皮臍頂上刻一孔入辰砂丸一錢重用附子末塞之以炭火三七燒存性南星炮半兩白附子炮川五靈脂蝎梢各一分右為末錬蜜和丸如梧桐子大每服一丸生薑汁泡調下白殭蠶丸治慢脾陽未甚脱者可用能截風方見本門慢脾風類厚朴去麄皮以水一小盞煮盡後細切焙乾用白术湯浸半日切片子用蜜炙香黄色硃砂各一分研麻黄半分長直者以熱湯浸軟用姜汁浸半日乾蝎七个尾梢全者每箇用大葉薄荷褁上用浸軟麻黄纒了微以姜汁再浸以竹筯上炙令表裏焦黄色右並𢷬羅極細再入乳鉢内與硃砂研千百遍每服半錢或一錢煎金銀薄荷湯調下但小兒服藥後㣲汗出是効凡小兒欲作慢驚必先壯熱多睡頻吐若吐止即驚止不止定作慢驚為難治吐證以金液丹研令細滴水為丸黄米大用硃砂青黛為衣每服五十丸以上以下不濟事用米飲下定吐救生丹亦甚佳然十有三四不能止者此方百無一失者但費心力耳不然十有八九不救二方功效不可具述千萬秘之非至誠好事者不可妄𫝊丁香餅子丸出㓜㓜新書治小兒吐瀉後生風慢脾者及久瀉亦治胃虚丁香五十粒藿香葉一分木香韶粉大附子炮各一棊子大一云各二錢右為末攪勻生姜自然汁作餅子用粗燈盞内水煮軟化開服或要急用作餅子入􅀥子一枚煎大白再生丸治小兒慢脾驚風似搐此名瘈瘲常似睡而四肢與口中氣温合眼露睛或啼泣如鴉聲陽起石酒煨浸生硫黄南星炮大附子炮去皮臍右等分為末用蒸餅為丸如菉豆大陳米飲下五丸至七丸更量兒大小加减服之治小兒慢驚風吐奶霍亂吐瀉出㓜㓜新書丁香一錢霍香三分右為細末煉蜜為丸如菉豆大每服三丸或大叚吐瀉水飲下半錢治脾風出楊氏寳書附子炮二錢蝎七枚白附子三個炮南星炮二錢右為末每服半錢水三分盞生姜一片冬𤓰仁子五粒劈破同煎至二分量兒大小减加黒附湯出危氏方治慢脾風面青額汗舌短頭低眼合不開睡中搖頭吐舌頻嘔腥臭噤口咬牙手足㣲搐不收或身冷或身温而四肢冷其脉沉微陰氣極盛胃氣極虚十救一二葢慢驚之後吐瀉損脾病𫝊已極總歸虚處惟脾所受故曰脾風若逐風則無風可逐若療驚則無驚可療但脾間痰涎虚熱往來其眼合者脾困氣乏神志沉迷痰涎凝滯而然爾世所謂慢風難治者慢脾風是也附子炮去皮三錢木香一錢半白附子一錢甘草炙半錢右剉散每服三錢水一盞生薑五片煎取一半以匙送下若手足暖而蘇即止醒脾散治小兒吐瀉脾虚生風天南星一箇重七錢者去心入縮砂一錢丁香一錢南星内上面却用南星心末封口慢火煨熟切碎藿香葉人參白茯苓各一錢右為細末每服半錢入冬𤓰子仁少許同煎至三五沸温服治小兒慢脾風衆醫不效用此藥瘥附子炮製去皮臍木香不見火懐乾肉豆􅅳生硫黄去漿水煮黄煮赤者不用其間夾石者須去右等分為細末每用冬𤓰子四十九粒水六合煎至三合入藥一錢再煎至一合為一服治身冷汗出至虚緩搐者醒脾虚風出㓜㓜新書大附子一錢去皮臍炮大全蝎七箇大白附子三箇炮天麻二錢右為細末每服半錢濃煎冷冬𤓰仁湯調下治小兒慢脾初