body:
  text: 普濟方卷三百九十三明周王朱橚撰嬰孩癖積腹滿門宿食不消附論夫小兒腸胃嫩弱飲食易傷若將養失宜乳哺不節致脾胃不能傳化水穀之氣故令乳食宿夕停滯不消其候腹滿壯熱眠寢不安診其三部脉俱沉滑者乳不消也經云以胃氣為根本而以飲食為命脾為中州乃土也胃受土之氣滋味萬物𤣥機曰食入胃而脾為磨化布五味以飬五臟榮飬百骸潤澤四肢固其根本也巢氏曰胃氣調和則乳哺消化脾胃虚冷則宿食不消楊氏曰驚惕不食者心為脾母火能生土當用心藥入脾胃藥中母能令子實古人進食方用益智等者此也小兒宿食不消身體發熱或發吐瀉宜用水精丹利之却下補藥調理如身上熱不退瀉不止仍發渇心躁宜進玉珍散二三服如更不退須進銀涎散三服却將調胃氣藥相間服若只瀉清水宜用白龍丸一二服錢氏論食不消脾胃冷故不能消化當補脾益黄散主之方金箔丸治小兒驚風妳食不化或外受風傷冷毒瀉血一切諸疾悉治之金箔四十九片硃砂水銀牛黄青黛各研白殭蠶㣲炒蟬殻麻黄白附子天麻麝香研犀角末乾蠍天南星一錢右修事畢入乳鉢内研令勻細用生蜜和為錠子以油單子裹毎服二丸桐子大薄荷湯化下傷寒用生薑薄荷湯化下小兒諸疾無不效胡黄連丸治小兒驚疳化涎消食胡黄連牛黄硃砂麝香少許蘆薈青黛鈎藤管仲膩粉少許鶴虱各等分右為末麫糊為丸如粟米大毎服三丸至五丸如有驚食只取下食如無不動牛黄鼈甲丸治少小癖食壯熱食不消化中惡忤氣並宜治之方見本門代赭丸治小兒驚熱腹脹宿食不消積年瘦弱代赭石一兩丹砂别研麝香别研犀角一分大黄牛黄各三分當歸鼈甲巴豆别研枳殻各半兩右搗羅九味為散入巴豆再研勻煉蜜和搗一二百杵丸如麻子大二三歳兒空腹熟水下四五歳已上量大小加之丁香丸治小兒宿食不消心腹虚脹丁香木香乳香細研雄黄細研青橘皮各一分肉豆䓻去殻檳榔各二兩巴豆霜半分硫黄一錢硃砂半兩右為末研令勻煉蜜和丸如黍米大毎服以粥飲下三丸量兒大小加減服之九味當歸湯療小兒宿食不消發熱當歸甘草芍藥人參桂心黄芩乾薑各一分大棗五枚大黄二分真珠丸治小兒驚熱化聚滯妳食墜涎利攻腸真珠細研天竺黄為細末硃砂各一分丁頭代赭雄黄各研麝香各半兩杏仁三十粒湯浸巴豆十粒去皮右為細末研令匀煉蜜為丸如菉豆大毎服以生薑湯下一丸三歳以上加減服之快膈消食丸又名消乳丸縮砂仁橘皮荆三稜蓬莪荗神麯麥蘖已上各半兩香附子甘草炙各一兩右為末麫糊丸如麻子大食後白湯送下大小加減一方無甘草三稜丹調冷熱消宿食荆三稜神麯木香各一兩乾薑半兩半夏一兩生薑汁製丁香陳橘皮去白桂心各半兩右為末煉蜜丸鷄頭大毎服一粒薑湯化下消穀丸治小兒宿食不消體熱多眠嘔噦氣上陳麯木香人參乾薑麝香甘草枳殻麩炒㣲黄右各等分搗研為末煉蜜丸如黄米大每服二十丸温米飲下犀角丸治小兒宿食不消心腹脹滿止痰逆利胸膈進乳食犀角青橘皮荆三稜木香各半兩黑牽牛炒二兩巴豆去心半錢皂莢三梃右六味與巴豆研勻麫糊丸如麻子大毎服七丸至十丸食後生薑橘皮湯下量兒大小加減平胃丸治丈夫小兒食實不消胃氣不調或温壯熱結大小便不利者有病冷者露宿丸熱藥後當進此丸調胃大黄二兩小草甘草芎藭葶藶各一兩芍藥一兩杏仁五十箇右為末蜜丸如桐子大每服五丸日三服一歳兒二丸漸加之千金翼有菖蒲當歸乾薑茯苓麥門冬細辛無杏仁為十二味訶梨勒散治小兒宿食不消化少飲食四肢消瘦腹脇多脹訶梨勒皮三分白术麥蘖炒陳橘皮檳榔各半兩甘草一分人參半兩右搗粗羅為散毎服一錢以水一小盞煎至五分去滓量兒大小分減温服日進四五服代赭丸治小兒宿食不消壯熱腹脹代赭細研當歸炒硃砂細研枳殻麩炒木香各半兩麝香一兩巴豆霜半兩右搗為末入研藥更研令匀煉蜜丸如麻子大每服以粥飲下二丸更量兒大小以意加減黄芩散治少小腹大短氣進食不安穀為之不化黄芩大黄甘草麥門冬芒硝各二兩石膏一兩桂心八銖右切以水三升煎取一升分為三服一歳以上為五服麝香安中丸治小兒飲食不化寛中止吐甘松葉三兩益智香皮香附子各三兩蓬荗一兩南木香半兩麝香一錢右除麝别研外餘藥同為末白麫糊為丸更用生熟油少許一處和劑量兒大小丸如黍米大毎服二十丸至三十丸薑湯下不計時候木香丸治小兒氣弱開胃進食木香人參白茯苓青皮陳皮各去瓤肉豆䓻已上各一分右為末麫糊丸如麻子大每服十丸薑湯下七味進食丸常服能進飲食方見本門三稜散疎脾土消食化積三稜炮莪术益智仁甘草神麯麥蘖橘紅各五分右為末白湯下香朴散治小兒脾胃氣弱乳食遲化宿昔成積久而不消兼和氣止瀉及腹肋刺痛起止痛不思飲食厚朴一兩木香麥蘖陳皮青橘皮各一分右為細散毎服半錢湯調下陳橘皮散治小兒宿食不消心腹脹悶亦治嘔逆惡心背寒脚冷陳橘皮髙良薑人參檳榔各一分白茯苓甘草炙各半兩右搗粗羅為散每服一錢以水一小盞入生薑少許棗一枚煎至五分去滓不計時候量兒大小分減温服檳榔丸治小兒宿食不化發熱有時檳榔牽牛子川大黄各半兩乾薑炮枳殻去瓤甘草各一分右為末煉蜜和丸如菉豆大毎日空心温水下五丸晚後再服更看兒大小臨時増減服之人參丸一名參术丸治小兒宿食不消吐痰涎亦治逆食及乾嘔食少人參丁香乾薑白术陳橘皮各一分半夏半兩右為末煉蜜和丸如麻子大毎服以温水下五丸日三服量兒大小以意加減􅄶銀丸歌曰壯熱時時又作寒都縁食積未能安早求良藥須清肺免得兒啼心欲酸白术陳皮同桔梗巴霜和蜜去頑涎水銀磨入生犀服銀箔為衣病永痊白术桔梗橘皮各一兩銀箔三片水銀一錢犀角一錢巴豆二粒右為末蜜丸如小豆大捻令褊薄荷湯研下一丸玉珍散治小兒乳食不消頸腫舌青驚躁渇瀉驚熱驚疳滑石白者石膏半兩甘草白附子白殭蠶已上各一分蚌粉水淘火上焙乾右為末入腦麝各少許毎服嬰孩一字二三歳半錢五七歳一錢麥門冬熟水下如渇瀉烏梅湯調下驚疳燈心湯調下小兒氣怯者腦麝須要極少千金丸治小兒食不消木香烏梅肉桂各一兩􅔈砂半錢胡椒半分巴豆三十粒右為細末稀糊為丸芥子大每服十丸紫蘇湯下挨積丸治小兒脾胃不和宿食不化腹脹腸鳴嘔逆惡心便利不調乳食減少或疳瀉大便酸臭亦治丈夫胸膈不快酒積食積嘔逆惡心吐瀉脾痛荆三稜丁皮各三兩丁香青皮各一兩乾薑巴豆各半兩右為細末入巴豆拌匀麫醋糊為丸如粟米大每服可五丸加至六丸二歳兒可服七丸至十丸生薑湯吞下熟水亦得不拘時候更量兒歳數加減與之此藥不用大黄􅔈砂汞粉之類並是温性之藥常服清積滯進乳食退黄令兒長肌肉芍藥丸治小兒不生肌膚腹大食不消化芍藥大黄一兩一分桂去粗皮赤茯苓三分柴胡一兩右為末煉蜜和搗三二百杵丸如麻子大五六歳空腹米飲下三丸晚再服量兒大小加減人參湯治小兒胃氣虚宿食不消吐利人參赤茯苓白术各半兩甘草一分半夏半兩右粗搗篩每服二錢水一盞生薑二片煎至五分去滓温服不計時候日三服量兒大小加減牛黄丸牛黄附子三枚真珠巴豆去皮杏仁各一兩右五味搗附子真珠為末下篩别搗巴豆杏仁令如泥内藥及牛黄搗一千二百杵藥成若乾入少蜜足之百日兒服如粟米大一丸三歳兒服如麻子大一丸五六歳兒服如胡豆大一丸日二服先乳哺了服之膈上下悉當㣲轉藥丸全出者病愈散出者更服以藥丸全出為度青木香丸治大人小兒寛中利膈行滯氣消飲食治胸膈噎塞腹脹痛心下堅痞腸中水聲嘔噦痰逆不思飲食木香二十兩補骨脂十兩黑牽牛二十四兩研蓽澄茄四十箇檳榔四十兩右為細末入牽牛末匀漸入清水和令匀丸如菉豆大毎服二十丸茶湯熟水任下食後服毎酒食後可服五丸七丸小兒一歳服一丸懐姙娠人不可服進食丸安和脾胃消化積滯止嘔噦吐利除心腹脹滿利胸膈散滿痞常服丁香一錢豆䓻二箇木香半錢巴豆九箇五靈脂七錢右為細末麫糊為丸如菉豆大每一二錢食後生薑湯下桃葉湯下亦得一方用陳皮湯下磨積丸治小兒臟腑怯弱内受積冷脇肋脹痛嘔吐痰逆腸鳴泄瀉日夜頻併四肢困倦靣無顔色肌肉消瘦不進飲食及疳氣羸瘦肚大青筋口乾煩渇小便白濁食不生肌或發虚腫寒熱往来或因食甘肥蟲動作痛呌哭合眼並能治之乾漆炒丁香各一兩青皮去白荆三稜各六兩蓬术半斤右為細末水糊為丸如粟米大毎一二歳可服五丸淡薑湯吞下不拘時候更量歳數虚實加減與之順氣丸治小兒乳食不化腹急氣逆巴豆十粒胡椒二十粒丁香二十粒青橘皮二十枚全青湯浸去白右用米醋一升煮候醋盡出焙乾為末爛飯丸如粟米大毎服二丸米飲下更量兒大小加減延年草安神導虚消酒食益脾老人小兒皆可服青皮一斤湯浸三日又三換甘草六兩上等白鹽花五兩再淋新舡上茴香四兩右用甜水同藥入金鍋銀鍋亦得不住手攪勿令着底置宻器中收不得走氣候水盡慢火燒令乾不得有焦氣選謹慎者一人專主之去甘草茴香不用只收貯青皮如傷生冷果實菜蔬之類即嚼數片隨即無恙常服一兩片極佳白芷丸治小兒常服消乳食白芷半兩檳榔一箇青橘皮一分巴豆四粒炮右為末同研麫糊為丸如粟米大温水下三丸至五丸常服三味紫霜丸治小兒乳食不消方見本門五靈脂丸治小兒宿食不消心腹脹悶五靈脂代赭各一兩巴豆霜各一兩右為末入巴豆霜同研令勻用麫糊和丸如粟米大毎一歳以温水下一丸加至三丸洗心散治小兒妳食傷心作壯熱喘息不調欬逆多睡甘草一錢麥門冬一錢皂角半兩入糖右爛杵羅為末毎服二錢水一盞煎至八分作五服時時吃肉豆䓻散治小兒宿食不消肉豆䓻二枚川大黄一分剉右搗粗羅為散毎服一錢以水一小盞煎至五分去滓温服日三服更隨兒大小以意加減鷄子湯治小兒食不消腹滿不利鷄子五箇亂髮鷄子大梳去垢右取煮鷄子汁淋髮上及熱數按之令汁出取服量兒大小與之無毒得下妙白龍丸治嬰孩乳食不消瀉不止白龍骨白石脂各一分右為末滴水丸如菉豆大毎服三丸紫蘇木𤓰湯吞下一日三服量兒大小加減又方治小兒腹中脹悶疳氣傷食急肚瀉痢不能轉動青州棗一箇巴豆一粒右巴豆安棗内慢火炙令焦黑乳鉢細研入麝少許用飯為丸如麻子大一歳一丸如傷食用熱米飲下如瀉用冷熟水下忌生冷油膩熱物銀涎散治嬰孩乳食不消發渇心躁用粉霜不拘多少入乳鉢研令極細毎服嬰孩一字四五歳以下半錢煎蓮花湯下冬月以蓮肉煎湯下木香化滯丸治小兒宿食不消心腹滿脹嘔吐壯熱木香荆三稜青橘皮各一兩補骨脂二兩黑牽牛四兩右為末滴水和丸如黄米大毎服三十丸温水下不拘時候紫霜丸治乳食宿滯不化胸膈不利嘔吐惡心便利不調大便酸臭重傷乳食或作諸癎代赭醋煅碎赤石脂各一兩杏仁十粒巴霜一錢净巴豆取仁二錢右除杏仁巴霜外為末却入杏巴研匀水浸蒸餅丸黄米大毎五七丸温米飲下發痛湯治小兒痛病皆由乳食不匀不能消化而成三稜蓬术青皮陳皮藿香川芎白芷甘草各等分右為散毎二錢生薑二片棗一箇食前漸漸與之三稜煎丸治小兒食飲過多痞悶疼痛宿食不化久而成癖此藥專能治婦人血積血