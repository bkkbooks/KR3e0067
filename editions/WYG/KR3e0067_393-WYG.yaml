半夏麴丁香木香各半兩乾薑炮二錢半白术炒白茯苓人參粉草各半兩炙右為末米飲調服局方理中丸亦妙一方用東行牛尾拭其口涎張浼方名温脾丹與上散同去人參茯苓甘草加青皮或陳皮二錢半糊丸如黍米大木香散能和表裏通行津液木香大腹皮官桂前胡陳皮丁香訶子人參半夏赤茯苓甘草縮砂仁各三錢右為麄散毎服三錢水一大盞生薑二片煎至六分稍熱空心服量兒大小以意増減替針丸治因冷傷脾心腹痛脇肋疼硬不思乳食臟腑不調青皮陳皮荆三稜枳殻厚朴訶子白豆䓻各一兩肉豆䓻檳榔各半兩乾薑三分右為細末水煮麫糊丸如麻子大生薑橘皮湯下二十丸食前服四君子丸治小兒脾虚受食不尅化停積中脘吐逆惡心臟腑泄瀉常服消化食滯進飲食厚腸胃充肌體恱顔色退黄疸縮砂仁烏梅肉焙乾陳橘皮訶子肉各一兩右為末煮好大棗取肉為丸如麻子大毎服三十丸至五十丸棗湯熟水送下不拘時服玉桂枝丸治小兒飲食減少臓腑不調厚朴藿香陳橘皮神麴訶子皮各二錢川芎丁香木香白术甘草各一錢人參三錢右為細末煉蜜和丸如櫻桃大毎服一丸生薑湯下食前服小兒一丸分二服米飲化下羸瘦附論夫小兒羸瘦不生肌肉者皆為脾胃不和不能飲食即血氣衰弱不能榮於肌膚也凡小兒在胎而遇寒冷或生出時挾伏熱皆令兒不能飲食故羸瘦也挾熱者身體壯熱肌肉㣲黄挾冷者時時下痢脣口青色也方秦芁丸治小兒羸瘦體熱心神煩悶小便赤黄秦芁去苗桑根白皮剉枳殻麩炒去瓤地骨皮黄耆剉人參去蘆頭赤茯苓犀角屑甘草炙各半兩龍膽去蘆頭柴胡去苗三分右為末煉蜜和丸如菉豆大不計時候用粥飲下五丸更量兒大小増減訶梨勒散治小兒羸瘦脾胃氣弱挾於宿食四肢不和訶梨勒皮陳橘皮湯浸去白瓤焙甘草炙各半兩黄耆剉人參去蘆頭白术藿香桂心白茯苓各一分右搗粗羅為散毎服一錢以水一小盞入生薑少許棗一枚煎至五分去滓温服日三四服量兒大小以意加減丁香散治小兒羸瘦脾胃虚冷四肢不和不欲乳食丁香桂心白术髙良薑甘草炙㣲赤各一分剉白茯苓厚朴去粗皮薑汁炙黄陳橘皮湯浸去白焙各半兩人參去蘆頭半兩右搗粗羅為散毎服一錢以水一小盞入棗一枚煎至五分去滓量兒大小分減温服日三四服黄耆丸治小兒羸瘦體熱靣色萎黄不欲乳食黄耆剉赤芍藥人參去蘆頭胡黄連甘草炙㣲赤剉各半兩麥門冬去心焙鼈甲醋炙㣲黄去裙襴各一兩柴胡去苗三分右為末煉蜜和丸如麻子大不計時候以粥飲下五丸量兒大小以意加減麥門冬丸治小兒雖食不長肌膚羸瘦骨熱小便赤黄麥門冬一兩去心焙人參去蘆頭黄耆剉青蒿子黄連去鬚桑根白皮剉枳殻麩炒去瓤地骨皮各半兩柴胡三分去苗右為末煉蜜和丸如菉豆大不計時候以熟水化五丸服量兒大小以意加減燒黄𤓰丸治小兒羸瘦體熱食少黄𤓰大者一枚黄連去鬚陳橘皮湯浸去白焙各半兩胡黄連柴鼈甲童子小便浸三宿炙黄去裙襴各一兩右搗細羅為散以黄𤓰切開頭去瓤内藥末令滿切葢子盖之用蕎麥麫和溶固濟可厚三分於糖灰火内燒令麫焦黄為度取出麫放冷入麝香一錢都研和丸如菉豆大毎服食前米飲下七丸更量兒大小以意加減甘草丸治小兒羸瘦氣惙惙宜常服不妨乳用甘草二兩炙㣲赤剉搗羅為末煉蜜和丸如菉豆大毎服以温水下五丸日二服量兒大小加減服之治小兒癆瘦并疳疾本草以黄色大蝦蟆調治同蛤煮食之治孩子瘦損用蘆薈子煎服普濟方卷三百九十三
