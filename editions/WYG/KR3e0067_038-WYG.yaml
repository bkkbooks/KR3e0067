body:
  text: 普濟方卷三十八明周王朱橚撰大腸腑門臟風下血治臟毒下血百一選方五倍子不拘多少鯽魚一枚約重四五兩者去腸胃鱗腮右以藥置魚腹中入藏瓶以火煅微欲煙盡取出為末温酒送下又方一名香連散治臟毒下血久遠不差百一選方黄連木香各等分右為末蠟茶同調下治酒毒下血多至升斗者廬州郭醫云趙俊臣帥合肥日其壻司馬機宜患此服四物湯每料加炒焦槐花二兩如常法煎服止久之復作得此方遂效獖猪肚一枚洗淨黄連四兩去鬚右以酒醋各二升半文武火煮候乾控出將肚並黄連研杵極爛丸梧桐子大每服五十丸米飲調下治腸風下血出危氏方猪臟一條控乾槐花好淨者炒為末右將槐花填入臟内兩頭線縛好米醋磁器内慢火細煮爛熟切片子砂鉢内研爛丸彈子大日乾每服用一丸空心食前當歸煎酒下治便紅如傾水經驗良方羊屎子根生者一斤所在有之夏秋生紅花結子如羊屎様又名為鐵箱草子右將羊屎子根煮生白酒一斗逐日隨量空心服至酒盡而可其生葉搗爛能煽合瘡口散血膿末漿水調用有一客在樟樹鎮胡元八郎家下如厠忽下血如傾水全行扶策卧牀病不能起店主請醫方用羊屎子神應丸經驗良方治積年便紅大黄連去鬚洗淨稱八兩剉碎如黄豆大分作二分一分用薑四兩擂爛絞取汁浸一宿隂乾生薑連皮洗淨用最妙右為末用糕糊丸梧桐子大每服五六十丸空心米飲下蒜連丸出本事方治腸風臟毒黄連一兩獨頭蒜五枚煨香熟右將蒜研爛和黄連末丸桐子大每服三十丸陳米飲下治便血經驗良方黄連四兩朴硝二兩右同炒地上出火毒研為末如糞前紅先挑藥於磁盞内用酒調服如糞後紅先盛酒於盞内後挑藥浮於酒上調服槐花散經驗良方治臟毒酒病便血槐花半兩生半兩炒山梔子一兩去皮炒右為末每服二錢新汲水調下食前服治臟毒寛大腸經驗良方枳殻淨二兩麩炒郁李仁一兩温水浸去皮右為末煉蜜丸梧桐子大或如彈子大細嚼空心温酒下枳殻散出楊氏家藏方治腸風下血及治大便急澀木饅頭細剉焙枳殻去白炒各等分右為末每服二錢空心槐花煎酒下一方無槐花煎治腸風瀉血出本草以野猪肉炙食不過十頓差或將外腎燒灰酒調下亦得治下鮮血出本草以梔子仁燒灰水和一錢每服量其大小服之治積年久病腸風下血不止一名温腸丸治下血當日止一名緑礬丸出聖惠方緑礬四兩入砂鍋内用新瓦葢覆鐵線扣定鹽泥固臍火煅通紅為度候冷却入青鹽同生硫黄各一兩同礬研過入砂鍋内依法封固再煅通紅候冷取出再研細令勻附子一兩炮去皮臍别研為末右以粟粥丸梧桐子大生地黄汁下温酒米飲下亦可每服三十丸此是氣血虚寒人服如少壯者用青蒿調水酒又臟腑虚弱下血用四物湯加防風烏梅煎服一月病源頓除久服益臟腑治腸風臟毒方一兩茱茰半兩連二味同炒不同研糞前茱茰調酒下糞後却用酒調連究原方一名烏犀方治痔疾下血等證百一選方淡䜴十枚重研大蒜二枚煨剥去皮同擂研右丸如梧桐子大每服二十丸煎香菜湯下不拘時服一方鹽湯下遇發時絶早空心用陳米飲先下五十丸午時再服一百丸以病安而止可以永絶病根一無所忌廬州彭知録大辯亦云此藥甚妙其方所用大蒜先蒸九次然後用以和藥仍以冷虀水送下病止即輟藥昔朱解元成言兄子雲及陸子揖提刑皆服之數十年之疾更不復作猪臟丸出直指方治大人小兒大便下血日久多食易饑腹不痛裏不急名曰野雞痔先用海螵蛸炙黄去皮白者為末以木賊草煎湯調下服之三日後效黄連二兩剉研嫩猪臟二尺去肥右以黄連塞滿猪臟縛兩頭煮十分爛研細添糕糊丸梧桐子大每服三五十丸米飲下鯽魚方出聖惠方治腸風血痔及下痢膿血積年瀉血面色萎黄大活鯽魚一个不去鱗肚下穿孔去其腸穢入白礬白礬一塊如金橘大右用敗棕皮重包外用厚紙裹先煨令香熟去紙於熨斗内燒帶生存性為末每服闕錢空心温米飲調下一方用瓦瓶内葢定炭火燒為灰軟飯丸梧桐子大每服二十丸粥飲下治下血二十年者地榆鼠尾草各二兩右水二升煮半頓服不斷水漬屋塵飲一小盞投之不過重作乃愈二黄丸出肘後方治腸風㵼血黄耆黄連等分右為末麵糊丸菉豆大每服三十丸米飲下治遠年近月腸風下血不止枳殻燒灰存性五錢羊脛炭為末三錢右和用濃米飲一盞調下空心服五更初一服如人行五里再服當見效忌油膩毒物等治腸風入胃下血疼痛不可忍鬱金五个大者牛黄一皂子大另研右同為末每服用醋漿水一盞煎三沸温服治腸風下血出肘後方枳實半斤麩炒去穰一方作枳殻黄耆半斤洗剉右為末非時下二錢若難服糊丸湯下三五十丸治便血紅荆芥燒存性百藥煎等分右用麩糊丸米湯下又熟煮木耳食之阿膠丸聖惠方治腸風瀉血不時腹内疼痛阿膠燥炒刺蝟皮炙當歸剖地榆龍骨研訶梨勒煨去核黄耆剉赤石脂研各一兩枳殻麩炒去穰惡實炒各三分黄牛角䚡二兩燒灰槐實炒三兩右為末軟飯丸梧桐子大每服三十丸米飲空心食前服治被通中内留腹滿生地黄汁一升白芒硝三兩右相和火上令熱通口頻服即血便息治腸風臟毒下血不止枳殻去穰麩炒無紋炭各一兩右為末每服一錢用荆芥米飲調下烏金散治腸風下血猪牙皂角四兩并皂子剉胡桃三十枚并皮炒碎右和勻以藏瓶一隻於頂上敲一圓竅入前項藥以元瓦葢之後用鹽泥固臍可厚一指許爆乾用炭火五斤煅候碧煙出絶即去火畧存性冷即出藥細研每服二錢入麝香少許温酒或米飲調食前服治腸風下血栝樓一个為末赤小豆各半兩右為末空心酒調服一錢胡荽子散治腸風下血不止變成痔疾胡荽子補骨脂各半兩右為末每服二錢陳米飲調下食前服棕艾散出聖惠方治腸風瀉血不止腹痛棕櫚灰二兩熟艾搗羅成者一兩右用熟雞子二箇同研得所别炮附子去皮臍為末每服用水一盞附子末一錢煎數沸放温調前藥二錢空心食前服一方不用附子用粥飲調服神效散治腸風槐實皂莢子各一兩右用穀糠同炒令香熟去糠為末毎服一錢煎陳粟米飲調下空心食前服荆芥散治腸風荆芥去莖枳殻去穰麩炒各一兩右為末每服逐味炒一錢拌勻入蠟茶末一錢熱湯㸃服不計時樗根散治腸風下血不止樗根皮剉炒臭橘爆乾剉炒各三兩右為末每服一錢煎皂莢子湯調下米飲亦得槐荆散治腸風下血槐花炒令香一兩荆芥穗一分右為末每服二錢糯米粥飲調下甚者一兩服效單使槐花亦妙食前服之一方用酒調服靈仙散治腸風病甚不瘥葳仙靈去土雞冠花各二兩右剉碎以米醋二升煮乾更炒過搗為末以生雞子清和作小餅子炙乾再為末每服二錢空心陳米飲調下午後更一服絮灰散治腸風㵼血破絮燒灰枳殻去穰麩炒各半兩右為末每服二錢入麝香少許用陳米飲調下食前服香术丸治腸風痔漏脱肛㵼血面色萎黄年久不瘥白术一斤糯米泔浸三日細研剉炒焦為末乾地黄半斤淨洗用碗盛於甑上蒸爛細研右相和如硬滴好酒少許衆手丸梧桐子大焙乾每服一十丸空心粥飲下加至二十丸治便血黑豆一合粉草二條不拘多少右水一碗半煎八分作二服調雞爪黄連末不拘多少空心服之治腸風下血毒氣攻注大腸疼痛鮮鯽魚一枚重半斤者硫黄末一兩右將魚不去鱗開腹去腸入硫黄在内用濕墨紙裹五七重又以泥厚封之候乾以大火燒令通赤取出於土坑内出火毒半日細研為末每食前以酒研蕓薹子汁調下一錢治腸風下血久不止大腸虚冷附子炮去皮臍白礬燒灰各一兩右為末每服二錢食前粥飲調下治大腸風毒下血不止出聖惠方薄荷一握麥糵二兩炒右為末不計時以茶㸃服又方出聖惠方蕓薹子生甘草炙剉各半兩右為末每二錢水一盞煎五分食前温服又方出聖惠方槐耳二兩炒燒灰乾漆一兩炒右為末每一錢食前温酒調下又方出聖惠方附子一枚炮去皮臍生薑半兩右㕮咀水一大鐘煎至五分去滓食前温服又方出聖惠方棕櫚皮半斤燒灰栝蔞一个炒灰右為末每服二錢食前粥飲下治腸風下血發渴不定出聖惠方膽子礬二兩細研栝蔞一枚上開一口右以礬入栝蔞内坐於慢火中更入米醋一小盞煨令醋乾却入罐子内以大火燒令通赤取出放冷細研用糯米飯和丸梧桐子大每服二十丸食前粥飲下又方釡底煤四兩漢椒二兩去目及開口者炒去汗右為末軟飯丸梧桐子大每服三十丸食前粥飲下治大腸風毒下血出聖惠方蝟皮一枚炙皂角筴三挺去黑皮塗醋炙枯去子右為末軟粟米飯丸梧桐子大每服十五丸食前粥飲下又方出聖惠方白礬二兩燒汁盡乾蝎二兩炒右為末每服半錢食前粥飲下又方出聖惠方益母草端午日採藕節六月六日採並隂乾各二兩右為末煉蜜丸梧桐子大每服二十丸食前温米飲下又方出聖惠方皂莢五挺不蛀可長一尺者去黑皮塗酥炙三兩炙盡為度白羊精肉十兩細切右先搗皂筴為末後與肉搗令熟丸梧桐子大每服二十丸食前温水下治腸風積年下血出聖惠方鹿角膠二兩炙没藥半两右為末每服一錢食前粥飲調下神效方出聖惠方治積年腸風下血不止酸石榴皮慢火焙側栢葉慢火焙各二兩右為末每服二錢食前以木賊湯下温白丸治臟毒下血及腸風用椿根白皮北引者去粗皮酒浸曬乾為末棗肉丸梧桐子大每服三五十丸淡酒下或酒糊丸一方用東行者醋糊為丸陳米飲下治腸風及脱肛不收有血下部腫悶疼痛出聖惠方用不蛀皂筴五莖搥碎水一碗揉令皂角消盡絹二重濾過取十分清汁將脱肛腸浸在藥水中自取收不用手蕩如大腸收了更用湯盪其腰肚上下令皂角氣行則不再作一方去黑皮塗醋炙為末棗肉丸梧桐子大每服一十五丸食前粥飲下治腸風瀉血出本事方用皂角樹上蕁新瓦上焙乾為末每服一錢温酒下治腸風及熱毒下血或因食熱發動出本事方用赤小豆一升瓦上炒令小黑色為末每服三錢空心粥飲下日一服一方杵末水調服方寸匕一方治卒下血搗碎以水二升絞汁飲之又方出本事方用好栝蔞三箇燒灰存性為末每服三錢米湯空心調下又方用蕨菜花不拘多少文武火焙乾為末每服三錢飯飲調下治腸風出本事方用好線􅋎不拘多少燒灰存性温酒調下二錢空心服一名蠻瓜一名天羅又名天絲瓜其實皆絲瓜也治腸風並脱肛及有血出本事方用蛇床子不拘多少炒為末去大腸肛垂處貼立收烏梅丸一名獨聖散治大便下血不止兼治久痢下腸垢亦治酒痢用烏梅三兩燒灰存性為末好醋打米糊為丸梧桐子大每服七十丸空心食前用米飲送下當歸湯亦可一方研末每服二錢空心米飲調下一方為末五更煮糯米清粥以藥末鋪粥面喫一層又用藥末喫粥盡為度必效散一名霜柿散治腸風臟毒用乾柿燒灰存性為末每服二錢米飲調下空心服一方用糊丸有人服之累有應效百一選方云痔腸風臟毒一體病也極難得藥亦縁所以致疾不同雖良藥若非對症難一槩取效常人酒色飲食不節臟腑下血是謂風毒若釋子輩患此多因飲食久坐體氣不舒而得之乃脾毒也王涣之舒州下血不止郡人朝議大夫陳宜父令四時取其方栢葉如春取東枝夏取南枝之類燒灰調二服而愈予既得此方後官贛上以治貳車吳令昇亦即效提㸃司屬官陳逸大夫偶來問疾吳倅告以用陳公之方而安陳君蹙頞曰先人也仍須用側栢尤佳道場慧禪師曰若釋子恐難用此不若灼艾最妙平量脊骨與臍平處椎上炙七壯或年深更於椎骨兩傍各一寸灸如上數無不除根者又予外兄劉向嚴掾予過之留飲訝其瘦瘠問之答云去歲臟毒作凡半月自分必死得一藥服之至今無苦問何藥不肯言再三叩始云只這桌子上有之即是乾柿燒灰飲下二服本草云柿治腸風解熱毒消宿血後有病者宜以求之素問腸僻為痔曽茂招通利之子年十餘歲時常苦此凡治腸風藥如地榆之類遍服無效因檢書見此方用之一服而愈是乾柿燒灰者曽與予合肥同官親云爾虎目湯出仁存方治便血及臟毒下血經年瘦者用好樗根㕮咀每服三錢水一盞煎七分去滓酒半盞或作丸子服亦可虚極人加人參等分極效一方為末空心温酒調下或米飲下樗根即大眼桐一名虎眼樹一名山椿治腸風瀉血并熱痢及殺疳虫出肘後方用苦參炒焦黑為末糊丸梧桐子大每服五六十丸米飲吞下一方煎服一方為末飯飲下猢猻散出仁存方治腸風失血右猢猻薑不拘多少去毛炒用酒煎去滓空心服一方燒存性碾為末米飲調下治腸風一名白梅飲出余居士選竒方用橡斗子不拘多少用白梅肉以蜜拌和填在橡斗子内候滿兩箇相和鐵線紥之烈火煅存性為末米飲調下一方治便血用橡斗子以生硫黄合之紙裹鹽泥固臍燒煅存性為末空心酒調下二服治臟毒下血久遠不差者百一選方用大蒜一枚上面切開作葢子每一瓣中揷帶殻巴豆一枚却葢了將濕紙兩三重裹文武灰火煨香熟去巴豆不用將蒜爛研和丸加黄連細末得所丸梧桐子大空心米飲下二丸又方百一選方用烏梅肉生乾地黄等分煉蜜丸梧桐子大米飲下五七丸不拘時又方百一選方治臟毒下血久遠不差者用茶篰蒻葉燒成黑灰研細入麝香少許空心糯米飲調下治腸風百一選方用蜜炙蘿蔔任意食之昔曾見一婦人服之立愈治下血久不差百一選方用地榆洗淨去鬚蘆為末糯米糊為丸小豆大每服三十丸米飲下日三服一方止腸風濃煎服治腸風一名白芷散余居士選竒方用闕香為末米飲調下神效治下血百一選方用葱鬚新瓦上炒乾為末每服二三錢米飲調下治酒毒腸風下血出百一選方一名螺殻散用大田螺五箇洗淨仰頓放在火上燒殻白肉乾為度為末只作一服熱酒下治腸風百一選方用魏桑葉燒黑灰存性每服二錢米飲調下更量虚實甚虚人恐動臟腑治腸風下血及酒毒下血百一選方用山裏棗俗名鼻涕團又名酸棗乾為末服之一方燒末米飲下又方出危氏方用栢樹子十四枚槌碎紗囊貯好酒三盞煎至八分服之反覺加多再服立止治便血經驗良方用荆芥炒為末每服二錢米飲調下婦人失血過多或經候不調温酒調下一方拌肉餛飩麵裹煮食尤妙絲瓜散經驗良方治酒痢便血腹痛或如魚腦五色腥穢者用乾絲瓜一枚連皮燒灰存性俗名魚滋是也為末酒調二錢空心服一方煨食之愈經驗散治腸風酒痢下血又治鼠子痔出血亦治血痔用黑狗脊不拘多少黄者不好須是黑者内肉赤色去皮毛剉焙乾為末每服二錢空心米飲調下難喫將醋糊丸梧桐子大每服三四十丸空心米飲下一方二兩去蘆頭燒灰存性用瓦合地去火毒為末麝香一字研勻米飲服二錢本草名貫仲圖經云苗狗脊皮黒肉赤又名作草鵞頭是也又方出聖惠方用白冦花炒棕櫚燒存性羌活各一兩細末粥飲調下二錢黄花散治臟毒大便血不痛用槐花二兩新淨者炒黄為末每服二三錢温酒下三服一方用陳久者為末亦以槐白皮煮汁調服治糞後解紅出危氏方用艾葉濃煎生薑汁三合服一方艾葉煎湯服又方用紫菀末水調五撮服止又可用王不留行又方用凌霄花浸酒服又方用桑樹上白鮮花煎服為末調服亦可并止吐血又方用黄柏為末水調服又方用白雞冠花并子炒煎服治便紅用當歸酒飲立愈又方用鐵門根煎酒服又方用棕笋煮熟薄切曬乾為末蜜湯或酒調下又方用枯桑樹下蟲屎燒灰存性酒調服又方用萱草根和薑油炒酒濺服又方用鼠鳩禽俗謂鼠勾焙乾為末酒調服更能治百病治腸風下血不止用秋後採楮皮隂乾不拘多少入麝香少許共為末酒調三錢空心服水調散出肘後方治多酒腸風及瀉血用老山梔子不拘多少去皮研細如油出成團即擘開猛火焙乾手擦羅取末磁器盛貯臨發時新汲水調服一方梔子三十枚水三升煎一升去滓服一方燒灰水和一盞盞不量大小多少服之治酒毒便血血濺用麴一塊濕紙煨碾細空心米飲調二錢橄欖散出直指方治腸風臟毒久不止用橄欖核於燈燭上燒存性為末每服二錢陳米飲食前調下黄龍丸一名酒連丸出直指方治腸風臟毒及暑瀉熱瀉用黄連淨八兩酒一大升煮乾研細水麵糊丸梧桐子大每服四十五丸陳米飲調下傷酒大便下血空心熱水下又名香蘇散加黄連荆芥枳殻服治腸風痔瀉血用羊蹄根葉蒸爛一碗食之立差茄蒂根散出肘後方治腸風下血久不止用茄蒂燒灰存性為末每服三錢食前米飲下莨菪煎出聖惠方治腸風積年不瘥羸弱用莨菪實一升治之曝乾搗篩生薑半斤取汁相合銀鍋内更以無灰酒二升投之煎令如稠􅄳即旋投酒用酒可及五升以來即止煎令可丸乃丸梧桐子大每旦酒飲通下三丸增至五丸七丸上止若丸時粘手則菟絲粉襯隔煎熬切戒火𦂳使藥易焦而失力初服微熱勿恠疾甚者服過三日當下利疾去利亦止絶有效一方有熟地黄半斤為末和丸治臟毒下血出肘後方用苦楝子炒令黄為末蜜丸米飲下十丸至二十丸治卒下血不止用龍膽一虎口水五升煮取二升半分為五服治瀉血不止用木賊草十二莖切水一升八合煎八合去滓空心温服分二服如人行五里又服治久年腸風等疾須常服勿令歇服之及一月諸疾皆愈及治久患腸風痔漏三十年不差面色虚黄飲食無味及患臟腑傷損多患泄瀉暑月常瀉不止及諸般淋􅅹久患消渴婦人月候湛濁赤白帶下多年不差應是臟腑諸疾皆主之用石燕洗淨刷去土每日空心服一枚於堅固無油磁器内温水磨服如彈丸大者一箇分三服大小以此為準晩食前更一服若欲作散須先杵羅為末以磁石器杵頭鐵屑後更入堅鉢内以硬乳鉢槌碎研細水飛過取白汁如泔乳者澄去水曝乾每服半錢至一錢清飯飲調下温水亦得治腸風海上名方用銀杏爆熟出火氣每二箇用薄荷煎一丸細嚼米飲送下治男子臟毒下血用冰蜜水任意飲之法製香附方治諸下血用大香附去毛皮童便浸一日候乾又以醋焙為末每服二錢米湯下治冷帶以炒艾煎湯下或酒醋各半焙黄秫米為丸梧子大每服五十丸米湯下治糞前有血令人面色黄出肘後方用石榴皮杵末茄子枝湯下治腸風用肥皂獨牙者燒灰存性以一片研末糕糊丸一片為末飲湯調吞下治多酒腸風瀉血及熱至多鮮血箭出如紅線者出𫝊信適用方用好實黄連三兩淨洗日乾分為三分一分剉作半寸截入陳米一兩炒黄色一分亦剉作截以手炒熱為度一分生同焙為細末粟米粥和丸梧桐子大每服五十丸空心温陳米飲下一服立效如急速不及製只用生黄連為末依法用之二服抵一服功亦治血痢水瀉一方焙乾為末酒調下治腸風下血疼痛不止經驗良方用敗毒菜根洗淨切片用連皮生老薑各半盞許同炒赤却用無灰水酒一椀煎之就以椀葢之令數沸去滓取酒隨意飲之如神丸治腸風下血不止用樗根皮於臘月内日未出時取背隂地北引者不拘多少東流水淨洗剉碎於透風處挂令乾杵細末每稱二兩入寒食麵一兩拌令勻再羅過入新汲水丸梧桐子大隂乾每服三十丸先以水藥丸令潤後於碟子内用白麵滚過水煮五七服傾出用煮藥水温下不拘時服忌見日色見日無效此藥兼治血痢如急要使不及臘月隨時依採合椿莢散治腸風下血用椿莢不拘多少將一半生用一半燒存性為末每服二錢温米飲調下不拘時保應丸治腸風瀉血諸藥不效用天南星不拘多少用石灰炒黄色為末煮酒麵糊丸梧桐子大每服二十丸食前温酒服烏金散治腸風㵼血用木鱉子不拘多少桑柴燒過微存性便用椀器合之候冷碾為末每服一錢煨葱白酒調空心服決效方治瀉血不止用巴豆一枚去皮以雞子開一小竅入豆以紙塞定别以濕紙裹用火煨熟透去殻并巴豆將雞子喫盡其病即止不得少生氣若虚人分作二服茄子酒治久患腸風瀉血用茄子種大者叄枚先將一枚濕紙裹於糠火内煨熟取出入磁礶子乘熱以無灰酒一升半沃之便以蠟紙封固經三宿去茄子煖酒空心分服如是便作不過三度差又方用黑豆小者三升淨揀退去皮搗為末煉蜜丸梧桐子大每服三十丸空心陳米飲下蛇黄散出聖惠方治腸風下血不止及脱肛腫痛用蛇黄兩顆醋淬七遍搗研如麵每服三錢陳米飲調下又方牡蠣大者一枚煅淬七次細研每服三錢陳米調下日再服治腸風痔漏大腸血用枳殻根皮搗羅為細末每服一匙日三次亦可煮汁常飲甚妙一方用枳實根皮抵聖枳殻丸治五種腸風瀉血痔漏枳殻去穰麩炒葳靈仙去苗土陳皮去白焙續斷各二兩生乾地黄焙連翹槐實炒附子去皮臍炮乾薑炒白礬煅過人參去蘆羌活去蘆頭地骨皮各二兩何首烏用米泔浸一宿竹刀刮去皮切二兩右為末煉蜜丸如梧桐子大每服三十丸空心温陳米飲下大效勝金丸治結隂便血及腸風不止羊肉精者去筋膜切一斤半用硫黄末糝在肉中以好醋一斗於銀石器中浸一伏時慢火煎如泥入臼杵千下硫黄滴生甘草汁研三日極細候乾糝入肉中葫蘆巴蓽澄茄沈香剉各半兩巴㦸天去心補骨脂炒牛膝肉蓯蓉與牛膝同酒浸切焙海同皮剉桂去粗皮白茯苓去黒皮甘草炙剉人參各一兩丁香一分肉豆蔲去殻三枚附子炮去皮臍用大者二枚右除羊肉外搗為末以羊肉膏拌勻更杵千餘下丸梧桐子大每服二十丸空心温酒下加至三十丸紫參湯治便血紫參茜根赤芍藥阿膠蒲黄青竹茹各一兩黄芩去黒心雞蘇葉小薊根去土各三分右㕮咀每服三錢水一盞生薑半塊大棗擘碎煎至七分去滓食後温服地榆散治結隂瀉血地榆桑耳甘草赤芍藥熟乾地黄焙伏龍肝各四兩艾葉炒一兩黄耆剉六兩右為細末每服三錢米飲調下食後臨卧日三服蝟皮散治大便下血方見痔漏門血痔類地黄煎丸治結隂便血生地黄汁小薊汁各一升沙糖一兩同上二味熬成膏地榆根剉焙阿膠炙令燥側栢焙各二兩右除上三味外搗為末入膏中丸小彈子大每服一丸水一盞煎至六分和滓温服桂芎湯一名桂心湯出聖惠方治結隂便血至三二升者皆由臟氣虚傷腹中疼痛桂去粗皮赤芍藥芎藭當歸焙黄芩去黒心各一兩甘草炙剉半兩右㕮咀每服三錢水一盞入竹茹彈子大一塊煎七分去滓空心温服日二服屋龍丸治大便下血腹内痛不可忍屋龍尾伏虎肝黑闕燒令􅈣㫁當歸切焙各一兩皂角子仁炒半两右為末麵糊丸梧桐子大隂乾每服三十丸煎生薑艾葉湯下空心食前服神仙必效丸治便血無度阿膠炒燥二兩當歸切焙烏賊魚骨去甲白芍藥劉寄奴各一兩右為末蜜丸梧桐子大空心米飲下三十丸加至五十丸阿膠芍藥湯一名四神散出聖惠方治便血如小豆汁阿膠赤芍藥當歸切焙各一兩甘草炙剉半兩右㕮咀每服水一盞半藥五錢入竹葉二七片煎八分去滓食前温服黑神散治久下血藁本去土烏頭炮去皮臍皂筴酥炙去皮子蜜陀僧搗碎研各等分右熨斗内用炭燒黑取出為末每服二錢煎胡荽酒調下石榴散出濟生方治結隂瀉血不止醋石榴皮陳橘皮湯浸去白甘草炙剉乾薑炮各等分右焙乾為末每服二錢陳米飲調下日三服芍藥湯出王氏博濟方治非時便血赤芍藥一兩五錢桂去粗皮甘草炙剉半兩右㕮咀每服三錢水一盞入生薑二片餳少許煎至七分去柤温服立效湯治大便下血瞿麥穗一兩甘草炙剉三分山梔子仁炒半兩右㕮咀每服五錢水三盞連根葱三莖擘破燈心二十根生薑七片煎一盞半去滓分温三服地榆湯出宣論方治結隂下血不止漸漸極多腹痛不已地榆粗者剉四兩甘草三兩半炙剉右㕮咀每服五錢水三盞入􅒦砂仁四七枚煎一盞半去滓分温二服蘹香子湯治結隂下血不止腹痛蘹香子炒三兩草烏頭蛤粉同炒去皮臍剉一兩右令勻每服三錢水一盞入鹽少許煎至八分去滓露至五更冷服雞冠丸治結隂便血不止疼痛無時雞冠花椿根皮並剉等分一用臭椿皮右為末煉蜜如梧桐子大每服三十丸濃煎黄耆湯下空心食前日三服蕪荑丸治下血結隂用蕪荑一兩搗碎研細用紙裹壓去油再研為末用雄猪膽丸梧桐子大每服九丸甘草湯下日五六服連三日可斷根金屑丸治便血一切血妄行結隂用葉子雄黄不計多少入棗肉内線縛定滿煎湯用鉛一兩五錢鎔成汁傾入湯内同煮自早至晩不住添沸湯取出研令極細其棗子以磁器盞子盛於飯上蒸過取肉丸梧桐子大每服三丸煎黑鉛湯下便血甚者只三服差金虎丸結隂便血用黄蘗一兩去粗皮雞子清塗炙為末滴水丸菉豆大每服七丸温水下治大腸風毒瀉血不止出聖惠方用㯼藤子三枚厚重者以七八重濕紙裹煨良久脹起去殻用肉研為末每於食前以黄耆湯下一盞治腸風臟毒瀉血不止出聖惠方用五倍子擘破一半燒熟一半生用分兩不限多少為末陳米軟飯丸如梧桐子大每服二十丸食前粥飲下又方出聖惠方用何首烏二兩為末每服一錢食前温粥飲調下治腸風瀉血不止甚者面黄弱瘦出聖惠方用川烏頭一兩去皮臍生用為散每服三錢水一中盞入生薑半分黑豆一百粒煎至五分去滓食前温服治熱毒下血或因食熱物發動出本草用生葛根二斤搗取汁一升并藕汁一升相和服龍骨餅子治臟毒便血不止用龍骨烏賊魚骨各等分為末每服一錢入雞子清一枚白麵同和揑作餅子三枚糠火内煨熟細嚼用温米飲送下空心食前服治腸風臟毒酒痢下血出本事方用黄連生薑湯下二氣丹次服五槐丸治腸風百一選方用煎黑散調消風散又煎黄連湯下連翹丸或紅丸子黒散亦作婦人産藥黒神散治臟毒用槐角丸釣腸丸三黄丸烏梅丸酒蒸黄連丸同大烏沈湯以沸湯調下治腸風下血用生料四君子湯煎服更患痔瘡亦服此藥即愈治便血用胃風湯加粟米煎服治臟腑虚損不收久作腸風下血出危氏方用震靈丹玉華白丹二藥夾用煎不換金正氣散加川芎空心嚥下治腸風出危氏方用消風散米飲調吞烏荆丸酒蒸黄連丸隨意服治臟毒便血不瘥裏急後重用紅丸子小理中丸三稜丸連翹丸酒蒸黄連丸好酒空心服藥味分停加至一百丸每日三服三日立愈治咽熱出汗即投水中浴又值雨便血不效服諸藥難瘥用服五芩散獲安治腸風用胡荽子和生菜熱餅裹食良甚黄耆湯若血隨大便而下或先或後此飲食不節饑飽不時勞傷脾胃榮衛不調或強忍大便氣無從出腹陷於隂氣併於隂則血失常經或醉飽房勞酒入於胃絡脈滿而經脈虚勞動則氣血相併不勝者為病故先便而後血者其血逺先血而後便其血近所下不常有所觸動則作血遠者宜方見諸血門諸失血類烏荆丸治腸風下血諸風拘攣每服二十丸用枳殻散送下聖金丸一名百藥散百一選方治腸風下血溺血不止及臟毒或無故便血用百藥煎三兩生一兩炒焦一兩燒存性為末丸梧桐子大每服五十丸米飲空心服一方用軟飯蜜丸空心亦可一方為細末每服二錢米飲調下四季側栢飲治腸風臟毒瀉血不止用草烏頭去皮尖切如黑豆大炒令焦色喫見不麻方住炒用韭菜攪自然汁和丸如梧桐子大每服空心陳米飲下十四丸不過兩服即瘥敗毒散治脾毒下血臟腑疼痛頻徃圊厠後重努咽槐花炒白礬燒及八分許存性二味等分是生時稱右為細末每服烏梅一箇藥一錢水一盞煎至六分去滓温服側栢散治腸風臟毒酒痢下血不止嫩栢葉九蒸九曬二兩陳槐花一兩炒半黑色右為末煉蜜丸梧桐子大每服四十丸空心温酒下槐花丸治臟毒腸風下血槐花半兩炒黄連半兩淨擇炒木香二兩曬乾右為末用烏梅十箇酸醋浸一宿取肉熬成膏同前藥搗勻為丸如乾入少許煮梅醋和丸梧桐子大每服十五丸至二十丸血成痢不止以地榆三寸搥碎空心食前煎湯下或酒或穀道疼痛𦂳逼連進三服尋常兩日一服如聖丸治腸風臟毒下血不止日久羸瘦大蒜研細淡豆䜴地榆各等分右為末大蒜同研令勻入煉蜜少許搗令得所丸如梧桐子大每服三十丸煎椿葉湯下空心服無椿葉取大眼桐皮刮青皮煎白湯下血餘散治瀉血臟毒一服效血餘半兩燒灰雞冠花根栢葉右為末臨卧温酒調下二錢來晨酒一盞投之立愈没藥丸治氣及酒毒瀉血泄瀉腰腿重及大便血似腸風者神驗没藥半兩五靈脂三兩川烏頭一兩四錢通炒至黑焦色大附子一兩炮製去皮臍右為末稀糊丸梧桐子大每服十五六丸艾湯下米飲鹽湯亦得空心食前當歸地黄丸治男子婦人腸胃氣傷下血不止或鮮或黑日夜頻併及血氣衰弱皮膚枯燥腰脚疼痛榮衛不足渾身酸痛血氣虚肌瘦者尤宜服之當歸大者一兩去蘆酒浸熟地黄洗浸再酒浸一宿焙乾二兩川芎一兩鵞卵礬二兩火煅盆覆地上出盡火毒右為末煉蜜丸梧桐子大每服三十丸空心鹽湯或温酒服至五十丸茶箬胭脂散治腸風下血茶箬一握綿胭脂十箇白梅四十九枚右件共燒灰和勻米飲調下二錢空心服絲瓜散治下血甚不可救者絲瓜一箇一名天蘿燒灰存性槐花等分如氣虚減分右為末每服二錢飯飲調服神效黄耆散出指南方治遠血黄耆二兩甘草半兩枳實三十箇去皮青州棗二十箇搗爛焙乾去核慢火煨右為細末每服二錢匕米飲調下地黄丸出指南方地黄二兩王瓜一兩新瓜用炭火燒灰存性研黄連五錢右為細末煉蜜丸梧桐子大每服三十丸米飲下蒲黄散出指南方治純下青血蒲黄三兩微炒木賊末一兩右為細末每服二錢匕米飲調下杏丹出十便良方治臟毒下血杏仁四十九粒去皮尖蠟一兩右二味臼中熟杵自然可以為丸每服空心米飲下三二十丸忌魚腥服永不發曾有人服之效後𫝊與一人每服即止惟不能忌魚腥然發亦不至於甚通神散出十便良方治瀉血縮砂仁不拘多少去粗皮右為末米飲調熱服有效斗肛丸出十便良方治大便後出血白礬附子乾薑各一兩右搗篩蜜和丸如梧桐子大米飲服十丸至二十丸日二忌猪雞酒麵生冷魚油膩等物蓮子散出家藏經驗方治新舊腸風臟毒下血旱蓮子右用新瓦上焙乾為末每服二錢米飲調下食前服人參散出家藏經驗方治腸風臟毒人參白茯苓黄耆蜜炙甘草五味子各等分右共為細末每服二錢白湯調下每日三五服孫運使云有此疾常常服之不至力乏不至面黄多多為佳皆以為妙附子當歸丸出續易簡方治腸風冷在腸胃下血手足冷而脈微小當歸洗焙三兩白芍藥一兩附子去皮白术各一兩右為末醋麵糊丸如梧桐子大米飲下五十丸食前服鳯眼草散出楊氏家藏方治腸風下血鳯眼草揀淨即椿樹筴也褐油血水淘淨已上二味各四兩枳殻去穰二兩麩炒輕粉一字右為末每服二錢酒調下米飲亦得空心食前服地榆散出楊氏家藏方治腸風下血不止地榆訶子煨去核赤芍藥橡斗各一兩右為細末每服二錢酒調下米飲亦得空心食前服蝟皮散出楊氏家藏方治腸風下血刺蝟皮一枚於銚子内煿焦去皮只用針木賊五錢炒黄右為細末每服二錢熱酒調下空心食前服立聖散出楊氏方治年深日久腸風下血或如雞肝日夜無度全不入食通身黄腫者兼治尿血黄連去鬚一斤右為細末每服一錢濃煎荆芥蜜湯調下空心食前服松皮散出楊氏家藏方治腸風下血過多松木皮就木上用刀刮麄者只取貼木嫩皮右剉細焙令半乾再入銚内慢火炒乾為細末每服一錢入蠟茶一錢白湯㸃服食前如聖散出楊氏方治年深日近腸風下血或諸般痔漏臘日野狸一枚盤在瓦罐子内大棗半升枳殻半斤甘草四兩寸截猪牙皂角二兩都入在罐子内上用瓦片葢定再加鹽泥封固候乾作一地坑用十字瓦支足令罐子不著地用炭五秤簇燒至黑煙盡若有青煙出便去火取出用濕土罨一宿研令極細每服二錢鹽湯調下一方取野狸淨肉製造美食次將骨燒灰每服一錢温酒調下並空心食前鹿茸丸出如宜方治虚老人陽氣虧脱血不能存走失大腸鹿茸製七十兩熟地黄十斤附子製百四十箇牛膝製二十兩五倍子二斤山藥四斤肉蓯蓉三斤杜仲製二斤半右為末蜜丸梧桐子大麝香為衣每服二三十丸鹽湯温酒吞下芍藥丸出朱氏集驗方治酒毒下血芍藥炒白雞冠花炒陳槐花各等分右取青蒿根汁煮丸米飲下三十丸空心服四聖丸出朱氏集驗方治大便血一切下血香白芷枳殻燒存性川百藥煎燒存性烏梅燒存性各等分右為末糊為丸每服五十丸空心米飲下熱水亦得如聖散出朱氏集驗方治腸風下血等疾萆薢細研貫仲去土右等分為細末每服二錢空心温酒調下栢葉飲出朱氏集驗方治便血側栢葉多用入白礬水煮焙乾川百藥煎炒蔓荆子炒二味等分右入乳香末濃米飲下兩服見效當歸丸出朱氏集驗方治酒毒下血當歸芍藥炒白雞冠花陳槐花炒各等分右為細末青蒿根煮汁為丸米飲送下三十丸空心服治虚老人便血出永類鈴方大艾葉用好醋加糯米煮半日同擂作餅子焙乾鹿茸製當歸製烏梅肉茜根各一兩淨右為末以烏梅為丸米飲送下二十丸空心服神效治坐卧熱地因熱暴下便血出永類鈴方用薄荷煎同雪糕為丸荆芥煎湯下三十丸空心服治腸風下血出華陀中藏經方㯼藤子二箇可當三錢大者如更大只用一箇另研極細不蛀皂角子四十九粒燒灰存性另研細右拌勻每服二錢温酒調下如人行五里再以温酒一杯趂之日服極效越桃散出華陀中藏經方治下血及下血痢越桃梔子也槐花青州棗乾薑各等分右各燒存性為末陳米飲調下二錢皂角散出華陀中藏經方治五種腸風瀉血下痢糞前有血號痔糞後有血號内痔大腸不收號脱肛穀道四面有努肉號鼠妳痔頭上有孔號漏並皆治之黄牛角一箇剉蛇蜕一條猪牙皂角五枚剉穿山甲三片半或三片右四味同入磁瓶内黄泥封固候乾先以小火燒令煙出方用大小火煅令通紅為度取出候冷杵羅為末患者先用胡桃肉一箇分作四分取一分臨卧時研細如糊温酒調下便睡先引蠱出至五更時温酒調下藥末二錢至辰時更進一服取下惡物永除根本理大腸一切下血出華陀藏經方取雄黑豆𦂳小長者不拘多少微以皂湯浸發炒熟去皮為細末煉猪脂為丸梧桐子大每服三十丸陳米飲服熟水亦得甚效升麻補胃湯出東垣試效方治宿有陽明血證五月間大熱因吃杏腸澼下血即遠去四下散漫如篩沈然腹中不痛血色紫黑病名曰濕毒腸澼是陽明少陽經血證也升麻羌活各一錢獨活防風各一錢柴胡半錢葛根三分肉桂少許牡丹皮熟地黄生地黄各半錢白芍藥一錢五分當歸身三分黄耆一錢甘草炙五分右㕮咀如麻豆大分作二服水二大盞煎至一大盞去滓稍熱食前服益智和中湯出東垣試效方治腸癖下紅血或色深者紫黑腹中痛腹皮惡寒右三部脈中指下得俱弦按之無力闗脈弦甚𦂳肌表陽明分涼腹皮熱而喜熱物熨之内寒明矣升麻一錢乾葛一錢五分白芍藥一錢五分甘草炙一錢桂枝四分益智仁五分當歸身五分黄耆一錢牡丹皮五分柴胡五分半夏五分乾薑少許肉桂一分右為粗末都作一服水三大盞煎至一盞去滓温服食前烏梅肉丸出東垣試效方治腸風下血别無餘證登厠便見亦非内痔服之甚效直殭蠶一兩烏梅肉焙乾一兩右為末薄粥糊丸如雞頭肉大每一百丸食前服用白湯送下日三服治下血不禁如刺猪者出肘後方用藥葛氏第一豉汁方不瘥重作大效黑玉丹出醫方集成治腸風積熱下血不止刺蝟皮十八兩刮猪懸蹄一百隻牛角鰓十二兩剉雷丸四兩亂髮皂角水洗淨焙八兩敗櫻剉八兩苦楝皮五兩槐角六兩芝麻四兩右剉碎用磁罐内燒存性研為細末入乳香二兩麝香八錢研令勻用酒打麵糊丸梧桐子大每服二十丸先細嚼胡桃一枚空心以温酒吞下多進得效治下血出𫝊信適用方用栢葉不拘多少焙乾為米飲調下平胃地榆湯出衛生寳鑑方蒼术一錢白术五分陳皮五分白茯苓五分厚朴五分乾薑五分當歸三分甘草炙三分炒麴三分地榆七分人參三分白芍藥三分益智仁三分升麻一分葛根半分黒附子炮一錢右件都作一服水二盞生薑三片􅀥二枚同煎至一盞去滓食前温服此藥温中散寒除濕和胃真定總管史候男肢體本瘦因畋人致酒酸不欲食強飲三兩杯少時腹痛次𫝊泄無度十餘日便後見血或紅或紫腸鳴腹痛醫者曰見血皆熱以芍藥栢皮丸之類治之前證如故形體愈瘦面色青黄心下痞悶惡冷物口乾煩燥不得安卧診得脈弦細而㣲遲手足稍冷以平胃地榆湯主之數服病減大半又灸中脘三七壯乃胃穴發原處灸則强食生肉又以還少丹服之喜飲食添肉至春再灸三里七壯脾温胃中生發原氣乃胃之合穴也遵服藥之戒慎言語節飲食而愈治腎虚下血出澹寮方鹿茸醋炙一兩烏梅去仁一兩破故紙炒五錢杜仲五錢右炒為末粟米粥為丸每服三十丸空心鹽湯吞下治腸風臟毒便血等疾出澹寮方右用温州枳殻不拘多少逐箇刮去穰入去殻巴豆一粒以線紥兩片合定銀石器内米醋煮枳殻爛為度洗淨去巴豆以枳殻剖焙為末醋糊為丸菉豆大每服三十丸空心臘茶清吞下病愈住腹痢疾亦可用初患則留巴豆少許亦可雙聖丸出澹寮方治男子婦人老幼下血陳槐花五倍子各等分炒焦右為細末取烏梅肉水浸于甑上蒸爛搗如膏搜和為丸梧桐子大每服三四十丸空心飯飲吞下槐花散治腸風臟毒下血槐花瓦炒栢葉荆芥穗枳殻炒各等分右為細末清米飲下二錢空心服食前用黄連犀角散治下血如小豆汁者犀角屑三兩黄連末三兩右水五升煮取三升去滓入豉一升更煮三沸去滓分二服伏龍肝湯出二圓方治先便後血謂之遠血兼治吐衂伏龍肝半斤甘草炙白术阿膠乾地黄千金方作乾薑黄芩各三兩右為剉散每服五錢水一盞煎七分去滓空心温服一方有附子炮入可用三兩治下血不止用大古錢四百以酒三升煮取二升分三服亦可服半劑治腸風下血不止用獺肝燒為末服一錢匕治卒下血及金創出血不止出本草以衣中故棉絮一握煮汁温服之治卒下血出本草用懸鉤根皮濃煮服之治下血不止以柿皮曝乾更焙篩末米飲和二錢匕服之不拘上衝下脱兩服可止治下血用雞項草根十月採洗乾碾羅為散服治大下血用好墨細末二錢以白湯化阿清膠調稀稠得所頓服熱多者為相宜治腸風瀉血出本草以緑礬釀鯽魚燒灰和服一方為末用酒調下即愈治下血如雞鴨肝皮及治糞後鮮血以黄蘗為末水調服及治男子莖上瘡為末傅之治腸下蟲出本草用鰻鱺魚二斤治如食法切作段子入鐺内以酒三盞炙入鹽散中食之魚有五色文者最佳治臟毒下血經年瘦者及大腸風虚飲酒過度挾熱下痢膿血疼痛多日不瘥出本草樗樹根白皮人參各一兩右為末每服二錢空心温酒調下不飲酒温米飲下忌油膩濕麵青菜莩子甜物雞猪魚蒜等物昔洛陽女子四十六歲躭飲無度多食魚蟹攝理之方蔑如也後以飲啖過常蓄毒在臟日夜二三十行大便與膿雜下大腸連肛門痛不堪任醫以止血痢藥不效又以腸風藥則益甚葢腸風則有血而無膿凡如此已半年餘氣血漸弱食漸減肌肉漸瘦稍服熱藥則腹愈痛血愈下服稍涼藥即泄住氣羸弱食愈減服温平藥則病不知如此將朞嵗醫告術窮垂命待盡或有人教服人參散病家亦不敢主當漫與服之纔一服知二服減三服膿血皆定自此不十服其疾遂愈治腸風瀉血用鱟魚尾平微毒燒為黑灰研作末酒下先服生地黄蜜等煎訖然後服鱟尾無不斷也鱟生南海大者如扇牡牝相隨牡無目得牝方能行如牝去牡死普濟方卷三十八
