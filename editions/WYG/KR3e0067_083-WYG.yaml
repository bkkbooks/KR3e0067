去滓食後温服天麻丸出聖濟總錄治有肝膈風痰頭目旋運時𤼵昏痛天麻芎藭羌活去蘆頭各三兩半羚羊角鎊人參白殭蠶查者㣲炙各一兩乾薄荷葉二兩乾蝎炒四錢天南星半兩半分牛膽製龍腦麝香各二錢研右先將九味為末入龍腦麝香同研勻鍊蜜為丸如鷄子大以丹砂為衣每服一丸食後細嚼茶酒任下犀角丸出聖惠方治眼眉頭偏痛及頭疼心躁小便赤黄四肢煩熱不得睡卧犀角屑半兩羚羊角屑半兩甘草炙㣲赤剉天竺黄細研欝金各半兩麥門冬一兩半去心皮黄蓍剉𤣥參川芒硝柴胡去苖一兩牛黄一分細研右為末入牛黄天竺黄同研令勻鍊蜜和搗二三百杵丸如梧桐子大每於食後煎黑豆湯下二十丸芎藭湯出聖濟總録治目痛至連頭腦芎藭羌活去蘆頭蔓荆實甘菊旋復花防風去叉各一兩枳殻去穰麩炒甘草炙各半兩石膏二兩黄芩去黒心半兩右麄搗篩每服五錢匕水一盞煎至七分去滓温服食後臨臥日再荆芥湯出聖濟總録治風熱毒氣攻衝陽經頭痛目疼連遶眉額荆芥穗防風去叉甘菊旋復花芎藭枳殻去穣麩炒甘草炙各一兩石膏二兩黄芩去黒心半兩右麄搗篩每服五錢匕水一盞半生薑半分去滓食後温服日二大麻丸出聖濟總録治肝心壅熱目睛疼痛牽連眉額天麻雞蘇獨活去蘆頭人參芎藭荆芥穗細辛去苖葉甘草炙犀角屑各半兩右為末煉蜜丸如櫻桃大每服一丸嚼細茶清下食後服細辛散出聖濟總録治風氣上攻眼睛疼痛牽連頭腦細辛去苗皮甘菊花枳殻去穰麩炒赤芍藥各半錢石膏細碎水飛藁本去苖土芎藭防風去叉各一兩甘草右為散每服二錢七沸湯調下食後日二三服獨活丸治肝臟受風胷膈痰飲頭目痛漸生翳障獨活去蘆頭天麻芎藭各三兩旋復花去土牽牛子㣲炒天南星炮藁本去苖土細辛去苖葉半兩菊花右為細末生薑汁煮糊丸如梧桐子大每服二十丸荆芥湯下食後服如聖膏出德生堂方治風眼頭痛寒水石防風細辛薄荷川芎白芷獨活黄芩萆麻子去殻别研右為末冬月用蜜水調春夏秋月用井花水和塗太陽穴菊花散出聖惠方治眼風毒攻眉骨目睛疼痛如欲破磣澁淚出目不能開甘菊花羌活半夏湯洗七遍去眉蔓荆子芎藭赤芍藥枳殻一兩半麩炒黄去穰石膏三兩甘草半兩炙㣲赤剉右搗篩為散每服四錢匕水一盞生薑半分煎至六分去滓不計時候温服黄蓍散出聖惠方治風熱所攻眉骨及眼睛鼻頰偏疼痛眼生赤脈黄蓍剉甘草炙㣲赤剉旋復花川大黄剉細㣲炒枳殻麩炒㣲黄去穰已上各二兩薺苨石膏各三兩羚羊角屑一兩白菊花一兩右搗篩為散每服三錢匕水一盞煎至六分去滓不計時候温服羚羊角散出聖惠方治肝壅風熱眼眉骨連頭疼痛心神煩躁大小便難羚羊角屑赤芍藥黄芩芎藭川芒硝川大黄剉碎㣲炒三分枳殻柴胡各一兩石膏右為散每服三錢匕水一盞入竹葉三七片煎至六分去滓每於食後温服防風湯出聖惠方治風熱上攻眼眉骨連頭疼痛防風去义三分甘菊花羌活去蘆頭藁本去苖土各一兩石膏二兩旋復花蔓荆子甘草炙各半兩右為末以水一盞散一錢煎至一分食後去滓温服之七寶散一名七寶膏出聖惠方治努肉侵睛外障雖已鈎割熨烙亦宜㸃之真珠末一分研石決明三分琥珀三分研龍腦一分研熊膽一分研一方無熊膽用珊瑚一分細研水精半分研具齒半兩一方用龍齒右為細散再研勻夜卧時㸃眼眥中一方用前藥以水五升煎至一升去滓再煎至一盞入蜜半兩和膏至夜㸃之早晨不可㸃防風湯一名除風湯出龍木論治努肉侵睛防風去蘆一兩一方用二兩桔梗炒一兩細辛去苖葉各一兩黄蓍細剉一兩一方用二兩五味子一兩茺蔚子一兩一方用二兩大黄剉炒一兩右粗搗篩每服五錢匕以水一盞半煎至一盞去滓放温食後臨卧各一服黄連煎出聖濟總録治肝臟壅熱目中生努肉衝貫黑睛赤痛不可止白礬灰一分膩粉一錢鹽半兩研黄連一分搗羅為末研硇砂一錢研白龍腦一分細研胡黄連半兩搗羅為末研右除龍腦外以淡漿水一大盞古錢二十文同内甆瓶中封閉懸於淨舎内經二七日綿濾去滓入龍腦在藥中每日三五度以銅筯取少許㸃之羚羊角散出聖濟總録治心肺風熱衝目生努肉羚羊角鎊黄芩去黑心柴胡去苖升麻各三分甘草生剉一兩右粗搗篩每服五錢匕水一盞半煎至一盞去滓食後服日再真珠散治風熱眼生努肉衝貫黑睛有花翳方見本門赤脉衝貫黒睛類驅風散出危氏方治爛眩風赤浮翳努肉攀睛澀痒眵淚防風去蘆草龍膽各五錢銅青三錢五味子二錢淡竹葉一握去節右為末每服半錢熱湯一各泡停冷澄清洗極效摩翳散一名曾青散出龍木論治泡肉膠凝外障努肉侵睛方見本門目眵臟類石决明散出聖惠方治眼生努肉睛上有翳石决明一枚𢷬細研水飛過龍腦半錢膩粉一錢黄丹一錢麝香半錢右同研令極細每於夜卧時取少許㸃之清涼散出聖濟總録治眼生努肉鈎割後宜㸃之真珠琥珀丹砂各一兩龍腦半兩右各細研再和研勻以不津器盛㸃如常法㸃眼艾薰散出聖惠方治眼目生努肉蕤仁去皮研細一兩膩粉一錢牛酥一兩熟艾如雞子許大右將三味入乳鉢中研令極細攤開次取艾火燒將乳鈢和藥覆烟薰之俟盡燒艾以槐木椎細研令烟氣勻入然後少少㸃眼眥日三五度杏仁膏出聖濟總録治目生努肉風翳障用此藥㸃眼黄連去鬚半兩青鹽半兩膩粉一錢杏仁湯浸去皮尖雙仁研如膏半兩右先以水一盞半煎杏仁黄連至半盞濾去滓入青鹽及膩粉更煎五七沸入合中盛候冷每日㸃三次秦皮散出聖惠方治眼赤腫痛有翳努肉多淚難開秦皮三兩防風去蘆頭黄連去鬚甘草炙㣲赤剉各一兩半右為粗散每服三錢匕水一中盞入淡竹葉二七片煎至六分去滓每於食後温服之又方出聖惠方治眼生努肉睛上有翳寒水石馬牙硝銅綠各一分龍腦一錢右同研令極細夜臨卧時取少許㸃之又方出聖惠方治眼生努肉瞼内生瘡日多淚出豶猪膽一枚川芒硝龍腦三大豆黄連一分去鬚搗為末右為細散與膽汁相和浸經一宿日二三度㸃之又方出聖惠方治眼生努肉宜㸃此藥龍腦珊瑚真珠石決明搗細研水飛過各一兩右都細研如麵以白蜜一合相和更研令勻以甆器盛不計時候用㸃之􅅋仁膏出聖惠方治眼生努肉赤脉貫瞳人蕤仁一兩湯浸去皮研如膏膩粉胡粉青鹽各一兩右都入乳鈢内研令極細每用粳米大㸃於努肉上每㸃切宜避風胡黄連㸃眼方出聖濟總録治肝肺熱盛赤目生努肉蜜陀僧研半兩蜜四兩重湯煮胡黄連去鬚如豆大一兩右先將黄連於蜜内浸一宿次日入蜜陀僧末和勻用白甆椀盛即用黑豆一㪷於鍋内以水煮候乾却將藥碗放豆上勿令豆汁入内候豆熱為度取出用綿濾過入龍腦半錢匕以銀石器盛三日後㸃睛不拘時具齒散出聖惠方治風毒卒生努肉欲滿及生浮翳珠管具齒燒研一分鈆丹再研一分右同入乳鈢中研令極細内甆合中盛每以銅筯㸃眼少許白龍散出聖木論治目生努肉或痒或痛不可忍龍腦一匙馬牙硝光明者一兩右用紙一張褁疉牙硝按實常在著肉衣下養一百三十日為度取出細研如粉取四錢龍腦同研令細不計年嵗深逺眼内或生翳膜漸漸暗昏逺視不明但瞳人不破散者並可治每用兩米大㸃杏仁膏出聖濟總録治目生努肉或痒或痛息肉漸長侵覆瞳人杏仁湯浸去皮尖雙仁一分膩粉半錢右合細研如膏以綿纒筯頭㸃努肉上瘥南鵬砂出再指方治努肉瘀突南硼砂色黄腦子少許細研右以竹草蘸㸃其上𤣥參麥門冬煎湯調洗心散服鯽魚貼方出聖濟總録治目生努肉澀痛以鯽魚鮮者去皮骨取肉一片中央開一竅正㸃眼上日三五度易之又方出危氏方治風熱上衝努肉攀睛用清萍少許研爛入片腦子少許貼眼上頓效治目翳及努肉出龍木論用礬石最白者内一黍米大於翳上及努肉上即冷淚出綿拭之令惡汁盡其疾眥減翳自清薄便瘥礬石須真白好者方可用治目中努肉赤脉貫瞳子者及治目熱生膚赤白膜方出聖惠方以雄雀屎和首生男子乳薄㸃即消神效治卒患赤目努肉坐卧痛者用好梨一顆搗絞取汁黄連三枝碎之以綿裹漬令色變仰卧注目中杏仁方出聖惠方治眼生努肉赤瘀偏睛不退築損用杏仁百箇新者於飯甑内蒸之候冷去皮尖研濾取汁硇砂一錢用白湯淋熬乾相和研勻每用少許㸃之三五上努目内自消一方生杏仁七枚去皮細嚼吐於掌中極熱綿裹筯頭將㸃努肉不過三五度瘥乾薑方出百選方治眼生瘀肉澀痛及治風毒上攻兩眼暴赤腫隠澁難開初發便洗用川乾薑一味搥碎每三錢末用水兩盞煎至一盞半去滓通手淋洗初洗時少痛少定即清快甚效一方以薄綿緊裹沸湯泡乗熱洗之如冷再盪更洗一次目中生肉欲滿及生珠管方出肘後方搗貝母絹篩真丹等三攪和以注目上日三四度數日愈治眼築損努肉出出本草方以生杏仁七枚去皮細嚼出於掌中及熱以綿裹筯頭將㸃努肉上不過四五度瘥目生珠管論夫目生珠管風熱痰飲漬於肝血氣藴積津液結聚所由生也肝藏血故肝受血而能視氣調血和則精華見於目今邪乗於肝氣受病為風熱薫蒸痰飲漸積使血氣壅閼上衝於目津液結聚狀如珠管故以名焉方龍腦煎一名清涼煎出聖惠方治眼中生膚翳垂生珠管方見本門外障眼類治目生珠管方出千金方滑石一作冷石手爪甲燒龍骨具齒丹砂各等分右治下篩以新筆㸃取當珠管上日三度良滑石散出聖惠方治目卒生珠管滑石龍腦各一分手爪甲燒半分右細研如粉以新筆染藥㸃珠管上日三四次具齒散出聖惠方治眼生珠管具齒燒灰手爪甲燒灰龍骨已上各半兩右同研令極細每用少許㸃珠管上日三四度甚妙銅青一兩細墨半兩右合研為末醋和丸如白豆大每用一丸以乳汁新汲水各少許浸化以銅筯㸃之具齒散出聖惠方治目生珠管方見本門息肉淫膚類鉛丹膏出聖惠方治眼卒生珠管鉛丹半兩鯉魚膽汁量鉛丹多少用右合調如膏㸃珠管目眥中日三五次白蜜方出龍木論治目卒生珠管以白蜜少許㸃目中仰卧冷淚出半日許洗之生蜜住家養者為上又方出聖濟總録治目卒生珠管用龍腦一兩𢷬羅為散每㸃少許珠管上又方出聖惠方治目卒生珠管用牛膝葉根不計多少搗絞取汁㸃珠管上日三次兼治赤目良普濟方卷八十四
