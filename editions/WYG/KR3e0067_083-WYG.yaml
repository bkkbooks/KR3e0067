body:
  text: 普濟方卷八十四明周王朱橚撰眼目門倒睫拳攣論夫臟腑久積風熱内薫肝經衝發於目始則腫赤隱痛多淚日久津液澀少瞼腫皮急致睫倒拳刺隱瞳人治法當起立毛睫又刺太陽經令出血及批鎌除其惡血仍服除風退熱之劑龍木論云倒睫拳攣外障此眼初患之時皆因肝家受熱膈内風虚眼多淚出或痒或痛乍好乍惡以手揩摩致於眼毛倒攣刺隱瞳人磣澁睛上白膜遮滿不宜洗鎌出血熨烙切恐眼皮漸小急開合稍難然後宜服細辛散補腎丸立瘥歌曰若因風赤淚涓涓翳膜潜生碧漸瞞乍好乍惡多年後眼皮急小欲開難倒睫拳攣如刺磣磨隠瞳人豈可安療者去毛撥睫轉太陽針血最為先湯藥又除風與熱細辛數數㸃水煎方犀角芎藭散出聖濟總録治眼瞼𦂳急倒睫拳攣犀角鎊芎藭羚羊角鎊木香㯽榔煅剉茯神去木山芋前胡去蘆頭牛膝去苖桂去粗皮枳殻去瓤麸炒大黄剉炒各等分右為末每服三錢匕空心食前温酒調下防風湯出聖濟總録治風熱衝肝目多睫倒方見本門目澁痛類車前子散出聖濟總録治眼倒睫赤眼疼痛不開方見本門目赤痛類旬效散出徳生堂方治眼倒睫拳毛少腦川芎金􅁫石斛浮木賊去節各二錢人蛔蟲畧隂乾右為細末用葦管吹入左右鼻中補腎丸出龍木論治倒睫拳攣外障乾山藥五味子車前子人參澤㵼茯苓細辛黄芩各一兩乾地黄三分右研煉蜜為丸如梧桐子大每服十丸空心茶清下退膜丸一名决明丸治倒睫拳攣隠瞳人方見本門目生丁翳類細辛湯出龍木論治睫拳攣外障細辛防風茺蔚子知母各一兩羚羊角大黄桔梗黑參各一兩右為末以水一盞散一錢煎至五分食後去滓溫服𤣥參湯一名菊花散治眼漸致倒睫隠澁痛方見本門目赤風類􅅋仁湯出聖濟總錄治風熱攻眼磣澁疼痛漸致倒睫􅅋仁秦皮去粗皮剉防風去叉各一兩山梔子仁菊花萎蕤各半兩竹葉二握右剉細以水三升煎取一升半去滓乘熱淋洗冷再煖作三度使木通湯一名麥門冬湯出聖濟總録治倒睫拳攣眼如鍼刺𦂳急磣澀多眵淚方見本門目澁痛類三黄丸出聖濟總録治倒睫拳攣目眥赤爛黄連去鬚一兩半大黄剉砂一兩細辛去苖葉龍腦右為末煉蜜為丸如梧桐子大每服二十丸食後臨卧温服熱水下日再小兒量減又方出神效方治倒睫拳毛木鱉子二箇令炒木賊一百二十莭地龍二條去土赤龍爪一百二十倒鈎針刺也右為細末摘去倒睫每日以紙撚蘸藥㗜之一日三五次又方治倒睫拳毛儒門事親川山甲炒地龍去土蟬殻五倍子各等分右為細末用藥時先將拳毛摘出後用藥一字隨左右鼻内㗜之次日目下如線様㣲腫是驗蝟刺香白芷青黛研棗樹上横直棘針右各等分為細末左眼倒睫口噙水左鼻内㗜之右眼倒睫右鼻㗜之治倒睫爛眩出本草事方蜜一兩黄丹五錢右慢火熬成膏入輕粉五分令熬黒色逐時湯泡洗治倒睫拳毛出儒門事親用川山甲以竹簟子刮去肉用羊􅆎窩脂去膜皮仍將川山甲於炭火上炙令黄色脂擦去山甲上如此數遍令酥為末隨左右眼噙水鼻内㗜一字月餘見效治倒睫出海上方用十二月熱蠅子乾為末鼻内㗜之治倒睫毛在瞼中聚刺瞳人白睛唯覺痒悶漸漸赤膜起連上下瞼多赤生瘡若刺黑睛則淚出似白㬾出若刺着瞳人令眼疼痛磣澁不欲見明此多損傷宜速醫療其法如左於平晨日未出之際令一眼明人把鑷子枝之去倒睫毛勾使毛斷連根去之下手十減八九疼痛立止至夜取千歲藤汁㸃之三五日將息得平後或㸃首生男乳汁亦良慎風寒日月光及烟火房事五辛一月内即瘥防風飲子出誠效方治倒睫拳毛黄蓍炙甘草人參各一錢葛根半錢防風半錢當歸七分半細辛葉蔓荆子各三分右件剉如麻豆大都作一服二盞煎至一盞去滓温服食後避風寒温煖處服之一方有黄連無黄蓍神効明目湯出誠効方治眼稜𦂳致倒睫拳毛損目及上下瞼眥赤爛睛赤疼痛昏暗則冷淚常流夜則目澁難開而眵淚漏眼葛根一錢半甘草炙一錢防風一錢蔓荆子半錢細辛二分一法加黄蓍一錢右㕮咀分二服每服水二盞煎至一盞去滓稍熱服臨卧治倒睫出保命集方無名異末之摻捲在紙中作撚子㸃着倒睫處吹散以烟薫睫自起眼瞼垂綏論夫眼瞼垂綏者以血氣不足膚腠開踈風邪客於瞼膚其皮垂綏下覆睛輪故俗呼為睢目又曰侵風久之則覆愈下眼閉難開方黄蓍丸出聖濟總録治膚瞼下覆輪垂綏難開又明眼目黄蓍剉蒺䔧子炒去角獨活去蘆頭柴胡去苖甘草炙生乾地黄焙梔子仁苦參白花蛇酒浸去皮骨白术各一兩防風去叉菊花茯神去木山芋秦艽去苗土各三分天門冬去心焙枳殻去瓤麸炒白㯽榔剉各一兩半右為末煉蜜為丸如梧桐子大每服三十丸空心温酒下羚羊角散出聖惠方治眼瞼垂腫心躁頭痛羚羊角鎊黄連去鬚木通赤􅆚藥防風去叉甘草炙黄芩去黒心各三分萎蕤一兩梔子仁半兩麥門冬去心一兩半石膏二兩右為散每服三錢七分水一盞八竹葉二七片煎至七分去滓食後温服大黄散出聖惠方治眼瞼垂腫疼痛川大黄剉研㣲炒梔子仁井泉石秋桑葉甘草炙微赤炒决明子已上各三分右為散每服三錢以水一中盞煎至六分去滓食後温服秦皮湯出聖惠方治眼瞼腫痛秦皮去粗皮剉黄連去鬚各一兩梔子仁一分大黄剉炒甘草炙剉細辛去苖葉各半兩蛇銜草三分右麄𢷬篩每服三錢匕水一盞入生薑半分拍碎竹葉二七片煎至七分去滓食後温服枸杞湯出聖濟總録治眼瞼垂綏甚則眼閉難開枸杞子炒半兩赤􅆚藥山芋升麻各一兩半蒺䔧子炒茯神去木各二兩防風去叉一兩右粗𢷬篩每服五錢匕以水一盞半煎至七分生地黄汁一合去滓温服臨卧再服升麻散出聖濟總録治眼瞼垂綏下覆睛輪升麻山茱萸各三分甘菊花細辛去苗葉各半兩蔓荆實去白皮山芋防風去叉各一兩右為散每服三錢匕温酒調下茺蔚散出聖惠方治瞼眼垂下茺蔚子防風去皮羌活去蘆頭蔓荆子甘菊花𤣥參細辛黄芩去黑心車前子甘草炙剉各二兩大黄剉炒半兩右為散每服三錢匕水一盞煎至七分食後臨卧温服竹葉湯出聖惠方治眼熱毒害垂腫遮睛苦竹葉黄連去鬚黄蘗去麄皮剉梔子仁各一兩􅅋仁湯浸去皮半兩用右為剉以水五大盞煎至二盞半去滓澄清温洗眼日五七次作兩度使又方出聖惠方治眼熱毒瞼腫遮睛川大黄一兩剉碎㣲炒苦竹葉一握甘草一兩剉鬱金一兩膩粉二錢右先𢷬三味為散膩粉竹葉以水三盞煎至一盞半去滓澄清温湯洗眼日三五度洗之目瞼腫鞕論夫目瞼腫鞕者内因肝肺積熱上衝於目外為風邪所摶風熱留結在於眥血氣不得宣流故令腫鞕久不瘥者多成風粟細瘡眵汁淹睛浸壊眼目鞕瞼鞕睛疼外障此眼初患之時胞瞼赤脹腫硬難開淚出疼痛還從一眼先患後乃相牽俱損漸生翳膜昏暗皆是中隔積熱肝臟風毒上衝入眼致令此疾宜令鎌洗去瘀血然後服瀉膈散㶸腫膏宜謹諸事龍木論歌曰瞼中硬腫似毆疼肝膈由來熱上衝㶸腫塗膏兼服藥輕輕鎌洗斷來蹤無令𤼵蝎生浮翳此後尋醫轉費功省謹若能三五日世間諸事却從容方羚羊角散出聖惠方治眼風熱毒氣上攻兩瞼腫硬如榧李目不得開羚羊角屑防風去蘆頭羌活人參去蘆頭赤茯苓川升麻川大黄剉碎微炒𤣥參黄芩車前子已上各二兩細辛梔子仁半兩右為散每服四錢以水一盞煎至六分去滓每於食後温服細辛散出聖惠方治眼瞼硬刺痛不開細辛半兩人參去蘆頭赤茯苓車前子藁本赤􅆚藥川大黄剉碎㣲炒𤣥參一兩甘草炙㣲剉分右為散每服食後用竹葉湯調下二錢瀉膈湯出龍木論治瞼硬睛疼外障大黄知母芒硝車前子茺蔚子黄芩天門冬各一兩黑參一兩右為末以水一盞散一錢煎至五分食後去滓温服黄蓍散出聖惠方治眼瞼硬赤腫痛黄蓍剉茺蔚子麥門冬去心各半兩地骨皮𤣥參黄芩各一兩知母一兩犀角屑半兩右為散每服四錢以水一中盞半煎至六分去滓每於食後温服忌炙煿熟麫防風湯出聖濟總録治風熱客摶目瞼腫鞕防風去叉秦皮去苖葉土甘菊花二兩蕤仁湯浸去皮梔子仁萎蕤各半兩竹葉一握右件細剉令勻每用一兩以水三盞煎至一盞半綿濾滓煖洗避風細辛散出聖濟總録治目瞼鞕刺痛腫赤細辛人參白茯苓去黒皮五味子各一兩芎藭藁本去苖土各一兩半右為散每服三錢以水一盞二分煎七分和滓温服早晩食前服熁腫膏出龍木論治瞼硬睛疼外障代赭石黄蠟各半兩細磁末麻油各二兩膩粉少許黄蘗一兩右為末於銚子内入油蠟同煎以膏塗瞼上瀉膈散出聖惠方治眼瞼腫硬隠兼疼痛視物不得麥門冬川大黄剉細㣲炒川芒硝各一兩茺蔚子車前子黄芩各一兩半右為散每服三錢以水一中盞煎至六分去滓每於食後温服秦皮湯出聖濟總録治瞼眼腫鞕痒痛秦皮黄連去鬚細辛去苖葉各二兩黄蘗半兩青鹽一兩右剉令勻每用一兩以水三盞煎取一盞半綿濾去滓乗熱用手洗眼了避風日三再煖洗之目膿漏論夫目膿漏者縁血脈壅熱傳入於足太陽膀胱之經膀胱之脈起於目内眥則令人瞼皆腫久痒即成疾膿汁時下綿綿不絶如渗漏故謂之膿漏俗呼為漏睛是也又有眼因患瘡出血膿後大眥頭常有膿血亦名漏睛不治則膿毒流漬穿壊白睛黑㸃相連即艱治療此眼初患之時㣲有頭施昏悶四體如勞五臟多積風氣壅毒遂令瘡出於眼常有膿血或流漬涎眥是腦熱所作雖然不痛漸加昏暗切宜補治服治風黄蓍湯即瘥龍木論歌曰眼目何縁患漏清熱和風在瞼中侵眥頭結聚為膿汁或流涎水色粘青雖然不痛兼無翳潜攻瘡大豈心寧黄蓍熊膽丸并散眼安􅀢薈作膏蒸若也因循經嵗月烏珠墜落始驚心方羚羊角丸出聖濟總録治毒風上攻目輪眼爛肉瘡翳生眼睛肉殠羚羊角鎊蘗皮去麄皮炙防風去义各一兩半𤣥參芎藭荆芥穗黄連去鬚槐子甘菊花防己石决明􅅋仁去皮蔓荆子車前子秦艽去苖土梔子仁生乾地黄焙陽起石研真珠末研龍齒搗研薔薇根剉各一兩大黄剉炒升麻麥門冬去心前胡去蘆頭人參白㯽榔煨枸杞子各一兩半右為末鍊蜜為丸如梧桐子大每服三十丸晩食後熱水下𤣥參丸出聖惠方治眼膿漏眥赤痒日夜出膿水不止𤣥參決明子黄蓍剉黄連去鬚青葙子露蜂房㣲炒漏蘆羚羊角屑已上各二兩蕤仁一兩半湯浸去赤皮雄黄細研朱砂細研已上各半兩右為末入研子藥一時硏令勻煉蜜和𢷬三二百杵丸如梧桐子大每於食後以温漿水下二十丸臨卧再服之黄蓍散出聖惠方治眼膿漏不止黄蓍剉防風去蘆頭黄芩川大黄剉碎㣲炒各二兩地骨皮逺志去心人參去蘆頭赤茯苓漏蘆已上各一兩右為麄散每服三錢以水一中盞煎至六分去滓食後温服臨卧再服忌炙煿油膩毒骨魚肉防風湯一名治風黄蓍湯出龍木論治眼痛睛膿出外障防風去义二兩一方用一兩知母二兩大黄剉炒二兩一方用一兩地骨皮逺志去心人參各一兩黄蓍剉一兩一方用一兩半白茯苓右麄𢷬篩每服一錢水一盞煎至五分去滓食後臨卧温服㸃眼方出聖惠方治眼膿漏視物不見雄黄細研石決明搗碎研細水飛過馬牙屑細研已上各一兩青鹽半兩細研蜜三合青羊膽二枚右用生絹袋盛以蜜并羊膽汁中浸兩日取汁於磁器盒内盛㸃之白礬煎方出聖惠方治眼膿漏久不止宜㸃白礬一分燒灰黄蘗末三分黄連末七分雄黄一分熊膽一錢硃砂一分右都細研令勻以水二大盞調令勻内瓷瓶中以重湯煮一日藥成待冷用綿濾過每以銅筯取少許㸃眥頭龍腦散出聖濟