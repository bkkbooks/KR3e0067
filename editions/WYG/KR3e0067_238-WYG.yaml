body:
  text: 普濟方卷二百三十八明周王朱橚撰屍疰門五屍附論夫諸屍為病固不一其状重者唯五屍若得之疾速如飛走状者名飛屍停遁不消者為遁屍沉痼在人臓肺中為沉屍衝風則發者為風屍隠伏積年不除者為伏屍唯此五屍變態多端大率令人沉沉黙黙痛無常處五屍之外復有屍氣雖各有證然大同小異亦可通治之皆本是方飛屍者逰走皮膚穿臟肺毎發刺疼變作無常遁屍者附骨入肉攻鑿血脉毎發不可得近見屍䘮聞哭聲便作風屍者滛躍四肢不知痛之所處毎發則昏恍得風雪便作沉屍者纒骨結臟衝心脇毎發絞切遇風寒便作疰屍者舉身沉重精神錯雜常覺昏廢毎莭氣攻變輙發大惡方丹參丸治五屍蠱疰中惡客忤心腹刺痛丹參㣲炒一兩芍藥一兩半芎藭芫花醋炒各一兩梔子仁一兩烏頭炮裂去皮臍乾薑炮裂各一兩桂去麄皮一兩半野葛皮炙黄半兩呉茱茰湯浸焙炒半兩蜀椒去閉口并目炒出汗一兩巴豆去心皮麩炒研出油盡一十枚右為末煉蜜丸如小豆大毎服三丸米飲下日三服丹砂丸出聖惠方治五屍蠱疰中惡客忤心腹刺痛丹砂研一兩巴豆去心皮麩炒出油盡三十枚乾薑炮芎藭芫花醋炙炒烏頭炮裂去皮臍各一兩赤芍藥一兩半野葛呉茱茰湯浸焙炒各三分桂去麄皮一兩半右為末煉蜜丸如小豆大毎服二丸米飲下空心服温酒亦得太乙偹急散出千金方治卒中惡客忤五屍入腹鬼刺鬼痱及蠱中疰吐血下血及心腹卒痛腹滿傷寒熱毒病六七日雄黄桂心芫花各二兩丹砂蜀椒各一兩藜蘆切巴豆各一分野葛三分附子五分右巴豆别治如脂餘合治下篩以巴豆合和更搗調治銅器中宻貯之勿泄有急疾水服半錢可加至五錢老小半之病在頭當鼻衂在膈上吐在膈下痢四肢當汗出此藥所為如湯沃雪手下皆愈方冝秘之非人不傳也雄黄丸治五屍瘕積及中惡心痛蠱疰鬼氣雄黄研丹砂研一作真珠礜石煆牡丹皮藜蘆去蘆頭炙巴豆去心皮膜麩炒研出油盡附子炮裂去皮臍各一兩蜈蚣去足炒一枚右為末煉蜜丸如小豆大毎服二丸米飲下食前服吐利為效一方治男子婦人染着鬼神謂之鬼疰病毎服十丸冷水送下無時一方有桂心五疰丸一名雄黄丸出聖惠方治中惡五疰五屍入腹胷脇急痛鬼擊客忤傳屍垂死者此藥入喉即愈若口禁則斡開不可斡者扣一齒以竹管下藥先以少許湯或水内藥竹管瀉喉中丹砂剉一方用硃砂甘遂㣲煨附子炮裂去皮臍雄黄研各一兩豆豉曝乾巴豆去皮心壓出油盡各六十枚右除巴豆外為末却同研匀蜜丸梧子大宻器貯毎服二十丸米飲下以知為度未知加丸數不發者粥飲投之利不止與酢飯一兩匙療交中五屍遁屍風屍飛屍屍疰沉屍其状皆腹痛脹急衝心攻脇或磥塊踊起或牽腰脊出聖惠方乾薑附子各兩桂心二分巴豆三十枚去皮心生用右搗篩蜜和又内臼中搗萬杵服如小豆二丸此藥無所不療忌野猪肉蘆笋生葱一方煖酒下又方出聖惠方龍骨三分藜蘆二分巴豆一分右搗和煉蜜丸空腹内井花水服如麻子大一丸又方出肘後方雄黄一分梔子十五枚芍藥一兩右水三升煑取一升半分再服雄黄丸出肘後方治卒中飛屍遁屍沉屍風屍腹痛脹急不得氣息上衝心胷及攻兩脇或磥塊踊起或攣引腰脊雄黄研大蒜研各一兩右爛搗和丸如彈子大毎服一丸熱酒化下須臾未瘥更服有屍疹者常以預収此藥丸五屍之中屍鬼接引共為病害經術有消滅之方而非世徒能用今復撰其經要以救其被毒惡氣散出肘後方治五屍鬼疰百毒桂去粗皮乾薑炮各一兩右為散毎服三錢用炒鹽半錢温水調服之一方新汲水調治卒中五屍遁屍其状腹脹氣急衝心或磥塊踊起或牽腰脊者出聖惠方右用鷄卵一枚取白吞之困者揺頭令下兼治飛屍及腹痛脹急衝心一方破鷄子白頓吞七枚不可再服藜蘆子丸出肘後方治中五屍腹痛脹急不得喘息上衝心胷及攻兩脇或磥塊踊變縮引腰脊右以蒺黎子炒去角二兩研為末煉蜜丸如小豆大凡毎服三十丸食後熟水下日三服即瘥一方用頂白蒺黎和丸温酒下治五屍出聖惠方右用鼉肝一具熟切食盡亦用蒜虀食之一方用鱉肝療疾卒中五屍方右取牙四角牙内銅器中以三尺布覆復著器布上以焼牙令熱隨痛追逐蹠下痒便瘥若瓦屋削四角木柱焼用之神驗療卒中五屍今取一方而兼療之右搗商陸根熬以囊盛之畨熨之冷復易又方右用粳米二升水六升煎二服沸之又方右掘土作小坑以水滿坑中熟攪取汁飲之又方右用猪肪八合銅器煎小沸投苦酒八合相和頓服可即瘥又方右用烏田根剉二升煮令濃去滓煎汁磨五升則入清水一兩服五合至一升良又方右用漆葉暴乾擣末酒服之又方右用斷鱉頭頭髮末水服可分為三度當如肉食不遽盡後發更作又方右用梔子二七枚焼末服治卒中遁屍其状腹脹氣急衝心或伏或起牽腰脊痛用服鹽湯取出鮫魚皮散治五屍鬼疰百毒惡氣鮫魚皮炙硃砂雄黄金牙椒天雄細辛鬼臼麝香乾姜鷄舌香桂心莽草各一兩貝母半兩蜈蚣炙蜥蜴炙各二枚右十六味搗下篩温清酒服半錢匕日三服漸増至五分七分亦可帶之飛屍附論夫飛屍者其状令人心腹刺痛氣息喘急脹滿上衝心胷是也此病發無由漸忽然而至病如飛走故謂之飛屍方附子散治一切飛屍鬼疰風痺身體背痛如針刀刺嘔逆痰癖除五勞七傷萬病一名萬病散附子炮裂去皮臍烏頭炮裂去皮臍芫菁去足翅㣲炙雄黄研丹砂研乾薑炮裂細辛去苗葉人參莽草微炙鬼臼去毛微炒蜀椒去閉口并目微炒出汗各一兩蜈蚣去頭足㣲炙蜥蜴去頭足㣲炙各一兩右為散再羅令匀空心温酒調下半錢日再服細辛散治飛屍入人皮膚中又名惡脉亦名賊風發時氣急頭痛不在一䖏針灸則移時好或一日或半日微炙須臾復發細辛去苖葉一分桂去粗皮三分附子炮裂去皮臍一兩雄黄研半兩烏頭炮裂去皮臍一兩天雄炮裂去皮臍一兩乾薑炮一兩莽草㣲炒一分真硃研三分右為散毎服空心米飲調下一錢日二服一方酒服飛屍入腹刺痛方治卒有物在皮中如蝦䗫宿昔入腹中如杯動揺掣痛不可堪過数日即發冝服此方巴豆十四枚龍腦一兩土𤓰子一兩桂一斤半右合搗碎以兩布囊貯蒸熱更畨以熨之亦可煑飲少少服之此本在雜治中病名曰隂屍得者多死一方龍膽亦可雄黄散治一切飛屍鬼疰身痛如刺雄黄研甘草炙剉黄芩去黒心各半兩梔子去皮芍藥剉碎㣲炒各一兩半右為細散毎服以温酒調下二錢日再服不拘時候鬼臼丸治一切勞疾飛屍鬼疰等鬼臼半兩去鬚川升麻三分麝香一錢柴胡一兩去苗右羅為末煉蜜和搗二三百杵丸如梧桐子大毎服不計時以煖酒下十丸日再服三黄散治飛屍病腫光如油色無常定䖏一名硃砂散黄連去鬚黄蘗去粗皮㣲炒陳橘皮湯浸去白炒各一兩右搗羅為散入丹砂少許合研令匀毎服二錢沸湯㸃服不拘時候一方熱酒下𤓰蔕散治飛屍心痛氣急胷滿冝取吐𤓰蔕赤小豆雄黄研各一分右為散拌匀毎服空心温酒調一錢取吐惡物走馬湯出聖惠方治飛屍入腹脹滿刺痛氣息喘急巴豆二枚去皮心杏仁二枚去皮尖雙仁右以綿纒錘令極碎投熱湯二合指捻取白汁分三服飲之食頃當下老小量减之如惡物未下即再服通治飛屍鬼繫妙葛洪肘後方飛屍者逰走皮膚穿臟肺毎發刺痛變作無常遁屍者附骨入肉攻鑿血脉毎發不可得近見屍䘮聞哀哭便作風屍者滛躍四肢不知痛之所在毎發昏恍得風雪便作沉屍者纒結臓骨衝心脇毎發絞切遇寒冷便作屍疰者舉身沉重精神錯雜常覺昏廢毎莭氣改變輙致大惡此一條後别有熨治法也右用忍冬莖葉剉数斛煮令濃取汁煎之服如鷄子様大一枚日二三服治喉閉飛屍出本草右取鯇魚膽和煖水攪服之内喉中飛屍上此膽味至苦服之良此魚似鯹生江湖間治蠱毒飛屍喉閉出本草右取仰盆子以水磨服少許治飛屍逰蠱喉中有物吐吞不得出者出本草右以蚺蛇肉作膾食之治飛屍出本草右取鹽麩子乾搗為末食之治飛屍蠱毒瘴瘧出本草右取海㹠魚作脯食之一如水牛肉味少腥耳此魚生大海中治飛屍出本草右以麂頭骨為灰米飲下治逰蠱飛屍者喉中刺破出本草右以攩子揩之令血出當下涎沫即瘥治飛屍出本草右以無患子中仁焼令香祛惡氣治飛屍蚘虫口中甘􅉶風瘙身癢頭瘡牙齒落疥癬生如蛇蜍蚊子入人肉出本草右以大紅蝦鮓食之初食瘡發後乃愈治飛屍逰蠱著喉氣欲絶者出本草右以鳶尾根削去皮内喉中摩病處令血出為佳治飛屍出本草右以紫荆木煮汁服之治飛屍及蛇虺咬右用白鶴脚骨及嘴煑汁服之或焼為黒灰飲服之良似鸛而巢木者為白鶴遁屍附論夫遁屍謂屍埋伏染疰連滯在於胷腹育膜之間尋常如無病人若因喜怒不莭飲食動其隠伏之疾發則心腹脹利痛連及胠脇上衝心胷氣喘促急不得安臥者是其證也方天雄散治遁屍疰在傍人或入腹中化為蠱毒有聲或作咽喉或入諸脉不在一處入人腹内蠱惑蝕人五臓入心令人靣赤入肺令人面白少氣入肝令人靣青喜怒轉筋入腎令人呻吟靣黒腰痛入耳聾入脾令人面黄不嗜飲食羸痩小便数胷中噎塞嗔喜無常及妖魅百疰為病天雄炮裂去皮臍一兩蜈蚣去足㣲炒一枚莽草微炒一兩乾薑炮裂雄黄研如粉各二兩烏頭炮裂去皮臍一兩真珠研如粉一兩半桂去粗皮二兩蜀椒去目并閉口微炒出汗一兩半細辛去苗葉一兩半芫青去足微炒四十九枚犀角鎊鬼臼去毛微炒各一兩右為散毎服一錢空心以青酒調下日再服麝香丸治遁屍經年不瘥心腹刺痛短氣麝香研五分蜥蜴去頭足微炙一兩鸛骨㣲炒三寸乾薑炮裂一兩羚羊鼻炙令焦黄二枚鷄屎白巴豆去皮心麩炒去油盡五枚芫青去翅足㣲炒二十枚藜蘆去蘆頭微炙一兩鬼臼去毛微炙丹砂研如粉桂去麄皮各一兩右為末拌匀煉蜜丸如小豆大毎服空心米飲下三丸日二服稍加至五丸以吐利為度鶴腦骨丸出千金方一名鶴骨丸治遁屍飛屍積聚脇痛連背走無常䖏或在臟或腹中忽然而痛鶴腦骨三分塗酥炙微黄一方用鹤骨三寸雄黄一兩細研水飛過野葛半兩藜蘆半兩去蘆頭微炙莽草一兩㣲炙硃砂一兩細研水飛過一方作丹砂牡蠣一兩焼為粉桂心半兩蜈蚣一枚㣲炙去足芫青十四枚糯米拌炒令㣲黄去翅足斑猫十四枚糯米拌炒令㣲黄去翅足巴豆四十枚去皮心研紙褁壓去油右羅為末研了藥令匀煉蜜和搗三五百杵丸如小豆大毎服不計時以煖酒下三丸以知為度鸛骨丸治初得遁屍及經年不差心腹短氣鸛骨炙三寸羊鼻炙㣲黄二枚乾薑炮裂一兩麝香研半兩蜥蜴去頭足炙微焦一枚斑猫去足翅微炒十四枚鷄屎白㣲炒一兩巴豆去皮心麩炒出油盡二十枚芫青去翅足㣲炒二十枚藜蘆去蘆頭㣲炙一兩右研為末拌匀煉蜜和丸梧子大毎服空心米飲下二丸以吐利為度木香湯治初得遁屍鬼疰心腹中刺痛不可忍木香丁香各三分鬼箭羽桔梗剉炒各一兩桃仁湯浸去皮尖雙仁炒黄色十四枝一方用桃搗陳橘皮湯浸去白㣲炒一兩紫蘓莖葉微炒一兩半當歸焙乾一兩白㯽榔慢火煨十四枚剉右麄搗篩毎服五錢以水二盞煎至七分去滓温服日二服不計時候一方用生薑一分拍碎同煎服五疰湯治卒中賊風遁屍鬼邪心腹刺痛大脹急大黄甘草各三兩當歸芍藥各二兩烏頭十枚生薑一斤蜜一斤桂心四兩右㕮咀别漬大黄以水九升煮取三升烏頭别納蜜中煎令得一升拌湯中去滓温服三合如人行三十里乆更進一服日三不知加至四合木香湯治初得遁屍鬼疰心腹中刺痛不可忍木香一兩鬼箭羽桔梗剉炒紫蘓莖葉炒令焦當歸焙乾各一兩半白㯽榔右麄搗篩毎服二錢水二盞入生薑一分拍碎同煎至七分去滓空心温服日三治遁屍屍疰心腹刺痛不可忍者桂心乾薑各一兩巴豆二兩去皮心研紙褁壓去油右搗羅為散毎用以醋和如泥塗於病上乾即更塗蒸熨方治遁屍飛屍及暴毒腫流入頭靣四肢右用芥子蒸熟焙一升搗為末以鉛丹二兩拌之分開作兩䖏用踈布袋盛之更換蒸熱以熨痛處常使極熱熨之三五度愈風屍附論夫風屍者在人四肢循環經絡其状滛躍去来沉沉黙黙不知痛䖏若衝風則發故名風屍也方金牙散治風屍疰忤鬼氣心腹刺痛一名大附著散金牙一分細研由䟦一分犀角屑一分黄芩一分麝香一分細研牛黄一分細研川椒一兩去目及閉口者微炒去汗一作椒目天雄半兩炮裂去皮臍真硃半兩細研蜈蚣一枚微炙去頭足細辛三分雄黄半兩細研乾薑半兩炮裂剉黄連三分去鬚桂心半兩右為散入研了藥令匀毎服以煖酒調下一錢不計時候川大黄散治風屍及卒中賊風遁屍邪鬼五疰心腹刺痛川大黄一兩半剉碎㣲炒甘草一兩炙㣲赤當歸一兩半剉㣲炒赤芍藥一兩川烏頭一兩炮裂去皮臍桂心一兩右搗為散毎服四錢水一中盞入生姜半分蜜半合煎至六分去滓不計時候温服一方無當歸空腹温酒服屍厥附論夫屍厥者隂陽氣逆也此由陽脉卒下墜隂卒上升隂陽離居榮衛不通真氣厥亂客邪乘之其状如死猶脉有息而不常脉尚動而形無知也聴其耳内微響有如嘯之聲而股間煖者是也耳内無嘯聲而脉動者故當以屍厥療之診其寸口脉沉大而滑沉則為實滑則為氣實氣相摶身温而汗此為入臟腑雖卒厥不知人氣復則自愈若唇正青身冷此為足臟厥不知人即死診其左手闗上脉隂陽俱虗者足少隂足少陽俱虚也故病恍惚不知人妄有所見也内經謂客于手足少隂太隂足陽明之脉五脉俱竭令人身脉皆動而形無知其状若屍故曰厥五絡皆㑹於耳中茍為邪所客則氣進逆厥上下暴隔五絡閉結而不通故俱竭而令人状若屍焉治法當洗刺其足大指内則爪甲上去端如韭葉後刺足心後刺足中指爪甲上各一痏後刺手太指内去端如韭葉後刺手心主少隂銳骨之端各一痏立已不已以竹管吹兩耳使氣脉踈通内助五絡然後藥石治之方通微丸治五絡閉結病發屍厥不知人營實根五兩薔薇根是也白薇三兩虎骨獺肝㣲炙五靈脂各二兩丹砂另研代赭另研各一兩右為末煉蜜丸如彈子大温木香酒化下一丸日二以知為度不拘時候硃砂丸出聖惠方治屍厥脉動而無氣氣閉不通故静如死聴其耳中翛翛有如嘯聲而股内煖者是也不治三日當死硃砂三分細研雄黄三分細研附子三分炮裂去皮臍桂心一兩半巴豆二十枚去皮心研紙褁壓去油右羅末入研了藥令匀煉蜜丸如麻子大毎服不計時以粥飲下五丸不知更下二丸若痢多即止之返魂丹出聖惠方治屍厥不語生玳瑁硃砂雄黄白芥子麝香已上各一分右研如粉於寛器中鎔安息香和丸如菉豆大衝惡不語不計時以小便下五丸孩子熱風只一丸硫黄丸出衞生家寳方治屍厥奄然死去四肢逆冷不省人事腹中氣走如雷鳴㷔硝半兩硫黄一兩右細研如粉作三服毎服用酒一大盞煎覺焰起傾盆内盖了酌温時灌服如人行五里又進一服不過三服即甦屍厥之状卒死脉猶動聴其耳中或有如嘯聲腹間煖者是也右搗乾菖蒲􅀥核大着舌下人臥忽不語勿以火照耀之殺人但痛齧其踵及足拇指甲際多唾其靣即可活又菖蒲末吹兩鼻中又桂末吹舌下又菖蒲末如􅀥核大内下部中又吹入兩耳内即活矣治屍厥奄然死去四肢逆冷不省人事腹中氣走如雷鳴出聖惠方右用附子七枚炮熱去皮臍為散分作二服毎服用陳酒三錢煎至一盞温服又方出衞生家寳方右用生薑自然汁半盞酒一盞煎令百沸灌二服後却炙頭上百會穴四十九壮兼臍下氣海丹田穴至三百壮覺體温煖即止治屍厥方出肘後方右鬄左角髮方寸焼灰以醇酒一杯飲之不能飲者即灌之立已又方出肘後方右以䋲圍兩臂腕男左女右伸䋲從大權度下行當在脊上炙䋲頭五十壮即活又方出肘後方右熨兩脇下又取灶中墨如彈丸以漿水調和飲之須臾可三四度又取梁上塵如小豆許竹管吹入鼻孔中凡屍厥為病脉動而形無所知陽脉下墜隂脉上升榮衞不通其状如死又猶微有息其息不常人乃不知欲殯歛者療治之方右以蘆管吹其兩耳極力以氣吹之立起若人氣已極可别易一人吹之一方以竹管吹兩耳中不過良乆即活又方出肘後方用白馬尾二七莖白馬前脚目二枚合焼之苦酒為丸如小豆大開口吞二丸須㬰再服一丸治卒中惡暴死出聖惠方右捧兩手莫放須臾即活又方出聖惠方右握兩大拇指令固即活又方出聖惠方右以竹管吹下部数更互吹之氣滿即活又方出聖惠方右吹皂角末入鼻中令􅅉即活又方出聖惠方以酒磨桂心灌之即活又方出聖惠方右用研麝香一錢醋和灌之又方出聖惠方右取床下土小便研之灌瀝入口鼻即活白薇湯出指南方治欝冐白薇紫蘓各三兩當歸二兩右為麄末毎服五錢水二盞煎一盞去滓服倉公散出指南方𤓰蔕雄黄藜蘆末礜石火煆右各等分研細末毎用少許吹於鼻内以􅅉省為度𤓰蔕散出指南方赤小豆末右為細末毎服一錢米飲調下以吐為度諸疰附論夫諸疰者邪氣所疰也皆因精神衰弱經絡空虚傷於風寒暑濕飲食勞倦及傷寒不時發汗或發汗不得真汗三陽傳於諸隂五臓留滯宿食或冷熱不調邪氣流疰或感死生之氣或挾鬼物之精初忽中惡客忤卒死諸屍之類雖或暫瘥必有邪氣伏於經脉流傳臟腑深浹骨髓經乆不已皆成疰病變状多端時發時瘥令人昏悶無不病處若因風寒暑濕之邪所疰則為風疰寒疰令疰温疰濕疰若因飲食勞倦之邪所疰則為食疰飲疰酒疰若因感生死之際而為其邪所疰則為䘮疰哭疰轉疰若因挾鬼物之精而為其邪所疰則為鬼疰邪疰屍疰殃疰犯土禁成疰者為土疰産後得疰者為産疰虚勞所成疰為勞疰邪氣外泄為泄疰此諸疰以受病因為名也邪疰於肺則為氣疰邪疰於榮則為血疰乆疰不已傷損骨髓則為骨疰此諸疰以病之所在為名也又有石疰言其牢强如石走疰者言其逰走無常此諸疰以病之形變為名也治諸病者欲辨是非但覆紙於痛處焼髮令焦投於紙上若髮粘紙者疰氣引之也不黏者非疰也審知其因随證治之諸疰者之診脉浮大者可治細而数者難治疰者住也言其連滯停住死又疰易傍人也疰病之状或乍寒乍熱或皮膚滛躍或心腹脹刺痛或肢莭沉重變状多端而方云三十六種九十九種及此等五疰病皆不顯出其名大體與諸疰皆有相同方金牙散治江南三十六種人病經年羸痩垂死服之皆瘥并帶之能殺鬼氣逐屍疰諸惡癘不祥悉主之金牙研曽青研硝石研礜石泥褁焼半日石膏研莽草剉玉枝雄黄硃砂寒水石龍骨蛇蜕皮炙芫青熬當歸龍膽大黄細辛防風剉大㦸芫花熬野葛炙蓯蓉天雄炮茯苓附子炮烏喙炮乾薑人參桔梗桂心椒去汗目貫衆巴豆去心皮􅆈汁狸骨炙蜂房炙鶴骨炙各一兩右為散以酒服一錢漸増五分日三并以三角絳囊貯散方寸匙以擊頭及心上一方加蜈蚣蜥蜴雌黄鑑鼻麝香毒公忌猪肉生血物生菜冷水大醋蘆笋龍牙散龍牙茯苓各用二兩半雄黄􅀥膏芍藥各五分乾地黄石斛胡燕尿各三分鬼翦烏頭羗活細切露蜂房曽青真硃桂心杏仁防風桃奴鬼臼鶴骨各一兩一方用鸛骨人參大黄各一兩半白术二兩蘓子四合銅鏡鼻甘草橘皮芎藭鬼督郵逺志鱉甲各半兩狸隂二具一方用狸骨三分蜈蚣一枚右治下篩酒服一刀圭以知為度當有虫從大便出一方無􅀥膏金牙散主邪魅心腹刺痛金牙研雄黄丹砂研礜石泥裹焼半兩寒水石芫青熬巴豆去心皮􅆈朴硝桔梗茯苓人參貫衆附子炮蜀椒去目汗露蜂房炙龍骨乾薑川桂烏頭炮石膏研莽草炙蓯蓉大㦸芫花􅆈防風狸骨炙商陸根大黄細辛蛇蜕炙玉枝貝母一作牙子右等分下篩酒服五分日三忌猪肉冷水生菜生血肉脂醋蘆笋麝香丸治五疰積年心痛鬼氣蠱毒百病悉療麝香研三分牛黄研藜蘆炙鬼臼去毛炙赤硃各半兩當歸切焙三分蜈蚣炙去頭足一枚芍藥剉雄黄研各半兩白茯苓去黒皮桔梗炒金牙碎桂去粗皮人參各三分獺肝炙熟一具呉茱茰湯浸焙炒貫衆各半兩丹砂研三分鬼翦羽半兩乾薑炮巴豆去皮心膜出油一兩蜥蜴盡去頭足一枚右研為末煉蜜丸如小豆大毎服五丸空心米飲下日再稍加至七丸五野丸療五疰屍疰冷疰寒疰熱疰在身體寒熱短氣兩脇下痛引背腰脊吸吸氣小不能行飲食少靣目痿黄小便難項强不得俛仰腹堅癖臍左右下雷鳴脹急手足煩疼目不明喜忘及風濕痺腰脊不隨喜夢寤百病皆療之方一名牛黄丸牛黄研麝香研蜀椒去目炮雄黄大黄桂心蜀烏頭炮蜀天雄炮硝石熬人參當歸硃砂研細辛乾薑各二分石蜥蜴一枚炙巴豆五十枚去心皮鬼臼二分右搗篩煉蜜和丸如梧子大服三丸日再不知稍増以知為度忌猪肉蘆笋生葱生菜生血物一方無鬼臼有川芒以煖酒下野狐丸治五疰與鬼神狐狸精魅鬼交通野狐鼻七枚豹鼻七枚炙野狐頭一枚炙雄黄鬼箭羽炙露蜂房炙白术大虫頭角各一兩炙阿魏一兩驢馬狗駞牛肉各凹分焼作灰若用骨加炒故人腦骨一兩炙右為末攪和令匀又以水煑松脂候烊按取以和之時勿以手攪将大虫爪和攪為丸用水磨下一丸分一半别搗雄黄為末衣以床下火焼之衣被覆之勿令泄藥烟并氣未汗出水磨二丸分飲一半須臾候等如汗不通約行十里再煖餘一服温喫服後平身坐少時平身臥熱烘衣被和頭通身盖卧令厚煖服藥處須在煖房中無令風入如汗出以燈燭照手足指及節間當有毫毛生出如青黄白色即一服見效如赤色須三次服如毛黒色必死之證如汗出以青絹拭徧身日出時於黒漆盆内洗當有虫如麩片是驗大腸取下黒水紫黯黒黄白膿涎如諸般虫等物是效次即服和氣藥皂莢丸治諸疰猪牙皂莢去黒皮酥炙研白馬夜眼炒令黒色研安息香炒令黒色研斑猫以糯米炒令黒色去米并翅不用餘即研粉霜二錢麩二錢水滳和為餅子煨令黄色研以上各秤二錢蜈蚣一條炙令黄色研蛇蛻一條炙令黒色研雄黄研丹砂硇砂研牛黄犀角屑胡黄連各一錢右同研令匀以黄狗膽汁為丸如梧桐子大别以丹砂末為衣毎服五十丸四更盡以桃仁煎湯下十疰丸治十種疰氣疰勞疰鬼疰冷疰生人疰死人疰食疰水疰吐等方雄黄巴豆各二兩人參甘草麥門冬細辛一作藁本桔梗附子皂莢蜀椒各一錢右為末蜜丸如梧子大空腹服五丸日再稍加以知為度雄黄丸治諸疰病及中惡鬼邪客忤及一切不測之病並冝服雄黄一兩細研水飛過人參半兩去蘆頭甘草半兩炙微赤剉桔梗半兩去蘆頭藁本半兩附子半兩炮裂去皮臍麥門冬一兩去心焙川椒半兩去目及閉口者微炒去汗巴豆半兩去皮心别研紙裹壓去油右羅為末入研了藥令匀煉蜜和搗三二百杵丸如小豆大毎服不計時候以温酒下二丸殺鬼丸治五疰伏屍等病虎頭骨酒炙三兩藜蘆六兩猪牙皂莢炙鬼臼雄黄蕪荑仁天雄炮裂去皮臍各一兩右為末煉蜜丸如小彈子大毎夜焼一丸五月五日午時合佳硃砂丸治諸疰鬼擊客忤心痛上氣鬼魘蠱毒硃砂細研白礬焼為灰藜蘆去蘆頭炙附子炮裂去皮臍雄黄各半兩細研蜈蚣