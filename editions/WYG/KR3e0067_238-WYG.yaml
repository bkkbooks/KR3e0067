空心酒下二十丸神效膏出聖惠方治走疰上下相病貼之芫花一兩芸薹子半兩安息香半兩附子半兩去皮臍桂心一兩川椒半兩已上並生用右羅為散入牛皮膠中和成膏塗紙上隨痛處貼之立定蛇床子散治乆患走疰疼痛蛇床子炒莨菪子炒芸薹子炒胡荽子芫花醋炙各一兩右為細散取生薑自然汁煮麵糊調膏先用白礬湯洗痛處後貼之烏頭散治乆患走疰氣疼痛烏頭炮裂去皮臍曼陁羅子炒地龍炒牛􅂰酒浸切焙各半兩右為散温酒調半錢日再服雄黄丸出聖惠方治惡氣走疰疼痛雄黄三兩細研水飛過清漆三匙米醋九升右件五月五日以糠火煎一夜時候可丸即丸小豆大每服不計時以温酒調下一丸兼治蛇蝎螫塗之可驗治走疰方出聖惠方用焼車缸令熱暫入水以濕布褁熨病上又方出聖惠方右用小芥子末一合蜜和丸如梧桐子大毎服宜以温酒下十丸三兩服瘥瘥後不得食五辛又方出聖惠方右用桂心一兩以酒一大盞煎至七分為二服又方出聖惠方右用蕓薹子以慢火炒熟搗為末以油麩入濃醋内調煎為糊㸔令熱塗在痛處三五次效推仙丸出保生方治一切走疰疼痛蒼术酒浸四兩炒乾薑炮厚朴姜製川椒炒各一兩右為末酒糊丸如梧子大毎服三十丸温酒空心下治走疰攻頭靣四肢及陽毒傷寒壮熱頭痛心神煩燥大利胷膈右用生𤓰菜搗取自然汁飲之風疰附論夫風疰者由體虚風邪之氣客於榮衞邪氣行逰連滯停疰故名風疰其状皮肉掣振痛無常處一年之後則有頭髮堕落頸項掣痛骨拉解鳴目痛鼻酸牙蚛之証又十二風所疰不同温風所疰頭痛欲解髮脚腫汗風所疰頭痛體熱骨莭厥强柔風所疰逰腫在眼或在手脚氷風所疰噉食眠臥汗出尤風所疰腦轉肉裂目絲痛惡聞人聲絶風所疰暴倒仆口有白沫顛風所疰被髮狂走遇物擊破狂風所疰呌呼罵詈獨語談笑寄風所疰口噤靣喎四肢不随紏風所疰體生瘡眉毛堕落蚝風所疰癖痺如毛螫瘡或痒或痛罩風所疰舉身戰動或鼻閉塞其状雖異其為氣停疰則一也方金牙散治風邪疰氣及南方百毒瘴氣疫毒脚弱腫痛濕痺金牙研一兩芫青去足麩炒二十七枚斑猫去翅足炒七枚雄黄研亭長去翅足炒七枚蜥蜴去翅足炙一兩蜈蚣去頭炙一枚丹砂研龍腦去蘆頭防風去仁荏枝微炙大黄剉醋拌炒曽青研白茯苓去黒皮桂去粗皮松脂研乾姜炮細辛去苗葉硝石研野葛剉炒烏頭炮裂去粗皮大㦸煨商陸炙蛇蛻皮炒芫花醋炙鶴骨炙附子炮裂去皮臍寒水石碎蜀椒去目及閉口者炒出汗人參貫衆龍骨炒露蜂房炒巴豆去皮心出油盡礜石煨狸骨㣲炙天雄炮裂去皮臍石膽研莽草炙各一兩右為細散以絳囊盛半兩帶之男左女右食前以漿或酒隨意調下一服以知為度小金牙散出千金方治風邪疰氣并瘴癘疫氣脚弱金牙研一兩一分牛黄研一分天雄炮裂去皮臍蓽解炒各兩半萎㽔三分蜈蚣一枚長五寸去頭炙焦黄芩黒皮去盡細辛去苗葉各半兩蜀椒去目及合口者炒出汗由䟦湯浸去滑炒各半兩桂去粗皮三分莽草微炙半兩犀角鎊三分雄黄研丹砂研麝香研半兩乾姜炮裂三分烏頭炮裂去皮臍半兩黄連去鬚一兩右除研藥外搗羅為散後入研藥搗三五百下令極細温酒調服二錢日三夜二以瘥為度以絳囊盛半兩男左女右帶省病問孝不避夜行塗鼻下人中晨昏露霧亦塗之一方無萎㽔由䟦有女萎虎杖細辛散出聖惠方治風疰走入皮膚中如虫行腰脊强直五緩六急手足拘攣隠􅐄搔之作瘡風屍身瘴卒風靣目腫起耳聾頭痛口噤不能語細辛一兩人參一兩去蘆頭乾薑炮裂剉兩黄芩一兩桂心一兩半麻黄一兩半去根莭當歸一兩半剉㣲炒芎藭一兩半石楠一兩甘草一兩㣲炙剉生乾地黄三分食茱茰三分右搗為散毎服三錢水一中盞煎至六分不計時温服真硃散出聖惠方治風疰毒氣猫鬼所疰真硃半兩細研雄黄半兩細研硃砂半兩細研細辛一兩乾薑半兩炮裂剉川椒半兩去目及合口者㣲炒去汗桂心一兩天雄半兩炮裂去皮臍蜈蚣一枚㣲炒去足莽草半兩㣲炙右羅為散不計時温酒調下一錢烏頭散出聖惠方治風疰及五屍惡氣逰走胷心流出四肢徃来不住短氣欲死川烏頭一兩炮裂去皮臍赤芍藥一兩當歸一兩剉細㣲炒乾薑半兩炮裂剉桂心一兩細辛一兩生乾地黄一兩呉茱茰半兩湯浸七遍乾㣲炒甘草一兩炙㣲赤剉右搗為散毎服三錢水一中盞煎至六分去滓不計時温服天雄散出聖惠方治風疰滛躍皮膚攻疰逰走疼痛不可忍天雄一兩炮裂去皮臍桂心三分石南三分莽草三分㣲炒茵芋三分狼毒半兩剉碎醋拌炒熟雄黄半兩細研麝香一分細研木香三分右羅為散入雄黄麝香同研令匀不計時以温酒調下一錢安息香丸治一切風疰痛安息香研乳香研各一分白膠香研地龍去土炒搗為末各半錢桃仁湯浸去皮尖雙仁研二七枚没藥研一分胡桃仁研三枚右為細末酒煎為丸如彈丸大毎服一丸温酒化下羌活湯治風疰心腹刺痛上引胷背羌活去苗鬚三分大豆炒一合桑根白皮炙剉一兩半芎藭一兩陳橘皮湯浸去穰白焙三分大腹皮並子煨三分右麄搗篩毎服三錢水一盞煎至七分去滓温服良乆再服小金牙酒出本草治風疰百病虚勞濕冷緩不仁不能行歩近人用之多效金牙細辛地膚子莽草乾地黄葫蘆根防風附子茵芋續斷蜀椒獨活各四兩右以金牙先搗末别盛練囊餘皆薄切并金牙共内大練囊以清酒四斗漬之宻封器口四宿取酒温服二合三日漸増之轉疰附論夫轉者言死又易傍人轉疰之状與諸疰畧同以其於身内移轉無常故以為轉疰也方牛黄散出聖惠方治鬼物身纒轉相染易夢寐氛氲肌體羸痩徃来寒熱嘿嘿煩悶欲寤不能手足不能動或欲向壁悲啼或喜笑無常牛黄細研鬼箭羽王不留行徐長卿逺志去心乾薑炮裂附子炮裂去皮臍五味子石韋去毛黄芩赤茯苓已上各半兩桂心一分代赭半兩細研菖蒲一兩麥門冬一兩去心焙右搗為散毎服用酒一小盞入生薑汁少許地黄汁一合令温酒調下一錢不計時候日三服忌猪肉冷水生葱羊肉􅄳醋物獺肝丸出千金方治萬病轉疰相染或霍亂中惡客忤病者獺肝半兩細炙雄黄半兩細研莽草半兩㣲炙硃砂半兩細研鬼臼半兩去鬚犀角屑半兩麝香半兩細研川大黄半兩剉碎㣲炒牛黄一分細研蜈蚣一枚㣲炙去足巴豆半兩去皮心研紙褁壓去油右羅為末入研了藥令匀煉蜜和搗三五百杵丸如麻子大毎服空心以温酒下三丸若中惡病不計時服治人乆疰相轉乃至滅族冝服此方出聖惠方雄黄一兩半細研水飛過鬼臼一兩去鬚硃砂一兩細研水飛過莽草一兩㣲炙藜蘆一兩去蘆頭㣲炙巴豆四十枚去皮心紙褁壓去油皂莢半兩去黒皮塗酥炙焦黄去子真硃半兩㣲研右羅為末入研了藥令匀煉蜜和搗三二百杵丸如小豆大毎服空心以温酒下二丸當吐利下惡物瘥忌生冷猪肉蘆笋生血物雄黄丸出聖惠方治轉疰絶門族盡轉逐内外復易親友雄黄半兩細研麥門冬一兩去心焙天門冬一兩去心焙皂莢半兩去黒皮酥炙㣲黄并去子莽草半兩㣲炙鬼臼半兩去鬚巴豆半兩去皮心研紙褁壓去油右羅為末煉蜜和搗三二百杵丸如小豆大毎服空心煖酒下二三丸日一服忌鯉魚野猪蘆笋一方無天門冬惡疰附論夫惡疰者是惡毒之氣也人體虚者受之毒氣入於經絡遂流移心腹其状疰来擊痛痛不一處故名惡疰也方牛黄散出聖惠方一名千金蜈蚣湯治惡疰邪氣徃来心痛徹胸背或入皮膚移動不定四肢酸痛羸痩短氣牛黄一兩細研蜈蚣一枚㣲炙去足硃砂一兩細研一方用丹砂細辛半兩川大黄一兩剉微炒鬼臼半兩去鬚黄芩一兩當歸半兩剉㣲炒桂心半兩人參半兩去蘆頭麝香一分細研附子半兩炮裂去皮臍乾薑半兩炮裂剉右羅為散入研了藥令匀毎服三錢水一中盞煎至六分去滓不計時温服治惡疰撮肋連心痛冝服此方出聖惠方當歸一兩剉㣲炒木香二兩㯽榔二兩麝香一錢細研右羅為散不計時煎童子小便調下三錢治惡疾心痛悶絶欲死冝服此方出聖惠方鬼督郵一兩末安息香一兩酒浸細研去滓慢火煎成膏右以安息香煎和丸如梧桐子大不計時以醋湯下黒奴散出千金方治卒得惡疰腹脹釡底墨一合鹽半兩右以水一大盞煎至七分去滓温服日二服須臾吐下即瘥又方出聖惠方獨顆蒜四顆伏龍肝一兩細研右搗入沙糖水和丸如梧桐子大毎服以温酒下二十丸治惡疰腹痛不可忍冝服此方出聖惠方呉茱茰半兩湯浸七遍漸暴乾㣲炒桂心一兩右羅為散不計時以熱酒下二錢治惡疰入心欲死冝服此方出聖惠方右用安息香半兩搗末分為二服以熱酒和服之又方出聖惠方右用阿魏末一分分為二服以熱酒調服之立瘥又方出聖惠方右用獨顆蒜一頭香墨如棗大並擣以醬汁一合調和頓服立瘥治邪辟惡止驚右用南草緋絹盛一片令小男女佩之宜南草即萱草治强鬼突迷人致惡者右以鉄鎚柄和桃奴鬼箭羽等丸服之蠱疰附論夫蠱之患人有造作蓄聚之者多取虫蛇之類以瓷器中盛則任其自相噉食唯有一物獨在者謂之蠱以毒害於他人多因飲食内而行之人中者心悶腹痛蝕五臟盡則死矣有緩有急急者倉卒十数日便死緩者延引嵗月逰走腹内常氣力羸􅉵骨莭沉重發則心腹燥而病人所食之物亦變化為蠱漸侵蝕臟腑盡而死矣死則病流疰染着傍人故為蠱毒也方紫參丸出聖惠方治蠱毒百病癥瘕積聚大小便不利卒忤惡風脹滿轉相疰易醫所不治紫參人參去蘆頭半夏湯洗七遍去滑盡藜蘆去蘆頭代赭細研桔梗去蘆頭白薇肉蓯蓉酒浸一宿刮去粗皮炙黄石膏細研牡礪焼為粉丹砂已上各三分乾蝦蟆一枚焼為灰川烏頭一兩炮裂去皮臍狼毒一兩剉碎醋拌炒熟附子一兩炮裂去皮臍巴豆一兩去皮心研褁紙壓去油右搗羅為末入研了藥令匀煉蜜和搗三五百杵丸如小豆大毎服不計時以粥飲下一丸日三服老少量之蜂蠆毒用塗之亦良鮫魚皮散出聖惠方治蠱毒疰氣變化無常鮫魚皮微炙犀角屑麝香細研白龍骨硃砂細研雄黄細研蘘荷根鹿角屑已上各一分蜈蚣一枚㣲炒去足右羅為散入研了藥令匀毎服食前以煖酒調下一錢雄黄丸出聖惠方治蠱疰四肢浮腫肌膚消痩欬逆腹大如水之状死後疰易人家并五屍疰百毒惡氣飛屍客忤無所不治雄黄一兩細研水飛過巴豆一分去皮心研紙褁壓去油莽草一兩㣲炙鬼臼一兩去鬚蜈蚣一枚㣲炙去足右羅為末入研了藥令匀煉蜜和搗三二百杵宻封収之每於食前以温酒或米飲服如小豆大一丸増减臨時當下清水荳汁虫長数寸或如壞鷄子等及惡物治卒得蠱疰毒氣徃来方出千金方亂髮灰一分杏仁一分湯浸去皮尖雙仁麝香一錢細研右都研如脂毎服不計時候以酒服如梧桐子大五丸日三服一方無麝香姚氏用猪肝和丸普濟方卷二百三十八
