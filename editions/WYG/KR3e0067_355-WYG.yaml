body:
  text: 普濟方卷三百五十五眀周王朱橚撰産後諸疾門咳嗽附論夫肺者主氣因産後血虛肺經一感微邪便成咳嗽或風或熱或寒或濕皆令人咳嗽也若産後吃塩太早而咳嗽者難治産後血氣不通咳嗽者何答曰産後咳嗽多因食熱麵壅納或熱病或有氣塊發時衝心痛氣急咳嗽四肢寒熱心悶口乾或時煩躁睡夢驚悸氣虚肢體無力宜服局方真黒神散五積散加􅀥煎服内經謂五氣所病在氣為咳嗽産後臟腑俱弱風寒乗虚而客於肺肺為華盖位處於上其俞皆在外合皮毛寒氣客之則先乗於肺肺感之故為咳嗽肺感微寒則成咳嗽而肺主氣因産後氣虚風冷寒於肺故咳𠻳也方桃仁散治産後咳嗽有時寒熱四肢乏力疼痛不思飲食桃仁湯浸去皮尖雙仁麸炒桑白皮各三分當歸炒白茯苓白术人参甘草各三分鱉甲塗醋炙去裙襴紫苑洗去苗土木香桂心白芍藥子芩陳皮湯浸去白熟地黄各半兩柴胡一兩去苗右為散每服四錢水一鍾生姜半分棗三枚煎六分去滓溫服紫苑散治産後咳𠻳四肢無力喫食减少紫苑半兩洗去土人参三分去蘆半夏半兩湯洗七遍去滑白茯苓陳皮三分湯洗去白麥門冬一兩去心當歸黄耆一兩白芍藥半兩桂心半兩熟地黄一兩甘草一分五味子三分杏仁半兩湯浸去皮雙仁麩炒右為末每服四錢水一盞生姜半分􅀥三枚煎六分去滓不計時溫服天門冬散治産後咳嗽心膈不利涕唾稠粘四肢煩熱不思飲食天門冬去心焙三兩前胡去蘆赤茯苓黄耆杏仁湯洗去皮尖雙仁不用桑白皮各三分生地黄當歸微炒百合欵冬花赤芍藥甘草各半兩右為散每服四錢水一盞生姜半分煎六分去滓不時溫服熟乾地黄散治産後虚羸四肢無力喫食减少常多咳嗽熟地黄桂心細辛杏仁去皮尖雙仁麸炒各半両五味子人参白术白茯苓百合當歸各三分甘草一分陳皮湯浸三分右為散每服四錢水一中盞姜半分棗三枚煎六分去滓不計時溫服人参散治産後虚乏短氣咳嗽不思飲食人参續斷白茯苓黄耆熟地黄白术白微五味子當歸芎藭各半兩麥門冬一兩去心甘草一分炙右為散每服四錢水一中盞生姜半分􅀥三枚煎六分去滓不計時候欵冬花散治産後咳嗽涕唾稠粘胷膈壅悶喘急不調四肢無力欵冬花貝母煨桔梗紫苑去苗土旋覆花五味子海蛤天門冬去心赤茯苓漢防己一分甘草各半兩右為散每服四錢水一中盞生姜半分棗三枚煎六分去滓不時溫服百部丸治産後咳嗽連聲不絶痰涎壅盛百部焙半兩細辛去苗葉三兩貝母甘草紫苑桂各二兩白术麻黄五味子各三兩杏仁去皮尖雙仁麩炒四兩右為末和勻煉蜜為丸如梧桐子大每服五十丸食前臨臥服犀角散治産後咳嗽吐血不止心中煩悶頭目旋悶犀角屑三分麥門冬去心一兩半赤茯苓一兩鷄蘇一兩生地黄一両馬兠鈴三分紫􅁐三分洗去土甘草半兩羚羊角屑三分竹茹一分右為散每服四錢水一中盞生姜半分煎六分去滓不計時服人参散治産後腹冷肺寒咳嗽鼻多清涕不欲飲食四肢無力人参白术陳皮厚朴薑汁製乾薑白茯苓各三分紫􅁐洗去土苗桂心細辛甘草炙各半兩右為散每服四錢水一中盞生薑半分煎六分去滓不計時服療咳嗽多痰唾粘氣急前胡五味子紫苑貝母各六分桑白皮茯苓各分淡竹葉三十片右㕮咀水二升煎取八合去滓食後分二服百部湯治産後咳嗽痰壅煩悶百部欵冬花紫􅁐去苗土貝母知母白微杏仁去皮尖雙仁炒右等分為散每服三錢約以水一盞煎七分去滓不拘時溫服二母散治惡露上攻入肺經咳嗽如傷風痰嗽服尋常傷風藥不效宜服知母貝母白茯苓人参各半兩桃仁杏仁去皮尖各一分右為末每服三錢水一盞半煎八分無時溫服如覺腹痛併服紫􅁐湯治産後咳嗽痰涎壅悶紫􅁐去苖土貝母去心一兩人参一兩白茯苓二兩陳皮半兩杏仁去皮尖雙仁炒一兩半右為散每服三錢煎七分去滓温服不拘時療産後咳嗽氣喘百部根苦梗各六分桑白皮二十分百合赤茯苓各八分右㕮咀水二升煑取七合去滓食後分三服皂莢丸治産後痰盛咳嗽頭目不利皂莢七挺不蛀者水浸絞取汁慮去皮丁香桂各半兩訶黎勒去皮十枚杏仁八十枚去皮尖雙仁炒右將四味搗為細末以皂莢水就銀石銚内煎如膏即將藥和搜為丸如梧桐子大每服十丸烏梅湯下不拘時半夏湯治産後咳嗽痰壅半夏半兩生薑汁浸一宿切焙貝母去心一兩柴胡一兩去苗甘草猪牙皂角各半兩去皮右為散每服二錢浄水一盞生薑五片煎七分去滓不計時服黄耆湯治産後肺氣虚寒咳嗽喘悶黄耆桔梗人参各半兩白茯苓半兩山芋半兩右搗篩每服三錢浄水一盞煎七分去滓温服不拘時柴胡湯治産後咳嗽喘急煩悶柴胡麻黄去根節煎掠去沫焙紫蘇莖葉陳皮杏仁去皮尖雙仁炒右等分麄搗篩每服三錢煎七分去滓不時服茱萸湯治産後肺寒感咳嗽不已呉茱萸湯浸焙三分桂一兩細辛一兩一分當歸三分杏仁去皮尖雙仁炒半兩右搗篩每服三錢浄水一盞煎七分去滓不拘時服百花散治婦人産中咳嗽黄蘖桑白皮用蜜塗慢火炙黄為度糯米二十粒欵冬花燒灰六錢右為細末每服一二錢水一盞入糯米同煎至六分以欵冬花攪在藥内同調温服之白散子治産後痰血結滯發為寒熱心胷如火煩躁口乾諸藥不效大川烏去皮臍南星半夏白附子各一兩羗活黄芩各五錢右生用剉散每服三錢生薑五片水一鍾半煎服旋覆湯治産後傷風感寒暑濕咳嗽喘滿痰涎壅塞坐卧不寧前胡麻黄杏仁去皮尖雙仁炒五味子净茯苓甘草赤芍藥荆芥旋覆花半夏麯右等分為麄末每服四大錢水一盞半薑五片􅀥三枚煎七分食前服一感冐寒熱頭痛不宜服峻劑神仙百解散生料五積散集驗療産後感風傷寒咳嗽多痰唾粘甘草苦梗各六分欵冬花四分麥門冬生地黄各十二分葱白一握豉二合舊方無葱白與豉右㕮咀水二升煑取八合去滓食後分二服治産後嗽逆三日不止欲死桂心半兩薑汁三合右同煎取二合以火先炙手摩令皆熱時塗藥汁盡妙治産後咳嗽燒車釭頭脂内酒中分温三服咳𠻳附論夫肺主於氣五臟六腑俱禀於氣産後則氣血俱傷臟腑皆損而風冷搏於氣氣則逆上而又脾虛聚冷胃中伏寒因食熱物冷熱氣相衝擊使氣厥而不順則咳噫也脾者主中焦為三焦之闗五臟之倉廩貯積水糓若隂陽氣虚使榮為氣厥逆則致生斯病也經云咳噫者胃寒所生服藥無効者灸期門三壯必愈期門穴乃胃之大路方丁香散治産後心煩咳噫不止脾胃虚寒衞氣厥逆丁香白豆䓻仁各半兩伏龍肝一兩右為細末煎桃仁呉茱萸湯調下一錢如人行五里再服石蓮散治氣咳噫吐逆心怔目暈不思飲食石蓮肉炒半兩白茯苓一兩丁香半兩右為細末每服三錢米飲調下無時候羗活散靈􅁐治咳嗽羗活附子炮茴香炒各半兩木香白薑炮各一分右為麄末每服二錢浄水一盞塩一捻煎一二十沸熱服一服止丁香散治産後欬逆石蓮肉十箇去心焙白茯苓一兩丁香十枚右為末水半盞煎數沸服産後欬逆或患氣亂心煩用乾柿一箇切碎以水一􅊦煎至六分熱呷又方治産後欬逆經三五日不止欲死用古壁鏡窠三四箇以水一小􅊦煎至一半熱服治婦人乾逆用白芍藥為末姜五片煎服治婦人産後逆氣用青橘皮為末以葱白童子小便煎湯調服之治産後逆不止狗膽一箇硇砂丁香五靈脂各等分右為細末以狗膽丸如白大豆大每服一丸生薑水磨下霍亂附論夫産後霍亂氣血俱傷五臟六腑虚損或飲食不消觸冐風冷所致隂陽不順清濁相干氣亂於腸胃之間真邪相摶冷熱不調上吐下痢故曰霍亂也經云渴而飲水者五苓散寒多不飲水者理中丸大叚虚冷者加附子來復丹亦妙霍亂者由三焦氣不調清濁邪正相擾之間吐痢不已心痛者吐腹痛者痢痢不已則轉筋四肢厥逆方乾薑湯治産後霍亂吐痢四肢逆冷虛煩乾薑炮三兩黄連去鬚三兩赤石脂三兩當歸三兩半夏研為末生姜汁作餅子五兩赤茯苓一兩甘草炙桂龍骨火燒紅枳殻去穰麩炒人參附子炮去皮臍各二兩右剉如麻豆每服五錢浄水一盞半生薑五片煎八分去滓食前温服厚朴湯治産後霍亂吐痢四肢逆冷虚煩厚朴去粗姜製髙良薑人参白术各二兩麥門冬去心赤茯苓桂甘草各一兩半紫蘇莖葉全用炮陳皮各一兩一分呉茱萸一兩去滑畧炒右搗篩每服三錢浄水一盞半生薑五片煎八分去滓温服食前人参散治産後霍亂吐痢胃虛煩躁人參白术當歸麥門冬去心厚朴薑製草豆䓻芎藭白茯苓訶黎勒皮沉香各三分甘草半兩右為散每服三錢水一中盞生薑半分棗三枚煎至六分去滓不計時服藿香散治産後霍亂吐痢煩渴不已藿香香薷白术麥門冬去心厚朴薑製葛根人參各三分桂心半兩蘆根一兩白豆䓻半兩甘草一分炙右為散每服三錢水一鍾生薑半分竹葉三七片棗三枚煎六分去滓不計時服附子散療産後霍亂吐痢不止手足逆冷腹痛煩渴附子白术當歸呉茱萸桂心人參丁香橘紅甘草各半兩右為細末粥飲調下二錢無時即理中丸加减虚冷甚者兼来復丹木香丸治産後吐痢食物不化腹脇疼痛木香三兩炮白豆䓻十二枚炮去皮草豆䓻十二顆去皮小蒜切半兩菖蒲炒一兩神麯炒一兩乾椿根白皮麥芽各一兩半阿魏一錢别研入右為末酒糊麵為丸如梧桐子大每服二十丸煎橘皮湯下食前白茯苓散治産後霍亂吐瀉心神煩悶腹内疼痛四肢厥逆不時躁渴白茯苓三分麥門冬去心三分草豆䓻當歸藿香人參髙良薑芎藭甘草各半兩右為散每服四錢水一中盞生薑半分煎六分去滓不計時服香薷散治産後霍亂吐痢煩渴心胷滿悶香薷前胡麥門冬人參白术甘草炙半夏浸湯七遍陳皮湯浸去白皮訶棃勒皮各半兩右為末每服三錢水一中盞生薑半分煎六分去滓不計時温服丁香散治産後胃氣虚弱因飲食不節致成霍亂丁香肉豆䓻當歸白术縮砂去皮人參厚朴薑製陳皮湯浸去白皮三分甘草半兩炙剉右為散每服三錢水一中盞生薑半分棗三枚煎六分去滓不計時服厚朴散治産後霍亂吐瀉不止厚朴去皮汁製陳皮湯浸去白穰人參各一兩肉豆䓻去殻紅豆䓻桂心白术乾薑甘草各半兩右為散每服三錢水一中􅊦生薑半分煎六分去滓不計時服當歸散治産後霍亂吐痢腹中疼痛當歸白荳䓻去皮木香白术髙良薑白芍藥各半兩甘草半兩厚朴一兩姜製呉茱萸一分浸七遍右為末每服二錢粥飲調下不計時厚朴湯治産後霍亂吐痢肢體逆冷厚朴去皮薑汁製陳皮去白當歸桂各二兩甘草人參附子炮製去皮臍各一兩白术三兩右為散每服三錢浄水一盞煎七分去滓温服食前藿香湯治産後霍亂吐痢腹痛轉筋煩悶一名木瓜散藿香葉當歸人參五味子各一兩白术赤茯苓黄耆各一兩半木瓜二兩右為散每服五錢浄水一􅊦半煎八分去滓温服一方用薑煎温中散治産後霍亂不止吐㵼之疾人參白术當歸草豆䓻仁乾薑各一兩厚朴二兩為細末每服三錢水煎服白术散治産後霍亂吐痢腹痛煩渴手足逆冷白术橘紅麥門冬人參乾薑甘草半兩右為細末每服四錢生薑五片水一盞煎七分去滓温服白术湯治産後霍亂吐痢不思食白术赤茯苓人參各一兩甘草一兩厚朴薑汁製枳殻各一兩半麩炒右為散每服五錢浄水一盞半煎八分去滓不拘時服厚朴湯治産後霍亂吐㵼厚朴薑汁製一兩陳皮去白穰半兩藿香去枝梗髙良薑當歸各三分右為散每服三錢浄水一盞煎七分去滓温服不拘時葛根湯治産後霍亂吐痢煩渴不食葛根人參白