皮子半夏洗大黄細辛各四分蛇床子六分右搗散薄絹袋盛如指大内隂日二易又以羊脂已煎遍塗止以鐵精𫝊脂上多少令調以火炙布令煖以熨之研磁石酒服方寸匕日三服當歸散治隂下脫當歸黄芩各一兩芍藥半兩一分牡蠣一兩二錢半蝟皮燒存性二錢半右為末每服二錢温酒或米飲調下忌作勞舉重治産後隂脫此趣産勞力而致隂下挺出腫痛五倍子蛇床子荆芥枳殻右味煎湯洗之硫黄湯治産勞玊門不閉硫黄呉茱萸兔絲子蛇床子各一両半右為散每服四大錢水一碗煎數沸去滓洗玉門日再洗治子宫不收荆芥穂藿香葉臭椿樹皮各等分右將前藥煎湯熏子宫即入療婦人隂下挺出蜀椒烏頭白芨各二分右搗篩以方寸用綿裹内隂中入三寸腹中熱明旦更著瘥止一方無蜀椒治婦人産後隂下脫蜀椒一升呉茱萸二升戎鹽半雞子大右三味搗以綿裹如雞子大内隂中日一易二十日愈硫黄散治産後勞傷隂脫硫黄烏賊骨各半兩五味子一分千金翼用三銖一方無之右為細末研令極細糁患處日三易治子宫脫出萆蔴葉有九角葉者好飛過白礬各等分右為細末以紙片攤藥末於紙上托紙藥於脫處用手徐托脫肛門處便入治婦人子宫出痛不可忍右用五倍子白礬為末温湯泡洗又先用淡竹葉根煎湯洗後仍用此末藥糝立效治婦人隂挺下脫蛇床子五兩烏梅十四个右剉碎水五升煑取三升去滓熱洗日五次療産後隂下脫方鱉頭二箇隂乾葛根一斤右為末酒服方寸匕日三服隂脫洗熨方治産後隂門開而不閉蛇床子炒五倍子各等分右煎湯乗熱以舊衣帛蘸藥洗治婦人産後子宫脫出用酸豚草俗名老鴉酸煎湯用草坐不開孔􅅻熏收一半稍温下手洗並收入而安治婦人子宫出不可忍用萆麻子塗頂心吸如入即洗去藥亦妙治婦人㾧疾用温水先洗軟却用飛鼠糞燒烟熏之又方用黄栢一兩為末浸冷水洗治産後隂腫下脫腸出玉門不閉用石灰一斗熬令黄以水三斗投灰中放冷澄清取一斗二升緩緩洗一方可燒草以水二斗投灰中坐湏臾療産後隂下脫用兎頭燒作末傅之瘥治産後隂脫用車釭頭脂燒作灰内酒中分温三服治産後隂脫下用慎火草一斤隂乾以酒五升煑取汁分温四服治産後隂下脫療隂腫以鐵精粉推内之又炙臍下攢交二七壯治産後隂下脫用人屎炒令赤以酒服方寸匕日三服治婦人産後隂下脫取蛇床子一升布裹炙熨之亦療中痛治隂脫以鐵精羊脂二味攪令稠布裹炙熱熨推内之瘥治産後隂痛以訶棃勒和蠟燒熏及熱煎湯熏通手後洗不語附論夫産後不語何答曰人心有七孔三毛産後虚弱多致停積敗血閉於心竅神志不能明了又心氣通於舌心氣閉塞則舌亦強矣故令不語也方七寳飲治産後不語敗血閉於心竅神志不能守舎又心氣閉則舌强不語川芎人參石菖蒲生地黄各一兩細辛一錢防風半錢硃砂半錢别研右為細末每服一錢薄荷湯調下不拘時地黄膩膈以當歸代之効尤甚孤鳳散治産後閉目不語用白礬細研每服一錢以熱水調下乍見鬼神附論夫産後乍見鬼神者何答曰心為一身之主因産後耗傷血脉心氣虚則敗停積上干於心心不受觸遂致心中煩躁臥起不安乍見鬼神言語顛錯醫人不識呼風邪如此治之必不得愈但服調經散每服加龍腦一撮得睡即安方小調經散方見本門浮腫類本方無龍腦八寳散一名七寳散治産後乍見鬼神方見本門不語類甘草小麥大棗湯治婦人臟躁喜悲傷欲哭象如神靈作數欠伸甘草三兩小麥一升大􅀥十枚右三味以水六升煑取三升温分三服亦補脾氣調經散産後血虚心無所主躁不安乍見鬼神言語顛錯麝香琥珀並細研桂心各一兩芍藥當歸各一分乳香研細辛各半兩右為末每半錢薑汁同温酒調下諸疾方大聖散治婦人血海虚冷久無子因産後敗血衝心中風口噤子死腹中擘口灌之湏臾生下堕胎攻刺腹痛横生逆生胎衣不下血運血崩血癖血入四肢應血臟有患及諸風氣傷寒吐逆咳嗽寒熱往來遍身生瘡頭痛惡心經脉不調赤白二帶下乳生惡氣胎宫虚冷曽堕胎崩中不足因此成疾及室女月水不通常服煖子宫和血脉恱顔色退風冷治百病兼治男子五勞七傷虚損等病澤蘭葉石膏各一兩桔梗厚朴薑炙吳茱茰湯洗七次炒白茯苓卷栢去枝北細辛去葉栢子仁防風各一兩人參三兩川芎一兩二分藁本川烏炮去皮臍乾薑黄耆五味子白芷丹參川椒去子閉目者炒出汗白术各三兩當歸芍藥甘草炙蕪荑仁各一兩二分阿膠炒生地黄白微各半兩肉桂去皮一兩右為末每服二錢空心熱酒調下急卒有患不拘時服産後不問下血多少湏日進黑神散二服下血少者以大聖散間之至一服腹中無痛處方服四物建中湯之類若早服則補住敗血為後患不淺黑神大聖散非逐血藥但能推陳致新多飲不妨勝金丸治血暈血氣及滯血不散便成癥瘕兼㵼面色黄腫嘔吐惡心頭目眩暈口吐清水四肢羸弱五臟虚怯常日睡多喫少久為勞疾如此所患宜服之澤蘭葉四兩芍藥蕪荑仁甘草當歸芎藭各六分乾薑桂心各三分石膏桔梗細辛厚朴呉茱萸栢子仁防風烏頭炮白微枳殻南椒石灰蒲黄石斛茯苓各三分白术白芷人參青木香藁本各一分右揀擇上等州土如法脩製為末煉蜜丸如彈子大有所患熱酒研一丸入口便愈忌生冷熱物若胎死不下胎衣在腹中並炒鹽酒服未效再服牡蒙丸治婦人産後十二癥病帶下無子皆是冷風寒氣或産後未滿百日胞胳血未盡便利久懸圊上及久坐濕寒入胞裏結在小腹牢痛為之積聚小如鷄子大者如拳按之跳手隠隠然或如蠱齧或如針刺氣時搶心兩脇支滿不能食飲食不消化上下通流或守胃管痛連自出子門不正令人無子腰胯疼痛四肢沉重淫躍一身盡腫乍来乍去大便不利小便淋瀝或下如腐肉青黄赤白黑等如豆汁乾薑䗪虫牡丹牡蒙厚朴消石前胡蜀椒黄芩桔梗茯苓細辛葶藶人參芎藭呉茱萸桂心各二十八銖大黄二兩半附子一兩六銖當歸半兩右為末蜜和更萬杵丸如梧桐子大空心酒服三丸日三不知則加之至五六丸下赤白青黄物如魚子者病根出矣増損澤蘭丸治産後百病理血氣補虚勞澤蘭甘草當歸芎藭各四十二銖附子乾薑白术白芷桂心細辛各一兩防風人參牛膝各三十銖栢子仁乾地黄石斛各三十六銖藁本厚朴蕪荑各半兩麥門冬二兩右為末蜜和丸如梧桐子大空腹酒服十五丸至二十丸羊肉杜仲湯治産後腰痛咳嗽羊肉杜仲紫苑當歸桂心白术各三兩五味子細辛欵冬花人參厚朴芎藭附子萆觧甘草黄耆各二兩生姜八分大􅀥三十枚右㕮咀以二斗半煑肉取汁一斗五升去肉内藥煎取三升半去滓分五服日三夜二應病散治婦人胎前産後百病諸般崩漏人參白茯苓去皮白术麩炒白㣲去蘆用根當歸各半兩白芷半兩甘草三分半京芍藥半兩元胡索五錢桂不見火赤石脂火煅紅牡丹藁本各半兩沒藥三分沉香三錢右為細末每服二錢入煉蜜大半匙熱酒調服如骨蒸熱入童子小便一盞煎服不能飲酒不用小便薑自然汁調服産後熱亦用酒蜜服有胎或産後皆可服也當歸丸治産後虚羸及傷血過多虚竭少氣臍腹拘急痛引腰背面白脫色嗜臥不眠唇口乾燥心忪煩倦手足寒熱頭重目眩不思飲食或勞傷衝任内積風冷崩中漏下淋瀝不㫁及月水將行腰腿重疼及治男子婦人從髙墜下内有瘀血下血等病一名大効内補丸真蒲黄炒三分半熟地黄十兩阿膠當歸續㫁乾薑甘草芎藭各四兩附子炮去皮臍白术白芷呉茱萸湯洗七次各三兩肉桂白芍藥各二兩右為細末煉蜜丸如桐子大每服三十丸食前以温酒下漸加五十丸一方加杜仲鹿茸肉蓯蓉北五味子神授散治婦人産後一切疾病不問大小以致危篤不能治者牡丹皮白芍藥桂心陳皮青皮各半兩當歸百合水浸川芎甘草乾薑炮各一兩人參神麯麥蘖炒各三錢紅花一錢半右為末每服二錢水一盞薑三片􅀥一枚煎七分空心服孕婦忌服當歸人參散治産後虚損痿弱難以運動疼痛不思飲食當歸白术黄芩芍藥大黄茯苓陳皮各五錢人參黄耆厚朴薑汁炙川芎官桂各三錢甘草一兩枳殻各二錢半右為末每服三錢水一盞半薑三片煎六分去滓不拘時温服如大小便閉以此散下和中丸神仙索金丹治婦人産後血暈血虚血積不散寒熱往來胷膈不寛氣喘不進飲食骨節疼痛生新血逐敗血止肚痛金滕川牛膝當歸川芎麻黄元胡索官桂神麯荆芥粉草赤芍藥熟地黄雄黑豆各二兩右為末温酒調或當歸童子小便任下治産勞方人參當歸陳皮半夏烏梅甘草麻黄根乾薑蓮肉胡桃杏仁小麥各一錢半青色鵓一箇右㕮咀乘在鵓鴿肚内用水二碗煎八分酒一大盞再煎八分温服將鵓鴿肉喫再將鴿骨并藥柤再煎連飲二服却將骨藥晒乾研為末煉蜜為丸如梧桐子大或酒入鹽湯空心服三十丸無不應驗功効非常黒散子治産後一切疾神効鯉魚皮三兩燒灰芍藥蒲黄各二兩沒藥桂心好墨卷栢青木香麝香各一兩男髪灰鐺墨各半兩當歸右為末以新瓷器盛蜜封勿令走氣每産後以好酒調下一錢如血暈衝心下血不盡臍下攪刺疼痛不可忍塊血癥血疾甚日加兩服不拘時候忌冷物果子粘食呉茱萸湯治産後虛勞百症悉皆治之呉茱萸一兩半泡七次桔梗福薑炮甘草炙麥門冬去心半夏泡七次防風真細辛白茯苓牡丹皮桂心當歸酒炒各半兩右㕮咀每服三錢水三盞半煎七分頓服温經湯治女人曽經小産或帶下三十六病腹脹唇口乾日暮發熱小腹急痛手足煩熱大腑不調時時泄痢經脉不調久不懷孕衝任虚損月候不勻或崩中去血過多不止呉茱萸三兩白芍藥當歸芎藭各三兩麥門冬半夏各三兩半人參阿膠牡丹皮去心甘草桂心各一兩右為末每服三錢水一盞薑五片煎七分去滓空心食前服忌生冷羊肉發物等黑龍丹治産後難生或胎衣不下産後血暈不省人事狀如中風血崩惡露不止腹中血刺疼痛血滯浮腫血入心經語言顛倒如見鬼神身熱頭痛或類瘧疾胎前産後一切危急垂死黒龍丹灌三四丸救活一切血疾垂死惡證妙不可言當歸去蘆川芎大者地黄生乾五靈脂去石良薑各一兩净用菉豆炒合硫黄各錢半花蘂石琥珀真的各一錢百草霜五兩别研右兩項末煮醋糊為丸彈子大每服一丸燒通赤以生姜自然汁與無灰酒各一合童子小便半盞攪和投藥於中研化頓服應有危證灌此入口無不作効産後一切血疾淋露不快兒枕不散積瘕堅聚按之攖手寒痛攻心垂死但灌藥下咽立効和劑方名琥珀黑龍丹唇青沬出子母皆致不救若兩臉微紅母却得生詳審用之姙娠得病用附子等劑醫家惟恐堕胎且如服他藥不効日月因循養成大病子母皆殂是愛指失掌豈不先救母斯若有實對証用藥治療終不致於俱殞也昔有朱汴水部施黑龍丹丸産後諸病危死者無不愈郡中及村落人賴以全活者甚衆汴受代歸婦人數千號泣遮道送行効應如神果不可盡述黑琥珀散治産後一切疾病産前胎死産横生逆生産後衣不下衣帶先㫁遍身疼痛口乾心悶非時不語如血暈眼花言語為暗乍寒乍熱悞以為瘧疾四肢浮腫悞以為水氣言語顛狂乍見鬼神誤以為邪祟腹脇脹滿嘔逆不定誤以為翻胃大便秘澁小便出血誤為五淋及惡露未盡經候未還起居飲食便不戒忌血氣之疾即聚成塊散即上衝氣急心痛咳嗽睡多驚悸盗汗崩敗中癥遶臍刺痛或即面赤因變骨蒸皆冝多服此藥若産後鼻衂口黒色氣短喉中喘中風口噤皆為難治須急服之凡未産前冝一両服能安神順胎産後雖無疾七日内亦進一二服能散諸病或因驚恐變生他証當連服取効琥珀研别製硃砂别研百草霜别研新羅白附子炮松墨燒黑衣皂屋塵是也血猫灰鯉魚鱗是也燒為末各半兩麝香研當歸去蘆白蚕即殭蚕是也各一分為散每服二錢炒姜温酒和童子小便調下食前一方有桂心半兩無小便大黑神散治婦人産後衆疾並皆治之生熟地黄生者半兩熟一兩甘草炙一兩當歸酒浸半日燥稱肉桂各三兩一分乾薑炮一兩一分白芍藥真蒲黄紙裹炮各一兩極小黑豆炒去皮一兩半一方作黒豆附子炮六錢去皮臍重二錢右為末每服二錢産後一旬内並以童子小便温調服胎斃腹中温酒下月内不語加獨活末酒調下衣帶㫁胞衣不下血暈口乾心悶乍寒乍熱四肢浮腫凡有此症並宜服之惡露不盡血氣刺痛入炒三稜加延胡索各半錢酒調下小便不通或出血加琥珀末半錢米湯調下大便秘加大麻仁半錢煎枳殻湯下水㵼加乾薑末陳米飲下惡痢濃瞿麥湯下中風手足夣搐加荆芥末煎湯下遍身疼痛加黄耆末酒下血崩濃煎艾湯下咳𠻳微汗加人參白术末薑湯下血渴加蒲黄乾葛湯下米飲亦可嘔逆惡心煎人參陳皮湯鼻衂煎芋根湯下鼻衂非常口鼻黑色汗如雨氣急喘嗽皆不治局方黑神散於本方去附子生地黄七味各一兩黑豆炒去皮二兩為末温酒半盞童子小便半盞同煎五分調二錢連進二服無時服産寳云胎死不下産母舌青者去蒲黄加熟附子半兩若心腹刺痛加元胡索末半錢温酒調下鮑氏方内血暈荆芥燒灰存性同藥調下詹療方云昔有永嘉法曹司馬逑妻分娩亟贖黑神散三貼與服惡血稍多進第二服其血如傾扶䇿登床耳間如皷聲者數百二三婢重手按其頭稍定急服當歸鹿茸二物湯夜以繼日而皷聲漸逺半月平復則知黑神散亦未猛進也此盧祖常易簡紏繆中載然謂遇産後自不可以易用藥况市黒神散安可不辨其精粗真偽耶本方加川芎一兩烏金散治産後血暈敗血不止淋瀝不㫁臍腹疼痛頭目昬眩無力汗多又治崩中下血過多不止並宜服之麒麟竭百草霜亂髪要男者燒好松墨煆醋淬延胡索鯉魚鱗燒為末當歸肉桂赤芍藥各等分右為末每服二錢温酒調下蒲黄湯治産後餘疾胷中少氣腹痛頭疼血未除腹中脹滿欲死方蒲黄生地黄生薑各五兩芎藭桂心各一兩芒硝二兩桃仁二十枚大􅀥十五枚右㕮咀以水九升煑取二升去滓内芒硝分三服日三良驗烏金散治産後十八疾方論方與局方黒神散同有人選集調十八首言語鄙俚故不録一曰産後因熱病胎死腹何但服烏金散二曰産後者何但服烏金散三曰産後胞衣不下者何但服烏金散四曰産後血暈者何但服烏金散五曰産後口乾心悶者何但服烏金散六曰産後乍寒乍熱者何但服烏金散七曰産後虚腫者何但服烏金散兼服硃砂丸八曰乍見鬼神者何但服烏金散九曰産後月内不語者何但服烏金散十曰産後腹内疼痛兼㵼者何但服烏金散兼用止㵼調氣藥十一曰産後遍身疼痛者何但服烏金散十二曰産後血崩者何但服烏金散十三曰産後血氣不通咳嗽者何但服烏金散十四曰産後乍寒乍熱心痛月候不來者何但服烏金散十五曰産後腹脹滿嘔逆不定者何宜服烏金散次服硃砂丸三二日炒生薑散湯下七丸十六曰産後口鼻黒氣鼻衂者何論同此症不可治十七曰産後喉中氣喘急者何論同十死不治十八曰産後喉中氣喘急者何但服烏金散已上與郭稽中二十一論答同故不詳録玉露散治産後乳脉不行身體壯熱疼痛頭目昏痛大便澁滯悉能治之凉膈壓熱下乳人參白茯苓甘草各半兩苦根炒川芎白芷各一兩當歸一分芍藥三分右為細末每服二平錢水一盞煎七分温服如煩熱甚大便秘者加大黄二錢半半夏茯苓湯治産前胸中宿有痰飲産後多致眩暈半夏湯洗白茯苓去皮陳皮去白白术各一兩丁香縮砂各五錢粉草三錢右剉散每服四錢生薑三片烏梅一个煎温服療産後腹痛氣脹脇下妨滿不能食兼之微痢茯苓人參厚朴各八分甘草炙陳皮當歸黄芩各六分右搗散以飲下方寸日三度漸加至一錢半當歸飲子治血虚勞倦五心煩熱肢體疼痛頭目昏重心忪頰赤口燥咽乾發搦盗汗减食嗜臥及血熱相搏月水不調臍腹脹滿痛寒熱如瘧又療室女血弱隂虚榮衞不和痰嗽潮熱肌體羸瘦漸成骨蒸當歸柴胡各二兩人參一兩半夏七錢半白芍藥一兩半黄芩一兩甘草半兩右㕮咀每服四錢水一盞半薑三片􅀥一枚煎八分去滓不拘時服紅花散治婦人産後血昏血崩月事不調逺年乾血皆治之紅花乾荷葉牡丹皮當歸蒲黄炒各等分右為末每服半兩酒煎和滓温服又如衣不下别末榆白皮煎湯調下半兩五通散補婦人産後諸虚血氣不調臍腹疼痛痞滿塊滯㵼痢一切諸虛五靈脂乾薑良薑青皮陳皮各兩右為末每服三錢水一盞半煎七分去滓食前温服日二服四味湯産後一切諸疾纔分娩吃一服尤妙當歸心膈加錢半元胡索氣悶急加半錢血竭惡露不快加半錢沒藥心腹刺痛加半錢右等為細末每服各炒半錢用童子小便一盞煎六分口服地黄煎治産後諸疾生地黄汁生薑汁各一升藕汁半升大麻仁三兩去核殻為末右和停銀器内慢火熬成膏温酒調下半匙更以北术煎膏半盞入之尤佳産寳方無麻仁用白蜜治産後虛憊盗汗嘔吐地黄丸治産後腹痛眼見黒花或發狂如見鬼狀或胎衣不下失音不語胷脹滿水糓不化口乾渴及療咽喉腫痛中心忪悸夜不得睡産後中風角弓反張面赤牙闗𦂳急或崩如豚肝狀臍腹疼痛四肢腫滿唇口指甲青黒一方地黄减半當歸一兩延胡索琥珀各一兩名琥珀地黄丸生地黄研取汁生薑各二斤研取汁蒲黄當歸各四兩右於銀石器内用慢火取地黄汁炒生薑渣以薑汁炒地黄滓各令乾四味同焙乾為細末醋煑麵糊丸如彈子大每服一丸食前用當歸酒調下羊肉湯治産後腹中疼痛虚勞不足裏急脇痛並治寒疝當歸三錢生薑一兩一分精羊肉四兩陳皮半兩右剉散水三碗酒少許煎至一碗去滓分二服或少加葱鹽亦佳四物湯治産後榮衞大虚血氣未定或内積虚損外傷或飲食甘辛所致及口乾痞滿當審所因治之用四物湯去地黄加人參烏梅煎外傷燥熱看屬何經以為治療方見本門虚渴類地黄酒治産後百病未産前當預釀之産訖蓐中服之地黄汁一升好麯好米各二升右先以地黄汁漬麯令發凖家法醖之至熟封七日取清服之佳黑神散治産後諸疾如産臥畢切湏用童子小便調服數沸除百病如無小便用白湯亦可三合湯治喉痛風毒積於臟腑毒氣随經流轉虚行而實止在身而為腫毒在咽喉為痛姙娠者最宜急治否則子母俱傷産前産後姙娠同三合湯治之升麻桔梗甘草各半兩右㕮咀每服三錢水一盞煎七分食後服之大豆紫湯治産後百病及中瘋舌强口噤煩渴頭眩目直視皆因虛風濕及勞傷産後及諸風病不得用藥惟宜單行一兩味亦不得大發汗特忌轉筋吐痢必死無疑大豆紫湯産後大善方見本門中風類芎藭湯一名弓調散治大産小産對症加添服餌一名二奇散治産後頭疼懸虛心煩眩暈目暗耳聾滿塞舉頭欲倒死胎血暈悶昏不醒人事或胎傷或金瘡或崩中或諸般去血不止者並皆治之芎藭當歸去蘆酒浸各等分右㕮咀每服三錢以水一盞半煎七分去滓温服不拘時候如腹中刺痛加芍藥煎口乾煩渴加烏梅煎發寒熱加甘葛芍藥煎水停心下嘔逆加茯苓生薑煎虚煩不得眠加人參竹葉煎大便祕澁加大黄煎小便不利加車前木通煎腹脇膨脹加厚朴煎血崩不止加香附子煎咳嗽痰多加紫苑半夏生薑煎腰痛脚疼加牛膝煎心下疼痛加延胡索惡血不下加牡丹皮煎産後疼痛不可忍加官桂童子小便煎服之立効治虛勞血癖氣壅滯産後惡露不安怯起衝心腹内攪疼及經絡不通男女中風口噤不語宜此法用乳香細研末方寸酒煎蘇木去滓調立吐惡物瘥葎草汁治産後婦大喜汗出汚衣赤色及膏淋尿血用葎草不拘多少搗取汁二升醋二合和空腹一盃或濃煑汁飲亦治淋澁尿血治産後肌羸用乳柑子樹皮為末酒下治産後遍身如粟米熱如火者用桃仁研臈月豬脂調敷上日易桃仁煎治婦人産後百疾諸氣補益恱澤右用桃仁一千二百枚搗令細熟以上好酒一斗五升研濾三四遍如麥粥法以極細為佳内長項瓷瓶中蜜塞以麫封之内湯中煑一沸時不停亦勿令火猛使瓶口常出在湯上無令沉沒熟訖温酒服一合日再雖丈夫可服之備急丹治産後惡血衝心胎衣不下腹中血塊等疾用錦紋大黄一兩杵為細末釅醋半升同熬成膏丸如梧桐子用醋七分盞化五丸服之湏臾血下即愈亦治墜馬内損惡血不下此藥難用大叚虚弱不可服其調藥醋不宜大酸便損肺臟全在醫者斟酌麻根散治産婦諸症用苧麻根或麻笋如産後惡血不散衝心刺痛以前藥打爛貼腹上服巾包之如無麻根以麻笋同苧麻作枕頭睡苧麻根包在腹上立愈如孕婦或子死不死胎動每用水酒煎連煎數服胎若已死即下未死其胎即安又治産前産後未産發寒熱者加生薑三片酒水同煎服之又治室女心腹刺痛經脉不調用酒煎服又治胎氣不安以酒煎服亦治子死腹中如大黑豆一勺炒熟水酒同煎服之瓜子湯治産後腸頭如似針刺連糓道又如痔痛小便如淋狀或寒熱此由産時用力氣併腸間亦由隂虛陽邪中之毒氣攻衝恐成腸癰瓜蔞子桃仁去皮尖牡丹皮各一兩薏苡仁四兩右為散每服五錢水二盞煎至一盞服後口鼻黑氣起及鼻衂者何答曰陽明者經脉之海起於鼻交頞中還出頰口交人中左之右右之左産後氣消血散榮衞不理散亂入於諸經却還不得故令口鼻黑氣􅇁滿及變鼻衂此緣産後虛熱變生此症世有患者名胃絶肺壞此症不可治故不出方也遇有此疾急取緋線一條并産婦頂心髮兩條𦂳繫中指節上即止無藥可療亦厭禳之一端也若胎已落而母死者用磨石上盖以杵産婦腹三五廻即活治産後風虚五緩六急手足頑痺頭旋眼眩血氣不調用大豆一升炒令熟熱投三升酒中宻封隨性飲之墜氣丸治婦人産後血塊積滯腹痛惡穢不下一切諸疾㵼痢等巴豆四十九箇去皮生研寒食麵三錢蒲炒用半錢黄丹三錢蒲炒半錢右研勻滴水為丸如豆大每服三四丸水二盞入秤搥糓查七个同煑放冷送下虚實加减取㣲利普濟方卷三百五十五
