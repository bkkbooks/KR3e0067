通去皮節各一兩右剉散水一斗煮取五升時時服一升即利琥珀湯治脬轉小便不利煩悶琥珀大黄剉炒滑石碎一兩車前子車前葉各一兩右麄搗毎服二錢匕水一盞葱白半分拍碎煎至七分去滓温服不拘時通草湯治脬轉不得小便雀糞半合車前子滑石各四兩通草一作木通芍藥各二兩右㕮咀以水七升煮取三升服五合日三先食前得立愈琥珀湯治脬轉臍下急滿或因霍亂而得琥珀研一兩阿膠炙燥半兩别搗葱白切二七莖車前子三兩右先用水五盞煎葱並車前子至三盞濾去滓次下膠末候消次又下琥珀末煎過分作三服不拘時候温服治脬轉不得小便川大黄一兩剉炒琥珀一兩細研車前葉二兩右為散毎服四錢水一中盞入葱白三莖煎至六分去滓不拘時温服又方亂髪燒灰三兩滑石二兩川芒硝右細研令匀用白皮桃一箇搗以水絞取汁二升不拘時以汁一小盞調下二錢芍藥湯治脬轉小便不利赤芍藥車前葉木通各一兩右細剉毎服五錢匕水一盞半煎至一盞去滓温服滑石湯治脬轉小便不通八九日丈夫婦人皆治滑石碎一兩寒水石碎一兩一方用石膏冬葵子半兩右粗篩搗毎服五錢匕水一盞半煎八分去滓食前温服葱白湯治膀胱小便卒暴不通小腹脹急氣上衝心悶絶欲死此由暴氣乘膀胱或從驚憂氣無所伸欝閉而不通流氣衝脬系不止陳皮三兩葵子一兩葱白二莖右剉散水五升煮取二升分三服洗方治脬轉小便不通先用良薑葱頭紫蘇葉各一握右煎湯宻室内薫洗小腹外腎肛門留湯再添蘸綿洗以手撫於臍下拭乾綿被中仰坐脚自舒其氣次用蜀葵子二錢半赤茯苓赤芍藥白芍藥各半兩右剉散毎服三錢煎取清汁再暖乘熱蘇合香三丸并青鹽一錢食前温服蒲黄散治膀胱不得小便經三日困篤欲死蒲黄滑石各一兩右搗羅為散毎服二錢匕雞子清調下一方用温酒調服一方用水治脬轉欲死及失溺方吸芥真琥珀一兩葱白十四莖右取豆醤清和竈突中黒如豆大内隂孔中立愈治脬轉不得小便方右以水四升煮取三升入葱白琥珀末温服一升日三服大利亂髪散治忍小便不時起便脬轉大小便不得四五日困篤欲死無脉服此瘥滑石二兩亂髪三兩燒灰右二味搗篩取生桃白皮一斤熟煮以水合絞得汁二升以汁服散方寸匕日三服即愈但淋者取亂髪三兩燒灰滑石五兩合搗為散服方寸匕一方有鯉魚齒一兩無桃白皮治脬轉不得小便雞子一枚去白取黄以温水調服之不過三服秦芃湯治脬轉不得小便秦芃不拘多少去苖􅁟右麄搗篩毎服五錢水一盞半煎至一盞去滓温服車前飲治脬轉不得小便急卒車前草一握去根洗剉右以水三盞煎至二盞去滓分三服連併服不拘時一方用子一升水一斗煮取四升分四服治飽食後或忍小便或走馬忍小便或大走及入房皆致轉脬臍下急滿不通治之用以亂頭髪急纒絞如拳火燒為末醋四合二方寸匕服之訖即炒黒豆葉蹲坐上治脬轉小便不得用阿膠三兩水二升煮七合頓服又方用䜴五合以水三升煮數沸頓服之又方用連枷闗燒灰水服之又方用筆頭燒灰服之又方燒死􅎙蜋二枚末水服之又方内白魚子莖孔中又方用酒和猪脂雞子大頓服之又方用蔴子煮取汁頓服之治脬轉小便不能通用炒鹽半斤嚢盛熨小腹治忍小便脬轉用爪甲燒灰水服之治小便久致脬轉取杻土塵三指撮以水服之治小便久致脬轉以蒲黄裹腰背令頭至地三度通一方取蒲黄服方寸匕日三服良治卒小便不通及脬轉方炙桑螵蛸搗為末米飲服之方寸匕日三服良治脬轉不得小便用蒲席捲人倒立令頭至地三反則通脬嚢治法凢尿不在脬中為脬屈僻津液不通以葱葉除尖頭内隂莖孔中深三寸㣲用口吹之脬順津液大通即愈普濟方卷四十二
