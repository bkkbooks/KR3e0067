body:
  text: 普濟方卷二百九十一明周王朱橚撰瘰癧門縂論瘰癧之名巢氏病源載三十六種千金聖惠所論瘰癧九瘻有風毒氣毒熱毒之異瘰癧結核寒熱之殊其本皆由恚怒氣逆憂思過甚風熱邪氣内傳於肝盖怒傷肝肝傷故令畜結而腫其病多生於頸腋之間結聚成核初如豆粒後若梅李核累累相連大小無定初覺増寒壯熱咽項强痛腫結不消者當便服五香連翹湯牡蠣大黄湯踈下三兩行於上貼十香膏烏犀膏及用淋溻腫湯潰毒湯時復淋溻如此救療即得消散若未消散可服内消丸或皂莢丸之類漸以求瘥若腫結極硬荏苒日月不能内消者久必成膿若腫而稍軟其人面色痿黃皮膚壮熱上蒸膿已成也可以針决核中令其潰㪚則易愈也治法如瘡法于瘡口中用追毒蝕肉錠子絍之于上用烏犀十香膏貼之及托裏之劑和之經久不瘥或愈而復發或别自穴膿水透出流津不止肌體羸瘦者變成九瘻内經曰䧟脉為瘻留連内凑即此病也可用蒜餅子灸之然後瘡口再用紫金㪚翠霞㪚等於上任貼膏藥求瘥其將䕶慎治療用法無造次焉凡人少小以來動輒蓄怒或憂思驚恐抑鬱不伸多致結核于項日積月累風毒熱氣聚焉於是腫濕開瘡起復無已甚則牽連至於腋下自腋下而蔓延心胸殆無及矣發熱増寒煩渴盗汗或寒熱往來或不痛其外證治法無他大抵以地膽斑猫為主盖瘰癧之毒莫不有根地膽斑猫治度如法能使其根從小便中出或如粉片如塊血如爛肉皆其驗耳但梅根之行小便亦必澁痛當以木通滑石輩導之然是痛必從小便出者何哉諸痛痒瘡盖屬於心其或一二流行於大便就快也人有此患不惟懲忿窒欲謹䕶燥濕風寒其餘飲食百味一切戒之然後投方匕之劑乃可責効焉日飯蔬食而已結核在耳後或在耳前或在耳下連及頥頷或在頸下連缺盆皆謂之瘰癧或在胸前胸之側或在兩脇皆謂之馬刀手足少陽主之九頭腫瘰痛瘰癧及胸腋脇之間或有瘡痂腫核不消及膿水不止可滄塩一二兩炒過以長流水一大碗煎之放温作三五次頓服之訖良久於咽喉中以釵股探引吐之去冷痰三二升服和血脉疎通藥脉内經曰醎味涌渫為隂同人記少陽起於目鋭皆行耳後下脇過耳門瘰癧結核馬刀挾癭足少陽膽經多氣少血之病也諸瘰癧附論論曰瘰癧諸病皆由風熱氣毒藴積臟腑搏於肝筋所致盖肝主筋毒氣攻於筋脉故隨肌肉虚處停結而為瘰癧多生頸腋間其狀結核累累相連如梅李謂之瘰癧方救苦勝靈丹一名救苦化堅湯出濟生㧞粹方治瘰癧馬刀瘡挾癭從耳下或耳後下頸至肩上或入缺盆中乃手足少陽經分野其瘰在於頭下或至頰車乃足陽明之分野受心脾之邪而作也今將二證合而治之黃耆一錢護皮毛間腠理虛能活血脉又能補表之元氣消弱能通和陽氣泄火邪能生血為瘡聖藥也人参三錢補肺氣之藥如氣短喘不調有喘者用之也甘草炙半錢或二分能調和藥㵼火益胃氣其分而不定者亦能助瘡邪為脾胃疾冝㵼營氣也升麻一錢葛根半錢真漏蘆半錢如無去此一味此藥以上三味俱足陽明裏經藥也連翹一錢此一味十二經中血結氣聚必此散之瘡藥中無此藥之神效其性温凉氣味中聖藥牡丹皮三錢去腸胃留血滯血也當歸五錢熟地黄五錢生地黄五錢此三味諸藥中和血生血凉血藥是也白芍藥五分能補中益肺氣之虛弱治腹中痛用也肉桂三分能散隂瘡􅅑本有寒因熱又為寒覆盖其瘡辛熱以消浮冷之氣或燥煩者去之隂證瘡必湏用之也廣茂煨五分柴胡八分同連翹用乃少陽引用也若無馬刀挾癭瘡是不在少陽經去柴胡一味黍粘子五分無腫不用有腫用也昆布五分其味醎􅊓若堅硬者冝用為醎能軟堅也京三稜煨五分瘡堅硬甚者用之不甚堅硬者不可用也益智仁三分如吐沫吐食舌本上寒者用之無則去之如唾多者胃之不和也大麥蘖麫一錢治腹中縮急兼能消食補胃可用也神麯末炒五分為食不消化故用也黃連五分治煩悶用也一方無生地黄右同為細末白湯浸和蒸餅和勻揑作餅子晒乾搗如米粒大毎服三錢或二錢白湯送下量人病虚實臨時斟酌無令藥多妨其飲食此治之大法也如手足太陽春强動痛不可廻顧腰似折項似拘者加獨活半錢𦍑活防風各一錢其防風一味辛温若瘡在膈上雖無手足大陽經證亦當用之為能散結去上部風藥病人拘急者風也如有熱或足腿無力加炒黄栢五分用如有躁煩欲去衣者腎中伏火也更冝添加之無此證勿用服藥腹脹者加厚朴五分炒無則勿用如氣不順加橘皮更加木香如在陽明分為瘰癧者去柴胡黍粘子二味如在少陽分為馬刀挾癭者去獨活漏蘆升麻葛根更加瞿麦穗三分大抵用藥之法不惟瘡瘍諸疾病量人氣弱者當去苦寒之藥多加人參黄茋甘草之類㵼火而先補其元氣假令邪在上中下三處若在上焦加黄芩一半酒洗一半生用在中焦加黄連一半酒洗一半生用在下焦加黃栢酒洗知母酒洗防己之類選用之如大便不通滋其邪盛者加酒洗大黄以利之如因血燥大便燥乾者加􅊝仁酒洗大黄如風結燥不行者加麻子仁大黃如風澀而大便不行者加煨皂角仁大黃秦芁以利之如風脉澀者有氣澀而便縮者加郁李仁大黄以除氣燥如寒隂之病為寒結秘而大便不通以局方中半硫丸或加煎附子乾姜水泠與之散毒潰堅散出濟生㧞萃方治馬刀瘡結硬如石或在耳下至缺盆中或至肩上於脇下背手足少陽經中及瘰􅊓遍于頦或至頰車堅而不潰在足陽明經中所出或二瘡已破乃流膿水並皆治之臨臥時服藥斟酌病人飲食多少大便軟硬以意料之草龍膽半兩酒洗炒四遍剉甘草炙半錢升麻六分柴胡半錢桔梗半兩連翹三錢葛根白芍藥黄連各二錢昆布半兩知母酒洗二次半兩當歸稍半錢栝蔞根半兩剉細酒洗黄苓稍一錢半酒洗炒一半生用荆三稜三錢酒洗微炒廣茂三錢剉酒洗炒黄栢酒炒四次半兩右㕮咀每服六錢或七錢水二盞先浸大半日煎至一盞去滓服於臥處伸足在高處頭微低每噙一口作十次嚥至服畢依常安臥取藥在胷中停蓄也另攅半料作細末煉蜜為丸如菉豆大每服一百丸或一百五十丸此藥湯留一口送下更加海藻半兩炒鸛骨丸出聖惠方治瘰癧鸛骨狸骨並炙射干𤣥参升麻炙青木香沉香犀角丁香羚羊角屑丹参甘草炙各四錢人参沙参各三兩獺肝六分連翹子六分光明砂三分研即好丹砂右搗篩蜜丸以飲服十五丸日二服漸加至二十丸空心服之取利忌生冷油膩血食并鮓熱肉海藻菘菜粘食陳臭物一方有麝香黒牽散一名神秘散一名大聖㪚一名牽牛丸出仁賢直指方治瘰癧經年不瘥斑猫不拘多少去頭足糯米炒令黒色米黄為度去米就地隔紙出火毒研為末留未於空隙時服之殭蠶㨂直者炒去絲黒牽牛用頭末荆芥穗上三味各自為末等分用之右每服斑猫末一錢殭蚕牽牛荆芥穗共一錢每作服調為一盞如遇此疾隔日晩飯勿食令心空先以荆芥湯調滑石末二錢重服一盞至一更再服一盞少頃用無灰酒調前四味服一盞畢便臥若小便不以溺器盛之如涕如塊為驗㸔項上生幾癧小便中出幾塊大抵如鼠形者多數或不足依前再服倘小便澀甚燈草煎湯調琥珀末服一二錢惡物即下荆芥調滑石末亦可如仍澀不通用生料五苓散黒豆湯調服亦可有孕婦人不可服服後小便閉澁只服燈草調琥珀一盞再用下後藥瘡未破者用桑椹不拘多少捻破紐汁入磁器内熬成膏子滴水不散為度却用膽礬煨炒研細等分與桑椹膏同劑攤紙上貼瘡已破者用辰砂膽礬研末微掺上忌熱毒風物瘡破不愈者用敷貼藥各半錢重蜘蛛斑猫紅娘子水蛭地膽芫花各半錢右燒新瓦熱焙藥乾研為末先用䓤白湯洗瘡淨軟絹帛拭乾以好米醋調藥末敷上日用三次瘡水盡用生肌藥血竭龍骨乳香明礬煆過石膏煆過黄丹以上各一錢右研為末候瘡内黄水膿血盡乾掺自然生肌為效化毒散治瘰癧當歸白芍藥赤芍藥知母苧麻根白膠香甘草貝母秦芁生地黄敗龜柴胡前胡官桂熟地黄以上各一兩右㕮咀每服半兩水二盞生姜三片棗子二個煎至七分去滓温服茈胡湯出聖濟總録治瘰癧茈胡去苗荆芥穗秦芁去苗土知母當歸桂心藿香去梗甘松敗龜醋炙烏頭炮裂去皮臍地骨皮楓香脂白芍藥各半兩苧根濕秤二兩細切芎藭一兩右並洗淨曝乾為末每服三錢以水一盞生姜三片大棗三枚同煎七分去滓温服早晨午食後夜臥各一服薔薇丸出千金方治身軆有熱氣瘰癧及常有細疥并口中生瘡薔薇根三兩黄茋黄芩鼠李根皮栝蔞根芍藥苦参石龍芮防風一作防己白歛膽龍一作龍胆各一兩梔子仁四兩右為末蜜丸如桐子大米飲下十五丸日再一方有黄栢一兩槐角煎丸出瘡科精要治瘡痬瘰疥癬赤腫等瘡天麻川芎甘草黄藥子甘菊花人参各一兩何首烏苦参各一兩半防風荆芥穗各二兩槐角並仁另放皂角不蚛者各四兩水一斗煑軟橘汁去滓熬成膏子其皂角取􅁏研入膏為度右除皂角膏外槐仁與諸藥為末入膏内搜和煉蜜丸如豌豆大每服五十丸食後竹葉湯下立應散出仁賢直指方治瘰癧已破皆可服連翹赤芍藥川芎當歸川烏尖七箇甘草炙滑石研各半兩黄芩三錢白牽牛生取用土蜂房蜜水洗飯上蒸日乾各二錢半地胆去頭翅足秣米炒黄為度三錢右為末每服水一盞濃煎一錢木通湯下臨臥毒根從小便中出如粉片塊血爛肉是也如未效後再服繼以薄荷湯觧其熱毒風且地胆性帶毒濟以烏尖或衝上麻悶不能强制嚼葱白一寸茶清下以觧之如小便澀燈心煎湯調五苓散服瘡處用好膏藥貼若療癰疽用此宣導惡物本方去黄芩不用荔枝膏治瘰癧荔枝肉一兩輕粉麝香川芎白豆蔲砂仁各半錢硃砂龍骨血竭乳香各一錢全蝎五箇右將荔枝肉碎擂炊軟米飯和為膏㸔瘡大小攤貼如有三五箇者止去却為頭者妙烏蛇丸出聖濟總録治瘰癧諸病烏蛇酒浸去皮燒灰白殭蚕一両燒灰芫青三對與斑猫同炒昆布細剉麥炒乾蝦蟇一箇燒灰大黄濕紙褁煨連翹半兩斑猫半兩糯米炒黄去米不用雄鴿糞取淨者一合用皂子一百粒棟圓熟肥好者熨斗内燒存性右為末煉蜜和丸如桐子大毎服七丸加至九丸茶清下空心晚食後各一服成瘡者不過四十日内消乾其效皆勝于轉㵼及小便内下者皂角丸出聖濟總録治諸癧猪牙皂七根三根炮二炙二生並去皮一處椎破又用温水浸七晝夜毎日揉一遍去滓絹濾熬如糊母丁香四十九箇龍腦研麝香研各半錢漏蘆去蘆頭木通剉紅娘子去頭足蘇枋木節剉滑石各一錢粳米少許右除皂角外搗研為末都入皂角膏中更和寒食麫少許為丸如菉豆大每服十丸丁香水下空心食前日三四服服時不得見日此藥内消不吐不利惡實丸出聖濟總録治諸瘰癧不限年久日近或已破或未膿及諸癰腫瘡並皆治之惡實四兩炒麝香半兩大黄煨三兩牽牛子一兩半一半生一半炒薄荷各二兩漏蘆去蘆頭剉右為末用羊頸骨打取髓煎濃汁作大麥麫糊為丸如梧桐子大每服十五丸日午臨臥嚼薄荷湯下替針丸出瑞竹堂治一切瘰癧惡瘡龍腦二分麝香半錢輕粉一錢雄黄一錢赭色者硼砂半錢白丁香二錢直白金脚信二錢巴豆十箇去心膜粉霜壹錢右為末大麥麫為丸如小麥粒大若用時覷瘡大小加减用如瘡破者兩丸瘡小不破者一丸用砭針破出血盡絍藥後用黄蠟封於針口如瘡腫者不妨不過三日自消遇僊無比丸出瑞竹堂治瘰癧白术生㯽榔生甘草生牽牛一半生一半炒蜜陀僧防風郁李仁湯浸去皮斑猫糯米炒去皮足翅不用米以上俱各等分用右為末麫糊為丸如桐子大早晚煎甘草㯽榔湯下每服二十丸至月後覺腸中微痛如小便中取下癧子毒物有如魚目狀已破自合未破自消連翹丸出聖濟總録治癧遶項如連珠連翹防己𦍑活去蘆木香梔子仁芍藥各二兩𤣥参五兩大黄一兩右為末煉蜜為丸如桐子大每服二十丸食後温水下内消散出德生堂治癧已未破者内自消大黄半兩木香二錢連翹半兩丁香三錢梔子四錢沉香一錢沒藥二錢薄荷二錢甘草三錢黄芩三錢右㕮咀每服五錢水盞半煎七分食後臨臥服入麝香一錢同煎三五服㸔病人實者加朴硝三錢虛者一錢半再煎温服十日後再進一服後却用大蜘蛛一箇活爛研好酒一盞調用絹帛濾去滓殻服之即日内消治癧已破者出德生堂巴豆七箇蝦蟆一箇將巴豆放蝦蟆内將脚室中吊一宿用桑柴火燒存性黒猪胆一箇石灰放胆内隂乾急焙乾等用陳年石灰炒黄一錢乳香一錢輕粉半錢黄丹一錢磁器内炒不見鐡右為末於瘡口上輕掺口噙將水洗淨用軟帛浥乾貼藥神聖大易膏治癧兼治八十種惡瘡小油半斤生地黄當歸川芎上各四兩赤芍藥四兩黄丹四兩香白芷四兩右為麄末擇水日將上件藥末油浸一宿用文武火熬過以浄好綿濾去滓再熬黄丹一錢旋旋㸃之用槐栁條攪截焦頭再熬盡黄丹為度滴水成珠便用治瘰癧出儒門事親斑猫去頭足翅赤小豆白僵蚕苦丁香白丁香磨刀泥一方有秋石磨刀泥右等分為細末十歲以上服一錢二十以上服二錢五更新汲水一盞調下至辰時見效女人小便見赤白三兩次男子大便見土白色立效當日服粘粥不得吃别物大忌油膩患三四年者只一服七八年者再一服香藥丸治瘰癧硼砂乳香沒藥半夏輕粉赤石脂各等分右為細末糯米粉為丸如桐子大每服十丸加至二十丸臨臥皂角子湯下治瘰癧出儒門事親蟠龍肚腸炮乾用鱉殻裙襴炮川棟子五箇牡蠣大黄牛蒡子燒存性皂角子五十箇右為細末蒸餅為丸如菉豆大每服十五丸食後艾湯下日三治瘰癧先於瘡上炙三壮然後用藥漬作瘡口用新活鱔魚截長一指大批開就掩在瘡口上少時覺瘡内痒急揭起魚覷上有細蟲如馬尾一節蟲出如捲三五次取盡䖝子後用歛瘡口藥龍腦一錢麝香半錢乳香一錢雄黄輕粉各半錢右為末水糊為丸如小麥大毎用一丸二丸絍在瘡口内覺腫痛效紫金丹治癧子瘡硼砂輕粉紫粉草一錢半麝香一錢半信一分右為細末用虀水䓤白湯口噙洗瘡淹乾瘡然後貼三日洗貼三遍見效追毒蔚出王氏溥濟方治癧子神效丁香根麝香研一錢莨菪子五十粒雄鼠糞七粒兩頭尖者以麫兩匙炒令黄去麫等用槲皮三斤去粗皮槌碎細剉以水二斗煎取四升濾過重煎候成膏入諸藥斑猫三枚去足翅以糯米半合同炒去米不用右除槲皮外搗研為末煖槲皮煎令温和諸藥攪勻貯磁瓦器内毎服匙許空心以温酒一盞調下臨時視病人虚實及肥瘦加减斟酌用之服了仰臨臥湏臾即吐出若病根年深者如蝦蟆衣魚腸相似近者若息肉吐了以温水漱口喫粟米淡粥補粳米亦可忌一切毒物餘不忌皂莢丸出聖濟總録治瘰癧皂莢五梃去皮用酥二兩旋塗炙薄荷乾葉生大黄剉防葵各二兩膩粉少許研鷄子二枚煑熟取黄等用右為末别將皂角五挺生椎碎以水一斗揉取汁羯羊肉半觔去筋膜以皂莢水熬成膏和藥末丸如桐子每服十丸食前米飲下日二治瘰癧廣木香青木香黄丹各半兩寒水石一兩輕粉半錢白礬半兩研人言一錢研龍骨一錢研銅錢一箇酣煆三次燒紅為末麝香少許研末右為末以獨蒜泥和為錠如小麥大如瘡有眼納進錠子一箇蠟紙封無眼同蒜泥調紙封治瘰癧斑猫二十四箇去頭足翅用糯米炒黄色滑石五錢防風二錢穿山甲五錢麫炒黄色不用熬琥珀三錢真的右為末毎服三錢空心米飲湯下早晨用藥至飯時一服毒物自下如瘡破用桑條水洗之無糨絹􅼊乾後用打銀燥灰研細貼之治瘰癧出危氏方五倍子海螵蛸梹榔雷丸各一錢麝香半錢研五靈脂一錢右為末乾用清油條搽濕則乾摻内消方出聖濟總録治瘰癧人参去蘆三錢滑石各半兩丹砂研一分麝香研半錢斑猫十四枚去頭足糯米炒黄為度去米右為末散每服三匕温酒調下生肌散治瘰癧白石脂二錢生白礬三錢黄丹一錢研龍骨二錢麝香研二分輕粉半錢右為末每日二次乾掺在瘡口上三物散出聖濟總録治瘰癧紅娘子六十枚不要折去翅足大黄半兩剉陳粟米一合無即以新粟米右同炒令米黄為度共為細散初服一方匕每日空心調酒下第四日後服半錢匕及五七日覺腹下疼小便澁勿怪是藥騐也更服後藥青橘皮湯浸去白焙虎杖等分右為末以醋煑麵糊為丸如菉豆大每服五丸至七丸用青橘皮湯下前散藥相間食後臨臥服日二次用貼藥貼瘰癧方出聖濟總録用砒黄信州者細研滴濃黒汁為丸如桐子大於銚子内炒令乾後用竹筒子盛每用時於患處灸破或挑破將藥半丸敲碎貼之以自然蝕落為度覺藥盡時更貼少許輕粉丸出聖濟總録治瘰癧此丸先服烏鷄子一枚去黄取白盛于盞内膩粉一錢半巴豆七粒新者去皮心與粉同入鷄子内蒸熟取于乳鉢内研令勻别用膩粉三錢匕於手掌中以病人津唾調和前藥為丸如菉豆大右每服五丸荆芥薄荷茶下黄昬時服至一更如未轉更以薄荷茶投之若腹痛先取下一次第二次以水盛取見病根惡物出也或患年深只可三度轉出盡惡物其項漸小不得出風一月將息後用補藥人参𤣥参苦参白藥右等分剉焙為麄末每服一錢匕水一盞煎三五沸去滓温服如瀉不止用黄連乾姜各一錢煎服不過三五服便止如瘡口未破用后膏藥自消夏枯草半兩右為末用粟米少許將酒煮成稀粥濾去滓取濃汁入煎藥調勻為膏塗于帛上子貼之不得動換瘡口永瘥托中散出聖濟總録治瘰癧此先服黄耆剉一兩甘草炙半兩右為散每日食後湯服一錢匕三日二服次用取藥取瘰癧方麝香研一錢砒霜研半錢龍腦研一錢斑猫十枚去足翅蟾酥十枚如松子大右研為末用白麫一錢以水和勻青黛為衣每用相度瘡口大小仍燻灸三壮候瘡發用藥切冝少使淋洗瘡口方五倍子一兩礬石半兩右為末每用二錢匕沸湯一碗調勻淋洗湯温即止每淋洗了用軟帛裛乾用生肌藥掺於瘡口上雌雄散治瘰癧經驗斑猫一雌一雄足翅全者用新瓦焙乾去頭足翅貫衆二錢甘草各半兩鶴虱半兩右細末作兩服飽食後好茶濃㸃一盞調下一方五更初茶清下至天明不動更服半錢如小便澁痛效更不要服大忌毒物洗傅方用白芷煎湯泡荆芥候温軟帛蘸洗拭乾好膏藥貼濃汁惡物出盡更用半夏生二錢南星研二錢血竭一錢研輕粉一錢右細末以津唾調敷救原歛瘡口方血竭一錢研棗燒灰用半錢麝香少許研右夾研津唾調敷治諸癧疾硃砂砒霜硼砂馬牙硝各等分右乳鉢内研細麫糊搜和如香附子狀相瘡口大小作之儘送入瘡口中恐腫時用薄荷研細塗之收口了却將大栢皮并白丁香并為末盡入孔中如邉不乾用江子乃巴豆也去皮殻不拘多少右用麻油煎令赤去火氣後去巴豆入蠟合如膏香瘡口大小塗之將白芨末調水塗瘡上治癧子瘡猪指甲火燒存性出火毒用硼砂少許用輕粉火燒存性出火為細末沉香隨意用右研細末未破清油調敷已破乾掺一膜散地膽斑猫硫黄雄黄右等分為細末揩破患處酸醋調搽便立丹治癧等瘡黄丹雄黄龍骨八停金脚信少許右為末膿水乾揑餅子葱白湯洗過貼在瘡上乳香散治一切􅊓瘡新久乳香一錢研砒霜一錢研硼砂一錢半黄丹半錢紅娘子十四箇去翅足右為末糯米粥和成餅子如三錢許厚如小錢裏圏大破瘡上白麵糊如不破者炙七炷大者不過一月其瘰癧核自下却後用歛瘡生肌藥黄蘖不拘多少為末麵糊塗之連翹湯治馬刀大黄三兩連翹瞿麥花各一觔甘草二兩右㕮咀水煎服後十餘日可於臨泣穴炙二七壮服五六十日方效在他經者又一方加大黄木通五兩知母一作貝母五兩雄黄七分㯽榔半兩去甘草不用同前藥為細末熟水調下三五錢服之治癧子瘡木香一兩連翹貝母白芷各三錢右為末食後臨臥茶湯調下平肌貼瘰癧膏乳香燈心灰黄丹定粉各半兩右用麻油四兩煎成膏子貼之治癧并馬鼠瘡方銅録斑猫砒霜各等分右為細末醋糊為丸如鼠糞大每用一錠子作三丸納於瘡口上以膏貼之乾亦妙三聖丸治瘰癧丁香五十箇斑猫十箇全麝香不研一錢右為細末塩豉五十粒浸如泥和前藥令匀丸菉豆大一服五七丸食前酒下日三服五七日外覺小便澁淋是藥效便加服或便下青筋膜即病之根忌麵魚内動風物治癧子瘡木鱉子十箇帶殻擂碎生山藥大者去皮三寸大蒜一箇去皮右為細末如癧乆已破先葱白椒湯洗帛子拭乾敷藥一指厚外用油紙封之數日自愈連藥魘掀下亦無㾗未破者不湏水洗貼散之裏托散治癧子瘡黄耆甘草金銀花右等分研作五分每服酒一盞水一盞煎至一盞去滓食後服之内消散出聖濟總録治瘰癧芎藭一兩剉白僵蚕直者炒甘草炙剉各半兩右為末每服一錢蜜水調下食後日三服三神丸出聖濟總録治瘰癧斑猫一分半石决明一枚麝香研一分右將前二味為末和粥麫少許搗成劑入麝香再研丸菉豆大每服五丸臨臥生姜湯下萞麻子丸出聖濟總録治瘰癧萞麻子一千顆揀半生用瓦内炒令煙起礬石一兩瓦上鎔三五復放冷研黒豆六顆三粒生用三粒瓦上炒熟右不許犯鐡器一處細杵匀爛丸如皂角子大每服一丸塩湯下女人醋湯下不拘時禹餘糧飲出聖濟縂録治瘰癧餘粉研二分作二貼甘草一兩半生半炙擂碎膩粉研半分分作二帖右將甘草半兩水一升煎半升調禹糧末并膩粉各一貼空心頓服當㵼下惡物未愈再服㵼後以葱粥補之治䑕癧瘡本事方有黄荆子又名蔓荆子乳香甘草各等分右為末每服一錢熟湯調食後良久服又方黒附子一箇洗小便五升䀋三升右同浸半月日取出將黒附子去黒皮隂乾為末用黒豆爛煮研為膏丸附子末如桐子每服七丸温酒早晚下二服四神丸治瘰癧無問淺深已破未破並宜服之荆芥白僵蚕炒甘草黒牽牛右各一兩為細末好醋糊為丸如桐子大每服三十丸臨臥食後滑石湯下如聖餅子治癧子雄黄研半錢人言研半錢乳香一錢研右用糯米粥為錠子小麥大瘡有眼如錢眼大貼在瘡口上未破者灸三五壮將餅放在灸處用白芨為膏貼之至一日餘自結痂取下將餅子依前貼又方硼砂三錢研白礬四錢研黄丹一錢右將白礬化開為汁後將硼砂黄丹下漫火枯乾研為細末每日二次乾掺口上瞿麥飲子出濟生㧞萃方治馬刀瞿麥半觔用穗連翹一觔右麄末水煎臨臥服此藥經效多不能速騐冝待歲月之久除也牡蠣丸出仁存方治瘰癧牡蠣四兩煅紅地上出火毒一宿𤣥参三兩焙右為末糊丸桐子大早晚食後臨臥各四十丸酒下藥將服盡癧子亦除根專治瘰癧及馬刀方乾薑一兩剉真正銅緑半兩右同為末香油調敷於瘡口上先用川椒炒塩葱白三味醋漿水同煎一碗至日午時分將瘡浄洗全乾上藥一日一次大病不過二十餘日瘡自乾治瘰癧何首烏未泔浸一宿去皮竹刀切香白芷各等分右木杵臼搗為末三兩為率入沉香半兩麝香一錢匀一服二錢茶清下治瘰癧無問淺深已破未破並宜服之香附子去毛香白芷各一兩右為末每服一大錢米湯調下白湯亦得内消丸治癧子貝母二兩白藥子二兩右為細末麫糊為丸如桐子大每服三四十丸温水下皂針散出聖惠方治瘰癧皂針一斗不生子者惡實半觔右取皂針於盆中燒候火盛時撒惡實於火中燒候煙欲盡急以盆合之冷定取出為散每服三錢匕空心井華水調下數日利下惡物如膠􅄳利三五日只可吃軟粥飯内消牡蠣丸出聖濟總録治瘰癧牡蠣三兩煆過為末皂莢子二升取白水浸一宿右先將皂莢子以水三升煑令爛取出瓷盆内研為膏入牡蠣末為丸如桐子大每服十五丸空心温酒下日晚再服牡蠣散出仁存方治瘰癧牡蠣三兩黄泥固濟煆過研為末用甘草炙剉一兩右為散每服二錢匕空心臘茶清調下日三服仍用皂莢一挺去皮分作兩截一截使米醋半盞刷炙以醋乾為度一截焙乾烏頭二枚一炮一枚生炒糯米三十粒同為末再用醋半盞煎熱和匀成膏貼之治䑕癧猫兒頭一箇燒炙麝香一錢治癧生於頭項上交接名蛇盤癧冝早治之一名海菜圓出危氏方海藻菜蕎麦麫炒去殻白僵蚕微炒去絲嘴右等分為細末海藻菜旋研篩湯炮白梅取出内减半用麫糊為丸每服六七十丸食後臨臥米飲送下其毒自大便去若與淡菜連服尤好盖淡菜生於藻上亦治此病忌豆腐鷄羊酒麺日六五服治諸癧出本事方蜜陀僧十分青礬五分右為末乾掺更用好麺糊搜藥作膏貼之候瘡乾更上藥三次五次然後用白芨黄柏二味水調膏貼之已驗方出危氏方治瘰癧已作者烏鷄子七箇斑猫四十九箇去頭翅足右将鷄子一箇去頂用筯攪匀入斑猫七箇以紙糊盖於飯上蒸熟去斑猫食鷄子每食一箇煎生料五積散嚥下服不過四五已破者生肌未破者消散方内云皆去斑猫以小利下毒物為度大勝濟生三聖散楊氏四味方非惟人不敢服亦免小便秘痛之憂服利後尚有腹痛冷水調青靛或煎黄連水觧之又方冝法製皂角子湯下牡蠣丸桑白皮湯出聖濟總録治瘰癧肌中有根紫葛三分桑白皮剉硝石研如粉各二兩芍藥三分虎杖一分犀角鎊一分右將前五味麄搗篩每服五錢匕水一盞半煎至八分去滓入硝石半錢匕打匀空心晚後温酒下利病根不二散出聖濟録治瘰癧腫痛不問大人小兒皆治之牡蠣煆一兩蝟皮一枚生炒焙乾右為散每服二錢匕温酒調下白蠶散出聖濟總録治瘰癧白僵蚕一兩麒麟竭没藥各半兩右為散每服一錢半以麝香酒調下蝸牛丸出聖濟總録治瘰癧已破未破蝸牛半碗鷄蘇半觔右同研細水浸一宿蒸餅如桐子大每服十五丸瘡未破水下已破薄荷湯下日三牡蠣散聖濟總録治五腫瘰癧牡蠣煆研末連翹瓦上炒搗各一兩右為散每服一錢臥時無灰酒調下瘥後更服一兩永不發犀角丸療瘰癧犀角四分鎊升麻三分剉大黄六分剉牛蒡子八分𤣥參八分烏蛇一條炙去頭尾右為末蜜丸如桐子大每日至午後煎牛蒡湯下三五十丸又方龍骨八分牡蠣煆八分右為末酒下三錢匕日三度良大黄膏大黄六分剉附子四分炮細辛三分剉連翹四分去黒心巴豆一分右以苦酒浸一宿臘月猪膏煎三上三下去滓綿濾用傅瘡日三五度塗之良蛇犀散出危氏方治瘰癧白花蛇肉酒浸焙乾用四両犀角鎊一兩輕粉二錢半梹榔二錢半青橘皮去白焙半兩牽牛子一兩半内一兩炒半兩生右為散每服二錢匕别入膩粉一匕糯米飲調五更初服至午下取惡物如取未盡經半月再服未成瘡者内消成瘡者自乾忌一切油膩發風動氣一方用白牽牛四聖散出危氏方治瘰癧用前蛇犀散取轉後須用此補之海藻洗石决明煆𦍑活瞿麥穗各等分右為散每服二錢米湯調下日三服下清水盡為佳逐邪散出聖濟總録治瘰癧瘰癧者由風邪毒氣客於肌肉隨虛處毒停結為瘡如梅李大小兩三相連皮肉發熱病久則潰膿連屬而生久不愈則為癧瘻不拘逺年日近立效皂莢子不拘多少以絹袋盛厠中浸三七日取出淨洗安地坑中盖出毒一宿焙乾為度斑猫五十枚去頭足翅麺炒令黄為度右每服用皂子末二錢匕斑猫末一錢匕水銀粉二錢生鷄卵一枚取白傾盞内更入飯飲半盞并藥同攪匀四更初服至五更取下毒物或從小便中下如有些小澁痛不妨或患及五年只三服三年只二服二年只一服忌口只可燒塩吃五七日其方曽經驗甚有神效次日服生犀丸治瘰癧鷄子方出聖濟總録鷄子一枚膩粉一兩右将鷄子開破頭傾出黄取白和膩粉却入殻内濕紙盖頭濕紙五六重飯甑上蒸熟入新汲水浸冷去紙勿令水入十歲以上至五十以下分三服十嵗以下至七歲分十服俱用熟水下若病在膈上吐出惡物㵼出癧子後以訶黎勒皮少許搗末并好茶相和煎服一方熳火炒燋色住硃砂半兩研細大人五更米飲調下一錢良久腹痛㵼出根如棗核大便瘥小兒十五以下只可服半錢神效丸出德生堂治瘰癧左顧牡蠣燒灰香白芷各四兩甘草節右為細末糊為丸如桐子大每服五七十丸食後酒下茶清亦可為末酒調服亦可玉餅子出儒門事親治瘰癧一切惡瘡軟癤用白膠一兩磁器内鎔開去滓再於磁内鎔開將萆麻子六十四個作泥入膠内攪匀入小油半匙頭筯㸃水中試硬軟添减膠油如得所量瘡大小以緋帛攤膏藥貼一膏藥可治三五癤治瘰癧腫硬痛經久不瘥者出千金方用故鞋内毡替燒灰五匕和酒一升平旦向日服强之行湏臾吐出惡物愈又方出千金方用猫兒眼一両隂乾焼灰井花水服方過七日再用猫舌炙黄為末掺傅瘡上又方出千金方用狼屎𫝊之又方出千金方用五月五日取一切種種雜草取汁洗之又方出神效方將臘月猫屎用新瓦二片合在内外用塩泥固濟燒成灰以小油調塗瘡上一方用白猫屎燒灰敷之又方出儒門事親取小左蟠龍不拘多少為末陳米飯搗和為丸如桐子大每服三五十丸即用陳米湯下治漏瘡癧子出海上方用石槲葉新舊皆可用塩少許同槲葉嚼爛以口噙塩水洗瘡口淨次將嚼爛葉貼瘡口未破合再依前法用如患癧子瘡口濕者亦用塩少許嚼爛槲葉貼在瘡乾者亦可貼蝸牛散出危氏方治癧潰與未潰皆可貼用蝸牛不拘多少以索竹串瓦上晒乾燒灰存性為末入輕粉少許猪髓調用紙花量瘡大小貼之一方取七箇去肉入丁香七枚放殻内燒存性仍將肉同研成膏用綿花貼上瘰癧方用苦参四兩為末生牛膝和丸如桐子大食後温水下十丸日三􅒝麻法出衛生家寳方用􅒝麻子炒熟旋剥取仁自初一日吃一箇二日二箇増至十五日吃十五箇十六日吃十四箇至月末三十日只吃一個食空時下如是服一月足第二月不拘時候及不拘數目如吃菓子之類或三或五或七或十兩月即愈服藥人一生不可食豆食則脹殺人經驗方陳氏云先兄㓜年害癧時先公為杭州税官刀鑷工獻此方初未信之偶出北闗遇客二舟相差而過來者問其人所苦癧子如何徃者云食􅒝麻子而愈歸即製而服之兩月而瘥一法用麺麸炒去殻甆器收每服三十枚日三服即去其病根一方已破者研細醋調成膏貼之大有功效玉屑妙靈散出仁存方治瘰癧用桂府滑石二兩為末每服二錢米飲湯下經驗方陳氏云余在書局見吳伯駿憂其長女之病日侵樓大防訪其所親趙司户之母韓氏自言㓜子年十一歲患此項上可見者有七十枚或授此方且云是心包絡中熱湏用藥自小便出服覺小便澁急遂以意用琥珀研細濃煎燈心湯下良久旋下其物正如剥去皮蒲萄肉前後下十七枚而瘡盡平復其子今為臨安参軍真神方也吳女得此方遂愈余親見其事近小獲亦患此用之立愈小兒若此瘡始終兩年經醫不知其幾終不能去因服此藥旬日而愈後合此藥施人愈者十餘人有大聖之名真不虛傳治瘰癧不問有頭無頭者出仁存方用大蜘蛛五箇晒乾細研酥調如面脂日二度傅之須結網蜘蛛可用别的不冝用又方出仁存方用蝙蝠去腸胃新瓦上焙乾為末未破者水調攤紙上貼已破乾掺之燒灰散出危氏方治癧用大田螺并殻肉燒存性灰破者乾貼之未破者油調敷之治癧年久不愈者出危氏方用不蛀皂角子一百粒米醋一升硼砂二錢同煑醋盡炒令酥看所生癧子多少若生一箇即服一箇生十箇即每服十箇細嚼米飲湯下史氏小兒方酒煑夜臥含化三粒名破癧丹愽濟方用酒浸三日文武火熬盡酒為度每服夜含化三粒神與濟生方皂角子丸相似聖濟録有硼砂虛弱老人休服又方皂角散出危氏方用不蛀皂角不拘多少每三十條作一束以㯶櫚裹之縛定於溷泥浸一月取出却于長流水内再浸一月死水不能渲洗不可用去㯶櫚曬乾為末皂角末一兩入麝香半錢全蝎七箇研細匀一服一二錢酒或湯飲調下不過三次愈治瘰癧出瑞竹堂用乾姜不拘多少為末以生姜自然汁打麵糊和作劑子或丹為衣每日一次隨瘡大小入藥在内追膿盡生肉為度以瘡口合則已瘡口不歛用大黄末葱白汁調搽即愈乃日服十宣内托散二服瘡疼不破者用野菊根搗爛煎酒服仍將煎過菊根為末貼瘡自消不消瘡口破依煎藥劑追膿生肉歛口神效治瘰癧瘡方用全蝎四十九枚將牡蠣灰同桑柴灰先用炭火於上將前灰按一窩却把蝎放内埋用白紙一張鋪灰上用有黒㸃糯米二十四粒於紙上放一碗覆之蒸米黄取出見瘡放一粒即自愈凢人患瘡癧口破者活鯽魚一枚用本人小水浸死去腸肚用斑猫七箇去足頭等入魚肚中燒煆成灰入麝香少許在内即於瘡口乾掺再用黒膏貼之忌發物治癧子瘡班猫一兩糯米一升炒熟去頭翅取薄荷連翹荆芥穗各三兩為末用烏鷄子清同前四味藥調和為丸如桐子大每服二十丸茶清送下治癧子瘡用鯽魚一箇去腸不去鱗用萆麻仁一兩重頭皮上垢皮一撮搗如泥装入魚肚内用婦人䕶領油紙包定用線扎好文武火内煨至燋去紙再用文武火煨成至成灰魚後搗為末每服三錢酒一盞調服取下惡物愈又方用大河魨魚子不拘多少用蒻葉包褁隂乾為末如未破者乾掺治癧子瘡用松香不拘多少鎔成汁綿濾去滓入水九換水鎔濾取出碾細每服二錢穀雨前茶芽煎湯調下食後臨卧日進二服治瘰癧已未破用之神效舊破靴底洗浄晒乾燒灰一兩入輕粉三錢同乳香香油調如瘡已破出膿水不湏油調只乾傅以愈止又方用黄顙魚破開入􅒝麻子二三十箇在肚内以綿縛定於厠坑内放冬三月春秋二月夏一月取出洗浄用黄泥固濟文武火煨帶性爛研末香油調數次又治膝瘡治蛇盤癧瘡用黄鴨黄又謂金條魚一箇用線縛定放糞缸内過夜取出瓦上焙乾為末好香油調傅如不乾者去油敷治癧已破未破者皆可服用黄䑕子一箇全者入在瓶内塩泥固濟瓶頭用火煆過熟取出為細末每服二錢用無灰酒調下治諸瘰癧方用極簿紙剪成四寸片子以水銀膩粉各二錢鷄子一枚破之取白和膩等攤在四方紙上㸔藥多少攤得若干片數仍於甆碟中攤之藥匀為度於日内晒不得見火候八九分乾和紙揭起細剪丸成桐子大每片丸作五十丸以皂角子煎湯温服三丸日三空心日午臥服之三日下如鱉卵如爛杏小核之形者乃是病源不得動氣治䑕瘰癧出本事方用刺猬皮瓦上燥研為末入水銀粉乾敷治漏瘡出本事方用蛇床子不拘多少瓦上焙乾為末紙撚掿藥入瘡口治瘰癧腫毒痛用栗生嚼罨之治癧方出肘後方用鉛三兩鐡器中熬之久當有脚如黒灰取此灰和脂塗癧上仍以舊帛貼之數數去帛拭惡汁又貼如此半月許亦不痛不破瘡且自消為水永瘥陳藏器云黒錫寒治癭瘤鬼氣疰煉為末和木香𫝊風瘡腫惡毒治瘰癧用豺屎燒灰𫝊上治瘰癧疥瘡等疾用土㯽榔狀如梹榔放土穴中及階除間蓄之新者膩軟乃蟾蜍屎也細研油調塗之治瘰癧及癬用鱔魚取血塗之療瘰癧瘡方用槲白皮三觔細切水七升煑三升去滓真硃砂方七寸匕和汁一升旦向日服之行湏㬰吐惡出朝服良一方不用硃砂清凉散出聖濟總録治項下生瘰癧不問深久新有熱可服用龍膽㨂淨為散每服一錢匕酒或米飲調下食後夜臥服天隂不可服治癧已破者出𫝊信適用方用羯羊糞焙乾為末用油調塗如瘡濕乾掺又方用􅒝麻子研細醋調成膏貼之大有效治瘰癧梟炙方用梟一隻取肉依常法炙熟食後五味汁下治一應癧瘡初起用貝母為細末食前頓服酒送下療項瘰癧出肘後方將死小兒脚踏之即瘥何首烏散治瘰癧或不破至下胸前者皆治之用九真藤根其根如鷄卵大洗生嚼常服又取葉搗覆瘡上數服即止其藥久服黒髮延年或取其頭獲之九數者服之乃仙矣其葉如杏其根亦類癧子用之如神九真籐何首烏是也治瘰癧出千金方用白僵蚕治下篩水服五分匕日三服又方出仁存方用猫兒斡開口取涎磨解毒丸傅之又方出仁存方用狸頭一枚炙搗篩飲服方寸匕日二又方出聖惠方用狐頭灰傅之又方梧桐子葉􅌯上熯成灰絹羅蜜調傅乾即易之猫腦骨散出千金方治癧又治䑕瘰猫腦骨莽草右各等分為末入孔中升麻調經湯出東垣試效方治頦下或至頰下瘰癧此疾出足陽明胃之經中來若瘡深逺隂曲肉底是足少隂腎中來也乃戍傳癸腎是夫胃傳妻俱作塊子堅硬大小不等並皆治之或作丸服亦可升麻八錢炙葛根五錢剉草膽酒製炒黄芩刮去皮酒浸半兩用當歸尾三錢桔梗半兩連翹半兩黄蘗去皮酒炒二錢等用芍藥三錢知母酒炒一兩黄連去須五錢京三稜五錢碎切酒炒廣茂酒炒五錢甘草炙半兩生黄茋四錢右另秤一半作末蜜為丸如菉豆子大每服百丸或百五十丸一半多作㕮咀每服秤半兩若能食硬便可旋加至七八錢止水二盞先浸多半不用引子候煎至一盞去滓臥熱服脚高頭下而臥噙一口作十次嚥留一口在後送下丸子藥畢臥如常此制之緩也白藥散出衛生家寳方治瘰癧瘡右用白藥子不拘多少為末臨臥冷米飲或冷水調下一錢治癧子方龍腦一兩研薄荷一兩乾皂角一兩去皮酥塗炙焦黒去子用右為細末用塩豉一合醋浸軟同搗得所如硬添醋丸菉豆大每服十丸冷水下不計時日三四服忌醎甜動風等物龍泉散出東垣試方治項上瘰癧馬刀將先出瘡用四稜鐡環按定不令走移作口子油藥紙撚之慎勿令合了絶其瘡之源其効至速如瘡不破或本人不肯破更以此散塗瓦松粉研細龍泉粉各半兩炒半潤濕另研昆布去土三錢或五錢廣茂京三稜各半兩酒製剉炒右為細末煎熟水調塗之用此去疾尤速一二日一易之尅効散出衛生寳鑑方治癧子瘡斑猫四十九箇不去翅足官桂半錢粳米四十九粒炒赤小豆四十九粒硼砂一錢右研為細末初服一錢次服二錢次服三錢次服四錢煎樟栁根送下空心服小便淋瀝為效惡心嘔吐黄水無妨其瘰癧日日自消玉燭散治瘰癧自消和血通經當歸芍藥大黄甘草熟地黄芒硝黄芥川芎以上各等分右為麄末每服三錢水一盞生姜三片煎至七分去滓温服日進一服七八日效治瘰癧瞿麥穗海藻菜凌霄花北壁背隂虫别研皂角刺新者右各等分為末每服三錢米飲調下食後日二服麝粉散治癧子未破與破澁急赤痛萞麻子四十九粒去皮葵菜子半両輕粉半錢麝香别研一錢右為細末每服一錢温服酒調下日午臨臥各一服小便如米泔色不可再服止可服觧毒散解之觧毒散治癧子已曽宣積取毒了尚未退者冝服皂角子一百粒去皮炒黒色用連翹一兩半薄荷葉半兩晒乾甘草三錢半生半炙桔梗一錢右為細末每服一錢茶酒任意調下食後治䑕癧方信石入菉豆同研斑猫為末去翅足用右用麺糊為丸黄丹為衣用時打破以醋浸一宿其瘡先以艾炙次用此又方白术白茯苓生甘草黄耆當歸身酒洗梹榔白芷黒牽牛半生半熟蜜陀僧白芍藥以上各一兩右為細末糊為丸如芥子大小兒七丸大人十丸至十五丸燈心湯下忌葱菜油膩房色酒不妨忌使性氣孕婦不可服復元通氣散立效治癧瘡作吐右以乳香散煎甘草調服至安濟生名内托散引論甚詳治癧破膿水經年不安永類鈐方右用百十年第屋厨中壁上土為末入輕粉調傅半月瘡乾愈治瘰癧已破者華陀中藏經方右用鈆炒取灰滓研細以温鹽漿水洗淨貼之又方出肘後方治癧右用馬齒莧隂乾燒灰臘月猪脂和以煖泔洗浄瘡拭乾敷之日三治瘰癧出本草上右用蓼實子微炒碾為細末薄酒調二三錢服久則效治卒患瘰癧子不痛取桃樹皮貼上炙二七壮治瘰癧毒腫出本草方右以鐡􅅡及熟末凝塗之治瘰癧瘡出本草上右用胡桃瓤燒令黒未斷烟和松脂研敷瘡上治項邊癧子出本草上右以桃葉焼熏之治頷下瘰癧如梅李宜速消之出本草上右用海藻一觔酒二升浸數日稍稍飲之治瘰癧惡瘡蝕息肉白癜風出本草上右用馬骨燒為末淋汁先以物揩破瘡塗之治瘰癧出本草上右搗商陸根捻作餅子置癧上以艾炷於藥上灸三四壮乾熟易之治瘰癧出本草上七月七日出時收麻花五月五日収葉二件作炷子於癧上灸百壮治癧子出本草上用苦躭苖子煑汁服或生絞汁服之良躭苗子所在有之苖高三二尺結角如撮口袋中有子如紅硃俗人言躭發也治惡瘡瘰癧蝕息肉白馬骨黄連細辛牛膝鷄桑皮黄荆右各等分燒為灰淋汁塗之白馬骨江東以石榴葉短小對節者代之導引法養生方云箕踞以兩手從脚入據地曲脚加其上舉身九可用行氣治瘰癧乳癰普濟方卷二百九十一
