body:
  text: 普濟方卷三百四明周王朱橚撰刺瘡門竹木鍼刺附論夫竹木刺所傷若為患淺然入人肌肉久不得出則損動榮衛而作瘡或中風水則腫痛成膿淹留歳月未易治也刺傷之初宜速去之加以塗傅無致風水之孽方緑礬散出危氏方治竹草刺瘡發腫作疼傷時不曽出血盡被毒氣壅住痛不止夜卧不安初破時其瘡紫赤黒色復時起三五重皮是也緑礬半兩小便燒熱放礬於内候冷取出日乾丹參二錢半馬兠鈴根一錢半麝香一字右為末漿水洗凈瘡口上敷貼立效治被刺入肉或是針棘竹木等多日不出疼痛方出聖惠方人參一兩去蘆頭龍葵根一把凈洗取皮醋少許臘月猪脂一兩右和令勻每用時取少許傅瘡上其刺自出治手足卒中刺中水毒方出千金方韮藍青右搗置瘡上以火炙熱徹即愈蒜豆膏出聖濟總録治竹木針刺入肉不出惡瘡大蒜一顆巴豆七枚去皮右同研成膏傅之日一易皂莢灰出聖濟總録治竹木刺作膿貼皂莢一挺膽礬一分右燒作灰細研乾貼之治竹木刺在皮中不出者出千金方以薔薇灰水服方寸匕日三服十日刺出温酒調下亦得又方出千金方以鑿柄燒灰酒服二寸又方出千金方以頭垢塗之即出治刺在囱中不出方出千金方用牛膝根莖生者併搗以傅之即出瘡已合猶出也一方嚼牛膝根罨之即出或為末水調服亦得又方出千金方用白茅根燒末以膏和之亦治瘡因風致腫者一方搗白茅根傅之又方出千金方用鹿角燒末以水和塗之立出久者不過一夕一方用鹿腦厚傅之燥復易之即出又方出聖惠方用嚼白梅塗之其刺自出一方用烏梅又方出聖惠方嚼豉不以多少塗之良若治狐尿刺人者當㸔豉中有毛為度如無再傅之又方出千金方用温小便漬之妨入水大妙治諸竹木刺在肉者外科精要以蠐螬蟲研傅之立出治骨刺入肉不出者出仁存方用茱茰細嚼傅之骨當爛出治竹簽在脚腿或四肢皮膚内無緣可出一名白欓酒出百一選方用白欓樹根槌碎細研酒浸平服滓罨患處即出神妙治竹木針刺入肉及雜物鐵骨者以象牙屑水研傅之立出瘡即愈有人手中指為竹刺痛甚傅之愈一方以䑕腦和傅之又方出百一選方用烏牛糞爛搗水和罨傷處厚傅之佳曽有一庄僕脚上中刺不得出痛苦欲死以此藥黄昏敷上痛尤甚至四更其刺出遂安一方用猪脂和傅日三五上若不出重塗乃言不覺刺出時一云用乾羊屎末獨栗膏治竹木刺及針刺入内方見惡刺又方用真白魚鰾貼傷處然後以鰾膠燒存性灰用酒調服治竹木刺不出者爛研草麻以絹帛襯傷處然後𫝊藥時時㸔覷若覺刺出即㧞之恐藥太𦂳并好肉努出也一云不用絹襯出即拭之治針入肉不出用螻蛄腦搥爛塗上即出一方以螻蛄加塩打爛塗患立出又方用硫黄研細調貼以紙花貼定覺痒其針即出又方用雙杏仁搗爛以車脂調匀貼在針瘡上即出治竹木刺不出用九里光覆上莫不即出治竹刺簽脚不出方用苦薏菜搗細盫傅腫立消毒自散刺即出治菱角傷方右以生薑自然汁飲之絶妙取入肉刺用針挑傷處真桐油少許滴其上其刺突出鑷㧞之王不留行散治竹木刺久在肉中不出用王不留行五兩搗羅為散每服一錢匕温酒調下空腹日午夜卧各一服兼取根為末貼之或水服之亦得􅜰麥散治竹木刺不出用􅜰麥五兩搗羅為散每服一錢匕温酒調下空腹日午夜卧各一服或水煮亦得梔子套方治簽刺在爪甲中痛不可出用梔子殻半箇填車脂滿殻中套在指上如痛處稍痒刺自然出以鑷子取之甜指亦依此法牛蒡葉散治一切金木竹所傷用牛蒡葉惡實葉六七月收者風乾為散毎用量瘡口大小乾摻貼之不得犯别藥如經暑月蠅蟲下蛆在瘡上或因肌肉生合有成竅子者即用杏仁研成膏手撚作條子入在竅内其蛆蟲自出治鐵棘竹木諸刺在肉中不出及治針折入肉中出肘後方以䑕腦搗如膏厚塗則出治竹木刺入肉用蠮螉生研罯之糯米膏治竹木簽刺及金瘡水毒方見金瘡門金刃所傷類治八月九月中刺手足犯惡露腫多殺人以桑枝三條内煻灰中炮令極熱破㫁以頭柱瘡口上令熱盡即易之盡二條則瘡自爛仍取韮白傅瘡上以布帛急裹之若有腫者更作用薤白佳治刺傷中風疼腫出本草鯉魚目為灰研傅患處汗出即愈諸魚目皆可鮧魚目尤佳治竹木等物傷者用五𤓰龍擂細傅之即愈松脂方療刺入肉疼悶百理不瘥用松脂流出如細乳香傅瘡上以帛裹三五日當有根出不痛不痒不覺自落甚良治針入肉方刮指甲末同酸棗仁搗爛唾調塗上次日定出一方單用酸􅀥核燒為末服之治竹木刺在囱方取桞樹上木耳煎湯漸漸服之其刺自出又方用槐白皮煮湯漬之愈又方以醋二斤置於大口缾中取熱煻灰一升投之以刺處就缾口薫之勿令著醋即以衣擁缾口勿使氣泄又方用䓤白和塩搗傅之便出又方右爛嚼栗子黄傅之自出極効治木刺入肉中不出痛出本草取乾羊屎燒灰和猪脂調塗不覺自出治竹木刺以鐵花粉傅之治竹木入肉經久不出者取鯷魚白傅瘡四邊肉爛即出刺一名鰑生南海惡刺附狐尿刺附論夫惡刺蓋蛇虺毒氣經由草木水澤間有人染者忽似刺劄俄腫痛其肉潰爛若手足上着致指節墮落土人諳歴既多初覺刺時艾炙數壯十愈七八炙弗愈者宜速以藥傅之夫狐尿刺者云是野狐尿棘刺頭上人犯之則中多於人手指足指腫焮熱有端居不出而着此毒者則不必是狐尿刺也盖惡毒氣爾故方亦云惡刺毒也方龍葵膏出聖惠方治惡刺龍葵根莨菪子胡荽子䑕糞杏仁湯浸去皮尖雙仁麸炒豉各半兩獨顆蒜半兩胡鷰窠半兩右用􅄴水飯相和爛搗醋調封之每日一換經五七次差治狐尿刺多時不差方出聖恵方石䑕一枚白歛羊糞􅌝蔞根各半両右搗如膏封裹瘡上一伏時其刺自出治惡刺方出聖惠方狐骨灰一分生蜜少許胡䓤少許右同研之以醋麺紙封三日其刺自出矣葱蒲膏出聖恵方治惡刺以葱白一握蒲公草五兩豉一合搗爛將醋麵紙封貼即出治惡刺方出千金方李葉􅀥葉右搗絞取汁㸃上即効野狐膏出聖惠方治惡刺用雄野狐脣爛搗和塩封之蒼耳洗方出聖惠方治惡刺用蒼耳搗汁洗之木蟲塗方出聖惠方治惡刺取木中蟲和醋研封之無心草塗方出聖惠方治惡刺用無心草根爛搗醋和封之蔓菁牛乳傅方出聖惠方治惡刺以五月五日收蔓青子旋搗末以烏牛乳和調𫝊之人乳亦得黑豆汁漬方出聖惠方治惡刺以濃煮黑豆汁漬之燕麥傅方出聖惠方治惡刺搗燕麥二三兩傅之治惡刺方出千金方以苦瓠開口内小兒尿煮兩三沸浸病上又方出聖惠方以莨菪根水煮浸之冷復易之治惡刺并狐尿刺方出千金方以烏呌驢尿漬之又方出千金方以熱蠟内瘡中新瘡亦善又以烟薫之令汁出即便愈又方右鳧公英草摘取根韮白汁塗之惟多塗為佳以瘥為止孫思邈云余以貞觀五年七月十五日夜左手中指背觸着庭樹至曉遂患病不可忍經十日痛日深瘡日髙大色如熟小豆色嘗聞長者論有此方試復為之手下愈痛即除瘡即瘥不過十日尋得平復此大神効故疏之蜀人名耳瘢菜闗中名茍乳奴茍切一方用蒲公草治惡刺出聖惠方取黑駮馬尿熱浸當有蟲出為驗一方用黑馬尿熱漬當愈數洗之一方用温白馬尿漬之又方出聖惠方取狐屎燒灰臘月猪膏和封孔立愈治蛇骨刺人毒痛以鐵精粉如大豆以管吹瘡内治烏雄雞刺在肉中不出者及治竹木針刺用烏雞尾二七莖燒作灰以乳男子奶汁和封瘡刺當出桂蠟丸出聖濟總錄治惡刺入肉用桂去粗皮搗為末鎔黄蠟丸㸔瘡大小置瘡内濕紙三五重搭蓋以火熁候藥丸鎔入肉其刺自出如無刺所傷者尤見愈速獨栗膏出聖濟總錄治惡刺塗方用獨顆栗不拘多少爛嚼塗之裹以帛若有刺自出又方取未煮餅油紙以麵和油調湏㬰着瘡上即愈治惡刺出聖惠方以砒霜細研和膠清塗之又方出聖惠方用樗根白皮剉一斤米泔煮三二十沸放温淋孔中良治狐尿刺人日夜燥痛不識睡卧方用蒲公草葉根搗絞取白汁頻塗之瘥又方用杏仁細研煮一兩沸乗熱以侵螫處數數易之治狐尿刺人疼痛不可忍方用生􅌝蔞根香豉等分擣作餅傅上乾即易之治狐尿刺多時不出者取牛蒡根及薤根搗傅之其刺自出又方取蛇脱皮貼之自出治惡刺用􅔈砂和膠清消貼其上即㧞出刺治狐尿棘刺人腫痛欲死用打破雞子傅之瘥治狐尿瘡以蓼葉搗傅之玳瑁散治狐尿瘡用麯末和獨頭蒜杵如玳瑁簪頭内瘡孔中蟲出愈治狐刺用土中饒磁片上色細白向陽日色所照者不以多少背隂者不可使不用底足揩去土不湏洗以黄泥作一窩子盛磁片在内復以黄泥固濟成團於竈内以木柴燒令通紅只湏於飯鍋下燒候飯熟已通紅矣取出放浄地上候冷打開去泥将磁片刮令極浄搗或研為細末然後入乳鉢研如粉無聲乃止每用一少許摻瘡上即愈凡狐刺多因手足間被物簽觸損因而成瘡痛不可忍甚至於墮指仍有二種雄狐刺只一箇瘡頭母狐刺七箇瘡頭逐旋發出其瘡頭内黄水出不止向日視之瘡頭及四邊若有絲網其上瘡内亦如亂絲痛楚手不可近如其間有刺者是也用藥時先口含温塩湯洗瘡以軟帛裛乾挑藥在瘡口即安其餘瘡不湏貼也滁州李直學嘗施此藥所治已千百人矣研時湏用鐃鉢若使石槌鉢即反被藥研下石末不可傅貼也治狐刺用爐中炭灰乾罨在腫處上赤以好米醋澆之二物多用不妨無力即易之赤退腫散立可見効肘後療狐尿棘刺人腫痛欲死方用熱桑柴灰汁漬之冷復易永瘥集驗狐尿刺方用熱魚汁灌瘡中治患惡刺取鷰窩末以醋和如泥裹之三兩日易便瘥治惡刺瘡及浸滛瘡達身至心者死以胡鷰窠中草燒為灰傅之治狐刺瘡用蟻宂中出土取七枚如粒和醋搽之治狐尿刺瘡取露蜂房煮湯洗之治狐刺毒腫用狐𤓰根搗傅治剝馬被骨刺破中毒欲死取剝馬腹中糞及馬尿洗以糞傅之大驗絞糞汁飲之効治狐刺瘡以麻鞋網䋲如􅀥大婦人内衣有血者手大釣頭棘針二七枚二物並燒作灰以猪脂調傅瘡上出蟲普濟方卷三百四
