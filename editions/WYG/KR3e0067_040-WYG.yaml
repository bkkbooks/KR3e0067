body:
  text: 普濟方卷四十明周王朱橚撰大臟腑門大便不禁論夫大腸為傳導之官掌化糟粕魄門為之候若其臟寒氣虚不能收斂致糟粕無所制約故遺失不時治之宜澀故津液方論所謂澀可去脫是也方陳橘丸治大便不禁腹内㽲痛陳橘末炒白茯苓去黑皮黄連去鬚炒黄栢去粗皮炙乾薑炮附子炮去皮臍龍骨各一両赤石脂甘草炙剉人參當歸切焙各一両右為末煉蜜丸梧桐子大每服十五六丸空心米飲下日再服救陽丸治大便不禁手足厥冷面色青白吳茱茰湯浸焙乾乾薑炮赤石脂蜀椒炒出汗硫黄飛研右等分為末稀糊為丸梧桐子大每服十五丸米飲下空心食前漸加丸數鹽湯亦得龍骨湯治大便不禁真氣羸弱龍骨阿膠炙燥乾薑炮黄連去鬚炒各一兩粳米三合炒熟附子炮去皮臍甘草炙剉黄芩去黑心芍藥各二分石榴一枚大者切另搗入右㕮咀每服五錢水盞半煎一盞去滓空心温服日再地榆丸治大便不禁地榆一兩白龍骨赤石脂没石子熟艾去梗炒橡實殻炒各半両黄栢去粗皮炙三分右為末煉蜜丸梧桐子大每服三十丸空心米飲下日再附子湯治下焦虚寒大便不禁附子炮去皮臍半兩黄連去鬚炒二兩阿膠炙燥三分甘草炙剉乾薑炮各半兩赤石脂厚朴去粗皮薑汁炙各一兩右㕮咀每服五錢水盞半煎一盞去滓空心温服日再石榴皮湯治虚寒客於下焦腸滑洞洩困極欲死酸石榴皮炒乾薑炮各一兩黄栢去粗皮炙阿膠炙燥各三分右㕮咀每服四錢水一盞煎四分去滓空心温服或無黄栢用黄連亦得厚朴荳䓻湯治大便不禁肉豆䓻去殻炮半兩龍骨白术剉炒三分厚朴去粗皮薑汁炙剉一兩右㕮咀每服五錢水盞半生薑三片煎一盞去滓空心温服朝真丸治虚損洩瀉大便失禁硫黄一両研飛青鹽一錢研晉礬熬枯研一兩右研勻水浸炊餅丸菉豆大每服十五丸至二十丸温酒下空心食前或用丹砂為衣亦得福建丸治大便不禁并腸鳴附子去皮臍剉一兩厚朴去麤皮二兩同附子用生薑汁浸一宿於瓦器内炒右為末用酒煮陳橘末為糊丸梧桐子大每服十五丸至二十丸生薑鹽湯下空心食前服石硫黄湯治虚冷大便不禁氣脱神昏石硫黄明者細研紫笋茶焙乾研末各一兩右水一盞下硫黄末半錢匕茶一錢匕煎六分去滓温服不拘時日三大理中丸出危氏方治大便虚滑不禁每一丸用平胃散一貼煎化服便止加鹽梅煎尤妙人參白术乾薑甘草各等分右為末煉蜜丸如指頭大脫肛論夫肛門者主大行道肺大腸候也號為通事令史重十二兩長一尺三寸廣二寸三分應十二時若臟腸熱則肛門閉塞大行不通或腫縮入生瘡若臟腑寒則肛門開大行洞瀉肛門凸出良乆乃入熱則通之寒則補之虚實和平依經調理之四十八難曰病之虚實出者為虚入者為實肛門之脫虚也葢實則温温則内氣充而有所蓄虚則寒寒則内氣餒而不能收而况大腸之厚薄膏脂之肥瘠亦視夫内氣之虚耳大凡肛脱須以温湯洗令和軟然後摩挲而入治法以治斂行之其有産婦用力過多及小兒呌號努氣久痢不止風邪所襲亦有此證凡腸頭作癢即是中有蟲生取苦棟根煎湯薫洗仍以乾艾生薑煎服其脫肛腸風痔瘻者登溷不可用舊紙若包裹湯藥雜物尤不可用纔有一毫染汚其間立見痛腫如此急以温湯滌之患在肛腸登溷後須用一洗下痢脫肛者因大腸虚弱冷氣偃之至圊不能便極力於下肛門脫出故謂之脫肛温其臟則愈古方有坐湯温熨之藥皆良法也脫肛一證氣聚不散也裏急而不得出外脹而不得入先以枳殻散作劑又以枳殻燒灰存性細末摻傅或津唾調傅氣散則腫消矣仍用生薑汁調五苓散如膏入新水研散略煎吞黄連阿膠丸此論肛門挾熱而腫脹也其或腸中虚薄不收則理中湯釣腸丸養臓湯輩主之烏鰂骨木賊草傅之方猪膽散出千金方治大腸寒應肛門寒則洞洩肛門滯出猪膽一斤熬令燥黄連阿膠芎藭各二兩烏梅肉五兩艾葉一兩右為末每服二錢温酒調下白米飲亦可食前日再服金鳳膏治痔瘡破者脫肛鮮魚肝一個龍腦一錢麝香半錢飛礬半錢黄連末炒加些少右為末用鮮魚膽調塗五六次立効鱉甲丸出聖惠方治脫肛皆因乆痢大腸虚冷所致肛門為大腸之候大腸傷於寒下痢用力其氣不逆則肛門脫出雖一年下痢脫肛門不收腹中冷可安鱉甲醋炙一方用鱉頭蝟皮炙桂心各一兩磁石二兩煅醋淬右為細末蜜丸菉豆大米飲下五丸量大小加减服一方為散食前粥飲服治脫肛神効方蔓陁羅花子蓮殻一對橡碗十六個右搗碎水煎三五沸入朴硝熱洗其肛自上香膽丸方見痔瘘門諸痔類治痔漏脫肛荆芥散出直指方治脫肛大香附荆芥穗各半両縮砂二錢半右為末每服三錢食前新水煎數沸即服小兒通用一方無縮砂洗縮砂湯出指直方治大腸虚而挾熱脫肛紅腫縮砂黄連木賊各等分右為末每服二錢米飲調下治大腸虚冷大便後脫肛洞出出聖惠方鱉頭一枚塗酥炙令焦鐡精一兩研莨菪子一兩水淘去浮者水浸毛出候乾炒右為末每服二錢食前粥飲下肛上更炙故麻鞋底熨之治大便風冷脫肛兼腰痛不可忍出十便良方一名三神丹石灰白礬黄丹各一兩右研以油和為餅子新瓦上燒令通赤放冷細研又和又燒如此三度為末入麝香末一分更研勻每服一錢食前粥飲艾葉調下治脫肛不差出聖惠方鱉頭一枚煉灰蒲黄半兩白蘞一兩右為末傅於肛上按抑令入日三四度差治脫肛瀉血不止出聖惠方石耳五兩炒白礬一兩燒灰蜜陀僧五錢右為末水浸蒸餅丸梧桐子大每服二十丸食前粥飲下蝟皮散一名鱉頭散出千金方治肛門脫出或因用力太過或因洞泄不收磁石四兩桂心一尺蝟皮一枚右為末飲服方寸匕日一服即縮慎舉重及急帶衣斷房室周年乃佳治女人隂脫出外用生鱉引出頭一枚齊甲裁之炙焦搗末為四味亦治脫肛仍用破草鞋底炙上面熨按入壁土散出千金方治肛門滯出故屋東壁土一升碎皂莢三挺各長一尺二寸右洗搗土為末挹粉肛頭出處次取皂莢炙暖更逓熨取入即止又方出千金方治脫肛鱉頭故敗麻履底各一枚右將鱉頭燒為末傅肛門頭次將履底按入即不出矣治脫肛出醫方大成一名槐花散槐花槐角右等分炒香黄為末用羊血蘸藥炙熱食以酒送下或云以猪脂去皮蘸藥炙服治大人小兒脫肛不收出經驗良方一名香荆散荆芥皂角各等分右為末煎湯洗了用鐵汁塗即入亦治痔及治婦人子宫出亦如此用治大人小兒腸頭出出經驗良方百草霜五倍子各等分右為末醋熬成膏子以鵝毛傅上即入蛇床散出經驗良方治脫肛蛇床子甘草各一兩右為末熟湯調服一錢日進三服又方出永類鈴方白鷄冠花防風各等分右為末糊丸空心米飲下百丸荆芥散方見本門腸風下血類治脫肛香茸丸一名麝香丸方見洩痢門腸垢類治脫肛治脫肛方見本門腸風下血類治腸風臟毒方治積痢脫肛出千金方用枳實石礬磨令滑鑚孔安柄蜜塗炙令暖更易熨肛取縮止治赤白痢脫肛用木𤓰一握百藥煎一塊陳白梅三個以水一碗煎至半碗無時服治大腸虚冷脫肛及痢後脫肛出聖惠方乾蝸牛子一百枚炒為末磁石二両搗碎淘去赤汁右水一大盞煎磁石五錢至五分去滓調蝸牛子末一錢服之日三服一方為末每服二錢匕空心米飲調下日午再服治脫肛瀉血不止出聖惠方附子一兩燒熟地上用盞葢出火毒桑黄一兩炙右為末煉蜜丸梧桐子大每服二十丸食前粥飲下治脫肛不縮出聖惠方石榴皮茜乾各一握右㕮咀好酒一大盞煎至七分去滓温服治脫肛不收赤石脂白礬半生半熟右擦洗傅之用青物托進肛門治腸頭挺出用蝦蟆皮一片燒傅出處一方瓶内燒薫治肛門滯出出千金方用炙故麻履底按令入頻按入永差治肛門脫出出千金方用女萎一升以器中燒坐上薫之即入治脫肛腸出熱痛出千金方一名蒲黄膏用蒲黄二兩以猪脂和傅肛上内之二三度即愈以粉塗之良治腸隨肛出轉乆不可收入出經驗良方用生栝蔞為粉以猪脂膏温塗隨手抑按自得縮入又方生搗汁温服以猪肉汁洗手挼之令暖自得入一方用栝蔞煎湯洗之治脫肛歴年不愈出聖惠方用生鐡五斤水一斗煮取五升出鐵以汁洗日再無不差并燒礬石粉傅之亦良木賊散出指直方治脫肛不熱用木賊不拘多少燒存性為末摻肛門上按之治脫肛出經驗良方用磨刀水下鐵漿以毛翎塗少許於肛門上却以磨石煎湯空心服半盞許一方用磨刀水洗又方出經驗良方用貼水荷葉焙為細末好酒調下二錢又將荷葉一片將藥末二錢在禁上令人在葉上坐即入又方出經驗良方用淡竹葉一把煎濃洗立效治痔漏脫肛出肘後方用虎脛骨兩節重二兩酥塗炙令赤搗末水浸蒸餅為丸如梧桐子大侵晨温酒服二十丸隔晩先利過大腸然後服一方治肛門凸出燒虎骨末水服方寸七日三服良治大腸脫肛用草果去殻搥碎解頭上髻髮開留此藥於腦上髻髪中少縛定待腸頭收上門邊即急去了藥若婦人産後衣不下用此藥去殻搥碎縛兩脚心即下火炮湯用苧根不拘多少搗爛煎湯薫洗治脫肛痔瘡等證用葱鹽湯洗之却將薄荷煎細研葱白滴汁去滓入蜜調煎貼患處用油單紙傅上貼之坐卧亦可鱉頭散出千金方治脫肛大腸乆積虚冷每因大便脫肛收不能入用鱉頭漫炙焦黄自死者尤佳為末塗傅腸頭用軟紙襯輕輕按入仍以方寸匕食前米飲調下一方如不愈以鱉血塗之又方燒令煙絶杵末傅肛上手按援之一方用鞋底按入即不出磁石散出直指方治脫肛用磁石半兩蘸入煎沸醋中凢七次為末每服一錢空心米飲調下酒服亦可次用鐵片燒通紅放冷葱根煎湯洗淨托上鐵粉散出直指方治大腸本虚風毒客熱乘之脫肛紅腫用鐡粉研細入白歛末夾和傅之即按入又方鐡粉以少許摻之按入即愈橡斗膏治脫肛用橡子燒存性猪脂和傅按之石灰方治大腸積冷乆年脫肛及治每因大便脫肛援不入用石灰炒熱以帛包裹肛坐其上冷又别換仍以海螵蛸末傅之文蛤散治大腸寒肛門脫出不收用力過多及小兒呌喚乆痢後皆便脫肛悉治之用五倍子不拘多少為末水煎汁浸洗更入白礬蛇床子尤佳洗後用赤石脂為末以少許摻在芭蕉上頻用托入或長尺餘者以兩床相接中空一尺以磁瓶盛藥水滿架起與床平令病者仰卧以其所脫浸在瓶中換藥逐日如此浸縮盡為度用海螵蛸為末塗肛上亦可一方不用蛇床子療大人小兒脫肛每天冷食即暴痢不止肛則下脫乆療不瘥者用紫蓳草春間收紫蓳草花二斤曝乾搗為末加磁石末七兩相和研細塗肛上内入即使人噀冷水於面上吸入腸中每日一塗藥噀面不過六七度即差又以熱酒半斤和散一方寸匕空腹服之日再漸加至二方寸匕以知為度若五歳以下小兒即以半杏子許散和酒令服之亦佳忌生冷陳倉米芎治脫肛用防己實焙乾為末如茶法煎服又方出直指方用縁桑蝟燒末和猪膏傅之立縮此蝟全似蝸牛黄小兩後好縁葉一方亦可乾作末敷之治大腸脫肛乆積虚冷每因大便脫肛收不得用蝸牛有小毒生研取服止消渴一方燒灰猪脂和傅則縮治下部脫肛用莨菪子焦炒碾細末傅之紫蕺膏出醫方大成治臟熱肛門脫出用紫背蕺一大握又名魚腥草擂爛如泥先用朴硝水洗净肛門用芭蕉葉托入却用藥於臀下貼坐自然收入治腸隨肛出用羊脂傅上以鐵精粉傅羊脂上乃以布裹指炙令温按内仍酒服磁石末一七日三服之獨虎散出直指方治脫肛不收用五倍子半兩末井水三碗入磁瓶内慢火煎半續入朴硝荆芥穗各一錢乘熱薫洗仍以五倍子末傅之治脫肛用龜血灰治之一方用鱉治肛出糞門三五寸者出德生堂方用陳茶熬水温洗去穢垢却用田螺大者二三枚水中養一日去浄泥用黄連末少許揭起螺靨入藥末田螺内候化成水却用雞翎蘸藥掃上再以軟帛托入肛門内自然再不舉發治大腸風冷下血不止脫肛疼痛出聖惠方用野狸一頭以大磁瓶一個可容得者内於瓶中以厚泥固臍候乾以大火燒之纔及煙盡住火候冷取出入麝香末半兩研令勻於磁器中收之每於食前温粥飲調下二錢治脫肛不縮出聖惠方用生韭一斤細切以酥拌炒令熟分為兩處以軟帛裹更互熨之冷即再易以入為度又方出聖惠方用五花構葉不拘多少隂乾為末每服二錢食前粥飲下兼塗腸頭亦差又方出聖惠方用蛇床子一兩炒為末貼之治脫肛腸出出經驗良方用黄連研細末冷水調常塗腸頭治卒大便脫肛出肘後方用豆醬清合酒塗之釣腸丸出聖惠方治大腸虚冷脫肛不收及腸風諸症牛蒡子赤芍藥防風荆芥穗甘草當歸各等分右先以獖猪大腸頭長一尺二寸者兩三枚於沙鍋内用水四五盞煮爛熟去腸頭入前藥煎四五沸取汁薫洗數次令肛軟却以黒芝蔴燒煙薫之硇砂丸治冷熱不和下部痛裏急後重虚滑或結澁腸頭脫出硇砂飛一兩硫黄研一分白礬研一分以上三味同研勻用萊菔一枚重五兩者割開留元葢子剜作坑子填上件末在内蓋好用竹簽定以麵劑十五兩裹開地坑一所方一尺鋪馬糞厚三寸安麵毬在上更以馬糞葢之上發火燒候通黒即上去麵將萊菔藥搗爛如膏更入後藥肉豆蔲去殻葫蘆把各半兩訶梨勒皮附子蘹香子一分炒補骨脂炒各一兩右六味為末通前藥膏同搗滴少好酒和納令勻丸如梧桐子大每服十五丸至二十丸空心食前温米飲下赤石脂散治大腸風冷乆痢不瘥脫肛赤石脂龍骨白石脂各一兩當歸半兩剉炒蓬莪荗肉豆蔲去殻黄連去鬚炒白芍藥厚朴各半兩去粗皮薑汁炙右為散每服二錢粥飲食前調下卷栢散治乆病痢不瘥脫肛卷栢一兩訶梨勒煨用皮黄連去鬚炒縮砂去皮肉豆蔲去殻蓽撥白石脂各一兩右為末每服二錢粥飲食前下地榆芍藥湯治洩痢膿血乃至脫肛蒼术八兩地榆二兩卷栢三兩芍藥三兩右㕮咀每服一兩水一大盞半煎一盞温服龍骨丸治諸痢疾脫肛久不止龍骨艾葉炒各一兩鱉頭骨二枚塗醋炙令焦黄右為散每服二錢粥飲食前調下黒聖散治瀉痢日久脫肛疼痛用大蜘蛛一枚以瓠子葉兩重裹以線繫定合子内燒令黒色勿太過細研入黄丹少許研勻每先用白礬葱椒煎洗湯浴拭乾後將藥摻在軟帛上將手掌按托上肛頭即不下歳十月樞僕院判白文舉老僕面塵土長跪曰病脫肛日久服藥未驗近日復以赤白膿痢作裏急後重白多赤少不任其苦予乃曰此非肉食膏粱必多蔬食或胃氣不節其寒一也衣葢或薄寒侵形體其寒二也况天氣應時其寒三也不禁而腸頭脫下者寒也滑也真氣不禁固也形質不收乃血脫也此乃寒滑氣泄不固故形質下脫也當療之以澀去其脫而除其滑㣲加酸味固氣以大熱之劑而除寒補陽以補氣之藥升益氣名之曰訶子皮散訶子皮散出東垣蘭室方御米殻去花蕚蜜炒半錢訶子煨去核七分乾薑炮六分橘皮半錢右為末分作二服每服水二盞煎至一盞和滓温服空心一服减半再服痊愈治腸頭出出本草用胡荽子搗醋煮熨腸頭出甚妙治脫肛出本草用甑帶煮汁服治卒脫肛出本草燒蜘蛛為末傅肛上治脫肛出本草以年久筆頭燒灰水服之治肛帶出出本草切胡荽子一升燒以煙薫肛即入治脫肛用益母草炙令香浸酒服之益母草生山谷水澤葉如澤蘭莖赤高二三尺是也肛門有蟲怕癢論夫肛門有蟲者由胃弱腸虚而蟯蟲下乘之也肛門為大腸候蟯蟲者九蟲内之一蟲也在胃間若臟腑氣實則蟲不妄動胃弱腸虚則蟯蟲乘之重者成瘡或蟲從肛門溢出輕者慢蝕肛但癢也蜣蜋丸出聖惠方治肛門癢或出膿血有蟲傍生孔竅内蜣蜋七枚五月五日收去足翅炙為末新牛糞半兩好肥牛肉一兩炒令香右搗如膏丸如蓮子大炙令熱以新綿薄裹内下部中半日少喫飯腹中有蟲俱出三日五度永差又方出聖惠方白蒺藜五錢炒硫黄一分細研猪牙皂角一兩燒灰右為末入硫黄同研勻用葱薤汁丸如蓮子大綿裹一丸内下部中日二三易又方出聖惠丸雄黄胡粉各半兩右研以􅀥肉丸如蓮子大以綿裹一丸内下部中日再易之肛門赤痛論夫肛門大腸之候其氣虚為風熱所乘熱氣擊搏故令肛門赤痛也㯽榔散出聖惠方治大腸風壅氣毒攻肛門赤腫疼痛檳榔川大黄炙各一兩沈香赤芍藥防風去义芎藭犀角屑甘草炙剉各半兩枳殻三分麩炒去穰右㕮咀每服四錢水一盞煎六分去滓食前温服牛蒡子散出聖惠方治大腸風毒肛門赤痛令人煩熱坐卧不安牛蒡子炒川大黄剉炒各一兩黄耆剉白蒺藜炒去刺枳殻三分麩炒去穰當歸剉炒芎藭甘草炙剉各半兩右㕮咀每服四錢水一盞煎至六分去滓食前温服大黄散出聖惠方治大腸風熱所攻肛門赤腫川大黄剉炒黄芩黄耆𤣥參各一兩丹參三分赤芍藥半兩枳殻一兩麩炒去穰右為末每服二錢食前粥飲調下治大腸風壅氣毒攻肛門赤腫疼痛出聖惠方枳殻麩炒去穰芎藭沈香各半兩川朴硝一兩半川大黄一兩剉炒甘草一兩炙炒右為末每服二錢食前清粥飲調下又方出聖惠方皂莢樹白皮一兩塗醋炙甘草半兩剉炙枳殻二分麩炒去穰右為末每服二錢食前粥飲調下治糓道􅉶赤腫痛又痒方用杏仁杵作膏傅之一方􅆈令黄搗以綿裹塞之又方出本草用雄黄塗在上良治肛門腫痛用鱉子去殻取肉四五枚研如泥安新磁器或木盆内以沸湯衝動薫洗以少許塗患處又方用枳殻燒薫煎枳殻洗服枳殻末為上藥地榆散治肛門痛痒或腫地榆荆芥穗蛇床子蒴藋苦參各等分右㕮咀每用藥一匙水一椀煎二三沸去滓通手避風處洗患處三黄丸治肛門腫痛或下鮮血黄連黄芩大黄各等分右為末煉蜜丸梧桐子大每服四十丸熟水吞下普濟方卷四十
