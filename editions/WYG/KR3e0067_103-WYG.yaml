盛之頓在鍋隔湯􅆈煎令薑汁盡焙乾為末毎服二錢生薑甘草少許煎湯調下或用糕糊小丸薑湯下三十丸入煆白礬少許同丸亦得一方出肘後方治風痰欝金一分藜蘆十分右各為末和令勻每服一匙用温漿一盞先以少漿水調下餘者水𠻳口都服便以食壓之𤓰蒂散出肘後方吐法宜用辯上部脉有下部脉無上部脉有下部脉無其人當吐不吐者死何謂下部無脉此所謂木欝也飲食過飽填塞胷中胷中者太陰之分野經云氣口反大于人迎三部食傷太陰故曰木欝逹之吐者是也𤓰蒂赤小豆各等分右為細末每服一錢温漿水調下以吐為度若其兩手尺脉絶無不宜便用此藥恐損元氣令人有氣不復止是胷中窒塞悶亂不通以指探去之如不得吐者以物探去之得吐則已如食不去用此藥去之消痰丸出御藥院方治風勝痰實喘滿𠻳風氣上攻黒牽牛四兩半生半炒槐角子青皮去白各半兩半夏湯洗七次焙乾一兩皂角不蛀肥者去皮弦塗酥炙黄色二兩右件五味為細末生薑麫糊和如小豆大毎服十五丸至二十丸食後生薑湯下治風痰出本草取白殭蚕七箇直者細研以薑汁一茶脚温水調灌之𤓰蒂散出經騐良方治風涎暴作氣塞倒卧或有涎用諸藥化不下者用甜𤓰蒂一名苦丁香晒乾為細末毎用一二錢七加輕粉一七以水半合調勻灌之候良久涎自出如涎未出含砂糖一塊下咽涎即出一方不加輕粉如吐多困即嚥麝香湯一盞即止中金丸出王氏慱濟方治風化痰辟邪養正益津液潤肌膚大進飲食延年補氣右用蒼术不拘多少以長流水浸七日逐日一度换仍以竹刀旋削去粗皮切作片别用無灰酒浸一宿酒可于术上浮二指許候滲酒盡焙乾為細末煉蜜和丸如梧桐子大毎服早辰茶酒任下三二十丸忌桃李雀鴿白附子散治大人小兒虚風呵欠止吐化痰白附子炮天南星炮各半兩黒附子炮去皮臍一分右為細末毎服二錢水一盞薑五片慢火煎六分不拘時小兒一錢水一盞薑三片慢火煎不住手攪勻至小半盞分為三服漢防己散治風化痰利胷膈除頭目旋眩令思飲食漢防己一兩羚羊角屑人參去蘆頭桂心芎藭各三分半夏半兩湯洗七遍去滑赤茯苓三分旋覆花防風去蘆頭白术細辛麥門冬去心各半兩枳殻三分麩炒㣲黄甘草半兩炙㣲赤剉赤芍藥羌活各三分右為散毎服三錢水一中盞入生薑半分煎至六分去滓不計時候温服白术丸主除風痰積聚胃中冷氣秋發動令人嘔吐食或吐清水飲食减少不作肌膚白术五分白芷三分乾薑石斛各六分五味子細辛橘皮厚朴炙桂心防風茯苓甘草各四分右搗篩蜜和丸如梧桐子大毎服十丸飲下日二加至二十丸忌桃李雀肉生葱海藻菘菜酢物一方有人參五分半夏利膈丸出醫方集成治風痰壅甚頭疼目眩咽膈不利涕唾稠粘胷中煩滿酒癖停飲嘔逆惡心脇下急痛腸中水聲神思昏憒心忪靣熱止𠻳化痰防風去蘆頭半夏湯洗七遍去滑各一兩右為末以白蜜和搗百餘杵丸如梧桐子大毎服不計時候以荆芥薄荷湯下十丸秦芁散出聖惠方治風痰心昏恍惚不能言語痰涎流溢秦芁去苖一兩常山一兩半人參不去蘆頭羚羊角屑甘草生各一兩右為散毎服三錢以水一中盞入大麻子五十粒煎至七分去滓空心温服良久當吐未吐再服生朱丹出御藥院方治諸風痰甚頭痛目眩旋運欲倒肺氣欝滯胷膈不利嘔噦惡心恍惚徤忘頸項强直偏正頭痛靣目浮腫筋脉拘急涕唾稠粘咽喉不利常服清神爽氣白附子炮製去皮臍石膏燒通紅放冷各半觔龍腦一匙朱砂一兩二錢半為衣右為細末燒粟米飯為丸如小豆大朱砂為衣毎服三十丸食後茶酒任下祛涎丸出楊氏家藏方治風痰上攻頭目昏痛旋運欲倒嘔噦惡心恍惚徤忘神思昏憒肢體煩疼頸項拘急頭靣腫痒手足難舉或時麻痺天南星四兩半夏九兩半白附子二兩六錢川烏頭七錢半右並生為末用生絹袋盛以井花水揉洗澄濾有滓再更研入袋擺洗盡瓦盆中日晒夜露毎至曉澄去宿水别換井花水攪勻晒春五日夏秋七日冬十日去水晒乾如玉片方入後諸藥劔脊烏稍蛇白花蛇各酒浸一宿去皮骨焙乾秤一兩重白殭蚕炒去絲嘴全蝎㣲炒去毒一兩天麻川芎各二兩右為細末生薑汁煑麵糊和丸梧桐子大飛研細硃砂一兩麝香末二錢為衣風乾宻噐中盛之毎服三十丸食後煎生薑薄荷湯下四神丸出經驗良方治手足頑麻痰涎壅盛頭昏眩肩背拘急極效大天麻天南星各湯洗凈防風去蘆各一兩薄荷葉半兩右為細末酒煑薄麵糊為丸如菉豆大毎服二十丸煎荆芥生薑湯下退痰丸出聖濟總録治風痰壅盛毎日早辰多喜嘔吐人參赤茯苓去黒皮乾薑炮半夏湯洗七遍去滑各一兩右為末以粟米飯和丸如梧桐子大毎服二十丸空心生薑湯下日午再服通頂散出御藥院方治風痰旋運頭目大痛及偏正不定發作神志昏憒或冐風寒鼻塞聲重藜蘆去苖土半兩躑躅花去土一錢藿香葉去土二錢右為細末毎用紙撚蘸藥鼻内㗜不拘時芎辛湯出十便良方治膈痰風厥頭目昏痛鼻塞身重肩背拘急不思飲食芎藭半兩細辛去苖土一錢甘草炙一錢半右為粗末毎服二錢水一盞煎至七分去滓不以時温服一方加薄荷七片治中風痰壅不能治者出經驗良方猪牙皂角肥實者炮刮去皮絃及子二片𤣥胡索七個青黛二錢右為細末毎用一匙新汲水調成稀糊令患者仰卧男左女右將藥入病人鼻内覺藥到喉少酸令患者坐却令咬筆管一枝滴涎盡為度鐡刷湯出聖濟總録治風痰胃中有寒嘔吐痰涎胷滿氣逆附子五枚炮令㣲裂地上以盞子覆冷取出去皮臍半夏湯洗七遍去滑切麩炒一兩木香半兩右剉如麻豆毎服二錢匕以水一盞入生薑一棗大拍碎大棗三枚擘破同煎至七分去滓空心食前温服皂莢煎丸出聖惠方治風墜痰踈利臟腑皂莢一觔肥好不蛀者以水洗去塵用河水五升煑令軟攪濾取汁入銀鍋内􅆈成膏葳靈仙煖水浸過削去其茸不用其根冷水淘三五度令凈暴乾搗細羅取末四兩薄荷乾杵細羅取末一兩右二味藥末相合入皂角煎和搗三二百杵丸如梧桐子大毎服不計時候以荆芥湯下二十丸半夏丸出聖惠方治風痰脾胃冷氣吐逆不止飲食不下半夏一兩湯洗七遍去滑㣲炒白礬二兩燒令汁盡乾薑半兩炮製剉右搗羅為末研勻用蒸餅和丸如梧桐子大毎服不計時候煎生薑湯下十丸毎服三十丸亦得隨病輕重酌量加减稀涎散治風涎潮塞上隔氣閉不通方見卒中風類乳香半夏丸出御藥院方治風痰除咳𠻳清頭目半夏湯洗七次焙乾三兩天南星虀汁煑熟一兩白礬枯一兩右各脩製訖同為細末水浸蒸餅和丸如梧桐子大毎服五十丸生薑湯下不拘時候星附湯出百一選方全蝎一錢炒附子炮去皮臍天南星炮洗去灰各一兩右為粗末毎服三錢水二盞薑十五片煎至七分去滓澄清冷服温服亦得三生丸出本事方治中脘風痰涎飲瞑眩嘔吐酸水頭疼惡心半夏二兩南星白附子各一兩右並生為末滴水為丸如梧桐子大以生麫滚衣陰乾毎服十丸至二十丸生薑湯下天南星丸治風痰氣厥頭痛嘔吐痰涎天南星用虀汁煑軟切作片子焙半觔芎藭三兩香墨燒研半兩右為末以白麫糊為丸如梧桐子大毎服二十丸荆芥湯下不拘時候生薑湯下亦可治膈上風熱常覺有痰一名風痰散出十便良方皂角二挺半不蛀者湯浸剥去皮子晒乾一挺燒作黒灰一挺燒作白灰半挺塗酥炙令黄搗羅為末蠟靣茶半觔生碾為末附子半兩炮製去皮臍搗羅為末右都研令勻不計時候以生薑湯調下半錢又方白礬三兩燒令汁盡乳香半兩白附子一兩炮製搗羅為末右都研令勻以水浸蒸餅和丸如梧桐子大毎于食前以温酒下十丸壞痰丸出御藥院方治風痰利咽膈破積滯散疼痛止咳𠻳皂角割去黒皮酥炙黄色去子枯白礬各半觔右為細末水浸蒸餅為丸如梧桐子大毎服三四十丸食後生薑湯下或温水下亦可靈砂白丸子出醫方集成治氣虚弱痰氣上攻風痰壅塞嘔吐不已靈砂青州白丸子末各一兩各研人參去蘆乾薄荷葉白茯苓去皮白礬枯過南星泔浸一伏時焙乾各三十兩半夏洗七次為末生薑汁搗和作麯六十兩右為末用生薑汁煑麫糊和丸如梧桐子大毎服二十丸生薑湯下食後如痰盛躁熱薄荷湯下皂白丸出御藥院方治諸風痰酒痰茶痰食痰頭痛目眩旋運欲倒手足頑麻痰涎壅并一切諸病天南星生三兩半夏生七錢白附子生二兩生薑二觔取汁皂角二觔肥者去皮子以水浸一宿三次約水一斗煑藥川烏頭半兩去皮臍右㕮咀以皂角同煑乾為細末以生薑汁煑麵糊為丸如梧桐子大毎服三十丸食後生薑湯下但他藥所不能療者此藥並皆主之常服寛利胷膈涎美飲食不生一切風痰大有神效導痰散治中風癱瘓胷膈有痰涎不利此藥服後㣲㣲吐之枯白礬半兩殭蚕一兩右為細末毎服一錢生薑湯調下良久吐頑涎為效未吐再進不拘時候治風痰出本草圖經用芎藭􅁡和作指頭大丸欲寢服之殊佳碧琳丹出王氏慱濟方治痰涎潮盛卒中不語備急大效生碌二兩出信州石碌是也凈洗于乳鉢内研如粉以水飛過去砂石攤于紙上晒乾硇砂一兩以水化去砂石潑清入碌石粉於新白噐内慢火􅆈令乾右取辰日辰時靣向辰位上修合再研勻入麝香一分又同研細煑糯米粥和丸如彈子大陰乾如卒中者毎丸作二服用薄荷酒磨下癱瘓并一切風疾用朱砂酒磨下如犯藥毒亦同前法服之候吐出濃涎青碧色并㵼下惡物為驗合時于凈室内無令婦人四足見忌動風毒物常服一丸可分作六服空心服後用少食壓下千金丸出王氏慱濟方踈風下涎消逐痰積朱砂半兩臼研如粉水磨雄黄三分别研如粉膩粉三分秋冬只用半兩生半夏末三分右件藥一處再同研勻用生薑去皮切作塊子如櫻桃大先入藥末石臼内旋入薑塊同搗約可丸得即丸如梧桐子大毎服一丸至兩丸吐風痰出本草以梨作漿服之一方治風痰用緑青揀上色精好者先搗下篩更用水飛過至細及再研治之如風痰眩悶取二三匕同生龍腦三四豆許研勻以生薄荷汁合酒温調服偃卧湏臾涎自口角流出乃愈治風痰出肘後方用蘿蔔子為末温水調一匙頭良久吐出涎沫如是攤瘓風以此吐後用緊踈藥服踈後服和氣散差一方水研服吐風痰一方出肘後方治膈壅風痰用半夏不計多少酸漿浸一宿温湯洗五七遍去惡氣日中曝乾搗為末漿水搜餅子日中乾之再為末毎入生腦子一錢研勻漿水濃脚丸雞頭大紗袋盛通風處陰乾毎一丸好茶或薄荷湯下治風涎潮塞氣不得通用皂角一兩生白礬半錢膩粉半兩為末水調灌之到咽吐涎即愈利膈丸出王氏慱濟方治三焦氣不順胷膈壅塞頭目昏眩涕唾痰涎精神不爽用牽牛子四兩半熟不蛀皂角塗酥灸二兩為末生薑自然汁煑糊為丸如梧桐子大毎服二十丸荆芥湯下治一切風痰風霍亂食不消大便澁出肘後方用訶梨勒三枚搗取末和酒頓服三五度良茯苓湯主風痰氣發嘔吐欠呿煩悶不安或吐痰水者茯苓三兩人參生薑橘皮白术各三兩右以水五升煑取一升五合去滓温分三服中間任食忌犬醋桃李雀等肉四生丸治風順氣化痰逐飲生半夏生南星生白礬南康蚌粉各一兩右為末用糊為丸如梧桐子大毎服三十丸生薑湯下食後玉芝丸出永類鈐方治風壅痰實頭目昏眩咳𠻳煩滿不利嘔吐惡心神思昏憒心忪面熱痰唾稠黏右為細末用生薑自然汁打麵糊為丸如梧桐子大毎服二十丸如要踈風痰加至四五十丸食後生薑湯下葉氏分涎湯出易簡方治風痰留滯膈問虚滿食即惡心咽吻上喘涎唾不利服此順陰陽消痞悶醫方大成陳皮去白新羅揀參半夏湯洗七次令軟毎箇切四片薑汁浸一宿天南星去外皮濕紙包灰火煨香熟出各等分枳殻去瓤㣲炒苦梗去蘆各等分右剉米粒大毎服二錢水一盞半生薑十大片同煎至半盞去滓候通口旋呷徐徐嚥下食後臨卧服了高枕仰卧治風痰不下荆芥四兩白礬一兩半生槐角生二兩陳皮半夏各二兩半右為末水糊為丸如梧桐子大毎服四十丸生薑湯送下導痰丸專患痰氣服此藥免患中風之疾黒牽牛生用頭末三錢白礬生用一錢猪牙皂角生用二錢半夏少許南星少許右為細末冷水和丸如梧桐子大毎服五六十丸五更用温茶湯下水煑金花丸出濟生㧞粹方治風痰咳𠻳其脉弦靣青四肢滿悶便溺秘澁心多躁怒南星一兩生用半夏一兩生用天麻五錢雄黄二錢白麵三兩右為細末滴水為丸毎服五十丸至百丸煎漿水沸下藥煑令浮為度漉出淡漿水浸另用生薑湯下或通聖加半夏及局方中川芎丸防風丸皆可用也南星散出直指方治風氣動痰發𠻳天南星一兩枳殻製細辛各半兩木香甘草炙各一分右㕮咀毎服三錢薑七片慢火熟煎服療風痰飲氣逆滿惡心不能食人參二兩枳實炙白术各三兩生薑四兩桂心一兩半右切以水五升煑取一升五合分温三服之忌􅊝李雀肉生葱治風痰膈氣嘔吐水者宜服此方防風一兩去蘆頭枳殻半兩麩炒㣲黄去瓤白附子前胡一兩去蘆頭陳橘皮一兩湯浸去白瓤焙半夏湯洗三兩人參生二兩天南星生用一兩半白茯苓去皮白术一兩白礬生滑石貝母各一兩右為細末麵糊為丸如梧桐子大毎服三十丸食後生薑湯下一方有木香一兩玉芝徐老丸出御藥院方治除風壅消痰利咽膈進飲食調五味天南星乾薑各半兩半夏白礬大黄各一兩細蛤粉二錢牽牛四兩黄蘗一兩半右為細末水丸如小豆大毎服一二十丸食後温水下日三服常服化痰消食順氣調血令人徐老或已衰老或一切風氣或患喉結愈宜服之或除腸垢積物者可漸加至三五十丸以意消息或滑泄忌牽牛大黄并孕婦此外更忌天南星半夏皆不可服大利膈丸出㧞粹方治風痰實喘滿咳𠻳風氣上攻牽牛四兩生用半夏湯洗皂角去皮弦酥炙各二兩木香半兩青皮去白二兩槐角一兩炒㯽榔大黄各五錢右為細末生薑麵糊為丸毎服五十丸生薑湯下治風痰氣壅發即頭旋嘔吐不下飲食宜服此方前胡一兩去蘆頭半夏半兩湯洗七遍去滑枳殻二分麩炒㣲黄去瓤旋覆花防風去蘆頭枇杷葉拭去毛炙㣲黄陳橘皮湯浸去白瓤焙白术各半兩右為散毎服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服一方有赤茯苓甘草錦朱丸出御藥院方治膈痰風厥頭目昏痛眼黒旋運怔忪惡心驚悸恍惚夣寢不安漸致成冐昧不知人事乳香研朱砂研白礬灰研皂角子炮製為末鐡粉研各一兩半夏麯二兩鉛白霜研右為細末生薑汁麫糊和丸如菉豆大毎服十五丸至二十丸生薑湯下驚悸語澁金銀湯下或荆芥湯下㯽榔利膈丸出御藥院方治風上攻痰實喘滿咳𠻳㯽榔麫褁煨熟剉一兩皂角不蛀肥者去皮子酥塗炙槐角子半兩青橘皮湯浸去瓤稱各二兩齊州半夏湯浸洗七次切焙乾黒牽牛四兩半生半炒丸濃煎生薑湯吞下不嚼二烏丸出華陀中藏經方治風痰眩運川烏頭草烏頭各四兩青鹽四兩黒豆半升右用水二升同煑四味水耗即以温水添之候川烏頭半軟四破之更煑以透爛為度去皮同煎烏頭並黒豆于石臼或水臼内搗令極爛不見日星即就丸乾即以煑藥水添濕同搗煑時留一盞以下水以備添勿令煑乾也丸如梧桐子大毎服三二十丸鹽酒任下食前七生丸出衛生家寶方治風盛及頭風一切痰涎天南星半夏川烏草烏地龍不去土川芎白殭蚕已上各一兩右並不去皮臍生用為細末以蕎麥麫打糊為丸如梧桐子大蛤粉為衣毎服七丸淡茶湯送下不以時候漸加至十丸十五丸白龍丹出王氐慱濟方治上焦風壅化痰涎利胷膈逐風祕雷丸末二錢甘遂末三錢牽牛一兩杵取米六錢不用再羅者龍腦少許粉霜四錢輕粉四錢入白麫少許三味同研令勻細滴水和餅子于慢火内煨令熟放冷再研令細右件同為細末研令入青州棗取肉煑熟和為圓如菉豆大毎服五十丸温漿水下如一切風癎驚搐涎滯並以漿水下七丸或二七丸如小兒痰熱及渴不止煩疼但頻少與服自然消除大人風氣壅盛上焦不利最宜服此更在臨時酌其加减靈砂丹出楊氏家藏方治痰壅滯結集成癖上攻頭目昏痛眩運目暗耳鳴肢體煩倦項背拘急手足戰掉肌肉瞤動麻痺不仁及一切風痰積飲悉皆治之皂角不蛀肥實者去皮弦子二觔用河水三升生薑自然汁半升搗皂角取濃汁濾去滓干銀石噐内慢火􅆈成膏天南星生用半夏湯洗去滑白附子生用白礬枯四味各四兩朱砂一兩半研如粉猪牙皂角肥實者去皮弦塗酥炙赤色秤二兩右件同為細末入朱砂同研勻將皂角膏子搜和丸如梧桐子大别用硃砂為衣毎服三十丸生薑湯下食後如積年經久痼冷痰疾加附子四兩去皮臍生用五生丸主風痰頭旋臂痛嘔吐咳𠻳等証天南星薑汁浸乾焙半夏洗去滑附子去皮天麻白附子白礬枯六味各一兩硃砂别研右為細末生薑汁作糊為丸如梧桐子大硃砂為衣毎服三十丸食後薑湯下天麻白术丸出楊氏家藏方治風濕痰飲食攻衝頭目昏暈重痛咽膈壅滯不利及一切痰飲悉皆主之天麻去蘆白术天南星炮半夏湯洗凈白附子炮川芎白殭蚕炒去絲嘴寒水石煆過薄荷葉去根赤茯苓旋覆花已上十一味各等分右件為細末以生薑自然汁煑麫為丸如梧桐子大細研雄黄為衣毎服四十丸温生薑紫蘇湯送下食後白附子化痰丸出楊氏家藏方治風痰積于膈胷頭疼目暈半夏湯洗七次生薑自然汁製天南星炮石膏細辛去葉土白殭蚕炒去絲嘴白茯苓去皮肉桂去粗皮白附子炮川芎上九味各三分香白芷一分麝香一錢别研右件為細末同麝香研勻取生薑汁煑麵糊為丸如桐子大毎服三十丸食後熟水送下木乳丸出楊氏家藏方治風痰上盛咳𠻳連聲唾出稠黏皂角去皮弦子焙乾天南星生用半夏湯洗七次焙乾白附子生用晋礬生用已上五味各一兩右件為細末用生薑自然汁煑麵糊為丸如梧桐子大毎服二十丸三十丸濃煎生薑湯下食後臨卧青金丹出楊氏家藏方治風涎壅𠻳咽膈不利晋礬生三兩半夏生三兩焰硝二兩天南星生用一兩右件為細末生薑自然汁煑麫糊為丸如梧桐子大青黛為衣毎服二十丸生薑湯下食後天麻半夏湯出衛生寶鑑方治風痰内作胷膈不利頭旋眼黒兀兀欲吐上熱下寒不得安卧天麻一錢半夏一錢柴胡七分黄芩酒製炒五分橘皮去白七分甘草炙五分白茯苓去皮五分黄連三分前胡五分右件剉如麻豆大都作一服水二盞生薑三片同煎至一盞去滓温服食後忌酒濕麫生冷物防風丸出經騐方治風壅氣澁痰涎不利言語蹇澁大腸燥結神昏氣濁防風秦芁石斛丹參薏苡仁已上各三分前胡去苖陳橘皮刮去白皮杜仲去粗皮炙香切附子炮製去皮臍已上各半兩桂三分取有味者不見火大麻仁一兩㣲炒别研右為末入麻仁研勻煉蜜丸如梧桐子大每服食前温酒下二十丸隨病勢加减槐角利膈丸出衛生寶鑑方治風勝痰實胷膈及喘滿咳𠻳皂角一兩酥炙去皮弦子半夏半兩槐角半兩炒牽牛一兩半以上藥為末生薑汁打麫糊為丸如梧桐子大毎服三十丸食後生薑湯下温服良愈治一切風痰胷膈不利涕唾膠粘上焦壅滯喉中不快出䕶命方麻黄去根荆芥穗杏仁去尖木香當歸黄苓羌活芍藥柴胡去毛大黄炮熟各一兩半夏二銖牽牛半兩右為細末毎服二錢水一盞生薑一片同煎取八分食後喫紅散子出䕶命方治一切風痰倒卧昏悶并小孩子一切風痰半夏薑汁煑一百沸四銖白附子附子炮去皮臍細辛乾蝎用生薄荷三兩碎切同炒令乾去薄荷不使藿香白殭蚕去絲天南星川芎羌活防風各一分右細杵羅為末入輕粉二十箇硃砂靈砂各三銖麝香龍腦各二銖同研令勻薄荷湯下半錢小兒一匙又方出衛生寶鑑方治風痰心昏恍惚不能言語痰涎流溢薺苨半兩防風半兩去蘆右以水一大盞煎至七分去滓入生薑汁半合空心温分二服八風丹出十便良方治體虚有風痰涎壅盛頭目昏重口眼牽引靣若蟲行及癱瘓諸風並宜服之附子川烏頭草烏頭白附子半夏天南星香白芷天麻川芎朱砂細辛已上十一味各半兩生用麝香一錢右並為細末入白麵五兩一處研勻水和為丸毎一兩作一十二丸陰乾毎服一丸細嚼茶清或温酒送下食後臨卧十珍丸出楊氏方治諸風掉運痰厥頭旋項背拘急肢體疼痛麻木不仁草烏頭八兩一半生去皮臍尖一半炮天南星五兩三錢河水浸三日炮縮砂仁一兩肉桂川芎防風白芷桔梗各二兩七錢細松煙墨二兩燒存性麻黄七兩右件為細末煉蜜丸毎兩分作三十丸毎服一丸食後細嚼茶酒任意三倍湯出十便良方治風消痰理手足戰掉去諸風極效天南星四兩防風二兩甘草一兩右件並生用剉如麻豆大勿令為末毎服秤重三錢以水二盞生薑二十片同煎至一盞去滓服不計時候日二三服利膈丸治風盛痰實喘滿𠻳風氣上攻出御藥院方牽牛四兩生槐角子一兩炒皂角去皮酥炙半夏洗各二兩青皮一兩木香一兩右為細末生薑麵糊為丸桐子大毎服四五十丸水下防風飲子出十便良方治風痰氣發即頭旋嘔吐不食防風人參橘皮各二兩白术茯神各三分生薑四兩右為粗散毎取五錢以水一盞半煎取八分服日三四服忌醋麫等治暴患痰飲不省人事者出經騐良方用生麻油一盞灌入喉中湏臾逐出風痰立醒然後隨証用藥白殭蚕散出肘後方治風痰方見破傷風類治風痰鼻榻以萆麻不拘多少去皮擘為二片用黄連等分搥碎二件用水一處浸七宿後空心日午臨卧時只用浸者水吞一片水只旋添勿令乾服兩月後喫大蒜猪肉試騐如不發動便是效也若發動時依前法再服直後不發如只膇脹用針出毒物累有神效普濟方卷一百四
