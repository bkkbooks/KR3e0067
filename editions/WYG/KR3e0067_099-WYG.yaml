宫膏治久年驚癎心血不定守宫一箇即蝎虎也珍珠麝香腦子各一字研細右為守宫一箇以鐵鈐定剪子取去四足爪連血細研入珍珠麝香腦子各一字許研細薄荷湯作一服先湏用奪命散逐下痰涎或用吐法次服之此藥大有神効蓋癎病皆心血不足此物有守宫其血與心之血類也取下如童女血服之於心故能補也心全則病瘥矣醉紅散治風癎日夜癲蔓陀羅花半兩硃砂四錢乳香四錢天南星四錢薑汁製右為細末抄三錢酒一盞半煎至一盞温服無時靈烏散治風癎多驚手足顫掉口吐涎沫烏鵶一雙臘月収於藏瓶内盛以鹽泥固濟令乾用炭火煆存性候冷取出去肚膓研細辛去苗葉二兩乾蝎全者十四枚炒右將二味搗末與别研二味同羅每服半錢匕午前用温酒調下龍齒丸治因驚成癎狂言妄語龍齒研鐵粉研凝水石研各一兩茯神去木一兩半右為末鍊蜜丸如梧桐子大每服二十丸温米飲下不拘時半夏丸出十便良方治風癎痰盛瘛瘲口吐涎沫出聖惠方半夏湯洗去滑生為末五兩白礬生為末二兩丹砂研鉛丹研各一兩右同研匀以粟米飯為丸如梧桐子大每服食後生薑湯下二十丸一方治積痰不散上衝心藏變為風癎不問長㓜以人參湯下二十丸所用白礬燒冷汁盡大聖丹一名烏龍丹出百一選方治風癎暗風癱瘓風手足嚲曳口眼喎斜語澁步難川烏去皮臍尖切作片子五靈脂生用新者各五兩右為細末入腦麝少許滴水搜和如彈子大每一丸年五十以上者分作四分有年紀人作六服取薑汁隔宿浸軟手調開用薄荷酒化仍再入腦麝少許合時以三月三日五月五日六月六日或辰時勿令孕婦雞犬見丸就以米篩先鋪穰草將丸子攤在上有風處䕃令自乾收之不得罨損以紗絹袋懸之拈此藥了不得以手擦眼服後須忌兩時熱物治男子婦人中風半身不遂言語蹇澁行步不正諸藥不效或久遠鶴膝風暗風無不效服之三十日去根小兒分作八服一方無腦子是齋弟琛患暗風十餘年得此藥安一方以煖酒調服之一日兩服空心食前服之只三粒定醫一人纔服五七丸覺擡得手移得脚服十粒可以梳頭凡初中風一月内未得𦂳藥先且化涎消滯和胃順氣道以風乘虚未有所歸多誤投湯藥却言無功此藥治半年以上者必不相誤神藥法棗兒出德生堂治諸風種癎危急之證得此方用之多所存活皂角一斤去皮炒剉碎麻黃去節三分肥棗一升好京墨三錢右用大砂鍋一箇可盛水二斗者以皂角麻黃京墨三藥入砂鍋内熬煎水至五六碗濾去滓再將藥水熬成膏二碗却下棗在藥膏内慢火熬令乾則藥味皆入棗中用瓦瓶盛頓紙蓋瓶上每日取出喫棗一枚至三箇五箇為度喫後次早風痰涎皆從大便中下此其應也治風癎發作項强直視不省人事此證乃肝經有熱如病發者宜服此藥輕粉白礬丁頭代赭石各等分右為末以發過米飲調服銀末丸出聖惠方治風癎積年不差發時迷悶吐沫或作牛聲銀末半兩鐵粉一兩黑猫兒糞一兩炒黃丹二兩右相和熟研令匀以醋飯和丸如菉豆大如患五年服十五丸患十年服二十丸患十五年服三十丸初服時即於食前以熱酒下如服五丸不吐不瀉即第六服用水一大盞煎黃耆末二錢煎至五分温温下丸藥湏臾吐粘痰每日空心服之不絶半月其疾永不發動陽起石丸出聖惠方治風癎有積痰在胷隔不散發時心躁惡呌迷悶吐沫瘛瘲陽起石一兩硫黃一兩與水銀結為砂子水銀一兩黃丹一兩右都研令細固濟甆瓶子鹽櫃中以文火養三日後以五斤火煆之候冷取出火毒細研以粟米飯和丸如菉豆大每服不計時候以粥飯下五丸又方出聖惠方硃砂一兩細研水飛過鉛霜一兩鐵粉一兩馬牙硝一兩右都細研如粉以棗肉和丸如菉豆大每服不計時候以熟水下七丸蜜陀僧丸出聖惠方治風癎發時眼前暗黑迷悶吐沫不識人蜜陀僧三兩細研硃砂三兩細研水飛過臘月鵶一雙燒灰細研猪牙皂莢六兩三兩去黑皮塗酥炙令焦黃去子三兩去皮子生用右皂角擣羅為末以米醋二升熬成膏入硃砂等三味和丸如菉豆大每服不計時候以温酒下十丸雄黃丸出聖惠方治風癎發作不定雄黃一兩龍齒一兩鐵粉半兩黃丹半兩與雄黃同炒轉色右同研如粉以粳米飯和丸如菉豆大每服不計時候以牛乳下五丸雞頭丸出濟生方治風癎不問長㓜發作漸頻嘔吐沫涎飛鴟頭一枚燒灰虢丹五錢細研皂角五定醋炙右為細末用糯米糊為丸如菉豆大每服十五丸加至二十丸以粥飲送下不拘時候參朱丸出濟生拔粹治風癎大有效人參蛤粉朱砂右為細末用獖猪心血為丸桐子大每服三十丸金銀水送下食逺辰砂散出十便良方治風邪諸癎狂言妄走精神恍惚思慮迷亂乍歌乍哭飲食失常疾發仆地吐沫帶白魂魄不守醫禁不治顆塊硃砂四錢研細酸棗仁二錢乳香二錢研右為末匀量病人飲酒幾何先須恣飲令沉醉但勿令吐靜室中以前藥都為一服温酒一盞調頓服令盡服藥訖便安置床枕令睡如飲酒素多但隨其量病淺一兩日深者三五日睡不覺令家人宻伺之覺即神魂定矣謹勿驚觸著纔動更不復治上樞正肅呉公少時心病服此一劑三日方寤遂差雌黃丸出聖惠方治風癎欲發即精神不足眼目不明瘛瘲惡聲嚼舌吐沫雌黃一兩細研炒令褐色黃丹一兩炒令褐色麝香一錢細研右相和研令匀用牛乳一升慢火熬成膏候可丸即丸如桐子大每服不計時候以温酒下七丸又方出聖惠方鐵粉二兩雌黃一兩葉子者黃丹二兩與雌黃同畧炒過右都細研為末以粳米飯和丸如菉豆大每服不計時候以牛乳下五丸如無牛乳温水下亦得硃砂散出聖惠方治風癎心神狂亂時吐涎沫呌呼不識人硃砂二兩光明者逐塊以金薄裹磁石三兩𢷬為末黑鉛二兩以水銀二兩炒作砂子細研右先固濟一甆瓶子候乾先入磁石末次安硃砂後以黑鉛末覆之以文火養七日後以炭五斤煆令通赤便住候冷取出都細研為散每服不計時候以馬牙硝半分煎湯調半錢服之治風癎發作不定出聖惠方鉛二兩水銀一兩硫黃一兩細研右先將水銀硫黃二味於銚子中慢火熬不住手研待硫黃烟氣似定入鉛同炒候少時將出細研為末以粟米飯和丸如梧桐子大每服不計時候以茶下三丸乳香散出聖惠方治風癎時久不差先吐痰沫乳香半兩真降香一兩石膽一分右為散每服一錢以真黃牛乳一小盞熱煖空心調下如人行三二里再服如此三服以吐為度壽星丸治暗風百日内者方見風驚類龍鱗丸治諸癎頻作青州白丸子末一兩大青魚鱗糯米炒黃研為末一兩右和匀以薑汁糊丸如梧桐子大每服五十丸薑湯送下不以時鮎魚丸一名硃粉散治五種癎疾硃砂半兩研輕粉一錢右用大鮎魚一尾將輕粉塗在鮎魚上少時刮取涎用硃砂末為丸如菉豆大每服二丸以温水吞下食後冷水亦得神效散治心邪狂走癎病風涎榖精草一錢滑石二錢右為細末每用一字口含水畜入鼻内吐了水口咬竹筯低頭吐出涎為妙金蟬丸一名鬱金丸治一切癎病久不愈者方見癲類安息香丸出聖濟總録治男子婦人暗風癎病安息香通明無砂石者良鉛丹各兩右為細末入羔羊心中血研匀丸如梧桐子大每服十丸空心温水下神聖散出聖濟總録治風癎涎潮等疾雌黃鉛丹各一兩右研細以醋一升熬稠如梧桐子大與惡實末同收每服十丸臨卧煎惡實末湯下驅風散一名驅風丸治風癎方見癲癎類治風癎瘛瘲不省出聖惠方虎糞暴極乾野猪骨并蹄炙各不拘多少右擣研為末每日空心酒調下二錢匕忌一切有足之物一方用虎糞内取骨酥炙微黃并糞晒乾為末酒調温下服之並良神效方出聖濟總録治風癎發歇有時雄雀糞尖者是二百八十粒巴豆干研去皮一箇出油右細研以赤小豆麵煮糊為丸一料分作十丸每服用馬牙硝末一錢藥一丸温水一茶匙脚來同用匙柄研破北極下焚香露一宿早不得洗手靣潄口更添温水少許服之良久自然口内出涎一兩盌相次下青黑涎一兩盌相次更有白沫一兩盌便安十年以下者半月可再服病新者只可一服取差神應丸出危氏方治風癎暗風好臈茶半兩白礬一兩生用右為細末蜜丸如梧桐子大每服三十丸臈茶湯下取涎自大便出極妙保安丸治風癎不問久遠草烏去皮五靈脂右等分為細末以猪心血丸如雞頭子大每服一丸薄荷生薑浸湯食後服一方治癱瘓以六月六日合不用猪血以薄荷酒磨下微覺麻為度治猪癎出一百選方用豶猪心血於新瓦上煿乾研為細末入麝香拌匀酒糊丸如梧桐子大每服七丸麝香酒下或調服一錢亦可星神散出濟生方治驚癎潮作仆地不省口吐涎沫用雄鴟鴞一枚用磁礶盛以黃泥固濟炭火煆令通紅碾為細末每服二錢入麝香少許温酒調服熟水亦得不拘時候一作竹筒盛救急療癎少老増减方竹茹一握衣中白魚七頭右以酒一升煎取二合頓服之黃丹丸出聖惠方治諸風癎發作漸頻嘔吐涎沫不問長㓜猪牙皂角炒二錢黃丹炒黒五錢右為末蒸餅為丸二三十丸温酒下以吐為度一方治風癎發作漸頻嘔吐涎沫以糯米粥和丸毎服粥飲下十丸太隂元精丸治風癎精神不守惡呌煩悶吐沫嚼舌四肢抽掣太隂元精三兩鐵粉三兩右都研令細以真牛乳一大盞相和用文火煎令乳乾取出研令極細鍊蜜和丸如梧桐子大毎服不計時候以薄荷湯下二十丸蜜栗子丸一名蛇黃丸出聖惠方治一切癎疾不問長㓜是風痰衝心所為用蜜栗子小蛇黃是也狀如大楊梅者佳取一十五枚以槲木汁拌匀入火内煆令通赤取出净地上出火毒後細研用豺狗膽一枚細研和粟米飯為丸如芥子大每日空心以煖酒下十五丸服三五日後吐出惡痰是疾退之後也年深者只三二百粒効一方治暗風用蛇黃不拘多少米醋燒淬七次為末温酒服之一方用狗膽辰砂丸出危氏方治暗風年深日近發搐不省人事極好辰砂半兩好雄黃三錢各研極細一處研右用烏雞心血和丸如梧桐子大每服十丸以煮豶猪湯送下如不省人事則灌下仍灸百會穴九壯一方治暗風癎病右等分為末用豶猪心血同漿水相和共半盞温動入藥末二錢調服不拘時候一年一服十年者十服𤓰蒂散出肘後方治大人小兒久患風癎纒喉風咳𠻳通身風疹急中涎潮此藥不大吐逆只出涎水方見風痰類治諸癎方採刺木藤心一二寸者湏是端午日并伏内取不計多少洗淨日曬乾為末比及服此者先用蘇合香丸遇夜細嚼以薑湯嚥青州丸子如此服月十日後方用刺母藤末每日早飯後茶調一服午用酒調一服其病愈服猪肉亦無妨治癎用夜猫兒一箇去毛開肚子用糯米與平胃散一處裝肚内去膓留心肝等用線縫住用𢃄骨羊肉一塊水一碗酒一碗一處煮熟一將肉與病人喫夜猫骨羊骨於新瓦上焙乾碾細為末空心温酒服治癎疾祖傳信適用方用凌霄花為末每服三錢温酒調下空心服每服藥時解開頭髪用木梳不住手梳以冷水一大碗在側含水口中温即換以碗水盡即住梳如此服四十九日必絶根不論受病淺深皆愈仍百無所忌治暗風倒地不省人事搐鼻散出危氏方用細辛不拘多少洗焙為末挑一字搐鼻中治暗風用榖精為末口噙水以蘆筒吹入兩鼻細辛末亦可治暗風發用枸杞枝上蜂蝸燒灰酒調下除根不發雄硃丹一名雄黃丹砂丸治風癎失性倒卧惡聲吐沫口噤方見癲類龍齒丸出指南方治癎晝發者牛黃麝香硃砂龍骨各半兩羚羊角羊齒火煆龍齒蛇退炒各一分右為末蜜丸如梧桐子大空心米飲下五丸紫苑湯一名消石丸出指南方治癎夜發者硝石赤石脂等分右為末麵和丸如梧桐子大米飲下三十丸升陽湯東垣秘藏方治陽蹻癎積足太陽寒恐則氣下行宜升陽氣麻黃八錢不去節羌活一兩半防風八錢炙甘草半兩每服秤五錢水五盞煎至一盞去滓腹空服之藥後避風寒一兩時辰乃作大効辰砂丹出衛生寶鑑治心經熱癎邪右用雄猪心一箇破作兩片去心内血用好辰砂塞滿為度以布線縫合外合燈心包裹以麻線縱橫纒定以糖砂壜一箇入井水一半河水一半合十分滿用文武火煮一復時出去猪心將硃砂研細棗肉為圓如菉豆大入茯苓二兩半焙乾甘草半兩炒令赤色為細末每用一大錢沸湯㸃嚥藥三粒至五粒日進二服百無所忌驅風散出衛生家寳治暗風癎疾涎潮不省人事手足搐搦又小兒驚風等疾服一料永除根防風四兩去蘆白砂蜜半斤硃砂一兩水飛研令極細薄荷四兩苗兒紫心者蝸牛七箇瓦上炒去殻細研形如蜒蚰背負殻者皂角十條不蛀者去邊寸剉先用水浸三日去元浸水却以一碗挼取濃汁去滓入銀石器内熬取五六分天麻四兩右件為末入硃砂蝸牛先以皂角膏子和匀却旋入蜜拌為丸如桐子大每服三十丸至五十丸臈茶清送下日進三服忌猪雞魚麵動風物斷癎丹家載經驗治因驚成癎瘥而復作連綿不除方黃耆三錢蜜炙防風二錢鈎藤三錢細辛去土三錢甘草二錢蝉退二錢露蜂房二錢石菖蒲三錢桂心去麄皮二錢遠志去心二錢人參二錢杏仁二錢半去皮尖半夏泡三錢天南星泡三錢右為細末鍊蜜為丸如梧桐子大用硃砂少許麝香為衣每服二十丸煎棗湯送下一日二服臨卧一服烏龍丸出衛生寶鑑治五風癎病川烏頭草烏頭天仙子五靈脂各二兩黑豆一升右為細末滴水為丸如桐子大每服五七丸温水下如中風加附子半兩神應丹出衛生寶鑑治諸風心癎病狐肝真一具烏鵶一隻鴟梟一箇白礬一兩生用生犀角一兩為末野狸一箇去肚腸皮毛入瓦罐内用黃泥固濟用炭火煆令焦黃色右為細末用酒打麵糊為丸如皂角子大硃砂為衣每服一丸温酒送下不拘時候治癎病心風病出衛生寶鑑皂角三挺搥破挼濾汁熬如稀麵糊攤紙上服乾取兩葉如小錢大用温漿水浸洗下去紙住於兩鼻孔各一蜆殻許湏臾涎下咬筯瀝涎盡服後藥代赭石一兩生用白礬二兩生右為細末稀麫糊為丸如桐子大每服三十丸冷水送下不計時候以効為度治風癎病墜痰丸出衛生寶鑑右用九蒸九曝天南星為末薑汁糊為丸如桐子大每服二十丸煎人參湯送下若菖蒲麥門冬亦得珠子辰砂丹出衛生寶鑑治風癎久不愈者薯蕷人參防風紫石英茯神遠志虎骨虎睛龍齒五味子丹參石菖蒲細辛已上十三味各二錢半珠子末四分右件為細末水打麫糊為丸如桐子大用硃砂二錢研細為衣每服三五十丸煎金銀水送下日進三服忌魚肉温麫動風之物治風癎年久病癲狂羊聲倒地不省人事或狂走持刃宜摧伏肝邪出如宜方用蛇含石火煆九次醋淬至酥研令極細取狗膽汁丸如龍眼大發時用一粒人參煎湯磨下每一服男子用雄狗膽女子用雌狗膽治心熱風癎出廣稱方用爛龍角濃研汁食上服二合日再服治風癎病不能愈者從厚朴丸宜春秋加添外於每一料中加出加命集人參菖蒲茯神去木各一兩半右依厚朴丸春秋加添法和劑服餌厚朴丸方在吐論中風癎抵住丸出永類鈐方皂角燒存性蒼耳根莖葉日乾四兩蜜陀僧一兩右為細末糊丸硃砂為衣三四十丸棗湯下日二服稍退作二十丸斷癎丸出永類鈐方紫石英醋淬煆七次二兩白礬飛過二兩右作末酒糊丸白湯下二十丸法煮萆麻子出衛生寶鑑治諸癎病不問年深日近萆麻子去皮枝取仁二兩黃連去湏剉如豆大一兩右件用銀器水一碗慢火熬水盡即添水熬三日兩夜為度取去只用萆麻子仁風不得見日竹刀將萆麻子每枚切作四叚計五粒二十叚作一服用荆芥湯食後日進二服龍齒丹楊氏家藏方治因驚神志恍惚久而成癎時發時止紫蘇子一兩龍齒石菖蒲遠志鐵粉别研木香白殭蠶炒去絲嘴白花蛇酒浸一宿取肉焙乾稱炙黃橘紅硃砂别研留少許為衣麻黃去根節天麻去苗酒浸一宿焙天南星湯浸薄切片子生薑汁製一宿人參去蘆頭已上十三味各半兩全蝎一分去毒炒龍腦半錢别研麝香一錢别研右件為細末次入研者藥匀和煉蜜為丸每一兩作一十五丸毎服一丸薄荷湯化下食空四聖散楊氏家藏方治心經藴蓄發熱成癎潮作熱盛膈實涎多大便秘澁白礬川甘硝寒水石盆硝已上四味各等分右入甘鍋子内掲口用炭火煆入烟盡取出候冷研為末每服一錢新汲水調下食後日三服此藥非特治癎尋常上焦壅盛膈熱痰多亦可服來甦膏治逺年近日風癎心恙風狂中風涎沫潮閇牙關下不開破傷風搐並皆治之用將皂角一箇用好肥者無蟲蛀去皮弦切碎用漿水一大盌春秋三四日冬浸七日夏浸一二日揉取凈漿浸透皂角汁入銀器或沙鍋以文武慢火熬用栁條槐枝攪熬似膏藥取出攤在夾紙上隂乾収頓如遇病人取手掌大一片用温漿水化下在盞内用竹筒兒盛藥水將病人扶坐定頭微擡起將藥吹入左右鼻孔中内良久扶起涎出為驗欲要涎止將温鹽湯令病人服一二口便止忌雞魚生硬温麫等物治癎病出本草方以象齒屑為末炙令黃飲下止熱狂驚癎出本草方以菩薩石用水磨服之治暗風癎疾涎作暈悶欲倒者出本草方以芭蕉油飲之得吐便差極有奇效取之用竹筒挿皮中如取漆法治馬癎動發無時筋脉不收周痺肌肉不仁出本草方以野馬肉一斤細切於豉汁中煮著五味葱白調和作腌腊食之作羮粥及白煮喫妙治大人小兒久患風癎纒喉風咳嗽遍身風􅇙急中涎潮等此藥不大吐逆只出涎水出本草方用𤓰蔕不限多少細碾為末小兒壯年服一字十五以下老怯半字早晨井花水下一食頃含沙糖一塊良乆涎如水出年深涎盡有一塊如涎布水上如鑑矣涎盡食粥一兩日如吐多困甚即嚥麝香湯一盞即止矣麝香細研温水調下昔天平尚書覺昏眩即服之取涎有効治心熱風癎出本草方以黑驢乳食上煖服六合日再服驅風散出本草方治風癎鉛丹二兩白礬二兩右為末用三角磚相鬭以七寸紙鋪磚上先以丹鋪紙上次以礬鋪丹上然後用紙扭却將十斤柳木柴燒過為度出細研每服二錢温酒下治卒得癎出本草方用弔藤甘草炙各二分水五合煮取二合服如小棗大日五夜三大良治癎疾金燈花根似蒜者一箇以茶清研如泥令患者日中卧茶清調下仍旦卧日中良久吐出雞子大物永不發如不吐即以熱茶投之普濟方卷一百
