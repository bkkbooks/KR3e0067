body:
  text: 普濟方卷一百明周王朱橚撰諸風門癎論夫風癎病者皆由臟腑壅熱風邪干於心也心主於血故血壅而不行則榮衛氣澁血脉既亂神氣不定故發癎也凡少小有斯病者亦由五脉不流六氣逆行乳食不調風邪所中或先身熱瘛瘲驚啼而後發作其脉浮洪者病在於六腑及肌膚中則易治之若身冷不啼掣不驚呌病發時脉沉者病在於五臟若入於骨髓則難療也其喉口鼻乾燥大小便不利眼視不明耳後青色眠卧不安腰直目眄青筋生頭髪竪時時作聲口不噤吐白沫渾身煩熱頭上汗出恒多驚悸手足顫掉夢中呌喚目瞳子大是發癎之狀也凡人患風癎者只在一二年間則可治久則頑痰入心則難治矣治之之法先以吐痰為急次灸四際左右手大指去爪甲角如韭葉兩足大指亦如之各七壯或五壯漸服化痰鎮心藥如尋常十日一發服藥後漸退至半月一發則是已効半年可愈記一婦人心恙一年一發為灸勞宫二穴間使二穴陽谷二穴百會一穴自此竟不發方妙功十一丸出神効方治癎疾丁香木香沉香乳香麝香荆三稜炮廣茂炮黑牽牛微炒黃連雷丸炒鶴虱炒胡黃連黃芩大黃焙陳皮青皮雄黃熊膽甘草炙各半兩赤小豆三百六十粒煮用白丁香直尖者三百六十粒輕粉四錢巴豆七个右為細末赤小豆爛煮研泥同蕎麵打糊作十一丸硃砂為衣隂乾服時水浸一宿化一丸大便出隨病各有形狀取下為驗或作化一畨不可再服曽經火灸者不治遠年愈妙儒門事親書天麻烏蛇丸出聖濟總録治風癎心驚身熱瘛瘲搖頭口噤多吐涎沫不自知覺天麻酒浸一宿切炒烏蛇酒浸一宿去皮骨炙各一兩天南星將水浸一宿切焙二兩半夏將水煮過切焙半兩藿香葉烏頭去皮臍生用一兩白附子生用膩粉研各一分仙靈脾用葉半兩雄黃研鉛白霜研丁香各一兩犀角鎊屑人參各半兩麝香研龍腦研各一錢乾蝎全者去土炒一分丹砂研半兩槐膠一分桑螵蛸二十枚炙用蛇黃燒醋淬七次研一分右為細末入研藥六味拌匀鍊蜜和丸如梧桐子大每服十丸温酒下食後臨卧服鈎藤皮湯救急療癎老少增减方鈎藤皮麻黃去節各二分龍齒六分硏綿裹銀一斤寒水石梔子擘知母石膏碎綿裹杏仁去兩仁皮尖研各十二分升麻十分子芩十四分蛇蛻皮七寸炙蚱蝉四枚去足翅炙柴胡十分芍藥沙參各八分生葛汁五分蜜七合牡牛黃如大豆粒十枚煎成研下之右㕮咀以水六升淡竹瀝二升合煮取二升四合絞去滓内杏仁脂葛汁蜜於微火煎攪不停手令餘二升三合成三四歲一服二合五六歲一服二合半日再服稍增兒若大便濇者加大黃十分慎熱麵炙肉魚蒜粘食油膩冷水龍齒丸出聖濟方治風癎發即卒倒口吐涎沫手足俱搐一無所覺蘇而復發龍齒半兩細研虎睛一對微炙赤茯苓半兩鐵精三分人參半兩去蘆頭川大黃二兩剉碎㣲炒獨活一兩遠志半兩去心細辛半兩貫衆半兩鬼箭羽半兩天雄三分炮裂去皮臍露蜂房半兩微炒桂心三分鈎藤皮半兩蚱蝉七枚微炙衣中白魚三七枚川升麻半兩石膏一兩細研右為末入研了藥令匀鍊蜜和擣五七百杵丸如梧桐子大不計時候以荆芥湯下二十丸神應丸出聖濟總録治風癎吐涎沫手足瘛瘲心神不定狐肝二具烏鵶二隻去嘴足膓并鵶肚共狐肝入瓶内燒作灰蒺䔧子炒去角天麻白附子桑螵蛸炒金薄研各五十片乾蝎去土炒白殭蠶炒各二兩銀薄天南星炮麝香硏犀角鎊蝉蛻炒龍腦研各一分牛黃研烏蛇酒浸去皮骨炙二兩丹砂研各半兩右為細末鍊蜜丸如桐子大每服五十丸温酒下不拘時候或煎荆芥人參湯下日二服丹砂丸出聖濟總録治五種風癎丹砂研膩粉研蛇蛻炙兔頭灰銅青研􅔈砂水少許浸去石各一分古字錢三文燒赤投于􅔈砂水中滓盡至水盡搗白礬熬令汁枯研龍骨研老鵶灰研鹽花研鉛丹研各半兩虎睛炙搗一對虎牙炙搗一對髪灰研半分金薄研銀薄研各五片右將四味擣羅為末與别研十三味和匀再羅用猪血丸如櫻桃大每服二丸發時及晩間温酒嚼下麻黃飲出聖濟總録治風癎卒倒吐沫口噤手足瘛瘲麻黃去根節煎掠沫去焙大黃剉炒牡蠣熬黃芩去黑心各二兩凝水石碎石膏碎赤芍藥滑石碎紫石英白石脂俱碎各四兩人參桂去麄皮各一兩蛇蛻炙半兩龍齒研三兩甘草炙半兩右麄擣篩用絹囊盛懸于透空處每服五錢匕水一盞半煎至八分去滓食後久服銅青丸出千金方治風癎銅青與水銀同炒不盡更入少許硫黃同炒研水銀曾青研一作空青東門上雞頭亦謂之雞棲木醋炒搗各半兩硫黃研三分犀角鎊一作鳥羽卷柏去土各一分雄黃研一兩半石長生研白茯苓去黑皮白芷猪苓去黑皮白薇白歛生用人參各一兩右將九味擣羅為末與别研六味和匀重羅用青牛膽相拌入銅器内先布豆五升於甑中置藥器於上蒸之豆熟藥成丸如麻子大每服二十丸加至三十丸食後温酒化下日再夜一牛黃丸出聖濟方治風癎病精神不全常有痰在胷膈嘔吐不出煩悶氣壅者牛黃半兩細研龍齒二兩虎睛一對酒浸一宿微炒安息香一兩入胡桃仁搗熟硃砂二兩細研水飛過犀角屑二兩鐵粉二兩人參一兩去蘆頭獨活一兩蜣蜋去頭足翅微炒麝香半兩細研茯神一兩遠志一兩去心防風一兩半去蘆頭甘草一兩炙微赤剉右為末入研了藥令匀鍊蜜和擣五七百杵丸如梧桐子大每服不計時候以荆芥湯下三十丸治風癎因心藏積熱痰毒所為發即吐沫嚼舌出聖惠方水銀一兩鉛二兩與水銀結為砂子細硏牛黃一分細研銀薄五十片細研犀角屑三分熊膽半兩硃砂一兩細硏水飛過麝香一分細研羚羊角三分馬牙硝龍齒各二兩白殭蠶三分微炒白附子三分炮裂乾蝎三分微炒右為散都研令匀每服不計時候以防風湯温温調下二錢鉛霜丸出聖惠方治風癎久不差發時吐涎沫作惡聲音不識人鉛霜二兩細硏金薄細研銀薄各一百片細研人參去蘆頭茯神遠志去心細辛菖蒲苦參黃芩梔子仁犀角屑各一兩龍齒二兩細研硃砂一兩細研水飛過右為末入研了藥更研令匀鍊蜜和擣三五百杵丸如桐子大每服不計時候以薄荷湯下三十丸虎睛丸出聖惠方治風癎積年不差發即昏昏湏睡良久方惺虎睛一對酒浸一宿微炙鐵粉二兩細研黃丹二兩麥門冬一兩半去心焙人參去蘆頭元參沙參去蘆頭苦參各一兩剉金薄銀薄各一百片細研牛黃半兩細研馬牙硝黑鉛水銀一兩與鉛二味結為砂子細研右為末都研令匀鍊蜜和擣三五百杵丸如梧桐子大每服不計時候以温酒下三十丸勝金丸治風熱驚駭不時旋運潮搐口吐痰沫忽然倒死不省人事名曰癎病天南星白殭蠶細辛烏蛇真者好酒浸去骨川烏頭生皂角炙黃白礬枯桔梗葳靈仙何首烏草烏頭各一兩荆芥穗川芎各二兩右為末酒麫糊為丸如梧桐子大每服十丸食後温酒下紫石散治大人風引小兒驚癎瘛瘲日數十發醫所不療一名風引湯紫石英滑石白石脂凝水石赤石脂石膏各五兩甘草桂心牡蠣各五兩大黃龍骨乾薑各四兩右為麄散盛以葦囊懸於高凉處欲用取三指撮以新汲井水三升煮取一升二合大人頓服未百日兒服一合未能者綿沾著口中熱多者日四五服以意消息深師方只龍骨乾薑牡蠣滑石白石脂五味沉香天麻湯治癎瘛筋攣沉香一錢天麻三錢羌活五錢防風三錢益智仁一錢當歸一錢半獨活四錢半夏三錢湯洗川烏頭二錢炮炙甘草一錢半薑屑一錢半黑附子三錢炮去皮臍右㕮咀每服五錢生薑三片水煎魏敬甫云予四歲一長老摩頂授記衆僧念咒因而大驚痰涎壅塞目白頂背强喉中有聲一時方省後每見衣皂之人輒發多服朱犀龍麝鎮墜之藥四年餘前證仍在又添行歩動作神思如凝手診其脉沉弦而急黃帝鍼經云心脉滿大癎瘛筋攣又肝脉小急癎瘛筋攣蓋小兒血氣未定神氣尚弱因而驚恐神無所依又動於肝肝主筋故癎瘛筋攣病久氣小兒易為虚實多服鎮墜寒凉之劑復損其氣故行歩動作如痴内經云暴攣癎眩足不任身取天住穴是也天住穴足太陽脉氣所發陽蹻附而行也又癲癎瘛瘲不知所苦兩蹻男陽女隂又云晝發治陽蹻申脉穴在外踝下陷中容爪甲白肉際是也夜發治隂蹻照海二穴在於足内踝下陷中是也先灸兩蹻各二七壯然後服前藥鈎藤丸治少小癎病至大不除發即百脉攣縮行步不正口靣喎戾言語無度鈎藤鉛丹硏茵芋葉石膏各研杜蘅防葵秦艽去土甘草炙各一兩菖蒲九節者去節焙黃芩去黑心各一兩半松羅炒蜣蜋去翅足炒各半兩右將十味擣羅為末與别研二味和匀重羅鍊蜜丸如小豆大每食後良久服五歲以下五丸十歲以下七丸至十丸十五歲以上及長年並十五丸以意加减用金銀湯下鐵粉烏鵶散治積年癎病烏鵶去膓肚及嘴足鉛丹黑鉛鐵粉研各二兩丹砂一兩研先將鐵粉并研丹入鐵器内熟炒次入黑鉛一處結成砂子再入烏鵶腹内縫合以礶子盛用物蓋定鉛泥固濟收乾用熱火一秤煆令通赤取出搗為細末次入丹砂更研如粉後入七味天麻羌活獨活去蘆頭防風去义芎藭乾蝎去土炒天南星各二兩右為細散入麝香少許再研令匀每服半錢匕臨卧冷酒調服之牛黃丸治風癎瘛瘲口噤吐涎不知人牛黃麝香輕粉粉霜研各半兩金薄研銀薄各一百片研雄黃研細水飛丹砂研石緑研細水過蛇黃以下三味各煆醋碎九次研磁石石燕子各一兩右各研成粉拌匀以酒煮麫糊為丸如雞頭實大急風攤緩並五種癎疾每服一丸薄荷酒磨下老人半丸十歲以下一丸分四服四歲以下分五服未滿一歲分七服並蜜水下或髪直靣如桃花色口目俱開或俱閉喉中作聲汗出如油汗出不流下多㵼泄便血等惡候勿治惟口噤目開者下藥立愈羌活大風丸治男子婦人一切癎疾涎潮搐搦及中風延壅語言蹇澁手足不遂小兒急慢驚亦治一名羌活丸防風去蘆天麻浸一宿焙乾用明者全蝎去毒炒獨活羌活白芍藥一作白茯苓青黛各一錢半另研人參去蘆各三兩麝香各二錢川芎一錢半龍腦别研一錢水銀一錢入硫黃一錢同研結砂子右為末鍊蜜丸每服分作二十丸硃砂為衣大人服二丸小兒服一丸一歲以下半丸煎荆芥湯下食後臨卧發病時不以時候服茯神湯治風癎發動驚掣無時茯神去木龍齒研防風去义杏仁去皮尖雙仁炒羌活去蘆頭芎藭人參麥門冬去心焙大黃剉炒鈎藤甘草炙剉各一兩右將一十味麄搗篩與龍齒拌匀每服六錢匕水二盞煎至一盞去滓空心温服得利兩三行即止之銀液菖蒲丸治風癎涎盛精神减耗菖蒲人參黑錫各三兩同水銀結成砂子遠志去心羌活各一兩水銀同黒錫結成砂子白茯苓去黒皮天南星炮一兩半蝉蛻炒細辛去苗葉各半兩半夏湯洗七次二兩右為細末鍊蜜丸如梧桐子大每服七丸生薑湯下不拘時候銀薄丸治癎病積年不瘥得熱即發風痰漸多銀薄五十片研龍齒研麥門冬去心炒烏蛇去皮骨酒炙鐵精一作鐵粉人參防風去义黃芩去黑心升麻各一兩半熊膽研半兩生乾地黃焙一兩半右為末鍊蜜丸如梧桐子大每食後煎水下三十丸日二服一方無銀薄用水銀八分每服三十丸生驢乳汁下一方無黃芩有犀角屑治暴得驚癎効方鈎藤皮茯神黃芩升麻白蘚皮沙參各二兩龍齒三兩石膏八兩蚱蝉七枚去翅足研湯成用寒水石六兩碎研裹甘竹瀝二升湯熟内之右㕮咀以水九升煮取三升温分三服相去如人行六七里久若小兒患藥各减量取多少細細飲之立差忌醋物水銀丸治風癎累年不差痰毒轉甚精神减耗時時發動水銀三兩鉛三兩與水銀結為砂子細