body:
  text: 普濟方卷七十七眀周王朱橚撰眼目門目澁痛夫諸脉皆属於目目者血之府故人卧則血歸於肝肝受血而能視血氣和調則上助於目力而能卧視若肝臟有熱血脉壅燥則津液不能榮潤故目中乾痛而磣澁也夫悲哀内動液道開而泣下其液枯則燥其燥而澁痛者亦一證也决眀子丸出聖濟緫録治目赤昏暗澁痛心躁恍惚决眀子炒升麻車前子白茯苓去皮赤芍藥地骨皮山梔子黄連去鬚青葙子萎蕤牽牛子炒蕤仁去皮各一兩半秦皮去粗皮剉黄芩去黒心秦艽去苗土甘菊花大黄剉炒甘草炙剉各一兩右為細末煉蜜為丸如梧桐子大每服二十丸温水下食後服臨卧再服甘菊花散出聖濟緫録治風毒氣攻眼昏澁疼痛甘菊花羌活去蘆木賊荆芥穗芎藭各四兩甘草炙剉防風酒浸一宿黄茋切附子炮過蟬蛻洗蛇蛻一條卷在青竹上炙白蒺䔧去角旋覆花石决眀泥褁燒令通赤别研已上各一兩右除附子蛇蛻石决眀外餘皆剉碎於新瓦上焙令燥一時搗為細散每服二錢匕用苐二米泔煎熱後調下空心日午夜各一服菊花散出聖惠方治肝心壅熱眼澁痛甘菊花防風去蘆决眀子梔子仁黄芩車前子川升麻𤣥參地骨皮柴胡去苗麥門冬生地黄甘草炙㣲赤剉羚羊角屑各一兩右搗篩為散每服三錢以水一盞入淡竹葉二十七片煎至六分去滓每於食後温服忌煿油膩熱麺生菓菜青葙子蕤仁人參地骨皮麥門冬去心焙赤茯苓去皮半兩澤㵼前胡去蘆枳殻去穰麸炒甘草炙剉菊花防風去蘆各一兩黄連去鬚二兩右為末煉蜜為丸如梧桐子大每服三十丸食後温湯下前胡散湯治風毒上攻眼目赤澁或努肉侵睛頭旋心悶前胡去蘆頭旋復花各二兩桔梗剉炒犀角鎊羌活去蘆頭杏仁去皮尖雙人剉黄生乾地黄𤣥參黄芩去黒心甘草炙剉防風半夏為末生薑汁製作飯暴各一兩右為粗散每服五錢匕水一盞半生薑一分劈碎煎至八分去滓食後温服防風湯出聖濟緫録治肝臟風熱衝目赤澁痛風淚腫合兼治目倒􅀈防風去叉甘菊花萎蕤旋復花升麻决眀子㣲炒秦皮去粗皮黄連去鬚梔子仁甘草炙令赤剉麥門冬去心焙各一兩右粗搗篩每服五錢匕水一盞半煎至七分去滓食後臨卧温服㸃眼金華水治肝臟有熱血脉壅滯津液不榮目中乾澁磣痛黄連末一分硼砂踠豆大一塊研乳香黒豆大一塊研杏仁七皮尖雙仁七枚銅緑一字煅過研膩粉一錢細研龍腦半錢細研滑石半錢研青古老錢二文與諸藥同浸艾灰研各半錢右細研末為丸令勻與古老錢入在綿子内用井花水浸三七日後㸃目眥頭蟬蛻散治目腫澁痛或生瞖膜兼時疾後餘毒攻目方見本門目風腫類黄牛膽煎治眼澁黄牛膽汁鯉魚膽汁猪膽汁羊膽汁各半合熊膽一分胡黄連一分搗末黄連一分去鬚為末秦皮一分搗末白蜜三兩右將黄連秦皮胡黄連等末入白蜜并膽汁拌和入瓷瓶子内以油單封頭牽繋坐飯甑中蒸以飯熟為度用新綿濾過每以銅筯取如麻子㸃目眥頭二三度𤣥參湯治風目痛磣澁𤣥參茯神去木各二兩防風去叉升麻各一兩羚羊角鎊秦芃去苗土紫苑去苗土赤芍藥各一兩右㕮咀每服五錢匕水一盞半煎至去滓食後臨卧温服車前子丸治肝中乆熱目常澁痛車前子决眀子㣲炒梔子仁枸杞子熊膽各半兩黄連去鬚甘草炙㣲赤剉各三兩牽牛子炒熟一兩牛膽汁一合猪膽五枚取汁右除膽外為末以三味入膽汁中熬可丸即丸如梧桐子大每服食後以温水下十丸𤣥参散治眼澁痛連頭額偏痛肝心風熱壅滯所致方見本門目風暴腫類羚羊角湯治肝肺風熱壅目澁痛方見本門目風赤類䝉蜜花湯治肝熱目澁磣痛昏暗視物不眀蜜䝉花一兩楮實蒺䔧子炒去角甘菊花防風去叉蛇蛻各半兩右為細末散每服一錢匕臨卧食後温水調下日三羚羊角散治眼目澁痛漸漸昏暗羚羊角屑赤芍藥蕤仁湯浸去赤皮赤茯苓甘草炙㣲赤剉地骨皮麥門冬去心焙乾各一兩右㕮咀每服二錢以水一中盞煎至六分去滓每於食後温服通膈薺苨散治眼磣澁心胷煩悶方見本門風毒衝目虚熱赤痛類治一切眼昏暗赤澁疼痛怕見風日難開方龍腦一錢黄丹半兩雄黄􅅋仁湯浸去赤皮銅緑青鹽膩粉各一分右研如粉用白蜜半斤相和一團細瓷瓶盛於釜中重湯煑一復時取出候冷即用㸃三五度相次鹽湯洗之切冝避風洗眼方治眼赤磣并痒方在本門目臉腫硬類一名防風湯麥門冬湯治目眼睛如鍼刺痛目系急生磣澁疼痛一名木通湯麥門冬去心焙旋復花木通剉黄芩去黒心茯神去木各一兩大黄剉炒三分右粗搗篩每服五錢匕水一盞半煎至六分去滓投地黄汁一合更煎三兩沸放温入芒硝半錢於食後臨卧服蘆根湯治脾肺熱赤痒眥梢赤磣澁痛方見本門五臟風熱眼類黄連膏治眼赤澁疼痛不開兼飛血赤痛黄連去鬚蕤仁去赤皮研細辛各一兩川升麻黄蘖各半兩石膽豆大别研右細剉水三大盞煎至一盞半綿濾去滓入白蜜四兩相和煎令汁稠入研了石膽拌令極勻每日㸃少許於兩目眥上石决眀散治肝臟熱壅目赤澁痛石决眀井泉石石膏碎甘草生剉各一兩黄連去鬚菊花各二兩右為散每服二錢匕濃煎竹葉熟水調下洗眼方治眼目無時赤澁痛方見本門目臉腫鞭類類一方秦皮湯洗眀散治眼目澁痛諸疾蛤粉膩者木賊各四兩蒼术一斤半泔浸七日去皮切焙乾右為末每服一錢匕茶酒調下洗眼玉眀散治眼多淚磣痛赤澁秦皮刮剉作片子温水中洗四十九遍搗三千杵白滑石打碎青鹽二味同研如粉右等分再同研勻每用一字熱湯浸放温洗眼切避風少時𤣥精石散出聖濟緫録治眼赤澁𤣥精石半兩研如粉無以牙硝代之黄蘖去粗皮炙搗末一兩右研令極細㸃兩眥頭枸杞汁㸃眼方出十便良方治眼澁痛兼有瞖者枸杞葉車前子葉各二兩右熟𢷬之使汁欲出又别出大桑葉裹之懸於隂地經宿乃輕取汁㸃目中不過三五度瘥㸃眼黄連煎出聖濟緫録治肝熱赤目乾澁磣痛用黄連去湏半兩剉如麻豆分作二分一分磁噐内炒紫色一分生用同和别以木炭灰二錢匕與黄連同用沸湯半盞浸良乆以細熟絹濾取汁瓷噐盛就冷水内沉令極冷㸃眼中或更細研少許龍腦相和尤佳治眼澁痛方出龍木論治目痛澁不能視物及㸔日光並燈火光不得者用熱羊頭眼中白珠子二枚於細石上和棗汁研之取如小豆大安眼睛上仰卧日二夜二不過三四度瘥大黄丸出聖惠方治眼上焦積熱眼赤澁痛方見本門目赤痛類治眼去昏澁益眀快生熟地黄各二兩椒一兩右為末蜜丸梧桐子大每服二十丸空心鹽湯下芎藭湯出東垣先生蘭室空心藏方治目晝夜隠澁難開羞眀惡日視物昏暗赤腫而痛芎藭蔓荆子各五分華細辛根二分防風一錢半甘草炒白芷各一錢右㕮咀都作一服煎法如常臨卧服之治眼出衛生家寳方甘菊枸杞子油麻川芎等分右為細末食後嚼嚥下凡眼澁出衛生家寳方以薄荷煎泡湯洗目痒急及赤痛論夫肝經虚而風邪乘之則目痒心熱盛而血行湧溢則目赤二者各有所本今赤且痒而復瞼又急則以風熱交制於内而又外冐寒冷之氣故其證如此亦有痒而復痛者盖邪毒方熾氣血不得流通故時痛也龍木論云眼痒極難任外障此眼初患之時忽然時時痒極難忍此疾肝臟每伏客風膽家壅熱㣲上遂合眼目痒極難忍切冝鍼洗出瘀血火針針陽白穴太陽穴然後服烏蛇湯補膽丸還精散睛痒歌曰時時睛痒極難任此病根由誰與尋瞳子連氣清凈府遭他風熱上來侵他湏陽白將針刺湯用烏蛇可自輕此日不忘丸與散教君不染病根深又危氏得效方云眼痒極甚瞳子連眥頭並痒不能収瞼此因清净府先受風熱得知冝服驅風一字散也防風丸出聖濟緫録治眼生瞖目系急其瞖生瞳人上及臉腫合痛如鍼刺防風去叉山芋赤芍藥山梔子仁白茯苓去黒心皮各一兩半萎蕤芎藭各三兩車前子三兩秦皮去粗皮澤㵼獨活去蘆頭白㯽榔煨剉甘菊花擇羚羊角鎊各一兩右為細末煉蜜和丸如桐子大每服二十丸空心臨卧煎苦竹葉湯送下羚羊角丸出聖惠方治肝風氣上熱下冷眼瞼瞳人痒揉之不止羚羊角屑枸杞子兎絲子酒浸三宿曝乾鳥末各一兩半細辛赤茯苓地膚子桂心獨活秦芁去苗藍寔芎藭萎蕤各一兩車前子二兩甘草半兩炙㣲赤剉防風一兩去蘆頭右為末煉蜜和丸如梧桐子大每服於空心以粥飲三十丸下食前再服驅風一字散出危氏方治眼痛痒瞖膜川烏半兩炮去皮尖羌活防風各一分川芎荆芥各三錢右為末每服二錢食後薄荷湯下防風湯出聖濟緫録治風熱眼赤痛痒不定防風去叉甘菊花細辛去苗葉黄連去鬚各三分芎藭赤芍藥羚羊角鎊枳殻去穰麸炒甘草炙人參各半兩黄芩去黒心石膏右㕮咀每服五錢匕以水一盞半煎至一盞去滓食後臨卧温服夏枯草散出直指方治眼痛痒瞖膜夏枯草大香附杵凈童尿浸一宿晒木賊去節童尿浸晒細辛連翹蠶退紙炒焦存性川芎當歸赤芍藥蟬蛻洗晒各半兩甘草㣲炒炙腦荷各二錢半右為末每服二錢茶清米泔任下如無蠶紙以夜眀砂代用犀角芎藭散一名羚羊角散治乆患眼疾瞼𦂳難開視物不真方見本門劑􅀈拳攣類菊花湯出聖濟緫録治肝風邪熱衝眼澁赤痛痒不定甘菊花擇地骨皮去土升麻防風去义黄連去鬚赤茯苓去黒皮各半兩萎蕤柴胡去苗木通剉各一兩右㕮咀每服五錢匕水二盞半入竹葉七片煎至一盞去滓入芒硝末一錢於食後臨卧温服如腹臟易利少用芒硝升麻散出聖濟緫録治目昏下淚赤痒升麻乾薑炮各半兩山梔子仁决眀子炒車前子地膚子茺蔚子各一兩黄芩去赤心龍腦搗研各二兩右為細散每服二錢匕米飲調食後服日三眀水膏出聖濟緫録治風毒眼痒痛赤澁生瘀肉烏頭去皮腑生用青鹽白礬各半兩附子一枚去皮臍生用剉乳香半分銅青碙砂各一分黄連去鬚一兩半右剉如麻豆大用井華水五盞入瓷石鍋子内以慢火熬至七分綿濾去滓入研了龍腦半錢臨卧服之補膽丸出龍木論治眼痒極難任外障前胡馬兠苓柴胡茯苓各一兩半人參黒參桔梗細辛各一兩右為細末煉為蜜丸如梧桐子大每服空心茶下一十丸一方米湯下三十丸沙參散出聖惠方治風氣攻瞼眥致眼痒急似赤不赤沙參去蘆頭防風去蘆頭甘菊花赤芍藥地骨皮枳殻麸炒㣲黄去穰各一兩甘草半炙㣲赤剉一兩黄耆一兩半剉右為散每服四錢以水一中盞煎至六分去滓不計時候温服之烏蛇散出聖惠方治眼風熱赤痒急日夜不止烏蛇二兩酒浸去皮骨炙令黄槀本防風去蘆頭赤芍藥羌活各一兩半芎藭一兩半細辛甘草各半兩右為細散不計時候以温水調下二錢一方無甘草用米飲調下綘雪散出聖濟緫録治肝心風熱邪毒上攻目赤痒紅雪生麥門冬去心萎􅅋秦皮去粗皮赤茯苓去黒心皮各一兩升麻淡竹葉五七片右除紅雪外搗為散每服三錢匕水二盞煎至一盞抄紅雪半錢匕調勻食後温服還睛散出龍木論治眼痒極難忍外障防風二兩車前子黒參决眀子五味子細辛各一兩半知母半兩右為細末每日食後米飲調下一錢葛根湯出聖濟緫録治眼痒瞼急葛根剉烏賊魚骨桑根白皮地骨白皮各一兩半白魚皮各一兩右㕮咀每服五錢匕水一盞去滓食後臨卧温服之良石膽膏出聖濟緫録治風毒退瞖膜去風痒石膽半錢烏賊魚骨半字乳香一錢蜜一皂角子大龍腦少許右合研勻入新汲水半盞相和以帛濾過入瓷瓶内用新汲水浸瓶十日每用㸃眼㸃了用青鹽湯熱洗㸃時不得犯銅鐵筯只用雞翎瀝在眼内熊膽膏出聖濟緫録㸃眼古