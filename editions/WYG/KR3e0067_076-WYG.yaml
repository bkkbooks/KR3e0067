每服四錢匕水一中盞煎六分食後服黄連膏出聖濟緫録治眼飛血赤痛昏暗方在本門澁痛類地黄散出本草事方治飛血赤脉及血灌曈人疼痛生乾地黄焙大黄剉炒朴硝研各二兩沒藥研半兩右為散每服一錢以温水送下食後臨卧服黄連㸃眼方出聖濟緫録治肝心熱上衝飛血赤脉方見本門目赤腫痛類㸃眼杏仁膏出聖濟總録治肝飛血赤脉杏仁湯浸去皮尖研半兩黄連去鬚一兩輕粉五分右以新綿裹水一盞浸一時服目日三五度㸃之梔子仁湯出聖濟緫録治飛血赤脉及痛腫方見本門目赤痛類洗眼車前草方出聖濟緫録治目飛血脉暴眼熱痛車前子草切半兩乾藍葉切二升淡竹葉净洗剉三握右以水四升煎取二升濾去粗㣲熱洗眼冷即重煖以瘥為度一方入好鹽半兩冷洗良蕤仁洗眼湯出聖濟緫録治飛血赤脉及發痛蕤仁去皮研一兩細辛去苗葉半兩苦竹葉洗細剉三握右以水二升煎取一升濾去滓㣲洗眼冷即再煖以瘥為度㸃眼蕤仁膏出聖濟緫録治風熱飛血赤脉仍痒痛無定蕤仁去皮細研用半兩好酥一栗子大右將蕤仁與酥相和研令勻攤碗内後取艾一小團燒令煙出既出即將碗覆烟上熏候艾烟盡即止重研令匀每以麻艾火㸃及眥頭日三度攑皮洗眼方出聖濟緫録治飛血赤脉櫸皮去粗皮二兩古文錢七文右以水一升半煎取七合去滓熱洗冷則再煖魚膽傅眼膏出十便良方一名神效方治飛血赤脉及痛暴赤眼澁鯉魚胆五枚黄連去湏為末半兩右取胆汁調黄連末内磁合盛於飯上蒸一次取出乾即入蜜少許調似膏塗傅目眥日五七度目血灌瞳人論目属肝肝受血而能視則目之瞻視必資血茍因受損傷致血脉散亂則敗血侵睛灌注瞳人其痛如灌刺然無瞖膜覩物不眀亦或由肝氣閉塞血無所皈而得宜引血歸肝又云由肝心乆積熱毒所致也心主血人卧血歸於肝若為風熱伏留胸膈壅滯則血上行灌注於目也亦有因用針失度惡血不消流漬於眼則疼痛難忍冝早療之免有所損也龍木論云又血灌瞳人外障此眼初患之時忽因物誤刺着或即針之失度致令一眼先患後乃相牽俱損葢為疼痛難忍卧時好眼安着枕上使流毒血在好眼先患之中致令損也先冝服之疼痛沒藥散後眼錐墜血眀目丸㸃摩挲石散立效歌曰眼因射刺五輪􅉻疼痛睚中若受椎好眼卧時安着枕使流惡血隔光輝可怜清淨無瑕瞖沉沒眀珠甚可危湏用婆娑為藥㸃却交惡血本鄉歸車前子散出醫方大成治肝經積熱上攻眼目逆順生瞖血灌瞳人羞眀多淚宻䝉花去枝葉羌活菊花白蒺蔾炒去刺粉草草决眀車前子各炒黄芩龍膽草凈洗各䓁分右為細末毎服二錢食後飲湯調服生乾地黄散出聖惠方治眼肝心積熱血灌瞳人腫痛生乾地黄一兩蒲黄三分犀角屑三分黄連三分去鬚黄芩𤣥參川升麻各一兩川大黄一兩剉碎㣲炒甘草半兩炙㣲赤剉右為散毎服三錢以水一中盞煎至六分去滓每服於食後温服忌炙煿熱麺治眼血灌瞳人生障膜出聖惠方用生地黄汁每温服一錢匕頻服以瘥為度麥門冬散出聖惠方治眼血灌瞳人昏澁赤痛麥門冬一兩半去心焙川大黄剉砂㣲炒黄芩地骨皮𤣥參葳蕤各一兩犀角屑甘草炙㣲赤剉各半兩右為散毎服三錢以水一中盞煎至六分去滓入馬牙硝半錢每於食後温服之墜血眀目丸出龍木論治血灌瞳人外障石决眀芎藭五味子乾山藥知母各一兩細辛人參各一兩半右為末煉蜜丸如梧桐子大空心茶下一十丸麥門冬湯一名㵼肝散出龍木論治血灌瞳人昏澁疼痛兼治轆轤轉闗外障麥門冬去心焙大黄剉炒黄芩去黒心桔梗剉炒𤣥參各一兩細辛去苗葉芒硝研各半兩右除芒硝外粗搗篩每服五錢匕水一盞半煎取七分去滓下芒硝末少許食後臨卧温服人參湯出聖濟緫録治血灌瞳人澁痛兼治内障散瞖人參赤茯苓去黒皮一方用白茯苓細辛去苗葉五味子桔梗炒各一兩車前子防風去叉各半兩一方各二兩右麄搗篩每服五錢匕水一盞半煎取七分去滓食後臨卧温服通血丸出危氏方治血灌瞳人生地黄焙赤芍藥甘草五錢川芎防風荆芥當歸尾各一兩右為末煉蜜丸如彈子大食後荆芥薄荷茶嚼下血既散而歸肝又恐眼目生花湏再用還睛散决眀湯出聖濟緫録治血灌瞳人石决眀人參芎藭細辛去苗葉五味子各一兩赤茯苓去黒皮二兩右為末搗篩每服五錢匕水一盞半煎七分去滓食後臨卧温服真珠散出聖惠方治眼血灌瞳人生障膜真珠末水精琥珀末各半兩朱砂馬牙硝半兩龍腦右為同研如粉每服以銅筯取如半小豆大㸃之槐花當歸散治眼目血灌瞳人如水眼睛脹痛槐花炒赤四兩何首烏川芎當歸各二兩甘草炒許右為細末毎服二錢食後米泔水調下沒藥散治眼血灌瞳人疼痛不可忍沒藥一兩半騏驎蝎一兩川大黄剉碎㣲炒川芒硝生乾地黄各一兩右為散於食後温水調下二錢服之一方無生乾地黄娑婆石散出龍木論治血灌瞳人外障娑婆石少許曽青半兩龍腦石膽各一分右為末令細早晨夜後㸃眼地黄散出聖濟緫録治血灌瞳人疼痛不可忍方見本門飛血赤脉類又方出仁存方一名挧眼膏治眼血灌瞳人障膜生地黄五兩爛研川大黄一兩搗羅為末右為相和以帛子剪作片子如兩三指長濶勻攤藥於上以銅噐中盛仰卧貼眼覺熱即更換冷者芎黄散出衞氏家寳方治血灌瞳人及睛疼白牽牛炒大黄煨川芎各等分右為細末每服三錢臨卧用砂糖水調下睛疼温酒調下桔梗丸出保命集方治太陽經衞虗血貫瞳人瞼重頭中濕滛膚脉睛痛肝風盛眼黒腎虚桔梗一兩牽牛頭末三兩右為末煉蜜為丸如梧桐子大每服四十丸加至百丸食前温水下日三服治眼􅀈人出本草以五加皮花搗末酒調服自止赤脉衝貫黒睛論夫眼者五臟之精華若風邪熱毒内干臟腑則隨其經絡上衝於目故令赤脉衝貫黒睛也上下左右各有部分不可不察其從大眥起者手太隂脉動胃熱也其從小眥起者手少陽脉動虚熱也其自上而下者足太陽動邪熱也其自下衝上者足太陽陽眀脉動邪熱也其源不同當察其部分依經以治之龍木論云眼小眥赤脉外障此眼初患之時皆從小眥漸生赤脉奔大來睛上皆因三焦聚熱上衝肝膈壅熱使然治療稍遲以恐損眼也冝服犀角飲子後㸃摩瞖膏即瘥歌曰赤脉根源小皆從安然漸漸覺相衝三焦聚熱為災患欲療先令飲子通浮大必須鈎割烙頻頻用藥即消融鹹酸物熱房中事謹戒當如受戒同摩頂眀目膏出聖濟緫録治風熱衝目赤脉弩肉生麻油二升真酥五兩車前子葉淡竹葉洗剉鹽花研各半兩吳藍大青黄連去鬚山梔子仁生犀角鎊甘草炙麥門冬去心槐白皮栁白皮黄芩馬牙硝别研朴硝馬齒莧寔研各一分右除硝鹽油酥外細剉綿裹入通油膩瓷瓶中綿幂口重湯煑三伏時捩去滓新綿濾置生鐵噐中每日飯後及卧開髪滴頂心生鐵熨斗子摩頂三千下兼去目中熱毒昏脹痛澁前胡湯出聖濟緫録治肝實熱赤脉衝眼睛前胡去蘆升麻秦皮去粗皮决眀子㣲炒􅅋仁去皮研如膏各二兩菊花一兩半細辛去苗葉梔子仁各一兩苦竹葉洗芒硝湯澄一分大黄剉砂碎熱一兩右除芒硝竹葉外粗搗篩每服五錢匕水二盞入竹葉七片煎至一盞去滓入芒硝一錢匕於毎食後臨卧服真珠散出聖惠方治風熱赤脉貫黒眼及有花翳真珠末琥珀各二分龍腦丹砂各半分硇砂小豆大右同研細末毎服日三五次㸃之犀角散一名生犀飲治眼赤脉衝貫黒睛熱毒腫痛心躁煩亂方見本門目赤腫痛類犀角飲子出龍木論治眼小眥赤脉外障犀角羚羊角大黄人參茯苓知母黄芩各一兩桔梗防風各二兩右為末以水一盞散一錢煎至五分食後去滓温服黄芩湯出聖濟緫録治風熱目赤痛赤脉貫黒睛生翳黄芩去黒心木通剉枳殻去瓤夫炒甘草㣲炙剉萎蕤山梔子仁生乾地黄各一兩芒硝湯澄下右除芒硝外粗搗篩每服五錢匕水二盞煎取一盞去滓入芒硝一錢食後温服臨卧再服羚羊角湯出聖濟緫録治眼目下腫赤脉攻黒睛方見本門目飛血赤脉類黄連煎出聖惠方治肝臟壅熱目生赤脉衝貫黒睛赤痛不止方見本門目生努肉類黄耆湯出聖濟緫録治眼上下赤脉貫黒睛黄耆剉芍藥知母升麻犀角屑各一兩半苦竹葉五十片右㕮咀每服五錢匕水二盞煎至一盞去滓入芒硝少許再煎沸温服不拘時赤芍藥湯出聖濟緫録治目小眥赤脉利心肺芍藥芎藭黄芩去黒心大黄剉炒熟甘草炙赤剉各半兩黄連去鬚一兩右㕮咀毎服五錢匕水二盞煎至一盞去滓食後臨卧温服羚羊角丸出聖濟緫録治肝肺壅熱眼生努肉赤脉澁痛及眼障翳目睛痒痛羞眀及小兒風疳爍陽眼赤羚羊角錯末昨葉何草炒絹内洗去土各一兩生乾地黄洗焙欝金炮土上出火毒各二兩甘草生剉何首烏去白皮者各一兩右細剉暴乾搗羅為末煉蜜和丸如梧桐子大每服十五丸濃煎淡竹葉黒豆湯放冷於食後臨卧服小兒丸如菉豆大毎服七丸至十丸摩瞖膏出龍木論治眼小眥赤脉外障兼治血灌瞳人漸生瞖障石决眀一分真珠末一分水晶一分朱砂一分龍腦一分琥珀二分右為末如粉麺後入酥為膏每至夜後㸃眼立效一方不用酥通眀湯出聖濟緫録散三焦熱治小兒眥偏赤赤脉射黒睛木通剉萎蕤甘草炙各一兩半黄芩去黒心枳殻去瓤麸炒各一兩右㕮咀每服五錢匕水二盞煎至一盞去滓下芒硝及下生地黄汁各少許再煎沸食後温服蕤仁煎出聖惠方治眼風熱磣澁生赤脉衝注瞳人熱淚疼痛蕤仁一兩湯浸去皮赤研青鹽三分黄連一兩去鬚搗研右以醋醤水一中盞煎取一小盞去滓内一銅噐中别取鯉魚膽烏鷄膽各一枚取汁入煎藥汁中用槐枝如指大長一尺去皮作槌研之勿住手自晝研到夜以綿濾過於瓷合中盛每以銅筯少許㸃眼眥中甚佳普濟方卷七十七
