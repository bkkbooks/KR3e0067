十斤切以東流水四石煮一日夜取清汁一石浸麴一如家醖法熟取清貯不津器中内乾地黄末二斤半桂心乾薑澤瀉蜀椒末各一升啇陸末二升以絹袋貯内酒㡳𦂳塞口埋入地三尺堅覆上三七日沐浴整衣冠再拜平曉向甲寅地日出處開之其酒赤如金色旦空腹服半斤十日萬病皆愈二十日瘕痕减惡疾人以水一升和酒半斤分五服愈千金翼又云若欲服石者取溪中青白石如棗杏大者二升以水三升煮一沸時以此酒半合置中須臾即熟可食生枸杞子酒出聖惠方主補虚肌肉益顔色肥健能去勞熱用枸把子五升以好酒二斗搦勿碎浸七日漉去渣飲之初以三合為始後即任性飲之石斛酒出聖惠方主補虚勞益氣力除腰脚痺弱利闗節堅筋骨及頭面遊風石斛四兩去根黄茋丹参二兩杜仲去粗皮牛膝去蘆人参去蘆頭五味子白茯苓山茱茰薯蕷萆薢防風生薑已上各二兩枸把子天門冬去心薏苡仁已上各三兩細辛一兩右都細剉以生絹袋盛用酒五斗於磁甕中浸之七日開初温服三合日再服漸至一盞為度又方出聖惠方治風虚勞腹内冷不多食石斛四兩去根丹参芎藭杜仲去粗皮防風去蘆頭陳橘皮湯浸去白焙白术人参去蘆頭桂心五味子白茯苓黄茋薯預當歸已上各二兩乾薑炮製牛膝去苖各二兩甘草一兩炙微赤右細剉生絹袋盛用清酒五斗於甕中浸七日開初温服三合日再服漸加至一盞為度又方出聖惠方治風痺脚弱腰胯冷疼利闗節堅筋骨令人强健悦澤宜服石斛十兩去根牛膝半斤去苖杜仲四兩刮去粗皮丹参四兩生地黄切一斤晒令水氣乾右細剉以生絹袋盛用清酒五斗於甕中宻封浸七日開每服一中盞日可二三服之薯蕷酒出聖惠方治頭風眩不能食補益氣力薯蕷山茱萸白术五味子已上各八兩防風十兩去蘆頭人参去蘆頭丹参生薑已上各六兩右細剉生絹袋盛用清酒三斗入磁甕中浸七日開每度温飲一盞日三杯為定生薯藥酒出聖惠方補虚損益顔色用薯藥於砂盆中爛研然後刮下於銚中先以少酥炒一大匙令香次旋添入酒一盞煎攪令匀空腹飲之佳菊花酒出聖惠方治八風十二痺補虚損不足菊花五加皮枸把根白术已上各八兩甘草秦芁去苖各四兩生地黄一斤切右搗碎以水三石煮一石以糟牀壓取汁用糯米一石炊熟細麯十斤搗碎拌和令匀入甕中宻封三七日取飲任性不得過醉菊花酒出聖惠方壯筋骨補髓延年益壽耐老菊花生地黄枸把根各五斤右搗碎以水一石煑取汁五斗炊糯米五斗細麯碎同拌令匀入甕宻封候熟澄清每温飲一盞日三杯菖蒲酒出聖恵方主大風十二痺通血脉調榮衛治骨立痿黄醫所不治者服一劑經百日顔色豐足氣力倍常耳目聰明行及奔馬髪白更黒齒落更生晝夜有光延年益夀久服得與神通用菖蒲削治切薄晒乾一斗生絹袋盛之以好酒一石入不津甕中安藥囊在酒中宻封泥之百日發視之如緑葉色復炊一斗秫米安酒中復封四十日便漉去滓温飲一盞日三次其藥渣曝乾搗羅為散酒調一錢服之尤妙一切三十六種風有不治者悉效又方出聖恵方用菖蒲搗絞取汁五斗糯米五斗炊熟細麴五斤搗碎相拌令匀入甕宻蓋三七日即開每温飲一中盞日三服之又方出聖恵方菖蒲一斗細剉蒸熟生术一斗去皮細剉右入絹袋盛用清酒一斗入不津甕中盛宻封春冬二七日秋夏一七日取開每温飲一盞日三次令人不老强健面色光澤神效松葉浸酒出聖恵方除一切風攣跛蹷疼悶手不上頭腰背强直兩脚酸疼頑痺不能久立半身不遂頭風耳聾目暗見風淚出鼻不聞香臭唇口生瘡惡疰流轉如錐刀所刺皆悉主之松葉七斤獨活十兩麻黄十兩去根節右細剉入生絹袋盛以酒五斗入甕宻封浸之春秋七日冬十日夏五日侯日足每温飲一小盞日三次松葉浸酒去大風治骨節疼痛五粒松葉二十斤剉碎浄洗漉乾清酒一石右入不津甕中宻封七七日熟量力飲之松脂酒治大風有驗松脂三斤煉成者搗羅為末糯米二斗麴二斤右炊米熟方冷以炊米湯五斗温温都拌和入不津甕中封蓋候熟即量性飲之松節酒治百節風虚脚痺疼痛松節十斤搥碎以水一石煮取汁五斗去滓糯米五斗炒熟細麴五斤搗碎右拌和入甕中宻封三七日開取酒可温飲一盞日三服柏葉酒治𫝊尸骨蒸瘦病柏葉三十斤搗碎以水一石煮取汁五斗黍米一石浄洗細麴十斤右以柏葉汁浸麴發動即炊米熟候冷拌匀入甕宻封二七日開壓取酒日三度量力飲之以差為度术酒方用术三十斤去黒皮淨洗搗碎以東流水三石於不津器中浸之二十日壓漉去滓以汁於甕中盛夜間候流過時抄自己姓名置在汁中如是五夜其汁當變如血旋取汁以浸麴如家醖造法造酒酒熟任性飲之十日萬病除百日白髮再黒齒落更生面有光澤久服延年不老忌桃李雀肉又方用术五斗水淘刷去黒皮晒乾粗搗以水一石煑令極軟稍稍益水少取汁看候黄色乃壓漉取汁可及七斗一石炊熟細麴一斤搗碎以术汁都拌入甕中宻封三七日開日飲三杯久服延年不老忌桃李雀肉又方用术煎一斗好酒三斗相拌入磁甕中盛泥封頭三七日開初服一盞後即任意勿至醉為妙五十日諸病皆愈氣力十倍行及奔馬忌桃李雀肉神仙烏麻酒治虚勞補五臟久服延年不老用烏麻子三升微炒搗碎以酒二斗浸經宿隨性飲之盡即旋造烏麻酒除風氣令人充恱強壯用烏麻投水中掠去浮者取一斗九蒸九晒令香以木杵臼搗碎用疎生絹袋盛之令極寛轉即結袋頭又以細繩子接繫袋取懸於甕中用無灰酒五斗以新盆蓋覆甕其盆底上鑚下一小竅引出繫袋繩頭又繫於小横子上以泥封固莫使洩氣每日六七度引挽其繩令藥汁於酒中滿七日藥成乃開甕舉袋瀝汁令盡冬温夏冷隨性飲之不令至醉若此以酒浸石斛丹參牛膝杜仲石英磁石等補脚腰尤善未盡一劑充恱倍常亦無所忌患風者宜用大麻子蒸熟炒香搗入袋中一方烏麻法作大良矣五加皮酒治風痺不仁四肢攣急疼痛用五加皮細剉一升以清酒二斗浸十日温服一中盞亦可與术地黄各二十斤細剉以水一石五斗煑取汁一石浸細麴一斤黍米一石浄洗炊熟拌和入甕蓋覆如法候熟任性飲之不令至醉桃仁酒桃仁一千二百枚湯浸去皮尖雙仁清酒三斗右先搗桃仁令碎炒盆中細研以少酒絞取汁再研再絞使桃仁盡即止都入小磁甕中置於釜中以重湯煮看色黄如稀􅄳便出每服一中盞日二次其味甚美女人服之更佳令人光恱下三蟲益顔色紫蘇子酒治風順氣利膈神效紫蘇子一升微炒清酒三斗右搗碎以生絹袋盛安酒中浸一宿少飲之丹參酒通九竅補五臟令人不病丹參五斤清酒五斗右浄洗晒乾水氣寸切以絹袋盛安於酒中浸三日量力飲之佳䑕粘子酒治一切風用䑕粘子一斗以水淘去浮者晒乾搗碎於浄砂盆内入無灰酒五升研令極爛即以絹羅濾取白汁其滓再以酒五升研之候濾白汁盡為度續入酒一斗相和令匀安不津器中宻封春秋二七日夏一七日冬三七日足則開每日平旦以物攪起令濁即取温服一小盞盡次一盞服訖封之勿使氣洩良久方可飲食晩間再服主大風手足癱緩收與不得病重者不盡兩石即差若初覺時急服不過一二斗差亦療瀝節風痛賊風二痺頑麻重者不過五斗差腰脚疼痛筋骨急重病後汗流不止四肢強直服三年差或因熱食體中如錐刺口喎面戻頭旋心悶嘔吐風在心藏服三四斗差矣葡萄酒出聖恵方駐顔煖腰腎乾葡萄一斤末細麴末五升糯米五斗右炊糯米熟候冷入麴并葡萄末攪入匀入甕蓋覆候熟即飲一盞五枝酒出聖恵方治中風手足不遂筋骨攣急夜合枝花桑枝槐枝柏枝石榴枝已上並取東南者各半斤剉防風去蘆頭羌活各十兩糯米五斗小麥麴五升末黒豆揀擇𦂳小者二斗右已上五枝用水一石煎取五斗去滓澄濾浸米及豆二宿漉去蒸熟後更於藥汁内入麴并防風羗活等末同攪入甕如法蓋覆候酒熟時飲一盞常令醺醺甚有大效天蓼术酒出聖恵方治膝補五勞袪風益氣天蓼术十斤剉􅐕米一石細麴十斤搗碎黑豆二斗右以水三石先煮天蓼术取汁一石去滓其秫米黑豆一處淨淘蒸熟放冷以藥汁都拌和令匀入不津甕封三七日開温服一盞日再為度商陸酒出聖恵方商陸末五斤白色者天門冬五斤末細麴十斤搗碎秫米一石淘浄右先炊米熟放如人體温别煎熟水一石放冷都拌和令匀入不津甕中宻封釀六十日成去滓隨性飲之五日食減二十日腹滿絶穀不復用食尸蟲並瘢痕皆滅此方出五符中忌犬肉三石浸酒出聖恵方治腎氣補虛損磁石八兩白石英十兩細研陽起石六兩右搗碎以水淘清後用生絹袋盛以酒一斗浸經五日後任意暖服其酒旋取旋添極妙地仙酒出十便良方廬山譚先生年五十嵗服此酒至一百四十嵗上昇老硫黄花椒各四兩訶子七十二個右三味各生絹夾袋盛麻線繫口如法每用酒一斗浸十日為度硫黄永不換椒一季一換如服一升却入好酒一升如服半升却入好酒半升或一升服至經年髮鬢再黑煖水臟明目皮肉紅潤康健延年久服無毒自然減綿衣合時忌雞犬婦人見每晨服一盞臨睡再服服餌五加方出本草魯定公單服五加酒以致不死靈隠公佯託死時人亦莫知晤耳張子聲楊建始王叔才于世彥等皆服此酒而房事不絶得夀三百嵗有子二十人世世有得服五加酒散而獲延年不死者不可勝計或只為散以代湯茶而餌之驗亦然也雞蘇酒出本草以雞蘇釀酒并漬酒常服之佳煎藥方地黄煎出聖恵方大補益養命延年駐顔不老生地黄汁三升酥二斤蜜三升棗膏二升髓一升牛羊皆得用杏仁一升湯浸去皮尖研用之生薑汁一升天門冬十兩去心黄茋八兩剉紫苑六兩去苗土桔梗五兩炒蘆頭甘草八兩炒炙微赤五味子八兩百部六兩狗􅆃七兩丹參八兩牛膝十兩去苗杜仲十兩去粗皮防風七兩去蘆頭麥門冬六兩去心地骨皮十兩桑根白皮十兩桂心六兩羗活六兩肉蓯蓉十兩酒浸去粗皮白茯苓十兩薏苡仁十兩右天門冬二十味細剉以水七斗煎取三斗攪去粗和生地黄汁生薑汁綿濾于銅鍋内以微火煎之三分減二即下酥蜜髓及棗杏仁等相合以重湯煎以物數數攪之可如稀􅄳即止以磁瓶貯之每服以温酒調服一匙日二服地黄煎出聖惠方補五勞七傷長肌肉填骨髓生地黄汁一斗生薑汁一升酥一斤蜜一斤杏仁一升湯浸去皮尖研右先取地黄汁於銀鍋中煎如稀餳内薑酥蜜杏仁等和更煎令調于不津器中盛每服以酒調一蜆殻服之日三度九仙薯蕷酒出聖惠方治腰脚疼痛腰内一切冷病服之令人肥白顏悦澤身體輕健骨髓堅牢行如奔馬久服可為地仙矣薯蕷一斤杏仁一升湯浸去皮尖雙仁生牛乳三升右研爛杏仁入牛乳絞取汁以杏仁盡為度後取薯蕷相和都入新磁瓶盛之宻封瓶口安于釡中以重湯煮一復時乃成每日空心以温酒調一匙服之枸把子煎出聖惠方是西河女子神秘有驗千金不𫝊又名神丹煎服者去萬病通神明安五臟延年不老并主婦人無子冷病有驗能常服令人好顔色年如十五六時枸把子三升生地黄汁三升杏仁一斤去皮尖雙仁研膏麥門冬汁半升人参末三兩白茯苓末三兩右已上四味入銀鍋内以慢火煎如稀餳安参苓末攪匀又以慢火煎候如膏滴入水不動即成每服一􅀥大酒和服之日二服枸把煎出聖惠方填骨髓補虚勞益顔色久服老者反少身輕明目延年枸把根切三斗净洗漉乾生地黄汁二升鹿髓一升􅀥膏半斤右先將枸杞根以水五斗煎一斗去渣澄清安鍋中煮取汁三升安地黄汁鹿髓􅀥膏以慢火煎如稀餳每服以温酒調半匙日三服枸杞煎出聖惠方大補益令人充悦及治諸風久服延年枸把根洗刮去苖土細切三斗勿令塜墓上者以水七斗煮取一斗右相和入銀鍋内以文火煎如稀餳用磁器宻封盖每日空心以酒調半匙服之晚再服亦善枸把煎出王氏𫝊濟方明目悦顔壯元氣潤肌膚用採枸把子不枸多少去蒂滑水洗淨淘出挖乾用夾布袋一枚入枸把子在内於砧上推壓取自然汁澄清一宿石器内慢火熬成膏安磁器内收每服半匙温酒調下久服大有益如合時天色稍暖其壓下汁更不用經宿其煎熬下三兩年並不損壊如久逺服多煎下亦無妨天門冬煎出聖惠方治大風有騐久服延年不老用天門冬一石去心安磁器中宻盖口以蠟封其上埋燥室中經一年開㸔如糖色搗羅為末蜜調如餳每服一大匙日三服忌鯉魚天門冬煎出聖惠方益氣力延年不老用生天門冬十斤去心剉碎以酒五斗和絞取汁安銅器中入白蜜一升重湯煮之如餳每服温酒調一匙日三服得地黄和更佳忌鯉魚术酥出聖惠方去風消食補益不可具述用秌末肥术三石以水刷去黑皮晒乾木臼中搗碎即于缾中薄鋪白茅茅上施布即下术以布掩之以合蒸一炊取下入盆以湯拌濕潤再入瓶蒸一炊久便入酒糟中壓令汁盡其汁入銀鐺以重湯煮不住攪之時取少許看硬軟如常酥即成貯于不津器中不計時候以温酒調􅀥許久服之甚良忌桃李雀肉术煎出聖恵方除百病輕身明目久服斷榖延年用好术一石以水洗去黑皮細剉以水三石煮至一石去渣取汁以黍米三斗磨作末安汁中微火煮之令稠可作餅子圓闊二寸許每服以酒下一枚日三服忌桃李雀肉神仙术煎出聖惠方取术新從山劚出者不拘多少去苖净洗木臼中熟搗新布絞取汁如此三兩遍汁出盡為度于銀器或磁器中煎令如餳即成矣每日以温酒調服一合隨性空喫尤佳久服輕身益氣祛風寒不饑渴百病皆除忌桃李雀肉麥門冬煎出聖惠方治結氣腹中傷飽胃弱脉微羸瘦短氣身重面黄心下支滿虚勞客熱口乾躁渇心煩嘔吐愈痿蹷强隂益精消榖調中保神定氣安五臟令人肥健美顔色有子久服身輕不老不飢用新麥門冬五斤去心搗令熟絞取汁入白蜜半斤于銀鍋内以重湯煮不住手攪候如飴即盛于不津器毎服以温酒調半匙服之薔薇散煎久服令人輕健用薔薇根莖碎剉熟蒸曝乾為末每服酒調二錢日三服亦可濃煮汁為煎酒調服更佳鹿角膠煎治五勞七傷身無潤澤腰􅆃疼痛四肢沉重久填骨髓好顔色袪風氣潤髮鬢鹿角膠一斤炙黄研為末生地黄汁五斤生乾薑汁半斤紫蘇子半斤研以酒三升絞取汁牛酥半斤白蜜半斤煉蜜熟掠去末右煎地黄生薑紫蘇等汁可五分耗一次下蜜次下酥又煎三五沸即下膠末攪匀更煎如稀餳傾於不津器中盛之每服以温酒調一匙服之日二服鹿角膠煎鹿角膠三兩搗碎炒令黄搗羅為末牛乳一升白蜜一合牛酥一合生薑汁一合右先煎乳熟即下膠消訖次下薑汁次下蜜惟須緩入煎十煎沸傾於瓷器中仍數數攪匀令酥乳於上待凝以竹刀割為小片每食後細細含嚥之其補不可具言髓煎方填骨髓治百病補虚勞換白髮生地黄五十斤搗絞取汁以慢火煎成半牛酥三升白蜜三升生薑二斤牛髓五斤煉成者羊脂五升煉成者右已上都入銀鍋中以微火煎如稀􅄳安磁器中每服以温酒調如雞子黄大日服羮粥中服之益精美髮白摘去之下有黒者再生若未白者永不白神仙服桂煎法桂心三斤搗羅為末甘竹瀝一斗右相和于銅器中湯上煎令可丸如梧桐子大初服一丸以好顔色耐寒暑日行千里紅雪一名通中散治黄熱黄疸脚氣濕瘴解酒毒消宿食開三焦利五臟爽精神除毒熱破積滯去腦悶眼昏頭痛鼻塞口瘡重舌腸癰喉閉宜服川樸硝十斤羚羊角屑三兩川升麻三兩黄芩三兩枳殻三兩麩炒微黄去穰赤芍藥三兩人参二兩去蘆頭淡竹葉二兩甘草二兩生用木香二兩㯽榔二兩芎根一兩五錢大青一兩五錢藍葉一兩五錢桑根白皮一兩五錢木通一兩五錢梔子一兩五錢硃砂一兩細研蘇枋六兩槌碎麝香五錢細研右除硃砂麝香外並細剉以水二斗五升煎至九升去滓更以綿濾過再以緩火煎令微沸後下朴硝以栁木箆攪勿住手候凝次下硃砂麝香末攪令匀傾于新磁盆中經宿即成矣細研每服一錢至二錢以新汲水調下臨量老少加減服之紫雪治脚氣毒徧内外煩熱口中生瘡狂易呌走解諸藥毒發熱卒黄疫癘毒氣傷寒温瘧五尸五疰心腹諸疾刺疼痛蠱毒鬼魅邪氣驚癎並皆治之金五十兩寒水石三斤石膏三升元参一斤羚羊角屑五兩沉香木香五兩丁香二兩甘草半斤生用川朴硝十斤犀角屑五兩右除金朴消外並搗羅為散内金同以水五升煮取二升去滓下朴硝於汁中緩入火煎以栁木箆攪勿住手候欲凝入研硃砂三兩麝香末一兩急攪即成紫色傾入新磁盆中經宿乃成細研每服以冷水調三錢服之量人老少以意加減碧雪治大人小兒心熱驚狂諸癎熱病皆主之川升麻二兩黄芩鈎籐犀角屑大青已上各一兩青黛一兩虎睛一對天竹黄半兩麝香一分龍腦一分川朴硝一斤竹瀝三合右虎睛天竹黄麝香龍腦青黛等别細研入餘外藥並細剉用水一斗煎至三升濾去滓澄清下朴硝微火更煎以栁木箆攪勿住手候消散下竹瀝并研了藥更攪令匀候稍凝即于新瓦盆中盛經宿即凝搗羅為末每服以金銀湯二錢食後并夜臨卧時服老少以意服之碧雪煎治心神煩熱時行瘟病主癲癎療熱毒風壓丹田解百毒去頭疼眼赤口瘡酒黄大人小兒一切熱病悉皆治之大青三兩吴藍葉二兩竹茹三兩麥門冬二兩去心子芩三兩甘草三兩生用枳殻二兩去穰地骨皮三兩龍膽三兩去蘆頭犀角屑二兩元参二兩赤茯苓二兩川升麻二兩羚羊角屑二兩已上十四味並細剉以水二斗煎至一斗去滓澄清龍齒二兩細研牛黄二兩麝香一兩細研青黛五兩細研川朴硝七斤右煎了藥汁入于鍋内下朴硝以慢火煎不住手攪稀稠得所研了龍齒牛黄麝香青黛等攪令匀入磁器中收每有患者以冷水調下半匙量大小加減服之黄雪出聖恵方治風熱療天行瘴毒壓丹田安心神止狂熱神效川朴硝五斤川大黄二兩黄芩三兩山梔子二兩犀角屑一兩細研紫石英三兩細研甘草三兩生用竹茹三兩麝香五錢細研硃砂一兩細研羚羊角屑二兩欝金二兩右除朴硝紫石英硃砂麝香外並細剉以水一斗二升煎至五升去渣澄清以文火煎之下朴硝栁木攪勿住手候稍稠即下紫石英硃砂末攪令匀候欲凝結後下麝香末又攪令匀傾于新盆中經宿取出搗羅為末每服一錢至二錢以甘草湯調下老少以意加減服之金石凌法出聖惠方療天行諸黄疸乳石發動生諸瘡腫心熱舌乾咽喉閉痛金三十兩石膏三斤搗碎滑石三斤搗碎寒水石三斤搗碎已上用水四斗于大銀鍋内煎取汁三斗去渣澄清子芩一斤梔子仁三百個川升麻二兩犀角二兩黄連五兩去鬚甘草半斤生用欝金二兩已上細剉取前金石汁煎至一斗去渣澄清馬牙硝三斤川芒硝二斤川朴硝三斤川硝石二斤右藥汁于銀鍋中緩火煎後下馬牙硝良久次下芒硝次下朴硝次下硝石每下硝以栁木箆攪勿住手看硝盡良久候凝即傾放數箇新磁盆内兩日即搗羅為散每服以竹瀝或蜜水調下一錢至二錢大小以意加減石甘露餳出聖惠方鎮心除熱神效用川朴肖每一斤以白蜜十三兩用搗羅朴硝為末後以白蜜和匀便入新竹筒中其竹筒随藥多少大者一節小者兩節但藥得半筒已上即止不得令滿安入炊飯甑中令有藥處在飯内其空出飯外其上不妨盖甑蒸之候飯熟取筒承熱綿濾入瓷器中以竹箆攪之勿住手至凝即藥成收入瓷盒中如熱月即以冷水浸盒㡳每于食後及夜卧含化一茶匙桑煎出本草以桑枝一小升細切熬令香以水三大升煎取二大升一日服盡無論食前後煉榖子煎法出本草取榖子五升六月六日採以水一石煮取五升去渣微火煎如餳即堪用左慈真人千金地黄煎出中藏經方以生地黄一秤取汁熬入熟地黄末丸酒下二十丸金髓煎出本草以枸把子不計多少逐日旋採採紅熟者去嫩蒂子揀令潔浄便以無灰酒于净浸之須是甕用酒浸以兩月為度用蠟紙封閉𦂳宻無令透氣候日數足漉出于新竹器内盛貯旋于砂盆中研令爛細然後以細布濾過研後濾皆畢去滓不用即并前浸藥酒濾過藥汁攪匀量銀鍋内多少升斗作㡬次慢火煎成膏切不住手頻攪恐粘㡳不匀候稀稠得所傾出用净瓶器成之勿令泄氣每早晨温酒下二大匙頭夜卧服之百日中身輕氣壯積年不廢可以羽化茅山术煎劚取生术去土水浸再三煎如飴糖酒調服飲之更善普濟方卷二百六十五
