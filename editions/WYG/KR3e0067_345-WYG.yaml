body:
  text: 普濟方卷三百四十五明周王朱橚撰産後諸疾門産後諸疾附論凢婦人非止臨産須憂至於産後大須將慎危篤之至其在於斯勿以産時無他乃縱心恣意無所不犯犯時㣲若秋毫感病廣於嵩岱何則産後之病難治於餘病也婦人産訖五臟虛羸惟得將補不可轉㵼若其有病不須駃藥若行駃藥轉加增虛就中更虛向生路遠所以婦人産後百日以來極須慇懃憂畏勿縱心犯觸及即便行房若有所犯必身反强直猶如角弓反張名曰蓐風則是其犯候也若似角弓命同轉燭凢婦人皆患風氣臍下虛冷莫不由此早行房故也凢婦人坐産畢且飲冷童子小便一盞不得便卧且宜閉目而坐須臾方可扶上仰卧不得側卧宜屈膝未可伸足髙倚床頭厚鋪茵蓐遮圍四壁使無孔隙免被賊風兼時時令人以物從心擀至臍下使惡露不滯如此三日可止仍不可令多卧如多卧看承之人宜頻喚醒舊説産婦分娩了三日方可上床若三日上床則必就地睡卧又豈可令産婦近地氣乎纔生産畢且先研醋墨三分服之一法云不可服醋墨有傷肺經成咳𠻳之戒誠過慮也然醋墨本破凝結之血然不可用大釅之醋仍不可太多即不至傷肺然所在皆同亦有不吃者更産後三日内令産婦嘗聞醋炭氣或燒乾漆烟若無乾漆以破舊漆器燒之以防血迷血逆血暈不省之弊夏月宜於房外燒磚以醋沃置於房中夏月房中不須着火及煮粥煎藥之類分娩之後須􅁷且食白粥一味不可令大飽頻少與之為妙遂日漸増之煮粥時須是煮得如法不用經宿者又不可令温冷不調恐留滯成疾仍時與童子小便一盞飲之亦須預偹小便若遇夏月以薄荷養之新産後不問腹痛有病無病以童子小便以酒和半盞温服五七服妙一臈七日也之後方可少進醇酒并些小鹽味一法纔産不得與酒緣酒引血逆入四肢兼産母臟腑方虛不禁酒力熱酒入腹必至昏悶七日之後小進些酒不可多飲如未出月間欲酒吃或服藥者可用凈黒豆一升炒至無烟以無灰酒五升燒淋仍加好羌活一両洗凈拍破同浸尤妙當用此酒下藥或時時飲少許可以避風邪養氣血下惡露行乳脉也如産婦素不善飲酒或夏月之間亦不許强飲一臈之後恐吃物無味可爛煮羊肉或雌雞汁畧用滋味作粥飲之或吃爛粥猪蹄肉忌母及白蹄猪肉不可過今江浙間産婦多吃熟雞子云補益亦風俗也三月之後方可少食温麥麵成腫疾因食麵早也凡吃物過多恐成積滯若未滿月不宜多語喜笑驚恐憂懼哭戚思慮恚怒强􅁸離床行動久坐或作針線用力工巧恣食生冷粘粳果菜肥膩魚腥之物及不避風寒脫衣洗浴或冷水洗濯當時未覺大損滿月凢言滿月者謂滿三月非三十日也之後即成蓐勞手脚及腰腿痠重冷痛骨髓間颼颼如冷風吹雖有名醫亦不療又不得夜間獨處緣去血心虛恐有驚悸切宜謹之所有血衣洗濯不得日中曮曝免致邪祟侵傷又不得濯足恐血氣攻下又不得刮舌傷心刷齒及就下低頭皆成血逆血暈此産家謹䕶之常法也滿月之後尤忌任意飲食觸冒風寒恣意喜怒梳頭用力高聲作勞工巧房慾及上髙厠便溺之類如此節養攝至百晬始得血氣調和臟腑平復自然安帖設不依此即至産後餘疾矣産婦心下堅大如旋盤乃飲水所作名曰氣分婦人童㓜至天癸未行之間皆属少隂天癸既行皆從厥隂論之天癸巳絶乃属太隂經也治胎産之病從厥隂經無犯胃氣及上三焦為之三禁不可汗不可下不可利小便發汗者同傷寒下早之證利大便則脉數而已動於脾利小便則内亡津溢胃中枯燥製藥之法能不犯三禁則榮衛自和而寒熱止矣如發渴而白虎氣弱則黄茋血刺痛而用以當歸腹中疼而加之芍藥大抵産病天行從增損柴胡雜證從増損四物宜詳察脉證而用之方當歸散出大全良方療産後氣血俱虛慎無大補恐增客熱别致他病常令惡露快利為佳及治腹痛當歸芍藥川芎黄芩各一両白术半両右為細末温童子小便或酒調下二錢如腹不痛者米飲調之妙加减四物湯便産須知治産後血虛發熱或日間明了暮則發熱增寒當歸川芎生地黄山柴胡右等分毎服三錢水一大盞煎至六分去滓服薤白湯出千金方治産後胷中煩熱逆氣薤白半夏甘草人參各二両石膏四両知母二両括蔞根三両麥門冬半升右㕮咀以水一斗三升煮取四升去滓分五服日三夜二熱甚即加石膏知母各一両一方無石膏療如覺煩熱便産須知用圓白半夏不拘多少凈洗湯泡七次為末如大豆納鼻中即醒醫學發明云産前寒熱小柴胡湯中去半夏謂之黄龍湯主之治血氣逆心煩滿出肘後方用生竹皮一斤水三升煮取一升半分為再服皂甲散治産後魅川楝皮皂角樹皮各一斤皂角核一合石蓮一合去心右為粗末煎湯乗熱以物為定熏通手洗於凈房中就熏洗處鋪薦蓆纔洗了次帛挹乾便吃玉露通真丸熱酒下二丸便仰睡芎歸湯一名立效散出百一選方治婦人産後忽両乳伸長細小如將腸垂墜直過小肚下痛不可忍危在須臾名曰乳懸兼治産後惡露不下腹痛或下血太多眩暈不能支吾姙娠胎動腹痛下血川芎當歸各二觔右將芎歸各半觔㕮咀於瓦器内用水濃煎不拘時候多少温服餘芎歸各觔半剉作大塊用香爐慢火逐旋燒烟安在病人面前卓子下要烟氣直上不絶令病人低頭伏卓子上將口鼻及病乳常吸咽氣直候用此一料藥盡看病證如何或安或全未安或畧縮减再用一料如前法煎服及燒烟熏吸必安如此二料已盡雖両乳畧縮上而不能復舊者用冷水磨萆麻子一粒於頭頂心上塗片時即去則全安矣此通真子秘方一方加縮砂腹中刺痛加芍藥口乾煩渴加烏梅麥門冬發寒加乾薑白芍藥水停心下微有嘔逆加茯苓生薑虛煩不得眠加人參竹葉大便閉澁加熟地橘皮杏仁小便不利加車前子腹脇膨脹加厚樸血崩不止加香附子咳𠻳痰多加紫苑半夏生薑腰痛脚痛加牛膝心下疼痛加𤣥胡索惡血不下腰腹重痛加牡丹皮煎治婦人臨産服催生藥驚動太早未當離經而用力大過以致育膜有傷産後水道中垂出肉線一條約三四尺長牽引心腹痛不可忍以手微動之則痛苦欲絶龍興鐵柱觀前有一産婦患此諸醫皆用失笑散雖畧止痛而不能得肉線離脱後有一道人來問證因白諸醫用失笑散儘不瘥但不能絶根乃買老薑三觔凈洗不去皮於石鉢内硏爛用清油二觔拌匀入鍋内烚熟以油乾焦為度先用熟絹一叚約五尺長摺作結方令穏重婦人輕盛起肉線使之屈曲作一團納於水道中却用絹袋兜裹油薑稍温傳在肉線上熏覺姜漸冷又用熨斗火熨熱使之常有薑氣如薑氣已過除去又用心如此熏熨一日一夜其線已縮大半再用前法越両日其肉線盡入腹中其病全安不復痛矣却服失笑散芎歸湯補理道人云此乃魏夫人秘傳怪病方切不可使肉線斷作両截一斷則不可醫當歸散出大全良方治産後補虛益血當歸羌活各一両延胡索五錢右為細末用猪腰子一隻切作片以水一盞入藥末二錢同煎至七分同腰子喫􅅾莪术散出大全良方治産後血海氣虛腹臟疼痛心胷注悶每遇經脉行或多或少及有積塊者莪荗桃仁去皮尖炒大黄濕紙煨當歸炒各一両桂心川芎木香牡丹皮延胡索炒赤芍各五錢右為細末温酒調一錢空心臨卧服療産後大虛心腹急痛血氣上搶心氣息乏補益方出大全良方黄茋白术當歸甘草各二両生薑四両人參二両右先以白羊肉三觔去膜以水一斗九升煮肉取汁五升後下諸藥更煎取三觔分温三服得勝丸治婦人産後血氣虛冷腰腹大痛便利膿血川烏炮去皮一両五靈脂二両没藥二錢右為細末醋糊為丸如豆大每服二三十丸食前酒下竹根湯出千金方治産後虛煩甘竹根細切一斗五升右以水二斗煮取七升去滓用小麥二升大棗二十枚復煮麥熟三四沸内甘草一両麥門冬一升湯成去滓服五合不瘥更服取瘥短氣亦服之蘓麻粥便産須知治産後欝多汗汗則大便秘難於用藥唯此粥最佳此粥不獨産婦可服老人諸虛人風秘皆可服昔有老人年八十四歲風秘臟腑壅血氣聚膈中腹脹惡心不喜食氣上攻頭目頭神昏迷此藥氣血結糞自下諸病悉去紫蘓子大麻子凈洗各半両右為細研用水再研濾汁一盞分二服煮粥食淡竹茹湯治産後虛煩頭痛短氣欲絶心中悶亂不觧生淡竹茹麥門冬小麥各五升甘草一両生薑三両産寳用乾葛大􅀥十四枚産寳用石膏三両右㕮咀以水一斗煮竹茹小麥取八升去滓乃内諸藥煮取二升去滓分二服羸人分作三服若有人參入一両若無人參内茯苓一両半亦佳人參茯苓皆治心煩悶及心虛驚悸安定精神有則為良自無依方一劑不剉更作苦氣逆者加半夏二両芍藥梔䜴湯出㧞捽方治産後虛悶不得眠芍藥當歸梔子各五錢香豉半合右如前修産後傷寒便同下後變證治産後煩渴潮熱出危氏方用五苓散枇杷葉去白毛蜜塗炙用麥門冬二十粒去心煎湯服方見寒暑濕門中暑類治産後心悶手脚寒熱氣力欲絶血暈連心頭硬及寒熱不禁用接骨木破如筭子一握以水一升煎取半升分温二服或小便數惡血不止服之即瘥此木可煮三次其力一般此是起死人方治産後心悶手足煩熱厭厭氣欲絶血暈心頭硬作熱增寒忍不禁出肘後方用續斷皮一握剉以水三升煮取一升分三服服如人行二三里再服無所忌此藥救産後垂死治産後心悶手足煩熱氣力欲絶血暈心頭硬及寒熱不禁出肘後方用𤣥胡索炒搗為末酒服一錢匕亦治穢汚不盡腹滿千金三物黄芩湯治婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者此湯主之黄芩一両苦參二両乾地黄四両右以水八升煮取二升温服一升多吐下蟲腎氣湯治婦人病飲食如故煩熱不得卧而反倚怠者何也師曰此名轉胞不得溺也以胞系子戾故致此病但利小便則愈乾地黄八両薯蕷四両山茱茰四両澤㵼茯苓三両牡丹皮三両桂枝附子炮各一両右㕮咀以水六升煮取二升去滓分三服日三人參當歸散出大全方治産後去血過多血虛則隂虛隂虛生内熱内熱曰煩其證心胷煩悶吸吸氣短頭痛悶亂骨節疼痛脯時輙甚與大病虛煩相類急宜治之人參當歸乾地黄桂心各一両白芍二両麥門冬一両右㕮咀每服四錢水二盞先將粳米一合淡竹葉十片煎至一盞去米竹葉入藥并棗三枚煎去七分去滓温服虛甚者用熟地黄食前服一方血熱甚者加生地黄産後榮血暴竭便産須知治婦人血禁失音衝惡用鑰匙以生薑醋小便煎服弱房人煎湯服亦得用大劑芎歸湯方見本門諸疾類艾煎丸出衛生家寳方治婦人産後血海虛弱面無顔色腹痛身體倦怠艾葉去梗一觔乾薑半觔當歸四両洗附子二個炮去皮尖切白芍藥半觔熟乾地黄四両洗右五味各切細用米醋五升煮乾取出焙乾為末醋糊丸如桐子大每服三五十丸酒下不吃米飲食前忌生冷物又方燒荔枝核灰研和服烏金散出衛生家寳方治婦人産十八種疾宜預服不生諸病没藥半両生血餘半両男子者燒灰紅花子一分生伏龍肝一分研當歸半両㣲炒乾栢葉一分爛杵赤龍鱗半両鯉魚鱗燒灰存性香墨一分焼紅米醋淬凌霄半両生右為末每服二錢熱酒下不拘時候酒不宜多𤣥胡索散産經治産後血氣攻刺疼痛不止及新舊虛實痛不止當歸酒浸𤣥胡索赤芍藥蒲黄紙隔炒乳香水研桂不見火去皮没藥各五錢右計七味細末挑三錢酒調空心下四物湯産經治大産小産對證合服立效腹中刺痛惡物不下加當歸芍藥各半錢口舌乾欲飲水加括􅌣麥門冬去心各一錢水停心下㣲吐逆