重劑臨卧噀下四百丸為之輕劑立其法是動以安神静以清肺假令一氣而㣲汗用愈風湯三兩麻黄加一兩服每服加生薑五十七片空心服之以粥投之得㣲汗則佳如一旬之通利用愈風湯二兩大兩湯一兩一勻作四服如前臨卧服之得利為愈如常服之藥不可失四時之輔如望春大寒之後加半夏二兩柴胡二兩通四兩人參四兩謂迎而奪少陽之氣也望夏之月半加石膏二兩通六兩黄芩二兩通六兩知母二兩通四兩謂迎而奪陽明之氣也季夏之月加防己二兩通四兩白术二兩茯苓二兩通五兩謂勝脾土之温也初秋大暑之後加厚朴二兩通四兩藿香二兩桂一兩通二兩謂迎而奪太隂之氣也霜降之後望冬加附子一兩官桂一兩當歸二兩通四兩謂勝少陽之氣也大通丸出聖惠方治一切風無不神效雄黄二兩雌黄一兩蜜陀僧一兩紫石英二兩硃砂三兩黄丹五兩定粉一兩曽青二兩鉛霜二兩水銀二兩金箔五十片銀箔五十片生金屑一兩生銀屑一兩磁石一兩滑石半兩緑礬半兩白礬一兩硫黄一兩并水銀結成砂子已上藥都細研入一固濟了瓶子中瓶盖上鑚一小竅子用出隂氣初以大半斤去瓶子三寸養三日便以塩泥塞其上竅子以火五斤燒令通赤便去火放冷放静地上鋪紙三重將藥末勻攤在上㕥盆盖之四時以土壅閉經三伏時出火毒畢研令極細入後藥末狗牙皂角三分去黒皮塗酥炙令㣲黄去牙伏龍肝半兩炒香墨一兩丁香半兩㯽榔半兩木香一兩白殭蠶一兩微炒蟬殻半兩乾蝎一兩微炒麝香半兩微炒白花蛇二兩酒浸炙微黄蛇蛻皮半兩炙微黄龍腦半兩右搗羅為末入龍腦麝香并前石藥都研合勻以麵糊合搗五七百杵丸如棟實大海服以薄荷酒下研一丸忌生血物赤箭散出聖惠方治一切風赤箭一兩烏蛇肉二兩酒浸炙㣲黄犀角屑一兩藿香一兩㯽榔一兩麻黄一兩去節乾蝎微炒晩蠶蛾微炒桂心麝香細研龍腦細研硃砂細研牛黄細研芎藭防風去蘆頭白术人參去蘆頭茯神當歸木香牛膝去苗蔓荆子白殭蠶微炒細辛蟬殻附子炮製去皮臍乾薑炮剉製天南星生用桑螵蛸㣲炒白附子已上各半兩生用右搗羅為散入研了藥更研令勻每服以薄荷酒調下一錢忌生冷猪鷄肉神效牛黄丸出聖惠方治一切風通用牛黄半兩細研龍腦半兩硃砂一兩細研飛過水麝香半兩細研金箔一百二十片細研銀箔一百二十片細研天麻一兩羗活一兩蔓荆子一兩仙靈脾一兩獨活一兩白殭蠶一兩炒麻黄一兩去根節白蛇二兩半酒浸去皮骨炙微黄桂心一兩乾蝎白附子一兩炮製天南星一兩炮製羚羊角屑一兩防風一兩去蘆頭芎藭一兩人參一兩去蘆頭當歸一兩阿膠一兩搗碎炒令黄燥白芷一兩細辛一兩附子一兩炮製去皮臍犀角屑一兩白茯苓一兩蟬殻三分右搗羅為末入研了藥勻令煉蜜和搗一二千杵丸如鷄頭實大每服温酒嚼一丸下小芥草丸出聖惠方治一切風草芥微炙麻黄去根節天麻各二兩萆薢剉防風去蘆頭芎藭羗活栢子仁白木細辛松脂煉過牛膝去苗山茱萸澤㵼赤芍藥枳殻麩炒微黄去根附子炮製去皮臍白附子炮製天南星炮製乾蝎微炒烏蛇肉酒浸灸微黄當歸石龍芮犀角屑杜仲去皺皮灸微黄各一兩白殭蚕炒微三分半夏半兩湯洗鉛霜三分細研牛黄半兩細研麝香半兩細研右搗羅為散入研了藥更研令勻每服温酒調下一錢忌生冷猪鷄毒魚等物牛黄清心丸出和濟方治諸風緩縱不隨語言蹇澁心怔健忘恍惚不清頭目眩暈胸中煩欝痰涎壅塞精神昏憒又治心氣不足神志不定驚恐怕佈悲憂慘戚虛損少睡喜怒無時或發狂癲神情昏亂白芍藥麥門冬去心黄芩當歸去苗防風去苗白术各一兩半柴胡芎藭桔梗白茯苓去皮杏仁去皮尖䨇仁麩炒黄别研各一兩二錢半神麯研蒲黄研人參去蘆頭各二兩半羚羊角末麝香研龍腦研各一兩肉桂去麄皮大豆黄卷碎炒阿膠碎炒各一兩七錢半白蘞乾薑炮各七錢半牛黄研一兩七錢半犀角末二兩雄黃研飛八錢乾山藥七錢甘草剉炒五兩金箔一千二百片内四百片為衣大枣一百枚蒸熟去核研成膏右除枣杏仁金箔二角末及牛黄麝香雄黄龍腦四味外為細末入餘藥和勻煉蜜與枣膏為丸每兩作一十丸用金箔為衣每服一丸温水化下食後服之小兒驚癎即斟酌多少以竹葉湯温酒化下大紫苑丸治風偏枯風癎暗風五癲大風眉髪退落體頑痺五噎五膈九種心痛八種痞悶五邪失心或歌哭如鬼所使積癖氣塊黄叵水種婦人驚病臍腹瘧疾連年不瘥一切風痺不知痛痒皆宜服之紫苑茸呉茱茰湯洗七次焙菖蒲厚朴姜製柴胡茸桔梗皂角炮黄去皮子茯苓去皮官桂乾姜炮黄連净㯽榔蜀椒去末并閉口炒巴豆霜人參羗活蓯蓉酒浸焙川大黄當歸切焙陳皮去白防風麥門冬去心焙熟地黃焙漢防己車前子炒白术鱉甲去裙襴醋炙各半兩川烏頭炮皮二兩半右為細末入巴豆霜勻煉蜜為劑𢷬干下油單褁旋丸如梧桐子大每服三丸温酒下米飲湯亦得小排風散出聖惠方治一切風天麻防風去蘆頭羌治桂心附子炮製去皮臍白附子炮製人參去蘆頭萆薢白蒺䔧微炒去刺硃砂細研芎藭麻黄去根節當歸白茯苓木香葳靈丹研白殭蚕微炒甘菊花細辛藁本白术㯽榔犀角屑羚羊角屑海桐皮剉白芷枳殻麩炒微黄去穰麝香細研已上各半兩右搗羅為丸入硃砂麝香研合勻每服以温酒調下二錢忌生冷鷄猪肉木香保命丹出御藥院方治男婦之體虛腠開中風牙齒噤口眼喎斜手足偏枯四肢拘攣不得屈伸麻痺不仁驚癎等病遍痒疼痛頭目昏暗風入腹内拘急切痛體如蟲行心神恍惚傷風瘴疫偏頭風痛諸病般令氣兼治男子婦人脾胃氣虛或傷冷物心腹大痛臓腑不調婦人産前後中風病壯熱體重頭疼旋運欲倒氣