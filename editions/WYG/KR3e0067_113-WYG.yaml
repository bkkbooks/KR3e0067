皮膚風毒結聚腫痛温酒下偏頭疼夾腦風臘茶清下婦人血疰風四肢攻或痛或痒心腹刺痛當歸酒下並早晩食後服袐𫝊羗活散治一切風證甘草黄芩䑕毛者生地黄肥者連翅山梔子蔓荆子當歸滑石桂府者香白芷湯洗荆芥石膏明者用薄荷吉州羗活台芎水洗赤芍藥獨活麻黄陳皮桔梗防風右各等分㕮咀每服一兩二錢初服之時必加大黄朴硝動臓腑數行用温粥補之量病虚實加减春冬利數行夏微動一二行便補自後每日一貼不加大黄朴硝用水煎至分數如病人血色黒暗者多加當歸生地黄病人麻木處或刺痛甚多加羗活白芷麻黄白芍藥煎藥當用文武火於沙石器内煎存下藥滓晒乾多加朴消在内煎湯洗浴如無當歸以蘇木代之辟風丹出御藥院治諸風疾無問新久者半身不遂口眼喎斜語言蹇澁精神昏憒痰涎併多咽嗌不利及風虚頭目痛眩旋運欲倒或心忪健忘恍惚不寕手足麻痺顫掉無力筋脈拘急骨節煩疼行歩艱難並宜服之獨活洗去土焙防風去蘆呉白芷麻黄去節微炒桂藁本二兩白芍藥去皮天麻各一兩川烏頭炮製去皮搥碎炒黄藿香葉洗净甘草剉炒全蝎去毒炒黄白花蛇酒浸去皮骨各半兩川芎七錢羗活去苖白殭蚕炒逺志湯浸去心焙乾各半兩硃砂二兩為衣白附子炮製搥碎炙微黄牛膽南星炒黄各四兩右為細末煉蜜和丸每兩作十丸硃砂為衣每服一丸細嚼或化服用生薑湯下麝香亦得如破傷風豆淋酒下急風癎病人參湯下不拘時候此藥功效不可具述烏犀丸出聖惠方治一切風烏犀角屑半兩天麻一兩桂心一兩防風一兩去蘆羗活半兩附子一兩炮製人參一兩去蘆海桐皮一兩當歸一兩芎藭一兩乾蝎半兩微黄羚羊角屑一兩萆薢一兩剉藁本半兩蔓荆子半兩麻黄一兩去根白附子半兩炮製白殭蚕一兩㣲黄龍腦一分細研麝香一分細研右搗羅為末入龍腦麝香等研令勻煉蜜和杵三五百杵丸如櫻桃大每服一丸嚼破以薄荷酒下躑躅攣風出聖惠方治破傷脫節多疼肌肉頑痺或遍體瘡癬或胗風瘙宜服躑躅羗活防風去蘆芎藭杏仁酒浸去皮細辛當歸已上各一兩白歛白芨白芷丹參苦參𤣥參桂心附子去皮臍川烏頭去皮臍皂莢去黑皮漢椒去目莽草川大黄各半兩右件藥細剉以酒米一升拌匀温䌊三宿後以火炒慢令乾用臘月猪脂二斤以慢火同煎一日候藥味出盡以新布絞去滓更以綿濾過再入鐺中煎以柳木棍不住手攪成膏侯凝収於磁盒中每服一彈子大攣於病上如臘月煎之經久不壊也川芎石膏湯出醫藥集成治一切風熱上攻頭目昏眩或痛或悶或風痰喘𠻳或目疾時發壅生或鼻塞口瘡燥多渴或便溺淋悶或瘡癬皴揭並宜服之清利頭目宣通氣血并一切風熱或中風偏枯能解中外諸邪所傷及調理汗病下之前後并汗後餘熱旁復𫝊染等疾川芎山梔子荆芥穗當歸切焙芍藥用生大黄五錢菊花人參白术各半兩丼草三兩石膏防風去蘆薄荷葉連翅各一兩滑石四兩寒水石黄芩桔梗各三兩縮砂一分右為粗末每服三四錢水一盞煎六分去滓食後温服日二三服或為細末温水調下二三錢忌生薑醋發熱之物人參羗活散治一切風疾人參羗活防風半兩去蘆天麻三錢甘草半兩半夏一兩川烏半兩白芷半兩川芎半兩細辛四錢藁本半兩南星一兩白茯苓陳皮半兩天台烏藥半兩木香半兩另入枳殻半兩赤芍藥半兩當歸半兩右㕮咀每服四錢水一盞半生薑五片同煎至一盞入麝香少許攪勻空心食前服如手足疼痛加乳香沒藥如熱多加荆芥穗半兩大聖黑神丸治癱緩及一切風疾木香一兩躑躅花紫威花烏頭炮製去皮臍烏蛇酒浸去皮骨乾蝎一兩蒼术二兩防風二分白芷一兩麻黄去根二兩芎藭三兩厚朴去粗皮生薑炙二兩芫花一兩桂二兩芍藥一兩陳橘皮二兩天南星一兩呉茱茰一兩自然銅六兩右為末入自然銅末和勻煉蜜和杵三二百丸如鷄頭大每服一丸温酒化下日三服不飲酒薄荷湯下如傷風三日豆淋酒下連三防風羗活丸宜四時常服除風疾之病患防風羗活五加皮芍藥人參丹參薏苡仁𤣥參麥門冬去心四分乾地黄大黄青木香各六分松子仁磁石各分研㯽榔子五分枳實炙八分牛膝茯神八分桂心八分右搗篩和蜜丸如梧桐子大以酒服十五丸日再服稍稍加至三十丸如度忌猪肉魚蒜生葱􅀈蕪荑上提金治一切諸風甘草人參天麻芍藥薄荷荆芥川芎乳香沒藥白芷甘松欝金䔧蘆桔梗甘菊花藁本茯苓防風細辛右各等分為細末毎用少許㗜鼻内大效普濟方卷一百十四
