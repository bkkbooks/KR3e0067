body:
  text: 普濟方卷一百十四明周王朱橚撰諸風門諸風雜治附論素問云凡諸風掉眩強直支痛緛戾裏急筋縮皆足厥隂風木之位肝膽之氣也風者動也掉摇也所謂風氣甚而頭目眩運由風木則王是金衰不能制木而木能生火多為熱化皆陽熱盛也風為病者忽而寒熱或為熱中或為寒中又或為厲風者或為偏枯或為腰脊强痛或為耳鳴鼻塞諸証皆具其病各異其名不同經云風者善行數變腠理開則洒然寒閉則熱悶風氣俱入於脉諸脉分内之間與衞氣相干其道不利致使肌内燌熐而有瘍也衞氣所凝而不行故其内有不仁也分肉之間衞氣行處風與衞氣相摶俱行肉分故氣道澁而不利氣道不利風熱内欝衞氣相持肉燌熐而瘡出衞氣被風欝不得傳徧昇凝而不行則肉不仁也謂皮肉􅂒而不知寒熱痛痒如木石也經曰風者百病之首也其變化乃為他病無常風氣所發也以四時五運六氣千變萬化衝盪推擊無窮安得失時而絶也故春甲乙傷於風者為肝風夏丙午傷於風者為心風季夏戊巳傷於風者為脾風秋庚辛傷於風者為肺風冬壬癸傷於風者為腎風五臟之風其証各異肺風之状多汗惡風也咳嗽短氣晝則㣲暮則甚心風之状上氣善怒色赤病甚則言不可快肝風善悲色微瘡嗌乾善怒時憎女子脾風身體怠惰四肢不收色薄㣲黄不嗜飲食腎風面疣而浮腫脊痛不能正立其色焙炲隐曲不利又曰風寒熱諸疾之始生也人之臟腑皆風之起謂火熱陽之本内經曲直動摇風之動也眩運吐嘔謂風熱之甚也夫風熱拂欝風火相生治熱以熱為本而風為標風言火者即風熱病也氣壅滯筋脉拘倦肢體焦痿頭目昏眩腰脊强痛耳鳴鼻塞口苦舌乾咽嗌不利胷膈痞悶呟嘔喘滿沸唾稠粘腸胃燥熱便澁溺淋或悶夜卧寝汗咬牙睡語筋惕驚悸或腸胃炥欝結水液不能浸潤於周身而但為小便多出者或濕熱内餘而時有溏洩者或因亡液而成燥淋悶者或因腸胃燥欝水液不能宣行於外反以停濕而泄或燥濕往來而時結時泄者或表之陽和正氣衞氣是也與邪熱相合并入于裏陽極似隂而戰煩渴也表氣隂故戰裏熱甚則渴或虚氣久不已者經言邪熱於衞氣并入於裏則寒戰也并出之於表則發熱并則病巳或風熱走注疼痛麻痺者或腎水真隂衰虚心火邪熱異甚而僵仆或卒中久不語或一切音瘖而不語語不出聲或暗風癎者或洗頭風或破傷或中風諸潮搐并小兒諸疳積熱或驚風積熱傷寒疫癘不能辨者或熱甚怫結而反出不快者或熱黑䧟將死或大人小兒風熱瘡疥及不愈者或頭生屑徧身黒黒紫白班駮或面鼻生紫赤風刺瘾疹俗呼肺風或成癘風世傳為大風疾或腸風痔漏并解酒過熱毒兼觧利諸邪所傷及調理傷寒已發汗頭項身體疼痛者并兩感諸証兼産後血液損虚以致隂氣衰殘陽氣欝甚為諸熱証腹滿澁痛煩渴喘悶譫妄驚狂或熱極生風熱而風燥欝舌強口禁筋惕肉瞤一切風熱燥證欝而惡物不下腸滿卒痛而昏者惡物過多而不吐者不宜服之兼消除大小瘡及毒惡兼治墮馬破打傷損疼痛或因而熱結大小便澁滯或腸腹急痛腹滿喘悶者凡此諸風所感不一當隨證而治也方烏犀丸出和濟方治丈夫婦人卒中諸風牙闗𦂳急膈上多痰或語蹇澁口眼喎斜薄荷汁與各少許化三丸服之良久即遂有大效又治癱緩暗風癎病手足潮搐心神不安遍身頑麻腸風痔漏腎蔵風毒上攻下疰婦人血風頭旋吐逆皮胃腫痒遍身疼痛白术米泔浸一宿切焙乾㣲炒白芷乾薑炮枳殻去穣麩炒天竺黄細研虎骨酒醋塗炙令黄厚朴去粗皮薑汁塗炙令黄敗龜酒醋塗炙令黄何首烏米甘浸一宿煮過切焙桑鰾蛸㣲炒􅒦砂仁蔓荆子去白皮丁香晩蠶蛾㣲炒各三分細辛去苖藁本去土槐膠何膠杵碎陳皮㣲炒去白羗活去蘆半夏湯洗七次薑汁浸三日炒天南星湯洗生薑自然汁煑軟切焙乾㣲黄麝香别研天麻酒浸切焙茯苓去皮獨活去蘆人參去蘆羚羊角鎊藿香葉去土㯽榔肉桂去粗皮沉香麻黄去根節川烏燒令通赤留烟少許入坑内以盞覆新土内食頃出白殭蠶去絲角㣲炒白附子炮㣲乾蝎防風去蘆白花蛇酒浸一宿去皮骨取肉用烏蛇酒浸一宿炙去皮骨令净用肉木香各一兩石斛去根水銀蟬殻去土㣲炒川芎肉豆􅅳去殻㣲炒附子水浸後炮去皮臍硫黄末用甆盞盛慢火飬成汁然後却入前水銀静細研龍腦别研硃砂研飛雄黄研飛牛黄别研各半兩狐肝三具蠟月採取同烏鵶一隻入新瓦瓶内以瓦盖頭用泥固臍用炭一秤燒令通赤待烟盡取出後冷研令極細烏鵶一隻蠟月採取去了嘴并翅足用􅕹粉别研一分當歸去蘆酒浸焙乾烏犀鎊各二兩右搗研令細煉白蜜合和入酥再搗五千下丸如梧桐子大常服一丸不時薄荷湯或茶嚼下草靈寳丹出楊氏家藏方治一切風疾及風濕走注疼痛口眼喎斜手足頑麻大有神效其藥味俱要揀净分兩須要精最不可草率治一切中風及八風五痺癱瘓嚲曳眉角牽引項背拘强牙闗𦂳心中悸悶精神如醉遍身發熱骨節煩疼肌肉麻木腰脊沉重皮膚瞤動狀若蟲行又治陽虛頭痛風寒入腦目旋運轉似在舟船耳内蟬鳴如風雨之聲風寒濕痺脚氣緩弱跌打撲傷筋骨或遇天隂一身盡痛不得卧睡並皆治之川烏枸杞子當歸去蘆苧細辛去苗葉净菊花去根木净白芍藥荆芥去根净五加皮去骨净白鮮皮去骨枳殻去根净薄荷去根梗葳靈仙去土净木香粉甘草炒浄沒藥研川附子炮製去皮臍净草烏頭炮製去皮臍净香附子炮去毛净金毛狗脊炒去毛净人參去蘆净地骨皮去骨土净防風去蘆頭净羌活去蘆净香白芷柴胡去苗土净升麻去蘆净麻黄去根節净烏藥已上各四兩天麻四兩酒浸去苗川煉子去根取肉四兩炒何首烏四兩酒浸白术去蘆净四兩炒石斛去根净四兩炒車前子四兩酒浸自然銅四兩煆好醋淬七次研水飛白牽牛四兩炒取末地龍去土净麝香一兩半為衣研乳香研硃砂二兩研為衣川烏頭四兩炮裂去皮臍槐角子四兩炒大黄四兩炒烏鵶二隻臘月者泥固臍炭火煆取出用烏稍蛇一條酒浸净肉四兩炙風稍蛇一條酒浸肉四兩白花蛇酒浸一條取肉四兩炙藥末成然後定蜜分兩右件為細末煉蜜為丸如大龍眼大每服一丸空心臨卧細嚼用無灰酒送下芽茶清亦可臘月取可修合蠻夷酒出千金方治九風枯攣三十年著床及諸惡風眉毛墮落乾地黄獨活丹參礜石各一兩麥門冬附子甘遂各二兩赤石脂三兩半乾薑蕪荑芫花栢子仁各一合蘇子一升蓯蓉茯神一作茯苓金芽薯蕷白术杜仲石南牡荆子山茱茰欵冬花各十八銖白芷烏啄烏頭人參狼毒蜀椒防風細辛礬石寒水石牛膝麻黄芎藭當歸柴胡芍藥牡蠣桔梗狗脊一作狗杞天雄各半兩石斛桂心各六錢右㕮咀以酒二斗漬夏三日春秋六日冬九日一服半合蜜室中合藥勿令女人六畜見之三日清齋方可合一方無芎藭加大棗四拾枚大排風散出聖惠方治一切風天麻二兩羚羊角屑三分𦍑活一兩防風一兩去蘆頭芎藭甘菊花三分山茱茰三分薯蕷三分細辛三分藁本三分獨活一兩秦艽三分去苖麻黄去根節一兩枳殻二兩麩炒微黄去穰蔓荆子三分白蒺䔧一兩㣲炒去刺黄耆三分剉酸棗仁三分㣲炒丹參半兩鹿角膠三分搗碎炒令黄燥莽草半兩㣲炒炙地骨皮半兩白鮮皮半兩漢防己三分桂心三分牛膝三分去苖附子三分炮製去皮臍薏苡仁三分杜仲半兩去皺皮炙㣲黄剉石黄半兩當歸三分生乾地黄三分萆薢半兩剉側子三分炮製去皮臍蒼耳苖半兩乾薑三分炮製剉阿膠三分碎搗炒令黄燥人參三分去蘆頭犀角三分白术三分白芷三分川椒三分去目及閉口者㣲炒去汗茵芋三分甘草半兩炙炒赤剉杏仁半兩湯浸去皮尖雙人麩炒㣲黄右搗羅為散每服食前以温酒調二錢生薑薄荷湯調服亦得忌生冷鷄猪肉大黒神丸治一切風曽青一兩硫黄一兩水銀一兩與研黄結為砂子硃砂一兩雄黄一兩白石英一兩紫石英一兩白礬一兩黄丹一兩半金箔五十片銀箔五十片大隂𤣥精一兩已上藥研令細入於固濟子瓶子中其瓶子中上開一小竅子出用隂氣初以小火緩飬二日侯隂氣出盡以鹽一埿塞竅便以大火煆令通赤候冷以濕砂土培瓶子一伏時出火毒畢取出藥更研如粉白龍腦一兩麝香一兩牛黄一兩半膩粉一兩天竺黄一兩真硃末半兩虎珀半兩已上細研與諸藥臨時合和鹿胎一兩半烏蛇二兩半去皮骨狐狸一兩虎脛骨一兩甘草一兩敗龜一兩已上並塗酥炙搗羅為末天南星一兩炮製白附子一兩炮製天麻一兩麻黄一兩去根節乾蝎一兩㣲炒蟬殻一兩桂心一兩木香一兩㯽榔一兩獨活一兩細辛一兩附子一兩炮製去皮臍白殭蠶一兩微炒犀角屑一兩半羚羊角屑一兩半右搗羅為末與諸藥同研令勻煉蜜和搗三千杵九如酸棗大每服以豆淋酒研下一丸忌一切毒滑魚肉動風物奪命還真丹治一切癱瘓中風癩病老死不救洗頭風驚癎吐涎天麻人參木香白术兎絲子酒浸􅢠本去土川獨活川芎各一兩半白殭蠶炒黄苓暗風血風婦人産前産後血氣不調及諸筋骨節疼痛神效全蝎去毒半夏薑製熟地黄焙蔓荆子甘草桂生地黄地骨皮薄荷葉黄連净菊花各一兩防風茴香炒知母杜仲炒絲斷茯苓柴胡茸桔梗陳皮去白枳殻炒去瓤石膏當歸焙各二兩羗活三兩白芍藥麻黄去根節各一兩半細辛去葉半兩蛤蚧一對炙金箔四十片為衣右為細末鍊蜜為丸毎兩作十丸細嚼熱茶下不句時候婦人調蘹香子末酒調送下食前日進三服龍虎丹治丈夫婦人新得久患急緩風半身不遂手脚筋衰及風毒攻注遍身瘡疥頭風多饒白屑毒風面上生瘡刺風狀如針刺癎風急倒作聲頑風不忍痛痒瀝風頸生駁班暗風頭旋眼黒􅖟風面生赤㸃肝風鼻悶瞤偏風口眼喎斜節風肢節斷續脾風心多嘔逆酒風行歩不前肺風鼻塞項痛膽風令人不睡氣風肉似䖝行腎風耳内蟬鳴隂陽濕痒黒牽牛炒藿香葉生天麻去苖牛膝去苖酒浸切焙為妙硫黃結砂天竺黄生研細辛去苖洗半夏湯洗七次姜汁炙白乾姜炮三兩附子炮去皮臍何首烏去粗皮羗活去蘆洗焙獨活去苖柴胡去苗川芎洗桔梗生各二兩寒水石燒通赤研飛一觔茴香淘去土焙甘松洗去土焙肉桂去麄皮五靈脂生白芷生菊去土川烏炮去皮臍白殭蠶去絲嘴炒縮砂仁生各五兩牙硝研木香水銀與硫黄用慢火結成砂子雄黄研飛麝香研各一兩地龍去上炒硃砂研飛白蒺䔧炒防風去苗各三兩龍腦研半兩烏蛇酒浸炙去皮骨八兩右為細末煉蜜為劑每服一丸如鷄頭大用薄荷酒嚼下日進一服重即兩服産後驚風亂道物硃砂酒磨下産後身多虚腫血風類増昏沉身如針刺髪隨梳落面黄心逆並煎當歸酒嚼下日進兩服若治傷寒炒葱豉酒嚼下一二服盖覆出汗立愈小兒驚風薄荷酒化下少許大人急風口禁失音等薄荷酒化灌之當常服茶酒任下不拘時候服神效活絡丹出徳生堂方治男子婦人卒暴中風不省人事倒地不能起坐諸藥不效此藥二丸好酒一大盞化開灌下好口眼喎斜語蹇澁身體麻痺口噤失音不語痰涎壅盛筋脉拘攣手足不能屈伸骨節疼痛不能轉側精神昏憒臨卧一丸細嚼或爛研好酒嚥下便睡覺有汗無汗將病手背隨即舒拳至天眀起用人扶䇿行動至早飯後依前扶䇿行動至日西再服一丸可痊又治婦人産後暗風洗頭偏頭風旋暈欲用藥一丸細嚼或研開好酒嚥下即愈破傷風用二丸細嚼熱酒送下半時不省再服一丸汗出為効又治内外一切傷風温酒一丸亦可以汗出為驗凡人四十以上者常間二三服