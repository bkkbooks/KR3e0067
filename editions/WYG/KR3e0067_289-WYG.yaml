body:
  text: 普濟方卷二百八十九明周王朱橚撰癰疽門發背附論夫發背者熱毒之氣發於背俞為癰疽是也此内本於五臟内傳諸府熱氣攻發必生於府俞之間得之乳石發動及肥甘滋味之過臟腑壅熱經絡為之不通毒氣凝滯必因俞穴而出是以服石之人於居處衣食嗜慾喜怒尤宜節慎一有過舉則毒氣乗隙而發初如芥粟治之稍緩則盈尺寸而難圖故始覺熱摶於分肉痛傷於經絡宜速治之盖其脉不通則腫毒増甚經所謂榮氣不從逆於肉理乃生癰腫是也血敗肉腐為患不一實則為癰浮則爲腫深則為疽然發於背者兩髀間初起甚微或癢或痛徃徃忽之數日遂致不救者治之之始則度其腫之正中而灸之壯數逾百使惡氣外出次以藥踈利腑臟决其邪毒則有可治之理凡發背皆因服食五石寒食更生散所致亦有單服鍾乳而發者又有平生不服而自發者此是上代有服之者其候率多於背兩髀間起初如粟米或痛或癢仍作赤色人皆初不為事日漸長大不過十日遂至於死其臨困之時已濶三寸高一寸瘡有數十孔以手按之諸孔中皆膿出尋時失因所以養生者小覺背上癢痛有異即急取净土水和為泥捻作餅子厚二分濶一寸半以粗艾大炷灸泥餅上即貼着瘡上灸之一炷一易餅子若粟米大時可灸七餅子即瘥如榆莢大灸七七餅炷即瘥如錢大可日夜灸不限炷數仍服五香連翹湯及鐡漿諸藥攻之乃愈又法諸發背未作大膿可以冷水洗之浸石令冷熨之日夜莫住瘥乃止此病忌麫酒五辛等亦有當兩肩上發者凡服石人皆湏勞役四體無令自安如其不爾者多有發動亦不得逐便恣意取煖稱已適情必湏遺欲以取寒凍雖當時不寧於後在身多有所益終無發動之慮耳凡腫起背髀間頭白如黍粟四邊相連腫赤黑令人悶亂即名發背也禁房室酒蒜肉麫若不灸治即入内殺人若灸當瘡上七八百壯有人不識多作雜腫治者皆死背疽其原有五天行一痩弱氣滯二怒氣三腎氣虚四飲火酒食炙􅏼物服丹藥熱毒五盖治背疽不可一槩將為熱毒其治之難易當自一而至五病有殆甚而生有至微而死病證難辯死生何足决乎盖發背透胸者死不治此言肝俞已上未潰肉䧟靣青唇黒便汚者死此言壊臟便下瘀血潰喉者不治隂入腹者不治入囊者死鬢深及數日不治謂如及寸餘者在頥後一寸三分毒鋭者不治無此生流注雖多療之必愈發背之人雖云有熱未有不自腎虚而得之者若疽疾減退五分之後便合依法五更初服山藥丸或加八味丸背疽嘔逆乃是毒氣衝心非脾胃之冷當服内托散楊氏家藏方云有人因鼻衂初愈不曽表汗餘毒在經絡背發大疽自肩下連腰脇腫其腎如石色極紫黒醫以凉藥服之中夜大嘔乃連進此藥三四服嘔遂止既而瘡潰出赤水淋漓四十日而愈又有患瘰􅊓者痛過即嘔服此藥嘔亦止近見有人病疽醫者不肯用此藥為恐傷脾胃愚故引楊氏之言以解世人之惑凡發背疽之後不曽服内托裏散致使熱毒衝於心經必使發扵咽喉口舌生瘡甚至黒爛合先服犀角散以解散其毒免有此證凡有背疽之人難於隱几但用菉豆十㪷作一大袋隐伏則自然心凉身體安穏飲食居處依法戒忌已安後半年間血氣未定猶當謹之不廢藥餌方能保全外科精要云史氏叙源㓜時學舉業全不知醫藥甲申年自太學歸省國醫常頴士器之適在府下求為母氏一診云有藴熱必渴時母氏不飲大畧喜水又云但防作瘡覺便着艾於上熱盛則五花灸之謂中及四傍隨赤到處灸非方停也切記至辛巳年六月望日母氏忽言脾胛間欲癢視之有赤半寸許方有白粒如黍粟記器之言乃急着艾其赤隨消至二十七壯而止信宿復覺㣲痛視之有赤下流長二寸濶如韮葉舉家不悉皆以前灸為悔親戚交責謂赤熱如何用火詆器之者遂呼外醫用膏藥覆之益甚一日夜増一暈至二十二日衡斜約六七寸痛楚殆不勝間一呻吟聴之心碎蒼皇詢告或云等兹四寺老智全者前病瘡甚大得灸而愈奔問之全云劇時昏不知但小師輩言范八奉議守定灸八百餘壯力方甦約艾一篩爾亟歸白之見從如以銀杏作炷其上十數殊不覺乃截四傍赤引其炷减四之三皆覺痛七壯後覺痒毎一炷燼則赤隨縮入灸至三十餘壯赤暈微退病者信遂以艾作團梅杏大灸其上漸加至雞黄大約四十團方覺痛視火焦處已寸餘盖灸之遲而初發處肉已壊攘盛隔至好方痛爾四傍知痛者肉未壊也又有言一潘殿直居城南施瘡藥每效源即再拜邀請時已薫黒火焮滿背潘以手挼瘡五六寸許試之云瘡髙阜而熱不妨且云只怕不高而熱氣者病者食粥訖安寢前此六夜不寢至曉示之瘡如覆一甌突然髙三四寸上有百數小竅色正黒以千金所說與潘氏髙阜之言求之突然高者毒氣出外而聚也百數小竅者毒未聚而浮攻皮膚也色正黑者皮與肉皆壊也非艾火出其毒於壊肉之裏則五臟畢矣至是方悟明堂圖與煙蘿子所畫五臟在背如懸掛然今毒行分肉間待其外穿則内虚外實虛則易入實則難攻較然可見而聴庸醫用尋常赤腫敷貼凉冷藥以清散之此借冦兵也原痛自咎為人子不知醫致親疾危甚荷神明扶佑於瘡壯間問之艾邊已危而獲安醫學類證論曰治發背發腦發鬢丁瘡鬼箭躬魚劑等一切惡瘡無不靈驗方小覺有患便用蒜横切作片子如兩重紙厚貼在瘡以菉豆大艾圓子灸之待痛稍可忍即漸大作圓灸痛又可忍便除蒜灸之若是正發背二日内灸者十得十愈四者日内灸者十得七八六日内灸者十得五六八日内灸十得一二十日以後灸即不得力若得活者即是熱毒瘡非發背也凡發背者灸無多少定數但初痛候不痛即住若初不痛候痛即住然則大約如此若住火後又腫及痛者即湏更灸候不腫不痛即住火每患一个瘡或灸三百圓或灸五百圓或一千圓或二千圓以差為度或若患三个五个瘡直湏各各用前法灸之候不腫不痛然後用膏藥貼之或問曰何以知是正發背與熱毒瘡愚􅀿之曰若有患者待請人識認得是正發背或是熱毒瘡即已遲也何異咨大人而求救火者哉古人云面無好靨頭無惡骨背無好瘡但依此灸之不湏識别也或問曰前言醫一切惡瘡後但灸發背而已何也愚應之曰瘡中人言醫不得者發背也今若早灸無有不騐則其餘不言可知也或曰或遇春夏火正王相得行灸乎若灸多得無火毒入心乎愚又應之曰此是未知灸法之人也千萬勿信本事方云元祐三年夏四月官京師疽發於背召國醫治之不愈勢益甚得徐州蕭縣人張生以艾火加瘡上自旦及暮凡一百五十壯知痛乃已明日鑷去黒痂膿血盡潰膚裏皆紅亦不復痛始别以藥傅之日一易焉易時旋剪去黒爛惡肉月許瘡乃平是嵗夏間京師士夫病疽者七人余獨生此雖司命事然固有料理不知其方遂至不幸者以人意論之可為慨然儒門事親書云一富家女子十餘嵗好食紫櫻毎食即二三斤歲嵗如此至十餘年一日朝目如熱勞戴人診其兩手脉皆洪大而有力謂之曰他日必作惡瘡腫毒熱上攻目陽盛隂脫之證其家大怒不肯服觧毒之藥不一二年患一背疽如盤痛不可忍其女忽思戴人曽有是言再三悔􅂈戴人戴人以䤵鍼繞疽暈刺數百鍼去血一㪷如此三次漸漸痛減腫消㣲出膿而歛將作痂時使服十補内托散乃痊終身忌口然目亦昬終身無子凡背瘡初發便用藏用丸玉燭散大作劑料下臟腑一二十行次用排針於腫焮處循紅暈周匝内宻刺三層出血盡以濕軟帛拭去血甚者百㑹委中皆出後用陽起散傅之不可便服十味内托散其中犯官桂更用酒煎男子以背為陽更以熱投熱無乃太熱乎方二烏丸治發背托裏定痛驅風毒凉血脈一名萬靈丸羌活去苗薄荷葉各三両川芎三味不見火𤣥參地榆麻黄去根節蔓荆子去白膜旋覆花去蕚蒂荆芥穗各二兩防風去叉蘆天麻白芷不見火白殭蚕直者去絲足口炒牛蒡子炒各二兩甘菊花三兩大川烏去皮尖炒何首烏各四兩粉草炙四兩半蟬蛻洗去土前足半兩右為細末煉蜜丸如弹子大每服一丸食後細嚼茶酒任下大黄膏治發背疼痛日夜不可忍塗傅大黄剉雄黄研芎藭黄連去鬚白芷㯽榔剉當歸切焙木香桂去粗皮黄蘗去粗皮芍藥附子去皮乳香研麒麟蝎各半兩雞舌香麝香各一分猪脂一斤右為末拌勻先於銀器内熬猪脂令沸去筋膜下諸藥末調成膏塗患處日三上以差為度竹葉黄耆湯療癰腫已散自利虚熱不除冝服竹葉切三分黄耆四兩小麥一升􅆚藥三兩甘草一兩炙石膏二兩研人參二兩升麻一兩茯苓二兩一去七分桂心六分一去三分當歸三兩亁棗十四枚五味子三兩生薑三兩亁地黄一兩麥門冬三兩去心知母一兩右切以水一斗二升煑竹葉小麥取九升去滓内藥煑取三升温分四服千金托裏散出儒門事親書治一切發背疔瘡連翹二兩二錢黄耆一兩半厚朴防風桔梗各一兩川芎白芷芍藥官桂甘草各一兩木香没藥各三錢乳香三錢半當歸人參各半兩右為末每服三錢用水一大盞煎三沸和滓温服地黄丸常服令人終身不患發背熟地黄五兩蓯蓉酒浸天門冬石斛當歸防風白茯苓川芎各三兩逺志黄茋甘草芍藥各二兩人參細辛巴㦸各一兩右為末煉蜜為丸如梧桐子大每服三十丸荆芥湯下莽草膏療發背癰腫牢核成膿莽草芎藭當歸細辛附子炮黄芩烏頭炮牛膝躑躅野葛茯苓防風杜蘅各一兩猪脂半斤右切用猪脂合煎去滓傅瘡上日再忌猪肉冷水生菜大酢神仙萬應散專治發背疔瘡一切惡瘡金銀花一兩半皂角針川山甲白芷天花粉甘草節當歸尾防風藿香赤芍藥各半兩乳香别研没藥各三錢另研右㕮咀毎服一兩重水一碗無灰好酒一碗砂石器内頓用磁碟盖口紙條糊縫文武火煎至重車行十里逺香藥香為度熱服仍飲好酒數盃厚衣被汗出為效滓再煎服病重者不􅂈三服合煎服時並忌雞犬婦人見老病氣衰者加黄耆半兩連翹散治發背腫癰疽惡風結膿血連翹子獨活去蘆頭木香射干各三分甘草炙剉桑寄生剉升麻雞舌香沉香乳香研大黄剉炒一兩麝香研一分右粗搗篩每服五錢水一盞半煎至八分入淡竹瀝半合去滓空心温服快利三五十行為度未利再服排膿内補鐵屑散療癰疽發背當歸人參細辛甘草炙蓯蓉黄耆桂心防風黄芩鐵屑芎藭芍藥各等分右為散服方寸匕忌海藻菘菜生葱酢物等𤣥參散治熱毒氣攻腫背上初覺疼痛心神煩悶𤣥參黄芩當歸赤芍藥麥門冬去心犀角屑甘草生剉逺志去心生亁地黄各一兩赤茯苓川升麻人參去蘆頭各一兩半右為散每服四錢水一中盞入竹葉二七片小麥五十粒煎至六分去滓不計時候温服犀角散治發覺皮膚及頭背有瘡癤恐成癰疽兼臟腑壅澁或寒熱口亁心煩犀角屑一兩知母三分木通一兩剉赤芍藥川升麻薺苨萎㽔黄芩甘草生各三分麥門冬去心馬牙硝川大黄剉碎㣲炒各一兩右為粗散每服四錢水一中盞煎至六分去滓入竹瀝半合不計時温服以利一兩行為度黄芩散治大熱發癰在背或於隂股間黄芩剉黄耆剉木通剉前胡去蘆頭川升麻各一兩半􅌝􅌣根二兩芍藥一兩赤茯苓一兩甘草一兩生剉川大黄二兩剉碎㣲炒人參半兩去蘆頭當歸半兩右為散每服四錢水一中盞入竹葉二七片小麥一百粒生地黄一分煎至六分去滓不計時候温服麥門冬湯治發背癰已服利湯後服此麥門冬去心焙黄耆剉芍藥生亁地黄各一兩前胡去蘆頭黄芩去黒心升麻逺志去心括蔞去皮各三分當歸半兩小麥一合右粗搗篩每服五錢水一盞半棗二枚擘生薑一􅀥大碎竹葉二七片同煎至八分去滓空心