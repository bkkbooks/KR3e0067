骨去甲一兩右為散凡患者初覺時以水調掃腫處如已大作者入醋麫同調傅之龍葵根散治發背成瘡癰疽成瘡者龍葵根剉一兩麝香研一分右先將龍葵根搗羅為末入麝香同研令勻水調塗於瘡上金粉膏治發背癰疽瘡錫四兩用新瓦盛炭火安錫在上扇之候錫成灰研末蜜陀僧四兩入罐子内以盞子盖口鹽泥固臍勿令透氣用炭火煆不聞藥氣為度取出放冷右同研極細量瘡大小臨時入膩粉少許以雞子黄和調如膏攤瘡上以緋帛盖之乳香貼方治發背乳香研黄蠟好者右等分同入銚子鎔化㵼入水内斟酌瘡大小取劑在於火上鎔化攤於帛上或紙上貼之不住以手按令着肉為此藥易亁故也一日三易腫消痛止如已有頭欲破者亦漸縮減麥餅方治發背崔元亮海上秘方李北海云此方神受極竒一名甘草膏大麥炒熟九両一法用大麥麫甘草生用三兩右為末用好醋少許和匀㣲有醋氣仍以百沸湯拌和作餅劑方圓大小如瘡腫大熱傅之以油單并故紙密裹勿通風冷即換之長須吃黄蓍米粥甚妙如已成膿自出未成内消一方用酥少許不用醋百草霜膏治發背癰疽及一切瘡熱痛不可忍者百草霜生蠐螬等分右同研細貼之冷如氷痛即止治諸癰疽發背或發乳房初起微赤不急治之即殺人取母猪蹄兩隻通草六分以綿裹和煮作羮食之治發背消瘡癰腫㧞毒以五月六月採曲節草莖葉隂乾作末米汁調服治發背初覺宜服黄牛乳二大盞秦芃二兩去苗剉右藥相和煎一大盞去滓分温三服當時快利為度治發背方用亂髪灰酒服方寸匕亦治瘭疽又方用猪脂傅上四五度亦治發乳救急方云取猪羊脂切作片冷水浸貼上暖易五六十片瘥若切貼時少許即寒寒定好眠甚妙又方用三年醋滓微火煎令稠和牛脂傅上又方用猪狗牙燒灰醋和傅上日三四易又方用燒古蚌灰雞子白和傅上日三四易又方用飲鐵􅄴二升取利又方用蛇頭灰醋調和傅之日三易又方用燒鹿角灰醋和敷之日四五易治發背欲死取冬𤓰截去頭合瘡上𤓰當爛截去更合之𤓰未盡瘡已歛小矣即用膏葢之治疽糝藥方李氏云龍游有患背疽已潰如碗面大視五臟僅隔膜耳自謂必死有用大鯽魚一枚去腸臟以羯羊糞實其中烘焙焦黒極乾燥為細末乾糝之瘡口遂収至今無恙此用洪氏方屢效故附于此須候膿少欲生肌肉時用之治發背諸惡瘡痛不可忍方用糞缸底上青泥取出隂乾為細末用新水調傅其瘡立止治發背用亂髪露蜂房蛇皮燒灰存性調傅一錢神效金鍼散治發背用皂莢針春時取一半青一半黒者不拘多少曝乾擣羅為散先任意飲食訖用藥三錢酒調服之立差未退再服黄石散治發背瘡昔楊愔患背腫馬嗣明以煉石塗之便差用粗理石如鵞卵大猛火煆赤投醋中因有屑落醋中復煆投石盡為度取屑曝乾搗散以醋調傅背上即愈也嗣後馬嗣明以此方醫楊遵彦背瘡效劉禹錫謂之煉石法用之敷瘡腫無不愈者桃花汁治發背瘡癰疽用桃花不拘多少於平旦承露採取以釅醋研絞去滓取塗瘡上有蟲即出無花但桃葉亦得以臘月猪脂和塗亦佳治發背瘡腫方用白麫取泥拌和圍腫四畔令童子七人尿圍中浸腫處即差又方用新馬糞一味塗腫上乾即易之亦療發乳又方用益母草一味爛搗絞汁三合服之滓傅瘡上乾即易之硝石搨方治發背赤焮疼痛用硝石五兩湯一斗浸硝待冷取故青布兩片更漬浸搨日三五度薜荔散治發背神效用薜荔葉一味不拘多少隂乾搗羅為散每服三錢水一盞煎至七沸温服更用葉煎湯洗甚妙一方治背癰和蜜飲數升滓𫝊瘡上後以他藥傅貼遂愈昔宜興縣張渚鎮有一老舉人聚村學年七十餘忽一日患發背村中無他醫藥急取薜荔葉爛硏絞汁和蜜飲數升以其滓傅瘡上後以他藥傅貼遂愈醫者云其本蓋得薜荔之力乃知圖經所載不妄又方以薜荔葉乾末傅之下利即愈又方用糯米不拘多少炒熟細研以井花水調塗四面乾即易之又方用木芙蓉葉自落者經霜然後收之碾末淡醋調於掌上如青苔色為妙絹帛塗貼瘡上一方治軟癤用鹽水調搽治發背初覺腫痛方用赤小豆一味搗羅為末和猪膽汁塗之乾即易治發背及一切熱瘡腫方用芸臺一握切和酥炒熟傅瘡上冷即易日三度單用葉傅亦可治背瘡取户庭蜘蛛杵以醋和先針四畔令血出根稍露用藥傅乾即易旦至午㧞根出大有神效治發背用金星草不拘多少搗為末冷水服方寸匕及塗瘡上亦效彼人用之往往皆驗又方用葉連根半斤剉以酒五升銀器中煎取二升五更初頓服丹石藥毒悉下并治癰腫結核衍義曰不惟下所服石藥兼毒去瘡愈如不飲酒以新汲水調服以差為度療發背神驗法取牡狗白糞五升凡覺欲作時以温水一碗絞取汁分再服仍以滓傅上每日再為之差止治發背欲死方用伏龍肝為末以酒調厚傅其上瘡口亁即易不日平復治發背用蝸牛一百枚活者一升净瓶入蝸牛用新汲水一盞浸瓶中封繫自晩至明出蝸牛放之其水如涎將真蛤粉不拘多少水調旋傅以雞翎掃之瘡上日用十餘度其熱痛止瘡便愈治發背用白歛不拘多少為末水調傅之良治發背欲死用人屎煆作灰醋和如泥傅腫處亁即易之良治發背疑似者須便服此用秦芃剉以牛乳煎服當得快利三五行即差治發背用地菘一升杵汁服之日再服以差止治發背欲死用雞腸草搗爛傅之良治發背初得毒腫焮熱赤痛用水苹不拘多少爛搗和雞子清貼之甚良治發背癰疽用生菖蒲搗貼若瘡亁搗末以水調塗之治發背用石韋葉於二月七月採隂亁炒末冷酒調服甚妙治發背瘡取白馬齒燒灰先以針刺瘡頭開足以灰封以濕麫圍腫處後以釅醋洗去灰根出治發背頭未成瘡及諸熱毒腫用水煮青竹筒角之掘地作坑貯水卧以腫處當坑子上角之如菉豆大戢戢然出不止遍匝腰肋治發背方用草决明生用一升搗碎生甘草一兩重亦搗碎水三升煮取一升温服分二服大扺血滯則生瘡肝為宿血之藏而决明子和肝氣不損元氣也治發背瘡用五倍子杏仁猪懸蹄白芷蓮房荆芥葱頭細香葉好者煎湯洗療發背取蔚臭草搗取汁服一雞子滓封上熱即易之療發背及諸瘡乆不差有效方先以甘草湯洗瘡裛拭極亁乃嚼胡麻傅上亁即易從旦至日西去胡麻乃取黄連末滑石末中半相和以傅瘡上數數明日又依前傅胡麻及黄連等末更不須洗瘡不過六七日即差必効治發背疽瘡膁瘡瘰􅊓腦疽用地蜘蛛取山豆花根日中曝亁為末初覺腫痛將此藥用津液調塗於上用膏藥紙封貼大効治發背已結成膿括樓塗方用生栝樓根細剉搗研如糊塗之日三五度即差一方為末苦酒和傅治發背初覺腫恐不知定處以濕紙貼之先亁處即是若病根多速覔水蛭令入發病處食血數易甚良治一切癰腫及發背疼痛不可忍但未成膿者用甘草一大兩㣲炙搗碎水一大升浸之器上横一小刀子置露中經宿平明以物攪令沫出吹沫服之但是瘡腫發背皆可服一方用生者為末酒調二盞湏頻服王中奉䖍服之得効治發背已發未結成已結成未潰用牛皮膠二兩酒二升生甘草一寸同煑候牛皮膠溶化放温令病者徐徐飲盡如未結成即消已結成則易潰已潰則易差如未効再用必効治發背癰疽一切毒瘡瘡口大窟用臘月亁桑葉不拘多少碾為細末以新汲水調塗瘡上如瘡有膿血即亁摻用之如瘡在脚膝間傅藥了用帛子褁之神効一方煎湯皆可用治發背其瘡臨發之時用􅒝麻子一合剥去皮同白膠香一處搗細攤紙上放寛大貼了方才發則散已成者即潰言已見効治發背於不耕之地遇野人糞為蟲鳥所踐處即以杖去糞取其下土篩以傅之即如氷着背也治發瘡熱腫取蕺汁盖之瘡上開孔以吸熱毒冷即易之差治發背纔發已成口未成口用牛耳楓樹根其葉小而三叉葉上面無毛而光者酒擂攄滓飲酒以滓塗瘡仍服乳粉内托散犀角丸治發背初覺腫恐不知定處以濕紙貼之先亁處即是若病根多速覔蛭濕令入病處食血數易甚良治一切癰腫及發背疼痛不可忍但未成膿者方見癰疽等瘡内消法類小犀角丸羚羊角散内消發背方見癰疽等瘡内消法類大全内消散糯米膏治發背疽毒一切惡證糯米先洗七次絹袋揖當風二七日炒一斗紫河車去皮毛用生根赤者不用白者五兩五倍子瓦燥之五兩白歛真者如白蘿蔔亁色白味苦甘二兩黄柏皮燥焦五兩黄芩懐亁五兩白芨生二兩當歸酒浸焙亁二兩右為末酸醋調入瓶時取傅患處若已成欲破加白丁香雀矢尾直起者烏尖為末和上藥㸃上却用不加之藥敷四畔内服白术黄耆三兩蜜炙木香當歸各一兩為末酒下二錢病在四肢食後服膈上眠時鬲下空心服之秘傳神効治發背瘡凡發背者自内而外也熱毒中隔上下不通所以蒸背上虚處先三五日隱脈妨悶即漸成膿見出皮膚結聚成膿也其方如後白麥飯顔色黄白類麥飯者曽作磨尤佳炭火燒紅醋中浸之十次為末白歛末與石等分鹿角二三寸截之不用自脫者凡帶腦骨者即非自脫炭火燒烟盡為度碾羅為末倍前二味右并搗細末取多年米醋鐺中煎令魚眼沸即下前件藥末調如稀餳以箆子調傅腫上瘡頭留一指面勿令合以出熱氣如未膿當内消若已作頭當撮小若日乆瘡甚肌肉損爛筋骨出露即布上塗藥貼之瘡上亁即再換但以膈中不惡無不差切忌手傷冝慎之此方東坡先生具載得効姓名甚多兹不多述惟後之用藥君子當信先生之記故予更不敢私秘其良方也白散子治發背候取下毒物次用清凉膏貼之白附子大香附子各半兩半夏一分姜製黒牽牛二兩半生半炒令熟大甘遂一分以大麥炒候麥黄赤色去麥不用次極慢火炒之右為末量患人虚實加減每服二錢以蜜酒調下續飲温酒一兩􅊦候所苦處刺痛為度微利三五行瀉出惡物即差次用膏藥貼之氣盛者一服二錢餘更裁度清凉膏治發背先用白散子取之次用此藥貼之川當歸二兩香白芷木鱉子肉白芨芍藥黄蘗白歛各兩乳香别研膩粉各少許白膠少許黄丹五兩右用清麻油十兩煎上七味候紫色去之入槐栁枝各七寸再煎少頃又去之入黄丹五兩熬成入乳香等重綿濾入礶子内貯之用如常貼使治發背一切癰疽金石藥毒發右用紫背車螯大者鹽泥固濟火煆通紅放冷出研為極細末地上出火毒一宿以甘草膏圓如梧桐子大每服三五十丸甘草湯下日進三服第三日取下惡物用後藥貼之貼瘡白膏藥右寒水石不拘多少火煆通紅入甆器中封口令宻沉井中一宿取出研細以臘月脂和膏稀稠得所自瘡赤盡處塗之濶一指許上以薄紙為花子中心留一孔貼定漸次赤退即迤邐移近裏至愈紙花孔子外所留紙令與所留藥濶狹等沉香散治發背止燥渴疼痛内消毒氣赤小豆一合人參一兩甘草瞿麥黄芩黄耆各一兩剉白歛半兩當歸一兩細剉沉香一兩右為細末温水調下二錢不計時候日二三服車螯酒治發背癰疽車螯殻一二个泥固濟火煆􅂈為細末燈心三十莖蜜一大匙苽蔞一个右碎剥苽蔞用酒一升以下煎三味㣲熱調車螯末二大錢不過兩服痛止治發背發妳癰疽等一切毒瘡穿山甲一兩用土炒成彈子塊白丁香淘去砂净取半兩右為細末每服二錢用麝香酒調下治發背湯夀資云光州有人患腎癰大小便皆秘甚以為苦有本州胡判官令以明净牛皮膠炭火上燒成黒灰研極細每服五錢以米飲調下服至二兩許方通所下皆穢惡物癰腫遂不復出膿胡云凡瘡腫皆可服不拘多少以臟腑通利為度閻資欽録夀州霍丘醫瘡人元立治瘡甚有聲元符己卯予侍先子將漕江東舟次夀州予因累日食雞卯數十枚暴得咽喉腫塞及頸赤腫硬下連心胷如鐵石日夕號呌喉中水米不通壅塞將死召醫者視之云此喉癰也泛泛藥恐無益因言可招元立治之必愈先子夜遣价兩日徃還數百里召立至用藥數服得効報之頗厚立感激予自𫝊治發背方四首皆累用有竒功令録于下一醉膏治發背癰疽一切惡瘡當先用托裏藥使毒氣皆出凡初覺發背癰疽等即多服用大黄甘草等藥極踈轉以行結毒次用此藥大甘草半兩為粗末没藥一分研苽蔞一个大者去皮右用無灰酒三升熬至一升放温頓服之如一服不盡分三兩服盡次用收暈白玉膏收暈玉膏切忌用冷藥外貼必逼毒氣入内殺人杏仁二十枚去皮尖川椒四十九粒去目為末清脂麻油一兩酒蠟半兩白者右同熬至紫黑新綿濾過用無灰薄紙㸔瘡大小剪作梳樸攤藥在上於瘡暈盡處兩邊圍遶貼之候暈漸收近裏即别剪差小者再攤藥圍貼暈又收即又剪差小再移近裏貼仍頻換候暈已收見瘡根脚或瘡口即用次方此貼大惡瘡毒氣方盛不可以藥當上貼恐赶散毒氣瘡益大暈收見瘡次用檳榔散雞心檳榔半兩川黄連去鬚半兩川山甲大者十片燒灰存性右同為細末先用好蠟茶清掃過瘡用藥厚傅瘡上日三五次以膿出為知如見瘡口後用此藥數次了可更用乳香膏膿已出用生肌藥黄狗腦盖骨二兩燒灰存性此極難得湏預収膩粉一錢桑白皮末一兩右同為細末用油調塗瘡上以上四方是一宗元立自云少年時初得此方救十餘人後忽自病背瘡自信其藥乃以此四藥自治得愈袒背示予瘢痕猶盈尺地予在汝州時梁縣吏人侯昱孝母病背瘡予用此治之愈揚州楊吉老醫名甚著某郡一士人狀若有疾厭厭不聊莫能名其何等病苦徃謁之楊曰君熱證已極氣血消鑠且盡自此三年當以背疽死不可為也士人不樂而退聞茅山觀中一道士醫術通神但不肯以技自名未必為人致力士人心計較竊衣童僕之服詣山拜之願執薪水之役於廡下道士喜留置弟子中誨以經書晝夜祇事左右順㫖越兩月覺其與常𨽻别呼扣所從來始再拜謝過以實白之道士笑曰世間那有醫不得的病汝試以脉示我纔診脉又笑曰汝更可下山吾亦無藥與汝但日買好梨吃一顆如生梨已盡則以亁者泡湯飲之仍食其滓此病自當平士人歸謹如其戒經一嵗徃揚州吉老見之驚其顔貌腴澤脉息和平謂之曰君必遇異人不然豈有痊安之理士人以告吉老立具衣冠焚香望茅山設拜豈自咎其學之未至耶又北瑣夣言載醫者趙鄂云一朝士疾危或謂只有一法請剰吃消梨不限多少如咀嚼不及捩汁而飲或希萬一用其言遂愈此意正同大凡有背疽之人難於隱几但用菉豆十數斗作一大袋隱伏則自然心凉身體安稳得以盡心服藥將息也治發背及癰疽惡瘡腫核如初覺皮肉間有異知是必作瘡者皆灸之切大蒜如銅錢厚片安腫頭上炷艾灸之不計壯數其人被苦初覺痛者以痛定為准初不覺痛者灸至極痛而止若蒜焦即易前後用此方救人無不應者若是疣贅之類亦如此灸之便成痂自脫其効如神乃知方書所載無空言但患人不能以意詳之故不得盡應耳抵聖散治發背癰疽及一切瘡癤腫毒𤓰蔞四兩去皮何首烏四兩大山茨菰二兩甘草節二兩地榆二兩没藥一兩乳香半兩麝香一錢别研右為細末毎服三錢温酒調下連進二服便住痛一日三服治發背頭未成瘡及諸熱毒以濕紙搨上先乾處是熱氣上衝欲作瘡子便灸之如先疼痛灸即不痛不痛即以痛為度治癰腫發背以千金藤煎服發背潰後附論夫發背病者由寒氣客於經絡折於氣血血澀不通乃結成發背膿出之後眼白睛青黑而眼小一逆也服藥而嘔二逆也傷痛渴甚三逆也髆項中不便四逆也音嘶色脫五逆也皆不可治其餘或熱渴利嘔非倉卒之急也可得漸治凡發背則熱氣流入腑臟膿潰之後血氣則虚腑臟積熱渴而引飲飲冷入於腸胃則變下利胃虚氣逆則變嘔也嘔逆若遇冷折之氣不通則噦也其瘡若膿汁不盡而瘡口早合雖差更發惡汁連出則變成瘻也方𤣥參散治發背潰後膿血不止漸漸瘡大疼痛身體壯熱𤣥參二兩黄蓍二兩剉露蜂房一兩㣲炒地榆二兩剉白歛一兩赤芍藥二兩黄芩二兩川升麻一兩漏蘆二兩桑根白皮二兩剉梔子仁一兩川大黄三兩剉碎㣲炒川芒硝三兩右為散每服四錢水一中盞煎至六分去滓不計時候温服連翹散治發背潰後排膿解毒消腫退熱止痛連翹前胡去蘆頭人參去蘆頭赤芍藥薺苨桔梗去蘆頭𤣥參黄芩甘草生剉防風去蘆頭赤茯苓各一兩桑根白皮一兩半黄蓍二兩剉右為散每服四錢水一中盞煎至六分去滓不計時候温服蓯蓉膏治發背癰疽已潰不生肉煖肌亁瘡肉蓯蓉去皮半夏生剉熟亁地黄各一兩當歸蜀椒去目并閉口者炒出汗細辛去苗葉烏喙去皮蛇啣草白芷甘草桂去粗皮各半兩韮白七莖猪脂一斤右除猪脂外剉碎以醋半升拌藥一宿先熬脂令沸次下諸藥煎候白芷赤黒色漉出綿濾瓷合盛取塗瘡上日三次立效當歸湯治發背先穿出膿水不住傷外風冷毒焮痛淋洗方當歸剉焙甘草炙剉芍藥葛根剉細辛去苗葉黄蘗去粗皮麻黄去根節苦參白芷桂去粗皮蜀椒去目并閉口者炒防風去蘆一分右粗搗篩以水六升煎取三升濾去滓温洗瘡上日再黄耆湯治發背已潰去膿汁理虚勞内補黄耆細剉麥門冬去心焙各一兩熟地黄焙人參白茯苓去黒皮甘草剉各三分當歸剉焙芍藥芎藭桂去粗皮逺志去心各半兩右粗搗篩每服三錢水一盞入生姜半分拍碎棗二枚擘破同煎至五分去滓空心温服日晩再服一方有五味子漏蘆散治發背瘡潰後膿水不止漏蘆連翹梔子仁黄芩黄􅆱剉防風去蘆頭石葦去毛元參甘草生剉犀角屑各一兩右為粗散每服四錢水一中盞煎至六分去滓不計時候温服具齒散治發背潰後膿水不盡宜服排膿止痛具齒黄耆剉當歸赤芍藥生亁地黄黄連去鬚川升麻桂心各三分犀角屑一分半甘草半兩生剉右為細散不計時候以温熟水調下二錢連翹飲治癰疽發背瘡腫或已潰或未潰連翹山梔子仁黄蓍剉炒防風去叉升麻羚羊角鎊漏蘆去蘆頭甘草炙剉大黄剉炒枸杞皮各一兩右粗搗篩拌令匀每服五錢水一盞半煎取八分去滓空心温服白石脂湯治發背已潰痢下不住白石脂炮龍骨炮各一兩當歸剉焙桔梗剉炒各半兩𤓰蒌白頭翁各一兩黄連去鬚半兩亁姜炮製裂甘草炙剉各三分右粗搗篩每服三錢水一盞煎至五分去滓空心温服日午晩候各一服露蜂房散治發背潰後毒氣未散膿不絶露蜂房二兩燒灰亂髪灰一兩蛇皮灰三分赤小豆二兩炒熟川大黄三兩半剉碎㣲炒𤣥參一兩半子芩二兩半川芒硝三兩半右為細末每服二錢煎黄蓍湯調下不計時候生肌散治發背潰後膿水不絶托裏散川芎二兩黄蓍二兩剉白芷半兩赤芍藥桂心三分人參半兩去蘆頭丁香半兩當歸一兩右為散每服二錢粥飲調下黄蓍散治發背膿血穿潰後痛處不可忍黄蓍一兩剉人參一兩去蘆頭桂心三分當歸半兩赤芍藥一兩甘草三分生剉生亁地黄三分右為散每服四錢水一中盞煎至六分去滓不計時候温服麒麟竭散治癰腫發背惡瘡生肌後用力勞動努傷出血不止麒麟竭半兩黄連三分㯽榔半兩黄蘗半兩剉白芨半兩訶梨勒皮一分右為細散雞子白調塗瘡口上以白薄紙貼之藥亁即換忌用力勞動療背瘡定訖令生肌方麝香二錢棗皮灰半兩生麻油六合右依法和用火重湯上煎十餘沸稀稠得所取故帛塗膏貼瘡上取漸次瘳減唯得吃白羊頭肉但是豆並不得吃餘如藥法大黄湯治發背後服大黄朴硝各三錢右粗搗篩水一中盞濃煎熱服即㵼出毒氣一方塗腫上内補黄蓍散治發背已潰去膿稍多裏虛冝服黄蓍二兩剉白茯苓桂心麥門冬去心當歸甘草生剉逺志去心各一兩五味子二兩人參一兩去蘆頭右件藥搗粗羅為散每服四錢以水一中盞煎至六分去滓不計時候温服治發背貼熁淋搨法附論凡發背始發或似小癤或復大痛或復小痛初發頭如麻子大此皆㣲候宜速察之若有小異即湏大怖便急治之仍忌口連服諸藥下去熱毒若在僻逺無醫者即當頭灸百壯若已大腫灸四面及頭二三百壯不厭多也復薄貼冷藥種種救療必得差也其用貼熁藥皆湏當中開孔令洩毒氣也發背者由六腑不和經絡否澁血壅不通熱毒藴積結成癰也其腫起於背胛中白如黍米四畔相連腫赤熱而疼痛或已潰或未潰毒氣結聚當用藥煑湯淋搨瘡上散其熱毒夫湯水者能蕩滌壅滯宣暢血脉故用湯淋搨也方大黄散治發背初發如麻子粒大漸以結硬疼痛川大黄木香𤣥參黄芩赤芍藥白歛紫葛赤小豆各一兩右為細散用雞子白調如麫糊於絹上塗貼亁即再貼以散為度雄黄散治發背腫毒焮赤疼痛雄黄一兩細研黄連一兩去鬚黄蘗五錢剉赤小豆三分川朴硝一兩黄芩五錢白芨三分右為細散用猪膽調如麫糊日三四塗𫝊瘡上桞木耳餅治乳石氣發背瘡赤黒色宜貼老栁樹上木耳二兩黄連一兩去鬚龍葵根一掘净洗去土切乳香一兩人糞灰五錢杏仁一兩湯浸去皮尖右件藥相和搗三五百杵揑作餅子厚五錢已來一依瘡大小貼之恐藥不住以單帛勒之病者覺癢及冷應心則不得以手搔之如人行二十里一換須㬰癢不可忍四畔便皺膿即流出急去其藥以甘草温湯洗之用膏藥貼之每日一換皆須甘草湯洗之以差為度癢即易差或赤色不癢即難差㧞毒散治發背塗瘡方陽起石寒水石礜石白石脂石膏麥餅石各二兩右為末重研如麫用新汲水調塗瘡上解毒生肌散方石灰一分多年故船上者佳以净器中燒令赤黄丹一分炒令紫色龍骨一分麝香一分椹子一分蜜陀僧一分右為細散每用傅之治發背磨刀石熁腫方磨刀赤石一片濶三寸長三寸厚一寸者白歛二兩川大黄二兩醋一升鹿角八兩燒為灰右取磨刀石燒令赤即内醋中復出燒赤又内醋中候醋減半即取諸藥一處㨶為細散以醋調如膏軟帛上貼亁則易之苽蔞根散治發背及諸毒腫宜塗方苽蔞根三兩榆白皮三兩剉胡燕窠土五兩䑕坋土五兩右為細散取芭蕉根汁和作稀膏用塗腫上亁即更塗如潰膿有頭者即四面塗之一方用女人月經衣水洗取汁和如泥傅石灰散治一切腫及發背乳癰等風化石灰一合小麥麫三合皂角灰一合白歛一合右為細散以釅漿水和如麫糊塗貼日三四換之又方治發背初得毒腫没石子一枚墻上杇骨一分胭脂一分右相和研令勻細每用傅之如未結膿作頭只用浮萍草傅之自消抵聖熊膽丸治發背瘡焮熱疼痛熊膽麝香右等分同研為丸如黍米大用時先以温水洗瘡令净安一丸於瘡口内上摻觧毒生肌散後用醋麫糊攤於故帛上盖之手按不可忍者立効清凉膏治發背焮熱疼痛消腫毒糯米二升龍腦一分右糯米水淘令净入龍腦相和研成膏攤於踈布上貼乾即易之又方大麥麫三升黄牛乳二斤右相和作餅子以傅腫處熱即易之以差為度治發背瘡腫疼痛不可忍露蜂窠一兩半甘草二兩生用右剉以水三升煎至二升去滓以綿浸湯中洗瘡四面辟除毒氣令瘡早差治發背熱毒腫痛不可忍蘩蔞燒灰一升大麥麫三合右藥以水和如膏塗於腫上亁即易之以差為度治發背初有經日腫熱焮毒氣猛盛日夜頭疼雞子清三枚新狗糞一拘右藥相和令硬軟得所揑作餅子可厚一二錢當頭開一孔子貼腫上以帛子抹即日三貼之取差為度治覺似發背但是熱腫即用之令内消方皂莢一挺去黒皮及子栗子一十枚去殻曝亁右為細散以新汲水和如麫糊攤於布上以傅腫處亁即易之葛根湯治發背癰疽一切瘡腫乳癰口亁脚冷發作寒熱頭痛嘔噦不下食方見癰疽發背發渇類麥門冬湯治發背及疽一切毒腫内消方用剪刀草不限多少净洗切搗絞取汁一小盞温煖頻服之并剪刀草爛研濶鋪於腫處如有乾者搗抹蜜調塗之又方用理石五兩以水煮一日搗研令極細取冷水調塗又以青布三重可赤腫處方圓濕布搨之熱即頻換有效又方用生地黄不拘多少搗如泥以故布一條濶狹如腫大小薄攤地黄於布上攤乾摻木香末於地黄上令徧即於木香末上又攤地黄泥一重令夾香末乾搨於腫上乾即易之不過三五度効治發背疼痛不已取黄牛糞在芒田中經雨多者此糞大白色良收取去泥土曝亁一半以炭火燒令煙絶一半燒令黒糟相和研令極細以生麻油調如麫糊日三四塗之治發背及癰疽未潰方以莨菪葉似覺有瘡即取前件葉不限多少旋炙令熱便熨瘡上冷即易之以痛止為度冬月無葉即取根劈作片炙熱熨之治發背兼腫毒方搗地菘絞取汁一小盞用乳香末一錢以水研塗之亁即更塗如未有頭有於四面塗之一方無乳香又方用馬齒莧有黄花時搗絞取汁日前成膏如患發背者研入硝石少許日四五上塗瘡立効治發背癰腫方用犢子耳中塞摻於瘡上立差不問黄牛水牛並良黄連湯治發背癰疽穿穴時乆壊爛惡寒不可近出骨露筋餘毒未解攻刺疼痛不可忍淋洗方黄連地骨皮羌活防風木通甘草白芷川大黄狼牙川升麻莽草藁本黄耆剉赤芍藥細辛桑根白皮黄芩白礬葱白麻黄去根節各一兩右藥細剉分為七貼用水三升煎取二升去滓温煖淋洗瘡上後以熱衣拭亁以生肌膏貼之地黄湯治發背始作便成瘡爛壊宜搨之方生地黄汁一升川升麻白歛梔子仁黄連黄蘗當歸赤芍藥射干川大黄甘草生用各二兩右藥細剉水一斗煮至六升去滓下地黄汁攪令㣲温以故帛内湯中蘸搨於腫上淋搨枳殻湯治發背及惡毒瘡腫宜用抽風毒枳殻苦參莽草甘草水葒細辛藁本白芷黄耆各二兩白礬一兩右藥細剉拌令匀分作三貼每貼以水五升入葱白五莖煎至三升濾去滓於避風處用軟帛替換承熱揾藥水淋搨患處以水冷為度莽草露蜂窠白芷桑根白皮甘草防風藁本細辛各半兩垂栁枝葱白各一握右藥細剉以水一斗煎至五升去滓及熱於避風處用軟帛替換蘸藥水承熱熨患處以水冷為度竹瀝湯治發背腫痛宜搨方竹瀝二升川大黄黄連苦參黄芩梔子仁石灰木爛皮黄蘗各一兩右為細剉以水五升入竹瀝煮藥至三升去滓以綿揾湯搨瘡上日十餘度猪蹄湯治癰腫及一切瘡或煩疼浸滛宜用澆淋方猪蹄一對去毛净洗芎藭赤芍藥川升麻甘草蛇床子川大黄蒴藋槐白皮各一兩右藥剉先以水二斗煮猪蹄取一斗漉去猪蹄下諸藥煎取六升去滓適寒温澆淋瘡以湯冷為度拭亁别用傅藥黄連湯治背瘡毒腫焮爛疼痛宜搨方黄連麻黄根甘草狼牙羌活桑枝白礬各兩右藥搗細每用二兩入葱白五莖以水五升煎至二升去滓用軟帛承熱揾藥水更畨淋搨患處水冷即止黄芩湯治發背不消宜搨方黄芩白芷苽蔞根甘草當歸各一兩川大黄三兩右藥細剉以水七升煮至三升去滓以故帛揾湯更畨搨患處木通湯治癰疽發背初覺似有即速服藥取通兼用此湯淋射木通一斤白楊皮一斤川升麻半斤露蜂房四兩赤芍藥半斤甘草半斤右剉以水三斗煮取一斗濾去滓適大熱用注觜瓶兩三枚更互盛湯高擡手注射腫處勿令間㫁可一食乆次用煖水注射一食乆即解散熱氣苦參湯治癰瘡爛壊淋洗方苦參防風露蜂窠甘草各二兩右藥細剉以水一斗煎至六升去滓熱洗湯冷即住猪蹄湯治一切敗爛瘡洗方猪蹄一對敗醬一兩槐栁枝各一握黄蓍二兩剉右藥細剉先以水一斗下猪蹄煮令爛去猪蹄下諸藥更煎取四升以布絞去滓洗瘡湯冷為度以綿拭亁便以生肌膏貼之黄連餅治發背發鬢乳癰諸毒腫宜貼黄連去鬚蛇床子乳香各一兩杏仁半兩蔓菁根一握鹽一分人糞灰半分栁樹上木耳一兩右為細散入酥和揑作餅子厚如五錢以貼患上用粗布𦂳抺之每日三四度易之夜亦如之每日易時先以甘草湯洗之如未作頭貼藥便撮作頭如已穴有膿水亦貼之即生肌肉如膿水已盡即貼烏龍膏若有努肉即取栁樹白木耳細研㣲㣲摻於膏上貼之搨腫方大黄黄芩白歛芒硝各三分右㕮咀以水六升煮取三升故帛四重蘸汁中以搨腫處亁即易之無度數晝夜為之治發背及癰腫已潰未潰香䜴三升少與水和熟搗成強泥依腫作餅子厚三分以上有孔勿覆孔上布豉餅以艾列其上灸之使温温而熱勿令破肉如熱痛即急易之患當減快得安稳一日二度灸之如先有瘡孔孔中得汁已即瘥升麻湯治發背及諸腫毒冝搨方川升麻一兩黄芩二兩梔子漏蘆各一兩蒴􅀢根三兩川芒硝二兩右件藥剉碎以水一斗煮取五升去滓候冷用綿揾藥搨腫處常令濕潤即消也活調傅散治疽發背先用篐藥乳香没藥白芷白歛南星赤小豆天花粉芙蓉葉黄連貝母寒水石地榆黄蜀葵葉或花或子白芨百合右為末調傅瘡留口如瘡腫硬而厚按之方痛加草烏尖狼毒蜜醋調傅又方明硫黄蕎麥粉等分井水調作餅子日亁用時為末水調傅之宜又方用桑白皮白芷䓤白蘓葉苦參露蜂房為粗末水煎時温淋洗之又摻末用經霜葉兼亁為末摻瘡口又宜紅玉散用飛號丹寒水石等分為細末摻之能生肉瘡已潰欲結口者方可用生末外臺秘要療嗇嗇惡寒似欲發背或已生瘡腫癮􅇙起方以硝石三兩煖水一升和令消待冷取故青布沓三重以赤處方圓濕布搨之熱即頻易立瘥麝香散治發背癰疽腫毒疳漏等瘡麝香别研輕粉定粉已上三味各五分粉霜一字半巴豆三枚大者去皮白丁香四十二枚㨂直者右件先研巴豆細却入諸藥同研極細為度如疳瘡有限者用水和藥作鋌子紝在瘡口内然後用萬金膏貼每日一上如膿多兩上如惡瘡發背魚眼丁瘡有紫惡肉只做散子亁摻在惡肉上後用萬金膏貼每日一上或再上且少摻藥如不痛更加藥少許治癰疽發背三法第一法如上藥後覺冷如水萬不失一或不覺冷則難治蓮花蘂黄鬚者用三錢雄黄五錢生天南星五錢生川當歸二兩去蘆蜈蚣赤脚者一條生飛羅麫二錢生苣霜二錢生右七味不見火晒亁為細末釅米醋調成用紙花大於患處紅暈上半寸許敷藥於紙上貼於患處用箆子重疊㧎紙令着寔紙花留眼子在瘡口上放近下令出膿水一日一換臨換藥時用煎熟温湯以軟綿蘸湯洗去舊藥候亁再上新藥其藥不可乆留則無力旋合不可過三日如瘡大用藥多則以料劑添合之如發渇一面服第二藥或不渇亦須服之候膿水盡始用第三藥歛瘡口忌一切毒食患者不可令聞穢氣其藥功効不可盡述第二法治瘡正發時作渇雖不渇亦多服之苽蔞一个綿蓍一兩粉草五錢乳香菉豆粉各二錢右㕮咀水二碗煎至一碗温服一日三服頻多煎如熟水時時呷之尤妙第三法赤歛生用白歛寒水石已上各五錢飛過龍骨五錢輕粉一錢黄丹二錢飛過右為細末亁摻於瘡口上不可犯生水如瘡口將歛切戒近色慾萬全金花散理發背疽瘡疼痛不可忍者凢腫在脊骨邉根株如碗盞大上面青有細頭子如粟米粒白色其間亦有如石榴子者即疽瘡也車螯紫色出海際用火煆赤地上出火毒氣了為末生黄蘗為末生甘草為末亁蘆皮自東邊向西蘆籬障上取皮為末右各為末了旋抄車螯末黄蘗末各一錢甘草末半錢已上蘆皮末一錢半已上拌匀用津唾調以竹箆子傅腫上須盖遍瘡根未穴者自穴已穴者惡物自出凡十上取效每傅瘡時須先用赤根䓤三兩莖薄荷少許鹽少許一處煎湯放冷淋洗旋旋用帛子拭亁方可上藥凡係惡瘡癤並傅之無頭者即消有頭者即膿出神効豆粉膏治發背菉豆粉炒赤放地上出火毒氣右井水調傅四圍大凡用藥塗瘡不可當心塗當心則瘡便走散只當在四圍塗住不可使之散去獨聖膏専治發背凡背上初覺腫痛或癢或已成瘡者便用牛皮膠不以多少剉碎入少水熬令稀稠得所如膏攤在紙上貼患處次用軟帛布二條於釅米醋内煮令熱更互漉出於膠紙上乗熱蒸熨若瘡癢時乃是藥攻其病須忍癢不住蒸熨熱候膿出將盡即濃煎貫衆湯放温洗去膠紙次日復看瘡中若尚有膿出即是未効却再如前法以膠紙醋煮布令追膿出盡然後用貫衆湯如前洗去膠紙次日復看瘡中若尚有膿又如前法蒸熨雖連數日蒸熨不妨只要瘡中膿盡瘡亁為度次用後藥卻痛散治發背及一切惡瘡雌雄蜈蚣一對酥炙烏賊魚骨大者二片去皮生用甘草三寸生用腦子一錢别研麝香一錢别研右件前三味為細末入腦麝研匀先煎甘草湯放温洗瘡了後用藥亁摻或用油調傅亦得歸命散治發背用野生笳子熟黒者取子不拘多少爛研取匀以綿濾去滓入銀盂内慢火煎成稀膏以細青竹枝子去葉五七莖扎聚不住手攪候成稀麫糊収之用時不問隂陽二證發背或赤不赤有頭無頭或癢或痛皆可用之如無頭無色或熱不熱一發從外漸漸傅入如有赤脉有頭先從赤脉傅之漸漸傅出一日上三四度不可輕易藥物至賤其効最貴重於萬金蛇皮塗貼方治發背癰疽疼痛熱毒焮腫赤鞕有膿即撮令頭潰芸臺子一兩雞子二枚取白蔓菁葉切二兩馬齒莧切二兩蛇皮長五尺細切炒令黒色竈窑中黄磚二兩為末不着水者右先搗蛇皮芸臺子令細次下蔓菁莧磚末細研令匀次入雞子白和以甆合盛塗故帛上貼之毎日三五度換或瘡毒發熱即研生地黄汁三五合飲之治發背欲死者取梧桐子葉􅌯上􅘤成灰絹羅蜜調傅之乾即易之洗方用猪懸蹄净洗不拘多少煎沸湯放温淋洗拭亁又方用臘茶末白湯調放冷洗療諸癰疽發背及乳癰以釡下土搗取末雞子中黄和塗之佳治發背以甘草三大兩生搗别篩末大麥麫九兩於大盤中相和攪令匀取上好酥少許别捻入藥令匀百沸水溲和餅劑方圓大於瘡一分熱傅腫上以油片及故紙隔令通風冷則換之已成膿水自出未成膿便内消當患着藥時常須吃黄蓍粥甚妙又一法甘草一大兩㣲炒搗研水一大升浸之器上横一刀置露中經宿平明以物攪令沫出吹沫服之但是瘡腫皆可服甚効普濟方卷二百八十九
