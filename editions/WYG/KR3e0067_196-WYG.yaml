通用二陳湯加􅒦砂煎湯下莪术三稜各二兩醋煮一伏時胡椒一兩青皮三兩炒香阿魏一分醋化右為末别研陳倉米用阿魏醋煮米糊搜和丸如梧桐子大炒土硃為衣每服五十丸生薑甘草湯下榖疸丸一名苦參丸危氏方治胃蓄瘀熱氣濁食榖不消大小便不利脹滿不下食跗陽脉𦂳而數亦治因勞發熱熱欎發黃苦參三兩龍膽草一兩梔子仁炒五錢人參三分右為末以豬膽汁入熟蜜少許丸如梧桐子大以大麥煮湯下五十丸日三不知稍加之一方用牛膽一箇依上丸服欎金㪚聖惠方治榖疸唇口先黃腹脹氣急欎金一兩牛膽一枚乾者麝香五分研右為末每服五分新汲水調下不拘時滌熱湯一名茵陳蒿湯治榖疸食畢頭眩心中怫欎腹滿方見夲門諸疸類治食氣遍身黃腫氣喘不得食心胸滿悶皂角不蛀者去皮及子酥炙令焦為末一錢匕巴豆七粒去油右以淡醋及研好墨為丸如麻子大每服三丸食後陳皮湯下日三服隔一日增一丸以利為度如常食酒酒飲一方名黒虎丸苦參丸千金方治榖疸食已頭眩心中怫欎發黃由失饑大食胃氣攻衝所致其腹必滿苦參一兩五錢龍膽五錢去蘆生用右為細末以牛膽和擣三百杵丸如梧桐子大每服十五丸早晚食後煎大麥湯下或以生薑甘草湯下一方煉蜜丸以生麥門冬汁下一方用豬膽不用龍膽榖疸食畢頭旋心怫欎不安而發黃由失饑大食胃氣衝熏所致治之方一名茵陳蒿湯出肘後方見夲門諸疸類茯苓梔子茵陳湯衛生方昔元顔正卿丙寅二月區區官事勞役飲食不節心火乗脾脾氣虗弱又以怒氣逆傷肝心下痞滿四肢困倦身體麻木次傳心目俱黃㣲見青色顔黒心神煩亂怔忡不安兀兀煩悶欲吐口生惡味飲食遲化時下完榖小便癃閉而赤黒辰巳之間發熱日暮則止至四月則尤甚其子以危急來請治之具説其事胗其脉浮而緩金匱要略曰浮則為風緩則為痺痺非中風四肢苦煩脾色必黃瘀熱以行食榖則眩榖氣不消胃中苦濁濁氣下流熱流膀胱身體盡黃名曰榖疸此之謂也梔子仁蒼术白术各三分豬苓二分茵陳葉一錢澤瀉黃連去鬚各二分枳實麸炒二錢陳皮二分青皮去白一分茯苓去皮五分漢防己二分黃芩六分右㕮咀都作一服長流水三盞煎至一盞去滓温服食前一服减半又二服良愈内經曰熱滛於内治以鹹寒佐以甘苦又濕化於大行熱反勝之治以苦寒以苦泄之以淡滲之以梔子茵陳苦寒能瀉濕熱而退其黃故以為君難經云并主心下滿以黃連枳實為苦寒泄心下痞滿肺主氣今日傷其氣故身體麻木以黃芩苦寒瀉火補氣故以為臣二术苦甘温青皮苦辛温能除胃中之濕熱去其壅滯飬其正氣漢防己以苦寒能去十二經留濕澤瀉鹹平茯苓豬苓甘平導膀胱中濕熱利小便而去癃閉也胡椒紅丸子如宜方治榖疸因飢中過食傷胃藴熱瘀滯腹滿心欎怔忡三稜陳皮青皮莪术各一兩胡椒乾薑各二兩右為末醋糊丸如梧桐子大硃砂為衣每服三十丸空心薑湯煎二陳湯加砂仁下酒疸附論論曰胃虗榖少醉以入房冒犯風邪胃中熱毒隨虗入裏小便黃赤濕毒内聚心下懊痛熏發肌肉則身目發黃赤斑足脛浮腫或下之早則變為黒疸令人心如病饑大便黒瘀皮膚不仁治法既宜先去濕毒後分小水餘隨證治之如心下懊憹而熱不能食則欲吐名曰酒疸夫酒疸者必小便不利心中熱足下熱欲吐鼻燥脉浮者先吐之沈弦者先下之欲嘔者吐之即愈大抵五疸唯酒疸變證最多盖酒之為物隨人性量不同有盈石而不醉者有濡唇而輙亂者以醖醸而成有大熱毒滲人百脉為病則不特發黃溢於皮膚為黒疸流於清氣道中則眼黃鼻腫種種不同故方中論酒疸外有肉疸黒疸癖勞役疸令人恍惚失常等數證不同方黃連丸聖濟總録治酒疸心靣黃心懊痛小便黃赤不利黃連去鬚黃蘖去皮黃芩去心大黃炒梔子仁欎金黃藥子秦芁去苗上貝母去心甘草炙欵冬花黃明膠炙令燥白芥子各五錢右為末粳米飲丸如梧桐子大每服十丸煎麥門冬湯下半夏湯千金方治酒疸發黃身無熱言語了了腹滿欲嘔心煩足熱或成癥癖心中懊憹其脉沉弦或𦂳細千金方云酒澼蔭胸心脹滿骨肉沉重逆害飲食乃至小便赤黃此根本虗勞風冷飲食衝心由脾胃内痰所致半夏洗去􅉸茯苓白术各三兩前胡枳殻麩炒去穰一作枳實甘草炙大㦸炒各二兩黃芩茵陳當歸各一兩右剉㪚每服四錢水一盞半薑三片煎至七分去滓空心服當歸白术湯三因方治酒疸發黃結飲癖在心胸間心下從橫堅滿骨肉沉重逆害飲食小便赤黃此由本虗飲食生冷與脾胃痰結所致其脉弦濇白术茯苓各三兩當歸黃芩茵陳各一兩枳實麩炒去穰前胡甘草炙杏仁麩炒去皮尖各二兩半夏湯洗匕次二兩五錢一方加乾葛二兩右為㪚每服四錢水二盞薑七片煎至七分食前服凡酒疸熱疸大便秘者可服三黃丸方見積熱門赤茯苓丸聖惠方治心下堅而小便赤澁是酒疸之後宜服此方赤茯苓茵陳枳實麸炒去白㣲黃白术前胡去蘆大黃各一兩甘草炙當歸半夏湯洗七次去􅉸杏仁湯浸去皮尖麩炒㣲黃各三分右為末煉蜜和丸如梧桐子大每服三十丸粥飲下茯苓丸千金方治酒疸心下縱橫堅而小便赤茯苓茵陳乾薑各一兩白术熬枳實各三十銖半夏杏仁各十八銖甘遂六銖蜀椒當歸各十二銖右為末煉蜜丸如梧桐子大空心服三丸日三稍稍加以小便利為度千金翼加木通一兩大黃十八銖名茵陳丸治黒疸身體闇黒小便澁二石㪚一名凝水石㪚千金方治肉疸飲少小便多如白泔色因酒所致其脉弦滑凝水石煆水飛白石脂煆葀蔞根桂心各一兩一錢兎絲子酒浸别硏知母各三分右為末每服二錢大麥飲調下日三服五日知十日瘥茵陳湯聖濟總録治酒疸心中懊憹痛小便黃赤茵陳赤茯苓去皮葛根各三兩梔子仁半分葀蔞根三分秦芁去苖土升麻各一兩右粗擣篩每服三錢水一盞煎至七分去滓食後温服日三桔梗湯聖濟總録治酒疸腹滿如水狀心中懊憹不能下食時時欲吐桔梗剉炒百合赤茯苓去黒皮桑白皮枳殻去穰麩炒各一兩五錢木通二兩梹榔五枚右剉如麻豆大每服三錢水一盞煎至七分去滓食前温服良乆再服白术湯一名桂术湯三因方治酒疸因下後乆為黒疸目青靣黒心中如啖韭虀狀大便正黒皮膚不仁脉㣲而數桂心白术枳實麩炒去穰京䜴乾葛杏仁甘草各五錢右剉為㪚每服四錢水一盞煎至七分去滓食前服一方有柴胡無桂心治酒疸經騐良方茵陳葛花黃連神麴京三稜細辛各等分右為細末每服三錢用温酒或鹽湯調無時服葛根湯治酒疸因下後乆為黒疸目青靣黒心中如啖韭虀狀大便正黒小便赤或靣黒脉㣲而數葛根二兩枳實去穰麩炒梔子仁䜴各一兩甘草炙五錢右為㪚每服四錢水一盞半煎至八分去滓不拘時温服𤓰蒂丸一名牛膽丸治酒疸遍身黃麯塵出𤓰蒂大黃炒蕘花炒各一兩牛膽一枚芫花醋炒五錢右為末以清酒二升漬一宿煎至一升去滓入牛膽汁㣲火煎稠丸如梧桐子大每服五丸温熱水下得吐利為度六物湯治酒疸腹脹蓽撥荆芥穗不蛀川楝子連皮核用生薑母軟烏梅甘草各等分右於石臼中搗細用磁器盛以自己滿腹小便去其首尾取中間小便浸藥兩重紗盖露星一宿拂明飲其汁續用車前子茵陳竹園荽煎湯乗熱調五苓㪚服自覺黃水從小便出而腹不脹追毒飲治酒疸遍身發黃狗脊去毛一兩白芥子甘草各一錢右細剉用酒一升煎取半升去滓分温二服以利下為度乳香碙砂丸治酒疸心下懊痛身目發黄方見夲門榖疸類大黃湯治酒疸心下懊痛脛腫溲黃靣發赤斑靣不甚熱或乾嘔大黃剉炒枳實去穰麸炒梔子仁各一兩䜴炒三合右粗搗篩每服四錢水一盞半煎至八分去滓温服日三一方無枳實艾葉湯治酒疸身目俱黃心中懊痛生艾葉一握無生者乾者煮亦得麻黃去根節二兩大黃炒一兩五錢右剉如麻豆大每服四錢酒一盞半入大豆半合同煎至八分去滓食前温服黃耆术蘭㪚治酒疸心懊痛足脛滿又小便黃靣發赤斑或黃黒色此由飲酒大醉當風入水所致黃耆二兩木蘭皮一兩右為末每服二錢匕食前熱酒調下日三治酒疸心懊痛足脛滿小便黃飲酒發赤斑黃黒由大醉當風入水所致肘後方芫花椒目右等分焼末服五分立愈如神㪚危氏方治酒毒不㪚發黃乆乆浸漬流入清氣道中宜引藥内鼻滴出黃水愈苦匏子去壳苦葫蘆子各三七箇黃黍米三百粒安息香二皂子大右為末以一字搐入鼻滴盡黃水一二升或過多則以黍穰焼灰麝香末各少許搐鼻立止治酒疸百一選方蒻葉焼灰神麯炒各五錢右為細末每服二錢或酒米飲調下食前服甚妙治酒疸百一選方用田螺七箇水飬出泥搥碎取螺頭細剉以熱酒浸頻服永類鈐方用小螺螄煮肉并汁常服小麥飲聖濟總録治酒疸用生小麥二合以水一盞絞取汁食後頓服一方用三升杵和水取汁五合服之酒蒸黃連丸直指方治酒疸用黃連去鬚净四兩剉碎以酒洒醃一宿日乾為末米糊為丸如梧桐子大每服三四十丸以二陳湯加葛根茵陳薑棗煎湯送下治酒疸及治熱疸直指方用土𤓰擣取汁任服除煩熱解酒疸目黃本草以黃櫨木煮服之治酒疸用明眼草研細調喫大黃丸指南方治酒疸脉沈腹脹滿大便秘方見本門黃疸類治酒疸目黃及野病熱利下血夲草用黃屑水煮服之治酒疸夲草用苜蓿擣取汁服一升令人吐利即愈治酒疸黃色通身者取萱草根擣絞汁服亦取嫩苗煮食之治酒疸以鹽麩子根白皮擣碎米泔浸一宿平旦空心温服一二升𤓰蒂㪚治酒疸脉浮腹滿欲嘔宜吐之方見夲門黃疸類木通㪚治酒疸通身黃腫木通剉甘草炙木香梹榔剉麻黃去根節秦芁去苗土瞿麥穗乾薑炮右等分為㪚每服一錢白湯㸃服空心食前日三病甚者用猪膽一枚去汁一半入巴豆一粒薤白二寸在膽内以線繫定同青橘皮少許以水一盞半煎熟濾去膽取藥湯調下一錢匕女勞疸附論論曰脾胃素有濕熱或縁大暑醉飽房勞過度引熱歸腎濕氣交攻小水不利小腹堅脹濕氣流於肌肉之中則四肢身靣發黃故謂之女勞疸然其症又有額心黒㣲汗出手足心熱薄暮即發膀胱急小便自利腹如水狀則不治三因症治云夫交接輸瀉必動三焦上焦屬心中焦屬脾下焦屬腎動則熱熱則慾火熾因入水中中焦熱欎故能發黃下焦氣勝故額黒上焦起血隨熱瘀行大便溏黒貴勝人有男女同室而浴者多成此病攝生者不可不知方辰砂妙香㪚治飲酒行事酒熱瘀於心經致成黃疸茯苓茯神去木山藥炮逺志水浸去心梗炒黃耆炙各一兩人參甘草炙北梗各五錢木香辰砂另研各三錢麝香一錢右為末每服二錢加辰砂少許用茵陳湯調下日三服人參飲一名人參㪚治飲酒房勞酒入百脉令人恍惚失常人參白芍藥括蔞根枳殻去穰麸炒茯神酸棗仁各一兩熟地黃二兩甘草炙一兩右剉為㪚每服四錢水一盞煎至七分去滓食後臨卧温服鱉甲湯治女勞疸手足煩熱肢節疼痛小腹拘急時有虗汗鱉甲去裙襴醋炙一兩五錢柴胡茵陳地骨皮赤芍藥梔子仁黃耆麥門冬去心焙各三兩右粗擣篩每服三錢水一盞煎至七分去滓不拘時温服牡蠣湯治女勞疸額上汗出四肢虗煩日晡發熱小便自利牡蠣燒令赤龍膽升麻麥門冬去黒心炒甘心炙各三分犀角鎊藁本桂各五錢右為㪚每服四錢水一大盞煎至八分去滓熱服温覆即避風寒秦芁㪚治勞黃心脾熱壅皮肉靣目悉黃秦芁去苗土犀角屑赤芍藥各五錢茵陳麥門冬去心柴胡去苗各一兩大黃炒二兩黃芩三分右為㪚每服四錢水一盞煎至六分去滓温服日三四服以利為度治心熱勞黃口乾舌澁皮肉靣目俱黃上氣喘急宜服此方黒豆二升净以水四升煎取二升去豆生地黃汁麥門冬汁生藕汁葀蔞根汁各三合蜜右藥并豆汁㣲火煎如膏於磁器内盛每服一茶匙不拘時服龍膽湯治女勞疸額上黒汗出手足中熱四肢煩疼薄暮發熱小便自利龍膽去蘆甘草炙麥門冬去心柴胡去蘆升麻犀角各三分牡蠣一兩燒研如粉右為㪚每服三錢水一盞煎至七分去滓入生地黃汁半合再煎一二沸不拘時温服犀角湯治女勞疸及勞氣熱渇額上汗出手足俱熱小便赤澁犀角鎊龍膽各一兩升麻甘草炙各五錢麥門冬去心焙三分右為細末山藥糊三錢水一盞入生薑一片棗一枚拍碎煎至七分去滓入生地黃汁一合食後温服小兎絲子治色疸兎絲子五兩洗酒浸一宿研焙石蓮肉二兩白茯苓一兩山藥一兩留一半打糊右為末山藥糊丸如梧桐子大每服五十丸用芎藭湯下加多茯苓下四君子湯直指方治色疸人參白术白茯苓甘草加後黄蘖白芍藥黃耆白扁豆各一兩右剉細每服三錢薑五片棗二枚煎服苦參丸聖濟總録治女勞疸苦參三兩龍膽二兩五錢梔子仁三兩五錢右為末以牛膽汁和丸如梧桐子大每服二十丸温水下日二夜一稍加至四十丸本草用猪膽服硝石㪚一名礬石㪚千金方治女勞疸其腹臚脹膀胱急欲作水狀大便黒者非水其脉滑腹滿者難治身目皆黃發熱惡寒小腹滿急大便難由太勞大熱房室損傷得之交接後入水所致治之方硝石礬石并研各等分右為末每服一錢用大麥粥飲調下盖衣出汗其病隨小便出者色黃大便出者色黒是效滑石㪚千金方治女勞疸身黃額黒日晡發熱惡寒小腹急足下熱其脉浮𦂳腹滿者難治滑石石膏煆等分一作白礬右為末大麥粥飲調下二錢日三四小便極利則瘥豬膏髪煎夲草治女勞疸身目皆黃發熱惡寒小腹滿急小便難由大熱大勞交接後入水所致方見本門諸黃類黒疸附論論曰諸疸黃疸酒疸女勞疸乆不已皆變為黒疸其狀小腹滿身體盡黃額上黒足下熱大便黒是也黃本脾病脾者土也脾病不已傳其所勝腎斯受之腎為水臟其經足少陰其色黒病在腎故小腹滿色黃大便黒足下熱是皆少陰經受病之證方當歸湯聖濟總録治諸疸乆不瘥變成黒疸當歸三兩桂去皮六兩麥門冬去心一兩五錢黃芩去黒心黃耆乾薑炮赤茯苓去皮芍藥黃連去鬚石膏人參甘草炙各三兩大黃炒茵陳各一兩右剉如麻豆每服二錢七分去滓温服日三一方無黃耆茵陳蒿丸聖惠方治黒疸身體闇黒小便澁茵陳蒿赤茯苓去皮葶藶子炒各一兩枳殻去穰麩炒白术各一兩一分杏仁湯浸去皮尖炒三分蜀椒去閉口及目子炒令出汗當歸焙乾薑炮甘遂炮各一分大黃醋炒半夏湯洗七次去􅉸焙各一錢右為末煉蜜擣三五百杵丸如菉豆大每服十丸空心米飲下日三一方有木通無乾薑温水下𤓰蒂㪚一名赤小豆㪚聖惠方治黒疸身體及大便並黒及黃疸乆不瘥𤓰蒂一分雄黃研一錢先用醋煮甘草炙一兩𤓰蔞二兩右為細㪚每服一字用赤小豆二十粒茯苓一分水一盞煎至六分去滓調服湏㬰當吐吐止即愈硝石㪚治日晡所發熱而及惡寒此為女勞而得之膀胱急小腹滿身盡黃額上黒足下熱因作黒疸其腹脹如水狀大便必黒時溏此女勞之病非水也腹滿者難治方見本門女勞疸類治黃疸變成黒疸醫所不能療多死急治之方千金方用土𤓰根汁每日空心服半錢即半盞其病隨小便出即愈然湏量病人强壯者可服半盞羸人一合如無生者即剉乾的一兩水一盞半煎取七分去滓頓服羸量减普濟方卷一百九十六
