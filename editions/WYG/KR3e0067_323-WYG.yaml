body:
  text: 普濟方卷三百二十三明周王朱橚撰婦人諸疾門血風勞氣附論夫婦人血風勞者由氣血虛損經候不調或外傷風邪内挾宿冷致使隂陽不和經絡否澁腹中堅痛四肢酸痛月水或斷或來面色痿黄羸瘦又有因産後未滿百日不謹將䕶臓腑虛損百脈枯竭遂致勞損久不瘥則變寒熱休作有時飲食減少肌膚瘦悴遇經水當至即頭目昏眩胞背拘急四肢痠痛身休煩熱足腫面浮或經水不通故謂之血風勞氣也方琥珀丸出大全良方治血風虛上熱下冷或發動即心中煩熱困乏無力不美飲食醋心口瘡月水不調肌肉黄瘦腹痛腹鳴或有氣塊攻衝或時作寒熱頭旋痰逆手足麻痺並宜常服琥珀當歸木香川芎防風㯽榔各四兩三稜炮乾薑炮桂心各一分白术柴胡人參各三分青皮吳茱茰洗炮去黒全蝎炒附子炮草蔲赤芍藥栢葉白芷各等分桃仁去皮尖炒敗龜酥炙鼈甲各六兩天麻三分右薄黄麫糊丸補中丸出余居士選竒方治婦人虛損諸疾川芎白芍藥黄蓍當歸人參各半兩白术地黄各一兩陳皮半兩右為細末蜜丸如梧桐子大每服五十丸至七十丸温水下人參養血丸出永類鈐方治婦人禀受素弱血氣虛損常服補衝任調經候暖下元生血氣烏梅肉三兩熟地黄五兩當歸二兩川芎赤芍藥蒲黄炒各一兩人參一兩右為細末蜜丸如梧桐子大每服八十丸温酒米飲任下大加減徤中湯治婦人胎前産後一切虛損月水不調臍腹㽲痛往來寒熱自汗口渇芍藥二兩當歸川芎黄蓍桂各一兩甘草炙白术各三分右為末每二錢半水一盞半生薑棗同煎六分去滓食前温服温中丸治衝任虛損血氣虧傷月水斷續來不應期或多或少腹中㽲痛不常客熱煩壅咽燥舌乾心神忪悸頭目暈眩肢體倦怠腰背引痛筋脈拘急帶下赤白飲食進退或發寒熱生地黄生薑二味各一斤切碎研取汁將炒地黄浸却將地黄汁炒生薑白芍藥人參去蘆頭蒲黄炒當歸洗焙琥珀白茯苓去皮黄蓍蜜炙延胡索炒麥門冬去心烏梅肉焙已上九味各一兩右為末别用白艾葉一斤水一斗取濃汁熬成膏和前藥外加牡蠣龍骨各一分右為末每服三錢水一盞生薑兩片棗二枚同煎取一盞空心去滓喫若流下不禁即和滓喫無妨治婦人肝腎冷外感寒氣伏在子宫血海虛損經後過多小便如米泔汁背上有一片寒冷臨背冷時口中即吐清水喫食減少氣力㣲細冝服此方出䕶命方當歸補骨脂牛膝續斷川芎各半兩吳茱茰獨活細辛各一兩川椒三銖去黒皮右為末煉蜜丸如梧桐子大空心鹽米湯下三十丸治婦人血海虛損血下不禁每經候行時流下數日不止面色青黄身體倦怠無問老少血山崩倒俱可進服出䕶命方當歸續斷五味子川芎蒼术龍骨萆􅐺赤石脂火煆石斛去頭牡蠣火煆人參各半兩獨活炙艾葉各一分右為末每服五錢水一盞煎七分入鹽煎取一盞四分空心去滓喫兩三服未止即煉蜜丸如梧桐子大空心鹽米湯下四十丸内補當歸丸出永類鈐方治血氣虚損月水不調或崩中漏去血過多肌體羸困及月候將行腰腿重痛真蒲黄炒三分半乾薑炮四兩淨熟地黄半兩阿膠炒當歸洗續斷甘草炒川芎各四兩白芍藥二兩附子炮裂白芷白术各三兩肉桂半兩吳茱茰湯泡炒焙三兩右為末煉蜜為丸每藥一兩作十丸每服一丸用水一盞化開入生薑三片烏梅一枚同煎至七分通口服如骨蒸熱極可用酒水各半盞同煎至七分服渾身疼痛用温酒化下血氣痛炒生薑酒化下不拘時艾煎丸出東垣蘭石方治婦人諸虚北艾葉大當歸各二兩香附子四兩右醋煮半日焙乾為末再用醋煮糊丸艾醋湯下茋味丸出東垣蘭石方補虚敗黄茋四兩鹽水浸火炙北五味二兩右為末米糊丸空心鹽酒下治四十嵗已上已下婦人血海虚損經候過多成片流不可禁止出䕶命方乾地黄補骨脂當歸續斷萆􅐺白芷炙艾葉五味子石斛川芎各一分牡蠣半兩火煆右為末每服三錢水一盞生薑一片棗一枚同煎取九分空心去滓喫和滓喫亦得治五十嵗婦人血腸虛損經候過多每行時成片子流下不可禁止方縁婦人老少不同雖不一般血海虛而生病自别少年虚損者生而益之也老而虚損者竭而止之也出䕶命方當歸續斷五味子牡蠣火煆白芷萆􅐺石斛各半兩炙艾葉防風茯苓川芎艾葉醋炒當歸洗牡丹皮五味子紫巴㦸糯米炒去心白芍藥人參去蘆頭赤芍藥白术附子炮去皮臍白芷金釵石斛去根細切酒拌乾五加皮茴香㣲炒十八味各一兩右為細末酒煮麫糊為丸如梧桐子大每服五十丸温酒或鹽湯下空心臨卧服鹿茸萬病丸出楊氏家藏方補養氣血久服令人有子熟乾地黄洗焙當歸洗焙鹿茸塗酥炙為末右件各等分為細末煉蜜為丸如梧桐子大每服五十丸米飲或温酒下空心食前鹿茸丸出十便良方治婦人子宫臟虛損肌體羸瘦漏下赤白臍腹撮痛流血在腹經候不通虛勞洒洒如瘧寒熱不定鹿茸一兩陽起石半兩麝香三銖地黄三兩右二味搗羅為末合陽起石麝香拌勻煉白蜜為丸如梧桐子大每服三十丸空心酒下或米飲任下人參丸出十便良方養陰生血補虛人參鹿角膠熟地黄芍藥白术當歸川芎各一兩右為末煉蜜丸如梧桐子大每服三十丸空心米飲下沉香煎丸出楊氏家藏方治婦人一切血虚羸瘦等疾桔梗去蘆頭沉香二兩前胡柴胡荆芥穗麻黄去根節白芍藥茴香炒橘皮去白甘草炙八味各一兩右為末每服二錢水一大盞煨生薑一塊切破薄荷少許同煎七分去滓熱服不拘時候澤蘭丸治氣血不調肢體痩弱熟地黄一兩半澤蘭去大枝梗人參去蘆頭黄蓍去蘆牛膝去蘆酒浸一宿焙乾赤石脂各一兩白茯苓去皮木香白术半分萆􅐺酒浸一宿剉附子炮去皮臍續斷各三分乾薑炮肉桂去粗皮芎藭當歸去蘆酒浸一宿剉碎㣲炒甘草㣲炒赤各半兩右為末煉蜜丸如梧桐子大每服三十丸温米飲下空心食前産一百日每日常服壯氣益血固真丹治元臓久虚及小腹腎腸膀胱病氣五般淋疾精滑精漏小便白濁及婦人赤白帶下血崩子宫血海虛冷等疾並皆治之製蒼术先去土米泔浸逐日換新泔水春五日夏三日秋七日寒冬十日切作片子焙乾秤一斤分作四處製四兩入茴香一兩鹽一兩同炒令术黄色為度四兩入川烏一兩炮裂去皮尖切作片子并川楝子一兩和皮核打開同炒术色黄為度四兩入紅椒一兩去目并合口者破故紙一兩同炒令术色黄為度四兩用好酒好醋各半升一處同煮二十三十沸取术焙乾右一處為末用煮藥酒醋打麫糊為丸如梧桐子大每服二十丸男子或温酒鹽湯下空心食前婦人醋湯下藥性温無毒小便頻數為效滋補湯出楊氏家藏方補諸不足調養血氣悅澤顔色充肌膚進飲食生乾地黄熟乾地黄洗焙劉寄奴去根澤蘭葉麻黄不去節乾葛苦梗知母天仙藤苦黄芩各一兩炒人參半両青蒿一兩秦艽鼈甲黄蓍各半兩右㕮咀每服三錢水一盞酒一分猪筒骨一莖炙焦分為四股桃栁枝各七寸杏仁五粒去皮尖槌碎煎至七分去滓温服加烏梅半箇尤妙一方加當歸白芍藥人參鼈甲丸治婦人一切虛損肌肉瘦瘁盜汗心忪咳𠻳上氣經脈不調或作寒熱不思飲食杏仁湯浸去皮尖炒人參當歸赤芍藥甘草炙柴胡桔梗去蘆各一兩地骨皮宣黄連去鬚胡黄連各一分肉桂去粗皮木香各半兩麝香另研半分鼈甲重二兩者醋煮黄右為細末用青蒿一斤研爛絞汁童子小便五升酒五升同熬至二升以來次入真酥三兩白沙蜜三兩再熬成膏冷方下衆藥末搜和令勻丸如梧桐子大每服五十丸温酒送下不拘時候熟乾地黄散治婦人勞傷血氣臓腑虛損風冷邪氣乗虚客摶肢體煩痛頭目昏重心多驚悸寒熱盜汗羸瘦少力飲食不進方見本門風虚勞冷類逍遥散治血氣勞倦五心煩熱肢體疼痛頭昏重心忪頰赤口燥咽乾發熱盜汗減食嗜卧血熱相搏月水不調臍腹脹痛寒熱如瘧又療室女血弱隂虚榮衛不和痰𠻳潮熱肌體羸瘦漸成骨蒸白芍藥一兩柴胡一兩去蘆甘草半兩炙白茯苓一兩去皮白术一兩當歸去蘆頭酒浸兩一宿㣲炒一右㕮咀每服五錢水一盞煎至七分去滓空心温服枳殻丸一名枳實飲子出王氏博濟方治婦人手足煩熱夜卧多汗肌肉黄痩經候不調四肢煩倦心胸滿悶狀如勞氣枳殻去穰麫微炒半夏薑汁製微炒赤芍藥各一兩柴胡黄芩各一兩右為細末每服二錢水一盞生薑一塊擘破棗二枚煎至八分去滓温服候五心煩熱及身體壯熱潮熱退方續服後方桃仁煎丸出王氏博濟方治月經不調阻滯不通桃仁三兩湯浸麩炒川大黄川朴硝各二兩䖟蟲一兩炒去翅頭足右為末用醋五升入金銀鐺内慢火熬成膏可丸如梧桐子大當日晩不食夜飯温酒下一丸不嚼破即取下赤小豆汁以雞肝小塊蝦蟆衣吞之再候鮮紅即住服氣力加散出大全良方治血虛肌熱又治小兒脾虚蒸熱羸瘦不能食白术白茯苓白芍藥各一兩甘草半兩右為末細薑棗煎二錢服治婦人血氣并五勞七傷右野蘭根採無時彼土人取此并天回鷄翁藤崖梭筭四味洗淨去粗皮焙乾等分搗羅為末温酒調服二錢匕婦人服之忌雞魚麫羊血丈夫無所忌筒骨煎出大全良方治諸虚勞疾羸瘦乏力腰背引痛心煩喘𠻳唾膿嘔血痰涎壅盛睡卧有妨胸滿氣促夜多盜汗髪焦耳鳴皮寒骨蒸一切五勞七傷等疾並皆療治地骨皮粉草北柴胡前胡烏藥各一兩右服不利或時腹痛乾嘔不思飲食日漸困乏用後方琥珀一兩細研當歸一兩剉浸㣲炒芎藭半兩木香半兩桂心半兩羌活㯽榔各三分沒藥半兩牛膝一兩去苖朱砂三分細研水飛過延胡索桃仁三分湯浸去皮尖雙仁炒熟乾地黄半兩薑黄半兩硇砂三分不夾石者細研鼈甲一兩塗醋炙黄去裙襴蘓合香半兩柴胡一兩去苖赤芍藥半兩川大黄一兩剉碎㣲炒麝香一分細研右為末研了藥令勻煉蜜和搗五七百杵丸如梧桐子大每服三十丸食前温酒下蘇合香丸治婦人勞風血氣四肢羸弱不能飲食心腹時痛經絡帶滯蘇合香三分琥珀三分細研麒麟竭三分牡丹三分生地黄一兩紫石英一兩細研水飛過細辛半兩柴胡一兩去苖續斷三分鼈甲一兩塗醋炙㣲黄去裙襴芎藭三分麥門冬一兩半去心當歸三分剉㣲炒延胡索半兩藕節三分蒲黄木香桂心藁本㯽榔各半兩桃仁三分湯浸去皮尖雙仁炒右為末煉蜜和搗三五百杵丸梧桐子大空心及晩食前桃仁湯下三十丸鼈甲丸出聖惠方治婦人血風勞氣四肢羸瘦疼痛經脈不利飲食無味漸加虛困鼈甲紫苑桂心川芎防風川牛膝當歸秦艽人參桃仁琥珀各一兩麝香一分黄蓍赤芍藥䖟蟲炒水蛭炒鬼翦白术羗活各三分熟乾地黄一兩半右為細末煉蜜和丸如梧桐子大食前温酒下三十丸人參湯出聖濟總録治婦人血風勞氣肌瘦寒熱咳𠻳盜汗減食人參荆芥穗柴胡去苖白术鼈甲去裙襴醋炙酸棗仁紫苑去土黄蓍剉厚朴去粗皮薑汁炒各二兩木香桂心去皮白茯苓去皮桔梗炒枳殻去穰麩炒陳橘皮細辛去苖大腹皮各一兩沉香半兩五味子一兩右為末搗篩每服三錢水一盞生薑三片烏梅半枚同煎至七分去滓温服日三虎骨丸出聖濟總録治婦人血風勞氣四肢拘急百莭疼痛身體煩熱經脈不利虎骨酥炙黄生乾地黄各三兩防風去乂延胡索芍藥枳殻去穰麩炒丹參五加皮桔梗炒薏苡仁巴㦸天去心各一兩半桂去粗皮當歸剉茯神去木各一兩㯽榔剉五枚大麻仁研羚羊角鎊郁李仁湯浸去皮各二兩右為末煉蜜和丸梧桐子大每服二十丸温酒下茯苓丸出聖濟總録治婦人血風勞氣四肢少力月候不調臍腹痛白茯苓去皮當歸焙防風去苖山