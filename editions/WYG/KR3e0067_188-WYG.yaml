body:
  text: 普濟方卷一百八十八明周王朱橚撰諸血門總論夫人之所以滋養其身者唯氣與血血為榮氣為衛榮行脉中衛行脉外周流不息五日而復大㑹隂陽相貫如環無端焉蓋血猶水也水由地中行百川皆理則無壅决之虞血之周流於身上透泥丸下至涌泉灌溉諸經榮養百脉内不為七情所欎外不為四氣所傷自然順適萬一㣲爽節宣則血氣逆亂榮衛失度皆於常經或澀或散或下而忘返或逆而上行乃有吐衂便利汗痰諸證生焉夫血之妄行固由積熱所致然其證多端難以槩而論有因飲食過飽負重傷胃而吐者有思慮傷心并積熱而吐血衂血者有勞傷心肺又為七情所干而咳血吐血者心主血肝藏之而脾為之統過思傷脾亦能令人吐血治之湏究其因傷胃者調胃安血勞心者補益其心志血熱則清之氣鬱則順之脾傷則安之病之淺惟有早灸膏肓而已至若肺生疽瘡從髙墜下一應傷折皆能吐血傷寒汗後不解欎結經絡隨氣湧泄吐血衂血又當從各類求之凡心主血肝藏血肺主氣血為榮氣為衛六氣不傷七情不欎榮衛調平則無壅决之虞節宣失宜必致壅閡遂不得循經流注失其常度故有妄行之患焉夫血之妄行也未有不因熱之所發蓋血氣得熱則淖溢血氣俱熱血隨氣上乃吐衂也大抵寸口脉㣲而弱氣血俱虚則吐血關上脉㣲而芤為失血沉細者易治浮大者難治久吐不瘥靣色黃黒無復氣血或發寒熱或惡寒者亦難治凡吐血有三種有内衂有肺疽有傷胃内衂者出血如鼻衂又有不從鼻孔出是近從心肺間津液出還流入胃中或如豆羮汁或如切血凝停於胃中因即滿悶便吐或去數斗至一石者是也肺疽者或飲酒之後毒滿悶吐之時血從吐後出或一合半升是也傷胃者因飲食大飽之後胃中冷則不能消化便煩悶强嘔吐使所食之物與氣共上衝䠞因傷裂胃口吐血色鮮正赤腹絞痛白汗出其脉𦂳而數者為難治也問曰病胷脇支滿妨於食病至則先聞腥臊臭出清液先唾血四肢怠惰目昏眩前後血病名為何何以得之對曰病名血枯此得之年少時有所大奪血若醉入房中氣竭而肝傷故使月事衰少不來也治以烏賊骨䕡茹二味并合丸以雀卵大如小豆以五丸為率飯後以鮑魚汁下利腸中及傷肝也凡吐血後體中但覺奄奄然心中不悶者輙自愈假令煩躁心中悶亂紛紛嘔吐顛倒不安醫工又與黃土湯阿膠散益加悶亂卒至不濟如此悶者當急吐之上焦有邪則傷諸臓臓傷血下入於胃胃得血則悶滿氣逆氣逆故吐血也凡醫人不眀發表攻裏亂投湯劑有悞性命更大忌夏月燔炙中脘臍下闗元氣海背俞三里等燔灸千百壯者全無一效使病者及受其殃虚勞之疾凡肉食熱麵辛酸之物不可食所可食者菠稜葵菜氷水清凉之物無所禁忌葢得寒凉滑利腸胃使氣並無壅礙燥澁經曰榖入於胃脉道乃行水入於經其血乃化若不忌慎致令病人胃口閉澀則形軀漸痩此乃死之由也但諸人咯膿血衂血大小便血者可服三黃丸黃連解毒丸凉膈散加桔梗當歸大黃芍藥犀角地黃湯大作劑料時時呷之内經曰所謂邪熱傷於肝心之病依此調治萬舉萬全矣人之一身不離乎氣血凡病經多日療治不痊湏當為之調血血之外證痰嘔燥渴昏憒迷忘常喜湯水漱口不問男女老少血之一字請加意焉用藥川芎蓬术桃仁靈脂生地黃北大黃為要嘔甚者多加生薑以此先利其宿瘀嗣茯苓茯神川芎甘草調理之血隨氣行氣逆而上奔則血不循扵經絡而涌吐矣人之吐血出於上焦有熱固也然能用柴胡黃芩蒲黃茅花等輩而不能用枳殻北梗青皮生薑烏梅之類又不能用通利圓子以開其中脘𨗳其大便則氣如何而下䧏血如何而下行吾恐逆奔而上有不可得而止之者若夫依前治法血止而後又當以人參川芎當歸茯苓橘皮半夏甘草為之調理虚則加术香熱則加柴胡壅則加桑皮荆芥其人脉濇必有漱水之證必有嘔惡痰涎之證必有两脚厥冷之證亦必有小腹結急之證或唾紅或鼻衂此皆滯血作熱之眀驗也用藥不止於柴胡黃芩當以川芎白芷桃仁五靈脂甘草佐之大便秘結者於中更加大黃濃蜜使滯一通黒物流利則熱不復作吐血附論夫吐血病有三種一則縁心肺藴熱血得熱則妄行下流入胃胃受之則滿悶氣道賁衝故令吐血二則虚勞之人必肺内傷恚怒氣逆肝不能藏血投虚而出因怒氣逆甚則嘔血三則縁酒食飽甚胃間不安或強吐之氣脉奔亂損傷心胃血隨食出此名傷胃各隨證以治之方當歸大黃湯出千金方治吐血胷中寒痛芍藥乾薑茯苓桂心當歸大黃芒硝各二两阿膠甘草人參各二两麻黃一两乾地黃四两蝱蟲水蛭各八十枚大棗二十枚桃仁百枚右㕮咀以水一斗七升煑取四升分五服日三夜二黃土湯一名乾地黃湯出千金方治吐血伏龍肝雞子大二枚桂心去粗皮乾薑炮裂當歸芍藥白芷甘草炙剉阿膠芎藭各一两生乾地黃八两焙細辛半两去苖葉吳茱茰二升右㕮咀以酒七升水三升合煑取三升半去滓内膠煑取三升分三服亦治血衂一方無阿膏空心食前温服救脉湯一名人參救肺散出試效方治吐血咳血升麻柴胡人參蒼术各一錢當歸稍熟地黃白芍藥黃耆各二錢蘇木半两甘草陳皮各半錢右為散作一服水二盞煎至一􅊦去柤温服食前羚羊角湯出聖濟總録治吐血羚羊角鎊三両伏龍肝五両熟艾炒一両地榆去土牛膝去苖酒浸焙牡丹皮去心各二両芍藥剉四両阿膠炒令燥一両栢葉炙大薊根各三両鷄蘇葉一握蠐螬慢火炙黄五枚右為粗散每服三錢水一盞入生薑半分拍碎同煎至七分去柤温服二神湯出朱氏集驗方治吐血絶妙治男子婦人吐紅之疾蓋是久病或作急勞損其榮衛壅滯氣血遂致妄行所致若投以藕汁生地黃等凉劑治之必求其死矣每遇患者用藥甚簡甘草炙乾薑炮等分右為末每服二錢水一中盞煎至五十七沸帶熟呷空心日午進之和其氣血榮衛自然安痊不可不知地黃飲出千金方治忽吐血一两口乾生地黃焙五両王不留行牡丹皮各二両赤芍藥萆􅐺各四両麥門冬去心焙續斷牛膝刼焙阿膠炙燥各三両蠐螬研五枚右粗搗篩以生地黃汁三升水三升并蠐螬同煎至三升半去柤分温六服空心食前不瘥更合數劑取瘥赤芍藥散出聖濟總録治吐唾血赤芍藥當歸切焙附子炮裂去臍皮黃芩去黒心白术甘草炙剉各一両阿膠炙燥二両生乾地黃焙乾四両右為末每服三錢空腹温酒調下日三服桑白皮散桑根白皮六両生薑屑六両栢葉鷄蘇各四両小薊根五両乾地黄七両青竹茹一升新者地松三両右搗散煑桑白皮飲和一方寸匕日再漸漸加至二三匕以竹瀝下亦得白术散出醫方大成凡吐血咯血鼻衂其得之多因積熱之甚或飲食過馳騁傷胃絡也不然驚恐悸怒使氣逆上而不下行血隨氣而鬱積胷間乆則吐血咯血鼻衂宜服此行榮衛順氣止血進食退熱惟忌食熱麵煎􅏼海物猪雞一切發風之物不宜甚飽常令饑飽得所自然胷膈空利氣血順也昔蘇少連病此極可謂百藥不效偶姜昌傳此方服之遂愈後濟人屢效白术二両人參去蘆白茯苓去黒皮黃耆各一両蜜炙柴胡去蘆一分山藥百合去心各三分甘草半両炙前胡去蘆一分右剉散每服一錢半水一盞薑三片棗一枚同煎至六分温服日三服茅根散出經驗良方治吐血雞冠花馬藍菜根桞枝楓枝白茅根生薑甘草各等分右㕮咀以酒一升半童子小便一盞瓦器濟固煑至一升去滓温服雞蘇七味湯治吐血蓋此病有两種一者縁墮打損内傷而致此病二者縁積熱兼勞而有此病若内傷自湏依前内損大便血等諸方救之若積累勞吐血狀更無餘候但覺心中悁悁似欲取吐背上煩熱便致此病宜以此藥及桑白皮散療之雞蘇五両生地黃切青竹茹各一升生薑桑白皮各六両小薊根切六合生葛根切六合右切以水九升煑取三升去滓分温三服服約相去如人行十里久若一劑得力欲重合服至四五劑猶佳隔三四日服一劑如未定則宜合前桑白皮散服之犀角湯出千金方治吐血酒客温疫中熱毒乾嘔心煩者蒲黃犀角括蔞根甘草各二両葛根桑寄生各三両右㕮咀以水七升煑取三升分三服通聖散出聖濟總録治肺損吐血嗽血金星石銀星石雲母太隂元精石陽起石不灰木用等分以甘鍋子一枚先以羅過紫冬灰即水牛糞是也可厚一二寸鋪藥一重以灰一二寸築令實又鋪藥一重准前以灰蓋後鋪藥盡為度上下以灰封蓋以泥固濟不限藥多少皆用炭一秤於静室中周宻不通風處火煆一日一夜候冷取於净地掘一坑子深一尺許埋鍋子一宿取出先㨂出藥塊子餘以粗羅羅去灰取藥碾為末更入乳鉢研令極細即入鑵子内收之每藥末一两入龍腦射香各半錢阿膠一分炒同研入前件藥末一两内合和令勻每服一錢或半錢以糯米少許細研入薄荷汁各少許同煎為飲候温調下空心日午臨卧各一服烏金散出聖濟總録治吐血及一切血病諸藥不效者鯪鯉甲犀角鎊黃明膠赤鯉魚皮各一両胎髪一両半獨角仙一枚去翅頭足用瓦藏瓶一枚底下開竅内藥以紙筋泥固濟暴乾用炭五斤簇燒纔候烟絶撥去火放冷取出研細為散每服一錢旋入膩粉少許吐血鼻衂不止新汲水調下産後血暈昬迷悶亂不知人冷醋湯下血氣温酒調下咯血及血積藏毒下血赤白痢血痢蠱毒痢腸風及五痔下血並米飲調下臨卧空腹服更相度虚實可加至二錢服藥後取下積聚物效紫蘓散出聖恵方治吐血并衂血不止紫蘇生乾地黃各二両桂心當歸牛膝去苖阿膠搗研炒令黃燥各一両右為散毎服五錢以水一中盞煎至五分去滓毎於食後温服之天門冬丸出醫方大成治吐血咯血大能潤肺止嗽天門冬一両甘草白茯苓阿膠各半両杏仁炒貝母各七錢右為末煉蜜丸如梧桐子大毎服一丸嚥津唅化夜可十丸大能潤肺止嗽五通散出聖濟總録治吐血巴豆五十枚去皮白􅋗一両郁李仁三百五十枚鹽豉三百五十粒伏龍肝二両用鍋子内炒熟不住手攪以烟青為度傾出放湿地出火毒為末每服半錢温蜜水調下如患咯血用前件藥末一两鄆州蛤粉二两同研羅細每服一錢薤汁半盞生油两㸃食後調服阿膠散出聖濟總録治男子婦人咯血吐血阿膠炒令燥白芨白歛黄蘖去粗皮蜜水浸炙赤色各一両右為散每服三錢糯米粥飲調下空心食前服小兒量减竹葉芍藥湯出聖濟總録治吐血衂血大小便出竹葉六合赤芍藥甘草炙剉各一両阿膠炙燥三両當歸切焙一両半右粗搗篩毎服五錢水一盞半煎至八分去滓温服食後日二服人參湯治吐血咯血人參川芎茯苓半夏製各三分甘草各一分右剉每服三錢薑五片煎服固榮散治吐血便血白芷半両真蒲黃炒一両甘草炙三錢地榆去蘆一両右為末毎服三錢温酒調服如氣壯人加石膏半两一方用温湯調服犀角地黃湯寸芤血在胸吐血者生地黃二両黃芩一両半黃連一両大黃半両右㕮咀水二􅊦秤一两煎至一盞去滓食後服之烏梅散治吐血馬鞭草二錢罌粟殻大者四個去穣梗甘草二錢大烏梅一個右為粗末毎服三錢水一盞半煎至八分去滓日午空心臨卧服黃耆散治吐血黃耆剉白芨白歛黃眀膠炒令燥各二両右為散毎服二錢糯米飲調下絿雲散治吐血栢葉百合人參阿膠炙令燥各二両右為散毎服二錢糯米粥飲調下煑肺散治吐血補肺杏仁一百二十九粒去皮尖新瓦上焙研百合四両糯米一合葱白三莖同杏仁法右和勻猪肺一具入藥在内麻線繫沙鍋内煑水去一半翻轉令熟竹片切惹藥細嚼蜜湯下服至五具為度艾葉散治吐血内崩上氣靣