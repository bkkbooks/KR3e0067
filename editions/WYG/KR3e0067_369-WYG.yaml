body:
  text: 普濟方卷三百六十九明周王朱橚撰嬰孩傷寒門夾食傷寒茅先生治小兒中夾食傷寒候大熱嘔逆肚膨上渴泄瀉此候因與物食所傷而五臓結實所得治者先用青金丹與下三四次方下腥脾散匀氣散與服如有咳嗽即下麥湯散調理治之即愈漢東王先生家寶云夾食傷寒并單有積證候稍異如從膝下冷者為單有積必潮熱宜取之即補如膝下熱者并渾身熱面色青則是夾食傷寒須先理傷寒後取之以上病證並在審度用藥無不應驗漢東王先生家寳治夾食傷寒病證面青吐逆渾身發熱或發渴煩躁頭疼宜用水精丹取之至天明須取下准前用觀音散三二服補之後下薄荷散三二服解其寒氣如漸有退候恐餘熱未退宜進七寶輕青丹三二服間以人參散三二服調之石壁經三十六種夾食傷寒候歌夾食傷寒先自熱内中有物傷形節面上紅斑有似丹喉中時時生燥渴先表方知醫有功次取亦為神妙訣微微取動一兩行臓腑調和自安悅此因氣血弱即所食物滯在脾胃使肌肉上或面上如豆大或如指面大赤斑㸃主至夜間不眠多渴看輕重先取其積次和胃氣退熱再看證候調理三十六種内夾食傷寒候云此候宜服白附子散小兒形證論四十八候夾食傷寒候云此候面上有㸃子多作疹方水精丹治嬰孩小兒夾食傷寒又治䖝積食積粘積驚積惡物食傷天南星一錢滑石各為末二錢水銀粉研半錢蕪荑取仁一百片巴豆五十粒去殻不出油右先研巴豆令極細再下蕪荑仁復研方入衆藥研令極匀以炊爛飯為丸如黄豆大每服三五丸以歳數加減米湯炮生薑䓤吞下服時須令嬰孩小兒空心不可喫乳食稍飢方可進藥如膈上有物食熱須吐出如膈下有食須得轉瀉切忌生硬果實肉食等物近夜卧服佳人參散治夾食傷寒取下欲補虚調胃氣進乳食止吐瀉人參蓮肉去心炒茯苓各一分黄耆半兩搥蜜水拌炙甘草炙二錢右為末每服嬰孩一字二三歳半錢四五歳一錢以水一小藥注或半銀盞入􅀥子半片煎十數沸服治小兒傷寒與熱不同因妳寒亦號夾食傷寒熱氣逼之為病傷寒二途各便此方救療且療乳母法升麻散治小兒時氣頭痛壯熱川升麻赤芍藥石膏細研麻黄去根節各半兩貝齒一枚甘草炙微赤剉半兩右為末每服一錢以水一小盞煎至五分去渣不計時候量兒大小分減温服得微汗為效麥門冬散治小兒時氣咳嗽壯熱麥門冬去心焙川升麻各一兩貝母煨微黄甘草炙微赤剉各三分赤芍藥杏仁湯浸去皮尖雙仁麩炒微黄各半兩右為末每服一錢以水一小盞煎至五分去渣入淡竹瀝半合更煎一兩沸不計時候量兒大小分減温服生乾地黄散治小兒時氣壯熱咳嗽心胷脹悶乳食不下生乾地黄麥門冬去心焙各一兩欵冬花杏仁湯浸去皮尖雙仁麩炒微黄陳橘皮湯浸去皮瓤各三分甘草剉炙微赤右為散每服一錢以水一小盞入竹茹半分煎至五分去渣不計時候温服量兒大小增減服之人參飲子治時氣病人參去蘆頭生乾地黄各一兩犀角末黄芩柴胡去苖各半兩甘草一分炙右為麄末每服一錢水一小盞入生薑二片煎至五分温服八物吳藍飲子治小兒傷寒天行頭痛壯熱吳藍大青各二兩半甘草炙茵陳一分半麥門冬去心各三分梔子仁一十五箇右每服三錢水一盞入蘆根半握生薑五片煎至七分去渣服之水解散治小兒天行時氣瘡疱身體壯熱頭疼煩渴心躁或出汗尚熱麻黄去節四兩大黄黄芩桂心甘草白芍藥各等分右為末熱水調下連二服汗出為瘥或熱甚此謂風實之人三伏中亦宜用只去大黄春夏並用麥門冬散治小兒時氣壯熱心腹煩悶麥門冬一兩半去心焙人參去蘆頭甘草炙微赤剉各半兩葛根剉茅根一兩剉右為散每服一錢以水一小盞煎至五分去渣不計時候量兒大小分減温服麥門冬散治小兒時氣五六日體熱不止麥門冬去心焙大青各半兩甘草炙微赤剉吳藍各一分梔子仁五枚右為散每服一錢以水一小盞煎至五分去渣不計時候量兒大小加減温服葛根散治小兒時氣煩渴腹中痞實葛根剉黄芩柴胡去苗各半兩川大黄一兩剉碎微炒甘草一分炙微赤剉右為散每服一錢以水一小盞煎至五分去渣不計時候温服以稍利為度量兒大小加減服之貝母散治時氣病黄耆青皮茯苓􅌝􅌣根甘草炙紫苑白术各一兩百合一兩半右為細末每服一錢以水一小盞煎至四分通口服得少汗為妙麥湯散治小兒傷風傷寒渾身壯熱咳嗽痰盛知母石膏煅赤葶藶隔紙炒杏仁湯浸去皮尖别研地骨皮滑石末麻黄去根節生薑汁浸一宿各等分右為末每服半錢煎小麥湯調下七寶散治小兒傷寒傷風渾身壯熱天麻炙白殭蚕羗活各一錢麻黄去節蝎一分白附子各一分麝香少許右為末每服半錢一字用生薑薄荷蜜水調下大小加減惺惺散治小兒傷風壯熱及瘡疹毒氣時氣􅊜氣風熱傷寒鼻塞清涕驚悸頭痛咳嗽喘麄目澁多睡及氣不和人參白茯苓甘草炙白术𤓰蔞根細辛桔梗右七味等分焙乾為末每服一大錢用水半盞薑一片薄荷三兩葉同煎三五沸二三歳一服分三服五歳已上只作一服如傷風欲出汗以䓤白豆豉薄荷同煎温服一方無白术有乾葛甘草減半治壯熱入薄荷生薑冷氣入薑􅀥水一盞煎傷風發熱加防風咳嗽氣不和加川芎又一法海蔵云此加減四味亦各隨經證也兼下小黒膏妙錢氏方謂小兒壯熱昏睡傷風風熱瘡疹傷食皆相似未能辨認間服惺惺散小柴胡湯升麻湯此數藥均能治療不若參蘇飲治諸般發熱不問何證每每用之甚効須逐日多服以熱退為期不可遽止惟傷寒一證則大便酸臭水榖不化畏食吐食宜以藥利之先服紫霜丸感應丸仍以參蘇飲與服尤驗若發熱耳冷骫冷足冷四肢乍冷乍熱腮赤面赤噴嚏呵欠驚跳不止昏昏多睡皆瘡疹之候也當用温凉之藥切忌妄下已發未發並用升麻湯消毒飲若三日未見形迹當以生酒塗其身上時時看之狀如搔痕者是也或發不透及倒擫黒䧟極為利害紫草木通甘草枳殻黄耆等分白水煎服名四聖散若小兒咽喉疼者用生甘草桔梗等分白水煎服名如聖散更有小兒頭昏頰赤口内熱氣小便赤澁大便秘結此為裏熱當用大黄當歸芍藥甘草等分白水煎服名四順飲若審是瘡疹之證不宜用此蝎稍散治傷風發熱睡卧不安直視涎盛時作驚掣全蝎十四箇甘草炙川芎各二錢麻黄去節根防風薄荷葉各一錢右為末入硃砂一錢細研入藥内令匀每服一錢水半盞煎至三分温服厚朴散治小兒外傷風冷壯熱增寒頭痛體重寒氣逆嘔吐惡心或手足厥冷及脾胃不和並皆治之乾葛三分蒼术陳橘去瓤用皮厚朴去皮以薑汁塗炙令香各一兩右為末每服一錢水一盞入薑二薄片􅀥一枚同煎至六分熱服升麻黄芩湯治小兒傷風有汗頭疼寒熱發惡寒升麻黄芩葛根芍藥各三錢甘草一錢半炙右剉如麻豆大每服二錢以水一中盞煎至六分去渣温服若時行瘡痘出不快煩躁不止者加木香一錢半解肌湯治小兒頭痛傷風增寒壯熱肢體疼痛鼻乾不得睡兼治大人小兒瘡疹已發未發皆可服乾葛芍藥升麻甘草右等分㕮咀每服二錢用水一盞煎至半盞去渣服此藥兼治寒暄不時人多疫疾乍暖脫衣及暴熱之次忽變陰寒身體疼痛頭痛如石加黄芩名黄芩升麻湯瘡痘已發未發及瘡痘不快熱盛者加大青等分煎服瘡痘不快加紫草糯米煎傷風身熱鼻流清涕心中煩躁加防風羗活薄荷煎服若大叚寒即熱服若熱即温服瘡疹亦准此服藥身凉止藥小兒量度多少服活人書云如老人喫去芍藥加柴胡一兩人參半兩雪白芍藥一分名升麻葛根湯驚調散治大人小兒老少但是諸般傷寒風體虚煩熱上膈有涎煩躁不省人事腦子一字荆芥穗一兩微炒焙末之麝香半錢右將腦麝各研入藥令匀每服好茶半盞調半錢和渣服重者二錢小兒少許不計時候治小兒傷風以豆豉及䓤生研作靨貼顖上如有邪氣者以豆䜴及飛生頭研如前方參苓散治小兒風吹著渾身壯熱頭疼面赤多渴人參茯苓甘草炙白术各一分黄芩乾葛各半兩右為細末每服一錢水五分薑一片棗半箇煎至四分通口服之清神散治傷風身熱咳嗽不進乳食鼻塞氣促睡卧不安並宜服之人參茯苓各一錢川芎五分防風苦梗羗活麻黄荆芥甘草各一錢右為末每服一錢䓤白薄荷煎水調下荆术散治小兒傷風傷寒或瘡或疹服此藥無寒無熱能分陰陽踈風順氣一切諸證服之應手而效更有加減法開列于后荆芥穗一兩淨蒼术二兩剉炙微黄赤芍藥一兩甘草半兩剉炙右為細末每服一二錢量兒大小加減服之傷風傷寒壯熱咳嗽身重或瘡疹未出生薑䓤白湯調下傷風鼻塞發熱煎䓤白湯調下傷風潮熱煎薄荷湯調下邪風傷肺鼻出清涕氣麄煎紫蘇湯調下卒暴驚風搐宜服四味奪命散一服立効久病後慢驚搐服全蝎散即瘥瘡痘出發不快加炒牛蒡子煎湯調下發汗不出煎去節麻黄湯調下心神不寧恍惚不安煎白銀散調下變蒸發熱煎薄荷湯調下盗汗自汗煎牡蠣浮麥湯調下風毒丹毒赤腫四順飲子湯調下眼暴赤腫痛隱澁難開煎羗活黄芩黄連生地黄湯調下口舌生瘡加銀白散同煎服之立効腮項腫痛加牛蒡子防風湯調下咽喉腫痛重舌加升麻枳殻桔梗薄荷防風煎湯調下日進二服肺實喘急痰涎壅塞速服四味奪命散立愈肺虚上氣喘滿咳嗽加欵冬花五味子人參桑白皮紫苑煎湯調下驚風後手足拳攣不舒加當歸熟地黄天麻羗活細辛木𤓰虎骨川烏頭炮去皮臍一同為細末􅆈木𤓰湯調下脾胃虚弱嘔吐不利乳食不化宜服後安胃和脾散日進二三服立愈脾胃久虚肢體羸瘦嘔吐下利乳榖不化宜常服安胃和脾散日進三服剋日痊安淋澁小便不通加萹蓄木通燈心滑石煎湯調下歸命散治小兒傷風身壯熱氣麄咳嗽或𫝊瘡疹並宜服之荆芥穗半兩白术去蘆二錢半人參去蘆三錢淨蒼术剉炒二兩白茯苓去皮二錢石膏半兩甘草二錢半炙右為麄末每服三錢水一盞同煎至八分去渣乳母多宜服之小兒任意服不拘時候加減小柴胡湯治小兒傷風傷寒瘡疹陰陽不和寒熱徃來口苦舌乾或瘧疾寒熱並宜服之淨柴胡一兩去蘆人參三錢去蘆半夏湯洗七次切作片子甘草炙各二錢半防風去蘆三錢熱甚大便秘澁加大黄同煎服右㕮咀每服五錢水一盞入生薑五片􅀥一枚同煎至七分去渣温服不拘時候薄荷散治小兒傷風傷寒肢體壯熱手足冷呻吟驚睡卧不寧宜服此藥發散薄荷葉一兩蝎一分天南星半兩灰炒通黄赤色右三味為細末周歳半錢連根䓤白煎湯下不拘時候若只傷風並進二服立愈若小兒傷風因寒邪相摶或成驚者風藥吐利即寒邪不能發散宜服此退了壯熱寒邪若解驚亦不作却服硃砂丸佳若不先用此藥便用驚風藥吐利即寒邪不能發散隨虚入臓遂成疾而難治也貼顖藥治小兒百日内傷風鼻塞服藥不退乃是出胎時被風吹所以有此用天南星一味為末生薑自然汁内調成膏貼顖上鼻不塞便去之天麻散治小兒傷風流清涕鼻塞咳嗽身熱並皆治之天麻防風甘草川芎羗活白芷麻黄去節右等分為細末䓤湯調食後服之麻黄湯治傷風發熱咳嗽喘急若無汗者宜服之麻黄去根節寸剉三錢以水煑去沫漉出控乾桂去麄皮二錢不得見火杏仁湯浸去皮尖及雙仁者七箇麩炒黄色别搗如膏甘草炙一錢右為麄末入杏膏拌匀每服一錢水六分煎至四分去渣温服不計時候以汗出為度大小加減若有自汗者不宜服之敗毒散治傷風時氣寒壅咳嗽方見本門傷寒類一名十味湯時氣附論夫小兒時氣病候時氣病者是四時之間忽有非節之氣如春時應暖而寒夏時應熱而冷秋時應凉而熱冬時應寒而温其氣傷人為病亦頭疼壯熱大體與傷寒相似無問長㓜其病形證畧同言此時通行此氣故名時氣世呼亦為天行又小兒天行病發黄候四時之間忽有非節之氣傷人謂之天行其熱入於脾胃停滯則發黄也脾與胃合俱象土其色黄其候在肌肉熱氣藴積其色蒸發於外故發黄也又小兒時氣腹滿候時氣之病腹滿者是熱入腹與臓氣相摶氣痞澀在内故令腹滿若毒而滿者毒氣乗心煩懊者死又小兒時氣病結熱候時氣之病熱入腹内與肺臓之氣相結謂之結熱熱則大小膓痞澀大小便難而苦煩熱是也又小兒患時氣病候時氣之病若施治早晩失時投藥不與病相會致令病連滯不已乍瘥乍劇或熱敗壞之證無常是也又小兒傷寒時氣病兼瘧疾時氣之病又兼瘧者是日數未滿本常壯熱而邪不退或乗於隂或乗於陽其乗於陽陽浮則熱其乗於陰陰浮則寒陰陽之氣為邪所并互相乗加故發寒熱成瘧也又小兒時氣病得吐下後猶熱候時氣之病得吐下之後壯熱猶不歇者是膓胃宿虚而又吐利則為重虚其熱乗虚而入裏則表裏俱熱停滯不歇故雖吐下而猶熱也巢氏病源小兒病後不嗜食面青候時氣病熱渴之後不嗜食而面青者是胃内餘熱未盡氣滿故不嗜食也諸陽之病俱上榮於面陽虚未復本滯風邪風邪挾冷冷摶於血氣故令面青也又小兒時氣病發復候時氣之病發復者是熱之後氣血未和腑臓熱勢未盡或起早勞動或飲食不節故其病重發謂之復也然發復多重初病者血氣已虚重傷故也嬰童寶鑑小兒時氣歌時氣皆因節令違頭疼壯熱汗微微良工若欲看形候須作傷寒病有歸攻熱毒還從腑氣便成結熱在膓中週身苦熱多煩渴便溺時兼不得通時氣還須趂早醫變為敗氣切須知乍寒乍熱無常度時減時增體漸羸誰言吐下熱無餘只為元因腑臓虚熱盛更虚皮肉澀至令煩渴燥難除陰陽邪氣兩相并臓腑陰陽彼此爭發作有期名是瘧直須療理禁時行時氣雖然已漸停猶多餘熱體伶仃心胸氣滿還憎食夾冷須憂面色青石壁經夜熱晝凉歌夜間遍體熱如湯纔到天明又復凉非是鬼神為祟禍都縁臓腑有風傷先將妙藥清脾臓次用神方瀉大膓患候但觀喉􅂴動更看眼急鼻梁光須知此病𫝊瘟疫辨别分明醫信良此内因傷物外因傷邪所致也先當表散其毒邪次用藥去其積亦主至夜多汗只在其頭額上有之亦口中涎響也脾風則然多言有禍祟非也更請細看前候盖此病縁過饑後冷食滯脾胃氣不行於諸經夜熱晝凉先進南星丸與三五服後進㯽榔散相間與服然後平和又須當與白丁香膏服或只以磨積方調氣只不得便取利難止為肚大恐成疳疾也方人參散治解利傷寒四時疫氣上焦虚弱心神恍惚脾胃不和飲食無味口苦舌乾渾身煩熱人參茯苓羗活桔梗知母麻黄去根節枳殻麸炒去瓤甘草炙川芎陳皮去白白术厚朴薑汁製茱萸水煑桂心不見火前胡蒼术甘草節獨活右等分為末每服二錢水一盞薑􅀥煎七分如要出汗䓤白豆豉生薑煎服嗽入杏仁麻黄同煎小兒入薄荷煎婦人止入生薑煎祛瘧用桃柳條二十七節同煎葛根散治小兒頭疼時氣體熱煩渴葛根剉麥門冬去心各三分黄芩赤芍藥人參去蘆頭犀角屑甘草炙微赤剉川升麻各半兩石膏一兩細研右為散每服一錢以水一小盞煎至五分去渣不計時候量兒大小分減温服治小兒壯熱時氣驚悸并熱瘡鈎藤人參蚱蜢炙子芩各一分防風二分蛇脫皮三寸炙龍齒四分澤蘭二分白密一兩湯成之竹瀝一升右切以水三升煑取七合量兒大小細服之解肌散治小兒時氣壯熱頭痛咳𠻳不能食麻黄三分去根節赤芍藥貝母炮微黄柴胡去苗杏仁湯浸去皮尖雙仁麩炒微黄葛根半兩剉石膏一兩細研甘草炙微赤剉秤半兩右搗篩為散每服一錢以水一小盞煎至五分去渣不計時候量兒大小分減温服八味麥門冬飲子療小兒天行壯熱咳嗽心腹脹麥門冬去心茅根各六分甘草炙人參各二分紫苑升麻貝母竹瀝各三分右切以水二升煑取八合分服忌如常法細切生薑䓤白皮湯煎附子煮黄雞牙硝斟酌三分入調作羮湯食㓜兒右用附子煎湯去渣煑黄雌雞肉入薑牙硝作羮空心服之丁香丸治積熱傷寒烏梅一箇切片用去土瓦焙乾丁香三箇縮砂四箇去殻巴豆兩箇去殻用薜子葉打碎去巴油入鉢内研爛右除巴豆為細末入巴豆研匀却用研細百草霜和匀麫糊為丸如小菉豆大一歳一丸米湯服下積塊不妨常服有功小麥煎湯治小兒積食夾驚傷寒正受傷寒咳嗽夜熱晝凉傷風瘡疹之疾大効麻黄半兩去節湯炮白术炮乾葛二錢半白茯苓甘草各二錢半右㕮咀入麥子二十一粒同煎一方用䓤白二寸煎服傷風附論夫傷風貪睡口中氣熱呵欠煩悶當發散與大青膏解不散有積食當下大黄丸主之大飲水不止而善食者可微下餘不可下也傷風手足冷脾臓怯也當和脾後發散和脾益黄散發散大青膏主之傷風自利脾臓虛怯也當補脾益黄散發散大青膏主之未瘥調中丸主之證當下大黄丸主之後服温驚丸傷風腹脹脾臓虚也當補脾必不喘𤼵散後仍補脾也去脹塌氣丸主之發散大青膏主之傷風兼臓兼心則驚悸兼肺則悶亂喘息氣出入多欬嗽兼腎則畏明其原由毋臓虚故見也傷風下後餘熱以藥下之太過胃中虚熱飲水無已也當生胃中津液多服白术散方金箔丸治小兒驚風妳食不化成外傷風壯氣氣麄慢風揺頭口眼不開及赤白痢方見驚風門一切驚風類消風散治小兒因脱衣風邪傷入毛皮入於臓腑則惡冷壯熱胷膈有涎目澁多睡虚風神慢一方加硃麝尤佳人參白茯苓川芎厚朴製羗活防風蟬蛻藿香殭蚕炒陳皮甘草荆芥右各等分為末三歳一錢茶清調下大小加減服之大青膏治傷風自利脾臓虚怯也當補脾此藥主之又云肝主風實則目直大呌虚則張牙多欠胷滿短氣氣急喘嗽故上氣當發散之天麻末一錢全蝎去毒生半錢硃砂研一字匕白附子生一錢半青黛一錢研天竺黄一字匕研烏梢蛇骨酒浸焙乾取末半錢麝香一字匕右同再研細生蜜和成膏每服半錢皂子大至一皂子大月中兒粳米大同牛黄膏温薄荷水化一處服之五歳已上同甘露散服信効方云小兒諸方書皆行於汝南錢氏其中大青膏減天麻添大青生研一分其於藥味分料和製與此皆同載證治云治小兒傷風其候伸欠煩悶口中氣熱惡風脉浮只用薄荷湯下百解散治小兒傷風瘡疹之類貝母炒黄麥門冬去心川升麻各一兩赤芍藥甘草炙各半兩右為細末每服一錢水八分一盞入竹葉二片煎至五分去渣温服􅀥葉湯治證同前棗葉一兩剉細焙乾黄芩柴胡去苗人參去蘆頭甘草炙各一兩右為細末每服一錢水一小盞入生薑二片煎至五分温服人參生犀散解小兒時氣寒壅咳嗽痰逆喘滿心忪驚悸臓腑或秘或瀉調胃進食又主一切風熱服尋常凉藥即瀉又減食矣前胡去蘆八錢桔梗五錢人參去蘆頭三錢甘草炙黄二錢杏仁去皮尖畧晒乾為末秤五錢右先將前四味為末後入杏仁再用麄羅為末每服二大錢水一盞同煎至五分去渣温别食後服一方無甘草五味人參飲子治小兒天行壯熱咳嗽心腹脹滿人參甘草炙各半兩生地黄一兩半如無只用乾地黄半兩麥門冬一兩半右每服三錢水一盞入茅根半握煎至七分去渣温服治小兒經熱天行夜發壯熱夜啼并解傷寒諸證荆芥去枝梗桔梗苦者各二兩甘草一兩半牛蒡子二兩畧焙右為末每服二錢湯㸃食空時服蘆根散治小兒時氣嘔吐不止生蘆根人參去蘆頭各一兩竹茹半兩右細剉和匀每半服以水一小盞煎至五分去渣不計時候量兒大小分減温服犀角散治小兒心經熱天行夜發壯熱夜啼並解傷寒諸病甘草牛蒡子荆芥各等分右麄末每服一錢水八分煎至五分温服臨卧食前服棗葉飲子治小兒傷寒天行五日以後熱不歇􅀥葉半握麻黄半兩䓤白切一合右豉一合以童子小便二鍾煎至一盞去渣分二服青木香散療小兒天行頭痛壯熱青木香六分白檀香三分右為細散清茶和服之以水調塗頂頭痛立瘥量兒大小以意加減治小兒時氣用桃葉三兩搗以水五升煑十沸取汁五六遍淋之若復發燒雄鼠屎二枚水調服之聖惠方用桃葉七兩水五升升麻葛根湯治大人小兒時氣瘟疫頭痛發熱肢體煩疼及瘡疹已發未發疑似之間並宜服之今人謂此藥寒凉多不肯服今釋其疑說併方詳見傷寒内小兒量大小加減服之一名解肌湯方見本門傷風類一方有桔梗羗活生薑煎服可加四君子湯料同等分煎一方加半夏前胡治時氣咳嗽者天時冷熱不調而虚得之日夜或吐不止或喘痰熱壅盛至重者利之用大黄朴硝枳實陳皮人參半夏柴胡各等分以有胸膈煩悶不快宜服無熱與痰亦不可下惺惺散治小兒傷邪瘟病時疫瘡疹頭痛壯熱多睡潮熱煩渴痰實咳嗽方見本門傷寒類人參羗活散同温病附論夫小兒瘟病者是因冬時嚴寒人有觸冐之寒氣入肌肉當時不即發至春得暖氣而發則頭痛壯熱謂之温病又冬時應寒而反暖時氣傷人即發亦使人頭痛壯熱謂之冬温病凡邪之傷人皆由觸冐所以感之小兒不能觸冐其乳母抱持脱衣不避風邪冷熱之氣所以感病也小兒温病下利候温病下利者是膓胃宿虚而感於温熱之病熱氣入於膓胃與水榖相摶腸虚則泄故下利也又小兒温病鼻衂候温病鼻衂者熱乗於氣而入血也肺主身之皮毛主於氣開竅於鼻温病則邪先客皮膚而摶於氣結聚成熱熱乗於血血得熱則流散發從鼻出者為衂也凡候熱病鼻欲衂或數發汗汗不出或初染病已來都不汗而鼻燥喘息鼻氣有聲如此者必衂也小兒衂止至一升數合熱因得歇若至一斗數升則死矣又小兒温病結胷候凡温熱之病四五日之後熱入裏内熱腹滿者宜下之若熱未入裏而下之早者裏虚氣逆熱結胷上則胷痞滿短氣謂之結胷也方萎􅅋湯治風温冬温及春月中風傷寒發熱頭痛咽乾舌强胷腹滿腰脊强葛根半兩萎蕤三分石膏一兩白薇羗活麻黄川芎杏仁泡去皮尖甘草炙各半兩青木香一分初春用半兩寒熱加芒硝大黄右㕮咀每服三錢水一盞煎至八分日三服柴胡石膏散治時行瘟病壯熱惡風頭痛體疼鼻塞咽乾心胷煩滿寒熱徃來痰實咳嗽涕唾稠黏柴胡去苗石膏前胡去苗乾葛剉赤芍藥各五十兩升麻二十五兩黄芩桑白皮剉右為麄末每服二錢水一盞入生薑三片豉十餘粒同煎七分去滓稍熱服小兒分作三服更量大小加減不計時候甘桂湯治春間疫氣欲作先為氣壅畏風痰嗽頭昏鼻塞困悶是其疾也當先以甘桂湯理之凡春氣動先以此湯驅之大人小兒皆可服甘草炙官桂去皮五味子黄芩各一兩柴胡四兩右㕮咀每服三錢水一盞薑五片煎七分去渣温服次二服渣再合煎一服昔政和二年春澧陽疫疾大作服此藥皆免防風散解時疫温病欬喘煩渴頭痛體疼目澁多睡肌肉蠕動痰逆忪悸防風川芎甘草炙香白芷各二兩菊花一兩右為細末每服一錢煎荆芥湯調放温服除温散治三十六種夜熱晝凉温病候大黄朴硝研各一分牽牛粉半兩梹榔二箇右為末每服半錢煎黄芩湯調下臨卧時服香蘇散治四時瘟疫傷寒香附子炒去毛紫蘇葉各四兩青橘皮二兩不去皮甘草一兩炙右為麄末每服三錢水一盞煎七分去渣熱服不拘時日三服解肌加乾葛煎若作細末只服二錢入塩㸃服黒膏子治小兒初春病入肌肉發斑癮疹如錦紋咳𠻳紅綿散治傷寒及咳嗽歌曰頭疼壯熱口難𫝊懶倦終朝只愛眠面