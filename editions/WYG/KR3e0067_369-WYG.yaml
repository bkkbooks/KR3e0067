黄芩一分蓋麻黄湯性熱夏月服之有發黄斑出血之失凡傷寒熱病藥性須凉不可太温唯冬及春并病人素虚寒者乃用正方不湏加減小承氣湯治太陽病吐下後發汗而復煩小便數大便堅宜服陽明若出汗多而微寒為表未解無潮熱不可與之若腹滿不大便可稍稍與之大黄一兩微炒厚朴半兩製枳實一箇大者炙右㕮咀同煎陽明病潮熱大便微硬可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎騐之法少與小承氣湯湯入腹中轉失氣者此有燥屎也乃可攻之若不轉失氣者必初便即溏不可攻之攻之必腹滿不能食也欲飲水者與水則噦其後發熱者必便硬而少也以小承氣湯和之不轉失氣者忌不可用也失實則讝言失虚則聲微難重語也直視譫言喘滿者死不利者亦死發汗多若重發汗者亡陽讝言脉短者死脉和者生傷寒若吐下後不解本不大便五六日已上至十餘日日晡時發熱發潮不惡寒獨語如見鬼狀若劇者發則不能識人循衣摸床􅅥而不安微喘直視脉弦者生滿者死微者但發熱讝言者大承氣湯主之陽明病多汗以津液外出胃中乾燥大便必硬硬則讝語小承氣湯主之若一服利者止後服調胃承氣湯治傷寒發熱後若寒虚而不惡寒但熱者實也當下傷寒十三日後經讝語者當下之若自利者脉當微厥反和者此為内實也當下之太陽病經十餘日心下温温欲吐而胷中實大便溏腹微滿欝欝微煩當下之太陽病三日發汗不解蒸蒸熱者當下之大黄一兩炒芒硝九分甘草半兩炙右㕮咀大黄甘草二味以水一盞煑至七分去滓下芒硝更上火煑二三沸頓服之梔子仁湯治陽明病脉浮咽乾口苦腹滿汗出而喘不惡寒反惡熱心躁讝語不得眠胃虚客熱舌燥宜服陽明病下之其外有熱手足温者心中煩壅飢不能食頭有汗宜服傷寒六日吐後發汗虚煩不得眠劇者心神顛倒宜服傷寒六七日大下之後身熱不去心中結痛此為欲解宜服梔子仁甘草炙各一兩加香䜴一兩名梔子豉湯右為末每服三錢水一盞豆豉五十粒煎七分去渣温服白虎湯治傷寒脉滑而微厥表裏有熱三陽合病腹滿身重難以轉側口中不潤卧後讝語遺尿發汗則讝語下之則額下出汗手足逆冷自汗出並宜服之服桂枝湯後有大汗出煩渴不解脉洪大傷寒嘔吐若下後七八日不解結熱在裏俱熱時時惡寒大渴舌上乾燥而煩欲飲水數升傷寒証無若口乾燥渴心煩背微惡寒渴飲水無表裏證者並宜白虎湯加人參湯脉浮發熱無汗不可服諸亡血不可服活人書曰脉厥而滑裏有熱白虎加人參黄濟云傷寒及温熱病脉大洪增寒壯熱煩渴欲飲水及夏月傷暑發熱惡寒身體疼重大渴不止躁煩汗出脉細小手足微冷并時疾未經轉瀉胃熱發斑兼痘疱麩疹天行後餘熱不解但是一切伏熱並可服董氏云小兒瘡痘其證未全或未明者與白虎湯如秋冬入春寒未用白虎湯之時但加􅀥葉煎不必拘常法知母一兩半甘草半兩粳米一合半一方用八錢右㕮咀白水煎加減服加人參半兩名白虎加人參湯又方加石膏四兩亦作四錢一方棗一枚同煎每服一錢水一小半盞煎三分去柤服之三和湯治小兒傷寒鼻塞聲重痰嗽體熱煩躁麻黄三兩去節杏仁二兩去皮尖甘草一兩炙右為末每服三錢水半盞煎三分熱服進三服䓤粥投之衣被蓋汗出立瘥團參湯治小兒傷寒發汗吐下後毒氣不散表虚裏實熱發於外故身斑斑如綿紋甚則躁讝語兼治喉閉腫痛團參升麻甘草右等分㕮咀白水煎加減服茯苓湯治小兒傷寒嘔吐喘麄肌熱煩躁傷渴白茯苓一兩烏梅肉半兩微炒乾木𤓰一兩右擣篩為麄末每服一錢以水一小盞又入生薑一大片煎至五分去渣温服不計時候量兒大小加減治小兒傷寒梔子仁一枚􅀥一箇燒炭牙硝少許右以古字錢兩文燒令赤水淬七度將此水調三味灌之立愈走馬散治小兒三歳以下忽患傷寒陰陽二毒此因母之毒氣所致庸醫多不會自見壯熱不食多睡便以冷物與喫即兒轉不安加甚蓋藥熱動風藥寒嘔逆宜服此大黄末一兩米醋煑冷如麩用乾地龍一枚末入牙硝一分右為末同研三百下令陰乾再擣為末生薑汁調灌立見神驗量多少灌黒散方治小兒傷寒退熱方見初生門變蒸類治小兒傷寒壯熱頭痛口乾心煩生薑汁少許竹瀝一合蜜半合右相和令匀二三歳兒分為三服發汗散治少小傷寒發熱解肌芍藥黄芩葛根各二分右切以水三升煑一升為四服一歳兒為三服金花散治小兒傷寒肥皂角子一百箇銚内炭灰炒裂取黄子訶子皮五箇甘草二寸清油煎黄右為末每服半錢温水調下治五歳以下四十八候三黄散治正受傷寒麻黄不去節大黄蒸各一分黄芩半分右為細末每服半錢葱湯下日進二服治胸悶但嘔者此名温毒也宜服之生薑地黄半斤好豉一百粒右以猪膏二斤合研絞汁用麝香雄黄和服毒便從皮膚中出遂愈忌蕪荑熱病附論夫小兒熱病者是冬時嚴寒人有觸寒氣入於肌肉當時即不發至春得暖而發則頭痛壯熱謂之心熱疾又冬時應寒而反暖其氣傷人即發亦使人頭痛壯熱謂之冬温凢邪之傷人皆由觸冒風寒入之小兒雖不能觸冐其乳母抱持脱衣不避風邪冷熱氣所感病也黄帝曰傷寒熱病死候有九四曰老人嬰兒熱病腹滿者死石膏散治小兒熱病煩熱驚悸石膏細研川大黄剉碎微炒甘草炙微赤剉各半兩大青黄芩梔子仁知母葳蕤川升麻葛根剉龍膽去蘆頭各一分右為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減服之吳藍散治小兒熱疾頭痛心躁眼黄吳藍大青蘆根剉石膏細研各一兩甘草炙微赤剉麥門冬去心焙黄芩各三分茵陳梔子仁各半兩右為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減温服犀角散治小兒熱病煩熱不解大小腸秘澁心胷悶亂犀角屑赤芍藥黄芩川升麻梔子仁地骨皮甘草炙微赤剉各一兩麥門冬去心川大黄剉微炒各三分右為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減温服真珠散治小兒熱病心神狂躁身熱如火頭痛煩渴眠卧不安真珠末馬牙硝寒水石太陰元精各一分龍齒鈆霜朱砂各半兩牛黄麝香各半兩右研令細不計時候以新汲水調下半錢量兒大小加減服真珠散治小兒熱病口乾心神煩躁真珠末牛黄龍腦各一錢細研𤓰蔞用根茯神硃砂研水飛各半兩馬牙硝寒水石並為細末各一分右相拌匀每服半錢蜜水調下量兒大小加減解肌散治小兒熱病口乾身體壯熱心神煩躁宜服之一名觧肌湯麻黄三分去節根葛根剉赤芍藥黄芩川升麻甘草炙微赤剉各半兩右為散每服一錢以水一小盞入葱白五寸煎至五分去滓不計時候量兒大小分減温服令有汗出即瘥一方白水煎茵陳散治小兒熱病心煩壯熱口乾多渇宜服茵陳麻黄去根節赤芍藥甘草炙微赤剉黄芩葛根剉各半兩右為散每服一錢以水一小盞煎至五分去渣不計時候量兒大小增減温服汗出為効牛黄散治小兒熱病壯熱心悶牛黄半分硃砂各細研茯神􅌝􅌣根剉苦參剉甘草炙微赤剉各一分右細羅散入研藥同研匀不計時候以新汲水調下半錢量兒大小以意增減石膏散治熱病石膏白茯苓乾葛根各一兩甘草炙黄芩芍藥各半兩右為細末每服一錢水一小盞入竹葉薄荷各少許煎至五分去渣温服犀角飲子治小兒熱病口乾心神煩躁犀角屑川大黄炮細剉川升麻各一兩赤芍藥人參去蘆頭甘草炙各半兩右為細末每服一錢水一盞入竹葉三片煎至五分去渣放温服地骨皮散治證同前地骨皮洗焙乾川大黄微炮黄芩各一兩麥門冬去心黄耆甘草炙各半兩右爲細末每服一錢水八分一盞荆芥少許煎至五分去渣温服子芩散治小兒熱病皮膚壯熱子芩川升麻梔子仁大青甘草炙微赤剉各一分右細羅為散不計時候以新汲水調下半錢量兒大小以意加减服之胡黄連散治小兒熱病壯熱心悶胡黄連梔子仁牛黄細研甘草炙微赤剉各半兩子芩一兩右細羅為散研入黄芩牛黄令匀不計時候以蜜水調下半錢量兒大小加減服之地黄散治小兒熱病生乾地黄一兩􅀥葉一握焙乾梔子仁黄芩陳橘皮湯浸去白各半兩右為細末每服一錢水八分一盞入葱白塩䜴各少許煎至五分去渣温服生地黄湯治小兒熱病煩渴頭痛壯熱不止用生地黄汁三合濾淨入生蜜半合和匀時時與一合服量兒大小加減服治小兒熱病煩渴取𤓰蔞根末不計時候以乳汁調半錢量兒大小加減服之治小兒熱病腹脹大腸不通用牽牛子半兩微炒擣細羅為散每服以橘皮湯調下半錢稍利為効量兒大小以意加減服之發黄附論夫發黄皆由寒濕之氣藴結在於脾胃蒸發而成也陽明病無汗小便不利心中熱壅必發黄凡發黄寸口無脉鼻氣冷並不可治巢氏云凡發黄而不利心腹滿者必死診其脉沉細者亦死又有百日半歳小兒非傷寒濕病而有微黄者亦是脾胃熱忌不可灸也灸之則熱甚此是將息過度所為衣當薄數與除熱粉散粉之自愈不得妄與湯藥及灸小兒瘀熱在胃或濕熱相摶熏肌散肉其證目黄身或疼痛肌肉如橘色或得之傷寒或得之時氣或得之風濕皆脾胃氣虚邪熱與糓氣相摶所致也利其小便則愈方升麻湯治小兒發黄升麻黄芩去黒心山茵蔯柴胡去苖𤓰蒂知母藍葉各一兩山梔子仁一兩一分大黄剉炒石膏擣碎各一兩半甘草炙芍藥各半兩羚羊角鎊三分右麄擣篩三四歳兒每服一錢水七分煎至四分去渣温服早辰午後近夜各一服量兒大小加減連翹赤小豆湯治小兒傷寒發黄身熱麻黄去節連翹甘草炙生薑赤小豆各二兩杏仁四十一箇生桑白皮剉二兩大北棗一十二箇右㕮咀白水煎又一方生小麥苖擣汁服之立効桑白皮湯治小兒發黄桑根白皮剉麻黄去根節湯煮掠去沫秦芁去苖土各一分大黄剉炒半兩右麄擣篩每一錢水七分牛乳一合同煎至五分去渣分温食前日三服量兒大小加減茵陳湯治小兒陽明病發熱汗出者此為熱越不能發黄也但頭汗出身無汗齊頭頸而還小便不利渴欲飲水者此為瘀熱在裏必發黄傷寒七八日身黄如橘色小便不利腹滿者並皆主之山茵陳梔子仁川大黄右等分㕮咀水煎加減服日進三服小兒小便當利下尿如皂莢汁狀色正赤一宿腹減黄隨小便中去也梔子蘖皮湯治小兒傷寒身黄𤼵熱梔子仁十五箇甘草一兩炙黄蘖二兩右㕮咀白水煎加減服三黄湯治小兒天行發黄心腹脹急大黄剉炒黄芩去黒心各一兩半山梔子仁三分右麄擣篩三四歳兒每服一錢水七分煎至四分去渣温服取利為度𤓰蒂散治小兒傷寒發黄方見本門栝蔞根飲治小兒忽發黄面目皮肉並黄用生栝蔞根擣取汁二大合入蜜一大匙和令匀火煖分為三服治小兒傷寒發黄方用土𤓰根擣汁三合服之又方用韭菜根擣汁澄清取如大豆許瀝兒鼻中即出黄水病瘥又方用青麥擣汁服之治小兒四歳發黄本草生擣黄𤓰絞汁三合與飲不過三次愈茵陳湯治小兒發黄等病身如橘色山茵陳山梔子各一兩川大黄芒硝木通寒水石各半兩右㕮咀每服一錢水八分煎至五分去渣温服傷暑附論凡大人小兒中暑悶倒急扶在陰凉處切忌與冷水得冷即與暑相擊而死用帕子或以布巾蘸熱湯熨臍腹間暖即瘥頻用熱湯或懷抱小兒道塗中無覔湯處即掬熱土於臍上仍撥開小窩子尿於中當日處稍熱可代湯熨之良久嚼大薑一塊以水嚥下續用解暑藥黄龍丸五苓散白虎湯隨證用之方枇杷葉散治冐暑伏熱引飲過度脾胃傷冷飲食不化胷膈痞悶嘔噦惡心頭目昏眩口乾煩熱肢體困倦不思乳食或陰陽不和致成霍亂吐瀉枇杷葉去毛尖陳橘皮去白丁香各半兩香薷三分去土梗厚朴四兩薑製麥門冬去心焙乾木𤓰白茅根甘草炙各一兩右㕮咀每服二錢水一小盞生薑二片煎至七分去渣温服或作細末煩燥引飲用新汲井水調下不計時候三歳已下分作三服一方加百藥煎清膈飲子治小兒伏暑嘔吐香薷淡竹葉去枝節各一兩白茯苓人參去蘆半夏麯檀香各半兩甘草炙半兩白粳米一合右㕮咀每服一錢水半盞生薑一片煎至一半去渣温服量兒大小加減與之香薷丸治大人小兒傷寒傷暑伏熱躁渴煩悶頭目昏眩胷膈煩滿嘔噦惡心口乾舌苦及肢體困倦不思飲食或發霍亂吐利轉筋並宜服香薷去土一兩白茯神去木半兩乾木𤓰紫蘇莖葉並用去麄根各一兩丁香藿香葉去土甘草炙剉檀香剉各半兩右為細末煉蜜和丸每兩作三十丸每服一丸至二丸細嚼温湯下或新汲水化下亦得小兒服半丸不計時候家傳異功丸治消暑生津治渴澤瀉一兩二錢猪苓湯浸去皮三分官桂半兩去皮茯苓三分白术半兩人參半兩去蘆辰砂半兩别研右為末煉蜜丸如芡實大或夏月出門随時含化免喫水妙若小兒夏月心熱煩渴引飲煎燈草竹葉湯化遇渴投之止治小兒中熱面赤身如火熱或眼赤當歸二錢馬牙硝欝金三枚用皂角水煑乾各一分甘草一分右為末細研一字或半錢冷水調下治小兒中暑吐利用白蒺藜苖研汁服治中暑悶絶宜急扛在陰處切忌不可飲冷水可急取大蒜及路中日晒熱土同研新水調去渣灌服香薷散治身熱惡寒頭痛或徃來寒熱如瘧煩躁渴甚嘔吐背寒面垢洩瀉昏悶脉伏用香薷散每服二錢水一盞茵陳車前加數莖煎熱服嘔吐加香薷加藿香木𤓰洩瀉加烏梅陳米熱瀉加黄連每服並各加少許一方用燈心車前子同煎吐㵼加茵陳生薑汁調服其效如神又方用五苓散平胃散合和紫蘇葉烏梅煎湯下五苓散治冐暑伏熱吐瀉煩渴陰陽未和分表裏未解傷風受濕並宜服之猪苓澤瀉白术赤茯苓紫桂大木通山茵陳天花粉瞿麥右為散用燈心車前子同煎如熱甚加小柴胡湯去桂各等分煎喫消暑丸治中暑煩悶嘔吐多痰大半夏四兩醋煑白茯苓二兩甘草一兩右為末薑汁煑糊為丸每服三十丸空心温水下普濟方卷三百六十九
