各半両一用根扁豆勝二両倉米一撮右㕮咀水二升煑取八合温服菖蒲散治小兒霍亂吐㵼不止煩悶菖蒲肉豆􅅳去殻人参去蘆頭白茯苓各一分右為散不計時以温薑湯下半錢量大小加减人參散治小兒霍亂吐㵼不定人参去蘆頭陳橘皮湯浸去白瓤焙黄連去湏厚朴去粗皮薑汁炙令香熟右各三分為散以陳粟米粥飲調下半錢三嵗以上加服香連散分清濁定霍亂吐利木香川黄連去頭各一両人参去蘆頭厚朴去粗皮塗薑汁炙令香熟各半両右為末毎服一錢粟米飲下快膈散定霍亂吐利服藥多吐即服此藥甘草半両炙髙良薑㣲炮肉豆􅅳去殻丁香各二錢右為末毎服半錢新冷水調下桃仁膏治霍亂吐㵼桃仁杏仁巴豆各一粒朱砂少許右同研飯為丸如米大毎服一丸以飲吞下治霍亂吐瀉不止方乾薑炮人參白术各四錢厚朴二分薑汁浸炙右剉細分作四服毎服水二盞煎取六分以意加减與服入甘草二分尤佳青金丹治小兒霍亂吐逆及治大人虚實冷熱吐㵼并諸般吐逆不定一名隂陽丸水銀一錢硫黄二錢生者同水銀研令水銀不見星只作黒色右薑汁糊丸麻子大毎服二十丸淡薑湯下治吐水調末服治霍亂常用妙方南没石子肉豆蔲訶子右三味各磨水少許煎數沸一二服可止若加黄連木香等分為末麫糊丸便是没石子丸亦治熱㵼久痢治霍亂吐㵼面色青四肢冷虚汗出方香葇一分生薑棗大碎薄荷葉半分右以水一小盞煎至五分去滓量兒大小加减温服丁香散治霍亂吐㵼丁香一錢藿香半兩枇杷葉七片湯洗炮去毛炙為末右為細末毎服一字或半錢飯飲調下只兩服住治小兒霍亂吐㵼方草豆蔲㯽榔甘草等分右為末薑煎一分空心服木香散治霍亂吐㵼木香細剉人參藿香各等分右為末毎服一錢水五分煎至三分服藿香散治小兒霍亂吐㵼藿香香薷末各一分白茯苓末二錢右研毎服半錢薑湯下如人行三五里進一服連進三服乳香丸治小兒霍亂吐㵼不定乳香硃砂各一錢研半夏半兩湯浸洗七次薑汁炒黄右為末麫糊丸如菉豆大毎服五丸米飲下日三張氏家傳方同半夏却只用一兩名香砂丸又方丁香末一錢消梨一枚絞汁妳汁一合右和匀少少與兒服之又方甘草半兩炙微赤剉肉豆蔲去殻乾薑炮裂剉各一分右為散以冷水調下一字二嵗以上加服龍骨散治小兒霍亂吐㵼不止龍骨末一分草豆蔲末半兩爛籧篨末半分右研匀以妳汁三合煎二合去滓别入麝香牛黄兎毛灰各一字生薑汁少許調匀分為三服如人行五里一服治霍亂吐㵼并冷㵼欲死肉豆蔲去殻甘草炙微赤剉藿香各一分右為散毎服一錢水一小盞煎至五分去滓不計時大小分减温服一方用粉草香薷散治小兒霍亂吐瀉體熱煩躁昏冐多渴陰陽不順清濁相干厚朴去皮製黄連二味同薑汁杵炒作紫色香薷各一兩右為末三嵗一錢水半盞酒少許煎三分去滓水中頓冷服一方用白扁豆炒各等分又方治小兒霍亂立驗人參一兩木𤓰一枚倉米一撮右㕮咀以水煮分服更量大小加减佳温中丸治小兒胃寒泄㵼腹痛腸鳴吐酸水不思食霍亂吐㵼人參切去蘆頭甘草炮白术各一兩為末右薑汁麫糊丸菉豆大米飲下一二十丸無時治小兒霍亂但痢不吐方烏牛糞半兩燒灰人參三分去蘆頭生薑半分切右用甜淡漿水一大盞煎至五分去滓不拘時量大小加减温服如渴取曲蟮糞爛龍骨一兩漿水煎服一作烏牛葹草用一團箷舒移切治小兒霍亂方生薑四分切香薷薄荷各一兩右以水煎分温兒與妳母同服之甚良量兒大小分减稍熱頻服和中散治陰陽不調清濁相干霍亂吐痢壯熱煩渇胷膈痞悶腹脹滿面色青白手足厥寒困頓多睡全不思食乾薑厚朴去皮薑製甘草炙各一兩右為細末每服一大錢水八分盞生薑三片同煎至三分去滓温服丁香散治小兒霍亂不欲乳食丁香一分人參半兩去頭右為散毎服水一盞煎五分去滓不拘量大小分减温服一方以乳汁三合同煎肉豆蔲散治小兒霍亂不止肉豆蔲一分去殻藿香半兩右為散毎服一錢以水一小盞煎至五分去滓不拘時量大小分减服治小兒霍亂方扁豆莖一升先炙令黄切細人參三兩切右以水三大升半取汁煮粟米少許為粥與乳母服衣褁乳勿令露之每欲乳兒先捻去少許然後乳兒常服大住石黄散治霍亂吐㵼不止方見本門吐痢類治伏暑霍亂吐㵼胡椒半兩豆粉一兩右為末煎燈心木𤓰湯調下又方治小兒霍亂吐痢一名霜葉散乾桑葉藿香各半兩右為末不拘時以粥飲調下半錢量大小加减又方桂心甘草等分右粗末水煎入法醋少許服治小兒惡氣霍亂方用梳笓垢水和飲之治小兒乳霍乳方取厠屋户簾燒灰研飲服一錢又方用訶梨勒一枚先煎沸湯研一半許與兒服立住如未止再服治百日以來及蓐内兒霍亂方以人乳半合及生薑汁少許和煎服入口定治小兒熱霍亂諸藥不瘥者用蘆葉二大兩或蘆根糯米三大合水三升先煮葉入米煮取一升入蜜少許和服瘥不止即取桑葉二升生薑半兩切以水二升煮取一升入一匙白米為飲服牛泄方治小兒霍亂腹脹不得痢取牛泄絞汁百日兒一合二百日一合半三嵗二合服治小兒霍亂吐乳不止以人參煎湯服瘥又方取薄荷葉未乾者研汁量多少捻鼻合口開灌之治霍亂用陳大蓼濃煎湯洗足止并服濃汁一二合自愈蒔蘿丸治小兒氣脹霍亂嘔逆腹冷食不下及脇痛以蒔蘿為末糊丸如菉豆大三嵗三十丸青皮湯下治小兒霍亂以尿滓乳上服之又方以牛涎灌口中一合瘥治小兒吐痢霍亂用寡婦薦取二七莖煮飲之又方用芹葉細切煮熟汁任性飲多少止又方用桑蟲一枚炙焦黄細研以妳汁調灌之又方用􅝡螉窠微火炙為末以乳汁調一字服之備用方治小兒霍亂吐痢用生蒜研塗心下及兩足心効八白飲治小兒脾虚胃弱膈有風痰水榖入口悉皆嘔􅎪體羸氣乏飲食不下霍亂吐痢神情恍惚心胸脹滿中腕不和沉香藿香葉人參草果半夏麯白川薑炮白芍藥白㯽榔白豆蔲白茯苓白术白扁豆炮白芷各等分右為末㵼後復吐或吐後復㵼每服一錢水一小盞生薑二片棗半箇煎三五沸通口不拘時服五苓散治霍亂吐㵼燥渴飲水小便不利澤㵼二兩半剉木猪苓去皮剉一兩半官桂去皮一兩白茯苓剉一兩半白术剉一兩半右為細末每服一錢温湯調下渴躁新水調服以意加减不以時服丁香散治霍亂丁香藿香各一兩人參半兩右為細末毎服一錢以水半盞煎五沸更入妳汁少許去滓稍熱細呷頻服量兒大小加减乾霍亂附論夫乾霍亂者由脾胃氣實陰陽氣内積外傷邪熱之氣摶於脾胃稽留散傷動陽經遂致精神昏亂則血脉不榮易受風冷卒被所感便即心痛煩滿氣粗腹大如皷涎壅咽乾因其氣虚而邪氣勝邪氣既勝則與衛氣並行其所以不吐痢也葢脾胃充實難於吐痢其證心神煩亂恍惚多驚故曰乾霍亂也又云忽然心腹脹滿絞痛欲吐不吐欲痢不痢痰壅腹脹頃刻之間便致悶絶此乃所傷之物因吐痢盡則生若上不得吐下不得痢所傷之物壅閉正氣闗隔陰陽操擾喘脹霍亂氣息少者危法宜蘇感丸踈利之方治小兒霍亂不吐痢肚脹奶滿上下不通甘草四分炙當歸三分石䀋三分右以水漿一升半煎至六合去滓入牛黄麝香各半錢研蜜半匙相和以下灌之即通奶母與漿水粥飲勿喫麫肉等立應散治小兒乾霍亂不吐不㵼腹脹如鼓心胸痰壅䀋二兩生薑一兩右同炒令轉色三嵗半錢童子小便半盞煎三分去滓温服保安丸治小兒乾霍亂不吐不痢煩悶不知所為以巴豆一枚去皮心分作十小丸每服一丸水研服當快利三五行即以漿水補之治乾霍亂以蘇合香丸加枳殻一分木𤓰半分煎湯調下又方以炒䀋二椀紙裹綃䕶頓胸前并腹上截以熨斗火熨令熱氣透即蘇又炒䀋依法熨背則全愈一方用䀋一大盞極醎熱飲以手剜喉令吐三飲三剜三吐即止治小兒乾霍亂渴熱及壯熱眼色慢四大困悶以烏豆二升净洗乾擇生薑一兩切水三升煎豆皮欲爛即濾取汁二合和少許蜜喫即便吐如人行五七里又與喫無問大小兒並令服之效霍亂心腹痛附論夫小兒冷熱不調乳哺不節使陰陽二氣相干而變亂於腸胃則成霍亂也心腹痛者是冷氣與真氣相擊或上攻心或下攻腹故成痛也方人參散治小兒霍亂心腹痛不欲飲食人參去蘆頭白术芎藭草豆蔲去皮厚朴去粗皮塗薑汁炙令香熟當歸剉微炒陳橘皮浸去白瓤焙丁香桂心各一分右為細散不拘時煮薑棗米飲調下半錢量大小加减治小兒霍亂心腹刺痛吐利方茯苓桔梗人參各六分白术五分甘草炙四分厚朴炙四分右為散每服一錢水一小盞煎至五分去滓不計時量大小加减温服人參散治小兒霍亂心腹痛不欲飲食人參一分去蘆頭丁香一分桂心一分白术三分芎藭三分右為散不拘時煮薑棗米飲下半錢量大小加减服肉豆蔲散治小兒霍亂吐㵼不止腹痛肉豆蔲去殻桂心各一分人參去蘆頭甘草炙微赤剉各半兩右為散每服一錢水一小盞生薑少許煎至五分去滓不計時量大小加减温服烏藥散治小兒乳食冷熱不和及心腹痛或水㵼乳汁不好香附子用白者髙良薑赤芍藥天台烏藥等分右為末每服水一盞煎六分温服如心腹痛入酒煎米飲下不計時調中丸甘草半兩炒白术半兩人參切去鬚半兩乾薑四錢炮右為細末蜜丸如菉豆大每服半丸至三二十丸食前温水送下治轉筋入腹欲死用生薑一兩槌碎酒五盞煮服又方令病人仰睡熱土頓臍上令人尿之針頭丸治小兒霍亂吐痢腹中疼痛巴豆肉二箇水半盞煮乾阿魏雞頭大一塊舶上硫黄如魏大右研匀以薄糊搜作餅子如錢眼大毎服一餅子針頭穿定燈上焼留三分性淡薑湯化開服治霍亂吐痢腹痛用髙良薑水煎加粳米如粥食之普濟方卷三百九十五
