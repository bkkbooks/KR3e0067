body:
  text: 普濟方卷三百九十五明周王朱橚撰嬰孩吐㵼門冷吐附論冷吐者由乳母當風取凉解脫致令風冷之氣入於乳令乳變敗兒若飲之則冷氣入胃故成嘔吐其青涎夾妳吐出是也治之當令乳母捻去舊宿敗乳然後服藥用醖乳法以療之楊氏云乳母服香蘇散夾和藿香正氣散薑棗煎服逐去寒邪次服理中湯加丁香木香煎服以温養乳母方聖石丹治小兒胃氣不和乳哺重沓及食入不消或呼吸風冷即令嘔吐若不止最為大病胃氣虚嘔吐久差神騐真陽起石半夏洗七次焙各半兩人參去蘆不灰木炭灰洗一伏時二兩杏仁同巴豆製巴豆各一七箇上同連皮燈上煉為度研末阿魏研一錢木香白茯苓母丁香各一兩礞石炭灰燒一伏時四兩右先將八味搗羅為末次用杏仁巴豆阿魏研末同入湯泡炊餅和丸如龍眼大毎服一粒水一盞入生薑一皂子大同擘碎煎五分温服須於銀器中煎藥石器亦得治胃寒嘔吐方金液丹青州白丸子右合和為末麫糊再丸如米大米湯送下仍服助胃膏助胃膏治小兒冷氣入胃嘔吐不已人參去蘆白术白茯苓甘草炙各半兩砂仁四十箇白豆蔲十四箇木香三錢炮丁香半兩乾山藥一兩肉豆蔲四箇炮右為末煉蜜丸如芡實大米湯下一嵗服一丸一方加藿香陳皮丁香丸治小兒胃虚寒腹疼吐逆丁香木香藿香牛黄各半兩腦麝二錢膩粉少許右為末麫糊丸小豆大熱湯化一丸服之金鍼丸治小兒冷氣吐逆不止心胷痞滿陽起石杏仁十五枚湯浸去皮尖雙仁炒不灰木生研半兩阿魏半錢巴豆去皮膜十二枚右除巴豆杏仁别研外為末後入二味再研勻以糯米飲丸如雞頭仁大焙乾毎服一丸同鍼穿燈熖上燎透為度入䀋少許研細冷薑湯調下量大小加减以意温脾散散寒濕治嘔吐厚朴去皮塗薑汁炙香熟一兩丁香白术乾薑各半兩肉桂一分右為末毎服一錢煎人參湯調下中結丸治脾胃冷吐逆水食不下噎妳此因乳母多食酒肉淹藏毒物得之禹餘粮火煨赤米醋滓半兩巴豆麫裹煨七粒朱砂皂子大定粉炒二錢麝香少許右為末蒸餅為丸如菉豆大每服三五丸逺志湯下流星散治小兒胃氣虚冷痰吐嘔逆半夏十四箇大者生用胡椒四十九粒右為麤末毎服半錢水一盞入生薑一分油七滴煎至四分去滓温服橘皮湯治小兒嘔吐膈上有冷陳橘皮湯浸去白焙細辛去苖葉乾薑炮製分各二大黄剉炒甘草炙各三分右麤搗篩每服一錢水七分盞煎至四分去滓温服分三服一日令盡更量兒大小以意加减瑞蓮散治脾胃一切虚寒嘔吐不食並皆治之石蓮肉一兩木香丁香各二錢半人參三錢澤㵼三錢訶子肉一箇紫蘇子炒半兩肉豆􅅳二箇煨白芷半兩陳皮半兩右為末毎服一錢薑棗湯下熱吐附論夫小兒熱盛患極熱而吐更下熱藥脾胃熱而胃口閉所以吐傷水榖不通丸下湯藥乳食只伏在管胃口不開脾伏乳食上下不動若下取藥胃口不開只在胸膈不上不下乃是結腸翻吐候也歌曰得患初因是熱傷熱極吐逆也尋常悞人最是庸醫見熱病仍將熱藥嘗致令胃閉并腸結莫服冷藥不須凉若還更取兒當死先宜開胃後通腸方辰砂丸治胃熱吐逆不止及驚風涎盛潮作辰砂别研水銀砂子各一兩牛黄腦麝别研各半錢生犀末天麻白殭蠶酒炒蟬殻去土乾蝎去毒炒麻黄去節稱天南星湯浸七次切了焙乾稱各一分右為末再研匀熱蜜丸如菉豆大朱砂為衣每服三丸或五七丸食後煎薄荷湯送下保命膏治吐逆不定服熱藥過多不能瘥者丁香山大㦸大黄炮不灰木焼紅放冷甘遂各一分已上俱為細末朱砂細研水磨雄黄細研水飛各半兩粉霜水銀用結錫砂子各一錢重巴豆去皮心膜不出油研細十箇右都研勻用黄臘四兩銀石器中鎔攪成膏旋取和丸如黍米大毎服未周嵗一粒二三嵗兩粒四五嵗三粒六七嵗五粒十嵗已上七粒用新汲水下清膈飲治小兒伏暑嘔吐者最宜服之淡竹葉去枝梗剪葉焙令乾香薷各一兩檀香人參去蘆頭半夏湯洗七遍白茯苓甘草炙各半兩白粳米一合右為粗末每服一錢水一大盞煎至六分去滓温服量兒大小以意加减一方薑棗煎益胃湯治胃虚挾熱嘔吐不止丁香人參去蘆頭各一兩訶藜勒皮一分官桂大黄炮黒黄各十兩右為細末每服一錢水一小盞入生薑二片煎至五分去滓服温下妙聖散治小兒胃熱吐逆龍腦粉霜膩粉滑石各等分右研為細末麫糊為丸如菉豆大每服一丸煎乾柿湯下不拘時候麥門冬散治小兒嘔吐心胷煩熱麥門冬去心焙甘草炙微赤剉人參去蘆頭陳橘皮湯浸去白瓤焙各一分右為散入淡竹茹􅈋根各一分剉碎每服一錢水一小盞入生薑少許煎至五分去滓稍熱頻服量兒小大以意加减香茹散治小兒熱吐秋夏多伏暑出有黄涎頭額温至心熱小便赤􅉣或乾嘔無物霍亂吐㵼轉筋腹痛宜服此乳母同之又冝服甘露飲香薷一兩厚朴製白扁豆各半兩右先用薑汁四兩杵厚朴令細炒令黄赤色入香薷扁豆二味都為末毎服五錢水一盞酒一盞共煎去滓入甆瓶内蠟紙封沉入井中候極冷取出一餅服加减兒母同甘露飲治證同前方見本門霍亂吐利類一名玉露散蘆根粥治小兒嘔吐煩熱渴生蘆根剉二兩粟米一合一方作糯米右以水二大盞煎至一盞去滓投米作粥入生薑蜜汁少許服甜消散治小兒風熱吐不止甜消一錢滑石白膩者半兩右為散每服半錢用漿水半盞入生油一㸃打勻調下極者三服必定兒大者毎服一錢忌生魚菓實治小兒壯熱嘔吐不住食驚癎方以葛粉二大錢水合調勻㵼鏭鐸中傾側令偏重湯中煮令熟以米湯相和令下之清胃散治小兒熱吐用生薑薄切以生麫拌晒乾各焙為末以紫蘇湯調下治熱吐兼痢方用敗毒散五苓散陳米煎服夏秋吐痢多是母感胃暑毒必脉虚面垢自汗身熱惡寒煩渴證治與此熱吐或痢同夾驚吐附論小兒吐乳早晚發熱則是驚吐而不睡是也此由胃氣實其乳或氣不定或食交乳或怒未息或成房事因以乳兒致劃然便吐吐出乳若不變色無害若色青黄或如水或其中有蟲者治須凉膈以温物煖其腦後避惡風吹其風府也既生其氣又凉其上焦吐即止也更宜與調劑以療之歌曰吐乳從來胃氣實乳滿胃中生吐逆吐多遍身有風熱驚邪本是從斯得治法無過温腦後吐乳湏教莫變色先與定氣後除驚如此醫流無費力方歸命丹治夾驚吐嘔不止丁香藿香各一分生犀牛黄各半錢猪膽狗膽蝟膽熊膽鯽魚膽各等分共稱取半兩右末和丸如菉豆大量兒大小加减一嵗以下煎苦棟湯研下二丸已殊聖方歌曰小驚膈滿吐還頻晝夜連連不暫停綠水槐黄泔淀汁蚘蟲乳食一時噴藿香研共生犀角五膽牛黄立有勲若有得逢如此藥直饒命困却還魂三香丹治夾驚嘔吐不定藿香葉丁香各一兩半夏湯洗七遍焙乾半兩已上並為細末用膩粉各一分龍腦麝香當門子各一錢右同拌勻取生薑汁打麫糊和丸如黍米大每服十粒入人參薄荷湯量兒大小加减人參温中湯治小兒驚吐熱吐心神悶亂中脘不和漸加恐悸恍惚無定人參白术白茯苓半夏湯浸七次陳皮肉豆􅅳煨各等分右為細末蒸棗肉為丸如麻子大朱砂為衣藿香生薑湯下三五十丸不拘時候多服勿慮藿香湯治驚吐并吐藿香三兩白扁豆薑製厚朴薑製白茯苓各兩半甘草炙一兩右剉酒水煎子母同服定吐丸治小兒驚食胃脘不快吐逆乳或心胷發熱丁香二十一枚為末蝎稍四十九條半夏三箇洗焙乾為末右研匀煮棗肉丸如黍米大每服七丸至十丸金銀湯吞下如傷暑霍亂吐㵼煎藿香散送下睡驚丸治熱化痰涎鎮心神止驚悸吐逆半夏薑製末乳香末犀角末各一錢右以生薑自然汁煮麫糊為丸如菉豆大每服七粒至十粒薄荷水夜卧服四季散治久患翻胃及驚吐諸吐上好硫黄半兩細研水銀同硫黄再研無星一分生薑四兩取汁右同研如黒煤色毎服三錢入薑汁并酒一盞同煎熟調藥空心服用衣被葢覆半日汗出即瘥有人患翻胃三年不瘥治療百端無騐四季者持此藥與服汗出如膠腥穢不可近後更不復吐其神效如此又須量兒大小服一錢至一字冷水調下此藥難調須先滴水少許以指緩研殺稍稍増湯始令調和若入湯酒則浮泛不可服矣一方無生薑毒氣吐附論小兒服湯中毒氣吐下候春夏以湯下葢由腸胃脆嫩不勝藥勢遂吐下不止藥勢熏臓腑乃煩懊頓乏者謂此為中毒毒氣吐也方藿香湯治小兒毒氣吐下腹脹逆害乳哺藿香一兩生薑三兩青竹茹甘草炙各半兩右㕮咀以水二升煮取八合每服一合日三有熱加升麻半兩消妳毒方令小兒喫妳無毒升麻剉半兩大麻子搕破一合右酒浸每早晨與妳一盞喫了要乳時須捻去些少方與兒喫并兒有毒亦觧吐痢附論夫吐痢者由腸虚而氣逆故也小兒有解脫而風冷入腸胃虚則泄痢胃氣逆則嘔吐此大體與霍亂相似而小輕不劇悶頓故直云吐痢不呼為霍亂也歌曰小兒吐痢早須醫只為腸虚逆氣為更有中他湯藥毒必加煩躁在心脾方掌胃膏治小兒脾胃虚弱嘔吐泄痢人參白术白茯苓去黒皮甘草炙肉豆蔲麫裹煨去麫白豆蔲陳皮草豆蔲去皮枇杷葉去毛青皮去白丁香沉香木香藿香葉縮砂葉各等分右為末煉蜜丸如龍眼大每一丸食前米湯化下日二助胃膏治小兒胃氣虚弱乳食不進腹脇脹滿腸鳴泄哯乳便青或時夜啼胎寒腹痛官桂去皮白茯苓去皮白术藿香葉縮砂仁各三兩白豆蔲仁肉豆蔲煨木香各一兩丁香一兩甘草炙剉二兩橘紅去白山藥各四兩人參一兩右為細末煉蜜和膏丸如雞頭大每服一丸量兒大小加减米飲化下不拘時候參苓散治吐㵼人參白茯苓山藥乾葛麥門冬去心黒附子炮去皮臍桔梗去蘆甘草炙各半兩蓮子心木香不見火各一錢藿香葉一分右為末毎服一錢紫蘇米飲調下醒脾散人參五錢去蘆丁香一錢赤茯苓五錢藿香葉五錢白术五錢白薑二錢炮甘草三錢炙木香二錢炮厚朴薑製天南星大者二箇縮砂仁一兩同南星炒右剉薑棗煎燒䀋服醒脾湯治小兒吐㵼脾虚多困不思乳食欲生風候人參白茯苓白术山藥白扁豆炒白附子藿香白殭蠶甘草升麻酸棗仁各等分右為末三嵗一錢冬𤓰子三七粒水半盞煎至三分去滓服二劑消風散最治吐㵼生風多困加硃麝香朴飲子治小兒伏熱吐㵼虚煩悶亂如發驚狀人參茯苓甘草紫蘇葉木𤓰澤㵼香薷半夏麫白扁豆炒陳皮烏梅肉厚朴炒各四錢右為末每服一錢薑棗煎服治小兒直腸泄㵼水榖不分小便不利口乾作渴人參白术白茯苓木香訶子麫裹炮砂仁陳皮炒瞿麥炒車前子麥門冬去心各等分甘草减半用右㕮咀毎服三錢水一盞煎至七分量兒大小無時服小兒青糞者冷也亦是肝尅脾之證也肝屬木其色青脾屬土其色黄糞黄者脾家之本色也若脾受肝尅則其糞青肝木主風宜早治之不爾成脾風發癎也然所謂青糞纔下便青若初下時黄良久乃青小兒安樂者皆然不可認為青糞也可服白附子丸𦍑活膏白附子丸治小兒青糞及吐而有冷證者白附子一分為末舶上硫黄半夏半兩生為細末用自然汁和成劑藥作小錢大餅子沸生薑湯内下候煮熟不麻人為度取研成膏右加蝎稍末一分同研勻入在半夏膏内和冷得所乾即添湯丸蘿蔔子大每服三十五粒米湯或乳汁下𦍑活膏治小兒胃虚吐㵼生風𦍑活天麻防風各半兩人參茯苓蝎酥炒桂各一兩朱砂一錢研水銀一錢硫黄一錢同水銀研右先将八味為末入水銀硫黄研勻煉蜜為膏每服一皂子大用荆芥薄荷湯化下食前服更量度加减醒脾散治小兒吐㵼脾困不食痰作驚風全蝎焙半錢白附子炮天麻焙甘草炙人參炙白茯苓石昌蒲細節者木香蓮肉去心白术各一錢右為末每服二錢水一盞生薑三片棗一箇煎服有熱者去木香一味加南星半夏陳米大醒脾散治證同前如兒不肯服藥令乳母服後即仰卧片時乳兒南星白茯苓橘紅各二錢半全蝎炒甘草炙白附子炮蓮肉去心人參木香各一錢二分半陳米二百粒右為末毎服一錢水一小盞薑三片棗一箇煎服木香散治諸般㵼痢久不瘥者並皆治之白术麫炒麥芽木香人參陳紅麯各一錢同白术炒茯苓神麯甘草青皮各二錢當歸一錢右為末每服半錢白湯下一方用紫蘇木𤓰湯調下加减觀音散治小兒食㵼及調理脾胃宜常服之白扁豆蒸白术炒人參白茯苓乾山藥黄耆蜜水炙甘草神麯麥蘖香附子沙去毛各等分右為末空心米湯調下此藥宜常服取後復補調中散治脾胃不和霍亂吐㵼人參白茯苓白术木香炮乾薑炮藿香葉香附子炒去毛縮砂仁甘草炙丁香不焙各等分右為末薑棗煎大小以意加减或肚疼急白湯調下參术散治小兒吐㵼亡失津液煩渴心躁不食多服尤妙人參白术白茯苓山藥白扁豆炒乾葛藿香甘草炙丁香訶子炮去核各一分右為末三嵗一錢水半盞生薑二片煎三分食前如渴速進三五服𦍑活膏治小兒吐痢不止煩渴悶亂欲成脾風手足微搐但非次發熱不能辨認證候請於一時中併服隨手有應冬末春初最宜頻𦍑活獨活各去蘆頭人參切白茯苓去皮切天麻炙乾蝎青黛研各一分腦麝各半錢研水銀硫黄各一錢結沙子右為末研匀煉蜜丸皂子大捻作餅子五七嵗每服三餅三二嵗二餅一嵗半餅一餅如發熱煎荆芥湯下或乳香湯手足厥冷人參生薑湯下舊方有香而無龍腦青黛此方去三物亦不曾入丁香三二嵗兒每服祇一餅恐大寒也若吐甚丁香湯化下亦佳一方治小兒因驚發熱涎𠻳累經痢動或因傷乳食吐㵼後氣虚弱精神昏倦减乳食手足厥冷脉息微細漸成慢驚用藥普同𦍑活膏治小兒伏熱吐㵼不定煩渴肚疼羗活獨活人參防風肉桂去皮不見火硫黄三錢白茯苓全蝎各一分水銀一分同硫黄研無星右為末煉蜜丸如雞頭大三嵗一丸食前薄荷湯化下和安散治冷熱不調㵼盛下泄木香當歸川芎北前胡柴胡青皮桔梗甘草炙赤茯苓各等分右剉散每服一錢水一盞生薑二片棗二枚煎空心服觀音散治小兒外感風冷内傷脾胃嘔逆吐㵼不進乳食久則漸漸羸弱此藥主温養脾胃進美飲食人參一兩茯苓一錢半神麴石蓮肉炒去心一分綿耆白芷木香炮甘草炙白扁豆去皮炙焦令色黄去火毒各一錢右為末毎服一錢水一小盞棗一枚藿香三葉煎四分去滓温服量兒大小加减一方無藿香煎一方加麥蘖香附子各炒二錢大抵脾虚則㵼胃虚則吐脾胃俱虚吐㵼不已遂成風癎之證矣和中散治胃氣止吐㵼茯苓石蓮肉各一分藿香人參天麻白扁豆製木香白术甘草炒各半分右剉散每服三字水煎服和中散治吐㵼止煩渴腹痛和胃氣人參切去鬚焙白茯苓白术甘草剉炒乾葛剉黄耆切焙白扁豆藿香右為末每服二錢水一盞棗二枚薑五片煎至八分去滓温服之一方無乾葛名加减四君子湯每服一錢䀋㸃服玉柱杖丸治小兒吐㵼胃虚腹脤脾困昏睡不食茯苓訶子去核藿香丁香各一錢半人參木香甘草炒各半兩厚朴薑製一兩右為細末煉蜜為丸如櫻􅊝大每服一丸白湯化下食前大安丸治小兒吐㵼不止南木香白芍藥人參白术各一錢白茯苓訶子炮厚朴製橘紅各半錢右為細末蜜丸如雞頭大陳米飲湯化下一二丸厚䃼散治小兒虚滑㵼痢不止厚朴訶子皮各半兩史君子一箇揀丁香十箇吳白术茯苓青皮各二錢甘草二寸炒右為末每服一字量兒嵗加减用清米湯下訶子湯止㵼及治臓寒泄㵼訶子炮肉人參白茯苓白术各一兩木香炮半兩陳皮去白半兩甘草炙半兩豆蔲半兩右為末薑煎若久㵼手足厥冷加附子大小加减服之人參散治小兒臓寒泄㵼人參木香炮白术白茯苓各一錢山藥一分肉豆蔲一箇炮附子尖一錢炮甘草半錢炙右為末薑棗煎量兒大小加减服之妙丸子治小兒吐㵼并傷食腹疼不思乳食兼吐哯丁香藿香葉木香白茯苓官桂去皮青礞石代赭各一錢巴豆二七粒大者去皮心膜紙上壓去油右為末酒糊丸如芥子大一嵗二丸薑湯下或藿香湯食前不得喫物須權住乳効恐乳多再吐如傷食㵼與五七丸利下食次與益中膏木香散治小兒脾胃虚弱㵼泄飲食不進木香藿香葉青皮去白甘松丁皮香附子益智仁各半兩縮砂仁一兩薑黄一錢右為末甘草末一兩毎服一錢紫蘇湯調下食前大人用毎服三錢濟世膏治小兒吐㵼并百物所傷驚疳潮熱木香五靈脂一錢肉豆蔲二箇楜椒一錢丁香一錢全蝎二錢巴豆四粒去油存性硃砂半錢為衣右為末糊丸如蘿蔔子大每服二三十丸米湯下訶藜勒散治小兒脾胃氣弱不欲乳食四肢不和吐痢不止者訶藜勒皮陳皮去白各半兩黄耆去蘆頭藿香葉赤茯苓白术桂心甘草右為粗散毎服一錢水一小盞入生薑少許棗一枚同煎至五分去滓食前温服感應丸治小兒脾虚累有暴傷糞白腫臭水榖不分肚腹疼痛吐㵼不定百草霜二錢杏仁七箇去皮尖丁香七粒肉豆蔲一箇木香一塊如棗大乾薑炮一塊如棗大巴豆七粒去殻去油蠟二棗大酒煮蠟鎔酒冷蠟泛於上取用右為末酒蠟搗三二千下成劑入磁器中每服三嵗五丸小豆大乾薑湯下食前此藥不損氣亦不吐㵼只磨積滯碧香丹治小兒吐痢後大渴不止得眠睡甚則成疳天竺黄不灰木燒赤放冷赤石脂龍骨各一兩鐡粉定粉鉛白霜蛤粉各一兩細研右為細末以先四味後入霜粉四味更加麝半兩研滴水和丸如雞頭大毎服一丸至二丸用蚫螺兩箇研細沸湯浸水沉極冷化下大渴即令服神驗治秋深腹虚吐