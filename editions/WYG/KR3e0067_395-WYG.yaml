氣凉欲成慢驚風者又治大人陽虚陰盛身冷脉細自汗吐㵼小便不禁舶上硫黄十兩先飛煉去砂石秤研為細末用砂合子盛令八分滿水和赤石脂封䀋泥固濟晒乾露地先埋一罐盛水令滿坐盒子在上又以鹽泥固濟用火煅令溶候凝取上黄明者用右以栁木搥乳鉢内研為細末毎服二錢生薑米飲調下大小以意加减多服效大人藥末一兩水浸軟飯和丸桐子大晒乾毎服五十丸至百丸米飲下并空心連服又方硫黄不以多少淡黄通明為上飛煉去砂石研末用有葢砂罐子一箇取水中田字草或益母草搗極爛成泥更入紙節同搗固濟罐子貴不破晒乾盛硫黄末在内可不滿兩指於露地深畫十字放礶子在中心使底下通透四面用炭約四五觔匀火熬不葢罐子項用時揭覷候化為汁速去四面火温土埋一宿次日取出於見日氣處掘一坑子約三尺将罐子去葢倒埋一宿至次日取出和罐子入湯内五十沸漉出取藥右以栁木槌乳鉢内研如粉麫相似小兒因吐㵼之後變成慢驚者毎服一二錢生薑米飲調下餅取效大陰證傷寒脉微欲絶風以水浸無䀋蒸餅和圓桐子大晒乾每服五十丸或百丸觀音救命散治小兒熱㵼木香一錢川連一兩右以水三椀煮乾去連只以木香乾焙為末分三服或兩服量兒大小與之加燈草數莖各長四寸棗子一枚煎湯調下乳食前服參蘇飲子治小兒伏熱吐㵼虚煩悶亂引飲不止人參去蘆白术白茯苓去皮甘草炙紫蘇葉乾木𤓰香薷葉厚朴去皮薑製半夏麴白扁豆炒陳橘紅各等分右剉散毎服二錢水一盞煎至七分去滓温服不拘時候八賢散治小兒洩㵼發熱手足稍冷當歸白芍藥白茯苓甘草各一兩川芎桂柴胡各半兩熟地黄一兩右㕮咀三嵗一錢水半盞煎至三分去滓無時桃紅散治驚㵼辰砂少許𦍑活半兩防風半兩人參一錢白术三錢茯苓錢半蟬蛻三箇甘草右為末每服錢半荆芥湯下如未止用天麻四君子湯相間服之為妙隂陽丸治伏熱吐㵼并諸般吐逆不定硫黄半兩水銀一錢右同研無星如黒煤色薑汁糊丸小豆大三嵗三丸冷水下豆蔲散止㵼豆蔲一箇􅔇煨青皮陳皮木香白术甘草各一錢草果一箇右為末米飲下調中散治小兒調氣主脾及治吐㵼人參白术茯苓甘草訶子煨陳皮木𤓰白扁豆炒黄耆蜜炙木香罌粟子炒乾紫蘇葉右等分為細末白湯㸃服藿香散治小兒臟腑不調作㵼青黄黒白乳食不消糞中有凍如雞子清兼暴㵼如水其證肚痛微熱面赤唇黄白此藥治之慢驚或僵墜紅腫内弔紫蘇湯調下三五服痛止宜用此藥陳皮藿香葉厚朴薑製枳殻去穰甘草右等分為細末陳米飲下紫蘇湯下糞中有黄白凍子木𤓰并白梅去䀋煎湯下如痢止用棗子煎湯下大能和胃進乳食此是小兒常服藥斗門丸治小兒腸胃虚弱泄㵼糟粕或變白沫日夜無度附子一枚重六錢炮去皮臍尖乾薑炮各一分肉豆蔲麫裹煨熟右為細末煮麫糊和丸如黍米大毎服三十丸温米飲送下乳食空固腸丸治小兒臟寒泄㵼色多青白腹痛可食硫黄别研肉桂去粗皮龍骨别研訶子煨去核丁香等分右為細末煮麫糊和丸如黍米大毎服三十丸温米飲送下乳食空調臟丸治小兒臟腑不調泄㵼頻并精神昏困全不入食木香人參去蘆頭白术乾薑肉豆蔲麫褁煨熟白芍藥等分訶子丸治脾胃不和泄㵼不止訶子煨去核乾薑炮肉豆蔲麫裏煨熟木香赤石脂等分右件為細末煮麫糊和丸如黍米大毎服三十丸温米飲送下乳食前固腸丸治小兒臟腑泄㵼色多青白腹痛可食硫黄二錢别研牡蠣煅别研龍骨煅别研乾薑炮木香各一兩右為細末煮麫糊和丸如黍米大毎服三十丸温米飲送下乳食空豆蔲丸治小兒風冷摶於腸胃飡泄不止不思飲食肉豆蔲麫褁煨熱草豆􅅳去殻各半兩草烏頭三枚燒灰留性右為細末煮麫糊丸如黍米大每服十丸蘿蔔湯下乳食空治小兒冷㵼欲死者肉豆􅅳煨粉草炙藿香葉右三味等分為末陳米飲下一錢治小兒久㵼不止喫煖藥其㵼愈甚忽喫食减少非時吐逆喫煖藥其吐愈甚此為脚疳毒氣刑脾故有斯疾但雖久㵼忽吐唇皮常焦赤色口内常多涎溢生口瘡方熟疳冝喫此方若是面色青黒唇皮無色不湏服此方但小兒體氣虚弱須是審慎方可投藥山梔一兩荆芥三分𦍑活獨活各半兩薄荷五錢右為細末毎服一錢食後煎薄荷湯調下去滓服兒大者服一錢半温白丸治小兒久㵼脾虚不進飲食食乾仍前㵼下米榖不化白术一分用米泔浸少時切焙半夏一錢半湯炮洗七遍丁香半錢炒右為末生薑自然汁煮麫糊為丸如菉豆大毎服半嵗三丸三五嵗五七丸淡生薑湯吞下早晚各進一服惺惺散治嬰孩小兒久㵼脾困不思食乳恐作脾風天麻半錢全蝎半錢糯米一錢微炒白扁豆一錢炒人參一錢微炒茯苓一錢徼炒木香一錢炮山藥一錢焙甘草一錢炙右為末毎服嬰兒一字二三嵗半錢用水一藥注或半錢棗子半片煎十數沸服白术丸治小兒白㵼白术當歸芍藥木香右等分為末煉蜜丸如菉豆大每服十丸至十五丸不拘時候米飲下單方治小兒久㵼臟腑如雞子黄漸作驚風證滁州趙使君云其女甫週嵗忽苦臟腑每所下如雞子黄者米盆許數日之間幾取至百往漸作驚風證有一士太夫教以鍾乳服亦可以小兒只用一錢匕平復矣𫝊方者云他日或作少瘡痬不足慮兒子清老年三嵗過鎮江時病久㵼危甚用法至一半遂安不生瘡楊氏醒脾散治吐㵼不止痰作驚風脾困不食白术人參甘草陳皮白茯苓全蝎各半兩半夏麯术香各一分白附子四箇炮南星一箇炮陳倉米三百粒右為末每服一錢水半盞薑二片棗半箇煎時時頻服則吐醒脾散治小兒吐㵼初定天南星沸湯浸洗七遍右一味為細末一嵗兒毎服半錢以河水七分盞冬𤓰子七粒同煎至二分温服不拘時候守胃散治小兒陰陽不和吐㵼不止預防風證常調脾胃進乳食人參白术白茯苓去黒皮山藥白扁豆炒乾葛南星炮甘草㣲炙藿香葉防風天麻右等分為細末每服一錢水一盞冬𤓰子二十粒生薑一片同煎至四分温服如大瀉不止危急毎服沉香肉豆􅅳各少許人參白术散治小兒嘔吐泄㵼口乾唇燥煩渇引飲小便赤澁並宜服之白术去蘆白茯苓去皮人參去蘆木香藿香葉乾葛剉各半両滑石膩白者六錢甘草炙三錢右為末毎服二錢百沸湯調下或生薑湯亦可或㕮咀煎服更妙嘔吐加丁香二錢肉豆􅅳膏治小兒夹驚寒大便清㵼服疾不稳肉豆􅅳二錢剉人參一錢白术二錢甘草一錢丁香一錢不見火木香一錢不見火藿香五分右同為細末煉蜜為丸如雞頭大毎服一丸米飲下空心妳前服參蘇飲子治伏熱吐㵼虚煩悶亂飲引不止感暑者白茯苓人參白术甘草紫蘇木𤓰藿香厚朴半夏各等分右湯㸃服空心量與神效沒石子丸大徤小兒脾胃吐㵼不進乳食諸病後虚弱精神昏慢全不入食嘔吐生痰漸成慢脾候立有神效不可具述半夏半両用生薑一両半搥爛將半夏每箇切作両片水半碗同薑煮用白􅔇一錢重鉢内研作餅子慢火炙熱沒石子一枚滑石一分研人參一分丁香一錢白礬一錢枯硃砂一錢細研右為末毎服半錢煎冬𤓰子生薑湯調下如為丸用水調薄薑汁􅔇糊為丸子毎服三十丸量大小加减服觀音散扁豆炒白术煨茯苓人參炙神􅎘炒麥芽炒香附子各等分右為末空心米飲調下霍亂附論夫小兒霍亂者由隂陽清濁二氣相干氣亂於腸胃之間故為霍亂也然腸胃怯弱或因觧脱為風冷所乗及乳哺不消而成吐㵼或乳母觸冒風冷及飲食生冷等物冷氣入乳令乳變敗兒若飲之亦成吐利是皆觸犯臟腑使清濁之氣相干之所致也挟風而實者體熱頭疼而復吐㵼凡遇此病湏暫斷乳食仍以藥調適乳母先當散乳間風冷之氣冝服香蘇飲夹和霍香正氣散煎食後捻去宿乳服之逐去寒邪次用理中湯加丁香木香煎服温養其乳此先定其大勢然後自合醸乳藥同兒飲之乃服醒脾散使免生慢驚之疾也楊氏曰陽隔隂而不降隂霍亂也先心痛則先吐先腹痛則先㵼心腹俱痛吐利並作所謂賊邪木來勝土也王氏曰小兒内因脾胃虚弱乳哺停積外因感胃寒暑邪正交争証有冷熱之不同藥用温京之各異陳無擇曰傷風則惡風自汗傷寒則惡寒無汗胃温則冷凝傷暑則熱煩必以外所因而治之扶救不先立致危殆治法必先止吐次則随證治利許仁則曰濕霍亂死者少乾霍亂死者多楊氏曰足陽明屬胃以養宗筋暴吐暴痢津液驟亡失其所養甚則轉筋入腹而死王氏曰小兒吐痢暴作最為急證葢脾虚則吐胃虚則㵼脾胃俱虚吐痢俱不止吐而不止㵼者危楊氏曰吐㵼不止必轉慢驚慢脾虚風也又曰小兒有中霍亂吐㵼侯上吐下㵼偏身微熱不能乳哺此因喫食熱不調順脾家受熱胃冷不消化所致宜用睡驚沉香飲夾丁香散乳香散活脾散與服如𫝊變大渴不食面臉紅眼微視氣小不語汗多恐患慢脾風死候不治又小兒霍亂而成吐㵼仍須進大七寳散二三服并觀音散二三服温白丸二三服如不退恐脾困不進乳食須進惺惺散二三服如此不效往往變作慢脾風慢驚風此候宜進竹瀝膏二三服間惺惺散調胃氣並沉香散又小兒霍亂吐痢由陰陽不和清濁相干與大人無異如救火拯溺冝速療之兼宜用聖石丹宜順正湯霍亂吐㵼形候忽然吐瀉謂之霍亂吐㵼如有渇即下沉香飲子夹平胃丸若未有渇量大小下鮓湯丸通一二遍白涎只依前用沉香飲子平理胃如尚猖狂煩躁夜睡不得喘息急促此死候不治翰林待詔楊大鄴問小兒霍亂吐妳者為何荅曰凡將息小兒之道切慎擇妳母精神強徤祥慢智惠深逺身無疾病肌肉肥潤溫厚善能調理乳食何疾更生衆疾易愈方大七寳方治小兒霍亂吐㵼不進食乳木香炮丁香炒官桂不見火茯苓麻黄去節當歸甘草炙人參大腹皮川楝子去核阿膠炒各一錢訶子去核一錢肉豆蔲一个炮藿香葉一錢炒地榆二錢炒右為末毎服一嵗兒一字二三嵗半錢四五嵗一錢水一藥注或半銀盞入棗子半片煎十數沸溫服地黄散治小兒脾胃氣衰弱霍亂吐㵼嘔逆不食煩躁迷悶乾地黄厚朴去粗皮薑汁浸炒人參茯苓乾葛藿香葉黄耆蜜炒白术麩炒各一分丁香訶子炮取肉各一錢右為末毎服半錢或一錢用蒼术煮飯飲調下並進四五服肉豆蔲散治小兒霍亂吐㵼不止飲食不下肉豆蔲一枝去殻丁香黄耆剉枇杷葉去毛炙㣲黄各半分桂心人參甘草白茯苓各半兩陳橘皮一分湯浸去白瓤焙右為散一嵗兒霍亂毎服以溫水調下半錢大小加减半夏散治小兒霍亂後吐瀉不止煩悶半夏湯浸七遍去滑用黄連去鬚乾薑炮製剉陳橘皮去白瓤湯浸焙人參去蘆頭當歸㣲剉炒以上各半兩黄芩甘草炙赤㣲剉各一分右為散毎服一錢水一小盞煎至五分去滓不拘時量大小溫服丁香散治小兒霍亂吐㵼不定丁香木香甘草炙㣲赤剉葛根剉枇杷葉去毛炙㣲黄各半分藿香人參去蘆頭桑黄各半兩右為末不計時以麝香湯調下半錢量大小以意加减服之救生丹治小兒心膈伏熱生涎霍亂躁悶身熱吐逆惡心乳食不下大洩一錢半輕粉三字乳香丁香各半錢龍腦一字粉霜三字水銀黄蠟各二錢黒鉛一錢一字與水銀結砂子右為末鎔蠟為丸如小豆大一嵗一丸木𤓰甘草湯饑服如煩躁研生芝蔴馬齒莧水下如逆吐煎藿香湯下更量虚實加减食後臨卧服之此藥除熱化涎下膈止吐逆若胃虚傷冷嘔吐不止者不可服凡小兒吐逆宜速療之乆不止遂為慢驚常宜収此藥備急醒脾散人參半兩去蘆丁香四十粒白茯苓半兩藿香葉半兩白术半兩甘草半兩炙天南星二箇重八錢已上者縮砂仁四十枚同南星