body:
  text: 普濟方卷四百九明周王朱橚撰鍼灸門明堂灸經序夫𤣥黄始判上下爰分中和之氣為人萬物之間最貴莫不禀隂陽氣度作天地英靈頭象圓穹足模厚載五臟法之五嶽九竅以布九州四肢分彼四時六腑配乎六律瞻視同於日月呼吸猶若風雲氣血以類江河毛髪比之草木雖繼體於父母悉取象於乾坤賁且若斯命豈輕也是以立身之道濟物居先保夀之宜治病為要草木有蠲疴之力鍼灸有刼病之功欲滌邪由信兹益矣夫明堂者聖人之遺教黄帝之正經紀血脉循環明隂陽腧膜窮流注之𤣥妙辨血道之根源為臟腑權衡作經絡津要今則採其精粹去彼繁蕪皆目覩有憑手經竒效書病源以知主療圖人形貴免參差并集小兒明堂編類於次庶幾長幼盡涉安衢欲俾華夷同歸壽域云爾銅人鍼灸經序臣聞聖人之有天下也論病以及國原診以知政王澤不流則姦生於下故辨淑慝以制治真氣不榮則疢動於體故謹醫砭以救民昔我聖祖之問岐伯也以為善言天者必有驗於人天之數十有二人經絡以應之周天之度三百六十有五人氣穴以應之上下有紀左右有象督任有㑹腧合有數窮妙於血脉參變乎陰陽始命盡書其言藏於金蘭之室洎雷公請問其道乃坐明堂以授之後世之言明堂者以此由是開灸鍼刺之術備焉神聖工巧之藝生焉若越人起死華佗愈躄王纂驅邪秋天療鬼豈有神哉皆此法也去聖䆮逺其學難精雖列在經訣繪之圖素而粉墨易揉豕亥多偽灸艾而壞肝投鍼而失胃平民受弊而莫贖庸醫承誤而不思非夫聖人孰救兹患洪惟我后勤哀兆庶迪帝軒之遺烈祗文母之慈訓命百工以脩政令敕太醫以謹方技深惟鍼艾之法舊列王官之守人命所繫日用尤急思革其謬者濟於民殿中省尚藥奉御王惟一素授禁方尤工礪石竭心奉詔精意參詳定偃側於人形正分寸於腧膜増古今之救驗刋日相之破漏總㑹諸説勒成三篇後又以古經訓詁至精學者封執多失傳心豈如㑹目著辭不若案形復令創鑄銅人為式内分臟腑旁注谿谷井榮所㑹孔穴所安竅而達中刻題於側使觀者爛然而有第疑者煥然而冰釋在昔未臻惟帝時憲乃命使臣為之序引名曰新鑄銅人腧穴經灸圖經肇頒四方景式萬代將使多瘠咸詔巨刺靡差案説蠲疴若對談於涪水披圖洞視如舊飲於上池保我黎蒸介乎壽考昔夏后叙六極以辨疾帝炎問百藥以惠人固當譲徳今辰歸功聖域者矣時天聖四年歲次析木秋八月丙申翰林學士兼侍讀學士景靈宫判官起復朝奉大夫尚書左司郎中知制誥判集賢院權尚書都省柱國泗水縣開國男食邑三百户賜紫金魚袋夏竦撰太平聖惠方鍼經序夫鍼術𤣥奥難究妙門厯代名工恆多祖述葢指歸有異機要互陳或隱秘難明或言理㒺盡或義博而詞簡或文瞻而意疎背軒后之聖文失岐伯之高論致俾學者莫曉宗源今則採摭前經研覈至理指先哲之未悟達右聖之㣲言總覽精英者經也窮理盡性通幽洞𤣥陳穴道而該通指病源而咸若用昭未悟以道迷津傳示將來無期悠逺者爾流注鍼經序鍼灸有刼病之功其言信矣鍼必明其孔穴灸必定其尺寸孔穴明尺寸定則膏之上肓之下何患乎厥疾之弗瘳歟在昔孫公真人有曰為醫知藥而不知鍼知鍼而不知灸不足以為上醫必也藥與鍼灸三者俱通始可與言醫也矣余先君漢卿公以藥與艾見重於士大夫如雨巖吳憲與以借補憲司官醫助教之職達齊游憲親為書其藥室曰活濟堂至元丙子以來余挾父術遊江淮得遇至人授以鍼法且以子午流注鍼經竇漢卿鍼經指南三書見遺拜而受之珍藏玩味大進益且喜其姓字醫術與先君同也因是作而言曰南北有二漢卿同姓同字而為醫亦同也北之漢卿得行道鍼法精於八穴以愈疾名顯於世官至太師南之漢卿隱居求志惟以藥與艾推而積活人濟世之陰功由是觀之則信矣南北氣質之不同而達則為相不達則為醫亦其志之出處異矣今將面授鍼法已驗指南之書牛提舉所刋竇漢卿鍼經二本參究訂誤遺與子午流注鍼經及家世所藏黄帝明堂灸經莊季裕所集灸膏肓法穴四者之書三復校正一新板行目是書曰鍼灸四書樂與四方醫士共寶之凡我同志留心是書則藥與鍼灸三者並通庶可進而為上醫之士亦可無負於孫真人之􅂷訓歟謹書以紀此知本末云至大辛亥建安靜齋竇柱方序又序竊以久習醫業好讀難素辭理精㣲妙門隱奥古今所難而不易也是以鍼刺之理尤為難觧博而寡要勞而少功窮而通之積有萬端之廣近世指病直刺不務法者多矣近有南唐何公務法上古撰指㣲論三卷探經絡之源順鍼刺之理明榮衛之清濁别孔穴之部分然未廣傳於世又近於真元癸酉年間收何公所作指㣲鍼賦一道叙其首云皆按指㣲論中之妙理先賢必隱之樞機復増多事凡百餘門悉便於討閲者也非得難素不傳之妙孰能至此哉廣不度荒拙隨其意韻輙申短説採摭羣經為之注解廣今復採難素遺文賈氏井榮六十首法布經絡往還附鍼刺孔穴部分鈐括圖形集成一義名曰流注經絡井榮圖歌訣續於賦後非顯不肖之狂迷欲明何氏之用心致騐於人也自慮未備其善更祈明智仍懇續焉常山閻明廣序又序夫醫者以愈疾為良其愈疾之理莫妙乎鍼故知鍼者有决病之功立効之能且夫學鍼之士宜審而刺之莫縱巨膽妄為施設非徒無益而又害之要在定孔穴以精於心是以取神功而應於手信知除疴見於目下决病在於手中是以軒岐開端越人知要素問隱其奥難經彰其妙况為針者豈曰小補之哉人受陰陽以生一嵗之日有三百六十肢節亦分三百六十有五穴象周天之度也若稽古神聖成天之功立民之命爰作鍼法鍼某穴療某病手得之心應之非天下之至神孰能與於此盧扁尚矣此法罕傳余先人心友竇先生以鍼法活人甚多嘗著八穴真經演之為論為賦鈎深素隱披洩義藴後學之士得此一巻書而熟讀之者思過半矣余於壬辰冬被㫖來南遍厯閩中諸郡求其所謂鍼法者皆不獲舊篋中得先生之遺書敬用鋟梓以廣其傳先生名傑字漢卿古洛肥鄉人官至太師以醫學傳於世云時貞元元年燕山牛良祐序資生經序銅人明堂黄帝岐伯鬼臾區留以活天下後世自隔膜透膚之妙無傳乃謂是能絶筋脉傷血肉至望而畏之有疾則甘心於庸醫百藥之俱試不知病在巔者必灸風池風府非桂枝輩所能攻病在膺者必灸刺期門非枳實輩能下遂至於束手無䇿豈不哀哉近世朱紘龎安常俱為鍼法許知可亦謂病當以刺愈三衢鄒握虎以治法為歌詩韻括行聖賢活人之意頼以復傳今東嘉王叔權又取三百六十穴背面巔末行分類列以穴對病凡他氏之説切於理以己之見得於心者悉疏於下鍼灸之書至是始畧備古聖賢活人之意至是始無遺憾傳謂為人子者不可不學醫予親年八十精力强健非頼此書邪因俾醫衛世傑訂證傳見者十有八條鋟木庾司以補惠民之闕時嘉定庚辰徐正卿序又序予得倅澧陽吏以圖經來迓暇日閲之見文籍之目有灸經焉意其非明堂即銅人也祗役以來親故惠書及士夫之經從者多以印置此書為托原其所以乃前郡博士王君執中之所編著也求其版則亡之矣豈好事者攜之以去或守藏者不謹而散逸之邪然是經流傳既久豈無存者宜加搜訪竟未得之意篋中有淮東庾使徐君正卿所刋鍼灸資生經取而視之其序引厯述東嘉王叔權發明編類之功且謂鍼灸之書至是始畧備古聖賢活人之意至是始無遺憾則知王君之用心亦仁且至矣所謂叔權者其王君之字歟一日出示醫諭劉澐劉一見驚且喜曰王君所刋正此書也今之刻畫精緻視昔有加究所縁來盖徐君嘗主民曹於是刋得此書歸而刋之耳吁是經也王君首刋之澧陽今不復存徐君繼刻之海陵其存與否又未知版之不存則二君之志將遂湮㣲豈不惜哉予負丞於此適攜以偕殆非偶然者仍命工鋟梓以廣其傳使是書得不冺絶其於衛生豈曰小補紹定四年趙編序又序資生經者合明堂銅人千金外臺而一之大監王公所編次擇精語詳針灸之法皆聚此書矣聞之故老謂澧學舊有公本火於淳祐乙巳後不復再見元壬辰余得善本於維陽即欲刻諸荆泮與衛生之家共之㑹授代不果大德丙午白其事於憲僉汶上國先生一見大喜即召匠計直命平代等處軍民長官謝琰醫學正覃南榮澧陽縣典史唐益秀協力相成其事教導戴夢高專任校讎之責越十月書成余謹按扁鵲華佗及孫思邈方論藥餌針灸未嘗偏廢後世醫士舉一而號為専門針灸亦皆未得腧穴之正舊有年壯病勞極者膏肓兩穴更數醫不效後得此書按圖取穴一灸即愈其間阿是穴法之説禁穴許灸三壯之説亦皆累試累效禁穴艾炷止麥粒大仍隔蒜片尤穩近年有為狂猘所傷者亦嘗依經灸活三人是書之有益於世多矣今既板行一路流布四方其所全活庸有旣乎國先生按行屬部究心民瘼痒疴疾痛舉切諸身今板行是書亦濟人利物之一端而余之本心亦於是而獲遂矣故喜而為之序大德丁未閬中郡蒲登辰序流注指㣲鍼賦以鍼醫訣式流注指㣲為韻疾居榮衛榮者血也衛者氣也由腸胃受榖化血氣所也為上焦出氣以温分肉而養筋通腠理中焦出氣如露上注谿谷而滲孫脉津液和調變化而為血血和則孫脉先滿乃注絡脉皆盈乃注於經脉陰陽以張因息乃行行有紀綱周有道理與天合同不得休止切而調之調攝失度致生其疾疾者百病之總名也百病之始皆因風寒暑濕飢飽勞逸而得之或起於陰或起於陽所傷各異虛實不同或着孫脉或着絡脉或着經脉或着於衝任脉或着於腸胃之膜原邪氣浸淫不可勝論扶救者鍼救疾之功調虛實之要九緘最妙各有所冝熱在頭身冝鑱針肉分氣滿冝員針脉氣虛𣺌冝鍉針㵼熱出血發泄固疾冝鋒針破癰腫出膿血宜䤵針調陰陽去暴痺宜員利針治經絡中病痺宜毫針痺深居骨解腰節腠理之間宜長鍼虛風舍於骨解皮膜之間宜大鍼觀虛實與肥瘦經云虚則補之實則瀉之不實不虛以經取之若虛實不明投鍼有失聖人所謂實實虛虛若明此則無損不足益有餘之過觀肥瘦者用鍼之法必先觀其形之肥瘦方明鍼刺之淺深若以身中分肥與瘦同用是謂淺深不得返為大賊也故肥人刺深瘦人刺淺以與本藏所属部分齊平為期所以無過不及之傷也辨四時之淺深四時者所以分春夏秋冬之氣所在時調之也春氣在毫毛下夏氣在皮膚上秋氣在分肉冬氣在筋骨經云春夏刺淺秋冬刺深各以其時為則又肥人宜深刺之瘦人宜淺刺之取穴之法但分陰陽而谿谷陰者陰氣也陽者陽氣也謂陽氣起於五指之表陰氣起於五指之裏也肉之大㑹為谷肉之小㑹為谿分肉之間谿谷之㑹以行榮衛以㑹大氣谿谷有三百六十五穴㑹亦應一歲故取穴之法分其陰陽表裏部分谿谷逺近同身寸取之舉臂拱手直立偃側皆取穴法也逐穴各有所宜迎隨逆順須曉氣血而昇沈經云迎隨者要知榮衛之流行經脉之往來也隨其經逆順而取之靈樞曰㵼者迎之補者隨之若能知迎知隨令氣必和和氣知方必通陰陽升降上下流源手之三陰從藏走至手手之三陽從手走至頭足之三陽從頭下至足足之三陰從足上走至腹絡脉傳注周流不息故經脉者行血氣通陰陽以榮於身者也本論云夫欲用迎隨之法者要知經絡逆順淺深之分諸陽之經行於脉外諸陽之絡行於脉内諸陰之經行於脉内諸陰之絡行於脉外仍各有所守之分故知皮毛者肺之部肌肉者脾之本筋者肝之合骨髓者腎之屬血脉者心之分各刺其部無過其道是謂大妙迎而奪之有分寸隨而濟之有淺深深為太過能傷諸經淺為不及寧去諸邪是以足太陽之經刺得其部迎而六分隨而二分足太陽之絡迎而七分隨而二分手太陽之絡迎而九分隨而四分手陽明之經迎而九分随而四分手陽明之絡迎而八分随而三分足陽明之經迎而一寸随而五寸足陽明之絡迎而六分隨而一分手少陽經迎而六分隨而一分手少陽絡迎而七分随而二分足少陽經迎而八分隨而三分足少陽絡迎而一寸隨而五分手太陰經迎而九分隨而四分手太陰絡迎而七分隨而二分足太陰經迎而一寸隨而五寸足太陰絡迎而八分隨而三分手少陰經迎而七分隨而二分手少陰絡迎而六分隨而一分足少陰經迎而六分隨而一分足少陰絡迎而一寸隨而五寸手厥陰經迎而七分隨而二分手厥陰絡迎而六分隨而一分足厥陰經迎而八分隨而三分足厥陰絡迎而九分隨而四分斯皆經絡相合補生瀉成不過一寸鍼入貴速既入徐進鍼出貴緩急則多傷明須慎之勿為始事男子左瀉右補女子右瀉左補轉鍼迎隨補瀉之道明於此矣原夫指㣲論中賾義成賦指㣲論三卷亦是何公所作探經絡之賾原鍼刺之理明榮衛之清濁别孔穴之部分然未廣傳於世間内自取義以成此賦知本時之氣開説經絡之流注本論云流者行也注者住也流謂氣血之流行也一呼脉行三寸一吸脉行三寸呼吸定息脉行六寸如流水走蟻涓涓不息不可蹔止又云流而為榮衛彰而為顔色發而為音聲速則生熱遲則生寒結則為瘤贅䧟則為癰疽故知流者不可止若人悞中則有顛倒昏悶之疾又云注者住也謂十二經絡各至本時皆有虚實邪正之氣注於所活之穴所謂得時謂之開失時謂之闔氣開當補瀉氣閉忌針刺聖人深慮此者恐人勞而無功豈可昧氣開流注之道哉其氣開注穴之法七韻中之説矣每披文而參其法篇篇之誓審尋覆經而察其言字字之義明諭其隱皆知實虛總附夫披文覆經者學之不精也既窮其理賾其義知其根得其源以見聖人之心乎觀何公作流注之賦𤣥辭妙語可謂達理不得以為自縻也針下獲安得其鍼刺之要法移疼住痛獲效真如神矣暴疾沈痾至危篤刺之勿悞沈痾乆病虛弱之人忽暴感疾於榮衛傳於臟腑其病必危篤而沈重也明上是時深慮損益慎勿輕忽自恃聰明當須察其何經所苦補瀉鍼刺去之勿悞也詳夫陰日血引值陽氣流賈氏云陽日氣先脉外血後脉内陰日血先脉外氣後脉内交貫而行於五臟五腑之中各注井榮俞經合五穴共五十穴唯三焦受十經血氣次傳包絡又各注五穴通前十二經共六十穴才合得十六難内六十首也越人言三部九候各有頭首也及素問言六十首今世不傳既言不傳其文不載六十首字也故聖人留此六十首法故今後人穿鑿也余有所過為原六穴即便是陰陽二氣出入門户也則陽脉出行二十五度陰脉入行二十五度則皆㑹於六穴中出入也其五臟五腑收血化精合處便是逐經原氣也其餘精者助其三焦其受十經精氣則次養心包絡始十二經血氣遍行也如一經精氣不足則便成病也既然有病即不依此行度也至令諸經失時又更引毒氣遍行所流到處即各見本經脉候或大或小或浮或沈病人或寒或熱或輕或重因症取之耳口温鍼暖凡下鍼先須口内温鍼令暖不唯滑利而少痛亦借已和氣與患榮衛無寒温之爭便得相從若不先温鍼暖與血氣相逆寒温交爭而成瘡者多矣牢濡深求經云實之與虛者牢濡之意氣來實牢者為得濡虛者為失凡欲行其補瀉即詳五臟之脉及所刺穴中如氣來實牢者可瀉之虛濡者可補之也諸經十二作數絡脉十五為周手足各有三陰三陽之脉合為十二經脉每一經各有一絡脉餘有陽蹻之絡陰蹻之絡脾之大絡合為十五絡脉周者為十二經十五絡二十七氣周流於身者也陰俞六十藏主藏謂五藏肝心脾肺腎并心包之脉合之有六并兼四形藏也俞謂井榮經合非皆俞也然井榮俞經合者肝之井大敦穴也榮行間穴也俞大衝穴也經中封穴也合曲泉穴也心之井少衝血也榮少府穴也俞神門穴也經靈道穴也合少海穴也脾之井隱白穴也榮大都穴也俞太白穴也經商邱穴也合隂陵泉穴也肺之井少商穴也榮魚際穴也俞大淵穴也經經渠穴也合尺澤穴也腎之井涌泉穴也榮參谷穴也俞太谿穴也經復溜穴也合隂谷穴也心包之井中衝穴也榮勞宫穴也俞太陵穴也經間使穴也合曲澤穴也五藏之俞各有五則五五二十五俞并心絡五俞共三十以左右見言之六十俞穴也陽穴七二腑收腑謂六腑非兼九形腑也穴俞穴也亦謂井榮俞原經合也肝之腑膽膽之井者竅隂穴也榮俠谿穴也俞臨泣穴也原邱墟穴也經陽輔穴也合陽陵泉穴也心之腑小腸小腸之井者少澤穴也榮前谷穴也俞後谿穴也原腕骨穴也合小海穴也脾之腑胃胃之井者厲兑穴也榮内庭穴也俞陷谷穴也原衝陽穴也經解谿穴也合三里穴也肺之腑大腸大腸之井者高陽穴也榮二間穴也俞三間穴也原合谷穴也經陽谿穴也合曲池穴也腎之腑膀胱膀胱之井者至陰穴也榮通谷穴也俞束骨穴也原經骨穴也經崑崙穴也合委中穴也心包之腑三焦三焦之井者闗衝穴也榮液門穴也俞中中渚穴也原陽池穴也經支溝穴也合天井穴也如是六腑各有六則六六三十六俞以左右脉共言之則七十有二俞穴也取穴部分於井榮圖備説刺陽經者可卧鍼而取衛者属陽皮毛之分當卧鍼而刺之若深刺傷陰分傷榮氣也奪血絡者先俾指而柔奪血絡者取榮氣也榮氣者經隧也靈樞曰經隧者五臟六腑之大絡也故言血絡凡刺之者先以左手捻按所刺之穴候指下氣散方可下鍼取榮家之氣不能損衛氣也經云刺榮無傷衛刺衛無傷榮也呼為迎而吸作補瀉者迎之補者随之有餘則瀉不足則補瀉者吸則内鍼無令氣凌静以乆留無令斜布後呼盡乃去大氣皆出呼名曰瀉補者捫而循之切而敬之推而按之弹而弩之㧓而下之外引其門以閉其神呼盡内緘靜以乆留以氣至為故候吸引鍼氣不得出各在其處推闔其門令神氣存大氣留止故命曰補善治者察其所痛以知病有餘不足當補則補當瀉則瀉無逆天時是謂至治之妙逆為鬼而從何憂逆者謂當刺之日與病五行相形逓為鬼賊而不順也從者五藏之氣與日相和而不相侵凌也凡刺之理當擇吉日與本病之藏有各無侵凌刑制下鍼順從而何憂哉淹疾延患着灸之由若病有乆淹因寒而得或陰證多寒或是風寒濕脾脚氣之病或是上實下虛厥逆之疾男子勞傷婦人血氣之屬並可用鍼灸亦有不可灸者近髓之穴陽證之病不可灸也躁煩藥餌而難極必取八㑹躁煩熱盛在於内者宜取八㑹之氣穴也謂府㑹太倉中脘穴藏㑹季脅章門穴筋㑹陽陵泉穴髓㑹絶骨穴血㑹膈俞穴骨㑹大杼穴脉㑹太淵穴氣㑹三焦膻中穴此是八㑹穴也癰腫竒經而畜邪先由砭瘳經云病人脉降盛入於八脉而不環周十二經亦不能拘之其受邪氣蓄積腫熱宜砭刺出血古者以砭石為鍼山海經曰高氏之山有石如玉可以為鍼即砭石也今人以披鍼代之也况乎甲膽乙肝丁心壬水甲膽乙肝者謂五藏五腑拘之十干陽干主府隂干主藏故天元冊又曰膽甲肝乙小腸丙心丁胃戊脾己大脾庚肺辛膀胱壬腎癸五臟五腑收血化精合處便是三焦包絡二經元氣也合為十二經遍行也賈氏各分頭首十旦終運行十干皆以五子元建日時為頭也生我者號母我生者名子夫五行者在人為五臟注穴為井榮俞經相合為夫妻我克者為七傳克我者為鬼賊我生者為子生我者為母也春井夏榮乃邪在秋經冬合乃刺矣此言逐四時取井榮之法也假令春木旺刺井夏火旺刺榮季夏土旺刺俞秋金旺刺經冬水旺刺合四時刺法依此推之以瀉逐時所勝邪毒者也聖人所謂因其時而取之以瀉邪氣出也犯禁忌而病復禁忌者非唯人神所在也謂大飢大渴大寒大熱大飽大醉大虚大竭大勞大困皆為鍼家之禁忌若虛實不分淺深不及犯觸人神顛倒四時其病愈而必復切須誡之誡之用日衰而難已本論云病於當日之下受五行之刑制者其病刺而難愈也謂心病遇庚日肝病遇辛日脾病遇乙日肺病遇丁日腎病遇己日小腸病遇壬日大腸病遇丙日胃遇甲日膽遇庚日膀胱遇戊日斯皆本藏正氣遇日下受制而氣衰刺病難愈故也系絡在於肉分血行出於支裏系絡小絡也謂絡之支别也行於分肉之間有血留止刺而去之無問脉之所㑹悶昏鍼運經虚補絡須然本論云若學人深明氣血往來取穴部分不差補瀉得宜必無鍼運昏倒之疾或怱忙之際畏刺之人多鍼此傷壯者氣行自巳怯者當速救療假令鍼肝經感氣運以補肝經合曲泉穴之絡假令鍼肝絡血運以補本經曲泉穴之經鍼入復甦故知起死他皆倣此疼實痒虚寫子隨母要指病之虚實者痒則為虛疼則為實刺法云虛則補其母實則瀉其子假令肝藏實瀉肝之榮行間穴屬火是子肝藏虛補肝之合曲泉穴屬水是母凡刺只取本經井榮俞經合五行子母補瀉此乃大要也想夫先賢迅放無出於鍼經今人愈疾豈離於明醫古之治疾特論鍼石素問先論刺後論脉難經先論脉後論刺刺之與脉不可偏廢昔之越人起死華佗愈躄非有神哉皆此法也離聖久逺後學難精所以針之𤣥妙罕聞於世今時有疾多求醫命藥用針者寡矣徐文伯瀉孕於苑内斯由甚速昔宋太子善信醫晝出苑見一有孕婦人太子自為診之是一女令徐文伯亦診之乃一男一女太子性急欲剖腹視之伯曰自請鍼之令落於是瀉足三陰交補手陽明合谷胎應鍼而落果如文伯之言也范九思療咽於江夏聞見言希傳曰嘉祐中有太傅程公守住於江夏因母之暴患咽中有癰卒然而長塞氣不通命醫者止可用藥治之勿施鍼以損之醫曰咽中氣上不通豈能用藥藥既下之豈能卒效故衆醫不敢措治尋有醫博范九思云有藥須用未使新筆㸃之癰疽即便差公遂取新筆與之九思乃以㸃藥上癰藥到則有紫血頓出漸氣通而差公曰此達神聖之妙矣公命九思飲而求其方九思大笑曰其患是熱毒結於喉中塞之氣不宣通病以為甚公堅執只可用藥不可用鍼若從公意則必誤矣若不從公意固不能施治九思當日曽以小鍼藏於筆頭中妄以㸃藥乃鍼開其癰而效也若非如此何以紫血頓下也公方省而難曰針有刼病之功驗於今日古人云為將不察士卒之能否則不能决勝為醫不察藥性之主治則不能便差又將無卒謀逺慮則無必勝醫無卒機逺見治無必效也大抵古今遺跡後世皆師昔古留軌範使後人倣學不可獨强也况於鍼術隱奥難究妙門出呼其類者今知是誰能之故聖人云不可不遵先聖遺文也王纂鍼魅而立康􅆩從被出傳曰王纂小習醫方尤精鍼石逺近知名嘉祐中縣人張方女因暮宿廣陵廟中下有一物假作其壻因被魅感而病纂乃治之一鍼有一祟從女被中走出而病愈矣秋夫療鬼而馘效魂免傷悲昔宋徐熈字秋夫善醫方方為丹陽令常聞鬼神吟呻甚悽若秋夫曰汝是鬼何須如此答曰我患腰痛死雖為鬼痛苦尚不可忍聞君善醫願相救濟秋夫曰吾聞鬼無形何由措置鬼云縳草作人予依入之但取孔穴鍼之秋夫如其言為鍼腰腧二穴肩井二穴設祭而埋之明日見一人來謝曰蒙君醫療復為設祭病今已愈感惠實深忽然不見公曰夫鬼為陰物病由告醫醫既愈矣尚能感激况於人乎鬼姓斛名斯既而感指幽㣲用鍼直訣此皆指㣲論中用鍼幽㣲之直訣也竅齊於筋骨皮肉刺要竅者穴也齊者淺深之宜也經曰刺皮無傷骨刺骨無傷髓病有浮沈刺有淺深各至其理無過其道過則傷不及則生外壅壅則邪從之淺深不得反為大賊内動五臟故生大病痛察於乆新府藏寒熱痛者病也夫人病有乆新藏府病寒熱虚實宜細詳審調設鍼形短長鋒類不等窮其補瀉各隨病所宜用之接氣通經短長依法本論云夫欲取偏枯乆患榮衛諸疾多是愈而復作者由氣不接而經不通流雖有蹔時之快客氣勝真病當未愈也當此乃上接而下引呼吸多少經脉長短各有數定立法手三陽接而九呼經過四寸手三陽接而七呼過經五寸足之三陽接而一十四呼過經四寸足之三隂接而一十二呼過經五寸重者倍之吸亦同數此接氣通經呼吸長短之法也裏外之絶羸盈必别夫五藏裏外者謂心肺在膈上通於天氣也心主於脉肺主於氣外華榮於皮膚故言外也腎肝在下通於地氣以藏精血實於骨髓心肺外絶則皮聚毛落腎肝内絶則骨痿筋緩其時學者不能别裏外虛實致使鍼藥誤投所以實實虚虛損不足益有餘如此死者醫殺之耳勿刺大勞使人氣亂而神隳禁刺論曰無刺大勞人勞則喘息汗出裏外皆越故氣耗亂神隳散也慎妄呼吸防他鍼昏而閉血呼吸者使陰陽氣行流上下經厯五藏六腑若鍼刺妄行呼吸陰陽交錯則鍼昏閉血氣不行也又以常尋古義由以藏機遇高賢真趣則超然得悟逢達人示教則表我扶危先賢之書文理之深隱義難窮或字中隱義或假令一隅妙要難窮遇高達之士方得其趣便可穿鑿男女氣脉行分時合度本論云夫男女老幼氣候不同春夏秋冬寒暑各異春氣生而脉氣緩夏暑熱而脉行逺秋氣燥而脉行急冬氣寒而脉凝濇小兒之脉應春壯年之脉應夏四十以上如秋六十以後如冬其病有寒熱脉有遲速一一參詳不可一槩與天同度矣難經云一呼脉行三寸一吸脉行三寸者平人脉法也㣲抱病之人皆失天之度地之紀脉之用不可與平人脉相合也其診取法當以一息五至為與天同度不及應春不及應冬太過應秋太過應夏應春冬者宜留鍼待氣至應秋夏者呼吸數畢便宜去鍼此之謂也養子時克注穴穴須依養子時克注穴者謂逐時氣注藏府井榮之法也每一時辰相生養子五度各注井榮俞經合五穴晝夜十二時氣血行過六十俞穴也每一穴血氣分得一刻六十分六厘六毫六絲六忽六杪此是一穴之數也六十穴共成百刻要求日下井榮用五子元建日時取假令甲日甲戌時膽統氣初出竅隂穴為井木流至小腸為榮火氣過前谷穴注之胃為俞土氣過陷谷穴又并過本原邱墟穴但是六府各有原穴則不係屬井榮相生之法即是隂陽二穴出入門户也行之大腸為經金氣過陽谿穴所入膀胱為合水氣入委中穴終此是甲戌時木火土金水相生五度一時辰流注五穴畢也他皆放此今詳定療病之儀神鍼法式廣搜難素之秘宻文深辭考諸家之時亟妙臆故稱瀘江流注之指㣲以為後學之規則鍼經標幽賦拯救之法妙用者鍼察歲時於天道定形氣於予心春夏瘦而刺淺秋冬肥而刺深不窮經絡隂陽多逢刺禁既論藏府虚實須可經尋原夫起自中焦水初下漏太陰為始至厥陰而方終穴出雲門抵期門而最後正經十二别絡走三百餘支正側偃伏氣血有六百餘侯手足三陽手走頭而頭走足手足三陰足走腹而胷走手要識迎隨須明逆順况乎隂陽氣血多少為最厥陰太陽少氣多血太陰少陰少血多氣而又氣多血少者少陽之分氣盛血多者陽明之位先詳多少之宜次察應至之氣輕滑慢而未來沈澁𦂳而已至既至也量寒熱而治疾未至者據虚實而滯痏氣之治也若魚吞鈎餌之浮沉氣未至也似閑出幽堂之深䆳氣速至而放速氣遲至而不至觀夫九針之法毫針最㣲七星可應衆穴主持本形金也有蠲邪扶正之道短長水也有决凝開滯之機定刺衆木或斜或正口藏此火進陽補羸循機捫而可塞以象土實應五行而可知然是一寸六分包含妙理雖細擬於毛髪同貫多岐可平五臟之寒熱能調六府之虚實拘攣閉塞遣八邪而去矣寒熱痛痺開四關而已之凡刺者使本神朝而後入既刺也使本神定而氣隨神不朝而勿刺神已定而可施定脚處取氣血為主意下手處調水土是根基天地人三才也涌泉同旋璣百㑹上中下三部也大包與天樞地機陽蹻陽維并督脉主肩背腰腿在表之病隂蹻隂維并衝脉主心腸脇肋在裏之疑二陵二蹻二交似續而交五大兩間兩商兩井相依而列兩支足見取穴之法不在分寸先審自意次觀肉分或伸屈而得之或平直而安定在陽部筋骨之側陷下為真在陰分郄膕之間動脉相應取五穴用一穴而必端取三經使一經而可正頭部與肩部詳分督脉與任脉異定明摽與本論刺淺刺深之經住痛移疼取交相貫之逕豈不聞藏府病而求門海於募之㣲經絡滯而求原别交㑹之道更窮四根三絡依標本而刺無不痊但用八法五門分主客而針無不效八脉始終連八㑹本是紀綱十二經絡十二原是為樞要一日刺六十六穴之法方見幽㣲一時取十二經之原始知要妙原夫補瀉之法惟呼吸而應在手刺效之功要交正而識本經交經繆刺左有病而右畔取瀉絡逺針頭有病而脚上針巨刺與繆刺各異㣲針與妙刺相通觀部分而知經絡之虚實視沉浮而辨藏府之寒温且夫先針耀而慮針損次藏口内而欲針温目無外視手如握虎心無内慕如待貴人左手重而勿按欲令氣散右手輕而徐入不痛之因空心恐怯直立側而多暈背目沉陷坐卧平而没昏推於十干十變知孔穴之開闔論其五行五藏察日時之旺衰伏如强弩應若發機陽交陽别而定血暈陰蹻隂維而下胎衣痺厥偏枯迎隨俾經絡接續漏崩帶下温補使氣血依歸靜以乆留停鍼侯之必准取照海治喉中之閉塞端處用大鍾治心内之呆癡大抵疼痛實瀉痒麻虛補而愈居心下痞滿而并主心脹咽痛針大衝而必除脾痛胃疼瀉公孫而立愈留滿腹痛刺内闗脇痛刺飛虎觔攣骨痛而補魂門體熱勞嗽而瀉魄户頭風頭痛刺申脉與金門眼痒眼痛瀉光明與第五瀉陰郄止盜汗治小兒骨熱刺偏厯利小偏醫大人水蠱中風環跣而宜刺虚損天樞而可取由是午前卯後太陰生而疾温離左酉南月死朔而速冷循門弹弩留吸母而堅長爪下伸提疾呼子而嘘短動退空歇迎奪而㵼凉推内進搓隨濟而補暖慎之大患危疾色脉不順而莫針寒熱風陰飢飽醉勞而切忌望不補而晦不瀉弦不奪而朔不濟精其心而窮其法無丸艾而壞其肝正其理而求其原免投針而失其衛避灸久而和四肢四十有九禁刺處而徐六俞三十有二抑又聞高皇抱疾未差李氏刺巨闕而得甦太子暴死為厥越人針維㑹而復醒痛井曲池甄權刺臂痛而復射懸鍾環跳華佗刺躄足而立行秋夫針腰俞而鬼沈痾王纂針交俞而妖精立出刺肝俞與命門使瞽士視秋毫之末眇少陽與交别俾聾夫聽下蚋之􅀈嗟夫去聖逾逺此遂漸墜或不得意而散其學或衍其能而犯禁忌愚夫志淺難契於言至道淵深得之者有㡬偶求其言不敢示諸明達者焉庶㡬乎童蒙之心啓流注通𤣥指要賦引云望聞問切推明得病之原補瀉迎隨揭示用鍼之道予於學始迄於今雖常覃思以研精竟未鈎𤣥而索隱俄經傳之暇日承外舅之訓言云乃是分孰非兵擾其人也神無依而心無定或病之精必奪而氣必衰兼萬國亂而隔殊藥物絶商而那得設方有效厯市無求不若砭切立排疾勢乃以受教遂敏求師前後僅十七年一二無直箇輩後避屯於蔡邑方獲訣於李君斯余以鍼道疾也除疼痛於目前愈察病於指下信所謂伏如彉弩應若發機萬病可痊百發百中者也加之以好生之念素無竊利之心嘗謂予曰天寳不泄於非人聖道須傳於賢者㒒不自揆遂整有求之懇獲成無吝之誠授穴之秘者四十有三療疾而弗瘳者萬無一失遂銘諸心而著之髓務極其困而扶其危而後除疼痛迅若手拈破結聚渙如冰釋夫鍼也者果神矣哉然念兹穴而或亡借其聲律則易記輙裁八韻賦就一篇詎敢匿於己私為或傳於同志必欲治病莫如用鍼巧運神機之妙工開聖理之深外取砭針能蠲邪而扶正中含水火善囘陽而倒隂至夫絡别支殊經交錯綜或溝池谿谷以岐異或山海丘陵而一隙共斯流𣲖以難揆在條綱而有統理繁而昧縱補瀉以何公法揵而明自迎隨而得用且如行步難移大衝最竒人中除脊膂之强痛神門去心性之呆癡風傷項急始求於風府頭暈目眩要覔於風池耳閉須聽㑹而治也眼痛則合谷以推之胷結身黄取湧泉而即可腦昏目赤瀉攅竹以偏宜但見苦兩肘之拘攣仗曲池而平掃牙齒痛吕細堪治頭項强承漿可保太白宣道於氣衝陰陵開通於水道腹䐜而脹奪四庭以休遲筋轉而疼瀉承山而在早大抵脚腕痛崑崙解愈股膝疼陰市能醫癎發顛狂兮憑後谿而療理瘧生寒熱兮仗閒使以扶持期門罷胷滿血膨而可以勞宫退胃翻心痛以何疑稽夫大敦去七疝之偏疼王公謂此三里却五勞之羸瘦華佗言斯固知腕骨袪黄然骨瀉腎行間治膝腫目疾尺澤去肘疼筋緊目昏不見二間宜取鼻窒無聞迎香可引肩井除兩髀難任系竹療頭疼不忍咳𠻳寒痰列缺堪治眵黄䁾冷臨泣尤凖髖骨將腿痛以袪殘腎俞把腰疼而㵼盡以見越人治尸厥於維㑹隨手而甦文伯瀉死胎於陰交應針而殞聖人於是察麻與痛分實與虚實則自外而入也虛則自内而出於此故濟母而禆其不足奪子而平其有餘觀二十七之經絡明明可辨據四百四之疾證件件皆除故得夭枉都無躋斯民於壽域㡬㣲已判彰往古之𤣥書抑又聞心胷病求堂後之太陵肩背患責肘前之三里冷痺腎餘取足陽明之土連臍腹痛㵼足少陰之水脊間心後者針中渚而立痊脇下筋邊者刺陽陵而即止頭項痛擬後谿以安然腰脚疼在委中而已矣夫大用之士於此理苟明焉收袪邪之功而在乎撚指九鍼論黄帝曰余聞九鍼於夫子衆多不可勝數余推而論之以為一紀余試誦之子聽其理非則語余請受其道令可乆傳後世無患得其人乃傳非其人勿言岐伯稽首再拜曰請聽聖王之道帝曰用鍼之理必知血氣之所在左右上下陰陽表裏血氣多少行之逆順出入之㑹誅伐有過知解結知補虚㵼實上下氣門明通於四海審其所在寒熱淋露以輸異處審於調氣明於經隧左右支絡盡知其㑹寒與熱争能合而調之虚與實隣知決而通之左右不調犯而行之明於逆順乃可治之陰陽不竒故知起時審於本末察其寒熱知邪所在萬刺不殆知官九鍼刺道畢矣凡刺之要官鍼最妙九鍼之宜各有所為長短大小各有所施不得其用病弗能移疾淺針深内傷皮肉為癰病深針淺氣不瀉反為大膿病小鍼大瀉氣太甚必為後害病大鍼小大氣不瀉亦復為敗九針之宜一日鑱針法天大其頭而鋭其末令無得深入而陽氣泄故鑱鍼者取法於布鍼去末半寸卒鋭之長一寸六分以治熱身在頭也經曰病在皮膚無常處者取以鑱鍼二曰圓針法地謂人之所以應土者肉也為之治鍼必筩其身而圓其末令無得傷肉傷則氣竭故圓鍼者取法於絮鍼筩其身而卵其鋒長一寸六分治肉分間氣經曰病在分肉間取以圓針三曰鍉鍼法人謂人所以生成者血脉也為之治鍼必大其身而圓其末令可以按脉勿陷以致其氣令邪氣獨出故鍉鍼者取法於黍粟之統長三寸半以按脉取氣令邪出經曰病在脉氣少當補之者取以鍉鍼四曰鋒鍼法時謂四時八風之客於經絡中為瘤病者也為之治鍼必筩其身而鋒其末令可㵼熱出血發痼病竭故鋒針者取法於絮鍼筩身鋒末長一寸六分治癰熱出血經曰病在經絡為痼證者取以鋒鍼五曰鈹鍼法音謂冬夏之分分於子午隂陽别寒熱争兩氣相摶合為癰膿者也為之治鍼必令其末如劍鋒可以取大膿故鈹鍼者取法於劍鋒廣二寸半長四寸治大膿兩熱爭者經曰病有大膿者取以鈹鍼六曰圓利針法律謂調隂陽四時而合十二經脈虚邪客於經脈而為暴痺者也故圓利鍼者取法於􅈊微大其末反小其身令可深内長一寸六分以取暴氣經曰病痺氣暴發者取以圓利鍼七曰毫鍼法星謂人之七竅邪客於經而為痛痺舎於經絡者也為之治鍼令尖如蚊蝱喙靜以徐往微以久留正氣因之真邪俱往出鍼而養故毫鍼者取法於毫毛長三寸六分治寒熱痛痺在經絡經曰病痺氣痛而不去者取以毫針八曰長鍼法風謂人之股肱八節八正之虛風傷人内舎於骨解腰脊節腠理之間而為深痺者故長鍼者取法於綦鍼長七寸以取深邪遠痺經曰病在中者取以長鍼九曰大鍼法野謂人之節解皮膚間滛邪流溢於身如風水之狀而溜不能過於機闗大節者為之治鍼令尖如挺其鋒微員以取大氣之不能過於闗節者故大鍼者取法於鋒鍼其鋒微圓長四寸以取大氣不出闗節者經曰病為水腫不能過闗節取以大鍼諸病在五藏固居者取以鋒鍼瀉於井榮分輪取以四時取九鍼之數也刺節論凡刺有九變十二節九變者一曰輸刺謂刺諸經榮藏腧也二曰逺道刺謂病在上取之下刺腑腧也三曰經刺謂刺大經之結絡經分也四曰絡刺謂刺小絡之血脉也五曰分刺謂刺分肉之間也六曰大瀉刺謂刺大膿以鈹鍼也七曰毛刺謂刺浮痺皮膚也八曰巨刺謂左取右右取左也九曰焠刺謂燔鍼取痺也十二節者一曰偶刺以手直心若皆直痛所一刺前一刺後以治心痺刺此者旁鍼之也二曰報刺刺痛無常處也上下行者直内無拔鍼以左手隨病所按之乃出鍼復刺之也三曰恢刺直刺傍之舉之前後恢筋急以治筋痺四曰齊刺直入一傍入二以治寒氣小深者或曰三刺治痺氣小深者也五曰揚刺正内一傍内四而浮之以治寒氣之博大者也六曰直鍼刺引皮乃刺之以治寒氣之淺者也七曰輸刺直入直出稀發鍼而深之以治氣盛而熱者也八曰短刺以刺骨痺稍搖而深之致鍼骨所以上下摩骨也九曰浮刺傍入而浮之以治肌急而寒者也十曰陰刺左右率刺之以治寒厥取足踝後少陰也十一曰傍鍼刺直刺傍刺各一以治留痺乆居者也十二曰贊刺直入直出數發鍼而淺之出血是謂治癰腫也脈之所居深不見者刺之無令精出獨出其邪氣耳所謂三刺則穀氣出者先淺刺絶皮以出陽邪再鍼其陰邪出者少益深之絶皮至肌肉未入分肉間已入分肉間則穀氣出故刺法曰殆刺淺之以逐邪氣而來血氣復刺深之以致陰氣之邪最後刺極深之以下穀氣也三刺之外又有五刺之法以應五臟一曰半刺淺内而疾發鍼無鍼傷肉如拔毛狀以取皮氣此肺之應也二曰豹文刺左右前後鍼之中脉為故以取經絡之血此心之應也三曰闗刺直刺左右盡筋上以取筋痺慎無出血此肝之應也或曰淵刺一曰豈刺四曰合谷刺左右雞足鍼於分肉之間以取肌痺此脾之應也五曰輸刺直入直出深内之至骨以取骨痺此腎之應也既别刺法當順四時春夏秋冬各有所刺春氣在經脈宜取絡脈分肉所謂春刺散腧及與分理血出而止是也夏氣在經脈宜取盛經分腠所謂夏刺絡腧見血而止是也秋氣在皮膚宜取經腧所謂秋刺皮膚循理神變而止是也冬氣在骨髓宜取井榮所謂冬刺腧竅於分理是也至於長夏氣在肌肉亦有分是乃淺深之分也又有春刺井夏刺榮長夏刺腧秋刺經冬刺合者是亦四時之分在穴腧也陰井木陽井金播五行於四時以此為宜苟非其部分而刺之皆病之招也審此數者然後用刺庶乎適當無或失矣灸刺論内經謂形樂志苦病生於血脈其治宜灸刺特用鍼灸之大畧然九鍼本從南方來灸焫本從北方來謂南北者盛寒盛暑之域也人之血氣寒則脈凝泣熱則血淖澤皆為血脈之病故其治以灸刺為宜用刺之節已具在前用灸之理凡以温之而若病有因寒而得或陰證多寒或是風寒濕痺脚氣之病或是上實下虛厥逆之疾與夫勞傷癰疽及婦人血氣嬰孺疳疾之屬並可用灸亦有不可灸者近髓之穴陽證之病不可灸也凡有灸􅌊自有補瀉以火補者無吹其火須其自滅以火瀉者急吹其火而令其滅此灸之補瀉也在用灸者以意消息普濟方卷四百九
