赤茯芩去黒皮各半兩右為散每服一匙至半錢生薑荆芥湯調下兼治婦人産後頭痛旋覆花湯治風頭痛旋覆花菊花芎藭甘草各半兩皂莢酥炙去皮子一兩右𢷬篩每服三錢水一盞荆芥穗三莖茶末一錢同煎至七分去滓温服活人書葛根湯治太陽病頸項强無汗惡風為表實葛根一兩麻黄去節三分官桂芍藥甘草炙各半兩右剉散每服四錢薑五片大􅀥一枚水一盞半煎服芎藭散治風頭痛芎藭莎草根炒去毛各一兩藿香葉荆芥穗石膏碎研一兩半右為散每服二錢荆芥湯調下食後服石膏丸治風盛痰壅頭疼不止石膏煅通赤净地出火毒以器覆之一兩白附子炮一分半鉛霜研丹砂研龍腦研各一分右研如粉薄荷汁煑麪糊和丸如梧桐子大丹砂為衣毎服二丸好茶嚼下天香散専治久年頭風甚者方見首風類治頭痛不可忍方馬牙硝研半兩蘆薈研少許𤓰蔕三支為末大羊膽二枚臘月收右入膽内線縳暗處隂乾細研磁合盛左痛吹右鼻右痛吹左鼻兩度愈槐實散治風頭痛清頭目化風痰槐實炒八兩荆芥穗四兩甘草炙一兩防風去义三兩右為散毎服一錢茶酒任下食後服天南星散治風頭痛心膈煩熱壅滯頭面虚汗及上焦壅熱病治之天南星半夏各一兩二味為末水八升浸兩伏時逐日換水日足隂乾附子生末六錢烏頭生末七錢右同研勻大人半錢小兒一匙生葱薄荷茶調下桂枝葛根湯治太陽病頸項强汗出惡風為表虚桂枝芍藥甘草各七錢葛根一兩三錢右剉散每服四錢薑五片大棗一枚煎服皂莢散治風頭痛皂莢猪牙者七挺燒灰烏頭一枚炮裂去皮臍莎草根七枚生右為散毎服一錢臘茶調下併三兩服治風頭痛及偏頭痛吹鼻方萊菔子半兩生薑汁半合右相和研極細絞取汁入麝香少許滴鼻中搐入立定偏頭隨左右用之治一切風痰及頭疼不可忍方䔧蘆一兩雄黄一分研右為散研勻每服半錢至一錢溫水調服取吐一方只单搗䔧蘆取細末每搐少許作􅅉藥亦妙治鼻塞及頭疼風痰馬牙硝研細半兩地黄汁一合右相和於銅器中用慢火煎令乾便取出研細每挑少許入鼻搐上吐痰即差惡實散出篋中方治風頭及腦掣痛不可禁者摩膏主之又方用牛蒡莖葉𢷬取濃汁二升合無灰酒一升鹽花一匙頭慢火煎令稠成膏以摩頭痛處風毒散白芷亦主時行頭痛摩時須極力合作熱乃速效冬月無苗用根代之亦可治一切風虚常惡頭痛欲破者右用杏仁去皮尖乾暴為末水九升研濾作粥法緩火煎令如麻腐取起和羮粥内酒一匙服之每食前不限多少服七日後大汗出禁風冷猪雞大蒜酢一劑後諸風减差春夏恐酢少作服之秋九月後煎服之上清丹出經効濟世方治風痰頭痛不可忍者大天南星茴香等分右生用為末鹽醋煑糊為丸如梧桐子大食後薑湯下二粒又方南荆散出經効濟世方天南星一箇重一兩荆芥穗各等分右為末生薑汁煑糊為丸如梧桐子大食後薑湯下二十丸二聖散出御藥院方治風頭痛上焦壅滯心膈煩熱及治偏頭疼硝石細辛華隂者去苗葉各一分右研為細散毎服用半匙發時㗜入不痛邊鼻内或用紙撚子蘸藥絍鼻中如未已方搐痛邊鼻内菊花湯一名救生散治風頭痛方見本門風頭眩類石膏丸出聖濟總録治風毒上攻頭痛石膏研菊花防風去义葛根剉各二兩右為末煉蜜和丸如梧桐子大毎服二十丸加至三十丸食後卧熟水下芎藭散治風壅頭痛方見本門首風類荆芥散出聖濟總録治風邪客於陽經頭目重及頭面虚汗連腦痛荆芥穗半兩烏頭尖一分雄黄研一錢白殭蠶直者炒一分右為散毎服一錢荆芥茶調下毎服藥訖卧少時都梁丸一名止弹丸王定國因被風吹項背拘急頭目昏眩太陽并腦俱痛自山陽拏舟至泗州求醫楊吉老既診脈即與藥一彈丸使服王因疑詰經一時再作併進兩丸病若失去王甚喜問為何藥答云公如道得其中一味即𫝊此方王思索良久自川芎防風之類凡舉類種皆非但一味白芷耳王亦神之此藥初無名王曰是藥出自都梁今竟可名都梁丸也大治諸風眩暈婦人産前産後乍傷風邪頭目昏重及血氣頭痛服之令人目明凡沐浴後服一二粒甚佳暴乍暖神思不清頭目昏暈並宜服之出徳生堂右用香白芷大塊擇白者新潔者先以棕刷去塵土用沸湯泡洗四五遍為細末煉蜜和丸如彈子大每服一丸多用荆芥㸃臘茶細嚼下食後常服諸無所忌只乾嚼亦可一方如熱風冷酒調冷風熱酒調下一方細嚼川芎葱白茶清送下又方出經驗良方治頭風腦骨痛方用水浸皂莢春浸三日夏秋五日冬十日就水洗净新瓦焙乾為末毎用一匙茶調服又將少許吹入鼻中治卒中惡風頭痛方出千金方右搗生烏頭以大酢和塗故布上傅痛處須臾痛止日夜五六傅逐痛處傅之搗烏頭須去皮一方塗於頂上腦角太陽穴風府之上須臾痛止又方出千金方右用羊膽入元精石末隂乾水調一匙吹鼻中立止大蒜搐鼻法一名搐鼻法治頭風頭痛不可忍亦可搐小兒驚風出仁存方右用蒜七箇先燒地通紅掃出火將蒜去皮逐箇於紅地上磨成膏子地上却將殭蠶一兩去嘴足安在蒜上用碗覆定四邊勿透氣來日取出只用殭蠶為末先含水一口將藥末豆大搐於鼻内立效治風頭疼痛每欲天隂雨風先發者出聖惠方右用桂心一兩為末以油調如膏以𫝊頂上并額角一方用酒調下豉湯方出肘後方治頭風痛右用䜴湯洗頭避風即差枕頭方出聖惠方治風頭痛右用食茱萸葉細剉洒酒拌勻以絹袋盛之於甑中蒸熟承熱分兩包子更換枕之取差為度烏金煎出聖惠方治風頭痛語澁健忘黒豆一升净淘獨活一兩荆芥一兩石膏三兩黄芩一兩右細剉以水五大盞煎至一大盞入無灰酒一升攪濾去滓再煎如稀膏盛於瓷盒中每服食後温酒調下一茶匙吹鼻散治風頭痛及偏頭疼𤓰蔕末地龍末苦瓠末硝石末各一兩麝香末半錢右藥末都研令勻先含水滿口搐藥末半匙深入鼻中當取下惡物神效通頂散出濟生抜粹􅅉藥石膏川芎赤小豆𤓰蔕各一錢䔧蘆少許右為細末噙水搐之治風頭痛每欲天隂風先發者方及風毒上攻頭昏眼暈一名菊花散出聖惠方甘菊花芎藭各一兩右為細散每服不計時候以温酒調下二錢一方茶清調下又方出聖惠方右熟煑大豆内飰甕中作漿日日温洗頭良藿香散治風客於陽經頭重疼痛及偏頭湊一邊統額角痛方見本門頭痛類治卒中惡風頭疼用芥子為末酢和傅頭一周時神术散出華陀中藏經方治傷風頭痛聲重蒼术四兩川芎一兩藁本二兩甘草一兩炙右㕮咀每服二錢水一盞生薑三片同煎至七分通口服不拘時候消風散出保生回車論治風頭疼龍腦薄荷葉二兩去土令净荆芥穗二兩羌活半兩川芎半兩細辛去苗一分白术二兩剉石膏研細水飛日乾等分甘草半兩炙紫色右杵羅為末毎服二錢茶清或醇酒調下熱服日三服不計時候一切風寒或沭浴之後並宜服之治一切風攻頭目痛用天南星一箇掘地坑子火燒令赤安於坑中以醋一盞葢之不令透氣候冷取出為末每服一匙以酒調下重者半錢匕普濟方卷四十五
