body:
  text: 普濟方卷四十五明周王朱橚撰頭門偏正頭痛附論夫頭圓象天故居人身之上為諸陽之會頭痛之疾非止一端如痛引腦癲䧟至泥丸宫者是為真頭痛旦發夕死夕發旦死非藥物之可療今人之體氣虚弱者或為風寒之氣所侵邪正相搏伏留不散發為偏正頭疼其脈多浮緊者是也方川芎散治頭風偏正頭疼川芎七錢半細辛羌活槐花甘草香附子石膏已上各半兩荆芥穗薄荷葉菊花山茵陳藁本防風去蘆頭已上各一兩右為細末每服一錢食後茶調下一日三服忌發風物一方無藁本白芷丸白芷石斛乾薑各一兩細辛五味子厚朴肉桂防風茯苓甘草陳皮各一兩白术右為細末煉蜜為丸如梧桐子大毎服三十丸不飢不飽時清米湯飲下飛虎散専治偏正頭疼白附子香白芷荆芥穗石膏煅研川芎天麻薄荷葉防風已上各半兩蒼术一兩米泔浸兩頭尖一兩黒心者不用明白者佳右為細末每服一錢臨卧温茶清調服忌食熱千金散治偏正頭疼諸證川芎細辛防風甘菊花甘草石菖蒲青藤根全蝎細茶芽藁本右㕮咀每服五錢水一盞半葱白一根同煎至七分去滓食後臨卧服滓再煎一方如眼目疼痛加貫仲一兩王𤓰散専治偏正頭痛王𤓰燈心炒黄色木香川芎天麻麻黄去節防風去蘆頭細辛去苗甘草炙各半兩荆芥穗一兩半右為細末每服二三錢食後熱茶清調下川烏散治偏正頭痛傷寒冷打撲折碎破傷風頭面虚腫嘔逆惡心川烏草烏藿香葉川芎甘草白芷川蝎各半兩雄黄六分右為細末毎服一錢入好茶半錢百沸湯㸃趂熱服之如破傷風每服用大半錢以葱白三寸細嚼滚熱酒大半碗調服甚者如行五里再一服即愈通天散治偏正頭疼并夾腦風壅滯明目赤芍藥川芎黄連元胡索黄芩草烏頭當歸乳黄别研各等分右為細末毎服少許紙撚藥塞之鼻中淸空膏治偏正頭疼年深久不愈者兼療風濕熱頭痛上壅損目及腦痛不止羌活防風黄連炒各一兩柴胡七錢甘草一兩半炙川芎五錢黄芩刮取黄色剉碎一半酒炒細挺子者良右為細末每服二錢熱盞内入茶少許湯調如膏抹在口用少吃白湯送下臨卧如苦頭痛毎服可用細辛二錢如太隂脈緩有痰名曰痰厥頭痛去羌活防風川芎甘草加半夏一兩半如偏頭痛服之不愈减羌活防風川芎一半加柴胡一倍如發熱惡熱而渴此陽明頭痛只於白虎湯中加好香白芷徹清膏川芎二錢蔓荆子一錢細辛一分生甘草半錢薄荷葉三分藁本一錢甘草半錢炙右為細末食後茶清調下一錢或半錢二錢皆可芎黄湯治偏正頭疼外傷風邪鼻塞聲重清涕多􅅉者川芎半兩雄黄研水飛一錢細辛去苗葉一錢半荆芥穗三錢全蝎五枚炒大川烏一兩枚炮去皮臍切碎炒黄色右為細末每服半錢茶少許白湯㸃服不拘時候盞落湯治偏正頭疼頭風麻黄去根節七錢半人參去蘆五錢陳皮去白七錢甘草去皮八錢御米殻去膈瓤頂蒂三分蜜炒黄色右㕮咀每服五錢生薑七片煎至七分去滓温服食逺白龍丸治一切風偏正頭疼鼻塞腦悶大解傷寒及頭風遍身瘡癬手足頑麻川芎藁本細辛白芷甘草右等分為末每藥四兩入煅了石膏末一斤水搜為丸每一兩作八丸每服一丸食後薄荷茶嚼下風蛀牙痛一丸分作三服乾揩後用鹽湯潄之更用葱茶嚼下一丸一方有陳皮通頂散􅅉藥方見頭痛類梅煎散川烏去皮尖白附子石膏半夏南星各一兩右為細末每服二錢水一盞薄荷七葉白梅一箇煎至七分食後臨卧服或嘔吐加生薑十片昏暈入葱白茶調下半字散川烏一箇去皮尖草烏七箇去尖炮川芎半兩石膏一兩煅荆芥一兩右為細末每服半錢茶清調服忌食鯉魚石膏丸治偏正頭疼惡心痰逆石膏四兩川烏一兩生去皮硝石一兩半元精石二兩煅右為末薑糊丸如梧桐子大每服十五丸荆芥湯下食後服乳香散治偏正頭疼損眼目亦眼睛疼乳香盆硝青黛各半兩加腦子右研勻疼邊鼻内搐一匙真珠散治偏正頭風頭痛盆硝一錢半白滑石一兩乳香一錢半片腦少許右各研為細末再同研細每用一匙口噙水鼻内搐之神效散治偏正頭痛川芎一錢牡丹皮二錢去骨滑石二錢研米殻三錢蜜炒黄右㕮咀每服五錢薑一兩水一盞半煎至七分去滓臨卧温服抽刀一字散生烏頭去皮鹽水浸一月取出切片又以生薑汁浸一宿炒乾如急用只炮去皮尖不必浸也細辛蝉退川芎各半錢一處炒右為細末每服一匙茶清調下盞落散治偏正頭疼不可忍米殻去頂膈净二兩柴胡五錢桔梗五錢甘草五錢右㕮咀毎服五錢水一盞煎至七分入燈草十莖去滓食後服若是住疼痛加生薑五片依前煎及服藥先聞藥滓後服川附散川芎白附子牛蒡子荆芥各等分右為細末毎服二錢臘茶調服治偏正頭疼猪牙皂莢去皮弦香白芷白附子各等分右為末每服二錢食後臘茶調下右痛右側卧左痛左側卧兩邊皆痛仰卧又方硝石一兩研青黛一錢地龍皮一錢炒右為末搐鼻内一方名青龍散每用半匙以下含水滿口㗜藥鼻中即不痛右痛右㗜左痛左㗜兩邊痛左右俱㗜立止懸蔞散懸蔞一枚焙乾剉細赤爬兒七枚焙乾大力子四兩焙黄色牛蒡子是也右為細末毎服三錢食後温酒茶清任下忌動風熱之食石膏散治偏正頭痛石膏二兩芍藥一兩赤白皆可用川芎三錢右各生用為細末每服一錢茶清調下併喫三服神效麝香散一名太乙麝香湯治偏正頭疼夾腦風連眉項頸徹腮項疼痛者方見腦風類星烏石膏散南星草烏石膏煅已上各一兩右為細末每服一錢薑三片薄荷七葉鹽梅一箇水一盞煎至半盞如頭風注眼先將此藥熏服再温連白梅服之急風散治男子婦人偏正頭疼夾腦風太陽穴痛坐卧不安生川烏去皮臍石砂研飛各二兩生南星洗去皮四兩右為細末每用酒調塗痛處兼治小兒傷風鼻塞清涕酒調塗􅇟門上不可服龍香散治偏正頭痛不可忍地龍去土微炒黄末乳香半兩右為細末每用一錢摻在紙上作紙撚子燈上燒令煙出鼻内聞煙氣至靈散一名細辛散一名透頂散治偏正頭痛雄黄得深黄紅而雞冠色者佳臭黄勿用細辛真者去蘆洗右等分為末每用一匙左痛搐左右痛搐右鼻中口噙水搐之一方治偏頭疼名透闗散一方如左痛搐右鼻右痛搐左鼻名透頂散必勝散一名必效散治風寒流注陽經致偏正頭疼久年不愈此藥最有神效附子大者一隻生去皮臍切為四段以自然生薑汁一大盞浸一宿火炙乾再於薑汁内蘸再炙再蘸以盡為度高良薑與附子等分右為末每服二錢臘茶清調下食少時連進二服忌熱服㸃頭散一名芎香散治偏正頭痛川芎二兩生香附子去毛四兩炒右為細末每用一錢好茶淸調下常服可除根一方等分空心熱酒調下明目又治得婦人血風治偏正頭疼川芎盆硝各等分右為末搐入鼻中立效一方治偏正頭疼右用榖精草一兩為末以白麪和貼紙上安痛處乾即易之白殭蠶方治偏正頭疼夾腦風連兩太陽穴痛右用白殭蠶細研為末用葱茶調服一方治卒頭疼熱水調下大附丸一名葱附丸治氣虚壅上攻偏正頭疼不可忍欲倒卓者右用大附子一枚炮去皮臍為末葱汁糊為丸如菉豆大每服十丸至十五丸茶清下一法以川烏頭炮去皮尖為末韮葉自然汁和丸治風虚痰涎頭疼服如前法立效散出徳生堂方治偏正頭疼右用萆麻子不以多少去殻研爛紙花攤上貼左右太陽穴上即住疼一方研爛取汁於頭偏痛處塗之治偏正頭疼方出經驗良方右用朴硝萆薢等分為末搐鼻中立醒二芎餅子出濟生方治氣厥上盛下虚痰飲風寒伏留陽經偏正頭疼連腦顛吐逆惡心目瞑耳聾常服清目化風痰撫芎川芎乾薑炮藁本蒼耳炒南星炮去皮防風去蘆甘草各等分右為細末生薑汁浸蒸餅丸如雞頭子大揑作餅子曬乾每服五餅細嚼茶清任下不拘時候如聖餅子出永類鈴方治男子婦人氣厥上盛下虚痰飲風寒伏留陽經偏正頭疼連腦顛吐逆惡心目瞑耳聾常服頭目消風化痰暖胃氣天麻餅方見首風類太一散治偏正頭疼發散風壅上清頭目甚妙川芎石膏藜蘆甘草生各等分右為細末毎服少許鼻内搐之微􅅉為妙一字散出朱氏集驗方治偏正頭疼全蝎八箇防風一分殭蠶半兩天麻一兩川烏一箇炮南星一箇重半兩已上者研為末生薑自然汁和成一塊入朱砂一粒豆大乳香一粒豆大和南星用文武火煨令香熟切作薄片焙乾右同為末入麝香硃砂各半兩拌勻每服一匙食後葱酒茶調下救苦神白散出衞生寳鑑治男子婦人偏正頭疼眉骨疼兩太陽穴痛及熱上攻頭目赤不已項筋拘急耳作蟬鳴川芎甘草炙一錢甘松去土赤􅆚藥香白芷兩頭尖川烏頭去皮臍各六錢右為細末每服二錢温茶清調下服藥飲熱水半盞許川芎神效散出衞生寳鑑治風熱上攻偏正頭疼無問微甚久新川芎甘草一分川烏頭生去皮臍香白芷天南星麻黄去根已上各半兩右為細末毎服三錢水一盞生薑三片煎至七分投清茶半盞和滓温服宻室避風如人行至七里再服汗出為度其痛立愈通闗散出楊氏家藏方治偏正頭風頭旋頭痛鼻塞聲重四肢倦怠又治目赤腫痒昏澁羞明冷淚不止漸生翳膜弩肉遮障數年不愈者服之神驗山茵陳薄荷葉去土藁本去土木賊去節當歸洗焙川烏頭炮去皮臍尖蟬蛻去土七味各二兩川芎甘草炙香白芷羌活去蘆頭蓽撥已上五味各三兩石膏一兩半麻黄一兩去根節荆芥穗五兩防風五兩右件為細末每服一大錢臘茶調下食後雄黄散出楊氏家藏方治一切風虚氣攻偏正頭痛嘔吐涎沬服之神效草烏頭肥實心白者水浸二宿切作片慢火焙乾二兩乾薑一兩炮防風去蘆頭當歸洗焙天南星炮藁本去土肉桂去粗皮甘草炙雄黄不夾石通明者别研白殭蠶炒去絲嘴川芎已上九味各半兩右件為細末入雄黄研勻每服一錢先嚼煨葱三寸人生薑汁五七㸃茶清調下食後忌熱物少許茶調散出余居士選竒方治偏正頭風諸藥不愈者宜服此香白芷二兩半炒川芎一兩剉炒甘草一兩剉炒川烏頭半兩炮剉右四味搗羅為末每服二錢好茶少許薄荷三葉湯調如暴風頭疼可加葱白二寸細切和茶調下頭面風論方書所謂頭面風者即眩暈是也然眩暈既渉三因不可専為頭面風者如重傷風寒暑濕在三陽經皆能眩人頭重項强但風則有汗寒則掣痛暑則熱悶濕則重着吐逆眩倒屬外有所因喜怒憂思致臓氣不行鬱而生涎結為飲隨氣上厥伏留陽經亦使人眩暈嘔吐眉目疼痛眼不得開屬内所因或飲食饑飽甜膩所傷房勞過度下虚上實抜牙金瘡吐衂便利去血過多及婦人崩傷皆能眩暈眼花屋轉起則眩倒不屬内外因頭面風者由體虚之人陽脈為風所乗也諸陽之經皆上足於頭面若運動勞役陽氣發洩腠理開疎而受之風邪謂之首風其狀頭面多汗惡風頭痛又新沐頭未乾不可便卧使頭重身熱又夏露下卧露滴靣上亦作面風也方巴㦸天散出聖濟總録治頭面遊風巴㦸天去心二兩菊花擇芎藭乾薑炮防風去蘆石楠葉白术烏頭炮製去皮臍附子炮製去皮臍細辛去苖葉蜀椒去目并閉口炒出汗山芋人參去蘆桔梗去蘆炒秦芁去土栝蔞實切焙乾澤㵼甘草炙羌活去蘆天雄炮裂去皮臍山茱萸熟乾地黄焙各一兩右為末每服一錢半加至二錢食前温酒調下日再入頂散出千金方治頭面腫脹滿腦瘈偏枯發作有時狀如刀刺然疼失聲音面目變青山茱萸芎藭防風獨活各一兩細辛薯蕷莽草白术牛膝石南甘草各一兩烏頭通草菖蒲附子麻黄蜀椒桔梗各一兩六銖右治下篩酒服方寸匕日三亦治厥逆頭疼齒亦痛甘菊花丸出聖惠方治頭面風皮膚痺痒肢