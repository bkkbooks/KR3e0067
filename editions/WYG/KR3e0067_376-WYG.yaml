膏以摩心下冬夏可用一方但用丹砂雷丸亦佳龍膽湯治小兒諸癎寒熱吐痢不能乳哺龍膽草當歸切焙大黄剉炒黄芩去黒心括樓根甘草炙桂心去粗皮人參切麻黄去根節牡蠣熬赤石脂研芍藥各一兩右麄𢷬篩二三嵗兒每一錢匕水一盞棗一枚擘同煎至五分去滓分温二服更量兒大小加减祛風墜涎丸治小兒諸癎荆芥穗蜜陀僧白礬生各半兩半夏一兩湯洗硃砂一錢為衣右為細末水糊丸如黍米大硃砂為衣每服三十丸荆芥湯下乳後黄芩丸治小兒諸般癎疾口出白沫黄芩去黒心梔子仁犀角鎊各一兩麝香研一錢虎睛研一隻右為末研細煉蜜和丸如菉豆每服一嵗至二嵗兒三丸三嵗至五嵗兒五丸並米飲下日四服更量大小加减雄黄丸一名五癎丸治小兒五種癎牛癎即牛聲馬癎即馬嘶狗癎即狗吠羊癎即羊鳴雞癎則雞鳴五癎病者腑臓相引邪氣盈起寒厥不識人手顫口吐沫須臾如甦復作神效雄黄研水銀各二兩鉛熬成汁與水銀結作沙子三兩真珠末細研一兩丹砂研半兩右為細末煉蜜和丸如菉豆大每服五丸金銀薄荷湯下日再服錢氏名五色丸一方有金銀箔用猪心血為丸鐵精丸治初得癎雖時時發先服鉛丹丸後服此方鉛丹丸方見癎瘥復發門中百病鉛丹丸鐵精一兩研石膏甘草炙各二分當歸二分麝香半分右為末蜜丸如小豆大一服二丸日服三服鐵粉丹治諸癎胷膈不利鐵粉一兩研乾蟾一枚生薑汁浸炒炙焦黄為末乾蝎七箇為末硃砂半兩細研水飛牛黄一分研右都拌勻糯米飲和如黍米大每服三粒至五粒煎人參湯下五星丸治暗風癎疾取涎積倒地不知人事此方神效取下病積白丁香赤小豆各三十箇乳香一分輕粉半錢重巴豆一十四箇去油用右末滴水為丸分作十一丸每服一丸米半盞磨化下臨發時服取下積涎如青黒色是應如十年内此一服便瘥更無再作已上者半月日再一服永除次服硃砂鎮心藥全蝎散治證同煎本類八味扁金丹全蝎半兩白附子硃砂别研三錢白殭蠶二錢麝香一錢别研右為細末每服半錢荆芥湯入酒少許用調服神效丹治小兒諸癎服絶根極有神效大人亦可用猪牙皂角不蛀者四兩重粗剉用羯羊肝一箇切作片子用水三大碗煮數十沸去肝用皂角半夏揀大而陳者四兩重用薑汁浸三宿漉去曬乾每箇切作四片生硃末一兩同於鐵銚内同炒以半夏黄為度揀出半夏生硃末别研入藥天南星二兩重生用白礬明者二兩重畧枯存性黒牽牛二兩重炒紫色右為細末就用生薑汁打糊為丸如黍米大每服三十丸至四十丸生薑湯下釣藤飲治小兒發癎時時戴眼口中沫出此是癎疾並宜服之鈎藤二分剉人參黄芩去黒心蚱蟬一枚去趐足炒大黄剉炒各半兩牛黄三豆大别研湯成下右𢷬篩每服三錢匕以水一盞竹瀝三合煎取五七分去滓入牛黄少許温服若得微微溏利一兩度即止乳母忌蒜麺炙煿物白金散治諸癎潮發不省者好白殭蠶半兩揀治淨湯洗炒散黄色搗羅為細末用天竺黄一分細研真牛黄一錢麝香龍腦各半錢右件同拌勻每服半錢用生薑自然汁調放温灌之祛風散治胎癎多啼呌胡黄連半兩取末全蝎一分為末犀角一分屑取末天竺黄一分研麻黄一分去節為末右都研令勻細每服半錢研入麝香一字乳汁調下獨活湯治小兒發癎手足掣瘲十指戰掉舌本强腫獨活去蘆頭人參各半兩大黄剉炒二兩麻黄去節水煮去末二分右𢷬篩一二嵗兒每服半錢水半小盞煎至三分去滓温服連夜三四服隨兒大小加减大有神效治小兒癎以枯蟬燒灰服之即蟬蜕治小兒癎以馬御煮汁服萬病湯治小兒癎當歸細辛礬石燒甘草炙各一兩右以水四升煮取一升去滓内白蜜鷄子大分為五服當日令盡大黄湯治少小衆癎乳哺不時發温壯吐利驚掣胎寒腹痛一十五癎大黄四分芍藥當歸甘草炙各二分右以水三升煮取一升去滓一月兒服一杏核許日三服百日兒二杏核大小以此為率若發熱加麻黄二分去節有毒切之先煮數沸沫内諸藥若反折戴眼掣縮者加細辛四分若乳哺不消壯熱有實者增大黄令倍諸藥不爾等分大黄刀擘破勿令有碎末無其疾不須增益兒有大小强弱以意増减一方諸藥等分兒不痢者減大黄三分之一服湯令母抱之令小汗出病甚者令大汗出畢温粉粉之下痢者勿令出汗也日夜可四服兒夜啼有微熱口御乳若不安皆可服一方治下粗篩盛以韋囊欲合小劑水一升半煮三指撮藥内湯中更三沸令得六合絞出滓服之皆當取真新藥方可用也小兒氣弱惡藥不精非但無益乃更損兒可不慎乎此方屢試有驗王汝南方又戴眼中風身體常强增獨活二分大炒便是葛氏時後及元和經四味飲子但分兩不同及又有加减藥爾肘後與元和經方已收温壯門中茯苓釣藤湯治少小七日以後患癎鈎藤茯苓各二分甘草炙大黄煨各一分右水一升煮去三合為五服當大驗勝金丸治因驚過發疳或但知受風熱未洗除心臓積熱壅毒雖設湯散療治日久不退至熱過涎生膈上壅塞心胷氣亂交横變生癎疾其候發來一日數次變候轉頻吐瀉氣弱未曾補治腦麝蘆薈牛黄胡黄連末右等分研細熊膽汁為丸菉豆子大每服三丸米泔水研下療卒得癎用蚯蚓七箇自死者取置新竹筒内水一升並蚯蚓炭火内煨水沸消盡蚯蚓去滓澄清每發即飲之不過三兩度立瘥餘當令諸兒服之皆驗也聖星丹治諸癎皆宜服之曾經大效天南星揀四十九箇一般大者五月五日取活蝎四十九箇用瓦器盛以鹽泥固濟吊于淨室中至臘日取出揀天南星蝎螫着處有小竅子者其餘不用只將蝎螫天南星以酒浸一宿焙乾碾為細末次用好辰州硃砂五分細研水飛真牛黄麝香龍腦各一錢右一處研拌勻用生薑汁和如梧桐子大每服一粒至二粒煎人參薄荷湯化下神驗青芝散乳母服之青黛二錢别研藍實三兩白芝麻九兩生用右為末入青黛令勻每服三錢沸湯㸃服食後日二服常服甚效蚱蟬散治小兒初生百日内發癎蚱蟬煆赤芍藥各三分黄芩二分右為末每服水一小盞煎至五分去滓服吐涎散治時發驚風變成癎疾膩粉一兩猪牙皂角末一分右研令勻每服半錢生油一橡㪷水半盞同調勻分二服以吐為度保安丸治諸風癎久逺亦驗川烏生去皮尖二錢半五靈脂半兩右為末猪心血丸如桐子大每一丸薑汁泡湯調下星硃散定癎利痰南星濕紙炮香熟一兩硃砂一錢右為末用帶性猪心血為丸桐子大每服一丸煎防風湯調下雄硃散治諸癎口眼相引上視涎流手足抽掣頭項反張腰背强直雄黄硃砂等分右為末每一錢猪心血夾虀水調下治卒得癎鈎藤甘草炙右各二分水五合煮取二合服如小棗大日五夜三開關散治嬰孩小兒驚風癎疾喉閉牙關𦂳急蟾酥一小片鉛白霜一字右同研令極細用烏梅肉蘸藥入口兩角楷之良久便開如不開即用歸魂散一字許吹入鼻中方見驚癎忤是三候門中候􅅉噴即關開便下歸魂散一服如驚風癎再發須進睡紅散三服方見急慢驚風門中後下調胃氣藥看詳用之猪心湯治五癎顛癎及婦人心風血邪神效甘遂末一錢右用帶性猪心一箇取三管頭三條和甘遂末如血多只隨藥末得中和之將猪心批作兩片將所和藥入在内再合用綿縳定外以濕紙包慢火内煨熟不可過度取出去紙取甘遂研細次入硃砂末半錢和之分作四丸每服一丸以所煨猪心煎湯調下後别用猪心煎湯重者只守本方輕者加以蘇合香丸一粒准過半日不動又進一服如大便已下惡物即止後劑急與醒脾散以助胃氣治小兒癎疾右取牡鼠一枚取腹大貪食者以黄泥褁燒之細揀去骨皮取肉和五味汁作羮與食之勿令食着骨甚瘦人治小兒一百二十種驚癎寒熱腸痔蠱毒諸䘌惡瘡安胎去邪眀目右取蛇蜕皮熬用之治小兒卒得癎右用蜂房大者一枚水二斗煮令濃亦以浴小兒日三四佳效萬金牛黄丸治小兒諸癎驚惕掣瘲及中客忤牛黄細研熊膽人參細辛赤芍藥當歸微炒􅌝􅌣根防風去苗各半兩川大黄一兩微炒蚱蟬一枚去趐足炙蛇蜕皮五寸炙令黄色麝香一分研入甘草三分炙赤巴豆三十枚去皮心研如膏右為末入巴豆研勻煉蜜和杵丸如麻子大每初生一月至百日服一丸一嵗至三嵗服二丸四嵗至五嵗服三丸並用薄荷湯下快利為度犀角湯退癎鎮心神犀角屑一兩茯苓細剉麦門冬去心焙乾人參去蘆頭甘草炙黄芩各半兩右為散每服一錢以水八分入生地黄汁少許同煎至四分去滓温服治小兒癎右用鱉甲炙令黄搗為末取一錢乳服亦可蜜丸如菉豆大服之治小兒卒得癎疾右用白犬血一棗許含之又塗身上本草治小兒癎右用烏鴉一枚臘月者入瓦缾泥煨燒為炭飲下治小兒癎右用刮青竹茹三兩醋三升煎一升去滓服一合兼治小兒口噤體熱病一方只用竹瀝一合温與兒服之又方右用水銀小豆許安一甆盞中沉湯煮之一食久服時勿大仰兒頭恐入腦亦可以壓一切熱矣近世多不煮只以紙裂過服治小兒癎方右用將馬絆繩煮洗兒煎金飲一名代赭石散治小兒不拘隂陽證發癎者並治之右用以代赭石為細末水飛極細日乾每服半錢或一錢用真金煎湯調下連進三服見兒脚脛上有斑赤色即是邪氣已出兒當安無斑赤出者不可治此藥本出保生方用之無效自後加麝香金箔同研細酒調連進三服用之有效鐵漿治癎癲發熱鎮心並六畜癎古鏡煎湯治驚癎邪氣中諸毒用好墨磨汁服卒中客忤其狀與癎一同眼睛下視鐵屑煎湯治驚邪癲癎客忤消食逐冷氣法煉靈烏散治小兒胎風諸癎目睛邪視涎潮壅噎吐嚥不下口眼牽引身體强直烏鴉一隻臘月者良留毛去腸肚硃砂鐵粉蛇黄燒紅淬三次各半兩黒鉛半兩鎔成汁入水銀半兩在内炒成砂傾出待冷用黄丹二錢半已上除烏鴉外並研細入在烏鴉腹内用線縫合入甆罐内以鹽泥固濟日中曬乾用炭火三觔煆煙出為度次入下項藥天南星生薑汁浸三宿焙乾防風去蘆頭羗活去蘆頭川芎四味各一兩荆芥穗全蝎去毒微炒白殭蠶炒去絲嘴各半兩右件為細末與藥同研勻每服半錢麝香湯調下不拘時候普濟方卷三百七十六
