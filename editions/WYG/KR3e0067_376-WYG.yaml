body:
  text: 普濟方卷三百七十六明周王朱橚撰嬰孩一切癎門總論論曰少小所以有癎病及痙病者皆因臟氣不平故也新生即癎者是其五臟不收血氣不聚五脉不流骨怯不成也多不全育其一月四十日已上至朞嵗而癎者亦由乳養失理血氣不和風邪所中也病先身熱掣瘲驚啼呌喚而後發癎脉浮者為陽癎病在六腑外在肌膚猶易治也病先身冷不驚掣不啼呼而病發時脉沉者為隂癎病在五臟骨髓極難治也病發身軟時醒者謂之癎也身强直反張如角弓不時醒者謂之痙也諸反張大人脊下容側手小兒容三指者不可復治也凡脉浮之與脉沉以判其病之隂陽表裏耳其浮沉復有大小滑澁虚實遲速諸證各依脉判為治神農本草經説小兒驚癎有一百二十種其證候微異於常便有是癎候也初出時血脉不歛五臟未成稍將養失宜即為病也時不成人其經變蒸之後其餘病證並寛惟中風最暴卒也小兒四肢不好驚掣氣息小異欲作癎及變蒸者日滿不解者並宜與龍膽湯凡小兒之癎有三種有風癎有驚癎有食癎凡是先寒後熱發者皆是癎也驚癎皆按圗灸之風癎當與猪心湯食癎當下乃俞紫丸佳小兒所得風癎者縁衣暖汗出風因入也風癎者初得之時先屈指如數乃發作者此風癎也驚癎者起於驚怖人啼乃發作者此驚癎也驚癎微者急治之勿復更驚之或自止也其先不哺乳吐而變熱後發癎者此食癎早下則瘥四味紫丸逐癖飲最良去病速而不虚人赤丸即癖結脹滿中八味紫霜丸差駝病重者當用之凡小兒不能乳哺當與紫丸下之小兒始生生氣尚盛但有微惡則須下之必無所損及其初𤼵時病尚未􅀷若不時下則成大疾疾成則難治矣凡下四味紫丸最善雖下不損人足以去疾若四味紫丸不得下者當以赤丸下之赤丸不下者當倍之若已下而有餘熱不盡當按方作龍膽湯稍服之并摩赤膏風癎亦當下之然當以猪心湯下之驚癎但按圗灸之及摩生膏不可大下也何者驚癎心氣不定一作足下之内虚益令甚爾驚癎甚者特為難治故養小兒常慎驚勿令聞大聲抱持之間當安徐勿令驚怖又天雷時當塞兒耳作餘細聲以亂之也凡養小兒皆微驚以長其血脉但不欲大驚大驚乃灸驚脉若五六十日灸者驚復更甚生百日後灸驚脉乃善兒有熱不欲哺乳卧不安又數驚此癎之初也服紫丸使愈不愈復與之兒眠時小驚者一月輙一以紫丸下之减其盛氣令兒不病癎也兒立夏後有病治之慎勿妄灸不欲吐下但以除熱湯浴之除熱散粉之除熱赤膏摩之又以膏􅂗臍中令兒在凉處勿禁氷漿常以新水飲之小兒衣甚薄則腹中乳食不消不消則大便皆醋臭此欲為癖之漸也便將紫丸以微消之服法先從少起常令大便稀後便漸减之不醋臭乃止藥也凡小兒冬月下無所畏夏月下難瘥然有病者不可不下下後腹中當小脹滿故節乳哺數日不可妄下又乳哺小兒當令多少有常劑兒漸大當稍稍増之若减少者此腹中已有小不調也便微服藥勿復哺之但當與乳甚者十許日微者五六日止哺自當如常若都不肯食哺而但欲乳者此是有癖為疾重要當下之不可不下不下則致寒熱或吐而發癎或更致下痢此皆病重不早下之所為也此即難治矣但先治其輕時不耗損而病可愈凡小兒屎黄而臭者此腹中有伏熱宜微將服龍膽湯若白而醋臭者此挾宿寒不消也當服紫丸微者少與藥令内消甚者小増藥令小下皆復節乳哺數日令胃氣平和若不節乳哺則病易復復下之則傷其胃氣令復脹滿再三下之尚可過則傷矣凡小兒有癖其脉大必發癎此為食癎下之便愈當審候掌中與三指脉不可令起而不時下致於發癎則難療矣若早下之此脉終不起也脉在掌中尚可早療若至指則病増矣凡小兒腹中有疾生則身寒熱寒熱則血脉動動則心不定心不定則易驚癎發速也候癎法夫癎小兒之惡病也或有不及求醫而致困也然氣發於内必先有候常宜審察其精神而採其候也手白肉魚際脉黒者是癎候魚際赤者熱脉青大者寒脉青細者為平也鼻口乾燥大小便不利是癎候眼不明上視喜陽是癎候耳後完骨上有絡盛卧不靜是癎候青脉刺之令血出也鼻口青時小驚是癎候目閉青時小驚是癎候身熱頭常汗出是癎候身熱吐哯而喘是癎候身熱目直視是癎候喜欠目上視是癎候身熱目視不精是癎候目瞳子卒大黒於常是癎候卧惕惕然而驚手足振揺是癎候卧夢笑手足動揺是癎侯意氣下而妄怒是癎候咽乳不利是癎候身熱小便難是癎候吐痢不止厥痛時起是癎候弄舌搖頭是癎候小兒髮逆上啼笑面暗色不變是癎候已上諸候二十餘條皆癎之初也見其候便爪其陽脉所應灸𤓰之皆重手令兒驟及足絶脉亦依方與湯瞳子直視動轉腹滿㵼下血身熱口噤不食乳角弓反張强汗出發熱嗜卧不悟手足掣瘲喜驚凡八條癎之極者也如有此非復湯爪所能救便當時灸之若病家始發便來請師師可診候當審其發作次序治之以其節度首尾取瘥也病家已經無次序不能制病病又變異其本候後師更不知其前症虚實祗據後症求治亦不得瘥也要須盡問察之道前師診治源流當倣其意以為治乃無逆耳前師處湯本應數劑乃瘥而病家服一兩劑未效便謂不驗矣已後更問他師不尋前人後人不知次序而更為治盡反前師此治之弊也或前已下之後又當以和平之劑接補之或有症應下而前未下者或前治寒温失度後人調治是為治敗病皆須的確然後無誤不依次第及不審察必重弊也錢氏云廣親太尉七嵗潮熱數日欲愈錢謂其父三大王曰七使潮熱將安八使預防驚搐王怒曰但使七使愈勿言八使病錢曰八使過來日午間即無苦也次日午前果作急搐召錢治之三日愈盖預見其目直視而顋赤必肝心俱熱更坐石枕子乃欲冷此熱甚也肌膚素肥盛脉又急促故必驚搐所言午時者自寅至午皆心肝所用事時治之瀉心肝補腎自安矣東都王氏子吐瀉諸醫用藥下之至虚變慢驚其候睡露睛手足瘈瘲而身冷錢曰此慢驚也與括蒌湯其子胃氣實即目開而身温王疑其子不大小便令諸醫以藥利之醫用王不留散等數服不利而身復冷令錢氏利小便錢曰不當利小便利之必身冷一二日已身冷矣因抱出錢曰不能食而胃中虚若利大小便即死久則脾腎俱虚當身冷而目閉幸胎氣實而難衰也錢用益廣散使君子丸四服令微飲食至日午果能食所以然者謂利大小便脾胃虚寒當補脾不可别攻也後又不語醫作失音治之錢曰既失音豈開目而能飲食又牙不噤而口不𦂳也諸醫不能曉錢以地黄補腎所以然者用清藥利小便致脾腎俱虚今脾已實腎尚虚故補腎必安治之半月而能言一月而痊也吐虚者慢驚風瀉虚者慢脾風吐瀉虚者曰隂癎壯熱搐掣曰陽癎慢驚風眼偏喜開慢脾風眼偏喜閉隂癎眼半開半閉陽癎半鮮半青急驚風十生一死慢驚風千死一生風癎者因將養失度血氣不和或厚衣汗出腠理開舒風邪入名之曰風癎其病在肝肝主風驗其證目青面紅發搐是也驅風膏大青膏琥珀散鎮驚藥有熱四順飲退後與利驚丸下涎驚癎者因血氣盛實臟腑生熱或驚怖大啼精神傷動外邪所入名其症曰驚癎其病在心心主驚驗其證忽然呌聲發搐是也琥珀散紅龍散鎮心丸有熱四順飲利驚丸下之食癎者因乳食過多傷動脾與胃或食停中脘内生痰熱氣逆上衝名其症曰食癎其病在脾脾納食驗其証愛吐氣即發搐是也此病或大便酸臭紫霜丸下之以驚藥其食癎遇傷飽復作宜下三證大同小異並属陽也各目睛鮮斜手足潮搐或作猪聲發過即瘥皆十生一死也所以陽癎眼半鮮半青者是肝有風熱飛仙論云目鮮則肝有風錢氏云目青者肝有熱大抵陽癎欲發先眼目青鮮其間有因驚食交互致熱盛則生風風属於肝肝有風則旺於心火心火盛則鎔動肺金生痰壅或聞大聲或大驚而發搐者有熱極雖不聞聲及驚亦自發搐葢風熱盛故也慢驚者因久吐而胃氣先虚胃與肺母子也母虚亦令子衰二經虚則生黏痰者脾胃所出也痰則凝滯在於咽喉如牽鋸之聲時復瘈瘲是也所以慢驚風偏喜開者胃虚生風通真子云風能動能開慢脾者因久瀉而脾氣先虚脾與肺子母也母虚亦令子衰二經俱虚則生頑涎者脾肺所出也涎則溢流於咽喉如水雞之聲時復瘈瘲是也所謂慢脾之風眼偏喜開者驚氣入脾通真子云氣能靜能閉隂癎吐瀉之久脾胃俱虚脾與胃表裏也二經俱虚則生痰頑涎相纒如膠塞於咽喉故聲鳴而喘時復手足顫揺或如角弓之反張是也所以隂癎眼半開半閉者是風氣並行脾胃三證似同而異並属隂也各目睛昏暈背脊强直或作鴉聲發頻難差皆十死一生也凡慢有汗多死仲景云不得有汗葢隂證無汗有汗者亡陽古人説慢驚瘈瘲是似搐不搐其間亦有慢驚如急搐者是死期之速也有嗽變驚者詳審治之身熱脉浮精神恍惚或吐或瀉不思飲食發搐即是半陽半隂合病身凉脉沉精神倦怠不吐不瀉又能乳食發搐者亦是半隂半陽合病正是傷寒半是表半是裏之義也隂癎瘥後復發多死設有安者必須眼目少精神語言不正或口有痰涎流溢頥下或手足偏廢陽癎瘥後復多涎縁驚風有三種所作忽發癎荏苒失治風涎流滯心包絡間或因驚而再發或感風而發或傷食而發過如舊或進退不定潮作有時也夫癲狂癎痙始本於心心者精神之舍智意之源常欲安靜無諸觸犯疾何及焉若邪積於内熱摶於外脾胃因虚不能尅制腎水上刑於心火隂陽併㞐遂致精神失守恍惚多驚癲狂癎痙之疾所由而生葢重隂則癲重陽則狂癎則身軟而醒痙則身强而昏癲之來也發則異常或歌或哭乍喜乍悲狂之證也妄言不食而歌棄衣而走癎者發則卧地嚼舌吐沫或作猪聲痙則腰背仰折狀如反弓痰壅而厥良由風涎流滯心絡故也已而失治損傷於心心傷則神去神去則死也設有安者則語澁少神或緩弱為廢人小兒驚啼睡中四肢掣動變蒸未解慎勿針灸爪之也動其百脉因驚成癎也唯隂癎噤痙可針灸之爾凡小兒如有小疾早為尋醫勿致稽遲皆能害命凡有數疾灸而不治盡變為癎壯熱灸不治為癎夾驚傷不瘥為癎痰飲不瘥為癎洞泄不止為癎咳𠻳不止為癎夜啼不瘥為癎客忤發不止為癎霍亂吐瀉不止為癎哯乳不瘥為癎臍瘡不乾常有黄水出灸則為癎已上病狀皆能變為癎疾也小兒驚不醫者成風風不醫者成癎癎不醫者成痙既成痙則難以用藥癎亦分數種有驚風癎因驚即發有乳風癎食乳衝肺即發發即吐乳不食有肝風癎四季多𤼵𤼵即寒熱口噤有肺風癎冬月多發發即口噤面黒大抵癎病不能害命只邪氣在心頭重嘔吐常服鎮心湯藥如覺發時一邊手足動當吐吐後覺麻癖不能舉手兼説話亦不分曉牙齒皆黒此風涎及邪氣閉塞竅内也凡諸癎正發手足掣縮慎勿捉持之致令曲戾不隨也凡癎病有數般不可盡述且説五臟表裏受風形狀初受驚癎目反視踞坐舉頭唇皮青色面青黄此乃病𫝊於肝若唇黒眼慢旬日死風癎口吐白沫已𫝊受心臟放齒咬人或即口頰手指青黒似醒似􅄰若指黒色面青黒乃五日内死臍風發癎面虚腫搐搦手足搖動兩臉白病已𫝊肺面如土色七日而死搐搦或夢中啼哭下齒咬人不似慢驚狀若眉帶黒色病𫝊入腎腎已絶旬日死脾癎之狀喉如鋸鳴多睡不進乳口乾脣赤眼白多此病旦夕而死肝癎之為病青目反視手足搖心癎之為病面赤心下有熱短氣息微數脾癎之為病面黄腹大喜痢肺癎之為病面目白口沫出腎癎之為病面黒目正直視不搖如尸狀膈癎之為病目反四肢不舉腸癎之為病張口搖頭馬鳴欲反折牛癎之為病目正直視腹脹羊癎之為病喜揚目吐舌猪癎之為病喜吐沫犬癎之為病手屈拳攣鷄癎之為病搖頭反折喜驚自搖又有烏癎唇口撮聚目手俱搖蛇癎身軟頭舉吐舌視人牛癎即牛聲馬癎即馬嘶狗癎即犬吠羊癎即羊鳴雞癎即雞鳴五癎病者腑臟相引邪氣盈起寒厥口吐沫須臾如甦復作神效雄黄丸方與錢氏五色丸同但􅀶濟水銀用八分耳𤣥中記曰天下有女鳥一名姑獲又名鈎鬼星也喜以隂雨夜過飛鳴徘徊人村里呼得來也是鳥純雌無雄不産喜落毛羽於中庭置入兒衣中便使兒作癎必死即化為其鬼也是以小兒生至十嵗衣裳不可露也八月尤忌之癎有八候前曰仆後曰僵晝曰陽夜曰隂罵人曰癲笑人曰邪一日十數次發曰癎小年有此患曰呆葢陽證不可用温隂證不可用寒風癎則先為之散風驚癎則先為之利驚食癎則先為之消積總以定癎等劑主之若臟若腑一隂一陽是固不可無别大槩血滯心竅邪氣在心積驚成癎通行心經調平心血順氣豁痰又其要也若見小兒有熱有痰不欲乳哺眠睡不安常驚悸此皆發癎之漸也即以紫霜丸導之時間量與紫霜丸减其盛氣則無驚癎風癎内瘹之患癎瘖不能言者南星炮為末雄猪膽汁調和少許啖之輙效錢氏五癎丸并南星散以菖蒲湯調下甘遂猪心湯以和蘇合香丸皆治癎之要藥也一切癎方返䰟丹和濟方治小兒諸風癲癎潮熱發瘈瘲口眼相引項背强直牙關𦂳急目睛上視及諸病久虚變生虚風多睡昏困荏苒不解速宜服之當歸酒浸切焙微炒烏犀鎊各二兩乾薑焙枳殻去穰麥炒白术酒浸一宿微炒人參去蘆木香不見火茯苓去皮丁香不見火厚朴去皮薑汁炙熟藁本去土天竺黄細研桑螵蛸微炒敗龜酒醋塗炙黄蔓荆子去白何首烏泔浸一宿煮過火焙白芷虎骨酒浸炙令黄晩蠶蛾微炒縮砂仁各三分麻黄去根節麝香研羗活去蘆羚羊角鎊各一兩半夏湯洗七次薑汁浸三宿焙乾炒黄川烏頭燒令通紅勿令烟盡入地坑以新土圍食頃白花蛇酒浸一宿炙令熟去皮骨用肉防風去蘆白殭蠶去絲嘴微炒㯽榔白附子微炮天南星湯洗生薑自然汁煮軟切焙炒黄藿香葉去土阿膠碎炒萆薢微炙肉桂去麄皮細辛去苗陳皮去穰微炒槐膠烏蛇酒浸一宿炙熟取肉用沉香不見火乾蝎微炙獨活去苗天麻酒浸切焙各一兩硃砂細研水飛石斛去根雄黄細研水飛肉豆䓻去殻微炒牛黄别研龍腦别研水銀附子水浸後炮去皮臍蟬殻去土微炒川芎各半兩烏鴉一箇去嘴趐足膩粉别研一分狐肝三具臘月採取同烏鴉一箇入新瓮内以瓦盆葢頭泥固濟炭火一觔燒令通赤烟盡出候冷研細用硫黄研細用甆盞盛慢火養成汁入水銀急炒如青泥成沙再研半兩金箔二十片為衣右如法修事搗研令細煉白蜜合和入酥再搗三五千下丸如梧桐子大每一嵗兒一丸温薄荷自然汁化下不計時候丹砂丸一名虎睛丸聖惠方治小兒一嵗至十嵗發癎成癲發動無時口吐白沫遺失大小便丹砂研天麻露蜂房微炙麻黄去節黄芩去黒心釣藤各半兩甘草炙剉防葵炒大黄炒蚱蟬去頭足炙龍齒研山梔子各一兩銀箔十片細研虎睛研一對羗活去蘆頭柴胡去苗白鮮皮升麻雷丸炒沙參各三分石膏研一兩一分蛇蜕皮炙黄麝香研細辛去苗葉牛黄研各一分右搗研為末煉蜜為丸如菉豆大每服一嵗兒三丸二嵗至三嵗五丸四嵗至五嵗七丸六嵗至十嵗十丸並用米飲下空心午間臨卧各一服一方無細辛大金箔丸㓜㓜新書治一切風及大人小兒諸癎解心胷壅熱消痰墜涎無時發動吐涎沫背强直神志昏憒金銀箔各一百片辰砂一兩研牛黄研生犀末丁香沉香真珠末木香腦麝各一分琥珀末硼砂烏蛇肉酒浸炙去皮骨天麻酒炙浸雄黄研蝎稍白殭蠶附子炮去皮臍天南星炮防風白附子甘草炙已上各一分香墨半兩燒右為細末入研藥一處勻合將金銀箔入水銀三分同研如泥再同研令勻煉蜜為丸如菉豆大每服大人五丸用薄荷酒下小兒三丸薄荷湯化下天烏散一名狐肝散㓜㓜新書治大人小人一切風及久癎患病臘月烏鵶一隻去毛羽嘴爪腸胃臘月野狐肝一具同前烏鵶入瓶子内固齊燒為灰麝香研天麻犀角屑各半兩乾蝎白殭蠶蟬殻牛黄研更炙益妙荆芥取穗藿香天南星去心白附子膩粉研桑螵蛸須用臘月採取桑上者佳各一兩烏蛇二兩酒浸炙去皮骨右為末每服半錢煎荆芥湯或豆淋酒調下空心小兒用薄荷湯調下奪魂散永類鈐方定癎良方白殭蠶去絲炒令黄色半兩白附子炮蛇含石燒紅醋淬七八次研碎各一分生銀生金白茯苓牛黄如無以膽製倍加用之烏稍蛇頭七八寸許酒煮天麻各一錢天南星秤末一分生薑汁浸一宿用腦子半夏末二錢重薑汁浸一宿各焙赤脚蜈蚣一條酒浸炙令焦犀角傍二錢右為末蒸棗肉為丸如麻子大每服十丸至十五丸二十丸煎金銀薄荷湯下硃砂為衣一方加代赭石一分醋淬如欲利痰加巴霜煮枳殻一分議曰癎之為疾又是一種證候若言驚風所𫝊古人有謂食風驚三癎若言不干驚風所𫝊古云驚風三發便為癎且癎為疾痰熱壅盛𫝊入經絡塞於心肺是致關竅不通故作癎疾發作有如驚風弔或因驚而生痰多或因熱而作風盛大小便不利上下氣不通心神悶氣亂若死而復生生而復死沉沉黙黙無由甦省忽爾氣透關竅漸得開通魂魄稍得安定向後心被觸惱氣不宣利發作如前是知癎之為疾乃由虚痰冷涎頑結於胷臆驚風併聚於關膈常無精神心志不寧即存恍惚療理不専藥服不投必自致害何足怪者即奪魂散方經效袐𫝊修合如法活人神驗豈非至寳之謂也麻黄五癎湯㓜㓜新書主療百日及過百日兒癎連發不醒及胎中帶風體冷面青反張宜服麻