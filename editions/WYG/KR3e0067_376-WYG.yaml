安五臓定心氣鐵精黄芩芍藥芫花炒人參甘遂炙茯神各三分硝石牛黄各二分蛇蜕皮二寸甘草一分炙右為末蜜為丸小豆大一服三丸日再不止加之取微利為度至寳丹治諸癎急驚卒中客忤不得睡煩躁風涎搐搦及傷寒狂語伏熱嘔吐並皆服之安息香一兩半為末無灰酒飛過濾出沙石約取一兩慢成膏入藥内用琥珀研硃砂雄黄各一兩研水飛金箔五十片銀箔五十片龍腦麝香各六分牛黄半兩各研生烏犀角生玳瑁屑右生犀玳瑁𢷬羅為細末研入餘藥合勻將安息香以重湯凝成膏搜為劑如乾即入少熟蜜盛不津器中旋丸如梧桐子大一嵗服二丸人參湯化下大小以意加减治大人中風語中惡氣絶中諸物毒中熱暗風産後血暈死胎不下並用童子小便一合生薑自然汁三五滴同温過化下五丸立效龍膽湯治嬰兒出腹血脉盛實寒熱温壯四肢驚掣發熱大吐嘔者及雖能哺食中實不消壯熱變蒸中客人鬼氣并諸驚癎方悉主之十嵗以下小兒皆得服之但新生嬰兒及漸長者其服藥多寡俱依後例若必知客忤及有鬼氣者可加人參當歸各如龍膽多少也一百日兒加三銖三百日兒加六銖一嵗兒加半兩餘藥皆凖耳龍膽釣藤皮柴胡黄芩桔梗芍藥茯苓一作茯神甘草各六銖􅎙蜋二枚大黄右㕮咀以水一升煮取五合為劑服之如後節度兒有虚實兒虚宜减藥與水也小兒生一日至七日分一合為三服兒生八日至十五日分合半為三服兒生十六日至二十日分二合為三服兒生二十日至三十日分三合為三服兒生三十日至四十日盡以五合為三服皆得下即止勿再服之神明還命牛黄丸治小兒癎牛黄二大豆許白石脂龍骨各一兩半桂心寒水石大黄各二兩半牡蠣􅌝􅌣各二兩石膏碎硝石各三兩右為末水二升三指撮末煮五合為三服日三牛黄為末臨時入地龍散治諸癎發歇無時乾地龍半兩焙虎睛一對炙人參一分金銀箔二十片天竺黄硃砂代赭石煆醋碎鐵粉各一分雄黄一錢半輕粉半錢一用鉛霜右為末每服半錢紫蘇湯調或温水調下白术湯治少小腹中有熱有寒在胷上逆吐腹雷鳴而滿驚啼甚即發癎掣縮休作有時白术當歸各一兩厚朴炙半夏洗甘草炙人參川芎生薑各二兩枳實三箇炙食茱莄二合右以水七升煮取二升温服三合日三夜二合羗活膏治三十六種驚風三發成癎羗活人參桂心防風各半錢蝎硃砂硫黄茯苓木香各一錢腦麝各少許右為末煉蜜為膏入金銀箔各十片衮研酌量加减以薄荷湯下扁金丹治小兒胎風諸癎手足瘲瘈目睛上視頸項𦂳急强直或搖頭弄舌牙關𦂳急口吐痰沫反拗多時精神不寧睡卧多驚吐痢生風昏塞如醉白花蛇去骨酒浸焙乾秤防風去蘆頭焙乾秤蜈蚣要赤者不去頭全用炙乳香研極細各半兩蝎要扁瘦全各半兩硃砂研極細各一兩天南星火燒存性大草烏頭火燒存性一兩半麝香一錢細研牛黄半錢細研右為細末然後與研者藥一處再研勻用水浸炊餅為丸如桐子大揑扁每服三餅子荆芥湯化如稀糊抹入口中漸漸嚥下候一時辰更進一服神效一方無牛黄防風天南星煎凡胎癎病潮發遲速天南星一兩白附子一兩白花蛇一兩酒浸去皮骨炙令黄乾蝎半兩炒天麻半兩已上搗羅為細末用好酒兩大盞攪令勻於慢火上熬不住手攪以酒盡為度次入好硃砂半兩水飛膩粉一分牛黄半錢麝香半錢龍腦半錢為末右都入膏子内一處和看硬軟成膏如皂角子大每服一粒竹瀝化下不計時候治五癎露蜂房一兩焙先洗石菖蒲桂心逺志去心人參各半兩牛黄杏仁去皮硃砂各一分麝香一錢研右為末薄荷湯調下三嵗以下半錢大小以意加减人參丸治小兒諸般驚惕瘲瘈及中客忤人參半兩甘草炙三分牛黄細辛去苗各半兩蚱蟬去趐足炙七枚大黄温紙褁煨半兩芍藥當歸切焙半兩蛇蜕炙三寸括樓根防風去义各半兩麝香巴豆去皮心研三十粒右除巴豆牛黄麝香外搗羅為末研勻煉蜜為丸如麻子大初生至百日兒每服二丸一嵗至五嵗兒每服三丸五丸並用薄荷湯下若兒驚惕及客忤温壯發熱腹滿丸數服之以快利為度更量兒大小加减治小兒癎茯苓牛黄另細研入龍齒各二分釣藤芍藥黄芩各一分甘草半分炙蚱蟬二箇炙羽足去竹瀝一合煮湯成下之右以東流水二斗銀器中煮金銀各十兩分五升汁煎藥取一升半間乳細細與服此治未出月兒若大者加少藥蛜􅖉丸治四十八候癎全蝎半夏京墨煆各半錢辰砂鐵粉人參真珠末各一錢好茶半錢春柳芽半錢乾者或一錢右為末酒糊丸如菜子大每服七粒至十粒薄荷湯下一日三服一月見效人參茯神湯治諸癎心神不定人參茯神剉各一兩白鮮皮半兩羚羊角末甘草炙天竹黄各一分酸棗仁天門冬去心各半兩右為細末每服一錢水八分入生薑薄荷各少許煎四分去滓温服麻黄湯治小兒六七嵗發癎壯熱麻黄去根一兩一分釣藤皮一兩芍藥杏仁湯浸去皮尖雙仁麵炒桂心去皮當歸焙切秦芁去苗土各三分石膏一兩研半右搗篩每一錢水一盞煎至五分去滓分温二服日三服隨兒大小加减定癎丸治小兒五癎赤蜈蚣一箇去頭足酒浸炙蝎稍白附子生烏蛇肉酒浸天南星末圎白半夏末用薑汁浸一宿各一分熊膽白礬新瓦煨枯各半分右為末稀麵糊丸桐子大硃砂為衣每服一丸薄荷湯調下龍齒散療小兒癎疾茯苓龍齒各二分釣藤芍藥黄芩各一分甘草半分蚱蟬二枚去趐足炙牛黄二大豆許右搗研細末入竹瀝一合研候湯欲成下以東流水二斗銀器煮金銀各十兩取五升入藥煎取一升半間乳細細與服此療未出月小兒大即加藥蛇蜕湯治小兒百日病風癎驚熱蛇蜕皮三寸炙聖惠方用五寸釣藤黄耆細辛甘草炙各二分大黄四分蚱蟬去足四枚炙後去頭牛黄五大豆許右以水二