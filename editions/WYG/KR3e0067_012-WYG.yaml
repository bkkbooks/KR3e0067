body:
  text: 普濟方卷十二明周王朱橚撰運氣圗少陽相火司天厥隂風木在泉中見太宫土運歳土太過氣化運行先天火化在上清化左黅化右酸化在下灼化左藏化右故天氣正而其政嚴地氣擾而其令撓風迺暴舉木偃沙飛炎火迺流隂行陽化雨廼時應風熱參布雲物沸騰太隂横流寒廼時至凉雨並起火化二雨化五風化八正化度也火木同徳上應熒惑嵗星其穀丹蒼羽蟲静毛蟲育是謂歳物所宜倮蟲耗清毒不生是皆地氣所至民病寒中外發瘡瘍内為泄滿聖人遇之和而不争往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變是歳陽為天氣隂為地氣天氣盈地氣虚宜先取化源以平火氣抑其運土贊所不勝則暴過不生苛疾不起歳宜醎冝辛宜酸渗之泄之漬之發之觀氣寒温以調其過運異風熱宜少用寒化其化上醎寒中醎和下辛凉藥食宜也歳行土運天氣生運歳半之前天氣主之火淫所勝則温氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黄赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍欬唾血煩心胸中熱甚則鼽衂病本於肺診在手天府之脉其法平以醎冷佐以苦甘以酸收之以苦發之以酸復之歳半之後地氣主之風淫所勝則地氣不明平野眛草廼早秀民病灑灑振寒善呻數欠心痛支滿兩脇裏急飲食不下膈咽不通食則嘔腹脹善噫得後與氣則怏然如衰身體皆重其法治以辛凉佐以苦甘以甘緩之以辛散之歳運之化紀曰敦阜是謂廣化厚徳清静順長以盈至隂内實物化充成煙埃朦欝見於厚土大雨時行濕氣廼用燥政廼辟其化圎其氣豐其政静其令周備其動濡積并稸其徳柔順重淖其變震驚飄驟其化兼其所勝其病腹滿清厥噫不樂體重煩寃甚則肌肉萎足痿不收行善瘛脚下痛飲發中滿食減四肢不舉變生得位藏氣伏化氣獨治之泉涌河衍涸澤生魚風雨大至土潰鱗見於陸病腹滿溏泄腸鳴反下甚而太谿脉絶者不治其法宜以醎和調中初之氣自癸丑年大寒日申初至是歳春分日酉初凡六十日八十七刻半主位太角木客氣少隂火中見土運木生火地氣遷風勝迺摇寒廼去候迺大温草木早榮寒来不殺温病迺起其病氣怫於上血溢目赤欬逆頭痛脇滿膚腠中瘡宜治少隂之客以醎補之以甘瀉之以酸收之歳穀宜丹間穀宜豆雖有熱邪不能為害二之氣自春分日酉正至小滿日辰正凡六十日有竒主位少徵火客氣太隂土中見土運氣與運同司氣與運同司氣為黅化火反鬱白埃四起雲趨雨府風不勝濕雨迺零民迺康其病熱鬱於上欬逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡宜治太隂之客以甘補之以苦瀉之以甘緩之歳穀宜丹間穀宜麻雖有濕邪不能為害是氣也無犯司氣三之氣自小滿日巳初至大暑日卯初凡六十日有竒主位少徵火客氣少陽火中見土運火居其位天政布炎暑至少陽臨上雨迺涯民病熱中聾瞑血溢膿瘡欬逆嘔吐鼽衂渇􅅉欠喉痺目赤善暴死宜調少陽之客以醎補之以甘瀉之以醎耎之歳穀宜丹間穀宜豆雖有火化不能為害四之氣自大暑日卯正至秋分日丑正凡六十日有竒主位太宫土客氣陽明金中見土運歳土當位凉乃至炎暑間化白露降民氣和平其病滿身重宜調陽明之客以酸補之以辛瀉之以苦泄之歳穀宜蒼間穀宜黍雖有燥邪不能為害五之氣自秋分日寅初至小雪日子初凡六十日有竒主位少商金客氣太陽水中見土運寒温相交陽乃去寒迺来雨迺降氣門廼閉剛木早凋民病寒邪君子周宻宜調太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歳穀宜蒼間穀宜稷雖有寒不能為害終之氣自小雪日子正至大寒日戌正凡六十日有竒主位太羽水客氣厥隂木中見土運木制土地氣正風迺至萬物反生霿霧以行其病闗閉不禁心痛陽氣不藏而欬宜治厥隂之客以辛補之以酸瀉之以甘緩之歳穀宜蒼間穀宜稻雖有風邪不能為害歳氣之交天氣勝者陽明復之觀其復至無翼其勝無贊其復依法為治寒者熱之清者温之各安其氣則邪氣衰去歸其所宗此治之大體也陽明燥金司天少隂君火在泉中見少商金運歳不及氣化運行後天少商上臨陽明少商與正商同不及而同天化是謂天符氣之平也平金之歳命曰審平之紀收而不争殺而無犯五化宣明其氣㓗其性剛其用散落其化堅斂其政勁肅其候清切其令燥其類金其應秋其穀稻其果桃其實榖其蟲介其畜雞其色白其味辛其音商其數九其物外堅其在人也其藏肺其主鼻其養皮毛其病欬此歳運之化也天地之氣陽明在上左太陽右少陽故天氣急而其政切少隂在下左太隂右厥隂故地氣明而其令暴陽專其令炎暑盛行物燥以堅淳風廼治風燥横運流於氣交多陽少隂雲趨雨府濕化迺敷燥極而澤蟄蟲迺見流水不冰金火合徳上應太白熒惑其穀白丹間榖命太缺者其耗白甲品羽故熱化寒化勝腹同邪氣化度也燥化四清化四熱化二正化度也歳物之宜介蟲静羽蟲育地氣所制介蟲耗寒毒不生清熱之氣持於氣交清先而勁毛蟲迺死熱後而暴介蟲迺殃其發燥民病欬嗌塞寒熱發暴振慄癃閟歳半之前清氣主之其化燥者天之政也歳半之後熱氣主之其化熱者地之令也金為天氣火為地氣火勝金天氣虚當資金之化源是歳氣平不資化源惟安其運金無使受邪食白丹之穀以去其邪歳宜以醎以苦以辛汗之清之散之其運與清化同宜多地化經曰其化上苦小温中苦和下醎寒藥食之宜也初之氣自甲寅年大寒日亥初至是歳春分日酉初凡六十日八十七刻半主位太角木客氣太隂土中見金運地氣廼遷隂始凝氣始肅水迺氷寒雨化其病中熱脹面目浮善眠鼽衂􅅉欠嘔小便黄赤甚則淋宜調太隂之客以甘補之以苦瀉之以甘緩之歳穀宜白間穀宜黍則熱不為邪是氣也用凉逺凉無犯司氣之凉二之氣自春分日酉正至小滿日未正凡六十日有竒主位少徵火客氣少陽火中見火運陽乃布民乃舒物乃生榮厲大至民善暴死宜調少陽之客以鹹補之以甘瀉之以鹹耎之以酸收之歳榖宜丹間榖宜豆則火不為邪三之氣自小滿日申初至大暑日午初凡六十日有竒主位太徵火客氣陽明金中見土運天政布凉乃行燥熱交合燥極而澤民病寒熱宜調陽明之客以酸補之以辛瀉之以苦泄之歲榖宜黅間榖宜稷則燥不為邪四之氣自大暑日午正至秋分日辰正凡六十日有竒主位太宫土客氣太陽水中見金運金生水寒雨降民病暴仆振慄譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便宜調太陽之客以苦補之以鹹瀉之以苦堅之以辛潤之歳榖宜丹間榖宜稷則寒不為邪五之氣自秋分日巳初至小雪日夘初凡六十日有竒主位少商金客氣厥隂木中見金運風木用事春令反行草迺生榮民迺和宜調厥隂之客以辛補之以酸瀉之以甘緩之歳榖宜丹間榖宜稻則風不為邪終之氣自小雪日夘正至大寒日丑正凡六十日有竒主位太羽水客氣少隂火中見金運火勝金陽氣布候反温蟄蟲来見流水不氷民迺康平其病温宜調少隂之客以鹹補之以甘瀉之以酸収之歳榖宜丹間榖宜豆則熱不為邪此六氣之常也是歳天符為執法若有邪氣民病卒急經曰邪中執法者其病速而危太陽寒水司天太隂濕土在泉中見太羽水運歳水太過氣化運行先天太過而同天化是謂天符平水之歳也水運平者命曰静順之紀藏而勿害治而善下五化咸整其氣明其性下其用沃衍其化凝堅其政流演其候凝肅其令寒其類水其應冬其穀豆其果栗其實濡其蟲鱗其畜彘其色黑其味醎其音羽其數六其物濡其在人也其藏腎其主二隂其養骨髓其病厥此歳運之化也天地之氣太陽在上左厥隂右陽明故天政所布其氣肅太隂在下左少陽右少隂故地氣静而其令徐寒臨太虚其政大舉陽氣不令澤無陽燄則火發待時少陽中治時雨廼涯止極雨散還於太隂雲朝北極濕化迺布澤流萬物寒化六雨化五正化度也鱗蟲静倮蟲育歳物之宜也鱗蟲不成燥毒不生地氣制之也寒敷于上雷動於下水土合徳上應辰星鎮星其穀𤣥黅寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡瀉血溢是歳水在上土在下土勝水天氣虚水運天符其氣自平不資化源惟抑運水扶其不勝無使暴過而生其疾歳宜以苦燥之温之食𤣥黅之穀以全其真避虚邪之氣以安其正運與寒同宜燥熱化故曰其化上苦熱中醎温下甘熱藥食宜也歳半之前太陽主之有本標之化當其時寒熱得中者天之和也歳半之後太陽主之太隂之化從本當其時濕化應者地之令也初之氣自乙卯年大寒日寅初至是歳春分日子初凡六十日八十七刻半主位太角木客氣少陽火中見水運少陽中治地氣遷氣迺大温草廼早榮民廼厲温病迺作身熱頭痛嘔吐肌腠瘡瘍宜調少陽之客以醎補之以甘瀉之以醎耎之歳穀宜𤣥間穀宜豆則火不為邪二之氣自春分日子正至小滿日戌正凡六十日有竒主位少徵火客氣陽明金中見水運大凉反至民迺慘草迺遇寒火氣遂抑民病氣鬱中滿寒迺始宜調陽明之客以甘補之以辛瀉之以苦泄之歳穀宜𤣥間穀宜黍則燥不為邪三之氣自小滿日亥初至大暑日酉初凡六十日有竒主位少徵火客氣太陽水中見水運氣與運相符天政布寒氣行雨迺降民病寒反熱中癰疽注下心熱瞀悶不治者死宜調太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歳穀宜𤣥間穀宜稷則寒不為邪是氣也用寒逺寒無犯司氣之寒四之氣自大暑日酉正至秋分日未正凡六十日有竒主位太宫土客氣厥隂木中見水運水生木風濕交争風化為雨迺長迺化廼成民病大熱少氣肌肉萎足痿注下赤白宜調厥隂之客以辛補之以辛瀉之以甘緩之歳穀宜黅間穀宜稻則風不為邪五之氣自秋分日申初至小雪日午初凡六十日有竒主位少商金客氣少隂火中見水運大火所居陽復化草迺長迺化迺成民迺舒宜調少隂之客以醎補之以甘瀉之以酸收之嵗穀宜黅間穀宜豆則熱不為邪終之氣自小雪日午正至大寒日辰正凡六十日有竒主位太羽水客氣太隂土中見水運水運得位濕土居之地氣正濕令行隂凝太虚埃昏郊野民迺慘悽寒風以至反者孕迺死宜調太隂之客以甘補之以苦瀉之以甘緩之歳穀宜黅間穀宜麻則濕不為邪此六氣之化也歳行平水之化天符為執法邪或中之民有卒急之病故經曰中執法者其病速而危厥隂風木司天少陽相火在泉中見少角木運歳木不及上角與正角同又木不及而同天化氣化運行同天氣與天符木氣適平命曰敷和之紀木徳周行陽舒隂布五化宣平其氣端其性隨其用曲直其化主榮其政發散其候温和其令風其類草木其應春其穀麻其果李其實核其蟲毛其畜犬其色蒼其味酸其音角其數八其物中堅其在人也其藏肝其主目其養筋其病裏急支滿此歳運之化也天地之化風化在上左灼化右藏化故天氣擾而其政撓苦化在下左清化右柔化故地氣正而其令速風生髙逺炎熱從之雲趨雨府濕化迺行風火同徳上應嵗星熒惑其穀蒼丹間穀言太商之穀其耗文角品羽清化熱化勝復同邪氣化度風化三火化七政化度也毛蟲静羽蟲育是迺歳物所宜介蟲耗寒毒不生是皆地氣所制故風燥火熱勝復更作蟄蟲来見流水不氷熱病行於下風病行於上風燥勝復行於中是隂為天氣陽為地氣天氣虚木運符之又木火同徳其氣專不資化源惟贊運木無使邪勝歳宜以辛調上以醎調下畏火之氣無妄犯之故曰其化上辛凉中辛和下醎寒藥食宜也歳半之前天氣主之天布厥隂之政其令風歳半之後地氣主之地行少陽之令其化火氣化之常也初之氣自丙辰年大寒日巳初至是歳春分日卯初凡六十日八十七刻半主位少角木客氣陽明金中見木運嵗運得位金燥客之寒始肅殺氣方至民病寒於右之下宜調陽明之客以酸補之以辛瀉之以苦泄之歳穀宜蒼間穀宜黍則燥不為邪二之氣自春分日卯正至小滿日丑正凡六十日有竒主位太徵火客氣太陽水中見木運寒不去華雪水氷殺氣施化霜迺降谷草上焦寒雨數至陽復化民病熱中宜調太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歳穀宜蒼間穀宜稷則寒不為邪三之氣自小滿日寅初至大暑日子初凡六十日有竒主位太徵火客氣厥隂木中見木運木與天符天政布風廼時舉民病泣出耳鳴掉眩宜調厥隂之客以辛補之以酸瀉之以甘緩之歳穀宜蒼間穀宜稻則風不為邪是氣也用温逺温無犯司氣之温四之氣自大暑日子正至秋分日戌正凡六十日有竒主位少宫土客氣少陰火中見木運溽暑濕熱相薄争於左之上民病黄癉而為胕腫宜調少隂之客以醎補之以甘瀉之以酸收之歳穀宜丹間穀冝豆則熱不為邪五之氣自秋分日亥初至小雪日酉初凡六十日有竒主位太商金客氣太隂土中見木運燥濕更勝沉隂迺布寒氣及體風雨迺行宜調太隂之客以甘補之以苦瀉之以甘緩之歳穀宜丹間穀宜麻則濕不為邪終之氣自小雪日酉正至大寒日未正凡六十日有竒主位少羽水客氣少陽火中見木運木生火畏火司令陽迺大化蟄蟲出見流水不氷地大發草迺生人迺舒其病温厲宜調少陽之客以醎補之以甘瀉之以醎耎之歳穀宜丹間穀宜豆則火不為邪此六氣之化也歳為平木或有邪氣則中執法人有卒急之病故經曰中執法者其病速而危少隂君火司天陽明燥金在泉中見太徵火運歳火太過而同天化是謂天符又火運臨午是謂歳㑹氣之平也上見天符下見歳㑹三合而治太一天符之㑹平之至也平火之歳命曰升明之紀正陽而治徳施周普五化鈞衡其氣髙其性速其用燔灼其化蕃茂其政明曜其候炎暑其令熱其類火其應夏其穀麥其果杏其實絡其蟲羽其畜馬其色赤其味苦其物脉其音徵其數七其在人也其藏心其主舌其養血其病瞤瘛此歲運之化也少陰在上左太隂右厥隂故天政所布其氣明陽明在下左太陽右少陽故地氣肅而其令切寒交暑熱加燥雲馳雨府濕化迺行時雨迺降金火合徳上應熒惑太白其穀丹白熱化七清化九正化度也羽蟲静介蟲育歳物所宜也毛蟲耗濕毒不生地氣制之也水火寒熱持於氣交而為病始熱病行於上清病生於下寒熱争於中民病欬喘血溢白泄鼽􅅉目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上是歳火在上金在下火在中火勝金天氣盈天氣雖平熱甚於上宜於年前十二月先取化源平其火氣必抑其運火資其歳勝折其金之鬱氣無使暴過而生其病食丹白之榖以全真氣食間氣之穀以辟羣邪歳宜醎以耎之而安其上以酸收之而安其下運同天氣以寒清化故曰其化上醎寒中甘寒下酸温藥食宜也歳半之前少隂主之少隂有本標之化寒熱得中者天政之平也歳半之後陽明主之陽明以中氣為化燥令相半者地之令也初之氣自丁巳年大寒日申初至是歳春分日午初凡六十日八十七刻半主位少角木客氣太陽水中見火運水勝火地氣遷燥將去寒廼始熱復藏水廼氷霜復降風迺至陽氣鬱民反周宻闗節禁固腰脽痛炎暑將起中外瘡瘍宜調太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歳穀宜丹間穀宜稷則寒不為邪二之氣自春分日午正至小滿日辰正凡六十日有竒主位太徵火客氣厥隂木中見火運木火相生陽氣布風迺行春氣以正萬物應榮寒氣時至民廼和其病淋目瞑目赤氣鬱上而熱宜調厥隂之客以辛補之以酸收之以甘緩之歳穀宜丹間穀宜稻則風不為邪三之氣自小滿日巳初至大暑日卯初凡六十日有竒主位太徵火客氣少隂火中見火運氣與運符天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作欬喘目赤宜調少隂之客以醎補之以甘瀉之以酸收之歳穀宜丹間穀宜豆則熱不為邪四之氣自大暑日卯正至秋分日丑正凡六十日有竒主位少宫土客氣太隂土中見火運土當其位火化兼之溽暑至大雨時行寒熱互至民病寒熱嗌乾黄癉鼽衂飲發宜調太隂之客以甘補之以苦瀉之以甘緩之歳穀宜白間穀宜麻則濕不為邪五之氣自秋分日寅初至小雪日子初凡六十日有竒主位太商金客氣少陽火中見火運氣同運化畏火臨暑反至陽迺化萬物迺生迺長迺榮民迺康其病温宜調少陽之客以醎補之以甘瀉之以醎耎之歳穀宜白間穀宜豆則火不為邪是氣也用熱逺熱無犯司氣之熱終之氣自小雪日子正至秋分日戌正凡六十日有竒主位少羽水客氣陽明金中見火運火勝金水反制之燥令行餘火内格腫於上欬喘甚則血溢寒氣數舉則霧霿翳病生皮腠内舍於脇下連少腹而作寒中地將易也宜調少陽之客以酸補之以辛㵼之以苦泄之嵗榖宜白間榖宜黍則燥不為邪此六氣之化也歲氣之交平火在上金氣抑鬱治宜泄之客安其氣必清必静則邪氣自衰歸其所宗此治之大體也太隂濕土司天太陽寒水在泉中見少宫土運嵗土不及上宫與正宫同少宫上臨太隂是謂天符土運臨丑是謂嵗㑹上見天符下見歳㑹三合為治太一天符之歳氣至平也命曰備化之紀氣協天休徳流四政五化齊脩其氣平其性順其用髙下其化豐滿其政安静其候溽蒸其令濕其類土其應長夏其穀稷其果􅀥其實肉其蟲倮其畜牛其色黄其味甘其物膚其音宫其數五其在人也其藏脾其主口其養肉其病痞此歳運之化也歳氣之化太隂在上少陽左少隂右故地氣上騰而其政肅太陽在下厥隂左陽明右故天氣下降而其令寂隂專其政陽氣退辟大風時起原野昏霿白埃四起雲奔南極寒雨數至濕寒合徳黄黒埃昏流行氣交上應鎮星辰星其穀黅𤣥間穀命太商太徵者物成於差夏故陰凝於上寒積於下寒水勝火則為氷雹陽光不治殺氣迺行有餘宜髙不及宜下有餘宜晩不及宜早土之利氣之化也民氣亦從之其病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急故曰風化勝復同邪氣化度也雨化五寒化一正化度也倮蟲静鱗蟲育歳物所宜也羽蟲耗濕毒不生地氣制之也是歳土在上水在下土勝水天氣盈當取化源歳遇太一天符其氣至平不取化源惟折其水鬱益其歳勝贊其陽火令禦甚寒無使邪勝食黅𤣥之穀以全其真食間氣之穀以保其精歳宜以苦燥之濕之運與濕同宜以燥化故曰其化上苦熱中甘和下甘熱藥食宜也歳半之前其政濕歳半之後其令寒初之氣自戊午年大寒日亥初至是歳春分日酉初凡六十日八十七刻半主位少角木客氣厥陰木中見土運木當其位地氣遷寒迺去春氣正風迺来生布萬物以榮民氣條舒風濕相搏雨迺後民病血溢經絡拘強闗節不利身重筋痿宜調厥陰之客以辛補之以酸瀉之以甘緩之歳穀宜黅間穀宜稻則風不為邪二之氣自春分日酉正至小滿日未正凡六十日有竒主位太徵火客氣少隂火中見土運大火正物承化民迺和其病温厲盛行逺近咸若濕蒸相搏雨迺時降宜調少隂之客以醎補之以甘瀉之以酸收之歳穀宜黅間穀宜豆則熱不為邪三之氣自小滿日申初至大暑日午初凡六十日有竒主位太徵火客氣太陰土中見土運氣與運符而行平氣天政布濕氣降地氣騰雨迺時降寒迺隨之感於寒濕則民病身重胕腫胸腹滿宜調太陰之客以甘補之以苦瀉之以甘緩之歳穀宜黅間穀宜麻則濕不為邪是氣也無犯司氣四之氣自大暑日午正至秋分日辰正凡六十日有竒主位少宫土客氣少陽火中見土運歳運得位相火居之畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相摶草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜調少陽之客以醎補之以甘瀉之以醎耎之歳穀宜𤣥間穀宜豆則火不為邪五之氣自秋分日巳初至小雪日卯初凡六十日有竒主位太商金客氣陽明金中見土運土生金金得位慘令已行寒露下霜迺早降草木黄落寒氣及體君子周宻民病皮腠宜調陽明之客以酸補之以辛瀉之以苦泄之歳榖宜𤣥間穀宜黍則燥不為邪終之氣自小雪日卯正至大寒日丑正凡六十日有竒主位少羽水客氣太陽水中見土運土當其位濕土合氣寒大舉濕大化霜迺積隂迺凝水堅氷陽光不治感於寒則病人闗節禁固腰脽痛寒濕持於氣交而為疾也宜調太陽之客以苦補之以鹹瀉之以苦堅之以辛潤之嵗榖宜𤣥間榖宜稷則寒不為邪此六氣之化也氣交之化嵗有鬱治宜折之皆隨勝氣安其屈伏無問其數以平為期此其道也少陽相火司天厥陰風木在泉中見太商金運歳金太過氣化運行先天上見少陽左陽明右太隂故天氣正而其政嚴下見厥陰左少陰右太陽故地氣擾而其令撓風迺暴舉木偃沙飛炎火迺流陰行陽化雨迺時應風熱參布雲物沸騰太陰横流寒迺時至凉雨並起火木同徳上應熒惑歳星其穀丹蒼火化七清化九風化三正化度也羽蟲静毛蟲育是謂歳物之宜倮蟲耗清毒不生是皆地氣所制民病寒中外發瘡瘍内為泄滿聖人遇之和而不争往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變是歳陽為天氣隂為地氣金運在中天氣刑運運刑地氣天氣盈地氣虚當於年前先取化源以平火氣無使運鬱兼抑其運金贊所不勝無使木鬱氣則暴過不生苛疾不起歳宜醎宜辛宜酸渗之泄之漬之發之運翼風熱少用寒化其化上醎寒中辛温下辛凉藥食宜也候其氣者歳半之前其主少陽若火淫所勝則温氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黄赤𫝊而為水身靣胕腫腹滿仰息泄注赤白瘡瘍欬唾血煩心胸中熱甚則鼽衂病本於肺診在手天府之脉法冝平以醎冷佐以苦甘以酸收之以苦發之以酸復之歳半之後其主厥隂若風淫於内則地氣不明平野昧草迺早秀民病灑灑振寒善呻數欠心痛支滿兩脇裏急飲食不下膈咽不通食則嘔腹脹善噫得後與氣則怏然如衰身體皆重法宜治以辛凉佐以苦以甘緩之以辛散之歳運之金太過紀曰堅成是謂收引天氣㓗地氣明陽氣隨隂治化燥行其政物以司成收氣繁布化洽不終其化成其氣削其政肅其令銳切其動暴折瘍疰其徳霧露蕭飄其變肅殺凋零其化兼其所勝其病喘喝胸憑仰息上徵與正商同其生齊其病欬故曰歳金太過燥氣流行肝木受邪民病兩脇下少腹痛目赤痛眥瘍耳無所聞甚則欬逆喘氣肩背痛下連股膝髀腨胻足皆病其治宜以辛温所以調其運也初之氣自己未年大寒日寅初至是歳春分日子初凡六十日八十七刻半主位少角木客氣少隂火金運統之火能勝金地氣遷風勝迺摇寒迺去候迺大温草木早榮寒来不殺温病迺起其病氣怫於上血溢目赤欬逆頭痛血崩脇滿膚腠中瘡宜治少隂之客以醎補之以甘瀉之以酸收之歳穀宜丹間穀宜豆二之氣自春分日子正至小滿日戌正凡六十日有竒主位太徵火客氣太隂土金運統之火生土土甚鬱火白埃四起雲趨雨府風不勝濕雨迺零民迺康其病熱鬱於上欬逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡宜治太隂之客以甘補之以苦瀉之以甘緩之歳穀宜丹間穀宜麻三之氣自小滿日亥初至大暑日酉初凡六十日有竒主位太徵火客氣少陽火金運統之火當其位天政布炎暑至少陽臨上雨迺涯民病熱中聾瞑血溢膿瘡欬嘔鼽衂渇􅅉欠喉痺目赤善暴死宜治少陽之客以醎補之以甘瀉之以醎耎之歳穀宜丹間穀宜豆四之氣自大暑日酉正至秋分日未正凡六十日有竒主位少宫土客氣陽明金運統之氣與運同是謂司氣陽迺至炎暑間化白露降民氣和平其病滿身重宜治陽明之客以酸補之以辛瀉之以苦泄之嵗穀宜蒼間穀宜黍是氣也司氣以凉藥食之宜用凉無犯五之氣自秋分日申初至小雪日午初凡六十日有竒主位太商金客氣太陽水金得其位與水相生陽迺去寒迺来雨迺降氣門迺閉剛木早凋民病寒邪君子周密宜治太陽之客以苦補之以鹹瀉之以苦堅之以辛潤之嵗穀宜蒼間穀宜稷終之氣自小雪日午正至大寒日辰正凡六十日有竒主位少羽水客氣厥隂木金運統之金本刑木水反生之地氣正風迺至萬物反生霧霿以行其病關閉不禁心痛陽氣不藏而欬宜治厥隂之客以辛補之以鹹瀉之以甘緩之嵗穀宜蒼間穀宜稻嵗氣之交天氣火勝即太陽来復地氣木勝即陽明来復覩其氣至治以勝復之法寒者熱之清者温之無翼其甚無贊其復是謂至治陽明燥金司天少隂君火在泉中見少羽水運歳水不及氣化運行後天陽明在上太陽左少陽右故天氣急而其令切少隂在下太隂左厥隂右故地氣明而其令暴陽專其令炎暑盛行物燥以堅淳風迺治風燥横運流於氣交多陽少隂雲趨雨府濕化迺敷燥極而澤金火合徳上應太白熒惑其穀白丹間穀命太徵者其耗白甲品羽雨化風化勝復同邪氣化度也清化九寒化一熱化七正化度也介蟲静羽蟲育是乃歳物之宜介蟲耗寒毒不生是皆地氣所制蟄蟲出見流水不氷清熱之氣持於氣交民病咳嗌塞寒熱發暴振慄癃閟清先而勁毛蟲迺死熱後而暴介蟲迺死其發燥是歳金在上火在下水運在中水勝火火勝金天氣虚水能制火而生金其邪迺微宜資其化源以助金氣安其水運無使受邪折其火氣之鬱食白丹之穀以安其氣食間氣之穀以去其邪歳宜以醎以苦以辛汗之清之散之運化同清宜多地化其化上苦小温中苦和下醎寒藥食宜也候其清者歳半之前陽明主之燥淫所勝則木迺晩榮草迺晩生筋骨内變民病左胠脇痛寒清於中感而瘧大凉革候欬腹中鳴注泄鶩溏名木斂生苑於下草焦上首心脇暴痛不可反側嗌乾面塵腰痛目眛瘡瘍痤癰病本於肝診在足太衝之脉法宜平以苦温佐以酸辛以苦下之歳半之後少陽主之熱淫於内則焰浮川澤隂處反明民病腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛䪼腫惡寒發熱如瘧少腹中痛腹大法宜治以醎寒佐以甘苦以酸收之以苦發之氣交之間水運統之涸流之紀是謂反陽藏令不舉化氣迺昌長氣宣布蟄蟲不藏土潤水泉减草木條茂榮秀滿盛其氣滯其用滲泄其動堅止其發燥稿其藏腎其化兼所不勝其病癃閟邪傷腎也候其氣者四維有湍潤埃雲之化則不時有和風生發之應若四維發埃昏驟注之變則不時有飄蕩振摽之復其眚北其病内舍腰脊骨髓外在谿谷踹膝故曰歳水不及濕迺盛行長氣反用其化迺速暑雨數至民病腹滿身重濡泄寒瘍流水腰股痛發膕腨股膝不便煩寃足痿清厥脚下痛甚則胕腫藏氣不政腎氣不衡復有大風暴發草偃木零生長不鮮面色時變筋骨併辟肉瞤瘛目視䀮䀮肌肉胗發氣并膈中痛於心腹黄氣迺損其穀不登初之氣自庚申年大寒日巳初至是歳春分日卯初凡六十日八十七刻半主位少角木客氣太隂土中見水運土勝水地氣遷隂始凝氣始肅水廼氷寒雨化其病中熱脹面目浮腫善眠鼽衂􅅉欠嘔小便黄赤甚則淋宜治太陰之客以甘補之以苦瀉之以甘緩之歳食白穀間穀用麻雖有濕邪不能為害二之氣自春分日卯正至小滿日丑正凡六十日有竒主位太徵火客氣少陽火中見水運陽迺布民迺舒物迺生榮厲大至民善暴死水運承之其邪亦㣲宜治少陽之客以醎補之以甘瀉之以醎耎之歳食白穀間穀宜豆雖有火邪莫之能害三之氣自小滿日寅初至大暑日子初凡六十日有竒主位太徵火客氣陽明金中見水運天政布凉迺行燥熱交合燥極而澤民病寒熱宜治陽明之客以酸補之以辛瀉之以苦泄之歳食白穀間穀用黍雖有燥邪莫之能害四之氣自大暑日子正至秋分日戌正凡六十日有竒主位少宫土客氣太陽水中見水運氣與運同是謂司氣寒雨降民病暴仆振慄譫妄少氣嗌乾引飲及為心痛癰腫瘧寒瘡瘍之疾骨痿血便宜治太陽之客以苦補之以酸瀉之以苦堅之以辛潤之歳食丹穀間穀用稷雖有寒邪莫之能害是氣也用寒逺寒無犯司氣之寒五之氣自秋分日亥初至小寒日酉初凡六十日有竒主位太商金客氣厥隂木中見水運水生木春令反行草廼生榮民氣和宜調厥隂之客以辛補之以酸瀉之以甘緩之歳食丹穀間穀用稻雖有風邪莫之能害終之氣自小雪日酉正至大寒日未正凡六十日有竒主位少羽水客氣少隂火中見水運水得位運水居之陽氣布候反温蟄蟲来見流水不氷民廼康平其病温宜治少隂之客以醎補之以甘瀉之以酸收之歳穀宜丹間穀宜豆雖有熱邪莫之能害此六氣之化也歳氣之交天氣勝者少陽復之地氣勝者太陽復之詳察隂陽所在而調之以正為期太陽寒水司天太陰濕土在泉中見太角木運歳木太過氣化運行先天太陽為天氣左厥隂右陽明故天政所布其氣肅太隂為地氣左少陽右少隂故地氣静而其令徐寒臨太虛其政大舉則火發待時少陽中治時雨迺涯雲朝北極濕化迺布澤流萬物寒化六風化八雨化五正化度也鱗蟲静倮蟲育歳物之宜也鱗蟲不成燥毒不生地氣制之也寒敷於上雷動於下寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡瀉血溢是歳水為天氣土為地氣土勝水當資化源以助天氣又歳遇木運木能制土地氣廼欝其邪亦㣲必折鬱土抑其運木扶其不勝無使暴過而生其疾食𤣥黅之穀以全其真避虚邪之氣以安其正運與寒濕異以燥濕化其化上苦温中酸和下甘温藥食宜也歳半之前太陽主之寒淫所勝則寒氣迺至水且氷血變於中發為癰瘍民病厥心痛鼽衂善悲時眩仆病本於心診在神門之脉其法平以辛熱佐以甘苦以醎補之歳半之後太隂主之濕淫於内則埃昏巖谷黄反見黑至隂之交民病飲積心痛耳聾渾渾淳淳嗌腫喉痺少腹痛腫病衝頭痛目項腰髀膕腨皆痛其法宜治以苦熱佐以酸淡以苦燥之以淡泄之氣交之間木運太過命曰發生之紀是謂啓陳土疎泄蒼氣逹陽和布化隂氣迺隨生氣淳化萬物以榮其化生其氣美其政散其令條舒其動掉眩巔疾其徳鳴靡啟拆其象春其變振慄摧拔其穀麻稻其果李桃其畜鷄犬其蟲毛介其物中堅外堅其色青黄白其味酸甘辛其經足厥陰少陽其藏肝脾其病怒故曰歳木太過風氣流行脾土受邪民病飱泄食減體重煩寃腸鳴腹支滿甚則忽忽善怒眩冐巔疾脇痛診在衝陽之脉其法治以酸和初之氣自辛未年大寒日申初至是歳春分日午初凡六十日八十七刻半主位太角木客氣少陽火中見木運歳木當其位相火居之地氣遷氣迺大温草迺早榮民迺厲温病迺作身熱頭痛嘔吐肌腠瘡瘍宜治少陽之客以醎補之以甘瀉之以醎耎之歳穀宜𤣥間穀宜豆雖有火邪不能為害二之氣自春分日午正至小滿日辰正凡六十日有竒主位少徵火客氣陽明金中見木運金勝木大凉迺至草迺遇寒火氣遂抑民病氣鬱中滿寒迺始宜治陽明之客以酸補之以辛瀉之以苦泄之歳穀宜𤣥間穀宜黍雖有燥邪不能為害三之氣自小滿日巳初至大暑日卯初凡六十日有竒主位少徵火客氣太陽水中見木運天政布寒氣行雨迺降民病寒熱中癰疽注下心熱瞀悶宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歳穀宜稷間穀宜豆雖有寒邪不能為害四之氣自大暑日卯正至秋分日丑正凡六十日有竒主位太宫土客氣厥隂木中見木運氣與運同是謂司氣風濕交争風化為雨迺長迺化迺成民病太熱少氣肌肉萎注下赤白宜治厥隂之客以辛補之以酸瀉之以甘緩之歳穀宜黅間穀宜稻雖有風邪不能為害是氣也用温逺温無犯司氣之温五之氣自秋分日寅初至小雪日子初凡六十日有竒主位少商金客氣少陽火中見木運木生火火勝金陽復化草迺長迺化迺成民迺舒宜調少隂之客以鹹補之以甘㵼之以酸收之嵗榖宜黅間榖宜豆雖有熱邪不能為害終之氣自小雪日子正至大寒日戌正凡六十日有竒主位太羽水客氣太隂土中見木運地氣正濕令行隂凝太虚寒風以至宜治太隂之客以甘補之以苦㵼之以甘緩之嵗榖宜黅間榖宜麻雖有濕邪不能為害此六氣之化也嵗氣之交天氣勝則太隂之復地氣勝則厥隂之復法治之所謂濕者燥之温者清之故其氣迺平也厥陰風木司天少陽相火在泉中見少徵火運歳火不及氣化運行後天不及而同地化是謂同歳㑹氣之平也諸同正歳氣化運行同天平火之歳命曰升明之紀正陽而治徳施周普五化鈞衡其氣髙其性速其用燔灼其化蕃茂其政明曜其候炎暑其令熱其類火其應夏其穀麥其果杏其實絡其蟲羽其畜馬其色變其味苦其物脉其音徵其數七其在人也其藏心其主舌其飬血其病瞤瘛此歳運之化也天地之氣上見厥陰左少陰右太陽故天氣擾而其政撓下見少陽左陽明右太隂故地氣正而其令速風生髙逺炎熱從之雲趨雨府濕化迺行風火同徳上應歳星熒惑其穀蒼丹間穀言太宫太羽者其耗文角品羽寒化雨化勝復同邪氣化度也風化八火化二正化度也歳物之宜則毛蟲静羽蟲育地氣所制則介蟲耗寒毒不生風燥火熱勝復更作蟄蟲来見流水不氷熱病行於上風燥勝復行於中是歳陰為天氣陽為地氣嵗火運適平不資化源惟贊其運火無使邪勝歳宜以辛調上醎調下畏火之氣無妄犯之其化上辛凉中醎和下醎寒藥食宜也歳半之前厥隂主之多風化者厥隂之政也歳半之後少陽主之多火化者少隂之令也初之氣自壬戌年大寒日亥初至是歳春分日酉初凡六十日八十七刻半主位太徵木客氣陽明金中見火運寒始肅殺氣方至民病寒於右之下運行平火其邪迺㣲宜調陽明之客以酸補之以辛瀉之以苦泄之歳穀宜蒼間榖宜黍二之氣自春分日酉正至小滿日未正凡六十日有竒主位少徵火客氣太陽水中見火運火居其位寒水承之寒不去華雪水冰殺氣施行霜廼降名草上焦寒雨數至陽復化民病熱於中宜調太陽之客以苦補之以醎瀉之以苦堅之以辛潤之歳穀宜蒼間穀宜稷三之氣自小滿日申初至大暑日午初凡六十日有竒主位少徵火客氣厥隂木中見火運火當其位風木客之天政布風迺時舉民病泣出耳鳴掉眩宜調厥隂之客以辛補之以酸瀉之以甘緩之歳穀宜蒼間穀宜稷四之氣自大暑日午正至秋分日辰正凡六十日有竒主位少宫土客氣少隂火中見火運氣與運同灼化所居溽暑濕熱相薄争於左之上民病黄癉而為胕腫宜調少隂之客以醎補之以苦瀉之以酸收之歳穀宜丹間穀宜豆五之氣自秋分日巳初至小雪日卯初凡六十日有竒主位少商金客氣太陰土中見火運火生土燥濕更勝沉隂迺布寒氣及體風雨迺行宜調太陰之客以甘補之以苦瀉之以甘緩之歳穀宜丹間穀宜麻終之氣自小雪日卯正至大寒日丑正凡六十日有竒主位太羽水客氣少陽火中見火運氣符㑹畏火司令陽迺大化熱蟲出見流水不冰地氣大發草迺舒其病温厲宜調少陽之客以醎補之以甘瀉之以醎耎之歳穀宜丹間穀宜豆是氣也用熱逺熱無犯司氣之熱歳氣之化其氣專其化淳又遇火氣平與歳㑹同是謂行令邪氣乘之其病持久經曰中行令者其病徐而持也右六氣司歳五運統歳六五相合三十年一周六十年再周凡千四百四十氣而天地之氣數備焉終而復始時立氣布如環無端守其數稽其化若合符節可謂悉矣此特定期之紀氣化之常也不能無變變不可以常拘故推其要或標本不同謂太陽為寒陽明為燥少陽為炎太隂為濕少隂為熱厥隂為風所謂本也本之下為中之見見之下為氣之標太陽之中見少隂時或為暄太隂之中見陽明時或為燥以至燥濕相交暄寒相應風火相值其本標不同有如此者或因積數之差若春温夏暑秋凉冬寒時令之常也或春夏秋冬各差其分應在四維後皆三度有竒積數之差有如此者或因有勝有復謂六氣之化行各有次止各有位隨六節以觀其應或至而太過者六氣之勝也若有非常之氣應在歳半之前者名為歳氣淫勝應在歳半之後者名為六氣来復其勝復有如此者或因氣位相勝謂天有常政地有常令應各有時當其時各以其化来報至而甚者客勝也若臨在反勝者則司歲之氣不得其應是謂主勝其氣位相勝有如此者或因氣運之鬱謂氣運各有所制屈而不伸也天氣勝運則運化鬱運勝在泉則地氣鬱或六氣臨勝已之位則六氣亦鬱凡有所鬱則進退升降皆不能也其氣鬱有如此者或因鬱而必發謂五氣之鬱乗時而發也木發則標驟其應無時火發則曛昧應在四氣土發則昏憒應在夏金發而毁折應在秋水發而雹雪應在二火前後其鬱氣之發有如此者或因邪氣反勝謂天政布於夏地令行於冬至其時或當寒而熱當熱而寒當温而清當燥而熱當濕而燥反勝有如此者夫定期之外猶有是者則不拘於常數也兹造化宻多所以新新不窮歟普濟方卷十二
