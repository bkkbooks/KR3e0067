body:
  text: 普濟方卷二百二十二明周王朱橚撰諸虚門補虚治下小腸附論夫腎與膀胱俱虚其氣盛有餘則病小腸痼二經俱虚則寒邪乗之久而不愈傳為小腸之疾補虚之法去腎間寒邪嘗須温煖盖為此也故令補虚又參以治小腸之藥方蘹香子丸出聖濟總録治小腸虚寒撮痛蘹香子炒蜀椒去目合口者炒取紅附子炮製去皮臍巴㦸去心木香青橘皮湯浸去白焙青鹽别研楝實剉炒蓯蓉酒浸切焙阿魏醋化麩和作餅炙乾蝎去土炒蓽澄茄補骨脂炒葫蘆巴大㦸各一兩肉豆䓻去壳三枚硫黄舶上者研一兩右為末用白羊腎四對去筋膜砂盆内研如麵将藥一處木臼中更入煉蜜杵千百下丸如桐子大每服温酒下二十丸元氣虛寒煨葱白熱酒下三十丸空心食前服葫蘆巴出聖濟總錄一名補骨脂丸治腎臟虚憊腰膝疼小腸膀胱等氣攻衝方見本門補虚益精髓類内固丸出聖濟總錄治下元虚冷臍撮痛及小腸氣疼丹砂研一錢硇砂水飛研一分蘹香子炒芫花醋化煑炒焦黄色𤣥胡索研海蛤楝實取肉麩炒半夏湯洗七次葫蘆巴芸蒿子研海桐皮剉各半兩沒藥研乳香研紅娘子糯米别研炒各一兩良薑右為末酒煑糊和丸如桐子大每服十五丸炒薑湯鹽酒温下食前楝實散治小腸撮痛楝實剉炒莪术煨剉三稜煨剉芎藭補骨脂炒兎絲子酒浸另搗各半兩木香葫蘆巴桂去皮蘹香子炒蓽澄茄陳皮丁香各一分右為散每服二錢七熱酒或生薑湯調下食前服蘹香附子丸治積年傷憊小腸久冷及痃氣附子炮去皮臍桂去皮葫蘆巴馬藺花炒蘹香子炒青皮去白焙楝實取肉炒乾薑炮巴㦸去心補骨脂炒各半兩右為末酒煑糊和丸如桐子大每服空心鹽湯酒下二十丸木香丸治下元虚冷臍腹撮疼及膀胱小腸氣痛木香半兩乾蝎去土炒阿魏醋化麵作餅炙各一兩蘹香子炒天麻酒浸切焙海蛤牛膝葫蘆巴炒銀礦醋末細研各半兩右為末粟米飲丸如芡實大每服一丸炒薑鹽酒化下食前服玉蘂丸治元陽虚憊臍腹冷疼面黄肌瘦多困少力腰膝痠疼飲食減少膀胱小腸氣疼脾虚滑泄木香三分蘹香子炒蝎稍各半兩附子炮去皮臍一兩白礬燒令汁枯一分陽起石煆硫黄研各半兩硇砂飛研一分右為末酒煑糊為丸如桐子大每服二十丸温酒下小膓膀胱焼綿灰熱酒下隂陽二毒傷寒甘草湯下泄痢虚滑不止腹内撮痛煎艾湯下婦人赤白帶下沒藥酒下脾胃虛弱米榖不化温酒送下並食前服吳茱萸散治小腸虚冷氣痞腹如刀刺或繞臍結痛冷汗宜服吳茱萸一分湯泡焙乾微炒厚朴半兩去皮塗薑汁炙芎藭半兩乾薑半兩炮剉附子三分炮製去皮臍甘草半兩炙微赤剉右為散每服三錢水一盞煎至八分去滓不拘時稍熱服鹿茸丸治小腸虚冷小便數多鹿茸一兩去毛酥炙微黄白龍骨一兩燒過桑螵蛸三分微炒附子一兩半炮去皮臍椒紅一兩炒山茱萸右為末煉蜜搗一二百杵丸如桐子大每服空心鹽湯下二十丸芍藥湯治小腸虚冷時發搐痛不思飲食或時乾噦補虚臟腑芍藥牡丹皮莎草根炒去皮高良薑各一兩木香附子炮去皮臍各半兩右剉如麻豆每服三錢七水一盞生薑三片棗二枚擗煎七分去滓温服青鹽丸治下元積冷傷憊筋骨無力小腸氣痛并腎臟風毒腰膝乏力沈重青鹽研一兩天雄炮去皮臍蘹香子炒青皮湯泡去白炒附子炮去皮臍各一兩牡蠣研三兩同青鹽入小甆合内以鹽泥固濟令乾燒通赤出候冷再研匀右除前二味外搗羅為末再同研匀酒煑糊和丸如桐子大每服二十丸温酒鹽湯任下不拘時服腽肭臍散治下元久冷虚氣攻刺心脾小腸冷疼不可忍腽肭臍切焙吳茱萸洗焙炒甘松洗焙陳皮浸去白良薑各一分右為末先用猪白􅏬一箇去脂膏入葱白三莖椒十四粒鹽一捻同細剉銀石器中炒入無灰酒三盞煑令乾去滓每服七分盞調藥二錢七日三正元煑散補虚治小腸氣楝實取肉炒木香桂去皮各半兩甘草炙一兩蘹香子炒一分右為散每服三錢水一盞煎七分臨熟入鹽少許温服温酒調服亦得巴㦸煎丸治小腸積冷飲食減少面多虚黄手足常冷巴㦸一兩另研末去心舶上茴香二兩炒川楝子二兩麩炒馬藺二兩醋炒紫色牛膝二兩酒浸三日去苗焙乾黒附子一兩炮去皮臍蓯蓉二兩去土酒浸三日焙乾破故紙一兩葫蘆巴一兩芸臺子二兩炒右件十味搗羅為末再将巴㦸末以好酒二升入白麩少許同熬成膏拌衆藥匀再杵三五百下丸如桐子大每服十五丸至二十丸空心鹽湯下補虚益髭髮附論夫手陽明經其支絡主髭足少陽經其榮在鬢足少隂經其華在髮三者經絡所屬雖不同然所稟血氣則一也故血氣内充則能上榮於髮鬚若本臟虚損則督衰弱精血不榮骨髓枯竭則髭鬚頒白甚者墮落治宜補精益血之劑則可變白反黒間有揩齒以烏髭鬚者盖齒者骨之餘髓之養也復老還童丸出徳生堂補下元烏髭鬚蓯蓉酒浸兎絲子酒浸巴㦸酒浸去心牛膝去蘆酒浸各一兩山藥川楝子鹽炒蛇床子炒茯神八角茴香黄芩五味子續斷人參枳實㯽榔乾薑各一兩丁香母者佳乳香木香沈香白檀各半兩右為細末煉蜜為丸先入井花水一盞和藥杵一千餘下方丸如桐子大每服三十五丸空心温酒下地黄煎丸出聖濟總錄治諸虚損調順榮衛補填骨髓續筋脈助真元滑肌肉駐顔色益氣烏髭髮地黄二十斤沈者净洗隂乾令水乾盡木臼杵絞汁餘滓更入法酒五升重杵再􅆈與前汁相和於銀石器内慢火煎栁木箆子攪膏放冷入烏雞子青十一枚大麻油五合攪匀次入諸藥山芋四兩鹿角膠久燥三兩山茱萸焙一兩牛膝酒浸切焙蓯蓉去皮酒浸切焙兎絲子酒浸一宿搗爛拍作餅子巴㦸去心茯苓去皮虎骨酥炙附子乾漆炒牡丹皮剉焙澤㵼炮續斷各二兩生地黄焙木臼内搗熟地黄焙木臼内搗甘草炙剉各四兩右除地黄外搗羅為末入煎和木臼搗千數丸如桐子大早辰日午空心温酒或鹽湯下四十丸加至六十丸初服擇日齋潔服藥後忌房事百日甚有神効忌葱蘿蔔蒜并辛熱者養壽丹出御藥院方補五臟散麻痛駐容顔黒髭髮壯筋骨久服不老逺志去心菖蒲巴㦸去心白术茯苓地骨皮續斷枸杞子菊花細辛地黄車前子何首烏牛膝蓯蓉兎絲子三味酒浸覆盆子各半兩右為細末煉蜜和丸就復臼千杵丸如桐子大每日服二十丸空心酒下地金丸出聖濟總錄治氣血虚損補益烏髭髪方見本門補虚益血類神仙六子丸出御藥方治男子血氣衰敗未及年五十之上髭髪頒白或年少人髭髮蒼黄若服此藥百日内變黄白色如黒漆兔絲子酒浸一宿焙金鈴子枸杞子覆盆子五味子焙蛇床子炒何首烏酒浸一宿切焙各一兩地骨皮牛膝酒浸一宿焙各三兩熟地黄三兩焙舶上茴香鹽炒二兩右為末用前項藥酒浸兎絲子酒澄清作麵糊為丸如桐子大每服五十丸空心食前温酒送下日進一服如要疾黒前件藥内加人參茯苓菖蒲各一兩若服此藥大忌葱白韮薤蒜之物常服養精神氣血壯筋骨補腎水滑肌膚駐容顔黒髭髮此藥甚効騐烏金丸一名巨勝丸治滋血氣壯元陽髭髮反黒方見本門補益諸疾類真人換白丸出御藥院方治血氣不榮髭髮衰白白芷甘菊花桂去皮苣勝子茯苓去皮各三分牛膝酒浸切焙蓽澄茄各半兩覆盆子一分連子草一兩右為末煉蜜和丸如桐子大每服空心温酒下三十丸晩食前再服二十丸飲少酒行藥力兼治風疾一名烏金丸用温麵糊為丸太乙䕶命丸治元臟虚損兼實臟腑變白返黒滿骨髓令風邪不能侵久服除百病益精血延年却老甘菊花麥門冬去心焙枸杞子焙白术人參白茯苓逺志菖蒲石上者桂去皮各六兩熟地黄焙右擇開成日搗羅為粗末取春採生地黄五十斤絞取汁同藥末於銀石器内逐旋入地黄汁微炒候入盡汁焙乾再搗為末煉蜜和丸更入酥少許同搗三千下丸如桐子大每服空心食前清酒下二十丸漸加至五十丸復漸減至二十丸週而復始覆盆子丸出御藥方壯筋骨益精明目黒髭髮覆盆子去萼逺志去心杜仲炒絲地膚子炒香各一兩枸杞子焙乾破故紙鹽炒山茱萸取肉山藥另取末栢子仁炒香另研各二兩胡桃肉去皮一兩另研右為細末將山藥末同白麵酒糊丸如桐子大每服四五十丸空心酒下加減仙茅丸出御藥院方强筋骨益精神明目黒鬚鬢仙茅二斤米泔浸五日去赤水用銅刀子去皮用銅刀剉碎夏月止浸三日隂乾不見日秤一斤蒼术二斤米泔浸五日或二日亦得去皮焙乾一斤車前子十二兩枸杞子一斤栢子仁微炒黄搗茯苓去皮茴香炒香各八兩生地黄焙乾熟地黄焙乾各四兩右為末酒煑糊和丸如桐子大每服五六十丸食前温酒下日二服漸加至七八十丸木香丸滋隂養正補腎秘真堅固骨髓調榮衛悦顔色黒髭髮山茱萸不去核蓮花蘂各一兩白茯苓木香各二兩破故紙兎絲子酒浸三日焙乾各五兩胡桃仁半斤微去油研爛右為末煉蜜和丸如桐子大每服七十丸温酒送下空心每日一服仙茅丸出御藥方治男子真氣不足常服强筋骨益精神明目黒髭髮仙茅二斤糯米泔浸五日去赤水用銅刀去皮銅刀剉取一斤夏日止浸三日隂乾不見日舶上茴香半兩蒼术二斤米泔浸五日或三日去皮焙乾取一斤馬藺花栢子仁各半兩椒紅二斤醋炒取紅一斤熟地黄一斤焙乾半斤右為細末醋煑糊為丸如桐子大酒亦得每服三十丸至四十丸或五十丸食前温酒下日二服漸加至七八十丸草還丹出聖濟總錄治氣血虚瘁髭髮變白牛膝酒浸切焙熟地黄焙枳殻去穰麩炒地骨皮各一兩兎絲子二兩酒浸一宿時研爛入諸藥右為末煉蜜和木臼再杵千下丸如桐子大如菉豆大每服三十丸温酒下空心食前一方鹽湯下草還丹出聖濟總錄治氣血虚瘁髭髮變白生地浄洗石菖蒲節宻細者牛膝酒浸切焙地骨兎絲子入鹽少許乗熱取末肉蓯蓉酒浸一宿細研切焙各等分右為末煉蜜和丸如桐子大每服以丹砂為衣空心温酒下四十丸日午再服二十丸一月内百疾俱退一年白髮俱黒身體有力顔色如童睡少慾薄十年之後預知前事延壽丸一名平補乾地黄丸出聖濟總錄治諸虚及虚風烏髭髮牛膝酒浸切焙乾地黄焙枳殻去穰麩炒地骨皮各一兩兎絲子二兩酒浸一宿研爛入諸藥末右為末煉蜜和木臼中再杵千下丸如菉豆大每服三十丸温酒下空心食前一方鹽湯下五精酒治萬病髮白返黒齒去更生黄精四兩天門冬三斤去心松葉六斤白术四斤枸杞子五斤洗右皆用生者内釡中以水三石煑之一日去滓取汁漬麴如家釀法酒熟取清任性飲之一劑常年補養忌鯉魚桃李雀肉等青蛾丸一名杜仲丸出御藥院方治黒髮去風長年及肝腎虚腰脚腿重痛脚氣常服壯筋骨補虚損益精髓返老還童方見本門補虚痼冷類魏將使蛾丸益髮令黒出本草以椰子漿塗頭南燭煎出本草益髪髭及容顔兼補煖方以三月三日採南燭葉并蘂子入大净瓶中乾盛以童子小便浸滿瓶固濟其口直閉處經一週年取開每日一二次温酒服之每酒一盞調煎一七極有神効靈芝丸出聖濟總錄治氣血不榮變白返黒三葉酸一斤隂乾黒桑椹一斤暴乾右為末煉蜜和丸如彈子大每服温酒化下一丸日再枸杞酒出聖惠總錄治精血虚損變白輕身枸杞子三斤生地黄汁三升右每以十月壬癸日面東採枸杞子先以好酒二升於瓷瓶内浸二十日了開封再入地黄汁不犯生水者同浸勿攪之却以紙三重封頭候至立春前三十日開瓶空心煖飲一盃至立春後髭髮黒勿食蕪荑葱何首烏丸一名二多丹補煖臟腑袪逐風冷利腰膝强筋骨黒鬢髪駐容顔方見本門補益輕身延年類白术酒