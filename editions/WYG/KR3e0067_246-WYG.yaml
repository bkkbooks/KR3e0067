方右每夜用鹽塗擦腿膝至足甲淹少時却用熱湯泡洗昔有人得脚氣諸方不效得此方常洗不再發蘸脚椒湯出聖濟總録専治脚氣攣腫腰絡不隨蜀椒六升未經蒸者用生紬作袋十二枚每枚長九寸納椒入袋中實築之仍拴袋口右將椒袋納釜中以酸漿水四斗五升入鹽二升煑五七沸用淨瓦甕子一口可容五斗者將所煑椒袋一枚及一半煑取汁乘熱入瓦甕中候其湯冷煖通脚即以脚入甕踏椒袋上蘸仍以湯頻頻從骭靣淋之若甕中椒袋覺冷即換釜中熱者其湯或冷亦換釡中熱湯其使了湯并椒袋却用釜中以微火温之當令熱亦須於宻室中勿令風吹若兩脚覺髀牽風如蟲行頭項肢體皆有汗出腹中鳴此是氣下即止若汗後覺心氣悶可取冷飯吃三五口以鹿脯下之若覺微利皆是病壯通泄也若未愈即隔日或三日取舊湯袋等依前法踏蘸還以得汗及腹鳴為度其蘸脚湯只可離脚靣三四寸不可過踝宜食酥蜜薑湯并鹿肉治脚氣發過心膈悶者宜用此方出聖濟總録右取新磚兩口鑿中心作孔如毬子大勿令透過即將炭火燒令通紅用米醋潑之便納蜀椒於磚孔中以物盖上㸔温煖即去韈以脚踏磚上立愈一方以甕盛椒水下著火煖之懸板為橋去湯二寸許以脚踏板柱脚以綿絮宻塞勿令泄氣若疲即出入被以粉摩之一食久更入甕常令甕下火不絶勿使湯冷如此消息不過七日得伸展并腫亦消麻黄裹足方出聖濟總録能治久蘊風濕足多冷麻隠痛難行夜常轉筋如風所吹此皆是脚氣之候右以麻黄二斤剉碎炒令極熱以帛纒裹二足不得透氣良久脚上有汗候麻黄温不用却着綿夾襪勿令風吹如此三五次永除病根爐子法右掘地爐子一個濶一尺二寸掃拭令置新磚半頭在爐中心用細莖炭十斤燒令通赤候炭消及一半為度取去炭用釅醋四升同白馬通八斤和成泥宻封地爐子四圍俱徧將藥丸一粒置磚上伸脚踏之被盖覆三二時辰汗盡方出脚然後用藥淋洗淋洗藥三節通方出聖濟總録石楠節杉木節茵芋蒴藋原蚕沙麻黄根松木根萆蔴根煮絮灰柳蟲糞右各三兩細剉用水一斗五升煑至一斗乘熱淋洗附子散出聖濟總録専治脚氣連腿腫滿久不瘥附子一兩去皮臍生用右為散用生薑汁調如膏塗腫上藥乾再塗以腫消為度蒴藋薰蒸方治脚氣筋攣不能行及乾痛不腫日漸枯瘁或腫滿緩弱右取蒴藋三斤和根葉剉長二三寸穿地作一坑靣闊一尺以柴截置於坑中燒令微赤灰火淨以蒴藋布坑四邊側布一行正布一行次以故氊盖坑口候蒴藋萎更著新者一二斤坑傍鋪薦席坐以杉木板置於坑底以脚踏板上薰之以綿衣覆脚周徧勿令氣出如射人熱甚開歇片時還納脚於坑中其四邊或有熱處即隨熱處著蒴藋布之如病人困即止安穏煖臥以綿衣盖勿令露風飽食以補之三五日一薰重者不過三五薰即瘥又方出聖惠方専治脚氣腫滿大效右以黑驢糞三斗鹽四兩相和拌令温即於甑上蒸一炊久取炊湯淋濃汁稍候熱氣定即淋蘸脚切宜避風又方出聖惠方萆蔴葉二斤右件藥細剉和勻每分為四度以水三斗煑取二斗去滓㸔冷煖於避風處淋蘸桑葉煎出聖濟總録専治脚氣曽用諸方蘸脚後宜服白桑木用生白椹者採取輭條或帯葉者亦得細剉一石右納大釡中以水一石煎至五斗更旋添水五斗以慢火煎令常沸再减至五斗去滓澄清納浄釡内更煎至二斗濾去滓納鍋中慢火熬膏約至二升如稠􅄳即止傾入通油瓷甕内收藏每日空心取一匙須含化嚥之如嘔逆不下亦可和粥食之服至一七日當覺四肢通暢頻頻泄氣以後兩脚或腫勿怪乃得藥力病瘥之候也金牙散方見本門風熱脚氣類専治脚氣牛膝酒一名側子浸酒方専治脚氣濕痺不仁脚弱不能行常服方見諸痺門風濕痺類治脚氣上生風毒瘡腫疼痛宜此淋蘸方出聖惠方槐白皮二兩桑枝三兩苦參二兩蒴藋二兩黄蘖三兩白礬一兩為末右剉以水一斗煑至六升去滓下白礬末冷熱得所宻室中淋洗瘡上治脚氣脚上生風毒瘡腫不瘥宜用藥敷之方出聖惠方地骨皮二兩苦參三兩槐根白皮三兩蛇床子二兩鹽一兩羊蹄根三兩右細剉和勻分為二度以漿水五碗煎至五七沸去滓㸔冷煖漸漸洗之後以故帛淹乾得後散子一方敷前散治脚氣脚上生風毒瘡腫不瘥宜用藥敷之方出聖惠方蚕炒二兩杏仁一兩膩粉五錢右先於銚子内炒蚕沙杏仁令焦黑搗細羅為散入膩粉研令勻漸漸敷瘡上不過三五度瘥又方出聖惠方菘菜花一兩赤小豆一兩五錢黄連二兩右搗細羅為散旋旋敷瘡上又方出聖惠方爛蜆子殻一兩五錢黄連一兩馬齒莧菜三分右搗羅為細散頻敷瘡上效脚氣浸法出仁存方専治痛不可忍者正宜用此小便或自己者或童子者尤好右煖令温用二馬桶浸二脚桶口用紙單之類隔其氣膝痛者用高桶浸至膝為妙冷則再温牛膝散一名硼砂牛膝三物散専治脚氣不能食方見本門脚氣上氣類附子膏一名神明膏専治脚氣風毒疼痛及緩弱無力方見本門風濕脚氣類薰洗方石楠葉左纒籐一名鷺絲籐荆芥葱沙木右不拘多少水五升煎至三升先剪去患脚指甲用藥水在盆内將脚閣在盆沿上以布綿遮圍薰令汗出通手於腿上淋洗至脚足存出指頭候水冷方連指頭洗更先一靣用晩蚕沙一升於銚内炒熱候揩脚乾了起身立將銚内蚕沙傾在地上却將患脚踏在熱沙上如此三五次立效薰洗方治脚氣黄耆一兩蛇床子一兩木通一兩五錢防風五錢莾草二兩荆芥二兩右為麄末濃煎湯極滚沸閣在桶上薰令通手時即洗之須是露出指不可洗烏頭剉散淋洗脚氣川烏頭生官桂川椒各一兩葱二莖右為剉散水一斗煑五升乘熱蒸氣先薰後以衣覆之勿泄氣後可通手淋渫洗石楠湯治淋渫脚氣大㦸川烏頭炮去皮臍頑荆葉草烏頭生去皮尖杜仲剉炒斷絲川練子肉川椒去目石楠葉藳本去土焙右各等分㕮咀每用一兩五錢水五升煎三五沸乘熱薰淋洗渫拭乾勿令見風七寶散出楊氏家藏方専治經絡寒濕腿臂作痛屈伸不能此藥舒筋止痛散風去濕晚蚕沙微炒一升蛇床子炒一升肉桂去麄皮荆芥穗乾荷葉以上三味各三兩藳木去土一兩五錢川烏頭炮去皮臍一兩鷺鶿藤散出楊氏家藏方専治淋渫腿膝疼痛鷺鷀藤蘇方木右件各等分㕮咀入定粉少許每用一兩水五碗煎數沸乘熱洗薫候通手即洗薰脚氣法出楊氏家藏方用薦茭草一大把須是夫妻床上舊者剉作短叚置在舊大酒瓶内用火燒之以患脚在瓶口上薰脚心久而脚腿上汗盛出立效防風浴湯出掦氏家藏方専治風濕脚氣氣血凝滯皮膚麄澁不自潤澤荆芥穗四兩苦參地骨皮白牽牛赤小豆以上四味各三兩白蒺藜炒去刺防風去蘆頭白殭蠶炒去絲嘴香白芷萆蔴葉杉木蒴藋葉以上七味各二兩木鼈子一兩微炒令焦黄色當歸洗焙獨活去蘆頭吴茱茰湯洗七味以上三味各一兩右件為細末每用五錢水四碗入連根葱白五莖擘開同煎至五七沸傾出入朴硝末二錢重攪勻先薰候通手淋洗如神湯出朱集驗方能治一切風寒暑濕瘴諸般脚氣張定馬家本金毛狗脊去毛吴茱茰生用連核木鼈子去殻各一兩山茱茰生用連核右㕮咀分作四次每用水五碗煎數沸乘熱薫後去滓淋洗治風毒脚氣遍身冷方出廣南四時攝生論蕓臺子天南星烏頭右等分為散以薑汁調塗脚心覺體煖便洗之膏貼方出永類鈐方皂角木鼈草烏南星肉桂乳香没藥右醋熬成膏貼脚心或加大黄川椒牡丹皮吴茱茰當歸巴豆白芷醋酒浸一宿以不入水猪脂慢火上煎令藥色變黄勿令焦黑去滓依法成膏日三四度炙摩之又方出永類鈐方用生薑汁調草烏末亦可治脚痛成瘡出本草先剉水蓼煑湯令温熱得所頻頻淋洗候瘡乾自安脚氣春夏防發附論夫風脚毒氣春則由輕夏則彌盛入秋漸可至冬自歇凢春夏霖雨不節土地卑濕濕熱之氣從地而起上蒸至脚膝體虛之人易入風毒故春夏可宣洩風氣以防脚氣動也方側子酒出聖濟總録専治脚氣春夏盛發入秋腫消氣定但苦脚弱不能屈伸皮膚不仁當以服此側子半生半炮獨活去蘆頭丹參五加皮炙薏苡仁各三兩人參蜀椒去目閉口者炒出汗茵芋葉各一兩金牙碎綿裹磁石碎石碎綿裹各八兩牛膝切焙石斛去根節各四兩芎藭乾薑炮天雄炮製去皮臍石膏碎桂去麄皮當歸切焙各一兩五錢白术萆􅐺防風去苖熟乾地黄水茱茰生用白茯苓去黑皮細辛去苖葉各二兩右㕮咀如麻豆大可用生絹袋盛入净器中清酒七斗漬之秋冬七日春夏五日量人性飲之日五六服常令酒力相續以唇痺為度若丈夫素有冷者加孔公蘖子鍾乳等多用三五兩少用一兩其人有虛熱去熟乾地黄加生乾地黄五兩服此酒須㬰炙三里穴風市穴伏兎穴以泄毒氣補洩石斛丸出聖惠方専治脚氣肝腎臟久積風虛每遇春夏動發脚膝煩疼心胸滿悶膀胱攻心腹虛脹筋脉拘急神思昏沉大小腸秘澁宜預服石斛一兩去根節牛膝五錢去苖萆􅐺五錢剉附子五錢炮製去皮臍芎藭五錢羚羊角屑五錢天麻五錢海桐皮五錢剉桂心五錢乾蝎五錢微炒沉香五錢山茱茰五錢白蒺藜五錢微炒去刺酸􅀥仁五錢微炒補骨脂五錢微炒五加皮五錢當歸五錢川大黄二兩碎剉微炒枳殻一兩麸炒微黄去瓤乾生地黄一兩檳榔二兩鹿茸五錢塗酥炙令微黄色去毛獨活五錢郁李仁一兩湯浸去皮微炒右為細末煉蜜和搗三五百杵丸如梧桐子大每於食前以温酒送下三十丸沉香散出聖惠方専治脚氣春夏方發或肝腎風虛脾氣乏弱但覺昏悶不欲飲食宜服之沉香三分木𤓰一兩乾者防風五錢去蘆頭羚羊角屑五錢桂心五錢熟乾地黄一兩訶棃勅皮一兩人參五錢去蘆頭牛膝三分去苖酸􅀥仁五錢微炒白茯苓三分石斛一兩去根節黄耆三分附子一兩炮去皮臍白术三分羌活五錢甘艸五錢炙微赤剉右為散每服四錢水一中盞入生薑半分􅀥三枚煎至六分去滓不計時候温服羌活散出聖惠方専治風毒脚氣春夏預防發動宜服䟽風利氣心腹壅悶脚膝煩疼羌活一兩黄耆五錢剉赤茯苓五錢生乾地黄三分羚羊角屑一兩杜心五錢赤芍藥五錢酸棗仁五錢微炒當歸五錢枳殻一兩麸炒微黄去穰木香五錢芎藭五錢川大黄一兩剉碎微炒防風五錢去蘆頭檳榔五錢甘艸五錢炙微赤剉右為散每服四錢水一中盞入生薑半分煎至六分去滓食前温服枳殻散出聖惠方専治脚氣春夏防發或稍心腹壅悶脚膝煩疼大腸不利小便赤少枳殻三分炒令微黄去穰木通五錢剉五加皮五錢獨活五錢黄芩五錢羚羊角屑五錢川大黄一兩剉碎微炒赤芍藥一兩紫蘇莖葉三分赤茯苓三分甘艸五錢炙微赤剉檳榔一兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓每於食前温服犀角散出聖惠方専治脚氣春夏防發稍覺風壅氣滯臟腑不通心煩神悶脚膝時疼犀角三分大黄一兩剉碎微炒木通三分剉檳榔一兩茈胡一兩去蘆頭川升麻三分枳殻一兩麸炒微黄去穰黄芩三分獨活三分赤芍藥三分芎藭三分甘艸五錢炙微赤剉右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服牛膝湯治先患脚氣恐夏月發動常服牛膝酒浸切焙白茯苓去黑皮防風去蘆芎藭各六兩人參桂去麄皮獨活去蘆頭附子炮製去皮臍各五兩甘艸炙剉當歸切焙各四兩磁石二十兩煨醋淬七次研細杏仁十五粒去皮尖雙仁炒右剉如麻豆大每服五錢水一盞半生薑一􅀥大生地黄汁一合同煎至一盞去滓空心日午温服檳榔散出聖惠方専治脚氣春夏防發宜服此䟽風調氣檳榔一兩獨活五錢赤茯苓五錢枳殻一兩麸炒微黄去瓤沉香五錢羚羊角屑五錢川大黄一兩剉碎微炒芎藭五錢甘艸五錢炙微赤剉右為散每服四錢以水一中盞入生薑半分煎至六分去滓食前温服大腹皮散出聖惠方専治風毒脚氣春夏防發宜服疏風利氣大腹皮一兩剉木香五錢訶梨勒皮三分羚羊角屑五錢川大黄一兩剉碎微炒枳殻一兩麸炒微黄去穰獨活五錢前胡三分去蘆頭赤茯苓一兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓不食前服木𤓰散出聖惠方専治脚氣肝腎風虛防春夏發動心腹氣脹筋脉不利腰脚無力胸膈痰滯不思飲食木𤓰皮一兩乾者檳榔一兩桑白皮一兩剉紫蘇莖葉三分木香五錢半夏五錢湯浸去滑七次枳殻三分麸炒微黄去穰羚羊角屑三分防風五錢去蘆頭右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服效木香散出聖惠方専治脚氣春夏預防發動令人心悶煩壅木香一兩訶梨勒皮二兩檳榔三兩右為散每服不計時候以童子小便一小盞牛乳一合生薑汁一匙同煎三五沸每服食前調下二錢以快利為度一方不用童子小便用烏牛尿一盞煎服如無牛尿以水代之老幼皆可服木𤓰飲治脚氣夏月可服生木𤓰二枚去皮穰切碎以水五升煑至二升半去滓收貯白术二兩搗羅為末右每服用白术末三錢以木𤓰汁一盞入生薑一棗大煎至七分去滓空心溫服日三服脚臭汗方黄蘗皮二錢黄連黄丹白礬飛蛤粉㣲炒各二錢龍腦少許右碾為極細末將足洗淨亮乾以輭綿撲藥末在足上三五次永無臭氣治脚汗方杜礬光粉天竹黄右各等分為末摻之治脚汗白礬乾葛等分右二味為末每用五錢水三碗煎十數沸熱洗逐日一次經三五日自然無臭也又方治脚汗右用楊花着襪内或如綿絮入脚内尤佳普濟方卷二百四十六
