body:
  text: 普濟方卷二百四十六明周王朱橚撰脚氣門江東嶺南瘴毒脚氣附論夫江東嶺南之地卑濕春夏之間氣毒彌盛又山水濕蒸致多瘴毒風濕之氣從地而起易傷於人所以此病多從下上脚先屈弱然後痺疼頭痛心煩痰滯吐逆兩脛微腫小腹不仁壯熱憎寒四肢緩弱精神昬憒大小便不通毒氣攻心死不旋踵此皆瘴毒脚氣之類也方金牙酒一名大金牙酒方出聖濟總録内治瘴毒氣中人口喎靣戾半身不遂手足拘攣厯節腫痛甚者小腹不仁名曰脚氣及治風冷濕痺金牙一斤側子炮製去皮臍附子炮製去皮臍天雄炮製去皮臍各三兩人參二兩五錢肉蓯蓉切焙二兩獨活去蘆頭八兩白茯苓去皮用二兩當歸切焙白术防風去叉黄耆山芋細辛去苖葉桂去麄皮茵芋炙石南微炙芎藭地骨皮五加皮湯浸炙各三兩丹參五兩五錢杜仲去麄皮炙七兩蓽薢三兩磁石煆醋洗七次另研十兩厚朴去麄皮薑汁炙薏苡仁一斤白芷三兩麦門冬去心焙五兩石斛去根八兩萎㽔二兩枳殻去穰麸炒一作枳實桔梗各三兩牛膝去苖切五兩五錢狗脊去毛三兩生地黄二升蒴藋四兩黄芩去黑心逺志去心蔓荆實各三兩一作牡荆子右剉如麻豆大每半料以絹袋盛入甕甕中用好酒八斗浸宻封經七日後每服取一合温服之漸加至二合三合常令有酒氣相續以效為度藥力和善主治極多凡是風虛四體小覺有風疴者皆須将服之服者依方脩合不得浪有加減大鼈甲湯出聖惠方専治江東嶺南瘴毒脚氣或其中即脚膝腫滿心神悶亂寒熱痰逆頭痛口乾肩背拘急肢節煩悶不欲飲食鼈甲二兩塗醋炙黄去裙襴杏仁五錢去皮尖雙仁炒吴茱茰五錢湯浸乾焙陳橘皮湯浸去白穰五錢防己一兩去蘆頭麻黄五錢去根節白术五錢知母五錢川升麻五兩貝齒四枚燒通赤赤茯苓芎藭焙犀角屑各五錢麦門冬一兩焙去心川大黄一兩碎微炒烏梅七枚去核炒石膏一兩當歸葳蕤赤芍藥各五錢甘草五錢炙半夏五錢湯浸去滑炙人參五錢去蘆麝香木香羚羊角屑各五錢右為散每服四錢以水一中盞入生薑半分薤白二莖赤小豆三十粒􅀥三枚煎至六分去滓不計時候温服小金牙散療南方瘴癘疫氣脚弱風邪鬼注金牙五分牛黄一分天雄蓽􅐺黄芩麝香蜀椒去汗由䟦雄黄硃砂烏頭各二分細辛萎蕤各二分桂心莾草各二分犀角乾薑蜈蚣一枚長六寸者炙黄連四分右搗篩合牛黄麝香搗三千杵温酒服五錢每日三夜二以知為度綘囊盛帯男左女右一方寸若省病問孝不避夜行塗鼻人中晨昏霧露亦塗之忌猪肉冷水生血物生菜等五加皮散出聖惠方専治江東嶺南春夏不正暑濕欝蒸臟腑虛羸攻擊脚氣發動兩脚枯疼或即浮熱腫滿或即皮肉焦燥不能久立筋急抽痛或氣衝心悶亂胸膈疼逆四肢不仁腹脹壅悶目眩頭旋並宜服之五加皮一兩薏苡仁一兩五錢微炒防風五錢去蘆頭牛膝三分去苖赤茯苓三分獨活五錢丹參五錢枳殻五錢炒川升麻三分麻黄一兩去根節羚羊角屑防己各三分桂心五錢黄耆三分石膏二兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服茯苓湯出聖濟總録専治春夏暑濕欝蒸毒氣攻擊脚氣發動兩脚痠疼或浮腫熱滿或皮毛焦乾或脚疼不能久立筋急抽痛時衝心悶胸膈痰積惡心欲吐四肢疼痛十指不仁腹脹氣妨頭旋目眩眼暗白茯苓去黑皮三兩薏苡仁炒四兩丹參獨活去蘆頭防風去叉各三兩五錢牛膝酒浸切焙防己五加皮黄耆枳殻去穰炒升麻各三兩麻黄去根節四兩桂去麄皮一兩五錢羚羊角鎊二兩石膏研如粉十兩右除石膏外剉如小豆大每服五錢水一盞半浸一宿来晨煎取八分去滓空心温服之日二病消其病不吐不利如心腹氣脹每服加連皮大腹一顆心胸虛熱加麦門冬去心一分小腹痛加芍藥黄芩各一兩心胸有痰加旋復花一分肺氣咳嗽加杏仁去皮尖十四枚桑根白皮一分小便數加杜仲末一分語言謇澁加木通一分腎虛耳聾加磁石一錢七分不睡加酸􅀥仁末一錢七分懼渴不止加蔞一分金牙散出聖濟總録専治嶺南瘴癘疫氣脚氣等病金牙研一兩一分牛黄研一分天雄炮製去皮臍萆􅐺黄芩去黑心麝香川烏炮製去皮臍各五錢細辛去苖葉萎蕤桂去麄皮莾草炙犀角鎊乾薑炮各三兩蜈蚣炙一枚黄連去鬚一兩右搗羅為散每服三錢用温酒調下日三夜二以效為度又以囊盛方寸男左女右帯之赤茯苓散出聖惠方専治瘴毒脚氣胸膈氣不通乍寒乍熱頭痛心悶不欲飲食宜服此方赤茯苓川升麻各一兩甘艸炙微赤剉三分知母一兩犀角屑木香各三分前胡三分去蘆石膏一兩旋復花五錢麥門冬一兩去心紫蘇葉檳榔各一兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服治脚膝疼痛不欲飲食猪苓一兩去黑皮赤茯苓一兩茈胡一兩去苖吴茱茰一分湯洗焙乾炒甘艸剉炒木香黄芩犀角屑各三分檳榔一兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服知母散出聖惠方専治瘴毒脚氣發寒熱頭痛脚膝腫疼腹中妨悶不能飲食則無味口乾多渴宜服之知母黑升麻各三兩木香五錢赤茯苓三分鼈甲一兩塗醋炙去裙襴黄芩三分茈胡一兩五錢去蘆㯽榔一兩五錢去蘆𤓰蔞根三分右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服木香散出聖惠方専治瘴毒脚氣初覺嘔逆煩悶頭昏不食宜服此方木香五錢檳榔一兩半夏五錢湯浸去滑犀角屑五錢旋復花五錢赤茯苓一兩陳橘皮一兩湯浸去白瓤紫蘇葉一兩甘艸五錢炙微赤剉右為散每服四錢以水一中盞入生薑半分香豉百粒煎至六分去滓不計時温服羚羊角湯出聖濟總録専治江東脚氣盛發上衝脾胃胸膈妨悶噫氣不暢煩熱口渇眼暗不識人羚羊角鎊犀角鎊各一兩五錢升麻旋復花木香各一兩大腹皮五顆連皮子剉枳殻去瓤麸炒麥門冬去心焙前胡去蘆各一兩一分右麄搗篩每服五錢水一盞半煎至一盞去滓空腹服之以快利為度大腹湯服前羚羊湯得快利後浮熱未除氣復嘔逆不下飲食胸膈有痰腹常如空虛大腹七顆連皮子剉犀角鎊木香各二兩前胡去蘆頭一兩五錢旋復花一兩半夏湯浸七次去滑焙赤茯苓去黑皮各二兩右搗篩每服五錢以水一盞半生薑一分拍破煎至七分去滓空腹服日再升麻湯服前二方氣退客熱未定乾渇不止胸膈尚煩脚疼痛升麻白茯苓去黑皮各二兩青竹茹一兩木香一兩黄芩去黑心一兩五錢石膏三兩麥門冬去黑心焙二兩桑根白皮剉二兩右麄搗篩每服五錢水一盞半生薑一分拍碎棗二枚擘破煎至八分去滓温服日再犀角散治脚氣瘴毒心神悶亂犀角一兩木香五錢射干一兩川升麻一兩麥門冬一兩去心茈胡一兩去苖甘草五錢炙剉鼈甲二兩塗醋炙黄去裙襴右為散每服四錢以水一中盞入生薑半分煎六分去滓不計時温服厚朴湯治嶺南脚氣攻心痛悶亂厚朴去麄皮生薑汁製木香檳榔各一兩右各搗為末先以水三盞入生薑一分厚朴末三錢煎取濃汁二盞下檳榔木香末各二錢再煎一兩沸去滓不拘早晚温服當快利一兩行為效療冷脹毒悶方右服金牙散以湯煮桃李杵和散如棗核大服卒患取反吐者一服四分用之若神良茯苓湯治江東脚氣盛發兩脚浮腫小便赤澁心腹妨悶氣急坐臥不得赤茯苓去皮桑根白皮剉防己木香黄芩去黑心各三兩木通細剉二兩大腹七顆連皮子剉郁李仁湯浸去皮研二兩五錢右搗篩每服五錢水一盞半生薑一分拍碎煎至七分去滓早晚食前服犀角湯治脚氣之疾先起嶺南稍來江東皆由卑濕得之或微覺疼痺或兩脛腫滿行起痺弱或上入腹不仁或時冷熱皆其候也若先覺此證食嘔不下氣上逆者方見本門脚氣嘔逆類半夏湯治江東初患脚氣不識其候始脚脛酸重惡心頭旋嘔吐腹中刺痛胸中塞悶時憎寒壯熱如瘧者皆脚氣所為半夏湯洗去滑薑汁製黄芩去黑心各二兩旋復花三分赤茯苓去黑皮麥門冬去心桑根白皮各二兩大腹連皮子剉五顆右麄搗篩每服五錢水一盞半入大􅀥二枚擘破生薑一分拍碎煎取七分去滓空腹服之木香湯治嶺南脚氣卒發衝心悶亂木香郁李仁湯浸去皮炒各四兩防己一兩半紫蘇莖葉一兩細剉桑根白皮剉赤茯苓去皮各二兩大腹四顆連皮子剉右搗篩每服五錢水一盞半入生薑一分煎至一盞去滓不拘時温服如倉卒不及者只以檳榔末三錢水一盞煎至七分服之亦效獨活浸酒治嶺南脚氣發動起氣欝蒸熱毒風盛脾肺常有虛熱心神煩悶脚膝酸疼獨活去蘆頭生乾地黄焙各三兩海桐皮二兩生黑豆皮一大升桂去麄皮一兩生沃實根一斤大麻子仁一升炒右剉如黑豆大以生絹袋盛用無灰酒三斗同納瓷甕中浸之冬七日夏三日春秋五日不限早晚隨意飲之常令有酒氣酒盡更添藥無味即再作大麻子湯治脚氣瘴氣乍寒乍熱狀如瘧疾脚腫氣上攻心悶咳嗽攤緩脚弱風毒頭靣腫大麻子仁微炒升麻射干菖蒲甘草炙麻黄去根節大黄剉碎醋炒各一兩右搗篩每服五錢以水一盞半入豉半合同煎至七分去滓下芒硝一錢更煎一兩沸空心日午近晚各一以微利為度觧毒熱有腫滓敷之凡覺氣滿輙服一劑佳犀角湯出聖濟總録専治江東脚氣小欲動作漸覺心悶脚脛酸疼煩熱不止犀角鎊木香前胡去蘆頭各一兩青竹茹三分麥門冬去心一兩五錢大腹二顆連皮子剉右麄搗篩每服五錢以水一盞半煎至一盞去滓不拘時候温服旋復花湯出聖濟總録専治江東脚氣發動旋吐痰心悶氣膈見食惡心心下拘急旋復花一兩赤茯苓去黑皮桑根白皮剉半夏湯洗七遍去滑各二兩紫蘇莖葉細剉一兩大腹皮五枚連皮子剉右麄搗篩每服五錢以水一盞半大棗二枚擘煎取一盞去滓納生薑汁一合空腹服之如要疏利入檳榔二錢湯飲下吴茱茰湯出聖濟總録専治江東脚氣已發兼宿冷氣衝心煩痛大便秘腹脹如鼓漸至悶亂吴茱茰湯浸焙炒一兩一分木香厚朴去麄皮薑汁炙各二兩大腹連皮子剉五枚牽牛子一兩另搗末湯飲下右除牽牛子外麄搗篩每服三錢以水一盞半生薑一分拍碎煎取七分去滓納牽牛子末一錢攪令勻空心服之以大小便通利為度效也香豉湯出聖惠方専療嶺南瘴氣煩熱脚氣衝心悶氣欲絶方香豉一升梔子十四枚擘升麻二兩右切以水四升煑取一升半分為三服即定也檳榔湯出聖濟總録専治嶺南脚氣卒發衝心悶亂檳榔末大腹皮末陳橘皮末各為麄末三錢右方以童子小便并水各一盞煎大腹皮陳橘皮末至一盞半次下檳榔末再煎取沸去滓漸漸温服未退再服一方香豉三升犀角八兩剉末右香䜴如前不能九蒸九曝三蒸三曝亦得用一生絹袋貯用好美酒九升漬之五日許其犀角末散著袋外每服常攪令犀角末入酒中服三合量性增减日三服其酒夏月初作多恐壊不耐久可用此方䜴三合橘皮生薑葱細切任意調和先熬油令香熟次下諸物熬熟以綿裹納鐺中著酒任性飲之若能常飲此酒極利腰脚嶺南常服此酒必佳及卑濕處亦佳又恐有脚氣似者即宜服之一方出肘後方先煎牛乳三升令减半以五合服硫黄末一兩服畢覆取汗勿令得風中間更一服至暮又一服若已得汗不更服但好好將息䕶之若未瘥愈後數日中亦可更作若常服亦可煎為丸北人服此療脚多效但須極好硫黄取預偹之旋復花飲出聖濟總録専治乍處江嶺未服水土食飲不下兼痺濕脚氣發動時復心悶靣目脚浮膝腫氣乏唇口青黑胸膈煩熱見食嘔吐心腹妨痛冷氣結聚