意加减温壯附論夫小兒温壯者由臓腑不調内有伏熱或挾宿寒皆搏於胃氣足陽明為胃之經主身之肌肉其胃不和則􅂔行壅澀故藴積體熱令兒多睡名為温壯小兒大便其糞黄而臭此腹内有伏熱宜將服龍胆湯若糞白而酢臭則挾宿寒不消當服紫䨇丸輕者少服令黙除之其増令㣲痢皆當節乳哺數日令胃氣和若不節則病易復其胃氣令腹滿再三利尚可過此傷小兒矣方竹葉湯治小兒五嵗温壯腹中急滿臭不利或有㣲腫亦主極羸不下飲胸痞手足逆冷竹葉切一升小麥半升甘草炙黄芩苽蔞根澤㵼茯苓知母白术大黄各一錢生姜一兩半桂心二銖嬰要瓀用三錢麥門冬半夏各二兩當歸十八銖人参三兩右㕮咀以水七升煮小麥竹葉取四升去滓内藥煎一升六合分四服消滯丸治小兒熱疾後腹中不調飲食不節腹滿温滿及中客忤兼乳冷有所為停滯一名雀屎丸雀屎白牛黄研各一錢芎藭芍藥乾姜甘草炙各半兩麝香研小麥麫大黄剉炒研當歸焙人參三分右為末煉蜜和丸如麻子大火温熟水下三丸欲下都服五丸一方加黄耆黄芩各二分炒柴胡湯治小兒脇下實股惕惕已發温壯傷寒柴胡當歸辛細各三分黄芩大黄升麻五味子紫苑各二分牛黄杏仁四十个去皮炒右切以水五升每服二合日進三服夜二服量兒大小以意用之一方無牛黄以麝香代之竹葉湯治小兒夏月患腹中伏熱温壯徃来患下痢竹葉切小麥去泥土五合黄芩一兩六銖茯苓去皮柴胡人參麥門冬甘草炙各半兩右㕮咀以水四升煮竹葉小麥二升去竹葉小麥再下諸藥煮取一升半分三服若小兒夏月忽壯熱炙手洞下黄溏氣力惙然脉極數用此方加大黄二兩再服得下即瘥胡黄連散治小兒温壯常欲飲水胡黄連犀角屑牛黄細研入龍胆去蘆頭川大黄炙㣲赤剉知母研各二錢麥門冬半兩去心焙右為散每服以沙糖水調下半錢量兒大小以意加减牛黄丸治小兒温壯驚熱牛黄天竺黄腦麝並細研熊胆各一分犀角屑胡黄連末山梔子仁末郁李仁湯浸去皮研各半兩右同研令勻以糯米粥和丸如麻子大不計時候以薄荷湯下三丸量兒大小以意加减生犀牛黄丸治小兒風邪温壯發熱驚搐頭痛痰涎犀角屑一分牛黄要研極細龍腦各一分麝香各半錢研天南星牛胆内櫃者末藿香葉為末各二兩甘草末雄黄各半兩研右合研如粉煉蜜和丸如鷄頭大每服一丸不計時候薄荷湯下柴胡湯治小兒腹中伏熱温壯徃来一名柴苓散柴胡去蘆豆三分黄芩去黒心一兩人參甘草炙赤茯苓去黒皮各半兩麥門冬去心半兩右㕮咀每服一錢水七分小麥五十粒竹葉十片煎四分去滓温服量兒大小加减服之麝香丹治温壯人參去蘆頭胡黄連鈎藤赤芍藥每一分右為細末次入好麝香一錢牛黄半錢拌糯米粥和丸黍米大每服五粒至七粒煎陳橘皮湯下不拘時天南星丸治挾熱痰盛温壯夜卧不穏天南星泡為末半夏湯浸七次焙為末膩粉研滑研各一分巴豆二十四粒去心以水浸一宿不出油右先研巴豆令熟次下藥末以糯米粥和丸如菉豆大每服三十丸更量兒大小加减㵼痢米飲下取食葱湯下驚悸薄荷荆芥湯下清凉飲子治小兒多温壯熱實及兒頰赤渴五心煩躁睡卧不安四肢驚掣及因乳哺不時寒温失度令兒血氣不理腸胃不調或連滯欲成伏熱或欲發驚癎或風熱結核頭面瘡􅟻目赤􅍋痛瘡疹餘毒一切壅滯並宜服之大黄四兩甘草炙當歸芍藥右水一升六合煮取八合分為三服此方四味飲而元和紀用經乃有療小兒百疾加减四味飲仍云自四味飲以下紫丸等方謂之有嬰七寳紫陽道士一名保子七聖至寳方專一書者此方也此飲理小兒胎寒腹脹痛乳哺不時温壯發熱吐利不常諸驚掣縮二十五癎肌膚喜瘡遇時而發作口瘡惡核赤目黄痩大小變蒸用芍藥白者赤者各半如宣泄即用純赤者生用二分癘疫温壯肺邪不利寒熱時加二分通用四分也利小便用赤色者及驚狂瘡疥赤目㵼血當歸肉多枝少氣香者生用二分欲血脉流暢不為瘡痬惡核者及止腹中痛胎寒腹痛啼聲不已者加二分通用四分也如理寒熱破積觧温壯以下加大黄如牛舌𦂳硬用蜀中者如欲泄痢宣蕩推陳去熱即用河西錦紋者生用二分葛氏元用四分紫陽保子方减二分下利者又减一方只用一分也甘草赤黄斷理縢而易折者炙剉二分虛熱者加一分通用三分也及觧煩止渴寒熱邪氣大能安神定驚和而不寒有國老之號也四味以水三升煮去滓月内兒服一杏核量之日三百日兒服一粟殻量之日一二三嵗兒粟殻量之為一服日三嵗兒以上隨大小増之兼乳母服尤良依上法増减正藥外若發驚及温壯外有冐寒邪以去節麻黄一分水三升煮去味去滓内正藥如本方服之者若驚風反折戴眼掣縮加細辛四分内一料正藥増水至四升煮取一升五合若中風身體强戴眼者加獨活二分内一料正藥中水如正方煎服大神驗二黄湯治温壯大黄黄芩各四分甘草三分炙細辛二分右水五升煮取一升二合三服此方小兒數服不癎若卓驚加鈎藤二分大效胡治云此治兒有病大效牛黄散治小兒温壯身體常熱不止牛黄細研甘草炙㣲赤剉各半分梔子仁子芩柴胡去苗龍胆去蘆頭各一分右為散入研藥令勻每服半錢以金銀温水調下不計時候服量兒大小臨時分减服之升麻湯治小兒温壯不觧升麻柴胡去蘆頭麥門冬去心焙黄芩去黑皮甘草炙剉各半兩人參黄耆剉各一兩右粗搗篩每服一錢以水八分煎取五分去滓量兒大小分加减服黄芩散治小兒温壯或下痢之後而熱不除舌大不能含乳胸中有痰作聲口中生瘡妨乳兼驚悸搐搦宜服黄芩一兩鈎藤半兩甘草炙㣲赤剉半兩川芒硝半兩川大黄剉研㣲炒一兩蛇蛻三寸炙黄右為散每一錢以水一小盞煎至五分去渣入牛黄少許量兒大小分减温服犀角散治小兒身體温壯心神不安犀角屑鈎藤黄芩梔子仁川大黄剉研㣲炒半兩甘草一分㣲炙赤剉研右為散每一錢水一小盞煎五分去滓量兒大小分减温服天竺黄散治小兒健驚温壯不可喫乳天竺黄細研鈎藤赤芍藥人參去蘆豆甘草炙㣲赤剉牛黄細研各半兩右為散入研藥更研令勻不計時候以蜜水調下半錢量兒大小以意加减七寳散治小兒温壯伏熱傷寒煩躁面赤氣喘夜熱曉凉當歸芍藥甘草炙大黄蒸熟一錢麻黄去節三分白术麩炒荆芥穗各二錢右細末每服半錢至一錢水半盞葱白一寸薄荷一葉煎至三分温温併三服要㵼熱服百病飲子治小兒多温壯熱實大黄四分甘草炙芍藥各二分右以水一升六合煮取八合分為三服五味子湯治少小有熱服藥大下後身温壯胸中有結熱及治傷寒病乆不除瘥後復劇痩瘠骨立五味子三分黄芩柴胡芒硝麥門冬去心黄連石膏末各二分甘草炒當歸各一分大黄四分右水二升七合煮一升三合去滓内芒硝令洋二百日兒服三合日進三服夜一服有痰必吐得下便止一方有前胡無柴胡煩熱附論夫小兒臓腑氣實血􅂔盛者則表裏俱熱若然煩躁不安兼皮膚壯熱也方大青散治小兒􅂔壅煩熱心躁目赤大青半兩川大黄半兩㣲炒牛黄半錢研細硃砂細研甘草炙犀角屑𤣥參川升麻梔子仁各一分右為散入研了藥都令勻不計時候以沙糖水調下半錢服量兒大小以意加减黄芩散治小兒臓腑壅實心神煩熱睡卧不安黄芩川大黄剉㣲炒甘草炙川芒硝麥門冬去心石膏各半兩右為散每服一錢水一小盞煎至五分去渣量兒大小以意加减不計時候温服人參散治小兒煩熱多驚人參一分去蘆天竺黄一分細研甘草半兩炙鈎藤一分牛黄半分細研右為散不計時候煎竹葉湯調下半錢量兒大小以意加减龍胆丸治小兒心臓氣壅煩熱悶亂龍胆一兩去蘆黄連一兩去鬚鉛霜半兩細研牛黄一錢細研鐵粉一分細研右為末都研令勻以粟米飯和丸如菉豆大不計時候以薄荷蜜水下五丸量兒大小以意加减犀角散治小兒煩熱昏悶多睡犀角屑半兩青黛一分硃砂一分蛇蛻灰一錢右為散每服以温水調下半錢量兒大小加减服之一方有代赭一分硃麝散治小兒煩熱昏悶多睡青黛三分乾地龍七條㣲炒為末麝香半分硃砂一分右研為散每服以飲調下半錢量児大小加减服之治小兒寒熱噦方用好乳二合姜汁一合銀噐中慢火煎過五六沸一嵗兒飲半合量兒大小加减服之治小兒煩熱驚風以慎火草即景天草水煎洗浴潮熱附論夫小兒潮熱者身體發熱作止有時故謂之潮熱由保飬失宜風冷邪氣客於分肉之間每於衛氣至則真邪相搏故令發熱若欲知在何經絡當觀間甚之時屬何臓腑各循其經以調之治潮熱五者一因傷寒之後餘毒不觧或潮熱宜服脫甲散兼小柴胡湯二因痞􅂔有塊隂陽不均成潮熱先服黎漿飲次三後煎丸三癥積食傷冷滯脾胃不和成潮熱先服脫甲次塌􅂔下之後調胃四隂陽不和臓腑虛怯成潮熱或冐暑濕脾瘧成潮熱單服煨姜散五瘡疹後餘毒不觧成潮熱宜服大連翹飲子更與助胃氣潮熱謂熱来之有期或一日一發或二日一發不越三日先寒後熱正定来者昜治亂日者難理痰起脾胃即是瘧候同出而異名又有單熱潮發乆作疳長作癥積滯痞氣皆脚冷肚熱者便與下之須量熱輕重分數而利有蟲多者取之少則安之取蟲宜在於春旺冬實之時其或兒壯蟲盛不拘此說方大連翹飲治證在前論連翹瞿麥穗滑石車前子牛旁子炒紅芍藥各一兩山梔仁木通川當歸防風各半兩黄芩去心荆芥穗各一兩柴胡去蘆甘草炙各二兩蝉蛻去足一分右㕮咀每服一大錢水一小盞煎取半盞風痰熱變蒸熱麥門冬去心前實熱單熱加大黄燈心煎瘡疹熱未出前已出後紫草當歸煎胎熱肺熱傷寒後餘毒熱瘡疹餘毒熱加薄荷煎癰癤毒熱加大黄朴硝煎此藥觧利心經邪熱心與小腸受盛小腸乃水竇常宜通利壅則結滑則脫熱則澀盛則淋平凉心經三焦自順不得疾作而觧證成而療者踈怠有之矣一五味加湯使在前纔覺藴熱寒邪風邪胃入肺經心將之心不受觸𫝊於小腸或閉或澀或赤或白淋瀝不通榮衛不順壅之作疾其發多端以至膈熱眼目腫赤唇口白瘡津液不生唾涕稠盛雖在表裏但得其宜驚風悉皆能散化痰熱亦自消除連翹之功不虛設尔梨漿水飲治證在前論柴胡人參黄芩去心前胡秦芁去土甘草炙青蒿取在頭用童子小便浸一二次日就為度右件等分每服一錢水一小盞入生藕生梨梨條亦得薄荷二葉生地黄一寸同煎至半去滓通口空心食前服兩滓併煎作一服一嵗兒半錢此方治脾積寒熱其狀如瘧乃由脾氣隂陽相盛故也其寒在先隂盛於陽其熱在後陽盛於隂隂陽循之經絡𫝊歸於本依前復作不越三日而止重則頭疼嘔逆乆則二三嵗不歇左脇有塊小者如桃李大者如杯碟治法下去癥積痞塊自消然寒熱亦未能自觧宜先與服梨漿飲連渣併三服定去寒熱了方可下積問之藥性寒凉何以禦之荅曰所謂先寒後熱猶陰陽勝伏逓相更變陰積陽虧逆虛愈重所服梨漿飲以毒攻毒藥以青蒿以寒禦寒其熱不有寒必無加自然榮與衛和隂與陽合寒熱再潮未之有也梨漿之攻妙哉絶倫稍能知用無不獲安若患三載不過服兩服曽經十年只此方妙用至純使人飲歎而已犀角散治小兒骨蒸肌痩頰赤口乾日晚潮熱夜有盗汗五心煩躁四肢困倦飲食雖多不生肌肉犀角末地骨皮麥門冬枳殻去穰麩炒大黄蒸柴胡茯苓赤芍藥桑白皮黄耆人参鼈甲塗醋炙焦各䓁分右粗末用每服二錢入青蒿少許水煎量兒大小加减一方有秦芁無大黄人參柴胡湯治小兒潮熱不觧飲食不長肌肉人參柴胡去苗甘草炙白茯苓去黒皮芎藭各一兩知母焙升麻藁本天門冬去心焙各半兩獨活去蘆頭栢子仁研各一分右粗搗篩每服一錢水半盞入生姜二片青蒿一穗同煎至三分去滓食後温服五嵗以上十五嵗以下入醋炙鼈甲半兩每服二錢水一盞煎六分服柴胡飲治小兒潮熱柴胡去蘆半兩人參知母焙羚羊角鎊甘草炙陳橘皮湯浸去白焙赤茯苓去黒皮半夏湯浸七遍去滑焙木通剉芍藥各等分右粗搗篩每服一錢水一盞入姜一片同煎至五分去渣温服日二白鮮皮湯治小兒潮熱白鮮皮人參白芷防風去乂黄芩去黒皮知母焙沙參犀角鎊各半兩甘草炙一分右粗搗篩每服一錢水八分入薄荷三片煎五分去渣分温二服青蒿湯治小兒潮熱青蒿焙知母焙甘草炙各二兩半夏湯浸七遍姜汁製一分常山當剉焙二兩鼈甲醋炙黄去裙襴枳殻去瓤麩炒秦芁去苗切各四兩右粗搗篩每服半錢水半盞入生姜一片烏梅肉少許同煎三五沸去渣温服犀角湯治小兒潮熱骨蒸羸痩乆咳嗽喘生犀角鎊半錢柴胡去苗秦芁去苗土各一兩白术赤茯苓去黒皮木香各半兩甘草炙一分右粗搗篩每服一錢水七分入小麥三七粒同煎至六分去滓温服日三二連丸一名猪胆丸治小兒血熱每日午間發熱遇晩則凉胡黄連宣黄連赤芍藥各半兩右為末獖猪胆汁和成劑入在胆中懸胆用漿水煮熟取出飯為丸如小豆大三十九丸米湯送下日三服無時又有瘰壅證相似兒多鼻結洩㵼或腹中􅂔滿或時嘔逆宜服之秦芁散治小兒潮熱减食蒸痩秦芁去頭切焙甘草炙各一兩甘薄荷葉半兩切焙右為粗末每服二錢水一鍾煎至八分食後温服銀棗湯治小兒潮熱往来睡多盗汗肌體痩弱乆不瘥者麥門冬去心地骨皮逺志去心人參去蘆頭白茯苓去皮甘草炒防風去蘆頭切上七味各二錢紫石英一錢石膏一錢羚羊角一錢龍齒二錢右件每服二錢水六分煎至四分去渣温服乳食後臨卧服天竺黄散退熱理驚觧唇紅面赤煩躁焦啼𤓰根甘草欝金天竺黄連翹防風牙硝别研各等分右為末每一錢潮熱燈心茅根湯下急驚竹葉湯下黄鷄煎丸治小兒潮熱肌痩盗汗黄連去鬚二兩鶴蝨蕪荑仁各半兩秦芁去苗土柴胡去苗知母焙各一兩史君子去皮一兩右搗為末以黄雌鷄一隻重斤許者籠之食以麻子候五日去毛令净於項下開竅去腸肚洗浄乾入前藥末於腹内以線縫之取小甑先以黒豆鋪甑底厚三寸安鷄在甑内四旁以黒豆圍裹上以黒豆寸半盖之自巳時炊至申時住候取鷄去腹中藥及筋骨趐以浄肉研和得所更少入酒麵糊丸如小菉豆大每服十丸量兒大小加减空心臨卧麥門冬熟水疳痩骨熱十五歳以上温酒下鼈甲丸治小兒潮熱煩渴引飲脇腹滿脹羸痩多汗鼈甲醋炙去裙襴黄耆剉柴胡去苗各一兩枳殻去瓤麩炒白术人參各半兩木香一分右搗羅為細末浸炊餅心和丸如麻子大二歳兒十丸温粥米飲下日更量兒大小加减服之人參芎歸散治小兒童虛勞閧熱潮或遍身生瘡北參當歸北前胡柴胡逺志浸去肉姜汁焙地骨皮防風北梗半夏麯各一錢半川芎茯苓麥門冬去心用各二錢枳殻製一錢半研赤芍藥一錢甘草三錢焙右剉㕮咀每服二錢水一小盞姜三片紫蘇三四葉煎服發瘡者兼服猪肚黄連丸方見疳類别作小丸不惟治瘡治渴其發熱而肚脹者米飲常服二十丸地骨皮飲治小兒潮熱盗汗心忪及骨蒸勞熱地骨皮白茯苓去黒皮瞿麥穂赤芍藥山梔子仁生乾地黄焙甘草炙各一兩大黄剉炒柴胡去苗木通剉各一兩人参木香各半兩青橘皮湯浸去白焙一分右粗搗篩每服一錢水七分入竹茹少許同煎至四分去渣温服不拘時候量兒大小加减六合湯治小兒血熱每日己午間發熱遇晩則凉當歸大黄川芎熟地黄白芍藥柴胡各三兩一方加桂半兩名琴飲子亦治頭熱身凉并五心熱名四順飲加川芎一倍右為末一錢水半盞煎三分無時三嵗用一錢酸棗仁飲治小兒風虛潮熱齗齒譫言酸棗仁一兩蛇蛻皮炙三條人參羌活去蘆頭各半兩甘草炙一兩右粗搗篩每服二錢水一盞入薄荷三葉同煎七分去滓温分三服量兒大小加减百一羗活餅治小兒潮熱羌活去蘆頭芎藭白殭蠶炒鷄蘇各一兩乾蝎十四枚炒右粗羅為末煉蜜和丸如鷄頭大揑作餅子每服一餅荆芥湯下連翹湯治小兒潮熱方見嬰孩傷寒門夾驚傷寒類金連散尅效散治小兒潮熱往来乆而不觧煩渴昏倦肌痩减食地骨皮二兩防風去蘆一兩半人參去蘆黄芩甘草炙葛根四味半兩右件每服二錢水半盞煎至三分去渣温服不拘時柴胡地骨皮湯治小兒潮熱飲食不為肌肉黄瘁夜卧不安時有虛汗柴胡去苗地骨皮桔梗焙各一兩甘草炙半兩右粗㨶篩每服一錢水一小盞煎至五分去滓食後臨卧温服量大小加减甘露飲治潮熱乍来乍去潮熱心煩面赤口乾如瘧寒水石石膏欝金甘草薄荷各半分右為末每服一錢食後薄荷湯調下牡蠣散一名黄耆散治血虛自汗潮熱牡蠣煆黄耆生地黄各等分右㕮咀每服二錢水半盞煎至三分去渣服一方加浮麥煎蜀漆湯治小兒潮熱及百日兒壯熱􅂔息雖得歇眼不開小便黄赤蜀漆甘草知母龍骨牡蠣各半兩右㕮咀每服水四升煮取一升去渣一嵗兒少温服半合日再保童丸治小兒肌痩五心潮熱觧骨熱長肌肉益􅂔丹砂研一分大黄剉炒赤芍藥梔子仁各半兩知母切焙一兩人參胡黄連各半兩鼈甲去襴裙醋浸炙各一兩右件除研外搗為細末入丹砂同研浸蒸餅為丸如菉豆大每服五丸至十丸温蜜湯或人參湯下通心飲治心氣通小便退潮熱分水榖及治旋螺風木通去皮莭連翹瞿麥梔子仁黄芩甘草各等分右剉散每服二錢水一盞燈心麥門冬煎春加蝉蛻防風夏加茯苓黄芩車前子秋加牛旁升麻冬加山梔子連翹瘹􅂔用鈎藤川練子加白茅根竹葉口瘡地黄野苧揚湯旋螺風如赤腫而痛者先用土牛膝澤蘭煎水洗普濟方巻三百八十五
