昏憤鹿茸去毛酥炙二兩天麻一兩半附子炮去皮臍巴㦸天去心菖蒲各一兩石斛去根剉一兩半萆􅐺桂去粗皮乾蠍去蘆牛膝酒浸切焙天雄炮去皮臍獨活去蘆丹參當歸切焙杜仲去皮各一兩肉蓯蓉酒浸切焙一兩半磁石煨醋碎細研水飛一兩右為細末煉蜜和匀搗三五百下丸如桐子大每二十丸加至三十丸空心及晚食前溫酒下乾漆丸出指南方治肉骨痺皮寒鹿茸乾地黄各四兩乾漆半兩右為細末煉蜜丸如梧桐子大每服三十丸空心溫酒下血痺附論夫血痺之狀形體肌膚如被㣲寒所吹者是也盖血為隂邪入於血而痺故謂之血痺宜先鍼引陽氣後以藥治之聖惠方云風血痺者由體虚故隂邪入於血經故也入於血經而為痺故為風血痺也其狀形體如被㣲風所吹此由優樂之人骨弱肌膚充盛因痺勞汗出膚腠易開為風寒所浸故也診其脉自㣲而澁在寸口闗上小𦂳者為風血痺也急鍼引陽氣令脉和𦂳之則愈方黄耆酒一名小黄耆酒出鮑氏方治血痺及諸痺甚者四肢不遂風濕寒痺舉體腫痛疼不仁兼治風虚痰癖四肢偏枯兩脚弱手不能上頭或小腹縮痛脇下攣急心下有伏水脇下有稍飲夜夣悲愁不樂恍惚善忘由風虚五臟受邪所致或久坐腰痛耳聾卒起眼眩頭重或舉體脹腫疼痛不思飲食畏寒冷胸中痰滿心下氣塞及婦人産後餘疾風虚積冷不除者大黄剉生一兩山茱茰二兩乾姜炮三兩半黄耆獨活去蘆防風去叉甘草炙白术蜀椒去目并閉口者炒出汗附子炮去皮臍牛膝芎藭細辛去苗葉各二兩當歸切焙桂去皮二兩半葛根秦芃去苗上烏頭炮製去皮臍以上三味各二兩右剉如麻豆用夾絹嚢盛貯以清酒一斗浸之春夏五日秋冬三日初服三合曰再夜一漸増以知為度虚弱者加蓯蓉二兩下利者加女萎三兩多忘加石斛菖蒲紫石英各二兩心虚加茯苓人參各二兩山藥三兩酒盡可更以酒二斗重漬服之不爾可曝滓搗下篩酒服方寸匕不知少增之服一劑得力令人耐寒冷補虚治諸風冷神妙壯人服無熬揀老弱人㣲􅆈揀乾地黄丸出聖濟總録治血痺去邪益心悅顔色壯筋力生乾地黄焙二兩半五味子桂去粗皮秦芃去苗土獨活去蘆附子炮去皮臍石斛去根各二兩半逺志去心一兩萆􅐺炒肉蓯蓉酒浸切焙兎絲子酒浸另搗蛇床子炒牛膝酒浸切焙狗脊去毛各一兩半訶梨勒皮梹榔剉各三兩半桃仁去皮尖雙仁炒一兩半右為細末煉蜜和丸如桐子大每日空心食前溫酒下二十丸萆薢酒出聖濟總録治血痒及五臓六腑皮膚骨髓肌肉筋脉等疾不問新久萆􅐺防風去叉兎絲子杜仲去粗皮剉炒黄耆菊花天雄炮去皮臍石斛去根生乾地黄焙地骨皮續斷金方煨醋淬石南肉蓯蓉酒浸切焙蜀椒去目閉口者炒出汗各一兩右㕮咀夾絹嚢盛貯以無灰酒五升浸二七日每日月存性服候減一升即旋添酒一升藥薄即别製年老人亦可服萆􅐺丸出千金方治血痺手足足􅍙麻不仁遊走無定風痺等證萆􅐺炒山芋牛膝酒浸切焙各一兩白术半兩地膚子炒半兩乾漆炒令煙出蠐螬天雄炮去皮臍各三分澤瀉一兩熟乾地黄焙一兩茵芋去皮莖一錢狗脊去毛半兩山茱茰一兩車前子炒三分右除蠐螬研入外搗羅為末和令匀煉蜜和丸如梧桐子大空心食前溫酒下十丸至十五丸日二夜一地黄丸治風寒痺走無定處及諸風痺方見本門行痺類茵芋酒出聖濟總録治風血痺肌體手足痿弱四肢拘攣茵芋去粗皮附子炮去皮臍天雄炮去皮􅢥烏頭去皮臍秦芃去土女萎防風去叉羊躑躅防己石南細辛去葉苗桂去粗皮各一兩右㕮咀如麻豆夾絹囊盛貯以清酒五升浸之冬七日夏三日秋五日春五日初服一合日三漸增萆薢丸治風邪遊走無定處名曰血痺方見本門風冷痺類防風湯出醫方大成治風血痺皮膚不仁防風去叉二兩甘草炙剉半兩獨活去蘆三分赤茯苓去皮當歸秦芃去苗土各一兩茵芋去粗蒸半兩桂去粗皮三分杏仁湯去皮尖雙仁麺炒半兩右搗篩每服四錢水酒各七分入生姜五片煎至八分去滓溫服不計時候一方有赤芍藥黄芩各一兩無茵芋芍藥湯一名側子散出聖惠方治風血痺身體不仁肉冷赤芍藥側子炮去皮臍桂去粗皮麻黄去根節萆􅐺炒當歸切焙丹砂各一分細辛去苗葉甘草炙剉各半兩右剉如麻豆每服三錢水一盞入生姜五片同煎至六分去滓溫服不計時候麻黄散出聖惠方治風血痺肌膚不仁四肢緩弱麻黄三分去根節烏蛇二兩酒浸炙令黄去皮骨白术防風去蘆桂心當歸各三分剉㣲炒蛜􅖉一分㣲炒去足附子一兩炮去皮􅢥右為細散每服不計時候以豆淋酒調下一錢茵芋㪚出聖惠方治風血痺體虚風邪入血肌膚頑痺茵芋天雄炮去皮臍石南附子炮去皮臍桂心秦芃去苗防風各一兩去蘆川烏頭半兩去皮臍躑躅花半兩醋拌匀炒干右為末每服不計時候以溫酒調下一錢黄耆湯出千金方治血痺隂陽俱㣲寸心口闗上㣲尺中小𦂳外證身體不仁如風狀者蜀黄耆人參芍藥桂心各二兩生姜六兩大棗十二枚右㕮咀以水六升煮取二升服七合三服令盡黄耆五物湯出三因方治骨弱肌重困疲勞汗出卧不時動搖加以㣲風遂作血痺脉當隂陽俱㣲尺中少腎身體如風痺狀黄耆芍藥桂心各等分右剉散每服四大錢水二盞姜五片棗三枚煎至七分去滓食前服日三一方有人參腸痺附論内經曰腸痺者數飲而出不得中氣喘爭時發飱泄夫人腸者𫝊導之官其所以𫝊導者皆沖和之氣今風寒濕三氣於虚客乗腸間則邪留而和氣閉矣故其證數飲而氣不得出中氣喘争時發飱泄大小腸氣痺水道不通故雖多飲而不得溲便并氣於大腸使糟粨不化故中氣喘角爭時發飱泄也方木香丸出聖濟總録治腸痺腹脹癘痛時復飱泄食不消化小便秘澀木香白术桂去粗皮蕪荑炒髙良薑剉各一兩訶梨勒煨用皮一兩半乾姜炮三分附子炮去皮臍一兩肉豆蔲去殻半兩甘草炙各半兩厚朴去皮生姜汁炙過二兩右為末以麹末煎作糊和搗三二百杵丸如梧桐子大食前生姜棗湯下二十丸吳茱茰散治腸痺寒濕内搏腹腸滿氣急大便飱泄吳茱茰湯洗焙乾炒肉豆蔲仁乾姜炮甘草炙各半兩陳橘皮湯去白焙髙良姜厚朴去粗皮生姜汁炙各二兩縮砂仁白术各一兩右為散每服一錢稀粥飲調下食前服草豆蔲散出聖濟方治腸虚寒濕内攻腹痛飱泄草豆蔲陳橘皮湯去白各一兩桂去皮木香白术當歸切焙白豆蔲仁髙良姜各五錢右為散每服一錢煎生姜棗湯調下食前服訶梨勒湯出聖濟録治腸痺飱泄腹脹氣痛飲食不化訶梨勒煨用皮一兩半附子炮去皮臍一兩木香半兩當歸切焙三分桔梗炒半兩肉豆蔲去殻三分吳茱茰湯浸七次焙乾炒一分陳橘皮湯浸去白焙三分甘草炙剉一分右搗篩每服三錢水一中盞入生姜半分棗二枚煎至七分去滓食前稍熱服木香散出聖濟録治痺腹脹飱泄小便不利杏仁三兩訶梨勒焙皮半兩附子炮去皮臍一兩乾姜炮一兩厚朴去粗皮生姜汁炙二兩甘草炙半兩枳實去穰麺炒一兩赤茯苓去皮一兩當歸炒一兩右為末每服二錢粥飲調下食前赤茯苓丸出聖濟録治腸痺腹滿喘急小便不利大便飱泄赤茯苓去黑皮白术桂去粗皮各二兩訶梨勒煨去夥木香陳橘皮湯去白焙厚朴姜汁炙各一兩右為末煉蜜為丸如梧桐子大每服三十丸米飲下空心食前日二次服訶梨勒丸出聖濟録治腸痺飱泄腹脇脹滿訶梨勒煨用皮當歸㣲炒黄連去鬚白术厚朴去皮姜汁炙各一兩乾姜炮三分木香三分右為末煉蜜和搗三二百下丸如梧桐子大每服三十丸粥飲下不拘時候胞痺附論内經謂胞痺者少腹膀胱按之内痛若沃以湯澀於小便上為清洟夫膀胱為州都之官津液藏焉氣化則能出矣今風寒濕邪氣客于胞中則氣閉不能化出故胞滿而水道不通其證少腹膀胱按之内痛若沃以湯􅉣於小便以足太陽經氣閼故熱而痛也上為清涕以足太陽經其行者從巔入絡腦腦氣下灌出於鼻竅則為清涕矣方治胞痺臍腹疼痛小水不利山芋附子炮去皮臍續斷各一兩杜仲去皮酥炒巴㦸天去心一兩半桑螵蛸切焙以麺令炒黑色為度一分逺志去心三分石斛去根各三分鹿茸酥炙去毛龍骨兎絲子酒浸一宿另搗三錢五味子山茱茰桂去皮各三分生乾地黄焙另于木臼内搗肉蓯蓉酒浸去皮切焙各一兩右為細末别搗者相合令匀煉蜜為丸如梧桐子大每服空心溫酒下三十丸黄耆湯治胞痺少腹膀胱按之内痛黄耆目剉當歸切焙甘草炙黄芩去黒心逺志去心焙五味子芍藥人參赤茯苓去黑心麥門冬去心焙澤瀉生乾地黄焙桂去皮防風一兩乾姜半兩右搗篩每服五錢水二盞入羊腎一隻細切大棗二枚擘破同煎至一盞去滓空心服秦芁酒一名羊膝酒治胞痺方見本門腎庳類人參湯治胞痺小便不利人參芍藥麥門冬去心焙當歸切焙生乾地黄酒浸去土焙甘草炙芎藭逺志去心赤茯苓去黑皮五味子各一兩黄芩去心半兩桂去粗皮三兩乾姜炮一兩右搗篩每服五錢先用水二盞煮羊腎一㕠至一盞半除腎下藥末大棗三枚擘破同煎至一盞去滓空心溫服日二茯苓丸一名防風丸治胞痺少腹内痛方見本門腎痺方腎瀝湯出衞生寳鑑治胞痺小腹急痛小便赤澀桑螵蛸十枚切破炙令黄犀角屑麥門冬去心焙五加皮各一兩半杜仲去皮酥炙木通桔梗炒各一兩赤芍藥三分右搗篩每服五錢水一盞半入羊腎一㕠去脂膜切竹瀝少許同煎至一盞去滓空心服日再一方用桑白皮無桑螵蛸百合飲治胞痺補益生百合三兩赤茯苓去黒皮二兩麋角屑三兩麥門冬去心焙肉蓯蓉酒浸切各一兩半黄耆一兩薏苡仁三合右剉如麻豆大每服五錢水一盞半煎至八分去滓溫服空心日再溫腎湯治胞痺小便不利腰脊疼腹背拘急絞痛赤茯苓去黒皮白术澤瀉乾姜炮各四兩腎着湯出宣明論治胞痺小便不利赤茯苓去黒皮白术各四兩乾姜炮二兩甘草炙三兩右㕮咀每服四錢水二盞煎至一盞去滓溫服空心食前各一服此味溫腎内用前右㕮咀每服五錢水二盞煎至一盞去滓溫服空心食前各一服加桂亦得普濟方卷一百八十六
