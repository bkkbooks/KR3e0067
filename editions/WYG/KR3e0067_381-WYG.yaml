body:
  text: 普濟方卷三百八十一明周王朱橚撰嬰孩諸疳門急疳附論夫小兒急疳者由乳食不調甘肥過度之所致也凡甘味入於脾而動於蟲因成疳而傷臟腑若上蝕齒齗則生瘡出血齒色紫黒下蝕膓胃則生痢無恒肛門開張生瘡赤爛皮焦毛立乳食不消肌體羸痩若不早療之便至膏肓故曰急疳也聖濟云急疳謂疳熱急暴其狀唇口忽變青白齒齗腮頰疼痛赤黒朽爛膿血出宜鍼去惡血脈絡死䏎皆因甘肥過度風熱内積五臟俱虛蟲因虛動上蝕口齒攻過齗頰死在旬日罕有活者俗謂之走馬疳是也方雄黄丸治小兒疳羸痩下痢口内生瘡殺蟲雄黄細研蘆薈細研青黛細研硃砂細研龍膽去蘆黄蘖㣲炙剉黄礬焼令通赤當歸剉微炙白礬炒令汁盡細辛茛菪子水泊去浮者水煮芽出令黄甘草炙㣲赤剉以上各一分麝香一錢細研蚱蝉三七枚㣲炙去翅足乾蟾一枚塗酥炙黄右為末入上研藥令勻以麫糊丸如菉豆大不計時候以粥飲下五丸量兒大小以意加减三礬散治小兒急疳蝕口唇鼻黄礬青礬各半兩焼令枯白礬焼枯研麝香研石膽茛菪子㣲炙人糞焼莽草雄黄研白狗糞焼灰地龍各一分右搗研為細散每用半錢糝患處有涎吐之蝸牛灰散治小兒急疳瘡經藥醫未效蝸牛灰白狗糞灰􅎙蜋灰白礬灰人糞灰蘆薈蝦蟆灰蘭香簳灰蚺蛇膽蜘蛛灰地龍已上各一分右細研如粉葦管鈄批吹少許入鼻中如齒齗上有瘡即蜜和塗於紙上貼之下部有瘡即内之黄耆散治腎疳腐肉根候黄耆蜜炙牛黄人參天麻全蝎炙杏仁炙白茯苓川當歸熟乾地黄洗生地黄洗右等分為末每服小者半錢煎天門冬熟水調服麥門冬亦可白礬煮散治小兒牙齒急疳蟲齒并及口面腫開口不得臭爛疼痛不可止白礬焼灰防風去乂細辛去苗葉附子生用乾薑炮白术甘草炙半兩蛇牀子㣲炙一分藜蘆去蘆頭椒去目并閉口炒出汗各一分右羅為末每用一錢以無灰酒一盞煎十餘沸熱含冷吐日三以差為度熊膽散出聖惠方治小兒急疳傷臟腑上蝕口内齒齗作瘡赤爛世呼為走馬疳熊膽細研甜葶藶㣲炙蝦蟆灰白礬灰麝香細研雄黄細研蘆薈細研硫黄細研人糞灰以上各一分右為細散拌勻於有瘡處宜薄傅之如治鼻即取少許逐日吹鼻中三次以差為度一方無甜葶􅐗人糞灰用荆芥湯調下麝香膏一名九仙膏治小兒齒損爛及走馬急疳諸症麝香一分研極細猪牙皂莢取三定燒灰存性研白礬二兩緑礬一兩半同杵碎入銚與白礬互燒令枯研膩粉研水銀各半兩黄蘖去麄皮苦楝根白楊皮蜜陀僧各一兩右研為細末用無灰酒三升熬成膏先凈潄口塗之如乆患者取藥半匙并砒霜粉末各少許杵拌勻乾糁有津吐之白楊皮湯治小兒蝕唇口鼻急疳白楊皮剉一握地骨皮一兩蜀椒去閉口者及目炒出汗三十粒杏仁湯浸去皮尖雙仁炒蒼耳子各一兩髙良薑炙生乾地黄切焙細辛去苗葉各半兩右剉如麻豆大每用五錢水二盞煎十餘沸去滓熱含冷吐以差為度蟾灰丸出聖惠方治小兒急疳蟲口内生瘡腹大羸痩蟾灰地龍炒蝸牛殻炙狗頭灰人糞灰蘭香根灰麝香各一兩右研為細散用漿水調在紙上時用貼瘡如鼻中有瘡紙裹安鼻中有疳入腹以水浸蒸餅丸如菉豆大不計時候以粥飲下五丸日三服量兒大小以意加减治小兒急疳蟲蝕唇口及齒齗爛疼痛出聖惠方砒霜人糞灰麝香膩粉以上各半分銅緑胡桐淚蝦蟆以上各一分右研令細先用塩漿水洗過後用藥少貼之龍骨散出錢氏方治走馬口疳瘡砒霜一字粉霜半錢龍骨一錢定粉龍腦半字蟾酥一字右先研砒霜極細次入龍骨再研次入定粉等同入每用少許傅之護命散治小兒急疳唇臭爛齒宣腫乾蟾一枚五月五日取焼存性白龍骨搗研雄黄麝香石膽蘆薈各一分右研為細散每用少許傅瘡上治小兒急疳口中腫起鼻内生瘡出聖惠方人乳汁一合黄礬一􅀥大白礬灰一􅀥大青礬一􅀥大石膽一紅豆大川升麻半分右為末以綿裹内乳汁中浸經一宿乳有藥味用塗於口裏如鼻中有瘡滴入少許若有腫處先以三稜針刺破除去上血然後即塗此藥熊膽膏一名熊膽丸治小兒急疳口生瘡及諸疳方見本門一切疳類麝香散治小兒走馬急疳口臭牙齦損爛攻蝕脣鼻顋頰屢治未效敷此立騐麝香一錢黄礬一兩青黛半兩蘆薈雄黄水飛細研一錢右為細末有患者先以綿纒筋擦却齒齗蝕損死肉再以輕綿拭去惡血量瘡大小乾貼之毎日五次用之惡血併不多者又加定粉半錢同研勻敷一方無雄黄獨活飲子出活㓜口議治腎疽臭爛候牛黄大黄生地黄木香青黛各等分右為末每服一錢熟水調下人參散治腎潰爛候肉荳䓻炮胡黄連人參杏仁甘草炙右等分為末每服一錢小者半錢温熟水調服㯽榔散治腎疳宣露候木香㯽榔人參黄連甘草炙各等分右為細末每服一錢小者半錢温熟水調服一捻金散治走馬牙疳不能治者黄丹飛白礬飛青塩飛草錦燒灰麝香少許右各等分為細末先用温漿水凈洗無糨帛揾乾貼藥酸漿膏治小兒牙疳出血牙齗臭爛風牙走馬疳蚛等醋水草根生者一握細剉次冼亂髪纒褁成一圓草成小窠子結實紅色似抱子中心有如櫻桃又名若脯也皂莢一挺不蚛者搗剉附子去皮臍生為末半兩白礬研一錢麝香一皂大研留在乳鉢内右先用米醋一碗入酸漿草根及皂角慢火煎至半碗去滓入附子白礬末更熬成膏取出候冷刮入麝香乳鉢内研勻甆合取盛患者先用塩湯潄剔牙縫令凈然後以指蘸藥膏揩之如齗爛以帛子攤藥貼蟾蜍散治小兒走馬疳蟾蜍一枝去頭足及腸胃焼灰龍栢花地骨皮各等分無食子兩枚麝香研一錢右羅為末散每先以塩漿水浄漱口後以硝石末少許先貼一上次以此藥一錢貼之日三治小兒急疳蟲蝕口鼻及下部皆赤爛大蒜二兩甜葶藶半兩乾蝦蟆一兩地龍去土炙亂髪灰一分右搗篩相和入竹筒内置瓦中以煻灰火燒之取瀝少少塗兒口鼻顋頂及穀道等處蝦蟆丸治小兒急疳蝦蟆一枚去𤓰焼灰存性熊膽研麝香研白蕪荑各一分猪牙皂莢去皮子炙一分右為末煉蜜丸如菉豆大每服五丸至七丸米飲或温水下三四服如急疳曽退落牙齒者以倒流水化五七丸塗齒上治走馬疳方右用竹園中蚯蚓泥裹火煆通紅放冷為末如在唇鼻面上不得手抹以箆子調生油好粉傅患瘡上先以塩湯洗瘡净方上藥只一兩次苐三日和皮都落如口内瘡用藥乾傅立正散治馬疳牙疳白礬各一分銅綠半兩輕粉一分麝香少許人中白三錢枯礬一分右為細末先洗净疳然後上藥每日三次二次貼之大效粉霜散治小兒走馬疳瘡宜塗粉霜一兩天南星末一分黄丹半兩炙紫色麝香半兩定粉一錢右藥相和研令細先用塩水洗過以紙撚子揾藥掃在瘡上每日三四度差蚺蛇膽散治小兒急疳痒隨𤓰作瘡瞬息大如錢或在頭面口齒中宜𫝊蚺蛇膽三大個黄礬白礬灰蘆薈麝香以上各一錢右為末若頭面身上有瘡以清泔洗浥乾𫝊一大豆許良乆水漿即止重者不過三度差如在口齒宜頻貼之麝香丸治小兒急疳口鼻生瘡時痒不止宜用此藥大麻子一升以竹筒中焼取膏蝦蟆灰一分麝香一分人糞灰一分綠塩半分右細研如粉以麻子膏丸菉豆大内入兩鼻并口中湏以水更化㸃之日夜各一度㸃如下部有瘡即一日兩度内之一方𫝊瘡上必湏慎口㣲有效即减藥治走馬疳牙関風壅口内生膿及腐臭牙焦落膽礬蕪荑等分右煉煆研末乾糁又方白礬枯麝香右為細末净洗牙撲牙根數次用之良治小兒急疳蟲蝕口鼻及下部生瘡出聖惠方乾蟾一兩半兩為末半兩焼灰銷金銀甘堝一兩銀末一大豆許人糞灰一兩麝香右為細末有蟲蝕處即著藥粉之三七日以来勿食一切膩肥又方出聖惠方精白羊肉二兩蕪荑仁半兩豉一合川椒二七粒去白醬豆一匙右件藥相和爛研令細每取一􅀥大𫝊瘡上日三易之銅青散出危氏方治小兒走馬疳口内生瘡牙齦潰爛齒黒欲脱或出血臭氣丈夫婦人同川白芷半兩馬牙硝一錢銅青一分麝香一字右為末乾傅口角及擦齒上妙仍服蟾酥丸效青牛散出傅氏家藏方治小兒走馬牙疳齗潰爛由臟腑壅熱乳食不調肉有疳蟲上蝕齒其候唇痒痛牙齒黒上生瘡腦中乾熱氣薰蒸多臭氣蝸牛一枚大者燒存性青黛半錢麝香一字别研黄蘖二錢右為細末先以塩水洗患處揾乾用鵞毛㸃藥少許傅掃患處一方無黄蘖地骨皮散出活㓜口議治腎疳齗齶牙齒肉爛腐臭鮮血常出生乾地黄半兩真地骨皮細辛各一分五倍子炙焦二錢右為細末每用少許傅之頻與吃不妨議曰本經所載疳證有五謂五臟所受故得其名今止腎疳一臟其證却有五候最為𦂳要不可以泛常疾忽畧視之此疾迅疾可畏乃知走馬之號不誣初發之時兒孩口臭上干胃氣其臭漸漸進於齗内生瘡或腫或爛其齒焦黒又進從牙槽内𤼵瘡疱潰爛生膿又進熱逼齒齦時時血出其熱氣注乆牙齗腐壊槽寛齒脫六七嵗孩落盡不復更生豈可治療今以妙方宜速與隨其𫝊變而先理不待病已深而後藥也治小兒走馬牙疳蝕唇頰牙齒浮動宣露口臭至妙秋霜散出王氏慱濟方砒一錢粉霜膩粉各半錢麝香少許右研令勻每用一米粒許楷患處乳香丸治走馬疳如神乳香輕粉各半錢麝香少許砒半錢研右先將乳香研細入輕粉麝砒共再研用薄紙一韮葉濶藥内按過撏紙少許丸如黄米大臨卧將藥填在疳處至明則愈四物散治小兒走馬疳粉霜麝香石灰鈆丹炙紫色各一分右先研前三味細為散後入鈆丹再研勻如桃紅色用鷄翎掃之立效雄黄散治小兒急疳乃脾毒骨䐬風蝕動唇口雄黄一分水銀半錢與雄黄同研令星盡銅綠一錢麝香一字右用研勻以瓦合盛先以新綿揾去血甚者剪去惡肉貼之一日三𫝊之立聖膏出醫方妙選治急疳侵蝕人乳汁半分黄礬一粟大白礬一􅀥大石膽一豆大右件研細以綿裹内乳汁中浸經一宿㸔汁有味慢火熬成膏每用少許塗於口裏如鼻有瘡滴入少許若有腫處先以三稜針刺破除之去血然後塗此藥黄龍散治小兒疳蟲唇鼻銷金鍋下黄龍灰細研一兩麝香研一分銀末小豆大蟾蜍一枚一半焼灰一半炙乾搗末右為末散但有蟲處瘡上傅又方出聖惠方青礬半兩焼通赤黄礬半兩焼令汁盡麝香一分右件藥相和細研如粉有疳瘡處時用少許貼之五靈散出典藥方治小兒走馬牙疳漸生臭氣或連腮近耳懐爛並不知痛至於曽有落去下頰累日方死者梧桐律定粉砒霜雪白者麝香等分右各研細先洗患處净掺上一日未效再煎甘草湯洗再摻以至知痛見血出者肉漸生長而愈蟾酥散出全嬰方治小兒走馬疳牙齗臭爛侵蝕唇鼻甘草湯洗去皮令血出塗之亦治身上肥瘡但是疳瘡用之立效瘡乾好麻油調濕則乾用蚵蚾黄紙裹火煨焦黄連各一兩青黛一錢右為末入麝香研和依方用之又南星入雄黄熬煨入麝香為末傅之蘭香散出活㓜口議治小兒走馬疳牙齗潰爛以至出血齒落蘭香散方輕粉一錢重蘭香子一錢重蜜陀僧半兩醋淬右研如粉傅於齦上立效議曰嬰孩受病證候多疳良由氣欝三焦疳分臟内因腎虚而得疳名之曰急以走馬為喻治療頗難此等證候初作口臭多日臭息次第齒蝕名曰崩砂盛則齗爛名曰潰槽又盛血多曰宣露重則齒自脱名曰腐根既腐何由理之嗟乎豪家育子哺以甘肥腎堂乆受虛熱或縁母在難月恣味珍饈毒傅於兒原非偶然而作今將秘方述于後硫黄散治小兒急疳蟲蝕唇鼻齒口硫黄研半兩乾漆炒煙盡一両文蛤焼灰二兩右為散每用半錢入麝香少許研令細取故綿拭去瘡上惡血然後用藥傅之膽礬散治小兒走馬疳膽礬飛乳香研鈆丹飛各一錢右研為細末散每用紙撚子醮少許貼患處如肉紫爛藥到便紅麝香散治小兒急疳齒牙腐爛惡血口臭齒牙脫落麝香研銅録研各一錢黄連去鬚二錢右搗研為散以棗肉一枚用水研如泥入前末共研令勻患處傅少許以爛丁香葉覆之差肉消者可待肉生神效走馬疳出仁齋直指方治口齒出血臭氣銅綠半錢蜘蛛一枚右為研入麝香少許夾和擦齒如無蜘蛛用蝸殻二箇立應散治小兒走馬牙疳諸藥不驗者紅􅀥三十枚信少許右將紅棗去核却納信末少許各裹定火燒存性冷為細末每用少許乾貼牙疳瘡上又方傅齒立效散出活㓜口議鴨觜膽礬一錢重匙上煆紅研麝香少許右研勻每服以少許傅之齗上一方蟾酥一字加麝香和勻𫝊之議曰血之流行者榮氣之環轉者衛也變蒸之後飲食之間深恐有傷於榮衛而作疾氣或傷於毒血或傷熱所𫝊何臟病随以生盖小兒腎之一臟常主虛不可令受熱毒攻及腎臟傷於筋骨惟齒受骨之餘故先作疾名曰走馬極言其速也宜服藥甘露飲地黄膏化毒丹消毒飲其外證以前件立效散及麝酥膏傅之切忌喫食熱毒之物此疳不同常證及係無辜有作醫深䆒保全為上若用常方難望愈活雄黄散出經驗良方治小兒因豆瘡牙齦生疳蝕瘡雄黄一錢銅綠二錢右同研極細量瘡大小乾傅其上治走馬牙疳及治一切疳瘡惡瘡爛瘡等疾出百一選方右用小遺盆内白屑取出磁礶内盛貯用泥固濟炭煆紅取出將白屑細研入麝香少許貼于患處不過三兩次必效治小兒走馬牙疳右壁上蟲兒人中白末相和合為末傅乾貼亦可附子丸治小兒急疳蝕唇鼻附子炮製去皮臍黄蠟各半两右附子搗為末鎖蠟為丸内蟲孔中天南星散一名除疳散出全嬰方治小兒走馬疳蝕損筋骨宜速攻之天南星大者一枚雄黄皂子大右先用天南星當心剜作坑子次安雄黄一塊在内用麥麫裹合炭火内燒令煙盡取出候冷入麝香一字同研為細末先以新綿揾血然後於瘡上掺藥一日三次傅之一方加輕粉二金散出聖惠方治急疳毒盛蟲蝕却口鼻牙齒砒霜一分麝香半兩右件藥先將砒霜去紙上炙過後入麝香同研令細每用一字以鷄羽掠在瘡上日使三兩度隨時展去藥無令嚥津治小兒走馬疳瘡蝦蟆活者一箇螻蛄一箇入在蝦蟆口中用麻扎口却用黄泥裹火焼乾用炭煆存性麝香少許右研為細末少貼患處大效黄連散専治疳黄連一錢輕粉半錢别研右為細末乾貼諸瘡上大效治小兒牙疳右用甘草二寸􅀥兒核七箇燒灰擦牙妙治小兒疳蟲齒雄黄葶藶右末之取臘猪脂鎔以槐枝綿裹頭四五枚㸃藥擦之治走馬疳出百一選方右用蛇吞蝦蟆連蛇而取之以甆瓶一枚盛黄泥固濟火煆存性取出研為細末入麝香少許於患處貼之即止治小兒走馬疳出百一選方右取花蜘蛛一枚以濕紙裹荷葉包火中煆令存性碙研入少許麝香傅之又方出百一選方右取芭蕉幹或無即用葉燒灰存性入麝香輕粉傅之治小兒走馬疳出百一選方右用乾篛葉不拘多少包軟餳一塊同燒成黒灰用輕粉相和傅乾者用油調塗治走馬疳一名礬石散出百一選方右蠏殻十箇白礬五錢􅀥子三箇一處灰火煆過為末入麝香少許同研乾揩牙又方一名倍子散一名麝香雙和散出余居士竒方治走馬疳右用倍子全者不以多少炭灰燒候煙欲住取出置地上盆覆之存性去灰碾為細末入麝少許研細如牙疳傅患處雖嚥津亦無碍先以塩湯漱口一傅即愈一方用陳者敲開只取蛀末入麝香同研和勻先以漿水洗瘡裛乾傅藥乾者油調塗新者和皮用亦可又方一名桃花散出百一選方右用白礬上色坯子各少許研細傅牙上療齒疳出聖惠方右用蚺蛇膽末傅一方研細水調亦可其蛇出嶺南欲辨真偽割膽開内如粟米置水中亂走者真也沉而散者非也此法不可不辨勝金散一名北􅀥散出經驗良方治小兒走馬疳齒臭爛右􅀥用一箇去核以鴨觜膽礬装滿濕紙包慢火煆成灰研細入麝香少許擦爛牙上安一方加輕粉尤妙小兒走馬疳出經驗良方治牙齦腐爛惡血口臭牙落右用鷄内金清油燈上燒存性為末掺瘡上乾則清油調傅鷄内金俗云即鷄肫内黄皮紅鉛散一名香礬散出衛生家寳治走馬牙疳緑礬不以多少右相礬色鮮明者入甘鍋用炭燒赤傾出好酒洒拌勻再入鍋如此數遍紅研細末入麝香少許先以温水漱净用指蘸藥有疳處貼之又方出本草治走馬疳右用代赭石丁頭者不拘多少用炭火燒赤醋淬七徧濕地上以物盖出火毒搗研為散患者不拘大小兒若皮破唇上下如鍼眼子者先用漿水漱口剪好紙作細條蘸薄藥於疳牙齗上貼之紙落再貼隔宿即生肌如榴子甚者不過再上尋常齒牙宣露亦可用藥貼之巴豆丸治小兒急疳乆蝕唇鼻右用巴豆十七枚冷水浸一宿去皮研與蠟為丸如桐子大每用一丸含之仍吐其汁若誤咽喉倐腫閉寒吐利者急煎黄連湯及藍葉汁等觧之治小兒走馬疳右用飛白礬皂角子七箇燒過同為細末虀水洗漱净瘡貼上紙花封好即愈治急疳蝕口鼻者生瘡出肘後方右用没石子為末吹下部即差治急疳蝕口鼻數日欲死出肘後方右取藍澱傅之每日十度夜四度差治小兒急疳瘡神效方出聖惠方蔓青花成時并根枝取隂乾右件根莖一握去頭尾以大麥麫并漿汁和作團裹之炭火中燒令煙盡取出候冷入麝香一錢同研為末每貼時先以米泔净洗故帛拭乾可傅藥若兒小恐痛甚以意少少傅之不過三數徧差口鼻及下部瘡悉治之地黄丸出百一選方治腎疳即急疳由乳食不調臟腑伏熱凢滋味入於脾而生蟲蟲大則動侵蝕臟腑遂使小兒心悶若上蝕齶齗則口瘡出血齒色紫黒下蝕腸胃則下痢肛爛濕痒生瘡療治不早則消蝕精髓不治此蟲目為濕􅉶多因疳傷乆痢膓胃受濕得之狀如狐惑傷寒齒蝕之證或以走馬命名盖齒属腎腎主虛纔受邪熱疳氣直奔上焦初作口氣名曰臭口次第齒黒名曰潰槽熱血逆出名曰宣露甚者牙皆脫落名曰腐根其根既腐齒不復生矣外證腦熱脫削手足如氷寒熱時作滑泄肚痛口臭乾渇牙根生瘡𤓰黒面黧身疼瘡疥熟地黄洗五錢赤茯苓當歸山朱萸蒸去核川楝肉焙牡丹皮山藥史君子煨各二錢川芎右為末蜜丸空心湯下每服三丸如桐子大牙疳散治小兒疳蝕以大糞燒灰入麝香少許為末貼病處甚效牙疳膏治小兒走馬疳大人牙齒疳右用麝香半兩研細無灰酒半升於銀石噐中􅆈以槐柳枝三五莖不住攪成膏火湏𦂳慢得所患者先以漿水漱口塗之差腦疳附論夫小兒頭皮光而急髪枯作穗腦熱如火頭上生瘡腮臉虛腫身體多汗者名曰腦疳此由在胞胎禀受不足腦體虛弱其母挾於風熱既生之後臟腑挾熱乳食不調上攻腦絡則頭大項細損兒眼目漸漸羸痩肌體常熱髪落不生故謂之腦疳方化疳丸出聖惠方治小兒腦疳乆不差肌體黄痩頭面乾枯眼鼻生瘡壯熱多渴蝦蟆灰半錢青黛半兩細研榖精草灰一分牛黄一分細研木香一分丁香一分熊膽半分研入蘆薈一分細研硃砂半兩細研以水飛過犀角屑一分羚羊角屑一分膩粉半分細研砒黄半分細研㯽榔一分胡黄連一分麝香半分細研右為末研入牛黄等煉蜜和丸如粟米大每一嵗以粥飲下一丸三日服金蟾丸治小兒腦疳髪枯作穗腦熱如火煩熱滿悶乾蟾一枚去腸肚并骨酥灰胡黄連熊膽研蝉蛻去頭足丹砂研蛇蛻焼雄黄研天竹黄各一分無食子二枚麝香研半錢地龍右為末燒粟米飲和丸如黄米大每服七丸至十丸米飲下不拘時候虎睛丸出聖惠方治小兒腦疳眼澁多睡驚悸不喫嬭食黄痩虎睛一對酒浸一宿㣲炙犀角屑半兩真珠末半兩川大黄半兩剉碎㣲炒梔子仁半兩子芩半兩龍膽草一分去蘆頭牛黄細研巴豆十枚去皮心研紙裹壓去油右為末研令勻鍊蜜和丸如麻子大一歳乳食一丸日三服稍大即以意加减丸數服之牛黄丸出聖惠方治小兒腦疳身熱髪枯牛黄一分細研麝香半分細研龍腦半分細研青黛半兩細研熊膽一分細研胡黄連一分木香一分犀角屑一分蘆薈一分細研蟾酥半分研入右為末都研令勻以麵糊丸如黄米大每服以温水下五丸日三服量兒大小以意加减升麻丸一名青黛丸出聖惠方治小兒腦疳皮光急頭髪作穗或有瘡痍或時腮腫徃来損害眼目是胎熱所為升麻青黛研龍膽去苗茯苓去木大黄煨剉各半兩甘草炙黄連去鬚藍實蜀漆炒各半分右為末煉蜜和丸如麻子大每服三丸至五丸米飲下早晨午間日晩各量兒大小以意加减青黛散出聖惠方治小兒腦疳煩熱皮乾痩瘁青黛分研甘草炙剉地榆炙剉蝸牛子有肉者熱炙炒黄去殻各一兩重蘭香根燒灰麝香研人糞焼灰研蚺蛇膽研龍腦研各一分右為散每服一字至半錢米飲調下早晨午間日晚各一服更量大小加减亦可以少許吹入鼻中龍腦丸出聖惠方治小兒腦疳羸痩煩熱麝香研一錢丹砂細研水飛一分熊膽研一錢蘆薈研乾蝦蟆焼灰雄黄連各一分右將五味搗研細如粉以水化熊膽和丸如麻子大若硬更入糯米少許同丸每服三丸至五丸薄荷湯下早晨午間日晩各一服兒大小以意加减麝香蝦蟆丸治小兒腦疳頭髪作穗或頭上生瘡或腮臉虛腫或腹冷乆㵼蝦蟆一枚去腸肚焼灰訶梨勒五枚麫裹焼熟去麫并核胡黄連黄連去鬚各半兩蘆薈研熊膽研各一分丁香三十粒丹砂麝香研各一錢右為末水浸炊餅心和丸如麻子大二嵗兒每服十丸米飲下日二龍膽丸出危氏方治腦疳皮光急滿頭生瘡腦熱髪結身汗顋腫龍膽草川大黄苦楝根皮焙防風赤茯苓蘆薈油髪灰青黛乾黄連右為末猪膽汁浸糕糊丸麻子大每服二十丸薄荷紫蘇泡湯下食後仍以蘆薈末入鼻葶􅐗散治小兒腦疳吹鼻葶􅐗紙上炙黄漏蘆去蘆頭炒研鶴虱蝦蟇丹砂研滑石各一分蟾酥如桞葉一二片子右搗研為散每用一字吹入鼻中嚏即可治吹鼻龍腦散出聖惠方治小兒急疳腦寒頭痛眼目昏暗羞明怕日龍腦少許細研蝸牛殻一分炙令黄蝦蟇灰一分𤓰􅎞一分麝香少許細研黄連去鬚一分細辛一分右為細散入磁合内貯之每取少許吹入鼻中每日兩上用之地榆散出聖惠方治小兒腦疳鼻痒頭髪作穗面黄羸痩益腦吹鼻地榆剉蝦蟇灰青黛麝香研石蜜炒焦各一兩右為散更研極細每取少許吹入鼻中當有黄水出一方有榖精草無石蜜熊膽煎出聖惠方治小兒腦疳􅆃疳齒疳諸般疾口生疳截急疳方見本門一切疳類熊膽膏牛黄丸治小兒腦疳頭皮光髪枯作穗腦熱頭瘡多汗肌痩牛黄研大青黄連去鬚天麻各一兩丹砂滴水研半分右研為末酒煮麫糊和丸如麻子大每服三丸熱水下治小兒腦疳鼻中出膿黒臭出𫝊氏活嬰方蘆薈麝香腦子右搗成塊以緋綿裹定塞鼻中殺腦疳除鼻疳出本草以蘆薈末吹鼻中麝香丸治小兒腦疳頭皮光而急髪枯作穗腦熱如火或頭上生瘡或腮臉虛腫麝香研半錢胡黄連蘆薈研各一兩青橘皮湯浸去白焙史君子去殻各一錢右為細末白麫糊和丸如菉豆大每服七丸乳食前米飲下日三丁香散出聖恵方治小兒腦疳髪乾作穗眼有白膜鼻生瘡通腦丁香蝸牛殻去圡赤小豆揀皂莢不蛀者炙令香去黒皮并子一分右為散每取少許以竹筒吹入鼻中五疳悉用之病重者出蟲每日兩度用良桔梗湯治小兒腦疳頭髪結穗頭皮光急或有瘡痒或時腮頸腫眼目不明積漸羸痩弱桔梗剉炙半兩黄蘖去麄皮炙剉大黄炙剉各一分右搗篩每用一錢以水一小盞入生地黄長二寸擘破同煎至四分去滓分温二服早晨日晩各一量兒大小以意加