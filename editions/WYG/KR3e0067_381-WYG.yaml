一分剉青黛一分細研人糞灰一錢麝香半錢細研蝸牛殻二七枚炒令㣲黄右為末每用半兩黄米吹鼻中蘆薈散治小兒鼻疳蟲蝕鼻痒痛不止蘆薈一分黄蘖末青黛半兩雄黄半兩右四味研極細為散每日三度以少許傅瘡上即瘥矣治小兒疳痒方益母草根末一分麝香一錢定粉一分蜜陀僧一分右都研令細乾貼鼻内立效吹鼻方治小兒鼻疳瘥地龍二條微炒𤓰葉一分麝香半錢細研蝦蟆頭一枚焼灰右為細散研入麝香令勻日二三度用少許吹鼻中吹鼻散一名海半散治小兒鼻眼耳痒類橘皮髪乾毛竪宜用蝸牛殻一分焼令微黄蝦蟇灰一錢麝香一錢細研𤓰蔕七枚右為細散研入麝香令勻用少許吹入鼻中日三四度兼㸃少許口中甚佳後更煮益母草葉粥與吃澤㵼散治小兒肺積鼻内生瘡及鼻下赤爛川澤㵼甘欝金甘草炙山梔子炒右各一分為末每服嬰孩一字二三嵗半錢五七嵗一錢甘草湯調下一日二服宜再用紫金散傅之麝香散治鼻疳肺氣通於鼻其鼻中赤痒壯熱多啼毛皮乾焦肌膚痩削鼻下連唇生瘡赤爛麝香半錢研雄黄研升麻各二錢半白礬枯半兩右為末每用少許乳調白傅於瘡上乃服蘆薈丸等藥蝦蟇灰一分人中白半分麝香一錢右都研細乾貼鼻内日三用之又方黄蘖一分研雄黄一分細研麝香一錢細研右都研細令勻以生油調日三四上塗之青金散治小兒鼻疳爛銅青白礬生等分右為末每用少許傅鼻下治小兒鼻口疳蝕生瘡黄痩不食乳石膽一分蘆薈一分右細研為散掺在蝕處其所傷處當化為膿但頻摻在好肉亦别有損動漸差治小兒疳瘡蟲鼻黄連半兩去鬚搗為末石膽一分細研右都令勻以生油調塗於鼻中又方雄黄一分細研𤓰􅎞一分右細為散研令勻以生油調塗於鼻中又方雄黄一分細研𤓰􅎞一分右細為散研令勻以生油調塗於鼻中又方乾蝦蟆一枚塗酥炙焦黄麝香一錢又方蘆薈一分細研黄蘖一分剉右為細散以水一合於瓷盞中浸經一食乆用鷄毛㸃於鼻中清膈散一名清肺湯治肺疳即氣疳由乳哺不調壅熱傷肺肺主氣通於鼻風濕之氣乗虛客於皮毛入於血脉故鼻下兩傍瘡濕痒爛是名􅉶其瘡痛汁所流處却又成瘡外證咳嗽喘逆壯熱惡寒皮膚粟生鼻乾流涕咽喉不利頥爛唾紅氣脹毛焦泄痢頻併多啼揉鼻咬甲寒熱一方有生乾地黄桑白皮炒五錢研用紫蘇黄芩當歸前胡連翹防風北梗天門冬去心赤茯苓甘草炙各二錢半右剉散每服二錢水一盞煎温服不拘時候次服化􅉶丸化􅉶丸蕪荑蘆薈青黛乾川芎白芷稍胡黄連右末猪膽汁浸糕糊丸麻子大每服二十丸食後臨卧杏仁煎湯下其鼻常用熊膽泡湯小筆蘸洗候前藥各進数服却用青黛當歸赤小豆𤓰蒂地榆黄連蘆薈等分雄黄少許細末入鼻歛瘡食疳夫小兒食疳者由脾胃不調乳食過度傷於臟腑之所致也是以小兒百日之内腸胃尚嫩哺乳猶少三嵗之外氣血漸盛乳食漸多其乳母湏在調適寒温節减五味令氣血和平則孩孺無病也若飲食不節生冷過多積滯不消在於膓胃致成食疳也其狀面色萎黄肌體羸瘦腹大脚細毛髪乾焦鼻口常乾好喫泥土腦中大熱肚上青筋口舌生瘡水榖不化下痢無度漸漸困羸者是其候也方木香丸出聖惠方治小兒食疳腹中多痛大腸或痢鼻痒乾痩時有體熱木香麝香細研胡黄連蘆薈細研蟾酥炙令焦黄香墨青黛細研雄黄細研熊膽已上各一分史君子半兩右為末煉蜜和丸如菉豆大每服以粥飲下五丸量兒大小以意加减大黄丸出聖惠方治小兒食疳心腹空脹妨悶或時熱渴川大黄剉㣲炒黄連去鬚桂心代赭細研已上各一兩硃砂一分細研木香半兩麝香一分細研肉豆䓻二顆去殻杏仁半兩先洗去皮尖兩人麸炒黄研膏巴豆一分去皮心研紙褁壓去油右為末巴豆杏仁都研令勻煉蜜丸如麻子大每服粥飲下三丸量兒大小加减服之㯽榔丸出聖惠方治小兒食疳氣長肌膚益顔色化宿食治腹脹利氣調𠂻能破積聚㯽榔硃砂細研代赭細研乳香研入木香五靈脂麝香阿魏麺裹煨麺熟為度肉豆䓻去殻已上各一分蟾頭一枚炙黄色巴豆七枚去皮心研紙裹壓去油右為末同研令勻以麺糊丸黍米大每服以温薑湯下二丸量兒大小以意加减桃花散出聖惠方治小兒食疳腹脹桃花一分乾蟾塗酥炙令黄青黛細研赤芍藥肉豆䓻去殻紫笋茶已上各半兩右為末每服以温粥飲調下半錢㸔兒大小臨時加减代赭丸出聖惠方治小兒食疳腹脹體痩宿食不消多啼壯熱代赭一分赤石脂一分硃砂一分細研巴豆十枚去皮心研紙裹壓去油杏仁二七枚銅針穿燈上燎作聲為度别研右件藥並湏新好入乳鉢同研令勻用飲和丸如粟米大每服以粥飲下一丸乳汁亦得量兒大小以意加减抵聖散出聖惠方治小兒食疳不欲乳食羸痩蟾一枚塗酥炙㣲黄蜣蜋一分去趐足㣲炒麥蘖一分㣲炒神麯一分㣲黄右為散每服以粥飲調下半錢量兒大小加减服之靈脂丸治脾疳即食疳由乳食不節脾胃受傷或乳母恣食生冷甘肥或乳食過飽或後與之乳致吐乳多睡乆則成癖腹脅結塊其證面黄身黄肚大脚小吐逆中滿乏力多啼水榖不消泄下醋臭合面困睡减食吃泥北五靈脂縮砂仁麥芽白豆䓻仁莪术炒青皮去白蝦蟆炙史君子炒胡黄連乾蟾二個酥炙巴豆七粒去心膜去其油研麝香一分研右為細末滴水於石臼中搗一二百下和丸如黍米大每服二粒至三粒温生姜湯送下乳食後加减訶子散治小兒脾疳丁香白丁香舶上硫黄蜜陀僧訶子一對石燕子一對輕粉少許右為細末如病大者七嵗以下每服半錢七嵗以上者每服一錢温水調下治小兒脾疳蘆薈史君子已上各等分右為細末米飲調下一二錢服之治小兒未行或母有孕飲交妳羸痩方右伏翼熟炙噉之日三兩度食之一名蝙蝠黄連丸治小兒食疳頭面虚腫腹内泄㵼面色萎黄頭髪作穗心腹脹滿肚上青筋癩蝦蟆一個去腸肚以酒浸一宿炙令香熟木香一分胡黄連半兩木鼈子半兩燒令煙盡研沉香一分丁香一分麝香少許乾薑一錢燒令存性用巴豆二十一枚以水淘洗去心膜以紙裹用重物壓出油再研如麺右細杵為末以水浸蒸餅為丸如蘿蔔子大空心臨卧米飲下一丸三嵗已上二丸至三丸忌粘滑物普濟方卷三百八十一
