下二錢鼈甲散出聖恵方治傷寒不解變成狐惑黙黙欲睡卧不安咽喉乾痛口内生瘡惡聞食氣時時下利鼈甲二分塗酥炙令黄夫裙襴川升麻半兩葳㽔黄連去鬚當歸剉微炒赤芍藥桂心犀角屑貝齒茯神秦艽去苗甘草炙微赤剉各一分柴胡去苗麻黄去根節人參去蘆頭各半兩右為散毎服不計時候以粥飲調下二錢赤小豆當歸㪚出金匱方治傷寒狐惑病脈數汗出微煩黙黙但欲卧三四日眼赤如鳩者得之七八日其靣皆黄黑能食者膿已成也赤小豆三兩炒熟當歸一兩半剉微炒右為散毎服不計時候以温水調下二錢漿水服亦可治傷寒不經發汗變成狐惑毒氣下蝕肛門痒痛至甚或下膿血出聖恵方㯽榔末杏仁朱砂右研令勻用黑餳和丸如􅀥核大先用椿根槐白皮各二兩以水一斗煎十餘沸去滓薫洗然後將藥内肛門中一日一易之傷寒身體疼痛論夫太陽少隂厥隂皆有身痛當以外症與脈别之太陽症表未解脈浮𦂳法當身體痛宜麻黄湯以汗之脈浮𦂳當身體疼痛宜以汗解假令尺脈遲者不可發汗何以知其然榮氣不出血少故也尺脈遲者先以小建中湯以養之脈浮者麻黄湯主之太陽中濕一身盡痛發熱身黄小便不利病人中濕因而傷風風濕相搏一身痛腫是名風濕當於風濕中求之麻黄加术湯主之若脈沈自利而身體痛者隂症也急當救裏宜四逆湯附子湯真武湯之類以温之大抵大便利而身體疼者當救裏大便如常而體痛者急當救表此不可不知也或身重背强腹中絞痛咽喉不利身如被杖者當作隂毒治之又問發汗後身疼痛脈沈而遲當用何藥仲景有桂枝芍藥生薑人參新加湯盖為此症也小建中湯兼治汗後身疼脈沈而遲者若霍亂吐㵼止而身疼痛不休者少與桂枝湯即愈金匱要畧云瘡家雖身體痛不可發汗汗出作痓又問身痒者何也脈浮而遲遲為無陽不能作汗其身必痒太陽病七八日脈㣲而惡寒以隂陽俱虛不可更發汗更下更吐也小柴胡湯主之若重反發汗則氣虚必兩耳聾無聞可芍藥甘草附子湯素有熱人可黄耆建中湯面赤有熱者未欲解也以其不能得小汗出身必當痒宜桂枝麻黄各半湯歌曰脇疼多属少陽家燥糞陽明並小柴裏水痞堅須十􅀥隂脇引痛臟中乖脇肋痛滿者邪氣在半表半裏之間也邪方傳裏永留為實氣欝不行法當和解若夫裏水痛堅非下之不可也少陽病脇痛耳聾寒熱乾嘔或脇下堅滿並用小柴胡湯和解之陽明病不解傳入少陽脇下堅滿乾嘔小柴胡湯又陽明燥糞不大便脇下堅滿舌上胎滑小柴胡湯太陽病咳嗽乾嘔微利心下痞硬引脇下痛身凉汗出或時頭痛此為表解裏有水十􅀥湯下之病者脇下痛素有痞積在於臍傍引小腹入隂筋俱作痛此為臟結因與不治歌曰身疼浮𦂳太陽臨自利肝升腎帶沈中濕毒風濕其餘霍亂本條㝷局方大柴胡症云邪結在裏大可便閉澁心腹痛鞭者可服若身體疼痛是表症未解不與之然則身體疼痛不脈沈下自利太陽之表症明矣其或自利脈沈此則隂症之身痛蔵家之裏病云身病大抵多是表症太陽身痛脈浮𦂳無汗麻黄湯以汗之或只脈遲者血不足也先用小建中湯以養之俟其尺脈浮即用麻黄湯病七八日脈細惡寒為隂陽俱虚吐汗下並不可至在其人素無熱可芍藥甘草附子湯素有熱可黄耆建中湯厥隂少陽身痛其脈沈必自利四逆湯真武湯附子湯中濕一身盡痛不可汗下但利小便有本條隂毒身痛如被杖腹中絞痛脈沈而疾有本條風濕一身痛重但微汗不可大發汗有本條發汗後身痛脈沈遲者桂枝加芍藥人參湯汗後身痛為寒邪在表脈沈遲為在裏用芍藥入榮人參安和真氣或用黄耆建中湯又汗後霍亂身痛不休少與桂枝湯方解仞湯治傷寒往來寒熱一有時肢節煩疼者恒山二兩柴胡四兩知母甘草青蒿子桃枝各一兩桂生薑二兩烏梅十二枚葱白薤白各三寸栁枝一握鼈甲醋炙去裙襴二兩右以水一斗二升煮取六升去滓再煮取三升温服一升寒熱前後各一服亦治久瘧不用葱薤亦良防風湯治少陽病筋牽急而疼痛發作有時此為痺也防風甘草各一兩炙天南星生薑二兩炙右以水四升煮取二升去滓温服七合日三服六物解肌湯治傷寒發熱身痛葛根四兩茯苓三兩麻黄牡蠣生薑各二兩甘草一兩右㕮咀以水八升煮取三升分三服再服得汗通即止古今録驗無生薑甘草忌醋物參苓散解傷寒治百節疼一切虛勞氣疾並宜服之人參二兩茯苓一兩白术二十兩剉桔梗十兩去蘆橘紅六兩香白芷三兩芍藥一兩當歸二兩去蘆川芎一兩半半夏一兩湯洗七遍厚朴二兩去皮生姜汁製官桂去皮春夏三兩秋冬四兩枳殻四兩麩炒令黄同桂舂為末乾薑春夏一兩半秋冬二兩麻黄去根節春夏二兩秋冬三兩甘草三兩右剉一處焙乾除官桂枳殻别杵外諸藥同搗麄末分作六分於大鐡鍋内以文武火炒令㣲赤黄為度不可令焦須是勻取出以净紙襯安板床上候冷勿令侵塵土入前枳殻官桂川芎和勻杵為細末毎服一錢水一盞生薑三片葱二寸煎七分通口服不拘時候隂旦湯治傷寒肢節疼痛内寒外熱心下虚煩芍藥甘草各二兩乾薑黄芩各三兩桂心四兩大􅀥十五枚右㕮咀以水一斗煮取五升去滓温服一升日三服夜再服令小汗出差黄耆建中湯治傷寒身痛尺脈遲及汗後身痛脈弱黄耆桂各一錢半白芍藥三錢甘草一錢右以水二盞薑五片棗二枚煎至八分去滓入稠餳一大匙再煎盡温服舊有㣲溏或嘔者不用餳人參順氣散治丈夫婦人風虛氣弱榮衛不和肢節疼痛身體沈重頭目旋暈肩背拘急手足冷麻半身不遂口眼喎斜痰涎不利言語蹇澁或脾胃不和心腹刺痛胸膈痞滿倦怠少力霍亂轉筋吐瀉不止胎前産後並宜服之乾薑人參各一兩川芎去蘆頭甘草炙白术去蘆苦梗去蘆厚朴去粗皮姜汁製陳皮洗去白白芷麻黄去節各四兩乾葛去蘆右為細末毎服二錢水一盞薑三片􅀥一枚薄荷五七葉同煎八分不拘時候如傷寒感風冷頭疼腰重咳嗽鼻塞加葱白煎壊傷寒論夫傷寒壊病者為三隂三陽俱受病訖毒氣未散留於臓腑令致病候多變故曰壊傷寒也本太陽病不解轉入少陽脇下牢滿乾嘔不能食往來寒熱其脈沈𦂳宜小柴胡湯寸口脈洪大數而滑洪大榮氣盛滑數衞氣實榮盛則欝怫可與出汗衛實即大便牢難三焦閉塞津液不通榮衛相搏煩心發熱兩目如火鼻乾靣赤舌燥齒黄大渇故過經而成壊病也傷寒太陽病三日已發汗若吐若下若汗症仍不解者多變為壊病又太陽病轉入少陽已吐下發汗少陽症罷此為壊病知犯何逆以法治之此皆由傷寒病在諸經絡發汗吐下而病症不除又感異氣氣有寒暑燥濕風不同病變隨故謂之壊病又有傷寒過經再受熱邪留蓄臓腑病候多變者及傷寒解後虛羸少氣餘症未除者皆謂之壊病也方麥門冬散出聖恵方治傷寒壊病身體沈重無力昏昏如醉頭痛煩悶麥門冬三分去心百合三分麻黄三分去根節葛根半兩剉柴胡一兩去苗桔梗半兩去蘆頭木通三分剉甘草半兩炙㣲赤剉羚羊角半兩石膏二兩赤茯苓一兩右為散毎服五錢以水一大盞入生薑半分煎至五分去滓不計時候温服升麻散出聖恵方治壊傷寒經數日未解潮熱作時煩躁靣赤川升麻三分鼈甲三分塗醋炙令黄去裙襴前胡半兩去蘆頭烏梅肉半兩枳殻三分麩炒㣲黄去穣犀角屑三分黄芩三分甘草半兩炙㣲赤剉葛根三分剉右為散毎服五錢水一大盞煎至五分去滓入生地黄汁一合更煎一兩沸不計時候分為二服又方出聖恵方梔子仁三分川升麻三分黄芩一兩石膏一兩乾薑半兩炮製剉右為㪚毎服五錢水一大盞煎至五分去滓入生地黄汁一合更煎一兩沸不計時候分為二服前胡散出聖恵方治傷寒後已經十餘日潮熱不退身體沉重昏昏如醉恐成壊病前胡一兩去蘆頭百合一兩麻黄三分去根節葛根一兩剉麥門冬半兩去心石膏一兩右為散毎服五錢以水一大盞入生薑半分煎至五分去滓不計時候温服又方出聖恵方柴胡一兩去苗防風三分去蘆頭黄芩一兩葛根一兩剉甘草半兩炙㣲赤剉前胡一兩去蘆頭右為散毎服五錢水一大盞煎至五分去滓不計時候温服鼈甲散治壊傷寒經十日已來未解熱在胸膈煩悶不止鼈甲塗醋炙令黄去裙襴柴胡去苗川升麻已上各一兩烏梅肉一兩聖濟作半兩枳殻麩炒㣲黄犀角屑黄芩已上各一兩甘草半兩炙㣲赤剉右為散毎服五錢水一大盞煎至五分去滓入生地黄汁半合更煎一兩沸不計時候分温二服聖濟方水一盞半煎至八分去滓下地黄汁二合攪勻食後温服名鼈甲湯犀角散出聖恵方治壊傷寒日數多後煩熱不退頰赤口乾犀角屑一兩柴胡三分去苗呉藍三分大青一兩川升麻一兩烏梅肉三分黄芩三分甘草半兩炙㣲赤剉右為散毎服五錢水一大盞入竹葉三七片煎至五分去滓不計時候温服麥奴丸出聖恵方治壊傷寒熱在胸中口不能語麥奴半兩竈下黄土半兩竈突中墨半兩梁上塵半兩麻黄一兩去根節川大黄半兩剉碎微炒黄芩半兩川朴硝一兩右為末煉蜜和丸如彈子大毎服以新汲水研下一丸良久令極飲水不欲水但强飲之須臾必寒寒已當有汗出便愈宣毒麝香丸出聖恵方治壊傷寒心下結硬腹滿氣急大便不利體變如桃枝色熱結在内者麝香一分細研猪苓一分去黑皮川芒硝一兩柴胡半兩去蘆芫花一分醋拌炒乾川大黄一兩剉微炒梔子仁半兩右為末入麝香同研令勻煉蜜和丸如梧桐子大毎服温水下二十丸良久必利未利再服知母麻黄湯出永類鈐方治傷寒壊病差後或十數或半月二十日終不惺惺精神昏語言錯又無寒熱醫或作鬼祟或作風疾多端治藥弗效或朝夕潮熱煩赤或似瘧皆由發汗不盡餘毒在心包絡間所致知母炒一兩半麻黄去根節煎掠去沫甘草炙剉芍藥黄芩去黒心各半兩桂去粗皮半兩盛暑中可減半右剉如麻豆大毎服五錢水一盞半煎至五分去滓温服半日内可相次三服温服取汗再服若心煩不眠欲飲水者當稍與之令胃中和即愈未汗須再服升麻湯治傷寒壊病經數日未差諸藥不能除升麻鼈甲醋炙去裙襴枳殻去穰麩炒犀角鎊葛根黄芩去黑心甘草炙剉前胡去蘆頭烏頭炮製去皮臍各半兩右剉如麻豆大毎服五錢水一盞半煎至八分去滓下地黄汁二合攪勻食後温服麝香丸治傷寒壊病冷熱相搏心下結胸滿氣急大便不利體變黄青黑如桃枝色四肢逆冷熱結在内者不可服湯飲麝香研猪苓去黒皮朴硝研蕘花炒芫花醋炒各一分大黄剉炒商陸甘遂焙各半兩右搗研為末煉蜜和搗三五百杵丸如菉豆大毎服十丸食前温湯下良久必利未利再服黑奴丸治傷寒壊病頭與骨肉俱痛狂言妄語醫所不療者麻黄去根節黄芩去黑心甘草炙剉竈突墨芒硝䜴一合炒右𢷬羅為末鍊蜜和𢷬三五百杵如桐子大毎服一丸新汲水研下不拘時候大效丸治傷寒壊病烏頭附子二味去皮臍為末用醋一升煎盡好酒一升再煎成膏後入諸藥烏蛇酒浸去皮骨炙細辛去苗葉厚朴去粗皮姜汁炙人參赤茯苓去黒皮桂去粗皮乾蝎炒木香乳香研草豆蔲去皮硼砂胡桐淚㯽榔剉膩粉不灰木各一分右一十七味将十五味𢷬研為末入二味膏子内和擣丸如梧桐子大毎服十丸如陽盛研牛黄膩粉水下如隂盛發厥心胸結痞煎栁枝湯下麥門冬湯治傷寒壊病經久不差潮熱不退身體沉重昏憒煩悶麥門冬去心焙赤茯苓去黒皮各一兩鼈甲去裙襴醋炙一兩甘草炙剉半兩右麄𢷬篩毎服三錢水一盞烏梅一箇小麥五十粒同煎至七分去滓温服不拘時候前胡湯治傷寒壊病潮熱頰赤口乾煩躁神思昏塞經久不瘥前胡去蘆頭二兩柴胡去苗常山人參葛根剉各一兩甘草炙剉三分右麄𢷬篩毎服三錢水一大盞烏梅一個椎碎生薑三片煎至七分去滓温服不拘時候治傷寒八九日不瘥名為敗傷寒諸藥不能消者方名鼈甲㪚鼈甲炙蜀升麻前胡烏梅枳實炙犀角屑黄芩各一兩甘草一兩炙生地黄八合右切以水八升煮取三升分五服頻頻服若不解更服若頭面赤去石膏用乾葛四兩無地黄用豉一升煮取三升分三服忌蕪荑治壊症傷寒病十餘日之後過經已下已汗而未愈者廬州郭醫名羽云渠義父李助教大名府善方脈嘗合以治四五人皆安其方得於天台一僧用藥甚異或謂其效在兠取殊不可曉紅娘子二七個去頭翅足細研大􅀥兩枚剝取肉右同研匀爛丸如理中丸大毎服一丸以白水煎服先頭目次遍身覺㣲㣲有汗然後服小建中湯加黄耆病瘥即止郭醫但能記此說未嘗敢用不可不録以俟名醫開之回生散治傷寒失下或成壊症譫言妄語發黄發斑大便不通小便如血内有燥糞畜血舌縮神昏不能服大湯劑但服此藥一呷燥便下通濈然汗出而愈甘遂生用黑牽牛生取末秤郁李仁去皮㯽榔生用大黄生用大㦸六味各等分右件為細末毎服一錢入輕粉一字以蜜水少許用栁枝調勻服之更量虛實加减不拘時候普濟方卷一百四十二
