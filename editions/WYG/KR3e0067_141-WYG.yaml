body:
  text: 普濟方卷一百四十二明周王朱橚撰傷寒門傷寒發黄論夫傷寒發黄者盖濕熱相交民當病癉者黄也單陽而無隂者也傷寒至於發黄為疾之甚也濕也熱也甚者則發黄内熱已盛甚復被火者亦發黄也邪風被火熱兩陽相熏灼其身必發黄陽明病被火額上汗出而小便不利者必發黄是由内有熱而被火致發黄者也陽明病無汗小便不利心下懊憹者必發黄是由陽明熱盛致發黄者傷寒發汗已身目為黄所以然者寒濕在裏不解故也以為不可下也於寒濕中求之是由寒濕致發黄也濕亦令黄也熱亦令黄也其能辨之乎二者非止根本來有異而色澤亦自不同濕家之黄也必身黄似熏黄雖黄而色暗不明也至於熱盛之黄也必身黄如橘子色甚者勃勃出染著衣正黄如蘖是其正黄色也由是觀之濕之與熱豈不異哉大抵黄家属太隂太隂者脾之經也脾者上黄土色也脾經為濕熱蒸之則色見於外必發身黄經曰傷寒脈浮緩手足自温者是為繫在太隂太隂當發身黄者是矣熱須内盛若已自汗出小便利者則不能發黄必也頭汗出身無汗齊頸而還小便不利渇飲水浆此為瘀熱在裏身必發黄黄家為熱盛而治法亦自有殊傷寒八九日身如橘子色小便不利少腹滿者茵蔯蒿湯主之此欲泄滌其熱也傷寒身黄發熱者梔子蘖皮湯主之此欲解㪚其熱也傷寒瘀熱在裏必發黄麻黄連翹赤小豆湯主之此欲解㪚其熱也此數者泄滌解㪚乃為之不同亦皆析火徹熱之劑也一或身黄脈沈結少腹硬而小便自利其人如狂者又為畜血在下焦使之黄也必須抵當湯下之而愈黄家既是病之已極是以有不治之者多矣非止寸口近掌無脈鼻氣出冷為不治之疾又若形體如煙熏直視摇頭者是為心絶環口黧黑柔汗發黄是為脾絶皆不治之症醫者更詳視之又云黄家至日晡所發熱而反惡寒此為女勞得之當膀胱急小腹滿體盡黄額上黑足下熱因作黑疸其腹臚脹而滿欲作水狀大便必黑時溏泄此女勞疸非水也腹滿者難治傷寒發黄之狀身體盡變或如熏黄或如橘色是也凡陽明中風太陽中濕皆令人發黄盖由得病無汗小便不利寒濕不散則熱結脾胃凑理閉塞瘀熱之氣與宿榖相搏而欝蒸不能消㪚故大小便結澁不通令人身體面目皆變黄色其病腹滿一身盡疼發熱若其人小腹滿急眼睛澁疼鼻骨疼兩膊及項强腰背急者是也但得小便快利即漸愈仍不用大便多多即令人心脹又有急黄者身體黄甚卒然而發心滿氣喘命在須臾故名急黄有初得病便黄者或初不知是黄死後方變黄者此病亦由脾胃瘀熱本天行時氣所作也宜細辨之但發熱心戰者乃是急黄之候歌曰小便自利大便黑血症無疑定發狂若是小便全不利黄名癉病癉名黄若血症宜抵當湯輕者桃仁承氣湯與犀角地黄湯黄癉茵蔯湯茵蔯五苓湯又歌曰太陽發熱渾身痛身目俱黄是濕家腹滿脈弦心脇痛陽明經裏中風邪仲景云傷寒發汗已身目為黄所以然者以寒濕在裏不解故也只當以濕中求之發熱一身盡痛而身目俱黄者太陽中濕也腹滿鼻乾心脇痛潮熱身黄者陽明中風也欲發黄者急用芥蔕末一字許搐鼻中治在頭疼濕家條下大抵發黄與濕家不利小便非其治也腹滿脈浮弦咳嗽潮熱小便難心脇疼短氣鼻中乾不得汗嗜卧此陽明中風也大小柴胡加茯苓湯噦者湯中加茯苓也見小便雜條病人寒濕在裏不㪚熱畜於脾胃腠理不開瘀熱與宿穀相搏欝蒸不消化故發黄汗者南方暑濕近夏癉熱盖癉者黄也古人以黄為癉濕熱相搏民多病癉甚為跗腫然發黄與瘀血外症及脈俱相似但小便不利為黄小便自利為瘀血要之發黄之人脾藴積發熱引飲脈必浮滑而𦂳數若瘀血症即如狂大便自利為瘀血要之發黄人身體發熱頭面汗出身無汗齊頸而止渇飲水漿小便不利如此必發黄茵蔯蒿湯五苓加茵蔯㪚主之茵蔯蒿湯十分五苓㪚五分二散拌勻毎服二錢温水調下日三服病人服湯得小便利如皂子汁赤一宿復減則黄從小便中出也古人云治濕不利小便非其治也大抵發黄者瘀熱在裏由小便不利而致也梔子蘖皮湯麻黄連翹赤小豆湯可選而用之又方傷寒欲發黄者急用苽蔕末口含水搐一字許入鼻中出黄水甚驗即用茵蔯蒿湯調五苓㪚服之最良又問白虎症亦熱發渇引飲水小便不利何以不發黄荅曰白虎與發黄症相近遍身出汗此為熱越白虎証也頭以下都無汗黄症也又問太陽病一身盡痛發熱身如熏黄者何太陽中濕也仲景云傷寒發汗已身目為黄所以然者以寒濕在裏不解故也以為不可下也於寒中求之又問病人脈弦浮大而短氣腹都滿脇下及心痛久按之氣不通鼻乾不得嗜卧一身及目悉黄小便難有潮熱時時咳嗽者何也少隂中風也小柴胡湯主之方麻黄醇酒湯出金匱方治傷寒熱出表發黄癉右用麻黄三兩以醇酒五升煮取一升半盡服之温覆汗出即愈冬月寒時用清酒春月宜用水麻黄連翹赤小豆湯出千金方治傷寒瘀熱在裏身體必發黄麻黄連翹一方用連翹絲根味苦寒甘草各二兩生薑三兩大􅀥二十枚杏仁三十枚赤小豆一升生梓白皮切二升右㕮咀以潦水一斗先煮麻黄去沫次用諸藥煎取三升分温三服半日服之茵蔯湯出千金方治傷寒七日八日内實瘀熱結身黄如橘小便不利腹微脹滿宜下之茵蔯六兩大黄三兩梔子四十枚右㕮咀以水一斗二升先煮茵蔯取五升去滓次内梔子大黄煎取三升分服一升日三小便當利如皂莢汁狀色正赤當腹減黄悉隨小便去也范注用療穀疸小品方用石膏一斤大黄黄蘖湯治發黄腹滿小便不利而赤自汗出此為表和裏實當下之大黄三兩黄蘖芒硝梔子十五枚右㕮咀以水六升煮取二升去滓内芒硝復煎取一升先食頓飲之枳實大黄湯治傷寒飲酒食少飲多痰結發黄酒疸心中懊憹而不甚熱或乾嘔枳實五枚大黄三兩豆䜴半升梔子七枚右㕮咀以水六升煮取三升分三服心中熱疼懊憹皆主之治傷寒後二十日渾身黄眼如金色者右用黄蘆一兩剉碎水一升煎取三合空心服三五服安麻黄連翹湯出金匱方治傷寒瘀熱在裏身必發黄麻黄去根節湯煎去沫二兩連翹二兩杏仁去皮尖雙仁四十枚棗十二枚生薑二兩甘草一兩生梓白皮切一升右㕮咀如麻豆大每服五錢用潦水二盞煎取一盞去滓温服不拘時消濕㪚治傷寒瘀熱在内濕氣欝而不散熏發肌肉小便不利身體發黄利水道牽牛子炒半斤只取末二兩赤茯苓去黒皮木香陳橘皮湯浸去白焙各半兩右為㪚毎服二錢煎葱白湯調下不計時候秦艽湯治傷寒心胸堅硬脚手心熱即變為黄秦艽去苗土紫草去苗土白蘚皮黄芩去黑心梔子仁大黄剉炒各一兩右麄𢷬篩毎服五錢用水一盞半煎至一盞去滓温服日三夜三黄散治傷寒發黄服藥瘥後未全除餘熱發動大黄剉炒黄芩去黑心黄連去鬚梔子仁苦參各一兩右𢷬羅為細㪚毎服用米飲調下二錢日三服龍膽湯治傷寒發黄煩熱皮肉皆黄小便赤不利龍膽枳殻去穰麩炒茈胡去苗梔子仁知母切焙地骨皮木通芍藥甘草炙羚羊角鎊麥門冬去心焙升麻各半兩右麄𢷬篩毎服五錢用水一盞半煎至一盞去滓不拘時温服黄芩湯治傷寒發黄或先服利藥未差者以内消湯以析熱氣黄芩去黑心茵蔯蒿升麻各一兩梔子仁茈胡去苗龍膽各半兩犀角鎊一兩右麄𢷬羅毎服五錢用水一盞半煎至一盞去滓入生地黄汁一合攪令勻不拘時温服茵蔯蒿大黄湯濟生抜萃方治傷寒發黄面目悉黄小便赤宜服茵蔯蒿梔子仁茈胡去苗蘖皮蜜炙各半兩黄芩去黒心升麻大黄剉炒各一兩龍膽半兩右麄𢷬篩毎服五錢用水一盞半煎至一盞去滓早晚食後温服茅根湯治傷寒發黄通身如金色者茅根洗剉梔子仁茵蔯蒿地骨皮甘草炙各三兩右麄𢷬篩每服五錢用水一盞半生薑三片䜴三七粒同煎至一盞去滓早晩食後温服茈胡枳殻湯治傷寒發黄壮熱骨節煩疼兩脇下氣脹急硬痛不能忍茈胡去苗枳殻去穣麩炒黄芩去黒心梔子仁茵蔯蒿龍膽大黄剉炒甘草炙各半兩右麄𢷬篩每服五錢用水一盞半煎至一盞去滓早晚食後温服茵蔯黄芩湯出楊子建䕶命方治傷寒熱毒熾盛熏炙三焦攻擊皮膚通身發黄茵蔯蒿黄芩去心梔子仁升麻秦艽去苖土牡丹皮荆芥穗麻黄去根節細辛去苗葉石膏碎知母焙各半兩黄連去鬚大黄剉炒各一分右麄𢷬篩毎服三錢水一盞煎至七分去滓食後臨卧温服葶藶丸治傷寒時氣發黄甜葶藶隔紙炒一分大黄剉炒半兩人參一兩右𢷬羅為末煉蜜和丸如梧桐子大毎服温水下二十丸以利為度急黄丸治傷寒熱毒所加卒然心中滿氣喘急發熱心戰大黄半兩生剉朴硝一分别研右用二大盞漬大黄一宿次旦煎至一盞去滓下朴硝攪令勻不計時候温分三服利快差梔子仁湯治傷寒急黄梔子仁茈胡去苗朴硝别研茵蔯蒿各半兩右除朴硝外各細剉用水三大盞煎二大盞去滓下朴硝攪令勻不計時候分温三服取利為度治病人腹滿舌痿黄煩不得眠茵蔯二兩白术一兩甘草一兩右臼中杵為㪚沸湯和服方寸匕小便不利加茯苓二兩治傷寒時氣黄疸病煩熱右以湯淋東壁土硝取汁頓服之治傷寒三五日忽有黄則宜服此右取生烏麻油一盞水半盞鷄子白一枚熟攪令相勻服之令盡茵蔯五苓㪚出金匱方治傷寒温濕熱病感冒後發為黄疸小便黑赤煩渇發熱不得安寕此盖汗下太早服藥不對症因感濕熱病以致身發黄予嘗用茵蔯五苓㪚治之甚效右用生料五苓㪚一兩加入茵蔯半兩車前子一錢木通一錢半茈胡一錢半酒後得症加乾葛二錢作㕮咀并前藥和勻分作二服毎服水一碗燈草五十莖同煎八分去滓食前服滓再煎連進數服小便清利為愈梔子蘖皮湯治傷寒身熱發黄者方見本門辨陽明脈症類麻黄連翹赤小豆方出拔萃方少陽陽明身熱不去小便自利而煩者身必發黄宜梔子蘖皮湯麻黄連翹各一兩赤小豆右剉如麻豆大毎服一兩水三盞煎至八分去滓温服梔子蘖皮湯出抜萃方治燥熱發黄大黄蘖皮各三兩梔子十五個右剉如麻豆大毎服一兩水二盞煎服發黄大便自利不止者加黄連黄蘖皮各三兩生減大黄用之多效僧傷寒發汗有留熱身面皆黄多熱朞年不愈醫作食黄治之病不去問之食不減尋與此藥五日減三分之一十日減三分之二二十日病悉去其方用澹寮方山茵蔯山梔子各三錢秦艽升麻各四錢右㕮咀以三錢為一服煎去滓食後服本草衍義茵蔯附子乾薑湯出衛生寳鑑治因涼藥過劑變為隂症身目俱黄四肢皮膚甚冷心下痞硬眼澁不欲開大便自利倦卧附子炮去皮臍三錢乾薑炮二錢茵蔯蒿一錢三分白茯苓去皮三分澤㵼五分枳實麩炒去穣五分半夏湯炮七次五分陳皮去白三分白术四分草豆蔲麪裏燒熟去皮用仁一錢右剉如麻豆大都作一服水一盞半生薑五片煎至一盞去滓凉服不拘時候茵蔯梔子黄連三物湯出活人書大便自利而黄茵蔯三錢梔子黄連各二錢右以水二盞煎八分去滓服治傷寒時氣黄疸病煩熱右用土硝湯淋取汁頓服之莊子云蛣蜣轉丸是也藏在土中掘地得之正員如人捻作彌久者良治傷寒鼻塞黄疸右用苦瓠煎取汁滴鼻中出黄水其塞遂通治傷寒五種黄右用翹摇生𢷬綾汁服一升日二服即差又方右用亂髮燒灰水服一寸匕日三服治伏熱結目黄不下食大小便澁右用苦耽苗子煮汁服或生𢷬絞汁服傷寒百合論夫傷寒百合病者謂百脈一宗悉知其病也其状意欲食復不能食常黙黙欲得卧復不能卧欲出行復不能行飲食有時美亦有時不美如有寒復如無寒如有熱復如無熱口苦小便赤黄得藥則吐利者是也此皆由傷寒及虚勞大病後臟腑俱虚榮衞耗弱不能平復變成斯疾也然以百脈一宗悉致其病又無復經絡故其病症變異而治之者亦宜各隨其症百合病者皆因傷寒病後其狀惡寒而嘔病在上焦也二十二日當愈其狀腹滿微喘大便堅三四日一大便時復小溏者病在中焦也六十三日當愈其狀小便淋瀝難者病在下焦也三十三日當愈各隨其症以醫治之百合之為病令人意欲食復不能食或有美時或有不用聞飲食臭時如有寒其實無寒如有熱其實無熱常黙黙欲卧復不得眠至口苦小便赤澁欲行復不能行諸藥不能治治之即劇吐利如有神靈所為也百合病身形如和其脈微數其候毎溺時即頭覺痛者六十日乃愈百合病候之溺時頭不覺痛淅淅然寒者四十日愈百合病候之溺時覺快然但覺頭强者二十日愈百合病症其人或未病而預見其候者或已病四五日而出或病一月二十日後見其候者治之喜誤也依症治之百合病見在於隂而攻其陽則隂不得解也復發其為逆也見在於陽而攻其隂則陽不能解也後下之其病不愈要畧云見於隂者以陽法救之見於陽者以隂法解之見陽攻隂復發其汗此為逆其病難治見隂攻陽乃復下之此亦為逆其病難治歌曰坐不能坐行不能行寒又無寒熱又無熱飲食美時不美特百合少人知妙訣宜百合知母湯百合地黄湯百合洗方又歌曰百合昏如祟物厭或時喜食或時嫌似寒不冷熱無熱欲出難行卧不恬百合者百脈之宗舉皆受病無所謂經絡傳次也皆隂傷寒虛勞大病之後臓腑不平變而成此其狀似寒無寒似熱無熱意中欲食復不能食黙黙欲卧復不得卧强欲出行復不能行崇朝口苦小便赤黄藥入即吐利也病源所在症狀一同其脈微數每尿則頭痛者六十日愈若尿不頭痛但淅淅如寒者四十日愈若尿則快然而但眩者二十日愈百合知母湯百合地黄湯滑石代赭湯鷄子湯百合洗方選用之方百合滑石代赭湯出千金方治百合傷寒已經下後百合七枚擘破滑石一兩碎代赭如彈子丸大一枚碎右先以水洗百合漬一宿白沫出去其水更以新汲水二盞煎取一盞去滓别用新汲水二盞煮滑石代赭取一盞去滓後和百合重煎取一盞半分温再服百合鷄子湯出千金方治百合傷寒病吐之後者百合七枚擘鷄子黄一枚右先以水洗百合漬一宿當白沫出去其水更以新汲水二盞煎取一盞去滓内鷄子黄攪勻分温再服聖惠用鷄子白不計時候頓服之百合知母湯出千金方治百合傷寒已經汗後病人欲食復不能食常黙黙欲卧復不能卧欲行復不能行有寒如無寒有熱如無熱飲食或美不美如强健人而卧不能行口苦小便赤藥入口即吐利此因虛勞大病之後不平復變成此疾名百合候主之發汗後者服百合七枚擘知母一兩右先將百合擘碎用新汲水二盞浸一宿當有白沫出去却沫水了却用新汲水二盞煮百合取汁一盞去滓盛於净器中又將知母亦用新汲水二盞煮取一盞去滓後將百合知母汁相和同煎取一盞半不計時候分温作二服百合滑石散出千金方治百合傷寒病變發熱并小便澁臍下堅急百合一兩滑石三兩右𢷬羅為㪚更入乳缽研如粉每服空心米飲調下二錢日二服當微利即住服百合地黄湯出千金方治百合傷寒病已經吐下發汗病形如初者百合七枚擘生地黄汁一盞右先以水洗百合漬一宿白沫出去其水更以新汲水二盞煮取一盞去滓内地黄汁再煎取一盞半分温再服中病勿更服大便當如漆百合半夏湯一方熟地黄治百合傷寒病不差不思食欲成勞日漸羸瘦百合二兩人參赤茯苓去黒皮聖恵用白茯苓半夏湯洗七遍炒令乾黄連去鬚剉微炒知母各一兩生乾地黄焙一兩半聖恵用熟乾地黄右麄𢷬篩毎服五錢半入生薑一分拍碎同煎至八分去滓食後温服日二百合柴胡湯出聖恵方治百合傷寒病久不差不思食欲成勞百合二兩柴胡去苗知母焙黄連去鬚剉微炒秦艽去苗土栝蔞各一兩甘草半兩炙赤右麄𢷬篩毎服五錢水一盞半生薑半分拍碎煎至七分去滓食前温服日二百合紫苑湯治百合傷寒病似勞形狀如瘧百合紫苑去苗土白茯苓去黑皮杏仁湯浸去皮尖雙仁炒令黄甘草炙令微黄柴胡土苗右等分麄𢷬篩毎服五錢水一盞半生薑半分拍碎煎七分去滓空心温服日晚再服厚朴㪚治百合傷寒補隂養陽厚朴去粗皮姜汁炙令赤黒色一兩桃仁去皮尖雙仁炒黄别研一兩杏仁去皮尖雙仁炒令黄别研一兩紫石英别研白蘚皮五加皮桑根白皮剉各半兩右𢷬研為散更入乳缽一處研如粉毎服食前用葱白糯米煎湯調下二錢日再服百合前胡湯治傷寒差後已經二七日熱不解將變成百合病身體沉重無力昏如醉狀生百合三枚擘洗前胡去蘆頭麻黄去節各一兩半葛根剉二兩麥門冬去心半兩石膏三兩碎右㕮咀如麻豆大毎服五錢水一盞半煎取七分去滓温服後如食頃再服百合散出聖恵方治傷寒百合病身㣲熱惡寒煩喘百合二兩紫苑一兩去根土杏仁一兩湯浸去皮尖雙仁麩炒微黄前胡去蘆頭麥門冬各一兩去心甘草三分炙㣲赤剉右為㪚毎服五錢用水一大盞煎至五分去滓不計時候温分服赤茯苓散治傷寒頭不痛但覺頭眩淅淅惡寒是百合症赤茯苓麥門冬各三分去心百合知母柴胡各一兩去苗甘草半兩炙微赤剉右為散每服四錢以水一中盞煎至六分去滓不計時候温服子芩散出聖恵方治傷寒頭不痛多眩悶寒熱徃來小便不利百合症子芩三分赤茯苓甘草炙微赤剉芎藭各半兩百合一兩知母右為㪚毎服五錢以水一大盞煎至五分去滓不計時候温服半夏散出聖恵方治傷寒百合病下利不止心中愊愊堅而煩嘔宜服半夏湯浸七遍去