body:
  text: 普濟方卷二十六明周王朱橚撰肺臟門總論夫肺主魄魄臟者任物之精也為上将軍使在上行所以肺為五臟之華葢並精岀入謂之魄魄者肺之臟也鼻者肺之官肺氣通於鼻鼻和則能知香矣循環紫宫上出於頰候於鼻中下逥肺中榮華於髪外主氣内主胸與乳相當左乳庚右乳辛肺重三觔三兩六葉兩耳凢八葉有十四童子七女子守之神名鴻鴻隨節應㑹故云肺蔵氣氣舎魄為欬在液為涕肺氣虚則鼻息利肺氣實則喘咳胸憑仰息肺氣虚夢白物斬人血籍籍氣衰則夢見兵戰氣盛則夢恐懼哭泣厥氣客於肺則夢飛揚見金鐡之器及竒物凢肺臟相金與大腸合為腑其經手太隂與陽明為表裏其脉浮相於季夏王於秋秋時萬物之所終宿葉落柯萋枝條兀然獨在其脉微浮衞氣遲榮氣數數則在上遲則在下故名曰毛陽當䧟而不䧟隂當昇而不昇為邪所中陽中邪則捲隂中邪則𦂳捲則惡寒緊則為慄寒慄相搏名曰癨弱則發熱浮乃來出旦中旦發暮差臟有逺近脉有遲疾周有度數行漏刻遲在上傷毛采數在下傷中焦有惡則見有善則匿陽氣下陷隂氣則温陽反則下隂反在巔故名曰長而且留秋脉如浮秋肺脉也西方金也萬物之所收成也故其氣來輕虚而浮來急去散故曰浮反此者病何如而反其氣之來毛中央堅兩傍虚此謂太過病在外其氣來毛而微此謂不及病在中太過則令人氣逆而皆痛愠愠然不反則令人喘呼吸少氣而欬上氣見血下問病者肺脉來厭聶聶如落榆葉曰肺平秋以胃氣為本肺脉來不上不下如循鷄羽曰病脉來如物浮如風毛曰肺死其肺脉至大而虚如以毛羽中人膚色白赤不澤毛折者死其肺脉至大而虚如以毛羽中人膚色白赤不澤毛折及死秋胃微毛曰平毛多胃少曰肺病但毛無胃氣曰死毛而有弦曰春病弦甚曰金病肺藏氣氣舎魄喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死于夏手太隂氣絶則皮毛焦太隂者行氣温皮毛者也氣弗榮則皮毛焦皮毛焦則津液去津液去則皮節傷皮節傷者則爪枯毛折毛折則氣先死丙篤丁死火勝金也肺死臟浮之脉按之弱如䓤葉下無根者死秋金肺旺其脉微澀而短曰平反得大而緩者是脾之乘肺母之歸子為虚邪雖病易治反得沉濡而滑者是腎之乘肺子之乘母為實邪雖病自愈反得浮大而洪者是心之乘肺火尅金為賊邪大逆十死不治反得弦細而長者是肝之乘肺木之凌金為微邪雖病則瘥肝乘肺必作虚右手闗前寸口隂絶者無肺脉也若短氣欬逆喉中寒噫逆刺手陽明治陽右手闗前寸口隂實者肺實也若少氣胸中滿膨膨與肩相引刺手太隂治隂肺脉來泛泛輕如微風吹鳥背上毛二至曰平三至曰離經病四至脫精五至死六至命盡手隂脉也肺脉急甚為癲疾微急為肺寒熱怠惰欬唾血引腰背胸若鼻息内不通緩甚為多汗微緩為痿漏風頭已下汗出不可止太甚為脛腫微大為肺痺引胸背起腰内小甚為飱血微小為消痺滑為息賁上氣微滑上下出血濇甚為嘔血微濇為鼠瘻在頸肢腋之間下不勝其上其能喜酸肺脉搏緊而長者當病唾血其濡而散者當病漏汗至令不復發散白脉之至也喘而浮上虚下實驚有積氣在胸中喘而虚名曰肺痺寒熱得之醉而使内也黄帝問曰經脉十二而手太隂之脉獨動不休何也手太隂在寸口中岐伯對曰足陽明胃脉也胃者五臟六腑之海胃脉在足趺上寸骨觧中是大趾間上行三其精氣上清注於肺肺氣從太隂而行之其行也以息往來故人一呼脉再動一吸脉亦再動呼吸不已脉動不止黄帝問曰氣口何以獨為五臟主岐伯曰胃者水糓之海六腑胃居其大五味入於口藏於胃以養五臟氣氣口者太陽是也臟腑之氣味皆出於胃變見於氣口氣口屬腑臟主即呼寸口者也扁鵲曰肺有病則鼻口張實熱則喘逆胸憑仰息陽氣壮則夢恐懼等虚寒則欬息下利少氣其隂氣壮則夢涉水等肺在聲為哭在變動為欬在志為憂傷肺精氣并於肺則悲味主秋結滿而血者病在胸及以飲食不節得病者取之合故命曰味主合病先發於肺喘欬三日之肝脅痛支滿四日之痺閉寒不通身痛體重五日之胃腹脹十日不已死冬入夏日出病在肺下脯慧日中甚夜半靜假令肺病南行若食馬肉及麞肉得之不者當以夏時發得病以丙丁日也宜服赤藥凢肺病之状必喘欬逆氣肩息背痛汗出尻隂股膝攣䏷腨胻足背痛虚則少氣不能報息耳聾嗌乾取其經手太隂足太陽之外厥隂内少隂血者肺脉沉之而數浮之而喘苦忽忽寒熱膓滿膓中熱小便肩背痛從腰已上汗出得之房内汗出當風肺病其色白身體但寒無熱時時欬其脉微遲為可治宜服五味子大補肺湯㵼肺散春當刺少商夏刺魚際皆㵼之季夏刺大滿秋刺經渠冬刺尺澤皆補之又當炙膻中百壮皆第三椎二十五壮邪在肺則皮腹痛發寒壮上氣氣喘汗出欬動肩背取之膺中外腧皆第三椎之傍以手重按之快然乃刺之取之缺盆中以越之形寒寒飲則傷肺以其兩寒相感中外皆傷故氣逆於熱喘息鼻衂肩膺好者則肺端正端則和利難傷膺徧欹者則肺偏傾偏傾則病胸偏痛鼻亦偏疾凢人分部䧟起者必有病生大膓陽明為肺之部為藏氣通於内外部亦隨而應之沉濁為内浮清為外若外病内入則所部起内病裏出則所部䧟外入前治陽後治隂内出前治隂後治陽實㵼虚補陽主外隂主内凢人死生休否則藏神前變形於外人肺前病鼻則為之孔開焦枯若肺前死鼻則為之梁折孔閉青黑色若天中等分墓色應之必死不治看色深淺斟酌賖足逺不出一年促不延時月肺疾少愈而卒死何以知之曰赤黑如拇指厭黑見面頰上此必卒死肺絶三日死何以知之口張但氣出面白目青是謂亂經飲酒當風風入肺經膽氣妄泄目則為青雖有天救不可傷生面黄目白如枯骨死吉㐫之色在於分部順順而見赤白入鼻必病不出其年若年上不應三年之中禍必應也秋金肺脉色白主手太隂脉也秋取經腧秋者金始治脉将收殺金将勝火陽氣在合隂氣初勝温氣及體隂氣未勝未能深入故取腧以㵼隂邪取合以虚陽邪陽氣治襄故取於合其脉本在寸口之中掌後兩筋間二寸中應在腋下動脉其脉根於太倉太倉在臍上三寸一分是也秋三月者主肺大腸白氣狸病也其源從太陽擊手太隂太隂受淫邪之氣則經結壅滯毛皮𦂳腎發泄邪生則臟腑傷温隨秋受厲其病相反若腑虚則為隂邪所傷乍寒乍熱損傷脉氣暴欬嘔臟實則為陽毒所損體熱生班氣喘引飲故曰白氣狸病也扁鵲云心肺二俞主治丹毒白狸病當依源為療調其陽理其隂則臟腑之病不生矣夫六極者天氣通於肺地氣通於嗌風氣通於肝雷氣動於心糓氣感於脾糓素問作谷雨氣潤於腎六經為川腸胃為海九竅為水注之於氣所以竅應於五臟五臟而上行肺傷其人勞倦則欬唾血其脉細𦂳浮皆唾血此為躁擾嗔怒得之肺傷氣壅所致也肺中風者口燥而喘身運而重冐而腫脹肺中寒者其人唾濁涕肺水者其人身體腫而小便難時時大便鳴溏肺脹者虚而滿喘欬目如脫状其脉浮大跌陽脉浮緩少陽脉微𦂳微為血虚𦂳為微寒此為䑕乳診得肺疾脉浮而毛按之辟易脇下時時痛逆皆相引痛少氣善悲目瞑結癰皮膚寒利遇夏劇主皮中時癢如虱縁之状甚者如針刺之状時癢色白也肺病身當有熱欬嗽短氣吐出膿血其脉當短濇今反浮大其色當白而反赤者此是火之尅金為大逆十死不治商音人者主肺其聲哭其音磬其志樂其經手太隂厥逆陽明則榮衞不通隂陽反作陽氣内擊隂氣外傷則寒寒則虚而厲風所中嘘吸戰掉語聲嘶塞而散下氣息短憊四肢僻弱面色青葩遺失便利甚則不可治依源麻黄續命湯主之又言音喘急短氣好唾此為火尅金陽擊隂隂氣沉陽氣昇昇則實實則熱熱則狂狂則秘眼悸言非常所說口赤而張飲無時度此熱傷肺肺化為血不治若面赤而鼻不欹可治也白為肺肺合脾白如豕膏者吉肺主鼻鼻是肺之餘其人金形相比於上商白色小頭方面小肩背小腹小手足發動身輕精㢘急心静悍性喜為吏耐秋冬不耐春夏春夏感而生病主手太隂㢘㢘然肩膺厚薄正踈則肺應之正白色小理者則肺小小則少飲不病喘鳴粗理者則肺大大則虚虚則寒喘鳴多飲喜病胸喉痺逆氣巨肩反應䧟喉者則肺高高則實實則熱上氣肩息欬逆合腋脹脇者則肺下下則逼賁迫肝善脇下痛鼻塞或壅而涕生息肉好肩背厚者則肺堅堅則不病欬上氣肩背薄者則肺脆脆則易傷邪傷則六腑生極故曰五臟六極也肺實附論夫右手寸口以前脉隂實者手太隂經也盖肺實則生熱熱則陽氣盛病若肺脹汗出若露上氣喘逆咽中塞如欲嘔吐胸中滿膨膨與肩相引名曰肺實熱也扁鵲云肺實熱則喘嘔胸憑仰息咽中不利手太隂經為熱氣所加故為肺實之病甚則口赤鼻張引飲無時體背生瘡自尻至股隂膝喘經皆痛右手寸口氣口以前脉隂陽俱實者手太隂與陽明俱實也病若頭痛目眩驚狂喉痺痛手臂捲唇吻不收肺與大腸俱實也方煮散方治肺實與大腸俱實令人氣憑滿茯苓麻黄各六分黄耆大青桂心各三分細辛杏仁各五分石膏二兩丹參半兩五味子丼草貝母橘皮芎藭各一兩枳實二枚右為散帛裹方寸井花水一升五合煮取七合為一服日再㵼肺散治酒客勞倦或出當風喜怒氣舎於肺面目黄腫起即頭眩欬逆上氣時忽忽欲絶心下弦急不能飲食或唾膿血胸痛引背支滿欲嘔五味子百部各二兩半茯苓附子蓯蓉當歸石斛逺志續斷各一兩細辛丼草各七分防風蜀椒紫苑桂心欵冬花乾薑各一兩半桃仁六十枚杏仁三十枚右搗篩以酒服方寸匕日三後稍加二匕黄耆煮散治肺氣盛實其氣上蒸發多痰心胸煩躁往往咯血黄耆剉桑根白皮剉杏仁去皮尖雙仁炒紫苑去苖土貝母去心黄芩去黒心麻黄去根節麥門冬去心焙升麻羌活去蘆頭蛤蚧酥炙各一分胡黄連一錢右為散每服三錢水一盞生薑一片棗二枚拍碎煎至九分去薑食後臨臥温服若人病咯血先當喫上面清心氣方兩三盞天門冬煎治肺熱實欬𠻳涕唾稠黏氣促急不思食生天門冬二兩去心以水一升煮爛候水盡細研紫苑去土一兩貝母去心三兩桔梗白茯苓去黑皮桑白皮根剉木通剉各一兩半白蜜二兩土酥一合生地黄汁四合藕汁生麥門冬汁各三合右為末先下地黄麥門冬藕汁煎五六沸次下天門冬并蜜煎五六沸次下紫苑等末攪勻次下酥慢火煎攪如餳傾於合中待凝每服一匙食後夜臥細細蒸之日三五服清肺飲子治渇而小便閉邪熱在氣分也茯苓三錢猪苓三錢澤㵼五錢琥珀半錢燈心二分木通七分通草二分車前子炒二錢瞿麥半錢扁畜七分白术三錢桂半錢右為細末每服五錢水一盞半煎至一盞帶熱服或剉如豆作湯煎服亦可八正散或五苓散皆得用之一方無术桂麻黄引氣湯治肺勞實氣喘鼻張靣目苦腫麻黄杏仁生薑半夏各五分紫蘇四分白前亦作白术細辛桂心各三兩橘皮二分石膏八兩竹葉切一升右㕮咀以水一斗煮取三升去滓分三服龍腦丸治腦中欝熱肺喘𠻳口臭喉腥或口甜丈夫咯血婦人血崩並皆治之龍腦薄荷五兩净葉真蒲黄一兩麥門冬去心二兩阿膠一兩甘草一兩人參一兩川當歸一兩半黄耆一兩半木通一兩生乾地黄三兩柴胡好者去苖半兩右為末煉蜜丸如桐子大每服二十丸病上焦食後用熱水吞下微嚼破更好病下焦空心服小兒加減與之此藥大有竒效不可盡述葉氏清膈丸治肺氣上壅氣促迫塞面赤痰實咽膈不利頭昏目眩背痛拘急及治面生赤􅖟瘙痒人參赤茯