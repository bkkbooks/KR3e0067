參白术五味子麥門冬去心焙各一兩亁薑炮半兩杏仁湯浸去皮尖雙仁麸炒桂心去粗皮各三分右為散每服三錢粥飲調下不拘時日三服九味湯楊子建䕶命方治肺氣虚冷胸中氣微不能太息形體怯寒鼻多清涕黄耆剉一分厚朴去粗皮生薑汁炙一分陳皮湯浸去白焙白术訶梨勒皮防風去叉甘草炙剉桂去粗皮細辛去苖葉各一分右每服三錢水一盞薑三片煎至九分去滓空心温服桑白皮湯治肺氣不足胸中痛牽背上氣失聲桑白皮剉炙欵冬花麥門冬去心焙甘草炙剉亁薑炮各一兩桂去粗皮二兩五味子白石英研各一兩一分右将七味粗搗篩白石英同拌冷勻每服三錢水一盞􅀥五枚擘破煎至七分去滓温服日三不拘時補虚湯治肺虚寒咳𠻳不利少氣半夏湯浸七次焙亁薑炮各三兩白茯苓去黒皮厚朴去粗皮薑汁炙甘草炙剉五味子各二兩黄耆二兩半陳橘皮湯浸去白焙一兩半右剉如麻豆大每服五錢水一盞半煎至八分去滓温服鍾乳丸治肺虚失聲胸中痛上氣息鳴鍾乳研一兩一分五味子一兩半白石英研欵冬花亁薑炮麥門冬去黒心焙桂去粗皮桑根白皮剉炒各一兩右将六味為末與鍾乳白石英通研令勻以􅀥肉研膏丸如桐子大每服十五丸粥飲下日三不拘時補肺湯出千金方治肺氣不足逆滿上氣咽中塞悶短氣寒從背起口中如含霜雪言語失聲甚者唾血五味子三兩亁薑桂心欵冬花各二兩麥門冬一升大􅀥一百枚粳米二合桑根白皮一斤右㕮咀以水一斗先煎桑白皮五沸下藥煎取三升分三服温肺湯出濟生方治肺勞虚寒冷氣心腹胸脇逆滿氣從胸連背痛飲食即唾虚乏不足人參鍾乳粉半夏湯泡七次桂心不見火橘紅亁薑炮各一兩木香不見火甘草炙各半兩右㕮咀每服四錢水一盞半薑五片煎至七分去滓温服不拘時補肺丸治肺虚咳喘少氣鍾乳粉人參白石英各半兩阿膠炒令燥五味子各一兩甘草炙剉三錢細辛去苖葉二錢右為末麫糊為丸如梧桐子大每服十五丸至二十丸甘草湯下人參厚朴湯一名半夏湯治肺勞虚寒心腹冷氣逆遊氣胸脇氣滿從胸連背痛嘔飲食即吐虚乏不足出千金方人參厚朴薑製炒甘草炙各二兩桂心四兩橘皮麥門冬去心各三兩半夏湯洗五兩右剉散每服四錢水兩盞薑七片去滓食前服腹痛加當歸静神丸出本草治肺氣潤五臟其功至多亦能休粮填人骨髓甚有益於男子以胡麻三升去黄黒者微炒令香搗為末下白蜜三升和調煎杵三百杵如梧桐子大丸旦服二十丸年若過四十以上服之效地黄煎治肺虚聲嘶氣乏生地黄汁五兩生薑汁蜜各三兩沙糖一兩半升麻細剉綿裹同煎杏仁去皮尖雙仁研成膏各二兩人參為末三兩右七味先将六味於銅器中微火煎頻攪地黄等汁盡為度乃去升麻下人參末攪勻候冷收置磁盒中宻盖每服一􅀥大含化日夜各三服五味子湯療肺氣不足寒從背起口如含霜雪語無聲音劇者吐血苦寒五味子三兩大棗五十枚擘桑根白皮一升藁本二兩鍾乳二兩綿裹欵冬花二兩鷄蘇二兩右切以水九升煮取三升分温三服每服如人行八里進一服不拘時忌猪魚炙肉熱麫陳酒等物人參湯治肺虚短氣咳𠻳唾膿血不得臥人參桂去粗皮各二兩阿膠炒令燥紫苑去苖土各一兩桑根白皮剉炒八兩熟亁地黄切炒四兩右搗篩每服五錢水一盞半生薑大棗飴糖棗大煎至八分去滓温服日三夜一杜仲湯治肺虚寒損腰背苦痛難以俛仰短氣唾稠如膿温中下氣杜仲去粗皮酥炙剉白术各一兩一分􅒝薢桂去粗皮各一分甘草炙剉附子炮製去皮臍各三分右搗篩每服五錢水一盞棗二枚生薑一􅀥大煎至八分去滓温服食前後各一紫苑散治肺氣不足逆滿上氣咽喉中閉塞寒從背起口中如含霜雪言語失聲甚者吐血紫苑一兩洗去粗皮五味子一兩欵冬花一兩桂心一兩麥門冬二兩去心桑根白皮二兩剉右為散每服四錢以水一盞入生薑半分棗三枚粳米五十粒煎至六分去滓不計時温服厚朴湯治肺氣虚乏不能生肺而肺氣不足多感風邪益脾補肺厚朴去粗皮生薑汁炙一兩人參草荳􅅳去皮各半兩亁薑炮一錢半甘草炙剉一分右搗篩每服三錢水一盞煎至八分去滓空心温服紫苑花湯治肺臟寒虚痰逆咳𠻳胸滿多涕紫苑去苖土五味子各一兩貝母去心炒二分天門冬去心焙升麻各一兩右粗搗篩每服三錢水一盞生薑三片􅀥一枚煎至七分去滓温服不拘時補肺湯地黄二斤生净洗生薑四兩杏仁二兩蜜四兩右搗如泥瓦盒盛飯上蒸五七度每日五更挑三匙嚥下定喘欵氣丸治肺臟氣虚觸冒風冷呼吸邪氣喘促痞悶眠睡不得葶藶紙上炒二兩馬兠鈴根一兩麻黄去根節桑根白皮剉各五錢右搗羅為末用蒸􅀥和丸如梧桐子大每服三十丸食後煎阿膠皂子湯下三味丸治肺虚聲音不出一名出聲散桔梗一兩切用蜜拌於飯上蒸三日訶梨勒去穰黑核四個二個生炮趂熟搗甘草半兩半生半炙右為末每服二錢用馬勃同沙糖少許和丸含化嚥津一方用童子小便和藥煎五七沸温服甚者不過五服一方無馬勃沙糖補正湯治肺虚通身汗出不止白藥二兩甘草剉炙芍藥各一兩右粗搗篩每服三錢水一盞煎至七分去滓温服橘皮湯治肺氣虚乏胸喉中亁陳橘皮湯浸去白焙麻黄去根節各一兩右搗篩每服五錢水一盞半小麥一匙煎至小麥熟去滓温服日三不拘時餳煎治肺氣不足咽喉苦亁米餳任多少取乾􅀥一升去核熟搗水五升和使相得絞去滓澄去上清取濁者内餳中攪火上煎勿令堅令連連服如雞子大漸漸吞之日三夜二潤肺氣􅂇五臟津液右以石蜜􅀥肉及巨勝末丸每食後含一兩丸一方有甘蔗汁牛乳汁和小建中湯治肺與大腸俱不足虚寒少氣小腹俱急腰痛羸瘠百病大􅀥十二枚生薑桂心各三兩甘草二兩芍藥六兩右㕮咀以水八升煮取三升去滓内糖八兩煮二服分三服後用黄耆人參各二兩名黄耆建中湯治肺寒損傷氣欬及涕唾鼻塞語聲嘶塞喘憊止氣𠻳通聲􅀥肉三升研作膏杏仁一升熬研為酥生薑汁白糖白蜜生百部汁各一升右和合微火煎常攪約一炊乆下之細細温清酒服二合日二一方有甘草五加皮團參黄耆散治肺虚熱咳嗽氣急胸中煩悸支體倦痛口燥咽亁情思不樂多唾涎沫或有惡物肌瘦發熱减食嗜臥並宜服之好人參好黄耆各二兩甘草一兩右為細末每服二錢水一盞煎至六分加生薑三片􅀥肉一枚同煎温服不拘時平肺湯治肺虚有熱黄耆一兩芍藥一兩半半夏一兩一錢人參甘草各半兩右為細末每服四錢以水一盞半加生薑五片棗二枚餳一塊煎至八分去滓温服食後金露散出十便良方平順肺氣人參白术五味子各三分甘草一分右為細末每服二錢不以時白湯㸃下益肺散出十便良方調益肺胃收歛榮衞糯米炒阿膠黄耆各一分右為細末每服二錢以鹿角膠煎湯調下非時鍾乳圓出十便良方治肺虚寒𠻳不已鍾乳粉二兩人參白术亁薑甘草各二兩紫苑欵冬花各一兩右為末蜜和丸如彈子大每服一丸含化利肺湯出濟生拔萃方脉中少有力浮則似止胸中元氣不及是也人參麥門冬沉香白荳䓻五味子益智丁香川芎各等分右㕮咀每服七錢用水一盞半生薑三片煎至八分去滓温服食後欵冬花膏出楊氏家藏方治肺氣虚寒咳𠻳不止痰唾併多或吐血勞𠻳並皆治之欵冬花紫苑百部已上三味各一兩人參去蘆頭甘草炙白术三味各一兩乾薑二兩炮右件為細末煉蜜丸每一兩作一十五丸每服一丸含化食後臨臥補肺湯出炮氏方治肺虚寒逆滿上咽中悶塞寒從背起口如含霜言無聲音舌本乾吐沫唾血不能食欵冬花一兩桂心一兩桑白皮四兩人參一兩紫苑茸一兩白石英一兩五味子一兩半麥門冬二兩鍾乳一兩半右為散每服四大錢薑五片􅀥三枚米一撮煎食前初病時右肩臂􅈩痛無主持不能舉動汗多出肌肉瘦不能正臥臥則痛甚經言汗出偏沮使人偏枯予思内經云虚與實鄰决而通之又言留瘦不移節而刺之使經絡通和血氣乃復又言陷下者灸之為陽氣下䧟入隂中肩膞時痛不能運動以火導之火引而上補之温之也上證皆冝灸刺謂皆先刺十二經井穴四月十二日於右肩臂上井穴内先鍼後灸六七壮至瘡發微於枯瘦處添肌肉汗少出肩臂微有力至五月初八日再炙肩井次灸尺澤穴各二十八壮引氣不行與正氣相接次日臂膞又添氣力自能動揺矣時值仲夏暑熱微盛以清肺飲子補肺氣養脾胃定心氣清肺飲子出衞生寳鎰方天門冬去心三分麥門冬去心三分人參四錢甘草二錢生白芍藥五錢陳皮去白二錢半黄芩二錢升麻柴胡甘草炙黄蘗汗多加黄耆三錢右件㕮咀都作一服水二盞煎至一盞去滓温服食後審平湯出衞生家寳方治肺氣不足寒邪留滯上氣喘急咳𠻳無時人參木香半夏生用阿膠炒成珠子𤓰蔞連子炒熟紫苑洗浄各一錢五味子一兩炒欵冬花去皮梗真紫蘇子苦葶藶剉一錢陳皮去白半兩甘草炙桂心亁薑炮製一兩右為粗末每服稱半兩用水二大盞入薑十片慢煎至半盞去滓放温細細呷不拘時候八物湯出保命治集方心肺虚損皮聚而毛落血脉虚損婦人月水愆期宜益氣和血白术人參黄耆茯苓川芎熟地黄當歸芍藥各等分右粗末每服五七錢水一盞煎至七分去滓食後温服治肺虚寒出本草以覆盆子取汁作煎為菓仍少加蜜或熬為稀湯㸃服治心肺虚熱并虚勞客熱出本草取麥門冬作膏熟水飲利肺氣和中明目止痛出本草用薺尼􅀢蒸切作羮粥食之虀爼亦得潤肺出本草以枇杷子食之潤肺治氣出本草取苧麻汁煮粥食之澤膝湯出本草治肺欬上氣脉沉者澤膝三斤以東流水五升煮取一斗五升然後用半夏半升紫參生薑白煎各五兩甘草黄芩人參桂各三兩八物㕮咀之内澤膝汁中煎取五升每服五合日三至夜盡服療丈夫心肺中虚風乃客熱膀胱間連脇下時有氣妨皮膚瘙癢癮􅇙飲食不多日漸瘦損常有憂愁心忪少氣出本草此方春生莎草苖及花隂亁入冬採根切貯於風凉處有患前病者取苖二十餘斤剉以水二石五升煮取一石五升於浴斛中浸身令汗出五六度浸兼浴其肺中風膚痒即止每歳四時常用則癮􅇙風永差其心客熱膀胱間連脇下氣痛每日憂悶不樂兼心忪者取根二大斤煮熟令香以生絹袋盛貯於三大斗無灰清酒中浸之春三月浸一日即堪服冬十月後即七日近煖處乃佳每空腹服一盞夜三四服之常令酒氣相續以醉為度若不飲酒即取根十兩加桂心五兩蕪荑三兩和搗為散以蜜為丸搗一千杵如桐子大每空腹以酒及薑蜜湯飲汁等下二十丸日再服漸加至三十丸以差為度助肺氣去胃家風消糓不化者出本草以魴魚和芥子醤食之治肺病用丹黍米作粥飲食之丹黍米是肺之糓肺病宜食之普濟方卷二十六
