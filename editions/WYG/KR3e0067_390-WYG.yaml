body:
  text: 普濟方卷三百九十明周王朱橚撰嬰孩心腹痛等疾門心腹痛附論夫小兒心腹疼者證候多端不可概舉有蟲動作疼面變五色口吐清水或涎沫或合眼哭呌仰身撲手心神悶亂沉沉嘿嘿者是也宜先喫史君子次服官局化蟲丸小兒飲食不節或食冷硬肥膩甘甜過度傷飽不能尅化停積於臟或因冷氣所觸故作疼痛診其脉沉細者乃積也輕則荆三稜莪荗橘皮縮砂重則取利非巴豆硇砂乾漆不可止也又有氣痛或因怒而得或傷風冷之氣或因體虚臟寒而作疼診其脉弦緊者是也當用木香紫蘇沉香青橘皮之屬大人小兒皆可服四磨飲子沉香木香檳榔烏藥又有一般心疼大人小兒多患凡有此疾無藥可療急用艾灸足大拇指節中男左女右無問大人小兒又有一種勞瘵尸蟲作痛食不知飽人形羸瘦五心煩熱或骨蒸潮熱宜服金露丸小兒心痛者不起於心乃邪氣客於心主之脉夫少隂者心也五臟六腑之所主精神之所舎其臟堅固邪不能干干之即傷心傷心即神去神去即死矣故諸邪在於心者皆在於心包絡脉包絡脉者心之别脉也故少隂不病夫心痛者厥氣上逆痞而不散或傷寒氣冷邪摶於經絡故發心痛也小兒腹痛者多由冷熱不調冷熱之氣與臟氣相擊故為痛也其熱痛者則面赤或壯熱四肢煩手足心熱是也冷而痛者面色或青或白甚者乃至面黒脣口爪甲皆青是也方沉香煎丸治小兒嘔逆心腹疼痛化水穀消積聚沉香剉丁香木香胡椒沒藥研丹砂研水飛髙良薑檳榔麫裏煨熟去麫剉硫黄研水飛硇砂揀浄水飛慢火炒熟乾各一兩青橘皮去白焙一兩縮砂仁去皮吳茱萸湯浸焙乾阿魏醋浸研澄去砂和麫作餅子炙焦各半兩巴豆去皮心膜研出油盡一分右搗各研為末和勻煉蜜丸如菉豆大以瓷合收封毎服十丸食前臨卧服生薑橘皮湯下量虚實大小加減寛中湯治小兒心腹疼痛不可忍者髙良薑木香各半兩丁香桔梗青皮甘草各一分右為細末毎服半錢温酒調下蓬莪荗丹治小兒心腹疼痛不可忍蓬莪荗炮當歸洗各一兩木香人參桂心各半兩黑牽牛一分炒黄右羅為細末白麫糊和丸如黍米大毎服十粒生薑湯下量兒大小加減服之參香丸治小兒心腹痛并腸冷便青腹急痛乳香木香石菖蒲人參良薑炒各等分右為末酒糊丸如小豆大一歳五丸米湯下治小兒心腹痛用三月三日桃花取曬乾杵末以水服半錢治小兒卒心痛腹脹堅如石滿氣喘息用好鹽如雞子大漿水三升煮取三沸攪消分為三服紫沉消積丸治小兒心痛沉香剉硇砂各四兩阿魏巴豆霜各一兩以上研别為末用蜜一觔酒化熬成膏丹砂研丁香乾薑炮各二兩硫黄研青橘皮湯浸去白焙髙良薑檳榔剉木香人參胡椒桂去粗皮各四兩右除前膏外一十一味搗研為細末入前膏和搗丸如菉豆大以瓷合收蜜封毎服二丸食前橘皮湯下量兒加減桃仁湯治小兒冷邪氣攻心痛不欲飲食桃仁三七枚浸去皮尖雙仁炒黄厚朴去粗皮薑汁炙一兩人參麥蘖炒各半兩陳橘皮去白焙一分檳榔半兩附子炮裂去皮臍桂去粗皮當歸焙各一兩右麄搗篩三歳毎服半錢水半盞煎至三分去滓不計時候温服更量兒大小加減硇砂丸治小兒積氣冷氣心痛硇砂二錢乾漆㣲炒五靈脂胡椒桂去粗皮荆三稜炮蓬莪荗炮各一兩斑猫二十一枚去翅足炒巴豆二十一枚去心皮膜煮出油研右為末研令勻醋煮麫糊和丸如黄米大一二歳毎服五丸三四歳毎服七丸橘皮湯下餘以意加減治小兒未滿百日患腹痛豚子卵一枚當歸一分右用水三升煮取七合塗乳頭上令小兒飲以意加減獨聖散治小兒頭疼心疼用當歸近尾半節為末酒調服半錢亦治大人如嬰兒夜啼乳汁調下少許即瘥蓬莪荗散治小兒心痛發渇不定蓬莪荗人參桂心黄芩生乾地黄木香甘草炙各一分右為散毎服不計時候以橘皮湯調下半錢量兒大小以意加減芍藥散治小兒心痛但覺兒將手數摩心腹即啼是心痛不可忍宜服赤芍藥人參去蘆白术黄芩川大黄炒當歸各一分右為散毎服一錢以水一盞煎至五分去滓不計時候量大小分減温服檳榔散治小兒冷氣心痛不可忍不能飲食檳榔三分當歸一兩焙蓬莪荗三分焙木香二分吳茱萸一分洗焙阿魏一分麫煨熟為度右為散二歳毎服半錢温酒調下不計時候蓽撥散治小兒心疼不可忍蓽撥一兩胡椒一分桂去皮一分木香半兩當歸三分焙桃仁去皮尖半兩炒右為細散一二歳毎服半錢温酒調下不計時候麝香丸治小兒心痛面色青黄不欲飲食麝香細研一分檳榔陳橘皮去白焙白豆䓻去殻吳茱萸洗焙木香各一兩右將吳茱萸米醋煮一二十沸後掘地坑可安茱萸以炭半秤燒坑令通赤以醋半盞及茱萸入坑内用瓷椀盖之四面以炭擁勿令泄氣候冷取出與前藥一處搗羅為末入麝香和匀醋煮麫糊丸如黄米大一二歳毎服五丸四歳七丸温酒調下不計時候桃仁湯治小兒心痛不可忍桃仁去皮麩炒研赤芍藥桔梗炒桂去皮甘草炙各半兩右為末與桃仁同研毎服一錢水一盞煎至半盞去滓温服量大小加減不拘時服木香湯治小兒心痛亦治手足不和木香良薑各一分炒白术半兩桔梗半兩炒白茯苓去皮半兩一方用赤右粗搗篩一二歳毎服一二錢水一盞煎至五分去滓温服發時併喫量大小加減胡椒丸治小兒心痛胡椒四十九粒檳榔一枚剉斑猫去翅足七箇右為細末燒粟米飯為丸如黄米大一二歳毎服三丸三歳已上五丸煎菖蒲湯下青橘皮散治小兒傷冷腹痛青橘皮湯浸去白桔梗去蘆赤芍藥各半兩右為散毎服一錢以水一小盞煎至五分去滓不計時候量大小加減温服桂心散治小兒心痛不止桂心半錢當歸半兩炒梔子仁半分右為散毎服不計時候以橘皮湯下半錢量兒大小以意加減薑黄散治小兒心痛薑黄檳榔剉右等分搗羅為散温酒調下一二歳毎服半錢已下餘以意加減鼈甲丸治小兒腹痛不可忍鼈甲醋炙黄去裙襴防葵訶梨勒煨用皮川大黄炒人參去蘆郁李仁湯浸去皮尖研炒當歸㣲炒各半兩右為末煉蜜和丸如菉豆大以粥飲下五丸得㣲利瘥不計時候量大小以意加減温胃丹治小兒腹痛啼哭不止人參白术木香各一兩髙良薑當歸五味子各半兩右為末麫糊丸如黍米大毎服十粒米飲下橘皮散治證同前青皮炒木香吳茱萸當歸各一兩乾薑丁香各半兩右為細末毎服一錢水八分生薑二片煎五分去滓温服食前服人參散治小兒卒吐下腹痛不止人參半兩去蘆當歸半兩炒甘草一分炙乾薑炮一分黄耆細辛各一分右為末毎服一錢以水一小盞煎至五分去滓稍熱服量兒大小以意加減頻服治小兒傷冷腹痛木香髙良薑白术人參去蘆各一分厚朴半兩去粗皮薑汁炙熟右為散不計時候以粥飲調下半錢量大小以意加減當歸散治小兒冷熱不調腹内多痛當歸炒枳殻麩炒去穣赤芍藥川大黄炒各半兩右為散毎服一錢以水一小盞煎至五分去滓放温服量大小加減凡脾家疼痛者皆因胃虚不究病源多用和飬等劑以致掩蔽邪氣盖腹痛多因邪正交争與臓氣相擊而作也受證非一夾熱痛者壯熱面赤或四肢煩手足心熱藥宜四順飲加青皮枳殻夾冷痛者面白或青甚者靣黒唇口爪甲皆青藥宜五積散重者理中湯冷熱不調邪正交争宜枳殻湯加青皮陳皮木香官桂當歸有積傷脾則面黄腹脹夜熱晝凉宜服紫雙丸去其積風冷入脾則脾胃積冷中滿疼痛荏苒歳月不可測識宜和劑抽刀散以伐其根脾間蜖痛則乍作吐嘔清沫宜檳榔丸主之三稜散益智炒去殻三稜莪术青皮炒香附子青木香砂仁各半兩甘草二錢半右㕮咀薑煎服次與保童丸之類㣲利取效也治小兒心腹胷脇煩悶欲死用燒雞子殻末酒服方寸匕瘧疾附論夫時氣者是四時間或有非節之氣如春或寒夏或冷秋或熱冬或温其氣傷人為病亦頭疼壯熱與傷寒相似其面黄者熱摶於胃脾胃停滯則發黄也治法亦如傷寒重用觧肌湯表之輕用七寳散而又有時氣兼瘧者是日數未滿體常壯熱而邪不退此方失表故也或乗於隂或乗於陽其乗於陽陽争則熱其乗於隂隂争則寒陰陽之氣互相乗加故發熱成瘧也又謌曰瘧病是邪成隂陽各鬬争早期風府㑹晏發脊俞停行速連朝發来遲間日迎小兒還有此不用問神明風寒暑濕邪自外来飲食居處邪自内作湯氏曰是盖外因感受邪氣客於皮膚達於經絡内因停積飲食痰飲㑹於臟腑此瘧疾之胚胎也楊氏曰豈特夏傷於暑秋必為瘧哉盖古人以暑受病最多言之耳夫瘧者始而呵欠繼而足冷面色青黄身體俱急寒慄鼓顫腰脊俱疼寒去未㡬内外皆熱頭痛而渇但欲冷嘔惡煩悶而不嗜食或内伏寒痰寒從背起冷如掌大瘧之寒熱豈非隂陽二氣互相勝負而作哉邪併於隂則寒邪併於陽則熱陰盛則寒多陽盛則熱熾其寒也湯火不能温其熱也氷雪不能寒衛氣與邪氣交争病以作邪氣與衛氣相離故汗出乃觧而病以休衛氣晝行陽夜行隂得陽而外出故發於日間得陰而内摶故發於暮夜或隔日或兩日三日一發乃衛氣行疾行遲耳若内外失守真邪不分隂陽迭勝寒熱互起則休作無定時矣聖恵曰凡瘧疾欲解則有汗出汗出多則津液減耗又熱乗於臟則虚躁故渇而欲冷張秘教曰若病瘥無汗非也夏傷於暑秋或痎瘧小兒血氣壅勝内挾實熱因犯暑邪客於皮膚分肉之間至秋為風冷所折陽盛於外陰長於内隂陽相摶發而成瘧先寒後熱者寒瘧也先熱後寒者温瘧也熱而不寒者癉瘧也若汗出過多亡陽而渇當節其飲多飲而小便澁則變為飲澼矣楊氏曰其脉弦數者多熱熱則凉之弦遲者多寒寒則温之浮弦浮𦂳浮數其邪在表宜汗弦實沉實數實其邪在裏宜下大抵瘧之初得一二日間如火燎原不可向邇波濤洶湧未易廻瀾當俟其稍定而圗之所謂盛者待其衰也瘧方来與正發及將解不可投藥耗其真氣藥病相忤當於未發已前兩時之内或遇𤼵日凌晨服之瘧有數種治法不同寒熱似瘧此傷寒二証非瘧也必肝脉脹盛頭痛惡風宜小柴胡湯加青皮紫蘇主之嘔者多用生薑渇者加烏梅若兼之傷暑小柴胡加香薷入生薑烏梅煎但寒熱之間非通利不能除根也當以四順飲加常山神保丸治乃先解後攻之意吐汗下三者治瘧總要不過汗吐下當下而不盡腹中餘疼或一利之後不復再泄時時㸃滴而出者須以常山大黄再下之當汗而汗不匝者或頭汗至胷而手足無者宜青皮佐紫蘇汗之令周浹一身也當吐宜常山須出盡水飲瘧利用常山罌粟常山治瘧毎毎作效盖瘧家多蓄黄水以常山能攻其癖下其水也罌粟治痢盖已經取積日久下痢腹中無痛腸胃滑泄以罌粟能澁腸也用常山須用大黄為佐大便㸃滴似泄不泄須用大黄佐之收效如發瘧嘔者及嬰孩中年人虚者勿用常山吐之凡瘧證寒熱不歇有根又瘧宜别風寒暑濕治之汗下吐法古今不可違活人書格法治之久不愈者有根在也根者何曰痰飲曰水飲曰敗血曰積癖惟癖為瘧之母惟敗血為暑熱之毒惟水惟飲皆生寒熱故暑之脉沉積癖之脉弦結聚則脇腹必痛盖巴豆功能下積常山能吐利痰水大黄能蕩滌血熱隨證用之瘧瘥再病愈已後飲食失節恚怒傷中觧脫傷風乳哺過飽又再發者熱多二陳湯加青皮甘草熱少二陳湯加青皮草菓堅守胃氣並用生薑烏梅煎空心服之更用巴豆丸子疎利大便以泄毒氣何病之有或服巴豆過多滑痢腹痛煎甘草生薑湯觧之巢氏病源夫風邪所傷客於皮膚而痰飲積於臟腑致令血氣不和陰陽交争若真氣勝則邪氣退邪氣未盡故發瘧也邪氣雖退氣血尚虚邪氣干於真氣