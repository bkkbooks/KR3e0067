飲下日二服如秋冬合時更入桃栁心各七枚宜與後方柴胡人參湯相間服之柴胡人參湯治小兒骨熱盗汗肌瘦減食柴胡去苗人參白茯苓去黒皮當歸桔梗青橘皮去白芍藥芎藭麥門冬去心白术升麻桑根白皮甘草各一兩右並生剉如麻豆大毎二錢水一盞煎至六分去滓分温二服食後臨卧與前鼈甲柴胡前丸相間服速效香苽丸治小兒疳黄盗汗骨蒸潮熱腹大肌瘦胡黄連大黄𤓰黄色者一箇柴胡川大黄濕紙裹煨至底焦鼈甲醋炙黄黄柏去粗皮黄連蘆㑹青橘皮各等分右除黄𤓰外同為細末將黄𤓰割去頭項入諸藥至滿却盖口用杖子挿定慢火内煨熟將黄𤓰及藥同用麫糊丸如菉豆大毎服三二丸食後冷漿水或新水下大者五七丸至十丸一方加木香麝香少許米湯下麥煎散治小兒榮衛不調夜多盗汗四肢倦怠消瘦面黄鼈甲一兩酒醋炙三五十次取净好醋再炙黄柴胡去苗𤣥參秦芁各一兩乾漆炒白茯苓人參乾葛大川烏炮去皮各半兩右為末三歳半錢水半盞小麥三七粒煎三分黄耆散治小兒體熱盗汗心煩不欲乳食黄耆硃砂各半兩細研水飛龍腦一錢細研人參去蘆川升麻川大黄㣲炒甘草炙天竺黄牡蠣粉已上各一分右為散不計時候煎竹葉湯調下半錢量兒大小加減服之龍骨散治小兒夜常有盗汗黄瘦白龍骨牡蠣粉黄耆人參去蘆麻黄根熟地黄甘草炙各半兩麥門冬一兩去心焙右為散毎服一錢以水一小盞煎至五分去滓不計時候量兒大小以意加減犀角散治小兒盗汗肌瘦犀角鼈甲酥炙柴胡各半兩知母半兩地骨皮胡黄連各一兩大黄桃仁各半兩右㕮咀毎服三歳兒一錢水半盞煎至三分去滓温服不拘時候大小以意加減猪肚丸治小兒骨蒸盗汗乳食減少鼈甲去裙襴醋炙柴胡去苗木香生乾地黄焙各一兩青蒿去莖黄連去鬚炒二兩青橘皮去白焙半兩右為末用一枚嫰小猪肚净洗入藥末在内繫定蒸令極爛研和藥末丸如菉豆大毎服十丸温水下食前日午臨卧日三服大小加減地骨皮湯治小兒骨蒸壯熱肌肉減瘦多困少力夜多盗汗地骨皮秦芁去苗土柴胡去苗枳殻去穰麩炒知母焙當歸切焙鼈甲去裙襴醋炙右粗搗篩毎服一錢以水八分入桃栁心各五枚薑二片烏梅半枚同煎至四分去滓温服空心臨卧各一五歳以下分作二服黄耆散治小兒榮衛不和肌瘦盗汗骨熱多渇不思乳食腹滿洩瀉氣虚少力沉香黄耆炙人參當歸赤芍藥各一兩木香桂心各半兩右㕮咀毎服一錢生薑三片棗子半箇水半盞煎三分去滓温服香甲丸一名沉香鼈甲丹治小兒潮熱盗汗消瘦靣黄煩渇不食沉香龍膽草鼈甲童子小便浸一宿炙當歸黄耆蜜炙各一兩大黄炒黄連各半兩右為末麵糊丸如小豆大毎服三十丸米飲送下一方用蜜和丸麥門冬去心煎湯送下大小加減麻黄根散治小兒盗汗不止咽喉多乾心神煩熱麻黄根敗蒲灰麥門冬去心焙黄耆龍骨甘草炙已上各半兩右為散毎服一錢水一小盞煎至五分不計時候量大小以意加減犀角散治小兒盗汗體熱咽乾犀角屑茯神麥門冬去心焙黄耆人參去蘆各半兩甘草炙一分右為散毎服一錢以水一小盞煎至五分去滓不計時候温服量兒大小加減青蒿煎丸治小兒盗汗肌熱青蒿切一觔甘草炙為末杏仁湯浸去皮尖雙仁炒研各一兩柴胡去苗為末各一兩白蜜二分鼈甲去裙襴醋炙為末一兩半右用童子小便五升先煎青蒿取一升去滓更煎令如稀餳入酥少許及諸藥末等熬成煎丸如菉豆大毎服十五丸至二十丸空心熟水下量兒大小加減粉汗散治小兒睡中遍身盗汗牡蠣煆二兩麻黄根炒赤石脂糯米各一兩龍腦一錢麝香少許右為末用生綿絹包藥擈有盗汗出處一方無麝香麻黄散治小兒盗汗日久口乾煩渇消瘦少力人參茯苓黄耆蜜炙龍骨牡蠣煆麻黄根右等分為末三歳一錢水半盞生薑棗子煎三分服麻黄根散治小兒盗汗麻黄根雷丸牡蠣煆各一兩半甘草炙一兩乾薑炮半兩梁米一半升右六味搗羅為散以粉兒身及頭甚驗升麻湯治小兒肌熱盗汗日漸消瘦不食多渇升麻綿黄耆蜜炙人參各一兩熟乾地黄天竺黄牡蠣各半兩煆研右件通拌勻為末毎服半錢至一錢煎竹葉湯調下一方竹葉少許水煎服犀角湯治小兒盗汗睡中驚啼體熱瘦瘁此由心臟熱所致犀角屑三分茯神去木一兩麥門冬去心焙一兩半白术一分甘草炙半兩右粗搗篩毎二錢以水一小盞煎至五分去滓分温二服食後臨卧服之量大小加減一方有龍齒一兩鼈甲丸一名蓯蓉丹治小兒久病盗汗血少氣虚靣色萎黄骨蒸煩渇日漸消瘦情意不恱鼈甲醋炙肉蓯蓉酒浸一宿炙乾各一兩當歸黄耆蜜炙何首烏各半兩右為末煉蜜丸如小豆大三歳三十丸米湯下食前服粉汗散治小兒睡中遍身盗汗黄連生牡蠣煆貝母各七錢糯米三兩一作粉右為細末用生綿絹包藥撲有盗汗處牡蠣散一名黄香散治小兒盗汗汗者血也血虚亦能自汗又治小兒病後暴虚津液不固體常自汗夜卧愈甚久而不止羸瘠枯瘦短氣煩倦亦治虚熱盗汗或因病後血少虚弱消瘦潮熱煩渇腠理不宻盗汗不止牡蠣煅二兩黄耆乾地黄生麻黄根各一兩右㕮咀毎服一錢水半盞小麥二十粒煎三分去滓温熱服無時一方無麻黄根牡蠣散治小兒汗者血虚亦能自汗作熱蒼术米泔浸一宿去黒皮炒一兩白术半兩防風去蘆一兩龍膽一兩右為末毎服一錢米飲調下金苽丸治小兒肌熱盗汗瘦弱飲食不進常服退肌熱肥孩兒大有神效黄連黄蘗青皮甘草各半兩右為細末入麝香半錢取獖猪膽和藥在膽内用漿水煮十餘沸取出東房山頭掛一夜第二日丸如菉豆大毎服十丸加至二十丸温米飲下不拘時候衛生方治疳熱肌瘦盗汗地骨皮洗四兩生乾地黄三兩白芍藥一兩甘草炙半兩右㕮咀毎服二錢水一盞小麥三十粒煎至七分去滓不拘時候芎藭湯治小兒心熱盗汗芎藭大黄煨羌活去蘆頭甘草炙各一兩右㕮咀毎二錢水一中盞入薄荷數葉同煎至六分去滓分温二服量大小加減治小兒盗汗不止宜用粉身麻黄根雷丸各二兩乾薑一兩梁米二兩右為末日三四度以粉其身汗即自止治盗汗外腎濕人參一錢苦參麻黄根各三錢右為末蜜丸梧桐子大炒麥麩煎湯下二十丸治睡中汗出酸棗仁人參茯苓各等分右為細末半盞米飲下團參湯治盗汗取歛心血人參一兩黄耆三兩甘草半兩右等分㕮咀薑三片加麥麩煎服又方治證同前羅參白术白茯苓黄耆當歸甘草右㕮咀各等分薑三片加麥麩煎服二物茯苓粉散治小兒頭汗兼治盗汗不止宜用粉身茯苓牡蠣各四兩右下篩以粉八兩各搗為散有熱輙取粉汗即自止故扇散治小兒盗汗故扇燒灰一分麻黄取根節三分右羅為散毎服半錢乳食調下大小加減丹砂散治小兒肌熱盗汗丹砂研一兩白礬熬乾枯研二分右再同研勻細毎服半錢薄荷自然汁調下重湯丸治小兒盗汗潮熱往来胡黄連柴胡去苗等分右為末煉蜜丸如雞實毎服二丸至三丸銀器内用酒少許化開入水五分重湯上煮十二三沸放温食後服量兒大小加減治自汗方白术一分小麥一撮右用同煮去麥用白术為末煎黄耆湯服之以愈為度止汗散治小兒喜汗厚衣睡而額上汗出及遍身自汗肌肉虚也右用故蒲扇燒灰如無扇只將故蒲燒灰細服三錢温酒調下無時麥麩散治小兒盗汗不止日漸消瘦右用麩皮炒黄為末三歳半錢煎猪脊髓湯調下治盗汗右用鬱金為末水調塗兩乳下又方用白术剉碎用水濃煎時時與飲以知為度治盗汗不止用防風為末浮麥煎湯調服而愈又方用麻黄根節甘草節二味粗末水煎服虎杖散治實熱盜汗用虎杖剉水煎服量多少與之無時一方為末三歳半錢水半盞煎服香粉散治盜汗不止藳本牡蠣粉川芎白芷蚌粉麻黄根各等分右為末週身傅之建中湯減桂加人參傅氏活嬰方治盗汗補虚和隂陽治傷寒自汗黄耆一兩白芍藥三兩人參半兩熟地黄甘草炙各半兩右㕮咀毎服二錢大麥同煎服之又方治小兒虚汗心驚恍惚而汗頻流體熱心煩硃砂黄耆人參升麻天竺黄牡蠣粉龍膽草甘草右為末毎服半錢淡竹葉煎湯調下牡蠣散治小兒盗汗不止宜用粉身牡蠣粉麻黄根赤石脂各一兩右藥搗細羅為散入米粉二合拌令勻毎日及夜間常撲之普濟方卷三百九十
