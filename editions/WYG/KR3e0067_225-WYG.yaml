兩搗汁乾者末亦得白蜜五升牛髓一具無亦得酥五升右各依法料理先煎汁等如稀􅄳納諸藥煎候如神膏入水不散即成一服兩匙酒和服忌鯉魚酢物當合之時净潔向善即得延年强記益心用旺相日合此日復須天晴明無風雨成滿日大良此藥性非冷非熱除風理氣鎮心填骨髓更加白术令人能食時節既熱又非好日且可五分中合二分多合恐酢壞服覺安穏續合不遲忌桃李雀肉等天麻丸治諸虛天麻六兩酒浸三日焙乾秤除風痺牛膝六兩酒浸三日焙乾秤强筋𤣥參六兩樞機管領萆薢六兩研為末壮筋骨杜仲七兩剉炒去絲補腰腎當歸十兩全調和養血𦍑活十兩或十五兩去骨節間風生地黄一斤益精血附子一兩炮行諸經不止獨活五兩去腎間風邪右為細末煉蜜為丸如梧桐子大每服五七十丸病大至百丸空心食前温酒白湯下服藥忌壅塞失於通利故服半月稍覺壅塞以七宣丸輕疎之使藥再為用也十全大補湯出和劑方治諸虛百損榮衞不和形體羸痩靣黄背倦頭眩耳重口苦舌乾心忪多汗血衂喘嗽飲食進退寒熱往來遺精失血脚膝酸疼婦人崩漏經後失調病後未復憂慮傷動氣血最宜服之人參去蘆白术白茯苓甘草炙白芍藥官桂不見火黄耆蜜炙川當歸去蘆熟地黄洗焙川芎各等分右㕮咀每四錢水盞半薑三片棗一枚煎七分空心食前温服虛弱甚者每服秤半兩加鹿茸煎嗽者加五味子白荳蔲罌粟殻有痰加半夏發熱加柴胡有汗加牡蠣虛寒盛加乾薑有風加獨活所加並等分若發熱骨蒸十全大補湯入柴胡二兩作十服煎未效再服去地黄黄耆甘草名曰胃風湯蒼术丸出本事方能治男子婦人一切虛冷之疾活血駐顔减小便除盗汗治婦人久不生産似帯疾而非時有遺瀝並皆治之蒼术切焙川楝子茴香吴茱茰湯浸洗去子閉目者破故紙葫蘆巴各一兩並炒川薑川烏草烏各半兩並炮山藥一兩右各炮治如法同為細末醋糊為丸如梧桐子大每服十五丸空心温酒鹽湯任下婦人艾醋湯下日二服丈夫四十歲以上者可常服耳目永不昏聾髭髮不白又方出本事方川烏沉香紫稍花蒺藜蛇床子酒浸一宿絲子各等分右為末冷熱水丸如彈子大每服一丸湯三大碗椒二合葱二握用閉口瓶同煎取二碗去却葱椒安身於瓶口上薰如入得手則浴之留便止女人帯下赤白者並皆薰之留取藥得三次温過薰洗妙降心丹出和劑方治心腎不足體熱盗汗徤忘遺精及服藥過多上盛下虛氣血不降小便赤白稠濁不清常服益心補虛養血益丹田秘精氣熟乾地黄淨洗酒洒蒸焙乾天門冬去心麥門冬去心各三兩茯苓去皮人參逺志甘草煑去蘆頭茯神山藥各二兩肉桂去麄皮不見火硃砂研飛各五錢當歸去蘆洗焙三兩右為末煉蜜為丸如梧桐子大每服三十丸煎人參湯吞下黄耆丸出和濟方能治丈夫腎臟虛風上攻頭靣虛浮耳内蟬聲頭目昏眩項背拘急下注腰脚脚膝生瘡行歩艱難脚下隠疼不能踏地筋脉拘攣不得屈伸四肢少力百節酸疼腰腿冷痛小便滑數及癱瘓風痺徧身頑麻又療婦人血風遍體癢疼脚膝緩弱起坐艱難並宜服之黄茋杜蒺藜炒去刺川楝子茴香炒赤小豆川烏炮去皮臍地龍去土炒防風去蘆炙各一兩烏藥二兩右為細末酒煑麵糊為丸如梧桐子大每服十五丸温酒下鹽湯亦得婦人醋湯下空心服又一法更加川狼毒海桐皮川椒葳靈仙各一兩唯赤小豆加倍用之尤妙天雄丸出聖濟緫録能治虛損諸病大補益元氣天雄炮製去皮臍菖蒲去鬚剉炒沉香剉檳榔剉乾薑炮草豆蔲去皮炒桃仁去皮尖雙仁炒厚朴去皮生薑汁炙阿魏研破用醋麵和餅炙令黄各二兩右為末醋煑麵糊丸如梧桐子大每服二十丸至三十丸温酒或鹽湯下空心臨卧服思仙續斷丸出和劑方能治脾腎風虛毒氣流注腿膝酸疼艱於歩履小便遺瀝大便後重此藥補臟内調中益精凉血補腎强筋徤骨益智輕身耐老木瓜去穰一兩續斷萆薢各六兩牛􅂰洗去蘆酒浸一宿焙薏苡仁炒各四兩川烏炮去皮臍防風去蘆义杜仲去皮薑汁炒斷絲各二兩右為末酒糊丸每服三十丸至五十丸空心食前温酒鹽湯任下鍾乳天雄丸出聖惠方能治男子虛損勞傷水臟憊腰膝疼筋骨無力夢寐不安陽道劣弱靣色痿黄飲食减少日漸羸痩及膀胱冷氣並宜服此大補益鍾乳粉肉蓯蓉酒浸一宿刮去皺皮炙乾鹿茸去毛塗酥炙微黄肉桂去皮磁石燒醋淬七遍搗碎細研水飛過各二兩天雄炮製去皮臍石斛去根剉巴㦸白茯苓續斷補骨脂微炒木香蘹香子澤㵼防風去蘆頭山茱茰附子炮製去皮臍當歸絲子酒浸一宿曝乾另搗為末人參去蘆頭薯蕷牛膝去苖各一兩沉香一兩右為末煉蜜和搗五七百杵丸如梧桐子大每日空心服及晚食前以温酒下三十丸黄耆散出聖惠方能治虛損羸弱腎氣不足黄耆一兩五錢剉肉蓯蓉酒浸一宿刮去皺皮炙乾熟乾地黄白茯苓各一兩防風芎藭白术山茱茰當歸研甘草炙微赤剉五味子桂心各一兩右為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓每於食前温服治丈夫酒色過度下元虛憊足膝軟乏小便滑數外腎濕癢出本事方兎絲子五兩依法研石蓮肉二兩白茯苓一兩山藥茴香二兩五味子五兩焙右為末稀糊為丸如桐子大每服四十丸温酒或鹽湯空心下如脚氣及脚膝無力者木瓜酒空心下五十丸晩食前再服立效紫芝丹出御藥院方主降心火益腎水秘真氣徤陽事紫芝黄連黄芩茯苓白礬𤓰瓣各五錢白石英硃砂各二兩石决明一兩右為細末煉蜜為丸如梧桐子大每服十丸温酒食前或空心下酒煎附子四神丹出傳信􅃴用方専能治一切虛冷之疾升降隂陽順正袪邪消風冷痰涎散結伏滯氣通利闗節破瘀敗凝澁奔衝失經之血接助真氣生續脉息補腎經不足利膀胱小膓秘精固氣定喘上逆壓煩躁養胃氣療五臟虧損下虛上壅胸中痰飲臍腹冷積奔豚氣衝上下循環攻刺疼痛脾寒冷汗中風痿痺精神昏亂霍亂吐㵼手足逆冷隂毒陽寒四肢厥逆形寒惡風向暗睡卧乍静乍亂婦人産後諸疾血氣逆潮迷悶欲絶赤白帯下崩漏不止一應久新諸病未能辨别虛實冷熱症候用藥未效悉宜此藥分匀隂陽正氣便能安和至不得已詳證乃服水窟雄黄雌黄辰砂透明硫黄各八兩右並别研水飛過晒乾再同研匀用蜜水相和冷潤𦂳團作一毬惟𦂳為妙次用雞清磨濃墨塗薄紙作崑崙紙表裏俱塗厚塗為妙裹前藥三重再以濃墨塗之候乾用燒藥盒子一個無大盒子即分作兩處裹盛先以牡丹根皮燒烟薰盒子令釅烟氣墨黄色入所裹前藥在内納琉璃盒子口下及一指以醋調蠟茶作餅子盖定與盒子口縫平用赤石脂泥固濟盒子盖之令宻却用紙筋鹽泥固濟約厚一寸餘令極乾如有紋以水再泥補候乾㸔有縫再補之入灰泥上二寸灰每日夘酉以四兩熱火如裝香法養十四日取出地靣上用醋灰把定炭五斤圍火煆於淨室中不令婦人雞犬孝子見候火冷取出丹藥吹去草灰令乾一法初用炭火燒熱次加少火燒令通赤約畧炭五斤以來漸添火氣小却添至五斤以來勿令炭厚薄不一可添至三秤去火漸令冷入地坑内深一尺用好黄土盖之候三日取出打破盒子取藥細研三日如粉用糯米糊丸即伏火四神丹也約三十兩末别入下項藥故曰四神附子丹胡椒末蓽撥末各七兩真赤石脂末三兩好桂心末六兩附子一兩以上者炮去皮臍取末十二兩以好酒一斗煎至三升然後入附子末為糊和前藥内右丸如雞頭肉大留少酒恐藥乾候乾添之輕病每服一粒重病二粒至三粒米飲湯下空心食前温酒鹽湯亦得小兒吐㵼慢驚研一粒米飲灌下如有痼冷陳寒宜常久服餌如病安愈不得多服如覺熱極即加木香桂末一錢同和服之思仙續斷丸出簡易方主理肝腎風虛腰脊疼痛脚膝不可踐地風毒流注下經行歩艱難小便遺瀝補五臟内傷調中益智凉血補精堅强筋骨耐老輕身萆薢四兩防風去蘆薏苡仁五加皮牛膝酒浸川續斷𦍑活各三兩生地黄思仙木即杜仲剉炒斷絲各五兩右為細末好酒三升化青鹽三兩用木瓜半斤去皮子以鹽酒煑木瓜成膏和杵丸桐子大若膏子少益以酒糊每服三五十丸空心食前温酒鹽湯任下防風當歸飲子出宣明論能治脾腎真隂損虛肝心風熱欝甚陽盛隂衰邪氣上逆上實下虛怯弱或表熱而身熱惡寒或裏熱而燥熱煩渇或邪熱半在裏半在表進退出入不已而為寒熱往來或表熱多則惡寒裏熱多則發熱或表之陽分陽和正氣與邪氣相助并甚於裏蓄熱極深而外無陽氣裏熱極甚陽極以隂而寒戰腹滿煩渇者或裏之隂分正氣反助邪熱并甚于表則燥熱煩渇而汗也或邪熱壅塞而煩熱疼痛者或熱結極甚陽氣不通反覺冷痛中外熱欝煩躁而喜凉畏熱者或熱極閉塞不得宣通陽極似隂中外喜熱而反畏寒者或燥熱煩渇者或濕熱極甚而腹痛不渇者或一切風熱壅塞頭目昏眩偏風眼黑偏上頭疼口乾鼻塞耳鳴及聾咽噎不利或目赤腫痛口瘡舌痺或上氣痰嗽心脇欝痞腸胃燥澁便熱淋悶或皮膚瘙癢手足麻痺或脇肋拘急肢體倦怠或渾身肌肉跳動心忪驚悸或口眼歪斜語言謇澁或狂妄徤忘失志及或腸胃燥熱怫欝而饑不欲食或濕熱内入而消榖善饑或能食而反痩弱或誤服燥熱毒藥及妄食熱物過多而耗損腎脾則風熱欝而甚多有如此不必全見也无問其病中燥熱毒藥所使者並宜宣通氣血調順飲食久服之舊病除去新病不生設虛人常服補益切中自可便矣當歸大黄柴胡人參黄芩甘草炙芍藥各一兩滑石二兩右為末每服三錢至五錢水一大盞生薑三片同煎至七分去滓温服一方有防風鹿茸四斤丸出和劑方能治肝腎虛熱滛於内致筋骨痿弱不自勝持起居須人足不任地驚恐戰戰潮熱時作飲食無味諸虛不足及肌體痩瘁血氣不生肉蓯蓉酒浸鹿茸燎去毛酥炙絲子酒浸軟另研細熟地黄牛膝酒浸杜仲酒浸木瓜乾天麻各等分右為末蜜丸如桐子大每服五十丸温酒米湯食前下一方有五味子無杜仲補隂丹出御藥院方主益腎水滋真隂鎮伏心火大熱堅强骨髓補養精氣治發熱忪怔脚膝痺弱通調血脉潤澤肌膚使腎交太熱无妄動磁石重者燒赤醋浸七次水飛過晒乾秤三兩鹿茸三兩去毛塗酥炙澤㵼各三兩官桂去麄皮一兩五錢杜仲三兩切炒去絲山茱茰生用三兩生地黄八兩右除磁石外搗羅為細末後入磁石末同研匀煉蜜和丸如梧桐子大每服五十丸温酒送下或鹽湯下亦得虛心食前服兩月覺一百日見效腎氣地黄丸一名八味丸能理腎氣虛乏脾元冷憊靣色黧黑飲食不思臍腹疼痛夜多洩溺脚膝緩弱肢體倦怠虛勞不足煩渴欲水腰重疼痛小腹拘急小便不利脚氣上攻小腹不仁男子煩渇小便反多婦人轉胞小便不通方見本門補虛固精類人參地骨皮散治臟中積冷榮衛中熱按之不足舉之有餘隂不足陽有餘也茯苓五錢知母石膏各一兩地骨皮人參柴胡炒生地黄黄耆各一兩五錢右㕮咀每服一兩生薑三片水煎細服戊巳丸出本事方専治丈夫婦人賦稟怯弱飲食無味氣血衰敗肌肉不生項背拘𦂳腰脚無力胸膈臌脹多睡少寤終日昏昏夜多異夣及積年脾蟲時下惡心噫酸吐水小兒吐乳大人翻胃並皆治之此藥能䕶脾開胃進飲食肌肉生氣血化精髓益全胃氣丹田不竭腎經不虛茴香三兩揀淨甘草一兩炙人參一兩浮椒五兩乃胡椒是已揀淨白术二兩硃砂五錢白茯苓三兩香附子三兩炒去毛右為細末生薑汁打麵糊為丸如梧桐子大每服二十丸空心白湯送下日服一又方出本事方石菖蒲二兩白茯苓三兩白术二兩茴香一兩五錢青皮一兩枳殻一兩麸炒去瓤右為細末每服二錢棗湯空心下又方出本事方枳殻二兩麸炒去穰木香一兩五錢丁香五錢青皮二兩五錢牡蠣二兩煆白茯苓二兩甘草二兩五錢右為細末米飲調下三錢不拘時服内固丹出宣明方能治諸虚補養腎氣調和脾臟壽髙者常服筋骨輕徤渾如壯士肉蓯蓉酒浸茴香炮一兩破故紙葫蘆巴炒巴㦸去心黑附子炮川楝子胡桃仁各四兩麵炒右為末研桃仁為膏餘藥末和匀酒煑麵糊為丸如梧桐子大每服十丸至三十丸空心温酒鹽湯下食前服虛者加至五七十丸此藥明耳目補下元烏髭髪美飲食補益肝腎丸出㧞萃方能治目中流火視物昏花耳聾耳鳴困倦乏力寢汗増風行歩不正兩足欹側卧則多驚脚膝無力日漸消痩柴胡五錢𦍑活五錢苦參五錢生地黄炒五錢防己炒五錢附子炮一錢桂一錢當歸三錢右為細末熟水丸雞頭大每服四十丸温水食前下或問錢氏地黄丸補腎又曰補肝何也曰然手厥隂心主也絡足厥隂肝經俱治右下焦經去不足滋其化源故腎肝之病同一治此地黄丸治二經之病也安息香丸出聖惠方専治臟虛冷臍腹多痛脚腰沉重肌體羸痩顔色萎黄食少无力安息香三兩細剉以無灰酒一升浸一宿以瓷碗中盛重湯煑成膏肉蓯蓉一兩酒浸一宿刮去皺皮炙乾胡桃瓤三兩細研入安息香内鹿茸一兩去毛塗酥炙微黄補骨脂二兩微炒沉香一兩巴㦸一兩丁香一兩雞舌香一兩附子一兩炮製去皮臍桂心一兩牛膝一兩去苖右為末以安息香膏更入少許煉過蜜同和搗三五百杵丸如梧桐子大每日空心以温酒下三十丸太上混元丹出危氏方紫河車者天地之先隂陽之祖乾坤之槖籥鉛汞之匡廓胚腪將兆九九數足我則載而成之故謂之河車歴驗篇中名曰混沌皮盖生天地隂陽之時為七十二丹之首高士垂慈始開端緒太上云若欲長生當修所生實資於此所以成功靈應非金石草木夜露曉霜之所比論修真之士服之不輟誠足以反本還元補益之道真得其真亦治勞損五臟補益真氣紫河車一具用初生男子者良帯子全者以東流水洗斷血脉入麝香二錢在内以綿縫定用生絹裹懸脱于砂䃠内入好酒五升慢火熬成膏沉香硃砂各一兩人參蓯蓉酒浸乳香各二兩白茯苓去皮三兩安息香去砂酒熬各二兩右為末入河車膏子和藥末杵百千下丸如梧桐子大每服七十丸空心温酒送下沉香湯尤佳詳此丹以紫河車為主但佐使之藥大輕無病之人久服可以輕身延年補損扶虛乃若病重之人服之却宜增添之法也一方有天靈盖酥炙黄一方無安息香治男子真陽耗竭腰背疼痛自汗怔忡痰多咳嗽夢遺白濁潮熱心煩脚膝無力鹿茸火燎去毛酥炙川巴㦸去心鍾乳粉陽起石酒煑半日附子炮製鹽水浸黄耆桑寄生一方無桑寄生用續斷生鹿角龍骨紫苑五味子各一兩右依法修製和前藥末用膏子為丸或沉香湯下一方無五味子治婦人血海虛損榮衞不足多致潮熱心煩口乾喜冷腹脇刺痛腰腿疼痛痰多咳嗽驚愓怔忡經候不調或閉斷不通宜于内加後藥當歸去尾石斛去根栢子仁川牛膝酒浸一宿一兩五錢去苖鼈甲醋炙各一兩卷栢葉一兩去土紫石英煨醋一宿七次右依法製和前藥末膏子丸虛寒者加炮附子二兩咳嗽者加紫苑茸二兩治熱勞加方河車依前法修製鼈甲醋炙五錢桔梗白芍藥大黄煨甘草苦參貝母知母秋石豉心龍膽草黄藥子荻木煨犀角鎊真赤石脂酒浸一宿消石各五錢右為末以前膏子丸湯使如前鎮心丹出傳信􅃴用方能治驚憂思慮過傷心氣不足怔忡盗汗亂夢失精神暴心痛中風不語風癎顛狂客忤不省悲哭無常色脫神瘁飛尸鬼疰恍惚驚悸吐血沉重虛勞羸痩病後虛損不得眠睡産前安胎産後補虛種種心恙並皆治之常服安鎮神魄善去百邪調順榮衞補養真氣延年益壽酸棗仁炒白茯苓黄茋人參逺志去心熟乾地黄五味子栢子仁各五錢右為末煉蜜丸如梧桐子大硃砂為衣每服三十丸吐血人參湯下小便尿血赤茯苓湯下恍惚眩暈驚悸骨熱胸膈不利食少倦怠人參同茯苓湯下亂夢失精人參龍骨湯下卒暴心痛乳湯下盗汗不止肌熱虛煩麥門冬湯下大便下血當歸地榆湯下中風不語薄荷紫蘇湯下風癎痰潮防風湯下種種心氣常服人參湯下温酒亦得凡服藥後宜閉目空睡少時震靈湯出仁存方善固秘真元不濕不燥奪造化冲和之功無金石飛走之藥大理真元衰敗五勞七傷臍腹冷疼肢體酸痛上盛下虛頭目暈眩心神恍惚血氣衰微中風癱瘓手足不遂筋脉拘攣腰膝沉重容枯肌痩目暗耳聾口苦舌乾飲食無味心腎不足精滑夢遺膀胱疝墜淋瀝盗汗久㵼久痢嘔吐不食八風五痺一切沉寒痼冷服之如神婦人血風不足崩漏帯下胎臟久冷無子服之立效此丹不犯金石飛走養性之藥不濕不燥奪造化冲和之功禹餘糧石火煆醋淬不計遍數以手撫得碎為度丁頭代赭石如上煆淬北赤石脂紫石英四味各用四兩右並作小塊入鍋内鹽泥固濟候乾用灰十斤煆紅火盡為度入地坑埋二宿出火毒同後藥修合硃砂一兩研水飛滴乳香另研没藥去砂另研五靈脂去石研各二兩右並研停匀糯米糊丸如雞頭大曬乾出光每五粒空心温酒並水任下常服鎮心駐顔温脾腎理腰􅂰除尸疰蠱毒鬼魅邪癘久服輕身漸入仙道忌食猪羊血恐减藥力遺精血濁米飲茯苓末下又用二陳湯加茯苓煎湯下自汗盗汗黄耆湯下沉寒痼冷酒下應有失走或泄㵼後棗湯下大便溏泄濃米飲下老人血痢烏梅湯下吐㵼兼作者搥碎附子煎湯下隂症傷寒發熱自痢乾薑附子煎湯下休息痢疾烏梅湯下腸風便血清米飲調百草霜末下婦人崩中下血米飲調香附末下帯下赤血炒艾醋湯下婦人若是虛損或失血後服醋艾湯下孕婦勿服小兒吐㵼後成慢驚脾最難療理止用此丹三兩粒為末米飲調下量大小加减最妙此丹但宜治病不宜常服恐澁滯氣血為癰癤之患若用以治病極有功效生地黄煎補虛損填骨髓長肌肉去客熱生地黄汁五升棗膏六合白蜜七合犛牛酥四合酒一升生薑汁三合紫蘇子一升研以酒浸然後取汁鹿角膠四兩為末右先煎地黄等三分減一納蜜酥以蜜調入膠末候煎成以器盛之以酒和服肉蓯蓉丸出聖惠方専治腎臟虛敗膀胱久冷腰膝疼重筋力衰弱肉蓯蓉二兩酒浸一宿刮去皺皮炙乾逺志一兩去心巴㦸一兩五味子一兩絲子一兩酒浸三日蒸乾另搗為細末桂心一兩去皮蛇床子一兩附子一兩炮去皮臍牛膝一兩去苖鹿角膠一兩搗碎炒令黄燥山茱茰一兩熟乾地黄一兩右為末煉蜜和搗三五百杵丸如梧桐子大每日空心以温酒下三十丸漸加至四十丸補虛黄耆湯出御藥院方能治諸虛不足小腹急痛脇肋膨脹臍下虛滿胸中煩悸靣色萎黄唇口乾燥少力身重胸滿短氣腰背强痛骨肉痠疼行動喘乏不能飲食或因勞傷過度或因病後不復並宜服之人參去蘆當歸去蘆白术桂心去麄皮甘草黄耆各三兩右為麄末每服三錢水一盞生薑三片棗子一枚同煎至七分去滓温服食前日進三服逺志丸出和劑方善治丈夫婦人心氣不足腎經虛損思慮太過精神恍惚健忘多驚睡卧不寧氣血耗敗遺瀝泄精小便白濁虛汗盗汗耳或聾鳴悉皆治之逺志牡蠣粉煆取粉各二兩白茯苓去皮人參乾薑辰砂另研各二兩肉蓯蓉净洗切片焙乾四兩右為細末煉蜜為丸如梧桐子大每服三十丸空心食前煎燈心鹽湯下温酒亦可此藥性温無毒常服補益心腎聦明耳目定志安神養血氣未央丸出御藥院方能治氣血虛弱肢體沉重情思少樂飲食减少腎氣衰憊腰腿沉重巨勝子九蒸九曝巴㦸去心川椒去目枸杞子甘菊花菖蒲人參去蘆各一兩右為末金蘭袈裟一具東流水洗十遍以荷葉裹之用文武火燒稍乾好酒煑爛入藥末為丸如梧桐子大每服六七十丸至一百丸空心温酒服或米飲下日進二服普濟方卷二百二十五
