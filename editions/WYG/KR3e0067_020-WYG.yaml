子一两炮裂去皮臍乾薑三分炮裂剉甘草半两炙㣲赤剉當歸三分剉㣲炒厚朴一两去粗皮塗生薑汁炙令香熟吳茱茰半两湯浸七遍焙亁㣲炒右為散每服三錢水一中盞入棗三枚煎六分去滓不計時服訶梨勒丸治脾臓積冷氣攻心腹疼痛不能飲食四肢無力訶梨勒二兩煨用皮人参一两去蘆桂心半两亁薑半两炮裂剉白茯苓一两木香半两肉豆􅅳三枚去殻胡椒半两京三稜半两炮裂附子一两炮裂去皮臍桔梗一两去蘆當歸一两剉㣲炒㯽榔一两陳橘皮半两湯浸去白瓤焙厚朴一两去粗皮塗生薑汁炙令香熟右為散煉蜜和丸梧桐子大每服不計時温酒下三十丸乳香丸治脾胃冷氣心腹刺痛散滯氣消酒食利胸膈化痰涎和脾胃止冷利乳香研沉香剉没藥研木香丹砂研枳殻去穣麸炒蓬莪术炮剉烏頭炮裂去皮臍㯽榔剉各一两芫花醋炒令赤狼毒醋炒亁漆炒煙盡各半两阿魏一分研青橘皮湯浸去分白焙三右為末以碙砂一兩半水飛去砂石楝實肉四兩為末同以好醋熬成膏入前末和勻丸如豌豆大每服十丸或十五丸温酒或薑湯下沉香丸治脾臟冷氣攻心腹痛不思飲食沉香剉一两芍藥炒益智仁厚朴去粗皮生薑汁炙剉各三分肉桂去粗皮乾薑炮紅豆􅅳去皮白茯苓去黒皮枳殻去瓤麸炒木香當歸切焙㯽榔剉附子炮裂去皮臍各半两甘草剉一分半右為末煉蜜丸梧桐子大每服二十丸炒生薑木𤓰鹽湯下不拘時肉豆㓂散出聖惠方治脾臟冷氣時攻心腹痛面色青黄常多嘔逆四肢虚肉豆䓻三枚去殻白术半两木香半两半夏半两湯浸七遍去滑丁香半两青橘皮半两湯浸去白穣焙蓬莪术半两附子半两炮裂去皮臍芎藭半两當歸三分剉㣲炒甘草一分炙㣲赤剉桂心半两乾薑半两炮裂剉厚朴一两去粗皮塗生薑汁炙令香熟右為散每服三錢水一中盞薑半分􅀥三枚煎六分不計時服阿魏丸出聖惠方治脾臓久積虚冷氣攻心腹脹痛胃氣不和見食即嘔面色萎黄四肢無力阿魏麵裹煨麺熟為度㯽榔青橘皮湯浸去白瓤焙胡椒丁香蓽撥白豆冦去皮桂心附子炮裂去皮臍人参去蘆乾薑炮裂剉蓬莪术訶梨勒煨用皮已上各半两麝香一分細研右為末煉蜜和丸梧桐子大每服二十丸不計時熱酒下戎鹽丸治脾胃寒冷氣攻心腹疼痛痰逆惡心不思飲食寛心胸化留飲戎鹽㯽榔青橘皮湯浸去白焙肉桂益智去皮棟實蓬莪术炮各半两巴豆霜肉豆䓻去殻墨丁香木香胡椒各三錢右為末麺糊丸菉豆大每服二丸食後用生薑湯下更以意加减碙砂煎丸出聖惠方治脾臟冷心腹有積滯氣發歇疼痛胷膈不利兩脅脹滿不能飲食碙砂不夹石者細研半两阿魏研一分陳麹為木訶梨勒各一两去核丁香蓽撥附子炮裂去皮臍白芥子蘹香子炒㯽榔剉青橘皮湯浸去白焙沉香剉各半两右自訶梨勒以下同搗為末以好酒一升先煎碙砂次入阿魏同煎五七沸後以綿濾過再熬後下麹末攪令勻慢火熬成膏和諸藥入臼内杵数百下丸如梧桐子大每服十五丸至二十丸食前生薑湯下温酒亦得一方無沉香丁香散治脾臟冷攻心腹切痛思飲食定嘔治㵼利丁香人参白茯苓去黑皮厚朴去粗皮生薑汁炙京三稜炮裂亁薑炮各半两吳茱茰湯浸焙亁炒肉豆䓻去殻甘草炙剉各一分蒼术刮去皮三分右搗羅為散每服二錢七空心米飲調下厚朴丸治脾臟冷氣攻心腹多疼痛脇肋虚脹胷膈痞悶痰逆惡心嘔吐水腸泄㵼不思飲食雖食遲化留滯藏腑面色萎黄四肢少力氣出多寒手足逆冷肌體羸痩厚朴去粗皮生薑汁炙肉豆冦去殻附子炮裂去皮臍各三分髙良薑胡椒桂去粗皮乾薑炮丁香㯽榔剉各半两碙砂通明者研一分巴豆去皮心膜出油取霜一方大棗三十枚烏頭二两實白者杵碎生薑自然汁慢火同煑令透輭㨂出棗剥去皮核研烏頭不用右除巴豆外搗末合研勻以棗肉膏和劑如硬量加蒸􅀥肉丸梧桐子大每服五丸至七丸煎陳橘皮木香生薑湯下空心如飲食稍化遲停滯胷膈不計時服附子丸治久病脾臟虚冷飲食不下心腹疼痛面黄浮腫滑泄白利兩脇脹滿附子去皮臍湯浸透切作片子焙一两木香碙砂洗去砂石熬令熟各半两右為末以酒一升煮盡焙乾以炊餅末三兩一處和拌滴水丸梧桐子大每服二十丸空心米飲下木香散出聖惠方治脾臟冷氣攻心腹疼痛或吐清水不思飲食木香半两人参三分去蘆芎藭三分青橘皮一两湯浸去白瓤焙白木三分肉桂一两去皴皮附子一两炮去皮臍當歸三分剉㣲炒草豆䓻五枚去皮厚朴二两去粗皮塗生薑汁炙令香熟髙良薑一两剉吳茱茰半两湯浸七遍焙亁㣲炒右為散每服三錢水一中盞煎六分不計時稍熱服紅豆䓻散出聖惠方治脾臟冷氣攻心腹疼痛宿食不消又腹脇脹悶不思飲食紅豆􅅳一两去皮木香半两當歸三分㣲炒桂心半两髙良薑一两剉芎藭三分訶梨勒半两煨用皮草豆􅅳六枚去皮附子一两炮裂去皮臍陳橘皮一两湯浸去白焙白术半两神麹三分㣲炒令黄右為散每服三錢水一中盞入棗三枚煎六分不拘時稍熱服蓽撥丸出聖惠方治脾臓乆積冷氣攻心腹疼痛面色青黄四肢無力不思飲食蓽撥三分木香半两桂心半两白茯苓三分㯽榔一两附子一两炮裂去皮臍胡椒三分厚朴二两去粗皮塗生薑汁炙令香熟當歸三分剉㣲炒亁薑半两炮裂剉訶梨勒一两煨用皮人参一两去蘆頭右為末煉蜜和丸梧桐子大每服不計時粥飲下三十丸丁香丸出王氏漙濟方治脾臓冷氣攻心腹疼痛及女人血氣丁香木香白豆䓻去殻青橘皮湯浸去白焙胡椒蓽撥㯽榔麝香别研各一分乳香别研半两巴豆半两去皮㣲炮細研紙裹壓油盡研成霜右將㯽榔以上先為末次入餘三味和勻用醋煑麺糊丸黍米大再用砂為衣五丸茶酒任下治元氣用綿灰半錢酒調下十丸心痛煎鹽醋湯下七丸女人血氣當歸酒下五丸此藥大妙服有神效抵聖丸治脾臟冷氣攻心木香半两丁香二十枚乳香研蒔蘿各一分炒㯽榔一枚剉阿魏半分湯化去砂石乾桂去粗皮肉豆䓻去殻蓽撥各半两巴豆三枚去皮心膜出油盡右為末用粳米飲或飯丸如菉豆大每服三丸至五丸食後生薑鹽湯下如痛服七丸内嚼三丸燒生薑鹽湯下温酒亦得鹽煎散治脾臟冷氣攻臟腑不調心腹撮痛及下元久冷烏頭水浸三日炮裂去皮臍蘹香子炒附子水浸三日炮裂去皮臍各一两楝實七枚炮陳橘皮湯浸去白焙二两亁薑炮一两木香碙砂去砂石各一錢蓽澄茄半两右搗為散每服一錢匕水八分鹽煎四分空心和滓温下参苓散治脾臟氣虚風冷乗之正氣相繫心腹疼痛人参白茯苓去黒皮黒豆黄炒陳橘皮去白姜汁炙各三分京三稜二两以新水浸冷輭薄切温杵碎焙乾炒青橘皮去白焙麥蘖炒各一两木香甘草炙剉各半两右搗羅為散每服二錢七入生薑鹽少許沸湯㸃服木香散出聖惠方治脾臟冷氣攻心腹疼痛不可忍木香半两桃仁三分湯浸去皮尖雙仁麸炒㣲黄吳茱茰三分湯浸七遍焙乾㣲炒青橘皮一两湯浸去白瓤焙㯽榔三顆桂心一两蓬莪术一两當歸一两㣲炒亁薑三分炮裂剉右搗羅為散不計時熱酒調下一錢沉香湯治脾虚不思飲食冷氣攻腹脇四肢少力吐酸水沉香桂去粗皮白豆䓻去皮各一两青橘皮去白焙一两半髙良薑㯽榔剉吳茱茰湯浸一宿焙亁炒厚朴去粗皮生薑汁炙各二分右粗搗篩每服三錢七水一盞煎六分去滓温服不拘時鱉甲煎丸治脾臟久積冷氣攻心腹痛脹惡心嘔逆臍下撮痛鱉甲醋炙去裙碙砂不夾石者芫花醋拌炒狼毒碎剉炒亁漆炒煙盡各一两京三稜炮剉三分巴豆二錢去皮心研細與碙砂用醋一升同熬成膏右除碙砂巴豆外為末巴豆膏同拌勻水煮麺糊丸菉豆大每服一丸食後生薑鹽湯下吳茱茰散出聖惠方治皮臟冷氣攻心腹疼痛不可忍吳茱茰半两湯浸七遍焙亁㣲炒髙良薑半两剉桂心三分厚朴二两去粗皮塗生薑汁炙令香熟當歸半两剉㣲炒木香半两右為散每服三錢水一中盞煎六分去滓不拘時稍熱服集聖丸治脾胃氣不足風冷乗之與正氣交擊心腹疼痛附子炮裂去皮臍桂去粗皮乾薑炮甘草炙剉各一两蓽澄茄一分右剉如麻豆每服三錢七水一盞鹽一捻煎七分去滓服吳茱茰丸治脾胃冷氣心腹脹吳茱茰湯浸七遍炒桂去粗皮各一两陳橘皮湯浸去白焙三分㯽榔剉一两右為末醋煮麺糊丸梧桐子大每服十五丸生薑湯下不拘時煨薑丸出和劑方治本臟虚飲食不化或成癥癖或發心痛冷積水脾結聚疼痛一切冷氣等疾附子碙砂木香生薑各等分右用大附子五十箇各重半兩去皮臍以尖刀剜去心子約容碙砂半錢實之却以附子末麺作餅子裹附子用文武火煨令黄用木香如附子之半同為細末以水為丸如鷄頭復以生薑一塊擘作兩片以藥在内温紙裹煨候令熟白湯嚼空心服呉茱茰湯治脾臟虚冷心腹疼痛用吳茱茰湯浸焙炒三兩每服一分不𢷬以水二盞入生薑一分切葱白五寸切同煎八分去滓温服食前一方用酒煎人参冲和丸出楊氏家藏方治脾經受冷心腹疼痛嘔逆中滿不進飲食兼因傷冷作㵼並皆治之人参去蘆白术大麦蘖炒陳橘皮湯浸去白乾薑炮甘草炙已上各二两青橘皮湯浸去白神麹先搗細炒香二味各一两右件為末細煉蜜為丸每一兩作一十九服一丸細嚼濃煎􅀥湯下食前常服大進飲食消榖散滯每服一丸水一盞煎七分温服亦得如脾胃虚弱不進飲食大便溏泄不因傷濕者可去青橘皮加肉豆􅅳縮砂仁各半兩治中湯出御藥院方治脾胃冷氣胷膈不快腹痛氣不和青皮去白人参去蘆甘草炙白术陳皮去白亁薑炮䓁分右為末每服三錢水一盞煎七分去滓食前温服普濟方卷二十
