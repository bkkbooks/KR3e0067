body:
  text: 普濟方卷二十明周王朱橚撰脾臟門總論夫脾主意脾臓者意之舎意者存意之志也為諫議大夫並四藏之所受心有所意謂之意意之所存謂之志因志而存變謂之思因思而逺慕謂之慮因慮而處物謂之智意者脾之藏也口唇者脾之官脾氣通於口利則能變五糓味矣故云口為戊舌唇為已循還中宫上出頥頰次候於唇下迴脾中榮華於舌外主肉内主味脾重二斤三兩扁廣三寸長五寸有散膏半斤主裹血温五臓神明脾脾主臓營秩禄號為意藏随節應故曰脾臟營營含意在氣為噫在液為涎脾氣虚則四肢不和五臟不安實則腹脹溺溲不利脾氣虚則夣食飲不足得其時則夣築垣盖屋脾氣盛則夣歌樂體重手足不舉厥氣客于脾則夣丘陵大澤壊物風雨凡脾臓象土與胃合為腑其脛足太隂與陽明為表其脉緩相于夏王於季夏脾者土也敦而福敦者厚也萬象衆色不同故名曰得福者廣萬物縁根住莖其葉在巔凡蜎蜚蠕動蚑蠷喘息皆䝉土恩徳則為緩思則為遲故令太隂緩而遲尺寸不同酸醎苦辛大繆而生五行其時而以各行皆不羣行盡可常服土寒則温土熱則凉土有一子名之曰金懐挾抱之不離其身金乃畏火恐熱來薰遂棄其母逃於水中為金子而藏火神閉門塞戸内外不通此謂冬時土失其子其氣㐮㣲水為洋溢浸漬其地走繫皮膚面目浮腫歸于四肢愚醫見水真徃下之氣虚脾空胃遂居之肺為喘浮肝反畏肺故下沉沒下有荆棘恐傷其身避在一邉以為水流心㐮則伏肝㣲則沈故令脉伏而沈上醫逺占因轉孔穴利其溲便遂通水道甘液下流停其隂陽喘息則㣲汗出正流肝著其根心氣因起陽行四肢肺氣亭亭喘息則安腎為安聲其味為醎倚生母敗汚臭如星土得其子即成為山金得其母名曰丘矣四時之序逆順之變異也然脾脉獨何主脾脉者土也孤藏以灌四傍者也其善者不可得見惡者何如其來如水之流者此謂太過病在外如鳥之啄者此謂不及病在中太過則令人四肢沈重不舉不及則令人九竅壅塞不通名曰重強脾脉来而和柔相離如鷄踐地曰平長夏以胃為本脾脉来實而盈數如鷄舉足曰脾病脾脉来堅鋭如鷄之啄如鳥之距如屋之漏如水之流曰脾死真脾脉至弱而乍踈乍散色黄青不澤毛折乃死長夏胃㣲濡弱曰平弱多胃少曰脾病但代無胃曰死濡弱有石者冬病石甚曰今病脾臓營營舎意愁憂不觧則傷意意傷則悶亂四肢不舉毛瘁色天死于春足太隂氣絶則脉不營其口脣者肌肉之本也脉弗營則肌肉濡肌肉濡則人中滿而唇反唇反者肉先死甲篤乙死木勝土也脾死藏浮之人緩按之中如覆杯潔潔狀如摇者死六月季夏建未也坤未之間土之位脾王之時其脉太阿阿而緩曰平反得浮大而洪者是心之乘脾母之歸子為虚邪雖病易治反得㣲濇而短者是肺之乗母為寔邪雖病自愈反得弦而長者是肝之乗脾木之尅土為賊邪大逆十死不治反得沈濡而滑者是腎之乗脾水之陵土為㣲邪雖病即瘥右手闗上隂絶者無脾脉也若少氣下利腹滿身重四肢不舉善嘔刺足陽明治陽右手闗上隂實者脾實也若腹中伏伏如堅狀大便難刺足太隂治隂脾脉長長而弱来踈去緩再至曰平三至曰離經病四至曰脱精五至死六至命盡足太隂脉也脾脉急甚為瘛瘲㣲急為膈中滿飲食入而還出後沃沬緩甚為痿厥㣲緩為風痿四肢不用心惠然若無疾大甚為繫仆㣲大為脾疝氣裹大膿血在腸胃之外小甚為寒熱㣲小為消癉滑甚為癲癃㣲滑為蟲毒蚖腸鳴熱濇甚腸癲㣲濇為内漬多下膿血脾脉摶堅而長其色黄當病少氣其耎而散色不澤者當病足骭腫若水伏黄脉之至也大而虚有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風扁鵲曰脾有病則色痿黄實則舌本强直虗則多癖善吞注利其實若陽氣壮則夣飲食之類脾在聲為歌在變動為噫在上心為思思傷脾精氣并干脾則飢應在長夏病變於音者取之經恐懼而不觧則傷精精傷則骨痠痿厥精時自下則病精是故五臟主藏精者也不可傷傷則守失而隂虚至無氣則死病先發于脾閉塞不通身痛體重一日之胃而腹脹二日之腎少腹腰脊痛脛痠三日膀胱背膂筋痛小便閉十日不已死冬人定夏晏食病在脾日昳惠平旦甚日中時下晡静素問作日出甚今云日中時者繆也假令脾病東行若食雉兎肉及諸木果實得之不者當以春時發得病于甲乙日也口丸脾病之狀必身重善飢足痿不收素問作善肌肉痿足不收甲乙作苦飢飢内作痿足不収行善瘈脚下痛虚則腹滿腸鳴飱泄食不化取其經足太隂陽明少隂血者脾脉沈之而濡浮之而虗若腹脹煩滿胃中有熱不嗜食食而不化大便難四肢若痺時不仁得之房内日使不来来而頻併脾病其色黄飲食不消腹若脹滿體重莭痛大便不利其脉㣲緩而長此為可治冝服平胃丸瀉脾丸茱茰丸附子湯春當刺隠白冬刺隂陵泉皆㵼之夏刺大都季夏刺公孫秋刺商丘皆補之又當灸張門五十壯背苐十一椎百壯邪在脾胃肌肉痛陽氣有餘隂氣不足則熱中善飢陽氣不足則有寒有熱皆調其三里有所擊仆若醉飽入房汗出當風則傷脾脾傷則中氣隂陽離别不從故隂以三分後死生脾中風者翕翕發熱形如醉人腹中煩重皮肉潤而短氣也脾水者其人腹大四肢苦重津液不生但苦少氣小便難脾脹者善噦四肢急體重不能衣跌陽脉浮而澁浮則胃氣強澁則小便數浮澁作相摶大便則堅不能更衣汗出不止名曰脾氣弱或五液注下青黄赤白黒寸口脉弦而滑弦則為痛滑則為寔即為急寔即為踊痛踊相摶即胸脇搶急跌陽脉浮而澀浮即胃氣㣲澀即脾氣㐮㣲㐮相搏即呼吸不得為脾家失度寸口脉雙𦂳即為入其氣不出無表有裏心下痞堅跌陽脉㣲而濇㣲即無胃氣濇則傷脾寒在于膈而反下之寒積不消胃㣲脾傷榖氣不行食已自噫寒在胷鬲上虚下寔榖氣不通為秘塞之病寸口脉緩而遲緩則為陽衛氣長遲則為隂營氣促營衞俱和剛柔相得三焦相得承其氣必强跌陽脉滑而𦂳滑即胃氣寔𦂳則脾氣傷得食而不消者此脾不治也能食而腹不滿此為胃氣有餘腹滿而不䏻食心下如飢此胃氣不行心氣虚也得食而滿者此為脾家不治病人鼻下平者胃病也㣲赤者病發癰㣲黒者有熱青者有寒白者不治唇黒者胃先病㣲燥而渇者可治不渇者不可治臍反出者此為脾先落凡人病脉已觧而反致㣲煩者人見病者差安而强與糓脾胃氣尚弱不能消糓故令㣲煩損糓則愈診得脾積脉浮大而長飢見䐜起與榖争减心下累累如桃李起見於外腹滿嘔泄膓鳴四肢重足脛腫厥不能臥是主肌肉損色黄也脾病其色黄體青失溲直視唇反張爪甲青飲食吐逆體重莭痛四肢不舉其脉當浮大而緩今反弦急其色當黄而反青色者此是木之尅土為大逆十死不治宫音人者主脾聲也脾聲歌其音鼓其志愁其經足太隂厥逆陽明則榮衛不通隂陽翻祚陽氣内繫隂氣外傷則寒寒則虚虚則舉體消痩語音沈澀如破鼓之聲舌强不轉而好咽唾口禁唇黒四肢不舉身重如山便利無度甚者不可治依源麻黄湯主之又言聲憂懼舌本卷縮此是木尅土陽繫隂隂氣伏陽氣起起則實實則熱熱則悶亂體重不能轉側則語聲拖聲氣深不轉而急此為邪熱傷脾甚則不可治若唇雖萎黄語音若轉可治黄為脾脾合肉黄如䱇腹者吉脾主口唇脣是脾之餘其人土形相比於上宫黄色大頭圓面美肩背大腹好腹胻小手足多肉上下相稱行安地舉足心平好利人不喜權勢喜附人耐秋冬不耐春夏春夏感而生病主足太隂敦敦然脾應日月有虧盈脾小大随人脣大小上脣厚下脣薄無腭齗脣缺此人脾不正掲聳脣者則脾髙髙則實實則熱熱則季脇痛滿唇垂而大不堅者則脾下下則虚虚則危危則寒而身重不䏻行歩唇堅者則脾堅堅則臟安安則不病脣上下好者則脾端正端正則脾胃和利人無病唇偏舉者則脾偏痛好脹凡人分部中䧟必有病主胃陽明為脾之部而藏氣通于内外部亦應而随之沈濁於内浮清於外若表病外入所部則起起則前一㵼陽後補隂若裏病内出所部則䧟䧟則前治隂後治陽陽則寔熱隂則虚寒寒主外熱主内凡人死生休否則藏神前變形於外人脾前病唇則焦枯無潤若脾前死脣則乾青白漸縮急齒噤不開若夫中等分墓色應之必死不治看色厚薄决判賖促賖則不盈四百日内促則旬朔之間脾病必愈而卒死何以治之曰青黒如拇指厭黒㸃見顔頰上此必卒死脾絶十二日死何以治之曰冷足腫腹熱臚脹泄利不覺其出時面青目黄者五日死病人著牀心痛氣短脾竭内傷百日復愈欲起徬徨因坐於地其亡倚牀能治此者可謂良又面黄目赤不死黄如枳寔死吉㐫之色在於分部霏霏而見黑黄入唇必死不出其年其穴在鼻上當两根是其分部位也若年上不應三年之内禍必應也季夏土脾脉色黄主足太隂脉也其脉本在中封前上四寸之中應在背輪與舌本中封在内踝前一寸大筋裏宛中脉本從中封上四寸是也其脉根于隠白在足大指端内側是也四季之月各餘十八日此為四季之餘日主脾胃黄肉隨病也其源從太隂陽明相格節氣相移三焦寒温不調四時闗格而起則臓腑傷疴随時受癘陽氣外泄隂氣内伏其病相反若腑虚則隂邪所以頭重頸直皮肉强痺若臓實則陽疫所傷藴而結核起於喉頸之側布毒熱於皮膚分肉之中上散入髪際下胃顳顬隠隠而熱不相斷離故曰黄肉隨病也又云灸肝脾二輪主治丹毒四時隨病當依源補㵼虚寔之疴皮肉随熱則須鎌破薄貼方灸足治疾病無逃矣脾實熱夫脾實則生熱熱則陽氣勝而心胷煩悶唇口乾焦身熱頰疼體重不能轉側足寒頸熱聲沈而心急咽喉痛不利舌本腫强口内生瘡言語謇難涇溲不利腹脇脹滿不得安臥夣見歌樂四肢怠惰診其脉𦂳寔者是脾實之候方治脾熱面黄目赤季脇痛滿出千金方半夏母薑各八兩枳實梔子茯苓芒硝各三兩細辛五兩白术杏仁各四兩生地黄淡竹葉各切一升右㕮咀水九升煑三升去滓下芒硝分三服治脾熱偏一邉痛胷滿脇偏脹出千金方茯苓橘皮澤瀉各三兩芍藥白术各四兩人參桂心各二兩石膏八兩半夏六兩生薑切一升桑白皮根一升右㕮咀以水一斗二升煑三升去滓分三服若湏利下加芒硝二兩佳清脾湯出醫方大成治脾實熱病足寒頸腹脹滿煩擾不得臥舌本强體重面黄頭痛右脇滿痛偏脹口苦咽乾唇裂寒熱如瘧茯苓橘皮草菓去皮白术各二錢半夏三錢湯洗七次人參桂心白芷甘草炙川芎各二錢右剉散每四錢用水二盞薑七片紫蘇三葉同煎七分去滓服欲通利加大黄畧煎清脾湯治憂思過度藴熱於脾口乾唇燥瀋裂無色用香白芷黄耆升麻人參甘草炙半夏洗七次右各等分散每四錢水一盞半薑五片棗二枚小麦三十粒煎七分去滓不拘時服瀉熱湯出千金方治舌本強直或夣歌樂而體重不能行前胡茯苓龍膽草細辛芒硝各三兩杏仁四兩𤣥參大青各二兩苦竹葉切一升右㕮咀水九升煑三升分三服食後服大黄湯出聖惠方治脾實胷中滿悶腹脇壅脹身熱頰痛咽喉不利大黄剉炒一两赤茯苓去黑皮三分枳殻去穣麸炒半两甘草炙剉黄芩去黒心各一两麦門冬去心一两半夏洗去滑焙前胡去蘆頸各半两右粗搗篩每服三錢鹽水一盞生薑一片大􅀥一枚煎七分不拘時温服瀉脾赤茯苓湯出聖惠方治脾實熱頭痛胷滿腹脇壅滯不思飲食赤茯苓去皮三分旋覆花半两大黄㣲炒石膏碎各一两桑白皮三分芍藥赤者半两枳殻去穣麸炒三两前胡去蘆甘草炙各半两右粗搗篩