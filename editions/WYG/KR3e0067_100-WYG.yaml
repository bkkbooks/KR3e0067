body:
  text: 普濟方卷一百一明周王朱橚撰諸風門風驚論夫風驚者由體虚心氣不足爲風邪所乘也心藏神而主血脉心氣不足則血虚虚則血亂血亂則氣并於血氣血相并又被風邪所乘故多驚心神不安名曰風驚也又云風驚者心氣不足風邪干之而心不安定也内經曰心爲君主之官神明出焉又曰主明則下安今心氣不足風邪相乘隂陽不和情思錯亂神䰟散越故動作多驚也又曰昔一人被火驚患疾舉身羸弱四肢無力靣色蒼黃左脇下身側上下如臂状每發則痛無時食不减大便如常小便微黃視其部分乃足厥隂肝經兼足少陽膽經也蓋甲膽乙肝故青其黃者脾也診膽脉小此因驚也驚則膽受邪腹中當有驚涎緑水遂以舟車百五十丸濬川散四五錢大加生薑自然汁平旦果下緑水四五行或問大加生薑者何也曰如膽木乘胃土此土不勝木也不勝之氣尋救于子己土能生庚金庚爲大腸味辛者爲金如大加生薑使伐木然先不開脾土無由行也遂用舟車丸先通其閉塞之路是先㵼其所不勝後用薑汁調濬川散大小之次㵼其所勝也大扺陽干尅陽干腑臓尅臓故也方牛黃眞珠丸出聖濟總録治風驚鎭心安神化涎牛黃研眞珠研琥珀研麝香研天竺黃研甘草炙剉鉛霜研雄黃研人參一分茯神去木天南星牛膽匱者各二錢天麻龍腦研一錢半金箔銀箔各一十片同研入藥鐵粉研各一錢丹砂研半兩右爲末同拌匀煉蜜和丸如雞頭大别用大金箔五片衮爲衣每服一丸細嚼人參薄荷湯下小兒半丸十黃散出千金方治五臓六腑血氣少亡䰟失魄五臓覺不安忽忽喜悲心中善恐怖如有鬼物此皆發于大驚及當風從高墮下落水所致悉主之雄黃人參各五两大黃黃蘗黃耆細辛桂心各三分黃連黃耆蒲黃麻黃各一分黃環澤㵼山茱萸各二分黃芩二分右治下篩未食温酒服方寸匕日三不知至二匕羸劣者更加人參五分合十分一方有牛黃二分一方有蜀椒五分乾薑四分一方加硃砂三分金箔散出聖惠方治風驚手足顫掉精神錯亂金箔細研銀箔各五十片細研鐡粉細研二两龍齒麥門冬各一两半去心焙人參去蘆頭琥珀細研犀角屑酸棗仁各一两㣲炒茯神一两半防風去蘆頭葳蕤元參露蜂房各三分炙微黃牛黃半两細研右擣細散入牛黃金箔銀箔更研令細每服不計時候以薄荷酒調下一錢大定心湯出聖濟總録治心虚中風驚悸恍惚多忘或夢寐驚魘志少不足人參白茯苓去皮茯神去木逺志去心龍骨乾薑炮當歸切焙甘草炙白术芍藥桂去麄皮紫苑去苖土防風去乂赤石脂各二两右㕮咀每服五錢匕水二盞入棗二枚劈破煎至一盞去滓温服日三夜二天南星出聖濟總録治風驚鎭心化涎天南星大者逐日換水浸五日慢火煮五七沸切作片子暴乾麩炒令黃香烏蛇浸酒取肉炙白殭蠶直者麩炒令黃天麻各一两乾蝎全者炒黃色白附子炮雄黃研琥珀杵研各三两麝香一分研牛黃研龍腦研各半两丹砂一两半研右除研者外擣爲末各研匀于瓷器收宻封勿令透氣旋鍊蜜和丸如鷄頭大每服一丸荆芥人參湯化下茯神丸出聖惠方治風驚恍惚心神不安茯神川升麻元參生地黃各一两牛黃一分細研虎睛一對酒浸一宿㣲炙石膏細研鐡粉細研龍齒各二两麥門冬一两半去心炙金箔細研銀箔各五十片細研右爲末煉蜜和𢷬丸如梧桐子大每服不計時候以人參湯下二十丸雄黃丸出聖惠方治五臓風虚六腑邪熱風熱相摶令􅄰即驚恐憂患窹即恍惚怔忪忽悲喜怕怖如狂雄黃川大黃沈香薯蕷朱砂人參安息香川椒鐵粉防風附子白茯苓右爲末入研了藥令匀煉蜜和丸如梧桐子大每服不計時候人參茯苓湯下二十丸驚氣丸出危氏方治驚憂積氣心受風邪發則牙關𦂳急涎潮昏塞醒則精神若癡服之紫蘇子一两畧炒附子炮去皮臍一作生用南木香不火南星浸洗薄切片薑汁浸一夕白殭蠶炒去絲嘴天麻花蛇酒炙去骨橘皮一作橘紅麻黃去節各半两乾蝎去毒朱砂各一分留少許爲衣右爲末入腦麝少許同研極匀煉蜜杵丸龍眼大每服一粒金銀薄荷湯化下温酒亦得古云軍中一人犯法裭衣将受刃得釋神失如癡與一粒服訖而􅄰及覺病已失矣江東有一婦人已失心數年受此方不終劑而愈若狂厥去附子加鐵粉化痰鎭心抑肝邪若多恚怒肝邪大盛鐵粉能製伏之素問言陽厥狂怒治以鐵烙金制木之意也一方不用天麻奪命散治急慢二驚及中風白附子天南星全蝎每箇用薄荷葉包裹線縳定生薑汁蘸過炙三次黃色爲度麻黃去節防風去蘆黒附子炮半夏湯洗七次天麻各一錢朱砂别研麝香各半两右爲細末三歲兒一服以小錢抄半錢匕用生薑自然汁薄荷水化滴酒一二㸃立愈急驚加朱砂膩粉少許不用酒甚者三两服小銀泊丸出聖濟總録治心邪虚風悸安神清膈化涎水銀用錫結砂子半夏湯洗七遍去滑入全薑𢷬暴乾天南星炮白礬枯人參各半两白茯苓去皮鉛霜研各一分膩粉半錢研青黛一两銀箔二十片研入藥右爲末水煮麵糊和丸如桐子大每服十丸食後臨卧人參薄荷湯下鐵精丸出聖惠方治風驚狂言妄語不能得睡卧鐵精龍齒犀角人參去蘆頭茯神防風各一两去蘆石菖蒲逺志各三分去心麥門冬去心焙生乾地黃各一两半右爲末煉蜜爲丸如桐子大每服不計時候以粥飲下二十丸犀角丸出聖惠方治風心神驚恐睡卧不安四肢煩熱犀角屑人參去蘆頭茯苓川升麻檳榔龍齒朱砂各半两細研金箔研銀箔各五十片細研右爲末入研了藥令匀煉蜜爲丸如桐子大每服不計時候以人參竹葉湯下二十丸一方用茯神龍齒丸出聖惠方治風虚心驚不定龍齒人參去蘆頭茯神各一两逺志去心防風各三分去蘆鐵粉一分細研甘草半两炙微赤剉金箔細研銀箔各五十片研右爲末入研了藥令匀煉爲丸如桐子大每服不拘時候以粥飲下十五丸牛黃散出本草方治大人小兒驚風退熱取涎朱砂水銀各一錢依法事治麝香牛黃狗黃各一字腦子眞者半錢雄黃零陵香各半两右爲末頓一處臨時和匀每服一字或半錢薄荷湯入銀箔同調下如用取涎入江子二粒去油藥末二錢和匀只可服半字薄荷茶清調下量大小虚實加减與之用補龍腦煎出聖濟總録治驚風心膈生涎龍腦研蝎稍炒水銀研麝香研膩粉研丹砂研天南星薄荷汁浸一宿切炒白附子炮製各等分右𢷬研爲末用石腦油和爲煎每服一皂角子大薄荷湯化下食後臨卧服鉛金丸出聖濟録治心受風邪鎭驚利頭目化痰壅鉛霜半两研金箔一十片研入藥半夏三分湯洗淨生用天南星生用雄黃研各二两白礬生用防風去义各半两白茯苓去皮一两半右爲末水煮麵糊丸如桐子大每服十五丸食後臨卧生薑薄荷湯下藥丸了不可見日小定心湯出聖濟總録治心氣不足風邪所乘驚悸恍惚夢多魘白茯苓去皮四两桂去麄皮三两甘草炙芍藥乾薑炮逺志去心人參各二两右㕮咀每服五錢匕水二盞入棗二枚擘破煎至一盞二分去滓温服日三夜一人參散出聖惠方治風驚悶亂恍惚人參去蘆頭龍齒各二两生熟地黃白茯苓犀角屑小草各一两麥門冬一两半去心焙右擣麄散每服三錢以水一中煎至六分去滓不拘時温服加味壽星丸出危氏方治因事驚涎留心包精神不守事多徤忘譫言妄語如有所見不得安卧或風涎潮作手足抽掣或心虚煩懆天南星三两母眞珠一錢圓半夏六两眞琥珀枯礬各五錢大硃砂一两研爲衣右爲末生薑自然汁煮麵糊爲丸桐子大每服三十五丸淡薑湯下心氣狂甚加鐵膩粉一兩氣不順人參湯下驚悸金銀器竈心土湯上蒸煩懆淡竹葉麥門冬湯寜心定氣石菖蒲湯痰盛喘急桑白皮湯下治小兒急驚麥門冬青竹葉慢驚冬𤓰仁木香湯下鐵粉散出聖惠方治風驚心神不安鐵粉光明砂天竺黃鉛霜各一兩右爲末每服不拘時竹瀝調下半錢壽星丸一名琥珀丸治心腹因驚神不守舎風涎潮作手足抽掣事多徤忘舉止失常精神昏塞譫言妄語不得安卧或痰迷心竅妄語如有所見並宜服之出聖濟生方天南星一斤先用炭火三十斤燒一地坑通紅去炭以酒五升傾坑内候糝酒中下南星在坑内以盆覆坑周遍用灰擁定勿令走氣次日取出爲末一方用米醋沃之硃砂另研二兩琥珀另研一兩右研勻生薑汁煮麵糊丸如梧桐子大每服三十丸加五十丸煎石菖蒲人參湯送下淡薑湯亦得食後臨卧服之或去琥珀亦効若心氣狂甚入鐵膩粉一兩一方治暗風以豶猪心血爲丸人參或麥門冬湯下皆差一方用眞金箔解毒雄黃丸一名雄黃救命丹治因風致驚眼斜反張手足瘛瘲背急發搐方見諸風雜治類治驚癎風神情恍惚語言錯謬歌笑無度兼五臓積冷風毒寒熱用狐肉一片治如食法以豉汁中煮五味作羮或作粥多食並差一方以羊骨汁鯽魚共煮汁服之亦良蜜陀僧散出朱氏集驗方治風驚氣入心語音不能者蜜陀僧研如粉以茶調一錢一服即愈風狂論夫風狂之状始發則少卧不饑自髙自賢自辨自貴葢人之榮衛周身循環晝夜不窮一失其平則有血并於隂而氣并於陽者有血并於陽而氣并於隂者隂陽二氣虚實不調風邪乘虚而入并於陽則謂之重陽故其病妄笑好樂妄行不休甚則棄衣而走登高而歌或至數日不食故曰狂也風邪入血使人隂陽二氣虚實不調若一實一虚則令血氣相并氣并於陽則爲狂又肝藏䰟悲哀動中則傷䰟傷䰟則狂妄不清不敢正當人而筋攣兩脇骨不舉毛悴色夭死於秋又云夫三陽并三隂則陽虚而隂實故癲三隂并三陽則隂虚而陽實故狂論曰陽入隂其病靜隂入陽其病怒則狂矣多隂陽氣暴折畜怒不决之所致故經曰陽明常動太陽少陽不動不動而動爲大疾此其候也治要之法何曰衰其食已夫食入于隂長氣于陽故奪之食即已使之服以生鐵落爲後飯夫生鐵落者下氣矣方珍珠散出聖惠方治風狂妄語心熱狂走不知人眞珠研牛黃研丹砂研各半兩金箔研銀箔研各五十片麝香研一分鐵粉研天竺黃研人參龍腦研各三分一作龍齒黃芩去黒心一兩防風去义犀角鎊各半兩茯神去木三錢麥門冬去心焙一兩半逺志去心甘草炙胡黃連甘菊花白附子炮各三分白鮮皮羚羊角鎊各三兩右除研外擣羅末入研藥拌匀每服一錢匕加至二錢匕薄荷温水或棃汁調下忌生血牛黃丸出聖濟總録治中風邪狂亂失志心多恐怖牛黃研一兩鐵精研三分虎睛研一對石膏研龍齒各研二兩銀箔研一百片金箔一百片與牛黃鐵精虎睛石膏龍齒銀箔再同研地骨皮茯神去木升麻元參人參各二兩麥門冬去心焙三兩枳實去穣麩炒萎􅅋去土赤芍藥各一兩半生乾地黃焙甘草炙剉黃芩去黒心各二兩右除研外搗羅爲末入研藥拌匀煉蜜爲丸如桐子大食後煎枸杞根皮湯下二十丸日再服漸加至三十丸禹餘粮飲出千金方治風邪所中驚狂啼哭或歌或笑一名五邪湯禹餘粮煆研防風去义桂去麄皮赤芍藥逺志去心獨活去蘆頭白术人參牡蠣熬秦芁去苖土石膏搥碎甘草炙剉各二兩雄黃研一作黃丹茯神去木菖蒲蛇蜕炙防己各一兩右㕮咀每服五錢匕以水一中半煎取七分去滓食後服日再服牛黃丸出聖惠方治風狂喜怒不恒或欲狂走不自覺知牛黃研一分逺志去心白龍骨各一兩鐵粉研二兩龍腦研一錢甘草炙半兩茯神人參去蘆頭黃連去鬚鉛霜研犀角屑防風去蘆頭各一兩麥門冬去皮心一兩半硃砂一兩研水飛右爲末入研了藥都令匀鍊蜜爲丸如桐子大每服不拘時以温水下二十丸忌生血虎睛湯出聖惠方治風狂呌笑不時喜怒無常登高踰垣言語不避人虎睛一對慢火熬鴟頭并肝一具炙白茯苓去皮桂去麄皮各三兩石長生去麄莖一兩楓上寄生去麄莖五兩人參露蜂房炙獨活去蘆頭防風去义甘草炙剉天雄炮裂皮臍當歸切焙各一兩右剉如麻豆每以十八錢匕酒六盞煮取三盞去滓分三服日二夜一每服時須去食稍逺恐藥食相犯也一方治狂邪發無常者無當歸以水煮服之一方治狂發無常者以藥爲散不計時候温水調下一錢鐵粉散出危氏方治顚狂譫語亂說神祟不避親踈登高履險或歌笑祼體不飲食數日昏不知人及風證狂怒或如醉如癡顆塊大硃砂一兩另研紅明琥珀一兩另研天南星二兩圓白半夏二兩白礬煆五錢眞鐵粉白附子各二兩大川烏去皮臍生一兩半羗活二兩全蝎五十箇眞金箔三十片殭蠶一兩去嘴絲右爲末每服四錢生薑四兩凈洗取自然汁温煖調服如不任辣味加温水少許服之立效逺志散出聖惠方治風狂發即多啼泣或即歌笑或自說賢智或亂走不避水火逺志一兩去心防風去蘆頭桂心各半兩茯神一兩甘草半兩炙㣲赤剉獨活犀角屑人參各一兩去蘆石膏二兩秦芁一兩去苖黃芩三分麥門冬一兩半去心焙右爲散每服三錢以水一煎至六分去滓不計時温服茯神湯出聖惠總録治風狂失神少卧不饑笑樂無節棄衣登高茯神去木杏仁湯浸去皮尖䨇仁各三兩龍齒六兩凝水石碎斤升麻三兩石膏碎二十兩沙參白鮮皮各二兩生麥門冬去心四兩右剉如麻豆大每服五錢以水二鍾煎至一鍾去滓温服日三如病甚煎成入竹瀝半合再煎至一鍾服白蘚皮湯出聖濟録治風邪入臓狂言妄語精神錯亂腰痛骨疼白蘚皮一分半麻黃去根節半兩白茯苓去皮三分防風去义獨活去蘆杏仁去皮尖雙仁湯浸研當歸剉焙芍藥各一分半桂去麄皮一分右㕮咀每服三錢以水一鍾半煎至八分去滓空心温服訖取㣲汗爲度日三犀角散出聖惠方治風狂妄有所見恍惚不定發即欲走犀角屑白蘚皮楓上寄生人參各一兩去蘆麥門冬一兩半去心焙龍齒一兩防風三分去蘆茯神一兩甘草半兩炙㣲赤剉右爲散每服三錢以水一鍾煎至六分去滓不拘時候温服治風狂亂走不可禁止出聖惠方生鐵二十斤以水二斗煮取一斗去鐵元參一兩防風一兩半去蘆白茯苓一兩半石膏二兩龍齒一兩半秦芁二兩去苖竹瀝一升右爲散入鐵汁中煮取五升去滓内竹瀝和匀不計時温服二合金箔煎出聖濟總録治風邪發狂失神金箔一百片丹砂研龍腦研牛黃研眞珠末琥珀末犀角末各半兩右将六味同再研匀以鼎子一鋪一重金箔了摻一重藥末次第鋪蓋了用牛乳三升於鼎上澆之以慢火煨令乳汁盡成膏爲度每服取皂角子大薄荷湯化服之白殭蠶丸出聖濟總録治風邪發狂妄語躁悶白殭蠶炒三分海荆子炒一兩白附子炮半兩乾蝎酒炒二十一枚蒺䔧子炒令角黃二兩膩粉半兩一半入藥同羅留一半爲衣右先擣前五味與膩粉二錢半同羅爲末冬用大棗蒸取肉研如膏和丸夏鍊白蜜和丸春秋研糯米飯膏爲丸並如梧桐子大又於膩粉二錢半内衮令色匀用蜜器收每日空心日午温酒下五丸加至十丸防己地黃湯出千金方治言語狂錯眼目霍霍或言見鬼精神昏亂防己甘草各二兩桂心防風各二兩生地黃五斤别切勿令藥漬疾小輕用二斤右㕮咀以水一升漬一宿絞汁着一靣取滓著竹簀上以地黃著藥滓上於五斗米下蒸之以銅器盛取飯熟以向前藥汁合絞取之分再服麻黃丸出聖濟總録治中風邪狂走或自高自賢或悲泣呻吟及卒得驚悸邪魅恍惚心下虚悸麻黃去根節煎掠去沫焙甘草炙剉半夏湯浸生布揉洗七次焙各一兩生薑去皮一兩半先與半夏同擣焙乾右爲末鍊蜜和丸如大豆大生薑湯下三丸加至五丸空心午時各一服漸加至十丸治風熱氣盛煩燥如狂出聖惠方熟黃𤓰一枚水五合捩取汁竹瀝二合川朴硝三兩細研蜜二合右藥相和令匀不計時候温服二合黃石散出醫方集成治心風發狂狗肝一具硝石黃丹各一兩半右研匀批開狗肝将藥糝在肝内却以麻線纒定用水量一升煮熟細嚼喫仍以煮汁服之守神丸出聖濟總録治中風邪發狂及肝心風熱氣虚不足驚恚掣瘲金箔一百片膩粉半兩人參為末三分右於銀石器内先将金箔逐重用膩粉糝隔布盡入黄牛乳五合於金箔上淋溉用物宻蓋定煮盡乳取研如膏以人參末漸漸入同研丸如赤小豆大空心日午臨卧新汲水下三丸漸加五丸㵼心湯治心受積熱譫言發狂踰墻上屋大黃黄芩黄連各等分右㕮咀每服四錢用水一盞半煎至七分去滓服香砂散一名硃麝散出十便良方治心轉不定好登高臨險惡言罵詈不避親踈日夜强走獨言獨笑或登高呌怒舉止非常大便秘結小便赤澁解衣祼露不得安處虚言妄亂稱神說鬼遂成狂易之疾服此一劑即定繼以蕤仁并心氣藥七日而安顆塊朱砂研如粉真麝香研右同研匀用無灰酒滿注磁缾内以糠頭火慢燒於磁瓶外約一時乆用銀器攪令熱隨病人飲得酒多少須至醉方止候患人睡着以衣被厚蓋令汗出其人自愈每酒二升使硃砂半兩麝香二銖如病人只飲得一升生用硃砂一分麝香一銖心神旣定却服補心之藥即愈蝦蟆散出肘後方治卒狂言鬼語忽仆地吐涎遺屎不知用燒蝦蟆杵末酒服方寸匕日三一方水服之亦可治風邪治狂病經乆不差或歌或笑行走不休發動無休用豭猪肉一斤煮令熟細切作膾和醤醋食之或姜粥炒任性服之治風狂憂愁不樂能安心氣以牡驢肉食之又以頭燖去毛煮汁以漬麵醖酒蠶紙散治狂發欲走或自高貴稱神皆應方見癲類白雄雞方治狂邪癲癎不欲眠卧自賢自智驕倨妄行不休安五臓下氣用白雄雞一隻煮令熟五味調和作羮粥食之苦參丸治狂邪發無常披頭大呌欲殺人不避水火方見風邪類治卒發狂方出肘後方令病人着地仰卧以冷水終日淋其靣良排風湯出和劑方治男子婦人風虚濕冷邪氣入臓狂言妄語精神錯亂其肝風發則靣青心悶亂吐逆嘔沫脇滿頭眩重耳不聞人聲偏枯筋急曲拳而卧其心風發則靣赤翕然而熱悲傷瞋怒張目呼喚其脾風發則靣黃身體不仁不能行步飲食失味夢寐倒錯與亡人相隨其肺風發則靣白欬逆唾濃血上氣􅍕然而極其腎風發則靣黑手足不遂腰痛難以俛仰髀冷骨疼諸有此候令人心驚志意不定恍惚多忘服此安心定志聰耳明目通臓腑諸風悉主白蘚皮白术芍藥桂心川芎當歸杏仁防風甘草各一兩獨活麻黃茯苓各三兩生薑四兩右㕮咀以水一斗煮取三升每服一升覆取微汗可服三劑此藥大理榮血摧抑肝邪肝實有風脉來浮實有力目赤脅疼口苦心煩錯語多怒宜加羚羊角熱盛者加犀角肝虚有風脉來浮虚無力當去麻黃若不能言者加荆瀝一方每服四錢薑棗煎温服治中風發狂出本草方取釭中膏如雞子大以熱醋攪令消服之治風狂憂愁不樂能安心氣出本草方以驢肉一斤切于豉汁内煮五味合腌腊食之作粥及煮並得治若發狂者出本草方取車轂中脂如雞子熱温淳苦酒以投脂甚攪令消服之令盡風邪論夫風邪者謂風氣傷於人也故病有五邪一曰中風二曰傷暑三曰飲食勞倦四曰中寒五曰中濕其爲病不同風邪中人以腑臓虚而心氣不足也人以氣血榮衛爲主以風氣外至爲邪腑臓虗而心氣不足則風邪乘虚而干之經言病有五邪而中風居其一此之謂也又曰風邪者善行而數變故其發不自覺知狂或妄言悲喜無度乃其證也風邪客于肌膚虚癢成風胗臁瘡風邪入深寒熱相摶則肉枯邪客半身入深眞氣去則偏枯邪客關機中即攣筋中亦然邪滛於臟夢臟大形小滛於腑夢臟小形大邪隨目系入腦則目轉眩邪中精則散視見兩物風邪入臟寒氣客於中不能發則瘖瘂喉痺舌緩不時服藥針灸風逐脉流入臟使人卒瘖緩縱痓痙致死風入陽經則狂入隂經則癲陽邪入隂病則靜隂邪入陽病則怒若因熱食汗浴通腠理得其風自出則覺肉中如針刺步行運力欲汗亦如此也方紫石英丸出聖濟總録治邪入臟心虚氣不足夢寐驚恐紫石英研一兩海蛤白茯苓去皮白石英研菖蒲杏仁去䨇仁尖皮熬石硫黃研逺志去心阿膠炙令燥卷栢去土炒鐵精研細辛去苖葉牛黃研各半兩麥門冬去心焙當歸切焙大豆黃卷生銀剉屑大黃蒸三次炒鍾乳粉肉蓯蓉酒浸切焙乾薑各一兩一分白术白歛前胡去蘆各一分大棗去核炒乾二十枚人參防風去义山芋石膏碎研赤芍藥桔梗去蘆炒栢子仁烏頭炮裂去皮臍桂去麄皮熟乾地黃焙甘草炙各三分右爲細末煉蜜爲丸如桐子大每服空心食前用粥飲下丸日二服外臺秘要加澤㵼秦艽二味各六分黃耆六分半夏八分人參湯千金方治風邪鬼氣徃來發作有時或無時節者人參防風烏頭乾薑澤㵼桔梗狗脊逺志附子黃芩獨活秦艽牡蠣五味子山茱茰前胡細辛石膏川芎蜀椒牛膝甘草石南桑白皮桂心麻黃竹皮白术橘皮各一十八銖鬼箭茯苓各十二銖大棗十六枚右㕮咀以水六升酒六升合煮取四升分五服日三夜二鎭心丸出聖濟總録治風邪驚悸恍惚悲傷或夢寐不安逺志去心一兩一分鐵精杏仁川芎麥門冬去心焙牡蠣各一兩半龍齒研白茯苓去皮各二兩防風去义當歸去心切焙人參鬼臼白术生地黃丹參桔梗去蘆炒甘草炙各一兩一分紫苑去土卷栢山茱茰桂去麄皮乾薑炮防己白歛羚羊角鎊各一兩牛黃另研半兩麝香另研三分銀箔四百片另研虎睛一對酒浸炙令黃另研右爲細末鍊蜜和丸如桐子大每食後下二十丸稍加至三十丸日再服定神安志丸療風邪狂亂失心金銀箔各一百片和合石膏研龍齒研鐵精研地骨白皮茯神黃芩生乾地黃升麻茯苓元參人參各八分虎睛一具㣲炙牛黃生薑屑各四兩麥門冬一錢去心枳實炙甘草炙葳蕤芍藥各六分逺志去心栢子仁白蘚皮各五分右擣篩以蜜和丸食訖少時煮生枸杞根服如桐子大二十丸二服漸加至三十丸不利熱麯海藻菘菜蕪荑炙肉醋蒜粘食陳臭油膩金箔丸聖惠方治風邪狂亂失心安神定志金箔五十片細研銀箔石膏一兩龍齒一兩鐵粉二兩細研人參茯神一兩逺志一兩去心硃砂一兩細研防風黃芩一兩犀角屑一兩虎睛一對酒浸一宿微炙牛黃生地黃一兩川升麻一兩地骨皮一兩元參麥門冬一兩半去心焙枳實半兩麩炒㣲黃甘草半兩炙㣲赤剉右爲末入研了藥研令匀鍊蜜和丸擣三五百杵如桐子大每服不計時候以薄荷湯下二十丸小八風散出千金方治迷惑如醉狂言妄語驚悸恐怖恍惚見鬼喜怒悲憂煩滿顚倒邑邑短氣不得語語則失忘或心痛徹背不嗜飲食惡風不得去帷帳時腹疼熱惡聞人聲不知痛癢身悉振摇汗出猥退頭重浮腫爪不能痛頸强直口靣喎戾四肢不隨不仁偏枯攣掣不得屈伸悉主之方天雄當歸人參各五分附子天門冬防風蜀椒獨活各四分烏頭秦艽細辛白术乾薑各三分麻黃山茱萸五味子桔梗白芷柴胡莽草各三分右治下篩合相得酒服半方寸匕漸至一匕日三服以身中覺如針刺狀則藥行也鎮心丸治冐氣厥實風邪入臟喜怒憂心氣不足恍惚多忘夜不得寐諸邪氣病悉主之秦芁一兩栢實當歸乾漆熬白歛杏仁去皮尖熬川芎各三分澤㵼一兩地黃六分防風人參各四兩甘草一兩炙白术薯蕷茯苓乾薑各三分麥門冬去心二兩前胡四分右擣篩以蜜和丸如桐子大先食飲服十丸日三不知稍增之忌桃李雀肉海藻菘菜蕪荑酢物鎮心丸一名牛黃丸治老小心氣不足虚弱時苦小語勞則劇風邪百病主之方見心中風類人參飲治風邪入心臟忽心痛驚恐小腸微痛乍寒乍熱心中悶而色青赤虚勞邪氣方見心中風類菖蒲湯出聖惠方治中風邪恍惚悲哀或狂走不定如有鬼神或身體强直日夜常痛口噤水漿不下靣目變色甚者不識人菖蒲去節鬚米泔浸切焙秦芁去苗土桂去麄皮當歸切焙禹餘糧煆醋淬七遍人參附子炮裂去皮臍黃芩去黑皮甘草炙遠志去心防風去义各半兩龍骨去土一作龍齒芍藥川芎各一兩防己二兩赤石脂茯苓各一兩白者去黑皮右剉如麻豆每用十錢匕以東流清水二盞煎取二盞去滓分三服空心食前日三服服藥後良久方得飱食其藥末宻收勿令透氣一方有犀角屑無赤石脂入黍米一茶匙煎服續命湯出聖濟總録治風邪入心心背俱痛腹脇脹滿或寒或熱心中煩悶進退無常靣色或青或黃麻黃去節煎掠去沫焙一兩半秦芁去苗土芎藭大棗去核十枚桂去麄皮防風去义細辛去苗葉甘草炙剉芍藥人參獨活去蘆黃芩去黑心防己剉各一兩乾薑炮一兩一分附子炮裂去皮臍白术各三分右剉如麻豆每用十錢匕以水三盞煎取二盞去滓分温三服要汗併二服相去如人行五里再一服服後更用熱生薑稀米粥投汗出慎外風如常服只空心午時臨卧各一服外臺秘要有石膏無防己鼈甲湯出千金方治風邪夢寐涕泣妄有所見惡聞人聲體中痠削乍寒乍熱腰􅆃强痛腹中拘急不欲飲食或因疾病後勞動不節婦人産後月經不利時下青黃赤白體虚羸瘦小便不利頭靣發熱旋復解散或一度交接彌日困極皆主之鼈魚甲七枚炙凝水石碎桂去麄皮白茯苓去皮防風去义白薇知母各四兩麻黃去根節湯煎掠去沫焙一兩半黃芩去黑皮三兩甘草炙芍藥白术各二兩一分貝母去心一兩六分石膏大如雞子一塊碎右㕮咀每服五錢匕以水一盞半煎七分去滓適寒温服日一病與藥相當即下積滯如牛脂榆莢科斗蝦蟇之類為效驗當歸湯出聖濟總録治風中邪虚悸恍惚悲傷或夢寐不安鎮心當歸切焙羚羊角鎊各二兩龍齒碎三兩茯神去木四兩人參一兩防風去义川芎杏仁去皮尖雙仁各二兩半夏湯浸洗去滑七遍生薑與半夏同研炒乾各四兩桔梗炒二兩石膏碎三兩防己剉二兩桂去麄皮一兩半右麄擣篩每用十錢匕以水三中煎至二中去滓入竹瀝一合更煎兩沸分三服每空心午夜卧各一服忌牛羊酢物等類物虎睛湯治狂邪發無常披髪大呌喚欲殺人不避水火方見風狂類門桂心散出聖惠方治風邪入心心痛連背或上或下腹滿悶亂神思不定靣色青黃桂心一兩赤芍藥半兩防風半兩去蘆細辛半兩人參半兩去蘆川芎半兩枳殻半兩麩炒微黄去瓤附子三分炮裂去皮臍木香半兩桔梗三分去蘆麻黃一兩去根節甘草半兩炙微赤剉右為散每服三錢以水一鍾微煎入生薑半分煎至六分去滓不計時稍熱服人參散出聖惠方治風邪入心神思恍惚悲愁不樂喜怒無常人參三分去蘆防風去蘆桂心細辛石菖蒲各半兩楊上寄生二兩附子半兩炮裂去皮臍乾薑半兩炮裂剉莽草一兩微炙鬼箭半兩茯神三分甘草半兩㣲炙赤剉右為散每服三錢以水一鍾煎至六分去滓不拘時温服楊上寄生散出聖惠方治風所攻志意不樂身體拘急楊上寄生白术各一兩桂心半兩茵芋防風去蘆栢子仁石菖蒲細辛附子炮裂去皮臍乾薑炮裂剉羌活甘草各半兩炙微赤剉右為散每服三錢以水一鍾煎至六分去滓不計時候稍熱服遠志散出聖惠方治風邪所中眠卧不安喜怒無常意不定遠志半兩去心龍齒三分楊上寄生一兩石菖蒲半兩細辛半兩人參三分去蘆防風半兩去蘆茯神三分生乾地黃三分黃耆三分剉甘草半兩炙微赤剉右為散每服三錢以水一盞入生薑半分煎至六分去滓不計時温服川芎散出聖惠方治風虚邪氣所攻發即腹滿急頭眩眼運欲倒川芎三分獨活三分防風三分去蘆白术半兩漢防己半兩杏仁三分湯浸去皮尖雙仁麩炒微黃枳殻三分麩炒微黃去穰茯神一兩羚羊角屑三分桂心半兩甘草半兩炙赤剉右為散毎服三錢以水一中盞煎入生薑半分煎六分去滓不計時温服别離散一名寄生散出千金方治男子風邪男夢見女女夢見男悲愁憂恚喜怒無常或半年數月一發動者桂心茵芋天雄菖蒲細辛茜根外臺作蘓根附子乾薑各一兩白术桑上寄生一作楊上寄生已上各三兩右治下篩酒服方寸匕日三丸修合勿令婦人雞犬及病者家人知見令邪氣不去禁之為驗治風歷年歲或歌或笑或哭言語無所不及出千金方麻黃三兩人參桂心白术各二兩芍藥甘草防己黃芩川芎當歸各二兩右㕮咀以水一斗二升煮取三升分三服取汁太一丹出聖濟總録治心經風邪消化痰涎清利頭目人參酸棗仁炒山梔子仁阿膠炒令燥各半兩甘草微炒天南星牛膽製者各一兩元精石研麝香研龍齒研各一兩丹砂研三兩右為細末鍊蜜和丸如小彈子大以金箔為衣每服一丸食後荆芥湯嚼下牛黃丸出聖濟總録治風邪客于五臟精神恍惚不寧牛黃研一錢地榆三兩白附子炮三兩丁香半兩麝香研半兩黃耆細剉二兩雄黃研水飛過一兩天麻羌活去蘆川芎各二兩右為細末入研者三味和匀以蜜水熬甘草成膏和衆藥丸如櫻桃大每服一丸茶酒嚼下麻子湯治風邪感結衆殃恍惚不安氣欲絶水漿不入口麻子五合熬橘皮芍藥生薑桂心甘草炙各三兩半夏五兩洗人參一兩當歸二兩右㕮咀以水九升煮取三升分為三服忌海藻菘菜羊肉􅄳生葱茯苓丸出本事方治風歷年歲或歌或笑或哭言語無所不及辰砂石菖蒲人參遠志茯神白茯苓真鐵粉半夏麴南星牛膽製各等分右為細末生薑四兩取汁和水煮糊丸如桐子大别用硃砂為衣乾之每服十粒加至二十粒夜卧生薑湯下琥珀生犀湯出聖濟總録治風邪安心智定魂魄調心氣穩眠睡琥珀研犀角鎊各半兩茯神去木人參生乾地黃焙菖蒲石上者防風去义各一兩遠志去心甘草微炙各半兩右麄擣篩每服三錢匕水一中煎至六分去滓温服不計時龍虎丹出瑞竹堂治男子婦人心神恍惚陽明經大盛時復驚懼哭泣口發狂言不避親踈一切風病等證龍骨研虎骨酥炙箭頭硃砂研人參遠志甘草水煮去皮酸棗仁炒去殻各一兩大天南星三四枚泔水洗浸去皮滑涎控乾竹刀剜成罐裝硃砂末以南星末蓋之猪心一箇取新殺豶猪𢃄血熱心内置南星在内以燈草裹猪心外用麥門冬草洗浄不以多少包之甑上九蒸九暴取出南星於金銀器内盛之取日精月華之氣暴露七晝夜擣羅為末後加餘藥一同和勻右為細末用無灰酒打麵糊冷定和搜成劑丸如梧桐子大每服五七十丸空心温酒送下小兒丸如黃米大每服至三五十丸人參湯下病甚重者不過二十丸即愈除根不發乳香丹砂煎出聖惠方治心經風邪化上膈痰涎乳香鉛白霜牛黃丹砂龍腦各一分别用研犀角鎊别取細末再同上五味研令極細半兩升麻炒三十錢匕大黃末炒三十錢匕右拌匀鍊蜜和作劑毎服一皂子大用温薄荷湯化下食後臨卧服羚羊角散出聖惠方治風邪入臟心神煩亂恍惚頭目眩痛羚羊角屑一兩防風去蘆頭二錢半芎藭二錢半茯神二錢半麻黃一兩半去根節石膏二兩羌活二錢半甘草一兩炙微赤剉右為散毎服四錢以水一中盞煎生薑半分煎至五分去滓入竹瀝一合更煎三二沸服不計時温服桑螵蛸丸出聖濟總録治丈夫婦人心風癲邪桑螵蛸四十九枚醋浸炙令焦黃色酸棗仁石菖蒲阿魏研麝香研丹砂研蛇黃煆醋淬研各一分右為細末麵糊丸如小豆大每服十五丸至二十丸食後生薑薄荷湯下黃芩湯出聖濟總録治風邪心熱神不安黃芩去黑心一兩半麥門冬去心焙白茯苓去黑皮各二兩淡竹茹三分羚羊角鎊防風去义各一兩半石膏碎研三兩右為末每服六錢匕以水二盞煎取一盞半去滓下朴硝一錢匕食後分三服如人行四五里一服荆芥湯出醫方集成治一切風邪上攻頭目咽膈不利或傷風發熱頭疼鼻塞聲重並皆服之荆芥穗十二兩天麻去苗附子炮白附子炮烏藥當歸洗川芎各一兩右為細末煉蜜和丸每兩作十丸硃砂為衣每服一丸食後細嚼茶清任下酒下亦得防己湯治久風邪入肝脾二經言語不轉漢防己防風桂心附子各半兩葳靈仙三分麻黃半兩右為細末每服四錢水一盞煎至七分去滓温服日三四用竹瀝荆瀝地黃汁各一盞生薑汁半盞和匀服之五邪湯治五邪氣入人體中鬼語諸妄有所語閃亂恍惚不足意志不定發作往來有時人參白术茯苓菖蒲茯神各三兩右切以水一斗煮取三升先食服八合日三忌桃李雀肉羊肉􅄳酢物茯神湯出千金方治五邪氣入人體中見鬼妄語有所見聞心悸跳動恍惚不定茯神人參菖蒲茯苓各三兩赤小豆四十枚右㕮咀以水一斗煮取二升分三服防葵散出千金方治狂邪發無常披髪大呌喚欲殺人不避水火防葵人參貫衆各五兩防風桂心各三兩右㕮咀以水一斗煮取三升分四服稍服亦可治狐狸諸色精魅作種種惡鬼令人恐怖狂癲風邪方出千金方雄黃六斤油一斗二升右破雄黃如棊子大鐺中以盆合頭作竈微火煎九日九夜不得少時火絶亦不得火冷湏火熱微不絶神驗蝦蟆散出千金方用蝦蟇燒灰硃砂等分毎服一錢水調下日三四服一方無硃砂治風邪不識人不能語者用燒人屎灰酒服慎生冷酢滑猪雞魚蒜等及治癲狂伏龍肝湯出千金方治風邪方見風恍惚類苦參丸出肘後方治狂邪發作無常披頭散髪大呌欲殺人不避水火用苦參為末以蜜為丸如梧桐子大每服十丸薄荷湯下治心虚風邪所乘精神恍惚健忘方出十便良方用鏵鐵四斤久經用者以炭火燒令赤投水如此七遍即堪打碎如碁子大以水二斗浸經二七日每服水一盞日三一方投醋中商陸丸出千金方治中風邪狂用商陸根生去皮秤十二斤半細切以水一石向東鍋竈内煎减半去滓更以緩火煎如膏可丸即丸如桐子大每服熱水下十丸加至十五丸合藥時勿令雞犬婦人見未效即加二十丸至二十五丸又方可服莨菪方及大豆柴湯皆以汗出為度又一方以竹瀝下十丸白兎藿香飲主風邪熱狂用白兎藿香宜煮服之乾則擣末傅諸毒妙又方出聖惠方用伏龍肝細研每服一錢以水調下日四五服桂附丸出衛生寶鑑治風邪冷氣入乘絡或臟腑暴感風寒上乘於心令人卒然心痛或引背膂乍間乍甚經久不差川烏頭三兩炮去皮臍黑附子三兩炮去皮臍乾薑二兩炮赤石脂二兩蜀椒去目二兩微炒開節桂二兩去麄皮右搗為末蜜和為丸如梧桐子大每服三十丸温水送下覺至痛處即止若不知加至五十丸以知為度若早服無覺至午時再二十丸若久心痛每服三十丸加至五十丸一盡劑終身不發治風邪通潤骨髓出本草以醍醐服之補五臟逐十二風邪惡氣并治濕風出本草以鱓魚常作臛空腹飽食便以衣蓋卧少頃當汗出如白膠汗從腰脚中出候汗盡煖五木湯浴湏慎風一日更三五日一服普濟方卷一百一
