body:
  text: 普濟方卷二百六十八明周王朱橚撰雜録門頭面藥手膏方桃仁杏仁各二兩去皮橘一合赤匏十枚辛夷仁芎藭當歸各一兩大􅀥三十枚牛腦羊腦白狗腦各二兩各色狗亦可右搗先以酒漬腦又另以酒六升煮赤匏以上藥令沸待冷乃和諸腦等勻然後碎辛夷等三味以綿裹之􅀥去皮核合于酒中以甆器貯之五日以後先洗手訖取塗手甚光潤而忌火炙手脂法猪胰一具白芷桃仁去皮細辛各一兩辛夷冬瓜仁黄瓜蔞仁酒二升右煮芷沸去滓膏成以塗手面光潤手膏又方白芷四兩芎藭藁本萎蕤冬瓜仁棟仁各三兩􅀥肉三十枚猪胰一具冬𤓰瓤汁一升橘肉十枚瓜蔞仁十枚右以水六升煮取二升酒二升援猪胰取汁桃仁研入以洗手面口脂方硃砂二兩紫草末五兩丁香末二兩麝香一兩右以甲煎和為膏盛於匣内即是甲煎口脂如無甲煎即名唇脂非口脂也唇脂法蠟二分甲煎一合須别作自有方紫草半分硃砂二分右於銅鍋中微火煎蠟一沸下羊脂一沸又下甲煎一沸又内紫草一沸次硃砂一沸瀉著筒内候凝任用之合口脂法好熟硃砂三兩紫草五兩丁香末二兩麝香末一兩口脂五十挺沈香三斤烏藥上蘇合一兩半麝香二兩栙香五兩白膠香七兩雀頭香五兩丁香一兩蜜一斤右並大柯六兩粗搗碎以蜜拌和分為兩分内甆器瓶内其瓶受大四升内訖以薄綿幕口以竹篾交結蔽瓶口藿香二兩資宿一兩零陵香四兩茅香一兩甘松香一兩半右以水一升酒一斤漬一宿與胡麻油一斗二升内煎之為澤去滓勻分著二壜各受一斗掘地著壜令壜口與地平土塞壜四畔令實即以上甲煎瓶器覆中間一尺糠火燒之常令著火糠作火即散著糠三日三夜燒十石糠即好冷出之綿濾即成甲煎蠟七斤上硃砂一斤五兩研令精細紫草十一兩於蠟内煎紫草令濕好綿濾出停冷先於炭火上消蠟内甲煎及攪看色好以甲煎調硬如煎軟即加蠟竹刀子挑上看硬軟著紫草於銅鍋内消之取竹筒合兩口脂法紙裹繩纒以鎔脂注滿停冷即成於口脂模法取乾竹徑頭一寸半一尺二寸鋸截下兩頭並不得節堅頭三分砍之去中分前兩相者合令蜜先以冷甲煎塗摸中合之以四重紙裹筒令縫上不得漏以繩子牢纒消口脂瀉中令滿停冷解開就摸出四分以竹刀子約筒截割令齊整所以約筒口齊故也前有麝香末一兩後又有麝香二兩未詳一凡人早晨洗面之時先須含水在口微嗽動以手澣水洗眼在大漱又洗以水盡為度予自六十嵗聞老人之言至令六十嵗末嘗廢一日縱有𦂳急之事亦不失又自十月冬初以來嗽口洗眼更不洗面又於每夜刷牙後必以水浸髭髯逾時方住迨今髭髯未白宜記之𫝊身香粉方廣南四時攝生論粟米一斗作粉青木香麻黄根附子炮甘松香藿香零陵香牡蠣已上各二兩右杵為末絹袋盛浴後𫝊身其粟米粉若用英粉亦妙製脂粉法桃花粉方光明砂雄黄熏黄並研末真珠末鷹糞珊瑚雲母粉麝香用當門子鹿角粉無論多少各等分右九味研以細為佳就中鹿角粉多少許無妨燒輕粉法右做曲用金絲礬一斤明礬一兩半鹽十四兩合水銀一斤每一兩銀二兩曲煞千搥用上造臙脂法準子鉚一斤别搗白皮八錢别搗胡桐淚五錢波斯白石蜜兩磥右于銅鐺器中著水八升急火令魚眼沸内紫鉚又沸内白皮訖攪令調又沸内胡桐淚及石蜜總經十餘沸紫鉚並沈向下即熟以生絹濾之漸漸浸疊絮上好淨綿亦得有畨餅小大隨情每浸訖以竹夾如乾脯於炭火上炙之燥復更浸浸經六七遍即成若得十遍以上益濃美好鹿角粉方取鹿角三四寸截之乃向炊竈底燒一遍去中心虛惡者并除黒皮訖搗作末以絹篩下水和帛絹四五重置角末於中絞作團大小任意於炭火中熟燒即將出火令又搗碎作末還以水和更以帛練四五重絞作團如此四五遍燒搗碎皆用水和已後更三遍用牛乳和燒搗碎於甆器中用玉鎚研作末將和桃花粉佳括樓作粉法深掘取括樓大根厚削皮至白處寸切之水浸一日一易水經五日取出爛搗研以絹袋盛之澄濾令極如法作粉去水服方寸七日三四製油法省油方蛤粉浮萍草逺志舍粉居上上松黄丹已上各一分右為細末每油一兩用藥一錢可㸃照一月出油藥龍骨烏魚骨滑石定粉各一兩風化石灰四兩右為末冬月熟坑􅏼夏用日炙出油藥滑石五兩赤石脂三錢蜜佗僧五錢白土五兩右為細末於汚衣水調塗紙貼在以熱熨乾即去如有此痕再上用熱亦可用白土烏魚骨碾末塗之亦可合油窓油法麻油四兩桐油三兩定粉一錢萆麻子一百粒右先研定粉萆麻子令細將麻油同打候勻熟然後入桐油再打成油使須猛日中便乾方有光彩歌曰桐三油四不須煎百粒萆麻細細研定粉一錢相和合太陽相射便光鮮省油方細辛逺志丁香瓦松各等分右研為末每四兩油内可著一錢㸃至一月不止去油汚以海螵蛸白蟮土各一兩滑石一錢為末擦油處煎油法真麻油一碗握濃皂角水濾去滓一碗右二物并一處須用磁器内煎以杖子攪毎碗煎至七分候冷澄清者用碗底濃者不用治油頭立春立取正帶霜菜葉左右揩之出油方右用白石脂研碎絹羅兒隔過有油處摻定用紙隔熨過如有顔色衣服亦不改色製麯法酒麯方麵一百斤菉豆二斗桂花俱要六兩川芎砂仁丁香益智白术人參萆撥檀香胡椒紅豆細辛官桂附子回香陳皮南星一兩乾姜蓯蓉茱茰杏仁茯苓木香良姜右為細末三伏内取寅日寅時水浸菉豆去皮蒸熟一處和藥末麵豆踏成磚塊用楮葉包裹繩子縛吊於麯房内封開無使透風三七二十一日打開窓紙出氣至八月中秋每米一石十六斤浸米六日去漿淋洗蒸熟米麯搗碎和勻先一日用河水煎漿花椒四兩清油四兩葱白四兩一處煎漿看天色冷暖撘蓋至七日八日上槽取清酒澄清裝泥頭頓收久矣無妨麵一千斤豆二石五升麥牙末三斗蒼茸末蓼末五斗占米一石作粉子生姜二十自然浙沈香檀香桂心丁香細辛茱茰川椒萆撥川芎甘草當歸陳皮紅豆藿香白茯苓二斤半南星白豆蔲防風附子五斤木香官桂胡椒人參白术杏仁右為細末白麵一千斤用藥和匀六月三伏取寅日寅時水和麵豆同藥末一處和勻踏造薄麯塊用楮葉依法包裹每米一石用麯二十五斤煎熟湯三斗先米二石後三日再投或米一石仍煎漿放冷夏之春八日冬十二日去滓取清酒或裝半罈封口造臘酒依前法廣木香細辛砂仁甘草南星肉豆䓻桂花桂皮桂枝胡椒川椒杏仁白术無茯苓亦可白檀良姜萆撥天仙子芫花陳皮甘松川烏頭右各等一兩為細末每米一斗用一兩或一兩半臨下脚須和使甆底用細酒麯方官桂五兩桂花五兩南星三兩紅豆四兩廣木香五兩丁香四兩砂仁二斤細辛五兩芫花三兩苦參四兩良姜五兩陳皮胡椒四兩川烏六兩川芎三兩川姜四兩川椒四兩白术四兩香附子四兩香白芷三兩馬蓮花四兩姜黄三兩肉豆䓻地黄四兩茯苓三兩甘菊花大回香四兩山豆三兩乾姜四兩萆撥五兩廣苓苓四兩右為細末用白麵八十斤菉豆二斗煮熟先用前藥内二斤四兩發一料再用白麵通四百斤菉豆一石五斗酒麯藥方木香四兩白术四兩甘草四兩藿香三兩丁香二兩半白芷二兩半零陵香白附子二兩白茯苓二兩川烏一兩白豆䓻二兩桂花四兩良姜二兩川芎三兩半甘菊花四兩陳皮三兩細辛二兩半夏三兩杏仁四兩官桂二兩三奇六神麯法白虎白麵一百斤勾陳蒼茸搗汁二升青龍青蒿自然汁三升騰蛇野蓼搗汁四升𤣥武杏仁去皮尖看麵乾温水用右一處拌勻稍乾為妙用大盆罨一宿于伏内上寅日踏極實為度甲寅戊寅庚寅乃三奇也卧鋪如麯法棖麯法右用大香棖十個蒸餅十個先將蒸餅焙乾為細末將棖子去穰研爛如泥入蒸餅末搗勻以圏子打成麯餅子慢火焙乾製酒法仙酒方黄栢獨活苦參桂花藿香香附姜黄良姜乾姜滑石甘松山柰右件各等分用蓼子草黄荆根二件洗淨煎湯藥各一錢重用糯米一升和前藥為丸如彈子大米一斗每升作一百丸蜜酒好蜜二斤水一碗細麯一升半好乾酵二兩右先熬蜜水去花沫令絶冷下麯酵三日熟製茶法臘茶檀香甘松丁香縮砂木香石榴皮明礬白豆䓻以上各三錢薄荷五分右為末篩過入上等春茶一斤以粉草三兩重熬膏入窠隂乾不令過火後入麝香合子薫過製鮓法做鮓方用荷葉封瓶口用紙數重再封瓶口内上用飛鹽上蓋之用好精肉十斤切作薄片子用飛鹽八兩同勻醃三兩個時辰又用香油半斤或六兩滚熟葱數十斤細末又用熟米麯約兩碗茴香末一兩花椒去目一兩為麄拌匀入瓶内製蠟燭法澆燭法𤣥胡索赤芍藥定粉蛇床子右為細末油蠟各一斤用藥末一錢先油一斤蠟三分之一化開研用藥末攪勻澆三兩遍添蠟一分又澆三兩遍再添餘蠟則重硬如一重矣布心須用新布勿令煎過則不明此燭可作極大者有三妙一省蠟二極明三更耐於真蠟捍心洗布澆燭之類止用常法凡燭上工皆能之皂角油蠟燭法右用青油一斤好肥皂十鋌先將皂水潤煨過搥碎以少湯浸援取濃汁真令皂角無苦味以絹絞去滓其汁如麵糊先傾油在鐺中初記確多少分數然後下皂角汁攪匀慢火熬仍不住手攪直候油到原記處即下蠟半斤攪令極匀傾在磁盆器中别以盆盛水氷之極凝取出香色過於真者皂角汁不見只底下有少細滓若作燭衣尋常捍燭法夏月上面微以薄薄澆之尤佳製墨法煉法每烟重一兩紫草六莖藿香五分甘松五分香白芷指大一塊搥細陳皮秦皮同訶子一個紫藤香指大許用水同煎取七分去滓將藥水一半煎阿膠二錢重皮膠一錢重入皂角指大將烟在金桌子上煉成丸大小如意成定用印印之印入灰池一宿風乾不可見日墨乾以水用布揩光極良此法甚黒若輕粉少許尤光烟三兩重膠一兩水二兩一錢重硃砂十分之一綠礬半硃砂之數每烟一斤用膠五兩二錢大小和勻用臼搗礬與紫草蓋復諸色耳取黒用黒光盒子盛之隨手蓋上膠法每烟一兩用魚膠一錢半阿膠二錢秦皮黄連訶子黄栢白芨白歛紫礦各五分水一小盞煎至半盞將兩色膠同浸冬月一宿春夏少時先將魚膠就原藥汁煮軟打令無麤滓再同阿膠一處碗盛蒸化熱調烟不可大遲或如燥添湯做成錠便入灰中三日取起用木截草蘸水略洗乾用刷子出光如或要香可入獐腦在烟内或入香白芷茅香同煎藥汁亦得每烟一斤用膠五兩六錢取烟法右用真桐油二分麻油一分燈盡㸃火白碗蓋高二寸每盞用燈心四五莖萆麻子二粒搗碎莫令傷火煙白旋旋取烟燒煙法右以桐油一斤栢子仁巴豆各二錢重為末打入油内令勻燈盞二十個滿盛油燈心大者每盞用五莖㸃著上以碗蓋候一食時即取烟頻掃為佳不得合燈燎著恐白以油盡為度可得烟八分重製麵法作麵法右用阿膠水和甘草膏少許硼砂紫子和勻蘸過眼乾脫印法用麻油蒸過揩之貴家用胡桃核油或松子油亦可油索麵方每麵十五斤正月用鹽十二兩二月用鹽十二兩三月鹽十四兩四月鹽十五兩五月鹽十九兩六月鹽二十兩七月鹽十九兩八月鹽十八兩九月鹽十四兩十月鹽十二兩十一月鹽十兩十二月鹽九兩製藥法收藏藥法沈香置舊盛蜜瓶中雖綿厯嵗月其香清潤不殘麝香包外再以莖荷葉裹之可使香氣不聞於外檀香以蠟攪麵為糊刷原藤紙封之可經久不泄丁香貯以新罐繫油單紙封口則不燥頻焙則不蛀臘子雞冦毛相思子同入素衫合用内收之則不耗人參以細辛逐層間積納新瓶中宻封之可不蛀腽肭臍宜雜漢椒獐腦等同處收之則蟲不蛀駝酥經春月以瓶盛閉沈之井中冬間取出不効天雄附子用漢椒拌入新瓶内掛近火處可不蠧白花蛇薄以桐油抹勻紙裹置石灰中永久不壊碙砂每裹雜以乾薑六兩同收置於暖處不可潤川芎及白附子宜曬燥同石灰末收之可久不損紫蘇和根暖曬乾以火微燒其根畔則其葉不落淮棗略用些麻油拌勻盛入新瓮緊䝉收之不損皂角蒸過曬乾以籃盛掛厠室側雖經久不蛀凡貴細生熟藥材並用好厚藤蠟紙重復包裹緊齊收藏則雖經厯嵗月藥性不泄仍於春雨秋隂時節時復檢㸃之藥性畏忌梁隠居曰上藥一百二十種為君主養命以應天中藥一百二十種為臣主養性以應人下藥一百二十五種為佐使主治病以應地合三百六十五種應三百六十五度隂陽配合母子兄弟根莖花實草木骨肉有單行者相須者有相使者有畏者有相殺者有相惡者不可合用至於相反與有毒者制之無法服之皆能殺人不可不知也藥八數種單行者七十一種相須者一十二種相使者九十種相畏者七十八種相殺者三十六種相惡者六十種相反者一十八種藥十八反人參紫參沙參𤣥參丹參芍藥細辛並反藜蘆白芨白歛半夏瓜蔞貝母並反烏頭烏啄大㦸芫花海藻甘遂並反甘草芫花海藻並反大㦸藥貴六陳枳殻茱萸并半夏橘皮狼毒及麻黄六般之藥宜陳久入用之方功効良伏硝用栁枝湯煎煮三周湯減再添熱水煮則伏火又用雞腸草栢子仁和為丸如彈子大於瓶内燒自然汁伏火製硫黄蚌粉益母草即茺蔚子去氣菠䔖草五倍煮古拜生薑固石羔寒水石雌雄黄滑石製水銀法飛水霜法水銀一斤朴硝八兩大醋八兩黄礬十兩錫二十兩成煉三通者𤣥精六兩鹽花三斤右七味先煉錫訖又温水銀令熱乃投錫中又搗𤣥精黄礬令細以絹下之又搗錫令碎以鹽花并𤣥精黄礬等合和以醋拌令濕以鹽花一斤籍底乃布藥令平以朴硝蓋上訖以盆蓋合以鹽灰為泥泥縫際乾之微火三日旺火四日凡七日去火一日開之掃取極須勤心守勿使須臾間解慢則大失矣造水銀霜法水銀石硫黄伏龍肝各十兩細研鹽花一兩鹽末是也右四味以水銀别鐺熬石硫黄碎如豆并别鐺熬之良久水銀鐺熱石硫黄消成水即併於一鐺中和之宜急傾併併不急則兩物不相入併訖下火急攪不得停手若停手即水銀别在一邊石硫黄如灰死亦别在一處攪之良久硫黄成灰取見水銀即與伏龍肝和攪令調并和鹽末攪之令相得别取鹽末羅於鐺中令遍底厚一分許乃羅硫黄伏龍肝鹽末等於鐺中如復蒸餅勿令全遍底羅訖乃更别羅鹽末覆之亦厚一分許即以盆覆鐺以灰鹽和土作泥塗其縫勿令乾裂裂即塗之唯令勿洩炭火氣飛之一伏時開之用火先緩後急開訖以老雞羽掃取皆在盆上凡一轉後即分舊土為四分以一分和成霜研之令調又加二兩鹽末凖前法飛之訖棄其土又以餘一分土和飛四分凡得四轉及初飛與五轉每一轉則棄其土五轉而土盡矣若須多轉更用新土依前法飛之七轉而可用之結水銀成砂闕以谷精草闕製玉法製玉易雕以蟾蜍熬為膏用塗玉上則易於雕琢製金銀銅鐵法闕製銅變白闕以真阿膠闕袪蠅法驅蠅蚊用黎蘆末置酒飯中引蠅至者必死終是不絶不若用栁枝酒放在房門外引其去乃妙又方用蒼术藜蘆末在房内焚之稍可袪去予謂不若黄草布遍糊窓又方用鋸末曬乾以硫黄多信少用和作香筒燒之治蒼蠅用臘月臘日即冬至後三戌日買猪版脂一個用鉢盛貯掛在後架上一方懸於厠上余居霅川暑日趙徳言留飯坐間全無蠅子咸切訝之渠云不獨此也因擕手往庖視之亦無一蠅叩其法祕不言遂力懇乃笑曰此小術耳用臘日猪版脂一斤或二斤罐貯懸於厠上次年試用之果驗此理殆不可曉袪蚊法辟蚊子法五月五日取老蛤一隻將好粗墨一塊入蛤口内用紅線縛住蝦蟇用羅鏡取正午方掘一穴五寸深埋於内直至第二日午時却取出蝦蟇口中墨要用時於壁上畫葫蘆一個永不去咬人却不可打死如欲去時次早用扇去拭所畫葫蘆則後用靈驗取墨時須要蝦蟇活死則不大驗樗皮散辟蚊子臭樗皮細切阿魏芫花夜明砂炒羅木鎊右五味粗搗篩以慢火於房内烟之薫蚊子香附子蒼术半斤雄黄别研獐腦别研各五錢右為細末入雄黄獐腦和勻重羅打作香印爇之恐獐腦濕難打臨用時略焙令燥驅蚊蚋壁虱蒼术一斤木蓽子雄黄各二兩五錢右為細末蜜丸如彈子大床下燒一丸或於蚊合時當門燒之薫落如麵靜盡一方加當歸辟蚊方詩曰木蓽川芎分兩停雄黄減半始為精煉蜜為丸如皂大一夜􅋜直到天明於香爐文武火燒仍辟惡蟲去蚊蟲右五月取浮萍隂乾燒烟又治消渴以浮萍汁服之治蚊蟲以鰻鱺魚乾者於室燒之即蚊子化為水矣又法五月五日取浮萍草曬乾及二月收苦練花夜明砂合搗為末作香印燒蚊子盡去又法辟蚊子一名浮萍散以浮萍羌活搗為末加蒼术白膠香亦得如香焚之蚊去翼日掛帳無蚊子辟蚊子呪曰天地太清日月太陽隂陽太和急急如律令勑面太隂念七遍吸氣吹燈草上㸃之驅蚊子詩三首夜明砂與海金砂二味和同苦練花每到黄昏燈一捻蚊蟲飛去别人家木蓽茅香分兩停雄黄少許也須秤每到黄昏燈一炷安床高枕至天明萍朴揀活芎天仙术最雄搗羅為香爇一夢見周公驅蚊藥方每用木屑一斗入天仙藤四兩裁㫁剉碎同研為末如印香焚之蚊蚋悉去又方辟蚊子及諸蟲以苦練子栢子菖蒲為末慢火燒之聞者即去又方五月採浮萍隂乾加白膠香蒼术等分燒薫之水閉日更值女星日造帳子雖蚊多之地亦絶無之蓋女土蝠蚊之所畏者又方治蚊蟲浮萍厚朴羌活川芎各等分右為末作香篆燒其蚊逺去辟蚊蚋以送迷香合羌活為丸散夜燒之袪虱法虱子藥百部秦芁馬鈴草藜蘆苦參一處搗每畨漿衣著一捻至老不受虱子咬又方治大小兒頭身上遍有虱用藜蘆一兩山柰子一兩研為末頭上摻上自然落去入糨子内和作糊糨衣袴亦自去之如水銀用茶末涶津和作綿繩繫腰亦可辟虱藥川芎蓽撥分兩同雄黄加位蜜和勻休道辟虱二寸廣一炷明香永不生薫衣虱法以百部秦芁各一兩為末煙薫衣虱自落身虱方用水銀和鶴虱末帛揉之為孛繫衣自落辟虱用蜈蚣浮萍曬乾燒烟薫之則去清鹽水遍洗床席上即絶治去牛犬虱用百部根作煮湯洗牛犬虱即去治殺蟣虱用牛遍太常貯名遍特今潞州上一種名便特六月有八月結實採其根搗末油調殺蟣虱根苖主療大都相似治頭上虱用藜蘆為細末摻擦在髮中經宿虱子皆乾死自落頭虱方用麻油調輕粉塗髮驅壁虱方用獨活末不以多少鋪撒於床褥席上壁間又方用桐油油紙油帽撘在衣架上并房内左右上下皆掛著其虱自無又方用雄黄一兩信二錢為細末和勻木滓作蚊烟燒之其氣味可辟時時燒薫又方用緑礬熬水調麵糊紙糊床壁再以緑礬熬水掃壁坑櫈床上又方蒼术四兩當歸二兩木蓽子三兩雄黄一兩五錢右研為末蜜丸如彈子大以猛火焚之於床坑上燒烟薫之其臭無比却要將衣被鋪蓋别置一所逐日各房蒸之治虱子方凡人多虱者將及冬市水銀百文臘茶一大錢於手掌内以津唾調開將綿作繩挼匀外以絹作袋裹之繫於腰間隔一二重帶之甚妙須年年易之一方治壁虱予獨居親用自到京師家人共有三十餘口每到宿臥坐地必上下用紙糊無一空處嘗燒香至睡床坑上俱無其物蓋在人自愛潔淨收拾鋪蓋常時撿復並不曽見有壁虱其餘離逺各房未免竟無殺蟣虱以大空根皮作末油和塗蟣虱皆死去蟣虱以虱建草挼取汁沐頭盡死人有誤吞虱成病者搗絞汁服一合殺蟣虱以牛扁根搗末調油塗之去虱取水竹葉生食之袪蟲食皮法韉被蟲蝕方取茣茱搗末和麵作糊塗韉面煎茱萸汁刷之蟲永㫁氊被蟲蝕方則取黄蒿有子者暴乾鋪氊中捲之令遍置閤上十年不蝕辟蟲採薺花置席下能辟蟲雕清治身面刺墨先用竹筯子依字令畫熟牛血將隨血㸃之字劃科深以藥再㸃待乾即落之次以長肉膏貼之瘢痕無矣仍忌雞羊肉鴨印鮓醬房室一月新石灰一升蕎麥桿灰半碗落藜草灰半碗巴豆三十枚去殻胡椒三十粒木鼈子一個去殻右以三灰一處和勻三藥一處研細别置一簸箕攤著帛於箕内安灰於帛上箕下安瓦鉢盛貯用沸湯五錢淋取汁候稍沈勿用脚將汁入銚熬沸纔乾又添直待煎至半錢許如兩呷多大乾即剗起入器内以椒豆等三藥投攪令勻便用黄蠟封固勿泄氣候冷挑一星微㸃舌頭即時潰爛些少過一刻便是此其驗也臨時用之白蓮散治瘢靨及雕青或肌肉肉破以紙灰烙用紙灰漬入肉中不去便似雕青不去宜用此藥花碱二錢桑子灰一錢糯米三錢風化石灰五分右將藥盛在一處小磁罐内上用瓦蓋口用黄泥固濟以文武火焙乾定半時取出藥用乳鉢研令極細每用先以針尖撥過黶子用藥少許乾貼忌油膩物及當風行立五灰膏桑柴皮棗柴灰蕎麥稭灰右等分燒灰淋水煎次白石灰淋水刺入共煎成膏入治身上印文雕青方取水蛭以雞子一枚搯開小頭内水蛭以皮兒蓋合封著直至蛭食盡雞清乾其水蛭自死取汁查之一方用白馬汗塗之治身上及面上印文方用針刺字上破以醋調赤土朱𫝊之乾又易以黒滅即止又方右以未滿月小兒屎傳上一月即没取字法硼砂瓦灰白龍骨木賊白石脂蜜佗僧桑柴皮信少許右為末先濕字後摻藥末以熨斗熨之乾隨落藏果菜法去木瓜酸味以粉塗生木瓜則去酸味藏大栗以沙藏之隔年如生而潤去汚衣法洗油墨蒼术二兩黒牽牛二兩赤小豆一升皂角二挺好者右為細末白水丸如彈子大以滑石為衣每洗用一百丸只作末亦得久汚衣水浸一宿然後洗桐油之類皆洗之如新加蕶陵香白芷在内亦可作洗面梳頭藥去油方白石脂滑石白膳土陳石灰烏魚骨右等分為末洗衣神仙無瑕散去油汚顔色繡作衣服服書畫者龍骨一兩五錢海螵蛸滑石各二兩白膳土一兩右為細末以摻汙處良久揉之便落如欲急用以紙襯熨之末盡再用以淨為度如衣物等油了多時却用麻油塗在舊迹過些小不如仿前法用其妙如神去油法用之汙處如新白膳土黒牽牛等分滑石減半等分亦得右為細末先以紙一兩幅摻藥一重在上次將油汙衣鋪在藥上再用藥一重於衣上又鋪紙一重方用熨斗於紙上熨之少刻除之去藥油已去如未淨再換藥熨去其藥鍋内炒過仍可用熨火不可太猛洗油法滑石龍骨白膳土等分右為細末摻油汙處良久揉去即淨更不須澆熨若加黒牽牛末尤妙一上未淨再上藥即淨去矣一方白膳土一斤滑石四兩赤石脂龍骨各一兩同研細乾摻之良久揉便落洗油汙衣服方白礬一兩滑石二兩軟石三兩燒過妍如粉右研令極細以摻油汙處良久揉之便落洗桐油墨汙法不得犯水只以黒牽牛花杏仁末乾挼落急救油衣粘併法右以黄土泥水和如煎麵餅表裏塗之隂乾一宿以水濯去之不粘也去漆汙衣服以真杏核敲取仁台椒等分爛研以揩汙處淨為度漆已乾者恐不可用孫盈仲嘗衣一新褐道服過舅家見一胡床據之而坐不知其新漆未乾也既而遍身皆汙漆臣者偶先𫝊北方未試亟合而用之效居倉卒二藥不盡好然汙亦盡去餘跡隠隠而已松脂著人手足及衣氊褥洗不去法嚼杏仁洗之立去除采色衣物等著車脂及油膩等米研煮作飯洗之即不損緋紫碧緑一云車脂嚼粟以水洗之蠟以蜜水洗之極驗洗油膩方造墨人以洗手極淨及以洗手甚妙茶茗子即食茶子也杏仁去皮尖如引洗壓去油右等分肥皂洗手如洗字以藥末安字上以熨斗略熨彈之即落洗衣法以莙薘菜隂乾燒灰淋汁洗不動色洗墨汙衣法以蝙蝠糞著水洗之一方用牽牛末洗之便去楊梅汁汙衣用硫黄燒烟薫去洗桐油以生銀杏肉擦汙處令透用熱湯澆洗盡去墨汙用馬糞擦數次車頭油脂汚用口嚼生栗子揉洗衣法不使碱將筆取太陽氣念元亨利貞七遍就水上寫濟字又取太陽氣寫流字却將水浣洗衣服自然白淨洗手上黄梔諸色入肉以米醋煮灰汁同洗皆脱又方去松脂著人手足及衣氊褥洗不去法煮小便和皂角洗佳以酒洗亦加以蜜湯洗之平復不損色出油龍粉散龍骨烏魚骨滑石定粉各一兩風化石灰四兩右五味搗羅為末如冬月用熱坑上􅏼夏日頭炙出油白粉散右白脂石研碎絹羅隔過有油處摻定用紙隔熨斗熨如衣服有顔色者亦不改色洗衣用梅葉搗爛泡湯洗之易淨洗葛蕉衣服用梅葉挼清水洗之經夏不脆洗膩衣以芋煮汁洗之如白玉殺衣中蠧魚以楂子置衣箱中佳製弩箭藥法合弩箭藥大金藤飛蠱藤地菊地油麻吕公縧棹木悶多羅根百蛇藤萆麻子根波楞根烏龍藤爛藥少許半天藤木通右各等分為麤末用淨瓦碗一個地上撅一孔放碗在孔内用薄竹笆蓋在碗口上用生茅草三葉十字放在竹笆上後放藥末在竹笆上用大樹葉或諸般樹葉蓋在藥上留頂上一孔却用温灰團團煨住頂上放炭火燒徐進火量時抽出茅草著黄色為度取出竹笆用碗内藥汁調擴藥母乳鉢内研爛不稀不稠就搽上箭頭上曬乾後用粟殻草燒煙薫箭頭此箭見血便死每一錢擴藥母須搽七根箭頭為放此箭筒裝不要走了氣常掛燒灰火有煙處搽藥時箭頭上用綿子些少纒住箭頭上然後搽藥上如此藥不脱落解箭頭藥大昂頭解牙齒緊又能治塗罨腫痛喉内疼痛木統管解擴治肚痛小昂頭解散治骨脈疼痛毒瘡擂爛酒調木都管解擴藥治百木死氣九將官解身骨疼痛山桂皮治大畜散山百脚解住血存生氣治痢飄風浪解水面生氣飄風散解散氣血脤山明靈解飛蛇水明靈解水中高龍魚鼈大銅鑼木煮水洗爛藥銀龍水治嘔吐解吐藤解吐白龍藤解百蛇青龍藤解百蟲噴心南蛇藤解百蛇氣猛蛇藤解蛇烏龍藤解擴藥子大烏蛇解蛇霜涼藤解喉蝴蝶藤解迷悶困睡大蚶藤解牙緊半天藤解喉小烏蛇藤解蛇大金藤解身骨疼痛醖斗藤洗身骨緊硬左轉藤解藥身一切轉解血藤解血氣引預藤諣諭衆生氣即天門冬白蛇藤解蛇木通藤解手足軟弱車帶藤洗刀傷蜈蚣藤治蜈蚣洗腫毒川石藤治攀觔發破石攀藤解冷睡即猢猻美百萬解解衆生氣即金剛根照頂木煮洗腫爛七鬭根洗刀傷骨節銀弟解擴金弟解擴縛脛解衆生氣木藥發用水浸軟細如筯縳頂上箭不藥箭不裂喉通引藤引出生氣項賈藤解牙緊小丁如藤解洗箭口身硬藥煮水洗身山獸藤解山上烏猿如發此藤煎酒喫洗之高樓望月根解飛禽山都管解擴藥右為末引子用五倍子為末用鹽等分熖硝等分烏梅肉多用水煎爛同煉搜為膏磁罐收之不許乾子如不酸倍加五倍子烏梅肉此係酸藥各每服一錢重噙化下日進三服治被藥箭傷隨即先用此藥疎醒後却服定心丸定心丸方母丁香減半木香硼砂焰硝甘草沈香雄黄辰砂各等分右將前五十味藥同八味煉蜜為膏用罐盛之每服一錢噙化日三服為丸加米粥解擴藥箭大昂頭九將官大統管木都管山都管金弟銀弟地菊山苦練金藤紗藤山百脚右件為末合成用酒煎滚於加鹽摻温服不犯鐵器用銅銚煎將原燒藥竹笆燒作灰碾細酒調服全解子藥煎過藥合就得每服一餅細嚼薑湯送下如痢不止涼水補之更用涼水洗手然後飲粥大㦸五兩地油麻一兩土當歸一兩右為末用稠米糊為餅子即過藥千里漿一名水葫蘆木瓜紫蘇葉桂皮烏梅肉赤茯苓各五錢右為細末煉蜜為丸如彈子大噙化一丸嚥津又方百藥煎烏梅肉紫蘇葉人參甘草麥門冬右各等為細末煉蜜丸噙化藥箭方八月採烏啄搗笮莖取汁日煎為射罔以𫝊箭射走獸十步倒也中人則死速宜解之靛法法靛甕青藥烏頭草烏蒼术川山甲斑猫芫花甘遂紅豆白芷青娘子紅娘子蠶蟲信石苦參山查砂仁狗脊川芎南星甘草天仙子半夏巴豆當歸天麻人參附子各等分右隨靛多少用藥靛自發都下染坊家常用普濟方卷二百六十八
