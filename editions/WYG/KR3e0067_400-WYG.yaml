body:
  text: 普濟方卷四百明周王朱橚撰嬰兒雜證門雜病附論夫小兒百病者由將養乖節或犯寒温乳哺失時乍飢乍飽致令血氣不理腸胃不調或發成驚欲成伏熱小兒氣血脆弱病昜動變證候百端若見甚微證不即治之使成衆病故謂之百病也治之若晩其病則成凡諸病至於困者汗出如珠著身不流者死見病兒胷䧟者其口唇乾目皮反口中氣出冷足與頭相柱卧不舉手足四肢􅂷而卧正直如縛脚中掌中冷至十日必死不可治也方虎睛丸出聖惠方治小兒百病療寒熱鬼氣癥癖羸瘦諸痢驚癎腹脹喘促痰結胸中滿悶虎睛一對微炒牛黄一分細研真珠末一分犀牛角屑半兩巴霜半分杏仁一分湯浸去皮尖䨇仁麩炒微黄吳藍半兩赤芍藥半兩牽牛子半兩微炒桔梗一分去蘆頭漢防己一分牡蠣半兩燒為粉鱉甲半兩塗醋炙令黄去裙襴右搗羅為末都研匀爛蜜和搗三五百杵丸如菉豆大每服以温水下二丸量兒大小加减服之龍膽散出聖惠方治小兒百病療攣蒸客忤驚癎壯熱不解龍膽一分去蘆頭鈎藤二分柴胡一分去苗黄芩一分桔梗一分去蘆頭赤芍藥一分茯神一分甘草一分炙微赤剉蜣蜋二枚去翅足微炒炙川大黄一兩剉碎微炒人參一分去蘆頭當歸一分炒微黄右搗麄羅為散每服一錢以水一小盞煎至五分去滓分為二服日三四服量兒大小加减牛黄丸出聖惠方治小兒百病驚癎魍魎三十六種無辜癧子疳濕閃癖天行急黄赤眼等悉主之牛黄麝香各半兩細研光明沙一兩細研水飛過真珠末一分丼遂一分煨令微黄虎睛二枚細研赤芍藥赤茯苓一分巴豆霜一分杏仁一兩湯浸去皮尖䨇仁麩炒微黄牡蠣一分燒為粉右搗羅為末都研令匀煉蜜和搗三五百杵蓐中兒如粟米大一二歳如麻子仁大三四歳如麻子大五歳已上如菉豆大每服平旦以粥飲下二丸至午食時不吐利便更服一丸仍與少許湯飲投之當下諸惡物効牛黄丸出聖惠方治小兒百病及一切難治之疾牛黄一分細研大㦸一分硃砂麝香各一分細研當歸半兩微炒枳殻一分麩炒微黄去穰鱉甲半兩塗醋炙令黄去裙襴巴豆霜半分川大黄半兩剉碎炒黄右搗羅為末都研令匀煉蜜和搗二三百杵丸如黄米大每服以粥飲下三丸量兒大小加减服之銀白散醫方集成治小兒百病升麻知母甘草白扁豆山藥人參茯苓去皮白术各等分右為細末每服一錢慢驚搐搦麝香少許飯飲調下急驚定後陳米飲調下驚吐不止丁香湯下天柱倒脚軟濃米湯調下夾驚傷寒薄荷葱白湯調下疳氣吐脹氣急多渇百合湯下渾身壯熱面赤驚呌金銀薄荷湯調下赤白痢不思乳食薑三片棗三枚煎湯下喫食不知飢飽不長肌肉炒麥芽一撮生薑煎湯調下暴㵼紫蘇木𤓰湯飲下神形脫言語不正及大人吐㵼藿香湯下諸病後無精神少氣力不思食煎生薑棗湯下禀受氣怯可每日一服最妙常服沸湯㸃不拘時一方無知母大効䨇丸出聖惠方治小兒百病身熱頭痛飲食不消心腹脹滿或心腹㽲痛大小便不利或重下數起或别無異疾唯飲食過度不知自止哺乳食積或驚寒熱或蒸後哺食减少氣息不快夜啼不眠是腹内不調悉宜服甘遂半兩煨微黄巴豆霜半分麥門冬半兩去心焙牡蠣一分燒為粉㽔仁一分湯浸去皮研入真珠末一分右搗羅為末入研了藥都研令匀蜜和丸半歳兒以温水服一䨇如菜子大一歳服一䨇如半麻子大二歳三歳服一䨇如麻子大常服不拘時鷄鳴時服至日出當下如不下者以熱粥飲投之即止加减四君子湯出活㓜口議理小兒諸疾和胃調心怡神養氣人參去蘆白茯苓去皮白术各一兩甘草半兩炙右為細末每服一錢塩湯㸃服或㕮咀加薑棗尤妙常服調氣加山藥和氣加生薑心神不定加辰砂棗子心忪心煩心神不寜加茯神驚啼手足瘛瘲睡卧不安加全蝎鈎藤白附子脾虚胃弱生風多困加半夏麯没石子冬𤓰仁傷風身熱頭痛氣促加川芎防風等分細辛羌活减半發渇加乾葛木𤓰枇杷葉去毛煩渇加黄耆胃冷嘔吐涎沫加丁香嘔逆加藿香葉脾胃不和加白术薑棗脾困加人參木香縮砂仁脾弱腹脹不思飲食加扁豆粟米傷食加炒神麯胷滿喘急加白豆䓻涎𠻳加杏仁桑白皮半夏麯風壅邪熱加生薑荆芥咳𠻳紫蘇湯調胃虚汗出大麥煎湯調飲食不進加薑棗經絡藴熱頭面及身體生瘡加𤓰蔞桔梗傷寒時氣風熱痰壅咳𠻳及氣不和加細辛𤓰蔞根桔梗生薑薄荷煎加防風川芎尤良有寒及遇天寒發熱去𤓰蔞根桔梗瘡疹已出未出大便閉澁發渇加𤓰蔞根桔梗若不渇臟寒下痢加乾薑勞熱徃來加川芎盗汗加陳浮麥虚汗多夜啼喘加犀角麥門冬小便赤澁加麥門冬大便閉去白术加陳皮温中和氣止吐㵼思飲食俱加陳皮薑棗若要生胃氣即加白扁豆陳皮薑棗煎吐㵼腹痛煩渇加黄耆白扁豆藿香乾葛薑棗吐逆四肢厥逆腦門低䧟加藿香丁香吐利過多脾胃虚乏欲生風候加白附子生薑泄㵼加陳皮厚朴薑棗作痢加炒罌粟赤痢加赤芍藥當歸粟米白痢加炮薑粟米臟腑滑泄加煨訶子肉一方名四聖湯治二十一證治乆吐胃寒加石蓮子木香黄茋名生胃散治嘔逆噦噦不止加白扁豆薏苡仁並炒藿香名銀白散治胸膈煩悶冷熱不調痰涎咳𠻳不美飲食日夜壯熱加知母貝母烏梅乾薑名寛中散治肚腹疼痛加陳皮青皮棗子生薑名温中散治夜啼煩躁肚腹疼痛加沉香硃砂名鎮心驅邪散治表裏虚弱時氣作熱欲傅疹候加細辛𤓰蔞名惺惺散治脾寒胃熱隂陽不順冷熱常作加滑石地骨皮名六神散治霍亂吐利神不安穏加藿香丁香名藿香散治脾胃虚弱飲食不進加製厚朴陳皮等分名平胃散治吐食不納榖氣加丁香半夏麯名益神散治脾胃乆虚不納飲食頻吐或㵼不止加肉豆䓻青皮天台烏藥名理中散治熱㵼水榖不分加瞿麥車前子名導赤散治虚熱煩躁定神安志加犀角川芎名安神散治心氣不足神情恍惚加石菖蒲石蓮子肉石膏名補心散治體熱夜啼煩躁加白附子全蝎膩粉名清神散治脾虚肌瘦神困面無顔色食不克化腸胃乆寒吐逆無時加黒附子枳殻吳茱萸麥蘖細辛名温脾散治霍亂吐㵼嘔逆腸鳴自利腹肚疼痛加川白薑名人參散治傷寒身熱頭痛煩渇加麻黄乾葛天麻硃砂名解肌散治心神不寜驚悸煩赤瘛瘲加硃砂羌活防風天麻名鎮心散治脾胃虚弱腹肚泄利調中進食加訶子陳皮名益黄散治虚積利腹肚痛裏急頻併加陳皮罌粟殻名調中散治小兒百病及一切難治之疾出聖惠方夜明沙半兩細研甘草一分炙微赤剉芫花一分醋拌炒令乾巴豆十枚去皮心研紙褁壓去油右為末都研令匀煉蜜和丸如麻子大每服以温水下二丸量兒大小加减加减四味飲子出聖惠方治小兒百病當歸孩子體骨多熱多驚則倍其分數用之川大黄先蒸二炊飯乆薄切焙乾或兒小便多熱倍用赤芍藥細剉炒兒四肢多熱多驚大便多㵼青黄色宜倍用甘草兒熱即生用兒寒多泄多即炙倍用之右等分各細剉和匀每服一分以水一鍾煎至五分去滓温服半合日三四服量兒大小以意加减醒睡散出危氏方治小兒諸病後多睡白殭蠶二錢葳靈仙三錢大㦸一錢右為末每服半錢臘茶清調二服便醒畫眉膏出危氏方治斷乳梔子三枚燒灰存性研雄黄硃砂少許右為末入清油少許輕粉少許調匀候兒睡着濃沫於兩眉睡來自不喫乳未効再用即驗治小兒不能乳出千金方用雀糞四枚為末著乳頭飲兒兒大十枚治小兒食不知饑飽出千金方用鼠屎二七枚燒為末服之失笑散出全嬰方治小兒諸病并汗後不得睡莨菪子草烏頭醋炙切片麩炒酸棗仁炒去皮各等分右為末每服半錢水醋各半盞煎至三分服兩服便睡治小兒祟病百邪鬼魅癰腫及熱結腫殺疳蟲鼠瘻惡瘡以端午日取蝦䗫不拘多少取眉脂以硃砂麝香為丸如麻子大小孩子疳瘦者空心一丸如腦疳以妳調滴鼻中青金丹治小兒諸病青黛羅過半錢羊桃滑石末南星丁香羅過各二錢匕水銀二錢先以錫二錢於銚子内煮鎔便放水銀拌和㵼出放冷用輕粉二錢川巴豆去皮心膜七十二枚無缺損者井花水浸一宿懸當風處吹乾爛研右同拌合用軟飯為丸如梧桐子大巴豆不去油依形證用湯使傷寒後取積痰煎葱湯吞下取疳蟲用牛肉汁下驚風肚中緊硬面青黒金銀薄荷葱湯吞下因傷食肚中及腹皮上微熱肚脹夜間作熱似疳又不似疳面青黄色眼微黄此腹中有積用皂角子二七粒灰内煨過用水一盞煎至半盞下有積作㵼魚鮓湯下氣積炒茴香湯下週歳十四丸三歳十八丸七歳二十四丸㸔大小加减仍湏四更初下此藥天明通下積盡可依形證候下藥補之臨喫此藥恐先吐小涎亦不妨人參羌活散出德生堂治小兒感冐諸疾麻黄去節五錢冬用七錢半人參半兩川芎半兩前胡二錢半獨活半錢羌活半兩右㕮咀每服一錢水一盞生薑一片薄荷一葉煎至三分去滓服三歳之下一歳之上一服木香散出徳生堂能和表裏通行津液官桂木香大腹子前胡甘草陳皮丁香人參訶子肉半夏砂仁赤茯苓已上各三錢右㕮咀每服三錢水一盞薑一片煎六分去滓稍熱服乳前千歳丹傅氏活嬰方飲交妳而致疾者伏翼大者三五十箇去肚内糞糟鹽酒炙令赤色去骨蕪荑炒右為末用醬及豆䜴薑搗為丸如菜子大茶酒任下又宜用伏翼酒洗浴藥出傅氏活嬰方治氣浮身腫退浮消腫慿洗浴腫退風消便散浮凌霄花根并大蓼蚕沙馬蓼香茹投白茅質汗宜多用蟬退五加皮可收皂角紫蘇俱剉碎忍冬籐向籬邊求苦參白芷隨多少清水濃煎入艾頭天晴日暖頻頻浴兒身疾去可無憂交泰丸出衞生家寶方治小兒因驚飲食失節致隂陽不和臟腑生病中滿氣急噎塞不通飲食下咽即成嘔吐服之立効驗水銀生硫黄各等分右同研不見水銀為度棗肉為丸如粟米大每服一歳兒七丸温米飲下黄耆白术散出十便良方治諸虚不足面色萎黄臍腹痛脹不思乳食骨肉消瘦喘促氣麤四肢倦怠五心煩熱口燥咽乾頰赤心忪日晩潮熱發歇有時或冐風寒悉皆治之黄耆官桂甘草白芍藥人參茯苓白术神麯各一兩右為麤末每服一大錢以水一大盞入生薑二片棗一箇煎至七分去滓温服食前銀白散百一選方治小兒諸疾慢驚搐搦麝香飯飲調下日進六服急驚定後陳米飲調下驚吐不止陳米飲調下天桂倒脚軟濃米飲調下夾驚傷寒發搐薄荷葱白湯調下疳氣脹急多渇百合湯調下發熱面赤渾身壯熱忽然驚呌金銀薄荷湯下赤白痢不思乳食生薑三片棗五箇陳米一合煎飲調下喫食不知饑飽不長肌肉用麥蘖一撮同炒薑湯調下暴㵼紫蘇木𤓰湯調下形神脫改語言不正及大人吐㵼藿香湯調下二錢海上名方甚妙白术細剉以菉豆一合炒香去豆黄茋微炒勿令焦人參乾山藥白扁豆微炒黄香勿焦各一兩白茯苓兩半白附子文武火炒微黄地上去火毒天麻剉如鷄子大麩炒黄各半兩白殭蠶先去灰微炒勿焦木香濕紙褁煨川升麻水浸過生用甘草剉炙勿令焦各一兩真糯炒黄藿香去土生用半兩右為細末患依湯使服常服米飲調下小兒半錢或一字婦人産後亦可服麻黄升麻湯出東垣蘭室方治小兒寒熱欝喘喉鳴兼腹滿鼻流清涕脉沉急而數麻黄一錢半草豆䓻一分半升麻半分益智仁一分半厚朴二分甘草一分當歸梢一分麴末半分吳茱萸二分柴胡梢一分蘇木半錢紅花少許生黄芩一分全蝎二箇右件剉如麻豆大分作二服每服水一盞煎至七分去滓稍熱服食後忌風寒微有汗則効補陽湯出東垣蘭室方治二月間一小兒二歳大寒證明堂青脉額上青黒腦後青絡髙起舌上白滑而喘大便微青耳尖冷目中常常淚下眼多眵淚胷中不利卧而驚多眼澁無搐則寒柴胡三分升麻二分麻黄三分吳茱萸半分地龍半分蝎梢炒生地黄半錢當歸身三分炙甘草一分黄茋二分黄栢一分橘皮一分葛根一分連翹一分右㕮咀都作一服水一大盞半煎法如常乳食後熱服服藥之後添喜笑精神出氣和順乳食旺消痞丸出東垣蘭室方快利黄連半兩枳實二錢黄芩三錢甘草三錢人參三錢右為細末蒸餅為丸如粟米大每服三十丸温乳下塌氣丸出衛生寶鑑治中滿下虚單腹滿虚損者陳皮去白蘿蔔子炒各半兩胡椒木香青皮去白草豆䓻去皮各三錢蝎梢去毒二錢半右為細末水糊為丸如梧桐子大米飲下三十丸食後日三服白粥百日重者一年小兒麻子大桑白皮湯送下十丸日三服大人桐子大四十丸如隂嚢洪腫水冷次用滄鹽乾薑白麵各三錢水和膏子攤紙上􅂗於隂嚢上二聖丸出鮑氏方小兒病中足冷為虚寒腹脹足冷肚中氣鳴足冷水㵼足冷糞青足冷頭熱足冷脉沉微足冷陳方以為腫病用石亭脂硫黄炒褐色各一兩大附子半兩炮右為末飯丸米大一周十丸乳汁下空心或急風足冷者不用牽牛散出全嬰方治小兒膀胱實熱腹脹小便赤澁水氣流腫又治結胷傷寒心腹硬痛又治疳氣攻腎耳聾右以牽牛生為末三歳一錢青橘皮湯調下食前結胸傷寒白湯調下耳聾隂腫并用猪腰子半箇薄批糝藥一大錢重重令遍外以少許鹽擦之濕紙褁煨熟空心喫此藥又治遍身風疹薄荷湯調下大便利立効白糊丸小豆大三十丸茴香湯下治隂疝常服消核腫治小兒核食吐方出本草用合明草𢷬絞汁服療小兒鬼䑛方出本草以狐屎燒灰和臘月猪油􅂗療小兒野鷄下部痒悶方枳殻二兩鬼箭羽青木香鬼臼各二兩右為末以釅醋和藥青布褁熨之如瘡頭破令拔去根立瘥療小兒臟腑寒肚疼作啼其證必下青白黒糞為驗宜服此方先以葱湯洗次用熟艾紙上烘熱以帕子褁熨臍腹間頻易之痛止服藥大妙如病乆體虚天柱骨倒宜白殭蠶末三歳用半錢薄荷湯服治小兒吃土用鴝鵒肉炙食之不過一枚差楊氏産乳出本草凡子不得與桑椹子食令兒小寒魃病附論夫魃病是隂制小兒所有此魃病由婦人懐娠之時有惡神導其腹中胎妬嫉而制伏他小兒令病也其姙婦不必悉能制魃故時人或有此兒魃之為病喜微微下痢徃來寒熱毛髮鬇鬡不悅是其證也方龍膽湯出直指方治魃病龍膽草微炒鈎藤皮柴胡北梗芍藥川芎茯苓甘草炙各二錢大黄二錢半濕紙褁煨人參一錢右剉散每服二錢井水煎服仍以紅紗袋夜明沙與兒帶甘草散出聖惠方治小兒中魃面色白赤而復變青者如醉色故復發作面赤若青黒色繞口不治覺病候晩者死覺之早者所中邪色氣未入臟腑又微引乳者可服如經有熱小便赤澁夜啼甘草一分炙微赤剉龍骨一分赤茯苓一分牡蠣一分燒為粉生乾地黄一分黄芩一分當歸半兩剉微炒桂心一分右為麄散每服一錢以水一小盞入淡竹葉七片煎至五分去滓入白蜜一錢更煎一兩沸量兒大小以意分减温服一方加麥門冬三五粒同煎大黄散出聖惠方治小兒中魃挾實川大黄半兩剉碎微炒赤芍藥一分白蘚皮半兩甘草半兩炙微赤剉黄芩一分犀角屑一分赤茯苓一分右為麄散毎服一錢以水一小盞煎至五分去滓量兒大小輕重加减日三四服虎骨丹出醫方妙選治被魃病虎頭骨炙鬼臼草龍膽鬼箭各一兩琥珀白膠香各半兩右為細末煉蜜和丸如黍米大每服十粒乳香湯下量兒大小加减服之魃妳散出全嬰方治小兒飲母魃妳黄瘦豆䓻母丁香宣連胡黄連各等分右為末三歳半錢空心米湯調下治小兒繼病服藥不効者繼病母有娠乳兒兒有病有瘧痢他日亦相繼腹大或瘥或發他人相近亦能相繼北人未識此病取伯勞毛與姙娠婦帶之立差一方令兒帶之又方用絳紗袋盛夜明沙令兒帶勿令乳母及外人知之伏翼散出聖惠方治小兒生十餘月後母又有娠令兒精神不爽身體委瘁名為魃病右取伏翼去毛爪腸燒為灰細研以粥飲調下半錢日四五服効若炙令香熟嚼之哺兒亦効又方出聖惠方用冬𤓰四兩切扁竹四兩剉以水三升煎作湯放温以洗浴兒効又方出聖惠方用龍膽半兩去蘆頭以水一盞煎至六分去滓量兒大小漸漸分减服之龍膽湯出危氏方治孕婦被惡祟導其腹中致令児病其證下痢寒熱去來毛髮鬇鬡不悅澤及治婦人有兒未能行時復有孕使兒飲此乳亦作此病方見雜病類龍膽散治小兒魃病出本草取白馬眼母帶之白虎病附論夫小兒白虎候者按堪輿厯遊年圖有白虎神云太歳在卯即白虎在寅准此推之知其神所在小兒有居處觸犯此神者便能為病其狀一身微熱有時啼喚有時身小冷屈指如數似風癎但手足不瘛瘲耳此名白虎候又有小兒姙娠時其母被惡神道其腹中胎不肯長及至生下小兒徃往多羸弱寒熱去來毛髮鬇鬡不悅或謂疳非也乃名被魃候方張渙順正集香散出醫方妙選治小兒白虎病降真香沉香檀香俱剉乳香研安息香人參去蘆頭各一兩茯神酸棗仁各半兩右為細末每服一錢水八分一盞入麝香少許煎至五分去滓温服留藥滓卧内燒之香蝎丸出全嬰方治小兒白虎􅕅􅟻諸風疼痛遊走無定狀如蟲齧晝静夜作及一切手足不時作疼巢氏云按堪輿厯遊年圖有白虎神太歳在卯即白虎在寅也若准此推之知其神所在小兒有居處觸犯此神者便能為病聖惠云白虎風者是風寒濕之毒因虚所起將攝失理受此風邪經絡停滯百氣不行蓄於骨節之間或在四肢肉色不正其疾晝静而夜作即徹骨髄痠疼其病如虎之齧故名曰白虎風也其狀身微熱有時啼呌有時小冷屈指如數似風癎但手足不瘛瘲此藥能治之甚驗川烏頭大八角者三箇生用全蝎二十一箇生用黒豆二十一粒生用地龍去土半兩生用右為末麝香半字研拌糯米糊丸如麻子大三歳十丸酒送下臨卧服微有汗即瘥治白虎病出本草鬼臼苗在糞堆中亦云是糞神今時人掃糞莫置門下令人病此療之法取鷄子揩病處呪願送著糞堆頭勿反顧不過三度差白虎是糞神變喫鷄子治白虎病闗東人呼為厯骨風出本草置白獅子於病者前自愈此壓伏之義也尸注附論夫小兒尸注者是三尸中之一尸注也人無問小大腹内皆有尸蟲尸蟲為性惡多接引外邪而共為患小兒血氣衰弱者精神亦羸故尸注因兒為病其狀沉沉嘿嘿不的知病之處或寒或熱渉引歳月遂至於死死又注易旁人故名之為尸注也人有三尸能為人患無問老㓜但精神衰弱血氣不足者率多被害小兒血氣未真精神未全因有尸注之病其狀沉沉嘿嘿不的知病之所苦或寒或熱彌引歳月遂至於死死後注易旁人故名尸注方金露丸出醫方集成治小兒勞瘵尸蟲作痛面目羸瘦五心煩熱如其他食積冷􅂔痛又非其治臨證審之又有心痛欲絶一時無藥可療急用艾炙大拇指中男左女右人參去蘆官桂去皮川椒去合口者白茯苓川烏炮菖蒲大黄吳茱萸各半兩附子一箇炮桔梗去蘆紫花木炒各三分乾薑炮柴胡去蘆各一分厚朴去皮薑製二分猪牙皂角去皮二分右為末别研葶􅐗子半兩巴豆三分去油膜續随子半兩同前藥一處麵糊丸如麻子大以意加减空心下桃仁散出聖惠方治小兒尸注鬼癖心腹疼痛或加寒熱恍惚形色多般桃仁二七枚湯浸去皮尖䨇仁麩炒木香人參桂去粗皮虎頭骨醋炙㯽榔剉京三稜煨剉芥子炒各一分麝香研一分欵冬花丹砂研水飛乾桃柳葉各半兩右為散每服半錢匕温水調下更量兒大小加减保童丸出聖惠方治小兒尸注魃繫驚癎魍魎三十六種無辜天行急黄牛黄研麝香甘草炙剉真珠末各一分赤芍藥丹砂研水飛一作光明沙杏仁湯浸去皮尖䨇仁麩炒各半兩甘遂炮半兩巴豆五枚去皮心膜研紙褁壓去油盡虎睛酒浸一䨇赤茯苓去黒皮用半兩右為末和勻煉蜜丸如麻子大三四歳每服二丸荆芥湯下更量兒大小加减犀角散出聖惠方治小兒尸注及中惡諸病犀角鎊升麻木香㯽榔剉各半兩麝香一錢細研桑白皮剉大黄剉炒各半兩桃仁湯浸去皮尖䨇仁炒二七枚右為散每服半錢匕温水調下日四五服量兒大小加减服雄黄丸出聖惠方治小兒尸注病諸蟲魅精氣入腹刺疼黄瘦雄黄研如粉雌黄研如粉各一兩丹砂研如粉半兩白頭翁去苗三分麝香研半錢徐長卿各三分羚羊角鎊炒大黄剉炒各一兩一分右為末以青羊脂煉過和丸如麻子大一二歳兒每服三丸熱水下空心午後服各一更量兒大小加减雌黄丹出醫方妙選治小兒尸注雌黄研雄黄研大黄炮鬼臼去毛各一兩白頭翁半兩桃仁三十箇浸去皮炒巴豆去皮心膜去油十粒麝香研一分右研勻羊脂五兩鎔和諸藥成膏如黍米大每服三粒至五粒荆芥湯冷下量兒大小加减立効散出醫妙選治小兒尸注川大黄炮乾桃柳葉各一兩梔子赤芍藥硃砂水飛一兩麝香研雄黄研各一錢右為末拌勻每服一錢用蜜湯調下大小加减木香散出聖惠方治小兒尸注心腹滿脹疼痛不可忍木香鬼箭羽當歸剉炒桔梗炒㯽榔剉各半兩紫蘇莖葉半兩右粗搗篩每服一錢匕水七分生薑二片煎至四分去滓不拘時温服量兒大小加减生犀湯犀角鎊取末二錢地骨皮赤芍藥柴胡乾葛剉各一兩甘草半兩炒右為末每服一二錢水煎服太乙神精丸治小兒客忤霍亂腹痛脹滿若尸注惡風癲狂鬼祟蠱毒妖魅瘟瘧無所不治丹砂曽青雄黄各研雌黄研各四兩金牙研二兩半磁石煅醋淬三遍搗研四兩右爲末先將丹砂等五味用釅醋浸之唯曽青用好酒銅噐中浸以紙宻封頭日曝乾經夏急待用亦湏五日無日以火煖之其丹砂等五味日數亦然各研如粉以醸醋拌令乾濕得所内土釡中以六一泥固濟令宻候泥乾然後安鐵環施脚一尺五寸置釡於環上初取熱炭火兩枝各長四寸置於釡下待三分消盡二分更加熟火兩枝如此三度然後用生炭燒増之漸多乃至一復時近釡底即便滿其釡下炭經兩度即罷待火盡極冷然後出之其藥精飛化凝著釜上光明皎潔如雪者最佳若飛上不盡更合舉火如前以雄鷄羽掃取多少不定和以棗肉丸如黍米平旦空腹服一丸又常以絳嚢帶之男左女右小兒繫頭上辟瘴毒惡􅂔射工小兒患可以苦酒和之􅂗方寸紙帖兒心腹上亦有已死者冬二日夏一日與藥得下便活若服藥悶亂可取防風湯飲之則定兼治大風惡癩偏風風􅋪厯節鬼繫痎瘧小兒驚忤不能乳哺癰疽痔瘻腹内積冷婦人産死未經宿狂狗所嚙脛腫蟯蟲寸白惡腫邪鬼精妖并去一切惡疾鬼臼丸出聖惠方治小兒尸注勞瘦或時寒熱鬼臼去毛半兩升麻三分麝香細研茈胡去苗一兩右搗羅三味為末入麝香研勻煉蜜和丸如菉豆大每服十丸煖酒下日三服量兒大小加减立効散出聖惠方治小兒尸注邪氣入腹㽲痛雄黄細研一分赤芍藥半兩梔子仁十枚右搗羅二味為末入雄黄研勻每服半錢匕温水調下更量兒大小加减竈煤散出千金方治小兒尸注竈突中煤三指撮鹽少許右為散一二歳兒每服半錢匕熟水調下空心午後各一服量兒大小加减一方相和熬熨之桃仁湯出聖惠方治小兒尸注勞瘦或時寒熱用桃仁一味二十枚湯浸去皮尖䨇仁生研以水一盞煎至五分去滓量兒大小分减與服以吐為効如不吐即非注也鱉頭散出聖惠方治小兒尸注用鱉頭一枚燒灰細研為散每服半錢匕新汲水調下治小兒諸疾治小兒尸注勞瘦或時寒熱出聖惠方右用鷄子一枚打破生吞之已困者内入㗋中揺頭令下即差中蠱附論夫人有聚毒蠱為蠱者随飲食入腹能變或食人五臟小兒時有中之者遂心腹刺痛懊悶急者即死緩者涉厯年月漸至羸困若注易旁人則為蠱注之病方雄麝散出醫方妙選專治蠱毒雄黄研麝香研羖羊角屑赤芍藥敗鼓皮炙令黄各一兩馬兠鈴根薺苨鬼臼各半兩去毛右為細末拌勻每服半錢煎甘草湯調下食前服羖羊角湯出聖惠方治小兒中蠱毒腹内堅如石面目青黄小便淋􅅹變易無常羖羊角屑蘘荷各一兩梔子仁七枚黄連去鬚赤芍藥各一分犀角屑半兩牡丹皮各一分右麄搗篩每服二錢匕以水一盞煎至六分去滓分温二服日三服量兒大小加减雄黄散出聖惠方治小兒飛蠱狀如鬼氣雄黄研麝香研犀角鎊搗為細末各半兩右同研令勻每服以温水調下半錢匕日四服量兒大小加减比聖湯出聖惠方治小兒五種蠱毒用馬兠鈴根一味麄搗篩每服二錢匕水一小盞煎至五分去滓空腹頓服當時随吐蠱出未快吐再服又方出聖惠方用薺苨一兩搗羅為末以粥飲調服下一錢量兒大小加减又方出聖惠方用敗鼓皮一片燒灰細研如粉空心粥飲調服一錢匕湏臾病兒呼蠱主姓名其病即愈神効散出肘後方治小兒中蠱毒腹内堅痛面目青黄羸瘦骨立病變無常及淋露用桃上寄生二兩搗羅為散毎服半錢匕如茶㸃服日三又方出聖惠方用麝香一味細研每服一字匕空腹温水調下即吐出蠱毒未効再服治小兒中蠱毒欲死出聖惠方用甘草半兩生剉麄搗篩水一中盞煎至五分去滓分温二服當吐蠱出若預防蠱者宜熱炙甘草煮汁服之即内消不吐神効治小兒中蠱下血欲死出聖惠方搗青藍汁頻頻服半合又方出聖惠方取生赤雌鷄翅下血服之立効治小兒患蠱毒痢出本草用生地黄汁一升二合二三四服立効中惡附論夫小兒無故卒然腹刺痛悶亂欲絶者中惡也葢由隂陽􅂔血不調神守不强故鬼毒惡􅂔得以中之凡腹大而滿脉緊大而浮者死緊細而微者生若餘勢乆留再療則變為注夫小兒中惡者是鬼邪之􅂔卒中於人也無問大小若隂陽順理榮衛調平神氣相守則强邪不能干正若精􅂔衰弱則鬼神毒惡氣中之其狀先無他病卒然心腸刺痛悶亂欲死是也方鬼箭羽湯出聖惠方治小兒中惡心腹卒痛鬼箭羽半兩朴硝細研真珠末一分羚羊角鎊桔梗炒升麻各一兩黄芩去黒心大黄剉炒鬼臼各一兩半芍藥一兩桃仁三十枚去䨇仁皮尖麩炒茈胡去苗一兩右麄搗篩每服一錢匕以水一小盞煎至六分去滓分温三服空心午後各一服量兒大小以意加减一方無鬼臼芍藥湯出聖惠方治小兒中惡心腹堅脹痛顔色青黒大便不通芍藥桔梗炒黄芩去黒心茈胡去苗升麻各一兩大黄剉炒二兩桃仁七枚去皮尖䨇仁炒一方作桃仁五枚鬼臼一箇甘草炙一兩麝香半錢研杏仁四十枚浸去皮尖䨇仁炒右麄搗篩入麝香和勻每服一錢以水一小盞煎至六分去滓分温二服空心午後一服以利為度量兒大小加减辟邪膏出醫方集成治中惡卒暴亦宜服此藥立至蘇甦中毒心腹刺痛悶亂欲死凡腹大而滿診其脉緊細而微者生緊而浮大者則死急服蘇合香丸再以皂角末觸鼻次服沉香降氣湯加人參茯苓不愈進以辟邪膏無不効者降真香白膠香沉香各半兩虎頭骨鬼臼去毛龍膽草人參茯苓各半兩右為末入雄黄半兩麝香一錢煉蜜丸如鷄頭實大每服一粒煎乳香湯下又令兒帶及燒卧内尤妙無不作効亦治客忤一方無鬼臼有甘草雄黄丸出聖惠方治小兒中惡辟邪氣雄黄研真珠研各一兩麝香研半錢牛黄如棗大研巴豆四十枚去皮膜心研去油盡大棗十四枚蒸熟去皮核研膏右除棗外同研為末入棗膏和少許蜜入臼中一千杵搗為膏丸如粟米大每服三丸薄荷湯下空心午後各一服量兒大小以意加减療小兒中惡等病鹿角大豆各等分右為末相和勻乳汁􅂗妳上令兒飲之治小兒中惡暴死出經驗良方用䓤白納下部糞門及鼻中活一方以菖蒲末着舌底又吹兩鼻兩耳中効猪蹄散出聖惠方治小兒寒熱及惡氣中人取猪後脚懸蹄燒灰末以乳汁飲一撮立効治小兒衝熱惡毒煩悶用生銀水磨服之忌生血治小兒辟惡氣用虎頭骨煮湯浴小兒數用之為佳治小兒寒熱惡氣中人以濕豉為丸如鷄子大以摩腮上及手心六七遍又摩心臍上旋旋祝之了破䜴凡㸔有細毛棄道中即差半夏丸出經驗良方治小兒暴腹滿欲死用半夏随多少微火爆搗末酒和為丸如粟米大每服三五丸淡薑湯蜜湯服治小兒中猢猻噤出㓜㓜新書凡身微熱䨇手捉拳按胸前口撮不開縮肩體身一似活猢猻此候因受胎六箇月日母見人弄猢猻開口吸着其氣生來被風邪相擊致發此候若不速治即死右取猫兒糞燒煙熏之即解治小兒生下多被惡氣息衝着成疾方出鮑氏方急取麝香一豆顆冷水調搽之嚾之辟惡方出本草以瑿令小兒帶之能辟惡瑿琥珀千年為瑿用與琥珀同瑿烏芍切普濟方卷四百
