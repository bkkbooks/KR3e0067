body:
  text: 普濟方卷四百十九明周王朱橚撰鍼灸門頭風療頭風穴百㑹腦空天柱療頭風目眩狂亂風癎左主如花右主如果穴神聰療頭風熱痛頭腫風癎穴前頂療風眩目􅉩􅉩額顱上痛穴後頂療頭風目眩穴上星治頭風目眩面赤腫穴前頂治頭風穴下㢘五處神庭治風頭眩善嘔煩滿穴神庭治風眩頭痛穴天牖風門崑崙關元關衝治風眩顔清引頷痛穴上星治風頭眩頭痛顔清穴􅇟㑹治風頭耳後痛煩心穴完骨治痿厥風頭重痛穴跗陽治胸中寒如風狀頭眩兩頰痛穴俠谿治風頭痛穴腎腧攅竹承光絲竹空瘛脉和窌治頭眩風悶穴五處治風頭熱穴合谷五處療頭風面腫目眩項强不得轉穴天牖治頭風生白屑多睡穴􅇟㑹鍼住以油鹽措髪根頭風永除治頭風腫痒穴肩井針療頭目眩痛穴通理百㑹療頭眩穴陽谷王氏云論頭痛本於大寒内至骨髓則頭風者亦本於風寒入腦耶本氏方論婦人患頭風者十居其半或者婦人無巾以禦風寒焉耳男子間有患之者非頭上少髪必其􅇟㑹前頂之髪秃也欲灸頭風先宜􅇟㑹百㑹前頂等穴其頭風連目痛者當灸上星神聰後頂等穴予嘗自灸驗效教人炙之亦驗云治頭風灸後頂穴在百㑹後一寸五分强間穴前一寸五分灸五壯兼治癲疾并揺頭喎者風瘙身體􅐊疹灸曲池二穴甲乙經云穴在肘外輔骨屈肘曲骨之中手陽明脉之所入也各灸三壯治頭風面腫項强不得廻顧刺手少陽經天牖二穴在頸筋缺盆上天容後天柱前完骨下髪際上鍼入五分留七呼不先補亦不宜瀉只若炙之面睡眼合取足太陽經譩譆二穴在背腧部第三行肩髆内㢘俠第一穴顧下兩傍相去各三寸正坐取之足太陽脉之所發也鍼入六分留三呼㵼五吸後鍼天牖風池其病即瘥若不先鍼譩譆即難瘳其疾也此皆乆病流注之法今舉此為例學者宜須審詳治頭風面虚腫穴上星治目黄頭腫穴腦户頭痛治風眩頭痛嘔吐心煩穴解谷承光治頭痛振寒汗不出穴膽腧治頭痛振寒穴大杼治頭痛風汗不出穴瘂門治頭痛穴合谷天池絲竹空四白天衝三焦腧風池治寒熱頭痛進退痎瘧恍惚悲愁徤忘驚悸穴神道治厥逆頭痛胷滿不得息穴陽谿治厥頭痛面浮腫風逆四肢腫身濕穴豐隆治頭重鼻塞風寒從足少指起脉痺上下帶胷脇痛無常轉筋寒熱汗不出煩心穴至隂治頭痛振寒目黄脇痛穴青靈治腦旋目暈頭痛不可忍煩心嘔吐涎沫發無時項强不可顧穴强間治頭痛肩急穴崑崙治頭痛頸項急不得顧目眩穴風府治頭項痛穴曲池療身熱頭痛不可反側穴顱息療頭痛甚汗不出穴魚際療頭痛穴腦户療頭目眩痛穴百㑹通理療頭痛如破身熱如火穴命門中衝療寒熱頭痛善噦衂肩不舉穴温溜療醉後酒風發頭重皮膚兩角眩痛穴率谷治頭痛穴天柱陶道大杼孔最後谿亦作本神治頭重痛穴腦户腦空通天治頭痛如破目痛如脫喘逆煩滿嘔吐汗出穴大陵頭維治頭痛如錐刺不可動穴竅陰强間治頭痛寒熱汗不出惡寒穴目窻中渚完骨命門豐隆太白外丘通谷京骨臨泣小海承筋陽陵泉治寒熱頭痛喘渴目大可視穴神庭水溝治寒熱痺頭痛穴消濼治頭痛穴五處治頭痛筋攣骨重少氣噦噫滿時驚不嗜卧咳嗽煩寃其脉舉之則弦按之石堅氣不足而内著其氣逆而上行謂之腎厥宜灸關元百壯服玉真丸治頭痛連齒時發時止連年不已此由風寒留扵骨髓髓以腦為主腦逆故頭痛齒亦痛穴曲鬢七壯左痛灸右右痛灸左宜白附子散治頭痛頭風耳後痛腦空等穴小海完骨治癲疾頭痛穴天衝素問嘗論有數嵗頭痛不已者大寒内至骨髓髓以腦為主腦逆故頭痛齒亦痛名曰厥逆頭痛亦有腎厥肝厥頭痛者如本事方所謂下虗者腎虚也腎厥則頭痛上虚者肝虚也肝厥則頭暈是也皆可隨症治之若真頭痛則朝發夕死夕發朝死矣人而患此亦未知要之亦有所自來其在根本不固也若欲著艾須先百㑹􅇟㑹等穴而丹田氣海等穴尤所當灸以補養之毋使至於此極也治風眩偏頭痛穴前頂治風痰頭痛穴豐隆治頭風目眩無所見偏頭痛引目外眥急耳鳴好􅅉頸痛穴頷厭治頭偏痛引目外眥穴懸釐治頭偏痛穴後頂治頭半寒痛頭眩目痛穴玉枕治頭項偏痛穴正宮治熱病煩滿汗不出頭偏痛引目外眥赤身熱齒痛穴懸顱治頭偏痛煩心不欲食穴懸釐治偏正頭痛穴絲竹空風池合谷治眉攅内疼痛不可忍者穴解谿治頭眩痛穴崑崙解谿曲泉飛揚前谷少澤通理腦痛治腦旋資生經穴强間治頭旋腦痛風腦重目如脫項如拔項强痛不得顧穴天柱治腦風疼不可忍穴玉枕治腦風頭痛惡風寒穴承靈治腦風頭痛不可忍目眩心悸發即為癲風引目眇穴腦空治腦風頭痛穴上㢘治腦兩角强痛穴率谷療頭風腦疼穴瘖門療腦疼穴風池治腦風穴小海治口鼻出血不止名腦衂穴上星灸五十壯治腦熱疼甚穴􅇟㑹强間王氏云患腦熱疼甚則自床投下以腦拄地或得冷水粗得而疼終不已服諸藥不效人教灸􅇟㑹而愈熱痛且可灸况冷疼乎凡腦痛腦旋腦㵼先宜灸􅇟㑹而强間等穴盖其次也頭旋治忽頭旋資生經穴目窻治頭旋腦重穴天柱治頭旋耳鳴穴絡却治坐如在船車中穴申脉王氏云母隨赴任為江風所吹自覺頭揺動如坐舟車上如是半年乃大吐痰徧服痰藥并灸頭風諸穴方愈治頭風揺動灸腦後玉枕中間七壯治失枕頭重如石穴玉枕治頭痛穴百㑹治頭重眩運穴陶道治腦重鼻塞頭目眩疼穴百㑹治頭重穴率谷又穴至陰又穴腎腧治頭重痛穴跗陽腦户治頭重不能起灸腦户下一寸半治頭重風勞穴腦户灸五壯頭腫治頭腫資生經穴腦户療頭風熱痛頭腫極即以三稜針刺之繞寸已下其頭痛腫立瘥穴前頂療頭風頭腫皮腫面虚鼻塞頭痛穴上星治頭皮腫生白屑穴􅇟㑹治頂痛穴曲差治頭面腫穴公孫治頭面氣腫穴完骨頸項强治頸項腫寒資生經穴腕骨陽谷治頸腫寒熱穴丘墟治寒熱頸痛瘰癧穴大迎治項痛穴竅陰消濼治項腫不可俛仰頰腫引耳後穴完骨治頸項强不可俛仰穴大杼京骨治頸項不得顧穴肩井魄户治頸項痛穴完骨頷厭治頸項强痛穴本神治痎瘧頸項痛不得顧穴風池治頸項轉側難穴通天治頸項强不得顧穴頰車大椎氣舍腦空治頸項筋急不得顧穴天柱治項氣悶腫食不下穴人迎治頸項痛惡風寒穴後頂外丘治頸項急不得顧穴齗交風府治頸項强穴臂臑强間治項强急痛不可顧穴少澤前谷後谿陽谷完骨崑崙小海攅竹治項如拔不可左右顧穴消濼本神通天强間風府瘖門天柱風池齗交天衝陶道外丘通谷玉枕療項如拔穴强間又穴天柱治頸腫項痛不可顧穴天容前谷角孫腕骨支正治頸項癰腫不能言穴天容治頸項疼厯節汗出穴飛揚湧泉頷厭後頂治頸項拄滿穴角孫治頸項癰腫不能言及癭肩不舉穴浮白療心煩滿汗不出頭項痛身熱目視不明穴曲差治頭痛重暫起僵仆穴通天治項强不得顧穴瘖門治項痛穴玉枕完骨療頭痛及項急不可傾側療脇痛頸腫寒熱療身寒熱頸腫喉中鳴翕翕胷中氣鯁鯁穴天突療頸項及肩背痛穴天井療頸項不得顧引牙齒痛口噤不能言穴曲鬢面腫治面惡風寒頰腫痛資生經穴巨窌治頭風面虚腫穴上星天牖治目眩面腫及治面赤暴腫穴􅇟㑹治面赤腫穴前頂治頭面浮腫痛引目外眥上赤痛穴目窻治頭面浮腫穴完骨治面腫唇動狀如虫行穴水溝風水四腫鍼此穴出水盡頓愈治面痒腫穴迎香治風壅面浮腫目不閉唇吻瞤動不止穴人迎鍼之頓愈治面浮腫唇吻不收瘖不能言口噤不開穴合谷治面虚腫穴温溜治面腫穴豐隆承漿陽交治寒瘧面腫足䯒寒穴厲兊治面浮腫穴陷谷治飲酒面赤穴大腧治頭風面赤穴解谿治面赤腫頭痛穴腦户療面浮腫穴厲兊療面腫穴水溝天牖療頭面虗腫穴䧟谷治肺風面赤目視􅉩􅉩項强不得顧面腫皮軟腦疼穴風池治面赤腫穴上星􅇟㑹前頂腦户風池治卒面腫穴陷谷上星􅇟㑹前頂公孫治面腫穴䧟谷陽陵泉天樞中府解谿有人因入水得水腫四肢皆腫面水腫人為灸水分并氣海翌朝視其面如削矣盖水腫亦可灸水分云面痛治面赤頰中痛資生經穴攅竹齗交玉枕治顳顬痛頷顱痛面赤穴中渚治面皮赤痛穴懸釐治面赤熱穴腎腧内闗治面皮熱穴天窻天突治面赤目黄穴腦户治面膚赤痛穴懸顱治面蒼黒穴行間治面赤穴支溝間使掖門治面赤穴解谿療冷病面黒穴氣海治面黒穴關衝療面黄黒穴腎腧治目眩面腫穴􅇟㑹治目眩面赤腫小兒頂腫穴前頂目痛治目瞳子痛痒資生經穴陽白治下􅗃痛穴太衝治目急痛赤穴太衝陽谷崑崙治目赤腫痛穴曲泉治目痛赤穴陽谿陽谷治目外眥赤痛逆寒淚出目痒穴俠谿治目眥傷穴三間治目痛不能視先取譩譆後取天牖風池穴風池腦户玉枕風府上星治目痛視如見星穴照海治目如脫穴天柱陶道崑崙治目痛如脫穴太陵頭維治目急痛穴前谷三間治頭目痛目眵穴陽白治頭面浮腫痛引目外眥上赤痛忽頭旋目􅉩􅉩視不明穴目窻治目睛不能遠視穴上星腦户治目痛不能視目痛如脫穴玉枕療頭風目如脫穴天柱療目痛穴心腧陰蹻療頭眩眼痛穴飛揚陽谷療目内攣絲急痛失枕頭重項痛風眩目痛頭寒多汗耳聾鼻塞穴玉枕治目痛僻戾目不明穴四白治目痛不明穴齗交治眼痛穴下㢘治眼痛不可忍刺足少陽經風池二穴手陽明合谷二穴立愈治目痛穴前谷治風癢赤痛穴人中鼻柱灸二壯治頭目痛穴通理百㑹後頂治目如拔穴崑崙治頭重目眩穴陶道治目瞑視穴天柱治頭風目暝腦風頭痛穴腦空治頭眩目瞑遠視􅉩􅉩穴天府治目瞑身汗出穴承漿目微澁痛或兩傍生小米珠頻去其睫自愈不必鍼灸治目不得閉穴大迎治目眩遠視􅉩􅉩穴目窻治雙目􅉩􅉩穴偏厯夫眼生倒睫拳毛者兩目緊急皮縮之所至也盖内被熱致隂氣外行當去其内熱并火邪眼緩則眼毛立出翳膜亦退用手法攀出内臉向外刺以三稜針去血以左手爪甲迎其鍼鋒立愈治目眶嵗久赤爛俗呼為瞎是也當以三稜鍼刺目眶外以㵼熱立愈治雙目􅉩􅉩少氣灸五里右取左左取右治乾勞邪氣眼赤灸當陽二穴百壯治目急痛不可遠視灸當陽治傷寒目瞑穴風門目上視治目反上視若赤痛從内眥始資生經穴申脉治目絲急目上挿穴陽白上星本神大都曲泉俠谿三間前谷攅竹玉枕治目上挿憎風寒穴絲竹空前頂治目上視不識人穴神庭􅇟㑹治目上視穴肝腧療目轉上及目瞪上垂穴筋縮治目瞤動與項口相引甲乙云目瞤動與頭口参相引喎僻口不能言穴承泣治口喎面赤目黄眼瞤動不止䪼腫齒痛穴顴髎治眼瞤動不止目不得閉穴地倉治眼臉瞤動穴攅竹治眼目不明淚出目眩瞢腫癢遠視􅉩􅉩昏夜無見目瞤動穴刺承泣治眼戴睛上挿眼反戴眼目淚出治目淚出資生經穴掖門前谷後谿腕骨神庭百㑹天柱風池心腧天牖治目淚多眵䁾穴肝腧治淚出目痒穴俠谿治目淚出穴承泣治目淚出穴行間神庭治多淚穴臨泣治目淚眵汗出背赤痒痛生白翳穴齗交治目淚出欠氣多穴風池治氣眼冷淚穴睛明治目瞤冷淚穴承泣治風淚出穴頭維治目淚生翳穴腕骨療目泣出穴行間魚際治目遠視不明惡風目淚出憎寒頭痛目眩瞢内眥赤痛遠視􅉩􅉩無見眥痒痛􅁋膚白翳穴睛明治目淚出穴行間治目痛淚出甚者如脱穴前谷目眩治頭重目眩善驚引􅍠衂頸項痛目􅉩􅉩資生經穴通谷治目眩穴神庭上關漏泉譩譆束骨魚際大都治目眩頸項强急胷脇相引不得轉側穴本神治頭目眩穴飛揚肺腧治目眩循眉痛穴肺腧治目眩頭痛目赤視物􅉩􅉩風癎目戴上