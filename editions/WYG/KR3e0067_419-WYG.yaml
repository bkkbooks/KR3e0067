窻翳風治口噤舌根縮穴㢘泉治口噤不開穴合谷列缺頰車禾髎治風痙口噤穴大迎治口噤不開暴惡不能言穴支溝治僻噤穴外關内庭三里商丘大泉治口噤不開引鼻中穴齗交三關大迎翳風治唇吻不收瘖不能言口噤不開穴合谷水溝治口噤不開穴曲鬢商丘療面風口不開口生瘡又治口噤穴承漿療齗噤穴㢘泉療口噤鼓頷穴兑端療口噤不開穴翳風療口不可開及尸厥穴素窌咽喉腫痛治咽喉痛資生經穴風府治咽痛食不下穴膽腧治喉嗌痛穴風府天窻勞宫治嗌痛穴中渚支溝内庭治咽中痛不可納食穴通泉大鍾治咽中如扼穴間使治咽喉痛穴膝關治喉痛穴天窻治咽喉腫穴泉突治嗌偏腫不可咽穴前谷照海中封治喉腫穴中封治嗌内腫氣走咽喉不能言穴然谷太谿治咽喉癰腫穴大迎治咽腫穴太谿中渚治喉痺咽癰腫水漿不下穴璇璣治咽外腫寒厥背痛不能上下穴液門治咽内腫穴然谷治咽腫穴水突氣舍治喉中生瘡不得下食穴天突治頷腫如升喉中閉塞水粒不下穴少商以三稜針刺微出血洩諸陽藏熱次針陽谷二穴而愈治喉腫胸脇支滿穴尺澤灸百壯治喉腫厥逆五臟所苦鼔脹灸承滿各五十壯老人加之小兒隨年壯治咽腫難言穴天柱治男子婦人咽閉腫痛不能言者刺少商穴出血立愈如不愈以温白湯口中含潄是以熱導熱也咽喉鳴主喉鳴暴忤氣哽資生經穴扶突天突太谿主喉中鳴穴少商大衝經渠治喉中焦乾穴魚際治喉中如水雞聲穴天突扶突治喉中作聲穴天髎治喉鳴穴大鍾大包治喉中鳴翕翕穴天突療喉鳴穴陽陵泉天池亶中主呼吸短氣咽中如息肉狀穴液門四凟主嗌中有氣如息肉狀穴蠡溝少府主嗌内腫氣走咽喉穴然谷太谿治咽喉僂引項攣不收穴風池治咽冷聲破穴天樞灸五十壯咽喉乾治咽喉乾資生經穴極泉太淵偏厯太衝天突治喉乾燥寒慄鼓頷欬引尻痛溺出嘔血穴魚際治喉乾煩渇穴行間治咽乾不嗜食穴神門治嗌乾四肢墮善悲不樂穴照海治咽酸穴少衝治咽乾穴少澤太谿主嗌乾穴復溜照海太衝中封喉痺治喉痺脇中暴逆資生經先取衝脉後取三里雲門各㵼之又刺手小指端出血立已治喉痺不能言穴三里温溜曲池中渚豐隆治喉痺穴神門合谷風池治喉痺頸項腫不可俛仰頰腫引項後穴完骨天牖前谷治喉痺腫水漿不下穴璇璣鳩尾治喉痺哽噎咽腫不得消食飲不下穴天鼎氣舍膈腧治喉痺哽咽寒熱穴湧泉然谷治喉痺胷滿塞寒穴中府陽谷治喉痺哽咽寒熱穴天容缺盆大杼膈腧雲門尺澤二間厲兊湧泉然谷治喉痺咽如哽穴三間陽谿治喉痺咽乾急穴天突治喉痺嗌乾穴大陵偏厯治喉痺舌卷口乾穴關衝竅陰少澤治喉痺穴陽輔陽交厲兊下㢘然谷經渠完骨膈腧缺盆氣舍雲門陽谿合谷温溜中府浮白治喉痺煩滿穴大杼治喉痺寒熱咽中如鯁穴天容治喉痺咽腫不得食飲食不下喉鳴穴天鼎治頷腫喉痺穴前谷治喉痺頷腫肩背痛振寒穴二間治喉痺不能言穴曲池治喉痺舌强口乾肘不舉穴竅陰治喉痺舌强口乾心煩穴少澤治喉痺口乾身熱頭痛短氣胷脇痛穴大陵療寒熱喉痺穴浮白療喉痺穴膈腧經渠療喉痺咽如有物傷忍振寒又治喉痺咽腫多卧善睡穴二間治喉痺氣逆欬𠻳口中涎唾灸肺腧七壯亦可隨年壯至百壯治急喉閉纒喉風灸三里穴二七壯三七壯有人嘗苦喉痺雖水亦不能下咽灸三里而愈又隨腫一邊於大指外邊指甲上與根齊鍼之不問男左女右只用人家常使針血出即効如大叚為急兩大指都針尤妙治喉痺以砭針刺腫處出血立効治咽喉病刺手小指爪文中出三豆大許血逐左右刺皆須慎麫毒物治咽喉諸症及毒氣歸心等項惡症並皆治之無有不効第一穴風府穴腦後入髪際一寸針入四分穴髙主暈恐傷人不可不知須令人扶䕶乃針第二穴少商穴在手大指表虎口一邊指甲與根齊離爪如韭葉許針入二分病甚則入五分第三穴合骨穴治口撮治牙關不開則陽靈穴應針各刺一刺出血入二分關竅即閉又有一症潮熱者有作寒者於合谷穴用針左轉發寒右轉發熱第四穴是上星穴在項前入髪際一寸治頰腫及纒喉風等症又氣急者實熱針足三里虚熱灸足三里以手約􅂰取中指稍盡處是穴根脚咽喉常發者耳垂珠下半寸近腮骨灸七壯二七尤妙及灸足三里穴在􅂰下三寸䯒骨外治喉痺穴豐隆湧泉關衝如病甚以小三稜鍼藏於筆頭中誑以㸃藥於喉中痺上急刺之則有紫血頓出効如不藏針恐患人難以刺之治喉痺及毒氣穴尺澤灸百壯普濟方卷四百十九
