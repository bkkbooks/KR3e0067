body:
  text: 普濟方卷一百五十八明周王朱橚撰咳𠻳門傷風咳𠻳論夫咳𠻳之證大槩風冷熱損勞風者感外風寒入肺經其證或惡寒或不惡寒或發熱或不發熱或頭疼或不頭疼但暴得之便覺痰壅咳𠻳不止脉雖浮盛此則是感風三抝湯金沸草散量證加減與服若服藥不減則時感風未解當傷寒中發散藥量四時加減出汗乃止方人參膏出經驗良方治大小人風咳𠻳氣粗多涎身熱人參知母黄芩欵冬花貝母紫苑杏仁猪牙皂角桔梗荆芥防風甘草各等分右為細末煉蜜成膏丸如皂莢子大毎服一丸用好蜜熟水化下人參荆芥散出醫方大成治肺感風邪止壅咳𠻳頭目不清眼耳言語不出咽乾項強鼻流血清涕皮膚不仁荆芥穗麻黄去根節細辛去土洗桔梗去蘆炒陳皮去白人參半夏湯洗七次杏仁去皮尖通草甘草炙各半兩右為散每服四錢水一鍾生薑五片煎八分食後温服人參訶子丸治大人小兒上膈熱或傷風或冷搏於肺經語聲不出痰涎不利咳𠻳喘息日夜不止咯唾稠粘宿砂仁訶子藿香龍腦薄荷葉各一兩百藥煎葛粉各八兩甘草五兩烏梅肉三兩右為末麪糊為丸每服一二丸含化嚥津食後臨卧丁香烏梅丸出三因方治膈氣壅蔽外感風寒咳𠻳白沫胸背痛不能仰口乾咽燥烏梅肉四兩紫蘇木瓜各三兩茯苓二兩四錢甘草三兩三錢檀香半兩人參七錢麝香一字右為末用蜜一斤蠟二兩為丸如櫻桃大含化不以時金沸草散出醫方大成治風化痰除頭目昏痛頸項強急往來寒熱肢體煩疼痰涎咳𠻳喘滿涕唾稠粘時行寒疫壯熱惡風有邪疫則汗出風盛則解利及肺經受風鼻塞荆芥前胡麻黄金沸草甘草半夏赤芍藥各一兩右㕮咀每服三錢水一鍾半生薑三片棗子一箇煎至七分去渣温服不以時加荆芥桔梗名五抝湯加桑白皮并麻黄乾葛治喘咳尤效烏梅一箇煎頭疼蘇葉陳皮牙疼熟煎灌𠻳諸經風及大便秘左脇刺疼每料加枳殻一兩去穰風熱結在臟腑燥煩氣壅腹痛大便秘以葱白研爛微火炒過布上攤熨臍加大黄厚朴稍薄荷各五錢服速效諸氣發散並用妊婦傷寒頭疼腹疼肚熱心燥加白术人參黄芩生石膏各一兩熱𠻳加甜葶藶馬兜鈴薄荷桑白皮各半兩烏梅四錢就吞半夏丸服後復咳𠻳數咽喉燥加朴稍五錢食後服傷風咳𠻳身不憎寒熱葢因脾胃受寒傳入於肺遂成寒咳𠻳甚則吐多吐白沬此當先用温藥温其脾胃如治湯胡椒理中湯丁香半夏丸五𠻳丸皆要藥或用理中湯加五味子煎服治上壅熱𠻳聲重加炒葶藶半錢薑四片煎服如咽喉焦燥加朴硝滑石後又治傷風鼻塞涕流壅咳若聲啞不止兼服人參欵冬膏紫蘇散出本事方治肺感風寒作𠻳紫蘇桑白皮青皮五味子杏仁麻黄甘草各等分右為細末每服二錢水一鍾煎至七分温服杏子湯治冷熱咳𠻳不問外感傷寒内傷生冷及虚勞咯痰飲停積悉皆治療人參去蘆半夏炮茯苓去皮細辛減半芍藥去粉乾薑炮洗甘草炙官桂減半五味子去苗杏仁各等分右㕮咀每服四錢水二鍾半同杏仁去皮尖五枚薑五片煎五六分去渣温服不拘時此藥辛辣為性稍熱若冷則宜服如熱服即咳也若感冒寒風得咳加麻黄等分脾胃實者可御米殻去筋膜碎剉醋鹽炒等分每服加烏梅一箇煎服其效尤妙驗嘔心逆心不可用此若年久咳𠻳氣虚喘急去杏仁人參芍藥加麻黄乾薑五味子各增一半名小青龍湯若感寒加麻黄去根節煎來沈𦂳熱無汗若寒𠻳者是也又治年久咳𠻳痰涎壅盛夜不得睡仍專治脚氣喘急此方雖有麻黄然有官桂不致於發汗服之不妨也一方加麻黄甘草杏仁五味子茯苓等分橘紅倍之名麻黄湯尤為切當又一方用紫蘇葉桑白皮麻黄青皮五味子杏仁甘草等分名平氣飲生薑七片烏梅一箇煎服久年咳𠻳氣虚喘急皆得其宜二方中有麻黄有汗人不宜服之杏蘇湯一名橘蘇散出醫方大成治傷風咳𠻳身熱有汗熱風病證熱風脉浮數挾熱服杏子湯不得者此藥穏當也橘紅紫蘇葉杏仁五味子半夏湯炮七次桑白皮蜜畧炒貝母去皮白术炒各一兩甘草九兩半右為散每服四錢水一鍾半生薑五片煎八分去渣不拘時候温服寧氣散治肺感風寒咳𠻳涎喘麻黄去根節二兩杏仁去皮尖炒三兩石膏一兩半御米殻去蒂蜜炒四兩甘草炒兩半右為細末每服二錢白湯調下食後治傷風咳𠻳涕唾稠粘出海上各方天南星二兩搗炙生薑汁和作餅子炙微黄色令乾甘草半兩炙右同為細末水一鍾半用藥末二錢生薑五片煎至七分食後温服白术湯出鮑氏方治傷風咳𠻳痰涎憎寒發熱上氣喘急白术二兩五味子白茯苓一兩甘草一分半夏四箇大者洗分十六片右散分十六服每服生薑五片煎空心服金櫃散出江隂方治老少傷風發𠻳頭痛日久不瘥天南星半夏右為末水浸兩服時日日換水取出隂乾又以烏頭附子末各六錢衮勻以生葱薄荷湯大人半錢孩子一分不以時服八寳飲出衞生家寳方治傷風咳𠻳麻黄半兩去節桔梗半兩馬兜鈴半兩罌粟殻甘草半兩五味子半兩陳皮半兩桑白皮半兩右為粗末每服三錢用水一鍾薑三片杏仁三粒去皮尖白糖一塊煎至七分去渣食後臨卧服加減三拗湯出朱氏集驗方治傷風咳𠻳麻黄不去節剉半錢湯洗炒乾去毛杏仁不去皮苦梗各二錢甘草生旋覆花去蒂各半錢右㕮咀毎服一大錢水一鍾生薑五片五味子數粒竹葉一片不可多糯米數粒煎至半鍾分作兩服食後温服暴咳𠻳論夫肺感於寒微者即成咳𠻳盖肺主皮毛寒傷肺腠則肺先受之其咳𠻳語聲嘶破咽喉不利也肺主於氣通於皮毛若人氣不足腠理開踈或觸冒寒風為邪所中或遇動勞後汗出傷風邪冷之氣忽伏於肺故令卒咳𠻳也方杏仁方治大人孩子中冷咳𠻳或上氣喘逆或惡寒鼻出清涕杏仁去皮尖雙仁者麩炒研紫苑去苗土黄芩去黒皮當歸切焙甘草炙剉麻黄去根節桂去粗皮陳橘皮湯浸去白焙各半兩木香一分大黄剉炒一兩半右為散每服三錢水一鍾煎七分温服小兒以意加減又方一名杏仁煎出千金方治傷肺暴咳失聲語不出杏仁薑汁砂糖蜜各半升五味子紫苑各三兩通草貝母各四兩桑白皮根五兩右㕮咀以水九斗煮取三升去渣内杏仁入薑汁蜜糖相攪微火煎取四升初服三合日再夜一後稍加阿膠飲出朱氏集驗方治暴𠻳一服便安阿膠二片火炙生薑一片大烏梅二箇搥甘草五寸用上等紫蘇一兩杏仁七箇去皮尖大半夏三箇湯炮罌粟殻一箇去穰蒂右用水一大碗煎六分去渣任意服之不拘時貝母煎出聖惠方治暴發咳𠻳胸膈不利痰涎喘急貝母去心紫苑去苗土杏仁去皮尖雙仁麩炒研桑白皮根各一兩五味子百部甘草炙右剉水六盞煎四盞去渣入生地黄汁五合麥門冬白蜜三合酥二兩銀石器内慢火煎成煎貯不津器内每服一匙無時含化嚥津貝母湯出御藥院方治暴發咳𠻳多不愈貝母去心桑白皮剉五味子甘草炙剉各半兩知母一分欵冬花二兩杏仁去皮尖麩炒三兩右為散每服四錢水一鍾入生薑五片煎六分去滓食後温服感通湯治暴感風邪咳𠻳甘草炙剉麻黄去根節芎藭馬兜鈴防風各一兩黄明膠炙炒三錢右為散每服二錢水一鍾煎七分去渣早晚食後温服延年貝母煎治暴熱咳𠻳貝母三兩紫苑一両五味子一両百部根一両甘草半両杏仁去皮尖兩仁研右切以水五升煮取二升去滓和地黄汁三升麥門冬汁一升白蜜五合好酥二合生薑汁一合又先取地黄麥門冬及湯汁和煎減半内酥薑汁攪不得停手又減半内蜜和稠糖煎成取如棗大含嚥之日三夜再蔣孝璋方忌海藻菘菜鹹物貝母湯治傷風暴得咳𠻳貝母去心三分欵冬花麻黄去根節杏仁湯浸去皮尖雙仁炒研各一兩甘草炙剉三分右為散每服三錢水一鍾薑三片煎七分去渣温服不拘時三抝湯出和濟方治冬月感冒風邪鼻塞聲重語音不出傷寒氣暴𠻳痰喘頭疼目眩四肢拘倦胸滿氣短麻黄不去節杏仁不去皮尖甘草不炙右件等分每服五錢水二鍾煎八分熱服以被盖覆而睡更加五味子等分尤妙一方用薑煎飴糖煎出肘後方治暴𠻳飴糖乾薑炮為末各一兩半䜴一兩右分作兩劑先以水二鍾煮豉取沸去渣次入飴糖待消後入乾薑末攪勻以瓷器盛分為五七服沸湯化下桃仁方治卒得咳𠻳用桃仁三升去皮杵貯器中密封之蒸一次日乾絹袋盛次内二斗酒中六七日可飲四五合稍増至一升麩炒桃仁令黄兼治膈氣壅滯治卒咳𠻳胸膈不利病人齒無色舌上白喜睡不知痛癢或不利急攻下部不曉此乃但攻其上不以為意下部生蟲食其肉爛見五臟便死出聖惠方豉一兩乾薑半兩炮製剉杏仁一兩湯浸去皮尖雙仁炒右為散以水三大鍾煎至一鍾半去渣内飴糖一兩更煎令化分為三服一日服盡又方一名杏仁膏出十便良方治肺寒卒咳𠻳杏仁一兩湯浸去皮尖雙仁研炒如膏甘草一分炙微赤桂心半兩右為末煉蜜為丸入杏仁同研半棗大不拘時以綿裹一丸含嚥下以瘥為度治暴𠻳出本事方白礬一兩細研砒霜一錢右先將砒霜安放茶盞底却將礬末鋪盖火煅為末烏梅肉丸如菉豆大硃砂為衣每服二丸紫蘇湯下大白丸治大人小兒暴𠻳石灰一兩蛤蚧四錢右為細末湯蒸浸餅和丸如豌豆大焙乾每服三十丸濕虀汁下小兒服十丸早晩食後臨卧服伏龍肝丸治暴咳伏龍肝半兩䜴一兩半右同炒搗羅為末煉蜜丸如梧桐子大每服四十丸米飲下治卒得咳𠻳出肘後方用猪腎二枚細切乾薑三兩末水七升煮二升稍服覆取汗又方出肘後方椒一百粒搗末杏仁二百枚熬棗一百枚去核右合搗令極熱稍合如棗許大則服之又方出肘後方生薑三兩搗取汁乾薑屑三兩杏仁一升去皮熬右合搗為丸每服三丸日五六服又方用芫花一升水三升煮取一升去渣以棗十四枚煎令汁盡每日食之三日愈治卒咳𠻳肺壅痰滯上焦不利出聖惠方杉木屑一兩皂莢三兩去黒皮酥炙黄去子右為末煉蜜為丸如梧桐子大每服以粥飲下十丸日三四服治咳𠻳日夜不止出聖惠方杏仁五兩去皮尖雙仁者炒生薑二兩去皮切右為細末煉蜜丸如梧桐子大每服粥飲下二十九丸治肺寒卒咳𠻳出聖惠方細辛半兩搗為末杏仁半兩湯浸去皮尖雙仁麩炒如膏右件於鍋中鎔開蠟半兩次下酥一分入細辛杏仁如半棗大不拘時以綿裹一丸含化嚥津又方出聖惠方桂心半兩附子一兩炮裂去皮臍右為末煉蜜和丸如半棗大不計時以綿裹一丸含津嚥下治卒暴𠻳久咳出食後方用芫花二兩熬水二升煮四沸去渣内白糖一斤服如大棗勿食鹹酸物又方治卒得咳𠻳用生龜三箇治如食法去膓以水五升煮取三升以漬麵釀米四升如常法熟飲二升令盡此則永斷百部根方出鮑氏方治暴咳用百部藤根搗自然汁和蜜等分沸煎成膏子嚥之一方寸日三服粥飲調下浮石丸出肘後方治暴𠻳以浮散石二兩為末煉蜜丸如桐子大每服以米飲下十丸日三四服又方治卒得𠻳用烏雞一枚治如食法以好酒漬之半日出雞服酒一云酒一斗煮白雞取三升分三服食雞莫與鹽食訶梨勒含化方治暴𠻳用訶梨勒生去核一枚拍破含之嚥津次煎㯽榔湯投之療卒咳𠻳釡月下土一分䜴七分熬右熬搗蜜丸如桐子大米飲服又方治卒𠻳生薑汁百部根汁右煎服三合一方單用百部根四兩酒一升漬再宿火暖服一升又方温清酒一升驢膏一升右服之以療上氣二白丸治暴咳立效方白善粉一兩白礬一兩右為細末用生薑汁為丸如桐子大每服二十丸臨卧薑湯下立安散治暴𠻳神效皂角一箇不蛀者去黒皮并子江枳三粒去殻去油半夏三粒杏仁三粒去皮尖