二錢陳皮一兩去白訶子炮二兩去皮白术一兩甘草一兩炙羌活半兩馬兜鈴半兩右為粗末水一鍾每服五錢生薑七片棗子二枚煎至八分去渣不拘時温服人參煎丸治咳𠻳痰盛喘急紫苑去根洗焙乾人參去蘆土等貝母去心欵冬花枳殻麩炒百合茯苓桑白皮地黄生乾已上各半兩甘草一錢真酥二錢研杏仁一兩去皮尖别研右並淨秤搗為末入杏仁真酥和勻煉蜜丸梧桐子大每服三十丸茶清送下臨卧時服紫苑半夏湯治停寒飲冷内傷肺經咳𠻳痰涎久不愈者紫苑洗淨麻黄去節半夏洗五味子去枝梗乾薑炮桂去粗皮赤芍藥甘草炙等分右為粗末每二錢水一大盞煎至七分去渣稍熱不拘時候小半夏飲治痰𠻳甚效半夏湯洗七次白茯苓陳皮洗去白甘草炙右等分㕮咀每服三錢水三鍾半薑三片煎至七分温服不拘時候三聖飲治痰𠻳苦梗用百合子根煮一伏時甘草貝母薑汁炒右等分為細末熱調服如作㕮咀則用薑煎亦可人參飲子治寒壅痰𠻳方見本門諸咳𠻳類紫苑湯治痰𠻳喘急方見本門久𠻳類石夏丸治痰𠻳半夏一兩炮滑石一兩火煨煅去火毒右生薑糊為丸如梧桐子大不拘多少白湯下南星末治痰咳𠻳天南星一兩切成片用生薑半斤取汁文火製乾却入蜜半匙炒黄色取出為末右入貝母末半兩每用放手心以舌尖䑛嚥下阿膠散治痰𠻳氣滿甚有神效阿膠麩炒甘草炙桔梗紫蘇子杏仁各一兩南木香二錢半白膠香半夏製五味子罌粟殻四兩蜜炙燒生薑胡桃蜜煎橘皮湯凡人患𠻳而有痰者當以辛甘藥理肺惟陳皮最佳用時須當去白本草云陳皮味辛理上氣去痰利滯氣青皮味苦理下氣二味俱用􅄆三焦之氣也故聖濟云陳皮去痰穰不除疾去痰麻黄發汗節不去而止汗七生丸治一切痰𠻳白附子白殭蠶大天南星半夏洗川薑乾蝎無甘葛代草烏頭水浸三宿去皮臍焙乾用右等分並用生者以生薑煮糊和丸如梧桐子大以蛤粉為衣每服十丸生薑自然汁浸温湯下每日空心服忌熱物少時以飯壓之人參膏子治大人小兒肺壅痰𠻳人參半兩好者生用麻黄半兩不去節甘草一分漢防已半兩生用杏仁四十九箇湯泡去皮尖研細百部一分生用右為細末煉蜜為膏子不拘多少含化潤五臓去痰𠻳以杏酪濃如膏服之法火角法治年逺冷痰𠻳反勞咳無效者出於東坡先生家傳方言先君伯母皆患此痰五六年後用此方法得愈信而用之屢驗方見本門咳𠻳薫法類氣𠻳論夫氣𠻳肺主氣通皮毛人有運動勞役其氣外洩腠理則開因乗風取凉氣卒傷於肺發成𠻳故為暴氣所中以致氣𠻳甚而多吐涎沫方治九種氣𠻳欲死百病乾薑半夏細辛紫苑吳茱萸茯苓芫花一作苑花甘遂甘草防葵人參烏頭大黄杏仁各一分葶藶二分巴豆厚朴白薇各三分五味子逺志前胡菖蒲枳實蜀椒皂角當歸大㦸桂心各三分右為末蜜和丸如梧桐子大先食二丸日三服以知為度不知增食又酒方丹參乾地黄芎藭石斛牛膝黄耆白术蓯蓉各四兩防風獨活附子秦艽桂心乾薑各三兩鍾乳六分研右切以酒三斗浸七日初服二服日再稍稍加之忌食桃李雀肉生葱猪肉冷水蕪荑紫苑丸出聖惠方治氣𠻳兼下焦虚􅉵冷氣上攻胸喘滿不下飲食者紫苑一兩去苗土貝母一兩炒黄百部一兩欵冬花一兩五味子一兩半夏一兩湯浸七次去滑射干一兩芫花皮根一兩去土紫蘇子一兩炒乾薑一兩炮陳皮一兩湯浸去白穣白石英二兩細研水飛過右為細末煉蜜和搗五七百杵丸梧桐子大每服三十丸以粥飲下鍾乳粉二兩杏仁二兩湯洗去皮尖雙仁炒同前藥飲下忌羊肉餳諸生冷等物訶梨勒散出聖惠方治氣𠻳腸胃中邪冷氣上攻肺臓不調訶梨勒皮一兩半熟地黄一兩附子三分炮去皮臍甘草半兩炙微赤桂心三分黄耆三分去苗土五味子三分木香三分人參三分去蘆頭桃仁三分湯浸去皮尖雙仁炒當歸三分右為散每服四錢水一鍾入生薑半兩棗三枚煎六分去渣温服日三服熟地黄丸治氣𠻳不止下焦風冷上攻於肺心胸短氣四肢羸熱飲食無味虚損不足熟地黄二兩桂心一兩山茱萸一兩五味子一兩丹參一兩肉蓯蓉一兩酒浸一宿去皺皮澤瀉一兩甘草一兩炙微赤剉鍾乳粉白茯苓二兩右為末煉蜜和搗三五百杵丸如桐子大每服不拘多少以温水送下酒亦可又丸方療患氣𠻳并下焦冷結方乾地黄四兩防風蓯蓉澤瀉各三兩山茱萸丹參五味子茯神各二兩一方作茯苓桂心一兩半右為末煉蜜和丸如梧桐子大酒服二十丸日再稍加至三十丸忌醋物生葱乾薑散出聖惠方治氣𠻳呼吸短氣心胸不利不思飲食乾薑半兩炮製剉桂心半兩欵冬花半兩甘草三分炒微赤剉細辛三分附子一兩炮製去皮臍五味子二分白术三分木香三分右為散每服三錢水一鍾入棗二枚煎至六分去滓温服日三服人參散治氣𠻳心胸膈滯悶四肢不和人參一兩去蘆乾薑三分炮製杏仁三分湯浸去皮尖雙仁炒黄麻黄三分去根節桂心半兩甘草半兩炙赤剉五味子三分紫苑三分去苗土陳橘皮三分湯浸去白穰右為散每服四錢水一鍾入棗二枚煎至六分去渣温服日三服延年杏仁煎主氣𠻳心胸不利喘息短氣好杏仁一升去皮尖雙仁酥熬糖一合蜜五合酥一合生薑一合貝母八合别篩末蘇子汁一升炒合酥水研和漶取汁右先搗杏仁如泥内後六味藥合煎如稠糖取如棗大含嚥之五味子散治氣𠻳胸滿短氣不欲飲食五味子一兩桂心一兩甘草三分炙微赤剉細辛三分乾薑三分炮剉紫苑三分去苗土麻黄三分去根節陳橘皮半兩湯浸去白穰右為散每服三錢水一鍾入棗二枚煎至六分去滓温日三服又療氣𠻳煎貝母紫苑百部根炙欵冬花甘草炙各三分桂心二分已上六味切以水六升煮二升五合去查内後藥生地黄汁三升麥門冬汁五合白蜜五合生薑汁五合酥五合白糖五合杏仁三合去皮尖雙仁熬搗作膏右煎如糖一服一匙日三稍加至三匙𠻳定則停忌海藻生葱菘菜蕪荑蒜醋鹹食猪肉等物治氣𠻳心胸不利少思飲食出聖惠方乾薑三兩炮製紫蘇子一兩微炒甘草半兩炙微赤桔梗三分去蘆杏仁三分湯浸去皮尖雙仁麩炒微黄陳橘皮右為散每服四錢水一鍾入棗二枚煎六分去渣温服日三服又療氣𠻳杏仁煎杏仁五合去皮尖搗研生薑汁三合酥一合蜜三合右以水三升研杏仁取汁内銅鐺中煎攪可減半内薑汁煎如稀糖内酥蜜煎令如稠糖一服一匙日三服夜一稍加至兩匙忌猪肉又杏仁煎主氣𠻳杏仁一升去皮尖雙仁研濾取汁酥三合白蜜三合右以水三升研濾杏仁令滓盡内銅鐺中煎可減半内酥蜜煎二十沸内加貝母末四分紫苑末三分甘草炙末一分更煎攪如稀糖一服一匙日三夜一服以咳𠻳止為度大驗忌蒜猪肉治氣𠻳不問多少時者出肘後方橘皮桂心杏仁去皮尖各等分右搗蜜丸每服二十丸茶清下忌生葱治氣𠻳方昔有人患氣𠻳將朞或教之此方橘皮生薑焙乾神麯等分右為末丸如梧桐子大食後夜卧米飲服三五十丸普濟方卷一百五十八
