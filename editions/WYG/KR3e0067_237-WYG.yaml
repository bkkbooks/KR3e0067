成治傳屍勞疰最能殺勞虫右用正川椒色紅大者去合口并紫黄紙二重托之放於熱爐内頻撥令出油取頓地用沙盆盖火灰拌宻裹四圍約一時許碾末老酒浸白糕為糊丸如梧子大每服三四十丸食前鹽湯下逐時常服滿一斤後瘵疾自瘥昔人服之日乆取下勞虫如小蛇状即病瘥此藥亦治痺癖桂酒湯下治腰痛茴香酒下治下腎冷鹽湯下一方棗湯下五十丸勞虫盡下永絶其根一方為末每服二錢空心米湯調和下痺麻暈悶至少頃如不能自禁即以酒糊丸梧桐子大空心時服五十丸昔人勞病遇一異人云勞氣已入臟遂授與此方令急服二斤其病當去服之幾盡大便中出一虫状如蛇自是遂安一方名川椒丸治諸傳屍并勞氣殺虫温中逐骨莭皮膚死肌寒痺温下氣除去臟腑寒冷傷寒温瘧大風寒汗不出心腹留飲停宿食腸癖下利洩精女子患乳餘疾散風邪瘕結及水腫黄疸鬼疰蠱毒風頭冷風脚不遂虚損𠻳破癥結開胷天行時氣産後宿血壮陽療隂汗暖腰􅂰痛及小便縮一方云有婦絶産服至二斤生七子道人曽服之通仙又能治膀胱急傳屍病亦名痰瘧遁疰骨蒸伏連殗殜此病多因臨屍哭泣屍氣入腹連綿或五年有能食不作肌膚或三日五日若㣲勞即發大都頭額頸骨間尋常㣲熱翕翕然死後家中更染一人如此乃至滅門此療治之方青羚羊肺一具破於布上曝乾之莨菪子一升絹袋盛右醋一升同漬經三日出各於布上暴之令至乾微火熬莨菪子共搗篩和以蜜丸如梧子服三丸加至四丸又方地骨皮白薇芍藥甘草犀角升麻茯神麥門冬黄芩桔梗枳實大黄前胡茯苓天門冬生薑桑根白皮當歸柴胡硃砂芎藭羚羊角蜀漆知母石膏常山鱉甲香豉黄耆地黄橘皮烏梅右藥並可詳度病状用之延夀散治男子婦人小童等傳屍諸勞咳嗽寒熱變候並出却惡疰勞虫永去根本牡丹皮附子炮去皮臍柴胡去苖秦艽去苖鱉甲酒浸炙令赤色已上各半兩右為末入人中白半兩同研以甆盒盛之每服用猪胆一枚葱白椒末一處細剉如膏入末三錢拌和以童子小便一盞水半盞同煎沸温服其患人貼體着皂紗衫一領衣被盖惡汗出脫衫揩拭身上汗乾净洗衫以安息香薫乾避風将息七日服後汗輕如常是瘥候其衫即棄於十字街中或長流水中永瘥治一切虚勞傳屍伏連鬼疰本臟氣虚夜夢不祥精神恍惚靣色青黒赤白變證不定形體消痩精氣不守四肢百莭沉重吃食减少行歩無力一切勞候虚冷之證並冝服此方牛膝石斛去頭續斷山茱茰芎藭各半兩菖蒲呉茱茰官桂虎骨鱉甲醋炙香黄茯苓肉豆蔲乾地黄黄耆天靈盖醋炙黒色柴胡去苗各一分木香三銖右細杵羅為末以童子小便些少化麝香兩豆大對煉蜜丸如梧桐子大空心鹽湯下四十丸治一切傳屍復連鬼疰夜間多夢鬼怪祛邪逐鬼十神丹雄黄一兩硫黄元參蒼术鬼箭鬼臼虎骨皂角麝香硃砂各一分右細杵羅為末以阿魏三銖化作水熟煮麵糊丸如梧子大以細研雄黄為衣病人身上長繫兩三丸夜間更取兩三丸入麝香些少相滚衣上床前焼一爐百鬼自退治傳屍屍疰鬼氣復連者右以死人頂骨十字解者焼令黒細研白飲和服治傳屍鬼氣疰忤右以猯脂銷於酒中服之治傳屍復連鬼氣疰忤邪氣右用苦眈苖子煮汁服亦生擣絞汁服傳屍羸痩附論夫男女傳屍之候心胷滿悶背膊酸疼兩目多澁四肢無力唯知欲臥睡恒不着脊膂急痛􅂰脛痠疼多卧少起状如佯由病每至旦起即精神尚好恍似無病從日午已後即四體微熱靣好顔色喜見人過常懐忿怒行立脚弱夜臥盗汗夢與鬼交或見先亡或多驚悸有時氣急有時欬嗽雖思飲食不能多餐死在須臾而精神尚好或兩脇虚脹或時㣲利鼻乾口燥恒多粘唾有時唇赤有時欲唾漸加羸弱由于水涸不覺其死矣又曰傳屍者無問老少男女皆有斯疾大都此病相尅而生先内傳毒氣周徧五臟漸加羸痩以至扵死訖復易家親一人故曰傳屍亦名傳疰以其初得半臥半起號為殗殜氣急嗽者名曰肺痿骨髓中熱稱為骨蒸内傳五臟名曰復連不解療者乃至絶後假如男子因虚損得之名為勞極其源先從腎起腎初受之兩脛痠疼腰脊拘急行立脚弱飲食减少兩耳颼颼欲似風聲夜臥夢泄隂汗萎弱腎既受已次傳於心心受氣夜臥心驚或多怖悸心懸氣翕欲盡夢見先亡有時盗汗食無滋味口内生瘡唯欲眠卧朝輕暮重兩頰口唇如傅胭脂五心皆熱心既受已次傳於肺肺既受時氣滿欬𠻳體力微弱有時喘急卧即變甚鼻口乾燥不聞香臭假令得聞唯覺朽腐物氣有時惡心憤憤欲吐肌膚枯燥或時刺痛似虫行皮乾細起状若麩片肺既受已次傳於肝肝初受氣兩目漠漠靣無顔色常欲嚬眉視不見逺目恒乾澁又時赤痛或腹脹黄朝夕慒常欲食眠及至放卧睡還不著肺肝既受已次傳於脾脾初受氣兩肋虚脹食不消化又時渇利或食旋出有時吐痛腹脹雷鳴唇舌焦乾或生瘡腫毛髮乾燥無有光潤或腹上氣􅎑肩喘息利赤黒汁至此候者将死之證也方杏仁丸治傳屍夜夢鬼交遺精心腹冷癖小腹與隂中相引痛飲食不下日漸覺痩冝服杏仁五升肥好者以童子小便於瓦瓶中浸二七日和瓶于日中晒每日換小便日滿以新汲水淘洗去皮尖便以微火焙乾别以小便一斗於鍋内緩火煎後杏仁随手破即於乆經用炒盆内栁木搥研如膏便以細布濾過真酥一兩薄荷汁二大合攪令匀即入後藥青蒿子二兩柴胡去苖鱉甲塗酥炙令黄去裙襴烏梅肉微炒地骨皮赤茯苓已上各一兩半知母虎頭骨塗醋炙令黄生乾地黄肉蓯蓉酒浸一宿刮去皺皮灸令黄人參去蘆頭已上各一兩枳殻麩炒微黄去穰當歸已上各三分白术木香牡蠣已上各半兩白㯽榔二兩硃砂一兩細研豉心一合右擣羅為末和人參再擣五七百杵丸如梧桐子大每日空心以温水下十五丸漸加至三十丸服後覺似熱即减藥已定還添以意斟酌服經一月諸候皆退能食夜臥安暢面有血色即是藥力已行當勤服勿怠忌莧菜冷水白粥生血雀肉桃李鱉甲湯治五勞乾痩及傳屍夢寝不祥日漸消痩肌體困倦骨莭疼痛不思飲食鱉甲去裙襴酥炙令黄色一兩天靈盖酥炙黄色半兩柴胡去苖赤茯苓去黒皮各三分安息香半兩地骨皮三分山梔子仁人參各半兩貝母去心桃仁去皮尖雙仁麩炒各半兩黄連去鬚半兩麥門冬去心焙三分阿魏用麵褁煨令熟半兩生乾地黄三分㯽榔剉當歸剉焙各半兩右搗篩每服四錢童子小便一盞半葱白五寸桃栁枝各七寸生薑錢二片同煎至八分不計時候去滓温服夜後煎下放患人床頭至五更夢寐非常此是藥效也補勞飲治男子婦人虚勞骨蒸傳屍染著不能斷絶服後阿魏丸經脉猶未通或四肢虚羸飲食全少速服此藥通經脉黄耆剉當歸切焙生乾地黄焙各二兩人參白茯苓去黒皮芍藥五味子桂去粗皮牛膝酒浸切焙陳橘皮麥門冬去心焙枳殻去穰麩炒甘草炙剉各一兩柴胡去苖一兩半右麄搗篩每服五錢水一盞半入生薑五片棗三枚擘同煎八分去滓温服不拘時黄連丸治傳屍面黒頭熱痛胷背氣結咳唾黏痰食少頻嗽喘息急滿脇肋氣脹腰臍下疼四肢蒸熱痿困不安黄連去鬚二兩半獺肝炙令乾貝母去心大黄剉炒各一兩半龍膽去蘆頭一兩半紫苑去苖土旋覆花茯苓去木各一兩天靈盖塗炙令黄色㯽榔微煨剉各一兩右為細末煉蜜丸如梧子大每日食後煎漿水下二十丸日午再服女子血閉加黄芩一兩鉄粉丸出聖惠方治傳屍勞羸痩心神煩熱四肢疼痛冝服鉄粉二兩獺肝二具微炙柴胡一兩半去苗安息香二兩入胡桃仁搗熟鬼督郵一兩半木香一兩桃仁一兩半湯浸去皮尖雙仁麩炒微黄麝香半兩研入苦參二兩右搗羅為末煉蜜和搗一二百杵丸如梧桐子大每服不計時候煎生薑青橘皮湯下二十丸阿魏丸治傳屍骨蒸女人血氣血候經年不通痰嗽黄痩四肢羸弱盗汗骨熱或時増寒飲食减少阿魏細研當歸切炒蕪荑仁炒各一兩雄黄研猪牙皂角去皮子酥炙各半兩麝香研蓬莪茂煨剉各三分柴胡去苗白㯽榔剉各二兩右為末和匀再羅用羊肉半斤去皮爛煮細切研如膏入諸藥末和搗三千杵如硬即添肉汁丸如菉豆大每服五十丸五更酒下仍飲令醉以青絹被盖之睡覺汗出通身必有細虫在被間日光内㸔見急須焼之或瀉下惡物並虫等是效如小児服以意加减雄黄丸出聖惠方治骨蒸傳屍出虫下積惡物雄黄研雌黄研代赭石研各一兩丹砂研二両右四味以醋相和炒令乾後以水飛過去却醋味焙令乾研如粉入後藥相和蝦蟆炙天靈盖炙黄搗末麝香研青黛研各半兩巴豆七枚水煮一沸時去皮尖心膜研右搗研後五味為末入前四味更研令匀以粟米飲為丸如梧桐子大每日空腹熱水下七丸若要下虫即以沙糖水下二丸服至三日滿身出虫用芽香二斤煮沭浴一宿後着在水上或在水下澄之可驗鬼哭飲子出聖惠方治傳屍勞不以冷熱羸痩者冝服㯽榔兩个一生一熟鱉甲半兩塗醋炙令焦黄去裙襴甘草一錢如病人中指長桃仁七顆去皮尖杏仁七顆去皮尖青蒿一握長二寸阿魏少許東南桃栁各七莖長三寸和心用右以童子小便一大盞去滓食前分温二服以吐利出惡物為度忌莧菜龍膽丸出聖惠方治傳屍羸痩經乆不損龍膽一兩去蘆頭枳殻一兩麩微炒去瓤地骨皮三分甘草半兩炙㣲赤剉麥門冬一兩半去心赤茯苓一兩梔子仁三分桃仁三分去皮尖雙仁麩炒微黄右搗羅為末煉蜜和搗二三百杵丸如梧桐子大每服不計時候以粥飲下二十丸獺肝丸出聖惠方治傳屍骨氣骨蒸日漸痩弱冝服獺肝三分㣲炙鬼臼三分沙參三分去蘆頭人參三分去蘆頭丹參三分苦參三分天靈盖一兩塗酥炙微黄麝香半兩研入右搗羅為末煉蜜和搗一二百杵丸如梧桐子大每服不計時候以粥飲下二十丸通神丸出聖惠方治傳屍勞情思不恱心多驚悸盗汗羸痩兎糞七七粒胎髮二分小児胎髮人手指甲七七片人脚指甲七七片天靈盖一枚圓者穿山甲七七片硇砂半兩通明者紫河車一具右八味入瓦器内鹽泥固臍穿一地竅方圓一尺将藥瓶在地竅内用槐木火圍定藥瓶焼一日取出細研再入後藥雄黄研鬼臼炒搗末鬼箭羽炒搗末麝香研丹砂研各一兩右将後五味與前焼藥合和再研匀煉蜜丸梧桐子大别用丹砂為衣每服十丸漸加至二十丸米飲下日進二服早晩食前服合用上寅日不令婦人鷄犬見阿魏散治傳屍勞病胷滿短氣肌體羸痩無力喘嗽不已阿魏研安息香入胡桃相和研各二兩甘草炙剉半兩猪牙皂莢塗酥炙令黄去皮子一兩木香天靈盖塗酥令炙黄色半兩豉一合麝香研半錢右除研藥外搗羅為散與研藥和匀毎服五錢用童子小便一盞半入葱白三寸明日五更煎至一盞空心在床服之日午夜食候再服服藥後良乆或得吐亦佳有利下虫如髮或積聚五色穢惡物是病根出服藥數日如夢與人離病人哭泣者瘥之兆也患甚三日一劑三劑瘥有患者但収拾藥物置病人牀頭遂有如此夢瘥虎骨散出聖惠方治傳屍羸痩肢體疼不思飲食冝服虎骨頭一兩塗酥炙令黄鱉甲一兩塗酥炙㣲黄去裙襴川升麻一兩柴胡一兩去苖桃仁一兩湯浸去皮尖雙仁麩微炒川大黄二兩剉碎㣲炒甘草一兩㣲赤剉右搗麄羅為散毎服三錢以水一中盞煎至六分去滓不計時候温服忌莧菜天靈盖散出聖惠方治傳屍勞痩不問年月深淺宜服天靈盖一枚塗酥炙令㣲黄阿魏半兩木香一分安息香一分猪牙皂莢一挺塗酥炙令黄去皮子甘草半兩炙㣲赤剉右搗麄羅為散毎服五錢以童子小便一大盞半煎至一大盞去滓分温二服平旦一服如人行八九里更一服唯喫葱粥或吐出白虫如髮或吐出赤虫若吐赤虫夢見鬼哭即是瘥也極重者三服瘥三日一度合服終身不得喫牛馬肉釣虫丸治傳屍勞病痿羸兩臉常赤喘急咳嗽心胷滿悶四肢無力夢與鬼交磁石細研生用硇砂湯熬令熟各二兩龍骨三兩膩粉半兩麝香取末七兩右以細末和匀以黄蠟四兩煉入諸藥丸如梧桐子大用線子五七寸一頭繫錢一文一頭穿藥丸子令患人空心新水吞藥丸子其錢在口外候惡心時以手拽線子吐下藥并虫吐出在藥上急用油煠虫死立效香水灑衣法出衛生家寳方凡治傳屍醫者并人家俱先以香水洒身恐虫飛出着人以此法防之安息香研檀香鎊細芽香乳香右煎水洒衣并頭靣天靈盖散出衞生家寳方治一切傳屍殺一切勞虫天靈盖如兩指大以檀香煎水洗過用酥塗炙時念呪曰雷公神雷母聖逄傳屍須用七遍㯽榔五个如鷄心者生用連珠甘遂半兩並為末阿魏一分别研安息香二分用銅刀子切鉢内研和諸藥麝香三錢當門子别研右六味再研匀毎服三錢用後湯調下薤白葱白各二七莖青蒿一小握桃枝栁枝桑枝酸石榴枝並用向東南嫩條各長七寸烏梅五个右八味用童子小便四升同入銀器内文武火熬至一升濾去滓分作三盞調下五更初服男子患女人煎女人患男子煎服藥後如覺有逆吐即用白梅止之天明覺臓肺鳴須㬰轉下虫及惡物黄水異色糞穢若一服未下辰巳間更進一服各温喫若瀉不止用龍骨黄連訶子等分為末熟水調下一二錢立止次以白粥補之用温藥調補如虫下急以猛火一炊投之地取虫入沸油烹之研碎埋地中普濟方卷二百三十七
