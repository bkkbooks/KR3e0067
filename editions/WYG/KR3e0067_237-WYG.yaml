body:
  text: 普濟方卷二百三十七明周王朱橚撰屍疰門諸屍附論夫人身自有三屍諸蟲與人俱生而其來能與鬼相通常接引外邪為此患害其發作之状或沉沉黙黙不的知所苦而無處不惡或腹痛脹急或痞塊踊起作痛引腰脊或精神雜錯變状多端其病大體略同而有小異以一方共治之者故名諸屍方大度世丸出千金方治萬病癥結積聚伏屍長病寒熱疰氣流行皮中乆病着床肌肉消盡四肢煩熱嘔逆不食傷寒時氣惡疰汗出口禁不開心痛等證病皆治之牛黄大黄雄黄細辛附子真硃甘草人參射罔丹砂鬼臼莽草各一兩蜀椒麝香鬼箭羽茯苓桂心紫苑各二兩乾薑三兩野葛一尺蜥蜴蜈蚣各一枚地膽五十枚芫青二十枚樗鷄三枚巴豆八十枚右為末蜜丸如小豆大飲服二丸日二先食服之牛黄丸出聖惠方治諸屍及中惡疰忤不測之病牛黄川大黄三分剉碎微炒雄黄一分細研附子一分炮製去皮臍真硃一分細研甘草一分炙微赤剉細辛一分人參一分去蘆頭硃砂一分細研鬼臼一分去鬚莽草一分微炙川烏頭一分炮製去皮臍麝香半兩細研川椒半兩去目及閉口者㣲炒去汗紫苑半兩洗去苖􅁟巴豆二十枚去心皮研炒紙褁壓去油鬼箭羽半兩赤茯苓半兩桂心乾姜二分炮製剉地膽五枚糯米拌炒令黄色去翅足芫青七枚糯米拌炒令黄色去翅足野葛一分蜥蜴一枚㣲炒樗鷄半兩㣲炒右羅為末合研將藥及巴豆都研令匀煉蜜和搗五七百杵丸如菉豆大每服不計時以温酒下三丸甘草散出千金方治卒中惡賊風寒冷入腹便絞痛或飛屍遁屍發作無時搶心胷滿脇痛如刀刺口噤者甘草乾姜茯苓乾地黄羊脂當歸細辛各一兩芍藥呉茱茰桂心各二兩梔子仁十五枚炒右㕮咀以水八升煑取三升去滓内脂烊盡分三服欲利者加大黄三兩一方有芎藭無細辛痛甚者可加羊脂二兩當歸人參各加一兩芍藥一兩一方有防風無羊脂犀角丸出聖惠方治諸百病惡氣腹内疼痛毒腫犀角屑半兩天雄半兩炮製去皮臍鬼臼半兩去鬚桂心半兩莽草半兩微炒真硃半兩細研川大黄半兩剉碎㣲炒雄黄半兩細研蜈蚣五莭微炒貝齒五枚焼赤川烏頭半兩炮製去皮臍射香一分細研巴豆十五枚去皮心研紙褁壓去油羚羊角屑半兩右羅為末入研了藥及巴豆都研令匀煉蜜和搗五七百杵圓如梧桐子大每服空腹以粥飲下一丸漸増至二丸卒腹痛飛屍服大豆一丸若惡氣腫以醋和塗之甚良以囊盛之男左女右繫之臂上袪邪氣極效雄黄丸出聖惠方治諸屍癥積及中惡心痛蠱疰鬼氣雄黄細研真硃細研白礬焼令汁盡牡丹附子炮製去皮臍藜蘆去蘆頭炙桂心已上各一兩蜈蚣一枚微炒去足巴豆半兩去皮心細研紙裹壓去油右羅為末入研了藥及巴豆都研令匀煉蜜和丸五七百杵丸如梧桐子大每服不計時候以粥飲下三丸亂髮灰丸出聖惠方治諸屍鬼疰中惡心痛亂髮灰一兩細研桂心半兩杏仁一兩湯浸去皮尖䨇仁麩炒微黄右細煉蜜為丸如梧桐子大不計時以煖酒下五丸又方出聖惠方雄黄一兩酥一兩右相和丸如彈丸大内二合熱酒中研服之須臾再服瘥已有屍疰者常蓄此藥甚良又方出聖惠方烏臼根皮一斤切硃砂三兩細研水飛過右用水五升先煮烏臼根令濃去滓不計時用汁一合調下硃砂一錢治諸屍雜疰相連續亦治三十年衆疰方出千金方右用桃根白皮一斤㕮咀以水二斗煮取一斗去滓分為八九服須令二日服盡一方治疰在心腹痛不可忍者又方出千金方右用芥子末鷄子白和傅屍疰鬼疰者即五屍之中患屍疰又挾諸鬼邪為害者也其變動乃有三十六種以至九十九種大略令人寒熱淋瀝沉沉黙黙不能的知其所苦而無䖏不惡累年漸積日就頓滯以漸至于死死後復疰易傍人乃至滅門覺知此候者必冝急療之蜥蜴丸出千金方治癥堅水腫飛屍寒屍䘮屍疰骨血相疰惡氣鬼忤蠱毒邪氣徃来夢寤存亡流飲結積虎狼所齧猘犬所咋鴆毒入人五臟服藥以殺其毒即凡婦人邪鬼忤亦能遣之蜥蜴一名守宫蜈蚣各三枚蠻虫杏仁各三十枚地膽五十枚虫四十枚蜣蜋十四枚朴硝巴豆各七分澤漆鬼督郵桑赤鷄桃奴一方用桃仁犀角各二分乾姜四分虎骨六分甘草一兩芍藥甘遂各五分欵冬花三分右别治巴豆杏仁如膏内諸藥末研調下蜜搗二萬杵丸如麻子大食前三丸日一不下加之若已吐下者一丸旦服有人曽患疰癖堅二十年得愈一方無蜈蚣以煖酒下屍疰附論夫屍疰者屍病疰於人也是五屍之一挾外鬼邪毒之氣流疰於身多因哭泣感染屍氣而然令人寒熱淋瀝沉沉黙黙不的知其所苦而無處不惡也或腹痛脹滿喘急不得息止横心胷旁攻兩脇或瘰塊踊起或攣引腰脊或舉身沉重而精神不爽每更莭令愈加頓滯積年累月以至於死死則疰易傍人以致滅門故名屍疰凡諸心腹痛服衆方熱藥入腹寂然不動但益氣息急者此屍疰病也冝先服甘草汁一升消息少時服瞿麥湯飲一劑得下便覺稍寛并暴癥堅結宿食及癥血堅痛發作無定者方雄硃散出千金方治因䘮驚憂悲哀煩惱感屍氣而成諸變動不已似冷似熱風氣觸則發雄黄硃砂龍齒桔梗羗活當歸升麻川烏川芎犀角芍藥鬼箭白殭蠶炒白术南星炮山梔子陳皮木香黄芩已上各等分虎骨頸醋炙紫蘇子炒莽草枳殻麻黄半兩蜈蚣二條酒炙㯽榔二分乾蝎炒一分右為細末每服二錢酒調下日三服頃在㣲城日常修合神精丹一料庚申予家一婦人夢中見二倉頭一在前一在後手中持一物云到也未應云到也擊一下爆然有聲遂魘覺後心一㸃痛不可忍昏悶一時許予忽意神精丹有此一證以三粒令服之遂至府城經少頃婦已無病矣今服藥竟痛止神醒今如常矣日後相識稍有邪氣與一二服無不應騐方在千金中治中風之要藥但近世少得曽青磁石為難合耳大麝香丸治疼痛積年屍疰蠱毒癥癖氣承心兩脇下有塊温瘴精魅邪氣或悲或哭蛇蝎蜂等所螫並療之方麝香牛黄藜蘆炙硃砂蜀當歸茯苓桔梗鬼箭羽金牙烏頭炮桂心呉茱茰貫衆丹參各一分蜈蚣去足炙乾姜人參虎骨各三分鬼臼半分芍藥雄黄各一分半巴豆二十枚去心皮熬蜥蜴半枚炙右搗篩蜜丸如梧子以飲下三丸至辰時下利不利以熱飲投之即利三兩行後冷醋飲止之即定然後煮取食之勿食冷水明日依前服之永瘥忌熱麵生菜柿子棃等蛇蝎蜂螫取一丸研破和醋塗之便瘥精鬼狐狸之屬抛磚瓦或如兵馬行夜發者是鬼魅無早晩每日服前藥兩丸只三兩日服即瘥仍每日焼一丸薰身體及衣裳宅中焼之亦好無患之人以三五丸緋絹袋盛繋左臂上辟虎毒蛇諸精鬼魅忌狸肉生血物猪肉生葱蘆笋一方無鬼臼丹參五香丸療諸毒疰屍氣心腹脹滿大小便不通鬼疰心痛不可忍者牛黄研犀角屑各三分升麻沉香薫陸香當歸桂心青木香麝香雄黄研如粉鬼箭羽巴豆去皮心熬訶棃勒皮硃砂研㯽榔仁乾姜呉茱茰甘草炙豆蔲各四分桃仁去尖皮熬附子炮各五分右搗篩蜜和丸如梧子大煖水服三丸至五丸如不利更服以利為度此方甚驗人乆不傳忌海藻松菜猪肉冷水生葱蘆笋生血物件治滯冷積年不瘥出風科積類右以死人枕煮服之嘗有嫗人患滯冷積年不瘥徐君嗣伯為診曰此屍疰也當以死人枕煮服之乃愈嫗於是徃古塜取枕已一邉爛缺嫗服之即瘥屍疰症者鬼氣也伏而未起故令人沉滯得死人枕治之則魂氣飛越不復附體故屍疰自瘥五香散療屍疰忤邪氣或熱或寒時氣在骨莭間似瘥似劇兼主百病沉香丁香麝香薫陸香鬼箭羽當歸豆蔲各四分牛黄鬼臼橘皮金牙各三分焼犀角屑羚羊角屑大黄各六分升麻桔梗桃仁去皮尖熬光明硃砂研安息香各五分研右為散湯飲酒隨病服方寸匙日再瘥止亦可蜜丸如梧子服十丸桃奴湯出千金方治十惡諸屍蠱毒心腹卒絞痛桃奴當歸人參乾薑各一兩芎藭甘草各三兩丹砂麝香茯苓犀角鬼箭羽桂心各一兩右㕮咀以水九升煑取二升半去滓分二服食前大便不通腹滿加大黄三兩芒硝二兩一方有雄黄一兩無丹砂芎藭江南度世丸出千金方治萬病癥結積聚伏屍長病寒熱疰氣流行皮中乆病着床肌肉消化四肢煩熱嘔逆不食傷寒時氣惡中汗出口禁不開心痛等證并皆治之蜀椒三兩人參細辛甘草各二兩茯苓真珠大黄乾薑丹砂一方作硃砂野葛桂心雄黄麝香鬼臼各一兩烏頭牛黄各三分附子紫苑各六分巴豆六十枚蜈蚣二枚右為末煉蜜和丸如小豆大飲服二丸可加至四丸日二服更加獺肝一具尤良一方無牛黄以煖酒下亦可桃奴丸出三因方治心氣虚有熱恍惚不常言語錯亂屍疰客忤魘夢不祥小児驚癎並皆服之桃奴七枚别研為末辰砂半兩别研桃仁十四枚去皮麩炒别研為末龍腦别研一分生玳瑁鎊過為末一兩牛黄别研碎一分雄黄用桃葉煮水研飛取三分黒犀石上以水磨澄去水取細末半兩麝香别研一分琥珀别研三分安息香一兩以無灰酒斟酌多少研飛去砂土銀器入桃仁琥珀􅆈成膏右以各末和入膏丸如鷄頭大隂乾宻器封閉静室安置煎人參湯研下一丸食後臨臥服五屍丸療諸屍疰方芍藥桂心各八分呉茱茰一合丹砂研芎藭烏頭炮乾薑各四分蜀椒一兩去目汗梔子仁五分巴豆四十枚去心皮熬研右搗下篩蜜和丸如豆大一服三丸日三忌猪肉生葱蘆笋生血等物赤茯苓散出聖惠方治屍疰發作無時心胷痛喘息氣傷攻兩脇赤茯苓三分當歸半兩剉微炒赤芍藥半兩鬼箭羽三分桂心三分乾地黄半兩川升麻三分木香芎藭桃仁三分湯浸去皮尖雙仁麩炒微黄右搗為散每服三錢水一中盞煎至五分去滓温服不拘時一方無川升麻桂香湯治屍疰發歇無時心腹切痛桂去粗皮芍藥木香柴胡去苖各一兩芎藭鱉甲去裙襴醋炙乾薑炮各三分呉茱茰湯浸焙乾炒常山各三分右粗搗每服三錢水一盞半煎至八分去滓温服不拘時候虎掌丸出聖惠方治屍疰寒熱不思飲食心腹刺痛虎掌丹砂研各半兩白茯苓去黒皮龍齒各一兩當歸焙􅅫莪茂煨剉各三分阿魏一兩右為末用酒煮阿魏麵糊丸如梧桐子大每服二十丸生薑烏梅湯下一方用赤茯苓鸛骨丸出聖惠方治屍疰邪氣流傳忽然悶絶時發寒熱淋瀝或腹痛脹滿鸛骨酒炙一方用鸛骨酥炙雄黄研各一兩桂去麄皮三分大黄剉炒三分麝香研半兩丹砂研一分一方用硃砂赤足蜈蚣酒浸炙一條右為末煉蜜丸如梧子大每服二十丸桃枝煎湯下防己散治屍傳屍服送下藥後補虚防己人參白茯苓去黒皮鬼臼鬼箭羽附子炮製去皮臍麴炒各一分右為散每服二錢以桃仁研泔一盞煎至六分温服日五服杜衡散出肘後方治屍疰及惡氣中令人心胷滿悶神思昏迷服此效杜衡一兩莖豉一兩人參半兩瓠子仁二十枚松蘿六鉢赤小豆二十枚右為散平旦温酒服方寸匙晩當吐百種物若不盡後更服之硃砂丸出肘後方治屍疰鬼邪毒氣流疰身體令人寒熱淋瀝腹痛脹滿精神錯亂硃砂一兩細研水飛過一方用丹砂雄黄一兩細研水飛過鬼臼半兩去鬚莽草半兩微炒巴豆十四枚去皮心研紙褁壓去油蜈蚣一枚微炙去走足右羅為末入研了藥令匀煉蜜丸如小豆大每服不計時候酒下三丸鸛骨丸出聖惠方治屍疰惡氣寒熱悶絶兼治百病鸛骨一寸炙一方用鸛鵲皮方三寸炙桂去麄皮半兩䖟虫斑猫各十四枚去翅足炒巴豆二十枚去皮心膜炒右為細末煉蜜丸如小豆大每服三丸温水下日三粥飲亦可還魂湯一名追䰟湯出范氏方治卒感忤鬼擊飛屍諸疰奄忽氣絶無復知覺或已死咬口口禁不開撬齒下湯湯入口不下者分病人髮左右捉定踏肩引之藥下復増取盡下一升須臾立甦金櫃云寸脉沉大而滑沉則為實滑則為氣實氣相摶血氣入臟則死入胃則愈若卒厥唇口青身冷入臟即死身和汗出愈麻黄三兩桂心二兩甘草一兩杏仁七十粒右㕮咀以水八升煮取三升分三服一方無桂心只三味淮南丸療疰易滅門女子小児多疰諸般疰證心悶亂頭痛吐有此證者冝此方又有華陀狸骨散龍牙散羊脂丸諸大藥等並在大方中及成帝所受車前子車下李根皮石長生徐長卿各数両等分右麄搗作方囊貯半合繋衣帶及頭若疰一家暴慘以和此共帶之若初覺屍疰取此藥自焼作屑以水服之蜜陀僧散治臨屍哭屍氣入腹沉滯臟腑有時發動取此方神效蜜陀僧半斤醋煆淬淘研控乾取六兩京三稜煨搗末二兩訶棃勒不去核生用搗羅一兩右合研匀每服二錢用煑麵濃湯調下當晩不食臨臥一服餘時勿服併服三夜次夜當下惡物不下第三夜加生牽牛子末一錢同調下治卒得屍疰毒痛徃来出聖惠方杏仁亂髪灰各等分右研如脂丸如梧子大每服酒下三丸日三一方猪膏和丸一方蜜丸治遁屍屍疰心腹及身有痛處不得近者出千金方右取艾小握令碎着痛上厚一寸餘熱湯和灰令强忍熱置艾上冷即易不過三二度瘥治屍疰邪氣右用狸骨頭骨最妙焼為灰酒服二錢亦主食野鳥獸肉物中毒腫腫再服之即瘥五月猪糞極神妙五月中勿食肉傷神治屍疰鬼疰腹痛右用鸛骨大寒亦可單用炙令黄末空心煖酒服方寸許似鵠而巢樹者為白鸛治屍疰出肘後方右焼髮如鷄子大為末水服之瘥治屍疰蜀椒熨方并治走疰出聖惠方右用蜀椒一斤帛裹於疰上以熨斗頻熨椒令熱汗發出神效死人席湯療屍疰損鼻或聞臭聲或見屍常發右取死人眠席斬棺内餘棄路者一虎口長三寸止此一物以水三升煮取一升為一服立效萬病丸治五勞七傷屍疰所侵心腹疼痛飲食不化兩脇膨脹皮膚攣縮等病逺志去心澤㵼石斛去根栢子仁别研雲母水飛石韋去毛杜仲去麄皮炙天雄炮製去皮臍牛膝去油酒浸切焙白茯苓去黒皮菖蒲山芋熟乾地黄焙續斷肉蓯蓉酒浸切焙乾薑炮甘菊花桂去麄皮五味子蛇床子炒山茱茰各半兩桔梗炒防風白术各一兩附子炮製去皮臍四枚天門冬去心焙一兩半細辛去苖華三分右為末煉蜜杵千下丸如梧桐子大每服二十丸空心温酒下春秋日再服夏季日一服冬季日三服如乆服即减天雄附子各一兩赤芍藥丸出聖惠方治五屍疰并諸屍鬼疰中惡心痛赤芍藥剉一兩呉茱萸湯浸焙乾炒丹砂研各半兩蜀椒去目閉口者炒去汗烏頭炮裂去皮臍各半兩乾薑炮三分桂去麄皮一兩右為末煉丸如小豆大每服十丸空腹温酒下日三丹砂丸出聖惠方治五屍疰痩病伏連諸鬼氣惡疰并傳屍勞乏鬼疰殗殜肌體羸痩丹砂研一兩麝香研三分桃仁湯浸去皮尖雙仁炒研七十二枚右各細研再和研匀入少蜜煉丸如小豆大每服十丸米飲下日三服忌生羊血物治屍疰腹痛痔痿出本草右以胡狸炙令香為末酒服二錢餘重者不過十服後即見騐治屍疰心痛及反胃右用田螺殻焼灰米飲下之傳屍復連殗殜附論夫傳屍復連殗殜者皆起於骨蒸遁屍故也此病多因臨死哭泣屍氣入腹連綿不已或三年至五年有能食不作肌膚或三日五日若微勞即發當頭額間骨節痛壯熱翕翕然死後家中更染一人如此相傳故右復連也方大金牙散治傳屍骨蒸肺痿殗殜及諸蠱毒疰忤鬼魅野狸虫蛇蜂蝎等毒或惡瘡腫瘤中卒心痛大小便不通心腹皷脹疫癘瘴毒積癖邪氣金牙曽青研飛雄黄研大黄剉炒丹砂研飛牛黄研凝水石煨研野葛皮龍骨朴硝研犀角鎊獺肝片切乾炙狸骨醋炙鸛骨炙黄各三分升麻一兩半附子去皮臍生用桂去麄皮鬼臼鬼督郵黄環青木香常山牡蠣煆研人參知母切焙徐長卿各半兩鬼箭羽桔梗炒代赭石莽草蜀漆當歸切焙白薇巴豆去皮心膜炒研露蜂房各一分蜀椒四十九粒去目及閉口炒汗出蜈蚣二條去足炙芫青去翅足炒斑猫去翅足炒亭長去翅足各二十一枚右搗研為散再和研細勿令穢汚觸犯并孝服人見當於净室中焚香宻盖之勿透氣如傳屍骨蒸殗殜疰癖冷氣積聚每服半錢熱湯調下日再病瘥即止仍以絳囊盛方寸匙帶之辟諸鬼氣如有諸邪氣病狂言妄見者帶二三錢若卒惡心痛疰忤喘滿蠱脹悶亂諸疾四服四錢米飲調下吐利為應若蛇虫毒瘡以津唾調傅之若瘟疫瘴癘服如前法若蠱毒咄吐即瘥若卒死中惡湯調一錢灌下即瘥卒中野道狐狸鬼魅壓邪毒眼不正視狂言者亦用湯化三錢未瘥更服若忽有惡瘡腫以湯和傅之日一易瘥即止獺肝金牙散治傳屍復連殗殜骨蒸痃癖冷氣五屍疰相染及蠱疰瘟瘧疰忤心痛卒死疫癘獺肝一具炙乾金牙研丹砂水飛研狸骨炙搗研牛黄研麝香研龍膽白薇附子炮裂去皮臍當歸水洗切焙乾蒲黄炒鬼督郵銅照鼻焼醋淬炒苦參龍骨研沙參蜈蚣炙去足蜀椒去目及閉口者炒出汗丹砂各半兩寒水石焼研硝石研禹餘粮焼紅醋淬元參牡丹皮鬼臼各一兩人參鱉甲去裙襴醋炒乾薑炮裂各一兩一分菴䕡三合右為細散再同研匀如粉每服一錢熟水調下空心夜臥各一服漸加至一錢半大黒虎丹出聖惠方治傳屍伏連及一切勞證不問冷熱大小冝服蛤蚧三對㣲炒蝦蟆一枚塗酥炙令黄丹砂五銖細研金箔五片細研銀箔五片研白鮮皮苦參三銖蛇蛻皮一兩微炙白狗糞一分㣲炒布巾子三年者六銖令炙黄金剛子三銖烏驢蹄三銖炙黄硫黄一銖細研雄黄一分細研天靈盖麝香一兩細研沉香一分甲香三銖微炙乳香二銖夜明沙六銖雄者兩頭尖人中白一分右搗羅為末更都研令匀用猪膽汁并軟飯和搗五七百杵丸如菉豆大每服藥先以新汲水一盞入少許麝香沙糖以藥十丸浸於露下但先用煎香湯浴後洩淡麵一小盞便和藥服了以衣被厚盖臥直候汗出若是傳屍虫白伏連虫赤皆背上出骨蒸則汗出並瘥獺肝丸治傳屍勞病并諸冷熱勞疾日月将乆面色萎黄漸漸羸痩獺肝一具生用柴胡去苖青蒿一握肉蓯蓉去皺皮酒内淹浸切焙二兩半黄連去鬚炒一兩黄耆剉二兩半知母木香地骨皮桃仁去皮尖雙仁炒附子炮裂去皮臍桂去粗皮天靈盖炙陳橘皮去白炒當歸切焙澤㵼生乾地黄焙各一兩甘草炙剉一兩㯽榔剉栢木脂研各一兩半右為末煉蜜和丸如梧桐子大每服空心酒下四十丸麝香飲治男子婦人傳屍骨蒸一切勞疾柴胡去苖剉一兩阿魏三分炒為末甘草如病人中指大剉青蒿桃枝栁枝金櫻枝各一握細剉薤白葱白各七莖切㯽榔一兩為末分作三帖右以童子小便四升宿浸諸藥於宻室内至更初煎煎時忌生人婦人等見并不祥之語取吉善之言以卜善惡之候又用刀一口放藥鐺上此藥通神冝加専志煎取一升半去滓下麝香一分研分作三服第一服入㯽榔末一帖頓服如人緩行三二里地二服亦下㯽榔末頓服眠時掩却鼻服纔了以白梅含之莫令心頭惡吐却藥須臾或吐必有物出或未吐如前更服第三服必吐㵼㵼下惡物并勞虫等不可名状或𤓰眼下并身上出如蟻其㵼下虫惟白色必愈餘色者難瘥纔吐㵼了便以薤白粥并輭飯補之仍如法将息烏鷄丸治傳屍勞疾屍疰骨蒸眼目昏澁面色青黒咽喉噎塞痰涕咳嗽或痃癖攻刺疼痛胷膈滿悶時或恚怒或多感傷情思不樂夢寐虚驚精藏滑泄失血冐寒潮熱盗汗肩背拘急腰膂肢莭煩疼四肢少力不喜飲食小便黄赤大便不調乍進乍退服攻藥後宜服此黄連去鬚附子炮製去皮臍各二兩柴胡去苗白附子生當歸切焙秦艽去苖土槐膠甘草炙剉續斷蓯蓉薄切酒浸焙逺志去心芭㦸天各一兩陳橘皮去白焙乳香研雄黄研丹砂研各半兩丁香乾薑炮各一分右搗極細先養烏雌鷄一隻以硫黄三兩為末分作三十分每日拌飯餵一月日用大麻子一升餵盡宰治去毛皮嘴爪并肚腸留心肝将前藥末入在鷄腹以麻線纒定再用無灰酒一斗銀石鍋内用文武火煮令鷄熟取出除去麄骨将鷄并腸内同細研更将鷄骨焙乾搗羅為末同研藥攪和入臼中搗千百下丸如梧桐子大每服二十丸以温酒吞下空心日午臨臥各一服犀角紫河車丸治傳屍勞服三月必平復其餘勞證只数服愈紫河車一具孩児胞衣是也米泔淹一宿洗净焙乾用鱉甲酥炙桔梗胡黄連芍藥大黄敗皷皮心醋炙貝母去心龍膽子黄藥子知母已上各二錢半廣茂犀角末芒硝各錢半硃砂二錢另研右為細末煉蜜丸如梧子大硃砂為衣每服二十丸酒下空心服蘓合香丸一名乞力伽丸療傳屍骨蒸殗殜肺痿疰忤鬼氣卒心痛霍亂吐痢時氣鬼魅瘴赤白暴痢月血閉痃癖疔腫驚癎鬼忤中人小児吐乳大人狐狸等病蘇合香油一兩入安息香膏内安息香二兩别研用無灰酒一升熬成膏麝香研白檀香香附子去毛訶梨勒煨取皮青木香丁香不見火沉香硃砂研水飛烏犀鎊白术蓽撥各二兩龍腦别研薫陸香别研各一兩右除研藥外餘并細末拌停用安息香膏并煉蜜和成劑每一丸鷄頭子大沸湯化下卒中惡昏不知及霍亂暴症心腹絞痛鬼疰客忤驚癎顛狂諸傷損氣暈欲絶此丸主倉卒之患悉皆治之如牙噤不能開者抉開口灌之如灌不下搐鼻灌即甦此藥隨身不可暫闕辟諸惡氣并禦山嵐瘴氣無以踰此若危急病尤不可無市肆疾取多用龍腦附子當於火土辟去能飲酒以酒調服若精神用過度夜睡不稳人參湯化服其功不在妙香散寕膏之下倉卒人參不得只白湯亦佳此藥安血氣却外邪凡病自内作不暁其名者服此徃徃得效兼治氣疰氣厥氣逆氣不和吐利榮衛阻隔尤有神效凡諸證暴亡之疾用之最健傷寒日乆形証危惡但心頭尚煖藥下即漸甦若大㵼氣欲脫目視天地皆轉神思已不理諸藥不效服此兩彈丸許神氣即輕爽㵼亦自止妙不可言有人嘔血甚乆遂奄奄而絶痩敗之甚足手甚冷鼻息欲絶計無從出惟研蘇合香丸灌之凡盡半兩即甦也一方無龍腦小麝香丸出千金方治傳屍骨蒸鬼疰百病風寒客轉經絡走疰疼痛乆不愈者及一切惡氣邪毒並皆治之麝香芥草炙犀角屑梔子仁各三分雄黄研當歸炒丹砂研各四分乾薑炮芍藥桂各五分巴豆五十枚去皮膜油七錢八分蜈蚣一條炙去頭足附子炮去皮臍各五枚一枚准半兩烏頭裂法並同上細辛五分右合搗千杵蜜和丸如小豆大每服三丸日三服可加至五丸温水下一方無當歸忌生葱生菜蘆笋猪肉冷水牛黄丸出聖惠方治傳屍惡疰復連痩病宜服牛黄半兩細研麝香一分細研人參半兩去蘆頭沉香三分丁香半兩木香三分胡黄連一分柴胡三分去蘆犀角屑三分枳殻三分麩炒微黄去穰桃仁一兩湯浸去皮尖雙仁炒鱉甲一兩醋炙令㣲黄去裙襴右搗羅為末入研了藥匀煉蜜和搗三二百杵丸如梧桐子大每於食前以粥飲下二十丸忌莧菜麝香散治男子婦人傳屍骨蒸冷熱五勞麝香研半兩甘草如病人中指長男左女右東引桃枝青蒿東引栁枝石榴皮犀角鎊半兩阿魏柴胡䓤白薤白各七莖右除麝香外剉碎同用童子小便二升半浸一宿别入㯽榔末三錢同煎至一升半温分三服男病女煎女病男煎勿令孕婦六畜見初服訖如人行五里又進一服恐惡心可含白梅病在上即吐在下即瀉各出惡物如虫類及頭髮馬尾状兼身上如蟻行㵼後以葱粥及輭飯補之仍服後方茯神湯和調五臟避風一月若逺年重病不過兩劑其吐下虫如紅色者可治黒色者或瘥或否白色者不可治茯神湯治傳屍骨蒸先服麝香散取虫後補五臟茯神去木人參逺志去心甘草炙剉龍腦陳橘皮去白焙熟乾地黄焙各一兩五味子一兩半麥門冬去心焙桂去麄皮各一兩半黄耆剉二兩當歸切焙一兩右麄搗篩每服五錢水二盞入􅀥七枚擘破生姜五片煎至一盞去滓空心温服日三療痩病伏連傳屍鬼氣疰忤惡氣方一名斑猫散出聖惠方斑猫去頭足熬射干根各四分石膽七分别研桂心牛黄各二分别研犀角三分生者屑人參三分生蜥蜴一枚炙紫石七分别研蜈蚣四寸炙麝香少許别研右研為細末相和每日空腹服一寸匙日三服用井花水二合温即頓服勿臨吃與白米粥吃如覺小便澁好如合藥勿使婦人小児狗見忌熱麵果子五辛酒肉生血生葱一方加甘草真硃丸一名獺肝丸出聖惠方治傳屍骨蒸欬嗽上氣痰喘寒熱四肢痩弱真硃末獺肝炙乾茯神貝母去心柴胡去蘆龍膽草黄連去鬚赤芍藥各一兩半白㯽榔煨剉旋覆花各一兩右為末煉蜜和丸如梧桐子大每服十五丸食後温漿水下日再一方有川大黄以温水下三十丸黒虎丹出聖惠方治傳屍骨蒸勞乾蝦蟆一枚去頭足為二各一半将一半熟炙黄者蛤蚧一對各取一半泥塗和炙黄蘆㑹研天靈盖酥炙白狗糞炒黄雄黄研各一分麝香一分研烏驢頭炙乾一兩乳香研一兩半猪膽一枚取汁於碗中慢火煨如膏和藥右搗研九味為末合研匀細以猪膽膏同粟米飯和丸如梧桐子大先吃熱麵一碗次以芽香水沭浴次以沙糖麝香少許調次冷水一盞投藥一丸於星月下浸一宿平旦空腹服之厚被盖臥若是傳冷勞者脊骨中出白虫或出赤虫若骨蒸勞則汗出腰脚疼痛不遂脚下出汗如膠漆諸風氣水病並服一粒瘥小児患此可服半粒如前法有虫出鼻内如線状是效騐之至麝香丸出聖惠方治骨蒸傳屍勞痩鬼氣復連麝香三分研犀角鎊鬼箭羽木香各一兩白术㣲煨一兩虎頭骨醋炙天靈盖醋炙雄黄研桃仁湯浸去皮尖雙仁炒研丹砂各一兩半右為末和匀煉蜜丸如梧桐子大每服十丸愈以醋湯下日二凡瘟疫病亦可帶之一方清粥飲下二十丸地黄湯治復連傳屍骨蒸等病生乾地黄酒洗切焙二兩半續斷桔梗炒各一兩半五味子一兩半紫苑去苗土甘草炙剉羚羊角鎊各半兩肉蓯蓉酒浸切焙桑根白皮炙剉各一兩赤小豆一合右麄搗篩每服五錢以水一盞半入竹茹彈子大煎至一盞去滓温服空心食後各一服服後若渇唇口乾加麥門冬去心地骨皮各半兩阿魏丸治傳屍屍疰心神錯亂狂言驚悸夢與鬼交病熱逐莭改變阿魏醋化去沙石麵和作餅炙半兩安息香酒浸研如粉一兩甘草炙剉木香㯽榔剉各半兩䜴一合炒猪牙皂角十四挺去皮子冷醋炙天靈盖醋炙麝香研人中白研各一兩右為末煉蜜和丸如桐子大用童子小便浸烏梅三枚并葱白三莖切同煎下二十丸五更初服桃仁丸出聖惠方治傳屍骨蒸復連殗殜氣欬嗽冝服桃仁一兩半湯浸去皮尖雙仁微炒猪牙皂莢半兩塗醋炙令微黄紫苑三分去苖土鱉甲一兩半塗醋炙㣲黄去裙襴芫花根一兩甜葶藶一兩炒令微黄白礬三分焼令汁盡蛤蚧一對塗醋炙令㣲黄麝香一分細研入右搗羅為末煉蜜和搗一二百杵如梧桐子大每服不計時候以清粥飲下二十丸陳麴丸治傳屍多服冷藥旬月未愈或損脾臟致食少難消氣滿兼利温脾陳麴末炙令黄色五兩白术一兩附子炮裂去皮臍三両枳殻去穰麩炒令黄色一両甘草炙剉乾姜炮裂人參各二兩呉茱茰水净洗焙乾炒桔梗炒各一兩右為細末煉蜜為丸如梧桐子大每日空心米飲下二十丸夜臥再服漸加至三十丸紫苑湯一名續㫁散出衞生寳鑑治傳屍骨蒸復連殗殜肺氣欬嗽紫苑去苖土桑根白皮炙剉桔梗炒續斷各一兩半赤小豆一合甘草炙剉五味子各一兩生乾地黄酒浸切焙二両半右麄搗篩每服五錢水一盞半入青竹茹弹子大煎至一盞去滓食後温服良乆再服若熱甚加麥門冬去心一兩石膏一兩半一方入小麥二十粒桃仁湯出聖惠方治傳屍復連病本因極熱熱氣相易續不斷遂名伏連鬼氣亦名骨蒸傳屍發即四肢無力日漸黄痩不能飲食乍惡乍好桃仁湯浸去皮尖雙仁炒三兩重研一方用桃奴鬼箭羽赤芍藥人參陳橘皮去白焙各二兩白茯苓去黒皮三両一方作茯苓白㯽榔剉一兩麝香研三分右粗搗篩六味入桃仁和内每服五錢以水一盞半生薑三片拍碎煎至一盞去滓入麝香末一捻空腹温服良乆再服忌火醋生冷五辛桃枝飲治一切鬼氣邪氣傳屍復連骨蒸桃枝栁枝各一握細剉取東南枝豉半兩葱白三莖細研童子小便一升地膽一錢為末蜀椒去目及閉口者炒去汗半兩生薑細切一兩右麄篩五味與姜豉和匀用童子小便一升浸一宿至四更煎取半升去滓分二服五更初一服鷄鳴時一服服後汗出慎風仍取米粉摩身上若或微利即愈隔日再服重者不過三劑天靈盖丸治傳屍天靈盖如無即骷髅骨有十字縫者取中心一片以牙香湯洗以安息香酒塗炙黄色紫河車一枚頭首生児孩衣胞是也於石上用新草鞋踏洗令净控乾以麝香一兩摻拌令匀入餅以泥固臍如法火煆通赤留性勿煆過石蜥蜴一條和腸臟醋炙黄令冷乾獺肝一具薄切於瓦上焙乾赤足蜈蚣一條酒浸炙焦黄鷹糞半合金線蝦蟆端午日収者以醋炙令黄用頭蛤蚧一對酥炙令黄只取頭尾用右為細末以醋煮猪膽令熱成膏和搜為丸如梧桐子大以槐花版青各一錢研為末熟絹篩過藥衣令黄色每服四十丸温煎生薑湯下初更一服二更初再一服獺肝丸治傳屍病遁疰骨蒸伏連殗殜此病多因臨屍哭泣屍氣入腹連綿或三年五年有能食不長肌膚或三日五日有㣲勞即發大都當額頭間骨尋常熱熻熻然死後家中更易一人如此乃至滅門獺肝一枚令炙乾鱉甲一枚去裙襴醋浸炙黄野狐骨用頭骨一枚令炙黄色防己一兩半紫苑去苗圡蜀漆葉