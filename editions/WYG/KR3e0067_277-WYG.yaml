body:
  text: 普濟方卷二百七十七明周王朱橚撰諸瘡腫門漆瘡附論夫漆雖有毒性有所畏毒即中之亦有氣適然相近者中毒有輕者痒始於面而胷臂􅀈腨應之頭面腫起赤遶於目搔之隨手生㾦㿔已而細瘡如粟重則徧身作瘡小如麻豆大如棗李腫焮痛楚旋瘥旋發如火炳之狀是也此疾雖有小着徧身頭面似􅂒瘷乳腫生瘡痛痒毛髪脫落心煩恍惚不得眠睡因療之遲遂為他疾或便成風癩亦可畏也方四和膏方出聖恵方治漆瘡遍身焮赤疼痛麻油松脂各二兩黄蠟桂去麄皮為末各一兩右同熬成膏塗之黄松末湯洗方出聖濟總録治漆瘡黄櫨一斤鹽二兩右以水一斗煮取五升去滓洗之日三五度治漆瘡方出聖恵方以生柳葉三觔細切用水一斗五升煮取七升適寒温洗之日三老柳皮尤妙又方出千金方以濃煮䑕查葉以洗漆瘡亦可搗葉取汁塗之尤妙又方出千金方以爛搗七姑草封之一云七姑草和芒硝塗之無芒硝即朴硝最妙韭熨之效又方出千金方以貫衆為末以塗瘡上乾以油和之即愈又方出千金方以羊乳汁塗之又方出千金方以芒硝五兩湯浸洗之一方以水塗之又方出聖恵方以礬石着湯中令消洗之又方出千金方以噉豬肉嚼穄殻塗之又方出百一選方以榖精草煎湯放温洗立效收稻了田間生矮根株成株叢生如鼓槌而小者又方出百一選方以生薑汁擦亦得又方用煎杉木水洗即安數數用即除小兒尤佳治漆瘡面腫用大粟葉煎洗挹乾以香油塗之鐵漿方出聖濟總録治漆毒傷人以鐵漿濾隨量飲之以瘥為度或用鐵漿洗之豬膏塗方出聖濟總録以豬膏五兩熬去滓停塗之蟹黄塗方出肘後方治漆瘡以螃蟹取黄塗敷瘡上日三五度或以水洗之取水數數洗亦效蜀椒湯洗方出聖惠方治漆瘡以蜀椒去目及閉口者一兩用水五升煎至三升去滓熱洗瘡上後嚼生糯米敷之荷葉湯洗方出肘後方治漆瘡以荷葉燥者一觔以水一斗煎取三升洗了以貫衆末摻之乾則以油和塗薤汁塗方出肘後方治漆瘡以薤搗取汁塗之煮薤葉洗亦佳地松塗方治漆瘡以地松一兩搗汁二合入芒硝一分和塗之雞子塗方出肘後方治漆瘡以雞子黄一枚塗瘡上乾則易之不過三次治漆瘡出聖惠方以水煎黄櫨湯頻浸洗一云用汁煎洗最良一方入生油調塗立當退下瘡皮痛止也又方出聖濟總録以糯米生研塗之治漆咬出肘後方用韭葉研敷之一云搗韭和塗之煮薤葉洗之佳治漆瘡以五月五日採苦芙㣲曝乾作灰可敷面目通身漆瘡亦取莖生食之但不可多食之爾又方出直指方以臘茶用麻油調塗之又方出危氏方以磨鐵槽中泥塗之磨刀石下泥亦得蕪湖二漆牙相争其人以漆一桶自頭澆之其人患瘡㡬死以此方治之而愈又方以蓬莪术貫衆煎湯洗之又方以莧菜根煎湯洗之如無便清油搽亦可療卒得漆瘡方以煮香薷漬洗之又方以嚼秣米塗之又方以造酒小麯搗末粉之乾即以雞子白和塗之良又方以挼慎火草若雞腸草塗之七姑草亦佳又方以鹽湯頻洗之大良又方以馬尿洗之瘥止又方出傳信適用方以芸薹葉或用子搗汁塗之又方出聖惠方以青椒半兩醋醤一碗印成鹽五顆煎七沸以綿蘸塗之又方出聖恵方以蛤粉用新汲水調塗之又方出聖惠方以油麻子搗令極爛以蔓菁菜汁調塗之又方出聖惠方以槲樹皮一觔細剉以水一斗煎至六升温温洗之又方出聖惠方以櫸樹枝葉二觔細剉以水一斗煮取六升淋洗瘡上兼以葉搗絞取汁塗之治漆瘡出本草以糞藍煎湯洗之治漆瘡出本草以赤𤓰煮汁洗瘡效治漆瘡出本草以好井水及土石間新出泉水飲之一方洗之即愈治漆瘡出本草以漢椒湯洗之即愈治漆瘡出本草用蚯蚓破之去泥以鹽塗之化成水敷之即效湯火瘡附論夫水火之氣當因其勢而利導之湯火誤傷毒熱方熾通導而泄其氣可也茍救目前痛楚遽以冷物淋搨則熱毒畏寒而内搏致有爛骨傷筋之患非熱氣本然也湯火之傷本非血氣所生之病故治不及於湯藥特在乎塗敷膏浴專治其外而已凡火燒慎勿以冷水淋之火瘡得冷熱氣更深轉入骨壞人筋骨難瘥初被火燒急向火更炙雖火痛難忍一食之久即不痛神效治火燒悶絶不識人以新尿冷飲之及冷水和蜜飲之口噤校開與之然後以下方治之方治湯火藥大黄黄芩黄栢黄連知母貝母乳香沒藥輕粉甘草蜜陀僧山梔子右碾為細末用雞子青加蜜調擦不住手掃一時無事本方無等分臘䑕膏出聖濟總録治湯火瘡除熱㓕瘢臘鼠大䑕連毛一枚研丹研半兩琥珀研半兩乳香研盧會研石螺殻車螯殻蛤蜊殻各一兩右除䑕外搗羅為末用清油一觔黄蠟并臘月羊脂豬脂各四兩并䑕入銀石器内同熬濃去滓次入麝香珍珠末各一分調勻盛甆瓶内蜜封沉於井中二七日欲急用只少頃取上用鵞毛掃五七次立愈治中熱油及火燒除痛出本草以楓桞白皮燒為末敷之兼治炙瘡亦同妙治湯火瘡出本草用鉛丹敷之治火燒瘡令不着風水止血除賊風出本草以烏氊燒為灰酒下二錢七珍散治湯火瘡痛不可忍木鱉二錢去油大黄黄連黄芩黄栢􅉱金各二兩梔子仁三錢右為細末小油調掃瘡上如聖散治湯火所傷方見本門諸瘡腫類清涼膏出聖惠方治湯潑火燒止疼痛解火毒潤肌生肉梔子仁黄連去鬚切白芷各一分生地黄二兩葱白十枚擘黄蠟半兩清麻油四兩右細剉於油鐺中煎以地黄焦黑為度綿濾去滓澄清却於鐺内入蠟漫火熬候蠟消傾於磁合内每使時用雞翎掃少許塗瘡上取瘥為度治湯火瘡出千金方栢白皮蛇㘅生地黄梔子仁黄芩苦竹葉各一分右㕮咀以羊髓半升煎三上三下去滓塗瘥止麻子膏療火燒人肉壊爛麻子二合取仁碎栢白皮山梔子碎白芷甘草桞白皮各一兩右㕮咀以猪脂一觔煎三上三下去滓以塗瘡上日三治湯沃人肉壊爛出千金方杏仁附子三兩甘草一兩羊脂五兩松脂雞子大右㕮咀以不下水猪膏五兩煎塗之四黄散出楊氏家藏方治湯潑火燒熱瘡腫痛大黄黄連黄蘗黄芩白芨各等分右為末水調成膏用雞翎時塗瘡上水霜散出濟生㧞粹方治火燎損傷漆熱毒傷皮爛肉大痛牡蠣燒明朴硝寒水石生青黛各一兩輕粉少許右為細末新水調次油調乾貼痛處立止神效黄栢散出危氏方治湯火傷雞子殻黄栢樹皮朴硝大黄寒水石各等分右為末白水調塗極效治湯火瘡管仲大黄寒水石知母黑狗脊各等分右為細末有膿者乾摻無膿者小油調敷又方出聖恵方蓮子草梔子黄芩胡粉栢葉各一兩右為細末以羊髓和搗稀稠日可三度以翎羽塗之此方去毒止痛無瘢㾗甚妙止痛膏出聖恵方治炙及湯火所損晝夜啼呼止痛滅瘢羊脂松脂各二分猪膏蠟各二分右取松脂破銚中切脂嚼蠟着松明上少頃銚火燒諸物皆消以盃承汁敷之松明是把松本節也治湯火瘡出徳生堂用厨房下溝泥塗治湯火瘡出危氏方黄連黄栢輕粉各等分朴硝少許右為末入清油用合子合住飯上蒸調塗立愈治火瘡方出千金方梔子四十枚白斂黄芩各五兩右㕮咀以水五升油一觔合煎令水氣歇去滓待冷以淋之令溜去熱火毒則肌得寛也作二日任意用膏敷湯散治之治火爛瘡膏出千金方竹葉甘草各二兩栢白皮四兩右㕮咀以猪脂一觔半煎三上三下去滓泠以敷之集驗方用生地黄四兩神效當歸膏一名白膏方出聖惠方治湯火傷初起瘭漿毒侵展焮赤痛毒氣壅成腐爛成膿斂瘡口生肌肉拔熱毒止疼痛當歸黄蠟各一兩麻油四兩右先將油煎令當歸焦黑去滓入黄蠟急攪之放冷入磁合内每使時用帛子攤貼之一方有白蠟栢葉散出聖濟總録治湯火所傷栢葉焙梔子仁各一兩胡粉研半兩右搗研為末以羊髓五大合鎔銷和藥以木為研三五百遍一日三次塗之瘥赤石脂散出聖驗良方治湯火所傷赤爛熱痛赤石脂寒水石大黄各等分右為末以新汲水調塗傷處神聖散治湯火所傷杏仁炒焦出衣粉子炒黄色牛糞燒灰右各等分為細末冷水調用翎毛掃之一方用香油塗治湯潑火傷出聖惠方黄丹一分黄連末一錢㣲炒㯽榔一枚細剉㣲炒搗作末右為末相為合匀先以鹽水洗浄然後以散敷於瘡上止痛散出聖惠方治火燒瘡桃膠松脂黄蘖各半兩右為細散用梨汁生蜜調塗瘥換肌散出楊氏家藏方治湯火傷疼痛不可忍洗麵脚三兩炒黄色白葉一兩炒黄色右為細末用清麻油調稀翎毛揾藥拂傷處疼痛立止又方出聖恵方􅈪樹上楸葉半觔濕者猫兒毛一兩蠟半兩右以油煎二味令焦濾去滓下蠟令消收於不津器中先以温水洗瘡後用藥塗之治湯燙方出百一選方韶粉四兩臘脂一觔右用桞木槌於净器中研千下净瓶器收之遇燒盪即敷上痛立止無瘢痕止痛膏出聖濟總録治湯火所傷皮肉未破爛只熱痛者塗敷朴硝研一兩爐星灰是火炭爐内火正盛時退却火取熱灰放冷細絹篩取三兩右和勻冷水調如糊塗所傷處頻換即瘥立應膏出聖濟總録治湯火所傷皮肉已破爛者生栢葉焙乾二兩糯米焙乾三兩右為細末冷水調如糊塗腫處頻換即瘥龍泉散出聖濟總録治湯火盪燒熱焮腫井泉石赤白脂各等分右研為細散油調塗薤葉膏出聖濟總録治湯火所傷熱痛用之永無瘢癤薤葉半和白用赤石脂各一兩右搗研如泥敷瘡上新瓦散出聖濟總録治湯火所傷新瓦煆醋淬二七遍使過錬銀鍋子煆醋淬二十遍各五兩右搗研為散生油調敷梔子散出聖濟總録治湯火所傷梔子仁白礬灰右等分搗羅為散用黄膠熬膏塗之又方用搗薤子塗之立效拔毒膏出聖濟總録治湯火所傷鉛丹炒過蛤粉研右不拘多少合研如桃花色為度生油調作膏濕紙壓乾攤貼治湯火燒毒氣入腹即殺人宜速去之出聖濟總録白藊豆生末白膩各二錢右同研熱水調服當㵼出毒小兒半服治湯火所傷神妙出仁存妙􅒝麻子蛤粉右為末研膏湯損用油調塗火瘡用水調塗雞黄膏治湯火所傷熟雞子十箇取黄炒膩粉十文右攪勻用雞翎掃瘡上永除瘢痕治湯火灼未成瘡黍米麯等分為末右各熬令赤以雞子白和敷之一方用女麴大黄寒水散治湯火瘡大黄一兩生寒水石半兩右為細末清油調掃燒破處治湯火破瘡出聖恵方川大黄栢白皮等分量右為末以生地黄汁調塗之治火燒瘡急痛出聖恵方梔子二兩燒灰細研桞白皮二斤切以猪脂二觔於鐺内緩火煎桞白皮焦黄去滓入梔子灰攪令匀成膏待經宿即用塗之治火燒瘡猪毛土糞各等分右並燒灰細研以生油調塗效又方出聖惠方寒節白麵半匙梔子仁一兩右為細末與麵相和以新汲水調塗之䑕膏塗敷方出聖惠方治火燒瘡及炙瘡不瘥痛不可忍以死䑕頭一枚用臘月猪膏煎令消盡以敷之乾再敷之瘥不瘢痕神效亦治小兒火瘡治火瘡敗壊及中熱油方以栢白皮切以臘月猪膏合淹相得煮四五沸色變去滓敷瘡上一云栢白皮末一觔以水五升濾去滓熬成膏塗之即愈又方出千金方以榆白皮嚼塗之治湯火方出儒門事親以多年廟上􅀈與走獸為末小油調塗湯火處立效又方出儒門事親以牆上青苔燒灰小油調塗燒湯處又方出儒門事親以生地黄旋取新者爛搗取自然汁小油黄蠟少許銀石器中熬成膏子用雞翎掃瘡上治湯火盪瘡無問新舊出瘡料精要以青槐枝一兩剉碎入菉豆粉一兩同炒黄色入輕粉一錢同為細末油調塗之止痛㓕毒又方出儒門事親以血餘灰臘月猪脂調塗之凡被湯火熱油痛不可忍方出外科精要取廨下黑淤泥量傷大小用多少加老薑汁麻油十分之一共研勻搽傷處即愈一方以渠中青泥塗之又方出聖惠方以尿桶下濃脚搽傷處又方出外科精要以雄䑕糞兩頭尖者是燒存性麻油輕粉塗即愈已上皆處處有之仍有竒妙治中熱油及火燒除外痛出聖惠方以丹參八兩細剉以水調取羊脂二觔煎三上三下以敷瘡上愈治湯燙火燒出海上名方用湯瓶中堿不以多少細研入膩粉少許用麻油調塗之又方出海上名方取淋過灰滓以水調得所即時攤於燒燙處半寸許立效又方出海上名方取舊煎銀爐中燒過焦黄土研細如粉以生蜜調攤於帛上貼之瘥即止或用前金銀鍊鍋唯是出火次數多者為上纔被傷即以冷水急於石上磨汁重重塗敷不見赤痕即止任其自乾剥落是驗其間不要有一㸃如星許偶塗敷不到輙起紅泡糜爛經月不瘥以此知此方神效也又方出海上名方以淡竹末用新水調塗之治湯火瘡出十便良方以竈中土篩細以新汲水調敷即瘥一方以甘草末調塗之又方出仁存方用臘月猪脂調光粉研極細令勻敷又方出醫方集成用螺螄殻多少乾白者火煆為末如瘡破用乾藥摻之如不破入輕粉清油調敷之治惡瘡尤妙治湯火所傷出醫方集成用大黄當歸各等分為末以清油調傅之濕則須乾摻又方出得生堂以杉木皮燒灰存性為末濕用乾摻乾則用鷄子清調塗一云用刮杉木皮乾掺之乾用清油調搽之即愈治湯盪火燒已潰膿出不已者熱毒疼悶神効出百一選方先以梔子煎湯放溫洗净􅂒乾以赤焦大油餅炭上燒灰存性研細傅之一方用山梔子細研鷄子清調傅亦可鵝毛輕拂上立便冷如水少愈即用升麻炒乾研末冷水調敷又方出聖惠方用大黄為細末以米醋調傅或倉卒不能得末只於新净甆器上以醋磨傅亦可一方用蜜調和或冷水調塗治湯火傷出百一選方以苦枤碾為細末清麻油調塗之即愈仍無瘢痕舊迹又方出百一選方用無名異末輕粉油調敷之如破乾摻或用黄柏水調立愈治湯火盪方出百一選方以炊布燒灰存性随消不半日而愈盖炊布受湯上氣多反可用以出湯火毒猶以鹽水取醎味耳醫者皆知亦甚可喜昔張徳俊云項年和倅餘杭人将赴官因蒸澤其木犀香自開甑上為熱氣所薫靣即浮腫口眼為之閉更數醫不能治最一醫云古無此證請以意療之於是取僧寺久用炊布以此法治之即愈又方以冷麵糊塗之舊爛者尤佳又方出百一選方用白甆器末湯煑過碾極細以油調塗立効或用煉銀器鍋子搗為細末調塗之亦可治湯盪方出百一選方以葱白沙糖二味相等爛研敷之痛立止仍無瘢痕又方出百一選方初燒燙着只用醋糟􅀈之不痛即止倉猝中若得酸醋洗之尤妙不腫痛蛤蜊散出衛生家寳治湯燙火燒瘡以蛤蜊殻不拘多少炙焦黄色搗羅為散以生油調如膏敷之如水冷仍無痕一方用蜜水調敷之痛立止不膿不瘕吳内翰居鄉中鄰家金翻一小兒自頭至踵皆傷急以敷之啼立止遂無恙此藥唯纔傷便隨手用即效少緩即不及當預合下苦參散出衛生寳鑑治湯燙火燒瘡以苦參不拘多少為散新水調如膏塗之一方用油調搽神須散出聖濟總録治火湯燒傷熱毒瘡癤以赤石脂研為散生油調塗之濕則摻或雞子青調敷𤣥精石散出聖濟總録治湯火傷疼痛不可忍以太隂𤣥精石不拘多少鍋子内大火煅用紙襯於地坑内出火毒一宿研細散看多少用冷水調雞翎掃之疼痛立止黑神散出百一選方治火湯所傷以白麵不拘多少炒令焦黑以紙傾在地上出火毒候冷取研細每用一匙頭新水調塗患處熱痛立止一方用生油調敷清浄膏出聖濟總録治湯火所傷以生山蕷不拘多少去皮爛研成膏塗在上疼痛立止不成瘢痕定痛膏出聖濟總録治火燒湯盪以菉豆不拘多少炒令㣲焦研細以生油調塗瘡上痛立止成已散出聖濟總録治火燒瘡以乾牛糞燒灰細研生油調塗一方烏牛糞燒灰和脂調塗臘脂塗方出聖濟總録治湯火所傷以臘月猪脾脂不得經水細剉用乾净器研爛净瓶盛之以油單盖埋幽隂地近水處深一尺許經夏取出用時以鵝毛掃所損處治大人小兒把火炭爛手方出聖濟總録以䑕一枚用烏麻油鐺中煎盡取脂塗瘡又方出聖惠方以酪塗之乾即易治湯火瘡出聖濟總録以大豆煎濃汁塗之乾即易經宿一方用黑豆治火燒瘡止痛令無瘢痕出海上名方以釅醋傾浄地上磨取醋泥敷之昔有人抱孩子擁爐不覺落火上以醋泥敷之至晚不痛亦無瘢痕治湯瘡以牧乳油煎令消入蠟敷之治火瘡敗壊出肘後方以雲母粉同生羊脂和搗如泥塗之一方用糊粉調塗治沸湯火燒爛瘡以杵生胡麻如泥厚封之治湯火瘡毒用沸甲草爛研如膏貼之湯火燒破瘡出肘後方取兎腹下白毛燒膠以塗毛上貼瘡待毛落瘥治火燒瘡出肘後方以燒胡桃穰令黑杵如脂敷瘡上治湯火燒未成瘡出聖惠方取豆醤汁敷之治湯火瘡用槐皮煎膏貼之止痛長肉及消癰腫湯洗亦可治湯火灼已成瘡及中熱油燒外痛出聖惠方以白蜜塗之又以竹中白膜貼上三度一方生蜜塗之效治湯火瘡未起出千金方以梔子仁燒灰麻油和封之厚乃佳已成瘡燒白糖灰粉之燥即瘥一方用熬麫和塗治火瘡滅瘢方以赤地利二兩𢷬末生油調敷之治湯火瘡出肘後方以白膠用水煎膠令稀稠得所待冷塗瘡上又方以烏古瓦取土底深者既古且潤三角者用為末敷之一方水磨塗之又方出肘後方用濕牛糞敷之痛立止常自良方一以新熱牛糞塗之一以雞子白調敷治熱油湯火燒痛不可忍出聖恵方取狗毛細剪以烊膠和毛敷之瘡漸瘥比至痂落亦不痛一作牛皮膠昔吳内翰家婢夜炊米釡翻傷腿膝以夜不敢白比曉已潰爛用此治之而愈又方取石膏搗末細研用粉瘡愈治湯火灼瘡痛不可忍出肘後方用石灰細篩水調塗之乾即易一方銚子内炒令黄放地上出毒生油塗一方煅令通赤水油調亦好不煅亦得紫雪出百一選方治湯盪火燒痛不可忍或潰爛或惡瘡用松樹皮燒灰二錢瀝青一分研為細末清油調敷濕乾摻忌冷水洗日三一方不用瀝青以松樹皮乾為細末入輕粉少許生油調稀敷如不住紗絹帛縳定即生痂神效又方出傳信適用方以芭蕉水雞翎掃之又方出聖惠方以好酒浸洗傷處良久痛止無痕治火炙以百合根浸酒空腹飲之治湯火所傷未成瘡出聖惠方取苽蔣根燒灰用雞子黄和封之一方用雞子白調亦可治大人小兒湯火燒瘡出百一選方以栢葉入臼中濕擣令極爛如泥冷水調作膏敷傷處用帛子繫定三兩日瘡當斂仍滅瘢一用燒灰存性為末雞子清調敷如乾再上可用蜜調亦可或搗末以脂和塗瘡上乾即易一方以山栢子葉爛搗塗瘡治湯火灼令不痛又速愈瑕痕出本草以人津和鷹屎白日敷上痕自落亦用蜜和之又方出經驗良方用糯米一合炒令透骨焦黑放地上出火毒研為細末用水調搽用雞子清調亦可愈後無痕一方猪脂調亦可又方出經驗良方用芝麻不拘多少炒存性研為末清油調隔宿敷上不痛亦無痕瘢毛髮再生一方生擂爛敷之亦佳又方出經驗良方用燒牛骨灰重羅過或雞子清調敷水亦可又方出經驗良方用大黄苦杖焙為末清油調塗又方出經驗良方用金櫻子樹根水洗去泥土磁瓦片刮根上皮擂爛不問皮破生泡並可塗如乾再塗定痛不生疤瘢一方用葉燒灰去火氣小油調塗或研爛入鹽敷之又方出聖惠方以新汲井水一盞清油一盞攪匀稀稠得所塗患處隠士裴心傳一方調蜜漿飲之又方出經驗良方以稗草灰水調塗已破者乾貼又方出經驗良方以燒羊糞灰醋調塗又方出經驗良方用羊脛炭即小硬炭燒赤為末蜜調塗新水散出百一選方治湯火以蒻乾者燒灰得生堂方小油調塗如乾新汲水調塗煮酒瓶頭蒻尤妙乃大尖竹葉是也又方出經驗良方一名降虐散治湯火瘡用霜後芙蓉桑葉等分隂乾為末蜜調塗敷之如濕乾摻經驗方陳氏曰余在淳安設焦炷香爐中偶白膠香滚起沾拈痛不可忍便成泡偶得此藥敷之痛止又方出經驗良方用柳白皮栢皮爛研敷之乾則再敷極能定痛去火毒更無疤痕又方用楊梅皮不拘多少去麄皮碨成末瓦器内熬成濃汁以子成起如遇用時鵝毛塗患處立愈不生痂痕又方削生梨肉貼之能止痛易瘥治湯火傷未成瘡者用小麥炒黑為度研為末膩粉減半油調塗之治火燒瘡用炭皮為末摻上如神雞黄油一名至聖膏治湯火燒用雞子煮熟去白用黄放銀石鍋内炒乾待俱化成油去火毒毛翎掃上即時痛止且無瘢痕入韶粉尤佳一方夜明沙等分為末香油調敷濕乾摻一方用生白塗絶妙一方用殻燒灰麻油調敷之又方以牡蠣火煅研成粉用夜明沙等分為末香油調敷濕則乾敷治烘方用飛羅麵一兩鹽三錢蜜調稀稠得所敷貼甚妙不犯火湯火傷及治一切毒腫用大黄朴硝等分為末新汲水調塗痛止無瘢痕及敷腫處妙又方用臘月猪脂炒石灰敷之亦妙又方用櫸樹皮搗汁敷之治湯火瘡用湯退猪毛帶黑皮用麥麩炒過二味研為細末用清油調塗治湯火瘡用山茶花用瓶盛貯作煉膏敷上湯火燒不問男女老㓜大小皆治用蕎麥麵不以多少炒黄色井花水調掃攤貼如神治湯火瘡敷方以劉寄奴不拘多少為末先以糯米漿雞翎掃傷處然後摻藥並不痛亦無痕大凡湯著急以醋調茶鹽末塗之護肉不壊然後用别藥敷之妙治湯火灼爛用白歛栢敷之䑕油膏治湯燙火燒瘡用香油一觔大䑕二箇去皮腸同油内煎熱濾去滓每用時鵝毛蘸藥搽患處治湯向火灼成瘡以桞皮燒灰以粉塗之一方無粉以猪脂生煎桞白皮取汁塗之栢皮彌佳一方蜜和塗之治人向火生火斑成瘡有汁及治火氣入瘡用黄栢皮薄荷花末摻之即愈一方用黄栢皮為末摻之立愈薄荷煎塗亦可治燒燙方用木炭搗羅為末每用不拘多少小油調如稀麵糊用雞翎蘸藥掃患處治湯火傷以烏賊魚骨灰煅為末水調敷保生救苦散治火燒或熱油燒湯火脫肌肉及諸瘡血不止如神上此藥瘡變黑色藥力盡却變紅和也用生寒水石不計多少為細末油調塗或乾用貼之立效應驗方名救苦湯治刀斧及狗咬湯傷不可忍者或用水調塗之亦可乾上痛立止與無瘡同不作膿無分苦楚日近完復永無破傷風證療湯火所灼未成瘡者取煖熱灰以水和急急爾以敷之亦以灰汁洗之又方以苦酒和雄黄塗之又方以猪膏和米粉塗之日五六過良肘後同此一方既令不痛又使速愈又無瘢痕已試有效救急療湯火瘡無問大小秘要方出十便良方取粟熬令焦黑投水中攪之良久濾取汁重煎如糊以塗瘡上並滅瘢又方出聖惠方取黍米煮粥和雞子白敷瘡上良療湯火爛方取商陸根𢷬末以粉瘡上療火油及天火瘡初出似沸子漸漸大如水泡似火燒瘡赤色熱翕須臾浸淫漸多急速者是也方以芸薹菜不限多少擣絞取汁芒硝大黄生鍼汞各等分𢷬大黄末相和芒硝等以芸薹汁調如稀糊以禿筆㸃藥敷瘡上乾即再㸃頻用極有效閻師云芸薹冬月煮取汁洗亦可又療卒被火燒苦劇悶絶不識人方出十便良方取新煮小便飲一升及冷水和蜜飲之口噤不開者可拗開灌之其悶瘥然後療外乃喜千金古今録驗崔氏小品同又治湯火傷出百一選方用紫桑椹子擣爛收之以塗傷處如藥乾入臘月水浸之一方用桑椹子塗之一方收桑椹法以凈瓶收之久自成水以雞翎掃敷之又方出徳生堂以燒馬糞敷上即愈又方以黄蜀葵花乾為末井花水調敷之又方以冬青樹嫩頭𢷬爛取汁敷患處即愈治火燒瘡以白瞎莿葉潄口嚼細盫又用蝦蟇竹根搗汁刷查盫患處取瘡口柿捍兒皮烘燥出火氣研末用又方出百一選方以乾桑葉為細末瘡乾蜜調敷濕則乾摻一方取霜下桑葉水調敷之又方以榆桞皮燒灰為末入輕粉濕則乾用香油調搽效即無痕又方出徳生堂用絲𤓰葉搗爛取汁塗又方出徳生堂以大黄五靈脂末塗又方以卒被湯添火燒瘡痛爛悶不止兼令瘡不成瘢痕又方取大麻子如常法煮麻腐稀稠得所以敷之乾即換之又方出聖惠方以牛膝苖𢷬取汁煎如膏以烏雞翎塗令徧即痛止日敷三兩度瘥又方出聖惠方以桃葉及鹽和煮作湯洗之治火燒瘡赤焮疼痛方出聖惠方以臘月酒油煮麵糊一盞以青竹筒貯之每日塗於瘡上治火燒瘡腫痛方出聖惠方取鱓魚皮燒作灰細研如麵用生油調塗瘡上並不成瘢痕又方出聖惠方以猪毛燒灰細研和膠水調如稀糊塗經五日以來煎椒湯洗却重更塗之即無痕自然銅散出聖濟總録治湯火瘡及一切惡瘡自然銅宻陀僧各一兩並煅研甘草三兩為末黄栢二兩為末右一處研細收淨器中水調塗或乾者新水擂煙薫迷悶欲絶用蘿蔔嚼汁下咽即生乾者新水擂爛飲之凡被火傷出醫方集成急以火炙雖極痛強忍一時即不痛勿以冷物浥之熱氣不出爛人筋也薤白膏治火燒瘡方見本門炙瘡類治湯火所傷出百一選方用柿漆塗之更無瘢痕治一切湯火所傷方出本草初着即以女人津液塗之瘥治湯火瘡雖膿水出皮肉潰爛者不過敷兩三次即安出百一選方蛇苺本草音繆右搗爛敷之以瘥為度錢文子佃客因遺漏燒灼遍身潰爛偶一道人傳此方用之即安更無瘢痕本草不言治湯火燒又方出百一選方用黄瓦刮取細末濕者乾摻藥乾者麻油調塗又方出百一選方以薤白不拘多少搗爛以鵞翎敷之更無瘢痕又方出百一選方王仲杞以乾甑箄燒灰存性敷之凝石散出楊氏家藏方治湯火所傷皮肉潰爛赤焮腫痛膿水不乾或瘡痂未退肌膚急痛一應惡瘡悉能收歛寒水石三兩煅成粉蛤粉一兩右同研匀每用雞清入生油調稀以翎毛揾藥掃傷處無痕散出楊氏家藏方治湯火傷臘茶不拘多少右為細末用煮酒脚調敷如無煮酒脚只用好酒亦得神效散出楊氏家藏方治頭面湯潑火傷肌肉雖已平復遂成瘢痕鬢髮不生江茶生麵各等分右研勻用生麻油調塗患處一日易之如湯傷出如官方以水花晒乾油調敷之火瘡通用又生百藥擂爛塗又用桞白皮末藥妙如火傷出如官方用香油白水相等成膏調寒水石末塗之又用藏言邜灰擦又黄芩末水調敷黄栢散出楊氏集驗方治湯火瘡雞子殻黄栢樹皮朴硝右等分為末白水調塗極妙湯傷出東垣蘭室方寒水石火燒大黄油燒黄蘖各等分右為末敷之如神散出危氏方治湯火傷以裏陳江茶著葉燒灰碾細羅過用生油輕粉調敷若濕者乾摻止痛無痕陳待制桷奉道甚謹各日澡浴偶坐櫈倒不敢以手捺地遂墜身火爐邊有傷人傳此方用之愈近效方出危氏方治湯火瘡以山枇杷柴取皮焙乾為末生蜜雞子清調敷療灼藥瘡及熱焱瘡出本草用荆莖煮汁洗有效治湯火瘡滅瘢以臘日去取活􅂒䑕煎為膏敷之良治火瘡出本草用紅蜀葵葉搗碎敷瘡上療湯火灼瘡出本草用井内泥敷之温則易之治湯火瘡爛出本草用小麥麩醋炒貼罯治湯火灼出本草以餅爐中灰細羅過芝麻油調羽掃不得着水仍避風治湯火瘡出本草以黄櫨煮湯洗之治腫毒湯火瘡及風疹出本草以水萍㶸之治火瘡以虎屎中骨為屑敷之炙瘡附論夫火艾焮毒不忍者為血俞内通臟腑也陶隠居謂炙炳不依定俞或犯日時禁忌天地不和之氣及炙後食毒不慎房室與夫炙數遍多皆令火毒發痛紅腫痛楚經久不瘥方黄耆散治炙瘡止痛抽火毒吮膿黄耆白芷白芨白薇當歸芍藥防風去蘆甘草細辛去苖葉各一兩嫩桑枝一分垂柳枝二兩乳香研一分鉛丹六兩清麻油一觔右除乳香油鉛丹外細剉以油浸一宿次日煎候白芷黄黑色綿濾去滓下鉛丹以抝箆攪候變黑色滴水為珠子即入乳香末手攪令匀以甆合盛用薄紙塗貼瘡日二上或膿水多易藥時用葱湯輭帛掃洗貼膏以瘥為度生肌膏治炙瘡久不瘥止疼痛防風去蘆頭白歛赤芍藥當歸芎藭桑根白皮杏仁湯浸去皮并尖木香丁香各一兩甘草一兩垂柳枝剉三合亂髮洗令浄黄丹五兩麻油一觔清者右除香二味𢷬羅為末餘並細剉以油浸一宿漫火熬桞枝色黄黑綿濾去滓澄清拭擋令浄漫火熬藥油入黄丹用抝木箆不住手攪令黄丹色稍黒取少許滴於水内撚看得所入香末又攪令匀傾於不津器中盛每用看炙瘡大小以紙上匀攤貼之每日三兩度換仍煎桞枝湯洗勿令傷風治炙瘡腫痛用雁屎白人精相和研敷之又方用薤白切一觔猪脂一觔細切以苦酒浸經宿微火煎三上三下去滓敷上治炙瘡不瘥用兎毛燒灰存性敷之即愈止痛生肌解火毒方治炙瘡久不瘥用黒豆半升水五升煮成濃汁去豆放温以綿裹指頭欵欵洗瘡四面令極淨候瘡中膿出瘡痂自落便摻止痛生肌散薤白膏治炙瘡經久不瘥薤白生地黄拍碎三兩梔子仁一兩杏仁去皮尖一兩胡粉三兩白芷一兩酥三兩羊背膒脂一升右除酥脂外細剉先以酥脂㣲火煎烊下薤白等藥候白芷色赤以綿濾去滓用磁器盛下胡粉攪令勻塗帛上貼之日三兩上以瘥為度治炙瘡久不合以白茅香花敷之治鍼炙瘡發紅血不可止者以鱧腸草敷之立已治炙瘡不發者以白魚作膾食之良治炙瘡方凡炙瘡不瘥日别炙上六七壮自瘥黄連散治炙瘡痛不可忍黄連去鬚赤小豆馬蹄燒灰大黄楸葉等分右為散每用半錢以生麻油調塗之當歸膏治炙痛當歸焙甘草剉胡粉研羊脂各一兩猪脂三兩右除羊猪脂粉外𢷬羅為末先熬脂令沸下藥末粉等以抝箆攪令匀瓷盒盛取塗敷瘡上以故帛貼之日一易以瘥為度一方無猪脂梔子仁塗敷方治炙瘡疼不可忍梔子仁石灰地椒黄蘖塗蜜炙鉛丹各半兩右為散塗敷瘡上日三五上即瘥薤白膏治炙瘡生肉止痛亦治火燒瘡薤白當歸各二兩白芷一兩羊髓一觔右㕮咀合煎以白芷色黄藥成去滓取敷之日三治炙瘡膿不瘥薤白一握胡粉石灰各一兩臘月猪脂一觔右先煎薤白令黄去之綿裹石灰煎數沸去之次以胡粉納膏中令匀調塗以故布貼上日三一方無石灰栢皮膏治炙瘡發腫火毒疼痛栢白皮三兩當歸一兩薤白五兩猪脂一觔右除薤白猪脂外細剉熬脂令沸下藥煎候薤白赤黑色以綿布絞去滓瓷盒盛塗敷瘡上日三五度即瘥一方無猪脂甘草膏治炙瘡痛不可忍甘草半兩為末乳香少許研蠟少許右熬蠟入二藥末成稀膏貼之止痛生肌散治炙瘡石膏一分燒過者牡蠣半兩燒過者滑石一分右為末凡用之時切䕶指甲勿令中風仍須洗瘡令淨然後摻之薄薄令徧以軟錦帛繫之候肌生可用白皮膏栢皮膏治炙瘡久不瘥栢樹白皮末伏龍肝各四兩猪脂半兩鍊為油右用熬成膏濾去滓入甆器中每用時薄薄塗之上以油單隔軟帛裹治炙瘡蠟三兩松脂五兩右合煎紙貼之日三治炙瘡久不瘥肉爛疼痛方宻陀僧煆過研白礬飛令汁枯研右等分研匀先煎蓮子草汁洗瘡去痂後以藥敷之緑雲散養炙瘡止痛栢葉芙蓉並重五日午時採右不拘多少隂乾𢷬羅為散每炙瘡黑蓋子脫了即用井水調少許如膏藥攤楮紙上貼之養膿更無痛楚治炙瘡膿不瘥白蜜一兩鳥賊魚骨二枚一方作一兩右相和塗之治炙瘡取車􅤧脂塗上良又方用石灰一兩搗羅為末絹篩猪膏和令相得㣲火上煎數沸以暖湯先洗瘡訖以布裹灰熨瘡上三過便以藥貼瘡上炙之又搗薤敷治炙瘡痛腫急方用竈下黄土𢷬為末以水和煮令熱漬之治針炙瘡血出不止方以燒人屎灰敷之以蓮子汁洗瘡後敷之又方用死􅎙蜋為末以猪脂和塗之治炙瘡久不瘥痒痛出黄水方用楸葉或根皮不拘多少搗羅為末敷瘡即瘥葱白塗敷方治炙瘡血不止用葱白一握研絞取汁塗敷瘡上日三五度又方以荼菜搗敷止痛易瘥治炙瘡不瘥者以牛屎熱灰敷之治炙瘡久不瘥用猯肉毛燒灰敷之又用桃膠和水銀擂研塗之治炙瘡之中風冷腫痛方但向火炙之瘡得熱則痛快至痛止日六七炙愈四時貼䕶方治炙瘡未着痂及出膿不合者春以桞絮夏以竹膜秋以新綿冬以兎毛内托黄耆丸治鍼炙傷經絡流膿不止黄耆八兩當歸三兩洗肉桂去皮木香乳香沉香各一兩右為末用菉豆粉四兩薑汁煮糊丸如梧子大每服五十丸熱水送下不拘時馬汗入瘡附論夫諸瘡未愈而為馬汗淹漬或馬尾垢及馬屎尿及坐馬皮韉並有毒令人身體壯熱疼痛焮腫毒氣淫溢則嘔逆悶亂傳入腸亦能殺人方􅔈砂散治馬汗入瘡方雄黄研硫黄研礬石研􅔈砂研各一兩巴豆二十箇去皮不出油附子去皮臍生用半兩右𢷬研為末用醋飲和丸如雞頭大將一丸分為兩處用醋貼若瘡口合却須㣲撥破紅色處磨出黄水瘥薑黄散治馬骨刺肉方䧺黄乾薑各半兩右搗研為末調敷刺處青皮散治驢涎馬汗入瘡方冬𤓰青皮隂乾用為末貼瘡上一方挑瘡口敷之少頃即退白礬散治馬汗入肉雄黄白礬各等分用烏梅三箇搥碎巴豆一箇合研為末以半錢用油調敷患處黄丹散治驢馬汗入瘡白礬二錢飛過黄丹三錢炒紫色右用為細末塗患處如乾油調塗治馬汗入瘡疼痛方用雞毛燒灰每服一錢水調服一方以酒服治馬汗入瘡毒氣攻毒痛方用馬鞭上手執處皮燒灰研細和猪膏塗瘡上一方馬鞭梢燒灰用猪脂塗瘡上治馬汗入瘡腫痛方一云人體上先有瘡因乘馬馬汗馬毛入瘡中或為馬氣所蒸皆致腫痛煩熱入腹則殺人用醇酒任意飲之令醉醒必愈治馬汗入瘡遍身毒氣攻方用莧菜水煮熱取汁淋洗瘡上一方五月午日預採收良治馬汗入瘡方用石灰赤研細以少許敷瘡上治馬骨所刺毒氣攻人方用大麻仁半升細研以水少許解去滓取汁每飲一盞頻頻服治馬骨刺肉中疼痛方用馬齒莧細研以水少許觧去滓每服一盞更以汁洗刺處又用小便洗之治馬骨刺肉中成瘡痛方出聖惠方用小蒜葉細搗炒煖塗上兼以湯汁淋灌瘡上良治馬汗入瘡痛毒氣攻作膿心滿欲絶者用燒粟檊草作灰熱煮濃淋蘸瘡於灰汁中須臾白沫出盡即瘥白沫者是毒氣也治馬汗入瘡腫漸甚宜急療之遲則毒深難理出肘後方用川生烏頭末敷瘡口良久消黄水出立愈治馬汗馬毛入人瘡中腫痛入腹害人出聖惠方用井花水作湯浸痛處冷水亦得數飲好酒即愈又石灰敷之治馬汗入肉毒氣引入紅綿出海上名方用烏梅和核爛搗為末以頭醋和為膏先將瘡口以針刺破但出紫血有紅血出帛拭乾以膏敷上以帛繫一方無醋爛嚼塗瘡上治馬汗入瘡中及治馬嚼人作瘡有毒熱疼痛及瘡乆不瘥出千金方以婦人月經血塗之治驢涎馬汗入瘡出傳信適用方用逺志去心為末以酒調塗治馬血入瘡中出千金方用服人糞子如雞子大復以糞敷瘡上治剥死馬馬骨傷人手毒攻欲死方出千金方用死馬腹中屎以塗之即瘥用馬糞乾者一物粉瘡孔上瘡口大先以馬尿洗之大驗絞糞汁㣲温飲之效治馬毒瘡出本草用堇菜搗汁洗并服之又方出聖惠方用人糞泥之又𢷬馬齒莧敷之一方乾者燒灰敷瘡兼以馬糞汁洗瘡甚佳治驢涎馬汗入瘡出𫝊信適用方用頭垢和壁土貼之又方出傳信適用方用烏梅肉黄丹等分為末以唾調又飲淡豆豉汁一椀治驢涎馬汗入人肌内者出𫝊信適用方用名鬃尾燒灰挑破所入汗處見血然後用麻油調塗之治馬汗入人瘡疼痛方出聖惠方用煮豉作湯及熱漬之冷復易之治忽驟乗騎來恐為馬汗所傷方於衣上帶葱白一莖自無所害治馬汗馬毛入人瘡中腫痛欲死方出聖惠方用沸湯令得所浸洗之取瘥治馬汗入瘡方出千金方用驢耳中垢敷之兼治馬血入瘡效治馬骨所傷毒氣攻人欲死方出聖惠方用馬糞絞飲其汁即效兼燒末水服二錢日四五服治馬骨所刺及馬血入人體故瘡中毒疼痛欲死者出聖惠方用熱灰汁更畨漬之常令熱終日為之冷即易數日乃愈若心痛而瘡腫不消者炙石熨之一方用熱桑皮灰汁更畨漬之治馬血入瘡方用嚼粟米肉爛塗之治馬骨所刺及馬血入舊瘡中毒痛欲死方用酒漬馬齒莧少少飲之治驢涎馬汗入瘡出傳信適用方用乾冬𤓰燒灰淨洗瘡口搽藥在内一方用冬𤓰青皮隂乾為末敷之治驢涎馬汗入瘡方以馬汗蚛粟子一箇烏梅一箇嚼爛碎作十丸每一丸用鍼挑破瘡貼之絹帛子繫治馬汗入瘡及一切毒入腹不可療者用葶藶子一兩炒研以水一升浸湯服取下惡血惡核腫附論夫惡核病者肉中忽有核累累如梅李核小者如豆粗皮内瘮痛壯熱􅂒索惡寒是也與諸瘡根瘰􅊓結筋相似其瘡根瘰􅊓因瘡而生是緩血毒惡核病卒然而起有毒若不治入腹煩悶殺人盖由冬月受温風至春夏有暴寒相摶氣結成此毒也但服五香湯主之又以小豆末敷之亦煮洗漬時時洗消後以丹參膏塗之令核盡消凡惡核初似被射工毒無常定處多惻惻然痛或時不痛人不痛者便不憂不憂則救遲救遲即殺人是以宜早防之尤忌魚雞猪牛馬驢等肉其疾初如粟米或似麻子在肉裏而堅似皰長甚速初得多惡寒須臾即短氣取吳茱茰五合作末水一升和之取汁頓服以滓敷上服此汁令毒散上即不入腹也入腹則成禍矣切慎之方五香散一名五香連翹湯出聖惠方治肉中或有惡核生腫破不消惡肉惡脉瘰􅊓腫結氣雞舌香一兩麝香一分細研薰陸香一兩射干紫葛剉川升麻獨活桑寄生甘草生剉連翹各二兩川大黄三兩剉碎㣲炒木香沉香各一兩右為散入麝香研匀每服三錢水一中盞煎至五分去滓入竹瀝半合更煎一二沸温服日三服連翹散出聖惠方治項上惡核焮腫連翹川升麻獨活木通剉木香沉香各一兩桑寄生丁香各半兩川大黄二兩剉碎㣲炒右為細散每服以清粥飲調下二錢日三服獨活散出聖惠方治惡核風結腫毒四肢煩熱拘急獨活木香射干連翹甘草生剉桑寄生川升麻沉香川大黄生用各一兩右為散每服四錢水一中盞煎至六分去滓入竹瀝半合更煎一二沸放温服之日三服得快利為度丹參膏出肘後方治惡核腫方見本門惡脉類白歛散出聖惠方治惡核焮腫不消及癰疽白歛川大黄赤石脂赤芍藥芥草黄芩黄連去鬚吳茱茰各一兩右為末以雞子清調如泥塗於布上貼腫處乾即易之黄耆散出聖惠方治惡核焮腫疼痛黄耆一兩半剉黄芩芎藭黄連去鬚白芷赤芍藥當歸各一兩右為末以雞子清調如泥塗於布上貼腫處乾即易之貼惡核散赤小豆猪牙皂角硝石黄藥木鱉子各半兩右為末雞子清調塗氣體壯實者仍服涼膈散或四順清涼飲之類治惡核腫結不散方出肘後方吳茱茰末一兩小蒜二兩右搗為汁敷之日三換以瘥為度治惡核蝸牛蟾酥以針挑破貼之治惡核脇黄患瘇以針破用香油燒竹滴油在患處又方用火炮薑搗碎如飛鹽刺碎破揩黄水流出亦妙後用􅒝麻子百粒去殻搗爛加小七香丸一握和成丸如菉豆大分作二分服熱酒送下以利為度治惡核腫不散用鮮鯽魚杵敷之一方用鯉魚燒灰醋調敷之或加天仙子米醋調匀敷患處尤佳治結核出本草用堇菜乾末和油煎成摩結核上日三度瘥逰腫附論夫逰腫之狀者青黄赤白無復定色逰於皮膚之間肉上㣲光是也方欝金散出聖惠方治逰腫攻頭面焮腫赤熱疼痛鬱金甜葶藶川芒硝川大黄生各半兩赤小豆一合伏龍肝二兩右為末以生雞子白并蜜少許調令稀稠得所塗之乾即更塗治赤白逰腫方出聖惠方蕓薹子半合米醋一雞子殻鹽一錢右搗爛如泥煮依腫大小塗紙上貼之如走即隨處貼之不過三兩上又方出聖惠方川大黄一兩生用䜴一合紫檀香一兩右為細末以醋和敷之乾即再敷治青白赤逰腫㣲痛方出聖惠方川大黄二兩生蒲黄二兩伏龍肝二兩右為細散水和如泥薄敷之乾即再塗治逰腫赤者方川大黄二兩慎火草五兩右合搗塗之乾即再和又方出聖惠方用紫檀香二兩為末水調塗之治逰腫流徧身赤色入腹即死方用生猪肉敷上數數換之其肉百鳥不食食自死惡甚也治白逰腫方出聖惠方用生羊脂塗之治逰腫方出本草用甆塸中裏白灰醋磨敷之甆器物初燒時相隔皆以灰為泥然後燒之塸甆也但看裏有即收之赤逰腫若徧身入心腹即殺人出百一選方以竈下黄土為末油調塗勿令乾治赤逰腫若徧身入腹即殺人出百一選方以白豆末水和塗若入腹及隂者以䕶湯火草取汁一盞服乾即末之水調服出邵州偏急方馬敏叔親曾為其子用甚妙所用白豆者治逰風腫赤頳熱者出本草以慎火草根耳為末水調掃患處治逰腫出本草以紅藍花苖生搗碎敷之治赤白逰腫出本草以豉蟲搗敷之惡肉附論夫惡肉者身裏忽有肉如小豆突出細長及如牛馬乳亦如雞冠之狀不痒不痛乆不治長不已由春冬被惡風所傷風入肌内結淤血積而生也方漏盧散一名漏盧湯出聖惠方治惡肉漏盧白歛黄芩白薇枳實麩炒微黄川升麻甘草生剉赤芍藥川大黄剉㣲炒麻黄去根莭各半兩右為散每服三錢水一中盞煎至五分去滓不計時候温服大黄膏出聖惠方治惡肉久不瘥川大黄生用附子去皮臍生芎藭雄黄細研真珠末各一兩黄芩白歛䕡茹另研為末白礬燒汁盡細研各二兩右大黄等五味並剉先以猪脂一觔半煎十餘沸濾去滓納雄黄真珠䕡茹白礬攪令匀塗於惡肉上蝕惡肉散出聖惠方硫黄馬齒莧白礬燒令汁盡䕡茹丹參各半兩右為細散塗敷惡肉上治惡肉不瘥方出聖惠方䕡茹末半兩白礬三分燒令汁盡雄黄三分細研右同研為細散敷肉上治瘡中惡肉出方出聖惠方用生烏梅二十七枚燒灰為末敷瘡中惡肉上惡脉附論夫惡脉之病其狀赤絡忽起巃嵸而聚若死蚯蚓之狀又若水在脉中長短隨絡脉所生得之春冬惡風入於經脉瘀結而成是疾乆不治則結脉變為瘻病宜服五香連翹湯及所􅊓等治之刺去其血仍敷丹參膏亦用白雞屎塗之方五香連翹湯出肘後方治惡脉宜服此湯及敷丹參膏服五香湯敷小豆則瘥方見本門惡核腫類五香散木香湯出聖惠方治惡脉腫毒木香吳茱茰湯浸微炒升麻薫陸香雞舌香雄黄甘草炙鱉甲醋浸炙去裙欄射干各半兩一方用鳥利牛根半兩右麄搗篩每服五錢鹽水二盞煎至一盞去滓空心温服日晚再服一方以水三升煎二升去滓用故帛三五重浸湯中更互搨腫上不計遍數亦可丹參膏出千金方治惡肉惡核瘰􅊓風結諸腫云此膏亦可服丹參蒴藋各二兩秦芃獨活烏頭白芨牛膝菊花防風各一兩一作防己茵草葉蜀椒躑躅花各半兩右十二味切以苦酒二升漬之一宿以猪膏四升俱煎令酒竭勿過焦去滓以塗諸疾上日五度塗故帛上貼之此膏亦服得大行即須少少服五香湯加茱茰犀角湯出聖濟總録治惡脉腫毒氣攻脉中卒腫痛結作核或似癰癤而非時使人頭痛寒熱氣急數日不除木香藿香葉沉香薫陸香雞舌香吳茱茰湯浸洗㣲炒犀用鎊各一兩右麄搗篩每服五錢鹽水二盞煎至一盞去滓空心温服日晚再服其滓熱搨腫上冷即易之升麻湯出聖濟總録治惡脉毒腫升麻一兩烏梅肉二兩梔子仁十二枚右麄搗篩每服五錢鹽水二盞煎至一盞去滓空心温服日晩再服餘滓熱搨患上五香湯治惡脉病方見本門熱腫類黄耆散出聖濟總録治惡脉毒腫以黄耆四兩細剉搗羅為散水調敷日三五度又方出聖濟總録以漆頭䕡茹二兩為細散水調敷上日三五度結陽附論内經謂結陽者腫四肢夫熱勝則腫而四肢為諸陽之本陽結於外不得行於隂則熱菀於四肢故其證為腫况邪在六腑陽脉不能和隂則氣留之以其氣畱故腫也方白鮮皮散出聖濟總録治氣菀四肢腫實不散令人氣壅方見本門熱瘡類白鮮皮散犀角湯一名犀角歛治結陽四肢腫滿熱菀不散或毒攻注大便閉澁方見本門風腫類防己丸治四肢腫熱氣脉壅滯方見本門熱腫類升麻湯出聖濟總録治熱毒流於四肢腫痛不消升麻大黄剉如半粟大醋炒紫色各二兩前胡去蘆頭梔子仁射干去毛炙各一兩半黄芩去黒心犀角鎊屑一兩豉炒半兩羚羊角鎊屑半兩右麄搗篩每服三錢鹽水一盞半煎一盞去滓食後温服日三木香丸出聖濟總録治結陽氣壅四肢腫熱大小便閉澁木香芎藭羌活去蘆頭桂去麄皮各二兩㯽榔煨大黄剉如半粟大醋炒紫色郁李仁湯浸去皮研如膏各四兩右先以六味為末入郁李仁再研匀錬蜜和丸梧桐子大毎二十或三十丸生薑湯下空腸臨卧各一服普濟方卷二百七十七
