薄切炙令焦忌房事五辛猪鷄魚蒜一醫患目三年得此藥遂愈一名貍鳩丸增明丸出御藥院方治一切眼目昏暗翳膜遮睛或時眼見黑花熱淚出視物不明並皆治之當歸􅆚藥木香川芎連翹熟乾地黄甘草㯽榔各一兩山梔子薄荷葉黄芩各一兩半大黄二兩芒硝七錢半牽牛研炒取頭末一兩半右為細末燒飯為丸如梧桐子大每服三四十丸不拘時候茶清下或荆芥湯下諸飲亦得日進一二服錠子眼藥出儒門事親黄丹二兩飛黄蘗去皮黄連去鬚枯白礬爐甘石黄連製銅緑各半兩硇砂川烏炮各三錢薑一錢蝎硝二錢信半錢火燒沒藥少許右為細末入豆粉四兩煉蜜和如大麥許錠子於眼大眥頭㸃藥力盡温水洗之竹瀝泄熱湯療腸傷氣伏邪熱喘逆悶恐眼視無明狂懆非意而言一切證竹瀝一升麻黄大青梔子人參𤣥參升麻茯苓知母各二錢石膏碎生葛各八兩生薑􅆚藥各四兩右切以水九升煮取二升去滓下竹瀝更煎三五沸分三服忌酢物重聖散出宣明論治一切風熱内外障氣眼疾川芎川獨活川羌活吳射干井泉石仙靈脾防風甘草蒼术草決明丹參白术石決明各三分右為末每服二錢水一盞半煎至一盞食後温服日三摩頑膏出聖惠方一切眼疾及生髪退熟毒風生油一斤黄牛酥三兩蓮子草汁一升淡竹葉一握大青一兩半葳蕤一兩半曾青二兩研細石長生一兩半吳藍一兩槐子一兩半川朴硝一兩半青鹽一兩梔子仁一兩半右伴藥細剉綿裹於鐺中先下油酥及蓮子草汁後下諸藥以文火煎半日即以武火煎之候蓮子草汁盡其膏即成去滓更細澄濾訖通油和合成丸每欲用時夜間臨卧以鐵匙取少許塗頂上細細以匙摩之令稍散入髪孔中頓覺清涼輕者不過五六度重者用膏半劑即瘥摩膏之法每隔三夜一度摩之法妙併日恐藥驅風毒大急内障方盡所不治者此能療之翳除眼暗映翳赤風毒冷熱淚出眼暗如針刺痛無不瘥者摩頂後三兩日便能髪風毒自散也合藥取蓮子草汁須是八月九月採之其汁方濃有力餘時不堪也一方有蕤仁無川朴硝猪肝散出海上方菊花楮桃夏枯草各一兩蒼术木賊去節防風赤􅆚藥石决明草决明各一兩半當歸三錢黑豆一合生地黄三兩右為末用雄猪肝不拘多少竹刀切片入藥末綿縳猪肝米泔水蒸空心細嚼可用麥門冬湯潄下忌毒物療眼中一切諸疾盲翳天行風熱胎赤涙出常䑃䑃不多見物石膽一兩蒲州解縣出光明者波斯鹽緑一兩色青陰雨中置乾不濕者是真石鹽二兩硇砂二分以上四味各别研烏賊魚骨一兩去上皁别研蕤仁研膏三兩秦皮黄連連硃眥防風各三兩細辛鉛丹各一兩馬蹄决明三兩七孔者仍以煖水别洗細片數過者右合𢷬篩似粉以白蜜於火上微煖去上沫取下青者和入作塊更𢷬千杵以油蠟紙裹之取磁瓶子盛貯勿使見風每欲用以兩米許大和蜜少許用篦子頭分置兩眼眥夜卧合眼至明不潄口含清漿和豆許鹽鹽消吐洗眼不避風日未瘥之前忌食麫羊肉漿菓葷辛生菜虀汁苜蓿萵苣麞兔每日一度㸃効金絲膏出保命方㸃眼藥生薑四兩取汁白沙蜜一斤煉去滓䝋猪膽汁三錢黄連四兩用水一斗浸煎取五升右先煎黄連水後入薑汁次入蜜同煎去沬淨次入下項藥末腦子四兩麝香三錢硇砂四錢鵬砂三錢輕粉五錢熊膽四錢青鹽三錢右極細攪勻熬冷稀膏㸃用還睛膏出海上方爐甘石此爐甘石黄白者佳用桑柴火燒通紅童子小便三升蘸七次研為細末另取黄連末調水飛用爐甘石末焙乾用六兩黄連去鬚出揀净研為細末用童便熬沸加三兩尤妙此須臨時秤用不預飛爐甘石黄連數内鷹條一兩洗淨如無以白丁香代之當歸生用洗乾一錢魚骨麝香輕粉乳香硇仁各一錢黄丹水澄焙乾二兩片腦少許右用蜜六兩以砂碢化開煮葱三百根焦色去蠟滓綿子濾淨秤之後將淨蜜傾入砂碢内文武火熬之槐枝攪勻先下爐甘石攪勿熬動下黄丹又攪勻次下黄連又下當歸五次下硇砂六次下烏魚骨七次下輕粉麝香熬成紫色方下龍腦待不粘手為丸如龍眼大如施人只須麥粒大每藥一丸温水一呷化開㸃洗若作錠子㸃眼大有神效上件煎黄連汁浸一宿濾去黄連澄清却於銚子内炒爐甘石末子將黄連汁滲乾為度如多合分兩輕者隨增神授太師方出直指方治一切眼疾昏翳甘草生川芎榖精草蒺䔧炒杵去刺蟬退洗晒旋覆花宻蒙花等分荆芥羌活木賊去莭童尿浸一宿晒防風等分右為末每服二錢秦皮煎湯調下療眼中一切諸疾青盲翳者天行風赤無端忽不見物悉主之此方兵部侍郎盧英所傳價千金石膽研皮斯鹽碌研石決明烏賊魚骨去甲鉛丹細辛龍腦各三分蕤仁研防風末各三錢秦皮末馬蹄决明淨揀各二兩右搗散及研避風煮以白蜜錬濾淨和訖更搗五七千杵以油蠟紙重裹之重合盛勿令見風可致百年不敗合時不欲見蟲犬與鳥雀婦女及孝子穢惡之類須於臘月合之有患取米粒許和蜜如稀餳夜卧㸃之以瘥即止丁香化光丸出宣明論治一切逺年近日疼丁香荆芥穗各三錢巴豆一錢去皮油半夏二兩烏梅去枝盆硝甘草各半兩南硼砂三錢腦子二厘縮砂仁一錢半右為末錯煮麫糊為丸如菉豆大每服十丸至十五丸食後米泔下日三服靈光還睛膏出瑞竹堂方治一切眼疾川黄連乳香各半錢爐甘石六兩炭火在鐵片上鍊紅末放於黄連斗内依前燒麝香烏魚骨末白丁香硇砂研輕粉各一錢研右為細末白沙蜜一十兩銀器内或沙鍋内亦可先熬五七沸以淨紙搭去面上蠟取淨除黄連外下餘藥用濕柳竿子攪勻次下黄連攪勻於慢火内徐徐攪至紫色不粘手為度和丸如皂子大以紙裹之每每用一丸新汲水於小盞内化開時洗之菊花散出海上方甘草各一兩川芎蒼术甘菊一兩防風羌活木賊麻黄白蒺䔧黄連各三錢右為細末每服三錢食後臨臥茶酒任下日進三四服如頭目眩亦宜服之羚羊角散出危氏方家菊防風川芎羌活車前子川烏炮去皮火各半兩半夏泡羚羊角薄荷葉各一兩細辛一兩右剉為散或為末或丸以生薑煎用末以荆芥茶清調下食後服金絲膏出儒門事親黄丹代赭石𤣥精石各半兩爐甘石一兩腦子半錢黄連蕤仁去皮油各三錢白丁香南硼砂各一錢右除硼砂腦子外同為細末以河水一升白沙蜜二兩同熬三五沸然後入藥末再熬至半茶盞以末用綿子濾過去滓次入砂腦子末攪勻定磁器内放徐徐㸃眼有神驗洗肝散出本事方治眼大黄甘草各五錢黄芩􅆚藥赤者乾葛川當歸熟地黄山梔子仁各半兩右為末每服二錢第二次米泔水調下甚者三錢魚膽丸出海上方黄熟川連一兩洗浄研令碎新汲水一盞浸一宿煎至二分許綿絹濾瓷器内一用煎成膏文武火勿令焦南硼砂真片腦各一錢蕤仁一分去皮殻出油盡右乳鉢内研極細一處和勻或膏素細條鏡上刀切磨令圎每用一丸㸃服菊睛丸出本事方治諸般眼患甘菊花二兩川芎甘草各一兩天門冬四兩去心右為細末鍊蜜為丸如梧桐子大每服十五丸至二十丸空心温水服或酒下日午臨卧日三服如久患加荆芥余寓衡陽日有一婦人患眼十分余與此藥十服瘥洗眼方出危氏方韶粉防風馬牙硝餅子銅青右為細末每用一匙温湯調下不拘時洗立效治眼疾黄芩桔梗各一兩防風荆芥穗桑白皮前胡甘草各半兩大黄一兩芍藥二錢半右水二盞煎至一盞食後服菊花散治一切眼疾肝熱上攻羞明晨日涙出菊花一兩蜜蒙花甘草生梔子仁芎藭大黄各半兩防風去叉蒺䔧子炒去角當歸焙各一兩右為散每服二錢食臨卧麥門冬熱水調下魚膽丸出儒門事親草龍膽青鹽腦子各半兩黄連去鬚一兩硇砂南鵬砂麝香鯉魚膽各一錢右除草龍腦連外同為細末先將草龍膽連微研破以河水二升浸春秋二宿夏一宿冬三宿將浸並揉極爛用絹袋濾去滓於石器内慢火熬成將膏子㸃於水内不散用指頭揑開有絲乃膏成然後入魚膽拌勻將膏和上件藥末作劑丸如粟米徐徐㸃用之還睛膏出海上方白蒺䔧炒去刺青葙子白术各半兩兔絲子木賊去莭各一兩北五味羌活各三錢半防風三錢半右為細末鍊蜜為丸如龍眼大每服三丸食後細嚼白湯嚥下㸃眼藥方金精銀精代赭爐甘水石泉石石膏滑石右等分杵碎研細先用蜜一斤熬鍊紫色後下四兩同熬紫黑色為度下水四升入藥末再熬滴水不散用紙七層濾之加硇砂硼砂各半錢腦子少許各研調和用少許㸃眼眥涼膈散川大黄連翹薄荷甘草山梔子黄連皮硝黄芩右水煎服之塗頂油方出聖惠方治腦熱風目睛麻油二合硝石細研川朴硝研各一兩連子草汁半合白蜜半兩右同研令勻以甆合盛之每取一匙塗於頂上甚良又方治眼疾當歸芍藥各半兩大黄一兩黄芩桔梗瓜蔞根防風甘草各半兩右水二盞煎至一盞食後服眼藥匳子出海上方赤芍藥别研生地黄研白芷各一兩别研黄蘗一塊如鷄子大生薑半兩冬青葉生薄荷少許右搗研為膏如乾以薄荷水添潤仰卧用藥匳於眼上内用一層紗片隔住外用紗帛縳定如此數日即效㸃眼方出海上方硼砂琥珀各二兩梅花腦子真珠各一匙朱砂二錢半石決明半箇用􅁝綿褁斧打碎子礶粉麝香一匙右但畱硃砂臨時為末雜和諸藥令勻以角管收藏復以紙塞勿令泄氣每用以銅筯沾木蘸藥㸃眼片時便别普濟方卷八十五
