body:
  text: 普濟方卷八十五明周王朱橚撰眼目門目瞼生風粟論夫瞼生風粟外障此根初患之時皆因肺臟壅毒大腸積熱肝家有風致令眼瞼皮上下有肉如粟粒相似或赤或白唯多淚出澀痛如米隱睛一般積久年深翳膜昏暗漸漸加重此眼宜飜眼皮起以針撥之又頻洗出血去除根本即瘥然後服除風湯退熱飲危氏得効方論云兩瞼上下初生時如粟米大漸漸大如米粒或赤白不甚痛疼堅硬者蓋肝壅血所成宜服消毒飲子方知母湯出聖濟總録治眼生風粟知母茺蔚子人參白茯苓去黒皮大黄剉炒五味子黄芩去黑心各一兩車前子一兩半芒硝半兩右麄𢷬篩每服一錢匕水一盞煎至五分食後去滓温服青葙子丸出聖濟總録治目瞼生風粟青葙子二兩半犀角鎊白茯苓去黒皮羌活去蘆頭槐子各一兩半桑白皮剉一兩半麻黄去根節一兩一分羚羊角鎊三兩大黄炒一兩右為末鍊蜜丸如梧桐子大每服三十丸食後粥飲下日再防風散出聖惠方治瞼生風粟及生珠管防風去蘆頭犀角屑羚羊角屑川大黄剉碎㣲炒前胡去蘆頭黄芩𤣥參地骨皮各一兩甘草半兩炙㣲赤剉右為散每服五錢匕水一中盞半煎至五分去滓於食後温服除風湯出龍木論治瞼生風粟外障防風二兩犀角大黄知母黄芩黑參各一兩桔梗羚羊角各一兩半右為末以水一盞散一盞煎至五分空心去滓温服退熱飲子出龍木論治瞼生風粟外障茺蔚子知母人參五味子茯苓大黄芒硝車前子一兩半右為末以水一盞散一錢煎至五分食後去滓温服茺蔚散出聖惠方治服生風粟疼痛時有淚出茺蔚子防風去蘆頭羚羊角川大黄剉碎㣲炒黄芩杏仁去皮尖雙仁麩炒㣲黄車前子赤茯苓已上各一兩右為散每服四錢以水一中盞煎至六分去滓入芒硝半分攪勻每於食後温服細辛湯出聖濟總録治眼生風粟疼痛時有淚細辛去苖葉𤣥參五味子人參白茯苓去黑心防風去蘆車前子各一兩右粗搗篩每服五錢以水一盞半煎至七分去滓食後臨卧温服蕤仁膏出聖濟總録治眼瞼生風粟􅅋仁三兩秦皮剉一兩黄連海蛤丹砂研各半兩龍腦研一錢右除研者外搗羅為末酥和於銅器中煎新綿濾過入研者二味拌令勻置甆器中每以一小豆大㸃服消毒飲出危氏方治兩瞼上下生風粟漸漸大如米粒或赤或白不甚疼痛堅硬者大黄煨荆芥各半兩牛蒡子炒甘草各一分右剉散每服三錢水煎一盞半食後温服治眼瞼垂腫生風粟磨隠睛痛方出聖惠方蜜少許水銀半棗大以津液研令星盡龍腦半錢細研右相和勻每用少許日三五上㸃之目内生瘡論夫目生瘡者以脾臟毒熱薰蒸於上鬰而不散而又多食五辛或飲熱藥遂令瞼内瘡生初患之時或即痒痛作時發歇不定或多淚出遂令瞼内瘡出致令四眥如硃砂色相似然後漸生翳膜障蔽瞳人蓋是脾臓風毒積熱隔中致令此眼亦不宜㸃藥矣著頭面上恐損眼也宜服瀉脾湯墜膈丸立效龍木論歌曰風赤生於脾臓家瘡生兩瞼似硃砂發歇無時多淚出漸生翳膜苦相遮輕翳㸃塗權宜法服餌鎌鈎智者誇若把炙燒來退却欲除根本路程賒此因黑珠上瘡稍安其痕疤不沒侵入水輪雖光未絶終亦難治又大眥頭結聚生瘡流出濃汁或如涎水粘睛上下不痛仍無翳膜此因心氣不寧并風熱停留在眼中宜服白薇丸方蕤仁丸出聖濟總録治目生瘡疼痛赤腫心躁視物不明蕤仁去皮決明子㣲炒秦皮去粗皮剉車前子甘菊花黄連去鬚防風去蘆藍實槐子各一兩半柴胡去苖人參白茯苓去黑皮山芋芎藭各一兩甘草炙一兩半大黄剉炒令黑一兩右為末煉蜜丸如梧桐子大每服三十丸空心米飲下決明子丸出聖濟總録治肝肺熱毒氣攻兩眼生瘡赤痛決明子㣲炒菊花秦皮去粗皮剉黄連羚羊角屑黄芩去黒心萎􅅋山梔子去皮生乾地黄焙秦艽去苗土升麻各一兩車前子地骨皮青葙子白茯苓去黒皮各一兩半右為末煉蜜丸如梧桐子大每服三十丸食後温水下臨卧再服決明散出聖濟總録治眼内生瘡爛赤痒熱風麥門冬去心焙菊花白附子炮半兩石決明刮洗二兩枸杞子沉香剉秦皮去粗皮剉巴㦸天去心桂去粗皮牛膝酒浸坦焙梔子仁右為末每服三錢匕空心菊花湯調下臨卧再服柴胡散出聖惠方治肝臟風熱眼中生瘡腫痛柴胡去苖川升麻黄芩黄連去鬚梔子仁車前子決明子防風去蘆頭羚羊角屑馬牙硝甘草炙炒赤剉𤣥參已上各一兩右麄搗篩每服四錢匕水一盞入生薑一片棗一枚煎取七分去滓服食後日二獨活散治頭目陽明邪攻注眼目牙齒斷肉腐痛兼治偏頭痛攻注眼目川芎獨活羌活防風各三錢細辛二錢荆芥鄆薄荷生地黄各三錢右為末水水煎去滓食後服芎菊散出聖濟總録治眼骨太陽穴頭面俱痛眼見黑花目漸昏暗芎藭白芷防風各二兩細辛去苖葉石膏水飛過甘草各半兩菊花一兩右為細末每服用一錢匕食後茶調服治眼眉骨連頭疼痛出聖惠方羌活甘菊花芎藭甘草赤剉旋復花各半兩石膏右為末每服四錢匕水一盞煎至六分去滓每服於食後温食忌炙煿熱麵香甲散出聖濟總錄治風熱頭痛目疼遶額角甘菊花二兩芎藭一両甘草生用生橘皮湯浸去白焙檀香剉各半兩右為散每服二錢匕沸湯入鹽少許㸃眼不拘時候通頂散出聖濟總録治風頭目痛及偏頭痛地龍去土龍腦研𤓰蒂赤小豆馬牙硝各等分𢷬研為細散每一小豆少許吹入鼻内偏頭疼隨左右用含水㗜尤佳芎藭散出聖濟總録治頭目偏痛時多運眩鼻中壅塞不聞香臭芎藭白附子滑石槐芽各三錢細辛去苗葉一錢右為細散入生龍腦半錢匕同研極細每用一匙㗜入鼻中鼢䑕土骨出聖惠方治初發眼風頭疼見本門後患目類川芎散出徳生堂方治初患發眼風頭疼甘菊花川芎荆子各一兩薄荷二兩右為細末以生葱三寸熬黑豆水入茶末少許每服二錢食後調服地龍散出聖濟總録治眼眉骨及頭腦俱痛地龍二錢去土穀精草二錢乳香研一錢右為細末每用半錢於燒香荆子上取炬用紙拈子罩熏鼻中偏痛隨左右用之又方出聖惠方治眼熱毒連眉骨及頭疼壯熱不止川大黄觧毒子木香各三分右為細末以漿水調為膏於生絹上勻攤貼熁乾即易之石膏散出御藥院方治腦熱鼻寒頭目昏腫石膏水飛三錢龍腦一錢另研右為細末每用少許鼻内㗜之選竒湯出衛生寳鑑方治眉骨痛不可忍大有神效羌活防風二錢甘草二錢酒黄芩冬月不用熱甚者用右以粗末每服三錢水二盞煎至一盞去滓温服食後時服之二陳白丸出仁存方治眉心眉稜骨疼及治臂疼或麻木或戰掉二陳湯吞青州白丸子目眵䁾論夫目者腑臟之精華肝之外府津液之道也若腑臟挾熱内重於肝衝𤼵於目使液道熱澁結滯於眥瞼則成眵䁾方羚羊角散出聖濟總録治風熱衝肝上重於目結成眵䁾羚羊角二錢犀角二兩防風去叉牛膝去苖羌活去蘆頭桑根白皮剉五味子生乾地黄焙白蒺䔧炒去角芍藥各三錢右為細散每服二錢水一盞煎至六分不去滓食後臨卧温服澤瀉丸出聖濟總録治臟腑挾熱衝發於目津液結滯而成眵䁾澤瀉茺蔚子絲子酒浸搗别石斛去根地膚子五味子生乾地黄各一兩山芋一兩半細辛去苖葉半兩右為末鍊蜜為丸如梧桐子大每服二十丸空心温服臨卧再服秦皮湯出聖濟總録治目生眵䁾淋洗秦皮去粗皮柴胡去苖黄皮黄連去鬚蛇蛻各二兩苦竹葉二握細辛一兩右麄𢷬篩拌勻每用二兩以水六盞煎取三盞去滓熱淋洗冷即再煖曾青散出危氏方治目生眵䁾宜㸃此藥曾青水晶各一兩真珠龍腦與真珠各等分琥珀半兩右研如粉以銅器收盛臨卧用銅筯㸃如黍米許蕤仁膏出聖濟總録治目眵䁾宜㸃此方蕤仁研馬蹄決眀搗末黄連各一兩黄蘗末二錢右為末用白蜜清者二升和勻入銅器中以油單密封於飯上蒸之飯熟為度取出綿絞去滓後入輕粉二錢龍腦末一分攪和再入銅器中以蠟封口施取如麻子大㸃眼眥頭日再黄連膏出聖濟總録治目多眵䁾黄連去鬚為末蕤仁研各三分乾薑為末膩粉各一分右除膩粉外用牛乳三合漬之一宿明旦於㣲火上煎至一合去滓取清汁入膩粉攪和每用銅筯㸃如黍米許安眥頭日三黄蘗膏出聖濟總録治風熱眥目炙生眵䁾黄蘗剉一兩蕤仁半兩大棗青州者三枚右以水三升同内碟磁噐中慢火煎至一升去滓取清汁再以浄瓷瓶子收每用銅筯㸃眼目三五度療數嵗䁾眼爛眥方出肘後方用枯荷葉中心一把著鐺子中水五升煮用板盖上穿板作孔目臨孔上瘡當痛食頃出淚一二升便瘥目􅉩􅉩論夫目者肝之外府也腑臟氣虚不能上注於目作精華衰弱又為風邪痰飲所攻故使瞻視不明而䀮也或見飛蠅黑花者久成障翳也方藍實丸出聖惠方治肝臟風熱兩目􅉩􅉩視物不明藍實決明子青葙子枳殻黄連去鬚地膚子川大黄剉細㣲炒甘菊花甘草炙㣲赤剉茺蔚子車前子蕤仁湯浸去赤皮羚羊角屑防風去蘆頭生乾地黄細辛赤茯苓半兩肝一具鯉魚膽七右為末鍊蜜和𢷬三二百杵丸如梧桐子大每於食後以清粥飲下二十丸青葙子丸出聖惠方治風熱壅滯眼不得見物日淚出􅉩􅉩不見物青葙子決明子車前子甜葶藶隔紙炒令紫色細辛五味子各半兩麥門冬去心焙一兩生乾地黄枸杞子茺蔚子防風去蘆頭澤瀉地膚子桂心絲子酒浸三日曝乾另𢷬為末已上各半兩肝一具炙乾右為末鍊蜜和𢷬三二百杵丸如梧桐子大每於食後以粥飲下二十丸肝丸出千金方治眼睛􅉩􅉩不明寒則涙出肝痺所損肝一具栢仁子乾地黄茯苓細辛蕤仁枸杞子各一兩六錢防風芎藭薯蕷各二兩車前子二合五味子八錢甘草各半兩兔絲子一合右為末蜜丸如梧桐子大每酒下二十丸日宜服加至四十丸薯蕷散出聖惠方治肝腸風虚眼目昏花􅉩􅉩視不明薯蕷防風去蘆頭山茱萸枳殻人參去蘆頭枸杞子茯苓芎藭覆盆子各一兩甘菊花細辛各三分甘草半兩右為細末散每用服空心以棗湯調下二錢夜臨臥再服川升麻散出聖惠方治腑臟中痰實熱毒衝眼逺視䀮䀮川升麻枳殻麩炒㣲黄去穰黄芩生乾地黄各一兩半夏湯洗七遍杏仁洗浸去皮尖雙仁麩炒㣲黄羚羊角屑細辛各半兩赤茯苓甘草炙㣲赤剉各三兩右為散每服三錢以水一盞入生薑半片苦竹葉二七片煎至六分去滓每於食後温服防風湯出聖濟總録治肝虛寒目視􅉩􅉩防風去叉芎藭白蘚皮各一兩細辛去苖皮甘草炙羌活去蘆頭陳橘皮湯浸去白焙各半兩竹葉十片棗二枚右為七味麄搗篩每服五錢匕水一盞入竹葉棗子同煎至八分去滓下蜜半匙再煎沸食後臨卧温服黄連膏出聖濟總録治目􅉩􅉩不明黄連去鬚一兩蕤仁決明子秦皮各半兩右為末以八合煎至三合以綿濾去滓澄清㸃注眼中日三真珠散出千金方治肝氣寒眼睛􅉩􅉩不見物真珠一兩白蜜二合鯉魚膽魚膽各一枚右合和㣲火煎兩沸綿裹内目中當汁出藥歇更為之車前門冬丸出聖濟總録治膈上風熱上衝眼目􅉩􅉩不明車前子麥門冬去心焙防風去叉枳殻各一兩生乾地黄白茯苓去黑皮各一兩半人參右為細末鍊蜜和丸如梧桐子大每服三十丸食後臨卧粥飲下防風湯出聖濟總録治肝虚寒目暗􅉩􅉩不明視物并生黑花防風去义一兩一錢芎藭甘草炙剉白茯苓去黒皮獨活去蘆頭前胡去蘆頭各一兩人參細辛去苖葉各三分右麄𢷬篩每服五錢以水一盞半棗子二枚劈破同煎至七分去滓食後温服二日龍腦煎出聖惠方治目䀮䀮昏暗赤澁怕日淚出難開龍腦雄黄蕤仁銅緑青鹽膩粉各一分黄丹半兩右都研三兩日可用然後取白