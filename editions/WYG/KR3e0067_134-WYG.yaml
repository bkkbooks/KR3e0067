為末蜜水調下為一服而愈此逼散寒氣然後熱氣上行而汗出乃愈又方出肘後方治隂毒傷寒口鼻冷者乾薑桂各一方温酒三合服之當大熱差凡隂陽二毒不但初得便爾或一二日變作者皆以冷藥治之得此病多死治熱不解而下痢困篤欲死者服此大青湯方大青四兩甘草三兩膠二兩䜴八合赤石脂三兩右以水一斗煮取三升分三服盡更作日夜兩劑愈又方出肘後方右用梔子十四枚薤白一把水五升煮取三升半分為三服又分出肘後方右用龍骨半斤搗碎以水一斗煮取五升使極冷稍飲其間或得汗即愈矣又方出肘後方右用黄連二兩熟艾如鴨卵大以水二升煮取一升頓服立止天行諸痢悉主之又方出肘後方天行諸痢悉主之黄連三兩黄蘖當歸龍骨各二兩右以水六升煮取二升去滓入蜜七合又火煎取一升半分為三服效又方治隂毒傷寒及重感冐風寒頭疼拘急右用口嚼生薑一大塊用二三錢熟酒調服一大盞涎吐汗出即愈又方治隂症右用黒豆一合炒焦酒浸熱飲一碗豆不用被葢汗出即愈老君神白散出余居士選竒方治傷寒隂證白术附子各二兩桔梗細辛甘草各一兩右為細末白湯㸃服隂毒熏法出活人書治隂毒逆冷囊縮者右用大豆三升炒令極熱先以净盆桶内置熱醋三升旋扶病人坐桶上熏少時却以熱豆傾桶中熏之有頃囊下却以隂症藥服之囘陽丹出衛生寳鑑治隂毒傷寒手足厥冷牡蠣燒不􅁅木燒良薑切炒川烏頭炮白芍藥各二錢麝香少許右為細末毎用一錢男病女唾津調塗外腎女病男唾津調塗乳上手陽丹出衛生寳鑑治隂毒傷寒手足厥冷指甲青色體冷脈沈細而微神效右用青葱四五枝陳蜂窠四五箇燒存性為末用青葱搗如泥丸如桐子大手心内握定用手帕𦂳繫定須㬰汗出以綿被覆葢如手心熱甚休教解開如服藥時先服升麻湯五錢出子連鬚葱三枝生薑五片水二大盞煎至一盞去滓温服以被覆之汗出愈海蔵已寒丸出濟生拔萃方治隂症服四逆背冷中發躁而煩渇者或數日大便閉小便澁赤服此上不躁大小便自利肉桂茯苓各五錢良薑烏頭炮各七錢附子炮乾薑炮芍藥茴香炒各一兩右為細末糊為丸如桐子大温酒下空腹食前五七十丸八九十丸亦得酒醋為糊俱可麻黄升麻湯出濟生拔萃方治傷寒隂結不大便六七日大下之結去脈當浮則愈及寸脈沈而遲手足厥冷寸脈沈而遲者少隂本脈故主咽喉不利唾膿血四肢厥者為厥隂利不止為太隂為難治温之則咽痛不可温也麻黄二兩升麻當歸各一兩一分知母三分麥門冬一分去心黄芩三分乾薑芍藥桔梗石膏茯苓甘草白术各一分右㕮咀毎服五錢水煎相次一服汗出止一法出濟生拔萃方治隂症諸藥不效并湯水不下身冷脈絶氣息不知人丁香蓽撥乾薑牡蠣各等分燒粉右用手心中以唾津調如泥以手掩其隂至煖汗出為度温内玉抱肚出衛生寳鑑方治隂毒傷寒川烏細辛良薑天仙子肉桂牡蠣胡椒乾薑各等分右為細末醋糊調塗臍下以綿覆之破棺丹出華陀中蔵經方治厥隂面目俱青心下硬四肢冷脈細而欲絶硫黄一兩酒煑三日硃砂一兩研右為末酒糊丸鷄頭大入室中勿令人知同病人掘一坑深一尺入粟稈火燒坑子極熱醋五升沃令氣出衣被鋪坑以酒化一丸服之後令病人坑上卧少時汗出愈治傷寒隂症脫陽或因大吐大㵼之後四肢逆冷元氣不接不省人事或傷寒新瘥後與婦女交其症小腹𦂳痛外腎搐縮面黒氣喘冷汗自出亦是脫陽症須㬰不治即不效出衛生家寳方葱白炒令熱熨臍下次用附子白术半兩乾薑半兩木香一錢右剉碎用水兩碗煎至八分去滓放冷灌與服須㬰又進一服兩服滓再作一服如無前件藥只用單方用桂皮二兩好酒二升煎至一升候温分作二服灌與如無桂皮只用連鬚葱白三七莖細剉就砂盆中研細用酒五升煮至二升分作三服灌陽氣即囘先更用炒鹽熨臍下氣海之所勿令氣冷為妙治隂毒傷寒煩躁迷悶不治悮人急者出本草右用大附子一箇可半兩者立劈作四片生薑一大塊刀劈作五片如中指長糯米一撮三味以水一升煎取六合去滓如人體温頓服厚衣覆之或汗出或不出候心神定即别服水解散太白通闗散之類不得與冷水如渇更將滓煎與服令人多用有效故詳著之陽毒論夫陽氣獨盛隂氣暴衰隂為陽所勝内外皆陽故為陽毒傷寒有初得病便成陽毒者有服湯藥經五六日以上不差變成陽毒者以病本属陽或以火刼發其汗或因灸焫陽氣轉盛隂氣内消所致其候面赤發躁狂走妄言發斑如錦文咽喉痛疼涕唾膿血或下利黄赤其脈洪實滑促是也歌括陽毒已深脈洪大内外結熱舌卷焦黒鼻中如煙煤宜用水漬法傷寒一二日便成陽毒或服藥吐下後變成陽毒身重腰背痛煩悶不安狂言或走或見鬼或吐血下利赤黄其脈浮大而數面赤斑斑如錦文咽喉疼痛唾膿血五六日可治至六七日不可治陽毒升麻湯主之咽痛𤣥參升麻湯甚者或有踰垣上屋陽毒脈弦洪促數身熱無汗陽毒升麻湯葶藶苦酒湯即醋大黄湯梔子仁湯黒奴丸太乙牛黄膏用竹葉湯調下或研生地龍大者三條入生薑汁薄荷汁生蜜腦子各少許新汲水調灌下可選用之令隂氣復而大汗解矣陽毒大熱煩渇譫語赤斑衂血不止白虎湯一服效陽毒已深脈洪大内外結熱舌卷黒鼻中如煙煤用新汲水浸濕布數重搭於腦上續又換新水浸布漬冷熱勢纔减即止本事方灸結胸巴豆肉七粒黄連七寸搗細津唾調膏安於臍艾灸其上不拘壮數以腹中有聲為效灸畢即以湯蘸軟帛拭之恐或瘡爛此方與集驗神功散一同隂陽二毒但有微氣者皆可灸臍間有聲即得汗解尚藥孫用和破結丹治隂陽伏逆變為結胷五六日大便結攻之不及達之不可以此主之用錦辰砂銀青礞石