body:
  text: 普濟方卷一百三十五明周王朱橚撰傷寒門隂陽毒論夫隂毒盛而陽暴絶則為隂毒若陽毒盛而隂暴絶則為陽毒大凡隂陽離絶非大汗不能復其正氣也六脈俱洪大或沈取之大而不甚疾者非隂症也陽毒其脈當弦而洪數隂毒其脈沈細而疾陽病則身熱而無汗隂病則身冷而有汗岐伯云陽勝則身熱腠理閉喘促為之俯仰汗不出而熱隂勝則身寒汗出數慄而寒寒則厥此症不可以常法治之金匱論陽毒之為病面赤斑斑如錦文咽喉痛唾膿血五日可治七日不可治隂毒之為病面目青身疼狀如被打咽喉痛死生與陽毒同三因云病者頭重頸直皮肉强痺或藴而結核起於喉頸之側布熱毒於皮膚分肉之中上散於髮際下貫顳顬隠隠而熱不相斷離病名黄肉隨以四季各十八戊巳日其病從太陽陽明相隔寒濕不調闗節隔滯若腑虛則皮肉强痺若臓實則布毒熱於皮膚又云病者裏熱外寒意欲守火而反引飲腰痛欲折或胸脇切痛類如刀刺不得轉動熱彭彭服冷多則洞㵼病名黑骨温以冬三月源從足太陽少隂相搏藴積壅塞若腑虛為隂毒所傷則裏熱外寒若臓實為陽毒所損則彭彭發熱又云病者發熱腰痛强急脚縮不伸胻中欲折目中生花或濇濇増寒復熱頸中雙筋牽不得屈伸項直背强眼赤黄欲轉動合身回側病名青筋牽者由春三月其源從厥隂涉足少陽少陽之氣始發少隂之氣始衰隂陽拂欝於腠理腑臓受厲而生若腑虛則為隂邪所傷故發熱若臓實則為陽毒所傷故増寒又云病者脈促身顫掉不能禁或内熱口乾舌破咽塞聲嘶病名赤脈㩌者以夏三月其病從少隂太陽之氣相搏而停則榮衛不通皮肉痛起太陽發動少隂淫邪之氣因而作厲則臓腑隨時受疫病也若腑虛則隂邪所傷則寒戰若臓實為陽毒所侵則内熱矣方治青筋牽三因方鮑氏方肝腑臓温病隂陽毒膽腑虛為邪隂所傷腰脇强急脚縮不伸胻中欲折目中生花色蒼蒼者茈胡去苗五兩茯苓梔子仁半夏湯洗大青各三兩桂心竹茹香豉甘草右㕮咀毎服五錢水二盞薑五斤煎七分去滓空心温服又方三因方鮑氏方肝臓腑温病隂陽毒肝臓實為陽毒所傷濇濇惡寒翕翕發熱頸外雙筋牽不得屈伸項直背强眼赤黄轉動則合身回側色蒼蒼者𤣥參一兩細辛二兩梔子仁黄芩升麻芒硝各三兩石膏煅八兩右剉㪚毎服五錢水二盞入車前草三葉淡竹葉七片煎七分去滓空心服治赤脈㩌三因方鮑氏方心腑臓温病隂陽毒若腑虛為隂邪所勝脈促身顫掉不能禁色昏赤者茯苓人參桔梗各三分甘草一兩半白芷青皮各一兩乾薑炮半兩右剉散毎服五錢以水二盞煎七分去滓食前服又方三因方鮑氏方心腑臓温病隂陽毒心臓實則為陽毒所傷内熱口乾舌破咽塞聲嘶色焦赤者天門冬去心麥門冬去心車前子炒梔子仁黄芩升麻甘草炙寒水石煅各等分右剉散毎服五錢水二盞煎七分去滓食前服治黄肉隨三因方鮑氏方脾腑臓温病隂陽毒胃腑虛則為隂邪所傷頭重頸直皮肉强痺䐜脹色黄黑者厚朴姜製炒一兩半白术陳皮各一兩半乾薑炒紫蘇甘草炙半夏湯洗浴三分右剉散毎服五錢水二盞煎七分去滓食前服又方三因方鮑氏方脾腑臓温病隂陽毒臓實為陽毒所傷藴熱結核起於喉頸之側布毒氣於皮膚分肉之中散入髮際下貫顳顬蓄熱不散色黄者葛根蒼术泔浸升麻白芷桔梗青皮各一兩大黄半兩右剉散毎服五錢水二盞煎七分去滓食前服治白氣狸三因方鮑氏方肺腑臓温病隂陽毒大腸腑虛為隂邪所傷寒熱互作上氣欬逆大腸飱泄色皓皓白者白术人參各一兩乾薑炮麥蘖炒各三分白茯苓五味子肉豆蔲草菓烏梅甘草炙已上各半兩右剉散毎服五錢水盞半煎七分去滓食前服又方三因方鮑氏方肺腑臓温病隂陽毒臓實為陽毒所傷體熱肌膚發班氣喘引飲色昏白者紫苑茸一兩梔子仁升麻前胡各三分石膏煅半兩葶藶炒一分杏仁去皮尖甘草炙各半兩右剉散毎服五錢水二盞煎七分去滓食前服治黒骨温三因方鮑氏方腎腑臓温病隂陽毒膀胱腑虚為隂邪所傷裏熱外寒煩渇引飲反喜守火或腰脇滿痛小便赤黄而與脚俱黑附子炮去皮臍茯苓各一兩山茱茰細辛山藥澤㵼各半兩麻黄三分杏仁去皮尖一分右剉散毎服五錢水二盞煎七分去滓食前服又方三因方鮑氏方腎腑臓温病隂陽毒腎臓實為陽毒所傷腰脇切痛不得轉動大小便閉澁小腹脹食冷則洞泄色薫黒者吳茱茰黒牽牛炒桃仁去皮尖萆薢杜仲去皮剉姜汁製炒絲斷大黄蒸各等分右剉散毎服五錢水二盞煎七分去滓食前服治肝腑臓温病隂陽毒頸背雙筋牽先寒後熱腰强急縮目中生花出千金方桂心一兩白术芒硝大青梔子各三兩茈胡五兩石膏生薑各八兩生地黄香豉各一升右㕮咀以水九升煮取三升分三服治心腑臓温病隂陽毒戰掉不定驚動出千金方大青黄芩梔子知母芒硝各三兩麻黄四兩𤣥參六兩石膏生葛根各八兩生地黄切一升右㕮咀以水九升煮取三升去滓下芒硝分三服治脾腑臓温病隂陽毒頭重頸直皮肉痺結核隠起出千金方大青羚羊角升麻射干芒硝各三兩梔子四兩寒水石六兩𤣥參八兩右㕮咀以水七升煮取三升分三服治肺腑臓温病隂陽毒咳嗽連續聲不絶嘔逆出千金方麻黄梔子紫苑大青𤣥參葛根各三兩桂心甘草杏仁前胡各四兩石膏八兩右㕮咀以水九升煮取三升分三服治腎腑臓温病身面如刺腰中欲折熱毒内傷出千金方茵蔯蒿梔子芒硝各三兩苦參生葛各四兩生地黄石膏各八兩葱白豉一升右㕮咀以水九升煑取二升半下芒硝分三服大交泰丹治隂陽二毒傷寒或因下早亡陽或致結伏胸膈四肢厥冷脈息俱無心躁如火或因冷物傷脾夾臍注痛生硬入胃中滿痞塞及發潮熱并治翻胃噦逆霍亂吐㵼小腸痃癖脇肋氣痛但是隂陽不順惡候傷寒並治之毎服一粒炭火内煅通赤良久取出放冷細研如粉米飲一盞煎至七分温服不拘時隔半時辰再服甚效兼治小兒瘡疹倒壓依法服半粒丹愈金星石銀星石代赭石太隂𤣥精石雲母石白色成片子者禹餘糧石桂府滑石各一兩寒水石吉州者一兩半不灰木色青黒性軟者一兩右同入瓷瓶子内炭火半秤煅火耗一半取出放冷研為細末糯米粥為丸如彈子大候乾依前法服寒水石南人謂之軟石膏一方加麥飯石一兩歸魂散出聖濟總録治隂陽二毒不省人事石膏八兩寒水石四兩附子炮製去皮臍三兩陽起石三兩同石膏寒水石三味搗細研為末和入新礶内煅一伏時出紙鋪地出火毒入四味藥乾薑炮麻黄去節各一兩杏仁二七枚去皮尖雙仁炒研右搗研令勻瓷盒盛冷水調下二錢霹靂散一名黒散子治隂隔陽煩躁不飲水右用附子一枚炮熱取出用冷灰焙細研入真臈茶二大錢和勻為細末毎服分作二服水一盞煎至六分臨熟入蜜半匙取温或冷服之須㬰躁止得睡汗出即差黑龍丹治隂陽二毒傷寒右用舶上硫黄一兩以柳木槌研三兩日巴豆一兩和殻記箇數用二升鐺子一口先安硫黄鋪鐺底次安巴豆又以硫黄葢之釅醋半升已來澆之盞子葢合令𦂳宻更以濕紙周囘固濟縫勿令透氣縫紙乾更以醋濕之文武火熬常著人守之候裏面巴豆作聲數已半為度急將鐺子離火便入臼中急搗令細再以少米醋并蒸餅少許再搗令冷可丸如鷄頭大若是隂毒用椒四十九粒葱白二莖水一盞煎至六分服一丸陽毒用豆豉四十九粒葱白二莖水一盞同煎吞一丸不得嚼破患經五六日方可服之食前喫切在度其病勢可下即與雖及日數病未傳入或未及其日病先在臓亦不可拘執矣有孕婦人亦許服或吐或㵼為候不可喫熱食或覺心頭空以温白粥或服調氣湯散補之欲辨隂陽二毒之病者但始得病唯㸔手足指冷者是隂不冷氣和者是陽若冷至指二三寸者病輕若冷至肘膝為病難理隂陽毒病亦無常也或初病便有毒或服藥經五六日以上或十餘日後不差變成其毒者其候身重背强咽喉痛飲食不下毒氣攻心心腹煩疼氣促四肢厥逆嘔吐體如被打面目青而體冷者隂症也陽毒則不然面目赤身壯熱或便膿血喉疼生班㸃如錦者是也合時忌婦人猫狗見破症奪命湯治隂陽二毒傷寒症候不明下藥錯誤致患人困重垂死七日以後十日以來可服此傳者云千不失一只一服不踰時見效汗自鼻上出儘是應方見傷寒門雜治類丹砂圓出活人書治傷寒隂陽二毒相伏危惡形症硝石半兩太陽石舶上硫黄水銀太隂石𤣥精石各一兩右為末先用無油銚子以文武火炒下諸藥末令一如灰色研如粉麪生薑自然汁浸蒸餅為丸如菉豆大毎服五丸龍腦牛黄生薑蜜水下壓燥也若陽毒􅀥湯下隂毒葱湯下不得於屋底炒一方無太陽石奪命丹出王氏博濟方治隂陽二毒氣衝心硃砂二兩金箔八十片膩粉半兩巴豆八十箇紙裹出油黄蠟二兩右為末煉蠟為丸如鷄頭大如有患者以膩粉一錢米飲一盞調下如人行一里已來其藥動下惡物如藥在其中取出掘一地坑埋三伏時取出除却上面黑物以麝香裹養之如更用時擘為兩處重為丸一粒可療五七人神聖之功卒難序述青蒿散治隂陽二毒傷寒及肢體疼倦右用青蒿八九月候成實多採去枝梗以童子小便浸三兩日漉起酢乾日晒為末毎服三錢水一盞烏梅一箇同煎七分温服隂毒論夫隂氣獨盛陽氣暴衰陽為隂所勝内外皆隂故成隂毒傷寒有初得病便成隂毒者有服湯藥經五六日以上不瘥變成隂毒者以病本属隂自服寒藥過多或臓腑内外受寒隂氣轉盛陽氣不復所致其候四肢逆冷臍腹築痛身如被繫嘔吐下利其脈沈細而疾者是也隂毒已深疾勢困重六脈附骨取之有按之即無一息八至已上或不可數宜用葱熨法灼艾法傷寒初病一二日便結成隂毒或服藥六七日已上至十日變成隂毒身重背强腹中絞痛咽喉不利毒氣攻心心下鞕强氣短不得息躁渇虛汗或時鄭聲嘔逆下利身如被杖唇青面黑四肢厥冷其脈沈細緊數仲景云此隂毒之候五日可治至六七日不可治也隂毒甘草湯主之始得隂毒云隂毒本因腎氣虚寒因慾事或食冷物後傷風内既伏隂外又感寒或先感外寒而伏内隂内外皆隂則陽氣不守遂發頭痛腰重腹痛眼睛疼身體倦怠而不甚熱四肢逆冷額上及手皆冷汗不止或多煩渇精神恍惚如有所失三二日間或可起行不甚覺重診之則六脈俱沈細而疾尺部短小寸口或大六脈浮大或沈取之大而不甚疾者非隂症也若服凉藥過多則渇轉甚躁轉急有此病症者急服還陽退隂二藥即安惟補虛和氣而已宜服正元㪚退隂散五勝散隂症不宜發汗如氣正脈大身熱而未差用藥出汗無妨隂毒為病手足冷腰背强臍腹築痛嘔吐下利身如被杖脈細欲絶此由腎氣虛寒外傷風冷或因冷物傷脾葢脾為太隂内外皆隂則陽氣不守遂成隂毒四肢逆冷額上手背冷汗不止或多煩渇精神如失故岐伯曰隂勝則身寒汗出身常清數慄而寒寒則厥宜服温藥以復其陽氣或於氣海闗元灸之又隂毒漸深積隂感於下則㣲陽消於上其症候沈重四肢逆冷腹痛轉甚或咽喉不利或心下脹滿結硬躁渇虛汗不止或時狂言指甲面色青黑六脈沈細而一息七至以來有此症者速宜於氣海或闗元二穴灸三四百壯以手足和煖為效仍服金液丹來甦丹玉女散還陽散退隂散又隂毒沈困候云沈困之候與前漸深之候皆同而更加困重六脈附骨取之方有按之即無一息八至已上或不可數也至此則藥餌難為功矣但於劑中灼艾如半棗大三百壯以來手足不和煖者不可治也偶復和緩則以前硫黄及熱藥助之若隂氣散陽氣來即漸減熱藥而和治之以取差也詩曰隂毒傷寒身體重背强眼痛不堪任小腹急痛口青黑毒氣衝心轉不禁四肢厥然惟思吐咽喉不利脈細沈若能速灸臍輪下六日㸔過見喜神隂毒身如擊撲然疾沈汗渇痛臍咽身班面赤多煩躁陽毒狂言洪數弦隂氣獨盛陽氣暴絶則為隂毒身冷有汗其脈沈細而疾是也沈而右疾者非初病遽然而成者有服藥數日變而成者葢以腎氣極損生冷傷脾内已伏隂外又感寒或先感外寒後伏隂於内内外皆隂陽氣不守故爾陽氣獨勝隂氣暴絶則為陽毒身熱無汗其脈弦洪促數是也有初病遽然成者葢酒麪過多丹砂僣躁腸胃極熱致之或病症属陽誤投温藥助熱為邪内外皆陽隂氣不守故爾隂陽二毒皆有頭疼微利之症抑隂用熱抑陽用寒固有條例然此二毒隨氣逆上結伏於胸中皆令人心下痛硬非常法所能通也當急作規摹以泄之隂毒泄則陽氣復陽毒泄則隂氣復隂陽升降榮衛流行自然大汗而解矣若心下已結延至六七日間斷不可活外症治法詳於後篇隂毒外症面目唇爪青黑口開氣短咽喉不利手足厥冷身不甚熱痛重如打撲或數慄而寒頭目俱疼腰重背强毒氣攻心心下堅悶腹中絞痛外腎並臍下冷硬額上及手背間冷汗不止嘔吐下利煩渇隂極發躁精神恍惚言語醒醒聲音鄭重舌上黑色隂病囘陽服藥未透亦須外借火氣但無迫脅也生薑並良薑皆能散寒邪發越陽氣亦要藥也隂毒沈細而其疾身冷有汗可與之隂毒甘草湯及白术附子散正陽散肉桂散回陽丹返隂丹天雄散正原散退隂散金液散皆可選而用之則陽氣復而大汗解其汗醫之能精於此用藥療症則無不愈矣大師陳北山方訣治隂毒心下結伏按之極痛大小便閉澀累日用藥不下但出氣稍煖亦可療治急取巴豆肉十粒研爛如麪一錢許捻作一餅堅實安頓臍心用小艾炷灸五七壯覺腹中鳴良久自通利其次用葱白一束𦂳扎切作數餅灸令温實貼於臍下以熨斗火熨其上續又易之漸覺體温即以五積散二錢附子末一錢薑七片弦二枚鹽少許水一大盞煎七分温温服連併二三劑即汗出而瘥又法以大蒜一枚搗研揑作餅子灸熱置於臍心灸十壯大小便即通隂毒已深則灸氣海闗元二穴以手足和為效仍以前項藥濟之若六脈附骨疾勢困甚者臍中可先艾後葱法方訣詳具于前凡治隂毒得陽氣乍復復者皆生煩躁切勿誤投凉藥躁甚與返隂丹輩隂症太隂少隂厥隂皆属隂症也太隂者脾也少隂者腎也厥隂者肝也何謂太隂症太隂脾之經主胸膈䐜脹甲乙經云邪生於陽者得之風雨寒暑邪中於隂者得之飲食居處隂陽喜怒又曰賊風虛邪者陽受之飲食不節起居不時者隂受之陽受之則入腑隂受之則入臓入六腑則身熱不時上為喘呼入五臓則䐜滿閉塞下為飡泄久為腸癖何謂少隂症少隂腎之經主脈微細心煩但欲寐或自利而渇又問經云一二日少隂病者何也謂初中病時腠理寒便入隂經不經三陽也傷寒雖是三隂二陽大抵發於陽則太陽發於隂則少隂也此二經為表裏其受病最為多陽明太隂受病頗稀至於少陽厥隂肝膽之經又加少焉凡病一日至十二三日太陽症不罷者但至太陽有初得病便見少隂症者直攻少隂亦不必先自太陽次傳而至葢寒氣入太陽經即熱而惡寒入少隂經只惡寒而不發熱也三隂中寒微則理中湯稍厥或中寒下利即乾薑湯手足指頭微寒冷謂之清病有此未可喫四逆葢疾輕故也只可服理中乾薑之類大段重者用四逆湯無脈者用通脈四逆湯也何謂厥隂症厥隂肝之經主消渇氣上衝心中疼熱飢不欲食食則吐蚘下之利不止也若隂氣獨盛陽氣暴絶則為隂毒其症四肢逆冷臍腹築痛身如被杖脈沈疾或吐或利當急灸臍下服以辛熱之藥令陽氣復而大汗解矣古人云辛甘發散為陽謂桂枝甘草乾薑附子之類能復其陽氣也微用辛甘甚則用辛苦隂極發躁隂症似陽學者當以脈别之方附子散治隂毒傷寒唇青面黒身重背强四肢逆冷或因服冷藥過度心腹脹滿昏沈不識人一名桂附散附子三分炮製去皮臍桂心白术當歸剉微炒各半兩半夏湯洗七遍去滑乾薑炮製剉天南星炮製木香各一分右搗篩為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候熱服衣覆取汗如人行十里未有汗再服治隂毒傷寒四肢逆冷身體疼痛或時心頭結硬宜服此方附子炮製去皮臍白术甘草炙微赤剉麻黄去根節已上各一兩桂心半兩木香三分右搗篩為散毎服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服衣覆取汗如人行十里未有汗再服烏頭散治隂毒傷寒四肢厥冷脈候沈細心腹脹滿腹中㽲痛咽喉不利遍身疼痛川烏頭一兩炮製去皮臍白术赤芍藥各三分麻黄去根節桂心枳殻麩炒㣲黄去穣當歸剉微炒川椒去目及閉口者微炒去汗乾薑炮製剉已上各半兩右搗麄羅為散毎服五錢以水一大盞入生薑半分煎至五分去滓不計時候熱服衣覆取汗如人行十里未有汗再服麻黄散出聖恵方治隂毒傷寒二三日不得汗煩躁麻黄去根節防風去蘆頭各一兩乾薑炮製剉桂心川烏頭炮製去皮臍各半兩右搗羅為散毎服不計時候以熱酒調下二錢衣覆取汗如人行十里未有汗再服迴陽散出聖恵方治隂毒傷寒川烏頭炮製去皮臍益智子青橘皮湯浸去白穰焙桂心乾薑炮製剉各半兩麻黄一兩去根節右搗為散毎服三錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服衣覆取汗如人行十里未有汗再服白术散出聖恵方治隂毒傷寒心胸滿悶喘促四肢厥逆白术前胡去蘆頭附子炮製去皮臍訶梨勒皮厚朴去粗皮塗生姜汁炙令香熟各一兩桂心三分甘草炙微赤剉五味子乾薑炮製細剉各半兩右