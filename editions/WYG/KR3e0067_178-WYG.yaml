心一兩焙栝樓根二兩茅根竹茹各五兩小麥三合烏梅去核七枚右㕮咀毎服五錢水一盞半煎至一盞去滓温服不拘時天竺黄散出聖恵方治痟渇心神煩躁口乾舌澁天竺一兩細研黄連半兩去鬚梔子半兩研川大黄半兩㣲炒馬牙硝半兩細研甘草一分炙㣲赤剉右為細末毎服二錢煎竹葉水調下食後茯苓湯出聖濟總録治痟渇口乾唇焦心脾臓熱唯欲飲水白茯苓去黒皮麥門冬去心焙各四兩石膏五兩茅根剉一升右㕮咀毎服四錢水一盞半入冬瓜一片同煎去滓温服煎至七分不拘時黄連散出聖恵方治痟渇口舌乾燥煩熱不能飲食宜服黄連二兩去鬚葛根二兩剉麥門冬一兩去心枇杷葉二兩拭去毛炙㣲黄右為細散毎服四錢水一中盞入生薑半分淡竹葉二七片煎至六分去滓不計時候温服鉛霜丸出鄭氏家𫝊渇濁方治痟渇口乾煩燥飲水無度鉛霜半兩青黛栝樓根各一兩龍腦少許右細末令勻煉蜜和丸如梧桐子大毎服二十丸㣲嚼煎竹葉湯下新汲水下亦得食後日三生麥門冬湯治痟渇口乾體瘦枸杞根白皮剉生麥門冬去心乾小麥各一升右三味以水一㪷煮取五升去滓渇即飲之枸杞湯出聖濟總録治痟渇唇乾舌燥枸杞二兩剉石膏一兩碎小麥一兩五錢右㕮咀毎服三錢水一盞煎至七分去滓温服不拘時地黄煎聖濟總録治痟渇口舌乾燥生地黄三斤細切生薑半斤細切生麥門冬二斤去心右一處扵石臼搗爛生布絞取自然汁用銀石器盛慢火熬稀稠得所瓷合貯毎服一匙用温湯化下不拘時冬瓜飲出聖濟總録治痟渇口乾日夜飲水無度渾身壯熱冬𤓰一枚重三斤去皮瓤分作十二片麥門冬二兩去心黄連一兩五錢去心右二味㕮咀作十二服毎服水三盞入冬瓜一片擘碎同煎至一盞去滓温日三夜二服栝樓根丸出聖濟總録治痟渇飲水不止小便中如刺舌乾燥渇喜飲栝樓根五兩黄連一兩去鬚浮萍草二兩右為末用生地黄汁半盞扵石臼内木杵搗令勻再入麵糊丸如梧桐子大毎服三十丸食後臨卧牛乳湯下日三煎菖蒲湯下亦得地骨皮散出千金方治痟渇口乾燥骨節煩熱地骨皮一兩小麥半兩生麥門冬一兩去心右細剉和勻毎服半兩水一盞煎至五分去滓温服食後再服玊夜膏出本事方生津液紫蘇四兩桂一兩甘草二兩炙白梅肉四兩右為末搗白梅為丸如雞頭子大毎服含化三丸甘草湯一名半髓煎聖恵方治痟渇口乾舌燥煩熱宜服此藥羊髓三合甘草一兩炙㣲赤切白蜜二合右先以水一大盞煮甘草至七分去滓後下髓蜜更煎至五七沸毎扵食後温服一合猪膽丸出聖濟總録治口中乾燥無津液而渇雄猪膽五枚定粉一兩右酒煮膽候皮爛即入粉硏細同煎成膏丸如雞頭子大毎服二丸含化津嚥治痟渇口舌乾燥骨節煩熱芭蕉根生右搗絞取汁時飲一二合治痟渇舌焦口乾飲水無度小便數出肘後方野雞一隻右用五味煮令極熟取汁二升半已来去肉取汁渇即飲之肉亦可食一方云細切和鹽豉作􅅅食和血益氣湯一名地黄飲子出試効方治口乾舌乾小便數舌上赤脈此藥生津液除乾燥生肌肉服此藥忌酒醋濕麵房事鹽血杏仁六箇生甘草三分已上二味治口乾舌乾也石膏六分治小便數也黄連酒浸八分治舌上赤脈也生地黄酒浸七分黄栢酒浸一錢柴胡三分當歸稍酒浸四分甘草炙三分升麻一錢紅花少許知母酒浸五分麻黄三分防己酒浸五分𦍑活五分桃仁九箇右㕮咀作一服水二大盞煎至一盞去滓稍熱食後服昔張安撫服此大効酸棗丸出千金方治口乾燥内痟酸棗三升五合酸安石榴子乾五合覆盆子三兩烏梅十枚葛根三兩栝樓根茯苓各三兩半麥門冬四兩石蜜四兩半桂心一兩六錢右為末蜜丸含化不限晝夜口中津液為度復取含無忌之木瓜丸出十便良方生津液止渇思飲食好木瓜二兩烏梅肉半兩茴香炒丁皮白芷各二錢半甘草二錢右為細末煉蜜為丸如弹子大毎服一丸含化橄攬丸生津液壓壅百藥煎一兩白梅一錢檀香二錢蒲黄二錢腦子一分研麝香一分研右件硏勻甘草少許和丸如菉豆大毎服二三丸含化地黄煎丸出聖濟總録治痟渇口乾燥生地黄取汁二升半生栝樓根取汁二升半羊脂碎切半升白蜜一斤黄連一斤去鬚别搗為末右五味先取地黄汁等四味入銀石器内慢火煎令脂消熱傾出將黄連末同搗令得所衆手丸如梧桐子大毎服二十丸粟米飲下日三五服麥門冬丸出聖濟總録治痟渇口乾燥方見本門痟渇飲水過度類栝樓湯一名枸杞湯出聖恵總録治痟渇口乾舌焦精神恍惚方見本門渇利類加减腎氣丸出濟生方治腎水不足心火上炎口舌乾燥多渇引飲肢體消瘦山茱茰取肉白茯苓去皮牡丹皮去木熟地黄酒蒸五味子澤㵼鹿角鎊山藥炒各一兩沈香不見火官桂不見火各半兩右為末煉蜜丸如梧桐子大毎服七十丸鹽湯米飲任下弱甚者加附子一兩兼進黄耆湯參苓飲子出衛生寶鑑治口乾燥生津液思飲食黄耆熟地黄白芍藥五味子麥門冬各三兩去心白茯苓一分甘草半兩人參半兩天門冬半兩去心右為細末毎服三錢水一盞半生薑三片棗二枚烏梅一箇同煎至一盞去滓温服食後蘿蔔煎出聖恵方治痟渇發動飲水無限口乾渇蘿蔔右爛搗絞汁二升任性渇即飲之一方入粳米攪作粥飲喫甚効又方海上名方北五味子右濃煎湯飲之又方海上名方兔絲子右煎汁任意服之渇止為度治痟渇口乾本草方粟米右炊飲食之良治痟渇飲水日夜不止口乾小便數本草方田中螺五升右以水一斗浸經宿渇飲之毎日一度易水換生螺為妙除煩止悶口乾渇疾止怒令人喜本草方蓮藕右以生硏服之治痟渇口乾本草方小麥右炊作飯及煮粥食之普濟方卷一百七十八
