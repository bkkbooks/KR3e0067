body:
  text: 普濟方卷一百二十八明周王朱橚撰傷寒門辨陽明證并治第八問曰病有太陽陽明有正陽陽明有少陽陽明何謂也荅曰太陽陽明者脾約是也陽明胃也邪自太陽經傳之入府者謂之太陽陽明經曰太陽病若吐若下若發汗後微煩小便數大便因鞕者與小承氣湯即是太陽陽明脾約病也正陽陽明者胃家實是也邪自陽明經傳入府者謂之正陽陽明經曰陽明病脈遲雖汗出不惡寒其身必重短氣腹滿而喘有朝熱者外欲解可攻裏也手足濈濈然汗出者此大便已鞕也大承氣湯主之即是正陽陽明胃家實也少陽陽明者發汗利小便已胃中燥煩實大便難是也邪自少陽經傳之入府者謂之少陽陽明經曰傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則讝語此属胃即是少陽陽明病也陽明之為病胃家實也邪傳入胃熱毒留結則胃家爲實華佗曰熱毒入胃要須下去之不可留于胃中是知邪在陽明為胃家實也問曰何縁得陽明病荅曰太陽病發汗若下若利小便此亡津液胃中乾燥因轉属陽明不更衣内實大便難者此名陽明也本太陽病不解因汗利小便亡津液胃中乾燥太陽之邪入府轉属陽明古人登厠必更衣不更衣者通為不大便不更衣則胃中物不得泄故爲内實胃無津液加之畜熱大便則難為陽明裏實也問曰陽明病外證云何荅曰身熱汗自出不惡寒反惡熱也陽明病為邪入府也邪在表則身熱汗出而惡寒邪既入府則表證已罷故不惡寒但身熱汗出而惡熱也問曰病有得之一日不發熱而惡寒者何也荅曰雖得之一日惡寒將自罷即自汗出而惡熱也邪客在陽明當發熱日而不惡寒今得之一猶不發熱而惡寒即邪未全入府尚帶表熱邪若表邪全入則更無惡寒必自汗出惡問曰惡寒何故自罷荅曰陽明在中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也胃為水榖之海主養四旁四旁有病皆能傳入于胃入胃則更不復傳如太陽之入胃則更不傳陽明陽明病傳之入胃則更不傳少陽少陽病傳之入胃則更不傳三隂本太陽初得病時發其汗汗先出不徹因轉属陽明也傷寒傳經者則一日太陽二日陽明此太陽傳經故曰轉属陽明傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉属陽明也傷寒發熱無汗嘔不能進食者太陽受病也若反汗出濈濈然者太陽之邪轉属陽明也經曰陽明病法多汗傷寒三日陽明脈大傷寒三日邪傳陽明之時經曰尺寸俱長者陽明受病當二三日發陽明氣血俱多又邪倂於經是以脈大傷寒脈浮而緩手足自温者是為繫在太隂太隂身當發黄若小便自利者不能發黄至七八日大便鞕者為陽明病也浮為陽邪緩為脾脈傷寒脈浮緩太隂客熱邪在三陽則手足熱邪在三隂則手足寒今手足自温是知繫在太隂也太隂上也為邪蒸之則色見于外當發身黄熱小便自利者熱不内畜不能發黄至七八日大便鞕者即太隂之邪入腑轉属陽明也傷寒轉繫陽明者其人濈然微汗出也傷寒則無汗陽明多汗此以傷寒邪轉繫陽明故濈然微汗出也陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而𦂳若下之則腹滿小便難也脈浮在表𦂳為裏實陽明中風口苦咽乾腹滿微喘者熱傳於裏也發熱惡寒者表仍未解若下之裏邪雖去表邪復入于裏又亡津液故使腹滿而小便難陽明病若能食名中風不能食名中寒陽明病以飲食別受風寒者以胃為水糓之海風為陽邪陽殺糓故中風者能食寒為隂邪不殺糓故傷寒不能食陽明病若中寒不能食小便不利手足濈然汗出此欲作固瘕必大便初鞕後溏所以然者胃中冷水糓不别故也陽明中寒不能食者寒不殺糓也小便不利者津液不化也陽明病法多汗則周身汗出此手足濈然而汗出而身無汗者陽明中寒也固瘕者寒氣結積也胃中寒甚欲留結而為固瘕則津液不得通行而大便必鞕者若汗出小便不利者為實也此以小便不利而水糓不別雖大便初鞕後必溏也陽明病欲食小便反不利大便自調其人骨節疼翕翕如有熱状奄然發狂濈然汗出而解者此水不勝糓氣與汗共併脈𦂳則愈陽病客熱初傳入胃胃熱則消糓而欲食陽明病熱為實也則小便當數大便當鞕今小便反不利大便自調者熱氣散漫不為實也欲食則胃中糓多内經曰食入於隂長氣於陽糓多則陽氣勝熱消津液則水少經曰水入於經其血乃成水少則隂弱矣金匱要略曰隂氣不通則骨疼其人隂發氣不足也熱甚於表者翕翕發熱熱甚於裏者蒸蒸熱此熱氣散漫不専著於表裏故翕翕如有熱状奄忽也忽然發狂者隂不勝陽也内經曰隂不勝其陽者則脈流薄疾并乃狂陽明藴熱為實者則須下之愈熱氣散漫不為實者必待汗出而愈故云濈然而汗出解也水榖之等者隂陽氣平也水不勝榖氣是隂不勝陽也汗出則陽氣衰脈𦂳則隂氣盛隂陽氣平兩無偏勝則愈故云與汗共脈𦂳則愈陽明病欲解時從申至戌上四月為陽主上旺於申酉戌向旺時是為欲解陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虚故其熱必噦不能食胃中本寒攻其熱復虚其胃虛寒相搏故噦也經曰闗脈弱胃氣虚有熱不可大攻之熱去則寒起此之謂也陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作榖疸雖下之腹滿如故所以然者脈遲故也陽明病脈遲則邪方入裏熱未為實也食入于隂長氣於陽胃中有熱也食難用飽飽則微煩而頭眩者糓氣與熱氣相搏也兩熱相合消損津液必小便難利者不能發黄言熱得泄也小便不利則熱不得泄身必發黄㡺黄也以其發於熱故名糓疸熱實者下之則愈脈遲者熱氣未實雖下之腹滿亦不減也經曰脈遲未可以攻陽明病法多汗其身如蟲行皮中状者以此乆虚故也胃為津液之府氣虚津液少病則反無汗胃候身之肌肉其身如蟲行皮中者知胃氣乆虚也陽明病反無汗而小便利二三日嘔而欬手足厥者必苦頭痛若不欬不嘔手足不厥者頭不痛陽明病法多汗反無汗而小便利者陽支明傷寒而寒氣内攻也至二三日嘔欬厥者寒邪發於外也必苦頭痛若不欬不嘔手足不厥者是寒邪但攻裏而不外發其頭亦不痛也陽明病但頭眩不惡寒故能食而欬其人必咽痛若不欬者咽不痛陽明病身不重痛但頭眩而不惡寒者陽明中風風而風氣内攻也經曰陽明病若能食名中風邪攻胃胃氣上逆則欬咽門者胃之系欬甚則咽傷故必咽痛若胃氣不逆則不欬其咽亦不痛也陽明病無汗小便不利心中懊憹者身必發黄陽明病無汗而小便不利者熱藴於内而不得越心中懊憹者熱氣欝蒸欲發於外而為黄也陽明病被火額上微汗出小便不利者必發黄陽明病則為内熱被火熱相合而甚若遍身汗出而小便利者熱得泄越不能發黄今額上下汗出而小便不利則熱不得越欝蒸於胃必發黄也陽明病脈浮而𦂳者必潮熱發作有時但浮者必盜汗出浮為在經𦂳者裏實脈浮而𦂳者表熱裏實也必潮熱發作有時若脈但浮而不𦂳者止是表熱也必盗汗者睡而汗出也陽明病裏熱者自汗表熱者盜汗陽明病口燥但欲潄水不欲嚥者此必衂陽明之脈起於鼻絡於口陽明裏熱則渴欲飲水此口燥但欲潄水不欲嚥者是熱在經而裏無熱也陽明氣血俱多經中熱甚廹血妄行必作衂也陽明病本自汗出醫更重發汗病已差尚微煩不了了者此大便必鞕故也以亡津液胃中乾燥故令大便鞕當問其小便日幾行若本小便日三四行今日再行故知大便不乆出今為小便數少以津液當還入胃中故知不乆必大便也先亡津液使大便鞕小便數少津液分則大便必自下也傷寒嘔多雖有陽明證不可攻也嘔者熱在上焦未全入腑故不可下陽明病必下鞕滿者不可攻之攻之利遂不止者死止者愈陽明病腹滿者為邪氣入府可下之心不鞕滿則邪氣尚淺未全入府不可便下之得止者利為邪氣去正氣安則愈若因下利不止者為正氣脱而死陽明病面合赤色不可攻之必發熱色黄小便不利也合通也陽明病面色通赤者熱在經也不可下之下之虚其胃氣耗其津液經中之熱乗虚入胃必發熱色黄小便不利也陽明病不吐不下心煩者可與調胃承氣湯吐後心煩謂之内煩下後心煩謂之虗煩今陽明病不吐不下心煩即是胃煩欝熱也與調胃承氣湯以下欝熱陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裏也手足濈然而汗出者此大便已鞕也大承氣湯主之熱汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下陽明病脈遲若脉出多微發熱惡寒者表未解也若遲雖汗出而不惡寒表證罷也身重短氣腹滿而喘有潮熱者熱入府也四肢諸陽之本津液足為熱蒸之則周身汗出津液不足為熱蒸之其手足濈然而汗出知大便已鞕也與大承氣湯以下胃熱經曰潮熱者實也其熱不潮是熱未成實故不可與大承氣湯雖有腹大滿不通之急亦不可與大承氣湯與小承氣湯微和胃氣大承氣湯方大黄四兩苦寒酒洗厚朴半觔苦温炙去皮枳實五枚苦寒炙芒硝三合醎寒内經曰燥淫所勝以苦下之大黄枳實之苦以潤燥除熱又曰燥淫於内治以苦温厚朴之苦下結燥又曰熱淫所勝治之鹹寒芒硝之鹹以攻藴熱右四味以水一斗先煑二物取五升去滓内大黄煑取二升去滓内芒硝更上火微一兩沸再服得下餘勿服小承氣湯方大黄四兩厚朴二兩炙去皮枳實三枚大者炙大熱結實者大承氣湯小熱微結者與小承氣湯以熱不大甚故於大承氣湯去芒硝又以結不至堅故亦減厚朴枳實也已上三味以水四升煑取一升二合去滓分温二服初服湯當更衣不爾者盡飲之若更衣者勿服之陽明病潮熱大便微鞕者可與大承氣湯不鞕者不與之若不大便六七日恐有燥屎欲知之法少與小承氣湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣者此但初頭鞕後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便腹鞕而少也以小承氣湯和之不轉失氣者慎不可攻也朝熱者實得大便微鞕者便可攻之若不鞕者則熱未成實雖有朝熱亦未可攻也若不大便六七日恐有燥屎當先與小承氣湯順之若無燥屎小承氣湯熱勢緩不能宣泄必轉氣下失若不轉氣是胃中無燥屎但恐其初頭鞭後必溏攻之則虗其胃氣致腹脹滿不能食也胃中乾燥則欲飲水水入胃中虗寒相搏氣逆則噦其後却發熱者則熱氣乗虗還腹聚於胃中胃燥得熱必大便復鞕而少與小承湯微利以和之故又重云不轉失氣不可攻之謹慎之至夫實則讝語虚則鄭聲重語也内經曰凡邪氣盛則實精氣奪則虗讝語由邪氣盛而神識昏也鄭聲由精氣奪而聲不全也讝語者言語不次也鄭聲者鄭聲不正也論語云惡鄭聲之亂樂又曰放鄭聲逺佞人鄭聲淫佞人殆言鄭聲不正也今新差氣虗人聲轉者是所謂重語也若聲重亦聲轉也直視讝語喘滿者死下利者亦死直視讝語邪勝也喘滿為氣上脱下利為氣下脱是皆主死發汗多若重發汗者亡其陽讝語脉短者死脈自和者不死亡陽胃燥讝語者脈短津液已絶不可復治脈自和為主氣未衰而猶可生也傷寒若吐若下後不解不大便五六日上至十餘日日脯所發潮熱不惡寒獨語見鬼狀若劇者發則不識人循衣摸牀惕而不安微喘直視脈弦者生濇者死微而未至於劇而但發熱讝語者可與大承氣湯主之若下一服利則止後服若吐下皆傷胃氣不大便五六日上至十餘日者亡津液胃氣虗邪熱内結也陽明生於申酉戌日脯所發潮熱者陽明熱甚也不惡寒者表證罷也獨語如見鬼状者陽明内實也以為熱氣有餘若劇者是熱氣甚大也大熱甚於内昏冐正氣使不識人至於循衣摸床惕怖不安微喘直視傷寒陽勝而隂絶者死隂勝而陽絶者死熱劇者為陽勝脈弦為隂有餘澁為隂不足陽熱雖劇脈弦知隂未絶即猶可生脈澁則絶隂故不可治其邪熱微而未至於劇者但發熱讝語可與大承氣湯以下胃中熱經曰凡服下藥中滿即止不必盡劑此以熱未劇故云若一服利則止後服陽明病其人多汗以津液外出胃中燥大便必鞕鞕則讝語小承氣湯主之若一服譫語止更莫復服亡津液胃燥大便鞕而讝語雖無大熱内結亦須與小承氣湯和其胃氣得一服不讝語則胃燥以潤更莫復與承氣湯本無實熱故也陽明病讝語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉氣者更服一升若不轉失氣勿更與之明日不大便脈反微澁者裏熱也為難治不可更與承氣湯也陽明病讝語發潮熱若脈沉實者内實也則可下若脈滑之疾為虗熱未實則未可下先與小承氣湯和之湯入腹中轉失氣者中有燥屎可更與小承氣湯一升以除之若不轉而失氣者是無燥屎不可更與承氣湯至明日邪氣傳時脈得沉實𦂳牢之類是裏熱也反得㣲澁者裏氣大虚也若大便利後脈㣲澁者止為裏虚而尤可此不曽大便脈反微澁是正氣内衰為邪勝故云難治陽明病讝語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但鞕尒宜大承氣湯下之讝語潮熱為胃熱當消谷引食反不能食者胃中有燥屎而胃中實也若能食者胃中虚熱雖鞕不得為有燥屎雜病虚為不欲食實為欲食傷寒則胃實熱甚者不能食胃中虚熱甚者能食與雜病為異也大承氣湯以下燥屎逐結熱陽明病下血讝語者此為熱入血室但汗出者刺期門隨其實而瀉之濈然汗出則愈陽明病熱入血室廹血下行使下血讝語陽明病法多汗以奪血者無汗故但頭汗出也刺期門以散血室之熱隨其實而瀉之以除陽明之邪熱散邪除熱榮衞得通津液得復濈然汗出而解汗出讝語者以有燥屎在胃中此爲風也須下之過經乃可下之下之若早語言必亂以表虚裏實故也下之則愈宜大承氣湯胃中有燥屎則讝語以汗出為表未罷故云風也燥屎在胃則當下以表未和則未可下須則過太陽經太陽無表證乃可下之若下之早燥屎雖除表邪乗虚復陷於裏為表虚裏寔胃虚熱甚語言必亂與大承氣湯却下胃中邪熱則止傷寒四五日脈沉而喘滿沉在裏而反發其汗津液越出大便爲難表虛裏實乆則讝語邪氣入内之時得脈沉而喘滿裏證具也則當下之反發其汗令津液越出胃中乾燥大便必難乆則屎燥胃實必發讝語三陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿發汗則讝語下則額上生汗手足逆冷若自汗出者白虎湯主之腹滿身重難以轉側不仁讝語者陽明也針經曰少陽病甚面則微塵此面垢者少陽也遺屎者太陽也此三者以陽明證多故出陽明篇中三陽合病爲表裏有邪若發汗攻表則燥熱益甚必愈讝語若下之攻裏表熱乗虚内陷必額上汗出手足逆冷其自汗出者三陽經熱甚也内經曰熱則腠理開榮衞通汗大泄與白虎湯以解内外之熱二陽併病太陽證罷但發潮熱手足漐漐汗出大便難即讝語者下之則愈宜大承氣湯本太陽病併於陽明名曰併病太陽證罷是無表證但發潮熱是熱併陽明一身汗出爲熱越今手足漐漐汗出是熱聚於胃也必大便難而讝語經曰手足漐漐然而有汗出者必大便已鞕也與大承氣湯以下胃中實熱陽明病脈浮而𦂳咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則燥心憒憒反讝語若加燒針必怵惕煩躁不得眠若下之則胃中空虚客氣動膈心中懊憹舌上胎者梔子豉湯主之脈浮發熱為邪在表咽燥口苦為熱在經脈𦂳腹滿而喘汗出不惡寒反惡熱重身為邪在裏此表裏俱有邪猶當雙解之若發汗攻表表熱雖除而内熱益甚故躁而憒憒反讝語憒憒也心亂經曰榮氣微者加焼針血不行更發熱而躁煩此表裏有熱若加雖焼針則損動隂氣故怵惕煩躁不得眠也若下之裏熱去則胃中空虚表中客邪之氣乗虗䧟於上焦煩動於膈使心中懊憹而不了了也舌上胎黄者熱氣客於胃中舌上胎白知熱氣容于胷中與梔子䜴湯以吐胃中之邪若渇欲飲水口乾舌燥者白虎加人參湯主之若下後邪熱客於上焦者為虚煩此下後邪熱不客於上焦而客於中焦者是為乾燥煩渇與白虎加人參湯散熱潤躁若脈浮發熱渇欲飲水小便不利者猪苓湯主之此下後客熱客於下焦者也邪氣自表入裏客於下焦三焦俱帶熱也脈浮發熱者上焦熱也渇欲飲水者中焦熱也小便不利者邪客下焦津液不得而通也與猪苓湯利小便以瀉下焦之熱也猪苓湯方猪苓去皮甘平茯苓甘平阿膠甘平滑石碎甘寒澤瀉甘醎寒各一兩甘甚而反淡淡味滲泄為陽猪苓茯苓之甘以行小便醎味湧泄為隂澤瀉之醎以泄伏水滑利竅阿膠滑石之滑以利水道右四味以水四升先煑四味取二升去滓内下阿膠烊消温服七合日三服陽明病汗出多而渇者不可與猪苓湯以汗多胃中燥猪苓湯復利其小便故也針經曰水糓入於口輸於腸胃其液别為五天寒衣薄則為溺天熱衣厚則為汗是汗溺一液也汗多津液外泄胃乾燥故不與猪苓湯也脈浮而遲表熱裏寒下利清糓者四逆湯主之浮為表熱遲為裏寒下利清糓者裏寒甚也與四逆温裏散寒若胃中虚冷不能食者飲水則噦噦者咳逆是也千金曰咳逆者噦逆之名胃中虚冷得水則水寒相搏胃氣逆而噦脈浮發熱口乾鼻燥能食者則衂脈浮發熱口乾鼻燥者熱在經也能食者裏和也熱甚於經迫血為衂胃中虚冷隂勝也水入於經其血乃成飲水者助隂氣逆為噦噦必發熱口乾陽勝也食入於隂長氣於陽能食者助陽血妄為衂三者偏隂偏陽之疾也陽明病下之其外有熱手足温不結胷心中懊憹饑不能食但頭汗出者梔子䜴湯主之表未罷而下之應邪熱内陷也熱内陷者則外熱而無手足温者熱雖内陷然而不深故不結胸心中懊憹不能食者熱客胸中為虚煩也熱自胸中薰蒸於上故但頭汗出而身無汗與梔子䜴湯以吐胸中之虚煩也陽明病發潮熱大便溏小便自可胸脇滿不去者小柴胡湯主之陽明病潮熱為胃實大便鞕而小便數今大便溏而小便自可則胃虛未實故便溏而水糓不别也大便溏者應氣降而胸脇滿去今反不去者邪氣猶在半表半裏之間與小柴胡湯以去表裏之邪陽明病脇下鞕滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也陽明病腹滿不大便舌上胎黄為邪熱入腑可下若脇下鞕滿雖大便而嘔舌上白胎者為邪未入腑在表裏之間與小柴胡湯以和解之上焦既通則嘔止津液得下則胃氣得和汗出而解陽明中風脈弦浮大嘘而短氣腹都滿脇下及心痛手按之氣不通鼻乾不得汗嗜卧一身及面目悉黄小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黄湯若不尿腹滿加噦者不治浮天為陽風在表也弦則為隂風在裏也短氣腹滿脇下及心痛風熱壅於腹中而不痛也若寒客於中而痛者按之則寒氣散而痛止此以風熱内壅故雖久按而氣亦不通也陽明病鼻乾不得卧自汗出者邪在表也此鼻乾不得汗而嗜卧者風熱内攻不在表也一身面目悉黄小便難有潮熱時時噦者風熱攻於胃也陽明之脈出大迎循煩車上耳前過客主人熱勝則腫此風熱在經故耳前後腫刺之經氣通腫則小差如此者外證罷則可攻若外證不解雖過十日脈續浮者邪氣猶在半表裏與小柴胡湯以和解之若其脈但浮而不弦大無諸裏證者是邪但在表也可與麻黄湯以發其汗若不尿腹滿加噦者闗格之疾也故云不治難經曰闗格者不得盡其命而死陽明病自汗出若發汗小便自利者此為津液内竭雖鞕不可攻之當須自欲大便宜蜜煎導而通之若土𤓰根及與大猪膽汁皆可為導津液内熱故不可攻宜以藥外治而導引之蜜煎導方蜜七合一味内銅器中微火煎之稍凝似飴状攪之勿令焦着欲可丸併手捻挺令頭鋭大如指長二寸許當熱時急作冷則硬以内榖道中以手急抱欲大便時乃去之猪膽汁方大猪膽一枚瀉汁和醋少許以灌榖道中如一食頃當大便出陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明病脈遲汗出多尚有邪在裏以微惡寒知表未解與桂枝湯和表陽明病脈浮無汗而喘者發汗則愈宜麻黄湯陽明傷寒表實脈以而喘也與麻黄湯發汗陽明病發熱汗出此為熱越不能發黄也但頭汗出身無汗劑頸而還小便不利渴引水浆者此為瘀熱在内身必發黄茵蔯湯主之但頭汗出身無汗劑頸而還者熱不得越也小便不利渇引水浆者熱甚於胃津液内竭也胃為土而色黄胃為熱蒸則色奪於外必發黄也與茵蔯湯逐熱退黄茵蔯蒿湯方茵蔯蒿六兩苦微寒梔子十四枚劈苦寒大黄二兩去皮苦寒小熱之氣凉以和之大熱之氣寒以取之茵蔯梔子之苦寒以逐胃燥宜下必宜苦以補必以酸大黄之苦寒以下瘀熱也右三味以水一斗先煑茵蔯減六升内二升煑取三升去滓分二服小便當利尿如皂角汁状色正赤一宿復減黄從小便去也陽明證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖鞕大便反易其色必黒宜抵當湯下之内經曰血并於下亂而喜忘此下本有久瘀血所以喜忘也津液少大便鞕以蓄血在内屎雖鞕大便反易其色黒也與抵當以下瘀血也陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭鞕後必溏不可攻之若有燥屎者宜大承氣湯下後心中懊憹而煩者虚煩也當與梔與子䜴湯若胃中有燥屎者非虚煩也可大承氣湯下之其腹微滿初鞕後溏是無燥屎此熱不在胃而在上也故不可攻病人不大便五六日繞臍痛煩躁發作有時燥屎故使不大便也不大便六七日者則大便必結為燥也胃中燥實不得下通故繞臍痛煩燥發也病人煩熱汗出則解又如瘧状日晡發熱者属陽明也脈實者宜下之脈浮虚者宜發汗下之與大承氣湯發汗宜桂枝湯雖得陽明證未可便為裏寔審脈候以别内外其脈實者熱已入腑為胃實與大承氣湯下之其脈浮虚者是熱未入腑猶在表也可與桂枝湯發汗則愈大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者有宿食故也宜大承氣湯大下之後則胃弱不消榖至六七日不大便則宿食已結不消故使煩熱不解而腹滿痛是知有燥屎也與大承氣湯以下除之病人小便不利大便乍難乍易時有微熱喘冐不能卧者有燥屎也宜大承氣湯小便利大便鞕此以有燥屎小便不利而大便或乍難乍易胃熱者發熱喘冐無時及嗜卧也此燥屎在胃故時有微熱喘冐不得卧也與大承氣湯以下燥屎食榖欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也上焦主内胃為之主食榖欲嘔者胃不受也與吳茱萸湯以温胃氣得湯反劇上焦不内也以治上焦之法治之吳茱萸湯方吳茱萸一升冼辛熱人參三兩甘温生薑六兩切辛温大􅀥十二枚擘甘温内經曰寒淫於内治以甘熱佐以苦辛吳茱萸生姜之辛以温之右四味以水七升煑取二升去滓温服七合日三服太陽病寸緩闗浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不汗者病人不惡寒而渇者此轉屬陽明也小便數大便必鞕不更衣十日無所苦也渇欲飲水少少與之但以法救之渇者宜五苓散太陽病脈陽浮隂弱為邪在表今寸緩闗浮尺弱氣漸傳裏則發熱汗出復惡寒者表未解也傳經之邪入裏裏不和也不嘔但心下痞者醫下之早邪氣留于心下也如其不汗者必漸不惡寒而渇太陽之邪轉屬陽明也若吐若下若發汗後小便數大便鞕者當與小承氣湯和之此不因吐下發汗後小便數大便鞕若是無滿實雖不更衣十日無所苦也俟津液還胃中小便數少大便必自出也渇飲水者少少與之以潤胃氣但審邪氣所在以法救之如渇不止以五苓散是也脈陽微而汗出少者為自和也汗出多者為太過脈陽微者邪氣少汗出少者為適當故自和汗出多者反損正氣是汗太過也陽脈實因發其汗出多者亦為太過太過為陽絶於裏亡津液大便因鞕也陽脈實者表熱甚也因發汗乘熱虚蒸津液外泄致汗出太過汗出多者亡其陽陽絶於裏腸胃中乾燥大便因鞕也脈浮而芤浮為陽芤為隂浮芤相搏胃氣生熱其陽則絶浮芤相搏隂陽不諧胃氣獨治欝而生熱消爍津液為其陽絶也跌陽脈浮而澁浮則胃氣強澁則小便數浮澁相搏大便則難其脾為約麻仁丸主之跌陽者脾胃之脈診浮為陽知為氣強澁為隂知脾為約約者儉約之約又約束之約内經曰飲入於胃㳺溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸於膀胱水精四布五經並行是脾主為胃行其津液者也今胃強脾弱約未津液不得四布但輸膀胱致小便數大便難與脾約丸通腸潤燥麻仁丸麻子仁二升甘平芍藥半觔酸平枳實半觔炙苦寒大黄一觔去皮苦寒厚朴一觔去皮苦寒杏仁去皮尖熬别作脂甘温内經曰脾欲緩急食甘以緩之麻子杏仁之甘緩脾而潤燥津液不足以酸收之芍藥之酸以歛津液腸燥胃強以苦泄之枳實厚朴大黄之苦下燥結而泄胃強也右六味為末煉蜜為丸桐子大飲服十丸日二服漸加之以知為度太陽病三日發汗不解烝烝發熱者屬胃也調胃承氣湯下之烝烝者如熱薫烝言甚熱也太陽病三日發汗不解則表邪已罷烝烝發熱胃熱為甚與調胃承氣湯下胃熱傷寒吐後腹脹滿者與調胃承氣湯内經曰諸脹腹大皆屬於熱熱在上焦則吐後不觧復腹脹滿者邪熱入胃也與調胃承氣湯下其胃熱太陽病若吐若下若發汗微煩小便數大便因鞕者與小承氣湯和之愈吐下發汗皆損津液表邪乗虚傳裏大煩者邪在表微煩者邪入裏也小便數大便因鞕者其脾約也小承氣湯下和之愈得病二三日脈弱無太陽柴胡證煩躁心下鞕至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭鞕後必溏未定成鞕攻之必溏須小便利屎定鞕乃可攻之宜大承氣湯針經曰脈軟者病将下弱隂脉當責邪在裏得病二三日脈弱是日數雖淺而邪氣已入裏也無太陽證為表證已罷無柴胡證為無半表半裏之證煩躁心下鞕者邪氣内甚也胃寔熱甚則不能食胃虚熱至四五日雖能食亦當與小承氣湯微和之至六日則熱甚與大承氣湯一升不大便六七日小便多者為津液内竭大便必鞕則可下之小便少者則胃中水榖不别必初鞕後溏雖不能食為胃實以其小便少則未定成鞕亦不可攻須小便利屎定鞕乃可攻之傷寒六七日凢目中不了了睛不和無表裏證大便難身微熱者此為實也急下之宜大承氣湯内經曰諸脈者皆屬於目傷寒六七日正邪氣入裏之時目中不了了睛不和者邪熱内甚上熏於目也無表裏證大便難者裏實也身大熱者表熱也微熱者裏熱也針經曰熱病目不明熱不已者死此目中不了了睛不和則證近危惡也須急與大承氣湯下之陽明發熱汗多者急下之宜大承氣湯邪熱入腑外發熱汗多者熱迫津液将竭急與大承氣湯以下其腑中之熱也發汗不解腹滿痛者急下之宜大承氣湯發汗不解邪熱傳入腑而成腹滿痛者傳之迅也是須急下之腹滿不減減不足言不當下之宜大承氣湯腹滿不減邪氣實也經曰大滿大實自可除之大承氣湯下其滿實若腹滿時減非内實也則不可下金匱要略曰腹滿時減復如故此為寒當與温藥是減不足言也陽明少陽合病必下利其脈不負者順也負者失也互相尅賊名為負也脈滑而數者有宿食也當下之宜大承氣湯陽明土少陽水二經合病氣不相敵則必下利少陽脈不勝陽明不負是不相尅為順也若少陽脈勝陽明脈負者是鬼賊相尅為正氣失也脈經曰脈滑者為病實也又曰滑數則胃氣實下利者脈當微厥冷脈滑數知胃有宿食大承氣湯以下除之病人無表裏證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消榖善飢至六七日不大便者有瘀血宜抵當湯七八日邪入腑之時病人無表裏證但發熱雖脈浮於數亦可與大承氣湯下之浮為熱客于氣數為熱客血下之邪熱去而其浮數之脈俱當解若下後數脈去而脈但浮則是榮血間熱併於冐氣間也當為邪氣獨留心中則飢邪熱不殺榖潮熱發渇之證此下之後浮脈去而數不解則是胃氣間熱合於榮血間也熱氣合併迫血下行胃虗協熱消榖喜飢血至下焦若大便利者下血乃愈若六七日不大便則血不得行蓄積於下為瘀血與抵當湯以下去之若脈數不解而下不止必脇熱而便濃血也下後脈數不解而大便者是熱不得泄蓄血於下為瘀血也若下後脈數不解而下利不止者為熱得下泄迫血下行必便濃血傷寒發汗已身目為黄所以然者以寒濕在裏不解故也以為不可下當於寒濕中求之金匱要略曰黄家所起從濕得之汗出熱去則不能發黄發汗已身目為黄者風氣去濕氣在也脾惡濕濕氣内着脾色外奪者身目為黄若瘀血在裏發黄者則可下所以寒濕在裏故不可下當從寒濕法治之傷寒七八日身黄如橘子色小便不利腹微滿者茵蔯蒿湯主之當熱甚之時身黄如橘子色是熱毒發泄於外内經曰膀胱者津液藏焉氣化則能出小便不利小腹滿者熱氣甚於外而津液不得下行也與茵蔯湯利小便退黄逐熱傷寒身黄發熱者梔子蘗皮湯主之傷寒身黄胃有瘀熱當須下去之此以發熱為熱未實與梔子蘗皮湯解散之夫傷寒二日陽明受病陽明病熱者胃中寒宜桂枝湯太陽病而發汗汗雖出復不解者轉屬陽明也宜麻黄湯陽明病若小便少者津液當還入胃中故也凡發汗太過故令大小便難若陽明病當心下𦂳滿不可汗太過宜半夏湯陽明病若汗出多而微惡寒為外未解無潮熱不可與承氣湯也若復大便難可與小承氣湯和其胃氣勿令下多陽明病脇下堅滿大便閉而嘔口燥宜柴胡湯陽明病脈實者當下脈浮虚者當汗下者宜承氣湯汗者宜桂枝湯陽明病發作有時汗不解腹滿痛宜承氣湯陽明病脈浮發熱無汗表不解渇欲飲水宜白虎湯梔子蘗皮湯方梔子十五個苦寒甘草一兩甘平黄蘗二兩右三味以水四升煑取一升半去滓分温再服傷寒瘀熱在裏身必發黄麻黄黄連軺赤小豆湯主之濕熱相交民多病瘴瘴黄也傷寒為寒濕在表發黄為瘀熱在裏與麻黄黄連軺赤小豆湯除熱散濕麻黄黄連軺赤小豆湯方麻黄二兩甘温去莭赤小豆一升甘平連軺二兩連翹根也苦寒大􅀥十二枚甘温杏仁四十個甘温去皮尖生梓白皮一升苦寒生薑二兩辛温切甘草内經曰濕上甚而熱治以甘温佐以甘平以汗為度正此之謂也又煎用潦水者亦取其水味薄故不助濕氣也已上八味以潦水一斗先煑麻黄再拂去上沫内諸藥煑取三升分温三服半日服盡辨少陽病脈證并治第九少陽之病口苦咽乾目眩也足少陽膽經也内經曰有病口苦者名曰膽癉甲乙經曰膽者中精之腑五臟取決於膽咽為之使少陽之脈起於目鋭眥少陽受邪故口苦咽乾目眩少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚少陽之脈起於目眥走於耳中其支者下胸中貫隔風傷氣壅則為熱少陽中風氣壅而熱故耳聾目赤胸滿而煩邪在少陽為半表半裏以吐除煩吐則傷氣氣虚者悸以下除滿下則亡血血虚者驚傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則讝語此屬胃胃和則愈胃不和則煩悸經曰三部俱弦者少陽受病脈細者邪漸傳裏雖頭痛發熱為表未解以邪客少陽為半在表半在裏則不可發汗發汗主津液胃中乾燥少陽之邪因傳入胃必發讝語當與調胃承氣湯煎服而下之胃和則愈不下則胃為少陽木邪干故煩悸本太陽病不解轉入少陽者脇下鞕滿乾嘔不能食往來寒熱尚未吐下脈沉𦂳者與小柴胡湯太陽轉入少陽是表邪入於裏脇下鞕滿不能食往來寒熱者邪在半表半裏之間若已經吐下脈沉𦂳者邪䧟入腑為裏實未可吐下而脈沉𦂳為傳裏雖深未全入腑外邪猶未解也與小柴胡湯以和解之若已吐下發汗温鍼讝語柴胡湯證罷此為壊病知犯何逆以法治之少陽之邪在表裏之間若妄吐下發汗温鍼損耗津液胃中乾燥木邪干胃必發讝語若柴胡湯證不罷者則不為逆柴胡湯證罷者壊病也詳其因何治之逆以法救之三陽合病脈浮大上闗上但欲眠睡目合則汗闗脉以候夫少陽之氣太陽之脈浮陽明之脈大脈浮上闗上知三陽合病膽熱則睡少隂症眠睡目合則無汗以隂不得有汗但欲眠睡目合則汗知二陽合病膽有熱也傷寒六七日無大熱其人躁煩者此為陽去入隂故也表為陽裏為隂邪在于表則外有熱六七日邪氣入裏内熱有躁煩者表邪傳于裏也傷寒至四日三陽為盡三隂當受邪其人反能食而不嘔此為三隂不受邪也傷寒四日表邪傳裏裏不和則不能食而嘔今反能食而不嘔是邪不傳隂但在陽也傷寒三日少陽脈小者欲已也内經曰大則邪至小則平傷寒三日邪傳少陽脈當弦𦂳今脈小者邪氣欲已也少陽病欲解時從寅至辰上内經曰陽中之少陽通於春氣寅卯辰少陽木生之時辨論太隂脈證并治第十太隂脉之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結鞕太隂為病邪傳裏也太隂之脈布胃中邪氣壅而為腸滿上不得降者嘔吐而食不下下不得上者自利益甚時腹自痛隂寒在内而為腹痛者則為常痛此陽邪卜裏雖痛而亦不常痛但時時腹自痛也若下之則隂邪留於胸下為結鞕經曰病發於隂而反下之因作痞太隂中風四肢煩疼陽微隂澁而長者為欲愈太隂脾也主榮四末太隂中風四肢煩疼者風淫末疾也表邪少則微裏向和則澁而長長者陽也隂病見陽脈則生以隂得陽則解故云欲愈太隂病欲解時從亥至丑上脾為隂主土於亥子向陽故云解時太隂病脈浮者可發汗宜桂枝湯經曰浮為在表沉為在裏太隂病脈之浮者邪在經也故當汗散之自利不渇者屬太隂以其藏有寒故也當温之宜四逆湯輩自利而渇者屬少隂為寒在下焦自利不渇者屬太隂為寒在中焦與四逆等湯以温之傷寒脈浮而緩手足自温者繫在太隂太隂當發身黄若小便自利者不能發黄至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也太隂病七八日大便鞕者為太隂入腑傳於陽明也至七八日暴煩下利十餘行脾實腐穢去也下利煩燥者死此以脾氣和逐邪下泄故雖暴煩下利日十餘行而利自止本太陽病醫反下之因而腹滿痛者屬太隂也桂枝加芍藥湯主之表邪未罷反下之邪因乘虛傳於太隂裏氣不和故腹滿時痛與桂枝湯以解表加芍藥以和裏太實痛者桂枝加大黄湯主之太實大滿自可除下之故加大黄以下太實太隂為病脈弱其人續自便利設當行大黄芍藥者宜減之以其人胃氣弱易動故也腹滿痛者太陽病也脈弱其人續自便利則邪雖在裏未成太實欲與大黄芍藥攻滿痛者宜少與之以胃氣尚弱易為動故也夫傷寒四日太隂受病腹滿吐食下之益甚時時腹痛心胸堅滿若脈浮者可發其汗沉者宜攻其裏也發汗者宜桂枝湯攻裏者宜承氣湯太隂病不解者雖不暴煩下利十餘行而自止所以自止者脾家實腐穢已去故也宜橘皮湯辨少隂病脈證并治第十一少隂病脈微細但欲寐也少隂為病脈微細為邪氣傳裏深也邪氣行於陽則窹行於隂則寐邪傳於少隂則氣行於隂而不行於陽故但欲寐少隂病欲吐不吐心煩但欲寐五六日自利而渇者屬少隂也虚故引水自救若小便色白者少隂病形悉具小便白者以下焦虚有寒不能制水故令白色也欲吐不吐心煩者表邪傳裏也若腹滿痛則屬太隂此但欲寐則知屬少隂五六日邪傳少隂之時自利不渇者寒在中焦屬太隂此自利而渇為寒在下焦屬少隂腎虚水燥渇欲引水自救下焦虗寒不能制水小便色白也經曰下利欲飲水者内有熱故也此下利雖渇然以小便色自明非裏熱不可不察也病人脈隂陽俱𦂳反汗出者亡陽也此屬少隂法當咽痛而復吐利脈隂陽俱𦂳為少隂寒法當無汗反汗出者陽虚不固也故云亡陽亡陽之症是屬少隂内經曰客邪少隂之絡令人嗌痛不可内食少隂寒甚是當咽痛而腹吐利少隂病欬而下利讝語者被火氣刼故也小便必難以強責少隂汗也欬而下利裏寒而亡津液也反以氣火刼強責少隂汗者津液内竭火煩之故讝語小便難也少隂病脈細沉數病為在裏不可發汗少隂病始得之反發熱脈浮者為邪在經可與麻黄附子細辛湯發汗此少隂病脈細沉數為病在裏故不可發汗少隂病脈微不可發汗亡陽故也陽已虚尺脈弱濇者復不可下之脈微為亡陽表虚不可發汗脈弱濇為亡陽裏虚復不可下少隂病脈𦂳至七八日自下利脈暴微手足反温脈𦂳反去者為欲解也雖煩下利必自愈少隂病脈𦂳者寒甚也至七八日傳經盡欲解之時自下利脈暴微者寒氣得泄也若隂寒勝正陽虚而泄者則手足厥而脈𦂳不去今手足反温脈𦂳反去知陽氣復寒氣去故為欲解下利煩躁者逆此正勝邪微雖煩下利必自止少陽病下利若利自止惡寒而踡卧手足温者可治少陽病下利惡寒踡卧寒極而隂甚也利自止手足温者裏和陽氣得復故為可治也少隂病惡寒而踡時自煩欲去衣被者可治惡寒而踡隂寒甚也時時自煩躁欲去衣被為陽氣得復故云可治少隂中風脈陽㣲隂浮法為欲愈少隂中風陽脈當浮而陽脈㣲者表邪緩也隂脈當沉而隂脈浮者裏氣和也陽中有隂隂中有陽隂陽調和故為欲愈少隂病欲解時從子至寅上也陽生於子子生一陽丑為二陽寅為三陽少隂解於此者得陽則解也少隂病吐利手足不逆冷反發熱者不死脈不至者灸少隂七壮經曰少隂病吐利燥煩四逆者死吐利手足不厥冷者則陽氣不衰雖反發熱不死脉不至者吐利暴虚也炙少隂七壮以通其脈少隂病八九日一身手足盡熱者以熱在膀胱必便血也膀胱太陽也少隂太陽為表裏少隂病至八九日寒邪變熱腹傳太陽太陽為諸陽主氣熱在太陽故一身手足盡熱太陽經多血少氣為熱所乘則血散下行必便血也少陽病但厥無汗而強發之者必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治但厥無汗熱行入於裏也而強發汗虚其經絡熱乗經虚廹血妄行從虚而出或從口鼻或從目出諸厥者皆屬於下但厥血亡於上為上之竭傷氣損血邪甚正虚故為難治少隂病惡寒身踡而利手足逆冷者不治針經曰多熱者易已多寒者難治此内外寒極純隂無陽故云不治也少隂病吐利躁煩四逆者死四逆惡寒而身倦則寒甚脈不至則真氣絶煩熱也躁亂也若憤躁之躁從煩至躁為熱來有漸則猶可不煩而躁是氣欲脱而争也譬猶燈将滅而暴明其能久乎少隂病六七日息高者死腎為生氣之源呼吸之門少隂六七日不愈而息高者生氣斷絶也少隂病脈微細沉但欲卧汗出不煩自欲吐至五六日自利復煩躁不得卧寐者死隂氣方盛至五六日傳經盡陽氣得復則愈反更自利煩躁不得卧寐則正氣弱陽不得復病勝藏故死少隂病始得之反發熱脈覺沉者麻黄附子細辛湯主之少隂病當無熱惡寒反發熱者邪在表中雖脈沉以始得而邪氣未深亦當温劑發汗以散之麻黄附子細辛湯方麻黄二兩去節甘熱細辛二兩甘熱附子一枚炮去皮破八片辛熱内經曰寒淫於内治以甘熱佐以苦辛故用麻黄之甘以解少隂之寒細辛附子之辛以温少隂之經右三味以水一斗先煑麻黄減二升去上沫内藥煑取三升去滓温服一升日三服少隂得之二三日麻黄附子甘草湯微發汗以二三日無裏証故微發汗也二三日邪未深也既無吐利厥逆諸裏證則可與麻黄附子甘草湯微汗以散之麻黄附子甘草湯方麻黄二兩去節甘草二兩炙附子一枚炮去皮麻黄甘草之甘以散表寒附子之辛以温寒氣右三味以水七升先煑麻黄一兩沸去上沫内諸藥煑取三升去滓温服一升日三服少隂病得之二三日以上心中煩不得卧黄連阿膠湯主之脈經曰風傷陽寒傷隂少隂受病則得之於寒二三日已上寒極變熱之時熱煩於内心中煩不得卧也與黄連阿膠湯扶隂散熱邪黄連阿膠湯方黄連四兩苦寒黄芩一兩苦寒芍藥二兩酸平鷄子黄二枚廿温阿膠二兩甘温陽有餘以苦除之黄芩黄連之苦以除熱隂不足藥以甘補之雞黄阿膠之甘以補血酸收也泄也芍之酸收隂氣而泄邪熱右五味以水五升先煑三物取二升去滓内膠烊盡少冷内雞子黄攪合相得温服七合三服少隂病得之一二日口中和其背惡寒者當灸之附子湯主之少隂客熱則口燥舌乾而渴口中和者不苦不燥是無熱也背為陽背惡寒者陽氣弱隂勝也經曰無熱惡寒者發於隂也灸之助陽消隂與附子湯温經散寒附子湯方附子二枚破八片去皮辛熱茯苓三兩甘平人參三兩甘温白术四兩甘温芍藥三兩酸平辛以散之附子之辛以散寒甘以緩之茯苓人參白术之甘以補陽酸以収之芍藥之酸以扶隂所以然者偏除偏陽則為病火欲實水當平之不欲偏勝也右五味以水八升煑取三升去滓温服一升日三服少隂病身體痛手足寒骨節痛脈沉者附子湯主之少隂腎水而主骨節身體疼痛肢冷手足寒脈沉故當與附子湯温經桃花湯方赤石脂一觔一半全用一半為末甘温乾薑一兩辛熱粳米一升甘平右三味以水七升煑米令熟去滓温服七合内赤石脂末方寸匕日三服若一服愈餘勿服少隂病二三日至四五日腹滿小便不利下利不止便膿血者桃花湯主之二三日以至四五日寒邪入裏深也腹痛者裏寒也小便不利者水榖不别也下利不止便膿血者腸胃虚弱下焦不固也與桃花湯固腸止利也少隂病吐利手足厥冷煩躁欲死者吳茱萸湯主之吐利手足厥冷則隂寒氣甚煩躁欲死者陽氣内争與吳茱萸湯助陽散寒少隂病下痢咽痛胸滿心煩者猪膚湯主之少陽之脈從腎上貫於肝膈入肺中則循喉嚨其支别者從肺出絡心注胸中邪自陽經傳於少隂陽虚客熱下利咽痛胸滿心煩也與猪膚湯調隂散熱猪膚湯方猪膚一觔甘寒右一味以水一斗煑取五升去滓加白蜜一升白粉五合熬香和相得温分六服少隂病二三日咽痛者可與甘草湯不差者與桔梗湯陽邪傳與少隂邪熱為咽痛服甘草湯則差若寒熱相傳為咽痛者服甘草湯若不差與桔梗湯以和少隂之氣甘草湯方甘草二兩右一味以水三升煑取一升半去滓温服七合日二服桔梗湯方桔梗一兩辛甘微温甘草二兩甘平桔梗辛温以散寒甘草味甘平以除熱甘温相合以調寒熱右二味以水三升煑取一升去滓分温再服少隂病咽中傷生瘡不能語言聲不出者苦酒湯主之凡熱傷於絡則經絡乾燥使咽中傷生瘡不能語言聲不能出與苦酒湯以解絡熱愈咽痛苦酒湯方半夏洗破如棗核大十四枚辛温鷄子一枚去黄内上苦寒着鷄子殻中甘微右二味内半夏着苦酒中以雞子殻置刀鐶中安火上令三沸去滓少少含嚥之不差更作三劑少隂病咽中痛半夏散及湯主之甘草湯主少隂客熱寒咽痛桔梗湯主少隂熱相搏痛半夏散及湯主少隂客熱咽痛也半夏散及湯方半夏洗辛温桂枝去皮辛熱甘草炙甘平以上各等分已上三味各别搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸内散用一兩更煎三沸下火令少冷嚥之少隂病下利白通湯主之少隂者主水也少隂客寒不能制水故自利也白通湯温裏散寒白通湯方葱白四辛温乾薑一兩辛熱附子一枚生用去皮破八片辛熱内經曰腎苦燥急食辛以潤之葱白之辛以通陽氣生薑附子之辛以散隂寒右三味以水三升煑取一升去滓分温再服少隂病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加猪膽汁湯主之服湯脈暴出者死微續者生少隂病下利脈微為寒極隂勝與白通湯復陽散寒服湯利不止厥逆無脈乾嘔煩者寒氣太甚内為格拒陽氣逆亂也與白通湯和猪膽汗湯以和之内經曰逆而從之從而逆之又曰逆者正治從者反治此之謂也服湯脈暴出者正氣因發泄而脱也故死微續者陽氣漸復也故生白通加猪膽汁方葱白四乾薑一兩附子一枚生去皮破八片人尿五合鹹寒猪膽汁一合苦寒内經曰苦調寒熱之逆冷熱必行則熱物冷服下嗌之後冷體既消熱性便發由是病氣隨愈嘔噦皆除情且不違而致大益此和人尿猪膽汁鹹苦寒物於白通湯熱劑中要其氣相從則可以去格拒之寒也已上三味以水三升煑取一升去滓内膽汁人尿和令相得分温再服若無膽汁亦可用少隂病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或欬或小便利或下利或嘔者真武湯主之少隂病二三日則邪氣猶淺至四五日邪氣已深腎主水腎病不能制水水飲停為水氣腹痛者寒濕内甚也四肢沉重疼痛寒濕外甚也小便不利自下利者濕勝而水氣不别也内經曰濕勝則濡泄真武湯益陽氣散寒濕真武湯方茯苓二兩甘平芍藥三兩酸平附子二枚炮去皮破八片辛熱生薑三而辛温白术二兩甘温脾惡濕甘先入脾茯苓白术之甘以益脾逐水寒淫所勝平以辛熱濕淫所勝佐以酸平附子芍藥生薑之酸辛温經散濕右五味以水八升煑取三升去滓温服七合三日服後加減法若欬者加五味子半升細辛乾薑各一兩氣逆欬者五味子之酸以收逆氣水寒相搏則欬細辛乾薑之辛以散水寒若小便利者去茯苓小便利則無伏水故去茯苓若下利者去芍藥加乾薑二兩芍藥之酸泄氣乾薑之辛散寒若嘔者去附子加生薑前成半觔氣逆則嘔附子補氣生姜散氣千金曰凡嘔家多服生薑此為嘔家聖藥少隂病下利清榖裏寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之下利清榖手足厥逆脈微欲絶為裏寒身熱不惡寒面色赤為外熱此隂甚於内陽格于外不相通也與通脈四逆湯散寒通陽氣通脈四逆湯方甘草二兩炙附子大者一枚生用去皮破八片乾薑三兩強人可四兩右三味以水三升煑取一升二合去滓分温再服其脈即出者愈面色赤者加葱玖條葱味辛以通陽氣腹中痛者去葱加芍藥二兩芍藥之酸通氣利腹中痛為氣不通也嘔者加生薑二兩辛以散之嘔為氣不散也咽痛者去芍藥加桔梗一兩咽中痛加桔梗則能散之利止脈不出者去桔梗加人參二兩利止脈不出者亡血也加人參以補之經曰脈微而利亡血也四逆加人參湯主之脉病皆與方相應乃可服之少隂病四逆其人或欬或悸或小便不利或腹中痛或泄利下重者四逆散主之四逆者四肢不温也傷寒邪在三陽則手足必熱傳到太隂手足自温至少隂則熱邪漸深故四肢逆而不温也及至厥隂手足厥冷是又甚於逆四逆散宣傳隂之熱也四逆散方甘草炙甘平枳實破水漬炙乾苦寒柴胡苦寒芍藥内經曰熱淫於内佐以甘苦以酸收之以苦發之柴枳實甘草之甘苦以泄裏熱芍藥之酸以收隂氣胡之苦以發表熱右四味各分搗篩白飲和服方寸匕日三服欬者加五味子乾薑各五分并主下痢肺寒氣逆則欬五味子之酸收逆氣乾薑之辛散肺寒并主下痢者肺與大腸為表裏上欬下痢治則頗同悸者加桂枝五分茯苓味甘而淡用以滲泄腹中痛者加附子一枚炮令坼裏虚遇邪則痛加附子以補虚泄利下重者先以水五升煑薤白三升煑取三升去滓以散三方寸匙内湯煑取一升半分温再服泄利下重者下焦氣滯也加薤白以泄氣滯少隂病下利六七日欬而嘔渴心煩不得眠者猪苓湯主之下利不渴者裏寒也經曰自利不渴者屬太隂以其藏寒故也此下利嘔渴知非虚寒心煩不得眠知協熱也與猪苓湯滲泄小便分别水榖經曰復不止當利其小便此之謂歟少隂病得之二三日口燥咽乾者急下之宜大承氣湯傷寒傳經五六日邪傳少隂則口燥舌乾而渇為邪漸深也今少隂病得之二三日邪氣未深入之時便作口燥咽乾者是邪熱已甚腎水乾也急與大承氣湯下之以全腎也少隂病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯少隂腎水也青肝色也自利色青為肝邪乗腎難經曰從前来者為實邪以腎藴實邪必心下痛口乾燥也與大承氣湯以下實邪少隂病六七日腹脹大不便者急下之宜大承氣湯此少隂入府也六七日少隂之邪入府之時陽明内熱壅甚腹滿不大便也陽明病土勝腎水則乾急與大承氣湯下之以救腎水少隂病脈沉者急温之宜四逆湯既吐且利小便復利而大汗出下利清水内寒外熱脈微欲絶者不云急温此少隂病脈沉而云急温者彼雖寒甚然而證已形見於外治之則有成法此初頭脈沉未有形證不知邪氣所之将發何病是急與四逆湯温之少隂病飲食入口則吐心中温温欲吐復不能吐始得之手足寒脈弦遲者胸中實不可下也當吐之若膈上寒飲乾嘔者不可吐也急温之宜四逆湯傷寒表邪傳裏至于少隂少隂之脈從肺出絡心注於胸中邪既留于胸中而不散者飲食入口則吐心中温温欲吐陽受氣於胸中邪既留於胸中則陽氣不得宣發於外是以始得之手足寒脈弦遲此是胸中實不可下而當吐其膈上有寒飲亦使人心温温而手足寒吐則物出嘔則物不出吐與嘔别焉胸中實則吐而物出若膈上有寒飲則但乾嘔而不吐也此不可吐可與四逆湯以温其膈也少隂病下利脈微澁嘔而汗出必數更衣反少者當温其上灸之脈微為亡陽澁為亡血下利嘔而汗出亡陽亡血也津液不足裏有虚有寒必數更衣反少者温其上以助其陽也灸之以消其隂少隂病身體痛手足寒脈沉者宜四逆湯辨厥隂病脈證并治第十二厥隂之為病消渴氣上撞心中疼熱飢而不欲食食則吐蚘下之利不止邪傳厥隂則熱已深也邪自太陽傳至太隂則腹滿而嗌乾未成渴也邪至少隂者口燥咽乾而渴未成消也至厥隂成消渴者熱甚能消水故也飲水多而小便少者謂知消渴木生於火肝氣通心厥隂客熱隂氣上撞心心中疼熱傷寒六日厥隂受病之時為傳經盡則當入腑胃氣虚客熱飢不欲食蚘在胃中無食則動聞食嗅而出得食吐蚘此熱在厥隂經也若便下之虚其胃氣厥隂木邪相乗必吐下不止厥隂中風脈微浮為欲愈不浮為未愈經曰隂病見陽脈而生浮者陽也厥隂中風脈微浮邪氣還表向汗之時故云欲愈厥隂病欲解時從丑至卯上邪至厥隂為傳經盡欲厥隂本也王於卯丑寅向王故為之解時厥隂病渴欲飲水者少少與之愈邪至厥隂為傳經盡欲汗之時渴欲得水者少少與之胃氣得潤則愈諸四逆厥者不可下之虚家亦然四逆者四肢不温也厥者手足冷也皆陽氣少而隂氣多故不可下虚家亦然下之是為重虛金匱玉函曰虚者十補勿瀉之也傷寒先厥後發熱而利者必自止見厥復利陽氣勝則厥逆而利陽氣復則發熱利必自止見厥則隂也氣還勝而復利傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以素餅不發熱者知胃氣尚在必愈恐暴熱来出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日并前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也始發熱邪在表也至六日邪傳厥隂隂氣勝者作厥而利厥反九日隂寒氣多當不能食而反能食者恐為除中除去也中胃氣也言邪氣大甚除去胃氣欲飲食自救故暴能食此欲勝也食以素餅試之若胃氣絶得麵則必發熱而不發熱者胃氣尚在也恐是寒極變熱因暴熱来而復去使之能食非除中也金匱要略曰病人素不能食而反暴思之必發熱後三日脈之其熱續在陽氣勝也期之旦日夜半而愈若旦日不愈後三日脈數而熱不罷者為熱氣有餘必發癰膿經曰數脈不時則生惡瘡傷寒脉遲六七日而反與黄芩湯徹其熱脈遲為寒今與黄芩湯復除其熱腹中應冷當不能食此名除中必死傷寒脈遲六七日為寒氣已深反與黄苓湯寒藥兩寒相傳腹中當冷冷不消榖則不能食反能食者除中也四時皆以胃氣為本胃氣已絶故云必死傷寒先厥後發熱下利必自止而反汗出咽中痛者其候為痺發熱無汗而利必自止若不止必便膿血便膿血者其候不痺傷寒先厥而利隂寒氣勝也寒極而變熱後發熱下利必自止而反汗出咽中痛其候為痺者熱氣上行也發熱無汗而利必自止利不止便膿血者熱氣不行也熱氣下而不止其候亦不痺也傷寒一二日至四五日而厥者必發熱前熱後厥厥深者熱亦深厥微者熱亦微應下之而反發汗者必口傷爛赤前厥後發熱者寒極生熱也前熱後厥者陽氣内䧟也厥深熱深厥微熱微隨陷之深淺也熱深必須下洩之反發汗者引熱上行必口傷爛赤内經曰火氣内發上為口糜傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日故知自愈隂勝則厥陽勝則熱先厥五日為隂勝至六日陽復勝熱亦五日後復厥者隂復勝若不厥為陽全勝故自愈經曰發熱四日厥反三日復熱四日厥少熱多其病為愈凡厥者隂陽氣不相順接便為厥厥者手足逆冷是也手三隂三陽接於手十指足之三隂三陽接足於足十指陽氣内䧟陽不與隂相順接故手為之厥冷也傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為藏厥非為蚘厥也蚘厥者其人當吐蚘令病者静而復時煩此則為藏寒蚘上入膈故煩須臾復止得食而嘔又煩者蚘聞食臭出其人當自吐蚘蚘厥者烏梅圓主之又主久利方蔵厥者死陽氣絶也蚘厥雖厥而煩吐蚘已則静不若藏厥而躁無暫安時也病人藏寒胃虛蚘動上膈聞食臭出因而吐蚘烏梅圓温藏安蟲即愈烏梅圓方烏梅三百個味酸温細辛六兩辛熱乾薑十兩甘温辛熱黄連一觔苦寒當歸四兩辛温附子六兩辛熱蜀椒四兩去汗辛熱桂枝六兩辛熱人參六兩甘温黄蘖六兩苦寒肺主氣肺欲收急食酸以收之烏梅之酸以收陽氣脾氣欲緩急食甘以緩之人參之甘以緩脾氣寒淫於内以辛潤之以苦堅之當歸桂枝細辛之辛以潤内寒寒淫所勝平以辛熱薑附之辛熱以勝寒蚘得甘則動得苦則安黄連黄蘖之苦以安蚘右十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟𢷬成泥和藥令相得内臼中與蜜杵二千下圓如梧桐子大先食飲服十圓日三服稍加至二十圓禁生冷滑物臭物等傷寒熱少厥微指頭寒黙黙不欲食煩躁數日小便利色白者此熱除也欲食得其病為愈若厥而嘔胸脇煩滿者其後必便血指頭寒者是厥微熱少也黙黙不欲食煩躁者邪熱初傳裏也數日之後小便色白裏熱去欲得食為胃氣已和其病為愈厥隂之脈挾胃貫膈布脅肋厥而嘔胸脇煩滿者傳邪之熱甚於裏也厥隂肝主血後數日熱不去又不得外泄迫血下行必致便血病者手足厥冷不結胸小腹滿按之痛者此冷結在膀胱闗元也手足厥不結胸者無熱也小腹滿按之痛下焦冷結也傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者其後必便膿血先熱後厥者陽氣邪傳裏也發熱為邪氣在表至四日後厥者傳之隂也後三日復傳陽經則復熱厥少則邪微熱多為陽勝其病為愈至七日傳經盡熱除則愈熱不除者為熱氣有餘内搏厥隂之血其後必大便膿血傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也傷寒隂勝者先厥至四日邪傳裏重隂必陽却熱三日七日傳經盡當愈若不愈而復厥者傳作再經至四日則當復熱若不復熱至五日厥不除者隂勝於陽其病進也傷寒六七日脈微手足厥冷煩躁灸厥隂厥不還者死傷寒六七日則正氣當復邪氣當罷脈浮身熱為欲解若煩反微而厥則隂勝陽也煩躁者陽虗而争也灸厥隂以復其陽厥不還則陽氣已絶不能復而死傷寒發熱下利厥逆燥不得卧者死傷寒發熱邪在表也下利厥逆陽氣虚也燥不得卧者病勝蔵也故死傷寒發熱下利厥不止者死金匱要略曰六腑氣絶於外者手足寒五臟氣絶於内者利下不禁傷寒發熱為邪氣獨甚不利至甚厥不止為臓氣絶故死傷寒六七日下利便發熱而利其人汗出不止者死有隂無陽故也傷寒至七日為邪正争之時正勝則生邪勝則死始不下利而暴忽發熱下利汗出不止者邪氣勝正陽氣脱也故死傷寒五六日不結胸腹濡脈虚復厥者不可下此為亡血下之死傷寒五六日邪氣當作裏實之時若不結胸而腹濡者裏無熱也脈虚者亡血也復厥者陽氣少也不可下下之為裏虚故死金匱玉函曰虚者重㵼直氣乃絶發熱而厥七日下利者為難治發熱而厥邪傳裏也至七日傳經盡則正氣勝邪當汗出而解反下利則邪氣勝裏氣虚則為難治傷寒脈促手足厥逆者可灸之脈促則為陽虚不相續厥則為陽虚不相接灸之以助陽氣傷寒脈滑而厥者裏有熱也白虎湯主之滑為陽厥氣内䧟是裏熱也與白虎湯以散裏熱也手足厥寒脈細欲絶者當歸四逆湯主之手足厥寒者陽外虚不温四支脈細欲絶者隂血内弱脈行不利當歸四逆湯助陽生隂也當歸四逆湯方當歸三兩辛熱桂枝三兩辛熱芍藥三兩酸寒細辛三兩辛熱大􅀥二十五個甘温甘草三兩炙甘平通草三兩甘平内經曰脈者血之府也諸血者皆屬心通脈者必先補心益血苦先入於心當歸之苦以助心血心苦緩急食酸以收之大􅀥甘草通草之甘以緩隂血右七味以水八升煑取三升去滓温服一升日三服若其人内有乆寒者宜當歸四逆加吳茱萸生薑湯主之茱萸辛温以散久寒生薑辛温以行陽氣大汗出熱不去内拘急四肢疼又下利厥而惡寒者四逆湯主之大汗出則熱當去熱反不去者亡陽也内拘急下利者寒甚於裏四肢疼逆而惡寒者寒甚於表與四逆湯復陽散寒大汗若大下利而厥冷者四逆湯主之大汗若大下利内外雖殊其亡津液損陽氣則一也陽虚隂勝故生厥逆與四逆湯固陽退隂病人手足厥冷脈乍𦂳者邪結在胸中心中滿而煩饑不能食者病在胸中當須吐之宜𤓰蒂散手足厥冷者邪氣内䧟也脈𦂳牢者為實邪氣入府則脈沉今脈乍𦂳知邪結在胸中為實故心下滿飽而煩胃中無邪則喜饑以病在胸中雖饑而不能食與𤓰蒂散以吐胸中之邪傷寒厥而心下悸者宜先治水當服茯苓甘草湯却治其厥不尒水漬入胃必作利也金匱要略以為水停心下甚者則悸厥雖寒勝然以心下悸為水飲内甚先與茯苓甘草湯治其水而後治其厥若先治厥則水飲漫漬入胃必作下利傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黄升麻湯主之傷寒六七日邪傳厥隂之時大下之後下焦氣虛陽氣内䧟寸脈遲而手足厥逆下部脈不至厥隂之脈本貫膈上注肺循咽嚨厥隂隨經射肺因亡津液逐成肺痿咽喉不利而唾膿血也金匱要略曰肺痿之病從何得之被快樂下利重亡津液故得之若泄利不止者為裏氣虚故云難治與麻黄升麻湯以調肺肝之氣麻黄升麻湯方麻黄二兩半去節甘温升麻一兩二分甘温當歸一兩一分辛温知母苦寒黄苓苦寒萎㽔甘平各十八銖石膏碎綿褁甘寒白术甘温乾薑辛熱芍藥酸平天門冬去辛甘平桂枝辛熱茯苓甘平甘草炙甘平各十銖玉函曰大熱之氣寒以取之甚熱之氣以汗發之麻黄升麻之甘以發浮熱正氣虛者以辛潤之當歸桂薑之辛以散寒上熱者以苦泄之知母黄芩之苦凉心去熱津液少者以甘潤之茯苓白术之甘緩脾生津液肺燥氣熱以酸収之以甘緩之芍藥之酸以斂逆氣萎㽔門冬石膏甘草之甘潤肺除熱右十四味以水一斗先煑麻黄一兩沸去上沫内諸藥煑取三升去滓分温三服相去如炊三斗米頃令盡汗出愈傷寒四五日腹中痛若轉氣下趣少腹者此欲自利也傷寒四五日邪氣傳裏之時腹中痛轉氣下趣少腹者裏虛遇寒寒氣下行欲作自利也傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黄連黄芩人參湯主之傷寒邪自傳表為本自寒下醫反吐下損傷正氣寒氣内格拒經曰格則吐逆食入口即吐謂之寒格更復吐下則重虚而死是更逆吐下與乾薑黄連黄芩人參湯以通寒格乾薑黄連黄芩人參湯方乾薑辛熱黄連苦寒黄芩苦寒人參甘温各三兩辛以散之甘以緩之乾薑人參之甘辛以補正氣苦以泄之黄連黄芩之苦以通其胸中之寒格右四味以水六升煑取二升去滓分温再服下利有微熱而渴脈弱者今自愈下利隂寒之疾反大熱者逆有微熱而渴裏氣方温也經曰諸弱發熱脈弱者陽氣得復也今必自愈下利脈數有微熱汗出令自愈設復𦂳為未解下利隂病脈數陽脈也隂病見陽脈者生微熱汗出陽氣得通也利必自愈諸𦂳為寒若復脈𦂳隂氣猶勝故云未解下利手足厥冷無脈者灸之不温若脈不還反微喘者死下利手足厥逆無脈者隂氣獨勝陽氣大虚也灸之陽氣復手足温而脈還為欲愈若手足不温脈不還者陽已絶也反微喘者陽脱也少隂負跌陽者為順也少隂腎水跌陽脾土下利為腎邪干脾水不勝土則為微邪故為順也下利寸脈反浮數尺中自濇者必清膿血人病下利者脈當沉而遲反浮數者裏有熱也濇為無血尺中自濇者腸胃血散也隨利下必便膿血清與圊通脈經曰清者厠也下利清榖不可攻表汗出必脹滿下利者脾胃虚也胃為津液之主發汗亡津液則胃氣愈虛必脹滿下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死沉為在裏弦為拘急裏氣不足是主下重大則病進此利未止脈微弱數者邪氣微而陽復為欲自止雖發熱止由陽勝非大逆也下利脈沉而遲其人面少赤身有微熱下利清榖者必欝胃汗出而解病人必微厥所以然者其面戴陽下虚故也下利清榖脈沉而遲裏有寒也面少赤身有微熱表未解也病人微厥針經曰下虛則厥表熱欲解臨汗之時以裏先虚必欝胃然後汗出而解也下利脈數而渴者令自愈設不差必清膿血以有熱故也經曰脈數不解而不止必恊熱而便膿血也下利後脉絶手足厥冷晬時脈還手足温者生脈不還者死下利後脈絶手足厥冷者無陽也晬時周時也周時厥愈脈出為陽氣復則生其手足不温脈不還者為陽氣絶則見死也傷寒利日十餘行脈反實者死下利者裏也脈當微而反實者病勝蔵也故死難經曰脈不應病病不應脈是為死病下利清榖裏寒外熱汗出而厥者通脈四逆湯主之下利清榖為裏寒身熱不解為外熱汗出陽氣通行於外則未當厥其汗出而厥者陽氣太虛也與通脈四逆湯以固陽氣熱利下重者白頭翁湯主之下利津液少熱則傷氣乗虛下利致後重也與白頭翁湯散熱厚陽白頭翁湯方白頭翁三兩苦寒黄連苦寒黄栢苦寒秦皮苦寒各三兩内經曰䝨欲堅急食苦以堅之利則下焦虛是以純苦之劑堅之右四味以水七升煑取二升去滓温服一升不愈更服一升下利腹脹滿身體疼痛者先温其裏乃攻其表温裏四逆湯攻表桂枝湯下利腹滿者裏有虛寒先與四逆湯温裏身疼痛為表未解利止裏和與桂枝湯攻表下利欲飲水者以有熱故也白頭翁湯主之自利不渴為藏寒與四逆湯以温藏下利飲水為有熱與白頭翁湯以凉中下利讝語者有燥屎也宜小承氣湯經曰實則讝語有燥屎為胃實下利為腹虛與小承氣湯以下燥屎也下利後更煩按之心下濡者為虛也宜梔子䜴湯下利之後不煩為欲解若更煩而心下堅者恐其谷煩此煩而心下濡者是邪熱乗虛客於胸中為虚煩也與梔子豉湯吐之則愈嘔家有癰膿者不可治嘔膿盡自愈胃脘有癰則嘔而吐膿不可治嘔得膿盡嘔亦自愈嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之嘔而脈弱為邪氣傳裏嘔則氣上逆而小便當不利小便復利者裏虚也身有微熱見厥者隂勝陽也為難治與四逆湯温裏助陽也乾嘔吐涎沫頭痛者吳茱萸湯主之乾嘔吐涎沫者裏寒也頭痛者寒氣上攻也與吳茱萸湯温裏散寒嘔而發熱者小柴胡湯主之經曰嘔而熱者柴胡湯可用傷寒大吐大下之極虚復極汗出者以其人外氣怫欝復與之水以發其汗因得噦所以然者胃中寒冷故也大吐大下胃氣極虚復極發汗以亡陽氣外邪怫欝於表則身熱醫與之水以發其汗胃虛得水虛寒相搏成噦也傷寒噦而腹滿視其前後如何部不利利之則愈噦而腹滿氣上而不下也視其前後部有不利者即利之以降其氣前部者小便也後部者大便也夫傷寒六七日煩滿而囊縮此則毒氣在臓可下而愈宜小承氣湯傷寒六日身體熱惡風頸項強脇下滿手足温而渴宜小柴胡湯傷寒六日陽脈澁隂脈弦當腹中急痛先與建中湯不差宜大柴胡湯傷寒六日發汗吐下後虛煩不得劇者心神㒹倒宜服梔子湯傷寒六日已發熱及下之其人胸脇滿大腸微結小腸不利不嘔但頭汗出往来寒熱而煩此為未解宜小柴胡桂枝湯傷寒六日發熱微惡寒肢節煩疼心下支滿外證未去宜柴胡桂枝湯傷寒六日大下之後身熱不去心中結痛此為欲解宜梔子湯傷寒六日之後胸滿煩驚小便不利譫語一身不可轉側宜柴胡湯傷寒六日不解結胸在裏但熱時時惡風大渴舌乾煩燥宜白虎湯傷寒六日風濕相搏身體疼痛不能轉側脈浮虚而濇宜术附湯傷寒病六日後八日九日如瘧熱多寒少一日再發其脈微緩者為欲愈脈微而惡寒者為隂陽俱虛不可復吐下也發汗面色赤有熱者為欲解宜服桂枝麻黄湯普濟方卷一百二十八
