body:
  text: 普濟方卷一百二十六明周王朱橚撰傷寒門辨脉法第一問曰脉有陰陽者何謂也答曰凡脉大浮數動滑此名陽也曰沉濇弱弦㣲此名隂也凡隂病見陽脉者生陽病見隂脉者死内經曰㣲妙在脉不可不察察之有紀從隂陽始始之有經從五行生兹首論脉之隂陽者以脉從隂陽始故也陽脉有五隂脉有五以脉從五行生故也陽道常饒大浮數動滑五者謂之平脉也有餘故謂之陽隂道常虗沉濇弱弦㣲五者謂之平脉也不及故謂之隂傷寒之為病邪在表則見陽脉邪在裡則見陰脉隂病見陽脉而主生者則邪氣自裏之表欲汗而解也如厥隂中風脉㣲浮為欲愈不浮為未愈者是也陽病見隂脉而主死者則邪氣自表入裏正虛邪勝如讝言妄語脉沉細者死是也金匱要略曰諸病在外者可治入裏者即死此之謂也問曰脉有陽結隂結者何以别之答曰其脉浮而數能食不大便者此為實名曰陽結也期十七日當劇其脉沉而遲不能食身體重大便反鞕名曰隂結期十四日當劇結者氣偏結固隂陽之氣不得而雜之陰中有陽陽中有隂隂陽相雜以為和不相雜以為結浮数陽脉也能食而不大便裏實也為陽氣結固隂不得而雜之是名陽結沉遲隂脉也不能食身體重隂病也隂病見隂脉則當下利今大便鞕者為隂氣結固陽不得而雜之是名隂結論其數者傷寒之病一日太陽二日陽明三日少陽四日太隂五日少隂六日厥隂至六日為傳經盡七日當愈七日不愈者謂之再經言再經者再自太陽而傳至十二日再至厥隂為傳經盡十三日當愈十三日不愈者謂之過經言再過太陽之經亦以次而傳之也陽結為火至十七日傳少隂水能制火火邪解散則愈隂結属水至十四日傳陽明土土能制水水邪解散則愈彼邪氣結甚水又不能制火土又不能制水故當劇内經曰一候後則病二候後則病甚三候後則病危也問曰病有洒淅惡寒而復發熱者何答曰隂脉不足陽往從之陽脉不足隂往乘之曰何謂陽不足答曰假令寸口脉㣲名曰陽不足隂氣上入陽中則洒淅惡寒也何謂隂不足答曰假令尺脉弱名曰隂不足陽氣下陷入隂中則發熱也一隂一陽謂之道偏隂偏陽謂之疾隂偏不足則陽得而從之陽偏不足則隂得而乘之陽不足則隂氣上入陽中為惡寒者隂勝則寒矣隂不足陽氣下䧟入隂中為發熱者陽勝則熱矣陽脉浮隂脉弱則血虛血虛則筋急也陽為氣隂為血陽脉浮者衞氣强也隂脉弱者榮血弱也難經曰氣主呴之血主濡之血虚則不能濡潤筋絡故筋急也其脉沉者榮氣㣲也内經云脉者血之府也脉實則血實脉虚則血虛此其常也脉沉者知榮血内㣲也其脉浮而汗出如流珠者衞氣衰也鍼經云衞氣者所以温分肉充皮毛肥腠理司開闔者也脉浮汗出如流珠者腠理不宻開闔不司為衞氣外衰也浮主候衞沉主候榮以浮沉別榮衞之衰㣲理固然矣然而衰甚于㣲所以于榮言㣲而衞言衰者以其汗出如流珠為陽氣外脫所以衞病氣甚于榮也㣲者加燒針則血流不行更發熱而躁煩也衞陽也榮隂也燒針益陽而損隂榮氣㣲者胃隂虚也内經曰隂虚而内熱又加燒針以補陽不惟兩熱相合而榮血不行必更外發熱而内躁煩也脉藹藹如車葢者名曰陽結也藹藹如車盖者大而厭厭聶聶也為陽氣鬰結于外不與隂氣和雜也脉纍纍如循長竿者名曰隂結也纍纍如循長竿者連連而强直也為隂氣鬰結于内不與陽氣和雜也脉瞥瞥如羮上肥者陽氣㣲也輕浮而主㣲也脉縈縈如蜘蛛絲者陽氣衰也縈縈滯也若縈惹之不利也陽衰宜矣脉綿綿如㵼漆之絶者亡其血也綿綿者連綿而軟也如㵼漆之絶者前大而後細也正理論曰天樞開發精移氣變隂陽交㑹胃和脉生脉復生也陽氣先至隂氣後至則脉前為陽氣後為隂氣脉來前大後細為陽氣有餘而隂氣不足是知亡血脉來緩時止復來者名曰結脉來數時止復來者名曰促脉陽盛則促隂盛則結此皆病脉脉一息四至曰平一息三至曰遲小駃於遲曰緩一息六至曰数時有一止者隂陽之氣不得相續也陽行也速隂行也緩緩以候隂若隂氣勝而陽不能相續則脉來緩而時一止数以候陽若陽氣勝而隂不能相續則脉來数而時一止傷寒有結代之脉動而中止不能自還為死脉此結促之時止是隂陽偏勝而時有一止即非脫絶而止云此皆病脉隂陽相搏名曰動陽動則汗出隂動則發熱形冷惡寒者此三焦傷也動為隂陽相搏方其隂陽相搏而虚者則動陽動為陽虚故汗出隂動為隂虛故發熱也如不汗出發熱而反形冷惡寒者三焦傷也三焦者原氣之別使主行氣于陽三焦既傷則陽氣不通而微致身冷而惡寒也金匱要略曰陽氣不通即身冷經曰陽㣲則惡寒若數脉見於關上上下無頭尾如豆大厥厥動揺者名曰動也脉經曰陽出隂入以關為界關為隂陽之中也若數脉見于關上上下無頭尾如豆大厥厥動揺者是隂陽之氣相搏也故名曰動陽脉浮大而濡隂脉浮大而濡隂脉與陽脉同等者名曰緩也陽脉寸口也隂脉尺中也上下同等無有偏勝者是隂陽之氣和緩也非若遲之有邪也隂陽偏勝者為結為促隂陽相搏者為動隂陽氣和者為緩學者不可不知也脉浮而𦂳者名曰弦也弦者壯如弓弦按之不移也脉𦂳者如轉索無常也脉經云弦與𦂳相類以弦為虛故雖𦂳如弦而按之不移則不足也經曰弦則為藏以𦂳為實是切之如轉索無常而不散金匱要略曰脉𦂳如轉索無常者有宿食也脉弦而大弦則為減大則爲芤減則為寒芤則為虛寒虛相搏此名為革婦人半産漏下男子則亡血失精弦則為減減則為寒寒者謂陽氣少也大則為芤芤則為虛虚者謂血少不足也所謂革者言其既寒且虛則氣血改革不循常度男子得之為真減而不能内固故主亡血失精婦人得之為隂血虛而不能滋養故主半産漏下問曰病有戰而汗出因得解者何也答曰脉浮而𦂳按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脉浮故當汗出而解也浮為陽𦂳為隂芤為虛隂陽争則戰邪氣将出邪與正争其人本虛是以發戰正氣勝則戰戰已復發熱而大汗解也若脉浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也浮數陽也本實陽勝邪不能與正争故不發戰也問曰病有不戰而汗出解者何也答曰脉大而浮數故知不戰而汗出解也陽勝則熱隂勝則寒隂陽争則戰脉大而浮數皆陽也故不戰而汗出解也不戰不汗出而解者何也答曰其脉自微此以曽經發汗若吐若下若亡血以内無津液此隂陽自和必自愈故不戰不汗出而解也脉㣲者邪氣㣲也邪氣已微正氣又弱脉所以微既經發汗吐下亡陽亡血内無津液則不能作汗得隂陽氣和而自愈也問曰傷寒三日脉浮數而微病人身凉和者何也答曰此為欲解也解以夜半脉浮而解者濈然汗出也脉數而解者必能食也脉微而解者必大汗出也傷寒三日陽出入隂之時病人身熱脉浮數而大邪氣傳也若身凉和脉浮數而微者則邪氣不傳而欲解也解以夜半者陽生于子也脉浮主濈然汗出而解者邪從外散也脉數主能食而解者胃氣和也脉㣲主大汗出而解者邪氣微也問曰脉病欲知愈未愈者何以别之答曰寸口關上尺中三處大小浮沈遲數同等雖有寒熱不解者此脉隂陽為和平雖劇當愈三部脉均等即正氣已和雖有餘邪何害之有立夏得洪大脉是其本位其人病身體苦疼重者須發其汗若明日身不疼不重者不須發汗若汗濈濈自出明日便解矣何以言之立夏得洪大脉是其時脉故使然也四時倣此脉來應時為正氣内固雖外感邪氣但㣲自汗出而亦解爾内經曰脉得四時之順者病無他問曰凡病欲知何時得何時愈答曰假令夜半得病明日日中愈日中得病夜半愈何以言之日中得病夜半愈者以陽得隂則解也夜半得病明日日中愈者以隂得陽則解也日中得病者陽受之夜半得病者隂受之陽不和得隂則和是解以夜半隂不和得陽則和是解以日中經曰用陽和隂用隂和陽寸口脉浮為在表沈為在裏數為在府遲為在藏假令脉遲此為在藏也經曰諸陽浮數為乗府諸隂遲濇為乘藏趺陽脉浮而濇少隂脉如經也其病在脾法當下利何以知之若脉浮大者氣實血虛也今趺陽脉浮而濇故知脾氣不足胃氣虛也以少隂脉弦而浮纔見此為調脉故稱如經也若反滑而數者故知當屎膿也趺陽者胃之脉診得浮而濇者脾胃不足也浮者以為氣實濇者以為血虛者此非也經曰脉浮而大為氣實大為血虛若脉浮大當為氣實血虛今趺陽脉浮而濇浮則胃虚濇則脾寒脾胃虛寒則榖不消而水不别法當下利少隂腎脉也腎為肺之子為肝之母浮為肺脉弦為肝脉少隂脉弦而浮為子母相生故云調脉若滑而數者則客熱在下焦使血流腐而為膿故屎膿也寸口脉浮而𦂳浮則為風𦂳則為寒風則傷衞寒則傷榮榮衞俱病骨節煩疼當發其汗也脉經曰風傷陽寒傷隂衛為陽榮為隂風為陽寒為隂各從其類而傷也易曰水流濕火就燥者是也衞得風則熱榮得寒則痛榮衞俱病故致骨節煩疼當與麻黄湯發汗則愈趺陽脉遲而緩胃氣如經也趺陽脉浮而數浮則傷胃數則動脾此非本病醫特下之所為也榮衞内陷其數先微脉反但浮其人必大便鞕氣噫而除何以言之本以數脉動脾其數先微故知脾氣不治大便鞕氣噫而除今脉反浮其數改微邪氣獨留心中則饑邪熱不殺糓潮熱發渇數脉當遲緩脉因前後度數如法病者則饑數脉不時則生惡瘡也經常也趺陽之脉以候脾胃故遲緩之脉為常也脉浮數則為醫妄下傷胃動脾邪氣乘虛内䧟也邪在表則見陽脉邪在裏則見隂脉邪在表之時脉浮而數也因下裏虛榮衞内䧟邪客於脾以數則動脾今數先微則是脾邪先䧟于裏也胃虚脾熱津液乾少大便必鞕鍼經曰脾病善噫得後與氣則快然如衰今脾客邪熱故氣噫而除脾能消磨水糓今邪氣獨留于脾脾氣不治心中雖飢而不能殺糓也脾主為胃行其津液脾為熱燥故潮熱而發渇也趺陽之脉本遲而緩因下之後變浮為數榮衞内䧟數復改微是脉因前後度數如法邪熱内䧟於脾而心中善飢也數脉不時者為數當改微而復不微如此則是邪氣不傳于裏但鬰于榮衞之中必出自肌皮為惡瘡也師曰病人脉微而濇者此為醫所病也大發其汗又數大下之其人亡血病當寒後乃發熱無休止時夏月盛熱欲著複衣冬月盛寒欲裸其身所以然者陽微則惡寒隂弱則發熱此一發其汗令陽氣微又大下之令隂氣弱五月之時陽氣在表胃中虛冷以陽氣内微不能勝冷故欲着複衣十一月之時陽氣在裏胃中煩熱以隂氣内弱不能勝熱故欲裸其身又隂脉遲濇故知亡血也㣲為亡陽濇則無血不當汗而强與汗之者令陽氣微隂氣上行陽中則惡寒故曰陽微則惡寒不當下而强與下之者令隂氣弱陽氣下䧟入隂中則發熱故曰隂弱則發熱氣為陽血為隂陽脉以候氣隂脉以候血隂脉遲濇為榮血不足故知亡血經曰尺脉遲者不可發汗以榮氣不足血少故也脉浮而大心下反鞕有熱属藏者攻之不令發汗浮大之脉當責邪在表若心下反鞕者則熱已甚而内結也有熱属藏者為别無虛寒而但見裏熱也藏属隂為邪在裏故可下之攻之謂下之也不可謂脉浮大便與發汗病源曰熱毒氣乘心心下痞滿此為有實宜速下之属府者不令溲數溲數則大便鞕汗多則熱愈汗少則便難脉遲尚未可攻雖心下鞕若餘無裏症但見表證者為病在陽謂之属府當先解表然後攻痞溲小便也悮為飲結而利小便使其溲數大便必鞕也經曰小便數者大便必鞕謂走其津液也汗多則邪氣除而熱愈汗少則邪熱不盡又走其津液必便難也鞕家當下設脉遲則未可攻以遲為不足即裏氣未實故也脉浮而洪身汗如油喘而不休水漿不下形體不仁乍静乍亂此為命絶也病有不可治者為邪氣勝於正氣也内經曰大則邪至又曰大則病進脉浮而洪者邪氣勝也身汗如油喘而不休者正氣脫也四時以胃氣為本水漿不下者胃氣盡也一身以榮衞為充形體不仁者榮衞絶也不仁為痛痒俱不知也鍼經曰榮衞不行故為不仁争則亂安則静乍静乍亂者正與邪争正負邪勝也正氣已脫胃氣又盡榮衞俱絶邪氣獨勝故曰命絶也又未知何藏先受災其若汗出髮潤喘不休者此為肺先絶也肺氣之主為津液之帥汗出髮潤者為津液脫也喘不休者氣脫也陽反獨留形體如烟薫直視揺頭者此心絶也肺主氣心主血氣為陽血為隂陽反獨留者則為身體復熱是血先絶是氣獨在也形體如烟薫者為身無精華是血絶不榮於身也心脉挾咽系目直視者心經絶也頭為諸陽之㑹揺頭者隂絶而陽無根也脣吻反青四肢漐習者此為肝絶也脣吻者脾之候肝色青肝絶則真色見于所勝之部也四肢者脾所主肝主筋肝絶則筋脉引急發于所勝之分也漐習者為振動若搐搦手足時時引縮也環口黧黑柔汗發黄者此為脾絶也脾主口脣絶則精華去故環口黧黑柔汗冷汗也柔為隂脾胃為津液之本陽氣之宗柔汗發黄者脾絶而陽脫真色見也溲便遺失狂言目反直視者此為腎絶也腎司開闔禁固便溺溲便遺失者腎絶不能約制也腎藏志狂言者志不守也内經曰狂言者是失志矣失志者死鍼經曰五藏之精氣皆上注于目骨之精為瞳子目反直視腎絶則骨之精不榮於瞳子而不轉也又未知何藏隂陽前絶若陽氣前絶隂氣後竭者其人死身色必青隂氣前絶陽氣後竭者其人死身色必赤腋下温心下熱也陽主熱而色赤隂主寒而色青其人死也身色青則隂未離乎體故曰隂氣後竭身色赤腋下熱則陽未離乎體故曰陽氣後竭鍼經曰又有両死而無两生者此之謂也寸口脉浮大而醫反下之此謂大逆浮則無血大則為寒寒氣相搏則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人必䭇經云脉浮大應發汗若反下之為大逆浮大之脉邪在表也當發其汗若反下之是攻其正氣邪氣得以深入故為大逆浮則無血者下後亡血也大則為寒者邪氣獨在也寒邪因裏虛而入寒氣相搏乃為腸鳴醫見脉大以為有熱飲以冷水欲令水寒勝熱而作大汗裏先虛寒又得冷水水寒相搏使中焦之氣濇滯故令䭇也趺陽脉浮則為虛浮虛相搏故令䭇言胃氣虚竭也脉滑則為噦此為醫咎責虚取實守空廹血脉浮鼻中燥者必衂也趺陽脉浮為䭇脉滑為噦皆醫之咎責虛取實之過也内經曰隂在内陽之守也陽在外隂之使也發汗攻陽亡津液而陽氣不足者謂之守空經曰表氣微虛裏氣不守故使邪中于隂也隂不為陽守邪氣因得而入之内搏隂血隂血失所血乃妄行未知從何道而出若脉浮鼻燥者知血必從鼻中出也諸脉浮數當發熱而洒淅惡寒若有痛處飲食如常者畜積有膿也浮數之脉主邪在經當發熱而洒淅惡寒病人一身盡痛不欲食者傷寒也若雖發熱惡寒而痛偏着一處飲食如常者即非傷寒是邪氣鬰結於經絡之間血氣壅遏不通血欲聚而成癰膿也脉浮而遲面熱赤而戰惕者六七日當汗出而解反發熱者差遲遲為無陽不能作汗其身必痒也脉浮靣熱赤者邪氣外浮于表也脉遲戰惕者本氣不足也六日為邪傳經盡當汗出而解之時若當汗不汗反發熱者為裏虛津液不多不能作汗既不汗邪無從出是以差遲發熱為邪氣浮於皮膚必作身痒也經曰以其不能得小汗出故其身必痒也寸口脉隂陽俱𦂳者法當清邪中於上焦濁邪中於下焦清邪中上名曰潔也濁邪中下名曰渾也隂中於邪必内慄也表氣微虚裏氣不守故使邪中於隂也陽中於邪必發熱頭痛項强𦂳頸攣腰痛脛酸所謂陽中霧露之氣故曰清邪中上濁邪中下隂氣為慄足膝逆冷便溺妄出表氣㣲虛裏氣微急三焦相溷内外不通上焦怫鬰藏氣相薰口爛食齗也中焦不治胃氣上衝脾氣不轉胃中為濁榮衞不通血凝不流若胃氣前通者小便赤黄與熱相搏因熱作使遊于經絡出入藏腑熱氣所過則為癰膿若隂氣前通者陽氣厥微隂無所使客氣入内􅅉而出之聲嗢咽塞寒厥相逐為熱所擁血凝自下狀如豚肝隂陽俱厥脾氣孤弱五液注下下焦不闔清便下重令便數難臍築湫痛命将難全浮為陽沈為隂陽脉𦂳則霧露之氣中於上焦隂脉𦂳𦂳則寒邪中于下焦上焦者太陽也下焦者少隂也發熱頭痛項强頸攣腰痛脛酸者霧露之氣中於太陽之經也濁邪中下隂氣為慄足脛逆冷便溺妄出者寒中少隂也因表經也微虛邪入而客之又裏氣不守邪乘裏弱遂中於隂陽虛遇邪内為懼慄致氣微急矣内經曰陽病者上行極而下隂病者下行極而上此上焦之邪甚則下干中焦下焦之邪甚則上干中焦由是三焦溷亂也三焦主持諸氣三焦既相溷亂則内外之氣俱不得通膻中為陽氣之海氣因不得通于内外怫鬰於上焦而為熱與藏相薰口爛食齗内經曰膈熱不便上為口糜中焦為上下二焦之邪溷亂則不得平治中焦在胃之中中焦失治胃氣因上衝也脾坤也坤助胃氣磨消水榖脾氣不轉則胃中水榖不得消磨故胃中濁也金匱要畧曰糓氣不消胃中苦濁榮者水糓之精氣也衞者水糓之悍氣也氣不能布散致榮衞不通血凝不流衞氣者陽氣也榮血者隂氣也陽主為熱隂主為寒衞氣前通者陽氣通而熱氣得行也内經曰膀胱者津液藏焉化則能出以小便赤黄知衞氣前通也熱氣與衞氣相搏而行出入藏腑逰于經絡經絡客熱則血凝肉腐而為癰此見其熱氣得行若隂氣前通者則不然陽在外為隂之使因陽氣厥微隂無所使遂隂氣前通也内經曰陽氣者衞外而為固也陽氣厥微則不能衞外寒氣因而客之鼻者肺之候肺主聲寒氣内入者客于肺經則􅅉而出之聲嗢咽塞寒者外邪也厥者内邪也内外之邪合併相逐為熱則血凝不流今為熱所擁使血凝自下如豚肝也上焦陽氣厥下焦隂氣厥二氣俱厥不相順接則脾氣獨弱不能行化氣血滋養五藏致五藏俱虛而五液注下鍼經曰五藏不和使液溢而下流于隂闔合也清圊也下焦氣脫而不合故便數而下重臍為生氣之原臍築湫痛則生氣欲絶故曰命将難全脉隂陽俱𦂳者口中氣出脣口乾燥踡卧足冷鼻中涕出舌上滑胎勿妄治也到七日以來其人微發熱手足温者此為欲解或到七日八日已上反大發熱此為難治設使惡寒者必欲嘔也腹内痛者必欲利也脉隂陽俱𦂳為裏客寒寒為隂得陽則解口中氣出脣口乾燥者陽氣漸復正氣方溢也雖爾然而隂未盡散踡卧足冷鼻中涕出舌上滑胎知隂猶存也方隂陽未分之時不可妄治以偏隂陽之氣到七日已來其人㣲發熱手足温者為隂氣已盡陽氣得復是為欲解若過七日不解到八日以上反發大熱者為隂極變熱邪氣勝正故云難治陽脉𦂳者寒邪發于上焦上焦主外也隂脉𦂳者寒邪發于下焦下焦主内也設使惡寒者上焦寒氣勝是必欲嘔也腹内痛者下焦寒氣勝是必欲利也脉隂陽俱𦂳至於吐利其脉獨不解𦂳去人安此為欲解若脉遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解脉隂陽俱𦂳為寒氣干上下至于吐利之後𦂳脉不罷者為其脉獨不解𦂳去人安為欲解若脉遲至六七日不欲食者為吐利後脾胃大虛内經曰飲入于胃遊溢精氣上輸于脾脾氣散精上歸于肺通調水道下輸膀胱水精四布五經並行脾胃氣强則能輸散水飲之氣若脾胃氣虚則水飲内停也所謂晩發者後來之疾也若至六七日而欲食者則脾胃已和寒邪已散故云欲解病六七日手足三部脉皆至大煩而口噤不能言其人躁擾者必欲解也煩熱也傳經之時病人身煩口不能言内作躁擾則隂陽争勝若手足三部脉皆至為正氣勝邪氣微陽氣復寒氣散欲解也若脉和其人大煩目重臉内際黄者此為欲解也脉經曰病人两目眥有黄色起者其病方愈病以脉為主若目黄大煩脉不和者邪勝也其病為進目黄大煩而脉和者為正氣已和故云欲解脉浮而數浮為風數為虚風為熱虛為寒風虛相搏則洒淅惡寒也内經曰有者為實無者為虚氣并則無血血并則無氣風則傷衞數則無血浮數之脉風邪并于衞衞勝則榮虚也衞為陽風搏于衞所以為熱榮為隂榮氣虚所以為寒風并于衞者發熱惡寒之證具矣脉浮而滑浮為陽滑為實陽實相搏其脉數疾衞氣失度浮滑之脉數疾發熱汗出此為不治浮為邪氣并于衞而衞氣勝滑為邪氣并于榮而榮氣實邪氣勝實擁于榮衞則榮衞行速故脉數疾一息六至曰數平人脉一息四至衞氣行六寸今一息六至則衞氣行九寸計過人之半是脉數疾知衞氣失其常度也浮滑數疾之脉發熱汗出而當解若不解者精氣脫也必不可治經曰脉隂陽俱盛大汗出不解者死傷寒欬逆上氣其脉散者死謂其形損故也千金方云以喘嗽為欬逆上氣者肺病散者心脉是心復賊肺金也内經曰心之肺謂之死隂死隂之属不過三日而死以見其損傷故也平脉法第二問曰脉有三部隂陽相乘榮衞血氣在人體躬呼吸出入上下於中因息遊布津液流通隨時動作効象形容春弦秋浮冬沉夏洪察色觀脉大小不同一時之間變無經常尺寸參差或短或長上下乖錯或存或亡病輙改易進退低昻心迷意惑動失紀綱願為具陳令得分明師曰子之所問道之根源脉有三部尺寸及關寸為上部關為中部尺為下部榮衞流行不失衡銓衡銓者稱量重輕内經曰春應中規夏應中衡秋應中矩冬應中權榮行脉中衞行脉外榮衞行而脉相隨上下應四時而不失其常度腎沉心洪肺浮肝弦此自經常不失銖分腎北方水旺於冬而脉沉心南方火旺於夏而脉洪肺西方金旺於秋而脉浮肝東方木旺於春而脉弦此為經常銖分不差也出入升降漏刻周旋水下二刻一周循環人身之脉計長一十六丈二尺一呼脉行三寸一吸脉行三寸一呼一吸為一息脉行六寸一日一夜漏水下百刻人一萬三千五百息脉行八百一十丈五十度周於身則一刻之中人一百三十五息脉行八丈一尺水下二刻人二百七十息脉行一十六丈二尺一周於身也脉經之行周而復始若循環之無端也當復寸口虛實見焉經脉之始從中焦注于手太隂寸口二百七十息脉行一周身復還于寸口寸口為脉之經始故以診視虛實焉經曰虛實死生之要必皆見於寸口之中變化相乘隂陽相與風則浮虚寒則堅固沉潜水畜支飲急弦動則為痛數則熱煩風傷陽故脉浮虛寒傷隂故脉牢堅畜積於内者謂之水畜故脉沉潜支散於外者謂之支飲故脉弦急動則隂陽相搏相搏則痛生焉數為陽邪氣勝陽勝則熱煩焉設有不應知變所縁三部不同病各異端脉與病不相應者必縁傳變之所致三部以候五藏之氣隨部察其虛實焉太過可怪不及亦然邪不空見中必有姧審察表裏三焦別焉知其所舎消息診㸔料度府藏獨見若神為子條記傳與賢人太過不及之脉皆有邪氣干於正氣審㸔在表在裏入府入藏隨其所舎而治之師曰呼吸者脉之頭也難經曰一呼脉行三寸一吸脉行三寸以脉隨呼吸而行故言脉之頭也初持脉來疾去遲出疾入遲名曰内虚外實也初持脉來遲去疾名曰内實外虛也外為陽内為隂内經曰來者為陽去者為隂是出以候外入以候内疾為有餘有餘則實遲為不足不足則虛來疾去遲者陽有餘而隂不足故曰内虛外實來遲去疾者陽不足而隂有餘故曰内實外虚問曰上工望而知之中工問而知之下工脉而知之願聞其説師曰病家人請云病人苦發熱身體疼痛自卧師到診其脉沉而遲者知其差也何以知之表有病者脉當浮大今脉反沉遲故知愈也望以觀其形證問以知其所苦脉以别其表裏病苦發熱身疼邪在表也當卧不安而脉浮數今病人自卧而脉沉遲者表邪緩也是有裏脉而無表證則知表邪當愈也假令病人云腹内卒痛病人自坐師到脉之浮而大者知其差也何以知之若裏有病者脉當沉而今脉浮大故知愈也腹痛者裏寒也痛甚則不能起而脉沉細今病人自坐而脉浮大者裏寒散也是有表脉而無裏證也則知裏邪當愈是望證問病切脉三者相參而得之可謂十全之醫鍼經曰知一為上知二為神且明矣師曰病家人來請云病人發熱煩極明日師到病人向壁卧此熱已去也設令脉不知處言已愈發熱煩極則不能静卧今向壁静卧知熱已去設令向壁卧聞師到不驚起而盻視若三言三止脉之嚥唾者此詐病也設令脉自和處言此病大重當須服吐下藥鍼灸數十百處乃愈詐病者非善人以言恐之使其畏懼則愈醫者意也此之謂也師持脉病人欠者無病也鍼經曰陽引而上隂引而下隂陽相引故欠隂陽不相引則病隂陽相引則和是欠者無病也脉之呻者病也呻為呻吟之聲身有所苦則然也言遲者風也風客于中則經絡急舌强難運利也揺頭言者裏痛也裏有病欲言則頭為之戰揺行遲者表强也表强者由經絡引急而行步不利也坐而伏者短氣也短氣者裏不和也故坐而喜伏坐而下一脚者腰痛也内經曰腰者身之大関節也腰痛為大関節不利故坐不能正下一脚以緩腰中之痛也裏實䕶腹如懷卵物者心痛也心痛則不能伸仰䕶腹以按其痛師曰伏氣之病以意候之今月之内欲有伏氣假令舊有伏氣當須脉之若脉微弱者當喉中痛似傷非喉痺也病人云實咽中痛雖爾今復欲下利冬時感寒伏藏於經中不即發者謂之伏氣至春分之時伏寒欲發故云今月之内欲有伏氣假令伏氣已發當須脉之審在何經得脉微弱者知邪在少隂少隂之脉循喉嚨寒氣客之必發咽痛腎司開闔少隂治在下焦寒邪内甚則開闔不治下焦不約必成下利故云雖爾咽痛復欲下利問曰人病恐怖者其脉何狀師曰脉行如循絲纍纍然其面白脫色也内經曰氣血者人之神恐怖者血氣不足而神氣弱也脉形如循絲纍纍然面白色脫者鍼經曰血奪者色夭然不澤其脉空虛是知恐怖為血氣不足問曰人不飲其脉何類師曰脉自濇脣口乾燥也濇為隂雖主亡津液而脣口乾燥以隂為主内不飲也問曰人愧者其脉何類師曰脉浮而面色乍白赤愧者羞也愧則神氣怯弱故脉浮而面色變改不常也問曰經說脉三菽六菽重者何謂也師曰脉者人以指按之如三菽之重者肺氣也如六菽之重者心氣也如九菽之重者脾氣也如十二菽之重者肝氣也按之至骨者腎氣也菽豆也難經曰如三菽之重與皮毛相得者肺部也如六菽之重與血脉相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指來疾者腎部也各隨所主之分以候藏氣假令下利寸口關上尺中悉不見脉尺中時小見脉再舉頭者腎氣也若見損脉來至為難治脉經曰冷氣在胃中故令脉不通下利不見脉則冷氣客于脾胃尺中時一小見為脾虛腎氣所乘脉再舉頭者脾為腎所乘也若尺中之治脉更或減損為腎氣亦衰脾復乘之鬼賊相刑故云難是脾勝不應時也問曰脉有相乘有縱有横有逆有順何也師曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰横水行乘金火行乘木名曰逆金行乘水木行乘火名曰順也金勝木水勝火縱者言縱任其氣乘其所勝横者言其氣横逆反乘所不勝也縱横與恣縱恣横之義通水為金子火為木子子行乘母其來逆也母行乘子其氣順也問曰脉有殘賊何謂也師曰脉有弦𦂳浮滑沉濇此六者名曰殘賊為諸脉作病也為人病者名曰八邪風寒暑濕傷於外也饑飽勞逸傷於内也經脉者榮衛隂陽也其為諸經脉作病者必由風寒暑濕傷於榮衞客于隂陽之中風則脉浮寒則脉𦂳中暑則脉滑中濕則脉濇傷於隂則脉沉傷於陽則脉浮所以謂之殘賊者傷良曰殘害良曰賊以能傷害正氣也問曰脉有災怪何謂也師曰假令人病脉得太陽與形證相應因為作湯比還送湯如食頃病人乃大吐若下利腹中痛師曰我前來不見此證今乃變異是名災怪又問曰何緣作此吐利答曰或有舊時服藥今乃發作也故名災怪耳醫以脉證與藥相對而反變異為其災可怪故名災怪問曰東方肝脉其形何似師曰肝者木也名厥隂其脉微弦濡弱而長是肝脉也肝病自得濡弱者愈也難經曰春脉弦者肝東方木也萬物始生未有枝葉故脉濡弱而長也故曰弦是肝之平脉肝病得此脉者為肝氣已和病自愈也假令得純弦脉者死何以知之以其脉如弦直是肝藏傷故知之也純弦者謂如弦之直而不軟是中無胃氣為真藏之脉内經曰死肝脉來急益勁如新張弓弦南方心脉其形何似師曰心者火也名少隂其脉洪大而長是心脉也心病自得洪大者愈也心旺於夏夏則陽外勝氣血淖溢故其脉來洪大而長也假令脉來微去大故名反病在裏也脉來頭小本大者故名覆病在表也上㣲頭小者則汗出下微本大者則為關格不通不得尿頭無汗者可治有汗者死心脉來盛去衰為平來微去大是反其候内經曰大則邪至小則平微為正氣大為邪氣來以候表來微則知表和去以候裏去大則知裏病内經曰心脉來不盛去反盛此為不及病在中頭小本大者即前小後大也小為正氣大為邪氣則邪氣先在裏今復還于表故名曰覆不云去而止云來者是知在表脉經曰在上為表在下為裏汗者心之液上微謂浮之而微頭小謂前小則表微中氣虛故主汗出下微謂沉之而微本大謂後大沉則在裏大則病進内經曰心為牡藏少腹為之使今邪甚不行格開小腸正氣不通故不得尿名曰關格脉經曰陽氣上出汗見於頭今關格正氣不通加之頭有汗者則陽氣不得下通而上脫也其無汗者雖作關格然陽氣未衰而猶可治西方肺脉其形何似師曰肺者金也名太隂其脉毛浮是肺脉也肺病自得此脉若得緩遲者皆愈得數者則劇何以知之數者南方火火尅西方金法當癰腫為難治也輕虚浮曰毛肺之平脉也緩遲者脾之脉脾為肺之母以子母相生故云皆愈數者心之脉火尅金為鬼賊相刑故劇肺主皮毛數則為熱熱客皮膚留而不去則為癰瘍經曰數脉不時則生惡瘡問曰二月得毛浮脉何以遽言至秋當死師曰二月之時脉當濡弱反得毛浮者故知至秋死二月肝用事肝脉属木應濡弱反得毛浮者是肺脉也肺属金金來尅木故知至秋死他皆倣此當春時反見秋脉為金氣乘木肺來尅肝奪旺脉而見秋脉令肺旺則肝脉絶故知至秋當死師曰脉肥人責浮瘦人責沉肥人當沉今反浮瘦人當浮今反沉故責之肥人肌膚厚故脉當沉瘦人肌膚薄故脉當浮今肥人反浮瘦人反沉必有邪氣相干使脉反常故當責而求之耳師曰寸脉下不至關為陽絶尺脉上不至關為隂絶此皆不治决死也若計其餘命死生之期期以月節尅之也脉經曰陽生於寸動於尺隂生於尺動於寸寸脉下不至關者為陽絶不能下應於尺也尺脉上不至關者為隂絶不能上應於寸也内經曰隂陽離缺精氣乃絶故皆决死期以月節尅之者謂如陽絶死於春夏隂絶死於秋冬師曰脉病人不病名曰行屍無王氣卒眩仆不識人者短命則死人病脉不病名曰内虚以無糓神雖困無苦脉者人之根本也脉病人不病為根本内絶形雖且强卒氣脫眩暈殭仆而死不曰行尸而何人病脉不病則根本内固形雖且羸止内虛耳糓神者糓氣也糓氣既足自然安矣内經曰形氣有餘脉氣不足死脉氣有餘形氣不足生問曰翕奄沉名曰滑何謂也沉為純隂翕為正陽隂陽和合故令脉滑關尺自平陽明脉微沉食飲自可少隂脉微滑滑者𦂳之浮名也此為隂實其人必股内汗出隂下濕也脉來大而盛聚而沉謂之翕奄沉正如轉珠之状也沉為藏氣故曰純隂翕為府氣故曰正陽滑者隂陽氣和不為偏勝也関尺自平陽明脉微沉者當陽部見沉脉則隂偏而陽不足也陽明胃脉胃中飲多故食飲自可少隂脉微滑者當隂部見陽脉則陽偏而隂不足也以陽溱隂分故曰隂實股少隂之部也今陽熱溱隂必薰蒸津液泄達於股内汗出而隂下濕也問曰曽為人所難𦂳脉從何而來師曰假令亡汗若吐以肺裏寒故令脉𦂳也假令下利以胃中虛冷故脉𦂳也金匱要略曰寒脉急内經曰諸𦂳為寒寸口衞氣盛名曰髙髙者暴狂而肥内經曰隂不勝陽其陽則脉流薄疾并乃狂衞為氣衞盛而暴狂者隂不勝陽也鍼經曰衞氣者所以温分肉充皮毛肥腠理司開闔者也衞氣盛為肥者氣盛於外也榮氣盛名曰章章者暴澤而光榮者血也榮華於身者也榮盛故身暴光澤也髙章相搏名曰綱綱者身筋急脉直榮衞俱盛則筋絡滿急衞氣弱名曰惵惵者心中氣動迫怯衞出上焦弱則上虛而心中氣動迫怯也榮氣弱名曰卑卑者心中羞愧鍼經曰血者神氣也血弱則神弱故常自羞愧惵卑相搏名曰損損者五藏六府之虛惙也衞以䕶陽榮以養隂榮衞俱虛則五藏六府失於滋養故俱乏氣虛惙也衞氣和名曰緩緩者四肢不能自收衞氣獨和不與榮氣相諧則榮病内經曰目受血而能視足受血而能歩手受血而能握指受血而能攝四肢不收由榮血病不能滋養故也榮氣和名曰遲遲者身體重但欲眠榮氣獨和不與衞氣相諧則衞病身體重而欲眠者衞病而氣不敷布也遲緩相摶名曰沉沉者腰中直腹内急痛但欲卧不欲行榮氣獨和於内衞氣獨和於外榮衞不相和諧相搏而為病腰中直者衞不利於外也腹内痛者榮不和於内也但欲卧不欲行者榮衞不利也寸口脉緩而遲緩則陽氣長其色鮮其顔光其聲髙毛髮長遲則隂氣盛骨髓生血滿肌肉𦂳薄鮮鞕隂陽相抱榮衞行剛柔相得名强也緩為胃脉胃合衞氣温分肉充皮毛肥腠理司開闔胃和氣舒則顔色光潤聲清毛澤矣遲為脾脉脾合榮氣榮養骨髓實肌肉濡筋絡利關節榮血滿則骨髓生肌肉𦂳硬矣隂陽調和二氣相化而不相戾榮衞流通剛柔相得是為强壯趺陽脉滑而𦂳滑者胃氣實𦂳者脾氣强持實擊强痛還自傷以手把刃坐作瘡也趺陽之脉以候脾胃滑則榖氣實是為胃實𦂳則隂氣勝是為脾强以脾胃一實一强而相搏擊故令痛也一强一弱相搏則不能作痛此脾胃两各强實相擊藏腑自傷而痛也譬如以手把刃而成瘡豈非自貽其害乎寸口脉浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆經曰浮為虛内經曰大則病進浮則為正氣虛大則為邪氣實在尺則邪氣關閉下焦裏氣不得下通故不得小便在寸則邪氣格拒上焦使食不得入故吐逆趺陽脉伏而濇伏則吐逆水糓不化濇則食不得入名曰關格伏則胃氣伏而不宣中焦関格正氣壅塞故吐逆而水糓不化濇則脾氣濇而不利邪氣拒於上焦故食不得入脉浮而大浮為風虛大為氣强風氣相搏必成癮􅇙身體為癢癢者為泄風久久為痂癩痂癩者眉少髮稀身有乾瘡而腥臭内經曰脉風為癘寸口脉弱而遲弱者衞氣㣲遲則榮氣寒榮為血血寒則發熱衞為氣氣微者心内饑饑而虛滿不能食也衞為陽榮為隂弱者衞氣微陽氣不足也遲者榮中寒經中客邪也榮客寒邪摶而發熱也陽氣内微心中雖饑饑而虛滿不能食也趺陽脉大而𦂳者當即下利為難治大為虛𦂳為寒胃中虚寒當即下利下利脉當微小反𦂳者邪勝也故云難治經曰下利脉大者為未止寸口脉弱而緩弱者陽氣不足緩者胃氣有餘噫而吞酸食卒不下氣填於膈上也弱者陽氣不足陽能消糓陽氣不足則不能消糓食緩者胃氣有餘則胃中有未消之糓物也故使噫而吞酸食卒不下氣填於膈上也金匱要畧曰中焦失和不能消糓故令噫趺陽脉𦂳而浮浮為氣𦂳為寒浮為腹滿𦂳為絞痛浮𦂳相搏腸鳴而轉轉則氣動膈氣乃下少隂少隂脉不出則虛寒之氣聚於隂而隂腫大也浮為胃氣虛𦂳為脾中寒胃虛則滿脾寒則痛虛寒相搏腸鳴而轉轉則膈中之氣因而下泄也若少隂脉不出則虛寒之氣至于下焦結於少隂而聚於隂器不得發泄使隂腫大而虚也寸口脉微而濇微者衞氣不行濇者榮氣不足榮衞不能相將三焦無所仰身體痺不仁榮氣不足則煩疼口難言衞氣虛則惡寒數欠三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不能消榖引食下焦不歸者則遺溲人養三焦者血也䕶三焦者氣也榮衞俱損血氣不能相將而行三焦無所依仰身體為之頑痺而不仁内經曰榮氣虛則不仁鍼經曰衞氣不行則為不仁榮為血血不足則煩疼榮属心榮弱心虛則口難言衞為陽陽微則惡寒衞為氣氣虛則數欠三焦因榮衞不足無所依仰其氣不能歸其部金匱要略曰上焦竭善噫上焦受中焦之氣中焦未和不能消糓故令噫耳下焦竭即遺溺失便以上焦在膈上物未化之分也不歸者不至也不至其部則物未能傳化故噫而酢吞中焦在胃之中主腐水糓故水糓化則思食中焦之食不歸其部則水糓不化故云不能消糓引食下焦在膀胱上主分别清濁溲小便也下焦不歸其部不能約制溲便故遺溲趺陽脉沉而數沉為實數消糓𦂳者病難治沉為實者沉主裏也數消糓者數為熱也𦂳為肝脉見於脾部木來尅土為鬼賊相刑故云難治寸口脉微而濇微者衞氣衰濇者榮氣不足衞氣衰面色黄榮氣不足面色青榮為根衞為葉榮衞俱㣲則根葉枯槁而寒慄欬唾腥吐涎沫也衞為氣面色黄者衞氣衰也榮為血面色青者榮血衰也榮行脉中為根衞行脉外為葉榮為隂衞為陽根葉俱微則隂陽之氣内衰致生寒慄而欬逆唾腥涎沫也趺陽脉浮而芤浮者衞氣衰芤者榮氣傷其身體瘦肌肉甲錯浮芤相搏宗氣衰微四属斷絶經曰衞氣盛名曰髙髙者暴壮而肥榮氣盛名曰章章者暴澤而光其身體瘦而不肥者衞氣衰也肌肉甲錯而不澤者榮氣衰也宗氣者三焦歸氣也四属者皮肉脂髓也榮衞衰傷則宗氣亦微四属失所滋養致絶矣寸口脉微而緩微者衞氣踈踈則其膚空緩者胃氣實實則糓消而水化也糓入於胃脉道乃行水入於經其血乃成榮盛則其膚必踈三焦絶經名曰血崩衞為陽微為亡陽脉微者謂衞氣踈衞温分肉肥腠理衞氣既疎皮膚不得温肥則空虚也經曰緩者胃氣有餘為實故云緩者胃氣實内經曰食入於胃滛精於脉是糓入於胃脉道乃行也鍼經曰飲而液渗於絡和合於血是水入於經其血乃成也胃中糓消水化而為血氣今衞踈榮盛是榮氣强而衞氣弱也衞氣弱者外則不能固宻皮膚而氣為之踈内則不能衞䕶其血而血為之崩也經常也三焦者氣之道路也衞氣不循常度三焦亦絶其常度也趺陽脉微而𦂳𦂳則為寒微則為虚微𦂳相搏則為短氣中虛且寒氣自短矣少隂脉弱而濇弱者微煩濇者厥逆煩者熱也少隂脉弱者隂虛也隂虚則發熱也以隂部見陽脉非大虛也故生微煩厥逆者四肢冷也經曰隂陽不相順接便為厥厥者手足厥冷是也少隂脉濇者隂氣濇不能與陽相順接故厥冷也趺陽脉不出脾不上下身冷膚鞕脾胃為榮衞之根脾能上下則水糓磨消榮衞之氣得以行脾氣虚衰不能上下則榮衞之氣不得通融於外故趺陽脉不出身冷者衞氣不温也膚鞕者榮血不濡潤也少隂脉不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸隂股與隂相動令身不仁此為尸厥當刺期門巨闕尸厥者為其從厥而生形無所知其状若尸故名尸厥少隂脉不出則厥氣客於腎而腎氣微少精血厥氣上奔塞胸膈壅遏正氣使宗氣反聚而血結心下鍼經曰五糓入於胃其精液糟粕宗氣分為三隊宗氣積於胸中出於喉嚨以貫心肺而行呼吸又曰榮氣者別其津液注之於脉化而為血以榮四末今厥氣太甚宗氣反聚而不行則絶其呼吸血結心下而不流則四肢不仁陽氣為厥氣所壅不能宣發退下至隂股間與隂相動仁者柔也不仁者言不柔和也謂寒熱痛癢俱不覺知者也陽氣外不為使内不得通榮衞俱不得行身體不仁状若尸也經曰厥氣上行脉滿去形刺期門者以通心下結血刺巨闕者以行胸中之宗氣血氣流行厥氣退則甦而復矣寸口脉微尺脉𦂳其人虚損多汗知隂常在絶不見陽也寸微為亡陽尺𦂳為隂勝陽微隂勝故云虚損又加之多汗則愈損陽氣是隂常在而絶不見陽也寸口諸微亡陽諸濡亡血諸弱發熱諸𦂳為寒諸乘寒者則為厥鬰冒不仁以胃無糓氣脾濇不通口急不能言戰而慄也衞陽也微為衞氣微故云亡陽榮血也濡為榮氣弱故云亡血血弱為隂虚虚則發熱𦂳為隂勝故為寒諸乘寒者則隂陽俱虛而為寒邪乘之也寒乘氣虛抑伏陽氣不得宣發遂成厥也鬰冒為昏冒不知人也不仁為强直而無覺也為尸厥也以胃無糓氣致脾濇不通於上下故口急不能言戰者寒在表也慄者寒在裏也無他故問曰濡弱何以反適十一頭師曰五臟六腑相乘故令十一濡弱者氣血也往反有十一頭者五藏六府共十一也問曰何以知乘府何以知乘藏師曰諸陽浮數為乘府諸隂遲濇為乘藏也府陽也陽脉見者為乘府也藏隂也隂脉見者為乘藏也夫人迎左手關前一分是也肝膽之位脉𦂳盛傷於寒在結喉旁一寸半動脉應手是穴夫氣口右手関前一分是也脾胃之位脉𦂳盛傷於食黄帝曰氣口何以獨為五藏主岐伯曰胃者水糓之海六腑之大源也五味入口藏於胃以養五氣氣口太隂也兼屬脾是以五藏六腑之氣味皆出於胃變見於氣口夫太谿在足内踝骨上動脉陷中傷寒何以須診太谿脉耶太谿穴是少隂腎之經男子以右腎為命門女子以左腎為命門生死之要病人有命脉即活無即死仲景云少隂病手足逆冷發熱者不死脉不至者灸太谿五壯故傷寒必診太谿以察其腎之盛衰也八難曰寸口脉平而死者何謂也説曰十二經脉皆係於生氣也故腎為五藏六腑之本十二經脉之根呼吸之門三焦之原守邪之神故氣者人之根本也根本絶莖葉枯灸寸口脉平而死者生氣獨絶於内也十四難曰上部有脉下部無脉其人當吐不吐者死上部無脉下部有脉雖困無能為害也所以然者人之有尺如樹之有根枝葉將枯槁根本當自生脉有根本人有元氣故知不死夫衝陽一名㑹源在足跗上五寸骨間動脉上去陷谷三寸傷寒何以須診衝陽脉耶答曰衝陽穴是足陽明胃之經人受氣於糓糓入於胃乃傳與五藏六腑皆受氣於胃其清者為榮榮血也濁者為衞衞氣也榮行脉中衞行脉外隂陽相貫循環無端胃為水糓之海土禀四時皆以胃氣為本是胃四時之變病死生之要㑹故傷寒必診衝陽以察其胃氣之有無也夫結促代脉脉有結有促有代結者隂也隂盛則結脉來緩時一止復來曰結主胸滿煩躁促者陽也陽盛則促脉來數時一止復來曰促主積聚氣痞憂思所成大抵結促之脉雖時一止為病脉非死脉也唯代脉則死矣往來緩動而中止不能自還因而復動者名曰代也代者死也仲景傷寒脉結代心動悸炙甘草湯夫又據脉論云傷寒治法據脉為要證次之證如此脉亦如此條例徑行若證熱而脉遲證寒而脉數切不可惑於倉卒須是畧去外證專以脉為主領㑹斟酌而調理之庶無差誤雖然偏陽之脉又何也曰人禀隂陽二氣隂根於陽陽根於隂往來流通而無間斷者也或偏勝而病生焉盖偏陽則多熱偏隂則多寒偏隂則脉多虛濡按之無力頗有細濇之狀病生沉寒法當温散人所易知若夫病軀内外有熱其脉不數不洪但指下急濇而小𦂳如枝條刮刮之狀此則為陽勝隂當用寒凉之劑以解陽熱愆伏之邪以行血熱凝結之毒不可錯認以為脉小脾虛誤以温藥益其疾也縱或嘔逆亦是熱邪乗虚熱氣閉隔斷不可以虛脾之劑投之否則堕厝火積薪之轍矣凡病皆當審斯夫外有脉内無脉為外實内虚外無脉内有脉為内實外虚虚實之義隨其脉之有無者言之人所共知也若夫傷寒書所謂隂陽虛實則精㣲之義不無辨析於其間四十八難曰病之虛實出者為虛入者為實盖外有脉者表之真陽氣虛故隂邪以盛出而乘陽是以脉浮於外之時不可自忽以為陽脉盛也内有脉者裏之真隂虛故陽邪以盛入而乘隂是以脉實於内其病在裏法當下之當其陽熱入裏脉實於内之時不可自惑以為隂脉盛也是說非古人之立異也盖使人知如此之為隂盛則抑隂而助陽如彼之為陽盛則抑陽而助隂隂盛而邪出於外者發表之藥當性温以助陽如桂枝湯之類也陽盛而邪入於内者攻裏之藥當性寒以抑陽如承氣湯之類是也或曰隂出而乘於外是陽之不足也發汗則亡陽而汗之何哉是大不然隂邪搏於外不汗之則邪何由去桂枝之性温温之乃所以助陽陽有所助而長則隂邪之所由以消甘辛發散為陽者此也張氏所謂承氣入胃隂盛以亡正恐隂盛外出而誤以承氣下之外得寒以助邪内攻虛而損正安得而不亡或者又曰陽入而乘於内是隂之不足也隂受病則當有以温養而下之何哉是又不然邪入於内不下之則邪何從出承氣之性寒寒之乃所以抑陽陽有抑而微則真隂之所由以長酸苦涌泄為隂者此也張氏所謂桂枝下咽陽盛即斃者正恐陽盛入内而誤以桂枝汗之内得熱以助邪外撤虛而損正又安得而不斃觀古人發表之藥多温攻裏之藥多寒則知隂陽虛盛之意微非止為汗下設正所以為用藥寒温設也可不明辨哉傷寒治法内則審脉外則審證大要辨表裏虛實為先病在表有表虛有表實病在裏有裏虛有裏實又有表裏俱虛表裏俱實毫釐之分貴乎早辨表虚者脉浮而緩自汗惡風用桂枝湯以觧肌表實者脉浮而𦂳無汗惡寒用麻黄湯發汗裏實者脉伏而牢心腹痛結或大便堅小承氣湯大柴胡湯以下之裏虛脉沉而弱自利膈冷理中湯四逆湯以温之至若表裏俱虛則舉按脉虛如急救表裏之類下利身疼先與四逆湯清便自調後與桂枝湯是也表裏俱實則舉按脉實如表裏俱見之類脉浮尿赤與五苓散誤下腹痛桂枝大黄湯是也大抵出入轉變各有處所淺深輕重時刻異情順逆無差立當見効矣夫太陽属膀胱非發汗不能愈必用桂枝麻黄以助陽却邪陽明属胃非通泄不能痊必用大黄芒硝以疏利陽明少陽属膽無出入道柴胡半夏能利能汗消解血熱黄芩佐之太隂脾土性惡寒濕非乾薑白术不能温燥少隂腎水性惡寒燥非附子不能以温厥隂肝木藏血榮筋非􅆚藥甘草不能滋養此用藥經常之道也然三陽汗下和解人皆知之若太隂温燥不行則亦當温利如桂枝加大黄之類是太隂自陽明而出也少隂雖用附子亦有麻黄細辛之證是少隂自太陽而出也厥隂類例其間有用桂者是厥隂自少陽而出也其或太陽少陽二經欎閉則三隂皆自陽明出焉故三隂皆有下證如太隂腹滿時痛為有積少隂咽乾口燥為腎汁乾厥隂煩滿耳聾舌卷嚢縮為毒氣入臟皆當下之知乎此則傷寒用藥之法隨變隨應而不窮矣雖然傷寒七日傳遍六經此約法也或首尾只在一經或間傳一二經而止又不可拘但據脉與外證驗之是為活法發熱憎寒體痛時脉浮解表定無疑不憎寒却頻憎熱多汗咽乾裏下之表證脉浮身體肢莭煩疼惡風惡寒裏證脉實而不浮不惡風寒反惡熱身不疼自汗讝語自大便或咽乾腹痛滿表裏俱見症張氏用五芩散真人桂枝大黄甘草湯一塊生薑兩箇棗肉桂大黄等甘草滿盞水煎存七分表裏傷寒只一掃夫三陽三隂脉陽属膀胱胃膽間隂居脾腎更連肝浮長弦細沈微緩審脉仍将外證㸔夫三陽外證腰脊頭疼熱惡寒目疼汗出鼻中乾耳聾口苦時乾嘔胸脇肋疼寒熱干太陽證腰脊强頭項痛發熱惡寒若傷風則鼻塞惡風陽明證目疼身熱鼻乾不惡寒反惡熱自汗出不得卧内實大便難少陽證耳聾胸脇痛或口苦咽乾目眩或往來寒熱而嘔陽病體輕脉輕外證壯熱煩渇大小便秘頭面有汗昏潰氣麄揚手擲足夫三隂外證腹滿肢温利不煩舌乾燥渇或憎寒脣青舌卷多煩滿筋急嚢間縮又攣太隂證腹滿或痛手足温自利不渇喉下乾少隂證口燥舌乾而渇或口中和背惡寒常黙黙欲寝不欲見光明有時腹痛又有咽痛二證厥隂證唇青舌卷煩滿筋急嚢縮或消渇饑不欲食食即吐蛔隂病體重脉重外證厥冷脣青腹滿不渇大小便自利惺惺而静引衣自葢足攣而卧三隂病無身熱無頭痛其或渇者隂極發躁也隂證脣青舌黑或白胎或卷强者用生薑頻擦脣口續又易之薑能回陽生胃解毒温血散氣擦之後隂消陽長黑轉而紅最為良法夫汗温正法太陽傷風自汗惡風桂枝湯傷寒無汗惡寒麻黄湯風寒俱盛則以麻黄湯兼用自汗小便數者勿用桂枝可用乾薑甘草湯芍藥甘草湯桂枝麻黄湯夏月用之須加黄芩陽明不惡寒反惡熱自汗大便難用小承氣大柴胡汗多者胃汁乾急下大承氣無汗惡寒升麻湯有汗脉遲㣲惡寒為表未解桂枝湯無汗脉浮發喘麻黄湯少陽並属小柴胡湯輩冬月用之須加官桂太隂自利不渇為臟寒理中湯四逆湯隂證手足必微厥若手足温便是太隂胸膈脹滿枳實理中湯腹滿脉浮桂枝湯腹滿時痛桂枝加􅆚藥湯痛甚桂枝加大黄湯少隂脉沉口不乾舌不燥及背惡寒者並用四逆湯小便白者亦用四逆始得病脉沉反發熱麻黄細辛附子湯口燥咽乾而渇急下之用大承氣湯厥隂脉微浮為欲愈不浮未愈小建中湯脉浮緩如瘧狀者嚢不縮者亦欲愈桂枝麻黄各半湯脉沉短者嚢必縮為毒氣入臟可用承氣湯下之利不止用四逆湯三隂中寒微則理中湯稍厥或中寒下利則乾薑甘草湯大段重者用四逆湯無脉者用通脉四逆湯六經惟少隂難治大要以口燥而渇别其熱脉沉而遲别其寒然亦有表裏俱熱但煩憒黙黙不欲見光明其脉沉細或時腹痛此可四順湯增加乾薑對之增損理中丸亦可矣凡隂證白通湯四逆湯通脉湯條例未敢遽用者且以理中湯甘草乾薑湯代之雖然隂寒亦可毒乃病氣也滯須行之養正丹金液丹半硫丸皆可疏利又為要藥夫三部之位左右手去魚際一寸名曰寸口去尺澤一尺名曰尺部兩境之間名曰關位六分陽部出三分隂部出三分關前為陽關後為隂為隂陽之關津寸脉下不至關為陽絶尺脉上不至關為隂絶陽得寸内九分取陽竒之數隂得尺一寸取隂耦之數是名關尺也寸上一分為魚際關上一分為神門左關為人迎右關為氣口三陽從地長故男子尺脉常沉三隂從天生故女子尺脉常浮男子陽多而隂少其脉在關上故寸盛尺弱女子隂盛而陽微其脉在關下故寸沉而尺盛所以男子不可久㵼女子不可久吐男得女脉為不足女得男脉為太過所謂反也今人以男子尺脉常弱女子尺脉常盛謂大反非也男子陽有餘脉在上尺脉必弱女子隂有餘脉在下寸脉必㣲乃是正也非反也又以男子以右尺為命門女子以左尺為命門謂之反亦非也男子得隂以生先生右腎女子得陽以長先生左腎乃是正也非反也所謂反者只是男子尺脉當弱今反盛女子尺脉應盛今反弱謂之反耳聖人以察隂陽以决死生雖經絡流注如環無端豈能逃於三部者哉夫診候之法凡初下指先以中指揣按得關位乃齊下前後二指為三部脉前指寸口也後指尺部也若人臂長乃疏下指若臂短乃宻下指先診寸口男先左手女先右手浮按消息之次中按消息之次重按消息之次上竟消息之次下竟消息之次推指外消息之次推指内消息之醫家責肥人脉浮為肌肉厚實重取乃得若舉手而得其浮也甚矣責瘦人脉沉為皮脉相附而易見若按之始應則其沉也亦甚矣凡診脉以氣息平定方下指一呼一吸為一息之間脉息四至或五至不大不小與所屬部分四時相應者為平和脉也過則增至不及則為損至之脉難經言之詳矣所属部分謂心位洪肺位浮腎位沉肝位弦脾位緩也四時謂春脉弦夏脉洪四季緩秋脉浮冬脉沉也假令心脉本位雖當見洪得冬須㣲帶沉乃四時相應餘皆倣此夫脉息之證脉之字從肉從􅆶又作衇盖脉以肉為陽衇以血為隂華陀云脉者氣血之充也氣血盛則脉盛氣血衰則脉衰氣血熱則脉數氣血寒則脉遲氣血微則脉弱氣血平則脉緩又長人脉長短人脉短性急脉急性緩脉緩反此者逆按内經云形盛脉細少氣不足以息者危形瘦脉大胸中多氣者死形氣相得者生參伍不調者病難經云數者府也遲者臟也數則為熱遲者為寒諸陽為熱諸隂為寒王叔和云脉沉為在裏脉浮為在表遲則在臓數則在腑滑為實為下數為虚為熱張仲景云脉大浮數動滑此名陽也脉沉濇弱弦㣲此名隂也隂病陽脉見者生陽病隂脉見者死大抵陽脉常浮而速隂脉常沉而遲七表属腑病在於陽春夏見之易治八裏属臓病在於隂秋冬見之猶輕假令數在左寸浮之得者熱入小腸沉之得者熱入於心餘皆倣此脉理精微非言可盡論其梗槩不出於此矣王叔和云在心易了指下難明亦在乎人熟之而已矣夫七表浮芤滑實弦𦂳洪七表陽也陽數竒夫浮按之不足舉之有餘寸口浮其人有風發熱頭疼關上浮腹滿尺中浮小便難趺陽浮即為虛夫芤浮大而軟按之中央空兩邊實芤主失血寸口芤主吐血微芤者衂関上芤大便血尺中芤小便血夫滑往來疾却流利替替然與數相似脉滑為陽寸口滑為陽盛關上滑為嘔逆尺中滑小便赤婦人經脉不利然而尺脉滑者亦本形也趺陽脉滑者胃中實夫實大而長按之應指愊然浮沉皆得寸口實主上焦熱關上見主腹脹尺中有此主小腹痛小便澁夫弦舉之無有按之弓弦狀又曰浮𦂳乃為强狀如弓弦按之不移陽弦則頭痛隂弦則腹痛大抵傷寒脉必弦盖人迎脉盛寒傷於人迎者少陽之分少陽脉主弦故也寒邪中人其脉必弦弦則多兼洪數為其先有邪熱也洪數甚者即為陽證若沉細而弦疾乃正陽毒也夫𦂳按之實數似切繩狀𦂳則為寒寸口𦂳頭痛關𦂳心下滿痛尺𦂳臍下痛隂陽俱𦂳當清邪中上濁邪中下也夫洪極大在指下舉按滿指寸口洪主胸膈煩熱関洪主胃熱尺中洪主大小便有血三部洪三焦俱熱夫八裏微沉緩濇遲伏濡弱八裏隂也隂數耦夫微若有若無極細而軟微則為虛寸口微為陽不足陽微則惡寒隂微則下利夫沉舉之不足按之有餘沉為在裏尺寸俱沉者少隂受病也然沉而遲者乃隂證也宜温之沈而數者有熱也宜下之夫緩去來亦遲小駃於遲緩則為虛太陽病其脉緩者為傷風惟脾得之即是本脉夫濇細而遲往來難時一止濇則為少血寸口濇少氣上焦冷関上濇胃冷脾痛尺濇小便數腹冷三部俱濇腹生氣結王冰曰陽有餘則血少故脉濇也又曰濇者隂血不足陽氣有餘為身熱無汗夫遲呼吸三至去來極遲遲則為寒寸口遲則上焦冷関上遲胃冷不欲食吞酸吐冷水尺中遲小便多并白濁夫伏極重按之指着骨乃得伏主物聚寸口伏胸中逆氣關上伏有水氣溏泄尺中伏水糓不化大抵關前得之多為熱陽結或冷或熱不定當以餘證叅之夫濡按之似無舉之全無力形與緩濇遲脉雖稍殊其為冷證皆一也夫弱極耎而沉細按之指下欲絶弱為虛寸口弱陽氣虚汗自出關弱無胃氣胃中有熱脉弱為虛熱病作不可大攻熱去寒起尺中弱氣少發熱夫脉按之來緩時一止復來又脉來動而中止不能自還因而復動夫有結脉有促脉有代脉結者隂也隂盛則結脉來緩時一止復來曰結主胸滿煩躁促者陽也陽盛則促脉來數時一止復來曰促主積聚氣痞憂思所成太陽病下之後脉促胸滿者桂枝去􅆚藥湯主之若微寒者桂枝去􅆚藥加附子湯主之太陽病桂枝證醫反下之利遂不止脉促者表未解也喘而汗出者葛根黄芩黄連湯主之大抵結促之脉雖時一止為病脉非死脉也唯代脉者真死矣往來緩動而中止不能自還因而復動名曰代也代者死也仲景傷寒脉結代心動悸炙甘草湯主之夫脉浮而𦂳濇頭疼身體拘急惡寒無汗寒多熱少面色慘而不舒腰脊疼痛手足指末微厥不煩躁盖傷寒之候發熱惡寒頭疼腰脊痛脉𦂳濇無汗宜發汗而解麻黄湯主之經曰只與桂枝麻黄各半湯雜方中人參順氣散葱枝湯蒼术散麻黄葛根湯可選而用之然太陽病亦有熱多寒少者須仔細㸔脉與證也熱多寒少不嘔清便自可宜桂枝麻黄各半湯若脉浮者雖熱多寒少自可發汗若脉弱者無陽也桂枝二越婢一湯主之熱多寒少而尺脉遲者榮氣不足血少故也先以小建中湯加黄耆􅇰良尺脉尚遲再作一劑或太陽宜汗而其人適失血及下利則頻頻少與桂枝湯使體潤熱漐連日當自解假如淋家衂家法不可汗亦可以小柴胡之類和解之夫脉浮而緩寸大而尺弱自汗體熱頭疼惡風熱多寒少其面光而不慘煩躁手足不冷盖傷風之候頭疼汗出發熱脉緩惡風當須觧肌宜桂枝湯主之輕者柴胡桂枝湯雜方中敗毒散獨活散可選用治太陽中風有汗用桂枝湯凡脉𦂳必無汗唯濡而𦂳却自汗勿宜用桂枝當用小建中湯也須是脉浮而緩者方可用桂枝也項背强者桂枝湯加葛根也本草葛根主傷風有濕開竅解肌盖桂枝加葛根者謂中風有湿當加之去其風濕取微汗者去風濕也裏寒者桂枝去􅆚藥加附子湯也不飲水者是也凡發汗後汗不止者為属風桂枝加附子湯主之腹滿者太隂證脉浮者可服桂枝湯微發汗腹痛者桂枝加􅆚藥湯痛甚者桂枝加大黄湯也雖然桂枝湯自西北二方居人四時行之無不應騐自江淮間唯冬及春初可行自春末及夏至已前桂枝證可加黄芩半兩陽旦湯是也夏至後有桂枝證可加知母一兩石膏二兩或加升麻半兩若病人素虛寒者正用古方不在加減岐伯所謂同病異治者此也大抵用温藥當避春熱藥當避夏素問所謂用温逺温用熱逺熱者也又問傷寒與傷風何以别之傷寒者脉𦂳而濇傷風者脉浮而緩傷寒者無汗脉濇故也傷風者有汗傷寒者畏寒不畏風傷風者畏風不畏寒大抵太陽病者必脉浮發熱惡風惡寒也惡寒者不當風而自憎寒惡風者當風而憎寒也六經皆有傷寒傷風其證各異太陽脉浮有汗為中風脉𦂳無汗為傷寒陽明善饑為中風不食為傷寒少陽兩耳聾目赤胸滿而煩為中風口苦咽乾目眩為傷寒若三隂傷風無變異形證但四肢煩疼餘證同三陽有發熱惡寒煩躁手足温而脉反浮𦂳者有寒多熱少煩躁手足㣲冷而脉反浮緩者盖發熱惡風煩躁手足温為中風候脉浮𦂳為傷寒脉是中風見寒脉也寒多熱少不煩躁手足㣲厥為傷寒候脉浮為中風是傷寒見風脉也中風見寒脉傷寒見風脉宜服大青龍湯盖大青龍證脉似桂枝反無汗病似麻黄反煩躁是也脉弱有汗為桂枝證脉𦂳不煩躁為麻黄證大青龍湯治病與麻黄湯證相似但病尤重而又加煩躁者用大青龍湯也以其中風并傷寒俱盛故青龍添麻黄作六兩又似合桂枝湯藥味在内添石膏所以為𦂳此治榮衛俱病若證不審誤用大青龍湯則發汗多傷人以其有煩躁一證故湏用大青龍大抵感外風者為傷風感寒冷者為傷寒故風則傷衛寒則傷榮桂枝主傷衛麻黄主傷榮大青龍主榮衞俱傷故也風傷衛者病在皮膚之間也以衛行脉外為陽主外皮膚之間衛氣之道路故也其病淺寒傷榮者寒氣中於肌肉也以榮行脉中為隂主肌肉之間榮氣之道路故也其病深所以桂枝麻黄所施各異戒勿誤用以有淺深之别風寒之殊醫宜審諦大青龍尤宜慎用仲景云脉微汗出惡風者不可服青龍服之則厥逆筋惕肉瞤此為逆也類纂云凡發汗過多筋惕肉膶振揺動人或虛羸之人㣲汗出便有此證俱宜服真武湯以救之羸甚者􅆚藥或量多少與之惡熱藥者去附子餘依加減法仲景製真武湯乃為合用桂枝却用麻黄之類發汗多亡陽致有此證故用真武湯若調理順者無此證也夫夏月發熱惡寒頭疼身體肢莭痛重其脉洪盛者盖冬傷于寒因暑氣而發為熱病治熱病與傷寒同有汗宜桂枝湯無汗宜麻黄湯加煩躁者宜大青龍湯然夏月藥性須帶凉不可太温桂枝麻黄大青龍須加减法夏至前桂枝加黄芩半兩夏至後桂枝麻黄大青龍加知母一兩石膏二兩或加升麻半兩也盖桂枝麻黄湯性熱地暖之處非西北之比夏月服之必有發黄斑出之失熱病三日外與湯不差脉仍數邪氣猶在經絡未入臓腑者桂枝石膏湯主之此在夏至後代桂枝證用若加麻黄半兩可代麻黄青龍湯用也古方三月至夏為晩發傷寒梔子升麻湯亦可選用又問夏至後皆可行白虎湯耶白虎湯治中暑與汗後一解表藥耳今之醫者見六月中病多云中暑不辨熱病用藥太凉又况夏月隂氣在内􅇰難調治白虎湯尤宜戒之夏月自汗惡寒身熱而渇其脉微弱者此名中暑也大抵中暑與熱病外證相似但病熱者脉盛中暑者脉虛以此别之甲乙經云脉盛身寒得之傷寒脉虛身熱得之傷暑盖寒傷形而不傷氣所以脉盛熱傷氣而不傷形所以脉虛傷寒即身體肢莭痛重其脉洪盛按之有力此是冬月感寒深至夏發耳中暑即背寒面垢其面如塗油類纂云面垢者陽證也一名面塵若塵垢之者手足微冷煩渇口燥但覺倦怠四肢却不痛重其脉微弱按之無力白虎湯主之痰逆惡寒者橘皮湯主之不惡寒者竹葉湯主之頭痛惡心煩躁心下不快者五苓散􅇰妙又問中暑何故洒洒然毛聳惡寒答曰經云四時八風之中人也因有寒暑寒則皮膚急腠理閉暑則皮膚緩腠理開開則洒然寒閉則熱而悶近人多不明中暑或作熱病法治之服温熱藥必致發黄斑出更為畜血尤宜戒之夏至已前發熱惡寒頭疼身體痛其脉浮𦂳此名温病也春日傷寒謂之温病冬傷於寒輕者夏至以前發為温病盖因春温暖之氣而發也非温疫也治温病與冬月傷寒夏月熱病不同盖熱輕故也春初秋末陽氣在裏其病稍輕雖不用藥治之五六日亦自差也升麻湯解肌湯柴胡桂枝湯􅇰良熱多者小柴胡湯主之不渇外有微熱者小柴胡加桂枝也渇者小柴胡加五味子也或煩渇發熱不惡寒與虛煩者並竹葉石膏湯次第服之麻黄桂枝大青龍唯西北二方四時行之無有不騐若江淮間地偏暖處唯冬月及正初乃可用正方自春末至夏至已前桂枝麻黄大青龍内宜加減也病人先熱後寒尺寸脉俱盛此名温瘧也重感於寒變成温瘧小柴胡湯主之瘧疾寒熱相等及先熱後寒者俱宜與小柴胡湯主之先寒後熱者小柴胡加桂枝湯有熱多者白虎加桂湯有多寒者但寒者柴胡桂薑湯有汗多煩渇小便澁赤素有瘴氣及不伏水土嘔吐甚者可服五苓散脉小𦂳寒熱嘔吐間日頻日發作無時大便秘者可服大柴胡湯下之脉浮大寒熱往來者可服祛邪丸吐之久不愈者服瘧母煎丸當自愈治瘧之法無以過也大抵瘧脉弦數者多熱弦遲者多寒弦小𦂳者可下弦遲者可温弦𦂳者可發汗弦浮者可吐之夏傷於暑秋必病瘧此非傷寒之謂以其觀傷寒温瘧一證故因而及之脉尺寸俱浮頭疼身熱常自汗出體重其息必喘四肢不収嘿嘿但欲眠此名風温也其人素傷於風因復傷於熱風熱相搏即發風温主四肢不収左傳曰風滛末疾頭疼身熱常自汗出不解治在少隂厥隂少隂火厥隂風不可發汗即譫言獨語内煩躁擾不得卧若驚癎目亂無精療之者復發其汗如此死者醫殺之也風温不可發汗宜萎蕤湯風温身灼熱者知母乾葛湯風温如渇甚者栝蔞根湯風温脉浮身重汗出者防己湯辨傷寒受病日數次第病証傷寒一日足太陽受病太陽者膀胱之經也為三陽之首故先受病其脉絡於腰脊主於頭項故得病一日頭項腰脊痛也傷寒二日足陽明受病陽明者胃之經也主肌肉其脉絡於鼻入於目故得病二日内熱鼻乾不得眠也諸陽在表表始受病在皮膚之間故可摩膏火灸發汗而愈也凡五臓不和六腑不通榮衞不行如是之後三日乃死何也夫足陽明胃者十二經之長也其氣血盛故不通三日其氣乃盡而死爾其未滿三日者可汗而已其滿三日者可下而已也傷寒三日足少陽受病少陽者膽也其脉循於脇上於頸耳故得病三日胸脇痛而耳聾也三陽經絡終始相傳未入於臓可汗而解也傷寒四日足太隂受病太隂者脾之經也為三隂之首是故三日已後陽受病訖傳之於隂而太隂受病焉其脉絡於脾主於喉嗌故得病四日腹滿而嗌乾其病在胸膈故可吐而愈也傷寒五日足少隂受病少隂者腎之經也其脉貫腎絡肺繋於舌故得病五日口燥舌乾渇而引水也其病在腸可下而愈也傷寒六日足厥隂受病厥隂者肝之經也其脉循隂噐絡於肝故得病六日煩滿而嚢縮也此則隂陽俱受病毒氣在胃可下而愈也七日太陽病衰頭痛小愈又傷寒七日病法當小愈隂陽諸經傳病終故也今七日已後病反甚者欲為再經病也再經病者經絡重受病也傷寒八日陽明病衰身熱小愈又八日不解者或是諸隂陽經絡重受於病或因發汗吐下之後毒氣未盡所以病證猶在也傷寒九日少陽病衰耳聾㣲聞又九日已上病不除者或初一經受病者不能相傳或已傳三陽訖而不能傳於隂致停滯累日病證不解故日數多而病候改變也傷寒十日太隂病衰腹胃如故則思欲飲食傷寒十一日少隂病衰渇止不煩滿舌乾已也傷寒十二日厥隂病愈嚢少縱腹微下毒氣皆去病日已矣傷寒例第三隂陽大論云春氣温和夏氣暑熱秋氣清凉冬氣冷冽此則四時正氣之序也春夏為陽春温夏熱者陽之動始于温盛于熱故也秋冬為隂秋凉冬寒者隂之動始于清盛于寒故也冬時嚴寒萬類深藏君子固宻則不傷於寒觸冒之者乃名傷寒耳冬三月純隂用事陽乃伏藏水氷地坼寒氣嚴凝當是之時善攝生者出處固宻去寒就温則不傷于寒其渉寒冷觸冒霜雪為病者謂之傷寒也其傷於四時之氣皆能為病春風夏暑秋濕冬寒謂之四時之氣以傷寒為毒者以其􅇰成殺厲之氣也熱為陽陽主生寒為隂隂主殺隂寒為病􅇰為肅殺毒厲之氣中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為温病至夏變為熱病熱病者熱極重於温也内經曰先夏至日為温病後夏至日為熱病温熱之病本傷于寒而得之故大醫均謂之傷寒也是以辛苦之人春夏多温熱病皆由冬時觸寒所致非時行之氣也凡時行者春時應温而反大寒夏時應大熱而反大凉秋時應凉而反大熱冬時應寒而反大温此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也四時氣候不正為病謂之時行之氣時氣所行為病非暴厲之氣感受必同是以一歲之中長幼之病多相似也夫欲候知四時正氣為病及時行疫氣之法皆當按斗厯占之四時正氣者春風夏暑秋濕冬寒是也時行者時行之氣是也温者冬時感寒至春發者是也疫者暴厲之氣是也占前斗建察其時候之寒温審其邪氣之輕重而治之如下文云云九月霜降莭後宜漸寒向冬大寒至正月雨水莭後宜解也所以謂之雨水者以氷雪解而為雨水也至驚蟄二月莭後氣漸和暖向夏大熱至秋便凉冬寒春温夏熱秋凉為四時之正氣也從霜降以後至春分以前凡有觸冒霜露體中寒即病者謂之傷寒也九月十月寒氣尚微為病則輕十一月十二月寒冽已嚴為病則重正月二月寒漸将解為病亦輕此以寒時不調適有傷寒之人即為病也此為四時正氣中而即病者也其冬有非節之暖者名曰冬温冬温之毒與傷寒大異冬温病有先後更相重沓亦有輕重為治不同證如後章此為時行之氣前云冬時應寒而反大温者是也從立春節後其中無暴大寒又不氷雪而有人壯熱為病者此属春時陽氣發洩冬時伏寒變為温病此為温病者内經云冬傷於寒春必病温是也從春分以後至秋分節前天有暴寒者皆為時行寒疫也三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦㣲其病與温及暑病相似但治有殊耳此為疫氣也是數者以明前斗厯之法占其隨時氣候發病寒熱輕重不同耳十五日得一氣於四時之中一時有六氣四六名為二十四氣也節氣十二中氣十二共二十四氣内經曰五日謂之候三候謂之氣六氣謂之時四時謂之歲然氣候亦有應至而不至或有未應至而至者或有至而太過者皆成病氣也疑漏或有至而不去一句金匱要畧曰有至而至有至而不至有至而不去有至而太過何也師曰冬至之後甲子夜半少陽起少隂之時陽始生天得温和以未得甲子天已温和此為未至而至也以得甲子而天未温和此為至而不至以得甲子而天大寒不解此為至而不去也以得甲子而天温如盛夏五六月時此為至而太過也内經曰至而和則平至而甚則病至而反者病至而不至者病未至而至者病即是觀之脫漏明矣但天地動静隂陽鼔撃者各正一氣耳内經曰隂陽者天地之道清陽為天動而不息濁隂為地静而不移天地隂陽之氣鼔擊而生春夏秋冬寒熱温凉各正氣也是以彼春之暖為夏之暑彼秋之忿為冬之怒春暖為夏暑從生而至長也秋忿為冬怒從肅而至殺也是故冬至之後一陽爻升一隂爻降也夏至之後一陽氣下一隂氣上也十月六爻皆隂坤卦為用隂極陽來陽生于子冬至之後一陽爻升一隂爻降於卦為復言陽氣得復也四月六爻皆陽乾卦為用陽極隂來隂生于午夏至之後一陽氣下一隂氣上於卦為姤言隂得遇陽也内經曰冬至四十五日陽氣微上隂氣微下夏至四十五日隂氣微上陽氣㣲下斯則冬夏二至隂陽合也春秋二分隂陽離也陽生于子隂生于午是隂陽相接故曰合陽退于酉隂退于卯是隂陽相背故曰離内經曰氣至之謂至氣分之謂分至則氣同分則氣異隂陽交易人變病焉天地隂陽之氣既交錯即不正人所以變病内經曰隂陽相錯而變由生也此君子春夏養陽秋冬養隂順天地之剛柔也内經曰養生者必和順乎時春夏養陽以凉以寒秋冬養隂以温以熱所以然者從其根故也小人觸冒必攖暴疹須知毒烈之氣留在何經而發何病詳而取之不能順四時調養觸冒寒温必成暴病醫者當在詳審而治之是以春傷於風夏必飧泄夏傷於暑秋必病瘧秋傷于濕冬必咳嗽冬傷于寒春必病温此必然之道可不審明之當春之時風氣大行春傷于風風氣干肝肝以春適王風雖入之不能即發至夏肝衰然後始動風滛末疾則當發於四肢夏以陽氣外盛風不能外發故攻内而為飱泄者下利水糓不化而色黄當秋之時濕氣大行秋傷於濕濕則干於肺肺秋適王濕雖入之不能即發至冬肺衰然後濕始動也雨滛腹疾則當發為下利動以陽氣内固濕氣不能下行故上逆而為咳嗽當夏之時暑氣大行夏傷于暑夏以隂為主内暑雖入勢未能者動及秋隂出而陽為内主然後暑動傳隂而為痎瘧痎二日一發瘧者一日一發當冬之時寒氣大行冬傷於寒冬以陽為主内寒雖入勢未能動及春陽出而隂為内主然後寒動傳陽而為温病是感冒四時正氣為病自然之道也傷寒之病逐日淺深以施方治内經曰未滿三日者可汗而已其已滿三日者可泄而已也今世人傷寒或始不早治或治不對病或日數久淹困乃告醫醫人又不依次第而治之則不中皆宜臨時消息制方無不効也今搜採仲景舊論錄其證候胗脉聲色對病真方有神驗者擬防世急也仲景之書届今千年而顯用于世者王叔和之力也又土地温凉髙下不同物性剛柔飡居亦異是以黄帝興四方之問岐伯舉四治之能以訓後賢開其未悟者臨病之工宜須兩審也東方地氣温南方地氣熱西方地氣凉北方地氣寒西北方髙東南方下是土地温凉髙下不同也東方安居食魚西方陵居華食南方温處而嗜酸北方野處而食乳食居之異也東方治宜砭西方治宜毒藥南方治宜微針北方治宜炙􅡒是四方醫治不同也醫人治病當審其土地所宜食居之異也凡傷于寒則為病熱雖甚不死内經曰風寒客於人使人毫毛畢直皮膚閉而為熱是傷寒為病熱也鍼經曰多熱者易已多寒者難已是熱雖甚不死若兩感於寒而病者必死表裏俱病者謂之兩感尺寸俱浮者太陽受病也當一二日發以其脉上連風府故頭項痛腰脊强太陽為三陽之長其氣浮於外故尺寸俱浮是邪氣初入皮膚外在表也當一二日發風府穴名也在項中央太陽之脉從顛入絡腦還出别下項是以上連風府其經循肩膊内俠脊抵腰中故病頭項痛腰脊强尺寸俱長者陽明受病也當二三日發以其脉俠鼻絡于目故身熱目疼鼻乾不能卧陽明血氣俱多尺寸俱長者邪併陽明而血氣淖溢也太陽受邪不已傳於陽明是當二三日發其脉俠鼻者陽明脉起於鼻交頞中旁約太陽之脉㑹於睛明穴故繫目系絡于目身熱者陽明主身之肌肉鍼經曰陽明氣盛則身以前皆熱目疼鼻乾者經中客邪也不得卧者胃氣逆不得從其道也内經曰胃不和則卧不安尺寸俱弦者少陽受病也當三四日發以其脉循脇絡于耳故胸脇痛而耳聾内經曰陽中之少陽通于春氣春脉弦尺寸俱弦者知少陽受邪也三日陽明之邪不已傳于少陽是當三四日發胸脇痛而耳聾者經壅塞而不利也此三經皆受病未入于府者可汗而已三陽受邪為病在表法當汗解然三陽亦有便入府者入府則宜下故云未入于府者可汗而已尺寸俱沉細者太隂受病也當四五日發以其脉布胃中絡于嗌故腹滿而嗌乾陽極則隂受邪傳三陽既遍次乃傳于隂經在陽為在表在隂為在裏邪在表則見陽脉邪在裏則見隂脉陽邪傳隂邪氣内陷故太隂受病而脉寸尺俱沉細也自三陽傳於太隂是當四五日發也邪入于隂則漸成熱腹滿而嗌乾者脾經壅而成熱也尺寸俱沉者少隂受病也當五六日發以其脉貫腎絡於肺繫舌本故口燥舌乾而渇少隂腎水也性趨下故少隂受病脉寸尺俱沉也自三陽四五日太隂之邪不已五六日則傳于少隂也是少隂病五六日發也人傷於寒則為病熱謂始為寒而終成熱也少隂為病口燥舌乾而渇邪傳入裏熱氣漸深也尺寸俱㣲緩者厥隂受病也當六七日發以其脉循隂噐絡於肝故煩滿而嚢縮緩者風脉也厥隂脉微緩者邪傳厥隂熱氣已劇近于風也當六七日發以少隂邪傳于厥隂煩滿而嚢縮者熱氣聚於内也此三經皆受病已入於府可下而已三隂受邪為病在裏於法當下然三隂亦有在經者在經則宜汗故云已入于府者可下而已經曰臨病之工宜湏兩審若兩感於寒者一日太陽受之即與少隂俱病則頭痛口乾煩滿而渇二日陽明受之即與太隂俱病則腹滿身熱不欲食讝語三日少陽受之即與厥隂俱病則耳聾嚢縮而厥水浆不入不知人者六日死若三隂三陽五臓六府皆受病則榮衞不行府蔵不通則死矣隂陽俱病表裏俱傷者為兩感以其隂陽兩感病則兩證俱見至于傳經則一隂一陽兩經俱傳也始得一日頭痛者太陽口乾煩滿而渇者少隂至三日則太陽傳于陽明而少隂亦傳于太隂身熱讝語者陽明腹滿不欲食者太隂至三日陽明傳于少陽而太隂又傳于厥隂耳聾者少陽囊縮而厥者厥隂水浆不入不知人者胃氣不通内經曰五臓已傷六府不通榮衞不行如是之候三日乃死何也岐伯曰陽明者十二經脉之長也其氣血盛故云不知人三日其氣乃絶故死矣謂三日六經俱病榮衛之氣不得行之于内外蔵府之氣不得通于上下至六日府蔵之氣俱盡榮衛之氣俱絶則死矣其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈八日陽明病衰身熱少歇也九日少陽病衰耳聾㣲聞也十日太隂病衰腹減如故則思飲食十一日少隂病衰渇止舌乾已而􅅉也十二日厥隂病衰嚢縱少腹㣲下大氣皆去病人精神爽慧也六日傳遍三隂三陽大邪之氣皆去病人精神爽慧也若過十三日以上不間尺寸陥者大危間者瘳也十二日傳經盡則當瘳愈若過十三日已上不瘳尺寸之脉沉陥者即正氣内衰邪氣獨勝故云大危若更感異氣變為他病者當依舊壞證病而治之若脉隂陽俱盛重感於寒者變為温瘧異氣者謂先病未已又感别異之氣也兩邪相合變為他病脉隂陽俱盛者傷寒之脉也難經曰傷寒之脉隂陽俱盛而𦂳濇經曰脉盛身寒得之傷寒則為前熱病未已再感於寒寒熱相搏變為温瘧陽脉浮滑隂脉濡弱者更遇於風變為風温此前熱未歇又感于風者也難經曰中風之脉陽浮而滑隂濡而弱風來乘熱故變風温陽脉洪數隂脉實大者遇温熱變為温毒温毒為病最重也此前熱未已又感温熱者也陽主表隂主裏洪數實大皆熱也兩熱相合變為温毒以其表裏俱熱故為病最重陽脉濡弱隂脉弦𦂳者更遇温氣變為温疫以此冬傷於寒發為温病脉之變證方治如說此前熱未已又感温氣者也温熱相合變為温疫凡人有疾不時即治隱忍兾差以成固疾凡覺不佳即須求治茍延時日則邪氣入深難可復制千金曰凡有小苦似不如平常即須早道若隐忍不治兾望自差須臾之間以成固疾此之謂也小兒女子益以滋甚小兒女子氣血未全女子血室多病凡所受邪易于滋蔓時氣不和便當早言尋其邪由及在腠理以時治之罕有不愈者腠理者津液腠泄之所文理縫㑹之中也金匱要略曰腠者是三焦通㑹元氣之處為血氣所注理者是皮膚藏府之文理也邪客于皮膚則邪氣浮淺易為治治之罕有不愈者矣金匱玊函曰主候長存形色未病未入腠理針藥及時服将調節委以良醫病無不愈患人忍之數日乃說邪氣入藏則難可制此謂家有患備慮之要邪在皮膚則外属陽而易治邪傳入裏則内属隂而難治内經曰善制者治皮毛其次治肌膚其次治筋脉其次治大府其次治五藏治五藏者半死半生也昔齊桓怠於皮膚之㣲疾以至骨髓之病家有患不可不偹慮之也凡作湯藥不可避晨夜覺病須臾即宜便治不等早晩則易愈矣千金曰凡始覺不佳即須治療無至于病湯食競進折其毒勢自然易差若或差遲病即傳變雖欲除治必難為力傳有常也變無方也傳為循經而傳如太陽傳陽明是也變為不常之變如陽証變隂症是也邪既傳變病勢深也本草曰病勢已成可得半愈病勢已過命将難全也服藥不如方法縱意違師不須治之内經曰拘于鬼神者不可與言至徳惡于針石者不可與言至巧病不許治者病必不治治之無功矣凡傷寒之病多從風寒得之凡中風與傷寒為病自異通謂之傷寒千金曰夫傷寒病者起自風寒入于腠理與精氣分争榮衛偏隔周身不通而病始表中風寒入裏則不消矣始自皮膚入于經絡傳于藏府是也未有温覆而當不消散者風寒初客于皮膚便投湯藥温覆取暖發散而當者則無不消散之邪矣不在證治擬欲攻之猶當先解表乃可下之先解表而後下之則無内陥之邪也若表已解而内不消非大滿不可下猶生寒熱則病不除表証雖罷裏不至于大堅滿者亦未可下是邪未收斂成實下之則裏虛而邪復不除猶生寒熱也若表已解而内不消大滿大實堅有燥屎自可徐下之雖四五日不能為禍也外無表證裏有堅滿為下証俱具外䑓云表和裏病下之則愈下症既具則不必拘于日數若不宜下而便攻之内虛熱入恊熱遂利煩躁諸變不可勝數輕者因篤重者必死矣下之不當病輕者證猶變易而難治矧又重者乎夫陽盛隂虛汗之則死下之則愈陽虛隂盛汗之則愈下之乃死表為陽裏為隂隂虚者陽必凑之陽盛之邪乘其裏虛而入于府者為陽盛隂虛也經曰尺脉弱名曰隂不足陽氣下陥入隂中則發熱者矣下之清其内熱而愈若反汗之則竭其津液而死隂脉不足陽往乘之陽脉不足隂往從之隂邪乘其表虛客于榮衛之中者為陽虛隂盛也經曰假令寸口脉㣲名由陽不足隂氣上入陽中則洒淅惡寒者是矣汗之散其表寒則愈若反下之則脫其正氣而死經曰本發汗而復下之此為逆也本先下之而反汗為逆夫如是則神丹安可以誤發甘遂何可以妄攻虛盛之治相背千里吉凶之機應若影響豈容易哉神丹者發汗之藥也甘遂者下藥也若汗下當則吉汗下不當則凶其應如影隨形如響應聲也况桂枝下咽陽盛則斃承氣入胃隂盛以亡桂枝湯者發汗藥也承氣湯者下藥也金匱玊函曰不當汗而强與汗之者令人奪其津液枯槁而死不當下而强與下之者令人開腸洞泄便溺不禁而死死生之要在乎須臾視身之盡不暇計日投湯不當則災禍立見豈暇計其日數哉此隂陽虚實之交錯其候至㣲發汗吐下之相反其禍至速而醫術淺狹懵然不知病源為治乃悞使病者殞殁自謂其分至今寃魂塞于㝠路死屍盈于壙野仁者鑒此豈不痛歟凡兩感證俱作治有先後發表攻裏本自不同而執迷􅄭意者乃云神丹甘遂合而飲之且解其表又除其裏言巧似是其理實違夫智者之舉錯也常審以慎愚者之動作也必果而速安危之變豈可詭哉世上之士但務彼翕習之談而莫見此傾危之敗惟明者居然能䕶其本近取諸身夫何逺之有焉兩感病俱作欲求治法醫者大宜消息審其先後次第而治之若􅄭意攻治以求速効者必致傾危之敗凡發汗温服湯藥其方雖言日三服若病劇不解當促其間可半日中盡三服若與病相阻即便有所覺重病者一晝夜當晬時觀之如服一劑病證猶在故當復作本湯服之至有不肯汗出服三劑乃解若汗不出者死病也發汗藥須温暖服者易為散也日三服者藥勢續也病勢稍重當促急服者以折盛熱不可拘于本方設藥病不相對湯入即便知之如隂多者投以凉藥即寒逆隨生陽多者飲以温劑則實熱即起是便有所覺晬時者周時也一晝一夜湯藥盡劑更㸔其傳如病證猶在當復作本湯以發其汗若服三劑汗不出不觧者邪氣大甚湯不能勝必成大疾千金曰熱病脉躁盛而不得汗者此陽脉之極也死凡得時氣病至五六日而渇欲飲水飲不能多不當與也何者以腹中熱尚少不能消之便更與人作病也至七八日大渇欲飲水者猶當依證與之與之常令不足勿極意也言能飲一斗與五升若飲而腹滿小便不利若喘若噦不可與病人忽然大汗出時為自愈也熱在上焦則為消渇言熱消津液而上焦乾燥則生渇也大熱則能消水熱少不能消之若强飲則停飲變為諸病至七八日陽勝氣温向解之時多生大渇亦須少少與之以潤胃氣不可極意飲也若飲而腹滿小便不利若喘若噦者為水飲内停而不散不可便與之忽然陽氣通水氣散生發于外作大汗而觧也凡得病反能飲水此為欲愈之候其不曉病者但聞病飲水自愈小渇者乃强與飲之因成其禍不可復數小渇者腹中熱少若强與水水飲不消復為諸飲病也凡得病厥脉動數服湯藥更遲脉浮大减小初躁後静此皆愈證也動數之脉邪在陽也湯入而變遲者陽邪愈也浮大之脉邪在表也而復減小者表邪散也病初躁亂者邪所擾也湯入而安静者藥勝病也是皆為愈證之騐矣凡治温病可刺五十九穴五十九穴者以冩諸經之温熱鍼經曰熱甚取之諸陽五十九穴刺以冩其熱而出其汗實其隂而補其不足所謂五十九刺者兩手内外側各三穴凡十二病五指間一凡八病頸入髮際一寸旁三分各一凡六病更入髮三寸邊五凡十病耳前後口下各一項中一凡六病顛上一􅇟㑹一髮際一亷泉一風府二天柱二又内經曰熱愈五十九頭上五行者以寫諸陽之逆熱也大杵臼愈缺盆背俞此八者以冩胸中之熱氣衞三里巨虛上下亷此八者以冩胃中之熱也雲門髀骨委中髓空此八者冩四肢之熱也五藏俞旁此五者以冩五藏之熱也凡此五十九穴者皆熱之左右也又身之穴三百六十有五其三十九穴灸之有害七十九穴刺之為災并中髓也穴有三百六十五以應一歲其灸刺之禁皆肉薄骨解之處血脉虛少之分鍼灸并中髓也凡脉四損三日死平人四息病人脉一至名曰四損脉五損一日死平人五息病人脉一至名曰五損脉六損一時死平人六息病人脉一至名曰六損四藏氣絶者脉四損五藏氣絶者脉五損五藏六府氣絶者脉六損脉盛身寒得之傷寒脉虛身熱得之傷暑内經曰脉者血之府也脉實血實脉虚血虛寒則傷血邪併於血則血盛而氣虛故傷寒者脉盛而身寒熱則傷氣邪併於氣則氣盛而血虛故傷暑者脉虛而身熱也脉隂陽俱盛大汗出不解者死脉隂陽俱盛當汗出而解若汗出不解則邪氣内盛正氣外脫故死内經曰汗出而脉尚躁盛者死千金曰熱病已得汗脉尚躁盛此陽脉之極也死脉隂陽俱虛熱不止者死脉隂陽俱虛者真氣弱也熱不止邪氣勝也内經曰病温虛者死脉至乍疎乍數者死為天真榮衛之氣斷絶也脉至如轉索者其日死為𦂳急而不軟是邪實胃虛故不出其日而死讝言􅄭語身㣲熱脉浮大手足温者生逆冷脉沉細者不過一日死矣讝言妄語陽病也身㣲熱脉浮大手足温為脉病相應若身逆冷脉沉細為陽病見隂脉脉病不相應故不過一日而死難經曰脉不應病病不應脉為死病此以前是傷寒熱病證候也辨痓濕暍脉證第四傷寒所致太陽病痓濕暍三種宜應别論以為與傷寒相似故此見之痓當作痙傳冩之誤也内經曰肺移熱于腎傳為柔痓柔謂筋柔而無力痓謂骨勁而不隨痙者强也千金以强直為痙經曰頸項强急口噤背反張者痓即是觀之痓為痙字明矣太陽病發熱無汗反惡寒者名曰剛痓千金曰太陽中風重感寒濕則變痓太陽病發熱無汗為表實則不當惡寒今反惡寒者則太陽中風重感於寒為痓病也以表實感寒故名剛痓太陽病發熱汗出不惡寒者名曰柔痓太陽病發熱汗出則為表虛當惡寒其不惡寒者為陽明病今非陽明證則是太陽中風重感於濕為柔痓是也表虛感濕故成柔痓太陽病發熱脉沉而細者名曰痓太陽主表太陽病發熱為表病脉當浮大今反沉細既不愈則太陽中風重感于濕而為痓也金匱要畧曰太陽病其證痛身體强几几然脉反沉遲此為痓括蔞桂枝湯主之太陽病發汗多因致痓太陽病發汗太多則亡陽内經曰陽氣者精則養神柔則養筋陽㣲不能養筋則𦂳急而成痓也病身熱足寒頸項强急惡寒時頭熱面赤目脉赤頭揺口噤背反張者痓病也太陽中風為純中風太陽中寒為純中寒皆不作痓惟是太陽中風重感寒濕乃變為痓也身熱足寒者寒濕傷下也時頭熱面赤目脉赤風傷上也頭揺者風主動也獨頭揺者頭為諸陽之㑹風傷陽也若純傷風者身亦為之動揺手足為之搦搐此則内挾寒濕故頭揺也口噤者寒主急也卒口噤者不常噤也有時而緩若風寒相搏則口噤而時開此皆加之風濕故卒口噤也足太陽之脉起于目内眥上額其支别者從顛入絡腦還出别下項循肩膊内俠脊抵腰中貫下臀以下至足風寒客于經中則筋脉拘急故頸項强急而背反張也太陽病關節疼痛而煩脉沉而細者此名濕痺之候其人小便不利大便反快但當利其小便金匱要略曰霧傷皮毛濕流關節疼痛而煩者濕氣内流也濕同水也脉沉而細者水性趣下為痺痛也因其關節煩疼而名曰濕痺非脚氣之痺也内經曰濕勝則濡腹滿小便不利大便反快者濕氣内勝也但當利其小便以宣㵼腹中濕氣古云治濕不利小便非其治也濕家之為病一身盡疼發熱身色似熏黄身黄如橘子色者陽明瘀熱也此云色如熏黄則非陽明瘀熱身黄發熱者梔子柏皮湯主之為表裏有熱則身不疼痛此一身盡疼非傷寒客熱也知濕邪在經所致脾惡濕濕傷則脾病而色見是以身發黄者為其黄如烟熏非正黄色也濕家其人但頭汗出背强欲得被覆向火若下之早則噦胸滿小便不利舌上如胎者以丹田有熱胸中有寒渇欲飲水而不能飲則口燥煩也濕家有風濕有寒濕此寒濕相搏者也濕勝則多汗傷寒則無汗寒濕相搏雖有汗而不能周身故但頭汗出也背陽也腹隂也太陽之脉俠脊抵腰太陽客寒濕表氣不利而背强也裏有邪者外不惡寒表有邪者則惡寒欲得被覆向火者寒濕在表而惡寒也若下之早則傷動胃氣損其津液故噦而胸滿小便不利下復裏虚上焦陽氣因虛而陥于下焦為丹田有熱表中寒邪乗虛入于胸中為胸中有寒使舌上生白滑胎也藏燥則欲飲水以胸中客寒濕故不能飲而但口煩燥也濕家下之額上汗出㣲喘小便利者死若下利不止者亦死濕家發汗則愈金匱要畧曰濕家身煩疼可與麻黄加至四兩發其汗為宜若􅄭下則大逆額上汗出而㣲喘者乃陽氣上逆也小便自利或下利者隂氣下流也隂陽相離故云死矣内經曰隂陽離間精氣乃絶問曰風濕相搏一身盡疼痛法當汗出而解值天隂雨不止醫云此可發汗汗之病不愈者何也荅曰發其汗大出者但風氣去濕氣在是故不愈也若治風濕者但微微似欲汗出者風濕俱去也值天隂雨不止明其濕勝也内經曰陽受風氣隂受濕氣又曰傷於風者上先受之傷於濕者下先受之風濕相搏則風在外而濕在内汗大出者其氣暴暴則外邪出而裏邪不能出故風去而濕在汗微微而出者其氣緩緩則内外之邪皆出故風濕俱去也濕家病身上疼痛發熱面黄而喘頭痛鼻塞而煩其脉大自能飲食腹中和無病病在頭中寒濕故鼻塞内藥鼻中則愈病有淺深濕證有中外此則濕氣之淺者也何以言之濕家不云關節煩疼而云身上疼痛是濕氣不流關莭而外客周表也不云發熱身似熏黄復云發熱面黄而喘是濕不注于脾脾受濕氣則濕邪為深今頭痛鼻塞而煩是濕邪客于陽而不客于隂也濕家之脉當沉細為濕氣内流脉大者陽也則濕不内流而外在表也又以自能飲食胸腹别無痞滿為腹中和無病要知其濕氣微淺内藥鼻中以宣泄頭中寒濕病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也一身盡疼者濕也發熱日晡時劇者風也若汗出當風而得之者則先有客濕而後感寒風若久傷取冷得之者則先傷風而後中濕可與麻黄杏仁薏苡仁甘草湯見金匱要畧方中太陽中熱者暍是也其人汗出惡寒身熱而渇也汗出惡寒身熱而不渇者中風也汗出惡寒身熱而渇者中熱也白虎湯加人參主之見金匱要畧方中太陽中暍者身熱疼重而脉微弱此亦夏月傷冷水水行皮中所致也經曰脉虛身熱得之傷暑身熱脉微弱者暍也身體疼重者水也夏時暑熱以水浴洗而致一味𤓰蒂散主之見要畧中太陽中暍者發熱惡寒身重而疼痛脉弦細芤遲小便已洒洒然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加温針則發熱甚下之則淋甚病有在表在裏者有表裏俱病者此則表裏俱病者也發熱惡寒身重疼痛不足也小有勞身即熱者為勞動其陽而暍即發也口開前板齒燥有熱也内經曰因於暑喘呵開口不止故前板齒燥若發汗以去表邪則外虛陽氣故惡寒甚若下之以除熱則内虛而膀胱淋甚普濟方卷一百二十六
