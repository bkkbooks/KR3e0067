分去滓不拘時温服茯苓飲治三焦有水氣滿悶不能食消痰氣令能食赤茯苓去黒皮人參白术生薑各三兩枳實二兩陳橘皮一兩半右剉如麻豆大毎服五錢水一盞半煎至一盞不拘時去滓温服甘遂散治三焦氣不通心腹脹滿喘促大小便不利甘遂半兩牽牛子半生半炒續隨子去殻大㦸各一兩葶藶一分右為散毎服半錢空心濃煎燈心湯下利下水為効未減更一服甘遂散治三焦水氣似鼓四肢虚腫甚者甘遂半兩檳榔木香牽牛子半生半炒莱菔子研各一兩右為散毎服半錢煎紫蘇木𤓰湯調下空心服利下水為度更量人虚實加減茯苓湯治三焦有水氣胸脇肢滿目眩赤茯苓去黒皮四兩桂去麄皮白术甘草炙各三兩右為散毎服五錢水一盞半煎至一盞去滓不拘時温服小半夏加茯苓湯治三焦不順心下痞悶膈間水脹眩悸動半夏洗五兩生薑半斤赤茯苓去黒皮三兩右剉如麻豆大毎服五錢水二盞煎至一盞去滓温服不拘時牽牛子丸治三焦病脹滿為水小便不利牽牛子二兩烏指木根皮五兩木香三兩蜚蠊大黄剉炒各二兩防己枳實去穣麩炒陳橘皮去白皮羗活去蘆各一兩右為末煉蜜丸如菉豆大日中及雞鳴後合用甘草湯下十丸稍増至二十丸以知為度檳榔飲治三焦榮衞不通氣滿水脹檳榔剉五枚木香一兩生薑切焙芎藭青橘皮各半兩前胡去蘆一分丁香山芋各半兩右為散毎服三錢水一盞煎至七分空心温服脚腫加牽牛子半兩面目浮腫加郁李仁半兩人參香术散治隂陽不和三焦氣滯胸膈氣痞脇滿脹小便不利飲食不消人參甘草炙各半兩木香半兩白术五兩五味子炒三兩右為散毎服二錢入薑塩少許白湯㸃服不拘時候木香丸治三焦病腹脹氣滿小便不利木香二兩牽牛子二十四兩炒香取十二兩檳榔補骨脂炒香各四兩右搗四味為末又入牽牛子匀以清水和丸如菉豆大毎服二十丸茶清或熟水下食後服如酒食過傷可服五七丸小兒一歲可服一丸姙婦不可服三焦欬論内經云久欬不已則三焦受之三焦欬吐欬𠻳腹滿不欲食飲此皆聚於胃闗於肺使人多涕唾而面浮氣逆也葢三焦之氣以胃氣為本水榖之道路氣之所終始也今欬而久者以寒氣藴結闗播胃中腹滿不食逆氣上行涕唾多而面目浮腫也藿香散治久欬傳三焦腹滿不欲食藿香葉人參赤茯苓去黒皮青橘皮去穣焙細辛去苗葉益智子去皮炒縮砂陳橘皮去白焙甘草炙各一兩木香白芷炒各半兩右為散毎服三錢水一盞入生薑木𤓰各三片煎至七分去滓稍熱不拘時服半夏湯治三焦欬腹滿不欲食方見本門方紫蘇子湯治三焦欬心胸不利不思飲食蘇子㣲炒陳橘皮湯洗去白焙各一兩甘草炙半兩乾薑炒桔梗炒杏仁湯洗去皮尖雙仁炒各三分右為散毎服四錢水一盞半􅀥二枚擘破煎至七分去滓温服日三五味子丸治三焦欬腹滿不欲食順氣五味子炒覆盆子去蒂仙靈脾各一兩右為末煉蜜和丸如梧子大毎服二十丸生薑臘茶下加至三十丸空心食前服玉液散治久欬傳三焦腹滿不思飲食及胃虚有痰半夏湯洗去滑七遍焙一兩生薑去皮切陳粟米揀净各二兩右為散毎服一錢水一盞煎至六分温服三焦約論黄帝三部鍼灸經言小腹腫痛不得小便邪在三焦病名曰三焦約内閉發不得大小便夫三焦者水榖之道路氣之所終始也上焦如霧中焦如漚下焦如瀆三焦乃流行之道榮衞致養則腐熟水榖分别清濁以時而下無復滯留若榮衞不調風邪入客則决瀆之官約而不通所以不得大小便也刺法取足少隂太陽之經方郁李仁丸治三焦約小腹瘇痛不得大小便木香二兩青橘皮去白焙一兩人參二兩赤茯苓去黒皮一兩郁李仁半斤大㦸河水煮去皮焙一兩麻仁半兩與大㦸郁李仁同别搗細入藥内甘遂麩炒㣲烟生覆於􅁟候冷開出火毒一兩訶梨勒半兩大黄剉炒二兩右為末别研三味外搗羅却入三味拌和再羅煉蜜丸如豌豆大毎服十丸煎車前子湯下不拘時服順氣丸治三焦約通導大小便郁李仁浸去皮研大黄剉炒各一兩赤茯苓去黒皮澤㵼剉葶藶隔紙炒各二兩大麻仁一兩半研檳榔三兩剉杏仁去皮尖雙仁者麩炒半兩研右搗研了和拌匀再研極細煉蜜和丸如梧子大毎服三十丸空心用甘草湯下日三炒塩酒下亦得枳殻丸出宣明論調順三焦平匀氣脉消痰滯利胸膈袪風利大小腸枳殻去穣二兩牽牛子四兩一半生一半熟檳榔半兩陳橘皮去白焙一兩木香一分右搗羅四味為末與牽牛粉拌匀再羅過煉蜜和丸如梧子大毎服一十五丸至二十丸食後生薑湯下欲利加丸數枳殻散治三焦約大小便不通枳殻湯洗切作片子焙乾五兩厚朴去麄皮塗生薑汁炙二兩滑石細研一兩桂二兩去麄皮右四味搗研拌和毎一兩藥末入膩粉半錢和匀毎服一錢用冷米飲調下空時服更量老少虚實加減踈風散治三焦氣約大小便不通牽牛子炒一兩大黄一兩檳榔半兩陳橘皮去白焙一兩右為散毎服二錢生薑蜜水調下食後良久服皂莢散治三焦約大小便不通猪牙皂莢酥炙去皮子白蒺藜各等分右為末如大腸不通用塩茶湯調下一錢小便不通用温酒調下一錢淮南五柔丸出活人書治三焦不調小便秘澀和榮衞臓腑大黄炒一斤前胡去蘆二兩赤茯苓去黒皮半夏湯洗切焙肉蓯蓉酒浸去皺皮葶藶隔紙炒當歸切焙芍藥各一兩右為末煉蜜和捜再搗千杵丸如桐子大毎服五丸食後温水下日三稍増之普濟方卷四十三
