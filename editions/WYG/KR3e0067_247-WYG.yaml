body:
  text: 普濟方卷二百四十七明周王朱橚撰㿗疝門縂論夫腎主納氣人之氣海繫焉腎虗而為風寒所乗而為暑濕所襲為喜怒憂恐所傷而氷結不散又與氣摶是以羣邪聚於其中曰疝曰奔曰小腸氣曰膀胱氣皆是物也其候不特外腎小腹作痛㦯攻刺于腰脇㦯逰走于背膂㦯冷氣搶心心下痛滿㦯手足厥冷自汗嘔逆痛遶臍膀㦯脇之左右如盃㦯臍之上下如臂㦯腹中累累如桃李㦯胃脘間覆大如盤有壯熱惡寒者有洒淅寒熱者有不得大小便者有裏急而下泄者自汗出者有不欲食者其於隂間則卵有大小伸縮而上下不常囊有腫脹急痛而發歇無定挾冷觸怒則塊物逼上囊根㦯攻腹之脇時和心平則塊物自循膋系歸入囊中凡此皆謂之腎氣治法綱領風則散之寒則温之暑則解其熱濕則渗其水七情所發調其心氣水與氣摶行其小便其間以主治腎氣之劑参之然總治之法大要以流行踈利為先毋曰腎虚得病不敢踈泄盖腎為邪氣所干若非逐去病何由愈儻㦯姑息畏虚妄以剛劑兠住使大小腑秘而不通邪氣入腹衝心危殆必矣然腎氣發則固以腎虚得之然虚中有冷虚中有熱又有冷熱不調尤當詳審冷者脇邉及外腎清冷小便清而多遇寒即發是也熱者内挾暑氣㦯積毒㦯服暖藥於前外腎與小腹俱熱肛門間糞後赤熱小便數澁遇熱則甚是也冷熱不調者小便外腎乍冷乍熱大便小便㦯秘㦯利用藥温凉當隨証而權度之但所謂流行踈導常常運轉於其中矣其若大小便流利之後㦯更有刺引疼㦯氣逰注於肌膚之間此則腎虚血虚氣不還元當加潤飬人参當歸川芎芍藥桑螵蛸葫蘆巴軰又不可無惟是逆氣長虚中脘停酸燥悶擾甚而至於嘔吐最為惡候何則天一生水腎實主之中筋系於隂隂器惟藉陽明以飬之今脾土不濟腎水上乗必為酸汁為必涎飲荏苒踰時遂成暴吐醫家執劑之始皆知腎經惡燥如蒼术白术良薑之類誠不敢用及其嘔吐大作薑术軰用之而不顧若猶未也則吳株萸蓽撥剛燥等劑又加多焉雖附子亦用之而救急矣病勢至此脾土未强腎水已為之涸腎水既涸脾土又為之焦徃徃隂陽不升降榮衞不流行大小二便闗隔澁閉而腎汁皆自其口出也如此者大抵不救臨病湏當識病預與病家言之夫心火下降則腎水不患其不温真陽不行則腎氣不患其不和安有所謂木強者哉惟夫嗜慾内戕腎氣虚憊故陽隂不相交水火不相劑而沉寒涸冷凝滯其間脹大作疼頑痺結硬勢所必至矣執劑之法不可純用燥熱當温利以逐其邪邪氣内消榮衞流轉葢如寒谷逢春有不戒而速不行而至者矣外此又有一種升髙墜下外腎跌傷驚起與敗血交攻亦有木强脹疼之証治法大要則同於中更為之消瘀大抵諸疝之脉脉當弦緊盖弦者寒也𦂳者痛也疝有七証厥疝癓疝寒疝氣疝盤疝附疝狼疝是也何以言之厥疝則心痛足冷食已則吐癓疝腹中氣乍滿滿氣積如臂寒疝因寒飲食卒然脇下腹中痛氣疝腹中乍滿减而痛盤疝腹中痛盤疝腹中痛引臍膀附疝腹痛連臍下有積聚狼疝小腹與隂相引而痛諸疝不愈邪氣留滯及成積聚其脉厥而𦂳浮而牢皆積聚之脉也但牢强急者生虚弱急者不可治儒門事親書云寒疝名水疝律科王敏之病寒疝臍下結聚如黄苽毎發遶腰間痛急不能忍戴人先以舟車及猪腎散下四五行覺藥繞病三五次而下其㵼皆水也猪腎甘遂皆苦寒經言以寒治寒萬幸萬全但下後忌飲冷水及寒物宜食乾物以寒疝本是水故也即日病减八分食進一倍又數日以舟車丸百餘粒通經散四五錢服之利下俟三四日又服舟車丸七十八粒猪腰散三錢乃行歩如常矣又一僧疝病發作冷氣上實齒下貫腎𦂳若䋲挽两睪時腫時冷戴人稱两手脉細而弱斷之日秋脉也此因金氣在上下伐肝木水畏金木伸故病如是肝氣䃲薄而能下榮放睪丸故其寒實非寒木受金制𫝊之胃土胃為陽明故上實齒病非齒之病肝木者心火之母也母既不伸子亦屈伏故下冷而水化乗經曰木欝則達之土欝則泄之令涌四次果覺氣和睪丸痒而暖戴人曰氣已入睪中矣以茴香术荗之藥劑以服首尾一月而愈澹療方云治疝氣發作痛不可忍真科五苓散一貼連根葱白一寸燈心七莖煎湯吞下青鹽木香丸五十粒即效又法青木香丸二百粒斑猫七枚去頭趐為粗末用瓦銚於文武火上同炒令木香微香却以磁碟蓋藥銚放冷處少時去斑猫取木香丸二服空心茴香酒吞下累試之冇驗也論云厥隂脉滑則病狐疝少隂脉滑則病肺風疝太隂脉滑則病脾風疝陽明脉滑則病心風疝也太陽脉滑則病腎風疝少陽脉滑則病肝風疝靈樞經云心脉微滑為心疝引臍少腹鳴肝脉滑甚為㿗疝夫滑脉闗已上見者為大熱蓋陽與陽併也故大熱脉滑尺脉見為大寒生㿗疝滑脉者命門胞絡之名也為丙丁熱火併于下蓋丙丁不勝壬癸從寒水之化也故生㿗疝寸口脉弦而𦂳弦即衛氣不行衞氣不行即惡寒𦂳則不欲飲食弦𦂳相摶即為寒跗陽脉浮而遲即為寒疝凡瘦人繞臍痛必為風冷榖氣不行而反下之其氣必衝心不則否夫隂㿗属肝係宗筋胃陽明養之世多不識謂之外腎非特名義差錯亦使内臟不分其可不辨古方四証但曰腸㿗氣㿗水㿗卵脹殊不别其所因如腸㿗則因房室過度元臟虚冷腸邊膋系不收墜入㿗中上下無定謂之腸㿗不内外因病者乆蓄憂思恐怒兼并隨臟氣下墜隂㿗腫脹急痛名曰氣㿗属内所因病者乆坐冷濕濕氣下襲致隂腫脹名曰水㿗属外所病者勞役無莭及跨馬坐車致卵核腫脹㦯偏有大小上下無常者名曰卵脹亦属不内外因有小兒生来便如此者乃宿疾也卵脹腸㿗皆難治氣㿗水㿗治之易愈又寒疝下注入于㿗中名為狐疝亦属㿗病世人因此病以㿗病為疝氣不審之甚婦人隂門挺出亦稱㿗病名義不分有如此者凡㿗唯腸㿗無問貴賤多有之有睡卧膋系延入脇下者有墜入囊中者㦯遇疲勞及天色變動逼上囊根腫急作痛過於寒疝得暖則下其如卵脹有作熱生膿為癰潰爛者比比有之前隂分大寒大熱囊垂縮隂陽别証云三陽為病發寒為癰腫不為痿厥喘瘖其傳為索睪其傳為㿗疝夫熱在外寒在内則累乖此九夏之氣也寒在外熱在内則卵縮此三冬之氣也足太陽膀胱之脉逆上逓手太陽小腸之脉下行至足厥隂肝之脉不得伸其任脉並厥隂之脉逆則如巨川之水治陽氣下墜是風寒濕熱下出囊中至兩睪腫大謂之曰大甚則為㿗足厥隂肝之經與太陽膀胱寒水之脉同至前隂之来傷寒家說足厥隂肝經為痛滿囊縮急下之宜大承氣湯以㵼大熱靈樞經曰足厥隂肝經經脉中以為寒則筋攣卵縮為大寒前說囊為大熱此說囊縮寒此說囊縮垂睪下引㿗疝脚氣大寒風濕盛下垂為寒與上二說不同以平康不病人論之夏暑大熱囊卵累垂冬天大寒急縮上次與三說又大不同何也是相乖邪不相乖邪荅曰傷寒家囊卵縮大熱在内宜承氣湯急下之與筋經說囊卵縮大寒在外亦是在内與傷同故再引平康之人以証之也冬天陽氣在内隂氣在外人亦應之故寒在外則皮急而囊氣縮夏月隂氣在内陽氣在外人亦應之故熱在内則皮暖皮暖則垂囊此㿗疝之相也三説文殊皆亦理也用藥詳而審之諸疝附論疝病有七厥逆心痛足寒飲食則吐者名厥疝腹中氣滿心下盡痛氣積如臂者名堅疝寒飲則脇下腹盡痛者名寒疝腹中乍滿乍寒而痛者名氣疝腹中痛在臍膀者名盤疝腹中乍痛在臍下有積聚者名附疝小腹與隂相引而痛大便難者名狐疝凡此七疝皆寒由血氣凝澁不得通利冷劇則痛故皆謂之疝難經曰任之為病其内若結男子為七疝女為瘕聚盖明此也方敵金散出直指方治疝氣外腎腫脹極大或生瘡出黄水其痛遶腸寒熱徃来荆三棱蓬莪茂木猪苓白附子蘿蔔子赤芍藥黑牽牛川楝肉山茵陳青木香陳橘皮五靈芝姜黄茴香各一兩南木香半兩丁香一分澤㵼一兩半已上并生用海藻酒浸一宿焙乾海浮石米醋浸火煨紅淬醋又煨淬如此七次黑為度川山甲熟火灰煨焦各一兩青皮去白二兩生用一兩截碎以班猫五十箇頭翅去足同炒黄色去班猫不用香附杵浄三兩一兩生用一兩以巴豆五十粒去壳同炒色焦去巴豆不用右截碎夾和微炒並為末酒麺稀糊為丸如梧桐子大每服三十丸温酒送下此藥泄斟酌用之又方川楝散出直指方治外腎脹大麻木痛硬及奔豚疝氣偏墜諸証川楝子不蛀者四十九箇先切七箇取肉以茴香二錢慢火同炒併留茴香又切七箇以破故紙二錢半同炒併留故紙又切七箇以黒牽牛二錢半同炒併留牽牛又切七箇以鹽一錢同炒併留鹽又切七箇以班猫十四箇去翅同炒去班猫不用又切七箇以巴豆肉十四箇作兩斷同炒去巴豆不用又切七箇蘿蔔子一錢半同炒去蘿蔔子不用外更别分入茴香炒青木香各半兩桂心南木香各二錢半夹和右為末酒調麺糊丸如梧桐子大每服三十丸食前鹽酒下積日計功打墜瘀血一方加延胡斑牛半兩畧炒入藥研末調酒下療疝氣核腫疼方見本門諸㿗類黄蓍丸消疝丸出楊氏家藏方治寒在下焦臍腹牽痛膀胱重墜乆而不愈漸至腫大甚者生瘡時有濃汁焮硬赤痛不忍者金鈴子去核炒黄赤撲兒焙茴香炒稱三味各二兩肉桂去皮半兩甜𤓰子微炒一兩右件為細末酒煮麺糊為丸如桐子大每服五十丸至一百丸空心温酒或鹽湯下忌熱麺生葱大酢粘食等物川椒散出直指方治疝氣外腎腫痛川椒去目并合口者㣲炒出汗官桂各半兩白荳仁甘草各一兩川芎當歸青皮陳皮製枳壳梹榔赤茯苓青木香南木香蓽澄茄右為麄散每三錢薑􅀥煎食前服蒺藜丸出三因方治囊核堅大行動難發作牽連偏墜疼痛白蒺藜㣲炒去刺海藻浸洗去鹹澤㵼各一兩茴香炒一兩半桂心牛膝剉酒浸五味子木香煨梹榔各二兩茯神人參逺志水浸去心姜汁炒各三兩川練去皮核麸炒桃仁去皮尖炒别研赤芍藥續斷山茱茰蓯蓉酒浸青皮各四兩右為末蜜丸梧子大空心食前温酒鹽湯下三五十丸海蛤丸出濟生㧞萃方治㿗疝地膽二十一箇去頭足翅海蛤醋淬三遍當歸海金沙膩粉碙砂各一錢海藻粉霜各半兩水蛭二十箇炒青黛滑石乳香各一錢朱砂二錢為末右為末鹽湯麺糊為丸如小荳大朱砂為衣每服十丸煎燈草湯空心服之小便下冷濃惡物乃效却以黄連紫河車板藍根各三錢煎湯𠻳口以手刷齒一方去板藍根加管仲椒薑丸治七疝諸寒在臍傍痛上义胷中滿少氣蜀椒去目及閉口炒出汗一兩一分乾薑炮厚朴去粗皮塗生姜汁炙黄芩去黑心細辛去苖果芍藥桂去皮各一兩桔梗炒半兩烏啄炮裂去皮臍一分柴胡去苖白茯苓去黒皮牡丹皮各一分右為末煉蜜和丸梧桐子大每服二十丸温酒或米湯飲下日三服聚香飲子出危氏方治七情所傷遂成七疝心腹脹痛腰脇連背不可俛仰檀香木香乳香沉香合香各一兩𤣥胡索炒去皮片子姜黄川烏炮去皮尖桔梗去蘆剉炒桂心不見火甘草炙各半兩丁香亦不見火一兩右㕮咀每服四錢水一盞半生姜七片􅀥一枚煎七分去滓温服不拘時厚朴丸治七疝肢體寒臍腹堅痛滿痛厚朴去皮生姜汁炙附子炮製去皮臍蘹香子炒白术剉炒桂去皮乾姜炮枳壳去瓤麸炒青橘皮湯浸去白焙芎藭炮製去皮臍烏頭炮木香當歸切焙各一兩右為末煉蜜丸如梧桐子大毎服二十丸温酒下生姜湯亦得不拘時海藻丸治奔豚疝氣膀胱小腸氣頑卵木腎及小兒偏墜一切腎氣等症海藻半兩洗焙乾木香梹榔川椒去目炒甘遂各半兩川烏半兩炒小兒去之老人用一兩白牽牛二兩取