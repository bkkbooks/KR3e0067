香練實丸出醫方大成治男子七疝痛不可忍婦人瘕聚帶下皆任脉所主隂經也乃腎肝受病故治法同歸于一錦文大黄一兩為細末用釅醋好者半升同煎成膏當歸去蘆附子炮製去皮臍茴香川楝子各一兩右剉細用好酒三升同煮酒盡為度焙乾作細末每稱藥末一兩入下項藥丁香木香𤣥胡索五錢全蝎十二箇右為末入在前項藥内拌匀酒糊為丸梧桐子大每服三十丸加一百丸空心温酒送下凡疝腎氣帶下皆由於風全蝎治風之聖藥茴香川練子皆入小腸經當歸𤣥胡索和血止痛疝氣帶下皆積隂邪入小腸之間故以附子佐之丁香木香引道也韓提控疝病毎發痛腎不可忍則于兩末各直其枕徃来服之以受如是者三年不已服此藥三劑良愈透經散出百一選治下部諸疾川楝子一兩剉炒入巴豆二十粒吳茱茰一兩同炒焦赤色去豆茱茰茴香炒沉香胡椒全蝎炒各半兩縮砂二兩連皮炒燥去粗皮用木香一兩不見火𤣥胡索二兩新瓦上炒右為末毎服二錢食前酒調下天台烏藥散出衞生寳鑑治小腸疝牽引臍腹疼痛烏藥木香茴香炒良姜炒共五錢梹榔二个川楝子十箇巴豆十七箇青皮半兩右先以巴豆打破同楝子用麸炒俟黑色去巴豆麸不用外為細末每服一錢温酒調下痛甚炒生姜熱酒下亦得桃仁湯治療疝氣桃仁去皮尖及双仁吳茱茰橘皮海藻生姜茯苓羌活蒺藜子去角各三兩右切以水三大升煮取九合分為三服空心服忌酢物七疝丸主暴心腹厥逆不得氣息痛連背膂名曰尸疝下心堅痛不可手迫名曰石疝臍下堅痛得寒冷食輙劇名曰寒疝脇下堅痛大如手痛時見若不痛時不見名曰盤疝臍下結痛女人月事不時名曰血疝小腹脹滿引膀胱急痛名曰脉疝悉主之椒四兩出汗桔梗芍藥乾姜厚朴炙細辛附子炮各二分烏頭一分炮右為蜜丸如豆大三丸加至七八丸日三服忌猪肉冷水生菜方用温酒送下荔核丸出徳生堂治疝氣隂核腫大痛不可忍荔枝核十四箇新者燒灰存性沉香木香青鹽食鹽八角茴香炒共一錢小茴香川楝子肉各二錢右為細末毎服三錢熱酒調空心服益智仁湯治疝氣痛連小腹攣搐呌呼不已診其脉沉𦂳是腎經有積冷所致益智仁乾姜各半兩甘草炙茴香炒各二錢烏頭炮去皮生姜各半兩青皮去白二錢右㕮咀每服四錢水二盞入鹽少許煎七分去滓空心食前温服立效散治疝氣川芎川楝子青皮去白茴香舶上者黑牽牛炒桃仁各一兩右為末每服二錢無灰酒一盞煎八分温服葫蘆巴丸治大人小兒小腸氣蟠腸氣奔豚疝氣偏墜隂腫小腸如卵上走痛不可忍或後結遶臍故刺嘔惡悶亂並治之葫蘆巴炒一斤吳茱茰湯洗七次炒十兩大巴㦸去心炒川烏炮去皮臍共六兩茴香洗去土炒一十二兩川楝子炒一斤二兩右為末酒煮麺糊為丸梧桐子大每服十五丸空心温酒吞下小兒五丸茴香湯下一方加牽牛川楝散治膀胱小腸臍下撮痛上衝心腹下引足膝夜多旋溺外腎騷癢面色痿黄脚下癮痛四肢倦怠不思飲食破故紙炒川柬子蒸去皮核茴香炒各四兩葫蘆巴酒浸炒三兩乾姜炮一兩附子炮去臍一兩半右為末每服二錢空心熱酒調下食前碙砂丸治諸疝作痛木香沉香巴豆肉全者各一兩青皮木去皮二兩銅青半兩碙砂二錢半製如前研右以二香青皮三味細剉同巴豆慢火炒令紫色為度去巴豆為末入皮砂二味研匀蒸餅和丸梧桐子大每服七丸至十丸鹽湯吞下空心日進二三服神聖代針散治一切厥心痛小腸疝氣痛不可忍及心驚欲死及小腸氣搐得如弓角膀胱腫硬一切氣刺虚痛婦人血刺衝心阻一切痛楚服之大有神效孕婦勿服蚖蜻一兩即班猫虫用糯米一兩水洗净即取出俟乾用蜻一䖏微火炒米黄色蚖蜻将糯米製去屑為末乳香别研沒藥别研當歸白芷川芎各半兩右為極細末和匀每服一字甚者二字藥如小錢一字上多先㸃好茶一盞次糁藥末在茶上不得吹攪立地細細呷之又治胎衣不下難産消疝丸治下部蒼术二兩茴香鹽炒𤣥胡各一兩牽牛半兩鹽炒木香一錢川柬半兩用巴豆二箇不要碎炒黑不用豆右為末酒糊為丸一半用酒送下一半病發時酒調送下丸子芫花丸治七疝臍腹堅硬時有疼痛芫花醋拌炒令乾乾姜炮製剉半兩川烏頭炮製去皮臍青橘皮湯浸去白瓤炒附子炮製去皮臍各一兩巴豆三七枚去皮心研如膏紙裹壓去油右為末入巴豆膏都研令匀醋煮麺糊為丸如菉豆大毎服食前酒下三丸治疝氣官桂半兩去粗皮蛇床子一兩半柴胡細辛白芷各二兩右㕮咀毎服五錢大水二升葱白和鬚二莖椒五十粒同煎七分於瓶口上熏令㣲汗出再暖通手洗婦人帶下赤白熏之亦效婦人用可加紫蘓一握又方大蒜二箇韭菜一握蘚菜一握右用大沙瓶内口煎令百沸乗熱熏之俟入得手則洗之如冷則再暖二次立效茴香散治寒濕氣入小腸疼痛或外腎腫痛茴香一兩川楝子肉炒破故紙炒香附子猴查子各半兩去核右為末毎服二錢空心温酒鹽湯任意調下日三服初生小兒皆可服如藥冷將盞盛藥於熱湯内坐熱塗母乳與喫男子是小腸氣女兒是盤腸氣木香棟子散出瑞竹堂方治小腸疝氣膀胱偏墜乆患藥不效服此川楝子三十箇為末末研前先同巴豆二十粒用練子炒黄赤色去巴豆豆不用萆􅐺半兩石菖蒲一兩炒青木香一兩炒荔枝核二十箇炒右為末毎服二錢重入麝香少許空心炒茴香鹽酒調下神效安息香丸一名煉隂丸治隂氣下墜腫脹卵核偏大堅硬如石痛不能忍𤣥胡索㣲炒去壳海藻洗昆布洗青皮去皮茴香炒川楝子去核馬蘭花已上共一兩炒青木香半兩不見火大㦸酒浸三宿切片焙乾共二錢半右為細末另将碙砂真阿魏安息香三味各二錢半用酒一盞醋一盞將碙砂阿魏安息淘去砂石用醋酒各一盞熬成膏子再入麝香一錢沒藥二錢半俱各别研細入前藥一同和丸如菉豆大每服十丸至十五丸空心用綿子灰調酒送下牡丹丸出存仁方治風寒疝痛及諸血滯作痛牡丹皮四兩桃仁浸去皮尖别研官桂各五兩川烏頭一隻炮熟去皮尖右為末煉蜜丸梧桐子大每服五十丸温酒下血痛醋湯下一方酒糊丸一名消堅丸四聖散出瑞竹堂方治小腸膀胱疝氣痛不可忍者川楝子炒黄胡椒茴香炒全蝎炒各半兩右為末每服二錢空心熱酒調下四神丸出直指治腎冷疝氣脹痛不已吳茱茰揀净一兩一半用老酒浸一宿一半用米醋浸一宿焙乾大香附子杵净一兩蓽澄茄青木香各半兩右為末米糊丸梧桐子大每服七十丸空心鹽湯吞下或乳香葱白煎湯下亦可鹽酒尤妙香牛散一名香壳散出仁存治外腎腫痛小腹疝氣茴香一兩炒黒牽牛半兩𤣥胡索枳殻並炒共半兩右為末酒調二錢空心下一方加吳茱茰葫蘆巴各半兩效四聖散出仁存方治小腹疝氣引外腎痛腫茴香炒川山甲全蝎南木香右等分為末以酒調二錢一服便住痛妙甚沙参丸治疝氣沙参二兩昆布洗出醎焙蘹香子炒各兩半右為末酒煮麺糊丸如梧桐子大每服二十丸空心食前温酒下如聖丸治男子五種疝氣婦人産前産後惡物不行臍腹撮痛並皆治之地膽三十二箇去頭足斑猫五十箇去頭翅足鹽豉七十箇輕粉半錢為衣右以上四味用􅀥肉丸如菉豆大每服五十丸先飲好酒三五盞後用温酒下如重車行五里小腹㣲覺痛小腹痛勿驚無妨取下胞中病如雀腦相似是病根又治婦人産後臍腹痛惡物不盡服七丸童子小便下立效又治男子婦人絃氣幷小腹臍痛毎服一丸温酒送下婦人用童子小便下立效又治小腸疝氣及婦人産前産後經絡不来赤白帶下經絡不止忌食雜魚濕麺雞猪馬牛等肉金鈴散一名川楝茴香散出經騐方治小腸膀胱腎大外腎腫大下塞不通川楝子十箇每箇作四片鹽炒同鹽用舶上茴香鹽炒香不用鹽與川楝子木香各等用巴豆五粒連壳打破用川楝子㣲火炒川楝紫色去豆不用木香一分右為末每服二錢用好酒一盞連根葱一寸同煎令葱熟去葱調藥末頓服空心下三服許學士云大抵此疾因虚得之不可以虛而驟補經云邪之所湊其氣必虛留而不去其病則實故必滌所蓄之熱然後補之是以諸方多借巴豆氣者也治疝氣乾姜炮製良姜陳皮青皮各三兩右碾為末米醋糊丸如梧桐子大毎服六七十丸空心酒送鹽湯亦得比吞丸子前嚼小茴香一撮然後送下丸子日進三服空心便服治寒濕氣入小腹疼痛或外腎腫痛出經驗方髙良姜山梔子欝金各半兩右為細末空心葱湯調下服二錢𤣥附湯出存仁方治七疝心腹冷痛腸鳴氣走身寒自汗大便滑泄𤣥胡索炒去皮附子炮去皮臍各一兩木香不見火半兩右㕮咀毎服四錢水一盞半生姜七片煎七分去滓温服不拘時川楝子丸治一切下部之疾悉皆治之腫痛縮小雖多年服此藥永去根本川楝子一斤净肉四兩用麸炒一合班猫四十九箇同炒麸黄色為度去麸班猫不用四兩用麸一合巴豆四十九粒同炒麸黄色為度去麸不用巴豆四兩同麸一合巴㦸一兩同炒麸黄色為度去麸已㦸用四兩用鹽一兩茴香一兩同炒黄色為度去鹽茴香不用木香一兩不見火破故紙一兩炒香為度右為細末酒糊為丸梧桐子大每服五十丸鹽湯下甚者日進三兩服空心食前服禹功散黒牽牛頭末四兩茴香炒一兩或加木香一兩右為末生姜自然汁調三錢卧時服七疝湯治男子七種疝氣攻疰小腹急痛牽搦不可忍者川烏炮去臍皮半兩全蝎十四箇去毒炒鹽三錢炒右㕮咀水一碗姜七片煎七分去滓放温只作一服空心食前服一方無姜凡諸疝氣偏墜舉發者氣實大便閉可用生料五苓散加茴香吳茱茰炒鹽少許毎服五錢重水一盞半燈草二十根煎七分去渣送下青木香五十丸通利其氣虚大便滑泄者可用蟠葱散加吳茱茰小茴香鹽炒煎一服送下走馬茴香丸或内消丸五十丸空心服之予用此藥多驗防風散一名牡丹散治疝氣腫硬㿗偏大腸不能動坐卧不安防風去蘆牡丹皮去心各等分右為末食前酒服方寸匕日三服治㿗卵偏墜一方加黄蘖桂心二味等分治氣上下痛腫用桂心豉鐵精等分為五味小兒一刀圭二十日愈嬰兒以乳汁和大豆許與之葫桃散葫蘆巴桃仁去皮尖炒右等分為末酒調二錢食前服去鈴丸治奔豚疝氣或隂囊腫大川烏尖七箇生用巴豆七枚去皮只去丸分油右為末糕糊丸如梧桐子大用硃砂麝香為衣每服三丸同青木香丸三十粒空心冷鹽酒下三兩一服不可多神應散治諸疝心腹絞痛不可忍𤣥胡索胡椒等分右為末每服二大錢酒半錢小盞半煎七分食前温服一方百沸湯調服香沙丸茴香鹽炒香去鹽不用新蚕晒乾各等分右為末煉蜜丸如弹子大空心細嚼温酒送下甚者日進二服桃仁膏方見本門小腸氣類治疝氣膀胱小腸氣痛不可忍治大人小兒偏墜防風官桂辛辣者右等分為末毎服二錢温酒調下如服訖以食壓之又方荔枝核冬橘核右燒存性為細末温酒調下一錢二物湯治奔豚疝氣攻刺走痛辣桂一兩半牛一兩炒寸金丸治奔豚諸疝作痛當歸延胡索舶上茴香炒葫蘆巴炒各一兩桃仁浸去皮焙桑螵蛸酒蒸焙川五靈芝别研白芍藥川楝肉各半兩蓽澄茄木香二錢半全蝎十箇焙右為末醋打麺糊丸梧桐子大每服五十丸少鹽入酒送下有熱小便閉車前子赤茯苓煎湯下治丈夫本臟氣傷膀胱連小腸等氣右金鈴子一百個温湯浸過去皮巴豆二百個搥㣲碎麸二升同於銅鍋内炒金鈴子赤熱為度放取出麸核為末毎服三錢非時熱酒醋湯調並得其麸巴豆不用也棟實即金鈴子治疝氣炭皮一兩茴香半兩右炒為末作二服酒調熱服汗出即愈又香白葱芷末酒調服五苓散出危氏方治撮聚疝氣用連根葱白二寸燈心寸莖鹽炒茴香一撮川楝子三個去核煎湯調下大効又方出經驗良方耑治小腸膀胱痛腎痛外腎腫大用􅒦砂仁為細末每服二錢嚼煨葱熱酒調下不拘時川楝散出經騐良方治小腸氣膀胱氣痛不可忍川棟子一兩毎個切作四片青皮湯浸去白切焙乾稱一兩木香二兩舶上茴香一兩巴豆五十個去壳不出油右一處炒令黄色去巴豆不用再入海金沙一錢桂府滑石一錢半同杵細末每服一錢煎葱白酒熱下治本臟氣用鷄心梹榔小便濃半個服或用熱酒調一錢匕金鈴子散出濟生方治七疝寒注下焦小腹引外腎疼痛大便多閉血疝川楝子去皮核取肉一兩用巴豆七枚去壳同炒令黄色去巴豆右為細末毎服二錢熱鹽酒調服空心食前一方用川楝七個炮空心酒調下屢效治疝氣小腸偏墜等疾已驗神效一方五苓散朱端甞病疝氣親服神效𫝊之數人無不騐者右以先服五苓散用酒半盞燈心棗煎下青木香丸一二十丸次服煨姜鹽煎五積散俟平復再服沉香及蓽澄茄散四藥出百一選方蝎麝散出直指方治膀胱小腸氣痛右用全蝎𦂳實而全者不拘多少焙乾為末每逢病欲發時用蝎末一錢入麝半字分作二服温酒調下候如人行十里又進後服神效通治荆芥散出經驗良方治風疝隂腎腫大兼治隂囊腫痛凌醫云曽以治人有騐右用荆芥穂不俱多少新瓦上焙為末每服二錢以熱酒下即散治膀胱疝氣右須以青木香丸每服五十丸用醇酒入葱白濃煎五苓散送下一方不用酒以葱燈心煎湯下治風疽疝氣腫墜凝血及瘰􅊓除濕風出本草右用䒽草為末和入湯服蘹香子散治小腸膀胱疝氣疼痛蘹香子炒荆三棱煨剉各一兩姜黄馬蘭花醋炒各半兩沒藥研乾姜炮各一兩右為散毎服二錢空心食前熱酒調下治偏墜右以每日早煎香蘓散入少鹽服之即愈治卒得諸疝小腸及隂中相引痛如絞自汗出欲死右以搗過沙参末篩薑湯調服方寸匕立瘥消腎丸治腎大小便疼痛右用橘皮揀净二兩巴豆十四粒同一處炒至橘皮及巴豆黑色去巴豆用橘皮炒末二兩又黑牽牛二兩合同一處醋糊為丸梧桐子大毎服三四十丸漸漸加五十丸鹽酒湯下鹽湯亦可食前淋渫藥方出百一選方蛇床子川椒木通石茱茰藁本陳橘皮各一兩右為末每用連根葱白七枚水三碗藥二匙煎五七沸先嘘俟通手淋洗氣寳丸出楊氏家藏治一切氣滯心胸痞悶及酒食所傷脾胃積滯膀胱疝氣攻注腰脚茴香炒稱二兩陳橘皮一兩木香一分黒牛二兩以吳茱茰二兩慢火同炒俟茱茰焦取出不用茱茰只用牽牛頭末一両右為細末拌匀煉蜜為丸梧桐子大每服二十丸至三十丸生姜湯下更看虚實加减食前服小腸氣痛鹽湯下治寒濕氣小腹疼外腎便大腫痛發時只一兩服立定常服此藥無下部之疾出百一選方茴香柿楦子本草名糖毬惟滁州者入藥二味共等分右為細末毎服一錢或二錢鹽湯調空心熱服二神膏出經騐良方治腎囊偏墜疝氣牡蠣二兩煅良姜一兩右為細末津唾或水調服大便處湏㬰如火熱畧痛即平安隻金丹出危氏方治男子疝氣小腸虚損小茴香二兩濕生虫隂乾二兩右為末酒糊為丸梧桐子大每服三五十丸空心茴香湯下海藻丸出危氏方治偏墜小腸氣海藻海帶各一兩班猫二十八個去翅足巴豆二十八個去壳完全者右巴豆班猫二味一處生絹袋盛用好醋一碗以瓦盛四味同煮將乾去班猫巴豆不用只將海帶二味細研為末以淡豆豉一百粒以煮藥餘醋畧浸蒸研為膏和末藥為丸如梧桐子大毎服用麝香少許硃砂三錢乳鉢内細研至無聲却入麝香冄研匀為衣日乾以新瓦瓶收之每初服七粒二服十粒三服十五粒若未愈再進三兩服皆用十五粒仍用鹽炒茴香細嚼酒吞下空心服忌鴨子幷酢醬動氣等物乆病三五服效此藥貴新合效速若合下稍乆多服為佳牡丹五等散療㿗疝卵偏大有氣上下脹大行走腫大服此良騐牡丹皮防風黄蘗炙桂心共一分桃仁一分去皮尖研右為散以酒服一刀圭二十日愈少小㿗疝最良小兒以乳和如一大豆與之長宿人服方寸匕忌生葱胡荽金穀散出楊氏家藏方治疝疼痛淋流下部穀精草枇杷葉各兩半欝金一兩右件㕮咀毎用一兩半水五升煎數沸乗熱熏之去滓通手淋洗黑神散出聖徳堂方治男子婦人膀胱痃癖七疝下氣五隔氣疾産後諸血漏下赤白腹中有塊大如杯棬血􅛎癥癖七疝發時痛不可忍者用之效乾漆六兩半生用一半重湯煮半日神麯炒小茴香炒共半兩木香椒紅去白丁香共半兩梹榔四個大者已上除椒餘藥一半生用一半同炒右為細末水糊為丸如彈子大别研茴香末十二兩鋪隂地䕃乾俟外乾並茴香同丸藥收入甑内盛極乾去茴香凡腎氣膀胱痃癖七疝下墜五隔血崩産後諸血漏下赤白者用藥一丸分作四服細嚼酒下死胎者用一丸燒綿子灰酒調下難産者用冬葵子四十丸粒杵碎煎酒下應痛丸出三因方治敗精惡物不去結在隂囊成疝痛不可忍乆服去病阿魏三兩醋和用喬麥麵作餅厚三指曩阿魏慢火煨熱梹榔大者二個刮去瓮子蒲成的乳香將刮取末用蕎麥麺伴作餅子慢火煨熟右同研為末入碙砂末一錢赤芍藥一兩同為麵糊搜和丸如梧桐子大温酒鹽湯下十丸至二十丸食前服止痛丸出楊氏家藏治疝氣小腸並婦人血氣痛不可忍者芸䑓子一兩班猫去翅足四十九枚二味一䖏慢火炒深黄色勿令焦揀出班猫四十二枚只用七枚右件為細末酒煮麵糊為丸如梧桐子大毎服一丸小腸氣炒茴香酒下血氣炒生姜醋湯下茴香蒼术丸出徳生堂經驗方治疝氣偏腎核墜不能忍者蒼术一斤泔水浸春夏三日秋冬五日破故紙鹽炒八角茴香鹽炒巴㦸出心黑牽牛各二兩右蒼术分作四分與四藥合炒外杜仲四兩炒去系止去黑牽牛不用餘為末酒糊為丸梧桐子大每服五十丸空心鹽酒水任下茯苓桂甘湯出直指方治臍下悸動欲作奔豚茯苓二兩甘草炙半兩桂枝一兩右剉細每服四錢􅀥一個用泉水一盞半煎一盞温服内消丸出楊氏家藏治小腸膀胱疝氣下部等疾木香茴香沉香硫黄别研附子炮去皮臍各半兩碙砂二錢别研全蝎四十九枚炒右件為細末湯浸蒸餅為丸如菉豆大每服七丸綿灰温酒送下食前必效丸出楊氏家藏治偏墜膀胱疝氣小腸氣痛不可忍者桃仁半斤用茱茰四兩炒桃仁令紫色去茱茰令碾桃仁為細末却入和后諸藥茴香炒破故紙炒香熟二味共二錢延胡索穿山甲用蛤粉炒赤色地蟾蟲洗去泥土頭翅足焙乾三味各一兩右件為細末麵糊為丸梧桐子大每服五丸空心温湯送下仍用前件炒藥茱茰炒為細末用津液調敷患處丁香疝氣丸出詩效方治臍下撮痛疼並臍已下周身皆急小便頻清其五脉急獨腎按之不急皆虛無力名曰腎疝當歸茴香共一錢甘草木香共五分全蝎十三個羗活三錢防己三分麻黄根𤣥胡各一分丁香半錢肉桂一錢川烏頭半分右件為末酒煮麵糊丸如雞頭仁大每服五十丸温酒送下鹽湯亦得空心服應痛丸出楊氏家藏方治疝氣痛甚者胡椒三百二十粒巴豆七枚去壳班猫二十一枚去頭足翅用右件為細末煨蒜為丸如菉豆大每服三丸温酒或熟水送下食前空心服或痛時便服衞生寳鑑癸丑嵗奉詔至六盤山上命治火赤紐隣乆病疝氣復因七月間飢飽勞役過度縱飲所發甚至面色青黄不澤腹臍陣痛搐撮不可忍腰曲不能伸熱物熨之稍緩脉得沉小而急余因思難經有云任之病男子内結七疝皆積寒於小腸之間所致也非大熱劑即不能愈遂制一方名之曰沉香桂附丸每服百丸空心温酒吞下間服天台烏藥散旬日良愈明年秋王征班師即逺迎拜精神如故上大恱輒録於此沉香桂附丸治中氣虛弱脾胃虚寒飲食不美退隂􅂇陽除臟腑積冷心腹疼痛脇肋膨脹腹中雷鳴面色不澤手足厥逆便利無度又治下焦陽虚及療七疝痛引小腹不可忍腰曲不能伸喜熱熨稍緩沉香附子炮製去皮臍川烏頭炮去皮臍切作小塊乾姜炮右為細末好醋煮糊丸梧桐子大每服五十丸至七八十丸熱米飲湯送下空心食前日二服忌冷物金鈴子丸出朱氏集騐方治膀胱小腸疝氣臍腹苦痛茴香川楝子半兩毎個四片用巴豆四十九粒炒焦為度不用巴豆破故紙葫蘆巴炒各二兩右為細末酒糊丸每三十丸細嚼胡桃仁三個熱葱酒送下常服鹽酒吞下亦可金鈴子散出朱氏集驗方治膀胱疝氣小腸偏墜小腸撮痛發則欲死諸藥所不治妙方川楝子一兩净班猫十四個去頭足翅巴豆十四個去壳幷心擘開作兩片右二味同煉於銀石瓦器内慢火炒令川楝肉帶肉㣲黄焦色取去班猫巴豆二藥不用只將川楝子肉别安之一處外用茴香三錢重和前川楝子肉用鹽合炒令香幷前川楝子研為細末每服三錢空心温酒調下若臟腑㣲利通即愈病乆而甚痛者不過三服病退即止服此方之後仍用安腎丸沉香蓽澄茄散吞服以補其虚則其病永不作矣燒綿丸出朱氏家藏方治疝氣川楝子去核馬蘭花青橘皮舶上茴香各一兩右為細末用漆丸如鷄頭大針穿三孔隂乾用新綿半兩燒成灰細研以無灰酒調綿灰稀稠得所温放下藥一丸正發未時皆可食之藥在伏中不壊如要取藥時可飲葵湯即下浄洗留之一丸藥可治六七人神效天雄沉香煎丸出王氏愽濟方治下元虚憊陽事不能成下墜及小腸氣痛腎臟攻注脾胃不和腰脚重天雄四兩生用研剉防風二兩生𦂳黒小豆二兩净生用漢椒四兩附子四兩生草烏頭四兩生牛漆二兩天麻二兩已上八味以無灰酒一斗放銀鍋内煨火不得令大沸酒浸為度焙令乾沉香丁香木香羗活乾姜各一兩官桂一兩去皮肉蓯蓉三兩酒浸去土炙熟紫巴㦸二兩去心右為細末煉蜜丸如梧桐子大每日空心下二十丸加三十丸乆服明目雄氣海駐顔葫蘆巴丸出鮑氏方治大人小兒小腸氣盤腸氣奔豚疝氣偏墜隂腫小腸有形如卵上下痛不可忍或絞結繞臍嘔吐悶亂葫蘆巴一斤大巴㦸六兩幷炒右為末酒糊丸如梧桐子大每服十五丸空心酒鹽湯下一方加青皮蓬术桃仁黑牽牛破故紙一方加川楝破故紙茴香川烏蜜丸酒下方三茱丸出楊氏家藏方治膀胱疝氣時發痛疼而不除漸至堅大此藥可以内消山茱茰吳茱茰湯浸七遍食茱茰青橘皮去白茴香㣲炒肉桂去皮金鈴子去核陳皮去白木香各等分右件為細末酒煮麵糊為丸梧桐子大硃砂為衣每服三十丸酒或鹽湯送下食前木香丸出楊氏家藏方治膀胱寒疝腫緩疼痛地蟾蟲去頭翅足斑猫去頭翅足紅娘子去頭翅足巴豆四味共等分以糯米一盞同炒川楝子去梜炒川椒去目及閉口者各一兩茴香二兩鹽炒木香半兩右件同糯米細末木𤓰肉四兩猪腰子一對去筋膜同和酒二升熬爛研成膏和前藥末和丸梧桐子大每服三十丸鹽湯或温酒送下空食前猪胞丸出楊氏家藏方治膀胱疝氣腫大牽引作痛猪胞一枚酒煮切甘遂澤㵼二味共二錢炒黒牽牛續隨子去壳半兩木猪苓班猫用罌米炒黄去米幷頭足翅稱一錢右件為細末酒煮麵糊丸如梧桐子大每服三十丸嚼茅香酒送下取動小便如米泔是效甞服五十七丸忌甘草三日食前澤㵼散出楊氏家藏方治膀胱疝氣小腸氣痛馬藺花川楝子肉炒茯苓皮澤㵼茴香炒麥門冬去心石燕子煆紅醋淬七次右件各等分為細末入麝香少許毎服一錢用鹽酒調下空心臨臥茴香散出楊氏家藏方治一切氣疾臍腹滿膀胱疝氣小腸氣痛荆三棱炮切蓬莪术炮切金鈴子去核麩炒赤三味共一兩茴香炒青橘皮去白甘草炙二味各半兩木香當歸洗焙二味各一分右件為細末毎服二錢水一盞生姜二片煎至七分温服如小腸撮痛炒生姜酒調下如人行五七里再服一服空心食前療疝氣出本草右以蝟皮燒為灰酒服之治疝積腹痛出本草右以羚羊角作末服之除疝瘕出本草右以雀卵白和天雄兔系子末為丸空心酒下五丸普濟方卷二百四十七
