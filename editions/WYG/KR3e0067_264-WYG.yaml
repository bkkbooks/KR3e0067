body:
  text: 普濟方卷二百六十四明周王朱橚撰服餌門神仙服柏實法方出聖惠方柏子仁二斤搗羅為末以酒浸攪如膏白蜜一斤棗肉三斤乾地黄末一斤白术末一斤右和令勻丸如棗大每服三丸以水研破服之日三服一月百病愈久服延年服柏實方用柏實於八月合房取乃曝令坼其子自脫用清水淘取沈者控乾輕椎取仁搗羅為細末每服二錢七酒調下冬月温酒下早晨日午近晚各一服稍増至四五錢若絶榖者取飽為度渇即飲水令人恱澤一方用煉蜜成松脂及白蜜丸如梧桐子大每服十丸或二十丸日三服又方與松子等分松脂丸酒下之又方加菊花末等分蜜丸如梧桐子大每服十丸二十丸日三服酒下又方柏子雷丸防風等分右搗羅為散每服一錢以酒飲調下日三服令人壯盛辟糓仙人服柏葉减糓方取柏葉三十斤勿雜枝于不津噐内以東流水浸之令水於上出三寸新盆覆盖泥封三七日漉出陰乾勿令塵入候乾擣羅為末又取小麥三升净㨂内柏葉汁中封五六日出之陰乾復内之封五六日又出陰乾搗羅為末更取大豆三升炒熟去皮搗羅為末合三物攪相得内囊中盛之每服三合酒飲調下空腹日午近晚服日飲無妨治萬病隆冬不寒腸實不食又方柏葉二十斤著瓮中以東流水浸二十一日出曝乾㣲炒内少炒鹽一升令黑小麥一斗内浸柏葉汁中三日出曝乾又内汁中候汁盡止出曝乾炒令香右搗羅為末取猪肚脂二斤細切著末中攪令勻食前服一錢七酒飲下早晨日午近晩服二十日不饑乆服無病可致神仙矣一方溫水送下又方柏葉末一斤四兩取細枝上及向上側生者每以並月随時主氣方位採於背月處側垂隂乾松葉末一斤四兩採新者長三分剉搗用清水三斗煮取二斗絞去滓令净白茯苓去皮黑十二兩右先取松葉汁二斗煮茯苓至三四升撥去火待冷漉出茯苓研作粉隂乾為末其餘汁用拌柏葉末於樹隂下若髙簷廡下攤隂乾又茯苓粉搗羅為末以酥四兩拌勻鍊蜜待冷利劑更搗半日分為四五團蜜噐貯之如旋丸如梧桐子大每服一百丸加至二百丸經一年白髪盡黑齒落更生兼治百病消皯黯展面皺長筋骨勿食猪魚六畜肉生葱韭蒜陳敗殠黏滑米醋等又方用柏葉二斛熟蒸曝乾搗羅為末取大麥三斗炒令變色磨麫合和令勻服多少自在酒飲下三錢以水漿止糓療病辟瘟癘惡鬼乆服可度世矣服柏葉方延年不老用柏葉不拘時採亦不拘多少切置甑中令滿盖甑蒸約三石米乆蒸訖取净噐以水淋百餘遍訖隂乾搗羅為末每服一合食前酒下日二服漸増至一升令人益氣辟糓不飢此仙人髙子良方一方以黒豆黄末相和令勻每服二合冷水調服日三服又方用柏葉取大盆穿作竅以物塞竅著柏葉於盆中水浸日一易水七日以上至二七日乃覆盆内柏葉甑中蒸之令氣徹便止曝乾搗羅為末􅀥膏和之如作乾飯法再曝再搗每服一錢以水調下日三服乆服不飢渇即飲水神仙餌柏葉法服之一年百病除愈服之三年行及奔馬乆服令人身輕益氣力耳目聰明補骨髄除風去冷壽年千歲用柏葉二十斤四時採周而復始以水三宿漉出晒乾搗羅為末每三斤柏葉入炒了黒豆黄末一斤胡麻末一斤三味相和勻每服三錢水調下日三服神仙餌柏葉令肥白補益方側柏葉三斤五月五日五方採逺志二斤去心白茯苓一斤右搗羅為末煉蜜和丸如梧桐子大每服以温仙靈脾酒下三十丸再服並無所忌神秘勿示非人松實丸出聖恵方還年復命松實和皮用柏實净揀令三斤松脂錬成十斤甘菊花五斤右同搗羅為末煉蜜和搗五六百下丸如梧桐子大每日食後午前温米飲下二十丸漸加至三十丸服至百日不飢顔色光澤元本空心温酒下五十丸一百日已上不復飢服之年百嵗人如三十者乆服壽同天地又方出聖恵方白松脂十二兩經十三徧煉者白蜜一斤四兩白蠟一斤四兩白茯苓去黒皮十二兩為末右都于大噐内盛之坐於甑内勿令泄氣蒸之如炊一石米乆取出乃丸如梧桐子大每服十丸温酒下如飢復取十丸服之不得食一切物飲酒不過一合又方出聖劑總録松脂三斤煉成者逺志去心炒令微赤七兩右搗研為細末煉白蜜和丸如梧桐子大每服三十丸米飲或温酒下早晨日午近晩各一服十五日不欲飲食神仙餌松實方一名絶榖昇仙不食法出聖恵方用取七月七日過時即落難収去木皮搗如膏每服如鷄子大日三服如服及百日身輕三百日行五百里絶糓乆服昇仙渇則飲水亦可以煉了松脂同服之丸如梧桐子大服十丸一方取松實搗為膏酒調下三錢日三則不飢渇飲水勿食他物服松脂法出射後方用十斤松脂五度以水煑過令苦味盡取得後每斤煉了松脂八兩同茯苓末每晨水下一刀圭即終年不食而復延齡身輕精爽服松脂方出千金方用百煉松脂下節以蜜和内筩中勿令中風日服如博碁子一枝博碁長二寸方一寸日三漸漸月餘别服一斤不飢延年亦可醇酒和白蜜如􅄳日服一二兩至半斤凡取松脂老松皮自有聚脂若人取得用聚脂者最第一其根下有傷折處不見日月者得之名曰隂脂彌良惟衡山東行五百里有大松皆三四十圍乃多脂又法五月刻大松陽面使向下二十四株每株可得半斤亦煑其老節根處有脂得用仙經云常以三月入衡山之隂取不見日月松脂煉而餌即不召而自來服之百日耐寒暑二百日五藏補益服之五年即見西王母仙經又云諸石所生三百六十五山其可食者滿谷隂懐中松脂耳其谷正從衡山嶺直東四百八十里當横犍正在横嶺東北行過其南入谷五十里窮穴石城白鶴其東方有大石四十餘丈状如白松松下二丈有小穴東入山其丹砂可食其南方隂中有松大三十餘圍有三十餘株不見日月皆可取服之服松根方出聖劑總錄用以松根取東行者剝白皮細剉曝乾搗羅為末可飽食之能絶糓渇即飲水服松葉方出聖恵方用松葉向四時随五方採之可去地一丈者剉如粟粒曝乾五斗搗羅為末以好酒拌作餅子再搗羅散每服五錢匕以酒飲服日三令人身輕延年體香絶糓不飢矣忌魚菜鹽醬採松脂法出千金方用以日入時破其隂以取其膏破其陽以取其脂脂膏等分食之可以通神靈鑿其隂陽為孔令方五寸深五寸還以皮掩其孔毋入風入則不可服以春夏取之取封取訖塞勿洩以泥塗之東砂穴有隂泉水可飲此𢎞農車君以元封元年復下居長安東市在上谷時往來至者採松脂方出聖濟總錄常於立夏日伐松横枝東西者圍二三尺長一丈許者倒地以噐盛一頭就下日内曝之其脂自流出三四徧取以和藥此脂特與生雄黄相宜若堅硬者一更以酒於火上消之汗出者冷酒中引之常以春三月入衡嶽之隂取不見日月之松脂煉而食之煉取不黏為度服之百日耐寒暑二百日益臟腑乆則成仙又方出聖濟總錄以研取老枯肥松及節劈長尺許置甑中蒸之滿甑中其脂自流釡中水内數數取過置冷水中俟凝依法煉之又方出聖濟總錄以夏至日取松脂法河南少室山有大松取隂處斷之其脂膏流出収噐中依法煉之去苦味乃以白蜜煉去沫與暗等分相和得所每日服一升無他物只飲水自足令人不飢長服可保終身不食初服一升三日後只如彈丸大消軟服之渇即飲水令人不老又方出聖濟總錄取松脂不拘多少入釡中添湯煑之一炊乆乃取以新綿隔瀘入冷水中與人對引之如此三十次則成矣乂方出聖恵方松脂七斤桑灰汁一石右以灰汁一斗於釡内煑松脂三五沸取接置冷水中候凝復煑之如此十度乃止逐度易灰汁并換冷水其脂白矣取煉成白脂研羅為末每服一匙以酒或米飲調下空腹日午近晩服若至十兩以上不飢一年以後夜視目明乆服不老矣可服今谷在衡州東南攸縣界此松脂與天下松不同又方出聖濟總録用松脂一斤半水五升煑之候消去濁澤取清好者投冷水中如是一百二十徧止不得輙率意便止候四十徧輙一易湯凡三易湯方成以無苦味為度其脂軟白如泥乃用白茯苓一斤搗羅為散内煉成脂中拌令得所置處候可丸丸如杏仁大日吞三十丸十日止不欲飲水乆當絶糓神仙煉松脂服餌法出聖恵方用松脂二十斤為一劑以大釡中著水釡上加甑其甑中先用白茅鋪襯令勻茅上更著生黄土約厚一寸許乃著松脂以物宻盖勿令泄氣其竈下用桑燃之如釡中湯耗添煖水蒸一炊乆乃接取脂置冷水中候凝更蒸如前法三蒸畢乃止其脂色如玉状用以和藥取甘菊花白茯苓等分為細末和丸如梧桐子大以酒下十丸空心日午近晩服每蒸時或酒灑如前法又方出十便良方用松脂十斤用桑薪灰汁内釡中加甑於上甑中先鋪茅次鋪黄砂土可三寸蒸之松脂當流入釡中投於冷水待凝収取復蒸如此三度更以清水伐汁復如前蒸三度去水更以水一石五斗煑甘草三斤取汁一石去滓内牛乳二斤加甑釡上復蒸如前令松脂入甘草汁中待冷收取復蒸如此三度即成苦味皆去甘美如飴每服以温酒服如彈子大日服三乆服神仙不老陶隐居云採煉松脂法以桑灰汁或酒煑軟挼内寒水中數十過白滑則可用其有自流出者乃勝於鑿樹及煑用膏也其實不可多得惟葉正是斷糓一以宜細切如粟以水及麵飲服之亦有隂乾搗為屑丸服者患厲風惡疾服此無不瘥比來苦脚弱人釀松節酒亦皆愈神仙餌百花法出聖恵方以三月三日五月五日七月七日九月九日採百花隂乾搗羅為散每服二錢以水調下日二服百日身輕面日光澤三年通神忽然與真人同位如春採百草枝隂乾搗末酒服二錢以水服之亦得輕身長夀一名草精也神仙服百花方出聖恵方桃花三月三日採蒺䔧花七月七日採甘菊花九月九日採枸把葉春採枸把花夏採枸把子秋採枸把根冬採右並隂乾分兩等搗細羅為末散每服二錢以水調下日三服百日自知其効二百日力加百倍乆服令人身輕長夀神仙服茅法出聖恵方仙茅味辛温有毒主心腹冷氣不能食腰脚風冷攣痺不能行丈夫虚勞老人失溺無子益陽道乆服通神強記助筋骨益肌膚長精神明目一名獨茅根一名茅𤓰子一名婆羅門参仙茅傳云十斤乳石不及一斤仙茅表其功力爾生西域及大庾嶺亦云忌鐡及牛乳二月八日採根法于後用仙茅十斤剉如豆大以水浸去赤汁數換水清即㬠乾搗羅為末煉蜜和丸如梧桐子大每日空腹以温酒下十五丸日晩再服如本性熱人飲下亦得如能每日别取其米煎之為湯下丸極妙如服後覺熱氣上衝頭痛以沙糖為漿飲之即定兼濃煑甘草豆湯一盞服之亦効又取一分烏麻油入炒熟為末兼沙糖和之為丸服即得力遲當不發矣服後十數日覺能食兼氣下即効也所服不限多少唯多為妙若患冷氣人不用水浸除赤汁便切搗依前和合忌牛乳其所忌牛乳者只是减其藥力亦無妨損若煎湯取散三錢水五合煎至四合空腹頓服之大佳神仙服靈芝輕身飛行法出聖恵方取石上靈芝一寸八九節者十斤曝乾搗末蒸之一伏時又曝乾更搗萬杵煉蜜和丸如梧桐子大每旦及晚以酒下二十丸十日身輕二十日一切病止三十日身如白玊昇度山林日行千里之外神秘勿示凡鄙服蒼术方出余居士選竒方蒼术一斤好白麻油半斤右件将术用白米泔水浸一宿取出切成片子用前麻油炒令熟用瓶盛取每日空心服一撮用冷水湯咽下大能壮氣駐顔色辟邪又能行履飢只此服之洗雲母粉出十便良方右以雲母二斤瑩净者使竹刀薄開净洗了加天門冬一斤著水于土石噐中猛火煑一伏時水耗即添熱水去天門冬將雲母於木臼内略杵令碎使夾布袋盛藥大盆内揉洗自成粉澄去清水使絹袋再洗過仍澄清使貢紙包兩三重安藥在灰池内滲乾火焙藥成矣以山藥或蒸餅丸如梧桐子大空心任下五十丸忌鐡噐至於煎水亦使土噐又忌鯉魚雲母色黒者不可使青城山丈人觀主康道豐傳治百病煆製雲母粉法出風科集驗方雲母一斤折開揉碎入一大瓶内築實上澆水銀一兩封固以十斤頂火煆通赤取出却拌香葱紫引翹草二件合搗如泥後以夾絹袋盛于大水盆内挼取粉于粗末盡再添草藥重搗如前法取粉沈水乾以小木盤一靣于灰上印一淺坑鋪傾粉在内直候乾移入火焙焙之取出細研以麫糊丸如梧桐子大遇有病者服之無不効知成都府辛諫議曾患大風衆醫不効遇此道士得此方服之極神驗神仙去萬病主長生出本草用檀柏末為散飲服方寸匕盡一枝有驗此百歲蘗之根神仙服松葉法出十便良方神仙服松葉令人不老身生緑毛益氣輕身還年變白乆服絶糓不飢渇可致神仙右取松葉不拘多少細切如粟更研令細每日食前以酒調下二錢亦可粥汁服之四時皆服然初服稍難乆即自便矣服黒豆法出衛生家寶方延年益顔一料九粒左手下右手上用東日照處壁土去藁筋滴少水日中時靣正看日挪念呪云揔水土以㑹五行併此豆益壮陽道右挪十數遍吸太陽氣吹豆上如此五七遍或十數遍豆黑色一日呪三兩料収净處每絶早空心新汲水吞下一粒忌黄連養老延年服茯苓方華山挺子茯苓研削如棗許大四方有角安于新磁瓶内以好酒浸三重紙封其頭後一百日開其色當如􅄳糖可日食一塊百日後肌體潤澤服欲心壯健再加人参此藥除百病益元氣養五臓六腑清明耳目強壯不衰老延年益壽神驗用七月七日露水丸之更佳服時乃呪曰神仙真藥體合自然此藥入腹天地同年呪訖服藥斷諸雜肉五辛最切忌之服一年後可夜視諸物乆食之腸化為筋可延年耐老靣若童顔孫真人枕中記云服百日百病除二百日晝夜不眠二年後役使鬼神四年後玊女來侍抱朴子云任子季服之十八年玊女從之能隐能彰不食榖炙瘢滅靣生光澤東坡服茯苓方出十便良方茯苓自是仙家上藥但其中有赤筋若不能去服乆不利人眼或使人眼小削皮斫為方寸磈銀石噐中清水煑似酥軟解散為度入細布袋中以冷水擺如作葛粉状仍取粉而筋脉留袋中棄去不用其粉以蜜和濕香状蒸過食之尤佳又加胡麻但取純黒脂麻九曝入水爛研濾取白汁銀石噐内熬如作杏酪湯更以去皮核净􅀥肉爛研與茯苓粉搜和為丸服之尤妙神仙服胡麻延年不老方胡麻五斗色赤黑者右以水淘去浮者不用漉乾便上甑蒸令氣遍溜出之曝乾以少許水拌令潤又上蒸之氣遍又下曝乾如此九度後去黑皮令净搗羅為末每日空心以温酒調下三錢日晚再服漸自不飢除愈百病長年不老便欲辟糓亦得勤而服之成真人矣神仙服松柏葉當以三月四月採新生松葉可長三四寸許并花蘂取隂乾細搗為末其柏葉可取深巖谷中採當年新生可長三二寸者隂乾細搗為末用白蜜丸如小豆大當以正月十五日日未出時燒香向東持藥八十一丸以酒下服一年延十年命二年延二十年命欲得長肌肉加大麻苣蕂一年後可夜視物乆服之腸化為筋延年耐老靣若童顔欲心力壯健者加茯苓人參此藥除百病益元氣添五臟六腑清明耳目強壮不衰益壽神驗用七月七日露水丸之更佳服之時乃呪曰神仙真藥體合自然服藥入腹天地同年呪訖服藥斷諸雜肉五辛最切忌謹之神仙服菊花延年不老方菊花三斤荏子三斤右常以九月九日辰時收採隂乾搗羅為末煉白松脂和丸如梧桐子大每服以温酒下二十丸日服三次令人長生神仙延年不老餌菊花方白菊白茯苓各一斤右搗羅為末每服三錢以温酒調下日三服乆服令人長生補五臟實下焦以藕實蒸熟食之與蜜同食令人腹臟肥不生諸蟲亦可休粮仙家有貯石蓮子及乾藕經千年者食之至妙矣神仙造金玊漿法以冬至日取葫蘆盛葱汁根莖埋於庭中到夏至發之盡為水以漬金玉銀赤石合三分自消以曝乾如飴可休粮服神仙亦曰金漿也道家煑石法用五加根莖漬灰以煑石食東華真人煑石經年云舜常登蒼梧山曰厥金玉之香草朔用偃息正道此五加也又異名金鹽昔西域真人玉屋山人王常言何以得長乆何不食石蓄金鹽毋何以得長壽何不食石用玉䜴玉䜴者即地榆也五加地榆皆是煑石而餌得長生之藥也主延年神仙術取蟾蜍膏軟玉如泥以苦酒消之成水飲之長生令人體潤仙方用桑椹熟時収之乾為末蜜和丸如梧桐子大空心酒服四十丸長服之良主養氣取生小薊根并葉搗取自然汁服一盞立佳服餌法抱朴子云千歲靈龜五色具焉其雄額上兩骨起似角以羊血浴之乃剔取其甲炙擣服方寸匕日三盡一具服餌法抱朴子云真珠徑寸已上服之可以長久酪漿漬之皆化為水銀亦可以浮石水蜂窠鱟化包蚺蛇黄合之可以引長三四尺丸服之絶糓得長生長生方以蟹化漆為水服之長生長生以水銀酒和日暴服之神仙服食地黄方採取地黄根净洗搗絞取汁煎令水稠内白蜜更煎令可丸晨朝酒下三十丸如梧桐子大日三亦入青州棗肉同丸又煎膏入乾根末丸服又四月採其實隂乾篩末水服錢七其效皆等身輕益陽道令人長生用大豆煑熟每服食後浄磨拭吞雞子初服時似身重一年後便覺身輕長生不老出本草方以玊泉服之玊泉者玉之泉液也服黄精耐老不飢方出本草方其法可取甕子去底釡上安置令得所盛黄精滿蜜盖蒸之令氣溜即暴之第二遍蒸之亦如此九蒸九暴凡生時有一石熟有三四斗蒸之若生則刺人咽喉暴使乾不爾朽壊其生者若初服只服一寸半漸漸増之十日不食能長服之止三尺五寸服三百日後晝見鬼神餌必昇天根葉花實皆可食之但相對者是不對者白偏精潤肌體令人肥健能食不老出本草方以乳穴中飲之亦取水作食釀酒大有益服桂方出本草方范蠡好食桂飲水討藥人世世見之又曰桂父象林人常服以桂皮葉用龜腦和服之服桂方出本草方桂可以合葱涕蒸作水亦可以竹瀝合餌之亦可以龜腦和而服之七年能歩行水上長生不死又云趙他子服桂二十年足下生毛日行五百里力舉千斤服食松花法出本草方以松花上黄粉拂取則湯㸃之仙方出本草方用三月三日採桃花服三樹桃花盡靣色如桃花抱朴子服黄精花方出本草方採黄精花十斛乾之可得五六斗服之二十年乃可得益且以斷糓天門冬飲右以天門冬苗俗人呼為􅁄刺以水煑作湯飲服之乃宜人令人不老出本草方七月七日採蓮花七分八月八日採根八分九月九日採實九分隂乾搗篩服方寸匕令人不老神仙服食方出本草方以四月桑茂時採葉又十月霜後三分二分已落時一分在者各神仙葉即採取與前葉同隂乾搗末丸散任服或煎以代茶飲長生不死出本草方以吉雲草食之延年愈百病出本草方取日照草木上霜皆五色者服之昔東方朔盛得五盒漢武帝以賜羣臣老者皆少病皆除小丹法出本草方拘魂制魄以柏子細篩去滓松脂十斤以和柏子雄黄各二斤色如赤李合藥臼中復搗如蒸藥一日如餌正坐北向平旦頓服五丸百日之後與神人交見造桂漿法出本草方夏月飲之解煩渇益氣消痰用桂末二大兩白蜜一斤以水二斗先煎取一斗待冷入新甆瓶中後下二物攪二三百轉令勻先以油單一重覆上加紙七重以䋲封之每日去紙一重七日開之藥成氣香味美格韻絶髙今人多作故并著其法抱朴子服生銀法出本草方以生銀麥漿化之亦可以朱草酒餌之亦可以龍骨錬之然日三服服輙大如彈子者俱不及金玉可為地仙也洞仙經文出本草方取大麻日中服子末三升東行茱茰根剉八升漬之平旦服之二升至夜蟲下要見鬼者取生麻子菖蒲鬼臼等分杵為丸彈子大每朝向日服一丸限滿百日即見鬼也三洞要錄云出本草方地榆草剉一升稻米一升白玊屑一升三物取白露汁二升置銅噐中煑米熟絞取汁玉屑化為水名曰玊液以藥内杯美醴中所謂神玉漿也變白輕身出本草方以枸把子二升十月上亥日採採時面東滴生地黄汁三升以好酒二升於甆瓶内浸二十一日取出研令地黄汁同浸攪之却以紙三重封其頭子更浸候至立春前三十日開瓶可逐日空心飲一杯至立春後髭􅁂變白補益精氣服之及老輕身無比服玉屑方出本草方玊屑服之與水餌之俱令人不死所以不及金者令人數數發熱似寒食散状也若服玊屑者宜十日輙一服雄黄丹砂各一刀圭散髮洗沐寒水迎風而行則不發熱也太極真人青精乾石䭀餃法出本草方以生白梗米一斛五斗更㫪治浙取一斛二斗南燭木葉五斤燥者用三斤亦可雜莖皮益加煑取汁極令清冷以潚米米釋炊之潚即搜字也今課其時月從四月生新葉至八月末色皆深九月至三月周宿色皆淺可随時進退其斤兩寧少勿多合採軟枝莖皮于石臼中搗碎假令四五日中作可用二斤熟㫪以斛二斗湯漬染得一斛以九斗淹斛二斗米比來爾用水漬一二宿不必随湯煑漬米令上可走蝦周時乃漉而炊之初漬米正作綠色既得蒸便如紺若一過汁漬不得好色亦可淘去更以新汁漬之洒濩皆用此石當今飯作正青色乃止向所餘汁一斗以共三過洒飯預作髙格暴令乾當三過蒸暴每一燥輙以青汁搜令浥浥耳目可服二升勿服血食亦以填胃補髄消滅三蟲服术法出本草方二月三月八月九月採乾亦可食用或合白茯苓或合石菖蒲並搗末旦日水調服晚再進乆乆彌佳又取生术去土水浸再三煎如飴糖酒調飲之更善服玊法出本草方玉元真餌之其命無極令人舉身輕飛不但地仙而已然其道遲成服一二百斤乃可知也玊可以烏米酒及地榆酒化之為水亦可以葱漿水消之為粒亦可餌以為丸可燒為粉服一年已上入水中不濡服五雲之法出本草方或以桂蔥水玉化之以為水或以露於鐵噐中以元水熬之為水或以消石合於筒中埋之為水或以蜜搜為酪或以秋露漬之百日韋囊挺以為粉或以無草樗血合餌之服之一年百病除三年老公成童子五年則役使鬼神入大水不濡踐棘而不傷膚與仙人相見他物埋之即朽著火即焦而五雲内猛火中經時終不焦埋之永不腐故能令人長生也服經十年雲氣常覆其上夫服其母以致其子理之自然也抱朴子餌雄黄法出本草方用雄黄蒸煑或以酒服或以消石化為水乃凝之或以猪胴褁蒸之於赤土下或以松脂和之或以三物煉之引之如布白如氷服之皆令人長生百病除三尸下瘢痕滅黒墮齒生千日玉女來侍可使鬼神又云玉女常以黄玉為誌大如黍米在鼻上是真玉女無此誌者鬼試人也神仙去三尸九蟲附論潁陽書曰人之腹中盡有三尸為人大害三尸者託隂氣以成靈感私欲而致用邪藴臟腑非天機清明至難沈濁者鮮不易其心矣欲生則三尸生欲滅則三尸滅故至人云欲者不欲不欲者欲反復自明之謂也成道之速者欲去三尸先外去色味名利内平喜怒愛惡寂然虛静尸乃無處潜留則遁迹而逝矣又曰每至夜半起端坐私誦妙靈名彭倨彭質彭矯七徧無令耳聞依守清净法動用消息之宜繼晝不睡甲子庚申守之亦爾則妙靈飛去心神凝定五方秀氣入於靈臺于童子童子者人神至精也精則成聖蕩則成愚是故聖人脩之以真行之以勤若能克己勵志不出三年其道成矣心生光明乆習彌廣南華謂之虚室生白秀發靈臺即布日積數并三元六甲本命算以次扣之乾坤六甲天人玉女獻五方色數于童子合于天地天地不違合于萬象萬象不却所求随意而應知來藏往出有入無不可得而名心有進綱退紀之法變竒乘除之數五音六律消息加減剖析神明天道隐故不言而行自彰𤣥門之能事長生之妙術盡於此矣又曰妙靈三尸也常以庚甲之夜上告天地記人罪過及人生籍令人早亡魂則升天魄入于泉唯上尸獨在地上遊行相承而為鬼􅑂或四時八節三牲祭禮不精輒與人作禍苦心痛注忤伐人生命上尸彭倨在人頭中専伐人眼故目暗面縐口臭齒疼脫落中尸彭質在人腹中伐人五臟令人少氣力多忘好惡事敢食衆生血肉或為惡夢驚恐不安汗流不止下尸彭矯在人足中令人下闗搔擾五情踴動不能自禁若三尸為祟則害于子孫傳注不絶如學道之人不先去尸蟲徒服良藥斷糓絶味勤于吐納以求長生終不可得將知至道須究其害每至庚申日其夜不寐守之至明若覺體重疲倦宜可少眠須令數覺此三尸蟲即不得上告天地太上科律云六月八日及庚申日夜北帝開諸罪門聴羣鬼物下詢訴訟其人罪滿五千則當死一守庚申三尸振伏七守庚申永絶乃得精神安宅骸室常存五神恬静不復搔擾迷亂每夜欲卧時扣齒三七通左手撫心呼三尸名三徧則不復為害又常以寅日去手爪甲午日去足爪甲年中七月十六日去手足爪甲燒之作灰和水服之三尸九蟲永自消滅又江南芸草香三尸所惡之草煎湯沐浴三尸自去矣又以三月四日取桃葉五升熟搗脫衣避風宻室中坐其上令氣入腹中從旦至暮尸蟲悉出但疾中􅓼難者莫過於癩次是癆痩一染後子孫相傳時呼𫝊尸欲斷此疾須禁絶三尸九蟲邪氣伏盡即入諸藥世人得此疾自言宿業甘心受斃豈不惑哉是故上士修徳以伏之中士守庚申以制之下士餌藥以除之方貫衆方神仙去九蟲方一曰蛔蟲状如長四寸令人腹鳴二曰長蟲亦名蚢蟲長一尺令人心痛三曰白蟲長一寸生子孫轉大或長至四五尺亦能殺人四曰肉蟲状如爛李令人煩懣五曰肺蟲状如蠶令人􅠲𠻳六曰胃蟲如蝦蟇令人嘔吐不喜七曰鬲蟲如𤓰瓣令人多睡八曰赤蟲生肉令人腹鳴九曰蟯蟲至㣲細状如菜子羣蟲之上也令人勞劇多則為癩病亦為人癰疽瘡疥瘻癬蚤風最宜服出聖恵方貫衆二兩一分去伏蟲白雚蘆三兩去蚢蟲蜀漆三分去白蟲蕪荑一兩一分去肉蟲雷丸一兩五錢去赤蟲白殭蠶一兩去鬲蟲石蠶一兩一分去蟯蟲厚朴一兩一分去肺蟲狼牙子一兩去胃蟲右並切熬令黄搗羅為末煉蜜和丸如梧桐子大粉漿服五丸日漸加至十丸經十五日積聚下六十日百病瘥婦女服之絶孕還生子服藥須先齋戒即尸蟲奔散神靈來輔矣又方出聖濟總錄青木香白㯽榔剉桂去粗皮各等分右麄搗篩每服三錢以水一盞煎至七分去滓温服真人去三尸方出聖濟總録狗􅆃去毛七兩乾漆二兩蕪荑三兩右同熬搗羅為末煉蜜和丸如梧桐子大每服七丸米飲下三七日三尸自去或下形如小兒收以綿帛褁之抛東流水哭之三聲呪曰汝是地鬼我是天仙急急如律令回歸易道慎勿反顧太上科儀以甲子日洒掃庭中以半夜放案案上安新汲水三杯一東一中一西燒降真白膠乳頭香至心北面三位檷拜郡郷里曾孫臣某稽首再拜長跪曰奉請上皇神人上皇真人北極三台君南斗北斗中斗東斗西斗君司命司録司非司危君中宫戊巳金紫金老君日元君三光四時五行五相尊神天師六甲父母願垂元感降臨坐席即伏存思諸神來降定訖乃起再拜曰諸神永降去身中三尸九蟲令臣某學道登仙長生度世伏受神㤙言訖長跪願諸神明日君月夫人乞賜神水降臣某頭中尸彭倨便取東杯水飲畢又言諸神明日君月夫人降臣某腹中尸彭質取中央杯水飲畢又言諸神明日君月夫人賜神水降臣某足中尸彭矯便取西杯水飲之飲畢再拜畢右廻入室寝當自有夢應見人啼泣謝去或不啼泣但謝而去者皆是騐也若無應即後甲子再拜為之應乃止夫覺與陽合寐與隂并覺多則魂強寐多則魄壮魂強為生之徒魄壮為死之路常須拘制之上魂名爽靈字浮逰中魂名胎光字合明下魂名幽精字黨形魂欲上天魄欲入泉魂魄還觀其道自然生随魂死随魄魂好外沈但虛心任氣五神無媱役自然神真契道大㣲靈書曰每月三日十三日二十三日夕三魂離其身當須攝之法去枕仰眠交足左壓右交手心上瞑目閉氣三息存心中赤氣和雞從心内出上咽中相次覺體小熱則呼三魂名叩齒㣲呼爽靈延年胎光益禄幽精絶死三呼訖即㣲呼叩齒三通曰太㣲元宫中黄始清内煉三魂三神交寧神寳玉室與我俱生不得妄動鍳者天靈若欲飛行唯詣上清欲不飢渇自飲玉津每月晦朔弦望七魄不守尤須作意制之叩齒七通一呼之女即十四通呼之尸荀伏矢雀隂天賊飛毒除穢魄師呼訖呪曰太上髙尊上皇至真萬神安顛七魂佩身不得越錯與惡為羣長居室後俱化成仙永守身形保我得真遊行上宫同為黄賓夏禹去三尸方出聖濟總録木香柏子香松香蘹香子各一兩右用木臼杵為末蜜丸甆噐収净室存神安住之處燒之合時向王方和之亦可服安神妙香丸出聖濟總録顛固腸胃不生飢渇守煉五蔵消滅九蟲綿永胎息丹砂五錢研如粉松脂三兩煉十次取一兩半鶴虱人參白茯苓去黒皮狗􅆃去毛貫衆研如粉各五錢蠟二兩蜜鍊乳香研如粉禹餘糧燒三度研如粉各一兩右各搗研為末取十五日合和先入蜜蠟松脂三味于銚子内化為汁和九味丸之如皂子大至誠祝曰願辟除榖氣嚥息冲和便用糯米一升杏仁二合去皮尖䨇仁細研白蠟一兩相和煑粥飽食一頓須㬰服大豆一合熟者仍服藥一丸得十八日續更服一丸得三十四箇月又服一丸即終身永無飢渇戒五辛色慾鹽醋等物若慮無力喫棗肉三七枚助之一月後更不服服時用乳香湯下渇即喫茯苓湯若要開食時喫葵菜湯一盞其藥自下收取用乳香水洗三五次於土坑内焙三七日留待再服轉加靈效開食時煑淡麫飯一小碗許合藥了用雲母粉収之金簡煎出聖濟總錄辟糓固氣却滅三尸消蕩九蟲安和五臟鎮守三田輕身強志拘魂制魄延永胎根乳香四兩牛乳一斗銀石噐中盛并乳香於重湯内煑旋旋燒牛乳汁以乳香化為度赤石脂半斤細研水飛過於紙箱内沙上滲乾入夾絹袋盛於飯上炊九次每次出焙乾又炊以飯熟為度丹砂四兩研水飛過紙箱内盛瀝乾秤蜜銀噐盛重湯内熬以絹袋濾過秤取四兩右將蜜分作九分每一分拌乳香等入新竹筒中盛大竹可三四枚盛了次用新桑白皮扎塞定筒中令宻以大黑豆夾水拌鋪在大甑底坐竹筒次又以豆夌盖覆過竹筒再盖覆如法慢火炊一日三四次添水炊至夜取出筒傾藥出以甆噐盛了入焙籠内火焙一夜或未乾又焙令極乾再取蜜一分拌藥令勻又以新桑白皮塞了再入水洒拌豆麥令勻又依前再炊一日如前用熱水洒三四次炊一日至夜依前取焙之如此九炊九焙放乾成煎每服抄一大匙許仍須先勻作一百二十服須先服藥牀如要服藥牀忌鹽醋如要治中風攤緩半身不遂口眼喎斜語澁神昏者分作一百四十服亦須先服藥牀住食藥牀方出聖濟總錄白茯苓去黑皮一兩大麥麵半斤桑根白皮三兩右同搗羅為末拌勻和作麵劑煑作碁子淡喫服此一斤四兩次服半月計麵一秤藥計六十兩充為藥牀半月後方得喫金簡煎金簡煎每用温酒調服如日内飢即得服酒一盞或兩盞如渇即飲一兩盞温水睡眠自在亡蟲丸出聖濟總録去三尸紫苑去苗上醋煑熟焙半斤射干一錢白龍骨半兩右先將紫苑搗末次搗射干白龍骨和勻為散每日服一錢七空心甘泉水調下念三尸名即尸亡矣廣福延齡丹出聖濟總錄去三尸潔腑臟鎮七魄明耳目丹砂研如粉雄黄研如粉人參白茯苓去黒皮各二兩白术乳香研細各四兩右各搗研為末和勻入銀噐中用白蜜和如稀膏以油單封口又以水和白麵褁噐物外厚兩指許每日于飯上炊候飯熟取下如此半月如藥乾更入蜜丸如梧桐子大空心温酒下二十丸忌羊血其功甚大神仙巨勝丸出聖濟總錄輕身壮陽却老還童去三尸下九蟲除萬病巨勝酒浸一宿九蒸九焙牛膝酒浸切焙巴㦸天去心天門冬去焙山芋熟地黄焙栁桂去麄皮酸棗仁覆盆子逺志去心兎絲子酒浸另搗焙乾菊花人參白茯苓去黒皮各一兩右㨂擇净搗羅為末煉蜜為丸如梧桐子大每日空心温酒下二十丸服一月身輕體健萬病不侵青丸子返童散出聖濟總錄輕身延年除百病去三尸天門冬去心焙人參白茯苓去黒皮麥門冬去心焙白菊花各六兩右搗羅為散每日温酒或米飲調下三錢匕不拘時候服之服三年覺身輕神仙雄黄丸出聖濟總錄去三尸百蟲美顔色明耳目雄黄松脂等分右擇雄黄如雞冠色不雜砂石者先搗研羅極細次以松脂和杵為丸如彈子大每旦以酒研下一丸服至十日腹中三尸百蟲自下面上紫黒皆除服及一月百病自瘥耳目聰明乆服致神仙二勿借與人衣服皮履損人藥力精氣常欲飛去常須净潔為佳神仙出三蟲方出聖恵方附子二兩炮製去皮臍蕪荑三升乾漆二兩搗碎炒令烟出右搗細羅為散每服一合空心以水調服日晚再服七日上尸九日中尸十二日下尸並出其形似人綿袋褁之送于東流水哭之祝曰子死屬地我當升天與子長隔易道而歸更勿囬顧三日之中當慎少語又方出聖恵方白茯苓十斤去皮晒乾搗羅為末商陸白者五斤削去皮細切與茯苓同用酒浸糯米麫五斤糯米五斗净淘炊為飯俟冷與上三味相和右等入水五斗並釀於瓮中封三七日藥成壓取汁别用黒豆熬搗羅為末煉蜜和丸如彈子大每日用藥汁一合化破一丸服之十日以後漸加如雞子黄大上尸百日中尸六十日下尸三十日悉皆爛出上黒名彭琚中青名彭瓆下白名彭矯此蟲與身俱生能興三業常欲人速死至晦朔旦伺人罪過上白天公上尸好車馬衣服中尸好五味飲食下尸好色欲三尸若去人皆不思不飢長生不老神仙去三尸方出聖恵方乾熟地黄三兩乾漆半兩搗碎炒令烟出桂心一兩右搗羅為末煉蜜和丸如梧桐子大飯後水服七丸以知為度十日三尸盡出矣神仙去三尸方出聖恵方用硃砂五兩細研水飛過以好酒五合漬之五宿出暴乾候可丸即丸如麻子大每服十丸水下日三至十日諸蟲悉下若有病癩皆愈神仙去三尸方出聖恵方丹砂一斤細研水飛過淳漆二升醋一升右相和入於鐺中㣲火煎令可丸即丸如麻子大每日早辰以净水下五丸三十日百病愈三尸去服之百日肌骨強服之千日司命削去死籍與天地相保改形易體變化無常日中無影去三蟲丸方出千金方用生地黄汁三斗東向竈葦火煎三沸内清漆二升以荆匕攪之日移一尺内直丹三兩復移一尺内𤓰子末三升復移一尺内大黄末三兩㣲火勿令焦候可丸丸如梧桐子大先服一丸日三濁血下鼻中三十日諸蟲皆下五十日百病愈面色有光澤又方出千金方漆半斤大黄六兩末酒一升半蕪菁子三升末右以㣲火合煎令可丸丸如梧桐子大先日服三丸十日濁血下出鼻中三十日蟲皆爛下五十日身光澤一年行及奔馬消息四體安稳乃可服草藥其餘法在三蟲篇偹述神仙去三尸方出聖恵方三月三日取桃葉絞汁一升以醋一合同煎取五合平旦分温二服神仙治百疾去三蟲耳目聰明方出聖恵方用槐子仁不限多少搗令爛丸如酸棗大每服十丸水下日三服長服神仙神仙去三尸方出聖恵方用商陸白者二十斤削去皮以酒漬煎之令爛隂乾搗細羅為末每服二錢以酒調食後服之日三服三百日尸大如手出取埋之祝曰伏尸當入地我身屬天復去勿顧視服藥忌食犬肉生魚合藥以正月五日七日良諸仙藥當先去尸尸去作法後始神仙通神長生法出本草方抱朴子内篇云淳漆不枯者服之通神長生或以大蠏投其中或以雲母水或以玉水合之服九蟲悉下惡血從鼻出一年六甲行厨至也陶隐居云生漆毒烈人以雞子和服之去蟲用蠏消之為水煉服能長生服漆葉方出本草方華佗傳云彭城樊阿少師事佗求服食法佗授以漆葉方服之去三蟲利五臟輕身益氣使人頭不白阿從其言年五百餘歲漆葉所在有之青黏生豐沛彭城及朝歌一名地節一名黄芝主理五臟益精氣神仙辟糓附論人以胃氣為本水榖所以致養山林之士乃有休粮辟榖者其說悉本神農之書究其性味非養氣而輕身則必堅重而却老神仙之術有出乎此理或然也方真人辟榖雲母丸出聖濟總錄雲母粉大豆黄白茯苓去黑皮松脂鍊巨勝湯脫皮蒸蠟煉各一斤椒去目及閉口者炒出汗十兩右搗研五味為末煉松脂并蠟蜜和劑初服如彈丸大温酒下日再服辟榖丹砂丸出聖濟總錄丹砂研水飛過白蠟各斤右先細切白蠟銅噐煑清酒令沸投蠟於酒中候蠟消置噐于冷水中蠟凝復將丹砂末投於酒蠟中拌和令勻再置于銅噐中用栁木箆子不住手攪勿令火猛候煎成膏取出放於不津甆噐中可丸即丸如梧桐子大每服十丸温水下每一服得三七日不飢又一服一月不飢再一服得一百日不飢從此三服已後每百日一服如服藥後覺渴飲冷水一盞服至周嵗已外自覺身輕體健延年盡老即不飢矣如欲飲食之時先煑淡葵菜喫一次然後每日依常飲食無碍辟榖凝靈膏一名神仙茯苓膏出危氏方若欲絶食頓服令飽即得絶之乆服輕身明目不老復壮髪白更黑齒落重生延年益壽茯苓一十八斤為細末松脂一十二斤松子仁六斤為末柏子仁六斤為末右先取白蜜七斗内於銅噐中㣲火煎一日一夜次下外三末攪令勻㣲火再煎七日七夜取出每服如雞子大一丸温酒下後十日再服一雞子大三十日更服一雞子大滿四劑當得延年不老若治癩病加石硫黄石膽末各半兩忌食米醋辟榖木耳丸出聖濟總錄木耳搗末大豆炒熟搗末各八兩大棗煑熟去皮核研一升右煉蜜丸如雞卵大有食日服一丸無食日服二丸逢食即食無食亦不飢矣辟糓松蠟丸出聖濟總錄松脂煉一斤十二兩白蠟一斤四兩酥半斤蜜一斤四兩白茯苓去黒皮搗末十兩右先取松脂白蠟酥蜜四味入甆噐内盛宻封坐於二斗黍米甑内同蒸候米熟取出茯苓末以杖攪和之再宻封如前經五日即開搗和丸如梧桐子大每服五丸酒下早辰近晚服十日後即服一丸若飢加至二丸三丸服此藥時不得食一切物服盡即不食亦可延年辟榖金花丸出聖濟總錄金箔雄黄油煎九日九夜研如粉丹砂研如粉水飛取浮者暴乾白茯苓去黑皮水淘取浮者暴乾搗末各一錢右用白膠香二兩入少酒煎如稀餳汁和之搗一千二百杵如菉豆大合時不得見雞犬婦人孝子每服温酒下一丸三七日不飢又服一丸百日不飢從此以後每一百日一丸服時前三四日須先喫淡麫食至平旦日未出時取一粒面東服訖連嚥十下叩齒三十六通若此後欲食即食少果子通腸不食即已不得食水果子等永不飢矣辟榖延年天門冬丸出聖濟總錄天門冬去心白茯苓去黒皮白蠟白蜜白羊脂去膜各一斤右先搗羅天門冬茯苓二味為末次以清酒五升入大鐺中煎三沸内羊脂煎三五沸又内蜜并蠟煎五沸掠去沫次入天門冬伏苓末用栁木箆不住手攪令勻火不令猛候煎成膏可丸乃丸如櫻桃大又取大杏仁一升湯浸去皮尖䨇仁研如膏傾入凈通油瓮内坐慢灰火中内前藥丸子于杏仁膏養令色白即取離火每服三丸空腹温酒下辟榖稻米杏仁方出聖濟總錄稻米三斗水浸一宿暴乾杏仁三升湯去皮尖䨇仁細研水三升浸一復時澄去滓右以杏仁汁浸米一宿炊之暴乾又浸盡汁乃止搗為末每服一升十日後三日服一升一月後十日服一升即不飢矣辟榖青梁米石脂丸青梁米一斗赤石脂三升為末右以水浸令相和置温處三二日上生衣乃取搗丸如李子大日服三丸即不飢矣如渇當以少水飲之可以逺行又云白籼米九蒸九暴可辟榖糧辟榖五榖方粳米黍米小麥麻子熬大豆黄各五合右搗末以白蜜一斤煎一沸去沫和拌為丸如李子大每服一丸冷水下即不飢矣辟榖山精餅术一斛净刮去皮洗攤令浥浥細剉黍米一斗五升飴五斤同搗碎用水三斛先内术于大釡中次入水一斛五斗文武火煑之水耗旋添盡三斛煑至二日二夜絞去滓取汁用黍米一斗五升净淘空令浥浥先納汁在釡中次入米煑至六七沸又下飴五斤㣲火煎至三斗乃熟取出置案上暴乾拌作餅子四方斷之合如梳大隂乾每日食三餅輕身益壽辟榖山精丸术一斗净刮去皮洗控令浥浥細剉清酒二升白蜜一升阿膠四兩右搗碎以清酒三升净甕中浸之一日一夜絞去滓内銅噐中入釡以重湯煑之又入白蜜一斤阿膠四兩煎之攪令相得候如膏即丸如彈子大放乾盛不津噐中每服一丸細嚼酒下日三服乆服體光澤百病除輕身延年辟榖仙术丸术一斗净刮去皮洗令控浥浥細剉清酒五斗大豆黄炒天門冬各一斗右搗碎内净瓮中水二斛浸一宿取出内大釡中煑令减半加清酒五斗煑至一斗絞去滓再内釡中㣲火煎之又入炒大豆黄天門冬末各二斗更煎攪和令勻候如膏丸如彈子大放乾盛不津噐中每服三丸細嚼温水飲日三服乆服耐風寒延年不老辟榖棗术丸术一斛净刮去皮洗控令浥浥細剉白蜜六斤四兩松脂粉二斤半棗膏二斤半右搗碎以水一石五斗内釡中煑之稍益水至三石煑至三斗絞去渣却内銅噐中入白蜜六斤四兩成鍊松脂粉二斤半棗膏二斤半文火煎之攪和令勻候如膏丸如彈子大放乾盛不津噐中每服三丸含化嚥之日三服乆服則長生不老辟榖仙术茯苓丸术五斤净刮去皮洗控令浥浥細剉白茯苓三斤去黒皮搗末右先將术搗碎以水三斗内釡中煑之至五升絞去滓加茯苓末攪和令勻如膏丸如彈子大放不津甆噐中每服一丸細嚼温酒下日三服乆服活血駐顔耐風寒延年不老辟榖駐顔秘妙方白茯苓三斤搗為粉以生絹袋盛於水盆中漬之候水清取粉暴乾栗黄三斤㬠乾搗羅為末胡麻五斤九蒸九暴除去皮取三斤末右取青州棗三斗以水五斗於大釡中先煑令熟爛去皮核以布袋絞取瓤却於煑棗水内慢火熬令稠候冷入諸藥為膏每日空心及晚各服一合酒調下亦得此是神仙所服切在秘宻勿𫝊非其人其功不可具述忌食米醋辟榖白术丸白术三斤搗為細末生黄精三斗洗浄控乾搗碎絞取汁蜜一斤右先將黄精汁一味于釡中用文武火煎熬取汁三升再入蜜一斤并將前白术末却内汁中煎成膏丸如彈子大令乾盛不津噐中每服三丸含化嚥之日三服寧少服令有常不須多而中輟渇則飲水乆服絶榖輕身長生不老辟榖黄精地黄丸生黄精一斗洗浄控乾搗碎絞取汁生地黄三斗洗浄控乾搗碎絞取汁右汁合和内釡中文武火煎减半入白蜜五斤攪勻更煎成膏停冷丸如彈子大放乾盛不津噐中每服一丸含化嚥之日三服乆服長生靣如童子治卒絶糧飢憊欲死凡修行家忽到深山無人之地或堕澗谷深井之中無食者便應嚥津飲水服氣以代之淮南王辟榖登仙秘要方出聖恵方療飢治風明目變白治痩病益心力乆服令人肌健日誦萬言日行千里服之百日與天地齊畢矣仙菁元實子五升即蔓青子是以水煑令苦汁盡搗羅為末木脂珠二升即是乾棗以水煑令熟去皮核用肉右相和熟搗丸如雞子黄大曝乾每服三丸嚼爛嚥之日三服百無所忌又方出聖惠方用蔓青子一升以水三升急火煑數去上黄水嘗子甜水美為度此藥熬服即熱不熬即冷但空腹水服三錢亦得不飢若以枸把根少許同煑即無所忌如渇要飲水茶湯一切無慮不能頓斷榖食即與粥飯同喫即漸漸自斷矣真人絶粒長生方出聖恵方漢椒五兩去目及閉口者㣲炒去汁巨勝子五升右九蒸九暴巨勝子訖去黑皮搗羅為末次搗羅椒為末二味相和令勻煉蜜和丸如梧桐子大每服三十丸以冷水下日三服自不飢渇乆服長生神仙絶榖方出聖恵方白蜜五兩白蠟半斤黄丹二兩右先鎔蜜蠟於鐺中乃内黄丹相和令勻漸漸煎之可丸即丸如梧桐子大每服水下五丸日三服一年後身輕益氣自然不飢合藥惟獨在幽室勿使人見之神驗神仙絶榖方出聖恵方禹餘糧五兩赤石脂二兩白石脂二兩硃砂一兩細研水飛過右都研極細以棗穰和丸如梧桐子大每服以温水下五十丸日三服神仙絶榖方出聖恵方赤石脂六兩白芍藥二兩天門冬四兩去心焙葳蕤二兩白茯苓二兩澤㵼二兩右搗羅為末煉蜜和丸如梧桐子大每服以蜜湯或茯苓湯下五十丸日三服漸自不飢沈建神仙絶榖方出聖恵方朱砂一兩細研水飛過白茯苓一斤川芒硝半兩蠟五兩右都入臼搗三萬杵入鍊了蜜和丸如彈子大頓服九丸絶榖常服即一日一丸酒化破服之漸漸不飢又方出聖恵方黒豆四升炒去皮大麻子四升熬令香右搗細羅為散每服一合水調服之日三服十日後斷榖冬不寒夏不熱顔色光澤氣力百倍走及奔馬文始先生絶榖方出聖恵方雄黄半兩細研禹餘粮白礬燒灰雲母粉各一兩麥門冬一兩半去心焙右搗羅為末鍊蜜和搗一千杵丸如梧桐子大欲服藥先作牛羊肉羮稻米飯飽食明旦服三十丸以井華水下之可終身不飢矣神仙絶榖方出聖恵方用白茯苓七斤剉碎酒漬之三日曝乾搗羅為末以棗三斗釡中煑令爛熟經宿更以湯淋瀝棗取汁置釡中下茯苓㣲火煎之可丸即丸如雞子黄大空心及晚食以酒下一丸乆服不飢骨堅髄滿腸化為筋男子年三十以上皆可服之可渉遠有力日行千里忌食米醋又方出聖恵方用黄蠟一斤内銅噐中㣲火鎔之内蒲黄一斤攪令相得於重湯上煑候可丸即丸如彈子大每服以酒嚼下五丸加至十丸令百日不飢若覺腹中藥去更服十丸若欲食榖者可作肥猪肉羮飽食之藥便下合藥當用旺相以滿日服之為良辟榖絶食出儒門事親書大豆五升淘浄蒸三遍去皮為細末大麻子五升湯浸一宿漉出蒸三遍令口開去皮為細末糯米五升淘浄共白茯苓一處蒸熟白茯苓五兩去皮同上糯米一處蒸熟為用右將麻仁末一處搗爛如泥漸入豆黄末同和令勻便如拳大再入甑蒸從初更着火至夜半住火至寅時出甑午時晒乾搗為末服之以飽為度不得喫一切物用附子汁一第一頓一月不飢第二頓四十日不飢第三頓一千日不飢第四頓永不飢顔形日増氣力加倍飲麻仁汁轉更不渇滋潤五臟若待喫食時分用葵菜子三合為末煎湯放冷服之取其藥如後初間喫三五日白米稀粥湯少少喫三日後諸般食飯無所避忌此藥大忌慾事茯苓餅子出儒門事親書白茯苓四兩為末頭白麵二兩右同調成煎餅麵稀稠以黄蠟代油煿成煎餅蠟可用三兩飽食一頓便絶食至三日覺難受氣力漸生熟果芝麻湯米飲凉水㣲用些小以潤腸胃無令涸渇開食時用葵菜湯并米飲稀粥少少服之保命丹出儒門事親書人參五兩麻子仁二兩去皮乾地黄𤓰蔞子炒大豆黄一升煑去沫兎絲子酒浸已上各二兩生地黄乾大棗各三兩黒附子一兩生用二兩炮去皮白茯苓茯神地骨皮去麄皮蔓精子煑熟杏仁去皮尖煎麥門冬炒去心用地膚子蒸七遍黍米作粉粳米作粉白糯米作粉天門冬去心車前子蒸側柏葉煑二遍已上各二兩半右同為細末各㨂選精粹者臘月内合者妙他時不可日月交蝕不可合如合時須揀好日净室焚香志心脩合勿令雞犬婦人見又將藥末同蠟一斤半濾去滓白蜜一斤共二斤半一處鎔開和勻入臼中杵二千下㣲火酥油丸如梧桐子大每服十丸服至五日如來日服藥隔宿先喫糯米一頓粳米白麵皆可次日空心用糯米粥飲送下如路行人服遇好食喫不妨要止便止如喫些小蒸餅爛嚼嚥或乾果子以助藥力不喫更妙忌鹽醋日後退下藥來於長流水中洗净再服可百年不飢辟榖方出射後方若遇荒年糓貴無力以充粮應須藥濟命者用粳米一斗酒三升浸之出曝之又漬酒止出稍食之渇飲之辟三十日足一斛三升辟周年又方用麻子一升白羊脂七兩蠟一兩白蜜一合和杵蒸食不飢絶榖升仙不食方一名松子丸出聖恵方益精補腦乆服延年不老百嵗以上顔色更少令人身輕悅澤松實去皮菊花等分右搗末以煉了松脂和丸如梧桐子大或煉蜜和丸每服十丸酒下日三服可至二十丸亦可作散服兩錢七空腹日午近晚服神效神仙凝雪膏方出聖恵方白茯苓三十六斤剉水煑一日松子仁十二斤松脂二十四斤鍊了者右搗羅為末以白蜜二石四升内銅噐釡中㣲火煎之一日一夜次第下藥攪令相得㣲火養之七日七夜止可丸即丸如櫻桃大食前酒服七丸日三服若欲絶榖頓服取飽即不飢輕身明目老者還少乆服成仙矣忌食米醋物巨勝丸出聖恵方神仙延年輕身巨勝一斗二升去黒皮白茯苓半斤澤㵼二兩右搗細羅為散每服一合水調服之日二服令人輕身長生乆服絶榖神仙服苣勝絶榖不食方出聖恵方令人顔色悅澤氣力百倍時人命盡我獨身存秋冬不寒春夏不熱百病立愈可得神仙巨勝二斗黒豆五升炒去黒皮右搗細羅為散每服五錢以漿水調下日三服無所忌亦可鍊蜜和丸如彈子大每服一丸以漿水化破服之日三服漸自不飢顔色美好若渇但飲水勿食他物若食他物即便飢矣真人絶榖餌苣勝方出聖恵方除痺益精補髄壯氣力用苣勝一石揀擇令浄上甑蒸令氣遍出曝令乾如此九遍搗羅為末煉蜜和丸如彈子大每服一丸以温酒化破服之日三服食榖者自然斷之百日病愈水洗不着身服之一年玉女侍衛一石苣勝加茯苓二斤合搗羅為末蜜和如上法服得力益甚漸自不渇不飢神仙秘之神仙服芍藥絶榖方出聖恵方大豆五斗淘净入甑熟炊三次大麻子三斗湯浸一宿漉出亦蒸三次晒乾後焙過便以輕圓木杖簳破篩取仁用之右件先將大豆為末以下麻仁搗令勻圓如拳大再入甑内從初更着火蒸至半夜子時住火寅時出甑午時晒杵為末服至以飽為度不得食一切物第一頓七日不飢第二頓四十九日不飢第三頓一百日不飢第四頓二千四百日不飢不問貴賤老少依法服食令耳目聰明氣體強壮容貌日増永不憔悴如渇即研大麻子漿飲轉滋臟腑若要開食用葵菜子三合杵末煎之冷服取下元藥如金色任食諸物並無所損冬不寒夏不熱顔色光澤氣力百倍走及奔馬一方有青州大棗若遇荒年榖貴無以充粮應湏藥濟命者出肘後方取稻米一斗淘沐之百蒸百曝搗日一飡以水得三十日都止則可終身不食日行三百里防飢備急固胃神方出衛生家寳方得之於圓通石壁間炒黒豆三十粒嚼至半爛繼以青松毛一把咀嚼自然物類相感津潤無滓人乆食稀膳初服似乎不喜五七頓後氣味甘香平定軍在大行山中心若遺火飢饉相及又失耕種死者十七八王屋隐者教山中人此法全活甚衆有病腰脚者服之即愈乆餌氣健不衰有益無損如要飲食不妨若無食服服並無悔又如渇飲少冷水熱湯易飢此方乃真人秘法愍念羣生遭飢饉厄運故傳世間此方至簡至易二藥在處皆有凶年荒歳可廣其傳妙香丸出余居士選竒方休粮絶食白膠香乳香硃砂雄黄蠟茯苓等分右搗為細末煉蜜為丸如彈子大臨服之時飽食麵一腹然後服此藥可永停食身輕力健氣血愈壯避難渇食方出余居士選竒方白麵六兩黄蠟三兩白膠香右件將麵冷水煉令熟如打麵一同然後為丸如黒豆大用日晒乾再將蠟鎔成汁了將丸子投入内打令勻候冷彈子裹收在浄處如服時每日早辰空心可服三五十丸冷水嚥下不得熱食如要物食任意不妨絶榖升仙不食法出肘後方取松實搗為膏酒調下三錢日三則不飢渇飲水勿食他物百日身輕日行五百里抱朴子云出肘後方漢成帝時獵者於終南山見一人無衣服身皆生黒毛跳坑越澗如飛乃宻伺其所在合圍取得乃是一婦人問之言我是秦之宫人東賊至秦王出奔驚走入山飢無所食廹欲餓死有一老公教我喫松柏葉實初時苦澁後稍便喫遂不復飢冬不寒夏不熱此女是秦人至成帝時三百餘載也神仙辟榖法右以胡麻白大豆棗三物九蒸九曝作丸食令人不飢延年斷榖神仙辟榖法出聖便良方松脂研杏仁去皮尖炒為末棗肉焙乾為末茯苓去皮為末蠟溶和藥末右五件等分合成丸如梧桐子大食後飲服五十丸便不飢功用甚多榖子煎法出十便良方取赤熟榖子絞汁煎如稠飴可用和丹砂如無榖子榖皮濃汁亦可丹砂忌一切魚肉陳宿生冷蒜尤忌生血物及見生血物主不飢令健行出本草方以鈎栗子食之不飢耐寒出本草方取蕢麻汁煑粥食之令人不飢出本草方以蓮子肉去心為末蠟蜜和丸日服二十丸潤五臟長年不飢出本草方用甘露水飲之延年不飢出本草方用繁露水作盤收之煎令稠食之是秋露繁濃時輕身不飢方出本草方取黄精根食之昔臨川有士人虐所使婢婢乃逃入山中乆之見野草枝葉可愛即㧞取根葉食之甚美自是常食乆而遂不飢輕健夜息大樹下聞草中動以為虎懼而上樹避之及曉下平地其身歘然凌空而去或自一峯之頂若飛鳥焉數嵗其家人採薪見之告其主使捕之不得一日遇絶壁下以網三面圍之俄然騰上山頂其主異之或曰此婢安有仙骨不過靈藥服食遂以酒饌五味香美置往來之路觀其食否果來食訖遂不能逺去擒之具述其故指所食之草即黄精也不飢方出本草方以术食之抱朴子云南陽文氏值亂逃重山中飢困欲死有一人教之食术遂不飢數十年乃還郷里顔色更少氣力轉勝輕身斷糓出本草方以桃膠用桑灰漬之服身輕有光明在晦夜之地數月斷榖斷榖長生出本草方以胡麻九蒸九曝熬搗餌之斷榖充飢令人不飢出本草方用青梁米以純苦酒一斗漬之三日出百蒸百曝好褁藏之逺行一飡十日不飢重飡四百九十日不飢止飢出本草方以天門冬蒸剝去心皮食之甚甘美仙家斷榖方出本草方用芡實蒸作粉蜜和食之可休粮絶榖長生出本草方以救窮草食之止飢方出本草方以旋花根食之不飢令人不飢出本草方主荒年食之取牛妳藤中粉食之如葛根斷糓出本草方以松葉細切如粟以水及麵飲服之厚腸胃令人不飢出本草方以鳬欠化粉食之令人不飢出本草方以狼尾草子作黍食之令人不飢耐老益氣出本草方以麻子二升大豆一升熬令香搗末蜜丸日二服斷榖方出本草方取檀樹皮和榆白皮食之不飢神仙辟榖法立春後有庚子日温蔓菁汁合家大小並服不限多少可理時疾辟暑方出聖惠方雄黄白石脂磁石曲灘中石丹砂右等分各研水飛過候乾同研令勻以煉成白松脂和丸如梧桐子大每日空心以温水下五丸服六十日後夏月可以衣裘欲不畏寒方用天門冬茯苓等分為末服方寸匕日再服大寒單衣汗出普濟方卷二百六十四
