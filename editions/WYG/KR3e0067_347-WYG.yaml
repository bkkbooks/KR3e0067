body:
  text: 普濟方卷三百四十七明周王朱橚撰産後諸疾門吹乳附論夫産後吹妳者因兒喫乳之次兒忽自睡呼氣不通乳不時洩蓄積在内遂成腫硬壅閉乳道津液不通腐結疼痛亦有不痒不痛腫硬如石名曰吹妳若不急治腫甚成癰産後吹妳最冝急治不爾結癰漸至死者速與服皂角散栝蔞散傅以天南星散以手揉之則散矣大全良方總論云産後乳汁自出蓋是身虚所至冝服補藥以止之若乳後脹滿急痛者温帛熨之産經有是論却無方以治之若有此證但以漏蘆散亦可亦有未産前乳汁自出者謂之乳泣生子多不育經書未曾論及方漏蘆湯出瘡科精要治婦人吹妳初覺漏蘆楝實大黄黄芩芍藥甘草各半兩右為末毎服三錢水一盞半燈草三十莖同煎至一盞去滓温服無時治吹妳出瘡科精要及一切惡瘡初覺一二日立效𤓰蔞一箇去皮生姜一兩去皮大黄半兩甘草半兩右共搗作一塊以米半碗同煎至七分去滓入沒藥乳香末共二錢半通一服鯪鯉甲散一名通利散治吹乳癰疼痛不可忍者出聖惠方鯪鯉甲一兩炙黄又名穿山甲木通一兩自然銅半錢生用右搗羅為散温酒下一錢不拘時服治婦人吹妳出聖惠方馬明退五錢燒灰輕粉三錢麝香少許右為細末每服二錢熱酒調下服之栝蔞散出永類鈐方治産後吹妳腫硬疼痛欲結癰輕則為吹妳妬乳重則為乳癰乳香一錢半栝蔞根末一兩右研令匀温酒調二錢服一方天南星末温湯調塗之治婦人吹奶痛不可忍出瑞竹堂䑕糞五十粒麝香一字右為細末食後用熱酒一盞調服立愈一方雄鼠糞兩頭尖者昔劉汝翼治一屠户妻立効但不令病人知恐不肯服二消散治吹奶烏鰂骨朴硝各等分右為細末用葦筒兒盛藥吹入鼻中仍令人用藥末傅腫痛處徐徐消去立効治吹奶腫痛出海上名方右用胡桃二箇大者取皮細嚼以熱酒二盞送下二服立効一方連皮燒存性為末調下治乳癰吹奶結實疼痛出危氏方右陳皮一兩甘草一錢水二碗煎一碗分二次服次用荆芥𦍑活獨活煎湯薰之溫則洗之即安連翹消毒飲出經驗良方右用連翹三錢牛旁子防風荆芥穂各一錢甘草一錢並為粗末每服四錢水一盞半煎七分去滓食後服甜蔞實内子毎一箇取四分之研碎入藥又方出經驗良方右以生甜蔞去殻取子同生姜一小塊研匀炒酒隨意服治吹奶出永類鈐方右用皂角刺燒灰蚌蛤粉乳香少許並為細末熱酒調服手揉散即可一方無乳香吹乳奶方右小車耳上油脂垢丸雞頭大毎服加一丸一日三服一日加一丸七日自消八日濃自出有大効治吹奶右用甜菜根酒一碗水一碗葱三根同煎至八分服之立効勝金丹出衞生寶鑑治婦人吹奶立有効百齒霜今梳上髪之垢也右一味不拘多少用無根水為丸桐子大毎服三丸倒流水送下食後令病左乳者左卧右乳者右卧於溫處汗出愈用新水傾於屋上接之乃倒流水也葡萄酒治吹乳右单用葡萄一枚於燈熖上燎過研細熱酒調服治婦人患吹乳導經散右用皂角十挺剉細火内燒過煙盡黑色為末次入乳香沒藥令匀每服二錢溫酒調下白丁香散治婦人吹乳初覺身熱及胷乳腫硬是其候也服之能令下乳汁通其血脉立能自消矣右用白丁香直者研細每服二錢酒調服腫硬者服之立消甚者不過三服治吹奶不痒不痛腫硬如茄右以青橘皮三兩湯浸去瓤焙為末非時溫酒下二錢匕治吹妳右以水調麫煮如糊欲服即投無灰酒一盞共攪之極熱令如稀米粥可飲即熱喫令人徐徐按之藥行即散也治吹妳惡寒壯熱右以牝猪肋脂冷水浸搨妳上立効治小兒吹妳疼痛腫欲作急疼方右取蛇蜕皮一尺寸尺燒令黑細研以好酒一盞㣲煖頓服未甚較煎服消毒飲右用連翹三錢黄𤓰蔞仁三十粒搥碎每服四錢水一盞半煎食後溫服之治吹妳有時發動脅痛如打右以六月七月取地膚子乾末酒服方寸七日五六服治婦人吹妳右以淘米木杓中砂子七粒酒下以洗箒枝透乳孔連翹散治吹妳因兒鼻中氣吹着妳房便遍體熱結聚或如桃李核疼痛者冝服此消之即免作膿連翹一兩半犀角屑一兩川大黄一兩半剉碎微炒川升麻一兩木通一兩剉黄耆一兩剉黄芩一兩川芒硝二兩赤芍藥一兩右為散每服三錢以水一中盞入淡竹葉二七片煎至六分去滓不計時候温服治吹妳右用常使木杓柄上尖燒灰存性傅之吹妳乳香散治婦人吹妳增寒發熱堅硬腫痛未成膿者服之即消白丁香揀直者半兩乳香三錢右件二味同研極細分作三服好酒調下食後併進三服立消穿山甲丸治吹妳腫硬疼痛日夜不歇穿山甲燒灰猪牙皂角燒灰王不留行皂莢針炙㣲黄自然銅研細蟬殻蛤粉胡桃瓤燒灰各半兩右為末以車脂和丸梧桐子大不計時候以熱酒下二十丸治吹妳方槐花三分蛤粉三合麝香一分細研右為細散不計時候以熱酒調下一錢露蜂房散治吹妳疼痛不止或時寒熱露蜂房一兩鹿角一兩右並燒為灰細硏不計時候以熱酒調下二錢又方用葛布五尺燒灰細研為散不計時候以熱酒調下二錢毎日三服又方烏蛇二兩酒浸去皮骨炙㣲黄穿山甲一兩炙黄焦右為細散不計時候以熱酒調下一錢又方蔓荆子一合炒黄搗末車脂一兩右以麫糊和丸如菉豆大不計時候以温酒調下十丸又方桑螵蛸三枚燒令斷煙皂莢一寸去黒皮塗酥炙㣲黄去子右藥搗為末用酒一中盞煎至六分去滓温服又方出聖惠方狗糞中骨燒灰半兩麝香一錢右同研令細不計時候以熱酒調下一錢蛤粉丸出聖惠方治吹妳不痒不痛硬腫如石右用蛤粉半兩車脂和丸如小豆大每服温酒送下二十丸不過三服差又方出聖惠方右用龍骨一兩細研為散每服以熱葱酒調下一錢日三四服又方出聖恵方右以無子皂莢刺一斤㸃火燒候着撒蔓荆子四兩在内待總為灰即細研毎服以熱酒調下二錢服了便按三二十下不過再服効又方出聖恵方右以胡桃燒令煙盡去皮毎一顆胡桃瓤用金一片同研以熱酒服服了以手漸按乳上令消如有頭即外破如無頭即内消日三五度服之以得効為度又方出聖恵方右用半夏一兩湯洗七徧去滑搗羅為散以生姜汁一匙和酒一小盞調下一錢又方出聖恵方右以青蒿末二錢醋漿水一大盞煎五六分放溫頓服相次服熱酒一盞即差又方出聖惠方雀糞一十枚丁香三枚末右同研如粉以熱酒調服之治産後乳汁多無故流出待其乳汁冷然後喫此方出䕶命方當歸五味子續斷白术萆薢各半兩細辛官桂人參杜仲防風炙艾葉蓯蓉川芎各一分川椒三銖右為細末煉蜜丸如桐子大空心鹽湯鹽酒任下三十丸喫至半月後自然安効平復如故也亦可喫金液丹治産後乳汁多其乳汁無故自流出喉中乾非時渴不輟思飲湯冝服此方病皆由虚冷所致但色黄痩喫食減少忽未經數月後行脉氣㣲弱即喫此方但世多以喉乾悞下凉藥蓋浮汁無故流出則其喉乾并渴從可知也出䕶命方舶上黄細研當歸各一兩石斛艾葉五味子白芷牡蠣火煆川芎山茰各半兩防風藁本茯苓荳蔻呉茱茰各一分右為細末煉蜜丸如梧桐子大早朝空心鹽湯送下五十丸消毒紅玉膏出德生堂治吹乳腫疼寒水石煆二兩黄丹炒半兩右為細末新凉水調塗兩乳腫處日換二三次即可消腫治吹妳出華佗中藏經水茸角不拘多少瓦上焙乾右為細末酒調服二錢匕次日即愈如已破者畧有黄水亦效水茸角状如腰帶作小窠子生三四月間開小黄花葉如夜合葉六七月採兩浙呼為合萌皂角膏出楊氏家藏方治吹妳腫痛皂角不拘多少右用河水揉濃汁去滓􅆈成膏塗即愈樺皮散海岱居士秘方治吹妳樺皮手指大一方皂角子七個右二味燒成灰好酒空心調服治吹妳出危氏方右用鱉甲生為末酒下二錢治吹妳出本草右用户垠下土和雄雀糞暖酒服方寸匕治吹妳右取不患病人妳中汁一茶匙多令飲訖卧患一邊良久即安又方右用生姜自然汁調蚌粉塗之留妳頭不塗産後乳結核夫産後乳結核者以氣血虚弱邪摶之乳脉凝滯故結為核日久不差藴積生熱甚則腫甚則成癰也方枳殻湯治産後乳結核或成癰腫發熱疼痛枳殻去瓤麩炒芍藥人參黄耆剉木通剉當歸切焙桂去粗皮蒺藜子炒去角雞骨醋炙大黄剉炒各一兩右粗搗篩每服二錢水一盞煎七分去滓温服不拘時當歸散治産後乳結核堅硬疼痛當歸切焙芍藥黄耆剉蒺藜炒去角雞骨炙附子炮製去皮臍枳實去瓤麩炒各二兩桂去粗皮薏苡仁人參各一兩右為散毎服三錢酒調服日三莽草散治産後乳結核或堅硬疼痛莽草葉一兩紫葛大黄各半兩赤小豆二兩右為末醋和如糊傅結核上頻易之每易則先以熱葱湯洗之傅膏方治産後乳腫熱痛黄連去鬚三分大黄生䑕糞炒各半兩右為末用米醋調傅四邊頻易之每易先用熱葱湯洗麥門冬湯治產後乳結核及初結作癰服此麥門冬去心焙黄芩去黑心黄耆剉芍藥甘草赤茯苓去黒心木通剉各三兩桑寄生防風去乂人參各三兩右㕮咀如蔴豆大每服五錢水一盞半入􅀥二枚擘煎取一盞去滓入糖一􅀥大令消溫服不拘時乳漸銷减即服後門冬丸方天門冬方治產後乳結核天門冬去心焙二兩半木通剉黄耆剉防風去乂桑寄生剉生乾地黄焙人參各一兩𦍑活去蘆一兩半大黄一兩白芷升麻各三分澤蘭去枝梗茯神去木天雄炮去皮臍黄芩去黑心枳實去瓤麩炒五味子各半兩右為末煉蜜丸如梧桐子毎服二十丸加至三十丸溫酒下日三外消膏治産後乳結核疼痛或腫欲成癰伏龍肝半兩大黄剉半兩生姜一兩洗切焙研細右除生姜外為末和匀用醋調作膏隨小大攤貼病上早晩易之效托裏散治産後乳結核欲壞不壞威靈仙洗焙當歸切焙牡丹皮芍藥剉黄耆剉桂去粗皮各一兩大黄炮半兩右為散每服三錢温酒調下不拘時候升麻湯治産後乳腫或結核敗壞熱悶升麻白歛各一兩大黄生半兩黄芩去黒心桂去粗皮各一兩芒硝研半兩人參黄耆剉各二分右為粗末每服三錢水一盞煎七分去滓温服不拘時大黄湯治産後乳結核腫痛發熱煩悶大黄剉㣲炒楝實劈破炒去子芍藥馬蹄炙黄焦各一兩右搗篩毎服二錢水一盞煎七分去滓温服不拘時蔓荆實散治産後乳腫痛煩悶熱蔓荆實炒二兩甘草炙五錢右為散每服二錢温酒調下不拘時候服黄芩湯治産後初覺有核漸發熱痛累日不退欲成癰黄芩小者甘草炙剉桑寄生剉防風去义木通剉黄耆剉麥門冬去心焙大黄各一兩赤芍藥一兩右搗篩每服五錢水一盞半煎至一盞去滓温服不拘時當歸散治乳結核堅硬當歸切焙桂去粗皮各半兩芍藥人參各三分蒺藜子炒去角鷄骨炙各一兩木通剉黄耆剉各一兩枳實去穰麩炒三分右為散每服二錢空腹酒調下日再治婦人乳生結核堅硬或腫疼痛冝用消毒止疼痛藥水膏方黄蘖一兩糯米二合赤小豆一合露蜂房半兩鹽一兩右為散搗生地黄取汁調令稀稠得所量痛腫處大小剪絹一方厚塗貼之乾則換之髪灰散出聖惠方治乳中結塞腫痛亂髪灰蛇蜕皮灰各半兩蔓荆實㣲炒一兩右為散毎服二錢温酒調下日三無名異散治乳結顆塊膿水宿滯血脉壅閉惡血疼痛久不瘥者無名異牡丹皮虎杖根當歸切焙白芷白茯苓去黒皮各三分沒藥研麒麟竭研木香黄芩去心黄耆人參桂去粗皮熟乾地黄焙各半兩右為散毎服三錢空腹煎棗湯調下日三服又方治妳結鞕疼痛用百藥煎為細末毎服三錢酒一盞煎數沸熱服冄以滓傳腫痛處又方用鱓魚皮燒灰存性為末空心酒調服療乳瘰止痛方大黄黄連各三兩右用水五升煮取二分三服下即愈内消散治婦人乳癰毒始生核川大黄黄芩黄連去鬚黄藥子地龍炒令黄乳香各一兩右為細散用生地黄汁調匀塗扵腫毒上若乾即易之不過三五度瘥當歸散治婦人乳生結核疼痛散毒氣止疼痛當歸三分剉㣲炒甘草一兩剉川芒硝一兩黄連三分去鬚黄藥子三分川大黄一兩蒲公草三分𤣥參三分右為細散用鷄子白調為膏於生絹上塗貼取効為度治婦人乳生結核及腫疼藍草根生蒻頭各二兩右搗如泥貼之立効療産後乳初結脹不消令敗乳自退方𤓰蔞一箇半生半炒大粉草一寸半生半炒生姜一塊半生半煨右同剉用酒一碗煮取一盞去滓服之其痛一會如不可忍即搜去敗乳安臥每一服順所患處乳側臥於床上令其藥行故也産後乳結癰附論産後衝任不足氣血俱虛潛行入于足陽明之脉其直行者從缺盆下乳内兼下夾臍入氣衝中衝脉者起于氣衝並足陽之經夾臍上行至胸中而散也其經為邪熱衝則血為之擊摶氣為之留滯擊摶則痛作留滯則腫生内經所謂營氣不從逆于肉理乃生癰腫此疾者以乳汁藴積與氣相摶故也方當歸飲治産後乳癰欲結發熱腫痛當歸切焙芍藥牡丹皮生乾地黄焙人參黄耆剉大黄生升麻連翹各一兩右粗搗篩每服五錢水一盞去滓温服不拘時黄耆湯治産後乳結核或腫痛漸成癰煩熱黄耆剉生乾地黄焙麥門冬去心焙升麻各一兩半人參赤茯苓去黑皮各一兩當歸切焙芍藥逺志去心甘草生各半兩右粗搗篩毎服五錢水一盞半去滓温服不拘時候蛇蜕皮散治乳癰疼痛寒熱發歇晝夜不可忍蛇蜕皮燒灰半兩麝香二錢右研細每服二錢熱酒調下不拘時芍藥湯治産後乳結癰濃敗壞不散發熱疼痛芍藥桂去粗皮黄耆剉赤茯苓去黑皮當歸切焙生乾地黄焙各一兩甘草剉麥門冬去心焙人參各一兩右㕮咀如麻豆大每服五錢水一盞半再入生姜一􅀥大煎至八分去滓下朴硝末一錢再煎令沸温服不拘時甘草飲治産後乳癰熱痛未結膿者甘草半兩半生半炙栝蔞一枚去皮用穰右先以酒三盞煎甘草至二盞入栝蔞穰煎至一盞去滓溫服半盞如痛即以酒少許解之未効再作栝蔞散治產後乳癰膿潰未潰熱痛不已栝蔞實二兩敗醬細辛去苗葉乾姜炮厚朴去粗皮姜汁炙桔梗炒防風去乂人參各半兩右為散每服三錢溫酒下水一盞煎至八分溫服亦得不拘時黄耆膏治產後乳癰欲結未結膿攻痛黄耆剉芎藭當歸切炒黄芩去黑心黄連去鬚白歛芍藥防風去乂各一兩右為末用鷄子白調隨大小貼之每日一易猪蹄湯洗方治產後乳癰破後膿血不盡猪蹄一具當歸切炒芍藥黄芩去黑心獨活去蘆頭莽草大黄剉碎炒芎藭各半兩右搗羅七味為末將猪蹄剉洗令净以水五升煮熟去滓澄清内藥再煎令熱通水手洗乳上令透拭乾良久又暖洗不拘次數漏蘆膏治乳汁不時泄蘊積于内遂成癰漏蘆黄芩去黒心各一兩米粉半兩右為末新水調如膏塗之麥門冬治乳腫初覺有異生麥門冬去心黄耆剉防風去又各一兩半桑寄生一兩半甘草炙三分木通二兩半黄芩去黑心赤芍藥各一兩右㕮咀如麻豆大每服五錢水一盞半入棗二枚煎至八分去滓内乳糖一分再煎一兩沸去滓溫服芍藥散療乳癰腫消核芍藥通草桂心昆布白歛附子炮黄耆人參海藻木占斯各一兩右搗散以清酒服一錢日三當先食并療頤下氣結瘰癧栢皮膏乳癰衆醫不能療用猪膏年多者佳栢皮三斤去黑皮以猪膏煎之當消煎栢皮熟黑便漉出更煎餘栢皮如初膏盡以塗瘡處甚驗三物桂心貼治乳癰桂心烏頭甘草各二分右搗散以苦酒和塗腫上以濕紙覆濡其上將乳居其中以乾布置乳下湏臾布當濡有膿水也又方研米搥二枚煮令熱以絮布巾覆乳上用二槌更互熨腫數十過差止已用大驗治乳癰堅硬痛不可忍右茛菪子半大匙當年新者服時不得嚼破以清水一大盞和頓服痛即止治婦人乳癰覺痛色未變時以飼猪米研汁飲之即瘥仍取猪槽木厚如匙面火炙數熨治婦人乳癰疼痛冝薰方十便良方露蜂房半斤細剉右件藥以醋五升煮令熱相和傾於瓶中熱薰乳上日三五度即差冷即再煎之效又方十便良方大黄一分竈上黄土一分生姜二分右三味搗羅為末醋和􅂗乳痛即止極驗劉消子不用生姜用生魚三味等分魚必用鯽魚妙三能散十便良方治妳癰綿黄耆皂角刺燒存性各一兩右搗羅為散以酒調二錢服能穿能散香蛤散楊氏家藏方治婦人妳癰纔覺作痛氣欲結者便服此藥令内消車螫殻火煆一兩乳香半兩炙剉膩粉五分右件為細末每服一錢用乳香溫酒送下食後日進三服聖􅀥散楊氏家蔵方治乳癰用􅀥四十九枚燒灰留性不拘癰大小盡用􅀥灰及糞堆上土研細三四錢和匀以新汲水調傅治奶癰結聚成塊疼痛難忍䕶命方好肥皂角二條香葱十枚右先搥皂角碎水一碗揉取汁煉成膏却碎揉葱入内更煎三兩沸紙攤貼痛處露奶頭令清水出只初痛一兩日可使已成膿者便不可使通和湯衞生寶鑑治婦人乳癰疼痛不可忍者亦治吹奶疼痛不可忍穿山甲一兩炮黄木通剉一兩自然銅半兩醋淬七次右為細末每服二錢熱酒調下食逺服之又方衞生寶鑑治奶癰瘡凡未成瘡纔覺腫硬作痛以葱早熨之其法用中様小甆瓶瓶口寛者以炭火入瓶内上以熱灰填滿瓶口将葱葉葱白搥損令徧覆瓶口以手帕子褁定熱將瓶口向腫處任意輕輕熨之有驗治產後忽然乳痛堅硬成塊欲成癰腫先喫此方但臓腑熱覺得乳痛即喫此方麻黄去根連翹子各半兩知母射干當歸大黄蔓荆子芍藥荆芥穗牡丹皮去心各一分半夏三錢木通四銖右為細末每服三錢水一盞生姜三片同煎取九分食後臨卧去滓喫再煎連喫以大腑通為度治吹奶癰腫痛疼熱發渴晝夜呻吟蛇蜕皮一兩燒灰赤小豆一兩右件藥搗羅為散以鷄子白和調傅之治乳癰結硬欲作癰十便良方用真樺皮溫熨腫處一夕即消又方永類鈐方用萱草根又名射干研爛生酒濾過以滓貼瘡久患此腐爛見骨膜垂死者用萱草根其葉柔其根如麥門冬并萹蓄根如殭蚕葉硬如劒者傅之神効治産後不自乳兒畜積乳汁結作癰肘後方取蒲公草搗傅腫上日四度易之俗呼為蒲公英語訛為蒲公明者是也火煮汁服亦得治産後患乳癰腫痛因産後不見乳汁結作癰用蒲黄炒熱杵傅腫上日三度易之又以井華水煎葉汁飲之亦佳食之亦得妬乳及癰並瘥又方千金方用皂角十條以酒一升揉取汁硝石半兩煎成膏傅之連翹湯㧞萃方治産後妬乳並癰連翹升麻芒硝各十分𤣥參芍藥白歛防己射干各二分大黄十二分甘草六分杏仁八十枚去皮尖右以水九升煎取三升次下大黄硝分三服復元通氣散永類鈐方治乳癰瓜蔞青皮烏藥白芷各等分初發服甚效病已半勿多服穿山甲等藥惟専發散也懸癰通用治乳癰本草取人齒燒灰細研酥調貼癰上治乳癰本草以烏雌雞膽汁傅之日三療乳癰痛寒熱者本草取蔓青根并葉净擇去土不用水洗以鹽搗傅乳上如熱即換不過三五易之即瘥冬月無葉但单用根亦可切須避風産後悶煩附論夫産後煩悶者由産後臟腑勞傷血氣虛損而風邪乘之摶于血使氣不宣而否澀則生於熱或肢節煩疼口乾因虚生熱則多煩悶此乃表裏俱虛血氣未復而氣逆乗之故悶煩也新産之後血氣俱虛或因亡血過多或因惡血下少致血氣不利陰陽相勝陽勝則發煩悶經所謂陽勝則熱是也方淡竹葉湯治産後血不利心煩喘悶淡竹葉麥門冬去心焙小麥白茯苓去黑皮各一兩右為散粗搗篩毎服二錢水一盞生姜三片煎至七分候去滓温服空心日午臨臥各一蒲黄散治産後血氣痛煩悶渴燥蒲黄一兩乾姜炮半兩薑黄切當歸切桂去粗皮右為散每服一錢煎人參湯調下空心日午臨臥服麥門冬湯治産後煩悶或血氣不快麥門冬去心焙二兩甘草炙剉白茯苓去黒皮人參各一兩右粗搗篩毎服三錢水一盞生姜三片􅀥一枚煎至七分候入竹瀝半合再煎數沸去滓温服黑金散治産後血氣煩悶腹痛脹滿赤龍鱗燒灰研亂髮燒灰研當歸切焙人參二分麝香别研一錢白茯苓去黒皮二分碙砂去沙石研一分犀角鎊枳殻去瓤麩炒大黄剉炒各一分右除髪灰并麝香外搗羅為細散合研匀每服一錢温熱水調下空心日午臨卧服羚羊角散治産後血氣煩悶腹痛羚羊角燒灰延胡索黄耆剉枳殻燒灰芍藥白茯苓去黑皮劉寄奴各半兩右為散每服二錢煎人參湯調下空心日午臨卧服地黄飲出聖惠方治産後血氣不利心胸煩悶脅肋滿口乾壯熱不思飲食生地黄汁一盞當歸切焙搗末二兩酒生姜汁各半兩童子便一盞人參搗末一兩右四汁相合每服用汁半盞水半盞入人参當歸末各半錢同煎至七分空心日午臨卧温服一方無人參名曰地黄飲子不拘時候服紫葛飲出聖惠方治産後心中煩悶不解紫葛剉麥門冬去心焙人參羚羊角鎊小麥甘草炙剉各半兩右粗搗篩每服三錢水一盞入生姜三片棗一大枚擘煎至七分去滓温服不拘時候竹茹散治産後悶煩氣短竹茹人參白茯苓去黑皮黄耆剉當歸切焙生地黄焙各半兩右為散每服二錢温酒調下不拘時候人參散治産後虛煩氣短心下不利人參烏藥各一兩㯽榔剉半兩黄耆剉三分木香一分熟乾地黄焙一兩麥門冬去心炒甘草炙剉各三分右為末每服二錢沸湯調下不拘時候人參丸治産後虛煩氣血滯攻腰腹疼痛煩悶少力人參一兩延胡索桂去粗皮芎藭木香當歸切焙白茯苓去黑皮厚朴去粗皮生姜汁炙蒲黄白芷各一兩熟乾地黄焙二兩右為末煉蜜和丸如梧桐子大毎服三十丸酒下毎日三服白茯苓湯治産後氣血虚心膈煩滿身腫體熱惡露不行白茯苓去黑心赤芍藥芎藭各一兩半桂去粗皮大腹皮剉枳殻去穰麩炒熟乾地黄焙各一兩右粗搗篩每服三錢以水一盞生姜三片煎至七分即去滓温服日三當歸湯治産後虚煩腹痛當歸切焙芍藥木通剉各一兩右粗搗篩毎服二錢水一盞半入生地黄二寸許切碎同煎煎至八分去滓温服不拘時候真氣湯治初産後血氣煩悶童子小便三合生地黄汁一合右相和㣲煎三四沸分温二服逍遙湯出危氏方治産後無陰血虚心煩自汗精神昏冐心忪頰赤并口燥咽乾發熱頭痛或寒熱如瘧白茯苓去黒皮白术當歸切焙芍藥柴胡去苗各一兩右粗搗篩毎服二錢水一大盞入乾生薑一塊切破薄荷五葉同煎七分去滓熱服不拘時候人參當歸湯出千金方治産後隂虚生内熱煩悶不安人參當歸麥門冬乾地黄桂心各一兩大􅀥二十枚粳米芍藥四兩淡竹葉三升右㕮咀以水一斗二升先煮竹葉及米取八升去滓内藥再煎煮取三升去滓分三服若煩悶不安者當取豉一升以水三升盡服之甚良地黄用生乾者虚甚則用熟者赤小豆散出千金方治産後煩悶不能食虚滿用赤小豆三七枚燒作末以冷水和頓服之治血氣煩悶脇肋脹滿及痛一名荷葉散芍藥八分蒲黄延胡索各四分當歸六分荷葉蒂三箇炙右以水二升煎取七合後入蒲黄空心分三服治血氣煩悶方出大全良方右以竹瀝飲一盞甚効或生藕汁飲二升亦効知母湯出千金方治産後乍寒乍熱通身不快心胸煩悶知母三兩芍藥黄芩炙二兩桂心甘草炙一兩右㕮咀以水五升煮取二升半分三服一方不用桂心加生地黄竹葉湯出千金方治産後心中煩悶不解生淡竹葉一升麥門冬一升甘草二兩生薑茯苓各三兩大棗十四枚小麥三合右㕮咀以水一㪷先煮竹葉小麥取八升内諸藥煮取三升去滓分三服若心中虚悸者加人參二兩其人食少無穀氣者加粳米五合氣逆者加半夏二兩大全良方不用茯苓蒲黄散便産湏知治産後煩悶虚煩悶去血多則除虚而生内熱其證心胷燥滿短氣頭痛悶亂骨節痛脯時輒甚用蒲黄紙上炒以東流水和服方寸匕極良治産後煩悶不能食用白犬骨一味燒研以水服方寸匕療産後心悶不識人汗出乃血氣衝心及胷脇腹肚熱時作時止出肘後方用羚羊角燒如末以東流水服方寸匕未瘥再服治産後煩躁用禹餘糧一枚放入醋瓶内入地埋一半四面𦂳築用炭一秤發頂火一斤煆去火三分耗二為度用溫砂土罨一宿取出打去外面一重只使裏内細研淘澄五七度將紙襯乾再研數千遍患者用甘草煎湯調二錢匕只一服立効治産後惡血煩悶用羚羊角燒灰酒服方寸匕未瘥再服亦治産難治産後心悶眼不得開出千金方即當頂門上取髪如兩指大使人强牽之眼即開紫葛飲子治産後心中煩悶不解紫葛半兩麥門冬半兩去心生地黄半兩小麥半合生薑一分甘草一分炙㣲赤剉右細剉和匀分為三服以水一大盞煎至五分去滓不計時候溫服麥門冬散出聖恵方治產後因虚生熱致生心神煩悶麥門冬去心一兩羚羊角半兩屑人參一兩半去蘆蒲黄一兩甘草半兩㣲炙剉右搗篩為散每服三錢以水一盞入竹葉二七片小麥半合煎至六分去滓不計時候温服黄耆散出聖恵方治產後口乾煩悶心躁黄耆一兩剉麥門冬一兩去心赤茯苓一兩生乾地黄一兩當歸半兩甘草半兩炙㣲赤剉右搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓温服不計時候蒲黄散出聖恵方治產後血氣上攻胷膈煩悶不安蒲黄一兩當歸一兩麥門冬去心一兩赤芍藥一兩鬼箭羽半兩生乾地黄一兩右搗篩為散每服三錢以水一中盞入竹葉二七片粳米五十七粒煎至六分去滓不計時候溫服竹茹飲子出聖恵方治產後内虛煩悶短氣竹茹一兩人參一兩去蘆頭黄耆一兩一作黄芩甘草一分炙㣲赤剉白茯苓一兩右細剉和匀每服半兩以水一大盞入􅀥三枚煎至五分去滓不計時候溫服一方無􅀥紅藍花飲子出聖恵方治產後血氣攻心煩悶氣欲絶不識人紅藍花半兩紫葛半兩剉赤芍藥半兩剉生地黄汁三合後下童子小便三合後下蒲黄半兩右件以水一大盞酒半盞煎至八分去滓下地黄汁并小便更煎三兩沸不計時候分溫三服琥珀散出聖恵方治産後惡血不下心膈煩悶琥珀一兩蒲黄一兩劉寄奴一兩赤芍藥一兩蓮子心半兩鬼箭羽半兩右搗細羅為散每服不計時候以豆淋酒調下二錢芝麻散出聖惠方治産後燥熱心神煩悶芝麻一兩紅藍花半兩當歸半兩剉㣲炒赤芍藥半兩琥珀半兩嫩荷葉半兩右搗細羅為散每服不計時候以生地汁調下二錢治産後心神悶煩眩迷不省唇口冷脉欲絶面青血氣上衝宜急服此方聖惠方釅醋三合鷄子一箇打破㵼在碗中右先煎醋一沸傾入鷄子碗中頓熱服之立効治産後煩悶手脚燥熱懨弱氣欲竭血暈心頭硬乍寒乍熱用此方聖惠方用續斷枝一握水一盞半煎至一盞分三服治産後惡血不盡心膈煩悶腹中刺痛宜服此方聖惠方延胡索一兩益母草半兩右搗羅為散不計時候以溫酒調下一錢又方聖惠方用生地黄四兩細切酒二大盞煎至三五沸去滓分為五次服不計時候服之又方聖惠方當歸一兩剉㣲炒鬼箭羽二兩右搗羅為散每服不計時候以紅藍花酒調下二錢治産後虛勞心熱煩悶不識人方聖惠方取生鷄子一枚打破去殻吞之又方聖惠方童子小便一小盞生薑汁一合生地黄汁一合右相和煎一沸放溫分為二服頻頻服之又方聖惠方生地黄汁一中盞童子小便一中盞蒲黄半兩右相和攪令匀不拘時候分溫四服又方聖惠方以生藕搗絞取汁煖飲一小盞頻頻服之凡產後忽冐悶汗出不識人者暴虛故也危氏方用破鷄子三枚可與童子小便一升吞之便醒不然丈夫小便一升亦得切不可用病人者又若久不識人或時復發者此為有風因産血氣暴虚風行脉中故也若産後去血多者又增此疾與鷄子不醒者可急作竹瀝汁一服五合湏臾不定再與五合頻與三五服即瘥治婦人產後胷滿悶不思飲食四肢潮熱用柴胡湯一帖黄芩三兩用水二盞煎盞半空心服治產後血悶血竭用藕節和生地黄搗汁熱酒并小便調下治產後血脹悶用甘蕉根搗汁服之治諸虚煩熱以竹葉石膏湯溫膽湯服之但產後與尋常不同如石膏等藥不宜輕用人參葳靈散衞生家寶治産後痞氣胷膈不快噎悶不進飲食人參茯苓藿香葉白芷甘草炙桔梗各一兩葳靈仙一分微炒右件為末每服一大盞􅀥二枚薑二片水一盞慢煎至八分空心食前溫服治産後血脹悶欲死者本草以水和苦酒煮蘇方木五兩取濃汁服之効治産後血悶止痛本草以折傷木酒煮濃汁飲之治産後血腹悶本草以蕘花搗汁服之産後煩渇附論夫産後煩渇者由産時水血俱下臟腑乾燥津液不足因虚則生熱故令煩渇也方地黄散聖惠方治産後煩渴壯熱不思飲食生地黄一兩赤茯苓一兩麥門冬三分去心葛根半兩剉石膏一兩研甘草一分炙㣲赤剉右為散每服三錢以水一中盞入生薑半分􅀥三枚約煎至六分去滓不計時候温服􅌝􅌣根散聖惠方治産後煩渇體熱食少􅌝􅌣根一兩甘草一兩炙㣲赤剉人參一兩去蘆麥門冬一兩去心生乾地黄一兩蘆根二兩剉赤茯苓一兩益母草一兩右為散每服三錢以水一中盞入生薑半分􅀥三枚約煎至六分去滓不計時候溫服黄耆散聖惠方治産後體虛煩渇喫食減少乏力黄耆一兩剉麥門冬去心半兩生乾地黄一兩甘草一分炙㣲赤剉人參三分去蘆頭陳皮三分湯浸去白穰焙白茯苓一兩桑寄生半兩右為散每服三錢以水一中盞生薑半分􅀥三枚竹葉二十七片同煎至六分去滓不計時候溫服紅藍花散聖惠方治産後煩渇不止紅藍花一兩芝麻一兩栝蔞根一兩生乾地黄一兩甘草半兩炙㣲赤剉菰根一兩右為散每服三錢以水一中盞入生薑半分棗三枚同煎至六分去滓不計時候溫服人參散聖惠方治産後煩渇體熱食少人參一兩去蘆頭麥門冬一兩去心石膏一兩當歸一兩剉㣲炒甘草半兩炙㣲赤剉􅌝􅌣根三分生地黄三分柴胡三分去苖赤茯苓三分右搗篩為散每服三錢以水一中盞入生薑半分棗三枚同煎至六分去滓不計時候溫服蓮子房散聖惠方治産後煩渴不止蓮子房二兩秋前者甘草一分炙㣲赤剉人參一兩去蘆頭麥門冬三分去心蘆根一兩剉右搗篩為散每服三錢以水一中盞入生薑半分大棗三枚煎至六分去滓不計時候溫服益母草散聖惠方治産後血運煩渴口乾心燥益母草一兩人參半兩去蘆頭黄耆半兩剉葛根半兩剉生乾地黄半兩甘草一分炙㣲赤剉右為散每服三錢以水一中盞入生薑半分約煎至六分去滓不計時候溫服羚羊角飲子聖惠方治産後心胸煩渴不解羚羊角屑一分竹葉二十七片小麥半兩􅀥五枚生薑一兩赤茯苓半兩右細剉和匀分為五服以水一中盞煎至六分去滓不計時候温服又方聖惠方生藕汁三合生地黄汁半升童小便五合白蜜二合右相和煎三五沸不計時候分溫三服治産後忽口内煩渴狂語方聖惠方右蘇枋木一兩水二大盞煎至一盞去滓放溫漸漸服盡其渇立止紅藍花散楊氏家藏方治産後調順氣血治虚煩渇燥或乳脉欲行頭昏寒熱川芎當歸洗焙蒲黄各等分右件為細末每服三錢水一盞入荷葉心一斤黑豆三十粒同煎至七分温服不拘時候桃花散保命集方治産後不煩而渇新石灰一兩黄丹半錢右為細末渇時冷漿水調一錢普濟方卷三百四十七
