兩右藥剉碎用水二大盞煎取一盞三分去滓分温三服以快利為度芒硝散治發背大小便不通心神燥熱臍腹妨悶方川芒硝二兩川大黄一兩碎微炒梔子仁一兩甘草一兩生剉黄芩一兩右為散每服四錢以水一中盞煎至六分去滓不計時候温服朴硝丸治癰疽瘡發大小便秘澁不通朴硝研大黄碎炒杏仁湯浸去皮尖雙仁炒研葶藶子微炒各二兩右先以三味為細末入朴硝和勻煉蜜為丸梧桐子大每食後煎黄耆湯下二十丸以通利為度未利再服大黄湯治年未及四十氣血强壮常苦癰疽無定大小便不通五利及治發背上攻於妳一名五利大黄湯大黄剉微炒升麻各二兩黄芩去黒心一兩梔子仁十枚去皮右擣篩每服五錢用水一盞半煎至八分去滓下芒硝一錢空心温服快利三兩行為度未利再服一方甘草二兩炙内去芒硝導毒丹癰疽大便秘紫草𤓰蔞連皮右剉新水煎服或用黒豆一盞入生薑紫蘇煎湯亦得孫真人單煮大黄湯宣熱㧞毒大便秘者方可用用錦紋大黄酒浸去皮不拘多少剉如麻豆大煮服快利此要法也治癰疽大便秘方一方獨聖湯治服金石炙􅏼飲酒房勞癰疽痛疼用甘草生一兩剉碎井水濃煎入酒調服能疎導惡物癰疽後補虚羸附論素問云形不足者温之以氣精不足者補之以味大抵病瘡毒後焮熱痛楚心煩氣壅胷膈妨悶不能飲食所以患瘡毒人湏藉飲食滋味以養其精以助其真不日可補安全經云脾為倉廩之官胃為水糓之海主養四旁湏用調理進食為上不然則真元虚耗形體尫羸惡氣内攻最難調䕶可服茯苓開胃散人參内補散嘉禾散仍兼服五香加犀角人參黄耆湯排膿内補十宣散之類是也參术順氣散亦宜服之方加味十全湯老人癰疽後氣血虚飲食不美用黄耆去叉蘆剉令二寸長搥匾以冷鹽湯温潤蒸三次焙乾剉大地黄先洗焙乾以酒洒飯上蒸十次剉焙乾二味各一兩人參去蘆切焙川芎微炒大當歸去蘆酒洗切去頭尾微炒乾白茯芩去皮切焙粉草炙白芍藥揀有皮者刀刮去皮切焙桂心去粗皮淡者不見火切天台烏藥興隆者可橘紅去白白术米泔浸半日切焙麸炒黄北五味子去梗微炒以上十一味各半兩右㕮咀每服一兩用水一椀生姜五片棗二枚同煎至八分濾去滓取清汁分作二服留滓晒乾碾為細末後常服再用姜棗煎服人參内補散芍藥黄芩去心茯苓粉草一兩半炙桂心不見火人參去蘆各一兩麥門冬去心當歸酒浸去蘆焙熟地黄洗凈焙木香不見火各二兩右為細末每服二錢水一盞薑三片棗一枚煎至八分無時温服薔薇丸治風濕體氣不能飲食兼癰疽後補虛羸薔薇枸杞根各一斤半食蜜生地黄各十斤右㕮咀先以水煮二根絞取二斛去滓次内地黄煮令爛去滓微火煎令如粥次内蜜和令相得每食後服如彈丸許將理法凡癰疽妄用惡草愈滋其毒不進飲食反害其瘡皆非正法宜如後法将理避風邪少睡卧勿驚憂勿嗔怒徐行動省言語戒閨房絶思慮防觸穢聽好事瘡頻洗藥常服盥潄聞香二便順序擇飲食内充無飢飽失度傅藥運掉屈伸瘡口常加愛䕶服食法方藕食羮治發背癰疽心煩熱補中養神益氣藕食去皮切五枚葱白切五莖䜴一合煎汁一升半甜𤓰去穣切二枚冬用冬𤓰右先以䜴汁煮藕實次下𤓰并葱取熱以五味調和作羮食之日一杏酪粥治發背心肺積風熱觧毒煎成濃杏酪一升黄牛乳半升大麥仁三合右先用水煮麥仁并杏酪熱後即下牛乳攪令勻空心食日一豉粥方治發背癰疽解毒去風熱豉二合葱白切二莖薄荷半兩生薑拍碎三錢鹽花半兩羊髓二兩白米三合右以水三升先煎薄荷生薑至二升却下豉再煎十沸去滓下米煮候粥熟次下髓並鹽攪勻食之日一凝水石膏治發背癰疽毒攻寒熱牛蒡莖長五六寸别煮令熟研白术三合凝水石一兩搗碎絹袋盛右以水三升先煮凝水石至一升半次下牛蒡并术再煎令沸去滓下米煮粥候熟空心食日一石膏粥治發背癰疽頭痛不可忍石膏二兩碎葱白切二莖䜴半合生薑拍碎三錢半米三合右以水三升先煮石膏至二升次下葱薑豉再煎至一升半去滓下米煮粥後食之若渇加乾葛根一兩梔子仁粥治發背癰諸熱毒腫梔子仁五枚白米五合右先以水三升煎梔子至二升濾去滓下米煮粥候熟空心食之竹葉粥治發背癰疽諸熱毒腫淡竹葉一兩石膏碎半兩白米三合沙糖一兩右以水三升先煎竹葉石膏至一升半去滓下米候成粥即入糖攪令勻空心食之灸法治癰疽癰疽初發小㸃一二日間急以大蒜頭横切如錢貼其中心頓小艾炷灸之五壮而止若形状稍大以黄稈醮酒全貼認先乾處為筋脚於先乾處灸之或兩處先乾皆灸俱五壮而止又法屈指從四圍尋按遇痛處是根就自重按深入自覺輕快即此炙之更於别處尋灸若或大腫即搗蒜為餅焙乾醮法醋炙熱更換頻更已滅以熨斗火於蒜頭上熨之更換熱餅頻熨如覺患處走散即綿帛覆盖勿令氣泄俟少間傅藥凡癰疽展大如龜之形且看頭向上下先灸其前兩脚次灸其尾或紅筋走𦂳而長從盡處灸之湏留頭并後兩脚勿灸若灸不惟火氣壅聚彼毒無所走又攻入裏也或辨認不明以白芷三分漢椒桑白皮各一分連根葱白十根又取新水煎湯入酸醋半盞淋洗少頃其筋自見可以辨認頭尾又法癰疽腫堅硬不破名曰石癰當上灸百壮癰疽發背龜形凡發背如龜形便認龜頭不論左右上下但以腫髙處為頭或有疑即以黄稈紙醮醋掩之先乾處為頭把筆㸃定男女皆取左右手中指用草比量全紙為度一樣剪草十三片六片安頓在外合作龜背形六片安頓於龜背之内中心安頓三片四片内外各相連合如是則頭尾四足定矣以筆㸃其尾足抹蒜膏灸之先灸其尾七壮火未滅便灸後一脚七壮火未滅又灸後一脚七壮迤邐如是灸至前兩脚而止湏留龜頭莫灸以出毒氣法艾稈實如筯中間大剪剪作艾壮此法合隂陽氣候可用灸之省力療理治癰疽毒開濶不止痛楚殊甚以艾炷四枚圍着所作處同時下火各灸七壮多至一十壮佳骨疽百方療不瘥方於瘡上以艾灸之三日三夜無不愈也治癰疽發背腫毒一切惡瘡皆效用麻皮一條從手臂大曲文中度起牽至中指第二節横文處為凖引而倍之截斷遂用此凖從結侯處結定雙引兩頭從垂背脊直下取凖頭進處㸃定此是定髙下也又用小紙條比大拇指上節一寸為凖却将此凖就前來皆定中㸃定處旁去一寸㸃一穴灸五壮或七壮十壮若已破灸後三二日或瘡口再就前穴右引一寸㸃一穴灸五壮或七壮十壮凡此度㸃穴皆男左女右炙發背凡發背上腫硬疼痛用濕紙貼腫上先乾處是頭碾大蒜八頭入淡豉半合乳香一塊如龍眼大細碾隨瘡大小用竹片作圈子竹片闊二分許隨腫大小頓在瘡上将所碾藥填平鋪艾灸痛處以痒為度然後服白散子貼凉清膏若方腫硬未有頭則當日腫消若已有頭則即時膿潰妙不可言又灸法癰疽有脚以生薑用大黄黄丹法製一夜切為片以艾炷灸之脚自縮矣極妙治一切癰疽灸法纔有腫痛不可忍上有白頭如粟粒大一粒至二三日有五七粒不可不急治便将艾炷於粟粒上灸或無粟者但毒氣痛聚更著艾灸覺痛即灸至痛止來日取去瘡痂膿自潰矣熨法速消方癰疽發背已發未結已結未潰急以黄牛明皮膠新水溶令稀稠得所攤在抄紙上貼之良久以軟布二條於釅醋中煮熱互換漉出罨在膠紙上蒸熨直至消散如瘡痒湏忍痒不可住熨或破而膿出将盡即止未效再如前将膠紙於瘡上熱醋布依舊熨令膿盡即貫衆湯洗去膠紙用退腫散解毒散沉水膏等類摻傅或用㧞毒散隨意急服萬金一醉膏或内消散乳粉托裏散破後以洗瘡方盪洗發散毒氣治癰疽腫發背及癰癤已潰爛疼痛方用蒸麋糓更遭熨之當即愈一云薔薇殻更炙熨之普濟方卷二百八十五
