body:
  text: 普濟方卷二百八十五明周王朱橚撰癰疽門癰疽等瘡内消法附論夫治病必先求其本而後治其標癰疽諸瘡雖發于外而本乎中熱之所出始覺經絡壅滯氣血悶鬱有瘡瘍之證則熱氣初作榮衛未得肌肉未腫腫而未腐之時可踈滌風熱通導而去之逮其毒氣已結則不可論内消法恐熱毒不出反致内攻適以傷之先後遲速之用不可不審方黄連獨活散治背疽一切惡瘡初發腫甚者服三服即消除羗活一錢半獨活五分防風五分藁本一錢半黄芩一錢半黄連五分當歸身三錢知母一錢酒浸洗生地黄一錢酒浸洗連翹三錢黄耆一錢半防風稍五分人參五分陳皮五分蘇木五分甘草身一錢一分半用酒微炙黄栢一錢半當歸稍五分桔梗一錢澤瀉七分甘草稍半錢漢防己五分右㕮咀只作一服水一碗煎至五分入好酒半盞臨卧服滓再煎接續服即瘥寒水石膏治一切癰疽發背熱毒猛異攻肌肉赤色腫痛不可忍欲成膿及已成膿并風毒熱在闗節欲結成癰便令内消寒水石二兩羊蹄根一兩剉硝石一兩丁香三兩川大黄一兩白歛三分木香三分附子三分去皮臍黄連一兩去鬚榆白皮三分剉莽草三分赤小豆一合漢防己一兩半夏三分𤣥參一兩甘草一兩生剉右為細散每用時以生蜜一合地黄汁一合旋調以成膏攤於生絹上貼乾即易腫消為度小犀角丸治膓癰乳癰發背一切毒腫服之化為水巴豆二十二枚去皮膜必炒出油細研之大黄蒸焙一兩一分當歸去蘆一兩犀角三兩梔子去皮乾蓼藍黄茋去苖升麻黄芩防風去蘆人參甘草炙各一兩右為細末入巴豆勻煉蜜搜和為丸如梧桐子大每服三丸温湯下利三兩行喫冷粥止之不利加至四五丸初服取快利後漸減丸數取微溏泄為度老少以意加減腫消及和潤乃止利下黄水覺腫處微皺色變即是消後一切腫皆内消神驗不可論忌熱麫蒜猪肉蘆笋魚海藻菘菜生冷粘食排膿内消散治癰疽發背活血排膿消毒紅内消即紅散何首烏一兩當歸川芎生地黄川續斷各洗焙芍藥白芷半夏麯蘆薈葉紫草茸甘草炙各二分半茯苓半兩右為末每服三錢新水二分酒一分薑棗煎服有熱者加燈心只用水煎服之内消散凡是癰疽皆宜服之人參甘草瞿麥各二兩赤小豆醋一升浸熬當歸猪苓黄芩各二兩白歛薏苡仁黄茋各三兩防風一兩升麻四兩右治下篩以酒服方寸匕日三夜二常服取瘥花蘂石散治癰疽始發未變膿令内消花蘂石火煆黄蜀葵花龍骨塗酥炙研鬱金剉胡粉烏賊魚骨去甲草龍膽去土梔子仁大黄剉各一兩右為散量多少許津唾調成稀膏傅之頻以唾潤日一易瞿麥散排膿止痛利小便從小便出毒氣瞿麥穗赤小豆當歸川芎白芷黄耆赤茯苓各半兩辣桂甘草各二錢半右末毎二錢半酒調下乳香散治諸癰腫初發及火灼乳癰内消乳香半兩水銀粉一分黄蘖二兩半白芨一分白歛鉛丹大黄各一兩右為細散水調貼之有膿時乾摻消毒散内消癰疽惡毒當歸白芷甘草生赤小豆紫草茸各半兩貝母三兩右為散每服三錢空心酒温調下日再服内消托裏散治諸癰癤紅内消山蜈蚣蝦秋螂山茨茹甘草節各等分右為散每服三錢酒二盞煎取一盞服牽牛子散治一切癰疽瘡癤焮腫未穿先踈通臟腑牽牛子二兩一半生一半炒木香青橘皮湯浸去白焙陳麹炒各半兩右為末每服三錢五更初以生姜茶調下至天明通轉三兩行自止後以薤白粥補之鄭殿選方治癰發背七日前腫毒未潰者宜服則化膿血惡水自小腑中出去其毒自消𤓰蔞一枚甘草三寸乳香皂核大研皂角刺半兩去骨取皮右細末好酒三升銀石噐内熬至二盞微温兩次服大全内消散一名羚羊角散内消癰疽􅁖毒纔覺便服亦治發背穿山甲截片以榖芒糠炒脆三兩當歸半兩甘草二錢半生右為末每服三錢温酒調下一方甘草根浸酒調下内消散治瘡腫久不愈皂莢刺皮一兩為末乳香研二錢右為末勻和每服二錢酒一盞煎至七分温服其毒内消或微利是效内消散治發背癰疽腫毒痛苦不可忍者一名小車螯散車螯一枚背上紫色光厚者是用黄泥裹定火煆通赤放冷去泥擣為末右一味以栝蔞一枚打碎用酒一碗於銀石鍋内慢火熬及一盞濾去滓入膩粉一錢匕同以酒調晚後服之取下如魚涎為驗内消散癰疽毒方萌纔覺便服及治血氣凝滯手足赤腫一名穿山甲散一方蛤粉内炒穿山甲用穿山甲揷入糓芒熱灰中候焦黄為末入麝隨意每服二錢半温酒調下或𤓰蔞煎酒下尤妙日進兩服治些小癰癤方結未成不可用膏藥貼宜以藥塗使自内消方取生鹿角尖於砂盆内同老米醋濃磨時以鵝翎塗拂於癰癤四圍當中留一口遇乾再塗一二日即内消癰疽癤方每覺有些小癰疽疼痛發熱時便用生粉草節不炙不焙只日曬乾若無日於焙籠上微火烘乾碾為細末以熱酒調三二錢服連進數服疼痛與熱俱止蠣粉散治一切癰腫未成膿者㧞毒以牡蠣白者為細末水調塗乾更塗或乾貼效一方治軟癤用油調治一切癰腫未破疼痛令内消用生地黄杵如泥隨腫大小攤於布上摻木香末於中又再攤地黄一重貼於腫上不過三五度即瘥漏蘆煮散治瘡癤癰腫内消方見瘭疽類漏蘆湯蠟礬丸治癰疽發背瘰􅊓漏瘡惡瘡衛護内膜驅解諸毒自然内消神效方見諸癰疽類黄礬丸木占斯散治癰疽已成膿水内消方見發背類桔梗散内消丸治癰腫初生及瘰􅊓結核熱毒癤滯服之内消薄荷葉皂角不蛀者各半斤水煮軟牽牛半斤取頭末青皮陳皮各一兩上沉香半兩廣荗泡三錢荆三稜泡三錢右為細末并勻頭末用煎膏和丸如豆大每服三十丸煎連翹湯送下食後癰疽托裏法附論癰疽諸瘡氣血虚微肌肉寒冷膿汁清稀毒氣不出瘡久不合或聚腫不赤結硬無膿外證不見者並宜托裏邪氣外散膿汁早成毒有所泄而不内攻也方木香散治發背癰疽一切瘡腫托裏排膿木香黄耆細剉白歛木占斯芎藭當歸切焙細辛去苗葉桔梗赤芍藥㯽榔生剉敗醤甘草炙桂去粗皮羗活去蘆頭白芷各一兩右為細末每服二錢匕甘草煎酒調下空心午時日晚各一服以瘥為度内塞散治癰疽日漸焮長續斷人參芍藥熟地黄焙附子炮裂去皮臍枳殻去穰麸炒甘草炙剉芎藭細辛去苗葉桂去粗皮各一兩㯽榔剉一兩半黄耆剉當歸切焙各二兩肉蓯蓉切焙酒浸三分蜀葵去目并合口者炒出汗半兩右為散每服三錢匕空心温酒調下日再服補虚助氣飲治諸癰疽踈轉後宜服黄耆剉一兩人參白茯苓去黒尖甘草炙剉五味子芎藭獨活去蘆頭桂去粗皮青橘皮湯浸去白焙各一兩麥門冬去心焙當歸切焙杏仁去皮尖雙仁炒黄熟乾地黄焙各重一兩半右擣篩每服五錢水一盞半生姜三片􅀥二枚去核煎至八分去滓不拘時服托裏茯苓湯防風桔梗芍藥五味子川芎甘草熟地黄麥門冬去心桂去粗皮各一兩當歸黄耆茯苓各一兩半右為末每服五錢水一盞半煎去滓温服托裏榮衛湯風木之性上衝顔必忿色其人多怒其瘡之色亦黒赤腫硬微帶黯色其瘡之形亦奮然髙起結硬而作痛也其脉止在左手左手主表左寸外洪緩左闗洪緩而弦是客邪在於血脉之上皮膚之間宜急發其汗而通榮衛則邪氣去矣黄耆半兩防風二錢連翹二錢羗活一錢甘草炙一錢黄芩一錢人參一錢當歸身一錢半蒼术三錢紅花三錢桂枝五分柴胡二錢右㕮咀只作一服水酒各一大盞同煎至一盞温服内托千金散治腦背癰疽乳便等惡瘡人參當歸𤓰蔞白芷官桂黄耆芍藥川芎防風甘草桔梗金銀花各三錢右㕮咀每服湏秤七八錢重水二大盞煎至七分入酒半盞去滓温服如痛甚者倍加當歸芍藥或加乳香二錢日進三服一服之後瘡口内有黒血出者或遍身汗出皆藥之功效也如病勢猛惡湏稱藥一兩水一大椀煎服未成膿者自散已成膿者不用針砭自透此藥累經功效内托散當歸芎藭黄耆厚朴去皮桔梗防風甘草炒官桂去皮人參白芷芍藥各一兩右為細末每服三錢温酒調下或木香湯亦得此藥専治癰疽潰後内虛者或氣弱人初覺生瘡􅅑亦可服内消宜詳細用之一方無芍藥加大黄焙除桂末另研将各藥慢火焙乾為末後攤紙上出火毒然後将桂末拌和前藥調服御用托裏散當歸赤芍藥牡蠣大黄初覺者倍加火煨山梔子黄芩𤓰蔞白角針金銀花朴硝連翹已上各等分右為㕮咀每服三錢水一大磁盞同煎至七分去粗滓服不拘時候治一切惡瘡發背疔疽癰等瘡初出者只一服便消去毒腫甚欲作膿者喫二服能消膿收腫散血毒止痛甚妙如神用黄耆甘草各五錢水煎服托裏黄耆湯治癰疽諸瘡潰後膿出多内虚亦治發背黄耆細剉白茯苓去黒皮桂去粗皮麥門冬去心焙當歸切焙人參甘草錢半逺志去心各一兩五味子一兩半右篩毎服四錢水一盞半煎取一盞去滓温服不計計時候日二玉蘂托裏散黄茋四錢人參白芍藥當歸乳香熟地黄蓮花蘃沒藥甘草各三兩右為末毎服七錢酒水各一盞同煎至七分去滓温服滓再煎不拘時如有熱加連翹三錢托裏當歸湯當歸黄茋人參熟地黄川芎芍藥柴胡甘草炙各一兩右為末每服五錢水一盞煎至六分去滓食前温服托裏散治癰疽欲發未潰及已潰服之内托不使透膜𤓰蔞子去穣稱鬼腰帶皮皂角刺射干即仙人掌根開紅花者是天蘿𤓰茴香木鱉五个去殻漢椒各一兩右焙乾為末麫糊調作餅炙乾每服二三錢酒調下不飲酒木香湯調下托裏散川烏頭炮茯苓各三兩乾薑炮麻黄去節甘草各一兩半炙杏仁炒去皮尖五味子桂心各一兩右為粗末每服五六錢水一盞半煎至一盞去滓食前温服托裏六倍散治癰疽黄耆細剉一兩一分膿多倍之赤小豆三分口乾倍之芎藭半兩若肉未生倍之栝蔞去皮三分小便不利倍之白歛三分瘡口不合倍之當歸切焙一兩苦痛倍之右為細散温酒服三錢日三夜二凡癰疽大堅者未有膿半堅半有膿當上薄皮都有膿便可破之其破之法宜用逆上破之令膿易出膿深難見上肉厚宜火炙之若外不别有膿可當上按之内便隠痛中央堅者未有膿按之更痛於前者已熟也内追毒丹清心解毒散大硃砂雄黄各五錢生麝香一錢生犀角琥珀已上並别研細黒角沉香各五錢右為末煉蜜丸梧桐子大每服二十丸燈心薄荷湯下黄耆茯苓湯治諸瘡潰後托裏除虚熱黄耆白茯苓官桂去皮麥門冬五味子川烏各一兩右為粗末每服五錢姜三片􅀥三枚水一盞半煎一盞去滓温服食前日三服五香散治癰疽内攻五臟煩悶不安排膿托裏或似癰癤而使人頭痛惡心寒熱諸熱毒腫痛結核沉香剉乳香研丁香木香藿香各一兩右為細末入乳香和勻先以清酒五升黄耆五兩寸截缾内封閉浸一宿旋取一盞微温調下一錢匕日三夜二不可犯鐵器一方水煎服無黄耆服候瘡出膿加當歸半兩保安湯治瘡托裏或已成者速潰𤓰蔞新者一箇去皮尖焙金銀花十兩没藥通明者一錢研甘草生薑各半兩右為細末用無灰酒三升於銀石器内煎至一升分作三盞三次飲盡病微者只一服如托裏藥不能發散必作瘡者用此黄耆托裏散托裏内虛止痛黄耆白茯苓各一兩甘草生二錢半乳香别研一錢半右末每二錢酒一盞慢火煎如膏再添酒調服内虚加當歸托裏𤣥參散治托裏止渇解熱煩渇𤣥參人參甘草炙乾菊花各等分右為細末每服二錢菉豆湯調下亦名内托散托裏散𤓰蔞一箇去皮生甘草一寸右剉細用酒一盞煎至七分食後温服生犀散托裏排膿以皂角針不拘多少粗大紫者藏瓶中鹽泥固濟炭火燒過存性放冷出碾為細末薄酒微温調下暑月陳米飲下神仙截毒法治癰疽發背一切