body:
  text: 普濟方卷三百二十一明周王朱橚撰婦人諸疾門淋瀝附論夫婦人淋者由腎虚而膀胱熱也膀胱與腎為表裏俱主於水行於脬者為小便也臟腑不調為邪所乘腎虛則小便數膀胱熱則小便澁其狀小便疼痛澁数淋瀝不宣故謂之淋也小便不通脹滿氣喘急用藥無疑方木通散治婦人五淋木通榆白皮瞿麦穗大麻仁滑石各一両貝齒葵子白芽根各二兩甘草半兩右為粗末每服五錢水煎空心服葵根散治婦人五淋澁痛葵子一兩剉車前子二兩亂髪灰半兩甘草半兩炙㣲赤剉川大黄一兩剉㣲炒桂心一兩滑石二兩冬𤓰穰二兩乾者木通二兩剉甘草半兩炙㣲赤剉右為散每服五錢以水一大盞入生薑半分煎至五分去滓食前温服葵子散治婦人五淋小便澁腹痛悶石韋去毛王不留行滑石當歸剉㣲炒瞿麥赤芍藥琥珀甘草炙㣲赤剉各一兩右為細散每服食前以麥粥飲調下二錢琥珀散治婦人勞淋小便澁痛琥珀石韋去毛滑石葵子瞿麥各一兩當歸剉㣲炒赤芍藥木通各半兩右為細散每服食前以葱白湯調下二錢王不留行散治婦人勞冷淋小腹結痛王不留行一兩當歸二分剉㣲炒亂髪灰半兩葵子三分車前子三分鯉魚齒一兩細剉赤芍藥三分枳實半兩熬炒㣲黄右為細散每服食前以温酒調下二錢赤茯苓散治婦人氣淋冷小便澁赤茯苓葵根桂心石韋赤芍藥琥珀木通剉各一兩青橘皮三分湯浸去白穣焙右為散每服三錢以水一中盞入生薑半分䓤白二莖煎至六分去滓食前温服蜂房散治婦人五淋小便澁痛不通露蜂房灰白茅根葵子亂髪灰車前子滑石各一兩右為細散食前以燈心湯調下一錢滑石散治婦人熱淋滑石一兩車前子瞿麥各三分海蛤茅根葵子各三分右為細散入研了藥令勻每服食前以燈心葱白湯調下二錢貝齒散治婦人結熱成淋小便引痛或時溺血如小豆汁貝齒葵子三分石燕滑石各三兩右為細散研過食前以葱白湯調下二錢治婦人血淋及尿血澁痛亂髪一兩牛耳中毛半兩右同燒為灰細研每服食前以温酒調下半錢金沙散治淋海金沙草隂乾右為末煎生甘草湯調二錢甚者不過三四服又方用真琥珀研細不以多少研麝香白湯調下治婦人淋病白术二兩炒令黄色去節最細者炒右為細末每服五錢用石韋葉煎湯下治婦人諸般淋右用苦杖根俗呼為杜牛膝多取凈洗碎之以一合用水五鍾煎至一中盞濾去滓用麝乳香少許研調下勒縣式尉耿夢得其内人患沙石淋十三年每旋痛楚不可忍溺器中小便下沙石剥剥有聲百般不效偶得此方服之一夕而愈目所視也治小便淋瀝用琥珀為細末每服三錢濃煎葱白湯調下出瑞竹堂方治婦人淋右自取甲燒灰以水調服一作酒服石韋散治婦人小便卒淋瀝石韋黄芩木通榆白皮葵子瞿麥穗甘草右䓁分為粗末每半兩水一盞半薑三片煎至七分去滓熱服一方食前生液湯治小便秘澁淋血蒲黄一兩炒木通黄芩各二兩瞿麥滑石半兩甘草二錢半炒右㕮咀每服二錢水一盞煎至七分温服之鷄蘇散治婦人血淋鷄蘇葉木通各二兩生乾地黄滑石各三兩刺薊一兩右為粗末每服半兩水一盞淡竹葉三七片煎至七分去滓食前温服治婦人血淋及尿血澁痛生乾地黄三兩鬰金蒲黄各二兩右為細末每服二錢車前子葉煎湯調下日三服以愈為度桃膠散治婦人氣淋勞淋桃膠榆白皮各一兩車前子冬𤓰子鯉魚齒葵子瞿麥木通各半兩枳殻一分右㕮咀每服三錢水一盞煎至七分去滓温服一方無葵子有生薑半分葱白二莖同煎食前分二服法製香附子治諸血淋瀝婦人崩漏及産後水瀉大香附子杵去毛皮右以童子小便浸一宿細截碎又用米醋蘸過焙乾研為末每服二錢米飲調下治冷帶用炒艾葉煎湯調下香附子丸治婦人淋瀝崩血淨香附各半兩酒浸煮受焙右為末黄秫米糊丸如梧桐子大每服五十丸米湯下楮實子丸治婦人憂思傷脾不能化水所以湛濁或下赤白淋瀝不乾平臟益氣血川牛膝二兩酒浸焙乾川萆􅐺一兩楮實子三兩焙山藥白薑炮川芎各一兩一方加附子鹿角霜各一兩右為末用大北棗蒸去皮取肉研為膏同丸如桐子大每服四十丸空心米飲下蜜丸亦可分清丸散治婦人經後不調湛濁淋瀝男子治濁亦可益智仁川萆蘚石菖蒲白茯苓烏藥各一兩甘草四錢右㕮咀每服三錢鹽一捻同煎服斷下丸治婦人血氣虚弱漏下五色淋瀝不斷白龍骨乾薑白茯苓牡蠣伏龍肝黄耆厚朴烏梅肉黄牛角腮燒灰海螵蛸赤石脂醋浸炒研各一兩右為末煉蜜丸如梧子大每服四十丸霜梅湯下治婦人結氣成淋小便引痛上至小腹或時溺血或如豆汁或如膠飲每發欲死食不生肌面目萎黄貝齒四枚炒作灰葵子一升石膏五兩滑石三兩末右以水七升煮四物取二升去滓内未煉猪脂一合更煎三沸分三服日三不瘥再合服一方加阿膠搗炒小便出血夫婦人小便出血者由心主於血血之行身通經絡環臟腹血性得寒則凝澁得熱則流散失其常經溢滲入於脬内故小便血也方茜根散治婦人小便出血心神煩悶茜根當歸剉㣲炒甘草炙㣲赤剉貝母煨㣲黄丹皮𤓰蔕羚羊角屑各一兩栢葉㣲炙一兩紅藍花二兩生乾地黄三兩右為末每服三錢以水一鍾煎至五分去滓食前温服鹿茸散出聖惠方治婦人勞損虚羸尿血鹿茸當歸熟乾地黄葵子蒲黄續斷等分右為末酒調二錢日三服當歸散出聖惠方治婦人小便出血或時尿血龍骨黄芩當歸剉㣲炒生乾地黄茜根各三分右為細散每服煎青竹茹湯調下二錢日三四服龍骨散出聖惠方治婦人尿血不止羚羊角散龍骨當歸當歸蒲各一兩生乾地黄二兩右為細末粥飲調下二錢食前服當歸散出聖惠方治婦人小便出血或時尿血當歸羚羊角屑赤芍藥各半兩生地黄二兩刺薊葉三分右粗末每服三錢水煎去滓服生乾地黄出聖惠方治婦人尿血不止生乾地黄三兩栢葉黄芩各半兩阿膠炒成珠一兩右為粗末每服三錢水一盞薑三片煎至七分去滓温服牡蠣粉車前子桂心黄芩各半兩右為細末每服以粥飲下二錢日三四服治婦人無故尿血出聖惠方桂心鹿角屑大豆黄卷各一兩右治下篩酒服方寸匕日三大黄散出聖惠方治婦人卒傷熱尿血川大黄半兩剉㣲炒川芒硝半兩蒲黄三分右為細末食前以冷水調下二錢治婦人無故小便出血出聖惠方甜𤓰子㣲炒重葉蜀葵花各一兩右為細末每服濃煎木通燈心湯半琖入童子小便一合調下二錢日三服或四服治婦人小便出血不止出聖惠方馬兠鈴根刺薊根各一兩右為細散每服食前當歸酒調下二錢膏髪煎出大全良方治婦人穀氣實胃氣下泄食入即嘔隂中出血頭髪灰猪脂右調停綿褁如棗核大納之有效髪灰散出聖惠方治小便尿血或先尿而後血或先血而後尿亦逺近之謂也又治飲食忍小便或走馬房勞皆致乳轉臍下急痛不通兼治肺疽心衂内崩吐血一兩口或舌出血如針孔若鼻衂㕮内立已亦治久痢不安下血成片亂髪灰本草云能療瘀血通開膈利水道破癥瘕消癰腫治尸疰雜瘡及脬轉利大小便止欬𠻳鼻衂右一味用二錢以米醋二合湯少許調服井華水調亦可服藥訖即炒黒豆葉蹲其上則通瘡癤之毒以温酒空心服治婦人小便出血或時尿血出聖惠方生地黄右搗取汁每服一小盞日三服又方出聖惠方右蒲黄末酒調二錢服之或水調服又方出聖惠方鹿角膠三兩炙令黄右用水二大琖煎至半琖去滓分為三服食前服治卒傷於熱尿血右人忽小便後出鮮血數㸃不勝驚駭却全不疼如是一月若不飲酒則血少終不能止偶有鄉兵告以市醫張康者常療此疾遂呼之來供一器汁云是草藥添少蜜以水兩服而愈既厚酬之遂詢其藥名乃鏡面草一名螺靨草其色青翠所在石階縫中有之治婦人常無故尿血出聖惠方右龍骨以一二兩酒調方寸七空心日三服久者二十服愈治婦人無故尿血出本草胡鷰窠中草燒末右用酒服半錢亦治丈夫又方出千金方取夫𤓰甲燒作灰酒服之又方出聖惠方右鹿䓤濃煎作湯每服一小琖日三四服又方出聖惠方右以律草搗絞取汁每服一小琖日三四服又方出聖惠方棘刺一兩剉右以水二大盞煎至一大琖分為二服食前温服治婦人無故尿血及遺尿不知時出出千金方右取故船上竹茹曝乾搗末酒服方寸七日三服治婦人無故尿血出千金方爪甲亂髪右並燒末等分酒服方寸日三飲服亦得治尿血并五淋砂石疼痛不可忍出永類鈐方人參黄耆各一兩百合半兩蒸飛羅麫一兩右為末煎白茆根湯調并治咳血又方出永類鈴方治淋而出血片痛甚以空心鹽湯下鷄蘇丸收效用此方有理治婦人無故遺血溺出本草書中白衣魚三十箇内陰中衣魚今人呼為蠧魚在衣書中出也小便不通附論大小便秘者腎與膀胱俱主水行於小腸傳於胞中滲入胞内而為溲溺二經若内生熱於小腸傳於胞中故膀胱熱熱則小便不通利成淋瀝之症若小便腸腹急滿而𦂳痛者胞轉也但生津液和氣而自愈妊娠小便淋瀝者名曰子淋產後小便不通利者因津液竭血氣虚熱於膀胱或小便澁秘而難也宜與生液湯治之血弱者為經絡勞傷氣血弱浼入膀胱故血隨下宜服生液湯方葵子散出聖惠方治婦人小便不通及大便離葵子車前子川大黄剉㣲炒冬𤓰仁當歸已上各三分木通半兩剉滑石一兩甘草半兩炙㣲赤剉右為散每服三錢以水一中盞煎至六分去滓食前温服榆皮出聖惠方治婦人小便不通小腹疼痛榆白皮剉木通剉赤芍藥猪苓去黒皮滑石各三分葵子黄芩各半兩右為細散食前以木通湯調下二錢四七湯出瑞草堂方治婦人女子小便不順甚者陰户疼痛半夏一兩湯泡七次厚朴薑製赤茯苓各五錢紫蘇葉二錢甘草二錢香附子五錢右為㕮咀分作四服每服水二盞生薑五片煎至七分去滓加琥珀末一錢調服木通散出聖惠方治婦人小便不通木通三分車前子甘草各半兩炙㣲赤剉葵根三分瞿麥半兩滑石一兩右為散每服三錢以水一中琖煎至六分去滓食前温服治婦人卒小便不通出聖惠方陰地草一兩燒灰滑石半兩葵子一兩右為細散每服於前食以葱湯調服一二錢治婦人忍小便不得依時而起致令胞轉經四五日困篤欲死出聖惠方滑石二兩亂髪灰一兩右研停取桃白皮一斤熟搗以水三盞絞取汁無時温半盞調二錢服治婦人卒小便不通出聖惠方杏仁七枚炒令黒色滑石一分右研為末以熱酒調頓服之立通治婦人小便不通或急欲悶死鹽二斤右搗碎熱熬令熱布褁熨臍下挼小便漸漸令出不住挼熨以通快即止又方右以濕生蟲十七枚爛研新汲水調頓服之立通又方右用車前子二兩為末食以井華水調下二錢治婦人小便不通用亂髪如拳大燒灰細研以温酒下二錢立通治婦人不得小便用杏仁七粒去皮尖麫炒黄為末水調服立通又方用紫苑末幷花水調服取三指攝立通又云紫花皆可用治小便不通曽有一婦人患此諸醫遍用淋閉藥者無非逆滑之劑並無效驗忽遇一醫士診視云左右手尺脈皆沉而㣲其證乃隂虛小便難故也遂用大附子一箇八錢重去皮臍炮熟放鹽水内浸良久同不蛀澤瀉八錢重合作三服每服用燈心七莖煎服隨通而愈治婦人卒不得小便出大全良方右用紫苑末以井花水服三捻小便血服五捻止凢用紫􅁐去蘆頭去土了用東流水淘洗令淨用蜜浸一宿至明於火上焙乾用葵根歛子出聖惠方治婦人小便不通葵根二兩滑石紫葛剉瞿麥各半兩白茅根三分右剉細和勻每服半兩以水一大盞入葱白五寸煎至五分去滓每於食前温服火府丹治心經熱小便澁兼治五淋生乾地黄木通黄芩各一兩右為細末煉蜜為丸如梧桐子大木通煎湯三十丸此藥治淋瀝臍下滿痛許學士云一卒病渇日飲水一斗不食者三月心中煩悶時已十月子謂心經有伏熱與此藥數服越二日渇止又飲食如故此本治淋用以治渇可謂通變也葱白湯出大全良方治卒􅤒不通小腹膨急氣上衝心悶絶欲死此由暴氣乗并膀胱或從憂驚氣無所伸鬰閉而不流氣衝脬系不正診其脈右澁小左手急大橘皮三兩葵子三兩葱白一莖右㕮咀水五升煮取二升分三服禹餘粮丸治便澁疼痛右用餘粮不以多少為末以麩糊為丸如梧桐子大每服五十丸木通湯下血分椒仁丸出永類鈴方治婦人腫滿小便不通由經血不通遂化為水乃審氣脈虚實椒仁甘遂續隨子郁李仁黒牽牛五靈脂碎炒當歸吳茱茰延胡索各半兩芫花醋浸一宿炒黄石膏各一分信砒膽礬各一錢斑蝥糯米炒黄去米芫青各三十枚去頭足翅糯米炒黄右為末麫糊丸莞豆大每服一丸橘皮湯下脬轉附論夫婦人脬轉之病者由過飽所廹或忍小便俱令水氣還廹於脬積聚不得流通外水應入不得入内溲應出不得出内外壅滯滿不通故為脬轉其症小腹急痛不得小便甚者至死不可救也方亂髪散出聖惠方治婦人忍小便不得時起致令脬轉經四五日困篤欲死宜服此亂髪一斤燒灰滑石三兩鯉魚齒一兩右為細末散不計時候以温水調下二錢治婦人過忍小便致脬轉出聖惠方右以車前子一斤切水七升煮至三升去滓每於食前温一中琖服又方右用浮華草二兩乾者水煎至三升去滓每於食前温一中琖服湯下一錢亦通小便利流腫又方右自取爪甲燒灰細研水調服之又方右以梁上塵研令極細水調一錢服之滑石散治婦人丈夫脬轉小便數日不通滑石一兩寒水石一兩葵子一合右為末以水一斗煮取五升時時服一升即利一方喬下局方八味丸尤佳又方亂髪燒灰葵子車前子右等分為末每服二錢茶湯調下蒻葉散治婦人脬轉小便不通亦可治男子褁茶蒻葉燒灰一兩滑石研細半兩右研停沸湯調二錢服石韋湯治脬轉小便不通石韋去毛車前子右等分為粗末每服五錢水二盞煎至一琖去滓服八味丸治婦人病飲加渇煩熱不得卧而反倚息以脬系轉戾不得溺故致此病名轉脬但利小便則愈以此藥有茯苓故也一名腎氣丸熟地黄八兩山藥茱茰去核各四兩附子炮桂心各二兩牡丹皮去心茯苓去皮澤瀉各三兩右為末蜜丸如梧桐子大每服三十丸空心温酒下治婦人過忍小便致脬轉不得溺用滑石末葱湯或葱酒調下二錢七服下小便數附論夫婦人小便數者由腎與膀胱俱住於水腎氣通於隂此二經俱虛而有熱乗之則小便澁虚則小便數也方鹿茸丸治婦人久積虚冷小便白濁滑數不禁鹿茸去毛塗酥炙㣲黄椒紅㣲炒桂心附子炮製去皮臍各一兩牡蠣燒㣲粉一兩桑螵蛸三分㣲炒補骨脂一作骨碎補石斛去根剉沉香肉從蓉三分酒洗去皺皮㣲炙鷄肶胵㣲炙已上各一兩右為細散酒煮麫糊和丸如梧桐子大每服食前以温酒下二十丸鹿茸丸治婦人久虛冷小便日夜三五十行腎與膀胱二經俱虚而有熱乗之則小便澁虛則小便數鹿茸烏賊骨桑寄生各一兩龍骨各一兩白芍藥當歸附子各三分桑螵蛸半兩右為細末食前温酒調下二錢服鷄肶脛散治婦人小便數鷄肶胵十貝㣲炒桑螵蛸半兩㣲炙厚朴一兩去粗皮塗生薑汁炙令香熟􅌝蔞一兩剉當歸一兩炙㣲赤剉熟乾地黄一兩甘草一兩炙㣲赤剉沉香肉蓰二分酒洗去皺㣲炙鷄肶胵㣲炙已上各一兩右為細散末煑麫糊和丸如梧桐子大每服食前以温酒下三十丸鹿茸散治婦人久虛冷小便日夜三五十行腎與膀胱二經俱虛而有熱乗之則小便澁虚則小便數鹿茸烏賊骨桑寄生龍骨各一兩白芍藥當歸附子三分桑螵蛸半兩右為細末食前温酒調一二錢服鷄肶胵散治婦人小便數鷄肶胵十具㣲炙桑螵蛸半兩㣲炙厚朴一兩去粗皮塗生薑汁炙令香熟􅺠􅌝一兩剉當歸一兩炙㣲赤剉熟乾地黄一兩甘草一兩炙㣲赤剉右為散每服三錢以水一中盞入生薑半分煎至六分去滓食前温服􅺠􅌝散治婦人虛冷小便滑數􅺠􅌝剉桑螵蛸㣲炒附子炮製去皮臍龍骨各二兩韮子半兩㣲炒桂心半兩右為細散每服食前以温酒調下二錢牡蠣散治婦人臟腑久冷小便滑數牡蠣二兩燒為粉龍骨一兩鷄肶胵十片㣲炙吳茱茰一分湯浸七遍焙乾㣲炒附子一兩炮製去皮臍鹿角屑一兩炒黄右為細散每服食前以温酒調下一錢匕桑螵蛸治婦人虗冷小便數桑螵蛸三十枚炒鹿茸牡蠣粉甘草二兩黄耆半兩右㕮咀每服三錢水一琖煎至七分熱服四倍湯治小便頻數人參牡蠣半兩鹽泥煆赤石脂一兩醋浸七次菖蒲三兩右為細末煎薑湯調下一錢服龍骨丸治婦人小便滑數龍骨二兩煆過鹿茸去毛塗醋炙㣲黄椒紅㣲炒附子炮製去皮臍各一兩右為細散以酒煮麫糊丸如梧桐子大每服食前温酒下二十丸又方右用鹿角屑炒令黄擣為細散每服食前温酒調下二錢又方右雞肶胵㣲炒搗為細散每服食前以温酒下一錢遺失不禁夫膀胱不利而又有時致遺尿者乃心腎之氣傳送失度之所為也故有小便澁而遺者有遺而不自知者有婦人産後調理不慎致傷膀胱遺尿無時者又有脬寒臓冷而遺尿不禁者方治婦人遺尿不知出時白薇白芍藥等分右為末酒服方寸七日三服空心又方白礬牡蠣䓁分右為細末飲服方寸七亦能療丈夫遺尿一方酒服又方右用桑螵蛸酒炒為細末每服二錢生薑湯調下一方食前服之一用米飲調服療婦人小便不禁下血用雄鷄㧞領翎燒灰為末酒服方寸七治婦人遺尿不知出時右敗船茹為末酒調服三錢又方用胡燕窠中草燒末酒服半錢匕亦治丈夫又方用遺尿人下卧薦草燒灰服之瘥大便不通夫婦人大便不通者由五臟不調冷熱之氣結於臟胃則津液燥竭大腸壅澁大便不通也仲景云婦人經水過多則亡津液亦大便難也初虞世云余歴觀古人用通藥率用降氣等藥葢肺氣不下降則大腸不能傳送以杏仁枳殻訶子等藥是也又老人虚人風人津液少大便秘經云澀者滑之故用胡蔴杏仁麻子仁阿膠之類是也今人學不師古妄意斟酌每至大便秘燥即駛藥蕩滌之大耗津液氣血非不暫效旋更秘澁兼生它病昔有人始病風淫末疾為醫者以駛藥屡利之後為肺痿咯膿血卒至大便不通所以古人服藥尤謹重不若今人之輕生故舉此以戒後人經云春復於風夏必食飱泄葢木氣刑上土不能滲泄則木氣勝故泄風行津液燥故秘即不可專以秘燥為風也昔有人年七十日下利十行百方治之不愈又若腰脚拘攣醫者以痢醋棗仁治拘攣而利愈又有人秘結以前藥投之而大便利故知秘與利比出於風也方調氣丸治婦人大便不通㯽榔羌活桂心芎藭木香等分郁李仁湯浸去皮㣲炒川大黄剉㣲炒牽牛子半生半炒熟青橘皮湯浸去白穰焙各一兩右搗羅為散煉蜜擣五七百杵丸如梧桐子大空心以温生薑湯下三十丸大五柔丸主臟氣不調大便難通榮衞利九竅進飲食大黄斗米下搗勻焙枳殻去穰麫炒白芍藥葶藶炒香别研牛脂蓯蓉酒浸軟温水洗切焙各一兩桃仁百枚杏仁四十枚並去皮尖麫炒黄别研右除有油藥並為末煉蜜丸入牛脂桃仁杏仁葶藶杵數十下丸如梧桐子大米飲下三丸日三服腹稍空時服未知稍增以知為度牽牛子散治婦人大便不通木香半兩郁李仁去皮㣲炒青皮去白木通枳殻去白麫炒桂心各一兩黑牽牛三兩半生半炒右為細末每服二錢如煎茶一沸攬起方温空心服郁李仁散治婦人大便不通搜風轉氣郁李仁二兩湯浸去皮㣲炒牽牛子一兩㣲炒神麯㣲炒桂心木香青橘皮湯浸去白穰焙㯽榔各半兩右為細散空心以薑茶調下二錢通神散治婦人大便不通熱而實者方可投此藥其證心腹脹痛食不得進心胃煩悶六脈沉滑而實是其證也大黄芒硝㯽榔桃花郁李仁湯浸去皮兩㣲炒各一木香右為細末每服二錢空心粥飲調下木香丸治婦人氣壅大腸秘澁宣轉木香川大黄剉㣲炒桂心㯽榔青橘皮湯浸去白穰焙各一兩巴豆半兩去皮心用新汲水浸三日後㣲炙炒令黄研紙裹壓去油右為末入巴豆研令勻用麫糊丸粟米大每服以温水下七丸大麻仁丸治婦人腸胃風結大便常秘大麻仁去殻秤别研如膏大黄各二兩炒㯽榔木香枳壳各一兩右為細末與麻仁研停煉蜜丸如梧桐子大空心温水下每服二十丸調導飲治婦人産前後風秘大便不通當歸川芎防風枳殻製各四分甘草炙二分右細剉每服三錢食前薑棗煎服忌動風物二仁丸杏仁去皮尖麩炒黄麻仁别研枳殻去穰麩炒赤訶子火炮搥去核右二物各一兩為細末同二仁杵煉蜜和杵丸如桐子大温水下二三十丸未效稍增潤腸丸治大腸結澁麻黄炒半兩枳殻半兩炒大黄蒸香一兩右為末煉蜜丸如梧桐大每服三十丸食前芝麻湯下此藥常服滋潤大腸通利燥澁大便悶者三焦不順五腸不和風之結腸胃津液枯燥大腸壅滯所以不利大便同也產後更衣難香腸本大熱又因水窄無俱津液暴竭腸胃熱澁故便便閉潤腸丸主之潞公盛夏間苦大腑不調醫官李琬即以赤石脂龍骨乾薑等藥饋公服之因不大便者累曰具熱辨甚苦公又不喜服大黄藥予告曰此燥在直腸藥所不及調以蜜導之公為然作蜜兌是夕三用藥下結糞四五十枚大如胡桃色黑如椽粟公二三日間飲食如故葢世有一種虛人不可服利藥今載其法大棗湯治婦人腸燥悲傷欲哭家若神灵數次有此主之一名小麥湯甘草二兩小麥一升大棗十枚右㕮咀以水六升煮取三升去滓分服亦補脾氣轉治婦人一名甘草湯士夫程虎卿内人姙娠四五箇月遇晝則慘慼悲傷淚下數次如有所慿醫與巫者兼治無益有人以此證告之管先生伯說記先生曽說此證名曰腸燥悲傷非大棗湯不愈虎卿對證治藥一枚而愈矣古人識病製方種種妙絶如此試而後知芫花丸治婦人便秘澁芫花半兩醋拌炒令乾青橘皮半兩湯浸去皮白穰焙川大黄三分剉㣲炒右為末煉蜜和丸如梧桐子大食前以生薑湯下十丸𤣥豆丸治婦人夾宿食大便不通𤣥豆一分炙令焦去皮子巴豆五枚去皮心紙褁壓去油香墨二錢右為細末入巴豆研令勻以醋煮麫糊和丸如梧桐子大每服一丸嚼乾柿褁以温水下治風入脚氣人大便或秘或利虛人老人方一名皂莢丸皂莢子三百枚破作片子慢火炒燥甚即入醋棗大又炒燥又入酥至焦黒為末右煉蜜丸如梧桐子大每服三十丸煎􅂒酸棗仁湯下空心服兩時久未利再進一服漸加至百丸不妨以通為度蒺䔧湯蒺䔧不以多少炒至赤黒色臼内以水棒舂去揀􅉫淨每服蒺䔧三兩以酸棗仁一兩炒令香用杵為末馬尾羅筯每三錢水一琖煎至七分去滓温服下前丸子藥蜜兌方好蜜四五兩銀石器中㣲火熬不住手以匙攪候可丸見風硬即以蛒蛤再作治婦人臟燥自笑哭用棗燒灰存性米湯嚥下無時候粉塗手揑作人状長三寸許厠上内之以手掩定大便通放手未扶牽牛丸治婦人大便不通心腹虛脹黑牽牛二兩生青皮去白一兩木香半兩右為細末煉蜜丸如梧桐子大空心温水下每服二十丸葱白湯治婦人裏急不已方阿膠葱白等分右以水煎温服不以時立效痔附論夫婦人痔瘻者皆由酒色氣風食及勞傷經絡其血滲而成之亦有長年久坐而成者其痔有五種肛邊瘡如乳出於外時出膿血者為牡寺也肛邉腫生瘡而出血者為牝痔也肛邊生瘡痒而復痛者為脈痔也肛邊腫核痛發寒熱而出血者為腸痔也因便轉而清血隨出者為血痔也方槐耳丸治婦人久痔下膿血不止槐耳㣲炒牛角䚡炙令黄禹餘粮燒醋淬二遍各二兩猪懸蹄甲十枚炙焦黄麝香一分研白歛黄蓍剉艾葉㣲炒蒲黄白馬蹄酒煮一宿令炙黄續斷當歸剉㣲炒熟乾地黄鰻鱺魚頭炙㣲黄蝟皮炙令黄焦已上各一兩右為末煉蜜和丸如梧桐子大每服食前以粥飲下三十丸龜甲散治婦人痔肛門腫痛下血龜甲二兩炙㣲黄磁石搗碎水飛過敗舡茹亂髪灰當歸剉㣲黄赤芍藥木賊延胡索桑耳黄蓍剉白甆細研碎水飛過已上各一兩麝香二分細研右為細散每服食前以粥飲調下二錢拘腸丸治諸般疼疾肛邉腫痒或生痛膿血或下血腸出不入有效此方不可亂𫝊白礬緑礬各五錢訶子十枚枳殻五錢白附子十箇天南星五錢半夏三錢𤓰蔞三錢蝟皮十箇胡桃仁十箇雞冠花右十一味醋煮麫糊為丸每服二三十丸用酒吞下空心服之槐子仁散治婦人痔疾肛門痒痛下血不止槐子一兩半㣲炒簹實蝟皮炙令黄色桑耳木賊黄蓍剉當歸剉㣲炒烏賊魚骨各一兩皂莢子半兩㣲炒枳殻半兩麩炒㣲黄去穰麝香半分研入右為細散入研了藥令勻每服食前以荆芥湯調下二錢蝟皮散治婦人久痔下膿血疼痛腫悶蝟皮炙令黄㫁續㫁槐子㣲炒連翹附子炮製去皮臍乾薑炮製剉黄蓍剉當歸剉㣲汁浸白礬熟乾地黄各一兩右為末煉蜜和搗三五百杵丸如梧桐子大每服於食前煎桑根白皮湯下三十丸硫黄丸治婦人痔疾久不止臟腑虛冷面色萎黄食少無力硫黄細研白礬灰蝟皮炙令黄􅀈藤子去殻㣲炒附子炮製去皮臍當歸剉㣲炒木香已上各一兩猪牙皂莢半兩炙焦烏賊魚骨右為細末以酒煮麫糊和丸如梧桐子大每服煎生薑湯下二十丸皂莢刺丸治婦人痔疾久不止皂莢刺一兩炒令黄野狸頭一枚炒令黄蝟皮一片炙燒灰烏蛇肉一兩酒拌炒令黄槐子仁一兩㣲炒榼藤子一兩去殻微炒麒麟竭半兩麝香一分右為末以麫糊和丸如梧桐子大每服食前以當歸湯下二十丸鼈甲散治婦人五種痔疾鼈甲露蜂房蛇蛻蝟皮猪後懸蹄甲五味炙存性各二兩麝香一分右各研為細末和藥合停每服一錢空心用生薑地黄煎湯調下肛門有竅腫痛傅之即愈忌生菜穿山甲散出聖惠方治婦人痔疾穿山甲一兩炙黄色榼藤子一兩去殻微炒麒麟竭半兩露蜂房半兩㣲炒蝟皮一兩炙令黄色麝香一分右為細散入研了藥令勻每服食前以當歸湯調下一錢蜜陀丸治婦人痔疾面色痿黄蜜陀僧一兩燒令赤白礬灰一兩槐子仁半兩㣲炒皂莢灰一分鷄冠花半兩百草霜半兩右為細散以麫糊和丸如梧桐子大每服食前以栢葉湯下一十丸枳殻散出聖惠方治婦人痔疾痒痛不可忍宜熨枳殻二兩木香半兩鬼箭羽二兩鬼臼一兩槐子仁一兩右藥麄搗以慢火炒令熱用青絹包褁看冷熱熨之黄􅌝􅌣散出聖惠方治婦人痔疾黄􅌝􅌣一枚白礬二兩蝟皮一片剉右藥都入甆瓶内葢口以炭火漸煆令通赤候冷取出細研每服食前以枳殻湯調下二錢黑龍丸出聖惠方治婦人痔疾下血疼痛不可忍黑龍尾煤亂髪灰神麯㣲炒已上各一兩右為末以􅀥肉和丸如梧桐子大每服食前以枳殻湯下二十丸露蜂房散出聖惠方治婦人五痔有頭出膿血不止宜傅露蜂房半兩剪碎㣲炒蝟皮一兩燒灰麝香一兩右同研令細旋取滲於痔頭上白礬丸出聖惠方治婦人痔疾久不差白礬灰附子炮製去皮臍為末各二兩右研令細勻以湯浸蒸餅和丸如梧桐子大毎服荆芥湯下二十丸日三服一方蜜和丸酒服治婦人久痛心焦多怒遂成痔疾狀如蓮子熱腫而痛出大全良方右用熊膽入梅花惱子研更有猪膽汁調開塗痔立愈療痔熱腫痛出大全良方蛞蝓大者一條江西名蜒蚰湖北名石莢子廣州名鼻涕虫右研令爛入研了龍腦一字坯子半錢研令停傅之愈先以石薜荔煮水重洗尤妙腸風下血附論夫婦人臟腑損傷風邪易入凡熱氣在内令人下血氣在内亦大便血色或如小豆汁腹中疼痛有先便後下血者血來逺先下血後便者血來近逺近者言病在上焦下焦也婦人面色血氣時寒時熱脈浮弱按之絶者為下血也方艾葉丸出聖惠方治婦人肚腹裏滿臍下㽲痛大便下血不止艾葉一兩㣲炒鼈甲一兩半塗醋炙令黄去裙襴當歸一兩剉㣲炒白龍骨二兩附子一兩炮裂去臍皮乾薑一兩炮裂剉赤芍藥三分卷栢一兩半右為末煉蜜和搗三五百杵丸如梧桐子大食前以粥飲下三十丸桑耳散出聖惠方治婦人大便下血小腹中切痛不止桑耳㣲炒牡蠣粉龍骨當歸剉㣲炒白芍藥各一兩黄芩甘草各半兩炙㣲赤剉右為細散食前以粥飲調下二錢烏賊魚骨丸出聖惠方治婦人下血或似小豆汁烏賊魚骨一兩芎藭三分熟乾地黄一兩半茜根一兩當歸一兩剉㣲炒白芍藥三分阿膠二兩搗碎炒令黄焦右為末煉蜜和搗三五杵丸如梧桐子大食前粥飲下三十丸側栢散治婦人大便後下血不止側栢一兩㣲炒龍骨二兩鹿角膠搗碎炒令黄色熟乾地黄木香當歸剉㣲炒令黄色右為細散食前以粥飲調下二錢阿膠丸出聖惠方治婦人大便後下血不止阿膠一兩搗碎炒令黄色烏賊魚骨白芍藥各二兩當歸一兩剉㣲炒劉寄奴一兩右為末煉蜜和搗三二百杵丸如梧桐子大食前以粥飲下二十丸烏龍丸出聖惠方治婦人大便後下血不止腹内疼痛烏龍尾煤伏龍肝香墨當歸剉㣲炒各一兩皂莢子仁半兩㣲炒右為末以麫糊和丸如梧桐子大每服食前以生薑艾葉煎湯下二十丸腸風黑散出永類鈴方治榮衛氣虚邪冷進襲腸腑之内或食生冷或啖炙煿或飲酒過度積熱腸間致使脾胃虛弱糟粕不聚大便鮮血臍腹疼痛裏急後重或肛門脫出或久患酒痢大便頻併並皆治之敗棕燒木饅頭燒烏梅去核粉草炙各等分右為細末每服二錢水一琖煎至七分空心温服僕常治一婦人便血不止用煮附圓加五灵脂效防風如神散出大全良方治婦人風虛大便後時時下血防風枳殻等分右㕮咀每服三錢水一盞煎至七分去滓空心服治婦人大便下卒血不止出聖惠方巴豆一枚炒灰亂髪如鷄子大燒灰右細研以酒三合調頻服之治腸風下血出大全良方枳殻十五合每合入巴豆三枚去殻皮安在綿纒之用好米醋酒於砂盆内煮候醋乾更加無灰酒煮令糜爛去巴豆研成膏右以黄蓍五兩為末入膏内為丸如梧桐子大每服二十丸空心米飲吞下酉亦可治臟風出聖惠方右以蒼术不以多少以皂角濃挼汁浸一夕次日煮令水乾焙焦為末麫糊和丸如梧桐子大米飲空心下五十丸日三服治婦人大便卒下血不止出聖惠方右以豉一升水三大琖煮取一盞去滓分三服一日温温服盡荆芥穗散出大全良方治婦人風虚大便後時時下血宜服荆芥穗黄蓍熟地黄桑耳地榆㯭白皮皂角刺乾薑槐豆牛旁子當歸甘草右等分為細末每服二錢粥飲調下空心服木香烏荆丸出大全良方治腸風酒痢木香一分荆芥穗川烏炮各一兩右為末酒糊如梧桐子大每服二十丸食前臨卧濃煎粟根白皮酒吞下忌羊血地榆湯出大全良方經云結陰者便血一升再結者二升三結者三升地榆四兩甘草一兩半縮砂仁四十枚右為粗末每服三錢水一盞煎至七分滓去淨空心服艾薑湯出直指方治大便下膿血艾葉一握黑豆百粒右新水一大盞煎至六分入生薑汁三大匙稍熱服又方出直指方黄連二錢南木香一錢右剉細慢火煎食前服治腸風下血出大全良方赤芍藥一兩瓦上燒存性右為細末温酒下二錢脫肛附論夫肛門者大腸候也大腸虛冷其氣下衝肛門反出亦有産後因用力努軀氣衝其肛亦令反出也方治大腸久積虛冷每因大便脫肛收不得出大全良方右蝸牛一兩去殻生研以猪脂和傅之立愈藥性論曰蝸牛有小毒能治大腸脫肛范旺方云此螺全似蝸牛色黄而小雨後好緑桑葉者佳孫真人同姚和衆方出大全良方治男子婦人小兒大腸虚冷肛門脫出右以鐵精粉傅之良聖惠方亦治隂脫陰腫集驗方出大全良方治療脫肛歴年不愈右以生鐵三斤水一斗煮取五升去鐵以汁洗日再姚和衆方出大全良方治大人小兒因痢脱肛亦治産後陰下脫右以用鱉頭骨燒灰研取粉撲之日華子云頭燒灰療脫肛圖經同藥性論鼈頭血塗肛脫一方井花水調服孫真人方出大全良方治療脫肛腸頭若挺出一片右蝦蟆皮瓶中燒烟燻功效泄瀉夫婦人泄瀉者經中所謂洞泄飱泄溏泄濡泄胃泄大瘕泄大腸泄小腸泄水穀注下其實一也原疾之由皆因腸胃虚冷而邪氣乗之經云寒甚則泄春傷於風夏必飱泄蓋風傷肝肝正旺而移氣尅於脾故寒即溏熱則垢此得於外也喜怒憂思致使腸氣膈絶精神奪散心致溏泄此屬内也如飲食生冷食傷脾胃而泄者屬不内外也寒者温之熱者凉之滑者澁之温者燥之治痢之法無以過也方木香散出大全良方治臟腑冷極久傷冷憊吸瘡下泄米穀不化飲食無味肌肉痩悴心多嗔恚婦人産後虛冷下泄及一切水瀉冷痢木香破故紙炒各一兩良薑宿砂仁厚朴製各一兩赤芍藥橘紅桂心白术各半兩胡椒吳茱萸湯炮七次各一兩肉豆蔲四箇㯽榔一箇右為散每服三錢用不浸水猪肝四兩許出筋膜批為簿片重重摻藥置一鼎中入漿水一椀醋一茶脚許盖覆煮肝熟入鹽一錢䓤白三莖細切生薑彈子許拍破同煮水欲盡空心作一頓食之初服㣲瀉不防亦是逐下冷氣少許自止經年冷痢滑瀉只是一服渴即飲粥湯忌生冷油膩物如不能食冷物即添少漿暖服嘉興謝醫得此方惡其繁只用漿煮猪肝丸如梧桐子大粥飲下五十丸其效亦然暴瀉痢只是一服唯熱痢瀉不治大全良方云趙府博豆人病泄瀉不止服附子木香訶子肉豆蔲等藥及諸丹皆無效召僕診之肝腎脉虛弱此肝腎虛也府博云見在何經僕曰論泄痢止言脾胃病風冷温毒之所侵及飲食傷滯腸虚則泄痢而不知肝腎氣虚亦能為洩痢古書所載不可不辨經云洩不止腎虚也只曰諸厥固泄皆屬於下謂下焦肝腎之氣也門户束要肝之氣也守司於下腎之氣也肝氣厥而上行故下焦不能禁固泄痢腎為胃闗門户不束要故食廩不藏若病泄痢其源或出於此若専以脾胃藥治之則謬固千里矣遂服木香散數服而愈桂香丸出大全良方治腸腑虚為風寒濕所摶冷滑注下不禁老人虚人免篤累效附子肉豆蔲白茯苓各一兩桂心木香炮白薑炮各半兩丁香一分右為細米糊丸如梧桐子大空心米飲下五十丸豆蔲分氣飲出永類鈐方治臓腑虚寒泄無度及婦人産洞泄危篤甚藿香葉草豆蔲仁炮青橘皮各四兩甘草丁香各半兩烏梅五十箇肉豆蔲右㕮咀每服四錢水二盞糯米一撮煎至七分去滓温服之香朴丸出大全良方治腸胃虚泠泄瀉注下無度脾虛氣閉不進飲食大厚朴五兩北茴香白术陳皮各三兩訶子赤石脂各兩半右為細末麫糊丸如梧桐子大空心米飲下五十丸如常服暖脾胃豆蔲丸出大全良方治腸寒泄瀉不止服諸藥無效亦可治男子右用肉豆蔲麫褁煨香不以多少研細入陳米白飯搗令得所丸如菉豆大空心煮粟米飲吞下百丸即效胃苓散出大全良方治夏秋之間脾胃傷冷水榖不分泄瀉不止亦治男子右合和五苓散平胃散薑棗煎空心服五香散出大全良方治食魚傷泄瀉不止氣刺下衝及婦人産前後腹痛血氣奔疾用温酒一産後則血衝心用販蒲煎湯下如安胎以糯米飲下孕婦脾泄瀉痢煎陳米飲調下食烏藥白芷炒枳殻白术炒良薑甘草莪茂有孽者減半右等分為細末每服二錢温酒調下人參豆蔲散治久瀉不止諸藥無效僕累試之有效人參豆蔲亁薑厚朴甘草陳橘皮各一兩川芎桂心訶子北茴香各半兩右為細末每服三錢水一盞薑三片棗一枚煎至六分服之普賢丸治大便溏泄者脾氣薄胃氣弱水榖不能消飲食不能化腸胃虛則下為陰泄産後泄者縁體虛起早冒觸寒邪留注大腸則自刺凢病溏泄者普賢丸主之龍骨煆黄連茱萸蓬术各等分同炒色變為度右為細末丸如梧桐子大每服五十丸空心石菖蒲湯下神木丸治春傷於風下生飱泄大治傷風頭項皆拘急鼻流清涕蒼术一斤藁本細辛一兩六錢川芎各六兩獨活四兩粉草二兩六錢右為粗末每服三錢水一盞薑三片煎至七分出汗加葱去滓稍熱服無時候下痢附論夫赤白痢者古人名之滯下是也究病原皆因外感五邪之氣内傷生硬冷熱之食其證不一有赤有白有赤白相雜有冷有熱有虚有實大抵四時皆以胃氣為本未有不因外感寒暑寒濕風之氣而傷於脾胃既虧而又内傷飲食飲食不能尅化到今令積滯而云無積成滯下古人不成痢者此也經云春傷於風夏必飱泄蓋風喜傷脾然春時肝木正旺而不受邪反移氣尅於脾土然脾既受尅又不能忌慎口腹恣飱生冷粘硬之物到今脾不能尅化積滯又秋夏之間或再感暑只吞冷之氣發動而成痢也路必先臍腹疼痛洞泄水瀉裏急後重或有或無或赤或白或赤白相雜日夜無度有如此證不問冷熱虚實但當先神术散可以發散風邪冷温之氣次服五苓散分利水榖兼用如以感應丸温脾去積滯再服六神丸未有不安者也或曰雖古人有言無積不成痢專以去積為先豈有一嵗積獨於夏秋之間人皆有痰而吞冬無葢風邪入胃木夾勝土不為暴不則痢疾其神术散要藥也又有一坊一郡之内上下傳染疾狀相似或則是有一家長幼皆然或上下隣里間相傳染或有病同而證異而治因或用温劑而安或用涼而安或用涼藥而愈如此等是毒疫利毒痢者雖當五運六氣之相勝亦不犯可泥此等是毒一運起相勝豈獨偏於一方一郡而獨於一家二家者乎如此證當先察其虚實冷熱者以敗毒散多加人參甘草陳米薑棗煎服其三黄熟艾湯黄連阿膠丸五苓散駐車丸可選而用之如下痢赤多或純下鮮血裏急後重大便不通身體狀熱手足心熱大煩燥渴腹脇脹痛小便赤色六脈洪大或𦂳而數或沉而實此熱痢也宜白頭翁湯三黄熟艾湯五苓散可選用之若風痢下血大過宜用胃風湯加木香黒豆煎服若秋夏之間下痢或赤或白或赤白相雜臍腹疼痛裏急後重増寒發熱飽煩悶燥渇引飲嘔逆惡心小便不利及五心煩熱六脈虚弱此等脈證正因伏暑而得此疾宜服香薷散如黄連甘草當歸酒水濃煎沉令水冷頓服兼服酒煮黄連丸或小柴胡湯加人參煎服必愈如雜證一退而痢尚未止則以四物湯加膠艾煎服以調隂陽未有不安者也水榖不分小便不利宜用五苓散淡竹葉煎湯調服如煩燥甚者亦宜服之若不明伏者之證但以脈虛而妄投椀附薑桂丹石之藥而殺人深可嘆息若下痢絶白狀如魚腦臍腹冷痛日夜無度手足逆冷或有嘔逆全不入飲食欲温而惡冷六脈㣲細此由腸腑虚冷之故宜木香散加服四味理中湯及鍾乳徤脾丸甚者四肢逆冷六脈沉絶當一味酺補兼灸氣海丹田二穴更以助胃之藥此守而不攻之意也宜四順附子湯三建丹白丹加味參附湯薑附湯皆可選用如年尊虚弱之人或素來禀受怯弱亦宜此法斟酌調理然大宜開胃進食為先食可得入則脾運也便聚糟粕既成垢膩鮮血瘀滯不患其禍矣如久痢不瘥腸滑洩不止諸藥不效方可施之澁腸前劑止之臍亦宜先以龍虎骨肉豆蔲損胃氣如少壯之人徤壯者服之間奏其效若是疫毒受暑温之證及年尊之人或素怯受弱服此莫不受其大害以固秘澁腸為先則風寒暑濕之邪惟澁而不去而胃脘閉而不通禁口不食日見羸瘦糟粕不入腸中所患無由可除矣若有此證宜以參苓散四君子湯加以石蓮山藥之劑治之秘愈治痢欲求𥙷藥有温通之意在焉知四君子湯理中十全湯加白豆蔲茯苓官桂草厚朴之屬可以散風邪可以分水道可以開胃脘可以治纒擾可以通祕澁此攻守之意兩全也大抵治痢之法虛者補之實者訶子鍾乳胡粉之藥近人多用鶯粟殻扣揄之屬然此物惟太𦂳澁能者瀉之滑者澁之閉者通之有積者推之風則散之暑則滌之温則燥之熱則冷之涼則温之熱則調之以平為期不可以過此大法也下痢者脾胃虛寒腸腑怯弱飲食不得和水榖不能養故少力減食腸痛姙娠下痢者冷熱相乗陰陽相激腹痛而痢産後者胃脘與臓怯故寒熱之邪物為攻傳於血海則痢多摶於腹胃則痢當血邪氣相攻則痢雜色不止小便紅如雜痢與龍骨丸治之方􆀯香散治男子婦人小兒隂陽不和冷熱相摶積而成痢或赤或白赤白相雜日夜無度裏急後重臍腹疼痛甚不可忍又治水瀉腸鳴腸痛或熱毒中傷或寒氣久積並宜治之罌粟殻製陳皮去白粉草各一兩厚朴青皮白薑各一分右為細末每服二錢赤痢甘草湯調白痢陳米飲調赤白相雜紫蘇湯調如冷瀉陳米飲調熱瀉新井水調空心服此藥正脾去積和氣暖中忌生冷肥膩油麫醃醎黄芩湯治乾嘔下痢黄芩人參乾薑各三分木棗十二枚半夏半兩右以水七升温煮取三升温分三服四順附子湯附子生去蘆臍白薑炮甘草人參各一兩右㕮咀每服四錢重水二盞煎至七分去滓空心服吐瀉腹痛加桂半兩小便不利者加茯苓半兩人久痢疾雖體寒手足逆冷令汗自出六脈沉伏不宜輕用附子多因伏暑而得此疾亦有汗自出四肢逆冷六脈虛弱但背寒面垢如塗油齒乾煩寃燥渇引飲此伏暑證也柴胡湯五苓散酒蒸黄連丸必能奏效一方四順湯治治吐瀉赤白疾陳皮黄連七錢半木香五錢右件剉作二服赤加烏豆一錢半白加乾薑一錢半赤白同加煎服四味阿膠丸治熱痢黄連赤茯苓二兩芍藥三兩阿膠炒炮一兩右將三味為末却以好醋熬阿膠成稀膏丸如梧桐子大米飲下三十丸白頭翁湯治熱痢連月下血不瘥白頭翁二兩黄連黄蘗皮秦皮各三兩右㕮咀每服四錢水一盞半煎至七分去滓無時候温服一方加甘草阿膠各二兩鸎粟散治産前産後痢不問赤白嬰粟殻十枚去絲穰陳木香一塊如小錢大橘皮一枚去穰右剉粗末用水一椀半煎至一椀温服玉粉丹治熱痢蛤粉硫黄各等分右同研細白麵糊和丸如梧桐子大每飲下五十丸豆蔲餅治赤白痢臍腹刺痛久而不愈大治冷痢櫻粟殻製一兩白芍藥黄蓍各三錢陳皮青皮木香可子肉荳蔲人參各一錢半羌活當歸各一錢右為末煉蜜丸如彈子大每服二丸水一琖煎至七分温服大全良方云有一婦人病痢曰四十日服諸藥不愈當診之六脈沉弱大凡下痢之脈宜沉弱但服十全大補湯薑棗煎成加白蜜半匙同煎數沸服之則愈甲子夏秋間趙經畧姪孫成丸九嵗患痢疾甚重召小方脈未得至逆診之大卒細以觀之云是血痢其實非也只是血水而已曰記調中湯治法云治夏月初秋或有暴寒拆於盛熱結於四肢則伏熱頭痛寒傷於胃則下痢或水或赤或白伏熱寒閉脈類遂無大黄服之而愈調中湯葛根黄芩芍藥桔梗赤茯苓白术甘草炙藁本各等分右㕮咀每服三錢水一盞煎至七分去滓温服移時再服能大全霍亂吐和腹痛手足逆冷脈㣲欲絶三建丹陽起石煆飛半兩鍾乳粉一兩大附子炮取末半兩入藥一半作糊右用附子糊丸如梧桐子大每服五丸至十丸空心温酒下如渇人參湯下加味參附湯大附子二兩半炮右㕮咀每服四錢重水二琖薑十片丁香十五粒米一撮煎至七分空心服香茸丸治下危困麝香半錢别研臨時入鹿茸一兩去毛酥炙黄為末入射香攪勻右以燈心煮棗肉為丸如梧桐子大每服五十丸空心服凡痢疾不問赤白而為冷熱之證若手足煖則為陽只須服五苓散用粟米飲調下次服感應丸二十丸若覺手足厥冷則為隂當服已寒丸附子之類若有人夏月患疾一日六七十行用五苓散兩服止昔有醫者每料添滴乳香半兩尤有效紹興人苦疾多往往而死凡平時所治痢如櫻粟之類不可向口惟服此等藥成浮石員效蒲黄散治婦人胎前産後赤白痢生薑自然汁年少者十兩年老者二十兩鴨子一箇打碎入姜汁攪勻右煎至八分入蒲黄三錢煎至五七沸空心温服效紫參湯治下痢肺痛紫參半斤甘草三兩右以水五升先煮紫參取二升内甘草煮取一升半温分三服治痢下不止方右用水煮木香丸却以多年白梅三十二箇燒灰存性為細末陳米飲調下三五服訶梨勒散治氣痢右以訶梨勒十枚為散粥飲和頻服良方云昔一婦人泄瀉不止似痢非痢似血非血其色如濁酒診之則六脈沉絶醫用熱藥及服之則發煩悶遂先用敗毒散數服加陳米煎次用胃風湯粟米煎服即愈調中湯去大黄療此證亦愈六神丸治赤白痢疾茯苓枳殻麥芽木香白痢焙之神麯切作末留為糊黄連六味等分赤痢倍之右為末用神麯末作糊為丸如梧桐子大每服五十丸赤痢甘草湯下白痢乾薑湯下赤白痢乾薑甘草湯下大全良方云此藥有黄連可以觧暑毒清腑厚腸胃有木香能温脾逐邪氣上下痢有枳殻能寛腸胃有茯苓能利水道有神麯麥芽可以消食此痢中之要藥也小紅丸治久痢下血不止赤石脂一兩醋泡七次乾薑一兩炮棗三兩艾葉製一兩川椒七錢半合炒火氣用烏梅一兩去皮右為末以小棗蒸爛研如泥絞藥末為丸如桐子大每服五十丸空心米飲湯送下龍骨丸治下痢不止黄連慢火炒乾薑炮當歸各半兩酒浸煮乾赤石脂醋煆七次阿膠二錢半炮蛤粉炒右為末醋糊和丸如桐子大每服五十丸空心烏梅湯下治禁口痢右用石蓮肉不以多少不炒去殻將肉并心研為細末每服二錢陳米飲調下便覺思食此疾葢毒氣上衝華葢心氣不通所以不入食服此藥之後心氣痢當頓下而愈未愈自服痢藥又方右用乾山藥不以多少半生半炒黄為細末米飲調下此證乃痢毒上冲華葢心氣不通故禁口不食服二味心氣通痢當頓下一方四君子湯加二味陳倉米煎甚妙矣治乳婦赤白下痢及冷洩久滑出本草以猪子肝一葉薄批之訶子末揾著㣲火炙又揾炙盡末半兩止空心細嚼陳米飲送下普濟方卷三百二十一
