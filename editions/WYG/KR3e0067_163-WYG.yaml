大盞生薑五片煎取八分去滓服療痰飲氣隔食則嘔吐方茯苓八分橘皮六分甘草四分炙生薑八分雞蘓六分人參四分右切以水五升煮取一升五合去滓分溫二服令相去如人行六七里進一服忌海藻菘菜酢物茯苓飲一名參苓飲出三因方主心胷中停痰宿水自吐水出後胷膈膨脹氣滿不能食消痰氣令能食茯苓三兩人參三兩白术三兩生薑四兩枳實二兩炙橘皮二兩半右切以水六升煮取一升八合去滓分溫三服如人行八九里進之忌酢物桃李雀肉等物一方無枳實沉香四倍丸治痰飲兩臂疼痛腰腿沉痛木香半兩青皮四兩去穰白术三兩半夏四兩湯洗七次沉香半兩黒牽牛半兩頭末右為極細末生薑自然汁煮麫糊為丸如梧桐子大每服三十丸生薑湯下食後服丁香半夏丸出危氏方治脾胃宿冷胷膈停痰嘔吐惡心吞酸噫醋心腹痞滿脇肋刺痛氣短噎悶不思飲食肉豆䓻仁一分木香一分丁香一分人參一分陳皮一分去白藿香葉半兩半夏三兩湯洗七次薑汁製炒右為細末生薑汁煮麫糊為丸如小豆大毎服二十丸生薑湯下不拘時小半夏湯一名茯苓半夏湯出御藥院方治諸嘔噦心下痞堅膈間有痰水眩悸方見本門留飲類赤茯苓丸出御藥院方治痰氣痞赤茯苓去皮枳實麩炒去穰半夏麴檳榔白术各等分右為細末生薑汁麫糊為丸如梧桐子大每服五十丸食後溫生薑湯下或風眩頭痛則荆芥湯下五苓散出三因方假令瘦人臍下有悸者吐涎沫而宿水也豬苓三兩去皮白术三兩茯苓三兩桂心二分去皮澤㵼五分右五味水煎不拘時日三服毎服時湏令㣲汗不過數服愈忌桃李雀肉葱醋等物茯苓丸出德生堂治痰飲為梗令人手臂背疼痛胷膈痞塞神効半夏二斤製赤茯苓半斤白茯苓半斤枳殻半斤炒朴硝四兩飛過右為細末生薑汁打麫糊為丸如梧桐子大每服三五十丸生薑湯食後臨眠服氣實者加七十丸枇杷葉散出聖惠方治痰飲發即煩悶不安兼吐痰水枇杷葉一兩拭去毛淨炙㣲黄人參一兩去蘆頭半夏一兩湯洗七次去滑陳橘皮一兩去白白术一兩右擣篩為散每服三錢以水一盞入生薑半分煎至六分去滓不拘時候溫服潤肺丸出御藥院方治肺不調欬嗽聲重日乆不止痰涕結搏咽嗌不利心神煩燥頭目昏重精神不爽心忪煩悸喉中呀呷逐氣有聲一切痰實並皆治之硃砂二兩水飛五靈脂二兩㣲炒苦葶藶一兩杏仁一兩去皮尖麩炒半夏麴一兩右為末生薑汁麫糊為丸如桐子大每服四十丸食後生薑湯下大半夏丸出御藥院方治消痰順氣咳嗽半夏六兩桑白皮一兩生甘草一兩皂角八兩搥碎生薑八兩剉碎右先將五味用水五升同煮汁盡取出半夏焙乾為末次用下項青皮一兩檳榔一兩木香一兩郁李仁一兩湯浸去皮别研與前半夏末拌勻右為細末生薑自然汁打白麫糊為丸如梧桐子大每服三十丸食後生薑湯下枳實半夏丸出御藥院方治消痰順氣利胷膈進飲食枳實一兩麩炒黄色去穰半夏一兩半湯洗七次切作片子焙乾白术三分蓬莪荗半兩白茯苓一分去皮右為細末用生薑汁煮麫糊為丸如梧桐子大每服六七十丸陳橘皮湯下不拘時候化痰丸出瑞竹堂治快脾順氣化痰消食半夏洗南星去皮膜白礬皂角切碎生薑右各一斤重用水同煎至南星無白㸃為度㨂去皂角不用將生薑切作片同半夏南星陰乾不見日色火焙再加青皮去穰陳皮去白紫蘓子炒蘿蔔子炒别研乾葛杏仁去皮尖炒别研神麴麥蘖炒唐毬子香附子右件已上半斤淨與前藥合和一處碾為細末生薑自然汁浸􅔻餅打糊為丸如梧桐子大每服五七十丸臨臥食後茶酒送下敵痰丸出瑞竹堂治痰盛寛胷膈快氣黑牽牛三兩皂角二兩去皮弦火中㣲燒白礬一兩枯半夏麴一兩炒陳皮一兩去白右為細末煮蘿蔔為丸如梧桐子大每服四五十丸臨臥淡薑湯下南星半夏丸出經効濟世方治痰開胃天麻半夏天南星炮去火毒人參白附子右等分内半夏天南星倍之俱各為末半兩用生麫一兩滴水為丸每服百十丸於沸湯中煮浮漉出用生薑湯吞下食前服不拘時候撩膈散一名吐痰方出聖惠方治心上結痰飲食寒冷心悶瓜丁二十八枚赤小豆二十枚人參一分去蘆頭甘草一分右篩酒服方寸匕日二亦治諸黄一方用虀汁調服紫芝丸出百一選方治痰五靈脂粒粒取全者去砂石半夏湯洗七次慢浸令心透右等分為末生薑汁煮浸蒸餅為丸如梧桐子大每服二十丸至三十丸生薑湯或茶湯食前下空心臨臥時服半夏丸出十便良方治消下痰涎九製半夏老生薑各等分同搗研如泥焙乾右搗為末用生薑汁打糊為丸如梧桐子大每服三十丸生薑湯下食後服二陳湯出仁存方治痰飲為患或嘔吐或頭眩心悸或中脘不快或發為寒熱或飲酒過多脾胃不和半夏五兩洗七次橘五兩白茯苓三兩甘草半兩炙右為散每服四錢水一盞薑七片烏梅一箇煎六分去滓熱服不拘時候一方傷寒後不敢進燥藥者用此快脾則飲食倍進易得復常治痰疾加草菓如半夏之數仍嚥紅丸子因酒食所傷發為黄疸亦加草菓嚥紅丸子多服取効嘔吐者加丁香如甘草之數惡甜者減甘草吐甚者兼服手流丸仍用半夏為細末每一兩入丁香檳榔各一錢旋以生薑自然汁丸如梧桐子大又水煮半夏丸先以水二盞煎沸次下丸子煮令足一時挑服用藥汁嚥下煩燥者於二藥並去丁香仍服養正丹或來復丹黑錫丹之類候大便利無不見効嘔家不以溫藥㣲利大便則無由愈此數藥皆有硫黄能溫利之祕甚用加味感應丸若先自溏利是為虚寒不宜用此可於理中湯震靈丹方中求之妊婦惡阻産科用茯苓湯茯苓丸作快脾之劑服者病反增劇不若用此極有神驗餘見四物湯并紅丸子方中一方加竹茹同煎食前服溫中化痰丸一名二薑丸出和濟方治停痰留飲胷膈滿悶頭眩目暈好臥減食欬嗽嘔吐氣短惡心或飲酒過多或飲食無度或過傷生冷痰涎並多噦醋噫酸亦治煖脾胃散寒氣青皮五兩去穰良薑五兩去蘆炒乾薑五兩炮陳皮五兩去白右為細末醋打麫糊為丸如梧桐子大每服三五十丸粒米湯任下不拘時候或生薑湯亦可一方又為末每服二錢水一盞薑四片煎七分溫服不拘時候溫胃化痰丸出御藥院方治腹間有寒脾胃停飲胷中不快痰涎不盡半夏三兩橘皮二兩去白乾薑二兩炮白术二兩右為末生薑汁麫糊為丸如桐子大每服二十丸溫生薑湯下不拘時候蠲飲枳實丸出御藥院方治逐飲消痰導滯清膈枳實三兩麩炒去穰半夏三兩湯洗七次陳橘皮三兩去白黑牽牛半斤末三兩餘取頭滓不用右為細末水煮麫糊為丸如梧桐子大每服五十丸生薑湯下不拘時候除痰丸出御藥院方天南星二兩炮半夏二兩湯洗七次皂角一大定去皮弦子用水一大盞揉汁蛤粉一兩㣲炮右為細末以皂角汁調麫糊和丸如梧桐子大毎服三十丸食後生薑湯下漸加至五十丸臨臥更進一服忌甜物二麴丸出百一選方治脾虚痰盛不思食妙甚神麫半斤為末棗肉搜成餅子候乾慢火炙半夏半斤為末生薑自然汁揑成餅子候乾慢火炙右為末棗肉丸如桐子大每服五十丸姜湯下不拘時候治痰證看人眼有黑暈多者是木鱉子白芥子甘遂大㦸右等分水糊為丸如梧桐子大每服十丸薑湯下消痰倍术丸治胃虛五飲酒癖頭痛眩胃乾嘔飲流腸間動則有聲白术五兩削木三兩桂心一兩乾薑四兩右為末麫糊為丸如梧桐子大每服三十丸溫米飲送下食後服半夏化痰丸一名半夏丸出䘙生家寶方治主痰實惡心嘔吐頭目昏暈心忪背寒臂痛涎𠻳胷膈不快半夏一兩去滑赤茯苓半兩去皮白礬一分枯鉛白霜半兩右為末生薑汁打麫糊為丸如梧桐子每服十五丸薑湯下茯苓湯出千金方治胷膈痰滿茯苓四兩半夏一斤生薑一斤桂心八兩右㕮咀以水八升煮取二升半分四服冷極者加大附子四兩若氣滿者加梹榔三七枚忌酢物羊肉生葱猪腸普濟方卷一百六十四
