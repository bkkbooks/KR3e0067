body:
  text: 普濟方卷一百六十四明周王朱橚撰痰飲門總論夫飲有四何謂師曰有痰飲有懸飲有溢飲有支飲問曰四飲之證何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水流在脅下欬唾引痛謂之懸飲飲水過多水行歸於四肢當汗出而汗不出身體疼重謂之溢飲其人欬逆倚伏短氣不得睡其形如腫謂之支飲凡心下有水者築築而悸短氣而恐其人眩而癲先寒即為虚先熱即為實故水在於心其人心下堅築築短氣惡水而不欲飲水在於肺其人吐涎沫欲飲水水在於脾其人少氣身體盡腫水在於肺脅之下滿嚏而痛水在於腎心之下悸夫病人卒飲水多必暴滿喘凡食少飲多水停心下甚者則悸微者短氣脈雙弦者寒也皆大下後體虚耳脈偏弦者飲也脈飲不弦但喜喘短氣支飲亦喘而不能眠加短氣其脈平也溢飲形不發作無熱脈微煩滿不能食脈沉滑者留飲留飲者脇下痛引缺盆嗽轉甚其人欬而不得臥引項上痛欬者如小兒瘛瘲狀夫胷中有留飲其人短氣而渴四肢歷節痛其脈沈者有留飲也心下有留飲其人背寒冷大如手病人肩背上引此皆有溢飲在胷中乆者缺盆滿馬刀腫有劇時此為溢飲所致也膈上之病滿喘欬吐發則寒熱背痛惡寒自泣目出其人振振瞤瘛心有伏飲病人一臂不隨時復轉移在一臂其脈沈細此非風也必有飲在上焦其脈虚者為微勞榮衞氣不周故也冬自瘥一本作乆乆自瘥病痰飲者當用溫藥和之人之有痰飲病者由榮衞不清氣血敗濁凝結而成也内則七情汨亂藏氣不行鬱而生涎涎結為飲為内所因大小青龍桂枝防風五苓通氣外有六滛侵胃𤣥府不通當汗不泄蓄而為飲為外所因茯苓蒼术八味參蘇或飲食過傷嗜慾無度呌呼疲極運動失宜津液不行聚為痰飲屬不内外因十棗葶藶大黄大小半夏湯控痰散惟氣與血能生諸病痰者津液之異名人之所恃以潤養肢體者也血氣和平關絡條暢則痰散而無氣脈閉塞脘竅凝滯則痰聚而有痰之所以發動者豈無自而然則風寒暑濕調攝失宜以至諸熱蒸鬱啖食生冷煎􅘤鯹羶鹹辛動風發氣等輩皆能致痰也是痰作恙為喘為嗽為壅為嘔為眩暈為風癎為狂迷為怯悸或吞酸或短氣或痞膈或腫脹或寒熱或疼痛或攣躄或癃閉痰實主之人知痛生於氣血孰知痰涎之流注亦能纏滯而為痛乎如頭風證眉稜眼角俱痛投以風藥不效投以痰藥收功如患眼證赤腫羞明而痛與之以凉劑弗療與之痰劑獲愈如酒家手臂痛重時或麻痹二陳湯加片子薑黄下白丸子消飲丸倍术九輩每每就安如鬬家胷骨撲傷刺痛無已散血之劑罔功續以自己溲便飲之須臾吐痰其痛立止此皆痰涎作痛之明證也然而頑痰滿胷上脘填塞其高者因而越法當從權取吐或者津液不守所以痰多吐甚痰脫則精竭而斃矣療痰之法理氣為上和胃次之若風若寒若濕若熱如前數者亦當推尋所受之因和胃謂何涎者脾之液也胃之津也脾胃一和痰液自散故治痰多用半夏葢半夏能利痰故也治法懸飲當下之溢飲當發其汗支飲則隨證汗下痰飲則用藥從小便利之痰飲之痰皆氣不順而致之當順氣為先分道次之氣順則津液流通痰飲自下亦有腎氣虚寒不能攝養腎水使邪水溢上多吐痰唾又當調之以八味丸最得其宜王叔和云腎寒多吐葢腎為水之官腎能攝水腎氣溫和則水液流下腎氣虚寒則邪水溢上其藥用山茱萸山藥輩取其補附子肉桂取其溫茯苓澤㵼取其利理亦當矣或因酒後停飲而嘔者二陳湯丁香煮散主之或脾胃為物所傷而停積痰飲五奪丸破飲丸主之凡人病痰證發者比前論更多有三顯證共成五也一曰風痰二曰熱痰三曰濕痰四曰酒痰五曰食痰諸痰在於上焦毒薫於頭者諸陽之會首也故令病人頭重目澁涕唾稠粘或欬嗽喘滿時發寒熱可用赤小豆湯吐之吐後各隨其證而治之除風去熱導濕化痰者可服通聖加半夏導氣之劑如新暴風痰者體寒飲冷熱痰火盛制金濕痰者停飲不散可服加減連􅀢飲子除濕丹無憂散亦有酒痰者解毒去熱宜以三聖丸主之五者食痰可用漢防己丸丹砂丸而治之若依法服之决有神効凡富貴之人痰嗽多是厚味所致内經云所謂厚味則發熱可服通聖散加半夏以止嗽更服人參半夏丸化痰墜涎止嗽定喘貧乏之人多感風冷寒濕内經云秋傷於冬濕生欬嗽可服寜神散寧肺散加白术之類若欬極面赤煩悗半晌此火化乘肺也宜詳辨之積年痰飲漸成風口眼喎斜語不通蘇合薑汁調半盞青州丸子有神功凡中痰一時諸證蜂起則為困篤倉卒之間藥不可入當用白梅擦開牙關或以半夏末或皂角末吹鼻或灌陳白梅汁以收其痰或服真麻油調麝香以疏其氣或用稀涎散勝金丸略吐其痰却以蘇合香丸薑汁調灌下三服更以牛黄清心丸薄荷汁化開與服或有熱者用竹瀝調尤好氣纔正却隨證施藥一切痰飲附論病源痰飲者由氣脈閉塞津液不通水飲氣停在胷腑結而成痰又其人素盛今瘦水走腸間漉漉有聲謂之痰飲其為病也胷脅脹滿水榖不消結在腹肋内水入腸胃動作有聲身體重多唾短氣好眠胷背痛甚則上氣欬逆倚伏短氣不得臥其形如腫是也脈偏弦為飲浮而滑為痰方大五飲丸出千金方治主五種一曰留飲停水在心下二曰澼飲水澼在兩脇下三曰痰飲水在胃中四曰溢飲溢在膈上五臟間五曰流飲水在腸間揺動有聲夫五飲者由飲酒後及傷寒冷水過多所致蓯蓉一兩逺志一兩苦參一兩藜蘆一兩烏賊骨一兩白术一兩甘遂一兩大黄一兩石膏一兩括蔞根一兩桔梗一兩半夏一兩紫苑一兩五味子一兩前胡一兩芒硝一兩桂心一兩苑花一兩當歸一兩人參一兩貝母一兩茯苓一兩芍藥一兩大㦸一兩葶藶一兩黄芩一兩薯蕷三分甘草三分細辛三分附子三分巴豆三十枚厚朴恒山右為末蜜丸梧子大每服三丸日三稍加之以知為度旋蕧花丸出千金方治澼飲痰飲結兩脅腹脹滿羸瘦不能食食不消化喜唾亁嘔大小便或澀或利腸中動揺作水聲腹内熱口乾好飲水漿卒起頭眩欲倒脇下痛旋蕧花五分桂心五分枳實五分人參五分甘遂三分呉茱萸四分細辛四分大黄四分黄芩四分葶藶四分厚朴四分芫花四分橘皮四分乾薑六分芍藥六分白术六分茯苓八分􅚄毒八分烏頭八分礬石八分右為末蜜和為丸如梧桐子大酒服五丸二日後加以知為度延年方無白术􅚄毒烏頭礬石細辛黄芩厚朴呉茱萸芫花橘皮甘遂有皂角附子各二分蜀椒防葵杏仁各三兩乾地黄四分一方用米生胃丸出瑞竹堂治脾胃不足痰多嘔逆不思飲食此藥以南星粟米黄土為主葢謂南星醒脾去痰粟米養胃黄土取其以土養土性味溫美進飲食化痰之要劑真良方也大天南星四兩用真黄土半斤將生薑汁和黄土成劑包裏南星慢火煨香透去土不用將天南星切碎焙乾丁香一兩木香一兩厚朴一兩去皮薑汁炒神麴一兩麥芽一兩炒橘紅一兩白豆䓻仁一兩縮砂仁一兩青皮一兩去皮半夏麴二兩沈香半兩鎊人參半兩甘草半兩炙粟米一升生薑二斤和皮擂碎取自然汁浸粟米蒸右為細末法丸如菉豆大每服七十丸不拘時薑湯下前胡湯主胷背氣膈上熱口乾痰飲風氣頭旋前胡三兩枳實三兩炙細辛三兩杏仁三兩去尖皮碎芎藭三兩防風三兩澤㵼三兩麻黄三兩去節乾薑三兩芍藥三兩茯苓四兩一作茯神生薑四兩桂心甘草各四兩右切以水九升煮取二升六合分三服微汗忌生冷油膩豬羊肉麫海藻菘菜生葱生菜酢物海藏五飲湯出㧞萃方治一留飲心下二澼飲脇下三痰飲胃中四溢飲膈上五流飲腸間凡此五飲酒後傷寒飲冷過多故有此疾旋蕧花人參枳實陳皮白术茯苓厚朴半夏澤㵼豬苓前胡桂心芍藥甘草各等分右剉每兩分四服水二盞生薑十片同煎至七分取清溫服不拘時候忌食肉生冷滋味等物因酒有飲加葛根葛花縮砂仁大茯苓湯出千金方治主胷中結痰飲癖結臍下眩滿嘔逆不得食亦主風水茯苓三兩白术三兩當歸二兩橘皮二兩附子二兩生薑四兩半夏四兩桂心四兩細辛四兩一作人參右九味㕮咀以水一斗煮取三升去滓分三服薯蕷湯治七情藏氣不行鬱而生涎涎結為飲隨氣上厥伏留陽經中心忪悸四肢緩弱熻然面熱頭目眩冒如欲揺動薯蕷四兩人參四兩麥門冬四兩去心前胡二兩白芍藥二兩熟地黄二兩枳殻三分麫炒去穰逺志三分去心薑汁製炒白茯苓一兩半茯神一兩半半夏一兩一錢湯洗去滑甘草半兩炙黄茋一兩右剉散用千里水一盞半薑七片秫米一升煎七分去滓溫服食前葛花解酒湯一名葛花解醒湯出醫方大成治飲酒太過嘔吐痰逆心神煩亂胷膈痞塞手足戰揺飲食減少小便不利縮砂半兩葛花半兩木香半錢白豆䓻半兩橘皮半錢白术二錢乾生薑二錢連花青皮三分去穰白茯苓一錢半豬苓一錢半去皮澤㵼二錢神麴二錢炒人參去蘆頭右為細末秤和匀每服三錢匕白湯調下得微汗酒病去矣消痰咳嗽丸出御藥院方治消痰理氣除咳嗽利咽膈白术二兩牽牛二兩檳榔二兩白芷二兩厚朴二兩製半夏五兩洗陳皮四兩去白乾薑一兩半人參一兩木香一兩青皮一兩赤茯苓三兩枳殻三兩麴炒去穰右為細末麫糊為丸如梧桐子大每服五七十丸食後生薑湯下祛風丸出御藥院方治清膈化痰降氣消穀宣通藴滯調順三焦車前子三兩赤茯苓三兩去皮木香三兩皂角三兩燒存性檳榔三兩枳殻二兩麴炒去穰陳皮二兩去穰青皮二兩去白半夏二兩湯洗乾生薑半兩大黄三兩黒牽牛六兩生右為細末熟飯為丸如梧桐子大每服五十丸至七十丸食後生薑湯下開結枳實丸出御藥院方治宣導凝滯消化痰飲升降滯氣通行三焦滋榮心肺灌溉腎肝補助脾元養胃轉行百脈去風結惡氣流暢大小腸主中痞痰逆惡心嘔噦隔實酒醉不解宿物停積兩脇膨悶咽嗌不利咳嗽等疾枳實半兩麩炒白术半兩半夏半兩湯洗天南星半兩炮白礬半兩枯苦葶藶半兩大黄半兩青皮半兩去白木香二錢黑牽牛二兩頭末大皂角一兩去皮子酥炙旋蕧花一兩右為末生薑汁煮麴糊為丸如梧桐子大如单腹脹上喘涎多四散腫滿食後生薑湯下三四十丸以為度婦人乾血胸膈實腫滿或産後有傷面目浮腫小便不利生薑葱白湯下黄疸病温酒下剋効神聖餅子出御藥院方治積痰停飲留滯不散胷中噎悶脅肋刺痛噫醋吞酸不嗜飲食及素有陳積攻衝膈脘痞悶宜服之安息香半兩研南乳香半兩研石三稜半兩剉川薑半兩炮製硇砂半兩水飛丁香半兩木香半兩乾漆一兩杵碎炒令烟盡高良薑一兩京三稜一兩炮剉蓬莪荗一兩炮剉粉霜一兩研右為末和匀用石腦油溫就和丸如菉豆大捻作餅子每服五餅至七餅食後溫熟水下參蘇飲出仁存方治痰飲積停胸中嘔吐痰涎眩暈怔悸噦逆及痰氣中人停留關節手足嚲曳口眼喎斜半身不遂食已則吐頭痛發熱狀似傷寒前胡三分人參三分紫蘓三分茯苓三分桔梗半兩木香半兩半夏半兩陳皮半兩枳殻半兩炒甘草半兩炙右剉散每服四錢水一盞半姜七片棗一枚煎至七分去滓空心服噦者加乾薑服腹痛加芍藥一方加乾葛紫沈丸出御藥院方治宿食不化痰飲留滯心腹脹滿脇肋疼痛胷膈痞滿噎塞不通嘔噦吞酸噫氣寒熱並宜服之丁香一兩青皮半兩去白陳皮半兩去白京三稜半兩剉炒蓬莪荗半兩剉炒縮砂仁半兩桂半兩去麤皮硇砂一錢飛研木香三錢烏梅四兩和核搗碎去子巴豆三十枚去皮心出油别研右為細末將巴豆硇砂和令極匀麫糊為丸菉豆大每服十五丸至二十