醋湯調服代赭一名赤土也治白􅀈漏下用芹菜作虀薤食之煮食亦得血暴下兼帶附論夫婦人臓腑乆冷素有赤白帯下復因衝任氣虛不能制約經血致暴下二病兼作故謂經血暴下兼帶下也方鹿茸丸治婦人血傷帶下漸成勞疾鹿茸去毛酥炙白薇去苖覆盆子細辛去苗菴䕡子熟乾地黄焙山羊角蛇床子炒白茯苓去黒皮各三分乾薑炮逺志去心當歸切焙芎藭桂心去粗皮續斷牡丹皮人參卷柏龍骨蒲黄各半兩右為末煉蜜和丸桐子大每服三十丸空腹温酒下米飲亦得牡蠣散治帶下兼經水過多暴下片血不限年月逺近牡蠣龍骨肉蓯蓉酒浸切焙赤石脂石斛去根烏賊魚骨去甲黄耆剉各一兩半芍藥炒阿膠炒燥熟乾地黄焙牛角腮灰各二兩乾薑炮裂當歸切焙白术人參桑耳炙各一兩一分艾葉炒芎藭附子炮裂去皮臍各一兩右為散每服三錢平旦米飲調服日再澤蘭散出千金方治婦人血傷不止兼帶下不斷虚羸困倦補虛益氣調中止血澤蘭葉炙人參蜀椒去目并閉口炒出汗各一兩厚朴去粗皮生薑汁炙桂去粗皮細辛去苗葉兼荑仁㣲炒用藁本去苗土當歸切焙乾乾薑炮代赭石山茱萸防風去芦各半兩柏子仁炒芎藭牡蠣粉熟乾地黄焙甘草炙剉龍骨各三分右為散每服二錢温酒調下米飲亦得一方加白芷無人參龍骨鹿茸丸出千金方治婦人血傷不止兼赤白帶下不絶面黄體瘦漸成勞疾及治崩中去赤白鹿茸去毛酥炙白芷馬頭鬐毛燒灰蒲黄㣲炒小薊根續斷禹餘糧煆醋淬各二兩伏龍肝熟艾各一兩白馬蹄鎊三兩人參熟乾地黄焙烏賊魚骨去甲柏子人㣲炒肉蓯蓉酒浸切焙當歸切焙黄耆炙剉白茯苓去黒皮各一兩半右為末煉蜜和丸如梧子大每服二十丸至三十丸温酒或米飲不拘時黄耆丸治婦人血傷兼帶下臍腹冷痛腰痠疼肢體倦怠煩渇燥黄耆剉熟乾地黄焙當歸切焙鹿茸去毛酥炙地榆卷柏去土茯神去木各一兩半木香代赭石白石脂艾葉芎藭桑寄生赤石脂沙參白龍骨訶梨勒皮各一兩右為末煉蜜和丸如梧子大每服三十丸米飲下空心日午卧時各一茯苓散出大全良方治婦人血傷兼帶下積久不止面黄體瘦漸成虚勞腰脚沉重胎氣多損白茯苓去黒皮木香杜仲去粗皮炙菖蒲熟乾地黄焙柏子人研秦艽去苗土訶梨勒皮莬絲子酒浸别搗青橘皮去白焙赤石脂五加皮牛角䚡灰烏賊魚骨去甲艾葉切焙各一兩右為散每服二錢温酒調下糯米飲亦得或有􅀈息用鯉魚糯米粥下藥牡丹皮湯出千金方治婦人血傷不止兼五色帶下牡丹皮熟乾地黄焙槲葉脈剉炒艾葉㣲炒各一兩半禹餘糧煆赤醋淬七遍芎藭龍骨各一兩柏葉炙芍藥剉炒厚朴去粗皮土薑汁炙白芷伏龍肝青竹茹地榆剉各一兩阿膠炙令燥半兩右粗搗篩每服三錢水一盞煎至七分去滓空心日午卧時服相去如人行十里久再服牛角地黄散治婦人血傷不止兼帶下赤白腰背痛虚乏困倦方見崩中漏下數熟布湯一方熟乾地黄散聖惠方治婦人血傷兼赤白帶下日夜不止悶絶頭目昏重熟布皮刀刮取一把蟹𤓰剉二令甘草炙剉白茯苓去黒皮熟乾地黄焙桂去粗皮阿膠炙令燥芍藥剉炒當歸剉炒伏龍肝各一兩淡竹茹一把蒲黄輕炒二兩右粗搗篩每服三錢水一盞半煎一盞去滓服不拘時人參散治婦人血傷兼赤白帶下日久不止羸困人參五味子地榆艾葉燒灰牡蠣煆白茯苓去黒皮熟乾地黄焙龍骨煆續斷芎藭甘草炙剉各一兩右為散每服二錢温酒調下水一盞煎至七分温服亦得空心日午卧時各一茯神丸治婦人血傷兼帶下日久不止頭旋目眩心煩身熱腰脚疾重肢體瘦瘁茯神去木當歸切焙白芷桑耳炙芎藭赤石脂卷柏去土乾薑炮各一兩牡蠣粉地榆白龍骨一兩半右為末錬蜜和丸梧桐子大每服三十丸温酒或米飲下空心日午臨卧各一服陽起石湯治婦人血海冷敗脱血帶下諸虚冷疾陽起石二兩别搗白茯苓去黒皮人參甘草炙剉赤石脂龍骨各三兩伏龍肝五兩生地黄細切焙一升附子炮裂去皮臍一兩續斷三兩右㕮咀每服三錢水一盞煎至七分去滓温服早晨日午晩後各一紫金散出大全良方治衝任虚損月水過多崩漏帶下淋瀝不斷腰腹重痛凡是五色帶疾並之禹餘糧煆赤釅醋中淬如此者七次細研水飛挹乾秤三兩赤石脂煆龍骨煆石器研各一兩白芍藥川芎附子熟地黄當歸各一兩乾薑炮肉桂各半兩右為細末每服二錢入麝香少許米飲調下空心食前一日二服一方有甘草小薊根湯治婦人月經過多或卒暴血傷不止或色如肝或成片者小薊根三兩當歸㣲炙阿膠炙令燥芎藭青竹茹續斷地榆根各一兩半伏龍肝二兩右粗搗篩每服三錢水一盞煎至七分去滓温服日三龍骨飲治婦人經血暴下不止龍骨三兩青竹茹二兩乾薑炮一兩伏龍肝五兩槲葉十枚炙右粗搗篩每服五錢水一盞半煎至七分去滓温服不拘時治婦人傷中血不止兼赤白帶下芍藥炒一兩乾薑炒三分牛角䚡醋炙焦半兩右為散研匀每服二錢米飲調下治經血暴下兼帶下蒲黄二兩鬱金熟乾地黄焙各三兩右為散每服三錢空心米飲調下牛角䚡丸治婦人經血暴傷兼帶下久不止牛角䚡灰赤石脂各一兩半白龍三兩艾葉一分桑耳炙鹿茸去毛酥炙阿膠炙燥乾薑炮各一兩右為末錬蜜和丸如梧桐子大每服三十丸空心食前煎黄耆湯或温酒下牛角䚡散治婦人血傷兼赤白帶下黄牛角䚡酒炙側柏葉艾葉炒當歸切焙續斷炒地榆炒赤石脂研伏龍肝各一兩右為散每服三錢食前米飲或温酒調下菟絲丸治婦人血傷兼赤白帶下菟絲子酒浸一宿别搗龍骨牡蠣炒艾葉炒赤石脂烏賊魚骨燒蘹香子㣲炒附子炮裂去皮臍各一兩右為末醋煮麫糊和丸如梧桐子大每服二十丸至三十丸空心食前醋湯下藘薈丸治傷中赤白帶下慮㑹半兩赤石脂樗皮生薑汁炙地榆剉各一兩牛角䚡各三分禹餘糧醋淬阿膠炙燥各半兩側柏一兩一分右為末研匀錬蜜丸如梧桐子大每服二十丸陳米飲下龍骨散治婦人經血暴下兼赤白帶下不止龍骨一兩烏賊魚骨去甲鹿茸去毛酥炙續斷芍藥剉炒赤石脂肉蓯蓉酒浸切焙各三兩乾地黄炒一兩半右為散每服二錢空腹米飲調下日再柏葉散治傷下血下兼帶或白或赤臍下㽲痛側柏葉芍藥艾各三分熟乾地黄焙禹餘糧醋淬騏驎竭各一兩當歸剉焙牛角䚡炙各三分右為細末研匀每服二錢生薑米飲調下川芎散治婦人崩漏帶下諸方不效者川芎當歸生地黄伏龍肝龍骨芍藥蒲黄各一兩御米殻去蒂蜜浴炒焦四兩右為細末每服二錢温酒或米飲調下食前地榆湯治婦人經血崩下兼帶下積久不差面目萎黄困倦羸瘦地榆當歸切焙阿膠炙燥黄耆剉各一兩半艾葉三分龍骨碎二兩右㕮咀如麻豆大每服三錢水一盞薑三片煎至七分去滓食前温服寄生湯治婦人經血暴傷及帶下經久不止桑寄生雞蘇淡竹茹各一兩芍藥地榆各一兩半白龍骨二兩右㕮咀如麻豆大每服三錢水一盞煎至七分去滓食前温服一方用附子三分無淡竹茹黄耆丸治婦人血傷兼帶下不止黄耆剉芍藥各二兩赤石脂四兩當歸切焙附子炮裂去皮臍熟乾地黄焙各二兩右為末錬蜜丸如梧桐子大每服三十丸温酒下一方有乾薑無地黄血崩帶下用膠艾湯以海螵蛸炙黄刮碎和入同煎蠶退紙丸并澤蘭丸杉節散出聖惠方治血傷兼帶下不止杉木節燒灰存性楮皮紙燒灰各等分一方作蚕紙右研令匀細每服二錢米飲調下黄芩湯治婦人經血暴下兼帶下赤白不止黄芩去黒心當歸切焙柏葉焙蒲黄㣲炒各半兩艾葉炒一分生乾地黄焙二兩右粗搗篩每服三錢水一盞煎至七分去滓温服日三龍骨丸治婦人傷中血不止兼赤白帶下龍骨三分烏賊魚骨炙二分芍藥三分鹿茸酒炙三分熟乾地黄焙三分側柏葉三分右為末煉蜜和丸如梧桐子大每服二十丸乾薑米飲下地龍散治婦人衝任氣虚經血暴下兼帶下地龍炒鬱金棕櫚燒令存性柏葉地黄汁胎髮泥裹燒過去泥右各等分搗羅為散每服三錢温地黄汁酒調下不拘時地黄湯治婦人血傷帶下地黄剉炒當歸切焙黄耆剉阿膠炙令燥各一兩艾葉炒焙三分右粗搗篩每服三錢水一盞生薑三片煎至七分去滓温服日三車前湯治經血暴下兼帶下車前子淡竹葉黄芩去黒心阿膠炙燥杵碎生地黄各一兩右將四味㕮咀以水二盞煎至一盞下膠攪烊頓服阿膠散治婦人血傷兼帶下不止阿膠炙燥柏葉焙乾當歸去芦頭焙龍齒别搗細研各半兩禹餘糧醋淬細研一兩右為細散每服二錢用米飲調下早晨午時各一服立效散出經驗良方治血崩及赤白帶下晩蚕沙醋浸一宿焙乾秤當歸酒浸焙乾女子頭髮焙焦烏龍尾生薑自然汁浸炒乾各一兩即久塵灰舊棕葉燒存性二兩右為細末每服二錢熱酒調下芍藥酒浸方治婦人血傷兼赤白帶下芍藥黄耆生地黄各三兩艾葉一兩右四味㕮咀如麻豆大以絹袋盛浸酒一斗經宿後每食前隨量温飲之蒲黄丸治婦人血傷赤白帶下不止蒲黄龍骨各三兩右為末錬蜜和丸如梧桐子大每服三十丸食前黄耆湯下地黄益母草湯治婦人血傷不止兼赤白帶下生地黄汁益母草汁各半碗右半取半盞同煎至七分日三五服五倍子散治血崩帶下大艾一兩醋煮五倍子二兩炒赤烏梅半兩去核川芎半兩右為末每服二錢空心米飲下兩服止治血下帶下香附子杵去皮二分童子尿浸一日夜艾葉三分米醋煮透晒乾右為末秫米糊丸梧桐子大每服五六十丸艾醋湯或醋湯一方為末調服治崩中帶下并腸風㵼血及血痢以野猪外腎和皮燒灰細研羅過為末米飲下治帶中帶下腸風下血兼赤白痢用棕櫚燒灰存性為末湯破酒浸令淡調下三錢空心服治下閉血瘀女子帶下下血及婦人崩中用炒牛角䚡並燒灰酒服一方為末酒調服金不換散治婦人血海暴崩淋瀝不止朱砂二錢當歸飛羅麫烏龍尾竈屋上垂塵是也各半兩右為細末每服二錢燒秤鎚通紅投酒中用此酒調下食前一婦人經候黒血凝結成塊左廂有血瘕水泄不止榖有時不化有時化後血塊暴下併水俱作是前後二隂有形血脱竭於下既久經候猶下調水泄日見三兩竹食罷煩心不快飲食減少甚至瘦弱求治乃審而思之曰夫聖人治病必本四時升降浮沉之理權變之宜必先嵗氣無伐天和無盛盛無虚虚遺人天殃無致邪無失正絶人長命故仲景云陽盛隂虚下之則愈汗之則死大抵聖人立法且如升陽或發散之劑足助春夏之陽氣令其上升乃㵼秋冬收藏殞殺寒涼之氣此病是此也當用此法治之升降浮沉之至理也天地之氣以升降浮沉乃從四時如治病不可逆之故經云順天者昌逆天者亡可不畏哉夫人之升降亦有四時天地之氣不可認止在外人亦體同天地也今經漏不止是前隂之氣血已脱下矣水泄又數年是後隂之氣血下䧟已脱矣後隂者至有形之物也前隂者精氣之户下竭是病人用身之氣血常行秋冬之令隂主殺此等收藏之病是也陽生隂長春是也在人之身冷氣升浮者榖氣上行是也既病人周身氣血皆不生長榖氣又不升其肌内消少是兩儀之氣俱將絶既下元二隂俱脱血氣消竭假令當是熱證今下焦久脱此為寒矣此病乆沉久降寒濕大勝當急救之㵼寒以熱除濕以燥大升大舉以助升長補養氣血不致偏竭聖人立治法濕氣大勝以所勝治之助甲風木上升是也故經云風勝濕是以所勝平之也當先調和胃氣次用白术之類以燥其濕是以専滋元氣如其不止後用風藥以勝濕此便是大舉大升以助春夏二濕之久䧟下之治也益胃升陽湯血脱益氣古聖人之法也先補胃氣以助生發之氣故曰陽生隂長諸甘藥為之先務舉也皆以為補氣殊不知甘能生血生此陽生隂長之理故先理胃氣人之身内榖為寳黄耆二錢人參一錢半有𠻳去之炙甘草一分升麻半錢柴胡半錢白术三錢當歸身一錢酒浸炒麴一錢半陳皮一錢生黄芩㵼盛暑之伏瘦金肺逆每服中加少許秋涼去之右㕮咀每一服秤一錢或二錢視食加減之如食少已定二錢内更減之不可令勝食每服水二大盞煎至一盞去滓稍熱服如腹中痛每服加芍藥三分去皮中桂少許如渇或口乾加乾葛二分不計時候治暴下血以葫五七枚去梗皮量多少入豆豉搗為膏可丸即丸梧子大以米飲下五六十丸無不愈者普濟方卷三百三十
