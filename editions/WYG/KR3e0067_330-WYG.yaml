body:
  text: 普濟方卷三百三十明周王朱橚撰婦人諸疾門崩前漏下治漏下去血不止方出千金方取水蛭治下篩酒服一錢許日二惡血消即愈治女子漏下積年不斷困馬方出千金方取鵲重巢柴燒灰作末服方寸匕日三服三十日愈甚良重巢者鵲去年在巢中産今年又在上作重巢産者是也一方酒調下食前治婦人漏下出本草用水蘇莖葉煎取汁飲之治婦人漏下不斷方亦治崩中赤白不止氣虚竭方出千金方以亂髮皂莢水洗燒為細末空心温服酒調下一錢又方出千金方用鹿茸燒灰細研食前温酒調下二錢亦可治漏下赤色令人黄瘦虚竭又方出千金方用桃仁燒灰細研食前温酒調下二錢亦可治漏下赤色治血内漏下用蒲黄二兩水服方寸匕立止血露不絶方用竈突墨酒服一匕日三服效治血下不止産後崩中及治胎動腰痛搶心用蒲黄三兩酒五升煮取二升分三服食前又方以燒桑白皮水煮飲之治卒漏血欲死方以煮鷄蘇一斗常服之亦可又方出肘後方用烏賊魚骨五分桑耳五分為末酒服匕一日三服慎火草散出千金方治崩中漏下赤白青黒腐臭不可近令人面黑無顔色皮肉相連月經失度徃來無常小腹弦急或苦絞痛上至心兩脇腫脹食不生肌膚令人偏枯氣息乏少腰背痛連脇不能久立每嗜卧困懶慎火草白石脂禹餘糧鱉甲乾薑細辛當歸芎藭石斛芍藥牡蠣各二兩黄連薔薇根皮乾地黄各四兩熟艾桂心各一兩右治下篩空腹酒服方寸匕日三稍加至二匕若寒多者加附子椒熱多者加知母黄芩各一兩白多者加乾薑白石脂赤多者加桂心艾各二兩薔薇根皮散出聖惠方治婦人崩中漏下赤白青黒腐臭不可近令人面黒皮骨相連月經失度徃來無常小腹弦急或時腹内㽲痛不欲飲食薔薇根皮一兩剉慎火草半兩白藢三兩敗龜一兩塗酥炙全黄黄連一兩去須炒乾薑半兩炮裂剉桂心半兩細辛半兩當歸一兩剉㣲炒熟乾地黄一兩芎藭半兩石斛一兩去根剉白芍藥半兩牡蠣二兩為粉禹餘糧二兩燒醋淬七遍艾葉一兩㣲炒右件藥搗細羅為散每於食前温酒調下二錢雲母芎藭散出千金方治五崩身瘦欬逆煩滿心下痛而生瘡腰痛不可俯仰隂中腫如有瘡狀毛中痒時痛與藏相通小便不利常拘急頭眩頸項忽急痛手足熱氣逆衝急心煩不得卧腹中急痛食不下吞醋噫苦上下腹鳴漏下赤白青黄黒汁大臭如膠汚衣狀皆是内傷所致中寒即下白熱即下黒多食即下黄多欎即下青或喜或怒心中常恐或憂勞便發動大惡風寒雲母芎藭代赭東門邊木燒各一兩白薑蚕烏賊骨白堊蝟皮各六銖鱉甲一作龜甲桂心伏龍肝生鯉魚頭各十八銖右治下篩酒服方寸匕日三夜一鎮宫丸出濟生方治婦人崩漏不止或下五色或赤白不定或如豆汁或狀苦豚肝或下瘀血臍腹脹痛頭暈眼花久而不止令人黄瘦口乾胷煩不食代赭火煆醋淬七次紫石英火煆醋淬七次禹餘糧煆醋淬七次香附子醋煮各二兩陽起石煆紅細研芎藭鹿茸燎去毛醋蒸焙茯神去木阿膠剉蛤粉炒成珠子蒲黄炒當歸去芦酒浸各一兩血竭别研各半兩右為細末用艾煎醋汁打糯米糊為丸梧桐子大每服七十丸空心用米飲下治婦人崩中漏下青黄赤白使人無子出大全良方用乾薑京墨各一兩為末麵糊為丸酒下日五丸神驗治崩中漏下青黄赤白使人無子出本草用好墨末一錢匕酒服又方出大全良方以常炙猪腎食之麫裹煮吞之亦佳伏龍肝散一名禹餘糧散出三因方治血氣勞傷衝任脈虚經血非時忽然崩下或如豆汁或成血片或五色相雜或赤白相兼臍腹冷痛經久未止令人黄瘦口乾飲食減少四肢無力虚煩驚悸使人無子伏龍肝赤石脂煆酒淬牡蠣煆取粉烏賊骨取粉禹餘糧煆醋淬桂心各等分右為細末空腹酒飲任調下二錢白多者加牡蠣烏賊骨赤多者加赤石脂禹餘糧黄多者加伏龍肝桂心隨病加之一方有龍骨一方粥飲服椒朴丸治婦人血海虚冷臍腹㽲痛崩漏赤白男子腎虛下元久弱川椒去目炒出汗二兩蒼术去皮酒浸晒乾四兩乾薑四兩切厚朴二兩切與薑同和炒右為細末酒糊為丸如梧桐子大每服三十丸温酒送下食前四生丸治婦人沉痼久冷赤白崩漏臍腹㽲痛窘迫後重大便冷秘澁悶白附子乾薑炮舶上硫黄半夏薑製各一兩右為細末酒糊為丸如小豆大每服一十丸至十五丸艾湯送下空心日進二服治崩中漏下青黄赤白使人無子出聖惠方桑耳二兩半鹿茸十八銖右以醋五升漬炙燥漬盡為度治下篩服方寸每日三一方為散每服二錢又或温酒米飲下空心又方出千金方地榆知母右各指大長一尺者㕮咀以醋三升東向竈中治極濃去滓服之禹餘糧散出御藥院方治血氣血傷衝任虚損崩傷帶漏下久不斷或下如豆汁或成片如肝或五色相雜或赤白相兼臍腹冷痛面體痿黄心忪悸動發熱多汗四肢困倦飲食減少禹餘糧醋淬伏龍肝赤石脂白龍骨牡蠣烏魚骨桂去皮浮石各等分右為細末每服三錢煎烏梅湯調下白多加牡蠣龍骨烏賊魚骨赤多加赤石脂禹糧黄多加伏龍肝桂心隨病加治食前服小牡丹煎丸治婦人子宫九冷崩漏赤白臍腹疼痛斷續絶孕良薑切麫麩炒二兩附子炮去皮臍當歸牡丹皮熟地黄各三兩𤣥胡一兩右為細末酒糊為丸如梧桐子大每服二十丸食前温服治崩中漏下色黄赤白使人無子用燒蜂房末三指撮酒服之大效治崩中漏下赤白不止氣虛竭方用桑木中蝪屎燒灰酒服方寸匕鼈甲散治婦人崩中下五色不止諸藥無效宜服鼈甲二兩塗醋炙㣲黄烏賊魚骨一兩燒灰龍骨一兩雲母粉二兩鯉魚鱗二兩燒灰白术一兩肉桂一兩去皺皮白殭蚕三分㣲炒代赭二兩伏龍肝乾薑一兩炮裂剉芎藭二兩蝟皮一兩炙㣲焦黄白堊一兩右件藥搗細羅為散每服不計時候以熱酒調下二錢伏龍肝散治氣血勞傷衝任脈虛經血不時忽然崩下或如豆汁或成血片或五色相雜或赤相兼臍腹冷痛經久未止令人黄瘦口乾飲食減少四肢無力虚煩驚悸伏龍肝即灶中土也赤石脂各一兩熟乾地黄酒浸一宿艾葉㣲炒合二兩甘草炙肉桂去粗皮各半兩當歸去苖土乾薑炮各三分芎藭三兩麥門冬去心一兩半右為粗散每服四錢水一盞半入棗三箇擘破煎七分去滓食前温服之牛角䚡散治婦人崩中下五色或赤白不止四肢虚困腹中時痛牛角䚡二兩燒灰龍骨一兩當歸三分剉㣲炒乾薑半兩燒裂剉禹餘糧二兩燒醋淬七遍熟乾地黄一兩半阿膠二兩搗碎令黄煙續斷一兩甘草半兩炙㣲赤剉右件藥搗細羅為散不計時候以温酒調下二錢騏驎竭散治婦人崩中下血五色惡物去來不斷宜服騏驎竭一兩芎藭一兩艾葉一兩㣲炒龍骨二兩烏賊魚骨二兩燒灰禹餘糧二兩燒醋淬七遍伏龍肝阿膠一兩半搗碎炒令黄燥熟乾地黄一兩半右件藥搗細碎羅為散每服不計時候以粥飲調下二錢側柏散治婦人崩中下五色及下血或月水不止側柏二兩㣲炒黄耆一兩剉地榆一兩剉赤芍藥一兩代赭一兩呉茱萸半兩湯浸七遍焙乾㣲炒牛角䚡二兩半燒灰禹餘糧二兩燒醋淬七遍右件藥搗細羅為散每於食前以温酒調下一錢伏龍肝湯治崩中去赤白或如豆汁伏龍肝如弹丸七枚生地黄四升一方五兩生薑五兩甘草艾葉赤石脂桂心各二兩右㕮咀以水一斗煮取三升分四服日三夜一艾葉散治婦人崩中下五色及産後餘疾宜服艾葉三分㣲炒丹參三分黄耆一兩半剉芎藭一兩忍冬一兩地榆一兩剉熟乾地黄一兩半右件藥搗粗羅為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服龍骨丸治婦人崩中下五色久不止龍骨一兩烏賊魚骨三兩燒灰白芍藥半兩側柏二兩㣲炙乾薑半兩炮裂剉鹿茸一兩去毛塗酥炙㣲黄熟乾地黄一兩半右件藥搗細羅為末錬蜜和搗三二百杵丸如梧子大每服於食前以粥飲下三十丸治婦人崩中下五色心煩腹痛宜服此方龍骨二兩乾薑三分炮裂剉白芍藥三分艾葉一兩㣲炒熟乾地黄烏賊魚骨一兩燒灰右件藥搗細羅為散每服不計時候以赤糙米粥飲調下一錢禹餘糧丸治崩中赤白不絶困篤方禹餘糧五兩白馬蹄十兩龍骨三兩鹿茸二兩烏賊魚骨一兩右為末蜜丸梧子大以酒服三十丸日再以知為度櫸葉散治婦人崩中下五色或赤白不止櫸樹葉三兩甘草一兩炙㣲赤剉麥門冬二兩半去心烙乾薑一兩炮裂剉右件藥搗粗羅為散每服四錢以水一中盞入棗三枚煎至六分去滓不計時候温服治婦人崩中下五色久不止牛角䚡二兩燒灰乾薑半兩炮裂剉龍骨一兩右件藥搗細羅為散每於食前以粥飲調下二錢治婦人崩中五色不止令人黄瘦心煩不食騏驎竭一兩鳥藥半兩瓷藥一兩細剉右件藥搗細羅為散每於食前以熱酒調下一錢又方茅根二兩浮萍草一兩刺薊根二兩右件藥細剉分為七服每服以水一中盞煎至五分去滓每於食前温服治崩中或赤白不問逺年月近取槐枝燒灰食前酒下方寸匕治崩中下血久不止或赤或黑臍下痛側柏炒芍藥龜甲炙桑耳各六分乾地黄黄耆續斷各五分當歸炙艾葉牛角䚡煆各四分禹餘糧十分右為末鍊蜜丸如梧桐子大每服三十丸煎黄耆湯空心一方加代赭研一兩半一方為細散每於食前以温酒調下三錢名側柏葉散治傷中崩絶赤用醍醐杵汁拌酒煎沸空心服一盞白石脂丸治婦人三十六疾胞中痛漏下赤白方白石脂烏賊骨禹餘糧牡蠣各十八銖赤石脂乾地黄乾薑龍骨桂心石韋白蘝細辛芍藥黄蓮附子當歸黄芩蜀椒鍾乳白芷芎藭甘草各半兩右為末蜜和丸如梧桐子大每日空心酒下十五丸日再一方有黄蘗半兩桑茸續斷散治婦人赤白漏下日月浸久淋瀝不斷亦治婦人傷中經水過多一名桑茸散桑茸炙續斷熟乾地黄焙各二兩阿膠炙燥柏葉㣲炙芎藭赤石脂各一兩半丹參一兩槲葉二兩半地榆剉碎二兩小薊根鹿茸酒浸去炙毛牛角䚡燒灰各一兩半龜甲醋炙二兩當歸切焙牡蠣粉熟艾炒各一兩半右為散每服二錢温酒調下米飲亦得不拘時鮀甲散治婦人經血不止五色不定鮀甲炙桑耳各二兩半金色者炙當歸切焙赤芍藥半兩呉茱萸湯洗焙乾炒各一兩半柏葉熬桑寄生熟乾地黄焙烏賊魚骨去甲人參禹餘糧煆醋淬二兩右為散每服二錢米飲調下空心服芍藥散治婦人經血不止兼五色不定芍藥剉炒龍骨黄耆剉白术剉炒各一兩乾薑炮半兩烏賊魚骨去甲酥炙附子炮裂去皮臍桂去粗皮牡蠣燒研生乾地黄焙各三分右為散每服二錢温酒調下米飲亦得地黄湯治婦人經血不止顔色不定生乾地黄焙五兩艾葉黄芩去黒口當歸切焙各二兩地榆四兩伏龍肝柏葉生薑切焙蒲黄各三兩右粗搗篩每服三錢以水一盞煎七分去滓温服日二夜一白芍藥散治婦人漏下五色不止淋瀝連年黄瘦萎瘁白芍藥一兩牡蠣一兩燒為粉熟乾地黄一兩半白芷三分乾薑三分炮裂剉桂心一兩烏賊魚骨一兩黄耆三分剉五色龍骨一兩半右件藥搗細羅為散每於食前以温酒調二錢生乾地黄散出千金方治漏下去黄方黄連大黄桂心各半兩黄芩䗪蟲生乾地黄各六銖右治下篩空心酒服方寸匕日三白石脂丸治婦人經血五色雜下或濁白日久不止白石脂芎藭大薊伏龍肝各六兩熟乾地黄十兩焙阿膠炒令燥三兩右為末蜜丸梧子大每服三十丸米飲下空心晩食前各一服乾漆散出千金方治漏下黑色乾漆炒令煆盡大黄剉炒一作麻黄細辛去苗葉桂去粗皮各一兩甘草炙剉三分右為散每服二錢粥飲調下温酒亦得食前服大黄散出千金方治婦人漏下青色大黄剉炒三分桂