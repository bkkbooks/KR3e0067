body:
  text: 普濟方卷七十二明周王朱橚撰眼目門肝實眼論通肝氣於目其氣和平則諸疾不生過實則生患乃有肝實眼之證令人目痛如刺久不已則目赤而生淫膚息肉治宜瀉之又當視其老壯凡人五十以前可服瀉肝湯過五十則不可或有是疾當不得已而用之此眼雖癢痛而頭不旋但漸漸昏暗如物遮定全無翳障或時生花此肝有實熱又云此因心肝滯留偏熱致使眼疼痛生翳膜經久其色銀如釘釘入黒睛此證不可治方石膏散聖濟總録治肝臟實熱目痛如刺漸生淫膚息肉石膏碎菊花各二兩牛黄研枳殻去穰麩炒獨活去蘆茈胡去苖白附子炮大黄剉炒漏蘆去蘆各一兩木香乾蝎炒㯽榔剉各半兩右為散每服二錢七分薄荷湯調下洗肝湯聖濟總録治肝實眼人參山梔子仁黄芩去黒心赤茯苓去黒皮菊花地骨皮芎藭茈胡去苗桔梗炒各一兩黄連去鬚甘草炙剉各半兩右麤搗篩每服三錢七分水一盞入苦竹葉七片煎至七分食後臨卧温服瀉肝前胡湯療肝實熱目痛胷滿急塞前胡秦皮細辛梔子仁黄芩升麻㽔仁决明子各三兩芒硝三兩苦竹葉切一升車前草切一升右切以水九升煑取三升去滓内芒硝分為三服忌生菜前胡湯治肝實熱目赤乾澁前胡去蘆頭秦皮去粗皮細辛去苗决明子㣲炒梔子仁黄芩去黒心升麻枳殻去穰麩炒􅅋仁甘草炙剉各一兩右麤擣篩每服五錢水一盞半煎至八分去滓食後臨卧温服之羚羊角散聖濟總録治肝臟實熱眼目昏暗時多熱淚羚羊角鎊羌活去蘆頭𤣥參車前子黄芩去黒心栝蔞山梔子去皮各半兩胡黄連菊花各三分細辛去苖葉一分右為散每服二錢食後竹葉熱水調下竹葉湯聖濟總録治肝臟實熱眼赤疼痛淡竹葉犀角屑木通剉炒黄芩去黒心各一兩𤣥參黄連去鬚車前子各一兩一分芒硝二兩大黄㣲炒細辛去苖葉各一分右麤擣篩每服五錢水一盞半煎至八分去滓食後温服日二服洗肝乾藍煎治肝熱衝眼眼眥赤赤脉息肉痛閉不開熱勢彭彭及目睛黄乾藍車前葉苦竹葉各三升細辛秦皮㽔仁梔子仁芍藥各三兩决明子四兩升麻二兩右㕮咀以水二斗先煑乾藍車前竹葉取一斗去滓澄清取八升内藥煑取三升分三服須利加芒硝二兩龍膽散治肝熱烏睛浮腫赤暈昏疼龍膽草梔子仁各二錢防風山茵陳川芎𤣥參荆芥甘菊去蕚楮實甘草各一錢右為末每服一錢半食後茶清調下决明子湯聖濟總録治肝臟實熱目眥生赤肉澁痛决明子炒茈胡去苗黄連去鬚防風去蘆苦竹葉升麻各三分甘草炙剉菊花各半兩細辛去苖葉一分梔子仁煎出千金方治肝實熱目眥痛如刺梔子仁决明子􅅋仁各一兩車前葉一兩六銖秦皮一兩六銖苦竹葉二握洗細辛半兩石膏二兩碎如小豆大赤蜜三合右㕮咀以井花水二升煑取七合去滓下蜜更煎取四合以綿濾之乾器貯宻封勿使草芥落中以藥汁細細仰卧以傅目中生地黄湯聖濟總録治肝實熱眼熱痛不止生地黄汁蜜車前汁三味合二盞和勻升麻梔子仁各一兩細辛去苗葉各半兩芍藥一兩半𤣥參一兩右五味為末每服五錢水一盞半煎至一盞入前三汁共盞半再煎沸去滓温服大麻仁湯出聖惠方治肝熱眼痛赤大麻仁人參决明子㣲炒車前子黄連去鬚各三分訶梨勒皮秦皮去粗皮大黄剉炒各一兩右麤搗篩每服五錢水盞半煎至七分去滓食後臨卧服石决明丸聖濟總録治肝實眼目生淫膚息肉腫痛石决明一兩黄連去鬚車前子細辛去苗梔子仁大黄炒剉子芩各半兩菊花一兩半右為末煉蜜和丸如梧桐子大每服三十丸食後淡漿水下臨卧再服决明子丸聖濟總録治肝實目生赤脉息肉磣痛决明子車前子苦參黄連去鬚黄芩去黒心大黄各一兩半䓆蓂子人參各一兩右為末煉蜜和丸如梧桐子大每服二十丸食後以淡漿水下臨卧再服黄連丸聖濟總録治肝氣壅實目痛如刺黄連去鬚大黄剉炒令香熟各一兩防風去蘆龍膽去土人參黄芩去黒心各三分細辛去苗葉半兩右為末煉蜜和丸如梧桐子大每服三十丸食後温水下臨卧再服秦皮湯聖濟總録治肝氣實脇下妨悶筋脉痠痛眼昏濁視物不明秦皮去粗皮羚羊角鎊各一兩半桔梗炒細辛去苗葉各半兩薏苡仁伏翼炙乾各一兩右麄搗篩每服五錢水一盞半大棗二枚劈破煎至七分入荆瀝半合再煎三兩沸食後臨卧服升麻湯聖濟總録治肝實熱目暗不明升麻大青薔薇根皮去黒皮各一兩射干𤣥參各二兩黄栢去粗皮三分右麤搗篩每服五錢水一盞半煎至八分去滓入蜜半合再煎三兩沸食後臨卧温服麥門冬湯聖濟總録治肝實熱毒氣上薫目赤痛痒生麥門冬去心萎􅅋秦皮去粗皮赤茯苓去黒皮各一兩半大黄生用升麻各一兩右剉如麻豆大每服五錢水一盞半入竹葉十片煎至八分去滓下朴硝末一錢更煎令沸空腹温服洗肝散出三因方治肝熱赤脉貫睛澁痛衝風淚下兼熱血攻心防風羌活各半兩甘草一分馬牙硝二兩白蒺藜一兩半右為末每服二錢食後白湯調下瀉肝散出直指方治肝熱赤眼腫痛梔子仁荆芥大黄甘草右等分剉每服二錢水煎食後服又方出危氏方治肝有實熱郁李仁荆芥各一分甘草炙大黄各半兩右剉散每服三錢水一盞半煎食後温服苦參丸聖濟總録治肝實熱多食壅物毒氣傷眼昏暗苦參車前子洗枳殻去穰麩炒各二兩右為末煉蜜為丸如梧桐子大每服三十丸空心米飲下羊肝丸海上方治肝經有熱目赤睛疼視物昏澁又治翳障青盲羯羊肝一具生用黄連去鬚别研為末右先將羊子肝去筋膜於砂盆内擂爛入黄連末杵和為丸如梧桐子大每服五十丸不拘時熟水下禁食猪肉及冷水或暖漿水下連作五劑差昔唐崔承之内障䘮明夜坐聞有聲問誰荅昔䝉出活今來謝遂以方合服眼復明田螺方龍木治肝熱目腫痛取田中螺大者七枚淨洗新汲水養去穢泥重換水浸洗仍旋取於乾器中著少鹽花於口上承取自出汁用㸃目逐箇如此用了却放之瀉肝湯治肝熱目赤羞明隱痛生瘡翳膜赤腫黄芩黄連防風山梔子各一兩大黄甘草炙各半兩右為末每服三錢水一大盞入竹葉十片同煎至八分去滓温服如熱多每服入朴硝一錢同煎取利即止助陽活血湯衞生寶鑑治眼發之後上熱壅甚白睛紅多眵淚無疼痛而隱澁難開此服苦寒藥過多真氣不通九竅也故眼昏花不明宜助陽和血補氣防風七分黄耆二錢甘草炙一錢蔓荆子一錢當歸五分白芷五分升麻五錢柴胡三分右㕮咀都作一服水一盞半煎至一盞去滓熱服臨卧避風處忌風寒及食冷物甘菊花散治肝氣壅塞翳膜遮暗隱澁難視甘菊花一兩白蒺藜木賊防風去蘆甘草炙各一兩木香一分右為細散每服一錢七分沸湯㸃眼不拘時除肝家熱明目去熱毒氣風眼赤淚以决明子朝朝取一匙挼令淨空心水吞之百日見夜光又一方取决明作菜食之本草腎肝虛眼黒暗論夫天一生水在臟為腎天二生木在臟為肝腎藏精肝藏血人之精血充和則腎肝氣實上榮耳目聰明視聽不衰若精血虧耗二臟虛損則神水不清瞻視乏力故令目黒暗龍木論云眼坐起生花外障此眼初患之時眼中别無所患唯久坐多時忽然起後頭旋眼中黒花發昏良久乃定皆因肝腎虛勞受風心臟熱毒上攻致有此疾如或治療稍遲以後變為青盲切宜服鎮心丸補腎散歌曰眼中無别患蹲坐要生花初患頭旋悶心肝風觸他腎虛兼受熱房事每頻多鎮心肝要補早服莫蹉跎任信年深後為災不禁何更因諸疾作瞳子必遭疴危氏得效方云此眼與緣風候相似但時時黒花起乃腎受風邪熱攻於眼宜凉腎又不痛不痒瞳人儼然如不患者但㣲有頭旋及見生花或勞則轉加昏䑃俱服還睛散起在黒水上如小黒豆疼痛如淚出不可㸃藥此乃腎虛受風熱而得悶耳宜先服羚羊角散後補腎丸凡起坐生花或覺頭旋而悶耳蟬鳴此乃腎虛兼受客熱不節房事宜多服補腎丸方填睛育嬰丸聖濟總録治肝臟氣虛風毒上攻兩目赤痒腫痛昏澁迎風多淚及有努肉或風内外障青盲攀睛翳膜石决明一枚洗刷白芷白茯苓去黒心陽起石飯上炊五度桂去粗皮杏仁去皮尖雙仁炒防風去蘆肉蓯蓉酒浸去皺皮炒陳橘皮浸去白焙梔子花生薑切焙厚朴去粗皮拌生薑炒令煙盡甘草炙剉人參磁石末飯上炊五度各二兩青葙子􅅋仁水浸各二兩升麻剉熟地黄焙各八兩龍腦一分車前子黄柏去黒皮麥門冬去心焙槐子黄連乳香各四兩烏賊魚骨去甲黄芩去心苦參各一兩右為末煉蜜為丸如梧桐子大每服六丸空心白湯下食後更服十丸漸加至二十丸夜光丸治腎虛血弱肝經不足風毒上攻眼目視物昏花久則漸成内障青盲天門冬去心焙麥門冬去心焙生地黄羅參熟地黄白茯苓乾山藥各一兩枸杞子牛膝酒浸金釵石斛酒浸草决明炒杏仁去皮尖甘菊楝淨兎絲子羚羊角蓯蓉酒浸焙五味子炒甘草炙沙苑蒺藜鎊已上各七錢半枳殻麵炒生烏犀搒青葙子各半兩右為末煉蜜為丸如梧桐子大每服三五十丸空心温酒下鹽湯亦可青箱子丸治腎肝風虛目昏暗視物不明青箱子桂去粗皮葶藶熟乾地黄焙細辛去苖葉茺蔚子枸杞子决明子隔紙炒五味子黄芩去黒心防風去蘆白茯苓去黒皮地膚子澤瀉麥門冬去心焙各一兩半車前子兎絲子酒浸一宿另搗為末各半兩兎肝一具慢火炙令乾右為末煉蜜和丸如梧桐子大每服三十丸食後米飲下臨卧再服决明子丸治肝腎虛目黒暗或見黒花飛蠅方見本門目生膚翳類决明丸治肝虛膈熱眼目昏暗漸成障蔽或見黒花不能遠視决明子青箱子茺蔚子車前子地膚子五味子炒細辛去苗葉枸杞子去莖蒂麥門冬去心焙生地黄焙桂去粗皮赤茯苓去黒皮澤瀉防風去蘆芎藭葶藶隔紙炒紫色各一兩右為末煉蜜和丸如梧桐子大每服二十丸食後良久米飲下日三服當歸湯治腎虛眼黒瞳子散當歸身二錢黄連酒洗黄芩各二錢甘草炙三錢茈胡一兩白芍藥二錢生地黄三錢酒洗隂乾右㕮咀水煎臨卧服羚羊羌活湯治肝腎虛眼見黒花或似蠅翅羚羊角屑羌活去蘆頭黄芩去黒心附子炮製去皮臍人參澤瀉山茱萸秦芄去苗土决明子㣲炒車前子青箱子各一兩半甘草㣲炙一兩黄耆剉二兩茈胡去苗二兩半右麤搗篩每服五錢水一盞半煎至八分去滓温服不拘時再服空青丸聖濟總録治腎久虛目暗漸生翳障空青研水飛過真珠末各一分犀角屑羚羊角屑防風去蘆升麻剉防己各半兩麥門冬去心焙人參茺蔚子陽起石細研前胡去蘆頭各一兩虎睛一對右為末煉蜜和丸如梧桐子大每服五丸加至十丸煎麥門冬湯下温椒湯亦可决明丸聖濟總録治肝腎氣虛風熱上攻目赤腫痛决明子黄連去鬚人參𤣥參槐子升麻白茯苓去黒皮沙參各一兩地膚子青葙子苦參各三分車前子一兩半地骨皮一兩右為末煉蜜和丸如梧桐子大每服二十丸食後米飲下臨卧再服蓯蓉丸聖濟總録治肝腎氣虛眼目昏暗視物不明兼青盲山芋續斷人參各一兩肉蓯蓉洗淨切焙一兩牛膝酒浸切焙一兩山茱萸一兩陳麵炒黄獨活去蘆頭一兩巴㦸天去心杜仲去皺皮塗酥炙兎絲子酒浸一宿焙乾另研各一兩熟乾地黄焙桑寄生炒各二兩右為末煉蜜和丸如梧桐子大每服二十丸空心鹽湯下加至三十丸摩頂膏治腎虛眼目昏暗及風毒上衝腦脂流下變為内障生麻油二大升酥三兩淡竹葉一握蓮子草汁一大升七八月採槐子一兩一分曽青研一兩鹽花三兩長石另研一兩半一名理石梔子葉朴硝萎蕤大青吳藍各一兩半右除油酥外細剉以厚綿裹先下油并酥在鐺内煎後下綿裹藥並蓮