body:
  text: 普濟方卷四百七明周王朱橚撰嬰孩諸瘡腫毒門赤瘤附論夫小兒身上或一片片赤色如臙脂染及熱漸引者此名丹毒俗謂之瘤若因熱而得者色赤或因風而得者色白皆腫而壯熱也可用一小鈹刀鎌去其惡血毒未入腹者可療也方升麻散治小兒心熱身上赤瘤色如臙脂皮膚壯熱川升麻川大黄㣲炒各半兩犀角屑黄芩各一分川朴硝半兩梔子仁木通各一分元參半兩甘草炙一分右搗羅為散毎服一錢以水一小盞煎至五分去滓放温不計時候量兒大小分減服之木通散治小兒身體赤瘤片片赤色如臙脂染毒氣漸引者川大黄炒川朴硝各半兩梔子仁甘草各一分川升麻半兩木通一兩右搗羅為散毎服一錢以水一小盞煎至五分去滓温服量兒大小加減大黄散治小兒赤瘤熱如火一名截毒散川大黄生用鬱金黄蘗膩粉各半兩猪牙皂莢去皮子半兩右搗為散以生油調塗一方無黄蘗有芍藥又方護火草汁三合赤地利末膩粉各一錢右藥相和量兒大小分減服之良久瀉下血片為效其滓傅在赤處亦佳治小兒赤瘤半身色紅漸漸展引不止川大黄生一兩赤小豆半合炒令紫色川朴硝三分右羅為末以鷄子清調塗亁則易又方牛膝一兩去苗甘草半兩生用右細剉以水一大盞煎至五分去滓調伏龍肝末塗之立效又方李子油三兩硃砂一分末右藥調如膏塗之又方用醬汁塗之又方用蘿藦汁塗赤處隨手便瘥又方用蕎麥麫以醋調塗之不過三兩上瘥又方用胡荽汁塗之又方用白礬一兩以水煮冷熱得所洗之又方用燒粉家洗瓮水塗之又方用紅藍花末以醋調塗之又方用蕓薹葉搗爛塗之又方用砒霜不限多少細研於硯中著水入霜以墨濃研用筆㸃塗之良久以冷水洗後更塗以瘥為度又方用􅌝􅌣根搗末以醋調塗之亁即瘥又方用糯米水研如粥塗之乾再塗又方用粟粉炒令黑以唾調塗之朱流朱風針刺瘤頭出血㸃麻油次用藥朴硝赤小豆大黄薄荷側柏等分右為末水調苦菜汁刷赤處周匝仍服羌活散柴胡湯並加荆芥防風蟬蛻仍審虚實用藥可也身有赤處附論夫小兒陰汗為風邪熱毒所傷與血氣相摶熱氣蒸發其肉色赤身壯熱也方丹參散治小兒身上有赤引於頰上或口傍眼下赤如臙脂靣上皮即皺剥漸漸引多此是心熱血凝所為其治法宜以小刀子鋒頭鎌破令血出後宜服此藥丹參黄芩各一分麻黄半兩去根節葛根枳殻麩炒㣲黄犀角屑各一分右搗羅為散毎服一錢以水一小盞入竹葉十片竹茹半分煎至五分去滓温服不計時候量兒大小分減服之麥門冬散治小兒身上有赤煩熱麥門冬半兩去心蘆根葛根犀角屑漏蘆甘草炙㣲赤各半兩右搗羅為散毎服一錢以水一小盞入竹葉十片煎至五分去滓温服不計時候量兒大小加減鈆霜散治小兒身上有或瘀腫或如火丹煩渇渾身赤引壯熱鈆霜菉豆粉各半兩右細研為散以蕓薹菜汁調塗之又方用伏龍肝半兩乳髪二兩燒灰細研為散以水調塗赤處效一方用桃仁浸去皮研爛以脂和塗又方用用黄蒿穗以水濃煎入鹽少許温温洗之一方用白礬細研以生油調塗一方用芭蕉根搗絞汁塗之又方用水中苔搗末以水調塗之又方用川芒硝以水研塗之又方治小兒身有赤腫起者用熬米粉令黑以唾和傅之熛瘡附論夫小兒熛瘡者由風熱毒之氣所傷客於皮膚生熛漿而潰成瘡故名熛瘡也方梔子膏治小兒熛瘡梔子仁川升麻犀角各半兩蛇銜草三分藍葉一兩生地黄一兩黄芩半兩川大黄一兩右細剉以猪脂一觔同於鍋内以㣲火煎令藥色變濾去以瓷盒盛候冷塗之水銀膏治小兒熛瘡水銀一兩膩粉一分與水銀於手掌中以津研如泥松脂土蜂房各一兩黄蘗川大黄生用各一兩右搗羅為末以煉成猪脂一觔與藥末同入鐺中慢熬令稀稠得所將水銀膩粉入膏中攪令勻膏成以瓷盒盛候冷塗之不過三五上瘥硃砂膏治小兒頭上熛漿起如釘盖一兩日後皮面及胷背皆生瘡硃砂半兩胡粉二兩水銀半兩右㸃少水都研令水銀星盡以臘月猪脂三兩入銚子内慢火上鎔化去滓入硃砂等攪成膏以瓷盒收候冷塗之瘥治小兒卒得熛瘡赤爛用牛糞燒灰細研傅瘡上日三用之治小兒瘡初起熛漿似火瘡名曰熛瘡亦名爛瘡用桃仁熟搗以面脂和傅之亦治徧身赤腫起又方用馬骨燒灰傅之治小兒卒得熛瘡爛瘡用鐵煅淬水中二七遍以浴兒二三遍能治熛瘡漿生地黄膏治小兒熛漿瘡毒氣發於遍身者生地黄川升麻藍葉梔子仁川大黄各一兩用細剉以猪脂八兩同於鍋内以慢火煎令藥色變濾去滓以瓷盒盛候冷毎用少許塗患處疥附論夫小兒瘡疥率因於蟯蟲變化而生小兒多此疾仍喜生於手指縫間浸淫遍體近煖及衣服過厚則痒悶不任搔之黄汁出疼痛不止盖由風熱客於脾肺散於肌肉薰發皮膚使然也有夫來買苦參欲治疥不識藥性緩急但問人曰可治濃煎一碗服之須臾大吐涎一盆三二日疥即痂矣方苦參丸治小兒風熱肺疳皮膚生疥鼻内瘡痒苦參四兩以酒三升熬成膏胡黄連二分楝實去皮炒蕪荑炒蜣蜋去皮翅炙木香各三兩右搗羅六味為末入苦參膏内和搗如硬入蜜少許和丸如麻子大一二歳毎服五丸食後温水下更量兒大小加減治小兒瘡疥體熱黄連去鬚為末糯米粉各二兩水銀一兩研胡粉炒一兩半吳茱萸湯浸炒為末赤小豆為末各一分右先以水銀和津於手中研如泥次以猪脂四兩入甆器内慢火化去滓下五味藥末攪勻成膏先洗瘡拭亁塗之雄黄膏療小兒瘡疥瘙痒搔之成膿瘡不止宜用雄黄研雌黄研各一兩烏頭一枚松脂亂髮各一鷄子大猪脂一觔右件藥除雄黄雌黄外以煉成猪脂一觔於鐺中煎出油下烏頭松脂亂髮等候烏頭色黑亂髮消盡膏成綿濾去滓入雄黄雌黄攪令勻盛於不津器中候冷塗瘡上日三用之黄蘗散治小兒疥身上熱瘡並治之黄蘗炙黄連去鬚赤小豆臰黄各一兩水銀半兩硫黄一分與水銀結為沙子右搗羅為末與臰黄水銀砂子同研令細用生油調日三塗之效一方無硫黄名三黄散黄連散治小兒瘡疥體熱黄連去鬚黄蘗去粗皮炙秫米炒各一兩赤小豆膩粉研各一分右搗研為散油塗舊帛上先洗去瘡痂封之蛇床子散治小兒瘡疥瘙痒不止蛇床子茱萸湯洗焙亁硫黄研蕪荑仁研各一分膩粉少許研右搗研為散用油一合入葱一莖同煎候葱黄色停冷調藥塗之硫黄同研黄連散治小兒疥遍身皆有疼痒不止黄連二兩去鬚胡粉吳茱萸一兩赤小豆一百粒水銀二兩與胡粉㸃少水同研令星盡右除胡粉水銀外搗羅為末入胡粉水銀同研令勻以臘月猪脂和塗之亦治瘑瘡苦參湯治小兒疥及諸瘡洗浴苦參丹參苦楝根各半兩防風半兩蒴藋根三兩右細剉和勻以水一斗煎至五升濾去滓於宻室中洗浴兒以故帛拭亁即塗前膏臰黄膏治小兒胎中受風長後身體生疥瘙痒不止臰黄硫黄各一分葱白一莖細切右研細用清油一兩入鍋子内熬令熱下少許臘及葱白次下硫黄臰黄攪令勻膏成以甆盒盛旋旋塗之治小兒疥痒不止方硫黄二兩白礬灰四兩右細研為散以烏麻油調如稀麫糊炙令疥熱薄塗摩之治小兒疥瘡用亂髮灰以猪膏和塗之治小兒疥痒痛不可忍硝石一兩右研為散以生油調如膏毎用時先以泔清洗之拭亁塗之又方用羊蹄根搗末以猪脂和塗之又方用硫黄細研以醋調傅之治小兒疥用燒竹葉為灰鷄子白和傅之日三上亦治疥瘡又方用臭酥胡粉傅之治小兒頭面瘡疥用麻子五升為末以水和絞取汁與蜜和傅之若得白犬膽傅妙治小兒去瘡疥鬼疰驚癎用虎骨煮汁浴治小兒壯熱一切瘡疥皮膚瘙痒用梓白皮煎湯洗之梓枝皮有數般惟楸梓佳餘不堪治小兒瘡疥以繭子蛹汁為湯浴之亦能殺蟲治小兒瘡疥以枕襯煮湯浸洗之良癬附論夫小兒體有風熱脾腑不利或濕邪搏於皮膚壅滯血氣皮膚頑厚則變諸癬或長或圎漸漸長大得寒則稍減煖則痒悶搔之即黄汁出又或在面上皮如甲錯亁燥謂之妳癬此由飲乳乳汁漬著乃生復以乳汁洗之方雌黄膏治小兒瘑癬風痒不計亁濕不絶雌黄研黄連去鬚莽草蛇床子炒黄蘗去粗皮炙苦參半兩蕪荑炒半兩藜蘆硝石研各一分松脂二兩半杏仁浸去皮尖雙仁别研如膏一兩右除雌黄松脂杏仁外搗羅為末取臘月猪脂入鐺中煎令沸下杏仁次下諸藥末攪勻凝為膏毎用先以醋泔洗拭亁塗之一方於故帛上貼日二換之雌黄膏治小兒癬久不瘥雌黄細研多年薤根白礬藜蘆去蘆頭𤓰蒂胡粉各一分水銀三分與胡粉㸃少水同研令星盡右搗羅為末入胡粉水銀同研用猪脂調為膏輕揩塗之附子散治小兒濕癬附子生用去皮臍雄黄研白礬燒灰研吳茱茰湯浸炒各一兩米粉半兩右搗研羅為散毎日三次用綿揾撲之白礬膏治小兒癬痛不止白礬灰硫黄膩粉各一錢緑礬半兩川大黄一分末右藥同研為末以米醋一升熬如黑餳收放甆器中旋取塗之妙金華散治小兒一切亁濕瘡癬疳瘡等黄蘗末黄連各半兩為細末黄丹一兩水飛輕粉一錢麝香一字研右同研勻先以温水洗後貼之如亁癬瘡用臘月猪脂和傅如無用麻油亦可桑螵蛸散治小兒一切瘡癬痒痛不止桑螵蛸十枚燒存性二分膩粉一錢麝香半錢右研為散用生油調翎掃候亁有裂處再掃青金散治小兒濕癬浸淫瘡白膠香二兩研蛤粉半兩青黛二錢半右研勻為末細亁糝瘡上治小兒癬雜瘡白膠香黄蘗輕粉各等分右為細末以羊骨髓調塗癬上桃紅散治小兒妳癬瘡明礬煆二兩嫩松香四兩末黄丹二兩煆右為末用燭油調傅之雄黄散治小兒亁濕痒癬雄黄麝香各一分右細研為散甲煎油調塗之亁再上治小兒癬不計亁濕瘙痒不絶羊蹄根一兩亁笋一兩燒灰右為末以麻油調塗之治小兒久癬萹蓄根去土一把附子二枚去皮臍生用右搗令爛以好酒和塗之毎塗藥時先以皂莢湯净洗拭亁後用藥日二塗之治小兒亁癬方水銀半兩胡粉一兩右二件藥㸃少水同研令星子盡以鷄冠血和塗之治小兒諸癬及瘙痒用羊蹄根取汁以蜜和勻先刮瘡四邉以葉亁之半日許拭去更以陳米醋和羊蹄根滓傅瘡上又方用槐白皮五兩剉以水一升煎三五沸候冷數洗之治小兒亁濕癬用亁蟾燒灰細研以猪脂和塗之小兒癬久不瘥宜用黄礬一兩燒灰右細研毎用先以水净洗拭亁塗之又方用薤根以醋搗和塗之又方用醬瓣雀糞相和研塗之又方用楮樹白汁塗之治癬瘡内有蟲痒不可忍兼治濕癬蛇床子一味研為細末右以滓泡湯洗挐令破次用臈月猪脂和傅患處一日用二次一方先煎韭菜湯洗炙甲散治眉叢中生瘡名曰鍊銀癬一名前甲散用穿山甲前􅈩鱗炙焦為末清油輕粉和傅治小兒濕癬用桃樹青皮為末和醋傅上日二次又方用枸杞根搗作末和臈月猪脂傅之又方用煎馬尿以洗之甚妙又方右揩破以牛鼻上津傅之治癬及室女花癬小兒妳癬用韭菜根汁先搽破次塗之治襁褓小兒面上生妳癬用白膠香碾為極細末酸漿水調傅日上兩次治小兒妳癬瘡用燒狗屎灰和猪脂塗之摩風膏治小兒遍身疥癬痒苦參瀝青蕪荑炒黄蠟各一錢巴豆三粒去殻輕粉五分真麻油半兩蠍二箇右同油煎至巴豆焦濾去所煎物入輕粉和勻傅疥切效黄連膏治小兒癬疥赤腫及濕癬久不瘥黄連去鬚黄蘗去粗皮炙蛇床子炒䕡茹水銀手掌内唾研如泥入膏中各一兩礜石煅别研右搗羅前四味為末以臘月猪脂四兩同入銚子内煎四五沸下礬石末又煎三兩沸取下良久下水銀攪如稀泥候冷先以清泔皂莢湯洗拭亁以火炙痒塗之日三上芍藥散治小兒妳疥癬癩赤芍藥黄連蛇床子等分右為末入輕粉半錢麻油調塗洗破立效忌動風物羊蹄散治小兒頑癬久不瘥羊蹄根四兩剉白礬半兩右爛研入米醋小半盞不住塗之候覺癬痒至痛即止至隔日浴去不過三兩次愈絳玉散治小兒頭上幷身上疳癬時復痒痛皮膚破爛濕潤不止黄丹炒紅二兩菉豆粉炒黄三兩右為細末清油調鷄羽掃於瘡上後糝聖金散大有神效聖金散石膏黄芩各一兩右為細末毎用不拘多少亁糝在瘡上覆以絳玉散神效月蝕瘡附論夫小兒耳鼻口間生瘡者世謂之曰蝕瘡其瘡隨月生死因以為名也世云月初生小兒以手指之則令耳下生瘡故呼為月蝕瘡也凡日月蝕時忌食飲腹中生䘌蟲及房室生子不具足必患月蝕瘡亦不可與兒乳日月復後乃不忌今人口臭齒齦宣露常有血出舌上生瘡者皆由犯此所致耳日月蝕時須救不救出行逢暴雨其救月杖須收取治䘌之神藥患此者以之救療方水銀膏治小兒月蝕瘡生在兩耳上出膿水不止水銀二兩胡粉一兩㸃少水與水銀同研令星盡黄連二兩去鬚搗羅為末松脂一兩右入乳鉢内研令勻似粉瘡若亁用煉成猪脂和如膏毎用先以鹽湯洗瘡令净拭亁然後塗之治月蝕惡瘡白肉硫黄䕡茹斑猫等分右件搗篩傅瘡上乾者以猪脂和傅之日三夜一又方地榆根薔薇根吳茱萸根各三兩右件搗篩以鹽湯洗瘡傅之日三白礬散治瘡生於兩耳鼻口間時瘥時發乃是濕搏血氣之所生世謂之曰蝕瘡隨月生死因以為名世云小兒見月初生以手指之則令耳下生瘡白礬蛇床子各一兩黄連半兩右為細末亁糝瘡上水調塗亦得一方加黄蘗三錢薔􅅔散治小兒月蝕瘡薔薇根一兩細剉地榆根剉虎頭骨各半兩右搗羅細末毎用一字先以温鹽湯净洗拭亁傅之治月蝕瘡久不瘥亁蟾一枚五月五日燒灰用硫黄一兩細研白礬二兩燒令汁盡右細研為末傅瘡上治小兒月蝕瘡青蜒一枚母猪蹄甲一枚救月杖一分右燒為灰研為散以蜜水和塗治小兒耳邉鼻下赤爛濕痒名月蝕疳瘡黄丹煅令赤色一錢菉豆粉白礬飛過各一錢右研細亁傅瘡上唾調亦可治小兒月蝕瘡立效方敗鼓皮一兩燒灰蝦蟇一枚燒灰右細研為散煉成猪脂和如膏塗之即瘥治小兒疽及月初即生常有黄水出右用酢和油煎令如粥及熱傅之二日一易欲重傅則以皂莢湯洗瘡乃傅之為妙治小兒月蝕瘡隨月生死右以胡粉和酥傅之五日瘥又方以水和傅之治月蝕九竅皆有瘡者耳後或耳下或鼻内生瘡是也右燒蚯蚓屎末和猪脂傅之清油亦可治小兒初得月蝕瘡用五月蝦蟇燒杵末猪脂和傅之療月蝕瘡用虎頭骨二兩杵碎同猪脂一升熬令骨黄取油塗上治小兒初生月蝕瘡及惡瘡用蛇蛻皮燒灰為末和猪脂傅上治小兒月蝕瘡用小麥蘖搗羅為末傅之又方用黄連為末傅之又方用胡粉和土等分研如粉傅之土用東方壁土又方用敗鼓皮燒灰細研以猪脂和傅之治月蝕瘡用蟾酥燒灰為末猪脂和傅之又方治瘡發用桃仁搗和蕎麥傅砂糖拂之熱瘡附論夫小兒熱者是諸陽氣在表陽氣盛則表熱小兒解脫腠理開則為邪所客風熱相搏留於皮膚則生瘡初作瘭漿黄汁出風多則痒熱多則痛血氣乗之則多膿血故名熱瘡也方黄芩膏治小兒熱瘡黄膿出黄芩一兩半黄蘗三兩梔子仁黄連去鬚各三分竹葉二兩生地黄二兩半胡粉三分川大黄水銀水少許與胡粉同研令星盡右除水銀胡粉外並剉如豆大以新綿裹用猪脂一觔半入鐺内於慢火上煎十餘沸候藥色紫去綿以布絞取汁候凝下水銀胡粉以栁木箆攪令勻膏成以甆盒盛日夜三四度塗之黄芩散治小兒熱瘡生於身體黄芩三分川升麻石膏各一兩甘草炙元參各半兩柴胡去苖川大黄㣲炒各一兩右搗為散毎服一錢水一小盞煎至五分去滓温服量大小加減梔子膏治小兒熱毒瘡梔子仁川升麻各一兩犀角屑三分蛇銜草黄蘗五合生地黄二兩黄芩一兩右細剉以猪脂一觔半同入鐺中於㣲火上煎令十餘沸濾去滓膏成於甆盒中盛塗於故帛上貼之水銀膏治小兒熱瘡水銀胡粉松脂各三兩右以猪脂四升煎松脂水氣盡下二物攪令勻不見水銀以傅之枳殻散治小兒身上生熱瘡心躁皮膚焮痛枳殻麩炒去穰甘草炙黄連去鬚各半兩右羅散毎服以蜜水調下半錢量兒大小加減治小兒熱瘡黄膿出黄蘗白礬燒令汁盡各一兩右羅為散傅於瘡上日用三次又方黄連去鬚半兩為末膩粉一分右研令勻以甜菜汁和塗於瘡上日三用之鷄子膏治小兒熱瘡右鷄子五枚去白取黄亂髮如鷄子許大二味相和於鉄銚子内炭火熬初甚亁少頃即髮焦遂有液出旋取置一瓷碗中以液盡為度取塗熱瘡上即以苦參末粉之頃在武陵生子月内便有熱瘡發於臂腿間初塗以諸藥及他藥無益日加劇蔓延半身狀候至重晝夜啼號不乳不睡因閱本草至髮髲本經云合鷄子黄煎之消為水療小兒驚熱下痢注云今俗中嫗母為小兒作鷄子煎用髮雜熬良久得汁與小兒服去痰熱主百病用髮皆取久梳頭亂者又鷄子本經云療瘡因是用之果如神效又方治小兒熱瘡黄膿出及治􅁖瘡用豆豉炒亁搗末傅之又方用伏龍肝搗末用鷄子白和塗之治孺子熱瘡以亂髮一團梨許大鷄子黄煮熟二物相和於銚子内炭火上熬初甚亁少頃髮焦遂有液出旋取置一甆盞中以液盡為度取此液𫝊熱瘡上即苦參粉粉之劉禹錫云予在朗州生一子在於蓐中便有熱瘡出於臀腿間初生以他藥傅無益加劇蔓延半身狀候至重晝夜啼號不乳不睡予閱本草見髮經云合鷄子黄煎之消為水治小兒驚熱注云今俗中嫗母為小兒作鷄子煎用髮雜熬乆得汁令小兒服去痰熱治百病凡用髮皆取梳頭亂者鷄子本經云治火瘡因而用之果驗已後用之無不瘥治小兒熱瘡身熱頭熱瘡以梓白皮作湯浴之并封傅臍中瘡附論夫小兒臍瘡者由初生斷臍洗浴不净拭亁濕氣在臍中因解脫遇風風濕相摶故臍瘡久不瘥也臍瘡不瘥風氣入傷經脉則變為癎也方治小兒臍瘡黄蘗一兩釡底黑煤三分亂髮一分右先搗黄蘗為末入二味合研令勻以傅臍中治小兒臍赤腫杏仁半兩猪頰車髓十八銖右先研杏仁如脂和髓傅臍上腫處治小兒臍瘡久不瘥亁蝦蟇一兩燒灰白礬一分燒灰右合研令細以傅臍上又方黄連半兩為末胡粉半兩右合研令細以傅臍中治小兒臍中生瘡用桑汁傅乳上使飲之又方用飲羖羊乳及血治小兒臍風遂作惡瘡厯年不瘥用東壁上土傅之大佳若汁不止燒蒼耳子粉傅之又方用亁蠐螬蟲末粉之不過三四度瘥治小兒臍不合用車轄脂燒灰日一傅之又方用燒蜂房灰為末傅之治小兒臍中生瘡用燒甑帶灰和膏傅之白石脂散治小兒臍汁出不止兼赤腫用白石脂研熬令㣲煖以粉臍瘡日三四度治小兒臍風瘡久不瘥用馬齒葉燒末傅之治小兒瘡久不瘥用龍骨燒灰細研傅之治小兒臍中汁出不止并赤腫用礬燒灰細研傅之治小兒臍腫用桂心炙令熱熨之日可四五度治小兒臍瘡久不瘥用蝦蟇一枚燒灰細研傅之又方用香豉炒令焦搗羅為末傅之又方用伏龍肝細研傅之治小兒臍瘡不合以黄蘗末塗之凍爛瘡附論夫小兒肌肉柔脆外邪易侵故風寒搏於肌肉凝於氣血則致皴裂而生瘡或痒或痛其狀焮腫破出血汁在兩耳或手足間故謂之煉爛瘡方柏藥膏治小兒凍爛瘡手足指欲墮及耳欲落柏葉炙亁為末三兩麻油三兩頭髮一團如鷄子大鹽研一分乳香研半錢蠟半兩杏仁二十枚湯浸去皮尖别研如膏右先煎油蠟沸即下諸藥以髮消為度攪勻貯甆器中毎用先以小便洗瘡綿纒手指裛亁厚塗膏即以輭帛裹之如脚指相淹處尤須多用膏裹帛紗厚以綿裹勿令寒氣得入毎兩日一洗瘡換藥稍愈後三四日一換治小兒手足被凍皸裂欲脫方川椒芎藭各半兩白芷防風亁薑各一分右搗碎以水一大盞令濃去滓稍熱數用塗之蜀椒湯小兒冬天乳母不慎調適為寒氣傷與皮膚摶於血令焮腫生瘡世俗呼為煉瘡或偏發耳上及手足是也一名白蘝散一名黄蘗膏白蘝二兩白芨半兩生麻油二兩生用右將白蘝白芨同搗羅為散與油同研勻更入炊萊菔一枚爛以酒調如糊先以童子小便洗手足後塗上一方有黄蘗白蘝散治小兒冷手皴拆痛及脚瘃腫硬宜用淋蘸方蜀椒去目并閉口者炒出汗鹽各二兩右以清酒五升煎至二升數蘸之其藥可用五六日附子散治小兒冷足爛瘡附子生搗二枚亁薑炮二兩右搗羅為散入綿中裝裹如有瘡膿即調臈月猪脂塗之小麥湯治小兒冷脚或痒或痛成瘡小麥半升稻草三握剉右用醋一升水二升同煎至二升去滓放温洗足夜間頻洗之效白蘝散治凍耳成瘡或痒或痛黄蘗白蘝各半兩右為末先以湯洗瘡後用清油調塗獖猪􅮋膏治小兒凍耳幷手面皴痛用獖猪􅮋一具研如膏入漿水少許候稀稠得所先用童子小便洗手面後以匙抄少許勻塗手面上一方以熱油浸一宿洗之蘭花散治凍瘡久不瘥用馬藺花子為末煎湯帶滓淋洗生附散治凍爛脚成瘡用生附子半箇去皮臍為末麫水調貼之立愈治小兒凍瘡用雄雀兒腦髓塗之立瘥治小兒指凍傷皸裂腫痛欲墮方馬糞十枚右以水三升煮令沸看冷煖浸之即再煖用之半日當愈治小兒入水手足皴裂腫痛血出用生胡麻搗爛塗之又方用棗煮取肉研細傅之一宿後用甘草湯洗即瘥又方用猪脂日三二度塗之陰瘡附論夫小兒下焦有熱則熱氣衝隂隂頭或腫便溺不得乃至生瘡俗云尿灰火所為也方粉連散治小兒隂腫生瘡胡黄連胡粉各半兩白礬煆一錢右為末生油調塗一方用蛤粉三錢川烏頭一錢為末以水調塗日兩次即瘥治小兒隂瘡及腫黄連去鬚胡粉各半兩右等分以香脂油和傅之一方以麫調塗又方白礬灰胡粉㣲炒各一分右同研令勻細用槐枝煎汁調塗兒隂囊上治小兒隂瘡用人糞燒灰傅之瘥又方用狼牙草濃汁洗之一方用狗屎燒灰傅之或用狗骨研細為粉傅之亦得又方用雄雀糞以陳漿汁傅之治小兒股間連陰囊生瘡汁出先痒後痛愈後復發以火炙瘡􅎲去痂令亁乃用後藥右以蜂蜜煉却搜麩作燒餅炙熟以餳糖塗在餅上乗熱熨之冷則再炙再熨三度即瘥治小兒陰囊上瘡粟殻蚯蚓糞葱地内者好淡豆豉等分右用生地黄薄荷同研匀之傅一二次即愈治小兒陰莖上瘡大柏皮白藥滑石等分右為末傅之又方蚌粉槐花等分輕粉少許右研傅之治女子陰門瘡桃仁炒杏仁炒等分右件搗爛傅隂門即效有葉但採二葉炙用治小兒隂瘡用猪屎五升水煮沸布裹安腫上治小兒隂瘡不瘥猫兒骨燒灰右細研水調傅之又方用狼骨濃煎汁洗之又方用狐隂莖炙㣲黄搗羅為末以水調傅之又方用蔓菁根搗研傅之治小兒㿉卵腫以狐肉煮汁任食之良治小兒隂囊忽虚熱腫痛用蚯蚓屎以生甘草汁調輕輕塗之惡瘡附論夫小兒血氣純陽肌肉柔脆風熱邪毒易以致傷若榮氣不從逆於肉裏結成悍毒疼痛焮腫非常故名惡瘡其候或痒或痛或赤根隠肉硬不作膿或穿穴作膿久不得瘥治法隨内外証療之則瘡可愈方神水膏治小兒惡瘡蜜陀僧細研􅌝􅌣根澱花丁香附子去皮臍各半兩麝香細半莨菪子水淘去浮者半合皂莢一挺去皮子防風半兩去苗硃砂半分細研土藜蘆一分沙參半分去蘆頭人參半兩去蘆頭芎藭龍骨檳榔桂心各半分清麻油一觔黄蠟二兩右羅為末先以油入鐺中下諸藥末以慢火煎三兩沸後下黄蠟令消次下麝香攪勻膏成以甆盒中盛但小兒瘡不識者塗於故帛上貼之不過三五上去除根本雄黄散治小兒惡瘡人不識者雄黄細研赤小豆胡粉研入吳茱萸生用各半兩黄連去鬚黄蘗乾薑生用蛇床子膩粉各半兩研入右羅為末以生油旋調如面脂塗於瘡上毎用先以槐枝湯洗瘡令净拭亁然後傅藥䕡茹散治小兒惡瘡久不瘥䕡茹一兩桑螵蛸地龍乳香黄丹黄蘗一兩麝香細研糯米粉膩粉各一分右羅為散毎少許井水和砂糖調藥傅之大黄湯治小兒惡瘡洗方大黄生黄連去鬚黄芩澤蘭白礬枯石南各一兩戎鹽一分蛇床子炒三分右麄搗篩毎以二兩用水三升煮取二升去滓適寒温以綿絮内湯中蘸洗之日三次走馬膏治小兒諸般惡瘡及軟癤未穴作膿攻刺疼痛不可忍坐挐一兩黄蘗一兩甘草木鼈子白狗糞各半兩菉豆石榴皮各一兩右羅為末毎使取牛蒡根搗取自然汁調藥末塗於瘡癤上三換之如已破即不用貼此藥茵芋湯治小兒惡瘡浴方茵芋一兩甘草苦參各三兩細辛黄連去鬚各二兩㽔仁二十枚去皮右麄搗篩毎以三兩用水五升浸汁煮取三升去滓浴兒逐日用之甘草散治小兒惡瘡徧身如麻豆包裹膿汁乍痛乍痒亦治王爛瘡甘草生用芍藥黄芩去黒心白蘝黄連去鬚黄蘗去粗皮各半兩右搗羅為細散用蜜和塗於瘡上日再亦可湯浴之雄黄膏治小兒惡瘡久不瘥幷瘻瘡及疥癬等並治之雄黄細研䕡茹蛇床子礬石别搗為末各一兩水銀半兩於手上和以津研如泥右羅為末與水銀相和以臈月猪脂同研如膏於甆盒中盛毎用先以泔清洗瘡令净拭亁後塗瘡上仍以黄蘗末用綿揾撲之令不汚衣日三兩度用之黄連膏治小兒惡瘡焮腫疼痛黄連末一兩硫黄一分細末膩粉一分松脂臈月猪脂各一兩右先取猪脂入銚子内以慢火煎令化去滓次下松脂候鎔次下黄連等末以栁木箆子不住手攪勻候膏成以甆盒盛塗於瘡上日用之黄粉膏治小兒頭上惡瘡胡粉黄連末各一兩赤小豆十四粒和黄連糯米二十二粒研水銀三分右先將水銀於手掌中唾研後以麻油調藥入水銀和塗瘡上鉛丹膏治小兒惡瘡鉛丹十兩風化石灰猪脂各一觔右將二味同研以猪脂攪作餅子燒通赤如此五度藥成搗羅為末濕瘡亁貼如亁瘡即作膏用猪脂調紙上貼之胡粉散治小兒惡瘡人所不能識者胡粉炒黄色五兩黄連去鬚黄蘗去粗皮各三兩右搗羅二味為散與胡粉相和一處研勻傅瘡上日再立驗黄連胡粉膏治小兒惡瘡方見本門頭面身體瘡類又方膩粉三分黄連去鬚蛇床子各三分右搗為散毎使時先用温鹽湯洗瘡令净拭亁以生油調塗之不過三五上永瘥治小兒諸般惡瘡土藜蘆取皮焙亁為末别研不夾石雄黄輕粉水粉蚌粉等分右和勻先用鯽魚一尾入真清油内煎候熟去魚以油攤冷塗藥傅瘡三日後以葱湯遍身洗浴所穿衣服並脫去净洗乳母忌油膩肥汁燒酒煎炙及熱物等立效癬瘡用真米醋調立效治惡瘡久不瘥五倍子海螵蛸白膠香等分為末右先煎葱椒湯洗次糝患處即成靨子仍服四順飲忌毒物治身面卒生諸惡瘡胡粉水銀黄連去鬚為末各一兩右為末傅之瘡亁則和猪膏傅之一方用蜜調傅瘥又方用蛇蛻皮燒膏和傅之猪膏須用臈月者妙又方用燒鷄子殻猪膏和傅之治身有惡熱氣數起瘡者用熬豉令黄末傅之兼數煮桃葉浴之治小兒惡瘡人所不識者用蝦蟇一枚燒灰搗羅為細散入麝香一分一處同研勻亁傅上又方用栁枝葉三握剉用水五升煮至三升去滓入鹽少許淋洗瘡上治小兒惡瘡楸樹葉一兩亁者亁漆一分搗碎炒令烟盡右羅為末以大麻油調塗日三用之又方藜蘆一兩去蘆頭燒為灰用虎頭骨一兩燒灰右研為散以臈月猪脂塗調日三用之治小兒惡瘡及沙虱水弩甲疽凡是惡瘡並用此方用蜣蜋十枚端午日收者佳搗羅為末以生油調傅之立效治小兒卒得惡瘡不可名識宜用此方用淡竹葉二兩燒為灰細研以鷄子黄調塗之又方用馬骨燒灰細研以臘月猪脂和塗之又方用頭垢膩以臘月猪脂和塗之治小兒身上惡瘡用皂角水洗拭亁以少麻油搗爛頻傅即瘥治小兒身中惡瘡用竹笋煮汁令澡洗又燒笋皮作灰傅之治小兒惡瘡匝身衆藥所不能療者用取父裩洗取汁以浴兒勿使母知良治惡瘡有死肉者追膿白丁香輕粉粉霜雄黄麝香各一錢巴豆三箇去油右同研細新飯和作錠子用之諸般惡瘡生膿者及瘡疹後膿水不亁者貼衣及流膿成片難痊逐年復發及熱瘡諸藥不效悉治之川黄連二兩晒亁碾末輕粉少許右用香油稠調黄連攤於瓦碗内却收北艾揉軟燒烟覆碗在煙上薰之艾三圍為度令熱透碗底候覆碗冷再用香油旋化開入輕粉調勻傅於瘡上日換二次三日即平若小兒頭瘡加松香在内同傅魚臍瘡附論夫小兒魚臍瘡者此瘡頭黑深破之黄水出四畔浮漿起狹長似魚臍故謂之魚臍瘡也方治小兒魚臍瘡芫花根二兩細研猪牙皂角五挺黑豆三合白礬三兩燒灰細研右藥用醋七升先浸芫花根及皂角黑豆三日於釡中以文火煎至二升去滓後却於别鐺中煎至一升入白礬灰攪令勻膏成以甆盒盛攤於故帛上貼又方蛇蛻皮一兩炙㣲黄鷄子一枚打碎取清右以水一大盞煎至五分去蛇蛻皮入鷄子清攪令勻更煎三兩沸放温量兒大小分減服之又方用臘月猪脂並髓以鷄子清調令勻塗之又方用寒食麫燒灰細研傅之又方用白萵苣搗取汁先以針刺瘡上及四畔滴汁於瘡中即瘥又方一名鷄清方治瘡頭黑深破之黄水出四畔浮漿起四角長似魚臍及身體生瘡用蛇蛻皮燒灰存性研細以鷄子清調塗瘡上又方右當瘡上切大蒜片子貼定以艾灸二七壯換蒜畢研豆厚罨定效浸滛瘡附論夫小兒五臟有熱薰蒸皮膚為風濕所折濕熱相摶身體發瘡初出甚小有膿汁浸淫漸大故謂之淫瘡也方苦瓠散治小兒浸淫瘡漸展不止身體風濕發瘡膿汁浸淫漸大苦瓠二兩蛇蛻皮半兩燒灰露蜂房半兩炙樑上塵一合右為細末以生油調塗故帛上貼亁癬宜用羊蹄根絞自然汁調二粉塗之濕癬宜用青金散貼之治小兒浸滛瘡韶粉蛤粉等分輕粉少許右研勻以臘月猪脂調和塗之治小兒浸淫瘡在頭面耳者石蟹香白芷各等分右為細末先以甘草煎湯洗净亁摻瘡上一方用小油調傅瘡上即日愈治小兒浸淫瘡漸展不止鯽魚一枚長三寸者豆豉一合右搗如膏塗之亦療馬鞍瘡若或先起四肢漸向頭面者難治也治小兒浸淫瘡竈中黄土髮灰右等分為末以猪脂和塗之又方用鷄冠血塗之又方用鯽魚膏塗之又方用生鯽魚薄切大片和鹽塗之又方用胡燕窠燒灰以水和塗之治小兒浸淫瘡疼痛不可忍兼發寒熱用刺薊末新水調傅瘡上亁即易之漆瘡附論夫人無問男女大小有禀性不耐漆者凡是見漆及新漆器便着漆毒令頭面身體起癮疹色赤生瘡痒痛者是也方藍葉散治小兒漆瘡四肢壯熱藍葉麥門冬去心川升麻半兩犀角屑三分木通茯神各半兩馬牙硝三分甘草半兩炙右搗羅為散毎服一錢以水一盞煎至五分去滓放温量兒大小加減又方木通川升麻各一分川大黄三分炒木防己一分川朴硝三分桑根白皮半兩右搗麄羅為散毎服一錢水一小盞煎至五分去滓放温量兒大小分減服之化毒散治男女有禀性不耐漆者見生漆及漆器便着毒生瘡痒痛木通一兩藍葉麥門冬犀角屑馬牙硝甘草炙各一分右搗羅為散毎服一錢以水一小盞煎至五分去滓温量大小加減栁枝膏治男女禀性不耐漆者生漆瘡四肢壯熱垂栁枝五兩苦參二兩黄芩一兩右剉細為麄末毎用三匙頭以水兩碗煎至一碗濾去滓研入好墨半匙頭拌令勻再熬成膏以甆盒盛候冷毎用少許塗於瘡上一方用黄連一兩又方用濃煎蔓菁湯看冷熱洗之又方用川芒硝細研搗鷄腸草汁和塗之又方用蟹二枚生者搗爛以水二合同絞取汁塗之又方用糯米嚼令爛塗之又方用濃煮栁葉湯看冷熱洗之又方用茅香漬汁頻洗之又方用小麥麫搗末以鷄子白和塗之又方用羊乳汁塗之又方用磨刀石下泥塗之又方用濃煎荷葉湯着冷熱頻洗之又方用貫衆搗末以生油調塗之又方用猪脂塗之又方用馬尿洗之又方用薤白生搗如泥塗之煮汁洗之亦佳又方用煎濃黄櫨湯看冷熱洗之又方用菜子油塗之又方用濃煎新糜箒湯看冷熱洗之又方用搗韭汁塗之普濟方巻四百七
