用慢火煎五七沸以適寒温洗兒頭及身即愈一法用菖蒲五兩煎如上法嬰孩風癎論曰風之為病其狀亦多端皆由凑理疎弱榮衞虚怯經絡不順關竅閉塞其氣霾瘞欝勃音弗其脉凝注征役有同天地晦㝠日月暈蝕颷暴發興精神俱潰者一身四體皆不我有是謂風癎之至也所謂化風化其所受之風不待久𫝊迅變凡患五臓藴熱三焦作壅速與流利熱即風生壅即風長關竅不通其風何能自散盖必化之即順助其榮衛經絡乃得流行自若也便與截風定搐為已成癎其風不散若更攻擊即衝任百脉雖不能發作畢竟隠伏久而再發無能去根此方得名化風較他方加進矣比金丹人參白茯苓逺志去心山藥辰砂天麻各一兩石菖蒲川芎甘草炙各一分天南星炮二錢薑汁製麝一字右為細末煉蜜為丸皂子大每服一錢煎金銀薄荷湯化下議曰風行於四時和順於内外長養萬物能生能敗法令至周惟風之徳夫人一身亦同天地順則和逆則害所發之風因其虚而入應其熱而生者其痰與熱而發其驚關竅不通氣脉流注遂有𫝊變於身為害當用逐之何况童稚㓜雛嫩嬌肌脆百病總歸於風豈可取次踈怠此治風有法度可不極力施功若停待俟須臾而更愴惶即拙謬而失深意審詳隨其順逆以療之襲逐在後頂追不及所載在前釋化不盡者正謂庸醫之陋也善治驚癎者化其痰和其氣鎮心神安魂魄通關竅順經絡使其榮衞常順流行調其臓腑長和充實邪自何生風從何入雖有些小自然而散此癎由驚為疾豈可留滯當令血脉充肌膚壯頭目清精神備飲食節睡卧穏寒暑知時臓腑常固其經絡自和榮衞自順比金之名决定不謬此盖順調善攝而已治心熱風癎右以爛龍角濃汁研取汁食前服三合日再服食癎附論夫小兒發癎凡因乳哺不節而成者食癎也其證口眼相引目睛上搖手足掣瘲背脊强直或頸項反折此由臓腑壅滯内有積熱或乳母飲噉五辛毒物恚怒無節致煩毒之氣入於乳中因積乳兒令氣血不調腸胃否塞故壯熱多驚四肢抽掣是為食癎之病方丹砂餅子治小兒食癎及疳黄丹砂研一兩半黄鷹糞㨂淨白丁香各一分棘剛子二十五枚微炒粉霜研一錢半膩粉一錢乳香研末犀角屑天南星末麝香研各半錢蝎稍末滑石末蘆薈末各一錢金箔一片銀箔一片水銀沙子研一錢半右為末拌勻稀麵糊為丸如黄米大揑作餅子丹砂為衣每服三餅薄荷湯送下更量兒大小加减硃砂丸治小兒食癎硃砂一兩細研水飛過川大黄剉碎微炙礬石細研各半兩牛黄雄黄並細研桂心雲母石半夏湯浸七遍去滑黄連去鬚雷丸代赭真珠末乾薑炮製剉巴豆去皮心膜炒黄各一分右為末煉蜜和丸如黍米大百日内小兒以乳汁下兩丸三嵗至七嵗以粥飲下五丸量兒大小加减服代赭丸治小兒食癎四肢抽掣壯熱驚悸乳食不消痰涎壅滯發歇不定代赭硃砂各細研馬牙硝川大黄剉碎微炙水銀以小棗去核研令黒星盡各一兩金銀箔各三十片細研蟾酥一錢研入巴豆七枚去皮心研紙褁壓去油膩粉麝香各半分細研龍腦細研半錢蝎稍四十九枚微炒天漿子二十七枚内有蟲者妙右為末煉蜜和丸如黍米粒大每服以薄荷湯下二丸日三服量兒大小加减虎睛丸治小兒食癎及驚風百病虎睛一對微炒研牛黄硃砂各細研真珠末甘遂煨黄赤芍藥赤茯苓甘草炙微赤剉牡蠣炙黄杏仁湯浸去皮尖雙仁麩炒微黄各一分麝香半錢細研犀角屑巴豆去皮心紙褁去油各半兩右為末用糯米飯和丸如菉豆大每服以荆芥湯下二丸量兒大小加减牛黄丸治小兒食癎瘛瘲及諸變蒸腹中宿痞飲食不節腹滿温熱朝夕發甚者大小便不通脾胃氣弱牛黄研一分雀屎白炒半兩芍藥一兩芎藭一兩乾薑炮製半兩黄耆細剉一分甘草炙三分人參大黄剉炒各一兩當歸切焙黄芩去黑心各半兩白麵炒三兩巴豆去心膜别研如膏紙褁壓去油一兩右為末與巴豆膏和勻煉蜜為丸一嵗兒如黍米大二丸二三嵗如菉豆大三丸並用米飲下微利為度量兒大小加减金箔丸治小兒食癎墜痰涎金箔五片細研膩粉三錢甘遂一分煨微黄搗為末右研令勻以棗瓤和成劑子以五片金箔褁上更着濕紙褁煻火灰煨勻熱候冷取研丸如菉豆大每服以人參湯下二丸量兒大小加减真珠丸治小兒食癎魍魎三十六種無辜五疳八痢驚風天瘹真珠細研一兩牛黄研細杏仁去皮尖雙仁炒研如膏各半兩丹砂牡蠣熬研粉各一兩虎睛一對炙令乾甘遂切炒半兩白茯苓去黒皮一兩芍藥三分甘草炙研半兩麝香一分巴豆去皮研如膏紙褁去油盡半兩右除别研外搗羅為末一處研勻煉蜜丸如麻子大每服一丸至二丸米飲或桃仁湯下取下惡物如魚腦青色效量兒大小加减麝香丸治小兒諸疾一嵗已上三十六種無辜疳濕閃癖食癎天行赤眼急黄一切病並皆宜服麝香一兩細研牛黄細研半兩丹砂杏仁湯浸去皮尖雙仁研如膏芍藥白茯苓去黑皮各一兩甘遂一分真珠研為粉水飛過一分虎睛三枚微炒研巴豆去皮心微炒研如膏三分牡蠣熬别𢷬羅研如粉一分右除巴豆外各𢷬研為末入巴豆煉蜜和𢷬三千杵入宻器中貯候服取二丸如麻子大温水下隨兒大小加减牛黄丸治小兒食癎乳癖積聚壯熱心神多驚牛黄硃砂鉛霜各細研真珠末犀角屑牡蠣粉甘草炙微赤剉杏仁湯浸去皮尖雙仁研如膏各一分麝香半分細研巴豆去皮心七枚研紙褁壓去油右為末入研了藥同研令勻煉蜜和丸如麻子大三嵗兒以金銀薄荷湯下二丸量兒大小加减妙聖丹治食癎利胷膈木香代赭石馬牙硝川大黄炮各一分蝎稍四十九枚微炒已上搗羅為細末次用硃砂半兩細研水飛麝香一錢研龍腦半錢研膩粉半分巴豆去皮心膜七枚紙裹打去油右拌勻滴水和丸如黍粒大每服三粒至五粒磨沉香湯下量兒大小加减雄黄丸治小兒七嵗已下食癎壯熱無辜痃癖等雄黄麝香牛黄各細研硃砂石膏各細研水飛過蕤仁湯洗去赤皮牡蠣粉巴豆去皮心膜紙褁出油半兩甘遂一分煨微黄右為末煉蜜和丸如黍米大每服以粥飲下三丸如利兩三度勿怪更隨兒大小加减真珠丸治小兒食癎化聚妳食痰墜涎利大腸雄黄細研代赭麝香細研蜣螂微炙板杏仁湯浸去皮尖䨇仁麩炒黄各半兩真珠天竺黄並細研一分肥巴豆十粒用油煎令褐色與杏仁研硃砂細研用一分右諸件藥都研為末煉蜜和丸如菉豆大每服以生薑湯下二丸量兒大小加减防葵丸治小兒食癎心胷痰滯大小便常多秘􅉣防葵末滑石各半兩牛黄麝香各半兩巴豆二十枚取霜膩粉硃砂蛇蜕皮一條燒灰右為末以糯米飯和丸如黍米大每服以粥飲下二丸量兒大小加减蟾酥丹治食癎毒盛湯藥不下蟾酥真珠末各研甘草慢火煨黄杏仁炒去皮牡蠣粉犀角麝香一錢巴豆去皮右為末糯米飯為丸如黍米大每服三粒煎荆芥湯放温冷下量兒大小加减妙聖丹治食癎通利代赭石煆醋淬一分雄黄蝎稍硃砂各一分輕粉麝香各一錢巴豆二粒去心膜杏仁去皮尖微炒二錢右為末蒸棗肉丸如桐子大每服一丸木香煎湯調下真珠丸治小兒食癎喘息氣麄真珠末天竺黄雄黄丁頭代赭搗羅為末巴豆去皮心出油麝香杏仁湯浸去皮尖雙仁研如膏各一分右為末細研令勻煉蜜和丸如黄米大一二嵗兒每服以温水下五丸量兒大小加减雄朱膏治食癎利胷膈牛黄研真珠末研丁頭代赭石為末白殭蠶為末􅅋仁湯浸去皮為末一分雄黄半兩水磨精明者細研右同拌勻煉蜜和丸如雞頭大服一粒至二粒參湯化下紫霜丸治乳哺失節宿滯不化胞腹痞滿嘔吐惡心便利不調乳食减少又治傷寒温壯内挾冷實大便酸臭或已得汗身熱不除及變蒸發多日不解因食成癎先寒後熱並宜服之代赭石煆醋淬研赤石脂末各一兩巴豆炒三十粒去皮心出油細研杏仁五十枚去皮尖麩炒别研右件合研細湯浸蒸餅丸如麻子大每服三丸乳汁或米飲下微利為度量兒大小加减靈脂丸治小兒食癎乳食不消心腹壅滯四肢驚掣硃砂五靈脂各一分巴豆五枚去皮心紙裹出油細研右研細如粉用燒粟米飯和丸如黄米大一二嵗每服用温水下二丸以吐利為妙量兒大小以意加减鉛霜丸治小兒乳食不消心腹結實壯熱煩悶搖頭反目口吐涎沫名為食癎鉛霜膩粉各一分巴豆去皮心研紙褁出油右為末以糯米飯和丸如粟米大每服以通草薄荷湯下一丸三嵗已上加丸服熱癎附論夫小兒熱癎者由血氣不和内有積熱之所致也凡小兒骨體輕軟腸胃細微易為傷動若乳食不常臓腑壅滯温搐生熱不得宣通熱極甚者則發癎也又心神多不寧將養過温内生邪熱所以多驚甚者變成諸癎其狀口眼相牽手足抽牽口中吐沫鼻内作聲頸項反張腰背强直身體壯熱或呌或啼者是熱癎之候也宜服退癎除熱之藥方芍藥丸治少小一百二十癎止驚常服除熱疾芍藥石膏碎當歸切焙鐵粉各三分蚱蟬四箇自死者大黄剉炒人參各五分桂心三分半銀屑研芎藭龍骨研細辛去苗葉黄芩各二分牛黄二銖右為末煉蜜和丸如麻子大一服二丸日三如不知稍增可至四五丸牛黄丸治小兒熱癎發歇不定眼目直視身體壯熱吐沫心神煩悶牛黄半兩研蚱蟬三枚微炒去翅足石膏研細水飛過龍齒研細各二兩梔子仁川升麻犀角屑胡黄連鈎藤龍膽去蘆頭川大黄剉碎微炒杏仁湯浸去皮尖雙仁麩炒微黄各三分金銀箔各五十片細研右為末入研了藥同研令勻煉蜜和丸二三百杵丸如菉豆大每服以竹瀝研五丸服量兒大小加减服之紫石英散治小兒熱癎四肢抽掣每日數發宜服此除熱鎮心紫石英石膏各細研水飛過滑石白石脂寒水石各一兩川大黄剉炒硃砂細研水飛過甘草炙微赤剉犀角屑各半兩龍齒二兩細研牡蠣粉一分右為末每服以温薄荷湯下半錢量兒大小加减鈎藤湯療未滿月兒及出月兒壯熱發癎鈎藤一分去皮蚱蟬一枚去翅熬為末湯成下柴胡升麻黄芩去黑心甘草炙大黄各二分蛇蜕皮二寸炙竹瀝三合石膏三分碎右切以水一升煮三合半和竹瀝服一合得利下即便停後至五六十日兒一服一合以外忌海藻菘菜等若連發不醒加麻黄一分去節茯神散治小兒食癎皮肉壯熱煩躁頭痛宜服此藥茯神川升麻鈎藤甘草炙微赤剉犀角屑各三分白鮮皮羚羊角各半兩屑石膏二兩蚱蟬三枚微炙去翅足龍齒一兩右為散每服一錢以水一小盞煎至五分去渣量兒大小加减温服白鮮皮散治小兒百日以來至三四嵗發熱癎瘛瘲身體如火白鮮皮黄芩川升麻地骨皮鈎藤犀角屑胡黄連各三分麥門冬去心焙龍齒各一兩甘草一分炙微赤剉右粗羅為散每服一錢以水一小盞煎至五分去滓入牛黄末一字量兒大小加减温服升麻散治小兒熱盛迷悶發癎川升麻鈎藤史君子子芩朴硝各一兩石膏龍齒各二兩柴胡去苗赤芍藥川大黄剉碎炒各三分嬰孺方用大黄八分别𢷬候湯成和用右為散每服一錢水一小盞煎五分去滓温服量兒大小加减鈎藤散治小兒風壅氣盛心胷痰滯壯熱發癎鈎藤一分蚱蟬二枚微炒去翅足川升麻麥門冬去心焙甘草剉川大黄炒碎子芩各半兩石膏一兩蛇蜕皮五寸燒灰右為散每服一錢水一盞煎至五分去渣入竹瀝半合量兒大小加减犀角散犀角屑鈎藤𤣥參蚱蟬三枚微炒去翅足甘草炙微赤剉川升麻黄芩梔子仁各半兩麥門冬一兩去心焙右為散每服水一小盞入苦竹葉七片煎至五分去滓温服量兒大小加减虎睛丸治小兒熱癎搖頭吐舌四肢抽掣心神驚悸虎睛一對酒浸牛黄細研鈎藤川大黄微炙人參去蘆茯神各半兩麝香犀角屑三分硃砂細研各一兩右為末合諸藥同研令勻煉蜜和丸如菉豆大一嵗兒金箔研化一丸日三服治小兒癎病熱多者方牡荆子十五箇細洗淨生鐵一大片半研甘草一兩碎黒豆一大升半布袋盛右以五升大斗煎取一斗半去滓澄清濾煎如􅄳每食前取一匙和蟬殻湯及酒服之日再服重者一月永瘥治小兒熱癎狂啼右以臘雪略温服之蟬殻散治諸癎挾熱蟬殻人參去蘆頭黄芩川升麻各一分茯神一分已上搗羅為細末次用牛黄一分研天竺黄研牡蠣細研各二分右細研勻每服半錢煎荆芥薄荷湯調下子芩散治小兒熱癎嘔逆煩悶體熱子芩人參去蘆頭犀角屑甘草炙微赤剉鈎藤赤茯苓川升麻各三分右為散每服一錢水一盞煎至五分去渣量兒大小加减服之麥門冬散治小兒體熱嘔吐發癎麥門冬一兩去心焙鈎藤半兩黄芩赤芍藥川升麻茯神川大黄一兩去土炒各三分右為散每服一錢水一小盞煎至五分去滓温服梔子散治小兒熱癎不知人迷悶嚼舌仰目梔子仁半兩子芩赤鈎藤呉藍各一兩龍齒石膏二兩川大黄炒研右為散每服一錢水一小盞煎至五分去渣温服更量兒大小加减服之鈎藤散治小兒熱癎時時戴上眼吐沫鈎藤三分蚱蟬三枚微炒去翅足人參去蘆頭子芩牛黄細研另入川大黄剉碎炒各半兩右粗羅為散每服一錢以水一盞煎五分入竹瀝少許去滓入牛黄一字大小量服治小兒十嵗已下及新生百日無問癎熱無辜疾癖右以京三稜汁作粥與食之秘妙不可具言大效治小兒癎熱時氣煩悶上渴右取瓦上青苔衣煮服普濟方卷三百七十七
