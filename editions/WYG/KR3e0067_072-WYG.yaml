body:
  text: 普濟方卷七十三明周王朱橚撰眼目門目赤痛論夫内經謂心主血又曰肝受血而能視葢肝開竅於目若肝氣壅盛心經熱實熱氣既熾血乃湧溢而上冲於目故令目赤痛也難經所謂痛者為實宜散壅滯决邪實則病可見也已凡人患赤眼急欲效者多服洗肝散一時取愈而睛枯矣凡病目者先當服安腎散為佳又云清凉藥不可用而服鎮墜藥乃良方青葙子丸治目赤熱痛羞明淚出或生翳障青葙子五味子地骨皮兎絲子酒浸别搗為末生乾地黄焙决明子炒葶藶子隔紙炒各三兩麥門冬去心焙車前子地膚子萎蕤赤茯苓去黒皮子芩澤瀉防風去叉各二兩半兎肝一具炙乾杏仁去皮尖雙仁炒研細辛去苗葉桂去麄皮各一兩右為末煉蜜丸如梧桐子大每服二十丸食後米飲下日三服青葙子散出聖濟總録治目赤痛青葙子决明子炒黄連去鬚秦芄去苖土前胡去蘆頭大黄剉炒各一兩升麻黄芩去黒心梔子仁秦皮去麄皮枳殻去穰麩炒地骨皮𤣥參赤芍藥各半兩羚羊角車前子各三分菊花甘草炙半兩右為散每服三錢食後温熟水臨卧再服春夏加白芷一兩秋冬加防風一兩麥門冬湯聖濟總録治眼赤痛生障翳乍差乍發多淚羞明隱澁腫痒心神煩躁麥門冬去心焙防風去叉𤣥參地骨皮遠志去心大黄炒車前子茺蔚子决明子蔓荆實去白皮細辛去苖葉黄芩去黒心黄連犀角屑甘草炙各二兩右麤搗篩每服三錢水一鍾煎至七分去滓食後温服車前子散出聖濟總録治目昏赤痛兼倒睫赤眼車前子二兩石决明炒一兩半蕤仁去皮一兩半龍膽半兩青葙子梔子仁各一兩菊花地膚子甘草炙前胡三分右為散每服三錢空心粟米飲調下食後臨卧再服黄芩湯治赤眼痛黄芩去黒心梔子仁三分大青黄連去鬚决明子炒各半兩地骨皮一兩半木通秦芁去苖土各三分大黄炒一兩半甘草炙一兩右麤搗篩每服五錢水一盞半煎一盞去滓入馬牙硝半錢食後温服臨卧再服前胡湯出聖濟總録治赤眼疼痛如脱視不明兼治肝虛風眼前胡二兩去蘆决明子炒防風去乂車前子各一兩甘菊花黄連半兩細辛三兩苦參三兩枳殻麩炒升麻各二兩右麤搗篩每服五錢水一盞半煎至一盞去滓入馬牙硝半錢温服臨卧再服如已踈利則不用硝旋復花湯出聖濟總録治目赤痛兼風毒冲目睛痛旋復花升麻秦芁去苗土羚羊角鎊防風去义萎􅅋各一兩黄連去鬚茈胡去苗各半兩黄栢去粗皮半兩甘草炙半兩右麤搗篩每服五錢水一盞半煎至一盞去滓食後温服臨卧再服夜光丸出衞寶鑑治赤眼翳膜昏花宣連訶子去穰各二兩當歸一兩銅緑二錢已上四味㕮咀用河水三升同浸兩晝夜入銀石器熬取汁一大盞約八分來得所覷滓黒色為度生絹紬取汁再入文武火熬槐柳枝攪滴水成膏為度豵豬胰䐗子二箇先去脂以禾稗葉稍浸於水内搓洗換水無度令淨細切入黄連膏内煮黒色取出用之黄丹四兩新水内淘去滓炒焙乾研細用鵝梨十枚竹刀去皮核生布取汁用青鹽六兩研細蜜一斤煉去滓蠟方可用爐甘石一兩童子小便一大碗炭火燒紅蘸之小便盡甘石如粉白為度研極細右將梨汁入甘石入膏子熬五沸入青鹽以槐柳熬至􅄳色方盛磁瓮氷冷水浸㧞去火毒臘月合為妙正月十一月次之餘月皆不可石蜜煎㸃眼療赤眼方見本門暴赤眼類馬牙硝㸃眼方出聖濟總録暴赤眼類治赤眼澁障翳侵睛磣痛馬牙硝半兩蕤仁去皮研七粒杏仁去皮尖雙仁炒研三七枚烏賊魚骨去甲研半兩石膽研兩菉豆大黄連為末象膽研一分赤石脂一菉豆大研真硃十粒泥裹燒去泥研右同研極細磁合内盛之每取黍許大旋用清水和㸃梔子湯出聖濟總録治赤眼澁痛梔子仁黄連去鬚各半兩黄芩去黒心半兩枳殻麩炒三分龍膽一兩甘草炙三分芍藥一兩大黄炒一兩半右麤搗篩每服五錢水一盞半煎一盞去滓食後温服臨卧再服萎蕤湯出聖惠方治赤眼痛見明不得并濕痒萎􅅋黄連去鬚秦皮去麄皮决明子炒各一兩半菊花防風去梔子仁甘草炙各一兩右麤搗篩每服五錢水一盞半煎至一盞去滓食後温服臨卧再服地骨皮湯出聖濟總録治赤眼痛地骨皮茺蔚子各一兩半防風去叉黄芩去黒心𤣥參大黄剉炒細辛去苗葉一兩芒硝二兩右麤搗篩每服三錢水一盞煎至七分去滓食後臨卧温服祛風退熱湯出聖濟總録治目昬暴赤邪熱攻瞼膜隱腫瘀成瘡眥爛乍差乍發防風去义當歸焙乾去土芍藥甘草人參柴胡去苗各一兩大黄炙山梔子各半兩右麤搗篩每服三錢水一盞煎至七分去滓食後温服石决明丸出聖濟總録治肝臟熱極目赤澁痛淚不止風濕痒心膈壅滯頭目常疼石决明一兩細研水飛過黄連去鬚𤣥參地骨皮防風去蘆梔子仁子芩獨活茯神車前子甘菊花青葙子枳殻麩炒㣲赤秦芁去苖五加皮决明子萎蕤沙參去蘆蕤仁浸去赤皮川大黄㣲炒茺蔚子各三分右為末煉蜜和搗三二百杵丸如梧桐子大不計時候以薄荷湯下二十丸羚羊角散出聖惠方治肝臟久積風熱兩眼赤痛上焦壅滯頭重心煩四肢不利羚羊角屑茯神車前子甘菊花决明子防風去蘆羌活赤芍藥蔓荆子黄芩川升麻山梔仁麥門冬去心甘草炙㣲赤柴胡去苗各三分枳殻一兩麩炒㣲黄去穰右為散每服四錢水一鍾煎至六分去滓食後温服忌炙煿熱麵油膩等物治眼赤澁痛方出聖惠方蜜四兩黄丹三兩黄連一兩去鬚别研為末膩粉半兩􅅋仁半兩湯浸去赤皮細研龍腦一分細末杏仁湯浸去皮尖細研銅緑一兩茶水一碗浸七日用絹濾過只用水去滓麝香一分細末右除麝香龍腦外拌和令匀入磁瓶中用油單宻封以重湯煮一日入腦子麝香以銅筯攪令匀後滴水在内如琥珀色藥成並如常法㸃眼槐皮洗眼湯出聖惠方治眼赤痛槐皮二兩秦皮一兩黄連半兩淡竹葉一握蕤仁一兩浸洗去赤皮梔子仁半兩黄栢半兩馬牙肖半石兩青鹽一分右麤搗為散每用藥一兩水三大盞入古字銅錢十四文煎至兩盞去滓每煖三合洗眼日三度宜避風黄連膏出聖惠方治赤眼痛不開方見本門目澁痛類竹葉湯治眼赤痛淡竹葉洗淨三握黄連一兩青錢二七文大􅀥十枚去核車前子切五合右都剉以水三升煎取一半去滓㣲熱淋洗眼冷重煖不拘次數以差為度黄芩湯治熱毒攻眼小眥偏赤疼痛不可忍黄芩去黒心枳殻一兩去穰麩炒萎蕤木通甘草炙各一兩半右剉如麻豆每服五錢水一盞半煎至一盞入地黄汁半合芒硝一錢再煎取沸去滓食後良久温服二次胡黄連散出宣明論治不問久新赤目疼痛不能坐卧並大人小兒口瘡胡黄連㯽榔各半兩麝香少許别研右為細末㸃之如口瘡每服半錢麝香一字勻口瘡大小貼之忌食魚肉油膩之物魚膽貼眼膏出聖惠方治眼赤痛鯉魚膽一枚黄連半兩去鬚川大黄半兩右魚膽汁和調末藥以磁瓶盛之於飯上蒸之熟為度取出如乾即入少許熟水調似膏塗於帛上貼在眼瞼地龍糞餅子出聖惠方治眼赤痛地龍糞半兩研梔子仁半兩牛蒡根生者半兩右件藥搗令熱便軟得所揑作餅子閉目卧貼於目上時時易之療眼赤飲方前胡黄連秦皮黄芩各二兩梔子仁二兩碎决明子二兩半􅅋仁二兩竹葉切一升右藥以水六升煮取二升五合去滓分三服食後服忌猪肉𤣥參湯治目赤生翳𤣥參柴胡去苖决明子炒石膏羌活去蘆細辛去苖葉一兩黄芩去黒心地骨皮各三分右麤搗篩每服五錢水一盞半煎至一盞用竹葉七片去滓投入芒硝半錢食後臨卧温服𤣥參湯一名羚羊角湯治肝心風熱目赤痛方見本門目赤類石膏散出聖濟總録治心焦壅熱目赤口乾石膏碎甘菊花羌活去蘆頭白附子炮白殭蠶炒𤣥參黄連去鬚右等分為散研勻每服二錢生薑茶清調下療眼赤方蕤仁黄芩梔子仁黄連秦皮各二兩竹葉切一升右藥以水五升煮取一升六合分三服忌猪肉療眼赤熱方前胡防風决明子黄連蕤仁各二兩竹葉切一升右藥以水六升煮取二升分為五服忌猪肉竹葉一握犀角屑升麻乾葛各二兩黄芩麥門冬去心各三兩右藥以水六升煮取二升分為三服通膈薺苨湯治目赤痛及澁腫薺苨四兩石膏地骨皮甘草㣲炙各二兩葛根剉三兩黄芩去黒心一兩右麤搗篩每服三錢水一盞入竹葉七片煎至六分去滓放温食後服臨卧再服黄耆湯治熱毒攻眼黒睛通赤黄耆剉芍藥知母升麻各一兩半犀角鎊一兩半苦竹葉五十箇右剉如麻豆大每服五錢水一盞半煎至一盞入麻硝一錢煎再至沸去滓食後温服忌炙煿熱麵洗輸散出王氏博濟方治風毒攻注眼目赤疼大退翳膜去瘀肉洗風沙鐵屑磁末因入目澁痛仙靈脾去梗秦皮去粗皮黄連去鬚槐花炒等分生犀角鎊少許右為細末散每用半錢以清水調澄清洗之沙末等只三兩洗自退在水如風毒眼用一錢水一盞煎至七分乗熱淋洗黄連丸治赤眼黄連去鬚蒺藜子炒去嘴一兩半枳殻去根麩炒石决明炒各一兩豉炒一合右為末煉蜜為丸如梧桐子大每服二十丸食後温漿水下加至三十丸枸杞煎出聖惠方治目赤疼晝夜疼痛不止枸杞葉研取汁半斤杏仁去皮尖雙仁七枚黄連去鬚搗末一分青鹽研半錢膩粉一錢右為末以新綿裹内淨磁盒中將枸杞汁調候至一伏時絞去滓以銅筯㸃少許目眥頭日三五度五黄散出御藥院治目赤黄連黄芩黄丹大黄各半兩黄栢一兩右為末每用一錢水蜜調成膏攤在絹花子上隨目赤貼太陽穴治赤眼方出儒門事親銅緑輕粉牙硝腦子少許麝香各等分右研為細末乾貼之截赤眼方出儒門事親黄連緑礬杏仁甘草銅緑各等分右為麤末水煎洗甚效光明散出海上方治赤眼黄連一兩當歸一分淡竹葉三十片赤芍藥二錢赤􅀥五箇右為麤末分為四次各用水一碗半煎至三分以紙葢上小取一孔薫之隨手即洗之效陳氏經驗方云昨在鄂州見一時皆患此病眼科用此無不效者因得方廣以濟人􅀥連膏治患赤眼日夜疼痛不可忍者棗五箇黄連白礬少許甘草乳香少許右件煎成膏子滴在眼中效一方無乳香赤眼方右取真珠黄連為細末内螺中湏臾汁出取汁㸃之差久患内障加車前子乾地黄麥門冬等分為末蜜丸酒服眼稍赤藥出濟生㧞萃方黄連三錢白礬三錢水飛銅緑半錢蜜陀僧一錢輕粉少許右為極細末少許㸃之大黄丸治上焦積熱目赤澁痛川大黄剉碎㣲炒梔子仁五兩薺苨五兩葛根剉一兩右麤搗篩每服五錢水一盞半竹葉七片煎去滓候温食後臨卧服瀉肝防風湯出聖濟總録治目赤痛防風去叉茺蔚子大黄剉炒桔梗剉炒各二兩右麤搗篩每服五錢水一盞半煎至一盞去滓入芒硝半錢食後臨卧温服如已疎利即不用入芒硝蒼术散出聖濟總録治目赤痛蒼术一兩蟬脱木賊剉黄芩去黒心各半兩右生搗為散每服一錢新汲水調下食前服後仰卧少時再服竹葉煎出聖惠方治目赤痛竹葉淨切二握大􅀥劈破五枚古文銅錢七枚黄連去鬚為末半兩右合和内銅石器中以水一升煎至五合濾去滓又重煎三合内磁瓶中每以銅筯㸃少許目眥頭日三五次一方無大􅀥綿染傅目眥治目赤痛出千金方雄黄細辛黄連乾薑各二錢右合治如粉以綿裹釵股唾濡頭注藥末内大眥頭急閉目目中淚出湏臾止勿將手近勿將帛裹勿洗之一方加礬石五味子各六銖一方去細辛用礬石四味各六銖又方出千金方雄黄乾薑黄連礬石各六銖右合治如前方一方加細辛六銖通腦散出御藥院方治目赤腦熱寒水石燒赤飛過細研二錢腦子研細一錢南硼砂另研細半錢右共置一處研勻極細每用少許鼻内㗜無時用氷池散出御藥院方黒豆炒去皮為細末馬牙硝研青黛研各一兩腦子研一錢右為細末如粉每用一錢凉蜜水調如麵糊相似攤於元絹帛上貼兩太陽穴凉水時時頻潤貼眼方出儒門事親爐甘石二兩蜜陀僧一兩黄連朴硝右先將黄連用水熬成汁入童子小便再同熬後下硝又熬少許用火煆爐甘石紅黄連汁内淬七次於蜜陀僧末同為末臨卧貼之四聖散治赤眼當歸一兩芍藥二兩黄連三兩甘草四兩右為末水煎洗眼并服之苦竹葉粥治肝膈風熱目赤痛􅍃􅍃不見物粳米三合石膏半兩沙糖三分苦竹葉一握切細右用水一碗煮石膏竹葉十數沸去滓下粳米半盞煮粥將熟入沙糖少許食之當歸散出聖濟總録治目赤澁翳膜遮障時多熱淚輕粉一分當歸切焙一分防己龍膽各半兩右為散每服一錢温水調下食後服黄連膏煎一名截赤眼出聖濟總録治目赤痛黄連去鬚搗末半分大􅀥三枚劈破去核燈心揉碎一握右以水一盞半銀石器内煎至五分以新綿濾去滓内磁盒中每用銅筯㸃少許目眥頭日三次上臨卧再㸃外䑓秘要無燈心黄連丸出聖濟總録治肝熱眼目赤痛黄連一斤去鬚水洗盡細剉用水二升浸五宿用綿濾去滓石銀器内煮成膏腦子一錢硼砂研一分右細研入前黄連膏内旋丸如菉豆大每用一丸新汲水内浸過㸃目眥内洗眼湯出千金方治目赤痛甘竹葉七枚烏梅古錢各三枚右以水二升漬藥半日東流水煮三沸三上三下得二合臨卧注目眥治眼赤暗方及明目出千金方古青錢三枚青鹽一兩六錢杏仁七分熟時取仁搗汁一合右入磁器中封頭勿泄氣百日後取出著目四眥頭日二三次避風冷通和膏一名通利膏出龍木論治眼赤澁翳膜遮障時多熱淚輕粉一分乳香皂角子大杏仁二十一箇只去皮尖細嚼右旋入口中都嚼候津液滿口吐出磁器中令火上四邊沸以綿濾去别盞中入生腦子如皂子大研勻再濾過銅筯㸃之梔子湯一名三黄湯出仁存方治赤眼痛兼治飛血赤脉黄連黄栢山梔子等分右為末男用男乳汁丸女用女乳汁丸如雞頭大日乾臨用時以黄泥裹煨地上出火毒仍如前用乳汁化滴入眼中仰卧一方剉漿水一升煎至七合去滓熱洗針頭丸出聖惠方治丈夫婦人室女小兒諸般赤眼疼痛不可忍者川烏尖七箇焙乾用白殭蠶七箇去嘴絲焙乾硼砂十枚右為末用猪膽取汁調藥不令稀攤在碗内用荆芥艾各一兩皂角小者一莖燒煙將藥碗髙覆薫之常將藥膏攪轉又攤又薫皂角荆芥艾盡為度再搜成塊油單裹定入地中出火毒冬兩日夜夏一日夜秋一夜取出丸如針頭大每服一丸㸃入眼中麥黄湯治熱眼赤痛車前子麥門冬去心生地黄洗曬等分右剉每服三錢新水入蜜同煎食後服加川芎尤好杏連湯一名黄連湯治火眼方見本門一切眼疾難治類竹葉飲治炎熱眼赤頭痛竹葉一握切麥一升淘地骨白皮三分切右以水五升煮取二升以麥爛為度食後分二服治眼疼方右用黄連少許杏仁一枚乳少許研細同煎㸃之乳汁煎出聖惠方治肝熱目赤痛人乳汁半合古字銅錢十文右以乳汁於銅器中磨錢令變色稀稠成膏即止内磁瓶中盛每以銅筯㸃少許目眥頭日三五度治目赤及翳方出千金方古錢一枚鹽方七寸右合治下篩傅目眥中又方出千金方烏賊骨鉛丹大小等分右合研細和白蜜如泥蒸之半熟候冷著眼四眥治眼赤痛一名青黄湯出海上方冬青葉黄連右各少許煎濃湯又入朴硝少許洗眼甚妙太清散出海上方治暴風客熱目赤睛痛銅青半兩别研薑粉末臘月間用生薑洗切碎於砂盆内研爛以新麻布細揉過取粉隂乾為末右和勻每用少許沸湯泡放温頻洗之治眼稍赤藥出濟生㧞萃方黄丹白礬各等分右為末少少貼之蓮實粥治眼赤痛蓮實去皮研一盞許粳米半升右先煎蓮實下米煮粥如常法食之療眼赤無新久皆差神驗一名銅青膏出十便良方用食鹽􅀥核大人乳一􅀥許置放銅碗中以古錢十文研之使銅青著碗底取熟艾急搏一雞子許掘地作一坑子坐艾於坑中燒使煙出以銅碗覆上以土擁四邊勿令煙出量艾然盡刮取著碗青藥每以半豆許於蛤蚌中研細以綿纒枝頭注入兩眥夜即仰卧著之差無古錢以青錢替亦得救苦散治赤眼大疼痛不可忍者朴硝雄黄各等分右為細末口内噙水患眼或左右搐之治目赤及翳出千金方用白羊髓傅之羊睛方出千金方以羊眼睛曝乾為末傅兩目角又方出千金方用新生孩兒胞衣曝乾燒末傅目眥中貼赤眼出儒門亊親取青泥中蛆淘淨曬乾為末用一錢令害眼人仰卧散在眼上須臾藥行待少時去藥赤眼亦無治熱毒赤眼炒鹽令黄入鎔蠟揑作餅子㸃眼上差地黄膏出危氏方治赤眼右用生地黄肥者洗淨研細絹帛包之仰卧以藥搭在眼上初似碍而痛少頃清凉小兒赤眼黄連為末水調帖脚心其赤自退及以生地黄自然汁以粳米半升浸三次曝乾用磁瓶煎湯一升令沸下地黄及米煮成薄粥半饑飽飲一兩盞即睡三次立效㗜藥出危氏方治目赤後暴生翳昔韓元脩親曹用一日退兩翳方右以鵝兒不食草塞鼻中立瘥其草即人養蟋蟀食者苦竹瀝方一名退熱膏出千便良方治赤眼疼痛如刺不得開乃是肝熱所至右以苦竹瀝五合黄連二分綿裹入竹瀝内浸一宿以㸃目中數度令熱淚出愈秦皮方出龍木論治赤眼及睛上瘡用秦皮一兩清水一升於白碗中浸春夏一食時以上看碧色出即以筯頭綿纒仰卧㸃所患眼仍先從大眥中滿眼著㣲痛不畏良久三五飯間即側卧瀝盡熱汁每日十度以上着不過兩日差赤眼方出龍木論治目赤痛惡眼用此藥後絶無赤眼大有神效㨂黄連五錢水浸去皮曬乾為細末新汲水調攤椀内用銅錢六十文作三垜用熟艾三兩頓錢中間以椀覆其上用火燒艾薫乾為度研為細末入腦子少許口含水㗜之又取黄連鷹爪者井水淨洗搥碎入輕粉少許用甘蔗二寸長一叚破開作兩片就中開一小槽將前藥藏於中將蔗合上用麻繩縛以濕紙包定火中煨熟取汁絹帛蘸汁揩眼冬青方出海上方治赤眼以新磚二片冬青葉五斗搗自然汁浸磚數日令透取出掘地坑架磚於内四下空覆之日久後磚上粉霜起取霜入腦子少許無亦得㸃眼大妙治赤眼煎海桐皮洗又方用烏骨雞新膽以燈心㸃眼治眼赤眶右用田螺養去泥靨用黄連末一錢傅在螺肉内化作水用鵝毛掃之一用海螺一方以小鹽花内螺靨中用器成之取吐出汁㸃目用後放之人乳方治目赤痛多淚兼解牛肝馬肉之毒用首生男乳合䜴濃汁服之神效一方單用人乳㸃眼治赤眼痒痛右用為末煎湯嗽并洗艾葉方治赤眼用艾令燒起以椀葢之候煙上椀成煤取下用温水調化洗瘥一方加入黄連尤佳蕪菁子散治赤眼痛以蕪菁子用大醋煮令熟用井花水服方寸匕日三盡一斗能夜視有所見羊肝生方治目熱赤痛視物不明右青羊肝一具細切以水淘漉出瀝乾以葱醬鹽醋食之療目赤痛及胎赤右用猪膽和鹽緑五分皆效療赤眼方用杏仁四十九枚去皮為末絹袋纒飯底蒸之乗熟絞取脂以銅青胡粉各如大豆許乾薑食鹽各如大豆許熟研之以鵝毛沾取掠眼中眥頭日三度療赤眼不問久近用硇砂三兩以酢漿垍器中浸日中曝之三日藥著器四畔乾者取如豆大夜著兩眥瘥并入食鹽石膽等分用尤佳治眼疼方用新磚浸糞池中年久取出安放隂冷處生花刷下却以腦麝少許和研㸃之梔子湯治目赤取出山梔子七枚鑽透入煻灰火煨熟以水一升半煎至八合去滓入大黄末三錢絞勻食後旋旋温服㸃眼方出聖惠方治眼赤痛鵝梨一枚大者搗絞取汁黄連半錢為末膩粉一字右用綿裹黄連膩粉内梨汁中浸一日取少許㸃之療眼赤口乾唇裂方石膏一斤綿裹生地黄汁赤蜜各一斤淡竹葉切五升右以水一斗二升煮竹葉取七升去滓入石膏取五升半下地黄汁蜜取三升細細服之忌蕪荑治氣毒赤腫熱痛眼出本事方好宣連半兩生龍腦自然汁半盞右煎取一盞㸃洗之食飽後服一呷須要人實壯可服虛薄者不可服又方出海上方治赤痛雞爪黄連去鬚不犯鐵器用水煎湯却以艾炷於碗中以木為柱再用碗覆之必欲烟盡取出洗之甚妙葢艾煙能行廣之功無艾則黄連反能傷眼治一切赤痛眼忽生翳膜方出護命方真腦子不拘多少右件須是上等真正好藥非時㸃如粟顆一兩粒在眼中仍須是不輟進服後面方無有不驗治眼赤痛及皮上生濕瘡連年不效方出䕶命方右淨洗舊銅錢一文淨洗青江石一箇用銅錢南蜜於石上磨取濃汁三四滴在盞内却用乾瓦一片上燒灸艾一壯用盞合定令灸艾煙薫盞底銅蜜如此七壯取蜜用塗眼立效治一切眼赤痛浮花翳膜遮睛視物不明忽多昏暗觀覽不决但一切眼疾俱可治療神效不可具述出䕶命方真腦子一銖不是真者不可使用却反有所害牙硝四銖小膩粉半錢與腦子自作一處研如粉黄丹一兩右先研硝黄丹二味如飛塵以無沙蜜四兩入黄丹牙硝二味在内以長節苦竹筒盛之用油單封裹頭緊定不令失氣亦不要令以竹筒口内於鍋内煉水煮竹筒一時辰取出候冷開油單傾取藥汁不用滓以新垍瓶子盛藥汁却入腦子膩粉二味在内仍以水煮瓶子候藥汁極熱用銀筯攪令匀取出冷收之非時以筯㸃一兩滴在眼中但一切百般眼疾無有不治治赤眼出衞生家寶方凢患眼皆治不動臟腑蒼术一兩切作片米泔水浸一宿焙乾牛蒡子一兩荆芥一兩草决明一兩龍骨半錢右為細末每服三錢米泔水下卧飯後茶清亦得如眼腫入木賊一兩𤓰蔞散出衞生家寶方治赤眼痛不可忍小團𤓰蔞籬上去藤蔓結實如彈子大色紅皮上有毛九十月間採曝乾槐花炒赤勺藥右等分為末每服二錢臨卧温酒下洗眼方出衞生家寶方當歸黄連赤芍藥萎􅅋右等分並為㕮咀每次用四錢以水一大碗於銀銚内煎至六七分貯於金或銀銅石器内紙幕之於紙上開一竅一眼就竅薫之候藥稍温淋洗冷即止如再欲治即煎熱一服可使三五次治赤眼方出衞生家寶方白牽牛右為細末爛煮葱白研如泥和末為丸如菉豆大每服五粒食後用葱湯下服訖睡半時如要速效加至十五粒止碧天丸出試效方治目疾累服寒凉藥不愈兩眼蒸熱如火薫而不痛紅絲血脉滿目貫睛霧悶昏暗羞明畏日或上下瞼赤爛或伏風土而内外眥皆破洗之大有神效瓦粉炒一兩銅緑七分為末枯白礬二分右先研白礬銅緑令細旋旋入粉同研勻熟水和之共為百丸再用一丸熟湯半盞浸一兩時辰洗至覺㣲澁為度約半時許洗畢瞑目便睡又洗又名一井珠丸一丸可洗十日如再用湯内坐令熱此藥治其標為裏熱以去矣若裏實者此藥不宜㗜藥碧雲散出試效方青黛一錢蔓荆子川芎各一錢二分欝金一錢石膏一錢三分細辛一錢薄荷一錢紅豆一箇右為細末口噙水鼻内㗜之川芎辛湯出試效方治兩目晝夜隱澁難開羞明畏日目赤視物昏暗神效芎藭蔓荆子細辛六分防風一錢半甘草香白芷各一錢右㕮咀都作一服水二盞煎至一盞去滓稍熱服臨卧服明目細辛湯出東垣蘭室方治兩眼發赤㣲痛羞明畏日怯風寒怕火色眼睫成柳睡多糊隱難開眉攢腫悶兩鼻常塞流涕唾如膿大便㣲硬喜食冷物麻黄根三錢羌活根三錢防風三錢藁本一錢川芎半錢細辛少許白茯苓一錢蔓荆子六分荆芥穗一錢三分當歸稍一錢生地黄六分椒八箇桃仁三十箇紅花少許右件剉如麻豆分作四服每服水二盞煎至一盞去滓稍熱服之忌酒醋濕麵及風寒處行止坐卧治赤腫眼出鮑氏方黄丹炒紫蜜熬去沫桃枝攪勻以飯汁化開羽刷目中眼赤出鮑氏方葱白湯洗以銅錢百箇桑白皮同煎洗之又方出鮑氏方酒下黒神散卧時服又方出鮑氏方硼砂三錢腦半錢杏仁去皮尖朴硝研各三錢蕤仁二錢紙包壓去油研成膏角管收用㸃臘月猪膽汁熬膏㸃甚效决明散出衞生家寶方治赤眼生翳障多淚睛疼𤣥參黄芩防風川芎各二兩蟬脱半兩地骨皮一兩前胡甘草各一兩蒼术一兩泔浸木賊半兩草决明一兩右為細末每服二錢各換湯使時氣赤眼米泔水下多涙麥門冬熟水下翳膜淡竹葉湯下血貫瞳人不退熟水下茶下春雪膏出衞生家寶方治赤眼去翳膜㸃眼三次立效南硼砂二錢腦子半錢蕤仁去殻二錢右研細爛乳汁調成膏以銅筯㸃之甚效㸃赤眼藥出澹療方黄連去鬚為細末用雞子清調於瓦盞内以薄皮紙葢定次用銅錢一箇壓紙上候藥汁滲去紙上却以雞翎洗淨蘸藥刷入眼中光明散出楊氏家藏方療肝經風熱目睛疼痛隱澁難開經久不差大能截赤眼定疼痛秦皮去粗皮黄栢去粗皮黄連去鬚甘草生用五倍子右件各等分㕮咀每服一大匙水一中椀入沙糖一彈子大同煎至八分綿濾令淨乗熱洗至冷覺口中苦為度藥冷再煖兩次洗地骨散出朱氏家藏方治大人小兒眼生翳膜此心經受熱所至地骨皮生地黄黒參甘草木通黄芩右等分粗細末白水煎服以上二方係何統制智大用之有效煮肝散出澹療方治眼赤耳亦從而痒乃腎臟風也當用四生散入羊子肝煮熟添藥蘸喫仍間以少許入猪腰子或羊腰子内煨熟又添酒于藥内調服并嚼藥腰子治眼赤熱出本草以槐花炒服治目翳赤障出本草以瑿磨滴眼中治身熱目赤出本草用琉璃以水浸令冷熨之蚘蟲汁出本草主目膚赤熱痛取蚘蟲大者洗淨斷之令汁滴目中三十年膚赤亦差蚘蟲即人腹中蟲治赤眼出本草以黄櫨煮湯洗治眼赤痛出本草用硝石研令極細每夜卧以銅筯取如黍米大㸃目眥頭至明旦以鹽漿水洗之㸃眼方出本草以胡黄連用人乳浸㸃目甚良治目痛及眼忽中傷因有熱瞑者出本草取地膚子白汁注目中治肝臟受熱目赤磣痛兼明目補肝氣出本草用猪肝一具細起薄切以水淘漉出漉乾即五味醬醋食之治赤眼出本草用郁李仁浸去皮研極爛入生龍腦㸃目中治赤眼並暗出本草以蚌用黄連末内之取汁㸃赤眼中良目暴腫論夫風勝則動熱勝則腫目暴腫者風熱邪氣客於臟腑葢五臟六腑之精氣皆上注於目既為風熱邪氣所客氣血不得宣通使毒氣冲發於目是為腫痛方决明子湯出聖濟總録治目暴赤毒痛欲生翳者决明子一升石膏研四兩升麻四升山梔子仁一升地膚子茺蔚子乾藍葉一升苦竹葉二升芒硝二兩車前草一升二合冬𤓰子為末二合右以水二斗煮竹葉七升二合去滓内諸藥煮取四升分為四服每服相去可兩食間再服為度小兒減藥以意裁之前胡湯出聖濟總録治目暴腫生翳前胡去蘆赤芍藥青葙子各一兩山梔子仁細辛去苗葉車前子各一兩淡竹葉洗朴硝柴胡去苗各一兩半甘草㣲炙剉三分右除硝竹葉外粗搗篩每服四錢以水一盞半竹葉五片煎至八分去滓又入硝一錢食後臨卧温服前胡湯出聖濟總録治時行後目暴腫前胡去蘆芒硝二兩芍藥青葙子細辛去苗葉决明子車前子各三兩山梔子淡竹葉切一升右剉如麻豆大每服二錢水二盞煎至一盞去滓食後温服日三次𤣥參湯出聖濟總録治暴赤腫心燥風熱壅𤣥參防風去乂黄芩去黒心各一兩菊花三分芍藥羚羊角鎊蔓荆子各三分馬牙硝湯成下右除硝外㕮咀每服五錢水一盞半煎取七分去滓入硝一錢七分食後臨卧温服如利即去硝竹葉湯出聖濟總録治目暴腫痛苦竹葉一升柴胡去蘆蛇銜各三兩黄連芒硝研細辛去苖葉各一兩右剉如麻豆大每服五錢水二盞煎至一盞去滓食後温服枳實湯治目暴腫痛痒半夏湯洗七次焙五兩前胡去蘆四兩枳實炒二兩細辛去苖葉焙一兩烏梅七枚右剉如麻豆大每服五錢水二盞薑五片煎取一盞去滓食後温服日二次二黄湯出聖濟總録治兩目暴熱痛大黄炒甘草炙細辛各四兩芍藥五兩黄芩去黒心二兩右剉如麻豆大每服五錢水二盞煎取一盞去滓食後温服細辛湯出聖濟總録治目暴赤腫痛細辛去苖葉􅅋仁戎鹽各一兩决明子三兩右剉如麻豆大以地骨皮汁一升半合煎取一升半更取蜜一升半去滓合洗之蘆根湯出聖濟總録治目暴腫蘆根五兩甘草炙粟米三合甜竹茹雞子大右剉如麻豆大每服五錢水二盞煎至一盞去滓食後温服日三次决明丸出聖濟總録治目暴赤腫疼痛石决明半兩車前子黄連去鬚各二兩右為末煉蜜丸如梧桐子大每服十五丸米飲下食後日三服秦皮散治目暴赤腫痛方見本門目赤腫痛類用地骨皮切三斤以水五升煮取三升絞去滓更用鹽二兩煎取一升洗目或加乾薑一兩大黄湯出聖濟總録治目熱痛暴腫用大黄蒸過剉如麻豆大每用五錢水二盞漬一宿明旦絞汁服之以利為度治目卒腫方出千金方用酢漿作鹽湯洗之日五次牡荆木方出龍木論治目卒痛用牡荆木燒出黄汁傅之一方用荆木救苦湯出東垣蘭室方治目暴赤發腫瞼髙苦痛不可忍羌活防風藳本升麻柴胡各一錢川芎三錢黄連一錢黄茶一錢半黄蘖一錢半知母一錢生地黄一錢半甘草炙半錢蒼术七分當歸半錢夏月則減桔梗連翹紅花草龍膽七分細辛一分右㕮咀每服一兩煎法如常若苦痛則多用苦寒者兼本經之藥行加減如睛脹加知母黄蘖一倍犀角黄連丸出余居士方治上壅餘熱氣滯不通眼目暴發腫痛眵睫不利足脛無力不問遠年近日取效犀角半兩大黄一兩黒牽牛研二兩青木去穰半兩甘遂半兩煮大㦸漿浸芫花醋炒木香已上各半兩右為末水丸如梧桐子大每服七十丸温水食前送下目赤爛論夫赤爛者瞼眥俱赤且爛見風更甚又謂之風赤眼此由衝冐風日風熱之氣傷於瞼眥與津液相搏故令赤爛也迎風則作眼淚出於熱則傷爛眵多治宜鎮肝平氣調洗瞼膚則清淨之竅自然明了矣又云眼赤爛者皆是風熱所生也初患赤眼經久不差外則因風冷所傷内則以肺脾積熱内外為疾漸加成癢故令目赤爛也方硇砂石脂丸出聖惠方治眼風淚赤爛腫痛積年生障翳青石脂硇砂石决明搗研水飛過青鹽腦子細研决明子乾薑炮製剉各一分烏賊魚骨鹽緑黄連秦皮細辛各半兩右為末龍腦研令勻煉蜜和丸如麻子大每取一丸以少温水化㸃大眥頭日三四度追風散治頭風注眼赤爛生翳川烏防風細辛甘草炙川芎白芷荆芥蒼术各一兩草烏半兩薄荷全蝎右為末茶清或酒調下亦可食前服硇砂煎出聖濟總録治眼赤風淚爛癢翳膜硇砂研半分决明為末鹽緑烏賊魚骨為末龍腦研右以臘月水兩碗浸三日及七日每日攪一度候日滿以綿濾去滓用石器盛日三兩度菊苓湯出聖濟總録治風毒氣攻眼生瘡爛腫菊花升麻黄連白茯苓去黒皮防風去义木通蕤仁萎蕤地骨皮各一兩右麤搗篩每服五錢七分以水一盞入竹葉十片煎至八分去滓空心及臨卧服胡黄連煎出聖惠方治風目赤爛怕見風日疼不可忍胡黄連牛黄研黄蘖去粗皮各一兩龍腦别研麝香别研一錢熊膽别研一分烏豆一分乳梨汁半斤一方一升右先搗胡黄連黄蘖烏豆篩為麤散以水三盞銀器中煎至一半綿濾去滓入梨汁牛黄腦子麝香熊膽以文武火熬成膏頓出於磁器内盛入地埋四十九日取出每㸃如半米大通聖膏一名金水膏出上因方治熱淚并眼眶赤爛兼治生翳膜澁癢疼痛乳香研硇砂各半字麝香青鹽各一字當歸研碎半錢白礬飛半錢黄連去蘆白蜜四兩右件除蜜外先將七味研爛却同蜜一處拌匀入竹筒内以油紙三重緊扎定放鍋内煮自早至午方破開取藥用綿絹濾過入於瓶内牢封埋土内經宿取出用銅筯㸃了合眼少時復以洗之眼翳薄者㸃三五次即隨藥下㸃藥筯以金為之最妙多㸃取效尤速陸氏續方為細末艾膏為丸如梧桐子大每服七八十丸温酒米飲下治肺壅熱眼目赤爛腫痛或生翳出聖惠方胡黄連甘草炙微赤黄連去鬚黄蘖各二兩蜜二兩燈心二束淡竹葉一握用水浸過龍腦一錢細研右除龍腦蜜外搗篩為散用雪水三大盞入蜜於磁器内煎至一鍾濾去滓後令入龍腦用磁瓶盛之不計時候㸃之大全寶光散出瑞竹堂方治逺年近日風眩爛眼除昏退障止淚截赤定疼黄連半斤當歸白礬生各二兩杏仁去皮尖乾薑各二兩四錢􅅋仁一兩六錢去油皮赤芍藥三兩六錢甘草二兩三錢草龍膽四兩八錢右用骨刀子剉細黍米大每用一錢水一大盞煎數沸去滓熱洗黄連散出聖惠方治赤眼久患不差赤爛時癢腫痛視物不得黄連去鬚古字錢二七枚龍腦半錢杏仁二七枚湯浸去尖研蚌粉一兩細研蜜一兩不食井花水一大盞右件藥都浸三七日每日攪一遍日足㸃之勝金散出德生堂治赤眼爛眩癢痛流涙此方極驗銅青二錢爐甘石浸三次煆五次燒紅以童便浸妙青鹽一錢金脚蜈蚣一條全蝎七箇去毒輕粉半錢麝香少許右為末每用少許温水調敷眼日三次三日即愈洗眼秦皮湯出聖惠方治眼赤爛方見本門目飛血赤脉類黄連散治目赤眥爛生瘡衝風涙出黄連雄黄各一兩半細辛去苖黄蘖三分乾薑一分右搗羅為散研令細以宻盛每取二黍米大許㸃兩眥日二度洗輪散治風毒攻眼眥赤爛見風淚出癢痛方見本門目赤痛類復明丸治眼赤爛腫癢爐甘石半兩童子小便淬七次西銅緑一兩水飛乳香三錢白土子一兩三錢水飛枯礬三錢右除乳香另研為細末生蜜為丸栢皮湯出聖惠方治眼爛赤癢痛不止黄栢皮黄蘖蕤仁各一兩黄連三分苦竹葉二握右細剉以水三升煎取二升去滓稍熟淋洗冷即重煖用之四物秦皮散出聖濟總録治眼連瞼赤爛澁痛羞明乾薑炮製半兩滑石研秦皮去粗皮各一兩膽礬走水右為散每用半錢以沸湯浸澄清洗之蕤仁膏出聖濟總録治風眼兩眥赤爛􅅋仁二七枚去皮膩粉一錢七分龍腦半錢杏仁十枚水浸去皮尖右同研令極細入好酥少許再研成膏臨卧先以温漿水洗眼拭乾用油塗之柴胡洗眼湯出聖濟總録治眼赤爛㣲腫赤痛多時柴胡去苗蕤仁去皮黄連去鬚升麻各一兩右麤搗篩以水二升煎取二升半去滓淋洗如冷再煖洗三五遍金波膏出王氏博濟方治瞼眥赤爛迎風淚出或癢或痛瘀肉黄連四兩黄蘖皮二兩二味椎碎以水二升浸一宿於器内熬成膏取半碗去滓蕤仁去皮研半兩杏仁四十九粒去皮尖炒研右以杏仁􅅋仁入前藥内同熬及一大盞更濾過又入好蜜及蜜九分更入麝香一錢白礬硇砂各一錢並飛研空青三錢如無只以銅青代之畧椎碎龍腦二錢以絹袋盛在藥内又熬及一半筯滴少許於冷水内不散即止用小瓶宻封再飯甑上蒸三遍遂次於井内沉過令冷銀器内收如常㸃之黄連散出永類鈴方治肝受風熱眼眩赤爛乳香一錢半别研黄連去鬚半兩荆芥穗燈心一百莖右㕮咀每服二錢水二盞煎至一盞去滓熱服緑袍散治風毒眼連眶赤爛及拳毛倒睫銅緑青鹽各二錢輕粉一字蝎尾二枚右為細末每用一錢漿水一盞調洗三次黄蘖散出聖惠方治赤眼久患不差赤爛時癢腫痛視物不得黄連半兩黄蘖半兩古錢七枚蕤仁三七枚湯浸去赤皮右以水二大盞煮取半鍾綿濾去滓銅筯㸃之蕤仁膏出聖惠方治眼風熱赤爛方見本門胎赤眼類春雪膏治眼赤爛疼痛不可忍片腦一分􅅋仁二錢收霜蜜生三錢絹濾去滓右為膏㸃之又方出聖惠方治赤眼久患不差時癢腫痛視物不得黄連一兩去鬚搗為末古字錢五枚蜜二兩右以竹管盛於飯甑上蒸一炊久綿濾取汁㸃之竹葉散出聖惠方治眼赤久患不差赤爛時癢淡竹葉一兩黄連一兩去鬚黄蘖一兩半右剉以水二大盞煎取一鍾濾去滓日三四度㸃之雄黄散雄黄半兩細研細辛一分龍腦半錢細研右研令均每至夜卧時以銅筯㸃之碧雲散出聖惠方治眼赤爛臘月猪脂五兩研爛去滓銅青一兩細研膩粉半兩右藥盛油磁瓶内以筯攪令匀冷凝結成膏每用先以熱鹽漿水洗眼後塗一大豆許於赤爛處日三用之又方出危氏方治爛眩風眼兩眥癢痛用此㸃之藥涙俱下流出小蟲陸景淵之子曽苦此淚漬兩頰成瘡百藥不效因理故書得此方試㸃之須臾藥淚俱下循瘡中流出其間有小蟲自此遂愈甚效黄連淡竹葉各一兩栢樹皮乾用半兩濕用二兩右㕮咀以水二升煎至五合稍冷用滴兩眥及洗之日三四度一方用五倍子為末貼之整睫散出聖濟總録治瞼爛風眼疾白鱔土膽礬各半錢右生為散沸湯浸洗眼瞼不要洗入眼裏勝金丸出聖濟總録治風毒眼癢痛連瞼赤爛並暴赤眼銅緑白礬各等分右以炭火燒令煙盡為度細研如粉用沙糖和為丸如菀豆大於楠木粉内滚過每用二丸熱湯半盞浸化洗眼如冷更煖洗日三五次白龍散治目赤眥爛癢痛不可忍方見本門目類柴胡散治目赤爛方見本門目昏暗類一捻金散出聖濟總録治風赤障眼四邊肉爛冷淚常出不止用朴硝半兩研調水㸃之驅風散治爛眩風赤眼方見本門風毒衝目虛熱赤痛類又方出危氏方治眼癢或因布巾拭破眼眩致成爛眩不得乾好白礬一兩煆過銅青三錢右同研細和匀如水白再加銅青每用半錢熱湯泡洗澄清以手蘸開眼如法洗必澁不可拭乾但閉目坐待澁止自然眼開如藥冷更煖洗三五次效治風爛眩風眼出經驗良方蕤仁肉杏仁各一兩湯浸去皮尖右同研入膩粉少許為丸熱湯化洗又方出經驗良方治爛眩風眼用笋葉包九里光草煨熟撚入眼中一方出千金方治目赤爛用三指撮鹽置古文錢上以火燒赤投少許醋中浸没錢以綿沾汁注眥内膩粉膏出聖惠方治眼赤爛不開用膩粉一兩以口脂調如膏每日大眥上㸃三五次又方出聖惠方取馬牙硝一兩内於猪膽内懸於霜露中旋旋掠取上面霜㸃眼或入蕤仁黄連末少許㸃之極妙又方出聖惠方取雞冠血㸃眼中日三五度治眼赤爛風赤開不得者出聖惠方以戎鹽細研水和㸃目中味鹹無毒可用一方用青鹽一兩以水二升煎至一升半濾去滓微熱洗眼冷即重煖不勒度數洗之又方出危氏方治爛眩風赤眼用青礬火煆研出火毒每用半錢熱湯一盞泡温洗治爛眩拳毛倒睫治爛眩風眼出海上方用螺一箇以水養數日浸去泥沙候靨開以銅緑一豆大許入在内即化成水以鵝翎蘸水刷㸃眩上數次即愈不可用餘藥治别人只可醫一人也治眩爛風眼出經驗方用山礬葉三十葉扯碎老薑三四十片用水飯上蒸洗患處治爛眩風眼出直指方用緑色爐甘石燒紅童便淬三次出火毒一日夜研為細末同黄連末用童尿浸漬取㸃眼胞仍取覆盆子軟葉入男孩兒乳汁研為丸置眼眥頭引蟲出治爛眩眼膏出海上方以麻油浸蠶沙三兩一宿研細以箆子塗患處隔宿即愈不問新舊經驗方陳方云表兄盧少樊嘗患此疾用之即愈親筆余册消風散治爛眩風眼雙目赤爛經年不安或癢或痛用消風散加白皮煎湯調下即或目生努肉類祛風散洗之銅青湯治爛眩眼方見本門目風赤類㸃眼方出聖惠方治赤眼久患不差赤爛時癢痛視物不得方見本門目積年赤類治一切赤目爛眼疼癢不可忍者及昏暗隱澁不能開漸生翳膜多淚羞明如神秦皮繭草甘草晉􅀥燈心黄連右等分剉如兩指大片子將􅀥子劈開每一合無鐵器内盛之煎十餘沸隨手用軟帛蘸洗候鼻中出香氣為度歸黄散出海上方當歸生地黄輕粉黄連赤芍藥各少許杏仁三枚去皮尖右㕮咀用絹袋裹用水一盞煎熟薫眼却以别物裹藥閉眼熨之㸃眼方出海上方爐甘石半兩硇砂硼砂各一錢白礬腦子麝香各半錢右為細末用沸湯洗眼五七次方傾前藥末在内再洗還睛紫金丹治目眶眩爛歲久不愈俗呼為赤害是也當以三稜針刺眶外以瀉温熱如眼生倒睫拳毛兩目緊急葢内伏火熱而攻隂氣法當去其内火邪熱眼皮緩則毛立出翳膜亦退用手法攀出肉瞼向外以針刺之出血以左手指甲亦針鋒迎之黄連三兩童便浸曬乾為末爐甘石一十四兩燒炊七遍研碎連末拌之黄丹水飛當歸三錢南乳香三錢硇砂一錢小盞内放於瓶口薫乾麝香一錢白丁香真者半錢輕粉一字白砂蜜二十兩右將白砂蜜於石器内慢火去沫先下甘石次下丹以柳枝攪過次下餘藥以枯為度作丸如雞頭大每服一丸温水化開洗之碌丹散子出衞生家寶方治男子婦人小兒一切赤爛眩風眼黄丹白礬膽礬各半錢一處煆過白鱔二錢銅青二錢右為細末每服半錢沸湯泡洗治風毒爛眩眼出衞生家寶方五倍子鷹爪黄連去蘆洗淨蔓荆子去皮淨各半錢肥大京􅀥二枚右用新砂瓶貯淨水二升入四味藥炭火同煎取一升澄清以􅀥子㸃清藥汁不住挹攪眼眩凡可六七次挹之藥汁如冷再煖令挹時須先㣲閉眼治爛眩風眼出衞生家寶方􅅋仁五倍子荆芥穗右等分剉為散每服三錢濃煎去滓隨手洗之即差白龍散出華它中藏方治風毒赤爛眼眶倒睫冷熱淚不止白鱔一兩銅緑一錢另研右同研勻滴水和為雞頭子大丸每服半錢百沸湯化開以手指洗眼亦得治爛眶風眼出華它中藏方宣州黄連半兩大棗肉三七枚去核右一處用雪水一升砂鍋内文武火煮至一盞許過三七日以銅筯㸃食後臨卧日可三四次㸃之青金散治爛眩風眼赤痛熱癢銅青滑石蜂房等分輕粉少許右為末桑葉煎湯泡洗少加青鹽去努肉翳膜少加真白礬治爛眩眼五倍子蔓荆子擇淨搥碎右二味等分煎水洗治目赤爛出本草以瑪瑙石熨之治目赤爛熱障出本草用那耆悉取汁洗之療目赤爛出本草以欒􅐸合黄連作煎甚效洗輪散出仁存方治爛眩眼黄連十文槐花少許右為細末入輕粉十文拌勻以生男兒乳汁和之用小盞盛於甑上蒸候飯蒸熟取帛裹藥於眼上拭三兩次即見效矣試之屢驗治爛眼風眼右以黄桑柴灰淋汁澄清温洗之普濟方卷七十三
