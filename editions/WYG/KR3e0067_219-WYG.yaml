煑令九分乾井水浸一宿研成膏乳香以人參湯研如粉入在硃砂内茯苓人參各一兩半並人參硃砂乳香膏内研右和令匀入猪羊心血和成丸如雞頭子大每服三二丸煎人參炒酸􅀥仁湯服食後臨卧下老龍丸又名蒼龍丸成都府崔某無子娶妾禇氏得此方修合未服家有老奴年巳七十之上腰脚疼痛曲背而行崔妻恐妾有子以此藥付老奴服之良久老奴語崔某曰此方甚有靈驗奴自服此藥諸疾悉痊房事如少壯人崔某依言復合藥服之未幾妾褚氏有孕妻究得其實是故名曰蒼龍丸母丁香紫稍花肉蓯蓉酒浸兎絲子酒浸蛇床子巴㦸仙靈脾白茯苓去皮逺志去心炒八角茴香以上各二兩燈草二錢蓽澄茄胡桃肉車前子萆薢馬藺花酒浸牡蠣火燒炒六次韮子種木通酒浸以上一兩乾漆炒去烟三兩山茱萸破故紙酒浸全蝎桑螵蛸酒浸龍骨以上一兩半熟地黄五兩當歸沈香五錢木香五錢大蜘蛛七箇右為細末煉蜜為丸如桐子大每服三十丸空心温酒送下七日見効無婦人者勿服此藥轉起陽事如欲解者飲凉水三口年髙氣衰虚耗風濕脚疼痛疾並宜服之此藥最靈驗添精補腎强去冷除風濕扶衰更起陽老年如修合秘宻慎傳揚兼之保元氣延夀得安康一方無螵蛸當歸換乳香人參養胃湯治虚損血衰手足軟行步無力口苦乾宜服之人參三錢茯苓去皮四錢北五味子五錢黄茋三錢白扁豆三錢逺志三錢石蓮肉去皮五錢生地黄五錢益智仁三錢川當歸三錢半川芎二錢半麥門冬去心三錢甘草二錢大棗六枚右細剉分作六服每服用水二鍾大棗各一枚煎至八分去滓食前服滓再煎服無忌人參養榮湯人參二錢生地黄四錢麥門冬去心三錢石蓮肉去心五錢茯神去木四錢五味子三錢山藥二錢半甘草二錢逺志肉去木三錢右作四服水二鍾大棗各一箇煎至八分去滓食前服二滓併煎沈香羊肉丹出東垣秘藏方升降隂陽調理三焦通經絡氣血壯元陽補臟腑常服百邪不侵至老清健羊腎軀肉一斤去節膜葱白一握陳皮一兩青鹽五錢破故紙炒逺志生地黄花椒五錢去目合口者用好酒煑糊入葱白等再煑羊肉牛膝乾地黄木香韭子菖蒲沈香覆盆子木𤓰北五味各一兩麝香一錢胡桃肉二兩鹿茸酥炙四兩蓯容一兩枸杞子山藥各一兩茴香一兩右為細末煉蜜為丸每服三十丸空心鹽湯下固脬丸出衛生家藏方治元臟氣弱虚榮衛不調肢體倦怠常服接真氣益元陽潤肌膚健筋骨固脬寒明目養心腎鹿茸二兩半去毛酥炙當歸洗焙牛膝焙補骨脂炒各一兩半附子炮去皮臍巴㦸去心逺志去心白茯苓焙栢子仁研鹿角膠麵炒各一兩桑螵蛸一兩一分酒蒸一宿焙肉蓯蓉洗焙兎絲子酒浸一宿焙各四兩澤㵼半兩炒右為細末煉蜜為丸如桐子大每服五十丸用温酒鹽湯下空心如要秘精加龍骨石蓮肉鷄頭肉各一兩取金櫻子汁􅆈膏同蜜為丸服如夢寐遺精泄氣精寒滑下虚損氣厥暈悶小便頻數加白茯苓神一兩醋煑韮子一兩炒用鍾乳粉七錢陽起石煆半兩桑薜茄二兩治臟腑虚冷元陽正氣虚弱陽事不起小便餘瀝冒風雨忽吃些冷物即胸中隔塞如有物在喉中飲食無味四肢痿弱兩足無力不可逺行宜服此更有一般風隔在治痰方中楊子建有䕶命方石斛茴香藿香豆䓻益智仁炒川芎荆三稜防風莪术甘草各一兩細辛三錢右細杵羅為末每服二錢水一盞入鹽少許同煎一二沸通口去滓空心任意服脈氣微弱方可吃此藥灸氣海宂即安延生䕶寳丹出御藥方補元氣壯筋骨固精健陽通和血脈潤肌膚久服益夀延年兎絲子水淘净酒浸軟取末三兩蓯蓉酒浸切焙二兩二味浸藥酒各多著要熬膏子家韮子四兩水淘净用棗二兩同煑棗熟去棗水淘净控乾再用酒浸一宿慢火炒軟秤二兩蛇床子二兩水淘净棗三兩同前煑令棗熟去棗焙乾二兩晩蠶蛾全者二兩用酥少許慢火微炒白龍骨二兩用茅香一兩同煑一日去香用帛裹數重懸在井中一宿取出桑螵蛸剉炒香蓮實去皮炒熱木香丁香葫蘆巴微炒各一兩南乳香另研各半兩鹿茸麝香另研二錢乾蓮花葉各半兩右一十五味除乳香麝香兎絲子末外一十二味同為細末将前兎絲子末三兩用浸藥酒二升用文武火􅆈至一半入蕎麥麵兩七重一兩用酒調匀下膏子内攪匀次下乳香麝香不住手攪經沸􅆈如稠糊放冷此膏子都要用盡恐硬入酒少許與前藥末和成劑杵搗千餘下丸如桐子大每服三十丸絶早日未出時温酒入炒鹽少許送下静坐少時使藥至丹田以意斟量漸加丸數如陽道衰精滑者空心臨卧各進一服養真丹出御藥院方治隂衰少痿陽弱不舉補骨脂炒益智仁晩蠶蛾微炒沒藥研穿山甲炙青鹽研丁香各半兩茴香乳香研南木香白术各三錢沈香剉薑黄薯蕷香附子炒木香甘草炙各一兩巴㦸去心一兩川楝子去皮晒乾麵炒黄色一錢牛膝酒浸一兩七錢蓯蓉酒浸一宿檀香各七錢蒼术三兩酒蛤蚧一對浸二宿去蟲縮砂仁半兩右二十五味搗羅為末酒浸麵糊為丸如桐子大每服四十丸空心及食前温酒送下日二服腽肭臍丸出朱氏集驗方補真助陽益壯根本腽肭臍一對酒煑爛用大附子炮去皮臍五味子川烏炮兎絲子酒浸焙乾各二兩鹿茸蜜炙麋茸鹿角膠各一兩半沈香青鹽别研陽起石煆葫蘆巴炒鍾乳粉各一兩麝香一兩右為末用腽肭臍杵爛和藥將所煑臍酒煑山藥末為丸如桐子大每服七十丸空心酒服腽肭臍丸出朱氏集驗方治證同前腽肭臍鹿角膠鹿角霜麋茸各二兩乳香葫蘆巴兎絲子巴㦸天去心鍾乳粉熟地黄當歸牛膝蓯蓉茴香天雄附子各一兩沈香硃砂二錢麝香一錢右先将腽肭臍酒浸一宿煑爛杵成膏將浸藥酒化麋鹿膠同為膏子次下乳香麝香沒藥硃砂乳粉研為末将餘藥修治後研為細末再於乾鉢内同研千百下别用羊白腎子三對羊白脊髓五條酒煑熟爛研為膏用腽肭臍麋鹿角膠搜拌藥末成劑得所若稍乾打酒糊些少同搜成劑入臼杵三五千杵丸如桐子大窨一宿慢火上炒乾用無油鑵子盛紙密封上每服三五十丸空心温酒送下腽肭臍丸出朱氏集驗方治證同前腽肭臍一對麋茸去毛酒浸二宿炙鹿茸去毛酒浸一宿炙蓯蓉酒浸一宿各五兩當歸茯神去心皮硃砂牛膝酒浸一宿五味子巴㦸天去心各三兩青鹽炒一兩陽起石酒煑一日沈香附子三兩泡去皮臍兎絲子净五兩酒浸一宿右為細末用腽肭臍併鹿角膠為膏子如桐子大每服七十丸至一百丸鹽酒湯下食前龍虎鹿角丸出朱氏集驗方伏火硃砂四兩研如粉代赭石四兩火煆水飛過鹿角膠七兩蛤粉炒鹿角霜二兩鹿茸七兩酒浸炙白龍骨三兩生用水飛虎脛骨四兩酥炙天雄二兩炮桑螵蛸四兩炒磁石醋淬水飛牡蠣粉韮菜葉和泥煆水飛各四兩附子炮乳香沒藥沈香鍾乳粉陽起石煆水飛各二兩右件糯米粉用酒和成餅煑熟丸如桐子大每服三十丸加至五十丸空心鹽湯下一方用靈砂不用硃砂牛膝丸出余居士選竒方治諸虚百損久服壯元陽益精髓身體輕健非常之効牛膝酒浸三日焙乾澤㵼乾地黄茯神山茱萸川巴㦸赤石脂各一兩杜仲炒三兩五味子三兩乾山藥二兩兎絲子三兩酒浸三日炒乾蓯蓉酒浸三日焙乾四兩右為細末煉蜜和丸如桐子大每服二十丸加至三十丸空心食前温酒下忌醋蒜陳臭之物服至七日後手足煖面色悦光消飲食壯元陽其効不可具述補益陽氣出本草取丹雄鷄冠血和天雄四分桂心二分大陽粉四分丸服之普濟方卷二百十九
