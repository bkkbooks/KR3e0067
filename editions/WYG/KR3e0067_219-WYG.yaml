皮草之精石斛山之精金絲色者栢子仁木之精菊花日之精鹿茸血之精白术目之精各一兩右為細末煉蜜為丸如桐子大每服三十丸食前米飲送下蓯蓉散一名益陽丹補虚益陽治陽氣不足隂囊濕癢尿有瀝餘漏泄虚損蓯蓉續斷各八分蛇床子九分五味子薯蕷各七分逺志六分乾地黄巴㦸天各五分天雄七分右治下篩酒服方寸七日三凡病皆由醉飽後或疲極之餘而合隂陽致成此症也麝香鹿茸丸出直指方治真元虚憊精耗血少乾地黄山藥各三兩杜仲炒斷絲鹿茸薯蕷各七分肉蓯蓉牛膝並酒浸各一兩沈香五錢麝香半錢右為細末煉蜜為丸桐子大每服三五十丸食前鹽湯下木香金鈴子丸補虚益氣壯下元堅筋骨治腰脚痛筋脈拘攣木香茴香甘草各一兩金鈴子肉知母白茯苓各二兩川芎當歸麝香五分右為細末酒糊丸如桐子大每服五十丸空心鹽湯或温酒任意下以乾物壓之若人虚弱者更加鹿茸一兩海馬一對補腎和前藥丸服雀附丸出聖惠方治臟腑久積虚冷腹脇多氣脾胃乏弱少飲食羸痩無力雀兒三十枚去嘴脚毛羽腸胃胸骨用好酒一升煑爛熟研補骨脂一兩微炒木香一兩吳茱萸一兩湯浸七遍焙乾微炒乾薑一兩炮製剉青皮一兩湯浸去白穰焙木𤓰一兩搗羅為末附子一兩炮製去皮臍熟艾末二兩以米醋二升煎如膏右為末以雀肉入於艾膏内和藥末令得所更搗五六百杵丸如桐子大每服空心及晚食前以温酒或鹽湯下三十丸漸加至四十丸椒附丸出聖惠總錄補壯元陽蜀椒去目及閉口者四兩醋浸一宿取出却用酒一升炒乾為末白羯羊腎二對切焙乾為末附子炮製去皮臍青鹽巴㦸天去心蒺藜子炒去角蘹香子炒各一兩肉蓯蓉酒浸切焙一兩右為末用生羊腎二對去脂膜細切研如麵熔藥熟丸如桐子大每服三十丸酒下鹽湯亦得楮實丸出聖濟總錄補元臟壯筋骨除積冷及一切氣疾令人輕健方見本門補虚駐顔菖蒲丸出御院方藥健陽道壯筋骨快氣利大腸商枳殻一分麩炒木香五錢山茱萸去核一兩木賊一分去節菖蒲一分黒牽牛一兩生全蝎一分葱筒内炙令焦黄色甘草半兩剉如豆許大巴豆三十個一處炒令巴豆黒色去豆右為細末用茴香半兩酒熬三二十沸去滓取酒麵糊為丸如桐子大每服三五十丸食前温酒下天雄丸出聖惠方補暖元臟添益精氣利腰脚强筋力天雄炮製去皮臍肉蓯蓉酒浸一宿刮去粗皮炙乾各二兩雀卵四十九枚白馬脛塗酥炙令黄用二兩雄蠶蛾隔紙微炒兎絲子酒浸三日曝乾别搗為末各一兩右為末以雀卵并少煉蜜丸如桐子大每服空心温酒下十丸漸至二十丸三仙丸出仁存方詩曰一烏二术三茴香更加椒楝牡香薑善治耳聾并目暗又調榮衛壯元陽元陽壯後精神妙久服令人天命長能療婦人脾血疾空心午用下鹽湯首烏一兩蒼术二兩米泔浸一宿用茴香一兩香附子二兩椒一兩炒川楝子肉一兩牡蠣一兩煆白薑一兩炒右為末丸如桐子大每服三十丸用鹽湯下空心服小腸氣用霹靂酒下玉蘂丹百一選方治元氣虚憊臍腹冷疼面黄體痩口淡無味精神恍惚多困少力腰膝酸疼飲食減少膀胱小腸久積虚疾脾元滑泄神竒之甚南木香三分蝎稍舶上茴香生研細陽起石煆硇砂湯化去土飛令極净各半兩黒附子一兩白礬一兩右為酒煑糊丸如桐子大每服空心日午用十丸以齒嚼破温酒下小腸膀胱疝氣發痛用綿灰二錢温酒下十五丸隂陽二毒傷寒甘草湯下二十丸㵼痢虚滑不止腹内撮痛艾湯下十五丸婦人赤白帶下沒藥下五丸脾胃虚弱米穀不化酒下十五丸或二十丸亦得草四神煎一名七珍丸出聖濟總錄補真元壯腰膝進飲食秘精益氣方見腎臟門白淫類硇砂煎丸治男子陽衰隂盛下元真虚膀胱小腸氣塊墜痛硇砂二錢檳榔一錢牡蠣燒滑石海金沙川楝子麻子仁另研各半兩右為細末􅀥肉丸如小豆大每服二十丸葵子湯下空心食前日進二服七仙丹一名枳殻丸出瑞竹堂治虚損小便頻數健陽木香半兩枳殻一兩麩炒白茯苓去皮知母小茴香鹽炒甘草去皮以上各一兩右為細末煉蜜為丸如彈子每服一丸空心細嚼温酒下乾物壓之補養丸出瑞竹堂補元氣滋氣血暖水臟益下元兎絲子洗净搗為末四兩破故紙炒香益智仁各一兩山藥一兩剉碎炒黄色杜仲一兩去皮用生薑自然汁拌勻炒斷絲茴香一兩半炒香蒼术二兩米泔浸一宿切片麩炒右為末酒糊為丸如桐子大每服五十丸空心温酒或鹽湯下巴㦸天酒出千金方治虚羸陽道不舉五勞七傷百病巴㦸天牛膝各三斤枸杞根白皮麥門冬地黄防風各二斤右並用生卒無生者用乾者亦得㕮咀以酒一擔四斗浸七日去滓温服常常令酒氣相續勿至醉吐慎生冷猪魚油蒜春七日秋冬二七日夏勿服先患冷者加乾薑桂心各一斤好忘加逺志一斤大虚勞加五味子蓯蓉各一斤隂下濕加五加根皮一斤有石斛加一斤佳每加一斤藥則加酒七升此酒每年八九月中旬即合入十月上旬即服設服餘藥以此酒下之滓曝乾搗為末以此酒服方寸七日三常服加甘草十兩佳虚勞加耆一斤又方用巴㦸生牛膝各三斤㕮咀以酒五斗淹浸服如前法木香丸出聖濟總錄補壯元陽木香五錢附子炮製去皮臍巴㦸天去心蘹香子慢火炒過蓮實麩炒香各一兩蛇床子炒黄一分右為細末糯米粥丸如桐子大每服空心鹽湯食前下十丸來復丹出簡易方配數二氣均調隂陽奪天地沖和之氣乃水火既濟之方可冷可熱可緩可急補損扶虚救隂助陽理榮衛不交養心腎下升降上實下虚氣閉痰厥心腹冷痛臟腑虚滑不問男女老㓜危急之証但有胃氣無不獲安舶上硫黄透明不夾石者硝石同硫黄為細末入定碟内以微火炒用栁木箆不住手攪令隂陽氣相入不可火太過恐傷藥力再研極細名二氣末太隂𤣥精石研細水飛各一兩青皮去白五靈脂五臺者水澄去砂石晒乾陳皮去白各一兩右以五靈脂合橘皮為末次入𤣥精石末拌匀以好醋打糊為丸如豌豆大常服五十粒空心粥飲吞下甚者一百粒小兒三五粒新生嬰兒一粒慢驚風或吐不止變成虚風搐搦者非風也胃氣欲絶故也用五粒研碎米飲下老人伏暑迷悶紫蘇湯下婦人産後血逆上搶悶絶并惡露不止赤白帶下並用醋湯服常用和隂陽益精神散腰腎隂濕止腹脇冷痛應諸疾不辨隂陽者立見功効靈驗難記簡易方云當與養正黒錫二丹相類但體輕不能鎮堅耳然硝石既寒佐以橘皮其氣疎快硫黄且能利人若作暖藥用以正㵼悞矣但霍氣一証吐痢交作葢由飲啖生寒冷或冒暑熱之氣中脘節悶揮霍變亂此丹通理三焦分順隂陽服之其功最驗中脘昏亂反胃吐逆腎厥頭疾老人風秘小兒驚風服之皆宜麋角丸出聖惠方補下元治積冷氣令人强壯益顔色麋角屑五兩酥拌炒微黄硫黄二兩細研水飛過腽肭臍二兩酒刷炙微黄木香三兩補骨脂三兩微炒蓯蓉三兩酒浸一宿刮去皮炙乾右為細末入硫黄同研令匀以無灰酒一斗於銀鍋内先入藥末一半已來煎令調和止件藥末搗三二百杵丸如桐子大每日空心以温酒下三十丸玉霜丸出和劑方治男子元陽虚損五臟氣衰夜夢遺泄小白濁臍下冷疼陽事不興久無子息漸至羸弱變成腎勞目昏耳鳴腰膝酸疼夜多盗汗服之自然精元秘固内施不泄留濁去清精神安健如婦人宫臟冷月水不勻赤白帶漏久無子息面生䵟􅍍髮退不生肌肉乾黄容無光澤並宜服之大川烏用蚌粉半斤同炒後製去蚌粉不用川楝子麩炒各半斤破故紙炒巴㦸去心各四兩茴香焙六兩右為末酒糊為丸如桐子大每服三五十丸用酒或鹽湯下空心食前一名張走馬玉霜丸葫蘆巴丸出聖濟總録壯陽益氣煖元臟補虚乏輕腰膝止腹疼葫蘆巴五錢蘹香子炒香三兩王𤓰巴㦸天各一兩蒼术麩炒黄刮去皮三兩右先將王𤓰蒼术二味同搗匀焙乾與諸藥為末酒煑麵糊和丸如桐子大每服二十丸空心食前温酒或鹽湯下四神丸丹出和劑方治百病補五臟逺疫癘却風瘴除尸疰蟲毒辟鬼魅邪氣并男子婦人真元虚損髓耗形羸氣乏中滿下虚致水火不交及隂陽失序精神困倦面色枯槁吐血盗汗遺瀝失精大便自利小便滑數夢寐驚恐陽事不舉腰腿疼重筋脈拘攣及治一切寒痼疼痃癖疝瘕臍腹絞痛久㵼久痢傷寒陰證脈候微身涼自汗四肢厥冷婦人百病胎臟久冷絶孕無子赤白帶下月水不調服諸藥久不瘥者悉主之此丹假隂陽造化之端得天地沖和之氣與尋常煆煉僣燥丹藥功効不同能活血實髓安魂悦澤顔色輕身保夀久服通神雄黄雌黄硫黄朱砂各五兩右研細入磁合内将馬鞭草為末鹽泥固濟慢火四圍燒煆一日一夜取出再研細末以糯米粽研為糊丸如豆大每服一粒絶早空心新汲水吞下姙婦不可服忌羊血葵菜一方研細入鍋子内歇口炭火溶化滴水中成丸如菉豆大每服二丸空心温酒下益色壯陽治一切風出本草以菊花上水飲之並無所忌益陽道令人悦澤有子出本草以枸杞子上蟲作網子為蛹時取之暴乾炙令黄和乾地黄為丸服之大起陽益精法製煨腎方出聖濟總錄治陽衰下臟虚弱巴㦸天米泔浸去心蓽澄茄蘹香子炒附子漿水煑三二十沸烘乾製去皮臍右各等分為末每服用羊腎一對各批開去白入藥末一錢匀摻入葱絲少許用濕紙裹慢火中煨熟食之玉華白丹治清上實下助養根元扶衰救危補益臟腑五勞七傷夜盗汗肺痿虚損久嗽上喘霍亂轉筋六脈沈伏唇多青黒腹脇刺痛大腸不固小便滑數夢中遺泄肌肉痩瘁目暗耳鳴胃虚食減久痢久瘧積寒痼冷諸藥不愈鍾乳粉一兩白石脂煆半兩陽起石半兩煆紅酒泡隂乾左顧牡蠣用鹽泥固濟煅紅白者半兩右各研細末為粉方和研匀以糯米糊為丸如鷄頭大入坑出火毒每服一粒至二粒以人參湯空心服婦人用艾醋湯下養正丹升降水火助陽接真治元氣虚虧隂邪交蕩正氣乖常上盛下虚氣不升降呼吸不足頭旋氣短心神怯弱夢寐驚悸體自汗腹疼腰痛虚煩狂言口乾上喘翻胃吐食霍亂轉筋咳逆不足又治中風涎潮不省人事陽氣欲絶四肢厥冷如傷寒隂証自汗唇青脈沈最宜服之黒錫先熔成汁一丸上濾去滓再熔再濾三次取净稱水銀以皮紙裹三重於厚絹内作包緊繫口懸於紫背天葵汁内煑一伏時右将建盞一隻先熔黒錫成汁次下水銀用栁木箆不住手攪至無星入硫黄攪至黒色如有烟以醋酒入硃砂攪熟傾在碗内仍攪吹令冷取出研如粉糯米為丸如菉豆大每服二十丸以􅀥湯鹽湯下此藥升降隂陽既濟心腎食前服一法四味各一兩用净鐵籩以厚紙布扎柄先熔鈆濾去滓一兩净再放籩内用鐵匕炒攪令将熟以硫黄末三錢重漸入其中或烟起亦莫管只急手攪炒令鈆熟無性其硫黄皆燒去但得鈆熟遂傾放地下紙上令硬即碾開以紗篩出鈆粉其餘成珠者丹砂研為末次将籩銚頓慢火爐上义入鉛以熟硫黄末一兩漸入頻攪炒纔見黄烟上急拖過冷爐上少頃又過火上再攪炒得鈆與硫黄皆成黒色極調和了却於爐上候鈆硫黄微冷又頓在别處微微火上少頃入水銀以鐵七頻攪切勿令青烟上便走了水銀又次入硃砂末頻攪炒令十分調和即臨放地下紙上候硬别研為末糯米糊為丸如菉豆大每服一丸鹽湯空心送下補精膏壯元陽益真氣助胃潤肺牛髓四兩揀去骨胡桃四兩去皮殻杏仁四兩去皮尖山藥半斤右将杏仁胡桃山藥三味搗為膏蜜一斤煉去白沫同牛髓調和匀入磁礶内湯煑一日空心服一匙拱辰丹男子方壯年而真氣猶怯此乃稟氣素弱非虚也僣燥之藥尤宜速戒勿謂手足厥逆便云隂多如斯治之不惟不能愈疾大病自此生矣滋益之方羣品稍衆藥方細微難見功効但固天元一氣使水火升降五臟自和百病自去方主之鹿茸酥炙去皮毛當歸洗去土山茱萸新好有肉去核四兩麝香五錢另研右為末入麝香拌匀酒煑糊丸如桐子大每服一百粒或五十粒温酒或鹽湯下興陽丹出本草以栗當二斤一名列當搗篩畢以酒一斗浸經宿遂性飲之大固陽湯出危氏方治脱陽証或因吐㵼之後四肢逆冷元氣不接不醒人事或傷寒新瘥誤行房小腹急痛外腎搐縮靣黒氣喘冷汗自出亦是脱陽証須臾不救附子一兩炮切八片白术乾薑各半斤木香一分右剉用水二碗煎至八分去滓冷灌服須臾更進滓併煎五精丸出醫方治腎氣羸弱大補元氣秋石剛健者人精鹿角霜獸精茯苓去皮木精陽起石石精山藥草精各等分右為末酒糊丸桐子大每空心服五十丸須要常近火邊使乾燥庶幾服之無變膈之患蝦米起陽補腎蝦米一斤去皮殻用青鹽酒炒乾香熟為度真蛤蚧青鹽酒炙脆為度一對茴香青鹽酒炒四兩净川椒四兩同上製不可過右酒須用渾濁煑酒二升帶浮蛆釅酒最佳攪入青鹽製用先製蛤蚧椒皮茴香乾却製蝦米以酒浸為度候已熟取前三味同和匀用南木香粗末二兩同和乗熱收入磁器内四圍封固候冷取用每一勺空心鹽酒細嚼下麋角霜丸出王氏博濟方補暖元臟駐顔麋角一副水浸七日刮去皺皮鎊為屑盛在銀瓶内以牛乳浸一日如乳耗更添直候不耗於麋角屑上乳深二寸用油單數重密封瓶口别用大麥一斗安在瓶内約厚三寸上安瓶更用大麥固圍填實露瓶口不住火蒸一伏時如鍋内水耗即旋添熟湯須頻取角屑看爛如麵相似即住先取出用細篩子漉出乳焙乾每料用乾角屑八兩附子炮製去皮臍山芋各三兩右為末以􅀥肉和丸桐子大每服空心温鹽湯下十五丸至二十丸一方蜜丸兎絲子丸出聖濟總錄補虚益氣壯元兎絲子淘去浮者以酒浸七日爛研焙乾三十兩蘹香子微炒半斤青鹽三兩右為末用浸藥酒煑糊為丸如桐子大每服空心温酒下二十丸至三十丸神應參丹出簡易方治丈夫婦人童男室女心腎虧盈神氣欲脱咳嗽痰喘咯血氣急寒熱往來形容痩弱風痰潮厥腸滑泄利一切諸証并主之煉硃砂末半斤靈砂末代赭石末各二兩右研極細無聲為度用糯米末半兩人參末半兩拌匀用熟白湯和作餅二箇於湯内煑令浮熱取出斟酌搜和令稀稠得如小麻子大頓在桑柴炭灰盤内候三日去灰用新麻布袋打令光色每服五粒人參北棗湯下病重者可服二十粒煉硃砂法辰廣二州硃砂塊夥如黒豆大者八兩分為三處人參三十兩亦分為三處却用銀鍋或年深古鐵鍋注溪水或湖水令滿安頓蒸籠於上籠内用細密竹篩為磹先将人參在内次入硃砂三重間之然後用炭一百五十斤分作三處每日夜用炭五十斤水五桶水乾漸添至天明取人參硃砂出揀其硃砂每粒用木搥撃為三二片再用人參十兩仍舊如前安頓蒸自午至天明如此三日滿足取出用水澄洗砂令净却用硫黄一兩草茶一兩各為細末先用硫黄末頓在熟鐵鍋内用炭火慢慢熔成汁次以蒸子硃砂攛在汁内炒停候硫黄為烟却用草茶末分三次摻在硃砂内炒令停存硫黄性為度去茶焦末净揀硃砂為末其所擇爛人參日中曬乾了再火焙别為細末棗湯調下大治一切渴疾及傷寒過經無汗煉代赭石法釘頭大赭石末三兩先用硫黄二錢為末米醋調塗赭石上次用鹽泥固濟炭火三斤煆硫黄化為烟却去泥取出赭石再用米醋浸一時久有火煆醋淬凡三次别研為末迴陽丸出聖濟方補益元陽恱澤肌體開心明目牡蠣煆通赤乾薑炮各半斤右為細末薑汁煑半日丸如桐子大空心温酒下二十丸補骨脂煎治因感卑濕致疾久之陽氣衰絶乳石補藥不効服此收功常服延年益氣悦心明目補筋骨方見本門補虚壮筋骨類補骨脂丸方内參附湯出危氏方治真火不足氣喘息自汗短氣頭暈凡虚弱之証並皆服之人參半兩附子泡去皮臍一兩右剉散分作三服水二盞薑十片煎食前温服法煉靈砂丹出危氏方靈砂者非常丹也稟隂陽氣聚日月精水火既濟脱榖煉成上益津液中通榮衛下却强隂固精補髓保夀輕身男子婦人童男室女真元虚憊臟腑虧損寒熱往來骨蒸盜汗心神不寧恍惚時驚咳嗽喘滿嘔吐寒延食減少味小便滑數時有白濁形容羸瘦中風痰厥久病脾泄諸虚百損服之竒効好硫黄三兩水銀九兩右擇天醫黄道火日午時先研硫黄為末用人家常使鐵銚盛以麩炭火慢慢鎔成汁却離火漸漸以水銀入銚内使鐵七炒二品同一處凡三次慢慢煉成膏青黒沙候冷乾燥取出研為細末然後入有耳鍋内次用中建盞一隻曽經火煆者妙安頓耳鍋上使鐵線十字縳令牢固却用醋調赤石脂末蜜固濟盞縫又單用醋調赤石脂膏塗耳鍋口縫日中曬乾候盞縫乾再以赤石脂膏竹箆子挑塗數次又擇黄道天醫日午時先用麩炭一斤端正頓在爐内却用安耳鍋定了於建盞内盛水九分如乾旋添水煆至未時用炭一斤頓耳鍋側約一寸申時添炭火二斤在耳鍋側約二寸至亥時添炭一斤在耳鍋側約三寸至子時爐下退火盞内去湯添井水九分至寅時取出多砂研為末糯米末為餅子丸如小麻子大或粟米大丸畢頓在紙灰盤内二日取出用布袋打或碗盞盖合打令光色每服五丸至十丸加至二三十丸人參棗湯下常服温酒鹽湯下諸虚不足氣不升降膀胱疝氣淋瀝遺精白濁炒茴香青鹽入酒煎候温下元氣傷憊羸弱無力不思飲食温酒鹽湯下虚勞喘嗽不安罌粟烏梅子蘇薑湯下以物壓之熱勞口乾無時發熱痩弱不食貝母柴胡湯下冷勞虚顫手足痿弱薑附麝香酒下盜汗隂汗小便頻數白濁牡蠣煆多生硫黄少鹽共三味細研温