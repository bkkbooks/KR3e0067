鼈甲一兩别搗羅為末乾漆搗碎炒令煙出附子炮製去皮臍荆三稜炮剉川大黄各一兩剉碎炒過木香半兩右為末先將鼈甲末以頭醋三升煎令稠後入諸藥末和搗二三百杵丸如梧桐子大毎服空心及晩食前以温酒下十丸忌莧菜生冷三神煎出聖恵方治虚勞癥瘕結塊不消者桃仁一千二百粒湯浸去皮尖雙仁研旋以水濾取濃汁五升已来荆三稜二兩炮剉鼈甲三兩塗醋炙㣲黄去裙襴右除桃仁外搗羅為末於鐺中先煎桃仁汁耗一半下二味藥末以木箆不住手攪煎良乆又下好酒三味煎如稀餳收磁噐中盛每日空心晩食前以熱酒一中盞調下一茶匙忌莧菜生冷濕麵虛勞浮腫附論夫腎氣不化則二隂不通故小便不利胃氣不足則肌肉開踈故皮膚浮腫脬者土也皮虚既不能制水腎者胃之闗也關閉不利以水氣流溢於皮膚為脬腫也方人参湯治虚勞四肢發腫飲食不進百莭無力多卧少起人参赤茯苓去黒皮桑根白皮炒剉芍藥秦芁去苖土半夏湯浸去滑七遍各一兩鼈甲去裙襴醋炙三兩柴胡土苖大腹皮炮木香各一兩荆三稜醋浸炮搗碎二兩甘草炙剉枳殻去穣麩炒一分右麄搗篩每服三錢水一盞入生薑三片􅀥二枚同煎至五分去滓温服不拘時候郁李仁散出聖恵方治虚勞通體洪滿腹堅脹喘急不能飲食郁李仁湯浸去白皮尖㣲炒川大黄各一兩剉碎㣲炒柴胡土苖澤㵼赤芍藥猪苓各三分去黒皮杏仁湯浸半兩去皮尖雙仁麩炒㣲黄桑根白皮三分剉鼈甲一兩塗醋炙令黄去裙襴赤茯苓半兩桔梗去蘆頭麻黄各三分去根莭右為散每服三錢以水一盞入生薑半分煎至六分去滓不計時候温服五味子湯治虚勞四肢浮腫氣急大小便不利坐卧不安五味子炒黄蓍剉枳殻去穣麩炒大腹㣲煨剉桑根白皮炙剉桂去粗皮㯽榔煨白术陳橘皮各一兩湯浸去白炒厚朴去麄皮生薑汁炙熟防己各一兩半右麄搗篩每服三錢水一盞半煎至七分去滓空心温服日晩再服㣲利即止漢防己散出聖恵方治虚勞四肢浮腫喘息促小便不利坐卧不安漢防己猪苓各三分去黒皮海蛤木通各一兩剉陳橘皮一兩湯浸去白穣焙木香白术各半兩桑根白皮剉赤茯苓各三分紫蘇莖葉㯽榔各一兩右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服前胡丸出聖恵方治虚勞四肢浮腫心胷滿悶不欲飲食前胡一兩去蘆頭旋覆花半兩人参三分去蘆頭㯽榔一兩木香陳橘皮各半兩湯浸去白穣焙訶棃勒皮一兩赤茯苓桑根白皮各三分剉桂心半兩郁李仁一兩湯浸去皮尖㣲炒右為末煉蜜和搗三二百杵丸如梧桐子大毎服煎薑􅀥湯下三十丸日三服大腹皮湯治虛勞身體浮腫上氣喘促小便不利大腹皮剉㯽榔煨剉前胡去蘆頭赤茯苓去黑皮防己陳橘皮湯浸去白焙赤芍藥各一兩甘草半兩炙剉桑根白皮剉木通各二兩剉右麄搗篩每服三錢水一盞煎至五分去滓温服日二桑白皮湯治虚勞脾氣弱水液妄行四肢浮腫小便不利桑根白皮炙剉猪苓去黒皮滑石碎木通剉郁李仁湯浸去皮尖炒赤茯苓去黒皮各一兩半陳橘皮湯浸去白半兩㯽榔㣲煨三枚澤㵼三分右麄搗篩毎服五錢水一盞半煎至一盞去滓温服細辛散治虚勞心胷壅悶喘促四肢浮腫細辛半兩枳殻三分麩炒㣲黄去穣漢防己桂心各半兩黄蓍一兩剉白术赤茯苓赤芍藥各三分當歸半兩右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服木香散出聖恵方治虚勞損臍下痛抽腎入腹四肢浮腫木香五加皮各一兩松莭二兩剉桑根白皮一兩剉薏苡仁三分㯽榔桃仁各一兩湯浸去皮尖雙仁麩炒陳橘皮三分湯浸去白穣㣲炒郁李仁一兩湯浸去皮尖㣲炒右為散毎服三錢以水一中盞煎至六分去滓不計時候稍熱服陳橘皮丸出聖恵方治虚勞心胷壅悶喘促大小便不利四肢浮腫陳橘皮二兩湯浸去白穣焙紫蘇子三分㣲炒漢防己甘遂各半兩煨微黄桑根白皮剉甜葶藶隔紙炒令紫黄赤茯苓木通各一兩剉郁李仁一兩湯浸去皮尖㣲炒右為末煉蜜和搗三二百杵丸如梧桐子大毎服空心及晩食前以薑􅀥湯下二十丸赤茯苓湯治虚勞徧身浮腫心腹氣脹大小便澁赤茯苓去黒皮防己㯽榔煨剉桑根白皮剉甜葶藶隔紙炒令紫色木通剉陳橘皮湯浸去白穣焙郁李仁湯浸去皮炒各一兩右麄搗篩每服三錢水一盞半煎至七分去滓食前温服以大小便利為度人参湯治虛勞却氣臍腹及面目浮腫人参一兩鼈甲醋浸去裙襴炙黄二兩柴胡去苖當歸切焙枳殻去穣麩炒用甘草炙剉各一兩白㯽榔一枚剉桃仁七十枚湯浸去皮尖别研右麄搗篩每服三錢童子小便一盞浸一宿平旦煎至七分去滓空心温服若女人病加牛膝一兩防己丸治虚勞脾腎不足身面浮腫卧即脹滿喘痰嗽胷膈痞悶大小便不利漸成水氣防己一兩半杏仁去皮尖雙仁麩炒三分赤茯苓去黒皮郁李仁湯浸去皮尖麩炒紫蘇葉各一兩苦葶藶炒香三兩一分陳橘皮湯浸去白焙一兩右為末煉蜜和丸如梧桐子大空心食前温酒下三十丸麻仁散出聖恵方治虚勞四肢浮腫大麻仁商陸防風去蘆頭附子炮製去皮臍陳橘皮湯浸去白穣焙漢防己各一兩右為末每服五錢以水一大盞入赤小荳一百粒煎至五分去滓食前温服虛勞目暗附論夫肝候於目而臟於血血為榮養於五臟今臟腑已有勞傷則血氣俱虚五臟既虛則不能榮養於目故令昏暗也方還睛丸出聖恵方治虚勞目暗兎絲子一兩酒浸三日曝乾别搗為末真粉三分細研逺志去心防風去蘆頭蔓荆子車前子各半兩石斛去根剉白茯苓各一兩𤣥参人参去蘆頭木香决明子地膚子蕤仁湯浸去赤皮芎藭羗活羚羊角屑各半兩熟乾地黄一兩枸杞子半兩牛膝一兩去苖薯蕷甘菊花黄蓍剉地骨皮各半兩覆盆子三分兎肝二兩炙㣲黄右為末煉蜜和搗三五百杵丸如梧桐子大每服食前以温酒下三十丸粥飲下亦得忌熱麵葷辛生冷羚羊角丸出聖恵方治虛勞乏弱四肢無力頭目昏暗身體疼痛不欲喫食羚羊角三分鹿茸一兩半塗酥炙山茱茰防風各三分去蘆頭牛膝一兩半去苖肉蓯蓉一兩酒浸一宿刮去皺皮炙乾薯蕷蜜䝉花當歸各三分白茯苓一兩黄蓍剉三分兎絲子一兩酒浸三日曝乾别搗為末人参三分去蘆頭五味子半兩桂心三分細辛地膚子甘菊花决明子青葙子各半兩熟乾地黄附子各一兩炮製去皮臍甘草半兩炙㣲赤剉磁石二兩燒醋淬七徧搗碎細研水飛過車前子三分右為末煉蜜和搗五七百杵丸如梧桐子大每服以温酒下三十丸日服三􅀥湯下亦得忌炙煿熱麵葷辛車前子丸出聖恵方治虚勞氣目昏暗身體少力車前子一兩磁石二兩燒醋淬七徧搗碎細研水飛過石斛一兩去根剉兎絲子二兩浸酒三日曝乾别搗為末熟乾地黄逺志去心澤㵼牛膝各一兩去苖桂心半兩蒺藜子㣲炒去刺白茯苓山茱茰五味子各一兩巴㦸一兩半肉蓯蓉一兩酒浸一宿刮去皺皮炙乾甘草半兩炙㣲赤剉黄蓍人参各一兩去蘆頭右為末煉蜜和搗三五百杵丸如梧桐子大毎服空心及晩食前以鹽酒下三十丸磁石丸出聖恵方治虛勞目暗磁石一兩半燒醋淬七遍搗碎細研水飛過硃砂細研水飛過補骨脂各半兩㣲炒肉蓯蓉酒浸一宿刮去皺皮炙乾神麴各三分炒令㣲黄逺志去心木香覆盆子五味子各半兩乾熟地黄三分巴㦸桂心各半兩牛膝去苖石斛各三分去根莭甘草炙㣲赤剉薯蕷車前子各半兩右為末入研了藥令匀煉蜜和搗三五百杵丸如梧桐子大每服食前煎黄蓍湯下三十丸地膚子丸出聖恵方治虚勞眼痛淚多不明地膚子半兩川大黄一兩剉碎㣲炒栢子仁三分㽔仁半兩去皮决明子三分甜𤓰子青葙子各半兩白蒺藜三分㣲炒去刺茺蔚子半兩藍子三分兎絲子一兩酒浸三日曝乾别搗為末黄連去鬚細辛桂心螢火蟲各分右為末煉蜜和搗三二百杵丸如梧桐子大每空心不計時候以粥飲下二十丸忌生冷猪肉熟麵葷辛兎肝丸出聖恵方治虚勞肝腎風虚眼膜昏暗不能乆視無力兎肝二兩炙㣲黄防風三分去蘆頭𤣥参白茯苓各一兩羚羊角屑三分人参去蘆頭决明子各三分車前子一兩地骨皮三分枳殻半兩麩炒㣲黄去穣黄蓍一兩剉熟乾地黄一兩甘菊花三分麥門冬一兩半去心焙右為末煉蜜和搗丸如梧桐子大每服食前以温粥飲下三十丸肉蓯蓉丸出聖恵方治虚勞目暗逺視無力四肢乏弱肉蓯蓉二兩酒浸一宿刮去皺皮炙乾薯蕷巴㦸車前子黄蓍剉覆盆子各一兩犀角屑半兩兎絲子一兩酒浸三宿曝乾别搗為末山茱茰一兩熟乾地黄二兩人参去蘆頭牛膝去苖續斷各一兩甘菊花一兩右為末煉蜜和搗三二百杵丸如梧桐子大每服食前以粥飲下三十丸忌生冷油膩熱麵羚羊角散出聖恵方治虛勞肝腎風虚頭昏目暗四肢少力羚羊角屑半兩黄蓍一兩柴胡一兩半去苖防風一兩去蘆頭人参三分去蘆頭附子一兩炮製去皮臍澤㵼三分山茱茰覆盆子决明子車前子青葙子各一兩甘草半兩炙㣲赤剉右為末每服四錢以水一中盞煎至六分去滓不計時候温服防風散出聖恵方治虛勞肝氣乏弱四肢不收筋骨疼痛目多昏暗防風去蘆頭山茱茰羚羊角屑各三分枳殻半兩麩炒赤剉黄蓍三分剉白茯苓一兩羗活三分黄芩半兩當歸三分麥門冬一兩半去心焙五味子半兩薏苡仁半兩右為散每服三錢以水一中盞煎至六分去滓温服日三四服黄蓍散出聖恵方治虚勞益肝明目牛膝一兩去苖附子一兩炮製去皮臍牡蠣粉三分澤㵼一兩乾薑三分炮製剉兎絲子二兩酒浸三日曝乾别搗為末右為末煉蜜和搗三五百杵丸如梧桐子大每服空心及晩食前以温酒下三十丸白羊肉湯治虚勞羸瘦脚膝無力耳聾盗汗心多怯悸白羊肉二斤去脂膜以水四升煮取二升杜仲一兩去麄皮炙㣲黄剉白茯苓一兩熟乾地黄一兩剉牛膝去苖人参去蘆頭黄蓍剉白术各一兩桂心三分磁石三兩搗碎水淘去赤汁龍骨一兩逺志一兩去心右為散每服四錢用羊肉汁一中盞煎至六分去滓食前温服之地黄湯治虛勞耳聾及虚鳴熟地黄一兩磁石二兩搗碎水淘去赤汁防風三分去蘆頭羗活三分黄蓍一兩剉白芍藥木通剉桂心各三分人参一兩去蘆頭右為末毎服用羊腎一對切去脂膜以水一大盞半煎至一盞去腎入藥末半兩煎至六分去滓空心及晩食前分煖為二服菖蒲浸酒方治虛勞耳聾菖蒲三分木通二兩剉磁石五兩搗碎水淘去赤汁防風去蘆頭桂心各三兩牛膝三兩去苖右為細剉用生絹袋盛以酒一匙内藥浸七日後毎日食前煖一小盞服之普濟方卷二百三十四
