body:
  text: 普濟方卷二百三十四明周王朱橚撰虛勞門虛勞心腹痞滿附論夫虛勞之人氣弱血虚榮衛不足復為寒邪所乗食飲入胃不能傳化停積於内故中氣痞塞胃脹不通使人心腹痞滿也方参苓煮散治虚勞心腹痞滿不思飲食胸膈不利人参白茯苓去黒皮丁香木香桂去麄皮益智去皮青橘皮湯浸去白焙芎藭蓬莪茂剉乾薑炮附子炮製去皮臍各半兩逺志去心白术厚朴去麄皮臍各半兩黄蓍剉炒半夏湯浸二遍用生薑汁製當歸切焙荆三稜炮剉陳麯炒麥蘖炒各一兩肉荳蔲去殻檳榔剉訶棃勒煨去核各五枚右為散毎服三錢入鹽少許水一盞煎至七分去滓温服乾地黄丸出千金方治虛血勞胸腹煩滿疼痛瘀血徃来臓虚不受穀氣逆不得食補中理虚乾地黄三兩當歸乾薑麥門冬甘草黄芩各二兩厚朴枳實防風大黄細辛白术各一兩茯苓五兩前胡六分人参蝱蟲䗪蟲各五十枚乾漆一兩右為末蜜和丸如梧桐子大先服十丸日三稍加訶棃勒湯出聖恵方治虚心勞腹痞滿脇肋妨悶不思飲食訶黎勒煨去核赤茯苓去黒皮陳橘皮湯浸去白焙前胡去蘆頭各一兩白术紫蘇葉黄蓍剉人参檳榔剉草荳蔲去皮各三分桔梗炒木香甘草炙剉桂去麄皮各半兩右為散每服三錢水一盞入生薑一分切碎煎至七分去滓温服木香煮散治虚勞冷氣心腹痞悶腸鳴腹痛飲食减少木香白术縮砂去皮益智去皮藿香用葉人参各一兩丁香半兩陳橘皮湯浸去白焙青橘皮湯浸去白焙各四兩桔梗炒三兩桂去麄皮厚朴去麄皮生薑汁炙各二兩髙良薑一分甘草炙剉半兩右為散每服三錢水一盞入生薑三片棗二枚擘破煎至七分和滓稍熱服如不及煎入鹽少許加湯㸃服木香散出聖恵方治虚勞冷氣不和氣攻心腹痞滿不思飲食木香半兩訶黎勒一兩煨用皮人参去蘆頭桂心白术荆三稜炮剉芎藭檳榔赤茯苓桔梗去蘆頭枳實各三分麩炒㣲黄陳橘皮湯浸去白瓤焙一兩吳茱茰湯浸七遍焙乾微炒甘草各一分炙㣲赤剉右為散每服三錢水一中盞煎至六分去滓不計時候温服人参煮散治虚勞心胸痞悶腹脇虚脹補虚進飲食人参去麄皮陳橘皮湯浸去白焙鼈甲去裙襴醋炙各一兩附子炮製去皮臍縮砂蜜去皮桂去麄皮乾薑炮柴胡去苖桔梗畧炒當歸各三分切焙五味子甘草剉炒各半兩右為散每服三錢水一盞入生薑二片鹽少許同煎至七分去滓温服每日空心午前日晩各一茵蔯煎丸治虚勞下焦虛冷心腹痞滿喫食無味舌澁口乾四肢少力徤脾胃茵蔯蒿三兩搗為末用醋一升煎為膏鼈甲去裙襴醋浸炙令黄色荆三稜煨杵碎各一兩附子炮製去皮臍枳殻去穣麩炒桂去麄皮青橘皮湯浸去白焙各半兩柴胡去苗一兩白术半兩厚朴去麄皮生薑汁塗炙吳茱茰水浸一宿焙乾炒各一兩乾薑炮製半兩右除茵蔯外搗羅為末用茵蔯煎和為丸如梧桐子大每日空心生薑湯下三十丸如和不成更入熱蜜半夏散治虛勞心腹痞滿胸膈壅悶不思飲食半夏湯洗七遍去滑鼈甲塗醋炙令黄去裙襴白术人参去蘆頭黄蓍剉赤茯苓各一兩桔梗去蘆頭甘草㣲炒剉木香各半兩桂心前胡去蘆頭陳橘皮各一兩湯浸去白瓤焙右為散毎服三錢以水一中盞入薑半分􅀥三枚煎至六分去滓不計時候稍熱服忌生冷油膩莧菜厚朴丸出聖恵方治虛勞冷氣心腹痞滿四肢少力不欲飲食厚朴去麄皮塗生薑汁炙令香熟一兩木香半兩桂心附子各三分炮製去皮臍人参半兩去蘆頭黄蓍三分陳橘皮湯浸去白瓤焙訶棃勒煨用皮白术草荳蔲各一兩去皮乾薑炮製剉當歸右為末煉蜜搗和二三百杵丸如梧桐子大每食前生薑湯下三十丸白术丸出聖恵方治虛勞冷氣心腹痞滿不思飲食四肢少力疼痛白术人参當歸各三分去蘆頭桂心附子各一兩炮製去皮臍木香三分桔梗去蘆頭陳橘皮湯浸去白穣焙訶棃勒煨用皮石斛去根剉黄蓍各一兩剉吳茱茰半兩湯浸七遍焙乾㣲炒右為末煉蜜和搗二三百杵丸如梧桐子大每服食前以温酒下三十丸草荳䓻丸出聖恵方治虛勞心腹痞滿脇下妨悶不思飲食草荳蔲一兩去皮木香半兩當歸三分前胡去蘆頭人参去蘆頭檳榔白术訶棃勒各一兩煨皮焙赤茯苓桂心陳橘皮湯浸去白穣焙右為末煉蜜和搗三二百杵丸如梧桐子大每服食前以生薑湯下三十丸桔梗散出聖恵方治虚勞心腹痞滿不思飲食胸膈不利桔梗去蘆頭陳橘皮湯浸去白穣焙人参去蘆頭赤茯苓厚朴去麄皮塗生姜汁炙令香熟木香前胡各一兩去蘆頭杏仁湯浸去皮尖雙仁麩炒㣲黄甘草各半兩炙㣲赤剉右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服木香散出聖恵方治虚勞心腹痞滿氣攻兩脇滿痛不思飲食木香㯽榔桂心各半兩青橘皮湯浸去白穣焙當歸白术各三分訶棃勒煨用皮柴胡去苖鼈甲各一兩塗醋炙令㣲黄去裙襴右為散毎服三錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服忌生冷油膩莧菜等訶梨勒丸出聖恵方治虚勞心腹痞滿脇不時痛不思飲食訶棃勒煨用皮厚朴去麄皮塗生薑汁炙令香熟㯽榔白术人参桂心各一兩乾薑炮製剉吳茱茰各半兩湯浸七遍焙乾㣲炒當歸三分右為末煉蜜和搗三二百杵丸如梧桐子大毎於食前以生薑湯下三十丸蓽澄茄丸治虚勞冷氣上衝心腹痞滿腹鳴相逐或多刺痛嘔噦膨脹蓽澄茄沉香丁香木香蘹香子舶上者炒各半兩烏藥剉一兩白芷葫蘆巴炒三分右為末煉蜜為丸彈子大毎服一丸生薑湯嚼下前胡丸治虚勞胸膈痞悶氣逆煩滿脇肋虚脹前胡去蘆頭人参白茯苓去黒皮陳橘皮湯浸去白穣桂去麄皮白术各一兩半杏仁去皮尖雙仁入麩炒研㯽榔剉各二兩右為末煉蜜丸如梧桐子大每服二十丸温酒下日二黄蓍建中湯一名黄蓍湯療虚勞腹滿食少小便多方見本門虚勞裏急類建中丸治虚勞脾胃冷弱心腹痞滿不思飲食四肢怠墮補虚調胃人参白术厚朴去麄皮薑汁炙乾薑炮陳橘皮湯浸去白焙枳殻去穣麩炒各半兩訶棃勒三枚炮取皮右為末以煮棗肉和丸如梧桐子大每服二十丸薑橘皮湯下不拘時候柴胡飲一名苖竒湯治虚心腹痞滿不思飲食方見本門虚勞羸瘦類柴胡湯治虚勞氣逆心腹痞滿四肢羸瘦腹脹不下食柴胡去苖三兩枳殻去穣麩炒二兩白茯苓去黒皮二兩白术二兩人参一兩麥門冬去心焙一兩右麄搗篩每服三錢水一盞入生薑半分拍碎煎至七分去滓空腹温服日午夜卧各一白术散出聖恵方治虚勞冷氣心腹痞滿不思飲食四肢少力白术訶棃勒煨用皮陳橘皮湯浸去白穣焙草荳蔲各一兩去皮人参去蘆頭桂心各三兩右為散每服四錢以水一盞入生薑半分􅀥三枚煎至六分去滓不拘時稍熱服虛勞積聚附論夫氣之所積名曰積其本在臓隂所生也氣之所聚名曰聚其夲在腑陽之所生也臓病無止而不移腑病無所留結是為積聚虛勞之人隂陽傷損血氣澁滯不能宣通各随其腑臓之氣而留結故成積聚之病也方大鼈甲丸治虚勞積聚心腹脹滿喘促氣逆面色萎黄痰嗽心怯不思飲食鼈甲一枚重二兩去裙襴醋炙柴胡去苖大黄濕紙裹煨熟乾地黄焙烏梅去核炒桃仁湯浸去皮尖雙仁炒各一兩乾薑炮㯽榔剉木香人参白茯苓去黑皮芎藭桂去麄皮紫苑去苖土芍藥牛􅂰酒浸切焙知母焙荆三稜炮剉五味子白术黄連去麄皮薑汁炙厚朴黄芩去黒心陳橘皮湯浸去白焙枳殻去穣麩炒當歸切焙各半兩右為末煉蜜和丸如梧桐子大每服二十丸三十丸温酒下日三補真丸治冷勞心腹積聚羸痩盗汗不思飲食腹脹下痢四肢無力厚朴炮製去皮薑汁炙蒼术去皮米泔浸切焙各四兩陳橘皮湯浸去白焙石斛去根附子炮製去皮臍柴胡去苖人参白茯苓去黒皮沉香各二兩丁香鼈甲去裙襴醋炙肉蓯蓉酒浸去皴皮切焙木香巴㦸天去心當歸切焙草豆蔲去皮桂去麄皮訶棃勒炮去核五味子㯽榔剉山茱茰杜仲去麄皮炙剉黄蓍剉三兩補骨脂炒各一兩吳茱茰半兩湯浸洗三遍焙乾炒右為末煮棗肉和丸如梧桐子大每服二十丸米飲下日三烏頭丸治虚勞心腹積聚及百病邪氣徃来搶心羸瘦不能食破積聚並冝服之烏頭炮製去皮臍一兩前胡去蘆頭黄芩去黒皮蜀椒去目并閉口者炒出汗白頭翁水洗五遍焙甘草炙剉龍骨研半夏湯浸去骨焙黄連去鬚吳茱茰水洗五遍焙白术細辛去苖葉紫苑去苖土桔梗乾薑炮萎蕤芎藭厚朴去麄皮薑汁炙礬石燒令汁盡人参桂去麄皮生薑切焙各半兩右為末煉蜜和丸如梧桐子大毎服二十丸空心温酒下日午臨卧再服靈感丸治虚勞積聚腹脇堅滿男子婦人一切風勞冷氣頭旋眼疼手脚􅍙痺血風勞氣攻擊五臓四肢筋脉掉動面上習習似蟲行徧生瘡癬心膈煩悶腹疼虚鳴腰痛􅂰冷手足或熱諸氣刺痛嘔逆醋心胃閟澁肺氣發動耳復虚鳴脚􅂰無力仍治婦人諸病冷血勞氣髪損靣黄氣刺心腹骨節痠疼經年不調經年逾月或下過多不定兼治冷熱諸痢脚氣水腫等柴胡去苖防風去叉紫苑去苖土當歸切焙赤茯苓去黒皮乾薑炮製桔梗炒菖蒲烏頭炮裂去皮臍厚朴去麄皮塗生薑汁炙大黄吳茱茰湯浸焙乾皂莢去皮子酥炙蜀椒去目并閉口炒出汗陳橘皮去白炒郁李仁别研黄連去鬚炒巴豆各半兩去油研人参半兩右為末煉蜜和丸如梧桐子大每服空心酒飲任下五丸取㣲利為度如風冷氣人長服此藥最佳又宜夜服天通丸治虚勞心腹積聚脇下刺痛肌體羸痩不欲飲食及八風十二痺氣血不榮乆服身體潤澤熟乾地黄焙半兩天門冬去心焙白术剉乾薑炮當歸切焙石斛去根甘草炙剉肉蓯蓉酒浸去皴皮切焙芍藥人参大黄炙剉紫苑洗各一兩半白茯苓防風去乂麻仁生研各三分白芷半兩蜀椒去月及閉口炒出汗一兩杏仁三分湯浸去皮尖雙仁炒右為末煉蜜煮棗肉和丸如梧桐子大每服二十丸米飲下日三狼毒丸治虛勞積聚腹中堅硬氣脹喘急狼毒二兩半醋浸尖肉桂二兩去皺皮川烏頭半兩去皮臍醋拌炒荆三稜一兩炮剉紫苑三分洗去苖土附子一兩炮製去皮臍川大黄二兩半剉碎㣲炒鼈甲二兩塗醋炙㣲黄去裙襴甜葶藶三分隔紙炒令紫色㯽榔二兩鮀甲炙桃仁二兩湯浸去皮尖双仁麩炒㣲黄木香各一兩芫花半兩醋拌炒令乾吳茱茰湯浸七遍焙乾㣲炒該一兩皂莢三分湯浸去皮塗酥炙黄焦去子右為末煉蜜和搗三五百杵丸如梧桐子大每服空心温酒下十丸忌莧菜濕麵生冷鼈甲散治虛勞積聚或心腹疼痛四肢羸瘦小便赤不能飲食鼈甲二兩酥醋炙㣲黄去裙襴厚朴一兩去麄皮塗生薑汁炙令香熟木香㯽榔各三分神麴二兩搗碎㣲炒荆三稜一兩炮剉川大黄二兩剉碎㣲炒芎藭桃仁湯浸去皮尖雙仁麩炒㣲黄青橘皮各三分湯浸去白穣焙桂心當歸半兩麥蘖各一兩炒㣲黄赤芍藥一兩柴胡一兩半去苖右為散毎服四錢以水一中盞入生薑半分煎至六分去滓食前稍熱服忌莧菜生冷橘皮丸治脾腎虚勞心腹積聚面色萎黄不思飲食胷膈悶滿青橘皮二兩麩炒黄搗羅為末醋一盞半於銀石器内文武火熬成膏木香桂去麄皮用人参訶棃勒皮炒荆三稜炒剉藿香去莖厚朴去麄皮薑汁炙當歸切焙萆􅐺乾薑炮各半兩半夏一分湯洗十遍焙右搗羅十一味為末入橘皮煎内搗三二百杵丸如梧桐子大每服二十丸空心日午温米飲下青金煮散治虛勞積聚不消心腹煩悶脾胃氣滯不思飲食青橘皮湯浸去白焙白术木香薑黄㯽榔剉郁李仁湯浸去皮炒楝實剉炒蘹香子人参益智去皮炒赤茯苓去黒皮白牽牛㣲炒各兩半右為散每服二錢水一盞入生薑二片鹽一匙煎至七分去滓稍熱空心服防葵丸出聖恵方治虚勞積聚脇下妨滿腹脹不能食及腹中痛防葵柴胡各一兩去苖木香三兩桂心半兩桃仁湯浸去皮尖雙仁麩炒㣲黄鼈甲酥醋炙㣲黄去裙襴川大黄各一兩剉碎㣲炒當歸半兩荆三稜一兩炮剉㯽榔赤芍藥半兩郁李仁各一兩湯浸去皮尖㣲炒右為末煉蜜和搗五百杵丸如梧桐子大每服食前温酒下二十丸忌莧菜生冷濕麵三稜丸出聖恵方治虚勞積聚痞結腹脇脹滿荆三稜三兩炮剉川大黄二兩剉碎㣲炒赤芍藥桂心乾薑各一兩炮裂剉鼈甲塗醋炙㣲黄去裙襴訶棃勒炮用皮㯽榔各二兩川烏頭炮製去皮臍吳茱茰各一兩湯浸七遍焙乾㣲炒桃仁四兩湯浸去尖雙仁麩炒㣲黄右為末熬醋如膠和搗三二百杵丸如梧桐子大每服食前以温酒下二十丸漸加至三十丸下爛肉黑膿為度赤茯苓散出聖恵方治虛勞積聚心腹壅悶喘息氣促不能飲食四肢瘦弱赤茯苓一兩紫苑三分洗去苖土白术半兩當歸半兩吳茱茰一分湯洗七遍焙乾炒郁李仁三分湯浸去皮尖㣲炒人参半兩去蘆頭鼈甲二分塗醋炙㣲黄去裙襴桂心㯽榔各半兩右為散毎服三錢以水一中盞入生薑半分煎至五分去滓食前温服忌莧菜濕麵生冷韮子丸治虚勞積聚滿悶疼痛及一切風勞冷氣積年不瘥攻擊四肢徧體痠痛面無顔色或即浮腫􅂰虛腫行歩無力大腸閉澁常結糞膝冷腰疼喫食無味兼治婦人虚冷血氣年深不愈氣攻四肢心膈刺痛經脉不調面如蠟色手足虚腫等韮子二兩以醋湯煮後炒令如油麻者牛􅂰酒浸切焙當歸切焙桂去麄皮人参乾薑炮製芎藭大黄各半兩巴豆九十粒去皮心麩炒别研出油黄蓍一兩鍾乳粉一兩半白茯苓一兩雲母粉一兩半逺志一兩去心細辛右為散鍾乳粉等更都研令匀毎服以温酒調下二錢日服三二磁石木香丸出聖恵方治虛勞目暗或見黑花磁石三兩燒令通赤以醋淬七遍搗碎研水飛過木香一兩乾薑三兩用漿水一斗鹽花一合與附子一處以慢火煮水盡為度片切焙乾漢椒三兩醋浸一宿取出用炭火半稱燒地令通赤將椒薄攤於地上以盆子盖却一宿取出附子三兩炮製去皮臍右為散入磁石都研令匀用羊腎二對切去脂膜入砂盆内細研用酒二升同熬成膏入藥味和為丸如梧桐子大每日空心及晩食前以鹽湯下三十丸神麴丸治虚勞目暗昏悶冝服治元臓風虚明目百嵗可讀細書一名磁石丸神麴末四兩炒㣲黄磁石二兩燒通赤以醋淬七遍搗碎研水飛過硃砂一兩細研水飛過右為末煉蜜和搗三五百杵丸如梧桐子大毎服於食前以粥飲下三十丸忌羊血補肝散治虛勞目暗地膚子一斗隂乾搗末生地黄十斤右搗取地黄汁和半地膚末乾却搗羅為散每服以温水調下二錢日三服一方用酒服又方用三月採蔓菁花隂乾為末每服空心以井花水調下二錢乆服長生眀目可夜讀細書又方用蔓菁子一升以水九升煮令汁盡取出曝乾如此三度後羅為末每服以温水調下二錢日二三服千金翼方百日身熱瘡出不乆自差虚勞耳聾夫腎候於耳勞傷則腎氣虚風邪入於腎經則令人耳聾而鳴若膀胱有停水浸漬於腎則耳聾而滿也方磁石丸治虚勞腎臓之弱耳聾或常聞鐘磬風雨之聲宜服補腎虚磁石二兩燒令赤以醋淬七遍搗碎研水飛過鹿茸一兩半去毛塗酥炙㣲黄人参去蘆頭黄蓍剉白茯苓各一兩逺志去心附子炮製去皮臍牡蠣各三分燒為粉牛􅂰一兩去苖防風三分去蘆頭楮實子一兩半水淘去浮者焙乾五味子半兩薯蕷巴㦸各三分石斛一兩去根剉桂心三分熟乾地黄一兩肉蓯蓉三分酒浸一宿刮去皺皮炙乾右為末煉蜜和搗三五百杵丸如梧桐子大毎服空心晩食前以温酒下三十丸補腎湯治虚勞腎臓乏損耳聾體痩脚􅂰少力痛疼磁石二兩搗碎水淘去赤汁牛􅂰去苖桂心各一兩黄蓍一兩半剉人参去蘆頭白茯苓獨活芎藭當歸白芍藥白术各一兩白蒺藜一兩㣲炒去刺附子一兩炮裂去皮臍澤㵼一兩漢椒一兩去目及閉口者炒出汗右為末每服用羊腎一對切去脂膜以水一大盞半煎羊腎至一盞去腎下藥末半兩更煎至六分去滓空心及晩食前分暖為二服肉蓯蓉丸治虛勞腎氣不足耳聾肉蓯蓉一兩酒浸一宿刮去皺皮炙乾黄蓍一兩剉熟地黄巴㦸各一兩枳殻三分麩炒㣲黄去瓤白蘝五味子白术各三分右將八味為末入巴豆旋旋調和令匀次下熟蜜和杵數千下丸如梧桐子大每服空心以温酒下二十丸至三十丸取溏利為度桃仁散出聖恵方治虛勞積聚結塊心腹脇肋刺痛桃仁湯浸去皮尖雙仁麩炒㣲黄川大黄各二兩剉碎㣲炒鼈甲一兩塗醋炙㣲黄去裙襴當歸一兩吳茱茰半兩湯浸七遍焙乾炒㣲黄訶棃勒一兩半煨用皮荆三稜一兩炮製木香桂心各半兩右為散每服四錢以水一盞煎至六分去滓食前稍熱服忌莧菜生冷鼈甲丸出聖恵方治虚勞積聚羸瘦不任鼈甲塗醋炙㣲黄去裙襴肉桂去皺皮川大黄剉碎㣲炒訶黎勒各二兩煨用皮牽牛子㣲炒荆三稜炮剉桃仁各一兩湯浸去皮尖雙仁麩炒㣲黄吳茱茰半兩湯洗七遍焙乾㣲炒白术一兩右為末煉蜜和搗三二百杵丸如梧桐子大每服空心以温酒下三十丸加至四十丸忌莧菜生冷濕麵黄蓍湯治虚勞胸中客熱冷癖痞滿宿食不消吐噫脇間水氣或流飲腸鳴不生肌肉頭痛上重下輕目視恍恍惚惚志損常躁熱卧不得安少腹急小便赤餘瀝臨事不起隂下濕或小便白濁傷多黄蓍三兩人参一兩芍藥二兩生薑半斤肉桂三兩大􅀥十四枚當歸甘草各一兩炙右切以水一斗煮取四升分四服有寒加厚朴二兩忌生葱海藻菘菜白术散出聖恵方治虛勞積聚堅實腹如皷食即却吐卧不安喘急白术半兩防葵一兩㯽榔郁李仁湯浸去皮㣲炒鼈