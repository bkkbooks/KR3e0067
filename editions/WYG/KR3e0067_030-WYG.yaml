骨脂炒各一兩右為末煉蜜和丸如梧桐子大每服三十丸空心温酒或鹽湯下腎著附論夫腎著之病形如水狀其人不渴小便自利飲食如故惟身體及腹重如帶數千錢腰以下冷如坐水中盖腎經虗弱外受風冷内有水濕風水相搏内著於腎故成此病或有作勞汗出衣裏冷温久久得之者以濕氣著而不去故名腎著也杜仲酒出千金方治腎著腰中疼痺沉重兼治五種腰疼杜仲去麄皮鹽水炙乾薑炮熟乾地黄焙萆薢羌活去蘆頭天雄炮裂去皮臍桂去麄皮蜀椒去目并閉口者炒出汗芎藭秦芁去苖土烏頭炮裂去皮臍細辛去苖葉各三兩五加皮石斛去根各五兩續斷栝樓根地骨皮去土桔梗炒甘草炙防風去皮各一兩右㕮咀用酒二斗浸四宿每服一盞不拘時飲常令酒力相續為效腎著散聖濟緫録治腰背疼重小腹拘急小便利耳聾脚冷羊腎一對作脯令燥炙之磁石醋淬一兩半人參二兩桑根白皮炙剉防風去义天雄炮裂去皮臍𤣥參赤茯苓去黒皮各三兩續斷一兩三分熟乾地黄焙一兩阿膠炒燥林臺作白膏肉蓯蓉酒浸切焙乾漆炒煙出龍骨天門冬去心焙各半兩右為散每服三錢煎大麥湯調下食前服麻黄湯出聖濟緫録治腎著腰冷腹重痛脚膝無力麻黄去根節附子炮裂去皮臍木香芎藭羌活去蘆頭當歸剉未炒㯽榔剉防風去义牛膝去苖酒浸焙炒天麻剉人參赤茯苓去黑皮各一兩右㕮咀每服三錢水一盞生薑三片􅀥二枚擘同煎至七分去滓温服腎著散出千金方治證與後腎著湯同杜仲桂心各三兩甘草澤瀉牛膝乾薑各二兩白术茯苓各四兩右治下篩為粗末散一服三方寸七酒一升煮五六沸去滓頓服日再七勝丸出聖濟緫録治腎著腰冷痺腹急痛脚膝疼不可行脚氣等疾威靈仙去土當歸酒浸切焙附子炮裂去皮臍天麻各一升桂去麄皮牛膝去苖酒浸焙乾薑炮各半斤右為細末酒煮麺糊丸如梧桐子大毎服二十丸温酒下日二夜一丹參丸出聖濟緫録治腎著腹重痛腰冷痺丹參洗杜仲去麄皮切炒牛膝去苖酒浸切焙續斷各三兩桂去麄皮乾薑炮各二兩右為細末煉蜜丸如梧桐子大每服三十丸温酒下無時桑寄生散出千金方治腎著桑寄生洗切牡丹皮洗切鹿茸去毛酥炙桂去麄皮各一兩右為細散每服二錢七温酒調下腎著湯出千金方腎著之為病其人身體重腰冷如水洗狀不渴小便自利飲食如故是其證也從作勞汗出衣裏冷濕久久得之腰以下冷痛腰重如帶五千錢一名甘草湯甘草二兩乾薑三兩茯苓白术各四兩右㕮咀以水五升煮取三分分三服腰中即温又治體虗甚效治内外腎釣痛出本草用呉茱茰同鹽研窨之神驗乾則浸窨腎臓積冷氣攻心腹疼痛附論夫腎臓積冷氣攻心腹痛者腎虗寒冷之氣又積於内陽氣不足其經厥逆上干心絡與正氣交擊故令心腹痛也方鹿茸丸出王氏博濟方治腎臓虗積冷氣攻心腹疼痛及膀胱氣痛鹿茸酒浸炙去毛肉蓯蓉酒浸切焙各二兩人參補骨脂炒石斛去根木香白术炒厚朴去麄皮生姜汁炙牛膝去苖切酒浸焙續斷蘹香子炒當歸切焙芎藭附子炮裂去皮臍熟乾地黄焙桂去麄皮蓽澄茄澤瀉㯽榔剉陳橘皮去白焙桃仁去皮尖雙仁炒巴㦸天去心五味子各一兩赤石脂研龍骨研蜀椒去目及合口者炒出汗各半兩右為末煉蜜丸如梧桐子大每服二十丸加至三十丸温酒或鹽湯下蛜􅖉丸出聖惠方治腎臓積冷氣攻心腹疼痛四肢逆冷面色青黄或時嘔吐不思飲食蛜􅖉木香當歸剉㣲炒附子炮裂去皮臍硼砂蘹香子各三分肉桂去皺皮硃砂細研陽起石酒煮半日細研水飛過阿魏麺裹煨麺熟為度自然銅細研㯽榔乾薑炮裂剉磁石燒醋淬七遍搗碎細研水飛過桃仁湯浸去皮尖雙仁麺炒㣲黄各半兩硫黄一兩半水銀一兩右為末將硫黄水銀同結為砂子細研入諸藥末和匀醋煮麺糊和搗三二百杵丸如菉豆大每服不計時候以熱酒下二十丸硼砂丸出聖惠方治腎臓積冷下焦久虗邪冷氣攻心腹疼痛汗出口乾隂縮聲散手足逆冷硼砂一兩細研乾蠍㣲炒蘹香子自然銅細研肉荳䓻去殻磁石燒醋淬七遍搗碎水飛過各三分阿魏研桃仁湯浸去皮尖雙仁麸炒㣲黄青橘皮湯浸去白穣㣲炒木香白附子炮裂安息香川烏頭炮裂去皮臍附子炮裂去皮臍各半兩右為末入研了藥令匀以醋煮麺糊和丸如梧桐子大每服不計時候以生薑酒下十丸至十五丸牛膝丸出聖濟緫録治腎臓虗冷氣攻心腹疼痛及腰膝冷痺眼花耳鳴四肢沉重食减色昏牛膝去苖切酒浸焙附子炮裂去皮臍補骨脂炒桂去麄皮萆薢當歸切焙山茱茰芎藭石斛去根續斷細辛去苖葉木香炮各半兩右為末煉蜜為丸如梧桐子大空心温酒下三十丸沉香阿魏丸出聖濟緫録治腎臓風虗勞氣奔衝悶亂沉香剉阿魏研桃仁湯浸去皮尖雙仁炒研㯽榔剉蓬莪术炮剉各半兩青橘皮去白米醋浸吳茱茰醋炒青木香蘹香子炒各一分硼砂三兩細研湯泡紙濾取清入銀石器内煎成霜研入藥右為末煉蜜為丸如梧桐子大每服二十丸炒生薑鹽湯下白荳蔲散出聖惠方治腎臓積冷氣攻心腹疼痛兩脇脹滿不飲食白荳蔲去皮蘹香子㯽榔木香附子炮裂去皮臍青橘皮湯浸去白穣焙硫黄細研各半兩乾薑炮裂剉呉茱茰湯浸七遍焙乾㣲炒各一分右為散不計時候以熱酒調下一錢硫黄丸出聖惠方治腎臓積冷氣攻心腹疼痛面色青黄四肢逆冷硫黄細研飛過㯽榔木香附子炮裂去皮臍桂心葫蘆巴呉茱茰湯浸七遍焙乾炒令熟各一兩乾薑炮裂剉半兩蘹香子二兩右為末用醋煮軟飯和搗百餘杵丸如梧桐子大每服不計時候以熱酒下二十丸沉香飲出聖濟緫録治腎臓積冷氣攻心腹痛四肢逆冷不思飲食或吐冷沬面青不樂沉香芍藥洗焙㯽榔剉青橘皮浸去白切焙附子炮裂去皮臍蘹香子炒各一兩桂去麄皮呉茱茰湯洗焙乾炒各半兩右㕮咀每服三錢水一盞煎至七分去滓不拘時温服葫蘆巴丸出聖濟緫録治腎臓虗積冷氣攻心腹疼痛冷汗出四肢少力面色黧黑葫蘆巴炒山芋澤瀉各一兩呉茱茰湯洗焙乾乾薑炮當歸切焙牡蠣粉附子炮裂去皮臍各半兩右為末酒煮麺糊和丸如梧桐子大每服三十丸空心食前温酒下附子煎出聖濟緫録治脾腎虗冷臍腹冷痛大便時泄腹脹羸痩附子炮裂去皮臍訶梨勒皮甘草剉牛膝切各一兩硫黄舶上者碎蘹香子炒乾薑各半兩右先將硫黄甘草内絹袋扎頭次將諸藥麄搗銀石器内以水一斗慢火同煎不得入生水頻㸔候煎至一大碗汁取出濾去滓分作四盞每日空心一盞温米飲調下即用飯壓之如欲丸甘草不用搗諸藥為末煉蜜丸如梧桐子大生薑鹽湯下十丸至十五丸亦得木香煎出聖惠方治腎臓積冷氣攻心腹疼痛發歇不定木香桂心青橘皮湯浸去白穣炒附子炮裂去皮臍桃仁湯浸去皮尖雙仁麸炒㣲黄各一兩乾蠍㣲炒阿魏麺裹煨麺熟為度各半兩右搗細羅為散用童子小便二大盞煎藥成膏收於不瀋器中每服不計時候以熱生薑酒調下一茶匙阿魏丸出聖恵方治腎臟積冷氣攻心腹疼痛不可忍阿魏麺裹煨麺熟為度硼砂自然銅細研各一分桃仁湯浸去皮尖雙仁麸炒㣲黄木香乾蠍㣲炒白礬燒灰各半兩右為末用醋煮麺糊和丸如菉荳大每服以生薑熱酒下二十丸不計時候服硼砂丸出聖濟緫録治腎臓積冷氣攻心腹疼痛不止硼砂研木香各半兩楝實剉蓬莪术炮烏頭炮裂去皮臍各一兩桃仁三十枚湯浸去皮尖雙仁研膏右搗羅五味為末入桃仁同研令匀酒煮麺糊和丸如菉豆大每服三十丸生薑鹽湯下温酒亦得附子丸出聖濟緫録治腎臓虗冷心腹疼痛小便滑數耳鳴目暗附子炮裂去皮臍二兩巴㦸天去心龍骨研蘹香子炒各一兩乾薑炮三分木香半兩右為末酒煮麺糊丸如梧桐子大每服二十丸鹽湯或温酒任下空心食前服補骨脂丸出聖濟緫録治腎臟虗冷氣攻心腹疼痛臍下㽲刺腰膝沉重行歩無力不思飲食補骨脂炒二兩葫蘆巴炒青橘皮去白炒蘹香子炒各一兩沉香半兩㯽榔剉三分右為末煉蜜為丸如梧桐子大每服二十丸温酒或鹽湯下空心食前服巴㦸丸聖濟緫録治腎臓久虗心腹冷痛飲食無味腰膝痠疼煩憊少力時多夢洩耳内虗鳴巴㦸天去心補骨脂炒蘹香子舶上者炒木香各半兩桂去麄皮附子炮裂去皮臍鹽炒各一兩右為末用酒煮麺糊為丸如梧桐子大每服二十丸空心食前温酒或鹽湯任下沉香飲聖恵方治腎臟虗冷氣攻心腹疼痛腰背急强少思飲食身熱足冷沉香葫蘆巴剉炒棟實去核炒蘹香子炒木香附子炮裂去皮臍切各半兩右㕮咀每服三錢水一盞酒三分同煎七分去滓空腹温服沉香散治腎臓虗積冷氣攻心腹疼痛四肢逆冷不思飲食沉香㯽榔青橘皮湯浸去穣焙各一兩蘹香子炒吳茱茰湯浸七遍焙乾㣲炒各半兩附子一兩半炮裂去皮臍右為散每服不計時候以熱酒調下一錢硼砂散聖惠方治腎臟積冷氣攻心腹疼痛喘促悶亂欲絶或出冷汗硼砂木香青橘皮湯浸去白穣焙桂心蓽澄茄各一兩蘹香子二兩右為散每服以生薑汁少許熱酒一中盞攪和令匀調下一錢不計時候服木香散聖惠方治腎臟積冷氣攻心腹疼痛或吐冷沬不思飲食木香丁香乳香蘹香子硫黄細研入各半兩桂心三分右搗細為散入研了藥令匀每服以炒生薑熱酒調下一錢不計時候服之雄黄丸聖恵方治腎臟積冷氣攻心腹疼痛氣欲絶雄黄硃砂各一分黄丹半兩麝香一錢巴豆十粒去皮心研紙裹壓去油右藥同研如粉用軟飯和丸如菉豆大每服不計時候以熱酒下五丸硫黄丸聖恵方治腎臓虗冷氣攻心腹㽲痛狀如錐刀所刺宜服此方硫黄一兩細研水飛過硃砂細研水飛過木香續香子各一分硼砂半兩右搗羅為末都研令匀用軟粟飯和丸如梧桐子大每服不計時候以熱酒下二十丸天雄丸出聖濟緫録治腎臓虗積冷氣攻腹疼痛少力行歩艱難不思飲食天雄炮裂去皮臍二兩蘹香子炒山芋蜀椒去目及合口者炒出汗各一兩右為末用羊腎一對切去皮膜細研酒麺同煮成膏候冷拌前藥為丸如梧桐子大每服二十丸至三十丸温酒鹽湯任下空心食前服麝香丸治腎臓積冷氣攻心腹疼痛頻發不止麝香細研阿魏麺裹煨麺熟為度各半兩乾蠍三分㣲炒桃仁五十枚湯浸去皮尖雙仁麸炒㣲黄右為末煉蜜和丸如菉豆大每服不計時候以熱酒下二十丸硼砂丸聖惠方治腎臓積冷氣攻心腹疼痛面青足冷宜服硼砂二兩桃仁一兩湯浸去皮尖雙仁研如膏右先以酒一小盞煎硼砂十餘沸候消化澄濾取清去砂石後却入銚子内與桃仁膏旋旋添酒煎約入酒一大盞已来煎成膏用蒸餅末和丸如梧桐子大每服不計時候以熱酒下二十丸玉粉丹出本草經驗方治元臟氣發久冷腹痛虗瀉生硫黄五兩青鹽一兩右細研以蒸餅為丸如菉豆大每服五丸熱酒空心服以食壓之緑玉丹出惠聖方治腎臟積冷氣攻心腹疼痛不可止青古錢三十文燒醋淬七遍後於净地上徧糝硼砂末二兩令匀用盆子合二七日刮取硼砂研為末用熱醋浸蒸餅和丸如菉豆大每服不計時候以熱生薑酒下五丸或七丸補骨脂丸出王氏博濟方治脾腎久冷積氣成塊或發疼痛補暖大木𤓰一斤去皮穣入硼砂一兩去砂石蒸令熟爛補骨脂炒蘹香子薯蕷官桂去皮青橘皮去白木香㯽榔已上各一兩荆三稜半兩醋浸一宿炒令黄肉豆蔲去殻半兩右為末以木𤓰為丸如梧桐子大空心鹽湯温酒任下二十丸二氣散出朱氏集驗方治腎經停冷氣滯力弱大附一隻生用不去皮臍切作三分為片子令薄大茴香六兩净洗過濾乾分作三分每分二兩第一度用附子一分茴香二兩一分同炒令茴香黄色香熟用瓦瓶盛貯厚紙封盖安在冷䖏一宿次日除附子以茴香為末空心鹽酒調下第二度如第一度分兩炒法存性皆如之但次早除附子一半其一半附子同茴香為細末如前法服之第三度凡分兩炒法存性皆如前二度之法但次早全用附子同茴香為細末亦如前法服之外餘一分半附子又可合别藥用普濟方卷三十
