body:
  text: 普濟方卷三十明周王朱橚撰腎臟門腎勞附論夫腎勞者勞傷腎也腎傷則少精腰背痛難俛仰小便不利時有餘瀝隂痛囊濕生瘡小腹滿急厥逆下冷皆其候也經所謂強力入水久坐濕地傷腎之一端爾凢腎勞病者補肝氣而益之肝旺則感於腎矣人逆冬氣則足少隂不藏腎氣沉濁順之則生逆之則死順之則治逆之則亂反順為逆是謂關格病則生矣方補益蓯蓉獺肝丸治腎虗勞氣腰痛耳聾目黄睛痛面常青黑四肢羸弱煩悶痰飲氣攻肢節痠疼肉蓯蓉酒浸切焙二兩獺肝酥炙一具柴胡去苖秦艽去苖土當歸切焙石斛去根白茯苓去黒皮澤瀉附子炮製去皮臍各一兩半逺志去心巴㦸天去心各二兩蒺藜子炒去角熟乾地黄焙厚朴去麄皮生姜汁炙五味子炒桂去麄皮桃仁去皮尖雙仁炒丁香木香山芋芍藥陳橘皮浸去白焙赤石脂研㯽榔剉白术炒乾薑炮郁李仁湯泡去皮尖研甘草炙剉牡丹皮炙剉蜀椒去目并合口者炒出汗山茱茰芎藭牡蠣煆研人參各一兩黄耆剉炒二兩半右為末煉蜜和丸如梧桐子大每服四十丸空心酒下地黄煎丸出聖恵方治腎臟勞損添精補髓益氣養神駐顔調血脉令人輕徤生地黄五十斤揀擇好者洗搗取汁枸把子巴㦸薯蕷鹿茸去毛塗酥炙令㣲黄各二兩肉蓯蓉三兩酒浸一宿刮去皺皮炙乾無灰酒三十斤以上二味於銅鍋中慢火熬成膏入後藥山茱茰五味子茯神續斷補骨脂㣲炒逺志去心蛇床子附子炮裂去皮臍石斛去根剉覆盆子黄耆剉芎藭木香桂心牛膝去苖人參去蘆頭兎絲子酒浸一宿焙别搗為末沉香已上各一兩半右𢷬羅為末入前煎和用木杵臼𢷬五七百杵丸如梧桐子大每日空心及晩食前以温酒下四十丸沉香散治五勞七傷腎氣虗乏沉香白蒺藜炒去角補骨脂炒令香巴㦸天去心酸棗仁炒五味子炒澤瀉磁石煆醋淬七度桂去麄皮人參陳橘皮去白焙枳殻去穰麸炒牛膝切酒浸焙芍藥石斛去根鼈甲醋炙去裙欄各一兩㯽榔桑螵蛸炙三兩肉蓯蓉酒浸切焙當歸切焙柴胡去苖黄耆剉炒各二兩芎藭三兩附子炮裂去皮臍一兩半右細剉每服五錢水一盞半生薑五片煎取八分去滓空心温服巴㦸丸出聖恵方治腎勞腰脚痠疼肢節若痛目暗􅍃􅍃心中恍惚夜卧多夣覺則口乾食不得味恒多不樂常有恚怒心腹脹滿四體痺疼多吐酸水小腹冷痛尿有餘瀝大便不利悉皆主之久服延年不老萬病除愈巴㦸一兩肉蓯蓉一兩酒浸刮去皺皮炙乾兎絲子一兩酒浸一宿焙乾别𢷬為末熟乾地黄天雄炮裂去皮臍沉香各一兩天門冬一兩半去心焙五味子柏子仁牛膝去苖逺志去心石斛去根剉薯蕷防風去蘆頭白茯苓人參去蘆頭覆盆子石龍芮萆薢剉五加皮續斷石楠蛇床子杜仲去麄皮炙令㣲黄剉各三分右為末煉蜜和搗五七百杵丸如梧桐子大每服以温酒下三十丸空心及晩食前服忌生冷油膩鯹魚陽起石丸治腎勞虗損腰脚痠疼小腹急痛小便滑數面色黧黑陽起石飛過龍骨研各一兩逺志去心山芋巴㦸天去心附子炮裂去皮臍牛膝酒浸切焙杜仲去麄皮炙赤石脂牡蠣煨各二兩蛇床子三兩肉蓯蓉酒浸切焙四兩石斛去根黄耆剉續斷五味子萆薢兎絲子酒浸别焙地骨皮五加皮卷柏各二兩半右為細末煉蜜和丸如梧桐子大每服二十丸温酒下空心食前服補腎丸治虗勞腎氣虗足膝腰痛陽氣衰弱小便數囊冷濕尿有餘瀝精自出陽痿不起悲恚消渴麥門冬去心焙逺志去心乾薑炮防風去义桂去麄皮萆薢烏喙炮裂去皮臍枸把根牛膝去苖酒浸切焙萎蕤防葵肉蓯蓉酒浸切焙棘刺兎絲子酒浸一宿别搗厚朴去麄皮生姜汁炙石龍芮山芋各等分右為末煉蜜和鷄子白為丸如梧桐子大每服十丸食前温酒下加至二十丸日三豬肝丸治腎虗勞氣腰胯疼痛脚膝無力耳中虗鳴夜多小便飲食减少女人血勞面色萎黄心腹刺痛經脉不利豬肝一具去膜切以米醋二斗煮令極爛柴胡去苖澤瀉㯽榔剉附子炮裂去皮臍熟乾地黄焙當歸炙剉各二兩蜀椒去目及閉口者炒出汗桃仁去皮尖雙仁炒令黄研蒺藜子炒去角牛膝酒浸切焙木香秦芁去苖土桂去麄皮蕪荑炒乾薑炮黄連去鬚炒各一兩右除豬肝外擣羅為末取肝入砂盆内研爛同藥末入臼内搗三五千下滴餘醋并熟蜜和拌衆手丸如梧桐子大每服四十丸空心温酒下肉蓯蓉丸治腎勞心忪乏力夜多夣泄肌痩發熱口内生瘡臍腹冷痛肉蓯蓉酒浸切焙一兩巴㦸天去心半兩石斛去根半兩牛膝酒浸切焙附子炮裂去皮臍羌活去蘆頭各一兩桔梗炒逺志去心萆薢獨活去蘆頭枳殻去穰麺炒黄耆剉各半兩熟乾地黄焙當歸切焙各一兩海桐皮剉一分右為末煉蜜和丸如梧桐子大每服二十丸米飲或温酒下食前服磁石丸出聖惠方治腎虗勞損卧多盜汗小便餘瀝隂濕痿弱名曰勞極宜服磁石燒醋淬七遍細研水飛五味子鹿茸去毛塗酥炙令黄兎絲子酒浸一宿焙乾别𢷬為末蛇床子車前子白茯苓桂心肉蓯蓉酒浸一宿刮去皺皮炙乾黄耆剉防風去蘆頭陽起石細研水飛過附子炮裂去皮臍山茱茰熟乾地黄各一兩右為末煉蜜和搗三五百杵丸如梧桐子大每日空心以温酒下三十丸漸加至四十丸晩食前再服茯苓散治腎勞虗損羸乏欬逆短氣四肢煩疼耳鳴骨間熱小便赤色腰背疼痛無力白茯苓人參去蘆頭甘草炙㣲赤剉防風去蘆頭黄耆剉芎藭麥門冬去心當歸牛膝去苖五味子各一兩白芍藥磁石搗碎水淘去赤汁各一兩羚羊角屑半兩地骨皮三分桂心半兩右為散每服四錢以水一中盞煎至六分去滓空腹及晩食前温服羊腎湯出聖惠方治腎勞虛寒面腫垢黑腰脊痛不能久立屈伸不利夣悟驚悸上氣小腹裏急痛引腰脊四肢苦寒小便或白濁宜服當歸人參去蘆頭白芍藥各一兩熟乾地黄一兩黄耆半兩剉杜仲去麄皮炙令黄炒芎藭逺志去心白茯苓石斛去根剉五味子桂心續斷各一兩麥門冬一兩半去心焙磁石三兩搗碎水淘去赤汁右為散每服用羊腎一對切去脂膜以水一大盞半煎至一盞去腎下藥末五錢入生薑半分􅀥三枚煎至五分去滓空心及晩食前温服杜仲散出聖惠方治腎勞腰脊疼不可俛仰屈伸杜仲去麄皮炙令黄剉生乾地黄當歸各一兩丹參赤茯苓芎藭續斷五加皮牛膝去苖桂心枳殻麸炒㣲黄去穣各半兩甘草炙㣲赤剉羚羊角屑各一分右為散每服四錢以水一中盞入淡竹茹一分生薑半分煎至六分去滓食前温服羊腎湯出聖惠方治腎勞虗損面黑耳聾腰脚疼痛小便滑數宜服磁石搗碎水淘去赤汁白茯苓桂心石菖蒲附子炮裂去皮臍五味子當歸芎藭石斛去根剉桑螵蛸㣲炒各半兩杜仲去麄皮炙令㣲黄剉各半兩右為散每服用羊腎一對切去脂膜以水一大盞半煎至一盞去腎下藥末半兩入生薑半分煎至五分去滓空腹温服晩食前再服黄耆散出聖惠方治腎勞虗損耳聽無聲四肢滿急腰背轉動强難宜服黄耆剉磁石搗碎水淘去赤汁各二兩白茯苓澤瀉薯蕷牛膝去苖羚羊角屑杜仲去麄皮炙令㣲黄剉熟乾地黄沉香各一兩鼈甲一兩半塗醋炙令黄去裙襴甘草半兩炙㣲赤剉右為散每服三錢以水一中盞入生薑半分煎至六分去滓食前温服忌生冷油膩莧菜鼈甲散出聖惠方治腎勞熱四肢腫滿小腹急痛顔色黑黄闗格不通宜服鼈甲二兩塗酥炙令㣲黄去裙襴赤芍藥桂心漢防己赤茯苓木通剉枳殻麸炒㣲黄去穣各三分羚羊角屑澤瀉各半兩前胡去蘆頭桑根白皮剉大麻仁各一兩右為散每服四錢以水一中盞煎至六分去滓食前温服忌莧菜蛇床子丸治腎勞隂下生瘡濕痒蛇床子炒三分續斷山芋肉蓯蓉酒浸切焙桑寄生附子炮裂去皮臍逺志去心兎絲子酒浸一宿别搗莨菪子酒浸令芽生新芁土炒各半兩右除兎絲子外搗羅為末拌匀煉蜜和丸如梧桐子大每服二十丸空腹鹽湯下海藻丸治腎勞陽氣虗乏隂囊腫痒海藻洗去醎炙一兩肉蓯蓉酒浸切焙天雄炮裂去皮臍蘹香子炒各三分木香沉香剉牡蠣煆牛膝酒浸切焙硫黄研各半兩右為末煉蜜和丸如梧桐子大每服空腹鹽湯下二十丸日午再服兎絲子丸出聖恵方治腎虗勞損腰疼少力補益駐顔宜服兎絲子酒浸三日曝乾别搗三兩車前子鹿茸去毛塗酥炙令㣲黄肉蓯蓉酒浸一宿刮去皺皮炙乾桂心附子炮裂去皮臍牛膝去苖各二兩杜仲三兩去麄皮炙令黄剉熟乾地黄五兩右為末煉蜜和搗三五百杵丸如梧桐子大每服空心及晩食前以温酒下三十丸鼈甲湯療腎勞熱四肢腫急小腹滿痛顔色黑黄關格不通鼈甲炙麻黄去節升麻前胡羚羊角屑黄芩各三兩薤白切升桑根白皮五兩香豉一升熬綿别右切以水一斗煮取三升去滓分三服忌莧菜乾地黄散一名地黄湯出聖惠方治腎勞實熱脹滿四肢黑色耳聾多夣見大水腰脊離解宜服生乾地黄二兩赤茯苓𤣥參石菖蒲人參去蘆頭黄耆剉各一兩逺志去心甘草煮甘草炙㣲赤剉各半兩右為散每服三錢水一中盞煎至六分去滓食前温服羊腎湯治腎勞虛損寒熱耳鳴好唾善欠腰脚痿弱方見本門腎虗類羊角補腎湯下逺志丸治腎勞虗損夣寤驚悸小腹拘急靣色黧黑小便白濁腰脊疼痛逺志去心桂去麄皮杜仲去麄皮炙枳殻去麄麸炒白茯苓去黒皮各半兩熟乾地黄焙兎絲子酒浸一宿别搗各一兩右除兎絲子外搗羅為末和匀煉蜜和丸如梧桐子大每服三十丸空腹温酒下磁石湯治腎勞虗寒飢不欲食面色黧黒磁石煆醋淬五七遍一兩半黄耆剉三分杜仲去麄皮炙一兩白石英碎一兩一分五味子炒一兩白茯苓去黒皮三分白术一兩半右麄搗篩每服五錢水一盞半煎一盞去滓食前温服日再胡黄連散治虗勞嗜慾過傷腎氣衰竭欬嗽唾涎痩弱不能食胡黄連獺肝炙蕪荑仁焙秦艽去苖土白术剉各一分柴胡去苖鼈甲去裙襴醋炙各半兩右為散每服三錢取豬腎一隻小便一合别酒二合沸浸小便與腎入藥以椀盖候通口即服豬腎不用黄耆飲治腎勞盜汗􅌵吸少氣黄耆白术白茯苓去黒皮五味子各一兩半熟乾地黄焙牡蠣煆各二兩大􅀥七枚去核右㕮咀每服五錢水一盞半煎至八分去滓食前温服日三補虗杜仲丸治腎虗勞損腰疼少力杜仲去麄皮桂去麄皮枳殻去穣麸炒白茯苓去黒皮各一兩乾薑炮半兩兎絲子酒浸一宿别搗逺志去心各二兩右為末煉蜜和丸如梧桐子大每服三十丸食前温酒或棗湯下五味子丸治腎勞虗損精氣不足面黑耳聾小便白濁五味子白茯苓去黒皮車前子巴㦸天去心肉蓯蓉酒浸切焙兎絲子酒浸一宿别搗各一兩右為末煉蜜和杵三二百下丸如梧桐子大每服三十丸空腹晩食前温酒下蓯蓉丸治腎勞氣虗筋骨羸弱腹中急痛肉蓯蓉酒浸切焙葫蘆巴乾薑炮牛膝酒浸切焙各一兩蘹香子炒木香各一分右為末醋煮麺糊和丸如梧桐子大每服二十丸食前温酒送下補益乾地黄丸治腎勞精氣滑泄熟乾地黄三兩鹿茸去毛酥炙逺志去心山茱茰各一兩半蛇床子半兩兎絲子酒浸别搗二兩右為末煉蜜和丸如梧桐子大每服三十丸食前酒下桃仁湯治腎勞虗損心腹脹滿骨節煩疼桃仁湯浸去皮尖雙仁麸炒二兩白术一兩芎藭附子炮裂去皮臍各三分蓽澄茄半兩右剉如麻豆每服二錢水一盞入生薑三片鹽少許同煎取七分去滓食前稍熱服日三兎絲子丸治腎勞嚢濕生瘡陽痿失精小便頻數兎絲子酒浸别搗牡䝉柏子仁蛇床子炒肉蓯蓉酒浸切焙各一兩右為末煉蜜丸如梧桐子大每服二十丸空腹温酒下日午再服伸煮散治腎勞熱妄怒腰脊不可俛仰屈伸丹參牛膝葛根杜仲乾地黄甘草猪苓