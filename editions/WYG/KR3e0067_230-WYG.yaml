body:
  text: 普濟方卷二百三十明周王朱橚撰虚勞門冷勞附論天冷勞之人氣血枯竭表裏俱虛隂陽不和精氣散失則内生寒冷也皆由臟腑乆虚積冷之氣傳注於内遂令宿食不消心腹積聚臍腹疼痛靣色萎黄口舌生瘡大腸洩痢手足無力骨節痠疼久而不痊轉加羸痩故曰冷勞氣也方白术散白术一兩白芷鼈甲去裙襴醋炙令焦蒼术米泔浸一宿剉焙防風去蘆厚朴去麤皮生薑汁炙剉桂去麤皮人參陳橘皮去白焙乾薑炮高良薑炮各五錢吳茱萸湯浸三遍焙乾柴胡去苗蜀椒去合口并目炒出汗芎藭白茯苓去黒皮白蕪荑縮砂去皮各一兩附子二枚去皮臍炮裂沉香剉丁香當歸炙剉木香各一分右為散每服五錢用猪肝三兩批開入葱白鹽各少許摻藥在内濕紙裹慢火煨香熟為度空心食前米飲嚼下炙肝散治冷勞羸瘦不能食心腹多痛四肢無力紫苑洗去苗土乾薑炮裂剉縮砂去皮蕪荑各五錢人參去蘆頭白茯苓甘草炙微赤剉當歸木香陳橘皮湯浸去白穣焙桂心川椒各一分去目及閉口者微炒出汗厚朴去麤皮塗生薑汁炙令香熟草豆䓻各五錢去皮胡椒一分桔梗去蘆頭細辛蒼术附子各五錢炮裂去皮臍芎藭一分右為散每服用猪肝一具去脂膜薄切如肉片入散一兩五錢葱薤白一握細切鹽末相拌令有味以竹串子穿慢火炙令熟每服空心食之飲煖酒一兩盞為妙鼈甲丸出聖恵方治冷勞羸瘦四肢無力肩背疼痛腹脇積聚氣喫食不消鼈甲一兩五錢塗醋炙微黄焦去裙襴熟乾地黄郁李仁湯浸去皮尖微炒陳橘皮各一兩湯浸去白穣焙當歸三分白术一兩枳殻三分麸炒微黄赤茯苓牛膝去苗各一兩梹榔桂心人參去蘆頭五味子各三分柴胡去苗各一兩五錢訶梨勒一兩煨用皮附子一兩炮裂去皮臍木香一兩乾薑三分炮裂剉赤芍藥一兩桔梗三分去蘆頭京三稜一兩炮剉右為末煉蜜和搗三五百杵丸如梧桐子大每服食前煎薑􅀥湯下三十丸忌莧菜蓽澄茄散出聖恵方治冷勞臟腑虚弱心腹氣脹不能飲食四肢無力蓽澄茄一兩附子炮裂去皮臍木香京三稜炮剉白茯苓肉豆􅅳去殻沉香人參去蘆頭白术桂心丁香各五錢甘草一分炙微赤剉桃仁湯浸去皮尖雙仁炒微黄陳橘皮各五錢湯浸去白稍焙吳茱萸一分湯浸一遍焙乾微炒訶梨勒一兩五錢煨用皮厚朴五錢去麤皮塗生薑汁炙令香熟龞甲一兩塗醋炙微黄去裙襴右為散每服食前以粥調下二錢忌莧菜生冷猪肝丸出聖恵方治冷勞肌體羸瘦或時腹痛食飲不消日漸尫羸猪肝一具切去脂膜用醋五升煑令盡取出研如膏訶梨勒一兩五錢煨用皮龞甲一兩五錢塗醋炙令黄焦去裙襴厚朴二兩去麤皮塗生薑汁炙令香熟陳橘皮一兩湯浸去白瓤焙川椒三分去目及閉口者微炒去汗柴胡去苗一兩桂心三分蒼术一兩木香桔梗去蘆頭烏梅肉各三分微炒甘草五錢炙微赤剉紫苑一兩洗去苗土浄乾薑炮裂剉蕪荑微炒當歸各三分右為末入猪肝膏内和搗五七百杵丸如梧桐子大毎服食前以粥飲下三十丸忌莧菜炙肝散治冷勞大便不禁羸瘦髙良薑炮山芋柴胡去苗縮砂去皮吳茱萸湯浸焙桂去麤皮陳橘皮去白焙白芷各一兩木香一分補骨脂炒赤芍藥洗焙厚朴去麤皮用生薑汁炙桔梗炒剉乾薑炮裂當歸切焙各二兩桂去麤皮黄耆剉芍藥右麤搗篩每服五錢水一盞半入生薑七片􅀥三枚擘同煎至八分去滓温服不拘時蓽茇丸出聖恵方治冷勞氣四肢羸瘦面色萎黄腹内疼痛不思飲食蓽茇木香各五錢訶梨勒一兩五錢煨用皮肉豆䓻去殻梹榔各一兩白术乾薑炮裂剉阿魏麫裹煨以麫熟為度陳橘皮各五錢湯浸去白瓤焙厚朴一兩去麤皮塗生薑汁炙令香熟人參去蘆頭桂心胡椒甘草各五錢炙微赤剉右為末煉蜜和搗三二百杵丸如梧桐子大每服空心及晚食前以煖酒下三十丸橘皮煎丸出王氏博濟方治冷勞羸瘦手足攣急目暗耳聾腹脹泄痢不能納食食物無味面黄力弱積年腸風痔疾癖積氣塊一切勞病婦人血赤白下子宫冷五種膈冷膈熱膈氣膈思膈憂膈無力多腫此藥大能通痢五臟明目去冷陳橘皮湯浸去白焙一觔桂去麤皮乾薑炮當歸剉炒四味别搗羅附子去皮臍炮裂京三稜炮剉萆薢三味别搗羅陳麴炒各六兩木香一兩大麥糵四兩烏頭炮水煑三五沸去皮臍焙蜀椒去目及閉口炒出汗各一兩厚朴去麤皮生薑汁炙六味别搗為末右用無灰酒四升於銀石器内先煎上四味如人行十里更下次三味如人行十里次入下六味又添酒兩碗煎成膏取出杵一千下丸如梧桐子大每服空心日午茶酒任下二十丸至三十丸生葱鹽豉合此藥煎時用銀器鍋如無須浄洗無滑膩鐺内除真酥次下酒及下藥慢火煎以銀匙攪候如膏傾浄盤内攤候得所衆手丸之久服補氣壯元駐顔進食桂心散治冷勞臟腑虚弱心腹脹滿四肢羸瘦困乏無力不思飲食桂去麤皮五兩柴胡去苗六兩青橘皮去白焙一兩桃仁湯浸去皮尖雙仁炒五兩紫葛去心微炙山茱萸益智去皮知母剉焙芎藭當歸炙剉五味子各三兩獖猪肚一具切焙右為散每服三錢空心用陳米飲調下補骨脂散出聖恵方治冷勞羸瘦四肢無力不思飲食或時洩痢補骨脂二兩微炒訶梨勒一兩五錢煨用皮枳殻三分麩炒微黄炙穰肉蓯蓉二兩湯浸一宿刮去皺皮炙令乾厚朴一兩去麤皮塗生薑汁炙令香熟鹿茸一兩去毛酒洗縮砂二兩去皮當歸五錢右為散每服食前粥飲調下二錢忌生冷油膩炙肝散出聖恵方治冷勞心腹虚脹飲食全少四肢無力大腸不調蒼术五錢微炒芎藭青橘皮各五錢湯浸去白穰焙白芍藥紫苑桔梗各一兩去蘆頭木香二兩肉豆䓻去皮梹榔各五錢厚朴一兩去麤皮塗生薑汁炙令香熟右為散每服用猪肝一具去脂膜薄切如肉片入散一兩半葱韭白一握細切鹽末相拌令有味以竹串子穿慢火炙令熟毎服空心食之飲煖酒兩盞為妙猪肝丸治男子婦人冷熱勞疾寒熱時作猪肝一具去皮膜切以童子小便二升煑爛秦芁去苗土黄連去鬚炒木香蕪荑炒青蒿蜀椒去目并閉口者炒出汗當歸焙各一兩右除肝外搗羅為末將猪肝於沙盆内細研入藥末以餘小便和搗為丸如梧桐子大每服空心酒下三十丸加至四十丸蓽撥丸治冷勞嘔噦不能下食心腹脹滿面色萎黄蓽撥乾薑炮裂白茯苓去黒皮胡椒炒桂去麤皮各一兩梹榔三兩煨剉人參一兩一分訶梨勒煨去核一兩五錢右為末煉蜜和丸如梧桐子大每服空腹清粥飲下十丸甚者加至二十丸一方有陳橘皮鼈甲丸治冷勞心腹氣痛食少羸瘦鼈甲一枚大者以鹽泥固濟殻上用前後藥木香桂心各一兩訶梨勒皮附子各二兩去皮臍肉豆䓻去殻桃仁各一兩湯浸去皮尖雙仁右藥細剉用酒二升於龞甲内煑令酒盡捻下火取出諸藥其龞甲去泥用之并焙乾搗羅為末煉蜜和搗三百杵丸如菉豆大每服空心及晩食前以生薑湯下十五丸忌莧菜又方附子三分炮裂去皮臍吳茱萸一分湯浸七遍焙乾微炒牛膝一兩去苗硫黄五錢研細白术三分右為末入硫黄更研令勻醋炙麵糊和丸如梧桐子大毎服食前以溫酒下二十丸硫黄丸治冷勞痃癖氣硫黄二兩細研水飛過木香末川大黄末各一兩桃仁四十九粒湯浸去皮尖雙仁研如膏右先取大黄末以少熱水灑取潤於新竹筒中盛炊飯甑中蒸飯熟為度後取諸藥末及桃仁膏以大黄和之如稍硬以新炊飯少許研和丸如梧桐子大每服空腹以粥飲下二十丸附子湯治冷勞肌瘦盗汗少力時發寒熱不思飲食附子炮裂去皮臍柴胡去苗一兩秦芁去苗土一两五錢右剉如麻豆每服二錢用猪􅏬子一兩切令細酒半盞水三分薤白三寸同煎令猪􅏬熟去滓溫服毎日五更初服之漏蘆丸治冷勞泄痢及婦人産後帯下諸疾漏蘆去蘆頭一兩艾葉去梗炒四兩右為末用米醋三升入藥末一半先熬成膏後入飲藥和丸如梧桐子大每服三十丸溫米飲下食前服羊肝丸出聖恵方治冷勞久不瘥食少洩痢諸藥不効羊肝一具去脂膜切作片子白礬三兩焼令汁盡右以釅醋三升煑羊肝令爛入砂盆内研後入白礬和丸如梧桐子大每服空心及晩食前以粥飲下二十丸漸加至三十丸桃仁方出聖恵方治冷勞氣不能飲食漸加羸瘦桃仁五百顆大者吳茱萸三兩右藥相和入浄鐡鐺中煑微火炒經一炊又取桃仁一顆撚去皮看似微黄色即漸加火令極熱鐺中微煙出即已熟取出於新甕瓶子盛厚著紙封瓶口勿令泄氣毎日空心只取桃仁二十顆撚去皮爛嚼以溫酒下至重者服五百顆即瘥神効太一丹出聖恵方治冷勞大腸轉泄不止禹餘粮四兩火燒令赤於半醋内淬如七遍後搗研如麫烏頭一兩冷水浸一宿去皮臍右藥相和用醋煑麵糊和丸如菉豆大毎服食前以溫酒下五丸茒香花丸出聖恵方治冷勞久不瘥茒香花艾葉并焼茅灰各一兩右藥細研以粟米飲和丸如梧桐子大初以蛇床子湯下二十丸至三十丸微吐不妨吐了却用􅀥湯下立有大効金髓丹出聖恵方治冷勞及冷氣諸疾用吳茱萸三觔以新汲水淘一百遍日中曬乾以醲酒五升煑茱萸以酒盡為度以炭燒火地令赤以酒二升淋地上將茱萸攤在地上以盆子合之以灰四面培之勿令泄氣一宿取出以文火炒令乾搗羅為末以醋煑􅀥肉和研丸如菉豆大每服空心及晚食前以生薑湯下二十丸加至三十丸治一切男子女人虚冷勞證大腸滑泄面色青黄喫食少行歩無力元臟虚損小便頻數肢節沉重精源不固常多困倦出獲命方巴㦸去心五味子牛膝石斛芎藭萆薢杜仲山茱萸各五錢吳茱萸二銖白术藿香各三錢肉豆䓻羌活官桂茯苓人參木香各一分右為細末以好酒少許化阿魏二銖對煉蜜丸梧桐子大朝早鹽湯下四十丸治諸風勞用野獼猴肉釀酒服之人家養者不治病不可用急勞附論夫急勞之病其證與熱勞相似而得之差暴也葢血氣俱盛積熱内干心肺臟腑壅滯毒熱不除而致之緣稟受不足憂思氣細榮衛俱虚心肺壅熱金火相形藏氣傳尅或應外邪故煩躁體熱頰赤心忪頭痛盗汗咳𠻳咽乾骨節痠疼萎黄羸瘦久則肌膚消燥咯涎唾血者皆其候也方前胡飲暴急成勞痰盛喘𠻳前胡去蘆人參白茯苓去皮桂去皮柴胡去苗桔梗炒生乾地黄焙黄芩去黒心𤣥參旋覆花甘草炙剉各一兩麥門冬去心焙一兩五錢厚朴去麤皮生薑汁炙剉二兩半夏洗七遍炙焙白术各一兩五錢右為散每服四錢水一盞半生薑七片煎至七分溫服不拘時黄耆湯治暴急勞疾痰𠻳喘滿黄耆剉炙欵冬花貝母去心焙一兩五錢麻黄去節柴胡去苗甘草炙剉桂去麤皮麥門冬去心焙人參生地黄焙桑白皮剉紫苑去苗土白茯苓去黒皮杏仁去皮尖雙仁焙各一兩右為散每服五錢水一盞半生薑七片煎至八分去滓溫服食後柴胡湯治男子婦人急勞咳𠻳上氣飲食減少痰涎壅滯手足痠疼唇口乾燥心虚驚悸氣乏羸瘦少力等症柴胡去苗當歸切焙麥門冬去心焙半夏洗去滑焙各一兩五錢人參白茯苓去皮防風去叉細辛去苗葉陳皮焙厚朴去麤皮生薑汁炙剉杏仁去皮尖雙仁炒大腹皮剉作各一兩右為散毎服五錢水一盞半生薑五片煎至七分去滓溫服不拘時胡黄連散治急勞發熱羸瘦頰赤口乾心神煩躁胡黄連黄連去鬚龍膽各二兩桑螵蛸知母秦艽去苗土柴胡枳殻去穰人參桔梗甘草白术各一兩右洗剉炒黄為散毎服三錢以葱薤白槐桞心烏梅肉浸童便調下或用槐桞小麥煎亦得空心日午夜卧各一犀角湯治急勞心膈煩滿骨節壯熱唇乾心煩小便赤頭痛痰𠻳并熱每受風濕注方見本門熱勞類青蒿煎丸治急勞心肺積熱鼻口焦乾飲食少