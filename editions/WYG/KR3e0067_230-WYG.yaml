有虧心火内蒸其煩必躁吐㵼之後津液枯渇煩而有渇惟傷寒及大病後虚煩之證却無霍亂臨病之際又宜審之治法以平和之藥清心實下未可峻用補藥又若婦人産後去血過多虚煩發熱又當各以類求方柴胡散出聖恵方治虚勞煩熱四肢疼痛不欲飲食柴胡去苗一兩黄耆一兩剉枳殻五錢麸焙微黄去瓤麥門冬一兩五錢去心焙龞甲一兩塗醋炙令黄去裙襴地骨皮生乾地黄各三分人參一兩去蘆頭葳㽔三分赤茯苓一兩赤芍藥三分甘草五錢炙微赤剉右為散毎服四錢以水一中盞煎至六分去滓不計時候溫服忌莧菜半夏散出聖恵方治虚勞胸中煩熱心下痞滿不欲飲食半夏湯浸七遍去滑五味子各五錢前胡一兩去蘆頭木香三分桂心五錢陳橘皮一兩湯浸去白瓤焙甘草五錢炙微赤剉赤茯苓一兩桔梗去蘆頭麥門冬各三分去心人參去蘆頭枳殻各一兩麸炒微赤去瓤右為散毎服三錢水一中盞入生薑半分煎至六分去滓不計時候溫服地黄散出聖恵方治虚勞煩熱口熱頰赤多渇生乾地黄一兩茯神葳㽔知母各三分􅌝􅌣根黄耆剉地骨皮石膏人參去蘆頭麥門冬各一兩去心甘草五錢炙微赤剉右為散毎服三錢以水一中盞煎至六分去滓不計時候溫服犀角散出聖恵方治虚勞煩熱心神不安四肢疼痛喫食全少犀角屑十兩茯神一兩赤芍藥人參去蘆頭各三分黄耆一兩剉地骨皮五錢生乾地黄一兩甘草炙微赤剉五錢麥門冬三分去心右為散毎服三錢以水一中盞煎至六分去滓不計時候溫服治虚勞煩熱心胸壅悶不思飲食四肢少力宜服此方出聖惠方黄耆一兩剉前胡三分去蘆頭赤茯苓一兩枳殻三分麸炒微黄去瓤人參一兩去蘆頭麥門冬去心陳橘皮湯浸去白瓤焙桂心各三分甘草炙微赤剉五錢右為散毎服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服枳實散出聖恵方治虚勞煩熱不欲飲食四肢少力枳實麸炒微黄黄耆剉青箱子白前各一兩黄芩五錢􅌝􅌣根一兩麥門冬一兩五錢去心焙柴胡去苗地骨皮各二兩右為散毎服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服麥門冬散出聖恵方治虚勞煩熱體瘦無力不思飲食麥門冬一兩去心人參去蘆頭白术各三分黄耆一兩剉訶梨勒皮三分白茯苓一兩甘草五錢炙微赤剉陳橘皮三分湯浸去白瓤焙右為散毎服四錢以水一中盞煎至六分去滓不計時候溫服地骨皮散出聖恵方治虚勞煩熱食少無力地骨皮𤣥參各三兩黄耆二兩剉澤㵼一兩麥門冬三分去心生乾地黄一兩葳㽔五錢人參一兩去蘆頭右為散毎服四錢以水一中盞煎至六分去滓不計時候溫服澤㵼湯療大虚煩躁上汗治氣澤㵼茯苓各二兩牡蠣煅白术各一兩生薑半觔右切以水八升煑取二升分服一升日再忌桃李雀肉酢物等治虚勞客熱用枸杞根為末調服有痼疾不得喫柴胡龞甲丸治虛勞客熱榮衛不和全不思食寒熱相間咳𠻳痰涎肢體倦怠及傷寒汗後餘熱不解潮作寒熱日漸消瘦並宜服之柴胡去苗鼈甲地骨皮人參去蘆頭枸杞子白茯苓白芍藥知母貝母去心麥門冬去心黄耆蜜炙山梔子炒各等分右件一十二味搗羅為末煉蜜為丸如梧桐子大毎服三十丸煎烏梅青蒿小麥湯送下不拘時候解煩熱補虚勞以葱豉酒服之虛勞骨熱附論夫虛勞骨熱者是五勞七傷之中隂虚陽盛熱毒上攻心肺流於骨髓致成壮熱盖男子腎臟虚弱精氣不足下元冷憊上焦虚熱因兹而得也女子月事不通産後勞損頻發寒熱之所致也其人肌體消瘦四肢無力頰赤口乾心躁盗汗乍發乍歇精神不守者是其候也方胡黄連丸治虚勞骨熱四肢羸瘦少力不思飲食胡黄連天靈葢塗醋炙令微黄赤茯苓川升麻川大黄剉碎微炒地骨皮知母犀角屑人參去蘆頭麥門冬去心焙各一兩鼈甲三兩塗醋炙令黄去裙襴黄芩柴胡去苗二兩前胡去蘆頭桔梗去蘆頭赤芍藥當歸剉微炒木通剉防風去蘆頭各三分甘草五錢炙微赤剉右為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以溫水下三十丸忌莧菜丹砂丸治虚勞骨熱四肢煩悶及心躁虚汗朱砂細研水飛過薯蕷犀角屑肉蓯蓉酒浸一宿刮去皺皮炙令乾川升麻牡蠣燒為粉梹榔牛黄細研麝香各一錢麥門冬去心焙龞甲塗醋炙微黄去裙襴䜴心各三分右搗羅為末入研藥令匀煉蜜和搗三二百杵丸如梧桐子大每服不計時候以粥飲下三十丸忌莧菜犀角丸治虚勞骨熱四肢煩疼小便赤黄肌澀少睡犀角屑胡黄連知母赤芍藥貝母煨令微黄地骨皮黄芩梹榔紫苑洗去苗土木香欵冬花烏梅肉微炒柴胡去苗各五錢大熟黄瓜去穰一枚右為末入黄𤓰内蒸熟爛研入少許蜜和丸如梧桐子大每服不計時以溫水下三十丸胡黄連散治虚勞骨熱四肢煩疼口乾心躁胡黄連一兩人參三分去蘆頭赤茯苓柴胡去苗鼈甲塗醋炙微黄去裙襴各一兩五錢梔子仁三分麥門冬一兩五錢去心焙赤芍藥三分甘草五錢炙微赤剉桔梗一兩去蘆頭㯽榔五錢右為散毎服四錢以童子小便一中盞入生薑半分煎至六分去滓不計時候溫服忌莧菜川大黄丸治虚勞骨熱心神煩躁大小便難四肢疼痛青橘皮去白焙草豆䓻去皮各五錢右為散毎服用猪肝四兩薄批片子糝藥五錢入葱鹽各少許濕紙裹慢火内煨令香熟去紙細嚼米飲下燒肝散治冷勞補五臟通氣脉和脾胃止泄痢山茵蔯石斛去根當歸切焙各一兩五錢木香桂去麤皮人參紫苑去苗土桔梗炒赤芍藥防風去蘆白蕪荑犀角鎊吳茱萸湯洗焙乾炒各一兩白术一兩一分右為散毎服猪肝一具細切入藥末一兩五錢葱白五莖細切入鹽三錢與肝拌和令匀分作三服毎服用荷葉包更以濕紙三五重裹慢火燒肝令過熟空心食前喫用米飲下如患冷勞面色萎黄不過喫十服愈沉香丸出聖恵方治冷勞四肢疼痛體瘦力少不思飲食沉香一兩白术三分柴胡二兩去苗桂心乾薑各三分炮裂剉訶梨勒煨用皮附子炮裂去皮臍木香人參去蘆頭白茯苓各一兩當歸㯽榔各三分鼈甲一兩五錢醋炙微黄焦去裙襴陳橘皮湯浸去白瓤焙肉豆䓻各一兩去殻右為末煉蜜和搗三五百杵丸如梧桐子大毎服食前以粥飲下三十丸忌莧菜木香丸治冷勞便利不調腹脹嘔逆羸困少力木香肉豆䓻去殻陳橘皮湯浸去白焙乾薑炮裂附子炮裂去皮臍郁李仁去皮尖炒别研麥門冬去心焙各一兩艾葉炒鼈甲醋浸炙去裙襴陳麴炒柴胡去苗各二兩厚朴去麤皮塗生薑汁炙三兩鍾乳煉成粉桂去麤皮各五錢右搗羅十三味為末入郁李仁相和研勻用猪肝一具去脂膜細切以頭醋三升同熬令醋浸爛研入藥末相和為丸如梧桐子大每服空心溫酒下二十丸米飲亦得虎杖飲治男子婦人冷勞身體羸瘦虎杖柴胡去苗五味子炒熟乾地黄焙白茯苓去黒皮川大黄剉碎微炒黄芩黄連去頂當歸赤茯苓各一兩五錢陳橘皮去白焙麥門冬去心焙黄芩去黒心甘草炙剉各一兩五錢人參一兩黄耆剉生乾地黄赤芍藥柴胡去苗各三兩梔子仁五錢右為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以溫水下二十丸除熱三黄丸療骨熱身多瘡瘰􅊓癰腫大黄黄芩黄連當歸茯苓桂心乾薑芍藥梔子二十四枚擘柴胡各三分右搗篩蜜和丸先食服如小豆大三丸不知増至十丸欲取微利以意増之久服有益忌生葱醋物猪肉冷水白湯下知母散出聖恵方治虚勞骨熱四肢煩疼漸漸羸瘦日晩口乾頰赤知母三兩前胡一兩去蘆頭地骨皮三兩犀角屑一兩五錢白鮮皮龍齒川芒硝各一兩右為散每服四錢水一中盞煎至六分去滓每於食後溫服療骨熱身多瘡瘰􅊓癰腫大黄黄連黄芩各一兩芒硝一两右搗篩蜜和丸一服五丸漸加以知為度忌猪肉冷水白湯下猪骨煎出醫方大成治男子婦人發熱有多等若虚勞發熱從脊骨起此藥有神効更宜審細病狀服之獖猪脊骨一條五尺五寸細剉用好法酒五升青蒿一握烏梅十箇柴胡一兩去蘆秦艽十箇去蘆慢火同熬耗一半去滓入蜜半觔再熬成膏子人參去蘆白茯苓去皮當歸去蘆川芎肉蓯蓉酒浸巴㦸去心酒浸五味子牛膝去蘆酒浸茴香微炒破故紙炒各一兩龞甲去裙襴醋炙黄沉香各五錢鹿茸酒浸酥炙附子炮去皮臍各二兩右為細末用前猪骨膏子搜和得所丸如梧桐子大毎服三十丸漸加至五十丸米飲下不以時候普濟方卷二百三十
