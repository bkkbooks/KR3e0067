body:
  text: 普濟方卷一百十五明周王朱橚撰諸風門諸風雜治白丸子方出聖惠方治一切風附子半生去皮白附子半生半夏湯洗七次天麻乾蝎生用白花蛇肉令黄甘菊花羌活防風去蘆芎藭桂心去蘆頭白殭蠶生用白蘚皮木香已上各半兩巴豆半兩硃砂一分雄黄一分麝香一分右搗羅為末入硃砂雄黄麝香等研令勻以糯米飯和搗一二千杵丸如梧桐子大用膩粉滚過每服以温酒下三丸藁本散治一切風治婦人血風丈夫筋骨風腸風痔漏四肢軟弱及小兒急風能療骨節風攻痛疼等并寸口白蟲解傷寒若能常服治諸風氣諸疾藁本赤箭羌活獨活芎藭白蘚皮防風去蘆肉桂去皺皮附子炮製去皮臍續斷五加皮甘菊花麻黄去根節赤芍藥細辛乾蝎一兩半當歸牛膝去苖枳殻炒黃甘草各一兩半右搗羅為散每服以温酒調下一錢薄荷湯下亦得忌生冷猪雞魚動風物一方無乾蝎追風散出和劑方治年深日近偏正頭痛又治肝臓久虚血氣衰弱風毒之氣上攻頭痛頭眩目暈心忪煩熱百節酸疼腦昏目痛鼻塞身重項背拘急皮膚瘙痒面上遊風狀若蟲行及一切頭風兼治婦人血風攻疰頭目昏痛病皆治之常服清頭目利咽膈消風壅化痰涎川烏去皮防風去蘆川芎洗白殭蠶荆芥去梗石膏甘草白附子炮羗活白芷全蝎微黄天南星炮天麻去蘆地龍半兩乳香研草烏去皮沒藥研雄黄一分右為細末每服半錢入好茶少許同調食後及臨睡服龍麝紫芝煎療一切諸風半身不遂口眼喎斜頭旋耳鳴鼻塞咽乾四肢麻木疼痛痰毒下疰腰膝沉重筋攣骨冷皮膚瘙痒昏迷倦飲食進退行歩少力何首烏天麻去苖呉白芷防風去苖羗活甘草炙黑附子炮甘松胡椒良薑藿香葉肉桂川薑一兩麻黄一兩龍腦白檀香零陵香右為細末炒米粉四兩黄色糯米粥入汁白蜜二兩和就作錠子一寸半長毎服一錢錠細嚼茶酒下如病重每服三錠子日三服遇仙如意丸出瑞竹堂治諸風疾病及患惡瘡婦人月事不見産後胸中惡物盡皆治之大有效驗白茯苓去皮陳皮去白青皮去穣各一錢丁香木香人參各二錢白术煨白豆蔲仁縮砂仁官桂去皮荆三稜炮石菖蒲炒去毛逺志去心廣茂炮各三錢乾山藥半兩甘草去皮少許香附子三兩牽牛頭末八兩加二右為細末好醋糊為丸如梧桐子大每服一百二十丸看老㓜虚實加减丸數臨卧温水送下凡食不可大飽可食粥五七日忌生冷硬物酒肉魚麫若風疾加地骨皮一兩氣蠱水蠱每服三百丸一服立消此藥微利三五次欲止臓腑熱喫凉水一口便立住後一服甘露散即補之甘露散出瑞竹堂服如意丸後便服此藥即補能分隂陽有大效驗白滑石六兩半澤㵼甘草去皮各一兩人參白术木猪苓去黑皮各半兩右為細末每服三錢白湯調服欲分隂陽蜜和丸如彈子大用湯化如稀麫糊調服之羗活去蘆頭麻黄去根節湯煑掠去沬焙各一兩防風去蘆三錢木香㯽榔剉附子炮製去皮臍白术白頭炮製去皮臍草豆蔲和皮陳橘皮湯浸去白焙牛膝酒浸一宿切焙當歸酒浸一宿切焙杏仁去皮尖雙仁生用人參白茯苓甘草芎藭桂去粗皮各半兩右剉如麻豆每服一兩水三盞生薑七片煎至一盞去滓取七分溫服大腸不通加大黄末一錢量老少加减久不通者加至三五錢小腸不通心腹脹加葶藶並滑石末各一錢滑石湯化下上膈壅滯咳嗽氣急加半夏升麻天門冬知母末各二錢服訖衣覆取汗不過三五服差走馬丹出聖惠方治一切風硃砂一兩雄黄一兩硫黄一兩水銀已上四味同研極細墨染紙褁用線繫定取巴豆一斤和皮都搗黏爛以磁盒内巴豆一半鋪底入前四味藥在巴豆中心上又以巴豆盖之如法固濟候乾入爐中用半秤火煆後火盡取出並巴豆灰與四味藥同研極細更入後藥木香一分天麻一分犀角屑一分白附子一分炮製天南星一分炮製丁香肉桂一分去皺皮麝香一分細研龍腦一分細研藿香一分白花蛇三分酒浸去皮骨炙微黄白殭蠶一分微炒乾蝎一分微炒附子一分炮製去皮臍右搗羅為末與前藥同研令勻用湯浸蒸餅和五七百杵丸如梧桐子大每日空心以温酒下十丸當取下如魚油惡物一兩椀便是風之根本忌動風物雄黄丸出聖惠方治一切風雄黄牛黄龍腦各一分細研麝香半兩白殭蚕一兩微炒天南星一兩炮製白花蛇二兩酒浸去皮骨炙㣲黄天麻一兩白附子一兩炮製天雄一兩炮製去皮臍乾蝎一兩㣲炒半夏半兩湯洗七次去骨蟬殻半兩獨活一兩芎藭一兩膩粉半分犀角屑半兩槐膠一兩右搗羅為散末煉蜜和搗三二百杵丸如豇豆大每服以温酒嚼下五粒如心煩壅悶驚悸即以荆芥薄荷湯下忌動風物神效無比牛黄丸出聖惠方治一切風牛黄半兩細研硃砂一兩細研水飛過麝香一分細研龍腦一分細研附子一兩半炮製去皮臍羗活一兩白殭蚕一兩半㣲炒白附子一兩炮製乾蝎一兩全者㣲炒芎藭一兩天南星炮製當歸一兩桂心一兩木香一兩天麻二兩防風一兩去蘆頭㯽榔一兩獨活一兩右搗羅為未入研了藥同研令勻煉蜜和三五百杵丸如櫻桃大每服以薄荷湯研下一丸薄荷葱茶下亦得花桑枝煎治一切風花桑枝一斤剉海桐皮半斤仙靈脾半斤五加皮半斤牛蒡根半斤已上五味細末以水三斗煑至一斗濾去滓却入鍋中以慢火熬至五升附子去皮臍牛膝去苗天麻羗活桂心萆薢剉羚羊角屑虎脛骨塗酥炙㣲黄酸棗仁當歸木香乳香㯽榔已上各一兩右搗羅為末於前煎中别入好酒二升白蜜五合入銀鍋中熬至三升後下諸藥末以桞木棍攪令勻看稀稠得所即以磁器盛每服空心及晩食前以温酒調下一茶匙復夀延春丹治未來症候右癱左瘓口眼喎斜半身不遂服此藥並無此病見治者補五臓分隂陽止咳𠻳􅂇聲音駐顔色黒髭髮明耳目不忘記添精髓壮筋骨羙食去一切風人參二兩白茯苓逺志去心牛膝酒浸杜仲炒絲黄耆菖蒲當歸蒼术泔浸去皮甘菊花地骨皮各一兩天麻半夏製生地黄熟地黄益智仁萆薢酒浸羗活各半兩右為細末酒糊為丸如梧桐子大每服三五十丸空心以温酒送下䟱風順氣丸出聖生堂方順三焦和五臓潤腸胃除風氣又治冷熱壅結津液耗少令人大便閉塞不通及年髙氣弱及有風人大便閉澁尤宜服之大黄五兩半生半熟車前子二兩半㯽榔二兩大麻子三兩山藥二兩郁李仁二兩兎絲子酒浸牛膝酒浸木香蓯蓉酒浸白茯苓續斷防風枳殻炒獨活人參白术甘草各一兩右為細末蜜為丸如梧桐子大每服三十五丸加至五十丸温水送下不拘時侯此方加味補藥在内用之屢驗雙丸子出王氏博濟方治癱瘓一切風疾傷寒等症烏蛇酒浸去皮骨炙天麻蝎稍全者天南星炮原蚕蛾炒犀角鎊羚羊角屑鎊丹砂研藿香葉白檀香零陵香各一兩天雄尖麝香研各半兩牛黄研雄黄研各一兩狐肝一具水煑薄切焙乾别研烏鵶一隻去嘴爪腸肚於磁礶内燒為灰别研羅入諸藥末内用右除别研外搗羅為末與别研者加勻煉蜜和杵三五百下用磁器盛每服二丸薄荷湯下大人如白豆丸大小兒如菉豆大卒患併三服癱瘓中風入膩粉少許水調同藥化下小兒驚風金銀薄荷湯下婦人血風産後中風手足拘攣當歸紅花酒下傷寒豆淋酒下三五丸防風通聖散一名防風湯出儒門事親書治一切風熱怫欝致氣血壅滯筋脈拘倦肢體焦痿頭目昏眩腰脊强痛耳鳴鼻塞口苦舌乾咽嗌不利胸膈痞悶咳嗽喘滿涕唾稠粘腸胃燥澁便溺淋閟或夜卧寝汗咬牙睡語筋愓驚悸或腸胃怫熱欝結水液不能浸潤於周身而但為小便多出者或濕熱内餘而時有溏泄者或因忘液而成燥淋閟者或因膓胃燥欝水液不能宣行於外反以停温而泄或燥濕徃來時結時泄者表之陽和正氣衛氣是也與邪熱相合并入於裏陽似隂而寒戰煩渴者表氣虚故戰裏熱甚故渇或瘧氣久不已者經言邪熱與衞氣并入於裏則寒戰并出于表則發熱并則病作離則病已或風熱走注疼痛麻痺者或腎水真隂損虛心火邪熱暴而僵仆或卒中久不愈者或一切暴瘖不語或語中不出聲或暗風癎病或洗頭風或破中風或諸潮搐并小兒諸疳積熱驚風或斑疹未出與驚風積熱傷寒疫癘不能别辨者或熱甚怫結反出不决者或熱極黑陷将欲死者或大人小兒風熱瘡疥久不愈者或頭生白屑徧身初黑紫白斑駮或白嘴紫赤風刺疥呼為肺風者或成癘風世傳為大風疾者或腸風痔漏并飲酒過熱毒兼解利諸邪所傷及調理傷寒發汗不解或不經發汗頭項身體疼痛者并兩感證兼治産後血液損虗以致隂氣衰殘陽氣欝甚為諸熱證腹痛喘悶譫妄驚狂或熱極生風而風熱燥欝舌强口噤筋惕肉瞤一切風熱燥欝惡物腹滿實痛而昏惑者惡物過多而不止者不宜服兼消風除大小瘡及惡毒兼治墜墮打撲損傷疼痛或因而熱結大小便澁滯不通或腰腹急痛腹滿喘悶者並宜服之通聖散益元散各十錢名通氣防風湯又名䨇解散防風半兩石膏一兩川芎半兩滑石三兩當歸半兩焙芍藥半兩生甘草二兩剉炒大黄半兩荆芥穗一分薄荷葉半兩羅净麻黄半兩去根不去節白术一兩山梔子一分連翹半兩黃芩一兩芒硝半兩盆硝是也桔梗右為細末每服二三錢水一中盞生薑三片煎至三分濾汁温服無時日三服病甚者服五七錢或得利更妙利後却如常服以意加減無生薑亦得或常服難以煎藥即為極細末温水調下二三錢或兼涎吐者加半夏半兩生切作片子不可無生薑煎亦得作細末調下凡小兒服大人藥一服分三服透空丸出御藥院方治男子婦人一切諸風頑麻疼痛上攻頭目下脚腰手背顫動香附子藁本藿香葉地龍去土炒川芎白殭蚕炒乾薑炮甘草炙乾蝎天麻去苖各一兩白芷炙七錢天南星生薑製各一兩神麴碎炒二兩半茴香炒麥蘖净炒各三兩胡椒一兩川烏頭炮製一兩二錢右為末每藥末三兩白麫六水和就丸小彈子大相連排放自空夏月新瓦上發每服一丸細嚼茶酒化下食前服太乙丹出聖惠方治一切風川烏頭生用去皮臍乾蝎微炒白殭蚕生用天麻天南星生用羗活躑躅硃砂細研半兩乳香已上各一兩白附子半兩生用附子去皮臍生用牛黄細研雄黄細研已上各一兩安息香一兩半麝香一分細研白花蛇肉二兩半酒浸炙微黄龍腦半分細研右搗羅為末入研了藥令勻别以麻黄去根節搗碎以酒五升煎至二升去滓入糯米粉一兩更熬成膏次下諸藥杵五七百杵丸如菉豆大以膩粉内滚過令乾每服以温酒下七丸忌動風物換骨丹出御藥院方療血滯不流衞氣不通風寒濕氣相搏筋血之間内舍偏虚發不遂之病氣感八風血凝五痺筋攣骨痛癱瘓偏枯一切風症並皆治之服之神妙難以言宣槐角子炒黄熟桑白皮去粗皮炙川芎蒼术白芷蔓荆子去蕚人參葳靈仙何首烏防風各二兩五味子硃砂水飛香附子苦參各一兩麝香半兩另研麻黄一斤十兩右将麻黄去根不去節用河水三石三斗三升小斗七升是也熬六斗濾去麻黄澄清再熬至二升半入其餘藥毎一兩三錢作一十丸硃砂為衣毎服一丸用温水一盞浸至晩溶化開卧服之神清無睡是藥之驗須臾隔五日服之如中風無汗宜服若體虚自汗服之是重耗津液也若風盛人如宻室温卧取汗太乙散出御藥院方治陽明經虚風邪外入令人口眼喎斜麻木不仁及驚風癎痓手足搐搦不省人事獨活蓁艽並去蘆頭川芎熟地黄乾甘草炒各一兩半剉人參防風當歸並去蘆頭肉桂去粗皮白茯苓去黒皮黑附子炮去皮臍杜仲炒去絲牛膝酒浸一宿白芍藥續斷細辛去苖葉土各一兩右為細末每服三錢水一大盞煎至七分去滓温服無時蒼耳酒去皮節頭足諸熱風藥性冷不便熱以六月以後收取晒乾至九月剉一大斛煑取四斗漬二大斗麴三度緫以米一大斗漬三日如凡醸法將息酘之酒熱日三二服五合凡諸風骨髓中風若差或發瘡瘡差後皮痛膚堅實光恱脚甚便若虚弱羸瘦弱人無問男女加生地黄五大升杏仁一大升去皮尖荆根若子二大升松葉五大升枸杞根五大升杏仁一大升去皮尖荆根若子二大升水三大石别煑牛膝丹參松葉子取六大斗并蒼耳汁緫一石漬五斗麴用米二石五斗分四度酘杏仁末煑第一酘飯中下生地黄搗如泥著第二酘飯中下天門冬蒸熟剥去皮搗如泥著第三酘飯中下又大麻子一斗搗碎著第四酘飯中下去皮膚風補虚大良效多頭風者得甘菊花一升漬第五酘糟中下攪之調酒熱大小同服並得餘無禁忌毒魚肉並勿食有藥處可辦無藥處可蒼耳為本如或少三兩物亦得不必俱偹年常醸至三月服極攘衆疾復延齡輕身将漬石斛等藥酒彌佳忌鯉魚蕪荑單醸䑕粘根酒和蒼耳單酒法大治風疼痒止咳嗽消痰癖差疸瘻亦是良藥脚氣人作漬側子等酒彌佳一名牛蒡根草名惡實根又患眼昏頭旋彌甚氣滿背痛取煎蒼耳酒漬此後藥獨活山茱茰天門冬去心黃耆甘菊花防風天雄炮側子炮防己白术茯苓牛膝各四兩枸杞三兩丹參四兩生薑六兩磁石十兩綿褁貫衆三兩生地黃八兩切右切以絹袋盛酒二大斗漬七日温服一盞日二三服忌猪魚陳臭物除脚氣去酒風忌冷水桃李雀肉鯉魚蕪荑酢石斛散出濟生方治大風四肢不收不能自反覆兩肩疼痛身重脛強急筋腫不能行時寒熱足踹如刀刺痛身不能自任此皆得之飲酒中大風露卧濕地寒從下腰以下冷不足無子精虚衆脈寒隂下濕熱莖消令人不樂恍惚時悲此藥除風輕身益氣眀目強隂令人有子補不足方石斛二分牛膝二分附子炮製去皮臍杜仲各四分栢子仁石龍芮芍藥粉子雲母粉山茱茰澤㵼萆薢兎絲子酒浸防風細辛各二分桂心三分右治下篩酒服方寸以日再隂不起倍兎絲杜仲腹中痛倍芍藥膝中痛倍牛膝眥痛倍萆薢腰中痛倍防風少氣倍栢子仁厥足不能行倍澤㵼隨病所在倍三分亦可為丸以棗膏丸如梧桐子酒服七丸一方無松枝丸風湯治諸風疾天台烏沉香少許香附子甘草陳皮青皮五分木香木通㯽榔厚朴桂皮人參藿香白茯苓半夏菖蒲各等分右每服水一盞半生薑三片棗二枚煎八分不拘時通口服滓再煎天仙聖化丹治一切風症川芎防風羗活獨活各一兩胡麻子㣲炒金毛狗脊去毛苦參去皮猪牙皂角微炒各一兩二錢半剉當歸一兩半荆芥陳者蟬退去土全蝎全者殭蚕直者炒何首烏新者香白芷蒼耳草蒸各半兩右為細末用大楓子二觔去殻爛杵如泥與前和勻用陳皮擂粉粉打糊為丸如梧桐子大每服四十丸加至六十丸如病人面上浮腫眉中痒不止或是風氣攀睛手足拘攣先服此藥一料亦用藥滓送下茶清尤得日進四服空心食後午候臨卧服之或病人四肢麻木手足刺痛脚腿上生瘡服奪命丹一料後服聖化丹藥十日後仍用白薄磁碗打針先於面上放血次入膊後放腿脚上血如遇天道晴明五六日間如此放血一次量病輕重不可放血太多若婦人患病放多不妨天兹奪命丹當歸味甘者佳辣者不用酒微浸洗防風去蘆頭資州順徳者佳川芎道地雀腦者入手沉重者餘芎不用羗活皮黒體輕竹節者佳金毛狗脊新者去毛浸軟切獨活形如當歸者佳川者右等分晒乾碾為極細末用新大楓子四斤去殻不用將肉爛杵如泥入前末子藥和勻用陳米飯杵爛和藥為丸如梧桐子大每服五十丸至七十丸病在下煎藥去滓空心送下食後用茶清送下若病在上可空心用茶清送下食後臨睡以煎藥送之日進三四服切忌發風動氣毒物止食白粥白飯大忌房事治一切風疾及眼昏胡麻葳靈仙何首烏苦參甘草石菖蒲右六味各等分研為細末每服一錢温酒一盞食後臨卧調服之天麻丸出聖惠方治一切風天麻二兩芎藭一兩羗活一兩桂心一兩藁本一兩去苗附子一兩炮製去皮臍防風去蘆頭細辛一兩乾蝎半兩微炒白附子炮製半兩犀角屑半兩牛黄一分細研雄黄半兩細研麝香一分細研龍腦一分細研硃砂一兩細研水飛過右搗羅為末入研了藥都研令勻煉蜜和搗三二百杵丸如梧桐子大每服以温酒或薄荷湯嚼下十丸如卒中風不語口噤不識人迷悶者研化服之狐肝丸出聖惠方治一切風狐肝一具烏鵶一隻去嘴爪肚腸照乾共狐肝一處入瓶燒為灰天南星半兩炮製天麻一兩藿香一兩白附子一兩炮製烏蛇二兩酒浸去皮骨炙微黄桑螵蛸一兩微炒乾蝎一兩微炒白殭蚕一兩微炒烏藥一兩麝香半兩細研白蒺䔧一兩微炒去刺硃砂半兩細研水飛過牛黄一分細研蟬殻半兩右搗羅為末煉蜜和搗三五百杵丸如菉豆大每服以温酒下十丸檉枝煎出聖惠方治一切風嫩檉枝三斤牛蒡根五斤已上二味細剉以水五斗煑待牛蒡根爛至二斗以来即去滓澄濾用煎後藥石榴二十顆和皮搗碎如非時即用枝二斤代之生木瓜二顆和皮細切如無生者即用乾者倍用代之桑根白皮五兩如無以桑根細切代之羚羊角屑三兩生薑三兩細切烏鷄糞一兩已上六味以煎檉枝汁煎之至五升濾滓入後藥末烏蛇三兩酒浸去皮骨炙微黄天麻一兩羗活一兩防風一兩去蘆頭桂心一兩去蘆頭白蒺䔧一兩仙靈脾一兩附子一兩生去皮臍右搗羅為散入煎中别入好酒二升白蜜一升以慢火熬用栁木棍不住手攪令稀稠得所以磁器盛每服空心及晩食前温酒調下一茶匙忌毒魚動風物茄子根浸酒方出聖惠方治風利闗節治頑麻除痛疼去攣縮強腰膝乾茄子根二斤未著霜者細剉飯上蒸一炊時蒼耳子一升微炒搗碎牛膝一斤去苖䑕粘子一升微炒搗碎大麻子一升微炒搗碎牛蒡根一斤切酥炒黃防風三兩去蘆萆薢二兩晩蚕蛾半升微炒枸杞子半升一半微炒一半生用敗龜二兩酥塗炙微黄搗為末桔梗一兩去蘆頭虎脛骨二兩塗酥炙黄搗為末羗活二兩秦艽二兩去苗附子二兩炒製去皮劑右件藥都細剉以生絹袋盛用好酒三斗浸一磁瓶盛宻封經二七日開之開時不得面對瓶口每日空腹日午初夜量力温服一盞候重者不過一劑差忌毒滑魚肉等物續命煑散出千金方治風輕重皆主之麻黄芎藭獨活防己甘草杏仁各三兩桂心附子茯苓升麻黄細辛人參防風各三兩石膏五兩白术四兩右粗篩下以五方寸匕内小絹袋子中以水四升和生薑三兩煑取二升半分三服日日勿絶慎風冷大良吾嘗中風言語蹇澀四肢嚲曵處此方日服四服日夜服之不絶得愈乳香丸出和濟方治一切風疾左癱右瘓口眼喎斜半身不遂語言蹇澁精神恍惚痰涎壅塞手足嚲曵筋脈拘攣或遍身頑痺走注疼痛脚膝緩弱行歩艱辛又治撲傷破損瘀血不散痛不可忍或行路勞損脚膝浮腫疼痛或腎臓風毒上攻面腫耳鳴下疰脚膝沉重並皆治之糯米炒川烏頭炮去皮尖五靈脂去泥土各三兩乳香研白芷剉藿香葉洗天南星炮沒藥研荆芥去皮根赤小豆生骨碎補去毛白附子炮各一兩松脂研半兩香墨煆草烏頭炮去皮臍各五兩右為細末酒煑麵糊丸如梧桐子大每服十丸至二十丸冷酒吞下清茶亦得不拘時忌熱物一時辰黑神丸川芎四箇南星一兩製半夏二錢半薑製天麻半兩炮製防風四兩何首烏四兩米泔水浸一宿去皮甘松四兩洗净白芷六兩大者川烏半兩炮製過華隂細辛二兩净甘草二兩炮桔梗四兩桂半兩去皮皂角絃二斤燒灰四兩存性乾薑一兩炮右為細末蜜打糯米粉子為劑用棒搥打一千餘搥勻為丸鷄頭大每服二三十丸不拘時候如風疾左癱右瘓口眼喎斜不省人事筋骨疼痛手足戰動芝麻汁或䓤湯送下頭痛暗風茶清下肝腎攻衝脾胃虚弱温酒下小兒天弔風倒地不醒濃煎薑湯下冷氣攻衝心腹疼痛生薑湯下㵼痢甘草湯下瘧疾烏梅湯下風牙細嚼填牙竅内婦人血氣風當歸湯下小兒驚風加輕粉少許薄荷湯下衝冐霜露不伏水土山嵐瘴氣當噙化常服之立效黒虎丹治諸風神驗蒼术米泔浸七日川烏煨草烏米泔浸去皮煨細辛防風荆芥麻黄兩頭尖金釵石斛天麻川芎白芷甘草何首烏當歸已上各一兩右為細末煉蜜為丸如彈子大每服一丸隨飲自送治男子婦女三十六種風疾眉毛退落冷茶送下腰痛耳聾腎臓風荆芥湯送下遍身紫癜風防風湯送下飲食無味脾胃風皂角子湯送下手心退皮皷掌風天麻湯送下迎風冷淚肝臓風米泔水送下筋骨疼痛氣不住乳香湯下口眼喎斜葱湯下指節破裂斷風塩白湯下心腹脹悶胸膈塞氣風生薑湯下前後倒卧地感厥風生薑湯下發狂吐沬急緩風荆芥湯下五般淋瀝腎患風塩白湯下資夀黒龍丸一名黒龍丸出簡易方治諸風疾夫風之為病半身不遂口眼喎斜手足拘攣或身殭嚲曵語言蹇澁心頭驚悸其狀多喘各隨所中此由氣血俱虚腠理踈弱風邪外中真氣失守邪正相干而生焉自然銅一斤好者杵碎用生鐡銚子内以炭火一秤漸熖火起聞腥氣又聞似硫黄氣其藥成俟冷取出如藥有五色者即其妙也後安向净黄濕土上著紙先襯其藥盆子合之不得通風一宿出火毒乳鉢内研細以水净淘又取濃者三五度淘澄定去清水用新瓦盆内将紙襯著令白乾如黑粉亦同秤六七兩用之候炮製後藥了當却入川烏四兩畧炮麻黄三兩去節黑附子炮製烏蛇酒浸一宿去皮骨炙厚朴去皮薑汁煑防風蒼术麩炒川芎陳皮白芷白术炒黄各二兩芍藥一兩半南星半兩吳茱茰兩半右為末與自然銅粉相和勻搗細入煉蜜丸如梧桐子大臘月令甚妙男女中風癱瘓半身不遂起止不能者空心服臨卧豆淋酒下一粒六十日内必差男女患筋骨腰膝疼痛走疰不定坐即刺腰卧即刺背行即入脚跟亦用豆淋酒下須臾以葱粥一盞投之衣被盖覆出汗然後更喫一粒必差如或患五七日間未得汗亦如前法服纔入口汗即出便安依法服二十日定愈治破傷風頑麻風暗風偏風並用豆淋酒下一粒至二粒即見功効丈夫元臓氣痛臍下掫痛不可忍者以㯽榔一箇酒磨一半入生薑自然汁少許同煎五七沸研二粒服之須􅁷以小麩麥醋拌炒熨臍下便止治痃癖氣發不省搐得兩膝相就用㯽榔一箇酒磨一半入生薑自然汁少許同煎五七沸中分破一半生用一半炙黄用酒盞飲非氣非温但能治腰以上疾若腰以下則藥力不至可服三服而愈一方治腰疾加海桐皮當歸赤芍藥三味各二兩腰以下疾則食前服以上疾則食後服一方有乾蝎炒一兩半服之白花蛇丸出聖惠方治一切風白花蛇肉三兩酒浸炙微黄晩蚕蛾微炒天南星炮製白殭蚕微炒當歸桂心萆薢剉藁本附子炮製去皮臍白附子炮製天麻羗活芎藭防風麻黄去根節已上各一兩右搗羅為末煉蜜和搗三二百杵丸如梧桐子大每於夜臨卧時以熱酒服十丸以衣被厚盖勿令通風要知藥力行即須臾汗出如無汗即依前再服以汗出為度仍須避風為妙天蓼木煎出聖惠方治一切諸風天蓼木五斤細剉以水三斗煎至一斗濾去滓却熬取五升赤箭獨活防風去蘆頭芎藭仙靈脾牛膝去苗天雄去皮山茱茰巴㦸萆薢剉茵芋海桐皮桂心沉香已上各一兩右搗羅為末入白蜜五合相和於銀鍋中慢火熬以栁木箆攪令稀稠得所以磁器盛每服以温酒調下一茶匙空心及晩食前服陳厚膏出御藥院方治諸風拘攣疼痛麻痺不仁風瘙痒疥癬腹中疼痛積聚並可治之當歸切三兩硃砂研飛細辛去土川芎各二兩天雄二兩二銖附子十二銖如指面大桂去粗皮一兩二銖松脂半斤雄黄三兩二銖乾薑三兩十七銖米醋二升白芷剉細二兩生地黄二斤研取汁猪肪脂十斤去筋膜切作指大右以地黄汁大米醋清丸味一宿并脂合煎之十五沸膏成新綿濾去滓入雄黄硃砂攪令勻凝切忌小兒婦人六畜見之每用少許摩擦患處熱徹為度又治面目黧黒消瘦是心腹積冷酒調半匙日三服病無不愈一方有川烏續治獨命湯出御藥院方治卒暴中風不省人事漸覺半身不遂口眼喎斜手足戰掉語言蹇澁體麻痺精昏亂頭目眩重痰涎併多筋脈拘攣不能屈伸骨節煩疼不能轉側又治諸風服之皆驗若治脚氣緩弱久服得瘥久病風人每遇天色隂晦節候變更宜先服之以防瘖瘂麻黄去根節人參去蘆頭黄芩芍藥芎藭甘草剉爁一兩杏仁去皮尖炒黄細切桂各一兩防風去蘆頭一兩半附子炮皮臍去一兩防己白花蛇肉獨活乾蝎各三錢右為粗末每三錢以水一盞半生薑五片煎取一盞去滓稍熱食前服剪刀股丸治一切風白茯苓二兩山芋半兩天麻半兩防風二兩全蝎半兩羗活一兩半川芎一兩甘草二兩麥門冬半兩鐵艶粉二錢半白附子半兩殭蚕二錢半硃砂麝香少許右為細末水調服之或煎飲亦可治風浸酒方出得生堂防風秦艽白茯苓羗活牛膝人參各一兩半夏蚕明净者一兩鱉甲炙西枸杞各三兩半當歸松節虎骨酥各一兩茄根四兩飯甑上蒸熱右㕮咀作一服用生絹袋盛藥以好酒二大瓶浸之過一十四日後開瓶毎日早午晚各飲一盞酒浸以其藥滓曬乾再碾為末酒糊為丸如梧桐子大每服五十丸下不拘時白花蛇散出聖惠方治一切風白花蛇肉酒浸二兩炙微黄白殭蚕一兩微炒麝香一分細研硃砂一兩細研羌活二兩秦艽一兩去蘆附子一兩炮製去皮臍桂心一兩當歸一兩牛膝一兩去苗芎藭一兩萆薢一兩微炒乾蝎一兩微炒防風一兩去蘆頭右搗羅為散入研了藥更研令匀每服以煖酒調下一錢忌生冷鷄猪肉等乳香沒藥丸一名通經治絡丹出和濟方治男子婦人一切風氣經絡活血脈治筋骨疼痛手足麻痺半身不遂暗風頭旋偏正頭風小中急風手足疼痛牙闗𦂳急四體軟弱腎臓風毒上攻頭面下疰腰脚生瘡徧體疼酸並宜服之橅芎一百八兩躑躅花炒木鼈白膠香揀净藿香揀炒白殭蚕洗焙五靈脂揀白芷揀當歸各七十二兩地龍一百四十兩何首烏二百四十四兩葳靈仙洗二百二十二兩草烏頭炒六百四十八兩右為末醋糊丸如梧桐子大每服五丸不可多服食後用薄荷茶下温酒亦得有孕婦人不可服乳香應痛丸出和濟方治一切風氣左癱右瘓口眼喎斜半身不遂語言蹇澁精神恍惚痰涎壅塞筋骨拘攣或遍身頑痺走疰疼痛脚膝緩弱行歩艱難又治打破傷損瘀血不散痛不可忍或路勞傷脚膝浮腫疼痛或腎臓風虚上攻面腫耳鳴下疰脚膝沉重又治偏正頭疼攻疰眼目並皆治之龍骨酒浸一宿焙乾研粉水飛三度晒乾四兩半赤小豆生用蜈蚣六條去尾針以薄荷葉褁煨熟虎骨酥炙焦各六兩白殭蚕炒去絲嘴草烏頭炮去皮尖各十二兩白膠香揀净過天麻去蘆洗三兩川牛膝酒浸去蘆各三兩全蝎去尾針㣲炙七十斤川當歸酒浸去蘆頭各三兩乳香研六錢木鼈大仁七十二個别研右為細末用醋糊為丸如梧桐子大每服五丸至七丸泠酒吞下或冷茶清下亦得不計時候忌諸熱物一時辰久此藥但卧睡服尤妙忌温麵炙煿酢脯發熱動風等物大防風湯出醫藥集成祛風順氣活血脈壮筋骨除寒温逐冷氣善發寺僧如真師孫遂良紹熙季年患痢後脚疼瘓弱不能行履名曰痢風或兩膝腫大痛髀脛枯腊但有皮骨拘攣跧卧不能屈伸名曰痢風或兩鶴膝風服之氣血流暢肌肉漸生自然行履如故真竒方也川芎撫芎不用附子炮去皮臍各一兩半熟乾地黄洗净白术防風去蘆當歸洗去蘆酒浸焙乾炒白芍藥黄耆微炙杜仲去粗皮炒絲斷各一兩羗活去蘆人參去蘆甘草炙牛膝去蘆酒浸切微炒各一兩右為粗末每服五錢水一盞半入生薑七片大枣一枚同煎八分去滓温服空心食前或云四物湯下四斤亦效鐵彈丸出三因方治男子婦人一切風疾無問逺近癱緩中風口眼喎斜言語蹇澁手足戰曳難以稱舉或發搐瘈或如蟲行或失音不語牙闗𦂳急脚不能行身體頑麻百節疼痛精神不爽頭虚煩悶夜卧不安多言胸膈不利口乾眼澁多困少力如破傷風身如角弓口噤不開作汗如油及洗頭風腦重眉梁骨痛卒中不語迷悶兼白癜風徧身癮疹鼻多清涕耳作蟬鳴小兒驚風夭弔搐搦婦人血風手足頑熱夜多虚汗頭旋倒地並皆治之白附子炮沒藥别研虎脛骨酒浸一宿乾炙全蝎去尾刺炒烏頭炮去皮炙麻黄不去節自然銅燒存性醋浸一宿各一兩白花蛇酒浸半兩辰砂别研一分五靈脂一分腦麝一分别研木鱉子二十箇去皮别研不入羅乳香栁木搥碎右為末蜜丸如彈子大用無灰酒一升浸一丸分二十服傷風鼻塞分三十服空心臨卧各一服大風五丸可安大黄丸出聖濟總目治三十六種風大黄剉蔓荆實桂去粗皮麻黄去根節湯煑掠去沫各一兩羗活去蘆芎藭各一兩半防己白附子炮各二兩半雄黄研空青研各半兩膩粉研麝香研各五分白花蛇酒浸去皮骨炙乾三兩右為末煉蜜和丸如梧桐子大每服三十丸温酒下服訖飲三兩盞以衣覆出汗如膠後每夜七丸四十日愈仙靈脾煎出聖惠方治一切風仙靈脾一斤細切酒七升煮至三升濾去滓入後藥末附子二兩炮製去皮臍肉桂二兩去皺皮赤芍藥牛黄鹿角膠搗碎炒令微燥萆薢剉五加皮酸棗仁石斛去根剉當歸木香乳香已上各一兩右搗為末於銀鍋中入前煎在内次入白蜜五合下諸藥末用慢火熬以柳木箆不住手攪令稀稠得所収入磁器中盛每食前以温酒調下一茶匙忌猪鷄牛黄小烏犀丸出和濟方治諸風筋脈拘急手足