月者若半得駞脂尤好去脂膜煎脂化去滓放冷右件藥幷細切如大豆頭醋微淹之經一宿煎猪脂化去滓内藥慢火煎之候附子黄色即膏成収磁合中有風者頻取摩之宜用衣遮䕶避風冷金牙酒出千金方療積年八風五疰舉身嚲曳不得轉側行步跛不能収攝又暴口噤失音言語不正四肢背脊筋急腫痛流走不常勞冷積聚少氣乍寒乍熱三焦不和脾胃不磨飲澼結實逆害飲食酢咽嘔吐食不生肌醫所能治之金牙碎米粒用小絹袋盛地膚子無子用薑一方用蛇床子乾地黄蒴藋根附子防風細辛芥草細各四兩蜀椒各四合羌活一斤一方用獨活右㕮咀盛以絹袋用酒四斗於磁缶中清宻盖頭勿令洩氣春夏三四秋冬六七宿酒盛去滓日服一合此酒無毒極可小醉常令酒氣相接不一劑病無不愈又令人肥健酒盡自可加諸藥各三兩惟蜀椒五兩用酒如前勿加金牙也冷加乾薑四兩服此酒勝炙刺治三十諸風嚲曵神驗肘後背急用升麻乾薑各四兩人參二兩石斛牛膝各四兩五兩不用蒴藋根為十四味蘇恭不用地黄為十三味一方用蒺䔧四兩黄茋三兩胡哈用續斷四兩為十一味千金翼用茵芋四兩芥草灌酒出聖惠方除風氣通血脉益精華定六腑眀耳目恱澤顔色頭白更黒齒落更生服藥二十日力勢倍六十日志氣充盈八十日能晝夜百日致神明房中強壯如三十日時能引弩年八十人服之亦當有子病在腰膝藥悉主之天雄二兩生用啇陸根躑躅蜀椒各一兩烏頭一枚大者附子五枚桂心白歛茵芋乾薑各三兩右㕮咀以絹袋盛酒三斗漬春夏五日秋冬七日去滓初服半合稍加至兩三合搗滓為散酒服方寸匕日三以知為度夏日恐酒酸以油單覆之下井中近水冷不酸也一方無啇陸桂心為八味一方無啇陸有牛膝名天雄浸酒方忌生冷鷄猪肉豆豉烏藥順氣散出三因方治男子婦人一切風氣攻疰四肢骨節酸痛遍身頑麻頭目眩暈及療卒中風手足癱瘓語言蹇澁筋骨拘攣又治脚氣步履難脚膝軟弱婦人血風老人冷氣上攻胷臆兩肘刺痛心腹膨脹吐㵼腸鳴先宜多服此藥以踈氣道然後隨證投以風藥麻黄去根節陳皮去穰烏藥去木各二兩白殭蚕去絲嘴炒川芎炒枳殻去穰麩炒甘草炒白芷桔梗一兩乾薑炮半兩右為細末每服三錢水一盞半生薑三片棗一枚煎至七分温服如四時傷寒増寒吐熱頭痛肢體倦怠加葱白三寸同煎併服出汗見效如閃剉身體疼痛温酒服遍身瘙痒抓之成瘡用薄荷三葉煎服孕婦不可服常服踈風順氣黑神丸出和濟方治一切風疾及癱瘓風手足顫掉渾身麻痺肩背拘急骨節疼痛兼療婦人血風頭旋眼暈精神困倦牡丹皮白芍藥川芎草烏炮各六兩麻黄去節各四兩赤芍藥甘草各十兩荆芥烏頭八兩何首烏米泔浸切焙十二兩右為細末水糊為丸如鷄頭大每服一丸細嚼茶酒任下不拘時婦人血風流注用黑豆淋酒下小兒驚風用金銀湯下傷風咳嗽酒煎麻黄下頭痛葱下搜風丸一名人參半夏丸出儒門亊親治諸風疾人參茯苓南星各半兩蛤粉二兩半夏乾生薑剉白礬剉水石各一兩薄荷半兩藿香一分右為細末水丸如豌豆大每服三十丸生薑湯下之㗜藥下卧丸出瑞竹堂方治一切風疾藿香石藋花黄者人參藜蘆去苖葉取根芍藥糓精草苦丁香石膏研川芎甘草右等分為細末每用三字口噙水左右鼻内搐之作涕為效櫻桃丸治手足一切風疾川烏一隻大者生用去皮羗活一兩麝香五分另研腦子五分另研草烏半錢去皮生用川獨活一兩當歸一兩半去蘆海桐皮一兩半去皮一兩净葳靈仙一兩半去蘆一兩净硃砂一兩細研一半為衣一半入藥用右為粗末煉蜜為丸劑如鐵臼内杵二千餘下以不粘口為度丸如櫻桃大硃砂為衣每服一丸細嚼温酒嚥下食前卧服再合寜心丹治一切風白茯苓二兩山藥一兩半防風一兩羗活一兩川芎半兩香附白者二錢殭蚕二錢天麻半兩甘草一兩全蝎二十一枚右為細末煉蜜為丸如梧桐子大每服四十丸用温酒下或棗湯亦得鐵彈丸治風濕筋骨軟弱癱瘓一切風疾並皆治之乳香沒藥木鱉子白附子虎骨各二兩麝香二錢全蝎三兩麻黄去根節三兩草烏三兩自然銅一兩三錢右為細末用墨汁一錠磨汁為丸一兩作十丸用酒開服黑附子丸治癱瘓中風及婦人血風等疾附子去皮臍生烏頭去皮臍生虎脛骨塗酥炙五靈脂炒防風去蘆桂去粗皮海桐皮剉地龍炮狼毒生去蘆頭用猪血浸一宿炙乾用自然銅煆醋滓七次各四兩右為細末煉蜜丸如鷄頭大每服一丸爛嚼温酒下空心日午臨卧服通明赤丸治中風癱緩并柔風一切風疾烏蛇去頭骨去皮不用麻黄去根節白殭蚕各一兩白附子生用半夏湯浸去滑乾蝎炮天南星附子去皮臍各半兩麝香一分右並生用搗為末以湯浸槐膠研和為丸如大麻子大以生絹袋盛不得置合内亦不得以火焙常服每日空心薄荷酒下三丸微嚼破服覺藥衝煨甘草噙之如中風急以濕薄荷酒磨下五丸或七丸服之小兒中諸風癎或天弔風等以母乳磨一丸或兩丸量力服之天麻防風丸出直指方治一切諸風人參天麻防風各一兩全蝎炒半兩硃砂研雄黄研甘草炙各五分直殭蚕研半兩牛黄一錢麝香右為細末煉蜜為丸如梧桐子大每服二丸紫蘓薄荷湯下洗藥治一切諸風大風殻香白芷荆芥苦參何首烏川椒防風蒼耳草麻黄葱連根右用水桶煎藥湯取温煖處浴再煎滓添洗用被盖覆取汗出不可見風太一丹出傳信適用方治諸風及癱瘓偏風手足頑麻肢節緩弱骨脊疼痛并治頭風偏正頭痛項頸拘急頭旋目暈嘔吐痰水或耳鳴聾閉風痰上盛及療傷寒頭痛不可忍者並宜服之常服消化痰清頭目利胷膈川芎川烏去皮尖草烏去皮尖白芷白附子黒附子去皮臍細辛去葉洗半夏洗天南星洗天麻洗右等分並生用細末如藥二十四兩即入麵二十兩白者同拌勻滴水和丸如彈子大日中照乾毎服一粒茶酒任嚼下荆芥薄荷茶亦得如傷寒傷風頭目昏疼用葱白一莖同嚼熱茶清送下不計時候此藥用之甚妙大聖一粒金丹一名併命出和濟方治男子婦人一切風疾氣血俱虚隂陽偏撩卒暴中風僵仆昏塞涎潮搐搦不省人事失音項強手足嚲曵口眼喎斜癱瘓偏枯半身不遂語言蹇澁舉止錯亂四肢麻痺癲癎倒地目瞑不開涎盛作聲角弓反張目睛直視口噤悶絶牙闗𦂳急風搏陽經目眩頭痛耳内蟬鳴皮膚􅏌搐多困喜睡項強拘急不能四顧腎臓風脚膝疼痛歩履艱難徧流注一身屈伸不得此藥無問新久並治之有風疾常服尤佳補益五臓秘固真元通流闗節袪除風邪壯筋續骨大効白礬别研枯硃砂别研沒藥别研麝香净内各半兩五靈脂去石白殭蚕炒去絲白蒺䔧炒去刺各一兩大川烏頭去皮尖大黑附子並炒去皮臍新羅白附子炮二兩各為末右為細末合和用粉烟墨半兩井花水磨下汁搜丸每兩作六丸用金箔二百片為衣窨乾每一丸用生薑半兩取自然汁磨化用無灰酒煖熱半盞同藥温服量病人酒性多少更喫温酒一升二升投之以􅂇藥力次用衣被盖覆使卧汗出為効熱輕者半丸不拘時候葉氏於本方中去麝香増天麻防風乳香減沒藥硃砂白礬各一分餘依本治一切風及頭面諸風皮膚不仁癮疹手足頑麻名萬金丹一法於方前四味减半後六味等分製料服􅀈之法並同如病勢危急不睱求薑酒以白湯磨先擦牙齦牙闗寛便可灌藥下即甦亦名大聖一粒金丹本方中増防風一兩全蝎一分治中風癱瘓流涎不語手足麻痺痛癢不知名大聖鎮風丹一方有殭蚕孕婦不可服龍腦方出聖惠方治一切風龍腦一分細研雄黄半兩細研硃砂一分細研阿膠一分搗砂炒令黄燥丁香一分天南星一分炮製好墨半錠牛黄一分細研天竺黄一分細研右搗羅為末研令勻取三月三日以末蜜和丸如豇豆大每服以熱酒研一丸服之烏頭湯出千金方治八風五尸惡氣逰走心胷流出四肢来往不住短氣欲死烏頭芍藥乾薑桂心細辛乾地黄當歸呉茱茰甘草各二兩右㕮咀以水七升煑取二升半分三服清神散出和劑方消風壅化痰涎治頭目昏眩心忪面熱腦痛耳鳴鼻塞聲重口眼瞤動精神昏憒肢體疼倦頸項𦂳急心膈煩悶咽嗌不利檀香剉人參去蘆防風去苗各十一兩薄荷去土荆芥穗去土甘草爁各二十兩石膏研四十兩細辛去苖洗焙用五兩羗活去苗一十五兩右為細末每服二錢沸湯㸃服或入茶末㸃服亦得食服追風散出和劑方治證與前追風散同白殭蚕去絲嘴炒全蝎甘草荆芥各二兩川烏炮去皮臍防風去蘆頭石膏研各四兩川芎三兩麝香研一兩右為細末每五分好茶調下食後臨卧服常服清頭目利咽膈消風壅化痰涎磁石丸出仁存方治一切癱瘓暗風等疾磁石一兩石燕各一兩石碌半兩並煆醋淬七次雄黄輕粉硃砂牛黄各半兩麝香二錢右細研以好酒磁器内熬之可丸則丸入麝香一處丸如鷄頭大每服一丸荆芥薄荷酒化下如是大患風涎暗風昏迷不省者更入輕粉少許白礬半錢研用藥二丸磨盡作一服灌下便安服後便安服後有汗見效三日一服小兒一丸分三服定風餅子出醫方大成治風客陽經邪傷腠理背膂强直口眼喎斜體熱腰寒痰厥頭目疼痛肉瞤筋愓辛額鼻塞及飲酒過多嘔吐痰沫頭目眩暈如坐車船常服解五臓傷寒辟霧障氣爽惠神志諸風不生天麻川烏炮南星炮半夏炮川薑川芎白茯苓甘草防風右等分用生薑汁為丸如龍眼大揑作餅子硃砂為衣每服一餅細嚼薑湯下不以時候但不當生用仍須炮製預服最防風痰一方無防風大省風湯治諸虚風涎潮痰瘚神昏頭暈語澁手足搐搦半身不遂及歴節風痛筋脈攣急川芎半夏防風各一兩甘草炙半兩全蝎去毒三個附子生用皮臍川烏去皮臍木香南星各半兩右剉散每服四錢水一盞半生薑十片煎温服不拘時候氣虚加沉香氣逆加紫蘓胷膈不利有痰倍加半夏人參頭暈頭痛加天麻半兩全蝎二錢煎熱入麝香熱風左癱右瘓口眼喎斜口噤不能言手足頑麻於本方去附子川烏一方無防風五粒松酒浸方出聖惠方冬十月以法服大治諸風五粒松葉七片並大片麻黄七兩去節防風黄耆獨活炮秦艽各二兩牛膝四兩生地黄一斤芎藭二兩右以無灰清酒四大斗漬春七日冬二十日夏五日取酒服之大有效騐忌如藥法一方無芎藭黄耆有天雄肉桂加味苦參丸治一切風證苦參一斤荆芥半斤何首烏白殭蚕二兩香白芷川芎二兩赤芍藥二兩大黄一兩加白花蛇右為細末麵糊為丸如梧桐子大每服五十丸不拘時候温茶清下又方出聖惠方白附子一兩炮製白殭蚕乾蝎一兩半微炒蟬殻半兩天麻一兩羗活一兩防風一兩去蘆頭側子一兩炮製去皮麻黄右為末煉蜜和丸如菉豆大以膩粉滚過令乾如中風不語重者以煖酒研下十丸當有汗出即差如常服即空心温酒下五丸太白丹出聖惠方治一切風鹿角霜半兩磁藥七兩燒令通赤候冷搗羅細研水飛過蛤粉七兩天南星三兩炮製白蒺蔾三兩微炒去刺蛜􅀈三兩微炒麝香一兩半細研川烏頭二兩生用去皮臍白花蛇肉酒浸三兩炙微黄右為末入麝香研令勻以麵糊和搗五七百杵丸如鷄頭大每服以豆淋酒研下一丸龍腦丸出聖惠方治一切風龍腦一分細研麝香一分細研硃砂半兩細研天南星一分炮製白附子一分炮製半夏一分湯洗七遍去滑甘草一分炙微赤剉附子半兩炮製去皮臍川烏頭一分去皮臍炮製去滑右為末以糯米粥和丸如菉豆大每服以温酒下三丸獨活酒浸方出聖惠方治八風十二痺獨活四兩石南四兩防風三兩去蘆頭茵芋附子炮製去皮臍川烏頭炮製去皮臍天雄炮製去皮臍桂心一兩半牛膝去苗已上各一兩右細剉以生絹袋盛用好酒二斗漬經七日隨性溫飲一小盞勿令大醉以效為度經效䑕粘根浸酒方出聖惠方治風䑕粘根五斤掘時勿令見風宻房内净洗薄切宻瓮内隂乾防風五兩去蘆頭附子二兩炮製去皮臍獨活五兩漢防己二兩桂心二兩天麻二兩麻黄二兩去根節生地黄八兩右細剉用生絹袋盛以無灰酒三斗浸之宻封春夏七日秋冬二七日開每日空心服日午夜卧各温飲一小盞桑枝浸酒方出聖惠方治風花桑枝一斤垂栁枝一斤槐枝一斤羗活三兩牛膝三兩去苖黒豆一升炒熟附子三兩炮製去皮臍桂心三兩熟地黄三兩右細剉和勻以生絹袋盛用好酒五斗浸經七日後每日飲前後任性煖飲一二小盞不得令過度但醺醺然長有酒氣為妙忌生冷毒魚猪肉天腦天麻煎出和劑方治一切風及癱緩風半身不遂口眼喎斜語澁涎盛精神昏憒或筋脈拘攣遍身麻痺百節疼痛手足顫掉及腎臓風毒上攻頭面虛腫耳鳴重聴鼻塞口乾痰涎不利下疰腿膝緩弱腫痛生瘡又治婦人血風攻疰身體疼痛面浮肌瘦口苦舌乾頭旋目眩或皮膚瘙痒癮疹生瘡暗風偏正頭疼並皆治之甜𤓰子湯洗令净浮萍草揀洗净川烏炮去皮臍地魚去苗刮削令净黑參洗净焙各五十兩天麻去苗一百兩已上為細末用雪水白沙蚕各一十斤零十兩同化開用絹袋子濾過銀石器内慢火熬成稠膏生龍腦研八兩麝香研四兩右為細末除麝龍外用天烏頭膏和搜令匀放冷入龍麝再搜令匀入臼内搗千百杵搓為錠子每服一皂莢子大與薄荷同嚼茶酒任下不計時候治癱緩風併服見効如破傷風黑豆淋酒下須發汗用煨葱熱酒併三服常服亦得八風丹出和濟方治諸風及痰熱上攻頭痛面赤目眩旋運鼻塞咽乾頸不利痰涎唾稠濁精神如醉百節疼痛耳内蟬鳴面上遊風口眼蠕動滑石細研天麻酒浸各一兩龍腦研麝香研各一兩白殭蚕㣲炒白附子炮各半兩半夏白礬製二兩凝水石火燒通赤細研水飛半兩右為細末入研者藥同研勻煉蜜和丸如櫻桃大每服一丸細嚼温荆芥湯下茶清亦得食後服洗澡藥出御藥院方治淋滯一切諸風燥痒葳靈仙去土藁本去土藿香葉乾荷葉各十二兩零陵香炒茅香各十六兩甘松去土香白芷各八兩右為細末每用二兩生絹袋盛用水二桶約四斗煎三沸放稍熱放無風處淋渫了避風少時常用治遍身瘙痒光潤皮膚如水少時更添熱水斟酌得所使用只令添水藥末不添大辰砂丸出醫藥大成方淸頭目化痰涎利咽膈手足麻木肢節疼痛鼻塞聲重頭昏目眩項背拘急皮膚瘙痒卒生疹癮冐觸風寒服之天麻去苗川芎甘草炙硃砂為衣呉白芷各一兩防風去蘆頭細辛去苗葉土薄荷葉各半兩右為細末煉蜜丸如彈子大硃砂為衣每服一丸細嚼食後生薑湯下茶淸亦得龍腦川芎丸出御藥院方消風除熱化痰消滯通利七竅爽氣清神薄荷去土五兩三錢川芎甘草㣲炒防風去蘆頭桔梗一兩半龍腦研六錢縮砂仁二錢白豆蔲仁半兩右為細末入研藥勻煉蜜為丸每服二丸細嚼温茶清送下食後服之每兩可作二十丸防風湯出儒門事親治諸風疾防風麻黄獨活秦艽去苖黄芩石膏當歸去蘆白术各三兩右為粗末入半夏片子令攪勻每服四錢水二中盞入生薑七片煎至一盞去滓取清汁六分入麝香少許帶熱食後服清風散出儒門事親治諸風疾川芎羗活去蘆人參去蘆白茯苓去皮白殭蚕炒蟬殻去土各一兩厚朴去粗皮薑製陳皮去白各半兩右為細末每服二錢茶清調下拒風丸治風客陽經邪傷腠理背膂強直口眼喎斜體熱惡寒痰厥頭目疼痛肉瞤筋惕辛額鼻淵及飲酒過多嘔吐痰沫頭目眩暈如坐車船常服觧五臓傷寒爽神志諸風不生南星炮半夏炮各二兩川芎防風羗活獨活藁本細辛各一兩右為細末薑糊為丸如梧桐子大每服三十丸薑湯下食後服之真方白丸子治風可常服永無風疾隔壅之患大半夏湯炮七次白附子洗净畧炮天麻天南星洗净炮用川烏頭去皮尖炮全蝎去毒炒枳殻去穣炒木香各一兩右為細末生薑自然汁打糊為丸如梧桐子大每服一二十丸食後臨卧茶清熱水送下癱瘓風温酒下三日服小兒驚風薄荷湯下二丸觧語湯治中風客於心脾二經舌強不能言半身不遂口眼喎斜神氣不清一切風氣並皆治之附子炮防風去蘆天麻一方用赤箭酸棗仁炒各一兩羚羊角屑官桂各七錢半甘草炙羗活各半兩右為粗末每半兩水二盞煎八分去滓入竹瀝兩匙再煎三兩沸温服無時二滓併煎一方專治中風卒失音有赤箭無天麻名桂心散靈寳丹治一切諸風癱瘓傷風等疾川烏去皮尖畧炮五靈脂各三兩沒藥一兩半胡椒半兩木香炮乳香研硃砂研麝香各一分和硃砂為衣右前五味為細末擇辰日時取東方井水入乳香末和前藥末為丸如豆大將硃砂麝香為衣每服一粒生薑二片同嚼茶酒任下不拘時如傷風頭痛及胎風荆芥湯下龍腦雙丸治一切風天南星湯浸軟洗切焙半夏湯洗七次去滑切焙各半兩胡粉膩粉各一錢麝香龍腦各一分四味同研白殭蚕酒炒各分二味晒末右研勻稀糯米糊丸如皂子大每服一丸或二丸嚼破温酒下如急風口噤用青葱筒子灌於鼻内口立開大効蝎麝白丸子治男子婦人半身不遂手足頑麻口眼喎斜痰涎壅塞及一切風他藥不能治者小兒驚風大人頭風洗腦風婦人血風半夏七兩川烏一兩白附子二兩天南星三兩天麻一兩全蝎五錢防風一兩生麝香五分右為末薑汁糯米糊丸如桐子大每服一二十丸淡薑湯下無時吞下癱瘓風温酒下三日服一二日當有汗便能舒展經三五日類呵欠是應常服除風化痰治膈壅小兒驚風薄荷湯下三兩丸又方治一切風天麻天南星炮製白附子炮製白花蛇肉酒浸炙㣲黄附子炮製去皮臍白殭蚕微炒已上各一兩膩粉一分麝香一分右為末研入麝香膩粉煉蜜和搗二三百杵丸如梧桐子大以胡粉滚過每服以温酒下三丸忌毒滑物又方白附子一兩炮製天麻一兩雄雀糞一兩天南星酒拌炒令黄麝香細研乾蝎微炒水銀已上各一分以小棗穣研令星盡牛黄細研右為末研入水銀令勻以棗穣和丸如菉豆大入膩粉中滚過曬乾每服以温酒下三丸百靈牛膝煎治一切風不以近逺服之皆効百靈藤五斤細剉以水三斗煎至一斗濾去滓更煎三升牛膝去苖附子去皮赤箭仙靈脾何首烏鹿角膠乳香已上各二兩右為末入煎中别入白蜜五合同熬以栁木箆攪令勻如稀湯上收於磁器中每服以温酒調下一茶匙空心及晩食前服忌毒滑物七生丸治丈夫婦人三十六種風五般腰疼打撲傷損並入骨疼痛背膊拘急手足頑麻走疰不定筋脈攣縮久患風疾並皆療之地龍去土五靈脂去石松脂去木荆芥去枝梗川烏炮去皮臍天南星炮各一兩草烏炮去皮尖各二兩右為末醋煑麵糊為丸如梧桐子大每服五丸至七服茶湯任下孕婦不可服温酒送下亦可川芎散治諸風疾川芎荆芥甘菊薄荷蟬殻蔓荆子各二兩甘草一兩炙右為細末茶酒任下二三錢食後服愈風丹出瑞竹堂方治諸風証偏正頭風通聖散四物湯黄連觧毒湯各一料加後藥羗活細辛去葉甘菊天麻何首烏薄荷獨活已上各一兩右為細末煉蜜為丸如彈子大每服一丸細嚼不拘時侯茶酒下靈龍丹治一切風疾麝香一兩乳香五兩地龍五兩白膠香七兩烏頭五兩木鱉子十二兩五靈脂四十兩右為極細末酒糊為丸如彈子大每服一丸酒化服之用辰年辰時生人修合防風湯出濟生拔萃方治風寒汗出肩背痛中風小便數而欠者風熱盛使肺氣欝甚也當㵼風熱以通氣柴胡升麻黄耆各一錢羗活防風橘皮人參甘草各半兩青皮黄蘖白豆蔲已上各二分藁本三兩右㕮咀都作一服水二盞煎至一盞去滓温服食後氣甚者宜服面白脫色氣短者勿服之小便遺失者肺氣虚也宜安卧飬氣禁勞役以黄耆人參之類補之不愈當清其熱加黄蘖地黄肩背痛不可廻顧此手太陽欝而不行風藥散之如或目痛項強腰似㧞上衝羗活勝濕湯及足太陽經不行也以羗活勝濕湯主之羗活勝濕湯出濟生拔粹方羗活一錢獨活一錢藁本防風各半兩蔓荆子三分川芎二分甘草炙五分右㕮咀都作一服水二盞煎至一盞去滓温服食後如身重腰沉沉然乃經中有濕熱也更加黄蘖一錢附子半錢蒼术二錢如腿脚沉重無力者加酒洗漢防己半錢輕則附子重則川烏頭少許以為引用而行經也如卧而多驚小便淋溲者邪在少陽厥隂亦用太陽經藥更加柴胡半錢如淋加澤㵼半錢此下焦風寒二經合病也腎肝之病同一治焉但在下焦非風藥行經不可也如大便後有白膿或只便白膿者因勞役氣虚傷大膓也以黄耆人參湯補之如裏急頻見者血虚也更加當歸如肺脹膨而喘咳胷髙氣滿而上奔者多加五味子人參次之麥門冬與黄連少許如甚則交兩手而瞀者真氣散加黄連五味子參黄芩桔梗甘草各半錢如耳鳴目黄頰頷腫肩肘臂外後亷痛面赤脉洪大者以羗活防風甘草藁本通經血加黄芩黄連消其腫以人參黄耆益其原氣而如脉𦂳者寒也或面白善嚏或面色惡皆寒也亦加羗活四味足太陽不用連芩少加附子以通其脉面色惡多恐者更加桂附如便白膿少有衣者氣脫加附子皮如泄加米殻如氣澁者有甘藥補氣安卧不語以飬其氣知母湯出本事方治遊風攻頭目或四肢作腫塊知母一兩麻黄黄耆甘草獨活白术枳殻各半兩右為粗末每服四錢水一盞半牛蒡百粒研碎煎至七分温日三服覺冷不用牛蒡子苦參丸治一切諸風荆芥防風何首烏蔓荆子葳靈仙菖蒲苦參右煎六味各等分參加一倍㕮咀為細末酒糊為丸如梧桐子大每服三四十丸臨卧塩湯送下茶清湯亦可别無所忌常服諸瘡疾不生大有神効烏金浸酒方出聖惠方治風黒豆二升𦂳小者炒熟搗碎防風去蘆頭桂心附子炮製去皮臍羗活已上各二兩熟乾地黄三兩烏鷄糞堆者以大麻子取子餵籠七日後一兩右為細剉和勻入於生絹袋中用好酒二斗磁瓮子中重湯緩煑候藥瓮子内有香氣即止每日三度温飲一小盞川芎丸消風壅化痰涎利咽膈清頭目治頭痛旋暈心忪煩熱頸強急肩背拘倦肢體煩疼皮膚瘙痒目痛面上遊風如蟲行相似川芎龍腦薄荷葉焙乾各七十五兩細辛洗五兩防風去苗二十五兩桔梗一百兩甘草爁三十五兩右為細末煉蜜搜和每一兩半分作五十丸每服一丸細嚼茶下食後臨卧薄荷煎丸消風熱化痰涎利咽膈清頭目治遍身麻痺百節疼酸頭昏目眩鼻塞腦痛語言聲重項背拘急皮膚瘙痒或生疹及治肺熱口腥脾熱口甜膽熱口苦又治鼻衂唾血大小便出血及脫傷風并沐浴後並服之龍腦薄荷取葉十片防風去苖川芎各三十兩縮砂仁五兩桔梗五十兩甘草炙四十兩重右為末煉蜜丸每服作三十丸每服一丸細嚼茶酒任下加減三五七散治八風五痺癱瘓嚲曵口眼喎斜眉角牽引項背拘強牙闗𦂳急心中憒悶神色如醉遍身發熱骨節煩疼腰膝不仁皮膚瞤動或如蟲行又治陽虚頭痛風寒腦目旋運轉有似舟車之上耳内蟬鳴或如風雨之聲應有風濕痺脚氣緩弱疾並能治之又名大三五七散山茱萸乾薑炮茯苓去皮各三兩附子炮去皮臍三十五箇細辛一斤八兩防風去蘆四斤右為細末每服二錢温酒調下食前一方天雄細辛各三錢乾薑山茱萸各五錢山芋防風各七錢大醒風湯治中風痰厥涎潮昏運手足搐搦半身不遂歴節疼風筋脈攣急並皆治之南星生八兩防風生四兩附子去皮臍生獨活全蝎微炒甘草生各二兩半右㕮咀每服四錢重水二大盞生薑二十片煎至八分去滓温服不拘進二服活絡丹治丈夫婦人元臓氣虚婦人脾血久冷諸風温毒之氣留滯經絡流注脚手筋脈攣拳或發赤腫行歩艱辛腰腿沉重脚心弔痛及上衝腹脇脹胷膈痞悶不思飲食衝心悶亂及一切痛風走注遍身痛川芎炮製去皮臍草烏炮製去皮臍地龍去土天南星炮各六兩乳香研沒藥研各二兩二錢右為細末入研藥和勻酒糊為丸如梧桐子大每服二十丸空心日午冷酒送下荆芥亦可追風應痛丸治一切風疾左癱右瘓半身不遂口眼喎斜牙闗𦂳急語蹇澁筋拘攣百骨疼上攻下疰遊走不定腰腿沉重耳鳴重聼膝緩弱不得屈伸歩履艱難遍身麻痺皮膚頑厚又婦人血風攻疰身體疼痛面浮肌瘦口苦舌乾頭旋目眩昏困多睡或皮虛瘙痒癮疹生瘡暗風夾腦偏正頭疼並治之葳靈仙狗脊去毛各四兩何首烏川烏炮去皮臍各六兩乳香研一兩五靈脂酒浸淘去沙石晒乾五兩半右為末酒糊為丸每服十五丸加至二十丸麝香温酒吞下只温酒亦可食稍空服常服輕身體壮筋骨通經活絡除濕去風孕婦不可服新補菊葉湯治一切風頭目昏眩嘔吐面目浮腫菊花去梗羗活獨活旋覆花牛蒡子甘草各等分每為末毎服二錢水一盞生薑三片同煎至七分去滓温服食後當歸川芎散治風疾一方治壅頭目昏眩痛悶筋脉拘倦手足麻痺兼保䕶胎氣調和榮衞當歸川芎各半兩甘草二兩黄芩四兩薄荷一兩縮砂一分右為細末温水調一二錢食後日三服踈風丸治諸風疾通聖散一料加天麻羗活獨活細辛甘草首烏各半兩右為細末煉蜜和丸如彈子大每服硃砂為衣每服一丸細嚼茶調下皂角六一丸出危氏方踈風活血起癱瘓除脚疾烏鬚駐紅顔肌肉不𦂳實風証切宜此藥服之川芎草烏各一兩天台烏藥二兩烏梅乾癟者去核五十箇猪牙皂角五挺湯泡去皮弦烏豆一升右剉如脂面大用無灰酒釅醋各二浸一宿磁瓦銚内慢火煎乾取出晒焦揀何首烏一味别為末煑膏以六味焙乾碾末以前煑藥餘酒醋及何首烏膏為丸每服三十丸酒下六聖散川芎石膏雄黄乳香沒藥二錢盆硝半兩右為細末噙水搐之亦治眼昏冷涙頭風咽嗌鼻塞語沉一搐牙疼便定拒風丹出和濟方治一切風川芎四兩防風一兩半天麻一兩去蘆甘草一兩剉細辛三錢半蓽撥半兩右為細末煉蜜和丸作杵每服一丸細嚼荆芥湯或温酒下尋常些小傷風頭痛鼻塞強筋急皆可服然暴喜傷陽暴怒傷隂憂愁不樂氣多厥逆往往多得此疾便涎潮昏塞牙闗急𦂳痛若概作中風證用藥非止不相當多致殺人忽有人一日氣厥牙噤有潮醫者作中風以大通丸三粒下之下數行一夕而亡予常痛恨每見此證急化蘓合香丸四五粒灌之便醒然後隨其虚實寒熱而調治之無不愈經云無故而瘖脉不至治自己謂氣暴逆也氣復則已審如是雖不服藥亦可得平治作口眼喎斜次則涎潮閉塞左右共灸十二穴者謂聼㑹頰車地倉百㑹肩隅曲池風市足三里絶骨髮際大椎風池也依而用之無不立効若病因驚恐肝臓為邪来乗邪陽明之經即胃是也邪盛不畏勝我者又来乗肺肺縁久病氣弱全無徳受肝凌侮其病時復頭眩瘈瘲搐掣心胞伏涎久之則害脾氣要當平肝氣使歸經則脾不受尅脾為中州土中四肢一本之事脾氣正則土生金旺則肺安矣今肺不安時覺氣中衝者是侮脾不受侮故有此上衝肝勝則復受金尅故搐弱也以熱藥治之則風愈甚以冷藥治則氣虚也肺屬金金為清化便覺藏腑不調今用中和温藥抑肝補肺漸可安愈今心忪非心忪也胃之大絡名曰建絡胷膈及兩乳間虚而有疾則動建須時發一陣熱者是其候也服續斷湯茱萸丸獨活散下三方一月而愈思和名醫寓真儀時人少知者後至都下聲名籍甚為醫官政和中度為黄冠終藥珠佩囊續斷湯出本事方治一切風方見風脚疼痛類薯蕷丸出本事方治一切風薯蕷人參逺志防風真珠母紫石英研飛水茯苓虎骨各一兩虎睛剉二味須真者龍齒華隂細辛石菖蒲五味子丹參各一分右為細末煉蜜為丸如梧桐子大每服三十丸至五十丸金銀薄荷湯下食後臨卧一方有砂參獨活散出本事方治一切風川獨活白术白茯苓葳蕤栢子仁甘草各一兩犀角川椒熟乾地黄枳殻官桂各半兩人參右為細末每服二錢水一盞生薑三片棗一箇同煎至七分不拘時候服之生地黃飲子療一切風及偏風發四肢口眼喎戾言語蹇澁其陽不虚人勝於續命湯宜老人服之生地黄汁竹瀝荆瀝以上三味各取汁一升五合羗活防風各二兩蜀附子大者一枚生用去皮八九研重一兩者有神右切内前三味瀝汁中寛火煎取一升五合去滓温服分二服相去八九里風甚頻服六劑驗不可論特宜老人無問冬夏並同服之無忌隔三日服一劑亦甚佳忌猪肉蕪荑黒神丸治風不計急慢並主之方硫黃硃砂水銀雄黄已上俱半兩細研已上四味先用硫黃雄黄於銚子内銷作汁次下水銀硃砂便攪結為砂子後用磁盒子盖上鑚一孔子似黃米大即安砂子在内便塩泥固濟只留孔子放乾先用火半斤去盒子四面四寸已来至熱再圍四面如火放黑氣出盡便用濕紙片子搭上孔子纔乾則揑至三十片為度其藥已成後令細研入後藥麻黄去根節一兩天麻半兩白附子一分炮製白殭蚕一分㣲炒烏蛇三分酒浸去皮骨炙微黃桂心一分乾蝎一分㣲炒天南星一分炮製天雄一分炮製去皮臍獨活川烏頭一分炮製去皮臍麝香一分細研右為末每石藥一兩管草藥二兩相合令勻煉搗三二百杵丸如豇豆大每服以豆淋酒嚼下三丸忌動風物普濟方卷一百十五
