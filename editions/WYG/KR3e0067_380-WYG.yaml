body:
  text: 普濟方卷三百八十明周王朱橚撰嬰孩諸疳門治小兒一切疳吹鼻散出聖惠方治小兒一切疳腦悶昏沉宜先用青黛研躑躅各一両黄連去鬚𤓰􅎞地龍㣲炒麝香右為細末散每用少許吹鼻中看嚏噴多少嚏噴多即病輕嚏噴少即病重熊膽膏一名熊腦煎出醫方妙選治小兒腦悶口生白瘡齒疳并諸般疳疾不差悉主之熊膽蚺蛇膽蘆薈牛黄麝香龍腦各一分右為末用新汲水両盞入藥中攪令勻以銀噐盛重湯煮之水只可及甆器五分以慢火煮頻添煖水煮至半日更投三五粒糯米同煮米爛藥即成以箆子攪令勻勿令藥乾欲㸃鼻中時先七日孩子與乳母忌冷醬豉五辛熱麫魚肉并少食鹽然後取藥少許漸漸吹鼻中塗口瘡上頻使兩日即停一日㸔兒髪變青即止至七度停藥後還湏慎口一方有黄礬一方用薄荷湯下兼塗患處地黄丸出危氏方治腎疳極痩身有瘡疥寒熱時作頭熱脚冷如氷生乾地黄八錢乾山藥山茱茰各四錢澤㵼牡丹皮白茯苓去皮各三錢右為末煉蜜丸梧桐子大每用一二丸化開服又方取交妳及一切疳毒右夜明沙洗淨留滓每用三四錢入瓦瓶内取獖猪肉三兩薄切入瓶内水煮取肉一半與兒母食澄清肉汁令兒飲汁食肉取下腹中胎毒次用生薑四兩和皮切炒黄色又以黄連一兩去毛三味同為末麫糊丸空心米飲下史君子丸出錢氏方治臟腑虛滑及疳痩下痢腹脇脹滿不思乳食常服化蟲補胃消疳肌肥厚朴姜汁製半兩史君子一半麩炒熟一兩一半一兩焙陳皮一分甘草訶子半生半熟青黛半兩如是兼驚及𢃄熱渴即用此一味如臟腑不調不用右為末煉蜜為丸如鷄頭大每服一丸米湯化下兒生百日已上半嵗已下服半丸乳汁下一方無甘草或作散每服一錢粥飲調下此方消凉有積熱者可用一方無青黛􅅉疳散出仁齋直指方蘆薈黄連各一錢𤓰蔕猪牙皂角蝦蟆各半錢麝香少許右末吹入鼻嚏則可療黄連肥兒丸出仁齋直指方治一切疳及眼赤腫痛痒昏暗雀目肓或經月合眼鷹𤓰黄連净一両蕪荑焙麥芽炒神麯炒各半両青皮史君子焙各二錢半右為末獖猪膽浸糕丸麻子大每七丸米湯下疳熱眼山梔仁煎湯下㯽榔丹出醫方妙選治小兒能食不生肌肉常服此佳㯽榔麫裹炮木香胡黄連各一両代赭石一分研香墨一分要細研燒存性麝香一分研右為細末粳米飯和丸如黍米大每服十粒煎橘皮湯下食後大小加减肉豆䓻丹出醫方妙選治小兒肌痩挾積常服尤佳肉豆䓻史君子青橘皮炒黄各一両牽牛一分炒蘆薈一分炒麝香一錢右為末用糯米飯和丸如黍米大每服十粒生薑湯下食後量兒大小加减五靈脂丹出醫方妙選治乆嗽恐成疳常服尤佳五靈脂蟬殻欵冬花各半両蟾頭一枚塗酥炙黄青黛研雄黄研各一分右為細末拌勻糯米飯和丸如黍米大每十粒煎人參湯下量兒大小加減灌鼻丸出聖惠方治小兒一切疳心煩腦熱青黛一錢黄連末一錢蘆薈一錢𤓰􅎞一錢龍腦一杏仁大蟾酥半杏仁大右為末用粳米飯和丸如菉豆大以妳汁丸化破兩丸滳在鼻中每日三兩度用之效定命丸出聖惠方治小兒一切疳硃砂一分細研麝香半分細研𤓰􅎞二枚蛇蛻皮灰二分青黛一分研細乾蝎二十枚㣲炒右為末都研令勻用狗膽汁和丸如黍米大每度以乳汁化破一丸男左女右滴入鼻中得嚏三五聲為效吹鼻散出聖惠方治小兒一切疳眼鼻痒熱髪䜿乾痩宜用此熊膽一分丁香半両黄蘖一分蝦䗫半両五月五日令炙黄皂莢半兩麝香一錢細研右為末每用小豆大吹於兩鼻中嚏出疳蟲為效通頂散出聖惠方治小兒一切疳青黛一分細研蟾酥半杏仁研入赤小豆十二粒麝香半分細研藜蘆一分𤓰􅎞七枚右為細末散每度用一豆大吹入鼻中常有蟲子出如米心大黒者難治赤白黄者易療牛黄丸出全嬰方治小兒疳熱進退或即盗汗大便堅實時時心躁情意不恱或大便焦黄黄連黄芩龍膽草各一兩大黄一兩牛黄一兩右為末糊丸小豆大三嵗二十丸米湯送下治鼻衂鹽水送下入良乆即效青黛丸出聖惠方治小兒五疳煩熱羸痩不欲乳食青黛三分細研麝香一分細研訶黎勒皮三分蘆薈一分熊膽一分細研硃砂一分細研右為末以糯米和丸如菉豆大每服以粥飲下五丸日三服量兒大小増减服之一方沙糖水下三丸三嵗已上加丸服生筋散出全嬰方治證本門金靈散下木鼈子六个去殻草麻子六粒去殻右研細先急抱頭捺項上令熱津唾調貼之神妙宜氣丸治小兒疳熱乆蒸肌肉消痩形容痿悴神情不樂飲食雖多不生肌肉宜服此方大有功效蓬莪术炮赤芍藥川當歸鼈甲米醋炙去裙焦為度等分右為細末煮麫糊為丸麻子大一嵗二十丸熟水大小加减服之蚵蚾丸出聖惠方治小兒五疳八利乳食不節寒溫調適乖違髪䜿毛焦皮膚枯悴脚細肚大顱斛胸髙漸覺尫羸時時盗汗咳嗽腦後髙起復生内塊小便泔濁膿痢澱青撏眉咬指喫土甘酸吐食不化項濁頻併心神瞀鼻赤唇燥小蠱既出蜖蟲咬心疳眼雀目名曰丁奚此藥救療效驗如神白蕪荑去皮黄連去鬚蚵蚾酒浸去骨炒胡黄連各一兩半青黛半兩為衣右為細末猪膽汁糊丸如菉豆大每服三十丸飯飲吞下食後臨卧日進三服鶴虱丸出聖濟総錄治小兒一切疳病鶴虱輕炒胡黄連蘆薈研丹砂研三分青黛研三分右為末更入乳鉢内研令細用米泔煮猪膽令熱取汁和為丸如麻子大每服三丸至五丸米飲下早晨午間日晩各一服量兒大小加减當有蟲出益容丸出聖濟総録治小兒五疳羸痩發熱面黄或脾虛减食泄㵼無時大治腹痛史君子取肉剉碎焙乾厚朴去麄皮米泔浸川芎橘紅甘草各二錢右為末錬蜜丸如皂角子大二嵗以上服一丸以下服半丸陳米湯化下無時胡黄連丸出聖惠方治小兒一切疳胡黄連蘆薈細研騏驎竭地龍㣲炒熊膽研入已上各半兩蟾酥三分右為末麫糊和丸如黄豆大空心以粥飲下三丸晩後再服通命散出醫方妙選治一切疳證可以卜輕重逆順𤓰蔕半兩細辛一分研乾地龍一分炒白礬一分黎蘆一分去蘆頭右為末每用少許吹鼻中得嚏即吉若有蟲出即差白礬丸出聖惠方治小兒一切疳肌膚消痩㵼痢不止口鼻生瘡腹脹脚細水榖不化白礬灰蜜陀僧焼酒拌三遍烏賊魚骨炙㣲黄色仝上麝香半兩蝦蟆灰右為末錬蜜和丸如菉豆大每服以温水送下三丸日三服量兒大小增减服之青黛丸出聖惠方治小兒一切疳青黛一分龍腦麝香膩粉蟾酥已上各半錢右研令細用水浸蒸餅和丸如菉豆大每服以温水下三丸量兒大小加减服之吹鼻散出聖惠方治小兒一切頭髪乾踈腦熱煩悶𤓰蔕七枚葱白一莖切暴乾藜蘆半分英粉半錢麝香一字右為散每用菉豆大吹左右鼻良乆有蟲子出子細㸔如斷線此是病根出也通頂定命散出聖惠方治小兒一切疳腦熱鼻塞宜用蘆薈一分細研𤓰蔕一分麝香一錢細研鵝不食草一分猪牙皂莢一分右為細散每取少許吹於鼻中當嚏出疳蟲黒者難治赤白黄者易醫又方出聖惠方治小兒五疳能充肌膚恱澤顔色宜常服此鯉魚膽二枚蝟膽二枚狗膽一枚白附子一分炮製烏賊魚骨一分炙令黄右先搗烏賊魚骨并白附子為末相和内入猪膽中候乾搗細羅為散每服以煖水調半錢服之量兒大小以意加减史君子丸出和劑方治小兒五疳脾胃不和心腹膨脹時復疾痛不進飲食漸致羸痩並宜服之厚朴去皮姜汁炙陳皮去白川芎各一両史君子仁浸去黒皮一兩右為細末煉蜜丸如皂子大三嵗已上一粒已下一粒陳米飲下大治小兒腹痛消積丸出錢氏方治一切積聚成疳腹脹丁香九箇縮砂仁十二箇巴豆二箇去皮膜心烏梅肉三箇焙右為細末麫糊丸黍米大三嵗已上三五丸已下二三丸温水下無時候服君朴丸出全嬰方治小兒諸疳小便白濁乆則黄痩不長肌肉史君子炮厚朴製黄連各一兩木香三錢同炒右為末糊丸如小豆大三嵗三十丸米湯下五服效黄土丸出全嬰方治小兒疳積在脾面黄腹急咬指甲揉眉毛搔口鼻要喫泥土灰炭茶紙黄土陳皮各一兩木香一分巴豆三十粒不去油右為末糊丸小豆大三嵗三十丸煎黒豆汁下直候㵼五次疳積盡出益黄散助氣後與疳藥常服靈星膏出經驗方治小兒潮熱肌熱疳勞痩弱肚拍如鼓鳴􅆃如鋸乃積熱而成疳黄耆蜜炙胡黄連地骨皮柴胡各等分右末煉丸服隔夜酒浸露一宿次日澄去酒薄荷湯浸服之龍膽丸出和劑方治疳病發熱龍膽草黄連去鬚炒青皮去白史君子去皮炒右為末猪膽汁和丸如蘿蔔子大每服二十粒以意加减臨臥熟水下黄連丸一名金粟丸一名金𤓰丸出衛生家寳方治小兒諸疳壯熱肥兒神效黄連去鬚黄蘖去麄皮甘草炙剉青橘皮去白焼乾等分右四味搗羅末研麝香少許和勻獖猪膽内用線繫定於石噐内漿煮五七沸取出當風掛一宿去膽皮研熟丸如菉豆大每服五七丸米飲下漸加至十丸一方加麝香一分猪膽内煮五珍丸出危氏方治疳傷肚大青皮不去白炒焦黄乾薑燒灰存性五靈脂蓬术各一兩右為末搜和秤藥末一兩用肥巴豆肉去油稱一錢研細拌和粳飯丸麻子大每三五丸米湯下不拘飢飽五疳蕪荑丸一名兒丸出續易間方治一切疳氣痩弱食少大抵疳氣其狀多端雖輕重不同形證亦異然窮其根本皆由乳哺乖宜寒温失節臟腑受病氣血不榮致成疳也一曰肝疳其候揺頭揉目白膜遮睛汗流遍體肉色青黄腹中積聚自是肝疳亦名風疳二曰心疳其候身體壯熱吐痢無時頰赤面黄胸膈煩滿鼻乾心燥口舌生瘡下痢膿血有時盗汗此是心疳亦名驚疳三曰脾疳其候心腹脹滿乳食不化喘促氣麄咳逆多啼骨立毛焦好喫泥土痢多酸臭名脾疳亦名食疳四曰肺疳其候咳嗽氣逆咽喉不利揉鼻咬齒腹内氣脹大腸不調糞中米出此名肺疳亦名氣疳五曰腎疳其候肌肉消痩齒齗生瘡寒熱往来口鼻乾燥吐逆少食泄痢頻併肛門不収此是腎疳亦名曰急疳今以方同療之黄連蕪荑麥蘖神麯等分右為細末蜜丸粟大量兒大小米飲下如五疳陳皮湯下寒熱往来薄荷湯下蟲咬心痛苦棟子湯下乳癖氣結成下痢赤白腹痛後重腸鳴泄米榖不化並陳倉米湯下一方猪膽汁為丸磨積丸治小兒疳積黄痩吐食出本事方川烏一錢定粉三錢艾灰二錢龍骨二錢右為末滴水為丸龍眼大作餅子每服一餅飯飲磨下蘆薈丸出本事方治小兒疳積蘆薈荆芥黒牽牛青皮各等分右精細剉治炮製為末麵糊丸如粟米大兒一嵗已下一丸或二丸亦不妨酌量加减壁宫丸出惠全方治小兒一切疳腹虛愛食泥土四肢壯熱壁宫一枚頭脚尾麫裹煨熟熊膽一錢研入麝香半錢細研黄連右為末蟾酥和丸黍米大每服研肝汁下五丸量大小以意加减吹鼻散出聖惠方治小兒一切疳𤓰􅎞二十枚赤小豆炒胡黄連半分倒鈎棘針二十枚右為細散每日早晨以半字吹兩鼻中兼用粥飲調一字灌之每一度吹鼻灌藥一服㵼腦散出聖惠方治小兒一切疳鼻塞壅悶宜用榖精草一分焼灰細辛一分蘆薈一分𤓰蔕一分右為細散每用黄米大吹在鼻内常出惡物為效紫霜丸治小兒乳哺失節致傷脾胃停積不化變成疳積腹脹乳食减少胸腹疼痛痞悶嘔吐并治傷寒温壯内挟冷食大便酸臭或已得汗身熱不除及變蒸𤼵熱多日不觧因食或癎或寒後熱並宜服代赭石二錢研細水飛巴豆二十个去皮尖右為細末飯丸如粟米大每服三五丸至十數丸煎皂角仁湯下無時五膽丸出聖惠方治小兒五疳齒焦四肢黄痩百晬後至十五嵗已前並宜服之乾蟾五个大者細剉和骨用酒五升文火煎至濾去骨砂盆内研以絹