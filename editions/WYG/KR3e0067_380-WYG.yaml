為末每用半錢薄荷湯下遍身多瘡多飲水第十二冷水頻頻飲身上遍生瘡此是心家受牛黄飲最良牛黄宣連麝香乾地黄龍膽草右為末飯搗成丸每用十丸飯飲吞下皮膚如粟水榖不化第十三糞中食不化水榖不曽消皮膚如粟米㯽榔丸内搜木香㯽榔人参黄連右等分為末爛飯為丸如菉豆大每服十丸飯飲下肚脹口乾第十四口燥唇難啟涎粘咂不停脾風疳最盛獨活木香迎防風天麻木香獨活麝香各等分右為末煉蜜丸每服十丸薄荷湯下喫泥與土灰炭石第十五磚瓦偏尋喫生米灰炭食脾内疳蟲咬鹿茸海荆末當歸川芎羌活鹿茸海荆子右為末每服一錢飯飲調下飲水揩眼怕明第十六怕明暗則喜喫水眼頻揩肝家疳極盛升麻飲子佳升麻木香柴胡乾薑麝香右為末每服一錢飯飲調下多寒熱卧不起第十七寒熱往来頻貪眠意若嗔骨疳將藥療燈心及杏仁紫蘇杏仁甘草燈心右件用小便浸一宿焙乾成末每服一錢米飲調下口内生瘡不喫乳第十八乳食全不喫口内又生瘡心受疳熱極青黛倍藿香藿香麝香地龍青黛黄蜂兒右為末飯成丸湯吞下赤白痢變無定二十赤白痢多變風疳熱在脾白龍偏用便宣木及蕪荑龍骨木香宣連蕪荑仁右為末每服半錢陳米飲下驚生鵝鴨糞第二十一㵼痢塊和膿又如鵝鴨糞合藥果依方功效何須問地榆椿根訶子槐花甘草右為末黒豆湯調下多渴常飲水二十二多渴常飲水泄㵼不思飡大腸風熱患礬石姜調安白礬滑石定粉鯽魚膽右為末搗麦門冬或燈心湯下髪稀鼻内生瘡二十三揺頭揉眼鼻生瘡在人中心肺𫝊疳熱牛黄極有功牛黄硃砂升麻黄連青黛各等分右為末每服半錢飯飲湯調下齒宣顔色不定二十四齒宣多血出顔色頻改移腎病内𫝊受天麻實有竒丁香二錢牛黄少許天麻一錢全蝎一錢麝香少許右為末每服半錢米飲調下已上所論二十四候皆由五臟𫝊變大抵疳疾治法先與調氣消食次與行藥取利後用猪肚蘆薈等丸乆服蘆薈丸出傅氏活嬰方神麫二錢蕪荑二錢去油史君子五个青皮二錢紫蘇葉一錢青黛二錢巴豆二七粒去油麥芽一錢炒香附子二錢炒蘆薈二錢右為末爛飯為丸如麻子大每服二十丸飯湯下一方去青黛陳皮蘇葉香附子加腦麝香少許鷹爪黄連一錢莪术二錢炒胡黄連丸出𫝊氏活嬰方治疳痩渴㵼壯熱肚大青筋虛鳴愛肉牙宣口臭腹内蟲痛多睡好飲水啼哭不止並宜服蘆薈半兩茴香半兩炒史君子半兩蕪荑三錢炒胡黄連半兩川楝子半兩陳皮半兩木香三錢青黛半兩龍膽草半兩輕粉夜明砂半兩炒巴豆四十九粒去油用腦麝少許宣連半两右為末猪膽汁煮糊為丸如麻子大每服五十丸空心米飲下蟾蜍丸出𫝊氏方蟾蜍大皂角各等分焼存性為末一味一兩青黛一錢研蘆薈一錢麝香研硃砂一錢莪术一錢㯽梹一錢右為末用巴豆七粒去殻并心膜以猪膽四五箇取汁同巴豆蒸五次去巴豆取膽汁和丸如麻子大每服二十丸米飲下保童碧丹出𫝊氏活嬰方治疳積疳勞腹大虛腫取後用殺蟲消疳自然安矣硫黄蕪荑仁炒黄連各五錢輕粉一錢巴豆五粒去油用右為末醋糊為丸如粟米大每服用十丸薑蘇湯空心一服忌生冷保童丸出𫝊氏活嬰方治一切疳積癖腹腎硬疳勞潮熱面目手足浮腫寒熱往来飲食减少泄㵼無常腹内腸鳴並皆治之蝦䗫一个紫者焼存性去骨史君子一个焼性存研蕪荑二錢用仁蘆薈一錢炮三稜一錢焼莪术一錢炮陳皮一錢去白㯽榔二个辰砂半錢研大㦸半錢皂角同蝦䗫焼麝香少許巴豆同青皮焼用青皮一錢去白乾漆半錢焼煙盡為度半夏半錢姜汁浸無白為度候乾用黒牽牛半錢焼一方加甘遂半錢草菓仁一錢枳殻一錢縮砂仁一錢右為細末用無灰酒煮麫糊為丸如麻子大以硃砂為丸每服二丸㸔大小加减淡薑湯吞下飯飲亦可如腹中腎硬不食及積黄陳皮湯下如寒熱用桃柳條煎湯下如身腫赤桑白皮湯下如要取積茶清下金科猪肚丸出𫝊氏活嬰方治一切疳積面黄肌痩腹内痞癖氣塊五疳多蟲骨蒸疳寒熱痩悴面浮無辜丁奚等候史君子一升青皮炒三稜煨莪术煨黄連胡黄連川練子蕪荑炒研枳殻炒黄梗皮青木香麥芽炒㯽榔香附子陳皮杏仁研茴香炒吳茱萸炒輕粉巴豆去心出油神麯炒龍膽草石榴皮訶子肉豆䓻南木香蘆薈蝦䗫炙榖芽炙青黛白麴乾薑𤣥胡索炙硃砂薑炒欝金皂角炒山茱萸没石子良薑乾漆炒令煙盡丁香各等分右為末先用雄猪肚一箇以史君子肉一升糯米三合粳米二合入猪肚内蒸熟搗爛後再入猪膽汁三四箇研勻却入衆藥搜作餅子臼中杵搗百遍視色和勻細丸如麻子大每服二三十丸空心飯飲吞下量兒大小加减用之一方加黄丹鷄子黄蚌粉三味用醋炒過入前藥和丸又方出𫝊氏活嬰方用大麻子炒過和飯飼烏鷄一隻經一兩箇月如用去毛糞以烏豆一二升同蒸爛去骨搗爛和衆藥成丸用隨意湯使空心下取效兼治骨蒸勞熱面黄痩削名麻鷄丸草菓丸出𫝊氏活嬰方治積疳浮腫脾胃虚弱草菓一錢煨去皮三稜一錢炮砂仁二錢研㯽榔二錢黒牽牛青皮二錢去穰三稜一錢炮巴豆一錢去油右為末麫糊為丸每服十五丸米湯飲下如腹有潮熱與保童丸三星散出傳氏活嬰方治積疳遍身浮腫通利水道大㦸芫花炒甘遂去心各等分右為末每服半錢􅀥子十箇煎湯空心調下有如神效塌氣散出𫝊氏活嬰方治疳浮腹脹經取未消㯽榔五个剉片用巴豆去殻同炒令黄色去巴豆用橘紅一錢麥芽三錢焼甘草二錢縮砂仁半錢枳殻一錢右為末每服一錢蘿蔔子煎湯調下泄去疳氣即消治小兒五疳小便白濁殺蟲用使君子煨食以史君子皮煎湯送下治小兒食土用好土濃煎黄連汁和成塊日乾與服治小兒疳痩用蝦蟇焼灰清米飲服之其蝦蟆即􅋪蚵蚾也太木散治小兒腹脹佀鼓自晨至晩肚熱名曰氣疳木香陳皮二錢膩粉一字牛蒡子瓦上焙右為末每服半錢用陳米煎湯送下𤣥梅散治小兒疳病取腹中疼痛𤣥胡索烏梅一錢右㕮咀每一錢水八分甘草一寸煎四分服粉龍丸治小兒疳困龍膽草蚌粉右為末每服半錢用米飲調下黄耆散治小兒熱疳進食芰草柴胡神草地骨皮白茯苓甘草右為末每半錢用白湯調下黄耆飲子治小兒五疳或傷脾脹髪黄時時壯熱頭上虛汗日熱潮黄痩或泄㵼黄耆神草陳皮甘草白茯苓白㯽榔小者肉豆䓻一个小者右㕮咀三錢水一盞煎七分慢火煎時時温服厚腸丸治小兒疳痩滑泄下痢腹脹不思飲食甘草炙厚朴史君子半兩去殻煨陳皮一錢訶子去核半生半熟右為末蜜丸如鷄頭大二嵗上一丸二歳下半丸或乳汁清米飲化下亦可大神丸治疳㵼渴飲無度蘆薈一兩訶子皮半兩肉豆䓻麫裹三味火煨以麫熟為度右為末􅀥肉為丸菉豆大三五丸米湯下黄耆散治身體潮熱煩躁不能安卧飲食不進小便如泔頭面赤色小便白色青皮陳皮黄耆神草厚朴茯苓訶子砂仁丁香木香甘草白术㕮咀服三錢姜一片煎滓無時普濟方卷三百八十
