槐子方出本草治疳濕及明目右以烏牛膽醸槐子服之彌佳麝香丸出楊氏家藏方治諸疳挾積肌體𤼵熱漸致羸痩蟲作無時阿魏半兩精真者於砂石器中用煤火入羊肉内猪牙皂角炙去皮三分雄黄半兩蓬莪术生用半兩柴胡去苗三分㯽榔生用一兩半蕪荑生用一兩當歸半兩洗炒麝香一錢别研辰砂半兩别研右件為細末同精羊肉去筋膜一斤切細以法酒煮如泥取出細研入阿魏并諸藥同搗丸如蘿蔔子大服三十丸温米飲下不拘時候衛生湯出鮑氏方治疳熱肌痩盗汗地骨皮洗四兩生乾地黄一兩甘草半兩白芍藥一兩右為散每服二錢小麥三十粒煎湯下又方出全嬰方治喫􅁟黄連黄土右等分為末糊丸如小豆大每服三十丸米飲下又方出聖惠方治小兒一切疳手脚枯細腹肚脹滿萎黄羸痩不欲乳食宜服此方乾蝦蟇一枚大者右以酒噴放地上一夜令脹内莨菪子二兩在蝦蟇腹中封口入瓶子内燒令煙盡放冷取出搗羅為末入膩粉一錢以軟飯和丸如菉豆大每服以粥飲下三丸量兒大小以意加减洗方出危氏方大腹皮苦参川白芷右為剉散煎湯淋洗妙三和丸出聖濟方治小兒諸疳肢體羸弱臟腑虛滑不思乳食胡黄連半兩木香半兩麝香研一錢右為細末滴水為丸如黍米大量大小加减丸數與服治小孩子疳痩又取五月五日蟾酥以朱砂麝香為丸如麻子大空心一丸如腦疳以妳調滴鼻中五疳保童丸出保嬰方治小兒五疳八痢面黄肌痩頭髪作縷好食泥土並宜服之大乾蝦䗫一个焼存性皂角一定去皮核焼存性蛤粉三錢水飛麝香一錢細研右為細末打麫糊為丸如粟米大每服三四十丸温米飲送下空心日食三服福夀保生丸出徳生堂經騐方治小兒諸脾疳癖積飲食無時諸物所傷脾胃因食寒熱積作成氣塊腹肚脹滿喜怒不常堅硬疼痛身熱虚汗而惟貪睡或黒或痩口鼻生瘡並宜服之蘆薈木香各一兩蕪荑史君子砂仁胡黄連神麯廣皮三稜炒陳皮乾蝦䗫各七兩半右為細末水糊為丸粟大每服五七丸温米湯送下量嵗数加服日進二服八九日後大便黒為驗切忌葷腥生冷硬物為妙磨脾化滯丸出德生堂經騐方家𫝊得效小兒諸脾疳服之者無不效木香蘆薈各二兩史君子仁蕪荑陳皮去白青皮砂仁神麯莪术已上各七錢半蝦䗫一兩半焼灰胡黄連二錢黄連五錢九肋鼈甲一箇醋炙右為細末醋糊丸如粟米大每服百十丸飰水下無時量兒大小加减服為妙化脾積二聖丸出徳生堂經驗方逮公謹𫝊小兒脾疳得效方雷丸神麯炒麥蘖炒陳皮青皮茯苓苦葶藶石三稜蘿蔔子炒别研阿魏白豆䓻沉香青木香已上各一兩廣木香一兩半莪术二兩蒼术四兩炒半夏三錢丁香二錢半右剉麻豆大用好醋五升生利牛兒鉄一斤搥碎同煎藥浸春三夏二秋七冬十日去鉄將藥煮晒乾為細麫糊丸如粟米大量大小服三嵗已下三十丸四嵗以下至七嵗五十六十丸用飰水空心服之若受濕黄腫腹脹者用木𤓰煎湯下忌生冷塩酸海味毒物神聖化脾丸出徳生堂經驗方專治小兒脾疳積聚成塊在皮膜外者𤼵熱渴乳食不進日漸羸痩服諸藥不效者此藥主之大有功效荆三稜炮廣荗炮青皮去皮陳皮去白各一兩沉香二錢木香三錢檀香二錢半㯽榔二錢半腦子半錢全蠍二錢右為細末煉蜜為丸如菉豆大二嵗至四嵗者三丸五嵗至八嵗者九丸九嵗至十二三嵗者七丸食前用引子送下服後食積推下便軟二服後漸消三服去病七分然後用藥磨脾去積順氣進食引子湏要白曵刺馬溺半盞水中浸後送下五疳消食丸治小兒食傷脾疳積聚發為寒熱香附子荆三稜石三稜青皮陳皮各二兩縮砂一兩半史君子一兩半黄連一兩莪术一兩蕪荑一兩蘿蔔子二兩木香一兩乾蝦䗫四兩焼灰蘆薈一兩苦棟根三兩㯽榔一兩乾漆一兩焼去煙阿魏半兩另熬胡黄連右為細末熬蘿蔔水調神麯末作糊丸如黍米大每服十五丸至二十丸飯水下量大小加减丸數服日三次妙神仙妙應丸專治大人小兒疳脾癥瘕氣積成塊或如小黄𤓰横擔腹肚脇左右青筋明現腹鼓急手足痩小形貌焦枯黄黒髪直口乾病在膏肓本堂自至都下止以此藥治大人小兒蟲積盡在大便中一行之後地上便見諸積委有功效藥性平稳不損元氣老㓜皆可服㯽榔二兩黒白牽牛二兩大黄一兩史君子半兩蕪荑半兩鶴虱半兩乾漆五錢半去煙雷丸半两右為細末用皂角四兩去皮弦子切碎熱水浸泡搓揉濃水濾過和麫為丸如粟米大或菉豆大隨兒大小服一二十丸葱白熬湯五更送下􅀥兒壓之次早大便見其得病根源之物年十嵗服二三錢又方治小兒一切五疳黄痩不生肌肉肚脹多筋頭髪焦黄不思乳食糞中有蟲米榖不化小便如油睡中盗汗蘆薈二錢史君子七个木通炮一錢㯽榔炮一錢黄連去鬚二錢蕪荑炒去膜雷丸剉炒一錢青皮炒一錢龍膽去湏二錢右件為末雄獖膽汁蒸過為丸粟大每服二十丸飯飲送下鮓湯丸治疳積南星乳香滑石丁香青黛各錢輕粉金箔五片巴豆十六粒去皮心錫末先将水銀安紙上鎔錫入研碎右為末糊丸如粟米大每服三十丸飯飲送下疳積鮓湯下脹滿茴香湯赤白痢甘草湯下瘧疾桃枝湯下麝香丸專治小兒五疳麝香熊膽蚺蛇膽牛黄赤小豆為末已上各一分蟾酥加柳葉二片右件藥同研如粉用𤓰蔕半兩煮取汁和如麻子大一嵗每服空心以粥飲下三丸量兒大小以意加减抵聖丸治小兒一切疳麝香細研熊膽細研硃砂細研𤓰􅎞蚺蛇膽已上各一分蟾頭一枚令炒焦黄牛黄半分細研赤小豆半分炒焦右件藥揚羅為末都研令勻煉蜜和丸如菉豆大每服以粥飲下三丸如小兒郎以乳汁破下與服量兒大小以意加减服之吹鼻散治小兒一切疳揉眼鼻撏耳髪乾蝸牛殻二十七枚洗去土蝦蟆灰一分剉青黛半分麝香半分細研右件藥搗羅為末相和更研令極細每日兩度以葦筒子吹半粳米大於鼻日覺有效即日一度吹之治小兒肝疳此由乳母多食酸物熱毒乆鬱於内因乳兒致令毒熱之氣𫝊兒之肝經疳氣之盛相薄於脾故生斯疾其狀揺頭揉目白膜遮睛忽時多汗目中澀痒頭髪焦枯腦熱如火非時下痢唇皮赤焦即為肚疳宜喫此方但目色帶青左肋下堅硬多吐涎沬左右眼角有黒氣所衝者不可治也史君子蒸𦍑活防風延胡索天靈盖酥炙黒色木香鼈甲酥炙焦黄蜜蒙花决明子各一分山梔半兩右為末每服一錢薄荷湯下兒大服一錢半治小兒心疳此又因乳母平日多食熱物以致血氣昏壅兒飡熱乳𫝊在兒心經火能生土毒熱之氣𫝊入於鼻故生斯疾其状非時通身發熱面黄两頰上赤心胸煩滿鼻乾心躁忽思飲水口舌生瘡忽時下痢下利乆而不已忽時下膿血即為心疳宜喫此方但夜多驚啼耳邊脉動舌色黯黒者不可治胡黄連茯苓天靈盖酥炙黒色鼈甲醋炙香黄木香沉香二銖史君子蒸三次半兩右為細末重羅如飛塵每服半錢以銀湯調下食後温和去滓吃兒大者吃一錢治小兒脾疳此又因乳母平時飲食不莭冷熱不調或飯食不調停滯不化兒食其乳不調之氣積在脾間故生斯疾其狀多乳食不消心腹脹滿面色黄口鼻常乾肌體虛劣好喫泥土火炭之類情意不恱愛近黒處下利多酸臭此為脾疳冝喫此方但好食泥土水榖不化皮枯骨露者不治之候也訶梨勒麵裹火炮去核只用皮史君子蒸三次各半兩白术厚朴去塵土姜炙黄橘皮天靈盖酥炙黒色用㯽榔鼈甲酥炙黄香甘草炙木香川芎白蕪荑各一分南椒三分去黒子右為細末每服一錢空心以米湯調下治小兒肺疳此又因乳母平日多食辛熱之物肺臟傷兒飡其乳毒熱之氣𫝊在肺經故生斯疾其狀非時𤼵𠻳壯熱憎寒口鼻生瘡多饒涕唾毛髪焦枯多咬指甲頻頻氣脹大腑不調忽時下痢糞中下米是為肺疳並宜喫此兩方但皮上𤼵瘡如粟黒色者不可治桑白皮白采入地一尺以下者用二兩蜜陀僧一分史君子十銖蒸七次枇杷葉去毛令净㣲炙天靈盖酥炙香黄黒色鼈甲酥炙香黄木香川芎右杵羅為末方入蜜陀僧末更研令勻每服半錢黄橘皮一片六分水一盞煎取四分食後去滓喫兒大喫一錢服此藥後空心吃後方藥訶梨勒半兩麵裹火炮去核只用皮白术史君子蒸各一分甘草三分炙右細杵羅為末每服半錢煎四五沸空心和滓吃治小兒腎疳此又因乳母平日隂陽交接之候血氣未定倉猝間便與兒乳其隂陽不調之氣𫝊在兒之腎經故生斯疾其狀骨肉消痩齒上齗瘡頻發寒熱頭熱如火足冷如氷喫食减少㵼痢頻多其病至極即下部開張肛門搔痒不時蟲動名為腎疳宜服此方寒冷無熱氣者不治之候也鼈甲酥炙焦黄萆薢茯苓蕪荑天靈盖酥炙黒色川芎烏藥各一分狗脊去毛半兩南椒二錢去黒子右為細末重羅如飛塵每一錢空心葱湯下和滓喫兒大者喫一錢半兒小者不喫滓五疳丸治小兒疳痩而面黄羞明眼澀好喫泥土乳食不消化常服退黄化蟲緑礬成塊者焼通赤取出稱一兩半蜜陀僧火焼赤取出稱一兩夜明沙焼過一兩半右為細末熟􅀥穰為丸如麻子大每服三五七丸温米湯送下量兒大小加减一日三服不拘時抱子茯苓湯治黄疳土色為熱為濕當小便不利如黄赤色為燥熱伏于腎經中也髪黄脫落知膀腎俱受土邪乃濕熱之證鼻下斷作瘡土逆行火氣上火也能乳者胃中者熱也寒則食不入喜食者或其胃不足也靣黒色者為寒為痺大便青寒褐色熱畜血中間黄色腸胃真熱治法當滋隂潤燥耐熱避寒致生津液蘭臺秘簡方名大蕪荑湯山梔子三分黄蘖炙甘草各三分大蕪荑半錢黄連一分麻黄不去根節羌活各二分柴胡三分炙防風一分白术半分茯苓三分當歸四分右件剉如麻豆大都作一服水一盞半煎至一盞去滓稍熱食前下消疳丸治小兒諸疳肌肉消痩日晡作熱引飲無度退疳熱長肌膚殺蟲羙食熊膽硃砂别研水飛胡黄連鼈甲醋塗炙黄柴胡黄連去鬚㣲炒已上各半兩夜明砂㣲炒㯽榔木香陳橘皮去白青橘皮去白各一分乾蟾二枚焼赤存性蘆薈别研麝香别研二銖各一錢右件為細末研勻軟粳米飯丸如黍米大每服二十丸温水送下不拘時候蕪荑丸治小兒五疳骨熱面黄肌痩飲食雖多不長肌膚口牙齒宣露或盗汗疳瘡濕痒小便白濁黄連去鬚髪㣲炒黄蘖去麄皮甘草炙青橘皮去白龍膽草去蘆已上各半兩乾蟾一枚酥炙白蕪荑仁炒胡黄連各一分青黛一錢史君子十四枚去殻麝香半錢别研右件為細末研勻和用獖猪膽汁少許將藥入猪膽内合令七分滿以線繫定於銀石噐中用漿水煮五七沸取出當風掛一宿後剥去猪膽不用只取藥再和令勻丸如黍米大每服二十丸温米湯送下不拘時候至聖丸治小兒五疳黄痩食不生肌常服殺蟲長肌肉木香胡黄連黄連去鬚㣲炒陳橘皮去白龍膽草去蘆焙已上各一兩五靈脂二兩川棟子去核半兩蕪荑仁二錢半炒别研蟾酥半錢别研蘆薈二錢别研右件為細末煮麫糊為丸如黍米大每服二十丸温米飲送下不拘時候麝香猪膽丸治小兒諸疳羸痩齒齦潰爛或作蟲痛乳食雖多不長肌膚常服退疳黄肥肌肉羙飲食胡黄連黄連去鬚切各一兩川芎三分没石子半兩麫裹煨令黄去麫麝香二錢别研蕪荑一兩别研川棟子肉一兩剉碎炒黄右件為細末次入研者藥和勻用獖猪膽汁和蒸餅為丸如黍米大每服三十丸温米飲送下不拘時候搜疳丸治諸疳羸痩不生肌肉面色痿黄消腹脹殺疳蟲進飲食止盗汗寛胸膈下滯荆三稜半兩濕紙裹煨熟剉㯽榔木香肉豆䓻麵裹煨黄香訶子去皮當歸湯洗焙已上各二兩半黄連去鬚㣲炒川棟子肉各半兩炒右件為細末猪膽汁煮麫