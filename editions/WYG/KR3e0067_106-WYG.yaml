body:
  text: 普濟方卷一百七明周王朱橚撰諸風門蠱風論夫毒風之狀在皮膚間一身盡痛若劃若刺淫淫躍躍如中蠱毒故名蠱風皆由體虚受風侵傷正氣也方烏頭五靈脂丸出聖濟總録治毒風皮膚盡痛身體若劃若刺烏頭生去皮臍用五靈脂各五兩虎骨沙瓶中鹽泥固濟煨存性二兩狼毒炮一兩附子炮製去皮臍二兩防風去义地龍不去土桂去粗皮海桐皮剉各二兩乳香研一兩自然銅煨醋淬三五徧二兩没藥研一兩龍腦研一錢亂髮燒灰存性好墨煅過各半兩麝香研三分右各剉研日中曝七日搗羅為末以生薑自然汁和搗熟為丸如彈子大每服一丸分作四服用温酒生薑自然汁少許磨化服此藥亦治癱緩急慢中風痰涎壅塞胸膈不利口眼喎斜半身不遂神昏恍惚及血氣走注並依前湯使日二三服偏正頭疼夾腦風疾以臘茶清和少薑汁磨下去枕卧少時許痛腫處磨一丸塗之產後諸疾備急用薑汁磨化入童子小便並酒各半盞稍熱服血風勞及敗血故四肢或攻刺腹肋痛用當歸酒下攧破損傷乳香酒下病深者三丸取效合時不得見雞猫犬及婦人孝服之人茵芋酒出千金方治蠱風皮膚盡痛淫淫如有蠱啄㧻之生瘡甚者如刀劃大風頭眩重目瞀無所見或仆地氣絶半日乃蘇口喎噤不開半身徧死拘急痺痛不能動摇歴節腫痛骨中酸疼手不得上頭足不得屈伸不能躡履行欲傾跛及狂走有此諸病藥皆治之茵芋烏頭炮炙去皮臍石南防風去义女萎蜀椒去目及合口者炒出汗附子炮製去皮臍細辛去苗葉獨活去蘆頭卷栢桂去粗皮天雄炮製去皮臍秦芄去苗土防己各一兩躑躅二兩右㕮咀如麻豆大少壯人無用熬虚老人薄熬之清酒二斗漬各七日夏三日春秋五日初服一合不知加二至二合寧從少起日再以微痺為度胡洽無蜀椒獨活卷栢為十二味天麻丸出聖惠方治蠱風皮膚如刺劃頑痺不仁天麻炮炒躑躅花獨活去蘆頭附子炮製去皮臍白附子炮原蠶蛾炒防風去义蒼茸蒺䔧子炒去角桂去粗皮當歸切焙烏頭炮製去皮臍各一兩麻黃去根節烏蛇肉酒浸去皮骨炙各二兩麝香研半兩右除研者外搗羅為末入麝香再研勻煉蜜和搗二三百下丸如梧子大每服二十丸温酒下不拘時候如有汗出宜避風薄荷丸出聖濟總録治蠱風皮膚盡痛如刀劃狀及頭目不利風痰等疾乾薄荷一斤天麻四兩葳靈仙去苗土三兩羌活去蘆頭四兩山栀子仁二兩蔓荆實去白皮三兩白芷桔梗炒防風去义各二兩大黃濕紙褁煨令紙乾一兩人參龍腦研半兩赤茯苓去黑皮三兩右為末煉􅁡丸雞頭實大每服一丸食後細嚼茶酒任下薏苡仁方出聖惠方治體虚風邪所中攻走皮膚狀如刺劃四肢不仁筋脈拘急薏苡仁二兩獨活去蘆頭茵芋細辛去苗葉桂去粗皮側子炮製去皮臍防風去乂酸棗仁炒麻黃去根節先煮去沫焙五加皮羚羊角鎊各一兩甘草炙剉半兩右剉如麻豆大每服四錢以水一盞入生薑半分拍碎煎至七分去滓温服不拘時候白花蛇煎出聖濟總録治蠱風身痛如刀刺白花蛇烏蛇並用酒浸去皮骨焙乾各二兩白蜜三十兩生薑汁六兩薄荷汁六兩白薑蠶炒乾蝎苦參各三兩白附子炮三分右為末先下煉蜜並生薑汁薄荷汁次下諸藥末攪勻和銀器中重湯熬成煎無灰酒調下半匙乆服身體滑膩四白散出聖濟總録治蠱風白花蛇酒浸去皮骨炙一兩半白附子炮一方生用白薑蠶微炒白蒺䔧炒去角各一兩右爲末空心温酒調下二錢至晩食前再服何首烏散出聖濟總録治蠱風何首烏去黒皮葳靈仙去土各一兩苦參半兩麒麟竭一分右並生搗羅爲散乳鉢内研三五百遍每一錢用荆芥湯下每日三服酒服尤妙刺風論夫刺風者以血氣爲風寒所侵不得宣利則藴滯而生熱寒熱相搏於皮膚之間滛躍不能發泄故徧身如針刺也人痛甚若刀劍者謂之蠱風與刺風相似不可不辨也刺風者體虚之人膚腠開張爲風邪所侵也其風邪走於徧身而皮膚涇濁邪氣交争風邪擊搏如錐刀所刺故名刺風也方白蒺䔧丸出聖惠方治刺風徧身如針刺肩背四肢拘急筋骨疼痛白蒺䔧一兩微炒去刺茵芋羌活木香羚羊角屑附子炮製去皮臍白附子炮製當歸乾蝎芎藭牛膝酸棗仁杏仁湯浸去皮尖雙仁别研爲膏各一兩白花蛇肉二兩酒浸炙微黃薏苡仁三分㯽榔半分牛黃細研麝香細研各一分防風去蘆頭三分右爲末入杏仁膏相和令勻煉蜜和搗五七百杵丸如桐子大每服不計時候以温酒下二十丸忌生冷油膩毒滑魚肉牛膝散出聖濟總録治刺風徧身刺痛及中風破傷風等疾牛膝酒浸切焙白芷當歸切焙芎藭甘草微炙剉生地黃焙槐子炒厚朴去粗皮生薑汁炙漏蘆去蘆頭青橘皮湯浸去白焙各半兩何首烏去黒皮没藥防風去义虎脛骨酒浸一宿炙各一兩芍藥四兩墨燒令赤酒内蘸三徧半兩右為散每服三錢以温酒調下破傷骨不折以童子小便和酒調服婦人血風肢節酸疼薄荷湯調下羌活散出聖惠方治刺風皮膚頑痺羌活白蒺䔧㣲炒去刺白鮮皮烏蛇肉酒浸炙令黃當歸防風去蘆頭肉桂去粗皮茵芋附子炮製去皮臍芎藭酸棗仁㣲炒海桐皮剉各一兩楓香三分麻黃二兩去根節麝香一分細研右細羅為散每服食前以温酒調下二錢忌生冷油膩濕麫毒滑魚肉乳香犀角丸出聖濟總録治刺風徧身如針刺乳香研犀角去鎊屑自然銅煅醋淬附子生去皮臍各一分沒藥研蔓荆實草烏頭炮去皮尖木香人參丹砂研鐵沙水洗十遍用醋一十盞煮乾銚内火出煙盡即傾出莎草根去毛炒各半兩右為末再同和研勻用酒糊杵為丸如桐子大每服十五丸米飲下臨卧服天麻散出聖濟總録治體虚腠開為風邪所中徧身淫躍如鍼刺天麻白花蛇酒浸去皮骨炙槐實子㣲炒羌活去蘆頭防風去义蔓荆實白鮮皮晩蠶沙㣲炒枳殻去穣麩炒葳靈仙去苖土甘草炙各一兩右搗羅為散每服二錢以温酒調下不計時候防風丸出聖濟總録治氣血不和為風寒所侵不得宣泄藴積皮膚間寒熱相搏如鍼刺防風去义薏苡仁炒熟藁本去苗土各二兩酸棗仁炒獨活去蘆頭甘菊花芎藭各一兩㯽榔煨過大麻仁别研如粉各一兩半右為末和大麻仁粉重羅煉蜜丸桐子大每服二十丸温酒下不拘時候黃耆丸出聖濟總録治氣血虚風寒藴滯寒熱相搏徧身如鍼刺名曰刺風黃耆細剉蘹香子炒烏頭生用去皮臍烏藥剉楝實剉炒防風去义蒺䔧炒去角赤小豆地龍去土各一兩右為細末煮麫糊和丸如桐子大每服十丸至十五丸空心臨卧温酒或鹽湯下大麻仁散治大風周身皮膚肌體之内如針所刺精神昏昧出聖惠方大麻仁三分防風去蘆頭陳橘皮湯浸去白穣焙附子炮製去皮臍白蒺䔧㣲炒去刺各一兩麻黃去根節桂心獨活石膏各二兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服忌猪雞肉生冷油膩人參附子湯一名附子八物湯出千金方治風濕身體疼痛欲拆肌肉如錐刀所刺人參去蘆頭黒附子炮去皮臍乾薑炮製芍藥茯苓去皮甘草炙桂心各一分半白术二錢右㕮咀每服二錢水一大盞同煎至七分去滓温服不拘時候一方去桂用乾地黃二兩一方無白术何首烏散出聖濟總録治體虚受風侵傷氣血徧身刺痛或因寒邪未解食熱物亦能致此何首烏三兩蔓荆實葳靈仙去土菖蒲苦參荆芥穗蒺䔧子炒去尖各一兩甘草炙各半兩右爲細散每服二錢以薄荷茶酒調下不計時候枳殻酒出聖濟總録治刺風枳殻去穰麩炒栢白皮各半斤五葉草一斤右細剉生絹袋盛以酒一斗浸七日每温服一盞併服不妨常令有酒力佳惡實根酒出聖濟總録治刺風遊風惡實根洗去土控乾生蒴藋根洗去土控乾各一斤右細剉以酒一斗浸七日後每温飲一盞日三四飲芎枳丸出聖濟總録治刺風徧身刺痛方見風熱類漏風論夫内經曰飲酒中風則爲漏風漏風之狀或多汗不可單衣食則汗出甚則身寒喘息惡風衣裳濡口乾渇不能勞事又曰身熱懈惰出汗如浴惡風少氣一名酒風夫酒以養陽酒入於胃與谷氣相搏熱盛於中其氣慓悍與陽氣俱泄使人腠理虚而中風故其證多汗惡風不可單衣其喘息而少氣者熱薰於肺風客於皮毛也其口乾者渇也汗出多而亡津液也其懈惰而不能勞事者精氣耗竭不能營其四肢也謂之漏風以汗出不止若器之露乆而不治轉易消竭夫人􅀈肉不牢而無分理理粗而皮膚不緻者腠理疎也此則易生於風風入於陽陽虚則汗出若少氣口乾而渇近衣則身熱如火臨食則汗流如雨骨節懈惰不欲自營此為漏風由酒醉當風之所致也方獖肝圓出危氏方治四肢攣縮不伸等證曾有人自幼年酒多長而風痰爲酒使痰注骨節四肢不能運動服此有效茯神去木白茯苓去皮薑黃白术炒黃耆羌活五加皮川烏炮去皮臍薏苡仁木𤓰去皮瓤半夏麴神麴炒天雄炮去皮白芍藥乳香别研沒藥研防風獨活當歸𤣥胡索桑寄生海桐皮去粗皮木香陳皮去白枳殻炮去瓤南星炮地龍去土荆芥穗各五錢麝香一錢右用獖肝一具洗净煮存性研爛同酒為糊丸如梧桐子大每服三十丸温酒吞下不飲酒木𤓰湯下秦芄散出聖惠方治風虚汗出不止惡風頭痛秦芄出苗土附子炮製去皮臍石斛去根一作石膏菖蒲白术一作蒼术桂去粗皮各三分麻黃根防風去义各五兩右為散每服一錢以温酒下日三或温水下亦得牡蠣白术散出聖惠方治風虚多汗少氣汗出如洗少者痿劣牡蠣煅赤三分白术二兩一分防風去义三兩半右為細末每服二錢以温水調下不計時候惡風倍防風少氣倍白术汗多面腫倍牡礪麋銜湯出聖濟總録治因醉中風惡多汗少氣口乾善渇近衣則身熱如火臨食則汗流如浴骨節懈惰不欲自勞名曰漏風澤㵼白术各一兩麋銜半兩右爲末每服二錢酒飲任調下食前服黃耆湯出聖濟總録治風虚多汗夜卧尤甚床席衣被並濕黃耆剉人參各二兩麻黃根牡礪煅赤各三兩枸杞根白皮二兩半龍骨四兩右㕮咀每服三錢以水一盞大棗三十枚擘破同煎去滓取六分空心服日三桂心湯一名秦艽散出聖濟總録治風虚汗出不止方見中風類澤㵼散一名防風散出聖惠方治風虚汗多惡風寒顫澤瀉防風去义牡礪煅赤蒼术米泔浸去皮炒各一兩桂去皮三分右爲細散每服二錢以温粥飲調下不計時一方無蒼术酒服亦可人參散出聖惠方治風虚汗出熱悶甚者人參二兩牡蠣煅赤一兩半石膏碎三兩甘草炙剉一兩右為細散每服二錢以温水調下不計時候石膏散出聖惠方治風虚汗出不止石膏碎甘草炙剉蒼术米泔浸去皮剉炒㣲黃麻黃根各一兩右爲細散每服二錢須以漿水調下食前服每日三夜再服杜仲散出聖濟總録治風虚多汗夜卧尤甚杜仲去粗皮炙剉二兩黃耆剉牡蠣煅赤各三兩麻黃根五兩右為細散每服二錢以煎敗扇湯調下食後服日二附子湯出聖濟總録治漏風汗出不止附子炮製去皮臍一兩半蜀椒去目並閉口炒出汗半兩杏仁去皮尖䨇仁炒黃一兩右剉如麻豆水五升煎至二升去滓分作四服日三夜一四神散出聖濟總録治漏風汗出不止附子炮製一枚去皮臍乾薑炮半兩桂去皮一分甘草半兩半生半熟右為散拌勻以熱酒一升投之旋旋温服令盡可均作一日服如飲酒不得仍用沸湯投之亦得牡蠣散粉方出聖濟總録治風虚多汗不止牡礪􅥏赤二兩麻黃根三兩右爲細散以絹袋盛之粉身每日三五次有汗即粉身無汗即止甚妙一方以食後臨卧時温水調下二錢雞糞方出肘後方治酒中風體角弓反張四肢不隨煩亂欲死方見風口噤類不二散出本草治虚風用膩粉一兩用湯煎五度如茶脚熳火上焙乾麝香半兩細如粉每服一錢温水調但是風臨時服半錢或一錢看虚實加減勞風論夫内經曰勞風法在肺下其為病也使人强上冥視唾出若涕惡風而振寒夫勞風之病腎勞則根虚於下經所謂根虚則莖葉枯矣故目視不眀背反張腎之脈入肺中故因皮毛感風而振慓也腎主唾故津液凝結如涎涕治之以救其俯仰者戒其勞動也方麻黃湯出聖濟總録治風勞胸膈不利涕唾稠粘上焦壅滯喉中不快麻黃去根節荆芥穗木香杏仁去皮尖䨇仁麩炒當歸切焙黃芩去黒心羌活去蘆頭芍藥柴胡去苗大黃炮熟各一分半夏湯浸去滑七次一分牽牛子半兩右粗搗篩每服二錢以水一盞生薑一片同煎取八分食後去滓温服防風湯出聖濟總録治勞風壅滯多痰逆頭昏防風去义獨活去蘆頭羌活去蘆頭柴胡去苗白术甘草炙麻黃去根各一兩芎藭兩二荆芥穗菊花各半右搗篩每服三錢以水一盞煎至七分食後去滓温服龍齒飲出聖濟總録治勞風肺熱氣壅卧卽多驚時復頭旋龍齒碎二兩半黃芩去黑心防風去义赤芍藥各一兩半升麻一兩大青三分大腹皮剉二枚白茯苓去黒粗皮兩半右搗篩每服五錢水一盞半入生薑兩棗大拍碎竹瀝半合銀半兩許同煎至八分去滓食後温服黃連丸出聖濟總録治勞風發熱煩悶不能食兼數欠眠卧不安黃連去鬚三兩人參生薑薄切焙乾茯神去木各一兩半豉一合炒萎蕤一兩右為末煉蜜丸如梧桐子大食後米飲下二十丸日二服地骨皮湯出聖濟總録治勞風上膈壅痰實利頭目地骨皮五兩知母一兩半桔梗去蘆頭甘草炙各一兩前胡去蘆三分右搗篩每服三錢許以水一盞煎至七分去粗食後臨卧温服之皂莢丸出聖濟總録治勞風心脾壅滯痰涎多喉内隘塞吐逆不思飲食或時昏憒皂莢本白皮去粗皮酥炙令黃天南星炮白附子炮各一兩半夏湯洗去滑七次焙乾白礬細研熬令汁盡各一兩右為末以生薑汁煮麫糊丸如梧桐子大以温水下十丸不拘時候萎蕤飲出聖濟總録治勞風項强急痛四肢煩熱萎􅅋三兩人參羚羊角鎊各二兩右搗篩每半兩入豆䜴三合葱白一握以水五盞煎取二盞去滓候温空腹二服枳殻湯出聖濟總録治勞風涕唾稠黏枳殻去穣麩炒二兩人參赤茯芩去黒皮各一兩右搗篩每服三錢以水一盞煎至六分去滓温服芎枳丸出聖濟總録治勞强上冥視方見風熱類麻子酒出千金方治虚勞百病傷寒風濕及婦人𢃄下月水往来不調手足疼痺著狀服之令人肥健麻子一石法麯一斗右先搗麻子成末以水兩石煮釡中蒸麻子極熟炊一石米傾出滓隨汁多少如家醖法候熟取清酒隨性飲之白礬方除風去勞消痰止渇暖水治藏中風失音疥癬等疾用白礬和桃仁葱湯浴可出汗也高良薑湯出指南方治勞風良薑五兩厚朴去皮薑汁製當歸切焙桂心各三兩右為散每服五錢水二盞煎一盞去滓服芍藥黃耆散出指南方治勞風芍藥黃耆川芎各三分右為粗末每服五錢水二盞薑三片棗二箇同煎至一盞去滓温服草烏頭湯出指南方治勞風草烏頭去皮尖生用細辛去苗茶牙等分右為散每服三錢水三盞煎一盞去滓服不拘時候治諸風勞出本草以獼猴肉醸酒飲之治風及勞瘦出本草取蠶蛹子食之皂角化痰丸出衛生寳鑑方治勞風心脾壅滯痰涎盛多喉中不利涕唾稠黏嗌塞吐逆不思飲食及或時昏憒皂角木白皮酥炙天南星炮白附子炮半夏湯洗七次白礬枯各一兩枳殻炒二兩人參一兩赤茯苓去皮一兩右為細末生薑汁麫糊為丸如桐子大每服三十丸温水送下食後解風勞治身體痛出本草用九牛草五月採與甘草同煎汁服九牛草生筠州山崗上二月生苗獨莖高一尺葉似艾葉圓而長背有白毛面青内風論千金論云新房室竟中風為内風其狀惡風汗流沾衣方附子湯治房室竟中風惡風多汗汗出沾衣口乾上瀆不能勞事身體盡痛名曰内風附子生去皮臍人參各半兩茴香茯苓山藥各一兩甘草炙乾薑炮各三分右剉為散每服四大錢水二盞薑三片鹽少許煎至七分去滓食前服之肌肉瞤動論夫肌肉瞤動命曰微風葢邪搏分肉衛氣不通陽氣内皷故肌肉瞤動然風之入脈善行數便亦為口眼瞤動偏喎之病也目瞤動口唇動偏喎背風入脈故須急服小續命湯將八風散摩神明白膏丹參膏依經鍼灸之牛黃天南星丸聖濟總録治風熱相搏肌肉瞤動頭目旋眩筋脈拘急涎潮發搐精神昏昧舌强語澁肢節煩痛心胸不利凡病風氣悉治之天南星以牛膽製者用二兩如無卽用薑水煮透軟切作片子焙乾天麻二兩獨活去蘆頭白附子炮白殭蠶炒人參丹砂研各一分當歸洗切焙碾桑標蛸炒乾蝎炒去土甘草生用各三分羚羊角鎊屑犀角鎊屑麝香研牛黃研雄黃研龍腦研各半兩桂去粗皮一分右先以十三味搗羅為細末再入研藥五味和勻煉蜜丸如酸棗大每服一丸不計時細嚼温酒下或以雞蘇湯下虎骨丸出聖濟總録治風虚肌肉瞤動手足顫掉虎脛骨酥炙松節剉酒炙天麻牛膝酒浸切焙赤箭海桐皮炒獨活去蘆頭石斛去根防風去义酸棗仁烏蛇酒浸去皮骨當歸切焙仙靈皮甜𤓰子洗焙乳香研五加皮各一兩右先以十五味為細末然後入乳香再同研勻酒煮麫糊丸如梧桐子大每服十五丸至二十丸荆芥湯下或茶酒任下不拘時候生犀丸出聖濟總録治風虚肉瞤頭目昏眩四肢拘急或時麻痺旋運多疾牙關𦂳痛欠身倦怠犀角屑鎊屑芎藭羌活去蘆頭白蠶炒荆芥各半兩乾蝎炒白芷藁本去土龍腦研麝香研牛黃研各一兩雞蘇葉二兩天麻酒浸一宿剉焙二兩别搗為細末右除天麻别搗外先以十味搗羅為末再入三味研勻煉蜜半斤入天麻藥末更入河清水並真酥少許置於重湯内煎煉成膏候冷和搜成劑入臼内杵數百下丸如雞頭實大每服一丸細嚼臘茶清下不拘時犀角丸出聖濟總録治風肌肉瞤動頭目昏眩肢節麻痺瘙痒攻痛犀角鎊半兩防風去义丁香各一兩木香各一兩桂去粗皮半兩白花蛇酒浸去皮骨炙一兩獨活去蘆頭一兩丹砂研二兩麝香研一分龍腦研一分天麻人參各一兩天南星炮二兩右先以十味搗羅為細末再入研藥和勻煉蜜丸如雞頭實大每服一丸細嚼荆芥茶或温酒下不拘時化風丸出聖濟總録治風氣肌肉瞤動頭目昏眩雞蘇葉二兩羌活去蘆頭一兩半芎藭一兩半羚羊角鎊屑防風去义天麻人參白蠶炒各一兩乾蝎炒四錢龍腦研麝香研各五錢天南星炮半兩右先以十味搗羅為末然後入龍腦麝香再同研煉􅁡丸如雞頭大以丹砂為衣每服一丸或二丸茶清酒任下不拘時候乳香丸出聖濟總録治風虚氣閉口眼瞤動偏正頭昏痛乳香研二分天麻麻黃去根節防風去义半夏烏頭去皮臍天南星芎藭地龍去土各三分右並生用搗羅八味為細末入乳香和勻用酒煮麫糊丸如梧桐子大每服十五丸荆芥茶空心食前服荆芥湯出聖濟總録治風氣肌肉瞤動頭目昏眩手足麻痺天麻芎藭各一兩荆芥穗雞蘇葉各二兩白附子炮甘草炙各半兩右為細末煉蜜丸如櫻桃大每服一丸嚼破茶酒任下肉苛論内經謂人之肉苛者雖近衣絮猶尚苛也以榮氣虚衛氣實也夫血爲榮氣爲衛氣血均得流通則肌肉無不仁之疾及榮氣虚衛氣實則血脈凝滯肉雖如故而其證瘰重爲苛也方五味子酒出聖濟總録治榮虚衛實肌肉不仁病名肉苛五味子防風去义牛膝枸杞子用根白皮牡丹去心肉蓯蓉切焙黃芩去黒心白术丹參去苖微炙當歸切焙甘草炙剉枳殻麩炒去穣桂去麤皮厚朴去麤皮塗薑汁炙五遍五加皮剉澤㵼知母焙細辛去鬚葉炒白芷炒各一兩右剉如麻豆大生絹囊盛用好酒二斗蜜封浸經七日每空心午時夜卧各温服五合又漸加至七合一升勿令醉吐防風酒出聖濟總録治榮虚衛實肌肉不仁病名肉苛防風去义二兩白术山茱萸並子用山芋乾者附子炮製去皮臍天雄炮製去皮臍細辛去鬚葉輕炒獨活去蘆頭秦艽去土茵芋去粗莖杏仁湯浸去皮尖䨇仁炒生地黃浄洗細切各一兩半紫巴㦸去心桂去粗皮麻黃去節剉先煎去沫焙乾用生薑切焙各二兩薏苡仁炒二兩磁石生搥碎如大豆粒浸去赤汁半斤右剉如麻豆生絹囊盛以無灰清酒三斗浸六七日空心温飲四合至五合以知為度苦參丸出聖濟總録治榮虛衛實肌肉不仁病名肉苛苦參二兩剉搗取粉丹參去土㣲炒沙參去塵土人參五加皮防風去义剉蒺䔧子炒角黃烏蛇酒浸用肉蔓荆實去白皮敗龜塗醋炙令黄虎骨塗醋炙令黃𤣥參堅者各一兩右為末别以不蛀皂角一斤以水三升挼取汁去滓於無油鐵器内煎成膏煉蜜四兩拌和為丸如梧桐子大每服後良久夜卧共三服各用荆芥薄荷酒下十五丸至二十丸獨活酒一名金牙酒出聖濟總録治肉苛肌肉不仁徧身􅍙重方見諸風雜治類金牙酒煎胡膏一名煎胡散出明宣論治榮虚衛實肌肉不仁病名肉苛其氣虗前胡去蘆頭白术生用白芷剉留一枚不剉以驗成膏芎藭各三分椒去目並閉口生用吳茱萸湯洗焙乾炒用二兩附子去皮臍生用當歸細切五兩細辛去苗葉桂去粗皮各三兩右剉搗别以苦酒三升勻拌同窨一宿以煉成豬膏五斤入藥微煎之候白芷黃紫色去滓膏成病在外摩之病在内以熱酒調化服櫻桃大疥癬瘡痍皆藥之並去諸風􅍙麻疼痛神效傷折及墜墮損外摩内服牛膝天麻丸出聖濟總録治榮虛衛實肌肉不仁徧身􅍙重牛膝酒浸切焙一兩天麻酒浸切焙一兩半麝香研桂去粗皮各一分乾蝎炒去土白花蛇酒炙各半兩檳榔剉三分獨活去蘆頭三分防風去义一兩右為末煉蜜和丸如梧桐子大每服十五丸薄荷酒下荆芥湯亦得不拘時升麻秦艽去土連翹芍藥防風去义羚羊角鎊木香枳殻去穣麩炒薏苡仁各半兩右細剉分為十服每服以水二盞生薑五片煎取一盞去滓徐徐温服白殭蠶丸出聖濟總録治榮虛衛實肌肉不仁病名肉苛白殭蠶半兩炒天南星炮製湯洗半兩附子炮製去皮臍一兩白附子炮製湯洗一兩乾薑焙製切一分膩粉半兩麝香一分與膩粉同研為細末右為細末煉蜜為丸如梧桐子大每服空心温酒下三丸至五丸癧瘍風論夫風邪積熱居於肺腑乆而不散流溢皮膚令人脛邊胸前腋下自然斑駮㸃相連色微白而圓亦有紫色者亦無痛癢謂之癧瘍風也此皆風之與熱伏留肌腠之間氣血不和乃生斯疾也方烏蛇散出聖惠方治癧瘍風頸面斑駁白蛇酒浸去皮骨二兩秦艽去苗土芎藭各二兩半桂去粗皮羌活去蘆頭人參山栀子枳殻去穣麩炒丹參𤣥參沙參犀角鎊各一兩升麻防風去义蒺䔧子炒去角各一兩二錢苦參二兩白鮮皮黃芩去黒心木通剉右為散每日温酒調下三錢以食後臨卧服忌雞猪魚蒜熱麫等蜀水花膏出聖惠方療癧瘍風蜀水花白附子麝香白歛商陸鷹糞白各二錢右切以猪膏二升合煎之沸三上三下膏成以傅上一方有當歸無商陸女萎膏摩方出聖惠方治遍身癧瘍斑駁女萎一分附子一枚去皮臍生用雞食香研半兩木香半兩白芷三分右極細搗勻以臘月豬膏七両合於㣲火上煎鎔去滓投前藥末煎三四沸入研麝香一分攪調復煎三上三下膏成甆器収貯每用少許摩之硫黃散塗方出聖濟總録治癧瘍風赤白癧風硫黃研半兩砒霜研膩粉各一分蒼茸實一合為末右研細入薑汁半合調勻少少塗之勿令近口硫黃塗方出聖濟總録治癧瘍風硫黃一兩半雄黃半兩硼砂研附子生各一兩右為細末以苦酒調塗之乾卽易治癧瘍風出聖惠方硫黃水銀礬石竈墨各等分右搗篩内盒子中以葱葉中涕和研臨卧傅病上又方硫黃雄黃檞皮燒蛇蛻一具右各等分搗篩以清漆合和傅塗白處欲塗時先以巴豆半合拭白處皮破然後傅之不過三兩度炊箒飲出聖惠方治面及項忽生白駮狀如白癬名之癧瘍故炊箒甑𢃄履底蛇蛻皮各半兩右以月蝕夜伺候正蝕時都燒之成灰細研令每服不計時候以温酒調服二錢以醋調藥如膏以塗傅駮上即消雄黃散塗方出聖惠方治癧瘍風面頷頸項忽生斑駮其狀如癬雄黃硫黃白礬並研如粉各一兩右各研令勻以煉成豬脂調和塗瘡上附子散塗方出聖惠方治癧瘍風身體斑駮附子一枚大者去皮生用硫黃研半兩蒼耳苗一握乾者右為末以米醋調以布揩瘍上即以藥塗之乾更塗治面及項忽生白馬狀如白癬名曰癧瘍出聖惠方硫黃三兩細研附子一兩去皮臍鐡精一兩細研右搗同研為散以三年米醋和内甆合盛蜜封七日先以好陳醋净洗了拭乾塗之三兩日慎風巴豆塗方出聖濟總録治癧瘍風面頰頸項忽生斑駮如癬巴豆去皮生用一兩釅醋一合右先以新布揩令赤然後取磁盆用醋磨巴豆如稀膏塗患上瘥治癧瘍風白斂薰木香右等分為末水服方寸用揩患處亦可硫黃方治癧瘍風方見紫白癜風類治身癧瘍風斑馬方出聖惠方硫黃半兩臭黃一分右都細研令勻以生薑汁塗調日三度用之治癧瘍風出聖惠方青胡桃皮三箇硫黃一分細研右爛搗研之入少許醬汁調令相入先以泔清洗之然後塗於患上烏蛇散出聖惠方治癧瘍風狀似白癜用烏蛇一條酒浸去皮骨炙搗羅為散炒黑豆半合以無灰酒浸去滓取豆酒調服三錢以空心食前服油麻酒出聖濟總録治癧瘍風方見口眼喎斜類治癧瘍風出聖惠方取塗中死蜣蜋杵搗之爛當揩令熱封之一宿瘥治癧瘍風出聖惠方取醋磨烏賊魚骨先以布揩肉赤卽傅之三年醋佳羊蹄根方出聖惠方治癧瘍風用羊蹄菜根於生鐡上以好醋磨旋旋刮取塗於患處未差更入硫黃少許同磨塗之一方治大風癩瘡用羊蹄根菜洗浄晩以口嚼嚥了汁塗擦患處崔氏療癧瘍方取茵陳蒿兩握以水一斗五升煮取七升以皂莢湯先洗癧瘍令傷然後以湯洗之湯冷更温洗可作三四度洗隔日作佳不然恐痛難忍療癧瘍方取青胡桃皮搗之並少許醬青和硼砂令相入如煎餅麫先以泔清洗之然後傅藥蒴藋湯治癧瘍風方見風瘨癋疹類硫黃膏出肘後方療癧瘍風用硫黃不拘多少為末以醬和作泥先以生布揩破患處傅之一方或以醋摩傅之或以硫黃薰之患處普差一方治紫白殿風用生薑汁數㸃調潤硫黃末却以生附子或烏頭截作兩段蘸藥擦患處立愈一方傅治紫殿風用生薑同煎或膏浴罷以藥擦之或用白面脂調丸塗亦可一方用米醋化開將蒂蘸硫黃醋磨擦癜風處蒼茸丸出聖惠方治癧瘍風用蒼茸葉不計多少隂乾搗羅為末用五兩取粟米二合煮作粥即研粥如膏用莨菪子淘去浮者炒令黃黒色搗細羅為末用一兩都相和令勻丸如菉豆大每日空心温酒下二十丸至晩食前再服治癧瘍風出聖惠方用五月収赤足蜈蚣燒灰醋調塗之治癧瘍白癜風本草以蛇蛻皮煎汁敷之治癧瘍風本草用糟筍中酒磨之治癧瘍風本草取丹挃木皮一握去黒土打碎煎如糖塗風上風㾦㿔論夫風㾦㿔者由腠理不宻陽氣外泄發而為汗汗出未已為風邪所搏風熱相併不得流行故結為㾦㿔狀如麻豆甚者漸長搔之成瘡方烏蛇散出聖惠方治風熱遍身生㾦㿔瘙痒烏蛇酒浸二兩去皮骨炙㣲黃天麻麻黃去根節秦艽去苗牛旁子㣲炒藁本白殭蠶㣲炒各三分羌活白鮮皮桂心甘草炙㣲赤剉枳殻麩炒㣲黃去穣蔓荆子芎藭當歸各半兩蒲黃右為細散每服不計時候以温酒調下二錢荆芥散出聖惠方荆芥赤茯苓苦參剉各一兩牛旁子㣲炒黃芩各三分蔓荆子天麻人參去蘆防風去蘆獨活枳殻麩炒黃去穣各半兩烏蛇肉酒浸㣲炒二兩右為細散毎服不計時候用温酒調下二錢治風熱毒氣客於皮膚遍身生㾦㿔狀如麻豆出聖惠方秦艽去苗一兩防風去蘆黃芩麻黃去根節犀角屑𤣥參甘草炙㣲赤剉各半兩枳殻麩炒㣲黃去穣牛旁子㣲炒黃香剉川麻各三分右㕮咀毎服三錢以水一中盞煎至六分去滓不計時温服枳殻散出聖惠方治脾肺風熱攻皮膚生㾦㿔瘙痒不止枳殻麩炒微黃去穣白蒺䔧微炒去刺羚羊角屑羌活桑根白皮剉各三分防風去蘆升麻白鮮皮甘草炙微赤剉各半兩麥門冬去心焙麻黃去根節各一兩右㕮咀每服四錢以水一中盞煎至六分去滓不計時候温服丹參湯出聖濟總録治風熱頭面生㾦㿔痒痛丹參剉紫參蒺䔧子炒去角黃芩去黑心防風去义黃耆剉羌活去蘆頭一兩白鮮皮連翹各三分甘草炙半兩右㕮咀每服三錢以水一盞煎至七分去滓食後温服胡麻散出聖濟總録治脾肺風毒攻注皮膚瘙痒手足生瘡及遍身㾦㿔發赤黑靨子肌熱疼痛胡麻炒令香熟枳殻去穣麩炒各二兩防風去义蔓荆實葳靈仙去土苦參何首烏米泔浸透去黑皮切麩炒乾芎藭荆芥穗甘草炙各一兩薄荷用葉半斤右共為散每服二錢以温酒調或煉蜜丸如梧桐子大每服三十丸温酒亦得獨活丸出聖濟總録治風癮疹㾦㿔腫起時痒時痛獨活去蘆天門冬去心焙防風去义蒺䔧子炒去角桔梗去蘆頭各一兩一分薏苡仁炒黃連去鬚各一兩桂去粗皮半兩枳實去穰麩炒一兩半右為細末煉蜜和丸如梧桐子大每服二十丸空心臨卧菊花湯下或米飲亦得羚羊角散治風熱皮膚生㾦㿔痒痛羚羊角屑川大黃剉碎微炒𤣥參烏蛇肉酒浸微炒各一兩防風去义秦艽去苗各三分枳殻麩炒去穰微黃白蒺䔧微炒去刺甘草炙微赤剉各半兩右為散每服三錢以水一中盞煎至五分去滓入牛旁根汁半合更煎一兩沸不計時候温服沙參散出聖惠方治風熱皮膚生㾦㿔搔之痒痛沙參去苗白蒺䔧微炒去刺枳殻麩炒微黃丹參各三分白附子炮製白鮮皮天麻犀角屑川大黃剉碎微炒各半兩右為細散毎服不計時候以温酒調下一錢蒺䔧丸出聖惠方治風瘙痒生㾦㿔白蒺䔧㣲炒去刺秦艽去苗赤茯苓各一兩羌活苦參剉黄芩細辛各半兩枳殻三分麩炒㣲黃去穣烏蛇三兩酒浸去皮骨炙㣲黄右為末煉􅁡丸如梧桐子大毎服不計時候以温􅁡湯下三十丸栁枝湯洗方出聖惠方治風瘙皮膚生㾦㿔搔之腫痒嫩栁枝苦參桃枝蒴藋各五兩茵陳狼牙草青葙葉各三分槐白皮四兩麻黃二兩去節根右細剉和勻毎服一斤以水五斗煮取四斗去滓更入鹽及朴硝各二兩攪勻㸔冷熱於温室中洗浴洗罷衣服汗出差切慎外風犀角防風散出聖濟總録治風瘙痒或生㾦㿔赤腫疼痛犀角鎊防風去义藁本去苖土蒺䔧子炒枳殻去穣麩炒各一兩羌活去蘆丹參甘草炙各半兩右為細散毎服二錢以温酒或荆芥茶調下不拘時蒺䔧子丸出聖濟總録治風熱相併體生㾦㿔發即衝頭面赤熱皮膚瘙痒甚成瘡不欲飲食蒺䔧子沙苑者酒浸令軟研作膏枳實去瓤麩炒各一兩半獨活去蘆天門冬去心焙白术人參各一兩右為細末搗勻煉蜜和丸梧桐子大毎服二十丸用薄荷酒下空心日午臨卧各一服枳殻浸酒出聖惠方治風瘙􅐊疹皮膚生㾦㿔或如蟲行枳殻去瓤麩炒三兩秦艽去苗土獨活去蘆肉從蓉四兩丹參蒴藋各五兩松葉細切二斗右剉如麻豆用生絹袋貯以清酒二斗浸六宿毎服半盞日三夜一漸加至一盞蒺䔧浴湯出聖濟總録治風毒瘙痒癮疹漸成㾦㿔蒺䔧子炒茺蔚子羊桃剉蒴藋根苖切漏蘆去蘆苦參切各半兩鹽四兩右㕮咀毎料以水三石煮取二石五斗去滓於温室中淋浴仍先飽食卽入浴乆浸最良可隔夜一浴浴乾衣覆取汗慎外風天門冬丸出聖濟總録治肺臟風熱皮膚結成癮疹㾦㿔瘙之痒痛成瘡天門冬去心焙二兩枳殻去穣麩炒白术人參各一兩半苦參剉獨活去蘆頭各一兩一分右為細末煉蜜為丸如梧桐子大每服二十丸温酒或米飲下日三夜一枳殻丸出聖惠方治風熱頭面皮膚瘙痒煩悶生㾦㿔枳殻三兩麩炒微黃去穣天門冬去心焙白蒺䔧微炒去刺獨活各一兩半牛旁子薏苡仁各一兩右為末煉蜜和丸如梧桐子大每服於食後以温水下三十丸防風散出聖濟總録治風毒面生㾦㿔遍體瘙痒防風去义杏仁去皮尖雙仁炒黃色白殭蠶炒各二兩甘草炙剉一分右為散每服三錢空心蜜酒調下桃仁塗方出聖濟總録治風毒赤疹浮腫成㾦㿔桃仁去皮尖雙仁生用杏仁去皮尖生研各三兩胡麻生研凝水石研如粉各二兩右各研細别研芸薹菜絞取汁和以白蜜入前研藥攪為稀膏用塗患處乾卽易之景天花散出聖濟總録治脾肺風毒遍身發㾦㿔瘙痒煩燥景天花漫火焙乾一錢俗謂慎火草紅麴捒半兩朴硝三錢右同入乳鉢研為細散每服二錢以食後臨卧温水調下野葛膏出聖惠方治風瘙􅐊疹腫痒狀如㾦㿔或如繭栗野葛二兩附子去皮臍留半枚不剉驗膏牛蒡子並根共一斤右並生用剉以醋拌浸浥一宿用煉成猪脂三斤半同藥慢火煎待不剉附子黃赤色去火濾去滓傾入磁瓦合中収貯頻用摩折患處每洗一用黑豆洗之苦參丸出聖惠方治風熱皮膚生㾦㿔苦參二兩川芒硝二兩牛旁子㣲炒二兩右為末煉蜜丸如梧桐子大每於食後以温酒下三十丸又方出聖惠方皂角不蚛者三兩去皮塗酥炙炒去子荆芥二兩凌霄花四兩右為末以精羊肉八兩細切和搗丸如梧桐子大毎服不計時候以温水下二十丸垂楊湯浴方出聖惠方治皮膚風熱生瘡㾦㿔或痒痛倒垂栁二斤白礬二兩生使杏仁三兩右㕮咀以水一斗五升煎至一斗去滓於無風處洗浴極妙丹參湯洗方出聖惠方丹參四兩剉蛇床子三合生用右件藥以水一斗五升煎至七升去滓承熱洗之風瘙痒論夫風瘙痒者由風邪氣客於肌肉則令肌肉虚真氣散寒氣搏於皮膚外發腠理陰邪與衛氣相搏陽勝則熱陰勝則寒寒則虛虛則邪氣徃來故多瘙痒也風瘙痒者表虛衛氣不足風邪乘之血脈留滯中外發作變而生熱熱則瘙痒乆不差滛邪散溢瘙之則成瘡方延年蒺䔧子方出聖惠方療熱風衝頭面痒如蠱行身上時有風疹出除風熱消疹兼補益堅筋骨倍氣力充實方蒺䔧子六分黃耆獨活白芷防風薯蕷各三分枳實炙人參黃連各四兩葳􅅋地骨皮各二兩桂心一分右為末􅁡和丸如梧子大一服十丸酒下日二加至十五丸中間欲服术煎及黃連丸並無妨忌猪肉生葱石南湯出聖惠方夫人虚風邪中於榮衛溢於皮膚之間與虚熱並故遊奕遍體如蟲行此湯療六十四種風滛淫液液走入皮膚中如蟲行腰脊彊直五緩六急手足攣癮疹瘙之作瘡風尸卒面目腫起手不出頭口噤不能言方見諸風雜治類治面上皮起及身體瘙痒出聖惠方白蒺䔧去刺㣲炒二兩乾薑炮製剉芎藭白术山茱萸防風去蘆羌活甘草炙微赤剉各一兩枳殻麩炒微黃去穰各三兩麻黃去根節薯蕷烏啄炮製去皮臍右㕮咀每服四錢以水一中盞煎至六分去滓不計時温服日三服忌熱麫雞肉魚蒜苦參散出聖惠方治遍身風瘙痒不可止苦參剉蒼茸苗蔓荆子牡荆子白蒺䔧微炒去刺𤣥參胡麻子晩蠶沙蛇床子天麻各一兩晚蠶蛾乳香各半兩右細羅為散每服不計時候以紫笋茶調下二錢烏金丸出聖惠方治風毒攻注皮膚遍身瘙痒煩熱多汗槐鵞半斤羌活白附子各二兩天麻烏蛇一條各三兩枳殻去穣麻黃去根節胡桃瓤各一兩皂莢三十挺肥者臘月鵶一隻去足臘月狐肝一具右細剉以一箇劑子磁瓶先納烏蛇及鵶狐肝等歇口燒欲熱過後下諸藥以大火煅令通赤待冷取出入麝香半兩同研令細以槐膠爛煮搗和丸如梧子大每服食後荆芥湯下二十丸防風浴湯出聖惠方治風瘙痒不可止防風羊桃根苦參各三分蒴藋切一斤石南秦艽川升麻茵芋白蒺䔧蛇床子白礬枳殻各一兩右細剉都以水七斗煎至五斗去滓於温室中洗浴令汗出避風冷秦艽丸出聖濟總録治肺風熱皮膚瘡癬瘙痒秦艽烏蛇酒浸去皮骨炙苦參枳殻去瓤麩炒升麻黃芩去黑心防風去义各一兩半惡實二合大黃剉炒二兩右為細末煉􅁡和丸如梧桐子大每服三十丸食後以温漿水送下藁本散出聖濟總録治遍身瘙痒如蟲行藁本去苗土白花蛇酒浸去皮骨炙各三分人參三分枳殻去穣麩炒防風去义葳靈仙各半兩防己一分右為細散毎服一錢以食後温酒或荆芥湯下天麻丸出聖濟總録治風客皮膚瘙痒麻痺天麻附子炮製去皮臍芎藭白附子生用烏藥各一兩荆芥穗八兩龍腦别研麝香别研各一錢右除别研外為細末拌勻煉蜜丸雞頭大毎服一丸空心臨卧温酒嚼下治風熱皮膚瘙痒出聖惠方白术二兩蒴藋黃連二兩白礬半兩黃芩二兩細辛一兩芎藭一兩茵芋一兩右件藥細剉以水二斗煮取一斗去滓旋旋分煖二升洗之日二三莽草湯出聖濟總録治風皮膚􅍙麻疼痛瘙痒淋洗方莽草藁本去土桔梗去蘆炒地榆穀精草枳殻去穣麩炒生乾地黃洗切焙各一兩蜂窠一枚大者細切右㕮咀每用三兩水一斗煎至八分乘熱淋患處天麻散出聖惠方治風瘙身體無處不痒或生瘡腫天麻防風去蘆白殭蠶微炒凌霄花微炒躑躅㣲炒各半兩枳殻麩炒微黃去穰茺蔚子各三兩白蒺䔧一兩微炒去刺右為細散每於食前荆芥湯調下二錢烏蛇散出聖惠方治風熱客於皮膚遍身瘙痒烏蛇二兩酒浸去皮骨微炙𤣥參秦艽去苗赤箭各一兩乾蝎微炒麻黃去根節猪牙皂莢炙黃枳殻麩炒微黃去穣各半兩右細羅為散每服不計時候以温酒調下二錢丹參散出聖濟總録治風瘙痒搔之成瘡丹參苦參升麻各一兩黃芩去黑心防風去义各半兩枳殻去穣麩炒烏頭炮製去皮臍各一兩右為細末煉蜜為丸如梧桐子大每服三十丸食後温漿水下防風湯出聖濟總録治風瘙痒如蟲行或麻痺不仁淋洗方防風去义益母草苦參各三兩蒺䔧子炒五兩荆芥穗蔓荆實各二兩枳殻去穣麩炒二兩右㕮咀毎用三兩水一斗煎至八升乗熱淋洗患處療舉體痛痒如蟲行齧齒上痒時搔則皮脫作瘡千金方蒺䔧三升碎蛇床子二升茺蔚子一升防風五兩大㦸一斤大黃二兩礬石三兩熬右㕮咀以酒四升水七升煮取四升去滓内礬石三上火燒用帛拭身上差止一方無大黃風瘙粉方出聖惠方治風瘙痒皮膚生㾦㿔搔之成瘡芎藭白芷麻黃根各四兩藿香三兩䔧蘆二兩雷丸半斤篩粉四升右合和常用芒硝湯拭疹上兼用粉身葳靈仙散出聖惠方治脾肺風毒攻皮膚瘙痒或生瘡癬葳靈仙去土防風去义羌活去蘆甘草炙各一兩紫參半兩荆芥穗一分右為細散毎服二錢以蜜湯調下不拘時服天麻散出聖濟總録治熱毒風攻遍體瘙痒癮疹皮膚􅍙痺肢節疼痛大腸不利天麻防風去义羌活去蘆甘菊花各二兩甘草炙剉一兩杏仁去皮尖䨇仁炒令黃二兩右為細散毎服三錢以空心蜜酒調下日一再服天門冬丸出聖濟總録治風熱皮膚瘙痒􅐊疹生瘡如水疥粟粒方見風㾦㿔類搨洗方出千金方治風痒腫瘡痒在頭面大黃芒硝各四兩黃連六分莽草二分一作甘草二兩黃芩八分蒺䔧子三合右㕮咀以水七升煮取三升去滓下硝以帛染搨洗日一度勿令近日五白散出聖濟總録治皮膚風痒晝夜不止白附子炮白殭蠶炒白蒺䔧炒白鮮皮各一兩白花蛇酒浸去皮骨炙三兩右為細散毎服三錢以空心臨卧温酒調下四生丸出聖濟總録治皮膚風痒瘡癬􅍙麻冷脾熱毒癰癤草烏頭半兩白殭蠶炒苦參黒牽牛各一兩並生用右為細末酒煮麫糊丸如梧桐子大毎服十五丸温酒下日三服枳殻散出聖濟總録治風皮膚瘙痒麻痺枳殻去穣麩炒二兩苦參蒺䔧子炒去角蔓荆實各一兩右為細散毎服二錢以温酒調下不拘時荆芥散出聖濟總録治風瘙痒搔之成瘡荆芥穗麻黃去根節湯浸煮掠去沫焙乾羌活去蘆獨活去蘆各等分右為細散毎服二錢臘茶或温酒調下食後臨卧服治風瘙痒不可忍者方出聖惠方烏蛇二兩酒浸去皮骨炙㣲黃枳殻三分麩炒黃去穣乾荷葉半兩右為細散毎服不計時候用温蜜酒調下二錢苦參丸出風科集驗方治肺風皮膚瘙痒或生癮疹疥癬寇宗奭云有人遍身熱細􅇙痒痛不可忍者連胸脛臍腹及近隠皆然涎疾亦多夜不得睡苦參一斤皂莢去皮並子搥碎二斤以水一斗浸揉取濃汁濾去滓熬成膏右搗苦參為細末皂莢膏和丸如梧桐子大毎服三十丸荆芥薄荷酒下一方無荆芥薄荷酒下治遍身風熱細疹痒痛雄黃丸治風身體如蟲行方方見大風癩病類蟬蛻方肘後方治風客皮膚瘙痒不止蟬蛻薄荷葉各等分右為末酒調一錢每日三服一方有蜂房無薄荷葉枳殻湯出聖濟總録治風瘙痒用枳殻去瓤麩炒三兩粗搗篩每服三錢以水一盞煎至七分去滓温服茱萸方出肘後方治患風瘙痒痛方用茱萸三升清酒五升和煮取汁一升半去滓以汁煖洗一方治風瘙癮疹用帛染汁拭病上一方治皮肉痒痛加水五升依前和煮微煖洗之立止治風痒皮中風虛出千金方枳實三升松葉切一升獨活蓯蓉黃耆秦艽各四兩丹參蒴藋各五兩右㕮咀以酒二斗浸六宿每服二合日二稍加之治中風煩熱皮膚瘙痒出聖惠方見本門風熱類治風腫痒出本草以栁枝皮煮湯洗之治風瘙皮肌惡痒出本草用六英煎湯入少酒浴之良治風瘙皮膚痒出本草以及己煎汁浸洗除風痒出本草以接骨木作湯浴之治風痒出本草以蒺䔧葉煮水浴之治風瘙疥痒出本草以半天河水温洗之半天河水在槐樹間者治遍身風痒生瘡疥出本草以茵陳不計多少煮濃汁洗之立瘥八味散出聖濟總録治遍身瘡疥皮破肉痛或瘙痒膿水塗方方見諸瘡腫門諸疥類普濟方卷一百七
