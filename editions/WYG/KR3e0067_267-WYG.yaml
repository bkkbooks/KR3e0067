body:
  text: 普濟方卷二百六十七明周王朱橚撰諸方香煎門諸湯御愛靈黍湯出百一選方大小麥各二兩甘草四兩炒縮砂仁二兩半生姜一斤連皮切鹽六兩白者佳右將大小麥炒熟入諸藥焙乾為細末用磁噐盛食前後可服煖脾補元宿飲甚佳大小麥恐有粗皮難服先别多碾取浄末用加肉荳蔲八枚尤佳雞香散方出百一選方茴香半兩㨂净細研為末甘草剉細炒鹽白者佳各一兩良薑乾薑已上二味細剉以麻油搽過用慢火炒金紫色各一兩川胡椒五錢㨂净用水淘過細研為末右為細末㸃服每服加胡椒半兩忌生葱蒜及水菓韻梅湯出百選方半黄梅一百枚搥去核仁青椒四兩揀净秤姜一斤去皮研鹽半斤甘草細剉為末秤一兩新㑹皮切細絲净秤一兩乾山藥晒乾去皮研為末一兩右於浄盆中一處拌匀安烈日中晒半月捴以色變稍紫為度如半月内不能變紫不妨多晒三伏中晒易變色更約度稀稠得所為佳如遇隂雨忌辰晦日及起風月忌日宜避忌安净磁器中每用少許沸湯送下不宜多服橙湯出百一選方橙子十枚正黄色乾山藥去皮切細一兩白鹽炒四兩甘草二兩鹽白梅四兩搥去核不去仁右先用橙子山藥白梅一處研細揑成餅子焙乾再研為細末入檀香半兩尤佳一方入生姜二兩沸湯㸃集香湯出百一選方縮砂五兩去皮甘草三兩胡椒檀香各半兩青鹽四兩右先炒鹽甘草次下餘藥炒令香熟為細末如常㸃如無青鹽只用海鹽清中湯出百一選方菖蒲半斤須水中生者净洗切作片子桔梗生薑切作片各四兩鹽二兩甘草二兩半炙右和匀罨一宿晒乾為細末入瓶窨一月如常㸃見火即色不白一方有人參紫薑湯出百一選方生薑一斤片切慢火炒令熟舶上丁香皮二兩甘草二兩剉鹽三兩炒丁香五十枚右件攪焙乾為度搗羅為末温中湯出百選方縮砂仁二兩甘草炙鹽炒各三兩丁香一分生薑半斤去皮右将薑搗碎與縮砂甘草鹽一處拌匀淹一宿焙乾次入丁香同為細末湯㸃下一方只用甘草一兩四順生薑湯出百一選方神麴四兩生薑半斤肥嫩者洗浄細切與神麴同和作餅焙乾草荳䓻一兩半炮熟去皮秤大麥蘖一兩㣲炒甘草一兩半炙右為細末如常入鹽少許沸湯㸃下一方無草荳䓻小煑香湯出百一選方香附子四兩不去皮只浄洗畧於炒盆内擦去毛用水三升煑草果子一兩取仁縮砂甘草各一兩丁香一分檀香半兩右先煑香附子次用餘藥同煑乾切香附子碎焙乾為細末入鹽㸃服醍醐湯出百一選方神麴官桂乾姜煨各二兩鹽三兩炒過甘草七兩净者烏梅八兩净洗拍碎右先將内五味焙乾搗羅為細末後入炒鹽滚合作一處用新净磁罐收白湯㸃下暗香方出百一選方清神爽氣香附子一兩揀大而無皮者炒縮砂仁一兩半炒木香一分檀香一錢甘草二兩炙胡椒一錢炒右件同為末入鹽㸃服不拘時檀香湯出和劑局方治精神不爽頭目昏眩心忪煩躁志意不定川芎不見火白芷不見火各二兩桔梗焙三十兩檀香不見火三兩甘草炒六兩右為細末每服一錢入鹽少許沸湯㸃服常服調中順氣安神定志清爽頭目煑香湯出醫方集成木香丁香檀香沉香人參各二兩甘草一兩檳榔半兩白茯苓二兩去皮右細剉以清水二升同煎煑令水盡為度或於銀噐内貯重湯乾窨尤妙先擇軟爛者切焙令半乾入體燥者一處焙乾搗羅為末不入鹽如茶㸃一方入藿香半兩八神湯出百一選方温脾益胃消酒化食治胷膈痞悶嘔吐惡心神麴炒麥蘖炒甘草炙各三兩丁香一分胡椒一分鹽三兩生薑四兩細切草荳䓻三箇剉去皮右件除丁香胡椒二味餘藥共一處水浸一宿次日焙乾連丁香胡椒同為末沸湯㸃服一名姜麴湯金粟湯出百一選方粟米一升生薑十兩甘草四兩草果二兩浄肉右件将粟米淘淨同生姜研碎淹一宿作餅子焙乾却同將甘草草果搗羅為細末若更入白术二兩絶妙每服二三錢入鹽少許沸湯㸃下不計時服粉浸湯出百一選方生薑十兩去皮秤洗凈切作餅子杏仁五兩湯去皮尖白鹽五兩甘草五兩㣲炙别搗為末右先將杏仁細研次下生姜次下甘草鹽一處研如泥拍作薄餅子一日焙乾碾為細末經宿則色不白沸湯㸃服鹽薑湯出百一選方生薑一斤甘草五兩鹽六兩縮砂仁三兩右先將甘草炙過用薑鹽為碎磈子同淹一宿焙乾乘熱罨一宿為細末湯㸃如常服龍砂湯岀百一選方縮砂仁十兩去白膜丁香一兩二錢甘草二兩剉鹽三兩半右先以文武火炒鹽乾次下甘草粗末候黄下細末次下縮砂㣲炒香熟盡傾入磁礶子中先入丁香然後以厚紙急盖令宻不得透氣候冷取出為末㸃之荔枝湯出濟生拔粹方烏梅肉甘草各二兩百藥煎一兩白芷半兩白檀二錢右為細末湯㸃服川芎湯出百一選方川芎一兩甘草菖蒲縮砂仁右等分於銚子内紙襯微妙黄同為細末入鹽㸃服橄㰖湯出百一選方百藥煎三兩細切作餅子檀香剉焙白芷各五錢甘草炙一兩半右為細末沸湯㸃服乾木𤓰湯出百一選方紫蘓五兩切生姜三兩切鹽三斤木𤓰十枚去穰切片子右件將鹽入在三味内一處拌和勻淹兩日洗净為細末入在瓶子内收之喫時湯米一升甘草三兩炙為末入在湯内如常㸃服濕烏梅荔枝湯出百一選方烏梅三十枚大者有肉右先以湯浸三五次去酸水取肉研爛與榶同熬用桂末兩入湯内毬糖一斤臨時添减與烏梅同熬得所即止生姜半斤取汁加减多少用右件熬成膏看可便住火用湯或水調㸃止渇甚妙宻封瓷噐収貯乾䜴湯又名元液湯出百一選方好鹽䜴二斤焙乾别搗羅為細末蒔羅茴香馬芹子各半兩椒半兩去目炒乾乾茵蔯一兩鹽五兩炒乾乾姜半兩炮甘草半兩炒右同作細末與䜴末同入臼杵勻以馬尾羅隔令極匀用湯㸃服清韻湯出百一選方縮砂仁三兩石菖蒲一兩甘草半兩炙右為細末入鹽少許沸湯㸃服桂花湯一名桂香湯出百一選方甘草略炙一兩桂花三升㨂去青柄子細研以磁噐盛貯覆合略蒸花須就團摘墜地者亦可乾姜一兩右件為細末同桂打勻量入炒鹽少許磁噐盛貯莫令漏氣如常法㸃梅花湯出醫方集成旋摘方開者鎔蠟封花口投蜜礶子過時用之以匙桃花兩朶連蜜一匙沸湯斟服桂漿法出百一選方夏月飲之解渇消痰氣味香美格韵絶高以桂二兩桂須四兩去粗皮無味者取二兩白沙蜜一升以水二斗先煎取一斗待冷入新磁瓶中後下二味攪二三百轉令匀先以油單一重覆上加紙七重以繩封之每日開一重七日開之藥成矣三伏中或懸之井底蠟紙宻封泥七日出井熟矣洞庭湯出百一選方以細皮黄橘子一斤於净盆内以一砧子就盆内薄切去核留汁生姜去皮半斤甘草四兩搗碎鹽三兩一處拌淹一兩宿取出焙再以橘汁浸沫盡為度焙乾為細末如常法㸃若添神麯炒麥糵炒各四兩以拌橘汁即不須再浸尤妙風流藴藉非其他洞庭湯比以其不去橘肉故也鳯池湯成伏中合臘中方可成故名造化湯肥烏梅去仁留核甘草鹽右各件合時三味各一斤為凖炒鹽為妙等分不焙先以烏梅甘草杵為粗末次以鹽一處拌匀入罐子實按収起取臘月或伏内各半年後方取出焙乾為細末如常㸃夏月宜飲水仙术湯出和劑方辟瘟疫除寒熱温脾胃進飲食蒼术去皮四十八斤棗去核二斗四升乾姜炮二十兩甘草炒十四斤鹽炒二十三斤杏仁去皮尖麩炒别搗三斤右為細末入杏仁和勻每服一錢沸湯㸃服延年明目駐顔輕身不老煎甘草膏子法出百一選方右好粉草一斤慢火炙黄細剉研為粗末以百沸湯五六椀泡著竹杖攪成濃汁生絹袋濾過再將甘草渣别用水煎以無味為度併前濾過汁作一處使熟鍋子内先以麻油少許乘熱擦了入甘草汁煎數十沸以鹽一斤将汁就化開紗片濾去鹽滓再熬成膏子如米飲相似投入乾瓶噐内臨時修合每用膏子一升入後項藥大率一斤甘草熬成膏子可分作五料不必限以五七升也檀香湯膏子一升檀香細末三錢腦麝各一分許研細入生姜自然汁三兩㸃同碾投入膏内㸃時少許湯化開飲丁香湯入丁香細末三錢餘依法辰砂湯入辰砂細末二三錢看顔如何腦麝並依前法胡椒湯入胡椒細末一兩腦麝並依前法縮砂湯入縮砂細末二兩半丁香乾姜細末各少許不用腦麝茴香湯入炒黄茴香細末一兩檀香白檀細末各少許不用腦麝已上只看滋味如何随意加减近侍湯出傳信適用方丁香一兩桂去粗皮半兩甘草剉一兩半縮砂仁四兩鹽三兩麝香一錢鹽後入右先將鹽炒令乾次入縮砂甘草慢火炒黄色乘熱入净噐先入一半在底次下丁香在中又以一半盖之宻封口候冷入桂急碾為細末却入麝香同拌匀磁盒盛罨三五日每服一錢沸湯㸃服八神湯出𫝊信適用方神麴三兩搗碎略炒大麥蘖三兩搗碎畧炒甘草三兩炙草果子四箇炒去皮橘紅一兩丁香三錢不焙胡椒三錢粟米一兩炒熟右為細末入鹽㸃服洞庭湯𫝊信適用方陳皮四兩檀香半兩甘草一兩右為細末入鹽㸃服快氣湯𫝊信適用方生姜一斤切作片子以鹽三兩淹兩宿焙乾神麴三兩白术三兩橘皮二兩不去白净洗荆三稜半兩炮蓬莪茂半兩甘草三兩微炒大麥蘖二兩草荳䓻一箇煨去皮子微炙用右為細末每服一錢入鹽湯㸃服又方𫝊信適用方香附子一兩木香一兩甘草半兩炒縮砂半兩右為細末每服一錢入鹽湯㸃服無時半夏湯𫝊信適用方半夏先以水煑透軟焙乾為末姜汁和餅子焙乾甘草炙杏仁去皮尖茯苓去皮右各等分為末入鹽㸃服棖湯𫝊信適用方棖麴四兩甘草一兩檀香一分白鹽一兩右一處為末㸃服加龍腦少許尤竒木𤓰湯𫝊信適用方木𤓰生去皮穰薄切片子秤三斤生姜洗去皮切片子秤一斤鹽篩净秤一斤二兩右同入盆内拌匀淹一宿後于日中晒不住攪轉候水脉盡慢火焙乾碾為細末入磁噐貯之每服二錢白湯㸃服六和荳䓻湯𫝊信適用方生姜一斤切片晒乾草果半斤去殻及白皮甘草四兩炒只如此名荳䓻湯入鹽湯用鹽二兩不晒生姜淹一夕名三倍湯添縮砂分量與甘草同名四神湯添胡椒半兩名五順湯添蓽撥半兩成六和湯添半夏二兩名七氣湯右為末入鹽如常服丁香調氣湯出朱氏集驗方白荳䓻八升五合丁香七錢縮砂仁乾姜木香白术炒各半兩甘草炙一兩半炒鹽一兩三錢右為細末熱湯㸃服經進過院湯出朱氏集驗方草荳䓻一兩生姜五兩切片同拌以水三升慢火煑水乾為度取焙乾白荳䓻仁蓬莪术益智仁各半兩粉草炒鹽各一兩半右為細末熱湯㸃服㓂相入朝湯出衛生家寳方衝冒霧氣春天不可少服空心進餌沉香木香甘草人參茴香肉荳蔲草荳䓻蓽澄茄各等分右為細末每服一錢沸湯㸃入鹽少許桂漿出御藥院方桂去粗皮為細末赤茯苓去皮為末三兩大麥蘖為末半兩細麯為末半兩生蜜三斤杏仁湯浸去皮一百箇生研如泥熟水一斗右用前件藥末蜜杏泥并水一處攪匀了和水共量三大建盞入於磁罐子内以油紙封口上用數重紙盖泥固濟入水窨内三日用熟絹濾去滓水浸飲之桂沉漿出御藥院方沉香三錢紫蘓葉烏梅肉各一兩乳糖六兩右件四味用水三碗熬至二碗濾滓入桂漿一升半合作漿飲之袪濕逐痰順氣止渇神仙不老湯出余居士選竒方香附子㨂圓者去盡黒皮㣲炒四兩姜黄湯浸一宿洗净焙乾秤二兩甘草一兩炙右三味同搗羅成細末每一錢入鹽㸃空心服皇祐至和間劉君錫以事竄嶺南至桂州遇仲逺先生口授此方仲逺此時已百餘歳君錫服此方間闗嶺表數年竟免嵐瘴之患後還襄陽壽至九旬常云聞之仲逺說晨盥櫛訖未得議飲食且先服此湯可保一日無事旦旦如此