訖以糠火㣲燒半日許著瓶上放火燒之欲盡糠勿令絶三日三夜煎成停二日許待冷取澤用之云停二十日轉好火燒不熱即不香須熟燒此方妙又方蠟蜜各十兩紫草一兩半右和蠟煎令調紫草和朱砂併澤㵼竹筒中任用甲煎方沉香六兩丁香箋香四兩楓香青木香各二兩麝香兩大棗十枚肉甲香三兩右剉以蜜一合和拌着坩内綿褁竹篾絡之油六升零陵香四兩甘松香二兩綿褁著油中煎之緩火可四五沸即止去香草著坩中埋出口將小香坩合大坩濕綿纒口泥封可七分須多著火從旦至午即須緩火至四更即去火至明待冷發看即成煎矣甲煎脣脂治脣裂口臭方先以麻搗泥泥兩口好瓷瓶容一斗已上各厚半寸暴令乾甘松香五兩艾納香苜蓿香茅香各一兩藿香三兩零陵香四兩右六味先以酒一升水五升相合作湯洗香令净切碎又以酒水各一升浸一宿明旦取一斗五升烏麻油六味内其中㣲火煎三上三下去滓内上件一口瓶中令少許不滿然後取後藥上色沉香三斤雀頭香蘇合香各三兩白膠香白檀五兩丁香麝香甲香各一兩右八味先酒水相和作湯洗香令净各各别搗不用絶細以蜜二升酒一升和香内上件瓷瓶中令實滿以綿裹瓶口又以竹篾交横約之勿令香出先掘地埋上件油瓶令口與地平以香瓶合覆油瓶上令兩口相當以麻搗泥泥兩瓶口際令牢宻可厚半寸許用糠壅瓶上厚五寸燒之火欲盡即加糠三日三夜勿令火絶計糠十二石訖停三日令冷出之别煉蠟八斤煮數沸内紫草十二兩煎數十沸取一莖紫草向爪甲上研㸔紫草骨白出之又以綿濾過與前煎相和令調乃内硃砂粉六兩攪令相得少冷未凝之間傾置竹筒中筒上用紙褁麻纒之待凝冷解開任意用之計此可五十挺金櫻子煎用金櫻子經霜後者以竹挾子摘取于大木臼中轉杵去刺勿損之擘為兩片去其子以水淘洗過爛搗入大鍋以水煎不得絶火煎約水耗半取出滓濾過仍重煎以稀湯每服取一匙用煖酒一盞調服其功不可盡述普濟方卷二百六十七
