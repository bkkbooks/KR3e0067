服出三因方黄連炒色變右入好建茶合和二錢以白湯調下或温酒調不入茶杏仁膏出十便良方治積年酒瘧并主靣上風瘡方硫黄細研蝸牛殻自死乾枯小者為上淘去泥土杏仁去皮尖研如膏木香米粉右件藥搗羅為末入杏仁米粉硫黄都研令勻以膽汁靣脂調如稀膏每夜欲卧時以淡浆水净洗靣拭乾塗所患處平明即以温水洗之温㿍以米泔洗藥三五上瘥瘧丹出廣南四時攝生論砒霜黄丹砒黄各一錢阿魏一皂子大赤小豆三十五粒豆䜴七箇菉豆五十粒皂麫三錢七分右先洗豆軟後於乳鉢内爛硏便入諸藥更硏二三十遍令勻旋滴水丸得為度每一料藥可以丸作五十丸以來臨欲發時猪肉湯下一粒瘧丹出廣南四時攝生論雄黒豆二百粒細小者是諸浸三五日候軟爛研如糊砒霜一錢細研如麺右合丸如梧桐子大取重五日合最好不及即四時八節日皆可以硃砂為衣切須珍惜不可令師僧女人雞犬猫兒見合成又須净潔處功徳堂収掌如有患者不計年月只消兩丸其藥慎不可早服須候發日晨取井花水靣東吞下一丸訖更候將欲發時前再用新汲水吞下一丸並不嚼破如女人患即令丈夫與安藥口内吞之常山飲出鮑氏方治諸瘧不問乆近寒熱多少一服效常山真好者一兩半川山甲一兩草菓一分右散每服四錢怯弱人三錢當欲發五更酒水各一盞煎一酒盞許温服訖正臥勿動乃不吐以常山好嘔故也是日即不發青蒿散出朱氏集驗方治瘧甘草秦艽柴胡草菓子青皮常山㯽榔青蒿子各等分桃栁枝各七寸右以常山秦艽柴胡草菓子青皮甘草為末每服用水盞半入桃栁枝青蒿子加烏梅一枚煎八分放冷一服半夜一服只是預先一夜一服增料正氣散出朱氏集治瘧疾經驗金不换正氣㪚毎服加㯽榔三箇烏梅一箇常山少許薑棗半水半酒二盞同煎二盞去滓五更放冷服蒜餅丸出朱氏集驗方治瘧疾經驗用蒜元酒餅子如梧桐子大每服一丸五更熱酒下或十丸亦可愈度大槩積瘧有驗三虎丸出朱氏集驗方治瘧疾北常山草菓甘草右各等分用白酒餅一箇小者兩箇同為細末生蜜為丸彈子大隔先一日塩湯下一丸臨發又一丸狂發又一丸立効知母散出朱氏集驗方治一切瘧疾不問先寒後熱先熱後寒多寒少寒多熱少熱乆瘧者一服取効贑州羅監稅𫝊方大有功効知母真者貝母常山㯽榔右等分為㕮咀酒水各一盞煎至一盞用綿盖定露一宿五更乘冷望東服值到巳時食乾物若吃水便吐煎時不得婦人手川烏散出朱氏集驗方治虚瘧大川烏草菓子乾薑良薑各等分右剉棗七枚薑七片煎服南康劉立之用之常服有驗㯽榔散出朱氏集驗方治瘧疾不問寒熱無不愈之㯽榔草菓子烏梅各一箇常山柴胡乾葛厚朴甘草右先剉草菓子烏梅之外其餘五味只以㯽榔為則作一服常山多些少有熱多乾葛加些小生薑一大塊擘破用大湯盞作酒一盞半於未發之間前一日煎取一盞半臨卧取一盞服之留滓半盞又添起水酒共一盞半浸藥滓藥到天明再取一盞服之只可作一服便愈好後却忌口三日方佳如熱多則加水寒多則加酒直要慢火煎生則吐人常山飲出朱氏集驗方治瘧余嘗服之取効常山㯽榔烏梅甘草北柴胡草菓子各等分右㕮咀為末薑棗前一日煎下露一宿遇發日早晨温服仙授㪚加麻黄蜀添湯出朱氏集驗方治一切瘧疾蜀添即常山子若用葉尤佳桂心甘草茯苓黄耆五兩生地黄一箇知母芍藥各二兩右㕮咀每服三錢水煎不拘時服此方出活人書治婦人産後寒熱其状似瘧相中名醫黄槐鄉用之治瘧屢有功効㯽榔散出朱氏集驗方治瘧疾大㯽榔三箇常山一錢烏梅一箇鼈甲一錢煨右剉散雞鳴時一盌水一盌酒煎至半盌候十分冷服飯食茶湯亦要冷喫加味生料五苓㪚出徳生堂治隂陽不分發成瘧疾方見中暑門中暑類加味小柴胡湯出徳生堂治表裏不分發為瘧疾午後服小柴胡五錢草菓㯽榔加官桂各一錢夏月加香薷一錢右㕮咀加夲方修製每服水二盞生薑三片棗一枚同煎一盞去滓温服滓再煎不拘時候前瘧湏進十餘服後於當發日隔夜煎下常山飲子露一宿五更向東方服之病人更八於其日潜至别處離家權避則病不復作却不可勞渉色慾損神防有復證先寒後熱寒多熱少脉弱而渴者柴胡桂薑湯主之用此而駈之不散薑附湯主之先熱後寒熱多寒少小柴胡湯主之用此而駈之不散竹葉石膏主之如用常山飲怯瘧神應丸如服前藥未効再用川常山半斤好醋五升早晨至晚焙乾右為末水糊丸梧桐子大每服二十丸空心五更茶清吞下五十丸早晨且休喫熱水吐人故也服五日即安大蒜平胃散出朱氏集驗方治一切瘧平胃散一貼大蒜一箇擂爛用一大椀井水調蒜澄清以半調平胃散飲盡又以餘蒜水再飲用厚被盖卧汗出即愈友人鄧羸叟再赴監試感此遇道人授此方服之遂安恒山湯出指南方治瘧熱多宜發汗恒山知母甘草各二分麻黄一兩去節右為麄末每服五錢水二盞煎一盞去滓服助以糜粥發汗後服藥括蔞湯出指南方治瘧柴胡八兩人參黄芩甘草括蔞根各四兩右為末每服五錢水二盞薑五片棗一箇煎一盞去滓服參附大正氣散治男子婦人虚弱及瘧安後體虚如虚眼昏暗加净枸杞子鍊菊花蕋各半兩常服順氣快脾進美飲食附子一箇炮去皮臍人參去蘆不用北參藿香葉􅒦砂仁㯽榔白术白茯苓木香不見火益智仁草菓仁煨去殻丁香不見火各半兩陳皮去白粉草沉香不見火半兩香附子炒去毛肉桂不見火烏藥炒黄枳殻麫炒去穰青皮去皮黄耆擘開塩水浸一宿厚朴薑製各一兩右細末羅過每二錢水一盞薑三片棗一枚煎空心服三虎丹出草中藏終方治瘧辰砂硫黄右熱多加辰砂寒多加硫黄并研細棗肉為丸如龍眼大當發日新汲水七分一盞化下通神丸出衛生家臂方治五種瘧疾熱多寒少諸瘧不効者神桃二七個桃木上自乾經不落者黒豆一兩巴豆七粒去殻并心膜研細右為末以冷水和丸梧桐子大以硃砂為衣侵晨靣東念藥王菩薩七遍以井花水吞下立瘥辰砂丹出未生濟鑑治瘧疾大有神効硃砂五錢半入藥半為衣信雄黄各五錢右件為細末入白麫六錢研勻滴水和丸梧桐子大硃砂為衣每服一丸星宿全無根水送下忌濕麫熱物五獸飲子出大衍方治脾寒如瘧發寒熱無時草菓䓻七箇和皮青剉用厚朴半兩去皮剉烏梅十箇連核去仁剉甘草人參剉各一方大棗十箇連核剉肥生薑一分連剉橘皮七箇去白細剉右細剉了拌勻分作裹先以鹽水蘸濕紙裹藥煨香熱第一服用一裹水一碗煎一盞温服第二服藥用二裹并前滓以水二碗煎一大盞温服第三服用二裹并前滓以水三碗作兩服空心食前一方有草菓子無草豆蔲草荳􅅳散出衛生方治一切瘧草荳􅅳當歸杏仁厚朴木香麻黄猪苓半夏良薑藿香甘草呉茱萸各一兩右為飲子分一半麫褁炮之炮了仍褁每劑七煉薑三煉同煉寒時熱喫熱時放冷喫鹽津丸出澹療方治五瘧八痞獨頭蒜不拘多少每箇開七竅入去皮紅子七粒濕紙褁煨研為膏非大蒜也橘紅丁香不火木香不火蓽撥胡椒右等分為細末用蒜膏為丸如梧桐子大先嚼鹽少許令生津液嚥二粒漸加至三五粒臨卧服瓜蔞實丸治澹療方治胷痞中痛徹背喘急妨悶瓜蔞實枳殻去穰麫炒半夏湯炮七次桔梗各一兩右細末薑汁打糊為丸如梧桐子大每服五十丸淡薑湯下治瘧病方出肘後方用五月五日蒜一片去皮去中破之刀破令容巴豆一粒去心皮内蒜中令合以竹挾以火炙之取可熱搗為三丸未發前服一丸不止復與一丸又方出肘後方臨發時搗大附子下篩以苦酒和之塗背上又方出肘後方常山搗下篩成末三兩真丹一兩右白蜜和搗百杵丸如梧桐子大先發服三丸中服三丸卧服三丸無不效者常用効又方出肘後方先炙鼈甲搗末方寸至時令三服盡火炙無不斷又方出肘後方常山三兩搗下篩雞子白和之空服三十丸去發食乆三十丸發時三十丸或吐否也從服藥至過發時勿飲食一剪金出衛生寳鑑治瘧疾寒熱乃聖藥也信硫黄各等分右同研末用緋紅綃子手捻一撮於絹上裹如豆大細絲綿繫纒數遭繫定用剪子剪下勿得不繫𦂳恐藥有失每服一丸星全新汲水送下空心無得人知如服藥先一日夜服至天明正發日早晨不令人知於净處無人處避之或廟宇亦得治瘧出夲草用蒜不拘多少研極細和黄丹少許以聚為度丸如雞頭子大候乾每服一丸新汲水下靣東服至妙三味湯出大衍方治脾瘧厚朴三方寸草菓仁三箇甘草二寸右三味㕮咀以生薑二兩切作片子水一碗未發前作二服盡蜀添散出夲草治瘧用蜀添雲母龍骨等分杵末患者至發前以漿水和半錢服之温瘧加蜀添半分臨發時服一錢治瘧出夲草用百草霜黄丹等分細硏每服二錢於發日空心米飲調服不過兩服愈金不換正氣散出傳倍適用方常服進飲食調榮衛逐冷避山嵐瘴氣治隂陽不和往來寒熱諸般瘧疾解利四時傷寒治五種隔氣惡心痰逆或吐或瀉復食脾胃虚弱悉宜服之藿香去沙土枝梗半夏湯泡洗七次甘草炒陳皮去白厚朴去麄皮薑製草菓子煨去皮蒼术米泔水浸一宿白茯苓白术陳麫炒右並等分為粗末每服四錢水一盞半生薑五片棗一枚同煎至七分去滓放温服不拘時候斬邪丹出如宜方治脾寒雄黄一錢人言半分黒豆菉豆各四十九粒硃砂二粒黄丹二錢右為細末滴水為丸分作三十丸每服一丸五更井花水送下忌熱物養胃湯出如宜方治飲食傷脾成瘧不問先寒後熱半夏製厚朴製蒼术各一兩藿香草菓茯苓人參各一兩陳皮七分半甘草二錢半右㕮咀薑七片烏梅一枚煎服又方出如宜方先發二時次炭火床下令脊脚極熱被覆過時乃止此治先寒後熱神聖丹出夲草治瘧以砒霜半錢硏黒豆麫一錢右件二味細研滴水丸小豆大雄黄為衣未發時空心靣東新汲水下一丸治瘧病出肘後方以常山三兩搗末以雞子白和丸如桐子大空心三十丸温水下治諸瘧出夲草吐瘧痰去寒熱以常山小麥竹葉三味和煮服之治瘧疾出夲草信砒二兩别研如粉寒水石三兩别搗為末右用生鐡銚子先鋪石末一半後堆砒末在上又以砒末葢頭然後取厚盞葢之用麫醋糊紙條子宻封約十重以炭火一斤已來安銚子在上候紙條子黒取出置冷地上候冷取之册之潔浄刮取皮石末一等以借小兒服以飛過辰砂為衣候乾入磁盒収每人服時於發日早臘茶清下一丸一日内不得熱物合時先洒掃浄室中合之不得令婦人犬猫雞䑕等見収得亦如然若婦人患則男着在口中男子患亦然治瘧疾用桃東引枝上葉不拘多少每葉一片用豆䜴七粒一處搗極匀丸如梧桐子大湏五月五日午時合忌雞犬婦人見每服七丸絶早靣東冷水吞下治瘧冷病者取毛建草一握㣲碎縛臂上男左女右勿令近肉便成瘡子普濟方卷一百九十七
