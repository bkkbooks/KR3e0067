甘草各半兩右為粗末每服半兩水盞半煎至一盞温服迎發而服之如吐者加半夏麴等分桂枝石膏湯出濟生㧞萃方治瘧先寒後熱熱多寒少桂枝五錢石膏知母各兩半黄芩一兩右為末分三服每服水一盞同煎服間日者邪氣所合深也加減四逆湯治瘧疾瀉痢並作合潮者非時邪疫之氣流運之所變之致也春傷於風夏生飱泄夏傷於暑秋必病瘧湏傷寒温瘧流變法中主之柴胡芍藥甘草枳實麺炒黄各等分小便澁加茯苓痢後重加薤白十寸右㕮咀每服五錢水二盞粟米一捻煎至一盞去滓温服脇熱利不止一方用葛根黄連黄芩湯若同雜病治利之方以熱藥治之反致夭殃傷人甚衆麻黄𦍑活湯治瘧病頭痛項強脉浮惡風無汗者麻黄去節𦍑活防風甘草各半兩右為粗末水煎如吐加半夏麴等分節金飲子治瘧疾寒熱愈後調理脾胃厚朴去皮薑汁炙蒼术泔浸甘草炙各三分陳皮去白炒黄色半右㕮咀每服四錢水一盞薑三片棗一枚煎服一方加草菓倍用蒼术名草菓平胃散黒虎散治瘧片子薑黄良薑乾薑各一兩巴豆三十粒新者二十五去殻右將上三藥剉如巴豆一處炒令焦黒豆色去巴豆不用將餘藥為細末每服三錢於未發前一時辰熱酒調下臨發時再進一服炒藥湏是焦黒生即令人瀉四將軍飲治瘧作時仆厥手足俱冷昏不知人一時救急用之有驗撼掖不醒是中心抑欝隂陽交戰所致先依灸法見發仍服此藥附子一兩泡去皮訶子四箇去核陳皮四箇全者洗甘草四寸炙右為剉散每服四錢水二鍾薑七片棗七枚煎至七分服昔有人與客聚話之際瘧作而仆厥手足俱冷昏不知人盡室駭懼客曰無傷正四將軍飲證也先令灼艾灸至四百壮了無蘇意於是急製前藥初一盃灌之不納至再稍若吞嚥三則倐起坐四服盡頓愈更不復發一時救急有騐凡病臨發前逐杯併服無不神效如聖飲治瘧及有孕婦人患者無不愈甘草炙柴胡去苖常山烏梅各等分右剉碎用銀器或砂石銚當發日絶早以好酒二升慢火熬至一盞濾出滓放温作一服飲盡良乆吐涎即愈如尚覺有寒氣未退候五七日再服温脾散治瘧發熱不退紫河車菉豆各一兩甘草半兩砒一錢半别研右為細末後入砒研匀每服半錢新汲水半盞調如是隔日發直待臨睡服藥如頻日發只夜深服忌葷酒魚兎等物衛生寳鑑方羅謙甫云如受得寒邪氣深只一服便定如十歳以上服一字十嵗以下至五三歳用水少許服半字婦人有胎不可服但合此藥與人服並不吐親用此藥三五十年救人甚多雖砒一味大熱有毒紫河車甘草菉豆三味性凉觧得假令新汲水亦觧得金液丹用硫黄小兒紫霜丸用巴豆杏仁夲草云巴豆杏仁有大毒有小毒製了服之皆有效小兒亦可服恐人不合此藥故論及此一方滴水為丸水服名温脾丸常山大黄湯瘧結實積熱煩擾逆冐寒熱但多綿惙困篤常山甘草炙前胡大黄各三兩右切以水一斗煮取三升半下大黄煎取三升分澄令冷初服七合中服八合比欲發服九合忌海藻菘菜生葱菜䜴心丸療瘧香䜴五合熬令色變常山三兩大黄三分附子三分炮右搗篩蜜和丸如豆大服十丸勿食物比至發時令服三十丸瘧不止亦可至四十丸瘧必止若膈上有停痰欲吐聽之若腹中實欲下亦無妨忌生葱菜等物常山㯽榔飲治瘧常山一大撮㯽榔一箇草菓半箇甘草三寸右水一盞半酒半盞或加烏梅一箇煎至八分濾滓碗盛紗罩露過臨發日五更靣北温服神聖藥師餅治瘧疾等證人言錢半雄黄錢半白麵七錢半乾胭脂右各研極細滴水丸為餅子如棊子大毎服三餅臨卧細嚼冷水送下忌濕靣葷腥生硬冷物生作三十服虚實大小加減服之計九十餅仙靈散治瘧疾常山二錢甘草錢半㯽榔二箇黒豆四十九粒右為末先用酒一小盞煎乾後用水大盞煎八分露一宿早晨温服雞魚忌吐不妨麝香丸治一切瘧疾臰黄一兩黄丹一兩硃砂半兩麝香半兩右細研用粟米和丸如菉豆大隂乾當發日早晨以温茶下五丸即吐痰水惡涎吐後過時煮菉豆粥服之孕婦勿服胡粉丸治一切瘧䜴一分研如膏黄丹半兩胡粉半兩砒霜一分右同研令細以軟飯并䜴膏同丸如梧桐子大臨發前以冷醋湯下三丸忌食熱物硫黄丸治一切瘧疾砒霜半兩硫黄半兩雄黄半兩雌黄半兩右研細於銚鍋内先布鹽末於中節下諸藥於鹽上以瓷椀盖用六一泥封勿洩氣以灰火三斤養半日候冷以甘草湯煮半日出火細研用飯和丸如菉豆大大人患醋湯服三丸青帯繫三丸於臂上男左女右小兒服一丸繫一丸牡蠣湯治牡瘧者多寒牡蠣麻黄各四兩蜀漆三兩無常山代甘草二兩右先洗漆三過去腥㕮咀以水八升煮蜀漆麻黄得六升去沫内餘藥煮取二升飲一升即吐之復飲麻黄湯専治瘧湏發汗麻黄括蔞根大黄各四兩甘草一兩右㕮咀以水七升煮取二升半分三服未發前食頃一服臨發一服服後厚覆取汗斷魔如聖丹治瘧疾信一錢蜘蛛大者三枚雄黒豆四十九粒右為末同研細滴水丸如菀豆大來日今夜北斗下獻早晨紙褁一丸塞耳中一粒可治三人立愈如聖神白芷湯治瘧身熱目疼熱多寒少脉長睡卧不安先以大柴胡湯下之㣲利為度如下過愈邪不盡當服此以盡其邪白芷知母一兩七錢石膏四錢右為末水煎地黄丸治一切瘧疾地黄汁一斤砒霜研半斤蠟少許右將地黄汁於磁器中煖候沸入砒霜不住手攪煎令稠次入蠟相和丸如菉豆大毎發時井花水下一丸未瘥發前更一丸忌熱物麻黄白术湯治感風發瘧麻黄去蘆官桂青皮陳皮川芎半夏麴白芷紫蘇茯苓白术桔梗甘草炙各等分細辛㯽榔右剉為細末每服三錢水二盞生薑四片棗二枚煎至八分去滓空心服大黄丸治一切瘧大黄二兩巴豆一兩去皮熬令黑色研如泥朴硝右搗篩大黄巴豆然後内巴豆以蜜搗