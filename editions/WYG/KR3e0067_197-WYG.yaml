body:
  text: 普濟方卷一百九十七明周王朱橚撰諸瘧門縂論夫夏傷於暑秋必病瘧盖傷之淺者近而暴傷之重者逺而疾㾬瘧者乆瘧也是知夏傷於暑温熱閉藏而不能發泄於外邪氣内行至秋而發為瘧也經受之隨其動而取之有中三陽有中三隂者經中邪氣其證各殊同傷寒論之也五臟皆有瘧其治各異在太陽經謂之風瘧治多汗之在陽明經謂之熱瘧治多下之在少陽經謂之風熱瘧治多和之在隂經則不分三經縂謂之濕瘧當從太隂經論之瘧病所謂因者病當先寒後熱寒則湯火不能温熱則氷水不能寒以先傷寒後傷風故先寒而後熱名曰寒瘧病者先熱後寒躁煩自汗惡風以先傷風後傷寒風為陽寒為隂故先熱而後寒名曰温瘧病者但熱不寒隂氣孤絶陽氣獨發心氣煩悗手足而欲嘔必渴以傷於暑熱名曰癉瘧病者寒熱身重骨節煩疼脹滿濈濈自汗善嘔因汗出復浴濕舍皮膚及冒雨濕名曰濕瘧病者寒多不熱但慘戚振慄病以時作此以陽虚隂盛多感隂濕陽不能制隂名曰牡瘧五種瘧疾以外感風寒暑濕與衛氣相并而成也瘧病内所因者病者寒熱顔色蒼蒼然善太息如死狀以蓄怒傷肝氣欝所致名曰肝瘧病者必煩欲飲清水反寒多不甚熱乍來乍去以喜傷心氣耗㪚所致名曰心瘧病者寒多腹中熱痛或渴不渴不熱不泄腸鳴汗出以思傷脾氣欝涎結所致名曰脾瘧病者心寒甚發熱間善驚而有所見以憂傷肺氣凝痰以致名曰肺瘧病者手足寒洒然腰脊痛發熱大便難目眴以失志傷腎所致名曰腎瘧五種瘧疾以臟氣不和欝結涎飲而成也瘧不内外因者病者發寒熱一歳之間長幼强弱或染時行變成寒熱名曰疫瘧以嵗運推之病者寒熱不作夢寐不祥多生恐怖名曰鬼瘧宜用禁避厭禳之法病者乍寒乍熱乍有乍無啇方多病此名曰癉瘧當隨方上所宜治之病者寒善飢而不能實已之滿腹急病痛以日作名曰胃瘧六腑無瘧唯胃有者盖飲食飢飽所傷胃氣而成世之謂食瘧或因諸瘧飲食不節變為此證也病者經年不差差復再發逺行乆立不至㣲勞力皆不任盖因表裏俱虚客邪未散真氣不復疾雖暫間少勞便發名曰勞瘧亦有數年不差百藥不斷結成癥癖腸脇名曰老瘧亦曰母瘧備内外不内外三因外則感四氣内則動七情飲食飢飽勞逸皆能致瘧經中所謂夏傷暑秋痰瘧者此則因時而序耳不可專隅以此論之則知温病飱泄欬嗽不可拘也夫瘧之始發先起於毫毛伸欠乃作寒慄鼔頷腰背俱痛寒去則内外皆熱頭痛而渴欲飲冷者以隂陽上下交爭虚實更作若陽并於隂則隂實而陽虚陽明虚則寒慄鼔頷太陽虚則腰背頭項俱痛少陽虚則心體解倦心愓愓然三陽俱虚則隂氣勝骨寒而痛病於陽則陽實而隂虚太陽虚則不嗜食善嘔嘔已乃衰少隂虚則熱多寒少嘔甚其病難已厥隂虚則腰腹痛小便不利如癃三隂俱虚則陽氣勝熱勝悒悒不樂隂盛則内寒陽虚則外寒生於内故中外皆寒陽盛則外熱隂虚則内熱一生於外故中外皆熱此皆因外感寒暑風濕内欝喜怒憂驚藴積痰飲所至飲食飢飽勞逸之所為也病氣與衛氣并居故病作衛氣晝行陽夜行隂得陽而外出得隂而内薄所以日作其氣内内薄於五臟横連於募原其道逺其氣深其行遲不能與衛氣俱出故間作以衛氣一日一夜大㑹於風府日下以節以此日作稍晏至二十五日至骶骨二十六日入􅆃内其氣上行故作日益早也瘧氣所以更盛更虚當氣之所在者在陽則熱躁在隂則寒靜極則隂陽俱衰衛氣相離則病休衛氣集則腹病也於是有日作間日作早晏不同又邪氣中於頭項者氣至頭項則作中於外者氣至背則作中於腰􅆃者至腰􅆃即作各隨其所中而作但衛氣之所在與邪氣相合則病作也更有疫瘧鬼瘴等瘧亦以邪氣中外氣之所為也除癉瘧純熱寒瘧先熱牝瘧無熱外諸熱皆先寒而後熱又經曰無刺熇熇之熱無刺渾渾之脉無刺漉漉之汗為其病逆未可治也知此則病方來與正作與將過皆不可治以反傷真氣不可不知也夫肺病為瘧者乍來乍去令人必寒甚則熱發善驚如有所見此肺瘧證也若人夲來語聲清雄忽爾不亮拖氣用力方得出言反於常人呼共語真親不應雖曰未病勢當不乆此則肺病聲之候也察病觀疾表裏相應依源審療乃不失也心病為瘧者令人心煩甚欲飲清水多寒少熱若人本來心性和雅而忽卒急反於常倫或言未訖便住以手剔脚爪此人必死禍雖未及呼曰行尸此心病聲之候也虚則補之實則瀉之不可療者明而察之肺病為瘧者令人色蒼蒼然氣息喘悶戰掉如死者若人本來少於悲恚忽爾嗔怒出言反常乍寛乍急言未訖以手向眼如有所思若下節病禍必至矣此則肺病聲之飲也其人若虚則為寒風所傷若實則熱氣所損陽則瀉之隂則補之脾病為瘧者令人寒則腹中痛熱則腸中鳴鳴已則汗出若其人本來少於喜怒而忽反常嗔喜無多言自笑不答於人此是脾病聲之候也不盈旬日禍必至腎病為瘧者令人凄凄然腰􅆃痛而宛轉大便澀身掉不定素問作目眴眴然手足寒熱人本來不喜不怒忽然謇而好喜怒反於常性此腎已傷雖未發覺聲其候也見人未言而前開口還開口不聲舉手爪栅腹此腎病聲之候也虚實表裏浮沉清濁宜以察之逐而療之夫瘧脉者自弦弦數者多熱弦遲者多寒弦小𦂳者可下之弦遲者温藥已若脉數而𦂳者可發汗針灸之脉浮大者不可針灸之凡瘧先發食頃乃可以療之過之則失時足太陽之瘧令人腰痛頭重寒從背起先寒後熱熇熇虚嬌切暍暍然熱止汗出難已刺中出血足少隂之瘧令人聲體解㑊寒不甚熱不甚乆惡見人見人心惕惕然若多汗出甚刺足少隂足陽明之瘧令人先寒洒洒浙浙寒甚乆乃熱熱去汗出喜見日月光火氣乃快然刺足陽明附上足太隂之瘧令人不樂好太息不睡多寒熱汗出病至則善嘔嘔已乃衰則取之則善足少隂之瘧令人悶吐嘔甚多寒熱熱多寒者欲閉户而處其病難已足厥隂之瘧令人腰痛小腹滿小便不利如癃狀非癃也數小便意恐懼氣不足膓唈唈刺足厥隂腰瘧者刺手太隂陽明心瘧者刺足厥隂肝瘧者刺足厥隂見血脾瘧者刺足太隂腎瘧者刺足太陽少隂胃瘧者刺足陽明太隂横脉見血足經太陽瘧羗活加生地黄湯小柴胡加桂湯陽明瘧桂枝及白虎二湯黄芩芍藥加桂枝湯少陽瘧小柴胡湯主之太隂瘧小建中湯異共湯少陽瘧小柴胡加半夏湯厥隂瘧四物元胡苦練附子湯肝瘧四逆湯通脉四逆湯胃瘧理中湯理中丸心瘧桂枝加黄芩湯腎瘧桂枝加當歸芍藥湯肝病靣青脉弦皮急多青則痛形盛胸脇痛耳聾口苦舌乾往來寒熱而嘔以上是形盛當和之以小柴胡湯如形衰骨揺而不能安於地乃膝筋治之以𦍑活湯夲草云𦍑活為君也瘧證取以少陽如乆者發為痺瘧宜以鈚針刺絶骨血復以小柴胡湯治之心病靣赤脉洪身熱赤多則熱暴病壯熱惡寒麻黄加知母石膏黄芩湯主之此如不發汗乆不愈為瘧也淹疾項腫靣赤身熱脉洪𦂳而消痩婦人則亡血男子則失精脾病面黄脉緩皮膚亦緩黄多則熱形盛依傷寒說是為温温其脉陽浮而若隂小而即治太隂濕温自汗白虎湯加蒼术主之如乆不愈為温瘧重􅠽白虎加桂枝主之淹疾内消食少無力故曰熱消飢肉宜以養血凉藥内經曰血生肉肺病面白皮濇脉亦濇多白則寒暴病濇痒氣虚麻黄加桂枝令少汗則去也傷寒論云夏傷於暑汗不得出為痒若乆不痊為風瘧形衰靣白脉濇皮膚亦濇形羸氣弱形淹衛氣不足腎病靣黒身凉脉沉而滑多黒則痺暴病形冷惡寒三焦傷也治之以薑附湯或四逆湯乆不愈為瘧暴氣衝上吐食夜發俗呼為之夜瘧太陽經桂枝湯證形衰淹疾羸瘦風痺痿厥不能行也夫瘧脉自弦弦數者多熱弦遲者多寒弦而小𦂳者宜下弦遲者宜温浮大者宜吐治療之法當先發㪚寒邪不可驟用截補之藥若截則補住邪氣其證變異不能即愈致成癆瘵者有之發散之藥熱多宜小柴胡湯參蘇飲清脾湯之類寒多者宜養胃湯四獸飲發散不退然後以常山飲勝金丸截而不愈乆則脾氣虚敗唯宜多進養脾驅痰之藥脾氣一盛自然平復此證既愈尤當節飲食謹勞傷妨其再作如烟瘴之地居人常患瘧疾者又當隨其方土所宜藥性施以治法客旅徃來瘴地當宜服平胃㪚草菓飲先以妨之凡富貴膏粱之家病瘧或間日或頻日發或熱多寒少宜大柴胡湯下過三五行次服白虎湯或玉露散桂芩甘露散之類如不愈者是積太甚以神芎三花神祐丸調胃承氣湯等劑大作料下之后以長流煎五苓㪚服之或服小柴胡亦可或以先恒散吐之後服凉膈白虎之類必愈矣大忌發熱之物雞猪魚五辛之物犯之則再發也凡田野貧寒之家病瘧為飲食麄糲衣服寒薄勞力動作不與膏粱法同臨發日可用野多効方中温脾散治之如不愈服辰砂丹治之必愈矣喫罷此藥以長流煎白虎湯服之不宜食熱物夫先熱後寒可與觧㪚風邪如川芎白芷青皮紫蘇之類或細辛㯽榔佐之温一證先熱後寒此為傷寒壊病與瘧大畧則同熱多寒少小柴胡湯熱少寒多小柴胡湯内加官桂寒瘧自感寒而得無汗惡攣痛面慘轉而為瘧寒隂氣也故先寒後熱可與發散寒邪生料五積㪚增桂養胃湯或良薑乾薑官桂草菓之類甚則薑附湯附子理中湯暑瘧者暑勝熱多得之一名癉瘧隂氣獨㣲陽氣獨發但熱不寒裏實不泄煩喝且嘔肌肉消鑠當用小柴胡湯香薷飲嘔者縮脾飲加生薑温服下消暑圎多躁甚者少與竹葉湯恒山柴胡於暑證最便濕瘧者冒襲雨濕出汗澡浴得之身體痛重肢節煩疼嘔逆脹滿盡用五苓散除濕湯加蒼术茯苓軰寒多者术附湯最良牝瘧者乆受隂濕隂盛陽虚陽不能制隂所以寒多不熱氣虚而泄淒惨振振柴胡桂薑湯減半黄芩加以半夏施之為當食瘧一名胃瘧飲食無節飢飽有傷致然也凡食啖生冷鹹藏魚塩肥膩中脘生痰皆為食瘧其狀若飢不能食食則中滿嘔逆腹痛青皮陳皮草菓半夏縮砂白荳蔲作劑或四獸湯下紅圓子自有竒功瘴瘧挾嵐瘴溪源蒸毒之氣致然也白嶺以南地毒苦炎躁濕不常人多瘴瘧其狀血來上焦病欲來時令人迷困甚則發燥狂心亦有啞不能言者皆由敗血於心毒涎聚於脾坡仙指脾胃為實熱所致又有甚於傷暑之瘧耳治之湏用凉膈䟽通大腸小柴胡加大黄治瘴木香圓觀音圓皆為要藥如前数證經乆不瘥真氣已耗邪氣猶存則有所謂勞瘧瘧母者焉表裏俱虚真元未復雖暫止小勞復勞謂之勞瘧發當調養氣血川芎當歸官桂芍藥軰所不可無彌年閱歳經吐汗下榮衛虧損邪氣伏藏脇間結為癥癖謂之瘧母此證未可直攻急作烏梅七棗湯以扶其裏候其内氣已充繼此經効瘧丹消癖圓下之取愈大抵瘧之初得三數日間如火療原不可嚮邇波濤洶湧未易囬瀾當俟其稍定而圖之經所謂其盛者可待衰而已瘧方來與正發及將解不可投藥耗其真氣投藥當於未發以前兩時之先或遲發日凌晨空心與之諸瘧之脉大約尺寸俱弦或浮數或𦂳實或緩濇或虚遲或左手濡而右手盛或尺寸盛而闗中不可定名已為弦也總前治法弦數多熱者寒之弦遲多寒者温之浮弦浮𦂳浮數其邪在表者可汗弦實沉實數實其邪在裏者可下若夫調胃氣利痰水分隂陽行三焦是又治法之綱領也渴亦水漿藥入輙吐人參煎湯効亦猶有說焉嘗讀二廣攝生見其論議若瘴瘧若暑毒每用踈轉之劑取下根源果有先傷暑後發瘧渉年餘者度其腹中有癖水磨沉香下解毒雄黄圓黒血如泥泄下極臭由是獲愈因知諸瘧皆有根在治法之外又當隨輕重而利導之實者與巴豆大黄虚者用養正丹軰不然恒山於瘧每每作効何耶葢瘧家多蓄黄水恒山為能破其癖而下其水也恒山治瘧罌粟殻治痢人皆薄之故也然其痢日乆腹中無痛當澀腸則豈容下澀瘧以痰水作恙法當吐痰逐水豈容不為吐下於斯時也不有罌殻恒山之劑其何以為對治乎但中間有藥補之耳凡瘧皆因停中腹蓄黄水惟水不行所以寒熱不歇此瘧家受病之處治暑瘧純熱以香薷散加青皮北大黄兩箇烏梅同煎侵晨温服寒瘧多寒以二陳湯加青皮良薑多用薑同煎侵晨吞神保圓五粒並欲取下毒水以去其病根寒熱自解發瘧嘔吐勿用恒山有中年人臟腑乆虚大便常滑忽得瘧疾嘔吐異常惟専用人參為能止嘔其他瘧劑並不可施遂以茯苓二陳湯人參縮砂而並用白荳䓻進一二服病人自覺氣脉頗消於是寒熱不作盖白荳蔲能消能磨流行三焦榮衛一轉寒熱自平繼今遇有嘔吐發瘧之證或其人素嘔而發瘧謹勿用恒山惟以生蘿蔔生薑各研自然汁半盞入蜜三四匙烏梅兩箇同煎吞局方雄黄圓三四粒候其利下惡血痰水即以人參川芎茯苓半夏縮砂甘草調和之萬一嘔不止而熱不退却用真料小柴胡湯多加生薑主治其或嘔吐大作而又發熱但先為治瘧生熱飲嘔定小柴胡湯繼之瘧有水有血水即水飲也血瘀血也惟水飲所以作寒熱惟瘀血所以增寒熱恒山逐水利固也茍無行血藥品佐即其間何収十全之効􅁘斷自今瘧家或衂血或唾血或大便血絲或瘧後適來適去皆是血證當以恒山草菓㯽榔烏梅甘草作劑於内加五靈臍桃仁為佐入生薑濃蜜同煎以主治之用瘧證寒熱不歇不急有根凡瘧固當以風寒暑濕而之或汗或下或吐或瀉活人方書之格法雖盧扁不能違矣然常見瘧之經乆而不歇其故自必有根在也根者何曰根在于水水乆積則為癖之瘧母惟敗血為暑熱之毒惟飲與水皆生寒熱故暑脉虚水故也癖之脉結聚挾水飲者為之逐水消飲結癖者歇必痛為之攻癖散血暑毒隨證而踈利之寒熱不隨吾未信之常山治瘧湏用佐瘧家多蓄痰涎黄水恒山為能吐之利之是故然爾其有純熱發瘧或藴熱内實之證投以恒山大便㸃滴而下似泄不泄湏用比大黄為佐大泄數行然後獲愈或用巴豆圓子相依而行亦能泄也是又不然巴豆工於下積茍血湯滌血熱不可以無大黄丸瘧方來與正發不可服藥在於未發兩時之先瘧病交爭轉為深害盛寒熱此瘧此傷寒一證而實非瘴瘧也其人肝脉浮頭痛怯風大抵小柴胡湯加青皮紫蘇之嘔者多用生姜渴者加烏梅其或傷暑兼之小柴胡湯加香薷入生姜烏梅同煎可也抑猶有說焉寒熱之根必通利不能除也萬一其根未鋤又當以麻仁圓神保圓軰與之亦先解後攻之意治瘧總要不過吐汗下三法當下而下不盡腹中尚有餘痛或大便一泄之後不復再泄但時時㸃滴而出者湏再下之大黄以佐恒山可也當汗而不匝頭汗至胸而手足無汗者湏周浹一身汗之青皮以佐紫蘇可也所謂吐者湏出盡水飲若作吐劑常山豈容移哉䆒竟焉收效必矣怒瘧之為厲大抵連綿有病差以後或飲食失節或患傷中或梳洗感風又再發者何以處之曰熱多者二陳湯加青皮甘草熱少者二陳湯加青皮草菓堅守胃氣而已二藥並用生薑烏梅蜜水同煎空心進劑其間幹運更用巴豆丸子藥疏利大便以泄毒氣其何厲之有或藥已服過多以致腹疼可用生薑甘草煎湯温和解之生薑解諸毒藥退熱用凉藥不可十分盡或餘熱些少未去不必關心自然無事否則熱去則寒起古人成效一方多用川芎茯苓甘草少用白术麄木水煎病後和胃收歛啓陽屢試得効熱柴胡退熱不及黄芩若藥不瞑眩厥疾弗瘳世俗治例用柴胡最為稳當至熟黄芩一軰則指為大寒不敢用也不思藥病不相當鮮克有濟繼令退熱而熱不去者湏用黄芩凡壯熱煩燥用柴胡黄芩大黄解利之其熱乍輕而不退盍用黄芩川芎甘草烏梅作劑用黄連生地黄赤茯苓同煎臨熟入燈心一捻主之其效亦速盖川芎生地黄皆能調血一調其熱自退諸瘧附論夫人五臟瘧有寒熱痰鬼及山嵐瘴氣諸瘧原其受病皆因調攝失宜隂陽交爭寒熱競作雖名目淺深各異而主治小異大同今以一方俱療之故曰諸瘧也方虎骨頭丸治一切瘧疾虎骨頭三兩塗酥炙黄朱砂一兩細研常山半兩剉甘草半兩炙㣲赤剉桃仁三七枚湯浸去皮尖麩炒㣲黄色川大黄一兩剉碎㣲炒射香半兩細研牡犡粉一兩桂心一兩知母一兩乳香半兩枳殻半兩麸炒㣲黄去穰烏梅肉半兩㣲附子半兩炮裂去皮臍木香半兩右為末入研藥令匀錬蜜和搗三二百杵如梧桐子大每食前用桃符湯下十五丸天靈盖丸治一切瘧發歇寒熱神思昏悶曉夜不得安靜天靈盖一兩阿魏半兩朱砂一兩細研白芥子半兩安息香三分麝香砒霜一兩細研虎糞中骨一兩猢猻骨一兩菉豆一分䜴一合炒乾烏驢蹄一兩薫陸香三分巴豆七粒去皮心研右為末入硏藥令匀端午時鍊蜜和丸如皂莢子大每發日男左女右手心一丸如未止即以新汲水下一丸忌食熱物虎骨常山丸療瘧不瘥虎頭骨炙常山甘草炙鼈甲炙烏梅萎蕤白薇升麻茯苓石膏研知母麥門冬去心豆䜴熬地骨白皮右各等分合搗蜜和丸如梧子大未發前日晚空肚服二十丸至日平旦服四十丸如人行十里食白粥一碗欲發時亦服三十丸三日内慎生冷萬不可犯不乆自愈忌海藥菘菜大酢生葱生菜莧菜麻黄白术㪚治傷寒温暑濕滯留經絡與衛相并病以日作寒熱交煎麻黄去節湯洗白术去蘆茯苓桂心各一兩乾薑半一兩陳皮青皮去瓤桔梗去蘆白芷甘草紫蘇葉半夏烏梅各三分去核右為剉散服四錢水三盞薑三片棗二枚煎七分去滓當發日空心一服臨發一服亦治時疫烏梅丸治一切瘧無問逺近烏梅肉炒甘草炙剉虎頭骨