body:
  text: 普濟方卷一百八十四明周王朱橚撰諸氣門上氣嘔吐附論夫上氣嘔吐者氣上而不下肺胃虚也肺脉起於中焦環繞胃口寒氣乘於肺則上氣喘滿升降不利痰飲停積中焦氣動於胃胃氣逆則嘔吐肺主於氣肺為邪所乘則上氣此為膈内有熱胃間有寒寒従胃上乘於肺與膈内熱相搏故乍寒乍熱而上氣上氣動於胃胃氣逆故令嘔吐也方紫蘇子湯出聖濟緫録治上氣嘔吐胷滿喘息不利紫蘇子半夏湯洗七次去滑焙五味子桂去粗皮青橘皮湯洗出白焙杏仁湯洗出皮尖雙仁焙各一兩赤茯苓甘草炙各半兩右粗搗篩毎服五錢水一盞半薑半分切同煎取七分去滓温服不計時候胡椒丸出聖惠方治肺胃有寒上氣嘔吐胷滿不食胡椒蓽茇白术赤茯苓去黒皮陳皮湯去白焙甘草炙剉紫苑去苗土各一兩桂去粗皮訶黎勒皮煨去核人参欵冬花乾薑炮製各半兩右為末煉蜜丸梧子大毎服三十丸生薑橘皮湯下日三服不計時候七氣湯出聖濟緫録治上氣食則吐逆草荳䓻仁去皮生人参赤茯苓去黑皮白术大腹皮和皮剉生訶黎勒煨去核各半兩甘草炙一分右粗搗篩毎服五錢水一盞煎至六分去滓温服不思食入生薑煎服訶黎勒湯出聖惠方治上氣痰壅嘔吐喘促訶黎勒煨去核二兩半夏湯洗七次去滑焙三分赤茯苓去黒皮陳皮湯去白焙各一兩甘草炙剉半兩人参前胡杏仁湯浸去皮尖雙仁麸炒黄各一兩紫蘇莖葉㯽榔白术各一兩右粗搗篩毎服五錢水一盞半生薑五片棗三枚劈破同煎七分去滓温服不計時候芫花散出聖濟緫録治上氣嘔吐不止芫花一兩醋炒肉荳􅅳去殻剉㯽榔剉各三枚右為散毎服一錢煨葱白一寸温酒調下半夏湯出聖濟緫録治上氣嘔吐逆不食半夏湯洗七次去滑一兩乾桑葉六兩乾薑炮一分右粗搗篩毎服三錢生薑五片水一盞煎六分去滓稍熱温服不拘時候半夏湯治上氣嘔吐不能下食半夏湯洗去滑七次焙三分白术半兩人参一兩桂去粗皮甘草炙剉陳皮湯浸去白焙各半兩厚朴去粗皮生薑汁炙香熟二兩右粗搗篩毎服五錢水一盞半生薑五片棗三枚劈破煎至七分去滓温服日三厭氣散治上氣嘔逆及踈利過多虚氣上攻及短氣少力氣噎悶木香人参白茯苓去黒皮藿香葉右為散毎服二錢煎紫蘇木瓜生薑湯送下再入銀盞重湯煎五七沸温服人参散治上氣嘔吐或胷中痰飲停積嘔吐人参白术剉炒各二兩白茯苓去黒皮一兩甘草炙剉乾薑炮各半兩粟米一合右為散毎服二錢用竹茹生薑湯調下治上氣嘔吐用芥子二升為末蜜丸如梧子大寅時井花水服下七丸日二亦可作散空腹服之及用酒浸服并治臍下絞痛赤茯苓散治上氣嘔吐脇胷滿悶不思飲食心神虚煩赤茯苓一兩陳皮湯浸去白焙訶黎勒皮各三分麥門冬半兩去心白术一兩甘草一分炙剉半夏半兩湯洗七次去滑杏仁一兩湯浸去皮尖雙仁麸炒㣲黄右搗篩為散毎服五錢水一大盞生薑半分煎至五分去滓温服不拘時枇杷葉散治上氣嘔吐心胷滿悶痰滯不能飲食枇杷葉一兩拭去毛炙㣲黄㯽榔赤茯苓各一兩髙良薑半兩陳橘皮一兩湯浸去白焙前胡一兩去蘆細辛三分甘草半兩炙㣲赤剉右為散毎服五錢水一大盞生薑半分煎至五分去滓温服不拘時橘皮散治上氣嘔吐不能食陳皮一兩湯浸去白焙紫蘇子㣲炒人参一兩去蘆赤茯苓柴胡去蘆各一兩杏仁一兩湯浸去皮尖雙仁麸炒㣲黄右為散毎服三錢水一盞生薑半分棗三枚煎至六分去滓温服不計時候人参散治上氣胃中煩熱痰壅吐逆不能下食人参一兩去蘆麥門冬一兩去心陳皮湯浸去白焙黄耆剉紫蘇莖葉赤茯苓枇杷葉拭去毛炙㣲赤各一兩訶黎勒皮一兩半甘草半兩炙㣲赤剉右為散毎服三錢生薑半分棗三枚煎至六分去滓温服不計時候白术丸治上氣胃中不和嘔吐不能下食虚弱無力白术五味子陳皮湯浸去白焙半兩人参去蘆一兩桂心一兩白茯苓沉香各一兩厚朴一兩去粗皮塗薑汁炙香熟紫蘇子㣲炒草荳䓻去皮各一兩枳實半兩麸炒㣲黄右搗羅為末煉蜜和丸搗三二百杵如梧子大毎於食前薑湯送下三十丸下氣止吐用蓴菜和鯽魚作羮食之多食發痔治噦氣以燕窠中草燒令黑研水服方寸匕治患啘取羅勒汁服半合定各月用乾者煮之治噦氣嘔逆以仙人杖水煮服之上噦氣以柿蔕煮服之瘥治噦氣用古磚燒熱於患處熨之三五度瘥上氣欬逆附論夫上氣欬逆者由肺臓虚弱感於風寒而成欬逆也欬則氣聚於肺致令肺脹心胷煩悶是為欬逆也皆邪氣與正氣相搏正氣不得宣通阻逆行於咽喉之間邪氣動則作氣逆遂致奔上胷膈故謂之上氣欬逆也方芫花散治上氣欬逆心滿喘嗽氣結胷中心煩不利芫花半兩醋拌炒令乾桂心三分乾薑半兩炮製剉細辛半兩陳橘皮三分湯浸去白穣焙乾前胡三分去蘆赤茯苓一兩訶黎勒皮三分右為散毎服三錢水一盞入生薑半分煎至六分去滓温服日進三四服人参散出聖惠方治上氣咳逆喉中不利人参一兩去蘆陳橘皮三分湯浸去白穣焙紫苑一兩洗去苗土赤茯苓一兩欵冬花三分射干一兩細辛三分菖蒲三分杏仁三分湯浸去皮尖雙仁麸炒㣲黄右為散毎服五錢水一盞入生薑半分煎至五分去滓温服不拘時候川椒丸出聖惠方治上氣欬逆胸滿多唾川椒一兩去目及閉口者㣲炒去汗人参一兩去蘆欵冬花三分赤茯苓一兩乾薑半兩炮製剉桂心一兩紫苑三分洗去苗土附子半兩泡製去皮臍五味子三分白术半兩杏仁三分湯浸去皮尖雙仁麸炒㣲黄菖蒲三分細辛三分右為末煉蜜和搗五七百杵丸如梧子大毎服以温生薑湯下三十丸日三四服麥門冬丸出聖惠方治上氣欬逆心胷煩悶小便不利麥門冬一兩半去心焙昆布三分洗去醎味乾薑半兩炮製剉細辛半兩川椒半兩去目及閉口者㣲炒去汗海蛤一兩細研桂心半兩右為末煉蜜和搗三五百杵丸如梧子大毎於食前以温生薑湯下三十丸桂心湯出聖惠方治上氣欬逆腹中堅痞徃來寒熱令人羸痩不能飲食或時下利腹中疼痛桂心一兩川椒三兩去目及閉口者㣲炒去汗甘草三分炙㣲赤剉當歸三分半夏三分湯洗七遍去滑附子一兩炮製去皮臍右為末煉蜜和搗三二百杵丸如梧子大不計時候以生薑橘皮湯下三十丸乾薑丸出聖惠方治上氣欬逆多唾少食乾薑半兩炮製剉桂心半兩柑子皮三分湯浸去白穣細辛半兩甘草半兩炙㣲赤剉欵冬花三分紫苑三分洗去苗土附子三分炮製去皮臍右為末煉蜜和搗三五百杵丸如梧桐子大不計時以薑棗湯下三十丸蘇子湯出千金方蘇子一升五味子五合麻黄細辛紫苑人参黄芩甘草各三兩桂心當歸各一兩生薑五兩半夏三兩右㕮咀以水一斗煮取三升分三服白前湯療上氣肺熱欬嗽多涕涶白前四兩生麥門冬十分去心貝母石膏碎綿裹甘草炙五味子生薑各四分黄芩五分淡竹葉切一升杏仁四十顆去皮尖雙仁者白蜜一匙右切水七升煮取二升七合絞去滓納白蜜更上火煎三沸分三股温服毎服如人行五六里以利為度湯成後宜加芒硝八分忌温麫炙肉油膩醋食海藻菘菜等小紫丸療上氣欬逆夜多唾濁乾薑甘皮一作甘草細辛欵冬花各三分紫苑三分附子三枚炮右搗篩以蜜為丸如梧子大先食服三丸日再以知為度忌冷水猪肉生菜等物杏仁煎療欬氣上多涕唾用一味杏仁搗碎研取一大升更搗取大升三升汁以水和研之煎取一大升酒服一匙頭日三忌猪雞魚肉胡荽等物杏仁一大升去皮治暴逆氣出本草方取生薑三兩切如皂子大嚼碎嚥下屢服屢驗上氣喉中如水雞聲附論肺主氣上通於喉嚨肺經客寒則喉嚨不利痰唾凝結氣道迫促喘息有聲聲如雞也方麻黄湯出千金方治上氣脉浮欬逆喉中水雞聲喘息不通呼吸欲死者麻黄八兩甘草四兩大棗三十枚射干如博棊子二枚右㕮咀以井花水一斗煮麻黄沸三去沫納藥煮取四升分四服日三夜一一方入生薑半分半夏丸出聖濟緫録治上氣喉中作聲坐臥不得半夏湯浸去滑薑汁製切焙紫苑去苗土桑根白皮剉各一兩欵冬花射干陳皮湯浸去白焙百部五味子各三分細辛去蘆葉半兩赤茯苓去黒皮貝母焙去心各三分皂莢酥炙黄去皮子三分杏仁湯浸去皮尖雙仁一兩半右為末煉蜜和杵數百下丸如梧子大毎服三十丸食前煎燈心薑棗湯下日再服射干湯一名麻黄散出聖惠方治欬而上氣喉中如水雞聲射干二兩麻黄去節細辛去蘆葉各四兩五味子炒紫苑去莖半夏湯浸七遍薑汁製炒各三兩生乾地黄焙四兩欵冬花三兩右為散毎服五錢水一盞半大棗三枚去核同煎至八分去滓温服日三一方無生地黄有生薑厚朴石膏湯一名厚朴麻黄湯出聖濟緫録治上氣胷滿喉中如水雞聲其脉浮者厚朴去粗皮薑汁炙五兩石膏剉一兩杏仁湯去皮尖雙仁炒四兩麻黄去根節細辛去苗葉半夏洗七遍姜製炒乾乾薑炮各兩五味子三兩半炒右為散毎服五錢水一盞更用水研小麥取汁一小盞同煎至一盞去滓温服日二前胡丸出聖濟緫録治上氣疨咳嗽喉中如水雞聲前胡去苗一兩一分葶藶隔紙炒紫色研如膏巴豆去皮心研各三分大黄剉炒一兩一分甘遂炒墨炙各五分右除葶藶巴豆外搗羅為末再研匀煉蜜為丸如梧桐子大毎服空心粥飲毎日三丸下吐利痰涎為度若吐利多即减丸數三日一服小投杯湯一名麻黄石膏湯千金方治久逆上氣胷滿喉中如水雞聲麻黄去節四兩厚朴去粗皮薑汁炙五分石膏四兩碎杏仁湯浸去皮尖雙仁三兩右㕮咀毎服五錢水一盞半先入小麥半合煎候小麥熟即出麥入藥末煎至八分去滓温服日三夜一咳嗽甚者加五味子半夏各三兩乾薑二兩鍾乳丸療咳逆上氣鱢嗽吹嗽晝輕夜甚喉中水雞聲鳴鍾乳人参桂乾薑各八分附子炮欵冬花細辛各六分紫苑一錢杏仁四分去皮尖雙仁者炒右搗篩蜜和酒服如小豆二丸日三不知稍加之忌猪肉冷水生葱菜等麻黄湯療上氣咳嗽喉中水雞鳴唾膿血腥臭麻黄六兩去節桂心一兩甘草炙杏仁去皮炙各二兩生薑八兩一作乾薑三兩右以水七升煮取二升半分五服已用療欬唾膿血喉中腥臭得力後長将丸服忌海藻菘菜生葱紫苑湯一名清肺湯治上氣脉浮欬逆喉中如水雞喘息聲不通呼吸欲絶者北紫苑杏仁訶子煨去核各一兩漢防己半兩右毎服三錢水一盞半雞子白皮一片煎七分去滓食後服之療疨病喘息氣急喉中如水雞聲者無問年月逺近出聖惠方肥皂莢兩挺好酥秤一兩右肥皂莢去火髙一尺許以酥油細塗之數翻覆令得所酥盡止以刀輕刮去黑皮然後破之去子皮筋脉搗篩蜜丸毎日食後服一丸如熟豆大服訖取一行㣲利如不利明旦細細量力以㣲利為度日止一服忌如藥法投杯湯出聖濟緫録療久欬嗽上氣胷中寒冷不得飲臥不安毎牽繩而起喉中如水雞聲欵冬花四十顆細辛一兩紫苑三兩甘草炙桂心廣麻黄去節乾薑各二兩一作生薑杏仁四十枚去皮尖雙仁者五味子半升半夏半升洗右切以水八升煮取二升分再服臥汗出即愈忌海藻菘菜生葱生菜羊肉湯一方無五味子入大棗五枚桂苓湯出聖惠方治上氣不得喘息喉中作水雞聲桂心半兩赤茯苓一兩半夏一兩湯洗七次去滑細辛半兩麻黄三兩去根節五味子一兩右為散毎服五錢水一大盞生薑半分煎至五分去滓温服不計時候又方出聖惠方用臘月猪尾燒為灰細研毎服以温水送下二錢日三四服貝母湯出聖濟緫録治欬逆喉中如水雞聲貝母去心炒一兩麻黄去根節桂去粗皮二兩半夏湯洗七遍去滑薑