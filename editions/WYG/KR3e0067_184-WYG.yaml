茯苓去皮人参去蘆頭各一兩右四味㕮咀每服五錢水一盞半去滓時時服参附湯出如宜方治短氣呼吸不足或久病困重人参半兩附子製一兩右㕮咀分作三服薑十片煎食前温服如氣短接續真氣宜黑錫丹沉附湯出如宜方治鎮墜上盛下虚痞膈氣短附子炮乾薑各半兩沉香白术各一分甘草一兩半右㕮咀薑五片煎空心服如急氣短宜四磨湯加人参草荳蔲湯出朱氏集驗方治腹脹滿短氣草荳蔲一兩去皮右為細末每服一錢空心煎木瓜生薑湯下正元散出本草治氣不接續氣短兼治滑泄及小便數服之有驗用蓬莪茂一兩金鈴子去核一分右件為末更以硼砂一錢煉細研都令匀每服二錢塩湯或温酒調下空心服中氣附論夫中氣者雖不見於方書然暴喜傷陽暴怒傷隂憂愁不常氣多厥逆徃徃多得此疾便覺涎潮昏塞牙闗𦂳急槩作中風用藥非止不相當多致殺人每見此證急作蘇合香丸四十五粒灌之便醒然後隨其虚實寒熱調治無不愈者經云無故而得瘖肺不傷者不治自己謂寒暴也氣平則已審如是即不服藥亦可又云醫書論中風謂治療多端當推其所自若因七情得之法當調氣不當治風因六欲得之亦當先與調氣後因所感之證治之蓋以中風亦多兼氣况富貴及貧賤戚戚久思所愛遽失所重凡志不遂氣則為逆豈無中氣之説歟其證及閉目不語四肢不收涎潮昏塞大畧與中風相似祇當治以氣藥不可便用搜風疏泄之劑蓋其證本是氣弱又無客邪凑故不可發散𨗳引也氣分與胸痺中滿皆相類盖胸痺属氣實中滿為氣虚氣分則挾涎飲氣為涎飲所隔榮衛不利腹滿脇鳴相逐氣轉膀胱榮衛俱勞陽氣不通則身冷隂氣不通則骨疼陽前通則身多寒隂前通則痺不仁隂陽相得其氣乃行其氣轉散實則失氣虚則逆弱乃知氣挾涎飲之所為也其脉寸每遲而濇遲則為氣不足濇則為血不足呹陽昧㣲而遲㣲則為氣遲則寒濕證也名曰氣分方桂附湯出鮑氏方治心下堅大如盤邉如旋盤水飲所作名曰氣分桂心甘草炙麻黄去節焙乾秤細辛去苗各二兩附子四枚炮去皮臍右為散每服四錢水一盞半薑七片棗三枚煎至七分去滓温服汗出如蟲行皮中即愈枳术湯出鮑氏方治心下堅大如盤邉如旋盤水飲所作名曰氣分枳實一兩半白术三兩右剉為散每服四錢水一盞半煎至七分去滓温服腹中軟即當散也一方以枳术湯生橘丸作煎服名参橘飲甚效分兩同獨活湯出危氏方治中氣閉目不語四肢不收精神昏困用南木香不拘多少為末冬𤓰子煎湯下术附湯出危氏方治中寒中氣之候四肢厥逆口噤牙𦂳急痰涎壅盛如中風状者白术四兩去蘆甘草炙二兩綿附子炮去皮臍薄切片一兩半右剉散每服三錢水一盞薑十片煎取八分去滓調蘇合香丸二粒併進二服或短氣頭暈手足厥冷未退者可進養正丹三十粒至百粒可效不拘時候一方加棗煎回陽湯出澹療方治中寒脉弱大段虚怯等證川烏去皮臍附子生去皮臍各半兩乾薑炮二錢青皮去穣一兩益智仁去殻一兩右剉散每服三錢薑七片棗三枚水一盞煎服或少入木香不拘時候蘇合香丸治氣中如遇此證急化四五粒灌之便醒然後隨宜調理方見𫝊屍門屍注殗殜類八味順氣散治中風亦當間服此藥中氣者尤得其宜方見諸風門中風類治中氣已死用理中丸二丸濃煎橘皮湯送下若或口噤便揑了病人鼻斡開牙關令吞下藥病者即甦醒調氣丸出衛生家寳方治中氣如中風状中氣而以風藥治之十無一愈中風而以氣藥治之氣順而風散宜服此藥㯽榔木香川芎羌活肉桂去皮麻仁以上各半兩枳殻一兩去穣麸炒沉香一分大黄一兩濕紙裹煨郁李仁一兩湯浸去皮右為末煉蜜丸如梧桐子大每服三十丸食後臨臥薑湯下治中賊風口偏不語者出本草取食菜茰子一升美豉三升好酒五升和煮四五沸冷服半升日三四服得汗便瘥陽厥附論内經云有病如心狂者生於陽也陽氣者因暴折而難按故善怒也病名曰陽厥夫隂陽不可偏盛偏盛則氣逆陽厥者陽盛而氣逆之謂也蓋陽氣暴折則鬱而不散故多怒而狂怒則氣上故頸脉動肉大疾者為陽厥之證也其治奪食即已蓋食入於隂長氣於陽陽盛故厥逆狂奪食者所以平其氣也方赤茯苓湯一名羚羊角湯出宣明論方治陽氣厥逆多怒而狂頭脉復動赤茯苓去黑皮一兩人参羚羊角鎊各三兩逺志去心大黄剉炒各半兩甘草剉炙一分右粗搗篩每服五錢水一盞半煎至八分去滓温服不拘時候竹瀝石膏湯出聖濟緫録治陽厥多怒狂躁不安上攻頭頸竹瀝旋入石膏一兩半赤茯苓去黑皮梔子仁升麻𤣥参生地黄知母焙各三分右除竹瀝外剉如麻豆大每服五錢水一盞半入生薑五片同煎至一盞去滓入竹瀝半合再煎三沸食後臨臥日三服竹葉茯苓湯出聖濟緫録治陽厥氣逆胸膈煩悶忿忿饒怒如發狂状淡竹瀝一升赤茯苓去黑皮二兩生地黄一升丹参𤣥参各二兩乾薑車前草各一升石膏四兩右㕮咀如麻豆大每服六錢水二盞生薑五片煎至一盞半去滓更入蜜半合煎三沸温服不拘時日三服犀角丸出聖濟緫録治陽氣偏盛氣厥多怒心胸煩滿状如狂邪頸脉皆動者犀角梢防風升麻萎蕤各三兩枳實麸炒石膏碎各半兩甘草炙剉一分右為末煉蜜和成杵百下丸如梧子大每服二十丸温熟水下不計時候日三服漸加至三十丸茯苓大黄湯出聖濟緫録治陽厥多怒氣逆發狂胸膈躁悶赤茯苓去黑皮大黄剉㣲炒鈴羊角鎊黄芩去黒皮心甘草㣲炙剉枳殻去穣麸炒各二兩前胡去蘆頭三分右粗搗篩每服五錢水一盞半入淡竹葉十片同煎至八分去滓温服食後臨臥神效防風茯苓湯出聖濟緫録治陽厥怒狂防風去皮赤茯苓去黑皮萎蕤白术丹参陳橘皮湯浸去白焙各一兩三分細辛去葉苗二兩甘草炙一兩升麻黄芩去黒心各一兩半射干一兩酸棗仁三分炒右粗搗篩每服五錢水二盞棗三枚劈破煎至一盞去滓温服日三竹瀝湯出聖濟緫録治氣逆怒狂陽暴厥竹瀝一升麻黄去根節三兩石膏二兩生薑芍藥各一兩大青梔子仁升麻赤茯苓去黑皮𤣥参知母焙各三分生葛二兩右除竹瀝㕮咀如麻豆大每服六錢水二盞煎至一盞去滓下竹瀝半合再煎三沸温服日二泄熱湯出聖濟緫録治陽厥怒狂氣逆半夏湯洗七遍切焙麻黄去根節煎枯去味焙芍藥杜蘅枳實去穣麸炒細辛去苗葉杏仁湯浸去皮尖雙仁麸炒烏梅去核搥碎各三兩松羅二兩右剉如麻豆大每服五錢水一盞半入生薑半分切竹葉十片煎取八分去滓温服定神丸出聖濟緫録治陽厥狂怒白茯苓去黒皮逺志去心防風去叉栢子仁炒人参各一兩一分龍骨一兩半牡蠣煨二兩甘草炙剉一兩棗去核取肉焙二兩右為細末煉蜜為丸如梧桐子大初服二十丸加至三十丸温服熟水下日再服羚羊角湯出聖濟緫録治陽氣厥逆善怒狂妄不常鈴羊角鎊五味子萎蕤茯神去木逺志去心沙参去蘆頭酸棗仁㣲炒各三分龍骨一兩右粗搗篩每服五錢水一盞半煎取八分去滓温服不拘時鉄落飲出指南方治陽厥善怒除煩下氣用鉄落染皂鉄浆為一味每服用湯肉温一盞飲之食後一方生鉄十斤作浆日飲一盞空心服普濟方卷一百八十四
