柴胡飲治熱勞身體壯熱咳𠻳痰喘面赤頭痛肢節痠疼煩躁口乾盗汗痩弱柴胡去苖二兩桑根白皮防風去义芍藥𤣥參黄芩去黒心甘草炙各一兩右為剉散每半兩水二盞入生薑半分切煎至一盞去滓溫分兩服如咳𠻳咯血者毎服入杏仁七枚湯浸去皮尖打碎同煎服青蒿飲子出聖恵方治熱勞煩悶四肢無力青蒿二兩柳嫩枝一兩梔子仁三分烏梅肉五錢微炒甘草三分木香五錢桃嫩枝一握右細剉相和令匀分作五服毎服以水一大盞半煎至八分去滓不計時候分溫二服黄耆湯一名地骨皮散治熱勞肢節痠疼呼吸少氣腰背强痛心中虚悸咽乾唇赤面色枯燥飲食無味悲憂慘慽多睡少起黄耆剉焙地骨皮各一兩鼈甲一枚去裙襴塗醋炙黄甘草炙剉五錢麥門冬去心焙一兩半桂去麤皮五錢右麤搗篩毎服五錢水一盞半薑半分拍破粳米五十粒煎至八分去滓食前溫服葛根散治熱勞心神不寧肥瘦煩渇葛根剉黄芩去黒心各三分甘草炙柴胡去苗黄連去鬚牛黄研各五錢右為散毎服二錢新汲水半盞調下日二青蒿散治熱勞久不瘥寒熱羸瘦青蒿一握甘草二寸童子小便三大盞東南枝桃心一握杏仁三七枚去皮尖搥碎梹榔三枚為末右以童子小便内瓶子中初夜浸至五更用慢火煎至一大盞半去滓空心分溫三服當㵼出惡物自止後喫薤粥補之青蒿丸治熱勞青蒿一觔洗甘草杏仁去皮尖鼈甲炙柴胡蜜各一兩右為童子小便五升先煎青蒿取一升去滓更煎如稀􅄳入酥少許及蜜藥末等再熬可丸即丸如梧桐子大毎服二三十丸空心酒下忌猪肉熟麵莧菜胡荽等人參湯治熱勞肌熱煩躁面紅頰赤人參一兩地骨皮五錢青蒿二錢山梔子去皮五錢甘草炙一兩右麤搗篩每服三錢水一盞小麥少許煎至六分去滓不拘時候溫服茯苓丸治熱勞咳𠻳白茯苓去黒皮地骨皮鐡精或用輕鐡六兩天靈葢浸童子小便二升煑各三兩右為末飯丸如梧桐子大毎服食後煎湯下三十丸日二枸杞湯一名麥門冬飲療虚勞口中苦渇骨節煩熱或寒方見勞療門骨蒸煩渇類治熱勞咳𠻳四肢無力不能飲食生地黄汁半升蜜三合青蒿汁三合右藥相和不計時節溫服一合宜頻服之地骨皮散治熱勞地骨皮二兩柴胡去苗一兩右為散毎服二錢須用麥門冬去心煎湯調下不計時候服黄耆湯一名黄耆天一湯治虚勞有熱咳唾膿血口苦咽乾胸滿短氣見諸虚門補虚益類出仁存方治虚熱用褐桃膠如彈大丸含之佳升陽散火湯出濟生㧞粹方治男子婦人四肢發熱肌熱筋痺熱骨節熱發熱如燎捫之烙手此病多因血虚而得或胃虚過食冷物抑遏陽氣於脾土火鬰則發之升麻葛根獨活羌活各五錢防風二錢五分柴胡甘草三錢炙人參五錢白芍藥五錢生甘草二錢右㕮咀每服五錢水三大盞煎至一盞去滓稍熱服忌寒涼之物治一切男子女人患熱勞後服涼藥過多病勢已減變成虚冷宜服此藥牡蠣火煅牛膝各五錢五味子萆薢狗脊去毛石斛山茱萸天靈葢酥炙焦黒色乾地黄巴㦸去心益智子去皮芎藭各一分川椒二銖阿魏一銖右為細末以酒半盞蜜半盞對當化阿魏含煉丸如梧桐子大毎朝鹽湯下三十丸須是骨熱已退臟腑已冷方可喫此方香甲丸出獲命方治男子熱勞四肢無力手足渾身壯熱不思飲食口苦舌乾夜夣鬼交多饒驚魘川棟子十個炒葫蘆巴一分舶上茴香一兩附子一箇炮去皮臍柴胡五錢宣連五錢鼈甲二兩醋炙令黄右件七味同杵為末煑麵糊為丸如桐子大每服五丸茶酒任下愚魯湯出澹療方主勞熱柴胡去蘆人參右等分㕮咀每服三錢薑三片􅀥一枚煎不拘時治熱勞出本草以皂莢長一尺續成者亦可須無孔成實者以牛乳酥一大兩微微塗於火上緩炙之不得令酥下待酥盡即搗篩為末蜜丸如梧子大每日空心飲下十五丸漸増至二十丸重者不過兩劑差治熱勞骨節煩痛肩背疼痛氣虚羸瘦及時病内外熱不改用柴胡煑汁服之普濟方卷二百二十九
