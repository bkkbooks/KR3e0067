body:
  text: 普濟方卷二百二十九明周王朱橚撰虚勞門風勞附論夫風勞者肝勞之類也肝主風風善行而数變無所不至勞傷之人血氣俱虚風邪易侵或遊易皮膚或沉滯腑臟其病令人手足􅍙痺筋脉拘急頭旋眼暗弩怒驚悸尋覔衣縫瞠語狂呼爪甲枯目黒是其證也方鼈甲湯治風勞四肢倦怠百節痠疼飲食漸少行履艱涕唾稠黏多困少力靣色萎黄小便赤澀黄耆鼈甲去裙醋炙秦艽去苗土柴胡去苗當歸切焙各一兩知母切焙一兩人參芎藭羌活去蘆赤茯苓去皮黄芩去黒心紫苑去土甘草炙芍藥桑白皮白蘚皮欵冬花陳橘皮浸去白焙貝母去心焙木香桂去麤皮附子炮裂去皮臍各五錢丁香一分右剉如麻豆每服三錢水一大盞入烏梅一枚薑三片􅀥二枚同煎至七分去滓入麝香少許稍熱服入酒一半同煎尤佳羌活湯一名羌活煑散治風勞攻注四肢皆腫疼上焦虚熱心胸躁悶面少色困乏無力元臟虚憊腰脚沉重日漸羸冷氣時攻腹脇如刺脹滿酒後痰唾稠多大宜服此羌活去蘆荆芥穗附子炮去皮臍秦艽去苗土麻黄去節牛膝酒浸切白蒺梨酒浸一宿焙各二兩人參沉香剉牡丹皮當歸切焙甘草炙剉半夏生薑汁浸一宿焙切白茯苓去皮鹿茸酥炙去毛萆􅐺防己桂去皮各一兩右㕮咀每服三錢水一鍾􅀥二枚葱白二寸煎至七分去滓温服空心午前臨卧各一服忌動風物石斛丸治風勞氣四肢羸弱心神虚煩飲食無味肢節疼腰脚無力夜多盜汗小便赤黄石斛去根苗牛膝去苗桂杜仲去麤皮炙稍㣲赤剉焙白茯苓續斷兎􅁝子酒浸一宿焙乾别搗枸杞子五味子山茱萸黄耆剉防風去蘆頭逺志去心肉蓯蓉酒浸一宿刮去皺皮焙乾人參去蘆頭天門冬去心焙各一兩熟乾地黄二兩右為末煉蜜搗三二百杵丸如梧桐子每服食前温酒下三十丸黄耆散治風勞臟腑氣虚體瘦無力不思飲食四肢疼痛黄耆剉一兩續斷一兩人參三分去蘆頭茯神一兩五味子三分羌活芎藭桂心各五錢附子三分炮裂去皮臍防風去蘆頭一兩牛膝去苗五錢枳殻三分炒微黄甘草炙微赤剉當歸一錢沉香三分右為散每服三錢以水一中盞入生薑半分煎至六分去滓毎於食前温服沉香散治風勞氣攻四肢枸急背膊常痛肌體萎弱不欲飲食沉香石斛去根剉黄耆剉桂心白茯苓白术天門冬去心焙白芍藥當歸剉微炒羌活附子炮製去皮臍防風去蘆頭陳橘皮湯浸去白穰焙各一兩熟乾地黄一兩甘草五錢炙微赤剉右為散毎服三錢水一中鍾入生薑半分煎至六分去滓温服巴㦸散治風勞氣血不足臟腑虚傷肢節煩痛腰膝弱形體羸瘦面萎黄小便數多卧即盜汗巴㦸栢子仁石龍芮天麻牛膝去苗牡蠣焼為粉兎􅁝子酒浸一宿焙乾别搗肉蓯蓉酒浸一宿刮去皺皮炙乾天雄炮裂去皮臍各一兩萆􅐺剉防風去蘆頭羌活當歸桑螵蛸微炙各三分肉桂二兩去皺皮右為散毎服空心及晚食前以温酒調下二錢鍾乳散出聖惠方治風勞臟氣虚損肌體羸瘦頭目昏悶四肢少力神思不安鍾乳粉紫石英細研水飛過白石英各一兩細研水飛過白术三分防風去蘆頭桂心􅌝􅌣根乾薑炮裂細剉三分細辛三分牡蠣三分桔梗半兩去蘆頭川椒去目并閉口者微炒去汗人參去蘆頭白茯苓附子各一兩炮裂去皮臍右為散入研了藥令匀毎服食前温酒調下二錢敗龜湯治風勞氣虚咳𠻳發熱敗龜醋炙虎骨醋炙防風去蘆頭海桐皮剉當歸切焙芍藥木通剉各五錢桂去麤皮木香酸􅀥仁炒黄耆剉大腹皮剉麻黄牛膝酒浸酒焙各一兩右為散毎服三錢水一盞入青蒿烏梅各少許同煎至七分去滓温服一方加柴胡熟乾地黄各五錢肉蓯蓉散出聖恵方治風勞補益臟腑利腰膝止煩疼强志力充肌膚肉蓯蓉酒浸一宿刮去皺皮炙令乾兎絲子酒浸一宿焙乾别搗牛膝去苗附子炮裂去皮臍杜仲去麤皮炙令黄剉白茯苓各一兩防風去蘆頭桂心巴㦸續斷枸杞子各三分五味子蛇床子山茱萸各五錢右為散毎服食前以温酒調下二錢附子散出聖恵方治風勞肌體羸瘦皮膚不潤肢節煩疼腰膝無力少思飲食附子炮裂去皮臍牛膝去苗桂心當歸各一兩五加皮防風去蘆頭萆薢剉杜仲去麤皮炙㣲黄剉續斷丹參沉香木香枳殻麸炒微黄去麸各二兩右為散毎服四錢以水一中盞入生薑半分煎六分去滓温服薑黄散治風勞四肢無力胸膈煩悶薑黄二兩沉香三分黄耆剉一兩桂去麤皮五錢𤣥胡索炒人參各三分厚朴去麤皮生薑汁炙五錢芎藭三分防風去皮五錢芍藥三分羌活去蘆頭杏仁湯浸去皮尖剉研各五錢訶梨勒皮微炒三分右為散再同研匀毎服三錢空心井華水一盞煎至七分别調藥末一錢温服午後再服茵蔯散治風勞瘦疾七種冷氣六極等疾脾胃虚寒不思飲食疳痢休息大小便澀兼治累年口瘡茵蔯蒿犀角屑石斛去根紫參人參白术柴胡去苗各三分桂去麤皮芍藥防風去义各五錢茱萸湯洗炒一兩桔梗炒五錢白蕪荑七分右為散白羊肝一具細切分為三服去净筋膜毎服入藥末五錢葱白五寸細切一處拌和用濕紙裹慢火煨熟空腹頓服之羚羊角湯治風勞困劣不思飲食及大病後羸瘦不食及虚勞潮熱羚羊角屑犀角屑人參防風去甘草炙剉柴胡去苗桔梗炒白茯苓去黒皮半夏湯浸七遍焙各一分黄耆剉知母焙各半分升麻半分右麤搗篩每服五錢水一盞半煎至一盞去滓食後分温二服排風飲治風勞虚熱攻頭項急言語錯亂心膈煩悶四肢拘急手足痠痛防風去苖當歸焙白术白蘚皮芍藥桂去麤皮芎藭獨活去蘆頭麻黄去根節甘草炙剉杏仁皮尖去浄炒茯神去木各一兩右麤搗篩每服五錢以水一盞半生薑三片煎至八分去滓食後温服防風散出聖恵方治風勞體虚食少羸瘦筋脉不利手足多疼防風去蘆頭天麻海桐皮附子炮裂去皮臍沉香各一兩桂心芎藭白术白茯苓山茱萸熟地黄各三分枳殻五錢麸炒微黄赤剉右為散毎服四錢以水一中盞入生薑半分煎至六分去滓食前温服天麻散治虚勞風氣不順天麻附子炮裂去皮臍各一兩甘草炙烏頭炮去皮臍各二兩麻黄三兩内三兩去節一兩蕪荑仁炒柴胡去苗秦艽去苗土鼈甲藁本前胡各六錢右細剉用豬脊骨一條全者剉入好酒一斗同熬乾去骨將藥乾搗為散毎服三錢温酒調下日二服菴䕡子湯治風勞濕痺痿厥筋脉拘攣關節疼痛難以屈伸不能行履精衰目瞑腹中不調乍寒乍熱大小便息此由腎虚所致菴䕡子炒酸􅀥仁炒薏苡仁菊花車前子蜀椒去目并閉口炒出汗蔓荆實菥蓂子冬𤓰子炒阿膠炙令燥各一兩大豆炒去皮一兩浄右麤搗篩毎服三錢水一盞煎至一半去滓空心夜卧温服若筋攣關節難以屈伸倍加酸􅀥仁菴䕡子菥蓂子冬𤓰子各一兩桃仁散治風勞脾腎虚冷心腹脹疼骨節煩痛食少無力桃仁湯浸去皮尖雙仁麵炒微黄鼈甲塗醋炙微黄去裙襴白术附子炮裂去皮臍訶梨勒煨用皮各一兩芎藭丁香桂心蓽澄茄當歸枳殻麩炒微黄去穰各三分右為散每服四錢以水一中盞入生薑半分煎至七分去滓食前稍熱服忌莧菜栢子仁散治風勞益氣血利四肢强腰脚除濕痺栢子仁巴㦸天雄炮裂去皮臍牛膝去苗天門冬去心焙川椒去目閉口者微炒去汗兎絲子酒浸三宿暴乾别搗各一兩肉桂二兩去皺皮石南續斷當歸各三分右為散毎服空心及晚食前以温酒調下二錢補益天雄丸治風勞氣身體疼痺手足無力氣血虚損顔色萎黄精神昏沉飲食無味天雄炮裂去皮臍兎絲子酒浸一宿焙乾别搗栢子仁石斛去根苗巴㦸天門冬去心焙牛膝去苗乾漆搗碎炒令煙出已上各一兩肉蓯蓉酒浸一宿刮去皺皮炙令乾熟乾地黄肉桂各二兩去皺皮右為末煉蜜和搗三二百杵丸如梧桐子大每服空心及晚食前以温酒下三十丸漸加至四十丸輕骨散治風勞四肢乏力嗜卧多困飲食減少身體疼痛三焦氣􅉣發熱口乾麻黄出節三兩烏頭炮去皮臍各一兩附子白附子生用各五錢秦艽去黄土一兩五錢柴胡去苗鱉甲去裙醋炙各一兩桂去麤皮人參各五錢山茵蔯一分右細剉用童便十盞酒三盞浸入瓷器内熬令乾再焙搗為散每服二錢温酒調下就浴後再服以衣被葢卧汗出為候三順丸治虚勞風氣攻作大腸秘澀下部疼痛脊膂牽强附子炮去皮臍天南星楝實剉炒威靈仙去土烏藥剉地龍去土炒黒牽牛搗取粉蜀椒取紅蘹香子炒各一兩右為末酒煑麵糊丸如梧桐子大每服二十丸温酒下空心食後服婦人醋湯下有孕不可服牽牛子散治風勞冷氣骨熱羸瘦及婦人産後諸疾血氣衝心脚手麻痺牽牛子半生半炒三兩白术枳殻去穰麵炒木通剉炒桑根白皮炙剉陳橘皮湯浸去白焙人參五錢赤茯苓去黒皮一兩右為散每服三錢空腹温酒調下日三服天仙藤湯治風熱勞氣天仙藤二兩秦艽去苗土鼈甲去裙襴醋炙柴胡去蘆麻黄去節芍藥甘草炙剉防風去叉前胡去蘆頭各一兩右麤搗篩毎服三錢水一盞入烏梅一枚生薑二片同煎至七分去滓温服如傷寒不用烏梅入葱白二寸煎熟服茯神湯治風勞咳𠻳心躁煩熱驚悸鼻塞咽乾唇腫口瘡胸滿悶手臂腰脚疼兼治虚勞驚悸茯苓去木麥門冬去心焙柴胡去苗黄連去鬚貝母去心焙各一五錢秦艽去苗土一兩㯽榔剉二兩甘草炙剉一兩右麤搗篩毎服五錢水一盞半煎至一盞去滓食後温服日三三木節散出聖恵方治風勞面色青白肢節沉重膂間痛或寒或熱或躁或嗔毎思食味食即不能被蟲侵蝕證狀多端樟木瘤節皂莢木瘤節槐木瘤節三味剉搗羅為末各五兩天靈葢塗酥炙搗末浄一兩牛黄研五錢人中白焙乾研一兩麝香二錢四味各研搗為末合和合匀右先將前三味末三錢以水一盞煎至半盞去滓調天靈葢等末一錢五更頓服一方無人中白為散温酒調下二錢排風酒治風勞虚熱攻頭項急言語錯亂心膈煩悶四肢拘急手足痠痛防風去叉升麻桂去麤皮獨活去蘆頭天雄炮裂去皮臍羌活去蘆頭各一兩僊人放杖草并根一觔右剉如麻豆大以醇酒三升浸五日後旋飲一盞日再服耆婆湯療治風勞虚損補髓令人健麻油一觔牛酥一觔葱白一握胡麻仁一升研蜜一升豉二觔以水三升一宿取汁上酒一升右先於鍋中入油煎令沸着葱白令色黄下酥蜜豉汁麻仁沸下酒成煎收不津器中盛之日服一匙兩匙或和酒服亦妙冷即加生薑一觔取汁乾薑末亦可用之蛤蚧丸治風虚氣肢體無力喫食減少心胸不利咳𠻳涎唾兼婦人血氣風勞不思飲食蛤蚧去鱗酥炙一對桂去麤皮木香五靈脂各一兩烏梅去核二十枚甘草炙剉一分右為末煑􅀥肉丸如梧子大毎服二十丸鹽湯下婦人醋湯日三人參丸一名五補丸治風勞諸虚不足方見本門虚勞羸瘦類牛膝丸治風勞攻注背腰疼痛四肢沉困日漸瘦弱飲食無味牛膝酒浸切焙二兩桂去麤皮烏頭炮裂去皮臍各一兩乳香研五錢右為末煉蜜丸如梧桐子大毎服十五丸至二十丸空心日午夜卧酒温服牡丹皮散治血臟虚風及頭目不利不思飲食手足煩熱肢節拘急疼痛胸脇不利大腸不調隂陽相干心驚忪悸常時旋運牡丹皮川芎枳殻麸炒各一兩陳皮五錢炙𤣥胡甘草羌活半夏湯洗各五錢木香三分訶子肉三分芍藥三錢三稜炮乾薑炮桂各五錢當歸一兩五錢白术三分炒右為細末毎服二錢水一盞半煎五七沸食前溫服益血海退血風勞攻注消寒痰實脾胃理血氣攻刺及氣虚惡寒潮熱石斛散出千金方治男子風虚勞損兼時氣甘草一觔石斛防風蓯蓉山茱萸茯苓人參薯蕷各四兩桂心牛膝五味子兎􅁝子巴㦸天芎藭各二兩並為末丹參二兩生地骨皮切碎生地黄汁各一升生