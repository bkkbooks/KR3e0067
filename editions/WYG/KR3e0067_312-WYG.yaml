body:
  text: 普濟方卷三百十二明周王朱橚撰折傷門從髙墜下附論黄帝曰中風有所墮墜惡血留内若有所大怒氣上而不行下積於脇則傷肝又中風及有所擊仆若醉入房汗出當風則傷脾又頭痛不可取於腧者有所擊墮惡血在内傷痛未已可則刺不可逺取之也夫従髙墮下惡血留於内不分十二經絡聖人俱作風中肝經留於脇下以中風療之血者皆肝之所主惡血必歸於肝不問何經之傷必留於脇下盖肝主血故也痛甚則必有自汗但人有汗出皆為風證諸痛皆屬於肝况敗血凝結従其所屬入於肝也従髙墜下逆其上之血氣非肝而何非傷寒無汗既自汗必是風化也以破血出經藥治之夫肝膽之經俱行於脇下經屬於厥隂少隂宜以柴胡為引用為君以當歸活血脈又急者痛也甘草緩其急亦能生新血陽生隂長故也為臣川山甲栝蔞根桃仁紅花破血潤血為之佐大黄酒製以盪滌敗血為之使氣味相合使血氣各有所歸痛自去矣方蒲黄散出聖恵方治従髙墜下落馬墜車碾著腕損骨碎筋傷内損惡血攻心悶絶坐臥不安宜先須按摩排正筋骨宜服此藥止痛散血蒲黄一兩當歸三分𤣥胡索一兩芎藭三分赤芍藥一兩淹䕡子三分沒藥一兩附子一兩炮裂去皮臍栗子二兩去殻隂乾川大黄一兩剉碎微炒芸臺子一兩右搗羅為散每服以温酒調下二錢不拘時候頻服沒藥散出聖濟總録治墜墮損傷筋骨皮肉發熱疼痛沒藥研澤瀉切焙桂去粗皮檳榔甘草炙剉白芷蜀椒去目并閉口者炒出汗附子炮裂去皮臍芎藭各一兩當歸三分右為散每服三錢温酒調下不拘時候鎮心散出聖恵方治因傷折後驚悸心神煩悶宜服定魂魄虎睛一對用生羊血浸一宿漉出隂乾金箔銀箔各五十片細研茯神逺志去心人參去蘆頭各半兩麥門冬去心焙蒲黄羚羊角屑各一兩硃砂二兩細研水飛過右為末用􅀥肉入煉蜜同和搗三五百杵如梧桐子大每服於食後并夜臥時以茯神湯下三十丸續斷散出聖濟總録治従髙墜下傷損筋骨發熱腫痛續斷剉生乾地黄焙當歸切焙芎藭附子炮裂去皮臍桂去粗皮各一兩澤蘭葉蜀椒去目并閉口者炒出汗甘草炙剉各半兩右為散每服三錢温酒調下不拘時候破血散痛湯治從髙損傷墜馬惡血流於脇下痛甚不能轉側妨其飲食羌活防風中桂各一錢柴胡連翹各二錢當歸稍二錢麝香少許别研蘇子一錢半一方無水蛭炒去烟盡另研右分為二服每服酒二大盞除水蛭麝香外另研如泥煎餘藥依一大盞去滓上火令稍熱調二味飢服之乾地黄散治從髙墮下傷損疼痛生乾地黄一兩當歸一兩剉微炒附子一兩炮裂去皮臍川大黄半兩續斷半兩桂心一兩琥珀半兩枳殻半兩麩炒微黄去穰桃仁一兩湯浸去皮尖雙仁微炒右為細散温酒調下一錢不拘時候芎藭散治従髙墜下車馬諸傷腕折疼痛不可忍芎藭𤣥胡索桂肉去粗皮桃仁湯浸去皮尖雙仁微炒附子炮去皮臍各一兩澤蘭半兩虎脛骨二兩塗酥炙黄右為細末温酒調下二錢不拘時候大膠艾湯治男子傷絶或從髙墜下傷五臓㣲者唾血及金瘡傷經者阿膠艾葉甘草當歸芎藭各一兩乾薑一兩乾地黄芍藥各三兩右以水八升煮取三升去滓内膠令烊分服羸人分三服兼治婦人産後崩傷下血過多虚喘欲死腹中激痛下血不止復元活血湯治從髙墜下惡血流於脇下及疼痛不可忍柴胡五錢當歸三錢甘草川山甲炮紅花𤓰蔞根各二錢大黄酒浸一兩桃仁去皮尖五十粒右桃仁研爛餘藥剉如豆大每服一兩水二盞半酒半盞煎至七分去查温服食前以利為度得利後痛或不盡服乳香神應散方見本類後黄帝鍼經云有所墮墜惡血流内若有所大怒氣上而不行下積於脇則傷肝肝膽之經俱行於脇下經屬厥隂少陽宜以柴胡為引用為君以當歸和血脈又急者痛也甘草緩其急亦能生新血甘草生血陽生隂長故也為臣山甲𤓰蔞根桃仁紅花破血潤血為之佐大黄酒製以盪滌敗血為之使氣味和合氣血各有所歸痛自然去矣接骨丹治従髙墜墮傷損疼痛當歸切焙二兩甘草剉炒三兩桂去粗皮一兩半沒藥另研乳香另研各半兩澤蘭一兩自然銅火燒紅淬七次一兩研右為細末入研藥令勻水麪糊和丸如梧桐子大每服三十丸温酒調下不拘時候日進三服牽牛子散治従髙墜下傷折有瘀血不散脅肋疼痛牽牛子生取末當歸切焙各一兩檳榔剉桂心去粗皮木香炮各半兩郁李仁湯浸去皮細研青橘皮湯浸去皮白各一兩右為散和匀每服一錢空心温酒調下取瘀血為效外以敗龜膏貼方見本類後附子散治従髙墜下落馬車碾一切傷折理血止痛附子炮裂去皮臍沒藥蒲黄當歸芎藭薑黄赤芍藥已上各一兩右為細散温酒調下二錢不拘時候接骨草散治從髙墜下損骨折筋傷肉接骨草巴㦸各二兩紫葛根剉石斛去根剉丁香續斷阿魏麪裹煨麪熟為度已上各一兩右為細散温酒調下二錢不拘時候沒藥膏治従髙墜下傷損筋骨打破皮肉疼痛沒藥當歸剉微炒麒麟竭蒲黄牡丹皮骨碎補橘仁微炒各一兩右為細末以温酒調下二錢不拘時候葵根散治從髙墜墮損折車碾馬墜筋骨蹉跌甚者大小腸不通皆被瘀血與衞氣不和致令不通葵根一兩木通蘧麥川大黄剉碎微炒各二兩甘草炙赤剉半兩鹿葱葉并根一兩右搗粗羅為散每服四錢以水一盞煎至六分去渣不拘時候温酒調下滑石末一錢桃仁湯治從髙墮下落大木車馬間胷腹中有血不得氣息者桃仁四十枚大􅀥二十枚大黄硝石甘草各一兩蒲黄一兩半右㕮咀以水三升煮取一升絞去渣適寒温盡服之當下下不止漬麻汁一杯飲之即止乳香神應散治從髙墜下疼痛不可忍及腹中疼痛者乳香沒藥雄黒豆桑白皮獨科栗已上各一兩破故紙炒三兩右為末每服五錢醋一盞砂石器内煎至六分入麝香少許温服巴㦸湯治從髙墜下及打撲内損昏冒嗜睡不能飲食此謂血閉及臓腑不通巴㦸去心半兩當歸地黄芍藥川芎各一兩大黄半兩右為粗末水煎服以利為度桃仁散治從髙墮下傷損腹中瘀血滯疼痛桃仁半兩湯浸去皮尖生研細當歸一分搗末牽牛子半兩生搗琥珀末一分膩粉一分右研令匀分為三服生地黄二兩生薑一兩切細炒令紫色入小便一小盞酒一大盞煎至一大盞去滓空心調下一服當取下惡血疼痛立定芸臺散治從髙墜下墮損惡血在骨節間疼痛荆芥藕節隂乾各二兩淨芸臺子馬齒莧隂乾川芒硝各一兩右為細末用蘇枋木半兩酒一大盞煎至七分調下二錢不拘時候敗龜膏治從髙墜下傷折有瘀血不散脇肋疼痛一名靈龜膏敗龜酒浸炙二兩半大黄生剉一兩木鼈子去殻研二兩當歸切焙一兩桂去粗皮二兩右為末好酒一升煎至半升住火稍冷入藥末半兩以栁木椑不住手攪成膏以油单紙上攤貼傷損痛處立効阿膠湯治従髙墮下傷五臓微者唾血甚者吐血及瘡經傷金崩中皆主之阿膠艾葉乾薑各二兩芍藥三兩右㕮咀以水八升煮取三升去滓内膠令稍冷分二服羸人分三服兼治女人産後崩傷下血過多虚喘腹中絞痛下血不止者服之悉愈蒲黄散治因墜墮内損血結不行蒲黄當歸切焙赤芍藥剉桂去粗皮各一兩右為細末每用二錢温酒調下不拘時候接骨散治從髙墮下遂至傷折筋斷骨碎痛不可忍接骨續筋止痛活血方見本門接骨類一名神授散奪命散治金瘡打損及従髙墜下木石所壓内損瘀血心腹疼痛大小便不利氣絶欲死大黄黒牽牛皮各二兩水蛭石灰漫火炒令焦黄色半兩右為末每服三錢熱酒調下如人行四五里再用熱酒調牽牛末二錢催之須臓腑轉下惡血成塊成片其惡血浄即愈當歸湯治從髙墜墮傷損肢體發熱疼痛當歸切焙四兩大黄生剉二兩生乾地黄焙五兩右粗搗篩每服五錢水一盞半煎至七分去滓温服不拘時候立効蘇合香丸治從髙墜下挾驚悸血氣錯亂昏迷不省急服大効方見諸氣門沒藥散治被重物壓砟傷筋骨疼痛血不散沒藥虎脛骨塗酥炙黄當歸剉微炒𤣥胡索各二兩補骨脂白芷生乾地黄微炒川大黄剉微炒蒲黄微炒獨頭栗子黄乾者各一兩右為細末不拘時候以温酒調下二錢芸臺子散治壓砟傷損筋骨或墜墮内損瘀血攻心腹脹滿悶亂下惡血芸臺子沒藥蒲黄膩粉各一分水蛭七枚炒令微黄生薑汁一合酒二合生地黄汁四合川大黄半兩剉碎微炒右除汁藥外為細末研入膩粉令勻先將地黄生薑等汁及酒同煎三兩沸調藥散二錢空心服之當轉下惡血疼痛立止矣桃仁散治被壓損瘀血在腹中㽲痛不散心胷短氣大小便不通荆芥半兩大黄生用蒲黄各二兩芎藭木通當歸桂各一兩桃仁四十枚湯浸去皮尖麩炒右為細末每服二錢酒調下不拘時候微利為度又方出聖恵方治壓傷損筋骨或墜墮内損瘀血攻心腹脹滿悶亂下惡血水蛭七枚炒令微黄硇砂三分膩粉二分研入䖟蟲七枚去翅足炒微黄乾漆半兩搗碎炒令烟出竈突墨半兩右為細末不拘時候以温酒調二錢又方出肘後方治被砟墜墮骨斷車碾馬踏牛觸胷腹破陷四肢摧折氣悶欲死以烏雞一隻合毛杵一千二百杵好苦酒一升相和得所以新布搨病上取藥塗布乾再易覺寒振欲吐不可輒去藥須臾復上一隻少則再作并以地黄酒佳荆芥湯出聖濟總録治墜墮損煩悶方見本門傷墮吐唾出血類蒲黄散出千金方治從髙墮下有瘀血蒲黄八兩附子一兩右為末酒服方寸匕日三服不止増之以意消息導滯散出聖恵方治傷重物壓砟或從髙墜下作熱五内吐血不禁或瘀血在内胸腹脹喘麄氣短崩中當歸大黄或加桃仁或蘇木或芒硝亦可如大便實可加大黄半兩别後下右等分炒為末温酒調下每服二錢不拘時候或㕮咀水酒各一盞煎一盞空心服雞鳴散出醫方大成治從髙墜下及木石所壓凡是傷損瘀血凝積氣絶欲死并乆積瘀血煩躁疼痛呌呼不得並以此藥利去瘀血即愈推陳致新治折傷神効大黄一兩酒蒸杏仁三七粒去皮尖應驗加紅花一錢當歸二錢右研細酒一盞煎至六分盌濾去滓雞鳴時服次日取下瘀血即愈若便覺氣絶不能言取藥不及急擘開口以熱小便灌之麝香散一名接骨散出肘后方治従髙墜下及打撲損傷麝香水蛭各一兩右用水蛭剉碎炒烟出研為末入麝香再研勻每服酒調下一錢當下蓄血未効再服又治折傷用水蛭熱酒調一錢食頃知痛更進一服痛止便將折骨藥封直至安平方去地黄糟裹方出聖濟總録治墜墮撲損筋内疼痛瘀血凝滯腫熱不消生地黄洗切細杵酒糟各一觔右拌和令勻隨腫處用藥逐旋以大椀盛甑上蒸熱用布絹之類裹腫處日一易桃仁散出聖濟總録療従髙墜下傷内血在腹聚不出療下血方好大黄二兩桃仁三十枚去皮尖及雙仁者右搗以水五升煮取三升分為三服去血後作地黄酒服隨能服多少益血過百日成微堅者不可復下之虚極殺人也或用酒一椀煎去滓服之治從髙墜下或打撲損傷腰脇心痛出危氏方用木香調氣散加紅麯末少許童子小便同酒調空心熱服如無麯酒亦可治破血従髙墜下損瘀在腹刺痛出本草以蒲蓆可常用此令卧破敗者良取蒲黄赤芍藥當歸大黄朴硝煎服一方蒲席燒灰二錢酒服橘子酒出聖濟總録治墜墮打撲閃肭腰痛惡血蓄瘀痛不可屈伸以橘子炒去皮破細每服二錢酒調未止再作或用猪腰子一隻去筋膜破開入藥用葱白茴香鹽濕紙裹熟煨細嚼温酒下一方治氣滯腰痛橘核炒香研酒濾去滓下青木香丸一方橘核入大蒜内濕紙裹煨令香熟酒吃一半盞研爛入少炒麪為丸用蒜白炒酒吞下俱治風氣腰痛及肭閃腰痛豆汁方療足痛従髙墜下瘀血脹心面青氣短欲死用大豆或小豆令熟飲汁數升和酒服之一方以大豆五升水一斗煮二升去豆服令盡或黒豆炒熟水煎服即甦加芎歸芍藥酒煎更妙又方出朱氏集驗方治墜墮腕折瘀血留滯衂鼻吐血用生地黄搗取汁服一升或二升尤佳一方用米醋調傅瘡上又方出本草治從髙墜下瘀血脹心面青氣短者用烏鵶翅羽二七枚燒末酒和服如吐血即見効如得左翅羽尤佳又方出聖恵方療従髙墮下若為重物所頓管得瘀血用䜴三升沸湯二升漬之食頃絞去滓内蒲三合投中攪調頓服之不過三四服神良雞鳴散出三因方治墜墮欲死兼打撲悶絶者急以手袖掩其口鼻一食頃眼開先與熱小便服若覺氣絶不能言急擘開口以熱小便灌或以酒小便服火傷冷小便灌皆能起死甚驗治為重物所頓欲死出十便良方以半夏如大豆者為末内鼻孔中此療五絶法五絶一曰溺絶二曰牆壁所絶三曰壓絶四曰自縊絶五曰産乳絶並可用内鼻孔立活雖經一日而心温者亦可救竹皮湯出十便良方治為兵杖所加木石所血在胷背及脇中痛不得氣息青竹刮取茹亂髮各如雞子大二枚右放炭火炙焦燥合搗篩以酒一升煮三沸上一服盡之三服愈治從髙墜下傷損筋骨疼痛呌喚不得瘀血著在内出本草以䑕屎燒為末以猪脂和傅痛上急裹不過半日乃止苦杖散出保命集方治従髙墜下涎潮昏冒此驚恐併也以苦杖不拘多少為細末熱酒調下如産後瘀血不散或聚血皆治之療壓撲損傷出本草搗胡桃肉和酒温頻服便瘥治人忽被墜腸出出本草以冷水噴之令身噤腸自入也治墜撲内損散敗血止痛及惡瘡發背等出本草以重陽日收取茄子百枚去蔕四破切之硝石十二兩碎搗以不津器皿大小約可盛内茄子者於器中先鋪茄子一重乃下硝石一重覆之如此令盡然後以紙數重宻封之安置淨處上下以新磚墊覆令得地氣不犯地氣至有五月後取出去紙兩重日中暴之逐日如此至二三月度已爛即開瓶傾出濾出滓别入新器中以薄紙盖頭又暴直成膏乃可用内損酒調半匙空腹飲之再惡血散則痛止而愈矣諸瘡腫亦先飲酒半匙又用膏於瘡面塗之當覺冷如氷雪瘡乾便瘥其有根本在膚腠者亦可内消若膏乆乾硬即以飯飲化動塗之整骨丸出楊氏家藏方治従髙墜下筋斷骨折内外皆損疼痛難忍不問輕重並皆治之白礬一十二兩飛過黄蠟六兩黄丹蜜陀僧另研自然銅另研為末已上三味各四兩乳香另研硃砂沒藥另研已上三味各一兩猪脂一十二兩臘月者右件用銀石器或新鍋内先下猪脂熬成膏去筋膜滓次下蠟候鎔退火候稍冷方下蜜陀僧黄丹自然銅末添慢火熬以栁木箆子攪候滴入水不散為度擡下鍋子於冷地上入硃砂乳香沒藥白礬更以箆子攪匀丸如梧桐子大每服二十丸熱葱酒送下葱白切如絲於熱酒中以盞合少時勿出氣如昏困不能嚥藥者即用葱酒化開灌下仍將二三十丸切開於紙下以火炙之如不化入油少許隨所傷大小攤成藥靨恐此藥不黏以雲母膏塗靨周圍貼之良乆痛變成痒若骨碎及蹉跌者並皆平正不成蘆節其傷破處便生肌肉多年傷折每遇隂晦發作疼痛者亦可服不拘時候又方出永類鈐方用水蛭茴香各一兩先以茴香三錢同水蛭炒去茴香又以茴香七錢微炒共為末用水煎蘇木加酒和調烏藥順氣散一帖作三服又法硇砂水蛭竹膜絲頭四味将砂炒蛭去砂用蛭為末竹絲燒灰和葱酒調服治従髙墜下瘀血脹心面青氣短欲死者用飛駮鳥味甘寒翅羽七枚燒末酒服之得右翅者最良飛駮鳥即雄鵲也若燒作灰以右接中散解者是雄也又燒毛作屑内水中沈者是雄也又其翼左覆者是雄又方用韶粉味辛寒一錢匕和水服之即瘥治従髙墜下頭破腦出血中風口噤用黒豆味甘平一升炒去腥勿使太熟杵末蒸之氣遍令甑下盆中以酒一升淋之温服一升覆被取汗傅膏瘡上墜車落馬附論夫或因乗車馬或登陟危險誤多倒仆輕則蹉跌筋脈蹴損不得伸屈甚者乃至踒折筋骨治宜速以養血脈續筋骨之劑服之則其効速矣方乳香烏龍丹治落馬墜車打撲閃肭損傷筋骨疼痛悶亂活血止疼及中風癱瘓口眼喎斜婦人血風腰腹四肢走注痛痺等疾骨碎補葫蘆巴炒破故紙炒川烏炮去皮臍蓯蓉酒浸牛膝酒浸金毛狗脊牡蠣燒赤甜𤓰子炒黒牽牛赤芍藥自然銅燒赤醋蘸七次川楝子茴香炒牡丹皮五靈脂白芍藥各一兩蒼术二兩去皮炒官桂半兩細墨七錢木鼈子七箇沒藥二錢半乳香二錢右為細末研匀醋麪糊丸如梧桐子大每服七丸至十丸温酒下日三服神聖膏出徳生堂凡跌傷後用此藥敷貼仍服後藥赤小豆木鼈子去殻另研萆麻子去殻另研羌活薑黄草烏血竭大黄知母白芷川烏白芨白蘞防風各一兩右為細末和勻隨病大小用好米醋宻調敷傷損處乾再敷即痛止骨接當歸散出徳生堂治落馬墜車傷損當歸桂心川椒附子各二錢澤蘭一錢芎藭六錢甘草五錢沒藥乳香各二錢半另研右為細末每服二錢温酒調病上食後服病下空心服三日筋骨相連二十日痊可止痛虎骨散出聖恵方治馬墜傷損虎脛骨三兩塗酥炙微黄敗龜塗酥炙微黄當歸剉微炒陽起石酒煑半日細研骨碎補自然銅細研赤芍藥甜𤓰子沒藥薑黄各一兩右為細末每服以暖酒調下二錢日三四服芍藥散治倒仆筋脈蹴損方見本門閃肭類芎藭湯出聖濟總録治墜墮倒仆蹴損筋脈芎藭一兩半澤蘭取葉一兩生乾地黄焙三分桂去粗皮半兩附子炮裂去皮臍牛膝酒浸切焙各一兩蜀椒去目并閉口者炒出汗右剉如麻豆大每服三錢水酒共一盞煎至七分去滓温服不拘時候槐子煎出聖濟總録治倒仆諸筋蹴損槐子炒為末用酒一升浸一宿桂去粗皮秦芁去苗土白术剉炒續斷附子炮裂去皮臍各一兩右除槐子外搗為麄末將槐子酒先煎次入猪脂半斤再煎沸入藥末再煎熱絞去渣磁合盛每服一匙温酒調服不拘時候虎骨散出聖濟總録治倒仆蹴損筋骨疼痛虎骨酥炙别為末一兩酒一升生地黄汁一升右将地黄汁并酒煎沸入虎骨末同煎數沸每服一盞温服不拘時候當歸湯出聖濟總録治倒仆蹴損筋骨疼痛當歸切焙芎藭各二兩熟乾地黄焙四兩右麄搗篩每服三錢水一盞煎至七分去滓温服不拘時候地黄酒出肘後方治倒仆筋蹴不得展舒及瘀血不散亦療馬墜生地黄洗切研八兩酒三升右共煎數沸去滓每服一盞温服不拘時候桃仁地黄酒出聖濟總録治倒仆蹴損筋脈生地黄汁一升酒一升桃仁去皮尖别研一兩右將地黄汁酒煎沸下桃仁再煎數沸每服一盞温服不拘時候骨碎補散出聖恵方治一切磕損落馬碾著傷折等服之接骨散惡血骨碎補一兩木香半兩蒲黄一兩𤣥胡索一兩當歸半兩剉微炒桂心芎藭各半兩檳榔一兩右為細末不拘時候以温酒調下二錢虎骨散出聖恵方治一切磕損落馬車碾失墜傷折疼痛虎脛骨二兩塗酥炙令黄桂心牛膝去苗淹䕡子續斷澤蘭郁李仁湯浸去皮微炒各一兩右為細末不拘時候以温酒調下二錢赤芍藥散出聖恵方治墜車落馬傷折内損疼痛赤芍藥芎藭桂心各一兩買子木夜合花當歸剉微炒骨碎補各三兩右為細末不拘時候以温酒調下二錢牡蠣散出聖恵方治墜車落馬傷損筋骨疼痛皮肉破裂出血不止牡蠣一斤濕紙裹後却以水洗更裹候乾用大火燒通赤白礬三兩燒令汁盡黄丹三兩膩粉雄黄細研浄麒麟竭各一兩雌黄半兩細研麝香二錢細研右為細末仍於烈日中攤曬半日後入磁缾中盛如有墮損及骨折筋㫁用生油稠調塗之如已後瘡乾傅之骨碎補散出聖恵方治馬墜車碾踠折呼呌疼痛聲音不絶當歸一兩半微炒剉碎骨碎補牡丹皮虎脛骨塗酥炙令黄白芷芎藭赤芍藥敗蒲燒灰各一兩右為細末每服以煖酒調下二錢日四五服敗龜散出聖恵方治馬墜傷折止痛敗龜塗醋炙全黄虎脛骨塗酥炙全黄牡丹皮赤芍藥熟地黄桂心續㫁各一兩當歸一兩半剉微炒右為細末每服以温酒調下二錢日三四服敗蒲散出聖恵方治馬墜傷損筋骨疼痛内有瘀血腹中㽲刺不可忍敗蒲細剉舊麻甑帶各一橛許細剉用亂髮如雞子大一團火燒灰當歸一兩剉微炒赤芍藥桂心各半兩桃仁四十九枚浸去皮尖雙仁微炒右為散每服四錢以水一小盞煎至半盞去滓不拘時候熱服當歸散出聖恵方治落馬墜車諸傷腕折臂脚痛不止呼呌不絶服此藥呼噏之間一服止痛三日筋骨相連昔公實錢季毅皆曽合以救人當歸炒桂心蜀椒炒出汗附子各二分炮去皮臍澤蘭一分芎藭六分甘草五分右並熬令香篩酒服方寸匕日三丸是傷損皆服之十日愈如小兒被奔車馬所損裂其膝皮内決見骨即絶死小蘇啼不忍聞服之便睡十數日便行走其神驗如此一方有檳榔一兩忌生葱猪肉冷水菘菜海藻五傷接骨丸治墜馬傷折及閃肭疼痛不可忍方見本門打撲傷損類五骨散出聖恵方治落馬墜車腕折骨碎筋傷壓損疼痛不止鯪鯉項骨獼猴項骨虎項骨黄犬項骨野猫項骨各一兩天雄半兩炮裂去皮臍肉蓯蓉半兩酒浸一宿刮去皺皮炙乾右味骨細剉用酒醋各半升浸一宿漉去炙令黄色候冷入二味藥同為細散每服二錢以温酒調下不拘時候又將黄米半升作糊入散藥一分調令勻塗貼骨折筋傷處疼痛立止大黄湯出肘後方治墮馬一切筋骨損傷腹中有驚風瘀血煩悶不省人事此藥利大便去驚風或血大黄一兩切浸湯盛下緋帛如手大燒灰用亂髮如雞子大一團燒灰用敗蒲一握三寸桃仁四十九個去皮尖甘草如中指節一段炙剉乆用紗單布一尺燒灰右以童子小便量多少煎湯盛内酒一大盞次下大黄去渣三分温服先剉敗蒲席半領煎湯浴衣被覆斯須通利數行痛楚立瘥利及浴水赤勿怪即瘀血治墜馬撲傷痛不可忍者用仙䑕屎三兩細研以熱酒投之取其清酒服之立可止痛更三兩服便瘥仙䑕屎即蝙蝠屎也療落馬墜車及墜屋坑踒傷身體頭面四肢内外刺痛煩躁呌喚不得臥方出肘後方急覔䑕屎無問多少燒末以猪膏和塗封痛處急裹之仍取好大黄如雞子大以亂髮如鴨子大以人所裁白越布衫領巾餘布以裹髮外乃令火燒烟㫁搗末屑以薄酒服日再三無越布可强用常布當預備此物為要𦂳急用療墜馬内損方取􅂒藥一小兩搗為末牛乳一盞煎五六沸和服或以羊肉汁和服一日内忌菜極効􅂒藥見陳威本草白膏治一切墜落打撲及腫毒疼痛栁白皮切半兩白蠟四錢鉛丹二錢胡粉三兩油四兩商陸根切三分右先以熟油入栁白皮商陸根煎候變色去滓入諸藥數攪良乆膏成毎用㸔腫大小以故帛或輭紙攤貼神異立効方治馬墜損傷桃仁四十九粒湯浸去皮尖雙仁爛研川大黄一兩切剉碎微炒敗蒲麻甑帶各一握燒灰亂髮如雞子大燒灰右為散以無灰酒三大盞煎至一盞去滓分為二服食前服沒藥散治馬墜撲損内有敗血㽲刺疼痛不可忍者沒藥末麒麟竭末黄丹微炒白礬燒灰各一分右為細末不拘時候以温酒調下一錢沒藥雞子酒治墮落車馬筋骨疼痛不止沒藥半兩研末生雞子三枚細酒一升右先將雞子開破取白去黄盛椀内入沒藥以酒煖令熱投於椀中令勻不拘時候温服治馬墜傷損腰肋疼痛不可忍方益州麻布一尺燒灰細研蒲索一握燒灰細研此索船家名䌫索如無即以蒲黄代之川大黄三兩切細如大豆右先以酒一大盞半浸大黄一宿煎三五沸去滓入前藥灰攪勻微温分為二服如人行三二里再服當利出惡血片効羊腦方治被馬墜損腫疼痛不可忍羊腦一合龜甲一兩半屑生地黄三兩切右以酒醅和搗如泥微熱裹損處冷即易之烏頭散治一切墜馬傷折損者先服此藥然後用手接骨當歸草烏白芷各二錢半右為細末每服半錢至一錢用温酒調下微麻用手整骨平正方可用藥敷貼患處當歸導滯散治落馬墜車打撲損傷瘀血大便不通洪腫暗傷疼痛昏悶畜血内壅欲死川大黄一兩川當歸一分麝香少許右除麝香另研外為極細末研勻每服三錢熱酒一盞調下食前内瘀血去或骨節傷折疼痛不可忍以接骨類紫金丹服之或以醋煎服亦可治墮車馬間馬鞍及諸物隠體肉㫁疼痛方以酢和麪塗之一方如肢體碎折者用小麥粉子炒黄好酒調敷趁熱用杉木夾住一方用小麥和醋蒸之搗爛裹所傷處一方麪和醋蒸裹傷處亦可治墜馬失足或為物所壓痛極不可忍先用香白芷末和降真末等分童子小便和酒調服二錢外以澤蘭同當歸末擂爛微炒盫傷處止痛治墜馬折傷用沒藥一味能推陳置新生好血丸服此皆須研爛以熱酒調下効治墜車落馬筋骨疼痛不止用𤣥胡索一兩搗羅為散不拘時候以豆酒調下二錢治墜馬拗損疼痛不可忍方以桑根白皮五片為末水一斗煎成膏傅於損處已後終無宿血亦不發動一方用桑根白皮一片以水三大盞酒一大盞煎取一盞去滓以故烏氊可於損處大小揾藥汁裹冷即易之十遍痛止腫消治墜馬撲損用稻稈燒灰用新熟酒未壓者和糟入鹽和淋煎灰取汁以淋痛處立瘥直至骨損亦可淋好糟灰亦得不必新壓酒也摩風膏出聖恵方羌活躑躅花甘菊花當歸烏蛇莽草細辛白蘞各半兩防風去蘆桂心鯪鯉甲各三分附子去皮臍川烏頭去皮臍皂莢去皮子芎藭白芷露蜂房白芨括蔞根紫葛蝟皮杏仁湯浸去皮尖雙仁各一分漢椒一兩半去目苦參一兩蠟五兩猪脂三斤切右細剉以米醋二升拌勻經二宿後以火微微炒之令乾用猪脂和藥以慢火煎一日以綿濾於磁合内盛不令水汚如有傷折處將用摩之挺子膏出聖恵方治傷折麒麟竭沒藥亂髮灰蜜陀僧丁香麝香木香膩粉雄黄雌黄自然銅黒狗肝膽右各一兩細研先於鐺中鎔黄蠟然後入藥末熬鍊成膏取一小竹筒子熱灌之待冷方可取出於黄丹中出色若有患者先以熱水洗病上用生油於漆捺中磨藥塗痛處立効乳香膏治傷折皮肉破冷乆不合宜用長肉合瘡口方見膏藥門瘡腫傷折類摩痛膏出聖恵方治傷折筋骨腫痛不可忍細辛去苗葉牛膝去苗各半兩駝脂十兩臘月猪脂十二兩木鼈子去殻丁香别搗為末麝香别研羌活去蘆頭芎藭防風去义附子去皮臍生用括蔞根各一兩右除駝脂猪脂丁香麝香外細剉以米醋二升拌勻經三宿入鐺中抄令乾下駝脂及猪脂等以慢火再煎候諸藥焦黄色即住火用綿濾去滓後下丁香攪勻内磁合中盛傷折處取摩之治為馬墜内損出本草用錦紋大黄一兩杵羅以為末用頭醋半斤同熬成膏丸如梧桐子大患者用温醋七分盞化五丸服之良乆下瘀血長安石史居嘗至通衢有從後呼其姓第者曰吾無求於人念汝有難故來救汝出一紙卷授石曰有難即用之乃治折傷内外損方書也明年因趨朝坐馬為他馬所踶折足墜地又蹋一臂折家人急合此藥且灌且裹至夜半痛止後手足皆堅牢如未傷時方出良方用川當歸鉛粉各半兩鵬砂三錢同研令細濃煎蘇木汁調服一大錢匕損在腰以上先喫淡粥半盌然後服藥在腰以下即先藥後食仍頻頻呷蘇枋汁别以糯米飲入藥末拌和攤紙上或絹上封裹傷處如骨碎用竹夾之乃以紙或衣物包之紙閉氣口宜紗絹之類其妙如此故表而出之治墜馬撲損瘀血在内煩悶右取東引杏枝三兩細剉微熬好酒三升煎十餘沸去滓分為三服空心下如人行三四里再服治諸傷折淋熨貼熁附論凡傷折有輕重淺深乆新之異治法亦有服食淋熨貼熁之殊當詳所損之勢而藥之去毒散滯生肌長肉亦各有序無致差紊乃明傷折之本末也方神驗摩風麝香膏出聖恵方治折傷蹉跌筋骨黯腫疼痛及傷外風毒風口面不正但是傷風等宜用此軟筋骨潤皮肉止疼痛麝香細研虎脛骨細辛防風去蘆獨活桂心當歸芎藭白芷白殭蠶生乾地黄白芨白蘞附子去皮臍生用旋覆花赤芍藥連翹甘菊花木鼈子去殻天南星牛膝去苗躑躅花甘菘香石斛去根各一兩川椒去目并閉口者括蔞根烏蛇各一兩半野駝脂十兩蠟五兩鍊針二兩臘月猪膏二斤醋好酒各三升右淨洗曬乾細剉入酒醋中浸三宿漉出隂乾却入臘月猪脂駞脂内以慢火煎候白芷黄焦藥成以綿濾去滓入麝香末調匀以磁合盛有患者火上熁手心㸃藥摩痛處五七度亦用温酒調半匙服之芫花麄散熨方治傷折瘀血不散芫花原蠶沙各三兩生地黄二斤生薑四兩蜀椒去目及閉口者當歸各一兩牛膝桑根白皮艾葉白芷各二兩右細剉麄搗以醋拌炒熱用青布裹熨之立効淋煠芎藭湯治傷折疼痛芎藭甘草炙蜀椒去目及閉口者當歸切焙吳茱萸浸炒各一兩桑根白皮炙剉澤蘭各二兩松樹脂一兩黒豆一升研碎入松脂内炒右麄搗篩每用藥三兩水一斗煎沸淋煠痛處立効淋煠頑荆散治從髙失墜及一切傷骨碎并瘀血結痛頑荆葉一兩半蔓荆子白芷細辛去苗防風去蘆桂心川芎丁皮羌活各二兩右為細末每用藥二兩鹽半匙葱白連根五莖將水五升煎五七沸去滓用手淋煠痛處冷則再換淋煠時宜避風暖盖量病大小臨時加減用藥治傷折浮腫疼痛膏厚朴去粗皮白芷各二兩檳榔芎藭各一兩桂心二兩半沒藥麒麟竭各半兩當歸三兩剉微炒硃砂三分細研右為散以酒二升熬藥成膏於帛上攤貼於痛處立効如食前熱酒調下二錢亦佳桂附貼熁膏治接骨因傷損筋脈時發痛楚遇寒則甚一名止痛貼熁膏桂去粗皮附子去皮臍生用乳香研蜀椒去目并閉口者炒出汗白礬研吴茱萸浸炒各一兩生薑汁酒各五合右搗碎六味為散將薑汁并酒各五合共煎取七合入藥末調匀於油單紙上攤貼患處急裹縛之其痛立定一方無白礬有白芨應驗塗貼猢猻膏治一切傷折并蹉跌骨碎壓腫曉夜疼痛不可忍者猢猻骨穿山甲骨狗食系骨虎脛骨野狸骨水獺骨猫兒食系骨各三兩腽肭臍三兩右麄搗以米醋拌入瓶子以蜜封頭令乾以文火燒令稍熱為度候冷取出搗羅為末磁器中宻盛每用時先以醋煑黄米粥㸔損折痛處大小入藥末半錢調令勻攤於油單紙上裹之上面以綿裹繫縛重者不過三度驗其傷折處骨先依法度排正後即封裹如貼藥時疼痛先用温酒調藥末半錢服之藥入口其痛立定塗藥方乳香綠礬各二兩骨碎補川朴硝川椒去目并閉口者桔梗去蘆白礬燒令汁盡各一兩鹽梅肉三兩炒乾右為末煎米醋如膏勻攤於帛上貼之每日一易塗貼方治傷折踠損蹉跌黯腫皮肉疼痛菉豆末五兩桂心附子川椒去目蛇床子松脂各二兩吴茱萸當歸剉微炒各一兩右為末用薑汁調如膏貼於患處乾即再換如有瘡口不可用之貼熁敗龜膏治傷折止痛消腫化毒氣散瘀血敗龜塗酥炙令黄沒藥川大黄各三兩百草霜木鼈子仁當歸剉微炒桂心芎藭各二兩右為散每用之時先以好酒一升煎至半升下火停酒稍冷入藥末一兩却於火上重煎一時不住攪成膏攤於紙上貼走馬貼熁乳香膏治傷折骨筋疼痛不止乳香二兩蛇床子皂莢炙去皮子附子生用各一兩桂心一兩半芥菜子赤小豆各三兩右為末用生薑汁一中盞調如膏㸔傷損處大小攤於油單上封裹候乾即易之當歸湯治傷折車碾落馬蹉跌筋脈俱傷疼痛不可忍先用通和氣血脈止痛當歸頑荆藁本蔓荆子白芷各二兩芎藭丁香皮各一兩右為散每度用藥三兩入鹽半匙葱白一握浆水一斗煎十餘沸漸添淋煠痛處日二用之桂附散治傷折筋骨疼痛方見本門傷折疼痛類洗瘡湯治傷損烏鵲飲老干根松樹兒樟葉忍冬藤鷄脚草烏掞樹兒令洗者用之煎湯虎骨湯出聖恵方治傷折後或人脚膝腰胯被冷風攻擊疼痛行履不得虎脛骨桑根白皮剉五加皮白礬各二兩松木節樟木節各十兩川椒一兩去目右為散每度用藥三兩以水一斗煎十餘沸漸漸煠痛處熨藥方出聖恵方治傷折踠損蹉跌筋傷骨碎黯腫疼痛筋脈急腫展縮俱難立坐不得生地黄二斤切研生薑半斤細切川椒去目研末白礬搗末各一兩蠶沙五兩乳香搗末芫花各二兩右相和於鐺中醋拌炒令熱以青布裹熨痛上并四向筋急腫痛處冷即重炒熨後便用接骨止痛膏封貼如是傷損骨碎即先須依法度排正碎骨及蹉跌歸原後用綿裹栁木箆繫縛夾正便服補益丸散神効軟骨塗藥方出聖恵方治傷折海桐皮木鼈去殻陳橘皮各二兩五加皮兩半逺志去心百合各一兩右為末每日以米醋調如膏匀攤於帛上貼之熨藥方出聖恵方治傷折踠損蹉跌筋骨俱傷黯腫痛無瘡口生地黄一斤細切生薑半斤細研艾葉川椒去目及閉口各三兩芫花松脂各五兩右搗篩入前二味攪和令勻分為三分用醋三合於鐺内炒令熱用熱布裹熨痛處冷則再炒熨之又方出聖恵方生薑一斤芫花鹽各五兩白芷桑根白皮各五兩故烏氊一尺右細剉用醋一升炒令熱以絹裹熨之痛處冷即再炒熨之三二十度木鼈子貼熁膏出聖恵方治折傷筋骨木鼈去殻二兩蜀椒去目及閉口炒出汗虎脛骨酒炙龜甲醋炙各一兩松節二兩細剉醋一升炒令醋盡右為細散用小黄米半升作稠粥調藥五錢攤於絹上封裹損折處効又方出聖恵方治傷折筋骨疼痛不止松脂三兩當歸剉微炒細辛白芷各一兩川椒二兩右為散用生地黄汁并醋相和調如膏臨時㸔患處大小塗貼每日換之又方出聖恵方治従髙失墜及一切傷折筋骨傷碎瘀血結痛黒豆二升乳香白礬桑根白皮剉各三兩接骨草五兩右為末每用浆水一斗藥末三兩煎至七沸去滓用手淋煠患處冷即換之法煉黒豆熨藥方出聖恵方治傷折生黒豆三升葱并根三十根細切右用青布裹之湯内煮承熱替換熨痛處立効淋洗方出永類鈐方右用生葱切荆芥蓼杜當歸等入煎湯放温洗或連翹防風白芷黄連又方出永類鈐方用南蓼杜獨活藁本黄柏生薑煎洗如有口除薑蓼損而青腫用此二味若肉冷痺痛骨斷而腫不可洗傷口有膿水别用合口藥如前風流散治涼血消腫出永類鈐方右用千金草即荆芥山查皮藁本石南藤皂角連根葱煎水洗普濟方卷三百十二
