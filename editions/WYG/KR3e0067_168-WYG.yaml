body:
  text: 普濟方卷一百六十九明周王朱橚撰積聚門積聚消積丹治婦人男子一切冷積青皮一錢半陳皮一錢半葫蘆芭故紙京三稜白牽牛黒牽牛各三錢右用巴豆二十粒大􅀥二十枚去核巴豆去皮每棗一箇包巴豆一箇用紙裹定泥包成箇燒餅文武火燒乾取出將前項藥同燒乾􅀥豆為細末又用白麺四兩包藥成大燒餅燒乾同藥研為細末醋糊為丸如桐子大每服五七丸至九丸空心醋湯下木香丸出聖濟總錄治冷積滯氣心胷痞悶令氣上攻臟腑疼痛木香桂去粗皮京三稜煨剉蓬莪茂煨剉胡椒炒青橘皮去白焙各一兩梹榔剉訶黎勒煨去核大黄剉炒各兩半白牽牛炒二兩取末半兩右為細末醋煑麺糊為丸如菉豆大每服七丸至十丸食後生薑湯下金華散治逺年沉積酒食過多生冷所傷驚憂聚結不散胷膈膨悶脇肋堅痛肌痩减食時發寒熱夜多盗汗身體俱黄四肢浮腫痰涎壅盛咳𠻳胷滿嘔逆惡心臟腑虛弱臍腹刺痛傷滑下利膿血瘡癩不服水土及婦人經候不調大黄三十兩瞿麥净十兩京三稜梹榔茴香各五錢黄芩木香各四兩右為細末用白麺一斤和藥勻水搜作十餘餅微亮亁用猛火焙一夜極亁又為末入木香每服三錢臨睡服用酒調下至五更時取惡物更以温粥補之磨積丸出聖濟總錄治積聚不消累有傷滯食已腹痛飲食不化惡心嘔吐胷脇脹悶大便秘利不定木香青橘皮湯浸去白焙桂去粗皮各一兩吳茱茰湯洗焙乾炒三兩硼砂醋煑成霜研末一錢巴豆霜半錢右搗羅四味為細末入硼砂巴豆霜拌勻醋煑麺糊丸如菉豆大每服三丸至五丸早晚食後臨卧服大便溏利即減丸數鱉甲桃仁煎丸治諸候桃仁五兩湯浸去皮尖用水研濾取三升京三稜二兩煨黄鱉甲九錢煑醋炙黄三兩梹榔青橘皮去瓤炒木香各一兩右先取桃仁汁慢火熬至二升同加好醋一升再熬如糊將餘藥五味細末拌勻丸如桐子大每服五七十丸淡醋湯下空心日二服青金膏信香十方青金膏灌頂大法王子所傳十二上願藥師琉璃光如来應供正徧知明行足善逝世間解無上士調衘丈夫天人師佛世尊方境授治周身中外隂陽不調氣血不調變生百病乃至虛羸困倦徧攻酒食内傷心腹滿塞急痛或酒積食積癥瘕積聚痃癖堅積中滿膈氣食臭酸醋嘔吐飜胃或膈脹消中善食而痩或消渇多飲而數小便或傷風下血痔瘺痒痛或瘡疹徧身癰疽惡瘡或瘡毒已入於裏腹滿嘔吐或成㵼利或除惡瘡瘜肉或下利腹痛或一切風氣肢體疼痛及中風小兒疳疾諸風搦搐但平人常服補飬榮衛調和飲食信砒乳香剉在碗水研細輕粉一錢巴豆各一兩都研龍腦炒半兩麝香各半兩青黛三錢同研細黄蠟三錢一方用粉霜先研一兩硼砂一錢研細右為細末鎔蠟入蜜半錢就搓勻旋丸菉豆大至小豆先服小丸病在上食後在下食前在中不計時候面東頂禮一丸净器盛水送下合藥即净處面東每一丸宻念咒三遍或病人不能咒諸人咒或師氏咒通咒曰信香十方金青膏藥師咒成宻遍抛普濟有縁除百病仰吞一粒體堅牢宻咒但言八金剛莫說十方佛五藴六根俱不通十二上願自然成如意丸治虛中積冷氣弱有傷不能𫝊化心下痞堅兩脇脹滿心腹疼痛噫宿腐氣及霍亂吐㵼水榖不化乆利赤白膿血相雜乆病黄色羸瘦及腹中一切食癥之疾並皆治之枳殻去穰梹榔橘紅半夏湯泡七次蓬术京三稜亁姜炮黄連去鬚各二兩巴豆七十粒連殻用右除巴豆外剉如豆大用好醋煑亁去巴豆餘藥焙為細末薄糊為丸如菉豆大每服十丸加至十五丸用茶清姜湯送下食後臨卧有孕婦人不宜服集香丸治消磨積塊去疾療癖治一切積滯不拘老弱虛損者皆可服餌木香七錢半蓽撥直者硼砂半兩水化開盞子内焙亁附子二枚各重五錢半以上者須得真生好者炮製去皮臍剜出粗末破故紙炒各一兩右五味将飛過硼砂末分在附子瓮内却用剜出末子末盖口用和成白麫裹約半指厚慢火内燒令黄色去麫為末将原裹附子麫丹為細末醋調糊為丸如菉豆大每服十五丸至二十丸食後生姜湯下蘓湯煎治膈中不快酒食不消飲食或忻或不忻善治脾元一切中虛積滯肉豆蔲丁香木香硼砂京三稜蓬术各一兩燒存性右為末烏梅肉丸如麻子大每服十四粒空心熱蘓湯送下聖餅子治一切沉積氣脹兩脇氣滿無問乆新者大黄三兩硼砂三錢山梔子半兩輕粉二錢黒牽牛頭末一兩右為細末錬蜜為丸捻作餅子如小銅錢大每服三餅子細嚼温酒送下食後臨卧如行粥補之虚實加減妙應丹治諸臟氣虛損積聚煩悶及飲食中蠱毒或食水陸果蓏蟲卵入腹而成蛇蟲魚鱉或宿食留飲婦人産後敗血不消女子月水不通結為癥瘕時發寒熱唇口焦黒肢體瘦削嗜卧多魘食少腹痛大便糟粕變成冷痢附子四箇六七錢重者生去皮臍剜作粗末入硼砂共一兩七錢重麫濟褁煨熟去麫不用蓽撥木香煨青皮破故紙各三兩半右為末麺糊搜丸如梧桐大每服三十丸生姜橘皮湯下洩利米湯下加至五十丸麝香丸治停宿積聚能尋諸處痛凡膀胱氣脇下痛最難治心腹冷痛温中快氣此藥主之麝香一錢木香胡椒各一兩全蝎去毒微炒巴豆去皮心各四兩右為末湯泡蒸餅糊丸麻子大硃砂為衣每三丸常服熱水下心腹痛研煨生姜下血痛炒姜醋湯泡下腎氣脇脹茴香湯下大便秘蜜湯下梹榔丸治積食破滯氣梹榔木香人参各二錢橘皮五錢炙甘草二錢右為細末湯浸蒸餅為丸如桐子大温水下四五十丸五百丸一名羅漢丸出李氏方治宿食留飲積聚中腕噫息吞醋心腹痛疼并療中虛積聚及臟腑飱泄赤白痢下並治一切酒食所傷化痰涎逐滯氣消痞痛丁香巴豆去皮縮砂仁胡椒烏梅去核右各一百箇為細末炊餅糊為丸如菉豆大每服五七丸熱水下食後臨卧服一方姜湯下一方橘皮湯下防葵丸出聖恵方治積聚氣塊防葵五錢芫花五錢醋拌炒亁亁姜五錢炮鱉甲一兩醋炙黄去裙攔硼砂一兩不夾石者細研入右為細末研入硼砂令勻以米醋一升煎令稠下諸藥末慢火熬入少蒸餅和鎔可丸如菉豆大每服十丸空心温酒下土𤓰丸出千金方治諸臟寒氣積聚煩悶熱飲食中蠱毒或食生物及生中蟲卵入腹而或為蟲蛇魚鱉留飲宿食婦人産瘕帯下百病隂陽不通利大小便不節絶傷墮落寒熱交結唇焦黒身體消瘦嗜多食少魘産乳胞中餘疾股裏小腹中結土𤓰根桔梗各半斤大黄一斤蒸二斗米下爆乾杏仁一升右為細末蜜丸如桐子大空腹飲服三丸三日不知加之以知為度串痺藥半夏七枚白酒藥一弹丸杏仁七枚右件炒黄色為末用酒蒸化為丸如菉豆大每服五七丸治嗽卧時白湯下治氣木香湯食後送下貼臍餅子治虛中積滯腹脹痞痛大小便不通穿山甲炮燥五靈脂巴豆去皮大蒜去皮各三錢右為細末同研如泥作餅子如三錢大用綿裹一餅安臍中著物繫定覺熱藥行宣取效十三丸一名守病􅀈疾丹出醫學切問治諸疾氣心疾巴豆去皮用生肉一兩雄黄二錢人言二錢粉霜一錢先化黄蠟五錢次將四味為細末一時下於蠟内熬勻和冷定為丸如桐子大每服一十三丸先用銀箆一隻冷水一盞將藥和銀箆浸一宿空心温水下忌熱物油膩物孕婦人不可服或自㵼者不可服一方有輕粉一錢五分沉香海金沙丸出衛生家寳治一切積聚痺濕腫脹肚大青筋痩惡症海金沙一錢沉香二錢輕粉一錢牽牛末一兩右為末研獨顆蒜如泥為丸如梧桐子大每服三十丸加至十五丸煎燈草湯通草湯空腹送下更量虛實加减丸數取利為度利藥盪積出危氏方巴豆百粒去皮水洗四十次五靈脂白殭蠶赤茯苓各一兩右為末醋糊為丸如菉豆大每服七丸冷茶清五更初服或欲㵼止冷水洗手面脚三處立住太上清金丹芫花一兩生黒豆一兩生巴豆和皮用五靈脂一兩五錢右四味先杵三味末入巴豆同杵醋麫糊丸黍米大每服三五丸食後各隨病引子下後忌熱食惡心痛酸湯下婦人臍脇刺痛熱醋下酒病酒下飲食隨傷物湯下消積聚温湯下白痢生姜湯下赤白痢甘草湯下枳殻散出十便良方治心下蓄積痞悶或作痛多噫敗卵氣枳殻白术各五錢香附子一兩梹榔三錢右為細末每服二錢米飲調下日服三服不拘時候治脇下邪氣積聚徃来寒熱如温瘧出千金方右用蒸䑕壌土熨之冷即易腹中切痛炒鹽半斤令焦内湯中飲之大吐瘥若手足痛者燒青布内口噐中熏痛處治萬病積聚湯出千金方七八月收蒺藜子不拘多少以水慢煑熟取滓曝乾搗篩蜜丸桐子大酒服七丸以知為度其汁煎如飴服之尋積丸治諸般積氣右用巴豆不拘多少和殻研細黄連生麫等分勻拌一處冷水丸如桐子大却用麥麩地灰用文武火炒令乾将冷水一碗安於側候藥丸炒乾可將一丸於冷水内試以浮在水面為度每五七丸至十丸晚用温熱水送應有積皆取下可自看是何積就此藥以冷水洗了焙乾可服三次又好治痺寒取積丹右用好大黄不拘多少為細末用好醎醋熬成膏子為丸如桐子大每服一百丸加至一百二十丸至日平西喫飯起更前後將細墨研濃好酒送下治男子婦人諸般積氣成聚出本草右黒牽牛子一斤生𢷬末八兩餘滓子新瓦上炒令香熟放冷再𢷬取四兩熟末生末共一十二兩拌勻令錬蜜和丸如梧桐子大患疾氣至重者三五十丸煎陳橘皮生姜湯下臨卧空心服如二更至三更以來藥行時效應未動再與三十丸投之轉下積聚之物常服十丸至十五丸行氣甚妙小兒十五以下至七嵗以上服五丸至七丸年及五十以上不宜服之萬病無憂散治諸般氣積腫脹梹榔五錢大黄一兩甘草二錢半黒牽牛一兩半炒右為末每服三錢茶清調服不拘時候日進二服治乆積冷不下食嘔吐不止冷在胃中出肘后方右用半夏五兩净洗過為末每服三錢白麺一兩以水和搜切作碁子水煑麺熟為度用生姜醋調和服之治結氣冷癥積在脇下及脚氣上入小腹腹中脹滿冷氣痃癖羸痩出千金方右大蒜去皮心三升𢷬令極熟以水三升和調絞取汁更𢷬餘滓令熟以水三升和調絞取汁更𢷬餘滓以水三升和令調熟取汁合九升所得滓可桃顆大乗熱却以微火煎取三升下牛乳三升合煎取三升旦起空腹温服一頓令盡至申時食三日服一劑三十日服十劑萬金丸出危氏方治諸般食積氣積血氣蠱脹之類如治蠱脹加香附子末湯調三錢吞下此藥治腫尤快趙神服救母已驗方右石菖蒲去根用剉如米大半斤重班猫蟲半斤重去足趄同菖蒲火炒不可燒了如菖蒲黄色提起揀去班猫蟲小布袋盛起菖蒲兩人牽扯布袋去盡班猫屑止將菖蒲研為細末用米醋煑糊為丸如梧桐子大每服三十丸隨意加减用温酒或熟水不拘時候治積聚疼痛每日早晨服香油四兩帶鬚䓤白三莖神效紫金丹右半夜子時得一夢夢中𫝊得仙方硼砂輕粉最為良雄黄甘漆信豆用粉霜七味一錢停分兩三錢黄蠟粧爛研硃砂做衣裳每服單一粒送用米飲湯不問男子共婆娘多年沉病積取了大安康香稜丸出濟生方治五積破痰癖消癓塊及冷熱積聚木香不見火丁香各半兩京三稜細剉酒浸一宿枳殻去穰麸炒蓬莪术細剉一兩用去殻巴豆三十粒同炒巴豆黄色去巴豆不用青皮去白川練子剉炒茴香炒右等分為細末醋煑麺糊為丸如梧桐子大以硃砂研細為衣每服二十丸炒生姜湯下温酒亦可不拘時候治傷積有滯食嘔酸調心腹氣膨小腹不仁或時溏洩出本事方髙良姜陳皮去白莪术醋煑烏梅生姜甘草乾姜已上各等分右用好紅椒三十粒去子同研為細末每服二錢水一盞姜三片煎至七分温服廣茂潰堅湯出東垣蘭室方治中滿腹脹内有積塊堅硬如石令人作卧不能大小便澁滯上氣喘促面色痿黄通身虛腫厚朴黄芩益智仁草豆䓻當歸各五錢黄連六錢半夏七錢廣茂紅花吳茱茰各二錢生甘草澤㵼升麻神麯青皮陳皮各三錢柴胡三錢渇者加乾葛根四錢右㕮咀都作一服水二盞浸少時煎至一時去滓温服食前忌酒麺二服之後中滿减半祗有積塊未潰再服半夏厚朴湯半夏厚朴湯出東垣蘭室方厚朴八分半夏一錢吳茱茰一錢肉桂三錢桃仁七箇紅花蘓木京三稜四分蒼术草豆蔲白茯苓各三分澤㵼三分猪苓四分乾生姜一分柴胡三分升麻四分木香二分青皮二分橘皮三分生黄芩三分黄連一分生甘草三分昆布少許炒麹六分當歸尾四分如渇者加葛根三分右拌剉如麻豆大旋稱都作一服水先拌藥次用水三盞煎至一盞去滓稍熱服之忌如前服此藥二服之後前症三减半即於前藥中加减服之厚朴半錢黄芩二分黄連一分炙甘草五分呉茱茰一分益智二分縮砂仁一分草豆蔲仁三分半夏四錢廣茂三分當歸梢一分紅花少許右剉如麻豆大煎法如常忌苦藥泄便又忌鷄魚兔肉并鹽物房事軟金丸取一切虛中積滯兩脇有塊寒熱往來治危疾皆驗諸藥既為蠟櫃已無狼虎之性專攻病而已粉霜輕粉硼砂蜜陀僧砒霜各一錢雄黄烏魚骨白丁香即雀糞也黄鷹條即鷹糞也巴豆仁二兩去膜研細右件藥一處研為細末黄蠟一兩鎔和為膏旋丸如小豆大每二丸食後臨卧冷水浸一時辰即用水下醫者夏巡所傳每用以為神藥木香三稜丸出聖惠方治積聚氣塊木香半兩京三稜一兩莞花一兩乾漆半兩川大黄一兩青橘皮半兩湯浸去白穣焙右件藥搗碎以醋二斤慢火煎令醋盡焙乾為末以醋煑麺糊和為丸如菉豆大每服空心生姜湯下十五丸加至二十丸六神丹治男子婦人逺年近日飲酒過度結成痞塊噫醋吞酸肚腹膨脹疼痛諸般積病巴豆去皮油膜蓬术青皮陳皮白姜炮黄連各一兩右為細末醋糊為丸如梧桐子大每服十丸至十五丸姜塩湯送下或米飲茶湯亦可面色痿黄已患傷寒不痊者用藥二錢茶二錢生姜三片葱白一根水一盞半煎至一盞吞下六神丹用被盖岀汗宣三五行温粥補痺寒亦治婦人血氣病兩脇痛用紅花酒下十丸男子冷氣或兩肋刺痛炒茴香酒下十丸冷㵼酸醋湯下十丸熱㵼冷水送下十丸瘕聚積滯隨意斟酌加减服之五積丸大黄三錢黄栢三錢梹榔七箇山豆一兩半去皮蛤粉三錢雷丸三錢右為細末醋麺糊為丸如桐子大每服二十丸温水送下趂痛散仁存方治神氣不守正位為七情忤氣聚涎結結積堅牢有坯塊心腹絞痛時發時止發則欲死蓬术桂心各一兩梹榔半兩附子炮細辛各半兩芫花炒為末二錢半右除芫花外一處為末每服三錢水一盞煎至七分去滓調莞花末一字匕温服青木香丸出徳生堂方寛中利膈行滯氣消飲食治胷膈噎塞腹脹心下堅痞膓中水聲嘔噦痰逆不思飲食補骨脂炒香蓽澄茄梹榔酸粟米飯裹濕紙包火中煨令紙焦去飯各四十兩黒牽牛二百四十粒炒香别搗末一百二十粒木香二十兩右為細末入牽牛末令勻漸入清水和丸如菉豆大每服二十丸茶湯熱水任下酒食後可服五丸或七丸小兒一嵗服一丸懐妊婦人忌服水煑桃花丸出儒門事親書黒牽牛頭末半兩苽蒂末二兩雄黄一錢水飛過用之乾胭脂右以雄黄水調麺為丸以水煑令浮熟取出冷水㧞過麝香湯下硫黄丸出聖恵方治積聚氣多年不消變成癆症腹内結塊疼痛脹滿常吐清水食飲不下硫黄半兩細研硼砂半兩不夾石者細研木香半兩為末巴豆去皮四十九粒取蘿蔔一枚四破開鑽四十九竅各納巴豆一枚依舊合之藏在土坑中深一尺四十九日後取去巴豆研如膏壓去油再入噐中研右件藥取蘿蔔一枚剜作坑子内硫黄硼砂却以蘿蔔盖頭用紙重裹以好黄泥固封曝用大火煅令通赤候冷去泥取出藥研蘿蔔一時細研入前木香末及研了巴豆令勻以醋煑麺糊為丸如菉豆大每服空心温酒下五丸晩食前再服以利為度知命丹出醫學切問治虛損撮痛下痢烏頭去皮臍三錢半黄丹五錢炒巴豆三枚去皮膜不用油右同研麺糊為丸如麻子大米飲下三丸立效如㵼下丸子來不化即病不療磨積丸出衛生家寳一名脾疾丸治茶傷飲食减少面黄腹痛及百物所傷常服消滯氣陳倉米半升用巴豆七粒去殻同米炒令赤色去巴豆不用青皮去穰炒陳橘紅各二兩右為末好醋糊為丸如豌豆大每服二十丸食後用淡姜湯下神明度命丹出千金方治乆患腹内積聚大小便不通氣上搶心腹中脹滿逆害飲食大黄芍藥各二兩右為末如梧桐子大温水服四丸日三不知可加至六七丸以知為度炒粉丸出仁存方治積聚涎塊結於心腹之間致令心腹刺疼日乆不愈或乾嘔减食蚌粉一兩巴豆七粒去殻及膜右同炒令赤色去巴豆不用只以醋丸蚌粉如梧桐子大丈夫臍腹痛炒茴香酒吞下二十丸婦人血氣炒姜湯下敗血衝心童便和當歸酒服常服姜酒下治酒食積水病石榴䨇用又連枝三稜巴豆五靈脂瞿麥杏仁車前子大㦸芫花甘遂宜右醋糊丸七丸為止五香蠲痛丸出百一選方治冷物傷脾胃并酒食傷乆積成癖胷膈痞塞心腹疼痛不可忍者服之立效有傷滯臟腑不過一行無傷滯臟腑不動丁香藿香木香乳香沉香桂心吳茱茰青皮蓬莪术枳殻去白麫炒京三稜各一兩硼砂四錢一用牽牛末三兩橘皮一兩去白同巴豆五錢去皮炒令黄色去巴豆不用右為細末麺糊為丸如菉豆大每服二十丸至三十丸熟水送下一方用枳實不用枳殻大蒜煎出千金方治疝癖積聚冷癖痰飲心腹脹滿上氣咳𠻳及風癲偏風半身不遂腰疼膝冷氣息痞塞百病蒜六斤四兩去皮切水斗煑取水去滓酥一斤入蒜汁用牛乳三斤蓽撥胡椒乾姜各三兩阿魏戎鹽各二兩石石菖蒲木香各一兩乾蒲桃四兩右為末合入蒜汁中以銅器微火煎取一斗空心服酒下一兩五日以後稍加至三兩二十日覺四體安和更加至六兩此治一切冷氣甚良丁香丸出楊氏博濟方治停滯不消胷膈痞滿心腹疼痛嘔逆常服磨積破塊消酒食毒丁香木香五靈脂去沙京三稜煨蓬莪茂炮茴香以上六味各半兩乾漆三錢炒烟出胡椒四錢梹榔二枚青橘皮去白陳橘皮去白各一兩巴豆春夏四十粒秋冬一百粒去殻將二橘皮同巴豆炒令巴豆黑色不用巴豆右件為細末用硼砂二錢酒浸去沙石入醋一盞麺一兩煑糊為丸如桐子大朱砂麝香為衣每服二丸至九丸生姜湯下或温酒送下解毒梹榔丸治心火有餘腎水不足洪範曰火曰炎上水曰潤下當心火有餘腎水不足乃陽實隂虛此藥抑上奉下心火自降腎水昇上實下虛之人常患也此藥壯陽筋骨添髓起陽道益子精益夀内經曰諸濕痓滿皆屬脾土此藥流濕潤燥推陳致新滋隂陽散欝結活氣通血能治男婦嘔吐酸水痰涎不利大便膿血閉澁風壅精熱口苦煩燥涕唾稠咳嗽血溺血崩腹脹氣滿手足痿弱四肢無力面色痿黄又治酒疸食黄宿食不消口苦生瘡骨蒸肺痿寒熱徃來􅂒疾腸風痔漏發痛消痒癓瘕血積成塊硬積諸惡瘡疔瘇背疔疽瘡急宜多服速利三五行為妙四方人不服水土傷寒結胷以利為度婦人赤白帯下血崩漏不止血胎艱難調血脉每服五十丸温水隨意服之梹榔黄連青皮陳皮去白木香沉香巴㦸酒浸去心當歸廣茂火炮枳殻炮去穰香附子炒甘草去皮炙大黄以上各一兩黄柏三兩牽牛頭末四兩右為細末滴水為丸如桐子大每服三十丸或四十丸五十丸生姜湯下温酒亦可服食後食前量病上下十寳大安散一名萬病無憂散治男子婦人老幼年深日乆一切沉疾積氣塊十種水氣血氣下部小腸偏墜木腎乾濕脚氣十隔五噎畨胃嘔吐食心氣脾疼喘急痰飲咳嗽肺脹吐血鼻衂五淋白癩大風瘡癬腰腿疼痛五種消渇二十四種痔漏腸風下血三十六種風七十二般氣丹毒赤腫紫血癜風癱疸癤毒左右癱赤白㵼痢寒熱瘧疾隂陽二毒山嵐瘴氣婦人赤帯下經脉不調崩中漏下小兒疳氣癲癎亦皆治之須依四季加减修合大黄春冬一斤夏半斤秋十二兩甘草春冬六兩夏三兩秋四兩牽牛春冬十二兩生夏八兩半生秋八兩梹榔春冬十二兩夏八兩秋六兩右藥每一斤用木香半兩夏加南木香秋加天花粉為細末每服三錢重五更雞初鳴時用冷水調下加黄茋蜜炙七次陳皮去白胡椒生蓬莪炮三稜炮自然有㵼有補其藥須在五更初用冷水調下則病根隨大便取下或赤黄白青黒如爛魚腸或小便中取下或黄或白如米泔或是寸白疳痐􅂒蟲血癆蟲形如蜈蚣如蠶如蜣螂又如肉塊如馬尾如亂絲如猴猻如小蛇狀不拘四季服此藥又無諸毒惡百無所忌但娠婦不可服必五更初服者盖人一日受用飲食諸物至子時宿食皆消此時服藥故速見效或㵼二三次或五七次更不必補藥一兩服其㵼自住十五歲以下只作一服十五歲以上作二服小兒隨意加减又方牽牛木香赤土生貫仲鶴虱各一兩大黄紙裹煨大腹子梹榔生雷丸生各三兩甘草二兩右為末每服二錢五更用冷水調下清茶亦可服治百病保安丸出楊氏博濟方治男子婦人一切酒食所傷取積滯行冷氣巴豆半斤去皮心研紙裹去了油入衆藥同研黄連一兩去毛炒紫色青橘去白一兩炒轉色蓬莪茂一兩剉了炒紫色乾姜一兩炮烈去皮切再炒少時右四味為細末入前巴豆同研令勻以米醋糊為丸如麻子大用硃砂衣常服白湯下二丸大人三丸霍亂吐㵼用煨生姜湯下五丸小兒三丸心氣痛醋湯下三丸白痢乾姜湯下赤痢甘草湯下五丸小兒一丸至二丸服如踈轉即多服之丁香煑散出入宜方治脾胃伏冷吞酸嘔逆積飲聚痰丁香乾姜紅豆青皮陳皮製甘草川烏良姜各四兩胡椒二兩益智仁一兩右㕮咀薑鹽水煎小七香丸治茶酒食積吐酒酸心丁香香附子甘草各十二兩莪术砂仁各二兩甘松八兩益智仁六兩右為末糊為丸菉豆大每服三十丸温酒姜湯下内加烏藥藿香陳皮麥芽肉桂名大七香丸以蜜丸如彈子大姜湯嚼下如酒積酒下茶積茶下食積丁香良姜湯下三稜丸治積年五臟氣塊積滯京三稜石三稜二味醋浸一宿切片醋熬成膏鷄爪三稜炮青橘去白厚朴去皮姜汁塗炙硼砂飛過熬成膏巴豆出油去皮上各半兩梹榔二箇生用一箇炮一箇肉豆蔲一箇去殻木香一錢乾漆一錢炒右件十一味為末入于膏子内和勻杵一千下丸如菉豆大每服五丸如呃氣茴香湯下臍下氣塊神麯湯下心膈氣良姜下左脇塊柴胡湯下右脇塊木香湯下血氣當歸湯下血氣痛赤芍湯下萬病丸出醫學切問方破一切積散一切氣蠱血氣結塊冷痛癥瘕積聚心氣脾疼食積酒積肉積胃冷吐食氣膈噎塞不通遍身浮瘇氣急痰壅婦人血氣不行腹肚疼痛年深日乆並皆治之硼砂阿魏醋研去土大黄吳茱茰去皮青礞石研細末用縮砂拌和鍋内炒取净肉桂木香𤣥胡蘓五靈脂酒淘净小茴香炒川山甲蛤粉炒乳香沒藥當歸石菖蒲皂角去皮弦乾漆炒烟盡梹榔陳皮去白枳殻京三稜煨丁香莪术煨良姜炒甘遂元花醋炒大㦸雄黄各半兩巴豆去皮油膜二錢半右為細末醋煑麵糊為丸每三十丸空心生姜湯下利行白粥補之更量虛實加减丸數八仙丹出醫學切問治一切積氣京三稜煨五靈脂酒浸淘去土杏仁去皮尖另研巴豆去油膜右各等分為末用豆淋為丸如桐子大每服七丸空心温水下看病大小加减丸數活人書名黒神丸治傷寒食積三稜丸出醫學切問方治五積六聚七癥八瘕破一切血下一切氣大黄煨硼砂三稜煨熟切乾漆炒烟盡巴豆去皮油各一兩右為末醋煑糊為丸如菉豆大每服三丸或五丸七丸量人虛實加减服空心米湯下三倍丸出醫學切問方取積巴豆一兩蛤粉二兩黄柏三兩右為細末滴水為丸每服五丸如桐子大井水下剪紅丸出醫學切問方追蟲取積追五臟不損六腑逺年近日諸般蟲積食不消婦人赤白帯下痢疾並皆治之梹榔六錢白牽牛十二兩取頭末蕪荑六兩雷丸五兩巴豆一兩取霜土硃砂右為細末滴水為丸硃砂為衣如桐子大每服一丸蜜水送下取下病疾為驗白粥補之如聖丸出醫學切問方治男子婦人飲食所傷結成積塊痞痛陳皮乾姜各三錢巴豆一錢甘草一錢三稜莪术芫花三味各半兩加醋一升煑耗大半取焙乾右為末和勻餘醋煑糊為丸菉豆大每服六七丸淡姜湯下薑合丸出楊氏博濟方治中脘積聚痰氣胷膈結痞欲成翻胃木香附子炮肉桂硼砂紙上飛過丁香沉香蓽澄茄製青皮净陳皮各半兩茴香二錢半炒右為細末入硼砂和勻酒煑麵糊為丸每兩作匀二十丸每一丸生姜一塊剜入合子安藥在内濕紙裹煨令香去紙放温細嚼鹽湯下枳殻丸出海岱居士方磨積散聚劑料治積聚身黄無力神暈困倦則發潮熱嗜卧枳殻三兩去穰麸炒當歸一兩半夏四兩廣茂京三稜各二兩炮益智仁二兩𤣥胡二兩縮砂仁四兩青皮二兩黒牽牛頭末十兩木香一兩雷丸二兩右為細末生姜汁打糊為丸每服四五十丸生姜湯食後送下牛黄利膈丸出海岱居士方治新乆積聚胷脇脹滿等症大黄黒牽牛頭末各四兩甘遂半兩芒硝三兩右為細末滴水為丸如桐子大每服八十丸温水食前送下量虛實加减或五六十丸亦可寸金塌氣丸出鮑氏方治一切積聚一切氣癥小腸風氣膀胱氣横梁氣走注氣心脾氣血氣脇氣氣塊癥瘕蠱毒宿食積飲結胷中傷寒夾食傷寒風漏氣通經産孕不可服氣虛人量與陳皮一兩香附子一兩大黄煨木香青蒙石煅各半兩斑蝥用身三兩白丁香尾起者半兩青娘子用身一錢䖟蟲用身二錢京墨燒烟盡三錢麝香一錢三稜半兩蓬术半兩巴豆和殻捶碎一兩炒乾漆炒烟盡半兩乾姜一兩梹榔五箇芫花醋浸焙乾三錢水蛭炒治氣塊他不用右末醋糊為丸皂角子大每服一丸㵼三行自止醋湯嚼下臟虚人勿服二香丸出直指方治積滯氣秘心腹刺疼中滿壅嗽南木香丁香青皮浸去白晒橘紅草菓仁肉豆蔲生白豆蔲仁五靈脂香潤者另研各半兩蓬术炮煉熟碎碾縮砂仁各七錢右細末用川巴豆肉半兩研如泥漸入藥末硏和稀白麵糊丸麻子大候乾每服三丸加至五丸七丸止姜湯送下壅嗽紫蘓生姜煎湯下三稜散出直指方治酒食傷積京三稜炮蓬莪术炮益智仁甘草炙青皮去白各二兩白茯苓四兩右末每服二錢少鹽煎吞感應丸治傷寒泄㵼俟酸臭出盡即服固腸散止之回生丹治一切積聚乳香光明硼砂釡煤沒藥與乳香同作細塊火上燒放于通風處吹水銀礞石輕粉以上各一錢巴豆十四粒去殻并心膜出油五分右同研不見水銀蒸棗肉丸如桐子大硃砂為衣晒乾入乾姜末内收臨時用針鑽一眼别以生姜三片葱白二寸皂角一寸不搥破三味同煎湯放冷入醋少許吞下一粒五更初不效以熱粥投之此藥取臍腹上下左右脇下心下乆積三五十年氣塊食塊血塊大如盞碗或如數箇毬子取下惡物為效别以和氣藥補之礞石散治一切積不問虛實冷熱酒食逺年日乆無所不療青礞石二兩研滑石一兩研青黛五錢輕粉二錢右同碾勻每服一錢麵湯調下急以水漱口未服藥前一日先喫淡粥至晩服藥候次日晩未動再服半錢取下惡物更以湯粥將息三兩日如是無積藥隨大便下並無所損忌次日將息蠟丸治一切年深日近積毒巴豆一百二十粒去皮并心膜研細膩粉一兩金箔十片研硃砂二錢研黄蠟半兩右鎔黄蠟丸如桐子大房色傷風腎臟風逺年日近積滯氣塊癆病水氣同用膩粉半錢先置喉中次以藥三丸用温米飲吞下急以水漱口恐膩粉損齒如傷毒藥用生姜酒下一丸病淺者一宿二三十年者三五日方取下如取下復收其藥洗而再服尤佳如體弱服之即進飲食倍常如意丸治積化氣黄連青皮川烏枳殻巴豆十粒去殻油心膜盡乾姜蓬莪茂陳皮各一兩右為細末煑薄糊為丸如菉豆大常服三五丸茶清下食後夜卧服孕婦不可服婦人血氣艾醋湯下黄腫淡姜湯下臟腑不快茶清送下冷食傷生姜湯下小腸氣炒茴香酒下小兒疳飯湯下一兩丸酒積炒姜酒下三稜湯和脾胃消積滯快膈化痰進食亦治心腹暴疼京三稜四兩蓬莪茂四兩二味先洗過水五升煑半日取出切片子焙乾益智仁二兩青皮半兩湯浸去穰焙乾秤甘草二兩炙陳皮湯浸去白穰焙乾秤半兩右為末每服三錢入鹽㸃服或用水一盞姜三片棗一枚煎至七分服乾柿丸取虛實積下膈甚妙乾姜炮為末硃砂研為衣沒藥研猪牙皂角去皮弦子為細末三稜炮為末乾漆搥碎炒烟盡為末以上各一錢七水銀一錢結沙子輕粉二錢青礞石為末一錢巴豆二十粒去皮膜煑沸研右件研各勻軟飯和為丸如菉豆大煎柿蒂湯冷下三五丸加减用婦人有胎不可服磨三稜丸治逺年近日諸般積聚痃癖積聚或氣塊酒積諸般所傷無問男女老幼並宜服之常服飲食木香半兩京三稜炮石三稜鷄爪三稜各等分􅒦砂黒牽牛半兩白牽牛半兩二味半生半熟用乾漆三錢炒烟盡香附子炒三錢麥蘖半兩炒陳皮三錢去白青皮二錢去白廣茂半兩杏仁半兩麸炒枳殻半兩麸炒葛根三錢梹榔二錢丁香二錢官桂二錢半右為細末好醋麵糊為丸如桐子大每服二十丸生姜湯送下食後日二服病大者四十日消温水服藥亦得聖散子治逺年積塊及治婦人乾血氣硼砂八兩川大黄八兩麥蘖六兩乾漆三兩炒以烟盡為度萹蓄一兩瞿麥一兩梹榔一兩茴香一兩炒右為細末每服五錢温酒調下仰卧此藥只在心頭至明大便如爛魚腸小便赤為驗藥無毒有神效小兒用一錢十五以上五錢或七錢空心服之更效醋煑三稜丸治一切積聚不論逺年近日皆治之如神京三稜四兩醋煑令竹箆子刺透軟切作片子曬乾川芎二兩醋煑微軟切作片子大黄半兩醋濕紙裹火煨過右三味同為末水煑和為丸如桐子大每服三十丸温水送下不拘時候病甚者一月效輕者半月效化滯丸出家藏經驗方治脾肺氣滯水飲停積膈痺口滿咳嗽涎壅嘔吐頭昏飲食不下或痰痞氣膈隂陽不通併厥口噤昏黙不省人事狀似中風使以此藥服之則蘓或吞藥不得者即碎和湯灌之下咽即醒此藥應是因恚怒氣逆飲食湯水停聚胷膈成病以致十膈五噎翻胃嘔吐飲食不下者服之無不效驗常服寛中化痰快美飲食消化停滯不犯胃氣神效京三稜蓬莪术桔梗大黄陳橘皮以上各一兩用温湯洗過半夏一箇破作二片白术一兩與前件並剉如皂角子大旋覆花一兩鱉甲去裙二兩作四片葶藶子一兩半淘净生絹袋盛之紫蘓葉一兩木香三兩懐乾沉香半兩剉細生用麥蘖一兩微炒梹榔半兩生用舶上茴香半兩水淘去土乾秤硼砂一兩半細研剉用瓷器内入前藥内用米醋三升浸重湯煮取二斤半右用煑藥作一處焙羅和入生藥除木香沉香麥蘖茴香梹榔不入醋煑右用煑藥作一處焙羅搗為細末用煑藥醋調麵糊煑搜和入石臼中多杵丸如梧桐子大每服二十丸温熟水下婦人血氣心痛炒姜醋湯下湖廣總餉林元禮云此方乃其鄉里名醫常用取效秘而不𫝊後董参預體仁與咸年而亦得林亦珍重慨然𫝊真有竒效天南星丸出家藏經驗方去酒積酒毒天南星一斤端正者净洗先於平實地上掘窟闊五寸深一寸取土用剛炭於窟中簇煆過半除火去灰令净以煑酒一升澆之將天南星於其中覆以瓦盆用所掘土泥封盆縫勿令透氣一宿來早取出用酒并水各二升和洗净切作片子焙乾研為細末入水飛辰砂一兩姜糊為丸桐子大以水飛辰砂一兩為衣每服五十丸至百丸生姜湯下不拘時候先公記前軰云宣和間一朝士作殿試官時蔡攸為大試官入赴内宴成夜時出歸幕次衆官迎揖蔡指喉以示謂酒至此就坐索天南星丸執事者供一藥唵其色紅姜湯送下假寐少頃即醒然遂趂朝班衆官但神其藥而不敢請其方紹興間先公守贑倅車鄭顯中其子困酒致疾統軍中輔逹云正好服天南星丸遂叩之口𫝊其法得之吕丞相余在侍側親聞之亦曽修合而服果有竒效厚朴丸出朱氏集驗方寛中進食推化積聚厚朴四兩去浮皮用生薑自然汁炙焦黄蒼术一兩米泔水浸洗晒乾切片畧炒莪术二兩濕紙褁煨去皮切片青皮二兩洗去瓤晒乾剉細畧炒陳皮二兩去瓤洗晒乾剉細畧炒當歸一兩去蘆洗净晒乾京三稜二兩去蘆切片白芷二兩切片以上老醋浸七日春夏浸五日取出焙乾研為細末入后藥中禹餘糧火煨醋碎九次為細末用水飛過再入乾鍋内火煆通紅净秤二兩再碎針砂二兩净洗用醋浸一宿煑乾研極净秤右二味同前藥末入醋煑麵糊搜和為丸如桐子大候乾每七八十丸至百丸陳米飲送下食前金草丹出王氏博濟方消磨積聚下酒食毒及取虛中積滯舶上硫黄一分研細顆塊硃砂一分研細末香末一錢半水銀膩粉二錢川大黄三錢畧慢火中煨熟搗碎秤用之巴豆十粒或十二粒去皮出心細硏如粉右同乳鉢内研二三百遍如粉細入酒浸蒸餅為丸如菉豆大療諸病以生姜湯橘皮湯下三五丸酒食傷飽二三丸湯茶下黒丸子出朱氏集驗方治長幼積滯烏梅二箇去核焙乾生半夏大者五箇杏仁五粒去皮尖麸炒巴豆二十粒去油存性右為細末姜汁煑糊為丸菉豆大姜汁下二十丸遇仙丹出朱氏集驗方去一切積滯陳皮去白良姜吳茱茰洗石菖蒲半夏湯泡七次白姜五靈脂胡椒各半兩斑蝥二十一箇去趐足同糯米同色巴豆炒巴豆二十一箇去殻同班猫炒右為細末醋為丸如菉豆大熟水下或姜湯下每服十丸馬家五積丸出朱氏集驗方治諸積聚􅒦砂仁巴豆黒牽牛蘿蔔子赤小豆丁香以上各一兩同炒令香透不可焦青皮陳皮香附子乾漆京三稜大㦸桔梗枳殻以上各一兩剉大塊慢火炒令黒紫色右件共為細末如碾時餘得藥頭再炒令黒色再碾為末以好醋麺糊為丸如菉豆大無時候淡姜湯下三稜丸出朱氏集驗方化積氣去來五榖麺食等積陳倉米一兩巴豆新者五粒去殻同倉米慢火炒巴豆焦色去巴豆不用陳皮半夏曲半兩縮砂仁麥蘖各二錢南木香一錢右用神曲糊為丸菉豆大每服二十丸食後姜湯下食藥三稜丸出朱氏集驗方化飲食積聚陳倉米四兩揀净以新好色巴豆二十一粒剥去殻慢火同炒候米香熟黄色巴豆黒色去巴豆橘紅四兩去白烏梅肉半兩炒乾縮砂仁一兩神曲三兩作末煑糊右四味為末用神曲糊為丸如菉豆大每服二十丸姜湯下破滯氣湯出東垣蘭室方白豆蔲仁橘皮桔梗大腹子白茯苓各半錢縮砂仁各二錢人参各一錢青皮梹榔木香姜黄各二錢白术炙甘草各四分白檀二分藿香葉三分右為細末水一大盞煎至三分去滓稍熱服之治膈中有結聚覺咳不出者右以䔧蘆一兩炙末之巴豆半兩去皮熬之先𢷬巴豆如泥入䔧蘆末又𢷬萬杵木蜜和為丸每服一丸至二三丸如麻子大服之削堅丸出楊氏家藏方治五積六聚氣結成塊食積癖瘕心腹脹滿痩瘁少食鱉甲醋浸二宿去裙闌炒焦醋淬黄色取末秤京三稜剉如半棗大好醋浸二宿焙乾取末秤乾漆搗碎炒令烟出搗細取末秤三味各二兩半沉香半兩乳香二錢半别研梹榔木香乾姜炮沒藥别研肉桂去粗皮細松烟墨燒去膠胡椒蘿蔔子乾蝎微炒去毒硼砂通明者為末用湯内飛以上十味各半兩粉霜二錢别研輕粉二錢五分右件為細末拌勻好醋煑薄糊為丸如小菉豆大每服二十丸淡醋煎生姜湯下日進二服夜一服如未利漸加微利即减小沉香丸出楊氏家藏方治五積氣滯腹滿脹痛吐逆噎塞胷膈痞悶吞醋嘔噦面黄痩羸胃氣弱不能尅化水榖痰飲癖塊發歇疼痛不思飲食青橘皮去白陳橘皮􅒦砂仁木香京三稜炮蓬莪茂炮以上五味各半兩丁香皮六錢烏梅去核焙乾二兩巴豆二十枚不去皮炮硼砂别研肉桂去粗皮二味各一分右件為細末麫糊為丸如菉豆大每服十五丸姜湯下食後服萬金丸出王氏博濟方治積滯順三焦利胷膈定氣刺攻痊脇腹脹痛女人血氣小兒夜啼多涎并宜服舶上硫黄一分巴豆去皮秤半兩二味同以生絹袋子盛於水内用文武火煑一沸時放冷别硏令細柴胡半兩去苖附子一分炮姜乾半兩桔梗一分青黛半兩當歸一分陳皮去白一分右為末以麫糊為丸如小豆大每服二丸至三丸温水下血氣醋湯下小兒夜啼温水下一丸水㵼生熟水下白痢地榆湯下赤痢乾姜湯下化涎生姜湯下一切氣生姜橘皮湯下阿魏丸出濟生方治積氣肉積心腹膨脹結塊疼痛或引脇肋疼痛連背膂不思飲食木香不見火梹榔各半兩胡椒阿魏用醋化開旋入各二錢半右為末用阿魏膏子并粟米飲杵和為丸如桐子大每服四十丸不拘時候用生姜橘皮湯下曽異庵剪紅丸出永類鈴方史君子一兩雷丸一兩半梹榔各半兩黒牽牛八錢木香半兩青皮一兩半天花粉五錢草烏二兩半炮香附子三稜炮各一兩右為末皂角熬膏為丸菉豆大每服三十丸空心冷茶下又方雷丸一兩梹榔四兩大腹子半斤黒牽牛一斤莪术三稜各一兩皂角三斤乾韭根一兩用井花水三升搥碎皂角將汁絹濾過瓦器熬膏入前藥末為丸湯使隨所病宜藥煎湯下導引法養生方云以左足踐右足上除心下積又云病心下積聚端坐正腰向日仰頭徐以口内氣因而咽之三十通而止開目又云左脇正卧伸臂直脚以口内氣鼻吐之週而復始除心下積聚大便又云以左手按右脇舉右手極擎除積下老血又云開口微息正坐向王氣張鼻取氣臭置臍下小口微出十二通氣以除積聚低頭不息十二通以消食飲令人輕强行之冬月令人不寒又云端坐正腰直上展兩脇仰兩手掌以鼻内氣閉之自急七息名曰蜀王橋除脇下積聚又云向辰去枕正偃卧伸臂腹瞑目閉口不息極張腹兩足再息頃間吸腹仰兩足倍拳欲自微定復為春三夏五秋七冬九蕩滌五臟津潤六腑所病皆愈腹有病積聚者張吸其腹熱乃止癥癖散破即愈矣普濟方卷一百六十九
