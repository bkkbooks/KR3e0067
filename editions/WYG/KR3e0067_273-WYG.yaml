body:
  text: 普濟方卷二百七十三明周王朱橚撰諸瘡腫門諸疔瘡附論夫禀形之類湏存攝養將息失度百病萌生故四時代謝隂陽遞興此二氣更相擊怒當是時也必有暴氣夫暴氣者毎嵗之中必有卒然大風大霧大寒大熱若不及避人或遇之此皆入人四體頓拆皮膚流注經脉遂使腠理壅隔榮衞澁滯隂陽之氣不得宣泄變成癰疽疔毒惡瘡諸腫至於疔腫若不預治人死不逮及至著急乃欲求方其人已入木矣所以養生之士湏早識此方凡是瘡痍無所逃矣凡療疔腫皆刺中心至痛又針四邉十餘下令血出去血敷藥藥氣得入針孔中住若不逹瘡内療不得力又其腫好著中頬邉舌上晃赤黒如珠子碜痛應心是也是秋冬寒毒久結皮中變作此疾不即療之日夜根長流入諸脉数道如箭入身捉人不得動揺若不慎口味房室死不旋踵一曰麻子疔其狀肉上起頭大如黍米色稍黒靣邉微赤多癢忌食麻子及衣布并入麻油中行二曰石疔其狀皮肉相連色烏黒如黒豆甚硬刺之不入肉内隂陽微疼忌瓦礫磚石之屬三曰雄疔其狀皰黒頭黶四畔仰瘡皰漿起有水出色黄大如錢孔形髙忌房事四曰雌疔其狀瘡頭稍黄向裏壓亦似灸瘡四畔皰漿起心凹色赤大如錢孔忌房事五曰火疔其状如湯火燒灼瘡黒壓四邉有皰漿起如赤粟米忌火灼爍六曰爛疔其状色稍黒有白瘢瘡中潰潰則有膿水流出瘡形大小如匙靣忌沸熱食爛臭物七曰三十六疔其狀頭黒浮起形如黒豆四畔起大赤色今日生一明日二後日三乃至十若滿三十六藥所不能治如未滿三十六者可治俗名黒皰忌嗔怒蓄積愁恨八曰蛇眼疔其状瘡頭黒皮上浮生形如小豆状似蛇眼大體硬忌惡眼㸔并嫉妬人見之及毒藥九曰塩膚疔其大如匙靣四畔皆赤有黒粟粒起忌食醎物十曰水洗疔其状大如錢形或如錢孔大瘡頭白裏黒黶汁出中硬忌飲漿水水洗渡河十一曰刀䥥疔其狀瘡濶狭如薤葉長大一寸左側肉黒如燒灼忌刺及刀䥥切割針刃所傷可以藥治十二曰浮漚疔其状瘡體曲圓少許不合長而狭如薤葉大肉黄外黒黒處刺不痛肉黄處刺之則痛十三曰牛拘疔其状肉皰起搯不破十四曰紅絲疔其状如紅線初起手足漸漸沿長入腹即死此疔治法最易但於明處仔細尋其紅絲以針挑㫁著小艾炷灸一壮無事十四種瘡初起必先痒後痛先寒後熱熱定則寒多四肢沉重頭痛心驚眼花若大重者則嘔逆嘔逆者難治其麻子疔一種始末為痒所録忌者不得犯觸犯觸者難療其浮漚疔牛拘疔両種無所禁忌縱不療亦不能殺人其状寒熱與諸疔同皆以此方療之若不失欲和犯觸之状但脊强瘡痛極甚不可忍者是也夫疔瘡者以其瘡形如疔盖之状者是也氣客於經絡五臓内藴毒熱初生一頭凹腫痛青黄赤黒無復定色便令煩燥悶亂或憎寒頭痛嘔吐心逆以針刺瘡不痛無血是其候也其候本因甘肥過度不慎房酒以邪毒蓄結遂生疔瘡内經曰膏粱之實足生疔瘡此之謂也其治之法急於艾炷灸之若不覺痛者針疔四邉皆令血出以靣瘡鋌子從針孔絍之上用膏藥貼之仍服五香連翹湯漏蘆湯等踈下之為効若或針之不痛無血者以燒猛火鐡針通赤於瘡上烙之令如焦炭取痛為効亦絍前鋌子用膏藥貼之經一二日膿潰根出服托裏湯散依常療之以取平復若針不痛其人眼黒或見火光者不可治也此邪毒之氣入臓腑故也養生方云人汗入食肉食之則生疔瘡不可不慎也疔腫者由風邪毒氣入於䏎肉所生也凡有十種一者瘡頭烏而强凹二者瘡頭白而根實三者瘡頭加豆垽色四者瘡似葩紅色五者瘡頭内有黒脉六者瘡頭赤紅而浮虚七者瘡頭葩而黄八者瘡頭全薄九者瘡頭如茱萸十者瘡頭如石榴子亦有初如風􅇙搔破青黄汁出裏有赤黒脉而小腫而有全不令人知忽衣觸手摸著則痛若故取便不處亦有肉突起如魚眼之状赤黒惨痛徹骨九結皆變至爛瘡瘡下深孔如大針穿之状疔瘡含蓄毒氣突出両寸痛痒異常一二日間害人甚速是尤在癰疽之上也内經以白疔發於右鼻赤疔發於舌根黄疔發於口唇黒疔發於耳前青疔發於目下蓋取五色之應五臓各有所屬部位而已然後肩或腰或足發無定處在手足頭靣骨節間者最忌大抵瘡頭黒破如釘四畔帯赤如火盤根突起随變焦黒未㡬腫大而光轉為湿爛孔透肌如大針穿之状外怔心驚頭痛拘急惡寒四肢痛强或寒熱交作頬舌間赤黒㸃㸃如珠若毒入腹心則煩悶嘔逆恍惚癡眠其斃可立待也治法以調心氣為上蓋疔瘡蓄毒壅結於心如茯苓茯神逺志益智蓮子石菖蒲之類佐以川芎當歸皆舒豁心經之劑也心氣清毒自消散外所傅者用銷蝕惡肉軰膽礬緑礬鉛霜斑猫等類以餅藥調和而筆傅之爛其肉而後剪随傅随爛次第剪平却以生髮蛇皮土蜂窠皂荚刺各燒留性白芨减半并為細末以平瘡口或銷蝕惡肉軰傅之則疼則以排膿内補散多用酒調以酔之又有一種瘡頭黒深形如魚劑破之黄水渗出四畔浮漿是曰魚劑疔瘡其毒尤甚通前治法即癰疽方中萬疾觧毒丸以清心行血湯使服之以井花水磨傅之實為妙藥諸瘡莫急於疔瘡有魚眼疔多發於足非在手不能治也大凡治疔瘡先以搜頭針當刺之直至患者不知痛處􅅻引針而出血随其流則以蟾酥追毒丹納之針孔中仍以紙燃送下使近痛處其上封以乳香膏四旁腫處傅以烏龍膏或赤暈傅以觧毒散三両日瘡潰㧞去仍覆以乳香膏膿盡生肌並如治癰之法治魚眼疔之法先以針刺之不痛則瘡根已走矣用療漏瘡之法以榆皮随俞冗所徃探之榆皮之所不及處之則針破引榆皮枝而出再自針究尋若針破出病人知痛血出則是活肌肉矣即於針瘡納蟾酥丹覆以乳香膏於正瘡上針孔中納蟾酥丹三兩粒仍覆以乳香膏則其疔瘡之根即回元所潰而愈有絲瘡症乃疔瘡之類醫若不知無治法害人最速其瘡生手足間有泡其中或紫墨色即有一條紅絲迤􅆔向上而生若至心腹則使昏亂不救其絲或有生両條三條者治法以針横截紅絲所至之處刺之止使血出以膏傅之更不發動即愈矣此症得於喜怒不節血氣逆行而生内翰洪舜俞以惡瘡生上久不治稽名内疳瘡初如蓮花痔根􅎞小兒下垂灰火治法以勾刀决㫁其根燒鉄噐内七八分赤烙之以止血次以雄黄輕粉粉霜香白芷白歛為散傅其上令病人側卧以槐枝作枕以支具身間毋便口合一兩個時許瘡瘢定令病者自便治口得膿便漸治之愈若此証息不治即四邉側漸成肌法用槐枝枕枝起病者牙勿使得合以小䥥去􅁖􅁏令盡即撒生肌散止仍用乳香膏䕶之自非飲時且令病人側臥支其牙頬毋使口合則津液不衝動瘡藥三日後肌肉漸生􅅻可病人自便旡所礙矣洪内翰云此証庸醫家不識則旡治法以至不救良可惜也此証得之薄勞氣血􅉵所致方蒼耳膏蒼耳子二合荆芥子二合葵子二合黄蠟十兩木香白狗糞石長生當歸藁本𤣥参丁香黄芩乾馬齒雄黄細研末蝦蟆灰乳香研一兩右細剉以猪脂三斤煎二三十沸濾去滓次下乳香蠟又煎三兩沸候冷入雄黄蝦蟆灰攪勻以瓦噐盛宻封使塗於故帛上日三度換之千金托裏散治一切瘡腫發背疔瘡黄耆一兩半厚朴二兩川芎一兩防風桔梗各二兩白芷一兩連翹二兩芍藥官桂甘草人参各一両木香没藥各三錢乳香二錢當歸五錢右為細末毎服三錢酒一大盞約煎三兩沸和滓溫服諸疔瘡方生髮拔一丸如雞子大攤在一尺緋絹上雄黄一豆許皂荚刺二十一針赤小豆二十一粒右麄末撒放髮上捲熟緋絹作一團外用髪䋲十字縳定熨斗内烈火燒帯性為末入地骨皮末焙之作兩服空心酒下治疔瘡黄連羗活白殭蠶青皮獨脚菜防風赤芍藥獨活蟬蛻細辛甘草各等分右㕮咀毎服五錢先將一服入澤蘭葉少許薑十錢重同擂爛熱酒和服然後用酒水各半盞薑三片煎服病勢退减後再加大黄少許煎服畧下一兩場湯去餘毒更用白梅蒼耳子研爛貼瘡上㧞去根脚一方無獨脚菜返魂丹治十三種疔瘡朱砂膽礬各一兩半血竭銅緑蝸牛各一兩生用雄黄白礬各二兩枯輕粉没藥蟾酥各五分麝香少許右為末和擣蝸牛蟾酥極爛和藥時旋入藥内為丸如雞頭子大毎服一丸令病人先嚼葱白三寸吐在手心内将藥丸裹于葱白内用熱酒一盞呑下如重車行五里許有汗出即瘥如不能嚼葱爛令研裹藥下曾有一僧貨此藥極有効予合救人累効真妙方也破棺丹治疔黄走徹不止甘草京三稜各三兩山梔子牽牛各二兩地黄連翹銀花牡蠣赤芍當歸各二兩加大黄三兩半右為細末煉蜜為丸如彈子大毎服一丸用童子小便化開服之食前忌酒生硬物紫金膏治疔瘡龍腦輕粉膽礬各二錢没藥四錢乳香三錢巴豆蓽麻仁研黄丹石灰蕎麥淋麝少許右為細末熬五七次灰水與蓽麻子仁熬再與金膏藥内托連翹散疔瘡出時皮色不變及不疼痛按揺不動身發寒熱便是此瘡有水魚晴疔紫硯疔諸般疔瘡如瘡黄上用針刺仍服内托散自然消散連翹一兩甘草一兩半大黄七錢薄荷七錢黄芩半兩朴硝二兩白芷赤芍生地各一兩黄梔七錢右為粗末毎服一兩水一碗燈心竹葉煎七分如其人喘加人参少許大病只三四服如服了心煩嘔用不二散佳不二散以細甘草半兩豆粉一兩分作二服酸虀水下神効囘疔膏治諸般疔瘡惡瘡瘤痔桑柴􅀥桞柴谷桿草施風草蕎麥稍各一斤雞糞石灰各四兩五錢右除石灰外俱燒灰用滚水淋汁一二碗熬至半盞用鍋底煤相調成膏如瘡不破将瘡撥破搽之不過三度痊疴如􅆈藥忌婦人雞犬見之并忌諸般惡物聖力散治諸疔瘡腫草烏頭白芨白歛木鱉子金毛狗脊地龍各二錢半麝黄丹少右研為末用針到生肉痛者用藥黄水出為度奪命丹治疔瘡發惡心及諸惡瘡蟾酥半錢朱砂三錢輕粉半分白礬一錢寒水石一錢銅録一錢麝海羊二十個令研即蝸牛也右為細末将海羊令研為泥就藥一處丸如菉豆大如丸不就加好酒成之病輕者一丸二丸重者三丸未効再服服藥法先将生葱白嚼一大口極爛置手心丸藥合以熱酒送下卧汗出為愈立馬囘疔丹治疔瘡走徹不止金脚信蟾酥血竭朱砂輕粉各半錢龍腦麝一分没藥半錢右為細末生草烏頭汁為錠如麥子長大用時将瘡頭刺破将藥一錠放瘡内第二日瘡腫為効走馬赴筵丹治疔瘡没藥乳香硼砂硇砂雄黄輕粉各三錢片腦一分麝少許右為細末蟾酥汁為丸如黄米大毎服一丸用酒送下奪命返魂散治一切疔瘡發寒熱昏悶不語不思飲食并治之大黄連翹山梔子各二錢半巴豆杏仁加牽牛頭末人言五錢用大蒜五個去心填入人言同焼過性為末苦丁香一錢右為細末毎服重者一錢輕者半錢用新汲水調下見効如病重無脉吃下藥一頓飯時吐了藥醫不得治疔瘡蟾酥半錢朱砂三錢輕粉半錢血蝎一錢蝸牛兒一十八個放二三宿如米黄色研枯礬二錢銅録一錢花蘂石五錢右為細末蝸牛令研為泥同藥丸如不就加清酒和丸如菉豆大毎服一丸生葱三五莖嚼入藥内熱酒送下如行五里汗出為效用青金散塗之勿食冷水青金散寒水石二錢枯礬銅緑輕粉人中臼各二錢炒麝蟾酥右為細末不以多少先用竹針刺破四邉貼藥其疔瘡自破立効走馬赴筵丹金信雄黄巴豆輕粉朱砂百草霜各二錢片腦少許麝少許右為細末蟾酥為丸芥子大毎服一二丸入消毒丸三四丸冷水送下六月中伏修合忌雞犬婦人見之消毒丸白丁香二錢黄丹一錢巴豆一錢右為細末水打麺糊為丸如蘿白子大毎三四丸入赴筵丹二三丸冷水送下飛龍奪命丹天南星半夏巴豆去皮心各一錢硇砂信黄丹乳香班猫十六個去翅足麝少右為細末用五月五日蟾酥和合為丸如黄米粒大毎服三五丸或七丸或九丸随人虚實加减以無灰酒送下瘡在上者食後在下者食前服加瘡大者加丸服藥後忌熱食熱湯冷水一二時辰其瘡并不犯刀後疔自出旡事忌油膩葷腥􅊜麺五七日服藥後覺瘡痛皮膚紅是藥之効也如患者昏潰牙関𦂳者斡開口灌可治服藥後飲凉酒数口藥疾行也丁香散治疔腫等瘡丁香七枚緋帛曲頭棘刺臘月大豆黄各一兩母猪屎八分塩一分亂髮一團蒼耳子五錢右将七味以緋帛裹於熨斗内火焼令研為散毎服二錢七空心酒下盖取汗若旡汗任飲酒以汗為度奪命丹治疔瘡毒氣向裏邪氣入内水食不下并皆治之兼治癰疽大有神効朱砂膽礬真血蝎銅録各一錢枯白礬二錢䧺黄三錢蟾酥輕粉各半錢右為細末麺糊丸如桐子大毎服一丸先用葱白三寸令病人自嚼碎連藥熱酒送下睡如重車行五里之久汗出或發熱一陣即愈或利為度如病人不能嚼葱擂碎葱白裹藥如前吞服如不省人事斡開口灌之病在上食後服病在下食前服一方用蝸牛一錢生用與蟾酥同搗入囘瘡蟾酥定子出瘡科精要治疔瘡毒氣攻心欲死以針刺其瘡向心行處但覺痛有血氣下定子若累次止心則近皆不痛無血者急針百㑹穴痛有血者下定子若無血以親人熱血代之猶活三四况瘡初發如何治之無不効大抵疔瘡生於四肢及胷背頭頂骨節間惟胷背頭頂最急初生痛痒不常中䧟如丁盖撼之有根状熱惡心是也天南星欵冬花巴豆仁黄丹各一錢獨活半錢白信一錢斑猫去頭足十個右為極細末用新蟾酥和藥如黍米大燃作定子毎遇疔瘡先以針刺其瘡有不知痛者有血出者下定子如覺痛不湏再用若更不知痛再所瘡行處迎奪刺之至有血知痛即止其元瘡亦覺疼痛以膏藥傅之膿出自瘥用定子法度以銀作細筒子一箇約長三寸随針下至瘡痛處後以銀絲於筒内推至痛處天丁散出瘡科精要專治一切疔瘡及惡瘡初生以藥塗之急服托裏内消雄黄一兩香白芷二錢牡丹花蘂二錢牛蒡根採去皮天丁名皂角刺蒼耳菜大力子各半兩右五月五日受氣修合為細末毎用好醋塗紙封之疔瘡上有黒甲者必湏胡桃油浸次塗之自可赤芍藥散出濟生㧞萃方専治一切疔瘡癰疽初覺憎寒疼痛金銀花赤芍藥各半兩大黄七錢半枳實三錢栝蔞大者一個當歸甘草各三錢右為末水酒各半盞煎至一大盞去滓温服不計時候地骨皮散出聖濟總録專治疔腫地骨皮半兩小麥麻子各十粒焼灰緋帛曲頭棘刺半夏炒亂髮一團如雞子大焼灰右研和勻令毎服二錢空心温酒調下至暁再服蒼耳散出聖濟總録凡疔腫塗傅諸藥後如犯觸者蒼耳子二七粒露蜂房一兩棘刺二七緋帛方五寸亂髮青蒿二七莖丹砂一分研别入右将六味剉碎於熨斗内焼灰細研為散入丹砂末和勻毎服二錢空心温酒調下日暁再服保生錠子一名㧞毒膏出神効方専治疔瘡背疽瘰癧一切惡瘡金脚信二錢雄黄三錢輕粉硇砂三錢麝一錢半巴豆四十九個另研文武泡用尤妙右為細末用黄蠟五錢鎔開将藥和成錠子冷水浸一時取出旋丸揑作餅子如錢眼大将瘡頂撥開毎用㸃一餅次用神聖膏藥後服十五味千金托裏散若瘡氣入腹危者服破棺丹上方加蟾酥不用蠟止為末尤妙破棺丹出濟生㧞萃方此即調胃承氣湯煉蜜丸是也山梔子牽牛末大黄各一兩甘草京三稜泡各七錢右煉蜜丸如彈子大酒化服之忌冷水透骨散治一切疔腫惡瘡其効不可盡述蟾酥半錢八角兒五個去殻硇砂輕粉麝少許巴豆一錢去皮右先将巴豆研如泥次下餘藥同研極細以油紙裹定如有瘡并諸般惡用針微撥破貼藥少許其瘡自消散如不散者亦追瘡毒即得潰塌又如成膿無頭癰疽腫微撥破用藥二次便得自破凡療惡瘡可用牛黄丹一名枸杞散出鮑氏方專治十三種疔亂髮雞子大牛黄梧子大反釣棘二十七枚赤小豆七粒緋帛方一尺地骨皮二兩末右枸杞其藥盖有四名春名天精夏名枸杞秋名却老冬名地骨春三月上建日採根凡四時初逄建日取葉枝子根等四味并曝乾若得五月五日午時共和尤為良美如不得依法採者但一種亦得用緋繒一片以褁藥約取一匝為限亂髮牛黄反釣棘針末赤小豆末先扵緋上薄布亂髮以牛黄末等藥布上㣲曝即捲緋繒作團用頭髮作䋲十字縛之熨斗火􅆈令沸後間即擣取末再取枸杞四味共和合擣極細即用絹篩取二匕和合前一匕共為三匕令相得入分為二分早朝空心用溫酒服一分毎日二為之也齊州榮姥方出千金方大凡是疔腫皆用治之牡礪九兩鍾乳枸杞根皮各二兩白薑石一斤軟白英石一兩桔梗一兩半右各擣篩合和令調先取伏龍肝九升為末先清酒一斗二升攪令渾澄清取二升和藥捻作餅子大六分厚二分其濁滓仍置盆中布餅子於籠上以一幅紙籍盆上以泥酒氣蒸之仍数攪令氣散發經半日藥餅子乾乃内瓦堈中毎一重紙一重藥遍布勿令相着以泥宻封三七日乾以紙袋貯乾處縫之用法針刺瘡中心深至瘡根并刺四畔令血出以刀刮取藥如大豆許内瘡中病重日夜三四度輕者一二度重者二日根爛出輕者半日一日爛出當看瘡浮起是根出之候若根出以爛者勿停藥仍著之藥甚安稳令生肌易其病在口咽及胷中者必外有種異相也寒熱不快疑是此病或清水和藥如二杏仁許服之日夜三四服自然消爛或以物剔吐根出即瘥若根當㸔精神自覺醒悟合藥以五月五日為上時七月七日次之九月九日臘月臘日皆可若急湏藥他日亦得要之不及良日也修合湏清净處焼香毋令孝子不具足人産婦六畜雞犬等見之凡有此病忌房室猪牛雞魚生韮葱蒜胡荽酒醋麺等若犯觸諸忌而發動者取枸杞湯和藥服并如後方二方以後方最是真本趙姥方薑石二十五兩牡蠣十兩茯苓三兩枸杞皮四兩右四味各𢷬篩合和先取新枸杞各皮切六升水一斗半煎取五升去滓内狗屎崔氏二尿二升攪令調澄取清和煎藥熱擣作餅子隂乾病者以兩刃針當頭直刺瘡痛徹出刮取藥末着急内瘡孔中勿令歇氣并遍封瘡頭上即脹起針挑根即出重者半日已上或已消爛挑根不出亦自瘥其病在内者外當有腫相應并皆惡寒發熱疑有瘡者以水半盞取藥如桐子大五枚和服之日夜三服自消若根出服藥一日以鷄羽剔吐即随吐若不出根亦自消爛在外者亦日夜三度傅藥根出常傅勿住即生肉易瘥若犯諸忌而發者取枸杞汁一盞服之日二三服并單飲枸杞汁彌佳又以枸杞汁攪白狗屎取汁服之更良合訖即用不待乾所言白狗屎是狗食骨其屎色如石灰故直言白狗屎也如預造取五月五日七月七日臘月臘日者尤良神騐或有人忽喉中痛乍寒乍熱者即是其病當急以藥療之無故而痛惡寒發熱者亦是此病但依前服之立瘥前後二方同一法亦主癰疽取疔瘡藥出千金方治一切疔腫懸癰用蒼耳莖根苗但取一束焼為灰醋泔藍靛和如泥先以針刺瘡口上四邉数下令血出度藥氣可以入針孔中即出血傅藥乾即易之不過数度即㧞根出其内消已結膿破潰者再不用針刺即以藥塗之余以忽口角上疔腫造甘子振家毋為帖藥經十日不瘥余以此藥塗之得愈常以此藥救人無有不瘥者故特以傳後嗣疔腫方殆有千首皆不及此雖齊州榮姥方亦不能勝此勿造次更易也又方出千金方用蒼耳草又名半負来草只用根紅軟者擂爛無灰白酒調勻服次用塩梅肉研爛以猪膽汁和塗瘡頂上其毒即散又先用好京墨薑汁研爛用薑片蘸墨塗四圍腫熱處即効一方止用蒼耳子根葉童子小便絞取汁令服一升日三或焼灰和臘月猪脂傅一方苗𢷬汁飲之滓傅一方或子或葉或根研爛米醋脚調塗腫立散如已去肉疔了再傅仍研汁服以瘥為度治疔瘡用筀竹筒一個刮去竹青要見竹黄為度兩頭留節只於一頭節上鑚一竅如菉豆大却将菉豆入於筒内令滿舊綿絮些小或用白紙塞其竅用磚一塊繫縳竹筒上又用長䋲一條帯墜於寺觀側坑内半年或三月愈久為好却取竹筒洗浄破其竹筒取出豆於長流水洗一日取起候水乾研丸如丁香相似約四分長再隂乾收起如有疔瘡用針於瘡畔鑚一兩竅將藥疔揷入竅内其疔毒自潰而出随症去毒藥疔腫方出夲草以荆芥一名假蘇為末和醋傅一方切以水五升煑取二升冷分二服亦辟邪毒氣治疔瘡腫甚者出聖惠方用附子末醋和塗之乾即再塗治疔腫方出本草以班猫一枚捻破針劃瘡上作十字封之根乃出連翹散連翹當歸尾羗活獨活防風赤芍赤小豆各五錢大黄二錢木香菇荑茨菇薄荷紅内消杜白芷升麻甘草忍冬草各三四錢不拘若潮不退加黄芩梔子仁各三錢朴硝四錢右為末酒調服不拘時候薄荷湯亦可喘加人参大病三四服愈如頬嘔甘草五錢豆粉一兩為末酸虀水下如割瘡去了疔子止血用毛鉄甲為末傅角瘡口方出危氏方霜梅十個大黄五錢右為塊子用石灰炒過去石灰入黄丹為末乾掺瘡上滴滴金治疔硇砂輕粉人言雄黄朱砂各一錢麝香少許右為細末瘡頭上針刺開貼藥黄水出効麝香丸治疔瘡又治諸氣發背木香一分胡椒巴豆二十四粒全蝎七個麝少許右為末泡蒸餅丸如菉豆大硃砂為衣温湯下量人虚實三丸七丸十丸服之硇砂散出宣明論治一切疔瘡硇砂雄黄砒霜天南星各等分麝香少右研為細末用竹針開用藥封黄水出瘡已疔瘡錠子蒼耳白芷甘草雄黄各半錢硇砂一錢右研細末用活蝦蟆擠出腦和五味酥為錠子五月五日午時修合白牙塗傅方出聖濟方治疔瘡毒白牙焼研附子𢷬為末雄黄研半夏半兩豬脂四兩右將四味𢷬研為末以豬脂調如糊先針刺瘡頭即塗傅日三五藥貼之少時如病深取疔病淺即取出黒紫色血即愈又方用胡桃一個平開二片取出肉用口嚼碎却将肉安放半片殻内頭上留一竅合在瘡上即痊可又方出聖惠方治惡腫疔瘡及雜瘡先炙瘡上三度以鍾乳末六錢及醤粒研𫝊上湏臾㧞根盡出又方出聖惠方用益母草莖葉搗爛傅瘡上又絞取汁五合服之即内消又方出聖惠方用竹箭桿刮取茹作炷就上炙之一七度治疔根入腹方出聖惠方取牡猪糞和水絞汁服一二合立瘥又方出聖惠方用鬼􅏛形如地􅌲多叢生糞堆上見日消黑者取焼灰以針刺瘡四邉至瘡際作孔内藥孔中經宿瘡發用鑷㧞根出治疔腫出本草用獨竹根細搗水調傅之治疔腫出根出本草以䖦蟱作膏塗之飛龍奪命丹治一切惡疔瘡硃砂南星半夏黄丹血蝎乳香没藥硼砂硇砂各二錢人言三錢麝少巴豆十二粒班猫十個右為細末蟾酥為丸如紅豆大五分中一分加班猫二個人言少許捻成錠子如半粒小麥大毎一瘡針破見血下錠子一粒飯粘白紙封䕶用藥一丸噙在舌上覺麻冷水吞下忌熱物片時重者随時服藥不必盡劑一服特黄水流出為妙病原先痒後痛先寒後熱如傷寒病忌房事并諸毒物魚腥凡病人眼紅見火光難治蟾酥乾用化開為度鐡粉散專治冷疔瘡經年不效用此藥大妙多年生鐡三兩炒黄丹半兩麝少許輕粉半錢松脂一錢道人頭㣲炒存性一兩硇砂三錢半雄黄三錢加蟾酥不拘多少尤妙右將瘡四圍刺破以小油調藥末置於瘡内緋帛封之数日疔自出瘡入腹嘔逆者煎道人頭濃汁飲之五香湯治疔腫破毒氣沉香藿香鷄舌香青木香薰陸香各二兩射干三兩升麻四兩鱉甲二具炙去黒皮藍實五個大黄犀角各二兩具齒六枝炙烏梅一十四枚右以水九升煮取三升分為三服一方有楓香無薰陸香以水一斗五升煎至一斗淋浴腫毒處名五香膏囘瘡錠子治疔瘡大效草烏頭一兩蟾酥二合巴豆七個麝少許右為細末麺糊和就撚作錠如有惡瘡透疔不痛無血者用針深刺到痛處有血出用此錠子絍之上用膏藥貼之疔瘡四畔絍之其疔二三日自然拔出此藥最宜𦂳用此症大抵與傷寒頗類其中亦有可針䥥砂射出血出亦有久而敗爛出膿其間變異百端不可不慎也治疔瘡土蜂窩穿山甲茄根海螺殻各等分右研極細用臘猪脂調為膏毎用指頭蘸藥於瘡磨之又蘸又磨待瘡化黄水出盡即日痊神效白石脂散治紫靨疔瘡不疼便腫腋下有根如雞卵白石脂焼赤石脂各半兩雄黄一分乳香二錢日本國傳治疔瘡巴豆塗方巴豆十粒半夏一枚附子半枚蜣蜋一枚右各為末以人糞相和㸔瘡大小作紙圏子圍瘡口以藥泥瘡上絹貼之一日三易治疔腫瘡毒方川大黄五錢牽牛二錢半故紙二錢半大律係牛蒡子二錢半右為末用好酒喫一銅錢一方用酒調服又方生大豆黄三十二枚全者緋頭􅔮三條如無用五寸緋代亂髪一鷄子許右以緋裹亂髮牢纒於灰火上焼得黒烟欲盡即出之冷瓷噐中研如粉以酒空腹服之方寸七平明至午時覺四體舒通覺瘡經即瘥如未依前服之瘥止若犯之瘡即出膿血未經犯六七日平貼忌如常服又方療疔瘡蜂窩七枚直緋手大亂髮拳大右各焼為灰作末酒一小升和調服之瘥止未瘥再服之一方温水調下奪命輕粉散治疔瘡不出疔鐡渣一兩輕粉二錢麝香少許右研為細末毎瘡用針開十字口将藥放入瘡内用醋調麺糊敷貼神効青金散治疔黄栢人言黄丹右為細末各等分針開破貼上黄水出立效又方旋腫人言一分白礬甘草各三分右為細末瘡圍挑破敷藥治疔瘡方附子去皮巴豆去皮胡粉各一兩右為末用烏麻油調膏先以針於瘡四邉血出即以藥封之其四面亦以藥盖勿令洩氣其根自出又方治疔腫石灰三分馬齒菜二分右𢷬以雞子白和傅之一方二味等分末之夹破好肉然後内藥於孔中即妙犯疔瘡方上瘡根爛再塗以瘥為度大黄散出聖濟總録治疔腫傅方大黄挫炒秦芁莉蘆去頭石硫黄硇砂各一兩右将前三味𢷬羅為散與後二味研者和勻水調塗傅日三五次以瘥為度治疔腫方乾薑胡椒龍骨班猫皂荚各一兩右𢷬篩為末以酒和封貼日一度更服後藥消毒散出濟生㧞萃方治疔瘡毒氣入腹昏悶不食丁香乳香各一錢蟬殻管仲紫地丁各半兩右為細末温酒調下二錢神仙金丸出經騐良方治疔黄入髮癰疽諸般惡瘡乳香没藥各二錢巴豆四十粒海浮石半兩草烏頭一兩炒右為末醋麺糊丸如菉豆大三二日瘡服十丸五六日瘡服十五丸瘡在上食後瘡在下食前服如嘔吐再服三四丸凡服先以冷酒一盞送下服藥後忌食熱物一時如㵼多用冷白粥補之土鬼丹出直指方治疔腫金頭蜈蚣一條膽礬銅録白賊骨各一錢麝右細末以紙撚蘸蔴油粘藥引入瘡中如瘡頭硬即灸破或針刺破然後入藥紫金丹治諸般疔瘡人言硃砂雄黄各一錢巴豆四枚硇砂一錢半右為細末碁子麺相和錠子絍在瘡内立効四聖旋疔散治疔瘡生於四肢其勢㣲者巴豆仁半錢白殭蚕輕粉硇砂各二錢右為細末先以好醋調藥塗上以紙封之次服托裏之藥其疔根自出蒼金砂散出濟生方取疔瘡蕪青根鐡生衣各等分右和搗以大針刺作孔復削蕪青根如針大前鉄生衣塗上刺孔中又塗所𢷬者封上仍以方寸匕緋帛塗貼之有膿出即易湏臾㧞根出立瘥忌油膩生冷等物紫金丹治疔瘡白礬四兩丹二兩用銀白石氣内鎔礬作汁下再使銀釵子攪之令紫色用文武火毋令太過不及如有瘡先以週廻挑破上藥用唾津塗上数度着毋令瘡乾其瘡潰動取疔出也兼瘡顔色紅赤為効如藥未成就再杵碎炒令紫色二黄散治疔瘡雄黄雌黄右等分為末先用針刺四圍及中心醋和塗之一方加麝治疔瘡最有功効蟬蛻殭蠶右為末酸醋調塗四圍留瘡口俟根出稍長然後㧞去再用藥塗瘡一方不用醋用油調金砂散治疔瘡硇砂雄黄右等分研細用生蜜就於角盆子内收貯用遇患先用銀箆兒挑破瘡口去惡血然後用一大豆藥安入瘡内用紙貼即効毒氣入腹多嘔吐欲死者即服托香粉散内托香粉散滴乳半兩菉豆粉一兩右為細末煎生甘草湯調三錢時時飲之常令灌潤胷膈治疔瘡危篤者二服即愈輕者一服立効土蜂房一個蛇退一具右作一處噐皿中盛用黄泥封固火煆存性碾為細末毎服一錢空心酒服少頃腹中大痛痛止其瘡已化為黄水仍服五聖散五聖散大黄生薑各二兩瓜蔞一個皂針二兩甘草一兩銀花一兩半右為㕮咀用好酒二升同煎八分去滓服不拘時候耆老丹治一切疔瘡發背惡瘡等疾白浮石半兩没藥二錢右為細末醋糊為丸如桐子大毎服六丸冷酒送下白膏藥治疔瘡及一切惡瘡官粉四兩芝麻油九兩右用砂銚内文武火慢煎不宜大火火大色黄火小透油也又方疔腫塗傅諸藥後如觸者棘刺剉陳橘皮二兩右以水五升煎至一升半去滓分温三服空心白酒日午晩間各以一瘥為度治疔腫班猫傳方斑猫一枚蒜皮一片右取針撥破瘡頭内班猫於瘡口中以蒜皮盖定日一度瘥治疔腫胡麻塗傅方胡麻燒灰針砂右和勻研細用醋調如糊塗腫上日三易瘥治疔腫毒氣二灰散塗方棘針三枚丁香七枚右同於瓶内焼令烟㫁研末以滿月孩子糞和塗腫上日三兩度瘥又方半夏生用石灰等分右𢷬末以傅瘡上必効療疔瘡方舊厠清絞取汁青竹茹焼作灰右研和清攪一百遍稀稠成膏刺瘡四邉令遍先以唾和麺瘡四面圍藥漸漸令滿其中仍三五度換之晬時瘡爛以挑之㧞去根即瘥止未出更着之神効又方巴豆二七枚去皮半夏二七枚𢷬末右以寒食餳和之以針刺瘡四邉令㣲到底即以藥塗之立㧞出以澤㵼末填瘡孔中便瘥又方療疔腫䑕屎亂髮右等分焼作灰針瘡頭内藥大良治疔瘡無問雌雄方鉄粉一兩蔓青根三兩右擣和如泥封腫上日三換之治惡腫疔瘡及雜瘡方皂荚一両去黒皮麝一両研右為細散入麝和勻以人糞少許和如泥塗封五日後開之根自出矣又方治疔腫用老鴉眼晴草擂碎酒服又方以䑕新坌土以小兒屎和傅之又方以鉄衣末以人乳和傅之立可又方以小豆花為末傅之瘥又方以四神丹一枚當頭上安經宿根即出又方以銀箆撥破瘡皮唾津調野灰菜灰些小㸃上血出為度又方以麺和臘月猪脂封上瘥又方以蒺莉子一升燒灰醋和封上經宿便瘥又方以皂角子取仁作末傅之五日内瘥玊山韓光方治疔腫以艾蒿一擔燒作灰以竹筒中淋取汁以一二合和石灰如麺以針刺瘡中至痛即㸃之㸃三遍其根自拔亦大神騐正觀中用治三十餘人得瘥又方出聖惠方用黒牛垢封之又方出千金方以雄黄研一分為細散毎日三五度傅腫上如乾用醋塗以瘥為度一方針刺四邉及中心塗雄黄末神騐一云塗黄土蟾蜍膏出危氏方治疔腫取蟾酥以白麺黄丹拌作劑丸如麦顆狀用指甲爬動瘡上揷入重者針破患者以一粒内之仍以水沉膏貼之取蟾酥法用癩蝦蟆於眉稜上以手捻出酥扵油紙上或桑葉上用新瓦盛下然後揷在隂處經宿則自乾白於鵞翎筒内盛之或加蒼耳子沒藥乳香血蝎血蝎真者輕浮入口甜味水沉膏出危氏方以白芨末五分水盞内盛下澄去水却皮上攤開貼瘡上治數種疔瘡用大青葉是處山内有冬間無類枇杷葉又取臭紫草及馬蹄草各等分擂爛酒一碗浸藥濾去滓蕩溫酒服三服立愈春夏取葉草擂作餅如乾再擂用溫酒服又方車輻軸脂白鹽蕪菁根釡底墨等分右為末和以臘月猪脂封上以酢及水和傅之并得又方白馬齒亂髮髑髏各一兩枸杞白皮三分右燒作灰以酒服方寸匕不瘥至二匕專治疔瘡出神効方用生蜜與隔年老葱去鬚葉用白一處研或膏先將瘡用竹箆刺破然後用藥扵瘡上攤之用緋帛盖覆如人行二十里覺疔出然後以熱醋湯洗之立瘥治疔瘡取蟾酥油調封口立効又方出本草用苦􅀢根擣爛傅之又方出聖惠方以白歛為末傅之又方出肘後方以針刺斷四圍用石榴末着瘡上以麺圍了四畔炙以痛為度炙訖以石榴末納瘡口内急封之經日根自出愈若大赫瘡已炙之以蜣蜋乾者末之和鹽水塗瘡又方取前藥以帛貼著乃取半錢和水服之止心中毒氣消更有趙婆婆藥常用大効方在大方中冝五月預合又方取蒼耳草節内蟲七七四十九條搥破入人言些小再搥成塊用針將患處刺破見血仍用此藥封在瘡上其疔用手撮出愈救疔瘡以十二月猪膽風乾和生葱擣碎塗諸般疔瘡白殭蠶散治疔腫傳方以白殭蚕五錢炒為末刮開瘡頭上傅之日三根爛即出一方用水調封之又方出千金方以鉄􅄴不限多少毎日食後飲一盞即瘥又方出千金方治疔瘡刺瘡頭及四畔令汁極出擣生栗黄傅上以麺圍之勿令黄出從旦至午根即拔矣又方出千金方以麺圍瘡如前法以針亂刺瘡銅氣煮醋令沸㵼著麺圍中容一盞冷則易之三度根出即愈又方出聖惠方取蛇蛻皮如雞子大以水四升煑三四沸去滓頓服立瘥一方燒灰或炙焦為末雞子清調塗治疔瘡出本草以鏨菜搗碎傅之治疔瘡以虱十枚放置瘡上以荻箔䋲作炷炙虱上根即出治疔腫垂死出聖惠方以菊葉一握擣汁服一升入口即活冬用根一方用根舂細盒患處用些鹽舂即愈治疔瘡出仁存心以燒馬齒莧灰和多年醋滓先炙疔腫以傅之一方馬齒莧和梳垢封之根出治疔瘡海上方用蝉殻七個煆為細末用蜜調擦瘡口又以磁石末細研醋調傅立拔根出又方亂髮雞子大緋帛方三寸棘刺七十枚蒼耳三七枚右合燒作灰研成散毎以半盞水許服方寸匕日二三瘥止慎風􅉯忌同煎慮有犯觸加鹿角鱉甲蜂房三寸匕三物等分燒灰為散若有犯者依前服之甚効治疔腫病忌見麻勃見之即死者胡麻燭燼針沙各等分右為末以醋和傅之神仙追毒散大黄芒硝牛蒡子各一兩五錢右為細末煉蜜為丸硃砂血竭為衣如弹子大童子小便化開空心溫酒服一捻散治疔子全蝎蝉蛻人糞下土各等分右碾末蜜調為餅子拇指靣大當三錢若遇患每一餅入香油一盞炭火頓滚三四沸停温服油滓傅瘡上用圏子劄定對周疔自拱出一捻金散治疔疽惡瘡不出疔内消蒲公英取汁鹽泥生人腦耳塞是也後二味各等分右為末用蒲公英掘拆取白汁和二味為小餅兒有瘡用竹刀割破上一餅用膏藥封貼大有神効此藥定疼内消蛇蜕散治疔腫兼治瘡口内久不合蛇蜕皮一兩半露蜂房五錢亂髮一圍如雞子大童子便炒右剉碎於熨斗内燒灰細研為散毎服二錢匕空心米飲調下盖覆出汗更服一方云并用五月五日採忌七日不得食鹽酒肉五辛物疔瘡方出本草以鸕鷀屎和脂油封上瘥疔瘡方出聖惠以生薺苨根取汁一合去滓傅不過三次愈治疔腫患火丹瘡以龍葵和土杵傅之尤良治患疔腫中風頭痛者以驢馬屎熨瘡滿五十遍極効治疔腫以五月初三日採取旱蓮草根乾須要天色晴明之夜有露時露過七日遇有瘡腫嚙碎放瘡上以消毒膏貼之二三日疔脫仍服敗毒散数服凡七十二種皆治之但七日傳經者不治備急療疔腫姚方云疔毒為瘡肉中突起如魚眼状赤黒惨痛是寒毒之結變作此疾始作服湯及如療疔法便瘥又支太醫云有十三種疔瘡其状在大力中初起皆患寒熱又三十六疔亦是其三種数内或今日生一明日生二或生三或生十滿三十六疔皆療之方出肘後方以蛇皮炙末和䑕矢以針刺破瘡内中即㧞出瘥又方出聖惠方取馬牙齒焼作灰先以針刺破瘡令破以灰封之用麺周匝圍之候腫軟用好酢洗却灰其根即出當便瘥一方擣末臘月猪脂和傅之根即㧞又方出千金方以針刺破瘡頭取人熱糞塗上乾易之不過十五遍即出又以硇砂封上熱毒入腹以枸杞根切煎服之如犯觸亦然如乾糞亦得若犯瘡未死者灌厠清汁一升亦瘥一方人糞尖傅又方以五月五日取牡狗矢焼作灰傅之瘡数易之普濟方卷二百七十三
