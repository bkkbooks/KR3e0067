body:
  text: 普濟方卷三百二十四明周王朱橚撰婦人諸疾門積聚附論夫婦人積聚者積者五臟所生聚者六腑所成五臟之氣積名曰積六腑之氣聚名曰聚也積者其病不離其部聚者其病無有常處皆由隂陽不和風冷搏於臟腑而生積聚也婦人病積於經乆則令無子亦令月水不通所以然者積聚起於冷氣結入子臟故令無子若冷氣入於胞絡冷搏於血血冷則澁結故令月水不通儒門事親云戴人過譙都營中飲會鄰席有一卒說出妻事戴人問其故答曰吾婦為室女時心下有冷積如覆盃按之如水聲以熱手熨之如冰聚來已十五年矣恐斷我嗣是故棄之戴人曰公無黜也如用吾藥病疴除孕可得卒從之戴人診其脈沉而遲尺脈洪大而有力非無子之候也可不踰年而孕其良人笑曰試之先以三聖散吐涎一斗心下軟次服白术調中湯五苓散後以四物湯和之不再月氣血合度數月而娠二子戴人常曰用吾此法無不子之婦此言不誣陽夏張主簿之妻病肥氣初如酒杯大發寒熱十五餘年後因性急悲感病益甚惟心下三指許無病滿腹如石片不能坐卧鍼炙匝矣徒勞人耳乃邀戴人而問之既至斷之曰此肥氣也得之季夏戊巳日在左脅下如覆杯久不愈令人發􅂒瘧􅂒瘧者寒熱也以𤓰蒂散吐之魚腥黃涎約三缶至夜繼用舟車丸通經散投之五更黄涎膿水相半五六行凡有積處倍覺痛後用白术散當歸散和血流經之藥如厮漏泄凡三四次而方愈方鱉甲丸出千金方治女人小腹中積聚大如七八寸盤面上下周流痛不可忍手足苦冷欬噫腥臭兩脇熱如火灸玉門冷如風吹經水不通或在月前或在月後服之三十日便瘥有孕河内太守魏夫人方鱉甲桂心各一兩半蜂房半兩𤣥參蜀椒細辛人參苦參丹參沙參吳茱萸各十八銖䗪蟲水蛭乾薑牡丹附子皂莢當歸芍藥甘草防葵各一兩蠐螬二十枚蝱虫大黄各一兩六錢右為末蜜和丸如梧桐子大酒下七丸日三稍加之以知為度鱉甲丸出聖惠方治婦人腹中積聚大如杯上下流痛不可忍食噫腥臭四肢寒熱經水不通惡血停滯體瘦無力面色萎黄宜服鱉甲一兩半塗醋炙黄去裙襴露蜂房二分微炒牡丹三分川椒二分去梗炒去汗目一方白㣲牛膝一分去苗川大黃一兩剉碎㣲炒附子一两半去皮臍乾薑三分㣲炒吳茱萸三分湯浸七遍焙乾㣲炒蝱蟲一兩微炒水蛭一兩微炒皂莢半两去皮子塗醋炒令黄當歸一兩剉㣲炒赤芍藥桂心琥珀防葵各一兩蠐螬三十枚㣲炒右為末煉蜜和搗五七百杵丸如梧桐子大每日空心及晩食前温酒送下十丸薑黄丸出聖惠方治婦人虛冷血氣積聚心腹妨悶月候久不通少思飲食四肢羸痩薑黃三分牡丹半分赤芍藥半兩桂心三分芫花一分半醋炒乾當歸半兩剉微炒鱉甲一兩塗醋炙金黄去裙襴琥珀半兩延胡索半兩鬼箭羽半兩木香半兩硇砂半兩凌霄花半兩荆三稜二分㣲炒剉水蛭一分炒令㣲黃川大黃三分剉碎微炒乾漆三分搗碎炒令烟出右為末煉蜜和丸如梧桐子大食前以温酒下七丸龜甲丸出聖惠方治婦人因産後虛冷堅結積在腹内月經往來不時若腹脹滿繞臍下痛引腰背手足煩或冷熱心悶不欲食鱉甲一兩半乾薑赤石脂丹參禹餘粮當歸白芷一分用末乾地黄各一两六銖代赭甘草鹿茸烏賊骨殭蠶各十八銖桂心細辛蜀椒附子各一兩右為末蜜和丸如桐子大空心酒下五丸加至十丸一方有牛膝無白芷紫桂丸出聖惠方治婦人心腹虛損冷積聚宿食不消冷氣時攻心腹脹滿遶臍㽲痛桂心一兩吳茱茰半兩湯浸七遍焙乾㣲炒菖蒲半兩猪牙皂莢半兩塗醋去皮炙黃去子紫苑半兩炮裂剉乾薑半兩炮裂剉川烏頭一兩炮裂去皮臍當歸三分剉㣲炒木香半两川椒半兩去目及閉口者㣲炒去汗蓬莪荗二分牛膝半兩去苗桃仁半兩去皮尖雙仁麩炒黃附子半兩炮裂去皮臍琥珀三分右為末煉蜜和搗五七百杵丸如梧桐子大每日空心及病發時以熱酒下二十丸乾膝丸出聖惠方治婦人積聚及惡血不散多攻心腹疼痛面無顔色四肢不和宜服乾膝一兩搗碎炒令烟出穿山甲一兩炙令焦黃梹榔三分荆三稜半兩㣲炮剉桂心三分乳香半兩川烏頭半兩炮裂去皮臍硇砂一兩不夾石者細研木香半兩阿魏半兩麵裹煨熟為度硃砂三分硏飛過鱉甲一兩塗醋炙令黃色去裙襴巴荳二十枚去皮心研紙裏壓去油右為末煉蜜和丸如麻子大每服不計時候以熱生薑酒下五丸當歸酒下亦得秘方神麯五合炒枳殻白术各六分人參四分赤石脂十分右為細末米飲調下方寸匕大黃丸出聖惠方治婦人積聚氣乆不散川大黃一兩剉碎微炒鱉甲二兩塗醋炙令黄去裙欄防葵一兩半琥珀一兩乾膝一兩搗碎炒烟出右搗細羅為末以米醋二升熬令稠入少麵煑作糊和漆為丸如梧桐子大每服食前以温酒下十五丸鱉甲散出聖惠方治婦人積聚氣心腹脹硬或時疼痛體瘦力乏不能飲食宜服鱉甲二兩塗醋炙黄去裙襴當歸剉㣲炒防葵各一兩吳茱萸半兩湯浸七遍焙乾微炒桂心白术青橘皮湯浸去白穣焙木香赤芍藥各一兩甘草半兩炙㣲赤剉桃仁一兩浸去皮尖雙仁麩炒微黄右為散服三錢水一盞生薑半分煎六分去滓食前稍熱服治婦人勞氣食氣胃滿頭童結痛小便赤黃大下氣出千金方烏頭黃芩巴豆各半兩半夏三兩大黄八兩戎鹽一兩半􅟟蟲桂心苦參各十八銖人參硝石各一兩右為末以蜜浸牛膽拌和搗三萬杵丸如梧桐子大宿不食酒服五丸安卧須臾當下下黄者小腹積也青者疝也白者内風也如水者留飲也青如粥汁膈上邪氣也血如腐肉者傷也赤如血者乳餘疾也如蟲刺者蟲也既下必渴飲粥飲食酥糜三日後當温食食必服濃三十日平復亦名破積烏頭丸主心腹積聚氣悶脹疝瘕内傷瘀血􅂒乳餘疾及諸不足麝香丸出聖惠方治婦人積聚氣心腹疼痛面色痿黄不能飲食麝香半兩細入木香三分當歸二分剉碎微炒附子半兩炮裂去皮臍香墨三分防葵半分硇砂三分不夾石者細研硃砂半兩細研巴豆半分去皮心紙裏壓出油研吳茱萸半兩湯浸七遍焙乾微炒右為細末入研了藥令勻以醋煑麵糊和丸如麻子大服時空心以橘皮湯下三丸以利下惡滯為度磨積丸出醫方集成治女人三十六疾積氣内攻經候不調腹脇多脹或時痛不進飲食京三稜莪蒁各煨二兩茴香炒附子川楝子肉炒白芍藥乾薑炮各一兩半當歸洗一兩七錢半巴㦸去心炒一兩艾葉醋炒一兩七錢半右為末酒糊丸如梧桐子大每服五十丸空心温酒下防葵散出聖惠方治婦人心腹積聚氣時有疼痛經絡不利四肢漸瘦食少腹脹宜服防葵一兩木香一兩川大黄二兩剉碎微炒白术一兩當歸一兩剉㣲炒赤芍藥一兩牛膝一兩去苗桂心一兩桃仁一兩湯浸去皮尖雙仁麵微炒右麄羅為散每服三錢水一盞入生薑半分煎至六分去滓食前燒熱服五京丸出千金方治婦人腹中積聚九痛七害及腰中冷引小腹害食得冷便下方乾薑蜀椒各三兩附子一兩吳茱萸一升當歸狼毒黄芩牡蠣各三兩右為末蜜和丸如梧桐子大初服三丸日加至十丸患乆冷困當服鬼箭散出聖惠方治婦人積聚氣心腹脹滿經絡滯澁四肢疼痛坐卧不安宜服鬼箭羽琥珀牛蒡子穿山甲塗醋炙令黄當歸剉碎㣲炒桂心川大黄剉碎㣲炒桃仁湯浸去皮尖雙仁麩炒㣲黃以上各一兩右為散每服二錢以温酒調下食前服硇砂丸出聖惠方治婦人血冷虛氣積聚疼痛硇砂三分細研百草霜半兩砒黃一分凌霄花半兩香墨一分川烏頭半兩炮裂去皮臍巴豆一分去皮心右為末入巴豆霜同研令勻用軟飯和丸如菉豆大每服於食前以温酒下三丸治積氣堅硬作氣噎胷引背痛方大全良方白芍藥一兩半鱉甲醋炙枳殻去穰麩炒北柴胡各一兩甘草赤茯苓各半兩右㕮咀每服三錢水一盞薑三片棗一枚煎至七分去滓温服草粉丸子出聖惠方治婦人積聚氣久不散心腹疼痛麝香半兩細研巴豆三分去皮心紙裏壓去油飛天白六兩雄雀糞是冬月者佳炒令極熱為末右都研令勻以糯米飯和丸如梧桐子大每服空心以生薑酒下二丸楊子建䕶命方治婦人忽經候行次忽因産後起早并誤喫生冷物傷損血氣血氣俱病因生積聚乆無療變成惡物其狀腹中成鬼如蛇如䑕如䗫如蠱之類發作有時疼痛不可勝忍以手按之即衝手跳起宜服此方但此病經到年深其惡物帶命喫人血盡忽絶無經候通行忽經候行時只如淺紅水如此即傾危人也急宜治之所病年深不請喫吳茱萸三銖鱉甲醋炙黄延胡索棟子各半兩芫花梹榔各二兩狼毒九銖打碎同芫花用醋三碗於土器内煑乾炒令黄色以微黒色為度𦍑活牡丹去心附子火炮去皮桔梗牛漆白蕪荑川芎半夏當歸川椒麝香蜜陀僧通草各一兩蝱蟲去翅三十箇水蛭二十條右件藥除芫花狼毒二味自作一處杵羅為末蝱蟲水蛭鱉甲三味修製了亦自作一處杵羅為末所餘數件藥修合作一處杵羅為末件藥盡修製杵羅了三處合作一處相滚令均每服三錢空心葱湯調下白术散療婦人腹内冷癖血塊虛脹月經不調瘦弱不能食無顔色狀如𫝊尸方麯末二升麥蘖末二升生地黄肥者切三升白术八兩牛膝切三升桑耳剉三升金色者薑黄八兩當歸十四分生薑和皮切三升桃仁杏仁各二升去皮尖及雙仁者熱熬近用橘皮八兩右並細切於臼中以木杵搗之如泥納瓶中以物葢口封之勿令洩氣蒸於一大石米中飯熟出入停屋下三日開出暴乾搗為散酒飲服方寸匕日二服漸加至一匕半不利初服十日内忌生冷難消之物以助藥勢過十日外即百無所忌任意恣口食之惟忌桃李若須桃李宜去木若不能散蜜丸服之亦得一服三十丸日二服去病人肥徤好顔色忌桃李雀肉蕪荑乾薑丸治婦人寒熱羸痩酸消怠惰胷中支滿肩背脊重痛腫裏堅滿積聚或痛不可忍引腰小腹痛四肢煩疼手足厥逆寒至肘膝或煩滿手足虛熱意欲投水中百節盡心下常若懸痛時寒時熱惡心涎唾喜出每愛鹽酸甜苦之物身體或如雞皮月經不通大小便若難食不生饑乾薑芎藭茯苓硝石杏仁水蛭蝱蟲桃仁蠐螬􅀢蟲各一兩柴胡芍藥人參大黄當歸各二兩右為末蜜和丸如梧桐子大空心飲下三丸不知加至十丸兼療婦人瘕結脇肋下疾神仙聚寶丹利劑方治婦人血海虛寒外乘風冷摶結不散積聚成塊或成堅瘕及血氣攻注腹脇疼痛小腹及脹或時虛鳴面色痿黄肢體浮腫經脈欲行先若重病或多或少帶下赤白崩漏不止驚悸徤忘小便頻數或下白水時發虛熱盗汗羸痩此藥不問胎前産後室女並宜服之常服安心神去邪氣逐敗血養新血令人有子没藥别研琥珀别研木香煨冷取末當歸洗焙取末各一兩辰砂麝香别研各一錢滴乳别研一分一方用二錢半右研令細和停滴冷熱水搗為丸每一兩作一十五丸每服二丸温酒磨下胎息不順腹内疼痛一切産難温酒和童子小便磨下産後血暈敗血奔心口噤舌强或惡露未盡發渴面浮煎烏梅湯和童子小便磨下産後氣力虛羸諸藥不能速效用童子小便磨下室女經候不調每服半丸温酒磨下不拘時候癥瘕積聚附論瘕者黄瘕青瘕燥瘕血瘕脂瘕狐瘕蛇瘕是也千金外臺言之詳矣癥瘕積聚隨氣血以分門故方云以癥瘕屬肝部積聚屬肺部不亦明乎况七者火數屬心葢血生於八者木數屬肝葢血歸於肝雖曰强分理似不混夫癥者堅也則難破瘕者假也假物成形若婦人七癥八瘕則由内外不内外因動傷五臟氣血而成古人將婦人病為痼疾以蛟龍等為生瘕然亦不必如此執泥婦人癥瘕並屬血病龍蛇魚鱉肉髮蝨瘕等事皆出偶然但飲食間誤中之留聚腹臟假血而成自有活性亦猶永徽中僧病噎者腹有一物其狀如魚即生瘕也與夫宿血停凝結為胚塊雖内外所感之不同治法當以類相從所為醫者意也如以敗梳治蝨瘕銅屑治龍瘕麯孽治米瘕石灰治鱉瘕此等學者可以理解也方牡丹煎丸出和劑方治婦人衝任本虛小腹挾寒或因産勞損子臟風寒摶於血氣結生瘕聚塊硬發歇臍腹刺痛脇肋𦂳脹腰膝疼重拘攣腫滿背項强急手足麻痺或月水不調或瘀滯澁閉或崩漏帶下小腹冷疼寒熱盗汗四肢酸痛面色痿黄多生䵟􅍍羸乏少力心多驚悸不欲飲食延胡索縮砂仁各半兩赤芍藥牡丹皮各一兩山茱萸乾薑炮各半兩龍骨細研水飛熟地黄梹榔羗活各二兩藁本去土五味子人參白芷當歸去蘆酒浸乾山藥澤㵼續㫁細者肉桂去粗皮白茯苓白术附子去皮臍木香牛膝去苗酒浸宿焙萆薢搗為末炒各一兩石斛去根酒浸三兩右為細末煉蜜和丸如梧桐子大每服二十丸温酒或醋湯下空心食前二服姙娠不宜服如是血熱及夜多煩躁不用附子山茱萸萆薢乾薑此四味却入柴胡黄連甘草牽牛子四味柴胡去苗一兩甘草一兩餘各半兩同和為丸治瘕神妙婦人腹肚有塊久不消名曰瘕聚川烏七錢附子七錢木香半兩香附子半兩丹參陳皮各三錢蓬蒁三稜威靈仙木賊草桂心芍藥藁本蒺䔧葫蘆甘草延胡索良薑各半兩右為㕮咀每服四錢水一盞半生薑三片煎服雞鳴柴丸出千金方治婦人瘕癥積聚皂莢一分藜蘆甘草礬石烏喙杏仁乾薑桂心巴豆各二分前胡人參各四分代赭五分阿膠六分大黄八分右為末蜜丸如梧桐子大雞鳴時服二丸日益一丸至五丸止仍從一起下白者風也赤者癥瘕也青微黄者心腹病也桃仁散出大全良方治月經不通産後惡露未盡積聚瘀血變成癥瘕蝱蟲半兩炒令㣲黄去翅足水蛭炒令㣲黄烏賊骨鯉魚鱗燒灰芫花醋炒令乾枳殻麩炒微黄去穰當歸炒牛膝去苗赤芍藥硇砂桂心各半兩桃仁三分浸去尖雙仁麩炒黄右為細末食前温調下一錢水府丹出大全良方治婦人久虛積冷經候不行癥瘕癖塊腹中卒暴疼痛面有䵟􅍍黧黑羸瘠百病經煅花蘂石研一兩半硇砂紙隔沸湯淋熬取霜半兩桂心别為末木香乾薑各一兩縮砂仁二兩紅荳半兩班猫一百箇臘月狗膽七枚生地黄汁童子小便各一升蚖青三百箇班猫蚖青二物並去頭足翅以糯米一升同炒米黄右為末同三汁熬為膏和上末丸如雞頭大硃砂為衣每服一丸温酒嚼破食前服米飲亦可孕婦莫服治婦人血瘕心腹積乳餘疾繼生小腹堅滿貫臍中熱腰背疼小便不利大便難不下食有伏蟲臚脹癰疽腫久寒畱熱胃脘有邪氣方千金方半夏一兩六銖石膏藜蘆牡蒙蓯蓉各十八銖桂心乾薑各一兩烏喙半兩巴豆六十枚研為膏右為末蜜丸如小荳大日服二丸及治男子疝病三稜煎丸出大全良方治婦人血瘕食積痰滯三稜煨莪荗煨各二兩青橘皮去白半夏湯洗七遍麥芽炒各一兩右用好醋六升煑乾焙為末醋糊丸如梧桐子大每服三四十丸淡醋湯下痰積多薑湯下妙應丹治諸臟氣虚損積聚煩悶及飲食中蠱毒或食水陸果蓏子卵入腹而成蟲蛇魚鱉或宿食留飲婦人產後敗血不消女子月水不通結為癥瘕時發寒熱唇口焦黑肢體瘦削嗜卧多魘少食腹疼大便糟粕變成冷痢萆撥木香破故紙炒各重三兩半附子四箇六七錢重者去皮臍剜作甕碙砂共一兩七錢半麵裹煨熱去麵不用青皮二兩右為末麵糊搜丸如梧桐子大每服三十丸生薑橘皮湯下滯痢米湯下加至五十丸桃仁煎治婦人血積血瘕血瘣經候不通潮熱月水停滯作病及癥瘕等病神騐此藥性烈氣血虛人斟酌與之亦可下鬼塊胎一名桃仁丸桃仁丸二兩湯浸火炒大黄川朴硝各一兩蝱蟲半兩炒黑右為末以醇醋二升半銀石器中熳火煎取一升五合下大黄桃仁蝱蟲等不住手攪欲下手丸下朴硝更不住手攪良久出之丸如梧桐子前一日不用喫晩食五更初用温水吞下五丸日午取下如赤荳汁或如雞肝蝦䗫衣狀未下再作如鮮血來即止續以調血氣藥補之曽有婦人小便不通臍腹不可忍衆醫作淋治以八珍散之類愈甚許學士診之曰此血瘕也非瞑眩藥不可去更初用此藥日午痛大作不可忍遂卧少頃下血如拳者數塊小便如黒汁者一二升痛止得愈此藥治病的切然猛烈太峻氣虛血弱者更宜斟酌與之一方用醇苦酒煎如前法每取一雞子黄投酒中預一宿勿食服之大硝石丸治七癥八瘕聚結􅂒塊及婦人帶下絶產并飲服丹藥腹中有癥瘕者當先下之此藥但去癥瘕不令人困硝石六兩大黄八兩人參甘草各三兩右為末以三年苦酒三升置銅器中以竹作凖每一升作一刻柱器中先納大黄常攪不息使微沸盡一刻乃納餘藥又盡一刻極微火熬使可丸丸如雞子中黄若不能服大丸則作小丸如梧桐子大米湯下三十丸四日一服婦人服之或下如雞肝或如米泔正赤黑等三升下後忌風冷自養如產婦四物湯當歸𤣥胡索威靈仙官桂各等分右為末每服三錢酒空心服小三稜丸醫方集成治食癥酒癖血瘕氣塊時發刺痛全不思飲食及積滯不消心腹堅脹痰逆嘔噦酢吞脇肋刺痛胷膈􅂒悶并脾氣横泄荆三稜蓬莪术各四兩芫花一兩去梗葉右同入磁器中用米醋五升浸滿封器以灰火煨令乾取出稜术將芫花以餘醋炒令微焦焙乾為末醋糊丸如菉荳大每服十五丸生薑湯下婦人血分男子脾氣横泄腫滿水結用桑白煎湯下一握七丸治臟腑宿藴風冷氣血不和停滯宿飲結為癥瘕􅂒塊及婦人血瘕腸胃中塞飲食不下咳逆脹滿及下痢赤白霍亂轉筋及踒擘拳攣腰脊脚膝疼痛行步不能常服健脾煖胃堅骨强陽神麯半斤炒黄大附子二箇炮去皮臍甘草二兩炙右為末蜜丸左手一握分作七丸每服十丸細嚼米飲下治癥瘕積聚去三尸益氣延年却老右以雄黄二兩細研為末九度水飛過却入新浄竹筒内盛以蒸餅一塊塞筒口蒸七度用好粉脂一兩為丸如菉荳大日三服酒下七丸十丸三年後道盛益力不飢玉女來侍治癥瘕積聚風痰癩狂三蟲伏尸除藴輕身益氣令人不飢百日延年却老右用天門冬末服方寸七日三無問山中人間但勿廢久服益苦釀酒服之治癥瘕積聚用蔓菁子水煑二升取濃汁服治癥瘕滿腹諸藥不瘥者本草以人溺服之皆下血片塊二十日即出也癥瘕附論冷熱不調飲食不節思慮不絶喜怒不時氣弱血虛觸冐風邪冷氣入於龍門邪氣傳於胞絡摶於氣血則使月水不利次至不通漸結成塊又有月信不㫁以舎合隂陽氣内入使經候不時内結積聚成塊此終身不盈宜與琥珀丸磨去之因產而復生癥瘕塊硬按之而不動搯之而不移由藏氣已虛血未盡風寒所乘而凝結也没藥丸琥珀丸治之儒門事親書云沈邱王宰妻病胷膈不利只流涎沫自言門下胃中常雷聲心悶肘作微痛又復昏胷乳之間灸瘢如碁化痰利膈等藥服之三載病亦依然其家知戴人痰不損來求之一涌而出雪白蟲一條長五六寸有口鼻牙齒走於涎中病者忿見㫁之中有白髮一莖此正與徐文伯所吐官人髮瘕一同蟲出立安果園劉子平妻腹中有塊如瓢十八年矣經水㫁絶諸法無措戴人令一月之内涌四次下六次所云痰約三桶其中不化之物如有葵菜者爛魚腸之狀涌時以木如意攪之病積如刮漸漸乃平及積之既盡塊痕反䨟如常畧無少損至是而面有童色經水復行若當年少可以有子當歸丸出千金方治婦女人臍下癥結刺痛如蟲所嚙及如錐刀所刺或赤白帶下十二疾腰疼痛月水或在月前月後當歸葶藶附子吳茱茰大黄各二兩黄芩桂心乾薑牡丹芎藭各一兩半秦椒細辛柴胡厚朴各一兩六銖牡蒙一方無甘草各一兩蝱蟲水蛭各五十枚右為末蜜和丸如梧桐子大空心酒下十丸日再有胎勿服之晞露丸濟生拔萃治寒傷於内氣凝不流結於腸外久為癥瘕時作疼痛腰不得伸京三稜廣茂各一兩剉二味並酒浸乾漆五分洗去腥炒烟冷茴香三錢鹽炒硇砂四錢别研輕粉一錢别研川烏五錢炮去皮臍巴荳三十箇去皮廣茂三稜同炒令深黄色去巴荳不用青皮去白雄黄别研穿山甲炮各三錢麝香五分别研右除别研四味外為細末和勻生薑汁糊為丸梧桐子大每服三二十丸温生薑湯送下温酒亦得食前見晛丹出濟生拔萃方治客寒於下焦血氣閉塞而成瘕堅大久不消者附子四錢炮去皮臍鬼箭羽三錢澤㵼肉桂𤣥胡木香各二錢紫石英三錢梹榔三錢半血竭一錢半别研水蛭一錢炒令烟盡桃仁湯浸去皮尖炒黄色三十箇京三稜五錢剉大黄剉研二錢同三稜酒浸一宿焙乾右除血蝎桃仁外同為細末和勻用原浸酒打糊為丸如梧桐子大每服三十丸温醋湯送下温酒亦得食前三聖丸治積年癥瘕塊癖諸藥療理不産者舶上硫黄一兩水銀半兩硇砂一分炒去石右三物乳盆内滚研却生鐵銚内文武火熱鎔成汁以火筯攪令勻停冷剗下以紙裹置地坑内埋一宿取出再研細次以赤芍藥當歸京三稜蓬莪术紅花各一分同用並細剉以法酒一升煎及一半漉出砂盆内研生布裂汁再熬放冷入飛羅麵為糊搜丸如菉荳大治因産後傷於飲食結伏在内脇時發疼痛不可忍者當歸浸酒一升逐旋取酒煖下七丸每服磨癖塊空心温酒下三丸至五丸湏令藥滓裂了焙乾為末别入乾薑半兩真蒲黄芫花各二分醋炒焦黃右為末以前一般糊丸如菉荳大治女人血臟冷氣攻心疼及一切血疾温酒下十丸枳實梹榔丸醫方大成治婦人癥瘕塊有似姙孕服此藥安養胎氣調和經候血氣通和寛膈美食可以久服枳殻炒一作枳實梹榔黄連黄蘖去皮黄芩當歸阿膠蛤粉炒别研木香各半兩右為末水丸如小荳大温米湯飮下三十丸日三服不計時候桂枝茯苓丸金匱方治婦人宿有癥瘕姙娠經㫁未及三月即動此癥也經㫁三月時得漏下不止胎動在臍上者為癥痼害當去其癥久論姙娠六月動者前三月經水利時胎下血者後㫁三月下血者也所以下血不止者其癥不去故也當下其癥桂心茯苓牡丹皮桃仁去皮尖麩炒芍藥各等分右為末煉蜜丸如彈子大每服一丸嚼細温酒米湯送下食前服自一加至三丸治子門閇血聚腹中生肉癥臟寒所致方出千金方乾漆半斤生地黄汁三斤生牛膝汁一斤右先搗漆末内汁中攪微火煎為丸如梧桐子大酒服三丸日再若覺腹中痛食後服之治卒暴癥腹中有如刺晝夜啼右用牛膝二斤以酒二斗漬宻封熱火灰中温令味出服五合一升量力服治癥瘕出華陀中懴經大黄濕紙煨硇砂三稜濕紙裹煨乘熱細剉乾漆炒至烟盡巴荳去皮出油各一兩入醋一升熬成膏入藥如後木香丁香枳殻湯浸去穰麩炒黃色桂心各一兩半右同丸如菉荳大米湯下三丸治婦人小腸癥瘕諸疾出本草以㙠末服之梁四公子傳曰交河之間平磧中握深一丈下有㙠柏黑逾純漆或大如車輪末服之攻婦人小膓癥瘕諸疾治卒暴癥腹中有物堅如石痛欲死出本草取蒴藋根一小束洗瀝去水細擘酒二升漬三宿煖温服五合至一升日三若欲速得服於熱灰中温令藥味出服之此方無毒已愈十六人神騐藥盡復作服之治婦人月閉風氣羸瘦癥瘕久服令人有子出本草取木麻用以燒酒服八瘕附論黄帝問於素女曰吾聞天下婦人產乳有子而病者未曽生子而病者又産乳後而中絶不復産者何也諸病從主而令婦人腹中有積聚胷脇腰背攣而痛久而八瘕之聚病深可畏不在腸胃療之或者已復其狀寕可得聞之乎對曰婦人之病皆於月病生產所致又從胞胎所起其病不同鍼灸食藥不得其方也黄帝曰安心其要易聞之為寶受之良久詳思念其事曰善哉療將奈何素女曰誠為主說婦人胞胎之數背在隂裏萬物皆從生淵深血脈精氣所從行腎為隂隂主開閉左為胞門右為子戸主定月水生子之道胞門主於子精精神氣所出入合於中黃門玉門四邊主持關禁閉子精臍下三寸名曰闗元主藏魂魄婦人之胞三焦之腑常所從止然婦人經脈俞絡合調則月水如時來至故能生子而無病婦人榮衛經絡㫁絶不通其人思惟邪氣便得往來入合於子臟若生惡露未巳合隂陽即令婦人經脈攣急令人小腹裏急支滿胷脇腰背相引痛苦四肢酸削飲食不調結牢惡血不除月水不時或在前或在後作久不止因生積聚如懐胎狀邪氣盛甚人恍惚多夢寒熱四肢不欲時動隂中生氣腫肉生風甚者小便不利苦痛如淋狀面目黄黑嵗月久即不復生子也方一曰黄瘕婦人月水始下若新傷墜血氣未止卧寢未定五臟六腑虚羸精神不定因向大風便利隂陽開閉闗節四逺中於風濕氣從下上入於隂中稽留不去名為隂虛則生黃瘕之聚令人病苦四肢寒熱身重淋露卧不欲食左脇下有氣結牢不可得抑苦病腰背相引痛月水不利則善令人不產小腹及下引隂中如刺不得小便或時寒熱下赤黄汁病苦如此令人無子療當刺闗元氣衝行以毒藥有法療瘕當下即愈矣皂莢散出聖惠方療黄瘕導方皂莢一兩炙去皮子蜀椒一兩去汁細辛六分右搗散以三角囊大如指長二寸貯之取納隂中欲便悶則出之已則復内之惡血畢出乃洗以温湯三日勿近男子忌生菜等二曰青瘕青瘕者婦人新生未滿十日起行下以湯浣洗大蜜隂陽虛玉門四邊皆解散子戸未安定骨肉皆痛手臂不舉飲食未下腹中藏吸吸久當風卧不自隱為障若居濕地及温席令人苦寒洒洒入腹中心腹煩悶沉淖惡血不出結熱不得散則生青瘕之聚在左右脇下藏於背脊上與肩甲腰下攣急兩足腹下有氣起喜唾不可多食四肢不欲動搖恍忽善夢手足腫面目黄大小便難其候月水不通利或不自禁狀如崩中此自過所致令人少子療之當刺胃管行以素藥有法瘕當下即愈矣療青瘕導藥方出聖恵方戎鹽一升皂莢半兩去皮子炙細辛一兩右搗散以三角囊大如指長三寸貯之内隂中但卧瘕當下青如葵汁養之如産法三曰燥瘕燥瘕者婦人月水不調惡血未盡其人虛憊而以夏月熱行疾步若舉重移輕汗出交流氣力未平而卒以恚怒致腹中猥咽不泄經脈攣急内結不舒煩滿少力氣上達膈中背膂小腹壅急月水與氣俱不通利而反以飲清快心月水横流溢入他臟不去有熱則生燥瘕之聚大如半杯上下腹中苦痛在内脇下上引心而煩害飲食欲嘔吐胷及腹中不得太息腰背重喜卧盗汗足酸削久立而痛小便失時忽然自出若失精月水閉塞大便澁難有此病令人少子療之以長鍼按而刺之法度行以毒藥瘕當下即愈矣療燥瘕方出聖惠方大黄如雞子許乾薑二兩黄連三兩雞膍胵中黄膜一枚炙桂心一尺䗪蟲三枚熬厚朴十顆炙郁李仁一兩去皮尖煎熬右搗散早朝空腹以温酒一盞和三錢頓服瘕當下下畢養之如產婦法三月無子者當有三月勿合隂陽四曰血瘕血瘕者婦人月水新下未滿日數而中止因飲食過度五榖氣盛溢入他臟若大飢寒吸吸不足呼吸未調而自勞動血不走腸胃之間流落不去内有寒熱與月水合會則生血瘕之聚令人腰痛不可以俯仰横脇下有積氣牢如石小腹裹急苦痛背膂痛腰股下痛隂裏若生子風冷子門僻月水不時乍來乍去有此病令人無子療之瘕當下即愈矣儒門事親書云汴京曹大使女既笄病血瘕數年大醫宣企賢以砂血等血藥治之不愈企賢曰除得陳州張大腸乃愈一日戴人承詔至汴京曹大使乃邀戴人問焉戴人曰小腸熱遺然於大腸為慮痰瘕結硬如塊面黄䏎瘦乃用涌泄之法數年之病不再旬而効女由是得聘企賢問誰治之曹大使曰張戴人企賢立使邀之凡婦人月事沉滯數月不行肌肉漸减内經曰小腸熱已滿移於大腸則伏瘕為沉沉者月事沉滯不行故云伏瘕急宜桃仁承氣湯加歸大作劑料煎服立愈後用四物湯補之更服宜明中梹榔丸療婦人血瘕痛出聖惠方乾薑烏賊魚骨各一兩炙桃仁一兩去皮尖炒研右搗散酒服二方寸匕日二一方無桃仁又方出聖惠方右取古鐵秤鎚或大斧頭或鐵杵以炭火燒令赤投酒三升中稍飲之又方出聖惠方右桂末温酒服方寸匕佳日二療婦人血瘕攻刺腹脇時痛導藥方出聖惠方大黄當歸各半兩山茱萸一兩皂莢一兩去皮子細辛戎鹽各六銖三稜煎丸出濟生方治婦人室女血瘕月經不通臍下堅結大如盃升久而不治必成血蠱京三稜蓬术各二兩芫花半兩青皮去穰淨一兩半右剉如荳大用好醋一升煑乾焙為細末醋糊為丸如梧桐子大每服五十丸食前淡醋湯吞下治婦人血蠱大抵經脈不通即成血蠱馬鞭草水楊梅根杜牛膝根澤蘭根杜當歸各等分右打爛浸酒無時温服硇砂丸治血蠱塊等疾硇砂半兩蝱蟲四十九箇水蛭炒黒粉霜三錢丁香乾漆炒令烟出白丁香甘遂炮牡蠣大麥炒梹榔各五錢膽礬三錢阿魏一錢研大棗五十枚去皮核木香五錢右為細末用棗肉丸每服十丸任湯使下琥珀丸出醫方集成治婦人血瘕腹中有塊攻刺小腹瘇重或腰背相引而痛久而不治黄痩羸乏琥珀别研白芍藥川烏炮去皮川牛膝去蘆酒浸鱉甲醋炙蓬莪荗炮當歸去蘆酒浸紫厚朴薑製不炒各一兩木香不見火澤蘭葉官桂不見火各半兩麝香别研半錢右為細末酒糊為丸如梧桐子大每服七十丸空心温酒米飲任下硝石湯出千金方治虚瘕月水畱於瘀血大便不通下病散堅血方硝石附子蝱蟲各三兩大黄細辛乾薑黄芩各一兩芍藥土瓜根丹參代赭蠐螬各二兩大棗十枚桃仁一升牛膝一升朴硝四兩右㕮咀酒五升水九升漬藥一宿明旦煎取四升去滓下朴硝硝石烊盡分四服相去如炊頃去病後食黄鴨羮勿見風治婦人血瘕痛臍下脹不下食出拔萃方當歸二兩桂心芍藥血竭蒲黄各一兩半延胡索一兩右為細末每服二錢無灰酒調下丁香脾積丸出如宜方治血臌莪术三兩三稜二兩良薑二兩青皮一兩丁香木香各半兩皂莢三大枚燒存性巴荳半兩去壳别研右以莪术三稜良薑三味同米醋一升於磁器内煑乾將三味並乘熱切碎同焙乾為末入百草霜三匙并巴荳同細麵為糊丸如麻仁大每服五丸或七丸至十五丸二十丸止食傷隨物下脾積氣陳皮湯下吐酸薑湯下小兒疳君子湯下孕婦勿服如血臌加琥珀麝香飲湯下破血瘕痛出本草用越砥石燒投酒中服治婦人血瘕出本草以烏賊魚骨細研為末米飲下之治婦人血瘕及積塊出本草以山蒜苦醋摩服多妙五曰脂瘕脂瘕者婦人月水新來若生未滿三十日其人未復以合隂陽絡脈分胞門傷子戸失禁關節散五臟六腑津液流行隂道瞤動六脈關樞四解不見其形子精與血氣相遇犯禁子精化不足成子則生脂瘕之聚令人支滿裏急痛痺引小腹重腰背如刺四肢不舉飲食不甘卧不安席左右走腹中切痛時瘥時甚或時少氣頭眩身體疼解苦寒惡風膀胱脹月水乍來乍去不如常度大小便血不止有此病者令人無子療之當刺以長鍼行以毒藥瘕當下即愈矣療脂瘕出聖惠方皂莢十八銖去皮子礬石六銖炒五味子蜀椒去汗細辛乾薑半兩右搗散以香脂和如大荳著男子隂頭以合隂陽不三行其瘕乃愈療婦人絶不復生及未曽生皆以脂瘕腹中有塊以湯煎自下尚不受子導散方出聖惠方皂莢炙去子皮吳茱萸當歸各一兩蜀椒炒二兩細辛熬礬石燒五味子各三分大黄戎鹽乾薑二兩右搗篩散以輕絹袋如指大長三寸盛藥令滿納隂中坐卧随意勿行走小便時去之别換新者六曰狐瘕狐瘕者婦人月水當日數來而反悲哀自恐若以逺行逢暴風疾雨電雷驚恐衣被濕沉罷倦少氣心中恍惚未定四肢懈惰憎寒苦寤寐脈氣絶精神游亡邪氣入於隂裏不去則生狐瘕之聚食人子月水閉不通小腹瘀滯胷脇腰背痛隂中腫小便難胞門子戸不受男精不藏氣盛令人嗜食欲嘔喜唾多所思如有身狀四肢不舉有此病者終身無子其瘕有手足卒成形者殺人無者可療以長鍼急持刺之行以毒藥有法瘕當下即愈矣療狐瘕出聖惠方右取新死䑕一枚裹以新絮塗以黄土穿地坎足没䑕行置其中桑薪灼其上一日一夜出絮納桂心末六銖酒服二方寸匕病當下甚者不過再服瘥七曰蛇瘕蛇瘕者婦人月水以下新止適閉未復胞門子戸勞動隂陽未平榮衛分行若其中風暴病羸劣飲食未調若起行當風及度泥涂因衝寒太早若坐濕地名曰隂陽亂腹中虚若逺行道路伏飲汚井之水不潔之食通吞蛇䑕之精流落不去則生蛇瘕之聚上食人之肝心若病長大條條在臍臍上還絞左右脇不得吐氣兩肢間苦疼小腹多熱小便赤黄膀胱引隂中攣急腰背俱痛難以動作喜發寒熱月水或多或少有此病者不復生子其瘕手足成形者殺人未者可治之療有法行以毒藥瘕當下即愈矣療蛇瘕方出聖惠方大黄黄芩芒硝各半兩甘草大如指一尺炙烏賊魚骨二枚皂莢六枚去皮子尖醋炙右搗以水六升煑之三沸下絞去滓下硝通口温服之十日一劑空心服服之當下八曰鼈瘕鼈瘕者婦人月水新至其人劇作罷痿疲勞汗出衣服潤濕不以時去之若當風睡足踐濕地恍惚覺寤蹠立未安顏色未平復見所好為開蕩魂魄感動五内脱消若入水浣洗沐浴不以時出而神不守水氣與邪氣俱入至三焦之中又暮出入或門先閉津液妄行畱落不去則生鼈瘕之聚大如小杯令人小腹内切痛惡氣左右走上下腹中苦痛若存若亡按之躍手下引隂裏腰背亦痛不可以息月水不通面目黃黑脱聲少氣有此病者令人絶子其瘕有手足成形者殺人未者可治之療有法度以長鍼按療之行以毒藥療鼈瘕當下即愈矣療鼈瘕方出聖惠方大黃六分乾薑側子各半兩附子人參各九銖􅟟蟲一寸七熬桂心一兩六銖細辛土䱉各十八銖白术一兩右搗散以酒服方寸七日三以上八般瘕疾出古今録驗治鼈瘕及心腹宿癥及卒得癥右以白雄雞屎無論多少小便和之於器中火上熬令燥未服方寸匕多服不限度以膏熬飯飼彌佳食癥附論夫婦人有食癥者由臟腑虚弱月候來時食生冷之物脾胃既虚不能消化與臟氣相摶結聚成塊日漸生長盤牢不移故謂食癥也方續隨子方治婦人食癥積年不瘥續随子一兩㣲炒雄黄一分另研木香一分臙脂一分麝香一分研乾薑一分炮裂不剉硃砂一分細研硇砂不夾石者一分細研右為細末如研了藥令勻酒煑麵糊丸菉荳大每服薑湯下三丸乾漆丸治婦人食癥夾惡血氣攻刺腹脇痛不止乾漆一兩細研芫花一分醋拌炒令乾當歸一分剉微炒五靈脂一分硇砂一兩細研香墨一分麝香半兩細研巴荳十枚去皮心紙裹壓去油右為末同研令勻用醋煑麵糊和丸如菉荳大每服空心温酒下五丸硇砂丸治婦人食癥塊久不消攻刺心腹疼痛青礞石末巴荳去皮心油硃砂粉霜並研木香末各一分硇砂半兩右研令勻以糯米軟飯和丸如菉荳大每服二丸空心温酒下取下惡物為度破癥丸治婦人食癥塊攻心腹疼痛巴荳十枚去心皮研紙裹壓去油川烏頭一分炮製去皮臍膽礬一分五靈脂一分芫花一分醋炙乾百草霜右為末煑棗納和丸如菉荳大每服以生薑醋湯下五丸化癥丸治婦人食癥腹脹氣急面目浮腫四肢無力硇砂半兩細研巴荳十枚去皮心研紙裹壓去油五靈脂半兩乾薑半兩製剉雄雀糞半兩微炒黃猪牙皂莢半兩去皮子塗醋炙令黃右為末同研令勻用醋煑麵糊丸如菉荳大每服空心温酒下五丸芫花丸治婦人宿食不消結成癥塊兼血氣疼痛巴荳二十枚去皮心紙裹壓去油芫花一兩醋拌炒令乾川烏頭半兩炮去皮臍防葵一分硇砂半兩細研麝香一錢細研右為末同研令勻用頭醋煎為膏和如梧桐子大每服以當歸酒下十三丸香墨丸治婦人積食癥及血氣香墨半兩芫花一兩醋拌炒令乾川大黃半兩剉碎㣲炒青礞石半兩巴荳一分去皮心研紙裹壓去油硇砂半兩細研右為末同研令勻醋煑糊丸如小荳大每服空心暖乾薑湯下五丸硫黄丸治婦人食癥久不消硫黄半兩細研硃砂半兩細研青礞石半兩細研芫花一分醋拌炒令乾為末麝香一錢細研巴荳半兩去皮心紙裹壓去油右研令勻以酒煑麵糊丸如菉荳大每服空心以生薑酒下三丸五靈脂丸治婦人食癥體瘦成癆心腹脹痛不進飲食常吐酸水五靈脂半兩硫黄半兩細研硇砂半兩不夾石者細研芫花半兩醋拌炒令乾巴荳四十九枚去皮油木香半兩右為末入研了藥勻以醋煑麵糊丸如菉荳大每服空心生薑橘皮湯下二丸膩粉丸治婦人逺年食癥黄瘦不欲飲食宜服膩粉一錢硇砂一錢青黛赤石脂各一錢巴荳十枚去心油右都研令極細以蒸餅和丸如菉荳大每日五更初酒下三丸如下得惡物看多少次日更加减服之治婦人久積食癥及經脈不通心腹疼痛宜服此方出聖惠方硇砂一兩細研巴荳一兩去心紙裹壓油芫花一兩醋拌炒令乾搗末右細研令勻用釅醋三升同煎成膏候可丸即丸黍米大空心以當歸酒下三丸草粉散出聖惠方治婦人久積食癥腹中結塊面目浮腫宜服雄雀糞半兩微炒細研膩粉半兩右藥以搜了麵一雞子大相和攤作餅子􅘤熟候乾搗羅為散每服一錢五更初温酒調服以利下惡物為効食魚鱠及生肉在胷膈不化必成癥出夲草右用搗馬鞭草汁飲之一升生薑水亦得即消血癥附論夫婦人積年血癥塊者由寒温失節臟腑氣虚風冷在内飲食不消與血氣相結漸生塊瘕盤牢不移動者是也此皆因氣血勞傷月水往來否澀惡血不除結聚所生也久而不瘥則心腹兩脇苦痛害於飲食肌膂羸痩也血之為病胃悶煩躁迷忘驚狂痰嘔汗多骨熱肢冷此外證然耳何以知其畜在下焦曰臍下結急外熱内痛尺脈洪而數也桃仁靈脂生地黄北大黃甘草以逐之方阿魏丸治婦人乾血氣血癥塊血竭硇砂各三錢丁香二錢蓬术荆三稜没藥各半兩芫青炒紅娘子蝱蟲水蛭炒各二錢阿魏半兩乾漆四錢炒令烟盡地膽半兩班猫二錢炒去翅海馬一對炒甘遂半兩人參半兩當歸一兩猪脊半兩麝香少許穿山甲三錢蛤粉炒右為細末醋糊丸每服三十丸空心醋湯下琥珀丸出聖惠方治婦人積年血癥塊不消若鬼胎之候琥珀研桂心牛膝芫花製梹榔桃仁各三分炒生地黄延胡索當歸各半兩鼈甲三稜乾漆炒硇砂各一兩大黄二兩蝱蟲四十九枚去翅足炒水蛭四十九枚炒右為末醋煑硇砂為膏入藥末和搗三二百杵丸如梧桐子大每服十丸空心温酒下消腹内血塊出百一選方舶上茴香益智仁延胡索陳橘紅肉桂蓬术乾薑各半兩附子兩箇炮去皮臍乳香沉香白术人參當歸木香白芍藥各一兩右為細末棗肉為丸每服六十丸醋湯吞下温酒亦得没藥丸治婦人血塊血積血瘕及候不行没藥研麒麟竭丁香炒沉香各一錢桂去麄皮京三稜炮剉蓬莪术炮剉當歸切炒各半兩班猫糯米同炒去頭足翅一分芫花半兩醋炒焦乾漆一兩炒烟出芸臺子一分炒硇砂半兩研右搗研為末和勻醋煑麵糊丸如梧桐子大每服十丸至二十丸空心食前生薑醋湯下治風血癥瘕塊出本草右取冬天桑灰淋釅汁作食服三升又方出本草右取鼈一頭治如食法以桑灰汁煎如泥和諸癥藥重煎堪丸衆手捻成丸日服十五丸癥瘕痃癖無不瘥者大腹皮飲出大全良方治婦人血癭單單腹腫大腹皮防己木通厚朴薑製栝樓黄耆枳殻麩炒桑白皮炙大黄蒸陳皮青皮五味子各等分右㕮咀每服秤一兩水一盞半煎至六分去滓入酒一分温服不以時候乾漆丸出聖惠方治婦人積年血癥塊或攻心腹疼痛四肢不和面少血色飲食全少乾漆炒令烟盡大黄炒各一兩琥珀硇砂研硝石研莪荗各三分紅花延胡索桂心各半兩膩粉一分巴荳三十粒去皮心研去油用漿水二盞浸如餳右為細末用棗肉和丸如梧桐子大每服五丸於日未出時煎蘇木湯吞下量患人輕重加减服之石莖散出三因方治婦人血結胞門或為癥瘕在腹脇間心腹脹滿腫急如石水狀俗謂之血蠱石莖一兩當歸尾馬鞭草紅花炒烏梅肉各半兩蓬莪术三稜並炮蘇木節没藥琥珀别研各一分甘草炙一錢右為末濃煎蘇木酒調下二錢不飲酒薑棗煎湯亦可調下治婦人血膈若血崩者服之經血膈者服之出百一選方生地黄熟地黄甘草炙柴胡白芍藥當歸地骨皮牡丹皮𤣥胡索川芎各二兩用右為麄末每服三錢水一盞同古老錢一兩文煎至熟入麻油一兩㸃候煎及八分去滓熱服空心食前忌魚腥之類如聖丸出聖惠方治婦人血癥積久不散值天隂即疼痛宜服硇砂一分砒一分硝石一分以上三味同研如粉當歸一兩别擣羅為末桂心乾薑炮製牛李子酒拌炒乾以上各半兩一處擣羅為末巴荳半兩細研紙裹壓去油右藥用無灰酒一升入當歸末及巴荳於磁器中漫火熬成膏下硇砂三味攪令勻次下諸藥末拌和為丸如菉荳大每日空心温酒下三丸晩食前再服以利下惡物為度烏頭丸出聖惠方治婦人積年血氣癥塊往來疼痛或吐逆不納食漸黄瘦至極者川烏頭半兩炮製去皮臍乾薑半兩炮製剉當歸半兩剉微炒赤芍藥半兩大黄一兩㣲炒桂心半兩班猫十一枚糯米拌炒令黃去翅足右為末用醋煑麵糊丸如菉荳大每服空心以酒下五丸五靈脂丸出聖惠方治婦人積年癥塊及惡血氣久不除五靈脂乾漆炒煙川烏各一兩炮麝香硫黄硇砂並研各半兩巴荳三十枚去皮醋煑赤右為末研勻醋煑麵糊丸如菉荳大每服五丸空心温酒下生丸丹出仁孝方治婦人衝任虚損經脈不調積滯流注血閉血塊血癥血瘕血癖停阻腰脚臍腹久痛寒熱有時面赤口乾黄瘦困倦四肢顫掉起坐艱迤邐勞疾喘𠻳盗汗便溺頻多鬢髮脱落或室女經脈滯結皆療之牡丹皮頭紅花肉桂去皮川當歸去苗各一兩丁香揀半兩硃砂半兩為末白馬通灰三錢右為細末煉蜜為丸如梧桐子大每服十丸空心食前熱酒下日進三服十日減病二十日驗一月大効如睡卧不寜加人參更妙覷患老少輕重加減芫花丸出聖惠方治婦人積年血癥塊不消時有疼痛芫花半兩醋拌炒令乾硃砂三分細研硇砂一兩不夾石者細研麝香一錢川大黄半兩碎㣲炒搗作末桃仁半兩湯浸去尖雙仁麩炒黄右為末用醋煑麵糊丸如小荳大每日空心以温酒下十丸硇砂丸出聖惠方治婦人積年癥塊不消硇砂乾漆雄黄巴荳十粒去油水銀以少肥棗研無星雄雀糞各一分右研勻用棗肉丸如菉荳大空心當歸酒下三丸臨卧再服取下惡物為度黑聖散出聖惠方治婦人積年血氣癥塊攻心疼痛悶亂徧宜服白馬䕶肝一兩燒灰赤騾䕶肝一兩燒灰紫驢䕶肝一兩燒灰乾漆一兩搗碎炒令烟出麝香一分細研右為散入麝香更研令勻每服不計時候用熱酒調下一錢治婦人積年血癥塊不消腹脇疼痛出聖惠方硇砂三分硫黄三分水三大盞煑盡取出麒麟竭三分末巴荳一分去皮心紙裏裹壓去油炒令黃右細研用糯米飯和丸如黍粒大每服空心當歸酒下五丸大黄煎出聖惠方治婦人積年血氣癥塊結痛川大黄三分碎㣲炒鼈甲一兩塗醋炙令去裙襴牛膝一兩去苗乾漆一兩搗碎炒令煙出右為末用米醋一升煎為膏每服食前熱酒調下一錢大紅花丸出宣明論治婦人血積聚癥瘕經絡澁滯川大黄紅花各二兩蝱蟲十箇去翅足右取大黄七錢醋熬成膏和藥丸如梧桐子大每服五七丸温酒下食後日三服烏金散出三因方治婦人血氣血癥血風勞心躁煩筋骨疼痛四肢困瘦好黑荳十兩没藥當歸各半兩洗焙乾為末右先將黑荳不犯水浄拭用砂瓶一隻入荳在内以瓦片葢鹽泥固濟留嘴通氣炭灰二斤鍛烟盡存性以鹽泥塞瓶嘴退火次日取出荳如鵶糞研細為末後入研勻不拘時候温酒調下二錢重者不過三五服忌鯉魚毒肉水母之類治婦人積年血氣癥塊結痛出聖惠方芫花一兩醋拌炒令乾當歸一兩㣲炒桂心一兩右為末以軟飯和丸如梧桐子大每服食前熱酒送下十丸熨癥法右用茱萸二升辟之以酒和煑熟布裹熨癥上冷更炒更畨用之癥移走逐熨之候消乃止也治婦人病塊肺訣所謂濇脈如刀刮竹形主丈夫傷精女人敗血以舟車丸百餘粒後以調胃承氣湯加當歸桃仁三換水煎乘熱投之兩日又以舟車丸桃仁承氣湯㵼青黄膿血雜然而下每更水以手向下推之探之則出後三二日又用舟車丸以猪腎散佐之一二日又以舟車丸通經如前數服病十去九候晴明當未食前以鍼㵼三隂交穴不再旬塊已蔑矣酌聖丹出仁存方治婦人血積血塊血氣產後諸血滯痛寒熱四肢困倦脚頑麻沉重黄瘦臍腹久冷巴荳二十箇去皮心細研鹽醋一盞熬膏半盞没藥半兩末蓬莪术四錢右丸如梧桐子大每服三五丸紅花酒下三兩服積滯惡血自過空心食前虚衰婦人加乾薑一兩治婦人血結腰腹痛右用牛膝一大把并藥不以多少酒煑服之立愈治婦人血癖痛出本草右用大黄三兩搗篩以酒二升煑十沸頓服治婦人破血通久積右取澤蘭細剉之用絹袋盛懸於屋南畔更宜令乾用治婦人血塊出本草以牛膝乾根浄洗切焙乾搗下篩酒煎温服極効治婦人血塊出本草以蛤蜊煑食之治婦人血塊出本草用獨脚仙夏採根葉連梗焙乾為末酒煎半錢服之主老血結塊破血止血出本草用楊廬柑煑服之破血出本草用馬莧汁飲之主破血出本草以桃仁煑服之三載者良疝瘕附論大全良方云夫婦人疝瘕之病者由飲食不節寒温不調氣血勞傷臓腑虛弱受於風冷冷入腹内與血相結所生疝者痛也瘕者癥也其結聚浮假而痛推移乃動也婦人之病有異於丈夫者或因産後血虚受寒或因經水往來取冷過度非獨飲食失節多挾於血氣所成也診婦人疝瘕其脈弦急者生虚弱小者死又尺脈濇如浮牢為血實氣虚也其發腹痛逆氣上行此為婦人胞中絶傷有惡血久則結成瘕也方乾漆散出聖惠方治婦人疝瘕久不消令人黄瘦尫羸内脇妨悶心腹疼痛乾漆炒令烟盡木香芫花醋炒赤芍藥桂心當歸川芎琥珀各半兩大黄二兩炒牛膝三分桃仁一兩麝香一分右為細末無時温酒調下一錢當歸散出聖惠方治婦人疝瘕及血氣攻刺心腹疼痛不可忍當歸一兩微炒鼈甲二兩塗醋炙令黃去裙襴芎藭半兩蓬莪术二分吳茱萸半兩湯浸七遍焙乾㣲炒桂心一兩赤芍藥三分木香半兩梹榔一兩青橘皮半兩湯浸去白穰焙川大黄一兩㣲炒桃仁去皮尖雙仁麩炒三分右為散每服三錢水一盞入生薑半分煎至六分去滓不計時候稍熱服琥珀丸治婦人疝瘕兼血氣臍腹疼痛不欲飲食四肢羸痩琥珀半兩細研當歸半兩㣲炒芎藭半兩牛膝一兩去苗荆三稜一兩煨微炒桂心半兩川大黄一兩剉微炒川烏頭半兩炮製去皮尖乾漆半兩搗碎炒令煙出桃仁三分湯浸去皮尖雙仁麩炒鼈甲一兩塗醋炙令黄去裙襴右為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候煖酒下二十丸木香散治婦人疝瘕及血氣積聚時攻腹脇疼痛木香半兩巴荳一分去皮心麩炒黄紙裹壓去油乾漆半兩搗碎炒令煙出吳茱萸一分湯泡七遍焙乾梹榔半兩白蕪荑一分猪牙皂莢一分去皮塗醋炙黄令去子附子一分炮製去皮臍當歸㣲炒桂心乾薑炮製剉以上各一分右為末煉蜜和搗三五百杵丸如梧桐子大每日空心及痛發時煎紅花當歸酒下三丸如聖丸治婦人疝瘕惡積聚并月候不通班猫半兩糯米拌炒令黄去翅足桂心硇砂半兩細研麒麟竭没藥莽草微炒狼毒鬼箭羽没心草各半兩右為末醋煑麵糊和丸如梧桐子大每日空心食前煎紅藍花温酒下五丸桃仁散治婦人疝瘕腹中拘急心脇脹滿宜服桃仁一兩湯浸去皮尖又雙仁麩炒㣲黄芎藭梹榔右為散每服四錢水一盞入生薑半分煎至六分去滓食前温酒服之當歸湯治婦人寒疝虛勞不足若産後腹中絞痛當歸芍藥各二兩子母秘録作耳生薑五兩羊肉一斤右㕮咀以水八升煑羊肉熟取汁煎藥得三升適寒温服七合日三金匱方胡洽不用芍藥名小羊肉湯硇砂丸出聖惠方治婦人疝瘕及積瘀血在臟時攻腹脇疼痛川芒硝硇砂各一兩當歸雄黄桂心各半兩大黄炮三稜各二兩右為細末用米醋一碗熬大黄末為膏以入餘藥末和丸如梧桐子大空心温酒吞十丸漸漸加至三十丸以利下惡物為度黑神丸出大全良方神麯茴香各四兩木香梹榔四枚椒炒香出汗丁香各半兩漆六兩半生半熟重湯煑半日令香右除椒漆五物皆半生半炒為細末用前生熟漆和丸如彈子大茴香末十二兩鋪隂地䕃乾候丸乾并茴香収器中極乾去茴香腎餘育腸膀胱痃癖及疝墜五膈血崩產後諸血漏下赤白並一丸分四服死胎一丸皆綿灰酒下難產炒葵子四十九枚搗碎酒煎下一丸諸疾不過三服痃氣十服膈氣癥瘕五服血瘕三丸當瘥予族子婦病腹中有大塊如杯每發痛不可忍時子婦已貴京下善醫者悉常服有藥莫愈陳應之曰此血瘕也投黑神丸盡三丸散氣盡滿終身不復作巴荳丸出聖惠方治婦人疝瘕及血氣疼痛巴荳去皮心醋炙半日一分桃仁三分木香半兩右為末煉蜜丸如菉荳大淡湯空心下五丸熱酒亦可鼈甲散出聖惠方治婦人疝瘕及血氣心腹疼痛鼈甲一枚中者以小便半盞塗炙令盡為度去裙襴乾漆一兩搗碎炒令煙出當歸一兩剉㣲炒琥珀一兩桂心半兩右為散每服不計時候熱酒調下三錢大黄丸出聖惠方治婦人疝瘕及胞門中積瘀諸病並宜服川大黄四兩蒸飯熱為度菜乾土瓜根二兩牛膝二兩去苗桃仁三兩湯浸去皮尖雙仁麩炒㣲黄右為末煉蜜和搗三二百杵丸如梧桐子大每服食前粥飲下三十丸治寒疝小腹及隂中相引痛自汗出欲死以丹參一兩杵為散每服熱酒調下二錢癥痞附論夫婦人癥痞者由冷熱不調飲食不節積在腹内或腸胃之間與臟氣結摶其牢强推之不移者名曰癥言其病形癥可驗也氣壅塞為痞言其氣痞澁不宣暢也皆得冷則發動刺痛癥病之痞其形冷結若冷氣入於子臟則使無子若冷氣入於胞絡摶於血得冷則澁亦令月水不通也治婦人癥痞及惡血氣攻心腹疼痛面無顏色四肢瘦弱宜服方恒山丸治臍下堅癖無所不治方千金云遼東都尉所方恒山大黄巴荳天雄二枚苦參白薇乾薑人參細辛狼牙龍膽沙參𤣥參丹參各三分芍藥附子牛膝茯苓各五分牡蒙四分蘆六分一方云二兩三分右為末蜜丸宿勿食服五丸日三大羸瘦月水不調當二十五日服之下長蟲或下種種病除三十五日腹中所苦悉愈肌膚盛五十日萬病除斷緒者有子蓬莪荗丸治婦人癥痞腹痛莪荗三錢當歸炒桂心赤芍藥梹榔枳殻木香昆布琥珀各半兩桃仁鼈甲大黄各一兩右為末煉蜜丸如梧桐子大食前粥飲下二十丸穿山甲散治婦人癥痞及血氣凝滯心腹妨痛四肢羸瘦時吐清水不欲飲食穿山甲炙令黄色荆三稜微炮剉二兩木香梹榔桂心各一兩白术三分鬼箭羽半兩桃仁三分湯浸去皮尖雙仁麩炒㣲黄川大黄剉碎㣲炒一兩鼈甲一兩半塗醋炙令黄去裙襴當歸剉㣲炒防葵各三分右為散每服四錢水一盞生薑半分煎至六分去滓食前稍服硇砂煎丸治婦人積年血氣癥痞不消四肢黄瘦腹脇妨痛經絡不通宜服硇砂一兩細研乾漆川大黄各一兩以上三味並搗羅為末以無灰酒一升漫火熬成膏入後藥鼈甲一兩塗醋炙令黄去裙襴没藥五靈脂各一兩狗膽一枚班猫七枚糯米拌炒令黄去翅足水蛭十枚炒令微黄巴荳七枚去皮心研紙裹壓去油右為末入煎膏和搗三二百杵如小荳大每於食前煖酒下五丸大黄丸治婦人癥痞及惡血築心悶亂疼痛四肢不和身體羸瘦不欲飲食川大黄一兩剉碎㣲炒鼈甲一兩塗醋炙黄去裙襴乾漆二分搗碎炒令煙出荆三稜一兩微炒炮剉吳茱萸半兩湯淘七遍焙乾微炒琥珀三分細研桂心半兩梹榔三分防葵半兩川烏三分炮製去皮臍右為末以釅醋一升半熬令稠煑麵糊和丸如梧桐子大每服不計時候以生薑醋湯下二十丸防葵散治婦人癥痞心腹脹硬如石經絡不利四肢瘦弱少思飲食防葵郁李仁湯浸去皮微炒桂心鬼箭羽桃仁湯浸去皮尖雙仁麩炒黄川大黄剉碎微炒以上各一兩吳茱萸一分湯浸七遍焙乾炒當歸一兩枳實半兩麵炒右為散每服三錢水一盞入生薑半分煎至六分去滓食前稍熱服桃仁散治婦人癥痞心腹脹滿不能飲食體瘦無力桃仁一兩湯浸去皮尖雙仁麩炒㣲黄訶梨勒皮白术當歸各三分荆三稜一兩㣲炒剉赤芍藥三分鼈甲一兩半塗醋炙去裙襴陳橘皮三分湯浸去白穰焙右為散每服三錢水一盞入生薑半分煎至六分去滓食前稍熱服之鼈甲丸治婦人癥痞冷氣或時攻心腹痛不能食四肢瘦弱鼈甲一兩塗醋炙令黄去裙襴木香半兩川大黄一兩半剉碎微炒當歸三分剉碎微炒用安息香半兩桂心半兩附子半兩炮製去皮臍阿魏半兩麵裹煨以麵熟為度右為末煉蜜和搗三百杵丸如梧桐子大每服食前煖酒下二十丸丁香丸治婦人癥痞結塊不散心腹疼痛雄雀糞炒黄鼈甲各一兩硇砂當歸炒芫花醋炙乾各半兩巴荳一分去皮心油右為末同研令勻醋煑麵糊丸如小荳大當歸酒下三丸香墨丸治婦人癥痞香墨硫黄硇砂硃砂各半兩麝香一分巴荳半兩去皮心紙裹壓去油右藥同研令極細以醋煑麵糊和丸如菉荳大每服空心以温酒下三丸水銀丸子治婦人癥痞結塊不散心腹疼痛水銀一兩硫黄半兩硇砂一兩硝一分白礬一分芫花一兩醋拌炒令乾搗末右藥同研如麵入銚子中簇火漸燒起將濕紙搭却將下候冷更燒如此三度即止候冷都細研令勻用軟飯和丸如菉荳大每食前酒下七丸芫花丸治婦人癥痞心腹脹硬疼痛芫花大㦸甘遂各一兩木香半兩别搗為末巴荳一兩去皮心紙裹壓去油右先以芫花等四味搗碎用米醋一大盞煑令乾搗為末研入巴荳以醋煑麵糊丸如菉荳大每服空心以生薑湯下二丸穿山甲散治婦人癥痞及惡血氣攻心腹痛面痿肌痩穿山甲灰炒鼈甲醋炙赤芍藥大黄炒乾漆炒令煙盡桂心各一兩川芎芫花醋炙當歸各半兩麝香一分右為細末入麝香合勻每服一錢無時熱酒調下普濟方卷三百二十四
