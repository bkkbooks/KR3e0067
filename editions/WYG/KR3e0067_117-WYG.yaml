body:
  text: 普濟方卷一百十八明周王朱橚撰寒暑濕門中熱論夫濕者天之陰雨宿霧地之山澤蒸氣人或中之必溢於血脉而流於關節也其或乆處卑濕常住水涇或冐雨露而行勞傷汗出衣裏冷濕皆能爲病經云濕爲停着左傳曰滛腹疾是以受濕之人一身痛重百節痠痛四肢腫滿筋脈弛長發熱惡寒小便秘澁大便飱泄也若氣不和平濕中稍重亦令人半身不遂口眼喎斜涎潮昬塞有類風證治之之法宜利小便治濕不利其小便非其治也宜於滲湯方下求之忌不得以火却發汗并妄轉瀉濕家悞汗必作痓令人角弓反張如中風狀下之則額上汗出㣲喘小便不利者死下利不止者亦死寒熱風濕皆能并合爲病故有風濕寒濕温證各不同爲治亦别不可不明辨也風濕者風氣與濕氣相搏也其證肢體煩重不可轉側筋脈掣痛不得屈伸額上㣲汗不欲去被或身㣲腫欲發其汗但漐漐身潤則風濕俱去若大發其汗則風氣去而濕氣相并也其證身體煩疼無汗惡寒發熱脈浮緩而細宜與麻黃白术湯以發散其表除濕去寒也中暑者脈沈而細㣲緩以濕溢肌肉肌肉浮則脉沈細夫濕者在天為雨在地為土在人為臟為脾故濕喜歸脾脾虚喜中濕故曰濕流關節之中多使人䐜脹四肢關節疼痛而煩乆則浮腫喘滿昏不知人著腎者腰痛身重如坐水中著脾者四肢浮腫不能屈伸挾風則眩暈嘔噦兼寒則拳拳痛或泄瀉發黃身熱鼻塞直視鄭聲虚汗脚氣腹中脹臍下堅次之夫風濕者是風氣與濕氣共傷於人也風者八方之虚風濕者水濕之蒸氣若地下濕復少霜雪其山水氣蒸兼值暖燠迎人腠理開便受風濕其狀令人懈惰精神昏憒若經乆亦令四肢緩縱不隨入臟則瘖瘂口舌不収或脚痺弱變為脚氣真誥云櫛頭理髮欲得多過通流血脈散風濕頻更易櫛器用之夫濕温者其人常傷於濕因而中暑或汗未乾即浴温熱相搏則發濕温病苦兩脛逆冷又胷多汗頭目痛苦妄言惡寒反熱關節盡疼手足倦怠不自勝持其脈陽濡而弱陰小而急治在太陰宜與茯苓白术湯不可發汗汗出必不能言耳聾不知所在身清而色變名曰重暍如此者醫殺之耳凡男子婦人小兒手足麻痺肌肉不仁者風寒濕三氣相雜至合為痺先用黃芩芍藥湯吐之吐訖次用通解丸通經而瀉之訖更用辛甘之劑汗之汗瀉之後可用當歸清涼飲子兼烏荆丸除濕丹和血行經之藥則愈矣凡男子婦人病水濕㵼注不止因服荳蔲烏梅薑附酸熱之劑經曰陽氣耗減於内陰精損削於外三焦閉溢水道不行水滿皮膚身體痞腫面黃腹大小便赤色兩足按之陷而不起内經曰諸濕腫滿皆屬脾土可用獨聖散吐之如時月寒涼宜於燠室不透風處用火一盆藉火力出汗次以導水禹功量病人虚實瀉十余行濕去腫減則愈矣是汗下吐三法俱行三法行畢臟腑空虚先宜以淡漿粥養腸胃三兩日次服五苓益元同煎或燈心湯調下亦可如大勢未盡更服神功散可以流濕潤燥分隂陽利水道旣平之後宜大將息慎忌油鹽酒菓房室等事三年則不復作矣方金砂流濕丸治男子婦人雜證及風濕酒濕木通一兩去皮澤㵼一兩半木香一兩白茯苓去皮大黃去皮各一兩半滑石五兩海金砂五錢牽牛頭末五兩郁李仁一兩右為末滴水丸如桐子大每服五十丸至八十丸生薑湯下忌濕麵如小便不通燈草湯下如傷酒生薑湯下酒疸食黃蘿蔔湯下痢疾高良薑湯下婦人血氣不調當歸湯下肢節疼痛温酒下心痛者韮根湯下膈氣枳實湯下中風槐角湯下除濕丹出宣明論治濕客搏腰膝重痛足脛浮腫檳榔甘遂赤芍藥葳靈仙葶藶各二兩乳香一兩研没藥一兩别研牽牛半兩大㦸炒三兩陳皮四兩去白澤㵼二兩右為細末麵糊為丸梧桐子大每五十丸加至八十丸食前温水送下得更衣止後服前後忌酒二日藥後忌濕麵甘草三兩日食温淡粥補胃一方無澤瀉桂苓白术丸出御藥院方治消痰逆止咳嗽散痞滿壅塞開堅結痛悶増進飲食調和臟腑無問寒濕濕熱吐瀉利皆能開發以令遍身流濕潤燥氣液宣平而愈解酒毒療肺痿勞嗽水腫腹脹泄瀉不能止者服之利止為度隨證調之官桂茯苓去皮半夏已上各一兩乾生薑一分白术橘紅皮去白澤瀉各半兩黃連半兩黃栢二兩右為末麵糊為丸如小豆大每服三五丸生薑湯下食後服桂苓白术散劉先生直格方治傷寒中風冐暑飲食内外一切所傷傳受温熱内甚或頭痛口乾或吐瀉損渇或小便赤澁大便急痛或瀉痢間作并一切濕熱霍亂吐瀉轉筋急痛腹滿或中外諸邪所傷而兼吐瀉者濕熱尤用之一名桂苓甘露飲方見本方門暑類舟車丸治積聚潮熱有時胃氣不和遍身腫滿或水濕蠱氣足腫腹脹氣凑不舒腹腸間結聚大便不通並皆治之甘遂煨陳皮青皮各一兩木香半兩芫花醋炒大㦸漿水浸一宿各一兩大黃二兩牽牛頭末四兩取蠱加蕪荑半兩右為細末水丸梧子大每服六十丸量虚實加減食前温水送下以利為度蒼术復煎散治寒濕相合腦痛惡寒項筋脊骨脾眼痛膝臏痛脈沈洪無力行步身沈重蒼术四兩水二碗煎至二大盞去滓入下項藥味羌活一錢升麻澤瀉柴胡藁本白术各半錢黃栢三錢紅花少許右煎去滓稍熱服之空心取㣲汗為効忌酒濕麵滲濕湯治寒濕所傷身重腰冷如坐水中小便或澁或淋大便溏泄皆因坐卧濕處或因雨露所襲或因汗出衣裏冷濕乆乆得之腰下重疼兩脚酸痛腿膝或腫或不腫小便癃閉腫疼悉能主之蒼术白术甘草各三錢乾薑茯苓各二兩橘紅丁香各一兩右㕮咀每服四錢水一盞半生薑三片棗三枚去滓食前温服煎至六分此藥治脾不和嘔逆惡心大便時時溏泄尤得其宜一方減橘紅丁香名腎著湯腰重而冷痛者大宜服之或不因濕氣所傷乃是風寒相搏以致腰疼宜服生料五積散仍加桃仁數箇煎服若腎虛致痛當服補藥栝樓根湯治風濕加渇甚者石膏二兩栝樓根三分人參防風甘草炙各半兩葛根一兩半生用乾者只三錢右剉如麻豆大每服五錢水一盞半煎至一中盞去滓服㝷痛丸治走注流濕已後宜用襲經絡除疼痛棕閭皮燒存性一兩半皂莢子仁二兩炒當歸去蘆頭炒乳香别研没藥别研各一兩川山甲酥炙一兩木香半兩麝香二錢别研右同為細末酒煑麫糊和丸如梧桐子大每服五十丸不拘時候温酒下或木𤓰湯送下滲濕湯治坐卧濕地或為雨露所襲身重脚弱關節重疼發熱惡寒或多汗惡風或小便不利大腑溏泄項背強急手足時厥週身麻痺肢體㣲腫白术二兩人參半兩乾薑炮白芍藥附子炮去皮臍白茯苓去皮桂枝不見火甘草炙各半兩右㕮咀每服四錢水一盞半生薑五片大􅀥三枚煎至八分去滓温服不拘時三花神祐丸治中滿腹脹喘嗽淋閉一切水濕腫滿濕熱腸垢沈積變生疾病乆病不已黃瘦困倦氣血壅滯不得宣通或風熱燥鬱肢體麻痺走注疼痛風痰涎嗽頭目眩運瘧疾不已癥瘕積聚堅滿痞悶酒積一切痰飲嘔逆及婦人經病不快帶下淋瀝無問赤白并男子婦人傷寒濕熱腹滿實痛新久瘦弱俗不能别辨或泥常法用轉動之藥兼治乆新腰痛并一切下痢及小兒驚疳積熱乳癖腫滿並宜服之甘遂大㦸芫花醋拌温炒各半兩牽牛二兩大黃一兩已上為末輕粉一錢一方無輕粉右為細末滴水為丸如小豆大初服五丸每服加五丸温水下每日三服加至快利利後常保養宣通氣血稍進酒食病痞悶極甚者使多服則頓攻不開轉加痛悶則初服兩丸每加兩丸至快利為度以意消息小兒丸如麻子大隨强弱增損三四歲者三五丸依前法一方崔宣武神祐加黃栢人參紫苑散治濕熱流注足脛腫痰咳等人參川芎木香防己白术各一兩紫苑去皮苦葶藶炒紫色各二兩右爲麄散每服三錢水一大盞生薑四片烏梅一箇煎至八分去滓温服食前日進三服慎濕麵温酒等物接骨丹逐濕氣定疼痛腫疾並皆治之骨碎補去毛一斤敗薑生地黃去土浄洗各一兩蒲黃半斤白麵二斤右為細末一處拌勻用隔年好米醋熬滚熱調藥放温於痛處如藥冷再用熱醋調敷如此七次用綿包之大有神効一料分作七處七日用之除濕湯治寒濕所傷身體重著腰脚酸痛大便溏泄小便澁利平胃散加半夏麵炒霍香白茯苓白术右各等分用水二盞薑􅀥煎服一方去白术用赤茯苓黃耆建中湯治傷濕鼻塞身痛黃耆㣲炙辣桂各二兩甘草炙二兩白􅆚藥右麄散每服三錢水一盞半薑四片􅀥三枚煎至八分去滓食前服一方入餳糖少許再煎令溶稍熱服赤茯苓丸治脾濕太過四肢腫滿腹脹喘逆氣不宣通小便赤澁葶藶四兩防己二兩赤茯苓一兩木香半兩右為細末􅀥肉為丸如梧桐子大每服三十丸煎桑白皮湯下食前服牛黃白术丸治腰脚濕氣黒牽牛頭末二兩大黃二兩白术右為細末滴水丸梧桐子大每服三十丸食前生薑湯下如要快利加至百丸五加酒方五加根莖細剉五斗六月六日麴末三斗黍米一石糯米亦得右三味以水五斗共五加同下於大釜中以木度深淺與水平尅之即更添水一石五斗并前計兩石即下火煎旋旋急火取藥汁減下至水尅處卧得以大盆安浄筐篚中安浄布單兼滓漉著筐中其汁在盆中唯有五斗且别盛宻封葢之又重取所漉者五加滓以水煑之如别有五加添和同煑更佳取此汁用洮米拌飯炊之如常炊法用前五加濃汁漬麴且炊米五斗釀之餘五斗分為兩酘如常造酒法酒熟壓漉宻封頭每服一盞煖食之漸加勿令醉又逺志十兩末之下釀中益炒𤣥參及蛇皮肉亦得其糟與已下食之尤佳補骨脂丸治傷内外衆疾俱作陽氣衰絶乳石補益之藥百端不應唐鄭相公為海南節度七十有五越地卑濕服諸藥不應元和七年有訶陵國般主李摩訶獻此方經七八日而覺應驗自爾常服其功神驗十年二月罷郡歸京録方傳之破故紙十兩揀浄為末胡桃肉去皮二十兩研如泥右胡桃肉泥入破故紙末更以好煉蜜和勻如飴盛磁器中旦日以温酒化藥一匙服之不飲酒者以温熟水化下彌乆則延年益氣悅心明目補添筋骨但禁食芸臺羊肉牽牛湯治腹中濕氣足脛㣲腫中滿氣急咳嗽喘息小便不利黒牽牛頭末一兩厚朴薑製半兩右研末每服二錢煎薑湯調下或臨時水丸梧桐子大薑棗湯下十丸亦得茯苓白术湯治冐雨滋著於肌膚或因汗出浸漬或因燥恣得病覺腰重脚弱身體煩痛頭眩等證其脈細弱白术一兩炒附子一兩生熟臨時消息茯苓去皮半兩官桂去麄皮半兩甘草半兩右㕮咀每服四錢水二盞生薑七片煎至六分去滓食前服加味术附湯治中濕脈沈而㣲緩濕氣歸脾流於關節之中多使人腹䐜脹倦怠四肢關節痛疼而煩或一身重著久則浮腫喘滿昏不知人挾風眩暈嘔噦兼寒則攣拳掣痛治之不得猛發汗灼艾通泄惟利小便為佳此方主之及治大小便皆自利白术去蘆甘草炒一兩附子炮一兩半赤茯苓一兩右剉散每服五錢水一盞半薑七片􅀥三枚煎七分日三服纔見身痺又三服當如􅀈狀勿怪葢术附並行皮中逐水氣故爾法合加桂一兩大便堅小便利則勿加术附湯治風濕相搏身體疼煩不能轉側不嘔不渇大便堅硬小便自利及風虚頭目眩重甚者不知食味此藥暖肌補中助陽氣止自汗白术二兩甘草炒一兩附子熟七錢半右剉細每服三錢薑七片水一盞半煎一盞食後温服白术湯治中濕口噤不知人用白术半兩去蘆以酒三盞煎一盞頓服不能飲酒以水代日三服夜一服鮑氏方云濕氣中脾則䐜脹四肢痛乆則腫喘挾風則眩暈挾寒則攣拳不可大發汗不可灼艾泄瀉當利小便大汗或大下皆死無敵丸赤土四兩醋碎川山甲蒼术自然銅火煅七次赤小豆生用赤芍藥山梔