body:
  text: 普濟方卷二百九十三明周王朱橚撰瘰癧門諸瘻附論夫漏者諸瘻之潰漏也狼瘻鼠瘻螻蛄瘻蜂瘻蚍蜉瘻蠐螬瘻瘰癧瘻轉脉浮疽瘻所謂九瘻也狼瘻者由大怒傷隂氣上而不下所致也䑕瘻者由飲食之間有蟲䑕餘毒所致也螻蛄瘻者因食菓𤓰蟲噉之所致也蜂瘻者因倦飲水即得蜂毒所致也蚍蜉瘻者因中寒毒腹中臚脹所致也蠐螬瘻者恐懼憂思哭泣不止所致也浮疽瘻者恚結馳思徃返變化所致也轉脉瘻者大醉驚嘔轉側失枕所致也瘰癧瘻者則瘰癧諸證論之為詳三因方云狼漏根於肝得之憂怒䑕漏根於胃得之食鼠毒螻蛄漏根於大腸得之食菓蜂漏根於脾得之飲流水有蜂毒蚍蜉漏根於腎得之食中有蚍蜉毒蠐螬漏根於心得之喜怒哭泣浮蛆漏根于膽得之思慮瘰癧漏根於腎得之新沭髮轉脉漏根於小腸得之驚卧失枕此等因證文不明未知所始若以理例較之怒根在肝䑕毒在胃食𤓰菓在大腸蜂水在脾姑且通俗易曉如轉脉漏因驚根當在膽却云在小腸蜉蛆漏因思慮根當在脾却云在膽瘰癧因沭髮亦不當在腎名義不通以難考㨿又况哭泣得蠐螬之名思慮浮蛆之名此尤不可曉也其外更有風漏冷漏蝎漏蟻漏蜣螂漏蚯蚓漏蝦䗫漏等名狀不一諒皆出于土俗隨象命名耳難以考㨿治法觀其末着於肌肉而為膿血者從本引可使衰去針之炙之敷之角之從其所因宣通本臟皆有成法甲乙鍼經云寒熱瘰癧論黄帝問曰寒熱瘰癧在於脛腋者皆何氣所生岐伯對曰此皆䑕瘰癧寒熱之氣也稽留於脉而不去者也䑕瘻之本皆在於臟其未上出於頸腋之間其浮於脉中未著於肌肉而外為膿血者去易問曰去之柰何對曰請從其末引其本可使衰去而絶其寒熱審安其道以瞳子之徐來徐來以去之其小如麥者一刺之三刺而已决其生死法反其人目視之其中有赤脉從上下貫瞳子見一脉一歲死見一脉半一歲半死見二脉二歲死見二脉半二歲半死見三脉三歲死此赤脉不下貫瞳子者可療大抵外傷四氣内窘七情與夫飲食乖常染觸蠢動含靈之毒未有不變為瘻瘡穿孔一深膿汁不盡得冷而風邪併之於是涓涓而成漏矣漏喜發於項腋亦喜發於隂僻肛門之間療治失時即生寒熱不特瘻能為漏凡癰疽諸發隨所在處茍有宿膿敗肉朽骨停蓄其間皆一切漏瘡之萌蘖也聖惠云瘻病初發之由不同至瘻成於狀亦異病源所載復有三十六種經方不依次第顯其名目也又有蜣蜋蚯蚓等諸瘻非九瘻之名此即應是三十六種瘻之數也但瘻病之生或因寒暑不調故血氣壅結所作或因飲食不節狼鼠之精入於臟腑毒流經脉變化而生皆能使血脉結聚寒熱相交久則成膿而潰漏也其生身軆皮肉者亦始有結腫與石癤相似所可異者其腫之中挼之壘壘有數脉喜發於脛邉或兩邊俱起便是瘰證也音瘻赤發兩腋下及兩顳顬之間初作喜不痛不熱若不諳治即生寒熱也所發之處而有輕重重者有二一則發口上腭有結核大小無定或如桃李大此蟲之窠止在其中發口下無有結核而穿成瘡又蟲毒之居或縱横無定故瘻發身體亦有雜處其相應通者多死治法用濕散風冷為急收水次之生肌又次之藿香厚朴半夏橘皮瘡术音蒼細辛川芎白芷以官桂乾薑一匕佐之此足以濕散風冷矣然近年漏者近則淡紅或帶微腫或留小核久則上而槁白内而黒爛滛蟲惡臭生焉近者不過前藥數品而久者復其元陽亦當以蘆輩加减而用之如其不當用而輕用又恐熱氣乗虛變移結核夤縁相通而孔竅為尤甚若夫收水一節盖水屬腎也腎虛不能傳道而役水溢於腎水溢則滲灑於漏瘡行腎之水無如黒牽牛取米入猪腎漫火煨熟隨而温酒下之則借腎入腎一縱一擒兩得其便惡水旣泄不復淋漓繼以當歸黄香川芎官桂川續斷葫蘆巴等修治細末佐以髪灰空心温􅀈音酒調下仍以安腎丸山藥丸兼而濟之庶幾腎得所飬真元凝合夫然後以龍骨牡蠣人齒犬牙加之血竭乳麝髮灰内外相維生機必矣然新肉方生又當以膂肉猪蹄米鋪為飬不維滋味益腎而陽明之生生肌肉亦籍穀氣以充之此則自本自根之論也凡項邊腋下先作瘰癧者欲作漏也宜禁五辛酒麫及諸熱食凡漏有以石癰瘰癧累然作癧子有核在兩頸及腋下不痛不熱治者皆錬石散敷其外内服五香連翹湯下之已潰者治癰法諸漏結核未破火鍼鍼使者結核中無不瘥者内經云䧟脉為瘻留連肉凑脉得寒即下䧟凝滯肌肉故曰留連肉腠肉冷亦能為濃血故為冷漏湏用温藥䧟脉散專治漏瘡及二三十年癭瘤或大如杯盂久久不瘥致有漏潰令人骨肉消盡或堅或軟潰令人驚惕寐卧不安軆中掣痛愈而復作者宜用之濟生方云瘻瘡當探其深淺渠在裏間時有一人害瘻瘡於脇間稽以榆細皮枝取線以綿褁其尖以線牢繫之以榆皮探瘡中瘡之穴乃自脇而達于腰在膚皮之間稽遂于病者腰間以針决破用追毒丹三粒内于瘡中三日即潰而脇間之漏遂止則膿悉自腰針孔中出膿盡則其肌遂愈其服狗寳丸敷烏龍膏乳香膏生肌散并如治癰疽治法方蝟皮散出聖濟總録治諸漏蝟皮炙燋半枚蜀椒去閉目并子炒出汗當歸切焙露蜂房炙焦地榆醋炙各三分斑猫去足翅糯米炒蛇蛻剉炒烏賊骨去甲葛上亭長去頭足翅糯米炒各半兩鱗鯉甲炙燋四兩䕡茹一兩細辛去苗葉半兩樗鷄四兩四枚蜈蚣去黄足炒一枚蜥蜴去頭足炙一枚薏苡仁乾漆炒烟出用蒺䔧子炒去角桂去麄皮漏蘆去蘆頭木通剉附子炮製去皮臍牡丹皮龍膽土𤓰根各三分鶴骨酒炙狸骨酒炙雄黄研細蛇床子大黄剉炒苦參各一兩半右為細末每服二錢匕空心用温酒調下日曉再服漸加至三錢治九瘻方出千金方蝟皮半枚鱗鯉甲樗鷄各四枚蜥蜴蜈蚣各一枚蜀椒附子當歸蜂房地榆桂心通草乾漆牡丹薏苡仁蒺䔧子漏蘆一作瞿蘆龍膽一作骨土𤓰各三分斑猫四分蛇床子苦參大黄雄黄蛇蛻䕡茹細辛各三分鶴骨六分右為末每服五分以温酒調下以知為度日三服治九瘻方出千金方空青商陸知母狸骨桔梗防風荏子礬石黄芩白芷芍藥甘草雄黄白术地膽斑猫雄黄各等分右為末蜜丸豆大以作服三丸三十日知四十日愈六十日平復百日内慎房室一方為散醋服一刀圭日二老者少者减半服續斷散出仁濟直指方治止漏活血益腎氣續筋脉搕藤子去稍微炙當歸川芎川續斷洗酒黄耆微炙葫蘆巴炊紫荆皮生乾地黄洗酒牡蠣粉布糊各半兩木香辣桂各三錢甘草炙二錢右為末每服二錢空心温酒調下或加髪灰佐之温觧散出仁濟直指方治濕散漏瘡風冷藿香厚朴製半夏麫橘皮蒼术細辛川芎白芷各二分辣桂川白薑生甘草炙各半分右剉散毎服三錢水一盞生薑棗子煎服蝟肝膏出聖濟録治諸癧隂徧腫堅硬或發潰膿血不絶蝟肝炙令熟二兩芍藥芎藭細辛去葉各半兩牛􅏬脂五錢當歸切焙蠟黄連去鬚黄芩去黑心松脂各一兩右除牛脂蠟松脂外搗羅為末先熬脂令沸下蠟松脂銷鎔即下諸藥末攪令勻以瓷合盛塗瘡上日三度換䧟脉散出三因方治漏瘡及二三十年瘻瘤或大如盂杯乆久不瘥致有漏潰令骨肉消盡或軟或潰令大驚惕寐卧不安軆中掣痛愈而復作乾姜炮琥珀研大黄附子炮去皮各一兩丹參三錢石硫黄研鍾乳粉研烏賊魚骨研各半兩右為末貯以瓷合韋囊勿令洩氣若瘡濕即敷無汁即煎猪脂和敷之以乾為度或死肌不消加芒硝二兩益佳一法用胡燕屎一枚芫青丸出千金方治一切瘻斑猫四十枚豉四十九枚芫青二十枚生大黄地膽各十枚蜈蚣一條半犀角牛黄各棗核大右為末蜜丸如桐子大服二丸湏臾多作酸漿粥冷飲之病從小便出屎盆中相視如有蟲形狀又似膠汗此病出也間日一服飲粥如常小弱者各三四日候無蟲出瘡漸瘥時忌膩一切器物皆湏灰洗乃作食一方以温酒服之一方虛悶可煮食蔓菜羮後仍作二十日將息便不湏服麝香散治漏瘡麝香研樓葱白蜣蜋蜜陀僧研石灰研青蒿心膩粉流黄研各半兩右搗研拌勻先以鹽漿水洗瘡用散子填滿瘡口以帛縳定三兩日若有惡物除去依前換藥如無不用換不過三兩上即瘥葛上亭長丸出聖濟録治諸漏葛上亭長地膽斑猫三味並去頭足翅糯米各炒二十枚䑕婦六十枚炙衣中白魚四十枚真珠研各一分㯽榔剉二枚雄黄研右為末煉蜜丸如桐子大每服三丸每日空心温酒下日晩再服漸加五丸芫青散出聖惠方療瘻有九種久不瘥不過此方芫青四十枚足翅熬海藻八分洗昆布八分洗雄黄研八分狸骨炙五分牡蠣四分煆地膽二十枚熬青木香三分右為細末酒服一錢匕日二服痛從小便出如爛筋忌生冷粘食猪肉陳臭物桂附丸出三因方治氣漏冷漏諸瘡附子炮製米醋中浸再炮淬三五次去皮臍桂心厚朴姜製粉草炙白术各一兩木香一分乳香二味别研右為細末煉蜜丸如桐子大空心米飲下二三十丸青金錠子出瘡科精要治諸惡瘡膿水出不快及多年疳瘻瘡愈而後復發白丁香銅青硼砂粉霜各五分輕粉一字龍腦一字麝香一字右為細末麫糊為丸撚作錠子每用絍入瘡口中膿水出快治漏瘡滑石輕粉赤石脂海螵蛸膩粉乳香明礬右各等分研細末以筒子吹藥入漏孔内一夜再用耳鑷子取出孔内敗肉物再用荆芥湯淨洗復用藥仍前天靈盖膏出聖惠方治一切瘻天靈盖一分净洗塗酥炙黄虎下頷骨一分炙令黄臈月猪脂四兩附子一分炮製去皮臍人參一兩去蘆頭鐡精一分川烏頭一兩炮製去皮臍右為細末用猪脂和令稀稠得所可塗之四畔不得侵瘡口麝香丸治漏瘡絍瘡麝香研石膽研膩粉研杏仁去皮尖雙仁炒各一分香䑕一枚去腸胃洗浄炙乾巴豆一粒去皮心膜出油盡右為末用麫糊和丸黍米大絍在瘡内一日一二次通治諸瘻方班猫一枚一方云三分去頭足翅杜蘅枳殻根酸棗根虎薊根猫薊根各一把右搗羅為末蜜丸日一服如棗一枚以丸著瘡口中漏瘡方真龍骨蜂房炙黄各三錢黄丹煆降真節五倍子枯骸骨瓦煆一錢各炙右為細末敷之丸惡核漏瘡並戒怒氣不然核大漏則水多也安息膏仁存方有治膿水不絶骨中疼痛成漏安息香花乳石火煆紅血竭乳香各半錢麝香减半右為細末用蠟少許入麻油些小同鎔開搜藥捻作米粒大依前方看大小深淺逐粒屑入藥於瘡孔中以滿為度藥透内從内生肉一二日退出一粒漸生肉漸退出出盡則瘡中自然平復其功效如神如瘡口冷痛淺濶只用少許乾敷治漏瘡木香丁香乳香麝香各末三錢黒牽牛頭末右分作十服每服用烏鷄子一箇去其項去黄用白調藥再入鷄子殻中用頂盖頭紙糊定於飯甑上蒸熟取出細嚼温酒下日進一服空心服未效再作即愈矣斑猫散出聖濟總録治諸漏斑猫去頭足翅糯米炒七枚真珠研桂去皮水銀與衆藥研令星盡各半兩葛上亭長去足翅糯米炒七枚右為末每服半錢匕米飲調下空心午後服小便有所出瘥乳麝雲母膏出仁濟直指方治漏瘡效穿山甲浸一宿去肉用一百片真蚌粉同炒候香熟起泡出粉以甲為末四兩右入麝香末一錢夾雲母膏十五貼為丸桐子大每服三十丸温酒仍以鹿角膠調鹽酒服下神授丸方見勞瘵門勞瘵類兼服之生地黄膏出仁濟直指方治漏通用露蜂房炙黄五倍子木香各三錢滴乳香二錢輕粉一匙右細末用生地黄一握搗細和為膏攤生絹貼瘡蛇蛻散出仁濟直指方治漏瘡血水不止蛇皮洗焙焦五倍子龍骨各一分川續斷洗酒三分右細末入麝香少許唾津調敷人牙散出仁濟直指方治漏瘡惡瘡生肌裏欲乾則用人牙油髮二味燒存性雄鷄肉骨各等分右為末入麝香輕粉少許濕則乾掺乾則麻油調敷生肉膏出肘後方療瘻棟白皮二兩䑕肉二兩薤白三兩當歸二兩生地黄五兩右五味以臈月猪膏叄升煎薤白色黄成膏敷瘡孔上令生肉也班猫散出千金方治一切瘻及瘰癧瘻生於項上結腫有膿並皆治之斑猫十枚去頭足翅以糯米炒黄為度用真珠半兩細研蝟皮半兩炙黄雄黄一分細研右為細末每日空心以温酒調下半錢午後再服可日三服白花蛇散出三因方治九漏瘰癧發於項腋之間痒痛憎寒發熱白花蛇酒浸軟去皮焙乾三兩犀角半錢黒牽牛半兩一半生一半熟炒青皮半兩右為末每服二錢膩粉半錢研勻五更糯米飲調下以利下惡毒為度十餘日再進一服可絶根源如已成瘡一月可效忌發風壅熱物治一切瘻出千金方斑猫三十枚雄黄桂心犀角各一兩右為治下篩酒一錢匕服日再服病從小便出鍜落鐡屑膏出千金方治一切漏方鍜落屑虎糞狗頰車連齒骨炙鹿皮合毛燒為灰各等分右治下篩以猪膏和内瘡中湏臾即易日五六度一方無鹿皮有鹿角治漏瘡胭脂血竭輕粉各一錢麝香半錢右碾為末乾敷之又方五倍子一兩青黛臘茶各半兩麝香隨用右為細末於漏瘡上乾掺或用生油調敷之輕粉少許尤妙芫青散出聖濟總録治諸漏腫芫青斑猫葛上亭長三味並去足翅糯米炒各十枚桂去粗皮一兩右為散每服半錢匕空心酒調下日晚再服更冝炙陽明絡脉在肩前申頭二寸䧟中有青脉至上向卧交兩臂勿令開乃夾取之炙隨年壮即瘥治諸瘻涓涓出膿血疼痛日夜不止漸加羸痩冝服此方出千金方赤小豆白歛牡蠣燒赤細研黄耆各等分右為散每服三錢七酒一盞半煎至一盞去滓不拘時黒靈散出仁濟直指方治漏瘡通用露蜂房剉二分牡蠣粉􅉑丹硫黄研各一分右同炒令烟盡為細末入髮一分麝香少許拌和敷患處麝能引藥透達亦殺蟲鐡屑膏出仁濟直指方治漏瘡露乾則用鍜落鐡屑半兩鹿角燒灰一兩真輕粉一錢狗頭連齒骨炙黄一兩右為細末用猪脂敷調薫漏瘡方出仁濟直指方艾葉五倍子白膠苦棟根等分右剉如燒香法置長桶内坐薫瘡處角鷹散出仁存方角鷹屎乳香葱白右等分為末先鹽水洗瘡口㸔小大以燈心探入瘡口深淺内藥入明日其骨及蟲惡水自出不過兩次治一切漏瘡惡瘡生肌止痛出余居士選竒方人牙不以多少燒過麝香各少許右都研令勻濕則乾掺乾則用生油調敷莉蘆塗傅方出聖惠方治諸漏浮核不盡及諸惡瘡癰疽息内在於肌中藜蘆以鷄子三箇取白塗炙令乾䕡茹各一兩雄黄研一兩右研為末塗敷息肉上日五度即瘥敷瘡上不得入眼治漏藥出御藥院方獨角仙一箇火去殻河南地方出者佳甜葶藶砒各半錢同研右為末細煉蜜為錠子每用臨時覷瘡口大小旋揑作餅子圍於瘡口内其蟲俱出即時見效班猫丸出聖惠方治一切瘻方斑猫四十枚去足翅糯米拌炒令米黄地膽三十枚去足翅首糯米拌炒令米黄蜥蜴三枚炙右搗之千杵蜜和如大豆服二丸空心臨晚温酒下神驗伏翼糞丸出聖惠方治一切瘻瘡及治久瘻伏翼糞四兩微炒斑猫三分去頭足翅以糯米拌炒令米黄皂莢子一兩炒黄一作皂莢花右搗為細末煉蜜和丸如梧桐子大每日空心以莢白皮塗酥炙微黄搗末煎湯下一丸服至三丸病根並於小便中出馬齒莧膏出聖惠方治一切瘻馬齒莧隂乾臘月燭燼各等分一作臘月䑕灰右為末以臘月猪脂和其瘡先以暖泔清淨洗拭乾然後以藥敷之日三又方出千金方乾牛屎乾人屎各等分右搗末先用綿著瘡上綿著屎蟲聞屎香即出若癢即舉綿止之更别取屎及綿著其上如前蟲盡乃止蜂窠膏出千金方治漏作瘡孔方見本門蜂瘻類治漏心胸以下者方松脂武都雄黄各三兩右為末和塊刀子刮為散飲服一方寸匕日三服不瘥再合附子塗傅方治漏瘡晝開出膿夜復合附子一枚搗末鯽魚頭間去肚腸右將附子末内魚肚中滿以泥固濟炭火上燒通赤取出去泥研細為末冷敷瘡口内日用三五次以瘥為度伊蘭草塗敷方治漏瘡伊蘭草七葉狗頭骨燒過二兩右為末塗敷瘡口内日一換之以瘥為度巴豆塗敷方治漏瘡巴豆一分去心皮出油盡用肥棗十枚去核皮右細研以水一升煮稀稠放布中絞出取汁塗敷瘡上日一次地鱉散治漏瘡乾地鱉末麝香各研少許右研勻乾掺或貼隨乾温治之蝕瘻瘡生油髮燒留性四錢白芨一錢右為細末掺敷之療瘻方右用槲木皮長一尺濶六寸去黒皮細切以水一斗煮取五升去津内白糖十挺煎取一升三分服以銅器吐出看視之治一切瘻出聖惠方用死虵白礬各一兩燒灰細研敷之螻蛄一十四枚燒為灰研如粉右件藥以煉雄猪脂和作膏著瘡中治一切瘻出千金方用成煉松脂末填瘡孔令滿日三四度七日瘥大有神騐又方出千金方用霜下瓠花曝乾為末敷之洗漏瘡方出危氏方治漏瘡孔中多有惡穢常湏避風洗浄用露蜂房白芷煎湯洗或用大腹皮苦參煎湯洗如洗畢候水出拭乾先用東向石榴皮曬為末乾掺以殺滛䖝少傾敷藥即愈苦瓠方出千金方治一切瘻及蟻瘻大妙用苦瓠四枚大如盞者各穿一孔如指大置湯中煮十數沸取一竹筒長一尺一頭内瓠孔中一頭注瘡孔上冷則易之徧止治一切瘻出千金方用煮鹽花以麫擁病上内鹽花麫匡中厚二寸實下以桑葉三重籍候冷熱得所可忍冷無益熱則以内一日一度俟瘰癧根株勢消則止若已作瘡者搗穄殻為末粉之一方用鹽麫燒灰敷之槲皮煎出千金方治一切瘡瘻用槲皮北隂白皮三十觔剉碎以水一石煮取一斗去滓煎如糖又取屋厠上雌雄䑕屎各四十枚燒令汗盡為末内煎中又酒温一升投煎中合攬之羸人服五合當有蟲出治一切瘻出千金方用搗土𤓰根敷之燥則易不限時節杏仁塗膏出千金方治一切瘻用死蛇去皮肉取骨為末和封瘡上生油調方得大痛杏仁研膏摩之以方死蛇和臘月猪脂燒灰為末内孔中一方单用死蛇灰醋和敷一方治蛇瘻用蛇蛻皮燒灰臘猪脂和封之又方出千金方用燒死蜣蜋為末醋和塗乾掺亦得一方用鹽湯洗瘡塗敷一方蜣蜋屎為末敷之治一切瘻方出千金方用故布褁鹽如彈丸大燒令赤為末酒調服又方出千金方用白馬屎絞取汁每服合水和屎取汁亦可又方出千金方用猪脂一升酒五合煎沸頓服一方用臘猪脂塗敷瘡二用紙貼定治一切惡瘻中冷應肉方出聖惠方用正月雄狐屎隂乾搗末汲水和服一錢食前治一切冷瘻方出聖惠方用所吐蛔蟲燒為灰先用甘草湯洗去瘡然後着灰無不瘥者慎口味治膿瘻方用桃花末以猪脂和封之佳治漏瘡用嚼五倍子和血竭末塞之治脇下生漏瘡如牛眼之狀膿水不止用鹽少許安白牛耳内然後取耳中垢以敷瘡上即瘥如不用鹽即牛耳不痒難取垢治漏瘡口子不乾用蝦䗫膽肝不見水拭乾用銀箆擉碎搽入口子内外用尋常膏藥貼之久之其乾肝就變為好肉啄酒散治瘻有頭出膿水不止方見痔漏門痔漏類治漏方右以巴豆用青紅紙各一張减去油推麝香少許絍入瘡内却用紅紙作捻子蘸藥末入瘡口内塡滿瘡孔如四邊有紅㸃是漏瘡未發却用銅筋或銀釵尖按破用前藥搽之後用黄連黄丹龍骨雄黄四味封口七八日可治漏瘡用多年海船底土泥石灰為末以烏鷄子清調火煆為末敷之自然生肌提出元藥朝生暮落花敷方治漏瘡用朝生暮落花隂乾為末取塗敷瘡上日三次鷄子塗敷方出肘後方治諸漏亦治䑕瘻用鷄子三枚蒸熟去殻白取黄炒黒色先用鹽湯洗瘡後塗日三五次即愈一方治下血不止肌體黄瘦四肢無力宜服此方又方用取新生䑕屎一百日已來者收置蜜器中取塗敷瘡口日度即瘥猪腎酒治通行漏中惡水自大腸出用牽牛碾細去皮取末一分入猪腎中以綿扎青竹葉包用慢火煨熟空心温酒嚼下治漏若着口裏用取東行棟根細剉水煮濃汁含之數内吐再嚥治瘻瘡用鴛鴦肉以清酒炙食之則美麗又主夫婦不和作羮臛私與食即相怜愛又方治諸瘻瘡喉嚨痛及喉痺並宜煎服用通草或礬亦得急即含一方治項上瘤漏用通草根煎服治瘻有九種不過此方用芥子搗碎以水及蜜和滓敷喉上下乾易之治瘻用鯉魚腸切作五斷火上炙之洗瘡拭乾以腸封之冷即易自暮至旦乾止覺痒開㸔蟲出瘥效騐方療瘻衆不瘥用牡䝉數兩搗之湯和適寒温取一升許敷瘡上冷易經宿者佳生肉膏療瘻用桑新灰三升水四升淋之復重淋之取三升石灰熬令黄内灰汁中以兩重帛褁絞去滓更入日煎去二升勿用急火煎隨瘻孔深淺初時作服散而瘥孔若深四寸新藥與孔裏薤白使糯安藥薤白入藥孔裏若深四寸隨瘻根而炙兩處四十壮椎勿炙瘻孔隨深淺去膿散與膏安著瘡孔裏十五過少遷延日月取瘥肉滿膿亦斷神良無比通治諸瘻方右以八月多取斑猫蟲即内苦杏酒中半日許出曝乾使十取六七枚著銅器中微火上延熬令熟搗作屑巴豆一粒去皮熬之又拔取黄犬背上毛三七根亦熬作屑好朱以錢五分匕都合和以苦酒頓服之蟲當盡出若一服未效先時可預作三兩劑後日服逺不過三兩劑又方若先著下部邊或上出耳後頸項諸處者苦參切五升以苦酒一斗浸三四日冝服一斗亦如之但多作以知為度不過三四度必瘥皮膏療瘻用槲皮白皮切取五升以水八升煮令泠絞出滓重令成膏日服半棗漸加至一棗許亦敷瘡上無忌患瘡唯冝煮飯苜蓿鹽醤又不得多食之療諸瘻方用葶藶子搗細羅取加白蜜和丸每於着藥先温泔洗着瘡孔中以丸内之若塞以物道開日三度瘡痛是瘥候勿停藥又方先以泔清温洗以綿拭之取葵葉微火暖貼之瘡引膿不三二百葉膿盡出即肉生忌食諸魚蒜房室治瘻方用煎桃葉枝作煎淨洗瘡内孔中大騐治諸惡瘻方用杏仁二兩去皮以水研取汁毎二合温服一方治一切瘻治􅀈蟷瘻方用取甜𤓰根搗羅為末敷之立瘥慎口治石瘻兩頭出者其狀堅實令人寒熱方用大錍針破之次用䑕粒葉二分為末和鷄子白一枚封之又方用搗槐子和井花水封之治蜣蜋漏方用黒牛屎燒灰臘猪脂和敷之先用鹽湯洗瘡一方用乾牛屎為末敷之癢即撥去根厚封瘥乃止一方用熱牛屎塗之數易應有蜣蜋出亦治䑕瘡治蚯蚓漏方鷄屎蚯蚓屎右為末用牡猪下頷髓和敷之治蝎瘻五六孔皆相通者方用搗茅根汁著孔中又方用半夏搗羅為末以甲煎調塗之一分治蝦䗫瘻方用五月五日蛇頭及野猪脂同水衣封之佳治蚯蚓漏用胡粉不限多少用猪脂和調塗摩瘡上日再塗即瘥治蛙瘻􅀈蟷瘻方用取母猪屎燒灰臘月猪膏和敷之當蟲出如雀形温經丸治䧟脉瘻厚朴姜製官桂去皮白术炙甘草炙乾姜炮木香各一兩附子二兩醋浸炮淬次去皮臍右為細末煉蜜和為丸梧子大每服三十丸食後飲湯下鴨脂膏治蚯蚓瘻鴨脂三兩胡粉三兩巴豆去殻研去油盡半兩右先鎔脂入二味調如膏每日三五度塗瘡上即瘥内瘻方用橘皮白搗丸綿裏内下部中敷效一方治瘡有漏孔即以桑虫五條焙乾末掺之即愈治一切漏瘡三方甘草草菓右等分碎切煎湯洗瘡口又方馬骨敗龜殻各等分右為細末用麻油調敷瘡口如藥不細則瘡疼又方皂角刺天蘿乾者各等分右燒留性為細末加燒酒調下用火筯挾燒服三錢治瘻用馬莧搗揩之治瘻以柴荆木煮汁服之療下瘻右取䑕尾草膿煮取汁令可丸服之亦用作飲治毒腫下瘻右以紫珠煮汁服之療諸瘻瘡及妬乳癰腫右以白狗骨燒屑敷之治瘻瘡及溪毒丁腫出根右以狗屎和臘月猪脂敷治諸蟲瘻惡瘡右取木通花上粉内瘡中良治瘻右剪艸根作煎淨洗瘡子孔大效治瘻瘡右以壁錢蟲滴汁敷瘡上治惡瘡瘻右以班猫去翅足炒末傅之治惡瘡瘻以鍜落屑和百丈青鷄桑灰等為末敷瘡瘻治癰腫疽瘻瘰癧以毛蓼杵碎内瘡中引膿血生肌亦作湯洗瘡治疽瘻惡瘡以楊櫨木葉水煮汁洗瘡立瘥治瘡瘻以鱓魚斷取血塗之治瘡瘻右取黄藥根研服之亦塗瘡上治瘻瘡以多年鵲巢燒灰敷之良治風腫瘻瘡以驢屎熬熨之狼瘻附論夫狼瘻者由寒暑不調飲食有毒或大怒氣上不下之所生也始發之時在於頸項有根出缺盆上轉連其本其根在肝也方神效蝟皮散治狼瘻出膿水不絶寒熱肢節煩疼蝟皮一枚炙黄川椒三分去目及閉口者微炒去汗附子三分炮製去皮臍當歸三分剉微炒露蜂房三分㣲炒地榆三分剉木通三分剉苦參一兩剉班猫半兩以糯米拌炒令米黄為度去頭翅足鱗鯉甲四枚炙令甲黄桂心半兩樗雞三分炙黄細辛半兩川大黄一兩剉碎微炒蜈蚣一兩㣲炒雄黄一兩半細研蛇床子一兩蛇蛻半兩燒灰蜥蜴一枚炙黄薏苡仁三分䕡茹一兩牡丹三分龍膽三分去蘆頭鷄骨一兩炙黄土𤓰根三分雚蘆三分白蒺藜三分㣲炒去刺右為細末每於食前以温酒調下一錢以瘥為度空青商陸散治狼漏始發於頸項無頭有根起於缺盆之上連延耳根腫大此得之憂患氣上不得下其根在肝一作在肺空青主之商陸為之佐空青蝟腦各三分蝟肝芎藭半分獨活黄芩鱉甲婦人蓐草商陸斑猫乾薑地膽當歸茴香礬石各一錢西椒三十粒右治下篩酒下方寸匕日三服十五日服之外臺秘要無商陸空青散治狼瘻發於頸耳疼痛出膿水空青半兩洗過細研蝟腦半兩蝟肝一具微炙芎藭半兩獨活三分黄芩半兩乾薑一分炮剉製當歸半兩微剉炒斑猫一分以糯米拌炒令米黄為度去頭足翅鱉甲三分塗醋炙令黄去裙襴川椒五十粒去目及閉口微炒去汗蘹香子一分白礬一兩燒灰右為細末每服一錢以温酒調下食前空青丸空青燒過細研商陸知母狸骨炙黄桔梗去蘆頭礬石泥褁燒半日細研防風去蘆頭荏子白礬燒令汁盡蛇蛻皮燒灰白芷赤芍藥斑猫以糯米拌炒令米黄為度去頭翅足以上各等分右為細末煉蜜和丸如梧桐子大每服空心醋湯下三丸芫青丸治狼瘻芫青二十枚去頭翅足糯米拌炒令黄色地膽十枚去頭翅足糯米拌炒黄色斑猫十枚去頭翅足糯米拌炒令黄色生犀角屑如棗大黒豆黄五十枚炒熱牛黄半棗大研細蜈蚣一枚去足大者炙令燋黄右前件六味為末入牛黄研令勻煉蜜和丸如梧桐子大和服藥隔夜少食每日空心以温水下二丸湏臾可煮醋􅄴水薄粥稍稍飲之其瘻有形状皆從小便中出至心甚虛悶可煮蔓菁菜美食之如壯人隔日一服人弱隔兩三日一服服藥後瘡瘥蟲盡為度若瘥仍將息一月藥飲盡湏預合勿使斷絶藥氣鱗鯉甲散出聖惠方治狼瘻鱗鯉一兩鴆鳥嘴半兩蝟皮一枚犬牙一分蜈蚣一枚右件藥入瓦爐子内燒煙絶便以盆合之勿令成灰候冷研令細以臘月猪脂煉過調敷瘡上日二換之䑕漏附論夫䑕漏者由飲食不擇蟲䑕之毒因變化入於臟出於脉稽留脉内而不去使人寒熱其根在胃若旋出頸腋之間猶浮於脉中而未内著於肌肉而外為膿血者易療之也方黄耆散出聖濟總録治漏䑕黄耆剉白礬燒灰附子炮製去皮臍各半兩當歸切焙防風一兩栝簍根芎藭黄芩去黒心狸骨酒炙甘草炙各二兩大黄剉炒乾薑炮露蜂房炙各一兩細辛去苗一兩斑猫芫青二味並去翅足糯米炒各五枚右為末每服一錢匕空心調温酒調下日再服狸骨知母散出千金方治䑕漏始發於頸無頭尾如鼷䑕使人寒熱脫肉此得之食䑕毒不去其根在胃狸骨主之知母為之佐狸骨知母桂心鱗鯉甲龜殻甘草雄黄乾薑各等分右治下篩飲服方寸匕日三仍以蜜和内瘡中無不瘥先炙作瘡炙以藥敷之已作瘡不用炙狸骨散出聖惠方治䑕漏瘰癧寒熱狸骨酒炙兩一分躑躅炒龍骨王不留行當歸切焙土𤓰根䑕姑各半兩外臺秘要作䑕粒子右為末每服二錢匕食後温酒調下日晚再服一方有蝟皮無狸骨名蝟皮散鱗鯉甲散出聖惠方治䑕漏發起無頭尾如鼷䑕使人寒熱脫肉此受大䑕毒不去其根在胃鱗鯉甲炙燋鱉甲醋炙甘草炙桂去麄炙雄黄研乾薑狸骨酒炙各半兩右為末每服二錢匕酒調下日晚再服又法以蜜為丸内瘡中日一度易之一方無狸骨鱉甲煉蜜和作餅子量大小貼日二換之鰻鱺魚丸出聖惠方療䑕瘻鰻鱺魚四兩炙令燋野猪皮四兩炙令燋瞿麥一兩班猫二十枚去翅首足熬巴豆十五枚去皮燋臈月猪脂五分五月五日蟾酥一箇炙右搗野猪皮下篩合諸藥更搗下篩内鰻鱺以膏和搗千杵平旦未食服如梧桐子大二枚覺者寒熱不覺暮投明日且一起更服三丸籍稍増之慎勿食煩悶穀人蟲當從小便出以物盛之屎便視乃有百數耳不可以見亦大便出此方神驗服百日愈忌猪肉蘆芛五白膏一名漏蘆膏出千金方治䑕瘰癧白馬屎白牛屎白猪屎白羊屎白鷄屎各一升漏蘆二觔右各於石上燒作灰研絹篩之以猪膏一升三合煎亂髮一兩半令極沸蘆消乃内諸末㣲火上煎五六沸藥成去瘡痂以鹽湯洗新帛拭乾然後敷膏洗無痂猶湏洗日再若着膏當以帛褁上勿令中風冷神驗外臺秘要有藁本二觔療䑕瘻方出肘後方山龜殻炙桂心雄黄乾薑狸骨甘草炙右等分為散飲服方寸匕日三蜜和内瘡中無不愈先炙作瘡後與藥良忌生葱海藻菘菜松脂煎療䑕瘻松脂硫黄狼毒各二兩猪腦一具白歛二兩右熬猪腦取汁狼毒白歛㕮咀以水三升煮取一升内腦汁中煎得五合細研硫黄松脂下篩内中攪令相得綿裹内瘡中七日知二七日病除神效療䑕瘻方出肘後方石南生地黄雄黄茯苓黄連各二兩右作散敷瘡日再忌猪肉蕪荑療頸䑕瘻瘰者方貝母乾薑藁本桂心蜀椒各一分汁右搗下篩先食茱萸一分以酒服一撮忌生葱赤小豆散出聖惠方治䑕瘻及出膿水項强頭底四肢寒熱赤小豆一合炒熟白歛一兩露蜂房一兩燒灰蛇皮二條燒灰右為細末每服食前以温調下一錢死䑕膏出聖惠方治䑕瘻死䑕一枚中形者亂髮松脂二兩黄丹六兩炒令紫色右件藥用油一觔以文火煎䑕髮候消以綿濾去滓又入鐺中然後下松脂黄丹以栁木箆攪令勻膏成於瓷器中盛每月塗貼日二易之外正膏治䑕漏死猫兒骨酒和醋炙一片三寸長皂莢去皮子醋炙一挺木鱉子去殻生用二七粒重粉半錢匕研右為末每用三錢匕用米醋熬成膏敷之如一兩日未效即用温酒調二錢匕服畢衣被蓋出汗即瘥馬齒莧膏出聖惠方治一切癰疽皆是瘡痕根本所患癰之後膿汁不止冷即是䑕瘻是以漏者急湏療之馬齒草五升切槲白皮一觔水五升煮取一升清澄麝香半臍乾之仍研作末杏仁半升油煎令黒搗如膏右以甆器貯之合和以三四重帛宻繫口病已成瘡者以泔清淨洗拭乾煎作貼子塗藥貼著瘡上日三易若未作瘡如作瘰癧子者以艾一升薑黄如棗大乾漆如棗大末之釡月下土三味並末和艾作炷炙三七壮馬靈丹烏魚骨二錢半狗脊二錢半輕粉二錢半銅緑二錢半右用成日姓人不犯紅日搗為末竹紙包就大效斑猫散出聖惠方治䑕瘻著頸生小者如杏大者如杯斑猫十枚去頭翅足糯米拌炒令黄色牡丹三分海藻一兩洗去醎味焙乾右為末每日空心及夜臥時以葱白湯調下半錢病根當於小便中出加魚脬利後只得喫粥一方有牡蠣無牡丹酒調服忌蒜仙人曉散出聖濟總録治䑕漏黑猫死者取骨一両焼灰存性甘草炙為末三分麝香别研半分右研細分作六服每服臨卧時温酒調下療䑕瘻諸惡瘡方苦參三觔露蜂房三兩麫二升右以水三斗漬藥三宿去滓黍米二升釀熱飲日三一方得蝟皮一具又方治老䑕瘡久不瘥用臘月八日醋浸川烏五箇五月初五日午時烏頭切作三十五塊與同醋浸三十五日却用三味胡椒三十枚麥門冬三十粒川烏搗爛為末右為末黄蠟為丸忌用鐡器用黄丹用丙午日合黄蠟為丸䑕糞大右卧左㸃左卧右㸃之即可死蛇䑕膏治䑕瘻方見本門蟻瘻類槲皮煎治鼠瘻方見本門蟻瘻類猫腦骨散出聖惠方治鼠瘻方見本門諸瘰癧類半夏膏出聖惠方治鼠瘻半夏一兩搗羅為末鯸鮧魚脂一兩煎肥者右一處調如膏旋取塗瘡上狐頭散出聖惠方野狐頭一枚炙令黄狸頭一枚炙令黄右搗為末漿水洗拭乾以猪脂調敷之杏仁塗膏治鼠瘻方見本門諸瘻方治鼠漏瘡方出聖惠方死鼠一枚中形者亂髮如鷄子大一枚右臘月猪脂一斤煎二味合消盡濾去滓成膏分作二分一分稍稍塗瘡一分稍稍酒服之瘥䑕子當從瘡中出良療䑕瘻方烏頭炮附子炮合二兩右㕮咀著五升淳苦酒中漬之待乾復内苦酒中燥復内以苦酒浸盡曝令乾搗末酒服方寸匕日三忌猪肉冷水等療鼠瘻方馬齒礬石燒真珠粉右為末厚塗瘡上不過三愈療鼠瘻方出肘後方礬石三分燒班猫一分去頭足翅熬右為細末用酢醬服半匕須臾瘻蟲從小便出麝香塗方出聖惠方療鼠瘻穿穴成瘡痛不可忍麝香研雌黄研一作䧺黄右等分研為末取蝦䗫背白汁和塗瘡孔中日一度一方用酥和内瘡孔中治鼠瘻方出聖惠方用糞燒為灰細研敷上又方出聖惠方用瓠花曝乾搗羅為末敷之地黄膏出千金方治鼠漏瘡瘥後復發及不愈出膿血不止用不落水猪脂㕮咀生地黄内脂中令脂與地黄足相掩和煎六七沸其瘡先用桑灰汁洗去惡汁次以地黄膏敷瘡上日一易之治鼠漏方出千金方右將蛇腹所呑鼠燒灰末服方寸匕日再不過三服此大驗但難過耳并敷瘡口中外臺秘要有蝦䗫一方蝮蛇腹中所呑鼠乾之末敷治鼠漏腫核痛未成膿者出肘後方用栢葉敷腫上熬䀋著葉上熨之令熱氣下即消治鼠漏已有口膿血出者出肘後方用白鮮皮煎汁服一升當吐出鼠子愈治鼠漏腫核痛若有瘡口出膿水者出肘後方用蜘蛛二七枚燒敷良治鼠瘻用新鼠屎一百粒以粒收入宻器中五六十日杵碎以敷瘡孔中又方用蝮蛇磨著物皆透治鼠瘻鼠扐齒人瘡用狸頭骨燒灰敷之療䑕瘻方用五月五日核桃搗末先䀋湯洗拭之令乾以末敷瘡上療鼠瘻要方出肘後方用柞木皮五升水一斗煮熟去皮煎令汁得二升稍稍服盡當有宿油出即愈療鼠瘻久不瘥方用狼鼠不限多少常作羮粥任喫之必驗療鼠瘻方兼治螻蛄瘻用槲葉搗末敷腫上熱炒鹽熨之即消良效治鼠漏腫核痛若已有瘡口膿血出者出肘後方用牛熱屎傅之日三有蜣蜋出鷄子塗敷方出肘後方治鼠瘻方見本門諸瘻類治鼠漏惡瘡用蟾酥眉脂以麻油調塗立效治鼠瘻腫核痛若有瘡口膿血出者出肘後方用猫狸一物料理作􅃵如食法空心進之鼠子死出又當生呑其功彌效一方單用猫作羹食之治卒得鼠瘻有瘰癧未發瘡而􅄩熱者出肘後方用搗烏鷄足并車前治老鼠瘡久不瘥用綿絮燒灰或瘡乾用者油調敷如濕乾末掺之又方用竈心焦土碎研香油調敷之班烏散出衞生家寳治瘰癧鼠漏班猫何首烏糯米右等分同炒令黄色去班猫用二藥為末酒調服取虫出如鼠能動其病息愈五靈脂散出衞生家寳塗瘡口治鼠瘻出本草右用死蜣蜋燒作末苦酒和敷之數過即愈先以鹽湯洗之治鼠瘻瘡出本草右以通草煎服之磨亦得療諸毒鼠瘻出本草以𤣥參又名馥草酒漬飲之療鼠瘻瘰癧出本草取臘月猪脂調塗之治鼠瘻用鷄卵一枚米下蒸半日取出黄炒令黒色先拭瘡上汗令乾以炒煮鷄子黄内瘡孔中三度即瘥又方用堇菜乾為末和油煎成膏摩瘻上三度瘥堇菜野生非人所種名堇葵葉似折子如米花紫色螻蛄瘻附論夫螻蛄瘻者由食菓𤓰子不避有蟲即便噉食内傷子腸有毒不去變化所生也始發之時在於頭上狀如蝸形癮疹而出其根在大腸也方荏子桔梗丸出千金方治螻蛄漏始發於頸項狀如腫此得之食𤓰菓實毒不去其根在大腸荏子主之桔梗為之佐荏子龍骨各半兩附子一兩蜀椒一百粒桂心桔梗乾薑外臺秘要作礬石獨活芎藭各五分右為末以棗十枚合搗醋漿和丸如大豆温漿下五丸加至十丸丹參散出聖惠方治螻蛄瘻生於項門腫硬疼痛丹參二兩蒴藋根二兩甘草半兩炙微赤剉秦芁一兩去苖獨活一兩牛蒡子一兩躑躅花半川椒半兩去日及閉口者㣲炒去汗牛膝一兩去苖右㕮咀每服三錢水一中盞煎至六分去滓每日空心及晚食前服之桂心丸出聖惠方治螻蛄瘻疼痛出膿水桂心一分黄耆半兩剉礬石鍊子者一分芎藭一分大黄半兩剉碎微炒烏喙半兩炮去尾川椒一百粒去日及閉口者㣲炒去汗虎脛骨半兩塗用炙黄右為細末煉蜜和丸如菉豆大每日空心及晚食前以温漿水下二丸長亭散出聖惠方治螻蛄瘻亭長六枚去頭足翅糯米拌炒令黄色川大黄半兩剉碎微炒細辛半兩桂心一分鱗鯉一兩炙令黄楓樹中蟲糞三指撮右為細末每日空心温酒調下一錢晚食前再服馬齒莧膏治螻蛄瘻方見本門諸瘻類治螻蛄瘻出聖惠方用槲葉燒灰細研右以泔别漬槲葉取汁洗瘡拭乾内少許灰於瘡中蜂瘻附論夫蜂瘻者由飲食勞倦渴乏多飲流水即蜂毒不去變化所生也如發之時其根在頭瘰癧三四處俱腫潰生瘡狀如癰形瘥而復生其根在脾也方雄黄黄芩散出千金方治蜂漏如發於頸瘰癧三四處俱相連以潰此得之飲流水中有蜂毒不去其根在脾雄黄主之黄芩為之佐雄黄黄芩各一兩蜂房一具鱉甲茴香吳茱萸乾薑各半兩蜀椒三百粒右治下篩敷瘡口上日一度十日止外臺秘要無雄黄黄芩五香散出聖惠方治蜂瘻發於頸項累累相連腫痛沉香一兩半丁香一兩木香一兩半薫陸香二兩半川升麻一兩半連翹二兩半麝香一分細研右件藥搗細羅為散同研藥令勻每服一錢以水一中盞煎至六分每空心及晚食前温服露蜂散出聖惠方治蜂瘻有頭露蜂房一枚鱉甲一分吳茱茰一分川椒三百粒乾薑一分雄黄一分細研右為細末研入雄黄以生油調塗瘡口上日三度用之皂莢丸出聖惠方治蜂瘻生於項間三五相連如彈子腫赤疼痛皂莢八兩四兩搥碎以新汲水二升浸一宿搗絞取汁四兩去皮以酥一兩塗炙令黄燋牛蒡子蝸牛牽牛子㣲炮以上各兩半右為細末取前皂莢汁於銀器中漫火熬至一升以未入藥味更熬令可丸即丸如梧桐子大每服二十丸以黄香湯下每日空心及晚食前服索豆散出聖惠方治蜂瘻索豆二兩炒熟白歛一兩牡蠣一兩燒灰右為細末每服以温酒調下一錢日三服治蜂瘻方出聖惠方用人屎蛇蛻皮灰臘月猪脂和敷之一方有麝香蜂窠膏出聖惠方治蜂瘻用蜂窠燒灰炙黄為末亦可用臘月猪膏和敷孔中一方療鼻内肉外查瘤膿血出者是蜂瘻方單用蜂房炙燋為末酒調一錢服粥飲調亦得空心日一服蜂瘻初生狀如桃而痒掻之則引大如鷄子如覆手者出聖惠方用熬鹽熨之三宿四日瘥不瘥至百日成瘻其狀大如四五子石廣三寸中生蜂作孔乃有數百以石硫黄隨多少燃燭燒令汁出著瘡孔中湏臾間見蜂數十蜂盡瘥又方出聖惠方用死蜣蜋燒為灰細研醋和塗之又方出聖惠方用鵶頭燒灰細研敷之蚍蜉瘻附論夫蚍蜉瘻者因寒腹中臚脹所得寒毒不去變化所生也始發之時在其頸項使人壮熱若傷寒有似疥癬瘻瘻孔出其根在肺也方礬石防風散出千金方治蚍蜉漏始發於頸初得如傷寒此得之食中有蚍蜉毒不去其根在腎礬石主之防風為之佐礬石防風知母雄黄桃白皮乾地黄獨活青黛班猫白芷松脂一作白脂芍藥海藻當歸各一分白术蝟皮各四分蜀椒一百粒右治下篩每服一錢日三服外臺秘要無礬石防風礬石散出聖濟總録治蚍蜉瘻始發在項如患傷寒此因喫食中蚍蜉其根在腎可皆治之白礬燒令汁枯半兩李白皮桃白皮獨活去蘆頭知母生乾地黄雄黄研令一分蝟皮白术各三分青黛研斑猫去足翅糯米炒白芷桐皮蜀椒去目并閉口炒出汗一百粒芍藥海苔當歸焙各一分右為細末每日空心温酒調下一錢日三桃白皮散出聖惠方治蚍蜉瘻發於頸上初得壮熱後却成瘡出膿水疼痛桃白皮半兩剉川大黄半兩剉碎㣲炒知母生地黄乾半兩雄黄一分細研蝟皮一兩炙令黄獨活半兩青黛一分細研川椒一百粒去目及閉口者微炒去汁白芷一分松脂赤芍藥一分海苔一分右為細末都研令勻每日空心及晚食前温粥調下一錢治蚍蜉瘻出聖惠方龜膽三枚犬牙三枚炙令黄琥珀半兩虺蛇頭一枚炙令黄雄黄半兩細研猪牙三枚炙令黄色右為細末以醋和勻敷瘡一宿神驗赤小豆散出聖惠方治蚍蜉瘻方見本門鼠瘻類蠐螬瘻附論夫蠐螬瘻者由恐懼愁憂思慮哭泣不止餘毒變化所生也始發之時在頸項無頭尾如棗核或移動皮中使人寒熱心懣其根在心也方礬石白术散出千金方治蠐螬漏始發於頸下無頭尾如棗核塊累移在皮中使人寒熱心懣得之因喜怒哭泣其根在心礬石主之白术為之佐礬石白术空青當歸各三分細辛一兩蝟皮一作乾蝟肉斑猫枸杞一作根地膽各一分去翅足乾鳥腦脂二七豆許右治下篩以酢漿服方寸匕日三病在上側轉卧在下高枕卧使藥下流忌生菜桃李雀肉生血物𤣥參散出聖惠方治蠐螬瘻結核腫痛𤣥參二兩川升麻二兩獨活二兩漢防風一兩甘菊花一兩連翹三兩犀角屑半兩川大黄半兩剉碎微炒右㕮咀每服四錢水一中盞煎至六分去滓每於食前温服空青散出聖惠方治蠐螬瘻發於頸如棗核在皮中不能消散結腫痛疼空青三分燒過細