body:
  text: 普濟方卷三百六明周王朱橚撰諸蟲獸傷門諸蟲獸傷凡一切蟲獸所傷及背瘡腫毒杖瘡焮發或透入裏者可服木香㯽榔丸七八十丸或至百餘丸生薑湯下五七行量虚實加减用之内經曰先治内然後治外是也又云犬咬蛇傷不可便貼膏藥及生肌散之類内經云先治内後治外可也先當用導水丸禹功散通經散㵼十餘行即時痛减腫消然後可用膏藥生肌散之類傅之則愈方荳䓻散治驢涎馬氣駱駞騾子子狗子蛇傷肉荳䓻二箇自然銅二錢燒酥㯽榔一箇板藍根三分蚛桑子二錢甘草三錢烏梅四箇川鳥頭一箇燒金毛狗􅆃一箇去毛紅花二錢紅芍藥三分茅香三分甘柿蔕一十四箇川楝子四箇香附子二十一箇苦丁香七箇官桂一分半去皮乳香二分右為細末毎服二分温酒一盞調下如生氣食後服熱氣食前如要騐中毒喫大麥麵拌羹吐逆者是不吐非也又一管見如喫大麥麵􅃵一二椀令病人極吐後諸藥大効雄黄散用𢷬麻子汁飲之大効或用雄黄乾薑塗之蔦莧散用蔦莧汁塗之或用烏梅巴豆各等分塗之硫黄散治熊虎爪牙所傷毒痛用雄黄硫黄紫石𢷬末以絳囊盛之帶以防用雄礬散用雄黄礬或用飛丹礬塗之麝香散治䑕咬用猫毛燒灰麝香少許津唾調𫝊一方麝香封上用帛繫之葛根散治熊傷人瘡用燒青布薰瘡口毒出仍煑葛根汁令濃以洗瘡日十度并𢷬葛根為散煑葛根汁服方寸匕日五服瘥治虎咬瘡方用濃煑葛根汁洗十數徧及𢷬為散以葛根汁服方寸匕日五甚者夜二服一方以嫩絮骨燒灰為末乾傅瘡處一方用白礬為末納瘡口中痛止立効一方温水服又方用青布捲為繩燒一頭燃内竹筒中注瘡口薫之極効又方用嚼栗子塗之良治猪嚙方用松脂煉作餅子貼上又方用屋霤中泥塗之治熊虎所傷毒痛用煑生鐡令有味以洗之治熊傷人瘡用蒴藋一大把剉碎以水一升漬須㬰取汁飲餘滓封裹瘡治虎犬咬蛇咬用飲薤汁一升日三瘥又杵汁傅之治猫兒傷用薄荷汁塗之若中猫涎入瘡則令人悶浸椒水調莽草末塗之治蛇犬毒入用黄藥子末傅之治狗咬蚍蜉瘡蛇咬用山豆根並以水研傅之治蛇犬咬用熱人尿淋患處良治虎犬傷用糝礬末内瘡口申裹之痛止立效治虎傷但飲酒常令大醉當吐毛出又方用䑕一枚燒為灰細研先用漿水洗身後傅之甚良治虎咬瘡方用嚼粟米塗之即瘥治惡蛇風犬所傷用唾調人耳塞塗傷處兩頭防毒走散然非數人耳塞不可此極騐又方用萆麻子為細末臘水化白蜜調傅傷處可又辟虎法凡入山用燒水牛羖羊角虎狼蛇皆走治虎傷用生野葛汁塗乾薑末内瘡中治猫兒所咬成瘡不効右以䑕血塗之立瘥山林日用法每欲出行時用雄黄一桐子大火上燒烟右以薰脚綳草屨之類及袍䄂間即百毒不敢侵害邪祟逺辟治虎傷人瘡取生葛根煑濃汁洗瘡兼搗葛根水服方寸匕日夜五六服治虎狼傷瘡以月經衣燒末傅之主人畜為虎狼等傷恐毒入内者取芒莖雜葛根濃煑服之效石芒生髙山如芒節短江西人呼為折草六月七月生穂如荻也治虎傷以細辛雄黄等分為末内瘡中日三四易之治虎及狗咬瘡用猪膏苺搗𫝊之至良治蟲豸咬傷取大藍汁一碗入雄黄麝香二物随意看多少細研投藍汁中以㸃咬處若是毒者即并細服其汁神異之極也昔張薦貟外在劔南為張延賞判官忽被斑蜘蛛咬項上一宿咬處有二道赤色細如箸繞項上從胷前下至心經兩宿頭面腫疼如數升盌大肚漸腫㡬至不救張相素重薦因出家財五百千延賞家財又數百千募能療者忽一人應召云可治張相初甚不信欲騐其方遂令目前合藥其人云不惜方當療人性命耳遂取大藍汁一甆盌取蜘蛛投之藍汁良乆方出得汁中甚困不能動又别𢷬藍汁加麝香末更取蜘蛛投之至汁而死又更取藍汁麝香加雄黄和之更取一蜘蛛投汁中随化為水張相及諸人甚異之遂令㸃於咬處兩日内悉平愈但咬處作小瘡痂落如舊驢馬傷附論人誤被馬咬或踢踏傷損肌肉腫痛若不即治毒氣日深𫝊入臓腑有致死者宜急治之夫驢馬氣之病醫流少有知之者凡人宰殺驢馬及自死開剥不可犯之如開剥驢馬時切忌手指間有瘡痕及誤傷刄其涎入内毒氣發也剥活馬毒少有若自死者大毒殺人命名曰中生氣煑肉之時其半生半熟有白色時毒殺人名曰中熟氣其毒入内初時便不覺頭疼體熱走注疼痛寒熱無時而作起居如常如要知之用麥麫稀湯多飲之即吐涎此知是驢馬之毒也如不吐者非也急用荳䓻散或虎骨酒飲之即可如不知者乆淹日月其毒發則如眼中出其眼即枯如臂中出其臂必傷腿中出腿必瘤幸然存命也如不然則病必篤遍身腫毒而膿出肉爛死者甚衆應驗方云余年㓜時大安元年在洛南縣住親見官中倒死鋪馬命衆屠行開剥此時七人到此開剥之其人皆死後常見此証死者甚衆余深䆒其法於屠户中受此方屡經大効不忍秘之大抵頭目疼身熱比傷寒相似如走注疼痛起居如常此為異耳方殭蠶散治被馬咬傷損皮肉疼痛馬鞭稍五寸燒灰雄䑕糞炒二十枚白殭蚕炒半兩右搗為末以猪脂二兩調傅咬處日三易良立効散出千金方治馬囓人及蹋人作瘡毒腫熱痛馬鞭稍二寸長䑕屎二七枚用合燒為末以猪膏和塗之立愈治遂成瘡爛經乆不愈者以馬鞭皮燒末猪膏和塗虎骨酒治驢馬氣傷瘡毒虎骨酥炙半兩木香三錢右為細末分作二服酒調服之治馬踢傷出經驗良方用地骨皮不拘多少為末以水調𫝊瘡甚効桑皮散出千金方治馬囓人隂卵脱出用推内入以桑皮細作線縫之破烏鷄取肝細剉以封之且忍勿小便即愈治馬犬嚙及馬骨刺傷人及馬血入舊瘡中方用取桑灰汁熱漬瘡常令汁噐有火數易汁勿令爛人肉三數日漬之有腫者炙石熨之日二消止治剥馬被骨刺破毒欲死右以婦人月水傅瘡口立効治馬咬人瘡有毒腫疼痛又剥驢馬傷手出聖惠方用雞冠血着瘡中三下兒馬用雌牝馬用雄一方用熱雞血浸之茺蔚散治馬咬以益母草細切和醋炒封之効益母草即茺蔚子也治馬咬傷出傳信適用方用燒獨顆栗子灰貼瘡追毒治馬咬人或刺破瘡及馬汗入瘡毒痛用馬糞燒灰為末研傅瘡上及馬尿洗瘡佳治驢涎馬汗毒所傷神効白礬飛過黄丹炒令紫色各等分相滚合以貼患處治馬咬人毒入心方出聖恵方用馬齒菜子搗為散每服一錢温酒調下不計時侯馬齒湯食之差又方用蓼藍汁三大盞水二盞煎至一大盞温服二合不計時侯兼用洗瘡良治馬咬人及踏人瘡有毒腫熱痛方用灸瘡中腫上瘥猘犬嚙附論凡春末夏初犬多發狂必誡小弱持杖以預防之防而不免者莫出於灸百日之中一日不闕者方得免難若初見瘡瘥痛定即言平復者此最可畏大禍即至死在旦夕凡狂犬咬人着訖即令人狂精神已别何以得知但看灸時一度火下即覺心中醒然惺惺了了方知咬己即狂是以深須知此此病至重世皆輕之不以為意坐而死者常年有之凡猘犬咬人七日輙應一發三七日不發則脱也要過百日乃得免耳每到七日輙當搗韮汁飲一二升又當終身禁食犬肉蚕蛹食此則發死不可救矣瘡未愈之間禁食生魚及諸肥膩冷食但於飯上蒸魚及於肥膩器中食者便發不宜飲酒能過一年乃佳乃若人曽食落葵中犬咬必難治若已瘥十數年後食之者便發也若重發者生食蟾蜍鱠絶良亦可燒炙食之不必令其人知初得嚙毒便為之則於後不發也儒門事親書云麻先生兄材行為犬所嚙舁至家脛腫如罐堅若鉄石毒氣入裏嘔不下食頭痛而重往問戴人女僮口誦随利減以梹榔丸下之見兩行不瘥適戴人自舞陽囘謂麻曰脛腫如此足之二隂三陽可行乎麻曰俱不可行如是何不大下之乃命夜臨卧服舟車丸百五十粒通經散三四錢比至夜半去十四行腫立消作胡桃紋反細於不傷之脛戴人曰慎勿貼膏紙當令毒氣出流膿血水常行又一日戴人恐毒氣未盡又服舟車丸百餘粒濟川散三四錢見六行病人曰十四行易當六行反難何也戴人曰病盛則勝藥病衰則不勝其藥也六日其膿水盡戴人曰膿水行時不畏風盡后畏風也乃以愈風餅子日三服之又二日方與生肌散一傅之而成効嗚呼用藥有多寡便差别相懸向使不見戴人則利減之言非也以此知醫已難用醫尤難方桃白散出聖恵方治猘犬咬人毒氣攻心悶亂方桃白皮三兩甘草半兩炙微赤剉杏仁三十枚湯浸去皮尖双仁麩炒微黄而成膏桂心一兩右細剉以水三大盞煎至一盞去滓入杏仁膏攪令匀分為二服良乆再服蟬花散出衛生寳鑑方治夏月犬傷及諸般損傷蛆虫極盛臭惡不可近之者蛇退皮一兩用炭燒存性研為末蟬殻半兩青黛半兩華隂細辛三錢半右為細末每服三錢酒調下如六畜損傷成瘡用酒灌如犬傷用梅子和喫蛆皆化為水蝇子不敢再落又以生寒水石末糁上韮根散出聖恵方治猘犬咬人疼痛不止方䜴一合雄䑕糞一兩杏仁韮根各一兩右件藥相和爛研𫝊破處良金黄散出聖恵方治狂犬咬傷損疼痛方白礬一兩燒灰硫黄梔子灰各半兩右件藥都研為末傅咬損處即瘥杏豆散治療狂犬咬方杏仁切去皮尖豆豉各一兩韮根一握淨洗右搗為餅可瘡大小厚一二分貼咬處大作艾炷以灸餅上熱即差猬皮散出千金方治猘犬毒方頭髮猬皮各等分右燒灰水和飲一盃口禁者折齒内藥枸杞散出聖恵方治犬咬方枸杞葉少許塩少許右同搗令熟后傅於瘡上即愈杏桃散出聖恵方治狂犬咬人傷痛方杏人四十枚去皮尖双人拍碎桃白皮切二升右用水二升先煑桃皮取汁一升去滓下杏人再煑减半去滓温分三服得吐乃効金粒丹治風狗毒蛇所傷雄黄一兩透明者大硃砂一錢右研極細旋取温蟾酥為丸如麻子大每服一丸温酒下不忌口一服奏効立効散治風狗所傷蒜杏仁右各等分一處搗爛次用些少消風急風散一捻在蒜内連瘡口四畔傅訖將艾炷灸之次服消風急風二散忌鱔鰻發風等物定風散出衛生家寳方治風狗咬破先口噙漿水洗淨用綿揾乾貼藥更不再發天南星生防風各等分右為細末乾上藥更不再發無膿大有神效不可具述凡惡犬傷人咬破多或一二年三年至七八年咬破處或時疼痛或先發増寒甚至發風遍身搐搦数日不食十死八九余親見者數十人服此藥但凡犬咬破者無有不愈雄麝散出醫方集成治猘犬傷或經久復發無藥可療者用之極驗雄黄色黄而明者五錢麝香五分右各等研和勻用酒調二錢服如不肯服者則撚其鼻而灌之服藥后必使得睡切勿驚起任其自醒候利下惡物再進前藥即見効矣終身禁食犬肉蚕蛹此毒再發則難救梔子散治療狂犬咬方梔子皮燒灰石硫黄末用搗為末傅瘡日一易救急用二三度差虎骨散治療狂犬咬方虎骨石灰右二味以臘月猪脂和作餅子暴乾搗末以傅之良治凡犬嚙人方出千金方用取竈中熱灰以糁瘡中帛褁繫之又方出千金方用燒自死蛇一枚令焦為末内瘡孔中又方出千金方用䑕屎為末以臘月猪膏𫝊之或用䑕一枚猪膏煎傅之又方出千金方用飲生姜汁一升一方用白姜炙熨之良韮汁亦佳治狂狗咬出本草用菘耳葉煑服之又方出千金方用燒犬尾為末𫝊瘡日三又方出千金方治犬咬人重發瘡用頭垢少許内瘡中以熱牛糞塗之佳又方出千金方治凡犬囓人用苦酒和灰塗瘡中治小兒狗囓方出千金方用月一日以水一升灌之勿令狗主打狗若月盡日三升水灌之治猘犬毒方出千金方用搗韮絞取汁飲一升日三瘡愈止愈後復發者用韮根故梳二枚用水二升煮一升頓服又方用刮虎牙若虎頭骨為末酒服方寸匕或刮狼牙骨末服已發狂如猘犬者服即愈又方用髪及猬皮少許焼灰水和服之又方出千金方用燒虎骨傅瘡及熨之又微熬杏人搗研取汁服之良又取燈盞殘油灌瘡口此皆禁酒猪肉魚生菜又方出千金方用桃東南枝白皮一握水二升煑取一升分二服吐出犬子又方出千金方用服莨菪子七枚日一度以水服之差止又取其猘狗腦上毛燒灰傅瘡上不發一方用莨菪爛搗和塩傅之又方出千金方用梅子末酒服之又方出千金方用豆醬清塗之日三四差治狂犬囓人方出千金方用蛇脯一枚炙去頭搗末服五分匕日三又方出千金方用青布浸汁服三升又方出千金方用飲驢尿一二升或驢屎汁飲一升即差治風狗傷出濟生㧞粹方用口噙漿水洗淨以乾薑末塗貼又方出濟生㧞粹方用吮去血漿水洗畢紙上炒黄丹赤色貼之蟾蜍灰散出肘后方治狂犬咬人重發者用蟾蜍三个燒灰搗羅為末每服二錢温水調下服時不得令人知一方焙乾傅之又剥作鱠吞蒜虀下治猘犬咬人毒氣攻心悶亂方用蝦蟆一枚燒灰細研為末以粥飲調服之即愈一方蝦蟆作膾而愈一方用砂糖同搗汁服沈約宋書曰張收嘗為猘犬所傷醫云宜食蝦蟆膾收甚難之醫含笑先嘗收因此乃食瘡亦即愈治猘犬囓重發方出聖恵方用乾姜搗為細末每服二錢以温水調下不拘時侯一方用末傅瘡口立差治犬咬成瘡漏方出聖恵方用石灰細研為末以醋和塗瘡上治犬咬方出聖恵方用取地龍爛搗封根咬處當有毛或收得乾者搗末用油調封之又方出聖恵方用闕燒灰細研為末以醋調塗之治狗咬用杏仁研細先切䓤湯洗然後傅塗傷處一方同馬藺根研細塗之一方搗杏仁傅之服汁亦佳熬成膏令黑傅亦可又方出危氏方用萆蔴子五十粒去殻井水研成膏先以鹽水洗咬處次以此膏傅貼或用虎骨末及虎膏一方無虎骨末莽草散出危氏方治狗咬涎入瘡令人昏悶用上好浸椒水調莾草末塗之又方出仁存方治虎犬咬人用白礬為末糝瘡内裹之立愈治犬咬凍瘡出危氏方並以秫米嚼傅治狂犬咬人出聖惠方用蚯蚓屎和鹽研封狂犬傷毒處出犬毛殊有神效一方井口蚯蚓糞濕傅瘡上以物包定即差治療猘犬咬人出醫方大成用仍殺所咬犬取腦傅之後不復發治猘犬咬人出千金方用煑地榆汁飲之兼末傅瘡上服方寸匕日三服忌酒若治瘡已差者搗生韮汁飲之一二升一方無韮汁地榆絞汁無生者乾水煑飲之傅上一方為散水調服二三錢日三次服兼可傅瘡上過百日止解狗毒杏人礬石韮根人尿各等分研細爛𫝊毒處治犬咬人重發用服蔓菁汁佳一方地榆為末咬處立差治狗咬傷用鍋墨為末桐油調塗又方用嚼杏仁沃破處以帛繫定一方以人屎汁傅尤良治癩狗傷用真茶末桐油濃調塗傷處治顛狗咬人用清油泥於破咬處擦成條搯斷看油泥内直至無狗毛為度如有毛更擦然後用水調嫩米糠為膏貼之此一方賀都目傅清油泥俗云油屎治顛狗咬人出經驗良方用斑猫七箇去翅足為末夏間豆豉四十九粒去皮滴水研為膏入和班猫末為丸如梧桐子大盡數服白熟水下却將穢桶盛水令病人尿小便於内停半日見小便桶内水中氣凝結如狗形則愈如不下再合服至七次始獲全安清油散出經驗良方治顛狗咬人用生麻油滴䜴為膏弹子大常常拭揩所咬瘡口分開䜴弹見有狗毛茸茸此毒出即安至無茸毛為度日間常行食用加杏子食之尤妙又方出經驗良方凡被癲癩狗咬不可便用水洗及飯擦可用草藥名鉄薄荷又名接骨草用葉并根梗以水洗去土擂爛傅傷處用絹帛包定無令着水神効其草如菊花葉兩葉相對到秋有青花如小蓼花相似治風顛狗咬人出經騐良方用前方須要服藥後方可常食杏仁逐其毒又方出德生堂方用班猫七箇去頭足翅研為細末温酒調服其毒亦從小便中出膏膜形如狗狀如小便雖出不見狗形須服七次方可如大小便俱澁不下却用火麻燒灰存性同没藥末茶各少許用温湯調服引導其毒即下又方出經驗良方當時被咬如藥不便随即用生䓤連白不以多少擂爛先塗咬傷處然後服前藥虎骨膏治犬咬有一人被咬以蚯蚓屎黄泥各少許入些虎骨同調傅瘡口上一服便愈曽有驗治狗咬着破傷風欲死者用遍白狗糞燒灰温酒下神効紫荆皮散治狂犬傷人先以杏仁搗爛焙去毒以紫荆皮煎水又以沙糖調紫荆皮末塗治風狗咬用路厠架上乾屎刮下用帯皮柳木搥熟搗成膏攤紙上貼傷處睡去睡覺則汗出而愈永不再發不忌口治猘犬咬人出肘後方用搗乾地黄汁飲之并塗瘡口上百度止立効散治風狗咬傷用餓老鷹胆一箇温酒調下或四十日或百日不瘥者不過三服愈治顛犬所傷出醫方集成用斑猫大者二十一隻去頭翅并足用糯米一勺先將斑猫七枚入米内於微火上炒不令米赤去此斑猫别入七隻再於前米内炒令斑猫色變復去之又别用七隻如前法炒以米出青烟為度去斑猫不用以米研為粉用冷水入清油少許空心調服須又再進一服以小便利下惡毒為度如不利再進一服利后腹肚疼痛急用冷水調青靛服之以解其毒否則有傷或煎黄連水亦可不宜便食熱物治猘狗囓用葛根末傅之觸骨散出肘後方治狂犬咬人及諸犬咬瘡不瘥吐白沫者為毒攻入心人煩亂喚呌作犬聲者方用髑髅骨燒灰末以東流水和服方寸匕以活止凡狂犬咋人七日輙應一發過三七日不發則免也要過百日乃為大免每至七日輙當搗薤一作韭汁飲二三升又當終身禁食犬肉蚕蛹若食此發則不可救矣瘡未瘥之間亦忌食生物諸肥膩肉及諸冷食但於飯上蒸生魚及就膩器中食便發不宜飲酒能過一年乃佳杏仁膏治狂犬咬人凡被狂犬咬人即急嗍去血急吐之勿錯嚥之然后搗杏仁和大虫牙捻作餅子貼瘡上頓灸二七壮從此已后每日灸一兩壯貼杏仁餅子灸之須要滿百日乃止百日内必莫斷使瘡瘥如無大虫牙单用杏仁亦可狂犬咬人每至七日即合一發但至七日即須搗韭汁服一大合日再服之縱非至七日但一日兩日服一兩合大妙如冬月無韭取韮根搗汁服之又三兩日取杏仁一合搗碎熟研濾取汁和大虫牙齒骨亦可用熟煎取一大升汁又燒竹瀝一合以和杏仁酪汁更煎一兩沸分三服一日使盡又取所咬犬腦以塗瘡大佳取大虫牙齒末或大虫脂塗之更佳須忌酒治救急療狂犬囓人旡問深淺者方初被咬便以冷水洗令血斷封裹著如其瘡大及深宜放流水中浸之血斷依法封裹更不用餘藥忌風千萬可畏凡初被咬即覔一切物與喫后不發也治風狗咬出瑞竹堂用桃核殻半箇將野人肝即人之大糞也填滿以榆皮盖定掩於傷處用艾於桃核上灸二七十四炷即愈永不發作治風犬傷用白糞虫去肚中黒研之一二盌頭頂上有赤髮多火㧞去以虫傅之治療猘犬咬人方出千金方用火炙䗶以灌瘡中一方挼蓼以傅瘡上又方用白芷末湯茶調服永不發又方用槐皮並葉傅之又方用枇杷葉以臈酒一瓶新開傾出酒令乾將枇杷葉火上燒過作黒色捺入瓶中用紙宻盖一椀飯時取出葉灰研為細末糝於被傷處随即痛定痊可絶妙皂角散治療猘犬咬人方用淨洗口以獨蒜切片子安在口上却用䓤鹽全蝎皂角四味同擂細安在上用艾灸黄水出為度治狗咬傷方用磚青和牛糞𫝊之治狂犬出肘後方以犬腎心搗傅咬處治狂犬咬寒熱欲發者刺熱人血飲之治狂犬毒入心悶絶不識人方出聖恵方用取黒豆煮汁服之甚良治犬咬方出千金方用熱牛糞塗傅咬處佳如無濕糞以乾糞為末小油調塗立効風狗亦無害治狂犬嚙人出聖恵方用乾蛇一條酒浸炙令黄色又搗為末水調二錢日四五服治犬咬人傷處毒痛心悶方出聖惠方用火灸瘡中毒上以搗韮汁飲三合日四五服瘡瘥即止治犬傷出千便良方䑕糞為末用冷井水洗瘡淨乾别用津調塗紙靨之帛子縛之濕者乾糝治犬傷出如意方麝香沉香防風各等分右為末以生杏仁研酒下治犬傷細研䑕糞以生油膩調塗立効治狂犬咬人取䑕屎二升燒末研𫝊瘡上治狂犬咬發狂欲死以蟾蜍作鱠食之頻食數頓治狗咬瘡用見腫消生苗葉爛搗貼瘡治狗咬破傷風人參不計多少桑柴火上燒令煙絶用盞子合研為末糝在瘡上立効治狗咬用山豆根水研傅之若猘犬咬以水調服二錢治狂狗咬取百家筯煎汁飲之一方就人家乞取煎汁服之療狂狗咬人欲發者及蛇蝎惡虫等毒藥毒以韮葉及根生搗絞汁服治狂犬毒以紫珠煑汁服之治犬咬瘡用屋漏水即以水澆屋簷承取用洗之又以水滴簷下令土濕取土以傅犬咬處瘡上治猘犬咬人出肘後方用牀四脚下土和成泥傅瘡上灸之一七壮瘡中得犬毛者愈猘犬狂犬也療猘犬咬人出肘後方用地榆根末服方寸匕日一二服亦搗傅瘡上更佳治狗咬瘡右以竹藍耳燒􅁅傅狗咬處良治狂犬傷毒以白頸蚯蚓屎封之出犬毛神驗治犬咬右用黄荆葉搗急罨瘡口即安治狂狗咬人取桃白皮一握水三升煎取一升服桃白皮味苦辛平諸蟲傷附論凡諸蟲齒所傷其類不一然毒入皮膚非真氣正法不能移變故上古有移精變氣祝由之法今雖具存而逐惡去毒之劑亦不可廢也凡有一切毒螫之物必不得起惡心向之亦不得殺之若輙殺之于後必遭螫毒治亦難瘥慎之慎之方如聖散出宣明論治蛇蝎諸虫毒傷川烏防風去蘆白芷各二兩川芎一兩二錢半草烏頭半兩蒼术二兩去皮細辛去苗土浄七錢半右件俱不見火生用晒乾研為細末傅之如神又蛇蝎螫狗咬用口噙漿水洗淨用藥末貼上三二次勤傅即愈諸小虫血傷無口者唾津調藥擦上勤易三五次即愈麝香雄黄散出百一選方治二十七般惡虫咬傷人及瘡腫者麝香雄黄乳香硇砂各二錢徳生堂一作硼砂土蜂窩露蜂窩燒灰各一錢右研為末以醋調少許塗咬着處或不辨認得多疑是惡瘡三五日不療即毒入心難瘥忌雞魚膩物一方有白礬却無乳香聖核子出濟生㧞粹方治蛇咬蝎螫雄黄三錢信一錢皂角子巴豆各四十九箇耳塞麝香少許用五月五日不聞雞犬婦人處不語搗為細末在杏子内封之針挑出止痛為用大有神効雄黄丸治百虫囓毒氣内攻雄黄研朱砂研各半兩䔧蘆去苗微炒巴豆去皮心研去油鬼臼去鬚三味各一分右研為末鍊蜜和圎如大豆大每服三丸空腹煎乾薑湯下當轉出惡并虫等當煩悶後以鴨為􅃵食之辰砂丸治百虫囓沙虱蛇蝎虫毒辰砂雄黄研水飛赤足蜈蚣續随子各一兩麝香一分右搗研為末粟米糊為丸如菉豆大每服一丸冷水下良久身上毛旋起處即是毒所傷却用水調一丸於毛旋起處遶圍四畔其虱自爆出雄黄散出千金方治入山草辟衆蛇治蛇傷蜈蚣蝎螫諸毒虫咬乾薑麝香雄黄各等分右為粗散以絳袋盛帯之男左女右蛇毒塗瘡如無麝香以麝罔和帯之以蜜為膏𫝊螫處良一方研為細末用津唾㸃時糝患處痛即止麝香雄黄散出經効濟世方治百虫所傷雄黄硼砂白礬並研細土蜂窩炙各半兩麝香一錢右為末用醋調𫝊咬處日一二服甜葶藶散出聖恵方治虫咬方甜葶藶蛇床子莵絲子鹽各一兩右各搗細為散以釅醋調如膏日三度塗之一方加麝香阿魏丸出聖恵方治辟蚊虫及諸虫等方臰樗皮鰻鱺魚阿魏芫花已上各半兩右為末用乳香煎汁和丸如雞頭大燒之是虫皆去地胆散治一切虫囓地胆曝乾地錦各等分曝右為散每用一錢盞内用醋調却用盞一隻合定慢火熬熱塗囓處如已囓得三兩日即先以牡蠣末一錢新汲水調下然後塗此藥藍汁膏治虫螫傷方見本門蜘蛛蜈蚣傷類雄麝散治一切䖝豸蜘蛛等毒右用鹽汁入雄黄麝香和塗之能化虫為水蚌粉散治天蛇毒方右以蚌粉滑石貝母為末𫝊之水銀膏治惡蛇傷紅腫爛者乾薑水銀猪脂臈月者各等分右揉令相得即置丸向椀中燒以竹筒籠上薫所腫處未薫先破兩處然後薫即瘥苦楝散治辟蚊虫及諸虫等方苦楝花栢子菖蒲各一兩右為散慢火燒聞氣自去矣硇砂散治守宮囓雄黄半兩硇砂一分右細研為散以少許傅之雄黄散治毒蟻螫人雄黄一錢麝香半錢自研細右研勻以生麻油調𫝊之立勝散治虫蛇蜂蝎蚖蛇蜘蛛沙虫等傷毒大紅川椒去核十五粒豆䜴十粒右同入口嚼爛唾在手心次用南星末調和得所𫝊傷處毒水自出續又再傅神効豆䜴油治春夏月樹木墻間有一等雜色毛虫極毒凡人觸着者則放小毛入手足上自皮至肉自肉入骨其初則皮肉微痒以漸生痛經十數日痒在外而痛在内用手抓搔或痛或痒必至骨肉皆爛有性命之憂此名中射諸藥不能治之用好豆䜴約一椀清油半盞拌䜴搗爛厚傅痛痒處經一時久䜴氣透骨則引出虫毛紛紛可見取下䜴埋在土中煎香白芷湯洗痛處如肉已爛用海螵蛸為末傅之愈海螵蛸即烏賊魚之骨也麝香傅方治一切虫囓痛右用麝香細研一錢封囓處帛縳之一方虫咬䑕咬用麝香細研蜜封塗之瘥用津調亦得治百虫囓毒攻瘡痛塗方用犀角一片以井花水磨取濃汁塗瘡上治五毒虫螫赤腫不止馬齒莧傅方并治蛇咬用馬齒莧葉洗切爛研厚𫝊之一方貼之亦可治一切虫囓痛膩粉傅方用膩粉一分用生薑自然汁調𫝊之青麻心方治守宮囓用青麻葉心七枚以手挼碎取汁塗之治蛇虫咬用猪牙中垢塗嚙處頻易治蚰蜒清明前一日取馬藺正日五更煎湯洒諸處治天蛇螫毒舉身潰爛號呼欲絶者用秦皮煮汁一斗許恣意飲之初日减半兩三日頻愈不知天蛇為何物或云草間黄花蜘蛛是也人遭其毒仍為露水所濡乃成此疾沈存中筆談載之甚詳一方秦皮濃煎服後用蚌粉滑石貝母末傅昔太子中允闗把曾提舉廣南西路常平倉行部邕管一吏為虫傷毒舉身潰爛有一醫言能治使醫視之曰此天蛇所螫疾已深不可為也乃以藥傅其瘡有腫起以鉗㧞之有物如蛇凡取十餘條而疾不起又錢塘西溪常有一田家忽病癩通身潰爛號呼欲絶西溪寺僧識之曰此天蛇毒爾非癩也取秦皮如上服之而愈治壁鏡咬用桑柴灰汁三度沸取汁調白礬末為膏塗瘡口瘥兼治蛇咬毒治羊辣子傷用蠶蠒拶之立愈治蠶咬用苧汁塗之今苧近蠶不生也治辟蚊蟲及諸虫等方用鰻鱺魚乾者於室中燒之即蚊子化為水矣治蚯蚓咬用濃鹽湯浸身數徧瘥浙西軍將張韶為此虫所咬其形如大風眉鬢皆落每夕蚯蚓鳴用此方愈或以石灰水浸身亦効治螻蛄咬用斛葉燒灰細研以泔水浸斛葉取洗瘡拭之内少許灰於瘡中治蛇䖝蜈蚣咬用家桑葉蒸後罯塩挼𫝊瘡上葉未開枝可作煎酒服又治一切風家桑葉暖無毒利五臓通闗節下氣煎服除風痛出汗并撲損瘀血並治之治桑蠍咬人用丁香末蜜調塗之治蜂蝎螫人方用人參嚼封之治入山草辟衆蛇傷蜈蚣蝎螫諸毒䖝咬用常燒羚羊角使煙出蛇則去矣一方用羖角治蜘蛛咬䖝蚕咬蠼螋溺瘡用猪膏苺擣汁傅之猪膏苺似荏葉有毛治蝼蛄咬蚯蚓咬其形如大風眉鬚落用石灰醋和塗之治惡䖝咬用酥和鹽傅之治蛇䖝傷惡瘡疥溪毒沙虱用葫蘆搗貼熟醋浸之經年者良治䖝咬用荏葉擣傅治蚰蜒蜘蛛蟻子咬用油麻研塗傅瘡瘥治諸蛇虺蝎惡䖝毒用韮根葉擣汁服之治䖝咬人用紫草塗之一方用紫草油塗之治蛐蟮咬人方及中蜈蚣毒者用鷄屎傅之治蚯蚓咬痛用鴨屎傅之人屎亦可搨又以䓤白傅之治毒蛇並射工沙虱等傷眼黒口噤手脚强有毒攻腹内成塊逡巡不救宜用此方用蒼耳嫩葉一握研取汁温酒和灌之將滓厚罨所傷處一方蒼耳𫝊之亦妙治蛇咬蜘蛛毒用鷄卵輕敲一小孔合咬處立瘥一方取白塗四畔瘡即愈辟諸䖝法用薺花置席下辟䖝治諸䖝毒用嚼青蒿葉擦之治壁鏡咬毒人必死方用醋磨大黄塗之治惡蛇傷紅腫者用棟木根并皮切一升以水三升和煎取二升適寒温浸洗瘡冷即易再三瘥治惡蛇傷紅腫爛者用胡䓤於煻火中煨令軟即出以紙隔手挼令破以搨瘡上以痛定為度李饒州多用神効治諸蛇虺蝎惡䖝毒用令烟薫瘡口令烟入瘡中佳治蛇䖝咬及疥癬惡瘡用天南星入藥炮為末用醋調𫝊之治蛇䖝傷用䓤根葉擣之内加鹽少許同擣傅治蛇虺螫人用射岡塗螫處頻易塗腫上血出即愈治蛇蝎蜈蚣等傷用生鐡石上水磨汁塗之治蚯蚓咬用老茶研末調塗之立愈治壁鏡咬人立死方用㯽榔不拘多少燒灰存性先以醋淋洗後以醋調貼之治諸蛇犬咬皆可治用黄花草為末傅傷處治蜈蚣蝎方用枯白礬不拘多少如傷左㸃左眼右㸃右眼治蚰蜒咬用木鱉子末醋調塗之治惡䖝咬出聖恵方用馬腸根生油磨塗之治百䖝所傷出衛生家寶方雄黄一兩白礬飛過硇砂一分麝香一錢露房蜂窠一分燒灰存性土蜂窠半兩生研烏梅肉半兩焙乾右一處研極細先用針挑開瘡口用醋并藥少許擦之次用醋打麵糊攤紙花子盖之病小一服病大日一換治山源深逺處沙虱圡虺蛇纒丹毒傷人累經神驗方烏賊魚骨胆礬赤足全脚大蜈蚣右三味等分細研為末如有患者速於元發端處以針挑破用辟蜈蚣辟虱蝎蚊䖝使聞之不敢近出衛生家寳方雄黄五分砒五分栢子青楝子各一升菖蒲四両右為細末次入雄黄砒同研勻每用三錢以紙裹藥燈上㸃於房中薫又治壁鏡毒人必死方右溶化白礬乘熱滴傷處痛止毒出杏黄膏出百一選方治蛇䖝所傷皆可治右以杏核七七箇每磨開一竅去仁研真雄黄末填其中次以蠟封之共置一瓦合内合口更須固濟窖於向北靜處簷下七七日取出要用則槌開一核以津液調雄黄傅咬處當不移時毒氣盡作黄水消去此藥重午日合吳茱茰散治蛇蝎螫人右用乾薑嚼𫝊瘡上不過三四瘥又煑吳茱茰湯以漬瘡上瘥治蛇䖝咬傷先用帛片縛住兩頭免毒氣行急用手按擦去毒氣用草鵝糞同新水擂爛罨傷處四圍又方用黄泥調新冷水擦傷處見清水出乃止便用野决明菜搗爛酒浸濾去滓服留滓罨傷處以帛片裹之又方名纒蛇丹凡為蛇傷蜂蠆蜈蚣毒䖝顛犬所傷皆可用雄黄為末水調塗兼用井花水及酒調喫甚効治蛇毒蝎螫咬出朱氏集驗方用醋磨雄黄塗之治蛇䖝所傷羚羊北人多食南人食之免為蛇䖝所傷和五味子炒之投酒中經宿飲之又治筋骨急强中風治蛇䖝咬出聖恵方用烏蘝苺五葉或生人家墻間搗𫝊瘡腫蛇䖝咬處治蛇䖝咬用茨菰葉研𫝊之一方用根搗爛傅治諸䖝蛇傷用菩薩草搗絞飲汁及研傅之治蛇咬瘡蜈蚣所傷出聖恵方用桑樹白皮汁傅之瘥治蛇䖝咬及蛇虺螫人用藊豆葉搗爛𫝊之一方用白藊豆搗汁𫝊之治蚖蛇惡䖝毒并疥癬癰腫瘰􅊓用鹽水酒服之著瘡不爾磨傅之治蚯蚓毒腹大夜聞蚯蚓鳴於身者以鹽水浸之昔崇寕隴州兵士暑月在倅㕔前跣立為蚯蚓所中遂不救數日又有被其毒教以先飲鹽湯一盃次以鹽湯浸足乃愈治䖝毒螫咬用合子草搗𫝊瘡上治蚕咬取大蝦蟆􅆃背上白汁和蟻子灰塗之治蛇䖝傷犬咬以榖樹汁傅之治䖝蛇犬等咬傷以千里及搗傅咬處治蛇䖝蜘蛛蚕咬毒入内者以􅀈桐葉搗封傷處又皮為末服之治蜘蛛蛇蝎毒以小薊搗絞取汁服之佳治惡䖝咬作瘡者取陽烏鸛觜燒為末酒下服之陽烏鸛亦名陽鴉出建州治諸䖝咬用土㯽榔細研油塗之堦除間蟾蜍屎也治䖝蚕蛇犬咬用五毒草根醋磨傅瘡上亦搗莖葉傅之恐毒入腹亦煮服之治蛇蝎䖝咬等毒取千金䥶草搗傅瘡上生肌止痛治蜂及蜈蚣螫人取蜘蛛置肉上則能吸毒治䖝蚕蜘蛛等咬用灰藋搗碎和油傅之治蛇及蜘蛛咬用鬼釵草杵碎傅之亦杵絞汁服之治蛇犬咬等毒以風涎母煮服之治蚕及諸䖝如蚕類咬人恐毒入腹用蚕菵草煮服之生搗傅瘡亦効治蚖蛇惡䖝毒疥癬癰腫瘰􅊓用戎鹽水酒服之著瘡不爾磨傅治惡䖝蛇螫毒用地菘挼以𫝊之治蛇䖝咬用蛇苺搗𫝊之治䖝咬取百舌鳥巢及糞塗咬處亦用百舌鳥炙食之良治䖝毒以人肝藤生研服治雜䖝咬以蟾蜍糞傅之治溪毒及逰䖝用溪狗燒末服一二錢匕治䖝蚕咬以百部根火炙浸酒空腹飲之治蛇蜂叮毒用糟𫝊之治惡䖝咬人入腹及咬人生瘡者取赤龍浴水服之此澤間水泉赤蛇在中者經雨取之治蝸牛䖝所毒徧身者以蓼子煑汁浸之立瘥治䖝刺螫人方用好豉心以足為限但覺刺即熟嚼豉以𫝊之少頃見豉中毛即瘥不見又嚼𫝊之晝夜勿絶見毛為度治䖝咬毒用烏雌雞糞炒服之治䑕咬人以麝香封上用帛子繋之治蛇䖝沙虱瘡用小蒜傅之治蛇虺䖝蚕狂犬等毒以紫荆木煑汁服之治狐尿刺人腫痛用熱蠟着瘡中又燒烟薫之令汁出即便愈治狐尿刺螫痛用杏仁細研一兩沸承熱以浸螫處數易之治蛇䖝毒以蒼鵝糞傅之及舎中飬能辟蛇䖝普濟方卷三百六
