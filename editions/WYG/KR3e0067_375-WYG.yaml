半兩先炙去絲頭用薄荷酒依前法製之天南星一兩取末生薑一兩切作片子新薄荷葉三兩如無新者用乾葉一兩作餅子取乾後用如急驚風不用南星加大黄大黄煨一兩若慢驚風不用大黄用製天南星白附子三錢防風天麻甘草硃砂川芎半兩右為末每服一錢一嵗兒服半字錢三嵗兒煎薄荷湯調下量小兒大小嵗數加减服之定鎮心神煎金銀薄荷湯調下身熱發搐煎火府散調下慢驚吐瀉發搐煎生薑湯下急驚風發火府散煎加大黄煎湯調下鎮心丸出王氏博濟方治小兒急慢驚風搐搦不定中焦壅熱化痰理驚金銀箔各三十片牛黄一錢茯神半兩去皮鐵粉半兩龍腦一錢防葵半兩人參半兩雄黄一分硃砂半兩犀角一分大黄一分龍齒一錢右都研勻細末煉蜜和丸如小鷄頭子大每服看兒大小薄荷湯化下如大人心神不定多怔忪亦宜服之六神丹治小兒急慢驚風涎潮氣壅安神養魄去風邪定嗽喘利膈白殭蠶直者一錢浴淨薑汁浸微炒辰砂一錢蜈蚣大者一條去頭足用好酒浸炙香蝎稍一錢去尖半夏陳者一錢刮去滑湯洗七次真麝香一字甘草一錢人參一錢去蘆洗切焙藿香葉一錢右為細末煉蜜為丸如鷄頭子大周嵗兒每服一丸薄荷湯化下二三周及一周者以意加减硃砂膏出衛生家寳方治急慢驚風形候一般皆治硃砂一錢蝸牛五箇輕粉一錢右一處為末煉蜜為膏每服周嵗一黒豆大薄荷汁調下日三服與虀半散相間或間惺惺散亦得不退服羗活膏與虀半散其蝸牛連殻用先用瓦摻黄丹將蝸牛在上火上焙乾醉紅散出宿川氏方治小兒急慢驚風潮搐涎盛口眼偏斜精神昏悶若腹急脹睛上視則難愈蜈蚣白殭蠶全蝎去毒二味七枚香白芷硃砂一錢天仙子一字曼陀羅花七枚天南星一枚大者作合子入藥在内將南星來塞之用無灰酒浸濕紙褁入地坑内盖合坑角炭火二分煆乾時取開入酒浸洗之候火盡方取出焙乾右件為細末每服一字病甚者服半錢急驚用薄荷自然汁調慢驚荆芥湯入酒三五滴同調下不拘時候乳香丸治急慢驚風頑痰壅上目時上視乳香龍腦牛黄硃砂麝香天麻人參防風全蝎甘草茯苓右件為細末用蜜為丸如鷄頭子大荆芥湯下雄黄散治小兒急慢驚風手足搐掣壯熱口噤不省人事天麻蟬退南星桂心半夏薑汁製白附子雄黄麝香天竺黄膩粉全蝎右為末用棗肉為丸菉豆大薄荷湯下梨漿飲出傳氏活嬰方治急慢驚風後餘熱不退或被醫人進熱藥致令孩子煩躁硼砂一錢全蝎一錢白附子半錢麝香鉛霜一錢荆芥一錢硃砂一錢腦子少許鐡粉半錢南星大者一箇牛膽汁浸三面褁煨右為末每服一字燈心金銀薄荷湯下靈砂救命散治小兒急慢驚身仰涎盛目時上視牙關緊急頻發搐搦或利生風手足瘈瘲哽氣神昏五靈脂一兩醋浸化去砂石慢火熬成膏羗活去蘆曼陀羅花四枚天麻酒浸焙乾烏蛇尾滑石别研鈎藤右件為細末煮醋糊滴水為丸每一兩作四十丸隂乾每服半丸至一丸煎生薑荆芥湯磨下不拘時候琥珀真珠丸治小兒急慢驚風涎留心經上逆作吐目睛直視手足搐搦治風癎瘈瘲痰潮昏塞吐舌揺頭作聲狂呌巴豆七粒取霜附子尖十四枚半生半炮半夏十一枚半生半炮白花蛇頭一枚酒浸焙乾白殭蠶十四枚一半生一半用薄荷葉褁煨炙焦去薄荷不用白附子二枚半生半炮全蝎十四枚一半生一半用薄荷半炙黄色去薄荷不用天南星二錢羗活去蘆頭白鮮皮琥珀别研天麻真珠末别研麝香一字别研硃砂别研龍腦一錢雄黄半錢别研烏蛇頭蛇黄火煆醋淬三遍白殭蠶防風去蘆頭天麻已上五味各一兩五靈脂半兩全蝎一錢去毒麝香一分研硃砂一錢叧研代赭石半兩火煆醋淬三遍右為細末糯米煮糊為丸每一兩作十四丸金箔為衣一嵗兒一丸分三服薄荷湯磨下急驚再磨慢驚荆芥湯磨下不拘時候天南星丸出楊氏家藏方治小兒急慢驚風涎盛搐搦嘔吐涎沫神昏貪睡全蝎去毒白附子五靈脂去沙石蟬蛻天南星各等分右件為細末煮米醋糊和為丸每一兩作四十丸隂乾每服半丸至一丸煎生薑荆芥湯磨下不拘時候琥珀珍珠丸治小兒急慢驚風涎留心經上逆作吐目睛直視手足搐搦及治風癎瘈瘲痰潮昏寒嚼舌揺頭聲狂呌巴豆七粒附子尖十四枚半生半熟半夏十四枚半生半熟白花蛇一條白殭蠶十四枚半生半熟用薄荷葉包褁煨焦黄色去薄荷白附子二枚半生半熟全蝎十四箇半生半熟用薄荷葉褁炙黄色去薄荷天南星半生半熟二錢羗活白鮮皮琥珀天麻真珠末麝香硃砂龍腦一錢雄黄半錢右件為細末以猪心血薄荷自然汁煮麵糊和圎如蘿蔔子大每服十丸煎人參湯送下不拘時候利驚丸出楊氏家藏方治小兒急慢驚風涎壅吐嚥不下神志昏憒目瞪搐搦硃砂阿魏濕紙褁湯上薫令軟乳香一錢蜈蚣一條炙黄蝎稍七枚去毒巴豆大一枚去皮水浸三日右件為細末次入阿魏巴豆同研成膏如末成即用重湯煮之為丸如黍米大一嵗兒每服三丸濃煎蘿蔔子湯送下利下涎即效不拘時候葱涎丸出楊氏家蔵方治小兒急慢驚風涎潮搐搦項反背折蜒蚰一條天南星生一分為細末摻蚰焚身用竹箆子括下不用蚰蜈蚣一條全蝎十枚去毒用薄荷葉褁慢火炙黄去薄荷巴豆五枚右件為細末生葱涎為丸如菉豆大或如黍米大妙用硃砂為衣每服五丸壁上塵湯送下不拘時候長生丸出楊氏家蔵方治小兒急慢驚昏睡目斜視項背强直牙關𦂳急蜈蚣全蝎十枚去皮天南星二錢以上二味用薑汁半盞入磁器中慢火熬盡取出焙乾棘剛子十枚去殻生用右件為細末湯浸雪糕為丸如芥子大周嵗兒每服十丸兩嵗兒每服十五丸用千金散作湯便送下千金散白花蛇頭一枚麻黄二十四根去節新瓦上焙黄色右件為細末如急驚入研細腦子少許温湯調藥一字不拘時候􅀈蜥散治小兒急慢驚風身熱涎盛頻發搐搦神志昏憒白附子一枚天麻去苗全蝎去毒白殭蠶天南星人參去蘆附子去皮臍尖六味二錢甘草鈎藤硃砂一味各一錢腦子一字研麝香一字别研右件為細末次入腦麝研勻半嵗兒每服一字周嵗兒每服半錢用薄荷荆芥湯調下不拘時候􅅉驚丸治小兒急慢驚風搐搦不定頭項反折神志昏塞螳螂一枚大者去足翅硃砂一錢半同研􅎙螂三枚去頭足翅入雄黄半錢同研蜈蚣大者入硃砂一錢半同研石龍子一枚入硃砂一錢同研以上四味油紙裹窨乾入後藥蟾酥一分真珠末麝香龍腦各一錢𤓰蒂七枚細辛末半錢白花蛇頭酒浸焙乾半錢蟾酥一分右件同研為細末取孩兒乳汁和丸如蘿蔔子大每用一丸以妳汁磨化滴鼻中得􅅉立瘥次用薄荷湯化下五七丸不拘時候水仙散出楊氏家蔵方治小兒急慢驚風神昏不省水仙子𤓰蒂半錢躑躅三錢腦子半字鵞不食草三錢蝎稍半兩蜈蚣一條麝香一字右件研為細末每服半米粒大次入鼻中得􅅉為度白附子丸出楊氏家蔵方治小兒急慢驚風潮搐生涎上氣喘急白附子研半夏硃砂各半兩白殭蠶一兩全蝎二十一枚去毒膩粉一分麝香一分金箔一片右件將白附子等五味研為細末次入研藥一處攪勻煮棗肉和丸如黍米大每服十丸煎荆芥湯送下不拘時候蛇黄丸出楊氏家蔵方治小兒急慢驚風涎壅驚悸或作癎疾人參去蘆硃砂研蛇黄七次别研半夏茯神去木六味各半兩鐵粉二錢半麝香半兩右件為細末入研者藥和勻煮麵為丸如黍米大每服十丸生薑湯送下乳食後服通關散治小兒急慢驚風搐搦作潮蜈蚣一條乾者葱涎浸一日一夜麝香一字草烏頭十四箇薄荷生薑自然汁浸一日一夜焙乾右件為細末每俟潮搐時男左女右用一米粒吹入鼻中神應散治小兒急慢驚風出東坡家𫝊方有應雄黄二兩硃砂一錢全蝎七箇去毒蜈蚣一條殭蠶一箇直者炒右為細末每用半錢薄荷湯調服萬應丹出東坡生蘭室秘蔵方一斗紅雲一斗雪神妙却在青蒿節不論急驚與慢驚臨時須用生人血右於七月二十五日取青蒿上物研和為丸如梧桐子大每量大小輕重加减乳汁磨下半嵗一丸一嵗二丸二嵗三丸如黄豆大延壽丹治小兒急慢驚風胃受驚氣腹痛盤腸内弔鴉聲啼呌角弓反張眼或視上手足搐搦痰涎潮壅塞不醒或一切心神煩悶睡卧不安並宜服之天南星白附子蛇黄舊錦生硃當門子右細末和勻粉糊糯米為丸如鷄頭子大週嵗兒每服一丸嬰兒半丸薄荷湯浸軟磨乳化下服後腹痛脹俱不妨碍藥味温平治小兒急慢驚風出得生堂經方右速以男左女右之手第二指屈拳取其第二指縫頭用麻子大艾炷一丸灸之即愈危者二三壯此法屢試屢騐萬無一失其應效如響治小兒急慢驚風乳香半兩味辛熱微毒甘遂半兩味寒而且有毒用逺志甘草水浸三兩日換東流水淘凈候乾炒脆用右二味同研細末每服半錢用乳香湯調下或小便調更妙治小兒急慢驚風并慢脾風右用青州白丸子并金夜當等分為末飯飲調下量虚實大小與服黒子散治小兒急慢驚風右用猪牙皂角不拘多少燒為炭為末入麝香少許金銀薄荷湯調下一字量兒大小與服燒時令帶性不得過至聖保命丹主小兒急慢驚風並皆治之全蝎五兩南星十兩蚯蚓屎十兩硃砂一兩輕粉二錢田螺殻二百箇右為末糕糊為丸如鷄頭子大每一丸用薄荷湯化下葱湯丸治小兒急慢驚風滑石一錢輕粉一錢全蝎半錢白附子一錢半半生半熟巴豆南星右為末蒸餅丸如麻子大每丸對嵗數一嵗以下七丸未出月一丸氣積驚積金銀薄荷湯下礬皂丸治小兒急慢驚風涎及去風疾利胸膈次常服永無痰疾北礬二兩半飛過半夏薑汁浸一宿焙南星切作片濃煎皂角水浸一宿火焙乾殭蠶直者可用一兩醋浸一宿半生半熟各半兩右為末薑糊丸桐子大每服十粒至二十粒薑湯下如喉閉熱痛含化爛嚼薄荷新汲水送下甚者及纒喉風皂角水同茶脚研一二十粒灌下小兒急慢驚風涎盛皂角水研揩齒上常服食後臨卧薑湯下不損津液化痰為水問命散出保生集治小兒急慢驚風發搐蜈蚣一條殭蠶一條比如蜈蚣長右為細末男左女右搐一字普濟方卷三百七十五
