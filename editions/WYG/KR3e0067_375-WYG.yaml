body:
  text: 普濟方卷三百七十五明周王朱橚撰嬰孩驚風門急慢驚風附論夫急驚因聞大聲而發或大聲搐發過則如故此無隂也當下利驚丸主之小兒急驚者本因熱生於心身熱面赤飲引口中熱氣大小便黄赤熱則搐也葢熱甚則生風風属肝此陽盛隂虚也故利驚丸主之以消其痰熱不可與巴豆及凉藥大下之恐體虚難受也小兒客痰熱於心胃因聞聲非常則動而驚搐矣若熱極雖不聞聲其驚亦自發也慢驚病因瀉或吐後脾胃虚損遍身冷口鼻氣出亦冷手足時掣瘲昏睡無時此兒無陽也括蔞湯主之大凡隂陽異証切須辨治之急驚合凉瀉慢驚合温補世俗方症多不分别貽誤小兒甚多又小兒傷於風病吐瀉醫謂脾虚以温補之不以清凉之藥治之不能察其本來之病而任意亂攻之因脾氣本虚内不能散外不能解變為慢風其證多睡露睛身温風在脾胃故大便不聚而瀉當去脾間風風退則利止以宣風散主之後用史君子丸補其胃亦有吐利久不瘥者脾虚生風而成散慢驚驚癎早發搐目作左視無聲右視有聲晩𤼵搐目右視無聲左視有聲相勝故也早晨發搐因潮熱當卯辰時骨身壯熱上視手足動揺口内生熱涎項頸急此肝旺當補腎也地黄丸治肝瀉青丸主之早發搐因潮熱巳午未時搐發心神驚悸目上視白睛赤色牙關緊口内涎手足動揺此心旺也當補肝治心導赤散凉驚丸補肝地黄丸主之日晚發搐因潮熱申酉戌時不甚搐而喘目微斜視身如熱火旺露晴手足冷大便淡黄水是肺旺當補脾益黄散治肝瀉青丸治之心導赤散主之夜間發搐因潮熱亥子丑時不甚搐而卧不穏身體温壯目睛緊斜視喉中有痰大便銀褐色乳食不進多睡不省當補脾治之益黄散凉驚丸主之傷風後發搐傷風後得之口中出氣熱呵欠煩悶手足動揺當發散大青膏主之小兒生來怯弱者多此病也口傷食後得之身熱多睡或吐不思食而發搐當先定搐退白餅子下之後服安身丸百日内發搐真者不過三四次必死假者頻發不為重真者内生驚癎假者外傷風冷葢血氣未實不能勝任及發搐也欲知假者弔氣出熱也治之可發散大青膏主之及用塗顖浴體法昔李司户生子百日發搐三五次請二醫治或作天瘹或作胎驚癎皆無效後錢氏用大青膏如小豆許作一服發之復與塗顖藥敷之及浴法三日而愈何以然諸陽初生肌骨嫰怯被風傷之子不能任故發搐頻發者輕何也客風在内每遇不任即搐搐稀者是内臓發病不可救也頻搐者宜散風冷故用大青膏不可多服葢兒至小易虚易實多即生熱止一服而已更當封浴無不效者李寺丞子三嵗病搐自卯巳至數醫不治召錢氏視之搐目右視大呌哭李曰何以搐右錢曰逆也李曰何以逆曰男為陽而本發左女為隂而發右若男目左視發搐時無聲女𤼵時右視無聲左視有聲所以然者左肝右肺肺金肝木男目右視肺勝肝也金來刑木二臓相刑故有聲也治之瀉其强而補其弱實者亦當瀉之肺虚不可瀉肺虚之候悶亂哽氣長出氣此病男反女故男易治於女也假令女發搐目左視肺能勝肝若病在秋肺反不旺位肝獨𤼵旺故哭呌當大瀉其肝然後續治心肝所以俱主目反右視者乃肝失其主也凡搐者風熱相摶於内風屬肝故引之見於目也錢氏用瀉肝湯瀉之二日不悶亂當知肝病退後用地黄丸補腎三服後用瀉青凉驚丸各二服大凡用瀉心肝藥五日方愈不妄治也又言肺虚不可瀉者何也曰設令男目右視木反尅金肝木勝金是以瀉肝若更病在春夏金氣極虚當補其肺慎勿瀉也凡治急慢驚風合温補此法古人多用凡藥性凉者不可泛用宜審别之錢氏云急驚合凉瀉慢驚風合温補此是定法也其間有急驚凉瀉不愈變為慢驚有慢驚温補而不愈者變為急驚至相更變者亦多矣所以古人撰一方藥治急慢驚前後互變之證具有義理惜乎當時有失詳註而兩交互者宜用通治急慢藥急驚變為慢驚者因壯熱精神恍惚忽發驚搐醫以吐下藥太過多以凉驚藥不愈荏苒經曰脾虚不實嗜睡露睛涎鳴氣麄腸腹冷疼時作瘈瘲此急驚變成慢驚也張氏云急驚風進退不定荏苒經曰乍靜乍發嘔吐痰涎氣鳴潮搐為慢驚慢驚變為急驚者因傷乳食或吐或瀉時作瘛瘲醫以温熱藥太過以暖驚藥不愈體熱涎盛面赤紅大便不通小便赤澁舌白唇紅或發驚搐此慢驚變成急驚也錢氏云慢驚多因性太温及熱藥治之有驚未退而别生熱證者有病愈而致熱證者有反為驚者甚多已上二證互相更變者葢小兒易虚易實也手指搐握拳者有隂陽兩證隂者拇指在内陽者拇指在外陽拳者順隂拳者逆也夫因驚則氣亂故上下不通併於中焦氣壅則痰聚不散故氣結噎哽抑而虚歎此驚之先兆也有久患癎疾者必須哽氣實者天霜散吐之散風散吐涎或珍珠丸利驚丸下涎問命散吹鼻令關膈通利更與安神膏補之琥珀散除驚風虚者對證用藥驗驚搐先證目鮮眨目青目斜目闘目瞪聲嗄聲顫聲輕咂口弄舌捲舌露筋虚氣哽氣噎氣撮唇舌忽然定睛吐涎吐沬抝頸仰身揺頭擦面藏頭畏明手攣手顫脚弓不伸忽撩忽亂精神恍惚失張失智眠睡不寧睡中喜笑因憂齒齦心躁煩熱啼哭咬人臉面弄色或紅或青伸舒用力微作聲以上諸般證候不待日久必𤼵驚癎病湏預防之驅兼風膏琥珀散更擇對證藥頻服頻哯乳大便青吐痰吐食瀉酸瀉醒吐涎多因瀉久脫形晝眼黙夜起頻動􅂒痢無度涎喘作聲虚腫臓冷盗汗骨蒸諸竅失血口渴無津液以上諸病證如或遷延日久必成慢驚湏預防之安神膏琥珀散更擇對證藥治之活㓜口議云驚者緫名也嬰孩小兒心氣不足智志率伏恍惚無定神不守舎怯人怕物漸成怖畏怖畏之盛已作恐懼恐懼之多乃抱怔忪怔忪之久則自愓愕愓愕既久瘈瘲遂作斯乃心氣不足即為生風之漸但其間自分輕重耳又有心氣虚弱暴觸作驚更不由漸便即面青而唇白甚則定睛直視目無所覩聽之閧瞶耳無所聞精神頓亡心智全失及至良久不能收歛不究其致此之由何以治之盖小兒五臟六腑虚處受驚最易作疾世之㓜㓜者多因乳母不意之間耗動其心氣乃以漸而作驚焉大凡小兒之驚因水火所加者悸也自跌撲所致者恐也自人物所觸者愕也􅅥􅅥不散欝欝悶於胸中者怔忪也由是觀之可見積驚難散皆由平日氣壅痰聚不能自化一有震動則乘虚而生其心如恐恐悸悸者盖亦不能自知矣不能自知所以常生怖畏且不惟怖畏之心常在其中懐無以自遣偶因觸動心神其心𤼵驚其肝生風其肺生痰其脾作熱四證相臨重者先𤼵所以耳目失常形神頓變有卒不可禁者假如雷聲霹􅋬至響不為咎者何葢聲相應情無所加矣惟有小兒在僻静處或神廟中存怖畏之時忽被無知小人戯呌鬼來令小兒奔走無門驚氣入心若不速利其驚氣少頃則指甲黒唇青致成重害不可得療自古及今調理嬰孩最為難事悉皆憑藥取愈其驚風至難也慢驚又難也慢脾尤難也急驚頭額角心背原被灸了者次定發癎不可救嘗謂風癎可灸驚熱不可灸葢風與癎痰涎壅盛凝滯胸膛昏亂不能知心如所失暨灸着穴痰化散心竅開即漸安愈驚之與熱心神常開知被灸忍痛不勝驚悸轉盛其痰差重所以用艾在先藥必不效驚風痰氣未嘗見因灸而活每見老嫗鄙婦無術只投艾炷兒生三日五日之間便以艾燒之不惟失穴因痛増悸經絡未分如何愈病智者詳慎不可炷灸小兒急慢驚風所謂隂陽癎是爾急者熱屬陽陽盛而隂虧慢者寒屬隂陽虧而隂盛陽動而躁疾隂靜而遲緩其咎也皆因臓腑虚而得之虚能𤼵熱熱則生風是以脾熱則風生於脾肺熱則風生於肺心亦然天官醫疾注云肺氣熱心氣𫝊也驚風痰熱合為四證於是八候生焉搐搦掣顫反引竄視曰八候凡搭眼揺頭張口出舌面青唇青㵼青大陽印堂青筋三關虎口紋紅紫或青者此皆驚風狀也大抵熱論虚實證别逆順治有先後葢熱實為急驚風虚熱為慢驚風慢驚本無熱所以發熱者虚使然爾急驚属陽用藥以寒慢驚属隂用藥以温不可以隂陽無别故曰熱論虚實者此也男搐左視左女搐右視右男眼上竄女眼下竄男握拇指出外女握拇指入裏男引手挽左直右曲女引手挽右直左曲凡此順反之則逆亦有先搐左而後雙搐者但搐順則無聲搐逆則有聲其指紋形如攣弓入裏者順出外者逆出入相半者難療目屬肝肝受風熱則目直視或上竄或兩眥頻搭上下瞼赤五心煩熱之證却不發搐必挾心熱則肝火心風二者交爭而發搐也但竄視直與瀉青丸更加發搐者以導赤散兼之大抵肝風心火乃受病之處瀉青丸去肝氣導赤散兼之又能降心火㓜㓜新書以為要藥故曰别逆順者此也陽病隂脉隂病陽脉亦為反症熱盛生風風盛發搐先於截風治風先於利驚治驚先於豁痰治痰先於解熱若四證俱有又當兼施並理一或有遺必生他證故曰治有先後者此也綱領如此若析急慢脾風而言之則暴烈者為急驚沉重者為慢驚而慢脾則重而深矣急驚之候牙關緊急壯熱涎潮竄視反張搐搦顫動更兼十指開合唇口撮眼眨引頸併口中熱氣頰赤唇紅大小便黄赤其脉浮數洪緊葢由内外有實熱外挾風邪心家受熱而積驚肝家受風而發搐肝風心火二臓交争血亂氣并痰涎壅塞所以百脉凝滯關竅不通風氣蕃盛而無所澁故暴烈也治法大要用藥有次序通關以後且與截風定搐痰熱尚作乃下之痰熱一泄又須急與和胃定心之劑如搐定而痰熱無多則但用輕藥消痰除熱可也然急驚雖當下切不可過用寒凉及鉛粉巴硝輩蕩滌太驟水銀輕粉巴豆芒硝鈆霜蟾酥腦麝等劑醫家不得已用之僅去疾即止或不當用而用或當用而過焉往往由此成慢驚矣下痰熱不妨用銀粉巴硝但能斟酌審量可也欲下之法須當審問前日已下未下或曾經吐瀉否已下及吐瀉者不可再下但驅風化痰消熱而已大約痰熱十分且泄其三之二下劑中須以枳殻菖蒲寛氣通心之類佐之葢急驚急在一時治之不可寛緩稍緩則證候轉深若一時體認未明又不可妄施藥餌截風定搐先與通關􅅉驚輩次則人參羗活散截風丸一字散陽癎散擒風湯定搐散瀉青丸木通青寧散阿膠散宜急擇用下劑有三輕下則用定命散防風利驚防風湯宣風散枳殻散小柴胡湯輩稍重下則用揭風湯硃砂踈風散柴胡加大黄湯重下則用青金丹天麻丸蘆薈丸牛黄凉膏丸千金散王監驚黒丸輩後和氣助胃氣如生氣散銀白散茯苓二陳湯異功散天麻蘇合香丸參苓白术散和中散醒脾散之類皆可選用定志寧神則以定志丸温膽湯定心丸栢枝膏與之他如太乙保生丹聚寳丹蟬蝎散不冷不熱祛風鎮驚之劑又當繼此以防其再發也下之後諸證猶存者未易痊愈更勿再下當作慢驚理之其有搐搦反張斜視而牙關不緊口無痰涎者未可直以為驚風恐是傷風傷寒傷食三等證變成夾驚如彼錢氏假搐之説傷風夾驚神困昏悸頭疼氣壅先用人參羗活散惺惺散消風散輩微取其表次與天麻防風丸傷食夾驚身熱温壯或吐不思食大便酸臭先用人參羗活散加青皮紫蘇取表消積次用驅風鎮驚之劑凡搐搦者不可把握但持之否則風癎逆入經絡遂使手足拘攣以成廢疾此治急驚之要也慢驚之候或吐或瀉涎鳴微喘眼開神緩睡則露睛驚跳搐搦乍發乍靜或身熱或身冷或四肢熱口鼻氣熱面色淡白淡青眉間唇間或青或黯其脉沉遲散緩葢由急驚過用寒凉或轉下大驟𫝊變成之又有吐利不止而成者有氣虚暴吐瀉而成者錢氏云夏月脾胃伏熱大吐瀉者當解暑熱不可専止吐瀉有臟腑虚洞泄成者邪入於腸胃故大便不足而瀉有久痢氣脱成者有下積取瀉成者有吐血與㵼血成者有感風不解誤藥成者有傷寒𫝊變成隂症者有得之久嗽作癎不已者有得之蟲積衝心者有得之目腫疝氣腹痛者其或日夜汗出脾困多睡煩躁引飲四肢浮腫大小便閉丹瘤腫毒龍帶纒腰走馬急疳並𫝊慢候惟吐瀉積痢或虚致之則證變甚速纔經吐瀉便是慢驚須用温中扶裏或搐來緊急及慢驚初𫝊尚有陽證不可作急驚用藥世言搐慢驚非也若泥此徃徃指慢脾為慢驚矣凡慢驚男子以瀉得之為重女子以吐得之為重治法大要須當審問源流不可槩曰慢證如吐瀉得之則理中湯加木香以温其中五苓散以撙其水臓寒洞泄得之則先與术附湯下積取轉得之則先與調氣散外感寒邪得之則先與桂枝湯解肌湯輩其他可以類推矣然慢驚雖属隂亦須凖較隂陽虧盛淺深如何不可純用温湯及燥烈大熱之劑惟於生胃氣中加以截風定搐如全蝎花蛇殭蠶白附天麻南星輩為良方𫝊慢驚候而尚有陽證者八候尚在必回陽但與截風調慢可冷可熱均平隂陽而已太一保生丹聚寳丹蟬蝎散神保既濟丹來復丹王氏惺惺散醒脾散大醒肝散温白丸可選用之若陽虧隂盛病已𫝊過純属慢驚無搐掣反引竄視之證而但昏沉者與星香全蝎散定命飲四聖散烏蛇四君子湯天南星散烏沉香全散之属若手足冷者方可回陽用硫黄附子慢驚下痰身煖者天南星丸蘇合香丸白丸子痰盛者神保既濟丹礞石散虚甚而不可下痰者靈脂丸七珍丸如腦麝銀粉鉛霜寒凉通關利腸輩一切禁止麝雖温然性属隂能化陽通腠其有陽已𫝊隂或者不知但有見引搐誤用腦麝銀粉及寒凉輩必為慢脾隂逆症慢驚之候其眼半開半合則當預作慢脾風調理之於斯時也隂氣易盛倘時刻少延則藥力不及頻併投藥則勢又不可纔進一二劑須審有無𫝊變稍定則和平為愈勢篤則以剛劑投之此治急慢驚之大要然也慢脾之候面青額汗舌短頭低眼合不開困睡中揺頭吐舌頻嘔腥臭噤口咬牙手足微搐而不收或身冷或身温而四肢冷其脉沉微隂氣極盛胃氣極虚十活一二葢由慢驚之後吐瀉損脾脾虚已極總歸處虚為脾所受故曰脾風若逐風則無風可逐療驚則無驚可療但脾間虚弱痰涎往來其眼合者脾氣困乏神志沉迷痰涎凝滯然則世所謂慢風難療者慢脾風是也慢風一名虚風凡小兒或吐或瀉之後面色虚黄大勢虚損若因虚而發熱繼此而得慢脾風纔見揺頭斜視以手摸人昏困喜睡額上汗多身亦粘汗其聲沉小而焦即是脾風之證不必歴由急慢風𫝊次而至又當識之治法大要生胃回陽黒附湯川烏散金疫丹白丸子各半生附四君子湯可斟酌用胃氣漸復則異功散輩温平而調理之如蝎附散靈砂等亦可恭用若其眼半開半合手足不冷證候尚在慢驚則勿回陽或已入慢脾而陽氣未甚脱者亦不可用硫黄附子凢服回陽湯劑手足漸煖者仍以醒脾散等繼其後以調之慢脾下痰輕者神保既濟丹白蠶丸重者辰砂膏甚則七寳妙香散慢驚慢脾證候諸藥不效者如有太衝脉則取百會穴灸之此治慢脾風之大要然也雖然小兒有病問之則㓜不能言望之易驚易喜診之則或慢或動自六嵗已下黄帝不載其説者以其難也又痓痙發癎卒中天瘹撮口亦風之種類焉痓者手足冰冷痙者舉身僵仆痓痙本一病當分陽剛隂柔柔者有汗肢體强直腰身反張甚於風癎大扺不治癎者目瞪涎流神氣欝結四體不收沉黙昏潰似死其聲惡呌身軟時醒有聲者為癎身强不醒無聲者為痓痙凢治驚遇咬牙啼呌者須與通心利小便劑癎亦多種錢氏有羊牛鷄犬猪之説大扺以驚風食三證分别治之中風者五臓各有脉證隨五臓證施以灸法其科大同特小小分别耳天瘹者身體壯熱翻眼擡頭手足搐掣其狀如魚之釣又内瘹腸痛多啼唇黒隂腫傴僂反張眼有紅筋血斑乃寒熱壅結兼驚得之撮口者一月内之驚疾臍風鎖肚瘹卵疝俱至撮口葢風入心脾故令小兒氣促口撮如囊而不乳也其初生百日頻頻吐乳呵吹嚏噴睡裏多驚眼翻肚脹手足緩怠煩躁多喘者當作胎驚風理之又有變蒸亦發微驚不治自愈又瘡痘欲發亦或搐掣如風口鼻冷尻冷耳後有紅縷者必是瘡痘之證切不可以腦麝開腠及銀粉巴豆硝大下而寒凉之是則辨之不可不審也至若眼䧟無光黒睛無瞳人爪甲青黒四體垂嚲一臓氣絶不可勉强下藥面赤如緋面青背冷目仰手足冷目青腹脹胸髙手拏胸膈唇舌鼻青黒魚口氣麄瞪眼頸仰啼哭無淚冷汗不止汗出如珠如油睛青瀉紫黒血涎沫時流吐舌出口咬人五哽五冷五乾皆惡證也急驚眼時翻轉口中出血兩足擺跳腹肚搐動或神緩而摸體尋衣或搐定而神昏氣促噴藥不下通關不􅅉心中痛絶忽大呌者難愈慢驚四肢厥冷泄瀉加嗽面黯唇慘冐痛無聲兩脇動氣口生瘡胃閉損也髮直揺頭眼睛睜不轉涎鳴喘噎口眼手足一邊牽引者難痊慢脾身冷粘汗僵卧如尸喘嗽項軟大小便不禁背曲口噤頭揺者最難為力或者慢驚欲絶之時虚痰上攻咽喉氣呼吸麄大脉浮數是謂隂盛類陽錯認此為陽氣因後直與峻藥下痰痰隨藥下氣隨痰絶人以醫殺咎之此則不識覆燈將絶之證雖不下藥亦無生意矣又有喉中痰涎聲如拽鋸一兩日間但閉目不得開者此為虚候之極痰盛塞其氣然也若徒下痰亦未可保姑以蘇合香丸白丸子輩與之他如急驚安靜之後兩日再發面色變易又三四日定而復發其後淹延必至沉重若急驚證候徒知定搐不去驚熱纔見安定遂指為安未㡬復搐是為過街候若慢驚之候服藥已瘥尚須調理数日不知者竟忘攻治終必復發或成廢疾是則體認之不可不預精也南星丸治小兒急慢驚已經火灸諸般癎病累醫無效但是惡候不問隂陽灌藥一服得睡即效蛇含石一分石燕並火煆酒淬三五次代赭石硃砂鐵粉雄黄各一錢五靈脂乳香川烏去皮炮天漿子二十七枚烏蛇肉酒浸炙去骨一錢蛇皮炙蛇頭一箇酒浸炙殭蠶去嘴絲水浸焙微炒蟬蛻天麻蜂房炒各二錢蜈蚣大赤足者二錢全蝎二錢新薄荷自然汁浸一宿微炒焙羗活川芎麝香一字腦子半錢如吐瀉後加附子炮去皮隨輕重入藥右為末糊為丸鷄頭子大金箔為衣三嵗一丸薄荷湯入酒少許磨或作散亦可一方酸棗仁炒去皮二錢鎮心丸治小兒一切諸風慢驚癎常服此藥諸毒不生其驗不可盡述烏鳥屎一應烏鳥飛禽皆可名蘇子屎用新瓦焙乾京墨虎睛麻黄豆䜴牛黄黄蠟麝香少許珍珠地龍活者全用乾蝎十箇南星作厚片用童子小便浸三日隂乾焙防已白蘚皮猴頭骨硃砂風化硝右除麝砂另外餘藥各等分研為細末用水飛過用銀圏杵作餅子另用麝砂為衣用井水磨一錢臨卧服時疫病身熱瘡癤熱毒用薑汁磨化服急驚用水磨二錢服餘藥對證用煩渴腹脹内有諸瘡疽證皆因之而發風須當體認隨某證療其病如病已去則風自去矣按錢氏方小兒搐身熱喘急目斜露睛四肢逆冷李醫業已定以驚搐一劑與之别無主見錢遂白之曰發搐為肝實身熱喘急為肺虚目斜露睛為肝虚四肢冷為脾虚治法先用益脾補肺胃氣稍復然後瀉肝凉驚而安一證直視而不能食或謂神祟使然錢知其為肝旺勝脾與之瀉肝而愈以證吐瀉或利小便過多以至肝脾虚不食錢用益黄散作效已經數日忽爾不語衆醫數以失音湯劑主之竟無寸效錢氏用地黄丸數劑補之於是能言此其所以然者前乎清利小便太過遂致脾腎俱虚難以補脾而腎尚虚故爾至論肺虚痰實治法自當下故下之必先益脾然後瀉肺經云欲瀉其子先瀉其母此錢氏要記錢氏方瀉青丸瀉白散導赤散瀉黄散力瀉五臓藥益黄散白术散阿膠散地黄丸皆補五臓藥心中驚熱清心而熱不退則與之助胃胃不虚則熱不生或胃虚不實又且小便難則不為之踈利葢利之則胃愈虚而身必冷其有傷風寒而吐瀉者欲止瀉吐不特温脾須以發散之劑先散風寒風寒散吐瀉自止矣不特此爾小兒平常服藥過多臟腑已頑調和劑不效則易之以反擊固守之劑太過則調和而踈利之夫小兒柔嫩易實易虚易寒易熱兒有大小壯弱病有輕重淺深所貴乎目視之切意度心商惟醫權衡斟酌對症用之得中為上矣頂門百會上慢驚用藥封臍或吐或瀉立效睡紅散治小兒急慢驚風手足搐搦目瞪神昏口眼相引牛黄硼砂腦子珍珠水銀半錢麝香一字青黛蝎尾炒京墨炒煙盡南星薑汁浸一宿半夏薑汁浸一宿蛇含石半錢金箔十片銀箔十片烏蛇尾并項下七寸並酒浸一宿取去皮骨炙一錢右牛黄麝香腦子硼砂金箔銀箔先研極細末勻次入水銀砂子再將餘藥搗羅為末一處研勻每服嬰孩半字半嵗一字一二嵗半錢三四嵗一錢以意加减金銀薄荷湯下如一服搐定即便用調胃氣觀音散二三服如小兒再作風氣發搐宜進鷄舌散二三服一方有薄荷無南星加五味子至寳丹鷄胵肶一箇烏骨者洗炒牛膽膏天南星取心三錢馬牙硝二錢半血竭三錢如無以獖猪心血代之蝎稍九箇枯礬二錢半腦子麝香少許右為末入鷄胵肶内飯上蒸好取出懸掛却入後藥至寳丹二兩沉香木香各一錢牙皂角三條去皮弦右為末夏加花蜘蛛一箇和前藥糊丸如蘇合香丸大硃砂金箔為衣每服一丸薄荷湯磨服奪命金丹治急慢驚風無藥可理者一服見效南星為末用臘月黄牛膽汁合和入於膽内掛當風處隂乾百日可用天麻防風去蘆白附子炮白殭蠶炒去絲嘴硃砂别研一兩蟬蛻去土半兩麝香二錢另研天漿子炒二十一箇牛黄半錢蝎稍四十九箇炒赤足蜈蚣一條臍上開路入麝香一錢去脚用紙褁焙乾用乾蟾一枚炙黄去足右為末用東流水煮白麵糊為丸如鷄頭子大每服先下白末子即和劑方用青州白丸子研為末每服半錢薄荷湯下後用生薑自然汁磨下一粒立見功效量兒大小增减不拘時琥珀丸治小兒驚急慢風涎潮昏冐目瞪搐搦驚瘹腹疼及和順瘡痘小兒驚哭眠卧不安入口立效驚癎時復發作常服永除病根辰砂一錢半琥珀牛黄殭蠶炒去絲嘴全蝎去毒南星水浸夏三春秋五日冬七日牛膽中製佳白附子代赭石天麻乳香蟬退各一錢麝香半字腦子一字右為末一嵗半字薄荷湯調下慢驚加附子保命丹治小兒急慢驚風潮作不定涎盛氣急精神不爽病退常服除根牛黄辰砂二錢麝香半錢腦子乳香五靈脂鐵粉代赭石各一錢全蝎半錢蜈蚣附子殭蠶炒蛇含石煆醋淬三次各半錢右為末白麵糊丸如鷄頭子大三嵗一丸薄荷湯下萬金丹治小兒急慢驚風立見效硃砂五錢麝香二錢珍珠錢半白殭蠶琥珀一錢全蝎十箇去尾腦子犀角鎊乾臙脂以上三味少許天南星一錢鈎藤巴豆五粒去油右為細末薄荷湯打糊為丸如麻子大二嵗小兒服一十八丸看兒大小加减丸數急驚煎薄荷湯送下慢驚煎地龍湯下神應丸治小兒急慢驚及卒中惡并五種癎疾或髪􅆆目直面如桃花口眼俱閉或即俱開喉中作聲汗出如油驚風不搐時瀉黒色已上惡候但一服救之灌藥一粒神效真牛黄麝香輕粉半兩金銀箔百片磁石石緑硃砂蛇含石粉霜雄黄一兩石燕子兩箇火煆醋淬七次右為末酒糊梧桐子大一嵗一丸薄荷湯化下入酒少許尤妙癎病薄荷自然汁和酒化下香金丸治小兒急慢驚風來去不定沉昏無時天麻雄黄半兩白附子大川烏去皮鐵粉青黛南星炮各一分麝香半錢石燕子醋煆硃砂右為末糊丸鷄頭子大三嵗一丸薄荷湯磨下蛇頭丸治小兒急慢驚風涎盛痰寒搐搦不問隂陽但是驚風服立效蛇頭一箇蜈蚣三條赤足者硃砂三錢鉛白霜輕粉二錢腦子一錢麝香一錢鐵粉百草霜半兩蛇含石一兩一方加全蝎一分右為末糯米糊為丸鷄頭子大三嵗半丸薄荷湯磨下一方慢驚加附子半兩去皮尖血竭一分睡紅丸治小兒急慢驚風手足搐搦目瞪口眼相引烏蛇項下肉七寸用酒浸一宿去皮骨炙黄一錢青黛二錢牛黄半錢蝎稍麝香一字硼砂半錢水銀砂子半錢金箔十片真珠末半錢烏蛇尾酒浸一宿去皮骨炙黄色一分蛇黄右牛黄麝香硼砂金箔先研極細勻次入水銀砂子再研將餘藥一同搗羅為末作一處研勻每服嬰孩半字一二嵗半錢以意加减金銀薄荷湯調下一服搐定即便用調胃氣藥與服之兼治一切風癎上視涎盛宜服如吐瀉後成驚手足冷者不可服麝香膏治小兒急慢驚風涎熱發搐麝香防風草龍膽三錢甘草龍腦一錢硃砂三錢乳香半兩天南星半錢膩粉一錢墨半錢青黛半兩右研勻蜜調成膏每二嵗兒服半皂子大薄荷湯化下天王補心丸治小兒急慢驚風金箔鎮心丸硃砂半夏浸十日換十遍水晾乾後用人參南木香琥珀杏仁炒黄色却泡去皮尖麝香青木香㯽榔葶歴子炒黄色一錢天漿子七粒去皮去油右各研細麵為丸蘿蔔子大每服一嵗五七丸三嵗二十七丸虚者减丸數壯者加丸數硃砂為衣荆芥湯下用蜜丸大鷄頭子大同金箔鎮心丸磨化服麝香餅子治小兒急慢驚風進退不定日入乍靜乍動嘔吐痰涎潮搐風癎潮熱口眼偏斜項背强目睛上視及因吐利生風心肺中風尤宜服之麝香蝎尾南星蜈蚣赤足三條川烏白花蛇酒浸一夕去骨皮半兩乳香膩粉硃砂牛黄各一錢右為末酒糊丸如鷄頭子大拍作餅子三嵗一餅人參薄荷湯化下大小加减篤龍丹一名烏稍丹出全嬰治小兒急慢驚風潮發不時神昏涎盛及因吐利後生風及心脉中風宜尤服之白附子人參南星半夏泡洗七次烏蛇尾酒浸去皮骨焙一方用三兩水浸天麻全蝎去毒防風川附子一兩天漿子二十七箇一方二十一箇右作一處酒浸三宿取出焙為末次用水磨雄黄一兩辰砂一兩並飛同和拌入麝香二錢生龍腦一錢糯米餅為丸如粟米大三嵗十丸薄荷湯下有效亦作散子調下尤效睡安丸治小兒急慢驚風搐不定不得安睡辰砂乳香血竭一錢麝香半錢全蝎二十一箇蜈蚣一條酥炙黄酒浸一宿右為末二嵗一字薄荷湯好酒煎令沸調下得睡易效至聖保命丹出鮑氏方治小兒脫驚内瘹腹肚堅硬夜啼發熱目睛上視手足搐掣角弓反張但是痰涎壅盛一切急慢驚風並皆治之全蝎十四箇白附子天南星炮白殭蠶直者炒硃砂研麝香各一分研金箔十片防風去蘆天麻各二錢蟬退去泥二錢右為細末入研藥和勻蒸粳米飯取中心軟者搜為丸每服一兩作十丸初生兒半丸乳汁化下周嵗兒一丸金銀薄荷湯化下一丸一嵗以上有急候者二丸薄荷湯化下常服鎮心安神湯化痰除一切驚風證候一方無金銀硃砂為衣一方無天麻蛇頭丸出和劑方治小兒急慢驚風手足抽掣眼睛直視角弓反張證候危急者蛇含石十箇煆三次醋淬却用甘草湯煮出酸氣研飛為衣鐵粉白附子欝金二兩麝香一兩龍腦别研半兩花蛇頭一箇酒浸用齒并肉右為細末麵糊為丸如鷄頭子大每服一丸薄荷自然汁磨井花水下量大小加减與服大天南星丸出御藥院方治小兒急慢驚風涎潮發搐目睛上視口眼相引牙關𦂳急背脊弦直精神昏塞連日不省龍腦研牛黄研乳香一錢天南星牛膽製者半兩人參天麻去蘆防風去蘆各一分硃砂研三錢麝香一錢半乾蝎十四箇湯浸潤去土微炒右研杵令勻煉蜜丸如鷄頭子大每服一丸荆芥薄荷湯化下量小兒大小加减服不拘時生硃膏出醫方集要治急慢驚風天麻一分硃砂二錢殭蠶白附子全蝎二十一箇黒附子一錢麝香半字蜈蚣一條酒浸南星一錢半煨花蛇酒浸炙乾各二錢右為末和勻煉蜜為丸如鷄頭子大每服一丸用金銀薄荷湯化下金銀丸治小兒急慢驚風積青黛三錢水銀一皂子大同黒鉛結炒子寒食麵黄明膠二錢硃砂一兩巴豆十二箇去油腦麝少許右都研勻細滴水為丸如麻子大揑令扁曝乾甆合盛一嵗一丸隨意加减煎皂角子湯送下不得化破龍腦散出錢氏方治小兒慢驚多用性太温及熱藥治之有驚未退而生熱證者有病將愈因治熱證而反為急驚者甚多當問病者㡬日因何得之曾以藥療之可用毒解之藥無不效宜此大黄蒸半夏湯洗剉薑汁浸一日焙乾炒甘草炒金星石銀星石寒水石禹餘糧不灰木青蛤粉各半兩右為細末研入龍腦一字再研勻新水調一字至半錢量兒大小虚實與之通解毒一方添入甘松三兩枝藿香葉末一錢牙石一分减大黄一半治藥毒吐血神效奪命散出全嬰方治小兒急慢驚風諸藥不效者一丸見效白附子黒附子炮去皮南星炮天麻防風半夏泡七次麻黄去節硃砂全蝎生薄荷葉褁吐生薑汁蘸炙三兩度黄色一錢右入麝香半錢為末三嵗半錢薄荷薑汁更同酒泡湯調下急驚硃砂輕粉二味加入治急慢驚風大有神效蘇合香丸一貼鎮心丸一貼牛黄清心丸一貼硃砂一錢重貫珠子根不拘多少為末地龍九條用半錢真砂糖不拘多少麝香不拘多少右為末極細一處拌勻每服抄一錢無根水調下黒神丸一名醉驚丸出㓜㓜新書治小兒急慢驚風膩粉一錢半墨白麵蘆薈一錢麝香研龍腦研牛黄研青黛史君子去殻麵褁炮熟半錢右為研勻細麵糊為丸如梧桐子大每服半丸薄荷湯研下要利即服一丸俗名睡驚丸少許不同耳前後用治將死兒一服即差一方有糖三合或二合不用牛黄徳生堂云昔有小兒王醫賣此藥以效至富予因得方與常人治驚風極效妙香丸出全嬰方治小兒急慢驚風及傷風壯熱或結胸五七日已上面赤大腹燥秘喘麄面易五色者以龍腦水吞下一丸下惡物并藥丸即差硃砂一兩牛