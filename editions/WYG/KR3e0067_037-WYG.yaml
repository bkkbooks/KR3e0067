body:
  text: 普濟方巻三十七明周王朱橚撰大腸腑門總論夫大腸腑者主肺也鼻主中央是其候也肺絡氣於大腸大腸者為行道𫝊瀉之府也號監倉椽重二斤十二兩長一丈二尺廣六寸當臍右回疊積還反十二曲貯水穀一斗二升主十二時定血脈和利精神千金明堂外䑓同難經云長二丈一尺大四寸徑一尺之少半十六曲盛榖一斗七升半鼻遂以長以後大腸右手闗前寸口陽絶者無大腸脈也若少氣心下有水氣立秋節即咳刺手太隂治隂在魚際間右手闗前寸口陽實者大腸實也若陽中切痛如刺刀所刺無休息時刺手陽明治陽在手腕中瀉之大腸鳴者腸中切痛而鳴濯濯冬日重感于寒則洩當臍而痛不能久立與胃同候取巨虚上亷腸中雷鳴氣上衝胸喘不能久立邪在大腸刺育之原巨虚上亷三里大腸脹者腸鳴而痛寒則洩食不化大腸有寒鶩溏有熱便腸垢大腸有宿食寒慄發熱有時如瘧狀肺前受病移於大腸肺咳不已咳則遺失便利厥氣客於大腸則夢田野肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裏大者大腸緩而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結扁鵲云手太隂與陽明為表裏大腸若病實則傷熱熱則腸滿不通口為生瘡食下入腸腸實而胃虚食下胃胃實而腸虚所以實而不滿乍實乍虚乍來乍去虚則傷寒寒則腸中雷鳴洩青白之痢而發於氣水根在大腸大腸絶不治何以知之洩利無度利絶則死病者乍寒乍熱損肺傷氣暴𠻳嘔逆或體熱發斑喘咳引氣名曰氣狸以秋三月源從陽明係手太隂受疫淫邪之氣若腑虚為隂邪所傷則乍寒乍熱臟實為陽毒所傷則體熱發斑大腸實論夫右手寸口氣口以前脉陽實者手陽明經也病苦腸滿善喘咳面赤身熱喉咽中核狀名曰大腸實熱也大腸者𫝊瀉行導之府也其氣盛實燥熱生焉𫝊瀉不利腸中痛如錐刺或生鼠乳腫脹痛悶大便不通腹脇脹滿腰背重痛上氣喘滿皆大腸氣實之證也夫大腸實則生熱熱則腸結脹滿喜氣喘欬身面熱喉中噎乍實乍虚乍來乍去大腸有宿滯則發寒慄如瘧狀便秘不通則是大腸實熱之候也茯苓麻黄湯出聖濟總録治大腸實熱令人氣脹滿白茯苓去黒皮麻黄去根節各一兩半黄耆剉大青剉桂去麤皮各三分細辛去苖葉杏仁湯浸去皮尖炒各一兩一分石膏三兩碎丹參半兩五味子陳橘皮去白焙甘草炙剉貝母芎藭各一兩枳殻麩炒三枚右㕮咀帛裹三錢井華水盞半煎八分去滓温服羚羊角散出聖惠方治大腸實熱心神煩躁口内生瘡羚羊角屑三分甘竹茹川朴硝川大黄剉炒各一兩黄芩梔子仁紫蘓莖葉杏仁湯浸去皮雙仁炒𤣥參木通赤茯苓各三分甘草半兩炙剉右㕮咀每服三錢水一盞煎六分去滓入地黄汁一合更煎一兩沸不計時温服生薑洩腸湯出千金方治大腸實熱腹脹不通口為生瘡生薑橘皮青竹茹黄芩梔子仁白术各三分桂心一兩茯苓芒硝各三兩生地黄十兩大􅀥四枚右㕮咀水七升煮取三升去滓下芒硝分二服一方無桂心名瀉白湯㯽榔丸出聖惠方治大腸實熱氣壅不通心腹脹滿大便秘實檳榔大黄蒸麻子仁炒去殻别研枳殻麩炒羌活去蘆牽牛炒杏仁去皮尖炒白芷黄苓各一兩人參半両右㕮咀為末煉蜜丸梧桐子大每服四十丸空心用熟水送下以大腑流利為度杏仁丸出聖惠方治大腸實熱大便不通上氣喘咳心神煩悶杏仁湯浸去皮尖雙仁炒甘草炒剉各一兩赤芍藥黄芩麥門冬去心焙細辛去苖葉五味子各三分石膏碎二兩大黄剉炒一兩半右㕮咀每服三錢水一盞煎六分去滓食前温服大黄丸出楊子建䕶命方治大腸秘熱心胸煩燥頭痛便秘腹脇脹滿口舌乾燥大黄炮剉半兩桔梗炒枳殻麩炒去穣芎藭羌活去蘆木香柴胡去苖獨活去蘆頭各一分牽牛一兩半炒熟半生用右為末熟煎萊菔入藥同於木臼内搗令丸得為度丸如梧子大每服三十丸食後臨卧熱湯下加至四十丸赤茯苓散出聖惠方治大腸實熱頭痛目眩驚狂喉痺腹脹滿悶手足煩痛赤茯苓麥門冬去心㯽榔各一兩川大黄一兩半犀角屑枳實麩炒各三分杏仁湯浸去皮尖雙仁炒丹參各半兩石膏二兩右㕮咀每服三錢水一盞煎六分去滓食前温服忌熱麵炙􅏼柴胡散出聖惠方治大便實熱氣壅不通心腹脹滿發渇寒熱柴胡去苖赤芍藥㯽榔各一兩枳實麩炒杏仁湯浸去皮尖雙仁炒黄芩漢防己各三分川大黄三兩剉炙甘草半兩炙炒右㕮咀每服三錢水一盞煎六分去滓食前温服大青湯出聖濟總録治大腸熱滿腸中切痛或生鼠乳大便不通大青剉三分麻黄去根節石膏碎芒硝碎黄柏去麤皮生地黄焙各一兩半枳殻麩炒去穰赤茯苓去黒皮右㕮咀每服三錢水一盞半入苦竹葉十片煎八分去滓温服日三橘皮湯出聖濟總録治大腸熱欬脇滿掌中熱陳橘皮芒硝紫蘇葉各一兩半白术一兩甘草炙剉桂去麤皮各半兩石膏􅉷净者三兩碎杏仁炒一分去皮右㕮咀每服三錢水一盞半淡竹葉十片葱白四寸劈破煎八分去滓温三日治白氣狸肺腑温病隂陽毒臟實為陽毒所傷熱肌膚發斑氣喘引色昏白者紫苑茸一兩梔子仁升麻前胡各三分葶藶炒一分杏仁去皮尖炒甘草炙各半兩右㕮咀每服五錢水二盞煎七分去滓食前服大腹皮散出聖惠方治大腸實熱腸脹不通熱氣上衝口内生瘡大腹皮三兩剉柴胡去苗訶梨勒皮枳殻麩炒去穰各一兩川大黄剉炒川朴硝各二兩羚羊角屑三分甘草半兩炙右㕮咀每服三錢水一盞煎至六分去滓食前温服大腹湯出聖濟總録治大腸實熱腹脹不通上衝口内生瘡大腹皮大黄生剉各二兩木香一兩訶梨勒皮三分枳殻去穣炒一兩芎藭三分右㕮咀每服三錢水一盞半煎至八分去滓温服神功丸出聖濟總録治氣壅大腸風熱大便不通方見本門大便秘澀不通類四味神功丸治腸痛如打用豆半升炒令焦酒一升煮令沸熟取醉瀉白湯出鮑氏方治大腸實熱腹脹不通夾臍痛喘不能久立口瘡陳皮淡竹葉黄芩梔子仁黄栢皮一兩半茯苓芒硝一両生地黄五兩右為散每服四錢薑􅀥煎空心服大腸虚論夫右手寸口氣口以前脈陽虚者手陽明經也病苦胸中喘腸鳴虚渴唇乾目急善驚洩白名曰大腸虚冷也其候胸中喘腸鳴虚渴唇乾皮膚乾燥目急善驚滑洩骨節疼痛不能久立葢大腸者𫝊導之官變化出焉寒邪客於其間則冷氣虚弱不能自固而成諸疾診其脈右手氣口以前陽虚者是也欵冬花丸療大腸虚冷欠呿欬氣短少腹中痛欵冬花七分桂心五味子各六分乾薑芎藭甘草炙各五分附子炮四分桔梗四分蘇子五合蜀椒一升百部汁七合白蜜一升乾􅀥五十枚劈去皮研為脂薑汁右為末將薑汁和蜜㣲火煎丸如梧子大每服温酒下三十丸加至四十丸日再忌海藻菘菜猪肉冷水生葱草荳䓻散出聖惠方治大腸虚冷腸鳴腹痛下痢不思飲食草荳蒄去皮陳橘皮湯浸去白穰焙各一兩高良薑剉三分桂心丁香木香白术當歸剉炒白荳蒄去皮肉荳蔻去殻各半兩甘草一分炙剉右為末每服半錢食前以薑􅀥湯調下木香丸出聖惠方治大腸虚冷切痛腸鳴食不消化木香白术桂心蕪荑炒高良薑剉各一兩訶梨勒煨去皮一兩半肉荳䓻去殻乾薑三分炮附子二兩炮裂去皮臍厚朴二兩去麄皮薑汁塗炒甘草炙半兩右為末用神麯末煮作糊丸梧桐子大食前薑􅀥湯下十丸治白氣狸肺腑臟温病隂陽毒大腸腑虚為隂邪所傷寒熱互作上氣欬逆大腸飱洩色皓皓白者白术人參各一兩乾薑炮麥蘖炒各三分白茯苓五味子肉豆􅅳草菓烏梅甘草炙各半兩右㕮咀每服五錢水盞半煎七分去滓食前服吳茱茰散出聖惠方治大腸虚冷腸鳴腹痛食不消化吳茱萸湯浸七次焙乾炒肉豆蔲去殻乾薑炮炒甘草炙各半兩剉陳橘皮二兩泡去白焙高良薑剉縮砂去皮神麴搗碎炒白术各一兩厚朴二兩去麄皮薑汁炒右為末每服一錢食前粥飲調下訶梨勒散出聖惠方治大腸虚冷腸鳴洩痢腹脇氣痛飲食不化訶梨勒一兩半煨用皮附子炮去皮臍陳橘皮湯浸去白各一兩焙當歸剉炒肉豆蔻去殻各三分桔梗去蘆木香各半兩吳茱茰湯浸七次焙炒甘草炙剉各一分右㕮咀每服三錢水一鍾入生薑半分􅀥三枚煎六分去滓食前稍熱服防風丸出聖濟總録治大腸氣虚又因傷風冐雨大腸中下血防風去仁芎藭各一分黄耆剉术各半兩五味子續斷陳橘皮湯浸去白各一分石硫黄研一兩右為末煉蜜丸梧桐子大空心鹽米湯下三十丸訶梨勒丸出醫方集成治大腸虚冷腸鳴洩瀉腹脇氣痛飲食不化訶梨勒麵裹煨附子炮去皮臍肉豆蔻麵裹煨木香不見火吳茱茰去梗炒龍骨生用白茯苓去皮蓽撥各半兩右為末薑汁煮糊丸梧桐子大每服七十丸空心米飲下黄連補湯出千金方治大腸虚冷痢下青白腸中雷鳴相逐黄連四兩茯苓芎藭各三兩酸石榴皮地榆五兩伏龍肝雞子大一枚右㕮咀水七升煮取二升半去滓下伏龍肝末分三服附子湯出聖惠方治大腸虚冷腰痛羸瘦附子炮去皮臍一兩半人參乾薑炮赤芍藥桂去粗皮甘草炙各一兩右㕮咀每服三錢水一盞棗三枚煎六分去滓食温服茱萸丸出聖濟總録治大腸虚冷飲食減少非飱洩吳茱茰湯浸晒乾焙訶梨勒皮丁香草豆蔻去皮芎藭防風去乂各一分石硫黄研一兩右為末煉蜜丸梧桐子大空心陳米飲下黄連湯出聖濟總録治大腸虚冷痢下白膿腸内虚鳴相逐黄連去鬚酸石榴皮焙赤石脂各三兩白茯苓去黒皮乾薑炮各二兩半桔梗炒二兩右㕮咀每服五錢水一盞半煎八分去滓温服日三服茈葫丸出聖濟總録治大腸虚腸痛不能久立或腰中虚鳴茈葫去苗土枳殻炒去穣各一兩半白术三錢白茯苓去黒皮一兩丹參去根炙黄耆剉各二兩右為末煉蜜丸梧桐子大空腹粥飲下三十丸日三服朴附丸出聖濟總録治大腸虚冷便痢滑洩不思飲食腸鳴腹痛厚朴去粗皮生薑汁炙一兩附子炮去皮臍半兩甘草炙一兩乾薑炮一兩右為末酒煮麵糊為丸梧桐子大每服五十丸食前温米飲下大建中湯出聖濟總録治大腸虚乾薑炮一兩半芍藥甘草炙剉桂去粗皮各一兩右㕮咀每服二錢􅀥三枚去核餳一塊水一盞煎七分去滓空腹温服日三服乳豆丸出濟生方治大腸虚寒滑洩不止鍾乳粉一兩肉豆蔻半兩麪裹煨香去麵不用右為末煮棗肉杵為丸梧桐子大每服七十丸空心食前米飲送下治大腸虚冷用鰻鯉魚煮酒服葢其魚能補虚固腸湯出鮑氏方治大腸虚寒痢下青白腸中雷鳴大便秘小便赤上氣充胸難久立身腫腹急當臍痛酸石榴皮半兩黄連炒地榆皮一兩右為散每服四錢薑五片烏梅一個煎空心服腸風下血附論夫腸風臟毒下血者皆因飽食過度房室勞損坐卧當風恣餐生冷或啖炙煿或飲酒過度榮衞氣虚風邪冷氣進襲臟腑熱因乘之使血性流散積熱壅遏血滲腸間故大便下血血清而色鮮者腸風也濁而色黯者腸毒也肛門射如血線者蟲蛀也又有陽氣不升血隨氣降而下血者下虚也下虚之脈脈多洪大而芤葢弦者勞也芤者下血也治療之法風則散之熱則清之寒則温之虚則補之治法合無不效者矣大便下血或清或濁或鮮或黒或在便後或與洩物並下此由内外有所傷感凝停在腸胃清氣不通亦妄行之類故曰便血方書以鮮血為腸風瘀血為熱毒濺注為腸痔受病之初或因大腸有熱毒血朝於下或因下虚而腸臟無脂膜血得以滲入及其久則成痼疾矣亦時有所感觸而發之如遇熱發則為瘀血遇寒發則為清鮮遇濕發則為豆汁血色亦因而轉不可拘以一説人之滋養一身惟氣與血血為榮氣為衞榮行於脈中衞行於脈外故心主血肝藏之而脾為之統貴於氣順則血調若内因七情并酒食所傷外為四氣相干則血氣逆亂榮衞失度皆能令人下血若風入腸胃者其脈浮下血必在糞前是名近血停積於大腸者其脈沈滯血在糞後是名遠血臟寒者其脈沈㣲下血無痛積熱者其脈洪數純下鮮血甚則鮮血多而不止廉痛傷濕者脈沈而遲下血如豆汁令人面無顔色時寒時熱脈浮弱按之絶者下血也治法大要先當解散腸胃風邪熱者與敗毒散冷者與不換金正氣散風邪既去然後隨其冷熱而對治之或便血遇熱則行止血氣用凉藥如地榆散蘖皮湯黄連阿膠丸酒蒸黄連丸輩施之熱症固當然爾其或陽虚隂走正氣不得歸元則用木香理中湯附子理中湯震靈丹黒錫丹輩治之皆不可偏廢要之芎藭湯一劑又調血之上品熱者加茯苓槐花冷者加茯苓木香此則自根自本之論也雖然精氣血氣生於榖氣故凡大腸下血大抵以胃藥收功真料四君子湯參苓白术散以枳殻散小烏沈湯和之胃氣一回血自循於經絡矣然腸風之血自腸中來虫痔之血肛門傍邊别有小竅射如血線是也肛門既脫腐血浸淫於其間則俱化為虫蠧蝕腸口滴血淋漓自比又不能約而收之矣當以蕪荑艾葉苦楝根輩止血亦不用甘草但増􅀥入藥用儒門事親書云棠谿欒彦剛病下血醫以藥下之黙黙而死其子企見戴人過而問之曰吾父之死竟無人知是何症戴人過曰病挫其心也心主行血故被挫則血不禁若血温身熱者死其死必七日治法不當下抑下之不滿數企曰四日死何為病挫心戴人過曰智不足而强謀内不足而强舉心安得不挫也欒初與鄰爭屋不勝遂得此病企由是服拜而學醫又論曰凡人有臟毒下血何謂也生氣通天論曰邪熱傷肝因而大飽筋脈横解腸癖為痔故膿血者血隨熱行參差入于腸胃之間乃成瀉血也若身體壮熱則為難治身涼者可治也可先調中消血蕩除積血瀉之二三行瀉後服芍藥蘗皮丸黄連解毒湯五苓散益元散各以新汲水調下五七錢甚者取地黄汁半盞服之則愈矣積年腸風下血不止者由人氣血衰弱臟腑憊或飲食勞損或毒氣風邪藴蓄在臟腑流注於大腸既虚下血致面色萎黄四肢消瘦或累月連年諸醫不差故曰積年腸風下血内經謂結隂者便血一升再結二升三結三升邪在五臟則隂脈不和不和則血流結隂之病以隂氣内結不得外行血無所禀滲入腸間故便血也方黄耆湯治腸風下血黄耆三兩槐實小蘇桑耳乾地黄焙當歸炙剉黄連去鬚白芷各一兩草豆蔲二枚去皮芎藭赤石脂天雄炮去皮臍龍骨各二兩黄芩去黒心半兩紅藍花訶梨勒皮延胡索厚朴去粗皮薑汁炙桂去粗皮各一兩右㕮咀每服五錢水盞半薑一分煎八分去滓食前温服日二乾地黄湯治大便下血并多年腸風飲食不得熟乾地黄焙赤石脂各二兩延胡索牡蒙桔梗黄芩去黒心各半兩龍骨各一兩半當歸切焙黄連去鬚白芷地榆木香紅藍花炒各一兩桂去皮三分乾薑炮黄耆剉右㕮咀每服五錢水一盞半煎八分去滓温服無時五香聖散出聖惠方治腸風氣流注下部致生腫結牽引腑臟不和時發疼痛經久下血太多虚乏羸瘦沈香黄耆剉枳殻麩炒去穰熟乾地黄各一兩麝香半兩乳香一分木香藿香剉炒㯽榔當歸剉炒白茯苓白蒺藜炒川大黄剉炒白芍卷柏炒芎藭各三兩右為末每服二錢食前粥飲調下内補散出聖惠方治腸風痔疾失血過多虚乏羸困續斷熟乾地黄各二兩人參去蘆附子去皮臍炮當歸剉炒芎藭黄耆剉白芍藥桂心麥門冬去心白茯苓乾薑炮剉五味子各一兩白芷甘草炙剉各三分右㕮咀每服四錢水一盞􅀥三枚煎六分去滓温服日三四服白花蛇丸出聖惠方治腸風下血日夜不絶疼痛至甚白花蛇二兩酒浸去皮骨炙黄杏仁半兩湯浸去皮尖雙仁炒黄耆剉胡荽子炒蝟皮炙焦人參去蘆鯉魚皮燒灰附子炮去皮臍當歸剉炒皁莢樹耳炙各一兩枳殻麩炒去穰男女髪燒灰肉桂去皺皮各二兩右為末煉蜜杵丸梧子大每服三十丸食前人參湯下升陽去熱和血湯出醫方大成治腸癖下血乍便其血即出有力而遠射四散如春節二月中天氣腹大作痛乃陽明氣衝熱毒所作也當去濕毒和血而愈是其治也又名除濕熱和血湯生地黄牡丹皮生甘草各半錢熟甘草黄耆各一錢當歸身熟乾地黄蒼术蓁艽肉桂各三分橘皮二分升麻七分白芍藥一錢半右㕮咀作一服水四盞煎一盞去滓稍熱空心服之白术散出聖惠方治腸風痔疾失血虚損羸瘦飲食無味面色萎黄四肢乏力白术石斛去根剉續斷天門冬去心各三分黄耆熟地黄人參去蘆肉從容酒浸一宿去皺炙牛膝白茯苓各一兩桂心甘草去蘆炙剉各半兩右㕮咀每服四錢水一鍾生薑半分棗三枚煎至六分去滓不計時温服内補黄耆湯出聖惠方治腸風痔病下血太多虚羸無力黄耆剉槐子仁炒枳殻麩炒去穣各三兩白蒺藜炒去刺烏蛇肉酒浸炙鹿茸去毛塗酥炙附子炮去皮臍蝟皮炙當歸剉炒沈香㯽榔厚朴去粗皮薑汁炙各一兩右為末煉蜜杵丸梧桐子大每服三十丸食前桑枝湯下黄耆丸出簡易方治久年腸風痔漏方見痔漏門痔漏類熟乾地黄丸出聖惠方治内傷風冷大便下血不止熟乾地黄龍骨燒赤黄耆剉紫蘇子蒲黄當歸附子泡去皮臍艾葉炒白礬燒令汁盡阿膠碎炒各一兩枳殻半兩麩炒去穰右末煉蜜丸梧桐子大每服三十丸空心及晩食前粥飲下腸風黒散出直指方治腸風下血腹痛枳殻製各一分甘草炒烏梅肉炒各半兩敗棕頭髮木饅頭木賊各燒存性槐角炒右為末每服二錢陳米飲乗熱調下槐皮膏止痛痒血出槐皮三兩薫陸辛荑甘草白芷各半兩巴豆七枚乾漆十四枚桃仁十枚右以猪脂半斤煎之三上三下去滓以綿裹膏塞下部日四五止痒痛内補散出聖恵