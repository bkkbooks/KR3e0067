方一名槐花湯橡斗子一兩槐花一兩二味同炒黄色白礬一分右為末每服二錢温酒調下椿皮丸出經騐良方治大便下血椿樹根皮四面去粗皮焙乾枳殻麩炒蒼术各一兩泔浸右為末醋糊丸梧桐子大空心米飲下四十丸治腸風下血及肛門出出經驗良方虎爪艻根金罌子艻根椿根各等分右同烏梅甘草半水半酒空心服治臟毒下血出經驗良方側栢葉一兩白礬少許湯煮過焙乾槐花二兩炒為末棕數片陳者佳燒灰存性右為末每服一匙温酒隨意調下三栝蔞酒治便紅天栝蔞即木饅頭收二三年者為佳地栝蔞即白爛田螺殻水栝蔞即蓮蓬殻久者佳右燒灰存性窨麻油調下治腸風痔漏荆芥三稜用烏頭炒過切片子馬兠鈴籐穀精草右等分用水煎沸薰洗大效治初得腸風及血痔出本草以檞栗葉微炙炒槐花減檞葉之半同為末米飲調服熱多者尤佳治便血蒲黄生用荷葉頂大蘿蔔皮各等分右將荷葉大蘿蔔皮燒灰存性碾末和勻米湯調下空心服黄連飲治腸風瀉血如痢腹中疼痛面色萎黄黄連去鬚一兩乾薑炮一分甘草炙五錢右㕮咀每服三錢水一盞薑三片棗一枚擘煎六分去滓温服黄耆丸治腸風行步艱難黄耆炮剉枳殻去穰麩炒各一兩葳靈仙去鬚二兩右為末煉蜜丸菉豆大每服三十丸至五十丸用温水下並不損氣烏梅丸治瀉血烏梅二十枚醋煮去核白礬三兩飛過訶梨勒三十枚炮去核右將白礬訶梨勒為末與梅肉丸梧桐子大每服七丸米飲下神驗膏治腸風下血冷不入食背隂臭椿皮根上不見日者取剥嫩皮一斤黑豆半升槐花二兩右以水五升于銀石器内慢火熬令豆熟為度續入蜜二兩再煎候蜜熟傾出盛淨磁内夜露兩宿每日食後臨卧各一服每服約半盞許用重湯温熱得所旋旋服食大效丸治腸風瀉血大薊根七截各長一寸又名荆芥白礬一兩細研麝香當門子豆許大七粒研右用不霑土大栝蔞一箇割下葢子不去穰入大薊根白礬當門子在内用箆子左攪七遭安葢在上以鹽一合和土固臍隂乾用炭火煅透赤便住候冷去泥細研為末取一半為散一半以糯米粥為丸梧桐子大每日空心將大薊苖煎湯調下五分至日午臨卧又煎大薊苖酒下十丸服三兩日便住須服過三五箇栝蔞永去病根獨活丸治腸瀉血不止獨活去蘆研為末五錢黄蠟五兩銀器中鎔成汁生薑半斤取自然汁右以薑汁入熬以汁盡為度次入獨活末令勻衆手急丸梧桐子大每服四十丸以濃陳米飲送下空心臨卧服榮順散治腸風下血痛不可忍枳殻去穰麩炒一兩荆芥穗一兩槐蛾半兩炒黄右為末每服二錢温米飲調下不拘時未效再服龍肝散治腸風瀉血伏龍肝般丹牡蠣各五錢右為末每服二錢陳米飲調下不拘時治腸風痔漏大便常血出肘後方苦桃皮萹竹苦參右煮汁漬之大妙燒稻藁灰汁漬之亦良治腸風下血疼痛不止出聖惠方道人頭一兩荆芥穗一兩皁角三寸去黒皮塗醋炙去子右為末每服一錢食前粥飲調下内補散出聖惠方治大腸風毒下血黄耆剉枳殻去穰麩炒側栢葉炙各一兩右為末每服二錢食前粥飲調下治大腸風毒下血不止出聖惠方枸杞子槐子炒桑木耳炙各二兩右為末每服二錢食前黄耆粥飲調下又方出聖惠方枳殻去穰麩炒何首烏乾薑炮剉各一兩右為末每服一錢食前粥飲調下又方出聖惠方釡下墨棕櫚皮訶梨勒皮煨各一兩右為末每服一錢食前粥飲調下又方出聖惠方牛角鰓棕櫚皮乾薑各一兩右都為末研勻每服二錢食前粥飲調下又方出聖惠方牛角䚡一對雄黄一塊如㭟子大麝香一分細研右每一隻牛角䚡安雄黄一塊在内以稠泥封閉下面用桑柴火燒熟研為散入麝香和勻又以栝蔞一對亦用桑柴火燒令熟研為散每服栝蔞末二錢牛角䚡末一錢相和令勻食前米飲調下治腸風下血發歇不止出聖惠方荆芥穗薄荷枳殻各一兩麩炒去穰右為末每服一錢食前粥飲調下又方出聖惠方皁莢不蛀者三兩栝蔞一枚白礬二兩右件藥入瓶内以鹽泥固臍候乾以炭火燒令通赤候冷細研令勻每服二錢食前粥飲調下神效方出聖惠方治腸風積年瀉血不止黄丹一兩白礬一兩栝蔞一枚去頭入二味在内右以物葢栝蔞頭鹽泥固臍安磚上大火燒令通赤放冷取出搗細為末每服一錢食前煖刺薊汁調下治腸風積年下血不止出聖惠方野狸頭一枚桑根西枝一握剉附子一枚右件藥入瓶内鹽泥封固候乾炭火燒令通赤候冷取出為末每服二錢食前粥飲調下又方出聖惠方皁莢七挺不蛀者去黒皮塗醋炙去子細研末寒食蒸餅子烏龍尾各二兩右共為末煉蜜丸梧桐子大每服二十丸食前粥飲調下又方出聖惠方槐耳半斤切皁莢十挺剥去皮子硇砂一兩細研右以米醋三升煎取一升去滓再入鐺中以大火養成膏入硇砂和勻丸梧桐子大每服十丸空心及晩食前温粥飲下治積年腸風下血疼痛出聖惠方竈突墨二兩荆芥一兩木香一兩右為末水浸蒸餅為丸梧桐子大每服三十丸食前槐子湯下治積年腸風下血面色萎黄下部腫痛出聖惠方緑礬二兩燒赤釡底墨烏賊魚骨炙焦各一兩右為末粟米飯為丸梧桐子大每服三十丸食前煎赤糙米湯下又方出聖惠方皁角去黒皮塗酥炙去子蕓薹子炒各一兩枳殻二兩麩炒去穰右為末煉蜜為丸梧桐子大每服二十丸食前枳殻湯下治大便下血不止出聖惠方生乾地黄二兩阿膠碎炒白蘞五兩右㕮咀每服三錢水一盞入竹葉二七片煎至六分去滓食前温服治腸風出本事方五倍子白礬各五錢右為末順流水為丸梧桐子大每服七丸空心飯飲下治腸風瀉血出本事方牽牛五兩牙皁三兩不蛀者右水浸三日後除皁角以酒一升煮令乾焙為末煉蜜丸梧桐子大每服七丸空心温酒下空心日午夜卧各一服或轉下黄物不妨病後可常服每日五丸飯飲送下治腸風及熱毒下血或因食熱物發動出本事方金星草陳乾薑各三兩右為末每服一錢新汲水調下當歸赤小豆散出千金方治先血而後便謂之近血及治大腸秘赤小豆五兩浸出芽曬乾一法熬令拆當歸一兩右為末漿水服方寸匕日三四服治臟毒下血出危氏方一名巻栢散地栢生土石傍髙四五寸根黄如絲上細有黄㸃正似栢枝曝乾用一作卷栢黄耆各等分為細末右末每服二錢水調下治便血及臟毒下血經年瘦者出仁存方槐花五倍子各炒焦等分右為末麵糊為丸梧桐子大每服五六十丸米飲吞下食前荆芥散出經驗良方治腸風下血荆芥穗縮砂仁各等分右為末每服三錢用糯米飲調下不拘時日進三服一方食前服地榆湯出百一選方地榆洗淨焙乾剖卷栢不去根洗淨各等分右㕮咀水一椀沙瓶内煮數十沸通口服不拘時每用一兩茱萸丸出直指方治腸風下血二三十年者鷹爪黄連吳茱萸各等分右新瓦上同炒候茱萸香熟黑色為度去茱萸不用將黄連為末空心温酒下二三錢米飲下亦得又方黄連茱萸陳米糊丸梧桐子大每服五十丸米飲下日二服更以胃風湯煎如法吞下一方名翦血丸用木香一兩濕紙裹煨香以酒糊丸切忌白酒雞肉鮓醬普濟方卷三十七
