body:
  text: 普濟方卷三明周王朱橚撰方脉總論辨七表八裏脉法浮芤滑實弦𦂳洪爲七表遲緩濇㣲沉伏濡弱爲八裏浮爲中風左手寸口脉浮中風發熱頭痛關脉浮腹脹胃虚尺脉浮大便難右手寸口脉浮肺風鼻塞關脉浮食不消化尺脉浮小便澀芤爲失血及血實左手寸口脉芤則吐血或衂血關脉芤大便下血尺脉芤小便赤及下血右手寸口脉芤胷中有積血關上脉芤腹内有瘀血尺脉芤小腹疼痛下血滑爲吐逆寸口滑胸滿氣逆關滑胸中寒吐逆不欲食尺脉滑爲下痢婦人月信不通滑脉但在寸關皆主吐逆實為下痢寸口實胸中熱關脉實腹中滿寒疝氣急下痢尺脉實小腹滿痛小便澀弦爲拘急寸口脉弦胸中急痛關脉弦胃中寒心下拘急尺脉弦小腹急滿左右弦皆主拘急𦂳爲痛寸口脉𦂳頭中痛關脉𦂳心下痛尺脉𦂳臍下痛左右𦂳皆主痛也洪爲實寸口脉洪胷脇熱滿闗脉洪胃中有實熱吐逆無常尺脉洪小腹滿陰中痛左右洪皆主熱遲爲寒寸口脉遲上焦有寒關脉遲中焦有寒尺脉遲下焦有冷左右遲皆主寒緩爲風結寸口脉緩皮膚不仁闗脉緩腹中有風結尺脉緩下焦有寒左右緩皆主風寒㣲爲氣結寸口脉㣲上焦寒氣痞結關脉㣲胃中寒心下痛愊愊然尺脉㣲小腹有寒聚左右㣲皆為氣痛濇為血滯寸口脉濇陽氣虚衛氣虚不足關脉濇心血氣虚榮氣不足脛逆冷腹中雷鳴左右濇皆主氣不足沉爲水寸口脉沉胸中有寒飲關脉沉心下滿短氣尺脉沉腰痛脚弱有積水氣左右沉皆主水伏爲物聚寸口脉伏胸中物聚關脉伏有水氣溏洩尺脉伏水榖不化左右伏皆有物聚濡爲虚損寸口脉濡氣少虚損多汗關脉濡苦重下虚弱尺脉濡發熱惡寒左右濡俱主虚損弱為筋萎寸口脉弱陽氣虚汗自出關脉弱胃氣不足小熱大虚尺脉弱骨肉痠疼左右弱皆主虚浮芤相搏中風衂血浮滑相搏中風吐逆浮實相搏中風下痢浮弦相搏中風拘急浮𦂳相搏中風體痛浮洪相搏中風發熱論七表形候歌浮如指下捻葱葉浮者陽也主風虚運動之候浮應東方木木生風故脉髙虚而浮泛其狀一尋之若透皮膚之間按之不足舉之有餘似乎太過其脉虚軟混然如指下捻葱葉之狀謂之浮凡息數盛急主風邪之候浮洪中風體熱浮滑中氣痰逆浮𦂳則風痰體痛浮緩氣痰體倦虚氣相并也㣲浮者虚勞冷汗寸浮主頭目昏痛關浮氣滿不食尺浮腎臟虚風浮入肺竅壅塞主大腸不利芤則中虚有兩頭芤者陽也榮衛妄行失血之候也氣則關膈不能續故脉來指下尋之其狀兩頭則有中間全無脉者氣之府也血爲榮氣爲衛血隨氣氣引導血也氣既失導而不能相隨故絶處者為氣所格也按則兩頭有中間無指下尋之若散之狀謂之芤凡芤主失血芤浮主風吐血芤滑氣逆吐血微芤便中利血寸芤而𦂳吐血膈痛關芤乃瘀血停留兼滑亦吐血尺芤即小腸便血而痛也右尺芤則大腸下血滑似動珠來往利滑者陽也主氣交併逆動之候也滑應北方壬癸水故脉往來流利圓滑如珠象水貎也其狀指下尋之三關如珠動按之則定不出圓圓凑指滑利若按動珠之狀謂之滑滑者陰氣壅陽氣虚滑而數者主寒熱滑而洪者主吐逆翻胃𦂳滑者主體倦小腸急痛㣲滑上部或冷逆下部則下痢氣疼寸滑主見吐逆關滑胃中積冷尺滑主上熱下冷而虚躁也實向浮中取次求實者陽也象中央戊巳土之位故體來實髙下取之皆有主三焦滿也其脉指下尋之未絶舉之有餘而積陽於内壅而不散三焦皆滿指下按浮中流故氣壅於中脉來髙下各得其所故脉之狀似實也寸實主胷中伏熱不能進食關實中焦氣滿膨刺也弦苦筝弦時帶數弦者陽也象東方木位氣血收斂之貎指下尋之脉來筝弦而小直氣血收斂筋脉不能舒暢故脉象弦貎按之不足舉之有餘若筝弦小直時帶數曰弦主拘急勞急體痛乏力虚汗寸弦頭目痛關弦胸積冷胃中時逆惡寒尺弦丹田冷而盗汗虚夢尺寸弦胸中急痛闗弦主心中拘急尺主小腸急痛𦂳伏琴弦促軫留𦂳者陽也主三陽併盛形如轉索伏於陽絡之候也故尋之三關通度𦂳急如促琴軫也由隂陽相搏氣血交爭指下尋之有餘舉之指數而洪也𦂳脉形大於弦故似琴弦狀曰𦂳𦂳主狂躁而神亂不定或𦂳滑則吐逆寒熱𦂳而甚數主熱體疼寸𦂳主頭疼關𦂳主胸膈疼尺𦂳主丹田急痛洪舉有餘來極大七陽爲表定其由洪者陽也應南方火主榮絡大熱而氣灼爍之候脉來盛極指下按之如火之炎上象火昇騰如掩壓之貎故也又曰按之在膚混然若浮實有力而大曰洪洪主吐逆又曰近君火爲陽中之陽故陽氣升而榖氣不能轉故乃吐耳寸洪上焦熱壅關洪胃熱而吐身熱而悶尺洪主便赤如血澀痛也七表病脉浮爲在表爲風應人迎為氣應氣口為熱爲痛為嘔爲脹爲痁爲喘爲厥爲内結爲滿不食浮大爲鼻塞浮大長爲風眩癲疾浮滑疾爲宿食浮大而濇爲宿食滯氣浮短爲肺傷諸氣浮滑爲飲走利浮細而滑爲傷飲浮滑疾𦂳為百合病浮數爲大便堅為小便數浮𦂳爲淋爲癃閉浮緩為不仁寸芤為吐血㣲芤爲衂血關芤爲大便出血尺芤為下焦虚小便出血滑爲吐爲滿爲欬爲熱爲伏痰爲宿食爲畜血為經閉為鬼疰爲血氣俱實滑散爲癱緩滑散爲結熱滑實為胃熱和滑為姙娠滑而大小不匀必吐爲病進爲泄利滑而浮大小腹痛弱則陰中痛大便亦然實爲熱爲嘔爲痛爲氣塞爲喘嗽為大便不禁實𦂳為陰不勝陽為胃寒為腰痛弦為寒爲痛爲飲爲瘧為水氣為中虚爲厥逆爲拘急爲寒癖弦𦂳為惡寒為疝瘕為癖爲瘀血雙弦為脇急痛弦而鈎爲脇下刺痛弦長爲積隨左右上下𦂳爲寒爲頭痛骨内痛爲欬爲喘爲滿浮𦂳為肺有水𦂳滑爲蛔動爲宿食爲逆吐𦂳急爲遁尸𦂳數爲寒熱洪爲脹爲滿爲痛爲熱爲煩洪實爲癲洪𦂳為癕疽爲喘急亦為脹洪大爲祟洪浮為陽邪來見七表脉名一浮者風虚運動之候浮脉應金於時為秋萬物至秋而終草木花葉皆落其枝獨在若毫毛焉故其脉之來輕虚浮泛千金云按之不足舉之有餘按之不足則知其虚於下也舉之有餘則知輕浮於其上也昔人喻如捻葱葉之狀也者誠得之故浮有風有虚二候之診二芤者失血之候芤之爲物兩旁有中間虚脉之應於診者有若是古人因取以名之也人之一身所資賴者惟氣與血血以榮之氣以衛之故榮血衛氣相恃以行兩不相失然後經脉流通而無間斷芤脉之診則不然蓋陽邪所盛血與氣失其道路不能相繼續故其脉之狀舉指浮大而軟按之兩頭實而中間虚也凡診見之皆失血三滑者血相併逆動之候滑脉屬水故往來滑利如珠而中有力按之即伏不進不退外柔内剛應水之象原滑之由陰氣壅而陽氣虚氣陽者衛外而爲固也陽為邪勝虚弱而不能固䕶保持隂氣壅甚而不息為滿爲吐由此故也四實者三焦氣滿之候實應吐之象脾主中州而屬土焉實本脾虚之證而以實名之者蓋脉之來舉指有餘按之不足浮中沉皆有力而言之也且人之五臟非脾不養脾居其中灌溉四旁脾氣平和則陰陽升降上下往來流而無滯脾若受邪而虚弱則陽伏而不散中壅而實塞三焦氣滿形於診者由此而然五弦者血氣收歛之候血榮衛氣脉之所依也氣衛於外以充皮膚血榮於中以營經絡周一體而無間應百刻而不違此乃平人之常也而乃賊邪干之則膚腠戢閉經絡凝泣血氣因之以收斂而不散故筋脉皮胃皆爲之拘急而不得舒暢在於指下若按箏絃𦂳直帶數者是也四時之脉春亦謂之弦正以陰氣之所入寒氣之所勝至春則血氣方向於温舒當弦爾若十二經脉之中非其時診見之是謂血氣收歛拘急之候六𦂳者寒激搏伏於陽絡之候指下尋之三關通度來往速利按之有餘舉指甚足狀若洪弦千金所謂弦與𦂳相類蓋以似之而非仲景云脉𦂳如轉索而無敇予以𦂳脉按之實數似切繩狀誠得之矣夫陰陽和則血氣調隂陽逆則血氣争平人之常無所忤犯陰陽未嘗不和也及有所感觸在陽受之則爲陽邪而以陽併陰在陰受之則為陰邪而以陰併陽陰陽併毗血氣所以不得其平者此爾𦂳脉之診則以陽邪併於陽絡而三陽併壅故其證身熱體痛内煩躁擾復痞逆也七洪者榮絡大熱血氣燔灼之候洪應南方丙丁火於時爲夏萬物至夏盛極長大也氣象之故夏脉亦貴於洪非其時診見洪脉在於十二部之中皆爲邪熱候夫洪者水也洪而大焉血氣之在人無異乎水以不依其道逆行而爲洪惟氣與血欲其常不可暴也而邪熱所勝偏陽隆盛則榮衛之行不得其道乃氣壅而血溢故其脉之来舉按皆極大輕手尋之於膚已得混混然若浮若實有力而軟内經曰夏日在膚泛泛然萬物有餘亦論洪脉之盛大也論七表脉變例七表脉者是客邪傷乃陰乗陽也其證身熱惡寒是外陽而内陰見也七表脉但熱而不惡寒者是内外皆陽也如七表證自汗惡風却得八裏脉者當用麻黄桂枝各半湯如八裡證自汗惡風得七表脉亦用麻黄桂枝各半湯如有汗不惡風者黄耆白术黄芩湯如無汗不惡風者葱豉湯脉如浮滑而長爲三陽裏禁不可發汗經曰陽盛陰虚汗出而死仲景曰脉浮當汗三陽當汗者謂陽中有陰夫表者是陽分也脉浮亦陽分也浮脉客陰也故當發汗且陽中有陰者陽乃榮衛之分客陰自外入居之故宜耗出而發去之經曰在上者因而越之此説非謂陽中有形跡之隂是陽中客邪之隂居其表也三陽之表是三陽之標也無形經絡受客陰乃表之表也爲陽中陽分也宜客去客陰邪也故前説陽中有陰當汗若三陽之裏是三陽本也主有形受邪膀胱與胃是也既受在有形之處惟宜利小便下大便則愈此乃陽中之陰也此説言主前説言客若不窮主客邪正之理必傷人命三陽當下者三陰者臟也外有所主内無所受所主者皮毛血脉肌肉筋骨也無所受者無所受盛也在三陽經絡中有邪者是為無形乃陰中之陽可汗而已是經絡無形受寒邪當發汗去之爲三陰標之病也三陰本者臟也盛則各歸於胃是有形病也當自各經絡中藥入胃下去之此乃三陰當下也是為陰中之陰可去之者陰中者主也有陽者客邪也言陰經中受陽邪染於有形物中不得出者可下畧説八裏乃陽乗陰也其證身凉四肢厥惡熱是外陰而陽内但寒不熱不渴者是内外皆陰也仲景云厥深熱亦深厥㣲口傷爛亦因發汗得之夫七表八裏發汗吐下者治傷寒必當仔細論之七表八裏互相交變乃壊證未理脉中一説六脉交變浮滑長爲三陽乃陽中有隂沉濇短為三隂乃陰中有陽當審察表裡分其内外以辨虚實治從標本萬舉萬當夫標本者太陽有標本之化少陰亦然太陽標熱而本寒從此生七表少陰標寒而本熱從此生八裏太陽標本皆陰少陽標本皆陽惟陽明與厥陰不從標本而從乎中也此與六氣之標本也叔和所載者是七表八裏九道脉計二十四道脉之標本也有皆從標從本從乎中假令太陽少陰各有標本之化太陽脉浮少陰脉沉此乃沉浮交内經曰若從標本論之是爲長短交長以發汗短以下長曰陽明短曰太陰長者陽明當解表利小便短者太陰當下土欝則奪之下令無壅礙故長脉發之短脉下者是滑與澀交滑居寸而熱濇居尺而寒滑居尺而熱濇居寸而寒濇脉居尺寸皆損氣血滑居尺寸皆助陰陽内經曰滑脉曰生濇脉曰死至是三陰三陽變化表裏也七表脉主治雲岐子云左手三部寸關尺受非謂主位之脉皆客邪之脉也一浮者陽也主咳𠻳氣促冷汗自出背膊勞強夜卧不安按之不足舉之有餘陰不足陽太過寒則傷形熱則傷氣故肺咳𠻳氣促宜小柴胡湯柴胡黄芩五味子製半夏各半兩白芍藥人参桑白皮各二錢半右㕮咀每服一兩水二盞生薑七片煎至七分去滓食後溫服按之不足舉有餘再再尋之指下浮藏中積冷榮中熱欲可生精要補虚藏中積冷按之不足榮中有熱舉之有餘陽有餘陰不足也治之宜地骨皮散人參地骨皮柴胡黄耆生地黄各一兩半白茯苓半両知母一両石膏二両右㕮咀每服一兩水二盞生薑七片煎至七分去滓細細温服連夜頓服生精補虚地黄丸寸浮中風頭熱痛主脉浮客脉又浮客主同宫主太陽中風頭痛有汗脉浮緩桂枝湯無汗脉浮𦂳麻黄湯風在上焦如太陽頭痛汗出轉陽明頭痛白虎湯少陽頭痛小柴胡湯太陽頭痛羗活湯關浮腹脹胃虚空主脉弦客脉浮風寒熱相合致胃中虚空何謂胃虚夫浮脉者風邪也弦者肝脉也以木能克土致胃中虚空理中丸主者風在中焦子能令母實而變為寒也東垣去乾薑加厚朴陳皮是爲調中湯製厚朴陳皮去白製半夏各一兩白术一兩半人參五錢甘草炙三錢右㕮咀每服一兩水二盞生薑七片煎至七分去滓食前服尺部見之風入肺大便乾澀故難通腎脉沉反見浮脉為風火所乗肺氣虚而不能生水浮脉行於水中知水反不能勝火浮主諸風之脉尺部見之是陰虚陽盛之意也風入肺者何也是金水之虚水既衰弱金無所恃是水火之實火助木而生風腎氣虚故風入肺燥使津液内竭故太陽乾澀而燥内經曰侮所勝也已乗所盛也火侮其水而勝其金薄其子而囚其母治之以七聖丸風在下焦㯽榔木香羌活川芎桂各半兩大黄郁李仁各一兩右爲細末蜜丸桐子大每服三十丸漸加之㣲利爲度生薑湯下二芤者陽也主淋瀝氣入小腸脫血病者皆從太陽在寸則吐血在下瀉血在中者緩之芤脉在上加減梔子湯梔子四個碎香豉半兩先以水二盞煮梔子仁至七分入豉煮三五沸去滓溫服得吐止芤脉在中宜瀉黄散藿香葉山梔子仁甘草各半兩防風三兩石膏一両右㕮咀水二盞煎一盞細細服無時芤脉在下宜猪苓湯猪苓滑石澤瀉阿膠炒各等分右㕮咀水二盞用前味煎至一盞去滓後入阿膠化開指下尋之中且虚邪風透入小膓居患時淋瀝兼疼痛大作湯丸必自除岐云芤主血凝而不流凡人之十二經絡以應溝渠是榮衛氣血不散不能盈滿經絡故見芤脉主淋瀝小便濃及血大作湯丸者四物湯地黄丸補之桃仁承氣湯以瀉之一云大柴胡湯如秘加大黄寸芤積血在胷中主脉浮客脉芤二者相合血積胸中熱之甚也治之以犀角地黄湯血在上焦生地黄二兩黄芩一兩半黄連一兩大黄一兩半右㕮咀水二盞秤一兩煎至一盞去滓食後服之關内逢芤腸裏癰主脉弦客脉芤二者相合積血於腸中是肺先受邪傳入大腸當用桃仁承氣湯血在中焦又云芤脉在中或吐血生癰治抵當丸或地黄丸抵當丸大黄水蛭炒製各半兩䖟蟲三錢右㕮咀爲細末煉蜜為丸桐子大每服二十丸食後溫水下利爲度未利加數服之尺部見之虚在腎小便遺瀝血凝濃主脉沉客脉芤沉芤相合積血在下抵當丸抵當湯主之血在下焦或以加減桃仁承氣湯桃仁半兩甘草二錢半大黄一兩桂三錢右㕮咀每服一兩水二盞薑七片煎至一半去滓入芒硝三錢化開食後服以利為度未利再服右云上焦有血先便後血下焦有血先血後便中焦有血便血齊作三滑者陽也主四肢困弊脚手酸疼小便赤澀仲景曰衛氣前通小便赤澀腰中氣熱先中膀胱又云小便赤澀大便難是實熱加減大柴胡湯主之赤芍藥柴胡各一兩枳實大黄黄芩各半兩甘草三錢右㕮咀每服一兩水二盞薑七片煎至一半去滓温服以利爲度未利再服滑脉如珠動曰陽腰中生氣透前膓脛酸只爲生寒熱大瀉三焦必得康雲岐云夫小便赤澀腰中生氣是命門所生其脉流利數而疾宜大承氣湯主之熱多寒少故宜瀉以辛寒厚朴製一兩枳實麩炒大黄各半兩芒硝三錢右㕮咀用水一碗薑十片先煎厚朴枳實至一鍾半再入大黄煎至一鍾去滓入芒硝化開午食後溫服未利次日晩食後服之滑脉寸來多嘔逆主脉浮客脉滑浮滑相合而爲嘔生薑半夏湯主之有往來寒熱者小柴胡湯主之寒在上焦緩者半夏湯製半夏一兩茯苓二両右㕮咀每服一兩水一鍾薑七片煎至一半去滓食後服不嘔吐者止不止者再服關滑胃寒不下食主脉弦客脉滑弦滑相合引寒入胃致不能食春夏平胃散秋冬理中丸主之如有表者小柴胡加桂湯半夏湯主之寒在中焦小柴胡湯加桂湯柴胡黄芩赤芍藥各一兩人參半兩甘草炙三錢桂四錢右㕮咀每服一兩水二盞薑七片煎去滓溫服尺部見之臍似水飲水下焦聲瀝瀝主脉沉客脉滑沉滑相合寒結膀胱附子四逆湯寒在下焦炮附子炮生薑各半兩白术一兩甘草三錢桂七錢右㕮咀每服一兩水二鍾煎至一鍾去滓食前溫服四實者陽也主伏陽在内脾虚不食四肢勞倦實脉尋之舉有餘伏陽蒸内致脾虚食少只縁生胃壅溫和湯藥乃痊除潔古云脾脉本緩反得客脉實緩實相合主胃中有熱故脾氣溫反實故不食也食少氣不宣通故為胃壅上出濃血是也一云氣寒則不通宣溫則流行伏陽者藏熱于胃脾熱而食少胃中虚熱多生壅腫治之以藿香半夏散藿香葉製半夏各一兩丁香半兩右爲粗末每服三錢水一鍾半薑七片煎去滓稍食前熱服雲岐曰脾受熱而反虚故不能食溫和湯藥乃平胃散是也實脉關前胸熱甚主脉浮客脉實浮實相合陽氣有餘胸中熱其熱在上焦宜涼膈散主之山梔子仁一兩連翹黄芩各二兩大黄半兩薄荷一兩半右爲粗末每服一兩水二鍾同竹葉七片煎至一盞去滓入蜜少許食後服當闗切痛中焦任主脉弦客脉實弦實相合熱在胸中可用調胃承氣湯實在中焦尺脉如繩應指來腹脹小便應不禁主脉沉客脉實沉實相合沉勝實則是水勝火也乃主勝客乾薑附子湯主之實勝沉則是火燥去水乃客勝主也大承氣湯主之此二證俱小便不禁實在下焦一云术附湯主之亦主勝客也附子炮半兩白术一兩甘草炙三錢右㕮咀每服半兩水一大盞半煎至一鍾去滓食前温服五弦者陽也主勞風乏力盜汗多生手足酸疼皮毛枯槁弦脉五臟俱傷葢木克土故也弦脉為陽狀若弦四肢更被氣相煎三度解勞方始退常須固臍下丹田脉如箏絃𦂳而急主四肢相煎木旺土衰四肢者辰戌丑未四末也土位也固臍丹田者八味丸是也又云木多損土又傷肌肉漸似成勞左傳曰風滛末疾固臍丹田爲脾言之寸部脉𦂳一條弦胸中伏痛狀繩牽主脉浮客脉弦浮弦相合胸中急痛屬少陽以小柴胡湯和解之弦在上焦關中有弦寒在胃主客脉俱弦知木氣有餘致寒氣大實於胃中附子理中丸主之弦在中焦下焦停水滿丹田主脉沉客脉弦沉弦相合風寒氣有餘下焦停水术附湯主之弦在下焦六𦂳者陽也主風氣此太陽少陽相合主伏陽上冲變爲狂病宜黄連瀉心湯黄連生地黄知母各半兩黄芩二兩甘草半兩右㕮咀每服一兩水一盞半煎服𦂳脉三關數又弦上來風是正根元忽然狂語人驚怕不遇良醫不得痊潔古云此是三陽合病𦂳數太陽也弦多少陽陽明也故實則譫語雲岐曰其脉𦂳洪而實陽氣有餘之象主熱即生風發作狂語可用小承氣湯主之生地黄黄芩山梔子仁各一兩大黄半兩右㕮咀水煎一兩以利爲度𦂳脉闗前頭裏痛主脉浮客脉𦂳浮𦂳相合諸頭痛皆屬三陽太陽頭痛羌活湯主之必愈入府大承氣湯下之少陽頭痛在經小柴胡湯主之入府小承氣湯下之陽明頭痛在經白虎湯主之入府調胃承氣湯下之其脉弦而頭痛者内外也大柴胡湯主之𦂳在上焦到關切痛無能動主脉弦客脉𦂳弦𦂳相合太陰受邪脾中切痛治之以芍藥湯赤芍藥二兩甘草半兩桂三錢右㕮咀水煎一兩加生薑七片服如實痛加大黄大承氣湯當揀而用之𦂳在中焦隠指寥寥入尺來繳結遶臍常手捧主脉沉客脉𦂳沉𦂳相合遶臍痛者太陽與芍藥湯主之不已是實濕在脾腎也术附湯主之𦂳在下焦桂枝芍藥湯桂一兩芍藥炙甘草各半兩右㕮咀每服一兩入薑棗煎服七洪者陽也主頭痛四肢浮熱大腸不通燥糞結澀口乾遍身疼痛潔古云此乃是正陽陽明身熱目痛鼻乾不得卧則知病在陽明經也洪脉者按之實舉之盛洪者陽太過陰不及頭痛四肢熱大便難小便赤澀夜卧不安治法陽證下之則愈如下之隨證虚實有大承氣湯大柴胡湯桃仁湯隨證用之此證有兩議按之無舉之盛當觧表不可下下之則死按之盛舉之無不可表當下下之則愈洪脉根元本是陽遇其季夏自然昌若逢秋季及冬季發汗通腸始得凉雲岐曰其脉舉按皆盛本爲相火之象發汗從表裏從表宜麻黄湯從裏宜大承氣湯麻黄湯麻黄芍藥各一兩葛根一兩三錢豉一百數葱白三莖右㕮咀每服一兩水二盞生薑七片煎服無時以得汗而觧未汗再服仲景謂身體疼痛立夏脉洪大診知其病瘥也通腸七宣丸七聖丸大柴胡大承氣可選而用洪脉關前熱在胸主脉浮客脉洪浮洪相合熱結於胸中凉膈散加減用之或連翹湯主之連翹二両柴胡當歸生地黄芍藥各半両黄芩一両大黄三錢右㕮咀水兩盞煎服之洪在上焦到關翻胃幾十重主脉弦客脉洪二者相合胃熱不停翻胃衂吐以酸苦藥除之或和之以調中湯大黄比衆藥减半葛根黄芩芍藥桔梗茯苓藁本白术甘草炙各等分右㕮咀水煎一両服之不拘時候日二三服洪在中焦如秋冬寒在胃中不可用胃中有餘熱也又云熱在胸者凉藥不可速也胃化火冲出其食諸逆衝上皆屬於熱食不得入更向尺中還若是小便赤澀脚酸疼潔古云洪尺由陰不及陽也從下至上先損腎肝故小便赤澀骨痿筋緩雲岐曰主脉沉客脉洪沉洪相合小便赤澀閉塞不通宜澤瀉散主之赤茯苓澤瀉各半両桑白皮山梔子仁各一両右㕮咀水煎一両服之得小便利爲度不除者腎氣不通可用大柴胡加大黄下之洪在下焦凡此七表雖名陽脉有用熱藥者何答曰陽中有陰故也通上下中二十一道脉證用藥法者七表之病在於上下調之上下在中者和之於中辨其脉證知其主客用仲景之藥無不效也七表脉春夏得之爲順秋冬得之為逆海藏云浮中風寒芤失血滑吐實下應須别弦為拘急𦂳為痛洪大從來偏主熱論八裏形候歌沉若爛綿尋至骨沉者陰也主陰盛陽乗之候沉者重也陰氣厥逆陽氣不舒故脉沉指下尋之似有舉之全無緩度三闗重取之若按水中綿索之狀其來不能透於皮膚但於肉下得之曰沉主冷氣攻擊四肢疼逆寸沉伏冷痰於胸中關沉冷氣膨刺尺沉腰重便數膀胱冷痛又尺沉主肺弱水氣痛㣲於指下細如絲㣲者陰盛陽衰之候指下㝷之脉來而小細細如絲徃來極㣲進退㝷之若有若無曰㣲㣲主氣虚冷逆崩中敗血陽道怯弱寸微膈間冷逆關㣲主氣促下流尺㣲丹田氣冷陰汗氣短緩小於遲來往慢緩者陰也主衛氣有餘榮血不及之候故指下尋之往來遲緩也緩者榮中不流而衛氣獨行不得與陰道相續故來遲緩往來不急不慢不能甚有力透肌曰緩緩主四體倦怠寸緩主皮膚頑痺關緩主腹中風結腎氣上攻夜多虚夢尺緩主風不利濇則如刀刮竹皮濇者隂也主陽虚陰衰之候積氣虚弱陰陽澀滯尋之似有舉之全無前虚後實來而不往如刀刮竹皮之狀濇者不快之貎曰濇濇主氣怯精寒不能自禁及女人胎氣不安敗血不止寸濇胃中積冷食不能轉關濇主榮氣散失不充肌肉尺濇丹田積冷夜夢遺精女人敗血胎中冷痛遲重欲㝷來隠隠遲者陰也主隂勝陽衰指下重手乃得由陰絡透於陽絡陽氣不來陰氣獨上而榮衛凝滯血氣痞澀故指下按之隠隠而來一息間三至曰遲主四肢厥冷體重惡寒寸遲心寒時戰闗遲肚中冷痛增寒尺遲腰重體寒便泄伏潛骨重似來時伏者陰也主三陰毒氣伏於三陽關格閉塞之候指下㝷之似有呼吸定息全無再再不離其所骨間隠隐而來凑指復去其力不能接至肌骨下乃得之曰伏主毒閉塞四肢血氣不能相交而渾身沉重手足厥冷寸伏積冷毒氣灌胸關伏主膓間積冷閉塞尺伏虚冷水氣伏結不消小腸膨冷痛濡湊指邊還怯怯濡者陰也主榮中怯而衛氣虚指下按之似有再再還來湊指欲按依然却去往來軟大曰濡主少氣乏力目昏耳鳴下部虚冷寸濡主肝虚心煩闗濡氣虚精神恍惚尺濡惡寒冷汗體倦弱按輕綿重不知弱者陰也主虚氣攻表指下尋之輕手乃得重手稍無往來無力自至乃去輕手若按輕綿之狀曰弱主虚邪上攻血氣困乏少人憂老人稍順寸弱糓氣虚弱食不能消闗弱氣多虚尺弱腎臟風攻損皮膚左右皆主筋痿也八裏病脉㣲爲虚爲弱為衂爲嘔為泄爲亡汗為拘急㣲弱為少氣為中寒沉爲在裏爲實爲水為寒爲喘爲癥沉𦂳為上熱下冷沉重而直前絶者為瘀血沉血而中散為寒食成瘕沉重不至寸徘徊絶者爲遁尸沉遲爲痼冷沉重爲傷暑發熱沉𦂳為懸飲緩爲在下爲風為寒為弱爲痺為疼爲不仁爲氣不足爲眩暈緩而滑為熱中緩而遲虚寒相搏食冷則咽痛濇為少氣血爲亡汗爲氣不足爲逆冷為下痢為心痛濇𦂳為痺爲寒濕遲爲寒爲痛遲而濇為癥瘕咽酸伏爲霍亂爲疝瘕爲水氣爲溏洩為停痰爲宿食爲諸氣上衝爲惡膿貫肌濡爲虚爲痺為自汗爲氣弱爲小便難濡而弱爲内熱外冷自汗弱爲虚爲風熱爲自汗八裏脉名一㣲者陰盛陽衰氣虚怯弱之候其脉之狀指下尋之往來甚㣲再再尋之若有若無細細如絲故謂之㣲夫陽因而上衛外者也人之所以輔衛於一體運行於四肢者陽氣而已平旦人氣生日中而陽氣隆日下而陽氣已虚氣門乃閉是故暮而收拒無擾筋骨無見霧露反此三時形乃困薄茍爲煩勞擾動則煎厥由生大怒而傷不下行血菀於上使人薄厥皆陽氣之傷也㣲脉之胗由陽道衰羸氣欠而逆虚寒之極爾故主敗血不止漏下便數體重腰疼面無光澤諸證生焉二沉者陰氣厥逆陽氣不舒之候沉與浮相對浮以陽邪所勝血氣發越而在外故爲陽主表沉以陰邪所勝血氣困滯而不振故為陰主裏沉脉之狀指下尋之似有舉之全無緩度三闗狀如爛綿或者謂沉與伏相類然沉者但沉而已未至於伏也所謂伏者潛伏之謂固有閉匿者矣沉則異於是但血氣羸弱而不自振故其脉來不能透於膚但按之至骨肉則有餘也且氣之在人壯則形體强盛衰則形體羸弱惟人不知所以貴其生而晝則醇酒淋其骨髓夜則房室輸其氣血六滛外賊七情内擾於是真陽凋瘁榮衛耗極百病俱生率原於此三緩者衛氣有餘榮氣不足之候血流據氣氣動依血二者相資不得相失緩者乃榮中不流衛氣獨行不相續接故其脉來之且順去之且遲舉之且散徐徐然不能甚有力透於膚表故曰緩緩應之象主脾者土也以緩爲正扁鵲云脉如九菽之重與肌肉相得者脾部也其爲緩可知矣然脾之緩乃爲常者其緩在中故也至於十二經診見之則異於是蓋血以氣為先氣以血為從今氣獨行而血凝泣則偏陽獨勝而衛壅矣脉之緩者原此烏得不為之病乎或難之曰緩之與遲二脉幾數何以辨之予曰緩脉大而慢遲脉小而衰緩者衛有餘而榮不足遲者陰氣盛而陽氣衰二診不侔當明察焉四濇者陽盛陰虚之候敷而施之陽之正也歛而濇之陰之正也脉有陰陽適平則血氣不至於相勝是為平人今也陽氣有餘陰氣則虚乏陰不能和陽其血既欠歛而濇之非濇之正也是以為陰之病内經曰濇者陽氣有餘滑者陰氣有餘千金云脉滑者多血少氣脉濇者多氣少血以二經義考之陰餘而滑爲氣欠陽餘而濇則為血欠氣欠則血有餘故滑脉之來流利而且圓血欠則氣有餘故濇脉之來艱澀而且散濇與滑相對故兼取而論之無求子云濇細而遲往來難時一止余居士喻濇脉如刀刮竹皮之狀誠得五遲者陰盛陽衰之候由陰絡透於陽絡陽氣不下陰氣獨上因而榮衛凝澀血氣痞齟故其脉指下尋之重手乃得一息之間隠隠而來三至而已是謂遲也夫呼吸定息脉來五至平人之常今一息三至榮衛之行僅得漏水之半而已遲孰甚焉此無他由心氣不交於腎故也葢心腎之相為氣液猶陰陽之相為寒暑日月之相爲晝夜者也今也陰氣獨上陽氣不下交腎氣虚并則元臟不能獨舒三焦之路閉塞榮衛何自而流通脉行之所以遲者職由於此其為病必冷汗肢節痛肌膚黑瘦體寒腹痛重覆不煖六伏者陰毒之氣伏於陽絡關膈閉塞之候指下尋之似有呼吸定息全無再再尋之不離其部於骨間隠隠而來湊指復去有力不能上於肌肉則無至骨節則見所以然者由毒氣閉塞三關不利故四肢厥冷血榮氣衛凝結而脉為之伏也七濡者榮怯衛虚之候夫血榮氣衛相隨以行流注於一身其晝夜之有經不可失也今榮中怯弱衛氣缺乏自經絡逹於皮膚無以與之為流通則脉行之道濡而不進故指下尋之似有按之依前却去曰濡昔人喻如按水中帛誠得之凡診見濡脉皆為血氣虚弱之候歌曰濡而不進爲濡脉虚軟如按水中帛血榮氣衛總皆虛三部逢之皆病亟八弱者虛氣攻表之候故其脉見於膚表狀如爛綿輕手乃得重按即無怏怏不能前進又如浮漚之勢近手稍按則無矣凡見弱脉皆爲虚氣攻表陰絶之候及婦人新産客風面腫論八裏脉變例濟生㧞粹云夫八裏脉者乃右手三部寸闗尺受邪者也陽乗陰也是㣲沉緩濇遲伏濡弱八裏脉也有裏之表乃三陰經絡緫稱標之名也有裏之裏者乃三陰之本脾腎肝緫稱之名也且三陰標者為陰中之陽本者爲陰中陰也盛則歸於胃土乃邪染有形故裏之表是陰中之陽當漬形以為汗宜發之主宜緩裏之裏是陰中之陰分也當急下之客宜急是知諸中客邪當急諸主自病當緩前説七表乃春夏具三陽之説八裏乃秋冬具三陰當推移所在主客相合脉證依緩急治之假令惡寒者裏之表也當與麻黄附子細辛湯緩發之是漬形以形也如有不惡風寒而反欲去衣身凉面目赤四肢逆數日不大便小便赤澀引飲身靜重如山讝語昏冐脉沉細而疾數者是足少陰經反受火邪也是裏之裏病乃陰中之陰陽邪也此客邪當急下去之以大承氣湯除之仲景桂枝脉得麻黄證或麻黄得桂枝證遞用麻黄桂枝各半湯如桂枝證二停麻黄證一停當用桂枝二麻黄一湯法或麻黄證二停桂枝脉一停當用麻黄二桂枝一湯法或麻黄脉桂枝證取脉為主脉便為二停證爲一停用麻黄二桂枝一湯治之或桂枝脉麻黄證亦脉爲二停證作一停用桂枝二麻黄一湯治之大抵聖人謂脉者司人之命故以脉為主多從脉而少從證也舉此脉證交互二法是不合全從於脉亦不合不從於證如合證當兩取之如證交變法中只合從脉不從證也然亦不拘亦當臨時消息傳受逆從元證来理所投去處及天之時令且七表有下者為内外皆陽緩下入裏有汗者爲内外皆陰緩汗七表有汗者爲外陽而内陰急汗八裏有下者爲内陽而外陰急下故素問説標本之化立四制之法爲此説也八裏脉主治雲岐子曰八裏脉者乃右手三部寸關尺受之此八裏脉乃客邪之脉主位之脉三部主脉寸濇闗緩尺數是也此皆主隨客變也一㣲者陰也主敗血不止面色無光㣲脉發象秋冬在陰為慘陰太過陽不及是血不能守水勝火也血不止者治之以香芎湯香附子一兩半白芍藥當歸各一兩芎半兩右為粗末水煎一盞食前服指下尋之有若無漩之敗血小腸虚崩中日久爲白帶痛下多時骨髓枯此腎氣有餘命門不足當補命門命門者男子藏精女子繫胞崩中白帶者命門敗也經水崩中謂之骨已枯治婦人伏龍肝散主之是為血不能守水勝火也血去精亡筋骨皆損陰成形養血補虚宜當歸芍藥湯當歸白芍藥熟地黄各一兩乾薑半両右㕮咀水煎一盞食前服㣲脉關前氣上侵陽虚内氣上衝冷則生氣主脉濇客脉㣲濇㣲相合逆氣上侵可用膈氣散主之㣲在上焦又云肺氣上衝當以補肺散主之又治勞𠻳阿膠一両半甘草三錢黍粘子二錢半馬兜鈴半両炒杏仁去皮尖十箇右爲麄末水煎半盞食後温服加糯米煎更妙又均氣散治不足當關欝結氣排心主脉緩客脉㣲緩㣲相合太陰虚痞均氣散主之補肺散亦可㣲在中焦尺部見之臍下積身寒飲水即呻吟主脉數客脉㣲數㣲相合陰盛陽虚治之以二氣丹㣲在下焦又云脉㣲飲水呻吟者陽虚也治之以八味丸呻吟者困重形于外也一沉者陰也主氣脹兩脇手足時冷虚氣冲心悶而不痛乃曰虚痞健胃建中湯理中湯是也手足冷治之以八物湯當歸白术人參乾薑各一兩附子炮去皮白芍藥桂各半両丁香三錢右㕮咀水煎一盞不拘時服按之似有舉還無氣滿三焦臟腑虚冷氣不調三部壅通腸健胃始能除沉者隂也壅者虚結也言通腸者温也局方温白丸主之健胃者以理中湯主之寸脉沉兮胸有痰主脉濇客脉沉濇沉相合留滯胸中變為痰治化痰玉壺丸中加雄黄或半夏丸半夏一両湯洗雄黄三錢别研右爲末生薑汁糊丸如梧桐子大毎服三十丸至五十丸生薑湯下沉在上焦當關氣短痛難堪主脉緩客脉沉緩沉相合胃中有寒即痛可以九痛丸或橘皮半夏湯陳橘皮去白三兩半夏製枳殻炒各一兩白术茯苓桂各半両右㕮咀每服一両生薑七片水煎食前服沉在中焦若在尺中腰脚重小便稠數色如泔主脉數客脉沉數沉相合客勝主也寒氣有餘命門三焦敗而虚故小便如泔八味丸中加桂附治之一法用黄耆丸主之沉在下焦三緩者陰也主四肢煩滿氣促不安證在太陽風傷衛當服桂枝湯一云主四肢煩滿氣促不安枳术湯主之白术枳實麩炒甘草各半両右㕮咀入生薑七片水煎半盞食後溫服來往尋之狀若遲腎間生氣耳鳴時邪風積氣來衝背腦後三鍼痛即移太陽中風脉緩頸項强急不得側可鍼風池風府浮白穴則痛移也用桂枝湯主之若緩大者屬脾緩脉關前搐項筋主脉濇客脉緩濇緩相合風邪傷衛項筋𦂳急可用桂枝湯不已葛根湯主之或羌活湯緩在上焦羌活升麻黄芩葛根石膏各一両麻黄去莭湯浸去黄汁焙防風藁本蔓荆子細辛各半両右㕮咀每服一両入生薑七片水煎温服無時當關氣結腹難伸主脉客脉俱緩脾濕大勝胃中大虚七氣湯主之半夏製一兩人參官桂甘草炙各半両右㕮咀每服一両入生薑七片水煎温服無時不已復煎蒼术四両去皮泔浸水一碗煎取二大盞去滓入桂枝白芍藥茯苓各二錢再煎取一盞服不已再服或建中湯主之腹難伸者局方温白丸主之緩在中焦尺上若逢癥冷結夜間常夢鬼隨人主脉數客脉緩數緩相合反爲寒病宜桂枝加乾薑湯治之桂枝一両白芍藥乾薑各半両炙甘草四錢右爲㕮咀加生薑棗煎不已用半硫丸緩在下焦夢鬼者三焦虚氣神不守故也白芍藥一云白术四濇者陰也主通身疼痛女子有孕胎痛無孕敗血為病濇脉如刀刮竹行丈夫有此號傷精婦人有孕胎中痛無孕還須敗血成主亡血失精婦人孕病或帶下赤白或敗血聖惠方烏金散治敗血局方四物湯地黄丸失精權道藥龍骨丸主之龍骨苦楝子各二兩右為細末醋糊丸梧桐子大空心溫酒下五十丸又云亡血失精半産漏下俱宜用酒煮當歸丸濇脉關前胃氣并濇脉見處氣血俱傷金有餘損傷萬物主脉與客脉俱濇是也金有餘故并於上治之以匀氣散或利膈丸桔梗湯濇在上焦桔梗一兩半夏製半両陳皮三両厚朴一両枳實麩炒半両右㕮咀每服半兩食後水煎生薑服當闗血散不能停主脉緩客脉濇緩濇相合故曰血散可用溫經丸如胃不和調中丸濇在中焦尺部如斯逢逆冷體寒臍下作雷鳴主脉數客脉濇數濇相合陽氣内虚陰氣有餘故為逆冷治之以蓽澄茄散或五補丸選用之濇在下焦人參茯苓地骨皮熟地黄牛膝去苖酒浸各一両右蜜丸如桐子大毎服三十丸溫酒下空心稍增至五十丸服至十日及半月覺氣壅即服七宣丸經數日覺氣散即服五補丸凡人所疾皆因風不宣散即成壅緩熱風若氣不流行即成痃癖冷氣轉生諸疾尋其本由都爲不閑将理覺虛則補覺壅則宣常須五補七宣必相兼服之久服可去百病也五遲者陰也主腎虚不安五遲本土也遲脉人逢狀且難遇其季夏不能痊遲者陰也季夏陽也此證爲失時反候陽盛陰虚治之宜瀉心肺補腎肝瀉心者導赤散補腎者地黄丸神功診着知時候道是脾來水必乾季夏見遲脉是土尅水也故不能痊寸口脉遲心上寒主脉濇客脉遲濇遲相合主陰盛之故爲心上寒治之以橘皮丸不已术附湯白术附子炮去皮臍乾薑炮桂各一両右㕮咀煎一盞食前服遲在上焦當關腹痛飲漿難主脉緩客脉遲緩遲相合腹中痛甚桂枝加附子湯桂附子炮各一両甘草三錢半右㕮咀煎服或理中丸脉廽以消食丸遲在中焦流入尺中腰脚重厚衣重覆也嫌單主脉數客脉遲數遲相合水能尅火陰氣盛可用附子理中丸遲在下焦六伏者陰也主毒氣閉塞三關四肢沉重手足自冷主伏脉伏行於筋下氣伏於内陰毒伏氣切三焦不動榮家氣不調不問春秋與冬夏徐徐發汗治能消經曰清形以爲汗麻黄附子細辛湯或秋冬以升麻湯春夏以麻黄湯當緩與之陰盛陽虚汗之則愈積氣胸中寸脉伏主脉濇客脉伏濇伏相合主胸中積氣治之沉香丸或加減溫白丸伏在上焦濁氣在上則生䐜脹當關腸癖常瞑目主脉緩客脉伏緩伏相合主中焦伏而不散乃風濕之氣故腸癖瞑目治以五膈寛中散白荳蔲一両縮砂仁青皮陳皮去白丁香各二両厚朴製八両甘草炙木香各一両半香附子炒八両右爲極細末每服三錢白湯㸃服無時清上實下如發之用羌活前藥不已然後用此伏在中焦一云血散則膓癖不散則瞑目尺部見之食不消坐卧非安還破腹主脉數客脉伏數伏相合邪勝寒之甚而不能化食故破腹坐卧不安治之以生薑棗湯一名四白湯白术一両黄耆茯苓白芍藥各半両右爲麄末毎服半両入生姜煎服不已養脾丸伏在下焦清氣在下則生飱泄臟不藏矣七濡者陰也主少力五心煩熱腦轉耳鳴下元極冷按之似有舉還無髓海丹田定已枯四體骨蒸勞熱甚臟腑終傳命必殂髓者腎之四體骨蒸者腎氣衰絶終傳者七傳也土來尅水必殂也濡脉闗前人足汗主脉濇客脉濡濇濡相合肺氣虚也而衛不能固於榮故多汗桂枝湯主之濡在上焦當關氣少精神散主脉緩客脉濡緩濡相合精神散失乃氣衰也治以定志丸或四君子湯加茯神濡在中焦至此難治也尺部綿綿即惡寒骨與肉疎都不管主脉數客脉濡數濡相合主骨痿不能起於床五損至骨俱盡故不治八弱者陰也主氣居於表生産後客風面腫氣弱多傷也三關怏怏不能前只爲風邪與氣連年少得此須憂重老弱逢之病却痊脉若爛綿者陽氣弱也以應秋毛之脉氣弱多傷怏怏者輕手乃得不前者重手稍無是也少年得此須憂重者乃春夏也此時當洪大而有力今反無力而不前故憂其重也是春夏爲逆秋冬為順老弱逢之病却痊老弱者秋冬也秋冬脉當浮毛故爲順關前弱脉陽道虚主脉濇客脉弱濇弱相合陽氣虚也治之以五補丸為久補四逆湯急治之關中有此氣多踈主脉緩客脉弱緩弱相合胃氣内虚故氣多疎散治之以益黄散平胃散選用之弱在中焦若在尺中陰氣絶酸疼引變上皮膚主脉數客脉弱數弱相合主下部損腎氣内絶既陰絶陽盛疼引於皮膚是三焦無陰鎮撫陽離其原也氣已損於肺無法可治也普濟方卷三
