body:
  text: 普濟方卷三十六明周王朱橚撰胃腑門胃反附論夫寸緊尺澀其人胷滿不能食而吐吐止者為下之故不能食設言未止者此為胃反故尺為之微澀差跌陽脈浮而澀浮即為虚澀傷脾脾傷而不治磨朝食暮吐暮食朝吐宿榖不化名胃反趺陽脈緊而澀其病難治翻胃者始則由七情氣鬱而生澁及飲食生冷喜啖炙􅘤饑飽不時傷損脾胃脾之中州不能磨化水榖胃之下口不能宣達於闗門秘别之所以致氣復回升飲食而反治之之法須當運化米榖為先漙洩胃之下口使氣得下達隨引米榖下透於小腸則止不吐矣翻胃者本乎胃寒食物嘔吐胃不受納言胃口翻也多因氣先逆食酒過傷或積風寒或因憂思悒怏或因憤怒抑鬱宿滯病症積聚冷痰動擾脾胃不能消磨榖食致成斯疾原其所由女人得之多由血氣虚損男子得之多因下元冷憊有終食而便吐者有食乆而後翻者受病既異醫療宜審如玉浮丸胃丹等藥及入藥靈砂丁附散之類皆可對證選而用之翻胃之症其初也未有不由五噎五膈而始者五噎五膈者喜怒不常憂思勞役驚恐無時七情傷於脾胃鬱而生痰痰與氣搏升而不降飲食不下蓋氣留於咽嗌者為五噎結於胷膈者為五膈治療之法當順氣化痰温脾養胃乆而不治則氣體虚弱脾胃冷絶致成翻胃食罷即反或一日一夜而反至此亦甚危矣非硇砂墜氣化痰兼以剛劑暖胃不能以療此症如水榖並不能下方便集中一方用丁香附子為末於掌心䑛喫亦一法也如趺陽脈緊而濇者為難治之證又有下虚之人氣上控膈令人心下絮滿痞急肌中苦痛緩急如刺不得俯仰名曰胷痞其證類乎五膈又當以嚴氏瓜菜蒌實丸治之臨證又宜詳審方胃丹出永類鈐方硃砂稟太隂之精不經火煅以丁附等脾藥隂煉成丹平補不僭善治真陽衰虚心火怯弱不養脾土冲和失布中州虚寒飲食不進胷膈痞塞或不食而脹滿或已食而不消痰逆惡心翻胃吐食臟氣虚寒米榖不化心腹時絞痛洩利不止應是一切脾胃諸疾不問男子婦人可服之硃砂揀大塊者五十兩新羅人參肉豆蔲麵裹煨縮砂仁蓽澄茄白豆蔲紅豆蔲髙良薑剉炒白术厚朴薑汁炙炒胡椒益智仁麥門冬去心草果仁橘紅丁香不見火藿香葉五味子乾薑各四兩炮去土附子四兩炮去皮臍右各如法修製剉以鍋一口用白砂蜜五觔將藥一半同蜜拌勻入銀鍋以夾生絹袋盛貯硃砂懸袋入銀鍋内以桑柴火重湯煮四日四夜換蜜五觔入煎藥一半和勻再煮三日三夜取砂淘淨焙乾入乳鉢用玉鎚研直候十分細米粉為丸如菉豆大隂乾每服十粒加至十五粒空心食前用人參湯下棗湯亦得如或嘔吐用淡薑湯下忌食猪羊肉玉浮丸永類鈐方治男子婦人脾胃虚弱一切嘔吐及患新翻胃不問得病之由皆可服之真良方也人參白殭蠶炒去絲白术乾薑炮丁香肉豆蔲麵裹煨橘紅白豆蔲仁麥蘖炒附子炮去皮臍木香南星炮㯽榔半夏湯炮七次甘草炙各等分右為末每服用生麵一錢和勻生薑自然汁溲丸梧桐子大入百沸湯煮令浮極和丸藥用淡薑湯下不拘時病甚者不過三服惡熱藥者去附子大便秘者去肉豆􅅳奪命回生散治五膈五噎翻胃嘔吐不進飲食方見膈噎門膈噎類治胃翻朝食暮吐食訖腹中刺痛此由久冷橘皮三兩甘草厚朴茯苓桂心細辛杏仁竹皮各二兩㯽榔十枚前胡八兩生薑五兩人參右㕮咀水一斗三升煮取三升分三服一方有柑皮二兩丁香餅治脾胃虚寒痰逆嘔吐飲食減少十膈五噎反胃惡心並皆治之丁香木香各一兩人參三錢蓽澄茄三錢白豆蔲肉豆蔲半夏麯神麴各半兩白术陳皮各一兩半甘草二錢右為末生薑汁煮糊作餅子棊子大每服一餅細嚼生薑湯空心下治胃反吐逆不消食吐不止人參澤㵼桂心茯苓四兩橘皮甘草黄耆各三兩大黄一兩半生薑八兩半夏一升麥門冬三升右㕮咀水一斗二升煮取三升二合一服八合日三夜一羸人六合已利去大黄養胃湯出醫方大成治脾胃虚冷不思飲食翻胃嘔吐白豆蔲仁人參丁香縮砂肉豆蔲附子炮粉草炙沉香橘皮麥牙麥麴各二錢半右為末薑鹽湯下每服三錢哽生散治反胃吐食丁香半兩木香二錢半官桂心二分半人參神麴各二分半川芎七錢半訶子七個巴豆十四粒水浸一宿如泥草果仁二個廣茂七分半右除巴豆外並生用為極細末入巴豆泥和勻磁器内盛貯宻封之此藥過臘月半辰時不見火方合藥以至來年夏至後方可用服每服用一銅錢半匕令病人男左女右置藥米湯調成稀糊以舌餂之少時復用細米粥湯壓之病多年可服二服病淺一服修合不見雞犬婦人忌生冷硬物油膩濕麵鹽醋等物止服白粥百日孕婦不可服萆撥丸出危氏方治反胃吐酸水心胸壅悶萆撥木香乾薑炮枳殻去瓤麩炒㯽榔各半兩剉碎縮砂仁訶梨勒皮煨白茯苓去黒皮人參各三錢右為末煉蜜為丸梧桐子大每服二十丸生薑湯下安脾散出醫方集成治胃氣先由飲食過度或憂思蓄怒宿食痼癖積冷痰動擾脾胃不能消磨榖食致成斯疾女人得之多由血氣虚損男子得之多因下元冷憊有食罷疾吐有朝食暮吐暮食朝吐所吐酸臭味或吐黄水凡有斯疾乃是脾敗惟當速療遲則發煩渇大便秘水可飲餘悉不得入口不旋踵斃矣髙良薑一兩百年壁上土三合敲碎用水二碗煮乾薄切成片南木香胡椒草果麵裹煨去殻白茯苓白术丁香懷乾陳橘皮湯浸去瓤人參各半兩去蘆甘草一兩半炙右為末每服二錢食前米飲下鹽㸃酒亦得甲申之春以事至臨安寓止木家橋詹翁年六十餘苦翻胃危殆已治棺在床側適余有宣司之辟往别而去時詹翁已不能言及十一月自淮上歸過其門意此翁已不存為之慘然方訪間而此翁已出迎揖見其顔色極紅潤甚驚異之問其所以乃云有一川官來歇得藥數服遂無事其後得此方以之治人皆效丁香煮散出和濟方治脾臟伏冷胃脘受寒胸膈痞悶心腹刺痛痰逆惡心寒𠻳中滿臟腑虚滑飲食減少翻胃上逆四肢逆冷但是沉寒痼冷無問乆新功效不可具述方見脾臟門脾胃虚冷水榖不化類治反胃前胡生薑各四兩阿膠一兩大麻仁五合橘皮三兩桂心三寸甘草五寸大棗十枚呉茱萸四合右㕮咀水三升酒二升煮取一升七合分二服鹽衮丸出危氏方治翻胃膈氣丁香木香肉豆蔲縮砂青皮陳皮胡椒蓽撥沉香各半兩右為末以大蒜瓣子不拘多少每瓣作二片入去殻巴豆一粒用餅藥調麵裹蒜瓣慢火煨熟取去巴豆及麵只將蒜研成膏將前項藥末一半搜和丸梧桐子大每服三十丸於鹽内滚過煎蘿蔔湯調前藥二錢吞下神效人參湯出聖濟總錄治胃反食下便吐人參澤㵼甘草炙桂去粗皮大黄各二兩剉炒陳橘皮湯浸去白切焙乾薑各一兩炮赤茯苓四兩去黒皮青竹茹三兩右㕮咀每服五錢水二盞去滓温服日三夜一丹砂丸出聖濟總錄治反胃吐食日乆不止大腸結燥丹砂研鉛丹研陳橘皮各半兩去白炒半夏湯浸七次去滑炒厚朴去麄皮薑汁炙麥蘖炒陳麵焙代赭各一兩煆皂莢去皮子炙取半兩右為末和勻糊丸梧桐子大每服二十丸空心日午臥時用温酒下米飲亦得藿香湯治心虚滿飲食不入時時嘔吐抑鬱短氣或大病將理未復胃氣無以養日漸羸弱反胃藿香人參桂桔梗木香白术各半兩茯苓半兩枇杷葉十片去毛半夏一兩湯洗用薑十製右㕮咀每服五錢水二盞入薑皮一分煎七分去滓食前服之沉香透膈丸出徳生堂治反胃吐食一切膈氣噎氣只三服見效如三服不見效不可治之丁香沉香木香各一兩粉霜半兩硇砂三錢巴豆四十九個大者去油麝香一錢信二錢用錫炒去錫硃砂五錢右為末酒糊丸粟米大每服十五丸病輕者七丸冷薑湯送下加味薑附湯治逺年近日翻胃嘔吐全不進飲食大附子一個一兩已上者炮分四破生薑一觔取自然汁於銚内慢煮附子至乾後焙丁香胡椒各半兩木香蓽澄茄各二錢沉香三錢甘草三錢炙乾􅄳糟半觔生薑五兩同搗爛作餅焙乾右為末每服二錢燒鹽少許米湯㸃空心服藿香丸出聖濟總錄治反胃吐逆虚氣上攻疼腹痛多吐酸水藿香葉木香各一兩半夏二兩湯洗去滑丁香㯽榔各三錢剉白术一兩蓽澄茄紅豆蔲各半兩去皮右為末酒煮麵糊丸梧桐子大每服二十丸橘湯無時下橘皮湯出聖濟總錄治脾虚胃反食下即吐陳橘皮湯洗去白焙人參甘草炙剉澤㵼各一兩赤茯苓去黒皮乾薑炮裂桂去粗皮各一兩半青竹茹二兩右㕮咀每服四錢水一盞半煎至七分去滓温服不拘時通膈湯出聖濟總錄治反胃不下食昆布洗去醎水白术各一兩丁香㯽榔煨剉訶梨勒皮木香半夏各三兩湯洗七次炒大黄剉研炒半兩右㕮咀每服三錢水一盞生薑三片煎六分去滓温服廢食則吐或朝食夜吐名曰反胃或氣噎不飲食數年羸消唯飲水亦同此方病源失療榮衛俱虚血氣不足停水積飲在於胃管則臟冷臟冷而脾不磨脾不磨則宿榖不化其氣逆而成胃反也則朝食暮吐暮食朝吐心下牢大如盆盃往來寒熱甚者食已則吐其脈緊而弦緊則為寒弦則為虚虚寒相搏故食已則吐名為反胃也半夏六兩剉去皮湯洗人參三兩生薑一兩橘皮二兩牛涎一升舂杵頭糠一升綿裹厚朴二兩羚羊角三兩右㕮咀木八升煮取三升分温三服相去十里乆欲頻服者可至三劑半夏飲子治飲食吐逆或水榖不化此為胃反半夏八分湯洗去滑盡厚朴炙人參白术各四兩粳米兩合橘皮四分京棗七枚生薑七片切右㕮咀水二大升煎取一升去滓分温四服空肚服二服忌羊肉湯安中散治逺年近日脾疼翻胃口吐酸水寒邪之氣留於内停積不消胷膈脹滿攻刺腹脇惡心嘔逆面黄肌瘦四肢倦怠又治婦人血氣刺痛小腹連腰攻疰重痛𤣥胡索去皮良薑油炒乾薑炮茴香炒肉桂各五兩牡蠣四兩煅甘草十兩炒右為末每服二錢熱酒調下婦人淡醋湯調不飲酒鹽湯下不拘時呉茱萸丸一名茱萸礜石丸治年深膈氣翻胃飲食之物至晩皆吐悉皆生存不化膈上常有痰涎時嘔血胷中多滿口吐清水無時夜吐輒至曉日漸羸瘦腹中痛楚時復冷滑或閉結出衛生家寳方呉茱萸三兩瓦上炒胡椒人參當歸各半兩剉焙白礬半兩燒存性甘草半兩一半生用一半紙裹五七重醋浸令透火内慢煨乾又復如此七次半夏一兩用生薑四兩研洗沙鑵子内薑汁幷水煮候劈破看存二分白心取半夏細研為膏右為末以半夏膏和丸如稍硬添薑汁丸梧桐子大每七丸桑栁枝各三十莖銀器内煎湯吞下日三服忌諸毒物惟可食油煎猪􅏬脾軟飲一方無白礬石半兩以鹽泥固濟之火養三日次用猛火煅通赤去火毒研令無聲人參厚朴湯出聖濟總錄治胃氣虚弱停飲相擊發為虚脹其氣逆上食已反出人參厚朴去麄皮薑汁炙透熱半夏湯洗去滑薑汁製炒桂各二兩去粗皮陳橘皮去白炒甘草炙剉白术各一兩右㕮咀分作十貼每貼水二盞生薑半分拍破用煎取一盞去滓空心頓服鉛丹丸出聖濟總錄治乆積痰壅胃反嘔逆不下食鉛丹半夏各一兩湯洗去滑七遍山芋人參各三錢乾薑陳橘皮各半兩湯洗去白焙甘草一錢炙右為末研勻湯浸蒸餅丸梧桐子大每服二十丸人參湯下參桂湯出聖濟總錄治胃嘔吐不止妨於飲食人參桂去麄皮澤㵼甘草各三兩炙剉陳橘皮湯浸去白焙麥門冬各二兩去心焙半夏一兩湯洗滑薑汁製炒右㕮咀每服五錢生薑一棗大拍破水一盞半煎八分去滓温服不拘時日三五服治胃反朝食暮吐食訖胷腹中刺痛此由乆冷橘皮三兩白术人參各二兩蜀椒二百二十粒桂心一兩韭白一把右㕮咀水二升浸一宿内羊肚中縫合以三升水煮水