砂一兩丁香木香胡椒各半錢右為末棗肉杵丸如菉豆大每服六十丸薑湯下清膈散出衛生家寳方治熱翻胃吐食蟬退五十個去盡土用滑石一兩右為末水半盞調藥一盞去水用蜜一匙調下不拘時候服黄附丸出衛生家寳方治翻胃嘔吐附子炮去皮臍尖右為末糊丸如梧桐子大以大黄為衣每服十丸温水下竹葉湯出衛生家寳方治熱吐翻胃及傷寒遍身發熱冷吐亦宜服之竹葉半觔白茯苓一兩剉真珠小半夏一兩洗生薑四兩切右以水十碗煎一碗去滓俟温不計時候服每服一盞連服亦可硫黄丸出衛生家寳方治膈氣翻胃不進飲食醋衣半兩乾者陳丁香木香半兩石菖蒲半兩青皮半兩去白硫黄半兩研右為末酒糊丸彈子大每服一丸細嚼米飲下後用煨鯽魚米醋蘸食之次以油餅壓下黒白附子丸出衛生家寳方治翻胃白附子黒附子炮去皮白术白茯苓右各等分為末麵糊為丸如梧桐子大蚌粉為衣每服三十丸用麻油於手心内磨動次滴水和油吞下少時便喫粥一小碗即吐吐止可服補胃藥隨老少神效厚朴丸保生集方治反胃吐逆飲食噎塞氣上衝心腹中諸疾加法在後烏頭減半更妙厚朴二兩半黄連二兩半紫苑去土苖呉茱萸湯洗十次菖蒲柴胡去苖桔梗皂角去皮胘子炙茯苓去皮官桂刮乾薑已上各二兩炮人參二兩巴豆霜一兩蜀椒去目及閉口者微炒出汗二兩川烏頭二兩半炮製去皮臍右為細末入巴豆霜勻煉蜜和勻為劑旋丸桐子大每服三丸漸次加至以利為度生薑湯下食後臨臥此藥治療與局方中温白丸同及治處暑以後秋冬間臟腑下利大效春夏再加黄連二兩秋冬再加厚朴二兩計四兩治風癎病不能愈者服厚朴丸依春秋加添外乂於每料中加人參菖蒲茯苓去皮各一兩半右依前法和劑服餌治反胃又大便不通者是腸勝胃也服局方中半硫丸一二百丸如大便秘用後藥保命集方附子半兩巴豆二枚砒豆許右為極細末生薑糊為丸如菉豆大每服一丸白湯下薑桂湯朱氏集驗方治翻胃嘔吐不止白薑炮紅豆肉桂丁香粉草縮砂仁炒敗薑用灶心土炒右各半兩為細末每服一錢生薑自然汁一分沸湯調下治翻胃嘔吐良方朱氏集驗方山礬葉不以多少炮黄用黒小豆炒香田螺殻火煅右為末或酒或熱水調二三盞服之立止水煮平胃散朱氏集騐方蒼术厚朴製陳皮甘草四味各十兩棗肉半觔除核秤生薑二十兩切片子粟米一升洗以上是古本以下是加品白术茯苓茴香各二兩右以上藥作一處用文武火煮水約過藥三寸煮乾水為度火焙為末每服一錢空心鹽湯服安胃散出指南方治胃反嘔五靈脂杏核大以醋和麵裹燒令香熟去麵白茯苓一枚杏大丁香三粒硃砂五分人參木香各一分右為細末每服半錢茶清調下大白散出指南方治胃反嘔大天南星炮右為末散每服三錢水三盞生薑三片粟米一撮煎至一盞去滓温服玉蕋丸雞岑方治胃虚因吐生風白丸子金液丹各十五丸右為細末煮麵糊丸如梧桐子大每服三十丸空心米飲下胡椒湯十便良方治寒氣攻胃效騐方胡椒三十顆麝香一錢細研右搗破胡椒入麝香用酒一中盞煎至半盞稍熱服又方治翻胃嘔吐多因中脘停留寒痰冷飲凝滯而食入即吐右用薑附丁香之類煎湯吞下養正丹并來復丹或用靈砂丹來復丹末以半夏末打糊為細丸服之尤妙其效甚驗膈氣變翻胃用剪紅丸令吐淤血及蟲而食愈真方并附永類鈐方雄黄半兩木香半兩㯽榔三稜莪术煨陳皮貫衆各一兩去毛大黄春三兩秋冬月一兩乾添一兩炒煙起以上九味作末糊丸壯士可五十丸又方芫花一兩醋煮巴豆二十一粒去油甘遂一兩右為末糊丸梧桐子大候乾用紅羅包之絹線扎繫剪十叚斷一服前藥内加用一粒萬病轉湯使五更初服療疾醋炙肉嚥婦人醋湯名秦川剪紅丸氣膈服好蘇合香作丸原嚥薑汁少許喉中爆聲而愈翻胃始因膈噎所成有痰母蟲瘕非好手不能治用永類鈐方附子片一兩南星片一兩巴豆二十一粒去皮右用糯米一兩同炒色變去巴豆入乾薑丁香末各半兩同煎作末五更早掌中舌醮乾喫半錢津化仍以陳皮湯一呷送下又蘇合香丸青州白元打和同生薑合元服有翻胃噎塞煩悶諸藥不效蘆根煎湯下枳殻湯下乂真阿魏末少加外野人抛下乾糞多作末五更初薑片蘸食能起死人趙玉田傳乂翻胃吐黒汁治不食趙用蓽澄茄末米翻丸薑湯下而愈再令服平胃散三貼及薑汁調白虎丹治翻胃如神白虎丹化搗大蒜丸生料健脾丸澹寮方治嘔吐反胃脾㵼白利腸滑冷痢一切脾胃疾厚朴二兩半去粗皮生剉半夏生白豆蔲仁草果仁甘草縮砂仁各二兩右㕮咀用生薑一觔四兩細切搗碎滓汁並用同藥一處搜和令勻丸成一鷄子黄大日乾每服一丸水一盞半煎至七分去滓温食前服附子五苓散朱氏集騐方治翻胃吐食大附子一隻取空入五苓散在内炮熟右為細末用薑湯下十膈散朱氏集驗方治翻胃嘔吐老薑二大拇指大剜空中間以好子母丁香二粒在内合住濕紙煨右以十膈散嚼生薑丁香同下生胃丹朱氏集騐方此丹兆天之五氣回黄及榖生精生陽壯脾元實腎水翻胃吐食胃虚生風手足搐搦痰潮作聲乆病全不納食胃氣欲絶最能救之人參神麵炒麥蘖炒半夏各一兩榖蘖炒白术白芍藥川續斷川牛膝酒浸焙川厚朴薑汁製丁香防風各一兩半白豆蔲仁炮山藥白茯苓木香沉香各二兩香附子三兩縮砂仁二兩炒右為細末法丸如菉豆大每服一百丸用白湯吞下又方粟米七升生薑五觔取自然汁浸粟米蒸爛焙乾天南星一觔用生薑滓作餅真黄成泥包裹放慢火内煅令香熟去上焙為末青棗散朱氏𫝊驗方治脾胃泄㵼心膈膨脹疼痛不納飲食或作吐逆翻胃脾痛氣不能升降兼脾胃積冷陳皮甘草乾薑良薑各炒右等分細末每服一錢鹽湯空心㸃服薑棗煎亦得忌生冷魚腥酒猪肉動氣物只可喫鳩子雀兒猪肝肺等物硇附餅子出楊氏家藏方治翻胃吐食十膈五噎嘔逆不止心腹疼痛弱藥不下附子一枚重七錢者剜臍作一竅子研硇砂一分在内填滿將餘附子碎末塞口用生麵作餅裹之如有剰餘附子末更以一枚褁之火煨令麵焦黄為度麵不用只用硇砂附子為末木香三錢丁香三錢二味同為末右件一處拌勻麵糊為丸每一兩作二十丸􅑃作餅子每服一餅用生薑一塊如大拇指大切作兩破置藥在内濕紙裹煨令香熟和薑細嚼米飲送下不拘時候服二氣散出楊氏家藏方治隂陽痞結咽膈塞壯若梅核妨碍飲食不愈即成翻胃山梔子炒乾薑炮已上二味各一兩右件為粗末每服二錢水一盞同煎至五分去滓食後熱服透紅丸出楊氏家寳方治脾疼翻胃膈氣水㵼積痢及婦人血氣刺痛皆可服之縮砂仁一百粒杏仁一百粒去皮尖巴豆五十粒去皮膜取霜坯子膁脂一錢別研川芍一兩剉碎右為細末次入杏仁巴豆膁脂研勻湯泡雪糕糊丸如梧桐子大大人兩丸小兒丸作黍米大每服三丸脾疼石菖蒲湯下婦人血氣刺痛醋湯下翻胃膈氣丁香湯下水㵼倒流水下赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下並空心食前服治翻胃胷中痰滯出本草用甖子粟合竹瀝作粥食之大佳開胃出本草以蜆糟煮服之良治反胃吐食除心胷痰水出本草取猴薑搗汁和生薑汁服之佳治反胃出本草以甑帶煮汁服開胃及腸閉出本草以小芋極滑者煮吞之治翻胃出本草用附子一個最大者坐於磚上四面著火漸透入生薑自然汁中又休前火逼乾復淬之約生薑汁可盡半碗許搗羅為末用粟米飲下一錢不過三服差治反胃出本草以好井水及土石間新出泉飲之療反胃嘔吐無常粥飲入口即吐困弱無力垂死出本草以上黨人參二大兩拍破水一大升煮取四合乗熱服日再兼以人參汁煮粥與噉昔李直方司勲徐郎中於漢南患反胃兩日飲諸方未差遂與此方當時便定差後十餘日發入京每與名醫遇特論此藥難可為儔也調中開胃生肌令人肥白出本草以新羅榛子食之甚驗十八味丁沉透膈散出本草治翻胃十膈五噎氣膈飲食不進又治氣滯作吐丁香半兩木香半兩肉豆蔲製白豆蔲青皮麥芽各半兩人參香附子砂仁各一兩藿香陳皮去白厚朴製沉香各七錢半白术半夏製神麯草果三錢半甘草一兩半右㕮咀薑棗煎服治反胃羸弱不欲動用仙人杖煮汁服之仙人杖是竹笋欲成竹自死者色黑如漆五月收之又方用黄犍牛口中涎服之治反胃吐逆内隂下常濕且臭或作瘡用韶粉一分粉即瘥止常用大驗肘後方同治反胃吐食用小訶子日乾為末酒服方寸匕治反胃出本草取蝟皮肉調五味淹炙食之不得食骨令人瘦小普濟方巻三十六
