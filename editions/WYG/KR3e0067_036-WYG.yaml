乾為度每和白粥兩匙日進三服通胃散出經騐良方治結腸翻胃肉豆蔲雞心㯽榔各一枚胡椒四十九粒右為末每服半錢以無灰酒枳殻末少許調下空心服稀粥壓治翻胃吐逆藿香葉去土香附子各半兩去毛橘皮二錢右為末每服二錢薑三片水一盞煎六分服治翻胃吐食暑氣煩躁不食小兒嘔吐洩㵼黄色殺疳蟲進食平胃散一兩硫黄硝石各半兩右薑汁煮令乾為末同平胃散酒煮糊為丸桐子大每服二十丸米飲下六丁丸出危氏方治翻胃如神五靈脂五錢生辰砂二錢母丁香一兩不見火右為末入黄狗膽粽子尖丸鷄頭大薑米湯飲下每服一丸三十年病三兩丸止本事方香靈丸只用丁香分兩不同母丁香即丁香也沈存中筆談言之甚詳治翻胃吐食孤科蒼耳生牡蠣透骨草各等分右㕮咀每服三錢水一盞半煎七分去滓温服即用菓壓之木香湯一名定胃散治翻胃不飲食開胃和氣出十便良方木香一分剉胡椒三十一粒糯米一撮右同炒至米熟㕮咀分作五服每服用水一盞煎六分去滓温服席戎年乳媪病得此方而愈石亭脂丸治年久胃反不止石亭脂紫貝鉛各二兩鹽滷五兩右旋燒鉛煎滷中汁滓盡將鉛與石亭脂攪勻炒之或焰起即將銚子放水上焰止候勻熟水浸炊餅丸成如梧桐子大每服二十丸煎石蓮乾棗乾杮乾薑湯下礬石丸出聖濟總錄治胃虛氣逆食已反出白礬鉛丹各二兩石亭脂半兩生為末後入右先將前二味和研入乾鍋内以炭半秤漸煅令通赤為度駐少更養一夜取出細研出毒兩日乃入石亭脂同研細以粟米飯和丸如菉豆大每服米湯下十五丸田季散出聖濟總錄治乆患翻胃及小兒驚吐諸吐逆蘇内翰言如神硫黄半兩細研水銀一分與硫黄再煎無星生薑四兩取汁右同研如黒煤色每服三錢酒一盞同薑汁煎熟調藥空心服衣被蓋覆當自足指間汗出迤􅆔遍身汗徹即差常有人病反胃經三年不差消羸殆盡服藥一服汗出皆如膠腥穢不可近當日更不復吐遂差乂小兒諸吐用此藥量兒長少服一錢以約至一匙用冷水調下吐立定此散極乳難調須先滴水以指緩緩研殺稍稍増湯使令調和若傾入湯酒盡服泛不可服又烏頭煮散茱萸散皆治反胃惟田季散有隂陽理勝於二方今全載二方於後但性差熱更時量腑臟寒温用之可茱萸散出聖濟總錄治胃氣虚冷不能飲食食已即吐酸水呉茱萸湯洗七次炒乾乾薑炮製右等分為末空心熱酒調下三錢烏頭散出聖濟總錄治年深膈氣翻胃常有痰涎時時嘔吐胷中多酸水吐清水無時腹中痛楚或時秘結或時冷滑此藥主之川烏頭炮去皮川楝肉各一兩半㯽榔木香各一兩右為末每服二錢水一盞煎至七分入鹽一分温服有一婦人年深翻胃服此效􅑥粟粥法治翻胃不下食白􅑥粟米二合人參二大錢生山芋五寸長右為細切研水一升二合煮取六合入生薑汁及鹽花少許攪勻分二服不計早晩食之亦不妨别湯丸大半夏湯出肘後方治胃反嘔吐者亦治膈間痰飲半夏二升洗去滑右以水一斗二升和蜜搗之二百四十遍煮藥升半温服一升餘分再服治胃反食即吐出上氣蘆根茅根各二兩右以水四升煮取二升頓服之得下良交和散治逺年近日翻胃嘔吐全不進食嘉和散五膈寛中散右用見成局方二藥合而為一和勻每服三錢薑棗煎治丈夫婦人老少逺年日近翻胃吐食出本事方五靈脂不拘多少為末黄狗膽汁右丸如龍眼大每服一丸好酒半盞頓湯瓶頭温磨開服不止再服不過三服即效治翻胃吐食出本事方白礬二兩黄丹一兩右為末入瓦礶内煅令如蒸餅虚空取出以淨絹承於地上盆蓋一宿出火毒再為末用蒸餠丸菉豆大每服三丸至七丸空心温酒下更量老少虚實與之治逆不食及翻胃母丁香神麯炒合等分右為末稀粥調下一錢甘露湯出澹宻方治翻胃嘔吐不止飲食減少常服快利胷膈調養脾胃忺進飲食常𫝊一富人病翻胃往京口甘露寺設水陸泊舟岸下夢一僧持湯一杯與之飲罷猶記其香味便覺胷膈少快早入寺知客供湯乃是夢中所飲者胷膈尤快遂求其方修製數十服後疾遂瘥名曰觀音應夢散一友得之常以待賔易名曰甘露湯在臨汀療一小史旋愈切勿忽之乾􅄳糟六分頭醉者生薑四分和皮右拌和研爛作餠子或焙或曬乾每十兩用甘草二兩炙同研為末每服入鹽少許沸湯調無時大效散出百一選方治翻胃大田螺殻黄蜆殻二件不以多少在泥土中多年陳者尤佳各處焙成白灰右每劑用白梅肉四兩田螺蜆殻灰二兩同捜拌令勻作團用砂合子盛蓋了泥固封發頂火煅令焦黑存性取出碾細每服二錢用人參縮砂湯調下陳米亦得如無合子只用連盞兩隻相合依前法燒食前服凡覺心腹疼痛即翻胃先兆此亦能治之治翻胃吐食大雪梨一個丁香十五粒右將丁香刺入梨内用濕紙褁包四五重炭火煨熟熱服鎮脾散出聖濟總錄京三稜一兩半炮丁香三分右為末每服一盞淺沸湯㸃服不拘時雌黄丸出聖濟總錄治反胃嘔吐不止飲食不下雌黄一分研甘草半分生右為末爛飯為丸梧桐子大用五葉草糯米同煎湯下四丸小半夏丸出百一選方治翻胃不快飲食半夏湯洗十次胡椒各等分右為末薑汁丸梧桐子大每服三五十丸薑湯下正胃散半夏二兩天南星二兩右為末用水五升入罎内與藥攪勻浸一宿去清水焙乾重研令細每服水二盞藥末二錢薑三片煎至八分温服至五服效加味清金丹出指南方治清濁不分中焦氣痞若心下大如盃或時寒或時熱朝食朝吐暮食暮吐其闗脈弦而緊弦則為虚緊則為寒虚寒相搏此名為格與闗格同也是謂反胃硫黄水銀各等分右各研細不見星子為度入木香末丁香末各等分用生薑自然汁煮糊丸梧桐子大每服十丸食前米湯下蓮子散出直指方治翻胃右為末米湯乘熱調服二方寸匕患痢噤口通用治翻胃時吐水及吐食大黄四兩甘草二兩炙右㕮咀水三升煮取一升去滓分温再服如得可則兩日更服一劑健胃丁香散出徳生堂治反食嘔吐氣噎闗格不通廣木香淨全丁香各一兩右㕮咀每服四錢水一盞半煎一盞時先用好黄土和泥作成碗様一個却以藥濾去滓於土碗内食前服滓依時再煎服此方有一掾呉安之得𫝊於内壹蓋耘夫都事自得之效本堂試果騐蓋用土碗盛藥取其有生助脾土之功丁香附子散一名大掌中金出永類鈐方治反胃不納飲食服水並不得者大附子一個緊實者切去上頂用一小片留作蓋勿碎將下籖􅀈一竅丁香四十九粒右將丁香安附子竅内以小籖蓋之用線絆縳置砂銚内用生薑汁浸過附子為則慢火熬至乾取附子丁香為末和勻每調少許在掌内舌舐而喫日十數次忌毒物生冷一方以生薑入丁香如前製一方以乾薑鑽穴入丁香尤易作末倉卒嘔甚者可用若煩渇則徐食糜粥宋淳熙元年冬樞姪自瀋陽往四明過婺源義烏有野服者邑醫孫道攻療眼疾宻與之語孫曰君貴家子料必藏好方畀我一二或以為人起疾宻索秘反胃方即以受之孫喜書之於册未幾源鈐轄苦此疾危孫為亟治用此方數服愈一方麵裹煨末米飲下不過膈者薑汁蘸嚼治胃反食即吐出肘後方用粟米搗作麵和丸梔子大七枚爛煮内火中細細添之得下便巳麵亦得用之白梅丸治反胃用生硫黄將白梅研成膏丸梧桐子大每服二十丸米飲下治反胃見食即嘔噦出聖惠方羊糞用乾濕共七枚乾者碎之以童便一大盞煎至六分去滓分三服治胃反食即吐出上氣用燒自死鷄肶胵灰服男雄女雌香牛飲出危氏方治哽噎翻胃吐食用羯牛先以繩掛開口將淨布抹令口舌却拖牛舌出來後有涎出以碗乗之每服用八分盞為一服研好麝香末一捻打勻却以銀盞盪令温先以絹帛束縳中脘胃口令極緊候氣喘一二口便服服藥時先對病人說煮白粥溜慎之并煎丁香汁和粥服藥罷隨與粥喫一方老牛涎沫如棗核大置水服之終身不噎丁附散出澹療方治冷吐翻胃及喫食移時即吐緣水不勝火復還脾脾不能受即吐附子一大個煮週回鑽孔用丁香挿入孔内以麵裹煨熟去麵不用右以附子丁香為末用猪臀肉切片炙熟蘸藥末嚼下空心頓服十數片用薑汁鹽湯漸下一方不用丁香用粟米一捻北棗二個煎湯調服又方一名丁附奪命散治證同前如七情内鬱者宜蘇合香丸寛中散附子一個生薑自然汁六兩分三處用附子不去皮臍破作兩片以薑汁二兩煮候乾又破四片以薑汁二兩煮乾又破作八片用薑汁二兩煮細切焙乾入丁香二錢半同為末每服一錢以湯調服治翻胃出儒門事親用黄蘖末鯽魚散出本事方治翻胃用大鯽魚一個去腸留膽綠礬末填滿縫口以火炭炙令黄乾為末每服一錢陳米飲調下日三服大黄湯出本事方治冷涎翻胃其候於發時先流冷涎次則不食此是勞證治之不早死在旦夕用大黄一兩生薑自然汁半茶盞炙大黄令乾又淬入生薑汁中如此淬盡切焙為末每服二錢陳米一撮葱白二莖水一大盞煎七分先食葱白次服其藥不十日根絶螺泥丸出經騐良方治翻胃嘔噎用田螺不拘多少洗淨磁盆水養令吐出泥用米篩張灰於地上却將沙皮紙鋪於灰上去已養田螺令泥水漸澄清旋去上面清水却將泥傾於紙上候泥乾調丸梧桐子大每服三十丸藿香湯下立愈仍將田螺放江中如殺食之其病不安一方用爛殻燒為末服之治反胃朝食暮吐暮食朝吐旋即吐者出危氏方用甘蔗汁七升生薑汁一升相和打如粉分作三服正胃散治翻胃嘔吐藥食俱不下結腸三五日至七八日大便不通如此者必死之疾昔全州大智禪師得方於異人服之十全八九用偶有白水牛喉收取一條去兩頭節并筋膜脂肉又取下如阿膠黒片不可用須就宰牛人買下修事了臨病時旋炙條合用好米醋一大盞浸頻翻動浸冷用微火炙乾淬醋炙再炙再淬醋乾為末不見太陽火研為細末用厚紙包收或遇隂濕時月連紙包於微火上温焙之再收如有此疾每服一錢食前陳米飲調下輕者一服立效切不可專意殺牛取喉决不效非惟無益於病者且徒然有害於物且受殺牛之報收方君子見藥須收以濟人病治翻胃用木槿花煮糯米粥服之又方出百一選方用松節剉碎酒煎服之又方出百一選方用灶中土十餘年者為細末米飲調下三二錢經騐方并用炭灰又方用乾大米殻煎汁服之又方用田上細葉紫背草杜烏藥烏泡心羊右棘心酒煎服之又方出朱氏集騐方用驢小便昔有患此疾每服食餅及羮粥等項須臾吐出貞觀中許奉御兄弟柴蔣等家時稱名醫奉勑令治罄竭其術所患竟不能療漸至羸憊死絶候在朝夕忽有一衛士云服驢小便即日服二合後食唯吐一半脯又服二合人定時食粥吐即便定近至今日午時奏知之大内中五六人患翻胃同服一時俱差此藥有毒服時不可過多盛取尿及熱服二合病深七日以來服之良後來療人並愈又一方用馬莧汁飲之又方出經效濟世方用家鷄兒一個口中入硫黄令滿以新磁礶合盛用黄泥固臍火煅令存性碾為末用冷熱水調服又方出𫝊信通騐方用生薑如錢大麻油煎過為末用軟柿蘸服又方用早禾藁燒灰淋汁帶温服之令吐蓋胃中有蟲灰能殺之治翻胃及脾間諸疾腹痛洩瀉出百一選方用皺面地葱花即火杴草花也不拘多少焙乾為末蜜麵糊丸梧桐子大每服五十丸白湯送下不拘時服鉛丹丸治胃反嘔吐噦逆用黒鉛汁入紙灰以栁木槌同研成粉羅過一兩米醋一升同入砂石器内熬為膏入乾蒸餅少許搗令熟丸赤小豆大每服十丸生薑湯下或米飲下不拘時服太倉散治胃反及膈氣不下用倉米或白米遇日西時於日下水微拌濕自心