陽起石白龍骨各七分右合搗篩以酒服方寸匕日三忌猪肉冷水鯉魚蕪荑等無比山藥丸出和劑方治丈夫諸虚百損五勞七傷頭痛目眩手足逆冷或煩熱有時或冷痺䐴疼腰臗不隨飲食雖多不生肌肉或少食四體脹滿無光澤陽氣衰絶陰氣不行此藥能補經脉起陰陽安魂魄開三焦破積聚厚腸胃强筋練骨輕身明目除風去冷無所不治方見本門虚勞羸瘦類雙補丸出醫方集成治一切虛損五勞七傷面色黧黒唇口乾燥𤼵渇目暗耳鳴心忪氣短食少神倦夜夢驚恐四肢酸疼寒熱盗汗小腸拘急小便滑數婦人諸疾並宜服之常服既濟水火益氣安神鹿角霜三兩熟地黄洗再蒸沉香兎絲子酒浸蒸研焙覆盆子去枝蒂白茯苓去皮人參去蘆宣木𤓰薏苡仁炒黄耆炙蓯蓉洗酒浸五味子去皮炒石斛去根炒當歸去蘆酒浸澤㵼切塊再蒸各一兩麝香一錢别研硃砂五錢别研為末為衣右細末煉蜜為丸梧子大毎服五七十丸空心鹽湯下是齋方用熟地黄半觔補血兎絲子半觔補精細末酒糊丸人參湯下平補精血不燥不熱理下部弱腎水冷氣不順沉香湯下心氣虚茯苓湯下心氣煩躁不睡酸􅀥仁湯下腎氣動茴香湯下小便少車前子湯下小便多益智湯下黄耆益損湯出危氏方治男子婦人童男室女諸虛不足榮衞俱弱五勞七傷骨蒸潮熱腰背拘急百節酸疼夜多盗汗心常驚惕咽燥唇焦嗜卧少力肌膚瘦瘁咳𠻳多痰咯唾血絲寒熱往來煩熱神昏全不用食服熱藥則煩躁衝滿上焦進涼藥則膈滿而腹痛宜服此藥最有神效兼治大病後榮衛不調婦人産後血氣未復人參去蘆石斛去根甘草黄耆去蘆木香白术當歸肉桂茯苓芍藥半夏川芎熟地黄九蒸酒炒山藥五味子牡丹皮麥門冬去心各等分右剉散每服三錢水一盞半生薑五片􅀥二枚小麥五十粒烏梅一枚煎空心食前服薯蕷丸療丈夫五勞七傷頭痛目眩手足逆冷或煩熱有時或冷痺骨疼腰臗不隨食雖多不生肌肉或少食而脹滿體澀無光澤陽氣衰絶隂氣不行此藥能補十二經脉起發隂陽通内製外安魂定魄開三焦破積聚厚腸胃消五臟廓氣除心内伏熱彊筋壯骨輕身明目除風去冷乾薯蕷二兩蓯蓉四兩牛膝兎絲子酒漬杜仲赤石脂澤㵼乾地黄山茱萸茯苓巴㦸天去心各二兩五味子一兩五錢石膏三兩研逺志一兩去心栢子仁二兩白馬莖筋一條炙右搗篩蜜和丸如梧桐子大以酒空腹服二十丸至三十丸日再忌大酢蕪荑蒜陳臭物三仁九子丸出千金方治五勞七傷補益酸􅀥仁栢子仁薏苡仁兎絲子菊花子枸杞子蛇床子五味子蕃閭子地膚子烏麻子牡荆子乾地黄薯蕷桂心蓯蓉各一兩右為末蜜丸如梧桐子大酒服二十丸日二夜一服一方有韭子覆盆子各一兩無牡荆子菊花子覆盆子丸出千金方治五勞七傷羸瘦補益覆盆子兎絲子各二分蓯蓉鹿茸巴㦸天白龍骨茯苓天雄白石英五味子續斷薯蕷各一錢乾地黄八分蛇床子逺志六分乾薑六分右為末蜜丸如梧子大酒服十五丸日再漸漸加至三十丸慎性冷陳臭張文仲方無龍骨鹿茸天雄續斷石英有石斛白术桂心枸杞子人參栢子仁澤㵼各六分牛膝四分山茱萸五分赤石脂甘草各二分細辛四分大山芋丸出和劑方治諸虚百損五勞七傷肢體沉重骨節酸疼心中煩悸唇口乾燥面體少色情思不樂咳𠻳喘乏傷血動氣夜多異夢盗汗失精腰背强痛臍腹弦急嗜卧少起喜驚多忘飲食減少肌肉瘦瘁又治風虚頭目眩暈心神不寧及病後氣不復常漸成勞損久服補諸不足愈風氣百疾又名薯蕷丸白术麥門冬去心白芍藥杏仁去皮尖麸炒黄防風去蘆芎藭各一兩五錢大豆黄卷炒熟乾地黄肉桂去粗皮麹炒當歸酒浸各二兩五錢桔梗白茯苓去皮柴胡各一兩二錢五分乾薑炮七錢五分甘草炙七兩大􅀥一百枚蒸熟去皮白斂五錢阿膠炒人參各一兩七錢五分山芋七兩五錢右為末煉蜜與蒸􅀥同和丸如彈子大每服一丸温酒或米飲化下嚼服亦得食前常服養真氣益精補髓活血駐顔一方加琥珀一兩逺志去心炒二兩茯苓三兩五錢即是養心丹虚遺減白术加龍骨二兩四味丸治五勞七傷補益精髓熟乾地黄焙天門冬去心焙白茯苓去黒皮逺志去心各三兩右為末煉蜜和丸如梧子大每服三十丸温酒下沉麝香茸丸出瑞竹堂方治五勞百損諸虚怯精元氣不固沉香二錢麝香一錢南木香三錢乳香三錢小茴香四錢炒八角茴香四錢炒鹿茸酥炙蓮肉各五錢炒茯苓炒蓯蓉兎絲子牛膝川棟子各五錢酒浸炒地龍去土净陳皮去白各五錢仙靈脾三錢酥炙右依分兩製和為末糊入麝香為丸如桐子大每朝不見紅日面東用温酒下三十丸忌食猪羊血豆粉之類五洛散主五勞六極七傷八不足裏急胸脇脹滿背痛頭眩四肢重腰脊彊環臍腹痛小便或難或數劇者大便失血翕翕少氣手足煩熱卧不能卒起起行不能久立名内極或憂愁恐怖或飽食生肉飲酒入房自竭陽氣虚竭耳鳴烏烏甚則手足浮腫逆害飲食名曰内消大黄六分麥門冬白薇當歸乾地黄山茱萸桑螵蛸炙各七分栝蔞甘草炙茯苓各五分石斛九分六安者桂心鐡屑研厚朴炙各三分吳茱萸二分右各搗篩白蜜一觔􅀥膏一觔當蒸温湯浸之和叜踈有切前藥令如乾飯状藥悉成又别取牛膝五兩肉蓯蓉六兩附子三兩炮三物各搗下篩内諸藥和令相得以酒服之方寸七日三不知稍増之長肌肉補不足乆服益氣力若少氣力加石斛消渴加栝蔞止痛結煩裏急加芍藥腹中痛下膿血加厚朴四兩炙四肢酸疼加當歸翕翕少氣加天門冬白薇一名五若散忌海藻菘菜生葱蕪荑酢物鯉魚等鍾乳丸出聖恵方治五勞六極七傷腰疼膝痛小便餘瀝心虚健忘榮衛不調宜服鍾乳三兩石斛兎絲子酒浸一宿曝乾别搗為末各二兩甘草炙微赤剉牛膝去苗蛇床子各一兩細辛山茱萸防風去蘆頭杜仲去粗皮炙微黄剉枳殻麸炒微黄去穰各三分五味子熟乾地黄各一兩川椒五錢去目及閉口微炒去汗右為末煉蜜和搗五七百杵如梧桐子大毎服空心及晚食前温酒下三十丸内補散出千金方治男子五勞六絶其心傷者善驚妄怒無常脾傷者令人腹滿言噫食即欲卧面目痿黄肺傷者令人少精腰背痛四肢厥逆其肝傷者令人少血面黒腎傷者有積聚小腹腰背痛痺欬唾小便難六絶為病皆起於火勞脉虚外受風邪内受寒熱令手足疼痛膝以下冷腹中雷鳴時時泄痢或閉或利面目腫心憤憤不欲語惡聞人聲乾地黄兎絲子山茱萸闕各五分逺志巴㦸天各五錢麥門冬五味子甘草人參蓯蓉石斛桂心茯苓附子各一兩五錢右治下篩酒服方寸匕日三加至三七無所禁赤石脂丸出千金方治五勞七傷男子諸疾逺志栝蔞根赤石脂山茱萸各七分防風石韋各三分肉蓯蓉三分牛膝杜仲薯蕷各四分天雄栢子仁各五分蛇床子六分菖蒲續斷各三分右為末煉蜜􅀥膏和丸如梧桐子大空腹服五丸日三服十日知乆服不老加兎絲子四分佳人參湯出千金方治男子五勞七傷胸中逆滿害食乏氣嘔逆兩脇脹小腹急痛宛轉欲死調中平臟絶傷人參當歸芍藥甘草生薑麥門冬白糖桂心各二兩前胡茯苓五味子蜀椒橘皮各一兩枳實半兩大棗十五枚右㕮咀流水一斗半除􅀥浸藥半日用三年陳蘆稍煎取四升内糖復上火煎令十数沸年二十以上六十以下一服一升二十以下六十以上一服七八合雖年盛而又羸者亦服七八合日三夜一不爾藥力不接則不能救病要用撈水陳蘆不則水強火盛猛則藥力不能出也黄耆丸出千金方療虚勞黄耆鹿茸茯苓烏頭乾薑各三分乾地黄當歸桂心芎藭各四分枸杞桑皮兎絲子五味子栢子仁白术各五分大􅀥二十枚右為末蜜丸如梧桐子大平旦酒服二十丸夜十丸以知為度人參五味子散治男子老稚諸虚百損氣血勞傷涎喘咳噥或𠻳咯血寒熱往來夜有盗汗羸痩困乏一切虚損人參五味子桔梗白术白茯苓甘草炙熟地黄當歸焙各五錢地骨皮前胡去苗桑白皮切炒枳殻去穰炒黄耆陳皮柴胡去苗各三分右為麤末每服三錢水一盞半生薑三片同煎至五分去滓温服食後日三服煩渴加烏梅青蒿同煎咳膿血加知母阿膠同煎尤妙腎瀝湯療五勞六極八風十二痺補諸虛不足豬腎一箇去脂膜附子炮芎藭丹皮桂心人參當歸各四分茯苓桑螵蛸炙磁石研如粉牡荆子黄耆菖蒲各八分乾地黄六分右切以水一斗七升煑腎取一斗一升去腎内藥煎取四升分四服忌羊肉􅄳冷水酢生葱蕪荑胡荽乾地黄丸出千金方治五勞七傷六極臟腑虛弱飲食不下顔色黧黯八風所傷益血氣進食資顔色長陽五味子四分阿膠􅀥肉各八分乾地黄茯苓天雄各七分蛇床子六分桂心麥門冬各五分逺志蓯蓉杜仲甘草各一錢右為末蜜丸如梧桐子大酒下二十丸日加至三十丸常服彌佳羊肝散治諸虚百損五勞七傷年深泄痢乆作滑腸心腹痞悶塊癥疼痛硬下虚上熱口瘡燥渇一切隂盛陽虚之證縮砂仁白芍藥良薑切炒厚朴薑製橘皮胡椒各五錢破故紙丁香白术木香肉豆䓻吳茱萸湯洗七次焙官桂各三錢右為末羊肝三兩薄批開摻藥二錢五分鋪葱絲一重捲定麻扎積火炙熟分三五次細嚼米飲下日均一劑食前普濟方卷二百二十七
