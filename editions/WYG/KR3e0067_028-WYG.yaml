body:
  text: 普濟方卷二十八明周王朱橚撰肺臟門肺痿小便數附論内經曰臟極高於肺又曰真氣奪則虛今肺中冷則肺之真氣不足而其人上虛則無以制下故上為肺痿下為小便數以至吐涎沫而欲欬不能者皆其證也治法當以温藥和之方白茯苓湯治肺痿小便數甚者吐涎沫欲欬不能者白茯苓去黒皮桂去粗皮附子炮製去皮臍白芍藥各三分補骨脂炒黄耆剉各一兩蜀椒去目及閉口者炒四十顆肉蓯蓉酒浸切焙一兩半右㕮咀如麻豆每服三錢水一盞煎至七分去滓温服食前臨卧日三黄耆湯治肺痿小便數無力不進食黄耆剉熟乾地黄焙各二兩桂去粗皮白芍藥當歸焙切各一兩麥門冬去心焙一兩半白龍骨甘草炙剉各半兩右搗篩每服五錢水一盞半入生薑五片大棗二枚煎至八分去滓温服空心食前日三龍骨湯治肺痿小便數漸覺氣弱龍骨黄耆剉肉蓯蓉酒浸切焙各一兩白薇牡蠣煆附子泡製去皮臍各三分甘草炙剉半兩右㕮咀如麻豆大每服三錢水一盞入生薑三片大棗二枚煎至七分去滓温服空心食前日三五味子湯治肺痿小便數五味子欵冬花去梗桂去粗皮人參各二兩麥門冬去心焙桑根白皮各三兩右㕮咀如麻豆大每服六錢水二盞入生薑和皮五片大棗二枚粳米三十粒煎至一盞去滓温服空心食前日三熟乾地黄治肺痿小便數熟乾地黄焙芎藭各五兩桂去粗皮人參各三兩桑根白皮二兩右㕮咀如麻豆大每服五錢水一盞半煎至八分去滓温服三味湯出聖惠方治肺痿多涎唾小便數者此肺已中冷必多頭眩甘草各四兩乾薑炮白芍藥各二兩右㕮咀如麻豆大每服五錢水一盞半煎至一盞去滓温服不計時肺臟痰毒壅滯附論夫肺臟痰毒壅滯之病其證目眩頭旋胸膈痞滿常多痰唾不思飲食鼻聞腥臭盖肺主氣居於膈上為四臟之盖邪熱壅熏散胸膈津液相搏故欝結成痰也方半夏散出聖惠方治肺臟久積痰毒在於胸膈不散少思飲食半夏一兩湯洗七次去滑木香半兩人參一兩去蘆頭㯽榔三分桔梗半兩去蘆頭陳橘皮三分湯浸去白焙前胡一兩去蘆頭赤茯苓二兩桂心半兩旋覆花半兩麥門冬一兩去心枇杷葉三分拭去毛炙㣲黄細辛三分甘草半兩炙㣲赤剉枳殻二兩麩炒㣲黄去穰右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服忌炙煿熱麵猪犬肉等人參防己湯治肺臟壅熱咽喉腫痛頭目昏重惡飲食客熱痰毒大小便閉澀人參半兩防己一兩羌活去蘆頭芎藭㯽榔剉連翹天麻𤣥參防風犀角鎊木香各半兩惡實㣲炒甘草炙各一兩右㕮咀每服三錢水一盞入生薑三片葱白一寸煨熱同煎六分不拘時候去滓温服甘菊花散出聖惠方治肺臟痿毒胸膈壅滯甘菊花人參去蘆頭大腹皮剉半夏湯洗七次去滑木香白术葳靈仙桔梗麩炒㣲黄去穰肉桂去皺皮訶黎勒皮赤茯苓郁李仁湯洗去皮尖炒甘草炙㣲赤剉各一兩右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服人參散出聖惠方治肺臟痰毒壅滯氣逆欬嗽不思飲食人參一兩去蘆頭麻黄三分去根節甜葶藶三分隔紙炒令紫色枳殻三分麩炒令黄去穰木通三分炒烏梅七枚用肉㣲炒桔梗三分去蘆頭紫苑三分去蘆頭桑根白皮三分剉甘草半兩炙㣲赤剉赤茯苓半兩欵冬花三分右為散每服三錢水一中盞生薑半分煎至六分去滓不計時候温服旋復花散治肺臟痰毒壅滯頭旋目眩旋復花半兩人參半兩去蘆頭枇杷葉半兩拭去毛炙㣲黄赤茯苓一兩蔓荆子一兩前胡一兩去蘆頭桔梗防風各半兩去蘆頭甘草半兩炙㣲赤剉枳殻一兩麩炒㣲黄去穰半夏三分湯浸七次去滑右為散毎服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服忌炙煿熱麵射干散楊子建䕶命方治肺臟積熱饞食辛酸熱毒之物即咽中痿壅射干杏仁去皮尖雙仁炒麻黄去根節煑去浮沫紫蘇子炒羌活去蘆頭甘草桔梗牡丹皮柴胡去苗枇杷葉去毛右等分粗搗篩每服二錢水一盞生薑二片同煎取八分食後臨卧服柴胡湯治肺壅熱痰毒頭眩嘔逆柴胡去苗甘草炙各一兩芎藭獨活去蘆頭羌活去蘆頭貝母去心欵冬花各半兩廣麻去根節桑根白皮剉各一兩半右粗搗篩每服三錢水一盞煎至七分去滓温服不計時候桑白皮散治肺臟痰毒滯心胸滿悶肩背煩疼不欲飲食桑根白皮一兩剉半夏半兩湯浸七次去滑赤茯苓一兩前胡一兩去蘆頭大腹皮三分剉白术半兩木香半兩甘草炙一分㣲赤剉川大黄一兩炙㣲剉碎右為散每服三錢以水一中盞生薑半分煎至六分去滓不計時候温服前胡湯治肺熱欬嗽痰壅氣喘不安前胡去蘆頭一兩半貝母去心白前各一兩麥門冬去心焙一兩半枳殻去穰麩炒一兩芍藥赤者麻黄去根節各半兩大黄蒸一兩右㕮咀剉如麻豆大每服三錢以水一盞煎取七分去滓食後温服日二貝母飲治肺臟熱咽喉及口乾欬嗽氣促痰壅貝母去心百合各一兩半紫苑去苗桑根白皮桔梗炒各一兩麥門冬去心焙一兩半大黄蒸七錢半甘草炙半兩右㕮咀如麻豆每服三錢以水一盞煎取七分去渣食後温服日二潤腸丸治肺壅盛心胸滿悶欬嗽煩喘咽膈痰滯不欲飲食大便多秘桑根白皮剉甜葶藶隔紙㣲炒防己天門冬去心炒枳殻各半兩麩炒去穰㯽榔剉一分牽牛子白者炒香搗羅取細末一兩右為末鍊蜜和丸如梧桐子大每服二十丸煎人參湯下不拘時服木通湯治久嗽肺熱欬唾稠濁胸滿痛悶木通桔梗桑根白皮升麻黄芩去黒心各一兩半牽牛子炒一兩地黄生切三兩右㕮咀如麻豆每服五錢以水一盞半煎取八分去滓温服日二六神散治肺臟痰毒壅滯人參百合白术山芋白茯苓去黒皮各一兩甘草炙半兩右為散每服二錢白湯㸃服日三紫蘇子散楊子建䕶命散治肺臟多熱面上生瘡胸中積滯或痰唾稠粘或睡中口内有涎紫蘇葉桔梗麻黄去根節煑去浮沫羗活去蘆頭牡丹皮連翹各一兩右搗篩每服三錢水一盞半煎至一盞去滓温服日三一方為末黒神丸治肺臟壅實痰嗽秘滯皂莢不蛀者一觔切長一寸於銚子内炒令烟盡後作次序下杏仁以下四味炒杏仁去尖半夏知母貝母各一兩右同炒令黒色便入酥一兩攪勻後入巴豆霜半兩糝在藥上不得攪動急着噐物盖令不得煙出復以濕紙封固候冷出於地上以紙襯攤勻盖覆出火毒一宿杵羅為末以醋麵糊為丸如菉豆大每服三丸至五丸生薑湯或茶湯酒任下臨卧服欵冬丸治肺氣不調上膈痰滯喘滿氣促語聲不足欵冬花半兩焙馬兠鈴杏仁去皮尖雙仁炒各一分桂去粗皮一錢苦葶藶隔紙炒半兩右為細末煑棗肉和丸如梧桐子大每服二十丸食後臨卧以温水下栝蔞湯潤肺化痰利咽膈大栝蔞五枚去殻取瓤并子㸃切令勻細㣲以白麵同如餅子焙乾搗羅為末稱三兩山芋杏仁去皮尖雙仁麩炒令黄入盆内研令極細各三兩甘草炙取末一兩右將山芋與栝蔞同於銀石噐中慢火炒令香熟取出與甘草杏仁末和拌勻更用鹽花三分細研同和勻每服一錢沸湯㸃服前胡湯治肺喘毒壅滯心膈昏悶前胡去蘆頭紫苑洗去苗土訶梨勒皮枳實麩炒㣲黄已上一兩右為散每服一錢不計時候以温水調下硝石半夏丸治肺熱胸中痰實咽喉不利化痰硝石半夏湯浸七次去滑焙各半兩右先搗半夏為末次入硝石同研令細再入白麵一兩三味拌勻更羅過滴水丸如菉豆大老人風痰逆上大腑熱不識人薑湯下二十丸常喫三丸肺臟傷風冷多涕附論夫肺臟虛弱氣血不足則風冷之氣傷於肺也肺主氣氣之取行循環經絡若氣虛則外邪易入肺氣與邪氣相搏故令欬逆寒惡語聲散失目眩頭旋鼻多涕也方桂心散出聖惠方治肺臟外傷風寒頭目不利多涕白术三分厚朴一兩去粗皮塗生薑汁炙令香熱赤茯苓三分人參三分去蘆頭桂心三分陳橘皮一兩湯浸去白穰焙半夏半兩湯浸七遍去滑附子三分炮製去皮臍五味子三分麻黄三分去根節乾薑半兩炮製剉杏仁半兩湯浸去皮尖麩炒㣲黄細辛半兩甘草半兩炙㣲黄剉右為散毎服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱忌生冷油膩猪魚肉等細辛散出聖惠方治肺臟外傷風冷時有咳嗽頭目不利多涕細辛三分芎藭半兩乾薑半兩炮製剉杏仁半兩湯浸去皮尖雙仁麩炒㣲黄赤茯苓三分白术三分附子三分炮製去皮臍前胡半兩去蘆頭甘草半兩炙㣲赤剉陳橘皮一兩湯浸去白穰焙厚朴一兩去粗皮塗生薑汁炙令香熟桂心半兩右為散毎服二錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服忌生冷油膩濕麵前胡散出聖惠方治肺臟因傷風冷痰嗽不止心膈煩滿或時嘔逆鼻中多涕前胡一兩去蘆頭桔梗半兩去蘆頭半夏半兩湯洗七次去滑白术三分人參三分去蘆頭枳殻三分麩炒㣲黄去穰桂心一兩甘草半兩炙㣲赤剉陳橘皮一兩湯浸去白穰焙細辛半兩枇杷葉半兩拭去毛炙赤剉厚朴一兩去粗皮塗生薑汁炙令香熱右為散毎服三錢水一中盞入生薑半分􅀥三枚煎至六分去滓不計時候稍熱服人參散出聖惠方治肺臟傷風冷咳嗽多涕心膈痰逆不欲飲食人參三分去蘆頭半夏半兩湯浸七次去滑乾薑半兩炮製剉白茯苓半兩白术半兩甘草半兩炙剉㣲赤五味子半兩肉桂半兩去粗皮黄耆半兩剉陳橘皮一兩湯浸去白穰焙訶梨勒三分煨用皮右為散每服三錢水一中盞入生薑半分􅀥三枚煎至六分去滓不計時稍熱服當歸人參湯出聖惠方治肺傷冷鼻中多涕四肢疼痛不思飲食當歸人參乾薑白术白茯苓去黒皮甘草炙剉芎藭陳橘皮湯浸去白焙細辛去苗葉白芍藥各半兩桂去粗皮七錢半右搗篩每服三錢水一盞入生薑一棗大􅀥三枚煎至七分去滓不計時候稍熱服白术散出聖惠方治肺臟傷風冷頭目昏重常多清涕少思飲食白术半兩人參一兩去蘆頭肉桂半兩去皺皮桔梗半兩去蘆頭細辛半兩甘草半兩炙㣲赤剉厚朴一兩半去粗皮塗生薑汁炙令香熟陳橘皮一兩湯浸去白穰焙杏仁三分湯浸去皮尖雙仁麩炒黄右為散毎服三錢以水一中盞入生薑半分􅀥三枚煎至六分去滓不計時候稍熱服厚朴散出聖惠方治肺臟傷風冷咳嗽頭疼不可忍及多涕厚朴一兩半去粗皮用生薑汁炙令香熟前胡一兩去蘆頭桂心一兩石膏一兩赤芍藥一兩貝母一兩煨令㣲黄甘草一分炙㣲赤剉杏仁三分湯浸去皮尖雙仁麩炒㣲黄右為散毎服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服麻黄湯治肺感風冷多涕麻黄去根節先煑掠去沫焙一兩前胡去蘆頭白前去苗各三分甘草炙半兩桑根白皮剉炒一兩紫苑去土一兩杏仁湯浸去皮尖雙仁麩炒㣲黄半兩右搗篩每服三錢水一盞入葱白三莖煎至七分去滓食後服日三桂心丸治肺寒内外合邪清涕多語聲不出桂去粗皮細辛去苗蘆白芷防風去叉乾薑炮甘草炙芎藭各一兩右為細末煉蜜丸如梧桐子大每服三十丸温水飲下食後服紫苑湯治肺寒痰逆鼻多清涕紫苑去土升麻天門冬去心焙貝母麩炒黄各一兩右搗篩毎服三錢水一盞入生薑三片大棗二枚同煎至七分去滓温服不計時候杏仁麻黄湯治肺冷多涕杏仁湯浸去皮尖雙仁炒一兩麻黄去根節先煑掠去沫半兩五味子炒甘草炙剉各一兩右搗篩每服三錢水一盞入生薑一􅀥大煎至七分去滓温服肺臟傷風冷聲嘶不出附論夫腑臟皆受氣於肺肺主於氣氣為陽陽氣平和則聲通暢也若形寒飲冷兩寒相感則傷於肺是以風冷為陰陰邪搏於陽陰陽不調氣道不通故令聲嘶不出也方半