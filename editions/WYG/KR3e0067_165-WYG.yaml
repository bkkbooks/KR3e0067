body:
  text: 普濟方卷一百六十六明周王朱橚撰痰飲門懸飲附論夫懸飲者由臟腑虚冷榮衞不和三焦痞悶因飲水過多停積不散水流走於脇則冷兩脇虚脹欲唾引脇下痛故謂之懸飲也方桂心散出聖惠方治懸飲心腹痞滿水走腸肋兩脇引痛桂心一兩旋覆花半兩白术半兩細辛半兩半夏半兩湯洗七遍去滑桔梗半兩去蘆頭赤茯苓半兩一方有芍藥無茯苓澤瀉半兩附子半兩炮裂去皮臍枳殻半兩麩炒㣲黄去穰前胡半兩去蘆頭右為散毎服四錢以水一盞入生薑半分煎至六分去滓每於食前温服前胡散出聖惠方治懸飲腹脇痞急宿食不化心胷滿悶前胡一兩去蘆頭半夏一兩洗七遍去滑桂心一兩人參一兩去蘆頭訶梨勒皮一兩白术一兩檳榔一兩枳殻一兩麩炒㣲黄去穰甘草半分炙㣲赤剉右為散每服五錢以水一大盞入生薑半分煎至五分去滓稍熱服日三四服厚朴散出聖惠方治懸飲心腹氣滯兩脇多疼厚朴去麤皮一兩塗生薑汁炙令香熟川大黄一兩剉碎㣲黄桂心半兩枳殻三分麩炒㣲黄去穰檳榔三分右為散每服四錢以水一中盞煎至六分去滓温服日三四服旋覆花方出聖惠方治懸飲腹滿脇痛旋覆花一兩皂角三挺去黑皮塗酥炙令黄去子草豆䓻一兩去皮杏仁一兩湯浸去皮尖雙仁麩炒㣲黄枳殻半兩麩炒㣲黄去穰川大黄一兩剉碎㣲炒右為末煉蜜和丸如桐子毎於食前生薑湯下二十丸治懸飲心腹氣滿兩脇多痛出聖惠方半夏三兩搗為末木香二兩旋覆花一兩檳榔三兩皂角三兩去黒皮塗酥炙令黄焦去子皮搗碎以酒一升揉取汁去滓煎成膏將半夏末以膏和作餅子以青蒿葢出青衣如造麴法搗羅為末右為末以酒煮麴糊為丸如梧桐子大每於食前以生薑湯下二十丸小枳殻丸出聖惠方治胃不和宿寒留飲心腹痞滿脇肋刺痛嘔逆痰水不思飲食枳殻四兩炒去穰半夏三兩湯洗去滑白术三兩赤茯苓二兩去皮乾薑二兩炒右為細末麫糊為丸如梧桐子大每服三十丸食後生薑湯下治懸飲腹滿脇痛出聖惠方郁李仁三兩湯洗去皮㣲炒半夏一兩湯洗七遍去滑草豆䓻一兩去皮右為末以酒煮麫糊和丸如桐子大食前生薑湯下二十丸又方出聖惠方牽牛子二兩炒皂角子仁二兩㣲炒右為末煉蜜為丸如梧桐子大每於食前以生薑湯下十五丸以取下痰滯為度溢飲附論溢飲謂因大渴而暴飲水水氣溢於腹胃之外在於皮膚之間故言溢飲令人身體疼重而多汗是其候也方半夏散出聖惠方治溢飲胸膈痰壅頭痛嘔逆不下飲食半夏一兩湯洗七遍去滑赤茯苓三分白术二分桔梗三分去蘆頭枳殻二分麫炒㣲黄去穰前胡三分去蘆頭人參半兩去蘆甘草半兩炙㣲赤剉防風半兩去蘆頭大腹皮半兩剉麥門冬三分去心枇杷葉半兩拭去毛炙㣲黄右為散每服五錢以水一盞生薑半分煎至五分去滓不計時候温服治溢飲在胷間不散上衝攻於頭面不能食飲宜服此方出聖惠方白术三分木香半兩赤茯苓半兩人參半兩前胡半兩去蘆頭半夏一兩湯洗七遍去滑肉桂半兩去麬皮青橘皮半兩湯浸去白穰焙芎藭三分附子一兩炮製去皮臍大腹皮半兩剉右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候温服白术散出聖惠方治溢飲當發其汗白术三分麻黄一兩去節根赤芍藥三分旋蕧花半兩桂心一兩前胡三分去蘆頭甘草三分炙㣲赤剉五味子二分半夏三分湯洗七遍去滑右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候熱服衣葢取汗如人行十里未汗再服小青龍湯出仁存方治溢飲倚息不得卧及喘滿者方見咳嗽門咳嗽不得卧類大青龍湯出三因方治溢飲者當發其汗并身體疼重汗不出拘急痛麻黄六兩去節桂心二兩甘草一兩炙生薑三兩石膏一枚如雞子大杏仁四十枚去皮尖雙仁大棗十枚擘右㕮咀以水九升先煮麻黄減二升乃同諸藥煮取二升絞去滓適寒温服一升温覆令汗汗出多者温粉粉之一服汗出者勿再服汗出多亡陽逆虚惡風煩躁不得眠脉㣲弱汗出惡風不可服服之則厥逆筋愓肉瞤此為逆也忌海藻菘菜生葱又方出聖惠方治溢飲當發其汗麻黄一兩去根節桂心一兩甘草半兩炙㣲赤剉細辛半兩石膏一兩杏仁半兩湯洗去皮尖雙仁炒㣲黄右為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候熱服衣葢取汗如人行十里未汗即再服治溢飲上衝頭旋目眩氣喘腹脇虚脹宜服此方旋覆花半兩牽牛子半兩㣲炒杏仁半兩湯浸去皮尖雙仁麩炒㣲黄右為末煉蜜為丸如桐子大不拘時候生薑湯下二十丸支飲附論水飲停積胷膈不能消化支乘於心故名支飲其狀令人心下築悸欬逆喘息飲食不下身體虚浮形如腫是也方大半夏丸治支飲膈脘不利咳嗽喘滿半夏四兩湯洗七遍去滑焙乾為末沉香半兩青橘皮半兩湯浸去白焙乾薑半兩炮白术半兩陳橘半兩湯浸去白焙附子半兩炮製去皮臍肉豆䓻半兩去殻紅豆䓻半兩青州棗二兩别煮取肉同薑蜜入銀石器與半夏末和熬右為末與半夏膏和勻丸如梧桐子大每服十丸空心煎乾薑棗湯下加至十五丸旋蕧花湯治支飲胷膈實痞呼吸短氣旋蕧花一兩檳榔一兩茈胡一兩去苗桔梗一兩炒桑根白皮一兩半鼈甲一兩半去裙襴醋炙大黄一兩半剉炒甘草半兩炙右剉如麻豆大每服五錢水一盞半煎至八分去滓温服不拘時候乾棗湯出千金方治腫及支飲滿澼大棗十枚大㦸一兩大黄一兩黄芩一兩甘草一兩甘遂一兩芫花半兩蕘花半兩右㕮咀以水五升煮取一升六合分四服以快下為度旋蕧花丸出聖惠方治支飲心胷壅滯喘息短氣皮膚如腫旋蕧花一兩漢防己一兩赤茯苓一兩桂心一兩檳榔一兩甜葶藶一兩隔紙炒令紫色前胡一兩去蘆頭枳殻半兩麩㣲炒去穰右為末煉蜜和丸如桐子大每服食前以桑白皮湯下二十丸葶藶丸出聖惠方治支飲心膈痞急欬逆短氣不能下食甜葶藶二兩隔紙炒令紫色半夏一兩湯洗七遍去滑前胡一兩去蘆頭訶梨勒皮一兩紫蘇子半兩木香半兩桂心一兩檳榔一兩右為末煉蜜為丸如梧桐子大每服於食前以温酒下二十丸靈脂丹出經効濟世方治因暑月飲水過多取凉熟睡停積成飲或遇濕風流注謂之支飲手足或時少力指節間疼屈伸不快或有痰飲甚則及於膝足或麻或弱宜常服此藥五靈脂一兩桂心一兩威靈仙一兩白茯苓一兩細辛一兩去葉牡丹皮一兩右為細末和勻以半夏末半兩水煮薄糊丸如梧桐子大每服二三十粒不拘時候生薑湯下漢防己散出聖惠方治胷脇支飲數吐之不愈漢防己一兩半石膏四兩桂心一兩人參一兩去蘆頭前胡一兩去蘆頭白术一兩右為散每服四錢以水一鍾煎至六分去滓不計時候温服治心膈間支飲水滿心下痞堅面黧黑色宜服此藥出聖惠方枳實一兩麩炒㣲黄赤茯苓一兩半前胡一兩去蘆頭漢防己一兩半石膏二兩桂心二兩右為散每服五錢以水一大盞煎至五分去滓温服日三四服枳殻散出聖惠方治支飲頭疼目眩心下痞悶枳殻一兩麩炒㣲黄去穰澤瀉一兩白术一兩漢防己一兩旋蕧花一兩前胡一兩去蘆頭右為散每服四錢以水一中盞煎至六分去滓不計時温服治支飲心膈痞急欬逆短氣不能下食出聖惠方郁李仁二兩湯洗去皮㣲炒旋蕧花一兩澤瀉一兩皂角三挺去皮塗酥炙令黄去子半夏一兩湯洗七遍去滑枳殻半兩麩炒㣲黄去穰右為末煉蜜和丸如梧桐子大每服於食前以温酒下二十丸檳榔丸治支飲胷膈痞悶檳榔半兩剉肉豆䓻半兩去殻半夏一兩湯浸去白焙乾薑一兩炮青橘皮湯浸去白焙右為末薑汁煮麫糊和丸如菉豆大每服五丸食後生薑湯下木防己湯一名防己湯出危氏方又桂枝湯治膈間有支飲其人喘滿心下痞悶面色黧黑其脉沉𦂳得之數十日醫吐之不愈者木防己三兩桂心三兩人參四兩石膏雞子大十二枚右㕮咀以水六升煮取二升分為二服虚者服即愈實者三日復發發則復與服之若不愈去石膏加茯苓四兩芒硝三合以水六升煮取二升去滓下硝令分作二服㣲下利即愈又方不加茯苓茯苓五味子湯出三因方治支飲手足冷多唾口燥氣促小腹上衝胷咽手足痺面熱翕然如醉因復下流陰股小便難時復眩冒嘔唾茯苓四兩桂心二兩甘草二兩炙五味子二兩半右為剉散每服四大錢水一盞半煎至七分去滓空心服服之衝氣即低反更咳滿去桂心加細辛咳滿止而復渴衝氣更發者以細辛乾薑為熱藥此法不當逐渴反止者為支飲也又飲發常冒冒然者必嘔嘔者復加半夏二兩半以去其飲飲去嘔則止其人形腫與痺加杏仁二兩半若如醉胃中熱上薰加大黄三兩須詳證加減十棗湯出鮑氏方夫有支飲家咳煩胷中痛者不卒死雖一百日或一歲及懸飲咳嗽痛引胷脇其脉弦者可與此方大棗十枚大㦸甘遂芫花各等分右大㦸甘遂芫花搗為末以水一升五合煮棗取八合去滓内藥末强者一錢羸者半錢頓服之平旦服而不下者明旦更加藥半錢下後自然補養而引脇下痛者亦十棗湯主之青金丸治支飲不消喘嗽不止硫黄半兩水銀半兩半夏湯洗去滑搗末滑石半兩研右合細研勻滴水和丸如梧桐子大每服二十丸食後温生薑湯下厚朴大黄湯一名小承氣湯出鮑氏方治傷湎酒𠻳咳者必致吐血此坐乆飲過度所致也其脉虚者心冒其胷中本有支飲胷滿治之之方厚朴一兩大黄六兩枳實四兩右㕮咀以水五升煮取二升分作二服温服之化氣丸治支飲痞膈食遲化巴豆五十枚去皮心出油研如粉黄連半兩去鬚白麫二兩半右先將黄連搗末以水半升煎十餘沸隔一宿取白麫并巴豆粉用黄連水和硬軟得所丸如梧桐子大放乾以麩二升於銚内慢火拌藥丸同炒麩黄為度以羅子篩去麩取藥再於黄連水内略漉過竹器内控乾每服三丸或二丸食後臨睡熱酒或水下葶藶丸治支飲氣喘不得息甘葶藶一兩炒木香一兩半夏一兩湯洗七遍去滑焙右為末生薑自然汁煮麫糊為丸如梧桐子大每服二十丸薑湯下不計時服木香丸治支飲下氣木香一兩牽牛子二兩鹽炒過黄皂莢不蛀者去皮酥炙二兩右為末煉蜜為丸如桐子大每服五丸食後薑湯下小半夏加茯苓湯一名大半夏湯出直指方治嘔家渴者為飲􅀈本渴心下有支飲故也小半夏湯主之加茯苓者是也先渴却嘔此為水停心下卒嘔吐心下痞膈間有水自眩悸寒痰半夏一斗洗生薑半升茯苓四兩右切以水七升煮取一升五合再服忌牛肉餳大胡洽不用茯苓用桂心四兩有寒痰臨卧温服熱痰加甘草一分脾胃不和去甘草入橘皮一分治支飲喘息短氣身體腫宜服此藥出聖惠方澤瀉二兩白术一兩漢防己一兩右為散每服四錢以水一中盞煎至六分去滓不計時温服治支飲不瘥大腹水腫喘促不止宜服此方出聖惠方芫花一分醋拌炒令乾甘遂一分煨㣲黄大㦸一分剉碎㣲炒右為散每服於空心濃煎棗湯調下以利為度神應丸治支飲胷膈痞悶飲食遲化槐花半斤巴豆五十粒和皮搗碎右味同炒存一分性為末麫糊和丸如菉豆大每服二丸食後温水下澤瀉湯出金匱方療心下有支飲其人若冐善眩白术二兩澤瀉五兩右切以水二升煮取一升又以一升煮取五合此五合分為再服忌桃李雀肉等小半夏湯出三因方治飲嘔吐不渴半夏湯洗七次右為剉散每服四大錢水二盞薑十片煎至七分去滓温服一方一日三二服服三日畢再服枳术丸盡其痰為度論曰先消胷中氣後去膈上痰再服枳术丸者先後合盡消其氣乃令痰不復作也一方每服秤一錢水一盞