一匙熬如稀􅄳相似是膏也右將五味為細末用皂膏和丸如桐子大每服五七丸至二十丸食後生薑湯下如溏利時相度虚實加減服之若治腫滿及腹脹用葱白湯下椒目丸治腹滿口乾燥此腸間有水氣此方主之椒目一兩木防己一兩大黄一兩葶藶二兩右為細末蜜和丸如梧桐子大先服一丸日三服後稍増口中有津液者止渴者加芒硝半兩五膈丸治留飲停積不消胷膈痞氣大黄一兩牽牛一兩木香一兩陳皮二兩去白焙乾右為細末煉蜜和丸如梧桐子大每服四五十丸冷水下甘遂半夏湯治病者胸腹欲自利利當快雖利心下續堅滿此為留飲未去故也甘遂三枝大者芍藥三枝半夏二十枚水煮甘草一枝如指大二味藥各以水煮取半升右以蜜半斤内二藥汁共得一升半煮取八合頓服枳實湯治留飲在心下堅痞時復作痛枳實二兩去穰麩炒白术三兩桂一兩去麤皮右麤搗篩每服三錢以水一盞入生薑半分煎至七分去滓温服日三服茯苓半夏湯治停痰留飲胷膈滿悶咳嗽嘔吐氣短惡心以致飲食不下並宜服之或膈悶有痰水眩悸並宜服之一名茯苓散茯苓四兩去皮半夏五兩湯洗七次右為麤末每服四錢水一盞生薑七片煎至七分去滓空心服甘遂湯治留飲病脉伏其人欲自利利後即快雖利心下續結滿為留飲未除甘遂半兩炒令黄半夏一兩湯浸去滑生薑汁拌炒乾右搗篩毎服一錢水一大盞煎至七分去滓再入芍藥末并人參末一錢蜜半匙頭更煎三兩沸空心温服虚人晚間服半夏丸治留飲不散膈脘不利宿飲不消嘔逆惡心方見本門痰飲類一名沉香墜痰丸半夏湯治留飲不除胷中痰冷方見本門寒痰類前胡散治濕飲停留肢體時疼痛氣膈痰熱客於上焦心下痞悶不欲飲食頭目眩昏前胡七錢半人參七錢半赤茯苓七錢半去皮紫蘇七錢半陳皮半兩去曰半夏麴半兩枳殻半兩麩炒去穰甘草半兩木香半兩右為末每服三錢水一盞半生薑七分煎至一盞去滓取七分熱服日進三服留飲宿食人有留飲漬積於胃受濕則飲食遲化或有酒後飲水停留於肺胃之間脾得濕氣則不能消食令人噫氣吞酸冷逆惡心腹脇脹滿不思飲食皆其候也方千金方療心腹留飲宿食沙參二兩丹參二兩苦參二兩桂心二分石膏五分研人參一分大黄一分半夏五分洗乾薑五分戎鹽一分巴豆六十枚去皮心以湯煉之復熬熟令黄色别研附子一分炮右為末散以白蜜和丸如小菉豆大吞一丸日再令入先食服一丸不知稍益以知為度忌豬肉餳蘆笋生葱名千金丸草豆䓻散治留飲宿食成癖草豆䓻一兩一分附子三分炮去皮臍五味子三分陳橘皮三分湯浸去白焙白术半兩枳實半兩去穰麩炒桂半兩去麤皮乾薑半兩炮芍藥半兩木香半兩鼈甲半兩醋炙去裙襴右為末散煉蜜和丸如梧桐子大每服二十丸戎鹽湯下鼈甲散治留飲宿食成癖鼈甲三分醋炙去裙襴附子三分炮製去皮臍桂三分去麤皮京三稜半兩炮剉乾薑半兩炮陳橘皮半兩湯浸去白焙呉茱萸半兩湯洗炒木香半兩厚朴半兩去麄皮大黄半兩剉炒右為散每服二錢温酒或生薑湯調下當歸湯治留飲不消腹中積聚轉甚當歸二兩人參二兩桂心二兩甘草二兩芒硝二兩芍藥二兩大黄四兩生薑二兩黄芩二兩澤瀉二兩右切水五升煮取三升分三服空心食後服忌生葱海藻菘菜九寶丸治留飲宿食脹滿吞酸嘔逆木香二兩肉豆䓻二兩去殻厚朴二兩去麤皮薑汁炙麝香二兩研丹砂二兩研檳榔二兩剉桂三分去麤皮乳香一兩研半夏一兩半為末生薑汁和作餅爆乾右搗研為末生薑汁和丸如豌豆大毎服七丸橘皮湯下芫花丸主留飲宿食芫花一兩炒大黄二兩甘遂二兩黄連二兩麻黄二兩去節杏仁二兩去皮尖雙仁研巴豆五十枚去心皮湯煉百遍令變色右搗篩杏仁巴豆别搗如膏令合以蜜丸如小豆大先食服一丸日再不知稍増以知為度忌海藻菘菜豬肉冷物水笋等物白术散治胷膈留飲腹中虚滿氣逆不下飲食白术一兩陳橘皮一兩湯浸去白穰焙丁香半兩赤茯苓半兩桂心半兩半夏半兩湯洗七遍去滑附子半兩炮製去皮臍前胡一兩去蘆頭甘草半兩㣲炙赤右為散每服五錢以水一大盞入生薑半分棗三枚煎五分去滓不計時候温服木通丸治留飲宿食寒熱煩滿木通半兩剉椒目半兩㣲炒出汁附子半兩炮製去皮臍半夏半兩湯洗七遍去滑厚朴半兩去麤皮塗生薑汁炙令香熟川芒硝二錢甜葶藶一兩隔紙炒令紫色川大黄二兩剉碎㣲炒杏仁一兩湯浸去皮尖雙仁麩炒㣲黄右為末别搗葶藶杏仁如膏和諸藥末令煉蜜和搗三二百杵丸如梧桐子大每服食前以薑湯下二十丸通草丸治積聚留飲宿食寒熱煩結長肌膚補不足椒目一兩附子一兩炮半夏一兩洗厚朴一兩炙芒硝五兩大黄九兩葶藶子三兩熬杏仁三兩去皮尖研右為末别搗葶藶杏仁令如膏合諸藥末以蜜和勻搗五千杵丸如梧桐子大服二丸忌豬羊肉餳等大効方中無通草未詳其名順流紫丸療百病留飲宿食心下腹痛四肢煩疼男子五勞七傷婦人産後餘疾等當歸一分代赭石一分茯苓三分烏賊魚骨三分肉蓯蓉二分藜蘆五分小熬桂心三分右為末搗篩白蜜和丸如小豆大先食服一丸日再不知增之欲下倍服之别搗巴豆三枚入之忌生葱豬肉酢物野豬肉蘆笋等物桂心丸治心腹留飲宿食不化腹脹氣悶痰逆頭痛桂心半兩石膏一兩細研水飛過人參半兩去蘆頭川大黄半兩剉碎㣲炒附子一兩炮製去皮臍半夏一兩湯洗七遍去滑乾薑一兩炮製剉巴豆二十枚水煮一日去皮心炒令黄右為末研巴豆令匀煉蜜搗三二百杵丸為小豆大每服食前以温水下五丸大半夏丸治留飲宿食不消止逆温胃半夏二兩為末生薑汁和作餅爆乾木香一錢人參三分青橘皮一錢去白洗焙草豆䓻三枚去皮檳榔三枚剉丁香一錢右為末用生薑汁煮麫糊為丸如小豆大每服三十丸生薑棗湯下不拘時候硇砂丸治留飲宿食不化腹脇氣痛不思飲食硇砂一分研狼毒一兩醋炒芫花一兩醋炒乾漆一兩炒煙出京三稜一兩半煨剉鼈甲一兩炙黄去裙襴巴豆仁三錢醋煮紫色焙研右為末次入别研二味再同研勻麫糊為丸如菉豆大每服三丸食後温酒生薑湯下芫花丸治留飲食不化芫花一兩醋拌炒令乾甘遂一兩煨㣲黄黄連二兩去鬚麻黄二兩去根節杏仁二兩湯浸去皮尖雙仁研如膏附子一兩炮製去皮臍巴豆十枚去皮心研紙裹去油右為末與巴豆杏仁膏同研勻煉蜜和丸如小豆大每服食前以粥飲下二十丸當歸丸治留飲宿食心下腹痛四肢煩疼當歸一兩剉㣲炒赤茯苓三分枳實一兩麩炒㣲黄桂心三分川大黄半兩剉碎㣲炒巴豆十枚去皮心研紙裹壓去油右為末入巴豆令匀煉蜜和搗三二百杵丸如小豆大每服食前以粥飲下二丸以利為度磨滯丸治脾胃不和留飲宿食不消及累有傷滯食已腹痛嘔噦惡心胷脇脹悶大便秘不利木香一兩青橘一兩湯洗去白焙桂一兩去麤皮巴豆霜半錢呉茱萸三兩湯洗焙炒硇砂醋淬一兩右為末與硇砂巴豆霜拌勻醋煮麫糊為丸如菉豆大每服三丸加至五丸早晚食後臨睡服大便溏利時減丸數温胃散治留飲順氣消宿食生薑半斤洗切曝乾用鹽二兩醎一宿炒過入陳皮末一兩同炒令乾丁香一分半夏一兩為末生薑汁作餅曝乾草豆䓻大者三枚不去皮陳橘皮一兩湯浸去白焙甘草二兩炙剉右為散每服二錢如茶㸃服覺脾胃寒加附子半兩炮製去皮臍半夏一兩湯浸去滑七遍切焙木香丸治留飲宿食不消枳殻二兩去穰麩炒木香半兩大黄半兩紙裹煨檳榔一兩剉芎藭一兩郁李仁一兩湯浸去皮焙研右為末入郁李仁拌勻煉蜜和丸如梧桐子大每服十丸至十五丸食後臨卧生薑湯下海藻丸出聖惠方治腹中留飲宿食不消海藻半兩去鹹漢防己半兩甘遂半兩煨㣲黄枳實一兩麩炒㣲黄去穰川椒半兩去目及閉口者㣲炒去汁右為末煉蜜和丸如梧桐子大毎服食前以粥飲下五丸以利為度郁李仁丸治留飲宿食不消寛利胷膈消進飲食郁李仁一兩湯浸去皮尖炒青橘皮一兩湯浸去白焙木香一兩檳榔一兩剉半夏六兩去皮臍漿水五升生薑半斤切甘草並桑根白皮各一兩剉銀石器内慢火煮乾再添熱漿水二升煮乾去餘藥只用半夏右為末麫糊和丸如豌豆大毎服十五丸至二十丸食後臨臥生薑湯下大黄丸出聖惠方治留飲宿食不消大黄半兩剉炒赤茯苓半兩去黑皮朴硝一分研巴豆一分去皮心膜研出油右為末入别研二味再同研勻煉蜜和丸如菉豆大每服五丸温米湯飲下以利為度氣虚者可服高良薑丸一名大腹丸治留飲宿食醋心吐沫氣逆脹滿高良薑三兩半桃仁三兩去皮尖雙仁炒大黄三兩去皮檳榔三兩生剉右為末與桃仁研勻煉蜜和丸如彈子大每服實者一丸虚者半丸空心食前温酒下薑湯下亦可小麝香丸治脾胃氣弱不能飲食肌膚廋瘁心胷膨悶肋脇虚脹大便秘利不定小兒諸疳黄疸呉茱萸三兩炒木香一兩桂一兩去麤皮陳粟米四兩巴豆四十粒去皮同炒黄色去巴豆右為末醋煮麫糊為丸如菉豆大每服七丸或十丸食後温熱水下肉豆䓻丸治留飲宿食不消肉豆䓻半兩去皮麫褁煨炒巴豆七枚去皮心膜研出油半夏三分與呉茱萸半兩同水一升慢火煮乾只用半夏焙乾右為末酒煮麫糊和丸如梧桐子大每服三丸食後茶酒下治心下堅滿此為留飲宿食宜服此出聖惠方甘遂一錢煨微黄半夏一分湯洗七次去滑右為散每服以生薑汁半合蜜半合湯一中盞相和分為三服毎於食前温服以利為度桑耳丸出聖惠方療留飲宿食不消桑耳三兩巴豆一兩去心皮研紙褁壓去油右搗和以棗膏和丸如麻子大先食服一丸不下服二丸病下即止忌野豬肉蘆笋療痰積聚嘔逆兼風虚勞隂疝方右用霜後蒺藜苗子搗十斗汁以文武火煎減半即以文火煎攪勿停候可丸乃止空腹酒下三十丸如梧桐子大煎服亦可藿香湯治留飲宿食不消止逆温胃方見本門痰飲類豆䓻丸治留飲宿食不消方見本門寒痰類香橘丸治留飲宿食腹脇脹滿不喜飲食方見本門膈痰結實類普濟方卷一百六十六
