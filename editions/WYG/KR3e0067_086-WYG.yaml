body:
  text: 普濟方卷八十七明周王朱橚撰諸風門總論風為天地浩蕩之氣正順則能長養萬物偏邪則能傷害品類人或中之鮮有不致斃者是以聖人推為百病長原夫風與氣一也塞乎天地之間則隂陽不同在乎人身之中則吹呵有别隂為風故風無形而有其勢陽為氣故氣有質而無其威吹則冷而勁為風呵則温而和為氣是以四時之内八風二十四氣者以候隂陽消長之機也大塊噫而為風山澤蒸而為氣風勁則氣清氣濃則風息在人亦然人生天地之中負隂抱陽稟冲氣以為和上古之人其知道者法於隂陽和於術數飲食有常節起居有常度不妄作勞故精氣内安形神外全病安從來今時之人以酒為漿以妄為常醉以入房以慾竭其精神以耗散其真不知持滿不知御神務快其心逆於生藥致隂陽不調腑臟氣偏榮衞失度氣血錯亂經脉空虛腠理不宻外邪因得以傷之邪風之中人也其狀奄忽盖氣性𦂳暴善行數變其中人也卒其眩人也暈激人涎浮昏人神志千金方論有七十二種究其大法則以五風為首五風者謂肝心脾肺腎五臟之中也其言生死各亦不同肝風之狀踞坐不得低頭青色圍繞目額者可治宜於肝腧灸之若上喘目直視唇口俱青或面目大青黑一黄一白者死心風之狀汗自出偃仰不可轉側唇色正赤語言狂妄者生宜於心腧灸之若唇面青黄黑赤色不定眼瞤動不休或面目時時悚動者心絶也五日而死脾風之狀踞而腹滿不嗜食一身通黄四肢不收口吐醎沫者常可治之宜灸脾腧若手足俱青木賊土敗必死矣肺風之狀偃卧腦滿喘而不休冐昧汗出鼻不聞香臭不得卧目鼻下至口色白者可治宜於肺腧灸之若失血及妄言色黄者不治七八日而死腎風之狀踞而腰脚痛重視脇肋邊未有黄㸃者可治宜於腎腧灸之若齒黄面如土色者死至於六腑本無中風唯胃有者以胃為水穀之海變化五味以資五臟虛則風邪亦得以中之胃風之狀額上多汗飲食不下隔塞不通腹滿去衣則腹脹張口肩息心下澹澹食寒則泄孫真人云新食竟取風為胃風瘧論亦然五臟中風其脉皆浮但兼以本脉而見於本部與人迎相應也假令肝中風則左手闗部與人迎脉並浮而弦者也餘皆倣此大抵肥人多易中風以其肌膚軟脆風邪易中入之則深龎老故云人肥則風氣不得外泄即為熱中而目黄人瘦則風氣外泄即為寒中而泣出蓋可知矣得此疾者胗其脉遲浮者吉急疾大數者㐫大閉澀為順下利為逆口目俱閉者易治口目俱開者難治骨熱多煩者損其煩熱藥臟寒不利者損其冷劑治之當隨病之淺深慎無執着諸方論中所謂左癱右瘓者由邪氣中人邪氣反緩正氣反急正氣引邪喎僻不遂風賦有云氣虛則瘓無左右血􅉣而癱中兩邊以此而知氣血俱虛則癱瘓兩證俱有若氣順血􅉣則為癱風癱風者筋脉拘急攣拳也若血順氣虛則為瘓風瘓風者嚲軟擡動不能也不必左為癱而右為瘓瘓風不可全用風藥當以理氣藥兼而用之癱風則當以益血補筋去風藥治之則萬舉萬全矣予厯觀古方治諸風不問病之輕重表裏淺深皆以小續命湯加减用之此良法也但小續命湯内無通氣藥不可獨用若能以通氣湯散兼而服之必成其功矣宋氏云治風之法當以暖散中通氣為先通則痰氣不薰蒸風亦自得以攄㪚誠哉是言也小續命湯通治諸風惟偏枯則不可多用蓋偏枯者其人血不榮於一邊小續命湯復發汗亡血故也偏枯者半身不遂肌肉枯瘦骨間疼痛神智如常治之宜養血大八風湯續斷湯風痱者身無痛處但四肢緩縱神智昏亂不甚語言㣲有知則可治以其風㪚涎注闗節氣不能行故四肢不遂也治之先進太乙神精丹三粒次以西州續命湯風癔者奄不知人咽中噫噫然有聲以其邪中心肺涎潮鼻塞心肺間閇故不能言宜用小續命湯獨活湯風柔者以風熱入於肝臟使諸筋攣急屈不可伸經曰寒則攣急熱則弛張風顫者以風入肝臟經絡之氣不守正位故使頭招搖而手足顫掉也風瘖者以風冷之氣客於中滯而不能發故使口噤而不能言也風痺者由風寒濕三氣襲於經絡舎於血脉留於榮衞故使身頑肉厚不知痛癢其證則有筋骨血肉氣之五痺以屬五臟諸痺始得之在外速治之無不愈者及其邪氣深入各傳於臟無不危殆故曰風中脉則口眼喎斜中腑則肢體廢風入臟則性命危矣又有中風之病卒暴昏昏涎浮脑中上下相引聲如引鋸皆由飲食過度嗜慾無節停留胃中使氣脉闗隔不得運行榮衞失度臟腑怯弱風邪暴客相搏成涎雖投治風藥永不得下蓋涎浮上部填塞心胷諸風閉塞急當吐之使快為度然後急進續命湯近世方書多云中風不可吐久後令人壞一臂蓋藥中多用水銀粉大損脾胃脾胃既損四肢不舉理之必然殊不知古人治法其高者因而越之病在胷上為髙越之為吐也如硃砂丸止是吐脑上積涎於脾胃何損用之必效若俱無涎亦慎與吐恐脾胃俱虛嘔血而死不可不知世有氣中方書無載考其至理皆由喜怒不節氣血暴傷蓋暴怒傷隂暴喜傷陽怒則氣逆喜則氣緩氣血失常亂於胷中壅於經絡滯則泣漸漸無力昏困欲倒治之當順氣理血不可妄投風藥至如新沐中風名曰首風飲酒中風名曰漏風又曰酒風入房中風名曰内風又曰勞風各有治法夫風之為病有瘙癢者有癮疹者有疼痛者有瘡傷者有聾瞽者有厯節者有顛厥者有狂妄者千狀萬化莫不由五臟而生矣大抵人之有生以元氣為根榮衞為本根氣强壯榮衞和平腠理緻宻外邪客氣焉能為害或因喜怒或因憂思或因驚恐或飲食不節或勞役過傷遂致真氣先虛榮衞失度腠理空踈邪氣乘虛而入及其感也為半身不遂肌肉疼痛為痰涎壅塞口眼喎斜偏廢不仁神智昏亂為舌强不語頑痺不知精神恍惚驚惕恐怖或自汗惡風筋脉攣急變證多端治療之法當推其所自若内因七情而得之者法當調氣不當治風外因六淫而得之者亦先當調氣然後依所感六氣隨證治之此良法也但髪直吐沫搖頭上攛面赤如粧或頭面青黑汗綴如珠眼閉口開聲如鼾睡遺尿不知人者皆不可治風者百病之始善行而數變行者動也風本為熱熱勝則風動宜以静勝其躁養血是也治須少汗亦宜少下多汗則虛其衞多下則損其榮治其在經雖有汗下之戒而有中藏中府之分中府者宜汗之中藏者宜下之此雖合汗下亦不可過也汗多則亡陽下多則亡隂亡陽則損其氣亡隂則損其形初所謂表裏不和須汗下之表裏已和是宜治之在經也其中府者面顯五色有表證而脉浮惡風惡寒拘急不仁或中身之後或中身之前或中身之側皆曰中府也其治多治中中藏者唇吻不收舌不轉而失音鼻不聞香臭耳聾而眼瞀大小便秘結皆曰中藏也中藏之病難治也六府不和留結為癰五藏不和九竅不通患此乃在經也初證旣定宜以大藥養之當順時令而調隂陽安臟腑而調榮衞少有不愈者也風中府者當以加减續命湯隨證發其表如兼中藏則大便多秘澁宜以三化湯通其滯初證已定别無他變以大藥和治之大扺中府者多著四肢中藏者多滯九竅雖有中府者多兼中藏之證至於舌強音失服大藥能自愈也有中風濕者夏月多有之其證身重如山不能轉側宜除風勝濕去熱之藥切不可針灸治之氣血痰水受病於内者也風寒暑濕致冦於外者也人之一身血氣旣虛隂陽不守飲食居處嗜慾無節衝風卧地調䕶不加於是經絡空踈腠理開徹風邪乘其虛而入之挾熱則痿墮緩遲挾寒則急痛拘攣自其邪氣之入人也邪氣反緩正氣反急正氣引邪為喎僻為竄視為掣縱為搐搦為癱瘓為反張在於陽則皮膚緩在於陰則為腹裏急緩則四肢不能收急則一身不能仰皆隨其邪氣所至表裏淺深而有證也種類雖多大要有四血氣偏虛身不遂肌肉枯瘦骨間疼痛謂之偏枯神智不亂身體無痛四肢不舉一臂不隨謂之風痱能言則可治忽然迷仆舌强不語喉中窒塞噫噫有聲謂之風癔身有汗則生風寒濕三氣合而為痺其人肉厚身頑不知痛癢風多則走注寒多則疼痛濕多則重着在筋則筋屈而不伸在脉則血凝而不流在骨則不仁在肉則癃重夫是之謂風痺傷風一證發熱煩燥頭疼靣光惡風自汗蓋風能散氣故有寒也風家脉浮者病在表脉實者病在裏脉虛者病在臟脉促者病在上浮則發散實則踈導虛則温之脉促於上而病人壯威胷喉澎湃者𤓰蒂散少少吐之俗謂熱則生風大綱然爾多有胃虛氣虛血虛虛極而生風者若諸虛證候天雄附子官桂川烏又必不可闕治法大要盡以消痰順氣為先順氣用南木香蘇合香圓輩消痰用南星半夏細辛殭蠶輩如石緑鐵􅆋水銀輕粉鉛霜朴硝等劑謹勿妄施寒毒入胃則血脉凝澁眞氣消鑠不旋踵為廢人治風良劑小續命湯為主排風湯次之然此二藥主風不主氣須以人參順氣散烏藥順氣散佐助其間氣一流行則風亦踈散矣至若口開手散㵼血遺尿眼合不開汗出不流吐沬氣粗聲如鼾睡靣緋靣黑髮直頭摇手足口鼻青冷口噤而脉急數皆為不治之證若中於肝者人迎與左闗上脉浮而弦靣目多青惡風自汗左脇偏痛中於心者人迎與左寸口脉洪而浮靣舌俱赤翕翕發熱瘖不能言中於脾者人迎與右闗上脉浮㣲而遲四肢怠惰皮肉瞤動身體通黄中於肺者人迎與右寸口脉浮濇而短靣浮色白口燥多喘中於腎者人迎與左尺脉浮而滑靣甘色黑腰脊痛引小腹隠曲不利中於胃者兩闗並浮而大額上多汗膈塞不通食寒則泄凡此風證或挾寒則脉滯浮遲挾濕則脉浮滯濇二證俱有則從偏勝者治之若因七情六淫而得之者當先調氣而後治風邪倉卒之際救此急證宜先以皂角細辛搐入鼻内通其闗竅次以蘇合香丸搽牙連進以生薑自然汁并三生飲候其甦醒然後次第進順氣排風續命之類張仲景曰欲療諸病當先以湯蕩滌五藏六府開通諸脉治道隂陽破散邪氣潤澤枯朽悦人皮膚益人氣血水能浄萬物故用湯也若四肢病久風冷發動次當用散逐邪風氣濕痺表裏移走居無常處者散當平之次當用丸丸藥者能逐風冷破積聚消諸堅癖進飲食和榮衛能參合而行之者可謂上工故曰醫者意也又曰不須汗而强汗之者出其津液枯竭而死須汗而不與汗之者使諸毛孔閉塞令人悶絶而死又不須下而强下之者令人開腸洞泄不禁而死須下而不與下之者使人心内懊憹脹滿煩亂浮腫而死人不須灸而强灸之者令人火邪入腹干錯五藏重加其煩而死須灸而不與炙之者令人冷結重凝久而彌固氣上衝心無地消散病篤而死風者百病之長善行而數變位列東方甲也時春升也人甲膽乙肝是也四氣調神論云春二月此發凍發皮毛發腠理三冬陳積惡氣是明發汗宜陽氣升天地俱生萬物以榮生而勿殺予而勿奪賞而勿罰春氣之應養生之道也或曰此論春時之令生養之道人病八風所害難入此説荅曰素問之道皆謂人養生失宜而作病也至真大要論四反治為證當通用順月令升發以滋陽道而反補之為之治至自古立方治風之藥皆辛温温補東方之氣辛補風之散辛温氣味皆大補甲膽乙肝足可因以明其通因通用及於發散之理非便下也經云風從上受之惟宜宣發以去之針刺論云夫邪氣之客於形也必先舍於皮毛留而不去入舎於經脉内連五臟散於脾胃隂陽俱感五臟乃傷此邪之從皮毛而入極於五臟之次也如此則治其經焉凡治諸病先别隂陽故經云陽盛隂虛下之則愈汗之則死仲景云發表攻裏本自不同夫八正之氣風其至以時乃生萬物者也切避其寒暑有和風有大暑風有凉風有寒折木風衝後八風人中則病謂之虛風冬天大寒之風中人則暴死治之大要先針刺皮毛經絡以出其血無令邪氣得入於經脉百病皆然俱出皮毛間血絡也若冬月閉宻陽氣不令妄泄至春氣升旺之時故膽風得用事矣此由脾胃榮氣上行者是也故曰清陽為天清氣出上竅耳目口鼻舌喉也清陽發腠理津液上行於皮毛養血脉七神所依元氣因流者也清氣實四肢清陽之氣護衛皮毛邪不得犯充塞天地在人則安皮毛可開闔者也明春升肝膽之上衝於天即謂之穀氣一體不須兩認胃之穀氣大矣哉滋養天真元氣此即七神主萬化者也又云榮氣常與衛風相合隨此即春風肝膽之氣故風不可折也治法正則周身元氣不差忒矣豈可便以大苦寒之劑妄下之及龍麝硃砂牛黄諸鎮墜之藥㵼之惟其不知而妄用以致傷生是失内經之旨故也中風附論夫風天地山川之氣也所發逺近有二焉一者天地八方五行四時之氣為近風春秋冬夏各依其所時從東西南北天涯地際八卦之鄉來者為逺風温涼寒暑從㣲至盛各隨其孟仲季以順十二月周一歲也温涼寒暑之氣是風也動則靡靡然静則含含爾是天地之風經曰邪風者非是時行乗節之風亦非山川鼓振之風是人間庭巷門户窓牖之逕氣爾天無風之日其恒有逕氣人長居其間日月積久乃能虛人膚肉入人百脉流注五藏六府則致生病焉凡四時風者春九十日名曰清風傷人為肝風夏九十日名曰陽風傷人為心風秋九十日名曰涼風傷人為肺風冬九十日名曰寒風傷人為腎風其分布八方亦異名也太一神之隨其節居其鄉各至四十五日風雲皆應之東北方艮之氣立春王名為條風一名為㐫風王四十五日東方震之氣也春分王名為明庶風一名嬰兒王四十五日東南方巽之氣立夏王名為清明風一名弱風王四十五日南方離之氣夏至王名為景風一名大弱風王二十七日合仲夏也仲夏中央之氣戊已王十八日合夏至都四十五日王皆同在此仲夏者非孟仲之仲是天地之仲正中五行之所會四季之所同其一節而火土二氣王之分夏數為二位故為仲夏也西南方坤之氣立秋王名為涼風一名謀風王四十五日西方兑之風秋分王名為閶闔風一名剛風王四十五日西北方乾之氣也立冬王名為不周風一名折風王四十五日北方坎之氣冬至王名為廣莫風一名大剛王四十五日由此四風之變而生八風八風者八方之風也若從其鄉來者主長養萬物則人少病若不從其鄉來而從所勝來者為賊邪害於萬物則人多病是故聖人云避風如避矢然風之傷人或為熱中或為寒中或為厲風或為偏枯或為癱瘓或角弓反張風善行而數變其病各異其名不同也中風者凡風之傷人或為寒中或為熱中或為厲風或為偏枯或為賊風故以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以四季戊巳傷於風者為脾風以秋庚辛傷於風者為肺風以冬壬癸傷於風者名為腎風風中五藏六府之腧亦為藏府之風各入其門户所中則為偏風風氣循風府而上則為腦風風入則為目風眼寒飲酒中風則為漏風入房汗出則為内風新沐中風則為首風久風入中則為腸中風外在腠理則為泄風故曰風者百病之長也至其變化乃為他病無常方焉是知風者善行而數變者在人肌膚中内不得泄外不得散因人動静乃變其性有風遇寒則飲不下遇熱則肌肉消而寒熱有風遇陽勝則不得汗遇隂勝則汗自出肥人有風肌肉厚則難泄喜為熱中目黄瘦人有風肌肉薄則常外汗身中寒目淚出有風遇於虛腠理開則外出凄淒然如寒狀覺身中有水淋狀時如竹管吹處此是其證也有風遇於實腠理開則内狀令人熱悶是其證也肝中風者人迎并左闗上脉浮而弦在天為風在地為木在人藏為肝肝虛喜中風為類相從故脉應在左闗肝風之狀多汗惡風色㣲蒼頭目瞤左脇偏痛嗜甘如阻婦狀筋急攣痺不伸診在目其色青心中風者人迎與左寸口脉洪而浮在天為熱在地為火在人藏為心心虛因重邪風乃子母相因故脉應在左寸口心風之狀多汗惡風色㣲赤翕翕發熱瘖不能言不欲食食則嘔診在舌其色焦赤脾中風者人迎與右闗上脉浮而㣲遲在天為濕在地為土在人藏為脾脾虛因中風邪為勝尅故脉應在左闗上脾風之狀多汗惡風面黄四肢怠惰皮肉瞤動發熱短氣不欲飲食嗜卧如醉人診在唇其色黄肺中風者人迎與右寸口脉浮濇而短在天為燥在地為金在人藏為肺肺虛因中邪風為乗尅故脉應在右手寸口肺風之狀多汗惡風色皓然白口燥而喘逆氣肩息身重背痛靣脹腫晝瘥暮甚診在鼻其色白腎中風者人迎與左尺脉中浮而滑在天為寒在地為水在人藏為腎腎虛因中邪風為子母相感故脉應在左尺中腎風之狀多汗惡風色如炲靣龎然浮腫腰脊痛引小腹隠曲不利昏寢汗愈多志意惶惑診在耳其色黑胃中風者人以胃為藏海納五味以滋養五藏虛而中邪風故其狀額多汗飲食不下膈塞不通腹善滿失衣則䐜脹口肩息心下淡淡食寒則泄大腸中風者卧而腸鳴不止灸大腸腧百壯可服續命湯賊風邪氣所中則傷於陽外先受之客於皮膚内傳入於經脉經脉滿則入於絡脉絡脉滿則輸於大經中或病歸於六府則為熱不時卧止為啼哭其脉堅大為實實者外堅中滿不可按之按之則痛也經絡諸脉傍支去者皆為經脉也凡中風脉無不大者非熱也暴風脉也中風有冷熱陽病則熱隂病則冷冷則用温風藥熱則用涼風藥不可一槩用也凡中風皆不可吐出涎人骨節中皆有涎所以轉動滑利中風則涎上潮咽喉中滚響以藥壓下涎再歸骨節可也不可吐出若吐出涎時間快意不久枯了手足不可不戒小兒驚風亦不可吐出涎其患與大人同方其發搐搦之時不可捉住手足捉住則涎不歸手足當不隨但寛抱之可也凡中風涎潮於心卒然中倒當時扶入煖室中扶策正坐用好醋炭燻之醋氣衝入口鼻間良久其涎聚於心者自可收歸輕者即甦重者亦省人事惟不可喫一滴湯水入喉如喫湯水則其涎永繫於心終不能去必成廢人不可不知凡中氣口開手撒眼閉遺尿聲如鼾睡髮直吐沫摇頭上攛靣赤如粧或頭靣青黑汗出如珠循衣摸床神昏不語皆死證也盖口開者心氣絶也遺尿者腎氣絶也手撒者脾氣絶也眼閉者肝氣絶也鼻鼾者肺氣絶也中風口噤脉遲浮者吉急實大數者凶凡中風浮緩為癱瘓浮滑為風痰浮實為風實浮細為風虛不浮不沉大小有力息數調勻者可治虛細獨大獨小獨遲者不可治口開者心氣閉絶也遺尿者腎氣閉絶也手撒者脾氣閉絶眼合者肝氣閉絶鼻鼾者肺氣閉絶備此五證尤不可治五證中纔見一證猶當審餘證以救療蓋以初中風則眼合者多痰上則鼻鼾者亦多惟遺尿口開俱見為惡心為五藏主君腎為一身根本誠不可閉絶也方八瓊丹出聖濟總録治五藏中風偏風賊風偏枯手足不隨硫黄水銀二味同結作沙子曾青丹砂雄黄白石英紫石英鉛丹𤣥精石胡粉各一兩硝石二兩以上十一味各細研入磁合盛合上留一眼子外用六一泥固濟畢候乾以文火養一復時後閉合眼子用大火燒令通赤去火放冷取去以紙裹藥地内埋三日去火毒取去研令極細入後藥龍腦麝香牛黄天竺黄并細研琥珀虎骨酥炙甘草炙烏蛇酒浸三日去皮骨炙天南星炮天麻白附子炮麻黄去根節乾蠍炒桂去粗皮木香附子炮裂去皮檳榔剉獨活去蘆頭細辛去苖葉阿膠打碎炒燥各一兩白术白殭蠶炒犀角鎊羚羊角鎊芎藭蟬蛻去土膩粉研各半兩右除前煆研外餘搗研為末再同研勻煉蜜和擣一二千下丸如小彈子大毎服一丸細嚼以豆淋酒下輕病只温酒嚼下靈寳丹出聖濟總録治諸中風凡人生自㓜稚至於老耄率多因風而致疾或吃食傷飽或不食失飢或渴而失飲或飲而過量或因五味之傷或冐熱衝風或大寒近火或暴露寒濕或刺損肌膚撲傷肢體或失節宣或多嗜慾縁此風趨諸竅或留一偏遂使手足不隨言語蹇澁或痛連骨髓或痺襲皮膚瘙癢如蟲行􅍙痺如鐵石或多痰好睡或健忘多嗔血脉不行面色乾瘦久在牀枕起便須人語澁靣浮精神困耗皆其證也若積嵗不愈肢節不能運動者但如法服十數粒即效亦有中風絶斃者但心頭未冷取藥五粒以醋調摩臍中一千餘遍但從臍四靣漸煖待眼開後以熱醋研下十丸入口即活凡病不問輕重年月深淺先以紅雪通中散三錢茶調下湏臾更以熱茶投令宣㵼一兩行便依法煎薑豆湯下三粒當以他人熱手更摩所患處湏臾熱徹當覺肉内有物如火至病所一二百日内及一年内風疾不能下牀者一服三粒十服後便可行歩如患至重者每利一度後隔日服五粒又住三五日即更利不過三十粒平復如故若打撲損多年每遇天隂疼痛舉動不能者可五七服服此藥多者疾去後藥力常在具方如後丹砂一兩半研如皂子大絹袋盛以􅘹麥下汁煑三復時取出研如粉硫黄一兩碎如皂子大絹袋盛以無灰酒煑三伏取出研如粉自然銅一兩先搗碎更研如粉雄黄一兩碎如皂子大絹袋盛以米醋煑三復時取出研如粉右四味用有盖缾子先以金箔三片鋪缾底上便入硫黄又以兩片蓋之次入雄黄又以金箔兩片蓋之次入丹砂又以金箔兩片蓋之次入自然銅又以金箔三片蓋之以缾蓋合却不用固濟於灰池内坐缾子令穏以火養三日三夜第一日用熟炭火半斤圍缾子去缾子三寸第二日用熟炭火十兩去缾子二寸半第三日用炭一斤去缾子二寸以火盡為度候冷取藥出以紙三重裹藥於浄濕土中培至來旦取出更研令細磁石煆醋淬一七遍搗研如粉陽起石研如粉理石研如粉紫石英研如粉右四味各三分用有蓋磁缾子先入磁石陽起石次入理石次入紫石英其所入金箔一依前法以蓋合之不用固濟用火養三日三夜第一日用熟火一斤去缾子三寸第二日用炭三斤去缾子二寸半第三日用炭半秤去缾子二寸一日至夜任火自消候冷取出藥用紙裹入濕土中培至來旦取出更研令細牛黄龍腦麝香腽肭臍酒刷炙龍齒虎頸骨酒塗炙令黄右六味各一兩搗羅為末更研如粉石鍾乳十兩以絹袋盛先以長流水煮半日後棄水别用水五斗煎取一斗留煮後草藥外更留鍾乳水三合磨生犀角三分苦參逺志去心巴㦸天去心烏蛇酒浸去皮骨炙仙靈脾天麻各一兩一分右七味搗羅為末以前鍾乳水一斗煎至七升用生絹濾去滓澄清木香肉豆䓻去殻鹿茸去毛塗酥炙桂去皮炙一兩半延胡索梧桐淚各三分右六味搗為末以前鍾乳汁七升煎至四升以生絹濾去滓澄清半夏湯洗七遍去滑當歸切焙各一兩右二味搗羅為末以前鍾乳汁四升煎至三升以生絹濾去滓澄清芒硝一兩細研生地黄汁一升無灰酒一升童子小便一升皂子仁一兩半搗羅為末右以地黄汁等通前三升計六升貯鍋中於静室内以文火養至一升下金石藥末在内以桞棍木攪勿令住手稀稠得所去火然後入牛黄等六味攪令極勻即下皂子仁末及磨下犀角水以綿濾過入在藥内研於鉢内以乳椎磨三五千轉此藥黏如膠須用力研之研訖分為三分内一分入上件芒硝則更令勻並丸如梧桐子大此藥三名一名歸命丹一名返魂丹入芒硝者名破棺丹如有中一切風牙闗𦂳急及尸厥暴亡者以熱醋研三兩丸灌在口中下得咽喉中即活如要常服空心温酒下二丸七寳膏出聖濟總録治中風涎潮言語蹇澁精神恍惚煩悶内熱氣在下使大腸袐澁氣熱乘虚上衝則神志昏昧宜順三焦化痰牛黄麝香龍腦丹砂雄黄各一分同研天竺黄白殭蠶炒白花蛇酒浸去皮骨炙白附子炮天麻各半兩蠍稍炒一分天南星酒浸一宿切作片子焙半兩膩粉眞珠末各研一分蛇黄煆醋淬自然銅煆醋淬七遍鐵粉研銀礦煆乳香研蘆薈研犀角鎊鉛白霜研各一分龍膽桑螵蛸炙芎藭人參胡黄連原蠶蛾炒各半兩右為末煉蜜為丸如皂子大毎服一丸薄荷湯化下食後臨卧服卒病不拘時服呉秦艽散出千金方治風注入肢體百脉身腫角弓反張手足酸痛皮膚習習身體盡痛睂毛墮落耳聾驚悸心滿短氣魂志不定隂下濕癢大便有血小便亦黄五勞七傷萬病皆治秦艽蜀椒人參茯苓牡蠣細辛括蔞根麻黄各十八銖乾薑附子白术桔梗桂心獨活當歸各一兩黄芩柴胡牛膝天雄石南杜仲莽草烏頭各半兩甘草芎藭防風各一兩半右為治下篩盛以葦袋食前温酒一升服方寸匕日三服急行七百歩更飲酒一升忌如常法至聖太乙散出聖濟總録治中身癱瘓半身不隨口眼喎斜語言蹇澁形神如醉驚悸狂言夜卧不安或周身麻痺皮膚不知痛癢四肢不舉身重如石腰膝强鯁或筋脉拘攣瘛㿅不能行歩百闗壅塞痰涎痞滯或卒急中惡客忤尸注鬼氣邪魘尸厥暴亡不省人事等疾犀角鎊仙靈脾眞珠末滑石胡黄連惡實炒人參地丁草去根白茯苓去皮蠶沙炒􅀈硝研板藍根鬱金各一兩大黄牛黄研血竭研木通剉梔子仁馬牙硝蒼术剉去黑皮荆芥穗芍藥延胡索瑇􅈘鎊琥珀研各半斤甘草炙二兩半右為末如中風不語用新水調下一錢匕如口噤即灌下若能咳𠻳夜半當省人事灌藥四服後不咳𠻳者必不可救卒中惡風涎不止用白􅈨半錢匕太乙散一錢匕和勻以新水調下謾謾灌之即活龜角湯出聖濟總録治中風手足不隨舉體疼痛或筋脉攣急龜板醋炙虎骨醋炙各六兩海桐皮羌活去蘆頭丹參獨活萆薢牛膝去苖酒浸切焙五加皮酸棗仁炒各三兩附子炮裂去皮臍天雄天麻去蒂防風威靈仙去土芎藭各二兩半當歸切焙桂去粗皮紫參各三兩薄荷焙乾六兩㯽榔煨六兩菖蒲九節者去鬚米泔浸後切焙一兩半右剉如麻豆每用八錢匕水一盞酒一盞生薑十片同煎去滓取一大盞温分三服空心日午夜卧服要出汗併二服如人行五里以熟生薑稀粥投厚衣覆汗出愼外風通神散出聖濟總録治中風昏憒肢體不收不以急緩烏蛇去皮骨酒浸炙躑躅花酒浸炒蟬蛻生用天南星生薑汁浸炒乾麻黄去根節天麻酒浸炙牛膝酒浸切焙防己剉羗活去蘆頭獨活去蘆頭地龍去土生用石斛去根酒浸炒桂去粗皮皂莢去皮子酒浸炒乾蠍生用附子炮裂去皮臍白附子半生半炮烏頭炮裂去皮臍丹砂别研各一兩麝香别研半分右除别研外搗羅為散毎服一錢至二錢匕温酒調下日三服大麻仁丸出聖濟總録治中風諸疾大麻仁研吳茱萸湯浸焙炒麻黄去根節枳殻麸炒去穰白芷各半兩天雄炮裂去皮臍當歸切焙各一兩一分茯神去木三分秦芁去土細辛去苖葉烏頭炮裂去皮臍白术天門冬去心炒獨活去蘆頭蜀椒去目并閉口炒出汗防風去义羚羊角鎊桂去粗皮各一兩白㯽榔煨一兩半熟乾地黄切焙三兩右為末煉蜜和丸梧桐子大每服空心温酒下三十丸日三服四白丹出保命集治能清肺氣養魄中風者多風冐氣不清和也白术人參縮砂白茯苓香附子甘草防風川芎白芷白檀知母羌活薄荷獨活細辛麝香一錢别研龍腦半錢别研牛黄半錢别研藿香一錢半淡竹葉二兩右為細末煉蜜為丸每兩作十丸臨卧嚼一丸煎愈風湯嚥下能上清肺氣下强骨髓大秦艽散出危氏方治風壅痰盛四體重者或軟瘓疼痛或拘攣麻痺顫掉口乾目赤煩熱睡卧不寧條參去蘆川羌活去蘆枳殻去穰赤芍藥苦梗去蘆前胡川芎白芷黄芩薄荷天麻桑白皮去赤防己防風粉草荆芥穗木𤓰赤茯苓川牛膝去苖各等分右剉散每服四錢水一盞半生薑三片煎温服不拘時候一服羚羊角丸出聖濟總録治手足中風􅍙痺行履艱難羚羊角屑桂去粗皮白㯽榔煨剉五加皮剉人參丹參栢子仁枳殻去穰麸炒附子炮裂去皮臍杏仁去皮尖及雙仁炒黄各一兩半茯神去木防風去义熟乾地黄焙麥門冬去心焙各二兩南木香牛膝酒浸切焙各一兩薏苡仁二兩半右搗羅極細煉蜜和丸梧桐子大每服空心温酒下三十丸日二服大鐵彈丸出直指方治中風癱瘓口眼喎斜筋骨攣痛肢體麻木自然銅燒紅醋淬七次兩半虎頸骨酒浸黄炙當歸酒浸焙白附子炮川烏炮去皮臍五靈脂炒麻黄去節各一兩没藥乳香全蠍焙安息香白芷直殭蠶炒去絲各半兩烏蛇肉酒浸焙乾三分木鱉二十一箇去殻炒熟硃砂麝香各一分右為末以酒煮安息香入飛白麫糊為丸彈子大每服一丸温酒磨下防風通聖散出保命集治一切風熱鬱結氣血濕滯筋脉拘攣倦手足麻痺肢體焦痿頭痛眩暈腰脊强痛耳鳴鼻塞口苦舌乾咽嗌不利胷膈痞塞咳𠻳喘滿涕唾稠粘腸胃燥澁便溺淋悶或腸胃藴熱鬱結水液不能浸潤於周身而為小便出多者或濕熱内甚而有澼泄者或表之正氣與邪熱併甚於裏陽極似隂而寒顫煩渴者或熱甚變為瘧疾久不巳者或風熱走注疼痛頑麻者或腎水隂虛心火陽盛熱暴甚而中風或暴瘖不語及暗風癎或破傷中風時發潮搐并小兒熱甚驚或㿀疹未出不快者更熱劇黑䧟將欲死或風熱瘡疥久不愈者并解酒熱毒及調理傷寒發汗不解頭項肢體疼痛宜服之防風川芎當歸芍藥大黄芒硝連翹薄荷已上各半斤麻黄去節半兩石膏桔梗黄芩各一兩白术山梔子荆芥穗各三錢滑石二兩甘草一兩一方去芒硝加牛膝半兩酒浸人参半兩半夏一兩生薑製右為粗末每服一兩生薑同煎日再服若勞汗當風為皶鬱及痤勞汗出於𤣥府脂液所凝去芒硝加芍藥當歸若生瘾疹或赤或白倍加麻黄鹽䜴葱白出汗麻黄去節亦去芒硝若依前方中加四物黄連解毒三藥合而飲之日二服若小便淋閉去麻黄加滑石連翹煎藥湯調木香末二錢匕若腰脇疼走疰疼痛加硝石當歸甘草一服内各二錢調車前子末海金沙末各一錢若破傷風每一兩加荆芥穗大黄各二錢調全蠍末一錢𦍑活末一錢若諸風搐小兒急謾驚風大便結秘邪熱暴甚腸胃乾燥寢汗㕮牙上竄睡諸筋轉驚悸肌肉瞤動毎一兩加大黄二錢梔子仁二錢調茯苓三錢羗活末一錢若利四時傷寒内外所傷每一兩加益元散一兩葱白十莖鹽豉一合生薑半斤雨水一碗同煎五七沸温服以筯投之吐罷後服一半稍熱服汗出立解飲酒中風身熱頭疼如破者加黄連鬚二錢葱白十莖依法立愈若頭旋腦熱鼻塞涕時下每一兩加薄荷黄連各二錢半若風傷於咳𠻳喘急每一兩加半夏桔梗紫蘇各二錢若撲傷損肢節疼痛腹中惡血不下每一兩加當歸大黄各三錢半調没藥乳香末各二錢宣明論方有縮砂無芒硝名賈同知通聖散内經曰膽移熱於腦則辛額鼻淵鼻淵者濁涕下不已也王注曰膽液下澄則為濁涕下不已如水泉故曰鼻淵也此為足太陽脉與陽明脉俱盛也如氣逆者調木香末一錢乳香末二錢硫黄大黑神丸出聖濟總録治中急慢風白殭蠶炒桂去粗皮天南星炮各半兩牛膝炒令烟出乾蠍酒炒人參白茯苓去黑皮各一分麻黄去根節先煎掠出沬焙乾二兩天麻一兩半白附子炮烏蛇酒浸去皮骨炙白花蛇酒浸去皮骨炙硫黄研丹砂研水銀各一兩雄黄研半兩右前一十二味搗羅為末各頓一處後四味各細研用銚子先下硫黄銷後下丹砂水銀雄黄文武火結成砂子待冷刮取搗羅為末先取一磁缾上磨瓦一小片作蓋子鑽一竅可度得菉豆用六乙泥固臍缻子火熁令乾却入沙子末在缻内按令平實然後下蓋子泥合縫留竅子候乾用火半秤四靣約四寸巳來燒至一日須更加火漸近缾子待黑氣出盡後取濕紙搭缾竅上如紙纔乾便易之至三十易為止待冷取出細研以酒浸潤一宿再焙為末每石藥末一兩入前藥末二兩同研取勻煉蜜丸如雞頭實大中風者以豆淋酒研下一丸至二丸以厚衣服覆出汗未汗更服用生薑熱稀粥投汗出愼外風大秦芁湯出保命集治中風外無六經之形證内無便溺之阻隔知為血弱不能榮筋故手足不能運化强舌不能言宜養血而筋自榮也秦芁石膏各二兩甘草川芎當歸羗活獨活防風黄芩白芍藥白术吳白芷生地黄熟地黄白茯苓各一兩細辛右剉每服一兩水二盞煎至一盞去滓温服無時如遇天隂加生薑七八片如心下痞每服一兩内加枳實一錢同煎亦作備急黑神丸出聖濟總録治中風雄黄研硇砂研丹砂研硫黄研水銀先以慢火生鐵銚内鎔硫黄銷始傾入水銀急以火筯攪恐熖起即離火以濕布搭滅候冷刮取與上三件同搗研右五味各一兩取一湖南燒藥罐子先用六一泥固臍待乾入上件研者末都入罐子中實按令平連蓋子泥四縫只留一寸縫不泥合漫火勻養一復時加火進罐子燒令通赤縫中有煙熖出急抽火令人按蓋子急泥合縫令徧用浄篩土窨定藥罐子不得令露透出藥氣上以大盆蓋之來日取出搗羅用濕重帛包褁以浄濕土内窨盆合出火毒三日三夜逐日起盆㣲晒十日滿取藥再研如粉入後藥末犀角鎊一兩牛黄研半兩天竺黄研鹿茸酥炙去毛各一兩升麻天麻各一兩木香半兩乾蠍酒炒一兩阿膠漫火炙燥二兩天南星牛膽煮一復時曝乾一兩右將後十味除研外搗羅為末次入牛黄天竺黄并將前研五味再同研勻用青州大棗蒸熟去皮核研如膏和藥搗一千杵丸如梧桐子大中風急風牙闗急口噤不開用豆淋酒生薑酒粟米粥合此藥宜三月三日五月五日或臘月於浄室中焚香齋沐脩合切忌禽獸并婦人等見五積散出如宜方陳皮製六兩麻黄三兩枳殻六兩白芍藥川芎當歸甘草炙茯苓半夏製肉桂白芷各三兩厚朴乾薑各四兩蒼术製二十四兩桔梗十二兩右㕮咀漫火炒令色轉續入肉桂枳殻薑葱煎去麻黄合和氣飲入麝香一方只加乳香蘇合香丸出如宜方治卒然眩暈白术青木香硃砂烏犀屑沉香麝香訶黎勒丁香蓽撥白檀香香附子已上各二兩薰陸香龍腦各研蘇合香各一兩安息香二兩八錢為末用好酒一升熬成膏將蘇合油入之右末入研藥令勻用安息香膏同白蜜和成劑臨用時旋丸又擦牙闗或薑汁化下仍宜皂角細辛末搐鼻通闗竅太乙赤丸出聖濟總録治中風積涎在膈下四肢癱瘓或不知人事丹砂硇砂硼砂鉛白霜粉霜硫黄細研各半兩金箔銀箔各十片與前六味同研紫石英研天麻羗活去蘆頭獨活去蘆頭巴豆去心膜出油盡牛膝炒煙出各半兩右為末用黄蠟三兩鎔作汁拌諸藥乘熱丸如雞頭實大用丹砂為衣入磁合盛每服一丸用糯米飲半盞龍腦膩粉各少許薄荷自然汁同化下取下風痰為效普濟方卷八十七
