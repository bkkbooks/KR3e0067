body:
  text: 普濟方卷九明周王朱橚撰運氣圖少陽相火司天厥陰風木在泉中見太宫土運嵗土太過氣化運行先天火化為天氣清化為左間黅化為司氣故天氣正而其政嚴酸化為地氣灼化為居氣藏化為右間故地氣擾而其令撓風迺暴舉木偃沙飛炎火迺流陰行陽化雨廼時應火木同徳上應熒惑嵗星其榖丹蒼故風熱參布雲物沸騰太陰横流寒廼時至凉雨並起雨化五風化八正化度也羽蟲靜毛蟲育嵗物之宜也倮蟲耗清毒不生地氣制之也民感其氣者其病寒中外發瘡瘍内為泄滿聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上沸腫色變是嵗陽為天氣陰為地氣中見土運木生火火生土下生上天氣盈宜於年前先取化源以平天氣之火抑其運土贊所不勝暴過不生苛疾不起嵗宜辛宜酸滲之泄之漬之發之運異風熱少運寒化其化上醎寒中酸和下辛凉藥食宜也嵗半之前少陽主之火淫所勝則温氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黄赤𫝊而為水身面胕腫腹滿仰息泄注赤白瘡瘍欬唾血煩心胸中熱甚則鼽衂病本于肺診在手天府之脈法宜平以醎冷佐以苦甘以酸收之以苦發之以酸復之歳半之後厥陰主之木能勝土地氣制運風淫于内地氣不明平野昩草廼早秀民病灑灑振寒善呻數欠心痛支滿兩脇裏急飲食不下膈咽不通食則嘔腹脹善噫得後與氣怏然如衰身體皆重宜治以辛以甘緩之以辛散之嵗運之化主太過紀曰敦阜是謂廣化厚徳清靜順長以盈至陰内實物化充成煙埃䑃鬱見於厚土大雨時行濕氣迺用燥正廼辟其化圓其氣豐其政靜其令周偹其動濡積并稸其徳柔潤重淖其變震驚飄驟其化兼其所勝其病腹滿四肢不舉故曰嵗土太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩􅁈甚則肌肉萎足痿不收行善瘈脚下痛飲發中滿食减四肢不舉變生得位風雨大至其病腹滿溏泄腸鳴反下其診在足太谿之脉其法治以醎和初之氣自癸未年大寒寅初至是歳春分日子初凡六十日八十七刻半主位太角木客氣少隂火中見土運木生火地氣遷風勝廼搖寒廼大温草木早榮寒來不殺温病乃起其病氣怫於上血溢目赤欬逆頭痛血崩脇滿膚腠中瘡宜治少隂之客以醎補之以甘㵼之以酸收之歳穀宜丹間穀宜豆二之氣自春分日子正至小滿日戌正凡六十日有竒主位少徵火客氣太陰土中見土運氣與運同火反鬰白埃四起雲趨雨府風不勝濕雨廼零民廼康其病熱鬰於上欬逆嘔吐瘡發於中胸嗌不利頭痛身熱昬憒膿瘡宜治太隂之客以甘補之以苦㵼之以甘緩之歳穀宜蒼間榖宜麻是氣也用凉逺凉無犯司氣之凉三之氣自小滿日亥初至大暑日酉初凡六十日有竒主位少徵火客氣少陽火中見土運火當其位天政布炎暑至少陽臨上雨廼涯民病熱中聾瞑血溢膿瘡欬嘔鼽衂渴嚏欠喉痺目赤善暴死宜治少陽之客以醎補之以甘㵼之以醎耎之歳穀宜丹間穀宜豆四之氣自大暑日酉正至秋分日未正凡六十日有竒主位太宫土客氣陽明金中見土運嵗土得位與金相生涼迺至炎暑間化白露降民氣和平其病滿身重宜治陽明之客以酸補之以辛㵼之以苦泄之嵗榖宜蒼間榖宜黍五之氣自秋分日申初至小雪日午初凡六十日有竒主位少商金客氣太陽水中見土運金生水陽迺去寒迺來雨迺降氣門迺閉剛木早凋民病寒邪君子周宻是嵗土運制之寒邪迺㣲宜治太陽之客以苦補之以鹹耎之以苦堅之以辛潤之嵗穀宜蒼間穀宜稷終之氣自小雪日午正至大寒日辰正凡六十日有竒主位太羽水客氣厥隂木地氣正風迺至萬物反生霿霧以行其病闗閉不禁心痛陽氣不蔵而欬宜治厥隂之客以辛補之以鹹潤之以酸㵼之以甘緩之嵗穀宜丹間穀宜稷六氣之治此其道也若乃嵗氣之交有勝氣者必有復氣天氣火勝者當有太陽之復氣地氣風勝者當有陽明之復氣各依其復法治之陽明燥金司天少陰君火在泉中見少商金運嵗金不及氣化運行後天少商之金不及而同天化是謂天符又金運臨酉是謂嵗㑹上與天符下與嵗㑹三合為治名曰太乙天符氣至平也平金之嵗紀曰審平收而不爭殺而無犯五化宣明其氣潔其性剛其用散落其化堅歛其政勁肅其候清切其令燥其類金其應秋其榖稻其果桃其實殻其蟲介其畜鷄其色白其味辛其音商其數九其物外其在人也其藏肺其主鼻其養皮毛其病欬此運化也天地之氣為燥化左間為蔵化右間為明化故天氣急而其政切地氣為苦化左間為柔化右間為動化故地氣明而其令暴陽専其令炎暑盛行物燥以堅淳風廼治風燥横運流於氣交多陽少隂雲趨雨府濕化廼敷燥極而澤蟄蟲廼見流水不氷金火合徳上應太白熒惑其榖白丹間榖命太商者其耗白甲品羽故曰熱化氣化勝復同邪氣化度也燥化四清化四熱化二正化度也嵗物之宜則介蟲靜羽蟲育地氣所制也則介蟲耗寒毒不生是以清熱之氣持於氣交清先而勁毛蟲廼死熱後而暴介蟲迺殃其發燥民病欬嗌塞寒熱發暴振慄癃悶嵗半之前陽明主之其化燥者天之政也嵗半之後少陰主之其令熱者地之化也金為天氣火為地氣火能勝金遇太乙天符命象自平不資化源惟安其運金無使受邪食白丹之榖以安其氣食間氣之榖以去其邪嵗宜以醎以苦以辛汗之清之散之其運同清宜多地化其化上苦小温中苦和下醎寒藥食之宜也初之氣自甲申年大寒日已初至是嵗春分日夘初凡六十日八十七刻半主位大角木客氣太陰土中見金運土金相生地氣遷陰始疑氣始肅水廼氷寒雨化其病中熱脹面目浮腫善眠鼽衂􅅉欠嘔小便黄赤甚則淋宜治太陰之客以甘補之以苦㵼之以甘緩之嵗榖宜白間榖宜麻雖有濕化不能為邪二之氣自春分日夘正至小滿日丑正凡六十日有竒主位少徵火客氣少陽火中見金運二火相加陽廼布民廼舒物廼生榮厲大至民善暴死是嵗金氣平雖有厲疾不至夭横宜治少陽之客以醎補之以甘寫之以醎耎之嵗榖宜白間榖宜豆榖有火化不能為邪三之氣自小滿日寅初至大暑日子初凡六十日有竒主位少徵火客氣陽明金中見金運天符金氣廼平天政布凉廼行燥熱交合燥極而澤民病寒熱宜調陽明之客以酸補之以辛瀉之以苦泄之嵗榖宜白間榖宜黍雖有燥化不能為邪是氣也用凉逺凉無犯司氣之凉四之氣自大暑日子正至秋分日戌正凡六十日有竒主位太宫土客氣太陽水中見金運金水相生寒雨降病暴仆振慄譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之嵗榖宜丹間榖宜稷雖有寒化不能為邪五之氣自秋分日亥初至小雪日酉初凡六十日有竒主位少商金客氣厥陰木中見金運嵗運當位其氣平厥陰居之春令反行草廼生榮民廼和宜調厥陰之客以辛補之以酸瀉之以甘緩之嵗榖宜丹間榖宜稷雖有風化不能為邪終之氣自小雪日酉正至大寒日未正凡六十日有竒主位太羽水客氣少陰火中見金運火能勝金陽氣布候反温蟄蟲来見流水不氷民廼康平其病温宜治少陰之客以醎補之以甘緩之以酸收之嵗榖宜丹間榖宜豆雖有熱化不能為邪此六氣之常也治之大法和者平之客安其氣必清必靜則邪氣自衰歸其所宗此治之大體也太陽寒水司天太陰濕土在泉中見太羽水運嵗水太過氣化運行先天太過而同天化是謂天符平水嵗也水運平者命曰靜順之紀蔵而勿害治而善下五化咸整其氣明其性下其用沃衍其化凝堅其政流演其候凝肅其令寒其類水其應冬其榖豆其果栗其實濡其蟲鱗其畜彘其色黑其味醎其音羽其數六其物濡其在人也其蔵腎其主二陰其養骨髓其病厥此嵗運之化也天地之氣寒化司天動化司氣動化為左間清化為右間故天政所布其氣肅甘化在泉明化為左間灼化居氣為右間故地氣靜而其令徐寒臨太虚其政大舉陽氣不令澤無陽􅆋則發火待時少陽中治時雨迺涯止極雨散還于太陰雲朝北極濕化廼布澤流萬物寒化六雨化五正化度也鱗蟲靜倮蟲育嵗物之宜也鱗蟲不成燥毒不生地氣制之也寒敷於上雷動于下水土合徳上應辰星鎮星其榖𤣥黅寒濕之氣持於氣交民病寒濕發飢肉萎足痿下收濡瀉血溢是嵗水在上土在下土能勝水天氣虚水運符天其氣自平不資化源惟抑運水扶其不勝無使暴過而生其疾嵗宜以苦燥之温之食𤣥黅之榖以全真避虚邪之氣以安其正運與寒同宜燥熱化故曰其化上苦熱中醎温下甘熱藥食宜也嵗半之前太陽主之有本標之化當其時寒熱得中者天之和氣至也嵗半之後太陰主之太陰之化從本當其時濕化應者地之令也初之氣自乙酉年大寒日申初至是嵗春分日午初凡六十日八十七刻半主位太角木客氣少陽火中見水運少陽中治地氣遷氣迺大温草迺早榮民廼厲温病迺作身熱頭痛嘔吐肌腠瘡瘍宜調少陽之客以酸補之以甘瀉之以醎耎之嵗榖宜𤣥間榖宜豆則火不為邪二之氣自春分日午正至小滿日辰正凡六十日有竒主位少徵火客氣陽明金中見水運天凉反至民廼慘草迺遇寒火氣遂抑民病氣鬱中滿寒迺始宜調陽明之客以酸補之以辛瀉之以苦泄之嵗榖宜𤣥間榖宜黍則燥不為邪三之氣自小滿日巳初至大暑日卯正凡六十日有竒主位少徵火客氣太陽水中見水運氣與運相符而天政布寒氣行雨迺降民病寒反熱中癰疽主下心熱瞀悶不治者死宜調太陽之客以苦補之以酸瀉之以醎堅之以辛潤之嵗榖宜𤣥間榖冝稷則寒不為邪是嵗氣也用寒逺寒無犯司氣之寒四之氣自大暑日卯正至秋分日丑正凡六十日有竒主位太宫土客氣厥陰木中見水運水生木風濕交爭風化為雨迺長迺化迺成民病大熱少氣肌肉萎足痿注下赤白宜調厥陰之客以辛補之以酸瀉之以甘緩之嵗榖宜黅間榖宜稷則風不為邪五之氣自秋分日寅初至小雪日子初凡六十日有竒主位少商金客氣少陰火中見水運大火所居陽復化草廼長迺化廼成民廼舒宜調少陰之客以醎補之以甘瀉之以酸收之嵗榖宜黅間榖宜豆則熱不為邪終之氣自小雪日子正至大寒日戌正凡六十日有竒主位太羽水客氣太陰土中見水運得位濕土居之地氣正濕令行陰凝太虚埃昏郊野民廼慘悽寒風以至反者孕迺死宜調太陰之客以甘補之以苦瀉之以甘緩之嵗榖宜黅間榖宜麻則濕不為邪此六氣之化也嵗行平水之化天符為執法邪或中之民有卒急之病經曰中執法者病速而危也厥陰風木司天少陽相火在泉中見少角木運嵗木不及上角與正角同又木不及而同天化是謂天符氣化運行同天木氣適平命曰敷和之紀木徳周行陽氣舒布五化宣平其氣端其性随其用曲直其化生榮其政發散其候温和其令風其類草木其應春其榖麻其果李其實核其蟲毛其畜犬其色蒼其味酸其音角其數八其物中堅其在人也其蔵肝其主目其養筋其病裏急肢滿此嵗運之化也嵗氣之化上見厥陰左間少陰右間太陽故天氣擾而其政撓下見少陽左間陽明右間太陰故地氣正而其令速風生髙逺炎熱從之雲趨雨府濕化迺行風火同徳上應嵗星熒惑其榖丹蒼間榖言太商之榖其耗文角品羽清化熱化勝復同邪氣化度也風化三火化七正化度也毛蟲靜羽蟲育是廼嵗物所宜介蟲耗寒毒不生是皆地氣所制故風燥火熱勝復更作蟄蟲來見流水不氷熱病行於下風病行於上風燥勝復化於中是嵗陰為天氣陽為地氣天氣虚木運符之又木火同徳其氣専不資化源惟贊運木無使邪勝嵗宜以辛調上以醎調下畏火之氣無妄犯之故曰其化上辛凉中辛和下醎寒藥食宜也嵗半之前天氣主之故天布厥陰之政其令風嵗半之後地氣主之地行少陽之令其化火氣化之常也初之氣自丙戌年大寒日亥初至是嵗春分日酉初凡六十日八十七刻半主位少角木客氣陽明金中見木運嵗運得位金燥客之寒始肅殺氣方至民病寒於右之下宜調陽明之客以酸補之以辛瀉之以苦泄之嵗榖宜蒼間榖宜黍則燥不為邪二之氣自春分日酉正至小滿日未正凡六十日有竒主位太徵火客氣太陽水中見木運寒不去華雪水氷殺氣施化霜廼降谷草上焦寒雨數至陽復化民病熱於中冝調太陽之客以苦補之以醎瀉之以苦堅之以辛潤之嵗榖宜蒼間榖宜稷則寒不為邪三之氣自小滿日申初至大暑日午初凡六十日有竒主位太徵火客氣厥陰木中見木運與天符天政布風廼時舉民病泣出耳鳴掉眩冝調厥隂之客以辛補之以酸瀉之以甘緩之嵗榖宜蒼間榖宜稷則風不為邪是氣也用温逺温無犯司氣之温四之氣自大暑日午正至秋分日辰正凡六十日有竒主位少宫土客氣少陰火中見木運溽暑濕熱相薄爭於左之上民病黄癉而為胕腫宜調少陰之客以醎補之以甘瀉之以酸收之嵗榖宜丹間榖宜豆則熱不為邪五之氣自秋分日已初至小雪日夘初凡六十日有竒主位太商金客氣太陰土中見木運燥濕更勝沈陰廼布寒氣及體風雨迺行宜調太陰之客以甘補之以苦瀉之以甘緩之嵗榖宜丹間榖宜麻則濕不為邪終之氣自小雪日夘正至大寒日丑正凡六十日有竒主位少羽水客氣少陽火中見木運木生火畏火司令陽廼大化蟄蟲出見流水不氷地氣大發草廼生人廼舒其病温癘宜調少陽之客以醎補之以甘瀉之以醎耎之嵗榖宜丹間榖宜豆則火不為邪此六氣之化也嵗為平木或有邪氣則中執法人有急卒之病經曰中執法者其病速而危也少陰君火司天陽燥金在泉中見太㣲火運嵗火太過氣化運行先天太過而同天化是謂天符氣之平也平火之嵗命曰升明之紀正陽而治徳施周普五化均衡其氣高其性速其用燔灼其化蕃荗其政明曜其候炎暑其令熱其類火其應夏其榖麥其果杏其實絡其蟲羽其畜馬其色赤其味苦其物脉其音徵其數七其在人也其蔵心其主舌其養血其病瞤瘛此嵗運之化也天地之氣熱化司天柔化左間動化右間故天政所布其氣明辛化在泉蔵化司氣為左間丹化司氣為右間故地氣肅而其令切寒交暑熱加燥雲趨雨府濕化廼行時雨迺降金火合徳上應熒惑太白其榖丹白熱化七清化九正化度也羽蟲靜介蟲育嵗物所宜也毛蟲耗濕毒不生地氣制之也水火寒熱持於氣交而為病始熱病生於上寒病生於下寒熱相犯而爭於中民病欬喘血溢血泄鼽􅅉目赤眥瘍寒厥入胃心痛腰痛腹痛大嗌乾腫上是嵗火在上金在下火在中火勝金天氣盈地氣虚天氣雖平熱盛於上宜於年前先取化源平其火氣必抑其運火資其嵗勝折其金之鬱氣無暴過而生其病食丹白之榖以全其真食間氣之榖以辟虚邪嵗宜以醎耎之而調其上以醎收之而安其下運同天氣以寒清化故曰其化上醎寒中甘寒下酸温藥食宜也嵗半之前少陰主之少陰有本標之化也寒熱得中為天政之平也嵗半以後陽明主之陽明以中氣為化燥濕相半者地之令和也初之氣自丁亥年大寒日寅初至是嵗春分日子初凡六十日八十七刻半主位少角木客氣太陽水中見火運火勝火地氣遷燥将去寒廼始蟄復藏水廼氷霜復降風迺至陽氣鬱民反周宻闗節禁固腰脽痛炎暑將起中外瘡瘍宜調太陽之客以苦補之以醎瀉之以苦堅之以辛潤之嵗榖宜丹間榖宜稷則寒不為邪二之氣自春分日子正至小滿日戌正凡六十日有竒主位太徵火客氣厥隂木中見火運木火相生陽氣布風廼行春氣以正萬物應榮寒氣時至民廼和其病淋目瞑目赤氣鬱於上而熱宜調厥陰之客以辛補之以酸瀉之以甘緩之嵗榖宜丹間榖宜稷則風不為邪三之氣自小滿日亥初至大暑日酉初凡六十日有竒主位太徵火客氣少陰火中見火運氣與運符天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作喘欬目赤宜調少陰之客以醎補之以甘瀉之以酸收之嵗榖宜丹間榖宜豆則熱不為邪四之氣自大暑日酉正至秋分日未正凡六十日有竒主位少宫土客氣太陰土中見火運土當其位火化兼之溽暑至大雨時行寒熱互至民病寒熱嗌乾黄癉鼽衂飲發宜調太陰之客以甘補之以苦瀉之以甘緩之嵗榖宜白間榖宜麻則熱不為邪五之氣自秋分日申初至小雪日午初凡六十日有竒主位太商金客氣少陽火中見火運氣同運化畏火臨暑反至陽迺化萬物迺生廼長榮民廼康其病温宜調少陽之客以寒補之以甘瀉之以醎耎之嵗榖宜白間榖宜豆則火不為邪是氣也用熱逺熱無犯司氣之熱終之氣自小雪日午正至大寒日辰正凡六十日有竒主位少羽水客氣陽明金中見火運火勝金水反制之燥令行餘火内格腫於上欬喘甚則血溢寒氣數舉則霿霧翳病生皮腠内舎於脅下連小腹而作寒中地將易也宜調陽明之客以酸補之以辛瀉之以苦泄之嵗榖宜白間榖宜黍則燥不為邪此六氣之化也嵗氣之交宜扶其不足制其有餘使氣適平然是嵗天符為執法若有邪中執法者民病速而危也太陰濕土司天太陽寒水在泉中見少宫土運嵗土不及上宫正宫同少宫上臨太陰是為天符土運臨丑是為嵗㑹上見天符下見嵗㑹三合為治太一天符之嵗氣至平也命曰偹化之紀氣恊天休徳流四政五化齊修其氣平其性順其用高下其化豐滿其政安靜其候溽蒸其令濕其數土其應長夏其榖稷其果棗其實肉其蟲倮其畜牛其色黄其味甘其物膚其音宫其數五其在人也其蔵脾其主口其養肉其病痞此嵗運之化也嵗運之化濕化司天明化間左灼化居右地氣上騰而其政肅醎化在泉動化間左清化間右故天氣下降而其令寂陰専其政陽氣退避大風時起原野昏霧白埃四起雲奔南極寒雨數至物成於差夏濕寒合徳黄黑埃昏流行氣交上應鎮星辰星其榖黅𤣥間榖命太商太徵者物成於差夏故陰凝於上寒積於下寒水勝火則為氷雹陽光不治殺氣迺行有餘宜高不及宜下有餘宜晩不及宜早土之利氣之化也民氣亦從之其病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急故曰風化清化勝復同邪氣化度也雨化五寒化一正化度也倮蟲靜鱗蟲育嵗物所宜也羽蟲耗熱毒不生地氣制之也是嵗土在上水在下土勝水天氣盈當取化源嵗遇天一天符其氣至平不取化源為折其水鬱益其嵗贊其陽火令禦甚寒無使邪勝食𤣥黅之榖以全其真食間氣之榖以保其精嵗宜以苦燥之温之運與濕同宜以燥化故曰其化上苦熱中甘和下甘熱藥食宜也嵗半之前其政濕嵗半之後其令寒初之氣自戊子年大寒日巳初至是嵗春分日夘初凡六十日八十七刻半主位少角木客氣厥陰木中見土運木當其位地氣遷寒廼去春氣正風迺來生布萬物以榮民氣條舒風濕相薄雨迺後民病血溢筋絡拘強關節不利身重筋痿宜調厥陰之客以辛補之以酸瀉之以甘緩之嵗榖宜黅間榖宜稷則風不為邪二之氣自春分日夘正至小滿日丑正凡六十日有竒主位太徵火客氣少陰火中見土運大火正物承化民迺和其病温癘盛行逺近咸若濕蒸相薄雨迺時降宜調少隂之客以醎補之以甘瀉之以酸收之嵗穀宜丹間穀宜豆則熱不為邪三之氣自小滿日寅初至大暑日子初凡六十日有竒主位太徴火客氣太隂土中見土運氣與運同而行平氣天政布濕氣降地氣騰其病濕蒸相薄宜調太隂之客以酸補之以甘瀉之以醎耎之嵗穀宜稷則濕不為邪四之氣自大暑日子正至秋分日戌正凡六十日有竒主位少宫土客氣少陽火中見土運天氣否隔寒風曉暮蒸熱相薄草木凝煙濕化不流則白露隂布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜調少陽之客以酸補之以甘瀉之以醎耎之嵗穀宜𤣥間穀宜豆則火不為邪五之氣自秋分日亥初至小雪日酉初凡六十日有竒主位太商金客氣陽明金中見土運土生金金得位慘令已行寒露下霜迺早降草木黄落寒氣及體君子周宻民病皮腠宜調陽明之客以酸補之以苦瀉之以苦泄之嵗穀宜白間穀宜黍則燥不為邪終之氣小雪日酉正至大寒日未正凡六十日有竒主位少羽水客氣太陽水中見土運水當其位濕寒合德寒大舉濕大化霜迺凝水堅氷陽光不治感於寒則病人闗節禁固腰脽痛寒濕持於氣交而為疾也宜調太陽之客以苦補之以醎瀉之以苦堅之以辛潤之嵗穀宜𤣥間穀宜稷則寒不為邪此六氣之化也氣交之化嵗有水鬱當隨勝氣安其屈伏無間其數以平為期此其道也少陽相火司天厥陰風木在泉中見太商金運嵗金太過氣化運行先天火化為天氣素化司氣為左間柔化為右間故天氣正而其令嚴酸化為地氣灼化居氣為左間蔵化為右間故地氣擾而其令撓風迺暴舉木偃沙飛炎火廼流隂行陽化雨迺時應風熱參布雲物沸騰太陰横流寒廼時至凉雨並起火木同徳上應熒惑嵗星其榖丹蒼火化七清化九風化三正化度也羽蟲靜毛蟲育是謂嵗物之宜倮蟲耗清毒不生是地氣所制民病寒中外發瘡瘍内為泄滿聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變是嵗陽為地氣金運在中天氣刑運運刑地氣天氣陰地氣虚當於年前先取原以平火氣無使運鬱次抑其運金贊所不勝無使木鬱折其鬱氣則暴過不生苛疾不起嵗宜醎宜辛宜酸渗之泄之漬之發之運異風熱少用寒化其化上醎寒中辛温下辛凉藥食宜也候其氣者嵗半之前少陽主之若火淫所勝則温氣流行金政不平民病頭疼發熱迺寒而瘧熱上皮膚痛色黄赤𫝊而為水身面胕腫腹滿仰息泄注赤白瘡瘍欬喘血煩心胸熱甚則鼽衂病本于肺診在手天府之脉法宜平以醎冷佐以苦甘以酸收之以苦發之以酸補之嵗半之後厥隂主之若風淫于内則地氣不明平野昧草迺早秀民病灑灑振寒善呻數欠心疼肢滿兩脇裏急飲食不下隔咽不通食則嘔腹脹善噫得後與氣則怏然如衰身體皆重法宜治以辛凉佐以苦甘以苦泄之以甘緩之以辛散之嵗運之化金太過紀曰堅成是謂收引天氣潔地氣明陽氣隨隂治化燥行其政物以司成收氣繁布化洽不終其化成其氣削其政肅其令鋭切其動暴折瘍疰其德霿露蕭飋其變肅殺凋零其化兼其所勝其病喘喝胸憑仰息上徴與正商同其眚西其病欬故曰嵗金太過燥氣流行肝木受邪民病兩脇下少腹痛目赤痛眥瘍耳無所聞甚則喘欬逆氣肩背痛下連股膝髀腨胻足皆病其治宜以辛温初之氣自巳丑年大寒日申初至是嵗春分日午初凡六十日八十七刻半主位少角木客氣少火中見金運火勝金地氣遷風勝廼搖寒迺大温草木早榮寒來不殺温病廼起其病氣拂於上血溢目赤欬逆頭痛血崩脇滿膚腠中瘡宜治少陰之客以酸補之以甘瀉之以酸收之嵗榖宜丹間榖宜豆二之氣自春分日午正至小滿日辰正凡六十日有竒主位太徵火客氣太陰土中見金運火生土火反鬱白埃四起雲趨雨府風不勝濕雨廼零民迺康其病熱鬱於上欬嘔吐瘡發於中胸嗌不利頭疼身熱昏憒膿瘡宜治太陰之客以甘補之以苦瀉之以甘緩之嵗榖宜丹間榖宜麻三之氣則自小滿日巳初至大暑日夘初凡六十日有竒主位太徵火客氣少陽火中見金運火當其位天政布炎暑至少陽臨上雨廼涯民病熱中聾瞑血溢濃瘡欬嘔鼽衂渴􅅉欠喉痺目赤善暴死宜調少陽之客以醎補之以甘瀉之以醎耎之嵗榖宜丹間榖宜豆四之氣自大暑日夘正至秋分日丑正凡六十日有竒主位少宫土客氣陽明金中見金運氣與運同是謂司氣凉廼至炎暑間化白露降民氣和平其病滿身重宜治陽明之客以酸補之以辛瀉之以苦泄之嵗榖宜蒼間榖宜黍是氣也用凉逺凉無犯司氣之凉五之氣自秋分日寅初至小雪日子初凡六十日有竒主位太商金客氣太陽水中見金運金當其位而生水陽廼去寒廼來雨迺降氣門廼閉剛木早凋民病寒邪君子周宻宜治太陽之客以苦補之以鹹㵼之以苦堅之以辛潤之嵗穀宜蒼間穀宜稷終之氣自小雪日子正至大寒日戌正凡六十日有竒主位少羽水客氣厥隂木中見金運金生水水生木地氣正風迺至萬物反生霜霧以行其病關閉不禁心痛陽氣不藏而欬宜治厥隂之客以辛補之以鹹潤之以酸㵼之以甘緩之嵗穀宜蒼間穀宜稷此嵗氣之化也勝復更作佐以所利安其主客適其寒温同者從之是其治法也陽明燥金司天少陰君火在泉中見少羽水運嵗水不及氣運行後天燥化為天氣𤣥化為左間明化為右間故天氣急而其政切苦化為地氣柔化為左間動化為右間故地氣明而其令暴陽専其令炎暑盛行物燥以堅淳風迺治風燥横運流於氣交多陽少陰雲趨雨府濕化迺敷燥極而澤則金火合徳上應太白熒惑其榖白丹間榖命太徵者其耗白甲品羽雨化風化勝復同邪氣化度也清化九寒化一熱化七正化度也介蟲靜羽蟲育是迺嵗物之宜介蟲耗寒毒不生是皆地氣所制熱蟲迺見流水不氷清熱之氣持於氣交民病欬嗌塞寒熱發暴振慄癃悶清先而勁毛蟲迺死熱後而暴介蟲迺殃其發燥是嵗金在上火在下水運在中水勝火火勝金天氣虚水能制火而生金金又生運其邪迺㣲宜資化源以助金氣安其運水無使受邪食白丹之榖以安其氣食間氣之榖以去其邪嵗宜以醎以辛苦汗之清之散之運與熱同宜多天化此其道也其化上苦小温中辛和下醎寒所謂藥食宜也嵗半之前陽明主之若燥淫所勝則木迺晩榮草迺晩生筋骨内變民病左胠脇痛寒清於中感而瘧大凉革候欬腹中鳴注泄䳱溏名木斂生菀于下草焦上首心脇暴痛不可反側嗌乾面塵腰痛目眛眥瘍瘡痤癰病本于肝診在足太衝脉法宜平以苦温佐以酸辛以苦下之嵗半之後少陰主之若熱淫于内則熖浮川澤陰處反明民病腹中常鳴氣上衝胸喘不能乆立寒熱皮膚痛目瞑齒痛項腫惡寒發熱如瘧少腹中痛腹大法宜治以醎寒佐以甘苦以酸收之以苦發之嵗運之化木不及紀曰委和是謂勝生生氣不政化氣迺揚長氣自平收令迺早凉兩時降風雲並興草木晩榮蒼乾凋落物秀而實膚肉内充其氣歛其用聚其動緛戾拘緩其發驚駭其化兼所不勝春有鳴條律暢之化則秋有霧露清凉之政春有慘悽殘賊之勝則夏有炎暑燔爍之復其𤯝東其蔵肝其病内舍胠脇外在關節上臨陽明上商與正商同其病肢癈癰腫瘡瘍其疳蟲邪傷肝也初之氣自丙申年大寒日巳初至是嵗春分日夘初凡六十日八十七刻半主位少角木客氣太陰土中見木運風濕相遇以行春令地氣遷陰始凝肅水乃氷寒雨化民病中熱脹面目浮腫善眠鼽衂􅅉欠嘔小便黄赤甚則淋宜調太陰之客以甘補之以苦瀉之以甘緩之嵗榖宜白間榖宜麻雖有濕化不能為邪二之氣自春分日夘正至小滿日丑正凡六十日有竒主位太徵火客氣少陽火中見木運二火相加木運相和陽迺布民廼舒物廼生榮厲大至民善暴死宜治少陽之客以醎補之以甘瀉之以醎耎之嵗榖宜白間榖宜白雖有火邪不能為害三之氣自小滿日寅初至大暑日子初凡六十日有竒主位太徵火客氣陽明金中見木運金勝木天政布凉廼行燥熱交合燥極而澤民病寒熱宜治陽明之客以酸補之以辛瀉之以苦泄之嵗榖宜白間榖宜黍雖有燥邪不能為害四之氣自大暑日子正秋分日戌正凡六十日有竒主位少宫上客氣太陽水中見木運寒雨降民病暴仆振慄譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便宜治太陽之客以苦補之以醎瀉之以苦堅之以辛潤之嵗榖宜丹間榖宜稷雖有寒邪不能為害五之氣自秋分日亥初至小雪日酉初凡六十日有竒主位太商金客氣厥陰木中見水運氣與運同司氣為蒼化春令反行草廼生榮民氣和宜調厥陰之客以辛補之以酸瀉之以甘緩之嵗榖宜丹間榖宜稷雖有風化不能為邪是氣也用温逺温無犯司氣之温終之氣自小雪日酉正至大寒日未正凡六十日有竒主位少羽水客氣少隂火中見水運水生木木生火其化順陽氣布候反温蟄蟲反見流水不冰民迺康平其病温宜治少隂之客以鹹補之以甘瀉之以酸收之嵗穀宜丹間穀宜豆雖有熱邪不能為害嵗氣之交天氣勝者少陽復之地氣勝者太陽復之其治各依其復氣之法也太陽寒水司天太隂濕土在泉中見太角木運歳木太過氣化運行先天寒化在上蒼化司氣左間清化右間故天政所布其氣肅甘化在下明化左間灼化居氣右間故地氣静而其令徐寒臨太虚其政大舉陽氣不令澤無陽燄則火發待時少陽中治時雨迺涯止極兩散還於太隂雲朝北極濕化迺布澤流萬物寒化六風化八雨化五正化度也鱗蟲静倮蟲育歳物之宜也鱗蟲不成燥毒不生地氣制之也寒敷於上雷動於下寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡㵼血溢是歳水為天氣土爲地氣土勝水天氣虚當資化源以助天氣之水歳運木天氣生運木能勝土地氣反鬱上抑其運木扶其不勝無使暴過而生其疾食元黅之穀以全其真辟邪虚之氣以安其政運與寒熱異宜以燥食化其化上苦温中酸和下甘温藥食宜也歳半之前太陽主之若濕淫所勝則寒氣反至水且氷血變於中發爲癰瘍民病厥心痛嘔血血泄鼽衂善悲時眩仆運火炎烈雨暴迺雹胸腹滿手熱肘攣腋腫心澹澹大動胸脇胃腕不安面赤目黄噫嗌乾甚則色炲渴而欲飲病本于心診在手神門脉其法平以辛熱佐以苦甘以醎瀉之嵗半之後太陰主之若濕淫於内則埃昏嚴谷黄反見黑至隂之交民病飲積心痛耳聾渾渾焞焞嗌腫喉痺陰病血見小腹痛腫不得小便病衝頭痛目似脫項似㧞腰似折髀不可以曲膕如結腨如别其法宜治以苦熱佐以酸淡以苦燥之以淡泄之氣交之間木運太過發生之紀是謂啓陳土踈泄蒼氣達陽和布化陰氣迺隨生氣淳化萬物以榮其化生其氣美其政散其令條舒其動掉眩顛疾其徳鳴靡啓拆其變振拉摧拔其化兼其所勝其病怒故曰嵗木太過風氣流行脾土受邪民病飱泄食減體重煩寃腸鳴腹肢滿甚則忽忽善怒眩冐巔疾反脇痛而吐甚衝陽脉絶者不治宜以酸和初之氣自辛夘年大寒日寅初至是嵗春分日子初凡六十日八十七刻半主位太角木客氣少陽火中見木運嵗木當位相火居之地氣遷氣迺大温草迺早榮民迺厲温病迺作身熱頭痛嘔吐肌腠瘡瘍宜治少陽之客以酸補之以甘瀉之以醎耎之嵗穀宜𤣥間穀宜豆雖有火邪不能為害二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣陽明金中見木運金勝木大涼及至民迺慘草廼遇寒火氣遂抑民病氣鬱中滿寒廼始宜治陽明之客以酸補之以辛瀉之以苦泄之嵗榖宜𤣥間榖宜黍雖有燥邪不能為害三之氣自小滿日亥初至大暑日酉初凡六十日有竒主位少徴火客氣太陽水中見木運天政布寒氣行雨廼降民病寒宜治太陽之客以鹹㵼之以苦堅之以辛潤之嵗榖宜𤣥間榖宜稷雖有寒邪不能為害四之氣自大暑日酉正至秋分日未正凡六十日有竒主位太宫土客氣厥隂木中見木運氣與運同是謂司氣風濕交爭風化為雨民病大熱宜治厥隂之客以辛補之以酸泄之以甘緩之嵗榖宜黅間榖宜稷雖有風邪不能為害五之氣自秋分日申初至小雪日午初凡六十日有竒主位少商金客氣少隂火中見木運木生火火勝金民迺舒宜調少隂之客以鹹補之以甘㵼之以酸收之嵗榖宜黅間榖宜豆雖有熱邪不能為害終之氣自小雪日午正至大寒日辰正凡六十日有竒主位太羽水客氣太隂土中見木運地氣正濕令行隂凝太虚寒風以至民迺慘悽宜治太隂之客以甘補之以苦㵼之嵗榖宜黅間榖宜麻雖有濕邪不能為害此六氣之化也嵗氣之交天氣勝則有太隂之復地氣勝則有厥隂之復治之宜以勝復之法厥陰風木司天少陽相火在泉中見少徵火運歳火不及氣化運行後天火同不及地化而加同嵗會氣之平也諸同正嵗氣化運行同天平火之嵗命曰升明之紀正陽而治徳施周普五化均衡其氣高其性速其用燔灼其化蕃茂其政明曜其候炎暑其令熱其類火其應夏其榖麥其果杏其實絡其蟲羽其畜馬其色赤其味苦其物脉其音徵其數七其在人也其蔵心其主舌其養血其病瞤瘛此嵗運之化也天地之氣風化在上灼化左蔵化右苦化在下清化左黅化右故天氣擾而其政撓地氣正而其令速風生高逺炎熱從之雲趨雨府濕化廼行風火同徳上應嵗星熒惑其榖丹蒼間榖言太宫太羽者其耗文角品羽寒化雨化勝復同邪氣化度也風化八火化二正化度也嵗物之宜則毛蟲靜羽蟲育地氣所制則介蟲耗寒毒不生風燥火熱勝復更作蟄蟲來見流水不氷熱病行於下風病行於上風燥火熱勝復行於中是嵗陰為天氣陽為地氣天氣虚火適平不資化源性贊運火無使邪勝嵗宜以辛調上以醎調下畏火之氣無妄犯之其化上辛凉中醎和下醎寒藥食宜也嵗半之前厥陰主之厥陰所至其令風當其時風化行者天之政也嵗半之後少陽主之少陽所至其令火當其時火化行者地之令也初之氣自壬辰年大寒日巳初至是嵗春分日夘初凡六十日八十七刻半主位太角木客氣陽明金中見火運寒始肅殺氣方至民病寒於右之下運行平火其邪廼㣲宜調陽明之客以酸補之以辛瀉之以苦泄之嵗榖宜蒼間榖宜黍二之氣自春分日夘正至小滿日丑正凡六十日有竒主位少徵火客氣太陽水中見火運火居其位寒水承之寒不去華雪水氷殺氣施化霜廼降名草上焦寒雨數至陽復化民病熱於中宜調太陽之客以苦補之以醎瀉之以苦堅之以辛潤之嵗榖宜蒼間榖宜稷三之氣自小滿日寅初至大暑日子初凡六十日有竒主位少徵火客氣厥陰木中見火運火當其位風木客之天政布風迺時舉民病泣出耳鳴掉眩宜調厥陰之客以辛補之以酸瀉之以甘緩之嵗榖宜蒼間榖宜稷四之氣自大暑日子正至秋分日戌正凡六十日有竒主位太宫土客氣少陰火中見火運氣與運同灼化所居濕熱相薄爭于左之上民病黄癉而為胕腫宜調少陰之客以醎補之以甘瀉之以酸收之嵗榖宜丹間榖宜豆五之氣自秋分日亥初至小雪日酉初凡六十日有竒主位少商金客氣太陰土中見火運火生土燥濕更勝沈陰迺布寒氣及體風雨廼行宜調太陰之客以甘補之以苦瀉之以甘緩之嵗榖宜丹間榖宜麻終之氣自小雪日酉正至大寒日未正凡六十日有竒主位太羽水客氣少陽火中見火運火氣符㑹畏火司令陽廼大化蟄蟲出見流水不氷地氣大發草廼生人廼舒其病温厲宜調少陽之客以醎補之以甘瀉之以醎耎之嵗榖宜丹間榖宜豆是之氣也司氣以熱用熱無犯所謂用熱逺熱也嵗氣之化其化淳又遇火氣正是謂行令邪或乘之其病持乆故經曰中行令者其病徐而持普濟方卷九
