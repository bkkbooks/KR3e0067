青箱子一兩半黄連一兩半去鬚苦參一兩半剉桃仁三分湯浸去尖雙仁麩炒微黄右為細㪚毎服二錢粥飲調下食前又將㪚子綿褁如杏仁大内於下部中良聖濟方再同研勻毎服一錢七若䘌在下部以綿裹一錢内下部良久去之麝香㪚治傷寒䘌心中懊憹下部有瘡疼痛麝香一分研細雄黄一分細研硃砂一分細研羚羊角屑一分青箱子二分黄連一分去鬚貝齒一分川升麻一分桃仁一分湯浸去皮尖雙仁麩炒微黄右為細㪚毎服二錢煎麥飲調下食前青箱㪚出聖恵方治傷寒初有䘌下部生瘡疼痛青箱子一兩雚蘆二兩狼牙一兩陳橘皮一兩湯浸去白穣焙萹竹一兩右為細散毎服粥飲調下食前阿膠㪚出聖恵方治傷寒下唇内生瘡蟲蝕下部疼痛或時洩痢阿膠二分搗碎炒令黄燥黄蘖半兩微炒炙剉當歸半兩剉微炒㯽榔半兩木香半兩龍骨半兩槐子一兩微炒右為細散毎服二錢煎黄耆湯調下食前棟根皮丸出聖恵方治傷寒䘌蝕下部腹中㽲痛東引苦根棟白皮一兩剉狼牙一兩白礬灰一分猪膽三枚取汁用酒三合相和重湯煑如膏右為細末用猪膽膏和丸如梧桐子大毎服二十丸以桃枝湯下食前䔧蘆丸出聖恵方治傷寒下部生䘌瘡時久不瘥䔧蘆半兩去蘆頭桂心一兩芭豆一分去皮心研紙裹壓去油附子一兩炮去皮臍右為末入巴豆研令勻煉蜜和丸如梧桐子大毎服一丸粥飲送下食前槐子仁丸出聖恵方治傷寒下部䘌瘡痛痒不止槐子仁一兩微炒苦參一兩剉熊膽半兩木香一兩乾漆三分搗碎炒令烟出㯽榔一兩桃仁二兩湯浸去皮尖雙仁麩炒微黄右為末煉蜜和丸如梧桐子大毎服二十丸荆芥湯下食前治傷寒䘌病唾血上唇内有瘡如粟心中痛悶此蟲在上蝕其五臓若下唇内生瘡其人喜眠此蟲蝕於下部右以鷄子一枚小頭敲破出白和熟漆半合攪和令勻空腹吞之食頃或半日或下蟲或吐蟲盡則熱除病愈若不治即殺人又方出聖恵方右用猪膽二枚取汁以醋一中盞入膽汁相和煎三五沸放温空腹服之一合蟲則自死聖濟方用膽一具治傷寒下部生䘌瘡方出聖恵方地龍一兩去土㣲炒狼牙二兩右細剉和勻毎服二字水一大盞煎至五分去滓食前温服又方右以蛇苺草搗絞取汁毎於食前温服一小盞又方出聖恵方右以烏梅肉二兩炒令燥為細末煉蜜和丸如梧桐子大毎服十丸以石榴根皮湯下食前聖濟方用三兩又方出聖恵方右以梓樹皮三兩細剉水三大盞煎至一盞半去滓空心分温三服治傷寒下部䘌瘡蟲蝕肛爛方出聖恵方熟艾彈子大雄黄末半錢右相和作炷燒用竹筒引烟熏下部中桃仁湯出永類鈐方治傷寒後䘌瘡方見本門傷寒狐惑類黄連犀角湯出活人書方治傷寒及諸病後瘡出下部黄連去鬚微炒半兩烏梅七枚去核焙犀角鎊一兩無升麻代木香四錢右麄搗篩毎服五錢水一盞半煎至一盞去滓食前温服羚羊角散治傷寒後心中煩燥唇口生瘡蟲食下部羚羊角鎊三分龍膽半兩黄耆剉三分升麻半兩𤣥參茈胡去苗各三分右搗羅為㪚毎服二錢煎槐子湯調下空心食前日三服麝香散治傷寒後䘌瘡麝香研雄黄醋煮研丹砂研各一分羚羊角鎊犀角鎊黄連去鬚㣲炒青箱子升麻具齒煅研各半兩桃仁湯浸去皮尖雙仁炒研三分右搗研為㪚再同研勻毎服二錢以食後煎麥仁粥飲調服又以綿褁半棗大内下部中良久去之苦參湯治傷寒後䘌瘡苦參一兩槐白皮剉二兩熊膽半兩研右除熊膽外麄搗篩毎服五錢水一盞半煎至八分去滓入熊膽末半錢攪勻空心温服下部有瘡者更灌下部桃皮湯治傷寒後䘌蟲食下部桃皮剉槐子榧實各一兩石榴根剉半兩右麄搗篩毎服五錢水一盞半􅀥三枚擘破同煎至八分去滓食前温服犀角湯治傷寒後唇口生瘡心中懊憹蟲食下部時或下痢犀角鎊龍骨各一兩木香三分阿膠炙令燥一兩升麻半兩桃仁湯浸去皮尖雙仁炒一兩右麄搗篩毎服三錢水一盞煎至六分去滓温服晚再服治傷寒天行下部䘌瘡烏梅去核搗爛半兩獨頭蒜一頭搗爛屋塵三合右一處入苦酒一升和勻於銅器中煎候可丸丸如􅀥核大内下部中若病人齒齗無色舌上白者或喜眠憒憒不知痛痒處或下痢宜急療下部不曉此者但攻其上不以為意下部生瘡蟲食其肛門爛見五臓死也療之方出肘後方右用燒馬蹄作灰細末猪膏和塗綿以導下部日數度瘥桃仁苦酒湯出肘後方治症同前桃仁五十枚去皮尖及雙仁苦酒二升鹽一合右煑取六合去滓盡服之龍骨湯出肘後方治傷寒已七八日至十餘日煩渇熱盛而三焦有瘡䘌者多下或張口吐舌呵吁日爛口鼻生瘡吟語不識人宜服此方除熱毒止痢神方右以龍骨半斤碎以水一斗煑取四升沈之井底令冷服五合餘漸漸進之恣意取飲尤宜老少無味殆如飲水懊憹散出聖恵方治傷寒心中懊憹下痢穀道中爛傷當服懊憹散以䘌藥内穀道中雚蘆十分聖濟方用二兩乾漆二分聖濟方搗碎炒令烟出半兩萹蓄二分聖濟方乾者用半兩右各異搗篩粉粥飲服一錢先食日再服聖濟方治傷寒心中悶下痢下部生䘌瘡爛傷毎服二錢粥飲調下食前服療傷寒兼䘌瘡其候口唇皆生瘡唾血唇内有瘡如粟者則心中懊憹痛如此則此蟲在上乃食五臓若下唇内生瘡其人喜眠者此蟲在下食下部方出肘後方右取鷄子一枚扣頭出白與漆一合熟和令調如漆還内殻中仰吞之食頃或半日或下蟲或吐蟲劇者再服乃盡熱除病愈凡得熱病腹内熱食少三蟲行作求食食人五臓及下部人不能知可服此藥不爾䘌蟲殺人有病䘌下不止者出肘後方烏頭二兩女萎雲實各一兩桂二分右蜜丸如梧桐子大水服五丸一日三服一方出肘後方治下部卒痛如鳥啄赤小豆大豆各一升右合搗兩囊貯蒸之令熟更互坐即愈療䘌蟲食下部方右以泥作甖以竹筒如指所横穿甖肚筒一頭内下孔中内如鷄子艾燒之就甖口吹之常令艾燒强人可益艾甚良一方治病人齒無色舌上白或喜睡不知痛痒處或下利者急治下部不曉此者但攻其上不以為意下部生蟲食其肉爛見五臓便死右用艾葉於管中熏下部令烟入更入少許普濟方卷一百四十三
