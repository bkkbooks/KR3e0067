麝香並研各一錢黄蠟一兩半清油六兩右除龍腦麝香外並細剉放於鍋内用油浸七日却出藥將油煉令香熟放冷秤六兩却再入諸藥煎令黄用生絹袋濾去滓再入鍋内旋下蠟攪勻滴水中成珠即止去火毒候温入龍腦麝香打勻傾出熱甆盒内救苦膏治貼一切風濕疼痛無名腫毒死胎不下涼水吞下七丸川牛膝白芷黄丹乳香各五錢當歸没藥各一兩白歛貝母茯苓槐角各二兩川烏杏仁去皮尖各二兩右為細末加瀝青八兩同入木臼内用香油四兩隨模擣杵一氣千餘下方成膏白膏治百病中風惡氣及頭面諸病青盲風目爛眥眼醫耳聾鼻塞齲齒根腫痛及癰痔瘡癬疥一名神明白膏吳茱萸蜀椒白术白芷前胡各一斤一作白前附子三十枚桂心當歸細辛各二兩芎藭一斤右㕮咀淳苦酒於銅器中淹浸藥一宿以猪膏一斤炭火上煎三沸三上三下白芷色黄為度病在腹内酒服弹丸一枚日三服痛取如黍米内兩眥中以目向風無風可以扇之諸瘡痔齲齒耳鼻百病之背皆以膏傅病在皮膚炙手摩之日三一方無桂心善應膏治惡疽瘡腫毒癤漏發背腦疽癧子寒濕氣冷痿痺頑痳貼藥不疼小兒頭面瘡癤丹瘤聚熱雜瘡蜈蚣蜂兒螫淨洗傅貼消停取毒牙腫外貼打撲骨閃肭歇血毒氣不散鎌刀鉄器所傷杖瘡藥到不疼馬犬咬䖝蛇所傷湯火漆瘡甜脂水毒下疰膁瘡諸般瘡腫藥到毒滋潤止痛乾濕疥癬撥動貼藥婦人吹妳丸如梧桐子大新汲水下二十丸産前催生産後趕下敗血臍腹刺痛經脉不調温酒下二十丸不得犯葷手火上焙化淨紙攤貼黄丹二斤羅細上等者没藥研南乳香研白歛生木鼈子生用白芨生用白芷生用桂三寸生用各一兩新栁枝一斤如箭頭大右除黄丹乳香没藥外其餘藥材用好芝麻油五斤浸一宿入鉄鍋内用炭火慢熬令藥材變黄色濾去滓次將黄丹入鍋内用新栁枝一條長四寸如小錢大攪令黄丹微變褐色掇下鍋再用桞枝攪出烟火盡入沒藥乳香在内再用栁枝攪勻畧冷傾在磁盆中候藥硬可切用刀子取出藥切成塊將油紙裹然後使用修合宜春三秋八月間神仙太乙膏治八發癰疽及一切惡瘡軟癤不問年月深逺已成膿未成膿並宜貼之蛇虎傷蝎螫犬咬湯火刀斧所傷皆可内服外貼如發背先以温水洗瘡淨用軟帛拭乾却將緋帛攤膏貼瘡如服冷水下血氣不通温酒送下赤白帶下當歸酒下咳嗽及喉閉纒喉風並用新綿褁膏藥置口中含化一切風赤眼用膏稔作小餅貼大陽穴後如服用山梔子湯送下打撲傷損外貼内服橘皮湯下腰膝病者患處貼之内服用塩湯下唾血者桑白皮湯下諸漏先以塩湯洗淨諸瘡並量大小以紙攤貼每服一粒旋丸如櫻桃大蛤蚧為依其膏可収十年不壊愈久愈烈一切久逺瘰癧及痔瘻瘡塩湯洗貼酒下一丸婦人血滯木通甘草湯下一切瘡癤並腫痛及疥勞另煉油少許攤膏貼之𤣥參白芷川當歸去蘆肉桂去粗皮大黄赤芍藥生乾地黄俱剉各一兩右用麻油二斤浸諸藥春五夏三秋七冬十濾滓油熬得黒色取出不用將油濾過然後入黄丹一斤用青栁枝不住手攪候滴於水中成珠不粘手為度傾磁器中以磚盖口掘窖子埋樹隂下以土覆三日出火毒卻服丸如雞頭大乳香膏止痛及追膿血消惡毒木鼈子去殻細研當歸各一兩栁枝二八寸寸剉之乳香没藥各半兩白膠香明淨者四兩去研細右以麻油四兩將前三味慢火煎令黒色次用研藥入油煎化綿濾去滓將藥銚令極淨再傾藥油在内候温入黄丹一兩半以新栁枝攪令得所再上火煎不住手攪候油沸起住攪直待注水中成珠不散為度秋冬欲軟春夏欲堅傾在水盆内出火毒搜成劑收之過用貼開金絲膏痢藥清油三兩夏二兩松香五兩蠟三錢半丹二錢半乳香半兩當歸鬚右以油煎轉色去滓下松香蠟乳末用槐條攪一順手五百徧入丹熬滴水成珠水盆内㧞千徧磁器收之用油紙攤貼臍下加草烏木鼈子大妙蓮子草膏治一切風耳聾眼闇生髪變白堅耳延年蓮子草汁十三斤生巨勝油一斤生乳一斤不食糟也甘草一大兩末右和於鍋内煎之緩火才令魚眼沸數攪之勿住手看上沫盡消澄濾不津磁器中貯之本方有青連藥六分龍腦花三分欝金香二分並未先煎諸藥三分减一次下汁及油等膏成每欲㸃即仰卧垂頭牀下一孔中各㸃如小豆許久起有唾却勿咽之起訖即啜少熱湯飲㸃經一年白髪盡黒秃處並生大黄膏治大人小兒痺癖大黄樸消各等分右為細末同蒜泥和成膏用絹攤膏貼於病處其痺病自消也黒虎膏治腹癰妳癰骨疽者每服十五丸如梧桐子大甘草湯或漏蘆湯下外貼患處眼目赤疼痛腫者以茶清或山梔子煎湯下仍㸃兩大陽穴婦人胎衣不下瘀血衝心童子小便下月候不通紅花湯下槐條栁條各七十莖每長七寸半巴豆八十粒去皮當歸三錢木鼈子仁五枚白芷三錢自然銅少許為末小油一斤一兩黄丹八兩右先將小油鍋内煎沸下前藥煎黄色濾去滓入丹熬成膏三仙膏治貼金傷肚痛㵼痢皆可貼肚上香油二斤黄丹一斤白巴豆四百八十枚右將油於銅鍋内煎熱入桃枝二十根煎枯取出次下栁枝二十根每長二寸煎枯取出三次下巴豆煎枯取出放温入砂鍋内煎油熱下丹文武火攪勻一箇半時辰熬丹起􅎑下于地再攪滴水成珠沉下膏成矣就鍋畨合地上三日至第四日可用碧霞膏治内刺銅碌研二兩乳香研二錢没藥研一錢松脂四兩黄蠟一字白膠香研一錢半芝麻油另熬鍊熟冬添夏减右先錬松脂濾去滓次下白膠香又下芝麻油攪勻看硬軟得所續次下黄丹再攪匀下乳沒銅碌末攪勻冷放磁盆内盛每用火上熁藥攤紙上貼患處一方輕粉一錢木鼈子膏治經絡受風寒邪入脉牽連皮膚疼痛結聚成核拘攣麻痺者木鼈子一兩去皮剉如小豆大乳香一錢另研右清油二兩浸木鼈子一兩宿然後慢火熬至减半去木鼈下黄蠟一錢攪勻絹濾去滓待欲凝急投乳末在内不住手攪勻收磁器内每用少許擦肌肉皮膚疼痛聚硬處不住手以極熱為度成膏藥方以清麻油十三兩菜油一斤黄丹七兩二物鍋鐺中文火煎麄濕桞錍攪不停至黒色加武火以扇之攪不停烟㫁沫盡看漸稠膏成矣煎時須於淨處勿令雞犬見齒瘡貼之痔瘡𫝊之久瘡膏當歸防風各一兩黄耆芍藥白芷各半兩乳香一分黄丹半兩黄蠟一兩右以油四兩煎前藥候色變入丹成矣蠟收之垍合成防風膏炙瘡當歸防風黄蠟各一兩黄丹半兩飛過炒右以油四兩先煎當歸防風候紫黒色却入炒過黄丹一二沸以綿濾過入黄蠟收之若要止疼痛加乳香一兩麻油半斤黄丹三兩乳香一兩栁枝一握右如常法熬成然後入乳香攪勻貯器中生肌膏治一切炙瘡取膿水須是取得膿水方得病好右取生楊栁枝一握碎剉如豆大以清油四兩煎令黄色漉出以新綿濾過入黄丹二兩在油内重煉以栁枝筯不住手攪令烟青白滴一兩滴在水椀中以丸得為度須丸成不泥手方可㵼出也冷金膏治湯火瘡並瘻瘡瘰癧惡瘡全瘡等油一斤杏仁半斤去皮尖雙仁炒搗研亂髪灰五兩黄藥三兩半石灰半兩黄狗脂少許䑕一枚去皮切右先煎油次下䑕及髪待䑕肉盡即去䑕骨又煎入諸藥更煎令黒色若稀下蠟三五兩候得所故帛或紙上攤貼水栁膏治炙瘡赤腫痛不可忍水栁枝二兩剉碎春夏取枝皮秋冬取根皮用甘草二兩搥碎白膠香半兩細研麝香半兩細研松脂黄蠟各半兩黄丹三兩炒令紫色油八合右先取油安鐺内以文武火煉香熟漸入栁枝甘草煎令黒色去滓次下白膠香松脂蠟等候化即以綿濾過淨拭鐺却傾油於鐺内漸下黄丹不住手攪轉急著火上變色滴於水中成珠子膏成入麝香令勻用磁盒盛於熟絹上攤貼神驗潤肌膏治手足皴裂疼痛歴青四兩黄蠟八錢乳香二錢右三味同於鐡鍋内文武火熬次入小油一二匙旋滴於水中試之如硬更入油硬軟合宜濾於水中磁器内放每用火上炙軟裂子上貼紙封秘𫝊膏藥治陽衰氣性補益甚多妙長老秘𫝊用之效驗然修合多者不能成膏藥予嘗親督藥生至誠修㨂道地眞藥依法製煉如熬膏宻地不令婦人雞犬見之如獲成效赤石脂舶上疏黄天門冬去心麥門冬去心熟地黄酒浸兎絲子酒浸木香醋炙各二錢肉蓯蓉酒浸没藥另研紫稍花杏仁去尖皮另研鹿茸虎骨生用牛膝酒浸陽起石逺志去心川續㫁蛇床子榖精草龍骨煆各二錢附子不炮去皮臍乳香五錢另研蟾酥另研麝香各一錢另研雄黄四錢另研生地黄沉香母丁香各二錢官桂三錢另研甘草三錢一硊松香明淨三兩另研木鼈子一兩重去殻碾右為末除甘草杏仁木鼈子官桂四味用水六觔四兩於砂鍋内用桑柴火熬至一椀去粗淨先將松香末小油二兩白芨末一兩下砂鍋内化開數沸却下其餘藥末以槐栁桑條不住手攪成膏藥稠粘為度要用則以緋絹裁帛逐旋厚攤如小面碗大貼臍上腰上則與􅃦有益無損熬膏藥法誠驗已效凡膏藥中鮮有不用虢丹其貨賣者多用硝與塩雜和在内重秤若干不飛過而用反有害熬藥方法于後用虢丹即黄丹先以冷水漂過去其塩硝水再用漂再去其水澄乾微火炒紫赤色將紙攤在地上出火毒秤淨用再研細無聲用乳香没藥須用燈心同於乳鉢内研細不然難為研細候熬藥成膏提起藥銚仍攪無烟起去燈心却下此二味入油内不住手攪勻熬藥用磁器或銅鐡銚盛油浸藥一宿慢火煎熬諸藥黒色生絹帛濾去滓留下一兩重藥油復將所濾油於慢火上再熬却將黄丹入油内用長條槐栁枝不住手攪候有微烟起即提起藥銚就栁條㸃藥油滴在水中面上凝結成珠不散方成膏矣如油熬散不成珠再熬直待成膏提起藥銚攪無烟出却入乳香没藥攪勻傾出磁器内將後留下油洗銚一併收拾器内用新汲水一日一換將藥器置水内三日出火毒方可用如膏硬酌量加黄蠟清油入膏内攪令得所其黄蠟等油减半用熬膏極難於火候須耐煩看火𦂳慢火猛則藥中火發不特失藥性又燎傷製藥人面目貼膏藥法如瘡有膿血不淨痂瘢不合湏用藥水洗淨如法拭乾候片時水氣乾盡却用膏貼貼後有黄水及膿血流出用指揩擦從側畔出一日一換膏黄水膿血出兩日一換或三日一換立愈普濟方卷三百十五
