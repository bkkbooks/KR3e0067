body:
  text: 普濟方卷二百十二明周王朱橚撰泄痢門白滯痢夫白滯痢者冷痢之類盖腸虚受冷留而不去舉津液相摶結滯如膿或如凝脂腹痛而下故為白痢方附子湯出千金方治冷白滯痢及腹痛附子一兩半赤石脂一兩乾薑一兩半芍藥甘草各半兩當歸龍骨各一兩半白术二兩牡蠣一兩半人参三分右剉如麻豆每服五錢水一盞半煎至八分去滓空心温服日晩再服有膿加厚朴一兩去麄皮薑汁塗炙紫色若嘔加陳皮一兩湯浸去白焙龍骨湯療白滯下夜無復數龍骨牡蠣各三兩烏梅肉熟艾乾薑白頭翁各一兩女薑黄連當歸各二兩甘草六兩右切以水七升煑取三升二合分服日三服一斷便止忌海藻松菜猪肉冷水豆䓻丸治白滯痢腹臟撮痛肉豆䓻一兩草豆䓻一兩縮砂仁一兩母丁香一兩木香沉香各半兩墨半兩枇杷葉炙一兩右搗羅為末燒粟米飯為丸櫻桃大每服二丸米飯化下食前服厚朴散出聖惠方治白痢四肢不和腹内㽲痛厚朴二兩地榆一兩半當歸一兩黄連一兩赤芍藥半兩赤石脂二兩禹餘糧二兩乾薑一兩吳茱茰半兩右搗細羅為散每服不計時候以粥飲調下二錢馬藺子散出聖惠方治赤白痢腹内㽲痛行數極多色白如泔淀不欲飲食馬藺子二兩地榆一兩厚朴一兩艾葉一兩赤石脂二兩龍骨二兩當歸一兩肉豆䓻一兩白术一兩右搗羅為散每服不計時候以粥飲調下二錢訶梨勒散出聖惠方治白痢腹痛胸膈痞滿不能飲食訶梨勒一兩木香三兩附子一兩乾薑一兩白茯苓一兩厚朴一兩枳實一兩甘草半兩當歸一兩剉右搗細羅為散每服不計時候以粥飲調下二錢黄連散出聖惠方治白痢腹痛不思飲食痩瘁骨立宜服黄連一兩乾薑一兩厚朴一兩神麯禹餘糧各一兩赤石脂二兩當歸酸石榴川烏頭各一兩炮製右搗羅為末以醋煑麫糊為丸如梧桐子大每服不計時候以艾湯下三十丸牡蠣散治白膿痢晝夜無數牡蠣一兩龍骨一兩烏梅肉半兩白頭翁女薑黄連當歸甘草各半兩炙右搗細羅為散每於食前以粥飲調下二錢人参湯治白滯痢及小便白人参龍骨當歸乾薑甘草白茯苓半兩厚朴一兩右搗篩每服五錢水一盞半煎至一盞去滓空心服日晩再如小兒患量大小加减肉豆䓻散出聖惠方治白痢心腹脹滿不能飲食肉豆䓻一兩厚朴三兩乾薑一兩炮甘草半兩訶梨勒一兩半陳橘皮一兩湯浸右搗細羅為末每服不計時候以粥飲調下二錢龍骨散出聖惠方治白痢腹痛不能飲食龍骨赤石脂白术各一兩厚朴當歸各二兩吳茱茰三分湯浸右搗細羅為散每服不計時候以粥飲調下二錢陳麴湯治白滯痢及腹痛不止陳麴黄連厚朴各一兩乾薑附子各半兩炮製右剉如麻豆大每服五錢水一盞半煎至八分去滓空心服日晩再服白术湯治白滯痢及水痢日夜一二十行心中痛白术三分甘草半兩厚朴一兩黄栢龍骨各半兩右搗篩每服四錢水一盞半生薑三片煎至八分去滓空心服日晩再服阿魏丸治丈夫婦人乆患白滯痢如魚腦阿魏一分桂末半兩木香半兩安息香一分獨頭蒜二顆右同研極細温酒和丸如梧桐子大每服三十丸空心陳米飲下日午再服黄芩丸治白痢多膿肚中㽲痛黄芩黄連黄蘗各一兩半吳茱茰炒一兩訶梨勒皮炒二兩半右為末煉蜜和丸如梧桐子大每服四十丸食前橘皮湯下日晩再服當歸丸治白膿及諸痢當歸黄連炒三分烏梅肉半兩阿膠半兩右為末鎔蠟為丸如梧桐子大每服空心温粥飲下二十丸日午再服豆䓻湯治白滯痢心腹脹滿不下食肉豆䓻甘草各半兩乾薑半兩炮厚朴一兩半右粗搗篩每服三錢水一盞煎至七分去滓空心温服日午再服薑附散治臟寒下痢白膿心腹㽲痛乾薑附子訶梨勒龍骨各一兩右為散每服三錢煎烏梅湯空心調下烏梅肉丸主冷白膿痢食不消病深為白滯痢者腸虚而氣冷客之搏于腸間津液凝滯成白故為白滯痢烏梅肉熟艾黄蘗甘草各一兩炙右搗篩為末蜜和丸如梧桐子大粥飲服十五丸三服忌海藻菘菜桃花丸出十便良方治腸胃虚弱冷氣乘之臍腹攪痛下痢純白或冷熱相摶赤白相雜腸滑不禁日夜無度赤石脂乾薑各等分右為末水麫糊丸如梧桐子大每服三十丸温米飲下空心日三服若血痢甘草湯下白痢乾薑湯下一方為末飲下蜜丸亦可薑粟散治瀉痢純白者方見本門和氣飲子治大小腑皆通下痢白色宜服此兼進訶梨勒丸人参白术當歸肉豆䓻阿膠白茯苓乾薑各三分木香罌粟殻香薷甘草已上各二錢蒿豉餅等分右為㕮咀每服五錢七水一盞半煎七分去滓服無時候訶梨勒丸治白痢訶子半兩肉豆䓻一兩木香三錢乾薑半兩阿膠三錢右為細末糯米粥濃飲為丸如梧桐子大每服五十丸陳粟米飲下前方相間服痢减則减痢止則勿服果州人何伯巽進士及第留意于醫月有所得用藥多竒中近日孫女病此易三醫不効因招其調治得二方不數服而愈治傷酒後臟腑不調忽時下黄白痢胸膈不快飯食無味精神少爽宜服此方黄橘皮桔梗桑寄生蓬莪茂草豆䓻甘草木香防風芎藭各一分右細杵羅為末每服二錢水一盞煎兩三沸空心服實腸散治白痢肉豆䓻一個一錢訶子一錢當歸一錢厚朴一錢龍骨一錢陳皮二錢甘草炙一錢右並為細末每服二錢陳米湯調下當歸散治白痢腹痛不止當歸阿膠乾薑白术赤芍藥附子各一兩烏梅肉二兩甘草半兩厚朴一兩半右件藥搗篩為散每服四錢以水一中盞煎至六分去滓不計時候稍熱服赤痢附論夫熱痢之甚者為赤痢本由腸虚為風邪所傷又挾邪熱血得熱而妄行乘虚必渗入腸中與痢相雜其色純赤名為赤痢若腸虚入腹則為乆痢變成嘔噦疳䘌之候矣方黄連湯治因冷飲食變成赤痢黄連一兩肉豆䓻一枚桂去粗皮地榆各一兩白芷赤石脂各一兩半訶梨勒皮一兩半黄芩半兩附子黄耆各一兩半吳茱茰當歸各一兩右剉如麻豆大每服五錢水一盞半生薑五片煎至一盞去滓温服日三伏龍肝丸治赤痢腹疼四肢羸困伏龍艾葉木香地榆阿膠當歸黄連赤芍藥黄芩各一兩右搗羅為末煉蜜和丸如梧桐子大每服三十丸温粥飲下不拘時候龍骨散出聖惠方治赤痢煩渇腹痛不欲飲食龍骨黄連地榆當歸黄芩阿膠各一兩犀角屑半兩右搗細羅為散每服不計時候以粥飲調下二錢六神湯治赤痢腹痛或下純血黄連車前子各二兩地榆山梔子仁甘草各一兩半陳橘皮焙一兩右粗搗篩每服五錢以漿水一盞半煎至八分去滓空心服犀角散治赤痢腹中疼痛小便澁口乾頓服當歸一兩犀角屑三分木香半兩黄芩兩半地榆三分黄連一兩去鬚右搗篩為散每服三錢以水一中盞煎至五分去滓不拘時候稍熱服無食子丸治赤痢肚心疼痛無食子地榆各半兩黄連一兩半黄蘖一兩酸石榴皮一兩右搗羅為末醋煮麫糊丸如梧桐子大每服十五丸食前温米飲下黄蘖丸治赤痢下黄赤膿四肢煩皮膚冷者黄蘖二兩黄連二兩熟艾半兩黄芩一兩一分右搗羅為末用白蜜三兩煉熟入蠟一兩鎔化入前藥末和搗丸如梧桐子大每服三十丸空心米飲下日晩再服一方作湯煎服茯苓丸治赤白痢及赤痢等疾赤茯苓當歸黄連黄蘖各一兩右搗羅為末煉蜜丸如梧桐子大每服二十丸空心米飲下赤白痢加阿膠一兩黄連散治赤痢兼大腸下血黄連黄蘖木香各一兩厚朴去粗皮右搗羅為散每服三錢空心粥飲調下日午再服治赤痢腹痛不可忍出聖惠方黄連二兩當歸一兩右以水三大盞煎取一大盞半去滓食前分温三服治赤痢臍下痛用茱茰一合黒豆湯吞之一方用杵搓磨吞嚥良治赤痢出本草用犀角燒成灰服之二黄丸治赤痢並一切痢方見本門枳殻散治赤痢不止枳殻胡桃各七枚皂筴右就新瓦上以火燒令烟盡取研極細分為八服每臨卧及二更五更時各一服紫參散治赤痢腹痛紫參三錢肉豆䓻一兩烏賊魚骨二兩右為細散每服一錢食前温米飲調下療下赤痢方秫米一把鯽魚鮓二合薤白一虎口細切右以合煑如作粥法噉之黄連丸治赤痢黄連四分陳倉米四分乾薑四分右搗篩為末緩火炒令色變以内二顆雞子白中煮熟和丸如梧桐子大空腹服五十丸以好無灰酒温一盞下之至晩痢赤色當變白明旦即差更服黄連湯治暴赤痢如鵞肝其痛不可忍方見本門血痢類療赤痢方香淡豉大半升黄連一大兩右以水一升半浸豉一日濾取汁碎黄連薄綿裹豉汁中煎服赤芍藥散治赤痢多腹痛不可忍溲而便膿者小腸泄也脉五至之乆洪者宜以七宣丸如脉平者立秋至春分宜香連丸春分至立秋宜芍藥蘖皮丸四季通用宜加平胃散七宣丸之類後宜服此藥去其餘邪兼平胃氣赤芍藥二兩黄蘖二兩右搗篩為散每服三錢以淡漿水一中盞煎至五分去滓不計時候温服一方醋糊為丸如梧桐子大每服五七十丸至二百丸食前温水下治赤痢腹痛不可忍出聖惠方寒水石一分砒霜半分右細研如粉以軟粟米飯和丸如菉豆大每于食前以冷甘草湯下三十丸治赤痢出本草用薤白同黄蘖煑服之即瘥治三焦壅熱其血流散乘脾之虚滲入大腸而所下之痢盡皆赤色别無白痢相雜並不壮熱亦無心腹疼痛診其脉上部洪大脾脉外鼓而澁先宜吃此方候上焦氣清赤痢消减或變成白或得稍减後却變為小腹迸脹即便修合後方吃取平安麻黄防風麥門冬獨活木香荆芥穗牡丹皮蒲黄前胡各一分右為細末每服二錢食後熱湯下去滓服候赤痢消减忽變成白忽覺小腹迸脹即修合後方吃也治赤痢喫前方了變成白痢病已稍可怱覺小腹迸脹宜喫此方防風甘草各一兩木香三錢芎半兩訶梨勒火炮右為細末每服一錢半水一盞煎取九分空心和滓喫治赤痢所下之痢渾是鮮血忽有黯黒色隨後多因使性於怒傷損肝心正氣忽因争打傷損經絡致有斯疾桑寄生一兩木香獨活甘草芎牡丹皮各一分右為細末水一盞煎取八分非時喫每服二錢小柴胡湯治赤痢急累心煩潮熱柴胡八兩黄芩人參甘草各三兩半夏二兩半右㕮咀薑五片棗一枚煎加芍藥地榆又宜黄連二錢重為末鷄子清丸如梧桐子大空心烏梅湯下治赤痢取蝮蛇骨燒為黒末飲下三錢匕雜蛇亦得治赤痢熱日乆不止黄連末鷄子白和為丸飲服十丸至三十丸即瘥療重下赤痢者出本草取獺黄赤糞下白者取白糞燒末清旦空心服以飲服一小盞三日飲之即愈治赤痢經年不愈右用菉豆角蒸熱随意食之如無菉豆角只蒸好菉豆煑粥食之當効血痢附論夫血痢者熱毒折於血滲入大腸故也血之随氣循環經絡通行臟腑常無停行積毒熱氣乘之大腸虚者血滲入腸虚則洩故為血痢也身熱者死身寒者生診其闗上脉如芤大便多血暴下血數升脉虚小者生疾數者難治乆不瘥多變嘔噦及為濕䘌也方牛角腮散治下血痢腹痛牛角腮為末當歸龍骨乾薑熟艾各三兩附子黄蘖赤石脂芎藭阿膠厚朴甘草橘皮石榴皮芍藥各二兩大棗二十枚黄連五合升麻一兩半蜀椒一兩右㕮咀以水一斗三升煑取四升去滓内牛角腮末阿膠消以綿絞去滓分七服日四夜三白頭翁湯治赤滯下血連月不瘥白頭翁厚朴阿膠黄連秦皮附子赤石脂黄蘖茯苓芍藥乾薑當歸甘草龍骨各三兩大􅀥三十枚粳米一升右㕮咀以水一斗二升先煑半合熟米内藥煮取三升分作四服蒲黄散治血痢蒲黄三合乾地黄桑茸甘草芒硝茯苓人參栢葉阿膠艾葉生薑禹餘糧黄連各二兩赤脂五錢右㕮咀以水一斗煑取四升分五服温服木香烏梅丸治一切下痢便血并腸風等疾烏梅二個木香百草霜絲𤓰灰各二兩黄連黄蘗黄芩梔子各一兩大黄半