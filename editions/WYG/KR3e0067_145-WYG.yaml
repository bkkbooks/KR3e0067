body:
  text: 普濟方卷一百四十六明周王朱橚撰傷寒門傷寒後脚氣夫傷寒後脚氣者此是風毒濕氣滯於腎經縁腎主腰膝今腎既受濕故脚弱而腫滿即成脚氣也又春夏之時温濕之氣摶於腎經沉滯不散兩脚浮腫疼悶而熱其體性夙有風毒則風濕之氣上衝心肺即氣悶而胸滿致於夭横診其左手尺脉當洪而數是其候也若服藥後其脉洪而緩者疾當愈也活人書云問傷寒頭疼身熱肢節疼痛大便秘或嘔逆而脚屈弱者此名脚氣也傷寒只傳足經不傳手經故也寒暑風濕皆作蒸氣足常履之遂成脚氣所以病證與傷寒相近其脉浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澁者起於寒風者汗而愈濕者温而愈熱者下而愈寒者熨而愈脚氣之病始得之不覺因他病乃知毒氣入心則小腹不仁令人嘔吐死在朝夕矣然終是與傷寒不同者孫真人云卒起脚屈弱不能轉動者此為異耳要之有脚氣之人先從脚起或先患寒熱疼痛寒氣勝者為痛痺有寒故也或行起忽倒或兩脛腫滿亦有不腫者或脚膝枯細或心中忪悸或小膓不仁病久入深榮衛之行濇鼓皮虚不榮故為不仁不仁者皮顔不知有無也或舉動轉筋或見食嘔逆惡聞食氣或胸滿氣急或遍體痠痛皆脚候也黄帝所謂風寒濕痺是也痺者閉也閉而不仁故曰痺寒中三陽所患必冷越脾湯小續命湯或加生薑自然汁最快暑中三陽所患必熱小續命湯去附子加桂一半大便燥者紫雪最良大便秘者脾約丸神功丸五柔丸大腕散木𤓰散主之脚氣之疾皆由氣實而死終無一人以服藥致虚而殂者頭疼身熱肢節痛而脚屈弱者是其人素有脚氣此時發動也脚腫者梹榔散主之脚氣方論千金外臺最詳此不復叙大抵越脾湯小續命湯薏苡仁酒脾約丸神功丸皆要也仍針灸為佳不服藥而用湯淋洗者皆醫之大禁也方㯽榔散出聖恵方治傷寒後脚氣上攻心腹煩悶坐卧不安㯽榔羚羊角屑木香各三分郁李仁半兩湯浸去皮微炙吳茱茰一分湯浸七次焙陳橘皮三分湯浸去白穰焙右為散每服三錢以水一盞煎至六分去滓不計時候温服鼈甲散出聖恵方治傷寒後脚氣攻心悶亂腹滿如石鼈甲三分塗醋炙微黄去裙闌木通三分剉郁李仁湯浸去皮尖微炒赤茯苓各一兩羚羊角屑㯽榔各三兩右為散每服四錢以水一中盞煎至六分去滓不計時候温服木香散出聖恵方治傷寒後脚氣心下痞堅或時煩痛不能飲食木香鼈甲塗醋炙微黄去裙闌訶梨勒皮㯽榔赤茯苓郁李仁湯浸去皮尖微炒各三分右為散每服四錢以水一中盞煎至六分去滓不計時候温服沉香散出聖恵方治傷寒後脚氣衝心煩悶氣促腰膝痠疼昏沉不利沉香三分赤芍藥一兩木通三分剉紫蘇莖葉一兩半呉茱茰半兩湯浸七次曝乾微炒㯽榔三分川朴硝一兩右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服半夏散出聖恵方治傷寒後脚氣心煩滿悶飲食不下嘔逆痰唾半夏湯浸七次去滑枳殻麩炒去穰赤茯苓前胡去蘆頭木通剉人參去蘆頭各三分右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服桑白皮散出聖恵方治傷寒後脚氣衝心神識悶亂桑根白皮剉木通剉陳橘皮湯浸去白穰焙紫蘇莖葉各二兩右為散每服半兩以水一大盞入生薑半分煎至五分去滓不計時候温服羚羊角散出聖恵方治傷寒後脚氣上衝心膈煩悶羚羊角屑一兩旋覆花三分赤茯苓一兩黄芩三分半夏三分湯浸七次去滑陳橘皮三分湯浸去白穰焙㯽榔三分聖濟方半兩呉茱茰半兩湯洗七次焙乾微炒右為散每服四錢以水一大盞入生薑半分煎至五分去滓不計時候温服聖濟方每服五錢匕水一盞半入薑一分拍碎同煎至七分去滓食前温服名羚羊角湯紫蘇散出聖恵方治傷寒後脚氣衝心心神煩亂嘔逆惡食腰膝痠疼紫蘇莖葉一兩木香三分聖濟方半兩赤茯苓三分聖濟方半兩沉香一兩呉茱茰一分湯浸七次焙乾微炒赤芍藥一兩陳橘皮三分湯浸去白穰焙聖濟方作一分㯽榔三分剉聖濟方作一分右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服聖濟方煎至七分去滓食前温服名紫蘇木香湯前胡散出聖恵方治傷寒後脚氣上攻痰逆頭目旋悶前胡一兩去蘆頭半夏湯浸七次去滑桂心甘草陳橘皮湯浸去白穰焙大腹子各三分赤茯苓一兩半桑根白皮一兩半剉右為散每服四錢以水一大盞入生薑半分煎至五分去滓不計時候温服犀角散出聖恵方治傷寒後風毒脚氣心膈壅悶頭旋目眩犀角屑三分防風去蘆頭羗活秦芃去苖各一兩陳橘皮一兩湯浸去白穰焙桂心大腹子各三分牛膝一兩半去苗右為散每服五錢以水一大盞入生薑半分去滓不計時候温服赤茯苓散出聖恵方治傷寒後脚氣上攻煩滿及脚膝疼腫赤茯苓赤芍藥枳殻麩炒微黄去穰大腹子各三分桑白皮一兩半剉紫蘇莖葉三分百合三分川大黄三分剉碎微炒甘草半兩炙微赤剉漢防己三分郁李仁三分湯浸去皮尖微炒羚羊角屑三分右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候温服柴胡散出聖恵方治傷寒後脚氣上攻心胸煩悶喘促食少柴胡一兩去苗旋覆花青橘皮湯浸去白穰焙各三分大腹子三分馬牙硝二兩甘草半兩炙微赤剉右為散每服四錢以水一大盞入生薑羊分煎至五分去滓不計時候温服又方出聖恵方木香三分㯽榔二分川朴硝三分紫蘇莖葉半兩枳實半兩麩炒微黄右為散每服三錢以水一中盞入生薑半分葱白三莖煎至五分去滓不計時候温服大黄丸出聖恵方治傷寒後脚氣并腎氣上衝川大黄一兩剉碎微炒牛膝三分去苖㯽榔一兩枳殻三分麩炒微黄木香三分人參三分去蘆頭郁李仁一兩湯浸去皮尖微炒桂心三分前胡一兩去蘆頭右為末煉蜜和搗三二百杵丸如梧桐子大每服食前以温酒下三十丸木𤓰丸出聖恵方治傷寒後脚氣久不瘥心腹脹滿腿膝洫腫胸膈煩悶木𤓰一兩半乾者桂心半兩沉香一兩柴胡一兩去苗㯽榔一兩髙良薑三分赤芍藥一兩呉茱茰三兩湯浸七次曝乾微炒厚朴三分去皮生薑汁炙令香熟右為末煉蜜和搗三二百杵丸如梧桐子大每服食前以生薑湯下三十丸淋蘸方出聖恵方治傷寒後初覺脚氣薏苡仁根三兩蒴藋枝五兩枳殻根三兩呉茱茰一兩右細剉以水三斗煎至二斗去滓入鹽半合浆水一碗看冷熱淋脚洗時踏一新磚勿令湯過脚面旋淋之湯冷為度後以生薑汁熱擦足心淋蘸方治傷寒後脚氣腫滿不消萆麻葉枸杞根葡萄蔓各一兩蒴藋枝七兩剉羗活一兩藁本一兩呉茱茰半兩杏仁半兩椒一合青鹽一兩右細剉分為二劑每劑用水二斗入連鬚葱白三莖生薑一兩拍碎煎至一斗去滓加鹽半匙避風處看冷熱淋蘸㯽榔散治傷寒後脚氣攻心悶絶㯽榔剉木香各一兩郁李仁微炒去皮桂去麄皮各三分呉茱茰湯洗三次焙乾炒半兩赤茯苓去黒皮牛膝去苗酒浸焙各三分右為細散每服一錢半以水煎桑白皮木通湯調下日二服陳橘皮散治傷寒後脚氣胸中滿悶喘息促急陳橘皮湯浸去白焙三分㯽榔剉一兩桂去麄皮三分牽牛子微炒一兩右為細散每服一錢半食前温酒調下日三服茯苓湯治傷寒後脚氣攻心悶亂腹滿如石小便赤􅉣赤茯苓去黒皮一兩鼈甲醋炙去裙闌郁李仁微炒去皮木通剉各三分右麄搗篩每服三錢七水一盞煎至七分食前温服半夏湯治傷寒後脚氣心煩滿悶飲食不下嘔逆多痰半夏湯洗七次炒乾枳殻去穰赤茯苓去黒皮前胡去蘆頭木通剉各三分右麄搗篩每服三錢匕水一盞入生薑一分拍碎同煎至半盞去滓食前温服赤小豆湯治傷寒後脚氣膝腫滿氣急大便閉澀赤小豆半合桑根白皮半兩紫蘇葉一兩㯽榔半兩右剉三味如麻豆大同赤小豆用水五盞煎至二盞半去滓分兩服食前温服犀角散治傷寒後脚氣兩脛腫滿心下煩悶犀角鎊一兩㯽榔剉半兩陳橘皮湯浸去白焙三分細辛去苗葉半兩呉茱茰湯浸三次焙乾炒一分右為細末每服一錢食前温酒調下日二服呉茱茰散治傷寒後脚氣心腹煩悶脹痛坐卧不安呉茱茰湯浸三次焙乾炒一分㯽榔剉當歸切焙木香郁李仁微炙去皮各三分右麄搗篩每服三錢用水一盞煎至七分去滓食前温服大㦸丸治傷寒後脚氣攻心腹脹鞕小便赤澀大㦸炒芫花醋炒令焦苦葶藶炒各半兩續隨子去皮炒巴豆去皮心壓去油净另研各一分右為細末入巴豆和研勻煉蜜和丸如小梧桐子大每服用丸或五丸温米飲下不計時候傷寒後勞復附論夫傷寒勞復何以明之勞為勞動之勞復為再發也是傷寒瘥後因勞動再發者也傷寒新瘥後血氣未平餘熱未盡勞動則真氣虧而邪熱還經遂致復發然此有二種一者因勞動外傷二者因飲食内傷其勞動外傷者非止强力持重行逺之勞至於梳頭洗面則動氣憂悲思慮則勞神皆能復也况其過用飲食者乎故内傷者謂多食則遺食肉則復者也内經云熱病已愈而時有遺者何也以熱而强食之病已衰而熱有所藏因其榖氣留摶兩陽相合故有所遺經曰經病有已瘥尚微煩設不了了者以新氣不勝榖氣故微煩損榖則愈夫傷寒邪氣之傳自表至裏有次第焉發汗吐下自輕至重有等第焉又其勞復則不然其邪氣之復來也必迎奪之不待其傳也經曰大病瘥後勞復者枳實梔子豉湯主之若有宿食加大黄黄帝曰熱病已愈時有所遺者何也岐伯曰諸遺因熱勝而强食故有所遺也若此者皆已衰而熱有所藏者其榖食相摶兩熱相合故有所遺也帝曰善治遺何也岐伯曰視其虛實調其逆從可使必己食肉則復多食則遺此其禁也宜枳實梔子䜴湯則吐之豈待虚煩懊憹之證加大黄則下之豈待腹滿譫語之後經曰傷寒瘥後更發熱者小柴胡湯主之脉浮以汗解之脉沉實者以下之亦使析其邪也蓋傷寒之邪自外入也勞復之邪自内發也發汗吐下隨宜焉嗚呼勞復也諸勞皆可治御内則死矣若男女相易則為隂陽易自病者謂之女勞復以其内損真氣外動邪熱真虛邪盛則不可治矣昔督郵顧子獻不以華敷之診為信臨死致有出舌數寸之騐由此觀之豈不與後人為鑒戒仲景曰傷寒瘥後更發熱者小柴胡湯主之脉浮者以汗觧柴胡桂枝湯脉實以下觧宜大柴胡湯又大病瘥後勞復者枳實梔子湯主之千金勞復以起死人參麥門冬湯又有食復者大病新瘥脾胃尚弱血氣未復强食過多停積不化因而發熱名曰食復大抵新瘥後多因傷食便作痞滿乾噫腹中雷鳴下利等證可與生薑㵼心湯仲景枳實梔子湯若有宿食内加大黄如棊子五六枚服之愈廣濟療患勞復雄䑕屎湯七味葱白湯皆可選用之飲酒勞復者陽盛生熱古人以傷寒為大病大病之後不可與酒勞發後飲酒致劇其熱尤甚傷寒已得汗觧因飲酒復劇煩悶口燥乾嘔呻吟妄語不得睡黄連解毒湯龍膽草湯或橘皮為佐汗下後有􅌷勞復者大汗則損氣損氣則陽微脉虚而惡寒大下則傷血傷血則隂弱脉濇而發熱悞汗下亦猶是耳且隂以陽為主陽以隂為根血隂也氣陽也血非氣使不能自行也下之亡陽是陽不生隂矣隂無所生而寒氣搏之所以脉濇寒極血虛所以發熱方藥之劑其可忽乎汗後陽微惡寒可與四逆湯或用甘草芍藥附子湯下後隂弱而發熱是為内熱可與葶藶苦酒湯瘥後勞復發熱小柴胡湯枳實梔子湯猳䑕糞湯即雄䑕糞兩頭尖者若脉浮則汗之宜麻黄湯脉實則下之用承氣湯大柴胡湯其證瘥後熱不減柴胡桂枝湯下利腸鳴痞滿者生薑㵼心湯小便不利麥門冬湯交接勞復外腎腫腹中絞痛橘