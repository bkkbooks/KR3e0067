復脾胃虚弱故不思飲食方人參丸治傷寒後脾胃虚弱不思飲食人參白术厚朴去麄皮薑汁炙各半兩細辛去苖葉一分陳橘皮湯浸去白焙一兩右為末煮棗肉和丸如梧桐子大每服生薑湯食前下十五丸消食丸治傷寒後脾胃氣虚不嗜飲食及氣虚不勝榖氣小麥蘖一升麴一升乾薑炮烏梅肉各四兩右為末煉蜜和丸如梧桐子大每服温湯下十五丸漸加至四十丸日再服茯苓散治傷寒後脾胃氣虚四肢乏力骨節煩疼口苦舌乾不思飲食白茯苓去黒皮柴胡去苖訶梨勒皮炙陳橘皮湯浸去白焙桔梗炒人參各一兩甘草炙半夏湯浸七次去滑各半兩枇杷葉去毛薑汁炙二兩枳殻去穣麩炒三分右為散每服五錢水一盞半入生薑一分拍碎同煎至七分去滓食前温服理中丸治傷寒後脾胃虚冷不入飲食人參白术乾薑炮甘草炙各等分右為末煉蜜和丸如彈子大每丸食前用沸湯化服人參散治傷寒後胃氣冷不思飲食人參厚朴去麄皮薑汁炙白茯苓去黒皮各一兩柴胡去苖三分半夏湯浸七次去滑焙枇杷葉去毛薑汁炙草豆䓻去皮各半兩右為散每服五錢水一盞半入生薑一分拍碎同煎至七分去滓食前温服白术湯治傷寒瘥後胃虚不能飲食白术陳橘皮湯浸去白焙各三分甘草炙一兩白豆䓻去皮髙良薑各半兩右麄𢷬篩每服五錢水一盞入生薑半分􅀥一枚同煎至七分去滓食前温服參朴湯治傷寒後脾胃氣虚不思飲食臟腑不調人參厚朴去粗皮薑汁炙各二兩陳橘皮湯浸去白焙訶梨勒炙桂去麄皮木香枳殻去穣麩炒黄耆剉各半兩甘草炙一分白术三分右麄𢷬篩每服三錢水一盞入生薑半分拍碎􅀥二枚擘破同煎至半盞食前温服日再服六神湯出濟生㧞粹方治傷寒後虛羸不思飲食人參白术黄耆剉各一分枳殻去穣麩炒白茯苓去黒皮各半兩甘草三分右麄𢷬篩每服五錢水一盞半入生薑半分拍碎棗三枚擘破粳米少許同煎至七分去滓食前温服參橘湯治傷寒後脾胃肺不和痰壅欲吐不思飲食人參陳橘皮湯浸去白焙各一兩前胡去蘆頭白术杏仁湯浸去皮尖雙仁炒枇杷葉去毛薑汁炙各半兩甘草炙一分右麄𢷬篩每服五錢水一盞半煎至七分去滓食前温服百合飲治傷寒後脾胃有餘毒氣滿不能食百合一分人參一分豉熬粳米淘各半合陳橘皮湯浸去白焙半兩薤白切五分生薑切半兩右剉如麻豆以水五盞煎至二盞半去滓分三服食後温飲治傷寒瘥後一年心下停水不能食出千金方生地黄五斤白术一斤好麫二斤右合𢷬曝乾為細末每服用酒調下方寸匕日三服白术飲治傷寒後胃虚不思食白术人參生薑切各半兩甘草炙一分右剉如麻豆以水三盞煎至一盞半去滓分二服食前温飲普濟方卷一百四十六
