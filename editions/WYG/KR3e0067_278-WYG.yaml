body:
  text: 普濟方卷二百七十八明周王朱橚撰諸瘡腫門諸腫夫腫之生也皆由風邪寒熱毒氣客於經絡使血澁不通壅結皆成腫也風邪不作者腫無頭無根浮在皮上如吹之狀不赤不痛或腫或散不常腫也其寒氣與血相摶作者有頭有根色赤痛腫其熱毒作者亦無正頭俱急腫久不消熱氣結盛壅則爲膿也其候非一也凡諸暴腫一一不同無問近遠皆服五香連翹湯刺去血小豆末𫝊之其間數數以針刺去血若失療已潰爛者猶服五香湯及漏蘆湯下之隨熱多少依方用之外以升麻湯溻洗熨之摩升麻膏若生息肉者以黄耆散若傅白䕡茹青黑惡肉不盡者可以􅀈頭䕡茹散半錢和白䕡茹散三稍稍傅之其散各取當已單擣下篩直爾成散用之方犀角膏療熱毒風并發背犀角羚羊角𤣥參續斷大黄白歛射干白芷黄芩麻黄去節各六分升麻十六分梔子仁二七枚薤白五觔具藍八分大藍亦可蛇啣切一升寒水石十二分愼火草切一升右切以竹瀝三升生地黄汁五合漬藥一宿内猪脂三升微火上煎十上十下候白芷黄膏成去滓塗病上延夀濟世方治瘡腫硃砂鹽花二錢雄黄明礬生楓香二錢黄丹赤石脂琥珀輕粉各一錢半麝香一錢片腦一錢巴豆去殻煮數沸􅒝麻子各一十九粒硏細右為細末豆萆膏和藥不就加煉蜜為度放於磁器内紙封如用旋丸如雞頭子大每服一丸井水送下食前服以利三五行温粥補之忌熱半日男子量虚實加減不必盡劑衝病即止有孕婦不可服就此藥丸如黄豆大安於瘡上軟膏藥䕶之開其瘡口收住暈毒為妙又治内外發背疔瘡肚癰無名腫毒誤食諸毒砒藥歹肉皆可治之大效又治小兒緊慢驚風丸如菉豆大每服一丸薄荷湯冷下内托復煎散出濟生㧞萃方治腫焮如外根盤不深形諸在表其􅎃多浮痛在皮肉邪氣盛而必侵於内須急内托以救其裏也地骨皮黄耆防風各二兩芍藥黄芩白术茯苓人參甘草當歸防己已上各一兩栁桂淡味加五錢右㕮咀先煎蒼术一斤用水五升煎至三升去蒼术滓入前藥十二再煎至三四盞絞取清汁作三四服終日服之又煎蒼术渣為湯去滓冄依前煎十二味藥滓服之此除濕散鬱熱使胃氣和平如或未已再作半料服之若大便秘及煩熱少服黄連湯如微利煩熱已退却服復煎㪚半料如此使榮衞俱行邪氣不能自侵也紫草膏出聖惠方治一切腫毒肉色不異時時牽痛經年腫勢不消紫草一兩桂心一兩芎藭一兩赤芍藥白歛川大黄防風去蘆頭黄芩莽草當歸木香甘草各一兩右為細散每用散二兩酒二升於鐺中煎令成膏及熱塗熁腫處日再用之紫葛散出御藥院方治諸腫貼方紫葛十分大黄五分青木香一分𤣥參白歛黄芩黄連榆白皮升麻由跋各二分赤豆一合右治下篩以生地黄汁和如泥傅腫上乾則易無地黄汁與米醋和之一方無油跋以温水調傅藥乾再掃金花散出御藥院方消赤腫止疼痛散毒氣川大黄黄蘖鬱金黄連黄芩各一兩甘草朴硝寒水石各半兩白芨白歛各少許糯米粉三合右為細末每用生蜜水調稀鷄翎塗掃四畔焮赤腫處療風毒及一切腫塗散方大黄五兩白歛三大兩寒水石紫葛青木香各一大兩硝石黄芩各二大兩大青三兩苦參三兩右𢷬㪚和牛乳塗故布上搨腫上隨著即消乾復易之若腫在骨節搨近骨節好肉處移取腫搨即消廣聖散治一切腫毒蒼术一斤米泔水浸四時川烏半觔泡草烏四兩泡蝎稍二兩地龍二兩去土天麻三兩細辛五兩去葉川芎五兩白芷五兩右一處為細末治風毒腫用温酒調下一錢外以水調搽患處半身不遂風寒暑濕用温酒調下一錢腦疽發背以井花水調塗四畔外用温酒調服風犬咬傷用温酒調一錢外以水調搽患處一切頭風用生葱茶調下傷寒用温茶調下出汗疔瘡用温酒調服外用醋調搽臁瘡用井花水調搽小兒風證用薄荷湯調下忌一切諸葷商陸膏貼諸腫瘡商陸二兩黄芩黄連白芷白歛大黄莽草各二兩白芨二兩右搗篩消膠汁和如泥塗紙貼腫處乾即易之金黄㪚消腫散毒生肌止痛黄連大黄黄耆黄芩黄蘗鬱金各一兩龍腦半錢另研甘草半兩右為細末入龍腦硏匀若治濕毒丹毒腫新水調掃赤上或蜜水調如稀糊用小紙花子貼之或小油調掃如久不瘥熱毒瘡亦乾糝或水調塗亦佳七聖散治一切腫毒不出三日神効累用果驗當歸黄耆蜜炙乾貝母各五錢甘草枳殻四錢白芷六錢乳香痛加三錢不痛減用右用皂角刺七個搥破水二大盞同煎取一盞服千金散治諸腫毒便毒初覺一服即愈金銀花大黄山梔子牡蠣酥煅各半兩瓜蔞一箇剉川山甲炮二錢半甘草少許右為粗末每用好酒半碗水半碗煎至八分去滓隨病上下服忌鷄蝦馬肉等物水黄散圍腫毒犀角屑草烏皮尖大黃白芨白歛麝香朴硝各等分右為細末蜜醋調薄攤油紙上貼之稍乾掲下再添潤濕貼之如用平起先塗藥仍以油紙貼上外用漬毒藥治諸腫毒堅硬不消黍黏子葛根升麻地骨皮甘草金銀花黄花地丁各等分右為麤末每用五七錢水一升煎汁沸於腫處四畔熱用冷則再煖治毒腫方草烏尖去皮天花粉赤小豆天南星貝母香白芷拒霜葉隂乾秋後收者右各等分為細末或醋或生薑自然汁調敷中留小口出毒氣腫者㪚熱者潰當歸内消散治諸般腫毒白殭蠶香白芷貝母桔梗百藥煎甘草右各等分為細末每服二錢用茶清調下縮毒金粉㪚鬱金半兩白芷一兩天花粉一兩甘草半兩川芎一兩乾葛一兩右為細末每服二錢茶清調下如無鬱金用黄芩或蒲黄皆可代用和血通氣丸人參一兩大黄黄蘖黄芩去腐各四兩麥門冬去心二兩牽牛一觔炒香取頭末四兩右為細末煉蜜和丸如豌豆大每服二三十丸食後温水下尋常積熱之人隔三二日服此藥惟利潤動永不生瘡腫乳香托裏散治一切瘡腫疼痛不可忍者如少壯氣實者先疎利後服之御米殻去膈蒂蕚蜜炒一二兩當歸芍藥川芎各半兩乳香沒藥各一錢右為麤末每服五錢水一盞半煎至七分去滓温服病在上者食後下者食前若未止即再服消毒散出聖惠方治一切腫毒及治腫而疼痛者天南星鬱金木鱉子去殻草烏頭赤小豆朴硝硏細旋入各等分並生用右為細末如腫赤色用冷水調傅腫四畔如不赤温淡醋調加味消毒飲子治搭腮腫荆芥穗甘草牛蒡子防風羌活連翹各等分右為麤末水煎三兩服㪚毒然後用藥塗腮腫處切不可便用藥塗毒氣入喉中不救金花散出十便良方治一切熱毒結聚焮赤疼痛消腫解毒葉子雌黃半兩細研黄連半兩去鬚檳榔一分鬱金半兩川大黄半兩麝香一分細研右為細末雌黄并麝香同硏令匀以麻油調如糊塗於腫上日二換之一方有黄蘖無鬱金藜蘆膏出千金方治赤色腫有尖頭者藜蘆二分黄連礬雄黄松脂黄芩各八分右為末豬脂二升二合煎令烊調和以傅上瘑癬頭瘡極効又治濕瘡經年抓搔癢處成孔者梔子仁湯出瘡精要治時氣頭面赤腫鬱金枳殻去穰升麻各一兩梔子仁牛蒡子大黃各一兩右為細末每服三錢蜜水調下金黃散治敷諸腫毒天花粉黄栢寒水石黄芩何首烏右各等分為細末用凉水調敷之本方用鬱金治敷腫痛藥赤小豆一升天南星二兩小粉二兩炒木鱉子二兩用肉草烏二兩右為細末用米醋調敷加無名異尤妙溻腫湯出御藥院方治諸腫痛不消或筋脈拘攣不能屈伸蒲盆盈黄花地丁枸杞苖鷺鷥藤升麻葛根各等分右為麤末每用半兩水一升煎十沸去滓熱溻冷則再煖溻之圍腫方草烏白芨白歛黄蘖朴硝各等分右蜜調入醋和匀圍腫外即便收起治諸般腫毒并便毒腸癰方白术赤茯苓猪苓澤瀉瓜蔞各等分右一半水一半酒煎一盞露天一宿若病在上飽服在下空心服五香散出聖惠方治一切毒腫疼痛不止沉香一兩木香一兩丁香一兩薰陸香一兩麝香一錢細硏右為末散入麝香更硏令匀每服二錢水一鍾煎至五分不去滓不拘時候温服一方滓敷腫上佛手散出御藥方治一切腫毒黄蘖大黄各一兩甘草半兩朴硝三兩粟米粉一兩右為末每用水調如膏塗患處消腫毒方牡蠣草烏頭南星半夏貝母右各等分用薑汁麫調塗之一方添知母單用薑汁塗之内消散敷前項赤腫朴硝香附子木鱉子橘紅右為細末用蜜水調敷之内托散出儒門事親書治諸般腫毒惡瘡一服立愈大黄牡蠣各半兩甘草三錢瓜蔞二箇山梔子亦可右㕮咀每服三錢水一大碗煎至七分去滓温服麝香散治皮肉卒腫起已入腹者及產後婦乳腫痛壯熱欲結成癰者宜服此方麝香薰陸香青木香鷄古香各一兩右以水四升同煮取二升分為再服若惡核腫結不可散者以吳茱萸小蒜等分合搗傅之單蒜亦可一方為末水調服消腫毒方用檳榔半兩猪糞燒存性半兩龍骨三錢輕粉少許鹽湯洗患處拭乾油調塗之効乳香餠子出聖惠方治一切惡腫毒蔓青根一握乳香一兩黄連一兩去鬚杏仁四十九枚湯浸去皮右搗三五百杵團作餠子三四分厚隨腫處大小貼之乾即易肘後用术三四錢白者各剉消腫毒方用黄蠟鎔開攤紙上用茶湯入飛鹽洗患處後用蠟膏貼之三日一洗換祛毒散出應驗方治腫毒便毒一切惡瘡傅貼効貝母白芷各半兩赤小豆四十粒蒼耳葉四十九葉右為細末用蜜水調敷腫處無蜜新井水調如乾再調濕頻換日三五次即愈犀角消毒散防風人參大力子甘草生各一兩犀角右為末每服五錢水半碗煎一盞冷服通氣散治諸腫毒初發無異宜服陳皮一觔去蒂阿膠四兩炒甘草四兩右㕮咀每服半兩用水二盞煎八分去滓温服替針膏出應驗方信江子斑猫右為細末丸如小麥粒大每用時針挑破安藥在内膏藥貼上治頸項及胷背有大腫赤發即封之令不成膿方出千金方朴硝三兩香䜴生地黄各半觔右合搗煮令地黄爛熟敷腫處厚二分日三四易至瘥止兼治一切腫治諸般腫毒出聖濟總録用紅槿花去蕚搗為膏敷之若乾以蜜調敷五棓子散治一切腫毒五倍子大黄黄蘖各一兩剉右為散新汲水調如糊日三五度敷患處如氷散治一切腫毒無名異苦杖香白芷右各等分為細末用新汲水調敷之黄芩湯治汗後餘毒頰腮腫痛黄芩瓜蔞甘草右㕮咀每服半兩白水煎服縮毒散治諸般腫毒白芷二兩山梔子二兩半右為細末每服二錢用酒調下隨病服治諸腫毒方生薑一塊洗浄乾山藥比薑用三分之二右一處搗爛敷腫處乾濕自加日換五次即消治一切惡毒腫出聖惠方槐子半觔䕶火草一把右合搗水和敷上乾即易之治無名腫毒或背疽蒼耳端午前収燒灰存性芙蓉葉重陽前収同研為末右以蜜水調敷之治臂腕腫痛取死蛇一條以水煮取濃汁浸腫痛冷易之治諸惡腫失治有膿出肘従方取燒棘針作灰水服之經宿頭出治手脚酸痛兼微腫取烏麻五升熬碎之酒一升浸一宿隨多少飲之治腫以栁枝如脚指大長三尺二十枝水煮令極熱故帛裹腫處取湯熱洗之即瘥又方以醋硏萊菔子服之消腫毒不可與地黄同食治身體手足腫以牡驢脂和鹽敷之治身體手足卒腫以米醋和蚯蚓屎敷之治卒暴疼腫中有物如石刺痛啼呼若不治百日死取商陸根搗汁或蒸之以布藉腹上安藥勿著腹冷復易晝夜勿息治一切腫以紫檀細碎米醋和敷腫上又方以紅藍花煮爛熟搗取汁服之不過再三服便瘥服之多少量腫大小而進之治暴患赤腫以芸生皮三兩搗和三年醋滓封之日六七易亦治妒乳腫脹服丹石人採藥生服一兩莢佳子作醤食能助肺殺諸蟲下氣令人能食凡心腹惡氣卒心痛食之良治穀道赤腫以杏仁杵作膏傅之治諸腫方取薑石碎如碁子炭火燒赤投米醋中浸之良久又燒如此十遍鹿角一具連􅨨骨者二三寸截之炭火燒令烟出即止加白歛末與石末等分鹿角倍之三物同搗篩令極細取三年米醋於鐺中煎如魚眼沸即下前藥調和令如寒食餳以箆傅於腫上惟留腫頭如指面勿令有藥使熱氣得洩如未有腫膿即當内消若作頭即撮令小其病久直至肌肉爛落出筋骨者即於細布上塗之貼如瘡上乾即易之但中隔不穴者即無不瘥其瘡腫切禁手觸其効極神異又方以薑汁或乾末和油煎成摩結核上三五度瘥治凡腫已潰未潰者以鯉魚燒作灰醋和塗之一切腫上以瘥為度獨聖散治腿上赤腫疼痛漸次移下消用真川芎為細末五錢擂蘿蔔汁調服消腫毒方用好京墨醋磨塗四圍薑汁和猪膽塗毒上乾即再塗効治毒氣攻手足腫疼以櫸樹皮槲皮合煮汁如飴糖以樺皮濃煮汁絞飲之赤龍散出儒門事親書消散一切腫毒以野葡萄根紅者去粗皮為末新水調塗腫上頻掃新水水調膏出百一選方治一切腫毒以小粉不拘多少炒令焦黑研細先以米醋一大盞入搥碎皂角二梃煎滚數沸攄去皂角滓蜜收之逐旋調藥或攤紙花上敷之神効方治痄腮及癰疽發背瘡癤等證皆治立効以赤小豆為細末以新汲水調敷瘡上及四邊赤腫處乾即再傅之蒺藜散以蒺藜一升熬令黄搗篩以麻油和之如泥炒令焦黑以塗故帛上剪如腫大勿開頭揩上無蒺藜子用小豆和鷄子如前乾則易之甚効神効方出肘後方療一切腫初覺痛不可忍取麪搜如十指取麤繞腫令匝滿中布生椒又以一觔麪可排上蓋之當中以艾炷如酸棗大灸之葢麪欲焦即換著新麪痛停止水銀搨方出聖濟總録治惡毒風腫熱痛以水銀二觔以紙分為兩裏宻繫頭更以帛重裹勿令走失遞互将搨上覺濕即易不過十數度熱盡歇即消矣神効一方治偏腫毒以茴香甘遂各等分以酒調二錢服之圍腫方以馬齒莧朴硝黄蘖以水蜜和塗腫處治諸腫毒及火丹蛇咬以地錢草丹爐中名此俗呼火丹草其形如小錢大葉如荷葉又名散風草和薑鹽爛搗敷之立愈或加見腫消草尤良秘方治腫毒以黑豆一觔米醋煮乾就炒燥硏末山藥半觔為末官桂二兩為末用鮮米粉作糊為丸無灰好酒送下一百五十餘丸不拘時侯三聖散治無名腫毒惡物所傷幷破傷風以好石灰一觔鐵鍋内炒紅傾入磁器内加大黄末二兩和匀水調搽腫暈處又方以貝母香白芷酒擂服以滓敷之初患者一宿即消痄腮方用水調乳香末塗之仍服蘇子降氣湯治一切熱毒癰腫疼痛不可忍者出聖惠方用蒼耳子不限多少熬令微黄搗為末取油淀相和塗於腫上乾即換之蒼耳汁漬之佳治毒攻手足赤腫疼痛方出肘後方用鹹䜴及羊屎一升煮令熱漬之又方細剉黄栢五觔以水三斗煮漬之亦治攻隂腫痛又方以牛肉裹腫處腫消痛止羊肉亦得皂莢乳香酒出聖濟總録治腫毒以皂莢刺大者一枚剉作十餘片用乳香一塊鷄頭石大銀石器内炒令烟起入皂莢刺同炒候香纒在刺上便入醇酒一盞同煎令沸濾去滓作一服腫未成者便消已成者則膿毒自破消腫毒方用黄栢蘸猪膽汁炙數次為末水調傅之又方用野地人糞下土水調塗之又方用好粉油調碗内另燒艾薰至黄色抹搽之又方用生茄子皮貼臭黄水即出一日一換亦可治臁瘡犀角升麻湯出本事方治陽明經絡受風熱口唇頰車髪鬢腫痛及鼻痛不可開口雖言語飲食亦相妨犀角七錢川升麻半兩防風一錢半羌活三錢生甘草一錢半川芎白附子香白芷各二錢半黄芩三錢半右㕮咀都作一服水五盞煎至三盞半去滓分作三服一日一服訖其證必減如臟腑有些溏不妨足陽明胃經也經云陽胃為市又云陽明多血多氣胃之中腥羶五味無所不納如市㕓無所不有也六經之中血氣俱多腐熟飲食之毒聚於胃故此方以犀角為主解飲食之毒陽明經絡環唇挾口起於鼻交頞中循頰車上耳前過額上入循髪際至額顱昔王公患此一經證亦以升麻佐之餘藥皆滌除風熱升麻黄芩專入胃經故用有効神應散出御藥方治諸瘡腫硬色白不潰疼痛不已用吳茱萸不拘多少生用為麤末熨烙却用鹽包蓋之升麻湯大潝漬腫毒方見本門丹毒類消赤散出家藏經驗方治一時赤腫作痛黄丹一錢生草烏二錢半牡蠣四錢火煅蛤粉八錢生右為細末每用三錢汲井花水調用鵝毛掃敷治腫不下出百一選方冬青葉川蘖甘草右等分煎湯以五升瓶盛湯浸三兩時必下蘖皮散出楊氏家藏方治一切風熱毒氣赤腫疼痛赤小豆天南星生用黄蘖上三味各一兩土硃一分右共為細末新水調成膏子攤在紙上貼之消腫散出楊氏家藏方治風熱毒氣上攻頭面或遍身赤腫疼痛鬱金甜葶藶大黄黄芩已上四味各半兩芒硝另研赤小豆一合伏龍肝二兩右件為細末以生鷄子白入蜜少許調令稀稠得所塗之乾即再塗如水散出楊氏家藏方療風邪熱毒壅滯肌肉榮衛不宣藴積成腫血澁膚腠如丹之狀風隨氣行遊無定處邪毒攻衝焮赤熱痛朴硝五兩另硏蛤粉寒水石各三兩香白芷一兩腦子一錢另研右􅟢為細末和匀每用新汲水調稀稠得所以鷄翎塗掃勿令藥乾玉粉散出楊氏家藏方治熱汗浸漬成瘡腫痒焮痛方見本門疿瘡類治身體頭面忽有暴腫處如吹方出肘後方用巴豆三十粒連皮碎水五升煮取三升去滓綿蘸以拭腫上趂手消勿近日七聖散出衛生家寳方治消熱毒赤腫痛不可忍黄芩一兩去黒心大黄一錢滑石四兩右為細末每次二錢用冷水調掃腫赤痛處如乾即再掃白鶴散一名拔毒散出衛生家寳方治熱毒腫硬難消者寒水石軟者一兩燒爆不散者乃是寒水石燒爆裂散即是石膏不可用右用炭火燒寒水石通赤細硏冷水調少許在瘡髙處後用萬金膏貼每日一次上用此藥後便軟破瘡頭兒更用七聖散掃膏藥周廻腫處藥乾即更掃治卒風毒腫痛出聖惠方伏龍肝右以醋和如泥塗於腫上乾即易之又方右以獨顆蒜切作片子貼於腫上艾火灸之二七壯極驗水調膏出衛生家寳方治風熱腫毒結聚未成頭者寒粟米不拘多少遇三伏日用盆缽盛粟汲井花水浸泡露地五七日一易水直至盡臘方取出搗硏如膏曬令乾入鍋炒令焦黑色出火毒為細末每約量用多少水調成膏攤紙花上貼之効白芨散出十便良方治發瘡腫硬熱赤不㪚麒麟竭指而大塊木鱉子五箇去皮殻硏白芨五大指塊黄連半兩右為末用猪膽汁調塗上留一竅以瘡消為度乾即易之治赤腫白芷大黄右為末蜜醋調塗治腫毒出本草右用土蜂窠上細土醋和為泥敷之治一切腫毒兼止疼痛出本草用皂角於酒中取盡其精於火内煎之成膏塗帛貼之治腫毒出本草用落蘇入醋摩敷之治腫毒出本草用地椒作湯淋洗敷腫方出本草取􅀈壤堆上去苦酒和為泥敷腫處極妙一方用酒治諸腫失治有膿出本草以蛇蛻皮燒灰水和敷腫上即蟲出治諸惡腫出本草取黄藥根硏服之塗赤腫上治腫毒出本草以大青莖葉搗塗罯患處又方出本草以瞿麥搗敷之治腫毒遊風風􅇙頭痛出本草並以芭蕉根硏窨敷治腫毒出本草用蘿蔔子醋硏敷之消又方出本草用白商陸同大蒜熁之消腫毒出本草以積雪草用鹽挼貼腫上治一切腫痛風疾出本草以虎刺根葉枝幹細剉焙乾搗細為末煖酒調服一錢治一切赤腫但癰毒結未成者並可消用黄蜀葵子不拘多少硏細滴水硏令稀稠得所将絹帛子裹定旋挹所餘汁撲腫所四畔數撲之有竒効法治毒攻手足腫疼痛方掘坑令深三尺少容兩足燒坑令熱以酒灌坑中著履踞坑中壅勿泄治腫多癢按之隨手起或瘾疹方但令忍痛以手摩捋抑按數度自消治皮膚惡腫出本草以仰盆水磨敷之風腫附論夫風腫之證不痛不赤一身浮腫起如吹脬但覺體冷如石煩滿短氣骨節沉重此蓋陽氣不足腠理虚疎為風邪所乘久而不去復為寒濕所搏壅塞不通結盛生熱致令身體浮腫内經為熱勝則腫是也久不愈則風熱積肌肉潰為肉泥之類便致危殆治與水腫不同宜以通榮衛去風濕之劑調之又忽發風腫或著四肢或在胷背或著頭項發作虚腫如吹之狀不痛不赤著四肢者乃欲不遂令人煩滿短氣身體常冷皆由冬月遇温風入於肌裏至春復大寒風不得出氣壅肌間不自知覺至夏恣取風凉氣聚不散而成腫也久不瘥氣結盛生熱乃化爲膿若至爛敗則殺人右手關上脈浮而虛者病腫也方龍砂丸出聖濟総録治一切風毒頭面虚腫􅇙痳徧身風瘙生瘡風氣走淺骨肉疼痛攻刺胷膊頭項熱痛冷􅂒白虎風脚手乾小腎臟風拘急四肢轉動不得流灌脚膝上腫眼目昏暗澁淚赤腫女人血風鑚刺四肢瞤麻髮落頭疼男子腎臟風下注變為脚氣生瘡紫黑脹爛等疾天麻芎藭附子炮製去皮臍狗脊去毛躑躅花藿香葉紫葳凌霄花是也乾蝎去土沙地龍去土沙白芷藁本去苖葉乳香硏楓脂香研白殭蠶炒各半兩􅒝薢一兩蒺藜子去角炒獨活去蘆頭各半兩麻黄去根節敗龜醋灸各一兩烏頭炮去皮臍白花蛇酒浸去皮骨灸一兩右以一十九味為末與二味硏者和匀煉蜜丸如彈子大别以丹砂一分龍腦麝香各二錢同硏為末每服一丸空心薄荷温酒嚼下烏蛇膏出聖惠方治風毒瘡腫疼痛方見本門丹毒類犀角飲出聖濟緫録治諸風腫犀角鎊𤣥參連翹柴胡去苖各半兩沉香檀香甘草灸剉射干去鬚各一分芒硝生用一兩升麻三分木通剉三分麥門冬去心焙一兩右麤搗篩每服五錢用水一盞半煎至八分去滓温服食後良久及夜食後各一服利多即减一名犀角湯無檀香茯苓飲出聖濟總録治風氣攻頭面浮腫煩渴心中躁悶肚腹脹滿小便秘澁赤茯苓去黑皮郁李仁去皮赤芍藥各一兩半大腹皮二枚幷子百合柴胡去苖桑根白皮剉陳橘皮湯浸去白焙枳殻去瓤麩炒知母剉焙各一兩右麤搗篩每服五錢用水二盞煎至一盞去滓入芒硝末一錢更煎沸分二服空心夜卧各一熨風散出瘡科精要治諸因風致腫羌活防風白芷當歸芍藥吳茱萸細辛芫花官桂各等分右為麤末作二劑赤皮葱連鬚切半觔同釅醋拌匀炒令極熱帛裹於瘡熨之稍冷即換藥熨之上下痛已而止連翹散出聖惠方治風腫欲結成膿令内消連翹一兩半沉香紫檀香犀角屑川升麻甘草各一兩射干𤣥參各二兩川芒硝三兩右為麤散每服四錢水一中盞煎至六分去滓食後良久温服射干湯出聖濟總録治諸風腫欲成膿射干去鬚𤣥參堅者各二兩犀角鎊連翹沉香剉升麻紫檀香各一兩右為麤末搗篩每服五錢用水一盞半煎至八分去滓入芒硝末半錢更煎沸食後夜臥温服若利即減羚羊角飲出聖濟總録治風毒攻衝頭面虚腫羚羊角鎊犀角鎊羌活去蘆頭檳榔剉人參各一兩當歸切焙半錢右為麤末搗篩分作四服每用水二盞煎至一盞去滓臨臥空心温服餘滓重煎解風腫毒腫出聖惠方沉香木香薰陸香麝香鷄舌香紫檀香右各等分為細末用水調敷之黑豆浸酒出聖惠方治風腫無問冷熱黑豆一升炒熟白花蛇一條重五兩酒浸灸微黄大麻仁二升蒸熟五加皮五兩剉蒼耳子五兩炒微黃牛蒡子一升酥炒微黃右搗碎生絹袋盛用好酒三斗内入磁瓶中封頭浸經七日開瓶每於食前煖一中盞服之半夏散出聖惠方治卒熱毒風腫半夏莽草川大黄白歛川芒硝各一兩右為末以水和如泥塗之乾即再塗生犀湯出聖濟總錄治諸風毒氣身體疼痛面目暴腫連手足生犀角鎊三錢貝齒生用先搗後硏一兩羚羊角鎊一兩半升麻一兩三錢生用右為麤末搗篩每服三錢用水一盞煎至六分食後去滓服日二服夜一服鹿角散出聖惠方治皮膚卒風赤痛鹿角五兩白歛二兩牡蠣四兩附子二兩右為末以醋調塗於帛上貼腫處乾即換之黄耆丸出聖濟總録治風毒腫滿黄耆剉枳殻去瓤麩炒熟威靈仙米湯浸洗焙乾木石臼中搗各一兩右為細末以軟飯和丸如梧桐子大每服三十丸温酒下不拘時袪風散出聖濟總録治風腫塗方天南星白礬草烏頭去皮臍右等分並生用為細末每看腫處用酒調鷄翎掃之風毒腫甚者用生薑自然汁調刷之立消木香散出聖濟總録治風腫木香楓脂香各半兩生菖蒲一兩右為散醋調敷之治風毒腫氣急硬疼痛方出十便良方栁枝一握細剉桑枝一握細剉黑豆一升右藥相和炒候大豆熟為度以好酒五升投之良久澄濾去滓每夜欲臥時以意斟酌煖飲之其滓入鹽一兩炒令熱以帛裹之於腫處熨之冷即炒不過三兩度重臺草散出聖惠方治風毒暴腫重臺草木鱉子去殻半夏各一兩右為細散以釅醋調塗之凡是熱腫熁之即消當歸湯出聖濟總録治風腫當歸切焙二兩半甘草炙剉一兩半右為麤末搗篩每服五錢用水一盞半煎至八分去滓空心温服午時夜卧各一服大麻仁傅方出聖濟總録治風腫大麻仁生用赤小豆生用各二合右搗硏極細冷水調敷之紫檀塗方出聖濟總録治風毒腫紫檀香剉二兩芒硝半兩右水磨每用濃者三合塗腫處乾即易桑枝湯洗方出聖濟總録治風毒攻肌肉皮膚浮腫或在脚在手桑枝切槐枝切各一升右以水一斗煮七升去滓淋洗芎藭淋洗方治風毒攻肌肉皮膚浮腫或在脚或在手芎藭二兩苦參三兩右細剉以水一斗煮取七升去滓淋洗蠶沙熨方治風腫晩蠶沙鹽各不拘多少右相和炒熟布裹熨之冷即再炒或入少許醋大佳治身體手足卒風腫方驢脂四兩鹽二兩右搗令熟敷腫上日三易之又方浮萍草三兩紫草三兩右搗令熟敷腫上乾即換之蛇床湯洗方出聖濟總録治風毒攻肌肉皮膚浮腫或在脚或在手取蛇床子一升生用以水一斗煮至五升去滓通手淋洗蝙蝮糞塗方出聖濟總録治風毒腫以蝙蝮糞硏細以冷水調塗之杏仁膏出聖濟總録治風腫以杏仁生用五合燒令烟出罯滅細硏取駞脂二兩熬濾去筋膜和匀成膏敷腫上點燭遥炙蒴藋煎出聖濟總録治風腫以蒴藋根洗切八觔爛研以水三斗浸絞取汁熬如稠膏取猪脂一觔鎔去滓火停冷與前膏和匀更煑三五十沸每服一匙至二匙空心臨臥熱酒調下又取塗摩患處一云用苖切五升用水一斗煮取七升去滓淋洗磨桂塗方出聖濟總録治卒得風腫以桂不拘多少去粗皮用醋於砂盆内磨塗風腫上火炙乾又塗之附子湯浸洗方出聖濟總録治風毒攻肌膚皮肉浮腫或在脚或在手以附子生去皮臍剉四兩用水一斗煮至七升去滓熱洗餘滓更煮洗馬藍湯洗方出聖濟總録治風毒攻肌肉皮膚浮腫取藍切五升以水一斗煮取八升淋腫處白楊湯洗方出聖濟總録治風毒攻肌肉皮膚浮腫以白楊皮取東南面皮去地三尺以來去蒼皮勿令見風細切半觔用水一升煎至七分去滓熱洗以腫消為度治風毒腫及麻痺出本草以芥子醋硏敷之治手足心風腫出肘後方以秦椒鹽末等分醋和敷之治風腫止痛撲損惡瘡出本草以菝葜葉和鹽塗敷之佳治卒風毒腫氣急痛出聖惠方以桞白皮一觔剉酒煑令熱帛裹熨腫上冷再煮易之去風毒瘡腫出聖恵方以都管草四時皆有採其枝根煎湯淋洗治風腫成瘡已潰未潰者皆効出肘後方以牛膠一片水漬濕軟貼之當頭上開一孔子如已潰還合未潰即消能撮去膿膿盡則合未成則内消一方用白膠一片効治諸瘡因風致腫方出千金方以白芋燒灰温湯和厚三分敷瘡上乾即易五六度瘥又方出千金方取櫟根皮三十片剉以水三斛令煮熟下鹽一把令灼灼然熱以浸瘡當出膿血日日爲之瘥止一方無鹽治風腫外風入瘡口腫痛方用劉寄奴末摻瘡口止痛治熱毒風腫及諸癰發背等方出聖惠方用牛蒡根去黑皮切半觔以無灰酒一升水二升相和下牛蒡根慢火煎濃汁看少粘即去滓却向鐺中煎如稀餳即停火膏成先以膏於腫處塗之便著故帛貼之日夜三四度易之治風及惡瘡疥敷之疼痛内消方出十便良方用肥皂莢一觔以文火炙令黑色搗為末取酒三升入藥熱攪熬成膏臨時看疾狀大小用藥塗貼日二易之芸薹膏方出聖濟總録治卒風腫以芸薹子一升用米醋二升略煎三五沸漉出爛研漸入醋調絹絞取汁又取桂二寸搗末杏仁四十九粒生用湯退去皮尖雙仁亦爛硏生薑三兩搗汁相和然後取天靈蓋兩片各如掌大洗去垢汚燒灰搗羅為粉與諸藥和匀以火養成膏旋取貼於腫上不過兩三次其腫自消又方出聖惠方治風腫用皂莢刺一撮去兩頭以水一大盞煮取六分去滓頓服取快利其腫便消治卒風腫毒起急痛方出聖惠方用蔓箐根一觔洗去土爛搗以醋和如泥敷腫上以帛裹三日易之又方出聖惠方治風腫用牛糞燒灰為末醋和敷腫上乾即易之又方出聖惠方治風腫用川芒硝二兩研為末用醋調敷之乾即再塗治皮肉卒腫起出肘後方用水和石灰封上妙又方出肘後方用苦酒磨升麻或青木香或紫檀香以磨傅上良一方以苦酒磨桂或獨活數敷之良治風腫出本草以桑根下土搜成泥餅敷風腫上仍灸三二十壯取熱通瘡中又人中熱風水肉腫一箇差以土埦灸二百壯當下黄水即愈也治風瘡腫惡毒出本草以黑錫醋為末和青木香末猪脂調敷治諸風腫毒及諸瘻出本草以惡實根作茹食之解風腫出本草以菩薩石用水磨服之治風毒腫白虎瘋出本草以三年釅醋五升煎三五沸切葱白二三升煮一沸許漉出用帛熱裹病處熨之以瘥爲度洗方出本草治風腫風損及瘡等用石榴葉馬鞭草貼壁草煎湯洗之治風腫毒瘡疥癬以臘月收野猪脂塗之氣腫附論内經謂因於氣為腫四維相代則腫毒之作蓋有因於氣者以諸氣屬於肺肺主皮毛氣為風邪所搏則鬱而不通腫見於皮毛之中然氣虚無形故狀如癰無頭虚腫而色不變皮上雖急動之廼痛凡身中痛處忽如打撲之狀名曰氣痛痛不可忍遊走不住發作有時痛則小熱痛定則寒此皆由冬時受温氣至春暴寒風來折之不成温病乃作氣痛宜先服五香連翹湯摩丹參膏又以白酒煎楊栁皮及煖熨之有赤氣點點者即刺出血已其五香連翹湯及小竹瀝湯可服數劑勿以一劑未瘥便住藥以謂無効即禍至矣中間用白薇散佳又有氣腫痛其狀如癰腫無頭虛腫色不變但皮急痛不得近手亦須服此五香湯次用針㵼之次與蒺藜散敷之方白薇㪚出聖濟總録治氣腫痛狀如瘤而無頭但虛腫色不變皮急痛白薇防風去叉射干各一兩半當歸切焙防己木香天門冬去心焙烏頭炮刮去皮臍枳殻去瓤麩炒獨活去蘆頭山茱萸萎蕤各一兩麻黄去根節湯煮掠去沫一兩一錢白芷柴胡去苖莽草各半兩秦艽去苖二兩椒半兩右為散漿水服方寸匙日三加至二寸匙仍以五香湯㵼之次以蒺藜散敷之一方有枳實無枳殻小竹瀝湯出千金方治氣痛淡竹瀝二升射干杏仁獨活枳實白术防己防風秦芁芍藥甘草茵蔯茯苓黄芩麻黄各二兩右㕮咀水九升煮取半下竹瀝取三升分四服犀角湯出聖濟總録治氣腫不消犀角鎊獨活去蘆頭麥門冬去心焙各牛兩枳殻去瓤麩炒二兩木香沉香大黄剉炒二兩白歛二兩丁香一兩半𤣥參九兩連翹六兩漏蘆半兩木通剉甘草灸朴硝各一兩右為麤末搗篩每服五錢水一盞半煎至八分去滓温服以利為度大五香湯出聖濟總録治毒氣在肌肉中腫痛寒熱急者數日殺人若心腹悶當急服鷄舌香沉香藿香各五兩薰陸香一兩麝香研一錢甘草灸吳茱萸湯浸焙炒各三兩細辛桂去粗皮各半兩升麻一兩一錢右除麝香外粗搗篩入麝香拌匀每服五錢用水一盞半煎至一盞去滓温服日三海藻浸酒方出聖濟總録治風腫行走無定或起如蚌大如甌或著腹背或着臂脚海藻洗赤茯苓去黑皮防風去叉獨活去蘆頭白术附子炮刮去皮臍各二兩鬼箭去莖用羽當歸切剉各二兩大黄剉焙四兩右剉如麻豆生絹囊貯以酒二斗浸之春夏五日秋冬七日初服三合空心午時臨臥各一服若頻利即减未利加至四五合以瘥為度虎骨丸出聖濟總録治氣腫走注疼痛不可忍者虎脛骨去筋肉刷洗浄塗酥炙黄黄耆剉杜仲去粗皮各二兩麝香另硏半兩附子炮刮去皮臍二兩乳香另硏半兩右四味搗篩為細末入麝香乳香再硏令匀酒煑麪糊丸如梧桐子大每服二十丸空心温酒下加至三十丸甘草酒出聖濟緫録治毒氣腫當頭上如刺痛甘草灸升麻沉香麝香另硏各半兩豉一兩半右除麝香外粗搗篩入麝香拌匀每服五錢用酒一盞半煎至八分去滓早晩食前各一服其滓熱敷腫上甚者取䜴半升梔子仁十四枚葵菜二兩三味用水二升半煎至一升濾去滓温服空心午晚間服盡為度檳榔散出聖濟總録治一切毒腫或癢或痛檳榔剉凝水石煅各一兩烏頭大者一枚去皮臍生用硫黄半兩硏吳茱萸一錢半生用右為細末用生油調敷之桃仁酒出聖濟總錄治毒氣腫痛遍走諸處或牽引小腹及腰臍痛桃仁一升湯浸去皮尖雙仁炒酒二升右先乘熱搗桃仁如膏漸入酒硏絞去滓每服五合空心夜臥温服一方服藥後用衣被蓋令汗不過三劑瘥蒺藜塗敷方出聖濟總録治氣腫其狀如癰虚腫色不變皮上急痛蒺藜子去角炒赤小荳各一兩右為散用鷄子白調如糊塗敷腫上乾即易之蒺藜散治氣腫痛以蒺藜子一升熬令黄為末以麻油和如泥炒令焦黑以熱敷故布上如腫大小勿開孔貼之無蒺藜用小豆末和鷄子如前乾即易之妙馬齒莧塗方治一切腫以生馬齒莧不拘多少入水搗熱貯銅器中用新汲水沉冷敷腫上熱即易如無以愼火草代之治毒氣以蒺藜子為末加醋封之日三易之治氣攻腫痛坐卧不得以獨頭蒜去殻入油少許同硏如泥塗敷腫上日三次熱腫附論内經謂諸病胕腫皆屬於火故熱勝則腫流走無常若火灸然亦或謂之流腫也此得風熱搏氣血而作熏爍鼓動流四肢而著腹背大則如盤小則如手甚則熠熠然徧於一體之中令人五心煩熱唇口乾燥如注之狀治宜湯液蕩滌於内膏敷發泄於外使熱氣得通則腫自消矣方犀角膏治熱毒犀角鎊屑升麻山梔子去皮生用黄芩去黑心蛇􅔷草芍藥芒硝連翹各兩二大黄剉生兩用二白歛生用二兩漏蘆去蘆頭生用二兩半𤣥參黑堅者一兩蒴藋切四兩乾藥生用半兩生地黄十兩研絞取汁猪脂四觔不入水者另煎右十四味剉如麻豆與地黄汁相和經宿别煎猪脂濾去筋膜停温入諸藥以微火煎半日去滓膏成用磁器盛以故帛塗膏貼腫處及瘡上犀角丸治熱腫􅉯毒方見本門諸疔瘡類防己丸治熱毒防己大黄剉醋炒各二兩芍藥檳榔煨各二兩二錢牛膝去苖酒浸焙薏苡仁生地黄乾者麩炒各二兩麥門冬去心焙木香各一兩半桂去粗皮一兩一錢茯神去木各一兩右為末煉蜜丸如梧桐子大每服二十丸漸加至三十丸食後良久温酒或生薑湯下日三漏蘆湯療熱腫及癰疽發背一切成瘡丹􅇙腫毒惡肉及毒眼赤腫疼痛翳膜諸瘡疥久不愈者俱可服之漏蘆如無用梔子白芨一作白歛黄芩麻黄枳實炙白薇如無用知母升麻如無用犀角芍藥甘草炙各二兩大黄二兩如無用芒硝右㕮咀以水一斗煮取三升分三服快下之無藥處單用大黄本方有芒硝今去之若實熱者加大黄五錢或加芒硝皆可肘後治癰疽丹疹惡毒千金翼無白薇劉㳙子無芍藥有連翹治時行熱毒紅赤色癰疽丹􅇙毒腫目赤痛生瘴翳若熱甚可加芒硝二兩經心録無白薇有知母犀角芒硝各二兩此方與小兒方相連分兩服一方有當歸牛膝大黄散治諸熱毒腫痛欲成瘡癤者括蔞根大黄黄芩去黒心百合各半兩葛根一兩剉當歸切焙半兩黄栢根剉芒硝赤小豆各一錢粳米一合右剉焙為飲量腫處大小用新水化蜜調藥如膏攤於腫處用紙蓋之一日一換赤小豆湯治少年氣血俱熱遂生瘡疥變為腫滿或煩或渇小便不利者赤小豆炒當歸去蘆炒商陸連翹仁赤芍藥漢防己木猪苓去皮澤㵼各半兩桑白皮炙右剉散每服四錢水一盞半生薑五片煎不拘時候温服熱甚者加犀角二錢半青木香散療一切熱毒腫痛經驗方并主癰疽乳癰青木香紫葛紫檀朴硝各二兩赤小豆二合蜀升麻剉白歛生礬石各一兩右搗篩以水和如稀麫糊又以榆皮汁和之亦妙以布剪可腫大小仍每片剪兩三個小孔子塗藥貼腫上乾即易之又貼熱毒消腫方以商陸根芸薹苖葉根各等分搗之依上方貼効又療一切熱瘡消腫石膏方硝石一觔生麻油三升右将油先煎令黑次下硝石緩火煎令和如稠􅄳膏成以好磁瓦器中收貯以塗貼瘡腫或熱發服少許用好酥煎良忌生血物地黄煎丸出瘡科精要治臟腑有熱胸膈痰實氣血不和經絡秘濇多生瘡腫及已患惡瘡腫毒大小便結濇黄芩去腐三兩黄連五兩人參二兩枳殻炒去瓤大黄各二兩半生地黃新者十兩洗水浸研如泥右除地黄煎外並為細末再加地黄煎和搗入煉蜜丸如豌豆每服五七十丸食後温水下素有熱之人日服百餘丸不發瘡瘍年髙氣弱之人亦以常服清利胸膈明目漏蘆湯出濟生㧞萃方治臟腑積熱發為腫毒時疫肐􅭫頭而洪腫咽喉堵塞水藥不下一切危惡疫癘升麻大黄黄芩各一兩藍葉𤣥參各二兩漏蘆一兩右㕮咀每服四錢水一盞半煎至六分去滓温服腫熱甚加芒硝二錢半快利為度已利去硝一方竹葉二十一片同煎五香湯出千金方治熱毒氣卒腫痛結作核或似癰癤而非癰癤使人頭痛寒熱氣急者數日不除殺人病愈後餘毒或觸犯再服之青木香藿香薰陸香沉香丁香各一兩右㕮咀以水五升煮取二升分三服不瘥更服并以滓搗薄敷腫上千金翼以麝香代藿香解毒㪚出濟生方治赤熱腫毒收赤暈寒水石二兩龍骨半兩黄連去鬚黃栢各一兩輕粉一錢右為細末以鷄子清調用鷄翎掃瘡上若是熱瘡加黄丹半兩秦皮湯出聖濟總録治熱腫懼向暖處周身毒熱蒸人者秦皮剉一兩半防風去尖三兩車前子㣲炒二兩黄連去鬚三錢右麤搗篩每服五錢水一盞半煎至七分去滓温服食後臨卧各一麝粉散出聖濟總録治熱腫毒麝香研一錢半膩粉一錢馬兠鈴根一錢黄蘖半兩右搗硏為散用油調塗腫立消㧞毒散出瘡科精要治熱毒丹腫遊走不定石膏生用四兩寒水石生用四兩黄蘖甘草各一兩右為細末每用新汲水調掃之或油塗之或小紙花貼之乾則以凉水潤之亦妙亦治疔腫水煎服又治大熱背腫身多生瘡下諸熱方露蜂房六兩木緋帛一尺乳髮三兩升麻三兩右用緋帛裹蜂房等以麻繩縛之便於炭火上燒令煙盡及熱搗碎作黑灰篩之取末候熱時空腹酒和服一方寸匙日再服服此藥五六日即看小便及大便下青黄赤汁及黑物極滑而腥臭者此熱下也候三五度下即休若多恐致瘦損若不大困但煮五加皮汁服亦療疔腫三黄丸出聖濟總録治熱腫黄連去鬚大黄剉炒黄芩去黑心各二兩右為末煉蜜丸如梧桐子大每服十五丸至二十丸温熱水下不拘時候白龍散出聖濟総録治熱腫赤痛蛤粉白礬各二兩青鹽一兩右同硏為末用生油調塗腫處金花散出聖濟總録治熱毒腫黄蘖二兩雄黑豆一兩緊小者是也大黄半兩右為散浸甘草水調如膏量腫處大小攤貼以紙花葢之神黄散出瘡科精要治一切熱腫攻焮疼痛黄栢末一觔黄丹二兩炒紫色雄黄一兩另研右同研勻每用新水調如糊掃敷以小紙花貼稍乾以蜜水潤之鉛酒方出聖濟總録治熱毒腫或生癰鉛五兩酒一斗無灰者右先将鉛鎔成汁却投入酒中又取鎔汁再投入酒中如此凡十度然後濾浄使之澄清時時飲三合至五合不可太醉醉甚則吐吐則損正氣也惡實丸出聖濟総録治熱毒腫惡實炒二兩山梔子去皮五兩右為末煉蜜丸如梧桐子大每服以食後良久熟水下十五丸日再夜一追毒㪚治一切熱腫欲結瘡癤焮赤疼痛草烏頭去皮臍生搗為細末一兩蚌粉五錢右拌勻每看多少臨時用新汲水調攤紙上貼之治兩腿或徧體生熱毒瘡疤着清水腫爛癢痛不可忍方出聖濟総録䜴炒煙盡黄連去鬚各一兩右為末用臘月猪脂和塗之如瘡濕即乾敷又方用水楊枝葉不限多少水煎减半傾桶内終日浸洗又方治一切熱腫毒蔓青根生一握鹽少許右和搗敷腫上日三易一方無蔓青根以龍葵代之佳甘草湯出聖濟總録治熱毒腫或身生瘭漿用甘草炙剉二兩麤搗篩每服六錢用水二盞煎至一盞去滓食後良久及夜臥時各一服治熱腫毒取白鴨糞和鷄子白封之毒自消治熱毒足腫疼欲絶出肘後方以苦參酒煮漬之水和亦可治天行熱病手腫以稻穰灰汁漬之佳治熱毒腫出肘後方以惡實根及葉搗爛封之杖瘡金瘡取葉貼之永不畏風又癰疽及丹疹熱毒皆治之明耳目利腰膝則取其子末之投酒中浸三日每日飲三兩盞隨意多少欲散肢節筋骨煩熱毒則食前取子三七粒熟水緩呑之十服後甚良細切根如小豆大拌麪作飯煮食尤良凡皮毛間習習如虫行煮根汁浴之夏浴避風却以其子炒過末之如茶煎三七通利小便一方用蒼耳汁傅之治熱腫以山豆根用水硏濃汁塗之乾即塗療熱毒攻手足腫痛欲絶者以猪膏和羊尿塗之佳治熱毒發取黄雌鷄子三顆和白蜜二合服之瘥治熱腫搗堇汁敷之良堇汁又殺鬼毒生取汁半觔服即吐出治􅉯遊赤腫用蕎麥麪醋和塗之治一切熱毒腫出肘後方以商陸根和鹽少許敷之日再易下熱氣腫毒壓丹疹煩熱以生大豆煮食之又大豆汁解諸藥消腫治熱毒出肘後方用浮萍搗汁敷之令遍熱傅之亦可療熱腫出肘後方取黄色雄黄雌黃石燒熱令赤以米醋沃之更燒醋沃其石即軟如泥刮取石屑塗腫處乾則以醋和塗之水澄膏出瘡科精要治熱腫痛大効大黄黄蘖鬱金天南星白芨朴硝黄蜀葵花各一兩右為細末每用新汲水一盞半藥末二錢攪調勻候澄底者去浮水以紙花子攤於腫焮處貼之如急燥津唾潤之此藥除熱毒赤腫神効如皮膚白色者勿用之療熱腫出本草以家芥子并栢葉搗敷之無不愈大約得山芥更妙又搗小芥子末醋和作餅子貼腫及瘰癧數看消即止空貼損肉此療馬腐骨良療熱毒病攻手足腫痛疼欲脫出本草取蒼耳汁漬之治熱腫出本草用龍葵菜煑作羮粥食之治諸毒熱腫出本草用獨行根水磨如泥封之日三四立瘥消風熱結赤腫出本草用鵝胞以酒磨塗之立効治熱毒出本草以藍汁敷之治熱腫及一切癰腫出本草甘蕉根搗敷之甚良乾即便上無不瘥者普濟方卷二百七十八
