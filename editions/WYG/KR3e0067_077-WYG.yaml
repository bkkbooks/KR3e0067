剉散每服三錢水一盞半煎食後服神效膏出聖濟總録治瞖膜遮障目風淚出點藥鉛丹二兩蜜半斤以絹濾過硐砂一豆大明淨者青鹽一錢馬牙硝三錢白龍腦一錢白礬一大豆燒過大猪膽兩枚好新者右並入瓷瓶内和勻用重湯於鍋内煑候紫色為度兼不住手攪之藥成只於瓶内盛貯封固每遇使時旋取些少以井華水調用銅筯子㸃有淚下以絹帛拭之候淚住即再點每盡夜可三五度洗眼湯出千金方治熱上攻目生障瞖目熱痛淚出秦皮黄蘖決明子黄連黄芩蕤仁各十八銖栀子七枚大棗五个右㕮咀以水二升浸煑取六合澄清仰臥洗日一次洗眼紫金膏出和劑方治逺年日近瞖膜遮障攀睛弩肉昏暗淚多瞻視不明或風氣攻注瞼生風粟或連眶赤爛怕日羞明隠澀難開並能治之硃砂别研乳香别研鵬砂别研赤芍藥當歸洗焙各一分雄黄研飛二錢麝香别研五分黄連去鬚五錢右為細末入研藥拌勻再擂煉蜜搜和為丸如皁莢子大毎次用一丸安淨盞内以沸湯泡開於無風處洗藥冷開目少時候三兩時再煨令熱依前洗一貼可洗三五次不得犯銅鐵器内洗如暴赤眼腫者不可洗之通神膏出百一選方一名金水膏有數人兩目厚瞖皆磨去甚妙方見本門目赤爛類補腎圎出危氏方治圎瞖巴㦸去心山藥破故紙炒茴香牡丹皮各五錢肉蓯蓉一兩洗枸杞子一兩青鹽一分後入右為末煉蜜圎如梧桐子大每服三十丸空心鹽湯下八味還睛散出危氏方主散瞖白蒺蔾炒去尖防風粉草炙木賊各五錢山栀子五錢草決明一兩炒蟬退一分青葙子一分微炒右為末麥門冬去心煎湯食後調下春雪膏治眼生瞖膜上星者用川黄連四兩洗淨用水三椀煎至半椀滓再用水一椀煎至一盞二項并作一處慢火􅆈一小盞用磁器盛不犯鐵器又用豶猪膽一箇取汁生薑一兩洗淨和皮搗取汁用白砂蜜一斤用熬成膏濾過入麝香片腦輕粉各五分同乳香少許細研膏内攪勻磁器合宻盛用時加入撥雲膏撥雲膏班毛三箇去頭灰麵炒過青娘子紅娘子各二箇先製硼砂一錢蕤人五箇去殻油右研極細同春雪膏一日五六次點愈仙木散出聖濟總録治眼目瞖膜遮障昏暗退瞖蛇蛻洗焙一錢蒼术米泔水浸一宿切焙二兩黄芩去黒心五錢甘草炙剉木賊各一兩右為散每服一錢空心臨臥冷水調下通肝散出危氏方治水瞖山梔子蒺䔧炒去尖枳殻去白荆芥各五錢車前子牛蒡子各一分炒甘草炙剉各一兩右為末每服二錢苦竹葉湯調食後服撥雲散出聖濟總録治風毒眼瞖膜遮障菊花防風去叉白蒺蔾炒去角羌活去蘆頭柴胡去苗甘草各一兩右為細散每服二錢水一盞煎至六分食後臨臥和滓溫服重明散出經效濟世方治兩眼生瞖膜連眼眶赤爛久不效者並治之若一時赤眼一服效黄鷹條一錢細研白丁香一錢細研乳香一錢細研爐甘石一分燒赤白礬一錢飛過右為細末每以燈心頭㸃入眼眥内有㸃膏出東垣蘭室方治瞖膜不問六七年遮障瞳人者當歸身六分甘草六分防風八分蕤人去皮三分黄連揀淨洗二錢剉如麻豆大水一大椀􅆈至一半再入前項藥右各剉麻豆大蕤人别研如泥同􅆈至滴水中不散去沫入蜜少許再􅆈少時為度臨臥㸃一云令病人心靜㸃之至目微痛為度日㸃五七次但欲多點使藥力相繼也故名有點膏昔有張濟明者眼病瞖六年以至遮瞳人視人如覺雲氣遮障點此藥五七日瞖退一半道人開障散出直指方治諸障瞖蛇退洗焙剪細蟬退洗焙黄連去鬚五錢菉荳一兩甘草生二錢右剉細每服二錢食後臨臥新水煎服曾青散主退瞖方見本門目眵壞類五神散出經效濟世方治眼疾退瞖膜荆芥穗烏魚骨木賊白术各一兩甘草五錢炙右為細末每服一錢食後米飲調下㸃瞖子方烏頭蝎稍硐砂信白丁香右為細末猪鬃㸃之照水丸出聖濟總録治目生瞖障龍腦丹砂通明者烏賊魚骨去甲滑各一錢右研細再同研勻先用黄蠟皁子大兩三塊於新白瓷盞内慢火上鎔用紗帛子濾過再浄盞内再鎔了將前藥末同共拌和捏作餅子如半破豌豆大用薄絹或紗袋子盛了以硐砂半兩放在淨碗内上交横安竹片放藥在上面鋪著借硐砂氣熏用大糕子一片合碗口勿令透氣撅一地坑放藥碗在坑内用竹簟子一片蓋了然後以黄土蓋之七日出淨磁瓶中收其硐砂不用如患浮瞖膜侵瞳人及一切目疾但臨臥將一餅貼在眼眥頭即睡至曉用水一碗向東覷水其藥自落在水中淨浴却用絹帛子包裹起安潔淨處臨臥依前再使每餅可用半月藥力慢時方易餅如兩餅缺重明膏出瑞竹堂一名洗眼藥治眼内雲瞖無問逺年不退者及諸般眼疾昏花只内障不治輦真八提㸃眼内生白瞖十二三年治不效得此方㸃退瞖即日安痊復故白砂蜜二兩水飛過訶子四箇水洗煑去液右將蜜煉淨用絹濾過盛於磁器内將訶子黄丹入蜜内於爐上􅆈用手一順攪之文武火不許太過􅆈成金絲膏用手撚不粘手為度又用東南上槐條手折寸長一白椀用水三大碗煎至一碗將前膏子用槐條水觧稀稠得所用淨磁器收貯蓋封於地上頓放三日令去火毒再用絹濾過方用熬藥時忌雞犬婦人水照丹出經效濟世方治眼中瞖膜真珠末一字朱砂象牙半字烏魚骨半錢右為細末鎔蠟丸如黍米大每服臨臥置眼中隨左右用來早以水一盞開眼放藥水中瞖膜盡下神妙摩頂膏出聖濟總論治一切眼疾瞖膜遮障兼能生髮涼腦治頭痛蓮子草藍清各一握油一斤右將二味細剉納瓶中以油浸之紙封頭四十九日每夜臥時令人以鐵匙㸃藥摩頂腦上四十九徧至一百二十徧住此藥須五月五日平旦時合白末眼藥去雲瞖朶梯水飛一兩碗糖霜淨五錢大海螺火煅為末一兩水飛右為細末用少許㸃眼青末眼藥明目去瞖安白蘆海螵蛸黑丁香各三錢即䑕糞右為細末用少許㸃眼蜜蒙花丸出聖濟總録治眼障瞖蜜蒙花黄蘖根洗剉各一兩右為末煉蜜和丸如梧桐子大每服十丸至十五丸食後臨臥用熟水下或煎餳湯下黄金膏出聖濟總論一名黄蘖膏治一切眼退瞖方見本門暴赤眼類復明膏出聖濟總録治目障瞖肉昏暗馬牙硝研一兩五錢酸漿草乾者五兩右於六月六日用童子尿浸於日中暴之夜或隂雨覆之晴即露之尿耗即旋添至七月初去酸漿草只空暴小便令乾收之别以新盆蓋藥埋淨地深可五寸已來至來年夏至前二日收之其霜飛上盆子蓋以烏雞毛掃取患者以一米粒安大眥頭避風照水丹出危氏方治眼瞖及外障赤瞖貫瞳人攀睛等惟瞖厚者效辰砂五分海螵蛸一錢右於乳鉢内細研水飛過澄取用黄蠟少許鎔開入藥待用時就火上施丸如蘿蔔子大臨睡用一丸㸃眼角内緊合眼睡著次日用温湯洗下未過更用一次妙王居用云常病眼障全不見物止用生辰砂一塊每日眼中擦之海上方云不數日障醫盡退目明如效通光散出聖濟總録治攀睛瞖膜昏澀風毒腫痛洗眼方用栝蔞一枚割下頂蓋取瓤并子同猪膽𢷬勻再入栝蔞内用元蓋却蓋之坐淨土上取桑條子十兩約長四五寸簇栝蔞上用炭火燒扇之烟盡將成炭即住扇冷和灰通研極細每用二錢沸湯浸澄清去脚洗之杏仁膏出聖濟總録治眼瞖障膜遮但瞳子不破者以杏仁三升湯浸去皮尖雙仁每一升以麵裹於糖灰慢火中炮熟去麵研杏仁厭去油取銅緑一錢與杏仁同研以銅筯㸃眼瘥白龍散一名馬牙硝方治瞖明目方見本門目生努肉類治眼生瞖膜出聖濟總録以薺菜和根莖葉不拘多少洗淨焙乾研為細末每夜臥時先淨洗眼了挑半米許安大兩眥頭澀痛莫疑瞖膜不日自落治瞖目方出聖濟總録以芥子一粒輕手挼入眼中候日出以井華水雞子清洗之治熱瞖瞞睛方出千金方以羊筋漱口熟嚼夜臥開目内之即閉目睡明日即差亦治眯目不明立消膏出直指方治浮瞖粟瞖霧膜遮睛用雪白鹽於淨器中生研少許以大燈草蘸鹽輕手指定浮瞖就㸃凡三次不痛勿驚屢效去瞖障生血止痛方出家藏經驗方用蠐螬汁滴目中及飴炙食之陳氏經驗方云晉書盛彦母氏失明躬自侍養母食必自哺之母既病久至於婢使數見捶撻婢忿恨因彦蹔行取蠐螬炙飴之母食以為美然疑是異物宻藏以示彦見之抱母慟哭絶而復蘇母目豁然從此遂愈孟子曰陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見也井上有李螬食者過半矣匍匐往將食之三咽然後耳有聞目有見本草云蠐螬汁滴目中去瞖障余在曲江有將官以瞽離軍因閱晉書見此參以孟子之言證以本草之說呼其子俾羞事而供勿令父知旬日後目明趨庭伸謝因録以濟衆指甲散出龍木論治眼瞖兼諸物入眼以左手中指甲洗浄候乾以刀刮其屑用燈草蘸㸃眼中瞖處一二次即去或用懐孕婦人爪甲屑置目中去障瞖鼓槌草方出人存方退瞖將鼔槌草根獨莖者寸截用薄綿裹塞鼻内即退隨目左右塞之神聖粉治目生瞖方見本門班痘瘡入眼内黑運方治眼中脹膜方見本門眯目類明目去障瞖解熱毒出本草以菥蓂子食之久食視物鮮明四月八日收實良治眼上生瞖用頭上膩垢丸如梧桐子大更以指甲刮些末安眼中以些水滴之令人仰臥傾以手揉眼兩邊淚出却以燈心一莖於眼中撚起瞖膜即去旋復花散出聖惠方治眼從下生赤瞖膜上黑睛旋復花桑根白皮剉羚羊角屑赤芍藥各一兩黄連去須耳草各五錢微炙川升麻黄芩各三分右為粗散每服三錢以水一盞煎至六分去滓每食後温服忌炙煿猪肉還睛膏出聖濟總録治一切障瞖黄連去須鉛丹水飛過各一兩黄蘖去粗皮五錢桃仁去皮尖雙仁者杏仁去皮尖雙仁者各七粒龍腦研五分白砂蜜四兩右除龍腦鉛丹蜜外各𢷬碎用井水二盞及蜜鉛丹攪勻浸三日後入銀石器内文武火熬及一半綿濾過滓入龍腦成膏甆合子内宻封掘地埋一宿出火毒不拘時候㸃之撥雲散出徳生堂治散風毒退瞖障及赤爛眩者白蒺䔧防風羌活川芎荆芥甘菊花蟬退各二兩右為細末每服二錢桑白皮熬水食後服珊瑚散出聖惠方治眼赤痛生瞖障逺視不明痒澀珊瑚三分龍腦五分硃砂二分右先研珊瑚硃砂如粉次入龍腦研令勻每服用筯取一米許日三四度㸃之神效蕤人煎出聖濟總録治眼生瞖障昏暗㸃大小人眼澀腫赤隠痛蕤人去皮尖鋪在銀盂底黄連去須浄洗鋪蕤人上各二兩右古錢四十九文鋪在黄連上次井華水二盞浸不得過錢用七年熟艾四兩緊打成一炷在古老錢上燒宻蓋盂口不令出氣候燒過艾炷出灰并古老錢黄連蕤人等取下艾烟在水内入白蜜二兩同煎一盞去滓又用麝香龍腦各二分硼砂一錢細研和膏再熬熟宻封入井水内浸七日出火毒凡遇障瞖先用白湯洗眼燈心㸃眼内日三勿令見風亦治暴赤眼及風眼淚痒蘖竹瀝膏出龍本論黄蘖去粗皮刮細者滿傾竹内慈竹一段去兩頭節右用磚對立置竹磚上兩頭各安淨碗以乾竹火燒令瀝出盡收之以釵股銅筯㸃眼摩障瞖方用雞卵殻研摩之治熱瞖赤障更無甘汁出本草用斫斷千歲虆藤以水浸從一頭吹取氣滴目中藤如通草者又名蘡蘿藤石決明方出龍本論用石決明味醎無毒去目障瞖止痛兼治青肓殻摩障瞖亦名九孔螺也圖經云決明殻大者如手小者如三兩指海人不噉其肉亦取其殻清水洗眼七孔九孔者良十餘孔者不佳決明散出永類鈴方治障膜石決明煅枸杞子酒浸一宿木賊去節荆芥穗羌活晩桑華榖精草去根粉草旋復花蛇退蜜炙蒼术製菊花各等分右為細末每服二錢茶清調食後服枸杞丸出衞生家寳方治年逺日近瞖膜遮障内外障眼木賊一兩去節童便浸一宿淨洗三五次枸杞子一兩炒乾家菊花一兩去枝葉削皮蒼术三兩泔浸右為末煉蜜丸如禾穗子大每服一丸食後用好茶嚼下神妙散出衞生家寶方㸃瞖膜障眼朴硝二兩安豆腐淋過將建盞煅辰砂五分乳香五分元明粉一分腦子三字射香三字膽礬五分碙砂五分南硼砂五分右為細末以銅筯㸃之研須極細海洲聖婆婆眼藥出衞生家寳方治一切瞖障攀睛赤脉瘀肉或痒或疼朴硝一兩硼砂研細硃砂研細腦麝各少許右用建盞一隻於火上鎔朴硝成珠子却入硼砂等細研用蜜丸如芥子大吹一粒入眼中通利膏出鮑氏方治瞖膜障明時多熱淚方見本門目赤痛類和膏五退散出淡療方治眼中瞖障蟬退蛇退蟬退殻猪退蹄鯪甲鯉菊花防風草決明石決明甘草各等分右為末每服二錢薄荷葉水小􅊦煎服秦皮丸出聖濟總録治黏睛瞖秦皮去粗皮黄蘖去粗皮黄芩去心防風去叉柴胡去苗黄連去須一兩萎蕤炙木通剉各一兩五錢甘草炙右為末煉蜜丸如梧桐子大每服三十丸食後卧時溫水下治赤障白膜風淚出本草以青羊膽㸃之普濟方卷七十八
