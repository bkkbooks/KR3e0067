body:
  text: 普濟方卷七十八明周王朱橚撰眼目門内外障眼論夫眼生瞖膜或新或久皆縁腑臟之間風邪毒熱衝發於上藴結不散其狀非一是故障有内外瞖有浮沈或淺或深可治不治拙工徃徃以鈎割鍼鐮熨烙之法取決一時曾不知此法不愼致有盲瞽蓋瞖膜之病有可以鉤割鍼鐮熨烙者有專用服藥者先服藥及洗點而後用鉤割鍼鐮熨烙者誠能研究經㫖洞考六脉腑臟虚實然後心諦目察曰是可以服藥曰是可以點洗曰是可鍼鐮鉤割則豈有妄致損傷者乎方蕤仁丸治内外障眼蕤仁三兩黄連去須車前子各二兩人參麥門冬去心焙各三分青葙子湯浸焙乾防風去仁生乾地黄焙黄芩去黒心秦艽去苗土各一兩半甘草炙剉天門冬去心焙丹砂炒升麻炒苦參炒羌活去蘆頭地膚子決明子炒菊花炒元參炒地骨皮炒各一兩一分羚羊角末一兩半右搗羅拌勻煉蜜為丸如梧桐子大食後煎百合湯下二十丸加至三十丸但有瞳人不拘内外瞖並治之甘菊湯治内外障瞖一切眼疾甘菊花大黄剉炒旋覆花升麻石決明芎藭各半兩羌活去蘆頭地骨皮洗青葙子車前子石膏碎木賊剉炒黄芩去黑心栀子仁草決明炒甘草炙剉荆芥穗防風去叉各一兩黄連去須五分右粗搗篩毎服三錢水一盞蜜少許同煎至七分食後夜臥去滓温服觀音丸治内障失明或欲結青光内障或赤脉疼痛血竭熊膽研各二錢人參蛇退皂角水洗新瓦焙各半兩木賊去節童便浸焙蒼术童尿浸三宿焙葳靈仙鷹爪黄連去須地骨皮洗晒蔓荆子茺蔚子車前子川芎當歸羌活蟬退晒洗石決明煅存半生各一兩􅁞退紙二七幅兩右為細末用羯羊肝一具去筋膜漫火煑半生熟帶血性和藥同搗以粟米粉同肝汁煑糊丸如梧子大每服七八十丸温米泔下或石菖蒲湯下食後常服金絲膏治内外障眼赤筋瘀肉瘀血瞖膜遮障昏澀多淚宣黄連川黄連並用竹刀刮去鬚黄蘖去粗皮各半兩青鹽二錢明乳香研一分黄丹重三錢沒藥硐砂各五分新丁香四十九粒二錢燈心長白者三百根青州大棗二十四个真白蜜四兩煉過右剉碎温湯急浴過控乾仍不得犯銅鐵器内井花水一升銀石器或砂銚子内慢火􅆈勿可緊候至一盞以生絹濾去滓放冷入蜜再入銀石器内砂銚子内􅆈至七分再濾去滓入於乾浄磁器中宻封勿令洩氣於簷下滴漏處掘深一尺埋之用水一桶照滴漏簷於埋處坑子上猛傾下次日取出再入生龍腦好麝香各五分南硼砂馬牙硝各一皁子大同研極細入膏中每點一粟米磁石丸治内外障瞖不問年月逺近及眼一星磁石煅醋浸十遍肉蓯蓉酒浸切焙各三兩牛膝酒浸切焙桂皮去粗皮巴㦸天去心逺志去心乾薑炮地骨皮洗附子炮製去皮臍覆盆子黄耆剉防風栢子仁别研各一兩生乾地黄切洗焙鹿茸去毛兩炙各二白茯苓去皮二兩五錢右為末煉蜜丸如桐子大每服二十丸鹽湯酒下空心日午近夜各一還睛湯治内外障眼去瞖膜風毒甘菊花蔓菁子蒺蔾子炒去角穀精草牡蠣燒芎􅀢仙靈脾生地黄各半兩蛇蛻五六羌活去蘆頭防風去叉桑皮蟬蛻洗地骨皮洗各一兩右為粗搗篩每服二錢水一盞竹葉二片荆芥兩穗煎至七分去滓食後臨臥温服精明湯治内外障瞖羚羊角鎊二兩當歸切焙黄芩去黑心梔子仁淡竹葉芍藥木賊大黄剉炒荆芥穗石決明各一兩右粗搗篩每服四錢苦竹葉十片水一盞半煎至七分去滓温服日三八子丸出聖濟總論治風毒氣眼瞖膜侵遍不計久近及内外障眼青葙子決明子葶藶子炒車前子黄芩去心五味子枸杞子地膚子茺蔚子防風去叉麥門冬去心焙生乾地黄洗焙細辛去苗桂去皮赤茯苓去心澤瀉各一兩右為末煉蜜和丸如桐子大每服二十丸至三十丸茶清下温米飲亦得菩薩膏出楊氏家藏治内外障眼滴乳南硼砂各二錢腦子五分蕤仁四十九粒去皮壳熬蕪荑四十九粒沙蜜一兩右先將蕪荑蕤人研去油入諸藥再研取砂蜜於湯瓶上蒸溶以紙濾過同諸藥攪勻用瓦瓶盛貯遇患挑少許在盞用沸湯泡洗大仙飲出直指方治内外障瞖目睛疼痛石決明煅存半生明爛石膏生川芎木賊去節童尿浸一夜晒各一兩杏仁浸去皮五錢甘草炙二錢右為細末每服二錢食後臨臥用燈心薄荷少許煎枸菊丸出御藥院方治内外障眼有瞖暈或無瞖視物不明甘菊花揀靜枸杞各二兩川芎薄荷葉各一兩蒼术六兩米泔浸三日一日一換水去皮晒乾右為細末煉蜜為丸如彈子大每服一丸食後細嚼茶清下日進二服夢靈丸出聖濟總録治内外障眼及浮花不見物方見本門五臟風熱服類芎藭散出聖濟總録治内外障眼瞖膜方見本門目昏暗類鹽术散出宜指方治内外障眼蒼术四兩日換米泔浸七日刮去皮細切入青鹽一兩同炒黄去鹽不用木賊去節二兩童尿浸一宿晒一方水同焙乾右為末每服一錢温米泔調下或滲入飲食中任服甚驗不拘時服點眼方治眼生瞖膜及内外障方見本門一切眼疾雜治類洗眼方出聖濟總録治内外及瞖膜赤脉昏澁以桑條二三月間採嫩者暴乾淨器内燒過令火自滅成白灰研每用三錢入瓷器或銀石器中以沸湯泡打轉候澄傾清者入於别器内更澄以新綿濾過極清者置重湯内令熱開眼淋洗逐日一度但是諸眼疾皆效靈圎丹治男子婦人攀睛瞖膜痒澀羞明赤筋碧暈内外障瘀肉風赤眼甘菊花川芎白附子柴胡逺志去心仙靈脾酥炙羌活獨活青葙子石膏防風全蝎青皮陳皮荆芥楮實甘草木賊去節黄芩已上各一兩蒼术泔浸焙四兩右為末水浸蒸餅丸如彈子大每服一粒食後細嚼荆芥湯或茶清送下日三服忌酒麵明上膏出龍木論一名光明膏治逺年近日不覩光明内外障眼攀睛瘀肉眩眶赤爛盈澀開怕日羞明推眵有淚視物茫茫時見黑花或瞼生風粟或瞖膜侵睛時發痒痛兼治口瘡塗之立愈白沙蜜一斤黄丹四兩硐砂别研乳香青鹽輕粉硼砂腦子各二錢並别研麝香五分别研金星石銀星石井水石雲母石各一兩烏賊魚骨黄連去須各五錢右於淨室中不得令雞犬婦人見用銀石器慢火先炒黄丹令紫色次下蜜候熬得沫散其色皆紫次入臘月雪水三升再熬二十餘沸將餘藥研成末一處同熬用筯滴於指甲上成珠不散為度以厚紙三張鋪在筲箕上傾在紙上濾過用瓶子盛放在新水内浸三晝夜去火毒其水日一易之看病眼輕重臨晩用筯蘸藥㸃大眥頭以眼澀為度若治内障用麵水和成條捏作圈子臨臥置眼上傾藥在内如此用之一月見效通神膏出經騐良方一名通開膏治内外障一切眼疾方見本門目赤爛類椒黄丸出危氏方一名曰仙翁方治一切内外瞖膜遮障磣澀疼痛羞明怕日弩肉攀睛及冷熱淚蜀椒去心及閉者炒去計一兩乾熟地黄洗切焙三兩一方等分右為細末煉蜜糊丸如梧桐子大每服五十丸食後臨臥米飲送下一用生熟地黄各二兩同椒靈應丸出朱集驗方治内外障眼黄連大者蕤仁各二兩石決明大隂元精石隂陽火煅草決明各一兩羊子肝七个去膜竹刀切右用多年粟米飲為丸如梧桐子大每服二十丸臨臥時用蠟茶下瞖膜厚者不過一月近者不過十日服至七日烙頂以助藥此方因宋公琪丞相早歲知綿州有典史黄仁鍔患赤眼喪明夢得神人惠之聖餅子出余居士選竒方治内外障眼昏暗久患風毒氣眼並宜服石決明先搗碎水飛細川椒車前子楮實子牛蒡子新瓦炒羌活青葙子木通蒼术米泔浸一宿木賊去節獨活白蒺蔾去尖刺蛇退皮銑内煿過令黄地膚子已上各一兩太隂元精石清滑石寒水石磁石已上五件用磁瓶子内鹽泡擠乾入坑子内以慢火煆之液出火毒以水飛過令細晒乾草決明荆芥甘草甘菊花旋復花各二兩蟬退一兩水洗淨宻蒙花三兩五錢右為細末入五石在内拌勻煉蜜丸每一兩藥劑分作十餅子每服一餅子臈茶嚼下日三服不拘時候單服蒼术法出十便良方補下部明目治内外障凡子傳效方以金州大塊蒼术一斤足秤分作四分四兩刮去皮令淨了稱四兩以無灰好酒浸三日四兩以醋浸三日四兩以童子小便浸三日兩易四兩以米泔浸五日一日一換右件日足漉出便不淘洗便片切撚或焙半乾了使黑芝麻四兩如無只二三兩亦得或又無只使黄色者同入在􅌯上炒令乾香然後搗羅為末仍用前餘浸藥酒煑稀糊為丸如梧桐子大若少添藥酒些不妨每服四五十丸以湯或酒送下花乳石散出衞生家寳方治多年内外障花乳石一兩細研為粉水澄焙乾防風一兩去蘆頭川芎一兩甘草五錢炙牛蒡子五錢揀去灰土稱炒白附子一兩右為細末每服二大錢臈茶調下不拘時候太隂元精石散元精石一兩細研必須真者石決明五錢火煅存性蟬退一兩洗去沙泥羌活半兩甘草四兩菊花一兩去枝梗右焙為細末每服一錢用麥門冬熟水調下食後服有神效夢靈丸出衛生家寶方治内外障眼防風一兩蜜炙石決明一兩水一升煑乾菊花二兩葳靈仙一兩蕤仁一兩去壳熬穀精草一兩枸杞一兩蒼术一兩米泔浸一宿剉焙蚌粉一兩飛過右焙為細末用雄猪肝一具竹刀切筋膜和藥搗一千下入麵少許共搗丸如梧桐子大食後鹽湯下三十丸忌煎煿鮓豆腐等毒物地黄丸出衞生家寶方治内外障及眼見飛花此藥平補壯氣血恱精神先服此方半月次服羌活丸五日然後用立應散搐鼻熟地黄二兩酒烝二次焙生地黄二兩川當歸一兩五錢去蘆川牛膝一兩金釵石斛一兩切酒浸焙兔絲子一兩酒浸炒别研車前子一兩防風一兩枳殻略洗去穰麵炒一兩杏仁麵熬炒先用湯泡過去皮尖别研一兩右為末煉蜜丸如梧桐子大每服三十丸空心鹽湯下日一服還睛散出衛生家寳方治青盲内外障眼忽然不見物者川芎一兩龍膽草一兩去蘆頭楮桃兒一兩青者木賊一兩仙靈脾一兩五錢甘草三分淡竹葉五錢右為細末每服二錢用新汲水調下日進三服不拘時候五退還光丸出衞生家寶方治内外障眼刺蝟皮一兩用麵炒去麩不用枳實一兩蠶退五錢炒防風一兩蟬退一兩炒蒼术一兩米泔浸炒乾蛇退一兩炒草決明一兩猪前爪一兩燒灰存性右為細末鍊蜜為丸如梧桐子大每服二十丸好茶下一日一兩服立應散出衞生家寳方治内外障昏澀多淚及暴赤眼一切目疾並治之日三次搐鼻鵝不食草洗淨香白芷當歸洗去蘆頭雄黄别研川附子泡已上各等分躑躅花減半右為細末入麝香少許和勻含水搐鼻内去盡濁涕眼淚為度食後少空用木賊散出衞生家寳方治内外瞖障木賊去節甘菊枸杞子荆芥穗蒼术米泔浸三日熟乾地黄右等分為末更入蛤粉和勻每服二錢先用猪肝四兩切開摻藥在内甑上蒸熟食後細嚼白湯送下蟬花丸出衛生家寳方治年深日近諸般内外障眼風毒氣毒瞖膜赤脉逆順横開弩肉攀睛眩瞼赤爛眵淚昏暗不明視物茫茫並治之蜜蒙花葳靈仙去蘆白蒺蔾炒去尖木賊去毛節草決明炒菊花去梗楮實子石決明火煅蟬退麻油淨洗青葙子瓦炒川芎羌活生已上十二味各五錢旋覆花去蘆甘草荆芥穗已上各一分右件為末煉蜜為丸每兩作十五丸細嚼用濃煎燈心麥門冬湯送下食後臨卧日進三服乳香丸出永類鈴方治男子婦人血不舒活内外瞖障乳香沒藥别研五靈脂麻黄附子泡當歸川烏草烏牛膝酒浸川芎肉桂羌活全蝎去稍益水浸防風殭蠶洗炒等分右為末酒糊丸如梧桐子大身熱痛薄荷湯下冷痛美酒下虗損松節酒下頭痛葱茶下婦人血風當歸酒下常服鹽湯下二十丸煑肝散出楊氏家藏方治内外障瞖眼右用猪肝二兩批開以夜明沙末二錢匙摻在内麻線纏定用水一􅊦煑令肝轉色白取出