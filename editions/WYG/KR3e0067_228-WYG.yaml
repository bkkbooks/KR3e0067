或支離蔓衍或但取一邊為論據且如説肺勞者短氣靣目浮腫鼻不聞香臭便為虚勞之病則此證何待虚勞而見也嘗究謂勞者有勞役之勞勞傷之勞為所用者太過一臟一腑之氣失其常度所以致疾也且以肺臟論之因其勞動風客氣壅肺氣傷令人面浮腫肺管不通鼻不聞香臭肺中諸氣不能運行令人短氣如此參之恐非虚勞所謂虚勞者虚則已有所虧勞則因其有損若論其證非一證所能其積之有漸其成之有日非一朝一夕之故而卒見也至於巢氏論虚勞體痛而不能食少氣無力各引以為一證此皆不通今原其所得之由指其一者他皆不言可知也若腹脇有塊大小成形按之不動推之不移乆之令人寒熱虚咳𠻳逆面浮腫輙㣲喘日羸此由暴怒驚氣上不得而下動傷於肝氣聚而不行結而不散始得之在肝脉勞大而結不傳可治宜沉香煎若其人頓羸瘦短氣乏力腰背牽急膝酸痿小便或赤或白或濁精泄不禁夣與鬼交噏噏如熱骨肉煩疼此由房勞過度精氣竭疾得之於腎服宜大建中湯後服五味子丸若脉細促欲絶大筋枯槁者不治脉弱者可治其不能食者死若胸中氣滿但嗜卧飲食不減肌膚虚弱滑泄此由思慮太甚飲食勞倦或因他病大槩得之於脾脉弦太甚者不治緩弱者治大肉䧟者死宜炙肝散白术丸若咳𠻳喘急唾如濃涕背寒洒洒皮膚熱燥脇不時痛動則咳極此由形寒飲冷傷於肺經久咳不已肺氣枯燥漸漸羸弱者令人先寒後熱脉弱者可治或𦂳或弦亦可治宜紫苑丸活鱉煎若觀勞赤色大如錢日晡發脉數大者難治加促者死若潮熱有時五心煩熱口乾時渴夜多盜汗及氣力劣少漸漸加咳此由大病之後邪熱不去客乗於心心虚受邪熱摶於榮衛不咳者易治此為不傳脉滑大者易治細嗇者難治宜青蒿散柴胡芍藥散沉香煎出指南方治虚勞腹脇有塊大小成形不動寒熱如瘧石斛五錢沉香附子秦芁黄茋鼈甲木香檳榔柴胡川椒各二兩右為細末先将枸杞子十觔河水洗浄略搥碎用法酒二斗同煎七升取出枸杞根别研用法酒三升洗枸杞令浄将酒一處入蜜四兩同熬成膏和前藥末丸如梧桐子大每服二十丸米飲下五味子丸出指南方治房勞過度精泄不禁羸瘦短氣方見本門虚勞羸痩類炙肝散出指南方治虚勞太過虚弱滑泄牡丹皮芍藥柴胡各一兩白术三兩右為細末每服三錢以猪肝一片薄切開摻藥在内慢火炙嚼米飲下柴胡芍藥散出指南方治五心煩熱口乾時渴夜多盜汗柴胡芍藥地骨皮石膏各五錢右為麄末每服五錢水二鍾小麥五十粒煎一盞去滓服活鱉煎出指南方治虚勞咳𠻳喘急唾如濃涕漸漸瘦弱附子去皮臍白术當歸人參枳殻桃仁杏仁各五錢三稜陳橘皮白芷茯苓甘草秦芁柴胡桑白皮阿膠麻黄官桂各五錢㯽榔豆䓻各一箇右細剉用大鱉一枚湯中爁過折去頭尾腸肚却入藥在腹内将甲合定以麻皮纒濕紙裹七重鹽泥同濟令四面厚薄匀用甕一口入礱糖三斗在甕内放鱉在中間再用礱糖三斗葢之四畔燒一伏時次日取出候氣冷取出打破開鱉并肉及藥作三處焙燥再搗為細末每服二錢温酒調下如咳甚飲酒不得者以酒糊丸如梧桐子大每服三十丸米飲下空心服忌雀鴿莧菜魚腥海味等紫苑丸出指南方治虛勞咳𠻳喘急唾如濃涕漸漸瘦弱紫苑官桂五味子等分右為細末煉蜜丸如梧桐子大每服二十丸米飲下青蒿煎出指南方治五心煩熱口乾時渴夜多盜汗青蒿一觔人參麥門冬各一兩右将二味為細末用青蒿汁一處慢火熬成膏可丸即丸如梧桐子大每服二十丸食後米飲下補虚勞益髓悦顔色長肌令人肥徤出本草以鹿角膠搗為末以酒服方寸七日三服治風勞虚熱出本草以白花藤酒漬服之蓽撥丸出聖恵方治五勞七傷腎虚脾弱上焦煩熱下元虚腹内雷鳴胸膈氣滯羸廋無力宜服方見本門後虚勞不思食類解勞生肌進食活血養心地黄煎圓出華陀藏中經方生地黄汁五升杏仁汁五升薑汁五升藕汁五升薄荷汁一升鵝梨汁一升法酒二升沙蜜四兩右慢火熬成膏入後藥柴胡三兩洗去蘆木香人參茯苓山藥栢子仁㣲炒另研逺志去心白术枳殻各一兩湯浸去穰切麸炒黄秦芁二兩洗去蘆桔梗一兩熟地黄好酒浸一宿切焙麝五錢細研右丸如梧桐子大每日食後甘草湯下二十丸人參補虚湯治四肢懶倦黄茋一錢五分人參七分甘草炙二分生地黄五分防風七分當歸身七分丁香末二分全蝎一枚生甘草稍三分知母七分白芍藥五分五味子半觔升麻七分柴胡一錢𦍑活七分熟地黄六分黄栢七分右剉如麻豆大都作一服水六盞煎至一盞去滓稍熱服空心服之人參五補散治五勞七傷肌痩體熱皮毛乾槁四肢倦不思飲食氣虚耳鳴便旋類併痰𠻳盜汗並皆治此藥療百病大有神効人參二兩黄茋當歸一兩酒浸木香一兩生川芎一兩生乾地黄二兩酒焙桑白皮一兩秦芁一兩去蘆白术一兩白芍藥二兩沉香五錢紫苑一兩去土柴胡一兩去蘆天門冬一兩去心甘草一兩炙白芷一兩半夏一兩湯洗十四遍為末薑汁作餅炙右件為末每服二錢水一盞薑三片􅀥一枚煎至八分温服不拘時候鼈甲散治五勞七傷四時傷寒壮熱骨節煩疼痰𠻳嵐瘴心腹積氣一切風疰婦人血風産前産後諸疾並治川芎白芷鱉甲醋浸炙令赤肉桂紫苑乾薑陳皮各四兩秦芁羌活當歸柴胡各七兩蒼术六兩烏藥五味子芍藥川烏四十箇炮桔梗二觔半㨂浄右為細末每二錢薑二片烏梅半箇煎服傷寒加葱白勞損加酒參苓飲子治脾弱虚發熱心神不寧人參蓮肉甘草各一兩白茯苓茯神白术各五錢香附子一兩炒去毛右為飲子毎服三錢水一盞薑三片􅀥一枚同煎至七分去滓服不拘時候最治小兒量大小加減服鍾乳丸補暖水藏虚冷治五勞七傷腰脚疼痛并面色痿黄肌膚消瘦鍾乳粉三兩鹿茸二兩去毛塗酥炙令㣲黄附子二兩炮裂去皮臍石斛三兩去根剉蛇床子二兩兎絲子酒浸三宿暴乾别搗為末二兩桂心二兩乾漆二兩搗炒令煙出右件藥搗羅為末入鍾乳粉研令匀煉蜜和搗三五百杵丸如梧桐子大每日空心以温酒下三十丸固陽湯治虗勞増寒壮熱下痢咳𠻳自汗等證白茯苓去皮白芍藥附子各三兩炒白术炒三分右㕮咀每服四錢生薑五片水一盞半煎至六分去滓食前温服小便利者去茯芩大便利者去芍藥加乾薑二分𠻳者加五味子細辛乾薑泄㵼者兼服四逆湯震靈丹當應手而愈今人見寒熱證者多用當歸鹿茸不知藥味甘而濡脾戀膈以傷胃氣所謂精氣血氣皆由榖氣而生孫兆謂補腎不如補脾故莫若固陽湯以調寒其熱不能致傷脾若飲食不減氣血自能充實也解熱湯治飲酒虚勞生熱柴胡白术枳殻白茯芩各一錢剉右件藥分作二劑每劑用童子小便水酒共一升煎至半升去滓分二服温服可盡以効為度有腎氣大丸法諸散方白术一觔肉桂乾地黄澤㵼茯芩各四兩右搗篩飲服方寸七日三兩服佳又方生地黄二觔麵一觔右搗炒乾篩酒服方寸七日三服治大病後不足病虚勞補虚取七歲以下五歲以上黄牛乳一升水一升煎取一升如人飢稍稍飲不得多十日服不住佳補肝散出本草方治男子五勞七傷明目用白瓜子七升絹袋盛絞沸湯中三遍訖以酢五升漬一宿暴乾搗下篩酒服方寸七日三乆服瘥治男子五勞七傷補腰腎令人有子去風血出本草方以列當煑及浸酒服之補虚勞出本草方以羊皮去毛煑熟食之主丈夫五勞七傷腰脚痛冷隂痿小便濁白益陽道除風氣補衰老好顔色長筋骨出本草方取䑕藤根又莖細剉濃煑服之訖取㣲汗亦浸酒如藥酒法性極温服訖稍令人悶無苦來蘇散出衛生家寳方治男女五勞七傷増寒壯熱骨節痠痛口乾苦四體骨蒸傷寒頭疼背膊勞倦膈胃煩壅睡昏沉或時咳𠻳靣無顔色小便黄赤婦人血風勞大宜治之甘草焙搗去滓秤肉桂去皮不近火桔梗浄焙乾秤防風洗浄焙五加皮浄洗焙秤赤芍藥浄洗焙秤荆芥穗别輕焙柴胡去蘆浄洗焙乾葛焙搗篩粉去滓白茯苓以上十味各一兩麻黄一兩半去節秤陳橘皮一兩半去白焙秤右須地道新好者焙乾搗羅為末每服二錢薑三片烏梅􅀥子各一枚水一大盞煎至七分去滓熱服日三服善解勞倦及不染山嵐瘴毒氣時行傷寒如傷寒壮熱頭疼連進二三服稍輕調理日三服並不拘時候炙肝散出御藥院方治脾胃虚弱五勞七傷肌體羸瘦不思食久患泄㵼腸滑不止心胸滿悶臍腹疼痛或便血困倦無力四肢沉重及心勞口瘡並皆治之木香白术生犀角山茵蔯去梗紅豆䓻縮砂仁桂去麤皮吳茱萸洗焙乾半兩人參去蘆頭黒附子炮裂去皮臍五錢石斛剉炒狗脊去皮川芎良薑柴胡去苗訶子炮去核草豆䓻炮去皮各一兩五錢陳皮去白白芍藥乾薑炮桔梗防風紫苑去土紫參去皮白蕪荑炒去皮各五錢右為細末毎服二錢半羊肝二兩去筋膜薄批摻藥入葱白生薑和鹽各少許拌匀用紙裹水濕文武火煨熟却用生薑粥送下食前日進二服療勞出本草方以白英煑汁作羮食治五勞七傷明目益筋力宣而復補出本草方以八九月時採仙茅用竹刀子刮去黒皮切如豆粒米泔浸兩宿隂乾搗篩和蜜丸如梧子每旦空腹酒飲任便下二十丸禁食牛乳及黄牛肉大減藥力本西域道人所傳開元元年婆羅門僧進此藥明皇服之有効當時禁方不傳天寳之亂方書流散上都不空三藏始得此方傳與司徒李勉尚書路嗣恭給事齊杭僕射張建封服之皆得力路公文服金石無効及得此藥其益百倍齊給事守縉雲日乏力風痙經作服之遂愈法導引法飬生方云唯欲嘿氣飬神閉氣使極吐氣使㣲又不得多言語大喚呼令神勞損亦云不可泣淚及多唾洟此皆為損液漏津使喉澁大渇又云雞鳴時扣齒三十六下訖將口唇潄舌聊上齒表咽之三過殺蟲補虚勞令人彊壯又云兩手托頭頰手不動擡肘使急腰内亦然住定放兩肘頭向外肘膊腰氣散盡勢大悶始起来去七通去肘臂之勞又云兩足跟相對坐上兩足指相向外扒兩膝頭拄席兩向外扒使急始長舒兩手兩向取勢二皆急三七作去五勞腰脊膝痛傷冷脾痺又云跪一足坐上兩手䏶内捲足努嘴向下身外扒一時取勢向心来去二七左右亦然去五勞足臂疼悶膝冷隂冷又云坐抱兩膝下去三里二寸急抱向身急勢足兩向身起欲似胡床住勢還坐上下来去二七去腰足臂内虚勞膀胱冷又云外轉兩脚平蹹向隂端急慼將兩手捧膝頭兩向極勢捺之二七畢身側兩向取勢二七前後努腰去心勞痔病膝頭冷調和百損時須言語不瞋喜偏跏兩手抱膝頭努膝向外身手膝各兩極勢挽之三七左右亦然頭須左右仰扒去背急臂勞又云兩足相蹹令足掌合也慼足極勢兩手長舒掌相向腦項之後兼至膊相挽向頭髆手向席来去七仰手七合手七始兩手角上極勢腰正足不動去五勞七傷臍下冷暖不和數用之常和調適又云一足蹹地一足屈膝兩手抱犢鼻下急挽向身極勢左右換易四七去五勞三里氣不下又蛇行氣曲卧以正身復起踞開目隨氣所在不息少食裁通腸腹以氣為食以䑛為漿春出冬藏不財不養以治五勞七傷又云蝦蟇行氣正動搖兩臂不息十二通以治五勞七傷水腫之病又云外轉兩足十偏引去心腹諸勞内轉兩足十偏引去心内煩熱兼去身一切諸勞疾疹又云正偃卧以口徐徐内氣以鼻出之除裏急飽食後小咽氣数十令濕寒者乾嘔腹痛從口内出氣䐜腹小嚥氣數十兩手摩令極熱以摩腹令氣下也普濟方卷二百二十八
