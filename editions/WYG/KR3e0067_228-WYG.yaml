body:
  text: 普濟方卷二百二十八明周王朱橚撰虚勞門虚勞五龍軟金丹治男女子諸虚百損五勞七傷下元冷腰腿膝疼痛婦人赤白帶下添精補髓活血駐顔沉香二錢檀香一錢八角茴香一錢五分乳香一錢安息香一錢五分麝香蓮子心犀角丁香硃砂穿山甲仙靈脾酥炙各一錢益智仁一錢五分右為末煉蜜為丸如梧桐子大毎服十丸空心温酒乾物壓之麋茸丸出聖惠方治下元虚冷五勞七傷陽氣衰弱脚腰無力虚勞羸損麋茸三兩去毛塗酥炙㣲黄雄蚕蛾隔紙微炒桂心桑螵蛸微炒逺志去心兎絲子酒浸三日曝乾别搗為末鍾乳粉陽起石酒煑半日細研水飛過山茱萸肉蓯蓉酒浸一宿刮去皺皮炙乾附子炮裂去皮劑蛇牀子黄耆剉各一兩右搗羅為末入陽起石等都研令匀煉蜜和搗三五百杵如梧桐子大每日空心及晚食前以温酒下三十丸沈中丸療五勞六極七傷胃氣不和發於五臟虚勞小便或難數令人多思脾氣不和宿食所為流入百脉飲食不進沈滯著中膈或食不消芎藭附子炮桂心甘草炙黄芩芍藥乾薑蜀椒汁各二兩杏仁去皮炒四兩白术五兩當歸大黄一兩右搗篩蜜丸如梧桐子大以酒服五丸夜三丸忌海藻菘生葱猪肉冷水桃李雀肉等黄耆丸治五勞六極七傷骨髓虚憊四肢無力黄耆剉牛膝去苗熟乾地黄各二兩桂心薯蕷覆盆子巴㦸五味子逺志五錢去心鹿茸去毛酥塗炙㣲黄一兩石斛去根剉肉蓯蓉酒浸一宿削去皺皮炙乾各一兩半右為末煉蜜和搗三二百杵丸如梧桐子大每服空心及晚食前温酒下三十丸薯蕷散治五勞六極七傷臍下膨脝兩脇脹滿腰脊引痛鼻中乾燥目暗䀮䀮憤憤不樂胸中氣逆少飲食小便赤黄餘瀝夢與鬼交失精驚恐虚乏薯蕷白茯苓黄耆剉各二兩逺志五錢去心澤㵼人參去蘆頭白芍藥五味子山茱萸沉香各一兩龍骨一兩五錢枳殻三分麸炒微黄去皮右為散每服四錢以水半盞入薑半分棗三枚煎至六分去滓内白沙糖如栗大更煎一兩沸食前温服巴㦸丸治五勞六極七傷骨髓虚憊四肢無力巴㦸牛膝去苗肉蓯蓉酒浸削去皺皮炙乾補骨脂各二兩栢子仁逺志五味子桂心乾漆搗碎炒令烟出各一兩熟乾地黄三兩鹿茸去毛酥塗炙微黄兎絲子酒浸三日右為末煉蜜和搗三二百杵丸如梧桐子大每服空心及晚食前以温酒下三十丸通明丸治五勞七傷六極强力行步負重病後骨髓未滿所食不消胃氣不平麥門冬三觔乾地黄石韋各一觔紫苑五味子肉蓯蓉甘草阿膠杜仲逺志茯苓天雄各半觔右為末蜜丸如梧桐子大食前苦酒服十丸日再加至二十丸建中湯治五勞七傷小腹急痛膀胱虚滿手足冷飲食苦吐酸痰嘔逆泄下少氣目眩耳聾口焦小便自利膠飴半觔黄耆乾薑當歸各三兩人參半夏橘皮芍藥甘草各二兩附子一兩大􅀥十五枚右㕮咀以水一斗煮取三升半湯成下膠飴烊沸分四服日二服治五勞七傷小腹急臍下膨脝兩脇脹滿腰脊引痛鼻口乾燥目暗䀮䀮憤憤不樂胸中氣逆少飲食心中䇿䇿痛小便黄赤尿有餘瀝去精驚恐虚乏出千金方飴糖半觔黄耆逺志當歸千金翼無澤㵼各三兩芍藥人參龍骨甘草各三兩生薑八兩大􅀥二十枚右㕮咀以水一斗煑取二升半湯成内糖令烊一服八合少停又一服深師無飴糖逺志澤㵼龍骨有桂心六兩半夏一升附子一枚乾漆散治丈夫五勞七傷逺志皮續斷兎絲子各五兩天雄炮桂心各三兩乾漆炒令斷煙蓯蓉各八兩石斛八兩枸杞子一升乾地黄十兩右為散每日一服一匕暮一匕酒飲皆得忌猪肉冷水生葱蕪荑十全大補湯治男子婦人諸虚百損五勞七傷少飲食久病虚損時發潮熱氣攻骨脊拘急疼痛夢遺精靣色痿黄脚膝無力一切病後氣不如舊憂愁思慮傷動血氣喘𠻳中滿脾腎氣弱五心煩悶並治之此藥性温不熱平補有効養氣育神醒脾止渴順正辟邪温暖脾腎見諸虚門補益諸疾類金鎖正元丹治男子五勞七傷沉寒痼冷四肢厥逆隂盛身寒臍腹久痛臟腑軟弱困倦少力飲食遲化澀精補氣久服强健駐顔白殭蚕炒破故紙炒白龍骨山茱萸湯浸去核桑螵蛸炒黒梔子炮肉蓯蓉酒浸牛膝酒浸兎絲子酒浸各五錢韭子二兩炒右為細末煉蜜為丸如梧桐子大每服二十三十丸空心温酒下日進二服常服有益婦人亦可服正元丹治元氣虚冷靣色黒黄飲食減少皮肉枯燥並宜服之此見諸虚門補虚進飲食類萆薢丸出聖惠方治一切勞氣五緩六極久服長筋骨養血脉益顔色變白袪風逐氣充肌萆薢三兩剉牛膝去苗桂心白术熟乾地黄附子炮裂去皮臍川烏頭炮裂去皮臍各二兩枳實麸炒微黄丹參各一兩肉蓯蓉酒浸一宿刮去皺皮炙乾二兩右為末煉蜜和搗二三百杵丸如梧桐子大每服空心以温酒下三十丸漸加至四十丸鍾乳丸出聖惠方治五勞六極七傷痩損虚冷令人肥白鍾乳粉肉蓯蓉酒浸一宿去皺皮炙乾熟乾地黄兎絲子酒浸一宿曝别搗各二兩乾漆搗碎炒令烟出栢子仁酸棗仁㣲炒各一兩甘草五錢炙微赤剉右為末煉蜜和搗三二百杵丸如梧桐子大每服空心及晚食前以温酒下三十丸治五勞七傷衰損出醫方集成枸杞子一斤天雄三兩蓯蓉石斛乾薑各八兩兎絲子一觔逺志續斷各五兩乾地黄十兩右治下篩酒服方寸匕日二補益鹿茸丸治五勞六極七傷衰損方見本門虚勞小便白濁類地黄丸治男子婦人勞損虚羸傷寒冷熱病無所不治乾地黄茯苓𤣥參各五兩澤㵼薯蕷山茱茰桂心芍藥各四兩附子三兩右為末蜜丸如梧桐子大酒服二十丸加至三十丸以知為度此方勝胡公腎氣丸及五石丸丸延生丹出御藥院方治丈夫婦人虚損五勞七傷腹内一切痛大便滑小便不通男子小腹膀胱氣病婦人經閉赤白帶下酒食多傷大人小兒吐逆不定諸積聚寒疝氣疰亦治中惡鬼疰傳屍勞疾乆𠻳水種瘧痢脚氣辰砂别研三兩木香没藥硼砂别研白术人參沉香各五錢附子炮裂去皮臍葫蘆巴各一兩五錢右並為極細末同研匀用大蘿蔔去頂用銀匙剜作罐子将剜出蘿蔔絞取汁在碗内入藥末一重旋以銀匙撩蘿蔔汁在上再一層如上法若汁不透用銀筋匙投之令入藥及八分蘿蔔頂盖之用竹簽簽定一箇蘿蔔盛藥不了即用三兩箇分盛之先用紙封閉次用鹽泥固濟周囬約一指許用栗炭火煆令赤開藥有香方出火藥罐子不動只於燒處存放至次日去泥開罐子以銀匙取藥在磁器調和令可為丸如乾再入蘿蔔汁和令得所丸如小豆大每服十丸細嚼三丸吞七丸空心温酒或米飲下日二臨時量力加減服神應丸出經騐方治男子五勞七傷大黄六兩去皮净黄連四兩浄血竭三兩犀角末二兩牛黄三錢天靈盖一箇醋炙黄色九筋鼈甲一個靈礬二兩右為細末用好醋一斗砂鍋内同藥用文武火熬無醋焙乾再為極細末酒糊為丸朱砂為衣如彈子大每服一丸服藥須要除破日面東男子用酒將藥化開空心温服婦人服用頭紅花好酒一盞半煎至七分去紅花滓将藥化開面東空心服之服後十日忌生冷酒肉麺等物鹿茸丸出楊氏家蔵方治真元虚憊五勞七傷面色黒唇口燥目暗耳鳴心忪氣短精神昏倦喜怒無常飲食無味四肢酸疼舉動乏力小腹拘急小便滑数或時出血熟地黄五兩洗山藥三兩杜仲炒斷絲一兩五錢鹿茸燒去毛酒浸炙五味子附子五兩炮肉蓯蓉酒浸一宿牛膝酒浸一宿各一兩右為末麫糊丸如梧桐子大每服三十丸温酒鹽湯下和劑方用藥同但煉蜜為丸每一劑一觔以麝香一錢為衣名鹿茸麝香丸三因方主諸虚百病精氣耗散血少陽痿服此調榮衛利腰脚補精血熟地黄三兩鹿茸酥炙一兩五錢麝香一錢别研沉香三分細末入麝香研和蜜丸如梧桐子大空心温酒鹽湯下三十丸亦名麝香鹿茸丸補虚益真氣煖下焦肋老扶弱久服强健用鹿茸二兩酒炙附子炮去皮劑沉香各五錢麝香一錢一字别研細末將肉蓯蓉一兩五錢酒煑火爛研細别入酒熬成膏和丸如梧桐子大每服五十丸温酒鹽湯下空心食前服名沉香鹿茸丸七味乾漆散乾漆三兩炒斷煙乾地黄八兩芍藥蓯蓉五味子各二兩吳茱萸枸杞子各四兩右為散酒服方寸七漸加至二七日二服以知為度忌蕪荑調中湯療虚勞補益氣力麥門冬五錢乾􅀥一兩茯苓甘草炙桂心當歸芍藥各五錢右切以水八升煑取三升去滓分服一升日三忌生葱海藻菘菜醋物人參湯治五勞七傷氣虚羸疲骨節疼痛人參白茯苓去黑皮附子各五錢炮裂柴胡去苗枳殻去穣麸炒白术秦芁去苗土各一兩右剉如麻豆每服水三盞􅀥一枚猪腎一箇去脂膜切作薄片煮熟入藥末二錢葱白一寸烏梅半箇生薑二片同煎数沸去滓温服不拘時雙和湯出和劑方治男子婦人五勞六極心腎俱虚精血少遂成虚勞百骸枯瘁四肢倦怠寒熱往來咳𠻳口乾並喘乏靣色痿黄畧有所觸易成他疾或傷冷則宿食不消腹疼痛㵼痢吐逆或傷熱則頭旋眼暈痰涎氣促五心煩熱或因飢飽動作喜怒驚恐病隨而至或虚脹而不思或多食而不生飢肉心煩則虚汗盜汗一切虚勞不敢服燥藥者並宜服常服調中養氣益血育神和胃進食補虚損白芍藥七兩五錢當歸洗酒浸焙黄茋蜜炙川烏各三兩甘草炙熟地黄浄洗酒蒸二兩肉桂去皮不見火二兩去滓右為細末每服二錢水一盞半生薑三片􅀥子一枚煎至六分空心食前服忌生冷菓子等物或入二陳湯同煎一方白芍藥二兩五錢當歸等六味各一兩名雙和散沉寒痼冷加附子末一方有人參三錢治大病後虚勞氣促服温而有補不熱不冷治男女積勞虛損或病後不復四體沉滯骨肉疼呼吸促行動喘息或小腹拘急腰背强痛心中虛悸咽乾唇燥面少色或飲食無味隂陽廢時悲戚多卧少起乆者積年輕者百日漸至痩削五臟氣竭則可復振治之出肘後方甘草二兩桂三兩芍藥四兩大􅀥二十枚生薑五兩無生亦可用乾薑右以水九升煑取三升去滓内飴八兩分三服間日後作一劑加黄茋人參各二兩佳若腹滿及便溏不用飴又方出肘後方黄茋枸杞根白皮生薑各三兩甘草麥門冬桂各二兩生米三合右以水九升煑取三升分四服又方出肘後方治下血虛極甘草一兩白术麥門冬各四兩桂二兩大􅀥二十枚膠三兩右以水八升煑取二升服一方有芍藥名麥門冬湯又方出肘後方羊腎一枚切白术右以水一斗煑取九升每服一升日二三服一日冬月分二日又方肘後方用烏雌雞一隻治如食法以生地黄一觔切飴糖二觔内腹急縳貯銅器罐中蒸五升米乆須臾取出食肉飲汁勿放鹽三月三度作之神良可止盜汗鍾乳散治補虛勞益氣力消食彊腰脚鍾乳粉二分防風人參各一兩細辛半分桂心二錢乾薑一銖右為散分作三服每日食時温酒調一服進食不用過飽亦不得飢日一服常飲酒令體中醺醺若熱煩以冷水洗手當即定不用熱食亦不得過冷忌生葱生菜一方鍾乳粉五錢鹿角膠煎出聖恵方治五勞七傷四肢沉重百事不任怯怯無力昏昏欲睡身無潤澤腰疼頑痺脚弱不便難久立胸脇脹滿腸中雷鳴春夏手足煩熱秋冬腰膝冷疼健忘腎氣不理五臟風虛悉療之鹿角膠二觔搗碎作四分於鐵鐒中熬令色黄生地黄一觔取汁紫蘇子二觔以酒一升研瀘取汁生薑一觔汁黄牛酥一升蜜三觔右先煎地黄汁生薑汁等二十餘沸次下酥蜜又煎三五沸次以蜜并膠末下之攪令相得膠消盡煎即成矣以器盛之空心以酒調二合服之日再此藥補五臟益心力實骨髓生肌肉理風補虛聦耳明目理腰脚忌羊血蕪荑一方有天門冬二觔無紫蘇子建中湯出千金方治五勞七傷虛羸不足面目黑手足痛若乆立腰疼起則目眩腹