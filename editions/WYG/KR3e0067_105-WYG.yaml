黒神丸治大腸秘澁不通風結巴豆一兩麩炒去皮心摸出油硫黃研一分乾薑炮半兩皂莢三挺不蛀者燒令烟絶與硫黃研同右搗乾薑為末與三味研勻用蒸餅去皮湯浸搦乾紙褁煨透和藥搗勻丸如梧桐子大每三丸空心生薑湯下加至四丸為妙雄黃丸治風熱氣壅大便不通雄黃研欝金各一兩巴豆半兩去皮心膜研如膏生麫二兩右同研細滴水丸如梧桐子大每服二丸至三丸食後卧時生薑湯下量虚實加減㯽榔散治風熱大便不通㯽榔二枚剉朴硝研大黃剉炒青橘皮湯浸去皮焙各一兩右為末每服二錢食後臨卧葱蜜湯調下蜜膩散出聖濟總録治風熱盛大小腸秘澁大黃煨剉搗末牽牛子生杵為末甘遂㣲炒黃搗為末右秤大黃牽牛末各三錢甘遂末一錢入膩粉半錢同研勻每服二錢以濃煎蜜湯調下食前服葳靈仙散出䕶命方治老人風氣壅盛大腸秘澁五六日方大便一次天隂日盛頭旋目暗發作無時宜服此方葳靈仙一兩酒浸切焙芎藭羌活去蘆各半兩右為散每服二錢用空心葱湯調下不轉第二日再服祛風順氣香枳散余居士選竒方治大腸秘澁枳殻去穣麩炒防風去义各一兩剉甘草炙剉半兩右搗為散每服二錢以沸湯㸃服空心食前各一服郁李仁散出聖濟總録治風熱氣秘郁李仁去皮尖炒陳橘皮去白酒一盞煮乾京三稜炮剉各一兩右為散每服三錢以空心煎熟水調下麻仁丸出聖生拔萃方治風秘大便不通枳殻去穣麩炒川芎各等分麻仁泥子減半右為末煉蜜丸梧桐子大温水下食前服牛黃丸治大腸風熱秘牛黃細研一分大黃剉炒二兩巴豆去皮心膜麩炒研新瓦上取霜半兩右為末酒煮麫糊丸菉豆大每服五丸臨卧米飲下量虚實加減㯽榔丸出聖濟總録治風秘大便不通發燥引飲㯽榔剉兩枚為細末黒牽牛子四兩搗取末二兩右拌勻煉蜜和丸如梧桐子大每服二十丸温薑湯下不計時候便㸔臟腑虚實加減治大腸有風大便秘結及氣秘尊年之人宜服出危氏方皂角炙去子枳殻去穣麩炒各等分右為末煉蜜丸梧桐子大每服七十丸空心米飲下一方以炊飯搗爛為丸用入水不浮好沉香濃磨汁調下枳殻飲傳信適用方治老人大便風秘不通塞澁妨悶或用􅁡導之類不能通者用枳殻水浸去穣麩炒為末每服一大錢入阿膠三斤生薑五斤葱白五莖水一盞煎至六分去滓入蜜少許空心温服次用葱白十莖爛研塗臍中却以手蘸葱湯自内両腰間烙熨至小腹下少頃氣透即通治風秘風科集驗用阿膠麩炒研為細末煎服三錢氣實者加木香最宜老人服一方阿膠一斤煎葱白湯下治有風大便秘澁及關格不通用不蛀皂角燒灰為末每服一錢米飲調下一方去皮子炙黃為末葱蘸内肛内立通吹亦可一方治風秘用不蛀皂角當中所一寸許去黒皮以沸湯半盞泡上用盞盖定候通口服之先辦少粥通後即食名風秘湯攅宫有一老人患八九日不通有木匠授以此方只一服見效一方碗燒盖置於桶内薰下部即通妙白薑蠶散治大腸風秘方見破傷風類治心風秘本草水銀一兩藕節八箇右研搗藕節令細次入水銀同研成沙子丸如雞頭子大每服二丸磨刀水下一二服差大黃丸出聖惠方治風壅大腸澁滯川大黃一兩半剉㣲炒大麻仁一兩半車前子一兩半兔絲子三分酒浸三日晒乾别搗為末郁李仁一兩半湯浸去皮尖㣲炒枳殻一兩半麩炒㣲黃防風三分去蘆獨活三分山茱萸三分薯蕷三分㯽榔一兩牛膝去苗三分右件藥搗羅為末煉蜜和搗三二百杵丸如桐子大每服夜臨卧時以温漿水下三十丸通秘散楊氏家藏方治風秘大便澁香白芷不以多少焙乾右為細末每服二錢蜜水少許温米飲調下連進二服即通食前賊風論夫邪之中人有四從所不勝来者謂之賊邪與冬至之日疾風南来名曰賊風其義一也聖人於虚邪賊風避之有時以邪從所不勝来故謂之虚邪以其竊害中和之氣故謂之賊風其證痛而不熱則不能按仰轉動不熱則身内索冷欲得熱熨即小寛也加以風冷則骨解深痛按之徹骨或遇冷氣相搏則結㿔癧或偏枯風熱相搏則變附骨疽方追風散聖惠方治中賊風口噤昏沈半身不隨風毒入臟口面喎斜天南星炮製白附子炮製附子炮製去皮臍烏蛇肉酒浸炙㣲黃天麻白殭蠶㣲炒各一兩乾蝎㣲炒羌活防風去蘆頭半夏湯浸洗七遍去滑蛇床子藁本白芷蔓荆子犀角屑各二分牛黃細研半兩葳靈仙半兩麻黃細剉一兩麝香細研一分右搗細羅為散入研了藥都研令勻每服不計時候以温酒調一錢秦艽散出聖惠方治賊風入腹短氣心下煩熱手足疼痛四肢不舉口噤不能言秦艽去苗一兩羚羊角屑防風去蘆頭葛根剉赤芍藥漢防己附子炮製去皮臍細辛赤茯苓各三分當歸剉㣲炒人參去蘆頭甘草炙㣲赤剉木通剉桂心白术各半兩右粗搗羅為散每服四錢以水一中盞煎至五分去滓入竹瀝一合更煎一兩沸不計時候温服麻黃湯治中賊風急强大呼不自覺知身體盡痛麻黃去根節煎掠去末焙黃芩去黒皮芎藭當歸切焙紫石英甘草炙剉桂去粗皮逺志去心獨活去蘆頭桔梗炒各一兩防風去义石膏碎各二兩乾薑炮一兩半杏仁二十五枚去皮尖䨇仁炒右粗搗篩每服五錢以水一盞半煎至八分去滓温服不拘時日三夜一茵芋飲出聖惠方治賊風入腹心中拘急煩亂恍惚忘語迷惑不知人事口噤不開卧則驚怖口乾惡風時時失精身體沉重茵芋烏頭炮製去皮臍乾薑炮細辛去苗葉黃芩去黒皮桂去粗皮天雄炮製去皮臍防風去义白茯芩去黒皮一兩一作赤茯芩秦艽去苗防己當歸焙甘草炙各二兩右剉如麻豆每服五錢以水一盞半入竹瀝少許煎八分去滓温服大續命湯出聖惠方治中賊風急强大呼身體疼痛麻黃去根節煎掠去沫焙三兩石膏碎防風去义各二兩乾薑炮一兩半黃芩去黑心芎藭甘草炙白术逺志去心獨活去蘆頭各一兩紫石英半兩杏仁三十五枚去皮尖雙仁炒右粗搗篩每服五錢以水一盞半煎至一盞去滓温服不拘時良久再服一方治中風風急强大呼不自覺知身體强直者有桂無白术名桂枝湯漢防己散出聖惠方治賊風身體拘急舌强難言手足不隨漢防己黃芩各一兩麻黃去根節石膏各一兩半赤芍藥芎藭防風去蘆頭羌活附子炮製去皮臍當歸剉㣲炒各三分杏仁湯浸去皮尖䨇仁麩炒㣲黃白术各半兩右粗搗羅為散每三錢以水一中盞入生薑半分煎至六分去滓不計時候温服羚羊角散出聖惠方治賊風身體緩弱手足不隨言語蹇澁精神恍惚羚羊角麻黃去根節杏仁湯浸去尖䨇仁麩炒㣲黃各一兩石膏二兩人參去蘆頭赤芍藥各半兩芎藭漢防己桂心附子炮製去皮臍防風去蘆頭各三分右粗搗篩為散每服三錢以水一中盞煎至六分去滓不計時候温服葛根湯治中風半身不隨口面喎僻言語不便生葛根切半夏湯洗七遍各四兩生薑五兩與半夏同搗炒乾獨活去蘆頭桂心去粗皮二兩半防風去叉當歸切焙芍藥甘草炙各一兩附子炮製去皮臍半兩右剉如麻豆每服五錢以水一盞半入生薑一棗大拍碎煎至八分去滓温服日二夜一杏仁飲一名西川續命湯治中賊風身體不収不知痛處卒語不得手足拘急腰痛引頸目眩欲倒卧即反張脊不著席脈動不安恍惚恐懼上氣嘔逆等症方見風痱類麻黃散出聖惠方治賊風身體及心脇疼痛四肢不利麻黃去根節一兩半當歸剉微炒桂心各一兩芎藭茵芋萆薢剉乾薑炮製剉各兩半黃芩甘草炙微赤剉各三分右粗搗羅為散每服三錢以水六分煎至三分次入酒四分更煎三兩沸去滓不計時候温服桂心散出聖惠方治賊風心腹拘急四肢疼痛腹滿欲死桂心防風去蘆頭芎藭甘草炙微赤炒剉檳榔各三分乾薑炮製剉吳茱萸湯浸七遍焙乾微炒枳殻麩炒微黃去穣各半兩秦艽去苗一兩右為散每服四錢以水一中盞煎至六分去滓不計時候温服側子散出聖惠方治賊風毒氣攻注四肢疼痛發動不可忍側子炮製去皮臍當歸剉微炒桂心赤芍藥附子炮製去皮臍防風去蘆頭檳榔甘草炙微剉各一兩麻黃去根節二兩右粗搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服甘草飲治賊風入腹角弓反張口噤舌强目視不眀不能言語舉體不仁或心腹疼痛甘草炙黃芩去黒皮附子一枚炮製去皮臍人參芎藭防風去叉麻黃去根節防己各一兩右剉如麻豆每服五錢以水一盞半入生薑三片煎五分去滓空心食前温服一方加芍藥一兩麻黃飲治賊風入五臟四肢心脇急痛咽乾口噤麻黃去根節當歸切焙芎藭甘草炙乾薑炮各二兩黃芩去黒心一兩杏仁三十枚去皮尖䨇仁炒右粗搗每服五錢以酒半盞水一盞煎至一盞去滓空心温服秦艽丸一名桂心湯治賊風入腹搶心拘急四肢不隨腹滿欲死者方見風入腹拘急切痛類當歸湯出三因方治賊風口噤角弓反張痙者方見風角弓反張類療諸賊風腫痺風入五臟恍惚莽草一斤烏頭附子躑躅各三兩右以苦酒一斤浸一宿猪脂四斤煎三上三下絞去滓向火以手摩病上三百度應手卽差耳鼻病可以綿褁之療諸疥癬雜瘡烏頭膏出聖惠方治賊風身體不隨偏枯口喎僻及傷風寒身强直烏頭炮野葛去心各五兩莽草一斤右㕮咀以好酒浸令淹漸再宿三日浸之以不落水猪肪五斤煎成膏合藥作東向露竈以葦薪煎之三上三下藥成去滓有病者向火摩三千遍汗出即愈若觸露鼻中塞對火摩頭頂鼻中即通藥不可令入口眼也倉公酒出鮑氏方治賊風口噤角弓反張當歸防風各三分獨活一兩半麻黃一兩一分細辛半兩附子一箇右為散每服四錢水酒各半盞煎口不開者抉開納藥一服蘇二服少汗三大汗愈防風散出指南方治賊風口喎防風一兩羌活半兩甘草一分右為粗末每服五錢水二盞煎一盞去滓入麝香一字温服治賊風出本草用曽經辛苦鐡燒赤投酒中熱服之即是勞鐵也去賊風風痺出本草用櫓豆炒令黒及熱投酒中漸漸飲之治賊風反折出本草以赤銅屑熬使極熱投酒中服五合日一又燒赤銅五斤内酒二斗中百遍服甚驗治賊風以秤錘燒令赤投酒中及熱飲之治賊風風痺破血出本草以雞屎和黒豆炒浸酒服一用雞子和豆淋酒服治賊風出本草以薄荷煮汁服治中風口偏不語者倉茱萸子二升䜴三升右二味酒五升共煮四五沸冷服半升日三四服得汗便瘥止血除賊風用烏氊燒為灰酒下二錢瘥烏氊乃睡黒者色氊也不宜乆作卧褥吸人脂血令人無顏色土氣治賊風毒腫及麻痺用莽草濃煎湯淋洗又方用麻子炒令香搗碎以童子小便浸取汁服之麻子乃今人續布麻種子也又方用生大豆炒令黑色熱投酒中漸漸飲之普濟方卷一百六
