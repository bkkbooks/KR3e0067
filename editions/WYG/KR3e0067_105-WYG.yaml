body:
  text: 普濟方卷一百六明周王朱橚撰諸風門風痱附論夫氣血虚甚風邪乘之内外不得通洩其病爲痱風痱之狀身體不痛四肢不收神智不亂時能言者是也字書謂病痱而癈肉非其肉者以身體無痛四肢不收而無所謂也夫風痱者卒不能語口禁手足不遂而彊直者是也治之以伏龍肝五升爲末冷水八升和絞取汁飲之能盡爲善古人立方皆律病根冷熱治之今人臨急造次搜尋即用故多不驗所以欲用方者先定其冷熱乃可檢方用無不效湯藥旣爾丸散亦然凡此風之動也必由熱盛故有葛汁竹瀝等諸冷藥焉學者不可不仔細識其方意也然其人無宻室者不可與療以彊人居室不宻尚中風邪況服藥之人乎方防風湯治風痱四肢不收言語蹇澁防風去义剉獨活去蘆頭防己秦艽去苗黃耆芍藥白术芎藭逺志去心各二兩石膏碎三兩升麻二兩石斛去根剉三兩丹參牛膝去心酒浸切焙甘草炙剉天門冬去心焙羚羊角鎊屑五加皮地骨皮人參茯神去木厚朴去粗皮生薑汁炙五次各二兩陳橘皮湯浸去白焙麻黃去節先煎掠去沫焙乾熟乾地黃焙乾各一兩半薏苡仁炒一兩半右㕮咀每以六錢水三盞煎至一盞半去滓分温二服空心夜卧服之若覺心中煩熱每煎將熟别入竹瀝一合更煎三沸温服獨活散治風痱心熱煩悶四肢不仁獨活秦艽去苗防風去蘆頭生乾地黃羚羊角屑各二分漢防己石膏麻黃去根節各一兩黃耆剉赤􅆚藥人參去蘆頭茯神白术芎藭逺志去心川升麻丹參甘草炙微赤剉五加皮地骨皮天門冬去心薏苡仁各半兩右㕮咀每服四錢以水一中盞入生薑半分煎至五分去滓不計時温服葛根散治風痱言語不轉四肢緩弱上焦煩壅心氣不利葛根剉麻黃去根節赤芍藥防風去蘆頭黃芩漢防己桂心白术人參去蘆頭獨活芎藭川升麻牛膝去苗陳橘皮湯浸去白穣焙羚羊角屑五加皮各一兩石膏二兩右粗搗篩為散每服四錢以水一中盞入生薑半分煎至五分去滓入淡竹瀝半合更煎五六沸不計時候温服大有效伏龍肝湯治風痱卒不能語口禁手足不隨而彊直者宜用伏龍肝五升末水八升和攪取汁飲之能盡為善保壽丸治風痱身體不痛四肢不收神智不亂時能言者牛黃研丹砂研雄黃研犀角鎊屑天麻蝉殻去土乾薑炮白殭蠶炒半夏湯洗十次焙天南星炮烏蛇酒浸去皮骨炙白附子炮當歸切焙麝香研各半兩膩粉一分右爲細末用槐膠三兩以長流水浸三日取搗令爛入藥末不語搜和丸如雞頭大常服一丸茶酒嚼下少有風疾用槐栁桃葱白各十莖細剉同鹽漿水濃煎下二丸浴後服二丸衣被葢汗出立差産後中風忽中急風豆淋酒及梨汁薄荷汁化下五丸立效風痰酒痰偏宜服之天麻地榆丸治風痱身體不痛四肢不収神智不亂天麻地榆𤣥參金鈴子烏藥烏頭去皮臍生用防風去义乳香研麝香研龍腦研丹砂研水飛没藥研各一兩自然銅研一復時極細為度半兩右除乳香等别研外餘藥焙乾搗羅爲細末入前研藥拌勻煉蜜和杵千下丸如雞頭大每服三丸至五丸空心日午臨卧茶酒化下嚼喫亦得麻黃散治風痱身體不収不能言語冒昧不識人麻黃去根節三兩漢防己桂心各二兩獨活秦艽去苗細辛芎藭黃芩當歸杏仁湯去皮尖䨇仁麩炒㣲黃各二兩乾薑炮製剉甘草炙剉㣲黃各半兩右㕮咀每服四錢以水一中盞煎至六分去滓不計時候稍熱頻服以汗出為度羚羊角散出聖惠方治風痱筋脈緩弱言語蹇澁羚羊角屑桂心茯神麻黃去根節葛根剉附子炮製去皮臍當歸剉㣲炒酸棗仁五加皮各一兩川升麻枳殻麩炒㣲黃去穣獨活各一兩半右㕮咀每服四錢以水一中盞入生薑半分煎至五分去滓不計時候温服麻黃湯出聖濟總録治風痱身體不能自収不能言語冒昧不知人方見風痙類獨活湯一名獨活煮散出聖惠方治風痱肢體緩弱言語蹇澁冒昧不識人獨活去蘆頭四兩芎藭芍藥各三兩當歸切焙乾人參各二兩防風去义葛根剉白茯神去黒皮一作赤防己各三兩石膏碎七兩羚羊角鎊屑麥門冬去黒皮各二兩甘草炙剉一兩半白术二兩半磁石燒赤醋碎五次五兩桂去粗皮二兩右粗搗篩每服五錢以水二盞入生薑一棗大切生地黃一錢切杏仁五枚去皮尖碎研同煎至一盞去滓温服空心午時夜卧各一服一方有赤茯苓無杏仁同煎名芎藭散西州續命湯出千金方治中風痱一作入臟身體不知自収口不能言冒昧不識人拘急背痛不得轉側麻黃六兩石膏四兩桂心二兩甘草芎藭乾薑黃芩當歸各一兩杏仁三十枚右㕮咀以水一斗二升煮麻黃再沸掠去沫後下諸藥煮取四升初服一升猶能自覺者勿熟眠卧可厚覆少少汗出已漸減衣勿復大覆熟眠矣前服不汗者後服一升汗後稍稍五合一服安穏乃服勿頓服也汗出則愈勿復服飲食如常無禁忌勿見風并治上氣欬逆若面目大腫但得卧服知大善凡服此湯不下者人口噓其背湯則下過矣病人先患冷汗者不可服此湯若虚羸人但當稍與五合為佳間有輙行此湯與産婦及羸人或有死者皆為頓服三升傷多且湯濁不清故也但得清澄而稍稍服微取汗者皆無害也一方治風痱身體不能自収者有人參無黃芩一方治風癔邢氣入臟者入竹瀝半合煎服竹瀝湯出千金方治四肢不収心神恍惚不知人不能言竹瀝二升生葛汁一升生薑汁三合右相和温暖分三服平旦日晡夜合一服服訖覺四體有異似好次進後湯方竹瀝一升生葛汁五合芎藭防己附子人參芍藥甘草桂心各一兩生薑四兩羚羊角三兩石膏六兩黃芩杏仁四十枚麻黃防風各一兩半右㕮咀以水七升煮減半内瀝煮取二升五合分三服取汗間五日更服一劑頻與三劑漸覺少損仍進後藥竹瀝三升防風升麻羚羊角防己桂心芎藭各二兩麻黃右㕮咀以水四升合竹瀝煮取二升半分三服兩日服一劑常用加獨活三兩最佳頻進三劑若手足冷者加生薑五兩白术二兩若不除更進後方竹瀝一升甘草一根二兩人參芎藭獨活升麻各一兩防風麻黃芍藥各一兩半生薑石膏附子一方作杏仁十四枚羚羊角防己桂心黃芩白术各二兩右㕮咀以水八升煮減半内瀝煮取二升半分三服相去如人行十里乆更服若有氣者加橘皮牛膝五加皮各一兩凡風痱服前湯得差訖可常服煮散悉除餘風防風防己獨活秦艽黃耆芍藥人參白术茯神芎藭逺志升麻石斛牛膝羚羊角丹參甘草厚朴天門冬五加皮地骨皮黃苓異作薯蕷桂心各一兩乾地黃橘皮生薑麻黃各三兩㯽榔異作甘草藁本異作附子杜仲異作麥門冬烏犀角各二兩異作山茱萸薏苡仁一升石膏六兩一云三兩右搗篩為粗散和攪令勻每服以水三升藥三兩煮取一升綿濾去滓頓服之取汗但服若覺心中煩熱以竹瀝代水煮之獨活散一名天麻散出聖惠方治風痱言語蹇澁四肢不収獨活去蘆頭天麻各三兩白鮮皮地骨皮人參麥門冬去心焙薏苡仁防風去义赤芍藥惡實炒甘草炙各一兩阿膠炙令燥蝉殻炒羚羊角屑附子炮去皮臍桑根白皮剉各半兩右為散每服温酒調下二錢不計時候白鮮皮散一名白鮮皮湯出聖惠方治風痱四肢緩弱心神煩悶不能言方見中風半身不隨類太乙神精丹出簡易方治風痱尸厥鬼疰飛尸雄黃油煎七日雌黃丹砂光瑩者曾青磁石各一兩金牙石六錢右各研細將雄黃雌黃丹砂醋浸三日曾青用好酒於銅器中浸紙封曝百日急用七日亦得如天隂以火焙乾六味同研勻用砂合盛令藥滿得三分許一比準合子大小先以赤石脂末固縫外用六乙泥固濟訖須候透乾以晴明六合吉日合别泥作三箇柱子高五寸合平穏如立鼎足狀安合子下置火三斤遂旋添炭常令及五斤只在合底不得過口五日為度放冷水中浸合子候泥透剥去泥將合子輕手取開其藥精英五色盡在葢上亦有三色者絶白為上研細棗肉圓如粟米大每一粒飲服如口噤牙𦂳去前兩齒灌下卽甦合六乙泥法礬石黃泥褁燒一伏時研細蚯蚓糞醎土鹽黃礬逺看如金絲色精明其色本緑各用一兩以黃泥褁火燒令通赤如血取研黃泥一斤右同為末以紙裹一處搗和成泥風毒方大八風湯出千金方治風毒頑痺嚲曳手脚不隨身體偏枯或毒氣下注或風入五臟恍恍惚惚多語喜忘有時恐怖或肢節疼痛頭眩煩悶或腰脊彊直不得俛仰腹滿不食咳𠻳或始遇病時卒倒悶絶卽不能語便失音半身不隨不仁沈重皆由體虚之故不必風冷所致治之之方當歸二兩半五味子升麻各一兩半烏頭黃芩芍藥逺志獨活防風芎藭麻黃秦艽石斛人參茯苓石膏黃耆紫苑各一兩杏仁四十枚甘草桂心乾薑各一兩大豆一升千金翼云二合右㕮咀以水一斗三升酒二升合煮平四升彊人分四服羸人分六合服一方無逺志恍惚者不用酒神驗摩風毒膏聖惠方治風毒積年四肢攣急肌肉頑痺氣脈不宣通腹中百病不一老少宜用牛膝去苗赤芍藥當歸白术白芷川椒去目厚朴去粗皮雷丸半夏桔梗去蘆頭細辛吳茱萸附子生去皮臍木香大腹子梹榔各一兩酥二兩野駞脂臘月猪脂各三斤右細剉以酒浸一宿先煎猪脂然後入諸藥從平明至日入以慢火煎之其膏即成以綿濾去滓却入鐺中後下酥并駞脂待稍冷収入於甆器中每取如棗大於患處摩之仍須避風若腹中有痛即以酒化如彈子大空心服之摩風膏出聖惠方治一切風毒筋急腫硬疼痛野駞脂臘月猪油狗脂鵝脂各二兩已上一處細切用清油一斤於鍋内煎化盡漉去滓桂心沒藥麒麟竭白芷白附子生用附子生用天麻呉茱萸青鹽各半兩馬牙硝川朴硝各一兩右為末入在油鍋内用慢火從夘時熬至巳時以來入黃蠟六兩消盡蠟傾在盒内入麝香一分雄黃半兩膩粉半兩三味一處爛研入在藥盒内用栁枝子攪令勻每有患者頻摩之立效摩風白芷膏出聖惠方治風毒流注骨節疼痛筋脈攣急宜用白芷防風去蘆頭附子去皮臍白芍藥當歸川椒去目羌活獨活藁本川烏頭去皮臍細辛白殭蠶各半兩生薑黃蠟各五兩猪脂一斤半水浸三宿逐日一換右細剉先煎猪脂去滓入諸藥煎白芷色焦赤以綿濾去滓澄清拭鐺令浄慢火熬入蠟消為度用甆盒盛每取少許於火畔熁手摩之黃耆丸療風毒發即眠睛疼脚從中指疼連肘邊牽心悶兩脇脹少氣力喘氣急欲絶不能食黄耆黃連各七分防風甘草炙各五分五加皮白鮮皮枳實炙各四分升麻車前子苦參炙麥門冬去心葶藶子熬巨勝各六分右搗羅蜜和丸如梧桐子大空心以酒浸大豆下二十丸漸加至三十丸日二服不加增之忌海藻菘菜猪肉冷水熱麵炙肉蕎麥透氷丹和劑方治一切風毒上攻頭目腫痒痰涎擁塞心胸不利口舌乾澁風毒下疰腰脚沈重腫痛生瘡大便多秘小便赤澁及治風癱緩一切風疾蔓荆子去白皮白茯苓去皮川大黃去粗皮山梔子去皮益智子去皮葳靈仙去蘆頭洗焙乾白芷各半兩香墨燒醋碎細研麝香研各一錢一字茯神去木半兩天麻川烏二兩用河水浸半月切作片焙乾用鹽炒仙靈脾葉洗焙右為細末研藥勻煉蜜摉和如麥飯相似真酥塗杵臼搗杵如乾旋入蜜令得所和摉成劑每服旋丸如梧子大用薄荷自然汁同温酒化下兩丸如卒中風涎潮昏塞煎皂角白礬湯放温化丸灌之癱緩風每日服三五丸漸覺有效常服一丸踈痰利膈用温酒下食後服小兒驚風入膩粉少許薄荷汁化下半丸立效治瘰􅊓用葱湯下一丸忌動風毒物芍藥湯療中毒風腫心腹痛達背迫氣前後如産痛方芍藥細辛桂心甘草炙當歸呉茱萸獨活各一兩乾地黃二兩生薑五兩桃仁四十枚去皮尖兩仁碎右㕮咀以水九升煮取三升分為四服宜利