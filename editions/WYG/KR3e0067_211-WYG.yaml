實三兩生薑五兩右切以水五升煑取二升分為三服相去五里乆不過五劑忌生葱駐車丸治赤白痢腹痛方見夲門香連丸治赤白痢方見夲門治赤白痢三将軍方甘草黒豆一合半米殻十四個薑二塊右四味同水二升煎至一升温服去滓再以水一升煎滓至半升如服盡未効别用煎藥加大棗五個訶子二個生紙褁煨煎服切忌菘菜魚腥一切毒物食淡為止如聖飲子出千金方治隂陽不和冷熱相干腹痛泄㵼米榖不化榮衛虛弱寒氣内襲下痢赤白後重裏急並宜服之茯苓湯治因胃傷寒氣誤食冷飯水㵼五六日一夜走十行白痢次日變作赤白痢腹中疼痛减食熱燥四肢沉困無力豆䓻丸治脾胃虚弱臟腹頻滑下痢赤白木香赤石脂乾薑砂仁厚朴肉豆䓻以上各等分右為末醋糊為丸如梧桐子大每服六十丸空心米湯下神仙斷下丸治三色痢浄黄連一觔楠木香五觔右二味剉用水一斗五升銀石器内煑乾分作三處赤痢用黄連為末神麯打糊丸如梧子大名黄連斷下丸白痢用木香為末神麯糊丸名木香斷下丸赤白痢木香黄連末神麯糊丸各件每七十丸米飲空心下小兒丸如黍米大加减服必効飲子治乆新赤白痢浙東帥趙侍郎子和任子年施此藥白术甘草罌粟殻各等分右為粗末每服三大錢水一盞半生薑三片棗一個煎至七分去滓温服白痢加白术赤痢加甘草不拘時候服忌油膩之物治赤白痢及水瀉最効廬州合肥唐主簿錡方破故紙罌粟殻四兩右二味為細末煉蜜為丸如弹子大每服一丸水一盞化開薑一片棗一個煎取七分如小兒分作四服軟紅丸消虚積治冷熱不調下痢赤白膿血相雜乳香硇砂二味各錢一兩七續随子四十九枚蝎三枚硃砂一錢巴豆二十粒粉霜膩粉黄丹黄蠟四味各半兩右為細末於甆器内鎔蠟成汁入麻油半茶脚許後入餘藥和丸如菉豆大每服二丸乳香湯下小兒如黄米大每服一丸乳香湯下食前萬應丸治乆挾積滯因傷生冷遂作痢疾或赤或白經乆不瘥内炙丸治腸滑胃虛裏急後重痢下赤白臍腹㽲痛髙良薑四兩肉桂當歸茴香乾薑肉豆䓻各二兩半夏一兩附子一兩右為細末煉蜜和丸如梧桐子大每服五十丸温酒送下空心食前十金散治赤白痢晝夜無度服之立瘥黒豆五文菉豆五文人参十五文甘草五文陳橘皮五文糯米三文紫蘇三文燈心五文良薑五文罌粟殻二十文右二豆搥破水一大碗同諸藥煎一盞半入熟蜜少許去滓通口服不拘時候禁口如腸潰者只兩服傳于臨汀學正頼簡敬仲頼得於趙守兼善兼善得之余丞相神効難言百靈湯治赤白痢罌粟殻陳皮木通烏梅甘草黄連右六味各等分剉如录豆大每服三大錢水二盞生薑三片􅀥子二個擘破砂礶内慢火煎至八分去滓放温如熱水旋吃礶口用濕紙兩重葢覆不可令灰入服藥後且忌口温人鄭元鼎云近日攖病血痢之間數十次窘不可言有客惠藥兩服而止醫者云全是木通作効而夲草却不云治瀉痢只云通利九竅血脉闗節葢人患㵼痢只縁水榖不分若水道利則榖道燥矣其理甚明三靈散治赤白雜痢困重益母草陳鹽梅右等分為末每服三錢白痢乾薑湯下赤痢甘草湯下連服木𤓰散治赤白痢木𤓰車前子罌粟殻各等分右為細末每服二錢米飲調下延壽飲子治逺年近日赤白瀉痢木香一兩黄耆四兩御米殻八兩甘草二兩當歸二兩青皮二兩訶子四兩右各為粗末每服三錢水一盞半煎至一盞去滓忌生冷鷄鴨油膩等物神功飲治瀉痢赤多白少者罌粟殻十四個甘草三寸生薑一塊橘皮一兩黑豆一百二十粒右用水二碗煎至一碗去滓分作二服空心食前又次日五更将滓以水一碗重煎至七分服香参散治榮衛俱虚臟腑不調泄瀉不止痢赤白日無度腹内疼痛飲食不進陳皮一兩木香人参當歸半兩訶子皮烏梅地榆香薷三分甘草一分炙右為末每服二大錢水一盞煎至五分空心温服白痢加生薑四片同煎如神散治腸胃氣虚冷熱不調下痢赤白狀如魚腦裏急後重立有神効白芍藥川當歸吳茱茰黄連炒赤色右等分為末每服二錢空心食前米飲下日三服立瘥聖餅子治㵼痢赤白臍腹撮痛乆不愈者黄丹三錢定粉三錢蜜陀僧三錢舶上硫黄輕粉少許右為末如白麵四錢匕滳水和丸如指尖大捻作餅子隂乾食前温漿水磨下大便黒色為効赤粉丹出指南方治痢膿赤白巴豆霜硇砂硃砂各一兩砒半兩右同研細鎔黄聚成塊子每服一丸如麻子大冷麵湯下臨卧服如人稍覺有傷大便異于常作膿狀臍腹㽲痛即便服之更無所害阿膠丸治赤白痢乾薑一分當歸白芍藥白茯苓木香各半兩右為細末醋打阿膠糊為丸如梧桐子大每服三十粒濃煎黄連艾葉粳米作湯併服數服立効至聖保命丹治血痢晝夜無度萞麻三兩巴豆四十九粒黄丹二兩黄蠟四兩右件先将麻油同巴豆用銀鍋慢火熬成色如桴炭黒色去巴豆不用次黄丹煎數沸再入黄蠟熬令色黒滴入水中成膏為度每服一挺重半錢旋丸如菉豆大空心赤痢甘草湯下白痢乾薑甘草煎湯下一聖散治下痢赤白或小便不利淋澁痛罌粟殻車前子炒右件分為細末每服二錢米飲下乳香散治一切赤白痢或雜色等疾及水瀉乳香二錢甘草四錢草菓子四個炮罌粟殻三十個右為研細末将乳香入乳鉢内匀一二味每服二錢水一盞分飯四五十粒煎至六分無時服立有神効肉果散治赤白痢木𤓰皮肉果木香陳皮甘草各三右為細末分八服白者米湯赤者白湯下治下痢赤白心中煩躁潮熱用小柴胡湯加赤芍葯地榆煎服治老人痢赤白雜色服胃風湯取効五苓散出如宜方治夏秋得痢病澤瀉三兩半豆蔲一兩白术猪苓赤茯苓各一兩半右為末熱湯調下吞感應丸積滯𦂳急加巴豆氣痛宜蘓感丸要通痢與黄連香薷飲止痢天仙散治隂陽交滯不問赤白痢出如宜方用劉寄奴烏梅白薑水煎赤加烏薑相等分服又方黄連生薑同炒各為末赤痢連末茶下白痢薑末烏梅湯下如痢已服前藥未効宜麻仁散腹痛加乳香煎服次宜豆粟散如痢古云滯下因積滯成之葢食積欲出而為腹痛裏急氣滯而不與之出故為後重色有赤白大抵赤則熱白則冷又云夏傷于暑秋不瘧則痢治法宜去積通其氣觧其暑去積感應丸嚴氏黒丸子通氣蘇合香丸寛中散香連丸觧暑五苓散香薷散凡治痢藥宜酸苦不宜甘醎先當知此葢痢瘧無正方故再述此衛生者幸詳擇焉治赤白痢出本草取地楊梅莖子煎服治赤白乆痢出本草以芸薹菜煑服之治赤白痢出本草以薤白一握切煑作粥服之治赤白痢極騐方出本草以桃竹蓐洗和薑搗碎煎服治服丹石勞熱赤白痢多時不瘥者出本草煑猯肉經宿露中明日空腹醬之食一頓即瘥治赤白下痢出本草用山豆根搗末蜜丸空心煎水下二十丸三服自止治四肢風痺赤白下痢出本草取鵜鶘嘴燒為黒末服一方寸七治赤白痢下多崔元亮海上方用馬齒莧搗絞汁三大合和鷄子白一枚先温冷熱及下莧汁微温取頓服之不過再作則愈不問老稚孕婦悉可服治赤白痢出本草用苦茶根煑飲服之治赤白痢以石榴皮炙令黄杵末􅀥肉為丸空腹服凢痢不應先白後赤後白為腸蠱牛􅂰三兩搗碎以酒一升漬經一宿每服一兩盃日三服治赤白痢下骨立者出本草用地榆一觔水三升煑取一升半去滓再煎如稠􅄳絞濾空腹服三合日再服治赤白痢出本草以艾醋煎作煎服之治赤白痢下水榖宿食不消者為寒可療以酸石榴皮燒赤末服方寸匕治赤白痢出本草以蜂房水煑飲之治赤白痢下部疼痛出本草以烏梅二十枚打碎水二升煑取一升頓服治赤白痢出本草以槐花炒服治赤白痢出本草取茄子根莖煑服之治洩痢冷熱赤白腹内熱毒絞結痛下血出本草治赤白痢出本草以狼牙煎服治赤白痢出本草熬豉令小焦杵服一合日三無比又豉􅆈令焦水一升淋取汁令服冷則酒淋日三有騐治赤白痢出本草以榼藤剉水煎服出南海諸州根如烏藥治赤白痢出本草以蛇含炙食亦燒末服一二錢七治赤白痢出本草以李樹根濃煎服之治赤白痢出本草以松楊木皮煑汁服之治赤白痢下令人下部疼重故名重下出膿血如鷄子白日夜數十行繞臍痛出本草用黄連一升酒五升煑取一升半分再服臍下當小絞痛即瘥再服治赤白痢出本草用訶梨勒三枚須擇上好者兩枚炮取皮一枚生取皮同末之以服漿水一兩合服之淡水亦得若只水痢加一錢匕甘草末若微有膿血加二錢若血多加三錢七昔劉禹錫傳信方云予曽苦赤白下諸藥服遍久不瘥者轉為白膿令狐將軍傳此方服甚効治赤白痢無問逺近不服㽲痛不可忍出入無常下重疼悶每發面青手足俱變者出本草用黄連一兩去毛好膠手許大碎蠟如彈子大三味以水一大升先煎膠令散次冷下蠟又煎令散即下黄連末攪相和分為三服惟須熱喫冷則難喫神妙治暴赤白痢如鵝鴨肝者痛不可忍治赤白痢久不瘥復下膿血者右以甘草乾薑湯吞雲母膏二十粒如麻子大日一服不過三服即瘥普濟方卷二百十一
