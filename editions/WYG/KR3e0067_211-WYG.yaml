body:
  text: 普濟方卷二百十一明周王朱橚撰泄痢門冷熱痢附論夫冷熱痢者由脾胃虚弱宿有寒而為客熱所傷冷熱相成其痢乍黄乍白是也若熱摶于血血渗腸間則變為血痢也冷氣入腸内摶津液則津液變化随氣滯下變成白痢也其湯熨鍼石别有正方補養宣導今附于後養生方導引法云泄下有寒者㣲嘘作引氣以息内腹徐吹息以鼻引氣氣足腹間即愈其有熱者㣲呼以去之也黄連散出聖惠方專治冷熱痢心腹㽲痛不止黄連一兩龍骨二兩木香五錢當歸一兩剉赤芍藥一兩訶棃勒一兩五錢赤石脂五錢炙乾薑一兩炮甘草五錢炙右搗細羅為散每服不計時候以粥飲調下二錢阿膠丸出聖惠方専治冷熱不調痢下膿血不止腹痛不可忍阿膠一兩搗碎乾薑一兩炮木香一兩龍骨二兩赤石脂二兩黄連一兩去皮當歸一兩黄芩一兩厚朴一両半去粗皮右搗羅為末煉蜜和丸如梧桐子大每服不計時候以粥飲下三十丸木香散出聖惠方專治冷熱痢虚損腹痛不能飲者日漸進之木香半兩甘草半兩炙乾薑半兩炮白术三分黄芩半兩白菓三分當歸三分黄連三分乾熟地黄三分右為散每服三錢以水一盞煎至五分去滓不計時候温服二黄丸治無問冷熱新舊痢黄連黄蘗乾薑甘草艾三月三日者熟各八分附子三枚蠟一鷄子大烏梅肉熬八分右搗篩為末以蜜和蠟扵鐺中熬再入黄蜜湏候蠟鎔盡如乾益蜜丸空腹以飲服四十丸日二漸加至五六十丸忌海藻菘菜猪肉冷水歸連丸治痢無問冷熱及五色痢入口即定黄連四分黄蘗當歸黄芩各二兩阿膠二兩炙熟艾一兩右搗羅為散以醇醋二升煑膠烊下藥煑令可丸如大豆飲服七八分日二夜一服若産婦痢加蒲黄一兩蜜和為丸犀角散出聖惠方主治冷熱痢不止腹肚疼痛心神煩悶犀角屑一兩白术一兩黄連一兩去鬚當歸一兩剉地榆一兩剉木香半兩右搗麄羅為散每服三錢以水一盞煎至六分去滓不計時候服訶梨勒散出聖惠方主治冷熱痢煩悶不欲飲食訶梨勒煨用皮當歸剉微炒黄連各一兩甘草半兩炙木香半兩乾薑半兩炮右為散每服四錢以水一盞煎至六分去滓不計時候温服附子散出聖惠方主治冷熱痢腹痛不能飲食附子炮裂去皮黄連去鬚㣲炒龍骨地榆各一兩剉當歸三分剉木香半兩右細羅為散每服不計時候以粥飲調下二錢黄連丸出聖惠方専治冷熱痢心神煩悶腹中㽲痛黄連去鬚黄蘗剉㣲炒艾葉㣲炒赤芍藥各二兩當歸二兩剉羚羊角屑一兩右搗羅為末煉蜜和搗三二萬杵丸如梧桐子大每服不計時候以粥飲下三十丸厚朴丸出聖惠方主治冷熱不調下痢不止厚朴一兩半去粗皮黄連一兩去鬚乾薑半兩炮甘草半兩炙龍骨半兩赤石脂半兩右搗羅為末煉蜜和搗百餘杵丸如梧桐子每服不計時候以粥飲下三十丸香䜴湯出聖惠方治療下焦冷熱不調暴下赤白痢香豉一升熬白术六兩薤白切一升蜀升麻二兩右以水七升煑取二升半為二服忌桃李雀肉等生犀散治無問生冷熱及膿血痢生犀角屑黄蘗黄連苦参各二兩右為散以糯米煑作飲莫令生每日空腹服一方寸日再服便瘥勿輕之肘後方有當歸産後有當膠連丸治痢無問冷熱赤白乆新疳温阿膠三兩一兩炙一兩入藥一兩銷清作膠胡黄連一兩乾薑二兩入黄無食子一枚乆痢腸滑甚者加至三四枚右為末以醋鎔膠清丸如梧桐子大飲服二十五丸日再漸加三十丸老小者以意斟酌禁加常法若冷痢以酒下熱痢以粥飲下内補丸一名黄連丸主治冷熱氣不和腹痛下痢不止及通血氣五百七十九黄連一兩去鬚炒當歸三分剉炒乾薑半兩炮阿膠三分搗碎炒右為末煉蜜和搗百餘杵丸如梧桐子大每服不計時候以粥飲下三十丸日再服一方以醋煑膠令消衆手撚圓又療産婦下痢不止者服之甚騐忌生冷粘膩出十便良方甘草湯一名三神湯治冷熱痢心神煩渇腹痛胷膈滯悶出十便良方甘草二寸炙烏梅肉五枚㣲炒訶棃勒五枚煨用皮右剉以水一大盞煎至六分去滓食前温二服當歸湯出聖惠方治冷熱氣不和腹痛下痢不止當歸一兩剉㣲炒黄連一兩去鬚炒右細羅為散每服不計時候以粥飲調下二錢加减當歸地榆散治冷熱不調氣毒􅁖毒温熱傷候毒痢休息宿痢腥穢乾嘔不食肌熱小便澁御米殻二兩蜜炒當歸一兩焙地榆黄連揀净芍藥甘草炒各半兩右㕮咀每服三錢水一盞半煎至七分去滓温服食前進二服氣毒痢加黄連當歸一倍治冷熱痢疾出本事方罌粟殻二十個白薑三錢甘草五錢艾葉半兩右㕮咀分作三服每服入蜜用水一盞煎至七分空心温服和中散治冷熱痢腹痛裏急附子炮七度水浸去皮為末黄連去鬚各一兩為末乳香研一分右如患冷熱痢取黄連附子各半錢乳香一字以陳米飲調下未止再服以青橘皮湯調下如患赤痢附子末半錢黄連末一錢乳香一錢如患白痢黄連末半錢附子末一錢乳香一字米飲調下未止加黒豆七粒煎湯止之治冷熱不調或水或膿或五色血者出千金方用酸石榴五枚合殻子搗絞取二升汁服五合差又一方糞前有血令人面黄色用皮搗為末加梔子湯下小兒以意服之治冷熱痢用甜菜搗絞汁服之堅腸丸出十便良方治一切痢疾不問赤白膿血並治方見本門楊子建萬金䕶命方通建一十四方今有人患痢其脉㣲小再再尋之又沉而濇此之一候若下白痢其勢雖重庶㡬可治若是下血切忌發熱通身發熱者死熱見七日死已上所陳雖未足以逹痢之淵源亦足以明其粗迹議者謂如子所言以明自甲子至于癸亥每六十年中未嘗有一年不生痢疾今世人所患痢疾于數年中間忽止有一年其故何也荅曰六十年中未嘗有一年無木土相攻未嘗無土火相􅉱未嘗無水火相犯但五運之政譬如權衡一年間五行氣數更相承制得其平等則其疾自然不作忽一氣太過一臟有餘痢疾之生應不旋踵予故偹陳粗畧以開後學之未悟庶㡬診療之間無差悞之過者矣但毒痢傷人不一惟水邪犯心為重世人初患痢時先發寒熱投藥治之其熱不退發熱甚大食則嘔逆下痢不止心熱如火只要入凉處只思吃冷水忽思狂走渾走肌肉疼痛着手不得此候十難治其三四也治疫毒痢方湏是仔細首尾讀此方論分明識病根原然後喫藥但毒痢初得時先發寒熱忽頭痛忽壮熱忽轉數行便下赤痢忽赤白相雜忽止下白痢忽先下白痢後變成赤痢忽先下赤痢後却成白痢並冝喫此方但初下痢時先發寒熱頭痛即是寒邪犯心水火相戰故初病時先發寒熱水火相犯血變于中所以多下赤痢如紫草水如莧菜水無色澤者寒邪犯心之重或先發寒熱而所下之痢止白色者寒邪犯心之未動也先下白痢而後有赤痢之變者寒邪犯心其勢漸加也先下赤痢而後變成白痢者寒邪犯心其勢漸减也赤白相等者水火相犯其氣相等寒温之氣相傳也忽有赤多而白少忽有赤少而白多此寒邪之勢有多少毒痢之病有輕重以白多為輕以赤多為重治之之法先奪其寒則其所下之藥一也以太嵗分之則丙子丙午甲子甲午庚午庚子丙寅丙申年甲寅甲申年庚寅庚申并辰戍之年運遇丙申及庚運所臨其害尤甚及丑未之年宜有此候又更無問太嵗盖天地變化其候多端難可窮盡今此方在世人亦不必撞定太嵗但看一年中春之下其内多有寒肅之化陽光少見忽寒熱二氣更相交争忽于夏月多寒温之化寒邪犯心所受之痢先發寒熱忽頭痛忽先轉數行後有赤痢忽赤白相雜忽上下痢並冝喫此通神散喫後取壮熱便退若兩三盞後壮熱不退更不喫此方自别有方論在下麻黄官桂各三分大芎白术各二兩獨活桔梗防風芍藥白芷各半兩牡丹皮甘草各一分細辛八錢牽牛四錢藁本五錢右為細末每服二錢非時熱湯調下和滓熱喫若服兩三盞後寒熱不退更不請喫自别有方論在下若喫此藥後寒熱已退赤痢已消减便修合第二方藥喫取安效若寒熱已退赤痢未消减便服兩三盞然不可多喫一日只兩盞後赤痢消减忽變成白痢漸次修合第二方喫候出候度數减少便修合第三方喫取安平但六丙之年六庚之嵗春夏之内時氣多寒人得痢疾此藥通神若是六甲之年丑未之嵗温化便多人得痢疾先發寒熱即于方内添草豆䓻一兩同修合也又不問太嵗但一年春夏之内多寒人有痢疾先發寒熱並冝喫此方治毒痢初得時先發寒熱喫前方寒熱已退赤痢已消减冝進退真散若喫前方藥寒熱未退赤痢未消减更不進此藥但天地變化其候非常痢疾証候多端此不得不進須仔細訶子五觔用麺裹炮熱不要生亦不要焦去麺不用就熟吃破訶子破去核不用只使皮焙乾右細杵羅為末每服二錢七以米湯一盞半同藥煉取一盞空心和滓喫若吐出一兩口涎更加如此喫經數盞大腑漸安出後减少便修合第三方藥喫以牢固大腸若喫前方藥壮熱未退血痢者未减不消進此藥治疫毒痢喫前面兩方藥病勢已减所下之痢止餘些小忽下清糞如鴨糞忽如茶湯如濁油忽只餘些小淺紅色宜喫此方以牢固大腸還復其氣舶上黄丸舶上黄去沙石用二兩細研如飛塵右以薏苡仁二兩炒熟杵為末與舶上黄末相和令勻滴熱水相和丸如梧桐子大空心米湯下五十丸凡毒痢初得痢時先發寒熱喫前面毒痢方通神散三兩盞經一日忽隔一夜寒熱不退赤痢不減分數通身發熱所下之痢多是膿涕忽如桃花急如紅米膠每一次忽下一盞半盞已未吃後藥二盞至三盞經一日忽一夜寒熱不退赤痢不減分數便不進後藥若依法進藥兩盞後壯熱便退赤痢少減分數即請漸漸進後藥每日只兩盞候赤痢消減忽變成白痢却修合上面還真散吃取平安且痢有寒熱其証一也前方以暖藥解之此方以涼藥投之其說何也答曰水邪犯心身能發熱土濕鬱火身亦發熱肝熱刑脾身亦發熱惟至精者識其秋毫之變竊恐世人未能通其妙㫖于此設此兩方以救其失然毒痢之傷人惟水邪犯心最為極重但患痢疾之人有憎寒壯熱先喫上面通神散三兩服寒熱不退下痢不止然後進後藥以太嵗分之惟六壬六戌寅申己亥之年宜用後藥而六戌之年尚有差池盖火盛之年必有寒濕相犯故也然以六氣推遷不定又不可局定年辰但一年之間春夏之内熱氣偏多濕化不舉人有痢疾肝脉弦心脉洪喫後藥若喫兩盞後不見效驗不進服盖痢之初起切記水之犯心不可妄投涼藥故此方兩盞無驗更不可進服荆芥穂牡丹皮去心牽牛炒木香芍藥桔梗白頭翁防風獨活地榆各一分黄連蜜浸右為細末每服二錢水一盞煎一兩沸急瀉出食後温和喫此藥後少見效驗更可進服以安為期然不可多喫一日只兩盞痢纔住便止藥治毒痢初得病時先發熱所下之痢皆是白涕並宜喫上面通神散若人患痢經一兩日寒熱自退却只下白痢未效冝服此方黄橘皮防風各一分甘草四銖細辛三銖白术二分草豆䓻一個大芎半兩藁夲一兩右為細末每服二錢水一盞煎取八分空心去滓喫治毒痢初得病時㣲有些小寒熱忽止腹痛出後時糞後有些小膠涎與赤痢相雜却因悞喫凉藥漸漸下痢極多從早至暮但只思睡早朝即顔色枯瘁身體稍凉近晚至夜即面赤顔色先潤下痢極多皆是清涎與赤痢相雜通身發熱不思飲食渾身肌肉着手則痛㨿此候冝當喫此藥但身體大發熱如火與人相近則熱氣逼人其脉浮散輕手取之散鋪指下不分部位全無骨力指下如風如氣重手取之指下全無急用訶子五個炮製如下面法杵羅為末一服先用米湯調和滓熱喫候吐出涎脉氣生方可進下面方白术半兩白芷芍藥大芎各一分甘草四銖炙訶子五個右細杵羅為末每服三錢煎陳米湯調下和滓喫治毒痢初得病時並無寒熱所下之痢全是膿血忽黯血左右三部脉氣皆㣲細宜喫此方桑寄生二兩防風芎各分一甘草三銖炙右杵為細末每服二錢水一盞煎取八分空腹和滓喫治赤白痢初得時並無寒熱患赤白痢經乆未效别無憎寒壮熱冝喫此方鹽梅七個黄連四十九枝右件藥用新垍瓶一箇安藥在内以新瓦片盖瓶口火煆通赤後煙絶取出就熱研如飛塵每服二錢鹽調米湯下和滓服應是赤白痢無問赤多白少白多赤少但身體無憎寒壮熱者皆可喫此方治赤痢忽赤白相雜初得病時並無憎寒壮熱經及數日身體不熱只聞小腹内躁熱下血不止忽止血便喫暖藥不見效騐冝服此方寅申己亥年六壬之年冝有此候但喫兩盞後不見效騐更不請喫此藥但唇皮赤忽黯色小便黄白日身體凉夜間則發熱如此即肝熱刑脾之証也荆芥穗牡丹皮白頭翁地榆芍藥防風黄連桔梗各一分牽牛炒木香各三銖右細杵羅為末每服二錢水二盞煎兩沸食後和滓温和喫湏是一年之間春夏之内風熱大甚分明識其痢疾定是熱後方可進此藥治下赤痢身體並無憎寒壮熱此名肝心雙澼冝喫此方黄連一兩蜜浸木香三銖右細杵羅為末濃煎陳米湯調二錢七食後和滓喫治赤痢不止脉反為小沉而又澁其身熱者死熱見七日死此候極危困但喫上面通神散兩盞發熱便退亦庶㡬可治便修合上面還真散舶上黄丸喫取安效若喫通神散後發熱不退即治之難也治患赤痢赤白痢白痢忽因先得寒瘧後便成痢忽因患痢後却變成瘧但患痢時無問赤白若有憎寒壮熱並冝喫上面通神散喫了壮熱已退便修合還真散舶上黄丸喫取安效縁此證候水邪犯心治之不可輕易也治脾胃虚冷停水滯氣凝而成涕所下之痢渾是白涕宜喫此方初得痢時並無壮熱頭痛方可喫此藥舶上黄一兩細研如塵右以白麺一分鐺内炒令熟于冷乳鉢内與舶上黄末同研令匀滴冷熟湯丸如梧桐子大每服五十丸以止為度空心米湯下若是初得痢時先壮熱頭痛即不可喫此藥治脾氣傷冷相刑于腎水土相攻寒温相争寒温所下之痢全是清涎有如鷄卵清之類宜喫此方将舶上黄丸相間服石斛吳茱茰芎續斷草豆䓻白术芙蓉防風牡蠣火煆通赤放冷用乾薑各一分訶梨勒逐個麺褁火炮右細杵羅為末煉蜜丸如梧桐子大每早朝空心米湯下五十丸但空即服有壮熱不請喫冷痢附論夫下痢其色或青或白或黒者皆冷痢也此因腸胃虚弱寒氣乗之故令人大便痢下黒青若其痢色白食不消者寒中也當診其脉沉則生浮則死其人素有積寒即成乆痢冷有膿也方建脾丸療脾滑胃虚弱洩下不禁飲食不消雷鳴絞痛附子一兩炮蜀椒汗一兩桂心二兩黄連人参乾薑赤石脂大麥蘗陳麴茯苓石斛各二兩當歸二兩鍾乳三兩研右搗羅為末蜜和丸如梧桐子大以酒服十丸日三稍稍加之忌猪肉生葱醋冷水豆附丸出醫方大成治臟腑乆虚下寒泄㵼不止腸滑不禁日夜無度全不進食一切虚寒泄㵼用之肉豆䓻附子良薑訶子乾薑赤石脂陽起石龍骨桂心白茯苓細辛洗各一兩白礬枯各二兩右為細末酒煑麺糊丸如梧桐子大每服七十丸空心米湯飲送下地榆丸治冷痢不消化食已腹中脹痛氣滿地榆六兩赤石脂龍骨各一兩三分厚朴烏梅肉乾薑各一兩半白术當歸艾葉各一兩一分甘草炙一兩右為末煉蜜和丸如梧桐子大每服三十丸米飲下空心日二服人参豆䓻散出直指方治冷證泄㵼痢通用木香厚朴蒼术乾薑炮各二兩半夏􅎘陳皮阿膠罌粟殻各四兩縮砂甘草各二兩半肉豆䓻生二兩右剉每服三錢薑枣煎食前服十寳湯治冷痢如魚腦者三服見效甚疾黄耆四兩白茯苓人参當歸白术白芍藥半夏五味子熟乾地黄桂各一兩甘草半兩右為麄末每服二錢水一盞薑三片烏梅一個煎至七分食前温服萆撥散出聖惠方治冷痢腹痛不食四肢羸弱蓽撥三分乾薑三分炮甘草半兩陳橘皮一兩肉豆䓻一兩去殻厚朴一兩附子一兩當歸半兩赤石脂半兩吳茱茰半兩阿膠三分煨右搗細羅為散每服不計時候以粥飲調下二錢増損黄連丸主腹内冷食不消及冷痢兼補黄連黄耆龍骨各三分當歸甘草炙各五分乾薑厚朴炙各六分地榆白术人参各一分右搗篩為末蜜丸如梧桐子大飲酒任下服十五丸日再服加至二十丸忌猪肉冷水桃李雀肉生葱海藻菘菜大桃花湯一名附子湯治冷白滯痢腹痛方見夲門茱茰人参丸治冷痢乆不瘥臍腹㽲痛下白膿食物不能消化食茱茰人参芎藭桔梗枳實各一兩甘草炙剉一兩乾薑陳麹炒各四兩附子二兩炮右為末煉蜜和丸如梧桐子每服三十丸米飲下空心服馬藺子丸治積冷痢下白膿馬藺子一升附子二兩乾薑甘草各二兩半神麯麥蘗阿膠各五兩蜀椒五合黄連三兩右為末蜜丸如梧桐子大服二十丸二次知為度或作散酒調服方寸亦佳木香散治冷痢心腹疼痛不欲飲食漸加羸弱木香半兩附子三分阿膠半兩白术三分赤石脂三分桂心三分乾薑炮厚朴一兩草豆䓻一両右搗羅為散每服不計時候以粥飲調下二錢附子丸治冷痢不瘥四肢不和腹痛不欲飲食附子一兩炮乾薑三分炮當歸三分剉莨菪子一兩艾葉三分青橘皮三分白术三分吳茱茰半兩厚朴二兩右搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以粥飲下三十丸縮砂丸治冷痢不瘥漸加羸弱喫食减少縮砂三分當歸半兩乾薑青橘皮各三分吳茱茰半兩肉豆䓻半兩附子一兩炮厚朴一兩半右搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以粥飲下三十丸黄連散治冷膿痢腹痛不止黄連厚朴各一兩乾薑甘草木香阿膠陳麴各三分訶棃勒各一