body:
  text: 普濟方卷五十二明周王朱橚撰面門面瘡論夫面上生瘡者由内熱外虗為風濕所乗則生瘡也所以然者肺主氣散於皮毛脾主肌肉氣虗則膚腠開為風濕所乗内熱則肺氣温氣温則肌肉生熱也濕熱相搏之故令面生瘡也升麻加黄連湯治面熱升麻加附子湯治面寒有何依據答曰出自雲岐子註仲景傷寒論中辨葛根湯云尺寸脉俱長者陽明經受病也當三二日發以其脉夾鼻絡於目故身熱目疼鼻乾不得卧陽明經也始於鼻交額中從頭下至足行身之前為表之裏其陽明經據熱本實陽明之名標陽則熱本謂胃胃者水穀之海故本實其從標而浮而長從本則沉而實陽明為病主身熱蒸而不惡寒身熱而標陽明本實者胃中燥鼻目疼頭痛鼻絡於目為肌肉之本几几而熱陽明一禁發汗不止在腑者不禁下發之變黄證太陽主表榮衛是也榮衛之下肌肉屬陽明并陽病葛根湯主之衛者桂榮者用麻黄榮衛之中麻黄桂各半衛之下肌肉之分者葛根湯又名觧肌湯故陽明者肌肉之本也非專於發汗止汗之治桂枝麻黄兩方互相併為一方加葛根者便作葛根湯故榮衛肌肉之次也桂枝芍藥生薑甘草大􅀥止汗有麻黄桂枝甘草生薑發汗葛根味薄獨加一兩發汗止汗從葛根以觧肌故名葛根湯錢中仲製升麻湯方治傷寒温疫風熱壯熱頭疼肢體痛瘡疹已發未發葛根為君升麻為佐甘草芍藥安中氣朱奉議作活人書将升麻湯列作陽明經觧藥予診楊氏婦陽明經標本俱實先攻其裏後㵼經絡中風熱升麻加黄連湯以寒治熱也尼長老陽明經標本俱寒先實其裏次行經絡升麻湯加附子以熱治寒也仲景乃羣方之祖信哉治面熱楊郎中之内五十一嵗身體肥盛己酉春患頭目昏悶面赤熱多服上清藥不效請予治之診其脉洪大又且有力内經云面熱者手陽明病經云陽明經氣盛有餘則身已前皆熱况其人素膏粱積熱於胃陽明經多血多氣本實則風熱上行諸陽皆㑹於頭目故面熱之病生矣先以調胃承氣湯七錢加黄連二錢犀角一錢踈下三兩行徹其本熱次以升麻加黄連湯去經絡中風熱上行如此則標本之邪俱逺矣升麻加黄連湯升麻葛根各一錢甘草五分白芷七分川芎三分黄連四分白芍藥五分生犀末三分荆芥穂三分黄苓四分薄荷葉二分右剉如麻豆大用新水半盞先浸川芎荆芥薄荷外都作一服水二盞半盞煎至一盞半入先浸三味同煎至一盞去滓食後温服數服而愈忌酒濕麫及五辛之物治面寒真定維摩院尼長老六十一歲身體瘦弱己酉十月間病頭面不耐寒氣弱不敢當風行諸治皆未效予診其脉弦細而㣲且其人年髙長素食茶果而已陽明之經本虗脉經云氣不足則身已前皆寒慄又加看誦慣風由此胃氣虗經絡之氣亦虗不能上榮頭面大惡風寒先以附子理中丸數服温其中氣次以升麻加附子湯行經絡升麻加附子湯升麻葛根白芷黄耆黒附子甘草人參益智仁草豆蔲右剉如麻子大作一服水三盞連鬚葱白同煎至一盞去滓温服食前數服良愈洗風散洗療一切風毒頭面生瘡防風荆芥穗吳白芷白茯苓蔓荆子威靈仙何首烏川芎各三兩苦參白牽牛各半斤右為粗末每藥末三兩好漿水三升煎五七沸去滓洗面每日早晩二次用治面瘡方出危氏方用貝母為末小葦筒灌其口即成痂而愈硫黄膏治面部生瘡或鼻腍赤風赤百藥不效者惟此藥可治妙不可言每臨卧時洗面令浄以少許如面油用之近眼處勿塗數日間瘡腫處自平赤亦消風刺粉刺一夕見效生硫黄白芷𤓰婁根膩粉全蝎芫青蟬退右為末麻黄蠟約度如合面油多少熬鎔取下離火入諸藥在内如法塗之一方加雄黄蛇床子少許松脂膏治面上風瘡黄水流出或痒或痛松脂石塩杏仁各一兩蜜三合蠟一兩薰陸香二兩萞麻子仁一兩右先研松脂石塩薰陸香等次入杏仁萞麻研令勻用蜜蠟煎成膏攤於帛上貼之日兩度換之治髭瘡方用耳中垢塞傅之止愈又方用白殭蠶直者一枚以葱白擂汁同殭蠶細研塗之瘡上即愈治面上瘡癬方白芨白歛白芷白茅香零陵香各等分右為末赤豆末拌共搗常用其瘡癬當自去也治面惡瘡及疳瘡流出黄水沾肉為瘡方胡粉黄連粳米赤小豆水銀右搗羅為末入胡粉水銀研令勻以清油旋調日二三度大妙治面上生風瘡方硫黄蝸牛殻胡粉膩粉各一兩麝香半兩右都細研令勻面脂調塗之治面上風毒惡瘡方胡粉松脂水銀各二兩右先以松脂合猪脂煎令消内水銀胡粉攪令勻候冷塗之治面上赤瘡􅄆漫或如疿子或如風皶滿面赤疼方黄連黄芩黄蘖各一兩膩粉一分右搗羅為末入膩粉同研令勻用油蠟面脂調如膏夜卧時先以漿水煖洗面了傅之明旦還以漿水洗面不過三兩上即瘥治面上風毒方白蓮􅄆治去黒子諸般瘤瘢花鹻桑柴灰風化石灰各二錢糯米三錢右取用磁石礶内瓦盖口用黄泥裹定文武火燒一時辰許取出放冷将藥研細用針尖撥乾貼清肺􅄆治肺經客熱鼻面風瘡蔓荆子桑白皮各一兩甘草半兩荆麥穂一兩半右為細末用臈茶調下一大錢日再亦治面皶鼻至竒治面上風毒惡瘡方硫黄半兩杏仁胡粉各錢右都爛研令勻以臘月猪脂調勻日三二次塗之栢連􅄆治面有熱毒惡瘡胡粉黄蘖黄連各等分右為末取傅上瘥止若瘡乾以面脂調塗之日三一方猪脂亦可調塗治頭面生瘡燥痒黄水出方蜜陀僧硫黄各二錢右為末酥油調𫝊苦参圓肺毒邪熱頭面生瘡生疥癬用苦參為細末粟米飯和丸如梧桐子每服五十丸米湯下治面上肺風瘡方何首烏防風薄荷烏蛇各二錢半苦參荆芥穂川芎香附子各半錢右為細末每服三錢食後茶酒送下後用洗瘡法易容膏治面上瘡及㸃麻油乳香松節松脂黄蠟白芨川升麻各一兩白歛半兩右搗升麻白歛細羅為末先以油煎松節并白芨令黄赤色濾去滓後入松脂黄蠟又煎令消即入乳香升麻等末熬成膏傾於瓷器内收凡面上䵟􅍍風刺諸般惡瘡傅之極妙治面上肺風瘡方用無灰酒於沙盌鉢内濃磨鹿角尖傅之兼服和濟局方治腎藏風黄耆丸即愈治面上瘡及䵟易容方用烏蛇二兩燒灰為末以臘月猪脂調傅之治面上五色瘡方用鹽湯綿浸榻瘡上日五六度易瘥治面上瘡黄水出并眼瘡方以一百五日收取桃木不拘多少細末之食後以水半盞調服方寸日二甚良治療痱瘤子用之仍得光潤皮急以土𤓰根搗篩漿水和勻入夜漿水洗面傅藥旦復洗之百日光華射人夫妻不相識小兒四嵗發黄生搗絞汁三合與飲不過三飲已瘥療瘡方最去面上風刺瘡黄連糯米赤小豆呉茱茰右搗黄連等下篩先於掌中研水銀使極細和藥使相入以生麻油縂稀稠得所洗瘡拭乾傅之但是瘡即療神效不傳治面上瘡用􅌯子底黒煤於小油中以匙打成膏子攤在紙上瘡上貼之柳絮􅄆治面露瘡作濃窠如香瓣柳絮搗末膩粉右等分研勻燈盞中油調塗之一方用澡豆洗面藥川芎細辛藁本藿香白附子冬𤓰子沉香殭蠶甘松杜零陵皂角末阿膠楮桃絲𤓰白蘝腦子糯米白术生栗子呉白芷白茯苓白芨土𤓰根廣零陵右為細末洗面藥方零陵香檀香丁香茅香藿香白术白芨白歛川芎沙參防風藁本三柰子天花粉木賊楮桃兒黒牽牛白殭蠶白芷甘松菉豆肥皂角右為細末每日洗面用之面上逰風諸般熱毒風刺光澤精神爽澡豆洗面去皯䵴風痒令光色澤方白术白芷白芨白歛茯苓藁本萎蕤薯蕷土𤓰根天門冬百部根辛夷仁括蔞藿香零陵香鷄舌香香附子阿膠白麫楝子澡豆皂莢右搗篩以洗面令人光澤若婦人每夜以水和觧将塗面至明温水洗之甚去面上諸瘢澡豆方治面上黒不浄洗手面白豆屑白附子甘松香丁香子白芷白殭蠶鷹屎白白檀香白术木香芎藭白鮮皮大􅀥杏仁射香白梅肉麵三升冬𤓰仁猪􅏬鷄子白土𤓰根一兩右先以猪􅏬和麵曝乾然後合諸藥搗末又以白豆屑二升為􅄆毎旦用盥洗十月色如白雪三十月如凝脂千金方有桂心三兩無白殭蠶芎藭白附子大􅀥洗面藥山川芎藁本白蘞𤓰蔞仁阿膠白茯苓石膏甘草香白芷零陵香防風白芨滑石三柰子細辛薑楮實子菉豆糯米皂角右為末毎用三錢洗面香藥澡豆方治面䵟黒黯手皮乾皺令潔白光潤白歛白芷葳􅅋白芨細辛當歸鹿角膠土𤓰根白茯苓商陸鸕鷀屎蜜陀僧𤓰蔞仁桑根白皮橘子芎藭白附子冬𤓰仁桃仁硼砂右細搗為􅄆先将鹿角膠并硼砂以水三升煮令膠消用和白麵五升薄作餅子曝乾搗羅為末更入菉豆麫二升藥相和令勻常用洗手面色白如練澡豆方治洗手面令白浄恱澤白豆麫一升麵三升冬𤓰仁猪􅏬白茯苓白鮮皮白芷括樓子白术白附子白歛莵絲子土𤓰根𦍑活萎蕤桃仁杏仁商陸芎藭各一兩右合搗篩入面猪服拌匀更毎日常用以漿水洗良又方猪􅏬豆末細辛土𤓰根白术藁本防風白芷茯苓商陸根白附子桃仁杏仁各四兩括樓皂莢冬𤓰子雀屎莵絲子右搗末以麵一斗用漿水和猪􅏬研令爛和諸藥及麵作餅曝乾搗絹篩收貯勿令遇風洗手面極妙洗面藥藿香𤓰蔞仁白芷藁本檀香楮桃兒白茯苓防風各二兩丁香川芎黒牽牛零陵香甘松茅香各二兩半麝香赤小豆沉香糯米一升右為細末又方海上方白茯苓藿香零陵香香白芷白附子白术白堿白殭蚕甘松各半兩杏仁藁本黄明膠二兩雀糞皂角赤縳兒糯米菉豆一升益母草灰六七月開花盛時採右為細末拌勻洗面澡豆方治面黒不浄丁香沉香木𤓰花鍾乳粉各三兩桃花青木香櫻桃花白蜀葵花麝香半兩柰花白蓮花紅蓮花各四兩李花梨花旋復花各六兩玉屑珍珠各二兩蜀紅花一兩右搗末鍾乳等並研以絹下之合和大豆末七合研之千遍宻貯勿泄常以洗手面百日如玉光潤去臭氣粉滓咽㗋臂膊用洗妙又方白鮮皮白殭蠶芎藭白芷白附子鷹屎白白术甘松甜𤓰子仁細辛杏仁白檀香藁本各二兩冬𤓰子仁白梅肉鷄子白猪􅏬右搗為􅄆入後三味同搗勻毎洗面日常用之澡豆瓜仁洗面光潤方白鮮皮鷹屎白白芷青木香甘松香白术桂心麝香白檀香丁子香各三兩冬𤓰子白梅雞子白猪􅏬麫五升土𤓰根一兩杏仁二兩右以猪􅏬和麵曝乾然後諸藥搗􅄆和白豆末三升以洗手面十日如雪三十日凝脂無比洗面藥黄明膠甘松白歛藁本川芎細辛白芨殭蠶川零陵白术各一兩半桃花大皂角沉香糯米一升右為細末澡豆洗手面藥豆屑方白茯苓土𤓰根商陸根萎􅅋白术芎藭白芷括蔞藁本桃仁各六兩皂角豆屑猪脂猪蹄麵一斗右取猪蹄汁拌諸藥等曝乾搗􅄆以作澡豆洗手面妙玉盤􅄆治洗面糯米二升皂角二斤乾楮實一斤黄明膠一斤白芨白歛白芷白术藁本芎藭細辛甘松零陵香白檀香各一兩右為粗末澡豆以皂角末别入看𦂳慢添減洗面濕為度或加白丁香杏仁鷄子清調塗過夜者專去風刺澡豆恱面急面皮去䵟􅍍粉刺方蔓荆子白芷芎藭皂角末萎􅅋白术各五兩冬𤓰仁梔子仁括蔞仁蓽豆三升猪腦桃仁鷹屎商陸三兩右藥為末其冬𤓰仁梔子仁括蔞仁别搗如泥猪腦鷹屎合搗令相得然後下諸藥更搗令調以冬𤓰瓤汁和為丸毎洗面用漿水以此丸當澡豆用早夕用之亦不避風日即瘥澡豆方治面黒不浄白芷白歛白芨白附子白茯苓白术各二兩桃仁沉香麝香杏仁大豆麵糯米皂角右先将好漿水三大盞消膠為清取糯米浄淘和膠清煮作粥薄攤晒之令乾和藥一時搗細羅為􅄆取豆麵重和之令勻又用酒半盞白蜜二兩火上鎔之令蜜消即一時傾入澡豆拌之令勻曬乾常用洗手面佳檀香􅄆治洗手𤓰蔞根零陵香藿香甘松藁本各二兩呉白芷大皂角茅香白檀香糯米楮桃兒三兩右為細末沙羅子羅如常洗手使用澡豆治手乾燥少潤膩方大豆黄赤小豆苜蓿零陵香冬𤓰仁茅香各六兩丁香麝香猪􅏬右細搗羅與猪􅏬合和曝乾再搗篩取洗手面常用之良澡豆方猪􅏬白茯苓藁本白芷各四兩甘松零陵香白商陸大豆末藋灰一升右搗篩調和訖稍取前猪􅏬九味瓷器中汁和以洗手面只用煖酢漿洗浄後任意水洗如常八九月冷處貯之三月後勿用亦治手乾燥少潤膩一方無白芷蓽豆香澡豆方蓽豆一升白附子芎藭芍藥白术括蔞商陸桃仁冬𤓰仁各二兩右搗末以洗面後𫝊藥粉搽之亦如常法此方甚妙肘後方無白术香藥澡豆方治面䵟黒黯手皮乾皺令潔白光澤頭麵五升白歛甜蔞瓤白附子白芷芎藭白芨零陵香白檀香各一兩右細搗為􅄆更入菉豆麵二升相和令勻毎日洗手面常用之甚良澡豆良方白芷白歛白术桃仁冬𤓰仁杏仁萎蕤各等分皂筴右為末絹篩洗手面時即用之極妙又方蓽豆麵白芷青木香甘松香零陵香藿香二兩冬葵子括蔞仁四兩右搗篩用如常法猪蹄湯治洗手面令光潤猪蹄桑白皮芎藭萎􅅋白芷白茯苓各三兩啇陸白术二兩右㕮咀以水三斗煎猪蹄及藥取一斗去滓每温一盞洗手面極良蘇澄藥澡豆方白芷芎藭括蔞子各五兩青木香鷄舌香各三兩皂筴蓽豆赤小豆各二升右搗末和􅄆任用洗手面去皯皰妙香藥澡豆方治手乾燥常少潤膩白芷甘松香零陵香􅀈蔞仁冬𤓰仁各四兩蓽豆大豆麵一升右搗為細􅄆每洗手面常用佳澡豆方治洗手面令白浄恱澤蓽豆麵一升括蔞實三兩猪􅏬五具土𤓰根白茯苓葳蕤肥皂莢三挺右搗篩将猪􅏬拌勻和更搗令勻毎旦取洗手面百日一方以好酒二斤都煎之令白芷色黄絞去滓更煎盛磁器中旋以塗手面玉肌還少􅄆白芷白歛白附子阿膠白殭蠶白蒺藜白膠香右為末不拘多少如痘㾗加乳香用一料加皂角末一斤澡豆方治面黒不浄白芷芎藭􅀈蔞仁各五兩鷄骨香皂莢十兩右搗為末入大豆赤小豆末各半升和勻日用洗面令人顔色恱澤服藥取白方白松乾地黄乾漆附子桂心右以搗末蜜丸服十丸日三諸蟲悉出便肥白令顔色光澤方白附子白芷蜜陀僧胡粉各一兩半右搗為末以羊乳汁和之夜卧塗面旦煖漿水洗不過五度純陽紅粧丸破故紙四兩胡桃肉四兩蓮肉一兩葫蘆巴四兩右為細末酒糊丸如梧桐子大每服三十丸空心酒下淖手藥臨睡使用括蔞一箇𤓰一箇杏仁三十个右各細剉用綿包於瓷盒内酒浸毎洗手訖塗淖手洗面藥杏仁滑石輕粉右等分研為細末飯上熟蒸入鷄子清勻調洗面畢傅之洗瘡法治面上黒䵟風瘡黒牽牛甘松香附子各四兩右為末作面藥逐日洗之服藥取白方乾薑桂心甘草各等分右搗羅為末旦以生鷄子一枚内一升酒中攪温以服方寸匕十日知一月白光潤又方治去黒羊膽猪胰細辛各等分右煎三服塗面明旦温漿水洗之白面方治去䵟􅍍面皴牡礪三兩土𤓰根一兩右為末白蜜和取塗面即白如玉旦以温漿水洗之宜避風日甚良洗班洗皯方紫背浮萍四兩防已半兩右濃煎洗浴就以湯浮萍於患處斑上熱擦如無真防已只以浮萍一味亦妙如此熟洗三五次其斑即除藥雖㣲末其功甚大不可小看猪蹄漿治急面皮去皴主光澤潔白去䵟􅍍以大猪蹄一具浄治如食法以水三升清漿水一升不汚盆中煮成膏用洗手面又以此藥和澡豆夜塗面旦用漿水洗面皮即急冬𤓰洗面藥治顔面不潔蒼黒無色用冬𤓰一箇以竹刀去青皮切作片酒一升半水一升同煮爛用竹篩擦去滓再以布濾過熬成膏入蜜一升再熬稀稠得所以新綿再濾過於甆器中盛用取粟子大用津液調塗面上用手擦如熬藥時用柴二秤炭一秤布一丈煉草留顔方用五月五日收取益母草俗呼謂之欝嗅草曝乾燒灰取草時勿令根上有土即無效燒之先以水洒地一處或泥一爐燒良乆爐冷以灰細篩過用水熟攪和之攪令極熟團如鷄子大日中晒令極乾取黄土泥作小爐於地四邉各開一竅生剛炭上下燄以藥丸於炭中央一經一炘又則㣲㣲燒之令火氣欲絶不効經一復時藥熟不可以猛火逼之若藥鎔變為磁色黄時用之無驗火㣲則藥色白膩一復時出之於白瓷器中以玉杵細研絹篩又碾三日不絶深藏於乾浄磁礶中收貯日逐取以洗手面晶瑩如玉老者還童神妙不可具述如無玉槌以鹿角槌亦可洗面藥其效延年去風令面光潤用桃仁五合去皮用糯米飯漿研細以漿水杵取汁令桃仁盡即休㣲温用洗面極妙又方用粟上薄皮研和蜜塗面展皺治男子婦人白桃花顔色三月三日取桃花為末七月七日取烏骨鷄血和塗面及身三二日後脱白如素白妙又方半年紅方以鷄子一枚於尖頂上開一竅傾出黄留白用金花胭脂及硼砂少許紗封與鷄抱候别卵内鷄出為度乾以敷臉洗不落半年紅療人一月即得肥白方以大豆黄炒㫪如作醤滓取純黄一大升搗篩煉脂和丸熟丸酒服二十丸再漸加至三四十丸服盡五升不出一月即大能食肥白試用之延年洗面藥萎蕤啇陸根括蔞杜若滑石各八兩土𤓰根芎藭辛夷仁甘松各一兩𤓰蔞五枚白茯苓白芷各一分木蘭皮零陵香麝香二兩蓽豆二升冬𤓰仁二升猪蹄三具右搗羅為􅄆和蓽豆以水桃仁冬𤓰仁黄𤓰蔞子令碎以猪蹄汁中煖令􅄆和藥作餅子曝乾搗篩更和猪蹄汁又捻作餅更曝乾汁盡乃止搗篩為􅄆稍稍以洗手面妙治洗面退油去藥子斑粉刺方牽牛白芨甘松山柰子海金沙右治雀斑加白丁香用鷄子清調擦晩塗面上常用膏右常用膏鷄子一枚丹砂二兩末之入子中白鷄腹下伏之月餘取用令面皮急而光滑丹砂發紅色不過五度傅面白如玉光潤照人甚佳澡豆方用蜜陀僧以乳和勻塗面自然光瑩七白􅄆洗面藥白蘞白术白牽牛白茯苓白芷白芍藥白殭蠶面裏皮痛何首烏末薑汁調膏傅之帛蓋以火炙鞋底熱熨之硫黃蝸牛殻木香各半兩朱粉杏仁各半兩研膏蝸殻木香為末硫黄朱粉國丹也杏仁入臘月猪脂調成膏夜卧時用漿水洗面令乾以藥塗患處平明洗去濕癬以米泔水洗上藥澤面鍾乳丸治面上萬病男子年五十服之顔如十五兒女年四十服之顔如童女面色常如桃花永不皺先有􅍍悉皆平除神驗無比鍾乳粉一兩金屑珍珠珊瑚水精琥珀蜜陀僧白檀香千歲棗各半兩乳香一兩零陵香人參木香訶勒梨各一兩白附子桃仁胡粉黄鷹糞丁香光明沙牛黄各半兩辛夷杏仁右搗羅為末入石藥細研二七日訖以鍊蜜和丸如彈子大每夜取一九以温水化服經一月面如童子白附子丸治令人面潔白娟好白附子白芷杜若各三分赤石脂桃花各二兩杏仁甜𤓰子牛膝各一兩鷄糞白白石脂逺志葳蕤各三分右為末鍊蜜和搗五七百杵丸如梧桐子大每服食後以温牛乳一合入口下二十丸桃花丸治面黒䵟令潔白光恱桃花桂心烏喙甘草各二兩白附子甜𤓰子仁杏仁各一兩右搗為末鍊蜜和丸如梧桐子大每服以温酒下十丸日三服之良治人面似玉色光潤方羊脂一升狗脂一升白芷半升烏喙二兩甘草一兩半夏半兩右細搗并脂同入在鐺中煎候白芷色黄膏成以綿濾去滓瓷器中貯每夜取用塗面如法二十日即變麝香面膏治面黒無精光令潔白滑潤光彩射人麝香猪􅏬蔓菁子酥甜𤓰瓤桃仁治人面白浄恱澤方白歛白术白附子白芷各二兩藁本三兩猪􅏬三具右為末用蕪菁子半升又酒水半升相和煎數沸研如泥合諸藥内酒水中以瓷器貯封三日毎夜取傅面旦以漿水洗之一方無白术治人面潔白澤顔色紅潤方猪􅏬蕪菁子括蔞子桃仁右以酒和搗傅之慎風日一方用杏仁一法又云寒月以為手面膏可加土𤓰根一兩大棗六七枚白楊皮􅄆治面與手足黒令光澤潔白白楊皮桃花白𤓰子仁右搗篩温酒服方寸匕日三欲白加𤓰子欲紅加桃花三十日面白五十日手足俱白一方有橘皮三分無楊皮治面恱澤方蘖木土𤓰大􅀥七枚右搗和膏湯洗面及塗藥四五日光澤矣鈆丹􅄆鈆丹真女菀六十銖右治下篩酒服一刀圭女二十日男二十日知則止黒色皆從小便出面白如雪便止過太白其年過三十難復療服藥忌五辛一方用􅄆漿水服方治人面潔白恱澤顔色紅潤色方以酒漬桃花服之好顔色治百病三月三日收一方採三株桃花隂乾為末空心飲服方寸匕日三並細腰身治人面鮮花可愛方用冬葵子取蒸烈日中曝乾擦去皮取其仁細研和蜜𫝊之甚驗食此藥後被狗咬即瘡亦瘥也治面光白膩潤去䵟􅍍面皺方白附子杏仁香附子白檀香紫檀香馬珂各半兩右搗羅爲末以白蜜都和勻夜卧塗面旦以温水洗之治面黒無精化潔白滑潤光彩射人雄黄硃砂白殭蠶珍珠末右都研令勻以面脂和丸胡粉一錢入藥二錢和攪令勻夜卧塗之旦以漿水洗面良冲順和氣湯治面黒一婦人年紀三十憂思不已飲食失節脾胃有傷面色黧黒不澤環唇尤甚心縣若饑仍不欲飲食氣短氣促大抵心肺在上行營衛而光澤於外宜顯而不藏肝腎在下養筋强骨於内當歛而不見脾胃在中主傳化精㣲以灌輸宜冲和而不息其氣一傷則藏見失所憂思不已氣結而不行飲食失節氣耗而不足使隂氣上溢於陽故黒色見於面也又經云脾氣通於口其上在唇今水反侮土故色見於唇也此隂陽反作病之所從也上古天真論云陽明脉衰面始焦枯知陽明氣不足非助陽明生發之劑無以復其色也升麻白芷防風各一錢甘草芍藥蒼术各三分黄茋八分人參葛根一錢半内經曰上氣不足推而揚之以升麻苦平葛根甘温自地升天通行陽明之氣爲君人之氣似天之風疾感之留滯不行以辛散之以防風辛温白芍藥之酸安太隂之怯弱十劑云補可以去弱人參羊肉之屬人參黄耆甘草甘補益氣為臣至太真要論云曰辛甘發散爲陽生薑辛熱大棗甘温和營衛開腠理致津液以復陽氣故以爲使右件㕮咀都作一服水二盞生薑三片棗二枚同煎至一盞去滓温服早飯後午飯前取天氣上升之時使人之陽氣易逹故也服而愈治面目傷青黒用熱酒調一黄􅄆貼在黒不􅄆酒調桂末貼末熱用茶調貼令人面恱白取土蜂未成頭足者炒食之又酒漬以傅面良長年美顔色令人不飢以六天氣服之恱澤肌膚如玉取冬𤓰子三五升去皮搗鍊為丸日服三十丸令人白浄如玉令人白浄肌細以莱菔根服之面膏玉屑面脂方令黒者皆白老者亦少玉屑寒水石木蘭皮旋復花珊瑚丁香土𤓰根蜀紅花白茯苓芎藭兎絲子辛夷仁冬𤓰仁白頭公當歸藁本白殭蠶商陸蕪菁子梔子花細辛萎蕤藿香白芷防風黄茋桃仁青木香前胡桂心半夏白歛杏仁蘼蕪芒硝杜蘅麝香秦椒礬石秦皮杜若升麻蜀椒黄芩白􅅔各六銖括蔞仁一兩熊脂鵞脂羊髓牛髓白狗脂各五合鷹屎白清酒猪肪脂各一升右㕮咀酒漬一宿内脂等合煎三上三下酒氣盡成絞去滓下麝香末攪至凝色變乃止甆器中宻貯勿􅂥氣玉屑面脂方玉屑白附子白茯苓青木香萎蕤白术白殭蠶蜜陀僧甘松香烏頭商陸石膏黄耆胡粉芍藥藁本防風芒硝白檀當歸土𤓰子桃仁芎藭各二兩白頭公零陵香細辛知母猪脂羊脂白犬脂鵝脂各一兩辛夷桃花各半兩右切酒水各一升合漬一宿取出之用㣲火煎令水氣盡候白芷色黄去滓停一宿旦以柳枝攪乃用之面膏方治人面色恱澤如花桃紅光杜蘅杜若防風藁本細辛白附子木蘭皮當歸白术獨活茯苓萎蕤白芷天雄玉屑各一兩兎絲子防已商陸梔子花橘仁冬𤓰仁蘼蕪花各三兩藿香白鵝脂丁香零陵香甘松香青木香各二兩麝香白脂牛髓各一兩羊􅏬三具右先以水浸各髓等五日滿易水又五日别一易水又五日二日一易水凡二十日止以酒一升挼羊􅏬令消盡去膜乃細切香於甆器中浸之蜜封一宿曉以猪脂等各煎三上三下以酒水氣盡為候即以綿布絞去汁十日以後色等桃花一方有白歛人参各等三兩無蘼蕪花𤓰仁此是面膏藥疑更有此二味治面上皺黒凡是面上疾皆主之方丁香零陵香梔子花桃仁白歛茯苓土𤓰根莵絲子防風沉香辛夷當歸麝香藁本商陸芎藭各三兩萎蕤藿香白芷甘松香鸕鷀糞木香各二兩白附子土𤓰根木蘭皮白茯苓冬𤓰仁鵝脂羊髓羊腎脂猪􅏬六具右細剉以猪􅏬汁漬藥一宿都入於鍋中煎令白芷色黄為度去滓㣲火煎成膏入麝香和勻盛於甆盒内任用傅面延年面脂方白术茯苓杜蘅各六分萎蕤藁本芎藭土𤓰根括蔞各五分白殭蠶蜀紅花辛夷仁零陵香藿香莵絲子梔子花麝香鷹屎白冬𤓰仁桃仁白蠟羊脂猪􅏬白附子猪脂三升右細切酒三升取猪􅏬桃仁綿裹内酒中挼令消絞取汁漬藥一宿别煎猪􅏬令消去滓以鵝脂羊脂白蠟於鐺中用綿裹内鐺微火煎三上三下藥黄色去滓待澄凝内鷹屎末攪令勻以塗面妙面脂方治面上諸疾黒䵟瘡刺令白潔如玉當歸芎藭細辛白术辛夷鹿髓木蘭皮􅀈蒌瓤白附子藳本桃花鸕鷀糞蜜陀僧白殭蠶零陵香杜蘅鷹糞白葳蕤麝香丁香鵞脂白茯苓羊髓白蠟猪脂右搗碎以酒一㪷鵞脂漬一宿明旦濾出以鵞脂等煎候白芷色黄膏成去滓入麝香攪令勻夜以傅面愼風麝香膏治面上百疾麝香零陵香土𤓰根白蘞防風沉香梔子花當歸藳本木蘭皮各一兩白殭蠶白芷商陸丁香各一兩辛夷白茯苓白芷商陸丁香各兩牛脂猪脂鵞脂右細剉綿裹用酒一斗浸一宿取脂髓等慢火於銀鍋中與藥同熬成膏又方白殭蠶木蘭皮各二兩半蜀紅花青木香冬𤓰仁羊腎脂羊髓生猪脂鵞脂一升半右㕮咀先以美酒五升援猪脂六具取汁漬藥一宿於猪脂中㣲火極煎三上三下白芷色黄以綿一兩内生布中絞去滓入麝香以白木箆攪至凝乃止治人面恱澤如桃花紅光方辛夷細辛芎藭白术白芷當歸木蘭皮括蔞香附子藳本桃花蜀紅花商陸蜜陀僧白殭蠶零陵香杜蘅鷹屎白萎蕤土𤓰皮各五分麝香丁香各二兩白附子玉屑鵞脂麝髓羊髓白髓猪脂三升右切細酢漬宻封一宿明旦煎猪膏三上三下白芷色黄為度藥成去滓攪數萬遍令色白以傅面慎風日良玉屑面膏治面無光澤皮肉皺黒乆用令人潔白光潤玉屑細辛土𤓰根熊脂當歸白犬脂葳蕤木蘭皮桃仁鷹屎白商陸辛夷各一兩蜀紅花青木香白殭蠶芎藭黄蓍杜蘅藿香莬絲子麝香防風各半兩丁香白附子冬𤓰仁猪􅏬鵞脂羊髓白蠟猪膏猪肪脂各一升右以水浸猪鵞犬熊脂數易水浸令血脉盡乃可㕮咀諸藥清酒一斗漬一宿明旦生擘猪鵞等脂安藥中取銅鐺於炭火上㣲㣲煎藥至暮時乃熟以綿濾置瓷器中仍以綿絮白芷片看色黄即膏成其猪􅏬又浸藥酒煖取汁安鐺中其玉屑蜀紅花鷹屎麝香為末膏成安藥中攪令勻旋取傅面一方有鸕鷀糞無蜀紅花面脂方治面上皴黒凢是面上之病皆主之丁香零陵香桃仁白歛白芨白殭蠶辛夷商陸防風當歸沉香各三兩麝香梔子花芎藭莬絲子各三兩煎候白芷焦黄為度去滓入麝香和勻於甆盒中盛夜臨卧洗手面拭乾塗之面脂方主恱澤人面耐老冬𤓰仁白芷商陸芎藭各三兩當歸藳本蘼蕪土𤓰根桃仁葳蕤細辛防風木蘭皮辛夷甘松香麝香白殭蠶白附子梔子花零陵香猪􅏬右薄切綿裹以猪􅏬汁漬一宿平旦以煎猪􅏬六升㣲火三上三下白芷色黄膏成去滓入麝香收於甆器中取塗面一方用酒浸藥妙面膏方令人面色恱澤桃花紅光防風芎藭白芷白殭蠶蜀紅花白歛細辛茯苓藳本葳蕤青木香辛夷仁當歸土𤓰根括蔞各三分桃仁猪脂鵞脂一升羊脂一升右切綿裹酒二升浸一日一夜便内脂急火煎之三上三下用慢火熬一夜藥成去滓以水石粉三分内脂中以柳木箆熟攪任用之治面黒令白去黯方烏賊魚骨細辛括蔞乾薑蜀椒各三兩右以苦酒漬三日以成鍊牛髓二斤煎之以酒氣盡藥成作粉以塗面醜人亦鮮妙光華玉屑膏治面頰手指肌膚皴澁不澤塗面方用冬葵子令人面鮮華取葵子蒸烈日中曝乾挼去皮取仁細研和白蜜傅之甚驗蠟脂膏白蠟桃花莵絲子白芷木蘭皮細辛辛夷仁白茯苓土𤓰根括蔞根白附子杜蘅桃仁杏仁各三分羊髓蔓菁油二升半牛髓麝髓右並細切以苦酒浸一宿用上件蠟油髓脂等煎如面脂法其蔓菁油煎令煙出然後下蠟髓訖内諸藥候白芷色黄膏成任用每日以澡豆洗面然後塗之治人面色潤膩鮮白如玉防風葳蕤芎藭白芷藳本桃仁白附子茯苓細辛甘松香零陵香當歸括蔞各四分蜀椒鸕鷀屎冬𤓰仁各三分麝香一分右酒漬淹潤一夕明旦以薄綿寛裹之以白鵞脂三升羊脂二升並鍊成者共煎之於銅器中㣲火上煎使之沸勿使焦也乃下之三上看白附子色黄膏成去滓又入鐺中上火内麝香氣出仍將麝香以綿濾度之乃内括蔞仁桃仁冬𤓰仁等脂并鸕鷀屎等攪令勻調膏成待凝以瓷器貯柳木作搥子於鉢中研使輕虗得所早晩研之無度數三二日研始好唯多則光滑任用手膏方治塗面令潤澤白芷芎藭藳本葳蕤冬𤓰仁楝子仁桃仁棗肉猪􅏬冬𤓰仁瓤陳橘皮􅀈蔞子右細剉以水八升煮取三升去滓别以好酒三升挼猪􅏬取汁入研桃仁并煎藥汁都攪令勻更煎成膏以磁器中貯先浄洗手拭乾塗之常用蠟脂方蔓青油三升甘松香零陵香辛夷仁白术細辛竹茹竹葉白茯苓蘼蕪花羊髓麝香右切綿裹酒浸再絞去以脂中煎慢火令㣲作沸三日許香氣極盛膏成乃錬蠟令白看臨睡下蠟調軟硬得所貯用之手膏方治手潤白桃仁杏仁橘子仁赤麵椒辛夷芎藭當歸大􅀥牛腦羊腦狗腦各一兩右細剉先以酒一升漬猪腦又别以酒六升煮赤炮令爛絹裹絞去滓乃入猪腦等後以綿裹諸藥内酒中慢火煎欲成絞去滓更煎膏成以磁器盛之五日以後堪用先洗手訖取膏塗之甚光潤切忌近火鹿角散鹿角牛乳芎藭細辛天門冬白芷白术白歛白附子酥酪三兩杏仁五十枚右㕮咀先以水漬鹿角一百日出之與諸藥内牛乳緩火煎令汁盡出角以白練袋盛餘藥勿收至夜取石上磨鹿角取塗面旦以漿水洗之無乳小便硬亦研得一方用牛乳及酥於銀鍋内慢火熬成膏夜塗面上良仍以漿水洗之一名鹿角膏令百歲老人如少年時主光澤潔白常傳面脂方療人面無光潤黒及皺細辛萎蕤黄耆白附子薯蕷辛夷芎藭白芷各一分括蔞木蘭皮各二分猪脂三分右切以綿裹用少酒浸一宿内脂膏煎之七上七下别出一片白芷煎色黄藥成去滓攪凝以傅面任用之亦主金瘡止血良妙去風面膏方治風寒令人面光恱却去皴青木香白附子白蠟白芷芎藭零陵香香附子茯苓甘松各一兩羊髓一升半右㕮咀以酒水各半升浸藥經宿次日煎三上三下候酒氣盡膏成去滓取傅面如面上有䵟􅍍皆落摩風膏白芨白歛檀香零陵香白芷茅香藿香蠟白膠右為粗末以香油煎焦色去滓却入蠟白膠加麝香少許良妙令人面白似玉色光潤方羊脂猪脂白芷烏喙大棗麝香桃仁甘草半夏右各煎以白芷色黄去滓塗面二十日即變五日如玉光潤妙一方無桃仁麝香􅀥令人面色恱澤如桃花方香附子十枚白芷二兩零陵香茯苓麝香蔓菁子牛髓羊髓水清白蠟八兩右以油髓㣲火煎五物令色變去滓内麝香研千遍凝用澡豆洗面後塗傅之又方杏仁二升白附子三兩蜜陀僧白羊髓珍珠白鮮皮鷄白子酒三升胡粉右以清酒二升半先取杏仁盆中研之如膏下鷄白子研二百遍又下生羊髓研二百遍篩搗諸藥内之研五百至一千遍尤妙初研杏仁時即少下酒令薄漸漸下使盡藥成以指捻看如脂即可用也藥草以絹篩取細如粉佳作塗手脂法又面光潤方猪􅏬白芷桃仁各一兩辛夷冬𤓰仁細辛黄𤓰括蔞仁各三分右以油一大升煮白芷等二三沸去滓將猪􅮋取盡乃内冬𤓰桃仁末各和之膏成以塗手掌即光亦作好酒煎之成膏尤佳一方無黄𤓰七白膏令人面光潤不皺退一切䵟􅍍香白芷白蘞桃仁各一兩辛夷冬𤓰仁白附子細辛各三錢右以鷄子白調丸彈子大或人小指大狀隂乾毎夜浄洗了面温水漿於磁器内磨汁塗之極妙玉龍膏白歛白芷茅香零陵香各等分𤓰蔞仁半兩麝香少許右前藥三味以香油煎令稍焦去滓以蠟少許調勻用度為妙面脂方治人面色潤膩鮮白如玉白附子鹿角膠石塩白术細辛鷄子白一枚右細剉先以水一㪷五升煎白术以布絞取汁六升扵銀鍋中以重湯煮取二升後下諸藥更煮至半升以綿濾過取於磁盒中每夜臨卧洗面了拭乾塗之療化面方兼去䵟􅍍令光澤潔白珍珠光明沙冬𤓰仁各二分水銀右以四五重絹袋盛之於銅鐺中以作漿水㣲火煮一夕一日始堪用取水銀和面脂熟研使消合珍珠冬𤓰子末更和調以傅面取瘥為度旦以漿洗之手膏方治手潤冬不粗皴􅀈蔞瓤二兩杏仁一兩右同研如膏蜜調令稀稠得所每夜塗鍊脂法凡合面脂先湏知鍊脂法以十二日買極肥大猪脂水漬七八日旦易水煎取清脂投水中錬鴟熊脂皆同此法面油摩風膏麻黄升麻當歸𦍑活防風白歛白芨白檀右用小油半斤以銀石器内綿子裹定藥於油中熬之得所澄浄去滓入黄蠟一兩并麝香少許白面方牡蠣三兩土𤓰根一兩右二味為末白蜜和取塗面即白如玉旦以温漿水洗之宜慎風日以牡蠣為末蜜丸服三十丸亦以牡蠣肉炙食之佳令人好顔色以逢櫐子食之令面生光方以蜜陀僧用乳煎塗面佳兼治􅖟鼻皰洗面方用天門冬曝乾蜜丸用以洗面令人面不皴光華可愛以麋角於漿水研爲泥塗面上滅瘢㾗風熱諸毒積於肺臟發於肌肉而爲瘡癤瘡癤愈餘毒未除故瘡痂雖落而瘢㾗不滅治法旣有塗澤膏潤之劑又須賴榮衛平均肌温氣應外宜慎風冷也治面泡瘡瘢三十年已上斑貓巴豆蜜陀僧胡粉鴟脂各三兩煎金銚洮沙三兩髙良薑海蛤三兩右以粉鴟脂和成夜半塗之旦以甘草湯洗之瘥祛風膏滑石牙子盆硝白上硫黄乳香等分輕粉腦子麝香各少許右爲細末用酥油勻臨卧洗之後塗在面上無酥油清油亦佳治乆患瘡痍後瘢㾗不滅方定州甆器白殭蠶白附子白芷珍珠末野䰿脂酥一兩右搗為末先消野䰿脂與酥二味為汁候熱氣退即下諸藥攪之如膏用塗瘢上白殭蠶膏治面上瘢痕及患瘡痍瘥後不滅白殭蠶白魚白石脂白附子鷹屎各一分臘月猪脂二兩右除猪脂外搗羅為末細研以猪脂和令勻甆盒中盛旋取傅瘢痕上避風六物滅瘢痕膏衣中白魚鷄屎白鷹屎白芍藥白歛右藥研如粉以乳汁和塗瘢上日三良辛夷膏治面上瘢痕及一切瘡瘥後亦黒不滅時復不止辛夷鷹屎白杜若細辛各半兩白附子三分右除鷹屎外並剉碎以酒兩盞浸一宿别入羊髓五兩銀石器鍋中以文火煎得所去滓将鷹屎研如粉内膏中攪勻再以㣲火煖入盒中每日三塗瘡瘢上避風一方以蜜傅之治面上瘢方白殭蠶一兩珊瑚白芷一兩鷄屎白硃砂各一兩右㨶蜜和之尤良治乆患瘡痍後瘢痕不滅方方見本門當歸膏治面上瘢痕當歸白芷各一兩鷹屎白半兩烏鷄糞一兩右先将當歸白芷剉碎浸一宿别鎔猪脂一斤俟消入浸藥用酒文火煎之候白芷色黄去滓将鷄屎鷹屎内膏中攪勻傾入甆盒中毎日三塗瘢痕上避風一方不用酒治面上及瘡瘢不滅方鷹白屎爛腐骨屎白醎各四錢麝香二兩右研令如粉以葛布揩令微赤以脂和傅之日二度瘥玉屑膏治面上瘢痕及風毒玉屑蜜陀僧白附子珊瑚各二兩右搗為末入乳鉢内都研令勻每度用藥末二錢以真牛酥調勻夜卧時塗面上旦用温漿水洗之治滅痕無問新舊必除方當歸一兩猪脂三斤白芷一兩右共搗綿裹以酒二盞煎十餘沸去滓日五七度塗之治滅瘢痕方禹餘糧半夏各等分右為末以鷄子黄和先以新布拭瘢處令赤後用藥傅之勿見風日二十日十年者亦滅一方治一切瘡瘥後赤黒瘢痕不滅時復痒不止治瘢痕凸出方鷹屎白一兩衣白魚二十枚右為末蜜和以傅日三五度良又方鷹屎白二兩白殭蠶一兩半右為末蜜和傅之日三慎五辛生菜又治一切瘡瘥後赤黒瘢痕不滅復痒不止臘脂膏治面上瘢痕臘脂四升大䑕一枚右入鐺中以文火煎之待䑕消盡以新綿濾去滓入甆盒盛每用先以布拭令瘢痕色赤次以膏塗之三五度瘥避風救急滅瘢方蒺藜子山梔子各一兩右為散醋漿和如泥臨卧時以塗之旦洗去治瘢痕凸出方鷹屎白一兩白附子一兩右為細末酥調塗凸上日數次治一切瘡瘥後赤黒瘢痕不滅時復痒不止方黄礬燒令汁出胡粉燒令黄各半兩右為細末以臘月猪脂和更研如泥令勻先以布揩之令赤痛即用藥塗之日五七度効又方鷹屎白燕窩中草各等分右研為末以入乳汁和塗於瘢上日三四度夜卧時塗之旦以漿水洗之自然肉平如故治熱毒瘡瘥後瘢痕不滅方出聖恵方鷄子一枚酒浸七日後取黄白殭蠶二十枚右藥與鷄子相和令勻先以布攪揩瘡瘢赤痛塗之甚効治滅瘢痕方右用白蜜和鷹屎白三兩細研傅之三服則無問新舊必除治瘢痕凸出方出聖恵方凡遇春夏以大麥麫秋冬以麥麩好細絹下篩以酥和傅之又方出聖恵方夏以熱瓦熨之冬以凍棱熨之鷄子膏出聖恵方治瘡瘢痕無問新舊塗用鷄子五七枚熟煮取黄於鐺中炒如黒脂膏以物先揩瘢痕然後塗膏日三九即自滅舊肉無别治面上瘢痕方用馬莧汁洗𦂳唇面皰馬汁及射工毒塗之瘥指爪破面出聖恵方用生薑自然汁調輕粉傅破處更無痕瑕真玉磨方出聖濟緫録治面上瘢痕取真玉平處一面磨瘢痕乆則無痕治面上滅瘢方方見本門療乆瘡及金瘡丸百瘡瘢方能令髙者就下下者起平出肘後方取純白色雌鷄一頭籠之煮豆赤小者飼之七日即餓之然後截羊腎脂飼若不肯食更餓之自然食頻日與食之小糞出當色白膩潤此堪用籠鷄白糞二合辛夷四合白附子二分牡蠣三分細辛二分合搗末蜜和塗瘢上治去瘡瘢方出海上名方用白􅆩髓雜玉屑琥珀屑塗之一方用蜜陀僧末水調塗治火燒瘡滅瘢方出聖恵方用赤地利二兩搗羅為末以生麻油調傅之瘡上以瘢滅為度又方出肘後方以人精和鷹屎白塗之日二無問新舊必除亦用白蜜和之治雜瘡及滅舊瘢痕用白殭蠶衣魚鷹屎白三味等分為末入在面膏内和塗之瘡瘢即滅衣魚多在衣中在書名蠧魚療痘瘡瘢面靨出譚氏小兒方以蜜陀僧細研水調夜塗之明旦洗去平復矣治面上滅瘢用木蘭香一斤以三年米醋浸一日出曝乾為末傅之用醋漿漬一百日乾為末服方寸匕木蘭香即蘭香菜也普濟方卷五十二
