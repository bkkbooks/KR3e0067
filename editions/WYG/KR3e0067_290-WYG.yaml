錢研巴豆不去皮研一個去皮半錢右再同研如泥入乳香没藥各少許再研勻細少上惡肉自去矣治癰腫惡肉不盡者用生地黄汁煎如膏作餅子貼之日四五度癰疽生臭惡肉者以白䕡茹散傅之看肉盡便停但傅諸膏藥如不生肉傅黄蓍散䕡茹黄蓍止一切惡肉仍不盡者可以七頭赤皮䕡茹為散用半錢和白䕡茹散三錢以傅之食惡肉膏治癰疽及發背諸惡瘡去惡肉方大黄芎藭莽草珍珠雌黄附子生用各一兩白歛礬石黄芩䕡茹各二兩雄黄半兩右㕮咀以猪脂一升半煎五六沸去滓内䕡茹礬石末攪調傅之瘡中惡肉盡乃止治諸瘡胬肉如蛇出數寸用硫黄一兩細研於肉上薄塗之即便縮苽蔞散黄耆四兩皂角刺八兩紅者拍研甘草六兩牛膝二兩黄苽蔞十個右用蜜一斤旋入鐺内炒至紫色見風吹脆為末有滓再炒為末酒調下二錢諸瘡生肌肉附論瘡毒能化膿血而按之内虚肌肉不平者熱氣雖盡寒氣不除經絡不足以温之故也若不速治則復生惡肉變為冷瘡此宜内温其氣血外温其皮肉内外得温則新肌自生惡液盡去無不差矣方黄耆膏療癰疽瘡生肉黄耆細辛生地黄蜀椒當歸芍藥薤白白芷芎藭丹參各一兩猪膏一兩半臘月者甘草蓯蓉獨活黄芩各一兩右以苦酒一升二合夏月漬一宿冬月二宿微火煎三沸煑酒氣盡成傅之忌海藻菘菜生䓤菜蕪荑生肌膏治諸癰疽去膿血後虛困黄蓍當歸各三分生地黄一兩半防風去叉大黄芍藥黄芩去黑心芎藭續斷附子生去皮臍白芷甘草細辛去苖葉各半兩猪脂二斤右除猪脂外並剉碎先以醋半斤拌一宿入脂以瓷器盛於甑上蒸半日以綿絞去滓瓷合盛取塗傅瘡上日兩三次芎藭散治發背癰疽已潰暖肌生肉芎藭一兩當歸切焙人參防風桂去粗皮各三分厚朴去粗皮生姜汁炙白芷芍藥甘草炙剉黄蓍剉桔梗剉炒各半兩右為散每服二錢温酒調下日三服生􅁏膏主癰疽發背已潰令生肉方甘草當歸白芷蓯蓉細辛各二兩烏喙六分生用薤白二十莖亁地黄三兩蜀椒二兩蛇啣一兩右㕮咀以醋半升漬一宿次入猪膏三斤煎令沸三上三下膏成塗之立瘥一法用續斷一兩無以蛇啣替之猪蹄湯治癰疽發背黄蓍黄連芍藥各三兩猪蹄一具治如食法黄芩二兩薔薇根狼牙根各八兩右㕮咀以水三斗煑猪蹄令熟澄清取二斗下諸藥煑取一斗去滓洗瘡一食頃以帛拭亁貼生肉膏日二如痛加當歸甘草各二兩又方硬瘡生肉天南星半夏生五倍子鷄内金各半兩當歸南木香厚黄蘗降真香節白歛白芨各二錢半右為細末先湯洗後摻藥傷撲通用千金内補散治癰疽發背惡肌不盡能消肌生肉當歸桂心各三兩人參川芎厚朴姜製炒防風甘草炙白芷桔梗各一兩右為末每服二錢酒調空心服不能飲酒以木香湯調下忌海藻菘菜生䓤等物托裏黄蓍湯治諸瘡潰後膿多内虛茯苓去皮人參官桂去皮遠志去皮麥門冬去心五倍子炮黄蓍當歸各等分右為粗末每服五錢水一盞半煎至一盞去滓食前温服薤白膏治發背癰疽一切瘡腫排膿血生肌肉薤白細切四兩當歸切焙附子炮去皮臍白芷芎藭續斷各一兩細辛去苖葉半兩黄蓍剉一兩半猪脂三斤右除猪脂外細剉碎以酒半升拌一宿先􅆈脂令沸次下諸藥煎候白芷赤黒色以綿濾過瓷合盛每日三兩次取塗瘡上茶蠟丸治諸瘡潰後以鎔蠟和好茶揑尖丸塞其孔中又以牛角内粉屑夾天花粉真蚌粉亁摻消毒生肌硬瘡生肌方降真香一兩紫赤大片者油處更好桑白皮新者半夏生各兩半乳香當歸五倍子各二錢右為細末亁摻針頭散能去死肉生肌輕粉半錢射香半錢信半錢乳香半錢蟾酥半錢銅碌半錢右同研細末紙撚絍藥在瘡口内白芨散生肌住痛止血收瘡口辟風并治金瘡血不止白芨白歛烏魚骨紫參黄芩龍骨已上各三分右為細末每用亁摻瘡口上有神効生肌散黄連三錢蜜陀僧半兩亁胭脂二錢雄黄一錢菉豆粉一錢輕粉一錢右為細末以漿水洗過然後却用無垢軟綿揾净用此藥貼之地黄膏治諸瘡不合生肌生亁地黄三分白芨白歛甘草生剉各半兩白芷三分猪脂半錬右除猪脂外搗羅為末入脂内􅆈成膏候冷日三四上塗之生肌膏治一切瘡生肌及金瘡不合白芍藥乳香研胡粉亁姜炮各一兩油四兩蠟二兩右除油蠟外搗羅為末鎔油蠟相和煎如膏候冷貼瘡上日二換之桃紅散歛瘡生肌定血辟風邪滑石四兩研乳香輕粉各二錢小豆粉一錢一方改定粉米一兩寒水石燒三兩右為細末每用亁摻血不止者和燈草貼瘡口上以帛封之桃花散治收歛一切惡瘡口不合者生肌及耳中膿瘡硃砂乳香亁胭脂各一兩水銀麝香各半兩右先研硃砂細後入水銀再研無銀星為度後入次藥同研極細宜用帛子先展净耳内膿吹藥在耳金針散治一切惡瘡去毒生肌金蜈蚣一對膽礬一錢銅緑半錢麝香膩粉各半字右研細每用三針開絍瘡口每日一二次白龍散治生肌止痛及耳中瘡痛滑石一兩硼砂三錢輕粉二錢寒水石四兩燒半白研烏賊魚骨一兩研右為細末每用亁摻耳中痛者油調如糊滴絍於耳中痛立止金花散生肌止痛蜜陀僧花乳石火煆過乳香一錢膩粉三錢右研為細末每用摻貼瘡上㯽榔散治諸瘡生肌歛瘡口㯽榔生為末寒水石炭火燒紅去灰細研各半兩龍骨白歛末白芨末各一分右再研勻每用薄摻瘡内次以諸膏藥貼烏賊魚骨膏治瘡生肌烏賊魚骨末舊船縫石灰各研一兩鉛丹二兩半油八兩麝香研一錢右先􅆈油沸次下船灰烏賊魚骨末鉛丹以柳箆攪候變黒色即入麝香更攪令勻稀稠得所以瓷合盛薄紙貼日兩次綿紅散治瘡腫生肌肉定疼痛寒水石火煆如粉二錢定粉龍骨搗研乳香各一兩亁胭脂看多少入粉令紅色右用研為細散傅入瘡口中用紙貼之乳香散治瘡口中痛甚滑石一兩乳香没藥各五錢腦子少許寒水石一兩燒紅右各研為細末同和勻傅瘡口上治惡瘡死肉錠子巴豆一錢去皮油五靈脂二錢淄丹二錢飛枯白礬一錢右為細末以糊和為錠子入瘡内用之生肌散寒水石二錢黄丹半錢龍骨七錢輕粉一錢右先敷上次貼乳香膏生肌散治一切瘡生肌肉止疼痛化膿消腫黄蜀葵花焙亁半兩乳香研一分不灰木一兩白歛一分右為散先用温甘草水洗過瘡亁摻瘡止三次治瘡口不合生肌方鷄内金隂亁㯽榔剉木香黄連去湏等分右為末貼之取差為度及治金瘡生肌歛瘡口木香㯽榔黄連洗去鬚白芨右各為細末𫝊瘡即合一方加輕粉少許和勻即効生肌散老狗頭生腦骨截碎生瓦煆透二兩桑白皮新者一兩當歸二錢半右為末麻油調傅瘡深則摻􅏛紙䕶之桃紅散貼瘡生肌止痛滑石一兩赤石脂三錢黄丹二錢右同為細末亁貼糝藥治諸瘡口膿水不亁白龍骨二分寒水石三分虢丹飛一分右為細末亁貼瘡一料以六分為率生肌散傅癰疽瘡毒即生肌方見本門發背類右為末生麻油調傅自通聖萬金神異白玉㯽連替生肌凡七方是一家行用均濟三因皆良藥也療瘡生肌以五月五日採蘩蔞葛葉鹿活草槲葉芍藥地黄葉蒼耳葉青蒿葉合石灰搗為團如鷄卵暴亁末以傅瘡大有効桃紅散治諸瘡生肌肉鉛丹炒半兩白歛為末一兩右同研為細散每用少許瘡上摻亁後貼膏藥乳香餅子治瘡止痛生肌肉乳香麒麟竭没藥並細研各等分右再同研令勻細以狗膽和成膏揑作餅子如榆莢大每用時看瘡大小以餅安瘡上外用膏藥貼之生肌散治諸惡瘡瘡口生肉頗遲者墻上多年白蜆殻火煆通赤去火候冷研草無名異為末蜜陀僧火煆過各一分右更入麝香少許同研令勻細每用少許摻瘡口上外食散治癰腫惡肉不盡膿水淋漓傅此能生肌長肉好染坯血竭各一兩白礬銀鍋内用瓦蓋煆令性盡一兩右研細用桑漿旋搜為膏量瘡大小貼之忌鯽魚酒麫毒物等桃紅散生肌肉歛瘡定粉二兩半乳香半兩龍骨烏魚骨去皮㣲炙黄色白石脂各一兩半黄丹㣲炒二分寒水石火燒通赤秤七兩右同為細末再研極細每用藥少許亁摻患處王不留行散治癰疽發背一切瘡腫已潰出膿血暖肌生肉方見諸癰類王不留行散鯪鯉甲散治發背癰疽等瘡疼痛肌肉不生方見諸發類鯪鯉甲散桃花散治一切瘡生肌藥白芨白歛黄栢黄連乳香别研香别研黄丹各等分右為細末摻於瘡上三二日生肌平漏翠霞散治百雜惡瘡去毒生肌銅緑半兩輕粉二錢片腦麝香各三分粉霜一字滑石一兩右為細末每蘸藥絍瘡内以膏藥貼之或滑石二兩名二聖散量其淺深輕重用之歛瘡口大効蛾繭兒白礬少許黄丹少許右為和勻装在繭内用泥略褁燒紅去泥用繭灰為末貼瘡紅玉散歛瘡口生肌肉止疼痛去惡水不問日近年深並治之寒水石炭火燒通赤候冷細研二兩黄丹半兩右同研細亁摻瘡口内後用萬金膏貼每日一上再上尤妙如瘡腫硬難消單用煆過寒水石細末水調少許塗在腫髙處後用萬金膏貼之每日一上用此藥之後腫硬便軟結瘡頭更用七聖散於膏藥週廻掃之如瘡破惡肉未化作痛肌肉未生者即用火煆過寒水石三兩研細入膩粉半錢麝香一字同研細每用少許摻惡肉處却用萬金膏貼之每日一上如瘡内膿多每日二上治諸般惡瘡生膿多者及瘡疹後膿水不亁貼衣者及流膿成片難痊逐年復發及熱瘡諸藥不効者悉治之川黄連二兩晒亁碾末輕粉少許右用香油稠調黄連攤於瓦碗内却收艾揉軟燒烟覆碗在烟上熏之以艾三團為度令熱透碗底候覆碗冷再用香油旋化入輕粉勻傅於瘡上日三次三日即平若小兒頭瘡加松香在内同傅尤妙也治癰疽生蛆者用新宰猪肺乗熱薄切貼傅虫皆攅肺上頻頻易去可以盡取生肌散治一切惡毒瘡疼痛白米一升淘四十九遍舊皮巾子一隻右為甆瓶子内泥固頭以大火燒為灰候冷細研為末日二三次貼石榴散止痛生肌用醋石榴一枚劄作竅子納白礬一兩慢火内深焙燒半日存性為散貼之取差為度雄麝散化瘜肉辟臭氣止痛散寒邪亁膿長肉歛瘡口及治嵌甲蛇蜕皮四兩於熨斗内燒留性雄黄一兩别研血竭二錢别研麝香二錢别研右為細末研勻每用少許摻患處真珠散治一切浸淫惡瘡乆不生肌瘡口不歛定粉一兩半研白歛末一兩白芨末半兩龍骨末二錢黄丹二錢飛研烏賊魚骨末一分右件同研令極細亁摻瘡上如膁瘡即加乳香二錢瘡亁以津唾潤勤傅之歛毒散治一切瘡潰膿後見瘡口肌肉不生四向紫黒疼痛赤腫不消乳香半錢别研没藥半錢别研麝香少許别研黄丹一錢火飛白礬一錢别研亁胭脂半兩右件研勻每用量瘡大小用藥亁摻於瘡口上用膏藥傅貼或用帛子包褁如瘡口不亁未歛再換桃紅散生肌止膿水寒水石六錢煆粉五倍子四錢取末坯子胭脂二錢别研麝香一錢别研右件為細末用温水洗瘡净拭亁摻瘡口内普濟方卷二百九十
