既傷胃腑失度土既衰損木必來乗故曰肝入胃即吐下或單下而不吐是肝乘之盛也木既尅土尅過必宣二氣俱虚而肝必怒陽氣既乏則發轉筋變吐加腎肝之病也宜速止之仍温足而兼復調以五味其病必痊矣方香葇湯出聖濟總錄治乳石發霍亂轉筋不止香葇三分木瓜乾者去穣人參厚朴去粗皮生薑汁炙熟陳橘皮湯浸去白焙各一兩桂去粗皮半兩右粗搗篩毎服五錢水一中盞入生薑半分切煎取八分去滓温服不計時候髙良薑湯出聖濟總錄治乳石發霍亂轉筋及心腹痛髙良薑剉半分桂去粗皮一兩木瓜乾者去穣二兩右粗搗篩毎服三錢以水一盞煎至七分去滓温服不計時候木瓜湯出聖濟總錄治乳石發霍亂吐利轉筋木瓜大者一枚去穣薄切倉粳米一合右以水二盞煎至一盞去滓時時温服一合棠黎木瓜湯出聖濟總録治乳石霍亂轉筋棠黎枝一握木瓜大者一枚去穣右細剉分四服每服以水一盞入生薑五片煎至七分去滓熱服不計時糯米飲出聖濟總錄治乳石發霍亂吐利不止及轉筋用糯米淘浄三合細研以少許汁水攪如乳状頓服立止桑葉飲出聖濟總録治乳石發轉筋不吐不下氣急用桑葉一味切二兩以水五盞煎一盞半去滓分温二服早晚各一髙良薑飲出聖濟總錄治乳石發吐利轉筋氣急用髙良薑一味剉五兩粗搗篩毎服三錢以酒一盞煎至六分去滓温服早晚食前各一服亦療暴腹痛惡血氣急木瓜飲出聖濟總錄治乳石發霍亂轉筋氣急用宣州木𤓰一枚去皮子切焙乾剉如麻豆大毎服三錢以水一盞半煎至八分去滓温服飲盡更作無木瓜只以枝葉并根代之治乳石吐利不止轉筋入腹欲死方出聖濟總錄用生薑半兩切以酒一盞煎五七沸去滓頓服之治乳石發動霍亂疞痛不可忍方出聖濟總錄用食茱萸淘浄炒香二兩以酒三盞煎至盞半分為二服得下利即瘥空腹食前各一治乳石發霍亂轉筋入腹方出聖濟總録用雞屎白半兩搗羅為末毎服二錢空心以温水半盞調頓服之乳石發心腹痛噤附論夫服乳石之人膈間有寒胃脘有熱寒熱相摶氣逆攻腹乗心致心腹痛其寒氣盛乗於熱氣榮衛否澀不通寒氣内結於心故心腹痛而心噤寒也方前胡散出聖惠方治乳石發動心胸壅悶腹痛寒噤不食前胡去蘆㯽榔桂心各半兩赤茯苓二兩白术二分犀角屑赤芍藥各三兩木香甘草炙微赤各半兩右為散毎服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服木香散出聖惠方治乳石發動心腹痛噤四肢寒顫不欲飲食木香半兩犀角屑赤芍藥白术各三分當歸剉炒三分人參去蘆枳殻麸炒微黄去穣黄芩各半兩右為粗散毎服四錢以水一中盞入生薑半分棗二枚煎至六分去滓不計時候稍熱服白术散出聖惠方治乳石發動體顫寒熱心腹痛噤不能飲食白术柴胡各一兩去苖當歸剉微炒三分青橘皮三分去白焙桔梗去蘆半兩甘草炙剉半兩桂心半兩右為粗散毎服四錢以水一中盞入生薑半分􅀥二枚煎至六分去滓不計時候稍熱服茅香花散出聖惠方治乳石發動心腹痛噤吐逆不下食茅香花桂心各半兩芎藭㯽榔赤芍藥各三兩麥門冬一兩半去心焙右為粗散毎服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服人參湯療心腹痛不解若通身顫寒者榮衞不通故也人參枳殻炙黄芩甘草炙茯苓各一兩麻黄三兩去節右切以水八升煮取四升去滓分服治腹痛不可忍者取塩一合熬以水二升煮取一升頓服即得吐若吐利止心中煩悶及渴不止取竹瀝一升分服即止心中復似冷取茱茰一兩於鐺炒搗末以水二升煮取一升着少塩澄清服之即差桔梗散出聖濟總錄治乳石發動心腹痛冷熱相搏方見乳石發痞結羸瘦類若心腹内有諸疾痛違常煩悶惛怳者急解之出肘後方取冷熱清酒一二升漸漸稍進覺少寛更進冷食其心痛者最急若肉冷口噤但折齒下熱酒瘥若心痛如刺者為應食不食應洗不洗寒熱相擊氣結不通填於心中故也宜數飲熱酒任性多少酒氣行經絡通達淋以冷水又冷淹手巾搭着苦處温復易之湏㬰解也解後可速與冷食食多益善乳石發心腹脹滿附論乳石發心腹脹滿者以飲食居處皆犯温燠石勢壅遏不得宣通故臟腑之間熱氣相搏而心腹脹滿也又以腹脹欲斷衣帶者亦以寝處之温失食失洗不時動役之過但能冷食冷洗當風而立則脹滿自消矣服石之人發状非一或發於外陽則頭身皮膚作病癰腫頭痛是也或發於内隂則反冷臟虛口瘡吐血是也凡氣内温五臟外榮經絡石性清浄不喜煩穢目所覩鼻所聞皆欲馨香不願欝腐因成種種之症也或食陳臭生酸之物貯於胃腑胃腑不受推諸臟諸臓不受即肝膈痞滿或為臚脹而堅積便發心痛亦非心自然而痛為穢觸神氣也覺此候者可速滌腸胃無令留壅不然即成痰癖其心轉痛方萎蕤湯出聖濟總錄治乳石發動心胸痞脹熱毒萎蕤黄芩去黒皮升麻乾薑炮柴胡去苖各一兩半芍藥黄連去鬚各一兩石膏四兩梔子仁七枚右粗搗篩毎服三錢水一盞生薑一分拍碎并䜴少許同煎至六分去滓下芒硝半字令沸温服如人行十里許再服日二快利即止黄芩湯一名黄芩散出聖濟總錄治乳石發腹脹頭痛先有癖實不消或飲酒食肉所致時若心急痛者方見乳石發身體生瘡類大黄湯出聖濟總錄治乳石發動上氣熱實心腹滿小便赤大便不利痞逆衝胸口焦燥目赤痛大黄剉炒一兩黄芩去黒心三兩黄連去鬚剉甘草炙剉麥門冬去心焙各二兩右粗搗篩毎服五錢水一中盞煎至八分去滓内芒硝一錢再煎三兩沸温服早晨近晚各一通利即愈石膏湯出聖濟總錄治乳石發大熱心腹滿脹石膏大青各三兩黄芩去黑心升麻芍藥各二兩右粗搗篩毎服五錢水一盞半煎至一盞去滓分温二服如腹痛加續斷二兩香豉湯出聖濟總錄治乳石發内有虚熱胸腹痞滿外風濕不解肌肉拘急豉二兩梔子仁十四枚葱白一握切黄芩去黑心三兩右除葱豉外粗搗篩毎服先以水三盞煮葱豉至一盞下藥四錢更煎至八分去滓温服甘草湯出聖濟總錄治乳石發内熱結不除或以飲酒冷食澡洗猶不解或腹脹頭痛眼目疼或先有癖食不消或連飲不食或作心痛甘草炙剉黄芩去黑心大黄剉炒各二兩右粗搗篩毎服五錢水一盞半煎至八分去滓温服早晨晚後各一服導氣丸出聖濟總錄治乳石發心腹脹滿用牽牛四兩搗羅為末以生薑自然汁煮麺糊和丸如梧桐子大每服五十丸生薑湯下治乳石發腹脹欲裂為久坐下熱及衣温失食所致出聖濟總錄宜數冷食冷水洗當風取冷湏㬰愈之乳石發痞結羸痩附論隂氣積於下陽氣盛於上升降不時則成痞結羸痩况服乳石者飲食不節将適失度熱氣熾於内隂陽隔而不通水穀之氣不能潤養肌體則肌肉枯燥胸膈痞塞腸胃脹滿久則正氣衰微日益羸痩固其宜也治法當升降痞隔調適隂陽如此則痞者通石勢息也方當歸湯出聖濟總錄治乳石發後虛熱羸乏胸膈痞滯心腹脹滿或腰脚痛腎澀當歸切焙甘草炙剉芎藭逺志去心芍藥麥門冬去心焙赤茯苓去黒皮各二兩黄芩去黒皮桂去粗皮各一兩五味子三兩生乾地黄焙四兩右粗搗篩毎服五錢先以水五盞入白羊腎一隻去筋膜切煎至二盞去腎下藥入生薑一棗大拍碎大棗三枚擘破更煎至二盞去滓分温二服食前空心飲黄耆湯出聖濟總錄治乳石熱盛虚弱痞結羸痩調順隂陽去熱益氣黄耆剉人參生乾地黄焙甘草炙剉白芍藥各二兩桂去粗皮黄芩去黒心赤茯苓去黒皮各一兩升麻三兩右粗搗篩毎服五錢水一盞半棗三枚擘破生薑三片同煎數沸次下竹葉七片更煎三二沸去滓取一盞空心温服日再服㯽榔散出聖惠方治乳石發動煩熱心膈痞滿大腸氣壅腹痛不思飲食㯽榔赤芍藥木香各半兩川大黄一兩半剉微炒枳實麸炒微黄赤茯苓芎藭各三兩甘草炙微赤剉一分右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時温服大腹皮湯出聖惠方治乳石發動心膈痞滿喘息微促腹脇妨悶疼痛大腹皮一兩剉木香枳殻去穣麸炒赤芍藥甘草炙剉各半兩前胡去蘆頭赤茯苓去黑皮陳橘皮去白焙各三分右粗搗篩每服三錢水一盞生薑一棗大拍碎煎至七分去滓温服不計時半夏湯出聖濟總錄治乳石發動體黄痩不能飲食心腹痞結起居腰背急痛嗜臥半夏湯浸七遍焙黄芩去黑心木瓜根各二兩枳殻去穣麸炒桂去粗皮白术各一兩赤茯苓去黑皮三兩右粗搗篩每服五錢水二盞生薑一棗大拍碎煎至一盞去滓空心温服日再枳實湯出聖惠方治乳石發動因服冷藥太過致心膈痞滿腹内疼痛不思飲食日漸羸痩枳實麸炒赤芍藥當歸切炒大腹皮各三分白术半兩前胡去蘆頭一兩青橘皮湯浸去白焙三分右粗搗篩每服五錢水一盞生薑一棗大拍碎棗三枚擘破煎至八分去滓温服不拘時大黄湯出聖惠方治乳石發動大膓壅滯心膈痞滿腹痛煩熱川大黄三分剉碎微炒前胡去蘆當歸剉碎微炒枳殻麸炒微黄去穣生薑各半兩䓤白二七寸切豉一合許右細剉和匀每服半兩以水一盞煎六分去滓不計時候温服治癖猶不消惡食畏冷者更下之出肘後方大黄末芒硝各半升甘草二兩半夏黄芩芫花各一分右為散藏宻器中欲服以水八升先煮大棗二十枚使爛取四升去棗仍内藥五方寸匕攪和着火上三上三下畢分三服但一服便利者亦可停若不快更一服下候即洒粥食二升次作水飡進之不可不即食胃中虛空得熱入便殺人矣桔梗湯出聖惠方治乳石發動心膈痞滿腹内妨痛不思飲食桔梗剉炒枳實麸炒白术各二兩梔子仁一兩甘草炙剉半兩右粗搗篩每服五錢水一盞半生薑一棗大拍碎煎至八分去滓不計時候温服訶梨勒散出聖惠方治乳石發動頭痛煩悶心膈痞滿腹内妨痛訶梨勒三分煨去皮川大黄二兩半剉碎微炒前胡去蘆枳實麸炒各三分甘草半兩炙微赤剉碎右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服若腹内有結堅熱癖致衆疾者急下之出肘後方用梔子十四枚豉五合水二升煮取一升頓服之熱甚已發瘡者加黄芩二兩普濟方卷二百六十一
