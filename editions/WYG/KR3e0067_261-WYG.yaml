body:
  text: 普濟方卷二百六十一明周王朱橚撰乳石門乳石發寒熱頭痛附論夫五行五藏皆互相生肝雖處中而為藏首位在甲乙懷養懷仁故應春而王也為心之母餘藏循次而生焉心為王主身神毅而無纎不察四藏為四鄙四鄙有擾王必懷憂四藏和平則王有悅悅則榮衛不錯憂則經絡患生心不受邪所病者為憂藥能致也肺為風府施於太穹為呼吸之門氣息之道也諸藏紊亂氣息皆形誰能出不由户耶若熱風盛心憂則頭痛若過憂即心煩熱盛必寒寒盛必熱倚伏之道足可明焉皆由風狂邪熱之謂也但平風熱抑狂邪榮衛自然通泰也若乳石發動寒熱頭痛者以石熱壅積將適失度隂陽之氣不得和平也蓋陽病發熱隂病發寒一於熱則偏於陽一於寒則偏於隂時寒時熱則榮衛交爭隂陽相勝若傷寒諸瘧之狀是也且服乳石之人將息過溫榮衛壅滯氣血不和隂陽二氣更相乘尅陽勝則熱隂勝則寒隂陽不等虚實相并則生寒熱疾因其榮衛否塞石氣在於藏腑不得宣通致心肺有熱毒之氣上攻於頭則令頭痛也方麥門冬丸出聖惠方治諸石發動口乾時作寒熱似鬼神病麥門冬去心焙五兩大黄剉炒苦參葳蕤梔子仁五加皮剉黄芩去黒心犀角鎊芍藥升麻大青各一兩甘草炙三分右為末鍊蜜搜和更擣勻丸如梧桐子大每食後以蜜水下十五丸漸加至二十丸犀角丸一名麥門冬丸治乳石發動口乾寒熱似鬼神為病犀角屑五加皮剉黄芩去黒心各一兩苦參大黄剉碎微炒芍藥各一兩半大青甘草炙各三分麥門冬去心焙三分右為末煉蜜和丸如梧桐子大食後以蜜水下十五丸漸加至二十丸早晨日午晚後各一服石膏散出聖惠方治乳石發動寒熱鼻塞頭痛石膏二兩白蘚皮枳殻麩炒微黄去白𤣥參薺苨葳蕤黄芩二分前胡一兩去蘆頭甘草生剉半兩右為散每服四錢以水一盞入生薑半分葱白七寸煎至六分去滓不計時候温服葛根湯出聖惠方治乳石發寒熱頭痛後似天行四肢煩疼心躁口乾多渇不能下食葛根麻黄去根節各三分石膏二兩擣碎梔子仁三七枚甘草生剉碎用半兩甜竹葉一握生薑半兩豉一合葱白七莖并鬚右細剉以水五大盞煎至二盞半去滓分温五服不計時服芍藥湯出聖濟總録治乳石毒經二三十年發動為寒熱或慄慄似中寒者或欲食或不欲食若服紫石英發熱者熱悶昬昬喜臥起便無力皆石氣所生臟氣不和礐石發熱燥石硫黃熱鬱如熱極者身並破芍藥赤茯苓去黒皮人參藍實黄芩去黒心甘草炙微赤各一兩薺苨二兩蔓菁子一升右除蔓菁子外擣為粗末每五錢用水四盞先煑蔓菁子一合至三盞去滓次下藥末煎至一盞半去滓温三服早辰日午晩後各一服效知母散出聖惠方治乳石發動寒熱頭痛百節痠疼唇口乾焦舌卷語澁知母石膏川升麻木通剉川芒硝黄芩獨活各一兩甘草半兩生用右為散每服四錢以水一中盞半生薑半分竹茹一分黒豆半合煎至六分去滓不計時候温服麻黄湯出聖惠方治乳石發動頭痛寒熱不可解者麻黄三分去根節䜴一合甘草生用梔子仁赤芍藥薺苨生薑各半兩右細剉以水五大盞煎至二盞半去滓不計時候分溫五服升麻湯出聖惠方治乳石發熱如火頭痛寒熱煩悶嘔逆升麻前胡去蘆頭甘草炙各二兩剉黄芩去黒心三兩枳殻去瓤麩炒黄連去鬚𤓰蔞生地黄切焙三兩梔子仁十四枚右粗擣篩每服四錢水二盞入豉一合綿裹煎至一盞去滓温服早晨日午各一心煩加麥門冬一兩稍冷加生薑一兩鴨通湯出聖惠方解散餘熱白鴨通五升沸湯二斗半淋之澄取汁二斗梔子仁二十枚豉三升麻黄八兩冷石二兩一作滑石石膏三兩甘草五兩右以五味㕮咀以鴨通汁煮取六升去滓内豉三沸分服五合若覺體冷小便自利其間若熱猶盛小便赤促服之不限五合宜小營當漸進食不可食令少但勿使多耳前胡湯出聖惠方治乳石發如傷寒寒熱狀兼似瘧前胡去蘆頭黄芩去黒心甘草炙剉知母各二兩牡蠣煆石膏各三兩生薑一大片切棗三枚劈破右粗擣篩每服四錢以水一盞半煎至八分去滓温服三黄湯折石熱通氣泄腸胃解肌大黄三兩另入黄芩甘草炙各二兩梔子二七枚䜴一升麻黄一兩去節右切以水九升煮麻黄去上沫下諸藥煎取三升半下大黄三五沸去滓分服得利以瘥止麻黄湯去石毒麻黄去節三兩甘草炙二兩豉一升綿裹右切以水五升煮取一升去滓分溫再服猪膏湯大解散猪膏二兩炒豉一升右以水三升煑䜴取汁二升内猪膏服七合日三服石人飲宜清冷不宜濁熱濁熱即氣壅否唯酒須熱也香豉湯治乳石發内虚熱外風濕不解方見本門乳石發心腹脹滿類治乳石發若得時氣冷熱不調動乳者皆由寒熱所致其状似瘧久不療能損人縱服湯藥亦難瘥宜作生熟湯浴之方出聖濟總錄以温湯半浴盆如過熱投少冷水解之即於湯中坐湏㬰百節開寒熱之氣皆從毛孔中出變作流汗若心中熱悶者還服少許熱湯即定久乃出湯以衣被覆蓋睡豁然平復如患大重者不過三兩度又方若熱盛可向冷地臥腰下以厚物薦之腰以上令薄使受稍凉即起不得過度若熱解寒不解者可飲熱酒三合使解之若寒解後頭重耳鳴滿眼漠漠心下痛者用清酒二合許飲之便瘥寒温宜依此法療頭痛欲裂方取當歸二兩清酒一升煮取六合飲至再服若兢顫惡寒或寒熱如温瘧者為失食忍飢失洗不行又食臭穢故也出聖濟總錄宜急飽冷食冷水洗數行即愈乳石發苦熱解折附論夫五形之人其性各異故土形之人骨聳氣清水形之人體薄氣長木形之人筋骨麄聲圓而長火形之人性急聲尖而散其有痼疾者則先服草藥病愈後始服石必速應也凡土火二形之人性躁氣髙而肥盛多火氣若更服石益之以火物盛必衰自焚之召也若覺發發速宜下之只如痼疾之人服石者病氣久強石熱尚薄不能破其病但増其熱亦能損人若熱不已者亦可速下自餘形人服之者如有發動但以石藥投之自然而瘥不可見小熱即求大冷為山九仭功虧一簣醫者意也詳而行之方葛根湯治下石葛根紫草各八兩犀角屑十二兩露蜂房十兩炙芒硝大黄各二兩薺苨人參各七兩元參甘草炙銀屑細研四兩猪脂十二兩臘月者右以無灰酒漬經十日其猪脂用酒一升煎取脂三兩取銀屑和研内藥中每日空腹服一匙千金翼方云量力多少服之忌熱麺羊肉海藻蒜等物人參湯治雖服乳石等而常患冷此由不先服㵼湯而服石等以其病藥各在一處丹石不行則病所以依舊患冷宜依此法㵼之冷自瘥石勢行人參茯苓乾地黄當歸桔梗甘草炙芍藥各三兩大黄四兩右切以水三升煮取一升二合去滓分服之乳石發上衝頭面及身體壯熱附論夫乳石發動上衝頭面及身體壯熱者由将適過度臓腑否塞氣不得宣通也乳石之性煖而且速能捍風寒逐暑濕𨗳經脉行飲食之氣在隂則補其不足在陽則能發其火陽虚隂盛則二儀亢位所以炎上腑之受邪則表熱氣隔至隂之伏也脉形陽浮而數隂伏而沉理之於經自然通泰若炙之於經絡則血脉遄流或全抑之則乖於石性理而兼助則表裏周榮若遇小發可自勞力按摩不可即服藥大熱不已者别法隨事擇用解散方薺苨散出聖惠方治乳石發熱上衝頭目煩熱昏悶口乾心躁大小便不利心神恍惚薺苨枳殻麸炒微黄去穣各一兩犀角屑茯神地骨皮子芩木通剉元參各三兩石膏麥門冬去心焙一兩半川芒硝二兩甘草半兩生用右為粗散每服四錢以水一中盞入生薑半分煎至六分去滓入蜜半合更煎一兩沸不計時候温服黄耆湯出聖濟總錄治乳石發胸背頭中逰熱黄耆剉芍藥甘草赤茯苓去黒皮人參石膏碎生地黄切焙生薑切炒各二兩麻黄去根節湯煮掠去沫二兩桂去粗皮一兩麥門冬去心焙二兩右粗搗篩每服四錢水二盞入竹葉十片􅀥二枚擘破同煎至八分去滓温服早晨日午夜臥各一五加皮散出聖惠方治乳石發動毒氣上衝頭面煩熱小便赤澁四肢疼痛五加皮剉赤茯苓元參各一兩吳藍葉三分黄芩蘧麥柴胡去苖木通剉各一兩甘草半兩生用赤芍藥三分大麻仁一合右為散每服四錢以水一中盞煎至六分去滓不計時温服犀角散出聖惠方治乳石發熱上攻頭面四肢骨節煩疼口乾心躁不思飲食犀角屑元參知母黄耆剉葳㽔各三分赤芍藥柴胡去苖生麥門冬去心赤茯苓地骨皮各一兩甘草半兩生用右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服射干散出聖惠方治乳石發熱上攻頭面及咽喉腫塞四肢煩熱不下飲食射干犀角屑川升麻枳殻麸炒微黄去穣黄芩川芒硝𤣥參川大黄剉微炒各一兩甘草半兩生用右為粗散每服四錢以水一中盞煎至五分去滓入蜜半合更煎一兩沸不計時候温服餘甘子散出聖惠方治乳石發熱上攻頭面煩熱咽喉不利舌粗語澁大小便不通餘甘子三分紅雪三兩犀角屑一兩子芩獨活葛根剉川升麻防風去蘆甘草半兩生用右為細散每服不計時候用生地黄汁二合調下二錢薺苨散治乳石發動熱氣上攻頭面眼昏心神熱躁四肢煩疼口乾不食薺苨石膏各二兩甘草三分生用藍子半兩赤茯苓赤芍藥黄芩元參各一兩蔓菁子三合炒右為散每服四錢以水一中盞入黑豆半合生薑半分青竹葉三七片煎至六分去滓不計時候温服葳㽔散出聖惠方治乳石發動頭面熱四肢煩疼大小便壅滯葳㽔黄芩川大黄剉微炒川朴硝各一兩犀角屑川升麻大青各三分梔子仁甘草生剉各半兩右為散每服四錢以水一中盞煎至六分去滓温服以快利為度療精神如失氣攻上骨熱柴胡升麻黄芩澤㵼各三兩淡竹葉切一升生地黄切三升乾藍芒硝各二兩右切以水八升煮取三升去滓下芒硝分服取利止忌如常法前胡湯下氣除熱方見乳石發大小便不通類増損竹葉湯解散下氣竹葉切黄連麥門冬去心人參各二兩枳實炙梔子各一兩甘草炙茯苓各二兩右切以水八升煮取三升分服之瘥柴胡湯療膈上熱柴胡黄芩甘草炙茯苓麥門冬去心枳實炙生地黄各三兩竹葉切一升右切以水一斗煮取三升去滓分服黄芩湯出聖濟總錄治乳石發動身熱如火黄芩去黒心枳實去穰麩炒各二兩梔子仁十四枚栝蔞根芍藥甘草炙各一兩厚朴去粗皮薑汁炙一兩右粗搗篩每服四錢水二盞煎至一盞去滓温服早晨日午食前各一服麻黄湯療服升麻湯内解外不解者麻黄去節升麻大黄黄芩石膏各三兩甘草一兩炙梔子仁三合右切以水九升煮取三升分服之瘥一方無大黄内麻黄四兩甘草三兩餘分兩同主下氣解肌折熱澤㵼湯療腹中無妨直患虚汗澤㵼知母石膏碎各二兩當歸甘草炙人參桂心黄芩茯苓各二兩竹葉切三升麥門冬三兩去心右切以水一斗二升煮竹葉取一斗去滓下諸藥取四升分服瘥忌如常法麥奴湯出聖濟總錄治桃花石發即心噤身熱頭痛宜温清酒隨多少服之酒行即瘥亦可服大麥麨并此湯大麥奴隂乾麥門冬去心焙各二兩桂去粗皮一兩半人參甘草炙各一兩右粗搗篩每服四錢水二盞入葱白四寸同煎至一盞去滓温服早晚食前各一麥門冬散出聖惠方治乳石發熱上衝頭面口舌乾燥麥門冬去心焙石膏各三兩葳㽔葛根剉各一兩甘草半兩生用右為粗散每服四錢以水一中盞入生乾地黄一分葱白七寸豉一百粒煎至六分去滓不計時候温服療石熱将行體微篩嗇茱茰葳㽔各一兩豉心一升葱白一握右切以水四升煮取减半分服散石熱出本草以早柿生啖之治丹石發熱結出本草用紅蜀葵葉煮食治丹石發熱出本草以稷米作飯食之熱消治丹毒