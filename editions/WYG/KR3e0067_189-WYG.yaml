body:
  text: 普濟方卷一百八十九明周王朱橚撰諸血門吐血衂血附論夫口鼻之中俱出血者由因勞熱而成是以血者本屬於心經胍流行不暫停滯一闗不利百病俱生或有憂悸之所因或有卒驚之所致此皆食飽過度飲酒勞傷壅滯積蓄於心胸熱毒薫蒸於肝肺臟腑既藴邪熱則血流散上行故令吐血而致鼻衂也方天門冬湯出醫方大成治思慮傷心吐衂不止逺志去心甘草水煮白芍藥天門冬去心黃耆去蘆藕節阿膠蛤粉炒沒藥當歸去蘆生地黃各一兩人參甘草炙各半兩右㕮咀每服四錢水一盞半薑五片煎八分去滓温服不據時刺薊散出聖恵方治吐血衂血及大小便下血不止刺薊白芍藥白术人參去蘆頭生乾地黃鹿角膠搗碎炒令黄色各一兩芎藭桂心黃芩各半兩右為散不計時候以生地黃汁調下二錢竹茹散出聖恵方治吐血衂血此為内損或勞傷所致青竹茹白芍藥芎藭桂心當歸各一兩生乾地黃三兩甘草半兩炙㣲赤剉右為散每服三錢以水一中盞煎至六分不計時候温服伏龍肝湯出千金方治五臟熱結吐血衂血嘔血伏龍肝鷄子大一枚生竹茹一升芍藥當歸黃芩芎藭甘草各二兩生地黃一觔右㕮咀以水一斗三升先煮竹茹减三升下藥取三升分作三服一方有桂心人參散人參黒豆燈心淡竹茹放棒行扁栢腦茅根紫萍右等分㕮咀同煎服或為細末以紅酒調下地黃散一名生地黃飲出千金方治口鼻皆出血血上行胸心氣急及大便出血生地黃八兩蒲黃一升地骨皮五兩黃芩去黒心芍藥生竹茹各三兩右㕮咀以水八升煮取三升七合分温三服當歸湯出聖恵方治衂血吐血不止心胸疼痛當歸乾薑芍藥阿膠各二兩黃芩三兩右㕮咀以水六升煮取二升分三服一方為散以生地黃汁調二錢扁栢散治男子血旋㳂街草梔子葉地竹扁栢右等分先將蒜薑水研淺鐘飲之令睡隨後將四件用水二碗煎至淺碗服黃芩芍藥湯出醫方大成治虚家不能飲食衂血吐血一方治鼻衂黃芩白芍藥甘草各等分右㕮咀以水二盞煎一盞服一方加生薑黃耆鬱金散出聖恵方治吐血衂血不止鬱金木香飛羅麫黃蘖剉各一兩甘草一兩半炙微赤剉右為散以生地黃汁一大盞旋拌藥後焙令乾又拌之地黃汁盡為度再搗細為散不計時候煎青竹茹湯調下二錢藕汁散出聖恵方治吐血衂血不止生藕汁生地黃汁大薊汁各三合生蜜半匙右和令勻每服一小盞細細令呷之不據時候一方有牛蒡根無大薊根蒲黃飲治吐血鼻衂不止糯米炒蒲黃青黛白麫各一兩右為末水調五錢服麥門冬飲子出聖惠方治吐血衂血至一斗不止者宜服生麥門冬汁五合生刺薊汁五合生地黃汁五合右相和於銀鍋中略煖過每服一小盞調伏龍肝末一錢服茅蘇湯出直指方治吐血衂血茅花三錢紫蘇莖葉二錢右剉為㕮咀以新汲水一碗煎至七分去滓乗熱調生蒲黃二錢漸漸服仍以蒜兩顆煨熟搥扁貼敷兩脚中心少頃自覺胸中有蒜氣其血立止若下部出血可以煨蒜敷手心尤佳白芍藥散出肘後方治咯血衂血白芍藥一兩犀角末一分右為末新汲水服一錢以血止為度鷄子白丸出聖恵方治吐血衂血鷄子白三個好香墨二兩右擣蜜為末以鷄子白和丸如梧桐子大不計時候以生地黃汁下十丸蛤粉散出百一選方治吐血兼治衂血右用蛤粉白膠香等分以好松烟墨汁調服胡黃連散治吐血衂血生地黃胡黃連各等分右為末用猪膽汁為丸如梧桐子大每服五十丸臨卧煎茅花湯送下茅花湯出百一選方治吐血衂血用茅花不計多少煎湯服治吐血衂血不止用乾石榴皮末吹鼻立止蘿蔔飲一名萊菔飲出楊氏家藏治諸血熱吐血衂血用生蘿蔔取汁半盞入白鹽少許服之立效如無生蘿蔔只用蘿蔔子一分微炒紫蘇葉莖半分剉散用煎亦效一方用蘿蔔汁入鼻中治吐血鼻紅用生薑一分搗絞汁並壯徤丈夫便一升乗熱頓飲治吐血鼻衂用茅香花煎湯服之又方用陳紅米泔水一鍾温服三豆湯出朱氏集驗方治飲酒太過衂血吐血起則無事睡則甚服諸藥不效服此而愈烏豆赤小豆菉豆右各等分渾水服㵼心湯一名三黃湯出澹寮方治心氣不定吐血衂血大黃三兩黃連黃芩各一兩右㕮咀以水三升煮取一升頓服之宜食前通口服亦能治霍亂之疾神效加生地黃清水煎四服大便通利便愈或曰心氣不足可更㵼乎仲景曰若心氣獨不足不當有衂血也必邪熱因心不足以容之故吐衂也以苦泄其熱則以苦補其心蓋兩全之有是證者無不取效量虚實與之治吐血衂血出危方用山梔子燒灰榖醋調服一方用梔子甘草每服三錢煎五分温服黃芩散出聖恵方治吐血衂血或發或止皆心臟積熱所致宜服用黃芩一兩去心中黒腐為散每服三錢以水一中盞煎至六分不計時和滓温服療衂血一月者肘後方去暴驚所為出聖恵方以刺羊血熱飲之即差一方新羊血慎勿刺羊取血神道不祐當無差也鼻衂附論夫脾移熱於肝則為驚衂脾土也肝木也木本尅土今脾熱為土氣飜盛逆往乗木是木之虚不能制土故受脾之移熱也肝之神為魂而藏血虚熱則魂神不定故驚也凡血與氣内榮臟腑外循經絡相通而行於身周而復始血性得寒則凝澀熱則流散而氣者肺之所主也肺開竅於鼻熱乗於血則氣亦熱也血氣俱熱血隨氣發出於鼻為衂也診其寸口胍㣲芤者衂血􅍺㣲苦寒為衂血也寸口􅍺㣲弱尺胍澀兼弱而弱為無血必厥其人微嘔夫當眩不眩而及頭痛痛則為實下虚上實必衂也肝胍不和為衂脈隂陽錯而浮必衂血􅍺細而數及在上法當吐而不吐其面頰上小赤眼中白膚上目有細赤胍如髪直趣至黒瞳子者當衂病人靣無色寒熱脈沉絃者衂也發從春至夏為太陽衂從秋至冬為陽明衂連日不止者其尺脈必勁勁則睛上浮白白上浮黄若目睛明慧而僅衂血未止脈滑小弱者生實大者死衂血而脈小滑者生大躁者死鼻衂脉沉細者生浮大而牢者死養生方云思慮則傷心心傷則吐血衂血也孫思邈曰鼻頭衂者亡血設令㣲赤非正者死病人色白皆亡血也凡時行衂不宜斷之如一二升以上恐多者即以龍骨末吹之即愈以至九竅血俱出者謂之大衂膽移熱於腦熱盛則陽絡溢陽絡溢則衂出血汗者謂之衂衊治法各有方方尅效方出聖濟􅄣録治鼻衂甘草炙剉桑耳焙各三分枳殻去穣麩炒大黃剉炒半两麥門冬去心焙槐實炒各一兩半白芷鷄蘇葉百合黃蓍剉白前連翹㯽榔各一兩剉薑黃二兩右搗篩每服五錢水一盞半入生薑三片同煎至八分去滓温服鷄蘇丸出如宜方治肺熱腦中鬱熱衂血兼治血淋吐血口臭等證方見本門諸失血類治鼻衂及暴下血出本草右煮白茅針服之成白花者功用亦同針即芽笋也治衂血出本草用車前葉生研水觧飲之甚善治鼻衂出本草以椰子皮煮汁服之伏龍肝湯一兩治鼻衂伏龍肝半兩芎藭一分細辛去苖葉半兩白芷乾薑炮芍藥甘草炙剉吳茱茰湯浸一宿與大豆同炒去豆各一兩右粗搗篩每服三錢酒一盞煎至七八分入生地黃汁一合更煎一二沸去滓温服日三一方酒水同煎門冬飲子一名人参飲出試効方治脾胃虚弱氣促氣弱精神短少衂血吐血人參五分黃蓍二錢五味子五個芍藥一錢甘草一錢紫苑一錢半一方不用當歸身麥門冬右㕮咀分作二服每服水一􅊦八分煎一􅊦去柤稍熱服食後一方無紫苑比金丸治邪熱上攻鼻衂煩悶鬱金雪水煮令透切爆乾一兩白茯苓去黒皮白石英紫石英水銀各一分甘草生剉一分龍腦研半錢黒鉛半錢與水銀銅鍋炒右除炒子外搗研為末用黃牛膽汁和丸如彈子大每服一丸煎甘草湯放冷磨下伏龍肝散治五臟熱結鼻衂心胸煩悶伏龍肝當歸赤芍藥黃芩各二兩犀角屑刺薊各一兩生乾地黃三兩右為散每服五錢水一大盞入青竹茹一鷄子大煎至五分去滓温服加味理中湯治飲酒過多及痰炙􅏼熱食動血發為鼻衂人參白术甘草炙乾薑炮乾葛川芎各等分右為散每服四錢水一盞煎七分去滓温服蒲黃散治鼻衂蒲黃栢子仁研當歸切焙阿膠炙燥㯶櫚燒存性研亂髪灰研各一錢右搗研為散毎服二錢生藕節自然汁調下如肺損吐血用地黃自然汁調下腸風下血用檽根皮煎湯調下婦人帶下艾湯調下生地黃湯治上熱衂血生地黃洗酥二兩阿膠炒酥一兩川芎北梗蒲黃甘草生各半兩右剉碎每服三錢水煎熟入生薑汁二匙温服麥門冬散治鼻衂生地黃三錢生麥門冬三錢生薑一錢白藥蒲黃各二錢白蜜二合右搗細以井水二大碗煎七分分兩服止衂散治氣虚發衂無比神效方黃耆六錢赤茯苓白芍藥當歸生地黃阿膠各三錢右為末每服二錢煎黃耆湯下為剉散亦可生地黃湯治鼻衂生地黃八兩黃芩一兩阿膠甘草各二兩栢葉把右㕮咀以水七升煮取三升去滓内膠煎取二升半分三服睡黃散治鼻衂芡實一兩半雄黃研馬牙硝甘草生剉各半兩牛黃研一錢右為散每服二錢用猪膽汁與新汲水調下相次便睡微有汗出為效如時氣黃發舌脹咽喉腫及熱極者如前法斟酌多少服之黃連散治大人小兒熱氣盛熱乗於血血隨氣散溢於鼻者謂之鼻衂血得寒則凝澁結聚得熱則流散妄行黃連黃栢栢葉甘草各等分右為末每服二錢水一盞豉二十粒煎五分温服凉血地黃湯治榮中有熱及肺壅鼻衂生瘡一切丹毒生地黃赤芍藥當歸川芎各等分右㕮咀水煎去滓量大小加减鼻衂加蒲黃生瘡加黃芩丹毒加防風川芎三黃散治實熱衂血大黃濕紙裹蒸川芎黃連黃芩等分右為末每服二錢井水調服食後三竒散治衂血不止亂髪灰一錢人中白半錢麝香一字右為細末鼻内㗜少許立止一方不用麝香以髪灰人中白為末湯調服立止龍麝散治鼻衂伏龍肝半兩麝香一錢羊脛炭皮拍碎炒令通赤一兩右細研如粉每服二錢冷水調下或研小薊汁調下亦得眀膠散治肺積熱極衂血吐血一名伏龍肝散方見本門肺臟壅熱吐血類𫝊效衂方以竈下黃土吹斷又取井底青泥封靣上數易之又方生地黃三兩研取汁生薑半兩研取汁阿膠半兩杵碎炒令黃燥為末右以生薑地黃汁入阿膠末和勻於銀噐内煖過漸漸服之兼治吐血又方出聖恵方豉二合艾葉如鷄子大鹿角膠二兩杵碎炒黃燥右以水二大盞煎取一盞二分分三服徐徐服之地金湯出聖濟總録治鼻衂生乾地黃焙生乾藕節各二兩右細剉如麻豆每服三錢水一盞煎至六分去滓食後臨卧温服玉塵散出聖濟總緑治肺癰鼻衂白麫葉灰各三錢右研令勻分為三服食後井花水調下刺薊湯出經驗良方治鼻衂大薊根一兩相思子半兩右粗搗篩每服三錢水一盞煎至七分去滓放冷服地龍散出肘後方治鼻衂及膈上盛熱乾地黃龍腦薄荷各等分右為細末冷水調下又方出危氏方槐花烏賊魚骨各等分右半生半炒為末入鼻又驗方出肘後方以白茅新生腹中裹白胎長五六寸者取一握五升水煮取一服又芍藥末吹鼻中又方出千金方治鼻衂以冷水净潄口含水以蘆管吹二孔中一方冷水麫漿調服又方出千金方以亂髪五兩燒作灰以管吹鼻中棗核大不止益之吹以血斷止并水服方寸匕甚者日夜二已困不識人者服亦佳一方用好墨入㸃法醋井水調下又方出千金方取人屎尖燒灰水服并吹少許鼻中止一方於五月五日修同上又方出千金方又濕布薄胸止又方出千金方又淳酢和土塗隂嚢上乾易之又方出千金方以韭根葱根取汁滴鼻中着一棗大内鼻少時更着兩三度瘥葱白搗汁亦得白芨散一名世寳散出三因方治鼻衂立效嘔血咯血肺損或食飽負重得者服之愈用白芨不據多少為末冷水調用紙花貼鼻窊中效一方用雪水調如無以新汲水調自兩眉際傅至鼻上以編子𦂳繫頭摺紙繫令𦂳時醮冷水挹藥上飲項即止去藥又方出千金方用黃膠即阿膠盪令軟貼鼻窊中鼻頭至頂及髪際三寸止一方鎔膠糊鼻帛貼額上仍末雄黃綿裹内下部治舉身熱衂畫粉方出瑞竹堂方治鼻衂血出不止一二服除根用白土即畫匠所用畫粉極細研每服五錢新汲水調服止治鼻衂出經驗良方治大人小兒鼻衂乃血熱不循經而壅從鼻出也血隨其方氣而肺主氣外属鼻故出血也以春冬衂者用生地黃研取汁加蒲黃少許砂糖井花水調和侵服之愈秋夏衂者用車前草研取汁同生薑汁蜜井花水和飲之即愈先用滓塞兩鼻四時衂者生蘿蔔搗汁同生薑汁蜜和井水調飲之良四時皆可用蘿蔔汁仰頭滴入鼻中即止又方出經驗良方用伏龍肝不計多少為末以荆芥汁調下即止又方用鷄脚草捼水喫以滓塞鼻又方出經驗良方用白藥煎剉碎燒灰存性大紅􅀥剉碎燒灰存性二味為糯米飲湯温服一方煎湯洗鼻頻縮藥入鼻又方出經驗良方以青黛為丸用肥􅀥開劈去核入青黛在内濕紙包慢火煨一晌待冷細嚼新汲水吞下治鼻中出血用茅屋上青苔曰屋油以新汲水研一盞浮滓與服其血立止枇杷葉方用枇杷葉去毛焙乾為末用茶調下一二錢日三亦治鼻赤治鼻鼽血以左臂血用紙撚血㸃左眼右亦如之又方以好麻紙撚絍鼻中頃之打􅅉即愈此方甚竒有人一夕常衂盈盆百藥不效用此遂愈治衂血以燈盞數枚以百沸湯煮逐枚漉出乗熱安頂上冷即易之又蒲黃二錢先用新汲水調下老人不用次用米腦細研以熱馬糞汁調上件腦子用鵞毛羽掃入鼻中立止馬糞熱即有汁冷無汁又赤芍藥末冷水調服又五倍子一兩為末新綿燒灰等分米飲調下譙知閤患病用此而愈搐鼻方治鼻衂用駝糞不以多少用新藏缾一箇打開底入糞在内燒成灰取出研細用麝香少許研勻隨衂血鼻搐之一方無麝香為乾末搐鼻中防己散治鼻衂用防己三兩三搗羅為散每服二錢新汲水調下老兒酒調一錢服更用熱湯調少許鼻中嗅氣佳亦用糯米飲調下烏沙散一名香黑汁治鼻衂用細烟香墨二兩為細散每服一錢臘茶清調下或濃磨以葱白蘸塞鼻中或㸃入鼻内亦可一方葱汁磨墨滴鼻中吹鼻方治鼻衂吐血用栢葉石榴花為細末每用少許吹鼻中亦用花片塞於鼻中止貼背膏治鼻衂用京三稜大者一枚以濕紙裹於慢火中煨熟乗熱搥碎搗為細末醋煮麫糊調貼背第五椎上貼鼻方治鼻衂用鹿角膠不計多少以沸湯浸輭貼鼻拗上更以酵麫調令稀稠得所若左竅出血則塗右邊右竅出血則塗左邊劄耳方治鼻衂用延胡索為末以綿褁劄耳内左衂劄右右衂劄左左右俱衂則兩耳俱劄葱白汁治鼻衂血用葱白一握搗絞取汁投酒少許㸃兩㸃入鼻差衂血方用川鬱金末井水調下亦治吐血又方用槐花半生半炒末入鼻一方治鼻衂以鯉魚鱗炒成灰研為末冷調下一二錢一用頭髪燒灰㗜入鼻内先口噙水即止治鼻衂方本草用鉛白霜為末取新汲水調二字治鼻衂出血不止心悶欲絶用乾薑削令頭尖微煨塞鼻中又方用麻鞋底燒灰吹鼻孔中立效亦治鼻塞止鼻衂本草用香薷乾末以水服之治鼻衂出血兩頭不止謂之血汗以新汲水磨黃藥子一椀勿令絶稀頓服立瘥又方用藕節取汁服之或滴入鼻中又方用故屏風紙燒灰細研温酒調下一錢立止又方用貝母二兩炮黃搗羅為末以漿水調二錢服良久再服又方用榖精草為末以熱麫湯調下二錢治鼻大衂有效右用貫衆根為末調服一錢匕止鼻血有效治鼻衂右用刀刮指甲末吸入鼻内即止治卒鼻衂出聖恵方右取水一罐鑚底作小孔令射病人頂上名音門以新汲水四五罐即止音門立頂後宛中淋不過一兩罐即止乂方出肘後方右水和粉一升如粥飲之立差乂方出千金方右綿裹白馬矢赤馬矢亦好塞鼻又新馬矢悉可用甚者飲汁一二升無新者水浸乾者用新屎汁灌鼻中亦效一方用赤馬通又方出肘後方右苦酒漬綿塞鼻又方出肘後方右左孔衂縛右足小指右孔亦如之兩孔衂皆縛乂方出聖恵方療人少小亟鼻衂小勞輙止及大人小兒鼻衂血犯着便出者用桑耳不計多少炒令焦搗下毎衂發輙以杏仁大塞鼻數度即可斷又方出聖恵方右以鹽半兩炒碾為末分為二服以冷水調下未止更服又方出聖恵方右以葉搗絞取汁每服一小盞頓服即止又方出聖恵方右以胡粉炒令光黒以醋調一錢服之即止又方生地黃湯出千金方治鼻衂昏迷不省昔有婦人經血半年不行因見地黃汁飲數盃後即通利是知地黃治血甚驗又生地黃三五觔取汁使患者生喫吸汁三觔許又以其滓塞鼻湏臾血止服汁尤佳一方用一兩細剉於銀石器中以酒一中盞煎三沸去滓頓服其血立止一方煮服之忌酒炙且服粳米朱氏集驗方云昔汝州牧因驗屍有保正趙温不詣屍所問之即云衂血以數斗昏困欲絶遂使之扶腋以來鼻血如簷溜平日所記治衂數方即合藥治之血勢皆衝出謂治血莫如地黃遣人尋生地黃得十餘觔不暇取汁因使之生喫漸及三四觔又以其滓塞鼻湏臾血定後子婦吐血有醫者教取生地黃自然汁煮飲之日服數升三日而愈昔有一婢病經血半年不通見釡中飲汁以為弃去可惜輙飲數杯隨即通利地黃活血其功如此地黃但用新布拭之净搗汁勿用水洗立效散一名龍骨散出聖恵方治鼻中衂血及咯吐血不止用龍骨一兩搗碎以水一大盞煎至半盞温温盡服一方用五色者煆研細末吹一豇豆許鼻中立止又方出聖恵方用生葛根搗取汁每服一小盞三服即止又方用垣衣搗絞取汁每服一小盞頻服吹鼻散出聖恵方治鼻卒血用釡底墨細研以少許吹鼻中即止塞鼻散出聖恵方治鼻衂用蝟皮一枚燒灰細研每服半錢綿裹内鼻中數易之一方燒末吹鼻中又方出聖恵方用蒼耳莖葉搗絞取汁每服一小盞頻服又方出千金方飲小薊汁良一方用根生搗汁飲止鼻紅水出肘後方右調决眀子貼腦心黃耆芍藥湯出試効方治衂血多嵗靣黃眼澁多眵手麻木黃耆三兩炙甘草三兩升麻一兩葛根半兩羌活半兩芍藥一兩右㕮咀每服三錢水二盞煎至一盞去滓温服之十五服而愈六脉細弦而濇按之空虚其色必白而兼不澤者脫血也此大寒證以辛温補血益血以甘温甘熱滑潤之劑以佐之則愈此亡血亦傷精神七蒸方出朱氏集驗方治鼻衂鹿茸七兩分七處蒸酸􅀥仁半兩去殻石蓮肉半兩去心白茯苓一兩兎絲子一兩净洗肉蓯蓉一兩益智仁一兩去殻北茴香半兩青鹽拌勻右將鹿茸切片半分作七味用碗七隻各蒸一味以好酒一升每處用藥一味同浸一宿連碗排飯上蒸飯熟取出為度和勻焙乾為末以山藥十兩煮糊為丸如梧桐子大硃砂為衣每服五十丸至一百丸􅀥湯下獨聖散出朱氏集驗方治鼻衂用鏡靣草又名螺靨草水洗擂爛入酒濾去滓取汁服枯骨丸出指南方治吐血衂血烏賊魚骨䕡茹等分右為細末雀卵和丸小荳大每服五丸鮑魚汁下阿膠散出指南方治隂虚衂血黃耆白木桔梗甘草山藥阿膠各等分右為粗末毎服五錢水二盞取一盞去滓服煎金散出指南方治鼻衂右煎金花蓮莖葉不計多少隂乾用濃煎汁温服立效治衂血四方出十便良方一喫生葱四五莖淬赤大頭一箇於醋中時時啜之一滴水於硬地上磨大蒜作泥膏隨左右貼脚心立止仍以冷水便洗令净一𦂳紙實塞耳中此方取法於酒注也一搗諸葛菜或水蘇或蘿蔔菜取汁喫一盞治鼻衂出本草用粟米粉水煮服之鼻衂方出本草以桔梗為末水服方寸匕日四五亦治吐下血治鼻紅出本草以白茅香花塞鼻中治鼻衂出本草以珊瑚末吹鼻中止衂出本草用萆麻葉油塗炙熱熨􅇟上治鼻衂出本草以金鎗小草葉挼碎付之又風化石灰杵為丸日乾臨時刮敷山根上治鼻衂出本草右取壁錢蠱汁㸃鼻中乃壁結網蜘蛛如錢圓者是也又方出旅善備要方治鼻衂右取青蒿塞鼻中即止治鼻紅吐血淋疾出本草右以船底苔并炙甘草豉汁濃煎湯旋呷治鼻衂出血數升不知人事右石榴花與栢葉等分為末吹鼻中鼻血不止附論夫榮氣之行常與衛氣相隨則氣與血未嘗相離肝藏血肺主氣榮衛和平則氣血順治若人腑臟有熱乗血氣血性得熱流溢妄行而肺開竅於鼻故其發於鼻衂鼻衂不止者臟虚血盛故也内經又云脾移熱於肝則為驚衂蓋脾土也肝木也今脾移熱於肝則木不能克土肝臟血其神魂悸故成衂血之病方鷄蘇飲出聖濟總録治衂血不止鷄蘇白茯苓去黒皮射干各一兩半白芷桔梗炒天門冬去心焙當歸切焙大黃剉炒甘草炙各一兩桂去粗皮半兩右㕮咀每服二錢以水一盞生薑三片煎取六分去滓空腹温服紫參湯出聖濟總録治鼻衂不止紫參蒲黃生地黃各二兩黃芩去黒心赤茯苓去黒皮赤芍藥當歸焙各一兩甘草炙一兩半右剉如麻荳大每服三錢水一盞入阿膠二片炙令燥同煎至七分去滓温服不據時候刺薊湯出聖濟總録治鼻衂不止刺薊黃芩剉炒赤芍藥各三分大黃剉炒蒲黃二兩側栢葉四兩生乾地黃焙甘草炙剉各五兩右為粗末搗篩毎服三錢水一盞煎至七分去滓温服若急以新汲水調下刺薊散出聖恵方治鼻衂血出經日不止刺薊苦參黃連去鬚梔子仁生乾地黃川大黃剉碎微炒側栢葉各一兩右為散每服五錢水一大盞入青竹茹半鷄子大煎至五分去滓温温頻服茜根散出聖恵方治鼻衂日夜不止靣無顔色昏悶生乾地黃半兩赤芍藥三分栢葉一兩阿膠半兩杵碎炒黃燥當歸半兩赤茯苓三分右為細散每服煎黃耆湯調下二錢蒲槐散出聖濟總録治鼻衂不止蒲黃槐花各半兩防己人參各一分右搗研為散每服一錢新汲水調下食後服子芩散出聖恵方治鼻衂不止子芩一兩蒲黃伏龍肝青竹茹各三分右為散每服三錢水一盞煎至六分去滓入生藕汁一合攪勻温服地黃丸出千金方治鼻出血不止乾地黃梔子甘草等分右治下篩酒服方寸匕日三如鼻疼者加豉一合鼻有風熱者以葱汁和丸如梧桐子大五丸麝香散出醫方大成治鼻衂不止白礬枯過另研半兩麝香另研半字白龍骨粘舌者另研半兩右令勻每用一字先令冷水净洗拭去鼻内血洟然後吹藥於鼻中或以軟止濕過蘸藥鼻内尤妙麝香散出聖濟總録治鼻血不止麝香二錢滑石木人中白各半兩右同研為散每服二錢熱酒調下一方有銀硃無滑石每用少許鼻搐之立效厚樸丸出聖濟總録治鼻衂不止厚樸去粗皮瓦并沙薑糞堆土𤓰苖心右等分搗羅為末蜜為丸如鷄頭大每服三丸葱一握細切麫一匙鹽半錢同炒黃沸湯㸃下天竺黃散出聖濟總録治鼻衂不止天竺黃芎藭各一兩防己半兩右搗研為散每服一錢新汲水調下肺損吐血者用藥二錢匕生麵一錢匕水調下並食後服千針散出聖濟􅄣録治鼻衂不止刺薊木賊各一分白麫一錢右為散每服一錢研青蒿心七枚新水調下併二服五苓散出如宜方治夏月伏暑鼻衂不止澤㵼二兩半肉桂一兩白术猪苓赤茯苓各一兩半右為末同百草霜末茅根煎湯下又方出聖恵方生地黃汁一升白蜜半兩蒲黃二兩右相和微煖過每服一小盞頻服之三汁飲出聖恵方治鼻中血出不斷心欲悶絶刺薊汁二合生地黃汁一合生薑汁半合右調和令勻徐徐飲之仍將滓塞鼻中生葛散出濟生方治鼻衂不止生葛根小薊根各半觔右洗净搗取汁每服一盞盪湯服不據時候又方出朱氏集驗方治鼻衂不止生蒲黃二錢青黛半錢右用生藕汁作一服調下一方用井花水調下又方出海上名方黃藥子蒲黃右等分為細末每服二錢新汲水調下玉粉散出聖恵方治鼻衂日夜不止頭痛心煩石膏研牡蠣旁研令極細如粉各一兩右研勻為散每服二錢新汲水調下候血滴間斷時再以水調藥如稀糊滴鼻内鷄蘇散出聖濟總録治鼻衂不止鷄蘇二兩防風去入一兩右為散每服二錢温水調下更以鷄蘇葉於新水内揉輭内鼻竅即止二花散出聖濟總録治鼻衂不止酸石榴花一分黃蜀葵花一錢右為散每服一錢水一盞煎至六分不據時候温服車前散出聖濟􅄣録治鼻衂不止欲死車前子末牛耳中垢等分右和成挺子塞鼻中立止柳枝散出聖濟􅄣録治鼻衂不止人參一分寒食楊柳枝門旁揷者是也右為散每服一錢新汲水調下併二服參蓮散出聖濟總録治鼻衂不止人參一錢蓮子心一錢右為散每服一錢新汲水調下通神散一名伏龍肝散治衂血不止心神悶亂頭旋欲倒出聖恵方亂髪燒灰伏龍肝等分右研為散每服三錢新汲水調下蝸牛散出聖濟總録治血熱衝肺鼻衂不止蝸牛􅏼乾一分烏賊骨半錢右搗研為散含水一口搐一字入鼻内吹鼻散出聖濟總録治鼻衂血不止茅花十莖亂髪一小團右燒為末研匀每以少許吹鼻内又方出聖恵方羊脛炭皮二兩搗碎醋拌燒令通赤故紙三十張多年者燒灰右研細為散以新汲水調下三錢龍骨散出聖恵方治鼻衂不止胘冐欲死吹鼻龍骨半兩亂髪一鷄子大燒為灰右研如粉以少許吹入鼻中立止小梔散出朱氏集驗方治鼻衂不止昏悶欲死右山梔子不據多少燒為細末每用少許吹入鼻中立止一方用竹刀破作兩邊一邊用濕紙裹煨令熟一邊生用同研為末酒調服一方曽服燒煉藥方致鼻血者生用煎湯觧之葵手涯云同官無錫監酒趙疪兄衂血甚已死入殮血尚未止一道人過其門聞其家哭詢問其由道人云是曽服丹或燒煉藥予有藥用之即活囊間出藥半錢七吹入鼻中立良久得活萊菔飲出危氏方治鼻衂不止右用蘿蔔不據多少搗取自然汁每服一盞入鹽少許冷服不據時候或滴汁少許入鼻中亦用藕汁亦可一方無灰酒服扎指方出濟生方治鼻衂不止右用線𦂳扎中指中節如左鼻出血扎左手中指中節右鼻出血扎右手中指中節兩鼻出血左右俱扎之治鼻衂不止右滑石白帶青色者為末和米飲服之又白茅花無花以根煎湯嚥蘇合香丸鷄蘇丸男女皆可服又方出海上方用蘆花燒灰吹少許入鼻内即止栗灰散出聖濟􅄣録治鼻衂不止右用宣和大栗子七枚逐一微利破連皮燒存性碗蓋候冷入麝香少許同研每服二錢温水調下黃藥散出肘後方治鼻衂不止右黃藥子一兩為散每服二錢煎阿膠湯調下良久以新汲水調生麫一匙投之法紙散出聖濟總録治鼻衂血出不止右病人衂血時以紙接血候滴滿紙將紙燈上燒作灰每一張作一服新汲水調下不得令病人知燈心散出聖濟總録治鼻衂不止右用燈心一兩焙搗羅為散入丹砂一錢研每服二錢用米飲調服下當歸散出聖濟總録治鼻衂不止右用當歸切焙搗羅為散每服一錢米飲調下大蒜貼足方一名一金散出肘後方治鼻衂不止諸藥不驗右用大蒜一枚去皮研細攤作餅子如錢大厚一寸許若左竅出血貼於左脚心下綿繫定右竅即貼右脚心兩竅俱出即俱貼之血止即以温水洗脚心令去蒜氣一方以摩手心亦可治鼻衂不止出聖濟總録右用元眀粉以冷熱水調臨卧服二錢差又方出聖恵方右楮葉搗絞取汁一二升漸漸温飲之即止如未止再服治鼻衂不止欲絶者出經驗良方右以茅花無以根每服一大把細剉水兩碗煎濃至一碗分二服一方用黃茅根為末米泔水調下又方出本草右萱草根洗净研汁一大盞生薑汁半盞相和時時細呷治鼻衂不止胸中痞悶出聖恵方右以生水蘇即鷄蘇五合香豉二合合杵研搓如􅀥核大内鼻獨聖散出肘後方治鼻衂不止服藥不應右用糯米微炒黃為末每服二錢新汲水調下治鼻血出不止出肘後方右以醋和糊粉半棗許服治鼻衂乆不止出聖濟􅄣録右以定州白瓷細搗研為末每抄一剜耳許入鼻内立止治鼻衂連日夜不止眩冐欲死灌鼻方出聖恵方右用青葙草不限多少細剉搗絞取汁一兩合合少灌入鼻中即止一方用子又方出聖恵方用生姜研汁滴入鼻中立止治鼻衂屢醫不止出聖恵方右用栗殻五兩燒灰研為末每服二錢以粥飲調服神白散出楊氏家藏方治鼻衂不止蛤粉一兩研羅五七遍槐花半兩炒合焦研為末右研令極匀細每服一錢新汲水調下小兒只用半錢兼治便血不止不據時候寸金散出衛生實鑑治鼻衂不止石州黃藥子半兩土馬騌墻上有者是甘草生各一分右為細末每服二錢新汲水調下未止再服立止治鼻衂不止或素有熱而暴作諸藥無驗出試效方以白紙一張作八牒或十牒於極冷水内濕紙置頂中熱熨斗熨至一重或二重紙乾乾立止治鼻衂出血數升不知人用生茅根取汁每服一合立止又方用艾灰吹鼻中治鼻衂不止但服洗心散立效治鼻血不止用龍鱗薜茘研水飲之大薜茘亦可普濟方卷一百八十九
