女琥珀一兩細研以醋三升熬如膏䖟蟲去翅足炒黄水蛭炒黄各半兩肉桂去麬皮川大黄生用各三兩桃仁一兩去皮尖雙仁别研生用右為末以琥珀膏和丸如梧桐子每服空心以温酒下三五十丸一方以釅醋三升熬藥芫菁丸治婦人月水不通小腹宿血積滯芫菁微炒硼砂水銀以小棗肉研令星盡各一分牛膝去苖藕節桂心各半兩右為末研入水銀令匀用醋煮麵糊丸如菉豆大每日空心以温酒下三丸如小腹澁痛即用滑石梔子等分煎湯浸之服紫石英散治婦人月水不通三年内者宜服紫石英硃砂各研細水飛過虎杖剉細甆末滑石已上各半兩斑猫十枚糯米炒令黄去翅足右為細散都研匀空心以温酒調下一錢至巳時小便先澁痛即惡物下如鷄肝穿山甲丸治婦人月水不通腹脇痛疼穿山甲沒藥延胡索當歸剉微炒硼砂已上各半兩狗膽二枚乾者右為末以竹筒内盛飲甑中蒸三遍入煉蜜丸如菉豆大每於食前温下十丸當歸散治血脉不通當歸穿山甲各等分右為細末研停每服二錢熟酒調下如不飲酒薄荷醋湯亦可地黄丸治血不通生乾地黄二兩柴胡秦芁黄苓各半兩赤芍藥一兩右為末煉蜜丸如梧桐子大每服三十丸烏梅湯吞下不拘時候日三昔宋禇證療師尼寡婦别製方盖有謂也此二種鰥居獨隂無陽欲心萌而多不遂是以隂陽交争乍寒乍熱全類温㿉則為勞嘗讀史記倉公傳載濟伏王侍人韓女病腰背痛寒熱衆醫皆以為寒熱也倉公曰病得之欲男子而不得也何以知其欲男子而不得診其脉弦出寸口是以知之盖男子以精為主婦人以血為主男子精盛則思室婦人血盛則懐胎肝血隔故無子厥寒隂弦寸口又上魚際則隂血盛可知故禇證之言信有驗矣斑猫散治婦人月水不通時作寒熱食少體瘦斑猫糯米中同炒令黄去翅足一分川大黄三分剉㣲炒水蛭一分炒微黄當歸三分剉㣲炒䖟蟲一分炒令黄去翅足右為末散每服於食前以温酒調下一錢水銀丸治婦人月水不通心腹滯悶四肢疼痛水銀以小棗肉研令星盡半兩硼砂細研半兩硃砂細研半兩巴豆十枚去皮心研紙裹須壓去油右都研匀以狗膽汁和丸梧桐子每日空心温酒送下三丸水蛭丸出聖恵方治婦人月水不通心腹滯痛四肢疼痛水蛭十枚炒微黄川椒去目及閉口者微炒出汗硼砂細研狗膽乾者各一分獺膽一枚乾者右為末以醋煮麵糊和丸如菉豆大每於食前當歸酒下五丸治婦人月水不通長年淤阻不得安處徃徃忽如顚狂徹夜不得睡小便赤大便如常若大腑熱更加大黄三分醋煮如前出䕶命方當歸牡丹皮去心木通草半夏鼈甲醋炙柴胡荆芥穗羗活各一分䖟蟲二十箇去翅水蛭十條連翹三分右為末羅細每服三錢熱湯半盞對童子小便半盞同煎一兩沸㵼出食後喫服此藥後經候行則病勢減半次便喫清心氣藥後即便喫安神思藥令得睡大抵此病起於心故煩躁後不得睡須此三方藥然後可治也桃仁煎出千金方治帶經下閉不通方見本門瘕癥積聚類治月經不通甚極閉塞出千金方牛膝一斤麻子三升蒸土𤓰根桃仁三升右㕮咀以好酒一斗五升浸五宿一服五合漸加至一升日三服牡丹牛膝散一名桃仁散治婦人室女血閉不通五心煩熱紅花三錢半當歸五錢牡丹皮五錢桃仁去皮尖炒别研二錢半右為細末每服二錢空心温酒下麒麟竭散出聖濟總録治婦人經候結滯不通麒麟竭鯉鱗甲炙焦水蛭炒䖟蟲去翅足炒各半兩右為散水和成塊外用濕麫裹炮焦取出藥研為散每服一錢匕煎當歸酒調下空心食前凌霄花湯出聖濟總録治婦人血閉不行臍下鞕痛及腰痛不可忍凌霄花去蕚一名紫葳芫花釅醋炒焦紅藍花各半兩沒藥一分研右搗篩每服一錢水一盞煎至六分去滓食前熱服硼砂丸出聖恵方治婦人月水不通心腹多痛硼砂一兩桂心當歸剉㣲炒各半兩斑猫一分糯米拌炒令黄去翅足右為末用軟飯和丸如菉豆大每服食前以温酒下五丸服此藥如小便澁宜服後方又方出聖恵方瞿麥木通燈心滑石甘草炙微赤剉各一分右為散以水一大盞煎至六分去滓分二服以小便利為度盪滯散治婦人經脉不通斑猫一枚去頭翅足炒大黄剉炒三分水蛭糯米内炒熟去米䖟蟲炒各一分右為散研匀狗膽酒調下半錢烏金散出聖恵方治婦人月水不通心神煩悶腹脇氣脹宜服亂髪一兩須是丈夫者剪細不蛀皂莢一挺肥者寸剉神麯三兩赤鯉魚鱗大麥蘗各一兩右藥入在一甆瓶子内實填口上安一團瓦子盖瓶口用紙筋泥固濟俟乾先用慢火熁後著大火燒令通赤去火候冷取出入麝香一錢同研令細每服於食前温酒調下一錢治女子血脉不通出肘後方用石榴根東方者取一握炙乾濃煎一盞服瘥婦人赤白帶下同治紅花散出朱氏集騐方治婦人經脉不通如血膈者二十服効好紅花細蘇枋木搥碎當歸右等分㕮咀每用一兩以水一升半先煎花木然後入酒一盞併當歸再煎取半分兩服空心食前温服烏藥散一名㙈蟲散治婦人心隔迷悶腹臟撮痛氣急氣悶月信不通等疾方見本門月水不調類三物湯治月經不行四肢虚腫人參茯苓各一兩白术二兩右㕮咀水一盞半棗子肉一箇煎食前服金花散出聖惠方治婦人月水久不通心腹煩悶四肢痛弱桂心一兩半斑猫一兩去翅足麝香一錢細研右藥先用水和白􅋗裹斑猫以慢火畨覆燒令烟盡放冷浄去却焦麵取斑猫灰與桂心末及麝香同研令細每五更初用煖酒調下一錢服藥後或憎寒壯熱腹内撮搊疼痛或小便似淋勿怪此是藥行須臾即通如未快通即隔日再服烏金散出聖惠方治婦人月水不通童男髪童女髪斑猫三十七枚糯米拌炒令黄去翅足右藥入麝香一錢同研令細每於食前以熱酒生薑調下一錢白芷散出聖濟總録治婦人月事不通白芷