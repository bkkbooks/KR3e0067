酒五升和煎令如餳每服一合消急為度不知則加月水不通腹内癥塊夫婦人隂陽不調勞傷血氣風冷傷於衝任之脉并手太陽少隂之經故令月水不通也夫血得温則宣流得寒則澁閉既為風冷所乗則血積在内因其飲食不化結聚相搏成其癥塊也方紫葛散出聖惠方治婦人月水不通腹内有癥塊發來攻心腹刺疼痛喫食减少四肢羸瘦紫葛剉牛膝去苗荆三稜微煨剉當歸剉微炒芎藭赤芍藥丹皮已上各三分鼈甲塗醋炙令黄去裙襴一兩桂心蒲黄桃仁湯浸去皮尖雙仁麩炒微黄木香各半兩䖟蟲一分炒黄去翅足川大黄一兩剉微炒右為散每服三錢以水一中盞入生薑半分煎五分去滓每於食前稍熱服之硇砂丸出聖惠方治婦人月水不通久成癥塊時攻心腹疼痛硇砂沒藥麒麟竭乾漆搗碎炒令烟出竈突墨延胡索各一兩䖟蟲炒微黄去翅足水蛭炒微黄各半兩鯉魚鱗灰二兩麝香一分細研右為細散入麝香等研令勻每於食前以熱酒調下大黄散出聖惠方治婦人月水不通腹内有癥塊或時寒熱漸加羸瘦宜服川大黄二兩剉微炒牛膝去苗鼈甲塗醋炙令黄去裙襴桃仁湯浸去皮尖雙仁麩炒微黄桂心當歸剉微炒白术芎藭防葵各三錢右為散每服三錢以水一中盞入生薑半分煎至五分去滓每於食前稍熱服凌霄花丸出聖惠方治婦人積年血塊兼月水不通神効凌霄花醋拌炒令黄水蛭炒令微黄雄雞糞微炒各一分荆三稜微煨炒木香斑猫十枚糯米拌炒令黄去翅足芫花炒令微黄薑黄硇砂各半兩右為末用糯米飯和丸如梧桐子大空心以温酒下七十丸服藥後覺寒熱小腹内及連腰疼痛當下惡物即瘥如未應即隔一日再服鼈甲丸出聖惠方治婦人月水不通漸為癥為塊日漸羸瘦面上班㸃不能飲食鼈甲塗醋炙令黄去裙襴川大黄剉微炒各二兩防葵木香乾漆拍碎炒令烟出桃仁湯浸去皮尖雙仁麩炒微黄麝香一分細研陳橘皮湯浸去白穰焙各一兩右為末都研令勻用釅醋和如稀膏入甆器中以重湯煮看稀稠可丸即丸如梧桐子大每於食前以温酒下十丸漸加至二十丸為度防葵丸出聖惠方治婦人月水不通結為癥塊時攻心腹疼痛防葵一兩沒藥乾漆搗碎炒令烟出硇砂細研薑黄各半兩水蛭一分炒令微黄狗膽一枚乾者芫花一分醋拌炒令乾右為末用糯米飯和丸如菉豆大每服五更初以熱酒下七丸良久當下惡物如未即次日再服琥珀散出聖惠方治婦人月水不通積成癥塊四肢羸瘦琥珀細研乾漆搥碎炒令烟出川大黄剉微炒各一兩芫花醋拌炒令乾當歸剉微炒黄蘗微炙剉桂心各三分右為細散每於食前以熱酒下一錢水銀丸治婦人月水不通結成癥塊多攻心腹疼痛不思飲食日漸羸瘦水銀用大棗肉研令星盡硃砂細研水飛過麒麟竭硇砂研雄黄各半兩麝香一分狗膽二枚取汁入醋一大盞熬如膏右為末用狗膽膏和丸如菉豆大五更初以温酒下七丸如人行十里更用熬酒一盞投之惡物當下如未即次日再服砒霜丸治婦人月水不通結為癥塊腹内疼痛面色痿黄砒霜膩粉各半兩硇砂一分巴豆二七枚去皮心麩炒出油斑猫二七枚糯米炒去翅足狗膽一枚用汁芫花一分醋拌炒乾别杵為末右為末以醋一大盞熬芫花狗膽為膏和丸如黍米大每日空心以温當歸酒下五丸芫花根散治婦人月水不通漸為癥塊芫花根黄泥裹燒令赤將土盆合少時去泥乾漆搗研炒令烟出桃仁湯浸去皮尖雙仁麩炒微黄各一兩桂心黄蘗剉各半兩右為細散毎於食前以生薑湯調下二錢桃根煎治婦人數年月水不通面色萎黄唇口青白腹内成塊腹肋筋脹腿脛或腫桃樹根牛蒡子根馬鞭草根牛膝去苗蓬蘽已上各一两右藥都剉以水三斗煎取一斗去滓更於浄鍋中以慢火煎如􅄳盛於甆器中每於食前以熱酒調下半大匙又方治婦人月水滯澁不通結成癥塊腹肋脹大欲死用牛蒡子根二斤細剉蒸三遍用生絹袋盛以酒二斗浸五日每於食前煖一小盞服之又方用蓬蘽根五斤細剉水五斗煎至一斗去滓别於浄器中熬成膏每於食前以酒調下半匙桂心酒出千金方治婦人月經不通結成癥塊桂心丹皮芍藥牛膝乾漆土𤓰根牡䝉各四兩吳茱萸一升大黄三兩黄芩乾薑各二兩䖟蟲二百枚䗪蟲蠐螬水蛭各七十枚亂髮灰細辛各一兩殭蠶五十枚大麻子竈突灰二升乾地黄六兩虎杖根鼈甲各五兩菴䕡子三升右㕮咀以酒四斗分兩瓮浸之七日併一瓮盛攪瓮調還分作兩瓮初服二合許加至三四合治婦人月水滯澁不快通結成瘕塊脹大欲死出聖惠方用馬鞭草根苗五斤剉細水五斗煎至一斗去滓别於浄器熬成膏毎於食前温酒調下半匙一方莖葉搗絞汁温酒調下又方治婦人血結月閉石淋用水松葉苔茸食之良主水腫生海底吳都賦云石水松是也紅花血竭丸出楊氏家藏方治婦人衝任不和血海虚冷經候不通結成堅塊時作腹痛沒藥半兩别研當歸一兩酒浸一宿焙乾為末滴乳香别研血竭别研琥珀别研各二錢半右件並研令勻以紅花二兩酒半升熬紅花色淡濾去滓再將紅花酒熬成膏搜藥末和丸如梧桐子大每服一十五丸煎枇杷葉湯送下空心食前六合湯出醫方集成治婦人經事不行腹中結塊腰腿重痛當歸去蘆酒浸白芍藥官桂去皮熟地黄洗川芎蓬术炮各等分右㕮咀每服四錢水一盞煎七分空心服和血通經湯出衛生寶鑑治婦人室女腹受寒月事不來惡血積結堅硬如石當歸五錢熟地黄三錢木香三錢血竭一錢另研肉桂三錢紅藍花二錢廣茂四錢炮貫衆荆三稜蘇木二錢右件除血竭另研外為末和勻每服三錢熱酒一盞調下食前鹽湯調下亦得忌一切生冷物及當風大小便治月經不通結成瘕如石腹大骨立宜此破血下癥出千金方大黄消石各六兩巴豆蜀椒各一兩代赭柴胡熬變色水蛭丹參熬令紫色土𤓰根各三兩乾漆芎藭乾薑䖟蟲茯苓各二兩右為末巴豆别研蜜丸如梧桐子大空心酒服二丸未知加至五丸日再服千金翼無柴胡水蛭丹參土𤓰根牛膝湯出聖濟總録治婦人逾年月水不通臍下結塊牛膝酒浸切焙牡丹皮芍藥炒當歸切焙柴胡去苗芎藭鼈甲去裙襴醋炙羌活去蘆頭桃仁去皮尖雙仁炒黄陳橘皮湯浸去白焙白薔薇根附子去麄皮半兩炮製荆三稜一兩半桂去麄皮半兩右㕮咀如麻豆大每服五錢水一盞半煎至七分去滓温服空心食前當歸散出聖濟總録治婦人寒搏月水不通腹中氣滿結塊寒熱當歸切焙桂去粗皮乾漆搗炒令烟出各一兩䖟蟲去翅足炒水蛭糯米同炒米熟去米芍藥細辛去苗葉黄芩去黒心萎蕤甘草大黄三兩右粗搗篩每服三錢酒一大盞煎至六分去滓下芒硝二錢烊盡再煎令沸温服食後活血調經湯出得生堂専治婦人經候閉塞不通漸成癥瘕血塊者本方經騐當歸赤芍藥生地黄川芎生牛膝廣荗炒三稜官桂乾漆剉研酒炒桃仁去皮尖紅花各一兩右㕮咀每服四錢水一盞半酒一小匙杓同煎八分去滓空心温服紫葛丸出聖濟總録治月水不通臍下結塊漸􅁴羸瘦不能飲食紫葛剉菴䕡子牛膝酒浸切焙各一兩半水蛭一十枚熬桃仁去皮尖雙仁四十九枚熬赤芍藥鼈甲去裙襴醋炙各二兩牡丹皮一兩一分瞿麥穗一兩桂去粗皮二分右為末煉蜜和丸如梧桐子大空心服煎茅根㯽榔湯下二十丸日再服漸加至三十丸虎杖湯出聖濟總録治月水不通腹中結塊㽲刺疼痛虎杖木通牛膝酒浸切焙各二兩茅根二兩桃仁去皮尖雙仁炒四十九枚大黄三兩半剉炒芒硝紫葛丹皮去心各一兩半右粗搗篩每服三錢水一盞煎至七分去滓温服空心食前服琥珀丸治月經閉不通腹中成塊水蛭石灰炒䖟蟲去翅足糯米炒琥珀各半兩芫花醋浸焙乾桃仁浸去皮尖當歸酒浸去蘆桂枝不見火大黄各一兩右為細末大黄醋熬成膏和為丸如梧桐子大每服三十丸空心蘇木酒下牛膝湯出聖濟總録治月水不通血氣澁滯結成堅塊牛膝切焙酒浸䖟蟲去翅足炒大黄剉炒黄芩去黒心各半兩水蛭炒土𤓰根各一分半桃仁去皮尖雙仁炒一兩朴硝三分右粗搗篩每服三錢水一盞煎至七分去滓温服空心食前服丹砂丸出聖濟總録治婦人月水不通肢節煩痛寒熱徃來腹脇結塊攻刺疼痛日漸羸瘦欲變成癆丹砂研水銀硫黄各二錢二味同結成砂子用硇砂研膩粉各一分雄黄研一字斑猫二十一枚去翅足麩炒焦為末右件同研勻以狗膽汁和作四十九丸每服一丸空心臨卧炒鉛丹少許以酒半盞調勻燒秤錘蘸鉛丹酒微焦黑色熬温下或産後血露不快腹内疼痛皆可服桂枝桃仁湯出大全良方治氣鬰乗血經候頓然不行臍腹㽲上攻心脇欲死或因不行結積漸漸成塊臍下如覆杯久成肉癥不可復治由驚恐憂思意所不快氣欲抑而不舒則乘於血隨氣行滯則血結以氣主先之血後之宜服桃仁桂枝湯下積宜服地黄通經丸已成塊者宜服萬病丸桂枝芍藥生地黄各二兩桃仁炒五十枚甘草一兩一方不用右為末每服五錢水二盞薑三片棗二箇煎一盞去滓温服一方無薑棗煎地黄通經丸出大全良方治證與前桂枝桃仁湯同熟地黄二兩䖟蟲去頭翅足炒水蛭糯米同炒黄去糯米桃仁炒各五十枚右為末煉蜜丸如梧桐子大每服空心温酒下五丸塊消為度未知加至七丸又方出聖惠方治月經閉塞不通結瘕腹大如甕短氣欲死虎杖一斤去頭土暴乾切土𤓰根牛膝各取汁二斗右㕮咀以水一斛浸虎杖根一宿明旦煎取二斗内土𤓰牛膝汁攪令調勻煎令如􅄳每以酒服一合日再夜一宿血當不閉病去時休服萬病丸出㧞萃方治女人月經淤閉月候不來繞臍寒疼痛徹及産後血氣不調腹中生瘕結而不散臍下堅結大如杯升發熱徃來下痢羸瘦此為血瘕若生肉癥不可為也并治癥瘕等病乾漆杵碎炒令火烟出待至烟頭青白如此一時久牛膝去苗酒浸一宿焙各一兩右為末以生地黄汁一升入二味藥末銀器内慢火熬侯可丸即丸如梧桐子大每空心米飲下或温酒下二丸日再勿妄加病去止藥婦人氣血虛經不行若服破血行經藥是殺之也謹之治月經不通臍下堅結大如杯升發熱徃來下痢羸瘦此為氣瘕按之若牢强肉瘕者不可治未成者可治出千金方生地黄二十斤取汁乾漆一斤為末右以漆末内地黄汁中微火煎令可丸如梧桐子大每服三丸酒下未通加之常以食後服治婦人經候不來數月臍腹疼痛或有一塊上下相疰飲食减少腹滿惡心大便秘澁者宜服通經丸用菖蒲馬鞭草煎湯送下四十丸兩服便通治室女月水不通血結成塊多攻心腹疼痛宜服此方質汗薑黄川大黄剉微炒各半兩右為細散毎於食前以温酒調下一錢治婦人血閉腹内血塊用乾棗木皮酒煎服之普濟方卷三百三十三
