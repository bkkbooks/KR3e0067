body:
  text: 普濟方卷三百三十三明周王朱橚撰婦人諸疾門月水不通附論夫婦人月水不通者由勞傷血氣致令體虚受風冷邪氣客於胞内傷損衝任之脉并手太陽少隂之經致胞内血絶不通故也衝任之脉起於胞内為經脉之海手太陽小腹之經也手少隂心之經也此三經為表裏主上為乳汁下為月水風冷傷其經血血得温則宣流得寒則澁閉偶為風冷所搏故血結於内令月水不通也又云腹中鳴則月水不來病本在胃胃氣虚不能消化水穀使津液不生血氣故也又云醉後入房則力氣竭絶傷肝使月血不來所以然者肝藏月血勞傷過度血氣枯竭於内也又先唾血及吐血下血謂之脫血名曰血枯亦月水不來所以然者津液減耗故也但益津液其經自下也診其腎脉微澁者是月不通也及左手關後盡内浮為陽絶無膀胱脉也月水必閉又肝脉沉而急診之亦然時小便難若頭眩痛腰背痛足寒時疼月水不來時或得之必有所阻滯也月水不通乆則血結於内生塊血瘕赤則血癥血水相并壅不通脾胃虚弱變為水腫也所以然者脾候身之肌肉長於土土克消於水水血既并脾氣衰弱不能尅消故水氣流溢浸漬肌肉故滿也又云經脉不通日乆此非細事實為沉病若是室女經脉不通初因貪食酸醎之物遂致血脉乾涸變成勞病若因經脉正行誤食熱麵生冷勞傷遂成此疾腹内顆塊不早治時日稍深必見困篤夫血寒則閉熱則停温則流胗其尺脉滯者是也微弱者本原不足沉弱者小便必時痛而有癥瘕若滿盛者有姙也若是室女月事不行必因多食鹽酸致斯若乆不宣變勞疾過月信而仍誤食生冷熱麵或酸入於胞而其氣内隔因而阻滯非時腸鳴必使月信不來體病胃受風冷虛而不分水穀使津液不生血氣不成也凡月閉之疾但服琥珀丸肌瘦而利飲者血熱相搏也宜服黄良丸面白體肢浮腫脾氣弱而不能制血三聖丸及三物湯主之再候小腹急病痛或作顆塊而誤認為胎此為血癥因血經行入房故也琥珀丸主之産後日久月信不通其故縁氣血耗散不是風寒擊搏而内攻也是血凝滯而不行久不治之便為血瘕使人肚如覆杯其體如水腫是脾虚而血水相併有塊者與琥珀丸如腫如蠱者與沒藥丸身腫者與九霄丸三物湯女子十四天癸至任脉通月事以時下故令有子天癸者物之自然月者以月至經者有常也其來不可過與不及多與少反此皆胃之故也不行尤甚者有疾生焉血既不能滋養百體則髪落面色身羸瘦血虚則熱發故身多熱水不足則燥氣燔則金受邪金受邪則肺家喇喇變為肺痿肺癰必矣醫見經不行則用䖟蟲水蛭等行血藥見熱則用除熱諸寒藥實出妄意熱中不行以藥行之為害滋大經水枯竭則無以滋養其能行乎譬猶索萬金於乞丐之人雖箠楚並下不可得也但服以養氣益血諸藥天癸自行又有一種婦人實盛月經瘀閉利之則行矣又云月水不通者所致不一有食不化血㣲不通有先期太過後期不通有大病後熱不通寒凝結滯不通有積聚氣結不通有心氣抑滯不通凡此所受不同治亦異盖婦人假血為本以氣為用血氣稽流則澁而不行其為病或寒或熱臍腹堅痛肌肉消瘦乆則為勞瘠之證凡婦人月水不來室女亦同内經曰謂月事不來皆是脬脉閉也脬脉者屬心而絡於脬中令氣上通於肺心下不通故月事不來也可用茶調散吐之次用玉燭散芎藭湯三丸湯桂苓白茯散之類降心火益腎水開胃進食分隂陽利水道之藥皆是也慎勿服峻熱有毒之藥若服之變成肺痿骨蒸漸熱咳𠻳咯膿嘔血喘滿小水不利寢汗不止漸至形瘦脉大雖遇良醫亦成不救嗚呼人之死者豈命使之然也哉一婦人年二十餘歳病經閉不行寒熱徃來咳𠻳潮熱痛醫切禁無物可食一日當暑門外見賣凉粉者以井水磨大噉一飡頓覺神清骨爽健數日經水自下夫衝任之脉起於胞内為經脉之海手太陽小膓之經手少隂心之經也二經為表裏心主於血上為乳汁下為血水也女子十四而天癸至腎氣全盛衝任流通經血既盈應時而下名之月水常以三旬而一見謂之平和也若愆期者由勞傷血氣壅結故令月水不通也室女經閉成癆㓂宗奭方論曰夫人之氣血為本人之病未有不傷其氣血者世有室女童子積想思慮過多以致勞損男子則神色先散女子則月水先閉何以致然盖憂愁思慮則勞心心傷則血逆血逆則神色先散而月水先閉也火既受病不能榮養其子故不嗜食脾既虚則金氣虧發咳𠻳既則水氣絶故四肢乾木氣不克故多怒鬢髮焦筋痿候五臟傳遍雖卒不致死者然終死矣此一種於勞中最難治盖病起於五臓之中無有巳時其藥力不可及也若或自能改易心志用藥扶接如此則可得九死一生也張氏云室女月水之不行切不可用青蒿等凉藥醫家多以為室女虚熱故以凉藥攻之殊不知血得熱則行冷則凝也方桃花丸治婦人月水不通無子由子宫風冷積血滯於膀胱故致腰膝疼痛手脚熱心背膊皆妨悶經絡不調腹内多氣四肢乏力面無血色及多䵟􅍍宜服桃仁蘇合香安息香木香㯽榔川芒硝各三分水蛭炒令微黄䖟蟲炒令微黄去翅足各半兩麒麟竭鼈甲塗醋炙令黄去裙襴附子炮裂去皮臍柴胡去苖卷栢當歸剉微炒辛夷白芷紫石英細研水飛過禹餘粮炒醋淬七遍芎藭丹皮細辛麥門冬去心焙羗活桂心肉豆䓻去殻各一兩右為末煉蜜和丸搗二三百杵丸如梧桐子大每日空心及曉食前煎茅湯下三十丸紫葳散出聖濟總録治婦人經脉不通血熱壅滯攻疰四肢皮膚瘾胗并行經脉用紫葳凌霄花是也不拘多少為散每服二錢食前温酒調下服之治婦人血結月閉石淋用海藻石藤髙尺餘根如漆上漸軟作交羅文生海底煮汁服之治婦人月水經久不來用葳靈仙為末酒調下一方用劉寄奴一方用王不留行血竭破經丹治婦人血閉不通神方錦文大黄一兩去皮醋浸一宿硼砂一錢右為末醋和為丸如梧桐子每服三丸好酒紅花湯調下食前服之乾地黄當歸丸一名乾地黄丸千金方治婦人月水不通或一月再來或隔月至或多或少淋漓不斷或來而腰腹刺痛不可忍四體沈重惟思眠卧欲食酸物虚乏黄瘦方見本門月水不調類温經湯出指南方治經道不通人參牛膝甘草各一兩當歸芍藥牡丹皮白术官桂芎藭各二兩右為麄末每服五錢水二鍾薑三片􅀥一枚煎一盞去滓服地黄煎出指南方治經候至時頓然不行牛膝半兩生地黄三兩取汁乾漆一兩右以慢火同煎可丸即丸如桐子大每服三丸温酒下塊消為度乾漆丸出千金方治月經不通百療不瘥臟腑宿冷惡血凝結乾漆土𤓰根射干芍藥各一両半牡丹牛膝黄芩桂心吳茱萸大黄柴胡各一兩六錢桃仁鼈甲各二兩䗪蟲蠐螬各四十枚水蛭䖟蟲各七十枚大麻子四合亂髮雞子大二枚菴䕡子二合右為末以蜜和丸每日酒下十五丸如梧桐子漸加至三十丸日三仍用後浸酒服前丸藥一丸又方無牛膝芍藥土𤓰根浸酒方出千金方火麻子三升菴䕡子二升桃仁一升竈屋炲煤四兩土𤓰根射干各六兩牛膝八兩桂心一兩右㕮咀以清酒三斗絹袋盛藥浸五宿以一盞下前藥良或單服之亦可大䖟蟲丸出聖恵方治月經不通六七年或腫滿氣逆腹脹瘕痛宜服此數有神騐䖟蟲四百枚蠐螬乾地黄一升丹皮乾漆芍藥牛膝土𤓰根桂心各四兩吳茱萸桃仁黄芩牡䝉各三兩茯苓海藻各五兩水蛭三百枚硭硝一兩半人參一兩半葶藶五合右為末蜜和丸如梧桐子大每日空心酒下七丸不知加之日三服一方無硭硝人參一方無桂心蠐螬丸出聖恵方治婦人月水不通或腫滿氣逆咳𠻳食少蠐螬三分微炒生地黄一兩丹皮三分乾漆半兩搗炒令烟出桃仁三分湯浸去皮尖雙仁麩炒微黄赤芍藥牛膝去苗土𤓰根各三分桂心半兩黄芩琥珀各半兩水蛭一分炒微黄䖟蟲一分炒微黄去翅足甜葶藶三分隔紙炒令紫色赤茯苓一兩海藻三分洗去醎味桑根白皮三分剉右為末煉蜜和搗二三百杵丸如梧桐子每於食前以温酒下二十丸當歸湯治婦人月水不通臍下刺痛當歸切焙甘草桂去麄木賊大黄剉炒荆三稜炮剉各一兩威靈仙去土生地黄焙王不留行㯽榔延胡索代赭醋淬天雄炮裂去皮臍紅藍花炒三分鼈甲去裙襴醋炙各一兩半右㕮咀如麻豆大每服五錢半煎八分去滓温服不拘時候狗膽丸出聖惠方治婦人月水不通日漸羸瘦變為血癆及血氣結聚疼痛狗膽五枚取汁硼砂半兩膽汁浸三七日乾漆搗碎炒令烟出芫花醋拌炒令乾延胡索已上各半兩乾薑炒裂剉斑蝥糯米拌炒令黄去翅足麒麟竭砒礵各一分伏龍肝半兩細研自然銅一兩煆細研䖟蟲微炒黄去翅足水蛭微炒黄去翅足當歸剉微炒各半兩右為末用頭醋一升先入自然銅末煎十沸已來去却石脚却入銚子内入藥末一半以慢火煎成膏後便入硼砂狗膽及一半藥末和搗二三百杵丸如菉豆大每於食後以温酒下七丸鼈甲湯出聖濟總録治婦人經候不通已經三兩月鼈甲去裙襴醋炙白前代赭煨醋淬荆三稜炮剉附子炮裂去皮臍𤣥胡索各一兩半大黄剉炒甘草炙剉木香桂去麄皮當歸切焙各一兩桃仁去皮尖雙仁炒二十枚紅藍花三分熟乾地黄焙三兩大腹皮剉二兩半右㕮咀如麻豆每服五錢水一盞半煎取八分去滓温服不拘時候服治月經不通心腹絞痛欲死通血止痛出千金方當歸大黄芍藥各三兩吳茱萸乾地黄乾薑芎藭䖟蟲水蛭各二兩細辛甘草桂心各二兩梔子十四枚桃仁一升右㕮咀以水一斗五升煮取五升分為五服一方有牛膝麻子仁各三兩治婦人月經不通大腑秘熱兩足疼痛行走不得日夜不安疼痛呌聲不停肌肉消瘦漸成癥瘕病出䕶命方麻黄去根射干秦艽荆芥穗虎杖連翹當歸牡丹皮去心牛膝官桂黄芩杏仁大黄醋煮如前牽牛芎藭各一分半夏三錢大腑熱使大黄一兩右件藥作一處杵羅為末每服三錢水一盞煎取九分食後喫以大腑過通暢經後通行為度若人得此病但止通大腑行經候自然安樂也地髓煎丸出楊氏家藏方通經脉補虚羸强脚膝潤澤肌膚和暢筋脉方見本門前雜病類當歸丸出聖濟總録治婦人風勞氣病經不通漸加羸瘦不思飲食心腹脹滿徧身疼痛當歸切焙一兩半鼈甲去裙襴醋炙琥珀剉芎藭牛膝酒浸切焙桃仁去皮尖雙仁炒黄研水蛭糯米炒令焦各一兩虎杖桂去麄皮大黄一半生一半炒柴胡去苗各半兩䖟蟲炒令黄色牡丹皮各二分麝香研半分右為末煉蜜和丸如梧桐子大每服二十丸空心薄荷湯下烏梅湯亦得三稜丸出危氏方治經脉不通氣痛滯下兼治血瘕形如鎌鐡當歸去苗川芎牛膝芫花三稜莪术煨蒲黄𤣥胡索牡丹皮乾薑菴䕡子白芷地龍去泥土酒浸各一兩大黄二兩為末米醋一升文武慢火熬成膏右為末入大黄膏和研杵煉蜜為丸每服二十丸氣痛淡醋湯下炒薑酒亦得未通紅花酒調下鬼箭丸出聖惠方治婦人月水不通手足心熱腹滿喘急不欲睡卧心神煩悶鬼箭羽川硭硝柴胡去苗各一兩水蛭一分微炒黄䖟蟲一分炒令微黄去翅足川大黄剉微炒赤茯苓各三分乾漆半兩搗碎炒令烟出丹皮三分杏仁三分湯浸去皮尖雙仁麩炒微黄􅊝仁三分湯浸去皮尖雙仁麩炒微黄甜葶藶一分隔紙炒令黄紫色䗪蟲一分微炒黄去翅足川椒一分去目及閉口者微炒去汁右為末煉蜜丸和搗三二百杵丸如梧桐子大每於食前以温酒下二十丸鬼箭散出聖恵方治婦人月水不通經數年已來羸瘦食少諸方不効宜服鬼箭羽半兩赤芍藥川大黄剉微炒桂心當歸剉微炒鼈甲塗醋炙令黄去裙襴牛膝去苖土𤓰根已上各一両水蛭炙