空剉用無灰酒煮去滓飲酒神効黃藥散治咯血方見本門吐血類生地黃飲出聖濟􅄣録治肺肝内傷卒唾血生地黃搗絞取汁阿膠二兩毎片如兩指大右每以膠一片入地黃汁一盞内飯甑蒸之取出放温服六一散出朱氏集驗方治咯血發寒熱黃耆六兩炙甘草一兩炙右為細末如常服㸃不拘早晚乾喫亦得治咯血出經驗良方趙君獻云屢用效用薏米即薏苡仁不計多少為末熟煮猪胰切片蘸藥食後微空時取食之蓋薏米能補肺猪胰𨗳入經絡耳陳敏揵云治肺癰唾濃血薏米為末米飲調下一方搗碎米煎服香附子散出百一選方治肺破咯血用香附子去皮毛為細末以米飲調下地黃煎治憂恚絶傷唾血胸脇疼痛方見本門吐血類蒲黃散出聖恵方治唾血不止用蒲黃一兩研碎每服三錢冷水調下不據時候温酒服亦可一方藕節煎湯服桂心散治唾血方見本門吐血類白芨散出朱氏集驗方治咯血嘔血肺損或食飽負重而得者服之用白芨為末米飲調服又治鼻衂雪水調或新汲水調服台州獄吏憫一大囚將死頗照顧之因感吾之語七次犯死罪盡力抗諱苦遭訊栲坐是肺皆損至於嘔血適得一藥每用其效如神荷君庇䕶之㤙特此以報只白芨一味米飲調下餌其後凌遲劊者剖其胸見肺間竅穴数十處皆白芨補填之色猶不變洪貫之聞其說為郢州長夀宰規之赴洋州任一卒忽苦咯血勢絶危貫之用此救之一日而止血竭散治一切傷力咯血人參血竭欵冬花鷄管石甘草右等分研為極細末先取生薑自然汁另以盞盛之以蘆筒微微吸藥末入喉中次吸生薑汁少許送下忌濕麫魚醒生冷之物茯苓補心湯出如宜方治心氣耗不能藏血五心煩熱咳𠻳唾血木香枳殻桔梗甘草炙陳皮製各半兩蘇葉乾葛半夏製前胡人參茯苓各七錢半右㕮咀薑七片棗一枚煎氣盛者去木香以參蘇飲對四物湯名茯苓補心湯治咳𠻳有血本方又治婦人姙娠阻惡久𠻳咯血出永類鈐方白匾豆半兩生薑半兩枇杷葉去毛半夏製人參各一分白茅根三分右煎檳榔湯服不計時分聖餅子出業陀中藏經方治咯血青黛一錢杏仁四十粒去皮次黄明膠煎黃色取出細研右同研匀却以所煎膠少許鎔開和揑作錢大餅子每服用乾柿子一箇中破開入藥一餅合定以濕紙裹慢火煨熟取出以糯米粥嚼下又方出朱氏集驗方治咯血右用烏梅不計多少煎湯調百草霜一服愈槐花散出朱氏集驗方治咯血失聲右槐花炒為末用糯米飲調服二服仰卧治唾血出本草右取桂心搗作末以水下方寸匕九竅四肢指岐間出血附論夫榮衛大虚腑臟傷損血􅍺空竭因其恚怒失節驚忿過度暴氣逆溢致令腠理開張血􅍺流散也九竅出血喘欬而上氣其胍數有熱不得卧者難治也方黒散子出直指方凡諸竅出血並主之隔年蓮蓬敗㯶櫚頭髪並燒存性等分右為末每服二錢煎楠木香湯調下或只用㯶櫚燒灰米湯調下亦可竹茹地黃湯出聖恵方治九竅四肢指岐間出血方青竹茹蒲黃各半兩生地黃一兩細切右㕮咀以水一大盞煎至六分去滓食後温服蒲黃散出聖恵方蒲黃㣲炒龍骨燒赤各一兩右為細散每服以糯米粥飲調二錢服之治七孔出血出經驗良方右牛脂艻又名牛菔艻切為粗末每服一勺水瓦器煎不用鐵器去滓連服以紗帛盖頭頂上仍將稈心扎小脂根男左女右治人有九竅四肢脂岐間皆血出此暴驚所致勿令患人知出聖恵方以井花水猛噀其面治衂如神荆芥湯治九竅出血方見本門吐血類又方出直指方治暴驚風九竅出血其􅍺虚者用靈砂百粒分三次人參煎湯下治耳鼻口中出血不止出經驗良方用赤馬糞燒灰温酒調下一錢或和水絞取汁每服一小盞頻頻服之又方出聖恵方取新生犢子未草墮地臍屎曬乾燒灰為末服方寸匕日四五服又方出聖恵方用生地黃汁一升生薑汁一合相和温服一小盞日四五服治九孔出血出千金方用搗荆葉汁酒服二合一本作荆芥治九孔出血出肘後方以刺薊一握絞取汁以酒半盞調和頓服之如無青汁只搗乾者為末冷水調三錢血妄行附論凡病者諸血積聚合發為衂而清氣道閉濁道滂溢凝停胸胃中因即滿悶吐出數斗至於一石者名曰内衂或因四氣傷於外七情動於内及飲食房勞墜堕傷損致榮血流聚膈間滿則吐溢世謂妄行方必勝散出醫方大成治男子婦人血妄流溢吐血衂血嘔血咯血并婦人下血過多致發虚熱調血則熱自不作又用心過度發熱當以參蘇飲二分四物湯一分用之小薊并用根蒲黃微炒熟地黃洗芎藭當歸去蘆人參去蘆烏梅去核各一兩右㕮咀每服五錢水一盞半煎至七分去滓温服不據時蘗皮湯出朱氏集驗方治血常失道暴出色鮮燥引飲大蘗皮梔子各一兩甘草半兩右㕮咀每服五錢水二盞煎至一盞去滓服地黃五味丸出百一選方治妄行吐血生地黃熟地黃五味子各二兩為細末煉蜜為丸如梧桐子大每服三十丸一日三度空心用好酒送下地黃散出經驗良方治血經妄行及鼻衂不止生乾地黃龍腦薄荷各二兩甘草生用一兩為末每服一二錢食後新汲水調下蒜連丸治諸血妄行黃連日乾研為末七獨頭蒜一顆煨熟取肉研細右入米醋些子搗和丸如梧桐子大日乾每三四十丸陳米飲送下金屑丹出三因方治三因吐血及衂血下血一切血溢妄行用雌黃須葉子者為粗末入􅀥肉線繫定滿着湯煮用黒錫對雌黃觔兩鎔作汁傾入湯煮一日添湯候冷取出雌黃洗净乾研為細末却以煮藥􅀥肉和丸如梧桐子大每服五七丸黒錫煎湯下治妄行吐血出經驗良方用熟地黃洗去土焙乾為細末用好真金墨新汲水磨半盞許分作二服調熟地黃末服之墨湏松烟者張裁衣其子病服此即止屢作屢效石灰散治吐血妄行以石灰刀頭上燒用井花水調下後用扁柏葉同堦前草根研自然汁咽下治血妄行用牛口蘇連根掘起洗净於石臼中樁細用生薑數片絞汁或井花水多用熱酒調服將此滓盫於腦隨即便愈歸脾湯出危氏方治思慮傷脾心多健忘為脾不能統攝心血以致妄行或吐血下血白术茯神黃耆酸􅀥仁炒去殻龍眼肉各兩一人參木香各半兩甘草二錢半右剉散每服水一盞薑五片􅀥一枚煎不據時候温服南天竹飲出聖濟總録治血妄行九竅皆出服藥不住者南天竹草生瞿麥如拇指大一把剉山梔子三十枚去皮生薑一塊如指大大􅀥五枚去核甘草炙半兩燈草如小指大一把右剉入瓷器中水一大碗煮至半盞去滓通口服大效黄耆湯出衛生家寳方治諸血妄行綿黃耆打扁二寸許切以湯泡蜜一大匙浸半日控乾焙黃色一兩官桂八錢去粗皮不見火川當歸用生地黃汁浸焙乾汁多猶妙白芍藥以童子小便浸少時焙乾一兩敗龜殻一兩蘸醋炙七次并黃色用茅花八錢生用人參八錢紫暈者焙乾大薊一兩旋取洗焙用白茯苓八錢米泔净去紅絲焙乾蒲黃半兩銀器中炒黒紫色用伏龍肝半兩甘草一分炙右㕮咀每服五錢二小盞酒少半盞煎九分放温併三服妙順氣散出衛生家寳方治氣弱不正血氣欲妄行覺喉間血腥微微咯出唾中帶些紅色當歸一兩洗浄去蘆細切川芎二兩細切木香四兩細剉陳皮二錢洗去白焙細剉大薊野生荆芥紅花者乾温皆可用右為末每服四錢水一盞紫蘇葉煎七分去滓温服不據時候土馬騣湯出聖濟總録治心肺藴熱或恚怒氣逆使血妄行日夕不止土馬騣焙乾二兩枳實去穰麩炒白茯苓去黒皮甘草炙剉秦芄去苖土茈胡去苖人參生乾地黃焙各一兩右粗搗篩每服三錢水一盞煎至七分去滓食後温服汗血附論内經言藏真通於心血胍之氣行焉又曰肝藏血人卧血歸於肝蓋血雖藏於肝而心則行之也若肝心二藏俱傷於邪故血隨心液為汗而出方人參湯一名竹茹湯出千金方治汗心傷邪血汗人參桂去粗皮甘草炙剉白木白芍藥各一兩黃芩去黒心川芎當歸切焙淡竹茹各二兩右粗搗篩每服三錢水一盞煎至七分去滓温服不據時竹茹湯出聖濟􅄣録治吐血汗血尿血淡竹茹人參芍藥桔梗剉炒生乾地黃焙當歸切焙甘草炙剉桂去粗皮芎藭各一兩右粗搗篩每服五錢水一盞半煎至一盞去滓不據時温服神白散出聖濟􅄣録治血汗從膚腠出及鼻衂五七日不住右用人中白不計多少刮在新瓦上用火逼乾研令極細每服二錢入麝香少許温酒調下一方治鼻衂不止用麝香少許每吹入鼻中立差如聖散出聖濟總録治血汗用都李仁去皮尖研細每服一錢研鵞梨汁調下血餘散治汗血方見本門吐血類治血自皮膚間濺出出百一選方以煮酒上紙碎撧如楊花用手捚在出血處即止治肌衂乃腿上血出用胎髪燒作灰填之即止一方吹入鼻中諸失血附論夫諸陽統氣諸隂統血隂勝則陽虧而陽盛陽病則隂虧而隂病陽病侵隂血失常道故或吐或衂或從口鼻若暴出而色鮮心煩躁悶時欲引飲至一二升或至一斗陽入於隂以血得熱則流散如天地之經水天暑地熱則經水沸溢而湧起故有内衂肺疽其証大同而小異吐血嘔血唾血三者謂失血也方大阿膠丸出醫方大成治肺虚客熱咳𠻳咽乾多唾涎沫或有鮮血并勞傷肺胃吐血嘔血並皆治之麥門冬去心半兩乾山藥熟乾地黃五味子各兩一逺志去心一分丹參貝母炒防風去蘆各半兩阿膠炒一兩茯神去木栢子仁百部根人參杜仲炒各半兩茯苓一兩右為末煉蜜丸如彈子大小一盞煎六分和滓服毎服一丸當歸地黃湯出宣眀論治𠻳血衂血大小便血或婦人經水不調月水過多喘𠻳當歸半兩芍藥川芎白术染槐子黃藥子各半兩生地黃一兩甘草茯苓去皮黃芩白龍骨各一兩右為末每三錢水一盞煎七分去滓食煎温服一方無甘草龍腦鷄蘇丸出危氏方除煩解惱下熱肺熱咳𠻳衂血吐血血崩血淋解酒毒膽疽等證并止渇除驚凉上膈鷄蘇葉净一兩真蒲黃二兩炒木通一兩阿膠二兩炮炙甘草一兩半生地黃六兩為膏人參黃耆各二兩麥門冬二兩去心柴胡二兩同木通二物一處水半升浸二宿取汁入膏右為細末好蜜二觔先煉二沸下生地黃末不住攪時時入木通柴胡汁慢慢熬成膏勿令焦將餘藥末同和丸莞豆大每服二十丸嚼破温水下如虚勞煩熱消渇驚悸煎入人參湯下如欬𠻳血衂吐血麥門冬湯下並食後如血崩淋疾空心服諸淋車前子湯下一方丸如梧桐子大毎服三十丸食後服敗毒散吞之差敗毒㪚出危氏方治肺熱胸中鬰熱衂血兼治血淋吐血口臭並皆治之方見傷寒門傷寒過經不觧類右加桑白皮麥門冬煎吞鷄蘇丸生地黃散出濟生拔粹方治諸見血無寒下血衂血吐血溺血皆属於熱生地黃熟地黃枸杞子地骨皮天門冬黃耆芍藥甘草黃芩各等分為粗末每服一兩水煎胍微身凉惡風毎一兩加桂半錢人參湯治吐血血汗大小便下血方見本門吐血類膠艾散出千金方治上焦熱膈傷吐血衂血或下血連日不止欲死並主之艾葉竹茹各一升阿膠如手掌大乾薑二兩右㕮咀以水三升煮取一升去滓内馬通汁半升者取一升頓服又取新馬尿與少水和絞取汁一方不用竹茹乾薑作七服黃耆膏子煎丸治除煩解勞去肺熱欬衂心熱驚悸脾胃熱口乾吐血肝膽熱液出口若腎熱神志不定上而酒毒膈熱消渇而血滯五淋血崩等病人參白术各一兩柴胡黃芩各一兩白芷智母各半兩甘草炒半兩鱉甲一箇酥炙右為細末黄耆膏子丸梧桐子大每服三十五十丸百沸湯下空心服又用黃耆半觔粗末以水二斗熬一斗去滓再熬令不住攪成膏至半觔入白蜜一兩餳一兩熬蜜餳熱得膏十兩冷丸藥芍藥竹茹湯出千金方凡吐血衂血溺血藏氣虚膈氣傷或起驚悸治之生竹皮一升剉芍藥黄芩各一兩芎藭當歸切焙桂心甘草右㕮咀以水一斗煮竹皮減三升下藥煎取二升分三服寜志膏出如宜方治出血失血過多心神不安睡卧不得語言失志人參酸􅀥仁各一兩辰砂半兩右為末蜜丸如彈子大每一丸薄荷湯下冝燈心湯調琥珀末下側栢散一名栢葉散出經驗良方治内損吐血下血或因酒太過勞傷於内血氣妄行其出如湧泉口鼻皆流湏臾不救則死服此即安栢葉一兩半蒸乾人參去蘆荆芥穂燒灰各一兩右為末每服三錢入飛羅麫二錢伴和新汲水調如稀糊相似啜服立效又方用百草霜川白芷研為末每服三錢濃米飲併服單方出朱氏集驗方治𠻳血咳血用小兒胎髪燒灰麝香酒調下每箇小兒胎髪作一服婦人病用男子胎髪男人病用女胎髪黒神散出經驗良方治傷損大吐血或因酒食飽抵頭掬損吐血至多并血妄行口鼻俱出但聲未失無有不效百草霜蚌粉一方不必用蚌粉人百草霜即鍋底灰又名鍋墨可用鄉家燒野草鍋底上黒灰名曰百草霜也右等分為末每服二錢用糯米飲調下側栢枝研汁尤妙遇鼻衂搐一字皮破灸瘡出血舌上出血並乾摻上立止秋蓮散一名㤙袍散治吐血嘔血咯血蒲黃敗荷葉晒乾各一兩右為細末每服三二錢桑栢皮湯調下黄耆湯治吐血或因酒食飽低頭掬損吐血至多幷血妄行口鼻俱出但聲未失無有不效枳實三十箇炒為末黃耆二兩甘草半兩紅􅀥三十筒同枳實末搗爛慢火焙焦右為末用米飲調二錢食後服生犀散治一切積毒伏熱吐血衂血嘔𠻳咯血傷寒雜病下血皆可服升麻二兩鬱金半兩大黃甘草各一兩右為細末每服三錢水一盞半煎至七分去滓温服無時三皇補血湯出衛生寶鑑方治六胍俱大按之空虚必靣赤善驚上熱乃手少隂心之􅍺也此氣盛多而亡血以甘寒鎮墜之劑㵼火補氣以墜氣浮以甘微苦酸補其血熟地黃二錢生地黃三錢當歸一錢半柴胡一錢半白芍藥半兩牡丹一錢川芎二錢黃耆一錢升麻一錢補之以防血溢止渇右㕮咀如麻豆大毎服半兩水二盞煎至一盞去滓稍熱食前服兩寸胍兩頭有中間全無而虚芤血在上焦或衂血或嘔血以犀角地黃湯方見傷寒門傷寒搐血類治吐血及下血并婦人漏下出肘後方用水蘇莖葉煎取滓飲之治吐血蠱毒痔血女子腰腹痛大便後出清血者出千金方又取東向蘘荷根搗絞取汁二升頓服立差治吐血鼻衂傷風血崩用醋淬赭石為末湯調下治血不止以蒸餅兩三箇榧子不據多少将蒸餅食盡榧子去殻研碎末不計時候白湯下每服三錢日進三五服血餘散治諸血不止用白茅花燈心各一握新汲水煎湯下若血淋婦人髪更好加海金沙佐之切不得用百草霜蓮蓬止澁之劑地黃煎出朱氏集驗方治咯血嘔血𠻳血生地黃沉水者取汁二升生藕取汁一升生薑四兩取自然汁真酥三兩人參一兩為細末阿膠一兩微炒為末右先將地黄藕汁薑汁同阿膠末入石器内慢火熬候稍稠即入參末熬少時入真酥熬攪勻稠得所每服一彈子大早晨日中臨卧含津嚥或以麥門冬湯下亦得治無故遺血用亂髪及甲燒灰酒服方寸匕生血地黄百花丸出衛生家寳方治諸虚不足妄下血咯血衂血腸癖内痔虚勞寒熱肌肉枯瘦等疾生地黄十觔洗臼中搗取汁生薑半觔藕四觔搗取汁白沙蜜四兩無灰酒一升右以上五味用銀器或沙鍋内熬取二碗許漸成膏一半磁器收之一半入乾山藥末三兩再熬一二十沸次入後藥全當歸焙熟地黄焙肉蓯蓉酒浸焙破故紙阿膠麩炒黃耆蜜炙石斛去根焙覆盆子白茯苓逺志取皮麥門冬去心焙枸杞子右十二味各二兩為末用入山藥膏子丸如梧桐子大毎服五十丸用温酒調地黃膏子下日三服空心食前治吐血出本草右以紫蘇不限多少於大鍋内水煎令乾後去滓熬膏以赤豆炒熟杵為末調煎為丸如梧桐子大酒下三十丸至五十丸常服治隂衂不止滴滴如赤豆汁口鼻俱出右五倍子為細末每服二錢温熟水調不據時候服普濟方卷一百九十
