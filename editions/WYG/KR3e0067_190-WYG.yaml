body:
  text: 普濟方卷一百九十明周王朱橚撰諸血門大衂附論夫大衂者口耳皆血出是也蓋血為榮而藏於肝氣為衛而主於肺肺開竅於鼻三者相為流通若熱氣盛則血氣因而妄行雙氣衝錯溢於上竅故鼻衂不已而口耳皆出血也方逺志湯出聖濟總録治大衂不止逺志去心天門冬去心焙麥門冬去心焙阿膠炙燥當歸切燥藕節洗净甘草炙大黃剉炒芎藭各半兩桂去粗皮沒藥研麻黃去節桃仁浸去皮尖炒黃各一分牡丹皮三分茈胡去苖一兩右粗搗節每服三錢以水一盞煎至七分去滓空心温服逺志散出聖恵方治大衂不止逺志半兩去心白芍藥三分桂心一分天門冬去心阿膠搗碎炒黃燥當歸藕節甘草炙微赤剉川大黃炙㣲焦已上各半兩沒藥生乾地黃柴胡去苖各一兩桃仁一分去皮尖雙仁麩㣲炒右為散毎服三錢水一盞至五分去滓不計時候温服阿膠散出聖恵方治大衂未止計數升不知人事方見本門鼻乆衂類以生地黃汁調服立效散出十便良方治大衂熟艾二弹子大牛皮膠一兩炙黃燥右以煎了豉汁一大盞同煎至七分去滓不計時候分温二服之治鼻血不止出肘後方右用白芨為末津調塗鼻山根上立止生地黃飲一名地黃湯出聖濟總録治大衂口鼻出血上胸心氣急勞熱等症方見本門吐血衂血類黒神散出聖濟總録治鼻中及耳皆出血不止白刺蝟皮燒灰存性半兩人中白半錢溺盆内積垢右細研為散每用少許搐在鼻中苦參散出聖恵方治大衂口耳皆出血不止苦參一兩黃連一兩去鬚川大黃剉微炒梔子仁栢葉各半兩桑耳一兩右為散每服三錢水一盞煎至五分去滓入生地黃汁一合攪匀不計時候温服紫參散出聖恵方治大衂不止紫參一分鬱金半兩子芩一分甘草半分炙微赤剉白龍骨半兩鹿角膠半兩搗碎炒令黃燥右為散每服以生薑汁并蜜水相和調下二錢苦參湯出聖濟總録治大衂口耳皆血出不止苦參剉黃連一兩去鬚大黃一兩炒生地黃汁一合梔子七枚去皮右粗搗篩每服三錢水一盞入生地黃汁在内煎至七分去滓温服二黃散一名㵼心湯旅舍𫝊要方治鼻衂過多并酒齄大便閉而有熱者蜜水調服方見本門吐血衂血類栢葉散一名側栢散治口鼻出血如湧泉湏臾不救方見本門出失血類又方出聖恵方治大衂口耳皆出血不止斷弓弦一分燒灰白礬一分燒灰右為散以二大豆許吹入鼻中瘥阿膠湯出聖恵方治大衂口耳皆出血不止阿膠炙燥一兩蒲黃半兩右粗搗篩每服二錢水一盞生地黃汁一合煎至六分温服急以帛繫乳隨衂左右繫之兩鼻竅俱出則盡繫兩乳不計時候一方用生地黄切煎聖效方出聖恵方治鼻衂至一斗并大衂綿五兩人巾白一團如鷄子黃大右燒為灰研細每服二錢温水調下萊菔酒治大衂不止右萊菔不據多少每細剉一合用酒一盞先煎酒令百沸再下萊菔再煎一兩沸俟温濾去滓頓服玉漿散出傳信方治大衂右白麫不據多少每服三錢用冷水調下一方有鹽一錢治出血不止用紙三四層冷水浸透搭鼻梁及頂頸二處乾則再用漿水濕血即止鼻久衂附論夫鼻衂者由熱乗血氣也肝藏血肺主氣開竅於鼻若臟腑勞損血氣生熱血得熱則流散妄行隨氣發於鼻者名為衂血若臟虛不復勞熱停積故衂經久不瘥也而面色不榮目昏眩冐方桑根白皮丸出聖濟總録治鼻久衂不止桑根白皮炙剉山梔子去皮殻黃芩去黒心甘草炙剉羌活去蘆頭防風去乂當歸切焙訶梨勒煨去核胡黃連各一兩地骨皮人參白茯苓去皮茈胡去蘆頭各半兩右為末煉蜜和丸如桐子大每服二十丸空心食前温酒送下五黃丸出濟生㧞粹方治衂血久不止大便結燥者下之大黃五錢芒硝三錢甘草一錢生地黃三錢梔子一錢黃芩一錢黃連一錢半右為細末煉蜜為丸如梧桐子大温水下阿膠散出聖恵方治血久不止阿膠杵碎二兩炒黃燥桂心當歸細辛各一兩龍骨二兩蒲黃一兩亂髪三两燒灰右為細散每服以粥飲調下二錢一方有芎藭無蒲黃清肺飲子一名麥門飲出試効方治衂血吐血久不愈五味子十箇麥門冬去心當歸身人参生地黃各半錢黃耆一錢右為粗末都作一服水二􅊦煎至一􅊦去柤稍熱服不據時以三稜針於氣衝出血立愈刺薊散出聖恵方治鼻衂久不止刺薊二兩竹茹二兩蒲黃艾葉亂髪灰白芍藥各一兩右為散每服三錢水一盞煎至六分去滓入地黃汁一合攪匀不計時候地黃散出濟生㧞粹方治衂徃來久不愈生地黃熟地黃枸杞子地骨皮各等分右為細末每服二錢蜜湯調下日三茜梅丸出醫方大成治衂血無時茜草根艾葉各一兩烏梅肉焙乾半兩右為末煉蜜為丸如梧桐子大每服三十丸烏梅湯下經云天暑地熱經水沸溢蓋血妄行陽勝隂也鞠運判茂之嘗苦此疾予授此方令服後愈三黃散亦得亂髪灰散出聖恵方治鼻衂久不止令人目眩心煩亂髪灰一分桂心半兩乾薑一分炮製右為細末每服二錢温浆水調下二錢先食漿水粥後服榴花散出聖恵方治鼻衂久不止諸藥不效石榴花暴乾故綿灰各半兩人中白一分右同研細更入麝香一錢研均少少吹入鼻中立止麥門冬飲子出濟生㧞萃方治衂血不止麥門冬生地黃各等分右剉每服一兩水煎服乂衂血先硃砂蛤粉之藥次木香并黃連大便結下之大黃芒硝甘草生地黃溏軟梔子黃芩黃連可選而用之蒲黃散出聖恵方治鼻衂經久不止蒲黃二兩石榴花一兩末右和研為散每服以新汲水調下一錢治鼻衂久不止身靣俱黃出聖恵方赤馬通七塊以水一盞絞汁阿膠三分搗碎炒令黄燥右將馬通汁調阿膠令稀稠得所少少滴入鼻口須臾即止吹鼻散出聖恵方治鼻乆衂不止緋帛灰三錢亂髪灰二錢右研細少許吹入鼻中鉛丹散出聖濟總録治鼻乆衂右用鉛丹不據多少研如粉每服二錢發時新汲水調下白礬散出聖濟總録治鼻乆衂右用鉛礬半兩燒令汁盡細研羅為末以少許吹鼻中特效方出危氏方治衂久不止右以蒲黃血竭為末吹入鼻中又方右用薄荷以水煎童便用紗帛包塞入鼻中又方旅舍偹要方用㯶櫚燒灰隨左右鼻搐之葉氏方右隨衂左右以新汲水洗足又方右以左撚紙索子繫手第四脂咒曰血神住立止治鼻衂血久不止出肘後方又用桔梗為末用方寸匕日四五服立止吐血下血又方出聖恵方用老鴟翅闗大骨微炙搗為細末少許吹入鼻中又方出聖恵方右用烏賊魚骨半兩去甲搗為細散少許吹入鼻中即止如未便着少許乾浮萍草末吹入鼻中亦可又方出聖恵方用亁苔二兩燒灰為末少許吹入鼻中治鼻中瀝血經旬日不止出聖恵方右用南墻墻衣土兩杏仁大鼻中塞之初時被血推却仍取塞之衂衊附論夫内經謂膽移熱於腦則辛頞鼻淵𫝊為衂衊瞑目夫血得熱則涌溢得寒則凝滯膽受胃熱循胍而上乃移於腦蓋陽絡溢則血妄行左鼻為衂在汗空為衊二者不同皆熱厥血溢之過也今之治衂衊者專於治血不知血之行留氣為之本猶海水潮汐隂陽之氣使然也眀夫經絡逆順則血與氣俱流通而無妄行之患矣方地黃竹茹湯出聖濟總録治衂血汗血消熱結生地黃切焙一觔青竹茹五兩黃芩去黒心當歸焙甘草炙芍藥芎藭各三兩桂去粗皮一兩釡底下焦黃土一塊如鷄子大右㕮咀如麻豆大每服五錢水一盞半煎至八分去滓温服竹茹湯出聖濟總録治血衂汗血熱盛所致生竹茹生地黃切焙黃芩去黒心各二兩蒲黃芍藥麥門冬去黒心各一兩右粗搗篩每服五錢水一盞半煎至八分去滓食後温服黃蘖散出聖濟總録治鼻衂汗血黃蘖去粗皮葛根剉黃芩去黒心各一兩半鷄蘇一兩凝水石二兩生竹茹半兩右粗搗節毎服三錢水一盞入生地黃半分切煎七分去滓食後臨卧温服白藥散出聖濟總録治衂血汗出白芍藥二兩半生地黃汁三合生藕汁一合生薑汁少許右搗白藥為末先煎三物汁令沸每一半錢入熟水一合白藥末一錢攪匀食後温服一方有麥門冬汁三合和生麥門冬煎紫參散出聖濟􅄣録治衂血汗血久不止紫参黄芩去黒心各一分鬱金甘草炙各半分右為散每服三錢以生地黃汁一合白蜜一匙水一盞同煎沸㣲温調下日三刺薊湯出聖濟總録治熱氣上行衂血汗血刺薊鷄蘇葉各二兩黃連去鬚犀角鎊生乾地黃各一兩右粗搗篩每服五錢水一盞半煎至八分去滓温服不據時定命散出宣眀論治膽受熱血妄行鼻中衂衊并血汗不止硃砂水銀麝香各等分右為末每服半錢新汲水調下不計時候如引藥看老㓜虚實加减鬱金散一名金光散出聖濟總録治衂血汗血鬱金甘草炙青黛各半兩右為散每服二錢用鷄子調下地黃散出聖恵方治衂血汗血方見本門唾血類獨聖湯出聖濟􅄣録治血妄行或衂或衊右用黃芩五兩去黒心細剉如麻豆大每服七錢水二盞煎至一盞去滓温服一方為末酒調下如神肺臟壅熱吐血夫肺居膈上與心臟相近心主於血肺主於氣氣血相隨循環若臓腑久積熱毒則胸膈壅滯血與氣逆行上注於肺肺壅不利故令吐血也又有體虚勞損酒食過度憂愁思慮恚怒氣逆傷於肺者亦皆吐血不止也方補肺白花煎出聖恵方治肺壅熱吐血後欬𠻳勞劣白蜜五合生地黃汁五合生薑一合黃牛乳五合藕汁三合秦芄一兩去苖白茯苓一兩紫菀一兩去苖乾柿五枚煮軟細研如糊杏仁二兩湯浸去皮尖雙仁麩炒微黃黃眀膠四兩搗碎炒令黃燥右為細散與蜜及諸藥汁兼乾柿同於銀鍋子内以慢火煎成膏别藏於瓷器中每服不計時候以粥飲調下一茶匙蒲黃散出聖恵方治肺壅熱氣逆吐血蒲黃三錢當歸剉微炒人参去蘆頭天門冬去心焙麥門冬去心焙甘草生用赤芍藥各半兩黃耆一兩阿膠搗碎炒令黃燥生乾地黃各一兩右為細末每服不計時候以粥飲調下一錢天竺黃散出聖恵方治肺臟壅熱吐血心膈煩悶天竺黃人参側栢葉焙大黃剉炒犀角鎊黃耆剉焙赤茯苓去黒皮馬兠鈴焙各半兩鹿角膠炒燥一兩右為散毎服一錢煖生地黃汁調下不據時刺薊散出聖恵方治肺壅熱吐血不止刺薊川升麻鹿角膠搗碎炒令黄燥羚羊角青竹茹當歸剉微炒各半兩生乾地黃一兩甘草一分生用右為散以水二大盞半煎至一盞半去滓分温五服不計時鷄蘇散出聖恵方治肺臟壅熱痰唾内有血咽喉不利鷄蘇莖葉赤茯苓半夏湯洗七遍去骨桔梗去蘆頭黃耆剉各一兩甘草半兩炙㣲赤剉生乾地黃二兩麥門冬一兩半去心焙右為散每服五錢以水一大盞入生薑等分煎至五分去滓食後温服五汁湯出聖恵方治肺壅熱極肺脹喘吐血不止生藕汁生地黃汁刺薊根汁牛蒡根汁生薑汁生蜜各一合右和令匀毎服一小盞不計時候温服一方無生薑汁白茅根散出聖恵方治肺臟熱壅滯唾血桑根白皮二兩剉白茅根剉黃芩紫苑洗去土各一兩犀角屑三分刺薊根一兩半右為散每服四錢以水一中盞入竹茹一分煎至五分去滓入生地黃汁一合更煎三兩沸每於食後温服地榆散出聖恵方治心肺熱盛吐血不止地榆剉甘草剉生用各半兩栢葉呉藍黃芩各兩三刺薊一兩右為散每服四錢以水一中盞入青竹茹一分煎至六分去滓每服食後温服紅藍花散出聖恵方治肺壅熱吐血不止紅藍花一兩犀角屑茅根剉麥門冬去心各三分伏龍肝半觔以水五大盞浸濾取汁右為散每服三錢以伏龍肝散水一盞入竹茹一分煎至六分去滓不計時候温服一方入亂髪灰一錢和匀服伏龍肝散一名眀膠散出聖恵方治肺壅熱極肺脹吐血不止黃眀膠搗碎炒微黄燥桑葉各一兩伏龍肝一兩半右為細末每服不計時候以糯米粥飲調下一錢紅藍花散出聖恵方治心肺熱極