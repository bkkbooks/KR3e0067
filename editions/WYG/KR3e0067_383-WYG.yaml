羊腸中兩頭緊繫放麩椀中安之上以紙覆之却将椀合蒸一炊久去麩取藥并腸細切搗如膏更入煉蜜和丸如菉豆大毎服以粥飲下七丸日二服量兒大小以意加減沉香膏治小兒針無辜核後冝煉貼之沉香一兩剉黄丹六兩右件藥以清麻油一升先下沉香燋黒漉出下黄丹不住手攪以慢火煎之後滴於紙上如黒錫無油傍映即成膏毎貼法以箆子於爛帛上攤膏令稍薄貼之一日一換勿令風吹著針處為妙雉肝散治小兒無辜疳右將雉肝一具乾者搗濕者熬為末分三服毎服丹砂散後即一服米飲調下半錢蝸牛煎治小兒無辜疳右用蝸牛殻七枚舊死者皮薄黄白色者是净洗不得小有塵土漉乾内酥蜜殻中入甆瓶紙糊頭飯上蒸之下飯時即坐甑中裝飯及蒸飯熟細研如水淀漸與服一日服盡大黄煎丸治無辜閃癖或頭乾瘰癧頭髪黄焦落去或乍痢乍差諸狀既多不可備説四肢黄痩食物不長肌膚精神失緒大黄九兩錦文新實者若微朽即不用剉去蒼皮乃秤右搗篩為散以上好米醋三升和之置銅椀内於大鐺中浮湯上炭火煑之火不用猛又以竹木箆攪藥候堪丸乃停放小甆器中宻貯兒年三嵗一服七丸如梧子日再服常以下青赤膿為度若不下膿或下膿少者稍稍加丸下膿若多丸又須減病重者或至七八劑方盡根本大人小兒不等以意量之此藥惟下膿及宿結不令兒痢禁牛馬驢雞猪魚肉生冷粘滑油膩小豆蕎麥乳母亦同蝦蟇丸治小兒患無辜疳三焦虛熱飲水不歇下痢頻併日夜無度煩躁乾嘔食入即吐如此惡證服諸疳藥未安一服虚熱去兩服煩渴止三服㵼痢住不過三服諸證悉應尅効萬一神聖秘宻蟾蜍一枚夏月取生活者乃是溝渠中腹肚大不能跳又不能鳴者身上多痱磊是也右取糞蟲一杓放於桶中更以尿灌四邉令乾即留得蟲却將蟾蜍打殺放在蟲上任其蟲咀食兩日乃用新布作袋包裹小麻繩繫於急流中浸一宿明日取上晒乾瓦上焙為末入麝和匀湯浸蒸餅丸如麻子豆子大兒小者二十丸大者三十丸温飯飲下或麥門冬去心煎湯空心食前日進二服切効神妙却冝至誠修合和夜明砂為末入蜜中啖之治無辜疳演山人參散治小兒疳熱虚煩作渴不思乳食四體腫脹服此吞前蝦蟇丸作効人參莪术當歸龍腦棟根甘草炙赤芍藥白茯苓枳殻各等分為末麥門冬湯下漏蘆散治小兒無辜疳肚脹或時㵼痢冷熱不調冝服漏蘆一兩右為細散毎服以水磨犀角湯下半錢空心午後各一服量兒大小以意加減療無辜疳腦後両畔有小結者方凡無辜之病此結為根欲療者先㸔結之大小然後取細竹斟酌籠得此結便截竹使斷狀如指環形仍將此竹籠結自然不得轉動以火針針結於中央作兩下去針訖乃塗少許膏藥無者雜油亦得須待三兩日又如前復針更經一兩日當膿水自出若不出復如前針候膿潰盡結便自散俗法多用刀子頭割者謂之割無辜此未􅄁詳殊不如針之以絶根本恐後者不悉故重複説之治無辜疳其證腦後項邊有核如彈按之轉動軟而不疼其間有蟲如米粉冝速破而去之免蟲如血氣流散淫蝕臟腑以致肌體癰瘡便利膿血壯熱羸痩頭露骨高急用竹刀刺破刮去核内蟲又楊氏方用夜明砂為末加飲食内食之膏藥貼則愈或因澣濯兒衣露於簷下為雌鳥落羽所洒兒著衣蟲入皮毛亦致斯疾凡晒兒衣須㣲火烘之疳􅉶附論夫小兒嗜食甘味多而動腸胃間諸蟲致令侵食臟腑是名疳􅉶也凡食五味之物皆入於胃其氣隨其臟腑之味而歸之脾與胃為表裏俱象土其味甘而甘味柔潤於脾胃脾胃潤則蟲動侵食成疳也但蟲因甘而動故名之為疳也若蟲食下部則肛門生瘡爛開急者數日便死冝速療之小兒宿有疳氣加以腸胃虚弱寒邪乗之則變下痢久而不止腸胃益虚寒濕相乗蟲因虚動侵蝕臟腑或口齒生瘡或肛門傷爛故名疳􅉶方緋帛膏緋帛燒灰研一分倒棘刺四十九枚燒灰研雄黄研磁石搗研麝香研蚺蛇膽研各一分槐枝一條長八寸剉猪脂臘月者五兩右先研六味為細末次煉脂作油去滓下槐枝煎令焦黄去槐枝下六味藥末煎成膏以磁器盛毎用少許塗下部日三次五福化毒丹治小兒􅉶鼻疳瘡清膈凉血𤣥參一兩桔梗去蘆八錢净赤茯苓人參牙硝青黛各二錢半甘草二錢麝香少許右除麝香牙硝别研餘一處為末以和青黛煉蜜為丸如圎眼大用金銀箔為衣薄荷湯化下瘡疥餘毒磨生犀水下如上焦熱口血臭氣用生地黄自然汁化開食後服麝香丸治小兒疳􅉶下部開張痢有膿血爛痒赤腫麝香研蟬殻去足猪牙皂莢去皮子灰蘆薈研人中白研各一分青黛半兩研右為細末先取五月五日蝦蟇一枚以繩子雙繫後脚倒掛用胡黄連一寸以綿線繫定内蝦蟇口中將不滲器承蝦蟇涎從午至戌解放蝦蟇只取胡黄連并涎用將六味藥末涎和丸如黍米大毎用先將暖水洗兒軟帛拭乾後扶坐取一丸子以乳汁少許化下須臾如醉慎勿驚之蟲即自出若蟲色白或身黄頭黒皆是病淺易差若蟲子徧體亂出紛紛如碎剪馬尾此必死之候苦參丸治小兒疳蟲蝕下部久痢膿血舉體痛痒面色虚腫苦參雄黄研白礬燒各半兩麝香少許研藜蘆去蘆頭一分右為末以一小棗許内下部中日兩三上黄蘖散治小兒疳䘌齒瘡宣露黄蘖根皮炙剉黄連去鬚黄芩去黒心升麻剉各三分大青半兩乾蝦蟇酥炙一分右為散以綿裹貼齒齗上吐涎麻子膏治小兒疳􅉶下痢不問赤白大麻子二兩黒豆黄一兩青黛半兩研蝦蟇一枚焼灰研右先研麻仁搗研黒豆等四味為末與麻仁同研如稠􅄳入少許竹瀝和匀圎瓷収貯口鼻疳瘡者毎服半七匙米飲調下日三服若腦脊疳毎日塗鼻上若下部開以綿裹藥半七匙内下部日二換量兒大小加減治小兒疳蚘蝕口鼻及下部赤爛方大麻仁三合地龍去土炒一兩亂髪如雞子大葶藶半紙上炒兩右除亂髮外並搗碎與髮匀拌都入在一根新竹筒内置於瓦上以熱炭火燒取瀝少許塗兒口鼻頂上及糓道中蝦蟇散治小兒下部疳􅉶瘡乾蝦蟇塗酥炙令黄蕪荑㣲炒乾薑炮製剉葵莖灰莨菪子水飛去浮者煑令芽出候乾炒令微黄黒色白礬燒令汁盡各半兩右為細散三嵗兒毎服以温水調下一字看兒大小以意加減又方乾蝦蟇一枚塗酥炙令微黄蚺蛇膽半兩木香半兩硫黄半兩麝香二分右為細散都研令匀三嵗兒毎服以温水調下一字日再服量兒大小以意加減苦參膏治小兒疳䘌蝕下部苦參五兩艾葉二兩青葙子甘草炙剉各三兩右先以青葙甘草為末次用水五升煎苦參艾葉成湯凉久去滓入二味藥末和作梃子長一寸如筋許大暴乾塗猪脂内下部日再貼蟲出盡為度又方治小兒下部疳􅉶瘡吳茱萸根白皮一兩桃白皮一兩右細剉以酒一大盞浸一宿㸔兒大小漸漸分服之又方治小兒疳􅉶蟲蝕下部以鐵衣少許研細綿裹内下部中黄連丸治小兒疳􅉶或口齒生瘡或肛門傷爛黄連去鬚一兩白蕪荑半兩麝香一錢右為末麵糊和丸如麻子大一二嵗毎服十丸温米湯飲下日三服治小兒下部痒痛方枳實二兩鬼箭羽一兩木香一兩右為麄散以鹽醋拌和炒令熱用青布裹日三度熨之治疳􅉶口齒及下部以飛亷蒿燒灰搗篩以二錢七熱熨痛處忍之若不痛非疳也下部蟲如馬尾相纒出無數十日差二十日平復雄黄散治小兒􅉶蟲蝕下部雄黄研胡粉各半兩右細研如粉毎用半錢乳汁調内下部中日三上以差為度猪膽飲治疳􅉶蟲蝕肛門治不以時多至殺人猪膽一枚苦酒五合右同煎量力空心飲之蟲即死又方治小兒疳􅉶蟲蝕大腸赤爛羊膽汁漿汁各一分右藥相合令匀日三四度塗之治疳􅉶無問新舊皆治之右用蝦蟇燒灰好醋和傅日三五度瘥治小兒下部疳􅉶蟲蝕大腸赤爛右用水銀一兩以將水煑之取少許以唾研安著竹筒吹入下部中三度差又方大麻仁一分右以水研取汁與飲之量兒大小臨時加減日三四服候蟲出盡即住又方扁竹一兩右以水一杯煎六分去滓看兒大小加減温服又方艾葉一兩右以水一杯煑取六分去滓看兒大小加減温服又方青黛一兩右為末散先用麻油塗上次用此藥貼之日三四度効又方胡粉二兩熬令黄色右細研猪脂和日三度塗之治疳􅉶用雞腸草燒傅之五疳出蟲附論夫小兒五疳之疾皆由乳哺不調寒温失節之所致也久而不差則腹内有蟲肌體黄痩下痢不止冝服藥出之則疳氣漸退又因肥甘所致蓋臟腑氣血更相榮衞逢甘則中緩致榮衛行遲故臟腑之間化為諸蟲其蟲狀如絲髮或如馬尾多出於腹背及頭頂上若蟲色黄白及赤可療青色者不可療也方乾蟾丸治小兒五疳眼鼻多痒寒熱往來臟腑不清或㵼膿血肌體痩弱飲食不化多困少力眼澁饒睡兼治驚風乾蟾一枚大者端午取蛇蛻皮大者一條糓精草二兩三味同入一瓶子内以鹽泥固濟燒灰胡黄連甜𤓰蒂母丁香各一分熊膽研天竺黄蘆薈雄黄研各一分丹砂研牛黄研龍腦研麝香青黛研各半兩右為末再研匀獖猪膽汁煑麵糊丸如菉豆大毎服三五丸米泔下量兒大小加减服藥後以桃栁湯浴兒著青衣蓋疳蟲出衣上及肩毛髮邊如細麩片子或如糝麵塵青黒色者難治黄白色易一方無熊膽水銀丸治小兒五疳四肢黄痩腹脹氣麄髮乾作穗眼鼻多痒精神昏悶不欲飲食宜出蟲仍宜粥飲下丸日三服甚者半月内差水銀三分硫黄半兩二味結沙㣲炒細研粉霜半兩蘆薈半兩細研硃砂半兩細研水飛過礬灰一分蛤蚧一枚塗酥炙令微黄烏驢蹄灰一分雄黄一分細研蟬殻一分微炒天靈蓋一分塗酥炙黄焦故皮中蛀灰一分白猪糞灰一分右為末研了藥令匀以苦參半升剉碎用水五升浸一宿煑至一升去苦參候熬成膏用諸藥丸如菉豆以獖猪膽去汁将藥入内懸於舎東隂七日候乾以麝香蜜水下三丸後便煎桃柳湯浴兒以青衣蓋徧身蟲出或洩惡氣或㵼惡物便是病源已出小兒毎三嵗加一丸服之蘆薈丸治小兒五疳痩弱腹脹氣麄頻揉鼻眼冝服出蟲蘆薈一分細研田父一枚燒以煙絶便住青黛半兩細研膩粉一錢牛黄一分細研粉霜一錢硫黄一錢細研蟬殻一分蛇蜕皮一條燒灰麝香一錢細研巴豆去皮心十枚研紙裹壓去油右為末入研了藥令匀以粳米飲和丸如菉豆大毎服以温水下二丸良久煎桃栁水浴兒後以青衣蓋徧身當有蟲出白黄色者可治青黒色者難治青黛丸治小兒諸疳青黛研蘆薈研乾浮萍草蝦蟇燒灰蟬殻去土菉豆故破手巾燒灰研香豉炒白礬燒硏丹砂研麝香研各一分右為末和匀用粟米飲為丸如麻子大一嵗兒毎服一粒用熱水下先以桃栁湯浴兒後與藥服服藥後得睡覆面㸔脊骨間必有蟲出形狀不定甚者吐出或噎出即愈糓精丹治諸病下蟲如絲髮或如馬尾甚者便至夭傷糓精草三兩入瓶子内鹽泥固濟用慢火煨通赤為度取出胡黄連半兩乾蟾三枚五月五日取者用酥炙黄皂角三寸燒灰𤓰蔕半兩母丁香半兩粉霜蘆薈麝香各一分並各研右件都拌匀用猪膽汁和丸如黍米大毎服十粒米泔放温下量兒大小加減田父丸治小兒五疳下痢羸痩鼻痒田父三分炙微黄夜明砂半兩微炒蛇蜕皮半兩燒灰胡黄連三分白礬灰一分牛黄一錢細研硃砂一錢細研麝香一錢細研莨菪子一分水淘去浮芽炒令黄黑色用右為末都研令匀以糯米飯和丸如菉豆大一二嵗空心熟水下三丸服藥後用桃栁湯洗浴兒了以青衣蓋覆良久當有蟲出黄白赤者易治黒者難醫量兒大小加減服青黛丸治小兒五疳體熱乾痩髮堅鼻痒不欲乳食青黛半兩蘆薈半兩蟬殻半分人中白半兩麝香一分胡黄連三分蟾涎少許人乳汁少許猪牙皂莢半兩生用右為末五月五日午時修合以稷内棗肉丸及蟾涎乳汁和如黍米大先以桃栁湯浴兒後以粥飲下一二丸後著熱青衣蓋兒看身上有蟲出青黒者不治白黄赤者易差定命夜明砂丸治小兒疳夜明砂炒青黛蛇蜕蟬蜕麝香地龍乾蝦蟇各一分蚱蟬四十枚右為末和匀粟米飯丸如麻子大一二嵗一二丸三四嵗五丸并用米飲下空心日午各一服更用水化一丸滴兩鼻中又以栁桃湯浴兒以青布偎良久蟲出青布上麝香丸治小兒諸疳麝香研熊膽研丹砂研牛黄研蚺蛇膽研𤓰􅎞一分赤小豆七粒蟾酥二片如小豆大作蟾頭一枚炙焦黄右為末和匀麵糊丸如麻子大毎服一二丸至五丸空心日午近晚各一度量兒大小加減服後以桃栁湯浴兒即衣蓋覆當有蟲出一方煉蜜和丸如兒小即乳汁化服麝香丸治小兒五疳痩弱毛髮乾焦口鼻痒麝香一分蘆薈一分蟾酥一片豆許大皂莢三寸燒為灰蛇蜕皮五寸燒為灰粉霜一分蝙蝠三枚取血拌入藥末硃砂一分細研右爲細末以油鎔蠟和丸如小豆大先以桃栁湯洗兒後用藥一丸塗於臍中醋麺封之良久即蟲出黄白赤者易治黒者難療蘆薈散治小兒五疳煩熱乾痩或不欲乳食宜服出蟲蘆薈半兩細研胡黄連半兩雄黄一分細研熊膽半兩研入硃砂半兩麝香半兩細研乾蟾一枚塗酥炙焦黄代赭一分右爲細散先用栁桃湯浴兒後以粥飲調下半匙然後著青衣覆其蟲自出量兒大小加减服之螳螂散治小兒五疳羸瘦腹脹不欲乳食宜服出蟲螳螂三分炒令黄蝸牛子七枚炒令微黄色蟬殻七枚微炙丁香一分蟾酥一錢細研麝香一錢地龍三分微炒蛇蛻皮灰一錢右為細散先以桃栁湯浴兒後以粥飲調下半錢便以青衣蓋覆當有蟲子自出赤白者易治青黒者難治𤓰蔕丸治小兒疳出蟲𤓰蔕燒灰麝香研蟾酥各半兩烏蛇尾酒浸炙黄連去鬚各一分蛇蜕皮燒灰熊膽各半兩研右為末用粟米飲丸如麻子大温熱水化破二丸滴於鼻中蟲出為効出蟲丸治小兒五疳久不瘥羸痩極甚硃砂一分麝香一分牛黄一分蟾酥半錢熊膽一分蝸牛子一分炒微黄夜明砂一分微炒右都研細以麵糊和丸如菉豆大毎服以温水下三丸更别以水研一丸滴向鼻中得嚏四五聲良久當有蟲隨汗出立効麝香散治小兒疳氣麝香研白礬燒灰膽礬燒過皂莢燒灰各一分猪膽一枚去膜熬乾膩粉研半錢右研令極細毎服一字米飲調下服藥後以青衣蓋兒身上良久有蟲出即差除疳散治小兒五疳吐蟲腹脹羸痩丁香生犀角末各半錢苦楝根有子者良赤者不用隂乾為末鶴蝨各半兩蜜陀僧白檳榔炮剉各一分右為散毎服一錢米湯調下日三度蟲自出更量兒大小加減天靈蓋丸治小兒五疳定命靈蓋灰一分蟾酥一片如栁葉大汗襪灰一分砒霜半分麝香一分驢蹄窩乾灰一分右為末煉蜜和丸如麻子大空心以温水下二丸後以桃栁湯浴兒了澄浴水清看盆内當有蟲如蟻子白即吉黒即㓙更㸔兒大小以意加減熊膽丸治小兒五疳出蟲熊膽細研硃砂細研麝香細研蚺蛇膽細研蜣蜋微炒𤓰蔕已上各一分右為末入研了藥令匀以猪膽汁和丸如菉豆大先用桃柳湯浴兒了用粥飲下三丸以青衣蓋當有蟲出也蟾頭丸治小兒五疳手足乾痩腹脹筋起鼻痒昏沉多睡宜服出蟲蟾頭青黛一分研硫黄一分研皂莢一分先湯中泡七日後以水洗净刮黒皮炙令焦黄去子麝香半分細研巴豆七枚去皮研紙裹壓去油右為末煉蜜和丸如菉豆大空心以粥飲下三丸良久當有蟲出量兒大小以意加減乾蟾丸治小兒五疳出蟲乾蟾蟬殻麝香半分天靈蓋半兩鼈甲一分右為末用燒飯和丸如菉豆大二嵗已下以蛤粉湯下一丸三嵗已上至五嵗二丸服藥後續以桃柳湯浴兒後以青衣蓋之當有蟲子出赤白者易治黒者難醫蘆薈丸治小兒疳殺蟲蘆薈蕪荑木香鶴虱各半兩右為末水浸炊餅丸如黄米大毎服十丸米飲下更量兒大小加減雄黄丸治小兒疳殺蟲雄黄研黄連去鬚木香各一分麝香半分右搗羅為散每服半錢米飲下量兒大小加減定命散治小兒疳蝦蟇一枚燒為灰蛇蛻皮一分炒令黄蟬殻一分右為末入麝香末半錢研匀但是一切疳至午時後以暖水調半錢一嵗二嵗即服一字後煎桃柳湯放温浴兒了便用青衣蓋當有蟲出効雄黄丹治五疳羸痩或多生蟲胡黄連乾蟾白蕪荑川黄連各一兩乾漆半兩雄黄半兩研麝香一錢研右為細末猪膽汁和丸如黍米大毎服十粒新水下量兒大小加減稷香丸治五疳多蟲羸痩黄瘁㵼痢無常黄連青皮蕪荑仁胡黄連蘆薈神麯麥芽木香當歸肉豆蔲史君子三稜莪术各一分右為末麵糊為丸如菉豆大毎服二十丸米飲下化蟲丸治小兒因食甘肥致使蟲動嘔吐涎沫心腹悶痛此藥止痛下蟲五靈脂一兩半白礬一兩右件為細末麵糊為丸如黍米大毎服二十丸温米湯送下不拘時候雷丸散治消疳殺蟲雷丸史君子炮去殻鶴虱榧子檳榔五味各等分右件為細末毎服一錢温米飲下乳食前楝實散治小兒疳黄羸痩好食泥土蛔蟲㽲痛發渴徃來川楝子去核半兩㣲炒甘草半兩􅌝􅌣根一兩右件為細末毎服二錢煎紫蘓湯調下乳食前治小兒疳毒生蟲肌肉消痩頻頻腹痛臨痛時多在小腹上或胃脘上忽上衝心前疼痛不可勝忍喫食減少非時只思清水喫其痛之極忽口中吐出蟲忽大便下得蟲冝服此方但尋常好喫清湯忽痛時只思清湯喫即是有蟲之候史君子蒸二次方用萆薢狗脊檳榔烏藥芎藭南椒二錢白蕪荑一分右細杵羅為末麺糊為丸如黍米大毎服二十丸米飲下不拘時治小兒諸疳臟腑之間化為諸蟲飲食不下或嘔吐或手足浮腫飲水不歇並冝服之青皮三稜莪术北柴胡半夏大腹皮秦芃净香附陳皮紫蘓青木香枳殻㯽榔甘草右各等分㕮咀毎服一錢生薑同煎餘以意加減湯使服之治疳氣腹痛服藥不見効此藥治之㯽榔三個剉炒蓬术一錢陳皮二錢巴豆七粒去油茴香一錢炒枳殻一錢右為末麵糊為丸如粟米大毎服二十丸陳皮湯下普濟方卷三百八十三
