body:
  text: 普濟方卷六十六明周王朱橚撰牙齒門牙齒疼痛治一切牙疼出海上方木耳荆芥各等分右煎湯潄之痛止為度治牙疼鹽一兩草烏一兩右同炒令草烏黑色同為細末以擦患處治牙疼巴豆一枚去殻并膜淡豆䜴一個右同研爛每用針頭許以連紙裹安痛處立止不可太多亦不可令侵齗恐能損肉又方香白芷太平川地道者不拘多少硃砂十分之一右白芷别研為細末入硃砂拌勻煉蜜丸如櫻桃大每用一丸擦痛處立止倉卒無硃砂及蜜難收其功只白芷細辛二味亦每有效廬州郭醫云渠親曽取累效盡勝它藥此藥乃濠梁一村婦人以醫延師母夫人者立效散治牙疼零陵香淨洗軟刺炙燥蓽撥洗剉碎慢火炒燥右等分為末先以炭一塊為細末揩痛處連牙床並揩淨以藥擦痛處老人風蚛牙疼小兒疳牙走馬疳等悉治之治諸般牙痛梅花膽子少許平胃散少許右合和擦牙疼痛立止又方生附子艾葉等分細剉濃煎温水潄之又方池礬炒為末揩痛處涎出温鹽湯盥潄又方楓葉生者令痛處咬定又方用香附子一兩青鹽半兩大黄一兩獨子肥皂一兩四味用黄泥固濟同煆為末每日作牙藥擦之又方用大椒細辛蓽撥荆芥穗猪牙皂角等分燒鹽同為末擦牙愈用水潄去雄黄散治牙疼雄黄乾薑各等分右為細末口含水㗜一字鼻中三次疼止治牙疼方地黄雄黄各等分右為末㸃耳中牙疼方巴豆七粒去皮油鹽豉四十九粒右為細末醋糊為丸如梧桐子大乾用綿裹一丸同麝香少許内牙疙瘻内去涎一時住疼治牙疼方生地黄升麻各等分右為末水煎熱潄三口痛止妙滄清散治牙疼甚不可忍滄鹽四錢炒焦青黛半錢右研勻疼邊鼻搐少許一方無青黛加雄黄紅豆各半錢尤妙又方黄丹白礬各一錢右用瓦飛入鹽少許同礬溶成水入黄丹同煉乾揩之烏白丸出聖上方治牙疼諸藥不效者草烏七箇生用礬少許右為細末用少許揩牙痛處不可吞下喉中蓽撥散出海上方治牙痛去齒如神木鼈子蓽撥各等分右先研木鼈令細入蓽撥同研搐鼻香附散一名揩牙法出衛生家寶烏髭益氣去風疾一切牙疼及治無故牙動牙宣出血香附子四兩先以河水洗淨控乾用生薑三兩洗淨切如榖子大右同研三宿慢火炒以薑乾為度同為末如牙藥用之如牙疼先揩藥良久却以荆芥湯潄口一方加青鹽二兩拌勻亦如牙藥用一方無生薑用香附子五兩河水洗瀝乾以生薑四兩如上法此方俞居易開學生平服食傳家之寶得之於鐡甕城中缺中申先生有序具載凡人四十以後百事慵懶皆由心火不能下降故作此方以救世人麝香一字散出海上方治一切牙疼立效三奈子二錢用麵褁煨熟麝香半錢右為細末每用一匙口噙温水隨牙疼處一邊鼻内搐之潄動水吐去便有神效專治牙疼出海上方紅豆升麻各等分右為末入麝香少許於疼處或蛀内乾摻亦得治諸牙疼方出海上方胡椒殭蠶各等分右為末每用少許摻於疼處涎出湯潄治諸牙疼方出海上方乾薑白礬各少許右為末填塞蚛孔立效治牙疼方巴豆七個黒豆七個各去殻右研為泥如雞頭子大新綿裹藥如在左牙疼将藥丸劄於右邊耳中如此七日七夜立效一日一夜換綿子却不換藥不換綿恐爛耳治諸般牙疼不可忍者露蜂房炒過去沙底華隂細辛去土葉各等分右以水煎數沸去滓潄患病處吐之不時用神效乳蜂散治牙齒疼痛露蜂房一枚乳香三四塊右剉碎同煎潄治諸般牙疼白芷良薑右等分為末於患處數次擦之及於鼻内㗜之側臥涎出盡即效齒痛通用方出指直方蜂房二錢炒全蝎二個焙右為末傅亦治風疼防風散出危氏方治牙疼防風鶴虱各等分右剉散濃煎噙立效老鶴虱草研爛含痛處亦可芫花散出危氏方治牙疼陳芫花一握甘草節五錢右細剉各煎先用芫花湯噙唾去次用甘草水噙少時效治一切牙疼風齲熱齦常出鮮血漸至崩落口臭不可近人者並皆治之出本事方大黄米泔浸令軟生地黄大者薄切右二味旋切合用一片二片合定貼所患牙上一夜即愈未全可則再如前法再用忌説話恐引風要津液漬痛處細辛湯出便良方治牙齒動摇疼處齒齗宣露咬物不得細辛二兩柳枝皮四兩右細剉於銚中炒令黄内大豆一升和柳皮更炒候爆聲絶於瓷器中盛用好酒五升浸經一宿煖一大盞熱含冷吐以瘥為度又方出聖惠方李根白皮三兩蒼耳子三合右剉碎每用一兩水煎熱含冷吐蟾酥丸出聖惠方治牙疼口瘡積年不瘥蟾酥一片水浸令軟麝香研少許右細研丸如粟米大以綿裹一丸於痛處咬之有涎即吐療牙疼出肘後方蜀椒礬石各一兩右以水六升煎取六合去滓含之潄口吐却勿嚥之療牙疼出千金方生地黄節蒜一片右搗以綿裹著痛處咬之勿嚥汁汁盡吐出日日為之瘥止啄木舌散出聖惠方治牙疼啄木舌一枚巴豆一枚右先搗啄木舌為末入巴豆同研為散用猪鬃一莖㸃藥於牙根上立瘥也胡椒丸出聖惠方胡椒末一錢蟾酥一字水浸過右同研令相得圓如麻子大以綿裹於痛處咬之有涎即吐却草烏頭丸出聖惠方治牙疼草烏頭半兩炮躑躅花二錢右搗羅為末以黄蠟消汁和丸如扁豆大綿裹一丸於痛處咬之有涎即吐却附子丸治牙疼附子半兩生用馬夜眼一枚炙令乾右搗羅為末以糯飯和丸如菉豆大綿裹一丸於痛處咬之有涎吐却烏頭丸出聖惠方治牙疼川烏頭一分生用附子一分生用右為末用麵糊和丸小豆大以綿裹一丸於痛處咬之又方出聖惠方阿魏臭黄各一分右同研如粉以麵糊和丸如菉豆大每用一丸以綿裹隨患處左右挿在耳門内立效露蜂房湯出仁存方治牙齒腫痛露蜂房大者炙礬燒灰各一兩右為粗末每用二錢水一盞煎十餘沸熱潄冷吐蒼耳湯出肘後方治牙齒痛右用蒼耳子一合根亦佳㕮咀以水二盞煎十餘沸入鹽少許去滓熱潄冷吐一方治風腫用根焙乾為末如齒藥用鹽湯潄之疼立止治齒痛出本草用山豆含一片於痛處無食子散出聖濟總録治牙齒疼痛用無食子不拘多少為末以綿裹一錢當痛處咬之即定有涎吐之槐枝焙出聖濟總録治牙齒疼痛用槐枝燒令熱於痛處齒縫中焙之即瘥李木皮出聖濟總録治牙齒痛取李木皮不拘多少細嚼汁浸痛處不過三五次即瘥一方用水煎含之亦得松節湯出肘後方治牙齒痛用松節細剉如麻豆一合以水三盞煎藥二盞許去滓潄牙立止一方燒灰揩之亦治牙齒厯蠧根黑黯𤓰蒂散出聖濟總録治牙齒疼用𤓰蒂七枚炒黄為末以麝香相和新綿裹病牙處咬之橘針湯出聖濟總録治牙齒疼久不瘥用臭橘鍼不拘多少剉如麻豆每用一合水一碗煎五七沸熱潄牙疼處立效治齒痛方出千金方含白馬尿隨左右含之不過三五口治齒痛方亦治牙齒不生出仁存方見本門齒齗又方用蚯蚓糞缺皂子膏出余居士選竒方治牙疼油皂出皮核樟腦黄丹各少許右三味同煉蜜為丸塞牙蛀中又方出千金方取蚯蚓自死者搗末着痛處即止地黄餅子出御藥院方治牙齒痛用地黄五觔凈洗去苗於甑内蒸先鋪布一重以上層密閉令熟出曝之當日乾如經三度以生地黄汁二升洒之曝乾然後搗為餅每服一餅噙化嚥津一治齒二生津液三變白髪髭鬢為黒其功極妙治牙疼出神效方口噙水一口用大黄末紙撚隨左右痛處鼻内塞之立止治牙疼出神效方以巴豆去皮用針刺於燈煙上炙令煙出薫牙痛處三五次又方出儒門事親治牙痛以花􅀈填牙坑痛立止又方枯白礬熱水潄之治牙疼方用蟾蜍背上刮白涎用綿展之在疼處咬之吐涎用清水潄口又方用胡椒一錢半羊脂打拌搗四十九下擦之又方用防風艾槐條花椒鹽荆芥湯潄之又方用蜈蜂窩一箇明礬鹽各等分先用礬在瓦上火煉乾為末装在蜂窩眼内用瓦二片将蜂窩放在中間上下合了却用慢火在下煉過為末擦牙疼處治牙疼出本事方用川芎大者一箇舊糟内藏着一月日透内後出焙乾入細辛為末揩疼處又方出本事方用土狗一箇舊糟褁定次将紙裹温慢火煨焦去糟取土狗為末敷牙疼止治牙疼不可忍用烏頭尖生用為末擦疼處用藥後以竹葉或細辛荆芥湯潄之治牙疼出范氏方用白殭蠶真者不拘多少用生薑片切同炒候殭蠶赤色黄色為度去薑不用将殭蠶為細末每用取不蚛皂角刮去黒皮以手指蘸湯於皂角黄上擦取汁揾殭蠶末揩痛處即止治牙齒痛出范氏方以蕪荑仁安蛀齒上有縫就以窒之立驗治牙痛諸藥不效用芫花以細末擦痛處令熱痛定温水潄之治牙疼出危氏方先用露蜂房𤓰蔞皮各燒灰去火毒擦牙以烏桕根菜根栁根葱根不拘多少四味煎湯温潄治牙疼出經驗良方用皂角濃漿同朴硝煎令溶潑在石上成膏手擦牙痛處又紅豆末搽去涎出安又鶴虱草花醋煎温浴牙加椒數粒尤好浴得涎即吐去又青鹽安頓於竹内緊燒過去竹為末香附子燒去皮毛為末各等分加細辛末日逐擦痛處又方大黄燒灰敷痛處立愈一方紅豆為末搐鼻中出衛生家寶方治牙疼出經驗方用華隂細辛多年陳石灰等分研為細末擦牙痛處即止如石灰得城頭上尤佳治牙痛有四證不可例治出海上方熱者怕冷水用牙硝薑黄雄黄荆芥等治之冷者怕熱湯用乾薑蓽撥細辛等治之不怕冷熱乃風牙用猪牙皂角殭蠶蜂房草烏治之有竅者蛀牙用雄黄石灰沙糖等治之用藥了皆以温水潄之治牙疼方單㗜蒼鹽少許於鼻中一方以煖水含揩牙治牙疼出海上方用茄花秋者尤妙閑時乾貯旋燒傅疼處立愈又方出海上方用蒺藜煎湯盥潄立效又方出海上方用陳茄樹燒灰先用露蜂房煎湯盥潄却以茄灰傅之仙方出海上方治牙疼諸藥不效者以荔枝取肉不蛀者仍入殻内於磚上壅火燒存性出火毒為末揩疼處立止山蜂酒出海上方用蜂窩大如斗者燒灰存性麝香少許用煮酒調以綿紙覆葢勿令藥氣漏酒盥潄冷時吐了再呷温者含口中不可嚥了鯽魚砒治牙疼去齒如神以鯽魚一箇破開入砒於内放在地孔中候魚身上自然霜掃下燈心㸃蟲牙水潄自落青錢方出海上方用晉礬四兩生薑一觔切以銀器石器熬黄色勿令焦入升麻一分華隂細辛半兩同為末擦之蜂房鹽出海上方用柳皮一片或用楊皮削薄約長二三寸以痛處兩牙咬定柳皮却以熱艾成顆置柳皮之頭炙之不過三壮柳皮一熟其疼即止其艾頭煙亦自鼻中薫入也又方出海上方靳李謙云嘗牙疼月餘一試愈屢效於人用䗶少許炙洋攤於紙上却用熱艾攤於䗶紙上用筯捲之成箇去筯置此艾筒於牙疼一邊鼻孔内以火燒艾筒待煙盛即以手滅火塞筒口鼻中大吸煙者三口中呵氣其艾煙滿口疼亦止腫亦消赴筵散一名晉礬散出海上方用老生薑切片安瓦上用炭火却将白礬滲薑上候焦為末擦疼處有人牙疼日夜呻吟用此有驗治諸牙疼及齒衂出海上方隔年糟茄燒灰出火毒為細末每用少許乾擦疼處立效或糟茄新瓦上片切薄令乾黒色為末傅之又方出海上方用橡斗子入鹽少許塞滿在内合定新瓦上燒存性出火毒為末每用少許乾擦疼處有涎吐之治諸牙疼方出海上方敗毒散洗心散同煎潄口嚥良久即安效速如神又方出海上方先洗牙淨以紙浥乾尋壁上白蟢窠四五箇剥去黒皮者止用白者次以刀於火上燒令汗出将蟢窠惹汗圓了納牙中更入些乳香於蟢窠内尤妙以乳香入蟢窠用綿紙包燒為灰丸納疼處或以好醋含潄亦效治牙疼方一名露蜂房散出十便良方治熱毒風攻頭面齒齗腫痛用露蜂房不拘多少用火筯簽燒過研碎為末将藥放手心内用好酒三四滴調成膏子又用熱酒一口調藥如左邊牙疼将藥於左邊痛處噙𠻳右亦如之凡用露蜂房即煎洗入藥並炙用一方用花椒鹽少許将水煎亦可一方用醋煎含之立效不得嚥入喉中又方用壁上掃土用鹽炒過為末左右鼻内㗜之治牙疼方用竈上塵土鹽炒一處攪和擦牙痛處立效又方用赤小豆不拘多少炒褐色研細有銅青加少許如無但擦牙疼效治牙疼出肘後方以蒜一片切一頭作葢剜去中心煨巴豆一粒至黄熱用鹽裹隨患處左右塞耳中又用蒼耳子莖葉煎湯熱含之即吐吐了即愈治牙疼牙疼者風化牙痛或單芒硝研末隨左右鼻内吹之酒齒痛方出指直方以井水洗口頻換且含且潄或百藥煎泡湯微冷含嚥或縮砂嚼傅齒痛處秘方出危氏方治經嵗牙疼以楓香脂為末入焚香爐内灰再篩過常日洗面時用揩牙上永無斯疾更臨睡温水净潄為佳治風熱上攻牙痛不可忍者右神芎丸五六錢用温茶清送下食後服之定牙疼出本事方用三脚不拘多少鹽泥固濟火煆通紅出火毒次碾為末每用些小䪺蛀牙孔内立效臨用藥時入乳香末少許令勻通若先将乳香和之後恐過却藥性其效較緩是故用藥臨時和勻胡麻湯出肘後方治齒風腫痛以胡麻五升水一斗煮取五升含潄吐之莖葉皆可用之姚云神良不過三劑腫痛即愈杏仁方出肘後方治諸牙齗疼用杏仁一百枚去皮尖雙仁以鹽方寸匕水一升煮令沬出含之味盡吐却再含之三度瘥藜蘆方出肘後方治牙疼用藜蘆末塞牙孔中勿嚥汁神效槐樹白皮出肘後方治牙齒疼痛風疳䘌取槐樹白皮一握切以酢一升煮去滓著鹽少許適寒温含日三易一方以煎漿水煮含之獨頭蒜出聖惠方治牙齒疼痛以獨頭蒜煨之乗熱截用頭以熨痛上轉易之亦止蟲痛楊柳白皮方出肘後方治齒痛以楊柳白皮卷如指許大含嚼之以汁漬痛齒根數過即瘥也一方用醋煎含之秦椒方治齒痛用秦椒醋煎含之一方用蜀椒枳殻方以枳殻根浸酒煎含治齒痛消痰有氣加而用之豹皮方治牙疼用豹皮燒灰傅䘌齒瘡痛齒牛膝根方出聖惠方治牙齒疼痛以燒牛膝根灰置牙齒間一方燒牛膝齒間含之以牛膝根為末綿裹含之亦可蘆薈方治齒䘌并有蟲用蘆薈四分杵末先以鹽揩齒令淨然後用少末塗於上妙鯽魚方出肘後方治牙齒痛取鯽魚肉鹽花於肚中燒作灰末傅之即瘥皂角方一名皂角散出指直方治風齒動摇以皂莢兩挺食鹽半兩同燒令通赤細研夜夜用揩齒一月後有動齒以及血䘌齒並瘥其齒牢固一方不用鹽石膽方出聖惠方治齒痛及落盡用石膽細研以人乳汁和丸如膏傅所痛齒上或孔中日三四度止痛復生齒百日後復故齒生止用新汲水潄令淨凡治齒先須除却食床用針刺盡黒血然後塗雄黄末入齒縫中細看之齒根下若虚軟即以小針刺通齒根下若痛即出却惡物然後傅膏膏乃行也少年即易治老者難痊柳枝方出肘後方治牙齒疼用柳枝一握細剉入少鹽花将水煎含之甚妙用葉煎含亦得槐嫩枝方用春採槐嫩枝煆為黒灰以揩齒去蚛痛治療牙疼出聖惠方取皂莢子搗末以綿裹如彈子大兩顆於釅醋中煮熟徹牙疼處齧之冷即易日三五度以瘥為度治牙齒痛方出肘後方取苦竹燒一頭一頭得汁多擦齒上即瘥治齒牙疼風蟲俱瘥方出肘後方大豆半升柳枝如筯大亦切半升二物必須於銅鐺熬令黄焦即以美酒大大升沃之又煮一沸取湯含潄浸疼處冷即吐却更含熱者三五日即愈久含彌差常用驗治齒疼出肘後方用葫荽子五升以水五升煮取一升含之治牙疼方用杉松皮切碎約三兩重取水三碗熬至一碗盥潄三五次不可嚥立效治牙疼出聖惠方以蘿蔔子二七粒去赤皮細研以人乳和左邊牙疼即於右鼻中㸃少許如右邊牙疼即在左邊鼻中㸃之立效治齒疼立效方出聖惠方取川椒一兩去目搗羅為末以好白麵滚丸如皂角子大燒令熱於所疼處咬之不過三五度即瘥又方出旋舎備要方治牙齒疼痛腮腫齗不能嚙物風蚛疼俱治附子角八箇巴豆一箇去皮麝香當門子一箇右研為末蒸餅水浸為丸如黄米大以綿裹隨痛齒隱之牙齒連腮腫痛方出衛生家寶方防風巴㦸天麻莽草細辛以上各一兩白芷香附子各一分右為末牙疼處揩擦約行半里地鹽湯潄口治冷證齒痛方出朱氏集驗方羊腎子八味丸右相和鹽湯送下白芷散出朱氏集驗方治牙疼白芷血餘芎藭百草霜川芎草烏雄黄花桑皮燒硃砂全蝎麝香北細辛沒藥當歸右等分為末每用一錢茶酒任下空心先将此藥用醋調如膏次皂角炭火燒令烟出却用皂角㸃藥患處即安立效散出朱氏集驗方治牙疼白礬一兩生薑三兩切片同白礬炒乾蓽撥一兩焙乾右炒鹽少許為細末擦牙痛處如神救苦散出衛生家寶鑑方治一切牙疼及寒風蚛牙疼草烏頭川烏頭桂花良薑紅豆胡椒蓽撥細辛各半錢石膏官桂各二錢右為細末先潄淨裏外乾摻之出涎立愈失笑散出十便良方治牙疼川烏頭芎藭甘草地骨皮細辛髙良薑白芷各等分右為細末每用少許擦痛處兩三次涎出以温水潄之沉香散出十便良方治老人多患冷牙疼不可忍者宜用此方沉香半兩升麻細辛白芷地骨皮各一兩附子一分生用右搗羅為末每用一錢以白湯調熱含冷吐之全蝎散出衛生家寶方搐一切牙疼蜈蚣一條全蝎三個芒硝半兩良薑乳香一錢麝香一字右為末每用少許搐鼻九寶散出楊氏家藏方治牙疼青鹽細辛去葉土延胡索髙良薑蓽撥胡椒麝香别研乳香别研雄黄别研右件各等分為細末次入别藥令勻每用少許微微擦痛處香白芷散出東垣蘭室方治大寒犯腦九分朔風一分牙疼藥麻黄去節一錢半草荳􅅳皮七個草荳􅅳仁七分黄耆一錢呉茱萸四分藁本三分羌活八分香白芷四分當歸身半錢熟乾地黄半錢升麻一錢桂枝三分半右件為細末先用温水潄洗以藥擦之治蟲散出東垣蘭室方治大寒犯腦牙齒疼痛及朔風作痛蟲痛胃經濕熱腫痛麻黄不去節一錢草荳蔲皮一錢呉茱萸八分黄連四分藁本二分黄耆一錢羌活根五分白芷三分當歸身四分熟地黄三分骨灰二錢升麻一錢桂枝一分草荳蔲仁半錢益智仁四分右件為細末同煎搽之一方無草荳􅅳仁益智木律散出東垣蘭室方治寒熱牙痛草荳蔲皮一錢二分木律二分益智皮半錢升麻根一錢半骨灰半錢熟地黄半錢生地黄四分當歸身四分右件為細末用度如前如寒牙疼不用木律一方有黄連無生地黄蝎稍散出東垣蘭室方治大寒風犯腦牙痛麻黄去節二錢半桂枝三分升麻根三分羌活半錢防風根二分藁本三分當歸二分香白芷二分黄耆三分柴胡二分草荳蔲皮一錢骨灰二錢半蝎稍少許右件為細末如前用之刷牙散出東垣蘭室方麝香一分升麻一錢白荳􅅳三錢草荳蔲皮半錢骨灰二錢黄連一錢半漢防己二分當歸身三分生地黄一分熟地黄二分沒石子三個人參三分五倍子一個右為細末如前搽之當歸龍膽散出東垣蘭室方治寒熱牙痛麻黄黄連各一錢骨灰半錢升麻一錢香白芷半錢生地黄五分當歸稍半錢草龍膽草荳蔲皮一錢右件為細末擦之如神牢牙地黄散出東垣蘭室方治腦寒痛及牙疼麻黄二分黄連骨灰各一錢升麻一錢半草荳􅅳皮一錢呉茱萸八分益智仁當歸身各四分藁本二分黄耆半錢熟地黄人参羌活各二分香白芷半錢防己三分生地黄三分右件為細末搽之神效一方無生地黄草荳蔲皮出東垣蘭室方治寒多熱少牙疼痛草荳蔲一錢三分不去皮黄連一錢半升麻二錢半細辛葉二分骨灰半兩當歸六分防風根二分草荳􅅳仁一錢熟地黄半錢右件為細末同煎牙疼處擦之一方無草荳蔲仁羌活湯一名細辛散出東垣蘭室方治客寒犯腦風寒濕腦痛項筋急牙齒動摇内齦根脱疼苦楚麻黄去根節三錢羌活根一錢半藁本三分細辛根少許升麻根半錢柴胡根半錢當歸身六兩香白芷三分桂枝三分草荳蔲皮根一錢骨灰二錢蒼术半錢右件前藥為極細末先用温水潄口淨搽之其病立止或再痛一陣則止治牙齒疼痛連頭目俱瘇其痛不可勝忍痛處齒上多有腐朽黒㾗成穴愚醫以為蟲蝕者宜使此方若要永除根當須依此方法使藥并依下面法修合茵陳散喫一兩料消去骨槽風熱則其痛永去根本出䕶命方藁本木香㯽榔各一分右件藥並不見火生杵羅為末每使二錢傅在痛處齒齗上合口候津液滿口抽得齒却下熱毒却和藥吐出如此使兩三度下便以熱水潄口不得嚥下藥入喉中更使藥末六錢用生葱自然汁調外貼在痛處乾即換之仍脩合上面茵陳散喫即得安效其茵陳散若要常喫即去大黄半夏牽牛三味脩合逐日依法進服喫至兩三料即其痛永除根本更兼肌肉顔色瘦黄白諸疾不生也立效散出東垣蘭室方治牙齒痛不可忍及頭項背微惡寒飲食大惡熱飲其肺上中下三部陽虚隂盛是五臟内盛而六腑陽道脉微小其小便滑數酒洗龍膽草二錢升麻七分防風根一錢炙甘草三分細辛末二分右㕮咀如麻豆大都作一服水一大盞煎至七分去滓以匙撩口中患痛處待少時則止如多惡熱飲更加龍膽草一錢此法不定視寒熱多少臨時加减若更惡風作痛加草荳􅅳皮半錢勿加龍膽草也清胃散出東垣蘭室方治因服補胃熱藥致使上下牙疼痛不可忍撁引頭腦滿而發熱大痛是陽明之經絡入腦在經十五絡中喜寒惡熱乃手陽明經中熱成而作也其齒喜冷惡熱生地黄直者三分升麻一錢牡丹皮半錢當歸身三分擇細黄連六分如連不多更加二分如夏倍之大抵黄連臨病増减無定法右五味同為細末都作一服水一盞半煎至一盞去滓帶冷服之香笑散出楊氏家藏方治牙疼猪牙皂角細辛去葉土川烏頭生用不去皮尖蓽撥香附子以上六味各二錢乳香一錢别研升麻一錢右件為末次入乳香研勻每用一錢揩貼患處仍頻用仙桃散出楊氏家藏方治風牙疼有膿血并口氣防風去蘆頭桃節根香白芷細辛去葉四味各一兩川椒去目山梔子仁二味各半兩右件為細末每用二錢水七分煎至五分熱呷之俟其冷即吐出三枝膏出楊氏家藏方治風熱上攻牙齒疼痛槐枝柳枝桑枝各半觔寸剉右三件以水一斗煎至三升去滓熬成膏入後膏藥生薑一兩取汁芎末細辛末各半兩右同搗令勻以盒子盛每用少許擦牙立效失笑散治牙疼不問久新細辛去土葉良薑香白芷蓽撥右各等分為細末左邊牙疼口含水搐左邊鼻右邊牙疼搐右邊鼻如擦牙亦得荆芥散治風蚛牙疼牙槽浮腫荆芥穗薄荷葉去土細辛甘草炙右件各等分為細末每服二錢茶調下或用藥五錢水一大碗煎三五沸通口慢慢潄亦得止疼散治牙疼大蒜一瓣去皮生用細研巴豆去殻一枚細研鹽豉七粒細研右件同研勻入甆器盛之密封勿令透氣每用少許擦患處日三兩次用祛痛散治元臟氣虚風熱内攻牙齦浮腫疼痛發渇細辛去葉土雞腸草旱蓮子各等分右件同研令極細每服用一字以鵝毛蘸藥掃患處日用一二次若小兒走馬疳唇齦蝕爛者先泡青鹽湯淨後用新綿拭乾摻藥治齒痛不可忍附子真天雄尖全蝎七箇右件為末㸃痛皆生用又方治牙齦疼腫生地黄川獨活細辛各等分右煎噙服痛加桔梗葶藶子又方真細辛威靈仙各等分右為末沙糖丸貼痛處又方杜仲芫花等分用醋炒七次水煎噙之久吐於壁上不得落地三遍痛即止又方皂角香附鹽同燒作揩牙藥明目去口氣固本散出衛生寳方用蝎稍胡椒二味等分為末揩痛處立效露蜂房散出楊氏家藏方治牙疼露蜂房天仙籐各等分右件㕮咀每用二錢水半盞煎數沸去滓潄之一方諸牙疼出鮑氏方獨活二寸甘草一寸右煎五分熱潄痛處温則換潄烏頭散出楊氏家藏方治下虚氣就上風毒攻牙齒宣動疼痛虚浮右川烏頭一枝炮去皮臍片切入生薑七片青鹽少許煎令濃用浸齒脚擦牙散出詹寮方治風熱牙疼右用川烏草烏亦可用一隻切作兩邊一邊生一邊煨為末煆少鹽同擦牙患處流出風涎細辛散出朱氏集驗方治牙疼福州官醫王子益用此二方有效北細辛蓽撥各二錢白芷川芎各三錢川烏一箇全蝎五箇右六味晒乾為末或痛先用鹽水洗淨用少許傅痛處立效或熱腫即入腦子少許和藥擦之皆效細辛散出朱氏集驗方治牙根腫痛全蝎白礬北細辛葉各二錢麝香少許右為細末摻腫處仍用荆芥煎湯盥潄最佳髙州報恩新老方治風牙疼出朱氏集驗方露蜂房炒國丹各等分右為末摻患處白牙散出東垣蘭室方升麻骨灰各等分右件為細末先用温水潄口擦之妙治牙齒疼痛使前面方口内含抽齒却下熱毒了水潄口了又外使貼藥并喫茵陳散了仍以此方傅在痛處其痛立止出䕶命方五倍子一兩切碎於新瓦上焙乾杵為細末右使前面方取齒脚下熱毒潄口了外使貼藥并喫茵陳散了即使此藥末半錢傅痛處停待片時吐涎了仍再服以痛處止為度又方出肘後方治齒痛火炙脂索如錐以内蟲孔中便縁脂出治齒痛出本草以零陵香梗藥煎含之良得升麻細辛善不宜多服令人氣喘主齒痛出本草用青藤打碎口中含之良治牙疼揩齒右用直殭蚕不拘多少新瓦上炒變深褐色為末研入青鹽少許揩之良久温水潄治牙疼殊效右用青荷葉剪去四縁留中間連柄處大如錢七枚以釅米醋一盞煎取半盞去荷葉熬成膏抹痛處妙治牙疼又用蓽撥為末揩之煎蒼耳湯潄之又方右用青木香為末入麝香少許揩痛處以鹽湯潄立止治牙疼右用香附子為末揩之良久以温鹽湯潄立止治牙齒痛用露蜂房煎湯潄之露蜂房今呉蜂窠也又方用猪牙皂角鹽等分燒為末揩痛處又方用蒼耳子五升水一斗煮取五升熱含之冷即吐吐復含不過三劑莖葉亦得又方用三角烏古瓦子令三姓童子候星初出指第一星下火三角瓦上炙之叩齒法出朱氏集驗方養生方云鷄鳴時常叩齒三十六下食畢令啄齒皆宜長行之令齒不蠧蟲又云早朝未起潄口中玉泉令滿口嚥之啄齒三十遍過去蟲而牢牙又法此危氏方養方方導引法方云常向本命日櫛髮之始叩齒九通隂呪曰大帝散靈五老反真泥丸𤣥華保精常存左廻狗月右引日根六合清鍊百疾不生嚥唾三過常數行之使齒不痛髮牢不白頭腦不痛又云東向坐不息四通啄齒二七治齒痛病大張口啄齒二七一通二七又解四通中間其二七火勢以意消息差病而已不復痛解病鮮白不􅀢亦不疏離久不行已能破金剛又云東向坐不息四通上下啄齒三十六下治齒痛普濟方卷六十六
