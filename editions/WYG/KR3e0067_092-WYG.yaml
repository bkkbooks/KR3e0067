body:
  text: 普濟方卷九十三明周王朱橚撰諸風門風癱瘓夫風者分布八方長養萬物是天地山川之風温凉寒暑之氣也其不順四時賊邪之氣傷於人者則為毒風故聖人云避風邪今人觸犯不正之氣多中風病者是不避風邪毒氣也夫癱緩者此皆肝腎中乆虛氣血不足腠理踈泄風邪易侵肝主於筋腎主於骨肝腎中風筋骨緩弱故名癱緩也其病春夏得之難治秋冬得之易療春夏者陽氣上騰火力方盛風火相得而主也秋冬者陽氣降下火氣漸㣲即易療也其病手足舒緩不能収攝口角垂涎言語蹇澁皮膚頑痺歩履艱難是其候也癱緩之辨癱則懈惰而不能収攝緩則弛縱而不能制物故其証四肢不舉筋脉恣縱無力不可支梧者謂之癱其四肢能舉動而肢節緩弱凭物方能運之者謂之緩或以左為癱右為緩則非也但以左得之病在左右得之病在右耳推其所自然皆由氣血内耗肝腎經虛隂陽偏療而得之或有始因他病服吐下之藥過多亦使真氣内動榮衞失守一身無所禀養而致然也方大聖花蛇牛黄丸治癱緩口眼喎斜涎多語澁筋骨無力歩履艱難偏身疼痛並冝服之一名大聖通中花蛇丸白花蛇酒浸去皮骨取肉炙烏蛇二味並酒浸去皮骨炙磁石煅醋淬赤箭防風去义半夏生薑汁浸一宿焙葳靈仙去蘆土自然銅煆醋淬七遍各四兩羌活去蘆海桐皮剉乾蛇去土炒白殭蠶炒白蘚皮蔓荆實各三兩當歸切焙芎藭青橘皮湯浸去白焙蒺藜炒各三兩五味子澤㵼逺志去心萆􅐺各一兩芍藥牽牛子一半生一半焙荆芥穗白頭翁肉蓯蓉酒浸切焙沉香各一兩乾薑麝香另研牛黄另研各半兩麻黄去根節三兩丹砂另研一兩半水銀一兩用黒錫一兩結成沙子桂去粗皮木香各一兩半葫蘆巴楝實白豆􅅳去皮各一兩右除别研外並搗羅為細末冄與研者和匀煉蜜丸如彈子大毎服一丸細嚼用豆淋薄荷温酒下不拘時如要出汗濃煎鹽豉湯一盞投之宜避風坐卧一方無赤箭芍藥二味換骨丹出御藥院方治中風癱瘓乆不愈四肢嚲曵不遂諸藥不效麝香研半錢桂去粗皮一兩半麻黄十斤去根節净水七斗煑减半去滓澄清冄煎入錫磁器収貯硃砂二兩為衣甘松去土川烏去皮臍白芥子炒藿香草烏生去皮臍海桐皮炒何首烏羌活龍腦骨碎補去毛炒牛膝酒浸葳靈仙去土桑白皮炒槐角木鱉子炒自然銅醋淬七遍研細青皮去白陳皮去白各一兩白芷防風甜瓜子炒萆􅐺炒五靈脂川芎甘草鹽炙苦参白膠香各半兩右為末用麻黄膏子入少蜜熟者搜成劑丸如彈子大硃砂為衣毎服一丸食後搥碎茶清酒化下或用生薑自然汁更入酒半盞化開服可更進酒一二盞投之日二服至三日於病處㣲汗為效至十日大效無不愈但藥性稍熱病寒者多效麻黄丸出聖惠方治癱緩風手足不遂骨節疼痛麻黄去根節白花蛇肉烏蛇肉各一兩巴豆一兩去皮心研如膏與前藥三味與銅鍋内用水一石文火煎兩復時熬水及三四斗以來漉出麻黄并蛇冄以生絹濾過入鍋内以慢火熬令稀稠得所盛入浄器中入後藥味硫黄滴生甘草水研桂去粗皮硇砂漿水化去石銚子内熬煎乾蝎去土炒附子炮製去皮臍防風去义天麻犀角鎊沉香羌活去蘆天南星炮天雄炮裂去皮臍羚羊角鎊㯽榔剉白附子炮白殭蠶炮當歸切焙各一兩牛黄龍腦麝香各半兩同研右除研并藥汁外搗羅為末同和前煎汁和杵千百下丸如梧桐子大毎服一丸或二丸以豆淋酒嚼下日三牛黄丸出聖惠方治癱緩風手足不遂皮膚頑痺口面喎斜言語蹇澁牛黄蟬殻桑螵蛸㣲炒川烏頭炮裂去皮臍晩蠶蛾㣲炒乾蝎㣲炒鈆霜研入硃砂細研各半兩赤箭獨活烏犀角屑天南星炮裂仙靈脾各一兩防風去芦牛膝去蘆各三分烏蛇肉酒拌炒黄色二兩萆􅐺茵芋漢防己桂心各二分麻黄一兩半去根節膩粉研入麝香研各一分天雄炮裂去皮臍二分右為末研了藥令匀煉蜜和丸如梧桐子大毎服不計時以温酒調下十丸荆芥散䕶命方治中風癱緩肢節沉筋骨無力悶倒不知此藥踈風順氣大腑熱方可喫荆芥穗防風去义桑寄生羌活去蘆獨活去蘆芍藥乾蝎去土皮炒白花蛇酒炙去皮骨天麻附子炮製去皮臍半夏湯洗七次炒麻黄去根節木香蔓荆實去白皮芎藭白殭蠶炒各半兩龍腦研沉香研麝香研丹砂研半錢牡丹皮桂去粗皮炒三錢右為散然後入硃砂龍腦麝香冄同研匀毎服二錢濃煎生薑薄荷湯調下食後金胦如聖煎丸治癱緩風疾麻黄去根節桃心柳心剉各四兩桑根白皮辛斤剉黒豆二升童便三升河水水十五斤七味入銀石器内熬三分至一分去滓别入後藥天南星生用天雄生用去皮臍天麻二兩乾蝎去土炒二兩半天蓼花二兩麝香三兩膩粉一錢乳香半斤木鱉子去殻一兩九味研為末以生地黄汁入在前藥水中冄用文火同熬成膏以潔净器宻収之丹砂一兩雲母末一兩金銀萡各十片右將後四味研入粉瓷各盛用之益母草固濟於地坑子用炭五斤煆令通赤用温土盖候冷取出以粉紅色為度服時先取法酒一升膏子秤一兩煆者丹砂秤半兩同入銀石器中熬酒至一升分作五服先日午一服温服之日晩一服一更後一服取下惡毒物為候羌活散出聖惠方治癱緩風手足垂嚲頭痛目旋涎唾不止羌活附子炮裂去皮臍旋復花烏蛇酒浸炙令黄各一兩天麻胡麻子細卒藿香牛膝去蘆白蘚皮芎藭天南星㣲煨蟬殻白附子炮裂地龍㣲炒晩蠶蛾㣲炒甘草炙赤各半兩麻黄去根節乾蝎㣲炒麝香細研一分右為散研了藥令匀毎服不計時候薄荷温酒調下二錢海桐皮丸海桐皮剉金毛狗脊去毛二兩白芥子乳香沒藥各研半兩芸薹子研地龍炒甜𤓰子楓香脂蔓荆實草烏頭生用去皮尖續斷各一兩牡蠣生三兩葳靈仙去土蒼术炒木鱉子去殻各一兩半自然銅煆醋淬七次烏藥各二錢右除研外羅為末和匀醋煮麵糊為丸如菉豆大毎服二十丸木𤓰温酒空心服下秦艽散出聖惠方治癱緩風手足不遂肌肉頑痺筋脉拘急心神不安言語蹇癱緩風澁胸膈痰涎不利秦艽去苗赤箭獨活桂心五加皮乾菊花漢防己羚羊角屑葛根剉赤芍藥防風去蘆頭芎藭側子炮裂去皮臍杏仁湯浸去皮尖雙仁麵炒㣲黄甘草炙㣲赤剉各一兩磁石三兩搗碎水泡去赤汁麻黄二兩去根節薏苡仁三兩右為散毎服四錢水一盞生薑半分煎六分去滓不計時候温服側子散出聖惠方治癱緩風言語蹇澁手足不遂側子炮製去皮臍秦艽去苗獨活當歸剉㣲炒羚羊角屑天麻黄耆人参去蘆白蘚皮防風去蘆頭各一兩乾蝎㣲炒白附子炮裂茵芋躑躅花酒浸炒令乾麝香研入各半兩牛膝去芦麻黄去根節各一兩半右為末入研了藥令匀每服不拘時候以温酒調下二錢葳靈仙丸治癱風脚膝無力行履艱難筋骨麻痺葳靈仙去苗土五兩草烏頭剉㣲炒七兩骨補脂去毛二兩半地龍去土炒天南星炮各三兩自然銅醋炒淬研一兩蒼耳仙靈脾側子炮製去皮臍防風去义各四兩羌活去蘆蔓荆實掠去皮澤㵼藁本去苗皮萆􅐺獨活去蘆頭各一兩右搗羅十五味為末合自然銅末研令匀用好酒煮麵糊和丸如梧桐子大毎服五丸漸加至十五丸空心温酒下纔服後忌便喫熱物覺唇口麻者痺漸减也金虎丸治癱緩風天南星天麻白附子烏蛇酒浸去皮骨焙附子去皮臍乾蝎去土狼毒白殭蠶各二兩桂去粗皮二兩㯽榔剉三兩五靈脂烏頭去皮臍各二兩牛黄麝香丹砂三味同研細各半兩右藥生用除研外為末和匀煉蜜丸如鷄頭大每服一丸嚼細茶酒下若用牛膽丸尤妙療癱緩風神驗側子去皮防風芎藭秦艽甘草炙各一兩羚羊角屑漢防己杏仁去皮尖各三兩五加皮四兩磁石一斤碎綿褁乾菊花一升乾薑一方作乾葛芍藥麻黄薏苡仁一斤右㕮咀水一斗五升煮麻黄去土沫内諸藥煎取三升温三服相去十里乆將息取汗乾傅粉勿當風慎熱物及猪魚肉蒜酒黒神丸治男子婦人左癱右瘓脚手頑麻腰膝疼痛走注四肢百節皆痛口眼喎斜頭目旋暈並宜服之一名烏犀丸熟地黄浄洗赤小豆生乾薑炮藁本洗去蘆麻黄剉去節湯泡去沫川芎各六兩羌活甘松洗去土當歸洗去蘆各三兩川烏炮去皮臍甘草剉各十八兩藿香洗去土香墨燒醋淬各半斤草烏炮去皮臍一斤白芷各十二兩右為細末以水麵糊丸如龍眼大毎服一二粒細嚼茶酒任下如婦人血風脚足手疼痛打撲損傷亦宜服之一方用黄秫米粉煮餅丸服舒筋保安散治癱瘓筋脉拘攣身體不遂脚腿少力乾濕脚氣及濕滯絡乆不能去宣導諸氣乾木𤓰五兩萆􅐺五靈脂牛膝酒浸續斷白殭蠶松節白芍藥天麻葳靈仙黄耆當歸防風去义虎骨各一兩右用無灰酒一斗浸上件藥二七日𦂳封扎日數足取藥焙乾搗為末毎服二錢用浸藥酒半盞調下喫酒盡用米湯調下又方金毛狗脊一兩却將乳香白膠香各一兩同研入乾藥内愈風丹芍藥川芎白殭蠶炒桔梗細辛去葉全蝎炙各一兩甘草三錢南星半兩生姜製白芷天麻羌活各半兩麻黄去節防風去蘆右為細末煉蜜和丸如彈子大毎服一丸細嚼茶清任下腦麝袪風丸治左癱右瘓卒中風服此藥得愈甚有妙白花蛇頭一箇帶項三寸酒浸炙烏稍蛇尾二箇長七寸酒浸炙川烏頭炙三箇去黒皮附子四箇去黒皮天南星炮半夏薑製白附子細辛去葉防風去蘆天麻全蝎去毒炒白殭蠶去絲嘴炒黄草烏頭炮各半兩龍腦麝香各一分研右為細末薑汁為丸如梧桐子大毎以朱砂為衣服五十丸煎小續命湯送下不拘時候活絡丹治男子婦人癱瘓筋攣骨疼腰膝口眼喎斜語言蹇澁目晦耳聾中風䓁證亦治心氣痛尤驗萆􅐺四兩川烏五錢去皮臍切四塊金毛狗脊四兩切作片去毛蒼术去皮米泔浸炒破故紙揀炒五錢杜仲五錢細切薑汁浸去絲仙靈脾切吳茱萸炒續斷各五錢小茴香炒獨活各一兩切薏苡仁三兩猪牙皀角去皮弦一兩切作一寸右作一處用好酒三升於磁内浸一宿次日以文武火煮至約酒汁一升漉出焙乾為細末用煮藥酒打麵糊為丸如梧桐子大毎服五七十丸空心温酒或鹽湯送下與七烏丸相同間服孕婦不可服沉香煎丸治癱緩不収體重無力肢節緩弱運動不能沉香剉丁香葫蘆巴炒附子炮製去皮臍牛膝去苗剉酒淬炒用補骨脂炒蘹香子炒石斛剉酒淬炒芎藭木香青橘皮湯浸去白焙桂去粗皮肉蓯蓉剉酒拌炒半兩右為細末煉蜜和丸杵數百下丸如梧桐子大毎服三十丸生薑鹽湯下酒亦得躑躅丸治癱緩風手足不遂心神煩悶睡卧不安躑躅花酒拌炒乾天麻羌活漢防己白殭蠶㣲炒朱􅀈研細水飛過各一兩乾蝎㣲炒天南星炮製白附子炮製蟬殻蜣螂去頭翅足㣲炒半兩金薄銀薄各五十片右為末入金銀薄末研令勻煉蜜和丸如梧桐子大每服不計時候以酒下十丸天南星丸出聖惠方治中風癱緩風無問老少手足不遂及破傷天南星炮製桂心獨活附子炮製去皮臍白附子炮製天麻芎藭當歸鹿角膠搗碎炮令黄燥各一兩麻黄去根節香墨半兩麝香細研牛黄研入一分右為末入研了藥都研令勻煉蜜和丸如梧桐子大毎服不計時候以豆淋酒十丸送下槐膠丸治癱緩風神效槐膠半斤細搗好酒五斤浸一宿後入鍋内煎濾汁一斤蘇枋木四兩用長流水五升煎至一升濾過與槐膠汁相和次入後項藥丹砂研阿膠研乳香研沒藥研各一分以上六味將後四味冄研勻入前二味藥汁内慢火冄熬數沸次入後藥白花蛇一全條酒浸一宿取肉炙一兩半天麻天南星炮製白附子炮製附子炮製去皮臍各一兩甘草炙一兩右將後六味為末與前藥膏和搗五七百杵丸如彈子大毎服半丸生薑酒嚼下日進三四服防