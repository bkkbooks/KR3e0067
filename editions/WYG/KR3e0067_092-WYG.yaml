本茯苓青皮大楓子陳皮桔梗荆芥甘草官桂芍藥寒水石各二兩白花蛇烏稍蛇自然銅已上各一兩右為細末梨湯水為丸麝香少許滑石為衣每兩作十丸每服一丸食後細嚼熱酒下頭風茶清下牙疼入鹽一捻服之渾身疼痛不拘時候温酒下丹砂丸出聖惠方治中風手足不遂言語蹇澁緩縱不仁肢節疼痛硃砂天南星生用赤箭附子炮製去皮臍防風去蘆頭牛膝去苖防己白附子生用獨活殭蠶㣲炒麻黄去根節芎藭桂心白花蛇酥拌炒黄蟬殻川烏頭炮製去皮臍羚羊角乾蝎桑螵蛸㣲炒烏犀角屑麝香研已上各二兩雄黄半兩研入牛黄一分研龍腦一分研右為末入研了藥更令匀煉蜜和搗三五百杵丸如梧桐子大毎服空心及晩食前以酒下十丸仙靈脾散出聖惠方治中風手足不遂肌肉冷痺骨節疼痛緩弱不遂仙靈脾天雄炮製去皮臍天麻牛膝去苖石斛去根烏蛇肉虎脛骨塗酥炙黄已上各一兩肉桂去粗皮麻黄去根節已上各一兩半獨活芎藭茵芋當歸側子炮製去皮臍桑螵蛸㣲炒丹参五加皮海桐皮防風去蘆頭薏苡仁乾蝎生用各三分牛黄研麝香研各一分右為散入研了藥令匀每服食前以温酒調下二錢石斛浸酒方出聖惠方治中風手足不遂骨節疼痛肌肉頑麻石斛去根天麻芎藭仙靈脾五加皮牛膝去苖萆薢當歸鼠粘子杜仲去粗皮烏蛇㣲炒茵芋狗脊丹参已上各一兩桂心附子炮製去皮臍川椒去目及閉口者㣲炒出汁各一兩半虎脛骨各二兩塗酥炙令黄右以細剉用生絹袋盛好酒二㪷於磁中浸宻封經七日後每日旋取一小盞不計時候温飲之常令酒氣相續其酒取一盞以藥味薄即止側子散出醫方集成治中風手足不遂言語蹇澁今用之累驗側子炮附子炮羅参白术煨川芎白茯苓去皮防風去蘆赤芍藥當歸去蘆酒浸秦艽去蘆土肉桂已上各一兩防己七錢半麻黄去根節二兩粉草五錢白茯神去皮木甘菊花去梗細辛去苖各一兩右㕮咀每服五錢水一盞半生薑三片棗一枚煎服不拘時候芎藭湯治中風手足不遂身體疼痛口眼喎斜一眼不合芎藭防風去义白术白芷牛膝去苖人参葛根剉羌活去蘆各一兩狗脊去毛萆薢炒薏苡仁炒各半兩杏仁去皮尖雙仁炒一兩石膏碎二兩麻黄去根節先煎掠去沫焙乾用二兩桂心去粗皮一兩半右㕮咀每用十二錢匕水三盞去滓分三服㣲熱服之日二服夜一服藥後宜依法次第灸諸穴風池一穴肩髃一穴曲池一穴交溝一穴五樞一穴陽陵泉一穴叵虛下廉一穴灸七穴即瘥一方治偏風用生薑半片同煎不用灸法犀角湯出聖惠方治中風手足不遂闗節疼痛心膈躁熱犀角鎊半兩防風去义三分枳殻去穣焙炒獨活去蘆頭桂心去粗皮各半兩秦艽去苖土當歸切焙芍藥赤者白茯苓葛根剉牛膝酒浸切焙仙靈脾人参各三分黑豆炒熟一合半右麄搗篩每服六錢匕水二盞入生薑五片煎至一盞去滓温服上焦虛煩肝心風熱加竹瀝半合同煎食後臨卧各一服一方加熟地黄沒藥丸出御院方治中風手足不遂方見風偏枯類五加皮散出聖惠方治中風手足不遂肌肉頑痺骨節疼痛五加皮桂心羌活防風去蘆頭杏仁酒浸去皮尖雙仁麩炒黄萆薢剉枳殻麩炒㣲黄去穣附子炮製去皮臍牛膝去苖薏苡仁丹参已上各一兩芎藭秦艽當歸剉㣲炒已上各一兩半右為散每服五錢以水一大盞入生薑半片煎至五分去滓温服良乆再服衣覆得㣲汗食前服忌生冷油膩毒滑動風物酸石榴煎出聖惠方治中風手足不遂口眼喎斜語澁垂涎酸石榴皮防風去蘆頭桂心白术赤箭附子炮製去皮臍赤茯苓牛膝去苗赤芍藥枳殻麩炒㣲黄去穣山茱萸羚羊角屑各一兩羌活一兩半右為末用酒五升慢火熬成膏盛於不津器中毎於食前以煖酒調下半匙海桐皮丸出聖濟總録治中風手足不遂身體疼痛肩背拘急海桐皮二兩細剉石斛去根二分羌活去蘆半兩赤箭二兩半牛膝酒浸用切焙白附子生防風去乆各一兩木香山芋各三分菊花牡荆子各半兩丹砂一兩研右為細末以天南星二兩半成末同好酒煑為膏和丸如梧桐子大毎服十五丸茶酒任下青龍丸出聖濟總録治中風手足不遂涎涕膠黏附子炮裂去皮臍芎藭白术米泔浸三日毎日換泔取出焙乾獨活去根節各一兩蒲黄用紙襯炒一兩藁本去苖土一分牛黄研一分麻黄去根節百沸湯中急煑過炒三分丹砂研龍腦研各一分麝香研半錢龍膽一分滴水一兩点令化入藥内右為細末别用水銀三兩以蒸棗五十枚去皮核同研水銀星盡為度次入諸藥更入少許熟蜜和丸如鷄頭大毎服半丸或一丸臨卧以熱水化下其患甚者每夜研二丸如小兒驚涎毎丸分作三服用薄荷湯化下大四斤丸出直指方治風寒赤毒與血氣摶筋骨緩弱四肢痠疼痒痛天麻川牛膝宣州木𤓰肉蓯蓉洗切焙各一斤熟附子虎骨酥炙各二兩大當歸三分生麝香一錢乳香沒藥五靈脂各半兩右為末浸藥酒煑麵糊丸如梧桐子大毎服三四十丸食前温酒或豆淋酒下未效木𤓰湯下蝎附散出直指方治肝腎虛風入筋骨手足緩弱小附子去皮草烏頭生用炮去皮臍蒼术炒川芎牛膝酒浸焙當歸天麻各半兩防己白芷黄耆全蝎炒各一兩右為末每一錢黒豆淋酒調下兼用核桃肉研酒下食前服附子散出聖惠方治中風手足不遂肢節疼痛附子炮製去皮臍桂心各二兩赤箭牛膝去苖狗脊萆薢剉當歸丹参枳殻麵炒㣲黄去穣仙靈脾海桐皮已上各一兩右為細末每服食前以温酒調下二錢夜合枝醖酒出聖濟總録治中風手足不遂攣縮屈伸艱難夜合枝桑枝桂枝栢枝各生用剉五兩糯米五升石榴枝生剉五兩羌活去蘆别搗二兩黒豆𦂳小者五升防風去义别搗五兩細麴七斤半右先以水五斗將五枝同煎取二斗五升去滓浸米黒豆兩日蒸熟入麴與防風羌活二味拌和造酒依常醖法封三七日壓去糟滓取清酒二合至五合時飲之常令有酒氣無令過醉恐至吐即悖亂正氣附子湯出聖濟總録治中風身體不遂不能言語精神恍惚附子炮裂去皮臍一枚重半兩者桂去粗皮葛根剉一兩半犀角鎊地骨皮白术獨活去蘆頭芎藭各一兩石膏碎三兩右剉如麻豆毎服五錢匕水二盞入薑五片煎至一盞去滓温服空心併二服夜一服或夜併二服服訖以熱薑粥投衣覆㣲汗出慎外風不欲汗即不必食粥生地黄煎出聖濟總録治中風手足不遂或拘攣屈伸不得口眼喎斜偏風疼痛或􅍙痺沉重病在筋骨生地黄五斤搗研絞汁令盡桂去粗皮山芋二兩黒豆一升以水三升煎至一升絞去豆晩蠶沙炒二兩海桐皮炙剉三兩大甘石榴三顆去蒂蕚和子皮搗研取汁右先㕮咀四味如大麻豆於銀石鍋内先煎地黄汁三二十沸次下石榴黑豆汁又煎二三十沸即下㕮咀四味勿停手攪慢火煎至濃用生帛絞去滓次下好酥二兩再煎匀攪如稠膏即收於不津器中每日空腹以無灰酒一盞調煎半匙投攪和服之如疾甚者加至一匙頭每日三服切慎房室此方兼治婦人産後風血惡疾羚羊角煎出聖濟總録治中風手足不遂羚羊角鎊荆芥穗羌活去蘆熟乾地黄焙一兩防風去义剉二兩黒豆二盞小者和防風炒熟勿令焦酒五升乗防風黒豆熟淋之右先以四味㕮咀如麻豆每服五錢匕用豆淋酒一盞半同煎至八分去滓重煎如膏每空心温酒調服日三夜一不拘時候赤箭丸治中風手足不遂肢體􅍙麻骨節疼痛赤箭獨活去蘆各一兩麻黄去節半兩烏頭炮製去皮臍二兩芎藭乾蝎去土炒當歸切焙各半兩右為末煉蜜丸如梧桐子大毎服三十丸薄荷酒下不拘時候附子散治中風手臂不遂口面偏斜附子炮製去皮臍桂去粗皮各二兩半乾薑炮二兩半細辛去苖葉一兩半防風去义二兩半甘草炙剉三分右為散毎用温酒調服一錢至二錢匕空心午時合一方有人参無甘草天麻丸治中風手足不遂筋骨疼痛行歩艱難腰膝沉重天麻二兩地榆一兩沒藥三分研烏頭炮製去皮臍一兩𤣥参一兩麝香一分研右除麝香沒藥細研外同搗羅為末與研藥拌匀煉蜜丸如梧桐子大每服二十丸温酒下空心晩食前服烏鷄散治中風手足不遂口眼喎斜僻桂去粗皮一兩半細辛去苖葉三兩防風去义剉三兩乾薑炮二兩半烏鳴鷄肉炙乾一兩半右為散毎服半錢加至一錢食後良乆温酒調下日二夜一未效稍増至一錢半匕以效為度蒴藋煎治中風手足不遂生蒴藋根汁一升酥四兩生地黄汁一升附子炮去皮臍别搗為末細羅為末一兩生薑汁二合蜜四兩右先取蒴藋地黄汁并附子末同煎煉成稀膏後入酥蜜薑汁更煎令稠入瓷器中毎日空服及夜卧温酒調半匙服天麻丸治中風手足不遂肢體疼痛天麻地榆各一兩𤣥参一兩烏頭炮製去皮臍二兩胡蜂蛹子三十枚炒乾右為末煉蜜丸如梧桐子大毎服三丸食前薄荷酒嚼下獨活湯治中風不能言四肢不收手足嚲曵白芍藥桂心括蔞根各三兩甘草三兩獨活二兩右剉散四錢薑五片水二盞煎六分去滓入生葛根汁一合和服脾脉絡胃挾咽連舌本散舌下心之别脉係舌本令心脾二臟受風邪故舌强不能言也白术醖酒治中風手足不遂神識冐昧補心定氣白术生用切地骨皮荆實生用各五升菊花未開者生用二升右麄搗篩以水三石同煎取一石五斗去滓澄清取汁釀黍米二石用麴如常醖法酒熟壓去糟滓取清酒於瓷器中収宻封毎取三合至五合續飲之能飲者常令半醉但勿至吐凡心風虛寒亦宜服此酒後灸心俞兩邊各一寸五分並五十壯治男子婦人中風不能轉側麻黄一兩地骨皮一兩生杏子一兩木鱉子一兩右為麄末一服四兩河水熬送下趂風膏治中風手脚不遂方見中風半身不遂類防風湯治風虛發熱項背拘急肢節不遂恍惚狂言來去無時不自覺悟亦治脚氣緩弱甚效此藥温和不虛人秦艽去苖土獨活去蘆麻黄去節半夏湯洗七次切片用防風去蘆各二兩升麻防己白术石膏煆白芍藥黄芩甘草當歸去蘆逺志去心人参去蘆各一兩右麄末入半夏片令匀每服四錢水二中盞生薑七八片煎至一盞去滓取清汁六分入麝香末少許食後臨卧帶熱服一方用白术一兩有熱加大黄二兩先有冷心痛者倍當歸加桂三兩無大黄大豆浸酒治中風手足不遂用黒豆一升揀𦂳小者淘浄用酒五升同入瓶中蜜封用灰火煨常令熱灼至酒減半即去豆取酒每服空心及臨卧時各飲二合至三合一方用麵炒豆治手足不遂取青布燒作煙就小口器中燻痛處治身中有掣痛不仁不遂處者取乾艾葉一斛許丸之内瓦甑下塞餘孔唯留一口以痛處著甑口下燒艾以燻之一時愈矣又方取朽木削之以水煑令濃熱灼灼爾以漬痛處效局方烏荆丸治風㾏足亦治便血川烏一兩炮去皮荆芥二兩右為末醋糊為丸如梧桐子大毎服二十丸熱水吞下果皮丸治乆患風疾手足不遂果州陳皮川當歸右為末酒糊為丸湯酒任服不拘多少親見人用之取效神妙治手脚不遂等風以人肝藤生研服之導引法養生方云極力左右振兩臂不息九通愈臂痛勞倦風氣不遂振兩臂者更互踶跴猶言蹷九通中間偃伏人為之名蝦蟆行氣不已愈臂痛勞倦風氣不遂患乆行不覺痛癢作種種形狀又云偃卧合兩膝布兩足生腰口内氣振腹七息除壯熱疼痛兩脛不遂又云療四肢疼悶及四肢不遂腹内積氣牀蓆必湏平而且穏正身仰卧緩觧衣帶枕高二寸握固者必兩手各自以四指把手拇指舒臂令去身各五寸兩脚立指相去五寸定心安意調和氣息莫思餘事意專念氣徐徐潄醴泉潄醴泉者以舌䑛略唇口牙齒然後嚥唾徐徐以口吐氣鼻引氣入喉湏㣲㣲緩作不可卒急彊作待好調和引氣吐氣勿令自聞出入之聲毎引氣心心念送之從脚指頭使氣出引氣五息六息一出為之一息數出十息漸漸増益能至百息二百息病即除愈不用食生菜鷄魚肥肉太飽食後喜怒憂恚不得輙行氣唯湏向曉清浄時行氣佳能愈萬病普濟方卷九十三
