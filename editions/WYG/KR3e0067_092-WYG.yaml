末每服三錢匕酒一盞煎兩沸服繼服續命丹續命湯治癱瘓風山茵陳一兩揀净天麻去根節右麄搗篩每服十錢匕水三盞入好酒一盞半更煎三五沸去滓服盡不得離卧床上避風二七日湏服六十一日乃無後患也寢湏是不透風仍從十月後二月以前可用此法治之過此時熱難用排風湯散治中風癱緩白附子麻黄去根節骨碎補去毛天麻白殭蠶羌活去蘆頭各一兩右並生用搗羅為散每服五錢匕温酒調下不拘時候又左經丸出和劑方治左癱右瘓手足顫掉言語蹇澁渾身疼痛筋骨拘攣不得屈伸項背强直下症脚膝行履艱難骨節煩疼不能轉側跌撲閃肭外傷内損並皆治之木鱉子去殻别研白膠香研草烏生去皮臍一作台烏五靈脂研三兩半當歸一兩班猫百箇去頭足翅酒製熟右為末用黒豆去皮生搗粉一斤醋煮糊為丸如鷄頭大毎服一丸酒磨下如筋骨疼不曽針灸傷筋絡者進四五丸立效此藥專治肝心腎三經服後小便少乃其驗也治一切風便用醋調生豆末諸風重者兩日一服彈子大小兒五歳以下分四服以上三服日一丸酒下生地黄飲子出聖惠方治癱緩風手足不遂言語蹇澁心神懆悶方見諸風門推治類烏龍丸一名鐵彈子治中風癱瘓手足不遂言語蹇澁口眼喎斜筋骨痛與小續命湯相助服之大妙方見本門卒中風類輕脚丸出和濟方治左癱右瘓脚弱不能行履木鱉子别研白膠香别研白芍藥各二兩草烏去皮米四兩赤小豆一兩别研為末打糊右為末以赤小豆糊為丸如梧桐子大每服七丸旋加至十丸温酒或木𤓰湯下病在上食後臨卧服病在下食前空心服忌熱物少時放柺丸治風濕左癱右瘓等證但起不得服之乆皆效蒼术去皮米泔浸懸勾子葉蒸畢冄九曝酒製何首烏蒼耳葉各等分同製右為細末酒糊為丸如梧桐子大每服五十丸温酒下烏龍丹一名大聖丹出和削方治癱瘓風手足嚲曵口眼喎斜言語蹇澁歩履不正方見本門風癎類左經丸出醫方集成治中風癱瘓手足顫掉語言蹇澁渾身疼痛筋脉拘急不得屈伸項背强直下疰脚膝行步艱辛骨節煩疼不可轉側跌撲閃肭外傷内損並皆治之草烏四兩炮生黒豆一斤以班猫二十一箇去頭足同煮至豆透為度去班猫不用取豆焙乾川烏炮去皮一兩沒藥一兩半右為末醋糊為丸如梧桐子大毎服二十丸温酒下不以時一方加乳香一兩研常服通經絡活血脉踈風順氣壮骨輕身一方無草烏又方左經丸出仁和方蘇沉良方上四味各三兩半當歸用一兩無地龍用班猫百箇去頭足醋煮熟用餘味同乳香二兩地龍皮一兩草烏生去皮木鱉子研白膠香五靈脂各二兩半當歸五兩右為末生黒豆末醋煮糊為丸如鷄頭大每服二丸温酒磨下木鱉子别研白膠香别研白芍藥各二兩草烏去皮米四兩小赤豆一兩别研烏木打糊右為末以赤小豆糊為丸梧子大毎服七丸旋加至十丸温酒或木𤓰湯下病在上食後臨卧服病在下空心服忌熱物少時四聖紫金丹出瑞竹堂治男婦人左癱右瘓口眼喎斜中風疾病依方修合誠心服餌大病不過三服初得病一服效驗槐實子文武火麸炒黄色荆芥穗擇净生用甘菊花炒猪牙皀角酥炙黄色去皮各等分右為細末煉蜜為丸如彈子大病重者毎服一丸細嚼茶清送下病輕臨時加减㣲汗出為驗如汗後體熱難忍噙甘草觧之四生丸出和劑方治左癱右瘓口眼喎斜中風涎急半身不遂不能舉者悉皆療之五靈脂去石骨碎補川烏頭去皮尖當歸各等分右為細末用無灰酒打麵糊為丸如梧桐子大每服七丸漸加至十丸温酒下服此藥莫服靈寳丹恐藥無效殭蠶丸治癱瘓風手足不遂語言不正白殭蠶炒烏頭炮去皮臍沒藥研各一兩蜈蚣炙半兩右為末酒煑麵糊為丸如梧桐子大每服十丸薄荷酒下日三服妙聖丸治卒中癱緩風手足攣急渾身疼痛蠐螬三十箇麻黄去根節二兩烏頭炮裂去皮臍半兩木鱉子去殻半兩右三味為末用酒二升刺蠐破取汁不用皮熬成膏和藥末丸如小彈子大每服一丸温酒化下不拘時候小省風湯一名醒風湯出直指方治左癱右瘓口眼喎斜口噤全不能言半身不遂手足頑麻一切風疾並皆治之防風南星各二兩甘草一兩右㕮咀每服三錢水一盞姜五片煎至六分去滓熱服氣逆者加紫蘇二錢半木香三錢半氣虛加附子一兩沉香二錢胸膈不利加半夏一兩人参半兩頭暈疼加天麻半兩全蝎二錢煎熱入少麝香小靈寳三倍丸治癱瘓中風半身不遂語言蹇澁口眼喎斜肢體麻痺草烏頭一斤用黒豆一斗同煑豆爛去豆不用蒼术二斤米泔浸去皮葱白三個細切右焙乾為末加醋麵糊為丸如梧桐子大每服十丸至二十丸食前温酒下日進三服大效枳殻散治中風手足無力口中涎出多在右邊枳殻去穰麩炒三兩牛黄研白芷各一兩右為細散每服三錢匕空心温酒調下梔子丸出海上名方治癱緩風宜乆服之山梔子去皮草烏頭炮乾薑炮各半兩右為末煑棗肉和丸如菉豆大毎服三丸漸加至七常服二丸細嚼茶酒下木香湯一名青木香散出衞生家寳方治左癱右瘓偏枯不遂等疾青木香二兩𤓰蔞一箇去皮右先取好𤓰蔞一箇取子及穰去皮將子與穰各研細用無灰酒一大盞投之攪勻用生絹攪取汁如此研絞三兩次酒濃無味乃止於銀石器内煎三兩沸調木香末帶熱服令人按摩病處良乆就病處卧移時自能舉動矣此方乃大溈山僧云氣行則風行氣逆則風聚乆者不過三五服大有神驗風必有熱証者可服保安丸治一切癱瘓風方見本門癎類治熱風癱常發者羌活二兩糓子一升五合水一中取沉者右為散酒服方寸匕日三服稍加之無忌獨勝散出海上名方治癱瘓不經針灸者專用此方以取效名用蓬莪术醋煑不以多少研為細末每服二錢温酒下日進三服不計時候服三日後冄用淋渫藥治中風癱瘓用膽􅈨細研如麵毎一匙許醋湯下上吐出涎漸輕治癱瘓新得患及年深者用酒調地膚子末加葱汁打麵糊為丸如梧桐子大空心或酒或茶送下五十丸神效一方為末葱汁酒調下服之吐出涎疾即愈之為妙豆豉飲出肘後方治中緩風四肢不收者用豆豉三升水九升煮取三升分為三服日二作之亦可酒漬煮飲之用豉一升㣲熬囊貯漬三升酒中三宿温服㣲令醉為住治癱瘓風及諸風手脚不遂腰膝無力者用驢皮膠炙㣲起先煮葱豉粥一升别貯又以一升煑香豉二合去滓内膠更煑六七沸膠烊如􅄳頓服及煖氣葱豉粥任意多少若冷喫令人嘔逆服三四劑即止禁如藥法又膠能止洩得黄臘黄連尤佳大聖丸出王氏傳濟方治癱瘓風及腎臟風上攻下疰一切諸風疾並皆療之川烏頭炮裂去皮臍五靈脂炙用麝香乳香寒食麵各等分辰錦砂别研右件五靈脂烏頭先細淬為末後秤與下四味停入和勻以靣北取不語井花水為丸如櫻桃大丸了用生絲絹袋子盛掛當風毎日一服切不可多服無事不得服之如不思飲食四肢大軟昏沉取菉豆汁於明日冄服男子女人皆服喫得合時取良時日不得令一切隂人鷄犬等見臨卧用薑汁浸化温酒投服忌動風物孕婦不服狐肝散出王氏溥濟方治癱瘓風及氣攻注皮膚生瘡瘙痒赤白瘕風等一切風疾烏鵶一隻剉啄不用留𤓰狐肝一具二味皆用臘月者與鵶同入磁瓦瓶中鹽泥固濟炭火煆過後瓶透亦取出冷用天南星一兩去心研天麻膩粉蝎白附子殭蠶牛黄一分别研藿香桑螵蛸臘月採者各一兩麝香半兩别研烏蛇一兩酒浸不用頭尾取肉炙右為末却與研者和勻如中急風豆淋酒下二錢癱緩風冄服立差常服除風半錢温酒下至聖一醉膏出王氏溥濟方治癱緩風天麻一分沒藥黄明滴乳香各半兩附子一兩去皮臍炮製安息香一分麻黄去根節内四内生腦子少許右件七味搗羅為末毎服四大錢用法酒一升於銀石器内熬成膏子後却出分在四盞内别用法酒看患人喫酒多少漸調膏子服盡為度令貼病處卧以衣被盖或汗出或似虫行即效次日冄喫一服手足必以舉得此疾五十日已上方治若髮直者不在治限菵草散出王氏傳濟方治癱緩等風疾及下疾毒菵草一兩半炙去毛出汗蝎稍一分官桂當歸羌活半兩荆三稜蓬莪荗各一兩右件七味都生搗為末如人卒中惡風昏迷未省風涎方盛即時以藥四錢用二錢生末先置盞中以二錢末用酒一盞半煎至八分傾在生藥盞内調勻帶熱服但下得咽喉扶起湏臾即吐出惡涎立愈如諸般風疾並依此法毎日一服永無中風及痰涎如乆患癱緩旦暮常服經月餘必被上有臭汗氣痕跡如人形状其患永差大莽草散出王氏𫝊濟治丈夫女人癱緩風及血風但一切風疾皆療莽草石斛炙牛膠炙附子炮萆薢天麻炙麻黄澤㵼防風石龍茵松脂獨活杜仲川芎芍藥人参茯苓烏蛇酒浸炙去皮骨薯蕷桂心去皮吳白术吳細辛麝香柏子仁絲子酒浸三日焙乾炒熟杵右件二十五味各等分并要州土新好者同杵為末每服一錢温酒下應諸風疹但求此藥必差寳命丹出王氏𫝊濟治癱瘓風及軟風牛黄半兩少一分亦得蝎者全附子生用去皮一兩天南星半兩五靈脂右件五味並生為末煉蜜為丸如鷄頭大用生薑自然汁一呷許磨化後將蜜酒投之温酒服或逺年軟風須於煖閣内無風處用甜糟并葱椒煎湯浸及令軟處汗出便服一丸如是軟多年者先將鵲窠燒火炙軟處令熱徹方服此藥為妙輕骨丹出衞生寳鑑主中風癱瘓四肢不遂風痺等疾麻黄去根節五斤剉河水二升煎去滓桑白皮湏自根上取者白芷蒼术甘松另用子者川芎已上各四兩苦参三兩半右六味研勻細以前藥麻黄膏和丸如彈子大毎服一丸温酒一盞研化温服之卧取汗五七日間冄服手足當即輕快卒中涎潮分别後用之經進骨碎補圓出衞生家寳方治左癱右瘓五靈脂揀去砂石别研極細木鱉子去殻剉碎研細入衆藥用生薑切作片子地龍用麻包定石上搥去土黒牽牛炒令㣲熟用草烏去皮尖剉作塊子用鹽炒令裏外俱透剉作末白膠香韮煮三十二沸傾在冷水中少許空乾則研極細用黒豆炒令㣲熟葳靈仙用軟脚者洗土取用滴乳香用糯米數粒用乳香一處研細入衆藥用天南星慢灰火中炮去皮用各一兩麝香一錢别研臨了將入藥防風去苗并芦頭用右件各焙碾為末醋糊為丸如梧桐子大初服五丸加至七丸食後薄荷茶酒下黄耆必安丹出衞生家寳方治血氣生風左癱右瘓口眼喎斜語言蹇澁諸疾沒藥全蝎酒浸焙炒羌活虎骨酥炙獨活防風去蘆川芎當歸薏苡仁半夏薑製各二兩川烏頭一兩炮去皮尖天麻枳殻去白麩炒前胡陳皮紅細辛硃砂别研為衣各一兩白术半兩麝香一錢别研腦子半錢别研右為細末糯米糊丸如龍眼大硃砂為衣每服一粒酒嚼下或荆芥下食後服太乙丹出衞生家寳方治癱瘓諸風疾五靈脂半斤去土石木鱉子半斤去殻别研草烏半斤去皮尖殭蠶四兩先去絲嘴錢子地龍半斤布袋去土不見火川烏四兩去皮尖防風四兩去蘆白膠香六兩别用麝香半兩别研腦子二錢别研好墨燒用桑柴灰好醋浸一宿各四兩右為細末酒糊為丸如彈子大隂乾毎丸分三服用生薑薄荷研自然汁浸温酒一盞嚼下忌發風物湏臘日或端午日合不許婦人鷄犬孝服人見孕婦不可服經進龍虎金丹出衞生家寳治一切癱瘓風疾黒附子去皮臍退寒熱川烏頭去皮臍補腎經虎骨醋炙治傷折古文錢醋淬研為接骨當歸生用補骨活血白膠香生研去麻痺木鱉子火炮去皮衝開滯氣地龍去土行血草烏頭鹽炒令黄發熬黒牽牛生用除腎濕氣蓯蓉酒浸補腎經牛膝酒浸補炒各一兩乳香半兩生研治一切疾痛沒藥生用化内損壊濃血巴㦸去心治八