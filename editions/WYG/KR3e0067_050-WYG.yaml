body:
  text: 普濟方卷五十明周王朱橚撰頭門鬚髪黄白論足少隂血氣盛則髪潤澤而黒足太陽血氣盛則鬚潤澤而黒二經血氣虗乏則鬚髪變為黄白然則還其潤澤復其紺黒雖有傅染之法不如益血補氣之為妙也方駐顔苣蕂丸出聖惠方治白鬚髮令黒補益面顔苣蕂二觔杏仁四兩湯浸去皮尖雙仁者麫炒微黄陳橘皮一兩湯浸去白瓤焙細辛一兩附子一兩炮裂去皮臍旋復花一兩覆盆子二兩青葙子二兩秦椒二兩去目及閉口者微炒去汗熟乾地黄四兩白芷一兩續斷一兩秦皮一兩桂心二兩生地黄五觔綿絞取汁用大熟去一半右為末入地黄汁中以沙糖相和搗五七百杵丸如梧桐子大每日空心服以橘皮湯下三十丸晩食前再服忌生葱蘿蔔大蒜等治掠白反黒出徳生堂白檀白芷三柰子各二錢白芨一兩甘松一錢半廣茯苓二錢半回回青百藥煎針砂炒各五分滑石二錢梨児鐡一塊瓶盛漿水浸藥右為末每服三錢漿水一盞於錫器瓶中頗冷澄清掠之旋餙巫雲膏出醫方大成治髮鬢黄白不黒膽礬五倍子百藥煎訶子青胡桃皮木𤓰皮何首烏細辛醋石榴皮猪牙皂角右等分為極細末煉蜜為丸如小錢大常於木灰内培養勿得離灰如要烏髭時用好熱醋磨化開撚髭如烏鬢時用熱好醋磨以掠頭鬢上地骨皮丸出聖惠方變髭髪益氣血令終身不白但黒潤而已黄白者經六十日變黒白者服百日如漆堅齒益筋力四時常服地骨皮三兩生乾地黄五兩牛膝去苗三兩覆盆子三兩黄耆三兩剉五倍子三兩桃仁四兩去皮尖雙仁别研如膏絲子四兩酒浸三日曝乾别杵為末蒺藜子四兩㣲炒去刺右為末下桃仁攪使相入錬蜜和更搗三千杵丸如梧桐子大每日空心以温酒下四十丸粥飲下漿水下亦得服藥十日即急㧞去白者二十日即黒者生神妙不可言終身不得食蒜牛肉生葱蘿蔔等摩頂黒髪方出聖惠方治髪黄浸油白芷附子去皮臍生用連翹防風去蘆頭卷栢零陵香蔓荆子蓮子草躑躅花川芒硝已上各一兩右細剉用綿裹以生油二觔浸經三日略煎取藥力放冷每用塗頂揩令入肉治血腦虚髪白早宜服馬齒莧還黒効方出聖惠方馬齒莧子一升白茯苓二兩熟乾地黄四兩澤㵼二兩眷栢二兩人參五兩去蘆頭松脂四兩煉成者桂心一兩右為散每日空心以温酒調下二錢漸加至三錢晩食前再服一月効忌生葱蘿蔔大蒜等栢子仁丸出聖惠方治髭髪早白壯血脉令復黒栢子仁一兩醋石榴皮二兩秦椒三兩去目及閉口者微炒去汗何首烏二兩馬齒莧二兩蓮子草二兩白芷二兩旋復花二兩右為末煉蜜和丸如梧桐子大每日空心以熱水下三十丸晩食前再服忌大蒜生葱等地黄丸出聖惠方變白令黒補益熟乾地黄一觔牛膝一觔去苖枳殻五兩麩炒微黄去瓤茯神三兩絲子五兩酒浸三日曝乾别搗為末車前子五兩地骨皮三兩訶梨勒皮二兩右别取生地黄肥者搗絞取汁五升浸牛膝及地黄曝乾如前又浸曝乾以地黄汁盡為度旋令乾搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服以温酒下三十丸再服忌血食并生葱蘿蔔大蒜等川椒丸出聖惠方治血腦虗髪白宜服補益令黒川椒五兩去目閉口者微黄去汗苣蕂一升瓦松半觔茜根二觔剉熟乾地黄三觔覆盆子一觔牛膝一觔去苖兎絲子五兩酒浸三日曝乾搗别為末右為末煉蜜和搗五七百杵丸如梧桐子大每服以温酒下四十丸食前服忌生葱蘿蔔蒜等神不安方治年少髪白及心氣虗神不安地骨皮一兩桂心三分熟乾地黄二兩白芷三分旋覆花三分訶梨勒皮三分秦椒三分去目及閉口者微炒去汗杏仁一兩湯浸去皮尖雙仁研如膏右為末煉蜜和丸如梧桐子大每日空心以温酒下四十丸忌生葱蘿蔔大蒜等膽礬丸出宣明論治男子年少髭鬢髪斑白土馬騌墻蠶児半夏川五倍子各一兩生薑二兩胡桃十个真膽礬半兩右為末和作一塊絹袋子盛如彈大熱酒水各少許浸下藥汁淋洗頭髪一月神効變白髪神効揩齒藥方出聖惠方酸石榴一枚以泥裹燒令通赤候冷去泥用槐枝茄子根加槐枝同燒令煙絶急以物盖之候冷取用馬齒莧蘭香菜并根薄荷石膏五倍子燒蒸川升麻已上各一兩右為散用揩齒不惟變白為黒兼更牢固牙齦地仙丹出聖惠方令髪黒延年乆服可貌如童子齒落重生行如奔馬夜視有光乆服為地仙逺志一觔去心白茯苓一觔熟乾地黄一觔地骨皮一觔麥門冬一觔半去心焙苣蕂一觔蒸曝乾去皮右為末以􅀥肉和木杵臼擣千餘杵丸如梧桐子大每日空腹以温酒下四十丸晩食前再忌生葱大蒜蘿蔔等五神還童丹出瑞竹堂謌曰堪嗟髭髪白如霜要黒元來有異方不用擦牙并染髮都縁五味配隂陽赤石脂與川椒炒辰砂一味最為良茯神能養心中血乳香分内要相當􅀥肉為丸桐子大空心温酒十五雙七服之後君休摘管教華髪黒油光兼能明目并延壽老翁變作少年郎赤石脂川椒炒辰砂茯神乳香已上各一兩右為末􅀥肉和丸如梧桐子大每服三十丸空心温酒下兔絲子丸一名牛膝丸治髭髪黄白可變令黒及治鬚髪秃落不生出聖惠方兎絲子酒浸三日别搗地骨皮各三兩枳殻去瓤麩炒八兩生牛膝搗絞取汁半升生地黄搗絞取汁半升右將前三味擣羅為末以牛膝地黄汁和作餅子曝乾再搗羅煉蜜丸如梧桐子大每服十五丸早食後温酒下夜中熟米飲下一方生擣為末煉蜜和丸每日空心生薑湯下三十丸漸加至五十丸久服忌生葱蘿蔔大蒜人參丸出聖濟總録治髭髮白能變令黒人參五兩熟乾地黄焙天門冬去心焙白茯苓去黒皮各十兩右為末煉蜜丸如梧桐子大每服十丸食後温酒下胡麻丸出聖濟總録治髭髪白可變令黒胡麻仁炒杏仁去皮尖入炒研各二兩桂去粗皮一兩黒荳黄二兩生地黄𢷬絞取汁一升右先將地黄汁入鍋煎三兩沸次入杏仁膏餘藥並搗羅為末投同煎令稠丸如梧桐子大每服十丸早食後温酒下臨卧再服之甜𤓰子散出聖惠方治血虗腦髓空竭諸蔵虗乏血氣不足少如蒜髪及憂愁早白逺視􅍃􅍃得風淚出手足煩熱恍惚忘悟逺年不利服之一月大驗甜𤓰子一升㣲炒白芷一兩當歸二兩剉㣲炒芎藭二兩甘草二兩炙㣲赤剉右為散每於食後以酒或温水調下二錢服之一方有松子去皮令白髪還黒方一名秦椒散出千金方旋復花秦椒隴西白芷各一升桂心一尺右治下篩以井花水服方寸七日三服三十日白髪還黒禁房室若不信將此藥拌飯喂猫児一月白處變黒此乃神効一方或温酒茶調亦得乾漆丸出聖濟總録治髭髪白可以變黒乾漆炒令煙盡栢子仁㣲炒生乾地黄焙熟乾地黄焙各一兩右為末研糯米飲和搗三五百杵塗酥丸如梧桐子大每服三十丸空心温酒下治髭髪早白令變為黒方硫黄一兩細研酸石榴皮一兩天竹黄半兩細研磁石二兩燒醋淬七遍研飛過右先以和了麵少許裹硫黄内於石榴皮中又用麵都裹石榴皮於甆碗中盛飯甑内蒸兩遍取出晒乾擣羅為末次入天竹等磁石等末相和更研令勻煉蜜和丸如菉豆大每日早晨以杏仁湯下二十丸其藥服六七日已來覺頭痒便是効也白者落黒者再生神妙駐顔益心神方出聖惠方染鬢髪變白為黒熟乾地黄半觔牛膝四兩去苗杏仁半觔湯浸去皮尖雙仁㣲炒研如膏兔絲子三兩湯浸三日曝乾搗末右為末都研令勻以煉蜜和擣三五百杵丸如梧桐子大每服以温酒下四十丸食前服忌生蒜葱蘿蔔秦椒丸出聖惠方治髭髪黄悴秦椒去目及閉口炒出汗生乾地黄焙旋復花白芷各一兩右為末煉蜜和丸如梧桐子大每服三十九米泔水下不拘時蜀椒丸出聖濟總録治髭髪白可還黒也蜀椒去目并閉口者杏仁去皮尖雙人各八兩熟乾地黄一升右先剉地黄入净磁器中以酒一升浸一宿取出與杏仁同為膏次用炭火燒地令赤以釅醋潑乗熱將椒置上以盆覆之四向泥塗令勿透風候冷取出搗羅為末合和前膏入糯米飯一升同擣三百杵丸如梧桐子大每服三十丸空心温酒下地黄丸出聖惠方治人年四十髭髪俱白還黒生地黄肥者剉五觔五加皮剉牛膝温酒浸焙各五兩右先將地黄入净瓶中以酒五升浸一宿取出曝乾入甑九蒸九曝後同後二味擣羅為末煉蜜丸如梧桐子大每服二十丸空心温酒下一方擣細羅為散每日以空心温酒下二錢若於羮粥中喫亦得此藥能化白令黒補益筋力忌生葱蘿蔔大蒜等三倍丸出聖惠方補益明目壯氣延年令人好顔色變鬚髪令黒其功不可盡述川椒取紅者一觔牛膝三觔去苗生地黄三十觔浄洗搗絞取汁右為末用生地黄拌之令温燃乾即更拌以地黄汁盡為度燃乾擣羅為末和於木杵臼搗千餘杵丸如梧桐子大每日空心及晩食前以温酒下四十丸忌生葱蘿蔔大蒜等變白髪令黒填骨髓去萬病方出聖惠方熟乾地黄四觔杏仁一觔湯浸去皮尖雙仁研如膏訶梨勒皮半觔右為末入杏仁同研令匀以煉蜜和擣三二百杵丸如梧桐子大每服以温酒下三十丸食前服漸加至四十丸為度於磁器内宻貯之變白功効不可具述切不得令孝子女人見忌生葱蘿蔔大蒜等變白不老出本草多収桑椹曝乾擣末蜜和為丸每日服六十丸治婦人蒜髪用乾柿子五箇濃煎芽香湯煑令枸杞子擣為末合和爛研如梧桐子大每日空心服及卧時煎芽香湯下五十丸治髪鬢黄赤令黒方出千金方用羊糞燒灰以臘月猪脂相和塗之日三夜一取黒即止又方出聖惠方用黒豆三升以水七升煑黒豆令極爛去豆再煎令稠常用塗髪良治髪黄出海上方用臘月猪脂和羊屎灰蒲灰等分封頭三日一易之一醉烏治頭鬚白再黒方生地黄汁一觔訶梨勒十箇磨兩頭酸石榴三个大者取汁緑礬半兩研碙砂研硫黄研各半兩右藥同入磁瓶中内用二味汁浸密封勿令透氣至四十九日後取出其訶子狀若黒梅至夜臨卧含一枚嚥津到曉爛嚼以酒一盞下之三二日後再服忌葱大蒜蘿蔔近效換白髪及髭方熊脂二大兩臘月者佳白馬鬐脂一兩細切熬之以綿濾絞汁婆羅勒十個其狀似芙蓉子去皮取汁俱以指甲稲之即有汁生薑一兩一塊者煑之母丁香半兩右為末其脂煉濾之以藥末相和勻令取一小槐枝左攪數千遍少頃即凝或似膏即投白髪以辰日良槐枝㸃藥㧞一條即以藥令入髪根孔中以指頭熱揩之令藥入十餘日更黒髪生槐枝散出聖濟總録治鬚黄白揩牙方槐枝如筯大者青塩胡麻子仁炒黒色生乾地黄各一兩皂莢不蚛者去皮子二挺右剉碎入磁瓶中用瓦片盖紙筋泥固濟仍盖上留一穴如錢眼大候乾以文武火燒煙盡放冷為末每旦揩牙畢餘藥塗鬚上少頃洗之治髭鬢黄赤一染即黒出醫方大成生薑半觔生地黄一觔各净洗研自然汁留滓右用不蛀皂角十莖去黒皮并筋將前藥汁蘸皂角慢火炙黄以藥汁盡為度前藥滓同入罐内用火煆存性為末用鐡器盛藥末三錢湯調停三日臨卧將藥蘸髭鬢即黒服菊増年變白方用菊以三月上寅日採名曰玉英六月上寅採名曰容成九月上寅日採名曰金精十二月上寅日採名曰長生者根莖也隂乾百日取等分以成日合擣千杵下篩和以蜜丸如梧桐子大服三七丸百日身體潤一年白髪變黒二年齒落復生三年八十者變童児必效染白髪方出十便良方用揀細粒烏頭四升以醋漿四升去却豆以好灰汁浄洗髪待乾以豆汁熱塗之以油帛裹之經宿開之待乾即以熊脂還以油帛裹即黒如漆一塗三年不變驗又方醋煑大豆黒者去豆煎令稠塗之又方用搗木槿葉以熱湯和汁洗之亦佳染白髪方用黒桑椹一升科斗子即蝦䗫子瓶盛宻封懸東屋角百日盡化為泥染鬚髪如漆又取二七枚和胡桃脂研如泥㧞去白者㸃孔中則生黒一方無蝦䗫子栝蔞散治鬚黄白揩牙取栝蔞實一枚開盖子取瓤并子用青塩一兩細研杏仁去皮尖三七粒同栝蔞瓤并子納入栝蔞内却將頂盖盖了麻綿繫定塩泥固濟炭火煆煙盡去泥取研為末早夜揩牙一方無青塩一方用濕紙兩三重包裹次用蚯蚓泥并紙筋一處搗為筋泥包裹於濕紙上厚一指許用圓勻不破紙綻於日中晒乾用熟炭二觔四邊上下煆之火多則恐爆裂徐添火候泥毬通紅有青煙熖出即藥成去火掃净地尺許置泥毬其上以新瓦盆盖食頃擊去泥皮取藥細研晨起日中臨睡以指蘸藥擦牙令極熱即取効速仍不輟用之百日髭鬢可致黒如先有白者摘去以餘藥擦於鬢間後來髪不生白矣其治口齒之功未易具陳變白令黒方生乾地黄覆盆子已上各二觔地骨皮一觔右為末煉蜜和搗三五百杵丸如梧桐子大每服以温酒下四十丸食前服忌生葱大蒜蘿蔔等白髪令黒方八角附子一􅋞大酢半升右以銅器中煎兩沸内好礬石大如碁子許一枚消盡内香脂三兩和令相得攪至凝内竹筒内㧞白髪以膏塗㧞根生黒髪也治髭髪鬂黄赤令黒方生栢葉切一升猪膏一觔右搗栢葉為末以猪膏和為二十丸用布裹一丸用泔汁中化破沐之日一用一月後漸黒光潤㧞白令黒取除日自㧞白以鼈脂塗之又猪狗膽塗之又白狗乳亦塗又方用大豆五升酢漿水二斗煑取五升沭之治鬢髪黄赤方用燒梧桐灰以乳汁和塗傅鬢髪即黒并皮肉鬢髪即黒防連皮肉俱黒方便傅之酸榴漿方治鬚髪黄白令還黒色用酸石榴五月内於東南枝上揀平生不側而大者一枚於頂上筯劄眼子深一寸餘用水銀半兩灌於眼子内不得封閉從風日雨露至十月葉落盡時取下殻内盡成水每用時以魚胞裹指頭㸃藥撚之療髪黄用熊脂塗髪梳之散頭入床底火地一食頃即出便盡黒不過一升脂驗治年衰髪白用桑葉椏枝多雞桑最堪入用甚利五臓關節通血氣夕服不饑多用曝乾搗末蜜和為丸每服六十丸變白不老一方取黒椹水漬之頻沐髪即黒備急拔白毛令黒毛生方用㧞去白毛浄然後以好白蜜傅㧞處即生黒毛眉中無毛以鍼挑傷傅蜜亦生眉毛又有治法以石子香汁㧞白毛浄急手以傅孔中即生黒毛如毛髪不生取梧桐搗汁塗上必生黒者一方用白蜜傅髪孔即不復生也治鬢黄剪𤓰甲搔令毛孔少血出以蜜塗之即生黒毛令髪不生用蚌灰鼈脂相和新㧞毛即塗毛孔永不生令人髪不白以大麥食之久食之良治蒜髪用蔓菁子壓油塗頭能變蒜髪變白方出本草用丁香以生薑汁研㧞去白髮塗汁其中即異常黒也劉君安頭不白方出本草以己髪燒灰合頭垢等分合服如大豆許三丸名曰還精令頭不白變白方出本草多取烏臼子壓為油塗頭令黒治白髪出本草鑷去白髪銷白䗶㸃孔中即生黒者變白髪出本草以槐黒子水呑之變白令黒耐老明目輕身出本草以龍葵子赤珠者服之若能生食得苦者不食他菜十日後則有靈異不與葱薤同噉榮養髭髪論夫腎骨髓腦為髓海髪者腦之華髓之所飬也衝脉為經絡之海其浮而外者循腹上行㑹於咽喉别絡唇口血盛則滲灌皮膚生毫髪此髭髪所本若髭髪不生而黄悴則腦衝脉衰無以榮養故也湏以藥治之令潤澤方地黄丸出聖惠方榮養髭髪堅牙齒補血氣益顔色延年生地黄二觔搗取汁杏仁三升去皮尖雙仁㸃地黄汁研如膏丁香三兩胡桃瓤一觔同杏仁别研烏麻油一升㸃地黄汁研絞取汁大麻油一升木香牛膝人參白苓去黒皮各三兩無食子三兩訶梨勒皮三兩箋香沉香安息香搗如碁子水煑各二兩栁枝皮炙乾塩花各三兩松香以布袋盛湯煑精好者自化出湯冷自凝如米白便換布袋煑極白取八兩龍腦研一分白蜜一升酥一升右將擣研藥令極細同諸藥與地黄汁調如膏磁瓶盛三分三瓶每瓶約七分不欲令滿坐爐中塼上四靣用火候瓶中藥沸即以栁枝攪欲乾施添地黄汁盡為度時時抄看可丸乃止候冷藥以蠟紙盖頭勿令泄氣每食後含化一丸如弹子大咽津日三夜一十日覺百日大效初服藥處净室一月忌萊菔藕蒜常食少生薑即効零陵香油方出聖惠方治髪令黒光滑潤梳頭零陵香半兩烏麻油一斗茅香半兩蓮子草一兩細辛半兩藁本半兩白芷半兩生鏵鐡五兩搗碎訶梨勒皮一兩没石子一兩酸石榴皮一兩牛膝一兩去苗白檀香一兩沉香一兩地骨皮半兩芎藭半兩右細剉并鏵鐵以綿裹入油中浸四十九日藥成常用梳頭經年尤驗浸油長髪令光潤澤方出聖惠方生麻油五升乾桑椹一兩梔子花一兩訶梨勒皮一兩蓮子草一兩細辛半兩白芷半兩藁本一兩零陵香白蘝一兩生鐡三觔搗碎硝石一兩地骨皮一兩没石子一兩酸石榴皮一兩右細剉并生鐵以綿裹入油中浸經四十日後藥成常用梳頭經年尤効治風益髪令潤澤不白合油塗頭方乾蓮子草半兩蔓荆子細辛藁本栢子仁芎藭白芷甘松香零陵香白檀已上各一兩胡桃二十顆去皮鏵鐡一觔搗碎右都剉并鏵鐵以綿裹用清油五觔於磁器中浸半月藥成常用塗頭一月後甚驗惜梳髪神効散出海上方當歸荆芥黒牽牛白芷葳靈仙側栢葉訶子各等分右為細末隔夜在髪中次早埋之能去風屑垢膩觧氊結巨勝七十丸益髭髪變白為黒甘菊花三兩旋復花三兩吳白芷三兩白茯苓三兩牛膝三兩覆盆子三兩半炒旱蓮子一兩半右為末煉蜜捜和搗杵一二千下丸如梧桐子大每服三十丸空心温酒送下食後再服三十丸良乆少飲酒引動藥力如此日進三服兩箇月髭髪鬢如鴉更治一切氣益脉補下尤忌生蘿蔔猪羊血葱蒜忌月日如左并已服藥如右每月至此日無服藥止喫素麫昔日唐李昇服此藥壽至七十嵗全無白髪若試此藥用白犬一隻食藥六十日乃黒正月初四二月初六三月十二四月十六五月十八六月二十四七月二十一八月十五九月十六十月十三十一月十四十二月初七槐花膏出聖恵方榮養髭髪瓦松半生半燒灰鐡粉鏵鉄醋淬十遍搗碎羊糞半生半燒灰槐枝細剉各一兩胡桃仁一觔右除瓦松等三味外將胡桃仁與槐枝搗作一團傾瓶中令實又取槐枝斫長二寸宻挿於瓶中與瓶口齊更取一瓶子湏盛得前藥瓶子者勘合然後穿地坑䧟空瓶子與地靣齊其向上瓶子即擁馬糞火燒一宿候冷開之其向下瓶子滿中有油清則取此油調前三味塗頭每日净洗再換藥栢葉散出御藥院方常使榮養髭鬢側栢葉四兩何首烏地骨皮白芷各二兩右為麄末每用半兩入生薑十片水一大椀煎五七沸去滓淋洗髭鬢臨睡用槐實膏出聖惠方治腦虗髭髪悴目暗槐實去皮取黒炒搗末一合生地黄搗取自然汁一合馬牙硝研三錢酥鍊一兩右以銀石器盛地黄汁文武火上先下槐實末次下馬牙硝不停手攪常令如魚眼沸候煎减一半即下酥更煎三二十沸傾出置磁合中每臨卧􅀥核大内鼻中取去枕仰卧展足腦中出惡水勿怪三倍丸出聖濟總録榮養髭髪固牙齒補益血氣丹砂研一兩磁石煅研二兩陳麴炒研二兩右搗研為末細羅别以猪腎三隻去脂膜用濃酒二升熬腎爛去腎取酒和藥末丸如菉豆大空心温酒或熱水下二十丸三物膏出聖濟總録栁枝桑枝槐枝各剉一升右以水二斗同煑至一斗去滓入好塩一觔熬成膏磁盒盛臨卧揩牙滋榮散出御藥院方長養髭髮落最宜生薑焙乾一兩人參一兩右為細末每用生薑一塊切斷蘸藥末於髪落處擦之日二次录蛭油方出聖濟總録榮養髭髪录一兩乾水蛭七枚為末右以水銀三兩作小盒盛录與水蛭以蚯蚓土和泥固濟約半指厚深埋在馬糞中四十九日取出化為黒油用魚胞作指袋時蘸少許撚髭上其油自然倒至髭能變黒烏金散出聖濟總録榮養髭髪牢牙草烏頭四兩青塩二兩右將青塩為末同入藏瓶内瓦子一片盖瓦上鑚一竅外用紙筋泥固濟仍留元竅候乾用火煆黒煙盡青煙出為度以新黄土罨一宿取出為末逐日未洗靣前揩牙候洗靣了方潄三方瑩肌膏出御藥院方治毛髪長茸散頻剃復生不盡者以膏貼之次日隨膏藥茸毛自退瑩净再不生乳香二錢瀝青三兩右慢火同化開入小油一處煎沸硬軟得所臨卧塗患處明旦用温淡漿洗去蒺藜散右用蒺藜子一觔當七月八月熟時収日乾舂去刺然後杵為末每服二錢新汲水調下日三服勿令中絶斷榖長生服之一年已後冬不寒夏不熱服之二年老者復少髪白復黒齒落重生服之三年身輕長生治髪不落方劉君安曰欲髪不脫梳頭滿千遍用羊糞和鴈膏傅毛髪落三宿即生金陵草煎方益髭髪變白為黒用金陵草一秤六月以後収采揀擇無泥土者不用洗湏青嫩不雜枝梗者爛搗研新布絞取汁又以紗絹濾令滓盡通内油器鉢盛之日中微煎又取生薑一觔白蜜一觔合和入煎中以栁木箆攪勿停中令薑蜜匀中日煎之令稀餳為藥成矣每日及午後各服一匙以温酒調服欲作丸日中再煎令可丸大如梧子依前法酒服三十丸及時多合製為佳其効甚速又方出聖惠方用東行􅀥根三尺横安瓶中蒸之令汁出収之𫝊髪即長治血脉虗極鬚不得潤澤冝用此方用桑根白皮剉一觔栢葉剉一升以水三斗淹浸煮五六沸去滓沐頭數數為之髪即潤澤南燭煎出本草益髭髪及容顔兼補暖方右於三月三日採南燭葉并蘂子入大净瓶中乾盛以童小便浸滿瓶固濟其口置閉處經一周年取開每日一兩次温酒服之每酒一盞調藥一匙極有効驗治病後頭病不可理通頭髮出十便良方右以生麻油二升將頭髪觧開安銅沙盆中用油淹漬之細細將釵子領髪斯湏竝自通潤毛髪滑肌膚益血色出本草方以胡麻葉作湯沭良黒潤毛髪出本草方以栢葉燒取汁塗頭去風潤髪出本草以白油麻葉搗和漿水絞去滓沭之治髪出本草以木𤓰浸油梳頭浸油益髪神效方出衛生家寳方蓮花鬚一兩隂乾零陵香一錢卷栢葉白芷芎藭防風各半兩右件細切以綿裹入生椒七十粒生麻油半觔浸於新瓶中埋地中七日取出婦人塗髪極佳兼治頭髪落不生極佳作香澤塗方依臘澤藥内漬油裏煎即用塗髪以綿裹煎之鬚髪堕落論夫足少陽膽之經也其榮在鬚足少隂腎之經也其華在髪衝任之脉為十二經之海語海其别絡上辰日月若血盛則榮於鬚髪故鬚髪美血氣衰故鬚髪墮落也方生髪膏治熱衝髪鬚落松葉切蓮子草錬成馬鬐膏􅀥根皮切各一升韮根切蔓荆子碎各三分竹瀝猪脂各二升防風白芷辛夷仁吳藍升麻芎藭獨活寄生藿香沉香零陵香各一兩右以􅀥煑汁竹瀝等浸一宿以脂等煎之候白芷色黄膏成以塗頭髪及頂上日三五度妙治眉髪墮落出千金方白芷附子防風芎藭莽草辛夷細辛黄芩當歸蜀椒各一兩大黄一兩半蔓荆子一升右共十二味㕮咀合二膏微火煎白芷色黄膏成先洗髪用膏傅如常澤法勿近靣生毛也蔓荆子膏出聖惠方治血虗頭風鬚髪秃落不生蔓荆子三兩桑寄生三兩桑根白皮二兩白芷二兩韭根鹿角屑各二兩馬鬐脂五合五粒松葉三兩甘松香一兩零陵香一兩生烏麻油三觔􅀥根皮汁三升右細剉綿裹内脂及油棗根汁中浸一宿漫火煎數攪候白芷色焦黄膏成去滓収磁合中每日揩摩鬚髪不生處十日後即生鬂髪秃落生髪膏出聖惠方莽草一兩防風升麻白芷薺苨各二兩蜣蜋四个驢鬐膏貓膏一作狗膏猪膏馬鬐膏熊膏各半升右諸膏成煎各半升合煎諸藥沸則下停冷復上火三五沸上濾去滓傅頭當澤用之一方有雄雞膏無驢鬐膏治頭風髪落并眼暗方蔓荆實三而桑寄生桑根白皮各二兩韮根切三合白芷二兩甘松香零陵香各一兩馬鬐膏三合烏麻油一升松葉切三合甘􅀥根白皮汁三升右細切諸藥内􅀥根汁中浸一宿數數攪令調温色已然後内油脂中緩火煎之勿令太熱三五日候􅀥汁竭白芷色黄膏成去滓每日揩摩鬢髪及梳洗其藥浸經宿臨時以綿寛裹煎之膏成之滓綿濾以新甆瓶盛稠濁者即先用却不堪乆停特勿近手摩壊也南燭草煎丸出聖惠方治血氣虗偏鬚髪秃落不生縱生色黄不黒冝服南燭草酸石榴葉旱蓮子苖各五觔右已上三味於端午日内収於甆瓶中泥封令宻安日中至六月中旬取出皆如黒錫研之又以生地黄五觔絞取汁及白蜜五合同前上件三味成膏次下諸藥末地骨皮四兩熟乾地黄四兩訶梨勒皮二兩秦椒三兩去目及閉口者㣲炒去汗白芷二兩旋復花二兩桂心二兩杏仁三兩右為末入上件膏中用緩火煎可丸如梧桐子大每日空腹以温酒下三十丸晩食後再服至四十九日鬚髪皆生黒而復光忌生葱蘿蔔大蒜摩膏出聖惠方治頭中二十種風髪秃落摩之即此療頂如剥似銅盆者蜀椒三兩半莽草二兩乾薑半夏桂心䕡茹附子細辛各一兩並生用右細搗篩以生猪脂剥去筋膜秤取二十兩和前件藥合搗令消盡脂其藥成矣先以白米泔沐髪令極净夜摩之經四五日即毛孔漸漸日生軟細白皮毛十五日後漸漸變作黒髪至一月四十日待髪生五寸以上若至五日不停彌佳好酥及生油和藥亦得又腸寒鼻塞但以摩之瘥茯苓术散一名通神効治髪白及秃落白术一觔一方蒼术茯苓澤㵼猪苓各四兩桂心半觔右搗散服一刀圭日三食後服調服一方酒或米飲調服後三十日髪白變黒容貌改紅筋骨强盛乆服通神鬼治鬚鬢秃落出聖惠方附子二兩去皮荆實二兩栢葉三兩烏鷄糞三合松葉三兩右相和於新甆瓶中盛隂乾百日出之搗羅為末以馬鬐脂和如膏塗之經十日即生治頭一切風髪秃落更不生頭中二十種病頭眩向中風以膏摩之方䕡茹三兩半細辛附子各二兩桂心半兩右搗篩以猪膏勿令中水去上膜及赤筋二十兩搗令脂銷盡藥成搗訖仍研恐其中有脂膜不盡以生布絞掠取以宻器貯之先用桑柴灰汁洗髪令净方去桑灰兩日洗待乾以藥摩頭令入肉每日湏摩如非十二月合則用生烏麻油和極効治鬢髪墮落令生長方出海上方生栢葉切一升猪膏三升附子四枚右為末以膏和為三十丸用布裹一丸内泔汁中煎沐髪長不落其藥宻收貯勿令洩氣三聖膏出醫方大成治髭髪脱落能令再生附子蔓荆子栢子仁各三分右以馬鬐膏和搗三千杵貯新磁器中封百日出以馬鬐和以傅頭訖巾裹之勿令見風日三傅即生肘後方不用栢子仁以酒漬澤沫一方無鬐膏和用藥塗在髭髪落處三五日即生自然牢壯不落治梳頭髪不落榧子三个去皮胡桃二个去皮側栢葉四片如手大右和合用雪氷三日取水用梳髪永不脱落兼澤潤之治鬚髪秃落不生令生出聖惠方生薑汁一合生地黄汁一合羊子肝汁一合右相和令匀夜卧塗之十日便生治脉極虗寒鬚髪墮落令髪潤澤方出聖惠方麻子三升碎白梧葉切一把右以米泔汁二斗煑五六沸去滓以洗沭則鬢不落而長治鬢髪墮落出千余方麻葉桑葉右以泔煑去滓沭髪七遍石灰酒治頭髪落不止及治眉鬚用石灰三升細篩水拌令温極熱蒸之炒令至焦以木柴投中火即着為候停冷取三升絹袋之以酒三斗浸三宿初服半合日三四夜又稍加至一合神效一方宻封冬浸十四日春秋七日取服常令酒氣相接服之一月即新者生也沭頭湯出海上方治脉極虗寒鬚髪墮落令髪澤方用桑根皮切三升以水五升淹漬者五六日去滓洗沐髪數數為之自不復落一方用長三尺甆瓶飯上蒸之蒸取兩頭汁以塗鬚鬢則立愈治頭風毛髪落不生方出千金方用鐵上生衣研以臘月猪脂和塗之日三亦治眉毛落一方先以酢泔清净洗秃處以生布揩令大熱臘猪膏細研入生鐵煑沸三二度塗之徧生治髪易長而黒出聖惠方多取烏麻花磁器盛宻盖深埋百日出用之塗髪療人病秃落不生長方出聖惠方用麻子仁三升秦椒一合置泔汁中一宿去滓日一沐一月長二尺也一方無秦椒治髪落不生令長方出聖惠方用麻子仁一升熬黒壓取油以傅頭長髪妙三十日漸生胡麻散出王氏濟方治五癩頭靣遍身生赤核麻木鼻内聞腥穢鬚髪退落胡麻子三兩何首烏三兩蔓荆子一兩葳靈仙一兩九節菖蒲一兩苦參一兩荆芥穗菊花沙苑白蒺䔧䑕粘子炒一兩右件一十味藥洗擇净控乾如治大風但鼻目耳不動並可以療之每服一錢薄荷酒任下日用五七服不以時候如纔覺便喫半月見効如已患年嵗湏服一月方始見功及五十日可减一半服及百日永瘥其鬚髪自生如治皮膚風疾瘙痒疥癆之類即入下四味與前六味為末以薄荷自然汁和酒調下一錢若腎臓風攻注亦宜服之如喫此藥至三五日湏頻暖浴貴其汗出也治髪落出本草取蕡麻汁煑粥食之治頭風并女人髪出本草以芭蕉油𫝊之眉髪鬚不生論夫足少隂之血氣其華在髪足少陽之血氣盛眉羙足陽明之血氣盛鬚美諸經血氣盛則眉髭鬢並美若血氣虗少枯竭則變黄白而不生若風邪乗其經絡血氣改變則異色惡髪每生也則冝以藥傅之令生好髪也方松葉膏出聖惠方治血氣風熱所攻眉髪鬚不生松葉半觔蓮子草半觔馬鬐膏半觔韮根半觔防風一兩蔓荆子二兩白芷一兩辛夷仁半兩川升麻半兩吳塩半兩芎藭半兩獨活桑寄生藿香沉香零陵香已上各半兩右細剉先以桑根白皮一觔以水八升煑取五升去滓又以竹瀝一升相和浸潤諸藥一宿後猪脂二升煎候白芷色黄膏成濾去滓於甆器中盛每用塗之日三五度妙治血憊心腦虚頭風致髭眉不生踈薄冝用此方蔓荆子半兩白芷附子防風芎藭莽草辛夷黄芩細辛當歸漢椒各一兩川大黄一兩半右都細剉以馬鬐膏一觔猪脂二觔以慢火同煎候白芷色黄住火去滓放冷用甆盛净洗塗之日三上良治眉髪髭不生兼令黒方鐡粉二兩附子二兩羊躑躅三兩蓮子草二觔零陵香三兩没石子五顆蔓荆子二兩右粗羅為散以生油五升浸五七日後用慢火煎取一半已下去滓於瓷合内盛貯無眉髭髪每日塗之神騐但不得塗着口鼻恐有毛生青蓮膏治血虗眉髪髭不生冝用此方蓮子草汁三升生苣蕂油一升牛乳一升甘草二兩右相和於鐺内以慢火煎之纔似魚眼沸便攪之勿住手直沬盡為熟澄清濾去滓盛於不津器中每用候夜卧時低仰卧每鼻孔㸃三五㸃如小豆大至六七遍止凉乆乃起有唾湏唾却勿得嚥之啜少湯飲如此㸃半年白者即黒落者重生其藥良騐忌生蒜蘿蔔辛辣物松脂膏出聖惠方治眉髪髭不生松脂二兩附子二兩去皮蔓荆子半觔右為末以烏鷄脂和瓷器中盛宻封頭於屋北隂乾百日藥成細研以馬鬐膏和塗於不生處勿近靣又方出聖惠方栢葉切一觔附子二兩去皮右為末以猪脂和作二十丸每日一丸又米泔中化開洗之每日用之十日後再生新者餘藥以綿裹宻器貯之勿令泄氣治生眉毛方出聖惠方鐡生衣墻上青衣小䑓秘要作爐右為末以水和塗之即生治髪薄不生出本草先以醋泔清净洗秃處以生布揩令大熱臘月猪脂細研入生鐡煑沸三二度傅之徧生治眉毛鬚鬢火燒瘡瘢毛不生方用蒲灰以正月狗腦和傅則生生髪方出肘後方塗頭髪潤頭髪取側栢葉隂乾作末和油塗之治眉髪髭不生方出聖惠方用羊糞灰二斗以水淋取汁洗之三日一洗不過十洗大生令白髪不生出本草以麻子五升研同葉一握搗相和浸三日去滓沐髪令白髪不生治髪薄不生用豹脂塗無髪處朝塗而暮生生髪令長論夫足少隂之經血所榮也氣盛則髪長若虚則髮不長方胡麻膏出聖惠方長髪令速生及黒潤胡麻油一升臘猪脂一升烏鷄脂一合丁香一兩半甘松香一兩半零陵香二兩芎藭竹葉細辛川椒各二兩苜宿香三兩澤蘭一兩大麻仁一兩桑根白皮一兩辛夷一兩桑寄生牡荆子各一兩杏仁三兩防風三兩莽草二兩栢葉三兩右都細剉米醋浸一宿漉出内入油猪脂鷄脂中以慢火煎候白芷色焦黄膏成綿濾去滓以磁合盛净洗頭塗之日二用三十日髪生長髪塗香油方出聖惠方松皮二兩天雄三兩莽草一兩秦芃一兩獨活二兩川烏頭三兩川椒二兩白芷二兩芎藭二兩辛夷二兩甘松一兩零陵香一兩沉香一兩羊躑躅木香一兩藿香一兩甘菊花一兩牛膝一兩松葉半觔杏仁三兩右細剉以醋五升漬一宿漉出烏麻油六觔於鐺内微火煎令沸候白芷色黄膏成以綿濾去滓甆器盛一依塗油之法任意塗之以髪生為度生髪膏出聖惠方細辛防風續斷芎藭皂莢栢葉辛夷仁各一兩寄生二兩澤蘭零陵香各二兩蔓荆子四兩桑根汁一升韭根汁三合三勺竹葉松葉切六合烏麻油四大升白芷六兩右以苦酒韭根汁漬一宿以綿裹煎㣲火三上三下白芷色黄去滓濾以器盛之用塗摩頭髪日三兩度一方無苦酒浸生髪膏胡麻油一升鴈脂一合丁香甘松香各一兩半吳藿香細辛椒各二兩澤蘭白芷牡荆子苜蓿香大麻子各一兩芎藭防風莽草杏仁各三兩竹葉切三合右切以酢漬一宿煎之以㣲火三上三下白芷色黄膏成去滓以塗髪及頂尤妙又方令髪速長黒烏喙莽草續斷皂莢澤蘭竹葉細辛白术各二兩辛夷防風各一兩栢葉切四兩杏仁松葉各三兩猪脂右先以米酢漬一宿以脂煎三上三下膏成去滓塗髪及頂上傅藥時忌風令髪速長而黒方出聖惠方烏喙三兩莽草三兩續斷三兩皂莢二兩澤蘭三兩白术細辛各三兩辛夷栢葉防風竹葉杏仁各一兩右細剉以隔年米醋三升漬一宿漉出以麻油二觔猪脂二觔同煎藥焦黄藥成去滓以瓷器盛每使洗净頭了塗之三日効治頭風烏喙膏生髪令速長而黒光潤烏喙莽草石南草續斷皂莢澤蘭白术各二兩辛夷仁一兩栢葉猪脂三升右以苦酒漬一宿以脂煎於東向竈釡中以煎之先致堆土每三沸即下致一堆上候沸定却上至三一致堆上三畢成膏訖去滓置銅器中數北向屋溜從西端至第七溜下埋之三十日藥成小児當亂頭日三塗大人數沐日塗之甚騐蓮子草膏治鬚髪秃落令重生兼黒潤蓮子草汁二升熊白脂一合猪鬐膏一合生麻油一合栢白皮三合山韭根三合瓦衣五合右以銅器煎之候膏成去滓收貯每欲梳頭塗膏令頭肌中髪生治婦人長髪方零陵香白芷蔓荆子蓁樹生附子藿香各一兩荆芥枝半兩右㕮咀綿包扎於瓶内用香油一觔浸却用紙封口埋地内半月取刷之近效生髪方出聖惠方蔓荆子青栢葉蓮子草各一分附子二枚碎頭髪灰二七右以酒漬内瓷器中封閉經二七日藥成以烏鷄脂和塗之先以泔洗然後傅之數日生長一尺也生髪牆衣散牆衣五合鐡精一合合歡木灰二合水萍末三合右搗研以生油和少許如膏以塗髪不生處日夜再即生髪効令髪易長方出聖惠方蓮子草三升麻油二升羊乳一升猪脂一升右先煎乳一沸次入脂等更煎三兩沸放冷以磁合貯之每日塗髪七日之外不長盡長長髪方出聖惠方蔓荆子三升大附子二枚右以酒一斗二升漬之以磁器盛之封頭二十日藥成先以灰汁净洗髪須痛拭乾取烏鷄脂煎以塗之一日三遍凡經七日然後以藥塗日三四便澤以汁櫛髪十日長一尺勿近靣塗恐有毛生一方無烏雞脂令髪易長出聖恵方熊脂一兩蔓荆子一兩右相和令匀以醋調塗之髪即漸長常用長髪藥用亂髪洗净晒乾以油煎令燋就鉢内細如膏搽甚是長髪又法凢婦女秃髪即以漢椒四兩用酒浸蜜食内坐挫之其髪自然長紫金油用鯽魚膽二十枚生鐵一片五錢重訶子五枚煨去核欝金二枚剉黄芩半兩剉黒豆一大合紫草半兩零陵香半兩生薑汁一大合和勻生絹袋子盛取竹瀝油四兩油一十二兩入藥袋子於有油甆合内浸宻封放凉處半月取出逐日搽頭百日内如漆永不落治稀黄香芎油治頭風髪落不生用秦椒白芷川芎各二兩蔓荆子零陵香各二錢半細剉用綿裹以生麻油半觔於瓷器内浸三七日塗髪稀少處不可滴上去風生髪栢枝油用栢枝乾者椒紅半夏各三兩㕮咀用水二碗煎至半碗入蜜少許再煎一兩沸每用時入生薑汁少許調勻搽無髪處每日兩次去風生髪烏韮方用烏韮石衣燒灰令沐頭長髪此是隂崖濕處長者可四五寸治髪落不生令長用鴈肪傅之主生毛髪以胡麻生油塗頭令人生髪生髪羊糞燒灰和鴈肪塗頭上日三生長髪方以石荆生水傍作灰汁沐頭生髪生毛髪以白犬乳汁塗孔中即生黒髪若欲不生㧞去毛髪以鱉膏塗之長髪方用續斷汁沐頭主生髪出本草以水萍作湯沐浴又為膏傅之長髪出本草挼皂莢葉沐頭長髪出本草以松菜子作油傅頭主生髪去風癢出本草取菴摩勒子壓取汁合鐡粉如油塗頭初塗髪脱後生如漆令腦滿髪不白而長生用槐子以相連多者為好十月已日採之新盆盛和泥百日皮爛為水核如大豆服之生毛髪出本草用金星草根搥碎浸油塗頭治無髪出本草用𤓰蒂葉生擣汁塗之即生生眉論足太陽之經其脉起於目内眥上額交顛血氣勝則眉羙有毫血少則眉惡又眉為風邪所傷須以藥生之方烏蛇圓治風毒眉毛墮落冝服烏蛇肉白附子白殭蠶乾蠍防風各半兩麝香一分虎脛骨半兩藿香半兩臘月烏右為末煉蜜和搗三二百杵丸如梧桐子大每日空心温酒下二十丸夜臨卧再服治眉毛脱落冝用此方用蓮子草搗攪取汁磨生鐵塗之以手揩磨令藥氣透肉一日可三兩度塗之為妙又方出聖惠方用白礬十兩燒令汁盡細研為末以蒸餅和丸如梧桐子大每日空腹以温水下七丸日加一丸至四十丸减一丸周而復始効生眉毛方用菁子四兩微炒為細末以醋和每夜塗之又方出聖惠方用七月烏麻花隂乾為末生烏麻油浸每夜傅之治眉痒毛落方用垂栁葉隂乾搗羅為末以母生薑汁於生鐵器中調夜間塗之漸以手摩令熱為妙生眉髪出本草以鱧腸草汁塗之生速而繁洗法藿香散去㸃洗髭髪藿香葉零陵香皂角檀香沉香各一兩香白芷白丁香黄明膠各七錢龍腦糯米各半右為細末每日如常使用洗髭髪手靣白日令光恱潤澤乾洗頭藥甘松百藥煎五倍子川芎薄荷香白芷草烏頭藿香茅香各等分右為末糝髪上揉搓木梳之洗髪菊花散治頭髪脱落甘菊花二兩蔓荆子乾栢葉川芎白芷細辛桑白皮旱蓮子各一兩右粗篩每用二兩漿水五大椀煎至兩大椀去滓沐髪乾洗頭治頭生垢膩兼去風滑石四兩川芎王不留行白芷細辛防風羗活獨活各半兩右為末先梳頭髪通細摻入藥三五錢拪入兩手如洗頭狀再梳通箆之風屑垢膩悉去永無頭風梳頭藥方香白芷零陵香防風荆芥穗地骨皮滑石王不留行各等分右為末每用一大錢摻在頭上梳遲皮湯治髭髪乾澤洗髪方小麥麩半升半夏一兩沉香半兩生姜一兩右用藥水兩椀入生薑一兩和皮細切同煎三兩沸生絹濾去滓又清汁入龍麝少許攪勻洗髪令潤柔易長乾洗頭藥方香白芷零陵香甘香滑石右等分為細末摻於髪内梳箆洗頭方胡餅霜白菖蒲槵子皮各一兩右衮研合煉皂角漿水和丸如毬子大每一丸用灰汁搽洗頭甚好乾洗頭香白芷散香白芷王不留行各二兩右為細末每用乾摻頭髪内㣲用力擦去膩内箆子刮去藥末治髪積用五芩散摻之或炒燥細麫或百藥煎好必效沐髪栢葉細剉一斗煮取湯沐髪又方取杏仁與麻子搗以水投濾汁濤用沐髪洗頭光澤訣右用猪膽一枚浴頭時仰在水中洗其髪自然如漆光澤訣以乳香油浸七日外常搽髪上光而且黒洗頭明眼方鳯眼草即椿樹上固固翹也右正月七日二月八日三月四日四月五日五月二日六月四日七月七日八月三日九月二十日十月二十三日十一月二十九日十二月十四日洗頭方出本草令髪香白屑不生以雞蘓燒作灰淋汁或煮取汁洗之沐髪方出本草用瓶氣水以物於炊飲時承取沐頭令髪長宻黒潤不能多得朝朝梳頭漸漸覺有益好沐頭長髪方出本草以蘭草葉五月六月採陰乾和油作膏塗髪洗頭長髪方出本草取鴈骨燒灰和泔洗頭澤頭方出本草沐頭及洗身上瘡痒出本草以赤𤓰實汁洗之主沐髪長潤出本草以麻葉與桐葉搗浸水沐髪則長潤矣沐髪出本草以青蘘生杵汁沐髪令黒而長乃胡麻葉也沐髪方出本草春斫胡桃木皮出水承取沐頭至黒主沐頭長髪出本草以紫衣燒灰淋取汁沐頭良鬼䑛頭治鬼䑛頭方出本草用燒猫兒屎以臘月猪脂和傅之又方出千金方用愽末和蒜搗傅日一度治鬼䑛頭取小兒糞臘月猪脂和傅又方出千金方用猫兒毛燒灰以膏和傅之普濟方卷五十
