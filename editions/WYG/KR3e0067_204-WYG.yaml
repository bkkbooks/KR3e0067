夏二兩湯浸七遍去滑桔梗二兩去蘆桂心一兩厚朴一兩去粗皮塗生薑汁炙令香熟右為散每服三錢水一中盞入生薑半分煎六分去滓不拘時候熱服前胡湯出聖濟總録治膈氣痰逆胸中痛不思食前胡去蘆頭芍藥炒半夏湯洗七遍去滑人参百合各三分赤茯苓去黒皮枳殻去穰麸炒木香枇杷葉炙刷去毛㯽榔煨剉白茅根各半兩右搗篩每服五錢水一鍾半煎至八分不拘時温服半夏五香丸出聖濟總録治膈氣痰結和胃氣進飲食半夏湯洗七遍去滑搗羅為末丁香沉香剉各半兩麝香研龍腦研各一錢藿香半兩木香㯽榔尖者二顆剉甘草一錢丹砂研一錢右為末煉蜜丸彈子大每服一丸空心食前生薑鹽湯嚼下藿香湯出聖濟總録治膈氣痰結不止藿香去梗二錢草豆䓻去皮一分阿魏一錢用作麺餅焙乾木香一分人參陳橘皮湯浸去白焙各一兩桔梗炙一分乾薑炮製一錢訶棃勒炮去核甘草炙各一分右搗篩每服三錢水一盞生薑三片煎至八分去渣空心服木香丸出聖濟總録治膈氣痰結酸水脾胃乆冷不能下飲食木香青橘皮湯浸去白焙桂去粗分益智子去皮白术肉豆䓻去壳各一兩細辛去苗葉吴茱茰湯浸焙乾炒乾薑炮製各半兩右為末以酒煑麺糊丸如菉豆大每服十五丸食後生薑湯下肉豆䓻丸出聖濟總録治膈氣痰結不入飲食肉豆䓻去壳木香桂去粗皮益智子去皮胡椒沉香鎊蓽澄茄青橘皮湯浸去白焙附子炮製去皮臍各等分右為末用木𤓰一枚切盖去子内硇砂一兩飛過者飯上蒸熟研如膏後拌諸藥如乾更以煉蜜丸如梧桐子大空心温酒下二十丸茯苓湯出聖濟總録治膈氣痰結通中消飲去積冷止腹疼赤茯苓麥蘖炒青橘皮湯浸去白焙乾半夏薑汁浸二宿焙人參陳麹炒各一兩草豆䓻去皮三箇陳橘皮湯浸去白炒半兩右搗篩每服三錢薑三片煎至六分去滓食前温服五膈丸出聖濟總録治膈氣痰結胸中不利桑根白皮剉焙紫蘇葉微炒赤茯苓去黒皮陳橘皮湯浸各一兩㯽榔八枚剉旋復花一兩半厚朴去粗皮生薑汁炙一兩三分生薑切焙二兩右為末煉蜜丸如梧桐子大空心下二十丸漸加至三十丸㯽榔丸出聖惠方治膈氣痰結脾冷食飲不下胸中刺痛㯽榔一兩白术二兩陳橘皮一兩湯浸去白焙厚朴一兩去粗皮塗薑汁炙令香熟前胡一兩去蘆頭髙良薑一兩炒赤剉桃仁一兩湯浸去皮尖䨇仁炒半夏一兩湯浸七遍去滑右為末煉蜜和搗三二百杵如梧桐子大每服不計時候薑湯下二十丸前胡丸出聖惠方治膈氣心胸痰結積滯氣不宣散飲食不下前胡一兩去蘆頭川大黄三分剉碎微炒白术三分人參二分去蘆頭旋復花半兩麥門冬一兩去心焙肉豆䓻三分去壳枳殻三分麸炒㣲黄去穰右為末煉蜜和搗二三百杵丸如梧桐子大每服不計時候熱酒下二十丸訶棃勒湯出聖濟總録訶棃勒煨去核一兩草豆䓻去皮㯽榔剉青橘皮湯浸去白各一兩甘草炙一兩半丁香一分半夏二兩湯洗七遍薑汁炙令黄色右粗篩每服三錢水一盞入生薑三片煎至七分去滓熱服不拘時候半夏丸出聖惠方治膈氣痰結氣逆不能下食半夏一兩湯洗七遍去滑陳橘皮三分去白穰焙乾薑半兩炮製剉薯蕷一兩甘草一分炙微赤剉黄丹一兩炒令紫色右為末入黄丹研匀煮􅀥肉和丸如梧桐子大每於食前煎人參生薑湯下二十丸鐡刷湯治益脾胃化痰涎治胸膈滯氣咽喉不利多涎唾半夏四兩生薑四兩與半夏同搗作餅訶子炮去核取肉半兩草豆䓻去皮取仁半兩甘草半兩右為末每服一錢水一盞薑二片鹽一捻煎至七分去滓熱服妙紅散治膈氣痰結嘔逆吐食紅麹炒丁香藿香葉白茯苓去黒皮人參各半兩右為散每服二錢米飲調食前服芫花散治膈氣痰結否塞心胸壅悶芫花四兩醋拌炒令乾巴豆半兩去皮心研細去油桂心一兩杏仁一兩湯浸去皮尖䨇仁麸炒微黄桔梗一兩去蘆頭右為末煉蜜和搗二三百杵丸如小豆大食前温酒下二十丸木香散治膈氣胸中痰結氣逆不下飲食木香一兩青橘皮二兩湯浸去白穰焙白豆䓻三分去皮郁李仁二兩湯浸去皮㣲炒剉研如泥右為末散研入郁李仁令匀每於食前以川椒七粒煎湯調下一錢乾薑圓治膈氣痰結上焦冷氣吞酸吐沫嘔逆不食乾薑炮一分丁香半兩半夏湯浸去滑焙二兩右為末以生薑自然汁煮麺糊為丸如梧桐子大每服十五丸煎木𤓰鹽湯下不計時候一方用米飲下普濟方巻二百四
