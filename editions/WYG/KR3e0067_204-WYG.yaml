䨇仁麸炒微黄右為末入硇砂同研令匀煉蜜和丸搗三二百杵圓如梧桐子大每服不計時候以生薑湯服二十丸五膈丸療憂膈氣膈食膈飲膈異病同藥人參附子炮逺志去心細辛各四分桂心乾薑蜀椒各五升炒出汗右搗篩以蜜為丸着牙下㕮咀嚥之若病劇者日三夜再并療諸毒氣風注氣腹中有病皆當得其新好藥即可中病耳忌生葱生菜猪肉冷水等物一方有半夏訶棃勒圓治五膈氣乆不下食心胸妨悶多吐酸水訶棃勒皮二兩乾薑一兩炮製剉甘草半兩炙微赤剉枳殻一兩麸炒微黄去穰陳橘皮二兩湯浸去白焙㯽榔一兩桂心一兩右為末煉蜜和搗三二百杵圓如彈子大每服日不問早晩常含一圓嚥津如患甚者即將一圎煎湯嚼破服羚羊角圓出聖惠方治五膈氣心胸妨悶食少胃虚四肢無力赤茯苓一兩人參一兩去蘆頭桂心一兩訶棃勒二兩乾薑半兩炮製剉羚羊角屑一兩甘草半兩炮微赤剉右為末煉蜜和搗三二百杵圓如梧桐子大每服四十丸橘皮湯下草豆䓻圓出聖惠方治五膈氣飲食難下胸膈噎悶四肢不利草豆䓻去皮附子炮製去皮臍逺志去心細辛乾薑炮製剉桂心川椒去目及閉口者炒去汗各一兩右為末和搗三二百杵丸如彈子大不拘時候服一丸嚥津京三稜圓出聖濟總録治五種脹氣利胸膈散積滯消腹脹進飲食京三稜濕帋褁煨剉沉香各半兩青橘皮湯浸去白焙鱉甲去裙爛醋炙㯽榔剉各一分巴豆五枚去油為霜右為末水煮白麺糊為丸如菉豆大每服五丸温熟水下五膈丸治憂膈氣膈食膈寒膈飲膈異病同藥吴茱茰麺杏仁去皮尖熬乾薑蜀椒出汗去目及閉口者好豉熬令色變右等分搗篩蜜和丸如梧桐子大米飲湯服七丸日三忌生冷物木香圓出聖惠方治五膈氣心胸壅噎飲食不下木香一兩肉豆䓻一兩去皮訶棃勒二兩桂心一兩㯽榔一兩麝一分細研右件為末入麝香研匀煉蜜和搗三二百杵圓如梧桐子大每服不計時候以生薑橘皮湯下二十圓半夏散出聖惠方治五膈氣噎飲食不下宜服半夏一兩湯浸七遍去滑木通一兩剉桂心一兩㯽榔二兩赤茯苓二兩陳橘皮三兩去穰湯浸焙右粗羅為末作散每服二錢水一中盞入薑半分煎至六分去滓不拘時候熱服萊菔木香散治五膈氣促腹脇脹滿胸膈不快痰逆惡心不思飲食萊菔子二兩粟米一兩半陳橘皮一兩湯浸去穰焙木香一分巴豆肥大者二十枚去皮於瓦石器内與上三味同炒候藥焦黒色揀去巴豆不用右為散煮萊菔湯調下二錢或以生薑汁煮麺糊和丸如梧桐子大萊菔湯下十五丸亦得寛膈圓出三因方治氣不升降胸膈結痞木香京三稜炮青皮各半兩半夏半两湯浸七次大腹子一分右為細末薑汁糊為丸如梧桐子大食後米湯下二三十丸狀元圓出宣明論治膈氣酒膈酒積涎嗽腹痛吐逆痞滿巴豆五十枚取霜神􅎘半兩末半夏三錢佳者研雄黄一兩明浄白􅎘炒一兩右研匀水滳丸如小菉豆大細米糠炒變赤色食後温水下三丸童子二丸二三四嵗一丸嵗半半丸止咳嗽􅒭汁下止嘔逆生薑湯下前胡散出聖惠方治五膈氣噎胸脇逆滿每食即氣塞不通前胡一兩去蘆頭半夏一兩洗七遍去滑訶棃勒皮一兩陳橘皮二兩湯浸去白穰焙桂心一兩右為散每服三錢水一中盞入薑半分煎至六分去滓不拘時候稍熱服木香散出聖惠方治五膈氣壅塞不通木香一兩吴茱茰一兩湯浸七遍焙乾炒訶棃勒一兩煨用皮桃仁半兩湯浸去皮尖䨇仁麸炒微炒麝香一分細研右為散每服不計時候以熱酒調二錢送下桃花散出聖惠方治五膈氣食飲不下漸将羸痩桃花三兩當年者吴茱茰一兩湯浸七遍焙乾炒縮砂二兩去皮馬牙硝二兩㯽榔二兩右為散每服日不計時候以温酒下一錢通中散出聖惠方治五膈氣胸中不利臟腑壅滯宜服牽牛子一兩半微炒㯽榔三分桂心一分木香一分乾薑一兩炮製剉右為散每服以熱酒調下二錢空腹可二服續更以一兩盞熱茶投之得利三兩行下得惡物為効沉香散治膈氣沉香木香枳殻各一分烏藥四兩右為細末每服二錢鹽少許沸湯調下透膈寛膓散出宣明論治膓上壅實結熱難行者白牽牛一兩芒硝三兩川大黄二兩甘遂半兩右為細末食後温蜜水調下一錢虛實加减鬆動止陳橘皮圓出聖惠方治五膈氣胸背俱悶不下飲食宜服陳橘皮一兩湯浸去白穰焙川朴硝一兩木香一兩右為末煉蜜和丸如梧桐子大每服不計時候以熱酒下三十丸丁香散丁香煎出聖惠方治五膈氣嘔逆飲食不下心胸壅滯宜服丁香二兩末生薑一斤取汁酒一中盞右件藥相和令匀以文武火熬成膏不計時候熱酒調下半匙二妙散治五膈氣心胸痞塞半夏一兩洗七遍乾桑皮二兩右為末每服三錢薑三片酸水一盞煎至七分稍熱服訶棃勒散出經驗濟世方治五膈氣心胸噎塞閉悶不食訶棃勒四枚大腹子四枚右将前味各二枚煨二枚生并為末每服一錢水一盞煎一兩沸通口服快氣丸出經驗濟世方治膈氣噎不下飲食肌體羸痩陳橘皮去白大蒜右不以多少研細和匀為丸如菉豆大每服二十丸至三十丸温米飲下食後日三服利膈丸治三焦氣不順胸膈壅塞頭眩目眩涕唾痰涎精神不爽牽牛子四兩半生半熟皂莢不蛀者塗酥炙二兩右為末生薑自然汁煮糊丸如梧桐子大每服二十丸荆芥湯下大黄圓出聖惠方治五膈氣川大黄剉碎微炒訶梨勒煨用皮各半兩右為末煉蜜和丸如梧桐子大每服以温水下二十圓以微利為度治膈氣出百一選方右用附子一箇先以銚子炒石灰令十分熟埋附子於灰中候灰冷取出石灰依前法再炒如此三次然後取附子去皮臍入丁香四十九箇不見火同為細末空心以糟笳兒三兩片翻覆蘸藥食之然後食物治膈氣出經驗方右鯽魚一尾用市中自死者活魚不効剖腹去盡腸物留鱗用大蒜去净皮薄切填入魚腹内仍合魚為一尾用濕紙褁定次用麻皮纒之又用熟黄土泥外令厚固日微乾用碎碎灰火煨熟取出去鱗刺骨入局方平胃散搗細丸如梧桐子大日乾瓶收勿泄氣味每用米飲空心下三十丸治膈氣食噎乆成翻胃出經驗良方右用壯老薑一斤帯皮净洗切如大錢許厚以竹蘿盛之入寺觀内厠坑中浸七日再入長流水中漂七日取出曬乾為末再秤過每一斤入甘草末一兩每服二三錢米飲調徐徐服次用髙良薑去毛切片清油炒變色為末米飲為丸如梧桐子大每服二三十丸或五十丸漸漸米調良薑末送下忌生冷難化物𤣥明粉出濟生拔粹方治膈上氣塞滯五臟秘澁熱邪忌魚及藕右用朴硝不拘多少煎過澄濾了五七遍晚於星月下露地至明自然細作青白硝也用定瓷罐兒按實於炭火内從慢至𦂳自然成汁煎至不響再加頂火一煆取出於净地上倒合盆盖去火毒至晩取出為細末每二斤入甘草生熟各二兩每服一錢二錢桃花湯或葱白湯調下治胸膈咽氣利胸膈右取韭煠熟以鹽醋空心喫一楪可十頓已上甚驗青皮散一名降氣散出衛家寳方治五膈氣胸膈痞悶如板通闗散出王氏愽濟方治五膈氣噎塞妨悶遍身虛腫涕唾稠濁不下飲食麥蘖馬兜各三錢訶子一箇芫花一錢浆浸微炒白丁香三錢硇砂一錢飛去沙石黄丹一分硃砂白礬鈆白霜各秤一錢右同研匀令細每服一錢半入膩粉兩文雞子一箇去黄只取清調末入雞子殻内濕紙褁慢火煨熟放冷爛嚼臘茶湯下臨睡服來日逐下黒惡物未差如小可噎塞再依法服一錢必効半夏散出王氏愽濟方治五膈氣噎心胸不利涕唾稠粘飲食進退半夏半兩薑汁浸一宿焙乾厚朴半兩薑汁炙肉豆䓻一個去核枇杷葉炙去皮毛秤半兩母丁香五十枚青木香一塊棗大右為細末每服一錢水八分煎六分熱酒服五積丸出楊氏傳治五種膈氣中脘痞悶噎塞不通飲食減少及積聚癖塊心腹作痛一切沉積並皆治之沉香半兩木香半兩當歸洗焙半兩附子炮去皮臍半兩青橘皮去白半兩丁香一分大黄半兩酒浸濕帋褁煨半夏半兩湯浸七遍後以生薑汁製麹縮砂仁一兩京三稜半兩炮陳皮去白半兩蓬莪荗半兩炮㯽榔一分膽礬半兩另研細松煙墨半兩燒存性厚朴半兩薑汁炙右件除膽礬外並為細末用肥棗五十枚去皮核入米醋二升煑棗令爛次下膽礬末煑少時與藥同為丸如麻子大每服二十丸加至三十丸橘皮湯下食後臨卧服瑞香散出衛生家寳方治五種膈食氣䧟胸正氣進食南木香㯽榔麺褁煨剉訶子炮去核川乾薑炮肉桂去皮不見火甘草炙麥蘖炒白术炮白茯苓人參去蘆頭青皮去白丁香炮以上各三兩京三稜一分白扁豆一分用薑汁炙右為細末每服一錢入炙紫蘇鹽湯㸃服桂香丸出衛生家寳方治氣膈食膈憂膈冷膈熱膈痞塞不通宿食不消或霍亂或心痛或嘔物或泄㵼腹脇氣脹吞酸少食桂心乾薑茯苓㯽榔甘草炮人參細辛訶子炮去核枳殻麸炒去穰白芍白术右各等分為末煉蜜丸如梧桐子大每服二十丸空心温酒嚼破服十順散出衛生家寳方治十種膈氣心胸痞悶噎塞不通飲食减少漸成惡証㯽榔半生用半煨青皮去白穰人參訶子炮去核木香煨白术炒白茯苓京三稜煨肉桂去粗皮神麯炒令微黄甘草炙乾薑枳殻去穰麸炒厚朴去粗皮薑汁塗炙三次各一兩右為末每服一大錢水一鍾鹽一捻煎至七分温服不拘時候寛中丸出衛生家寳方治十膈五噎滯滿不通常服寛膈化冷物三稜一兩􅅫术一兩縮砂仁炒青皮去白沉香陳皮去白香附子胡椒以上各半兩右為細末醋糊丸如梧桐子大每服十五丸紫蘇生薑湯下食後服五膈下氣湯出永類鈐方治五膈膏肓之疾針藥無可施者右法用䋲繫黄犬令其乾餓數日後用生米乾飼之或用粟米候其糞下淘洗净極下作粥用薤白一握入湯内泡熱去薤取其通氣粥熟再入沉香末二錢粥稀食之木香煑散出楊氏家藏方理一切膈氣寛膈消痰治嘔逆惡心腹脇脹滿紫蘇葉青橘皮去白白芍藥烏藥當歸酒洗白茯苓去皮桔梗去蘆頭半夏湯洗七次焙川芎黄耆蜜炙防風去蘆頭甘草炙陳橘去白枳殻麸炒去穰大腹皮以上十五味各一兩右㕮咀每服五錢生薑五片大􅀥二枚水二盞煎至一盞去滓食前温服治一切丈夫婦人或因喜怒憂思之後因成氣膈其状心胸滿悶膈塞不快飲食難下兩脇脹滿忽時氣痛衝脇衝心不可忍面色青黄桑寄生牽牛熟用當歸牛膝各半兩藿香二銖芫花土器内醋炒川芎官桂各一錢細辛三銖楝子四銖右醋煑芫花一味爛研為末所餘藥另一處杵羅為末與芫花相衮令匀每服二錢葱湯空心調服若喫酒葱酒調下忌鉄器又忌甘草十膈散出衛生家寳方治冷風氣痰熱憂愁水食喜皆病源也並因憂驚喜怒中飲食不化滯積在胸膈上喘咳嗽嵗月漸深心胸噎塞漸致羸痩人參細剉焙白茯苓細剉焙神麯微炒甘草細剉炒厚朴削去皮細剉生薑拌和炒枳殻去白穰細剉麸炒陳皮去穰微炒白术洗净炮細剉官桂去粗皮剉不見火訶子濕帋褁煨去核取皮白薑炮去皮細剉㯽榔細剉焙木香濕帋褁煨香取出細剉各等分右為細末每服二錢入鹽少許沸湯㸃服或每服二錢水一盞生薑二片棗子一箇煎至七分服治寒熱氣膈其状大腑秘熱忽時洩㵼或時思食忽不思食膈塞胸前不快滯氣積聚或時脹滿腹脇不快其脉輕有骨力而來遲青橘皮黄橘皮藿香桔梗木香沉香蓬莪荗官桂去皮川芎羗活各二錢甘草四銖桑寄生半兩右細杵羅為末每服一錢水一鍾煎兩沸空心和滓服治熱膈其狀胸前膈塞飲食减少大腑秘熱忽時不調喫醎即心燥喫辛酸即喉乾痰實頭目昏暈兩足無力載身不起或舌上生瘡唇皮焦裂或時口中涎流衝肺發為乾嗽忽