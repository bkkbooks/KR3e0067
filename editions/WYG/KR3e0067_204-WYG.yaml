body:
  text: 普濟方卷二百四明周王朱橚撰膈噎門總論夫膈噎者胸中氣結津液不通飲食不下羸痩短氣命曰憂膈中脘實滿噫則醋心飲食不消大便不利名曰思膈一名恚膈胸脇逆滿噎塞不通嘔則筋急惡聞食臭名曰食膈一名氣膈五心煩熱口舌生瘡四肢倦重身常發熱胸痺引背不能多食名曰喜膈一名熱膈心腹脹滿欬嗽氣逆腹下苦冷雷鳴遶臍痛不能食名曰怒膈一名寒膈此皆五情失度動氣傷神致隂陽不和結于胸膈之間病在膻中之下故名五膈聖惠方云夫五膈氣者謂憂膈恚膈氣膈寒膈熱膈也憂膈之為病胸氣結煩悶津液不通飲食不消羸痩全無力氣恚膈之為病心下苦實滿噫輙醋心食不消心下痞澁積結在於胃中大小便不利氣膈之為病胸脇逆滿咽塞不通惡聞食氣寒膈之病心腹脹滿欬逆膈上苦冷臍腹雷鳴食不生肌熱膈之為病藏有熱氣五心中熱口爛生瘡骨煩四肢重唇口乾燥身體頭靣手足或熱腰背疼痛胸痺引背水糓不消不能多食羸痩少氣此是五膈形証也經云陽脉結謂之膈言憂恚寒熱動氣傷神而氣之與神並為陽也傷動陽氣致隂陽不和而臟腑生病結於胸膈之間故稱為膈氣衆方説五膈亦有不同但陽動之由有五故云五膈氣也五噎者即氣噎憂噎勞噎思噎食噎雖五種不同皆以氣為主所謂氣噎者心悸上下不通噫噦不徹胸背痛憂噎者遇天隂寒手足厥冷不能自温勞噎者氣上衝膈脇下滿胸中填塞攻背疼痛思噎者心怔悸善忘目視􅍃食噎者食無多少覺胸中苦寒疼痛不得喘息此由喜怒不常憂思過度恐慮無時鬱而生涎與氣相搏升而不降逆害飲食與五膈同但此在咽嗌故名五噎素問云陽脉結謂之膈盖氣之與神並為陽也逸則氣神安勞則氣神耗倘或寒温失宜飲食乖度七情傷感氣神俱擾使陽氣先結隂氣後亂隂陽不和臟腑生病結於胸膈則成五膈留於咽嗌則成五噎五膈者憂恚寒熱氣也五噎者憂思勞食氣也其為病也令人胸膈痞悶嘔逆噎塞妨礙飲食胸痛徹背或脇下支滿或心忡善忘咽噎氣不舒治療之法調順隂陽化痰下氣隂陽平匀氣順痰下膈噎之疾無由作矣又有下虛氣上空膈令人心下堅滿痞急胸中苦痺緩急如刺不得俛仰名曰胸痞噎病不在外不在内不屬冷不屬熱不是實不是虛所以藥難取効此病縁憂思恚怒動氣傷神積於内氣動則諸症悉見静則疾候稍平捫之不得疾之所在視之不知色之所因聽之不知音之所發故針炙服藥皆難効此乃神異之病也膈噎方嘉禾散一名糓神嘉禾散出徳生堂治中滿下虛五噎五膈脾胃不和胸膈痞悶脇肋脹滿心腹刺痛不思飲食或多痰逆口苦吞酸胸滿短氣肢體怠惰面色萎黄如中焦虛痞不任攻擊藏氣受寒不受峻補或因病氣衰食不復常禀受怯弱不能多食尤宜服之常服畜神養氣和補脾胃進美飲食枇杷葉去毛盡塗薑汁炙令香熱為度人參去蘆白茯苓去皮縮砂去皮各一兩白术炒二兩大腹子微炒陳皮去白各三分白豆䓻㣲炒去皮桑皮㣲炒各半兩梹榔炒五味子㣲炒青皮去穰薏苡仁神麯㣲炒沉香石斛細剉酒拌微炒藿香葉隨風子如無丁香杜仲糓蘖微炒半夏湯洗七遍生薑一分切作片子與半夏同搗爛作餅炙黄一兩木香甘草各一兩半右為末每服三錢水一盞入生薑三片肥􅀥三枚同煎至七分温服不拘時候又療四時傷寒能調治隂陽使無變動刻日得安如療五噎入乾柿一枚同煎七分服見効如療膈氣吐逆羸困入薤白三寸􅀥五枚同煎婦人亦可服一方無木香沉香開膈散出仁濟直指方治五膈五噎痞滿嘔吐心刺腹痛脇肋脹拒沉香荆三稜􅅫莪术白豆䓻仁人參丁香縮砂仁蓽澄茄草菓仁益智仁丁皮川白薑各半兩木香白茯苓香附炒青皮藿香葉半夏麯陳皮各一兩甘草炒一兩一分右為麄末每服三錢水一盞半生薑五片􅀥二枚煎至一盞食前服沉香散出永類鈐方治五膈五噎胸中乆寒諸氣結聚嘔逆噎塞飲食不化結氣不消常服寛氣通噎寛中進食白术茯苓各半兩木通當歸橘皮青皮大腹子一作梹榔大腹皮木香芍藥各二兩甘草炙一兩半白芷三兩紫蘇葉枳殻麸炒去穰三兩右為末每服二錢水一盞薑三片棗一枚煎至七分空心温服一方無木香奪命回生散出永類鈐方治五膈五噎翻胃嘔吐不進飲食此藥多有神効不可輕視丁香揀净川芎去土白薑洗净炮南木香不見火肉桂去皮不見火新羅參神􅎘各半兩訶子七枚取肉大草菓二枚炮取仁縮砂仁二十一粒莪术炮粉草炙各七分半巴豆一十四粒去壳心膜不去油冷水浸一宿别研為膏留乳鉢中右日乾為末入乳鉢内和匀巴豆膏再篩過入瓦盒内以油紙盖合口却用黄蠟和松脂溶如法封固合縫每以十二月上辰日或初八日黄道生炁天月二徳日至誠修合如地髙爽處埋土中三尺深至次年六月中伏節擇吉日晴明取出向當風處攤去濕氣以不漏瓦瓶収貯宻封壯實人每服半錢臨睡百沸湯調半盞䪺服仰卧片時徐以温白粥壓下若羸弱只服一匙二三服即能進食止嘔吐續以寛中散丁沉透膈湯橘皮煎丸厚朴煎丸等兼進佐助胃氣忌生冷魚腥粘膩并硬物一兩月則全愈矣孕婦不可服神仙更生散治男子婦人隂陽不和因氣滯生病結於胸膈則成膈氣留於咽嗌則成五噎五膈者憂思勞食氣也令人胸膈痞悶嘔逆吞酸噎塞妨悶飲食不平作痛脇下支滿飲食减少四肢無力不升降此藥順隂陽化痰寛胃止嘔吐美飲食丁香二錢半􅅫术二錢半木香一錢官桂一錢半乾薑一錢一分炮縮砂十箇草菓一箇訶子肉四箇甘草四錢川芎一錢神麯一錢一分巴豆七粒搗成膏右為末和巴豆令匀每服一匙沸湯下緩氣丸出聖濟總録治隂陽不升降痞氣膈氣心痛腹痛咽喉噎悶氣道不匀嘔吐痰沫飲食不下大便秘利不定或裏急後重大腹痛不可忍此藥養氣消痰温中散滯人參二兩桂去麄皮半兩阿魏研半兩吴茱茰炒二兩木香半兩白术二兩訶棃勒皮二兩厚朴去麄皮塗薑汁炙令香二兩附子炮裂去臍皮一兩半右為末煉蜜為丸如梧桐子大每服三十丸温熟水下不計時候大便結澁加大黄黒牽牛各一兩半夏丸治胸痛達背膈中煩滿結氣憂愁飲食不下藥悉主之半夏一分削去皮熬甘草炙逺志去心各四分乾薑桂心細辛椒去目炒出汗附子炮各二分右搗篩以蜜為丸先飲酒用粳米飲服如梧桐子大五丸日三稍增至十丸忌海藻菘菜羊肉􅄳猪肉冷水生葱生菜奪命丹治五膈食噎馬草節半兩炒乾再用蜜炙黄色揀丁香廣木香梹榔藿香葉各五錢右為末每服三分煎柿蒂湯調下􅀥合丸治脾胃虛冷乾嘔惡心嘔吐涎沫全不思食五膈五噎並皆治之丁香半兩半夏麯一兩乾薑炮胡椒木香各二錢右為末生薑汁浸蒸餅為丸一兩作十五丸每服一丸大棗二枚去核入藥在内濕紙褁􅀥煨令香熟去紙細嚼温生薑湯送下空心食前服半夏通氣散一名通氣湯治膈噎氣咽喉氣堵煩悶嘔噦痰涎不利欬嗽脇肋痞滿減食半夏洗切二兩桂剉一兩半橘皮剉八錢右㕮咀每服五錢水二盞生薑十片同煎取一盞去滓温服不拘時候日進三服治五噎心膈氣滯煩悶嘔逆不下食出肘後方用蘆根五兩剉以水三大盞煮取二盞去渣不拘時候服平氣丸出楊氏家藏方治胸膈噎悶不思飲食傷酒嘔逆氣脹腹痛巴豆去壳黒牽牛蘿蔔子三味各四兩五靈脂炒丁香皮丁香胡椒肉桂去麄皮青橘皮去白桂花陳橘皮去白縮砂仁已上九味各一兩右為末陳粟米一升炒巴豆黒色去巴豆将粟米與衆藥搗羅細末醋煮麺糊丸如菉豆大每服十五丸胸膈噎悶不思飲食煎葱白湯下中酒吐酒細嚼煨生薑湯下氣痛煎石菖蒲湯下氣脹面腫煎大腹皮湯下疝氣小腸氣煎茴香湯下婦人血氣腹内刺痛煎當歸湯下不拘時候縮砂丸出和濟方温中散滯消飲進食治胸膈噎悶心腹冷痛大能煖化生冷果食夏月不可闕此縮砂仁七兩髙良薑四兩天南星湯浸洗去皮焙乾秤四兩右為細末生薑自然汁麺糊為丸如梧桐子大每服五十丸至七十丸生薑湯下不拘時候青木香丸出徳生堂寛中利膈行滯氣消飲食治胸膈噎塞腰脇脹滿疼痛心下堅痞腸中水聲嘔噦痰涎不思飲食及小腸疝氣蓽澄茄破故紙十兩牽牛頭末三十兩一半炒木香五兩㯽榔十兩酸陳粟米飯褁㯽榔紙包灰火中煨紙焦去之右為末和匀水糊為丸如菉豆大每服五十丸茶湯水送下如小腸疝氣發作疼痛用蟠葱散煎送下五十丸通利一二行即愈或用生料五苓散加吳茱茰燈草三十莖煎水送下不拘時候㯽榔散出王氏愽濟方治胸膈注悶噫塞不快不思飲食大治脾胃一切病并脾腎膈氣病酒伏氣㯽榔木香人參甘草乾薑炮白术米泔水浸一宿焙乾桂皮去浮皮青橘皮去白荆三稜煨枳殻去穰神􅎘厚朴去皮用薑汁炙香焦以上各等分右為末入鹽㸃半錢治脾腎膈氣以一錢入鹽煎服治冷膈其状胸中噎塞飲食減少行歩無力大腑虛冷非時悶心前如有一條冷線上徹咽喉出楊子建萬全䕶命方丁香木香川芎官桂去皮獨活甘草各一分訶子麺褁火炮去核只使皮肉豆䓻草豆䓻各半兩細辛三銖乾薑二銖右細杵羅為末每服二錢水一盞煎取八分空心和滓去滓任意服治噎病膈塞不通因怒而得大便不通亦先用引大腹藥了令得通快然後吃此方出楊子建萬全䕶命方川芎半兩羗活牡丹皮去心木香各一分細辛半夏各二銖桔梗熟使防風各五銖右細杵羅為末每服二錢水一盞煎九分空心和滓喫人參湯出楊子建萬全䕶命方治喜怒膈氣心前噎塞空嘔桑寄生半兩川芎木香沉香甘草烏藥人參枳殻只使青各一分右為細末每服一錢九分水一盞煎取七分空心和滓喫之五膈附論夫人之胸膈升降出入無所滯礙名曰平人若寒温失節憂恚不時飲食乖宜思慮不已則隂陽拒隔胸脘否塞故名膈曰氣曰憂曰恚曰寒曰熱五種雖殊其為膈病則一通膈散出醫方集成治五種膈氣枳殻麸炒去穰陳􅎘炒五味子炒荆三稜炒剉桂去麄皮赤茯苓去黒皮草豆䓻去皮郁李仁湯浸去皮麸炒黄甘草炙剉白术陳皮湯浸去白焙人參訶棃勒皮乾薑炮㯽榔半生半熟厚朴去麄皮薑汁炙木香半夏湯洗了用生薑爛搗如泥却堆放新瓦上文武火煆令黄色各一兩右為散每服二錢入鹽少許如茶㸃服不拘時候一方薑棗煎服訶棃勒湯一名訶子散出聖惠方治五膈氣胸中煩滿痞塞不通心腹虛脹結實飲食不下訶棃勒煨去核木香各一兩人參青橘皮湯浸去白焙各半兩厚朴去麄皮生薑汁炙一兩沉香剉益智去皮桂去麄皮㯽榔剉枇杷葉炙去毛蓽澄笳白术各半兩赤茯苓去黒皮髙良薑白豆䓻前胡去蘆頭一兩甘草炙剉半兩右麄搗篩每服三錢水一鍾入生薑三片同煎七分去滓熱服十膈氣散出永類鈐方尃治十般膈氣冷隔風膈氣膈痰膈熱膈憂膈悲膈水膈食膈喜膈皆病源也病因憂驚冷熱不調又乖将攝更以喜怒無時貪嗜飲食因而不化滯積在胸上喘痰嗽嵗月漸深心胸噎塞漸致羸痩乆不除必成惡疾人參白茯苓官桂枳殻去穰麸炒甘草炙神麯炒麥蘖炒廣莪炮吴白术陳皮去穰訶棃勒皮煨去肉乾生薑炮京三稜煨以上各一兩厚朴薑製㯽榔煨丁香右為極細末每服一錢入鹽一匙白湯㸃服如覺脾胃不和腹脹心胸滿悶用水一盞生薑七片棗二枚鹽少許同煎八分和滓熱服空心食前郁李仁圓出聖惠方治五膈氣心胸氣壅宿食不消腹胃脹大腸秘澁郁李仁一兩湯浸去皮微炒漢椒半兩去目及閉口者微炒出汗人參半兩去蘆頭甘草一分炙微黄赤剉桂心半兩乾薑炮細辛半兩赤芍藥半兩陳