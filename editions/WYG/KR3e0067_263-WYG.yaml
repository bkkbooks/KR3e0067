body:
  text: 普濟方卷二百六十三明周王朱橚撰服餌門總論凡人春服小續命湯五劑及諸補散各一劑夏大熱則服腎瀝湯三劑秋服黄茋等丸一兩劑冬服藥酒兩三劑立春則止此法終身常爾則百病不生矣俗人見淺但知鉤吻之殺人不信黄精之益夀但識五榖之療饑不知藥之濟命但解施瀉以生育不能秘固以熈養故有服餌方焉郄培曰夫欲服食當尋性理所宜審冷暖之適不可見彼得力我便服之初御藥皆先草木次石是為將藥之大較也所謂精粗相代由粗以至精者也夫人從少至長體習五穀卒不可一朝頓遺之凡服藥物為益遲微則無充饑之騐然積年不已方能骨髄填實五穀居然而自斷今人多望朝夕之效求目下之應臟腑未充便以絶粒榖氣始除藥未有用又将御女形神與俗無别以此致弊胡不恠哉服餌大體皆有次第不知其術者非止交有所損卒亦不得其力故服餌大法必先去三蟲三蟲既去次服草藥好得藥力次服木藥好得藥力次服石藥依此次第乃得遂其藥性庻事安稳可以延齡矣嵇康之論養生曰世或謂神仙可以學得不死可以力致又曰上夀百二十古今所同過此以往莫非夭亡此皆兩失康之大意以謂神特夀異氣禀之自然非積學所能致至於導養得理以盡性命上獲千嵗下數百年有之耳夫以康論養生則善矣而獨以神仙為不可學何哉黄帝之論天真混元之言道皆以虗無為宗恬淡為本至於黄庭内景金碧参同其為養生引年之道皆一道也而獨以神仙為不可學則非也黄帝問道於成子廣成子曰無視無聽抱神以静形將自正必静必清無勞汝形無揺汝精乃可長生所謂道者如此而已若夫飛丹鍊石導引按蹻與夫服氣辟穀皆神仙之術所不廢者神仙服餌附論夫天分正氣布晦明風雨之宜人禀太和有寒暑寢興之患是則勞逸變作損益互生茍不狥於天真乃自傷於至性謂或棲神𤣥化體道丹邱餌其卉木之英慕彼煙霞之域足使貫金石之筭因能鍊氷雪之性容復命之根源益精氣之戸牖儻永専於服餌可自得於神仙今所纂集諸方邈考前經旁徴故典品藥必稽於和扁論醫如訪於喬松廻衰歴而去微疴未為竒効駐童顔而堅上夀粗有神功將後必祕藏庶存編次云爾神仙服餌草木必取其柯葉堅固形質不變若松柏茯苓之類其意盖以延年益夀為本至於其他非具五行之方則必備四氣之和其意深矣千金謂服餌大法必先去三蟲三蟲既去次服草藥草藥得力次服木藥木藥得力次服石藥精粗相代由粗以至精其序不可紊也方老君益夀散出聖惠方白术四兩防風一兩去蘆頭乾薑一兩五錢炮對細辛三分桔梗一兩去蘆頭肉蓯蓉酒浸去皴皮逺志去心澤瀉各一兩石斛去根剉桂心栢實雲母粉石韋去毛杜仲去粗皮剉牛膝去苖白茯苓菖蒲五味子蛇床子甘菊花山茱茰十三味各五錢附子一兩五錢炮去皮臍天門冬五兩去心焙天雄五錢炮裂去皮臍熟乾地黄二兩右搗細羅為散平且酒服三錢各月日三服夏平旦一服春秋平旦日暮各一服服藥後十日知效二十日所苦覺减三十日氣力盛四十日諸病除六十日身輕如飛七十日面光澤八十日神通九十日精神非常一百日已上不復老也若能斷房事長生矣代茶新飲出御藥院方黄茋通草各二斤茯苓桑根白皮乾薑乾葛各一斤䑕粘根二斤温加二斤枸把根洗生乾地黄忍冬十二月採枝莖并葉隂乾温加五兩薏苡仁各十一兩菝葜八兩麥門冬去心萎㽔各五兩右並揀擇取州土堅實上者刮削如法然後秤大斤兩各各别搗以馬尾羅子篩之不用細攪令匀調重篩務令相入不令偏併别取黄白皮楮白皮根相兼細切者取濃汁和搜令硬軟得所更於臼中搗别作一竹捲子圍闊二寸半二分以下臨時酌量大小厚薄作之此亦無定衆手依模捻作餅子中心穿孔日曝乾百餘餅為一串即以葛蔓為繩貫之竹篾亦可掛之通風隂處妙若湏煑用炭火上炙令香熟勿令焦臼中搗末任隨時取足煎以大茶大都濃薄量之著少鹽煑之頻搗之即滑美著鹽橘皮蓽撥亦佳除風破氣理丹石補腰脚聰耳明目堅肌長肉舒筋骨通腠理頭腦閉悶眼睛疼痛心虗脚弱不能行歩其效不可言若患脚氣肺氣疝氣咳𠻳入口即愈患消中消渴尤驗主療既多不復一一具說但服之立取其驗禪居髙士特宜多飲暢臟腑調適血脈服少益多心力無勞飢飽飲之甚良若臘月臘日合之十年不敗神仙變白延年十精散出聖惠方巴㦸天精雲母粉日精甘菊花月精熟乾地黄地精兎絲子人精杜仲山精五味子草精鍾乳粉水精石斛石精人参藥精以上各等分右搗細羅為散每服以酒調下三錢空心及食前服乆服髪白再黒齒落重生充益肌膚悅澤顔色腰脚輕健耳目聰明補腦添精延年却老其功不可具述西嶽真人靈飛散出聖惠方雲母粉一斤茯苓八兩鍾乳粉人参千金翼作白术栢子仁續斷桂心各七兩菊花十五兩乾地黄十二兩右為末生天門冬十九觔取汁溲藥内銅器中蒸一石二斗黍米下米熟曝乾為末先食飲方寸匕日一三日力倍五日血脉充盛七日身輕十日面色恱澤十五日行及奔馬三十日夜視有光七十日白髪盡落故齒皆去更取二十一七白蜜和搗二百杵丸如梧桐子大作八十一枚曝乾丸皆映徹如水精珠欲令髪齒時生者吞七枚日三服即出髪未白齒不落者但服散五百年乃如前法服已白者餌藥至七百年乃落入山日吞七丸絶穀不飢余得方已來將踰三紀頃者但羙而恱之疑而未敢措手積年詢訪屢有好名人曽餌得力遂服之一如方說但能業之不已功不徒棄耳常餌補方枸把子一斤天雄三兩蓯蓉石斛乾薑各八兩兎絲子逺志續斷各五兩乾地黄十兩右治下篩酒服方寸匕日二四扇散出聖惠方變白輕身却老還童除百疾駐顔益夀填精補腦松脂鍊成者澤瀉取岐尾好者白术時月日肥大者雲母粉製如常法乾薑炮白實者桂去麄皮菖蒲石上者生乾地黄焙乾右各等分搗四萬杵細羅為散先以蠟紙數重作嚢盛之更於新甆器中盛每日兩食前以清酒調下三方寸匕或以蜜丸如梧桐子大清酒服十五丸百日即效八仙公延年不老散出聖惠方熟乾地黄三十兩五味子四兩天門冬十二兩去心焙菖蒲六兩逺志四兩去心石葦四兩去毛白茯苓二兩桂心二兩右搗細羅為散每服三錢水調服之日三服三十日力倍於常六十日氣力盛衆病皆除三百日行及奔馬五百日毒害不能中千日夜視有光九年成地仙七精散出聖惠方除百病明耳目延年却老茯苓天之精三兩地黄花土之精桑寄生木之精各二兩菊花月之精一兩一分竹實日之精地膚子星之精車前子雷之精各一兩三分右上應日月星辰欲合藥者以四時旺相先齋戒九日别於静室内焚香修合搗羅為細散每服三方寸匕以井華水調下面向陽服之須陽日一服隂日二服四十九日即驗地黄花四月採竹實似小麥生藍田竹林中元本四十九日即驗可成仙矣凡用茯苓當如鷄雉兎形者或如龜鼈形狀者佳桑上寄生湏桑上者餘藥並湏州土精好者為妙地髓散出聖濟總錄長年保命生乾地黄四兩莎草根茜根地骨皮菴䕡子茅根一兩右擇日修合春用甲子夏用丙子秋用庚子冬用壬子搗羅為細散每日早晨温酒調下一錢七午後再服五十日後諸疾不生身體輕强乆服神效靈仙散出聖濟總録輕身延年却老白茯苓去黒皮天門冬去心焙白术巨勝子去皮膜一兩桃仁去皮尖炒乾黄精各一兩右搗羅為細散每於食前水飲下三方寸匕日二服或以蜜丸如赤小豆大每服三十丸温水下王母囬童散是茅君小弟保命君所服方胡麻黒肥者去皮熬令黄香天門冬髙地肥甘者乾之茯苓白實者亦當先煑爆乾熟黄精髙地宿根者乾之桃仁當用好者仍須大熟桃解核取仁熟湯浸去皮尖术時月採肥大者右精治各二斤先熬胡麻後入諸藥搗三萬杵細羅為散每日平旦以酒服三錢暮再服漸加之亦可水服如丸即錬蜜和更搗萬杵丸如梧桐子大自二十丸加至四十丸神仙令誦書氣力不衰方松脂四兩桑柴灰二十遍止白蠟一斤羊脂二斤白蜜二斤􅄳糖四兩右都入銅器中以慢火煎可一炊時為度盛於不津器中每服以温酒調可一鷄子大日三服神妙神仙服食方白茯苓一兩陳葵子三分桂心五錢天門冬一兩去心焙川椒五錢去目及閉口者微炒出汗右搗細羅為散以新汲水調三指撮服之日再服至百日耐老延夀真人服食方雲母粉五十斤松脂十二斤白茯苓十斤附子去皮臍生用蠟蜜十斤右搗羅上四味為末與蜜相和更搗三千杵以三年米醋拌令匀用不麄磁器内之埋於地中滿千日方成藥或出之其上時時有光每服以温水化雞子大服之日三服至一斤身中三蟲伏尸萬邪惡病及諸瘡癩皆除服之二斤饑渴寒熱一切盡除服之三斤筋骨强服之四斤氣力盛服之五斤顔色如玉服之六斤身如飛服之七斤延年不老可致神仙神應丸乆乆通靈預知吉凶預知子去皮茯神去木各半斤逺志去心桂去粗皮各一分右搗羅為末酒糊丸如梧桐子大每月初二日初六日乳香湯下七丸益夀地仙丸出御藥院方補五臟填骨髓續絶傷黒髭髪和氣血駐顔輕身健體延年益夀補益丹田清頭目聰耳甘菊三兩枸杞二兩巴㦸天去心二兩肉蓯蓉酒浸二宿洗净切片焙乾四兩右搗羅為末鍊蜜和丸如梧桐子大每日空心塩湯或酒下三十丸乆服清頭目補益丹田駐顔潤髪春秋枸把菊花加一倍冬夏蓯蓉巴㦸加一倍服餌勿令斷絶神仙四鎮治病得仙方出聖惠方太一禹餘糧末白茯苓末丹砂細研水飛過麥門冬去心末各五兩右各别搗羅訖先内禹餘粮搗五百杵次入麥門冬搗五百杵次内丹砂搗五百杵次内茯苓搗五百杵訖用白蜜一升半煎蠟一兩半以和藥令相得更搗五百杵丸如梧桐子大空心以温水服二十丸若欲服藥先一日不食齋戒清净然後服之神仙駐顔延年方枳實熟乾地黄甘菊花天門冬去心焙已上各三斤右搗細羅為散每服三錢空心以温酒下日再服之衆病皆除身輕目明百日顔色恱澤如十五時人可致神仙與天地相畢神仙長生不死四靈丹方出聖惠方一曰鴻光雲母粉是二曰千秋卷栢是三曰萬嵗澤瀉是四曰慈墨實兎絲子是右搗羅為細末以白松脂和汁千杵丸如梧桐子大每服時空心温酒下三十丸服經七年夀可千嵗不死旦暮長服之可與天地相守真人服食方出聖惠方熟乾地黄十斤細切以酒二升浸三日取出曝乾巴㦸一斤厚朴一斤去麄皮微炙乾漆一斤搗碎炒令微煙出覆盆子一斤右搗羅為細末每服以酒調下二錢日三服加至三錢延年神仙卧益力方出聖惠方术麻黄去根節甘草各二兩右搗細羅為散每於食後向東水服二錢日中向南水服暮向西水服之氣力百倍神驗神仙徹視鬼方出聖惠方白英石細研水飛過鬼督郵菊花各一兩右搗羅為末酒服一錢日一服五日視則徹矣芡實散出聖濟總録河土公益夀延年乾雞頭實去皮忍冬莖葉揀無蟲汚新肥者乾藕各一斤右放甑内炊熟曝乾搗羅細散每日食後新汲水調下一錢蒼术木瓜丸出聖濟總録却老駐顔治腰脚蒼术一斤米泔浸五宿切焙乾為末木瓜一枚瓷碟盛飯甑内蒸爛去皮核右取木瓜研如糊拌蒼术末丸如梧桐子大焙乾用黄蠟不拘多少放銚内鎔將藥放蠟内拌匀取出篩子内紙襯衮過每日空心塩酒任下三十丸老子乳丹入口不死方出聖惠方蜜三升新生右合煎一兩沸以不津器盛之每日空心服一中盞此名太乙神丹硇砂丸方出本草方用硇砂不計多少用罐子内著上面更坐罐子一箇用紙筋白土和上再俱泥了窨乾後從辰初便用蒼耳自在落下葉將來搗羅為末藥上鋪頭盖底上面罐子内用水坐著水旋添火燒從罐子外五寸以来圍逵欲盡更添大移向前罐子周廽火盡更旋燒促向前計一炊時為度更不移火即閑雜人及婦人不得見一炊時住取来搗羅為末醋麺糊為丸如梧桐子大每服逐日十丸至十五丸温酒或米湯下並無忌若燒喫二三斤進食無病麻油薤白方用麻油一斤薤白三觔切内油中微火煎之令薤黒去渣合酒服之半升三合百胍血氣充盛服金石人先宜服此方又方用皂莢并澤瀉水煑乾為末鍊蜜為九如梧桐子大常服每空心以温酒下十五丸至二十丸甚妙輕身散出聖濟総録蕩穀氣延夀命用黄茋一斤剉生薑汁煑三十沸焙乾為散入茯苓甘草人参山芋雲母粉各一錢拌匀每服一錢七入鹽少許湯㸃服不拘時候囬素散出聖濟總録返神歸元助氣於坎室用澤瀉四兩細剉搗羅為散入丹砂雲母粉各一分和之每日服一錢匕米飲調下野雲漿出聖濟總録壮氣海潤五臟益精光和心神用糯米三升以井水三斗煑熟取飲入蜜半升攪匀入母粉二兩丹砂一錢白茯苓人参末各一兩同煎至七升每服半盞温冷任意茯苓散出聖濟總録還精補腦長生駐顔神仙却老延年赤茯苓先用水煑三四十沸曝乾四兩菊花二兩鍾乳取如鵞管蟬翼光明者先入銀器中放在五六斗釡中乃添水於釡内九分釡底然火令如魚目沸三復時毎一復時换水净洗刷復添水慢火煎令魚目沸日足取出乳鉢内研極細入水少許更研如稀糊乃取澄曝乾更研如粉一兩雲母取黄白光者旋於大方磚上以炭火七斤煆通赤從旦至暮取出去灰搗羅為末入絹袋於大盆中擺之按擦令水内澄取曝乾更研如粉一兩菖蒲九節者米泔浸三復時逐日换泔日足切曝乾栝樓根赤石脂研如粉水飛遇曝乾更研山茱茰微炒防風去牛膝菟絲子酒浸三日控乾搗末熟乾地黄焙續斷杜仲去麄皮炙山芋蛇床子微炒天雄炮裂去皮臍栢子仁桂去麄皮牡丹皮肉蓯蓉酒浸去皴皮切焙人参天門冬去心焙石斛去根節白术石長生去根節微炙牡䝉附子炮裂去皮臍苦参𤣥参水洗麸炒焦獨活去蘆頭牡荆子狗脊去毛紫苑水洗去土暴乾乾姜炮裂黄茋炙剉澤瀉甘草水蘸炙芍藥巴㦸天去心净沙参逺志石南葉暖水洗控乾炙牡蠣搗末水和作團轉飛取曝乾各半兩右搗研羅為散每服一錢匕温酒調下日三服空心日午近晩各一二十日見効四五十日諸疾並瘥一年可還童又方出聖濟總録白茯苓去黒皮鍾乳錬成者雲母鍊成者澤瀉菊花杜仲去麄皮炙栢子仁石斛去根節熟乾地黄焙山芋天門冬去心焙石南葉暖水洗慢火炙肉蓯蓉酒浸去皴皮切焙各一兩續㫁一兩天雄炮裂去皮臍菖蒲九節者米泔浸再宿日换泔净洗切焙乾莵絲子酒浸三日控乾搗末牛膝山茱茰五味子蛇床子簸去粃各一兩五錢右搗研羅為散每服一錢匕酒調下早辰日午近夜服或鍊蜜和丸如梧桐子大每服三十丸温酒下日再服二十日見效四十日萬病悉除忌犬牛肉生葱蒜菜菔羊血醋等又方白茯苓去黒皮剉碎水浸四十九日七日一易水日足蒸一復時却入水中安羅子内以手緩緩抽去筋脉令净澄取曝乾栢葉依四時五方採嫩枚上者蒸令黄色勿採道傍塜墓上者車前子粳米炒大麻子出浸一宿曝乾炒開一兩聲即出之以净磗兩口磨取之大豆黄炒令焦蔓菁子水煑一復時曝乾地骨皮去粗皮各一升人参地膚皮蒸半炊乆曝乾各二升黍米炒麥門冬去心焙茯神去木各半升右搗羅一十二味為末唯麥門冬麻子仁熟搗極細即和諸藥令匀鍊蜜六十兩綿濾净器中令温和搜諸藥更搗萬杵丸如小酸􅀥大盛净器中其藥永不壞若明朝欲服隔夜湏先服黍米粥一杯次日平旦服五十丸温清酒或粥飲下日再服即不飢若三日内腹中不安稳更服之出三日即四肢輕便耳目聰明若勞損者服之氣力强健一年力倍乆服治大風諸氣補精髓安魂魄調榮衛去尸蟲通神明耐老寒暑合時五月五日七月七日冬臘日尤佳其藥並湏大升大斤不得欠少若湏食即以葵子湯下服之斷穀方中此為最妙大茯苓丸輕身不老聰耳明目强力白茯苓去黒皮茯神抱木者去木大􅀥桂去粗皮各一斤人参白术逺志去心炒黄細辛去苖葉石菖蒲九節者米泔浸三日日换泔切曝乾各十二兩甘草八兩水蘸劈破炙乾姜十兩炮製右搗羅為末鍊蜜黄色掠去沫停冷拌和為丸如彈子大每服一丸乆服不飢不渴若曽食生菜果子食冷水不消者服之立愈五臟積聚氣逆心腹切痛結氣腹脹吐逆不下食生姜湯下嬴痩飲食無味酒下欲求神仙未得諸大丹者皆湏服之若不絶房室不能斷榖者但服之去萬病令人長生不老合時湏辰日辰時於房中潔净不得令雞犬婦人孝子見之又方白茯苓錬成粉雲母錬成粉天門冬粉各三斤羊脂白沙蜜白蠟各五斤麻子油三斤松脂錬成者十斤右入銀器中微火煎令匀紫色乃止欲絶榖者先作五肉稻粮食五日乃少食三日後方服此藥小彈子大日三丸三日九丸即不飢飢則更服兼食􅀥脯飲水無苦多若要下去藥取硝石葵子各五兩搗羅為散每服二錢匕水一盞同煎八分去滓日三服藥下食米粥一合日三日漸食淡食又方白茯苓錬成粉栢葉蒸熟曝乾為末車前子地骨皮大豆炒取黄蔓菁子煑令苦味盡曝乾各五兩右搗羅為末鍊蜜和搗三千杵為丸如梧桐子大欲服時隔夜食黍米粥令飽次日服藥二百丸酒或井水下日内不思食亦不困人三日外即不饑饑即更服三五十丸補之覺少疲乏每三五日以少粳米粉作團子食一盞許不湏塩醋若虗困每日服蔓菁子末兩匙以白蜜鍊和之忌房室又方白茯苓去黒皮一斤半澤瀉五兩生乾地黄焙四兩天門冬一斤去心焙胡麻炒作聲一斗右羅為末和令匀蜜拌旋丸每服如雞子大日五六服漿水或酒下乆之氣力自倍一方無澤瀉而地黄與諸藥等分以蜜和丸酒服如上法又方白茯苓去黒皮天門冬去心焙各一兩棗肉三十枚麻子仁五升右合於三石米下蒸一炊乆合搗蜜丸如雞子黄大早辰近晚服一丸渴即飲水又方神仙斷榖秘妙法白茯苓五斤剉碎甑中蒸一炊曝乾為末白蜜三斤栢脂七斤静處作灶泥大釡於上加甑取白茅剉令齊整先入甑内襯次安栢脂在上釡内用石灰水蒸之令消入釡中去甑按取釡内脂入冷水中以扇扇之兩人對引之三十過復蒸如前三遍逐遍换釡中石灰水取栢脂再入甑釡中用醋漿水深添又如上法蒸之三遍逐遍换醋漿水滿三遍又以好酒入釡中添深如上法三遍蒸鍊了右鍊白蜜和丸如梧桐子大每服十丸酒下冬月温酒下飢者頻服之不飢為度如飲酒不得只以温水下欲仙者常取杏仁五枚去皮尖細研以水一小盞同煎三五沸成湯去滓以下丸藥若却欲去藥食榖者取消石葵子各一兩熟研為散以粥飲調服一錢匕日再服其藥即出稍稍食榖及葵􅃵甚良又方白茯苓去黑皮二十兩澤瀉八兩胡麻一斗二升炒右各搗羅為末合搗三萬杵每服三錢匕空腹日午近夜酒水下又方白茯苓去黒皮大麻子炒各半升右先取大麻子以水五升研絞濾取汁煑茯苓一炊久令熱取出曝乾搗羅為末每服三錢匕以温酒調下空心近晚一日兩服如無酒以新汲水調下忌醋又方白茯苓去黒皮五斤剉甘草微炙剉五兩右以水六斗先入甘草煎取三斗漉去滓澄清内白蜜三斤牛乳九升相和煎茯苓令乳蜜汁入茯苓盡及熱暖令散擇去赤膜又更蒸熱暖令入麺隂乾每服二錢匕温酒下日三四服稍加之又方白茯苓去黒皮龍鬚隴西者各二斤細剉右搗羅為散每服方寸匕酒飲調下日三服又方用白茯苓去黒皮剉一斤以糯米酒浸五宿取出曝乾搗羅為末收入瓷器中每食時入一二錢末拌食食之乆服精力百倍延年不老水調亦可神仙保精延年駐顔餌茯苓方白茯苓三十六斤松脂二十四斤錬遇者鍾乳粉一斤右搗羅為末以白蜜五斗和攪令相得内瓷器中盛固口隂乾百日出更研之每日空心及晚食前酒調下二錢服一劑大佳不同餘藥忌食米醋神仙餌茯苓延年不老方白茯苓三斤去皮細剉晒乾白菊花一斤右搗羅為末以鍊成松脂和丸如彈子大每服一丸以酒化破服日再服百日顔變異肌膚光澤延年不老忌食米醋神仙餌茯苓乆服令人長生方白茯苓二斤桂心一斤右搗羅為末鍊蜜和丸如胡桃大每服一丸以温酒化破服日三服忌食米醋茯苓酥方茯苓五斤灰汁煑十遍漿水煑十遍清水煑十遍白蜜三斤蒸令沫盡松脂五斤煮如茯苓法每次煮各十遍生天門冬五斤去心皮晒乾作末牛酥三斤錬三十遍蠟三斤右各搗篩以銅器重湯上先入酥次蠟次蜜消乾内藥急攪勿住手務大均内瓷器中宻封勿令洩氣先一日不食欲不食先湏喫好美食令極飽然後絶食即服二兩二十日後服四兩又二十日後服八兩細丸之以嚥下為度苐二度以四兩為初二十日後八兩乂二十日二兩苐三度以八兩為初二十日二兩又二十日四兩合一百八十日藥成自後服三丸將補不服亦得但常以酥蜜消息之美酒服一升為佳合藥湏取四時旺相日特忌刑殺厭及四激休廢等日大凶此彭祖法茯苓酥除萬病乆服神仙方用白茯苓三十觔取山之陽者甘美山之隂者味苦去皮薄切晒乾蒸之以湯淋去苦味若淋不止其汁當甜則曝乾搗羅為末用酒三石蜜三升和酒相得内茯苓末於甕中攪之百匝封之勿洩氣冬五十日夏二十五日酥浮酒上掠取其味甘美作餅子如手掌大於空室中隂乾色赤如􅀥飢則食之一枚終日不飢此名神仙度世之藥每食時用酒下之此為茯苓酥也忌食米醋神仙服茯苓方用白茯苓十斤去皮酒浸宻封十五日漉出晒乾細剉搗羅為末每服三錢以水調下凡餌茯苓皆湯煑四五十沸或以水浸六七日真人餌茯苓法用白茯苓三觔細剉以絹袋盛之懸於瓮中用小麥細麫七觔糯米五斗炊為爛飯和麺末經宿入蜜一升和令匀入甕中又經一宿别炊糯米二斗投之不得令熱即宻封其甕口春秋三七日冬五七日夏一七日當出其藥袋可隔宿不食清旦取茯苓半斤服之其酒即旋取飲之勿令勝藥若服此藥多時者永不飢渴無寒無熱身如碧玉令人身輕走及奔馬與天地相畢矣其藥袋懸於空中勿令著甕底繩繋袋頭取木横枙之仍以紙宻封旋取服之勿令洩氣忌食米醋神仙餌茯苓方出聖惠方用白茯苓十斤削去黒皮晒乾搗羅為末以好酒於瓮中浸之看酒淹得所以瓦盆合之以泥封定勿洩其氣候六十日開如錫相似每服以温酒調下如彈子大日二服如乆服延年不老神仙矣忌食米醋採茯苓方出聖濟總録松脂流入地變為茯苓遥望數里其松赤色視其皮如布棋子斷者有茯苓也仰視松枝所指其上時有莵絲或新雨過後無風雲夜以燭火臨上㓕者亦有乃以新布四丈環之明日握取神物多變化其形如飛鳥走獸龜鱉者佳便令暴乾剉之状如白牙若只一塊不似鳥獸物形者乃松脂始變不堪服鍊茯苓方出聖濟總録取茯苓上黨者去黒皮剉作塊如雞子大任多少置瓮中近底鑚作竅以木塞之即下水令沒得藥每兩日一换水七日後數以筯導却水即取茯苓蒸候熟及熟出之置盤中揉搨拾去脉膜空控乾乃入盆中以木椎研極細更下熱水攪和先縫生絹為袋以藥汁傾袋中以盆盛汁瀝盡餘滓更研復取前汁攪渾傾袋中如前法候滓盡澄之更傾去清汁取稠汁内帛袋中重瀝之候水盡取茯苓曝乾是為茯苓粉可入諸藥若不如此即脉膜損人令人大折或作瘦病神仙服地黄延年不老方出聖惠方用地黄净洗随多少搗絞取汁煎令小稠内蜜更煎令可丸即丸如梧桐子大每日食前以温酒下三十丸日三服如此十年白髪再黒力如二十時令人多子神效無比服地黄延年法出聖惠方用生地黄不限多少肥者隂乾搗羅為末鍊蜜和丸如梧桐子大每日食前以温酒下三十丸日三服百日顔如桃花服三年令人長生不死神仙服地黄實延年益夀方出聖惠方用地黄實不限多少常以四月採取隂乾搗羅為末每服一錢以水調下日三服令人長夀神仙餌地黄治病長生方出聖惠方用生地黄十斤擘碎於一大銅器中安炊箄箄上安地黄入甑蒸之汁當下流於銅器中候消地黄汁盡即止將銅器内汁置重湯中煎之可丸即丸如彈子大每服一丸以温酒化破服之日三服服之百日與天地相保白子髙從太上傳受此方服地黄成神仙方出千金方用生地黄五十觔熟搗絞取汁澄去滓微火上煎减過半内白蜜五升􅀥脂一升攪令相得可丸即丸如雞子大每服一枚日三服令人肥白又方用地黄十觔細切以醇酒二斗漬三宿出晒乾反復内漬取酒盡止與甘草巴㦸天厚朴乾漆覆盆子各一斤搗下篩食後酒服方寸匕日三加至二匕使人老者還少强力無病延年一方於銀鍋内以慢火煎之忌陳臰物作熟乾地黄法出千金方採地黄去其鬚葉及細根搗絞取汁以漬肥者著甑中上用米煮飯以盖上蒸之一時出晒燥更内汁中又蒸汁盡止便乾之亦可直均蒸之半日數以酒灑之使周匝直夕出曝乾可搗蜜丸服之種地黄法出千金方先擇好地黄赤色虗軟者深耕之臘月逆耕種地彌好擇肥大地黄根切長四五分至一二寸許一斛可種一畆二三月宜種之作畦畔相去一尺生後隨鋤壅數芸之至九月十月視其葉小衰乃掘取一畆得二十許斛擇取大根水净洗其細根乃剪頭尾輩亦洗取之日曝令極燥小縐乃以竹刀切長寸餘許白茅露甑下蒸之蜜盖上亦可嚢盛土填之從旦至暮當黒不盡黒者明日又擇取蒸之先時已搗其細碎者取汁銅器煎之如薄飴遂以地黄内汁中周匝出曝乾入内汁盡止率百斤生者令得一二十斤取初八月九月中掘者其根勿令大老强蒸則不消盡有筋脉初以地黄内甑中時先用銅器承其下以好酒淋地黄上令匝汁後下入器中取一併和煎汁佳黄精膏方神仙延年補益療萬病出聖惠方用黄精一石去鬚毛洗令净潔打碎蒸令好熟壓得汁復煎去上遊水得一斗内干薑末三兩桂心末一兩微火煎看色欝然欲黄便去火待冷不津器中酒五合和服二合常末食前日二服舊皮脫顔色變光花色有異鬢髪更改欲長服者不湏和酒内生大豆黄絶榖食之不飢渴長生不老二精丸出聖濟總録助氣固精保鎮丹田黄精去皮枸把子各二斤右各八九月間採取先用清水洗黄精令净控乾細剉與枸杞子相和杵碎拌匀隂乾再搗羅為細末煉蜜為丸如梧桐子大每服三五十丸空心食前温酒下常服助氣固精補鎮丹田活血駐顔長生不老黄精丸出聖惠方延年補益療萬病黄精十斤净洗蒸令爛熟天門冬三斤去心蒸令爛熟白蜜三斤右拌和令匀於石臼中搗一萬杵再分為四劑每一劑再搗一萬杵過爛取出丸如梧桐子大每服三十丸温酒下日三服不拘時乆服神仙矣服黄精成地仙方出聖惠方黄精是芝草精也一名萎蕤一名仙人餘粮一名苟格一名勉行一名免子一名重樓一名垂珠一名馬箭一名白及一名黄精其葉如竹其莖如桃其花白四月莖長五六尺本黄末赤其花如小豆其實如黍其根似薑昔隨羊公神仙常服此藥言與天地相畢恒以二月三月採根入地八九寸為上取一石五斗净洗細切以水二䂖五斗煑令苦味盡漉出以布袋􅤾壓取汁澄清再煎如膏即止然後炒黒豆黄搗羅為末相和得所揑為餅子如錢許大每服二枚日漸加之百日知騐也一年内即變老為少氣力倍増亦焙乾篩末水服功與上等又方出聖惠方取黄精根莖不限多少細剉隂乾搗羅為末每用净水調服任意多少效亦如前又方出聖惠方常以二月三月八月採取黄精去鬚净洗切取一石以水二石煑之從朝至暮如水盡可取熱水添之看苦味盡其藥羙即出令冷手援使破以酒袋盛壓取汁於鍋中微火煎如􅄳取滓曝乾搗羅為末入於煎中相和攪令匀更用火微煎之看可為餅子即止每服如雞子許大效亦如神若不欲斷榖即一服减為三服皆食前服之長生矣又方出聖惠方黄精汁三斗地黄汁三斗天門冬三斗右相和以慢火煎之减半入白蜜五斤白茯苓末二斤相和更煎可丸即止丸如彈子大每服一丸以温酒化破服之日三服百日内令人顔如桃花二百日内老者貌如十五六時更不老矣乃為神仙真人餌黄精方出聖惠方用黄精細切一石水一石五斗漬之一宿以慢火煑半日勿令沸絞取汁五斗復於銅器中煎之可餘三斗許内蜜五升松脂錬成者三斤熟攪可丸乃止丸如彈子大每服以温酒化破一丸服之日三服三十日不復飢長生不死神仙餌黄精丸出聖惠方黄精十斤净洗蒸令爛熟白蜜三斤右相和搗一萬杵丸如梧桐子大每服以温酒下三十丸日三服乆服神仙矣神仙餌黄精延年法出聖惠方用黄精生者搗取汁三斗於銀鍋中煎之令可丸即丸如雞子黄大每日食前食一枚三十日不知飢服之百日行及奔馬延年駐景顔色不衰餌雲母水方神仙治萬病出聖惠方用白雲母二十斤薄擘以露水八斗作湯分半浄洗雲母如此再過又取二斗作湯内芒硝十斤以雲母木器中漬之二十日出絹袋盛懸屋上勿使見風日令燥以水漬鹿皮為嚢揉挺之從旦至日中乃以細絹下篩滓復揉挺令得好粉五斗餘者棄之取粉一斗内崖蜜二觔攪令如粥内生竹筩中薄削之漆固口埋北垣南崖下入地六尺覆土春夏四十日秋冬三十日出之當如澤為成若洞洞不削者更埋三十日出之先取水一合内藥一合攪合盡服之日三服水寒温盡自在腹中十日小便當變黄先療勞氣風疹二十日腹中寒癖消三十日齲齒除更新生四十日不畏風寒五十日諸病皆愈顔色日少長生神仙吾自驗之所以述録錬雲母粉服餌法出聖惠方雲母取上好白澤者細擘以水净淘漉出蒸之一日夕下之服更净淘如前去水令乾凡雲母二斤用塩三斤硝石一斤和雲母搗之一日至暮取少許掌上冺著不見星光為熟出安盆瓮中以水漬之令相得經一炊乆澄上清水徐徐去之盡更添水如前凡三十遍易水令淡如水味淡即漉出其法一如研粉澄取淀然取雲母淀徐徐生絹袋中濾著单上晒乾即成粉矣每日空心以酒調下一錢或水下亦得乆服輕身延年强筋填髓可以負重登山不乏恱澤不老耐寒暑志髙神仙此非古法近東海買塩女子年三百嵗貌同笄女常自負塩重五百餘斤如此得效之者其效不一可騐神功矣中山衛叔卿服雲母法出聖恵方取雲母一斤至三斤五色具者細擘之以采茅屋溜水若秋日草上露水以漬之百日内以􅓗嚢中援之以絹細羅入乳鉢中研如麫著竹筒中塞口懸甑上以白砂一石盖上蒸之一日一夜氣逹上出之又内黍稻米一石蒸之一日取出於銅器中用白蜜和調重湯上煎熬令可丸即丸如梧桐子大每服二丸空心食前以水酒下並得日三服十五日加至三丸常以雞鳴時及午時星辰出時服之三十日身輕目明五十日筋骨强盛七十日三蟲伏尸皆去八十日皮膚光澤九十日入水火不燒濡百日易筋骨三百日行及奔馬一年為真人又云年七十以上四百日以後乃得仙矣又方出聖惠方取雲母粉一斤硝石白一斤同搗細絹羅更研如麺白蜜三斤合調内生竹筒中漆固口埋北垣下三十日出之當化成水銅器中盛每日空心以水若酒調下一栗殻漸漸加之日三服二十日身光三十日露不著身五十日火不能害百日之後便成仙矣神仙餌雲母法出聖惠方雲母粉一斤桂心一斤搗羅為末葱葉搗絞取汁三升右合和為一處内生竹筒中於一石米下蒸之令米熟即化成水每於食前服一栗殻二十日氣力强盛服之四十日顔如童子服之百日嚴冬入水不寒一方入袋中銀砂石器中水煑石軟以冷水浸而和袋揉洗下者為粉又法出聖惠方取羙玉一斤搗細羅研之内雲母水中十日當消日可服之凡諸石屑内雲母水中皆消不但是玉也神仙服胡麻法延年駐夀出聖惠方用胡麻三斗净淘上甑蒸氣遍出日乾以水淘去沫却蒸如此九度以湯脫去皮簸令净炒令香杵為末蜜丸如彈子大每服温酒下一丸忌毒魚生菜能除一切痼病至一年面光澤不飢三年水火不能害行及奔馬乆服長生上黨者尤佳酒調散亦可神仙餌胡麻法出聖惠方用胡麻一石淘去上黒皮令白蒸之一日曝乾搗碎釡中用水一石五斗又蒸之令釡中有一石許水便傾胡麻置一瓮中盡釡中湯潑之以麥蘖一斗搗内瓮中醸之如作糖法兩復時盡去却糟煎之三分餘一分更盛置銅器中坐一釡湯中猛火煑之令稠瓷瓮内貯之每服如雞子大三丸服百日充益肌肉鬢髪還黒耳目聰明能長服之夀命無窮神仙餌胡麻膏益夀延年老人復少方出聖惠方胡麻膏一斗韮頭一斤右相和慢火煎令韮焦黄去韭每日温酒下二合服之至百日去䵟􅍍肌膚充益二百日老者復少三百日延年益夀乆服不已長生樂子長餌胡麻膏出聖惠方胡麻膏一斗薫陸香二斤以水五升洗取屑入膏中同煎右相和以慢火煎令水盡濾去滓盛於不津器中每日以温酒調服二合百日玉女待之神效五百日神仙迎人去道之近矣神仙服胡麻法用胡麻三斗肥者揀擇使净於微火上熬令香熱攤之搗令細和白蜜三升攪令相得安金銀或銅器中又安置釡口上著水重煎以栁木箆攪勿令著底視藥稠硬乃出之用栢木杵臼搗三萬杵丸如梧桐子大每服三十丸以酒若水下食前服服盡一劑腸化為筋不畏寒熱面如童顔頭白更黒齒落重生耳目聰明後天不老如食酒肉五辛取藥一丸丸如胡桃大咀嚼以口中津液下之服盡一劑更不衰老駐流年補骨髄强志記充肌膚美顔色百無所忌此藥當以臘月頓合當合之時不用見䘮孝産穢雞犬等清净室内和合若有犯穢服無所效大有功力不能盡述服者當自知爾神仙服胡麻粉法用胡麻一斗净簸揀蒸一炊乆出晒乾又蒸凡九蒸九晒了微搗去皮炒令香更簸取四升用地黄汁溲為劑却㬠乾細羅為散每服以温酒調下三錢日三服十日外即覺有功若七十老人服百日外肌肉還如少時亦能絶榖數試有驗胡麻散益夀延年去客熱胡麻子白茯苓去黑皮生乾地黄焙天門冬去心焙各八兩右搗羅為細散每服方寸匕食後温水調下胡麻丸延年返老補填骨髄保固丹田用胡麻半斤㨂去土研碎以米醋三升瓷器煑盡醋後入茯苓人参雲母粉各一兩同丸如梧桐子大每服二十丸甘泉水下不拘時神仙服天門冬法如居山逺行辟粒不飢服至十日身輕目眀二十日百病愈顔色如花三十日髪白更黑齒落更生四十日行及奔馬百日服之延年矣天門冬二斤熟乾地黄一斤右搗羅為末鍊蜜和丸如彈子大每服三丸以温酒化破服之日三服忌食鯉魚服天門冬方强筋髓駐容顔法用天門冬晒乾搗下篩食後方寸匕日三服可至十服小兒服尤良與粉以崖蜜丸服之益善惟多彌佳又搗取汁微火煎取五斗下白蜜一斗胡麻炒末二升合煎攪勿息手可丸即止火大豆黄末和為餅徑三寸厚半寸一服一枚日三服百日已上得益此方最上妙包衆方一法醸酒服傷始多無若多即吐去病也蒯道人年近二百而少常告皇甫隆云但取天門冬去心皮切乾之酒服方寸匕日三服令人不老補中益氣愈百病也天門冬生奉髙山谷在東嶽名滛羊食在中嶽名天門冬在西嶽名管松在南嶽名百倍在北嶽名無不愈在原陸山阜名顛棘雖然處處有之異名其實一也在背隂地者佳取細切烈日乾之乆服令人長生氣力百倍治虚勞絶傷年老衰損羸痩偏枯不隨風温不仁冷痺心腹積聚惡瘡疽癰腫癩疾重者周身膿壊鼻柱敗爛服之皮脫蟲出顔色肥白此無所不治亦治隂痿耳聾目暗乆服白髪黒齒落生延年益夀入水不濡服二百日後帖泰疾損拘急者緩劣者强三百日身輕三年走及奔馬又三年心腹皆去痼疾矣忌食鯉魚湏常以七月八月九月採其根亦云正月採之過此味也神仙餌术方蒼术三斤石菖蒲三斤右為細散每日空心以水調下三錢日晚再服治百病乆服令人長夀忌桃李雀肉神仙餌术法用蒼术一石揀擇令净搥碎在從平旦裝入甑中蒸至午時即止以釡中湯淋三七遍取汁却入釡中微火煎令可丸即丸如彈子大每服一丸以温酒化破服之日二服治百病輕身益氣去風寒不飢渇延年忌桃李雀肉㳙子餌法蒸如醇麥盛於不津器中酒調服大匙仙术丸輕身延年用蒼术肥者米泔浸不計多少夏秋浸三日春冬浸七日竹刀刮去皮洗净甑上蒸半日作片子焙乾石臼内木杵為末煉蜜為丸如梧桐子大每日早辰日午酒下五十丸服至十年後用南燭蒸黒米飯食之能引腹中成木人即神靈矣時燒退髪一兩莖若無髪氣即木人形具矣服枸把養神延年不老地仙方出聖惠方用枸把不限多少常以十一月十二月正月採根二月三月採莖四月採葉五月採花七月八月九月十月採子以上採者並隂乾搗羅為散每服二錢以温酒調下日三服能治一切風乆服諸疾不生為地仙矣神仙服枸把法出淮南枕中記方出聖惠方有一人徃西河為使路逢一女子年可十五六打一老人年可八九十其使者深恠之問其女子曰此老人是何人女子曰我曽孫打之何恠此有良藥不肯服食致使年老不能行歩所以决罰使人遂問女子年幾許女曰年三百七十三嵗使者又問藥服有幾種可得聞乎女云藥唯一種然有五名使者曰五名何也女子曰春名天精夏名枸杞秋名地骨冬名仙人杖一名西王母杖以四時採服之令與天地同夀使者曰所採如何女子曰正月上寅日採根二月上卯日治服之三月上辰日採莖四月上巳日治服之五月上午日採葉六月上未日治服之七月上申日採花八月上酉日治服之九月上戌日採子十月上亥日治服之十一月上子日採根十二月上丑日治服之但依此法治服之二百日内身輕光澤皮膚如酥三百日徐行及馬老者復少乆服延年可為真人矣又有并花實根莖葉作煎及單芋子汁煎膏服之其功並等服枸把根方出危氐方用枸把根切一石水一石二斗煑取六斗澄清煎取三升以小麥一斗乾净澤内汁中漬一宿曝二徃反汁盡曝乾搗末酒服方寸匕日二一年之中以二月八月各合一劑終身不老枸把散出聖濟総録去風潤肺壯筋骨進飲食於正月上寅日採枸把根洗去土隂乾杵末於二月上卯日服每日空心日午夜卧水調下三錢匕或温酒亦得服及一季即見其功又於四月上巳日採苖五月上建日服七月上建日採葉八月上建日服十月上建日採子以水洗去肉只取其實十一月上建日服餘並同前法神仙服槐子法出聖惠方取槐子去皮内牛膽中令滿隂乾百日滿取出每服一粒空心新汲水下日晚再服旬内身輕百日内髪變黑乆服齒落重生行及奔馬神仙上品服槐子法出聖惠方延年不老取十月上旬巳日取槐子角二斗以兩隻新瓦盆内合著用紙麻泥封閉周廻令不洩氣四十九日開之自爛去皮後以新布挼取黒子以新汲水洗净方内貯從月一日服一粒隨意津水茶下逐日添一粒至十日却一粒又至十日依前一粒至十粒令人長夀治風補腦髪鬚盡黑仙書所傳槐子者於諸藥中為最其法取十月巳日收並不可錯圎實者每日服五粒以井華水下亦畏觸服至一年皮膚光澤二年身體輕健三年已外補腦明目乆逺服食其功難狀神仙服菊花延年不老出聖惠方春三月甲寅日出時採葉夏三月丙寅日日出時採莖秋三月庚寅日出時採子冬三月壬寅日日暮時採根其葉苦更生莖名固盈花名長生名化生又常十月戊寅日平旦時採精者菊實也既採得須揀擇令净取三分為一劑春更加長生半兩固盈半兩化生半兩以成日搗羅為末破日煉蜜和丸如梧桐子大每早晨以水下三七丸日暮再服一年後萬病除身輕目明益力増夀二年内山行諸虎狼蟲獸皆自避路不敢相近三年内與鬼神相通五年内上知天文同畢為真人矣又王子喬常取白増年方三月上寅日採名曰玉英六月上寅日採名曰容成九月上寅日採名曰金精十二月上寅日採名曰長生長生者根莖子葉四味並隂乾百日取等分以成日合搗千杵為末酒調下一錢匕以蜜丸如梧桐子大酒服七丸一日三服百日身輕潤澤服之一年髪白變黑服之二年齒落再生服之三年八十嵗老人變為童兒神效張果先生服杏仁法出王氏傳濟方夫人體於天形於地以日為魂以月為魄一生已後更不合死皆長生不老矣藥假籬根之下凡人枉死無容冠冕之旒貴耳賤目只重吴蜀之空名藥有萬嵗之尊號務在用義以為必效殊不知長生之祕服之則可延年世上單服一味藥而得延者黄精枸把就中將為妙品猶有生頭痛病而難服彭祖受南山四皓煉杏仁為丹以致仙宫而王子晉丁令威等並不去世事畜妻子服生杏仁服之乆逺仙来迎候乗龍駕鶴以致昇騰者只服杏仁矣服之生五臟補筋骨添血髓益精神張計目明視徹千里消痩癖變凡為仙若王子晉服經四十年不覺身飛騰空丁令威服二十年不覺身飛二子者不服諸藥唯服生杏仁凢有此神驗不湏煉烈生氣力全速錬熟減其半力杏仁凡有十名一名長生丸二名千嵗丸三名化白令少丸四名却老丸五名神通萬嵗丸六名定精丸七名益精丸八名超陞丸九名骨輕身丸十名煉意金丹丸其分服之二經厯矣杏仁性不冷不熱無一切忌觸亦不與諸藥相妨唯忌不淘米白糯米甜水粥逡巡喫者亦少不安湏㬰即可忽客行在路只恐不及如法若逢又淘白糯米甜水粥但放令冷任食多少無妨害惟忌此粥外並不妨杏仁性温平有少苦味乆即甘羙服三年更不覺有苦氣惟覺甘不惟下氣能去膈上熱壯腰脚服者當自知之取生杏仁去皮尖雙仁服黄色者尤妙于平旦時空腹未潄口時二七枚口中退皮尖熟嚼令津液半口可嚥之訖如得一里任喫諸食如單不見延年者任食肉及葷辛如欲昇騰者即不得食一切肉及葷辛任畜妻子營養庸作也肉者易敗壊之物所以不益於身長生之道仙家忌之能斷諸肉即仙道易成服生杏仁一年百病自除二年身輕目明徹視十里但得延命五十年服經六年骨肉换盡面若桃紅延年得七十服經七年行及奔馬换舊齒重生服八年玉女侍衛延得一百五十年服經九年時聞仙宫鐘磬延年三百年服經十年命與日月齊如食五年及血肉則不得聞也服經二十年身騰空虚而無所歸服經三十年仙道畢矣仙宫来迎若斷妻子血肉五辛營養者服之二年衆仙來迎白日昇天如斷血味營養只畜妻子者四十年一朝不覺自受衆仙来迎余性好射獵血肉為本今登六十逰恒山頂上得此方便於山拾杏仁服之經十年自覺身輕目明便踴躍無睡服二十年余已八十矣本有志一百年即擬自理不敢希望延年忽有三十餘人從恒山頂上来余欲避之不得便卓然迎去半里便即禮拜不敢正視有童子先来相引忽然莫識何處湏㬰聞知是仙宫非人凡世余故留此方遺後明者勿輕勿與凡流徒傳必輕之以為口實也張先生服生杏仁慎忌損益法契聖寺原師處得此法原師于王屋山楊行真處得此本右每日旦朝空腹取杏仁二七枚去皮尖雙仁者面向東南未潄口前熟嚼令口中津液有半口便即嚥却如人行一里當任意食之恐減藥力所有杏仁效服三七日四七日即覺泄氣過常時三倍服三箇月脚熱如火腹中瘦病不覺自愈服經八箇月肺臟調和痩病永斷有如嬰兒之視至十六箇月臟腑更新胷膈通泰上氣永斷癖氣消散服經二十四月肝臟鮮明肝上有瘕皮不覺自脫落眼目睛明眼病永除目能逺視服經三十二箇月脾臟踈暢胃脘開通常自揺動脾氣永消腹胃通快服經四十箇月腎臟端正去黒皮氣無擁滯腰臍之間結冷永盡房室少壯服初滿二年百害不傷服經三年百神覆䕶三年榖氣破散臍中疼痛忽然出生血一千片勿驚怪此是藥来即就止此是上上應延年之效如三年内大腸中血不下者亦是次上上之善應延年之象如滿四年無不下者到五年内其血亦更不来矣如依前更来是榖氣厚重藥力未加之藥腸来當湏杏仁至四十七枚乃可破得榖腸必被藥力衝破亦週延年必先之效爾凡服杏仁血下一日不嫌飲食二日平旦瀉血瀉血之後便聞飲食􅁖臰耳聞眼見即生嘔逆如有能忍飢七日者是上仙如不能忍飢者任食煑白粳米粥汁飲之以時為之是次仙三日五日並下血一升皆聞食臭八日平旦下血後聞飲食羙任意食之若食即湏少食之多即令人滿悶七日别一度下血一升到八日已上平旦血三升二升半八日九日十日十一日並同至十二日已上即兩日三度下血至十三日十四日十五日並同至十六日别一度下血六升或五升十六日十七日十八日十九日並同至二十日已上兩日三度下血三升四升至二十一日二十二日二十三日並同至二十六日二十七日並同至二十八日已上兩日一度下血四升或五升至二十九日三十日並同從此之後從四日減一日其血少於尋常三升二升有似身輕喻若去重擔脫靴而行服之者當自知矣恰一百日不覺血定榖腸並被换遍如世人只徒瘥病不要長生者下血之後三日即湏取三椹或桑上青椹杵作細為散亦如煎茶服一兩椀其血即止如無椹子末者或藍汁及刺薊汁一椀服即止其血之時無度微壮疼少時許即時可明也杏仁酥治萬病及諸風虚勞冷方出聖惠方家杏仁一石揀完者盪去皮尖雙仁搗令爛用好酒二石研濾取汁一石五斗入蜜一斗五升内兩石瓮中攪令勻封之勿洩氣三十日看之酒上酥出掠取内瓷器中貯之取其酒滓團如梨置空屋中作格安之候成飴脯狀每日旦服一枚以前酒下其酒亦任性飲之夏姬服杏仁法出聖惠方駐顔延年杏仁三斗盪去皮尖雙仁早朝蒸之至午時即便慢火微烘之至七日即止每日空腹不拘多少隨意服之延駐治病必騐矣湏五月採服椒法出家藏經騐方書林陳􅎡括為之青城山老人服椒得妙訣年過九十餘貌不類期耋再拜而請之忻然為我說蜀椒二斤净揀去梗枝及閉口者净秤之觧塩六兩其色青白龜背者良研細糁塩慢火煑煑透滚菊末糁塩在椒上用滚湯泡過椒五寸許經宿以銀石器慢火煑止留椒汁半盞掃乾地舖紙傾椒在紙上覆以新盆封以黄土經宿取寘盆内將乾菊花末六兩拌滚令勻更洒所餘椒汁然後攤於篩子内晒乾菊湏花小色黄葉厚莖紫氣香味甘名曰甘菊葉可作羮者為真隂乾末之初服十五丸早晚不可輟每月漸漸増累之至二百初服之月早十五粒晚如之次月早晚各二十粒苐三月増十粒至二百粒止鹽酒或鹽湯任君意所歠服及半年間胷膈微覺塞每日退十丸還至十五粒時數服如前日服半年後覺胷膈間横塞如有物凝即每日退十粒退至十五粒止候其無碍所服仍前當令氣蒸否則前功盡失湏終始服之令椒氣早晚薫蒸一日不服則前功俱廢矣飲食蔬果等並無所忌節一年效即見容顔頓恱澤目明而耳聰鬂烏而髪黑補腎可輕身固氣益精血椒温鹽亦温菊性去煩熱四旬乃可服之幸勿忽逮至十數年功與造化捋耐老更延年不知幾嵗月四十嵗方可服若四十嵗服至老只如四十嵗人容顔如此其驗也嗜慾若能忘其效尤卓絶我欲世人安作歌故忉怛服餌令人不老右九月九日採菊花與茯苓松脂服之又佩茱茰食餌飲菊花酒令人不老吳真君服椒方出王氏傳濟方椒性禀五行其葉青其皮赤其華黄其膜白其實黒煖丹府通血脉助元氣消酒食毒辟温邪氣安五臟調三焦而熱不上蒸衆芳之中功皆莫及每全州椒一斤揀去浮皮合口者并内銀器内炒令透地上鋪紙兩重傾在紙上用新盆合定周廽以黄土焙半日許其毒成汁自出晒乾木臼中輕杵取紅皮四五兩再入鐵臼杵為末以木蜜為丸如梧桐子大候乾紗袋盛掛通氣處每日空心酒下十丸至十五丸半年加至二十丸一年後加至二十五丸並無忌歌曰其椒應五行其人通六義欲知先有功夜間且不起服之半年内脚心汗如水四時去煩勞五臟無風氣明目腰不疼身輕心健記别更有異能三年精自秘顔貌如嬰童精爽又少睡但服此神妙一生無瘧痢若能志心服三尸自然棄更有九般蟲各各自廽避倘逢此色人第一湏𫝊意雖未遇神仙初縁已得地神仙服蒺藜延年方出聖惠方用蒺藜子三升不限州土不問黒白但取其堅實者舂去刺净簸揀擇蒸一炊乆晒乾搗細羅為散每服食後以酒或清水調下三錢日再服如覺冷即每取附子五兩炮裂去皮臍搗羅為散與蒺䔧末相和合勻服之亦佳每服後皆以三五匙飯􅐦之此藥治一切風氣野雞痔惡瘡男子隂汗疝氣婦人發乳㿃下並主之神仙服蒺藜方出聖惠方用蒺藜子一石常以七月八月熟時收採曝乾先舂去刺然後搗羅為末每服二錢以新汲水調下日三服勿令中絶斷榖長生服之一年以後冬不寒夏不熱服之二年老者復少髪白再黒齒落重生服至三年身輕延年神仙服桂水令身輕健方出聖恵方桂心三兩搗羅為末葱涕三升右相和内青竹筒中盛於甑上蒸之三日三夜即止候冷取出每服半合以酒相和服之三服乆服可行水上神仙矣神仙服商陸延年通靈方出聖惠方用商陸白者一百二十斤切以竹筐盛懸於鬼門上隂乾百日滿搗羅為末分為十二分每一分用好紙作袋盛之每服五錢以井華水調下日二服漸漸減食􅁿百日即見百里事二百日即見五百里事及見地下伏藏人間乃飛空自在神仙所秘忌食犬肉神仙服商陸根方出聖惠方用商陸根白者五十斤端午日午時收以皮嚢盛於屋北懸之百日隂乾搗羅為散每服三錢以水調日三服不過三劑鬼神来朝乆服海神使鬼来持獻寳物得受之也忌犬肉神仙服苣蕂丸方出聖恵方苣蕂子四兩覆盆子巴㦸天雄酸􅀥仁甘菊花白茯苓薯蕷桂心天門冬三兩去心焙熟乾地黄三兩右搗細羅為末煉蜜和丸如梧桐子大每服空腹以温酒下三十丸任意加之陶居士餌苣蕂茯苓方出聖惠方苣蕂一石九蒸九晒去黒皮熬之令香蒸熱於臼中急搗為末仍以踈馬尾羅羅之冷搗便如脂羅不出也白茯苓三斤去黒皮剉如雞頭大用水煮十餘沸漉出令乾右搗羅為末錬蜜和丸如雞子大每服以温水化破一丸日三服為准神仙服漆岀聖惠方好漆一斗白蜜一斗白米粉三斗右都盛一銅瓮子中釡内湯上煑之以桑薪煑之不著手藥成宿不食旦服二兩夀五百嵗服之一月諸蟲皆出矣神仙服雄黄法出聖恵方凢雌黄千年化為雄黄千年化為黄金黄金者若真人餌法微妙難可知也輕身益氣莫過雄黄之效也用雄黄一斤細研以酒三升和著銅器中用炭火微煎令沸勿令大熱以好漆二升去滓合著其中攪令相得藥成如黄金或作紫色丸如梧桐子大常先食含化一丸嚥津日三服十日諸疾悉愈二十日肌肉中藥氣徧行能耐寒暑寒則熱熱則凉服之百日腸中肥皮膚厚筋骨堅耳目聰明無復諸患行歩如飛服之二百日顔色有光白髮再黒齒落重生反老成少服之三百日神仙玉女在身左右服之一年長生登山入水不由橋梁服之不止身形堅固真人所貴神仙所寳勿示匪人恐招譴謪神仙服雄黄延年方出聖惠方雄黄一兩蕤仁二兩蒲黄三兩右合治雄雞血和搗之萬杵用白蜜為丸如麻子大每日以酒下一丸漸加如梧桐子大如常服之五年可得神仙也兎絲子丸出聖濟總録兎絲子一斤酒浸三日控乾搗細末甘菊花去心搗末一斤用右拌和令勻錬白蜜為丸如梧桐子大每日清晨至晚後食前以温酒送下二十丸至三十丸進食倍常頻頻泄氣是藥之應若諸眼疾黒花昏暗甚者並宜服之神仙餌兎絲子方出十便良方用兎絲子一斗酒浸良乆漉出曝乾又浸令酒乾為度搗細羅為散每服二錢以温酒調下日三服後喫三五匙水飯􅐦之至三七日更加至二錢服之令人光澤唯服多甚好三年後老變為少此藥治腰膝去風冷益顔色兼明目久服延年神秘勿示匪人服楮實可致神仙法出聖惠方用楮實五斗正赤時收隂乾搗羅為末每服二錢以净水調下日三服令人耳目聰明延年不老神驗宜乆服之老者成少令人夜應徹視見鬼神道士梁頓年七十乃服之更少壯到百四十嵗能夜出行及走馬神仙服鹿角法出聖惠方鹿角屑十兩附子三兩去皮臍生用右搗細羅為散每服以温酒調下二錢日三服令人少睡益氣力通神明得力速矣出彭祖傳中神仙餌桃膠方出聖惠方用桃膠二十觔以絹袋盛内末灰汁一石中煑三五沸住火即出袋子髙懸候冷即便煑之如此二度即止晒乾搗羅為末煉蜜和丸如梧桐子大每服空心以酒下二十丸若欲斷穀日三服一百日内百病愈一年不食氣力强盛三百日夜視有光闇室得明眼光如月行及奔馬若欲急功乃加至三十丸日四服五百日三尸去乆服神仙矣神仙服蔓菁子法出聖惠方用蔓菁子三斗三度用水煑之令苦味盡曝乾搗羅為散每服二錢以水調下日三服若欲絶穀者減食増藥則得絶榖不飢乆服轉老成少百日後水灌不著身諸病悉愈一方九蒸九曝神仙服大麻子補益駐顔鬂髪延年不老方出聖惠方大麻子三升酒浸一宿九蒸九晒去殻崖蜜五升牛膝煎三升兎絲子五升一宿酒浸晒乾地黄煎二升右先搗兎絲子為末熬麻子令香以栢木杵臼搗為膏即和前藥等作團内入臼中搗三千杵不得見孝子及雞犬仍擇良日合之每服一雞子大温酒化破服之日三服神仙餌石脂方出聖惠方赤石脂十三兩細研水飛過黒豆四兩生牙用之澤瀉四兩白芍藥三兩葳蕤刮皮蒸曝乾者三兩右搗羅為末錬蜜和丸如梧桐子大平旦水服三十丸日三服常少食乃無食想六十日後氣力不衰一百日後行如驟馬乆服令人得道湏少食即一無妨矣神仙服乳香入口不死法出聖惠方用乳香上好者三斤白蜜三升瓷銀器中合煎如無好蜜好酒亦得以栁木箆數攪令如􅄳每日空心及晚食前服一粟大袪風益顔色神效神仙服蜂房丸方出聖惠方常以九月十五平旦時取蜂窩完者蒸之隂乾百日搗千杵細羅以鍊蜜和丸如梧桐子大每服三丸以酒下日三服老人服之顔如十五童子也神仙服薔薇根令人輕身健行出聖惠方取薔薇根不拘多少洗浄曝乾搗細為散每服三錢食前以水調下日三服延年輕身若中箭瘡服之立愈若箭全在體中服之自出神仙服澤瀉令人輕身健行不老方出聖恵方取澤瀉搗細羅為散日分三服六兩為准水調服之百日身輕百倍乆服强壯不衰老面光澤走及奔馬逺遊無倦神仙服蓬蘽令人輕身健行不老方蓬蘽一名覆盆江南謂之莓子味甘無毒四月五日候其實熟採晒乾搗細羅為散每服三錢水調服之安五臟益精强志倍力輕身不老服之易顔色也服人参方用人参一分猪脂十分酒拌和服一百日滿體髓溢日誦千言肌膚潤澤去熱風痰服熊掌方出本草取熊掌得酒醋水三件煮熟即蒸大如皮毬食之耐風寒九節菖蒲法出王氏傳濟方駐顔延年明耳目去風氣通開竅安神益智九節菖蒲不拘多少惟生山澗石上流水中者採取為妙若是少得時只石上水中生者亦得不可陂澤中生者於八月間採取得去根須净擇了以淘米泔浸三日三宿每日換米泔取出控乾以硬竹削為片子如錢厚以布袋盛貯長流水浸三復時更用井花水净洗擇如蒸飯九度每蒸後晒一日後數足不得犯鉄器於木石臼子内細搗羅為末煉蜜為丸如梧桐子大初服二十丸漸加至三十丸五十丸用鹽湯下茶酒亦得忌羊血餘者以紙袋盛貯掛在風裏如服盡更將末合或酒煑糊和丸亦得普濟方卷二百六十三
