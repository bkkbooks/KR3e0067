薑㵼心湯主之下利已數十次榖不化腹中雷鳴心下痞鞭而滿此以醫下之也若復下之其痞益甚甘草㵼心湯主之盖以此非結熱以胃中虚客氣上逆故使鞭也下利而心下痞生薑㵼心湯甘草㵼心湯主之利不止者當治其下焦赤石脂禹餘粮湯主之盖生薑㵼心甘草㵼心皆治中焦此利在下焦若只治中焦則利益甚耳服赤石脂禹餘粮湯利復不止者當利其小便五苓㪚主之凡痞服㵼心湯不愈然後可與䧟胸九下之不可用䧟胷湯盖大猛只用䧟胷丸大抵結胸與痞皆應不然表未解者不可攻也仲景云當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黄黄連黄苓湯外症未解心下妨悶者非痞也謂之肢結柴胡桂枝湯主之胷脅滿㣲結小柴胡加乾薑牡蠣湯主之若太陽症未除而數下之遂脅熱而利反不止心下痞鞭表裏不解者桂枝人參湯主之十棗湯大柴胡湯皆治心下痞此方尤難用須是表症罷不惡寒身凉其人熱浆汗出發作有時頭疼心下痞鞭滿引脇下下疼乾嘔短氣者乃可行十􅀥湯表未解者甚不可用也大柴胡湯治傷寒發熱汗出不解心中痞鞭嘔吐而下利者非大柴胡不可也若發汗吐下後心下痞鞭怒氣不除者旋復代赭湯主之有旋復代赭湯症之人其或咳逆復氣虛者先服四逆湯主之胃寒者先服理中丸次服旋代赭湯為良旋復代赭湯是解心下痞鞭症宜詳察之也又云傷寒心下滿者謂正當心下髙起滿硬者是也不經下後而滿者則有吐汗之殊若下後者又有結胷痞氣之别經曰病人手足厥冷脈乍𦂳邪結在胷中心滿而煩亂饑不能食病在胷中當吐之又曰脈浮而大心下反硬有熱属臓者攻之下冷發汗属腑者不令攻之兹二者為不經汗下而心下滿者或吐之㸔其邪氣之髙下髙者則因而越之下者則因而竭之大要在泄其邪也至如陽明病雖心下鞭滿又未可攻經曰陽明病心下鞭滿不可攻之攻之利遂不止者死利止者愈是氣自表傳裏至於心下留結為實者則不可下乃吐之可也若未全為實者則不可下故當戒也又邪氣在表未應下而强下之邪氣乗虛結於心下實者鞭滿而痛為結胷虛者滿而不痛為虛結經曰嘔而發熱者柴胡湯症具而以他藥下之柴胡症仍在者復與柴胡湯此雖下之不為逆必蒸而振却復發熱汗出而解若下心滿而鞭痛者此為結胷但滿而不痛者此為虛痞盖實邪留結則為鞭痛虛邪留滯則但滿而不鞭痛也結胷熱實脈沈而𦂳心下痛按之石鞭者大陷胷湯主之明其邪實可知矣脈浮而𦂳而反下之𦂳反入裏則作痞按之自濡但氣痞耳明其邪虛可知矣病發於陽而反下之熱入因作結胷病發於隂而發下之因作痞表邪未罷醫反下之胃中空虛客動於膈陽氣内陷心中因鞭則為結胷須陷胷湯丸攻之可也傷寒中風醫反下之心下痞鞭而滿醫見下心痞為病不盡而復下之其病益甚此非結熱但以胃中空虛客氣上逆故使鞭也須諸㵼心湯㪚可也二者俱是心下滿鞭一為虛一為實凡投湯者大須詳審結胷雖為實邪衆皆共知當用陷胷湯丸下之或脈浮大者則不可下下之則死即是猶帶表邪未全結實下之重虛其裏邪深結則死設其結胷形症悉具而加之煩躁者又為不治之疾藥之所以能勝邪者必待胃氣施布藥力始能温汗吐下之以逐其邪邪氣勝胃氣絶者湯藥縱下胃氣不能施布雖神丹奚為效也又云傷寒腹滿者俗謂之肚脹是也華陀曰傷寒一日在皮二日在膚三日在肌四日在胷五日在腹六日入胃謂入腑也是在腑也猶未全入裏者雖腹滿為裏症故亦有淺深之别經曰表已解而内不消非大滿猶生寒熱則病不除是其未全入腑若大滿大實堅有燥屎自可除下之雖四五日不能為禍謂之邪氣已入腑也傷寒邪入腑是裏症已深故腹滿乃可下之多矣如經曰其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯發汗不解腹滿痛者急下之本太陽病醫反下之因而腹滿時痛者属太陽也桂枝芍藥湯主之大實痛者桂枝加大黄湯主之少隂病腹脹不大便者急下之諸如此者皆裏症也雖曰腹中滿痛者此為實也當去之然腹滿不减者則為實也若腹滿時减者又為虛也則不可下經曰腹滿不减减不足言當下之金匱畧曰腹滿時減復如故此虛寒從下上也當以温藥和之盖虛留滯亦為之脹但此之實者不至堅痛也大抵腹属太隂症也陽熱為邪者則腹滿而咽乾隂寒為邪者則腹滿而吐食不下自利益甚時腹痛自太隂者脾土也治中失故専主腹滿之候又發汗吐下之後因而腹成滿者皆邪氣乗虛内客為之而所生又各不同經曰發汗後腹脹滿者厚朴生薑甘草半夏人參主之傷寒後吐腹脹滿者調胃承氣湯主之傷寒下後心煩腹脹滿卧起不安者梔子厚朴湯主之三日有當温者有當下者有當吐者何邪氣不一也但發汗後腹滿當温之邪氣在表因發㪚則邪去胃為津液之主發汗亡陽則胃氣虛而不能敷布諸氣壅滯而為脹滿是當温㪚可也吐後腹滿可下之邪氣在胷者則可吐之則邪去安若吐後邪氣不去加之腹脹者是胷中之邪下傳入胃擁而為實故主脹滿當須下之可也下後腹滿可吐者邪氣在表未傳入腑而妄下之耶自表乗虛而入欝於胷中而為虛煩氣上下不得通利者腹為之滿故當吐之可也凡為醫者要識邪氣所起所在審其所起知邪氣之由來觀其所在知邪氣之虛實發汗吐下之不差温補針艾之適當則十全之功自可得也聖濟總錄論曰傷寒心腹脹滿者以臟氣不調邪氣入乗正邪相搏故令人心腹脹悶而滿然臟有虛實邪有冷熱若吐下已後病不除内外有熱心腹脹滿而痛者此為實也若其素有冷癖因病發熱服冷藥及飲水過度水結心下痛瘀痼滯心腹脹滿者此為虛也活人歌括云問君腹脹是如何只為隂陽氣不和若是曽經汗吐下依方調治莫蹉跎腹脹者何也隂陽不和也桔梗半夏湯最良仲景太陽症發汗後腹脹滿者厚朴半夏甘草人參湯太陽症下後心煩腹脹滿卧起不安者梔子厚朴湯吐後腹脹滿者調胃承氣湯又歌曰腸滿脾家及胃家三陽合病心頑麻入邪吐汗下之後腎症便堅承氣加如腹脹多属太隂盖脾為中央土所以主腹脹之後腹中常滿者裏實而可下時滿時减者裏虛不可下當以和温藥和之其有吐汗下後因成腹滿者此則邪氣乗虛而入或疎利或温㪚或湧吐條例又不同焉審其邪氣之所起其邪氣之所在可知矣雖然太陽主腹滿固也陽熱為邪必腹滿而咽乾隂寒為邪必腹滿而吐食而自利一熱一寒又不可以無别引若夫腹滿而涸難以有瘳太隂腹滿吐食不可下枳實理中丸主之誤下太陽因而腹滿時痛為太陽為太隂俱病桂枝大黄湯重者桂枝加大黄湯陽明發熱腹滿微喘口苦咽乾或不大便言語太迫者亦有此症並小柴胡湯噦而小便難加茯苓又腹大滿不大便小承氣湯微下之陽明脈遲腹滿時喘潮熱亦用小承氣湯發黄症有本條三陽合痞腹滿身重難以轉側譫言口中不仁少與白虎湯吐後腹滿脹不减者胷中之邪下傳入胃擁而為實也少與調胃承氣湯汗後腹脹滿者胃氣虚而不能敷布諸氣壅滯也厚朴生薑半夏人參甘草湯若滿而痛則以小承氣湯微下之妄下後腹脹滿心煩而卧起不安表邪乗虛而入欝於胷中也梔子厚朴湯少隂病六七日腹脹滿不大便承氣湯急下之腹脹逆用桔梗半夏湯腹皮痛者脾不勝水故水與氣搏於皮膚之間觀其腸鳴漉漉可知矣半夏茯苓湯加官桂腹脹滿而短氣者邪在裏而為實也腹濡滿而短氣者邪在裏而為虚也見氣短而腹脹滿用藥皆去白术术温燥而閉氣方前胡㪚出聖恵方治傷寒心腹痞滿頭痛四肢煩疼前胡去蘆頭一兩赤茯苓赤芍藥桂心白术各三分柴胡去苗枳殻麩炒微黄去穰訶梨勒煨用皮各一兩甘草半兩炙微赤剉右麄搗為㪚每服四錢水一中盞生薑半分􅀥三枚煎六分去滓不計時候温服旋復花㪚出聖恵方治傷寒頭痛心腹痞滿痰壅不下飲食旋復花半兩半夏湯洗七遍去滑桂心各三兩前胡去蘆頭石膏赤茯苓陳橘皮湯浸去白穰焙各一兩甘草一分炙㣲赤剉右麄搗篩為㪚毎服三錢水一中盞入生薑半分煎六分去滓不計時候温服訶梨勒㪚出聖恵方治傷寒心腹痞滿咽喉噎塞四肢不和背膊壅悶不欲飲食訶梨勒煨用皮大腹皮剉前胡去蘆頭陳橘皮湯浸去白穰焙川大黄剉碎微炒各一兩半夏湯洗七遍去滑枳實麩炒㣲黄桂心各三分木香半兩右粗搗篩為㪚毎服三錢水一中盞入生薑半分煎六分去滓不計時候稍熱服附子㵼心湯出聖恵方治傷寒腹痞滿惡寒汗出者宜服附子炮製去皮臍黄連去鬚黄芩川大黄剉碎㣲炒各一兩右粗搗篩為㪚毎服三錢水一中盞煎六分去滓不計時候温服陳橘皮㪚出聖恵方治傷寒心腹痞滿下之後心腹轉脹宜服陳橘皮湯浸去白穰焙訶梨勒皮赤茯苓人參去蘆頭白术各一兩厚朴去粗皮塗生姜汁炙令香熟桂心各三分木香髙良薑各一兩右粗搗篩為㪚毎服四錢水一中盞入􅀥三枚煎六分去滓稍熱不計時候服白术㪚出聖恵方治傷寒冷氣結在心腹痞滿妨悶宜服白术桂心赤芍藥當歸剉微炒半夏湯洗七遍去滑乾薑炮製剉木香各三分陳橘皮湯浸去白穣焙厚朴去粗皮塗生姜汁炙令香熟各二兩右粗搗篩為㪚毎服四錢水一中盞入生薑半分棗三枚煎六分去滓稍熱不計時候服治傷寒頭項急悶腹痞滿氣逆不思飲食宜服出聖恵方附子炮製去皮臍人參去蘆頭陳橘皮湯浸去白穣焙白术紫蘇莖葉各一兩桂心木香大腹皮剉杏仁湯浸去皮尖雙仁麩炒㣲黄各半兩右粗搗篩為㪚毎服三錢水一中盞生薑半分煎六分去滓稍熱不計時候服赤茯苓㪚出聖恵方治傷寒心腹痞滿兩脇下急不能飲食宜服赤茯苓枳殻麩炒微黄去穰白术陳橘皮各一兩湯浸去白穰焙澤㵼桔梗去蘆頭人參各三分去蘆頭甘草一分炙微赤剉杏仁三分湯浸去皮尖麩炒黄去雙仁右搗篩為㪚毎服三錢水一中盞入生薑半分煎六分去滓稍熱不計時候服治傷寒氣逆心腹痞滿不下飲食宜服此方出聖恵方人參去蘆頭白术枳殻麩炒微黄去穰赤茯苓各一兩桔梗三分去蘆頭桂心半兩右粗搗篩為㪚每服四錢水一中盞入生薑半分煎六分去滓稍熱不計時候服治傷寒發汗後心腹氣痞滿煩悶宜服此方出聖恵方赤茯苓桂心青橘皮各一兩湯浸去白穣焙右搗篩為㪚毎服三錢水一中盞入􅀥三枚煎至六分去滓稍熱不計時候服附子散出聖恵方治傷寒其脈沉㣲或因下後心腹痞滿宜服附子炮製去皮臍人參各一兩去蘆頭乾薑炮製剉白茯苓陳橘皮湯浸去白穣焙桂心訶梨勒煨用皮各三分甘草半兩炙微赤剉右搗篩為散毎服三錢以水一中盞棗三枚煎至六分去滓稍熱不計時候服代赭散出聖恵方治傷寒發汗吐下後心腹痞滿胸膈氣不利宜服陳橘皮一兩湯浸去白焙代赭研旋復花人參去蘆頭甘草各半兩炙微赤剉半夏三分湯洗七遍去滑右搗篩為㪚毎服三錢以水一中盞􅀥三枚入生薑半分煎至六分去滓不計時温服前胡㪚出聖恵方治傷寒心腹痞滿不思飲食宜服前胡去蘆頭枳殻各一兩麩炒微黄去穣半夏湯洗七遍去滑甘草炙微赤剉木香人參去蘆頭桔梗去蘆頭枇杷葉各半兩拭去毛炙㣲黄芎藭白术赤芍藥各三分右搗篩為㪚毎服四錢水一中盞入生薑半分煎六分去滓不計時候温服治傷寒後心腹痞堅兼氣促宜服此方出聖恵方蘿蔔子一兩微炒阿魏一錢麪褁煨麪熟為度右搗細羅為㪚毎服不計時候以熱酒調下一錢治傷寒表熱未除數下之遂夾熱而利利不止心腹痞滿表裏不解者宜服此方桂心甘草各一兩