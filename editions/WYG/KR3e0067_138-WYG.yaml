作結胷痞氣治皆不差史大夫以此湯飲之下黄水一升許遂差予得此法用之如神若是痞氣莫不應手而消凢傷寒胷脹勿問結胷痞氣但先服此藥若不瘥然後别下藥錄此湯行氣下膈耳無他損又西晉崔勛方得傷寒或下或不下心中結滿胷膈痞寒氣急厥逆欲絶心胷髙起手不得近二三日輙死用㵼心大小陷胷湯皆不差當是下後虛逆氣已不理而毒復上攻氣毒相傳結於胷中氣毒相激故到此病若療之當用加减理中丸先理其氣次療諸疾加减理中丸出活人書治寒實陷胷及傷寒諸吐利後胷痞欲絶膈髙起急痛手不得近人參白术甘草各二兩乾薑一兩半枳實炮一兩茯苓麩炒或炙二兩俱研末右蜜丸彈子大一丸不效再服予時用此神速下喉氣即相接續後與之不過五六彈丸胷中豁然矣用藥之速未嘗見此渇者加𤓰蔞二兩下利者加牡蠣二兩又妙此予屢試之效其功神速今以此丸與枳實湯兼服無不驗所謂枳實只是枳殻古人謂之枳實後人方别出枳實東坡先生既以秘方廣傳又毎有論述教人濟活存心仁矣厚朴湯出聖濟總錄治傷寒汗後腹脇脹滿食少嘔逆厚朴去粗皮生姜汁炙令紫三分桂去粗皮訶梨勒炮去核人參陳橘皮湯浸去白焙赤茯苓去黒皮丁香各半兩甘草炙剉一分右搗篩毎服三錢水一盞入生薑半分拍碎􅀥三枚擘破同煎六分去滓食前温服附子湯出聖濟總錄治傷寒因下後脾胃虛冷腹脇脹滿附子一兩炮製去皮臍赤茯苓赤芍藥人參去蘆頭白术桂心各半兩右搗篩為散毎服五錢水一大盞入生薑半分棗三枚煎五分去滓不計時候温服茯苓湯出聖濟總錄治傷寒後中冷卒心腹脹滿不下食赤茯苓去黒皮桔梗炒陳橘皮湯浸去白焙乾各一兩人參半兩右搗篩為㪚毎服三錢用水一盞入生薑半分拍碎同煎半盞食前温服厚朴飲出聖濟總錄治傷寒後脾氣未順腹脇脹滿厚朴去粗皮生姜汁炙一兩冷透人參芍藥枳殻去穰麩炒各一兩甘草炙剉半兩梹榔煨剉三分右粗搗篩毎服三錢水一中盞入生薑半分拍碎同煎半盞去滓食前温服厚朴湯出聖濟總錄治傷寒後腹痛兼兩脇脹滿厚朴去粗皮生姜汁炙一兩當歸切焙木香枳殻去稂麩炒用大腹皮炒各半兩右為㪚毎服三錢水一盞生薑半分拍碎煎半盞去滓食前温服茯苓湯出聖濟總錄治傷寒汗後心腹及臍下脹滿赤茯苓去黒皮一兩木香桂去粗皮木通剉各半兩甘草炙剉一分右粗搗篩毎服三錢水一盞煎至半盞去滓食前温服枳殻湯出聖濟總錄治傷寒後心腹氣滯脹滿不能飲食枳殻去穰麩炒一兩半厚朴去粗皮生姜汁炙白术人參赤茯苓去黒皮各一兩右粗搗篩毎服三錢水一盞入生薑半分拍碎同煎半盞去滓食前温服厚朴茯苓湯出聖濟總錄治傷寒後氣未和心腹脹滿不能飲食厚朴去粗皮生姜汁炙赤茯苓去黒皮各一兩半人參一兩陳橘皮湯浸去白焙乾一兩重甘草炙剉半兩右粗搗篩毎服三錢水一盞入生薑半分拍碎同煎取半盞去滓食前温服厚朴七物湯出金匱方治腹滿發熱十日脈浮而數飲食尚如故者此湯主之厚朴半斤甘草大黄各三兩大􅀥十枚枳實五枚桂枝二兩生薑五兩右以水一斗煮取四升温服八合日三服嘔者加半夏五合下利去大黄寒多者加生薑至半斤附子粳米湯出金匱方治腹中寒氣雷鳴切痛胷脇逆滿嘔吐者此方湯主之附子一枚炮去皮臍半夏半斤甘草一兩大􅀥十枚粳米半斤右以水八升煮米熟湯成去滓温服一升日三服厚朴三物湯出金匱方治痛而閉者此湯主之厚朴八兩大黄四兩枳實五十枚右以水一斗二升先煮二味取五升内大黄煮取三升温分一升以利為度益中丹治太隂病食則吐胃中痛腹脹時噫者髙良薑乾薑各二兩半夏橘皮各四兩右搗篩煉蜜和丸桐子大白飲服三十丸黄芩湯出聖濟總録治傷寒後煩熱大便不利心腹脹滿黄芩去黒心一兩黄連去鬚大黄剉炒芒硝研甘草炙剉厚朴去粗皮生姜汁炙各三分枳殻去穰麩炒土𤓰根各半兩赤茯苓去黒皮一兩右粗搗篩毎服三錢水一盞煎至半盞去滓食前温服㯽榔㪚出宣明論治傷寒隂病下後太早成痞滿而不痛按之軟虛也㯽榔枳殻各等分右為末毎服三錢煎黄連湯下不計時候温服益智㪚出和劑方治傷寒隂後盛心腹痞滿嘔吐泄利手足厥冷及一切冷氣衝心脇臍腹脹絞痛川烏炮黒皮臍四兩益智去皮二兩乾薑炮半兩青皮去白一兩右為㪚毎服三錢水二盞入生薑五片棗二枚擘破同煎至八分去滓温服食前一方無生薑􅀥煎服傷寒胸膈痰滯論夫傷寒心胸壅滯痰飲留澼不能消㪚故令心腹痞滿少思飲食風熱相傳目眩頭痛上焦不利見食嘔此由胃虛不能宣行水穀津液閉塞不通水飲停于心胸而成結痰也方前胡㪚出聖恵方治傷寒刺胸膈痰滯壅頭目痛悶前胡去蘆頭人參去蘆頭赤茯苓枳殻麩炒微黄去穣獨活桔梗去蘆頭各一兩旋復花甘草炙微赤剉半夏湯浸七遍去滑各半兩右㕮咀毎服四錢水一中盞入生薑半兩煎至六分去滓不計時候温服半夏㪚治傷寒頭痛壮熱痰壅心膈不利食久不消半夏湯滑七遍去滑人參去蘆頭赤茯苓澤㵼各一兩附子炮製去皮臍乾薑炮製剉甘草炙微赤剉各半兩陳橘皮湯浸去白穰焙三分右㕮咀毎服三錢水一中盞入生薑半分煎六分去滓不計時候温服人參㪚治傷寒頭痛痰滯壮熱心膈煩悶人參去蘆頭赤茯苓旋復花細辛白芷赤芍藥前胡去蘆頭各一兩乾薑炮製剉半夏湯浸七遍去滑各半兩右㕮咀毎服三錢水一中盞入生薑半分煎至六分去滓不計時候温服枇杷葉㪚治傷寒已解猶有風冷痰滯胸膈噎塞食飲妨悶枇杷葉拭去毛炙微黄木香甘草附子炮製去皮臍各半兩半夏湯浸七遍去滑白术人參去蘆頭大腹皮剉厚朴去粗皮塗生姜汁炙令熟赤茯苓各一兩枳殻三分麩炒微黄去穰陳橘皮湯浸去白穰焙一兩右為㪚毎服三錢水一中盞入生薑半分棗三枚煎六分去滓不計時候温服前胡㪚治傷寒痰滯嘔逆肢體疼痛心胸不利前胡二兩去蘆頭人參去蘆頭澤㵼赤茯苓各一兩半夏湯洗七遍去滑甘草炙微赤剉各半兩右搗篩為散毎服三錢水一中盞入生薑半分煎六分去滓不計時候温服白术㪚治傷寒痰滯在胸膈間不㪚身體壮熱頭目昏沈胃氣不和少思飲食白术甘菊花赤茯苓人參前胡去蘆頭半夏湯洗七遍去滑旋復花已上各三分石膏一兩附子炮製去皮臍大腹皮剉甘草炙微赤剉各半兩右搗篩為㪚毎服三錢水一中盞入生薑半分棗三枚煎六分去滓不計時候温服旋復花㪚治傷寒頭痛心膈痰滯壅悶不欲飲食旋復花前胡去蘆頭白蒺䔧去刺微炒紫胡去苗枳殻麩炒微黄去穰桑根白皮剉赤茯苓已上各半兩甘草一分炙微赤剉右粗搗篩為㪚毎服四錢水一中盞入生薑半分煎六分去滓不計時温服枳實㪚出聖濟總錄治傷寒痰滯胸膈煩熱頭疼不思飲食枳實麩炒微黄柴胡去苖赤茯苓澤㵼前胡去蘆頭半夏湯浸七遍去滑已上各三分甘草半兩炙微赤剉桑根白皮剉犀角屑各半兩右粗搗篩為㪚毎服三錢水一中盞入生薑半分煎六分去滓不計時温服七氣丸治病人素有心下兩脇結痛者此有久寒也大黄酒洗菖蒲各一兩人參桂柴胡乾薑細辛當歸半夏川椒去日炒茱茰厚朴附子二枚炮右搗篩煉蜜和丸梧桐子大酒或飲下五粒痰癖丸治少陽病脇下痛有停水者芫花苦酒浸熬乾乾薑各一兩色黒者右為末煉蜜和丸如梧桐子大飲服三粒至五粒五味子湯治病人傷中唾血脇下痛身熱不解者五味子紫苑各一兩取茸桔梗續斷竹茹桑根白皮人參知母熟地黄甘草各一兩右水六升煮取三升去滓温服合日三橘皮湯出活人書治傷寒痰逆惡寒甘草一錢人參二錢陳皮半兩右用青季竹刮上青茹一團薑四片􅀥一枚水一盞煎至六分去滓熱服柴胡半夏湯出活人書治痰熱頭疼利膈除煩悶手足煩熱榮衛不調肢節拘倦身體疼痛嗜卧少力飲食無味兼治五飲消痰癖柴胡八兩半夏二兩半白术二兩甘草炙人參黄芩麥門冬去心各三兩右剉如麻豆大毎服炒五錢水一盞半生薑五片棗一枚煎八分去滓温服治傷寒後卒胷膈悶痛出本草右用枳實一味剉麩炒黄為末服二錢米飲調下一日二服普濟方卷一百三十九
