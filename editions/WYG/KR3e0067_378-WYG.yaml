藥所以神效者葢癎病皆心血不足此物可守宫其心血之血類也􅂇以二陳湯與之若無生蝎當取帶性雄猪心血代用入于代赭石散中一作效取下如室女之於心故能補也心全則病瘥豈非神聖功巧乎余侍郎之子已是廢人服之全愈余常試之必效但害一物而救一人此乃怪蟲去其足而復能行又再生而活蜜佗僧飲治驚癎入心不語神效諸驚失音大人通用右用佗僧為細末每服一字米醋湯下大人用二錢熱酒調下治小兒驚癎補虚氣乏右用豆牙猪頭一枚治如食法煮令極熟停冷作鱠以五辛醋食之治小兒汗出舌上白受驚者衣厚過熱也鼻上青及下痢青乳不消喜啼者衣薄厚冷也小兒多患胎寒如啼晝夜不止因此成癎宜急與當歸散右用當歸末取小豆大取乳汁以咽之日夜三四度即瘥若不瘥當歸半兩小豚卵一具並切之以酒一升二合用煮取八合服半合至一合隨兒大小日三夜四神效又方治驚癎右用以鷄子黄和乳汁量兒大小服之不過三兩枚自定五味麝香餅子治小兒驚風發癎目睛邪視胷膈多痰搐搦不定神昏不醒又治變蒸温壯不解麝香半錢研青黛三錢研全蝎去毒生用一十五枚蜈蚣一對生用石膏飛研細一兩右為細末研勻湯浸油餅為丸如梧桐子大揑作餅子每服五七餅子用金銀薄荷水化下粉紅丸又名温驚丸治小兒驚癎搐搦目睛上視天南星為末入臘月釀牛膽中百日隂乾取末四兩另研如無釀者只剉炒熱用硃砂一錢半研天竺黄一兩研坯子臙脂一錢研丸染臙脂龍腦右同牛膽汁和丸鷄頭大每服一丸小者半丸炒糖温茶化下紅丸子治一切驚癎化痰白礬三枚出火毒半夏一分炮雄黄一錢三分半硃砂二錢二分半右將半夏末作生薑自然汁煮糊丸如菉豆大每服二十七丸以痰不為度以一半硃砂為衣治小兒驚癎大人見鬼方右用狐肉亦作羮食之良治孩子驚癎不知人迷悶嚼舌仰面者方右用犀角末半錢入水二大合服之立效大醫局紫雪療脚氣毒遍内外煩熱不解口中生瘡狂昜呌走􅂒疫毒厲卒温瘧五尸五痓心腹諸疾癘刺切痛及解諸藥毒發邪熱幸黄等並解蠱毒魅野道熱毒又治小兒驚癎百病黄金一百兩千金翼用十六兩石膏寒水石磁石滑石各三觔搗碎千金翼無滑石已上用水一斛煮至四斗去渣入下項𤣥參洗焙搗碎升麻各一觔羚羊角屑犀角屑青木香沉香並搗碎各五兩丁香一兩搗千金翼用四兩甘草炙剉八兩已上八味入前藥汁再煮取一斗五升渣去入下項硝石四升芒硝亦得每升重七兩七錢半朴硝精者十觔千金翼用四觔已上二味入前藥汁中微火煎桞木箟攪不住手候有七升投在木盆中半日欲凝入下項硃砂飛研净三兩麝香當門子一兩二錢半研千金翼用麝香粉半兩餘觔兩不注者皆同已上二味入前藥中攪調令勻寒之二日右件藥成霜雪紫色每服一錢或二錢用冷水調下大人小兒臨時以意加减食後服牛黄保勝丸治小兒驚癎衆疾身熱急驚不可服天麻一兩明亮者白附子一兩米泔浸一宿南木香一兩丁香一分牛黄半兩黄耆一兩地榆半兩湯浸麝香一兩犀角末一分大附子一兩生薑半兩不蛀棗子二枚水一大碗慢火用煎附子水盡去皮切右件為末煉蜜和丸如梧桐子大每服一粒用薄荷湯化下烏蛇散治小兒驚癎並急慢驚烏蛇三寸去皮骨鼠糞新者五十粒無蛀皂角一定右用新瓦上煆存性入麝香少許為末金銀湯下服少許硃砂丸治小兒心肺積熱發驚癎煩悶吐逆心氣昏迷痰涎壅滯硃砂牛黄鈆霜各細研乾蝎蠶蛾並微炙炒各一分膩粉腦麝各細研半分天漿子二七枚内有物者微炒右為末都研令勻煉蜜和丸如黍米大每服薄荷湯化五丸量兒大小加减保安丸治小兒諸風驚癎潮發搐搦口眼牽引項背强直精神昏困痰涎壅塞哽氣喘急目睛邪視一切虛風並皆治之附子半兩炮去皮臍白附子炮天麻全蝎去毒微炒蔓荆子防風去蘆皮頭羗活去蘆頭川芎肉桂去麄皮白殭蠶炒去絲嘴當歸冼焙十味各一兩烏蛇酒浸去骨取肉焙乾利半兩乳香一分另研右件為細末次入乳香研勻煉蜜為丸每服一兩作四十丸每服一丸煎荆芥湯化下不拘時候服治小兒諸熱驚癎發熱方右以青黛水研服治小兒天瘹驚癎客忤方右用家桑東行根研汁服之治小兒驚癎客忤鎮心安神方右以麝香當門子一粒如丹砂相似細研熟水灌下治驚癎精神恍惚言語錯繆歌笑無度兼五臓積冷蠱毒寒熱右以狐肉一片及五臟治如食法豉汁中煮五味和作羮或作粥炙食並得京中以羊骨汁鯽魚替豉汁治小兒驚癎壯熱方右以槐葉煎湯服皮莖同用治小兒壯熱痞疾驚癎方右以李葉作湯沭之治小兒驚癎方右取鴈毛自落者小兒帶之又鴈喉下白毛療小兒癎有效治小兒驚癎方右以馬齒水磨服之又方右以棘枝上雀甕研其間蟲書灌之治小兒驚癎方右以磁石煉水飲之治小兒驚癎方右以鷄腦燒灰酒服之治小兒鬼驚癎方右以虎煮汁浴之治小兒發熱驚癎方右以風涎母煮服之癎瘥復發附論夫小兒患疾瘥後更發候癎發之狀或口眼相引目睛上搖或手足瘈瘲或背脊强直或頭項反折或屈指如數皆由當風取凉乳食失節之所為其瘥之後而更發者是餘勢未盡小兒血氣軟弱或因食不節或風冷不調或更驚動因而重發如此者多成常疾紫金散治小兒諸癎復發不問風之與熱發作多少般數紫金粉一兩半一名赤烏角牡蠣粉麻黄去根節川大黄剉碎微炒各三分石膏細研飛過地骨皮赤石脂各一兩烏蛇肉炙令黄黄芩炙微赤剉防風去蘆頭赤芍藥葛粉牛黄研細甘草炙微赤剉秦芁去苗各半兩羗活桂心各一分半當歸一分剉微炒朴硝寒水石去苗各半兩虎睛一對微炙右𢷬細羅為散都研令勻每服煎竹葉湯調下半錢更量兒大小加减服之百病欽丹丸治小子驚癎復發眩悶倒蹶或湯火不避及除百病松丹硃砂細研水飛過鐵粉牛黄雄黄各細研細辛獨活露蜂房炙黄人參去蘆頭漢防已桂心甘草川椒去目及閉口者微炒去汗各一分蜣螂五枚微炙蛇蜕皮五寸炙黄鷄頭一枚赤剉赤茯苓一兩右為末煉蜜為丸和𢷬三二百杵如菉豆大每服以粥飲下五丸量兒大小加减服之䲭頭丸治小兒驚癎發動經年不斷根源䲭頭一枚自死者炙令黄色桂心茯神赤芍藥露蜂房炙黄甘草炙微赤剉當歸剉微炒芎藭丹參蜣螂七枚去趐足微炒麝香一分細研牛黄細研蛇蜕皮五寸炙黄莨菪子炒令黒各半兩蚱蟬十枚微炙右為末煉蜜和𢷬三二百杵丸如菉豆大每服以温水下看兒大小加减服之鎮心銀屑丸治發癎雖瘥餘疾慮動防疾銀屑黄耆大黄鱉甲炙甘草炙各四分細辛桂心各三分茯苓柴胡黄芩人參芍藥各三分葵子三分牛黄一分右為末蜜丸大豆大一服五丸日三服大良天漿子丸治小兒諸癎復發使斷根源蠐螬三分微炒芎藭半兩知母半兩天漿子十四枚去殻别研人參去蘆頭生乾地黄桂心各半兩川大黄一兩半剉碎微炒嬰孺用十分蜣螂三枚去趐微炙蚱蟬去趐足微炙半兩嬰孺用一分牛黄一分細末嬰孺用三分䖟蟲三枚炒黄嬰孺用三分右為末煉蜜和𢷬三二百杵丸如菉豆大每服以粥飲下三丸日一服量兒大小加减服之除病銀屑丸治發癎雖已瘥而根源不斷至長將除疾銀屑一針紫苑細辛麻黄去節黄芩各一分人參大黄甘草炙各二分牛黄四銖右為末蜜丸小豆大一服二丸三丸化痰丹治胞絡痰涎諸癎瘥後皆宜常服此方半夏一兩湯浸七遍乾薑微炮川黄連去頭桂心南木香各半兩已上先𢷬羅為細末次用牛黄麝香各研一分硃砂一兩細研水飛巴豆十箇去皮心膜炒黄别研右拌勻滴水和如黍米大每服三粒至五粒温粥飲下未周嵗嬰兒乳汁下謂如三嵗至五嵗不過五粒量兒大小加减斷癎丹治癎瘥後復作證候多端連綿不除用驗黄耆蜜水塗炙釣藤釣子細辛去根土葉甘草炙各半兩蟬殻四箇炒出洗去土炒去足牛黄一字别研蛇蜕三寸酒塗炙右為末煮棗肉為丸如麻子大煎人參湯下一嵗十丸大小加减一方麵糊治癎三十年患者一瘥方苦參二大觔童子小便一斗二升煎苦參取六升右以粥米及麵和前汁作酒十餘日當熟澄清一服半鷄子許四五叟服一升永瘥非止癎疾但腹中諸病悉治神驗曾試亦治一切氣塊宿冷癖心痛惡病皆治放二三年酒不壊可多作救人神效癎瘥身面腫附論夫小兒發癎瘥後身體頭面悉腫滿候七癎發之狀或口眼相引或目睛上搖或手足掣瘲或背脊强直或頭項反折或屈指如數皆由以兒當風取凉乳哺之所為也其癎瘥而腫滿者是風癎因小兒厚衣汗出因風取凉而得之其癎雖瘥血尚而熱未盡在皮膚與氣相摶致冷氣不宣泄故停并成腫也方黄芩湯治小兒癎瘥後血氣尚虚而熱在皮膚與氣相摶通身頭面皆腫黄芩澤瀉通草木通也各八分桑白皮各七分澤膝葉四分木猪苓去皮杏仁湯浸去皮尖各六分柴胡右為麄末每服方寸許水一大盞煎至五分小兒乳食後服甚效又方龍腦葵子萎蕤茯苓前胡已上各一分右為麄末每服方寸許水一大盞煎至五分小兒乳食後服一合癎瘥不能語附論夫發癎瘥後六七嵗不能語者心之聲為言開竅於口其癎發雖止風冷之氣猶滯心之絡脉便心氣不和其聲不發故不能言也補心湯治小兒癎瘥後風冷留滯於心絡使心氣不和語聲不發宜千金大補心湯黄芩附子炮去皮臍各一兩甘草炙茯苓桂心各三兩石膏半夏逺志去心各四兩生薑六兩大棗二十枚飴糖一觔熟地黄阿膠麥門冬去心各三兩右㕮咀每服一大撮入前飴糖半匙許水一盞半煮至半盞量大小分减乳食前服日三羚羊角散木通剉防風去蘆頭川升麻羚羊角屑桂心已上各半兩甘草一分炙右件藥𢷬為麄散每服一錢水一小盞煎至五分去渣入竹瀝少許更煎兩沸不計時服量兒大小加减服之肥兒丸治驚風後失音楊氏曰咽喉為之道路風傷其氣故掩閉聲音道路之門亦有血滯於心竅不能言也可服蕪荑炒神麯炒麥芽炒黄連去毛各等分右用猪膽汁糊為丸木通湯送下或木香陳皮甘草煎湯吞下木通湯木通石菖蒲防風去蘆頭枳殻全蝎焙殭蠶焙甘草木香南星右剉猪心二片或紫蘇生薑煎服排關散一名通關散治小兒諸癎退後不能言右用天南星泡為細散每服一字許猪膽調下嚥入喉中即能言量兒大小加减一方用生薑薄荷蜜酒調下一方用臘月牛膽釀南星不拘多少每服半字薄荷湯調下卧時服兒大者服一字至半錢截癎法附論夫小兒未發癎之先及欲發癎之候或壯熱連滯或搖頭弄舌或眼目抽掣如此是欲發癎宜療之也小兒驚不已即變成癎疾又有不因驚而變成癎者然初亦有證可驗未發之前身體壯熱連滯不歇素有痰涎咽喉呀呷作聲或搖頭弄舌眼目邪視眠睡驚掣如此必是欲發癎之證宜截之防病牛黄湯治少小心驚又治癎發衆醫不復治者牛黄芍藥杏仁炒去皮尖蜣螂蜂房黄芩人參葛根甘草炙蚱蟬炙芒硝川芎桂心各一分大黄三分聖惠用半兩當歸三分石膏四分碎聖惠用半兩右細切取豚五臓及卵以水一斗煮臓卵得三升去渣澄清納諸藥煮取一升三合去渣入芒硝洋盡一服一合日三夜一臨卧末牛黄納湯中常用大驗一方蚱蟬蜣螂各五箇無芒硝用生薑三分水一升煮取二停茯苓湯治少小滯實不去内有熱搖頭弄舌欲作癎茯苓二分蚱蟬三箇炙雀甕二箇炙蛇蜕皮半分鐵精芍藥麻黄去節黄耆柴胡當歸人參各一分右切以水三升先煮麻黄十沸去沫納諸藥煮一升五合為四服百日兒一日服盡大小加减消熱定驚煎治小兒驚熱欲發癎柴胡升麻梔子仁芍藥各七分子苓知母各八分寒水石十二分竹葉切一升杏仁六分去皮尖炒别研甘草二分炙右以水四升七合煮取一升半絞去渣内蜜葛汁於文武火煎攪勿住手至一升二合一月及初滿月兒一合為三服中間進乳出一月一服半合五六十日兒一服一合百日兒亦一合出百日服一合半一二嵗二合日二夜一冬温服之牛黄散治小兒未滿百日聚口吐沫此欲作癎候腹内有冷熱癖實宜服之牛黄細研細辛黄芩當歸研微炒甘草炙微赤剉防風去蘆頭各一分柴胡一分半去苗川大黄剉細微炒蜣螂炙各二分蚱蟬三枚微炙右𢷬細羅為散每服一錢以水一小盞煎至五分和渣不計時候量兒大小加减温服藍葉散治小兒頭額體背俱熱大便秘澀眼赤心悶乍睡乍驚精神昏濁與人不相主當欲作癎狀藍葉人參去蘆頭知母各半兩釣藤川升麻葛根子苓犀角射干各一分𤣥參二分右細羅為散五嵗以竹瀝半合調半錢服日三服量兒大小加减服若未辨合煎藥可服𤣥參生犀升麻葛根竹瀝生薑汁大豆汁地黄汁皆可單服又取少蚯蚓糞水調服良釣藤散治小兒壯熱欲發癎或時四肢抽掣多吐白沫宜服之釣藤甘草炙赤剉川升麻石膏各半兩人參去蘆頭子苓犀角屑蚱蟬三枚微炙川大黄剉碎微炒各一分右麄羅為散每服一錢以水一小盞煎至五分去渣入竹瀝半合牛黄末一字看小兒大小分减服之茯神散治小兒心腹結實身體壯熱四肢不利心神多驚欲發癎茯神𤣥參各一兩半川升麻秦芁去苗龍膽去蘆頭各一兩寒水石三兩川大黄剉研微炒川芒硝各三兩右麄羅為散每服一錢以水一小盞煎至五分去渣分温二服早晨午後各一服更量兒大小加减龍齒散治小兒壯熱欲發癎心驚神悸多啼或口吐白沬龍齒川芒硝各一兩釣藤川升麻子苓防風去蘆頭犀角屑各三分麥門冬一兩去心焙右麄羅為散每服一錢以水一小盞入竹葉七片煎至五分去渣分為二服日四服量兒大小加减安神散一名安神湯截癎安神除熱白茯苓二兩石菖蒲一寸九節白鮮皮人參去蘆頭逺志各一兩石膏半兩犀角甘草炙各半兩右為麄末每服一錢水一盞入麥門冬少許煎至五分去滓放温服時與服退熱清凉散治小兒壯熱欲發癎宜服白藥子甘草炙微赤剉欝金黄芩天竺黄細研各一分麝香半分細研硃砂半兩細研水飛過右細羅為散都研令勻不計時温水調下半錢量兒大小加减牛黄丸治小兒驚熱入心擬成癎疾面色不定啼哭不出發熱作時不喫乳食大便秘􅉣眼飜露白手足逆冷牛黄細研川大黄剉細微炒獨活各一分川升麻琥珀菉豆粉大麻仁各半兩右𢷬羅為末煉蜜丸如梧桐子不計時侯以熟水研一丸服之至五七嵗金銀箔各五片藥兩丸研化下獨活散袪風截癎獨活羗活川升麻細剉酸棗仁揀淨人參去蘆頭已上各一兩川大黄細剉微炒各半兩右為細末每服一錢水一小盞入金銀薄荷各少許煎至五分去渣放温服不拘時候定心膏安神治欲發癎竹瀝半合依法旋取大麻仁研一分生葛根取汁合許如無生者只用乾葛剉細水浸一宿慢火熬取汁已上三味同研次入硃砂半合依法旋取牛黄麝香各一錢菉豆粉一兩已上並研勻右與石臼中𢷬二三百下成膏如鷄頭大每服一粒至二粒煎人參湯下清凉丹治壯熱連滯欲作癎欝金黄芩犀角末各一分白芍藥半兩已上𢷬羅為細末次用腦麝各研一錢天竺黄一分細研好硃砂半兩細研水飛右拌勻煉蜜和如鷄頭大每服一粒至二粒煎人參湯化下知母散治心熱弄舌欲作癎知母一兩釣藤升麻葛根剉黄芩各一分藍葉人參去蘆頭各半兩右為細末每一錢水八分入竹瀝三兩㸃同煎至五分去滓放温服地黄汁湯治少小始滿月變蒸時患驚欲作癎已服四味湯及紫圎已大下熱猶不折腹滿眼目視髙者宜此除熱地黄升半合黄芩三分大黄甘草炙各一分梔子仁二分右切以水八合煮至四合去滓下地黄汁服一合日進三服夜一服洗浴菖蒲湯治散風截癎菖蒲三兩一十九者節防風荆芥穗各二兩石膏梅根各一兩右為麄末每用五匙頭水三碗煎三五沸適寒温浴兒先頭面次浴身體為佳救急中軍候黒丸療諸癖結痰飲等大良及治小兒欲發癎杏仁去皮尖五分兩仁者熬桔梗桂心各四分巴豆八分去心皮熬芫花十二分熬右先𢷬桂心桔梗芫花成末别𢷬巴豆杏仁如膏合和又𢷬一千杵下蜜又搗二千杵丸如胡豆大漿水服一丸取利可至二三丸兒生十日欲癎發可與一二丸如黍米大諸腹不快體中覺患便服之得一兩行利即好忌猪肉生葱蘆笋等物不拘時服雞腦丸治少小癎候夜啼不止雄雞腦丹砂各二分牛黄當歸各一分右為末以雞腦和杵七百下丸麻子大百日兒服一丸日二服量大小加减茯苓湯治七日兒生後有熱欲作癎茯苓黄芩釣藤大黄各一分右切以水一升煮三合為三服或五服日多者加黄芩一分生三七以後者加大黄一分量兒大小加减生薑子治小兒欲發癎極熱不已生葛根汁竹瀝各一分牛黄如杏仁大細研右相和每服半合量兒大小加减服洗浴石膏湯治小兒欲發癎壯熱如火石膏五兩菖蒲二兩雷丸三兩右𢷬碎以水煮取三升適寒温浴兒并洗頭面佳雀屎丸治少小癎候胎寒舌下唾聚夜啼不止雄雀屎炒麝香牛黄研入各一分右為末蜜丸黍米大一月兒與一丸日一服時極送藥看咽中吃乳食令即咽喉不久停口中而散也後稍加之百日兒麻子大一丸日三臨服旋丸勿先丸下四十日而後牛黄麝香可加使多也為是一嵗兒也五苓散治小兒因吐利欲作癎宜服方見傷寒門傷寒類普濟方卷三百七十八
