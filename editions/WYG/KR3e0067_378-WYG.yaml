body:
  text: 普濟方卷三百七十八明周王朱橚撰嬰孩一切癎門驚癎附論夫小兒氣血微弱易為病若卒驚動傷亂精神心氣不定因驚而發為癎凡養小兒當須持䕶或見異類必當撫抱無令恐怖若初覺兒驚急保抱之其驚自止若忽因驚成癎宜按圖灸亷以摩膏不可大下葢以心氣不足若下之則内愈虚手足抽掣者並不可持捉使氣血凝滯失其道耳夫驚癎忤三候大抵略相似皆口面青黒嘔吐涎沫頭項直手足搖動但驚即發拳癎搐搦忤即掣瘲驚則喉中涎響癎則口中涎出響忤則口吐青黄白沫驚則雙目視癎則口眼相引而目睛上搖忤則眼不正挿不可得而同也方歸魂散治小兒驚癎忤手足瘲頭項强直狀如角弓蝎稍一錢半炒蜈蚣赤脚者半條炙水銀粉腦麝各一字花蛇肉酒浸炙黄色秤一錢川烏頭尖七箇生天南星切碎用生薑汁浸一日為末秤半錢右為末每服嬰孩半字二三嵗一字已上四五嵗半錢金銀薄荷湯調下量兒虚實加减清心丸治小兒驚癎潮搐精神昏慢痰涎流溢并虚實煩躁頭疼惡心風眩不語嘔吐倦怠牛黄三錢腦子雄黄各二錢麝香一錢川芎茯苓柴胡桔梗各四兩蒲黄芍藥各二兩犀角鎊白术黄芩黒豆炒阿膠炒各半兩麥門冬去心半兩杏仁去皮尖半兩人參神麯炒各三錢肉桂去皮一分羚羊角屑一兩乾薑炮一分山藥一兩三分甘草一兩半金箔三百片右為末煉蜜丸雞頭大金箔為衣一丸竹葉湯化下蚱蟬煎治小兒驚癎頻頻發動經久不瘥肌體瘦弱蚱蟬三枚微炙去趐足麻黄去根節釣藤各一分柴胡去苗白芍藥犀角屑知母沙參去蘆頭甘草炙微赤剉杏仁湯浸去皮尖雙仁知膏各半兩蛇蜕皮五寸燒灰生地黄汁五分石膏子芩蜜龍齒各一兩右除薑汁地黄汁蜜杏仁牛黄外並細剉先以水二盞煎至一盞去渣入竹瀝一小盞又煎五七沸内杏仁蜜薑汁地黄汁慢火煎攪不停手約十餘沸放冷於甆合中盛牛黄攪令勻每一合分為三服煮量兒大小加减烏蛇牛黄散治小兒驚癎風癎手足瘈瘲口眼相引烏蛇項下七寸酒浸一宿去皮骨炙秤一錢青黛研二錢蝎稍炒十枚牛黄炒半錢麝香研一字蓬研龍腦研水銀沙子各半錢金箔銀箔並研各十片蛇黄醋淬三遍天南星用生薑一同𢷬作餅子焙乾墨燒半夏用生薑同𢷬作餅子焙乾一錢烏蛇尾酒浸一宿去皮骨炙秤一錢右研為散每服半錢量兒大小加减金銀薄荷湯服鎮心丸治小兒驚癎百病鎮心氣銀屑十二銖水銀二十銖牛黄六銖大黄六分茯苓三分茯神人參逺志防已白歛雄黄芍藥各二分紫石英真珠防葵鐵精各四分右先以水銀和銀屑研如泥别治諸藥和丸三嵗兒如麻子大二丸隨兒大小增之一方無牛黄延壽丹治小兒驚癎及大人卒中惡風涎潮昏重口眼喎斜四肢痑拽口噤不省大效辰錦砂膩粉鐵熖粉白附子各二兩蛇黄用醋浸少時以大火煆過大附子炮各九兩天南星生淨洗羗活巴豆搥碎用新水浸逐日換水七日後以紙褁壓出油用牛藤去苗酒浸焙蝎稍各三兩生金生銀各别研一分麝香真牛黄各别研一兩一分右為細末以蜜丸粟米飲搜和為丸如雞頭大每中惡風痑緩及五疾薄荷酒磨下一丸老兒半丸小兒驚癎十嵗已上一丸石膏散治小兒一嵗至四嵗壯熱大驚發癎方見本門一切癎類牛黄酒治少小驚癎經年小勞輙發牛黄鍾乳研各八分麻黄去節秦艽人參各八分桂心七分龍角白术甘草當歸細辛各五分杏仁四分蜀椒蜣蜋九枚炙右切以絹袋中酒五升浸之隨時月數半合日三治小兒驚癎客忤發動鎮心安神麝香當門子一粒丹砂一塊大小相似右細研熟水灌之䲭頭丸治小兒驚癎發動經年不斷根源䲭頭炙焦一枚蜣螂去足炙七枚桂皮去粗皮一兩一分芍藥一兩蛇蜕炙五寸蚱蟬去趐足炙十枚白茯苓去黒皮一兩一分一方用茯神半兩露蜂房炙半兩甘草炙剉黄芩去黑心當歸切焙芎藭丹參各一兩麝香研一分牛黄研半兩莨菪子酒浸一宿暴乾蒸熟八合大黄濕紙褁煨二兩右𢷬羅為末煉蜜和丸如小豆或如黍米大臨時量兒大小虚實與服温酒下牛黄散治小兒驚癎發無時候牛黄細研赤芍藥露蜂房黄芩人參去蘆頭葛根剉甘草炙微赤剉蚱蟬去翅足微炒芎藭川芒硝蜣蜋微炙桂心各一分當歸剉微炒石膏各半兩蛇蜕皮五寸炙黄川大黄半兩剉碎微炒杏仁一分湯浸去皮尖雙仁麩炒微黄右件藥𢷬羅為末散每服一錢水一小盞煎至五分去滓温服更量兒分四服四嵗已下一丸分五服新生孩兒一丸分七服並用蜜水磨下如中風者髮直面如桃色口眼俱閉喉中作聲汗出如油及汗出不流多要下泄或瀉血者並是惡候更不用服唯口噤眼開者藥下立瘥如患痙雖風壅塞氣息不通將絶者急化一丸生薑薄荷酒下必效牛黄丸治少小痰實結癖或腹内堅强驚癎百病牛黄𤣥參乾薑各二分苦參丹參桔梗甘草人參各四分甘遂炒沙參各五分䗪蟲十四箇大黄十二分蜀椒四分出汗巴豆一百枚去皮心炒别研入葶藶一合半炒右為末蜜丸如小豆大一服二丸米飲下歸魂丸治小兒驚癎搐搦涎潮昏塞史君子兩枚以麵褁於慢火中煨候麵黄為度去皮不用水銀結沙子香墨蘆薈熊膽研臘茶研乳香研龍腦各一錢研蝎稍三十枚炒天竺黄青黛研丹砂研各半錢輕粉二錢寒食麵一錢半右同研令勻細滴水丸如菉豆大每服一丸薄荷蜜水化下如小兒稍覺驚者化半丸與喫若能常服永無驚疾量兒大小加减鎮心丸治小兒驚癎金銀箔各細研五十片防葵半兩水銀以少棗瓤研令星盡鐵粉細研真珠末紫石英細研水飛過雄黄細研人參去蘆頭白芍藥各半兩牛黄細研逺志去心白歛各一分漢防已川大黄剉碎微炒茯苓各三分右為末入研了藥都研令勻煉蜜和丸如菉豆大每服以薄荷湯研下三丸日三服看兒大小加减柴胡煎治小兒驚欲作癎柴胡去苗升麻梔子仁芍藥各三分釣藤各一分凝水石研黄芩生葛汗合知母切焙各一兩甘草炙一分蜜二合杏仁湯浸去皮尖雙仁炒别研半兩淡竹葉細剉三握右麄𢷬篩以水三升入銀石銚内文武火煎至一升綿濾去滓再入鍋内下蜜并葛汁杏仁等煎如餳以甆器盛百日兒每服如菉豆大一嵗如杏仁大日三服更量大小加减温漿水化破服萬病丸治小兒驚癎乳癖雄黄研丹砂研麝香研龍腦研蘆薈研木香㯽榔剉各一分牛黄研半兩胡黄連一分青黛研半兩巴豆去心皮膜研出油盡桂去粗皮人參各分右研為末煉蜜丸如小菉豆大每服一丸至二丸温水下更量大小加减十五嵗已下常服永無諸疾虎睛丸治小兒驚癎邪氣皮肉壯熱嘔吐心煩不得安睡虎睛一對細研牛黄天竺黄麝香各細研一分川大黄一兩剉碎微炒川升麻釣藤甘草炙微赤剉犀角屑梔子仁各半兩蚱蟬蜣螂各去翅足微炒三枚蛇蜕皮五寸燒灰右為末煉蜜和丸如菉豆大三嵗兒以粥飲研三丸量兒大小加减鉛霜丸治小兒驚癎發熱搐搦不定鉛霜細研馬牙各半兩硃砂細研水飛過鐵粉細研各一兩麝香細研半分川大黄細碎微炒人參去蘆頭各三分羗活芎藭白茯苓牛黄細研乾蝎微炒龍膽去蘆頭各一分右為末入研了藥同研令勻煉蜜和丸如菉豆大每服不計時候荆芥薄荷湯下五丸量兒大小加减牛黄豚血湯治小兒驚癎掣縮不止豚血牛黄當歸大黄人參各四分蜣螂蚱蟬各三枚炙川芎黄芩各八分葛根十二分鼠屎四兩蛇蜕五寸蜂房八分右以酒五升煮取四升去滓服二合日三夜二此論一嵗兒耳三嵗兒服三合神效保和丸治小兒癎身熱手足瘈瘲目睛上視狀如中風丹砂研一錢蝎稍二十箇雄黄研二錢蘆薈研熊膽研各半錢蛇蜕燒灰一錢𤓰蔕二十枚蟾酥一皂子大湯浸膩粉研龍腦研麝香研牛黄研各半錢右𢷬研如粉用浸蟾酥并麵糊同研為丸如黍米大每服用倒流水先化一丸滴鼻内良久􅅉訖即用薄荷水一丸青金煎治小兒驚癎積熱痰涎咳𠻳天南星牛膽内匱者半馬牙硝研天竺黄研各一分青黛研一兩龍齒研蟬蜕去土為末各半兩鉛白霜研蓬砂研各一分甘草生末三分麝香研一錢牛黄研各一錢右研勻細蜜和為膏甆合内收每服一小鷄頭實大更量兒大小加减薄荷水化下大釣藤飲治小兒驚癎壯熱釣藤黄芩去黑心麻黄去節各一兩一分龍齒研一兩甘草研二兩半石膏研二兩半赤芍藥去黑心桂龍膽去土牛黄研一兩杏仁去雙仁皮尖麩炒研半兩右麄𢷬篩十味每服三錢七水一盞煎至六分去滓下牛黄杏仁膏加白蜜竹瀝各少許煉如餳湯調服如人行五里再服虎睛丸治小兒驚癎邪氣身熱嘔吐下痢五色虎睛一枚研牛黄研麝香研各半分升麻釣藤生犀角桂去粗皮各一分山梔子一兩蚱蟬炙去頭足翅蜣螂蛇蜕皮五寸燒灰大黄蒸二度剉焙二兩右研為末煉蜜丸如梧桐子大每服三丸至五丸食後米飲研下日再服癲癎湯治大人風引少小驚癎瘈瘲日數十發醫所不療除熱大黄乾薑龍骨各四兩桂枝三兩去皮千金用五兩甘草炙牡礪各二兩熬千金各同五兩外宜各三兩凝水石滑石赤石脂白石脂石膏紫石英各六兩外臺此六味各八兩右杵麄篩以韋囊盛之取三指撮井花水三升煮三沸去滓温服一升巢源脚氣宜風引湯千金紫石煮散與此方治療藥味皆同外臺崔氏紫石湯療藥味亦同有分兩不同者各注于下注云永嘉二年大小兒頓行風癎之病得發例不能言或發熱半身掣縮或五六日或七八日死張思惟合此散所療皆愈此方本仲景傷寒論方鎮驚丸治一切驚癎紫石英燒醋淬研鐵粉茯神逺志肉薑製焙人參琥珀滑石南星炮蛇黄煆醋淬各一分龍齒熊膽半分輕粉右為細末煉蜜丸硃砂為衣桐子大每服一丸金銀湯調下或用猪乳調拭入口中牛黄丸治少小癖實驚癎百病牛黄芒硝甘草炙人參各四分甘遂炒沙參各五分䗪蟲十四枚大黄十二分蜀椒四分出汗巴豆一百枚去皮心炒黄别研入葶藶一合半炒真珠末右為末蜜丸如小豆大一服二丸飲下紫石英散治小兒風熱驚癎手足掣縮日數發者紫石英一兩寒水石一两龍骨半兩牡礪半兩滑石一兩赤石脂半兩藍葉一分川大黄一兩剉碎微炒石膏一兩白石脂桂心甘草各半兩炙微赤剉右件藥𢷬羅散每服一錢水一小盞煎至五分去渣量兒大小加减温服人參湯治小兒邪熱驚癎口噤人參一兩木通剉黄芩去黒心升麻各半兩龍齒研三分犀角鎊炒赤茯苓去黒皮剉鐵粉研各半兩蜣螂十枚去足炒釣藤半兩蚱蟬去足趐炙二七枚右麄𢷬篩三四嵗兒每服一錢水一盞煎至五分入竹瀝少許更煎三兩沸去渣分為三服日三更量大小加减虎睛丸治小兒諸驚癎兼壓驚鎮心藏丹砂研一兩虎睛研一對牛黄研麝香研犀角末各一兩釣藤四兩白茯苓去黒皮剉黄芩去黒心人參梔子仁各一兩大黄濕紙褁煨熟剉二兩右𢷬研為末煉蜜丸如鷄頭大每服一丸或二丸煎金銀湯化下人參湯亦得更量兒大小加减聖濟用龍腦一錢半鎮心丸治小兒驚癎銀箔研一百片大黄剉炒丹砂研各一兩蜣螂三枚去頭足炒升麻黄芩去黒心犀角屑梔子仁龍齒麥門冬去心焙鐵粉各一兩右𢷬研為末煉蜜丸如梧桐子大食後及乳後新汲水研一丸灌之三嵗及五嵗兩丸至三丸七嵗至十嵗五丸如大人患者温漿水下十五丸如冬月以温水研灌之釣藤子芩湯治小兒驚癎體虚升麻一兩黄芩沙參各三兩知母焙犀角鎊各一兩釣藤蛇蜕皮蚱蟬三枚炙去翅頭足柴胡去苗甘草炙剉白术半兩各右麄𢷬篩以水二升煎去渣取六合入蜜二合竹瀝三合再煉如餳每服一錢微微與服以意量之竹瀝湯療暴得驚癎立驗方釣藤茯神黄芩升麻