稍熱服衣覆出汗若大便鞕小便自利去桂加白术一兩三錢治傷寒中風骨節疼痛煩悶不得屈伸近之則痛劇汗出短氣小便不利惡寒或身微腫麻黄二兩去根節附子一兩炮製去皮臍白术桂心各二兩赤芍藥甘草各一兩炙微赤剉右為㪚毎服四錢以水一中盞入生薑半分煎至六分去滓温服日四五服柴胡㪚治傷寒中風汗後虛躁頭疼四肢乏力柴胡一兩半去苗石膏三兩人參去蘆頭茯神枳實麩炒微黄桑根白皮剉麥門冬去心各一兩桂心白术防風去蘆頭地骨皮甘草各三分炙微赤剉右為㪚毎服四錢以水一中盞入生薑半分煎至六分去滓温服日三服夜一服藿香㪚治傷寒中風頭昏皮膚疼痛藿香一兩白附子半兩炮製零陵香一兩半夏半兩湯浸七遍去滑甘松香一兩川烏頭半兩炮裂去皮臍牛黄細研射香各一錢細研右為細㪚與牛黄麝香同研令匀毎服以熱葱酒調下二錢日三服夜一服天麻㪚治傷寒中風筋脉拘急天麻附子炮製去皮臍川烏頭炮裂去皮臍乾蠍微炒石膏白附子炮製天南星炮製各半兩雄黄一分細研麝香一錢細研右為細㪚毎服生薑湯調下一錢日三四服白附子㪚治傷寒中風頭疼項强身體壮熱服諸藥不得汗者用白附子附子天麻各半兩天南星硃砂細研乾蠍各一錢半夏烏頭各半分麻黄半兩去根節右為細㪚入研了朱砂令匀毎服以生薑湯調下一錢良久以熱葱豉粥飲投之當便出汗烏頭㪚治傷寒中風語澀四肢拘急壮熱川烏頭半兩炮裂去皮臍防風去蘆頭羗活各一分丹參麻黄去根節各半兩桂心白术各一分乾蠍一分微炒黒豆一合炒熟右為細㪚毎服不計時候以熱酒調下二錢良久再服以汗出為度治傷寒中風頭强汗不出煩悶麻黄去根節防風各一兩去蘆頭川烏頭炮裂去皮臍桂心乾薑各半兩炮製剉右為㪚毎服不計時候以温酒調下二錢頻二服以衣覆之汗出為度桂苓甘露㪚治傷寒中風冐暑飲食内外一切所傷傳受濕熱内甚頭痛口乾或吐㵼煩渇或小便赤澀大便急痛或㵼痢間作病一切濕熱霍亂吐㵼轉筋急痛腹滿痛悶或中外諸邪所傷而并吐㵼者温之熱時尤宜服之桂半兩茯苓白术各半兩甘草炙澤㵼石膏寒水石各一兩滑石二兩右為細末熱湯調下三錢欲飲冷者新水調下或生薑湯調下尤良小兒服一錢一方有猪苓半兩薑附湯治傷寒已經轉下又當發汗内外俱虛邪氣未解表証不見身無大熱晝日煩躁不得眠睡夜即安静不嘔不渇脉候沉細者宜服之又治暴中風冷久積痰水心腹冷痛霍亂轉筋一切虛寒並皆治之乾薑一兩附子生去皮臍細切一枚右令勻毎服三錢水一盞半煎至一盞去滓食前温服桂枝麻黄各半湯治風症見寒脉寒症見風脉桂枝二兩麻黄芍藥生薑各半兩杏仁十四个大􅀥二个右為㪚毎服四錢煎温服羗活湯治傷寒協熱羗活麻黄去節石膏細辛去苗前胡川芎防風各一兩黄芩枳殻炒去穣甘草炙各半兩薄荷葉一分右為麄末每服五錢水二盞薑三片煎至一盞去滓温服細辛湯治傷風協寒細辛去苗甘草炙各一兩麻黄去節桂枝去麄皮各二兩杏仁半兩去皮右為麄末毎服五錢水二盞煎至一盞去滓服神术㪚治傷風肌踈多汗蒼术二兩泔浸去皮薄切用麥麩炒川芎藁本洗荆芥各一兩右為麄末毎服五錢水二盞薑三片煎一盞去滓熱服十􅀥湯治太陽中風吐下嘔逆者芫花熬甘遂大㦸各等分右各篩末取大􅀥十枚水一升半煮取八合去滓内諸藥强人一錢嬴人半錢温服之不下明旦更加半錢下後糜粥自養病懸飲者亦主之治傷寒鼻塞右以東霜作團食之普濟方卷一百三十一
