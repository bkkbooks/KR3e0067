出聖濟縂録治婦人月水欲下臍腹撮痛不可忍吳茱茰湯浸七遍焙乾三分當歸㣲炒桃仁去皮尖雙仁麩炒黄各一両一分大黄剉碎㣲炒朴硝桂去粗皮牛膝去苖酒浸切焙黄耆剉芎藭人参各一両右為末煉蜜和丸搗勻熱丸如梧桐子大空心酒下三十丸加至四十丸日三服或為散子温酒調服一錢蓬莪茂散出聖惠方治婦人胞絡夙挾風冷每至月事來時臍腹多痛宜服蓬莪茂當歸剉㣲炒各一両桂心芎藭牡丹皮木香延胡索赤石脂各半両桂仁三分湯浸去皮尖雙仁麩炒㣲黄右為末每於食前温酒調下一錢桃仁湯出聖濟縂録治月事不利或将下小腹痛桃仁去皮尖雙仁麩炒㣲黄五枚乾薑炮製木香芍藥吳茱茰㣲炒當歸㣲炙各一両甘草炙半両桂去粗皮一両半大黄剉碎炒熟二両右粗搗篩每服二錢水一盞煎至七分去滓入硝少許更煎一両沸温服琥珀煎丸治婦人經水不行臍腹絞痛當歸芎藭熟地黄赤芍藥各一両川楝子𤣥胡索蓬术琥珀另研各半両香附子両半右除琥珀在外八味用好酒各一大碗煮乾焙過研為細末入琥珀醋糊為丸如梧桐子大每服五十丸醋湯下空心服之熟乾黄散出聖惠方治婦人月水每來不得快利臍腹下疼痛不可忍熟乾地黄三分菴䕡子延胡索當歸剉㣲炒木香京三稜㣲煨剉蓬莪茂桂心赤芍藥各半両右為散每服三錢以水一盞生薑半分煎至六分次入酒二合更煎三両沸去滓食前稍熱服乾漆丸出聖惠方治婦人夙有血滯至月水來時臍腹疼痛乾漆一両搗碎炒令烟出桃仁酒浸去皮尖雙仁麩炒㣲黄芫花醋拌炒令乾赤芍藥當歸剉㣲炒桂心各三分木香㯽榔硇砂各半両右為末醋煮麫糊為丸如梧桐子大每服不拘時候以生薑酒下七丸金漆丸出聖惠方治婦人夙血積滯每至月水來時臍下疼痛金漆硫磺沒藥鬼箭羽當歸剉㣲炒搗末各一両水銀與硫磺絡為炒子細研硇砂細研各半両巴豆一分去皮心紙裹壓去油狗膽四枚乾者搗碎右先将水銀砂子及巴豆同研勻以釅醋一升半熬金漆令稠下諸藥末和丸如梧桐子大每於食前温酒下三丸當歸飲出聖濟縂録治婦人月水不調及欲來臍下痛肢體煩熱當歸㣲炒肉豆蔲去殻厚朴去粗皮生薑汁炒令烟出甘草炙芍藥枳殻去穣麩炒黄白茯苓去黒皮人参各半両右粗搗篩每服三錢水一盞煎至七分去滓空心温服麒麟竭散出聖惠方治婦人月信來時臍腹痛如錐刀所刺麒麟竭芫花醋拌炒令乾芎藭桂心當歸剉㣲炒延胡索琥珀已上各半両麝香一分研入右為細散每於食前以熱酒調下一錢䗪蟲散出聖惠方治婦人月水每來臍腹疼痛時發寒熱靣色痿黄䖟蟲十枚㣲炞芎藭當歸剉㣲炒女青赤芍藥已上各二両川大黄半両㣲炒桂心半両川椒一分去目及閉口者㣲炒出汗右為細散每於食前以酒調下一錢大黄湯出聖惠方治婦人月水來腹痛臍下堅硬積血不止大黄剉碎㣲黄厚朴去粗皮生薑汁炙烟出如此七遍一両一分芎藭一両一分朴硝當歸芍藥各一両右粗搗篩每服三錢水一盞生薑三片煎至七分去滓温服行即止服治月經往來腹臍腫腰痛出千金方䗪蟲四枚蜀椒乾薑各六分桂心女青芎藭各半両右治下篩取一刀圭先食酒服之日三十枚㣲下善養之芍藥湯出聖濟縂録治婦人月水來腹臍痛煩悶體熱芍藥人参厚朴去粗皮生薑汁炙烟出各一両當歸㣲炒甘草枳殻去穣麩炒各三分肉豆蔲去殻半両右粗搗篩每服三錢水一盞煎七分去滓温服不拘時候七聖散治月事方來腹痛難忍當歸一両酒浸桂心不見火好者蒲黄麝香少許白芍藥川芎各七錢半𤣥胡索半両右為細末每服二錢空心鹽湯調下䗪蟲散出聖惠方治婦人月水每來腰腹疼痛䗪蟲四枚㣲炒芎藭桂心各半両女青川大黄剉㣲炒川椒去目及閉口者㣲炒出汗乾薑炮製剉各一分右為末散每服於食前以温酒下一錢朴硝丸出聖惠方治婦人夙有血積月水不來時腹中疼痛宜下之川朴硝當歸剉㣲炒薏苡仁川大黄剉㣲炒黄二両代赭牛膝去苖桃仁湯浸去皮尖雙仁麩炒黄各一両右為末煉蜜和𢷬二三百杵丸如梧桐子大每於食前以温酒下十丸硇砂丸出聖惠方治婦人乆積虛冷四肢羸痩飲食㣲少月水來時臍腹疼痛不可忍硇砂以漿一升熬如膏當歸剉㣲炙琥珀附子炮製去皮臍没藥桂心木香已上各一両右為末以棗肉並硇砂膏同和搗三五百杵丸如梧桐子大每於食前以温酒下十五丸温經湯出聖濟縂録治婦人月水來腹内疼痛不可忍白茯苓去粗皮半両芍藥土𤓰根丹皮去心各一両半丹砂别研如粉薏苡仁各一両右除研外粗搗篩即以丹砂和勻每服三錢水七分酒三分共一盞同煎七分去滓温服不拘時候芎藭散出聖惠方治婦人月水每來臍下疼痛四肢煩疼芎藭桂心桃仁湯浸去皮尖雙仁麩㣲炒吳茱萸湯浸七遍焙乾㣲炒當歸剉㣲炒各三分厚朴一両去粗皮塗生薑炙令香熟右為散每服三錢以水一盞煎至六分去滓食前稍熱服琥珀散出聖惠方治婦人月水每來心間刺痛腹内疼結琥珀牛膝去苖當歸剉㣲炒赤芍藥各三分沒藥半両芫花一分醋浸炒令乾右為細末散每服於食前以温酒調下一錢硃砂丸出聖惠方治婦人血海風冷月水每來攻刺臍腹疼痛面色痿黄四肢無力硃砂細研水飛過硇砂細研各一両半夏湯洗七遍去滑木香各一両當歸一両半剉㣲炒巴豆一分去皮心研紙裹壓去油右為末都研令勻以釅醋一升和狗膽一枚汁煎如稀􅄳和丸如菉豆大每於食前以醋湯調下二丸琥珀丸出聖濟縂録治婦人虛冷月水凝澀不利腹内疼痛四肢煩熱皮膚癮胗飲食减少琥珀别研木香禹餘粮煆醋炙白术芍藥桂去粗皮鼈甲去裙襴酒炙令香附子炮製去皮臍羗活去蘆頭蓬莪茂炮剉細辛去苖葉丹皮去心肉豆蔲去殻人参京三稜炮剉黄耆剉各一両當歸㣲焙㯽榔剉枳殻去穣麩炒各一両半柴胡去芦芎藭安息香半両研桃仁湯浸去皮尖雙仁麩炒黄色各二両右為末以生地黄自然汁一碗與藥末同拌次用酒煮麫糊為丸如梧桐子大每服二十丸空心温酒下華撥丸治婦人無時月水來腹痛方見本門血氣心腹疼痛類治女子忽得小腹中痛而經月初來便覺腰中切痛連脊間如刀錐所刺痛不可忍者衆醫不别謂是鬼疰妄服諸藥終無所益其疾轉増審察前状相當即用此藥右取積粟草以夏五月正放花時採取暴乾搗篩為散女子有患前件病者取二寸匕和好醋二小合和令勻平旦空腹頓服之每日一服以知為度如女子先冷者即取前件藥五兩加桃仁二百枚去皮尖熬搗為散以蜜為丸如梧桐子大每日空腹以飲酒調下二十丸再服以疾愈為度忌麻子蕎麥芫花散出聖惠方治婦人血海風冷月水每來攻腹臍疼痛靣色痿黄四肢無力芫花一分醋拌炒令乾當歸剉㣲炒木香各半両右為散不計時候以酒調下一錢羗活散出聖濟縂録治室女經絡凝滯攻腹疼痛肢體煩熱骨莭痠倦羗活去蘆頭桂去粗皮牡丹皮芎藭枳殻去穣麩炒芍藥延胡索當歸切焙甘草炙大黄剉炒木香各半両右為散每服二錢温酒調下不拘時候地黄散出聖濟縂録治室女不利血氣月水即少腹刺痛生地黄一両焙生薑切作片四両烏豆二合當歸切一両右同入銀石器中漫火炒燥搗羅為散每服二錢温酒少許調空心日午臨卧時服芍藥散出聖濟縂録治室女月水不利來時腹痛芍藥當歸切焙芎藭各一両乾薑炮半両右為散每服二錢温酒調下不拘時候牛膝散出聖濟縂録治室女月水來腹痛牛膝去苖酒浸切焙牡丹皮當歸切焙丹参各一両朴硝别研桃仁去皮尖雙仁麩炒芍藥桂去粗皮木香黄芩去黒心人参各一両生地黄焙二両半右搗研為散每服二錢温酒調下或用水一盞生薑三片煎取七分空心食前温服亦得牡丹散出聖濟縂録治室女月水來不利腰腹痛牡丹皮芍藥㯽榔剉當歸切焙白术芎藭赤茯苓去黒皮生乾地黄焙莎草根炒去毛桂去粗皮麥蘖各半両炒人参一両右為散每服三錢水酒共一盞煎至七分去滓空心温服未瘥再服蓬莪茂散出聖濟縂録治室女月水欲行攻臍腹疼痛蓬莪茂煨一両當歸切紅芍藥芎藭蒲黄桂去粗皮延胡索烏藥没藥别研五靈脂各半両乾薑炮一分右為散每服二錢温酒調下食前日午卧時服沒藥丸出聖濟縂録治室女月事不快欲來即攻臍腹疼痛腰體沉重飲食不進沒藥研牡丹皮京三稜煨連皮大腹剉芍藥當歸研桂去粗皮木香各一両丹砂細研半両蘹香子炒丁香炒各三分右為末煉蜜為丸如雞頭實大每服一丸温酒化下淡醋湯亦得桑耳丸治室女月水不利或來或不得宣通攻擊臍腹疼痛桑耳菴䕡子桂去粗皮芎藭人参牛膝去苖酒浸切焙赤茯苓去黒心白芍藥各一両半大黄剉炒一両生乾地黄焙一両甘草炙半両右為末煉蜜和丸如梧桐子大每服二十丸空腹温酒下一方用土𤓰根去人参沒藥丸治室女血氣凝澀月水欲行攻腹臍疼痛沒藥研延胡索各一両高良薑剉乾膝炒烟出桂去粗皮炙半両當歸切焙牛膝酒浸切各一両牡丹皮乾薑炮各半両右搗研為末醋煮麫糊為丸煎麴湯下空心食前服二十丸如梧桐子大牛膝湯治室女血氣凝澀月水來不快利少腹疼痛煩悶牛膝去苗酒浸切焙一両菴䕡子㣲炒當歸切焙芍藥芎藭各半両土𤓰根洗切一両朴硝别研牡丹皮去心桂去粗皮各三分右粗搗篩每服三錢水一盞煎至七分去滓温服草豆蔲湯治室女月水不利攻刺腹痛草豆蔲去皮三枚當歸切焙厚朴去粗皮生薑炙甘草芍藥各一両枳殻去穣麩炒白茯苓去黒心人参各三分右粗搗篩每服三錢水一大盞煎至七分去滓温服不拘時候六神散治室女血臟虚冷月水凝澀欲來攻臍腹撮痛當歸切焙延胡索烏藥剉烏頭去皮臍炮製青橘皮去白炒各一両乾膝炒烟出半両右為散每服二錢温酒調下空心日晚再服當歸丸治室女氣血不和月水欲來先攻腹刺痛當歸切炒二両㯽榔生剉赤芍藥牡丹皮延胡索各一両右為末醋煮麫糊為丸如梧桐子大每服二十丸温酒下空心日晚再服一方以當歸用米醋一升二合熬成膏入衆藥末和丸普濟方卷三百三十四
