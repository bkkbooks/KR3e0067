body:
  text: 普濟方卷三百三十四明周王朱橚撰婦人諸疾門月水不利附論夫婦人月水不利者由勞傷血氣致令體虛而受風冷客於胞内損傷衝任之脉手太陽少隂之經故也衝任之脉為經脉之海皆起於胞内手太陽小腸之經也手少隂心之經也此二經為表裏主下為月水風冷客於經絡摶於血氣血得冷則壅滯故令月水來不宣利也􅐷其脉從寸口來至狀如琴絃若腹痛月水不利孔中生瘡又左手關上脉沉厥隂經也沉為隂主月水不利腹腰痛尺脉滑血氣實經絡不利又尺脉來而斷絶者月水不利也又寸關調如故而尺脉絶至者月水不通利當患小腹引腰痛氣滯上攻胞膈也方澤蘭丸出聖濟總録治婦人月水不利累月不快身熱煩熱骨莭沉重日漸羸痩澤蘭葉鍾乳别研細辛去苖葉黄耆剉各三分大黄剉炒熟地黄焙逺志去心各半兩紫石英别研三分白芷苦参栢子仁㣲炒蜀椒去目并閉口者炒出汗白术芎藭附子炮裂去皮臍麥蘖炒吳茱萸湯浸焙亁炒陳麯炮前胡去蘆大棗去核炒各半両丹参枳殻去穰麩炒芍藥桔梗炒秦芁去苖土當歸沙参桂去麄皮厚朴去粗皮生薑汁炙石斛麥門冬去心焙各三分人参半両右為細末煉宻和丸如梧桐子大每服二十丸空心服温酒下漸加至三十丸白薇丸出醫方大成治婦人月水不利四肢羸痩喫食减少漸覺虛乏故令無子白薇白术當歸白芍藥栢子仁桂心附子萆薢吳茱萸木香各半両紫石英一両細辛川芎㯽榔各半両熟地黄二両牡丹皮一両人参石斛白茯苓澤蘭葉川牛膝各三分右為末煉蜜為丸如梧桐子大每服三十丸空心及晚食前温酒下薏苡仁丸出聖濟縂録治婦人月水不利胸脇痞滿臍腹刺痛手足煩熱宜服薏苡仁一両乾薑炮製附子炮製去皮臍吳茱萸湯浸七遍焙乾㣲炒大黄剉炒芍藥各一両黄芩去黑心生乾地黄㣲炒當歸㣲炒桂去白术各半両蜀椒去目并合口者炒出汗人参石韋去毛微炒各一分桃仁湯浸去皮尖雙仁麩炒黄色三十枚右為末煉蜜為丸如梧桐子大每服二十丸温酒下三服當歸湯出聖濟縂録治婦人經脉不利腰腹刺痛拘倦少力嘔吐惡心怠惰多睡頭眩眼澁日漸羸痩飲食减少當歸切焙紅藍花延胡索紫葳各一両琥珀半両研牡丹皮薑黄牡䝉鬼箭羽各三両麒麟竭桃仁去皮尖雙人麩炒菴䕡子藕莭切焙没藥研桂去麄皮各一両右麄搗篩每服三錢水一盞同煎至七分去滓空心食前温服如無牡䝉亦得大黄朴硝湯出千金方治經年月水不利胞中有風冷所致宜下之大黄牛膝各五両朴硝牡丹皮紫􅁐各三両千金冀作紫葳代赭一両桃仁蝱蟲水蛭乾薑細辛芒硝各二両麻仁五合甘草三両右㕮咀以水一斗五升去滓内硝令烊分為五五更時服相去一炊頃自下将息忌見風當歸没藥丸出聖濟縂録治婦人血氣不調月水滯澀身體麻痺瘙痒疼痛飲食减少靣黄肌痩背脊拘急骨間痠痛多吐清水臍腹疼痛没藥研丁香各三両木香一両丁香皮桂去麄皮麒麟竭研𤣥胡索牡丹皮當歸乾膝炒烟出肉豆蔲各半両㯽榔一両剉安息香乳香各一両二味同搗末再用酒濾去滓銅器内熬膏右搗羅十二味為末以二香膏和丸如膏少即入蜜丸如梧桐子大硃砂為衣每服二十丸至三十丸温酒或生薑湯下食前早晚各服大保生丸治婦人月事沉滯寒熱往來日漸羸痩不思飲食宜服人参藁本赤茯苓當歸白芷𤣥胡索肉桂去皮白薇赤芍藥川芎白术甘草炙没藥牡丹皮各半両右為末煉蜜為丸如弹子大每服一丸細嚼温酒送下空心食前如經事過多加赤石脂一兩如經事絶少去赤石脂若經水如水豆汁者依上等分治琥珀散出聖惠方治婦人月水不利攻臍腹疼痛口乾不食琥珀瓜根當歸剉㣲炒藕莭薑黄各一両白术桂心各半両生乾地黄赤芍藥牛膝凌霄花菴䕡子各三分川大黄半兩右為散每服三錢以水一盞煎至五分去滓每於食前温服赤龍鱗散出聖惠方治婦人月水不利攻腹臍疼痛頭目昏悶赤鯉魚鱗二両燒灰黒豆醋拌炒令焦羚羊角三両炒令焦乳髪灰一両藕莭一両水蛭一分炒㣲黄桂心木香當歸剉㣲炒赤芍藥各一両䖟蟲一分炒㣲黄去翅足白殭蠶三分㣲炒麝香一分右為細散入麝香研令勻每於食前以熱酒調下一錢治婦人憂患心下支滿膈中伏熱月經不利血氣上搶心欲嘔不能多食懈怠不能動出千金方大黄芍藥䖟蟲各二両土瓜根蜀椒黄芩白术乾薑丹皮芎藭各二両桂心乾漆各一両半右為末蜜丸如梧桐子大每服十丸日三不知加之牡丹散出聖惠方治婦人月水不利臍腹疼痛不欲飲食牡丹皮川大黄炒各二両赤茯苓生地黄桃仁當歸桂心赤芍藥白术各三分石韋去毛木香各半兩右㕮咀每服三大錢水一盞薑三片煎至七分去滓空心温服桃仁丸出聖濟縂録治婦人月水不利氣血不和臍下疼痛面色痿黄身體羸痩飲食不下桃仁湯浸去皮尖雙仁麩炒黄牡丹皮當歸去蘆土瓜根剉芎藭芍藥桂去麄皮牛膝酒浸切焙各二両防風去乂二両甘草炙一両右為末煉蜜和丸如桐子大每服三十丸空心温酒下漸加至五十丸秦芁湯出聖濟縂録治婦人虚勞月水不利百莭痠疼壯熱少力心躁煩悶秦芁去蘆馬鞭草甘草炙剉茈胡去苖各一両芎藭芍藥桂去麄皮各二両荆芥穗三両半夏湯浸去滑生薑汁製炒黄半両白芷三分右為搗篩每服三錢水一盞烏梅一枚搥破生薑三片同煎至七分去滓温服琥珀散一名三稜當歸散出危氏方治婦人月經壅滯每發心腹臍痛不可忍及治産後惡露不快血上搶心迷悶不止氣絶欲死三稜􅅫莪茂赤芍藥牡丹皮劉寄奴當歸熟地黄桂心甘菊花眞蒲黄炒各一両細剉右前五味用烏豆一升生薑半斤切片米醋四升同煮豆爛為度焙乾入後五味同為細末每服三錢空心食前温酒下一方不用菊花蒲黄却用烏藥延胡索亦佳若血氣痛只一服産後血衝心二服便不常服尤准此藥易合宜多合以救人烏豆一升約用五兩牛膝散出聖惠方治婦人月水不利臍腹疼痛牛膝一両桂心赤芍藥桃仁延胡索當歸牡丹皮川芎木香各三分右為末每服方寸匕温酒調下食前牛膝丸出聖惠方治婦人月水不利臍腹疼痛不多飲食四肢羸痩牛膝去蘆一両當歸剉㣲炒白术芎藭桂心各半両川大黄一両剉㣲炒水蛭一分炒㣲黄鬼箭羽三分桃仁三分湯浸去皮黄尖雙仁麩炒微右為末煉蜜和丸如梧桐子大每於食前温酒下二十丸鼈甲丸出聖濟縂録治婦人月水不利臍腹疼痛身體疲倦鼈甲去裙襴醋炙芎藭貝母各三分去心秤苦参二両牡丹皮赤芍藥焙各一両紫蘇子㣲炒熟乾地黄焙各一両右為末煉蜜和丸如梧桐子大每服二十丸空心温酒下漸加至三十丸桂心丸出聖惠方治婦人月水不利憂悒心下支滿血氣上攻心腹疼痛不得睡卧桂心赤芍藥土瓜根各半両漢椒一分去目并閉口者㣲炒出汗黄芩乾漆搗碎炒令烟出當歸剉㣲炒各半両川大黄一両剉碎㣲炒右為末煉蜜和丸如梧桐子大每服於食前以温酒下二十丸土瓜根丸出聖濟縂録治婦人憂悒心下支滿氣脹腹熱月水不利血氣上攻心痛欲嘔煩悶土𤓰根大黄剉炒令􅃄盡芍藥當歸切焙各半両蜀椒去目并閉口炒汗出黄芩去黒心各一分乾漆炒令􅃄盡一分半右為末煉蜜和丸如梧桐子大空心服五丸酒下日二服没藥散出聖惠方治婦人月水不利臍腹疼痛不可忍當歸剉㣲炒延胡索鬼箭羽琥珀菴䕡子各一両右為散不計時候以熱酒調下一錢産後敗血攻心腹疼痛服之亦效金花散出聖濟縂録治婦人月水不利體熱煩悶小腹腰脚沉重疼痛及産後惡露不快大便秘澀桂去粗皮葳靈仙去土白芷當歸牡丹皮右等分為散和勻每服二錢煎陳麯湯調下治婦人月水不利結精無子方出肘後方大黄二両桃仁二十枚芒硝當歸各一両亂髪大如雞子一枚焙之右以酒六升煮取二升半兩内芒硝三分三服佳抵党湯出千金方治月經不利腹中滿時時自减并男子膀胱滿急右以水三升煮取一升盡服之當下惡血為度菖蒲虎散治婦人月水澀滯隂間腫痛方見木門下部諸疾類抵党湯一名水蛭飲出三因方治婦人經水不利水蛭剉炒䖟蟲去翅足各炒三十枚桃仁三十七枚去皮尖大黄蒸三遍三兩右為末每服四錢水一盞半煎七分去滓温服血未行更服亦治男子有瘀血膀胱痛室女月水不通三聖丸治月經不利小腹急痛當歸酒浸去蘆乾漆炒􅃄盡各一両大黄濕紙煨半両右為細末醋糊為丸梧桐子大每服三十丸空心當歸酒下沒藥丸治月經不利漸結成塊腹滿如蠱㯽榔七箇麵褁煨大㦸半両大黄一両蒸右為細末醋糊為丸梧桐子大每服半両重臨卧細嚼茴香酒下取下惡物大黄散出聖濟縂録治婦人月水不利或血瘀不通或腹堅硬如石如有姙状大黄剉炒四両芍藥二両土瓜根剉一両右為末每服二錢温酒下牡丹丸出聖濟總録治婦人月水不利或前或後乍多乍少腰疼腹痛手足煩熱唇口乾燥牡丹皮一両一分苦参半両貝母三分去心秤右為末煉蜜和劑𢷬熱丸如梧桐子大每服二十丸加至三十丸空腹米飲下日三次虎杖散出聖惠方治婦人月水不利虎杖三両凌霄花沒藥各一両右為細散不計時候以熱酒調下一錢鼈甲丸出聖惠方治婦人月水不利腹脇妨悶背腹煩疼鼈甲二両醋塗炙令黄去裙襴川大黄剉㣲炒二両琥珀一両半右為末煉蜜和丸如梧桐子大每服於食前温酒送下二十丸療女人臍下憋逆氣脹滿月水血氣上攻欲嘔不得卧睡出永類鈐方當歸四錢乾漆二錢炒令烟盡右為末煉蜜和丸如梧桐子大空心温酒下十五丸礬石兊丸出三因方治婦人經水閉藏不利堅癖不止中有乾血下白物礬灰三分杏仁一分去皮尖炒右研杏仁細入礬灰加少蜜丸如棗綿褁内隂中未知再作之又方出聖惠方治婦人月水壅滯每發心腹臍痛不可忍又治産後惡露不快血上搶心迷悶不省氣絶欲死延胡索當歸各等分右為末每服三錢薑三片水一大盞煎七分去滓少熱服陳氏方有桂名如神湯最治腰痛雷公炮炙論只用延胡索一味治心痛僕詳此方大能治血氣腰腹疼痛面黄無力治婦人月信滯方見本門月水不通類鈆霜散出聖濟總録治室女月水滯澀心煩恍惚用鈆白霜半両細研為散每服一錢温地黄汁一合調下如無地黄汁用生乾地黄煎湯下椒仁丸出衛生家寳方治經水斷絶後至四肢浮腫小便不通經曰氣行化為血不通則復為水矣宜服此椒仁商陸橘皮桑皮各等分右為末麵糊丸如梧桐子大每服三十丸米飲下以通為度六合湯出嚴氏濟生方治婦人室女經事不行腹中結塊疼痛腰痛腿痛方見本門月水不通腹内疼痛類白薇丸出聖惠方治婦人臟腑乆冷腰膝疼痛背膞虚煩月水不利故令無子白􅅔赤石脂栢子仁各一両白前當歸剉㣲炒附子炮製去皮臍乾漆搗碎炒令􅃄出山茱萸防風去义頭牛膝去苖厚朴去粗皮塗生薑汁炒令香熟桂心白芷各半両熟乾地黄三両吳茱萸半両湯浸七遍焙黄㣲炒右為末煉蜜和丸搗百杵丸如梧桐子大每於空心及晚食前以温酒下三十丸沉香湯出聖濟總録治室女榮衛凝澀月水不利或時頭目昏悶肢體拘急五心虛煩飲食進退多困少力沉香㯽榔剉甘草炙各三分木香當歸切焙柴胡去苖人参桂去麄皮青橘皮湯浸去白焙白茯苓去黒皮生地黄各二両陳橘皮湯浸去白焙鱉甲九肋者去裙襴醋炙一両半右剉如麻豆大每服三錢水一盞入生薑棗大拍碎同煎至七分去滓温服空心日晚各一延胡索散出聖濟縂録治室女月水不利骨莭痠痛頭面㣲浮筋脉拘急或生丹疹寒熱不