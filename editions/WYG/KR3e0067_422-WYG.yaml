body:
  text: 普濟方卷四百二十二明周王朱橚撰鍼灸門喘治欬喘暴滿穴崑崙治氣喘穴三間治喘逆穴神門譩譆治喘欬穴不容治欬喘肢重胸膈氣滿喘急穴商陽治胸脹喘息穴大鍾治大喘不得卧穴期門治欬逆上喘嘔吐胸滿不得食穴腧府治欬逆喘不能食穴彧中治逆氣喘不得息穴天府治欬逆喘不得息穴雲門人迎神藏治喘逆上氣穴氣户治喘息不得舉臂穴步郎治喘穴足臨泣治喘氣相追逐穴魄户中府治喘暴穴華盖天突治喘不得息穴腧府神藏治喘息嘔沫穴天容治欬喘穴曲澤治欬逆上喘穴魄户治喘不得息穴浮白治掌中熱生嗽逆上氣喘數久熱病汗不出暴痺喘逆心痛欲嘔穴經渠治喘逆穴中府魄户脇堂治欬逆上喘喉鳴穴璇璣治喘逆卧不安席欬脇下積聚穴期門治欬逆氣喘穴天突治肺喘穴肺腧治喘息急穴解谿治呼吸喘穴彧中治氣逆喘鳴穴天容治喘息不能行穴上㢘治喘穴經渠治喘穴大陵治喘不得息穴天府治喘息穴㢘泉治喘穴魚際王氏云有貴人久患喘夜卧不得而起行夏月亦衣夾背心予知是膏肓病也令灸膏肓而愈亦有暴喘者予知是痰為害便令細剉厚朴七八錢重以姜七片水一小碗煎七分服滓再煎服不過數服愈若不因痰喘者當灸肺腧凡有喘與哮者按肺腧無不痠疼皆為療刺肺腧令灸而愈亦有只療刺不灸而愈此刺有深淺也舍弟登山為雨所摶一夕氣悶數不救見昆弟必泣有欲别之意予疑其心悲為刺百㑹不効按其肺腧云其疼如錐刺以火針㣲刺之即愈因此與人治哮喘只療肺腧不療他穴惟按肺腧不疼痠者然後㸃其他穴也治大腸有熱腸鳴腹滿夾臍痛食不化喘不能久立穴灸巨虚上㢘治喘逆上氣呼吸背痛不知食味穴氣户雲門天府神門治腹痛喘暴滿穴崑崙治欬逆穴魚際治欬嗽上喘穴亶中治喘不得息穴水突治喘息如水鷄鳴穴扶突治喘逆煩滿嘔沫流汗穴頭維治喘欬少氣百病穴肘腧腎腧腧府治欬喘穴曲澤出血立已治咽中鳴喘穴扶突治欬逆上氣喘掌中熱穴經渠治欬逆喘穴少商大陵治欬逆胸滿喘不得息穴太泉欬嗽附論灸刺法論曰内經治欬之法治臟者治其腧治腑者治其合浮腫者治其經以穴考之各有定處諸欬而喘息有音甚則喘血者太淵主之浮腫則治在經渠欬而兩脇下痛不可轉者太衝主之浮腫則治在中封欬而右脚下痛陰陰引肩背痛甚則不可轉者太白主之浮腫則治在商丘欬而腹背相引痛甚則欬涎者太谿主之浮腫則治在復溜欬而心痛喉中介介如鯁甚則咽腫喉痺者神門主之浮腫則治在靈道欬而遺矢曲池主之浮腫則治在陽谿欬而失氣者小海主之浮腫則治在陽谷欬而遺溺者委中主之浮腫則治在崑崙欬而嘔嘔甚則長蟲出者三里主之浮腫則治在解谿欬而嘔苦汁者陽陵泉主之浮腫則治在陽輔久欬不已欬而腹滿者天井主之浮腫則治在支溝凡此五臟六腑之欬治之常也腧合之外别有遺法附之於後云治久喘嗽喀膿血有痰不愈者右用白俵紙數重折之定於涼水内浸濕了然後燃艾炷仍蘸些需雄黄末同燃或艾炷子安在紙上用火㸃着隨即放在舌頭上正中為妙下手灸人拿着一箇銅匙頭於患人口内上浮膈住艾烟呼吸令患人如常灸畢令患人喫蒸餅一小塊壓下仍用秫米粥飲之此灸炷數依嵗數多少灸之為良治咳嗽多喘資生經穴三里治欬嗽穴缺盆亶中巨闕治欬嗽喘又療肺心痛欬引尻溺出穴魚際治肺嗽穴肺腧治欬嗽穴少澤心腧庫房治欬嗽上氣噎胸中氣喉内如水聲穴天突治欬少氣穴㢘泉治欬嗽上氣氣短穴亶中治欬逆上氣穴經渠治上氣欬嗽胸中氣滿喉鳴四肢不舉腋下腫穴天池治上氣欬嗽喘息及腹中鳴上下行穴解谷治欬嗽穴魚際列缺少澤缺盆治欬嗽喘濁穴尺澤治欬嗽上氣喘血穴肩中腧治風勞氣欬嗽穴太杼治喘氣卧不安穴風門治肺痠欬嗽穴肺腧治肺氣欬嗽穴亶中治欬嗽衂血項頸痛穴前谷治痃癖欬嗽不嗜食上氣欬嗽穴肺募灸五十壯治嗽手屈臂中有横之外骨頭捻得痛處灸十四壯良又灸兩乳下黒白際各百壯即瘥又以蒲當乳頭周匝圍身令前後正平當脊骨解中灸十壯治欬嗽穴㢘泉天井太淵王氏云嗽最宜灸膏肓穴其次則宜灸肺腧等穴各隨症治之若暴嗽則不必灸也有男子忽氣出不絶聲病數日矣以手按其亶中穴而應微以冷針頻刺之而愈初不知灸之甚神也治十二種風風入肺則欬逆氣短肝欬刺足太衝心欬刺神門脾欬刺太白肺欬刺太泉腎欬刺陽谷膽欬刺陽陵泉又第五節下第六節上穴中間隨年灸主上氣治喘咳出危氏方穴肺腧灸各十一壯天突灸七壯立效治嗽穴胸前對乳一處灸隨年壯又䋲横量乳中折䋲從脊灸䋲兩頭各八十壯三報之三日畢治欬嗽穴心腧灸五壯炷如􅀥核大肺氣治肺氣搶脇下熱痛資生經穴陰都灸隨年壯治肺脹脇滿嘔吐上氣等病穴大椎并兩乳上第三肋間灸各七壯肺與大腸俱實治肺寒熱穴中府治肺氣咳嗽上喘唾膿不得下食胸中如塞穴亶中治肺壅咳唾膿咽乾舌下急喉生瘡穴天突治肺系急胸痛慄慄背熱嘔逆上氣欬唾濁涕肩背痛風汗出腹脹食不下及治肺急滿喘逆唾濁善噎皮痛穴中府治肺滿膨膨及療胸中氣滿不得卧穴太淵治肺寒熱肺痿上喘咳嗽嗽血脇氣滿不得卧不嗜食汗不出及背急强穴肺腧治肺風氣痿絶四肢滿脹喘逆胸滿穴肺腧灸各二壯治肺腫唇動葉葉肺風狀如蟲行穴水溝治肺風穴風池唾血治内損唾血不足外無膏澤資生經穴地五㑹刺入三分特忌灸治唾血㵼魚際補尺澤治欬喘有血穴然谷治唾血振寒嘔血上氣穴太淵神門治唾血吐血穴胸堂手心主間使脾腧胃脘天樞肝腧魚際勞苦肩腧太谷治欬唾血穴心腧肝腧缺盆巨闕鳩尾治欬逆上氣呼吸多唾濁沫膿血穴庫房中府周榮尺澤治嘔血穴上脘不容太陵治嘔血衂血穴郄門治短氣嘔血胸背痛穴行間治面唇色白時時嘔血女子漏穴太衝治吐血穴手少陰郄治胸中瘀血搘滿脇膈痛不能久立膝痿寒穴三里治心膈下嘔血穴上脘治嘔血肩脇痛口乾心痛與背相引不可欬欬引腎痛穴不容治唾血振寒嗌乾穴太淵治嘔血穴大陵郄門治嘔血上氣穴神門治虚勞吐血及治勞喘逆少食多睡一作多喘百病穴胃脘灸三百壯治吐血穴胸堂灸百壯不針治吐血腹痛雷鳴穴天樞灸百壯治吐血唾血上氣欬逆穴肺腧灸隨年壯治吐血瘦削穴肝腧灸百壯治吐血嘔逆穴手心主灸五十壯太陵是也治口鼻出血不止名腦衂穴上星灸五十壯治唾膿穴亶中治唾血穴肝腧承滿肩中腧治欬唾血穴太鍾然谷心腧治喀唾膿血穴天突治多唾濁沫膿血穴庫房治多唾濁沫膿血穴屋翳治息賁時唾血及嘔血煩心穴巨闕治嘔血穴太淵神門行間太衝魚際治逆氣嘔血穴曲泉治吐血穴五里治咽腫唾血及治衂血不止穴大谷治驚癎破心吐血穴巨骨治吐血唾血穴魚際治吐血穴肝腧紫宮石門治唾血穴承滿治膈氣吐血穴承滿治吐血失音腫痛穴孔最治心痛出血嘔吐血穴曲澤治唾血穴庫房一七壯治嘔血堅心痛出血穴曲澤灸七壯治吐血穴巨闕灸七壯炷不必大筋頭為之治上氣唾膿血穴兩乳下黒白際灸各一百壯良唾治欬唾濁涕資生經穴中府治多濁濁沫膿血穴庫房治欬唾稠膿穴周榮治腹滿唾沫穴少商治唾沫穴百㑹治多唾嘔沫穴石關治肺寒欬嗽唾膿穴庫房治嘔沫吐涎喜唾穴幽門治脊强不開多唾穴石關治多唾穴日月治心胸痛欬嗽上氣吐膿不嗜食穴天井治吐血及唾如白膠穴紫宫資生經云積主臓病聚主腑病積者是飲食包結不㪚聚者是伏痰結而不化痰伏在上膈主頭目眩痛多自涎唾或致潮熱用平胃㪚烏金治之其論有理故載之出名醫賈祐錄云痰涎治熱病胷中痰引腹脹暴痛恍惚不知人資生經穴巨闕治結積留飲胸滿食不化穴通谷治痰癖穴不容治痰冷穴少衝治痰沫胸中滿不得喘息穴浮白治膈胃寒痰傷酒風發腦兩角强痛不能飲食煩滿吐不止穴率谷治癲疾吐涎沫穴本神治涎沫穴絲竹空治涎出穴然谷復溜治涎下穴陰谷治痰飲吐逆汗出寒熱骨痛虗脹肢滿痰瘧穴膈腧治痰悶穴膽腧治痰多吐涎穴上管治結積留飲穴灸通谷治涎出不覺穴下㢘治吐沫穴少海兊端本神治嘔沫穴絲竹空通谷商丘治嘔沫穴谷端治吐涎穴温溜治沫出穴上關治涎出多唾穴或中雲門治多唾濁沫穴庫房治嘔沫喘息穴㢘泉王氏云痰涎等症不一而足惟勞瘵有痰為最難治宜灸膏肓穴壯數既多當有所下􅀢􅀢然如流水之狀盖痰下也餘當随症治之凡人患水疰口中涌水經謂之肺來乗腎食後吐水可灸肺腧又灸三陰交期門㵼肺補腎也各隨年壯然則痰涎有類此者又當依此法灸之治胸中痰氣蠱毒霍亂驚悸腹脹暴痛恍惚不止吐逆不食刺巨闕用毫針針入六分即止此穴化氣除涎妙次針足陽明經三里二穴應時立愈治唾沫穴天容治痰涎壅塞如牽鋸服藥不効灸關元丹田水飲不消治溢飲脇飲堅痛穴中脘治溢飲水道不通溺黄小腹痛裏急腫洞泄體痛髀痛引背穴京門治飲渴身體痛多喘穴隠白治水漬入胃名曰溢飲滑泄渴能飲水水下復泄泄而大渴此無藥症出衛生寶鑑穴大椎霍亂吐㵼治霍亂遺矢失氣資生經穴三里治霍亂泄注穴期門治嘔泄上下出脇下痛穴尺澤治腹脹食不化喜嘔泄有膿血穴太白治霍亂胷中氣噎不嗜食臂肘痛不舉穴關衝治吐逆霍亂胸滿喘呼不得息穴人迎治胸中煩熱賁豚上下目青而嘔霍亂泄痢腹堅硬大喘不得卧脇下積氣穴期門治霍亂吐痢身熱汗不出穴上脘治吐泄穴隠白治霍亂出洩不自知穴中脘治嘔吐霍亂穴支溝天樞治氣逆霍亂腹痛又吐洩膿血穴太白治心痛霍亂胸滿穴陰郄治霍亂心痛不可卧吐痢穴上脘治胸脇滿霍亂吐痢不止困䪺不知人穴巨闕治吐逆霍亂吐血穴手心主灸五十壯治霍亂先心痛及先吐穴巨闕灸七壯治先腹痛穴太倉灸二七壯即中脘治先下痢穴灸大腸募臍傍二寸男左女右又灸榖門治吐下不禁兩手脉疾數灸蔽骨下三寸又臍下三寸各灸七十壯治霍亂下不止穴大都灸七壯治洩痢傷煩欲死穴慈宫灸二七壯即衝門穴霍亂吐㵼尤當速治宜服來復丹鎮靈丹等藥以多為貴尤宜灸上脘中脘神闕關元等穴若水分穴尤不可緩盖水榖不分而後泄㵼此穴一名水分能分水榖故也或連灸中脘穴須先中脘而後水分可也治霍亂乾嘔穴間使灸各七壯不瘥更灸如前數治霍亂苦吐不止而痢不止者穴臍一穴約中灸七壯又云臍一寸二七壯治霍亂若啘者穴手脘第一横紋中灸七壯名心主當中指治霍亂遶臍痛穴關元灸三七壯治霍亂煩悶穴心厭下三寸灸七壯又以鹽納臍中鹽上灸二七壯治霍亂欲死者以物横度病人人中屈之從心鳩尾度以下灸先灸中央畢更横灸左右脊上又灸以物圍令當心厭又灸夾脊左右一寸各七壯是腹背各灸三處也治霍亂危困諸疾不瘥者捧病人腹卧之伸臂相對以䋲度量兩頭肘尖依䋲下夾臂大骨肉中去脊各一寸灸之百壯未愈者可灸肘顀灸畢即起凡灸霍亂或雖未能立瘥終無死憂不可逆灸或但先腹痛或先下後吐當隨病狀灸之治霍亂泄出不自知穴先取太谷後取太倉之源治嘔上下出兩頭脇下痛穴尺澤治霍亂吐痢穴灸兩乳連黒外近腹白肉際各七壯亦可至二七壯治霍亂足逆冷穴三陰交灸各七壯不愈加壯數霍亂轉筋治霍亂頭痛胸滿呼吸喘鳴穹蒼不得息穴人迎治霍亂不識人穴巨闕治霍亂穴關衝支溝公孫陰陵泉巨闕治厥逆霍亂穴太陰太都金門僕参治霍