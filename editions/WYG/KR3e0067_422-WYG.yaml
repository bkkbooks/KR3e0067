壯又灸玉泉百壯報之又灸足太陽五十壯三報之又男㿗灸手小指端七壯病在左者灸左右者灸右良効治疝氣偏墜危氏方右以净草一條度患人口兩角為一則截斷如此三則摺成三角如厶子様以一角安臍中心兩角在臍之下兩傍尖盡處是穴若患在左即灸右在右即灸左兩邊俱患則兩穴皆灸艾炷如麥粒大灸十四壯或二十一壯即安也治疝氣於左右足下第二指中節横紋中各灸七壯至三七壯止艾丸不須大如麥粒而𦂳實為上又恐瘡難将息旬日半月間不可多步履仍不妨自服他藥治腎氣外腎腫小腸氣痛腹内虚鳴危氏方灸風市穴五七壯又灸氣海穴七壯又灸臍左右各去一寸半兩穴各灸七壯灸之立効名外陵穴治卒㿗以蒲横度口如廣折之一倍増之布着小腹大横紋中央上當臍勿使偏僻灸度頭及中央合二處隨年壯好自養息勿舉大怒言大笑又灸牽陰頭正上灸莖頭所極又牽下向谷道又灸所極又牽向左右髀直行灸莖所極各隨年壯又灸足厥陰在右灸右在左灸左三壯治㿗疝穴關元治疝氣穴天樞治疝暴痛右取足太陰治㿗卒疝暴痛及陰腫痛右灸大敦男左女右三壯立已治心疝右灸兩足大指甲肉之際甲肉各半炷隨年壯良治㿗心疝發時心腹痛欲死方右灸足心及足大指甲後横理節上及大指岐間白黒肉際百壯則止足心者在足下偏近大指末節際不當足心中央也治諸氣心腹痛小腸氣外腎弔痛疝氣小腹急痛不可忍危氏方灸足大拇指次指中節横紋當中央灸五壯男左女右極妙艾炷如黒豆大灸偏墜左灸右足右灸左足其妙如神治疝法於疝邊竪紋左右交互灸七壯治㿗但灸其上又灸莖上又灸白小腹脉上又灸脚大指三中各一壯又灸小指頭隨㿗左右着灸治卒疝穴交信華佗治卒陰卵偏大取足大指去甲五分内側白肉際灸三壯炷如半􅀥核大左取右右取左治四肢淫濼身悶陰暴起疝穴照海治卒疝暴痛陰跳上入腹寒疝陰挺出偏大腫臍腹中悒悒不樂大敦穴灸刺立已左取右右取左治㿗疝偏枯穴大巨治㿗疝精不足穴太衝中封地機治男卒疝小腹痛不可忍刺足厥陰經大敦二穴刺足陽明經陰市二穴手痺治手不仁穴少商治手麻木不舉穴肩貞治四肢厥手足悶穴内庭治四肢厥喜笑穴列缺治節痺穴曲池支溝臑㑹腕骨肘窌治臂痿不仁穴曲池天井外關療手足不仁穴白環腧治手不舉又主手不可舉重腕急肘中痛難屈伸穴曲池治手痛穴間使治臂腕外側痛不舉穴陽谿治手掌熱肘中痛穴中衝少衝勞宮太泉經渠列缺療手掌厚瘡痺手皮白屑起穴勞宫治手痺穴勞宫治手臂不仁穴附分治兩手足痺胸不得息穴魚際胸痛治胸滿胸痛穴浮白治胸中痛穴腧府治胸痺心痛不得息痛無常處穴臨泣治胸痛穴㢘泉中府治胸脇不能轉及胸脇滿穴膽腧治胸脇滿痛不得息穴丘墟治胸脇小腹痛穴下㢘治胸脇痛穴大包治兩脇急痛穴肝腧脾腧志室治脇腋急痛穴支溝治脇下堅痛穴中脘承滿治脇痛不得息穴脘骨陽谷治脇痛不得卧胸滿喘無所出穴膽腧章門治脇痛欬逆穴竅陰治短氣脇痛心煩穴尺澤少澤治脇下脹穴關元期門少商治脇下滿痛穴極泉治脇痛穴膈腧中膂腧竅陰陽谷顱顖治兩脇急痛穴肝腧治脇下痛不得息穴腕骨治脇痛引小腹痛穴腎腧治飱泄腹脇痛滿狂走夾臍腹痛食不化喘息不能行穴上㢘治腹脇痛連脊手足厥冷穴太谿治胸徹背痛穴雲門治脇膈痛穴三里療胸脇痛穴華盖治胸中澹病穴束骨灸隨年壯治脇卒痛如打出肘後方穴以䋲横度兩乳中屈䋲從乳横度以趍痛脇下灸䋲下屈處三十壯愈治兩脇引痛穴腎腧治胸痺灸胸堂治胸下滿痛膺腫穴乳根治胸脇痛不可忍穴刺期門針入四分次針章門針入六分可灸七壯至七七壯行間丘墟湧泉膈痛療膈氣資生經穴承滿乳根療膈痛穴膈腧療胸膈悶咳嗽氣短喉鳴穴亶中療胸膈氣滿穴商陽療胸膈滿悶穴臨泣療胸中膈氣聚痛好吐穴厥隂腧灸隨年壯治膈中不利穴隠白巨闕治膈中雷鳴擦擦隠隠常有水聲穴食竇治胸膈中氣穴關腧灸隨年壯治胸膈煩滿穴天池治膈氣嘔吐涎沫穴亶中治膈胃寒痰穴率谷膈腧治氣哽穴扶突療氣鯁鯁穴天突療噎穴章門治胸脇肢滿噎寒穴中庭治食噎不下胸喘息脹穴大鍾治胸中氣噎穴關衝天突治胸中如塞及積氣成乾噎穴亶中治膈中氣不下食噎病穴乳根療久瘧背氣滿悶胸中氣塞穴譩譆療善噎穴神堂中府治胸中不利穴巨闕治五噎黄氏問岐伯曰凡人患噎病百味珍饌不能食者灸何穴而立得其愈岐伯答曰夫人噎病有五般一曰氣噎二曰憂噎三曰食噎四曰勞噎五曰思噎此由陰陽不和三焦隔絶津液不利故令人氣膈不調成噎病治氣噎穴亶中治憂噎穴灸心腧治食噎穴乳根治勞噎穴灸膈腧治思噎穴天府治五噎黄疸醋心多唾嘔吐不止刺任脉天突一穴在結下一寸宛宛中陰維任脉之㑹針入五分留三呼得氣即㵼次針足少隂經通谷二穴在中脘穴兩傍同身寸之相去各五分用長針入八分左撚針能進飲食右撚針能和脾胃許氏云此穴一針四效凡下針後良久先脾磨食覺針動為一效次針破病根腸中作聲為二效次覺流入膀胱筋骨漸舒為三效次覺脾胃和而飲食頓加為四效足寒熱治風寒從足小指起股痺上下資生經穴至陰治足寒穴腎腧京骨然谷治􅂰上伏兎中寒穴陰市治足下厥熱穴行間治足下熱脛寒不能久立濕痺不能行穴中都治足下熱不能立穴三里條口承山承筋治足熱厥逆滿取其經穴立愈穴委中治足下熱喘滿乃熱厥也穴湧泉資生經云昔日人患此針之愈治足下熱穴至陰治足下寒熱穴然谷治手足厥冷穴大都治足寒穴隠白太衝治足逆冷穴中封治足冷無血色穴陽陵泉治䯒寒不能自温穴復溜治足熱腿冷疼不能久立麻痺不仁穴漏谷史記濟北王阿母足熱而憊太倉公曰熱厥也刺其足心各三所按之無不出血病旋已病得之飲酒大醉足雜病治足跟痛不得履地脚痿轉筋資生經穴僕参治脚股筋急髀樞不仁穴浮郄治髀樞股䯒痛穴附陽治足指不屈伸穴飛揚治足心痛穴經渠治脚腨痠穴承筋療心中結熱脚底白肉際不得履地又治足指盡疼不得踐地穴湧泉治五指盡疼足不履地穴湧泉然谷治足痿不能行穴三陰交治脚腫不得履地穴上㢘治脚腫踹痛不得履地穴崑崙治足跗腫不得履地穴然谷治脛寒穴中都治脛寒穴條口治風身重脛寒穴絶骨灸百壯治大驚脛痛冷痺􅂰痛不屈伸穴梁丘難經疏云足脛寒者腎主骨有病先脛冷也當以此求之治足不能安脛酸不能久立穴然谷治脛酸穴湧泉太衝治脛疼四肢重少氣難言穴至陽治脚脛酸及脚跟痛脚筋急痛穴承山承筋治脛痛不可屈伸穴環跳内庭治脛痺不仁穴陽關治筋酸穴至陽治脛寒拘急不得屈伸穴膀胱輸治足腕不收足筋偏細穴丘墟治脛寒穴復溜治髀中痛不可舉穴環跳束骨交信陰交陰谷治髀中痛不得行足外皮痛穴臨泣三陰交凡髀樞中痛不可舉以毫針寒而留之以月生死為數立已治髀樞脚痛穴丘墟治髀不仁穴陽輔􅂰以上病宜灸環跳風市􅂰以下病宜灸犢鼻􅂰關三里陽陵泉足踝以上病宜灸三陰交絶骨崑崙足踝以下病宜灸照海申脉然湏按其脉痠疼處灸之方效治脛寒不得卧穴厲兊條口三陰交治人脚無冬夏裂灸指頭七壯立愈四肢厥治四肢厥逆腹脹數欠資生經穴内庭治四肢重痛穴至陽治厥逆四肢墮穴章門治四肢怠墮穴膈腧治四肢不收穴極泉日月脾腧治四肢不舉穴支溝小海附陽天池三陽絡治偏四肢不舉穴大巨治腰中四肢滛濼穴腎腧治四肢暴腫臂寒短氣穴尺澤治四肢腫滿穴三里治手足逆冷四肢重穴大都療厥逆胸痛刺不可忍腹中如刀􅂒大小便難四肢不收身體怠墮腿􅂰痠痺屈伸難穴豐隆主四厥手足闕穴内庭主手足寒至節穴太谿主四肢厥手足悶者乆持之厥熱腦痛腹脹皮痛者使人乆持之穴内庭主四肢厥喜笑穴列缺主四肢懈怠喜怒穴章門主四肢滛濼穴照海主四肢不舉穴曲泉附陽天池大巨小海支溝絶骨前谷主嗜卧四肢不欲動揺穴五里三陽絡三間厲兊天井主四肢逆冷穴行間主手足厥冷穴太谿治手足逆冷穴大都王氏云有人患陰症傷寒手足冷甚以火温之亦不暖王氏與理中湯服即得汗而愈手足自温也若其他手足厥者當隨症灸之治四逆穴俠谿治四厥脉沉絶乾嘔四厥起死法穴間使乳根各灸隨年壯人病狂癡手足厥作狂病治不效名醫錄曰此驚恐憂思所得大驚傷心大恐傷腎大憂思傷神志神不足則狂癡志不足則恐怖恐怖則腎氣留手足不收亦因積驚恐氣傷腎也治風逆四肢腫穴復溜豐隆大都治四肢寒熱腰疼不得俛仰身黄腹食嘔吐根直灸第十一椎上及左右各一寸五分三處各七壯治四肢冷穴行間治脉不出穴不容治厥逆穴内庭章門普濟方卷四百二十二
