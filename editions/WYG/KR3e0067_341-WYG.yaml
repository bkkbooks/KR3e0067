body:
  text: 普濟方卷三百四十一明周王朱橚撰姙娠諸疾門大便不通附論夫姙娠腸胃有風加之挾熱津液不足氣道否澁故令腸胃枯燥大便不通甚則呼吸奔喘腹脹亁嘔方羗活丸治姙娠熱在臓腑大便秘澁羗活二兩半大麻仁三兩㯽榔五枚防風枳殻各一兩大黄一兩半木香一兩右搗羅六味為末與麻仁同研勻煉蜜和丸如梧桐子大每服二十丸温水下食前服日三以微利為度㯽榔丸治姙娠大便熱結旬日不通㯽榔一兩木香半兩大黄二兩青橘皮焙半兩牽牛子二兩用一半生一半炒右為末煉蜜和劑更於臼内塗酥杵勻丸如梧桐子大每服二十丸空心下温水服麻仁丸治姙娠大便不通腹痛不能食養津液潤腸胃大麻仁四兩人參訶梨勒各二兩大黄半兩右先搗後三味為末次入麻仁煉蜜和劑更於臼内塗酥杵勻丸如梧桐子大每服三十丸空心温水下大便通即止踈氣黄耆丸治姙娠大便不通黄耆枳殻各一兩威靈仙二兩右為末用麵糊和丸如小豆大每服三十丸温水下不拘時未通稍加之大棗湯出永類鈴方治姙娠臓燥悲傷欲哭伏如神靈伸欠者甘草三兩小麥一觔大棗十枚右㕮咀每服半兩水二碗煎至一盞去滓温服治姙娠大便秘澁出大全良方枳殻三兩防風二兩甘草炙一兩右為細末沸湯㸃服一二錢日三枳殻丸治姙娠大便結塞不通臍腹鞕脹不能安臥氣上喘逆枳殻一兩半大黄二兩半右為末煉蜜和丸如梧桐子大每服二十丸空心米湯下未通再服以通為度潤腸丸治姙娠大便不通腹脇堅脹枳殻大麻仁各一兩右研勻煉蜜和丸如梧桐子大每服三十丸食前温水下生姜湯亦得葱膠湯治姙娠大便不通葱白牛皮膠二觔右以水一盞半煎令膠烊盡去滓頓服之治虚羸大便秘枳殻製阿膠炒等分右為末煉蜜和劑杵二三千下丸如梧子大别研滑石末為衣温水下二十丸半日來未通再服三十丸加至五十丸小便不通附論夫姙娠小腸夾熱熱結胞内使氣道否澁故小便不通令人腹脇脹滿臍下急痛是其證也方茯苓湯治姙娠小便不通赤茯苓白术郁李仁杏仁旋復花各一兩㯽榔五枚剉右粗搗篩每服二錢匕水一盞煎至七分去滓空心服大黄湯治姙娠子淋小便不通木通丸治姙娠小便不通及轉胞臍下脹痛木通黄芩冬葵子生亁地黄焙各二兩右為末用麵糊和丸如梧子大每服二十丸燈心湯下食前服冬葵子散治姙娠小便不通小腹脹滿冬葵子榆白皮滑石阿膠各二兩右為散每服二錢匕温水調服不拘時四味葵根湯治姙娠小便不通臍下滿痛冬葵根車前子木通各三兩阿膠二兩右粗搗篩每服五錢匕水一盞半煎至八分去滓食前温服鯉魚湯治姙娠小便不利身重惡寒起則眩暈及水腫苦參丸治姙娠小便難飲食如故當歸貝母苦參各三兩滑石半兩右細末蜜和為丸如小豆大以米飲下二十丸不拘時榆白皮散治姙娠小便不通心神悶亂小腹急痛榆白皮王不留行滑石各一兩右為細散每服二錢匕煎灯心湯調下猪苓湯治姙娠小便不通臍下鞕痛猪苓木通桑根白皮剉各一兩右粗搗篩每服三錢匕水一盞入燈心同煎至七分去滓食前温服治姙娠小便不通臍下妨悶心神煩亂葵子榆白皮切各一兩葱白七莖右以水二大盞煎取一盞三分去滓分三服一方無葱白又方葵子赤茯苓蘧麥已上各一兩右搗細羅為散每服不計時候以温水調下一錢又方葵子滑石寒水石各一兩右搗為散每服三錢水一盞葱白七寸煎六分去滓無時候温服冬葵子散治姙娠小便不利身重惡寒起則眩暈及水腫姙娠小便不通冬葵子二錢赤茯苓二錢右為末每服三錢米飲調服無時候利則住服如不通恐是轉胞加髮灰少許神效一方無茯苓有榆白皮昔有姙娠婦腹脹小便不利吐逆諸醫雜進温脾胃寛氣去脹等劑服之反吐藥物不納轉加脹滿揍心騐之胎死腹中又脹諸下胎藥不能通解舉家憂惶因得鯉魚湯論曰脚腫俗呼為皺脚亦有通身腫滿心胷急脹名曰胎水遂去姙婦心前衣服看之胷肚不分急以鯉魚湯三五服大小便皆下惡水腫消脹去方得分娩死胎可謂更生之人矣此證盖縁懐身腹大姙婦不自知覺人人皆以為身娠如此不以為胎水病醫人何以得知故此書論病湏自家覺察大腸與膀胱水不出入淋瀝急數尿時痛大便赤裏急如痢以手按胷間至臍方可出不然小便逆上出而不禁其浮腫先以凉藥踈利却用上藥治姙娠卒然小便不利滑石末杏仁等分右先搗杏仁令爛次入滑石末以軟餅搗和為丸如小豆大每服二十丸葱白湯送下療姙娠卒不得小便用杏仁二十箇去皮尖熬令變色搗丸如豆大燈心煎湯吞七粒得利又方以滑石末水和泥臍下二寸小便即利未利更塗之又方用車前草汁調滑石末塗臍四畔方四寸熱即易之治姙娠小便不通臍下妨悶心神煩悶用紫苑去苗為末井花水調下二錢一方用紫草蔓荆實散治姙娠小便澁不通利用蔓荆實二兩搗羅為散每服二錢温水調服空心午前各一服衛生實鑑濃煎葱白湯調下治姙娠卒小便不通蔓菁子右搗細羅為散每服不計時候煎葱白湯調下一錢治姙娠小便不通利方用無青子七合為末水和服方寸匕日三治姙娠遍身浮腫喫前方未得全效小便未得通快宜服此方若遍身不腫止小便不通一兩日亦可服此藥一二盞山梔知母前胡升麻麥門冬冬葵子葶藶桔梗右細杵羅為末每服三錢水一盞二分葱白五枝同煎取一盞食後和滓喫遺失不禁夫腎主水入胞為小便腎氣和乃能約制溲出以時若姙娠腎虚胞冷不能約制故小便利下而多也其證令人背項憎風少腹急痛治法當加以扶養胎氣之劑方熟亁地黄丸治姙娠小便不禁臍腹疼痛熟地黄巴㦸天肉蓯蓉五味子山茱茰蒺䔧子萆薢蜀椒山芋續斷菟絲子杜仲沉香右為細末煉蜜和丸如梧子大每服十五丸食前温酒下椒菊丸治姙娠小便日夜頻數蜀椒甘菊花肉蓯蓉菖蒲巴㦸天逺志黄耆附子右為細末酒煑麵和丸如桐子大每服二十丸空心食前温酒下菟絲子丸治姙娠小便利日夜無度菟絲子菖蒲肉蓯蓉蛇牀子五味子防風逺志右為末煉蜜和丸搗三百杵丸如桐子大每服十丸空心温酒下温氣除寒補下丸治姙娠小便利葫蘆巴龍骨菖蒲逺志補骨益智肉蓯蓉右為細末煉蜜和丸如桐子大每服三十丸空心温酒下桑螵蛸丸治姙娠小便滑數桑螵蛸人參鹿茸黄耆牡礪粉甘草右搗粗篩每服三錢水一盞生姜一片棗二枚擘煎至七分去滓食前温服鷄胵散治姙娠遺尿鷄胵熟亁地黄當歸牡礪粉黄耆厚朴右搗羅為散每服二錢匕食前温酒調下鹿茸丸治姙娠下焦冷氣小腹疼痛小便多鹿茸一兩白龍骨三分桑螵蛸半兩牡礪粉二兩右為末酒煑麵糊和丸如梧子大每服二十丸空心食前温酒下艾葉丸治姙娠小便利小腹痛艾葉炙亁姜各一兩厚朴益智各半兩右為末煉蜜和丸如桐子大每服三十丸米飲湯下以飯壓之秦椒丸治姙娠小便利秦椒六兩蘹子炒一兩黄蠟四兩右搗羅二味末鎔蠟和丸如桐子大每服二十丸空心用温酒下白薇散治姙娠小便無度尿不知出時胎滿故也白薇白芍藥各一兩右搗羅為散每服一錢匕食前温酒調下日三鷄翎酒療姙娠尿不知出時胎滿故也用鷄子焼灰末之酒調方寸匕桑螵蛸散治姙娠小便不禁用桑螵蛸十二箇炙為細末每服三錢空心食前米飲調下治小便利焼遺尿人薦草灰服之瘥治小便遺失阿膠三錢牡礪四錢鹿茸四錢右剉末挑三錢水一盞半煎至一盞空心服或米飲調亦得瘧疾附論夫姙娠病瘧者由夏傷於暑客於皮膚至秋因勞動血氣腠理虛而風邪乘之動前暑熱隂陽交争陽乘則熱隂盛則寒隂陽相雜寒熱俱歇若邪動氣至交争則發故瘧休作有時其發寒時節漸晏者此由風邪客於風府循膂而下衛氣至一日一夜常大㑹於風府故發日晏其發日早者衛氣之行風日夜下一節二十一日至尾骶二十二日入脊内上注於伏衛之脉其行九日出缺盆之内其氣既止故發更早其間日發者由風邪内搏五臓横連募厚其道逺其氣深其行遲不能日作故間日蓄積乃發也姙娠而發則寒熱之氣相廹傷於胎故多損動也又云凢懐孕婦人病瘧可煎白虎湯小柴胡柴胡飲子等藥如大便結梗可用大柴胡湯微通利之不可大吐㵼恐傷其孕也經曰夏傷於暑秋必病瘧方松羅散治姙娠患瘧發時増寒壯熱口亁多吃冷水腹内㽲刺疼痛不止松羅半兩鱉甲半兩恒山半兩烏梅肉七枚朱砂漢防己各一兩澤㵼半兩麥門冬一兩知母連翹各半兩黄丹石葦虎杖各一分生亁姜一兩右搗細羅為散每服不計時候以温酒調下二錢清脾湯治姙娠作瘧熱多者青皮厚朴白术草菓仁柴胡茯苓半夏黄芩甘草人參各等分常山一半右剉散每服四錢生姜五片真地骨皮少許煎不時温服或加麥門冬去心二十粒未效宜服勝金丸阿膠散治姙娠患瘧發時増寒壯熱頭目眩暈不思飲食阿膠一兩半赤芍藥當歸柴胡黄芩白茯苓白术各一兩麥門冬一兩半甘草半兩右搗篩為散每服四錢水一盞入薤白二莖煎至六分去滓不計時候温服人參散治姙娠瘧疾頭疼増寒壯熱面黄不思飲食人參知母麥門冬柴胡桑寄生白茯苓厚朴各一兩甘草半兩右搗篩為散每服四錢水一盞煎至六分去滓不計時候温服驅邪散姙娠瘧疾者謂何盖榮衛虚弱脾胃不足或感風寒或傷生冷轉成瘧疾急服驅邪散莫待吐逆見食不思卒難醫療髙良姜白术草菓仁橘紅藿香葉縮砂仁白茯苓各一兩甘草炙半兩右㕮咀每服四錢水一盞半生姜五片􅀥一枚煎至八分去滓不拘時候七寳散治男子婦人一切瘧疾或先寒後熱或先熱後寒或寒多熱少或熱多寒少一日一發或一日兩三發或連日或間日發或三四日一發不問鬼瘧不伏水土山嵐瘴氣似瘧者亦治婦人姙娠六七月而患瘧疾皆可服之常山厚朴青皮陳皮甘草㯽榔草菓去皮各等分右㕮咀每服半兩於未發隔夜用水一碗酒一盞煎至一大盞濾出露一宿却将滓再用酒水更依前煎一次去滓别以碗盛貯亦露一宿來日當發之早盪温面東先服頭藥少歇再服藥滓大有神效嘗治一姙婦六七個月而沾瘧疾先寒後熱六脉浮𦂳衆醫用藥柴胡桂枝無效因言此疾非常山不愈也衆醫不肯因循數日病難無計黾勉治之遂用七寳散一服愈黄帝問曰婦人重身毒之柰何岐伯曰有故無殞帝曰願聞其故何謂也岐伯曰大積大聚其可犯也衰其大半而止豈不以審藥之性味明治療之方處以中痛與疾適好於半而止之勿過而於則何疑余攻治哉當歸散治姙娠患瘧憎寒體顫當歸白芍藥茯苓枳殻白术各一兩鱉甲一兩甘草剉一兩右搗篩為散每服四錢水一盞煎至六分去滓不計時温服知母散治姙娠瘧疾憎寒壯熱口亁煩悶知母白茯苓麥門冬柴胡各一兩烏梅三分大青甘草各半兩右搗篩為散每服四錢水一盞煎至六分去滓不計時候温服治姙娠患瘧疾湯恒山二兩甘草一兩黄芩三兩烏梅十四枚石膏八兩右㕮咀以酒水各一升半合漬藥一宿煑三四沸去滓初服六合次服四合後服二合凢三服一方有麥冬去心一兩無石膏名恒山散忌海藻菘菜生葱黄芩散治姙娠婦患瘧疾寒熱頭痛心煩黄芩麥門冬各一兩石膏二兩甘草半兩烏梅十四個右㕮咀每服四錢水一盞煎至六分去滓温服不計時候烏梅散治姙娠瘧疾寒熱頭疼煩渇烏梅黄連桑寄生人參甘草各一兩右搗篩為散每服四錢以酒一盞煎至六分去滓不計時候温服治姙娠患瘧疾湯恒山竹葉各三兩石膏八兩粳米一百粒右㕮咀以水六升煑取二升半去滓分三