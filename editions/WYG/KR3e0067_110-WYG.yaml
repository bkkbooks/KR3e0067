body:
  text: 普濟方卷一百十一明周王朱橚撰諸風門白癩論夫白癩之候語聲嘶嗄目視不明四肢痿痺闗節熱痛如火燔灼脊膂拘急肉如刀劈手足頑弱身體癮疹鼻生息肉目生白珠肉如針刺或生癮疹而色斑白故謂之白癩也烏蛇散出聖惠方治白癩語聲嘶敗四肢􅍙痺瘙痒生瘡烏蛇酒浸去皮骨炙葛根剉各一兩苦參紫參沙參人參芎藭天麻酒浸焙乾黄芩木通剉地骨皮防風去蘆防己莽草葉白术蒴藋木蘭皮去粗皮黄連去鬚附子炮製去皮臍烏頭炮去皮臍牛膝去皮梹榔煨剉熟乾地黄切焙葳蕤芍藥桂去粗皮𤣥參堅者龍骨研石膏研如粉升麻菊花未開者㣲炒蒺藜子炒去角秦艽去苗土細辛去苗葉天雄炒乾各二錢當歸切焙甘草炙剉逺志去心巴㦸天去心蒼耳花炒乾各二錢吴茱萸湯洗焙炒麝香研各半兩右為細末每服二錢空心温酒調下漸加至三錢睡時再服蝮蛇頭丸出聖惠方治白癩方見烏癩方鯪鯉甲丸出聖惠方治白癩鯪鯉甲三斤炙㣲黄蝮蛇半條酒浸炙㣲黄斑猫糯米拌炒㣲黄去足蠻䖝炒㣲黄水蛭生蜘蛛生乾者附子各三兩炮去皮臍蜈蚣一條炙㣲黄魁蛤半枚蠐螬三枚生雷丸十枚水銀與硝石同㸃汁令研星盡硝石川大黄剉碎㣲炙桂心川芒硝射干滑石龍骨礬石灰黄連各半兩去鬚石膏一兩細研水飛過巴豆十五枚去皮心研紙裹去油川椒一分去目合口㣲炒去汗右為末煉蜜丸桐子大每服空心及晩食前以温水下兩丸白花蛇散出聖惠方治白癩語聲嘶嗄目視不明四肢􅍙痺闗節熱痛身體癮疹鼻生息肉白花蛇酒浸去皮骨炙二兩天麻槐子㣲炒羌活去蘆頭防風去蘆頭晩蚕沙㣲炒蔓荆實白蘚皮葳靈仙去土枳殻去沙各一兩甘草炙剉半兩右為細散每服一錢温酒下不計時候苦參酒出聖惠方治遍身白㸃搔之落眉或痒或痛色白漸似乎白癩苦參去土皮心剉五斤露蜂房剉五兩蝟皮剉一頁右用水六斗煑取三斗去滓浸細麴四斤半炊黍米三斗醖如常法酒熟每飲三合至五合日二夜一以差為度一方無蝟皮天麻煎出聖惠方治白癩風天麻生用斤半天蓼生用三斤右剉大豆粒用水三斗五升煎至一斗壓去滓入銀石器中慢火煎如稠餳每服半匙荆芥薄荷酒調下不拘時日二夜一一月見效治白癩塗方出聖惠方葛上亭長四枚去趐足糯米同炒熟為度不用米此即斑猫乾蝮蛇頭尾全者炙黄去鱗及肚中腸肚等物一作大蝮蛇右搗羅生絹袋貯以酒五升甕中慢火煆煑酒及一升以下將綿袋蘸藥汁摩塗癩上日二夜一如不作痛日夜可五七次塗之商陸酒出聖惠方治白癩大風眉鬚落八風十二痺筋脈拘急肢節緩弱手足痺􅍙方見諸風襍治類艾葉酒出肘後方治白癩亦治大風癩用乾艾葉濃煑取汁每斗米麴用艾葉五兩重随麴米多少用煎濃汁拌浸醖如常法酒熟不拘時稍稍飲之常令酒勢相接醺醺然治白癩出聖惠方用馬鞭草不限多少為末每服食前用荆芥薄荷湯調下一錢服之良治白癩出本草以大蝮蛇一條勿令傷以酒漬之大者一斗小者五升以煻火温令稍熱取蛇一寸許以臈月猪脂和傅上或蝮蛇一條及他蛇亦得和𫝊上當有䖝如馬尾出仍取蛇肉塞内鼻孔中烏癩論夫烏癩初覺皮肉變暴肌腠之間淫淫躍躍如䖝行動眼前有物如絲懸布時發驚恐言語錯亂皮肉癮疹如桃李實或黒或赤手足􅍙痺不知痛所或脚下痛不可踐地凡食之時開口取氣而咽語亦如是身體生瘡兩肘如縛此名黒癩皆由惡風日漸傷損血氣不榮所致也方蝟皮丸出聖惠方治烏癩蝟皮一枚炙令黄海蛤一枚大者炙蚺蛇頭一枚炙黄䖟䖝五枚去翅足鯪鯉炙五片蠐螬二枚炙一作生用葛上亭長去翅足炒十五枚亦作生用水蛭五枚炒一作生用斑猫十五枚將水蛭亭長斑猫䖟䖝四件共用糯米少許同炒米熟為度去米不用蜈蚣一條去頭足附子二枚去皮臍炮製蜘蛛大者炙三枚雷丸十五枚巴豆七枚去皮心去油大黄剉如米粒醋炒半兩水銀半兩與丹砂同研㸃醋研令水銀星盡丹砂半兩研桂去粗皮半兩射干半兩黄連去鬚半兩石膏研一兩蜀椒去合口者炒半兩芒硝生用别研一兩龍骨另研半兩滑石另研一分礬石枯研一兩甘遂一分與芝蔴同炒蔴熟為度去蔴不用右搗羅及别研同拌和令均煉蜜為丸桐子大每服熱水下一丸至二丸空心臨卧各一服效加一丸小便時莖中覺痛是蟲已化如涕下也痛多止服一丸痛少許加至三丸一方治白癩有硝石藥無斑猫温酒送下硫黄散出聖惠方治烏癩久不瘥硫黄水浮石槐白皮寒水石白礬不灰木蝸牛子牡蠣金星礬石銀星礬石蟬殻握雪礬石蜜陀僧馬牙硝麝香雄黄亂髪灰蜂窩灰雌黄右藥各一錢唯白礬五錢研為末用水銀半兩以津唾碎研如泥别入膩粉一分以生麻油四兩都調令匀每於患處徧塗之效大黑油膏方出聖惠方治烏癩及諸癩遍身生瘡及多膿血川烏頭芎藭雄黄研後入胡粉研後入川升麻木防己雌黄研後入黄連去鬚白礬藜蘆黄蘗各半兩巴豆去皮油杏仁各十四枚去皮松脂如雞子大亂髪如雞子大右細剉如大豆粒以猪脂二升并藥同煎以亂髪消盡去滓後入雄黄雌黄胡粉攪匀收入磁盒中每用取塗於瘡上一日至夜三度塗之每度以熟鹽湯洗過然後更塗之勿令入口眼雄黄塗藥方出聖惠方治烏癩皮膚變黑生瘡腫痛殺䖝雄黄白礬紫石英白石英馬牙硝太隂𤣥精石金星礬石銀星礬石右為末入磁盒中用白土泥固濟候乾用炭五斤燒令通赤即止以蓋罨藥盒候來日取出於濕地上紙襯盆蓋出火毒三伏時再研如粉取楓樹膠煮汁和調每日用塗之以瘥即止露蜂房酒一名苦參酒出聖惠方治烏癩方見白癩類葛葎草浴方出聖惠録治烏癩葛葎草三秤剉揔淘益母草如上右葛葎取籬垣上者益母取近屋前者用水二石五斗煑取一石五斗漉去渣盆甕中浸浴一時辰久方出着舊布袍用被衣覆之又再煖令熱復浸浴一時辰久方出入温室着舊布袍被衣蓋覆汗出勿令見風明日復浴如入湯後舉身瘙痒不可忍令旁人捉手勿令搔動食頃漸定後隔三日一浴其藥水經浴兩次即棄之馬先蒿散出聖惠方治烏癩苦參飲出聖惠方治烏癩用苦參根白皮五斤細剉如麻豆生絹袋貯好酒三斗各浸七日夏浸四日每用温飲二合日二夜一漸加至五七合雌黄散塗方治烏癩及殺䖝用雌黄半兩研以米醋和雞子清如膏塗瘡上乾即更塗聖惠方用雞子黄大腹皮膏傅方出聖惠方治烏癩用生大腹皮二枚如無生者乾者亦得用皮全者勿令傷以酒一升浸緩火􅆈令酒盡藥乾搗羅為末煉臈月猪脂調和如膏傅之烏頭丸出衛生家寳方治宿患風癩遍身黒色肌體如木皮膚麄澁及四肢麻痺用草烏頭一斤竹籮内以水浸將瓦子於籮内就水中礱洗之如打菱角法直礱洗去黒色皮及尖控起令乾用麻油四兩入銚鍋内用炒黄色須去油復用鹽並草烏再炒令黒色􅃄出為度取一枚劈破心内如米一㸃白恰好也如白多再炒趂熱杵羅為末用醋糊為丸桐子大乾之每服三丸空心食前温酒下大風眉鬚墮落論夫大風病眉鬚墮落者皆從風濕冷得之或因汗出入水得之或冷水如入肌體得之或飲酒卧濕地得之或當風樹下及濕草上得之或體痒搔之漸漸生瘡經年不瘥即為風疾八方之風皆能為患客於經絡久而不去與血氣相干則使榮衛不利淫邪散逸故面色敗皮膚傷鼻柱壞眉鬚髪皆落也方白蒺藜散出聖惠方治大風惡疾二年三年眉鬚落者手足疼悶骨節煩腫面色黑皮肉漸變白蒺藜炒芎藭各二兩山梔子去皮防風去蘆各一兩三分萆薢炒羌活去蘆頭白芷炒升麻各二兩白茯苓去黑皮二兩半逺志去心菖蒲九節者甘浸切焙乾蔓荆實細辛去苗葉㣲炒茵芋去粗莖芍藥麻黄去根節煎掠去沫焙乾龍骨刮去土煎人參當歸切炒桂去粗皮各一兩一分白术㣲炒一兩附子炮製去皮臍三枚甘草炙剉桔梗切焙各一兩半右為細散每用温酒調下二錢至三錢空心午時前各一服如口乾舌澁喉裏􅃄生鼻中卒痛是佳兆也甚即煎少許甘豆湯觧之枳殻散出聖惠方治大風癩病眉髪墮落熱毒風入五臟身體頭面生瘡枳殻去瓤麵炒黄蓍炙剉蒼耳炒白术㣲炒蒴藋剉白蒺藜炒防風去蘆生用升麻生用梔子仁各三分漏蘆去蘆頭黄連去鬚人參天門冬去心焙防己乾薑芎藭丹參去苗土炙麻黄去根節煎掠去沫焙白芷甘草炙剉葛根剉各半兩𤣥參堅者三兩烏蛇酒浸去皮骨炙一兩右為散温酒調下二錢加至三錢空心夜卧服防己散出聖惠方治大風癩眉髪墮落及身面瘙痒腹中煩熱身􅐊疹起如棗核疼痛生瘡防己剉二兩烏蛇酒浸去皮骨三兩獨活去蘆頭黄蓍炙剉秦芁去苗土丹參去苗土㣲炙烏頭炮去皮臍松脂煉過各一兩人參苦參剉白术炒桂去粗皮芍藥各一兩一錢芎藭黄連去鬚蒺藜子炒去皮白茯苓去黑皮天門冬去心焙葛根剉各一兩半乾薑炮蜀椒炒去汗去閉口者并子各一兩𤣥參二兩右為細散毎服空心食前夜卧温酒調下二錢漸加至三錢漏蘆湯出聖惠方治大風癩身體成瘡眉鬚墮落㾦瘰瘙痒搔之水出者漏蘆去蘆頭白茯苓去黑皮烏蛇去皮骨酒浸獨活去蘆頭黄蓍炙白斂生薑切炒大黄剉碎醋炒各一兩升麻生用麻黄去根節煎去沫焙枳實去瓤麩炒芍藥防己𤣥參甘草炙附子炮去皮臍各三分梔子仁一兩一分石膏剉一兩半右剉如麻豆毎服五錢以水一盞半煎取一盞去渣温服要利空心臨卧各併二服白花散出聖濟總録治大風疾眉鬚墮落皮肉已爛成瘡者白花蛇去皮骨酒浸烏蛇去皮骨酒炙乾蝎全者去土炒白殭蠶炒各一兩地龍去土炒半兩雄黄火熬研一分蜈蚣十五條嘴足全者炒蝎虎十五枚全者炒蜜蜂炒一分丹砂研一兩黄蜂炒一分胡蜂炒一分龍腦研半分右為散每服一錢温蜜湯調下日三五服側子丸治大風癩眉鬚墮落身上有瘡手足悵悶鼻梁未壞側子炮製去皮臍一兩三分白芷㣲炒附子炒去皮臍天麻酒浸切焙龍骨防風去蘆製各一兩一錢蔓荆實一兩半白蒺藜炒二兩白术炒一兩人參山芋生乾地黄焙當歸切焙各三分右為末煉蜜和丸桐子大空心温酒下三十丸日再服漸加至五十丸唇舌㣲痺為效慎避外風皂莢丸治大風眉鬚落等疾大皂角二斤不蛀者酥炙過銀器中入水揉碎煎成膏子入後藥羌活去蘆頭三兩木香萆薢各二兩附子炮去皮臍半兩白牽牛麩炒郁李仁去皮尖碎剉獨活去蘆頭梹榔雞心者良大黄剉炒青橘皮去白焙何首烏去黒皮各二兩右十一味為末入皂莢膏捜和搗杵和勻丸桐子大暴乾常服薑湯下二十丸至三十丸病甚者稍増之山梔子散治大風癩疾眉鬚落遍身􅍙痺手足山梔子去皮二兩半芎藭一兩半藁本去苗土三分當歸切焙蔓荆實各一兩桔梗剉焙一兩三分羌活去蘆頭白蒺藜炒白茯苓去黑皮防風去蘆各一兩一分側子炮去皮臍天麻各半兩右為散毎日空心服温酒調下二錢至三錢夜卧時再服至一料眉鬚再生莽草散治十年大風毛髪秃落癮疹生瘡氣脈不通抓搔不覺痛痒莽草三兩㣲炙附子炮製去皮臍乾薑炮製剉石斛去根剉天雄炮製去皮臍躑躅花酒拌炒令乾白斂川烏頭去皮臍石南桂心各二兩細辛川椒各一兩去目及閉口者㣲炒去汗右為細散毎服以温酒調下三錢後以羊脯下藥日再服勿大飽食羚羊角飲治大風癩身上生瘡面部浮腫眉鬚落四肢􅍙痺羚羊角鎊甘草炙剉各三分獨活去蘆頭山梔子仁各一兩半防風去蘆一兩枳殻去瓤麩炒黄耆炙剉蒺藜子炒丹參去苗土㣲炙𤣥參木通剉各一兩一分右粗搗篩毎服五錢以水一盞煎取七分去滓温服日早食後及夜卧各一服雷丸散治大風疾神驗方其風有五種象五行金木水火土黒䖝者是業報之疾不可治也餘四般䖝但服此藥無不瘥者此方是聖人之法非凡俗所觧凡青黄黒白赤蟲在人骨體之中徃來無碍若蝕人肝則眉鬚先落若蝕人肺鼻柱崩折不聞香臭若蝕人脾語聲變散若蝕人腎則耳鳴啾啾心不受病故不言之若蝕人筋肢節墮落若蝕人肌則頑痺不知痛痒身上似有䖝行或有皰肉起似桃李小棗或多生瘡癬或狀如魚鱗或形如榆莢青黄赤黒變異不定從頭起者名曰順風從足起者名曰逆風起之由皆因冷熱交通流於五臟入於骨髓氣血内虚風濕相摶即便生䖝又因用力過度食酒相違酒後行房汗入骨髓亦患此疾若欲治者先服此散出䖝為驗見青黄赤白便可治之皆得除愈若黒虫出者此疾無方對治也其四般䖝肌肉欲壞眉髪落皆可服此藥為美雷丸硝石細研硃砂細研水飛過阿魏各一兩麵煨以麵熟為度雄黄細研雌黄各三錢細研藜蘆去蘆頭犀角屑紫石英各半兩細研飛過斑猫芫青各十二枚與斑猫用麻油一小合同炒油熟為度取出右為細散又用苦參四兩硝石四兩搗碎以生絹袋盛入磁瓶中以無灰酒一斗浸七日蜜封頭每取一中盞煖過於食前調下二錢祛風活血散治大風眉落當歸川芎白芍藥地黄赤芍藥連翹防風川椒各一兩小茴香肥皂角十四個重揉水濾浄將前藥浸入水内一日後取出濾去水焙乾右為細末酒糊為丸如桐子大每服三十丸煎蘇木薄荷湯不拘時下蘇木煎丸治大風眉鬚落退皮去爪甲換蘇枋木三兩搥碎以酒一斗煎至一椀去渣附子一枚炮製去皮臍烏頭一枚炒製去皮臍天麻酒浸焙一兩乾蝎去土酒浸一分草烏半兩用水浸乳香研没藥研各半兩雄黄水飛過半兩右除蘇枋木外搗羅為末將蘇枋木酒和藥末為丸黒豆大毎服五丸至七丸用淡䜴湯下衣被蓋出汗婦人用紅花酒下乳香丸出聖惠方治大風癩疾眉無鬚落者乳香炒軟後冷研人參紫參去苖土沙參去苗土𤣥參去苗土苦參剉搗碎天麻酒浸切焙菊花未開者佳枳殻去瓤用麵炒各半兩右為末煉蜜為丸桐子大毎服食後酒下二十丸日二夜一百日内兩鼻中出血是候也治大風眉鬚皆落却令生方出聖惠方烏麻油一升丁香一兩生薑汁生鐵末各一合附子木香訶黎勒皮垣衣各三分羊糞二十枚右為細末入油及薑汁中以不津器盛於馬糞中埋三七日藥成塗藥法以中指㸃於生鐵内摩三七下即塗脱落處熟揩之以乾為度十五日内眉鬚皆生何首烏丸出聖惠方治風氣留滯皮膚不仁鬢鬚墮落多生瘡癬身體瘙痒等症何首烏刮皮十二兩白牽牛㨂乾薄荷各三兩肥皂莢一斤去皮子碎用法酒三升浸兩宿揉濃汁去渣銀石器中熬成膏一斤炭火燒令􅃄盡收放濕紙上盆覆之候泠用一斤去皮酥炙令焦搗末右搗羅三味為末用皂莢膏和劑使膏盡為度熟搗丸如桐子大每服十五丸加至二十丸不計候温酒下日三服得效方治大風頭面髭髪脱落方見大風癩疾類青鹽散出聖惠方治大風疾眉鬚落遍生結腫皮肉頑痺青鹽白􅈨各一斤禹餘粮三斤右為細散更研令勻入磁罐子内盛瓦子蓋頭固濟初用炭火二斤燒漸添火至二秤已來從早晨燒至夜常添炭至一秤火盡為度隔宿候冷取之細研如粉用夾熟帛包裹取一塊浄土水拌令熟中心焙藥兩日出火毒又别取胡麻子六升揀簸浄秤之九蒸九暴畢炒令香熟搗羅為末毎三兩胡麻末合一兩燒煑藥末相和令勻毎服用荆芥茶調下二錢空心及晩食前服其效不可具述萆麻法出聖惠方治大風疾眉毛脱落方見大風癩病類治癩塗眉法出儒門事親半夏生用羊糞燒焦各等分右為末生薑自然汁調塗二聖散治髪眉自落鼻梁崩倒肌肉有瘡如癬方見大風癩病類松葉浸酒方出聖惠方治大風疾猪鬃松葉二斤切麻黄五兩去根節右細剉以生絹袋盛以清酒二斗浸秋冬七日春夏五日滿開取每服温一小盞服常令醺醺以效為度側柏丸出聖惠方治大風癩令生眉鬚用側柏葉不計多少九蒸九暴搗羅為末煉蜜為丸桐子大空心食前夜各一服熟水下五十丸百日毛生治大風頭面髭鬚脱落用毗黎勒燒灰乾渗患處立效馬先蒿散出聖惠方治大風疾骨肉疽敗百節疼酸眉鬚落身體㿇㿇痒痛者以馬先蒿細剉炒為末每空心及晩食前温酒調下二錢一方治烏癩荆芥薄荷湯下一方治癩用酒服一名馬新一名爛石草百靈藤粥方出聖惠方治大風等疾用百靈藤四兩以水一斗煎至三升去滓入粳米四合煑作粥於温室中澡浴後服之衣覆取汗後皮膚風退如麩片每隔日一服五六十日後漸愈毛髪即生治大風瘡未出眉毛落方出聖惠方生漆半兩生地黄三斤浄洗已上二味相合入銀器中以重湯煮用栁木箆攪候成膏用和後藥烏蛇二兩酒浸去皮骨炙㣲黄白附子一兩炮製雄黄半兩細研如粉右為末更都研令匀以前膏和丸桐子大每夜後以溫酒下七丸汗出為度石灰酒出千金方上生毛髪眉鬚去大風石灰一石拌水和濕蒸令氣足上麴一斗二升松脂煉成十斤為末黍米一石右以大鍋内炒石灰以木札着灰中火出為度枸杞根剉五斗水一石五升煑取九斗去滓淋石灰三遍澄清以石灰汁和漬麴用汁多少一如釀酒法訖封四七日開服常令酒氣相及為度百無所忌不得觸風其米泔及飯糟一匙已上不得使人畜犬鼠食之皆令深埋却此酒九月作二月止恐熱隔上熱者服進三五口冷飯壓之婦人不能飲食黄痩積年及蓐風不過一石即瘥其松脂末恐酸釀酒攤飯時勻散着飯上待飯冷乃投之此酒飯宜冷不爾即酸宜知之一方用柏脂商陸釀酒方治大風疾眉鬚脱落皮肉頑痺筋脈不利方見諸風襍治類烏金丸治大風疾眉鬚脱落鼻柱崩倒語音不利坯子臙脂别研硃砂别研人參去蘆頭乳香别研藕節羊蹄根青竹茹烏賊魚骨甘草細松煙墨燒灰用川芎十一味各三錢草烏頭炮去皮尖一錢右件為細末酒煑麵糊為丸毎一兩作十丸毎服一丸細嚼茶清下不拘時候一方有凌霄花忌雞猪酒麵淹藏等物若犯隂陽交㑹其病復作切宜永戒大風出蟲論夫䖝動物也皆風之所化風入五臟化生五䖝則成五癩入肝其䖝青入心其䖝赤入脾其䖝黄入肺其䖝白入腎其䖝黒四䖝皆可治惟黒䖝為難或所傷未深專意治之亦有瘥者方雄黄散治大風癩瘡於内取風毒延殺諸癩䖝塗傅雄黄白􅈨紫石英白石英馬牙硝太隂𤣥精石金星石銀星石各一兩以上同搗研為末入磁盒中用白土紙筋泥固濟火燒通赤以濕土蓋窨來日取出於浄濕地上用紙襯盆合出毒三伏時時洒地土令濕以麻油調傅麥飯石陽起石禹餘粮石紅皮石蜜陀僧不灰木各一兩蒲黄炒石灰風化者定州細瓷末各半兩砒霜一錢研鉛丹研青鹽研亂髪灰各一兩水銀膩粉各三錢右用同研令細以不見水銀星子為度每生麻油調塗患上有風毒膠延出為度不過一月效烏蛇丸治風癩殺五䖝胡麻子四兩烏蛇肉酒浸焙乾蜂房炙各半兩苦參梹榔獨活桃仁浸去皮晒乾白蒺藜炒去刺各一兩皂莢刺炒焦貫衆各七分半蕪荑雷丸雄黄硫黄各半兩朱砂二錢半蝦蟆二個去頭足炙焦右為細末以長皂角十條水三升搗取濃汁去滓煎成膏和藥末丸如梧桐子大毎服三十丸空心温酒下獨活散治大風癩出五䖝獨活去蘆頭三分雄黄研半兩青黛研一分麻黄去節先煎掠去沫焙乾半兩水銀一分與丹砂雄黄㸃醋同研以水銀星子盡為度尤妙阿魏生研入一錢雷丸炮丹砂研滑石研各半兩石膽研牛黄研紫石英研各一錢斑猫四十枚與糯米同炒去翅足米不用芫青四十枚與糯米同炒去翅足米不用右為細散每服一錢空心温酒調下不得飽食晩更服當有䖝從小便中出或當日三四日至十日方出若㵼出赤䖝如爛櫻桃或如豆麥或㵼出黄䖝似黄涕青䖝似青菜汁白䖝似馬尾䖝遇藥氣即死或隨大便下惟黒䖝如豆䜴汁此為難治硃砂散治大風肌膚不仁頭面生瘡顔色腫黒腹内生䖝鼻柱崩倒硃砂細研飛過紫檀漏蘆雄黄細研白歛紫石英細研水飛過犀角屑龍骨石膏各一兩細研雌黄細研阿魏各半兩生用牛黄一分細研硝石一兩半右為細散入石藥末更同研令勻每食前以温酒調下一錢如飢即宜喫小豆飯及棗湯食物不過飽飽即其䖝難出服藥後小便似淋即以盆子盛㸔當有䖝出當日便出或三五日方出者至䖝出仍宜服藥候䖝出盡便瘥阿魏雷丸散出聖惠方治大風疾五臟生五䖝五䖝者各隨五臟之色惟黒䖝難治先服藥出䖝以驗其色阿魏生研一錢雷丸生用三分雄黄研半兩丹砂研滑石研石膽研各一分硝石研半兩白斂剉犀角鎊各一分牛黄研半兩斑猫紫石英研半兩芫青三十枚與糯米同炒去翅足米不用右為散每服一錢空心温酒調下飢即食小豆飯為良慎勿多食但半飽即止常宜覺飢食飽䖝出遲也日晡腹空時更服一錢若覺小便似淋痛不問早晩即便服一錢大飢即食若覺小便似痛澁即就一瓷器中屎尿出㸔之其䖝或如爛筋狀各隨其臟辨色䖝也熟艾方出聖惠方治大風癩薫出䖝艾葉别揉令熟砒霜研水銀與雄黄同研膩粉研硫黄研丹砂研阿魏酒化去砂石麵和作餅炙附子炮去皮臍雄黄細研入水銀㸃醋再研令星子盡始入膩粉砒霜硫黄再炒同硏各一兩麝香研半兩猪牙皂角一斤去皮牙另為末右除艾葉皂莢别搗為末外並合和細研用紙四張先布艾次糁皂莢末又次糁諸藥末卷刀切如餅餤着碗内燒以小甑子籠碗以衣襯四邉坐於上薫以衣被遮擁定不令透出氣熱悶即虫出黒虎丹出聖惠方治大風癩惡䖝内蝕形骸變壞天靈蓋三兩蝦蟆三個去頭足燒存半生生人中白桃仁浸去皮各三兩麝香一錢硫黄雄黄各一兩穿山甲熱灰挿焦皂莢刺燒存半生各半兩老刺佳輕粉二錢半右煉蜜丸如桐子大每三十丸月首五更米飲連日服取䖝盡則愈殺瘵通用黒虎丸一名黑虎丹出聖惠方治大風癩疾䖝及皮膚􅍙腫手足墮天靈蓋塗酥炙三兩蝦蟆去皮肚中物炙乾塗酥再炙一枚麝香研一分桃仁湯浸去皮尖雙仁炒六兩雄黄研二兩人中白研二兩杏仁湯浸去皮尖雙仁炒六兩右為末再研勻煉蜜丸如桐子大空心日午用蕪荑湯下二十丸至三十丸一方以温粥飲下三十丸雷丸散出聖惠方治風癩取䖝水銀硫黄雄黄雷丸雌黄各二錢半用乳鉢㸃醋同研令星盡為度阿魏貫衆末各二錢半麝香半錢右研極細毎一錢天明温酒調下明日又服一方無貫衆有萆􅐺通神散出聖惠方治大風癩疾凡是鼻梁未折服之䖝出無不愈方見大風癩病類硫黄酒出指直方殺癩風䖝用明硫黄乳鉢研細三錢酒調空心飲清汁明日添硫黄再研入酒如前或添大楓油妙諸石丸出濟聖方治大風取五色䖝金星石銀星石雲母石禹餘粮石滑石自然銅磁石生乾地黄龍仙石出齊州龍延石陽起石蜜陀僧凝水石各等分右搗碎以罐子盛用炭火十斤煆以火盡為度取出搗研為末醋煑麵糊丸如桐子大每服十五丸用後補藥下補藥茯苓散出聖惠方白茯苓去黑皮人參天麻苗木香枸杞根狗脊去毛天麻芎藭蓬莪茂景天青葙子海桐皮各等分右各生用為散每服二錢白花蛇酒調下前丸藥日三服忌雞猪肉魚蒜一百日當效五靈仙湯出楊氏家藏方治淋洗大風毒氣殺五䖝斂瘡口雄黄一兩别研何首烏苦參荆芥朴硝四味各一兩右件為粗末用水五升先浸藥三日次煎數十沸用如浴湯法其䖝即漸死將藥湯潑棄無人處却換新衣服切忌房室如有肉壞生瘡者炒槐花為末傅生瘡口其瘡自然長肉白虎風論夫白虎風之狀或在骨節或在四肢其肉色不變晝静而夜發發則痛徹骨髓或妄言妄有所見者是也蓋由風寒暑濕之毒乗虚而感播在經絡留於血氣畜聚不散遇陽氣虚弱隂氣隆盛則痛如虎囓故以虎名焉痛如掣者為寒多腫滿如脹者濕多汗出者為多風巢氏云飲酒當風汗出入水遂成斯疾久而不愈令人骨節蹉跌為癩病者誠有此理後人宜慎之方虎骨散出聖惠方治白虎風走注疼痛發歇不定積年不效者虎骨酥炙黄烏梅肉赤茯苓去黑皮剉肉蓯蓉酒浸切焙人參鱉甲去裙襴醋浸炙豆䜴㣲炒紫苑去土黄耆剉焙各一兩常山炒甘草炙芍藥各二兩當歸切焙三分前胡去蘆三分白术枳殻去瓤麩炒犀角鎊知母切焙各一分升麻茈胡去苗桔梗炒天靈蓋酥炙桂去粗皮木香各三分桃仁酒浸去皮尖雙仁炒四十九枚右為散毎服温酒二錢空心臨卧各一若為丸煉蜜丸桐子大每服温酒下二十丸至三十丸酸棗仁散出聖濟方治白虎風厯節疼痛不可忍酸棗仁炒半兩敗龜酥炙黄二兩秦芁去苗土一兩半虎骨酒炙黄二兩羌活去蘆一兩防風去蘆一兩一分芎藭一兩一分桂去粗皮白芷蒲黄炒牛膝去苗酒浸切焙附子炮製去皮臍枳殻去瓤麩炒當歸切焙各一兩半右為散毎服温酒下三錢空心夜卧各一服酸棗仁散出聖惠方治白虎風痛徹骨髓晝静夜發酸棗仁半兩㣲炒敗龜三分塗酥炙令黄虎脛骨一兩塗酥炙黄羌活牛膝去苗桂心附子炮製去皮臍枳殻去瓤麩炒㣲黄地龍㣲炒當歸各一兩沒藥乳香各半兩補骨脂㣲炒赤芍藥各三分右搗細羅為末每服不計時候以温酒調下二錢白頭翁煎出聖惠方治白虎風四肢疼痛至夜轉甚不可忍者白頭翁三兩牛膝去苗附子炮去皮臍桂心羌活赤芍藥各三分赤茯苓人參去蘆頭各半兩防風去蘆三分虎脛骨一兩塗酥炙㣲黄丹皮半兩當歸三分酥五合生薑汁二合右為細散用好酒五升都煎如餳毎服不計時候温酒調下一匙服藥後仍須炒蠶沙熨之為妙雄黄散塗方出聖惠方治白虎風疼痛走轉不定雄黄莽草藜蘆去蘆頭各一兩斑猫二十枚赤小豆半合白􅈨蕪荑皂莢燒灰蛇床子吴茱萸各三分硫黄半兩研附子一兩去皮臍巴豆十五枚去皮心右搗細羅為散都研令均毎用散一錢以生油調塗於痛處日二易之甚妙虎骨散出聖惠方治虎風疼痛及走注不定虎骨酒炙二兩地龍去土炒兩半牛膝酒浸切焙硼砂湯煑令枯桂去粗皮芎藭當歸切焙蜜陀僧各研一兩躑躅酒炒用一兩半沒藥研延胡索炒乳香研各半兩右為散拌勻毎服一錢温酒少入童子小便調下虎骨散治白虎風肢體疼痛發則不可忍虎骨酥炙二兩花蛇酒浸取肉用天麻防風去蘆乳香别研川牛膝去蘆酒浸白殭蠶炒去嘴屑川當歸去蘆酒浸桂心不見火各一兩甘草炙全蝎各半兩去毒麝香一分别研右為細末毎服二錢温酒調服或用豆淋酒調服亦可不拘時候虎杖散出聖惠方治白虎風血脈結滯骨髓疼痛發作無時虎杖一兩半桂心一兩當歸一兩半赤芍藥天雄炮去皮臍桃仁湯浸去皮尖雙仁麩炒㣲黄芎藭枳實麩炒㣲黄羌活防風去蘆頭秦艽去苗木香各一兩右搗粗羅為散毎服三錢以水一中盞入生薑汁半分煎至六分去滓不計時候稍熱服之沉香湯出聖惠方治白虎風骨中疼痛不可忍入夜即甚走注不定沉香半兩虎骨酥炙黄二兩梹榔炮半兩生乾地黄剉三分當歸切焙一分芎藭半兩白芷㣲炒鬼箭羽各一分芍藥半兩地龍㣲炒一分羌活去蘆頭半兩右麄搗篩毎服六錢水一盞酒一盞桃枝七寸薤白三四莖同煎至一盞去渣温服空心午時各一疾甚即夜添二服羌活散出聖惠方治風寒暑濕毒氣吹筋脈或在骨節或四肢名曰白虎風者羌活去蘆頭附子炮製去皮臍天麻防風去蘆牛膝酒浸切焙蒺藜子炒去角芎藭烏頭去皮臍生用乾蝎全者麻黄去根節白附子炮等分右為散毎服一錢温酒調下初且服半錢三日後漸加羌活散出聖惠方治白虎風風毒攻注骨節疼痛發作不可忍者羌活側子炮製去皮臍秦艽去苗桂心木香芎藭當歸牛膝去苗附子炮去皮臍骨碎補各一兩桃仁三十枚湯浸去皮尖雙仁麩炒㣲黄右搗麄羅為散毎服三錢以水一中盞入生薑半分煎至五分去滓不計時候稍熱服虎骨散出聖惠方治白虎風肢節疼痛發則不可忍虎脛骨塗酥炙黄白花蛇酒浸去皮骨炙黄龍骨防風乾蝎炙㣲黄桂枝當歸羌活各一兩麝香一分細研白殭蠶一兩炒牛膝一兩去苗天麻一兩右搗細羅為散研令匀毎服不計時候以豆淋酒調下二錢没藥散治白虎風流注筋節疼痛没藥一兩獨活一兩半虎脛骨二兩塗酥炙晩蠶沙㣲炒芎藭各一兩半防風去蘆頭蔓荆子當歸赤芍藥桂心各一兩右搗細羅為末每服不計時候以熱酒調下二錢羌活湯治白虎風痛甚不可忍者羌活去蘆頭防風去蘆一兩秦艽去苗土芎藭各一兩半當歸焙一兩半大腹皮連皮三枚桃仁湯浸去皮尖䨇仁炒二十枚附子炮製去皮臍右剉如麻豆每服五錢水二盞入生薑一棗大拍破煎至一盞去滓温服日二夜一廣濟療白虎方犀角屑當歸各六分芍藥六分牛膝沉香青木香虎頭骨炙各八分檞葉木一握炙麝香一分研右㕮咀用水六升煑取二升六合去渣分温三服如人行四里進一服别加麝香末服之服利忌生菜熱麵蕎麥蒜地龍散出聖惠方治白虎風疼痛遊走無定地龍白色去泥㣲炒桂去粗皮白芷炒白殭蠶炒葳靈仙漏蘆芎藭當歸切焙各半兩右為散毎服熱酒調下二錢日三夜一烏頭散出聖惠方治白虎風走注疼痛烏頭炒製去皮臍地龍炒羌活去蘆頭虎骨酒炙延胡索當歸切焙沒藥研防風各一兩右搗羅為散毎服二錢冷酒調下空心食前日二服麝香丸出聖惠方治白虎風不計月日逺近熱加寒痛走轉不定如刀割不可忍者麝香細研雄黄研硃砂研各一兩地龍三分炒白附子半兩炮製芫花三分醋拌炒乾斑猫五枚同糯米炒令黄去翅足狼毒三分剉醋拌㣲炒右搗為末以醋煑麵糊丸菉豆大不計時候以温酒下五丸牛膝散治白虎風疼痛難忍牛膝去苗酒浸切焙當歸切一兩虎骨二兩酥炙黄赤芍藥一兩芒硝别研一兩芎藭半兩桃仁去皮尖雙仁炒二十枚右為散温酒調服治白虎風晝静夜發疼不可忍狂言妄見防風去乂羌活去蘆頭桂去粗皮地骨皮去土芎藭細辛去苗虎骨酒浸一宿酥炙黄右等分搗為細散每服一錢温酒調下赤芍藥散出聖惠方治白虎風筋骨疼痛四肢懈墮赤芍藥羌活各一兩仙靈脾一兩半虎頭骨二兩塗酥炙黄天雄炮製去皮臍芎藭桂心各一兩右搗細末為散毎服不計時候以葱白湯調下二錢麝香散出聖惠方治白虎風骨節疼痛不可忍者麝香研半兩没藥研乳香研各一兩虎牙長大者用一付四個天麻二兩蜈蚣嘴足全者酒浸三日暴乾右為細散和匀每服二錢温酒調下不拘時日二三服皂莢散傅方出聖惠方治白虎風疼痛皂莢旅生蕎麥白蒺藜榖精草五靈脂蕓薹子各半兩右搗細羅為散用釅醋調塗之效燕窠土丸摩之方出聖惠方治白虎風寒熱發作骨節㣲腫痛徹骨燕窠土二兩伏龍肝二兩砒黄一錢水牛肉脯一兩炙令黄别搗羅為末右搗細羅散後入砒黄牛脯等和勻毎將少許新汲水和如卵大於痛處摩之後痛止即取藥抛於熱油鐺中原蠶蛾散出聖惠方治白虎風晝夜遊走疼痛原蠶蛾炒一分白殭蠶炒半兩蟬蜕炒地龍白者去净泥㣲炒各一兩右為散用乾脯一片炙熱安病人所卧席底當痛處不得令知若其夜痛甚難治痛緩即易治來日待病人起後看脯必有異色若脯色赤毎服用散三錢脯色青㸃每服四錢温酒或米飲調下空心服藥後更喫酒令小醉汗出即愈白殭蠶散一名地龍散出聖惠方治白虎風痛不可忍白殭蠶炒臈茶炙各一兩甘草炙三分地龍白色少泥者㣲炒一兩右為散每發時空心服二錢午後服一錢臨卧服兩錢並用熱酒調下又先取藥一兩銚子中鎔成水投桂末半兩攪勻攤於紙上炙令熱服第一服藥了即貼向痛處用熱綿裹之一方無甘草每服温酒調下二錢不拘時阿魏散出聖惠方治白虎風身體疼痛不可忍轉動不得阿魏半錢乳香研好茶末各一錢地龍白色十五條少泥者佳㣲炒右為散分二服空心夜食後並用熱酒調下服藥後更喫熱豆淋酒後乃喫熱薑稀粥以布被覆取後汗通體當瘥一方不用酒止用好茶調下亦可蠐螬散出聖惠方治白虎風疼痛晝静夜發蠐螬七枚研甘草炙剉炒五錢没藥研乳香研各一錢右同研分二服每服煎酒一盞二三沸調下不計時虎骨散出聖惠方治白虎風疼痛走注不定虎脛骨酥炙二兩羌活去蘆頭附子炮製去皮臍地龍炒各一兩右為散毎服二錢温酒調下不計時候一方無附子有防風附子散出聖惠方治白虎風止疼痛附子炮製去皮臍虎腦骨一兩酥炙令黄桂心去粗皮一分右為散每服温鹽酒調下一錢至二錢空心午時各一服治白虎風痛走不定不問老少灰炭五升無炭桑灰亦得紗羅羅之一遍蚯蚓糞一升搗之紅蘭七捻新者佳右一處攪和熬令熱取好釅醋煖之拌令浥浥以故布三四重裹分作四分五更當所患處熨數數轉勿住手煖之令熱得所寧令小熱不得作冷冷即執熬令熱又熨之並用後呪法曰青􅟡皮青毛出黄􅟡皮黄毛出赤􅟡皮赤毛出白􅟡皮白毛出黑􅟡皮黒毛出急出吾口神吾口聖唾山山崩唾石石裂得汝字汝不去砍頭砍頭急急如律令其呪法先令人唾病處以手挼之不住手便即誦此呪不限遍數以瘥即停當誦呪不得令病人聞呪須先静浄潄口方效療白虎方猪肉三片大麻子一合好酒半盞右和麻子口含噀上將猪肉三片手劈向痛處來去呪曰相州張如意張得與是汝白虎本師急出呪訖將安床下差送路頭神驗防風散出聖惠方治白虎走轉疼痛兩膝熱腫防風去蘆頭地龍㣲炒漏蘆各二兩右搗細羅為散毎服不計時候温酒調下二錢虎骨散出聖惠方治白虎風走注疼痛不定虎脛骨酥炙黒附子炮製去皮臍右各一兩為末每服調下二錢日再服治白虎風走轉疼痛膝腫騏驎竭硫黄細硏各半兩右搗羅為散研令匀毎服不計時以温酒調服一錢薰藥方治白虎風至骨疼痛不可忍者精猪内四兩切作片子安息香二兩右將肉裹香即用香瓶子内灰覆火上着一銅片子隔之放安息香於上燒之以瓶口就痛處薰之以衣遮蓋勿令透氣三兩上瘥抵聖散治白虎風骨體疼痛至夜轉甚用虎脛骨不計多少打破用蘸酒旋灸令黄脆為散毎服半錢入薄荷末一錢人參末半錢煎乳香酒調下烏蛇浸酒方治白虎風朝野僉載商州有人患大風家人惡之山中為茅屋遷徙居有烏蛇墜酒甕中病人不知飲酒漸瘥甕底上見有蛇骨方知其由也取烏蛇一條洗刷去塵土用好酒一斗浸七日後毎日煎一盞温服如喫酒取烏蛇焙乾為末温酒調下一錢獨勝散治毒腫白虎病方治白虎風用鋪飯於患處使丹雄雞食之或黄脚雞亦可又取熱糞封之取伏於患人床下一方用丹雄雞糞塗之治白虎風所患不論積年久無效痛不可忍者用腦射不限多少細切酒浸焙乾常服以醉為度即瘥今之寄生楓上者方堪用其葉亦可製砒霜粉尤妙治筋節急痛治白虎風用雞子揩患處呪願送糞堆上不過三度即差白虎是糞神愛喫雞子普濟方卷一百十一
