body:
  text: 普濟方卷三百四十八明周王朱橚撰産後諸疾門産後血暈附論夫産後血暈者由敗血流入肝經眼見黑花頭目旋暈不能起坐甚至昏悶不省人事謂之血暈温酒調黑神散或清䰟散最佳庸醫或作暗風中風治之必難愈凡暈血熱乘虚逆上凑心故昏迷不省氣迷欲絶是也然其由有三有用心使力過多而暈者有下血多而暈者有下血少而暈者其暈雖同其治特異當詳審之下血多而暈者伹昏悶煩亂而已當以補藥清心藥治之下血少而暈者乃露惡不下上搶於心心下滿急神昏口噤絶不知人當以破血行血藥治之古法有云産婦纔分㝃了預燒秤錘或江中黄石子硬炭燒令通赤置器中急於床前以醋沃之得醋可除血暈産後一臘不妨時作為妙凡暈者皆是虚熱血氣奔逆腹中空所致欲分㝃者第一湏先取釅醋以塗口鼻仍置醋於旁使聞其氣兼細細飲之此為上法如覺暈即以醋噀面甦來即飲醋仍少與解之一云仍少與水解之一法燒乾漆令煙濃熏産母面即醒如無乾漆以舊破漆器猛火燒熏之亦妙經行候迷悶者有去血多而悶去血多者是為血虚則心虚心虚則手足顫神魂亂則坐卧不安眼見黑花甚者迷悶去血少者是為血迷血迷則隨氣上逆停留於心竅心下急滿無所歸神魂如醉不能言語産後迷悶者是為血暈血暈則虚而無所歸氣無所主氣血妄行掩觸心肺遂使眼花頭眩神昏憒不知人事唇青肉冷口中絶氣雖數日有此證凡覺神昏悶絶宜服八寶丸治之産後血暈者是産母下血或少或多皆令五臟運動氣血未定敗血奔迸攻衝心肝若産去血過多則血虚氣極若下血氣逆則血隨氣上逼心也二者皆令人運悶心煩滿急若血暈不止則斃矣若敗血攻於肝肝臟氣虚所以眼花心煩而欲絶也又云夫血暈煩悶氣欲絶者由産後出血過多血氣虚極因此而悶絶也又有下血少而氣逆極則血亦隨之上衝心亦令煩悶而滿急然亦當濡其産婦血下多少則知其産後應暈與不暈也然暈不止則斃人凡産時當向坐卧之處湏順四時若觸犯禁忌多令暈悶故血下或少或多是以産處若有觸犯多致災禍爾血暈眩暈湏量虛實若宿有痰飲等病不除産後多致眩暈及血氣虚弱而使血逆上攻此又非清䰟可療崔氏曰凡暈者皆是虛熱血氣奔迸腹中空所致欲分㝃者先取釅醋以塗口鼻仍以醋火淬於傍使聞其氣兼細細飲之此為上法可以免其暈也治血暈之證有三宜仔細辨證用藥若血少而運者乃惡露不下上搶於心心下滿急神昏口噤不知人事冝破行血之藥黑神散神妙若血多而忽暈者但神魂煩亂而已宜補血清心之藥芎歸湯神妙若下多虚極羊肉湯當歸建中湯若身體素多風疾因産傷積氣血乘虚而暈四物湯加防風羗活若暈悶而熱多者獨活柴胡湯并治風痰藥若下多氣虛極暈昏不知人息欲絶暈不止則殺人若作暗風治之謬矣但服清魂散自愈方陳橘皮湯治産後惡血下多氣虛頭目旋眩沉沉黙黙不省人事調氣益血陳橘皮去白炒白术切炒人參甘草炙剉黄耆剉酸石榴皮洗切熟乾地黄各半兩右粗篩分作三劑每劑用水五盞加生姜五片􅀥五枚擘同煎至三盞去滓時服一盞稍熱服未漚麻聖惠方治産後預防百病喫醋墨了便服此神效未漚麻一握去土一尺已上取枝及時陰乾赤芍藥二兩芎藭三分當歸三分剉㣲炒甘草三分炙㣲赤剉茯苓三分陳橘皮一兩湯浸去白炒亂髮一兩半右搗羅為散每服四錢以水一中盞入生薑半分約煎至五分次入酒二合更煎三五沸去滓溫服治血暈至急宜服白瓷藥散聖惠方用白瓷藥燒令通赤承熱搗研令細不計時候以溫酒調下一錢當歸湯治産後敗血不盡衝心迷悶旋暈不語當歸切焙芎藭芍藥桂去粗皮生乾地黄㣲炒炙一分牛膝去苗酒浸切焙獨活去蘆頭劉寄奴各半兩右粗篩每服三錢水一盞入生薑五片煎至七分去滓温服不拘時候瑇瑁散治産後則血不下上衝心腹疼痛瑇瑁鎊三分蒲黄琥珀别研如粉好墨牡丹去心各半兩赤龍鱗燒灰即鯉魚皮延胡索當歸㣲炙芎藭各三兩右為散每服二錢用煖生薑酒調下淡醋湯亦得不拘時候服之荷葉湯治産後血暈悶絶唇口青色不省覺者宜先用生鷄子清一枚打匀口灌入即定却服此方荷葉蔕七枚蘇枋木剉碎三分牛膝去苗切焙乾延胡索各半兩芍藥半兩右粗搗篩每服三錢水酒共一盞煎至六分去滓溫服如暈甚不省抅開口灌之敗醬湯治產後惡血結聚血氣衝心暈垂死者敗醬𦍑活去蘆頭當歸㣲炙切芍藥芎藭瞿麥用蕙子各一兩桃仁湯浸去皮尖雙仁麩炒黄色三十枚枳殻去穰麩炒黄桂去粗皮各三分右粗搗篩每服三錢水一盞煎至六分去滓下馬牙硝半錢更煎數沸溫服空心相次再服利三二行惡血下為効延胡索湯治產後血暈延胡索芎藭各一兩生乾地黄二兩牛膝去苗當歸切焙人參各二兩半右粗搗篩每服三錢水一盞煎至七分去滓入白蜜一匙許更煎令沸溫服相次再服琥珀煎治產後血暈無問冷熱悉主之琥珀一兩剉研末生地黄汁一盞生薑汁一盞右先取地黄生薑汁二味相和緩火煎去一半别下無灰酒一盞又煎候如稀􅄳方取琥珀末入煎中熟攪置於瓷器中空心取半匙溫酒調服紅藍花湯治產後血下少暈悶嘔逆紅藍花蘇枋木各半兩剉右粗搗篩每服三錢水一盞煎取七分去滓溫服相次再服芍藥湯出大全良方治產後血暈心悶不識人言語錯亂少氣者芍藥一分生乾地黄焙甘草炙令赤各一兩丹參半兩右粗搗篩每服三錢水一盞生薑一分切碎同煎至七分去滓下白蜜少許再煎令沸溫服相次更服當歸飲治產後血暈欲絶當歸㣲炙一兩鬼箭羽二兩右粗搗篩每服三錢酒一盞煎至六分去滓溫服相次再服延胡索散治産後血暈不識人延胡索劉寄奴當歸㣲炙各一兩右為散以溫酒二錢服之湏臾便下芍藥湯治産後血暈絶不識人芍藥半兩末亂髮一兩燒灰右相和研令匀每服二錢以熱酒調溫服之湏㬰再服立效地黄湯治産後血暈心悶不識人神言鬼語氣急欲絶方見本門惡露不下盡類又方出大全良方荷葉三枚炙真蒲黄一兩生地黄汁半升白蜜一匙甘草二兩右細切以水三升煮取一升去滓入蒲黄蜜地黄汁煖服立愈妙赤馬通飲子出聖惠方治産後血暈狂語不識人狂亂童子小便五合生地黄汁一合赤馬通七枚紅雪八分右以上二味浸赤馬通絞去滓下紅雪分為兩服一方無紅雪用當歸末半兩分三服獨行散出拔萃方治產後血暈昏迷不省悶絶衝心用五靈脂二兩半生半炒為末調溫酒中下二錢口噤者拗開口灌之即愈一方用熟水調服若血崩不止用炒熟者當歸酒同煎或水酒童便各半盞同煎又方水煎為膏加神麯末和丸桐子大空心溫酒下一方加荆芥等分為末童便調下又方出肘後方治産後血暈用神麯為末熟水調二錢亦治產難不差再服療產後血暈狂言煩渴不止出大全良方用生香附子去毛為末每服二錢水一盞薑三片􅀥一箇煎至七分溫服一方治用力過多血暈者宜服此調氣治產後血暈危困生地黄汁一大盞當歸一分剉赤芍藥一分剉右水三五六沸溫服如覺煩熱去當歸入童子小便半盞妙治產後血暈全不省人事極危殆者出大全良方用韭菜切入在一有嘴瓷瓶内煎熱醋沃之便密縳瓶口以瓶嘴向產婦鼻孔令醋氣透入須先扶病人起惡血衝心故有此證韭能去心之滯血加以醋氣運逹之用無不効紅藍花酒出大全良方療血暈絶不識人煩悶言語錯亂惡血不盡腹中絞痛及治胎死腹中不下用紅藍花二兩為末分二服每服溫酒二盞童子小便二盞煮取一盞半候冷分為二服留滓再併煎一方無童便一方攙新水服如口噤幹開灌之如子死腹中服之立下療產乳暈絶方出大全良方用洗兒水飲三合良或以惡血服少許良半夏散出經驗良方療產後血暈用半夏不以多少為末如豆大内鼻中即省亦療五絶作末㗜鼻亦可又方出千金方用生赤小豆搗末取東流水和服方寸匕不差再服救急同治産後血暈腹疼頭旋及臍腹痛一名末藥散出聖惠方用沒藥為末每服一錢溫酒調下牡丹散出聖惠方治産後血暈悶絶狼狽若口噤則撬開灌之必妙牡丹皮大黄蒸芒硝各一兩冬𤓰子半合桃仁三七粒去皮尖右剉散每服五錢水三盞煎至盞半去滓入芒硝後又煎分二服欲産先煎下以備緩急金匱以此治腸癰兩服即愈益母草散出仁存方治産後血暈心悶亂恍惚如見鬼生益母草汁三合根亦可生地黄汁三合童子小便一合鷄子清三箇右煎藥汁令熱入鷄子清攪匀作一服芸薹子散治婦人産婦血暈及九竅内血出煩渇不止欲死者此方可救方見本門惡露不下類血暈藥出百一選方治産後更湏准備用輕烟墨二錢用火煆通紅窨威火氣研為細末可作一服溫酒調下京墨亦可清魂散一名芎藭湯出仁存方治産後血暈者何荅曰産後血暈因産所不過多血氣虚極是致暈悶甚則昏塞不知人氣息欲絶暈悶不止則能斃人若作暗風治之誠為謬矣但服清魂散自瘥如芎藭湯黑龍丹皆惡藥也或以漆燒煙熏其鼻更於産婦房室中須用醋炭為佳澤蘭孫一作澤蘭葉人參去蘆各一兩川芎二兩甘草八錢一方無荆芥穗四兩右為末每服三錢重熱湯調下痰盛加薑製半夏一錢生薑五片水一盞熱服口不開灌服一方熱湯温酒各小半盞調匀急灌之下咽喉即眼開氣定自省人事一方無甘草評曰血暈當量虚實若因去血過多而暈宜芎藭湯若因痰阻未除人宜茯苓半夏湯半夏三兩茯苓熟地黄一兩八錢陳皮細辛人參芍藥川芎紫蘇桔梗甘草一兩二錢右以為散每服四大錢生薑七片煎空心服或血壅氣盛人宜牡丹散方内用大黄芒硝恐非產後可輕服者更不出方或曰奪命丹用大黄奚為而可荅曰奪命丹兼用附子仍酒下五七小丸可以一時刷勝牡丹散大劑煎服無擇翁且令先煎以備緩急謂之擾乎可擾擾亦無擾此必無擇親用之則可他人則不可烏金丸出楊氏家蔵方治產後血暈及惡露未盡腰腹刺痛或胞衣不下腹脹喘滿斑猫四十九枚血竭一分如無更加沒藥半兩代之沒藥半兩别研碙砂三錢五靈脂半兩右件為細末同酒醋各一升半慢火􅆈成膏子搜藥和丸如梧桐子大毎服一十丸至十五丸麝香熱酒醋送下不拘時候苦杖散出楊氏家藏方治産後血暈及兒枕疼痛惡露不行臍腹㽲痛牡丹皮當歸洗焙白芍藥延胡索乾漆炒令煙盡羗活去蘆頭獨活香附子炒紅花苦杖一名虎杖乾姜炮蒲黄肉桂去粗皮川芎甘草炙鬼箭羽已上各等分右件為細末每服三錢水酒各半盞煎至七分於食前溫服治産後血暈用紅藍花蘇枋木酒水濃煮汁飲治産後去血多眩暈心悶氣絶湏臾害人必有不救出直指方用舊漆燒㣲煙逼面熏之良却不可太甚恐虚怯人不禁治産後血氣上衝心成血暈出聖惠方用穿山甲一兩童子小便浸一宿取出慢火炙令黄色為散毎服一錢狗膽少許熱酒調下不時服之治産後血暈以將苧麻與産婦枕之治産後血暈築心眼倒風縮欲死者出仁存方以荆芥穗搗篩毎服用末二錢童子小便一酒盞調熱服立効如口噤者挑開閉者灌鼻中皆効治産後血暈心氣絶以益母草研汁服一盞治産後血運心悶氣絶出肘後方以童小便濃研墨服一升一方用丈夫小便治産後血氣暈出聖惠方以醋用羙清香稍稍含之即愈一方打破鷄子一枚投熱醋中攪勻頓服立効治血暈出聖惠方以蘇木三兩細剉水五升煮取二升分再服差若無蘇木即以緋衣煮汁服亦可即蘇木酒煎服亦得産後血暈出海上名方以乾荷葉為細末溫酒調一錢服又方出海上名方用鰾膠燒灰存性為末三五錢童子小便調酒下川芎湯一名芎藭湯出危氏方治産後去血過多暈悶不省及傷胎去血多崩中去血多金瘡去血多㧞牙齒去血多不止懸虛心煩眩睴頭重目暗耳聾舉頭欲倒宜服之方見本門諸疾類治産後血暈悶亂兒枕痛等並宜􅀈此藥琥珀一兩鱉甲一兩京三稜一兩延胡索半兩沒藥半兩大黄六銖右為散空心酒溫三二錢日再服神驗産後减大黄沒藥散出仁存方治産後血暈及血風衝心腹痛沒藥當歸各半兩穿山甲一兩右為末每服三錢狗膽汁少許煎酒調下童便尤佳紅藍花湯治産後血暈氣衝心悶絶紅藍花生乾地黄焙各一兩訶梨勒皮煨黄五枚右粗為篩每服二錢以水酒共一盞煎七分去滓溫服如人行二三里再服益母草散治産後血暈煩悶益母草乾者一兩藕節乾者人參各半兩右粗搗篩每服二錢水一盞生薑三片煎至七分再去滓溫服桂心散治産後血塊攻築頭目昏暈桂去粗皮姜黄各一兩右為散每服二錢以炒生薑酒調下不拘時候一方用酒調服羚羊角散出千金方治血暈心中煩悶兼腹痛羚羊角燒灰枳實去穰麩炒黄色各一兩芍藥一兩半右粗羅為散煎酒令溫調一錢七空心晩各一服用童子小便及湯調下亦可天麻散治産後血暈天麻訶梨勒炮過用皮木香各一兩芸薹子半兩㣲炒右粗篩毎服二錢水一盞煎至七分去滓溫服相次再服沒藥酒方治産後血暈及腹痛用沒藥半兩酒三盞將沒藥磨盡每服一盞煎一沸服續斷湯治産後血暈心腹硬乍寒乍熱以續斷三兩搗篩每服二錢以水一盞煎至七分再去滓溫服地黄飲治産後血暈心悶氣絶以生地黄嫩肥者搗取自然汁每服半盞煎沸服之如未効再服一方用酒相和頓服地黄散治産後下血過多氣虚血暈衝心悶亂不知人事生地黄切焙白芷延胡索白膠炙剉赤芍藥桂去粗皮白术劉寄奴鱉甲醋炙丹參當歸切焙各等分荷葉二斤右為散每服三錢溫酒調下不拘時麝香散出聖惠方治産後敗血衝心暈悶及腹痛者麝香研半兩丹砂研半兩烏鵶毛臘月者焼灰研半兩墨半挺猪胞子燒為灰五枚鯉魚鱗燒灰四兩蘇枋木剉一兩半油髪燒灰二兩右為末除前四味搗羅為散和匀每服二錢暖酒送下治産後血暈悶亂恍惚不語方生益母草汁一合地黄汁二合童子小便一合紫葛細研紅藍花各一兩右煎五七沸去滓溫服蘇枋飲治産後血暈腹悶氣喘急欲死蘇枋木二兩荷葉炙一枚芍藥一兩半桂去粗皮一兩鱉甲去裠襴酥炙一兩右剉為麻豆大以水五盞藕汁一合同煎取二盞除滓入碧雪一兩分溫二服粥食前如人行三五里候再服劉寄奴湯治産後百病血暈劉寄奴甘草各等分右剉如麻豆大每服五錢先以水二盞入藥煎至一盞後再入酒一盞去滓溫服紅藍花湯治産後血暈心煩悶紅藍花二兩紫葛一兩芍藥一兩右粗搗篩每服五錢水一盞半煎至八分去滓後再入生地黄汁半合更煎六七沸溫服不拘時赤馬通飲子出聖惠方治産後血暈惡血不行腹脹滿迷悶赤馬通五塊童子小便酒各五合右和攪馬通調絞取汁熱煖分溫服之紅藍花散出聖惠方治産後惡血不下血暈不識人紅藍花荷葉各等分右為散每服二錢用生藕汁調下一方用荷葉生薑湯下牛膝散治産後血暈悶及惡血不下牛膝去苖酒浸切焙當歸切焙芎藭各二兩劉寄奴一兩半芍藥桂去粗皮蒲黄紅藍花各一兩琥珀研生薑切焙乾各半兩右為散每服三錢溫酒調下或以水一盞煎七分溫服亦得黑神散治産後血暈眼花黑暗不見物赤龍鱗炒亂髮燒灰烏賊魚骨燒灰各三分桂去粗皮乾薑炮延胡索牡丹皮訶梨勒皮芍藥芎藭各半兩當歸切焙生乾地黄水蛭炒一分右為散每服二錢炒生薑酒調下或炒黑豆小便調亦可得大黄散治產後血暈血塊及傷折内損血瘀羊脛炭燒赤酒淬十遍五兩大黄童子小便浸七日一日一易用濕紙褁煨熟切焙巴豆去殻漿炙黄色焙各二兩半半兩錢燒赤醋淬為粉新水淘過取細三兩一分右為散研令匀每服半錢當歸一分童子小便煎濃稍溫調下產後血暈當逐血下口噤者幹開灌之後識人更一服累經生產有血積堅塊及敗血風勞寒熱諸疾當下如爛肝片亦無他疾墜擊内損當歸酒調下一字黑桂散治產後血暈煩悶或身體腫滿發狂㵼痢寒熱等疾惟有喘者難療黒豆炒熟去皮二兩肉桂去粗皮當歸乾姜炮芍藥生乾地黄焙甘草蒲黄紙上炒各一兩右為散每服二錢溫酒調下日三服治產後血暈方右極釅醋和所產血一􅀥大服之井水噀面又方取童子小便磨安息香亦妙又方取童子小便蒲黄一兩服亦用釅醋熏面口吸氣妙治產後血暈不識人狂言亂語以童子小便磨狗膽灌之最妙治產暈心悶大困用鯽魚剥皮作鱠以虀食三兩口止又方取牆頭草一把以水四小升煮取二升分服又生姜汁一小升地黄汁一小升酒一大升相和煎至五六沸分服每劑和大黄末一匙此方甚良治血暈絶不識人煩悶赤駁馬糞絞取汁一大盞溫者良若乾者取新汲水半大盞和研絞取汁須服亦主人血不止神驗治產亂暈絶覺暈即用三股麻繩長五六尺繫產婦右脚膝上令人捉兩頭急挽得醒徐徐解之當歸湯治產後惡血少下氣逆頭目旋暈眼花心悶頭重不舉當歸洗切㣲炒芎藭桃仁去皮尖雙仁炒桂去粗皮芍藥牡丹皮各半兩右搗篩分三劑每劑用水五盞生姜五片􅀥五枚擘同煎取三盞去滓時服一盞温服治產後血暈不知人事及狂語出聖恵方用麒麟竭一兩細研為末不時溫服酒調二錢治產後血暈絶出肘後方用細斷生雞肝内一斤熱酒中訖漉出滓停酒冷如人肌一服不能飲者可數口進治產防暈方出肘後方以先火炭燒地令熱即出炭以醇醋洒地令有醋氣於上產時必不暈也大効治産後血暈産後