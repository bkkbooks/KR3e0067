body:
  text: 普濟方卷一百三十七明周王朱橚撰傷寒門傷寒發狂論夫傷寒心狂熱者縁心属火也心主於血隂陽盛則血并於陽熱邪攻於心絡則心神煩亂或黙或歌或言或笑猖狂不已言語失常驚悸不安棄衣而走此皆熱毒之氣壅滿心胸致令發狂也夫重陽者狂謂陽氣獨盛也傷寒熱毒既盛内外皆熱則陽氣憤嗔而發為狂越其病使人狂走妄言或罵詈不避親疎或妄見妄聞甚則至於棄衣而走登高而歌或數日不食踰垣上屋者葢四肢諸陽之本也熱盛而四肢實是為重陽故所止處皆非素所能而病乃能也若乃因火為邪而發為驚狂及内有瘀血而外症如狂其為病雖不同然其為陽氣有餘則一也傷寒發狂者狂猖狂也謂其不寜也難經曰狂之始發也少卧不饑而自高賢也自辨智自貴倨也妄笑好歌樂也妄行走不休也狂家所起皆陽盛使然内經曰乃隂不勝陽也脈留薄疾并乃狂也又曰邪入於陽則狂邪入於隂則瘖難經曰重陽者狂重隂者癲脈經曰隂附陽則狂隂附隂則癲病源曰陽邪併於陽則狂隂邪併於隂則癲即諸經之狂為陽盛也明矣又陽明之病惡人與火聞木音則惕然而驚心欲動獨閉户牖而處甚則欲上高而歌棄衣而走踰垣上屋其所上之處皆非素能也是謂陽邪併於陽明也傷寒熱毒在胃併於心臓使神不寜而志不定遂發狂也傷寒至於發狂為邪熱至極也非大吐下則不能已又有熱在下焦其人如狂者經曰熱入膀胱其人如狂謂之如狂則未至於狂但卧起不安爾其或狂言目反直視為腎之絶汗出輙復熱狂也不能言食又為失志病若此則殆非藥石之所及是為甚病焉活人歌括曰發狂面赤属重陽葶藶升麻及大黄血症身黄仍漱水尿多承氣地黄湯隂邪併於隂則癲陽邪併於陽則狂傷寒熱毒在胃併入於心遂使神志昏亂言動急速而發狂也狂之發作少卧不饑妄語妄笑妄倨妄辨妄起妄行棄衣而起登高而歌甚則踰垣上屋皆獨陽亢熱使之非吐下不能止有當汗不汗瘀熱在裏下焦血虚面如狂者小便必利特如狂而未至於狂耳其或熏熨迫汗灼艾爇燒針令人煩躁卧起不安則謂之火邪驚狂凡是數者各有條例若夫狂言直視旋溺自遺其與汗後熱多脈躁狂言不食胃有寒水重陽結毒脈數實狂走錯語煩躁乾嘔面赤咽痛朝熱發班葶􅐗苦酒湯陽毒升麻湯梔子仁湯三黄湯大黄散升麻葛根湯如大狂走者水調𤓰蒂末吐痰𤓰蒂散亦可吐血症如狂脈微而沈身黄唇燥漱水不欲下嘔無寒熱小腹鞕滿小便利大便微利而黒輕者犀角地黄湯重者楊桃仁承氣湯或抵當丸取盡黒物為效張云太陽病不解熱結膀胱其人如狂而血自下下者愈若外不解可與桂枝湯外已解但小腹急結乃以桃仁承氣湯攻之大抵傷寒當汗不汗熱畜在裏熱化為血故喜怒如狂陽狂寒水石黄連末各一錢冷水調下皆效發熱妄語未可下者龍膽草一物湯火邪驚狂者醫家以火熏熨迫汗及燒針灼艾而然也其人亡陽煩躁卧起不安金匱風引湯柴胡加龍骨牡蠣湯桂枝甘草龍骨牡蠣湯又以火刼腹滿㣲喘口乾咽爛或大便不通譫語小柴胡湯黒豆解火邪湯方龍骨救逆湯出聖恵方治傷寒脈浮醫以火刼出汗太過必亡陽心生狂熱起卧不安龍骨一兩桂心一兩甘草一兩炙微赤剉茯神一兩人參一兩去蘆頭麥門冬二兩去心焙牡蠣二兩燒為粉蜀漆一兩右搗麄羅為末毎服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候温服犀角散治傷寒有狂熱在心恍惚或多驚不得睡卧犀角屑三分茵陳三分茯神二兩人參一兩去蘆頭梔子仁半兩赤芍藥半兩麥門冬一兩去心焙龍齒三分川升麻半兩子芩三分甘草三分炙微赤剉右搗篩為散毎服四錢水一中盞入生薑半分煎至六分去滓不計時候温服桃仁承氣湯出聖恵方治傷寒病不解熱結在膀胱者其人必如狂血自下愈外未解出不可下先解其外解已但小腹結者可下之宜服内經曰甘以緩之辛以散之小腹急結緩以桃仁之甘下焦畜血散以桂枝之辛大熱之氣寒以取之熱甚搏血加二物於調胃承氣湯之中也方見本門三隂三陽應用散類羚羊角散出聖恵方治傷寒心熱發狂羚羊角屑半兩黄芩半兩赤芍藥半兩茯神半兩葛根半兩剉鼠尾草半兩梔子仁半兩川大黄半兩剉碎微炒麥門冬一兩去心焙右搗篩麄羅為散毎服四錢以水一中盞入䜴一百粒煎至六分去滓不計時候温服人參散出聖恵方治傷寒邪熱在心恍惚狂言時有痰逆不欲飲食人參三分去蘆頭桔梗半兩去蘆頭龍齒三分茯神三分半夏半兩湯洗七遍去滑逺志一分去心枳實一分麩炒微黄麥門冬三分去心沙參半兩去蘆頭黄耆半兩剉甘草一分炙微赤剉右搗篩為散毎服五錢水一大盞入生薑半分􅀥三枚粳米五十粒煎至五分去滓不計時候温服地骨皮散出聖恵方治傷寒心神煩熱狂語不定地骨皮萎㽔人參去蘆頭黄耆剉麥門冬去心子芩已上各一兩茯神三分甘草半兩炙微赤剉右搗篩為散毎服四錢水一中盞煎至五分去滓入生地黄汁一合生薑汁一茶匙蜜半合更煎一兩沸不計時候温服龍齒散出聖恵方治傷寒心熱狂言恍惚卧不安蓆龍齒二兩犀角屑一兩川升麻一兩茯神一兩半麥門冬二兩去心焙𤣥參一兩甜竹根三分剉赤芍藥一兩半生乾地黄二兩馬牙硝一兩半右搗麄羅為散毎服四錢水一中盞入生薑半分煎至六分去滓不計時候温服又方出聖恵方馬牙硝一兩鉛霜一分龍腦一分硃砂半兩鐵粉一兩右都研令細不計時候煎竹葉湯放温調下一錢又方出聖恵方龍齒半兩牛黄一兩細研馬牙硝一兩細研硃砂半兩細研地龍一兩微炒麝香一兩細研右搗研令勻不計時候以生薑蜜調下一錢黄芩散出聖恵方治傷寒熱毒在内心煩發狂黄芩一兩甘草半兩炙微赤剉白薇一兩梔子仁一兩大青知母􅌝􅌣川硝石白鮮皮各一兩右搗羅為散毎服不計時候以新汲水調下二錢龍齒丸治傷寒邪熱在心狂言妄語精神錯亂志意不定龍齒一兩人參一兩去蘆頭茯神三分逺志半兩去心黄芩三分麥門冬一兩去心焙黄連三分去鬚甘草半兩炙微赤剉右搗羅為末煉蜜和搗一二百杵如梧桐子大毎服不計時候以冷米泔水三十丸送下苦參飲出聖濟總錄治傷寒欲發狂解毒止躁苦參一兩黄芩去黒心二兩甘草炙半兩右搗為麄末毎服三錢以水一盞煎至七分去滓入生地黄汁約半合攪勻去滓温服不拘時候大黄湯出聖濟總錄治傷寒熱結在内心神恍惚狂妄大黄剉炒芒硝各一兩半桂去粗皮三分大腹皮剉甘草炙剉木通剉各一兩桃仁二十一枚去皮尖雙仁麩炒右麄搗篩毎服四錢以水一盞煎至六分去滓温服不計時候以通利為度犀角湯出聖濟總錄治傷寒九日至十日頭戰大汗出恍惚狂走眼見神鬼犀角屑半兩茵陳蒿三分茯神去木芍藥麥門冬去心焙生乾地黄焙各一兩半梔子仁半兩右麄搗篩毎服五錢用水一盞半入竹葉三七片同煎至八分去滓食後温服千金丸出聖濟總錄治陽毒發狂及癲邪狂走猪血一盞生用不􅁅木為末藍根連葉為末各一兩水銀一盞以錫結沙子鷄子三枚只用清膩粉半錢右六味除猪血鷄子清外細研入猪血鷄清拌和令勻入瓷罐子内封閉臘日合之掘地坑一尺埋候端午日取出旋丸如鷄頭大毎服一丸生薑汁及新汲水化破服救逆湯出聖濟總錄治傷寒脈浮醫以火刼之亡陽必驚狂桂去粗皮蜀漆各一兩半甘草炙一兩牡蠣熬二兩半龍骨二兩右剉如麻豆大毎服五錢以水一盞半入生薑半分切大􅀥二枚擘破同煎取七分去滓温服人參湯出聖濟總錄治傷寒後狂言欲走口乾或時吐逆人參羚羊角屑葛根剉竹茹前胡去蘆頭麥門冬去心焙各半兩甘草炙剉一兩半夏湯浸去滑炒乾半兩右麄搗篩毎服五錢以水一盞半入生薑一分拍碎棗三枚擘破同煎至八分去滓食後温服茈胡湯一名加味小柴胡湯治傷寒過經不解熱結在裏狂言不定煩躁欲走茈胡去苗大黄剉炒朴硝枳殻去穣麩炒各一兩甘草炙剉半兩右麄搗篩毎服三錢以水一盞煎取六分去滓温服利再服一方加枳實一錢半羚羊角散出聖濟總錄治傷寒發汗後熱毒未盡因有所驚狂言欲走羚羊角屑犀角屑防風去叉茯苓去木黄芩去黒心𤣥參升麻各半兩龍齒研一兩甘草炙一兩竹茹地骨皮洗焙丹參各三分右麄搗篩毎服五錢用水一盞半入葱白五寸同煎至八分去滓温服香豉湯出聖濟總錄治傷寒心狂欲走縁風熱毒氣内乘於心所致豉炒令香熟三兩芒硝燒令白於濕地上用紙襯出火毒四兩右二味毎取豉半兩先以水一盞煎取七分去滓下芒硝末三錢再煎三兩沸空腹分温二服如人行三里更一服日夜可四服起初㸔是風狂者宜暫經兩手足三服之後解之即無不愈者朴硝湯出聖濟總錄治傷寒發狂欲走是毒氣壅於上焦毒熱不散狂盛不縛手脚恐自刑害及走趂人其脈左寸洪數時時伏下朴硝燒令白於濕地用紙襯出火毒一分豉炒令香熟一合山梔子仁一分右麄搗篩毎服三錢以水一盞煎至半盞去滓空腹温服如人行十里再一服如利即止大黄湯出聖濟總錄治傷寒狂言欲走大小便不通腹痛脹滿大黄細剉微炒木香剉各一分木通剉三分升麻羚羊角屑白茅根剉黄芩去黒心各半兩右麄搗篩毎服五錢用水一盞半入葱白五寸同煎至八分去滓服欝金散出聖濟總錄治傷寒陽盛發狂大小便不通腹脹滿欝金大黄細剉微炒山梔子仁各三分桂去粗皮半兩甘草炙剉一分右搗羅為細末毎服二錢食後煎葱豉湯調下治傷寒得汗熱毒不解心煩躁悶言語不定小便赤澀大便不通狂悶欲走方出聖濟總錄大黄細剉微炒朴硝研各二兩黄芩去黒心山梔子仁大青各一兩半龍膽去土苦參各一兩右搗羅為細末煉蜜和成劑更搗三五百杵如梧桐子大毎服二十丸食後煎麥門冬湯下量病勢更加丸數金薄丸出聖濟總錄治傷寒時行發狂妄見鬼神金箔銀箔各一十片鐵落用水淘出沙泥取鐵粉四兩青黛半兩砒霜半錢麝香半錢右研為細末入糯米粥為丸如皂莢子大新水磨下一丸如人行五里吐出涎立效不灰木散出聖濟總錄治傷寒熱實發狂煩躁悶亂不灰木二兩滑石寒水石藍根甘草生各一兩右搗研為散毎服二錢研生粟米泔入乳糖一塊如􅀥大同化調服不拘時候絳雪丸出聖濟總錄治傷寒發狂眼通赤大小便血出身如金色兼治六七日狂躁發熱硝石一兩丹砂一分右二味同研如粉燒粟米飯和丸如彈子大毎服一丸沙糖冷水化下服藥後便睡移時汗出為效鵲石散出醫方集成治傷寒發狂踰墻上屋黄連寒水石各等分右為末毎服二錢濃煎甘草湯候冷調服一方出肘後方治傷寒發熱陽勝隂卒發狂手足温面紅狂言狀如見鬼右用青蒿一把搗碎為末入水二盞半送下立效一方老青松蒿子童便浸三日乾為末毎服二錢烏梅一箇煎服桂白丹出宣明論治傷寒積熱及風生驚搐或如狂病諸藥不效此方不可盡述粉霜一兩用白麪六錢和作餅子炙熱同研鉛白霜一分輕粉半兩右為末滳水為丸桐子大毎服十丸至十五丸米飲下量虛實加減金匱風引湯出活人書大黄乾薑龍骨各四兩桂枝三兩甘草牡蠣各二兩寒水石滑石赤石脂白石脂石膏紫石英各六兩右為麄末以囊盛之取三指撮井花水三升煮二沸去滓温服一升桃仁散出王氏傳濟方治傷寒狂亂疎利臓腑止霍亂心疼桃仁一兩湯浸去皮尖大黄一兩川者以濕紙裹煨兩度桂心一兩去皮甘草半兩炙牙硝一兩右細剉熟炒杵羅為末不拘時候用温水調下三錢如傷寒後有餘毒依法服大效傷寒潮熱論夫傷寒熱毒不退伏留於臓腑而不能散即攻其表隨氣旺衰而作發歇遍身壯熱或進或退故謂之潮熱也診其脈各隨其五臓六腑洪數者是也傷寒潮熱者謂潮作有時由邪氣入裏故病有日晡所發潮熱已而微利者有微發潮熱而大便溏者有潮熱而欬逆者有結胸而潮熱者大凡潮熱皆以邪氣内實也制方者宜酌其輕重傷寒潮熱者若潮水之潮其來不失其時也一日一發指時而發者謂之潮熱若日三五發者即是發熱非潮熱也潮熱属陽明必於日晡時發者方為潮熱陽明者胃属土應時則旺於四季應日則發於未申經曰陽明居中土也萬物所歸無所復博葢邪氣入胃謂之入府府之為聚也若府庫之府焉邪氣入於胃而不復博邪氣鬱而為實熱隨旺而潮是以日晡所發潮熱者属陽明也惟其属陽明故潮熱為可下之症經曰潮熱者實也又曰潮熱者此外欲解也可攻其裏焉又曰其熱不潮未可與承氣湯即此觀之潮熱属於胃者昭然可見焉雖然潮熱為裏實可下之症一或􅎃浮而𦂳與其潮熱而利或小便難大便溏者皆熱未全入府猶帶表邪當和解其外外解已而小便利大便硬者乃可攻之或謂潮熱有属太陽少陽者乎少陽正於寅夘太陽旺於己午若熱於此發者為邪未入胃豈得謂之潮熱必待日晡所發者乃謂之潮熱見其邪在胃也遇疾值病詳而驗之始見得真也潮熱者大率當下仲景云潮熱者實也大承氣湯症云其熱不潮未可與也則知潮熱當下無疑矣雖然更有脈與外症脈若弦若浮及外症兼惡寒猶有表症且與小柴胡湯以解之若腹大滿不通者可與小承氣㣲和其胃氣勿令大泄也仲景云日晡發熱者属陽明也脈實者大承氣大柴胡也脈虚者桂枝也縱使潮熱當得大承氣亦須先少與小承氣若不轉失氣不可攻之後發熱復硬者大柴胡下之若胸脇滿而嘔日晡發潮熱者小柴胡加芒硝主之又有日晡發潮熱已而㣲利者又有㣲發潮熱而大便溏者或潮熱而欬逆者皆當用小柴胡也傷寒十三日不解胷脅滿而嘔日晡發潮熱已而微利潮熱者實溏也先服小柴胡以解外後以柴胡加芒硝湯下之陽明潮熱大便少胸滿不去者柴胡主之冬陽明潮熱當行黄芩湯冬陽明病脈浮而𦂳必發潮汗黄芩熱發作有時但脈浮者必盗主之已上潮熱並属陽明也太陽有潮熱仲景大陷胷湯一症結胸有潮熱者為大結胷属太陽也傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸牀惕而不安微喘直視但發熱譫語者大承氣湯主之若一服利則止後脈弦者生濇者死弦者陽也濇者隂也陽症見隂者死病人有陽症而脈濇者慎不可下歌曰已成下症熱須潮病在陽明裏欲焦若有結胸并表症莫將承氣胃中調又歌曰潮熱属胃下之和大結胸家本利圖欬逆利溏并表症勿攻只有小柴胡潮熱属陽明一日一發日晡而作也若非日晡而發是謂其熱不潮葢陽明旺於未申故爾惟属陽明故潮熱為可下之症茍其脈或弦或浮大便或溏或利小便艱澀外症猶有惡寒則結其熱未全入府並不可下但以小柴胡和解之是必表症已退大便硬而小便如常乃可攻也日晡潮熱甚者循衣摸牀獨語如􅬝直視㣲喘鬭弦者可治脈濇者不治脈不實不虚但有小柴胡湯寒熱往来隂陽相搏用大小柴胡及桂薑結熱心煩仍喜嘔渇而頭汗用之良陽不足先寒而後熱隂不足則先熱而後寒往來者隂陽兩相勝邪正交争間作也葢裏而與之争故陽勝而為熱若邪氣在半表半裏之間則外大邪入於内為寒隂争而為熱出入無拘所以乍往乍來而間作也大抵邪居表多則多寒邪居裏多則多熱邪在半表半裏則寒熱相半又可以知其受病之處用藥固自有條然小柴胡最主寒熱寒多者加薑桂若熱結加大黄脈不甚實而大便澀者加枳實寒熱相半只守本方是活法雖然寒熱之方來如波濤之洶湧其勢有不容通者當進之一二日候少定而圖之經所謂盛者可待衰而已是又不可不知病至十餘日結熱在裏往來寒熱大柴胡湯下之心煩喜嘔胸脇滿不欲食寒熱往來小柴胡湯或血氣弱腠理開邪氣交争痰嘔甚者二陳湯汗下後不嘔而渇頭汗出胸脇滿小便不利寒熱往來柴胡桂薑湯方鼈甲散出聖惠方治傷寒發歇潮熱頭痛煩渇四肢無力胸膈痰滯不思飲食鼈甲一兩半去裙生用恒山三分剉甘草半兩炙微赤剉川大黄半兩剉碎微赤炒地骨皮一兩石膏二兩麥門冬一兩去心知母半兩右搗篩為散毎服三錢水一中盞入小麥五十粒煎至五分去滓不計時候温服人參散出聖恵方治傷寒潮熱不退毎發口乾渇逆飲食全少四肢無力人參一兩去蘆頭半夏半兩湯洗七遍去滑蘆根一兩半麥門冬半兩去心枳實半兩麩炒微黄黄耆三分剉赤芍藥白术赤茯苓甘草炙微赤剉各半兩右搗篩為散毎服五錢水一大盞入生薑半分􅀥三枚粳米五十粒煎至五分去滓不計時候麥門冬散出聖恵方治傷寒潮熱往來口乾煩燥頭目疼痛麥門冬二兩去心焙葛根一兩剉麻黄三分去根節黄芩川大黄剉碎微炒川朴硝各三分右細羅為散不計時候用新汲水調下一錢葛根散出聖恵方治傷寒潮熱口乾頭痛四肢煩疼葛根剉黄芩石膏柴胡去苗知母各一兩甘草半兩炙微赤剉右搗篩為散毎服五錢水一大盞煎至五分去滓不計時候温服柴胡散一名柴胡桂姜湯出聖恵方治傷寒經十日已上潮熱不解日晡即發壮熱如火胸滿嘔逆亦治勞瘧柴胡一兩去苗桂心半兩黄芩三分􅌝􅌣根半兩牡蠣一兩燒為粉甘草一分炙微赤剉右搗篩為散毎服五錢水一大盞入生薑半分煎至五分去滓不計時候温服聖濟名六味柴胡湯外臺秘要用乾薑無生薑黄芩散出聖恵方治傷寒潮熱煩悶體痛嘔逆黄芩柴胡去苗人參