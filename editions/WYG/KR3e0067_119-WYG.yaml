body:
  text: 普濟方卷一百二十明周王朱橚撰積熱痼冷門諸熱治熱結滯經年數發用胡荽半斤五月五日採陰乾水七升煑取一升半去滓分服未差更服春夏葉秋冬根莖並用亦可預備之治發熱口乾小便少用荽㽔五兩煑汁飲之治大人及小兒發熱可取雞卵三顆白蜜一合相和服之立差卒熱悶用羚羊角屑作末研和少蜜服亦治熱毒痢及血痢解熱以萶菜研汁作粥食之竹葉湯治五心熱手足煩疼口乾唇燥胸中熱竹葉小麥各一升知母石膏各二兩茯苓黃芩麥門冬各二兩人參一兩半生薑五兩栝蔞根甘草半夏各一兩右㕮咀以水一斗二升煑竹葉小麥取八升去滓内藥煑取三升分三服老小分五服枳實湯出千金方治熱氣手足心煩熱如火竹葉二升枳實三兩青箱子白前各一兩呉茱萸黃芩各二分栝蔞根麥門冬各二兩生薑六兩前胡一角芍藥半夏各五兩右㕮咀以水八升煑取二升分三服門冬丸出十便良方治心經有熱麥門冬一兩川黃連半兩右細末煉蜜丸如桐子大食後熱水下二三十丸或門冬湯下食千金地黃丸出千金良方治心熱川黃連四兩麄末生地黃半斤研取汁連渣二味拌勻日乾右細末煉蜜丸如桐子大每服三十丸食後門冬湯下一方地汁為丸黃連木通丸出儒門事親書治心經蓄熱夏至則甚黃連二兩木通一兩半右為末生薑汁糊為丸每服三十丸食後燈心湯下日三服五石湯出千金方治胃熱熱病後不除煩悶口中乾渇寒水石消石赤石脂龍骨栝蔞根牡礪甘草黃芩各五分知母三分桂心三分石膏三分大黃二分右㕮咀以水七升煑取三升分四服日三夜一承氣湯出千金方治氣結胸中熱在胃管飲食嘔逆渇前胡枳實桂心大黃寒水石知母甘草各一兩硝石栝蔞根石膏各二兩右㕮咀以水一斗煑取三升分三服甘露飲出和劑方治男子婦人小兒胃中客熱牙宣口氣齒齗腫爛時出膿目瞼垂重常欲合閉合即飢煩不欲飲食及目赤腫痛不任涼藥口舌生瘡咽喉腫痛瘡疹已發未發皆可服之療脾胃受濕瘀熱在裏或醉飽房勞濕熱相摶致生疸病身面皆黃肢體㣲腫胸滿氣短大便不調小便黃澁或時身熱並皆治之枇杷葉製去毛乾熟地黃去土天門冬去心焙枳殻去穰麩炒山茵蔯去根生乾地黃麥門冬去心焙石斛去蘆甘草炙黃芩右等分為末每服二錢水一盞煎七分去滓温服食後臨卧小兒一服分兩服仍量歲數加減與之加乾葛柴胡尤佳一方有犀角無麥門冬竹茹湯出指南方治胃熱而嘔吐欲知胃熱手足心皆熱者是半夏三分用薑汁半盞漿水一升煑去半切焙乾薑三兩甘草三分生右剉散每三錢青竹茹一彈子許薑􅀥煎温服或加前胡龍腦雞蘇丸出和劑方除煩解勞消穀下氣散胸中鬱熱主肺熱咳嗽治鼻衂吐血崩下血血淋熱淋勞淋氣淋止消渇除驚悸涼上膈解酒毒又治胃熱口臭肺熱腥脾疽口乾膽口若常服聰耳明目開心益智柴胡要真銀州者二兩剉同木通以沸湯大半升浸一二宿絞汁後入膏麥門冬湯浸去心焙四兩黃耆去蘆頭一兩阿膠炒㣲燥二兩生乾地黃末六兩後入膏蒲黃㣲炒二兩雞蘇浄葉一斤即龍腦薄荷也甘草炙一兩半人參去蘆頭二兩半木通剉二兩同柴胡浸右除别研藥後入外並搗羅為末將好蜜二斤先煉一二沸然後下生薑地黃末不住手攪待攪匀時再下木通柴胡汁慢慢熬成膏勿令焦然後將其餘藥末同和為丸如豌豆大每服二十丸嚼破熱水下不嚼亦得虚勞煩熱消渇驚悸煎人參湯下咳嗽唾血鼻衂吐血將麥門冬湯浸去心煎湯下並食後臨卧服之惟血崩下血諸淋疾皆空心食前服治淋用車前子湯下一方虚勞煩熱梔子湯下肺熱黃芩湯下脾胃熱赤芍藥生甘草湯下肝熱防風湯下腎熱黃栢湯下痰嗽生薑湯下莖中痛蒲黃滑石末一錢調下氣淋橘皮湯下室女虚勞寒熱潮作煎柴胡人參湯下一方有黃連藕汁膏出楊氏家藏方涼血解飢除五心煩熱藕汁三盞生地黃汁二盞生薄荷汁一盞生薑汁半盞右銀石器内慢火熬成膏每服半匙濃煎當歸湯下不拘時候澤瀉湯出指南方治身熱汗出煩滿煩滿不得汗出解此由太陽之經先受風邪與熱相摶腎氣上從風與熱則為腎氣厥則煩滿謂之風厥宜先以針瀉足太陽補太陰澤瀉半兩石膏赤茯苓各一兩白术防風各二兩右為末每服五錢水二盞煎至一盞去滓服除渇飲子治心經客熱小便不通燥煩渇甘草炙陳小麥麥門冬去心赤茯苓去皮乾葛燈心木通人參各等分右㕮咀每服五錢水一盞半入竹葉五片煎至一盞去滓温服如發渇細細呷之食後五味湯治四肢發熱柴胡去苗四兩黃芩赤茯苓五味子各一兩半半夏一兩一分湯洗七遍右為散每服五錢水二盞生薑三片􅀥一箇煎一盞去滓温服金花散治心肺積熱咽喉不利口舌生瘡心胸煩悶痰涎併多菉豆粉四兩雄黃三分甘草末七錢朴硝五錢甜硝五錢白豆䓻半兩生腦子半錢麝香半錢右為末旋滴生蜜少許研勻入垍合内每服半錢薄荷水下小兒驚熱宜服之水解丸治一切熱疾頭疼心燥肉桂一兩半去麄皮麻黃四兩去根節芍藥二兩黃芩甘草各一兩大黃二兩半煨右為散每服二錢以井花水調下葢覆出汗如未汗更一服重者不過三服三黃丸治三焦積熱頭目昏痛肩背拘急肢節煩痛熱上衝口舌唇焦咽喉腫痛痰涎壅滯眼赤睛疼及大便秘澁或下鮮血大黃酒蒸黄連去鬚黃芩各等分右為末煉蜜丸如梧桐子大每服五十丸不拘時熱水下臟腑壅實可加丸數以利為度一名三黃湯煎服丁香丸治積熱傷寒丁香三粒巴豆兩粒去殻用管子葉包搥碎去油入鉢内研爛縮砂四顆去殻烏梅一箇切片去核上瓦焙乾右除巴豆外並為細末仍入巴豆研勻却用百草霜同和麵糊為丸如菉豆大煎米飲下積塊不拘大小均有其效丹參赤膏治少小心腹熱除熱方丹參雷丸芒硝戎鹽大黃各一兩右㕮咀以苦酒半升浸四種一宿以煉成猪肪一斤煎三上三下去滓乃内芒硝膏成以摩心下冬夏可用一方但用丹參雷丸亦佳地黃丸治心熱大過三焦不順夜卧不寐退熱安身有虚熱者宜服此藥生地黃一兩人參白芍藥當歸各半兩甘草一分右為細末煉蜜和丸如彈子大臨卧濃煎淡竹葉湯嚼下一丸常服養榮衛用人參湯下黃耆湯治大熱有瘡宜服此川芎地黃生乾者黃耆芍藥赤者防風各半兩羌活甘草各一分右為細末每服二錢葱湯調下荆芥湯亦可除熱飲子治心驚客熱小便不通口煩燥渇甘草陳小麥麥門冬赤茯苓赤芍藥燈草人參等分右搗為餅子每服五錢水一盞半苦竹葉數片煎至八分去滓温服如發渇細細呷之食後解毒雄黃丸取積下熱雄黃研飛川鬱金各一分巴豆十四箇去油右為末醋煑麵糊丸如麻子大每服五丸加至七丸熱茶清下裏實用此喉閉以熱茶清調下犀角黃連散治涼血和經下食積男子婦人上壅餘熱下部虚寒或遍身生瘡乆不愈者犀角三錢常歸半兩大黃二兩芒硝二兩黒牽牛㣲炒生四兩右為細末每服七錢蜜水食前調服金真丸治五臟積熱洗滌腸垢潤利燥澁風毒攻疰手足浮腫或頑痺不仁痰涎不利涕出稠粘胸膈痞塞臍腹脹滿飲食減少困倦無力凡所内傷並宜服之黒牽牛八兩擇浄慢火輕炒四兩生用四兩同取頭末四兩大黃三兩米泔浸三日逐日換泔取出切焙乾為細末右以皂莢二兩輕炒去皮子水一大碗浸一宿入蘿蔔一兩切作片子同皂莢一處熬至半碗去滓再熬至兩盞搜和上伴藥末乾濕得所丸如桐子大每服二三十丸至五十丸粥飲下不拘時候金興定間宣宗賜名保安丸戊申春節使趙伊年幾七旬病身體熱麻股膝無力飲食有汗妄喜笑善飢痰涎不利舌强難言聲嗄不鳴求治於先師診得左寸脈洪大而有力是邪熱客於經絡之中也兩腎外有數瘢遂問其故對以燃香所致先師曰君之病皆由此也夫人之十二經灌漑通身週而復始葢手之三陽從手表上行於頭加之以火邪陽併於陽勢甚熾焉故邪熱妄行流散於周身而為熱麻黃帝鍼經四卷口問第一胃熱則蠱動蠱動則㢘泉開故涎下熱傷元氣而為沉重無力飲食入胃慓悍之氣不修常度故多汗心火盛則妄喜笑脾胃熱則消殻善飢肺金衰則聲嗄下鳴仲景云㣲數之脈慎不可灸恐致傷筋血難復也君奉養以膏粱之味無故加以火艾之毒熱傷經絡為此病明矣内經云熱淫所勝治以苦寒佐以苦甘以甘瀉之以酸収之當以黃蘗知母之苦寒為君以瀉邪火壯觔骨乃腎欲堅急食苦以堅之黃芪生甘草之甘寒瀉熱實表五味子酸止汗補肺氣之不足以為臣炙甘草當歸之草辛和血潤燥升麻柴胡之苦平行少陽明二經自地升天以苦發之者也以為佐㕮咀同煎取清汁服之更鍼刺四肢以瀉諸陽之本使十二經相接而瀉火邪不旬日良愈遂名其方清神補氣湯蒼术四錢藁本二錢升麻六錢柴胡三錢五味子一錢半黃蘗二錢酒知母二錢陳皮一錢半黃芪三錢生甘草二錢當歸二錢右剉如麻豆每服五錢水五盞煎至一盞去滓空心候大小便利覺飢時服之待少時以美饍壓之春雪膏治涼心退悶熱極壅盛寒水石石膏滑石代赭石朴硝各五錢甘草三錢右為末每服二錢井水調下硃砂膏治心臟驚熱至甚不省人事硃砂硼砂燄硝各二錢半金銀箔各五片寒水石五錢腦子一字粉草三錢石膏五錢右為末每服二錢麥門冬二十粒去心煎湯調下酒蒸黃連丸治膈熱解酒毒厚腸清脾胃火黃連半斤浄用酒二升浸以瓦器置甑上累蒸至爛取出晒乾右為末滴水丸如桐子大每服五十丸食前温水吞下治熱氣塞咽喉以紫菜煑汁飲之治傷熱以麻黃一把去節綿褁以好酒五升煮取半升去滓頓服表發汗出則愈冬月用酒春宜水煑之良治熱攻心煩燥恍惚以牛蒡根搗汁一升食後分為三服良治虚熱益氣和中止煩滿以白粱米炊飯食之解熱以地榆葉作飲代茶治大熱心悶者用槐子燒末酒服方寸匕治中大熱狂失心燥悶以棟實作湯浴之治熱腹痛用粟米粉水煑服之去熱氣以天麻子作飲服之療熱壅涼膈上嘔積滯劉禹錫傳信方著石旻山人甘露飲蜀朴硝成末每一大斤用蜜冬用十三兩春夏秋用十二兩先搗篩朴硝成末後以白蜜和令勻便入新青竹筒隨小大取一節著藥得二斤已上即不得令滿却入炊甑中令有藥處在飯内其虚處出其上不妨甑篳即得候飯熟取出承熱綿濾入一甆鉢中以竹箆攪勿停手令至凝即藥成収入盒中如熱月即於冷水中浸鉢然後攪每食後或欲卧時含一匙半匙漸漸咽之如要通轉亦得除客熱上心煩用梨食之良然不多食治大熱發頭熱者令腦縫裂開取黒虱三五百搗碎傅之療一切熱毒氣用大木皮與苦桃皮櫻桃皮三味各去麄皮浄洗焙乾等分擣羅酒調服一錢匕服食無忌治一切熱毒暑月用之出本草方用虎杖和甘草煎色如琥珀可愛堪看甞之甘美瓶置井中令冷澈如氷白甆器及銀器中盛以茶啜之治肝毒熱用決明子作菜食之痼冷論夫茍得其養無物不長茍失其養無物不消人之處世飲食為上湯藥次之惟其口腹不充嗜慾無節所以臟中停寒而為之沈痼也男子精流女子帶下骨寒腦冷氣血之衰嘔吐惡心乆泄暴下皆證耳療治之法雖貴乎温補不貴乎大剛惟於滋血養氣中佐以薑桂雄附為愈抑古人所謂精不足者補之以未老此尤當加意焉苦夫熱劑剛燥極欲陽氣頓囘吾恐腎水易涸心火獨炎識者未保其性方沈香蓽澄茄散出和劑方治下經不足内挾積冷臍腹弦急痛引腰背面色痿黃手足厥冷脇肋虚滿精神困倦臟腑自利小便滑數大能補䕶四十以上者宜服之附子炮去臍四兩沈香蓽澄茄葫蘆巴㣲炒肉桂去麄皮茴香舶上者㣲炒補骨脂㣲炒巴㦸天去心木香川練炮去核各一兩川烏炮去臍半兩桃仁去皮尖麩炒二兩右同為細末每服二錢水一盞入鹽末少許煎八分去滓稍熱服之如育腸小腸一切氣痛服之有効空心食前服艾硫丸出十便良方去邪養正補真益脾治髓冷血虚腰疼脚弱及傷冷心腹疼痛霍亂吐痢自汗氣急下元乆虚小便頻數婦人衝任不足月水愆期腹脇刺痛崩漏帶下全不思飲食兼治傷寒陰證手足厥冷脈㣲自汗熟艾十兩用糯米一升煎成粥投于内再用手拌令勻於日中曝乾乾薑十兩生硫黃附子各二兩右為細末麵糊丸如桐子大每服三十丸或五十丸温米飲下食前附子理中丸出和劑方治脾胃寒冷心腹絞痛嘔吐泄利霍亂轉筋體冷㣲手足厥寒心下滿腹中雷鳴嘔吐噦不止飲食不進及一切沈寒痼冷並皆治之附子炮去皮臍人參去蘆乾薑炮甘草灸白术各三兩右為細末煉蜜和丸每兩服一十丸以水一盞化破煎至七分稍熱服之空心食前服一方小兒分作二三服大小以意加減紫沈煎丸出醫學大成治虚寒積冷伏滯陰氣心腹膨脹兩脇疼痛巴豆霜一分酒半升先入銀器内煑之硫黃滴水研極細青皮胡椒硇砂各一兩酒半升煑去石入巴豆内酒内熬如稀糊入沈香前項藥作一處熬成膏丁香阿魏酒半升研花盡没藥搗碎酒半升化盡入匕酒㯽榔官桂不見火各一兩乾薑三分良薑一兩水煑六七沸日乾木香不見火硃砂半兩别研沈香一兩使煉蜜一斤别研右為末次入硫黃硃砂二味研勻入前膏於臼杵三千下丸如梧桐子大每服三十丸陳皮湯下如卒暴心痛醋嚼下立見効驗北亭丸出和劑方治脾元氣弱乆積寒冷心腹脇脹肢滿刺痛面色青黃肌體瘦弱怠惰嗜卧食少多傷噫氣吞酸噦逆惡心腹中虚鳴大便泄利胸膈痞塞食飲不下嘔噦霍亂體冷轉筋及五膈五噎痃癖瘕聚翻胃吐食乆痛乆利並皆治之縮砂仁胡椒肉桂去麄皮厚朴去麄皮薑汁炙附子炮去皮劑川芎當歸去蘆劑碎陳皮去白乾薑炮甘草炙各四兩青鹽别研二兩白术别搗末入三兩北亭即硇砂也醋淘炒研二兩用五味子揀一兩半阿魏醋化去砂石一兩半右為末用銀石鍋内入好酒醋五升白沙蜜一十兩先以白亭阿魏青鹽三味并好頭麵一升同煎稠粘便下藥味半斤以來更煎如稀麵漸漸入藥末煎得所離火傾出更以乾藥末和搜成劑更搗一千杵丸如桐子大每服十五丸㣲嚼破用生薑鹽湯下温酒亦得空心服之忌羊血豉汁黒錫丹出和劑方治脾元乆冷上實下虚胸中痰飲或上攻頭目徹痛睛昏眩及奔豚氣上衝胸腹連兩脇膨脹刺痛不可忍氣欲絶者及陰陽氣上下不升降飲食不進面黃羸瘦肢體浮腫五種水氣脚氣上攻及牙根腫痛滿口生瘡齒欲落者兼治脾寒心痛冷汗不止或卒暴中風痰潮上膈言語難澁神昏氣亂喉中痰響狀似癱瘓曾用風藥弔吐不出者宜用此藥百粒煎薑􅀥湯灌之壓下風涎即時甦省風涎自利或觸冐寒邪霍亂吐瀉手足逆冷唇口青黒及男子陽事痿怯脚膝酸軟行步乏力臍腹虚鳴大便乆滑及婦人血海乆冷白帶自下歲乆無子血氣攻注頭面四肢並宜服之兼療膈胃煩壅痰飲虚喘百藥不愈者常服尅化飲食養精神生陽遂陰消磨冷滯除濕破癖不動真氣使五臟安寧六腑調暢百病不侵歌曰陰損陽衰實可傷縱調榮衞亦難將氣羸血運痰生者試聽桑君為發揚又歌曰夫妻合㑹功成肆鈴子沈香一兩賖木附葫蘆陽起破桂茴香肉豆等無差梧桐酒糊精修煉反老還童事可嘉沈香附子炮去皮劑葫蘆巴酒浸炒陽起石研細水飛肉桂去皮只須半兩茴香舶上者炒破故紙酒浸炒肉荳蔲麵褁煨金鈴子蒸去皮核木香各一兩黒錫去滓秤硫黃透明者結炒子各二兩右用黒盞或新鐡銚内如常法結黒錫硫黃砂子地上出火毒研令極細入藥並杵羅為末都一處和勻入研自朝至暮以黒光色為度酒糊丸如梧桐子大陰乾入布袋内擦令光瑩每服三四十粒空心薑鹽湯或􅀥湯下婦人艾醋湯下附子茴香散出醫方大成治氣虚冷心腹絞痛肉豆蔲煨茴香炒木香白术炒人參白茯苓乾薑炮各一兩附子大者一枝炮去皮劑丁香甘草炙各半兩右㕮咀每服三錢水一盞鹽少許煎七分空心服走馬茴香丸出御藥院方治丈夫積年傷憊乆冷及治痃氣備急黒附子去皮劑桂葫蘆巴馬藺花炒青橘皮去白舶上茴香川楝子炒乾薑炮巴㦸去心破故紙各半兩右為末用酒打麵糊和劑為丸如菉豆大每服空心鹽湯下二十丸安息香丸治虚冷補元陽益氣血安息香天雄炮製去皮劑硫黃研陽起石研附子炮製去皮劑鍾乳研白礬熬令汁枯研木香蛇床子炒白龍骨研各一兩右為末更合研三日用黃狗外腎去筋膜細研以法酒熬成膏和劑丸梧桐子大每服二十丸温酒下金鎖正元丹出和劑方治真氣不足元臟虚弱四肢倦怠百節酸疼頭昏眩痛目暗耳鳴面色黃黒鬢髮脫落頭皮腫痒精神昏困手足多冷心胸痞悶繞臍切痛膝脛酸疼不能乆立或脚弱隱痛步履艱難腰背拘急不得俯仰腹痛氣刺兩脇虚脹水穀不消大便不調嘔逆惡心飲食減少恍惚多忘氣促喘急夜多異夢心忪盜汗小便滑數遺精白濁一切元陽虚冷之病並能治之五味子一方用五倍子茯苓去皮各八兩紫色㦸去心十六兩補骨脂浸炒十兩肉蓯蓉浄洗焙乾葫蘆巴炒各一斤龍骨硃砂别研各三兩右為細末入研藥令勻酒糊為丸如梧桐子大每服十五丸至二十丸空心食前温酒吞下或鹽湯亦得青硫丸治久冷峻補元陽硫黃酒一斤甘草水研三日附子炮製去皮臍山茱萸各四兩白豆蔲去皮肉豆蔲去殻木香各二兩牛膝酒浸切焙三兩艾葉焙乾一兩右為末拌勻蒸木𤓰肉和搗丸桐子大每服十丸至十五丸空心鹽湯下如腰脚疼痛用木𤓰湯下益神丸補元陽治乆冷硫黃酒甘草水研一日木香肉豆蔲去殻㯽榔剉桂消去麄皮附子炮製去皮劑青橘皮湯浸去白焙乾薑炮各一兩右為末和勻用糯米粥丸如桐子大每服十丸至十五丸空心酒下烏金丸一名黒錫丸一名黒錫丹治脾元乆冷上實下虚胸中痰飲或上攻頭目徹痛目常昏眩及賁豚氣賁衝胸腹連兩脇膨脹痛不可忍氣欲将絶陰陽氣上下不能升降飲食不進面黃羸瘦腹滿膨脹肢體浮腫泄瀉嘔逆自汗心忡小便頻數一切虚寒皆治出驗効濟世方黒錫二兩硫黃一兩木香一分附子一兩去皮劑舶上茴香一兩川連肉半兩破故紙半兩肉豆蔲四箇去殻右先將黒錫於銀石器内候鎔飛煉數次澄下麄滓令盡次剉硫黃細末入在錫内攪和如膏以紙攤在地上出火毒以碗葢一宿硫黃須先研令極細黒錫旣溶連銚取起離火以所研硫黃傾在内急以火箸等物攪勻之以碗覆之即硫黃不至飛去旣傾出錫卻以破故紙於銚内惹錫並硫黃右為細末酒糊丸如桐子大每服三十丸或四十粒空心食鹽湯下良乆以食物壓之尤治元陽虚損精神耗弱等疾震靈丹出和劑方此丹不犯金石飛走有性之藥不濕不燥奪造化沖和之功大治男子真元衰憊五勞七傷臍腹冷痛肢體酸疼上盛下虚頭目昏眩心神恍惚血氣衰㣲及中風癱緩手足不遂筋骨拘倦腰膝沈重容枯肌瘦目暗耳聾口苦舌乾飲食無味心腎不足精滑夢遺膀胱疝墜小腸淋瀝夜多盜汗乆瀉乆痢嘔吐可食八風五痺一切沈寒痼冷服之如神及治婦人血氣不足崩漏虚損帶下乆冷胎臟無子服之無不愈者方見諸虚門補益諸疾類保元丹治老弱諸沈寒痼冷小便滑數大便時泄腰腿臍腹疼痛困倦瘦虚食減附子炮去皮臍肉豆蔲白术山藥乾薑炮赤石脂各一兩肉桂右為細末水糊為丸如桐子大每服三二十丸空心酒下痼冷丸出千金方治心腹痼冷白术半兩神麯一兩炒令黃色川薑炮桂心各二錢川椒一錢炒香呉茱萸三錢洗右為細末蜜水糊為丸如桐子大食前米飲下五十丸或百丸一方為散米飲服方寸匕崔氏烏頭丸出和劑方治風冷邪氣入乗心絡或腑臟暴感風寒上乗於心令人卒然心痛或引背膂乍甚經乆不瘥並宜服之附子炮去皮臍川烏炮去皮劑赤石脂各二兩蜀椒去子及閉口者炒出汗肉桂去麄皮乾薑炮去二兩右細末蜜和丸如桐子大每服三丸温酒下覺至痛處即止若不止加至五六丸以知為度若朝早服無所覺至午時再服三丸夜又服三丸凡患心痛每旦服三丸稍加至十丸盡一劑遂終身不發忌猪肉生葱來復丹出和劑方此藥配類二氣均調陰陽奪天地沖和之氣乃水火旣濟之方可冷可熱可緩可急善治榮衛不交養心腎不升降上實下虚氣閉痰厥心腹冷痛臟腑虚滑不問男女老幼危急之證但有胃氣無不獲安補損扶虚救陰助陽方見諸虚門補壯元陽類温脾湯出本事方治痼冷在腸胃間連年腹痛泄瀉休作無時服諸熱藥不効宜先取去然後調治易瘥不可畏虚以養病也厚朴乾薑甘草桂心附子各二兩用生大黃生四錢碎切湯一盞漬半日搦出滓煎湯時和滓下右細剉水二升半煎八合後下大黃汁再煎六合去滓澄去脚俟至晚分作三服温温自夜至曉令盡不剩食前更以乾薑丸佐之乾薑丸出本事方乾薑巴豆去心炒黃研大黃人參各一兩右除巴豆餘為末同研煉蜜丸如桐子大服前湯時用湯吞下一丸米飲亦得有人因憂愁中傷食結積在腸胃故發吐痢自後至暑月稍傷則發暴下數日不已玉函云下痢至隔年月日不期而發者此為有積宜下之止用温脾湯次服乾薑丸後服白术散白术散出本事方白术木香附子人參各等分右細末每服二錢水一盞生薑三片棗一枚煎六分去滓服走馬寸金丸出傳信通用方治男子下元虚冷真氣怯弱肝腎客寒小腸氣痛牽引肋脇臍㽲痛不可忍者手足厥冷多出冷汗不能屈伸面色青黃時發時止立有神効𤣥胡索川當歸剉舶上茴香川蓮子各一兩南木香半兩不炒乾全蝎三箇已上並炒令紫色右並為細末米醋糊丸桐子大每服二三十丸空心鹽酒下患乆服一月可去根二氣丹出和劑方助陽消陰正氣温中治内虚裏寒冷氣攻擊心脇臍腹脹滿刺痛泄痢無度嘔吐不止自汗時出小便不禁陽氣漸㣲手足厥冷及傷寒陰證霍亂轉筋久下冷痢少氣羸困一切虚寒痼冷並宜服之硫黃細研肉桂去皮為末各一兩乾薑炮為末硃砂研為末各二錢附子一箇大者炮去皮臍為末半兩右並勻研細用麵糊為丸如梧桐子大每服三十丸煎艾鹽湯下放冷空心食前服浴體法治下元虚冷腰腹冷痛崩帶一切冷病椒目川烏細辛乾薑桂已上各等分右為麄末水煮澡浴下部為妙温胃丸治寒痼冷嘔噦吐逆心胸噎痞減食洹東馬公正方京三稜焙切三分附子一箇炮乾薑炮青皮桂各半兩右為細末醋糊為丸如豆大每服二三十丸米飲下金銷正陽丹出本事方砒一兩火煨巴豆十粒去油烏頭一兩炮去皮臍木鼈六箇去殻雄黃半兩右併為末用黃臘瀝青好者各一兩半黃丹一兩硃砂一兩半細研溶熱入前項藥末乗熱丸如雞頭大每服一丸常服空心鹽湯下小腸氣痛炒茴香酒冷下木通煎湯下滑腸脫肛乾薑艾同煎酒温下心氣痛燒鐡淬醋下二丸氣塊嚼乾柿子下一丸婦人紅脉不行及産後諸疾當歸酒下眼多冷淚鹽椒煎湯下匈奴露宿丸出千金方治寒冷積聚礬石桂心附子乾薑各二兩右為末蜜丸如桐子大每服十丸日三後稍加之大已寒丸出濟生拔萃方治乆寒積冷臟腑虚弱心腹㽲痛脇肋脹滿泄瀉腸鳴自利汗米穀不化陽氣暴衰陰氣獨勝手足厥冷傷寒陰勝神昏脈短四肢怠惰並服蓽撥肉桂各四斤乾薑高良薑各六斤右細末水煑麵糊丸如桐子大每服二十粒湯飲下食前此藥燥甚能治臟腑虚寒滑而下痢及泄瀉腸鳴水穀不化自非看得清切灼然臟寒泄瀉不可輕服多有泄瀉溏瀉之患用温熱藥不止者宜用𦂳澁之劑可於斷下湯方中求之玉華白丹出和劑方清上實下助養根元扶衰救危補益臟腑治五勞七傷夜多盜汗肺萎虚損乆嗽上喘霍亂轉筋六脈沈伏唇口青黒腹脇刺痛大腸不固小便滑數夢中遺泄肌肉瘦悴目暗耳鳴胃虚食減乆瘧乆痢積寒痼冷諸藥不愈者方見諸虚門補肚元陽類玉抱肚出百一選方治停寒痼冷心腹刺痛常繫於臍腹間甚妙一方用針砂如法炒訖止入硇砂半兩並不用餘藥針砂四兩鐵銚内火炒用木或竹捧兒不住手攪烟出盡為度放冷白礬半兩硇砂五分粉霜五分右白礬等三味同研為細末與針砂拌和只作一服以水數㸃洒用匙拌攤令勻厚皮紙為貼闊二寸以上長四五寸貼之外以帛子包繫疼處或常繫臍下如覺太熱即以衣襯之若藥力過再洒水如前拌用其熱如初可用四五次藥力過退即將針砂再炒過别入餘藥仍可用一方用雄黃半錢無粉霜大建中湯出千金方治心脇中大寒大痛嘔不能飲食飲食下咽自知偏從一面下流有聲泱泱然若腹中寒氣上衝皮起出見有頭足上下而痛其頭不可觸近蜀椒二合乾薑四兩人參二兩飴糖一升右㕮咀以水四升煑取二升去滓内糖㣲火煑令得一升半分三服服湯如炊三升米乆可飲粥二升許更服當一日食糜温服之養正丹出和劑方卻邪輔正助陽接真治元氣虚虧陰邪交蕩正氣乖常上盛下虚氣不升降呼吸不足頭旋氣短心神怯弱夢寐驚悸遍體盜汗腹痛腰疼或虚煩狂言口乾上喘翻胃吐食霍亂轉筋咳逆不定又治中風涎潮不省人事陽氣欲脫四肢厥冷如傷寒陰盛自汗唇青脈沈最宜服之及婦人産後血氣身熱月候不均帶下腹痛悉能治療常服濟心火强腎水進飲食方見諸虚門補壯元陽類玉壺丸治元臟乆冷益真氣進飲食壯筋骨駐顔烏頭大者炮裂去皮臍十五枚硇砂水飛研陽起石煅研各一兩硫黃半兩研右為末酒煑麵糊丸如梧桐子大每服十五丸空心鹽湯下婦人醋湯下露宿丸出千金方治遇冷氣心下結繫嘔逆寒食不消并主傷寒晨夜觸寒冷惡氣附子烏頭桂心礬石各四兩右為末蜜丸如豆大以酒服三丸日三加至十丸藥耐寒冷忌熱食近火宜冷食飲治痼冷風眩寒中手足冷胃口寒臍下冷百病五勞七傷第一令人能食二强盛三益氣四有子神驗方出千金方大豆二升半烏頭一百五十枚生地黃一十五斤取汁右以除日㕮咀烏頭以酒一斗半和地黃汁浸烏頭至破日絞去滓納豆藥汁中至除日出曝之有汁更浸曝之至汁盡藥成初服從二豆起可至二十豆酒服之有病空腹服無病食後服四時合並得二月二月為上時藥令人能食益氣强盛有子髮白更黒齒落重生病熱人不可服茱萸消石湯出千金方治乆寒不欲飲食數十年癖飲呉茱萸八合硝石一升生薑一斤右以酒一斗水解令二斗煮藥取四升服二升病即下去勿更服也初下如泔後如汚泥若如沫滓吐者更可服之養如乳婦法温胃散治痼冷温脾止痛噦和氣橘皮二兩桂一兩乾薑炮半兩右為細末每服一錢薑湯下空心服半夏湯出千金方治胸滿有氣心腹中冷半夏一升桂心四兩生薑八兩右㕮咀以水七升煮取二升一服七合日三服生薑湯出千金方温中下氣生薑一斤甘草三兩桂心四兩右㕮咀以水六升煮取一升半一服五合日三服三聖丸一名三仙丸補男子下元虚弱冷氣一烏二术三茴香乆服令人壽命長和血駐顔精神爽養神利氣助容光丹田補暖神縁住耳目聰明鬢不蒼每日常服十丸數空心温酒共鹽湯方見諸虚門補益輕身延年類治積年冷病方出千金方蜀椒二兩香豉一升右擣椒為末和豉更擣三千杵丸如彈子大食前酒服日再半硫丸出和劑方除積冷暖元臟温脾胃進飲食治心腹一切痃癖冷氣及年高風祕或泄瀉等並皆治之半夏湯浸七次焙乾為末硫黃明浄好者研令極細用栁木槌子殺過右等分以生薑自然汁同熬入乾蒸餅末攪和勻入臼内杵數百下丸如梧桐子大每服空心温酒或生薑湯下十五丸至二十丸婦人醋湯下或用葱白一條生薑三片煎入阿膠二片溶開食前空心送下治諸冷極醫所不治出千金方用馬藺子九升浄治去土空腹中服一合日三飲及酒下之服訖須臾以食壓之取瘥乃止金液丹出和劑方固真氣暖丹田堅筋骨壯陽道除久寒痼冷補勞傷虚損治男子腰腎乆冷心腹積聚脇下冷癖腹中諸蟲失精遺溺形羸力劣脚膝疼弱冷風頑痺上氣衂咳逆寒熱霍亂轉筋虚滑下痢又治痔漏濕䘌生瘡下血不止及婦人血結寒熱陰蝕疽痔方見諸虚門補壯元陽類洞陽丹出濟生方治陽虚陰盛手足厥冷暴吐大下脈細羸瘦傷寒陰證治之附子炮去皮臍鍾乳粉各二兩天雄炮去皮三兩川烏炮去皮四兩陽起石火煅一兩硃砂一兩别研細右為細末酒煑神麯糊為丸如梧桐子大每服五十丸空心温酒鹽湯任下赤丸出千金方治氣厥冷茯苓桂心各四兩細辛一兩烏頭附子各二兩射罔如大􅀥一兩右為末内真朱為色蜜丸如麻子大空腹酒服一丸日再夜一不知加至二丸以知為度一方用半夏四兩不用桂又方出千金方治胸滿氣噫下部冷腹㽲痛半夏八兩製生薑六兩橘皮四兩去白桂二兩呉茱萸五十粒湯炮洗一次右㕮咀用水十升煑取四升五服冷又再温空心食前服人參湯出本事方治丈夫婦人小兒唇青面黃肚裏冷痛牽引小腹以至翻胃換食嘔吐口苦舌乾少寤多寐手不製遠年近日一切脾胃冷病悉能除愈人參一兩茯苓一兩白者牡礪一兩煅粉草一兩黃耆一兩鹽炙附子七錢以上重者炮去皮臍一半箇右為細末每服三大錢鹽湯㸃服忌生冷油麵粘膩等物昔一婦人年四十餘歲患十年翻胃面目黃黒歴三十餘人醫不取效脾腧諸穴燒灸交通其疾愈甚服此藥不五七日間頓然無事堅忍服至一月遂去其根自是服之不三五服些少脾疾立便痊平能全胃氣生肌肉進飲食順榮衛常服大有補益屢試屢驗幸毋忽焉又方出本事方浮椒二兩茴香一兩粉草一兩右為末每服二錢熱湯㸃服忌如前大已寒丸出御藥院方治中焦氣弱脾胃受寒飲食不美氣不調和退陰助陽除臟腑積冷心腹疼痛大便滑泄腹中雷鳴霍亂吐瀉手足厥逆便利無度及療傷寒陰濕形氣沈困自汗附子炮去皮臍川乾薑炮製高良薑剉炒呉茱萸炒桂去皮川烏頭炮裂去皮臍剉如豆大再炒令右為細末醋煮麵糊丸梧桐子大每服五七十丸熱米湯下空心食前日進一服無忌接真湯出御藥院方治陰病手足厥冷臍腹疼痛真氣不足衰憊欲絶沈香丁香各二錢麝香一錢附子炮去皮臍四兩右為麄末水二盞生薑七片􅀥三枚去核煎至一盞去滓温作一服硫黃丸至熱治人之大冷夏月温飲食不解衣者硫黃礬石乾薑茱萸桂烏頭附子椒人人參細辛皂角當歸右等分隨人多少擣蜜丸如梧桐子大一服十丸至二十丸日三服若冷痢者加赤石脂龍骨即便愈也橘皮益智湯治痼冷在内陰氣交攻心痛如刺青橘皮湯浸去白焙益智去皮烏頭炮裂去皮臍葳靈仙去土各一兩右剉如麻豆每服三錢水一盞生薑三片鹽少許煎六分去滓食前温服日三雄硃丹出百一選方治宿寒痼冷飲食嘔逆乆則羸弱變成勞瘵硃砂雄黃各二兩以上用沙盒一箇先以牡丹皮二兩内外薰黄入藥於内以酸醋和臈茶作餅葢定盒口以赤石脂固濟合縫又用赤石脂泥褁盒子一重再用黃泥紙筋又褁一重先以草火焼令赤次以灰火五斤漸漸添至一秤候火力稍消取出掘坑一尺埋一宿去火毒取出研入後藥附子炮别為末胡椒肉桂赤石脂木香沈香蓽撥丁香白术乳香半兩同赤石脂共研細右為末入前藥研勻以青酒二升三分熬去二分入附子末煮糊丸桐子大每服一十丸空心温酒鹽湯任下蓽澄茄丸出王氏博濟方治丈夫元陽虚冷氣上衝心胸滿悶腹脇雷鳴或多攻刺嘔噦膨脹沈香丁香木香舶上茴香各半兩烏藥一兩白芷一兩一分葫蘆巴三分蓽澄茄一分右件八味同為末煉蜜為丸如彈子大每服一丸生薑鹽湯嚼下三建湯出永類鈐方除痼冷扶元氣凡寒邪外攻六脈沈㣲手足厥逆大小便滑數及中風涎潮不省人事傷寒陰證並治天雄炮去皮臍附子大川烏並炮各等分右㕮咀四錢水二鍾薑十五片煎八分温服無時一法加肉桂小麥椒附丸出永類鈐方治内挾積冷臍腹弦急痛引腰背時有盜汗小便滑數心腹脹滿附子炮半兩㯽榔牽牛炒五味子各一兩川椒去子炒出汗半兩浄陳皮乾薑炮石菖蒲各一兩右剉碎好醋煮令乾焙令黄為末醋煑麵糊丸梧桐子大每服三十丸鹽湯酒空心下婦人血海冷當歸酒下泄瀉飯飲下冷痢薑湯下赤痢甘草湯下青城山葛真人秋乳丹出衛生家寳方治男子脾腎乆弱下部一切痼冷之疾遺泄下禁小便滑數囊外濕痒及脾元不固飲食無味乆而脾泄變為寒熱似痁而多寒滑瀉白膿及婦人子宫乆冷胎胞不固赤白帶下並宜服之秋石四兩鍾乳粉二兩真者雲母粉二兩牡蠣左顧者以黃泥固一指厚於文武火煨乾候以炭火煅通紅不拘多少去外黒者用粉研細四兩寒水石半斤生研為粉内信砒一兩以一沙合内盛得一好上下以粉𦂳填信砒一兩外用紙筋黃泥固重約半指厚節乾以上十斤火一煅去盡砒烟取出放冷用白礬三兩内一兩飛過右六味同研極細用圓正半夏十兩為末水熱煮成稀糊為丸每服一二粒空心鹽湯下婦人醋湯下丸如梧子大候極乾服一法用冷水滴為丸只要研極細陰乾復以乾鍋盛用瓦片子葢頭大火一煅功力尤大半夏稀糊丸者平稳功力雖少乆服見効三陽丹出衛生家寳方治男子氣弱丹田冷痛臟腑泄瀉婦人血海冷疼一切冷病並皆治之五月五日將新瓶一隻収大艾葉一瓶按𦂳不令虚用好酒煮三升淋下瓶内以箬葉並紙扎縛了次又用泥封却逐日將去日中晒至九月重陽日取開焙乾為細末用煮酒打麵糊修為丸如梧桐子大每服三十丸至四十丸空心用鹽湯吞下婦人醋湯下大有功効更不盡述金罌煎出衛生家寶方治男子氣弱丹田冷痛臟腑泄瀉婦人血海冷疾一切病並皆治之冬月採金罌子俗名雞頭罌未十分熟者不拘多少新蘿中擦去刺以竹刀或銅刀破開刮去穰浄洗􅀈畧乾擣碎甆鍋中用水煎四五十沸濾去滓熬汁候濃如水糖用雞頭肉為細末同熬成膏每服一匙頭許空心食前用温酒下功効未易具述或無雞頭只以金罌煎調酒下亦得玉海藏已寒丸出衛生寳監方治沈寒痼冷臍腹冷痛迴陰返陽附子炮一兩乾薑炮一兩良薑七錢桂三錢茴香炒一兩茯苓五錢右件為細末醋打麵糊為丸如桐子大每服三十五丸温酒送下食前金粟黃芽丹又名太乙紫霞丹出危氏方此丹養火不計歲年有起死囘生之功藴脫胎換骨之妙音鍾吕陰三真人張栢子所煉皆此丹也粒至小功甚大應諸虚百損五勞七傷八風五痺沈寒痼冷水腫蠱氣乆痢乆瘧一切男女老幼困篤之疾百藥不能療者悉皆主之初服覺腹中㣲慢或欲吐瀉則是驅逐諸病無病則不動再服則不覺經云服丹之人能絶嗜慾斷五腥不食頭魚大蒜陳臭等物當為地仙矣若未免此服及一兩延壽二紀大率救憊扶危衛生伐病無出此丹之右服時以平旦散一粒右手内搓令暖置口中可加至十粒或用􅀥肉丸面東叩齒宻念呪曰返我常歸我鄉服之千日朝虚皇一氣七遍以井花水或人參棗湯送下孕婦不可服此丹無方惟有丹母不知是何藥修煉得成修煉時以大硃砂一斤抽汞置丹母於鼎内以汞安於丹母上覆以真金箔五十片於静室養火朝東北暮西南一月後開鼎如覺丹母傷火以濃煎沈香水浴一載後丹成如穀芽様或如花果様用銀剪刀剪下入大蘿蔔内蒸一伏時以蘿蔔深黒為度取出用玉石杵臼研為細末以白蜜為丸丸如粟大依前湯引服大有功効所惜者此丹母自北而南多為名宦巨室収藏不入醫家抽汞修煉家另有法小鍾乳丸出十便良方治虚冷鍾乳粉七分硫黃三錢末乾山藥一錢右為細末用􅀥肉和丸如桐子大每服七八丸至十丸空心米飲或酒下養正金丹出十便良方治中下寒冷進飲食暖脾胃張㑹伯方硫黃去砂别研大附子乾薑丁香桂厚朴半夏肉豆蔲各二兩右為細末酒煑麵糊為丸如桐子大硃砂為衣每服二三十丸加至七八十丸空心米飲下老人服之尤佳蘿蔔丸出朱氏集驗方治諸冷積腹脹氣痛蘿蔔子三兩沈香一錢半草豆蔲一錢半白术半兩青皮五錢右除蘿蔔子為末别研麵糊丸十丸米飲下温内丸治痼冷在飲滯伏留陰盛陽虚穀氣衰㣲清濁不分腸胃虚弱寒濕相勝下利頻併飲食不入怠惰嗜卧煩悶不安常服温益臟氣厚養腸胃厚朴薑汁製一斤乾薑炮甘草炙白术草豆蔲去皮五味子訶黎勒皮陳橘皮去白各半斤右為末水煮麵糊為丸如梧桐子大每服五十丸不拘時候米飲下治入秋小腹多冷者出本草用古磚煮汁服之治冷三月三日採艾作煎服普濟方卷一百二十
