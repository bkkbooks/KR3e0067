body:
  text: 普濟方卷四百十一明周王朱橚撰鍼灸門九鍼式鑱鍼平半寸長一寸六分其頭大末銳其病熱在頭身宜此圓鍼其身圎鋒如卬形長一寸六分分肉氣滿宜此鍉鍼鋒如黍粟之銳長三寸五分脉氣虚眇宜此鋒鍼刃三隅長一寸六分瀉熱出血發泄痼病宜此䤵鍼一名破針末如劔鋒廣二分半長四寸破癰腫出膿血圎利鍼尖如毫且圎且利中身小末大長一寸六分調隂陽去暴痺毫鍼法象毫尖如蚊䖟喙長一寸六分調經絡去疾病長鍼鋒如利長七寸痺深居骨觧腰脊節腠之間者燔鍼一名焠鍼長四寸風虚舍於骨觧皮膚之間者煮鍼法危氏方云用烏頭一兩去尖巴豆一兩硫黄麻黄各半兩木鼈子十箇烏梅十箇同入甆石器内水煮一日洗澤之再用止痛藥沒藥乳香當歸花蘂石各半兩又如前水煮一日取出用皂角水洗再於犬肉内煮一日仍用瓦屑打磨净端直松子油塗常近人氣為妙折量取腧穴法凡度周身孔穴逺近分寸以病人男左女右取手中指第二節内度兩横文相去為一寸以薄竹片㸃量分寸使用或有人手長身短或身長手短或人長胷腹短或人短胷腹長揣穴尤宜用意凡穴不離分肉之間動脉之中是谿谷之㑹以行榮衛以㑹大氣其經脉粗細狀如細線但令當經而刺之依法補瀉即能愈疾矣明堂定尺寸法云以八寸為一尺以八分為一寸縁人有長短肥瘦不同取穴不准秦時扁鵲明堂經云取男左女右手中指第一節為一寸縁人有身長手短有身短手長取穴不准唐時孫思邈明堂經云取患人男左女右大拇指節横文為一寸以意消詳巧拙在人亦有一差悞令取男左女右手中指節第二節内度兩横文相去為一寸自依此寸法與人看灸療病已來其病多得獲愈此法有凖今以為定㸃穴法凡㸃穴時須得身體平直四肢毋令拳縮坐㸃毋令俛仰立㸃毋令傾側坐㸃則坐針灸卧㸃則卧針灸立㸃則立針灸反此則不得其穴耳又云灸時若孔穴不正無益於事徒燒好肉虚忍痛楚之苦若有病先灸於上後灸於下先灸於少後灸於多皆宜審之孔穴相去法甲乙經云自大椎下至尾骶骨二十一椎長三尺折量取腧穴或云第一顀上更有大顀在宛宛陷中非有骨也有骨虚即是第一顀若以大顀至尾骶二十一顀長三尺法校之則上節云顀毎顀一寸四分惟第七顀下至於膂骨多分之七故上七節共九寸八分分之七下節十四顀毎顀一寸四分分之五有竒以下七節共二寸一分分之三亦是一說也但第一椎有骨乃骨節之數大椎雖無骨實是穴名既曰自大椎下至二十一椎豈可不量大椎以下或者之說於是不通矣自蔽骨下至臍八寸而中管居其中上下各四寸氣穴論注云中管居心蔽骨與臍之中是也按明堂下經云鳩尾在臆前蔽骨下五分人無蔽骨者從岐骨際下行寸則是欲定中管之中又當詳有蔽骨無蔽骨也當凖人長短肥瘠量之自臍下寸半為氣海三寸為丹田至屈骨凡五寸千金云屈骨在下五寸明堂下經亦云屈骨在横上中極下一寸當凖人長短肥瘠量之銅人經云幽門夾巨闕旁各五分盲腧夾臍各五分明堂云在巨闕旁各通谷夾上管旁相去寸半三寸不容在幽門旁各寸半天樞去盲腧寸半夾臍期門在不容旁寸半大横直臍旁不容天樞期門既各寸半則幽門盲腧各五分誤矣又云腎俞在十四椎下兩旁各寸半與臍平肓門在十三椎相去各三寸與鳩尾相直腎俞既與臍平肓門乃與鳩尾相直亦可疑也甲乙經云人有長七尺五寸者髮以下至頥一尺結喉􅐳骭鳩尾也一尺三寸􅐳骭至天樞八寸天樞至横骨六寸半横骨至内輔上亷至下亷三寸半内輔下亷至内踝一尺三寸内踝至地三寸又膝膕至跗屬一尺六寸跗屬至地三寸又肩至肘一尺七寸肘至腕一尺二寸半腕至中指本節至末四寸半㸃灸法千金方云人有老少體有長短膚有肥瘦皆須精思商量凖而折之又以肌肉文理節解縫㑹宛陷之中及以手按之病决然如此仔細安詳用心者乃能得之耳許希亦云或身短而手長或手短而身長或胷腹短或胷腹長或瘠或肥又不可以一槩論也又云凡灸當先陽後隂言從頭向左而漸下次從頭向右而漸下先上從下穴名同異手有三里五里足亦有三里五里手有上亷下亷足亦有上亷下亷側頭部有竅隂足少陽亦有竅隂偃伏部有臨泣足少陽亦有臨泣既有五里矣勞宫亦名五里既有光明矣攢竹亦名光明肩有肩井又有所謂中肩井足有崑崙又有所謂下崑崙大淵大泉之名或殊天鼎天頂之字有異丹田初非石門和窌明堂上經誤作和字亦非和髎陽蹻實為申脉本非跗陽隂蹻實為照海本非交信肩髃之名扁骨見於外臺懸鍾之名絶骨童子髎之名前闗見於千金注如此者衆可不審處而針灸耶苟不審處則差之毫厘有尋丈之謬矣爰舉其畧以示世醫俾之謹於求穴云製熟艾法陳久好艾不以多少擇取葉入臼内用木杵輕搗令熟以細篩隔去青滓再搗再篩如此三次别以馬尾羅子隔之更再搗羅候柔細黄熟為度艾炷大小法千金方云黄帝曰灸不三分是謂徒寃炷務大也小弱乃小作之又云小兒七日以上周年已還不過七壯炷如雀糞明堂下經云凡灸欲艾炷若根下廣三分若不三分即火氣不能逺達病未能愈則是艾炷欲其大惟頭與四肢欲小爾至明堂上經乃云艾炷依竹筯頭作其病脉粗細狀如線但令當脉灸之雀糞大炷亦能愈疾又有一途如腹内疝瘕痃癖塊伏梁氣等惟須大艾炷故小品曰腹背爛焼四肢則但去風邪而已如巨闕鳩尾雖是胷腹穴灸之不過四七炷秪依竹筯頭大但令正當脉灸之艾炷若大復灸多其人永無心力如頭上灸多令人失精神臂脚灸多令人血脉枯竭四肢細而無力既失精神又加於細令人短夀凡承漿穴此論甚當故備著之㸃艾火法明堂下經云古來灸病忌松柏枳楺榆􅀥桑竹八木切宜避之有大珠曜日以艾承之得火有此火鏡曜日亦以艾引得火此火皆良諸蕃部落用鑌鉄繫䃈石得火出以艾引之凡人卒難備即不如無木火青麻油㸃燈燈上燒艾莖㸃灸是也兼滋潤灸瘡至愈不疼痛用蠟燭更佳良方云凡取火者宜敲石取火今舟行人以鉄鈍刀繫石先以氐灰為火凡在下承之亦得火或水精鏡於日得太陽火為妙天隂則以槐木取火下火法凡下火㸃灸欲令艾炷根下亦煇廣三分若不二分孔穴不中不合經絡縁榮衛經脉氣血通流各有所主灸穴不中即火氣不能逺達而病未能愈也定灸多少法凡灸頭與四肢皆不令多灸縁人身有三百六十五絡皆歸於頭頭者諸陽之㑹也若灸多令人頭旋目眩逺視不明縁頭與四肢肌肉薄若併灸則氣血滯絶於注下宜歇火氣少時令氣血遂通再使火氣流行候主數足自然除病宜詳察之用火法古來用灸病忌八般木火切宜避之八木者松木火難瘥増病柏木火傷神多汗竹木火傷筋目暗榆木火傷骨失志桑木火傷肉肉枯􅀥木火内傷吐血柘木火大傷氣脉橘木火傷榮衛經絡定髮際法凡灸髮際如是患人有髮際正齊依明堂所說易取其穴如是患人先因疾患後脫落盡髮際或性本額項無髮難憑取穴今定患人兩眉中心直上三寸為髮際後取大椎直上三寸為髮際以此為凖明堂上經云如後髮際亦有項脚長者其毛直至骨頭亦有無項脚者毛齊至天牖穴即無毛根如何取穴荅曰其毛不可輙定大約如此若的的定風府正相當即是側相去各二寸此為定穴論壯數多少法千金方云凡言壯數若丁壯病根深篤可倍於方數老少羸弱可減半又云小兒七日以上周年以還不過七壯炷如雀屎扁鵲灸法有至五百壯千壯曹氏灸法有百壯有五十壯小品諸方亦然惟明堂本經多云針入六分灸三壯更無餘論故後人不凖惟以病之輕重而増損之凡灸頭頂止於七壯積至七七壯止同人若治風則灸上星前頂百㑹皆至二百壯腹背宜灸五百壯若鳩尾巨闕亦不宜多四肢但去風邪不宜多灸多則四肢細而無力明上而千金於足三里穴乃云多至二三百壯心俞禁灸若中風則急灸至百壯皆視其病之輕重而用之不可泥一說而又不知其有一說也下經只云若是禁穴明堂亦許灸一壯至三壯恐未盡也又云凡官遊吳獨體上常須三兩處灸之切令瘡暫差則瘴癘温瘧毒氣不能着人故吳蜀多行灸法有阿是之法言人有病即令揑其上若裏當其處不問孔穴即得便快或痛處即云阿是灸刺皆驗故曰阿是穴用鍼呼吸法呼不過三吸不過五呼外撚針迴經氣吸内撚針行經氣鍼灸須藥千金方云病有須鍼者即針刺以補瀉之不宜針者直而灸之然灸之大法其孔穴與針無忌即下白針或濕針訖乃灸之此為良醫其脚氣一病最宜針若針而不灸灸而不針非良醫也針灸不藥藥不針灸亦非良藥但恨下里間知針者鮮爾所以學者須解用針燔針白針皆須妙觧知針知藥固是良醫此言針灸與藥之相須也今人或但針而不灸灸而不針或惟用藥而不知針灸者皆犯孫真人所戒也而世所謂醫者則但知有藥而已針灸則未嘗過而問焉人或詰之則曰是外科也業貴精不貴雜也否則曰富貴之家未必肯針灸也皆自文其過爾吾故詳著千金之說以示人云審方書經云爪甲與爪甲角間與外間内側與外側與夫陷者宛宛中要精審其某穴去某處㡬寸與某穴去處同者自各有經絡候天色法凡㸃灸時若値隂霧火起風雪忽降猛雨炎暑雷電虹蜺暫時且停候待晴明即再下火灸灸時不得傷飽大飢飲酒大醉食生硬物兼忌思慮憂愁惱怒呼罵吁嗟嘆息一切不祥忌之大吉千金云日正午以後乃可灸謂隂氣未至灸無不着午前平旦穀氣虚令人癲痃不可針灸卒急者不用此例用鍼畧例夫用鍼刺者先明其孔穴補虚瀉實送堅付濡以急隨緩榮衛常行勿失其理夫為針者不離乎心口如㘅索目欲内視消息氣血不得妄行針入一分知天地之氣針入二分知呼吸出入上下水火之氣針入三分知四時五行五臟六腑逆順之氣針皮毛腠理者勿傷肌肉針肌肉者勿傷筋脉針筋脉者勿傷骨髓針骨髓者勿傷諸絡東方甲乙木主人肝膽筋膜魂南方丙丁火主人心小腸血脉神西方庚辛金主人肺大腸皮毛魄北方壬癸水主人腎膀胱骨髓精志中央戊巳土主人脾胃肌肉意智針傷筋膜者令人忤視失魂傷血脉者令人煩亂失神傷皮毛者令人上氣失魄傷骨髓者令人呻吟失志傷肌肉者令人四肢不收失智此為五亂因針所生若更失度者有死之憂也所謂針能殺生人不能起死人謂愚人妄針必死不能起生人也又須審候與死同狀者不可為醫與亡國同政者不可為謀雖聖智神人不能活死人存亡國也故曰危邦不入亂邦不居凡愚人貪利不曉於治亂存亡危身滅族彼此俱喪亡國破家亦醫之道也凡用針之法以補瀉為先呼吸應江漢補瀉較升斗經緯有法則隂陽不相干震為陽氣始火生於寅兊為隂氣終戊為上墓坎為太𤣥華冬至之日夜半一陽復生離為太陽精為中女之象欲補從卬陽補不至巽足地户為地虚欲瀉從西北天門在乾針入因日明向寅至午針出從月光從申為日月向午之光位如此思五行氣以調榮行衛以將息之是曰隨身寳丸用鋒針針者除疾速也先補五呼刺人五分留十呼刺人一寸留二十呼隨師而將息之刺急者深内而久留之刺緩者淺内而疾發針刺大者㣲出其血刺滑者疾發針淺而内則久留之刺澀者必得其脉隨其逆順久留之疾出之壓其穴勿出其血諸小弱者勿用大針然氣不足宜調以百藥餘三針者正中破癰堅瘤結息肉也亦治人疾也火針亦用鋒針以油火燒之務在猛熱不熱即於人有損也隔日一報三報之後當膿水大出為佳巨闕太倉上下管此一行却有六穴忌火針也大癥塊當停針轉動更為佳毎針常須看脉脉好乃下針脉惡勿亂下針也一宿發熱惡寒此為中病勿輕之灸例凡孔穴其身皆是臟腑榮衛血脉通流表裏徃來各有所主臨時救難必當審詳人有老小體有長短膚有肥瘦皆須精思商量凖而析之無得一槩致有差失其尺寸之法古者八寸為尺仍取病者男左女右手中指上第一節為一寸亦有長短不定者即取手大拇指第一節横度為一寸以意消息巧拙在人其言一夫者以四肢為一夫又以肌肉文理節解縫㑹宛陷之中及以手按之病者快然如此仔細安詳用心者乃能得之耳内經云横三間寸者則是三灸兩間一寸有三灸灸有三分三壯之處即為一寸黄帝曰灸不三分是謂徒寃炷務大也小弱炷乃小作之以意商量凡㸃灸法皆須平直四體無使其傾側灸時孔穴不正無益於事徒破好肉耳若坐㸃則坐灸之卧㸃則卧灸之立㸃則立灸之反此則不得其穴矣凡言壯數者若丁壯遇病病根深篤者可倍多於其數其人老少㣲弱者可復減半依扁鵲灸法有至五百壯千壯皆臨時消息之明堂本經多云針入六分灸三壯更無餘論曹氏灸法有百壯者有五十壯者小品諸方亦皆有此仍須凖病輕重以行之不可膠柱守株凡新生兒七日以上周年以還不過七壯炷如雀屎凡灸當先陽後隂言從頭向左而漸下次後頭向右而漸下先上後下皆以日正午已後乃可下火灸之時謂隂氣未至灸無不着午前平旦穀氣虚冷癲眩不可灸也慎之其大法如此卒急者不可用此例灸之生熟法腰已上為上部腰已下為下部外為陽部榮内為隂部衛故臟腑周流名曰經絡是故丈夫四十已上氣在腰老嫗四十以上氣在乳以丈夫先衰於下婦人先衰於上灸之生熟亦宜樽而節之法當隨病遷變大法外氣務生内氣務熟其餘隨宜耳頭者身之元首人神之所法氣口精明三百六十五絡皆上歸於頭頭者為陽之㑹也故頭病必宜審之灸其穴不得亂灸過多傷神或使陽精圎熟令隂魄再足是以灸頭不得滿百脊背者是體之横梁五臟之所繫着太陽之㑹合隂陽動發冷熱成疾灸太陽熟大害人也脚臂手足者人之枝榦其神繫於五臟六腑隨血脉出能逺近採物臨深履薄養於諸經其地狹淺故灸宜少灸過多即内神不得入精神閉塞否滯不仁即臂不舉故四肢之灸不宜太熟也若腹臟之内為性貪於五味無厭成疾風寒痼結水榖不消宜當熟之然大杼脊中腎腧膀胱八窌可至二百壯心主手足太隂可至六七十壯三里太谿太衝隂陽二陵泉上下二亷可至百壯腹上下管中管病莫若灸之宜熟若治諸隂陽風者熱脉大者以鋒針刺之間日以報之若治諸邪風鬼注痛處少氣以毫針去之隨病輕重用之表針内藥隨時用之消息將之與天同心百年永安終無横病此要畧說之非賢勿傳秘之凡㣲數之脉慎不可灸傷血脉焦筋骨凡汗已後勿灸此為大逆浮脉熱甚勿灸頭面目咽灸之最欲生少手臂四肢灸之欲須少熟亦不宜多胷背腹灸之尤宜大熟其腰脊欲須少生大體皆須以意商量臨時遷改應機千變萬化難以一凖耳其温病隨所着而灸之可百壯餘少至九十壯大抒胃管可五十壯手心主手足太陽可五十壯三里曲池太衝百壯皆可三報之乃可以愈耳風勞沉重九部盡病及毒氣為疾者不過五十壯亦宜三報之若攻臟腑或心腹疼者亦宜百壯若卒報百病鬼魅所著者灸頭面四肢宜多灸腹背以少其多不過五十壯少不減三五七九壯凡隂陽濡風口喎僻者不過三十壯三日一報報如前㣲者三報重者九報此風氣濡㣲細入故宜緩火温氣推排漸抽以除耳若卒報摧廹則流行細入成痼疾不可愈也故宜緩火凡諸虚疾水穀沉結流離者當灸腹背宜多而不可過百壯大凡人有卒暴得風或中時氣凡百所苦皆須急灸療慎勿忍之停滯也若王相者可得無他不爾漸久後皆難愈深宜知此一條補瀉法夫行針者當刺之時口温針暖先以左手揣按其所針榮腧之處彈而怒之抓而下之捫而循之通而取之隨病咳嗽一聲右手持針而刺之春夏二十四息秋冬三十六息徐出徐入氣來如動脉之狀補者隨經脉推而内之左手閉針空徐出針而疾按之瀉者迎經脉動而伸之左手開針空疾出針而徐按之隨濟之是謂補迎而奪之是謂瀉刺實須其虚者留針隂氣隆至乃去針刺虚須其實者陽氣隆至針下熱乃去針一十二經之病盛則瀉之虚則補之熱則疾之寒則留之陷則灸之不盛不虚以經取之灸用火善惡補瀉法凡四肢者身之支幹也其氣係於五臟六腑其身度淺薄灸之不欲過多須依經數也過謂餘病則宜依之若脚氣不拘此例風毒灸之務欲多也依此經數則卒難愈疾小品論灸有八木火明堂論灸之補瀉法若能依之應有道理八木之火凡灸用松木火則難愈柏木火則瘡多汁橘木火則傷皮桑木火則肉枯􅀥木火則體消竹木火則傷筋多壯則筋縱枳木火則陷脉潰榆木火則傷骨多壯則骨枯凡八木之火皆不可用也火用陽燧之火其次用䃈石之火天隂則用槐木之火陽燧是以火珠向日下以艾於下承之便得火也䃈石似玉堅以此石繫鑌鉄即火出仍以極爛榆木承之即得亦用艾取之此是匈奴火法今胡人猶爾灸有補瀉者甲乙經云用灸補者無吹其火須自滅也以灸瀉者疾吹其火付其艾須其火滅也此言以口吹艾炷令疾滅即是瀉也不吹聽其自滅者即補也小品又云黄帝曰灸不過三分是謂從穴此言作艾炷欲令根下濶三分也若减此則不覆孔穴不中經脉火氣不行不能愈病也若江南嶺南寒氣既少當二分為凖燧小不得減一分半也嬰兒以意減之凡灸瘡得膿増壊其病乃出瘡不壊則病不除也甲乙經云灸不發者灸故履底熨之三日即發也甚宜解此又近有蘇恭善醫此疾馳名於上京顯譽於下邑撰脚氣方巻論則信為指南叙灸亦未成膠柱乃云毒氣如賊出何必要在大門腹背手足皆須灸也愚謂灸痛風毒所攻腹則引賊入室如何令賊出門特宜知之不可輕脫若手指疾悶灸無妨也若病人患熱者若覺針氣至病所即退針三二分令病人口吸氣鼻出氣依經生成數足覺鍼下隂氣隆至依前法出針若病人患寒病者覺針氣至病所即進針至二三分令病人鼻吸口呼依本經生成數足覺鍼下陽氣隆至依前法出鍼假令補法先令病人咳嗽一聲得入腠理復令病人吹氣一口隨吹下針至六七分漸進腎肝之部停針徐徐良久復退針一豆許乃撚針問病人覺熱否然後針至三四分及心肺之部又令病人吸氣内針撚針使氣下行至病所却外撚針使氣上行直過所針穴一二寸乃吸而外撚針出以手速按其穴此為補夫病後熱者治之以寒也何如須其寒者先刺入陽之分後得氣推内至隂之分復令病人地氣入而天氣出謹按生成之息數足其病人自覺清凉矣夫病惡寒者治之以熱也何如須其熱者先刺入隂之分後得氣徐引針至陽之分復令病人天氣入而地氣出亦謹按生成之息數足其病人自覺知暖矣迎隨補瀉法經云東方實而西方虚補北方而瀉南方何謂也此實母瀉子之法非只刺一經而已假令肝木之病實瀉心火之子補腎水之母其肝經自得其平矣五臟皆倣此真言補㵼手法補法左手掐穴右手置針於穴上令病人咳嗽一聲針入透於腠理令病人吹氣一口隨吹針至分寸待針頭沈拏時轉針頭百病以手循捫覺氣至却回針頭向下覺針頭沉緊令病人吸氣一口隨吸出針及閉其穴謂一手急撚孔是也虚羸氣弱痒麻者補之瀉法左手搯穴右手置針於穴上令病人咳嗽一聲針入腠理復令病人吸氣一口隨吸氣入針至分寸覺針沉緊轉針頭向病所覺氣至病若覺病退便轉針頭下以手循捫覺針沉悶令病人吹氣一口隨吹氣一口而徐出其針則不閉其穴命之曰瀉豐肥堅硬疼痛者瀉之素問瀉必用方補必用員夫瀉必用方以氣方盛也以月方滿也以日方温也以身方定也以息方吸而内針及復候其方吸而轉及復候其方呼而徐引針故曰瀉夫補必用員員者行也行者移也謂行不宜之氣移未復之脉故刺必中其榮及復候吸而推針至血故員與方非針也余不知聖人之意請後之明達之士詳究焉春夏刺淺秋冬刺深法内經曰病有浮沉刺有淺深各正其理無反其道然春夏為陽其氣在外人氣亦浮凡刺者故淺取之秋冬為隂其氣在内人氣在臟凡刺者故當深取之又言春夏各致一隂秋冬各致一陽者謂春夏為陽謂隂所養故刺之各致一陽秋冬為隂謂隂所飬故刺之各致一隂春夏温必致一隂者謂下針深刺至腎肝之部得其氣針便出之是以引持之隂也秋冬寒必致一陽者謂下針淺則刺至心肺之部得其氣推而内之良久針出是以推内之陽也故素問曰春夏飬陽秋冬飬隂生成數法冷補之時使氣至病所更用生成之息數令病人鼻中吸氣口中出氣按所病臟腑之數自覺熱矣當熱瀉之時使氣至病所更用生成之息數令病人鼻中出氣口中吸氣按所病臟腑之數自覺清凉矣手指補瀉法經云凡補瀉非必呼吸出内而在乎手指何謂也故動揺進退搓盤彈撚循捫攝按爪切是也畧備於後動動者如氣不行將針伸提而已退退者為補瀉欲出針時各先退針一豆許然後却留針方可出之此為退也搓搓者凡令人覺熱向外似搓線之貌勿轉太緊治寒而裏卧針依前轉法以為搓也進進者凡不得氣男外女内者及春夏秋冬各有進退之理此之為進也盤盤者為如針腹部於穴内輕盤搖而已為盤之也揺揺者凡瀉時欲出針必須動揺而出者是也彈彈者凡補時可用大指甲輕彈針使氣疾行也如瀉不可用也撚撚者以手撚針也務要識手左右也左為外右為内慎記之循循者凡下針於為部分經絡之處用手上下循之使氣血注來而已是也經云推之則行引之則止捫捫者凡補時用手捫閇其穴是也攝攝者下針如氣澀滯隨經絡上用大指甲上下切其氣血自得通行也按按者以手捻針無得進退如按切之狀是也爪爪者凡下針用手指作力置有凖也切切者凡欲下針必先用大指甲左右於穴切之令氣血宣散然後下針是不傷榮衛故也呼吸補瀉法補瀉者言呼吸出内以為其法補之時從衛取氣也取者言其有也素問曰必先捫而循之切而散之推而按之彈而挐之爪而下之通而取之外引其門以閉其神呼盡内針静以久留以氣至為故如待貴賓不知日暮其氣以至適而自獲候吸引針氣不得出各在其處推闔其門令神氣存大氣留止故命曰補是取其氣而不令氣大出也當瀉之時從榮置其氣而不用也故素問曰吸則内針無令氣忤静以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃去大氣皆出故命曰瀉瀉者是置其氣而不用也若陽氣不足而隂血有餘者當先補陽而後㵼隂隂血不足而陽氣有餘者當先補隂而後㵼陽以此隂陽調和榮衛通行此為針之要也夫婦配合大言隂與陽小言夫與婦隂日隂時則當刺隂干陽日陽時則當刺陽干故隂陽者血氣也隂日血先氣後陽日氣先血後經云榮行脉中衛行脉外故隂日雖遇陽時刺隂干者何也葢隂日血先行引氣後隨血入脉中而行此為婦有氣夫往從之者故隂干是也故陽日雖遇隂時刺陽干者何也葢陽日氣先行引血後隨氣流注在脉外而行此為夫有氣婦往從之者故陽干是也如斯之論此之謂也經絡取原法本經原穴者無經絡逆從子母補瀉凡刺原穴診見動作來應手而納鍼吸則得氣無令出鍼停而久留氣盡乃出此拔原之法也王海藏拔原法假令針肝經病於本經原穴亦針一針如補肝經來亦於本經原穴亦補一針如瀉肝經來亦於本經原穴瀉一針如餘經有補瀉針畢倣此例亦補瀉各經原穴手太隂之原出於太淵手少隂之原出於神門手厥隂之原出於太陵手太陽之原出於腕骨手陽明之原出於合谷手少陽之原出於陽池足太隂之原出於太白足少隂之原出於太谿足厥隂之原出於太衝足太陽之原出於京骨足陽明之原出於衝陽足少陽之原出於丘墟凡此十二原穴非瀉子補母之法虚實通用故五臟六腑有病皆取其原是也井主心下滿榮主身熱俞主體重節痛經主喘欬寒熱合主逆氣而泄經絡腧穴配合法五臟六腑各有井榮腧經合腑為陽臟為隂陽主表隂主裏故為隂陽榮衛相合其中隂井乙木陽井庚金隂榮丁火陽榮壬水隂腧己土陽腧甲木隂經辛金陽經丙火隂合癸水陽合戊土故隂陽腧榮而各不同有配合之法名曰對刺手之三隂始於癸而終於乙手之三陽始於庚而終於戊足之三陽始於戊而終於庚足之三隂始於乙而終於癸手之隂陽隂逆陽順足之隂陽陽逆隂順此隂陽逆順不可不知也十二經是動所生之病手太隂肺之經是動病氣肺脹滿膨膨而喘欬缺盆中痛甚則交兩手而瞀是謂臂厥主肺所生病血咳嗽上氣喘渇煩心胷滿臑臂内前廉痛掌中熱氣盛有餘則肩背痛風汗出中風小便數而欠氣虚則肩背痛寒少氣不足以息溺色變卒遺失無度手太陽小腸經是動病嗌痛頷腫不可迴顧肩似拔臑似折主液所生病耳聾目黄頰頷腫頸肩臑肘臂外後廉痛手陽明大腸經是動病齒痛䪼腫主津所生病目黄口乾􅍠衂喉痺痛肩前臑痛足厥隂肝之經是動病腰痛不可俛仰丈夫㿉疝婦人少腹痛所生病胷滿嘔逆洞泄狐疝遺溺閉癃足少陽膽之經是動病口苦善太息心脇痛不能轉側甚則面㣲塵體無膏澤足外反熱是謂陽厥主骨所生病頭痛角頷腫痛目銳眥痛缺盆中痛腋卒腫馬刀挾癭汗出振寒瘧胷脇肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用足少隂腎之經是動病饑不欲食面黒如炭色欬唾則有血喉鳴而喘坐而欲起目􅉩􅉩無所見心懸若饑狀氣不足則善恐心惕惕若人將捕之是謂骨厥主腎所生病口熱舌乾咽腫上氣嗌乾及痛煩心心痛黄疸腸癖脊股内後廉痛痿厥嗜卧足下熱而痛手少隂心之經是動病嗌乾心痛渇而欲飲是謂臂厥主心所生病目黄脇痛臑臂内後廉痛厥掌中熱手厥隂心包絡經是動病手心熱肘臂攣急腋腫甚則胷脇支滿心中澹澹大動面赤目黄善笑不休主脉所生病煩心心痛掌中熱足太陽膀胱經是動病頭痛目似脫項似拔脊痛腰似折髀不可以曲膕似結腨似裂是謂踝厥主筋所生病痔瘧狂癲疾頭腦頂痛目黄淚出鼽衂項背腰尻膕腨脚背痛小指不用足陽明胃之經是動病悽悽然振寒善伸數欠顔黑病至則惡人與火聞木音則愓然而驚心欲閉户牖而處甚則上髙而歌棄衣而走賁嚮腹脹是謂骭厥主血所生病狂瘧温滛汗出鼽衂口喎唇疹頸項腫喉痺大腹水腫膝臏腫痛循膺乳街股伏兎骭外廉足跗上皆痛中指不用氣盛則身已前皆熱其有餘於胃則消穀善饑溺色黄氣不足則身已前皆寒慄胃中寒則脹滿手少陽三焦經是動病耳聾渾渾焞焞嗌腫喉痺主氣所生病汗出目銳眥痛耳後肩臑肘臂外皆痛小指次指不用足太隂脾之經是動病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重痺所生病舌本痛體不能動揺食不下煩心心下急痛寒瘧溏泄水閉黄疸不能安卧強立股膝内腫厥足大指不用雲岐子論經絡迎隨補瀉法能知迎隨可令調氣調氣之方必别隂陽隂陽者知榮衛之流行逆順經脉往來終始凡用針順經而刺之為之補迎經而奪之為之瀉故迎而奪之安得無虚隨而取之安得無實此謂迎隨補瀉之法古法流注經云其氣始從中焦注手太隂陽明陽明注足陽明太隂太隂注手少隂太陽太陽注足太陽少隂少隂注手心主少陽少陽注足少陽厥隂厥隂還注於手太隂如環無端週流不息晝夜流行與天同度此法如氣血所生之經絡於一經中井榮腧經合迎而補瀉之亦用東方實而西方虚瀉南方補北方是也四季人神不宜灸春在左脇秋在右脇夏在臍冬在腰逐日人神歌訣一足大指鼻小指二踝髮際外踝中三股牙齒肝及足四腰胃脘手陽明五口遍身還在手六手胸間又在胷七踝氣衝并在膝八脘股内及隂中九尻在足并膝經十腰在背足趺中十二支人神所在諸法子日在目孫氏云在肩口丑日在耳及腰寅日在胷又云在口夘日在脾孫氏云在鼻辰日在腰巳日在頭口孫氏云一在手午日在心腹未日在兩足心孫云在足申日在肩及頰又云頭腰酉日在脛孫氏云在背戌日在咽喉孫氏云在頭一作項亥日在背頸又在兩膝孫氏云在項又法甲乙日忌寅時不灸頭丙丁日忌辰時不灸耳戊巳日忌午時不灸髮鬚一云不灸膝臏壬癸日忌酉時不灸足又法毎月六日十五日十八日二十二日二十四日小盡日甲辰庚寅乙夘丙辰辛巳五辰五酉五未八節日前後各一日若遇以上日並凶不宜灸之又法正月丑二月戌三月未四月辰五月丑六月戌七月未八月辰九月丑十月戌十一月未十二月辰又法男忌壬辰甲辰己巳丙午丁未女忌甲寅乙夘乙酉乙巳丁巳又法男忌戌又云忌隂日女忌孫氏云忌巳人法云忌破日又法丙子日天子㑹壬子日百王㑹甲子日太子㑹丁丑日三公㑹丙辰日諸侯㑹辛夘日大夫㑹癸夘日人臣㑹乙亥日以上都㑹又法木命人行年在木不宜針及服青藥火命人行年在火不宜針及服赤藥土命人行年在土不宜吐及服黄藥金命人行年在金不宜灸及服白藥水命人行年在水不宜下利及服黑藥凡不知此法下藥若過命厄㑹深者下手即死又法立春春分脾立夏夏至肺立秋秋分肝立冬冬至心四季十八日腎毎用血支正月丑二月寅三月夘四月辰