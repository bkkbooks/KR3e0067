六腑脉出至隂少澤竅隂商陽厲兊闗衝此三焦經流通谷前谷俠谿二門内庭液門注束骨後谿臨泣三間陷谷中渚過京骨腕骨丘墟合谷衝陽陽池行崑崙陽谷陽輔陽谿解谿支溝入委中小海陽陵泉曲池三里天井以上六腑三十六穴誤傷禁穴救鍼法腦後瘂門穴不可傷傷即令人啞宜針人中扶突二穴可二分風府一穴在瘂門上入髮際一寸五分針只可下一寸以下過度即令人瘂一針人中扶突穴救之兩腋外文頭尖處上曲池穴不可傷傷即令人手臂不舉宜針大鶴柏夾腦骨縫四穴深半寸臉池上下四穴針只可深一米許過深令人血灌黑暗視物不見不可治也眼小眥後一寸太陽穴不可傷傷即令人目枯不可治也兩目大眥二穴只可背睛斜飛不可直針直即傷睛致瞎不可治也顖㑹一穴只可針五分過即令人頭旋目暗急鍼百會及風府二穴救之承泣二穴只可針三分深即令人目陷陷即不治正營不可傷傷即令人神魂失次宜針大顀兩邊相去三寸後心一穴可入五分承筋不可傷傷即令人手脚攣縮凡鍼筋皮須重手按開而取正穴如傷即治手虎口及手腕上下膽池不可傷傷即令人目暗即乳下二穴是宜治肝俞肺腧不可傷傷即令人身心顫掉宜針後心顖門穴救之肺募不可傷傷即令人鼻塞不聞香臭白汗透流宜治顖門及心下一寸深可一寸半地户湧泉不可傷傷即令人百神俱散宜治人中百㑹三里太白穴手心不可傷傷即令人悶倒眼直上宜治前後心可五分又治神庭穴大腋不可傷傷即令人心氣促宜治肺腧穴隂後神田不可傷傷即令人精神散亂屎尿不禁耳後宛處不可傷傷即令人口頰喎斜宜治人中承漿二穴水曹不可傷傷即令人尿血不止宜治臍上一寸及百㑹章門不可傷傷即令人氣絶宜治後心顖㑹癖户不可傷傷即令人命絶宜治後心顖㑹神庭不可傷傷即令人命絶宜治百㑹至骨胷前諸穴不可傷傷即令人悶倒宜治人中命室不可傷傷即令人命絶宜治人中百㑹承漿頥下不可傷傷即令人舌根不轉宜治耳後宛宛處五分過之亦傷也委中不可傷傷即令人脚攣行履不遂宜治三里分白穴膽户不可傷傷即令人筋搐行履不得宜治氣海分白穴外踝上一寸不可傷傷即令人悶絶宜治分白穴命泉不可傷傷即令人行不得宜治三里乳首不可傷傷即令人命絶不可治也白氣不可傷傷即令人失音宜治無突骨空穴法人之周身總有三百六十五骨節以一百六十五字都闗次之首自鈴骨之上為頭左右前後至轅骨以四十九字共闗七十二骨巔中為都顱骨者一有勢㣲有髓及有液次顱為髏骨者一有勢㣲有髓髏前為頂威骨者一㣲有髓女人則無此骨髏後為腦骨者一有勢㣲液腦左為枕骨者一有勢無液腦右為就骨者一有勢無液枕就之中附下為天葢骨者一下為肺系之本葢骨之後為天柱骨者一下属脊窳有髓葢前為言骨者一言上復合於髏骨有勢無髓言下為舌本骨者左右共二有勢無髓髏前為顖骨者一無勢無液顖下為服委骨者一俚人訛為伏犀骨是也無髓勢服委之下為俊骨者一附下即眉字之分也無髓勢眉上左為天賢骨者一無勢無髓眉上之右為天貴骨者一眉上直目睛也左睛之上為知宫骨者一無髓無勢右睛之上為命門骨者一無髓勢兩睛之下中則為鼻鼻之前為梁骨者一無髓無勢梁之左為顴骨者一有勢有髓梁之右為糺骨者一有勢無髓梁之端為嵩柱骨者一無髓勢其顴糺之後即耳之分也左耳為司正骨者一無髓無勢右耳為納邪骨者一無髓無勢正邪之後為完骨者左右共二無勢無液正邪之上附為嚏骨者一無勢少液嚏後之上為通骨者左右前後共四有勢少液嚏上為㗁内骨者一無勢多液其㗁後連屬為頷也為乘骨者一有勢多液右頷車骨者一無勢多液乘車上下出齒牙三十六事無勢髓痛下則不滿其數乘車之後為轅骨者左右共二有液有勢復次鈐骨之下為膻中左右前後至蓧以四十字闗九十七骨轅骨之下左右為鈐骨者二多液鈐骨為㑹之骨者一無髓勢鈐中之下為咽骨者中及右共三無髓咽下為喉左中及右共三無髓喉下為嚨骨者環次共十事無髓嚨下之内為肺系骨者累累然共十二無勢髓肺系之後為谷骨者一無髓谷下為鬲道骨者左右共二無髓嚨外次下為順骨者共八少液順骨之端為順隠骨者共八少液順下之左為洞骨者一女人無此順下之右為棚骨者二女人無此二骨洞棚之下中央為􅐳骭骨者一無髓里人呼為鳩尾􅐳骭直下為天樞骨者一無髓鈐下之左右為缺盆骨者二有勢多液左缺盆前之下為下厭骨者二無髓右缺盆前之下為分饍骨者一無髓厭饍之後附下為倉骨者一無髓倉之下左右為髎骨者共八無液無勢髎下之左為腦骨者一男此骨子好湧大勇髎下之右為蕩骨者一女人此骨大者多夫腦之下為鳥骨者一男女此鬢骨滿者早髮勇蕩之下為臆骨者一此骨髙則使人多妄說鈐中之後為脊窳骨者共二十二上接天柱有髓􅆃窳次下為大動骨者一上通天柱共成二十四顀大動之端為歸下骨者一道家謂之尾閭歸下之後為纂骨者一此骨能陷精液歸下之前為蓧骨者一此骨多處薄者貧下復次缺盆之下左右至襯以二十五字闗六十骨此下至分兩手衆骨臂至十指之端也支其缺盆之其後為傴甲骨者左右共二有勢多液傴甲之端為甲隠骨者左右共二此骨長則至賢前支缺盆為飛動骨者左右共二此骨消則病痱緩次飛動之左為龍臑骨者一有勢多髓次飛動之右為虎衝骨者一有勢多髓液龍臑之下為龍本骨者一有勢多髓虎衝之下為虎端骨者一有勢多髓本端之下為脘也龍本上内為進賢骨者一男子此骨隆則為名臣虎端之上為及爵骨者一女人此骨髙則為命婦腕前左右為上力骨者共八有勢多液次上力為駐骨者左右共十有勢多液次駐骨為搦骨者左右共十有勢多液次搦為助勢骨左右共十左肋外為爪右肋外為甲爪甲之下各有襯骨者左右共十無勢有液復次􅐳骭之下左右前後至初步五十一中闗一百三十六骨此下自兩乳下分左右至兩足心衆骨所㑹劇也􅐳骭之心為心蔽骨者一無髓􅀈骭之左為脇骨者上下共十二居小腸之分也左脇之端各有脇隠骨者分次一十二無髓脇骨之下為季脇骨者共二多液季脇之端為季隠骨者二無髓􅐳骭之右為肋骨者上下共二十處大腸之分也肋骨之下為䏚䏚骨者共二各無隠骨唯獸有之右肋之端為肋隠骨者共十二無髓蓧骨之前為大横者一有勢少髓横骨之前為白環骨者共二有勢有液白環之前為白甫骨者左右共二有勢多液内甫之後為骸闗骨者左右共二有勢多液骸闗之下為揵骨者左右共二有勢多液揵骨之下為髀骨者左右共二有勢多液髀樞下端為膝葢骨者左右共二無勢多液膝葢左右各有俠升骨者共二有勢多液髀樞之下為䯒骨者左右共二有勢多髓䯒骨之外輔骨者左右共二有勢有液䯒骨之下為立骨者左右共二有勢有液立骨左右各有内外踝骨者共四有勢少液踝骨之前左右各有下力骨者共十有勢多液踝骨之前左右各有下力骨者共十有勢多液踝骨之後各有京骨者左右共二有勢多液下力之前各有釋欹骨者左右共十有勢有液釋欹之前各有起仆骨者左右共十有勢起仆之前各有平肋骨者左右共十冇勢有肋之前各有襯甲骨者左右共十無勢少液釋欹兩傍各有核骨者左右共二有勢多液起仆之下各有初步骨者左右共二有勢無髓有液女人無此骨凡此三百六十五骨也天地相乘惟人至靈其女人則無頂威左洞右棚及初步并五骨止有三百六十骨又男子女人一百九十骨或襯或無髓勢餘二百五十六骨並有髓液以藏諸筋以㑹諸脉谿相需而成身形謂之四大此骨度之常也昔黄帝問於伯髙曰脉度言經脉之長短何以立之伯髙對曰先度其骨節之大小廣狹長短而脉度定矣帝曰願聞衆人之度人長七尺五寸者其骨節之大小長短各㡬何伯髙曰頭之大骨圍二尺六寸胷圍四尺五寸腰圍四尺二寸髮所覆顱至項一尺二寸髮以下至頤長一尺君子參折結喉以下至缺盆中長四寸缺盆以下至􅐳骭長九寸過則肺大不滿則肺小􅐳骭以下至天樞長八尺過則胃大不滿則胃小天樞以下至横骨長六寸半過則回腸廣長不滿則狹短横骨長六寸半横骨上廉以下至内甫之上廉長一尺八寸内甫之上廉以下至下廉長三寸半内甫下廉至下内踝長一尺三寸内踝以下地長三寸脉膕以下至跗屬長一尺六寸跗屬以下地長三寸故骨圍大則太過小則不及角以下至柱骨長一尺行夜中不見者長四寸腋以下至季脇長一尺二寸季脇以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸耳後當完骨者廣九寸耳前當耳門者廣一尺三寸兩顴之間相去七寸兩乳之間廣九寸半兩髀之間廣六寸半足長一尺二寸廣四寸半腕至中指本節長四寸本節至其末長四寸半項髮以下至臍長三寸四分四分分之一竒分在下故上七節下至於齊骨九寸八分八分分之七此衆人骨之度也所以立經脉之長短也是故視其經絡之在身其見浮而堅其見明而大者多血細而沉者多氣也凡欲用針須明骨空所在及機闗之節機闗者内經曰甫骨上横骨下為揵狹髖為機膝觧為骸闗狹膝之骨為連骸骸下為甫甫上為膕膕為闗頭横骨為枕是也骨空者内經曰髓空在腦後三分在顱際銳骨之下風府穴也一在斷基下下頤是也一在項後中復骨下瘖門穴也一在脊骨上空在風府上腦户穴也脊骨下空在尻骨下空長強穴也數髓空在面俠鼻顴髎穴也或空骨在口下當兩肩大迎穴也兩髆骨空在髆骨之陽近肩髀傳失其名臂骨空在臂陽去踝四寸兩骨空之間通闗穴也股骨上空在股陽出上膝四寸承揵穴也䯒骨空在甫骨之上端犢鼻穴也股際骨空在毛中動下經闕穴名尻骨空在髀骨之後相去四寸八膠穴也扁骨有滲理腠無髓孔易髓無空是也凡病屬巨隂少陽之經與衝脉任脉督脉之分者病本於骨各隨其要而灸刺之故風從外入令人振寒惡寒汗出身重頭痛或頸項痛者治在風府從風憎風刺眉頭攢竹穴也失枕在肩上横骨間缺盆穴也折使揄臂齊肘正灸脊中陽闗穴也䏚給季脇引少腹而痛脹刺譩譆大風汗出則灸之腰痛不可轉揺急引隂卬刺八髎與痛上八髎在腰尻分間鼠瘻寒熱還刺寒府寒府在跗膝外解營取膝上外者使之拜取足心者使之跪任脉為病男子内結七疝女子帶下瘕聚衝脉為病逆氣裏急督脉為病脊強反折此三脉生病者從少腹上衝心而痛不得前後為衝疝其女子不孕癃痔遺溺嗌乾督脈生病治督脉治在骨上曲骨穴也甚者在臍下營者治其漸漸者上狹頤也大迎穴也蹇膝伸不得屈治其揵坐而膝痛治其機立而暑解治骸闗膝痛痛及拇指治其膕委中穴也坐而膝痛如物隠者治其闗膝痛不可屈伸治其背内大顀也連胻若折治陽明中俞髎三甲穴也若别治巨陽少隂榮通谷及然谷也滛濼脛痠不能久立治少陽之絡在外踝上五寸光明穴也潔古刺諸痛法内經曰留瘦不移節而刺之十二經無遏絶假令如見十二經中是何經絡不通行當針不通以凝滯俱令氣過節次無問其病以平如期如諸經俱虚補之諸經俱實瀉之補當隨而濟之瀉當迎而奪之又補母亦名隨而濟之瀉子亦名迎而奪之又隨呼吸出納亦名迎隨也兩脇痛少陽丘墟腰痛崑崙及委中出血嘔噦無度手厥隂太陵頭痛手足太陽原穴心痛少隂太谿湧泉足厥隂原穴熱無度不可止陷谷出血喘滿疾實口中如膠足少隂太谿百節疼痛實無所知三稜刺絶骨出血血衂不止大小便血婦人血不止刺足太隂井喉閉手足少陽井并少商手足太隂井穴大煩熱不止晝夜無度刺十指間出血謂八闗大刺隂頭中痛不可忍卒疝痛婦人隂中痛皆刺足厥隂井骨熱不可治前板齒乾燥當灸骨㑹大椎山小腸疝痛足厥隂大衝眼發睛欲出者大刺八闗眼大眥痛刺手太陽井眼小眥痛太陽井心痛脉沉腎原穴脉弦肝原穴脉濇肺原穴脉浮心原穴脉緩脾原穴腰痛身之前足陽明原穴身之後足太陽原穴身之側足少陽原穴此針之撮要也針灸避忌之法黄帝内經靈樞甲乙經云子午為經卯酉為緯二十八宿為制度太隂􅉻盈為法則并太一血忌纂成一圗有所治療悉皆避忌針灸避忌太一之圗閑邪瞶叟云經曰太一日遊以冬至之日始居於叶蟄之宫數其從宫所在日徙一處至九日復反於一常如是無已週而復始此乃太一日遊之法也其㫖甚明别無所隠柰行針之士無有知者祕而不傳致使聖人之法罕行於世良可歎也僕雖非醫流平昔常留心於醫言之聞之偹之其詳之而不迷豈非仁乎輙以短見遂將逐節太一所直之日編次成圗其圗始自八節得宫之日從其宫至所在之處首一終九日徙一宫至九日復反於一週而復始如是次而行之計毎宫各得五日九之則一節之日悉偹令一一條次備細開具於逐宫之内使觀者臨圗即見逐節太一所直之日在何宫内乃生人之身體所忌之處庻行針之士知而避之俾人無忤犯太一之凶此僕之本意也僕誠非沽名者以年齒衰朽恐身歿之後聖人之法湮沒於世故編此圗發明厥㫖命工鐫石傳其不朽貴得其法與時偕行焉覽者勿以目􅃷見誚經曰身形之應九野左足應立春其日戊寅己丑左脇應春分其日乙卯左手應立夏其日戊辰己巳膺喉首頭應夏至其日丙午右手應立秋其日戊申己未右手應秋分其日辛酉右足應立冬其日戊戌己亥腰尾下竅應冬至其日壬子六腑膈下五臟應中州其大概禁太一所在之日及諸戊巳凡此九者善候八正所在之處所主左右上下身體有疾病瘡腫欲治無以其所直之日刺之是謂大忌冬至叶蟄宫說冬至叶蟄宫圗按周身之法取九宫方位離為上部中五為中部坎為下部巽坤為二肩臂震兊為左右脇乾艮為左右二足太一遊至處禁忌針灸若起叶蟄宫取冬至一日為首他皆倣此一歳十歳起二宫順行逐日人神就甲子内檢尻神者神農之所制也凡人年命廵行九宫値此尻神所在不可針灸犯者必至喪命生癰疽尚憂至命宜急速醫治明堂經云以八分為一寸孫思邈云人有長短肥瘦宜取患人中指第二節兩横文故相去為則尻神起例訣乾宫背面耳須知坎脚尻神肘肚皮艮項腰間忌針灸震為牙舌不須疑巽頭胷乳連口鼻膝肋難宫忌要文坤踝不當須見血兊為手後􅈩難醫治灸瘡不發法凡著灸療病厯春夏秋冬不効者灸炷雖然數足得瘡發膿壊所患即瘥如不得瘡發膿壊其疾不愈甲乙經云灸瘡不發者用故履底灸令熱熨之三日即發膿出自然愈疾今用赤皮葱三五莖去其葱青於塘灰中煨熱拍破熱熨灸瘡十餘遍其瘡三日自發立壊膿出疾愈資生經王氏云予見人灸不發者頻用生麻油漬之而發亦有皂角煎湯候冷頻㸃之而發亦有恐氣血衰不發於灸前後煎四物湯服以此湯滋養血氣故也葢不可一概論也予嘗灸三里各七壯數日過不發再各灸兩壯右足發左足不發更灸左足一壯遂發兩足亦在人以智取之若任其自然則終不發矣此人事所以當盡也衛生寳鑑云國信副使覃郎中年四十九歳病臍腹冷痛完榖不化足胻寒而逆皮膚不仁精神困弱診其脉沉細而㣲遂投其甘辛大熱之劑又灸氣海穴百壯灸三百穴各三七壯又灸陽輔穴各二七壯三日復以葱熨灸瘡皆不發復灸前穴又十日後瘡亦不作膿瘡口皆亁初癸丑歳學針於竇子聲因循穴腧曰凡用針者氣不至而不效灸之亦不發大抵本氣空虚不能作膿失其所養故爾更加不慎邪氣加之病必不起異日因語針灸科總教授亦以為然戊辰春副使除益都府判到任未㡬時風疾半身麻木自汗惡風忘喜笑多妄言語㣲澁醫以續命湯復發其汗津液重竭其證愈甚因求醫還家日久神氣昏憒體羸瘦飲食無味便溺遺失扶而後起屢易醫藥皆不能效因思内經有云陽氣者若天與日失其所養則折夀而不彰今因此病而知子聲之言矣或曰副使肥甘足於口輕煖足於體使令足於前所為無不如意君言失其所養何也對曰汝言所養養口體者也予論所養養性命者也且覃氏壯年得志不知所養之正務快其心精神耗散氣血空虚因此致疾予因思靈樞云人年十歳五臟始定血氣以通其氣在下故好走二十歳血氣始盛肌肉方長故好趨三十五臟大定肌肉堅血脉盛滿故好起四十歳五臟六腑十二經脉皆大盛以平定腠理始疎榮華頽落髮頗斑白平盛不揺故好坐五十歳肝氣始衰肝葉始薄胆汁始減目始不明六十歳心氣始衰善憂悲血氣懈惰故好卧七十歳脾氣虚皮膚枯八十歳肺氣衰魄魂離故言善卧九十歳腎氣焦臟枯經脉空虚百歳五臟皆虚神氣皆去形骸獨居而終矣葢精神有限嗜欲無窮輕喪其命一失難復其覃氏之謂歟淋洗灸瘡法凡著灸治病纔住火便用赤皮葱薄荷二味煎湯温温淋洗灸瘡週迴約一二尺以來令驅逐風氣於瘡口内出兼令經脉往來不滯於瘡下自然瘡壊疾愈若灸瘡退火痂後用桃樹東南枝梢青嫩栁皮二味等分煎湯温温淋洗灸瘡此二味偏能散灸瘡中諸風若瘡内黒爛潰者加胡荽三味等分煎湯温温淋洗灸瘡自然生好肉也若灸瘡疼痛不可忍多時不效者加黄連四味等分煎湯淋洗立有神效貼灸瘡法凡貼灸瘡春用栁絮夏用竹膜秋用新綿冬用腹上白細毛猫兒腹毛更佳細資生經云今人多以膏藥貼之兩三日易全不疼但以膏藥貼則易乾爾若要膿出多而疾除不貼膏藥尤佳又法凡灸瘡不瘥者日别灸六七壯自瘥忌食物法既灸忌猪魚熱麫生動風冷物鷄肉最毒房勞尤當忌也又忌法凡虎龍蛇牛馬猪羊鷄犬猴鼠已上十二相屬肉物皆不得食及以為藥牛黄龍齒龍骨不可廢又云經里下人灸後亦忌飲水漿濯手足前項諸法並散在諸部不可尋究故集之造次刪成所以省披討也普濟方卷四百十一
