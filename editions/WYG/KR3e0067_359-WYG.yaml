body:
  text: 普濟方卷三百五十九明周王朱橚撰嬰孩門五臓伏敵喜傷附論肺所伏者心所敵者肝所喜者辣所傷者焦苦二變七蒸之臓和則喜歡氣爽神清魄強疾主喘滿欬傷風作熱虚痰壅盛腎所伏者脾所敵者心所喜者醎所傷者甜五變十蒸之臓和主行坐嬉戱笑語疾主崩砂黒齒截齒咬牙䁎耳膿汁肝所伏者肺所敵者脾所喜者酸所傷者辣辛初變六蒸之臓和則魂神壯意志生疾主風攣搐搦眼目瘇赤疼痛心所伏者腎所敵者肺所喜者苦所傷者醎三變八蒸之臟和則情性悦樂疾主驚癎恐悸虚躁啼呌讝語狂煩涎流口角脾所伏者肝所敵者腎所喜者甜所傷者酸釅四變九蒸之臟和則消榖氣美飲食疾主嘔噦疳積虚痢痞癖潮熱不思乳食五位分部定位附論肺部所主鼻孔井竈尖處名凖兩眼大角中央坎陷名曰山根若鼻孔黒如煤色主肺焦熱或黒燥如墨色主肺氣已絶鼻中赤癢疳盛或㵼白涕主肺寒或困寐流清涕主傷風肺熱或鼻塞呼吸艱澁有妨吮乳闗竅閉塞乃感冒風寒邪熱之候鼻下生瘡潰爛者即疳鼻中常臭者積熱所致腎部所主耳穴之前名曰耳花耳船名輪輪裏名廓輪廓焦黒腎家虚熱其黒如炭腎絶待旦耳門生瘡衛積非常耳中膿出腎熱疳極臭名停耳膿汁不止瘡癢如裂其候虚熱耳聽不聰心腎氣壅常作閧閧熱氣上攻或如蟲剖榮虚衛熱耳輪如氷痳痘相侵耳輪紅熱傷寒是則極熱内痛腫氣相攻清心凉膈闗竅通塞兒孩兩腎常虚无病若有攻擊使令無益肝部所主眼睛有穴内藏其神外究五輪眶䀭属脾熱即生眵兩眥屬心熱痛如針白屬肺家熱赤生砂黄属肝臓昏瞀翳障中心瞳人腎熱不明兒孩眼目痛即便哭良方對治更為忌毒或患丹瘡從裏為殃經效良藥速療無妨眼本属肝怕熱怯寒如有治法得愈何難眼或連眨驚風交雜忽然竄視驚風已至肝熱定晴或翻無神瞳出中䧟十無一生脾部所主唇即口門語言之明舌居其中飲食之宗齒牙咀嚼咽喉相約牙齒既剛角宫自若嬰孩未定唇口見病上則人中下乃承漿上下四旁皆屬脾鄉口内屬心心脾有熱舌燥唇裂三焦藴熱紅如血色紅重渴輕即流涎沫鵝口膜口木舌重舌脾肺熱就口内噴臭脾腎氣寒色如死肝大驚一嚇口乾唇白時時積驚漸漸𫝊心心氣不足令兒煩哭可知脾絶指甲皆黒目神無光醫者知亡五種撮口驚風最惡可醫論方無路莫錯心部所主眼睛直下髙骨之中名之曰顴顴下名面面下名頥属生則吉相反病乖相尅證失醫士喜之平常不動良士惡之其色反乖應病乖色九分不救心絶何因大呌數聲過関不作必作鵶聲夫人一身主事于心心不可病病即散神兒童心真纔熱傷神神既昏亂當與調榮心為身主常能安静忽然加熱譫讝驚汝邪干不寧心常昏沉醫工究心藥莫亂陳人之五體以頭為首首中有靣靣中有睛睛中有神神者目中光彩是也或隠或顯或横或衝應衛而現病之順即順疾之逆即逆色者青黄紅白黒是也初𤼵則我生而侵之次則生我以臨之盛則我尅以交之重則尅我而入之侵即有犯臨即相干交即過位入即通度然其白色者白似枯骨又如烟霧空黒色者如冷灰又如竈尾塵埃紅色者紅若朽木又若赤霞照谷黄色者黄似晒竹又如敗葉紅霜青色者青如冬𤓰又如荷葉盖水察之侵臨交入究之生平尅傷加以聽聲而應之一數圓長謂其如水􅋡渦漩洑流聲也二數鋭謂如焚薪爆烈之聲也三數散靸謂其如朽腐折蠧之聲也四數洪亮謂其如鍾磬之器擊響之聲也五數頽弊謂其有如牆傾岑䧟崩搨之聲也在病疾而有變于證而有應五行五脈一氣而更有滯者從㓜至長氣干犯者随受以𫝊或善或惡惟主五臓相叅百脉相領輕重相𫝊自然應見辨小兒脈法分三部法分三部但取掌後高骨為闗闗前為寸口闗後為尺澤如小兒脉可以一指按其三関進退取之此法甚明不湏疑惑也論小兒脉小兒脉三嵗以上五嵗以下然後可㸔與大人有異者為呼吸常六至是也八至病十至困盖小兒純陽故脉息數促如大人者為不同也小兒周嵗以前脉息難慿周嵗以後方有脉形寳鑑云五百七十六日乃成人血脉骨肉皆堅牢方可診候也審脉逆順驚搐脉浮數順沉細逆身温順身冷逆夜啼脉㣲小順洪大逆身冷順身熱逆心腹痛沉細順浮大逆身温順身冷逆傷寒脉洪弦順沉細逆浮大順㣲伏逆汗後脉沉細順緊促逆困倦順狂躁逆温病脉洪大順沉細逆身熱順身冷逆咳𠻳脉滑浮順沉細逆身温順肢冷逆霍亂脉浮洪順沉㣲逆身温順身冷逆吐哯脉浮大順沉細逆身温順身冷逆泄㵼脉緩小順浮大逆身温順身冷逆諸痢脉沉細順浮大逆身温順身冷逆諸渇脉洪數順㣲細逆身温順身冷逆諸腫脉滑大順沉細逆臓實順滑泄逆腹脹脉浮大順虚小逆臓實順泄㵼逆痰喘脉滑大順沉細逆身温順身冷逆寒熱脉緊數順沉細逆倦怠順強直逆疳勞脉緊數順沉細逆臓實順脾泄逆蟲痛脉滑緊順浮大逆身温順唇青逆諸失血沉細順浮數逆身温順發熱逆中惡腹脹𦂳細順浮大逆身熱順身冷逆黄疸脉浮大順沉細逆腹寛順泄㵼逆火癉脉浮洪順沉細逆身熱順身冷逆已上脉是小兒五臓之根本若得其順則知其可治若得其逆則知其不可治也縱有生者十無一二七表應病浮寸口風熱頭沉関上腹脹胷痛尺中大便不通芤寸口衂血吐血関上㵼血痢血尺中少便出血滑寸口惡心吐逆関上胃寒不食尺中渇飲不歇實寸口􅅐中煩熱関上腹滿痛切尺中小便淋澀弦寸口胷心結痛関上胃寒不食尺中小便赤澁𦂳寸口頭疼心痛関上腹内刺痛尺中小便急痛洪寸口頭痛壮熱関上吐逆不食尺中小便赤澁三部一脉三部俱數身熱驚搐忪竭心躁三部俱緩脾熱口臭吐逆寒熱三部俱弦肝風拘急欲發驚搐三部俱浮心腹疼痛急則驚癎三部俱芤又患㵼血吐血溺血三部俱洪發熱驚悸大小便澁三部俱實胃不能食胸膈不利三部俱急巢氏云主小兒驚癎脉應雜病數為熱属腑遲為冷屬臟陽數主逆吐不吐必發熱隂㣲主泄㵼不㵼必盗汗沉數寒熱寒多熱少亦生骨烝𦂳數寒熱熱多寒少又主骨熱急沉𦂳心腹疼痛短數同又主咳𠻳有痰沉細乳食不化亦主疞痛不利沉伏為積聚為霍亂微緩泄㵼乳不化沉緩同㣲澁瘈瘲筋攣微主利血㣲急寒熱吐血㣲浮𠻳浮滑宿食不消亦主咳𠻳浮𦂳疳氣耳聾弦𦂳潮痛浮弦頭痛身熱浮數驚熱緊滑吐血惡心心急數驚癎不測屡主疳淋肺甚𦂳顛癎風癎痰涎流溢肺浮實鼻塞大小便不通脾㣲細不吐則㵼難治関𦂳滑主蛔蟲尺沉同尺㣲細溏泄冷利乳食不化尺㣲澁便血無血必盗汗脉過寸口入魚際主遺尿七表八裏脉乃是五臓六腑脉也盖小兒純陽有病多見七表脉為属陽脉故也主病有驗八裏脉所以不見者為属隂脉故也設是小兒有八裏脉者必發隂癎孫氏云陽脉急甚必變陽癎急驚風也隂脉沉遲必變隂癎是慢驚風也是以八裏多不經見湯氏云凡脈浮數為熱風伏結為寒沉細為冷傷食亦沉大小不匀者惡也小兒脈大多風熱沉細因云乳食結弦長多是肝膈熱𦂳數驚風四肢掣浮洪胃口似火燒沉𦂳腹中痛不徹虚㵼有氣又兼驚脉芤多利大便血前大後小童男順前小後大必氣咽四至洪末苦煩滿沉細肚中疼切切滑主露濕冷所傷弦急客忤分明說五至夜甚浮大晝六至夜細浮晝别息數平和八九至此是皆人之􅁖疾前件所論童男脉訣乃舊訣也又况今古不同然古書云小兒八至為平大人八至為𦂳九至乃死今之小兒吾常指下審之只多大人一至為平若八九至乃是數脉必發熱生驚若以八九至為平𦂳數之脉豈止此也若十至之餘乃是雀啄病已危亟今之醫者宜審而切之小兒脉訣并歌凡小兒脉當以大指按三部一息六七至為平和十至為發熱五至為内脹脉𦂳為風癎沉緩為傷食促息為虚驚弦急為氣不和沉細浮為風大小不均為惡候為鬼祟浮大數為風熱伏細為物聚單細為疳癆凢腹痛多喘嘔而脉洪為有蟲浮而遲潮熱者胃寒也温之則愈嬰孩有疾未能言筋骨肌膚尚未堅脉理未全難考据當觀形色定由縁靣帶青色肝之病赤色心病因可必白為肺病黄属脾黒色属腎斯為得黒死還生死可生紅深時氣有疾停赤青已援脾風了青黒𫝊入變慢驚發熱鼻冷是瘡疹耳冷應知風熱證通身皆熱是傷寒上熱下冷傷食病更將虎口紋色㸔或紅或紫傷風寒青驚白疳黒中惡黄困皮端皆可觀紋直是驚曲傷損沉隠為風固可知曲外為冷内食傷紋得短少當安逸五臓部位怕相承更㸔禀受有􅃜盈隂陽表裏不可亂補過㵼多須辨明五百七十有六日大小變蒸數已畢血榮氣盛脉理全診候方能無所失男左女右不相干湏臾一指盖三闗浮洪驚熱須遲數滑冷沉虚食積然脈浮固知感風候浮大傷寒宜審詳浮𦂳驚風不可當浮數風熱應湏有浮遲之脉有潮熱乃知胃寒無所守浮虚盗汗睡中多浮洪胃口如火炙㵼痢浮大不可醫口噤不食亦堪悲脉洪腹痛多嘔逆定知蟲動不容説脉弦為風或為寒弦數之脉瘧未痊弦急因知為客忤氣結下寒邪所干脉沉帶緊為腹痛𦂳數為驚多瘈瘲脈牢而實大便難牢𦂳積聚何能動脉浮沉濡為虚弱乆亦變驚上還作虚𦂳伏熱致生風虚濡慢驚真可邈脈沉而實為有積沉數骨間須極熱沉遲虚冷豈應無沉緩食傷多嘔逆脈緩筋細皆為冷乳食不化兩相宜單細疳勞伏氣攻小大不均惡候省變蒸尺寸脈不拘既曰變蒸何必驚脉如雀啄風癎疾直上直下亦驚名額上多青色驚疼卧不安赤時身壮熱黄燥汗難乾素問云心熱病者顔先赤心氣合火火氣炎上指象明候故候于顔顔額也毛髮燥乾黄驚疳體似湯熱除湏有汗㣲渇意恓惶毫毛畢直主傷寒作熱素問云寒客于人使人毛髮畢直皮膚閉而乃為熱當是之時可汗而發之右臉連腮赤身軀發熱時肝弦筋脈急驚哭又攅眉身熱攅眉主頭疼肝弦驚哭主下痢素問云肝熱病者左臉先赤肝氣合木木氣應春南靣正理之則其左臉也左臉腮青白時時咳𠻳頻痰涎嘔多逆不食少精神素問云合金之氣應秋南靣正理之則右臉也兩臉㣲赤因潮熱夜間發作日間歇乆則令児氣血虚骨肉如蒸四肢逆有一等小兒兩臉常赤氣壯實始然非熱所作也若臉赤有熱者色必憔悴養生道云氣虚則發厥謂手足冷也血虚則發熱謂肌肉熱也兩臉腮青黒多啼勿奈何驚疼時進退腑臓不安和鼻息氣粗促兒孩衂血因黄時尿不利赤色熱多嗔鼻燥兒多哭皆因肺熱為白青連口鼻吐㵼食傷脾目鮮目眨目青驚目直心肝熱已成二臓戰争風火盛漸看搐搦動雙睛錢氏云目赤兼青欲𤼵搐目直身反强直生風又云肝風熱目連眨萬全方云目若睛青脈左脇下必硬多吐涎沫扁鵲云目睛青脈主癖凶也有積眼睛黄春冬骨似湯夏秋多㵼痢胞腫嗽難當兩目皰浮腫皆因乆嗽為睛黄脾有積潮熱有瘡痍亦有目皰腫不嗽者因食積傷脾乆必虚腫腹脹者必痢無常眼深㣲黒睛㣲赤必主耳聾腎受積眼稍如有細紅筋内弔驚風是踪跡印堂多青黒腹痛夜頻啼卧睡時驚悸無歡日惨悽攅眉因下病疳積靣黄浮吐㵼形容白唇乾渇不休傷寒身熱攅眉者主頭疼黄色人中畔兒因食物傷形青便澱沫脾胃不安康白唇兒湏吐兼成失血形紅赤亦同唇乾唇皺掲夜熱不安寜乆渇㵼唇紅已虚證不可用凉藥有積唇黄色㸔㸔作腫形脾虚多夜起糞白臭酸腥唇青脾胃怯腸冷痛非常畏食多嫌乳増寒靣色黄青肝木色唇主脾土木來剋土知脾弱不能食巢氏云小兒臓氣不和血氣為冷所乗即口唇青白亦有臓氣熱唇生瘡而風冷之氣入瘡雖瘥後血氣不復故令唇青口臭或作燥唇焦赤腸中糞不通氣粗多作熱睡卧不和同紫色唇間見流涎口畔垂蛔蟲攻刺痛乆則致尫羸涎流唇紫回蟲積痛作疼時汗出多虚痛若來脾胃冷蟲消積㵼保安和舌白乾焦燥烏黄並為小便難且澁心火漸蒸脾如小便不澁必焦黄舌腫厚急欲乳不能吃者此因邪熱客入兒臍流入心脾即舌厚唇燥不急治殺人洗心散導赤散黒魚眼膏子貼舌上百草霜塩等分和塗舌上下立消舌上出血舌腫舌裂舌上芒刺舌焦舌黒舌赤並與地黄湯方見舌胎舌卷門兩耳前㣲赤疳攻必耳聾㣲黄驚入腎戞齒睡魂中頥下㣲黄亦主之或曰女子無腎素問云胞胎者腎靣色形青白心煩㵼又驚躽身啼腹痛臓腑作雷鳴靣色青兼赤驚來熱亦成色青腸胃冷腹痛但啼聲赤紅傷寒靣心煩熱不安眼鮮驚必作風盛變多端有一等小兒靣黄不赤􅁍發潮熱傷寒壯熱者必唇乾燥或氣㣲促也靣白黄皆見心煩㵼不調因傷常夜起乳食不能消靣青兼黄色驚疳發病因睡中多呌哭潮熱損精神胃熱身金色脾蒸靣眼黄不利腸自利黄疸病難當頭靣青筋起嗞煎不肯眠身軀才發熱驚哭握雙拳唇紅靣赤睡難安頭黒青筋驚氣蟠冷氣入腸成内弔虚風在胃變多端曲身呌哭為非祟直頸啼聲欲作癎不乆自然驚搐候隂陽邪正互相干弄色非時變胎氣客忤驚紅青湏發搐兼黒痛分明錢氏云病重靣有五色不常不澤者死孫氏云弄色者為夭色夭色者死下頥赤微微亦主耳聾熱聚小腸中結澀膀胱内令兒溺不通素問云腎熱病頥先赤腎氣合水水性潤下指䝉明候故候于頥古書有一證靣青目兼黄小便澁異常亦主滑喉中多哽氣噎飲欲生驚二證皆癎疾㸔㸔搐搦成便黄因内熱紅赤黒同㸔緑白青皆冷疳肥食臭酸有一等淡黄沫如蟹之黄如槐花者虚熱治法在後傷食酸餿臭兼疳㵼白肥積停物不化結實乆還稀小兒多要吐者傷胃中有宿食宜下之妙丸子下益黄散補若此吐唾者停飲在胃黄龍丸以白术橘皮煎湯送下孫氏云小兒飲乳吃水正乳吃食正食飲水並成痰飲錢氏云口中吐沫後心蟲痛靣黄目白少精光多睡嗞煎被食傷嘔逆出聞酸氣息時時腹痛實難當先下後補右騐實積痛錢氏云凡積痛靣黄目白無精光多愛睡畏食大便酸臭輕者磨去其積重者下去積腹痛亦去矣時行瘡痘數日前狀似傷風靣臉光乍熱乍凉頭有汗虚驚虚悸手多牽唇紅體熱時加喘鼻清耳冷只貪眠目澁氣粗頻􅅉噴定知瘡疹有相𫝊瘡疹多驚悸時行候一同増寒偏要水發熱又嫌風目澁雙睛白皰浮兩臉紅𠻳涎聲啞嗄呵欠睡朦朧瘡痘相𫝊染時行若感風唇乾唇縁白目澁目㣲紅疹出眉先皺瘡來鼻不通皮毛寒聳立麩豆隠其中時氣行瘡豆形青靣臉鮮嗞煎頭有汗恍惚手多牽􅅉噴兼㣲𠻳嘘呵欠愛眠睡中驚起哭瘡疹欲相𫝊孩兒驚搐定體熱狀如湯班疹藏肌肉身凉出豆瘡身熱心煩躁驚來耳似氷指稍俱帶冷豆搐甚分明湯氏雜病形症歌鬼病皮膚裏相𫝊臓腑間腫虚如水病瘈瘲似風癎發熱渾身澁痛連心腹攅小兒若有此服藥醫急㸔時氣皆因節令􅃜頭疼壯熱汗㣲㣲良工仔細㸔時候當作傷寒病治之宜服羌活散惺惺散熱氣流𫝊脾胃居致令黄色在皮膚湏知其病真如可何用燒錢問女師此證宜服五苓散煎茵蔯湯調熱氣還逢腑氣衝便成結毒在腸中身體若煩多燥渇更兼尿糞不能通此証宜利下輕則利之用四順飲重則下之用金星丸時氣還須早早醫變成敗氣急難差乍寒乍熱無時度或去或來體漸羸小兒骨蒸者皆因時氣不治療漸成敗氣羸寒熱往來是疳勞宜服地骨皮散次服星露膏鱉甲散隂陽邪氣兩相并臓腑隂陽各競争發作有時名是瘧早湏醫治莫留停此疾宜服正氣散并瘧藥草菓飲雖然吐下熱猶餘盖為元因臓腑虚熱盛虚時皮肉澁治令燥渇不能除此候宜服五苓散以上俱是時氣𫝊變有此等候初無治法學者當審其根源量其輕重虚實用藥何患不痊時氣雖然瘥猶多餘熱停氣傾湏不食頰冷面皮青熱盛血兮血散行鼻出血兮人可驚皆因汗而不得汗上壅喘兮聞有聲大凡時氣與傷寒病相似初病在表速宜汗庸醫恐誤失表漸入腠裏其熱昏于經絡血得熱即散從鼻中出故其名紅汗也宜服小柴湯大便秘用大柴湯病未入而先下之乗虚入腹怎生醫痞滿喉中生喘急結胷之候切須知傷寒熱毒胃中存乆作班瘡發滿身若見舌唇渾似黒只因性命在逡廵黄病皆由胃熱為痢加腹滿脈沉微見此候時須用意若言魂去定難醫百日孩兒或作黄非干温疫及時殃只為胎中遭熱盛勿令人炙作成瘡此候乳母宜服生料四物湯用生地黄赤芍藥乃是也兒亦服云瘧疾因何渇皆因臓腑虚熱餘多飲水結塊腹中居小兒胎裏受風寒生下令兒不得安腹痛躽身頻哭泣此候良工仔細看此名躽啼宜服鈎藤木香乳香等藥風冷傷筋脉四肢全不仁痛同風熱摶緩是熱傷筋寒客于喉裏啼聲似啞人温和用湯藥不爾損精神小兒虚腫一似吹盖是風邪夾氣為若見皮膚如熟李此名疳水聽因依此候宜服塌風散并五苓散加木香青皮用燈心煎脾為土壊不尅水便為腫滿入于脾腫痛行時還熱痛若居血氣即成之若㸔此候湏審細莫教差誤使傾危太陽入耳聼聦聦氣滯多因耳必聾鳴是風并氣相擊痛應腦户有邪風腎熱欝蒸停耳患漸深疼痛出稠膿不痛即非氣與熱縁因風水入其中熱氣薫肝眼必昏其有輕重必湏分輕疾熱多多熱淚重生白翳色如銀赤目眥頭成努肉朦朧睛上似浮雲洗肝飲與頻頻服只此良醫是異人小兒飲水乆停肝翳障全無辨物難夜裏不明為雀目青盲晝夜一般般小兒胃熱班瘡爛眼癢復疼發渴無盖為熱氣傷眼臉世人俗諺號胎風毒入喉中熱作癰名為喉痺食難通馬脾額間生腫痛重必心煩命必終凡有此證急宜吐出惡涎為佳胃熱皆因血氣強四肢温壯小便黄表裏熱時煩躁甚渇多身體熱如湯客忤多因人物衝更遭鬼氣亦相逢吐下青黄并白沫水榖開張痛又攻面色青黄時變色脉弦急數不干風亦似驚癎無上是早湏醫治莫從容小兒氣弱命中衰魂魄多因被鬼持其候痿黄頻哭泣衡人冷氣早湏醫乗年衰兮逢月空失時和兮三虚中遇賊風兮還卒死一如鬼氣候湏同臓腑未絶兮湏存活急湏救療兮莫怱怱疝氣因何得邪風在腎經經𫝊并血聚如此漸成形冷氣結在臓因弦小腹疼本經無補法疏利藥通靈霍亂因風急忽然吐㵼并有時連風痛或即遶臍鳴乳母因傷冷孩兒有宿癥夾風身發熱臓實更頭疼小兒吐痢早湏醫早是腸虚胃逆為更有中他湯藥毒必知煩躁在心脾風冷傷于乳變壊汁湏凝孩童生嘔逆氣喘腹膨脝觧脱當風處洗浴向簷楹哭中還吮妳氣逆在胸停嘔吐從兹發良醫諳本經當令乳母腹強順醸乳藥血為榮兮氣為衛二氣相湏無阻滯忽然血被氣來侵所以妄行不安位血随氣上奔心來吐出鮮紅争忍視便湏服藥急醫㸔觧熱凉中依次第偹急即服藕汁及蘿蔔汁治法當順其氣次行血産母懐胎忌數般若令冷傷便憎寒生下嬰孩不吃乳更加腹痛肚皮堅乳哺寒温不著量致令壅滯在胸堂更兼新乳相投觸不得安和亂胃腸因成吐哯湏醫治診脉輕浮夀必長衣厚傷温損小兒熱蒸津液透膚皮致令身體連頭上汗出流珠汚濕衣小兒血氣未調和腠裏開踈易染疴将養傷温成盗汗早湏醫治莫蹉跎此候有二般有虚汗有心血溢汗治法不同切冝審詳虚汗乃脾虚不能尅制津液當補脾心血溢汗兩膄亦當歛心氣凉血為佳飲乳并傷水為痰結在胸令兒乳不下吐沫似癎同實則身烘熱譫言入夢中還須早醫療取久變驚風三焦若不調胸寒氣極急煩滿喘氣麄噯出酸臭氣乳哺不能消結聚成癥癖有形名曰癥乳動為瘕積弦強癖之元分明記胸臆胸中熱兼實榮衛不通徹臓腑不調和經中名痞結氣滿腹肚脹時時及加熱不用問神明此是分明訣察形證神色凡㸔小兒病疾先觀形證神色而切脉次之面青睛青肝之病面赤心之病靣白肺之病靣黄脾之病靣黒腎之病先欲别其五臓各有所主次㸔禀受盈􅃜胎氣實虚隂陽二證補過㵼多當敕其失兼五臓六腑表裏有各相應配若能明其標本則神聖工巧自然有之察形證歌搖頭揉目肝熱生風䏧淚减明三焦積熱鼻生清涕肺受其寒頰赤靣黄風傷肺熱霍亂吐逆胃積氣傷㵼痢不常氣攻腸滑靣青呵欠驚風𫝊肝盗汗頻頻臟腑熱傷寒戰驚搐風盛發狂胃熱生斑氣傷冷厥長吁齒齧風盛氣生上竄搖頭涎流胃熱肺壅氣傷咳嗽咯血涎盛發􅋜積傷風熱小便淋瀝熱聚膀胱疝氣因啼胎中積結妳脾痞癖因物所傷喉閉丹瘡肺之受熱愛吃泥土脾臓生疳嘔逆痰涎蛔蟲上出鶴膝解顱因風腑熱熟審而用細詳使藥病證疑難逆證似順順逆有别隂陽不均證候相加色脉致亂惟驚風發作按脉察證以較之陽候證脉俱得其陽陽者順也隂候證脉俱得其隂隂者逆也陽候有隂脉者其證欲𫝊隂候得陽脈者其證反是也謂有急驚風乃是陽癎得脉浮數洪弦陽中之陽又有得脉沉緩陽中有隂慢驚風乃是隂癎得脉沉細遲弱隂中之隂又有得隂太隂中有陽所言逆證似順乃謂隂中有陽助陽不醒囬陽不生其候偏虧雖則隂中有陽其陽非真脉使疑二不可攻理詳而知之察其可否而後已隂證反陽小兒傷寒惟察表裏而理之不以隂陽證候究竟者盖無関前関後之脉所謂純陽之孩合而言之此説驚之隂候慢驚是也凡兒吐㵼疾作慢驚其候無反證良由急驚𫝊來已成隂癎藥用寒凉證入慢脾藥用燥熱其候反陽者反從陽也其脉愈盛其證愈逆故云反也隂陽俱壊實謂難治醫工不知所似但見其搐搦肆意退熱截風良乆怯不引搐但只合眼即醒醒如睡證候有如此何藥理之隂盛強陽慢驚風候謂之隂盛及其欲絶之時虚痰上攻咽喉引其呼吸粗大其脉浮數其證強陽得之醫工將謂陽回以得其所宜與下痰藥用大迅痰涎随藥而下兒命随藥化衆言醫殺之非也謂不識胃絶而用之雖不下藥亦死矣虚極生熱疳疾有作斯證初發即證疳氣次第𫝊至疳極是謂虚極之後隂陽二氣不均上下氣不升降榮衛兩虚臓腑滑泄豈可攻療善醫疳者随順藥餌以助之淡薄飲食以扶之榮衛始得均勻氣脈方得升降既而隂陽二氣已得調和臓腑已自充實肌膚已自肥壯醫已知工疳𫝊虚候名作疳極遂與補氣藥服之稍多及生大熱所謂虚極勿補熱盛煩渇疾作疳勞名曰丁奚皆由藥助虚極生熱而致之也冷極必寒癥積已作證候所𫝊自是孩童飲食不化氣滯中脘再食停氣復傷前積積之為病皆致其冷冷之既乆脾胃虚怯既在隂陽相勝寒熱間發痞癖有加脉氣無定醫工不理隂陽令其匀平但作疾瘧治或投磁或投栁利下大速疾不去根為患反重難施利劑良由動利臓腑虚必復發作煩燥腹肚脹𦂳氣喘短促難以調治此等證候究心無忽保全是幸熱多作燥熱分内外身藉隂陽一氣受邪三焦致熱三焦者本質無狀隠伏得名所通五臓六腑相𫝊血脉皮毛温平由實燥熱由虚静則為一名動則分三所上焦喉管至于中脘下焦至于丹田以大拇指展中指作一掘自咽喉坎處分作三停則知上中下三焦所寓也温極則熱熱盛則焦寄于其中矣大人患猶尚不可况小兒三焦隠伏熱多作熱寒凉之藥所投不堪畢竟當從何劑調理若不早療疾作無辜理虚致虚虚則作疾實亦是病按實理虚遣病去疾内知其冷熱外審其證候三實兩虚神不安居三虚兩實人有得失虚之為病其候則速實之為病其候則緩實未致害虚則作禍迅矣肝心脾肺腎子母相生肺肝脾腎心五臟相尅且如脾胃經虚嘔噦不食又心氣不足驚悸有所療子母俱虚小便閉澁利之可乎所以知其内者母虚靠子實子虚藉母榮又肺家有熱宜㵼之否大腸滑利宜温之可醫工但究母虚理其子實若攻其子則母亦虚所謂母能令子實子能令母虚脾病㵼心理實致虚矣利表傷裏傷寒豆疹皆論表裏二義不同所受及是傷寒所𫝊從表入裏豆疹所發自裏出表作熱形證與傷寒頗似醫家不究輕重所受所干與服外麻葛根湯或過劑餌飲其表裏已觧其汗不止出汗過多裏虚作渇且熱乗熱悉化疹豆自然廻出縁逐其熱利其表遍出雖多疹亦不成豆亦不是比比小赤由其熱力且有限裏外不相續榮衛不加助于中道而廢漸加黒䧟非食毒感風之咎自是助發大過失其自然之理至死莫知其由是謂表裏傷寒故也退熱作渇小兒發熱一證與大人同熱在三焦方渇肺驚不利虚煩方渴上盛下虚方渇水火不相濟方渇伏暑藴熱方渇津液燥竭方渇渇證本無但有其熱熱在于表攻動其裏裏自無熱受之以虚表熱𫝊裏反致其渇表裏俱虚引飲入脾頭靣手足受濕虚浮作腫醫工下之徒増其病宜與扶表救裏庶幾有命痰驚發風有痰者必有熱随之有驚者必有風繼之利其驚風必有散其熱即痰不生此醫者流所得其宜調理證候截風定搐以除其惡也常見豪貴家才見孩童有熱不問元因便投驚藥日輙數粒月既積多雖則驚悸不作忪恐無妨其兒所服寒凉藥多脾胃虚弱不吐即㵼遂成慢風更與驚藥愈加其疾調理醫工當究之也風痰隠乆風者肝受之肝稍不和則風所由縱痰者脾受之脾若不壯則痰所由盛痰之與風驚之與熱四證在馳在流行則經絡𫝊變它疾風痰由襲乆而不化隠在肝脾所由飲食冷熱相干不散雖則療理愈而復作以至長成且風痰常在牙頰之間吐如無盡生發有因或作䩓鞈或喘息或硬牙関或腫頥頰臨于肺則咳𠻳干乎心則恍惚善術醫士未能速下其痰恐風猖狂者逐其風又疑痰作梗湏是風痰並化妙藥竒方蒢漸减瘥可也食不禁戒服藥無攻若療風痰可不致緩乆則發疾亦深究之驚熱無時因驚而得熱其熱常發不擊乎心而属乎血更加氣血榮衛母得備還驚熱時常發作或生疥癬或發瘡痍熱來神困心虚熱去唇焦口苦舌乾求飲恍惚忘飢兒孩受此艱辛藥餌如何救療人参𦍑活蝎尾當歸之類緫不相関更尋妙餌可也恐悸喘息驚悸心属喘息得同而言否愚曰非心主之若心所受其疾不作喘發是知肝藏䰟肺藏魄魂魄不安恐悸傷乎肝肺受其驚而受其喘湏求水飲肝受其驚發喘細細若張口大喘者肝肺俱不利鎮心安神調氣定喘未必盡善當于損益魂魄丸散㵼心補肝竟切効食噎咳逆兒孩睡息魂魄恬逰擊響髙聲傷乎其神睡中不穏乃心不寜乳㓜飢渇飲食宜細掇物觸志傷乎其氣令肺作噎肝脾發噫其氣逆升降其志不分伸舒隂陽差忒胸襟欝悶良乆取氣發聲含飯靣黒啼哭聲焦輕則咳逆致燥盛則咽塞不通所受之後常作欬逆者良由食噎觸擊悶挫関竅宣通臓腑即宜升降榮衛乃利逆若不早治欬逆肝腸終其身致疾而難療矣令子無辜夫人所藉者隂陽而生所宜者氣血而長血氣不順則五臓以違其和隂陽不均則百脉亂其體流之於表裏相恭注之於經絡致急凡周晬乳兒等閑捉拳又挖齦身體檢束頭目揺動此乃隂陽有虧榮衛失正即名胡孫禁十二種無辜疾之一也母情不識見之喜笑復作體態教令致其然也乆而不已則其病漸至風痰之所攻驚熱之所作也當遍舒其氣調其脉均其隂陽適其洒淅受氣不促三才降氣數成方謂為人萬象論功道合始知得志胞胎既偹心定神全血脉未充骨萎髓薄筋力藉乎骨體智謀出乎心神為人恍惚者斯可知多忘者應由是傴偻者乃然侏儒者必告此不及受之重者身負五軟大過受之深者身負五硬由其脾肺心肝腎所属者氣血脉筋骨所受者體舌臂項膝其或有疾于證候不及議者往往無辜無辜形體必定受氣不足謂知五硬五軟只許聞名稍有永醫難著後進執謂堪與療理者野老付之一笑飯多傷氣㓜㓜未降形處胞胎藉母氣血滋䕃由如養素已誕之後繼時吻之以乳乳者化其氣血敷養肌膚百脉流和三焦頥順身體漸舒骨力漸壯三周所庇一生為幸其或母因産得疾血竭氣耗乳不成汁當召妳子㸔顧貧乏之家食不繼口奚能講此其乳少其食多不益兒體其有不産之婦抱㓜繼宗終夜號啼惟飼飯食初傷其氣次傷其神重傷其命萎羸聲靸躁皮皺項軟足垂唇焦骨劣再過半載時光則兒氣散神敗凢人生子吮乳為正獨以榖食扶持十中未保一二抑服圓散强為勉之急吮乳䕃始得死中半活矣臍腫受熱初生未及䕃乳洗能便用斷臍帶留一掘綿褁三重受氣根全者其臍自深成胎數闕者臍自突臍者受質之根也為人之本也形體之基也元命之夀也迭月之前一臘之後其兒臍紅髙腫不作水濕亦無風候但將胸堂仰起呃呃作聲闔家無見責之老嫗有傷臍帶致之非也召愚一觀察知心氣受之胎熱與利丁火少頃不展胸堂呃聲遂止越宿視之臍根復本醫工與𫝊及洗搃施謬妄故書于褚果其宜哉謾峯頥以誚之云耳治中受病諸證鬼胎婦人産育有患病胎者痛鄙婦人納鬼之氣而受實非也鬼胎者乃父精不足母氣衰羸滋育涵泳之不及護愛安存之失調方及七八箇月已降生又有過及十月而生初生胎氣血虚羸降誕艱難所言鬼者即胎氣怯弱榮衛不充致子萎稍語猶如菓子結實之時有所䕃藉不到灌溉失注為物褊小其形猥襄無有可援如此之謂胎氣怯萎常與丸散扶挾乳哺勻調氣血充䕃腸胃固壮筋骨即保其盡善盖由受氣不足禀賦不全忽爾横殤非可惜邪魃病小兒有患病魃者非五臓𫝊變亦非六腑所主也縁兒生後方及周晬母復有孕血氣所䕃分之兩端是故胚胎漸傷乳汁成毒虚邪相攻兒吻致疾歛率其氣欝傷其神魄令兒疳虚尫羸枯悴煩躁朝昏嘔噦日夜啼哭不可得療但速斷其乳温平胃氣和順血脉自然而愈其有萎怯致痰乃成無辜證巢氏病源云小兒被鬾病者婦人懐姙有鬼神導其腹中盖嫉妬所致或服邪藥令小兒鬾病也姙娠婦人不必悉熊致鬾人時有此耳鬾之為疾頻下痢寒熱往来毛髪􅀢鬡情思不悦是其證也千金又論鬾曰小兒鬼也凢婦人先有小兒未能行母繼有胎姙鬼未節乳漸覺羸痩骨立毛髪稀黄不長時作壯熱大便不勻乃鬼之症也胎氣初生牙兒三朝之後滿月之前所受諸証作疾輕重不同者盖由胎氣禀賦有强弱其母飲食恣令飢飽起止無忌坐卧不擇令兒得疾不寒即熱不虚即怯熱乃作壅寒乃作泄虚即作驚怯即作結寒則温之熱則凉之虚則壯榮怯則益衛驚用安神結用利詳審用之不必過劑胎病牙兒胎病謂月數將滿母失護愛或勞動氣血相干或坐卧飢飽相役或冷熱飯食相制或恐怖血脉相亂胎氣有傷兒形無補或因動土興工或由榮葺房卧或移安居或更薦席雖不犯㓙神惡煞終干礙子體兒身有因如此得疾者乃成終身疾者斷不可醫初生㓜㓜又被干邪即時和順調理胎病作熱兒在胎中母多驚悸或因食熱毒之物生育之後兒多虚痰氣急短滿眼目眵涙神困呵欠不發伸舒呃呃作聲狀小便不利或通利即有血水盛則手常拳緊脚常搐縮眼常斜視身常掣跳皆因胎中受熱宜速與大連翹飲子觧散諸熱次與消風散數服無恙胎氣藴熱兒在胎中母多惱怒欝悶之情不散又因胎氣燥濕兒生艱難母生驚悸是致乳汁不可兒吻成毒故作熱令兒食即嘔吐眠不定席神不安穏聞響即掣若不觧藴毒熱相干乆作無辜成疾害生先宜順氣次服四順若不安愈葱根必効胎病風熱兒在胎中母常喜食動風之物熱毒流𫝊致兒之疾隠在經絡則手足拳攣注入血脉則肌體枯槁其兒眼常喜竄血不䕃心神不守舎怯人怕物視作定目若不早療恍恍惚惚形體雖長情性乖拙為人多荒朝記夕忘雖乆受病不如無生盖父母但知惜其嬌姿安養無用之兒如此者凡胎氣服藥須用詳細若以常方難治胎病驚熱兒在胎中母因驚悸驚氣入胎兒當受之生育之後其兒精神不爽顔色虚白初則温温有熱其後頰赤饒驚物動則恐響即悸若不綳抱安床取次難為調適既有胎驚將傳胎風之候産母謹謹忌食一切熱毒之物若作尋常畢竟難治是盖血脉柔弱臓腑虚怯不堪重劑何可攻擊是使智者怯懼若輕受熱已有散即於項上生癤其大如拳名曰驚癧湏當破之而後合之勿傅毒藥恐傷肌體不惟傷壊深恐為禍胎病風痰兒在胎中母喜食熱毒之物熱即生風脾肺不利遂有風痰雖不能損肌傷體其痰與風相襲痰多風不散熱盛痰復生風痰能作熱更加暖被紅爐母食炙煿淹藏動風之物即時害生藥非不驗乳汁之咎也如兒或患風痰不必下截風化痰藥但清心肺凉膈利順三焦則自然安愈亦不可太凉恐寒傷臓腑宜以消風散吞下白丸子至凉冷小作丸胎病結熱兒在胎中母失調理恣縱飲食不加將護藴熱頗乆及至生育熱氣隠蔽𫝊入於裏遂作悶結由熱極得之大便不通熱衝心腹脹臍突撮口努力停欝急以三黄丸或四順七寳以通為度不必過劑切不可下積丸子藥不惟無益恐反為害胎病寒邪兒在胎中母因感受寒邪熱氣煩蒸𫝊入胎臓兒當受之及至生育令兒関竅不通精神昏濁作熱加蒸啼聲不響號呌駭人未知之者將謂驚風妄動臓腑或妄鎮心良由所受寒邪初只在表乆則傳裏邪氣亂真血脉皮毛皆不得其便腠理所拘邪不得觧變蒸有違氣血致傷煩懆益増無能自暢但與小柴胡湯服稍輕次以人参𦍑活散然胎中所受未分表裏既生䕃庇當議和觧為良胎病榮熱兒在胎中母喜啖薑𤓰古人有云修竈缺唇食薑餘指盖薑性至熱又是燎藏攻及血脉𫝊入於經則令兒遍體生蛆瘡延毒熱瘡丹瘡之類經年發作或於頭額生核重則大發癰癤潰則爛壊皮膚十死一生何堪忍見初生㓜㓜毒氣加盛肌肉柔弱参术托裏互相扶持常與清心平調血脉母慎其口父抱令暖醫工順理與扶其危胎病衛熱兒在胎中母傷和氣飢飽勞役神疲力倦否則憂愁思慮役乎其中動乎其氣攻以隂邪干亂心魂流入胎臓兒乃受之既生之後兒常昏困腹急氣粗重則喘急睡卧不穏狂啼煩哭肌肉不滋遍生瘡痍身熱早晩精神少具宜平調臓腑臓腑既正熱自散止胎病臓寒兒在胎中不理其身母喜食諸生冷物過度冷盛既寒腸鳴泄利時時有作生育之後兒腹青脉膨脹虚緊乃是虚氣入腹呃呃作聲日夜不禁雖則漸長終是臓腑隂陽二氣受不匀調若不温平分氣長成痞結陽結易治冷結難醫誠宜母服藥庶乳温令子調和胎病潮熱兒在胎中母曽發作子瘧或是因患瘴氣母或飲酒無厭或是胃風傷暑經絡榮衛為熱所傷母雖分娩以脱其難兒襲其氣隂陽不分初生嫩弱血氣不和作熱潮來先寒関𦂳身體作顫庸工未識其理即以艾炷灸之未免有傷經絡但與調中均其隂陽便可漸安急驚風候醫云陽癎也手足搐搦涎潮大熱醫家下之往往利以輕粉或水銀巴豆此等毒藥雖已㽔省精神猶尚昏沉未快乳食者或有餘熱其候欲得安痊平和只可用平穏藥調胃氣不可便與燥熱藥若與服之其候復作矣小兒驚風之後胃虚不食助胃生氣以截風藥移狂生胃散或觀音散中加用全蝎天麻殭蚕白附防風𦍑活之類生薑􅀥子同煎自然胃壯㵼止諸風不作雖則驚熱及搐搦皆去其精神未爽不可便謂無事若用補藥助虚乾薑豆䓻硫黄附子之類則熱復來其候又發凡治急驚之候正謂醫療豈可􅃍云調理用藥乃在一時之乆若少寛緩症候轉加深重醫者既知當下即可量其輕重如病五六分只下三四分許随通且利熱去痰消則病徐徐减差不揣度一槩并湯下之太過傷害臓腑痰轉隂候乃作驚風候豈可臨時生胃囬陽慢驚風候醫云隂癎也良由急驚用寒凉之藥太過轉加深重𫝊作慢驚或因吐痢不止而成慢驚或因澡浴感風不觧而作慢驚或因風食二癎不治而變成慢驚或因咳嗽下痰轉虚而成慢驚因由甚衆槩而舉之病家怕驚不怕㵼良醫怕㵼不怕驚其㵼不止驚風愈盛若與治驚更用寒凉之藥且㵼轉多病加進重矣小兒脾胃虚怯方作吐㵼其証有五有熱吐冷吐淹虚吐痰吐食所言熱食吐者謂母飲酒吃肥炙􅏼藏或胃風傷暑致熱兒吻乳入胃遂成熱吐冷吐者謂兒胃冷加以宿冷之物與食即吐虚吐者其兒肌熱神困疳積未消胃堂久虚即吐痰吐者其兒胃氣本虚復感寒邪生痰作熱留滯胸膈故吐食吐者其兒胃弱飲食不節強食傷脾作熱神困吐後即逆病家但知其吐不明所以且吐兼㵼作其名曰霍亂其吐後又推輕重有五初則乳自流出謂之哯哯之不已即謂之吐吐之不已即作嘔嘔之不已即作噦自嘔逆噦皆冇出聲動氣嘔者口開而作逆者心胸上下氣逆欝築噦者無物可出即膈虚胃寒引噦噦作聲此等候惡湏臾證變即慢脾風熱者吐先去風痰冷吐虚吐與生胃氣痰吐即與下之次與正氣食吐宜與禢氣豈可一槩理之吐㵼不止脾虚風生眼開慢驚眼合慢脾治之不當更下驚藥旋腫而死豈可得而塌療兒分長㓜病察虚實有吐㵼三五日發風者有一日半日而發者大抵女孩以吐為急男以㵼為速若虚暴吐才作便得之惟有疳㵼不成風候乆則患無辜証終于虚乏驚藥及寒凉之藥切不可用亦不可用大熱藥其候乃属隂證小兒熱證古分十種為緫例有驚熱疳熱風熱潮熱傷寒熱瘧熱積熱丹熱瘡􅐄熱餘毒熱十種熱證病各不同已有觸類而作潮熱者即痞癖熱也類近積熱證先腹肚熱脚冷者是傷寒熱與瘡􅐄熱亦相類且傷寒有三種皆從表發入裏瘡􅐄随五臓所受從裏入表故不同根風熱與驚熱亦相近疳熱與餘毒熱類疳有五證瘧有五候皆由脾家隂陽不順若驚熱盛即風熱作丹毒熱有類種皆五臓熱毒所作自上發下曰毒自下發上曰丹毒各随輕重又有一種名曰龍帶横腰過肚上或至胸前相交者重有如火燔其候亦同丹治病候餘毒熱諸證皆有之適輕重類諸證而調觧不可越前病用藥如傷寒後有餘毒熱則於傷寒調理下而觧餘皆倣之大抵驚熱凉之風熱化之疳熱補之潮熱散之傷寒熱觧之瘧熱分之積熱利之丹熱消之瘡疹熱甚表之諸證餘熱皆和凡證不可便下盖小兒得病皆由身體柔弱中来雖有外感冝先和脾調胃令其充實後以藥下之方保無虞若積症已作可先下而後與調胃藥服之然下藥一應即止不可太過太過則傷脾胃反致病重也惟痞癖證定宜先去寒熱寒熱已去方可用下總以通為度下之太過反生重熱雖有重熱即不宜用凉藥宜以調理胃氣藥與之尤宜深究小兒傷寒正受夾驚夾食正受傷寒所由冷邪感于胃傷于腠理輕則傷風重則壯熱頭疼鼻塞流涕斯乃正傷寒候又有傷風傷暑傷冷傷濕皆能作熱困乏但不咳𠻳又有因驚之時而傷寒故云夾驚又有因食之時而感寒氣者故下曰夾食大抵傷寒或有它證以積之類切不可妄者下之太早表裏俱虚難以調理謂之壊證大人壊證由尚可藥小兒壊證救療無門凢傷寒有驚候亦不可下藥雖夾驚又有不可用驚藥㓜㓜傷寒只可觧表雖曰用表不可令兒汗出如王氏曰杜薄苛散和劑方四人参𦍑活散之類若熱在裏讝語煩躁于證當下只用散末藥七寳洗心散四順飲犀角飲之類不可用丸子或以取積藥下之其熱不去反成無辜夾食者于理用下宜以紫霜量虚實兒用湏問先傷寒後夾食後傷寒然傷寒夾食乃在于食時之間惟母覺知其先後多是不覺若知之以後受者先調理之既不明其先後即解表可以扶裏此法為尤善也且下與表二不可並行且如三日前在表三日後在裏斯乃犬槩約而言之恐後人傳之不當反為其後凡傷寒在表即觧在裏則下不可以日限為拘其或有在表裏之間亦宜和觧如又不愈小柴胡湯治之又不愈候𫝊裏下為良大者讝語小即煩啼切不可意急取愈宜在用心明究表裏小兒積證積證最為要𦂳病家將作尋常醫者不急治之反至𫝊變方覺困重東漢王氏不言疳與㵼及痢即還證而已所以治未病之病凡小兒自㓜及長不患驚風癎痙癲痙有之矣未聞無患積證者五臓之所積名曰積六腑之所聚名曰聚且小兒只理五臟受病故不有大聚證者六腑属陽雖有疾不治而自愈且骨属腑氣生于漸乃脾胃主有疾當治之臓属隂治之尤難調治四季有積欲調理之皆可用藥但當究其虚實然後利之既有積氣不能全實説量其輕重故古人有拔積療積消積化積無積之小兒有患驚風痰熱四證如何用藥小兒有熱熱盛生痰生驚驚盛發搐又盛牙関𦂳急及盛及眼上竄痰涎擁牙関𦂳風熱極閉經絡即作搐搧涎擁胃口悶亂不省才入中脘手足拳攣関竅不通百脉凝滯有退熱而愈者有治驚而愈者有袪風而愈者有化痰通関而愈者皆是依證用藥不可不究其所以凡病在熱不可妄治痰病在驚不可妄治風病在痰不可便治驚病在風不可治搐凡治小兒病在驚由痰熱痰只可退熱化痰其驚自止病在風風由驚作只可利驚化痰其風自散病在痰涎急湏退熱化痰若有搐湏用截風散驚若意急雖治驚痰不化熱何以退驚如何自止化其痰熱若不退風亦不散痰如何去是知不治之治所以治之小兒泄㵼除疳㵼為虚熱餘㵼皆臓腑虚寒怯弱得之小兒臓寒腑冷大腸不禁緫謂之㵼分别輕重究竟緩速者有溏泄有滑有利有洞五者不同豈可一槩而理溏者糟粕不聚由其尚濃似㵼非㵼泄者無時而作或出不知利者直射濺溜氣從中脱滑者穀食直過腸胃不化洞者頃然下之如桶散潰餘更不留即知其兒臓寒腑冷㵼之作疾其來緩速輕重可知凢児㵼糞出青色者盖脾受肝經所制肝属乙木能尅土所勝之氣故見本質由其臟之虚寒非謂驚也又㵼初黄良乆變青色乃臓之㣲又㵼藥物直過尤寒滑凡虚滑三五次即困乏若不急與温其臓調其胃平順三焦和正榮衛不爾即慢驚證候𫝊變𫝊如此之急欲以止㵼藥次苐理之往往不及惟務温其臓腑臓腑既温寒何能留于腸胃之間或以熱藥頓止則熱及為他疾湏先投澁腸藥然後生胃正氣與服切不可意急過劑投之熱藥也稍或臓腑至虚孩童困乏四肢軟冷者是胃逆證當用黒附子白术乾薑量輕重而用凡投熱藥㵼止則痢作無疑小兒痢疾醫云五疳八痢究其理種數多端輕重不一痢者利也痢之為痢無積不成反至積化成痢且厚脾胃亦虚即不可便下善治痢者生其胃温其脾其腸和其氣無不愈也若成痢疾故不可下下之反虚作渇浮腫痞滿脹急不食亦未可便補補則傷熱能令脱肛切與禁却一切毒食之物頻與生胃謂赤或氣或白即是冷熱不調或受暑知温即與分隂陽氣利水榖道若裏急即與厚腸胃肚痛即與和順氣温臓或化白者乃積冷毒加之即挨其毒却與温其脾胃其痢自止凡痢疾能飲食可治不能飲食疾名噤口主不食而死又有毒氣侵胃口亦不飲食或急痢疾因食毒物下攻腸頭觧血頞汗肛脱㵼下惡物可畏腹肚㽲痛裏急後重名曰滑腸此三種痢疾最為惡疾乃是十二種中皆能𫝊受而作此疾凡言小兒美飲食者飲謂飲乳食謂食飯若病中能飲水漿喜食菓子魚肉之類者亦助其虚不能令臓腑充实湏是白粽子爛煮飲可矣若以葱粿䊦粘膩不堪脾胃之物尤其增困㓜者吻乳尅化漸安五臓平和六腑調貼然後隂陽自均氣脉自壯丸散湯劑不必抑之或有餘毒宜以順調緩助不可攻之又有時氣作痢薫習相染而或由天氣晴雨不常隂濕冷熱相干腸胃糟粕不聚遂成其疾腸肚疞痛裏急後重他藥莫治者宜服木香黄連地榆川當歸白芍藥赤肉豆􅅳為末蒸烏梅肉丸􅀥子湯下三五十丸如麻子大加减神良小兒疳疾證數端其後不同發作不常治療不一方論不等輕重斟酌随宜設方必有可理者疳者甘也疳因脾家有積虚而致其積不可復食粘膩甘甜生冷炙􅏼之物故名曰疳初作名疳氣皆飲食不莭生冷相投積傷乆滯不化而得之乆則疳氣𫝊于五臓𫝊足名疳極候腹大候雖食不生肌肉作渇煩燥名虚候時發潮熱盗汗常有名疳勞候如手足無肉者多名丁奚候自丁奚翻食吐蟲虚熱來去名曰哺露十嵗以下曰疳以上曰疳勞治勞之理悉不用疳藥盖疾作傳足非常治疳之法理其氣虚助其血弱調令脉壯消其蟲子散去疳熱和順三焦無由用急力攻治不可勉強投藥只可對候而設不得過劑若冷藥易動臓腑躁藥易損三焦審察端的丸散随其輕重無所失矣小兒諸證悉皆着載方藥調理發度惟有咳嗽一證究莫能盡月内牙兒難醫百日嬰孩亦難調理所言牙兒及嬰孩咳嗽難治者盖為初生血氣㣲寒弱五臓未充身體未周應變應蒸未周之兒所感邪攻及腠理表裏相干邪正相勝隂陽未和不可強主攻治妄主吐妄下妄汗補皆令兒疾轉盛不惟無益甚有害傷㓜㓜咳嗽乳母之過丸散狼虎醫人之罪豈特牙兒及孩童難為調理小兒有咳嗽未許一二服藥便見安樂雖傷寒傷風證候已歸半復且咳𠻳尚作大抵究竟小兒咳嗽先㸔有無熱與痰有熱在表無熱𫝊過是未𫝊痰稠熱盛痰壅即吐宜服補肺散人参伏苓麻黄白术杏仁甘草阿膠訶子地骨皮桑白皮桔梗有痰加半夏風熱加防風天麻服之自然痰化熱散咳嗽漸愈未可直用麄澁藥白礬南星石膏雄黄砒粉之類宜先滋潤脾肺次用王氏金華散少少時時與服或以白丸子加雄朱腦子随大小作丸凡兒患嗽湏究表裏未可以動手便攻若用金石藥直入胃脘乃成提脾風候手足勿曲又何所益巴荳輕粉砒霜藥下之腸胃不禁湏㬰成風亦何所益只用温平與表順助其氣滋潤腑經和順三焦其痰漸化其熱自退不必攻醫所謂理𠻳宜且補氣化痰即生胃氣胃開氣壯即𠻳漸减胃正即痰不生肺滋即嗽不有然小兒氣弱其嗽作熱與大人一同而用藥調理實不同又有時氣咳嗽謂天時冷熱不同㓜㓜虚怯受患者表其𠻳曰夜不輟或吐或喘痰熱壅盛至重者利之即愈謂用大黄朴消枳實陳皮半夏人参厚朴柴胡心神煩悶胸膈不快方冝與服無熱與痰亦可不下審小兒得病之源大喜後乳食多變驚癎喜属心大喜後乳食則傷心錢氏云心主驚驚是癎也素問云暴大飲後迎風多成暴厥大飽則食氣上衝心肺之間未散卒被風冷所傷故暴厥不醒如中風之狀脩真秘訣云熱食汗出盪風發痙頭疼多腫大驚後乳食嘔吐心痛大驚後乳食則手少隂經受邪多成心痛抱扑子云夾驚便食多成心痛心主驚故也大驚飲食氣節不通或吐逆翻胃大驚後飲水乆成不語心主驚驚後飲水則傷心心氣通于舌舌本無力故不語也亦能成水痢癖寳鑑云小兒水痢癖者因飲水兒被驚則成也當風乳食兒成吐嗽腹膨倉公云小兒飲乳迎風風冷入肺則令咳嗽又經云形寒飲冷則傷肺肺傷則咳嗽肺主氣氣傷則腹脹當風飲水成雀目青盲素問云風氣通於肺當風飲水則水停於肝肝氣通於目故成青盲雀目也寳鑑云小兒飲水乆停肝翳障全生辨物難夜裏不明為雀目青盲晝夕一般般夜露下乳兒多成嘔吐夜露下乳兒隂氣入咽冷乳不散多生嘔逆脩真秘訣云夜露食其上有邪氣夜露下飲水多成洩㵼素問云濕勝在内攻於脾胃脾胃受濕則水糓不分水榖不和故大腸𫝊道而乃注㵼也正食便乳成疳黄口臭王氏云正食便乳令兒口臭牙中血出通真子云乳食並食令兒面