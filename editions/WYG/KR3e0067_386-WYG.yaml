body:
  text: 普濟方卷三百八十六明周王朱橚撰嬰孩諸熱疸腫門熱渴夫小兒血􅂔本自盛實腑臓之間易於生熱􅂔熏蒸液津乾枮故令兒渇而引飲方天麻人參煎治小兒上焦風熱熱渴引飲不止天麻人參白茯苓去黒皮各一分天竺黄研一錢甘草生用一錢鉛霜白研一錢龍腦研半兩丹砂研一錢右將先四味為細末再入研了四味和勻煉蜜煎為膏每服一大豆許用金銀薄荷湯化下枇杷葉湯一名香冬散治小兒上焦虛熱飲水不止枇杷葉去毛炙葛根胡黄連甘草炙剉𤣥參麥門冬去心焙各等分右粗搗篩每服一錢水一盞生姜一片煎至六分後入蜜少許再煎至五分去滓放温二服食後服之苽蔞飲治小兒熱渴或虛熱吐下除熱止渴苽蔞三分黄芩去黒心一分知母焙小麥粟米各半兩右除粟米小麥外餘為粗末每二嵗水一小盞入小麥粟米各一撮同煎至六分去渣分作三服一日喫盡量兒大小以意加减麥門冬散治小兒夏天服藥大下後胃中虛熱渴唯飲水麥門冬去心焙龍胆各一兩甘草炙剉黄芩去黒皮各三分葛根剉一兩半右粗搗篩每服一錢用水七分煎至四分去滓温服量兒大小以意臨時加减黄連飲治小兒多渴黄連去鬚半兩冬𤓰瓤一分右細剉水一盞半同煎至八分去渣分温三服量兒大小臨時加减蓮實湯治小兒熱渴不止蓮實三十枚炒黄細研浮萍一分右用水一盞生姜少許煎至五分去渣分温三服量兒大小以意加减黄蘆散治小兒熱渴不止黄連去鬚炒蘆根右細剉水一盞半煎至五分去滓旋與服治小兒熱氣熏蒸臓腑煩躁津液枯渴欲引飲方右取桑枝一握細剉水一盞半煎至八分去渣分作三服加熱水與飲治小兒熱渴不止右用葛根半兩細剉水一鍾煎六分去渣頻温服治小兒渴不止蘆籜扁豆藤各半兩人參一兩去蘆右細剉分為六服以水一小盞煎至五分去渣不拘時候量兒大小加减稍服治小兒煩熱渴以方諸向月取水飲之葛根湯治小兒體熱煩渴者尤宜服之葛根人參各一兩麥門冬白茯苓甘草澤㵼各半分右為細末每服一錢水八分入生姜二片薄荷三葉煎至六分去渣服寒熱往来羸痩附論夫小兒風邪客於皮膚痰飲積於臓腑使血氣不和隂陽交争故發寒熱往来也胃氣挾熱則消榖消榖則引飲食隂陽氣血不和不能充飬身體故寒熱雖能食不生肌肉也方鼈甲散治小兒寒熱往来腹脹漸痩不能飲食服之有效鼈甲一兩塗醋炙黄去裙襴柴胡去苗訶梨勒皮陳橘皮去白各三錢㯽榔三枚赤茯苓子芩赤芍藥當歸炒川大黄甘草炙各半兩右為散每服一錢水一小盞入生姜少許煎至五分不拘時温服量兒大小加减三服為度柴胡散治小兒寒熱往來乳食不下四肢無力心腹脹滿上焦痰壅漸羸痩柴胡去苗鼈甲塗醋炙黄去裙襴各一兩人參去蘆赤芍藥桔梗去蘆訶梨勒皮地骨皮杏仁湯浸去皮尖麩炒黄前胡去蘆陳橘皮去白甘草炙剉各半兩右為散每服一錢水一小盞煎至五分去渣不拘時候温服量兒大小加减五味子散治小兒寒熱往来不欲乳食羸痩心腹脹甘草半錢炙麥門冬半兩去心焙五味子當歸炒人參去蘆白术赤茯苓桔梗前胡黄芩各一分右為散每服一錢水一小盞煎至五分去渣服日三服更量兒大小以意加减人參散治小兒寒熱往来食少羸痩人參去蘆黄耆柴胡去苗白茯苓鼈甲塗醋炙去裙襴木香各半錢訶梨勒皮二分白术一錢杏仁一分湯浸去皮尖麩炒㣲黄甘草一分炙右為末不計時以粥飲調下半錢量大小加减服之馬通粟丸治小兒脇下有􅂔腹痛喘逆􅂔息難為往来寒熱羸痩不食馬通内粟細辛紫苑洗去土苗杏仁浸去皮尖麩炒各三分五味子石膏秦芁去苗白茯苓半夏湯浸七遍各一分右為末煉蜜和丸如麻子大每服以粥飲下五丸日三服量兒大小以意加减香甲散治小兒寒熱往来肌痩木香鼈甲醋炙黄去裙襴各一分㯽榔三枚川大黄陳皮去白柴胡知母甘草當歸各半兩洗焙右㕮咀每服一錢水一小盞生姜二片煎至六分去滓温服量大小加减黄耆丸治小兒往来寒熱多汗心煩小便赤黄不欲乳食四肢羸痩黄耆麥門冬去心焙赤茯苓白术黄芩甘草炙各一分柴胡去苗鼈甲炙去裙襴各半兩右為細末煉蜜和丸如菉豆大每服以粥飲下五丸日三服量大小加减服之訶黎丸治小兒寒熱往来頭痛嘔吐及乳癖訶黎勒皮木香人參去蘆赤茯苓桂心川大黄炙剉各半兩陳皮半兩湯浸去白皮焙柴胡去苗三分右為末煉蜜和丸如菉豆大不計時候以薄荷湯下五丸日三服量兒大小以意加减㯽榔丸治小兒乳食不節傷於脾胃致成往来寒熱時復嘔吐不欲乳食漸至羸痩宜服㯽榔丁香桂心人參去蘆各一分川大黄剉炙陳橘皮浸去白訶黎勒皮各半兩右為末煉蜜和丸如菉豆大不計時候以薄荷生姜湯研下五丸看兒大小加减芍藥散治小兒寒熱往来啼呼腹痛宜服赤芍藥寒水石黄芩當歸炒甘草炙剉半兩桂心一兩右為散每服一錢水一小盞入生地黄半錢煎至五分去滓不計時候温服量大小加减柴胡散治小兒寒熱往来面色萎黄柴胡去苗半兩石膏一兩川大黄炒麻黄去根節秦芁去苗恒山各一分右為末每服一錢水一小盞煎至五分去滓温服日三服更量兒大小以意加减莾草湯治小兒寒熱徃來不休不能乳食浴時避風乃愈莾草丹參各一兩菖蒲蛇牀子桂心各半錢雷丸一合右都剉以水五升煮至三升去渣適寒温以浴兒宜避風冷芍藥湯治小兒寒熱往來赤芍藥一分黄芩當歸洗焙乾柴胡甘草各一分右㕮咀每服一錢水八分生姜二片棗子一枚煎至五分去滓温服量大小加減秦芁湯治寒熱往來秦芁鼈甲醋炙㣲黄去裙襴川大黄㣲炒麻黄剉各半兩去根節竹茹甘草各一兩右㕮咀每服水一盞葱白二寸煎五分去渣服量大小加减草菓飲治小兒寒熱盗汗不思飲食面黄腹急草菓一兩厚朴二兩甘草棗子各半兩生姜四兩不去皮同杵淹一宿焙右㕮咀三歳一錢水半盞煎至三分去滓一方治五瘧夜明砂為末冷水調下半錢即效鼈甲散治小兒寒熱往来四肢羸痩鼈甲三分塗醋炙黄淡竹茹川大黄炒各一錢恒山一杏仁許大右為散每服一錢水一小盞入葱白二寸煎至五分去滓入麝香豆大煎一沸温服日三更量兒大小以意加减生地黄散治小兒寒熱往来啼呼腹痛生地黄桂心各等分右以水三升煮取一升週嵗以下服二合以上服三合一方七味有芍藥寒水石黄芩當歸甘草各半兩地骨皮散治小兒寒熱更作急體羸痩煩渴引飲不思飲食人參去蘆白术白茯苓去皮三味各一兩前胡地骨皮當歸洗焙陳橘皮甘草半夏麯桔梗去蘆頭七味半兩右件㕮咀每服二錢水六分生姜一片棗一枚同煎至四分去滓温服不拘時候寒熱結實附論夫小兒寒熱結實者此由風邪客於皮膚而内有痰飲積於臓腑使氣血不和隂陽交爭則發熱臟腑本實復為熱所乗則積氣在内使人胸脇心腹煩熱而滿大便難小便澀是謂寒熱結實也方柴胡丸治小兒寒熱結實或熱攻衝心肺氣急盡晝夜有汗日漸羸痩不喫乳食柴胡半兩去蘆赤茯苓一分人參一分去蘆木香一分桂心一分川大黄半兩炒枳殻一分麩炒甘草一分鼈甲半兩塗醋炙㣲黄去裙襴右搗羅為末煉蜜丸如麻子大每服温水下五丸日三服量兒大小加减服之大黄丸治小兒増寒壯熱發渴不定腹中結實不能乳食川大黄半兩炒柴胡赤茯苓一分木香一分桂心一分枳殻一分麩炒桃仁一分湯浸去皮尖炒黄㯽榔半兩人參一分去蘆頭右為末煉蜜和丸如麻子大每服以温水下五丸日三服量兒大小加减服之芒硝丸治小兒宿食痰癖寒熱臓腑結宜服之川芒硝半兩川大黄半兩炒甘遂一分半夏一分湯洗七次巴豆二七枚去皮心膜紙裹壓去油杏仁二七枚去皮尖别研代赭半兩右為末與巴豆仁膏一處研勻煉蜜和搗二三百杵丸如菉豆大五六嵗兒空腹以温水下一丸利為度鼈甲散治小兒寒熱結實脇下妨悶不欲乳食鼈甲半兩塗醋炙黄赤茯苓半兩川大黄一兩炒枳殻二十粒麩炒川朴硝一分右為散每服一錢以水一盞煎五分去渣温服不計時量大小加减五靈脂丸治小兒腹有積滯致生寒熱腑臓結實心腹氣脹食多少力五靈脂半兩陳橘皮三片湯浸去白木香半兩川大黄一分炒巴豆霜一分右為末入巴豆霜同研令勻用軟飯和丸如黍米大每服以粥飲下兩丸小兒一丸爽神湯治小兒清寒壅爽精神白术人參去蘆白茯苓各一兩桔梗𤓰根甘草各半兩辛細一錢右㕮咀每服一錢水八分入荆芥薄荷各少許煎至五分去滓温服冷熱不調附論夫小兒冷熱不調者盖為乳食乖度寒温失莭或隂陽相爭氣血不調致令冷歸下焦熱衝上膈若風冷入於腹胃則㵼痢不定或腹中氣滿或時嘔逆不能乳哺故謂之冷熱不調也方犀角湯療小兒冷上熱下熱上冷下難將息方犀角末甘草生地黄芍藥白术茯苓梔子各三分柴胡人參大黄生姜各四兩黄芩二分桂心一分右㕮咀水三升煮服一升分温服之木香散治小兒冷氣不調胃氣壅滯少思飲食木香一分大腹皮一分人參赤茯苓青橘皮去白訶梨勒皮桂心前胡半夏丁香甘草各一分右為散每服一錢水一小盞入生姜半片大棗一枚煎至五分去滓放温量兒大小以意加减犀角散治小兒冷熱不調或時下痢腹痛不能飲食犀角屑桂心甘草炙當歸炒黄連陳皮浸去白人參乾姜炮各半兩右為散每服一錢水一小盞煎至五分去渣日三服量兒大小加减訶黎勒散治小兒冷熱不調大便或壅或通不欲乳食訶黎勒皮半兩人參一分去蘆㯽榔一分木香一分川大黄半兩炒桂心一分川芎一分右為散每服一錢水一小盞入生姜少許煎至五分去滓不計時候大小加减温服赤芍藥丸治小兒冷熱不調不思飲食積不消赤芍藥三分桂心一分柴胡去苗半兩川大黄三分炒赤茯苓半兩鼈甲一兩塗醋炙令黄去裙襴右為末煉蜜丸桐子大二嵗以上粥飲化破三丸日三服如四嵗以上至七嵗七丸以粥飲下白术散治小兒冷熱不調腹内疼痛發渴不定白术半兩當歸半兩芎藭半兩乾姜一分炮青橘皮一分湯浸去皮甘草一分炙右為散每服一錢水一小盞煎至五分去渣不計時候量兒大小加减服之當歸丸治小兒冷熱不調大便青黄心腹多痛不欲乳食當歸炒人參去蘆白芍藥芎藭甘草炙白术各半兩右為末麫糊和丸如麻子大每服以粥飲下五丸日三服三嵗已上加丸數服之香連散治小兒冷熱不調腹痛下痢木香當歸㣲炒乾姜炮各一分黄連去鬚阿膠炒黄各半兩右為散每服以粥飲調下半錢量兒大小加减頻服木香丸治小兒冷熱不調腹痛不可忍或時寒熱下痢膿血木香一分芎藭當歸剉炒桔梗去蘆黄芩各半兩右為末煉蜜和丸如桐子大不計時候以温生姜湯研破二丸服之量兒大小以意加减赤茯苓丸治小兒冷熱不調腹胃滯結壯熱時作兩肋刺痛赤茯苓川大黄剉㣲炒鼈甲塗醋炙令黄去裙襴各三分當歸川芎各一分右為末煉蜜和丸如菉豆大每服以粥飲下五丸日三服量兒大小以意加减調氣散治小兒四五嵗腹内冷熱不調不能飲食白术人參去蘆甘草炙各三分厚朴一兩去粗皮姜製右為散每服一錢水一盞入生姜少許煎至五分去滓服量兒大小以意加减黄疸病附論夫黄疸以身皮皆黄者病也身痛體背强大小便澀一面目指爪盡黄小便如屋漏色看物皆黄渇者難治此黄疸也此證多得於大病後身㣲黄者胃熱也大人亦同又有面黄腹大食吐渇者脾疸也又有自生身黄者胎疸也古書云諸疸皆熱色深黄者是也若淡黄兼白者胃怯胃不和也黄疸者由脾􅂔實外有温􅂔乗之與胃合候變生熱盖脾色主黄胃為水榖之海熱摶水榖氣藴積成黄薫發於外身疼轉背强大小便澀皮膚面目齒𤓰皆黄此或傷寒或温病皆由熱不時觧而入於胃也宣利者易治澀者難治宜服五苓散加茵陳煎湯㸃又宜服導赤散加茵陳煎或身熱宜服小柴胡湯甚者承􅂔湯效陽明病無汗小便不利心中熱壅必發黄凡發黄其寸口無脉鼻􅂔冷並不可治凡發黄而下痢心腹滿者必死診其脉沉細者亦死又有百日半嵗小兒非傷寒温病而身㣲黄者亦是脾胃熱忌不可灸也灸之則熱甚此是將息過度所為㣲薄其衣數與除熱粉散之自歇不得妄語湯藥服及灸方犀角散治小兒黄疸一身盡黄者犀角一兩茵陳𤓰蒌根升麻龍胆草甘草生地黄各半兩寒水石三分右白水煎服一方治小兒忽發黄面目皮肉須盡黄𤓰根汁和蜜服茵陳散治小兒黄病身如橘色茵陳川芒硝各一兩梔子仁川大黄炒黄芩犀角屑木通剉寒水石各半兩右為散每服一錢水一小盞煎五分去渣不計時候温服量大小加减㵼黄散一名加减黄連散治小兒體熱胸膈煩滿皮膚如潰橘之黄白晴亦然濕熱所致也并治痿獨取於陽明證也加减㵼黄散主之黄連茵陳各五分黄蘖黄芩各四分梔子茯苓澤㵼各三分内經曰土位之主其㵼以苦又云脾苦濕急食苦以燥之以黄連茵陳之苦寒除濕熱為君腎欲堅急食苦以堅之故以黄蘖之苦寒除濕熱為君腎欲堅急食苦以堅之故亦黄蘖之苦辛寒强筋􅇧為臣濕熱成煩以苦㵼之故以黄芩梔子之苦寒止煩除滿為佐濕滛于内以淡滲之以澤㵼茯苓之甘淡利小便道濕熱為使也右㕮咀都作一服水一大盞煎至六分去滓稍熱食前一服减半時五日再服而愈升麻丸治小兒熱毒攻脾胃遍身俱黄小便赤澀大便難心神疎熱兩目亦黄川升麻龍胆梔子仁黄芩川大黄炒秦芁甘草炙剉各半兩右為末煉蜜和丸如梧桐子大不計時候以新汲水研下三丸三嵗以上加丸數服三黄丸治諸黄兼治瘟疸最治衂血大便脫肛黄連去鬚一分黄芩去心半兩大黄去皮濕紙裹煨右同細末麫糊丸如菉豆大或麻子大每服五七丸至十五丸二十丸食後米飲送下一方用煉蜜為丸如衂血膿塩水下大便血荆芥薄荷湯送下一名三黄散治黄病每服一錢水一盞煎五分去渣温服食後白术散治小兒結熱於内口乾而渴身黄體重者人參白术白茯苓甘草炒藿香各一兩葛根右為粗末每服一錢至二錢水煎服土𤓰根汁方治小兒黄病土𤓰根汁右一二嵗兒取半鷄子殻分二服三四嵗取一鷄子殻分二服早晨晩後各一服一方用蜜半匙相和漸漸服之茵陳丸治小兒脾胃熱毒致肌肉變黄小便變赤少心中煩懊茵陳梔子仁川大黄炒秦芁去苗甘草炙各一分川朴硝半兩右為末煉蜜和丸如菉豆大不計時候温水下五丸量兒大小加减服之一方有郁李仁無甘草㵼黄散治小兒身凉身黄睛黄疳熱口臭唇焦㵼黄沫脾熱口甜胃熱口苦不吮乳藿香七錢山梔子一錢石膏半兩甘草三錢防風四兩右細剉同酒蜜微炒香為末每服半錢水半盞煎三分去滓服清汁亦治弄舌一方每服一錢温熱水調下不拘時候服之子芩散治黄病每服一錢水八分煎五分去渣温服黄芩𤓰􅌣根茯神各一兩甘草胡黄連各半兩蘆根湯治黄病蘆根剉一兩茵陳山梔子黄芩甘草各半兩右搗羅為細末每服一錢水八分入薄荷三葉煎五分去渣服大黄散治小兒諸黄川大黄炒黄連􅌝􅌣根黄芩梔子仁各半兩右為散每服一錢水一盞煎至五分去滓不計時候温服量大小以意加减黄𤓰蔕散治小兒諸黄三嵗忽發心滿堅硬脚心手熱則變為黄病不急治殺人𤓰蔕一十四枚小豆二十粒糯米四十粒右搗羅為散吹少許入鼻中令黄水出殘藥末浄水調服之得吐黄水即瘥一方𤓰蔕一兩赤小豆四兩為末每一錢温水調服藥下便卧即當有吐以吐為度出青黄汁為妙若小病不除者次日如前法更服可再三不令虛也藥力過時不吐即服熱湯一盞以助藥力若服藥過多者飲冷水觧之又方𤓰蔕炒赤小豆各等分為末三嵗半錢濃豉汁調下温服不吐少加得吐而止虚人不可用茵陳湯治小兒黄疸身體目睛小便並黄山茵陳一分大黄剉炒半兩山梔子五枚用仁右粗搗篩五六嵗每服一錢水七分煎四分入朴硝半錢更煎一兩沸去滓分温日三服量大小加减大黄丸治小兒諸黄心胸壅悶宜服川大黄剉炒茵陳葶藶隔紙焙令紫色各半兩右為末煉蜜和丸梧桐子大不計時候以新汲水研下三丸量大小增减服之青麥汁方治小兒黄病青麥自然汁右二嵗兒取半鷄子殻分二服三四嵗兒取一鷄子殻分二服早晨午後各一服葶藶丸治小兒黄疸大小便難喘粗氣急甜葶藶一兩炒大黄一兩炒右為末煉蜜丸如小豆大每服十丸米湯送下秦芁湯治小兒身目俱黄秦芁三分右粗搗篩每服一錢牛乳一合同煎至五分去滓分温日三服量兒大小加减苦參丸治小兒榖疸其候食必頭眩怫欝不安而發黄皆由失飢太飽攻衝脾胃腹滿氣粗煩渴苦參一兩龍胆半兩右為末牛胆汁和丸搗三百下丸如菉豆大每服二十丸米湯下不拘時䨇連丹名黄𤓰丸治小兒疸病渾身及面色俱黄川黄連去鬚胡黄連各一兩右為細末用黄𤓰一枚去瓤留一小盖子入藥末内後以盖子盖定麫裹火燒令麫焦去麫搗熟丸如菉豆大每服七粒至十粒温水下大小加减寒水石散治小兒胃熱身體黄除熱粉之方見本門諸熟類逐黄散治小兒黄疸脾熱眼黄右以𤓰蔞青者焙為末每服一錢水半盞煎七分去滓服立效五更初瀉下黄極妙韮根汁方治小兒黄病韭根汁味温無毒洗净去泥不計多少於石噐搗爛灑取自然汁右滴少許入鼻中出黄水即瘥諸腫附論夫腫病腎熱𫝊於膀胱盛逆於脾胃虚而不能制腎水反尅土脾隨水脹脾主四肢故流走而身面皆腫也若夫喘者重也何以然腎水勝而尅退脾土上勝心火心又勝肺為心尅故喘或問曰心勝肺肺本見虛今何喘曰此有二者肺大喘此五臓逆二者腎水氣上行傍侵於肺故大喘此皆難治腫者疳腫風腫氣腫積腫虛腫五者大同小異疳腫者肌體浮腫通身明亮狀如熟李寳鑑云若見皮膚如熟李此名疳水定無疑是也又有隂囊腫似琉璃疳水也或因疳食傷脾變為疳水風腫者面目浮腫色帶紫赤時常多痒陶隠君云風腫紫色而痒進退不定忽時有𤼵牽牛散主之或有如痛㿔有成片腫者搔之隨手而起此風疹也素問云風邪客於肌中肌膚虚真􅂔逆散寒摶於皮膚入腠理濕􅂔行之則為腫痒也又云面腫曰風癎雖􅂔血尚虚而熱未盡從皮膚與􅂔相搏致令􅂔不宣泄故停留成腫也治之先益黄散補後牽牛散利之氣腫者目皰浮腫乆嗽為之粗有痰食公曰目上瞼先腫次面背腫者乆嗽為之曰􅂔腫若下臉先腫次面背腫者脾積為之曰水腫者素問云目下㣲腫如卧蚕起之狀曰水腫熱論曰水隂目下亦隂也腹者至隂之所居也故水在腹中者必使目下腫也又曰經腫也又曰脛腫曰水腫千金云有人患􅂔急乆不瘥遂成水病麻黄甘草湯主之積腫者遍身浮腫因食悮脾乆瘧亦爾日華子有云人乆患寒熱不退必變浮腫因脾積􅂔所作也寳鑑云因宿痰飲成塊散後遍身浮腫喘麄或因不便食即飲水悮必作者也虛腫者四肢浮腫乆痢為之多渴少食凡痢乆不退虚腫少食㵼乆不退虚腫煩渴大抵痢乆則脾土虚虚則不能制腎水反尅土故腐腫於肌肉也其病十死八九若用凉藥立死治之宜用益黄散及五苓散候脾􅂔實則腫自消十愈五六凡瀉久能變虚腫也皆由不忌生冷恣食甘酸脾腎不調之所致也然取水之法諸有水人微腫見於目下水者隂也腹者至隂之所居故水在腹必使目下腫而不得卧卧則驚驚則咳甚夫取水法不可頓收盡必當再𤼵則難治如病甚治者初隔一日一取候减三二分又兩日再一取候退六七分又隔三日一取减去八九分又隔四五日取其不取日即服補腎行水氣之藥全嬰方云丁氏二子大者七嵗自七月内寒熱四十餘日小者五嵗自七月内㵼痢四十餘日二子後来俱發腫招愚視之大者水寳散㵼十餘行五苓散二服翌日病除八九分後啇陸散二服平愈小者益黄散女麫散五苓散日二服三日服藥尚未見效主人曰大者服水寳散立效何不投之一服荅曰服之即死是謂醫之用藥以療病如將之用兵料敵當其虚實隨其機變必獲勝效也盖大者因食傷脾小者因痢損脾素問云陽病治隂隂病治陽大抵退熱以寒藥退寒以熱藥實病虛之虚病實之今二子證候虚實不等若水寳女麫服之交互二病俱亡小者止用益黄散服之十日脾實平安腫脹二證此由虛中有積乆患失治漸𫝊作證候𫝊化多喘隨虛實按輕重察勝衰審表裏主治先固其本後正其摽得無恙矣凡腫有受濕脚手面目虚浮毒氣腫腹肚堅蠱脹急傷寒虛氣入腫腹氣虛腫㵼痢虛氣入腹脹腫血虚腫榮衛俱虚腫凡脹有疳極脹疳積脹氣積痞氣脹癖氣脹癥積脹鎻肚脹急膈脹中脘脹食腸臌脹蛔蟲脹脾􅂔脹冷積脹虛積脹以上腫脹虛積並當下之用藥各有法度凡受濕腫傷寒虛氣入腹食毒氣腫㵼痢虚􅂔入腹腫此四腫所患病不相同皆因虚盛而得之受濕謂脾胃受濕冷乆不尅化氣浮四肢頭面皆腫食毒􅂔由脾胃傷之冷積毒氣停留胃脘致虛入腹作腫傷寒由下之太早乘虛入腹作腫㵼痢之乆脾氣亦虚是以致腫以上宜平調胃氣補臓充實方可去腫先服四味理中丸减半乾姜加白术桑白皮同煎傷寒虚腫加枳實作喘加淡豆豉利虚腫服正氣調胃胃􅂔既壯以致生丹利之其腫即退再調補臓腑用觀音散良益固平復矣又有􅂔虛腫亦名􅂔毒榮衛俱虛亦名􅂔血蠱凡小兒所患腫脹一門最為要急前人少有究竟然腫脹已作皆由榮衛不順臓腑怯弱壅滯三焦流注百脉表裏俱虛邪正相亂所以致受四大浮盛腹肚􅂒滿多由食毒得之飲冷得之癥傷得之飲飽得之積乆不化諸虛所入故成斯病病由虛得或忘亂通下因虚致虚根不能去盛是謂壊證智者怯而辭謝庸者暴以攻擊二醫不同誠屬難治再與智者啇之謂啇量斟酌輕重良者審之雖曰良工猶宜審其可否之意疑者謂之疑其病盛不可利只宜與塌其氣也啟其靈明酌定良方起死回生謹遵其理始可調治用藥至真對證剋效即無恙矣以上先與服榮衛飲子次服分氣飲子小兒臓腑嬌嫩乳食過傷脾胃虛冷不能消化乳食停滯腹間脾受積傷脾土衰弱不能制水故溢漬於皮膚腫有三證疳水積水驚水也盖疳水者其候心中虛脚腫不可取宜用藥消之若積水者五積在於腹結化為水其候或冷或熱四肢頭面俱浮作虛積治之宜補而後取此是積在腹結後化為水其病難治而不可作虛中積治也驚水者前後重疊受驚致令心火躁渴飲水過多停積於脾其候四肢腫身上熱若其脉大者生小者死叔和曰水氣浮大得延生沉細當應是死别尺脉如絲或浮洪按之無根乃絶脉楊氏曰賈洛陽以腫為㽸疾則知病之危惡非他疾比也夫人全性命者水榖而已水則腎主之土榖則脾主之惟腎虛不能行水脾虛不能制水胃與脾合氣胃為水榖之海又因虛而能𫝊化故腎水泛溢侵脾土於是三焦停滯經絡壅塞水渗於皮膚注於肌肉而發腫矣其候目胞上下㣲腫四肢重着咳嗽喘怔忡股間清冷小便澀黄皮薄而光手按成窟舉手即滿治法楊氏曰身有熱者水􅂔在表可汗身無熱者水氣在裏可下次則通利小便順氣和脾不可緩也然證雖可下當審虚實權輕重不可通用芫花甘遂大㦸猛烈之劑用之太過吾恐峻决者易因閉者難水􅂔復来何以治之也凡虛腫先起於腹而散於四肢者可活先自四肢而後歸腹者不可治蠱脹肚上有筋腹滿大便滑泄乆瘧而轉作虛浮及唇黒傷肝缺盆平傷心臍突傷脾足平傷肺背平傷肺或男從足腫上女從身腫而下或肉硬或手掌平皆不治凡小兒通身浮腫是風水腫也小便不通者利之則愈内經曰三焦閉益水道不行水滿皮膚身體痞腫是風乗之故可用長流水加燈心煎五苓枝時時呷之更於不透風處浴之汗出則腫消一汗减半再汗减七八三汗消盡内外俱行也治水之法當利小便得其要妙之理則愈矣小兒浮腫有飲食所傷有濕傷皮膚有氣化為水治法當腰以上腫宜汗腰以下腫宜利小便然後調理脾胃也方榮衛飲子調治嬰孩􅂔血俱虛榮衛不順四肢頭面手足俱浮腫以至喘急者並宜服此川當歸熟乾地黄洗净白茯苓川芎白术甘草炙白芍藥枳殻去瓤炒黄耆蜜炙陳皮右等分㕮咀每服二錢水一小盞煎半盞去渣通口不拘時服榮者氣温流血於脉衛者􅂔順調和於絡是故榮衛脉行隂陽相實循環無止自幼以至長不唯呼吸無少滯碍其脉方調其􅂔方順呼吸之間脉不應息􅂔有違滯流注經絡隐伏臓腑虛實熱則發壅疸背莭實熱則患瘡疾瘑疥况其榮與衛隂及陽徧枯有作易感寒邪亦易致虚百病皆由兹始此方最良雖兒㓜小並可與服以杜其根使血榮氣衛順且和矣腑寒臓虚温且壯也盈虧自然而平怯弱自然而正隂陽均調􅂔脉充實分􅂔飲調理小兒腫脹作喘􅂔短促急坐卧不任四體浮腫飲食嘔逆神困喜睡宜服之五味子桔梗白茯苓甘草炙陳橘皮桑白皮草果去殻大腹皮白术枳殻去瓤切炒川當歸紫蘇蘇子半夏麯右等分每服二錢水一小盞生姜二片棗子半箇煎半盞去滓通口服不拘時兼八味理中丸煎服以上宜用救生丹通利清濁無混邪正不干上焦得之清凉下部受之温煖氣滯則少升䧏血虛則多泄㵼雖是乳子呼吸一急其脉有志徐徐應指不違其數者亦同大人流行但通小大辨其短淺而已若留滯其脉遲數其間太過不及者作病善主療治欝則分之逆則順之停則利之滯則䧏之調理之先宜通順其􅂔大抵嬰孩􅂔順即易治脉壯亦易理證候稍傳欝逆停滯當先袪治不待傳入而究竟此方分􅂔預宜進與分水穀之治者為用不同大效神功勑生丹治小兒氣虛喘息四肢浮腫腹肚脹急衝滿脇肋乍寒乍熱或㵼或秘皆由乆停虛積榮衛不順宜用此方去其毒惡之􅂔雄黄别研硃砂另研各一分巴豆二十粒去殻乾姜二錢右用米醋一盞以巴豆姜就煮令乾去姜不用將巴豆出油和雄硃研勻雪糕搜丸如麻子大每一嵗三丸並用酒浸赤芍藥少許送下夫㓜兒受疾其來發端無過驚風痰熱疳積吐痢而已前賢衆多述論證候遍看方藥究竟推詳各有確實奥見其有無辜疳積異作證候著于篇集或有罕見其證未詳其理者盡難測知龜胸决肋飲漿是也又復有壊証惡候自服諸家丸散輕重相投愈之不得全功聽之加為他害肝脾風之類是也悠悠既乆方法何宜學醫之士遇此等証未審術窮而屈若能此等觸類調理雖則未效猶尚庶幾多是肆意免强而為稍或得失利害甚重今議勑生丹方載譚氏所療無辜積證效驗至良晩進後生聞而知之且驚且喜盖渠未嘗知用若叅究而又意到即細切以副全功然後知醫學無窮神妙難言世俗醫工於此等證候須當至誠施議起死回生十治十全百𤼵百中矣療小兒身體滿氣急卧不得方右用郁李仁一合搗末和麫搜作餅子如常法與兒喫㣲利即瘥一方為末六分水七合和調去滓煮粥與兒喫之寛腹丸治小兒疳氣腹脹不思飲食或面腫者牽牛蘿蔔子陳皮青皮木香炮各一兩㯽榔紫蘇子木𤓰半兩巴豆七粒炒黄右為末糊丸小豆大三嵗三十丸紫蘇木𤓰湯下黄耆茯神散治小兒榮衛氣虛精神不爽面無顔色唇口青白噦逆昏睡全不思飲食身體㣲腫黄耆蜜炙茯神去末天南星炮白扁豆炒黄防風去蘆白附子炮肉桂去皮白芍藥山藥各等分右每服二錢水一小盞生姜三片棗一枚同煎七分去渣食前温服加味五苓散治腫滿因積而得既取積而腫再作小便不利猪苓赤茯苓白术澤㵼各一兩木香沉香㯽榔各三錢白豆􅅳一錢􅒦砂仁五錢右味煎樟栁木通燈心湯調下大黄湯治小兒咳腫壯熱有實方麝香三銖别研湯熟下大黄四兩甘遂石膏各三分黄芩甘草青木香各三分前胡四分右為粗末水七升煮一升九合每服三合日四服夜三服塌氣散治腫滿因積而得既積而腫再作小便不利赤小豆陳皮去白蘿蔔子白术炒茴香炒各五錢木香二錢炮甘草一錢炙青皮五錢加以巴豆二錢去殻炒去巴豆不用右為末飯湯下或薑棗湯下治疳用燈心湯下治小兒臍赤腫以杏仁杵加脂内體中相和傅臍腫上治男子婦人小兒積年脚氣腫痛及腹肚蠱腫服之痛止腫消方見大脚􅂔腫門椒目飲治小兒痢後虛腫并頭面浮腫或身熱白术秦芁椒目甘草香薷通草右等分為末一錢水半盞煎三分去滓食前不宜喫蠡魚鯉魚二物皆能腫史君子丸治小兒面黄大小便赤徧身浮腫此脾疳食積氣滯而成史君子一分麵裹煨熟去麵黑牽牛一兩五靈脂半兩黄連陳皮一分江子七粒同陳皮黄連炒江子不用右為末粟米糊為丸如菉豆大每服五七丸生姜橘皮湯下神助散治小兒頭面手足浮腫澤㵼猪苓去黑皮各二兩黒牽牛二兩半㣲炒取末葶藶三兩炒香别研椒目一兩木香一兩右為細末每服以葱白三莖將水一盞煎至半盞調藥三錢絶早面向東服如人行十里乆漿水䓤白煮稀粥至葱爛入酒五合熱啜量人啜多少湏啜一升許不得喫塩并麫自早至午當利小便三升四升或大便利喘定腫减七分隔日再服五皮散治小兒諸般浮腫􅂔急不食桑白皮大腹皮茯苓皮薑皮陳橘皮各等分右㕮咀三嵗一錢紫蘇皮葉三五片水半盞煎三分去渣不拘時服澤苓散治小兒遍身浮腫氣急不食木通一兩半澤㵼苦蒲子各半兩木猪苓漢防己各一兩右㕮咀一錢水酒共半盞葱白三寸煎三分去滓小便通利即瘥内消丸治小兒頭靣手足虛浮木香一錢煨防己一錢半丁香二十五粒青皮五錢去瓤剉用巴豆十四粒去殻同炒候黄色去巴豆不用右為末丸麻子大每服三二嵗五丸四五嵗七丸或十嵗小兒陳皮湯下女兒艾葉湯下一日三服又方實脾散消積飲能補脾消積進食五苓散通利水道藥合和用蘿蔔子木通薏苡仁車前子草赤小豆冬𤓰仁糯米湯調入燒塩盖脾土固實去水腫消一方五味同炒黄色去巴豆麫糊為丸小豆大三嵗三十丸橘皮湯下紅粉散治小兒渾身虛腫氣喘不思飲食硃砂一錢梹榔一錢輕粉半錢右為末每服一字及半錢薄荷湯調下喫一服則取下仍用前觀音散人參散神术散調其胃氣忌生冷粗硬等物㯽榔丸治小兒遍身浮腫黒牽牛三兩炒青木香青皮防風㯽榔各一兩右為末麫糊為丸如芥子大每服二十丸桑白皮湯下香橘丸治小兒四肢腫滿杏仁十四枚巴豆十四枚青皮陳皮各半兩麩半升右一處炒為細末醋糊為丸如菉豆大每服十丸至二十丸冷姜湯下宣氣散治小兒腹急氣粗并治風腫氣腫通身腫及瘡痘盛出身熱煩渴腹脹喘促大小便澀面青悶亂又治乆㵼不退脾虛生氣止與一服後補之木香一分㯽榔橘皮甘草各半兩黒牽牛四兩半生半微炒用右㕮咀一錢水半盞煎三分去滓服三歲一錢香㯽散治小兒疳食氣腹大氣粗一應浮腫並療木香㯽榔黒牽牛青皮各半兩啇陸一兩右為末三嵗一錢煎木通湯調下或為糊丸小豆大三十丸米湯下肚大常服自消分氣飲治腫脹作喘氣短而急北梗赤茯苓陳皮桑白皮炒大腹皮枳殻製半夏麯真蘇子㣲炒紫蘇甘草各二錢炙草菓仁一錢右剉散每服一錢半水一盞薑三片棗子一箇煎服若心臍起掌心平缺盆平背心平不治大喘氣粗不食乃腎水盈溢上行傍浸於肺亦不治葶藶煎治小兒腫滿服藥不退葶藶紙上炒三分防己一兩半澤㵼三兩澤漆葉一兩半赤茯苓去黒皮三分郁李仁去皮尖炒一兩一分柴胡去苗二兩杏仁湯浸去皮尖雙仁炒研如膏三兩右七味粗搗篩水一斗煎三升半去滓入杏仁膏又白蜜一斤慢火煎如稀餳每半錢温水調下漸加之更量大小加减甘遂丸治小兒腫滿結實諸治不瘥甘遂炒葶藶紙上炒車前子猪苓去黒皮杏仁湯浸去皮尖雙仁炒研芍藥各三分澤漆葉黄芩去黒皮鼈甲去裙襴醋炙各半兩右搗研為末煉蜜和丸如菉豆大五六嵗兒每服五丸竹葉湯下以利為度量兒大小加减塌􅂔散退腫治積水驚水或飲水過多停積於脾故四肢腫而身熱宜用内消之其腫自退赤小豆陳皮蘿蔔子甘草各半兩木香一分炮右為末薑棗煎量大小加减通口服牽牛丸治小兒疳氣頭面及四肢腫黒牽牛白牽牛青皮陳皮右等分為末糊丸如小豆大三歳三十丸米湯下小腫常服自消塌氣丸治小兒疳腹脹喘急并靣浮腫丁香胡椒炒一分蘿蔔子炒白牽牛生各一兩右為末麫糊為丸小豆大三歳三十丸米湯下治小兒身腫并手足腫兼癮􅇙用巴豆五十枚去皮心水二升煎取一升用帛於湯中隨手拭之治小兒毒氣攻腮腫赤可畏者皂角二兩去核天南星二錢生用糯米一合為末右為細末姜汁調塗立效郁李丸治小兒疳食氣急腫滿郁李仁湯泡去皮炒㯽榔各半兩牽牛一分炒右等分為末糊丸小豆大三嵗三十丸䓤白湯下不拘時量兒大小加减塌􅂔散治小兒腹脹氣粗并疳食攻面目浮腫木香一分青皮半兩巴豆三十粒同炒黄色去巴豆右為末三嵗半錢米湯調下食前連進即效量兒大小以意加减治小兒浮腫蒲種殻天羅燈草各等分右用葱濃煎湯服之又煎洗之尤妙即愈郁李仁湯治小兒通體腫滿腹脹氣喘郁李仁湯浸去皮尖炒搗研用大黄煨剉柴胡去苗各一兩半芍藥猪苓去黑心澤㵼各一兩赤茯苓去黒皮麻黄去根節一分升麻杏仁湯浸去皮尖雙仁炒鼈甲去裙襴醋炙各三錢黄芩去黒心各一兩右粗搗篩每用二錢水一盞煎至五分去渣分温二服日再以利為度量兒大小加减啇陸散治小兒浮腫腹滿氣急利小便澤㵼啇陸各等分右為末三嵗一錢煎桑白皮湯調下啇陸醋炒為末調塗腫毒妙醋調并治咽喉腫治小兒臍腫右取桂心炙令熱熨之日可四五度治小兒熱腫右用鯉魚胆塗之甘遂丸治小兒腫滿結實諸治無益者一名澤漆丸方見本門水腫類二牛丸治小兒腫病大小便不利黒牽牛白牽牛各四兩炒右為末井花水為丸如菉豆大每服二十丸蘿蔔子煎湯下沉附湯治腫面滿因積而得既取積而腫再作小便不利若再用利小便藥性寒而小便愈不通到此則束手矣盖中下焦不升䧏為風寒痞隔故水凝而不通宜服沉附湯則小便自通喘滿自愈大小便通用乆服無碍附子一隻生去皮臍切成片子右用生姜十片水三盞煎八分次用沉香一錢磨水入藥再煎三沸空心服胃苓丸治腫滿因積而得既取積而種作小便不利平胃散五苓散右等分和合蒸蒜丸木通湯下又方治腫滿因積而得既取積而腫再作小便不利平胃散二錢右煮蘿蔔子一碗取青汁一盞入藥用姜棗再入蘿蔔子同煎服附豆丸治脾虛受濕虛腫附子一隻生去皮切作四片赤小豆一盞右用水浸慢火煮候豆熟附子透軟取附子焙乾為末以薏苡仁煮糊丸空心蘿蔔子煎湯吞下仍以燒塩和所煮赤小豆空心食之緊皮散治一切腫經取已消脾胃虛弱白术炮赤茯苓木香澤蘭厚朴姜製續斷肉桂㯽榔陳皮去白麥芽炒神麯青皮椒目木通扁豆各等分右㕮咀每服加薑棗子蘇葉同煎空心温服之海蛤散治小兒腫病大小便不利一名猪苓湯方見本門水腫類水腫附論夫小兒水氣腫滿者由將飬不調腎脾二臟俱虚故也腎主水其氣不通於隂脾主土候於肌肉而剋水腎虚不能𫝊其水液脾虚不能剋制於水故水氣流溢於皮膚故令腫也其水腫者則皮薄如熟李之狀若皮膚虛受風風摶於氣致腫者但虛腫如吹此風氣腫也方㯽榔散治小兒水氣腫滿喘促坐卧不安㯽榔煨熟炒大黄剉炒各三分葶藶紙上炒牽牛子炒各半兩右搗羅為散三四嵗每服半錢熟水調下以利為效量兒大小加减葶藶散治小兒水腫氣粗葶藶炒防己甘遂大㦸右等分為末三嵗一錢桑白皮湯調下食前服澤漆丸治小兒水腫腹大諸藥不瘥澤漆葉葶藶紙上炒各半兩黄芩去黒心甘遂炒郁李仁湯浸去皮尖炒研芍藥猪苓去黒皮杏仁湯浸去皮尖雙仁炒研車前子各三分鼈甲去裙醋炙茈胡去苖各半兩右搗羅為末煉蜜和搗三五百杵為丸如菉豆大五六嵗兒每服五丸温水下更㸔兒大小増减一方用竹葉湯煎下大㦸丸治小兒水氣浮腫大㦸葶藶炒各一錢青皮三錢江子半錢右為末飯為丸每五丸茶湯下㵼後用人參白术散補之葶藶散治小兒水腫葶藶隔紙妙一錢牽牛炒桑白皮炒㯽榔等分右為末生姜蜜湯調下聖丸子治小兒水腫腹腫霍亂嘔逆腹冷食不下兩脇痛并下痢膿血小便赤澀又理肺􅂔喘急咳嗽用葶藶丸下痢松樹皮湯小便赤澀燈心湯喘急咳嗽人參杏仁湯下如痢後腫先服益黄散次與之二物湯有患氣積急積乆不瘥遂成水病攻面目身從腰上腫此湯發汗悉愈麻黄去莭四兩甘草一兩右㕮咀三嵗一錢水半盞煎三分去滓服構皮湯治小兒腫滿構木白皮切五合即椿樹也赤小豆四合赤茯苓去黒皮一兩半右㕮咀每服一錢水七分煎至四分去渣温服日再更量兒大小増减桑根白皮散治小兒水氣腫滿上氣喘促小便赤澀大便稍難一名猪苓湯一名海蛤湯桑白皮半兩剉海蛤一分漢防己一分赤茯苓白术甜葶藶隔紙炒令紫色猪苓去黒皮各一分川朴硝一兩右搗粗羅為散每服一錢水一小盞煎至五分去滓温服更量兒大小加减服之桑白皮散治小兒水氣偏身腫滿喘促小便不利桑根白皮半兩炒射干赤茯苓黄芩木通剉澤漆澤㵼漢防己各半兩右搗細末為散每服以煮赤小豆湯調下半錢每日三四服㸔兒大小加减服之牡蠣散治大病瘥後腰以下有水􅂔者宜服之牡蠣煅澤㵼蜀漆洗炒啇陸葶藶海藻􅌝􅌣根各等分右為末三歲一錢燈心湯下小便利止赤茯苓散治水氣腫滿咳嗽喘不止赤茯苓桑根白皮剉貝母煨令黄各半兩川升麻甜葶藶隔紙炒令紫色杏仁湯浸去皮尖雙仁麩炒㣲黄桔梗去蘆各一分右搗粗羅為散每服一錢水一小盞煎至五分去渣温服日三四服㸔兒大小加减服之白术散治小兒水氣腫白术木香炮甘草炙茴香炒青皮浸去皮切各半兩巴豆三十粒去皮膜同青皮一處炒好了仍去巴豆不要用右為末飯飲調下茯苓丸治小兒水氣面目腫小便澀腹脹滿赤茯苓杏仁湯浸去皮尖雙仁麩炒㣲黄陳橘皮浸去白瓤焙漢防己紫蘇子炒甜葶藶隔紙炒令紫色半兩右搗羅為散煉蜜和丸如菉豆大每服煎桑根白皮湯下十丸日三服五嵗以下减丸服之甜葶藶丸治小兒水氣通身腫滿心腹妨悶坐卧不安甜葶藶隔紙炒令紫色牽牛子微炒雄雀糞各半兩大㦸一分巴豆十粒去皮心研紙裹壓去油膩粉一錢研入右搗羅為末都研令勻用棗穣和丸如菉豆大每服以温水下一丸日二服五嵗已上加丸服之甘遂散治小兒水氣遍身腫滿大小便難喘促不得睡卧甘遂炒大黄剉炒牽牛子炒各三分葶藶紙上炒一分㯽榔剉炒右為散每服一字熟水調下以利為度量大小加减水寳散治小兒疳水氣息通身虛腫狀如熟李者服之以利為度童子青橘皮珠子甘遂㣲炒右等分為末三嵗一錢用麥蘖煎湯㸃臘茶清調下食前通利為效忌醎酸食三五日凡治腫下氣虚只與五苓散補甘遂㯽榔散治積水疳水並宜服之甘遂青皮去白㯽榔取生用陳皮去白各一錢右末紫蘇木𤓰湯㸃下忌服甘草藥積水疳水皆宜服之此候乆而不痊必連隂腫脾腎俱壊之然如此已是危證不可取下只用利水道固脾土當用之五苓散和平胃散加麥門冬姜棗煎服一方無陳皮燈心蘿蔔子湯下脚腫木𤓰湯下又方治小兒積水右用益黄散去丁香加木香去訶子加蘿蔔子為細末大小以意加减煎湯調下海蛤散治小兒疳水腫滿氣急澤㵼海蛤防己各一分苦蒲子三十粒右為末三嵗一錢酒調下連進二服小便利即效葶藶散治小兒水氣腫滿甜葶藶隔紙炒紫牽牛畧炒取仁白桑皮炒鷄心㯽榔大黄各等分右為末每服半錢水半盞生薑三片蜜半匙煎湯調下或煎大流氣飲研青木香丸灌下山豆根湯治小兒􅂔腫滿小便澀山豆根車前子桑根白皮各半兩葵子赤小豆各半兩右細剉和勻每服取一分水一小盞煎至五分去渣分為二服毎日三四服隨兒大小以意加减猪苓散治小兒水氣腫滿小便不利臍腹妨悶喘促猪苓去黒心桑根皮剉赤茯苓海蛤甜葶藶隔紙炒紫色各一分右搗粗羅為散每一錢水一小盞煎至五分去渣温服日三四服量兒大小加减木香散治小兒水氣四肢浮腫腹脇妨悶木香赤茯苓各一分鼈甲塗醋炙令黄去裙襴川大黄剉碎㣲炒各一兩牽牛子㣲炒三分右搗細末為散每服以温水調下半錢以利為度隨兒大小加减㯽榔餅子治小兒水氣四肢浮腫脹脇妨悶㯽榔一分郁李仁半兩湯浸去皮㣲炒用右搗羅為末以大麥麫一兩和作餅子煻灰内煨熟量兒大小與喫即得通利氣下也冬𤓰圓治種種水氣大冬𤓰一枚先於頭邉切一盖子取去中間瓤以赤小豆水淘浄填滿冬𤓰中間再用盖子合了用竹簽定以麻線繫紙筯黄泥通身固濟窨乾用糯米榖舂取糠片兩大籮埋冬𤓰在内以火着糠内煨之候火盡取出刮去泥將冬𤓰薄切作片子并豆一處焙乾右為細末以煮麫糊為丸如桐子大每服五十丸煎冬𤓰子湯送下不拘時候小便利為驗普濟方卷三百八十六
