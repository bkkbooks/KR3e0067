body:
  text: 普濟方卷一百三十四明周王朱橚撰傷寒門傷寒發豌豆瘡論凡傷寒熱毒内盛多發皰瘡者以病人裏實表虚故也裏實則毒氣不能内消表虚故乗虚發於肌肉而成瘡也其病大小形如豌豆其色或白或赤若頭作瘭浆戴白膿者其毒則輕若紫黑色作根根在肌肉裏者其毒則重甚者周匝徧身五内七竅皆有也夫表虚裏實熱毒内盛攻於臟腑餘氣留於肌肉遂於皮膚毛孔之中結成此瘡重者匝遍其身狀如火瘡若根赤頭白則毒輕若色紫黑則毒重其瘡形如豌豆亦名豌豆瘡脉洪數者是其候也方黄連飲子治傷寒毒氣未散發豌豆瘡黄連一兩去鬚糯米一合寒水石三兩右搗篩以水二大盞煎至一盞半去滓不計時分温服大青散治傷寒壮熱頭痛發瘡如豌豆徧身大青梔子仁川大黄剉碎㣲炒犀角屑川升麻甘草炙㣲赤剉以上各一兩右為散每服五錢以水一大盞煎至五分去滓温服不計時治傷寒熱毒未解欲生豌豆瘡發熱疼痛宜服解肌出汗方葛根一兩剉石膏一兩麻黄一兩去根節黄芩半兩赤芍藥半兩桂心半兩甘草半兩炙㣲赤剉右搗為細散每服不計時以煖酒調下二錢併三服衣盖取汗治傷寒病發豌豆瘡未成膿初覺冝服出聖惠方黄連一兩去鬚右𢷬碎以水一大盞煎至六分去滓不計時候温服便消不成膿也又方出聖惠方用好蜜徧磨瘡上亦可以蜜煎升麻摩之并數數服之又方出聖惠方木香半兩右𢷬碎以水一大盞煎至六分去滓頓服之治傷寒發豌豆瘡欲出宜服甘草一兩炙㣲赤剉右𢷬碎以水一大盞煎至六分去滓任食前後細細服之以防瘡出如已出即不服又方出聖惠方用清油一小盞服之即不生又方出聖惠方牛乳四兩酥一兩右先煖乳令㣲沸即下酥酥消盡便服空心頻頻温服即不生治傷寒病壮熱頭痛發瘡徧身如豌豆獖猪膽一枚右以醋半小盞合膽汁煎一沸放温為一服不計時治傷寒白頭瘡四邉赤腫欲發豌豆瘡出聖惠方麻黄一兩去根節川大黄一兩剉碎㣲炒右剉和勻每服半兩水一大盞煎至五分去滓不計時温服治傷寒發豌豆瘡未作膿方一名青黛一物湯出聖惠方用青黛一兩細研以新汲水調下一錢不計時石膏湯出聖濟總録治傷寒天行壮熱頭痛發瘡如豌豆石膏碎二兩柴胡去苗虎杖各一兩知母焙半兩芍藥一兩山梔子仁三分右搗篩每服五錢水一盞半煎至八分去滓温服參麻湯出聖濟總録治傷寒熱病生豌豆并皰瘡煩渇昏迷元參一兩升麻三分犀角鎊半兩乾藍葉一兩甘草炙剉三分右搗篩每服五錢水一盞半入葱白三寸豉一百粒同煎至一盞去滓温服日二二黄湯出聖濟總録治傷寒天行熱病毒氣稍盛生豌豆并皰瘡煩躁昏迷大黄剉炒半兩黄芩去黑心麥門冬焙去心􅆚藥各一兩甘草炙三分剉大青半兩右𢷬篩每服五錢水一盞半煎至八分去滓温服治傷寒發豌豆瘡四邊赤腫方出聖濟總録胡荽一握生地黄一兩右細切搗絞汁空心頓服一盞許升麻湯出聖濟總録治傷寒熱毒氣盛發瘡如豌豆升麻半兩大黄剉碎㣲炒一兩黄連去鬚甘草炙剉各三兩山梔子仁一兩右搗篩每服三錢水一盞煎至七分去滓温服日二犀角湯出聖濟總録治傷寒熱毒氣盛發瘡如豌豆犀角鎊二兩麻黄去根節黄連去鬚各半兩木香一兩右搗篩每服五錢水一盞半煎至八分去滓温服大青湯出聖濟總録治傷寒天行壮熱頭痛發瘡如豌豆徧身大青一兩山梔子仁犀角鎊各半兩右搗篩每服三錢水一盞入豉一百粒煎至七分去滓温服牡丹湯出聖濟總録治傷寒熱毒發瘡如豌豆牡丹皮山梔子仁黄芩去黒心大黄剉炒木香麻黄去根節右等分剉如麻豆大每服三錢水一盞煎至七分去滓温服良化毒湯出聖濟總録治傷寒發斑豆瘡欲出甘草㣲炙一兩黄連去鬚㣲炒一兩右剉如麻豆大每服五錢水一盞半去滓温服不計時内消散出聖濟總録治傷寒熱病欲生豌豆瘡毒未出令不成用墨一分以酒二合磨令頓服之紫草飲出聖濟總録治傷寒熱病生皰瘡煩躁迷悶用紫草并根細剉二兩搗篩每服三錢水一盞煎至七分不計時温服竹葉湯治傷寒時氣發瘡如豌豆煩悶苦竹葉切小麥各二兩石膏碎三兩右搗篩每服五錢水一盞半煎至一盞去滓温服不計時龍腦丸出聖濟總録治傷寒時疾發豌豆瘡及赤瘡子未透心煩狂躁氣喘妄語或見神鬼用龍腦一錢細研旋滴猪心血和丸如雞頭實大每服一丸紫草湯化下少時心神便定得睡瘡復發透依常将息安黑散子出聖濟總録治傷寒熱病初出豌豆瘡三五箇便服此令瘡不出用臘月猪糞以新砂瓶子盛瓦盖口炭火燒令通赤取出安地上出火毒入乳鉢研細每服一錢空心新汲水調下紫草湯出聖濟總録治傷寒發斑疹豆瘡紫草荆芥惡實等分右搗篩每服三錢水一盞煎至七分去滓温服晉中書令王珉傷寒身騐方用樺皮濃煮汁冷飲主傷寒時行熱毒瘡特良今之豌豆瘡也治傷寒發豌豆未成膿出千金方用芒硝以猪膽相和塗瘡上立效痂落無痕仍用黄土抹上良木香散出活人書治瘡煩痛者青木香一兩薫陸香􅈨石丁香各一兩麝香半兩右㕮咀以水四升煮取一升半分兩服熱毒盛者加犀角一兩無犀角以升麻代病輕者去􅈨石神驗治豌豆瘡初發覺欲作者方出千金方用煮大黄五兩服之愈傷寒鼻衂論夫傷寒刼者鼻中血出者是也雜病衂者實熱在裏傷寒衂者實熱在表何以言之病原曰凢人肝藏血肺主氣開竅於鼻血得熱則散隨氣上從鼻中出則為衂是雜病者實熱在表世經曰傷寒脉浮𦂳不發汗因致衂者宜麻黄湯傷寒不大便六七日頭痛者熱實小承氣湯其小便清者知不在裏仍在表也當須發汗頭痛者必衂宜桂枝湯以此觀之是傷寒衂者責其表熱也千金翼曰吐血有三種一曰肺疸二曰傷胃三曰内衂既吐血家謂之内衂其鼻中出血者可謂之外衂是經絡之血妄行也經絡熱盛陽氣擁重迫血妄行出於鼻則為衂經曰其人發煩目瞑劇者心衂衂乃解所以然者陽氣重故也又曰陽盛則欲衂陰虚小便難言衂為經中陽盛煩傷寒肺浮鼻中燥口燥但欲潄水不欲嚥者是欲衂也經曰陽明病口乾鼻燥能食者則衂又有不應發汗而強發汗因致衂經曰十陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治是也衂家雖為邪熱在經而又不可發汗經曰衂家不可發汗發汗則頭上陷脉𦂳急直視不能言不得眠前云桂枝湯麻黄湯治衂者非治衂也即是發散經中邪氣耳若邪氣不得發散擁成於經逼迫於血則因致衂也即非桂枝麻黄湯專治衂也太陽病脉浮𦂳發熱身無汗自衂者愈是經中之邪隨血而散則解矣故知衂者不得桂枝湯麻黄湯發散之也衂者若但頭汗出身無汗及汗出不至足者死黄帝云此不治之疾臨病之際審而治則不失矣歌曰太陽發衂病將解衂後仍将脉審詳有汗脉浮須用桂𦂳而無汗用麻黄桂即桂枝湯也麻黄即麻黄湯也太陽病自衂及服諸表藥後自衂者為欲解也有汗脉浮再用桂枝湯無汗脉𦂳再與麻黄湯脉㣲者犀角地黄湯又黄芩芍藥湯茅花湯衂而渇欲飲水入即吐先服五苓散次竹葉湯少陰証無縁有血少陰証但厥而無汗強發之必動血動血者死或出口鼻或耳目也是謂下厥上竭聖濟總録論云傷寒鼻衂者由熱氣盛血液妄行盖心主血肝則藏之肺主氣鼻則通之心肝為熱邪所傷血則隨氣行所以隨鼻出也昔人謂陽盛則衂者盖陽盛則熱盛熱盛則宜衂故傷寒太陽証衂血乃解謂是故也至於陰病則不宜衂盖陰証自無熱安得而衂故少陰病但厥無汗強發之必動血從口鼻耳目出者是謂下厥上竭為難治也歌曰陽明口燥若頭疼水不下咽得衂血瘀血停留定發狂病家外証無寒熱陽明身熱頭疼鼻衂脉㣲者犀角地黄湯外証無寒熱者必發狂此瘀血停留也輕者犀角桃仁承氣甚者抵當湯取盡黑物為度方茅花湯出聖濟總録治傷寒衂血不止茅花一把右剉碎以水三盞煎濃汁一盞分二服無花以根代之一方加燈心竹茹湯出聖濟總録治傷寒鼻衂不止青竹茹黄芩去黒心各一兩蒲黄伏龍肝各半兩右粗搗篩每服五錢水一盞半煎至八分去滓下藕汁一合攪勻食後温服犀角湯出聖濟總録治傷寒鼻衂不止頭面俱熱犀角鎊大青甘草炙各三分升麻雞蘇莖葉小薊各一兩黄芩去黑心􅆚藥各一兩半生乾地黄焙朴硝各二兩右㕮咀如麻豆每服五錢水一盞半煎至八分去滓温服阿膠湯出聖濟總録治傷寒鼻衂不止此是陽毒攻腦阿膠炙令燥黄芩去黑心各一分葱白五寸連鬚豉一百粒乾艾葉炒半兩右細剉分作二服每服用水一盞半煎至七分去滓下生地黄汁一合攪勻食後温服黄芩湯出聖濟總録治傷寒鼻衂不止黄芩去黒心梔子仁大黄剉炒蒲黄荆芥穗各半兩右剉如麻豆大每服三錢水一盞半煎至八分去滓温服不拘時金黄散出聖濟總録治傷寒鼻衂不止鬱金甘草炙各一兩黄藥子黄蘗去粗皮各一兩右𢷬羅為細散每服二錢冷水調下不拘時以止為度鈎籐散出聖濟總録治傷寒頭痛壮熱鼻衂不止鈎籐桑根白皮剉馬牙硝各一兩梔子仁甘草炙各三分大黄剉炒黄芩去黑心各一兩半右粗搗篩每服三錢水一盞竹葉三七片煎至六分去滓下生地黄汁一合攪勻食後温服竹茹湯出聖濟總録治傷寒鼻衂不止青竹茹雞子大一團生地黄半兩拍碎右以水一盞半煎至八分去滓食後温服羚羊角湯出聖濟總録治傷寒肺熱鼻衂不止羚羊角鎊犀角梔子仁麥門冬去心焙紫苑去苖毛各三分牛黄研元參各一分黄耆人參甘草炙各半兩赤茯苓厺黑皮一兩右搗粗篩每服五錢水一盞半煎至八分去滓食後温服日二前胡湯出聖濟總録治傷寒内熱鼻衂痰壅吐逆前胡去蘆頭甘草炙白术陳橘皮湯浸去白焙大腹皮各三分赤茯苓去黑皮旋覆花桔梗炒各半兩半夏湯浸七遍一分右搗粗篩每服五錢水一盞半生薑一棗大拍碎煎至八分去滓食後温服髪灰散出聖濟總録治傷寒鼻衂不止亂髪一團如碗大燒成灰麝香研錢半右同研極細每服一錢新水調下又取少許吹鼻中立差四生飲治傷寒衂血心胸煩滿生地黄汁三合生藕汁二合生蘇薊汁一合生薑汁半合白藥子一分細末右和勻於銀石器中㣲温食後分二服升麻湯出聖濟總録治傷寒鼻衂不止頭痛壮熱升麻雞蘇莖葉􅆚藥各一分青蒿犀角鎊各半兩芒硝三分右粗搗篩每服五錢水一盞煎至六分去滓下地黄汁一合食後温服地黄飲出聖濟總録治傷寒鼻衂生地黄汁二合蜜二合右攪勻頓服加减柴胡湯出經驗良方治傷寒鼻衂柴胡去蘆八錢半夏薑製二錢半黄芩去黒心人參去蘆甘草炙三錢加生熟地黄共半兩右㕮咀每服二錢水一盞半生薑二片棗一枚煎至七分去滓温服大人倍加煎服滑石湯出本事方治傷寒衂血右用滑石末不拘多少飯丸如桐子大每服十丸㣲嚼破新水嚥下立止只用藥末一錢以飯少許同嚼下亦得老幼皆可服湯晦叔云鼻衂者當汗不汗所致其血青黑時不以多少乃得止且服温和藥以調其榮衛纔見血鮮急服此藥止之血溢湯治少陰病氣厥發衂者黄藥二兩甘草炙一兩右以水三升煮取一升去滓温分兩服治傷寒鼻衂肺間有餘熱故也血因熱自行不止用此方牡蠣二兩半石膏一兩六錢右治下篩酒服方寸匕日三四亦可蜜丸如桐子大用治大病差後小勞便鼻衂者苦參湯治鼻衂苦參三分黄連二兩梔子二七枚擘破大黄一兩地黄生乾一兩右切以水五升煮取二升半去滓分兩服吾期年已療數十人無不差者都下地黄難得無使門冬亦差忌蕪荑猪