五臟精華不獨專属於肝心肺之熱毒能乗之故時氣之後臟腑餘毒未盡熏發於目或因體虚未實多食熱毒之物皆致目病輕者赤痛重者或瞖暈輕者眼見黒花治法尤在慎飲食戒房室以就痊平不然湯劑交攻無益也龍木論云傷寒熱病後患眼此初患之時或因傷寒早起熱病後臟氣未全六腑餘熱未盡體虚易損飲食毒熱物過多致令患眼或見黒花瞳人開大發敬不定赤腫淚出冝䥥出瘀血服龍膽丸生犀飲子㵼肝湯切不宜㸃藥恐損眼也歌曰熱病傷寒可後虚因飱壅熱患雙眗睛疼一目先昏暗不乆相牽左右俱紅腫必須䥥瞼内生犀飲子最能驅次服决眀丸半濟免教白暈更相瘀未冝㸃服縁何事却恐生瘡敗黒珠瞳子怱然開黒大舊來肝腎有風虚神方用膽㸃和服雙目光眀却復初若也眼前花出現三年兩載始能除痛又云天行後赤眼外障此眼初患之時忽然赤腫疼淚出若有患者或輕或重還從一眼先患以相牽俱損切冝䥥洗去瘀血後宜服㵼肝湯用洗眼湯㸃龍腦煎即瘥歌曰忽然赤腫痛相并天行赤眼是為名厲時熱氣相傳染體性人人有重輕㵼肝飲子應須服瞼中䥥血更如星秦皮湯洗吞丸藥不差經乆翳還生忌毒也湏將息治不湏鈎烙恐傷睛若將痛藥強為㸃損敗神光實可驚已療之間何最穏多飡凉藥得平平紫眥翳膜徙消散摩之自漸愈也前胡犀角湯出聖濟緫録治傷寒後兩目昏暗或生浮瞖前胡去蘆頭羗活去蘆頭犀角屑菊花防風去叉細辛去苖葉甘草炙剉梔子仁麥門冬去心焙蔓荆子青箱子生乾地黄焙决眀子㣲炒車前子㣲炒各一兩黄蓍剉一兩半右𢷬篩每服五錢水一鍾半煎至八分去滓温服食後日三决眀子丸出危氏方治諸般眼患因熱病後毒風攻目生瞖膜遮障服此漸消退免使針刀青葙子炒防風枳殻各一兩茺蔚子細辛枸杞子澤㵼生乾地黄石决眀燒各半兩宣連半兩去鬚土當歸酒浸車前子麥門冬去心各二兩右為末煉蜜和丸如梧桐子大每服三十丸食後麥門冬煎湯送下茺蔚子丸出聖濟緫録治時氣後眼暗及有翳膜茺蔚子澤㵼各一兩半枸杞青葙子生乾地黄焙枳殻去穰麸炒各一兩石决眀細辛去苗葉麥門冬去心焙車前子各二兩黄連去鬚三兩右為末煉蜜和丸如梧桐子大每服三十丸食後漿水下人參湯出聖濟緫録治時氣患後起早勞發風眼赤痛人參地骨皮羚羊角搒防風去叉赤茯苓去黒心皮各三分升麻𤣥參黄芩去黒心各半兩决眀子㣲炒一兩右搗篩每服五錢水一盞半煎至八分食後臨卧各一服地膚子散出聖濟緫録治時氣病後眼忽失眀地膚子草决眀㣲炒沙參秦皮去粗皮人參甘菊花羚羊角屑各三分枳殻去穰麸炒半兩大黄剉炒令香一兩右為末煉蜜和丸如梧桐子大漿水下三十丸臨卧再服秦皮湯出聖濟緫録治時氣病後目赤痛不開昏暗秦皮去麄皮剉研黄連去鬚各一兩半梔子仁大黄剉炒細辛去苗葉蛇銜草苦竹葉鹽各一兩右為剉令碎爛如眼赤及痛每用五錢以水二盞煎取一盞濾去滓頻頻洗眼㵼肝散出龍木論治天行後赤眼外障知母黄芩桔梗各一兩半大黄黒參茺蔚子羗活細辛各一兩右為末以水一盞散子一錢煎至五分食後去滓温服之效生犀飲子出龍木論治傷寒熱病後患眼方見本門目昏暗類㵼肝湯出龍木論治證同前石决眀川大黄車前子桔梗芒硝各一兩羚羊角防風各一兩右為末以水一盞半散子一錢煎至五分食後去滓温服栝蔞根湯出聖濟緫録治時氣病後目赤澁痛栝蔞根剉二兩茅根剉麥門冬去黒心焙黄連去鬚石膏知母焙甘草炙各一兩右𢷬篩每服五錢水一盞半煎至八分去滓温服食後臨卧决眀湯出聖濟緫録治時氣病後眼生翳赤痛决眀子鈎藤各一兩白牡丹皮升麻各三分羚羊角鎊芍藥大黄剉炒各一兩右𢷬篩每服五錢水一盞半煎至八分去滓食後臨卧温服前胡湯出聖濟緫録治時氣後服補藥過多眼忽失眀頭疼憎寒天隂即甚方見本門丹石毒上攻目類黄耆湯出聖濟緫録治時氣病目暗黄耆剉人參各二分黄蘗去粗皮蜜炙當歸切焙各一兩枳殻去穰麸炒半兩黄連去鬚三分右麄搗篩每服三錢水一盞煎至六分去滓食後温服日三龍腦煎出龍木論治天行後赤眼外障龍腦一分秦皮宣連防風細辛甘草各半兩右為末以水一大碗浸藥末三日三夜用銀銚子煎至七分以生絹濾滓去又更入蜜四兩煎至五七沸入磁瓶内盛勿冷泄氣每用㸃眼立效菊花防風散一名防風散出聖濟緫録治時氣後餘毒不盡上攻目赤澁痛或生障瞖方見本門暴赤眼類鼢䑕土膏出聖濟緫録治時氣後服補藥過多致眼忽失眀兩􅁂脉掣頭痛憎寒田中鼢䑕土三分木香一兩大黄剉炒五兩白蘞一兩凝水石六兩右為末用酒和調如稠餳當痛掣䖏大如手掌許傅之乾即易不住頻頻貼痛處即止一方攤於帛上貼之葛根湯出聖濟緫録治時氣病後客熱暴躁目赤澁痛冷淚壮熱葛根剉車前子各三分地骨皮薺苨生切烙各一兩甘草炙半兩右麄搗篩每服五錢以水一鍾半入竹葉十片煎至八分去滓食後臨卧温服大黄湯聖濟緫録方治時氣病後風毒眼熱痛右搗篩每服五錢以水一鍾半煎至八分去滓食後温服得利即止洗眼湯出龍木論治天行後赤眼外障秦皮甘草細辛黄芩各一兩防風一兩半右為散以水三盞散三錢煎至一盞半熱洗一日兩度用之立效大黄剉炒二兩枳殻去穰麸炒黄芩去黒心菊花梔子仁此藥是大黄湯内之數竹葉湯出聖惠方治時氣病後目赤澁痛黄芩去黒心黄連去鬚各一兩升麻一兩半甘草炙半兩右麄搗篩每服五錢以水一盞半入竹葉十片煎至八分去滓入芒硝半錢須温服如人行五里再服通利即止黄連湯出聖濟緫録治時氣病後目赤痛黄連去鬚四兩芍藥二兩黄連去黒心秦皮去苗各一兩右麄𢷬篩每服五錢水一盞半煎至八分去滓食後臨卧服洗眼升麻湯出聖濟緫録治時氣病後毒氣攻目赤爛升麻二分秦皮去粗皮剉黄連去鬚萎蕤各一兩右麄搗篩作三次分用每次用水一升煎至半升綿濾去粗滓洗之蔓菁子散出聖濟緫録治時氣病後眼忽失眀但瞳人不損者蔓青子六升布袋盛急水中洗於甑中先鋪茅茅上安布布上着蔓青子蒸令勻透即取盆中湯淋暴乾如此三度為細散每食後煎湯調三錢匕温服臨卧再服一方用清酒服治毒病後目赤痛有瞖方出千金方用青布掩目上以冷水漬青布數易之治熱病瘥後百日食五辛者目視必暗用鯽魚作臛熏之治熱病後毒氣衝目痛用露蜂房半兩水二升同煎一升重濾洗目三四遍又治赤白瞖一方出千金方治傷寒熱病後攻目生瞖者用豉燒二七枚為末以管吹之或㸃亦可療天行後因犯食毒失眀兩􅁂脉掣熱痛兼頭痛憎寒天隂即發及先食英乳者前胡乾葛漏蘆萎蕤各三兩竹葉一握甘草二兩炙梔子仁二七枚生麥門冬五兩去心右切以水三兩大升煑取一大升分作三服良忌海藻生菜治熱病後眼暗失眀出千金方以羊膽傅之旦暮各一傅之熊膽丸出龍木論治因傷寒患後起早餘熱不消體虚未復多飡熱物致令眼疾或見黒花瞳人開大發不定瞼赤淚出瘀肉腫脹龍膽一箇石决眀茺蔚子各二兩黄牛膽澤㵼車前子細辛各一兩乾地黄二兩右為末煉蜜和丸如梧桐子大服清茶下一十五丸或服二十丸亦得白睛腫脹論夫目睛腫脹肝肺之候也目者肝之候白睛肺氣之所主也若肺氣壅滯肝經不利為邪熱所乗不得宣洩則毒氣上攻於目故白睛腫起或疼痛也治冝先利臟腑外傅恊腫藥及鎌去惡血無不瘥也龍木論云暴風客熱外障此眼初患之時怱然白睛脹起都覆烏睛紅腫或痒或痛淚出難開此是暴風客熱乆在肺臟上衝肝膈致令眼力浮脹白睛不辨人物此疾冝服㵼肺湯補肝散㨜銻出血後㸃抽風散立效歌曰白睛脹起覆烏睛瞼腫還應痒痛生此是暴風茀客熱来浸肺臟豈為寕㵼熱之内加風藥丸散臨時挿妙名㨜銻瘀血應須盡抽風膏藥眼中烹大黄丸出聖濟緫録治白眼腫脹不可忍大黄剉炒蔓荆子去皮丹參土𤓰根剉吳藍防風去叉甘菊花秦皮去粗皮黄連去鬚萎􅅋陳揉皮去白焙前胡去蘆頭各一兩决眀子㣲炒冬𤓰子青葙子地膚子車前子各一兩右為末煉蜜和丸如梧桐子大每服三十丸食前用温酒下日再服羚羊角散出聖惠方治眼白睛腫脹日夜疼痛心胷多悶羚羊角屑郁李仁去皮漢防己川大黄剉各一兩赤茯苓三兩木通三分防風去蘆頭赤芍藥枳殻去穰炒黄黄芩杏仁湯洗去皮尖炒黄各三分桑根白皮剉一兩甘草炙剉甜葶藶隔紙炒令紫色各半兩右㕮咀每服三錢以水一中盞煎至六分去滓食後臨卧温服桑白皮散出聖濟方治肺氣壅塞毒熱上攻睛目白睛腫脹日夜疼痛心胷煩悶桑白皮𤣥參枳殻去穰麸炒川麻杏仁去皮尖炒旋覆花去枝梗黄芩防風去盧頭赤芍藥甘草炙甘菊花去枝梗甜葶藶炒各一兩右㕮咀每服四錢水一盞半薑三片煎至八分去滓食後温服之桑根白皮散出聖惠方治眼忽然白睛腫脹如水泡者桑根白皮木通各剉犀角屑黄芩旋復花茯神川大黄剉碎炒𤣥參各一兩甘菊花半兩甘草一分炙赤剉右㕮咀每服三錢以水一盞煎至六分去滓食後温服犀角湯出聖濟緫録治肝肺風熱白睛腫脹侵盖黒睛方見本門目赤腫痛類車前子散出聖惠方治眼白睛腫脹盖瞳人車前子赤茯苓𤣥參防風去蘆頭黄芩川大黄剉碎㣲炒犀角屑甘草炙㣲赤剉梔子仁各半兩右㕮咀每服三錢以水一盞煎至六分去滓於食後温服夜卧再服藁本湯一名補肝湯治暴風寒熱外脹白睛腫脹方見本門目積年赤類車前子丸出聖惠方治眼白睛腫脹車前子决眀子梔子仁黄連去鬚牽牛子㣲炒羚羊角犀木通剉各一兩川大黄一兩半剉㣲炒右為末以牛膽汁和丸如梧桐子每於食後以温水送下三十丸洗眼秦皮湯出聖惠方治眼白睛腫起赤磣痛痒秦皮去粗皮桑白皮葳蕤各一兩𤣥參川大黄梔子仁青鹽湯澄下各半兩竹葉一握右㕮咀以水二大盞煎至一盞半入鹽濾去滓㣲熱淋洗冷即再煖之𤣥參丸出聖惠方治肺臟積熱白睛腫脹遮葢瞳人開張不得赤澁疼痛𤣥參羚羊角川升麻漢防己杏仁湯浸去皮尖雙仁麸炒黄沙參去蘆頭車前子桑白皮剉梔子仁各一兩大麻仁川升麻剉碎微炒各一兩半右為末煉蜜為丸如梧桐子大食後以温水下二十丸臨卧時再服羚羊角湯出聖惠緫録治肝肺熱毒攻眼白睛腫起方見本門五風熱眼類㵼肺湯出龍木論治暴風客熱外障白睛腫脹羗活黄芩黒參各一兩半桔梗大黄地骨皮芒硝各一兩右為末以水一盞散一錢煎至五分食後温服抽風煎出龍木論治暴風客熱外障白睛腫脹黄蘖秦皮秦芁防風細辛各一兩黄連木香各半兩右為末以水二盞浸一宿去滓入龍腦少許蜜四兩同煎為膏㸃眼大青散出聖惠方治肝肺大熱白眼腫脹葢復曈人疼痛川大黄碎剉㣲炒大青羚羊角屑梔子仁桑白皮剉各一兩右㕮咀每服三錢水一中盞煎至五分去滓入生地黄汁半合服之日三四服一方甘草硃砂煎出聖惠方治眼白睛腫起赤澁疼痛硃砂細研杏仁湯浸去皮青鹽各一分馬牙硝細研黄連各半兩末右研勻綿裹用雪水三合浸一宿入瓷合中銅筯㸃少許大黄散出聖濟總録治肝肺大熱白睛腫脹葢覆瞳人疼痛川大黄剉碎黄連各一兩羚羊角屑各一兩右㕮咀每服三錢水一盞煎至六分去滓食後温服日三貼恊方出聖惠方治眼白睛腫脹赤澁熱痛川大黄𤣥參川朴硝各一兩右為細末以生地黄汁調勻令稠攤於綿上貼之下瞼目睛疼痛論夫肝氣通目目者肝之宫又五臟六腑之精氣皆上注於目然目有五輪内應五臟而骨之精為瞳人筋之精為黒睛若肝腎熱火寔或上膈壅滯風邪毒氣上攻於目皆令目睛疼痛也龍木論云神瞳疼痛外障蔽眼初患時舊無根基忽然發動疼痛如錐刺瞼皮如臠炙此痛不可忍且求神童然後服藥補治臟腑不得鈎割熨烙不尔恐生瞖障冝服羚羊角飲子㸃秦皮煎立瘥歌曰舊沒根基患忽然疼痛如錐刺不安或加針炙來相近求他神瞳不虚言痛定須還湯藥治莫教風熱更留連不須割焙并燒炙㸃法秦皮作散煎眼痛疼如針刺外障此眼初患之時㣲有頭痛目眩眼系常急夜卧澁痛泪出難開時時如針刺相似是自心臟伏毒熱氣壅滯在膈中以後漸生障翳遮滿相牽俱損如此疾状冝服㵼心湯補肝散兼銻洗出血火針太陽穴立效歌曰忽然睛内痛如針邪熱潛藏伏在心遂使兩眸兼系處肉眗急則痛鋟鋟太隂穴内將針刺易飲宣通冝洗淋磣澁難開由瞼内按銻出血自能禁光眀散治眼痛當歸藿香五錢細辛三錢半兩頭尖一兩白芷二兩枯礬二錢半蝎稍半錢石膏一兩何首烏一兩半薄荷半兩黄連一兩半川芎半兩甘草一兩半皂莢一兩半燒存性右為細末每服一二錢臨卧茶清調服忌熱物羚羊角散治肝壅熱眼睛眼赤澁疼痛心神煩熱羚羊角屑茯神防風去蘆頭地骨各一兩石膏麥門冬一兩半焙去心黄芩甘草炙㣲赤剉枳殻麩炒㣲黄去穰蕤仁湯去赤皮犀角屑川芒硝各三分右㕮咀每服四錢以水一中盞煎至六分去滓入生地黄汁半錢更煎一兩沸每於食後温服治睛疼難忍者白芷赤芍藥細辛防風各等分右為末每服三錢以水一盞入砂糖二錢同煎至七分去滓温服不拘時地骨皮散治肝臟壅毒氣上攻眼睛赤澁疼痛心燥體熱地骨皮川升麻𤣥參甘草炙㣲赤剉防風去蘆頭黄芩各一兩赤茯苓桑根白皮剉各二兩羗活决眀子柴胡去苗各二兩半石膏三兩右㕮咀每服四錢以水一中盞入薑半分淡竹葉二十七片黒豆五十粒煎至六分去滓每服食後温服𤣥參散治上膈壅滯風邪毒氣攻目令目睛疼痛𤣥參大黄剉炒各二兩半菊花决眀子車前子黄連去鬚枳殻去粗夫炒各二兩梔子仁防風去叉各一兩半苦參剉半兩升麻二兩右為細散每服三錢匕食後臨卧蜜水調下日三治目生弩肉各二兩半米飲下細辛散治目睛疼痛及腹脇滯悶由肝氣上壅細辛甘草炙黄剉各半兩川升麻丹參各三兩芎藭當歸去蘆頭赤芍藥剉黄芩去心㯽榔川大黄剉炒枳殻麸炒黄色桹各一兩右為末散每服三錢匕水一盞煎至六分去滓食後温服忌炙煿熱麺洗肝前胡湯治目睛疼痛如脱前胡升麻枳殻去瓤麸炒各二兩防風去又車前子各一兩甘菊花黄連去鬚各半兩細辛去蘆葉苦參各三兩右㕮咀每服五錢匕以水一盞半煎至七分去滓投芒硝末半錢於食後臨卧温服旋覆花湯治風毒攻衝目睛疼痛方見本草門目赤痛類甘菊花散治諸風毒頭目睛中如針尖刺痛及欲成障瞖甘菊花川升麻芎藭細辛黄連去鬚川大黄剉碎㣲炒各一兩防風去蘆頭甘草炙㣲赤剉各三分石膏二兩羚羊角屑一兩半右㕮咀每服四錢以水一中盞煎至六分去滓每於食後温服之梔子散治上焦壅熱睛眼疼痛大小便秘澁心神煩燥不得睡卧梔子仁黄連去鬚龍膽去蘆頭赤芍藥川大黄剉碎㣲炒大青各一兩枳殻麸炒㣲黄去穰甘草炙㣲赤剉各三分柴胡去苖一兩半右㕮咀每服四錢以水一盞至六分去滓每於食後温服之蔓荆實湯治目睛疼痛上連頭疼一名羗活散蔓荆寔去皮甘菊花羗活去蘆頭黄芩去黒心芎藭防風去蘆各一兩石膏三兩甘草炙剉半兩右㕮咀每服四錢匕水一盞半煎至七分去滓食後臨卧温服之羚羊角湯治目睛痛上連頭并頰骨俱痛不可忍生障泪出羚羊角鎊黄芩去黒心芎藭石膏大黄剉炒芒硝研各一兩芍藥一兩半柴胡去苗三兩右㕮咀每服三錢匕水一盞入淡竹葉十片煎至七分去滓食後臨卧温服羚羊角飲子治神崇疼痛外障羚羊角二兩天門冬車前子人參茯苓大黄黄芩黒參各一兩右為末以水一盞散一錢煎至五分食後去滓熱服㵼心湯治眼痛如針外障大黄黄芩桔梗知母各一兩防風三兩馬兠鈴黒參各一兩半右為末以水一鍾散一錢煎至五分食後去滓温服補肝散治眼痛如針刺外障人參茯苓五味子芎藭藁本各一兩茺蔚子細辛各一兩右為末每日空心米飲送下一錢竹葉湯治風邪攻目令目睛疼痛方見本門草目暴腫類括痛散治兩額角痛目睛時見黒花及目赤腫類脉眩欲作内障多得之於飢飽勞役柴胡一兩半甘草炙七錢半𤓰蔞根二兩生地黄各一兩黄芩四兩一半剉炒皂色一半酒温過日乾右㕮咀每服三錢水一盞半生薑三片棗一枚臨卧熱服如小便不利加茯苓澤㵼各半兩地骨皮散治目睛疼痛睡卧不安地骨皮川大黄剉炒井泉水石各二兩甘草半兩炙黄剉石膏三兩研水飛右為細末入石膏更研勻每服二錢匕食後以白米泔調下秦皮洗眼湯治目睛疼痛秦皮秦芃𤣥參各一兩柴胡去苗二兩甘草半兩右粗搗篩每用一兩以水三盞煎至取一盞半綿濾去滓㣲熱洗淋冷即再煖用如聖散治睛痛不止青黛一兩盆硝牙硝各七錢井鹽半兩片腦少許右研勻鼻内㗜少許秦皮煎治神崇疼痛外障秦皮黄耆木香黄連黒參各一兩右為細末以水一鍾浸藥三宿去滓入蜜四兩煎為膏用之一捻金方治睛眼痛乳香沒藥黄連雄黄盆硝各等分右為細末鼻内嗅之救苦散治眼睛痛不堪忍川芎當歸防風各半兩防己半兩右為細末每服二三錢熱酒調治睛疼難忍川當歸防風細辛薄荷各等分右為末麥門冬熱水調下食後半夜各一服白定眼藥定痛消腫去翳可鐵刺如無以白芨粉代之阿飛勇各一錢李子樹膠四錢白錫粉炒水飛八錢右為細末鷄子清為定丹妳女兒乳汁於光磨石上磨汁無時㸃之吹鼻碧玉散治邪熱攻衝目睛疼痛硝石一分龍腦青黛各一錢右合研令細每用一豆許㗜兩鼻内當歸立效散凉血定眼疼痛當歸大黄各一兩乳香少許定研一錢右剉碎分作三服每服七錢以水二鍾煎至一盞半去滓温服食後臨卧㸔虚寔加减服之治眼痛方當歸鬚木賊蓽撥右為末以茶水調浸舌出涎二聖散治眼痛不可忍者通聖散一兩半四物湯五錢右和勻每服五錢水二盞煎至二五沸食後温服貼藥方治眼腫痛用生薑自然汁調飛過白礬貼眼胞上痛即止治發熱眼目腫痛方用萹蓄根一握洗净以少水絞汁服之若熱腫䖏𢷬根莖傅之良通頂抽風散治眼睛如針刺疼痛用硝石二兩以新瓷瓶内盛漸以火鎔成汁以生蘿蔔子時時投三二十粒入於硝内候煙出盡又投直候蘿蔔子硝石無聲然後慢慢去火放冷敲破瓶取出研如粉用蘿蔔子一兩去揀净秖取半兩麝香半錢合研令細每服用半字内筆管中猛用力吹入鼻内隨左右痛䖏當有清涕水出其疼痛立止决眀散出永類鈐方治熱淚如湯腫痛羞眀五臟積熱腫塞不開暗疼加沒藥當歸川芎大黄黄芩木賊去節赤芍藥山梔仁菊花粉草各等分右為細末每服二錢以生地黄水煎食後服石人屏曽氏家藏川芎散出永類鈐方治眼睛疼頭痛沙澁流淚眩爛風痒障膜遮睛及治積年頭風川芎羌活防風菊花荆芥穗殭蠶洗炒撫芎蒼术製白芷石膏煆細辛凈芎鬚水洗香附炒各一兩川烏炮淮烏黒豆煑各半兩去皮尖右為細末食後茶湯清調一大錢服頭痛䓤白湯調下常服薄荷茶調羞眀加朴硝乳香散出永類鈴方治睛疼乳香沒藥青皮陳皮草烏各等分右為末茶清或清子調貼眼目上普濟方卷七十六
