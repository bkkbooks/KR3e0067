body:
  text: 普濟方卷七十六眀周王朱橚撰眼目門目風腫夫肝氣有熱衝發瞼眥則令人瞼肉暴腫風冷乗之則凝結不散甚則長大衝腫若梅李核故謂之風毒病源云目為肝之外候肝虚不足則為冷熱所干故氣上衝於目外復遇風冷所撃冷熱相搏而令瞼肉結腫或如杏核或如酸棗之状腫而因風所發故謂之風腫茵蔯蒿散出聖濟緫録治一切目風腫痛茵陳蒿荆芥穗羗活去蘆木賊剉旋復花石决眀蒺䔧子㣲炒去角草决眀各等分蔓荆子甘草炙剉芎藭蒼术米泔浸一宿切焙右為細末毎用一錢以新汲水調下不拘時日三防風丸出聖濟緫録治目風腫痛防風去蘆茺蔚子車前子知母各二兩細辛去苖葉五味子各一兩半黄芩去黒心桔梗剉炒人參𤣥參右為末煉蜜丸梧桐子大每服三十丸米飲下食後服蟬殻散出王氏𫝊濟方治眼目風腫兼生瞖膜等疾蟬殻地骨皮黄連宣州者去鬚牡丹去心白术蒼术米泔切焙菊花各一兩龍膽草半兩甜𤓰子半升右為末每服一錢半荆芥煎湯調下食後臨卧各一服大治時疾後餘毒上攻眼目甚效忌熱麺牙豆醋醤等梔子湯出聖濟緫録治風熱毒氣忽衝眼腫白睛似水泡疼痛不可睡卧山梔子仁升麻决眀子㣲炒黄芩去黒心各三分黄連去鬚乾藍葉大黄剉炒各一錢右粗搗篩每服五錢以水一盞半煎至八分去滓入朴硝末半錢煎兩三沸放温服卧再服洗眼秦皮湯出聖濟緫録治風熱目赤腫痛方見本門日飛血赤脉類大黄湯出聖濟緫録治眼風腫熱大黄剉炒四兩麻黄去根節山梔子仁旋復花各二兩甘草炙剉一兩右粗搗篩毎服五錢以水一盞半煎取八分去滓入朴硝末半錢於食後臨卧再服胡黄連散出聖濟緫録治目風臉眥暴腫漸長大如梅李核或弩肉疼痛或小兒疳障胡黄連菊花各二兩黄芩去黒心大黄剉甘泉石各一兩右為末每服二錢次用猪子肝二兩竹刀細剉以新汲水二合攪和濾取汁調下兒每服一錢圓靈丸出聖濟緫録治目風腫攀睛膚瞖赤脉腫焮蒼术四兩黄蘗去粗皮甘草各一兩牽牛用四兩取末一兩荆芥穗二兩右為末用蒸餅去皮以蜜水蘸令乾濕得所杵和丸彈子大每服一丸食後以荆芥茶嚼下日三服枳實湯出聖濟緫録治風腫目赤脹痛大毒熱淚出枳實去穣麸炒苦參車前子各一兩黄連去鬚半兩右麄篩搗毎服五錢用水一盞半煎取八分去滓食後臨卧服之黄連丸出聖濟緫録治肝臟壅熱上衝眼目令瞼肉風腫黄連去鬚一兩半防風去叉一兩惡石實炒二兩右焙過搗為細末煉蜜和丸如梧桐子大每服三十丸食後温水下臨卧再服䜴心丸出聖濟緫録治熱目風腫䜴心二兩黄連去鬚三兩右為末煉蜜和丸如梧桐子大每服三十丸食後温水下吹鼻散出聖濟緫録治眼風腫枸杞白皮雞子白皮等分右為末研令極細毎日三上吹鼻内驅風散出聖濟緫録治目眼風瞼暴腫凝結不散甚之則如梅李核方見本門風毒衝目虚熱赤類治目中風腫痛除熱揉眼方用礬石三兩燒令汁盡以棗肉膏和如彈子大丸揉眼上下食項日三止又方用石頭垢著眥中治風毒無見千里望散出肘後方用錢三枚入鷄子内好泥封厚一二分許着竈中燒之周時出當黒刮錢上鷄子置石上以乾薑磨令細以傅目頭黄連散龍木論以乳汁煎黄連不拘多少洗眼亦治目中百病㸃之效糖煎散出衛生家寳治風腫熱毒赤腫眼當歸赤􅆚藥甘草天花粉木通金銀藤漢防己山梔子等分右為麄末每服二錢水一盞煎至七分入砂糖一塊如彈子大再煎一二沸去滓先熏後通口服食後臨卧時宣風散出保命集治眼風毒腫鼻中嗹嚏多大損而生瘡川芎甘菊各二錢乳香沒藥右和勻再研極細少許鼻内㗜之一方出海上方治兩眼如桃用鷹爪黄連净洗搥碎小盞留古老錢一錢於盞下上面攤黄連又其上以水國葉即熱水草也二三十片葢於黄連上用水六七分飯上蒸一兩次留冷用當歸三錢㸃眼即愈治目中風腫痛出本草取薤白節截仍以膚上令遍膜眥瘥頭卒痛者止之目風眼寒論夫風入係頭則為目風眼寒夫五臟六腑之精氣皆上注於目血氣與脉並上属於腦今風入係頭則血脉凝滯不能上注於目又肝主目而惡風肝受血而能視今風寒客之故今目風眼寒此候其状青色大小眥頭澁痛頻頻下淚口苦不喜飲食葢胆受風寒宜服凉膽丸至冬月極甚發作不休此因肺虚風遇冷發宜服白殭蠶散犀角丸出聖濟緫録治風入係頭目眼風寒昏暗多淚宜常服生犀角鎊半兩𤣥參苦參剉各三分丹參沙參各半兩甘菊花車前子各三分旋復花知母焙各半兩牽牛子炒令熟杏仁湯浸去尖皮雙仁大黄剉炒黄蘗去粗皮剉各一兩㯽榔剉前胡去蘆白蘚皮芎藭各三分槐子芍藥各一兩右為末煉蜜為丸如梧桐子大每服三十丸食後煎苦竹葉湯下臨卧再服菊花散出聖濟緫録治風毒攻入係頭目風眼寒及昏澁等疾菊花二兩石膏水飛各半兩旋復花一兩芎藭惡實炒白蒺䔧炒去角右除石膏外為散和勻食後臨卧熟水調下一錢服補肝散一名細辛湯治目風眼寒及昏腫多淚方見本門内障膜類防風散出聖濟緫録治眼衝風寒多淚方見本門目偏視風牽類羗活散出聖濟緫録治風邪入係頭目風眼寒頭目昏痛羗活去蘆蛇蛻一條捲青上炙防風去蘆黄耆木賊附子炮裂去皮臍蟬蛻洗荆芥穗甘草炙甘菊花蒺䔧子炒去角旋覆花石决眀泥褁燒令通赤别研各一兩右除附子蛇蛻决眀外餘皆剉碎於新瓦上焙令燋為散毎服二錢匕用米泔煎熟令温調下日三服四眀丸出聖濟緫録治風毒氣上眼目昏暗及偏正頭痛兩目漸覺細小及有夾腦風疼目風眼寒等疾芎藭天麻用水煑過切焙半夏水煑洗去切焙桑螵蛸大者剉炒旋復花羗活去蘆藁本擇粗者洗焙乾青揉皮湯浸去白皮附子炮裂去皮臍天南星炮各一兩右為末用生牽牛三兩熟牽牛三兩杵取末二兩與前藥末勻生薑汁煑麵糊為丸如梧桐子大每服空心臨卧鹽湯或米湯下二十丸三十丸立效凉膽丸出危氏方治眼壮青色大小眥頭澁痛頻頻下淚口苦不喜飲食黄連洗不見尖荆芥黄芩草龍胆各半兩蘆薈防風各一兩黄栢去粗皮地骨蘆子各一分右為末蜜丸梧桐子大每服三十丸薄荷湯下眀目蒼术丸出聖濟緫録治目風寒眼等疾蒼术去黒皮白蒺䔧木賊各一兩旋復花五兩楮實半斤蔓青子一升大豆二合右為末煉蜜和丸如彈子大每服一丸爛嚼冷熟水下不拘時候芎辛丸出聖濟緫録治眼目寒頭昏疼芎藭細辛去苖葉蟬蛻去土荆芥穗菊花蒼术米泔浸三日竹刀子刮去皮切各一兩􅅋仁三分和皮右為末煉蜜和丸如彈子大每服一丸細嚼酒下或鹽湯不拘時候白殭蠶散出危氏方治眼風至冬月極甚遇風冷發白殭蠶去系嘴炒粉草細辛各半兩木賊旋復花蒸熟焙各半兩荆芥一分黄桑葉嫩者一兩右剉散毎服三錢水一盞半煎食後温服芎藭湯出聖濟緫録治目風眼寒昏痛澁淚芎藭一両半防風去叉芍藥絡石各一兩大黄剉炒半兩右麄搗篩每服五錢水一盞半煎至七分去滓净候温食後服臨卧再服菊花丸出聖濟緫録治一切風眼及風攻頭目寒甘菊花人參白茯苓去黒皮山芋各等分右為末煉蜜為丸如梧桐子大每服食後臨卧熟水下三十丸治眼衝風寒多淚出聖濟緫録酸􅀥仁五味子蕤仁各一兩右為末食後温酒調下一錢石膏散出宣眀論治目風眼寒及偏正頭風夾腦風鼻出清涕眼目冷疼痛石膏三兩火煅過芎藭甘草炙剉半兩右為細散㸃生䓤好茶調下食後日二服目風淚出論夫五臟六腑皆有津液肝開竅於目其液為淚肝氣既虚風邪乗之則液不能制故常淚出衝風則甚也龍木論云衝風涙出外障此眼初患之時盖因腦風入眼淚乃遂出拭即還生冬月淚即多夏月涙即少後至三五年間不以冬夏皆有出此葢為淚堂通肺臟中乆冷便令眼目轉加昏暗難辨物色宜服細辛丸暖肺湯以銅筯燒焙睛眀穴㸃止涙散乃得痊効歌曰風衝淚流血還流每到三冬發不休傾則淚堂通肺臟細辛丸散㫁根由雄黄五味迎風㸃銅筯炎燒烙眥頭早早勸君醫治却他時免使我心憂事親書云風目有淚出俗言作冷淚者非也肝液不禁此大熱薫蒸於肝也熱極生風風衝於外火發於内風熱相摶此淚出也内外皆治可愈也治外以貝母一枚白膩者加胡椒七枚不犯銅鐵研細臨卧㸃之治内者去風散熱之劑可用當歸飲子服之陽熱極甚者目精發痛不可忍者用四物湯加漢防己與草龍膽送下神芎五七十丸利三五行則愈犀角散出聖惠方治肝臟壅毒眼目昏暗熱涙出不止方見本門目風眼寒類决眀散出聖惠方治眼赤痛或生瞖及多風淚决眀子㣲炒菊花蔓荆子去皮車前子茺蔚子黄連去鬚防風去叉荆萱子逺志去心白芷秦皮去粗皮𤣥參枳殻去穰麸炒細辛去苗葉蕤仁湯浸去赤皮赤茯苓人參各一兩右為散每服二錢食後良乆温酒調下臨卧再服兔肝丸出聖濟緫録治肝腎風虚目昏乆視無力涓涓淚下兼頭風痛兎肝兩具炙乾臈月取防風去叉黄連去鬚地骨皮麥門冬去心炒决眀子㣲炒各一兩半茯神去木一兩苦參剉一兩秦皮去粗皮大黄剉炒甘菊花各一兩車前子一兩半龍齒搗研二兩枳殻去穰麸炒半兩右為末煉蜜丸如梧桐子大每服三十丸食後温漿下前胡散出聖濟總録治腎臟風毒衝眼赤痛淚出前胡去蘆羚羊角屑茯神各三分防風去蘆川朴硝白芷各兩决眀子木通剉五味子各二兩𤣥參地骨皮各半兩川升麻二分右為麄散毎服三錢水一鍾煎至八分去滓温服食後日三羗活散治目風冷涙乆不瘥羗活去蘆二兩木香艾葉焙桂去麄皮山芋升麻胡黄連各一兩白附炮山茱茰牛膝酒浸切焙各三分右為散每服二錢空心鹽湯調下午時麥門冬熟水下菊花散治目風淚出蒼术四兩肥者用銀石噐入河水同皂莢一寸煮一日出皂莢取术以銅刀去黒皮暴乾取三兩荆芥穗木賊新者草决眀洗暴乾旋復花去蕚甘草炙剉各一兩蟬退洗焙三分蛇蛻洗炙一分右為散用不津噐盛每服一錢臘茶半錢同㸃空心臨卧服白芷丸治肝腎虚風多淚漸昏及生翳膜白芷細辛去苗葉五味子枳殻去穰麸炒石决眀洗各一兩茺蔚子二兩熟乾地黄􅅋仁各二兩右為細末煉蜜為丸如梧桐子大每服二十丸食後温水下每日三服治目風淚浮翳多膿爛眥方乾薑决眀子礬石蕤仁細辛黄連戎鹽各六銖銅青三錢銖右㕮咀以少許水浸一宿明旦以好白蜜入合和之着銅噐中綿葢噐上著瓶中以三斗麥屑蒸之飯熟藥成絞去滓以新死大雄鯉魚胆二枚和内藥中又以大錢七枚常著藥底兼常著銅噐中竹簮綿裹頭以注目眥頭晝夜三四不避寒暑數著藥乾又以魚膽和好覆藥噐頭勿令氣歇細辛丸治衝風涙出外障細辛防風各二兩五味子乾地黄各一半人參茯苓地骨皮乾山藥右為末煉蜜為丸如梧桐子大每服空心茶下一十丸一方用鹽湯下日再暖肺散治證如前茺蔚子細辛五味子各二兩防風藁本各一兩半知母黄芩芎藭各一兩右為末以水一盞散一錢煎至五分食後去滓温服治頭風冷涙甘菊花决眀子各三分白术羗活川芎細辛白芷荆芥穗各半兩右為細末温湯調下食後日三服之蟬蛻餅子治目風冷淚去翳暈蟬蛻洗焙木賊新者甘菊花各一兩荆芥穗芎藭各二兩甘草炙剉半兩蒼术米泔浸切焙乾三兩右為細末煉蜜為丸捏餅子如錢大每服一餅食後良乆細嚼臘茶下日三服防風飲治風淚眼防風去叉黄芩去黒心萎蕤黄連去鬚甘草炙剉各一兩竹葉洗三十片山梔子仁三分右剉每服三錢水一盞煎至七分去滓食後服日再黄末眼藥治風眼冷淚