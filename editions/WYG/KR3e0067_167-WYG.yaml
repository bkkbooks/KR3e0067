處為細末同巴豆杏仁霜一處拌勻先下油熱次蠟熬鎔傾在藥末内和成劑旋丸如菉豆大每服三五丸熟水下食後臨卧服小兒如黍米大二三丸乾薑湯下傷滯糞白有效五積散治五積六聚并酒積蠱氣所傷石榴皮荆三稜巴豆五靈脂大㦸芫花甘遂甜葶藶杏仁大黄烏梅鹽豉各等兩分以上一十二味頭醋三碗煑盡乾於沙鍋内炒黄色加陳皮青皮木香瞿麥豆蔲砂仁六味在内一處相和研為細末每服一錢空心溫酒調下病重二錢如為丸以醋打糊為丸如菉豆大每服一十五丸至三十丸傷酒葛根湯下傷食鹽湯下氣蠱木香湯下水蠱樟栁根湯下順逆丸主乆寒積聚氣逆不能食大黄一錢黄芩厚朴炙乾地黄桂心滑石杏子去皮尖熬黄連麥門冬去心各四分右擣合下篩以蜜和丸如桐子大每服十丸日再服後食不加稍増之以加為度忌蕪荑生葱猪頭肉黄藥針砂丸針砂青皮陳皮乾漆黒牽牛白礬青礬緑礬各四兩蒼术半斤米泔浸一兩右除蒼术半斤餘四兩用米醋兩碗將三礬共針砂煮令醋乾共為末醋糊為丸如桐子大每服三十丸一日一服積氣丸出聖濟總錄治一切積滯痰逆惡心霍亂吐瀉膈氣痞滿脇肋積塊胸膈膨悶嘔噦心痰泄痢不止代赭石煅醋碎研礞石研各一兩桂去粗皮赤茯苓去黒皮硼砂研青橘皮去白焙各半兩胡椒四十九粒巴豆去皮心膜研四錢右擣羅四味為末與四味研者和勻酒煮面糊丸如梧桐子大每服一丸至三丸食後木香湯下三稜煎丸出和劑方治積順氣寛中消積滯化痰飲治中腕氣痞心腹堅脹脇下𦂳硬胸中痞塞喘滿短氣喑心氣不通嘔吐痰逆飲食不下大便不調或瀉或秘杏仁湯浸去皮尖麩炒黄色硼砂飛研一兩神麯碎炒麥蘖炒各三兩青皮去白乾漆炒蘿蔔子㣲炒各二兩三稜生細剉擣為末八兩以酒三升石器内熬成膏右為末以三稜膏勻搜和丸如桐子大每服十五丸至二十丸溫米湯飲下食後服加阿魏丸姜湯下蓬莪茂丹出御藥院方治乆患癖瘕積聚心腹疰悶飲食减少四肢困倦欲成勞瘵常服調和榮衛美進飲食消積聚長肌肉蓬莪茂荆三稜木香白芍藥鱉甲各五錢白术人參各一兩當歸二錢五分右為細末用浸蒸餅為丸如豌豆大每服三十丸食後溫粥飲下握藥宣疾巴豆乾薑韮子良薑硫黄甘遂白檳榔各等分右為末研飯為丸如中指頭大用時早朝用椒湯浸手了麻油塗手掌中握藥一丸移時便瀉欲得瀉止即以冷水洗手男左女右手心握夲事方有肉桂附子生薑橘皮丸出楊氏家藏方升降滯氣消飲去痰溫中散寒美進飲食陳橘皮一斤生薑一斤薄切神麯二兩右為細末麵糊和丸如梧桐子大每服五七十丸米飲熱水下食後無問老幼皆可服七香丸通中快氣丁香檀香益智仁甘草各一兩木香蓬莪术一兩五錢香附子一兩五錢右七味甘草膏丸如鷄頭子大服時薑湯嚼下兩三粒治一切結實衝胸膈惡氣用水薑汁煎服治積聚痰飲不下飲食嘔逆及腹内諸疾宣一切宿滯以續隨子研碎酒服之不過三顆當下惡物又單方日服十粒瀉多以酸漿水薄醋粥吃即止治身熱腹中積聚邪氣痞悶中如火燒煩滿以凝水石研水飲之治胸膈中積食以醋水飲之下氣止渴用温荸臨卧噉三枚而寢生熟皆宜取積妙應丸家傳經驗專取男子女人小兒諸般積滯氣多因茶酒生菓肉麵所傷又為悲憂喜怒之氣欝結心懷積成癖痺癥瘕大如杯碗不消諸種蟲積及治黄疸水蠱徧身浮腫翻胃吐食九種心痛一切風症婦人血瘕淋帶經脉不通腹内如懐胎孕及成鬼胎小兒脾疳積滯並皆治之此藥不動元陽眞氣服後肚腹平復亦不疼痛雖年幼氣弱小兒加减服有利無害檳榔一斤大黄一斤牽牛末二斤貫衆半斤蕪荑仁半斤另研雷丸半斤鶴虱四兩錫灰四兩阿魏二兩另用酒化開揉右為細末用皂角去皮弦子净一斤半熱水泡浸搓橘水汁濾去滓與藥末皂角水再入糊為丸如桐子大每服稱四錢重作一服五更用葱白七根熬湯送下仍以棗兒三箇食之壓藥次早天明後臟腑一行後取下惡積之物如有積者盡去數行如止見稀水無積物即用溫薄米粥補住治諸般積滯神效沉香一錢木香五分雷丸二錢青皮五分京三稜一錢黒牽牛頭末一錢五分石三稜一錢縮砂五分蓬莪术一錢檳榔五分白牽牛頭末一錢右為細末先將水一大碗隔宿滚五七沸露一宿空心每服四錢調服如多時不動再服二錢行五七遍不止用白米湯補之小兒服二錢婦人加琥珀如吃藥後忌諸般生冷物油醬醋三日用白粥妙香丸出聖濟總録治積聚留滯胸膈痞悶嘔噦吐逆心腹刺痛脇肋脹滿噫氣呑酸宿食不消痃癖結塊四肢倦怠不思飲食檳榔一錢剉桂去粗皮丹砂研麝香五分研桃仁去皮尖雙仁炒各半兩巴豆二十五粒去皮心膜研出油附子炮製去皮臍一兩右為末溫浸炊餅和丸如桐子大每服一丸食後溫木香湯下或生薑湯下更量虚實加減積氣丸出聖濟總録治一切積滯痰逆惡心吐㵼霍亂膈氣痞滿脇肋積塊胸膈膨悶嘔噦心疼泄㵼下痢大㦸龍膽木香各半兩杏仁去皮尖雙仁炒研代赭煅醋淬赤石脂水飛研各一兩巴豆去皮心膜研右研極細以麵糊為丸如桐子大隂乾經十日方可服每三丸至五丸木香湯下溫湯熱水亦可感應丸出衛生家寳治虚中積冷氣若有傷停積胃腕不能傳化或因氣傷冷因飢飽食醉酒過多心下堅冷兩脇脹痛心腹大疼霍亂吐瀉大便頻數併後遲滯乆痢赤白膿血相雜米榖不消愈而復發又治中酒嘔吐痰逆惡心喜睡頭旋胸膈痞悶四肢倦怠不欲飲食又治妊娠傷冷新産有傷日乆有積寒吃熱藥不效者又治乆病形羸荏苒歲日漸致虚弱靣黄肌瘦飲食或進或退大便或秘或澁不拘乆新積冷並悉治之大病不過三服便見全愈此藥溫無毒並不燥熱損胃氣亦不吐泄袛是磨化積聚消逐濕冷療飲食所傷快三焦滯氣旋丸如菉豆大每服三五粒量虚實加减溫水吞下不拘時候服進飲食消酒毒令人不中酒又治小兒脾胃虚弱累有傷滯糞白鮓臭下痢水糓每服五粒黍米大乾薑湯下不拘時候百草霜用村庄家鍋上底刮者細研二兩南木香去蘆頭二兩半杏仁肥者去雙仁者一百四十枚去皮尖湯浸一宿别研丁香肉豆䓻去麤皮巴豆七十枚去皮心膜研細出盡油如粉川甘薑炮製一兩右除巴豆粉百草霜杏仁三味外餘四味𢷬為細末與三味同拌硏令細用好蠟匱和先將蠟六兩鎔化作汁以重綿濾去滓以好酒一斤於銀器内煮蠟鎔數沸傾出候酒冷其蠟自浮取蠟稱用凡春夏修合用清油一兩於鍋内熬令末散香熟次下酒煮蠟四兩同化作汁就鍋内乗熱拌和前項藥末秋冬修合用清油一兩半同前煮熟作汁和匱藥末成劑分作小錠子以油單紙裹旋丸服餌此髙殿前家方也若腹痛疼不可忍者當服此藥以大便通利為效或未通更宜倍加丸數雖多服無害以利為期若利後腹大不調或泄㵼不止或愈見絞痛當以家菖蒲煎湯觧之却於咬咀方中選藥調理自能平復或者見服藥之後痛或愈甚既流利而痛未除便謂前藥之訛殊不知乃隂陽擾亂臟氣未平乆當自定治赤白痢臍腹疼痛者多由腸胃間積滯所致先以此藥㣲利兼治男子痃癖疝氣膀胱賁豚腎氣脚氣攻刺亦用此藥㣲㣲疏利酒積食積痰飲為患婦人血氣並宜服之夲是髙家真方丁香木香止用半兩宫方加青木香蓽澄茄枳殻三稜薑黄檳榔白豆蔲積聚湯一名大功氣湯治積氣或一邊或左右或不循行上下或肌肉之間如錐刀所剉其氣不得見令人腹中痛滿由驚憂患怒或胃寒熱留而不去為伏欝之氣因氣流行隨經上下相摶而痛乆令人痞悶其脉短澁胃之聚氣狀如癥瘕攻刺腰脇上氣滯塞小腹䐜脹大小便不利或泄㵼淋瀝無度三稜莪术青皮去白陳皮去白桂心不見火藿香葉桔梗去蘆剉炒益智仁香附子各一兩五錢甘草三錢炙右咬咀每服五六錢水二盞煎至一盞去粗溫服食前捶鑿丸療腹中積聚邪氣寒熱消糓甘遂芫花芫花桂心巴豆杏仁桔梗各一錢右芫花一味熬令香巴豆杏仁去皮熬令變色赤各藥𢷬下細篩𢷬合和以白蜜𢷬萬杵丸如小豆大一丸日三行常將服之傷寒增服膈上吐膈下利小兒亦服婦人兼身亦服名曰捶鑿以消積滯忌猪肉蘆筍生葱普濟方卷一百六十八
