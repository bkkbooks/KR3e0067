body:
  text: 普濟方卷一百六十八明周王朱橚撰積聚門總論夫積有五而聚有六積者生於五臓之隂氣也聚者成於六腑之陽氣也此皆隂陽不和臟腑虚弱風邪摶之所以為積為聚也有如憂思喜怒之氣人之所不能免者過則傷乎五臟逆於四時傳克不行乃留結於五臟是為五積故在肝曰肥氣在心曰伏梁在脾曰痞氣在肺曰息賁在腎曰賁豚其名不同其症亦異肥氣之狀在左肋下大如覆杯肥大而似有頭足是為肝積診其脉弦而細其色青其病兩脇下痛意引小腹足寒轉筋男子為積疝女人為瘕聚伏梁之狀起於臍下其大如臂上至心下猶梁之横架於胸膈者是為心積診其脉沉而芤其色赤其病腹熱面赤咽乾心煩甚則吐血令人少食肌瘦痞氣之狀留在胃腕覆大如杯痞塞不通是為脾積診其脉浮大而長其色黄其病饑則减飽則見胸滿吐嘔足腫肉削乆不愈令人四肢疲軟息賁之狀在右脇下覆大如杯喘息奔溢是為肺積診其脉浮而毛其色白其病氣逆胷滿少氣善忘目睻膚寒皮中時痛或如虱縁或如針刺其脉沉而急其色黒其病饑則見飽則减小腹裏急腰痛口甘目昏骨冷乆不愈令人骨痿少氣又如六聚之成於六腑則異是矣何者六腑屬於三陽大陽利清氣陽明泄濁氣少陽化精氣有如都㑹之府主轉輸以為常也夫茍六腑失常則邪氣聚而不散始發既無根夲上下無所留止其痛亦無常處故在上則格在下則脹傍攻兩脇如有坏塊易於轉動故非五積之比也凡診其脉駃而𦂳者積聚也脉浮而牢者積聚也脉横者脇下有積聚也脉來小沉實者胃中有積聚也大抵病各有證治各有方如診心腹積聚其脉牢强急者生虚弱急者死又諸脉實强者生沉小者死此又不可不察也外臺秘要云肝之積名曰肥氣在左肋下如覆杯有頭卒乆不愈令人發如瘧連歲月不已以季夏戊巳日得之何以言之肺病𫝊肝肝當𫝊脾脾季夏適王王者不受邪肝欲復還肺肺不肯受故留結為積故知肝之積以季夏戊巳日得之也心之積名曰伏梁起臍上大如臂上至心下以秋庚辛日得之何以言之腎病當傳心心當𫝊肺肺以秋適王王者不受邪肺欲復還胃胃不肯受留結為積故知伏梁以秋庚辛日得之也脾之積名曰痞氣在胃管覆覆如大盤乆不愈令人四肢不收發黄疸飲食不為肌膚以冬壬癸日得之何以言之肝病當傳脾脾當傳腎腎以冬適王王者不受邪脾欲復還肝肝不肯受故留為積故知痞氣以冬壬癸日得之也肺之積名曰息賁在右脇下覆覆如大杯乆不愈令人瀟淅寒熱喘逆發肺癰以春甲乙日得之何以言之心病傳肺肺當𫝊肝肝以春適王王者不受邪肺欲復還心心不肯受故留結為積故知息賁以春甲乙日得之也腎之積名曰賁豚發於小腹上至心下若奔豚之狀上下無定乆不愈令人呃逆骨痿少氣以夏丙丁日得之何以言之脾病當傳腎腎當傳心心以夏適王王者不受邪腎欲復還脾脾不肯受故結為積故知賁豚以夏丙丁日得之也此為五積診其脉駚而𦂳積聚脉浮而牢積聚脉横者脇下有積聚脉來小沉實者胃中有積聚不下食即吐出脉來細輭附骨者積也脉出在左積在左脉出在右積在右脉兩出積在中央以部處之診得肺積脉浮而毛按之辟易時下氣逆背相引痛少氣善忘目暄皮膚寒秋愈夏劇主皮中時痛如虱縁狀其甚如針刺之狀時痒白色也診得心積脉沉而芤時上下無常處病少腹中熱面赤咽乾心煩掌熱甚即吐血主身瘈瘲主血瘲夏差冬劇色赤也診得脾積脉浮大而長饑則减飽則見復起與糓争纍纍如桃李起見於外腹滿嘔泄腸鳴四肢重手足勁寒脇痛引小腹男子得疝也女人病淋也身無膏澤善腫厥不能卧主肌肉損色黄也診得肝積脉弦而細兩脇下痛邪走心下足脛轉筋爪甲枯黒春差秋劇色青也診得腎積脉沉而急苦春與腰相引饑則見飽則减病腰痛小腹裏急口乾咽腫傷爛目芒脛骨中寒主髓厥善忘色黒也六腑者大小腸胃膽膀胱三焦者也屬於三陽大陽利清氣陽明泄濁氣少陽化精氣如都㑹之腑主轉輸以為常也六腑失常則壅聚不通故實而不轉虚而輸隨氣往來痛無定處在上則格在下則脹傍攻兩脇有如坯塊易於轉變非五臓比也夫喜傷心者自汗不可疾行不可乆立故經曰喜則氣散怒傷肝者上氣不可忍熱則来盪心短氣絶不得息故經曰怒則氣擊一作上憂傷肺者心系急上焦閉榮衛不通夜卧不安故經曰憂則氣聚思傷脾者氣留不行積聚在中腕不得飲食腹脹滿四肢怠惰故經曰思則氣結悲傷心者善忘不識人置物在處還取不得筋攣四肢浮腫故經曰悲則氣急恐傷腎者上焦氣閉不行下焦回還不散猶豫不快嘔逆心惡經曰恐則精却驚傷膽者神無所歸慮無所定説物不竟而迫故經曰驚則氣亂七者雖不同夲乎一氣藏氣不行欝而生涎隨氣聚積堅大如塊在心腹中或塞咽喉如粉絮吐不出嚥不下時去時來每發欲死狀如神靈所作逆害飲食皆氣所生成治之各有方也夫積者傷滯也傷滯之乆停留不化則成積矣其于臟腑皆因觸胃以成積病惟脾胃最易受觸盖日用飲酒積或過多停滯難化或吐或嘔或泄或痢當是之時法宜推蕩然後助養脾胃所推蕩者便宜酌量人之虚實傷滯之輕重而推盪之停滯一消則不成積剋化失宜乆之必成積聚癥瘕矣所謂積者有積氣積肉積酒積茶積食積痰更有婦女月經不通遂成血積積者五臟所生氣之所積名曰積其始發有根夲其痛不離其部由隂氣所生也聚者六腑所成氣之所聚名曰聚其始發無根夲其痛無常處由陽氣所生也然又癥瘕癖結者積聚之異名也證狀不一原其病夲大略相類但從其所得或診其證狀以立名爾且或隐或見腹内按之形證可驗也瘕者為瘕聚推之流移不定也癖者僻側在於脇肋結者沉伏結强於内然有得之於食有得之於氣有得之於憂思有得之於風寒凡使血氣沉滯留結而為病者治湏漸磨潰削使氣血流通則病可愈矣夫衛氣留於腹中畜積不行脉强及急腹皮急甚不可刺云黄帝曰衛氣之留於腹中畜積不行菀蘊不得常所使人肢脇胃中滿喘呼逆息者何以去之伯髙曰其氣積於胸中者上取之積於腹中者下取之上下皆滿溢者傍取之黄帝曰取之奈何伯髙曰積於上者㵼人迎天突於喉中積於下者㵼三里於氣衝上下皆滿者上下取之於季脇之下深一寸重者鷄足取之診視其脉大而弦急及絶不至者及腹皮急甚者當從隂引陽取穴於腹募不可刺也夫不可刺者宜炙也一則沉寒痼冷二則無脉陽之絶也三則腹皮急而陽䧟也舎此三者餘皆不得炙苦病在兩寸脉者及腹皮急甚者當從隂引陽取穴於腹募五臟病取五臓募六腑病取六腑募苦病在兩尺脉者當從陽引隂取穴於背腧五臟病取五臓腧六腑病取六腑腧元氣病取六腑於募筋骨有形病者取五臟腧募其病不在天之陽不在地之隂在腹中者兩儀之間人事也故取季脇下一寸元氣病取之右筋病取之左故曰在中者傍取之此其理也炙者燔取之儒門事親書論云息城司侯聞父死於賊乃大悲哭之罷便覺心痛日増不已月餘成塊狀若覆杯大痛不住藥皆無功議用燔鍼炷艾病人惡之乃求於戴人戴人至適巫者在其傍乃學巫者雜於狂言以謔病者至笑其笑不忍回面向壁一二日心下結埂皆散戴人曰内經言憂則氣結喜則百脉舒矣又云喜勝悲内經自皆有法治之不知何用鍼炙哉一緇侣好茶成病積在左脇戴人曰此與肥氣頗同然痎瘧不作便非肥氣雖病十年不勞一日况兩手脉沉細有積故然吾治無鍼炙之苦但畧為施治可享夀盡期先以茶調散吐出宿茶水數升再以木如意􅀈之又涌數升皆作茶色次以三花神祐丸九十餘粒是夜㵼二十餘行膿水相兼燥糞瘀血雜然而下明日以除溫之劑使服十餘日諸苦悉蠲神清色瑩顯慶寺僧應公有沉積數年雖不卧床枕每於四更後心頭悶硬不能安卧須起行寺中習以為常人莫知為何病以藥請於戴人戴人令涌出膠涎一二升如黒礬水繼出黄緑水又下膿血數升自覺胸中如失巨山飲餌無算安眠至曉寄西華縣庠山東顔先生有積二十年目視物不移細字不觀當心如頑石毎發痛不可忍食减肉消黒䵟滿面腰不能直因遇戴人令湧寒痰一盞如片粉夜以舟車丸通經散下爛腸葵菜汁七八行病十去三四以熱漿水粥飲之復去痰一大盆次日又以舟車丸通經散前後約百餘行累無少隐不五六日面色䵟去食進目明心中空曠遂失頑石所在素問曰積聚留飲痞膈中滿濕積霍亂吐下瘕癥堅硬腹滿皆大隂濕土乃脾胃之氣積聚之根也積者不散聚者不化留者不行飲者停滯痞者不通隔者阻也中滿下澁為積霍亂吐下為留飲同瘕癥者癥徵也瘕假也斯疾乃五臟六腑隂陽變化興衰之制也亢則害承廼制及則反以謂水得燥則消散而得􅊜則不消乃為積飲也謂人形精神與榮衛血氣津液出入通流謂夫腠理閉宻乃為痞也謂腸胃膈絶𫝊化失常而為滯也土主形體腹滿於中央乃曰中滿以傳化失度故甚則霍亂吐瀉也癥者腹中堅硬按之應手然水體柔順而今反堅硬如此者亢則害承廼制也瘕者中遂硬而忽聚忽散無其常故其病未及癥也經曰血不行而滯故血肉凝而為瘕也小腸移熱於大腸乃為虚瘕大腸移熱於小腸謂兩熱相摶則血溢而為伏瘕血澁不利月事復滯而不行故云為虙瘕為虙與伏同瘕與疝同為傳寫誤也世傳冷病亦有熱或陽氣欝結怫熱壅滯而堅硬不消者世傳為寒癥瘕也或堅痞腹滿急痛寒主筋縮故急主痛寒極血凝泣而反兼土化制之故堅痞而腹滿或熱欝於内而腹滿堅結痛不可忍者皆可為寒誤矣何不以脉症辨之凡諸疾病皆有隂陽寒熱宜以詳之大抵治積或以所惡者攻之或以所喜者誘之則易愈如硼砂水銀治肉積神麯麥蘖治酒積水蛭蝱蟲治血積木香梹榔治氣積牽牛甘遂治水積雄黄膩粉治涎積礞石巴豆治食積各從其類也若羣隊之藥分其勢則難取效反損所謂譬猶獵不知兎廣絡原野冀一人獲之術赤疎矣須是認得分明是積聚然後増减用藥不然反有所損廣五行記孝㣲中有僧維則病噎不能食語弟子曰吾死之後便可開吾胸腹視有何物言絶而卒弟子果開視胸中得一物形似魚而有兩頭遍體皆肉鱗弟子置器中跳躍不止戯以諸味皆隨化盡時夏中藍盛從澱有一僧以澱器中其䖝遶逐器中走湏臾化為水此乃五癥五噎症後人因此藍治噎候矣積聚附論經曰病有積有聚何以别之積者隂氣也聚者陽氣也隂沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所生積之為病其始發有常處其痛不離其部上下有所終始左右有所窮處聚之為病其始發無根夲上下無所留止其病無常處此積聚之别也方秘方三稜煎丸三稜陳皮五靈脂各三兩蘿蔔子白芍藥梹榔香附子草豆黒牽牛各二兩糖毬四兩木香枳殻枳實縮砂乾漆神麯麥蘖蓽澄茄白术片姜益智硼砂草菓𤣥胡菖蒲亁姜烏藥紅豆各一兩蓬术二兩白豆仁半兩官桂一兩右為細末粉糊為丸桐子大毎服五十丸空心溫姜湯送下秘𫝊掌中金丸眞氣衰弱飲酒多傷停於胸膈往往用感應丸如聖膏理中丸之類又不能克化任意取服轉傷真元臟腑别生他疾惟此藥能消化酒食消痰飲寛中利膈乆服永無胸膈不快之疾不動臟腑不損眞元加檳榔木香各一兩名檳榔丸又調和氣陳皮一斤去白濕稱生姜净洗與陳皮對下切片如㐲中二味晒炒甘草二兩半夏三兩湯洗七次姜汁和餅伏中晒炒神麯麥蘖各二兩砂仁白豆䓻各一兩右為末薑糊丸如桐子大服三四十丸薑湯下效方主心腹積聚四肢痺躄舉體風殘療百病虎骨野葛各三兩附子一十五枚重九斤甘草細辛各一兩杏仁巴豆去皮心芎藭切各一升雄黄二兩椒右以苦酒漬周時猪脂六斤微煎三上三下完取附子一枚視黄為度絞去滓乃内雄黄攪使稠和宻器貯之百病皆摩𫝊上唯不得入即服若服之或如棗大内一合熱酒中湏臾后㧞白髪以藥傅之即生烏諸瘡毒風腫及馬鞍瘡等洗即差牛領亦然破塊丸一名隂陽丸治受瘴結成氣塊腹中不能消散服之即效出危氏方蓽撥一兩大黄一兩一用生右為細末入生麝香少許煉蜜為丸如梧桐大每服三十丸空心冷水下或冷湯下日三服紫苑丸紫苑去苗細刮净蓯蓉酒浸人參檳榔茯苓去皮官桂去皮亁姜炮白术柴胡去苗土大黄炒黄連去鬚桔梗當歸去蘆浄洗防風去蘆羌活鱉甲醋煑去裙襴陳皮去白酒浸車前子防己石菖蒲熟地黄酒浸吳茱萸湯浸七次川烏炮去皮臍川椒去汗用殻巴豆去皮心膜油麥門冬去心右各等分為細末煉蜜為丸如桐子大初服快利為度如不利至七丸酒服或粥飲溫水亦得治疾癖氣塊及諸黄病毒氣衝心遶臍如蟲咬又治六種水蠱病寒反胃吐逆飲食不消時行無度婦人月露藴結不調或多或少月前月後猶如懐胎又二十四種風頑晝夜不安夢與鬼交頭生白髪或歌或笑有鬼魅服此藥皆驗楊駙馬患衝心病每日飲食頻吐徧身枯瘦每日服此藥五丸至二十日㵼出肉蝦蟆六箇白膿二升而愈京兆尹趙京先患火風痰眉毛脱落骨肉瘡疾服此藥一月㵼出癲蟲數十條馬尾長相似其病即愈河南劉府尹妻患眼不明一年服此藥二十日㵼出肉鱉六箇肉如針相似眼明如初蔡太師妻患赤白帶下作氣血崩服五丸至八九丸㵼出赤水一升内有肉塊下如鷄子大今此藥療一切病有孕婦人不可服腸風痔瘺溫酒下赤白痢訶子湯下中風甘草湯下心痛溫酒下蟲咬心痛檳榔湯下墜腸心悶四肢不散溫酒下氣噎亁荷葉湯下轉筋霍亂生姜湯下一切風疾升麻湯下㵼痢黄連湯下寸白蟲檳榔湯下喘𠻳杏仁湯下頭腫熱湯下打撲傷損溫酒下腰痛黒豆淋湯下食積氣塊麵湯下因酒内傷酒下肺氣杏仁湯下臍下疼芍藥湯下宿食不消生姜湯下隂毒傷寒溫酒下脾氣陳皮湯下金露丸出和劑方治腹内積聚癥塊乆患大如杯覆及黄瘦宿水朝暮咳𠻳積年冷氣時復腹下盤痛絃結衝心及兩脇徹背連心疼痛氣不息氣遶臍下狀如蟲咬不可忍十般水氣反胃吐食嘔逆飲食多噎五般痔漏脚氣走疰風有如蟲行手足煩熱夜卧不安睡語無度小兒驚疳婦人五邪夢與鬼交沉重不思飲食昏昏如夢不曉人事欲死懼多或歌或哭不定月候不調心中如狂身體羸瘦莫辨其狀但服此藥萬不失一無不平愈是病皆療更不細述草烏頭炮黄連各二兩桂心不見火乾姜炮桔梗吳茱萸湯浸七次茯苓去皮柴胡去苗乾地黄洗焙蜀椒去目炒厚朴姜製人參去蘆菖蒲泔浸一夕紫苑去苗鱉甲醋炙芎藭洗焙枳殻去穰麩炒貝母去心甘遂炮一方用甘松甘草炙防風各一兩巴豆去心膜用醋煑二十沸焙乾取一兩不去油用右為細末以麵糊為丸如桐子大每服五丸心中痰患薑湯心痛酸石榴皮湯下口瘡蜜湯下頭痛石膏湯葱茶下一切脾胃氣橘皮湯下傷寒麻黄葱湯下脚氣水氣杏仁湯下水㵼氣㵼龍膽草湯下赤痢甘草湯下白痢乾姜湯下赤白痢甘草姜湯下胸膈咽悶通草湯下婦人血氣當歸酒下如不飲酒當歸煎湯亦得疝氣風氣小腸氣及下墜附子湯下常服及應急諸般疾患凡米飲熱水茶酒任下如傷冷腹痛酒食所傷酒疸黄疸氣結痞塞鶴膝風並用鹽酒下治三十六腫十二症無不醫治此藥前人用之效者馬遂臨老渾身楚痛不思飲食每夜五丸至七日下血如鷄肝者二百餘片臭膿二升以此遂愈三原主簿陳勝妻有病十五年羸瘦腹中楚痛不可忍服藥至旬日下青蟲六十四條如筯頭身赤色及藥水五升遂愈京兆府工曹栁行餘着牀經年服至十日下肉蜣蜋百有餘箇青黄水一升許遂愈王元覧有門客乆患羸瘦吃食轉吐服之下肉蝦蟆七箇青水一升遂愈興國寺僧澄清患癰塊十五年服十日下肉蛇二條遂愈後來又患風疾眉毛盡落服至百日出五色蟲兒出青水三升遂平復此元覧進方時所陳也後代鄭教授云此方於杜相公府子弟處曽用之無不治效如與小兒吃時一丸分作四丸量兒大小可三五丸合此藥如煑巴豆時湏是親自數三十沸便傾出焙乾若沸過藥即無力服此藥别無所忌只驗定病症不定用湯有差其效不述也松烟餅子治積氣塊消食快氣細墨五分燒研陳皮五分去白牽牛五錢别研取頭末五錢神麯炒三稜火煨蜜陀僧研五靈脂研硼砂研牡蠣火煨煅麥蘖各五錢炒大黄一兩北棗一十四枚燒存性班猫一兩去翅足糯米同炒乾漆炒去烟白丁香研青礞石研各一錢巴豆一兩去皮濕紙裹燒黄色為度蓬莪术一錢煨大㦸去蘆莞花醋侵一宿右為細末水打麵糊為丸如皂角子大捻為餅子記以所有傷煎湯送下或麵湯亦可小兒三餅大人看虚實禀氣加四五餅不嚼呑服其積塊漸漸近下再進一服又覺近下或積塊疪血痢塞大人小兒乆痢或休息痢并男子婦人年深不服水土及暑月變成惡痢米物不消五塊逆膈胃吐食心胸悶閉酒疸食黄勞𠻳上喘嘔逆涎沫心閉驚恐口苦惡心小便淋澁大便不通傷寒餘毒婦人胎前産後敗血困生積成積塊飲食平常遍身疼痛腰强腿硬手足厥九種心痛十般積熱九般水氣霍亂吐㵼乆病瘦弱但有此症並皆治之一方用陳皮湯下溫白丸治臟腑積聚癥癖氣塊腹多􅂒痛按或有形肢節煩熱腰脚酸痛及婦人血癖經候不調赤白帶下等疾柴胡去苗紫苑去苗土吳茱萸湯浸焙乾炒菖蒲桔梗剉炒荆三稜煨剉赤茯