body:
  text: 普濟方卷四百二十五明周王朱橚撰本草藥品畏惡玉石上部玉泉畏欵冬花玉屑惡鹿角丹砂惡磁石畏鹹水曾青畏兔絲子石膽水英為使畏牡茵桂芫花辛夷白薇茵音郡鍾乳蛇床為使惡牡丹𤣥石牡蒙畏紫石英蘘草雲母澤瀉為使畏䰿甲及流水䰿音駝朴硝畏麥句薑硝石火為使惡苦參苦菜畏女苑芒硝石韋為使惡麥句薑白礬甘草為使滑石石韋為使惡曾青紫石英長石為使畏扁青附子不欲䰿甲黄連麥句薑白石英惡鬼臼赤石脂惡大黄畏芫花黄石脂曾青為使惡細辛畏蜚蠊蠊音亷白石脂鷰糞為使惡松脂畏黄芩太一餘糧杜仲為使畏鐡落菖蒲貝母玉石中部水銀畏磁石殷孽惡防己畏本孔公孽木蘭為使惡細辛陽起石桑螵蛸為使惡澤瀉菌桂雷丸蛇蛻皮畏兔絲子􅌲音郡蜕音稅凝水石畏地榆解巴豆毒石膏雞子為使惡莽草鬼臼磁石柴胡為使畏黄石脂惡牡丹莽草殺鐵毒𤣥石惡松脂栢子仁菌桂􅌲音郡理石滑石為使畏麻黄玉石下部青琅玕得水銀良畏雞骨殺錫毒礜石得火良棘針為使惡虎掌鬼臼鶩屎細辛畏水特生礜石得火良畏水方解石惡巴豆代赭畏天雄大鹽漏蘆為使草藥上部六芝薯蕷為使得髪良惡怕山畏扁青茵陳天門冬垣衣地黄為使畏曾青麥門冬地黄車前為使惡欵冬苦瓠畏苦参青葙术防風地榆為使女葳葳㽔畏鹵鹹乾地黄得麥門冬清酒良惡貝母畏蕪荑菖蒲秦艽秦皮為使惡地膽麻黄艽音膠逺志得茯苓冬葵子龍骨良殺天雄附子毒畏真珠蜚蠊藜蘆文蛤澤瀉畏海蛤文蛤薯蕷紫芝為使惡甘遂菊花水枸杞根桑根白皮為使丼草木乾漆苦參為使惡逺志及甘遂大㦸芫花海藻人參茯苓為使惡疏及藜蘆音摉疏音疎石斛陸英為使惡凝水石巴豆畏白殭蚕雷丸牛膝惡熒火鱉甲陸英畏白前細辛曾青棗根為使惡狼毒山茱萸黄耆畏硝石滑石及藜蘆獨活蠡實為使蠡音禮柴胡半夏為使惡皂莢畏女苑藜蘆菴音淹䕡音閭子荆子薏苡仁為使薏音意苡音以菥音錫蓂音覔子得荆子細辛良惡乾姜苦参龍膽貫衆為使惡防葵地黄兔絲子冝圓不宜煮得酒良薯蕷松脂為使惡雚菌雚音桓菌音郡巴㦸覆盆子為使惡朝生雷丸丹參蒺藜子烏頭為使防風惡乾姜藜蘆白欵芫花殺附子毒絡石杜仲牡丹為使惡鐵落畏菖蒲貝母黄連黄芩龍骨理石為使惡菊花芫花𤣥參白鮮畏欵冬勝烏頭解巴豆毒沙參惡防己及藜蘆丹參畏醎水及藜蘆天名精垣衣為使决明子惡實為使惡大麻子芎藭白芷為使續斷地黄為使惡雷丸黄耆惡鱉甲杜若得辛夷細辛良惡柴胡前胡蛇床子惡牡丹巴豆貝母茜根畏鼠婦飛亷得鳥頭良惡麻黄薇衘得秦艽良五味子蓯容為使惡葳㽔勝烏頭草藥中部當歸惡䕡茹畏菖蒲海藻牡蒙藺音閭茹音如秦艽音膠菖蒲為使黄芩山茱黄龍骨為使惡䓤實畏丹砂牡丹藜蘆芍藥湏圓為使惡石斛芒硝石硝鱉甲小薊及藜蘆乾薑秦椒為使惡黄芩黄連天鼠糞殺半夏莨菪毒莨音浪菪音蕩藁本惡䕡茹麻黄厚朴為使惡辛夷石韋葛根殺野葛巴豆百藥毒前胡半夏為使惡皂莢畏藜蘆貝母厚朴白薇為使惡桃花畏秦艽礬石莽草及烏頭􅌝音括􅌣音婁枸杞為使惡乾薑畏牛膝乾漆及烏頭𤣥參惡黄耆乾薑大棗山茱萸及藜蘆苦參𤣥參為使惡貝母漏蘆兔絲子及藜蘆石龍芮大㦸為使畏蛇蛻呉茱萸石韋滑石杏仁為使得菖蒲良狗脊萆薢為使惡敗醬蠣薢薏苡為使畏葵根大黄柴胡牡前胡蘧音劬麥蘘草牡丹為使惡桑螵蛸白芷當歸為使惡旋復花紫苑欵冬為使惡天雄蘧麥雷丸逺志畏茵陳白鮮皮惡桑螵蛸桔梗茯苓萆薢白薇惡黄耆乾薑乾漆大棗山茱萸紫參畏辛夷仙靈脾薯蕷為使牡丹畏兔絲子欵冬花杏仁為使得紫苑良惡皂莢硝石𤣥参畏貝母辛夷麻黄黄芩黄連黄耆青葙漢防己殷孽為使惡細辛畏萆薢殺雄黄毒女苑畏鹵醎澤蘭防己為使地榆得髮良惡麥門冬海藻反甘草草藥下部大黄黄芩為使桔梗秦皮為使畏白及龍膽龍眼甘遂𤓰蒂為使惡逺志反甘草葶藶榆皮為使得酒良惡殭蚕石龍芮芫花决明為使反甘草澤漆小豆為使惡薯蕷大㦸反甘草鈎吻半夏為使惡黄芩藜蘆黄連為使畏細辛芍藥𤣥参惡大黄天雄逺志為使惡腐婢烏頭烏喙許穢切莽草為使反半夏􅌝􅌣貝母白欵白及惡藜蘆􅌝音秳附子地膽為使惡蜈蚣畏防風甘草黄連人参烏韮大豆貫衆雚菌為使雚音桓菌音郡半夏射干為使惡皂莢畏雄黄生薑乾薑秦皮鱉甲反烏頭射音夜虎掌蜀漆為使畏莾草蜀漆􅌝藪為使惡貫衆恒山畏玉札狼牙蕪荑為使惡􅀥肌地榆白歛伐赭為使反烏頭白及紫石英為使惡理石杏核仁杏仁雚菌得酒良畏雞子䕡音閭茹音如甘草為使惡麥門冬藎草畏鼠婦夏枯草土𤓰為使狼毒大豆為使惡麥句薑鬼臼畏垣衣木藥上部茯苓茯神馬蘭為使惡白歛畏牡蒙地榆雄黄秦艽龜甲栢子仁牡蠣桂心爪子為使畏菊花羊踹諸石麩麵杜仲惡蛻参𤣥参蛻音税乾漆半夏為使畏雞子蔓荆子惡烏頭石膏五加皮逺志為使畏蛇皮𤣥参黄蘗惡蛇漆辛夷芎藭為使惡石脂畏菖蒲蒲黄黄連石膏黄環酸􅀥惡防己槐子景天為使牡荆實防風為使惡石膏木藥中部厚朴乾薑為使惡澤瀉寒水石山茱萸蓼實為使惡桔梗防風防己吳茱萸蓼實為使惡丹参硝石畏紫英石秦皮大㦸為使惡吳茱萸占斯解狼毒毒梔子解躑躅毒桑根白皮續斷桂心麻子為使秦椒惡􅌝藪防葵畏雄黄木藥下部黄環鳶尾為使惡茯苓防己石南五加皮為使巴豆芫花為使惡蘘草畏大黄黄連藜蘆殺斑蝥毒蜀椒杏仁為使畏欵冬欒華决明為使雷丸荔實厚朴為使惡葛根音授疏音疎漏蘆為使皂莢栢子仁為使惡麥門冬畏空青人參苦參獸上部龍骨得人參牛黄良畏石膏龍角畏乾