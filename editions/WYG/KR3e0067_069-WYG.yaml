body:
  text: 普濟方卷七十明周王朱橚撰牙齒門牙齒不生論夫牙齒不生者由風疳齒䶚諸疾遂致脱落久而不生也夫腎主骨齒者骨之所終髓之所養也凡人血氣强盛骨髓堅固齒雖脱落則必復生若氣血衰微骨髓虚弱則齒不能更生也内經謂男子八歳腎氣勝齒更髮長至於八八則齒髮去是也法宜填骨髓養腎氣則齒可復生也方露蜂房散治牙齒不生及齒風痛露蜂房荆芥川椒地骨皮松節青鹽白礬灰各一兩右為散每用半錢綿裹於病處咬之有涎即吐細辛湯治牙齒不生及齒風連面疼痛細辛白芷芎藭露蜂房各一分右為散以水一碗煎十餘沸去滓熱含冷吐治齒不生雌烏鷄屎雄烏鷄糞舊靴底麻底尤佳右等分燒灰存性研細入麝香同研傅於齒齗上如此上三夜用令藥不絶擦令熱為佳須擦齒槽非齒齗也予女子退齒踰年不生甚以為慮因過平江㑹鄉生李亮卿察院語之李云予有方己嘗試用甚效因其説修治用之一月齒遂生雄雌散治大人小兒牙齒不生雌雄鷄屎各十四顆右焙乾同研如粉入麝香少許先以針挑破損齒根下血出将散傅之年髙者不過二十日生年少者十日不拘傷寒及自墮落者川升麻散治牙齒不生及齒風宣露升麻白附子右為末入乳鉢研藥末極細取八日生地黄四觔洗去土絞取汁二大盞即下别研藥攪令匀於甆器中盛每用以柳枝綿裹一頭㸃藥炙令烙牙根下縫中更塗膏少許即騐治牙齒不生方雄鼠糞麝香右合研令細用之揩齒勿食酸醎物效治大人小兒牙齒多年不出用黒豆三十枚牛糞火内燒令煙盡取出細研入麝香少許研匀用針挑破不生處令血出却用藥傅上不可見風忌酸醎物治牙齒不生方取路傍遺却􅀈粒於齒落處㸃二七其齒自生牙齒挺出論夫牙齒挺出者手陽明經虚外受風冷與齗間津液相搏化為膿汁則齗肉落縮齒根宣露故令齒挺出也方青黛散治牙齒根挺出及脱落疳濕攻唇破侵蝕䘌齒青黛苦參甘草各一兩雄黄丹砂茛菪礬石附子藜蘆細辛射干各半兩右為末每用半錢綿裹貼齒痛處有涎吐疳􅉶空腹井水調半錢服地骨皮湯治牙齒風蟲齒根挺出動摇疼痛地骨皮防風鹽細辛蔓荆實杏仁獨活青葙子當歸各一兩右搗為散每用半錢以水二大盞入鹽一錢煎至一盞去滓熱含冷吐日用二服甘草膏治牙齒挺出疼痛不可忍甘草雄黄羊腎泔淀牛屎汁青黛各一兩右先於銅器中微火煎三味脂汁五七沸次下三味藥末攪匀慢火􅆈成膏取桃枝如筯綿裹頭㸃藥熱烙齒縫中每日三遍好肉生龍齒散治牙齒根宣露挺出爛肉黒血不止疼痛摇動臭氣欲脱落龍齒黄礬白石脂各二兩桂心芎藭皂角刺一兩右為末不津器中盛之每食後用少許貼之甚效有津勿嚥郁李根皮丸治齒宣露挺出皆由風熱所為郁李仁根白皮熟甘地黄各二兩防風獨活青葙子各一兩右為末密和丸如梧桐子大每於食後以粥飲下三十圓枸杞子根散治牙齒根宣露膿血口臭枸杞根槐白根皮各二兩胡桐淚細辛各一兩川椒一分右為散每用半兩以酒二大盞煎至一盞去滓熱含冷吐蔓荆子散治牙齒宣露挺出皆是積熱風毒所為蔓荆子生地黄地骨皮角蒿各一兩郁李根皮二兩右為散每用半兩以水二大盞煎至一盞熱含冷吐郁李根湯治牙根風挺出疼痛郁李根芎藭細辛生地黄各一兩右為末每用五錢水三盞入鹽一錢煎十餘沸去滓熱含冷吐治牙齒根宣露挺出膿血口氣方枸杞根梧桐淚一兩右和匀分為兩度每用以水二大盞煎一盞去滓熱含冷吐治齒日長難以飲食出危氏方服白术末及灌潄齒吐去治牙齒挺出宣露方生地黄一觔木臼搗碎入鹽二合和之上用白粉裹可厚半寸以來於煻火中燒㫁煙始成去燋麫入麝香一分用研為末每用少許貼於牙根上牙根動摇論夫手陽明之支脉出於齒足太陽之脉又偏於齒為骨之所終髓之所養若經脉虚風邪乗之血氣損少不能榮潤故令摇動也方石膽散治牙齒齗肉挺縮虚浮時有膿血齒動疼痛梧桐律黄礬硃砂升麻各半兩石膽二錢華隂細辛當歸牛膝川芎棘刺地龍各二錢乳香麝香各二錢半龍腦一字右為細末每用藥少許傅擦牙齗上吐津悞嚥不妨早辰臨臥并每服食後用五六次治齒風摇動捍齒牢牙方丹砂青礬白礬馬牙硝防風細辛各半兩蠟一兩麻油松節當歸松脂黄耆猪脂半觔右剉先於鐺中煎脂濾滓次下油煎三兩沸續下剉藥煎十餘沸以綿濾過去滓更下蠟并别研藥慢火煨成膏以瓷盒盛用少許塗傅患處即差一方無松節有緑礬雄黄散治牙齒動摇脱落暗黒蟲蛀時疼痛漸至損壞川升麻呉白芷猪牙皂角生地黄川芎各半兩寒水石白茯苓各二兩細辛梧桐淚雄黄各三錢麝香一錢青錢右為細末每用半字蘸藥擦患處又煎潄吐悞嚥不妨太和散治牙齒動摇齗肉浮腫蟲蚛發痛梧桐律白茯苓生乾地黄各半兩川芎香白芷升麻華隂細辛各三錢麝香青鹽猪牙皂角右為細末青鹽麝香另研拌匀每用藥少許以指蘸藥擦牙病處常用去疳牢牙定痛止疼神仙常春散治牙齒動摇疼痛牢牙黒髭髪至老不白深有神效皂角一觔食鹽四兩香附子四兩青鹽四兩牛蒡子四兩蓮花蘗藿香各一兩旱蓮草一兩麝香一分腦子一分右将皂角剉碎用小瓦盆兩箇上盆底鑽水孔三箇下盆装一重皂角一重食鹽四兩都装下盆内相合泥固炭火煉煙青為度取出同前藥碾細入麝香腦子同為細末每日早晨臨臥刷牙甚妙地骨皮散治牙齒動摇喫食不得地骨皮一兩當歸川升麻寒水石桂心芎藭各半兩黄藥沉香各一兩麝香一分右為細末用貼齒牙重者以綿裹含如彈子大日二三塊槐白皮散治牙齒動摇不住寒熱嚼物隱痛時發時止槐白皮地骨皮五靈脂蓽茇各半兩蛇床子乳香各二錢半麝香半錢右為細末入研藥令匀每用少許貼牙病處吐津悞嚥不妨如痛不已用藥三錢水一盞煎令服和滓熱潄冷吐並不計時候芎藭散治牙齒動摇疼痛芎藭二兩細辛一兩防風一兩薏苡仁二兩地骨皮柳枝各一兩右為散每用半兩水二大盞煎至一盞去滓熱含冷吐細辛散治牙齒疼痛摇動欲落疳蟲􅀈血臭氣黒惡不能食細辛莽草曲頭棘針墻衣各一兩鹽花一兩半蕎麥麵三兩右細末以釅醋和蕎麥麵裹上件藥以炭火燒令赤又以摇揩不得者即以綿裹貼齒根上悞嚥無妨用後齒牢患十年者皆效麝臍散治牙齒痛動摇風蚛疼痛齗肉宣露涎血臭氣常令牙齒牢堅解骨䐬毒氣服之大有神效牛膝木鱉黄茄郁李仁麝香細剉一百箇地骨皮右搗碎入瓶子内用瓦片葢口留一小竅用鹽泥固濟燒令通赤候煙白色即住火取出以新土罨一復時取出後入下項藥升麻細辛各十兩右為細末用少許揩患處須臾温水潄口臨臥更貼少許嚥津無妨五靈膏出御藥院方治牙齒動摇五靈脂松脂黄蠟各一兩黄丹蟾酥右入磁器中以熳火􅆈成膏用白熟絹上攤候冷剪作片子每夜貼於齗上有涎即吐悞嚥無妨此藥臨臥時用一次如惡硬物貼一片牙齒根兒裏再外貼之亦不甚悶若是牙兒堅固自然得力不惡硬物也地黄散治齒動摇生地黄一斤五兩取汁山芋四兩枸杞根三兩白茯苓四兩人參四兩右先煎生地黄汁搗諸藥末用好酒一斗别煎至三升去滓入煎下地黄汁同再煎入白蜜一斤酥少許煎後可丸即成丸如小豆大每服酒下三十丸一日三服漸加至五服胡桐淚散出聖惠方治牙齒根摇動宣露生肌胡桐淚波斯鹽緑石膽丁香生地黄右為散每服一字塗傅牙根中神效一方出海上方治牙動摇疼痛五倍子白茯苓北細辛各五錢青鹽三錢右為細末朝暮刷之久而大效宣牙膏治牙齒動摇不牢疼痛不止麝香一字龍骨定粉各三錢半右為細末入麝香匀用黄蠟一兩甆盞内鎔開入藥於内攪匀放冷取出熨斗燒熱鋪紙用藥攤之匀薄每用剪作紙條兒臨臥於齒患處齒齗間封貼一宿至次日早辰取出藥每夜用之如此半月消牙齒痛悶生齗肉治疳蝕去風邪牢牙齒大有神效二聖丸治牙齒動摇疼痛川烏頭蒼术右為末醋麫糊丸梧桐子大每服七丸食前鹽湯下忌熱物少時二聖散治齒齗或退或腫牙齒動摇疼痛甜葫蘆八兩牛膝四兩右為粗散每用五錢水一盞半煎至一盞去滓微熱潄多時吐之悞嚥不妨食後并臨臥時潄三四服五倍子散治牙齒摇及外物所傷諸藥不效欲落者川五倍子乾川龍各半兩右為細末先用生薑揩牙根以藥傅之五日内不得咬硬物如齒初折落時熱粘齒䐬中貼藥齒上即牢如故一方出本事方治牙齒動摇髪鬚亦黄一服髭黒牙牢甚妙生薑半兩地黄一斤右以不蛀皂角取挺先刮出黒皮核将前藥汁煎蘸皂角慢火炙乾再醮再炙用藥盡為度并前藥滓同入甆瓶内用火煆存性為末牙齒動摇用藥揩牙齗上如髭黄鐡器盛藥末三錢湯調過三日後将藥汁蘸鬚臨睡時用次早已黒色三夜三次用其黒如漆好甚黒聖散治牙齒動摇草烏頭三兩硼砂半兩右研細用一錢沸湯㸃先潄牙後用藥少許揩動摇處日三五度一方出千金方治齒根動欲脱落用地黄綿褁著齒上咂之又咬咀以汁漬齒根日四五度著之并嚥汁十日大佳如齒挺出嚼之亦可土蒺藜散治牙齒疼痛齗腫摇動及打動牙齒用土蒺藜去角生用不拘多少為粗末每服五錢淡漿水半盞煎七八沸去滓入鹽末一捻帶熱時時潄之别無所忌然雖藥味不衆單方之藥取效急速或用根燒灰貼動牙即牢治牙齒動摇用黒錫半斤大鍋内鎔成汁旋入桑條灰柳木槌研令沙以熟絹羅為末每日早辰如常揩牙後用温水潄在盂内以水洗眼能明目黒髭鬢治諸般眼疾髭黄白者用之便黒也麻黄散治冬寒時分寒濕腦痛項筋急牙齒動摇疼痛麻黄𦍑活防風根藁本骨灰細辛稍升麻稍黄連草荳蔲當歸熟地黄生地黄草龍膽右為細末搽之麝香礬雄散治大人小兒牙齒動摇齗齶宣露骨槽風毒宣蝕潰爛不能入食者膽礬雄黄麝香龍骨右為細末每用一字鵝毛蘸藥掃患處又用三錢末以水七分煎五分熱呷滿口候冷吐去或每日揩牙温水潄之白牙散治牙齦綻肉及牙疳腫痛牙動摇欲落牙齒不長黄口臭宜之或夏月亦可用之升麻根四兩𦍑活根龍膽根羊脛骨右同為極細末以紗羅子羅骨灰作微塵末和匀臥時刷牙先以温水潄口凈每用少許擦之治牙積久碎壞欲盡用礬石以綿裹嚼之吐汁後愈牢固牙齒牙齒脱落論夫牙齒脱落者由腎氣虚弱骨髓衰損不能榮潤而又風邪之氣摶於經絡上注於齒間故令摇動脱落也方牙藥麝香散治牙齒不牢固去一切疳蝕黒牙縫去腐殠緑礬石膽細辛麝香甘松訶子皮何首烏白龍骨藿香葉縮砂仁零陵香百藥煎五倍子白茯苓右為細末入研和令匀先用漿水潄口每用藥少許擦牙含口少時後用熱水潄口每日早辰用牢牙散治牙齒脱落顆鹽白礬半兩右都炒令乾為末每以槐枝㸃藥傅齒上有涎即吐之安腎丸治虚壅牙齒浮腫疼痛肉蓯蓉桃仁故紙白术石斛乾山藥白蒺藜川烏川巴㦸川蓽薢各等分右為細末煉蜜丸如桐子大每服七十丸空心鹽湯送下梧桐淚散牢牙止痛梧桐淚生地黄升麻芎藭白芷細辛青鹽麝香燒寒水石右為細末每用少許擦牙痛處吐津悞嚥不妨日用地骨皮散治齒疼喫食不穩地骨白皮當歸升麻桂去粗皮三分芎藭甘草紫礦寒水石茛菪子右為散每用二錢塗齒根下甚者綿裹如彈子大日吞三兩丸欲得口中含化亦妙牢牙散牢牙止痛去風荆芥薄荷葉草烏頭川芎細辛猪牙皂莢白芷防風右各等分為細末温水灌潄後用藥少許擦之再潄之丁香石燕子散治腎經不足齒齗不固或動摇不牢或髭􅁂班白皆治丁香石燕海馬白礬舶上茴香龍骨右為末每用一錢擦左右牙後用温酒送下臨臥時用熟銅末散治牙齒非時脱落令牢定熟銅末當歸地骨皮細辛防風各一分右為細末和銅末研如粉封齒上日夜二三度三五日牢定一月忌嚼硬物封齒必先塗藥在患處用蠟紙封之血竭散出御藥院方牢牙定痛治牙根脹悶連槽骨疼痛久而不愈五靈脂蜜陀僧血竭石膽乳香各等分右各令研極細再同研匀每服用一指蘸塗貼牙病處候少時用温荆芥湯微潄有津吐去誤嚥不妨牢齒如聖散牢牙齒止疼痛石燕子乳香青鹽各一兩細辛半兩右為細末每用以指蘸藥乾擦於痛處良久温荆芥湯潄口牢牙散牢牙齒定疼痛寒水石生定粉龍骨烏魚骨右為細末每用少許擦牙不時用悞嚥無妨又方牢牙定痛寒水石枯白礬鍾乳粉生定粉右各等分研極細末擦牙痛處牢牙方出海上方香附子細辛防風青鹽各一兩右為末每用如揩齒方擦之後用温水潄之牢牙石燕子散治牙齒齗肉不固及腎弱齒疎或血出侵蝕青鹽麝香各一兩石燕子十對火燒右合研匀每用藥半錢以醋蘸藥刷牙齗上合口少時後用温酒潄吐出不吐無妨早晨只用一遭治牙崩出本事方信砒半錢紅丹一錢右先将砒霜傾在錢香匙上却以紅丹葢定文武火煆令煙盡為度研為細末先用枳殻荆芥湯灌潄吐去将前藥末揩牙上不可吞直候涎多吐下又須用前湯灌潄立效煨腎散治病齒非腫非疼虚不能嚼食先用局方嘉禾散薑煎食後一服次以地骨皮煎湯潄之候空心以羊腰子一對片切令薄以葱絲椒子青鹽蒺藜末固元散二錢拌匀摻於腰子内以荳􅅳葉或荷葉包裹炮令熟食之服經兩日頓覺輕利飲食如故蒺藜杵去刺耿運官舊病朽齒朽者既去後來齒齗之上下左右非腫非疼但覺齒虚不能嚼食良以為苦偶得何主簿授此一試而騐此方乃耿師道傳屢試有騐耿為人誠謹豈欺我耶信之無疑牢牙密齒出海上方用橡斗子以鹽實之兩箇相合以鐡線縛定火中煆過入荆芥香白芷香附子鹽二兩細辛同為細末橡斗子餘四味各半兩活裂齒痛取死曲蟮末傅之牢固牙齒良法用良殺牛齒三十枚固濟瓶中煆令通赤研取細末以水一盞末二錢煎令熱含浸牙齒冷即吐却齒永堅牢或有損動者末揩之又方用蟬退皮研一錢井花水服治牙病牢牙赴筵散香附子髙良薑鹽各三兩細辛一兩右為末作齒藥常用晚年牙不脱落甚妙治齒腫痛用䒽草郁李仁各四兩水六升煎取二升去滓熱含冷吐治多食石榴損齒用石榴黒皮炙令黄以棗肉為丸空心服三丸日二服又揵要方余抵臨汀未幾齒浮硬物甜物皆不能進諸藥無效冬初邀同官游蒼玉偶説所苦李䝉之云大人病此半年遇一道人傳授每日以生鹽半盞擦牙以温水灌潄扣齒一百二十下數日遂痊其親於余同年時適就養於次日依方試之數日果愈竒甚祛風牢牙散防風川芎白蒺藜石膏沉香青鹽香白芷細辛甘松三奈香附子荆芥穗升麻旱蓮草荷葉灰沒石子膽礬各二錢半右為細末每用擦牙梧桐淚散治牙動齒痛梧桐淚川升麻白礬灰各一分獨活細辛麝香當歸附子白芷各半兩右細羅為散臨臥時先揩齒潄口令凈用少許貼之烏頭散治牙齒動摇終不堅固者宜用出牙川烏頭巴豆大硼砂碙砂大蜘蛛膩粉右細羅為散研入巴豆令匀每用少許著牙根一食間牙即自出治牙齒動摇却令堅固貼齒方用皂莢不拘多少燒為灰研令細然後以生地汁溶團如鷄子大燒令通赤候冷𢷬羅為末又以生地黄汁溶又燒如此三遍入乳鉢中研令細每用濕紙片子摻藥貼齒神效一方入炒鹽半兩用治牙齒動摇不穩須出牙神效騐方用馬齒莧菜粗大者燒作灰研為細末入少砒霜同研令匀每用少許着齒根下問患人覺熱即令輕𠻳便動以手拈出後傅止血藥神效烏金散治腎氣不足齒齗不固黒牙縫及髭鬢牢牙訶子五倍子沒石細辛甘松零陵香麝香各一錢緑礬白茯苓百藥煎青鹽橡斗兒金絲礬右除麝香緑礬二錢二味另研其餘極細然後入諸藥拌匀稍熱水潄每日兩次用藥半錢刷牙烏髭􅁂牢牙齒白間黒其功效不可具述牢牙齒散治牙無力不能嚼物升麻生地黄黄連羊同骨灰參白茯苓石膏梧桐淚右為極細末入麝香少許研匀臨臥擦牙復以温水潄之益齒出本草以石膏末揩之長齒出本草以牡鼠脊骨末傅之多年不出者亦生取牙方取蛀牙本分方出本事方鵬砂碙砂硃砂附子尖信砒川烏尖蟾酥七個同為末右和匀五月五日合者佳㸃藥於牙根上良久用手指下後傅藥防風荆芥乳香右為細末揩牙落處并用些子塞牙落孔中取牙落不犯手草烏蓽撥各半兩川椒細辛各三兩右為末每用少許揩在患牙處内外其牙自落離骨散取牙夜遊将軍人言窑老丹少許右同研粉紅色搽之又方金鳳子砒石砒霜右研匀搽如神散取蚛牙用肥赤馬肉三斤或五斤每肉一斤入碙砂二兩拌和以器物盛之於有日處頓放俟作成蛆令自乾研為細末每蛆末一兩入粉霜半兩同研匀如用時先以針撥動牙根四畔空虚次用燈心蘸藥少許㸃牙根下良久其牙自動落出牙方出海上方凡蛀牙疼必須出之若無妙手其疼不可忍也無問上下隨左右於牙闗寕車骨尖相時近裏以指捻之覺痛處是穴以艾火灸七壮瘡隱蛀牙自落其騐如神揩齒論夫齒者骨之所終髓之所養催伏諸榖號為玉池揩理灌潄叩琢引導務要津液榮流滌除腐氣令牙齒堅牢齗䐬固密令諸疾不生也聖惠論或縁揩理無方招風致病者葢用之失宜反以為害不可不知方刷牙散酸石榴皮白檀赤茯苓各二錢半訶子細辛一錢半百藥煎二錢半零陵香藿香川芎甘草三錢半香白芷升麻何首烏茴香沒石子􅒦砂仁荷葉灰青鹽銅緑緑礬橡子斗兒金絲礬蓽撥髙錢右為細末将銅緑膽礬另研極細同藥一處和匀每日清早至晩臨臥二度刷牙又能黒髭􅁂牙藥訶子白檀細辛蓽撥川芎藿香甘松白芷五味子茴香緑礬何首烏升麻青黛荷葉灰沒石子香附子石榴皮百藥煎皂角麝香膽礬零陵香各等分右為極細末擦之長春牢牙散烏髭髪去風牙香附子白茯苓砂仁丁香川芎百藥煎蒺藜五味子金絲礬升麻細辛青鹽破故紙檀香甘松石膏膽礬沒石子訶子麝香右為細末早晩刷與前法同玉池散治口齒諸疾華隂細辛川升麻防風當歸川芎藁本地骨皮白芷石膏螺青青鹽各等分右十一味等分細辛倍用㬠乾為細末早晚食後常揩牙若病甚用藥末三大錢水一大盞薑五片雄黒豆五十粒煎十沸通口潄甚妙諸藥冝日晒乾用火焙則走氣也嘉禾大口齒科張太極常用此藥因療朱丞相疾愈傳之得於其孫子堅通手頃年景齋弟常病牙癰頼此而效至今日用不輟細辛散生地黄地骨皮石膏白芷寒水石茯苓當歸川芎細辛丁香附子何首烏甘草甘松茶末升麻青鹽各等分右為細末用庚子日為頭刷牙每日二次用津嚥之以餘掠􅁂白者變黒黒者不白明目暖水藏補下元沉香散出御藥院方治刷牙堅固牙齒榮養髭髪沉香白檀苦楝子母丁香細辛酸石榴皮當歸訶子皮香附子青鹽荷葉灰青黛乳香龍腦麝香右為細末每用半錢如常刷牙温水潄早晚二次用丹砂散揩齒丹砂麝香白檀香丁香皮藿香葉茅香莎草根甘松白芷升麻鉛丹各一兩猪牙皂莢石膏凝水石零陵香右為末令細每日如常用揩齒揩齒細辛散細辛升麻甘松香零陵香藿香葉當歸鉛丹白芷地骨皮凝水石笋灰牛膝麝香各一分白檀香右為末以麝香同研令匀每用少許揩牙温水潄之硃砂散揩齒令白净硃砂丁香藿香茆香附子甘松白芷川升麻黄丹白檀香猪牙皂莢石膏寒水石零陵香右為散都研令匀每日常用揩齒甚佳白牙散升麻骨灰白芷石膏麝香右為末先以温水潄凈擦之尤妙治牙齒藥細辛草烏頭皂角右先将皂角炒令焦次入草烏次入細辛同研為末先用鹽湯潄口即用藥如常使刷牙方香白芷白茯苓各五錢丁香細辛各三錢當歸川芎甘草升麻何首烏生地黄地骨皮膽礬各二錢寒水石五錢右為細末庚日為始刷牙妙應散牢牙疎風理氣黒􅧋髪白茯苓遼參細辛香附子川芎白蒺藜縮砂各五錢龍骨石膏百藥煎白芷各七錢麝香右為細末臨臥早晨温水刷之常使齒玉池散治牙齒垢膩不凈潔升麻藁本甘松䒽草香白芷川芎各一兩細辛青鹽生地黄各二兩地骨皮皂角麝香右為細末研匀一處每日早晚揩牙如常用香附子散治黒牙縫刷牙藥緑礬五倍子訶子皮石膽白芷棗核灰各三錢甘松粟縫螺髻麝香香附子右為細末入麝香一味拌匀每日早晨先刷牙潔凈然後用藥刷温水潄口候少時吐之日常用令牙縫黒牙板白牢牙潔凈黒髭􅁂永不患牙痛之病刷牙藥川芎滑石細辛白蒺藜藁本甘松石膏茯苓各半兩膽礬白檀麝香右為極細末每日刷之白牙散詩曰細辛蓽撥與防風白芷茯苓恰配芎升麻甘松香附子石膏三倍有神功白牙藥石膏香附子甘松三奈子藿香零陵香沉香川芎細辛各半兩防風一兩右為細末和匀日用少許祛風瑩白牢牙白芷散揩齒白芷升麻藁本細辛沉香丁香石膏貝齒麝香各一分懸水石一兩猪牙皂角右為細末早夜用如常揩牙齒去惡氣槐枝散揩齒變白髭槐枝烏賊魚骨無食子馬齒莧胡桃生地黄青橘皮地黄花皂莢槲葉葱鬚各一兩右細剉入瓷缾内葢口火燒煙出細研為散每日三上陳希夷刷牙藥牢牙齒烏髭􅁂南岳批降方猪牙皂角及薑汁西國升麻熟地黄木鱉旱蓮槐角子細辛荷葉要相當青鹽等分同燒煉研細将來使最良牢齒固牙髭􅁂黒誰知世上有仙方右各二兩除青鹽一味外其餘藥味并碎剉新瓦􅀈兒盛其藥用瓦葢合􅀈口以麻索子繫定上用鹽泥固濟約厚半寸許曬乾穿一地坑子方闊二尺約深一尺先放一新磚後安放藥􅀈以口向下坐用木炭火一秤燒令透候青烟出稍存其性去火放經宿取藥出曬乾為末每用刷牙子醮藥少許刷上下牙齒次用温水潄之每日早辰臨臥時一次於内旱蓮葉如馬齒花如星宿升麻形如鷄骨其色青緑此二味藥本出京兆府奴婢髙邦才謹言牢牙烏髭􅁂藥古今方論甚多少有此經騐畧言如後一方加香芷一祐徳觀景碧虚先生常用此藥年至八十以上面如童子髭鬢甚黒齒落重生儀師顔亦識此人一明昌二年正統軍司書表性大年紀五十歲已上髭鬢本生來黄色因患牙疼用此藥兩月髭􅁂皆變色更不脱落一真祐二年陜西安撫事沈集患牙疼數月用此藥痊可至今常用此外曽經效騐者厯厯甚多不可盡言沉香散揩齒潔凈令白及治口臭沉香麝香各一錢細辛半兩升麻藁本甘松藿香葉白芷各一錢石膏四兩寒水石二兩右為細末每日早晚揩齒揩齒龍腦散龍腦細辛石膏藁本白芷芎藭升麻各一分龍葵花凝水石鹽花研各半兩右搗為散以瓷器盛别用生地黄三斤以竹刀細剉切爆乾入鹽花水拌於銅器中以令黒色又取巨勝子五兩炒猪牙皂角三斤以鹽水浸一宿炙梧桐子半兩牛膝半斤切搗羅為散與前散和令匀每辰臨臥以指取揩齒上訶子散訶子金絲礬川芎細辛砂仁人參各二錢膽礬麝香江茶右為細末臨臥刷牙牙藥方􅒦砂仁二錢華隂細辛滑石香白芷百藥煎川芎膽礬各二錢金絲礬麝香少許右為極細末加上好茶相和早辰刷牙縫黒齒如白玉一方無川芎百藥煎擦齒秦椒散秦椒馬齒莧乾漆生地黄石榴皮柳枝桑白皮胡桃皮白茨皮各等分右細剉入瓷瓶内以鹽泥固濟用炭火十斤燒以炭消為度待冷細研每日早晚揩牙髭髪白即變黒升麻散揩齒去風辟口氣令白凈升麻呉白芷藁本細辛沉香石膏貝齒麝香各一分寒水石一兩右細羅為散研入麝香令匀每用揩齒白牙藥治牙齒黄黒不瑩凈零陵香香芷青鹽升麻各半兩細辛麝香砂鍋石膏各一兩右除砂鍋石膏麝香外同為細末砂鍋等三味同研匀每日早晨以指蘸藥擦牙後用温水潄口傅牙藥方縫黒牙板白猪牙皂角生薑升麻熟地黄旱蓮槐角子細辛甘遂右各等分為細末用瓷器一箇鹽泥固濟入前藥留瓶口用炭火煨燒香烟出為度取出刮下為細末刷牙餘津搽髭鬢色如鴉貝齒散揩齒貝齒文蛤石膏凝水石丹砂石决明各一兩龍腦海水沫右為散早辰臨臥以指蘸揩齒去口氣牛膝散揩齒牛膝生地黄地骨皮馬齒莧鹽猪牙皂角各一分蘭香根饋飯右為散麵裹炭火煨令烟盡取出去麫細研為末揩齒㸃金散揩牙烏髭􅁂兼治牙齒一切疾病麻粹地黄青鹽皂莢東引桃枝柳枝桑枝馬齒右取盛三升瓦礶子一隻将前件藥物隨味分作三處隨一味一重重下於礶子内於外用新瓦一片可礶子口葢覆瓦先穿一小竅外以紙筋泥固濟候乾炭火燒通赤候竅子烟出即塞竅子用冷黄土培一兩宿取出更用升麻白芷各一兩同前藥一處為末以新瓦器密收遂放取不以旦暮揩齒表裏久用髭􅁂黒潤牙齒堅白除口氣香潔合時切忌見婦人鷄犬華山石刻散揩齒烏髭􅁂及治牙齒諸疾若用此藥永不患病鷄腸草旱蓮草茜草根晩蠶砂白礬青鹽不蚛皂莢訶子各等分右㕮咀如麻豆入瓶子内外用鹽泥固濟口上留一竅如皂子大用木炭五斤煆之烟盡為細末每日三二次揩牙令其微熱少時用漿水潄口􅁂髪黄白者皆黒七寶牢牙散細辛川芎砂仁膽礬滑石緑礬各等分麝香少許右為極細末臨刷時以茶旋和匀刷罷用温漿水潄之一方不用滑石以龍骨代之尤妙刷牙藥白芷細辛寒水石石膏茯苓龍骨各一兩石燕子右為極細末日用刷牙白石英散揩齒白石英珊瑚海蛤琥珀各半兩海水末丹砂鍾乳各一分右為散每用少許揩齒鮮白細辛散揩齒細辛升麻白芷藁本沉香丁香石膏各一分右為散每日用柳枝咬頭令軟抹藥揩齒為妙芰實花散揩齒烏髭􅁂變白為黒芰實花糯米花黯子花烏菱崩桃不蚛皂莢麝香右除麝香外研末用糯米飯為丸用炭火燒令通赤候冷入麝香三分都研令細每日早臨臥先将水潄口凈揩齒七寶散揩齒令白凈海蛤兩琥珀兩真珠兩白石英兩瑪瑙兩光明兩麝香一分右為細散於乳鉢内重研細每日取柳枝打碎一頭㸃藥揩齒甚良嚥津無礙仙方刷牙藥烏髭􅁂牢牙齒延年却老青鹽芝麻夏蠶訶子旱蓮草皂莢右同為末醋漿水和丸如彈子大曬乾候用新瓦瓶内盛藥用鹽泥固濟候乾留一小眼子出煙置一凈磚上用木炭火燒俟烟淡熟後即出細研如常刷之如己白者百日黒未白者半月見效惟頻刷尤妙升麻散揩牙如常用升麻生地黄皂莢乾石榴子柳枝巨勝各半兩右剉細入瓷油瓶中以鹽泥固濟炭火燒通赤候冷𢷬研為散金牙散揩齒金牙蟾酥細辛黄芩白芷各半兩升麻一兩右為末别用蕎麥麫四兩以新麻皮擘成片将末裹作團頓磚上四畔以炭火燒一飯久取出候冷和團再為細末别研龍腦麝香各少許具砂鶴黄各半兩再同研匀用瓷合盛逐日㸃藥揩齒上即以煖水潄之如牙齗疼血出揩三五上久揩黒髪髭蓮子草散揩齒蓮子草升麻牛膝茜草丁香各半兩生地黄右入瓶子内泥封頭燒令通赤取出為散如常揩齒麝香散膽礬川芎縮砂緑礬龍骨麝香右等分為細末先用漿水刷牙凈次用藥刷之餘津掠髪􅁂大效貝齒散揩齒令光白貝齒文蛤海蛤石决明光明砂龍腦右細羅為散於乳鉢中研入龍腦令匀每日早辰及夜臥睡常用揩齒此方益牙齒甚騐訶子散漆牙藥牙縫黒緑礬五倍子訶子皮銅緑黄丹右先用前二味牙縫中上了候少時再用後三味依前封裹少時用温漿水潄一方加麝香少許香附子五錢燒灰潰牙藥黒牙縫牢牙五倍子酸石榴皮黄丹右先用前藥末漿水調貼牙縫上後藥如前貼二三日見效槐枝散揩齒去風令白凈槐枝巨勝子青鹽生地黄各一兩皂莢右細剉入一新瓷瓶中盛固濟於瓶口上留一竅如錢孔大然後用文火燒候瓶内藥烟盡為度取出羅為散每用揩齒甚良桑椹散揩齒常令光潤白凈乾桑椹子川升麻皂莢生地黄槐白皮右細研用糯米飯為團以炭燒令通赤候冷入麝香一分都研令細每日早晨及臨臥先以漿水潄口後揩齒仙人散地骨皮青鹽黍粘細辛右為末入麝香少許每用一字臨臥含之茶酒𠻳冷吐出刷牙藥治諸病牙頻刷着牙縫黒齒如白玉𤣥蔞榖精草松子白茯苓右将𤣥蔞盛藥葢之用麻繩縛定鹽泥固濟二指厚用炭火燒紅為度土坑埋冷取出去泥入青鹽少許研細早晨刷牙水吐在盞中用刷牙刷在頭髮上如墨刷牙散烏藥麝香膽礬輕粉右為細末臨臥温漿水潄刷将藥三兩遍口内刷潄之三十日頭白再黒大有功效烏金散茯苓人參細辛麝香右為細末臨臥刷牙􅁂至老不落去牙疳一切風症三物膏齒者骨之所終髓之所養若潄嚥津液災不干齒揩理無方因風招病由此用三物膏揩擦令牙齒堅牢柳枝桑枝槐枝右以水二斗同煮至一半去滓入好鹽一觔熬成膏磁盒内貯臨臥揩牙妙石膏散石膏細辛柳根各等分右為末擦之牙藥方輕粉井鹽烏梅右為末加片腦麝香少許或二錢或三錢大有神效早晚刷餘津就嚥潄大聖散牢牙益齒皂莢訶梨勒皮鹽各一兩右搗碎以麵裹成團用槐枝火燒煙盡為度别入升麻細辛各一兩搗末每日早晚揩牙温水潄口皂莢散揩齒皂莢羊腸草青鹽右細研為散每用揩齒龍花蘂散揩齒龍花蘂凝水石生地黄右為散日常用擦牙千金鹽湯揩齒固牙藥中第一方也兼潄津洗目極效治牙疼極效川百煎雄黄𤣥胡索右為細末先用研爛生薑揩牙搜盡涎潄去却用此藥揩之嚥下亦可如牙腫牽連頭目用此即瘥又方黄連黄蘗大黄右為細末生薑自然汁如梧桐子大捻作餅子隂乾貼在痛處刷牙藥方香附子大黄右用橡子二十箇内十八箇裝滿青鹽於沙器内單擺定用碗葢之燒存性外生橡子二箇并香附子大黄同為細末每日刷牙髭鬢當歸散揩牙烏髭及治牙疳出血久不瘥當歸鯽魚右紙裹泥固濟燒黒灰入燒鹽同和揩牙如常潄之妙白牙散用酸棗仁麻枯不拘多少煆過加麝香少許刷牙又方蜂房白礬猪牙皂角右各等分槌碎水一碗煎沸潄口不可嚥黄工部牙刷細辛藁本白芷各二兩白礬四兩生薑六兩右件為末如常用受邦齒藥香附子半斤細辛鹽各二兩右取香附子新大者去粗皮細剉用生薑一斤研取汁拌和香附子浸五七日取出去香附子不用薑滓汁後将細辛與香附子鹽同瓦炒存性逐日揩牙如常用之揩齒法欲使藥時用生薑一塊如杏仁大爛嚼須臾即吐却滓以左手揩三五遍就濕指㸃藥末更揩十數遍含津塗髭髪待辛辣走即細細嚥之此藥兼治脚氣腸風上氣駐顔益齒若能勤用一生白髪髭者一百日即黒赤者五十日黒用二十日即便見效也若能空心三遍更飯後用之見效即速矣苦參不可潔齒予常苦腰重久坐則傴僂十餘歩然後能行有一将佐見予日用苦參潔齒葢予時以齒病用苦參數年曰此病由也苦參入齒其氣傷腎能使人腰重後有太常少卿舒昭亮用苦參揩齒日久病腰重自此悉不用腫疼皆愈此皆方書所不載遺山牢牙散茯苓石膏龍骨各一兩寒水石白芷細辛石燕子大者一隻右為細末早晚刷牙一方㸃落病牙用茄柯馬尿浸三日出晒乾剉炒為末㸃牙即落切忌勿近好牙又方用白馬尿煎巴豆揩牙即落勿近好肉胡桃灰散揩齒胡桃灰貝母各一兩右研為散每用揩牙牙齒黄黒論腎主骨齒者骨之餘也人之腎氣强骨髓堅固則齒瑩白璀璨今腎氣弱無以榮齒骨髓不固令牙齒枯槁則黄黒方白牙散石膏細辛地骨青鹽甘松藿香零陵香白芷藁本各三錢磁石末新磚末香附子麝香少許右為末擦牙宣大效龍花蕊散治牙黄黒龍花蕊郁李仁升麻黄芩地骨皮白蒺藜地栢汁呉蘭各一兩麝香龍腦半錢右為散次入腦麝細研凡口齒之疾無不治每用貼時先以柳枝凈揩齒以新汲水潄口更以鹽花於齒齗内外揩之含涎唾即吐不要潄口便取白薄紙作片子濶如韭菜以水蘸紙摻藥末少許貼齒齗上嚥津亦得升麻散治齒黄黒揩齒令白升麻防風細辛各一分鍾乳凝水石白石英丹砂半兩沉香丁香麝香各一分右為細末每用少許揩齒一方有石膏無防風硃砂散治齒黄黒令白凈揩齒硃砂海蛤石膏細辛川升麻防風各二兩寒水石芎藭㯽榔生地黄右為散都令勻每日早辰夜臥時先以煖水潄口三五度用藥揩牙齒以白紙貼藥於齗上便睡不用潄口甚效龍花蘂散治齒黄黒龍花蘂川升麻郁李仁生地黄杏仁地骨皮白蒺藜細辛龍腦麝香右為散入研令勻每欲貼時先以柳枝凈揩齒以新汲水潄口更以鹽花於齒齗内外揩之有涎即吐却不要潄口便取白薄紙剪作片子濶如韭葉以水蘸之摻藥末少許貼齒齗上便閉口勿語藥汁嚥之石膏散治齒黒黄并口臭揩齒石膏凝水石丹砂升麻白芷細辛藁本各半兩沉香一兩右為散每日揩齒用柳枝咬頭令軟抹藥末揩齒常令鮮白去惡氣更入麝香少許更佳鍾乳散治牙齒黒黄揩令鮮明潤澤鍾乳海蛤丹砂浮石白英真珠麝香硼砂各一分研右為細散再研令勻用柳枝咬頭令軟抹藥揩齒甚妙空青散治齒黒黄揩令白凈空青皂莢曽青銅緑石膏各一分戎鹽半兩丹砂半兩麝香一分右為散用紙三五重裹以黄泥再放炭火中燒令通赤候冷去泥入丹砂麝香研令細用柳枝抹揩一方無銅緑有梧桐淚升麻三分白芷藁本沉香細辛丁香各半分凝水石一兩為散每早晨臨臥時揩齒地骨皮散治齒黄黒枯燥無光澤地骨皮郁李仁生地黄各一兩川升麻一兩半藁本露蜂房各半兩杏仁一兩右為散每用一錢以綿裹常含嚥津白芷散治齒黄黒洗齒白白芷白歛莎草根白石英芎藭細辛右各等分搗研為散常用揩齒烏金潰牙藥百藥煎膽礬五倍子各等分右為細末擦牙上用漿水潄之治牙黄藥方川芎丁香右各等分為細末擦牙如雪白效揩齒方治牙黄黒令白凈鹽四兩燒過杏仁一兩右都研成膏每用揩齒甚佳治齒黒黄揩齒出十便良方用桑根白皮剉不拘多少以醋浸三日揩牙齒升麻散治齒黒黄揩令白凈升麻三分白芷藁本去苗土沉香剉細辛去苗葉丁香各半兩凝水石研一兩右為散每早辰臨臥時揩齒普濟方卷七十
