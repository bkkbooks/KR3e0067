body:
  text: 普濟方卷三百三十九明周王朱橚撰姙娠諸疾門中風附論夫四時八方之氣為風也常以冬至之日候之若從其鄉來者長養萬物若不從其鄉來者多為虛邪賊害萬物人體虚則中之若邪風客於皮膚入于經絡即頑痺不仁若入于筋脉挾寒則攣急喎擗挾温則㢮縱若入臟腑則恍惚驚悸凢五臟俞皆在背臓腑虚風邪皆從俞而入隨所傷臟腑經絡而為諸病也姙娠中風若不早治則令堕胎也夫姙娠體虚受風而傷太陽之經絡後復遇風寒相搏發則口禁背強名之曰痙又云痓其候昏悶不識人須㬰自醒良乆復作謂之風痙亦名子癎亦名子冐甚則反張葛根湯若有竹近可速辦者當先作瀝汁次辦湯也其竹逺不可即辦者當先辦湯此二療㑹得其一種其竹瀝偏主諸痙絶起死也非但偏療姙娠産婦絶死者有効小兒或癎痙金瘡發痙療之亦騐方赤箭丸出聖惠方治姙娠中風手足不遂筋脉縁急言語謇澁皮膚不仁赤箭萆薢麻黄去根節獨活羚羊角屑䑕黏子熟亁地黄已上各一兩防風去蘆頭芎藭當歸剉微炒薏以仁阿膠搗碎炒令黄燥五加皮秦艽去苖漢防己栢子仁酸棗仁丹參已上各三分右搗細羅為末煉蜜和搗三五百杵丸如梧桐子大每服食前以豆淋酒下二十丸烏犀丸出聖惠方治姙娠中風口面喎僻言語謇澁身體強直或時反張烏犀角屑赤箭麻黄去根節酸棗仁微炒阿膠搗碎炒令黄燥已上各一兩天南星炮製漢防己各半兩秦艽去苖獨活羚羊角屑防風去蘆頭白附子炮製白殭蠶微炒芎藭當歸剉微炒桑寄生已上各三分龍腦一分研入右搗細羅為末入研了藥令勻煉蜜和搗三五百杵丸如梧桐子大不計時候以薄荷酒下二十丸桑枝煎丸治姙娠中風手足緩弱口面喎斜言語謇澁枝節疼痛桑枝槐枝栁枝已上各一觔細剉黒豆一升淘洗過天蓼术半觔挫已上藥以水二斗煎至五升濾去滓入酒一升更熬令如稀天麻二兩獨活海桐皮萆薢芎藭防風去蘆頭五加皮酸􅀥仁微炒薏苡仁桂心已上各一兩生亁地黄一兩半右搗細羅為末入前煎中去滓更少入煉蜜和搗三五百杵丸如梧桐子大每服食前以温酒下二十丸生地黄煎出聖惠方治姙娠中風筋脉攣急口眼喎斜皮膚頑麻言語常澁生地黄五觔搗絞取汁黒豆一升以水四升煑取一升半去豆大甜石榴五顆搗絞取汁枸杞根一觔細剉入水一中盞搗絞取汁荆瀝半升桑根白皮一觔細剉入水一中盞搗絞取汁竹瀝半升白蜜五兩已上諸藥汁相和於銀石鍋中慢火熬如稀餳入後藥末羚羊角屑天門冬去心焙天麻酸棗仁微炒當歸剉微炒羗活薏苡仁蠶沙微炒已上各一兩右搗細羅為末研令細入前煎中攪令勻瓷器中盛每服不計時候以温酒調下一大匙頭鐵精丸出聖惠方治姙娠中風心神恍惚狂言亂語驚悸煩亂不得睡臥鐵精細研龍齒細研犀角屑茯神生亁地黄已上各一兩天竹黄人參去蘆頭逺志防風去蘆頭菖蒲白蘚皮已上各三分麦門冬一兩半去心焙金薄二十一片研入銀薄二十一片研入龍腦半分研入右搗細羅為末入研了藥令勻煉蜜和搗三二百杵丸如桐子大每服不計時候以竹葉湯放冷下二十丸茯神散出聖惠方治姙娠中風心神恍惚驚悸胎動不安言語失次四肢抽掣茯神麦門冬去心龍齒石膏已上各一兩人參去蘆頭防風去蘆頭生亁地黄桑寄生已上各三分獨活犀角屑鈎藤白蘚皮逺志去心甘草已上各半兩炙㣲赤剉右搗篩為散每服四錢以金銀水一中盞煎至六分去滓不計時候温服獨活散治姙娠因洗頭中風身體強硬牙關𦂳急失音不語獨活赤箭麻黄去根節阿膠各一兩搗碎炒黄燥烏犀角屑羗活防風去蘆頭龍腦一分研入天蓼木白附子已上各三兩右搗細羅為散入研了藥令勻每服不計時候以薄荷湯調下二錢烏犀角丸治姙娠中風口面喎僻言語謇澁身體拘急烏犀角屑防風去蘆頭天蓼木羗活獨活羚羊角屑赤箭芎藭天門冬去心焙阿膠搗碎炒令黄燥大麻仁已上各一兩麻黄一兩半去根節秦艽去苗桑寄生各三分右搗細羅為末煉蜜和搗三二百杵丸如梧桐子大每服食前以薄荷湯下三十丸酸石榴煎出聖惠方治姙娠中風口眼不正言語謇澁手足不遂酸石榴十顆并皮細切研絞更入水一中盞再絞取汁去滓鵝梨十顆搗絞取汁荆芥五兩細剉入水一中盞研絞取汁薄荷五兩細剉入水一中盞研絞取汁牛旁根半觔浄洗切研絞取汁竹瀝一中盞生地黄汁一中盞白蜜三兩已上諸藥汁相和於銀石鍋中慢火熬如􅄳入後藥末赤箭二兩獨活羚羊角屑防風去蘆頭桑寄生阿膠已上各一兩搗碎炒令黄燥右搗細羅為末研令細入前煎中攪令勻瓷器中盛每服不計時候以温酒調下一大匙頭葛根湯一名漢防己湯療姙娠臨月因發風痙忽悶憒不識人吐逆眩倒小醒復發名為子癎葛根貝母去心牡丹皮去心木防己防風當歸川芎白茯苓桂心熬澤㵼甘草各二兩獨活石膏碎人參各三兩右細切以水九升煑取三升分二服貝母令人易産若未臨月者升麻代之忌海藻菘菜酢物若有竹瀝先作汁次辦湯竹逺則先服此湯竹瀝偏療諸痙起死非但偏治姙娠産婦絶死者小兒或癎痙金瘡發痙治亦効天麻散出聖惠方治姙娠中風牙關𦂳急身體強直言語不得痰涎壅滯心胸煩悶天麻獨活麻黄各一兩去根節白殭蠶微炒白附子炮製羚羊角屑防風去蘆頭阿膠各三分搗碎炒黄燥半夏湯洗七遍去滑生姜半兩去皮同搗炒令亁犀角屑甘草各半兩炙㣲赤剉龍腦半分研入右搗細羅為散入研了藥令勻每服不計時候以竹瀝調下一錢防風散出大全良方治姙娠中風卒倒心神悶亂口禁不能言四肢強急此藥主之防風桑寄生葛根各一兩菊花防己北細辛秦艽當歸桂心茯神甘草羚羊角屑各半兩右為粗末每服四錢水一中盞姜三片煎至六分去滓入竹瀝半合温服麻黄散一名獨活防風湯出大全良方治姙娠中風角弓反張口噤語澁謂之風痙亦名子癎麻黄去節防風獨活各一兩羚羊角屑桂心升麻酸􅀥仁炒甘草秦艽各半兩川芎當歸杏仁製各三分右㕮咀每服四錢水一盞姜四片煎至六分去滓入竹瀝半合温服羚羊角散出永類鈴方治姙娠中風頭項強直筋脉攣急言語謇澁痰涎不消或發搐不省人事名曰子癎亦宜服之羚羊角鎊川獨活去蘆酸棗仁炒去壳五加皮去木各半錢薏苡仁炒防風去蘆當歸去蘆酒浸川芎茯神去木杏仁去皮尖各四分木香不見火甘草炙各二分半右㕮咀每服四錢水一盞生姜五片煎至七分去滓温服不計時候芎藭散治姙娠中風四肢腰背強直言語謇澁心神煩悶芎藭防風各一兩去蘆犀角屑葛根獨活漢防己赤箭羚羊角屑甘草各半兩炙微赤剉生亁地黄麻黄去根節杏仁各三分湯浸去皮尖䨇人麸炒微黄右搗篩為散每服四錢水一盞入生姜半分煎至六分入竹瀝半合不計時候温服羚羊角散治姙娠中風頭項強直筋脉攣急手足不隨言語謇澁痰涎不消或時發搐不省人事名曰子癎羚羊角屑獨活酸棗仁各一兩薏苡仁防風去蘆頭五加皮當歸剉微炒芎藭萆薢海桐皮已上各三分蔓荆子甘草各半兩炙微赤剉右搗篩為散每服四錢水一盞入生姜半分煎至六分去滓不計時候温服一方無甘草生犀角散治姙娠中風不語四肢強直心神昏昧宜服生犀角屑麻黄各一兩去根節防風去蘆頭赤箭羗活當歸剉微炒人參去蘆頭葛根赤芍藥已上各三分秦艽去苗甘草各半兩炙微赤剉石膏右搗篩為散每服四錢水一盞煎至六分去滓入竹瀝半合不計時候温服烏金煎治姙娠中風語澁頭疼心神煩悶胎動不安黒豆一升淘洗令净獨活羚羊角屑防風去蘆頭茯神牡荆子牛旁根桑椹桑寄生薄荷荆芥已上各一兩生亁地黄右搗篩以水一斗五升煎至五升去滓入白蜜三兩竹瀝半升更熬令如稠􅄳瓷器中盛每服不計時候以金銀温湯調下一大匙頭獨活散治姙娠中風腰背強直或時反張名為風痙獨活防風去蘆頭赤箭麻黄各一兩去根節葛根剉芎藭秦艽去苗五加皮甘草各半兩炙微赤剉羚羊角屑當歸酸棗仁各三分微炒右搗篩為散每服四錢水一盞入生姜半分煎至六分去滓不計時候温服天麻散治姙娠中風痙身體強直或時反張口噤失音天麻一兩天南星炮製獨活防風去蘆頭芎藭酸􅀥仁㣲炒白附子炮製羚羊角屑各半兩犀角屑阿膠搗碎炒令黄燥麻黄各三分去根節龍腦一分研入右搗細羅為散入研了藥令勻每服不計時候以竹瀝調下一錢木防己散治姙娠中風口眼不正手足頑痺防風羗活防己各一兩麻黄半兩去節桂心半兩黄松木節一兩荆芥穗羚羊角屑甘草桑寄生薏苡仁各半兩右㕮咀每服三錢水一盞生姜半分煎至七分去滓温服防風散治姙娠中風腰背強直時復反張名為風痙防風葛根川芎生亁地黄各三兩杏仁製麻黄去節各一兩半桂心獨活甘草防己各一兩右㕮咀每服四錢水一盞煎至七分去滓温服白姜蠶散治姙娠中風口噤心膈痰涎壅滯言語不得四肢強直白殭蠶微炒天麻獨活各一兩烏犀角屑三分白附子炮製半夏湯洗十遍去滑以生姜半兩去皮同搗爛焙亁藿香龍腦一錢研入天南星各半兩炮製麻黄一兩半去根節右搗細羅為散入研了藥令勻每服不計時候以生姜薄荷湯調下一錢羗活散治姙娠中風痙口噤憒悶不能言身體強直或時反張羗活防風去蘆頭芎藭葛根剉秦艽各三分去苗麻黄三兩去根節杏仁一兩半湯浸去皮尖䨇人麸炒微黄犀角屑甘草各半兩炙微赤剉右㨶粗羅為散每服四錢水一盞入生姜半分煎至六分去滓不計時候温服梨汁飲子治姙娠中風失音不語心神冐悶梨汁二合竹瀝二合生地黄汁二合牛乳一合白蜜半合右件藥相和令勻每服飲一小盞荆瀝飲子治姙娠中風語澁舌不轉心煩悶荆瀝二合生葛根汁二合竹瀝三合白蜜半合右件藥相和令勻煎一沸每服温飲一小盞獨活飲子治姙娠中風口面喎斜語澁舌不轉獨活一兩剉竹瀝二合生地黄汁二合右件藥先以水一大盞煎獨活至六分去滓下竹瀝地黄汁攪勻更煎一沸分温二服阿膠飲子治姙娠中風語澁心煩項強背拘急眼澁頭疼昏昏多睡阿膠半兩搗碎炒令黄燥竹瀝五合荆瀝三合右件藥相和令勻每服温飲一小盞荆瀝飲子治姙娠中風痙口噤荆瀝三合竹瀝五合梨汁三合右件藥相和令勻分温兩度灌之竹瀝飲子治姙娠中風痙口噤煩悶竹瀝五合人參二合陳醤汁半合右件藥相和温分二服拗開口灌之白术酒治姙娠中風口噤語言不得白术一兩半獨活一兩黒豆一合炒右細剉以酒三升煎取一升半去滓温分四服口噤者拗開灌之得汗即愈一方無黒豆亦治通身冷直一方有防風防風湯治姙娠中風口噤四肢強直反張一名羗活酒防風五分羗活一錢半右為細末以黒豆一合炒燋火煙出投無灰酒候沸定以酒調藥斡開口灌下稍甦再灌却與治剛柔二痙藥速救省人事治姙娠因感外風如中風狀不省人急用熟艾三兩以米醋炒令極熱乘熱以絹帛褁熨向臍下良乆開省治姙娠中風寒熱腹中絞痛不可針灸方亦療姙娠時行傷寒急用鯽魚一頭焼作灰搗末酒服方寸匕取汗一方有用亁魚一枚焼灰酒服不用鯽魚作竹瀝法右取新伐青淡竹斷之除兩頭節留中央一節作片以塼並側令竹兩頭虚布列其上焼中央兩頭汁出以器承之取服治姙娠忽如中風心前昏悶却如有一塊物上塞咽喉便昏迷不識人事宜服此方大腑虚冷喫食減少即不宜服麥門冬去心防風沉香藿香桑寄生川芎各一分半夏二銖右細杵羅為末每服二錢水一盞煎取