同浸一宿次日煎至一盞半去滓温服紫苑湯治嗽喘肺脹不得眠卧氣急欲絶紫苑去苗土焙乾一兩半甘草炙剉二兩㯽榔七枚剉赤茯苓葶藶子炒一兩右搗篩每服三錢水一盞煎至七分去滓温服日三以快利為度半夏湯出金匱方治肺脹欬逆倚息喘目如脱脉浮大半夏半升湯浸七次去滑麻黄去根節湯煑掠去沫六兩石膏碎半觔甘草炙二兩右㕮咀如麻豆大每服五錢水二盞入生薑五片􅀥二枚煎至一盞去滓温服日三杏仁丸治肺氣喘急者由肺乘於風邪則肺脹或肺管不利經絡澁氣道不宣則上氣逆喘或息鳴杏仁湯浸去皮尖雙仁炒馬兠鈴蟬蜕各半兩砒霜研一分右為末煑􅀥二十枚去皮核爛研和丸如梧桐子大每服一丸至二丸空心薄荷湯下皺肺丸治肺脹五靈脂研二兩栢子仁半兩胡桃八枚去殻研右研成膏滴水為丸如小豆大煎香甘草湯下十五丸木通飲治肺脹膈膨膨喘嗽缺盆中痛木通剉桔梗炒桑根白皮升麻黄芩去黒心各一兩半惡實炒一兩右麄搗篩每服五錢水一盞半生地黄分半切煎至八分去滓温服肺氣喘急附論夫肺氣喘急者肺腎氣虚寒濕至陰氣所為也肺為五臟之盖腎之脉入肺故下虚上實則氣道奔廹肺氣高舉上焦不通喘急不得安卧又内經謂水病下為䯒腫大腹上為喘呼不得卧者標本俱病也方馬兠鈴散出聖惠方治肺氣喘急時坐卧不得喉中鳴心胸滿悶馬兠三分桑根白皮三分剉漢防風半兩麻黄三分去根節白茯苓一兩柴胡三分去蘆白前半兩大腹皮三分剉陳橘皮一兩湯浸去白穰焙桔梗三分去蘆五味子半兩甘草一分炙㣲赤剉紫苑半兩湯洗去苖土杏仁五十枚湯浸去皮尖雙仁麩炒㣲黄右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服忌炙煿熱麵大腹皮散出聖惠方治肺氣喘急不思飲食大腹皮剉赤茯苓枳殻麩炒㣲黄去穰桔梗去蘆頭人參去蘆頭陳橘皮湯浸去穰焙半夏湯浸七次去滑川大黄剉焙㣲炒杏仁湯浸去皮尖雙仁炒訶梨勒皮桂心已上半兩甘草一分炙㣲赤剉右為散每服三錢以水一中盞煎至六分去滓不計時候温服澤漆湯治肺氣喘急坐卧不得澤漆一兩桑根白皮剉赤茯苓去黒皮各一兩半紫苑去土一兩半木通剉陳皮湯浸去白焙各三分紫蘇葉一兩一分甘草炙半兩大腹并子三顆右剉如麻豆大分六貼水三盞入生薑一分煎取二去滓三服一日盡紫苑湯治肺氣喘急咳嗽胸中塞滿紫苑去苖土桑根白皮剉各一兩半欵冬花一兩萎􅅋一兩一分柴胡去苖一兩半桔梗炒一兩一分甘草炙半兩升麻一兩一分射干一分右剉如麻豆大分六貼水三盞入生薑一分煎至二盞去滓分三服一日盡黄芩湯楊子建䕶命方治久患肺氣喘急喉中作聲上焦壅熱不能起動先宜喫解上焦散子黄芩去黑心杏仁去皮尖雙仁炒麻黄去根節湯煑掠去沫焙𦍑活去蘆人參升麻桔梗炒各三分黄連去鬚錢半蛤蚧酥炙半兩右搗篩每服三錢水一盞煎五沸去滓食後臨卧服未愈更服葶藶丸葶藶丸楊子建䕶命方葶藶子隔紙炒半兩鉛丹細研砒霜夜間露七夜細研日收半夏湯浸去滑焙羌活去苗頭杏仁去皮尖雙仁炒馬兠鈴各一兩右件除砒霜鉛丹二味研如飛塵所餘衆藥另研并杵羅為末却襄在乳鉢内爛研千百搗令如飛塵以􅀥肉丸如菉豆大丹砂為衣食後䓤茶下三十丸實氣者加至五七丸紫蘇散出聖惠方治肺氣壅滯咳嗽發即氣喘煩悶紫蘇莖葉猪苓去黒皮陳橘皮各一兩湯浸去白焙乾馬兠鈴七枚細剉如皮子桑根白皮剉碎搏去粗皮麥門冬去心大腹皮剉赤茯苓去皮枳殻各一兩麩炒黄去穰右為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候服朴硝丸出聖惠方治肺氣喘急不得卧無問晝夜長倚物坐惟食稀粥服此藥其氣極當日便减更經三五日卧穩頭着枕小便通心膓氣散二十日外平復如故兼治水腫朴硝芒硝熛熱各二兩硝石一兩與前二味同研犀角鎊椒目㣲炒同搗為末各一兩莨菪子掬去浮者煑乾炒黒甜葶藶隔紙炒紫色各半兩杏仁湯浸去皮尖雙仁麩炒二兩與前二味搗如膏右各研勻棗肉和搗三五百杵丸如桐大每服棗湯十五丸不拘時候水蓼散治肺久勞患喘急坐卧不得涎唾稠黏水蓼覆盆子五味子京三稜炮蘹香子炒皂角子炮桑皮各一兩甘草炙二錢右為散毎服四錢水一大盞煎至七分去滓溫服五味子出聖惠方治多年肺氣累療不瘥心膈煩悶喘促砒霜一兩以熱絹裹用大蘿蔔一枚開一竅却以綿經繫内鍋中以水入燈心五束煑半日出之取砒霜研令細入後藥用之五味子半兩搗末金箔五十片研黄蘗半兩研末銀箔五十片研菉豆粉一兩蜜陀僧半兩研膩粉一錢右件藥同研令勻煑棗肉和丸如梧桐子大以沙糖温水研化一丸食後服之通膈湯治肺氣喘急煩悶或時候咳嗽射干桑根白皮炙剉一兩麻黄去根節湯煑掠去沫甘草炙各一兩㯽榔剉草豆䓻仁各半兩郁李仁麩炒去皮一兩右搗篩毎服三錢水一盞入生薑一􅀥大同煎至七分去滓食後温服阿膠膏出聖惠方治肺氣喘急下焦虚傷阿膠三兩搗碎炒令黄燥為末白羊腎三對去筋膜切細研杏仁三兩湯浸去皮尖雙仁麩㣲炒黄研如膏薯蕷三兩搗為末薤白一握細切牛黄酥四兩羊腎脂四兩煑去滓右件藥相和於磁瓶内貯之蒸半日令藥成膏每服不計時候用煖酒調下一茶匙牛黄丸出聖惠方治肺氣定喘嗽牛黄半兩細研人參一兩去蘆頭赤茯苓一兩蛤蚧一雙頭尾全者塗酥炙令黄訶梨勒煨用皮杏仁三分湯浸去皮尖雙仁麩炒㣲黄甘草半兩炙㣲赤剉右為末入牛黄更研令勻鍊蜜蠟同丸如芡實大不拘時候含一丸嚥津雞膍胵丸一名救生丹治肺氣喘急坐卧不得出王氏博濟方雞膍子二七枚湯焙半夏一分湯洗七次去滑牽牛子半兩瓦上煿乾令焦甜葶藶半兩炒砒霜半分露至七宿細研收於床下鉛丹治如砒霜者半兩右為末用紅棗肉和丸如菉豆大丹砂為衣食後臨卧葱與臘茶湯下七丸甚者加至十丸一方為丸如乾入醋少許忌太冷大熱毒食等麻黄生薑湯治肺氣喘急麻黄去根節煎掠去沫焙一兩五味子甘草炙各二兩杏仁去皮尖雙仁炒八十枚淡竹葉切一升石膏研六兩右㕮咀如麻豆大毎服六錢水二盞去滓温服日三麻黄散出聖惠方治肺氣喘急腹脇疼痛麻黄一兩去根節赤茯苓桂心各一兩桔梗一兩半去蘆頭甘草半兩炙剉㣲黄杏仁四十九枚湯浸去皮尖雙仁麩炒㣲黄右為散每服四錢水一中盞煎至六分去滓不計時候温服桔梗湯出聖惠方治肺氣喘急咳嗽桔梗一兩去蘆頭桑根白皮三分剉甘草半兩炙㣲黄剉訶梨勒皮三分乾桑葉半兩貝母半兩煨令㣲黄右為散每服不計時候以稀粥糯米飲調下一錢潤肺湯治肺氣喘急四肢乏力飲食無味杏仁湯浸去皮尖雙仁炒一兩麻黄去根節湯煑掠去沫乾焙二兩甘草炙一兩紫蘇子炒一分貝母炒一兩去心右搗篩每服三錢水一盞入乾柿一枚切煎至六分去滓温服空心日午臨卧各一蜀椒丸治肺氣喘急坐卧不得蜀椒去目閉口者炒出汗一兩乾薑炮半兩葶藶子隔紙炒三分猪牙皂角去皮塗酥炙一兩右為末以棗肉和丸如梧桐子大每服三丸煎桑根白皮湯下不拘時候如聖飲治肺氣上喘不以久新麻去根不去節寸截沸湯掠去沫六兩甘草炙一兩桂去麄皮半兩杏仁湯浸去皮尖雙仁四十九枚右剉如麻豆以水五盞銀石噐内慢火煎取三盞澄清放温每服半盞服罷去枕具仰卧其喘立止餘藥以凈瓶盛外以温湯飬之旋旋服防己丸出聖惠方治肺氣咳嗽喘促坐卧不得防己一兩陳皮湯浸去白半兩甜葶藶隔紙炒三分猪牙皂莢去黒皮酥炙一兩右為末煑􅀥肉和搗三五百杵如梧桐子大每服十丸至十五丸煎桑白皮湯下食後臨卧一方無陳皮用乾薑四神湯治肺喘麻黄去根節湯浸去沫五味子各一兩甘草炙半兩杏仁去皮尖雙仁麩炒二十五枚右㕮咀如麻豆大每服五錢水二盞煎至一盞去滓温服仰卧少許桂皮散治肺臟喘急胸膈壅滯大腸不利桂去粗皮陳橘皮湯浸去白炒各一兩白㯽榔剉一兩半牽牛子半生半熟二兩右為散每服三錢温酒調下空心食前服日三葶藶丸治久患肺氣喘急痰壅悶亂甜葶藶一兩隔紙炒紫色别研如膏貝母一兩煨令㣲黄搗末杏仁一兩湯浸去皮尖雙仁炒㣲黄研如膏皂莢一兩炮碎以酒五合浸取汁􅆈成膏右都研令勻以皂莢膏丸如梧桐子大每服不拘時候以桑根白皮湯下二十丸瀉肺湯治肺氣肺癰喘急坐卧不安桑根白皮剉炒甜葶藶隔紙炒各一兩右搗篩每服三錢一盞煎至六分去滓食後温服㣲利為度猪胰散治肺氣遠年不痊猪膩一具去脂細切官粉一兩右入磁瓶内固濟上留小竅煆煙盡細研每服二錢空心漿水調下清肺散治肺喘氣短蒲頽葉蒲頽葉㣲似棠葉大柔厚皆白似熟羊皮經冬不凋花如丁香蒂極細女絲倒垂之風吹則揺然冬末生花至正乃敷實一如山茱萸味酥可啖與麥齊熟實不甚大吳人名半舍春紅南名棠京師名曰紙錢棠毬襄漢名黄婆妳右為細末每服二錢温水調下發時服有人患喘三十年者服之皆愈甚者服藥後胸上生小癮胗癢者其疾則瘥一方用人參等分猪胰酒治肺氣喘急唾卧不安大􅀥百枚猪胰一具右以酒五升浸之秋冬七月春夏五月出布絞去滓七日服盡二七日亦得忌鹽羊胰亦可治欬嗽胸脇支滿多喘上氣尤良亦治久嗽上氣二十年者治不瘥主肺氣喘息急坐卧不得桑白皮一兩地骨皮一兩甘草半兩右作飲子水三升煑一升食後分二服日只可兩劑治久患肺氣喘急至効以杏仁去皮尖二兩童子小便浸一日一換夏月日三四換浸半月取焙乾爛研令極細每服一棗大薄荷一葉蜜一雞頭大水一中盞同煎取七分食後温服甚者不過三劑瘥永不發動忌腥物治肺壅氣喘急不得卧以葶藶子三兩炒大􅀥三十枚水三升煑棗取三升又煎取一升去滓二服治肺氣上喘兼咳嗽以崖椒并野薑簁為末酒服一錢匕甚效忌鹽肺痿附論夫肺痿寸口脉數其人病欬中反有濁唾涎沫出何也人曰為肺痿之病何從得之師曰病熱在上焦因欬為肺痿或從汗出或從嘔吐或從消渴小便利數或從便難數被快藥下重亡津液故得肺痿又寸口脉不出而反發汗陽脉短數陰脉不澁三焦踟蹰入而不出陰脉不澁寸口數而虛按之濇身體反冷其内反煩多唾唇燥小便反難此為肺痿復於津液便如爛𤓰下如㭬腦但坐發汗故也其病欬𠻳不得欬嗽乾沫出久小便不利其脉平弱肺痿吐涎沫而不欬者其人不渴必遺溺小便數所以然者上虛不能制下故也此為肺中冷必眩師曰肺痿咳唾咽燥欲飲者自愈自張口者短氣也肺為五臟華盖百脉取氣運動血脉衛飬腑臟灌注皮毛將理失宜氣與血亂則成肺痿癰矣然五臟皆有痿癰而獨論此者以肺屬金數盡於陽九位最高内為五臟長多致此病故獨論此方清燥湯六七月之間濕令大行子能令母實而熱旺濕熱大勝而刑庚大腸故寒凉以救之以天令言之則清燥之氣絶矣古人之法夏月熱以救熱傷天真元氣燥金受濕熱之邪絶寒水生化之源源絶則腎虧痿厥之病大作腰以下痿軟癱瘓不能動行及不正兩足欹側更宿有濕熱之證當急救之一名茯苓燥濕湯黄耆一錢半黄連凈一分蒼术一錢五味子九箇白术半錢橘皮半錢人參三分當歸身二分生地黄二分麵二分升麻三分白茯苓三分澤㵼半錢猪苓酒黄蘖一分柴胡一分甘草炙二分麥門冬二分右㕮咀如麻豆大每服半兩水二盞半煎至一盞去滓稍熱空心服知母茯苓湯治肺痿喘嗽不已往來寒熱自汗茯