地黄三分白茯苓半兩人參一兩去蘆頭麥門冬半兩去心焙蛤蚧一隻頭尾全塗酥炙令黄側栢葉一兩塗酥炙令黄右為散毎服不計時候以粥飲調下一錢犀角飲治肺痿咳嗽氣喘喉中有血犀角鎊竹茹各一兩桔梗炒柴胡去苗黄芩去黒心兩半生天門冬去心朴硝右㕮咀每服五錢水二盞煎至一盞去滓下朴硝少許温服治肺破出血忽嗽血不止者用海犀一大片於火上炙令焦黄色後以膠塗之又炙再塗令通透可碾為末用湯化三大錢七放冷服之即血止水膠是也大驗地黄湯治虛寒肺痿喘氣熟乾地黄芎藭各五兩桂去粗皮人參各三兩大麻仁一升炒研為末桑根白皮剉炒二升右除麻仁外並細剉每服五錢水二盞煎至一盞去滓入麻仁少許更煎數沸温服日三杏仁煎治肺痿久嗽杏仁去皮尖雙仁炒黄研阿膠炙燥各半兩栝蔞一兩剉人參一兩貝母去心焙丹砂各一分研右為末入瓷噐中同白餳三兩熬成煎每服皂子大食後夜卧時含化鹿髓煎治傷中脉絶筋急肺痿咳嗽鹿髓半升蜜酥各一兩生地黄取汁五合杏仁桃仁各三兩湯浸去皮尖雙仁炒搗碎酒一升濾去汁右先煎桃仁杏仁地黄汁减半次下鹿髓酥蜜煎如稀餳每服一匙頭徐徐嚥服空心食前日三桂枝皂莢湯出千金方治肺痿吐涎沫不止桂枝生薑各三兩甘草二兩皂莢一兩大棗十五枚右㕮咀以水七升煑取三升去滓分三服人參散治身熱頭痛積熱黄瘦肌熱惡寒畜熱發戰膈熱嘔吐煩渴濕熱㵼利或目赤口瘡咽喉腫痛或風昏眩虚汗肺痿勞嗽石膏甘草各一兩滑石四兩寒水石二兩人參半兩右為末每服三錢温水調下早晩食後兼服梔子金花丸温中生薑湯出千金方治肺虛寒羸瘦緩弱戰掉虛吸胸滿肺痿生薑一片桂心橘皮四兩甘草麻黄右㕮咀以水一斗煑取二升半分三服先煎麻黄沸去滓然後入諸藥合煑半夏肺痿湯療虛寒喘鳴多飲逆氣嘔吐半夏一升湯浸四次母薑一觔橘皮一觔白术半觔桂心四兩右切以水九升煑取三升去滓分温三服忌羊肉餳桃李雀肉生葱一方有桑白皮切一升四聖散治欬嗽有血晋鹽槐花子乾葛山梔子仁右為末每服二錢加烏梅甘草少許同煎水一盞煎至七分食後服炙肝散治欬嗽血不止𤓰蔞不去皮用穰瓦上焙乾烏梅大者五箇去核同煎藥焙杏仁二十枚去皮尖熬炒别研右為末每一捻猪肝一片切開入藥在肝内火上炙熟放冷嚼津液吞下食後及臨夜服上紅散治心肺客熱咳嗽吐血北柴胡去蘆一兩胡黄連宣連各半兩右為末入生硃砂少許研勻每服三錢水一盞煎至半盞服阿膠散治肺損嘔血開胃阿膠三箇好者炒木香二錢糯米一合半右為末每服一錢百沸湯㸃不拘時雄黄欵冬花散治肺痿喘嗽痰涎壅盛欵冬花半兩佛耳草半兩明雄黄一錢研右以椀内停灰火上礫藥烟薫紙盖椀口留眼吸烟嚥了頻㗜吸藥烟其嗽即止桔梗散出聖惠方治肺痿咳嗽胸中滿而振寒脉數乾或渴時出唾又吐膿如米粥者桔梗三兩去蘆頭甘草炙一兩㣲赤炒赤茯苓二兩右為散每服三錢以水一中盞煎至六分去滓不計時候温服人參甘草湯出千金方治肺痿欬唾涎沫不止咽燥而渴人參一兩甘草炙一兩三錢右為剉散每服四錢水一盞半薑五片棗五箇煎至七分去滓温服如聖湯一名桔梗湯出千金方欬而胸滿振寒脉數滑咽乾不渴時出涎唾腥臭久久吐膿若粥者為肺癰桔梗一兩甘草炙二兩右為剉散每服四錢水一盞煎七分去滓不以時服兼治喉痺咽痛或咽中生瘡唾有膿血加薏米知母煎一方有欵冬花一兩半防己散出仁存方治肺痿咯血多痰漢防己黄葶藶右各等分為末每服二錢糯米飲調服食後甘草乾薑湯出千金方温臟治肺痿多涎唾小便數肺中冷必眩不渴不嗽必遺溺若渴者屬消渴法上虛下不能利溲服此湯宜小温服之甘草四兩乾薑二兩集驗方内有大􅀥十二枚右㕮咀以水三升煑取一升半去滓分三服補肺散治肺痿勞傷吐血黄明膠炙燥二兩花桑葉陰乾二兩右為細散每服三錢用生地黄汁調糯米飲亦得甘草湯治肺痿涎唾多出血心中温温液液一名温液湯用甘草二兩以水三升煑取一升半去滓分三服綿膠散治肺損吐血新綿燒灰研黄明膠炙燥搗末右等分研勻每服一錢臨卧糯米飲調下治肺痿喘嗽用漢防己為末每服三錢漿水一盞同煎至七分和滓温服治療肺痿時時寒熱兩頰赤氣急亦治久嗽涕唾多骨節寒熱用童子小便每日晩取之去初沫少許小便可用五合取上好甘草量病人中指節男左女右長短截之炙令熱破作四片内小便中置於閑凈處露一宿噐上横一小刀明日早旦去甘草頓服之每日一劑其童子勿令喫五辛忌海藻菘菜熱麵一方用甘草末一錢小便三合攪令散服治口中血腥吐紅咳嗽用熟地黄乾嚼酒下又為末酒調下治一切肺疾咳嗽膿血不止用猪胰一具削薄竹筒盛於糠火中炮令極熟食後喫之皂莢散治肺痿吐涎沫皂莢半兩去黒皮塗酥炙令焦黄去子桂心一兩甘草一兩半炙㣲赤剉右為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候服蛤蚧散治患肺痿欬嗽及肺壅嗽蛤蚧一對新好者用湯洗十遍漫火炙令香研為細末人參茯苓去皮知母貝母各炙過湯洗桑白皮以上各二兩大杏仁六兩湯浸去皮尖爛煑令香取出研甘草五兩炙右件八味同為細末入杏仁勻拌却麄羅再篩過唯細為妙每服半錢入生薑二片酥少許水八分煎熟服如以湯㸃之頻服亦妙四君子湯治肺頻而皮聚者毛落益氣可也白术人參黄耆茯苓右為麄末每服五錢至七錢水一盞煎至七分去滓食遠温服治痰上氣氣急右用猯猪膏一合煖酒和服治肺痿吐血以鹿血和酒服之良治肺痿欬嗽鬼氣痓病取溺久停臭者佳恐冷當以熱物和温服之治肺疾唾膿血取薏苡仁十兩杵碎以水三升煎取一升入酒少許服之治肺疾咳嗽以蘿蔔子半升淘澤洗焙乾於銚子内炒令黄熟為末以沙糖丸如彈綿裹含之治肺痿吐血用蘿蔔和羊肉鯽魚煑食之肺痿咽燥附論夫熱在上焦因欬為肺痿其脉則寸口數其證則欬而口中有嘔唾涎沫甚者咽中乾燥盖以邪熱熏肺使然或因快藥下利重亡津液所致也方地黄湯治肺痿咽燥咳嗽吐膿血胸脇脹滿短氣羸不思飲食一名生乾地黄散生乾地黄切焙赤茯苓去黒皮柴胡去苗各一兩射干甘草炙剉麥門冬去心焙各半兩紫苑去苗土半夏湯洗七次麻黄去節黄芩去黒皮桑根白皮剉五味子各三分右搗篩每服三錢水一盞生薑一棗大􅀥二枚煎至七分去滓温服不拘時候天門冬丸治肺痿咽乾煩燥痰壅咳嗽小便赤澀眠卧不安咽喉腫痛天門冬去心焙二兩甘草炙剉一兩人參三分杏仁湯浸去皮尖雙仁炒一兩貝母去心焙五味子阿膠炙令燥桑根白皮炙剉各半兩右為末煉蜜和丸如雞頭大每服一丸食後臨卧時温人參湯嚼下含化嚥液亦得地黄紫蘇煎治肺痿喘嗽涕唾稠粘咽膈不利生地黄切焙用三兩生薑二兩與地黄和研絞取汁生天門冬去心半箇生𤣥參一觔生麥門冬去心一觔杏仁去皮尖雙仁三兩研别入紫蘇子炒研二兩生牛蒡四兩細切與𤣥參至紫蘇子四味燥研以水少許拌勻布絞取汁右將兩等藥汁并杏仁和勻於銀石噐中慢火煎令稍稠停火入白蜜五兩真酥二兩和勻於飲甑蒸少時候冷以凈噐盛每服一小匙含化不拘時日三一方久服大益心肺滑潤肌膚補􅂇榮衛忌生冷猪肉柴胡湯治肺痿久嗽不已四肢煩熱頰赤咽燥柴胡去苗竹茹桔梗紫苑去土貝母去心焙各二兩訶黎勒皮一兩知母炒二兩右㕮咀如麻豆大每服五錢水一盞生地黄汁半盞烏梅一箇煎至八分去滓温服日再夜一天門冬煎治肺痿咳嗽吐涎沫咽燥而渴者生天門冬去心搗汁取醇酒各一升紫苑去土為末四兩餳糖右同入銀石噐中重湯煎候可丸即丸杏仁大每服一丸嚥津含化日三五服普濟方卷二十七
