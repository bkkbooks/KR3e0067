body:
  text: 普濟方卷二十七明周王朱橚撰肺臟門肺勞論夫凢肺勞病者補腎氣以益之腎旺則感於肺矣人逆秋氣則手太隂不起肺氣焦滿順之則生逆之則死順之則治逆之則亂不順為逆是謂闗格病則生矣肺勞者或因形寒飲冷秋氣所致其證短氣面腫鼻不聞香臭胸中結滯氣乏聲嘶咳𠻳呀呷咯唾稠黏或唾膿血或咽喉亁痛不能唾上氣喘滿漸至衰瘁寒熱時作飲食减耗皆肺勞之證方紫苑湯治肺臟虚勞痰𠻳不止背膊并項筋痠疼日漸羸瘦紫苑去苖土貝母去心黄耆剉柴胡去苖人參白茯苓去黒皮麻黄去根節杏仁湯浸去皮尖雙仁炒炙欵冬花桔梗陳橘皮去白炒當歸炙剉大腹子剉桑根白皮五味子炒甘草炙剉生亁地黄焙各一兩桂去粗皮半夏洗去滑焙一兩半右剉每服五錢以水一盞半入生薑半分切大􅀥二枚同煎取七分去滓温服天門冬丸出聖惠方治肺勞痰𠻳氣促下焦虚損上焦煩熱四肢羸瘦宜服天門冬去心焙二兩牛膝一兩去苖麥門冬二兩人參一兩去蘆頭紫苑三分洗去苖土黄耆一兩剉杏仁湯浸去皮尖雙仁麸炒黄白茯苓一兩鱉甲二兩塗醋炙黄裙襴薯蕷一兩五味子石斛去根剉枸把子沉香訶梨勒皮肉蓯蓉酒浸一宿刮去皺皮炙令黄各一兩熟乾地黄二兩右為末煉蜜和搗三五百杵丸如梧桐子大每服食前以􅀥湯下三十丸忌鯹魚莧菜桔梗湯治肺勞欬𠻳痰涎唾上氣喘急時發寒熱疼痛亦治腹風下血諸氣羸弱桔梗炒剉旋覆花好貝母去心防風去义陳橘皮湯浸去白炒麥門冬去心焙枳殻去穣麸炒各半兩桑根白皮剉人參前胡去蘆頭鱉甲白茯苓去黒皮蒺䔧子剉去角甘草炙剉黄耆剉各一分天門冬去心焙一兩半右為末每服三錢沸湯調下不拘時候天靈盖散出聖惠方治肺勞羸瘦四肢無力至日晩即煩熱頰赤痰𠻳不利骨節多疼或乍寒乍熱飲食不成肌膚宜服天靈盖塗酥炙黄鱉甲醋炙令黄去裙襴各一兩訶梨勒煨用皮柴胡去苖桂心麥門冬去心赤茯苓各一兩半把子仁人參去蘆頭貝母煨令黄地骨皮黄耆剉各一兩桃仁湯浸去皮尖雙仁麸炒微黄生乾地黄各二兩㯽榔半兩右為散每服五錢以童子小便及水各一小盞入葱白一莖生薑半分煎至一盞去滓食前温服柴胡湯出聖惠方治肺勞胸膈壅滯痰𠻳不止四肢無力少思飲食宜服柴胡一兩去苖白术木香半兩紫苑三錢洗去苖土赤茯苓三分赤芍藥一兩鱉甲一兩半醋塗炙令黄去裙襴半夏三分湯浸七次去滑前胡三分去蘆頭訶梨勒一兩煨用皮枳殻麸炒㣲黄去穰人參去蘆頭杏仁湯浸去皮尖雙仁麸炒㣲黄各三分枇杷葉半兩拭去毛炙微黄甘草一分炙微赤剉右為散每服三錢用水一盞入生薑半分煎至六分去滓不計時温服忌飴糖米肉莧菜桃仁散出聖惠方治肺勞上氣胸滿痰唾不利右脇有疾積聚發微寒肌體瘦食少無力宜服桃仁一兩湯浸去皮尖雙仁麸炒微黄訶梨勒二兩煨用皮桂心半夏湯浸七次去滑五味子㯽榔木香赤芍藥煨用人參去蘆頭陳橘皮湯浸去白穣焙白术京三稜煨用郁李仁湯浸去皮尖炒一兩鱉甲二兩塗酥炙令黄去裙襴柴胡右為散每服四錢以水一盞入生薑半分煎至六分去滓不計時温服補氣黄耆湯一名補肺黄耆散治肺勞飲食减少氣虚無力手足顫掉面浮喘𠻳出聖惠方黄耆剉人參茯神去木麥門冬去心焙白术五味子桂去粗皮熟乾地黄焙陳橘皮去白焙阿膠炙燥各一兩當歸切焙白芍藥牛膝酒浸切焙各三分甘草炙剉半兩右麄搗篩每服三錢水一盞入生薑三片􅀥二枚用煎至六分去滓温服食後一方無阿膠補肺欵冬花湯治肺勞痰𠻳日漸羸劣欵冬花三分人參升麻各半兩桔梗各半兩杏仁湯浸去皮尖雙仁炒一兩白茯苓去黒皮三兩甘草炙剉半錢乾薑炮一錢柴胡去苗土一兩半桑根白皮炙剉三錢天門冬去心焙半兩鱉甲去裙襴酥炙一兩黄耆細剉半兩肉蓯蓉酒浸去皺皮炙一兩右搗篩每服五錢水一盞半煎至八分去滓食後温服日三五膈下氣丸療肺勞熱損肺生蟲形如蠶在肺為病令人欬逆氣喘或為憂膈氣膈恚膈寒膈熱膈皆從勞氣所生名曰膏肓鍼灸不着麥門冬十分去心椒四錢炒逺志皮附子細辛各六分甘草十分炙乾薑桂心人參百部白术黄耆各五分杏仁四十枚炒去皮尖雙仁者右搗篩以白蜜和丸如彈子大将一丸内牙齒間含稍稍咽其汁忌猪肉海藻菘菜生葱桃李雀肉等青龍五生膏治肺勞虚損至腸中生痔名曰腸痔肛門邉有核寒熱得之好挺出良乆乃縮而生瘡猪後懸蹄三枚炙黄生梧桐白皮四兩龍膽草桑白皮五寸炙雄黄研各五分蛇蜕皮五寸炙露蜜房炙蜀椒各三分汗猾皮燒附子炮各四兩生白皮七分炙杏仁三十枚去皮尖生青竹皮六分右細切綿裹以苦酒二斗半淹漬一宿於火上炙燥搗篩以膏三升和㣲火上煎如薄糖傅瘡并酒服如􅀥大肉蓯蓉丸治肺勞虚損欬𠻳唾血下焦冷憊腹脇疼痛肉蓯蓉去皺皮酒浸炙令黄白术龍骨牡蠣煆杜仲去粗皮酥炙剉胡桃肉别研各三分附子炮製去皮臍巴㦸天去心逺志丁香鹿角膠炙令燥各半兩杏仁湯浸去皮尖雙仁生用别研一兩右為末入研杏仁胡桃肉再研令勻以煑熟􅀥肉及熟蜜砂盆内研如麵糊和藥更杵一千下丸梧桐子大每服空腹米飲下三十丸鱉甲出聖惠方治肺勞發渇寒熱痰𠻳喘促坐臥不得鱉甲一兩塗酥炙黄去裙襴人參三分去蘆頭枳殼三分麸炒微黄去穣紫苑三分洗去土苖柴胡一兩去苖露房蜂微炙㯽榔半兩桔梗去苖頭五味子半兩赤茯苓半兩甘草炙微赤剉杏仁各半兩湯浸去皮尖雙仁麸炒微黄右為散每服四錢以童子小便一中盞入生薑半分煎至六分去滓不計時温服忌猪肉莧菜桔梗散出聖惠方治肺勞痰唾稠黏日晩即寒熱靣色赤脇肋妨滿宜服桔梗去蘆頭知母一兩柴胡去苖杏仁浸去皮尖雙仁炒人參去蘆頭鱉甲塗酥炙黄去裙襴白茯苓一兩郁李仁各一兩湯浸去皮尖微炒白前一兩㯽榔半兩半夏一兩湯浸七次去滑剉碎陳皮半兩湯浸去皮尖微炒右為散毎服四錢以水一中盞入生薑半分煎至六分去滓每於食後温服麻黄散出聖惠方治肺勞氣喘鼻張面目苦腫心胸不利宜服麻黄一兩去根節五味子一兩前胡一兩半去蘆頭杏仁一兩湯浸去皮尖雙仁麸炒黄細辛一兩桂心一兩半夏半兩湯浸七遍去滑紫蘇莖葉一兩漢防己一兩陳橘皮一兩湯浸去白焙桑根白皮一兩剉㯽榔一兩右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服忌飴糖生冷羊肉茯苓湯治肺勞欬𠻳喘滿氣逆痰唾不利不思飲食赤茯苓去黒皮大腹皮剉枳殻去穣麸炒陳橘皮湯浸去白焙半夏湯浸七徧暴乾杏仁湯浸去皮尖雙仁炒令黄㯽榔剉訶梨勒皮桑根白皮剉甘草炙剉各半兩人參一兩右搗篩每服三錢水一盞生薑三片同煎至七分去滓不計時服補虚飲治肺臟因血吐後四肢虚劣氣乏無力手脚振掉飲食不得黄耆剉二兩人參茯神去木麥門冬去心桂去粗皮陳橘皮去白焙當歸炙剉天門冬去心焙甘草炙剉熟乾地黄焙五味子炒各一兩右搗篩分作十劑每劑以水三盞入生薑計半兩切大􅀥七枚同煎至一盞去滓空心頓服黄耆散出聖惠方治肺勞氣津液不通皮毛結燥宜服補虚思食助力黄耆一兩剉赤芍藥一兩桂心三兩五味子一兩天門冬一兩去心白茯苓一兩甘草三兩炙微赤剉半夏三分湯浸七遍去滑人參一兩去蘆頭杏仁一兩湯浸去皮尖雙仁麸炒黄生乾地黄二兩右為散毎服四錢以水一中盞生薑半分棗三枚煎至六分去滓不計時温服忌鯉魚飴糖紫蘇子丸出聖惠方治肺勞氣喘咳𠻳食少脇痛四肢寒熱宜服紫蘇子二兩微炒柴胡二兩去苖桔梗一兩去蘆頭赤芍藥五味子木香各一兩鱉甲二兩塗酥炙令黄去裙襴訶梨勒一兩煨用皮人參一兩去蘆頭桃仁一兩湯浸去皮尖雙仁麸炒微黄枳殻一兩麸炒微黄去穣郁李仁一兩湯浸去皮尖微炒右為末鍊蜜和搗三二百杵丸如梧桐子大每服不計時以黄耆湯下三十丸忌莧菜麥門冬丸出聖惠方治肺勞經久即生蟲在肺令人欬逆氣喘或謂憂恚氣膈寒熱所致麥門冬二兩去心焙川椒半兩去目及閉口者㣲炒去汗遠志一兩去心附子一兩炮製去皮臍乾薑半兩炮製剉人參一兩去蘆頭細辛桂心一兩百部一兩剉黄耆一兩剉杏仁一兩湯浸去皮尖雙仁麩炒㣲黄右為末鍊蜜和搗二三百杵丸如彈子大每服綿裹一丸含化嚥津調肺人參湯治肺勞形寒飲冷則傷肺吸咽酒後吐血欬嗽吐濁時發寒熱食物不得日漸羸瘦人參附子炮製去皮臍知母各三兩紫苑去苗土白茯苓去黒皮甘草炙烏梅肉炒柴胡去苗秦芁去苗土各半兩訶梨勒麵裹煨令色黄取皮一兩右剉如麻豆每服三錢水一盞生薑半分棗二枚煎至七分去滓温服不拘時鰻鱺魚煎湯治肺勞欬嗽日久大白鰻鱺魚三條用醋湯洗凈腹内垢以無灰酒入銀鍋内慢火煮熟漉出取肉細研再入酒二升慢火煎成膏青蒿子桔梗剉炒秦芁去苗土柴胡去苗知母焙甘草龞甲九肋者去裙襴醋浸三日後令黄熟附子炮製去皮臍人參各一兩右為末以魚拌和勻更搗五十杵丸如桐子大或乾更入鍊蜜少許每日空心午後臨卧用炒栝蔞根酒下二十丸白虎湯治肺氣勞傷龍骨研白石英研白茯苓去黒皮桑根白皮剉炒人參百合磁石煆醋淬十遍各一兩𤣥參半兩大豆一合右毎服二錢水一盞煎取六分更入酒半盞煎至八分去滓服厚朴湯療肺勞虛寒腹脹膨滿氣急小便少厚朴四兩炙枳實炙桂心橘皮大黄各三兩甘草二兩炙五加皮生薑各五兩大􅀥二十枚擘右切以水一斗二升煑取三升去滓分温三服忌海藻菘菜生菜五味子散出聖惠方治肺勞虛損膓鳴切痛胷脇逆滿氣喘宜服五味子一兩白术一兩紫蘇子一兩㣲炒附子一兩炮製去皮臍桂心半夏半兩湯浸七遍去滑訶梨勒一兩半煨用皮桔梗一兩去蘆頭木香半兩右為散每服三錢以水一中盞入食米半匙生薑半分棗三枚煎至六分去滓不計時候温服鼈甲丸出聖惠方治肺勞痰嗽氣急抽牽五臟不安宜服鼈甲一兩塗醋炙令黄去裙襴五味子一兩貝母一兩煨令㣲黄紫苑一兩洗去泥土苗皂莢二兩去皮塗醋炙㣲黄去子木香一兩杏仁一兩湯浸去皮尖雙仁麩炒㣲黄訶梨勒皮二兩紫蘇子一兩炒右為末鍊蜜和搗三二百杵丸如梧桐子大每服不計時候煎人參湯下二十丸温中下氣湯治肺虛勞寒損則腰背痛難以俛仰短氣唾如膿生薑一觔大棗三十枚杜仲皮五兩萆薢桂心各四兩白术五兩甘草炙附子炮三兩右切以水九升煑煎取三升去滓分温三服忌肉海藻菘菜生葱桃李雀肉等蛤蚧丸治肺勞欬嗽蛤蚧炙一對天門冬去心焙麥門冬去心焙生乾地黄焙各一兩貝母去心焙二兩欵冬花焙紫苑取鬚焙各二兩杏仁去皮尖雙仁焙一百枚研右為末錬蜜丸如梧桐子大毎服十丸至十五丸食後煎淡生薑湯下建中湯治肺虛損不足補氣黄耆芍藥各三兩甘草炙二兩桂心三兩生薑六分半夏五兩洗大棗十二枚擘飴糖十兩右切以水八升煑取三升分為三服忌肉餳海藻菘菜生薑附子湯治肺虛勞損腹中寒鳴切痛胸脇逆滿氣喘附子炮甘草炙各二兩宿薑半夏洗破各四兩白术三兩食米半升大棗二十枚擘去皮核右切以水一斗煑取三升去滓分温為三服忌猪肉海藻菘菜羊肉桃李雀餳等人參丸治勞欬嗽人參桔梗炒烏梅椎碎麻黄去根節甘草炙剉杏仁去皮尖雙仁炒各一兩右先以童子小便五升浸三宿同煎小便盡焙乾搗羅為末煉蜜和丸如梧桐子大每服二十丸蜜湯下臨時