日午各一一方有生地黄升麻湯出聖惠方治脉極熱遇風痺感心血脱靣色白不潤澤脉空虚口唇色乾潤色消痺止熱升麻射干芎藭人参各一兩半赤小豆一合𢷬麥門冬去心焙萎蕤各二兩生乾地黄焙三兩甘草一兩炙剉右搗篩每服五錢用水一盞半入生薑一棗大拍碎竹葉五片煎一盞去滓温服早晩食後各一一方有犀角屑人参散治脉極好忘言語錯亂精神不守肩臂痛虚驚不定人参赤茯苓去黒心牛黄研鐵粉研麝香研逺志去心蛇黄燒醋淬羚羊角鎊酸􅀥仁等分右研為散每服二錢水煎淡竹茹湯放冷調下茯苓散出聖惠方治脉極實熱血氣傷心好生嗔怒口色變赤語澁不快調脉理中赤茯苓赤石脂麥門冬去心焙各二兩黄芩梔子仁人参去蘆頭逺志去心犀角屑各一兩石膏四兩右為散每三錢以水一中盞入淡竹葉二七片豉五十粒煎至六分去滓食後温服茯神湯治脉虚極欬則心痛㗋中介介如鯁狀甚則咽腫驚悸不安茯神去木人参逺志去心甘草煮通草麥門冬去心黄茋去蘆桔梗去蘆剉炒甘草炙各等分右㕮咀每服四錢水一盞半薑五片煎七分去滓温服不拘時栢葉沐頭丸治脉極虚寒鬢髪墮落生栢葉一兩附子生去皮臍半兩猪膏五兩右將栢葉附子為末煉猪膏和為二十丸每用布裹一丸内沭頭湯中洗頭令髪長不落治脉極虚寒鬢髪墮落方麻子研二升白桐葉一把切右以米泔一斗煮五六沸去滓沭頭則鬢髪不落而長桑栢皮沐頭方治脉極虚寒鬢髪堕落用桑根白皮剉二斤以水浸漬一宿煮五六沸去滓沐髪數為之佳普濟方卷十九
