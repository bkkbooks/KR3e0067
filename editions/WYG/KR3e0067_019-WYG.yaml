body:
  text: 普濟方卷十九明周王朱橚撰心臟門心勞附論夫心勞病者補脾氣以益之脾衰則感於心矣人逆夏氣則手太陽不長而心氣内損順之則生逆之則死順之則治逆之則亂反順為逆是謂失常病則生矣其候善忘不樂鴨溏口瘡耳枯皮焦夭者死于冬方獺肝丸治心勞熱胷膈聚痰頭目㣲痛手足時煩肌膚漸覺羸瘦獺肝切破炙黄鼈甲去裙襴醋炙柴胡去苖地骨皮升麻黄連去鬚天靈葢醋炙令黄各一兩半胡黄連犀角屑知母焙天門冬去心焙茯神去木紫苑去苖土百合前胡去蘆頭貝母去心焙麻仁硏杏仁湯浸去皮尖雙仁炒令黄色别研甘草炙各一両㯽榔剉生乾地黄焙各三兩右為未煉蜜丸如梧桐子大每日食後温水下三十丸夜卧再服逺志散出聖惠方治心􅌷勞損羸瘦四肢無力心神昏悶除寒熱利腰脚充肌膚益氣力逺志去心白术人参去蘆頭杜仲去粗皮㣲炙令黄剉川椒去目及閉口者㣲炙去汗牛膝去苗白茯苓薯蕷山茱萸栢子仁生乾地黄石斛去根尾剉好黄耆剉各用一兩肉桂去皴皮天門冬去心焙鼈甲塗醋炙令黄去裙襴各一两半甘草半两炙㣲赤剉右為散毎服一錢以温酒調下空心及晚食前服忌鯉魚莧菜等物菊花湯治心勞客熱毒氣上攻口中生瘡齒齗肉爛菊花升麻獨活去蘆頭防風去义知母焙黄芩去黒心𤣥参藳本去苖土大黄剉炒梔子仁前胡去蘆頭桔梗甘草炙剉麥門冬去心焙生乾地黄焙各一两右𢷬篩每服五錢水一盞半煎八分去滓食後温服人参湯治心勞煩悶􅌷滿胷膈痞塞飲食不下氣噎等症人参白茯苓去黑皮前胡去蘆頭麥門冬去心焙黄芩去黑心枳殻去瓤麸炒木通剉甘草炙剉生地黄焙防風去义獨活去蘆頭各一两陳橘皮湯浸去白焙旋覆花各一両半右𢷬篩每服五錢水一盞半生薑半分切煎八分去滓食後温服貫衆丸出聖惠方治心勞熱傷心有長蟲一尺貫心為病貫衆陳橘皮湯浸去白焙石蠶各一両二錢狼牙茱萸根皮炙令黄色各一両半雷丸炒白蕪荑炒令香青葙子蜀漆各一両白殭蚕三七枚炒亂頭髪如雞子大燒為灰桃白皮炙黄色一両二錢右為末煉蜜丸如梧桐子大每日空心用米飲下七丸未瘥更加至二七丸夜卧再服以蟲下為度一方無石蠶有桃仁一兩用苦酒下王不留行湯治憂愁思慮過傷心經古本腫强王不留行桂去粗皮桔梗炒當歸切焙甘草炙剉各一兩雷丸延胡索白芨天䧺炮裂去皮臍㯽榔半生半煨熟各一両半桑根白皮半両右㕮咀如麻豆每服三錢生薑三片水一盞同煎七分去滓温服犀角散治心勞或風熱心神不安少得睡卧犀角屑地骨皮各一両真珠末甘草炙微赤剉各半両逺志去心桃花酸棗仁㣲炒黄耆剉各三両川升麻葳蕤各一兩石膏二兩麥門冬一兩半去心焙右為散每服食後以温酒調下三錢朱雀湯治心氣勞傷雄雀一隻取肉炙赤小豆一合赤茯苓去黒皮人参大棗去核紫石英小麥各一両逺志去心紫苑去苖土丹参各半両甘草炙剉一両右細剉拌匀每服三錢用水一盞煎六分去滓温服人参散治心勞實熱多驚夢中恐畏不安人参去蘆頭沙参同上赤芍藥赤石脂紫苑洗去苖土各一両犀角屑逺志去心甘草炙㣲赤剉各半両石膏五両茯神一兩半梔子仁半両右為散每服五錢以水一大盞煎至六分去滓入竹瀝半合生地黄汁半合攪令勻食後温服麻黄湯治心勞煩多熱喜笑無度四肢煩熱止煩下氣麻黄去根莭梔子仁赤茯苓去黒皮白术桂去粗皮各一両半黄耆去黒心石膏甘草炙各一兩生乾地黄焙五錢赤小豆一合右𢷬篩每用藥末十錢雞子白一枚竹瀝半合水三盞煎至二盞去滓下芒硝一錢再上火令沸分作三服空腹日午夜卧各一服竹茹湯治心勞潮熱肌瘦四肢煩疼竹茹前胡去蘆頭白茯苓去黒皮人参各一兩甘草炙剉貝母去心焙各三両桑根白皮剉赤小豆各一兩半柴胡去苖麥門冬去心焙各半両右𢷬篩每服二錢水一盞入生薑竹葉各五片煎至七分不拘時去滓温服麥門冬丸治心勞多驚悸心氣不足補心麥門冬去心焙逺志去心熟乾地黄天門冬去心焙黄連去鬚升麻各一兩半石菖蒲人参白茯苓去黑皮各一兩桂去粗皮半両右為末煉蜜和丸如梧桐子大每日食後夜卧時熟水下二十丸兼開心氣使人不忘逺志湯治心勞多煩躁背膊妨悶靣色數變乍赤乍黒或笑或歌逺志去心犀角屑芍藥各一両人参知母焙各半兩赤茯苓去黑皮黄芩去黑心前胡去皮頭各三錢麥門冬去心焙一兩半右𢷬篩每服五錢水一盞半煎至一盞去滓食後分作二服如人行三五里再服茯苓丸治勞熱精神不安喜忘不樂不能獨卧耳不逺聼皮毛焦枯或言語錯亂白茯苓去黒皮白龍骨逺志去心防風去义人参栢子仁研各半両牡蠣焙棗肉焙各二両甘草各一兩右為末煉蜜丸如梧桐子大每服三十丸米飲下前胡麥門冬飲治心勞客熱煩躁頭目昏眩前胡去蘆頭麥門冬去心焙萎蕤元参升麻人参射干芍藥甘草炙各一両右搗篩每服五錢水一盞半生薑半分切赤小豆三十粒煎至八分去滓食後服大黄散出聖惠方治心勞熱口瘡心煩腹滿小腸不利川大黄剉碎㣲炒澤㵼黄芩梔子仁柴胡去苗羚羊角屑甘草炒㣲赤剉木通剉各一両石膏二両右為散每服四錢水一中盞入淡竹葉二七片煎至六分去滓食前温服忌炙煿熱麵生菓茯神散出聖惠方治心勞實熱皮毛乾焦色無潤澤心神不安茯神木通剉川升麻赤石脂逺志去心各一兩犀角屑桂心甘草炙㣲赤剉各半兩麥門冬一兩半去心焙右為散每服四錢水一盞入竹茹一分煎至六分去滓食後温服磁石散出聖惠方治心勞熱心氣通於腎開竅在耳若心病則耳枯燥而虚鳴不能聽逺磁石二兩𢷬碎水淘去汁赤茯苓木通剉人参去蘆頭羚羊角屑赤石脂菖蒲逺志去心各一兩麥門冬一両半去心焙右為散每服四錢水一中盞入竹葉二七片煎至六分去滓每於食前温服泄熱湯出三因方治心勞實熱口舌生瘡大便閉澁不通心滿痛小腸熱澤㵼梔子仁黄芩各三両桂心通草各二両石膏八両大黄蒸甘草炙各一両右剉散每服四錢水盞半煎七分食後服如熱盛者煎熟加芒硝一錢煎不以時一方加大􅀥二十枚黄芩湯出永類鈐方治心勞實熱口瘡心煩腹滿小便不利澤㵼梔子仁黄芩麥門冬去心木通生乾地黄黄連去鬚甘草炙各等分右㕮咀每服四錢水一盞半薑五片煎至八分去滓温服不拘時逺志飲子出醫方集成治心勞􅌷寒驚悸恍惚多忘不安夢寐驚魘逺志去心甘草煮乾茯神去木桂心不見火酸棗仁炒去殻人参黄耆去蘆當歸去蘆頭酒浸各一兩甘草炙半兩右㕮咀每服四錢水一盞半薑五片煎七分去滓温服不拘時磁石湯治心勞熱耳焦多鳴不能聼逺磁石燒令通赤醋中淬七遍赤茯苓去黒皮大青人参白术菖蒲芍藥各一兩半赤石脂一両右𢷬篩每五錢水一盞半入竹葉五片煎至一盞去滓分作二服空腹夜卧服赤芍藥丸治心臟勞熱乆積毒氣小腸氣癃結少腹急小便淋瀝白濁疼痛赤芍藥大黄炒冬葵子炒令香各一兩半苦参三兩黄芩去黒心山梔子仁車前子㣲炒瞿麥穗各一両右為末煉蜜丸梧桐子大每日食後温水下三十丸夜卧冄服石膏飲子出聖惠方治心勞實好笑四肢煩熱石膏四兩𢷬碎茯神屑角屑川芒硝各一兩梔子仁一两半生地黄切三大合甘草半两炙㣲赤剉赤小豆一合右細剉和勻每服半两水一大鍾煎至五分去滓入堇竹瀝半合更煎一沸不計時温服人参湯治心勞因多言喜樂過度傷心或愁憂思慮多而傷血血傷即不欲視聴心煩驚悸人参木通剉麥門冬去心焙各一两半茯神去木百合柴胡去苗各一兩龍齒一兩半右𢷬篩每五錢用水一盞半入棗三枚擘煎至一盞去滓分作二服食後相次服之麥門冬飲治心􅌷勞損喜忘不樂麥門冬去心焙白茯苓去黑皮各二兩半人参二兩逺志去心一兩二錢防風去义赤芍藥各一兩半陳橘皮湯浸去白焙一兩右剉如麻豆每服五錢水一盞半煎八分去滓温服日二服小定心湯出三因方治心勞􅌷寒驚悸恍惚多忘夢寐驚魘神志不定方見本門怔忡驚悸類地黄湯治心勞實熱口瘡心煩多笑少力小便不利生乾地黄焙柴胡去苗各一兩石膏二兩梔子仁三錢赤小豆生二兩木通剉三錢右𢷬篩每服三錢水一盞入竹葉二七片同煎六分去滓温服不拘時麥門冬湯治心勞熱不止皮毛焦色無潤澤口舌乾燥心中煩悶雞子一枚取白陳粟米一合淡竹葉三兩切生麥門冬去心三兩右以水五盞先煑米并竹葉取三盞去滓澄清冷下雞子白冄煎五七沸即下麥門冬煎一盞半去滓分作三服空心日午卧服大黄洩熱湯治心勞熱口為生瘡大便苦難閉澁不通心滿痛小腸熱大黄澤瀉黄芩芒硝梔子仁各三兩桂心通草石膏八兩甘草一兩大棗二十枚右㕮咀用水九升先以水一升别漬大黄一宿餘八升水煮諸藥取二升五合去滓下大黄煮兩沸去滓下芒硝令烊分三服保真散出䕶命方治一切男女人心受勞氣夫五行受病必先傳其所勝腎病之極即傳之與心心既受勞即五心煩燥唇口乾精神不足恍惚健忘少喜多嗔口無滋味小便或赤或白忽多忽少即宜先吃去腎邪方漸吃清心臟觧邪氣藥也若病症已傳在心即宜服此去火毒黄芩沉香木香各三銖牡丹皮去心前胡去毛桔梗柴胡去毛貝母去心天靈葢醋炙黄黑色鼈甲醋炙黄色麥門冬去心杏仁去尖雙仁者茯苓官桂荆芥穗各一分麻黄四銖右細杵羅為末每一錢水一盞煎取八分食後去滓服須是大腑熱脉氣數有骨力方可吃治心受勞氣不是熱蒸只是􅌷勞乍寒乍熱忽時靣上渾身泛熱忽時足冷如雪非時乾𠻳忽時咯出痰中有血忽時一吐血大腑如常不冷亦不熱脉氣浮數不急治之變成大病出䕶命方柴胡去毛鼈甲醋炙肉豆䓻去殻白芷秦芄黄耆官桂去麄皮桔梗荆芥各半両麥門冬去心當歸茯苓人参枳殻只用青甘草乾地黄海桐皮芍藥木香酸􅀥仁炒各一分沉香㯽榔各三銖右杵羅細末每服二錢水一盞生薑一片同煎九分食後吃若是已發𠻳脉氣有骨力可吃此藥也燒肝散出家藏經驗方治久年不瘥心勞口瘡銀州柴胡去蘆白术紅芍藥牡丹皮人参以上五味各一兩蒼术黑附子炮去皮臍石斛去浮膜三味各半兩右同為末用豶猪肝薄批去血水糁藥在上勻徧以荷葉裹定濕紙包之慢火煨令過熟空心食前米飲下此藥有竒功瘈病附論内經謂病蠱弗治腎傳之心筋脉相引而急病名曰瘈夫精屬腎筋屬肝脉屬心精盛則滋育諸筋榮灌諸脉故筋脉和柔令風客於腎病蟲出白則精已虧矣經所謂風客滛氣精乃亡邪傷肝者如此其症筋脉燥急相引而瘈是也方肉蓯蓉丸治瘈病筋脉相引及五勞七傷小便數腰疼乆立不得坐即脚痺肚腹不安肉蓯蓉酒浸切焙山芋熟乾地黄焙各三兩莵絲子酒浸别𢷬五味子杜仲去粗皮炙剉澤㵼覆盆子山茱萸逺志去心續斷桂去粗皮附子炮裂去皮臍甘草炙剉白茯苓去黒皮石斛去根鹿茸去毛醋炙蛇床子巴㦸天去心人参各一兩半右為末煉蜜丸如梧桐子大每服二十丸空心日午夜卧温酒下牛髓丸出千金方治瘈病及􅌷羸等疾牛髓研白蜜酥棗肉白茯苓去黑皮麥門冬去心焙芎藭桂去麄皮當歸切焙甘草炙剉羌活去蘆頭各一兩乾薑炮生乾地黄焙各三錢人参五味子防風去义細辛去苖葉各半兩白术一兩二錢右除前四味外𢷬羅為末先與棗肉相和次入牛髓酥蜜攪勻内銀石器中重湯煮之作丸如梧桐子大每服三十丸加至四十丸酒下日再五味子丸治瘈病筋脉相引補虛損去原臟乆冷上焦客熱健忘心忪