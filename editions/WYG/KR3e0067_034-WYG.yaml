body:
  text: 普濟方卷三十四明周王朱橚撰膽腑門總論夫膽腑者主肝也合氣膽膽者清淨之腑也號將軍决曹吏重三兩三銖長三寸三分在肝短葉間下貯水精汁二合能喜能怒能剛能柔目下果大其膽乃横凡膽腦髓骨脉女子胞此六者地氣之所生也皆藏於隂而象地故藏而不瀉名曰竒恒之府若胃與大腸小腸三焦膀胱此五者天氣之所生也其氣象天故輸㵼受五臟濁氣名曰𫝊化之府此不能乆留輸瀉者也所謂五臟者藏精氣而不瀉也故滿而不能實六腑者𫝊化物而不藏故實而不能滿也所以然者水榖入口則胃實而腸虛食下則腸實而胃虚故曰實而不滿滿而不實也左手闗上陽絶者無膽脈也若膽夜疼口中苦味譫語或如見鬼多驚劣刺足厥隂治在足大拇趾間或刺三毛中左手闗上陽實者膽實也若腹内不安身軀弱也刺足少陽穴穴在足上第二趾本節後一寸是膽病中善太息口苦嘔宿汁心澹澹恐如人將捕之咽中介介然數唾候在足少陽之本末亦見其脈之陷下者灸之其寒熱刺陽陵泉若善嘔有若長太息中澹澹善悲恐如人將捕之邪在膽逆在胃膽溢則口苦胃氣逆則嘔苦汁故曰善嘔刺三里以下氣逆刺足少陽血絡以閉膽却調其虚實以去其邪也膽熱曰脇下痛脹口苦太息肝前受病移於膽肝欬不已則嘔膽汁厥氣客於膽則夢鬭訟肝應筋爪厚色黄者膽厚爪薄色紅者膽薄爪堅色青者膽急爪軟色赤者膽緩爪真色白無約者膽直爪惡色黒多敗者膽結扁鵲云足厥隂少陽為表裏表清裏濁其病若實極則傷熱熱則驚動精神不守臥起不定若虛則傷寒寒則恐畏頭眩不得臥發放𤣥水其根在膽先從頭面患腫至足膽有病則眉為之病人眉一絲者七日死膽實熱附論夫左手闗上脈陽者足少陽也為膽實熱蓋實則為有餘有餘則生熱故其證苦神驚不安起居不定胸中冐悶身體弱頭項强口吐苦汁腹中氣滿飲食不下咽乾洒洒寒熱心脇痛不能轉側足外反熱是為陽厥及頭疼目銳眥痛缺盆中腫痛腋下腫馬刀癭皆謂膽氣實足少陽經壅滯故也龍膽瀉肝湯出衛生寳鑑治内熱盛口苦膽癉乃肝主謀慮膽主决斷汁計七合清淨之府肝待决於膽志或不决為之怒怒則氣逆膽汁上溢故口苦或熱盛而使然也柴胡一錢黄芩七分生甘草人參天門冬去心黄連龍膽草知母山梔子麥門冬去心五錢五味子七個右㕮咀都作一服水煎食逺服菊花散出聖惠方治膽經伏熱精神驚悸不安甘菊花一兩牛黄五錢研犀角三錢鎊屑鐵粉半兩黄連三鬚去麥門冬半兩去心獨活一兩白附子半兩炮鉛霜半兩右為末每服二錢食後淡竹瀝調下金銀煎湯下亦得一方無獨活有人參甘草半夏湯治膽腑實熱精神不寧半夏宿薑各三兩黄芩一兩生地五兩逺志茯苓各二兩秫米一斗酸􅀥仁五合右㕮咀長流水五升煮秫米令蠏目沸揚三千餘遍澄清取九升煮藥取三升半分三服一方治虚煩悶不得眠無地黄逺志有麥門冬桂心各三兩甘草人參各二兩酸棗仁圓出永類鈐方治膽氣實熱不得睡神思不安茯苓酸棗仁去核逺志去心栢子仁炒防風各一兩生地黄枳殻各半兩竹茹二錢半右為末煉蜜如梧桐子大每服七十丸不拘時熟水下升麻湯出聖惠方治足少陽經熱積乆腹中氣滿睡臥不安頭昏口苦小便不利膽實熱精神不守升麻麥門冬去心黄芩茯神去木大黄炒地骨皮羚羊角鎊下甘草炙各等分右搗篩每服三錢水一盞入青竹茹少許煎七分去滓温服食後臨臥忌炙􅏼物一名麥門冬散楝實丸治膽經實熱心神驚悸小便不利楝實三兩童子小便浸一宿又火煮爛去皮焙乾大黄梔子仁各一兩炒人參赤茯苓酸棗仁去皮蛇黄炒令赤酒浸淬五次各一兩右除别研外搗羅為末一處拌勻煉蜜如梧桐子大每服在早食後及夜臥用熱水下十五丸至二十丸㵼熱湯治實熱精神不安之病龍膽草酸棗仁微炒黄芩去黒心茯神去木升麻伏龍肝竹茹甘草炙各等分右搗每服三錢水一盞煎至七分去滓食後温服日三㵼膽湯出永類鈐方治膽經實熱反洒洒寒熱腹中氣滿脇下硬口苦咽乾頭疼不欲飲食半夏三兩湯泡去滑生地黄五兩酸棗仁二兩半黄芩一兩逺志去心茯苓各二兩甘草一兩炙右剉散長流水一斗糯米一升煮蟹眼沸揚二三千遍澄清每用水二盞抄藥四錢七薑七片煎七分去滓不以時服流水湯治膽實生熱腹中氣濁飲食不下咽乾頭重洒酒惡寒兩脇眼痛半夏一兩湯洗炒酸棗仁二兩黄芩半兩去黒心赤茯苓一錢山梔子去皮生地黄逺志各一兩去心右除别研外搗篩再拌勻每五錢用東流水二盞入秫米半升薑五片煎一盞去滓温二服空心食後各一服一方無地黄枳殻湯出聖惠方治膽經有積熱腹中氣滿不安咽乾頭重心神驚悸小便不利一名人參散枳殻一兩炒去瓤人參葵子甘草各半兩炙赤茯苓黄芩各三兩右搗篩每服三錢水一盞入生薑三片煎七分去滓温服不計時山梔子飲治肝膽邪熱神思不寧喜怒狂躁口苦舌乾山梔仁一兩半竹茹一兩豆豉一升大青入錢陳皮一兩湯浸去白右搗篩每服三錢水一盞蜜少許煎七分去滓温服食後臥各一服胡黄連丸出聖惠方治膽經熱精神不寧臥起不安口中常苦胡黄連一兩羚羊角一兩屑蛇黄半兩火煅熊膽一分青黛一分别研右為末研令勻用黄牛膽丸如菉豆大每服七丸煎竹葉湯下晩間再服無牛膽以羊膽代膽虚寒附論夫左手闗上脈陽虛者足少陽經也為虛寒蓋膽虛則生寒寒則其病恐畏不能獨臥口苦善太息嘔宿汁心下澹澹如人將捕之嗌中介介數唾頭眩痿躄足指不能拳指不能揺坐不能起頸僵視俛蓋膽虛精神不守其氣上溢循其所在而生病也薯蕷丸出聖惠方治膽經虚冷精神不守常多恐懼目暗頭昏四肢不利薯蕷一兩白茯苓二兩决明子三錢兔絲子一兩酒浸三日焙乾别研為末天雄一兩炮去皮臍防風三錢栢子仁三兩熟地黄一兩人參一兩山茱萸三錢黄耆逺志去心桂心酸棗仁各三錢右為末煉蜜丸梧桐子大每服三十丸温酒服下中正湯出聖惠方治膽氣不足常多恐懼頭眩痿厥四肢不利僵仆目黄失精一名酸棗散茯苓去皮酸棗仁黄耆羌活各一兩甘菊花熟地黄栢子仁防風各一兩人參白芍藥當歸甘草各半兩炙右搗篩每服三錢水一盞煎至七分去滓温服不拘時忌生冷猪魚逺志湯出聖惠方治膽經虛冷不能獨臥心下澹澹如人將捕之頭昏痿厥目失精一名茯神散逺志去心熟地黄各一兩防風人參甘菊花白术桂去粗皮茯神前胡去節各三錢枳殻半兩去瓤麵炒右搗篩每服三錢水一盞生薑三片煎七分去滓不拘時候茯苓湯出永類鈐方治膽氣痿虚冷頭眩痛心神恐畏遇事多驚不能獨臥腦中滿悶口苦茯神去木一兩酸棗仁黄耆白芍藥五味子栢子仁各一兩桂心熟地黄酒洗人參甘草各半兩炙右㕮咀每服四錢水一鍾薑三片煎七分去滓温服不拘時天雄丸治膽虚生寒氣溢胸膈頭眩口苦喜太息嘔宿水天雄炮去皮人參山芋桂去粗皮黄耆白茯苓去皮防風栢子仁研山茱萸酸棗仁炒各三錢右除栢子仁外搗細末與栢子仁和勻煉蜜為劑杵丸梧桐子大每服三十丸温酒空心食前下黄耆湯治肝虛膽寒心神不安臥即驚覺目昏心躁四肢不利多恐黄耆蜜炙剉人參㯽榔剉白术百合酸棗仁炒白茯苓去皮麥門冬去心桂去皮附子炮去皮臍右㕮咀每服五錢水一盞半薑五片煎至一盞去滓温服空心食前沉香湯治足少陽經不足目眩痿厥口苦嘔水多睡沉香白茯苓去皮黄耆白术各一兩芎藭熟地黄五味子各三分枳實去瓤麩炒桂各半兩去皮右搗篩每服三錢水一盞薑三片煎七分去滓不拘時服犀角飲治膽受冷精神不安眼昏目暗臥起不定犀角一兩鎊屑羌活一兩去蘆酸棗仁二錢炒茯神三錢去木甘菊花一兩防風三錢人參柴胡一兩右搗篩每服五錢水一盞半煎八分去滓温服人參湯一名酸棗湯治膽虚煩勞精神不守奔氣在胸眠臥不定多恐方見本門膽虚不得眠類决明子丸出聖惠方治膽虛膽冷神思昏沉頭眩目暗决明子天雄炮去皮臍栢子仁兎絲子酒浸三日焙乾别研為末熟也黄枸杞子各一兩右為末煉蜜丸如梧桐子大每服三十丸温酒空心下晩服膽熱多睡附論夫積熱多睡者膽實清淨决斷所自出今肝膽俱實榮衛壅塞則清者濁以故隂陽不和胷膈多痰臟腑壅滯精神昏憒常臥皆積熱不除膽氣實故多睡也茯神散出聖惠方治膽熱多睡神思不安昏悶茯神去皮麥門冬地骨皮茯苓各一兩又一方用黄芩白蘚皮酸棗仁沙參各半兩甘草半兩炙右末每服三錢水一盞煎六分去滓食後服一方有羚羊角屑麥門冬湯出聖惠方治榮衛氣澁精神不守及膽熱多睡頭目昏眩麥門冬去心天門冬去心羚羊角鎊各三錢木通前胡去節大黄各四錢半夏炒甘草炙防風各半兩右搗篩每服三錢水一盞薑三片煎六分去滓食後服忌羊血逺志丸治氣昏多睡晝夜不足逺志去心人參山芋防風𤣥參各二兩半苦參鐵粉細研烏頭燒灰存性各三兩右為末煉蜜丸如梧桐子大食後米飲下二十丸再漸加至三十丸人參散出聖惠方治膽經熱心神昏悶多睡牛黄一錢研羌活三錢逺志三錢去心升麻半兩麥門冬二兩去心人參三錢犀角半兩赤芍藥一兩右為末每服一錢薄荷温水調下忌猪肉濕麵等食後服逺志丸出聖惠方治膽熱多睡逺志三錢去心人參一兩馬頭骨三錢茯神三錢菖蒲半兩硃砂半兩研飛過鐵粉半兩右為末入硃砂等分令勻煉蜜丸如梧子大每服十丸食後服半夏湯治膽熱精神不守昏悶多睡方見本門膽實熱類黄連湯出揚子䕶命方治膽熱口苦神昏多睡左手闗脈實大宜服此方黄連去鬚黄芩赤茯苓去皮麥門冬去心升麻各一兩右搗篩每服三錢水一盞煎至七分去滓温服食後治膽熱多睡出聖惠方馬頭骨灰一兩鐵粉一兩硃砂半兩研水飛過龍骨半兩右為末煉蜜丸如梧桐子大每服五丸竹葉湯食後服酸棗仁湯治膽風毒氣虛不調昏困多睡酸棗仁一兩研生用臘茶二兩生薑汁塗炙焦右搗篩每服二錢水一盞煎七分去滓温服治多睡本草取白馬頭骨作枕枕之治人嗜眠喜睡本草父鼠目一枚燒作屑魚骨和注外若不眠薫取二物紗袋子盛貯之膽虚不得眠附論夫膽虚不得眠者是五臟虛邪之氣干淫於心心有憂患伏氣在膽所以睡臥欠安心多驚悸精神怯弱蓋心氣憂傷膽虚冷致不得眠也又有大病之後腑臟尚虚榮衛不和生於冷熱邪客於隂隂氣虚木氣獨行於陽下不依於陽故令不得睡也千里流水湯一名温膽湯治膽虛不得眠及膽虛頭眩厥足痿指不能揺臂不能起僵仆目黄失精虚勞煩擾因驚膽懾奔氣在胷喘急浮腫不睡麥門冬去心半夏各三兩湯浸茯苓四兩酸棗仁二升炒甘草炙桂心黄芩逺志去心萆薢人參各二兩生薑二兩秫米一斗右千里水一斛煮米令蠏目沸揚萬遍澄清取一斗煮藥取二升半分三服一方無生薑酸棗仁丸治膽虚睡不安精神恐怯酸棗仁二兩研人參白术白茯苓去皮半夏炒乾薑各一兩炮陳皮去白榆白皮剉旋覆花前胡各一兩檳榔五枚右末煉蜜丸如梧桐子大空心煎棗湯下二十丸加至三十丸茯神散一名逺志湯治膽經虛冷目眩頭疼心神恐畏不能獨處胸中滿悶方見本門膽虛寒類治煩悶不得眠枸杞五兩生地黄五兩麥門冬甘草前胡各三兩茯苓知母各四兩人參二兩粟米豉各五錢右㕮咀水八升煮三升七合分四服五補湯治肝虚膽寒夜間少睡即驚覺心悸神思不守目昏心躁肢節痿弱補肝去膽寒和氣方見本門虛寒類人參散出本事方治膽氣虛常多畏心恐不能獨臥如人將捕之頭目不利胸中悶人參枳殻五味子桂心各三兩栢子仁熟地黄各二兩山茱萸甘菊花茯苓枸杞各二兩右細末每服二錢温酒調服五味子湯出楊子建䕶命方治膽經虛冷頭痛心中驚悸睡臥不安常如人將捕之精神不守五味子白茯苓去皮人參芎藭逺志去心酸棗仁熟地黄焙麥門冬各一兩去心桑寄生半兩右搗篩每服三錢水一盞棗二枚煎七分任意服酸棗仁湯酸棗仁五升人參桂心生薑各三兩石膏茯苓知母各三兩甘草一兩半右搗篩水一斗煮酸棗仁取七升去滓下藥煮三升分為三服日三補膽防風湯出本事方治膽虚目暗喉痛唾數眼目眩暈五色所障夢見人訟恐懼面色變青防風一錢人參六分細辛五分芎藭甘草茯苓獨活前胡各三分右搗篩每服四錢水一盞半棗二枚煎八分去滓食前服茯神散出聖惠方治膽虛不得睡神思不安茯神一兩栢子仁半兩酸棗仁一兩炒黄耆一兩人參一兩熟地黄半兩逺志五味子各半兩右為末每服一錢温酒調下不拘時服温膽湯出永類鈐方治心膽虛怯觸事易驚夢寐不祥異象所感遂使心驚膽懾氣鬱生涎涎與氣搏變生諸證或短氣悸乏或復自汗四肢浮腫飲食無味心虚煩悶坐臥不安大病後虚煩不得眠此膽寒故也服之效半夏竹茹枳實各三兩麵炒陳皮三兩甘草茯苓一兩半人參一兩右剉散每服三錢水一盞半薑五片棗二枚煎至八分食前服末效加逺志去心薑炒北五味子各一兩酸棗仁一兩蜂蜜粉炒一方無人參用白术鱉甲丸出聖惠方治膽虚不眠四肢無力鱉甲酸棗仁羌活黄耆牛膝人參五味子等分右為末煉蜜杵丸梧桐子大每服三四十丸温酒下忌莧菜酸棗仁丸出衛生寳鑑治膽氣虚熱不睡膽經不足心經受熱精神恍惚恐畏多驚情思不安時有盜汗虛煩不眠朝差暮劇或發眩運酸棗仁炒地榆各一兩丹砂炒研茯神人參菖蒲各半兩右除丹砂外搗末入丹砂令勻蜜和丸梧桐子大每服二十丸米飲下不拘時硃砂為衣煎人參湯下酸棗仁煎出聖惠方治膽虚不睡酸棗仁五兩炒取二兩半乳香二兩蜜四兩牛黄一錢研糯米二合炒為末硃砂半兩研水飛過右用酒一鍾和蜜等一處慢火煎如沸不計時以温酒調下一茶匙山芋丸治膽虚冷精神不守寢不寧頭目昏眩恐畏不能獨處山芋酸棗仁各一兩炒栢子仁茯神山茱萸各三錢右為末煉蜜丸如梧桐子大每服三十丸温酒下米飲亦得不拘時服人參散一名安神散治膽虚睡臥不安多驚出聖惠方人參白茯苓各一兩茯神一兩去木丹砂半兩别研右搗為末每服一錢粥飲調下不拘時服一方無茯神酸棗仁丸出聖惠方治膽虚不得眠酸棗仁微炒地榆一兩茯神一兩去木右為末煉蜜丸如梧桐子大每服二十丸米飲下無時乳香散治膽虚不得眠精神恍惚乳香一兩研酸棗仁二兩馬頭骨灰一兩右研細末每服二錢温酒調下不拘時治膽虚夜不眠出聖惠方用酸棗仁半兩炒黄研末酒三合浸汁先以粳米三合煮作粥候熟下棗仁汁更煮三五滚空心食一方為末每服三錢竹葉湯下又白苣菜常食之令人輕身少睡調和十二經脈利五臟此出本草治人夜睡言語出本草以靈床下果子食之佳治臥床不寤出本草勿以火照火照之殺但痛嚙其踵及足拇指甲際而多唾其面即活又井底泥塗目畢令人垂頭於井中呼其姓名便起治從早夜連時不得眠暮以新布瓦火炙以熨目并蒸大豆便裝囊成枕枕冷後更湯熱終夜常枕熱豆即立愈治食飲不得息出本草葶藶子三兩炒黄研末以水三升煮大棗三十枚得汁一升内藥中毎服如棗大煎取七合頓服酸棗仁湯出本草治驚悸不眠以酸棗仁二升茯苓白术人參甘草各二兩生薑六兩六物切以水八升煮取三升分四服酸棗仁湯出本草主虚不得眠煩不可寧以酸棗仁二升蝭母乾薑茯苓芎藭各二兩甘草一兩炙並切以水一斗先煮棗煎三升後内五物煮取三升分服一方加桂一兩膽癉夫内經謂有病口苦名曰膽癉膽為中正之官清淨之府十一臟之所取决咽為之使若數謀慮不决則膽虚氣上溢而口為之苦臟主藏而不㵼今數謀不斷則清淨者濁而擾矣故氣上溢而其證為是也經所謂是動則病口苦以氣為是動也半夏茯苓湯治謀慮不决膽氣上溢致口苦神思不爽半夏湯洗去滑炒赤茯苓去皮麥門冬去心酸棗仁桂黄芩去皮逺志去心人參各二兩甘草一兩半炙右搗篩每服五錢水一盞半薑五片秫米一匙頭許煎一盞去滓温服不拘時地骨皮湯治謀慮傷膽膽氣上溢膈脘虚煩常覺口苦地骨皮生地黄各五兩前胡二兩半茯神二兩麥門冬去心知母人參甘草各二兩炙右搗篩每服五錢水一盞半入脫粟米各少許同煎一盞去滓温服不拘時麥門冬湯一名升麻湯治膽虚氣逆口常苦煩躁引飲方見本門膽實類益膽湯出聖惠方治肝膽俱虚熱氣上薫口中常苦煩渇臟腑因虚致熱黄芩甘草各二兩炙人參桂各一兩去皮苦參茯苓各半兩去皮右搗篩每服三錢水一盞半煎七分去滓温服不拘時梔子湯出聖惠方治腹熱氣逆口苦煩濁梔子仁二十枚升麻黄芩大青茯神去木各二錢甘草半兩炙剉右搗篩每服三錢水一盞豉五十粒煎七分去滓入蜜半合更煎三二沸食後温酒服忌熱麵炙􅏼等人參湯一名枳殻湯治膽虚氣逆邪熱攻衝口苦煩渇方見本門膽實熱類普濟方卷三十四
