body:
  text: 普濟方卷三百九十一明周王朱橚撰嬰孩癖積脹滿門總論夫腹脹由皮脾胃虚氣攻作也實者悶亂喘滿可下之用紫霜丸白餅子不喘者虚也不可下若悞下致脾虚氣上附肺與脾子母皆虚肺主目胞腮之類脾主四肢母氣虚甚即目胞腮腫也色黄者屬脾也治之用塌氣丸漸消之未愈漸加丸數不可以丁香木香橘皮豆䓻大温散藥治之何以然脾虚氣未出腹脹而不喘可以以散藥治之使上下分消其氣則愈也若虚氣已出附肺而行即脾胃内弱毎生虚氣入於四肢面目矣小兒易為虚實脾虚不受寒温服寒則生冷服温則生熱當識此勿悞也胃久虚熱多生疸病或引飲不止脾虚不能勝腎隨肺之氣上行於四肢若水壯腎氣浸浮於肺則大喘也此當服塌氣丸病愈後面未紅者虚衰未復故也治腹脹者譬如行兵戰於林㓂未出林以兵攻之必可獲㓂若出林不可急攻攻必有失當以意漸收之即順也治虚腹脹先服塌氣丸不愈腹中有食積結糞小便黄時㣲喘脉壯而實時飲水能食者可下之盖脾初虚而復結有積所治宜先補脾後下之下後又補脾即愈也補肺虚喘腹中有癖不食但飲乳是也當用白餅子下之小兒病癖由乳食不消伏在腹中乍凉乍熱飲水或喘嗽與潮熱時發故飲水過多則當滌脾胃不能傳化水穀其脉沉細益不食脾胃虚衰四脉不舉諸邪遂生羸痩而成疳矣曹宣得子三嵗面黄時發寒熱不食而飲水及乳不止衆以為潮熱用牛黄丸麝香丸不愈及以止渇乾葛散服之反壯錢氏當下白餅子主之後補脾乃以省積丸磨之此乃癖也後果愈何以故不食但飲水者食伏冷脘内不能消致令發寒熱服止渇藥吐者藥衝脾所也下之即愈食癖者其狀在右脇時復來衝心多驚恐是也宜服進食丸化之乳癖者其形在心時或上下疼痛啼呌時作壯熱此不可取宜用消乳丸疳癖者其狀在右脇下生如木梳子大致令肌肉不生漸成羸痩或作潮熱及肚大宜取之仍服進食丸痟癖者其狀或在左右脇間致令啼呌亦須取之驚癖者其狀在心頭不動常要驚啼此因小年驚積成塊涎裹成癖伏之於心此病須要礞砂藥方可取之大抵癖病宜服三􅏢蓬荗橘皮巴豆硇砂縮砂烏梅等藥漸磨化不可急取腹脹之狀膨脝䐜脹素問云濁氣上則生䐜脹如皷之有聲心腹脹滿但名為食不入鼔腹榮衛隔塞鳴息喘粗皆由冷氣所作實鑑云凡冷結在脾因兹腹脹壅滯於脾内不通而外不散痞凝於胃上不降而下不升或乳食過度致傷脾胃胃氣弱則臟腑弱令腹有飽脹二證亦有半虚半實證虚者腹脹不喘洩㵼不食實者朝寛暮急悶亂喘粗半虚半實者喘滿洩㵼或腹脹不喘小便如常皆半虚半實也虚者皆益黄散次塌氣丸導氣丸再益黄散補次妙丸子下再白术散若心腹脹滿大便秘澁煎宣風散送下妙丸子半虚半實者益黄補次妙丸子下再益黄散若腹脹不喘大便如常塌氣丸導氣丸漸漸消之有一等腹脹滿肚大青筋四肢痩劣謂之疳蠱此病多死癥音真又音呈傷食得之痛刺脇肋心胸煩悶飲食不下吐逆心忪不醫治漸成癥結又曰食結瘕音賈又音加傷血得之心膈鬱悶痛引少腹時或攻築上搶心胸雖不阻食肌肉不生久而不治漸成瘕結又曰血結痞音甫又音匕又音婢傷氣得之心腹膨脹肚大脇滿痛刺往来主左肋面黄肌痩倦怠無力久而不治漸成痞塊又曰氣塊癖音僻傷積得之其證如腸澼之疾便利無度滑不成糞似痢非痢似䖝在腹肚乾痛上築心胸滿悶久而不治頑結不散腸結成塊有類痞狀以上四證皆作寒熱有如瘧候一般悉由傷及五臟惟痞癖左脇肋塊其氣結聚男女皆在左肋四證大同小異凡治寒熱先以梨漿飲進三服退其寒熱寒熱已消去三五日後方可與服磨痞丸即日日頻頻與服癥瘕之疾只與三稜丸下去積毒以通為度凡疳氣脹疳極脹氣積脹小兒患疳證候皆由虚所傳積乃為母既積已作虚氣傳授遂成疳疾其名數種皆漸所致不可更與通利尤加重候即宜和益消疳調氣治之先與服神功保童丸以至泄氣為快既泄虚氣即散不傷其氣攻效至良應患疳疾便利無故大有功效鎻肚脹急此一證候兒在胞胎中無只由初生七日内有患觸受而成急如水火其作延久漸見加重以致肚青筋撮口不乳其候甚者名脹急其兒感觸邪氣入腹衝心不能自化遂變風候及至成風不可更投疳藥雖然鎻肚撮口不乳其色未變精神未耗者速用下藥以通為度纔通便安宜服真珠天麻丸人纔生下男女有一證男在三五七女即二四六日竒偶之有數隂陽之顯道者遂感客忤邪正相干亦令兒肚𦂳青筋噤口不乳此由客情外来致襲其邪隂陽不順胃觸其正初生男女氣脉未定精神未足総皆邪觸上古醫家著述繁雜難窮至要世俗雖有加文理無用灸血氣發生豈因經客若以艾炷即為虚設既受此厄越日移時母泣父啼痛心待斃凡上膈脹中脘脹食傷膨脹者膈與脘上下相承膨與脹輕重自别脘受疾久則痞悶膈則病停鬱結是知膈隠胸膛脘臨脾胃膈者猶隔也有如隔礙脘者管也通即流利二位皆由食傷宿冷眠卧遇風停滯之氣不順於三焦怯弱脉虚傳於五臓所謂脾不磨食胃不化食所以膨脹若於膨脹之時不與消利遂致虚滿又於虚滿不為疎補其氣即攻中脘不化即在上膈既在上膈為疾必作形証傳即為重醫莫容易取愈食傷膨脹服三稜煎丸中脘腹脹服王氏塌氣丸上膈鬱脹服大茱連丸楊氏曰小兒乳哺失調三焦闗膈以致水漿乳哺停滯脾胃不能宣行冷氣結聚初則成積乆則血膜包水時時作痛或為潮熱或生寒熱及瘧家多於中脘蓄積黄水日乆結癖寒熱不已㓜㓜方曰由脾胃虚冷乳食積滯不能尅化以致血膜頑疾裹積而成癖湯氏曰食癖乳癖疳癖痞癖宜以甘遂芫花莪术三稜巴豆等取之惟驚於取藥中加以南星半夏化痰之劑實者取而後補虚者補而後取補脾則實脾散磨積則消積飲用巴豆去巴豆或硇砂厚朴取積則紫霜丸神妙丸五積丸重者消癖丸痞者塞也結者實也熱氣藴於胸膈之間留飲聚於腹脇之内於是榮衛不能流行臟腑不得宣通由脹滿而至痞結勢使然耳此熱實之證也時或發為壯熱甘遂散主之原小兒癥瘕癖結候五臟不和三焦不調有寒冷之氣客之則令乳哺不消化結聚成癥癖也其狀按之不動有形攻起者癥也推之浮沉者瘕也其弦急牢強或在左或在右者癖也由冷氣痰水食飲結聚所成故云癥瘕癖結也夫小兒寒温失調飲食不化與臟氣相搏結聚不動名為癥也其食結在腹喜寒四肢灑灑如瘧不能飲食常自隠隠而痛此則食癥也小兒瘕者腹中疼痛無常不定在一處者瘕也小兒結癥成塊者為不慎滋味嘗喫滑膩肥腥羶𤓰菓胃口不和結實難化癥痞於胸膈之間攻衝榮衛則嘔逆頻頻喘粗眼澁更加頻渇或歸於下部則泄㵼頻倂兩脇虚脹便只和脾胃或是疎㵼或則飲食不化漸次成癥凡小兒生下有瘕癖氣有疳蟲攢心氣有胎驚疝氣有抱心吊氣者瘕氣發時横来左右脇下築痛或吐逆急下鮓湯圓通利後以勻氣散服之疳蟲攢心氣者其後伏面去蟲藥如渇水未住便下塌氣丸夾黄連飲子服之胎驚疝氣者生下多夜啼或吊上腎乃以寛氣藥參苓散治之又用葱涎膏貼外腎醒後汗出如渇水無時乃以槐角丸又寛氣藥調理二三日亦已通利與勻氣散生下未週嵗見隂腫者此胎中大受極熱或父之傳授先用牛黄丸療之後勻氣散用芸薹子為末冷水調貼之如未退却用寒水石白繕土酸醋調塗乃常吃鬱金甘草牙硝三味為末蜂糖熟水調下諸癖結脹滿方金露丸出湯氏寶書治心腹脹滿癥癖氣塊大如鵝卵者及黄疸朝起嘔逆四肢沉重上氣盤結血氣衝心膀胱兩脇膨脹背連腰痛十種水氣五淋五痔骨蒸頑麻半身不遂眉毛脫落皮膚燥痒常如蟲行手足煩熱夜卧驚悸夢與鬼交年月深逺行成勞病尸蟲鬼疰久不能療及治室女經閉阻滯血脉不通羸痩憔悴不思飲食人參官桂各半兩紫花术三分炒附子一枚炮去皮臍川烏半兩炮厚朴三分去皮製大黄半兩猪牙皂角二錢去皮菖蒲半兩桔梗去蘆三分乾姜一分炮川椒半兩去合口者柴胡一分吳茱茰半兩白茯苓半兩右為細末别研甜葶藶子半兩巴豆三分去皮膜油續隨子半兩後三味别研得所同前藥味一處麵糊為丸如麻子及菉豆大以意加减十歳兒空心米飲下五丸如覺攪觸為驗升陽補氣湯治小兒脾病發熱防風根三錢羗活一兩半柴胡一錢甘草三分荆子半兩升麻半兩葛根半兩獨活三分黄耆半兩人參三分當歸身三分酒浸陳皮三分黄柏三分酒浸生地黄三分酒洗地骨皮半兩右剉毎服三錢水煎去滓温服牛黄丸㓜㓜新書治小兒癥瘕百病疳痼腹脹黄痩發渇不常客忤疳痢及吐逆不定心腹多痛及驚風天釣等症牛黄細研犀角屑各半兩木香當歸微炒各半兩人參去蘆頭川大黄剉碎微炒光明砂細研水飛過檳榔各三分麝香細研鱉甲一兩塗醋炙黄去裙襴代赭二分巴豆以淡漿水大碗煮盡去皮出油别研各一分肉豆䓻二枚去皮杏仁二十枚湯浸去皮尖雙仁麵炒微黄色右為末同研令勻鍊蜜和丸如菉豆大小兒百日已下乳汁下一丸二三歳空心粥飲下二丸胸膈有病吐出臟腑有病即利出惡物為驗後只吃漿水粥一日其利自止五日至十日吃一服永無滯結量兒大小加减服之牛黄鱉甲丸幼㓜新書治少小癖實壯熱食不消化中惡忤氣牛黄厚朴姜製炮茯苓桂心芍藥乾姜各半兩鱉甲醋炙香熟麥麵柴胡大黄枳實麩炒芎藭各一兩右為末蜜丸如小豆大日三服以意量之一方有麥門冬無枳實鱉甲丸聖濟総録治小兒癥癖鱉甲醋炙去裙襴犀角鎊丹砂研桂去粗皮各半兩大黄剉炒當歸微焙萆􅐺炒代赭搗研巴豆去皮心膜研如膏各一兩枳殻去瓤麸炒牛黄研麝香研各一分右為末煉蜜和丸如麻子大三四歳兒毎服二丸至三丸空心新汲水下瘥即止更隨兒大小加减鱉甲丸㓜㓜新書治小兒癥癖羸弱不能乳食鱉甲塗醋炙黄去裙襴荆三稜㣲煨剉川大黄剉碎㣲炒檳榔郁李仁各半兩湯浸去皮㣲炒木香青橘皮湯浸去白瓤焙肉桂去粗皮柴胡去苗人參桔梗各去蘆頭防葵各一分右為末煉蜜和丸如菉豆大五六歳兒空心米飲下七丸晚後再服更隨兒大小以意加减木香硇砂煎丸幼幼新書消癥瘕積聚血結刺疼木香大黄炮荆三稜生用巴豆去皮膜不出油用細研之官桂去皮筒子漆炒青橘皮去白蓬莪茂炮附子炮去皮臍乾薑炮各一分香墨一指節大細研硇砂半兩以好醋一盞浸一宿去砂石右將大黄末荆三稜末巴豆等三味同於銀石器内以好醋一升煎一兩沸次入硇砂同熬成膏次入諸藥末和勻再入臼杵千百下為丸如菉豆大毎服五丸傷冷食冷酒冷水結聚腹内氣塊痛用乾薑湯或橘皮湯下夾食傷寒白湯下亦得粘食不消或氣塊即用煮麵湯下食牛羊魚鱉肉成氣塊不散用所傷汁下宿酒不消酒下血氣當歸酒下姙娠不服要轉痰茶下加至七丸常服一兩丸鱉甲散㓜㓜新書治小兒癥瘕壯熱頭痛嘔逆腹痛寒熱頭髮作穂及食癖乳癖氣鱉甲一箇塗醋炙黄去裙襴枳殻麩炒微黄去麩木香川大黄剉微炒荆三稜微煨剉檳榔各半兩人參去蘆頭赤茯苓柴胡去苗各三分桂心一分右為粗散毎服一錢以水一小盞煎至五分去滓温服日三服量兒大小以意加减聖效丹幼幼新書治癖結諸病久不瘥當歸洗焙乾木香好硃砂細研水飛桂心各一兩甘遂慢火煨令黄色用荆三稜炮熟剉鱉甲各半兩塗醋炙黄去裙襴已上搗羅為細末次用麝香㽔仁各一分湯浸去皮别研巴豆三七箇去皮心用好酒煮一宿取别研右同研細用黄蠟六兩慢火鎔化同諸藥攪成膏如黍米大毎服未週歳小兒一粒二三歳二粒四五歳三粒六七歳五粒十歳以上七粒温米飲下乳食後量兒大小加減荆三稜散荆三稜煨剉鱉甲醋炙去裙襴枳殻去瓤大腹子剉陳麵炒麥蘖炒蓬莪茂煨剉厚朴去粗皮姜汁炙訶梨勒皮半生半熟青橘皮去白焙各一分右為散六七歳毎服半錢空心米飲調下日三服更量兒大小加減鱉甲丸㓜㓜新書治少小腹中結堅脇有疹手足煩熱鱉甲醋炙香熟芍藥大黄各三十銖茯苓柴胡乾薑各二十四銖炮桂心六銖䗪虫齊曹各二十枚右為末蜜丸如梧桐子大服七丸漸漸加之以愈為度馬通粟丸幼幼新書治少小脇下有氣内痛喘逆氣息寒熱羸瘦不食馬通中粟十八銖杏仁紫苑細辛各半兩五味子右為末蜜丸如小豆大毎服十丸日三服不愈加至二十丸大茱連丸活幼口議治小兒飲食過度膨脹胸膈上下氣不宣通鬱滯迷悶情思少樂大則作喘強食不化作渇煩躁坐卧不安肢體倦怠腹脇疼痛蓬莪术荆三稜各一分醋炒乾薑炮青皮陳皮並去白木香丁香各二錢緑小細茱茰二錢巴豆二十一粒去殻心膜出油右為末醋糊丸如麻子大毎服七丸至十丸大者加服生薑棗子湯下議曰痞鬱結注所因脾胃飲冷食生冷粘成積氣不化滯在胸膈胸膈乃總名却有三腕上下相通滯因冷侵虚處所受弱處所發致疾有因久不尅化成害有由結癖癥瘕積之所由生疳痢吐瀉積之所因作今用此方寛胸膈厚腸胃正氣温中消磨疳積能止吐瀉進飲食代赭丸治小兒腹中結癖塊痛代赭石研細川大黄各半兩木香五靈脂硃砂鱉甲塗醋炙黄桃仁浸去皮焙辣桂各一分巴豆去油半分右為細末糕糊丸如麻子大風乾毎服五丸薑湯下撾脾散治小兒脾癖石燕一對醋蘸七次白丁香一兩定粉三錢人參三錢訶子一對丁香半錢輕粉半兩陀僧二兩舶上硫黄五錢右為極細末毎服一錢量兒大小加減大者二日一服小者三日一服早辰米湯調服食乳汁小兒男用女汁麵湯亦可三歳服一字五歳服一錢雙紫丸㓜㓜新書治小兒身熱頭痛飲食不消腹中脹滿或小腹絞痛大小便不利或重下數起小兒無異疾飲食過度不知自止哺乳失節或驚悸寒熱惟此丸治之不瘥更可重服小兒欲下是其候哺食減少氣息不快夜啼不眠是腹内不調冝用此丸序例中云服紫丸者即前變蒸篇中四味者也云服紫丸不下者服赤丸差駛病重者常用方之中並無赤丸而用硃砂又力𦂳於紫丸疑此即赤丸也巴豆㽔核仁各十八銖麥門冬十銖甘草五銖甘遂硃砂各二錢蠟八錢牡蠣八錢右以湯熱洗巴豆研新布絞去油别搗甘草甘遂牡蠣門冬下篩訖研㽔核仁令極熟乃内散更搗二千杵藥燥不能相丸更少入蜜足之半歳兒服如荏子一雙一歳二歳兒服如半麻子大一雙三四歳者服如麻子二丸五六歳者服如麻子大二丸七八歳服如小豆二丸九歳十歳大如小豆二丸常以鷄鳴時服至日出不下者熟粥飲數合即下丸皆雙出也下甚者飲以冷粥即止芍藥湯治小兒胎中宿熱乳母飲食麄惡辛苦乳汁不起兒乳肌膚心腹痞病萎黄瘦瘠四肢痿躄繚戾服之可令充恱方見本門褐丸子活幼口議治小兒隂陽不和臟腑怯弱乳食不消心腹脹滿嘔逆氣急或腸鳴泄瀉頻併腹中冷痛食癥乳癖痃氣痞結積聚腸胃或秘或利頭面腫滿不思乳食宜療五種疳氣八種痢疾肌肉消瘦氣麄大神色昏憒情意不樂常服散冷熱氣調和臟腑去疳積止瀉痢進乳食生肌肉恱顔色蘿蔔子二兩微炒陳皮去白青皮去白各一兩荆三稜炮一兩黑牽牛一兩半半炒半生蓬莪术炮一兩胡椒半兩木香一分右為細末麵糊為丸麻子大毎服三五十丸煎蘿蔔湯下一方加胡黄連半兩苦楝半兩蘿蔔子只使一兩議曰證候不明醫之過也丸散不良士之繆也去醫裁藥審證察候猶若權衡以究標本醫藥純全之道凡調理小兒雜病須究疳證積候乃五臟所傳及至變作他患殊失源流迷而不反所以作疾此方寛腸下氣散結去鬱疳積已作順傳逆傳並皆宜服凡痞癖之氣同根異名作疾有塊皆在左脇男女一同然痞者陽證癖者隂證小兒脾胃不和隂陽氣交錯冷熱相制皆由積之所致故先寒後熱一如其瘧汗出則息若先下却其積熱住不去反増加重而又作腫虚滿頭面凡有是疾醫者不可輕易投砒治之其砒有火毒衝胃三焦作渇飲水停在脾屬四肢亦作浮腫重則致喘煩躁虚悶倦怠不安砒之為藥豈可妄投冝先與服梨漿飲加湯使如法取令寒熱退三五日乃却與三稜丸磨化積毒以利為度去其根本若未通更服已上忌生硬冷物直指方加檳榔五靈脂各一兩吞紫霜丸治疳脹三稜煎丸活幼口議治嬰孩小兒食傷生冷粘膩熱毒等物脾胃積滯久不尅化令肚熱脚冷痞癖寒熱及療癥瘕中脘不和膨脹上膈氣壅心腹不得宣通所以作疾此藥温良但治諸積滯食不化荆三稜蓬莪术並炮各半兩芫花一分淡豆䜴二三錢鱉甲去裙米醋炙令焦半兩巴豆二十一粒去殻杏仁去皮尖一分炒令赤右前六味一處以米醋一碗煮令乾仍炒起更細截焙為末次入當歸末又入杏仁巴豆淡豆䜴和勻水煮麵糊為丸麻子大毎服二十丸生薑湯下大小加減服之此方亦名消痞丸又名化積丸其藥破氣行血和脾開胃一應痞癖癥瘕諸疾氣滯並皆療之夫脾胃者乃飲食有所宜則穀氣消血脉勻肌體壯精神爽有所不利則腸胃瘦面目黄疾病作以是藥固其臟腑胃氣固穀食自然留之脾胃既壯穀食自然磨之若飲食遲化即氣弱飲食不化即氣虚小兒服此初安臟腑次益肌膚三焦既順百脉俱調效驗紅丸子治血膜包水僻側於脇儫時時作痛發寒熱瘧家中脘多蓄黄水日交結癖亦效三稜煨莪术煨芫花桃仁去皮别研杏仁去皮别研硃砂烏梅炒巴豆各等分右為末醋糊丸小菉豆大硃砂為衣米湯空心服七聖丸湯氏寶書治消積滯調脾胃及治小兒食不化成積積不消成癖久而作痛冝服三稜莪术川楝去核陳皮去白青皮去白芫花各等分右以芫花醋浸一夕炒漸乾入三稜莪术同炒又入川楝陳皮青皮同炒焦取為末等分如各半兩杏仁去皮尖别研巴豆二十粒去油膜勻和醋糊丸黍米大一歳二丸臨睡米飲下此二方稍相似不若方中和桃仁與烏梅則尤妙又用蒜蕩脾丸化痰涎一日一服或兩服日用如此服蠏水亦可日間所食之物一夜而化永無疳疾一方可去巴豆别入杏仁代赭丸一名小紫霜丸治少小及大人腹中宿食積成癥癖兩脇妨滿氣息喘急不能食面黄日漸痩腹大脹除百病幼幼新書代赭丹砂各研大黄各八分青木香五分聖恵用二兩當歸五分聖恵用二兩桂心四分聖恵用二兩巴豆六分去皮心另搗聖恵用半兩犀角屑三分聖恵用二兩右搗篩蜜和丸如梧桐子大小兒量之十歳兒服大豆許二丸六歳者小豆許二丸以下臨時斟酌要瀉病出為度久病日一丸以溏泄而已不在猛瀉忌如常法一方去桂心用杏仁持遂丸幼幼新書治小兒癥瘕脇下堅硬如石四肢黄痩不欲乳食甘遂煨令㣲黄㽔仁各一分湯浸去皮研入雄黄細研丹砂石膏各細研水飛過牡蠣燒為粉各半兩麝香半分細研巴豆半分去皮心絹裹盛酒中煮半日取出焙乾右為末與巴豆研令勻煉蜜和丸如黍米大毎服以粥飲下一丸日二服量兒大小加減服之大腹子湯幼幼新書治癥癖腹滿小便不利大腹皮一對剉檳榔枳殻麩炒去瓤赤芍藥人參去蘆頭知母陳橘皮湯浸去白各半兩甘遂一分煨令黄右為細末毎服一錢水一小盞煎至五分去滓温服量兒大小加減七味進食丸幼幼新書治乳食不消心腹脹滿壯熱喘粗嘔吐痰逆腸鳴泄瀉米穀不化或下利赤白腹痛後重及食癥乳癖痃氣痞結並皆治之久痢有疾不除或多壯熱或疳積肚痛常服消進飲食永無食癖痞結之疾余常用之效不可具述代赭石燒醋淬研當歸去蘆㣲焙硃砂研飛枳殻去瓤麩炒木香各半兩麝香細研一分巴豆霜半分右為末入研藥和麵糊為丸如麻子大毎一歳服一丸温米飲下更量虚實加減食後服之白丁香散瑞竹堂治小兒大人癖積白丁香雀兒糞也黑丁香二錢蜜陀僧三錢硫黄一錢訶子皮半錢輕粉半錢木香二錢右為細末毎服一錢用乳汁調服女用男乳食男用女乳食調服食前半飢半飽食日三錢棗兒壓之大人米湯空心服牛黄丸幼幼新書治小兒結實乳食不消心腹痛牛黄太山甘遂各半兩真珠六銖杏仁泡去皮尖芍藥黄芩各一兩巴豆十八銖右為末蜜丸一歳兒飲服如麻子大二丸但隨兒大小加減服萬應丸聖濟総録治小兒隂陽氣不順虚痞脹滿嘔逆腹痛成癥瘕癖結等病檳榔二枚剉陳橘皮去白焙青橘皮去白焙各半兩木香黄連去鬚蓬莪茂煨剉桂去粗皮各一分右為末毎服一錢匕入巴豆一粒去皮心膜醋煮紫色研杏仁一枚去皮尖燈上燒黑研將前藥末同二味合研勻細用白麵糊丸如粟米大毎服二丸食後生薑湯下更量兒大小加減牽牛子丸一名枳殻丸治小兒水癖按之作聲及治癖脇氣下妨悶手足㣲腫幼幼新書牽牛子炒枳殻去瓤麩炒半兩蘖皮去粗皮炙甘遂桂炒黄去粗皮牡丹皮各一分大黄剉三分右為末煉蜜和丸如菉豆大毎服五丸空心服温湯下量兒大小加減雙參飲子幼幼新書人參胡黄連枇杷葉拭去毛乾葛甘草元參麥門冬右各等分為末毎服一錢水半盞煎兩三沸去滓服桔梗枳殻湯治熱氣痞滿膈兩脇按之則痛枳殻去瓤桔梗去蘆兩五錢半夏湯洗黄芩𤓰蔞仁黄連去鬚各三錢右剉散生姜麥門冬去心煎服利黄涎沫即安蘆薈丸治小兒脾癖木香肉菓丁香各五錢已上三味麵裹煨蘆薈一兩史君子訶子各五錢右為細末煮棗肉為丸如菉豆大毎服二十丸空心白湯下日二服量兒大小加減雄鼠粥聖濟總録治小兒癥瘕腹痛脹滿或作塊或皮膚浮腫不能食雄鼠肉五兩切炙陳橘皮去白焙半兩鱉甲醋炙去裙襴荆三稜煨剉郁李仁去皮研各三分生姜切焙半兩右粗搗篩分作三帖毎帖以水一升煎去滓取半升入粳米一合加五味煮作粥空心食之知母大黄丸幼幼新書治小兒癥瘕腹痛黄瘦川大黄三分剉碎㣲炒知母牡蠣煆為粉枳殻麵炒㣲黄去瓤當歸各半兩㣲炒鱉甲一兩塗醋炙黄去裙襴右為末煉蜜和丸如菉豆大三四歳兒毎服空心以粥飲下五丸晚後再服量兒大小以意加減鱉頭丸㓜㓜新書治小兒痞氣脇下腹中有積堅痛鱉頭一枚甘皮半兩蝱蟲䗪蟲桃仁各十八銖右為末蜜丸服如小豆二丸日三服大便不利加大黄十八銖以知為度聖恵方同但用大黄無甘皮白餅子一名玉餅子錢氏治小兒腹中有癖但飲乳者及嗽而吐痰涎乳食滑石輕粉半夏湯浸七次去涎天南星各一錢為末巴豆二十四箇去皮膜以水一升煮水盡為度右研勻巴豆後入衆藥以糯飯為丸小菉豆大揑作餅子三歳已上三五餅子已下一二餅子煎葱白湯下臨卧服之人參蘿蔔飲活幼口議治小兒痞癖因食砒藥丸子作渇煩躁頭面浮腫腹肚𦂳脹喘促坐卧不得肌體羸瘦寒熱尚在白术苦梗甘草炙人參麥門冬去心右等分為末毎服一大錢取生蘿蔔汁半盞煎至半候冷與服治小兒癥癖百病疳痼腹脹黄痩發渇不常客忤疳痢及吐逆不定心腹多痛及驚風天釣㓜㓜新書硃砂細研杏仁各一分湯浸去皮尖雙仁另研如膏巴豆霜半分鱉甲醋塗炙黄去裙襴犀角各半兩右為末入巴豆杏仁研令勻煉蜜和丸如黄米大百日兒乳汁下一丸三四歳兒薄荷湯下三丸隨兒大小加減服之芫花丸㓜㓜新書治小兒心下痞痰癖結聚腹大脹滿身體壯熱不欲哺乳芫花黄芩各一兩大黄雄黄