三丸苦風口噤下七丸熱酒灌下再用五丸投之龍腦牛黄丸治急風涎潮稍退風留四肢變為攤緩手足不随口眼喎斜龍腦别研牛黄别研槐膠通明者阿膠炒令燥膩粉水銀以棗肉同研無星各一分乾蝎去足真酥酒炒一分阿魏半分麵裹燒令麵熟去麵不用白花蛇酒浸去皮骨炙肉用麝香别研各一兩鈆白霜别研半兩右先將槐膠阿膠乾蝎白花蛇搗羅為細末再入諸藥研勻鍊蜜和丸如皂子大新病者每服一丸細嚼生薑湯下更以酒少許衝下常於宻室内避風後藥服覺病處汗出氣息上膈涎痰出或暴利一兩次腹内鳴轉三服後即减覺退後三日再一服如聖散治急風狐心肝三副烏鵶二隻去觜爪翅并臘月者已上二味相次新藏瓶一枚斡開口子内之瓦葢合留一眼子外以紙筋泥固濟泥乾以火燒令赤候煙細無香氣去火盖定眼子候冷取出以絹帛裹地坑内覆出火毒一復時取出研細為末龍腦研麝香研各二錢牛黄研半錢犀角鎊琥珀各一字金箔銀箔各十片真珠麻子大者五顆小者十顆細研丹砂研二錢右𢷬研極細同前藥研勻每服一錢七薄荷自然汁入酒少許調下空心日午臨卧各一服大黄丸治急風手足拳攣不得屈伸大小便澁百節痛不能行走大黄煨乾薑炮白殭蠶炒天麻白附子炮天南星炮附子炮製去皮臍半夏湯洗去滑各一兩牛黄研半兩膩粉一分麝香研半分右為末鍊蜜和丸如雞頭大每服一丸冷酒化下天南星散治急風及破傷角弓等風天南星切作片子水浸一宿焙乾半夏湯洗去滑乾蝎㣲炒白殭蠶㣲炒細辛白附子炮製各半兩肉桂去皺皮一兩膩粉一分白花蛇酒浸去皮骨炙㣲黄一兩犀角屑天竺黄各三分右細羅為散不計時候以温豆淋酒調下一錢防風丸治中急風防風去义白殭蠶炒乾蝎酒炒白附子炮丹砂研五靈脂研羌活去蘆頭天麻天漿子去殻入研末研各半分牛黄研一錢右為細末拌勻糯米煮糊和丸麻子大薄荷酒下五丸加至七丸或口噤研化灌下小兒急驚風荆芥薄荷湯下二丸至三丸追風散治一切急風角弓反張四肢抽掣牙闗𦂳急骨節疼痛及破傷風烏頭去皮臍附子去皮臍白附子白花蛇酒浸去皮骨焙丹砂研各一兩蝎稍麝香研各三分膩粉研一分天南星去臍一兩右並生用搗羅六味為細散入研藥合研勻瓷合收每服半錢至一錢豆淋酒或煎葱白酒調下口噤者用少藥揩牙即開為妙牛黄金虎丹治急中風身背强直口噤失音筋脉拘急鼻乾面黒遍身壮熱汗出如油目瞪唇青心神迷悶形體如醉痰涎壅塞胸膈喉中如拽鋸聲白礬枯過天竺黄研天南星湯洗焙為末用牛胆和作餅焙乾如無牛胆用法酒蒸七晝夜膩粉研各二十五兩牛黄研二兩半生龍腦研五兩天雄炮去皮臍十二兩半金箔八百片為衣雄黄研飛一百五十兩右為末鍊蜜搜和每一兩半作十丸以金箔為衣每服一丸以新汲水化灌之扶坐使藥行化良乆續以薄荷自然汁更研化一丸灌之立愈肥盛體虚多涎有風之人宜常以此藥随身備急忽覺眼前暗黒心膈悶亂有涎欲倒化藥不及急嚼一丸新汲水下小兒急驚風一嵗兒服菉豆大一丸薄荷自然汁化灌之更量嵗數随時加减有孕婦人不可服透闗丸治中急風榮衛痺滯頭目昏暈額角偏痛手足無力舉動戰掉語言蹇澁心神不寕麻黄去根節二兩麝香研天麻各半兩沒藥研乳香研地榆甜𤓰子黒參川烏頭生去皮臍各一兩右為末以酒一升慢火熬成膏更重入錬蜜如梧桐子大每服三十丸温荆芥湯下不計時候附子散治急風面青口噤心膈有涎不可出者附子酒浸過炮製去皮臍白附子生用白殭蠶生用天南星生用海桐皮半夏湯洗七次去滑各一兩狼毒以醋煮半日細切曝乾乾薑炮製各半兩麝香細研一分右搗細羅為散入麝香都研令勻每服以熱豆淋酒調下二錢良久再服必吐涎出相次以熱葱酒一盞投之盖覆令有汗為效蛜􅖉散治急風四肢搐搦口面喎戾不知人事蛜􅖉㣲炒白附子炮製獨活槐螵蛸㣲炒天麻桂心各一兩白殭蠶㣲炒天南星炮製膩粉各半兩右搗羅為細散不計時候以温酒調下一錢烏蛇散治急風蹇澁心膈煩悶四肢𦂳急烏蛇肉酒浸炙㣲黄白殭蠶㣲炒天麻各一兩天南星炮製白附子炮製半夏湯洗七次去滑各半兩附子炮製去皮臍一兩蟬殻㣲炒牛黄細研各一分右搗細羅為散不計時候以温酒下二錢薄荷調下亦得雄黄散治急風及破傷風立效雄黄細研白附子炮製天南星醋煑十沸炙乾各三分牛黄細研一分麝香細研蛜􅖉㣲炒白殭蠶㣲炒各半兩天麻白花蛇肉酒浸炙㣲黄各一兩右搗細羅為散入研了藥令勻不計時候以温酒調下一錢天麻散出聖恵方治急風四肢拘攣牙闗𦂳急失音不語天麻附子炮製去皮臍各一兩天南星炮製白附子炮製麻黄去根節桂心烏頭炮製去皮臍各三分乾薑炮製剉各半兩半夏湯洗七次去滑右搗細羅為散每服以豆淋酒調下二錢盖覆當有汗出良久未汗即再服之土蜂丸出聖恵方治急風筋脉拘急口眼喎斜土蜂十枚雄黄硫黄硃砂各一分膩粉龍腦麝香各一錢乾蝎十枚頭足全者蟬殻十枚㣲炒右都研為末用槐膠和丸如菉豆大每服不計時候以熱豆淋酒下十丸頻服汗出為度蠐螬丸出聖恵方治急風眼前暗黒心躁吐涎四肢不舉蠐螬乾者槐䖝糞乾地龍㣲炒蛜􅖉㣲炒烏頭去皮臍生用各半兩蠶沙㣲炒天麻各一兩白花蛇酒浸炙㣲黄二兩晚蠶蛾㣲炒一分右為末用烏驢腦髓和丸如梧桐子大每服不計時候以熱酒研下十丸其藥於臘月預修合之銀星丸出聖恵方治急風涎盛口眼喎斜言語蹇澁天南星為末牛乳拌炒乾細研四兩白附子為末生薑自然汁拌炒乾細研二兩麝香研竈突中煤細研蝎稍炒水銀各一兩鉛一兩與水銀結沙子研牛黄研半兩右合研令勻鍊蜜和丸如菉豆大每服十丸至十五丸煎甘草黒豆湯下小兒慢風痰涎不利服三五丸欲利者以龍腦膩粉薄荷汁調下一方有石腦油無麝香名牛黄丸阿膠散出聖恵方治急風口眼不開筋脉拘急阿膠搗碎炒令黄燥當歸剉㣲炒桂心附子炮製去皮臍麻黄去根節各一兩乾蝎㣲炒白殭蠶㣲炒蟬殻㣲炒各半兩右搗細羅為散每服以温酒調下二錢良乆以葱酒投之令汗出為效未汗再服赤箭丸出聖恵方治急風涎在胸膈悶亂不已赤箭天南星炮阿膠搗碎炒令黄燥乾蝎㣲炒半夏湯洗七次去滑各三分雄雀糞麝香細研二錢右為末鍊蜜和丸如菉豆大不計時候以温生薑酒研下七丸為妙七寳丸出聖恵方治中急風及中惡不識人面青四肢逆冷丹砂研瑇瑁鎊子沙盆内丹砂研細末安息香鍊去沙石各三兩雄黄研龍腦研麝香研琥珀搗碎别研各半兩右以六味和同研一日取安息香以無灰酒五合别入胡桃瓤二兩同研以葛袋子貯椀盛于飯甑上蒸三升粟米飯熟為度更研如稠糊和前六味如硬即更入鍊蜜丸如雞頭大每服生薑汁合童子小便二合化下半丸或一丸如人行五里再服汗出清利即愈孕婦不可服分涎散出衛生寳鑑治急風口噤手足搐搦涎潮作聲不得出藿香葉蝎稍一方用乾蝎白附子炮各一分天南星炮半兩丹砂研膩粉研粉霜研各一兩右先將四味搗羅為末次入丹砂膩粉粉霜同研勻每服一錢匕至二錢薄荷茶調下沫吐利再服白荆花丸出聖恵方治急風腰背强硬口眼牽急白荆花㣲炒半兩烏頭炮製去皮臍半夏湯洗七次去滑天南星炮裂各一分膩粉水銀以棗瓤研令星盡各半分白花蛇酒浸去皮骨炙㣲黄二兩右為末入水銀都研令勻鍊蜜和丸如菉豆大不計時候以熱酒下五丸天南星丸治中急風天南星炮白附子炮乾蝎酒炒白花蛇酒浸去皮骨炙用桂去粗皮附子炮製去皮臍各半兩右為末鍊蜜和丸如梧桐子大用膩粉半兩滚以粉盡為度每服熱酒下三丸衣覆出汗避外風治急風不語兼注氣攻刺背痛白附子炮白殭蠶炒天麻乾蝎酥炙各一兩白花蛇肉酥炙半兩胡粉一錢右為末鍊蜜和丸如梧桐子大每服二丸冷酒下再用熱酒投汗出即差乾蝎散出聖恵方治急風頑涎壅悶不知人事乾蝎㣲炒桑螵蛸㣲炒蟬殻㣲炒白附子炮製膩粉各一分白殭蠶㣲炒半兩右搗細羅為散不計時候以温酒調下一錢天麻丸治中急風天麻半兩白附子炮半兩半夏一分湯浸生布挼洗七次入薑一分同搗焙天南星炮各半兩乾蝎酒炒一分右𢷬羅為末用猪胆一枚溲和為丸如小豆大每服空心薄荷酒下五丸至七丸小兒如大麻粒大薄荷湯下一丸至二丸歸命丸治急風中人身背强直面黒鼻乾口噤不語蛇黄紫色者火煆令通赤取出以紙襯地上出火毒一宿杵羅為末研如麵用四兩重鐵粉一兩獖猪糞用瓶子固濟燒煙盡為度候冷研細二兩丹砂研半兩麝香研一錢右研極細糯米粥和丸如雞頭大一切風用薄荷酒磨下一丸小兒半丸疳熱冷水磨一丸分作四服合時忌婦人雞犬見如是大人小兒中風口噤反張涎滿者灌下一服立甦小兒被驚及發熱並以薄荷酒磨下少許此藥又名神穴丸合了排漆盤中日内曬之及乾翻㸔每丸有一小穴通丸其藥中空也舊法須端午及甲午日合急即不須急風方出直指方硃砂一字輕粉一点巴豆去油如霜少許全蝎一枚蟬殻二枚去土右為末合和大人盡劑用薄荷泡湯調下小兒分半用乳汁調下或吐痰或㵼毒物皆效蛜􅖉散治中急風乾蝎炒白附子炮附子炮裂去皮劑天南星湯浸軟剉小塊以生薑汁炒各半兩右為散每服一錢七生薑汁調下天麻散治中急風天麻天竺黄天南星乾蝎並生用等分右為散毎服半錢以温酒調下小兒半字半夏丸出聖恵方治急風吐涎四肢拘急腰背强硬半夏天南星乾蝎烏頭去皮臍各半兩右並生用搗羅為末以黒豆麵糊和丸如菉豆大每服不計時候以温生薑酒下十丸治急風立效方出聖恵方土蜂子二十七枚針簽燈上㣲炙乾蝎二七枚全者生用雄黄細研半兩牛黄細研一分右用極細粳米飯和丸如梧桐子大不計時候以温酒研下五丸治急風吐痰方薺苨防風剉各二兩生薑汁二合右将前二味以水五盞煎取三盞每一盞入生薑汁半合空心服之良久即吐痰并惡物等紫桂散治急風吐痰桂去麄皮為末髪灰研各一兩右和勻為散以好酒一升調灌之取吐凡中風人口噤或不嚥藥即用黒豆三二升以青布裹於醋湯鐺内蘸及熱熨前後心并胸膈令風氣散即得藥下或炒鹽醋灰亦得一方治中風失音不語用藥末内舌下良久以温水衝下一方以温酒調服尤妙一方以水煎不計時候分温三服無亂髮蝴蝶散治急風牙闗𦂳不能轉舌語澁礬蝴蝶蜜陁僧各三分右同研勻每服半錢以温水調灌之若牙𦂳不能下藥即鼻中灌之六神湯出衛生寳鑑方治老人急中風虚涎潮口噤昏沉不醒天雄一個炮去皮臍大附子一箇炮去皮臍用七錢的天南星半兩炮切片薑汁浸半日半夏半兩炮切片薑汁浸半日人參半兩白术半兩右為剉散每服三大錢水二大盞生薑二十大片同煎至八分去柤温服不計時候治一切丈夫婦人急中風痰悶倒不省人事口中涎溢宜服此右以不損皂角一條搥碎揉取濃漿新布濾過土器内暖令温和挈開口灌一盞吐涎即安未吐更灌一盞主口癖眼急風出本草用枳茹刮取上青為末欲至瓤上者得茹五升㣲火灼去濕氣以酒三升漬㣲火煖令得藥味遂性飲之治卒中急風身直不得屈伸反覆者出本草刮取枳木皮屑為之枳茹一升酒一升浸一宿服五合至盡再作良偏風論夫人身所養者惟血與氣血氣均等則無太過不及之害稍至衰弱則所運不周遂致體有偏虚復因風客身一邉者謂之偏風其状半體不知痛痒或痿痺不仁或縦緩或痺痛是也方茯苓浸酒出聖劑總録治偏風手足一邊攣縮不随百醫未効已經數嵗宜服山茱茰一兩括蔞根二兩防風去义二兩赤茯苓去黒皮五兩一方用白茯苓牡丹皮去心二兩人參二兩白术一分甘菊花未開者良㣲炒二兩牡蠣熬半兩黄茋二兩紫菀去土三分肉蓯蓉酒浸切焙半兩天雄炮去皮臍蒼耳炒各一兩芍藥三兩菖蒲米泔浸刮去皮節二兩菟絲子酒浸别搗熟地黄切焙原蠶沙炒各三兩石斛去根剉一兩一分栢子仁生用半斤蛇床子炒三分萆薢炒三分杜仲去粗皮剉炒三分逺志去心乾薑炮各二分狗脊去毛一分惡實根刮去皮剉半兩羌活去蘆頭半兩桔梗去蘆炒一分枸杞子炒半升牛膝去苗浸酒切焙乾三分虎骨酒炙半兩續斷五兩惡實炒三分附子炮製去皮臍一兩右剉如麻豆每斤藥以生絹袋盛須稍寛即可用無灰酒二㪷乾瓷瓶中浸封頭蠟紙并白紙十重封繫至二七日藥成方開封不得面當瓶中藥氣衝人每日平旦日中晩後各一每服四合不得過多若病深常令有酒容不得醉吐如患經數年不過一料諸疾稍輕入口見效如有丈夫女子骨節痠疼腫痛行履不得四肢不收脊背傴僂言語蹇澁口面喎斜中風不語手足不遂頭旋眼暗冷淚下流清涕常出四肢跳躑筋脉牽抽徧身瘙痒毒風刺風赤癜白癜並宜服之不論年月乆新皆療或手足冷痛并臟腑㽲痛腸鳴嘔逆痰水夜常不睡顔貌漸衰小便失精力㣲細累年心痛丈夫風冷勞女子血風勞赤白帶下五種痔疾依法服之並皆差酒藥若盡即絞滓隂乾搗為末以鍊蜜和丸如梧桐子大每空心服三十丸如患諸風用酒下冷氣以米飲下諸風若為散即酒調下三錢服之換骨酒出衛生家寳昔人早年患偏風證四肢不舉未服此藥時非人回轉不能自動服藥三日便舉手梳頭七日四肢漸舒十日行歩半月覺身輕眼明此藥神效不敢隠藏白茯苓晩蠶沙炒各三兩虎脛骨酒浸炙黄甘草一兩梹榔一兩郁李仁湯浸去皮附子炮去皮臍各半兩何首烏半兩防風半兩𤓰蔞半兩牛旁子根牛膝各半兩乾菊花半兩杜仲去皮絲黄茋半兩白附子益智仁各一兩石菖蒲半兩天麻一兩山茱茰牡蠣牡丹皮半兩枸杞子各半兩蛇床子肉蓯蓉各一兩羌活半兩鼠粘子半兩狗脊去毛天雄炮去皮尖乾薑炮蒼耳子炒半兩菟絲子各一兩紫菀半兩白术白花蛇酒浸去皮骨炙半兩右入臼為麄末用無灰好酒三五斗生絹袋盛在壜子内封閉令宻浸之藥酒日進三服春夏二七日秋冬三七日開時人面不得向壜口上取浸藥酒日進三服各一盞温暖服久患者不過月日近者只五服其藥柤隂乾為末鍊蜜為丸一名換骨丹每服三四十丸如桐梧子大温酒送下此藥神效益精補虚活血駐顔潤皮膚兼治眼目能退一切風疾常服烏髭髮身輕骨健爽精神净房修養一月妙大木香丸出御藥院方治偏風半身不遂語言蹇澁麻痺不仁風毒注腫痰潮涎出精神昏憒木香一兩一分天麻桔梗防風黄芪天南星薑製半夏麴白鮮皮海洞皮羌活川芎白芷茯苓去皮麻黄去根節白殭蠶炒各一兩虎脛骨酥炙一兩當歸一兩烏蛇酒浸取肉犀角鎊羚羊角鎊人參六錢白花蛇酒浸取肉六錢全蝎㣲炒四錢沒藥六錢桂心六錢乾薑炮四錢阿膠炒六錢蟬殻六錢牛黄另研硃砂另研為衣腦子另研各二錢白附子炮麝香另研四錢右為細末鍊蜜丸如彈子大硃砂為衣每服一丸生薑湯下食前服甘草湯出千金方治偏風積年不差手脚枯細面口喎僻精神不定言語倒錯甘草桂心芎藭麻黄當歸芍藥人參各一兩附子側子各三枚獨活防己各三兩生薑石膏茯神各四兩白术黄芩細辛各一兩秦艽防風各一兩半菊花一升淡竹瀝四升右㕮咀以水一斗先煮麻黄去沫取七升内竹瀝及藥煑取三升分四服服三服訖間一盃粥後更進一服待藥勢自汗慎生冷醋蒜麵乳酪魚等茵芋散出聖恵方治偏風積年不差脚手枯細口面喎斜精神不守言語倒錯茵芋桂心漢防己附子炮去皮臍側子炮去皮臍芎藭人參去蘆頭麻黄去根節當歸剉㣲炒赤芍藥茯神五加皮各三分秦艽去苖一兩防風去蘆頭白术黄芪剉細辛甘菊花甘草炙㣲赤剉各半兩右搗麄羅為散每服四錢以水一中盞入生薑半分煎至五分去滓入竹瀝一合更煎一兩沸不計時候温服忌生冷油膩魚滑等物防風散出聖恵方治偏風頑痺心神冒悶身體疼痛防風去蘆頭白术莽草各三分當歸剉㣲炒前胡去蘆頭麻黄去根節各一兩羌活川椒去目及閉口者㣲炒去汗天雄炮去皮臍附子炮去皮臍赤箭乾薑炮剉細辛川烏頭炮去皮臍白芷山茱茰丹參各半兩人參去蘆三分右搗細羅為散每服二錢不計時候以温酒調下側子散出聖恵方治偏風不遂肢節煩疼心胸滿悶緩縦不仁側子炮去皮臍一兩獨活桂心漢防己附子炮去皮臍芎藭人參去蘆頭麻黄去根節當歸剉㣲炒秦艽去苖茯神防風去蘆頭白术細辛甘菊花枳殻麩炒㣲黄去􅉚各三分甘草炙㣲赤剉半兩右搗羅為散每服三錢以水一中盞入生薑半分煎至五分去滓入竹瀝半合攪令匀更煎一兩沸不計時候忌生冷油膩雞猪肉防風湯出千金方治偏風防風芎藭白芷牛膝狗脊萆薢白术各一兩羌活葛根杏仁附子一作人參各二兩薏苡仁石膏桂心各三兩麻黄四兩生薑五兩右㕮咀以水一斗二升煑取三升分作三服服一劑覺好更進一劑即一度針九劑九針即差灸亦得針風池一穴肩髃一穴曲池一穴支溝一穴五樞一穴陽陵泉一穴巨虚下亷一穴凡針七穴即瘥防風飲一名芎藭湯治偏風半身不遂筋脉抽牽行履不得方見中風身體不随類麻子湯治偏風大麻子一升净擇水漬一宿麻黄去節防風生薑橘皮荆芥芎藭各三兩桂心二兩石膏五兩搥碎綿裹竹葉洗葱白各一握豉心一合蜀椒二十枚去