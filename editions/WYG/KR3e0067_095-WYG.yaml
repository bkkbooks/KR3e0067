body:
  text: 普濟方卷九十六明周王朱橚撰諸風門風痙論夫太陽中風重感於寒濕則變痙也痙者口噤不開背彊而直如發癎之状摇頭馬鳴腰反折須㬰十發氣息如絶汗岀如雨時有脱易得之者新産婦人及金瘡血脉虚竭小兒臍風大人凉濕得痙風者皆死温病熱盛入腎小兒癎熱盛皆痙痙瘠厥癩皆相似乆厥成癲冝審察之其中者患耳中策痛皆風入腎經中也不治流入腎則喜卒然體痙直如死皆宜服小續命湯兩三劑也若耳痛腫生汁作癰癤者乃無害也惟風宜防耳針耳前動脉及風府神良方牛黄丸出聖恵方治風痙身體强直牙闗𦂳急心神昏昧牛黄細研麝香細研龍腦細研各一分硃砂細研水飛過三分白殭蠶微炒鹿角膠搗碎炒令黄燥各半兩白花蛇酒浸炙去皮骨二兩白附子炮製天麻白蒺蔾㣲炒去刺赤茯苓白芷羌活獨活蔓荆子麻黄去根節漢防己木香檳榔藁本防風去蘆頭乾蝎㣲炒當歸剉㣲炒各一兩右為末入研了藥令勻鍊蜜和搗三二百杵丸如梧桐子大每服不計時候以温酒研下十丸天麻丸出聖恵方治風痙四肢强硬口噤不開天麻烏蛇酒浸炙㣲黄去皮骨各二兩白殭蠶㣲炒桂心防風去蘆頭蟬殻川烏頭炮製去皮臍白附子炮製羌活細辛獨活各三分附子炮製去皮臍羚羊角屑各一兩乾薑炮製剉天南星炮製各半兩麻黄去根節一兩半乾蝎㣲炒三分右為末鍊蜜和搗三五百杵丸如酸棗大每服不計時候以温酒研下一丸麻黄散出聖恵方治風痙身體强直口噤不能言神思昏昧麻黄去根節羌活附子炮製去皮臍赤茯苓芎藭各三分桂心黄芩羚羊角屑蔓荆子酸棗仁各半兩防風去蘆頭一分甘草炙㣲赤半兩右𢷬篩為散每服四錢以水一中盞煎至五分去滓入淡竹瀝一合更煎一兩沸不計時候温服衣覆汗出避風白附子丸出聖恵方治風痙口噤身體强直迷悶不識人白附子炮製白殭蠶㣲炒麻黄去根節防風去蘆頭麝香細研各一兩膩粉一分天南星炮製羚羊角屑各三分白术半兩赤箭白花蛇酒浸炙㣲黄去皮骨各二兩右為末入麝香膩粉研令無聲以糯米粥和𢷬三二百杵丸如梧桐子大每服不計時候以温酒研下十丸麻黄湯出聖劑總録治風痙身體强直口噤不知人事麻黄去節先煎掠去沫焙乾二兩甘草炙剉當歸焙黄芩去黒心各一分石膏𢷬碎一兩桂去粗皮芎藭乾薑炮各半兩附子炮去皮臍半兩杏仁湯浸去皮尖雙仁炒二十枚右剉如麻豆每服五錢匕水二盞煎至一盞去滓入荆瀝半合更同煎三五沸温服日二夜二治風痱身體不能自收不能言語冐昧不知人者不用荆瀝每服六錢七水三盞煎至一盞半去滓分温二服空心夜卧各併二服初服一日猶能自覺者勿熱服服訖宻室卧用厚衣覆㣲汗出漸减衣未汗出更用熱生薑稀粥投之汗出忌觸外風并治上氣欬逆者面目大腫但得坐不得卧凡産婦并病人已曽大汗者不可服若虚羸人但當少服天麻散出聖恵方治風痙口噤腰背强直不可轉側天麻獨活麻黄去根節各一兩半當歸剉㣲炒防風去蘆頭桂心細辛附子炮製去皮臍蔓荆子各一兩右𢷬羅為散每服四錢以水酒各半中盞入生薑半分煎至五分去滓不計時候温服天麻湯出聖劑總録治風痙身如板直偏身鞕强天麻半兩羌活去蘆頭人參桂去粗皮白术麻黄去節先煎掠去沫焙乾杏仁湯浸去皮尖雙仁炒各一分附子炮製去皮臍一枚右剉如麻豆每服五錢七生薑一棗一水二盞煎至一盞去滓入酒半盞再煎一沸熱服服後以生薑稀粥投之取汗日二服續命湯出聖劑總録治風痙口噤不開身背强直發如癎状麻黄去根節先煑掠去沫焙獨活去蘆各一兩半升麻葛根剉各半兩羚羊角屑桂防風去义一兩半甘草炙剉一兩右㕮咀每服六錢匕水二盞浸一宿明旦煎取一盞去滓温服衣覆避外風每年春分後常服二三劑即不患天行傷寒及諸風邪等疾甘草湯出聖劑總録治風痙口噤不語肢體强直神識不明甘草各一兩一分剉羌活去蘆一兩一分附子炮去臍皮半兩人參防風去义一兩右剉如麻豆每服四錢七水一盞半入地黄汁一合先同煎至八分去滓次入荆瀝竹瀝各半合同煎三沸温服日夜各一服附子湯出聖劑總録治風痙口噤不語身體强直附子炮去皮臍一分羌活去蘆頭防風去义桂去粗皮各二兩右剉如麻豆每服五錢七水二盞煎至一盞入竹瀝一合更煎三沸去滓温服空心食前日二服羚羊角散出聖恵方治風痙口噤身體强直不知人事羚羊角屑附子炮製去皮臍當歸剉㣲炒桂心防風去蘆頭阿膠𢷬碎炒令黄燥各一兩麻黄去根節天麻獨活各一兩半右𢷬羅為散每服四錢以水酒各一中盞煎至一盞三分去滓不計時候分温二服當歸散出聖恵方治風痙搖頭口噤身體强直當歸剉㣲炒細辛防風去蘆頭桂心附子炮製去皮臍薏苡仁芎藭各一兩獨活麻黄去根節各二兩右𢷬羅為散每服四錢以水酒各半中盞入生薑半分煎至五分去滓不計時候温服蒼公當歸酒治風痙當歸防風各三兩獨活半兩麻黄一兩一分附子炮去皮臍右為末每服五錢水二盞煎一盞去滓温服龍膽湯治五臟生風發痙日夜數十發者防風黄連草龍膽白殭蠶炒各半兩右為末每服五錢水二盞煎一盞去滓温服承氣湯治剛痙大便不通十數日者厚朴四兩去皮薑二兩同𢷬爛乾焙大黄二兩枳實半兩麥麩炒去穰芒硝一兩半右除芒硝外并為麄末每服十錢水二盞煎一盞半去滓入芒硝半錢攪勻再煎三兩沸㣲熱服療賊風痙出本草右以鐵屑炒使極熱用投酒中飲酒治中風痙通身拘急口噤不省人事婦人産後亦宜服之右用獨活一兩為末以酒一大盞煎至七分去滓入竹瀝一合分二服治中風痙口噤面青手足急强婦人産後亦宜服之右用竹瀝一升分為五服㣲温頻服大效風痓論夫風痓病者身熱足寒頭項强急惡寒時頭熱面青目赤獨頭動搖卒口噤背反張以發熱惡寒不惡寒有汗無汗分剛柔者風寒痓也脉沉細即為濕痓瘡瘍未合風入為破傷風濕入為破傷濕二者害人最急倉卒不知其㫖甚難認癰疽瘰癧濃潰之後尤宜謹之太陽風痓証候始則發熱腹痛喘息涎流次則牙𦂳頭搖十指微動漸加項背强直轉側不仁甚者昏困失音目睛直視滑泄不禁身腰反張如此則十不救一新産血虚汗出傷風亦作痓証凡産後發熱口苦舌蹇唇急手指㣲動便急作風痓病療之方紫湯方治中風無問男子婦人中風瘠急身痓如弓雞屎二升大豆一升防風三兩切右以水三升先煑防風取三合汁投雞屎二物鐺中熬之令黄赤色用酒二升淋之去滓後用防風汁和分為再服相去如人行六七里衣覆取汗忌風大豆紫湯出指南方治風痓昏迷吐沫抽掣背脊强直産後中痓右用黒豆炒焦好酒淋之取清汁酒一盞獨活剉三錢煎七分温服又連續進劑以瘥為度此湯大能去風消血結如姙娠折傷胎死腹中服此並瘥此歸荆湯獨活酒人為邪氣所干則發而為病若氣若血若痰若水若風若寒若暑若濕腑臟表裏冷熱虚實各有受病之處用藥之法必究其原而後可以起病否則前賢所謂獵不知兔廣絡原野兾一人獲之術亦踈耳是可以人試伎乎哉一方用羌活得汗則愈歸荆湯出指南方治風痓昏迷吐沫抽掣背脊强直産後中痓通用當歸荆芥穗各等分右為末每服二錢水一盞酒少許煎七分灌下如牙關𦂳用銅匙斡開以雞羽蘸藥入口或用童尿調下或以芎藭代當歸亦妙風角弓反張論夫風角弓反張之状腰背反折不能俛也由風邪客於諸陽之經邪正相搏風氣勝則筋脉縮急腰背反折如弓之形也方天麻丸一名朱附丸出聖恵方治中風角弓反張口噤不語四肢拘急并腎臟風毒攻注手足頑麻一切急風天麻白附子炮製附子炮製去皮臍牛膝去苖白殭蠶㣲炒羌活槐膠羚羊角屑防風去蘆頭各一兩天南星炮製蟬殻硃砂細研各半兩膩粉麝香細研各一分乾蝎㣲炒半兩白花蛇酒浸去皮骨炙令㣲黄二兩右為末入研了藥令勻鍊蜜和搗三二百杵如雞頭實大每服以生薑汁薄荷汁各少許入熱酒二合相和研下一丸不計時候頻服一方無薄荷汁犀角散出聖恵方治中風角弓反張心神煩亂口噤不語犀角屑麻黄去根節羌活附子炮製去皮臍杏仁湯浸去皮尖雙仁麩炒各一兩防風去蘆頭桂心白术人參去蘆頭芎藭白茯苓細辛當歸各三分石膏二兩甘草炙㣲赤剉半兩右𢷬羅為散每服四錢以水一中盞入生薑半分煎至五分去滓入竹瀝一合更煎一兩沸不計時候温服龍腦丸出聖恵方治角弓中風身如角弓反張不語昏悶龍腦細研一錢麝香細研蟬殻牛黄研入各一分乾蝎㣲炒天南星炮製硃砂細研阿膠搗碎炒令黄燥香墨白附子炮製防風去蘆頭羚羊角屑肉桂去皺皮羌活各半兩烏蛇肉酒浸炙令㣲黄三分右為末入研了藥令勻鍊蜜和𢷬三五百杵丸如菉豆大每服不計時候以温酒研下十丸麻黄散出聖恵方治卒中風身如角弓反張口噤不語麻黄去根節石膏各三兩防風去蘆頭羚羊角屑獨活五味子前胡去蘆頭桂心附子炮製去皮臍人參去蘆頭芎藭當歸甘草炙㣲赤剉杏仁湯浸去皮尖雙仁麩炒㣲黄各一兩右𢷬羅為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候温服枸杞浸酒出聖劑總録治中風身如角弓反張及婦人一切血風上攻下注若久服悦澤顔色滋潤皮膚退風益氣强力枸杞子晩蠶沙炒各半惡實炒蒼耳子炒各一升防風去义大麻子炒各二升茄子根二斤洗令净細切蒸復時須是九月九日採牛膝酒浸細切惡實根切炒各一斤桔梗剉炒羌活去蘆頭秦艽去苖土剉石菖蒲九節者剉各二兩右以夾絹袋盛用好法酒三斗浸宻封閉勿令通氣七日方開開時不得面對瓶口每服一盞温空心食前臨卧服常令有酒容久病風痙不過一月瘥薏苡仁散出聖恵方治中風身如角弓反張心胸滿悶薏苡仁芎藭桂心各一兩當歸細辛前胡去蘆頭羌活茵芋生地黄萆薢羚羊角屑各三分甘草炙㣲赤剉半兩右𢷬羅為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服天雄散出聖恵方治中風身如角弓反張口噤者天雄炮製去皮臍獨活羚羊角屑白蘚皮防風去蘆頭躑躅花酒拌㣲炒麻黄去根節芎藭酸棗仁㣲炒桂心各一兩牛黄研入一分川烏頭炮製去皮臍半兩右𢷬羅為散入研了藥令匀每服不計時候以温酒調下二錢服以汗出為度麻黄飲出聖劑總録治中風身如角弓反張四肢不随煩亂口噤麻黄去根節湯掠去沫焙乾三兩防風去义桂去粗皮白术人參芎藭當歸焙甘草炙剉乾薑炮各二兩附子炮製去皮臍一兩杏仁湯浸去皮尖雙仁麩炒三十枚右剉如麻豆每服五錢七水一盞半煎取一盞去滓温服不拘時候小􅀈蜜湯出聖恵方治惡風角弓反張飛尸入腹絞痛悶絶徃來有時筋急少隂傷寒口噤不利大黄二兩雄黄青羊脂各一兩當歸乾薑桂心乾地黄芍藥甘草細辛各四兩吴茱茰三兩右㕮咀以水二斗煑取六升分六服重者加藥用水三斗煮取九升分十服羚羊角散出聖恵方治中風身如角弓反張筋脉拘急疼痛羚羊角屑一兩肉桂去粗皮一兩半細辛半兩赤茯苓芎藭當歸酸棗仁㣲炒防風去蘆頭各三分羌活茵芋丹參各一兩右𢷬羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服葳靈仙散出聖恵方治中風身如角弓反張言語蹇澁心神煩亂葳靈仙二兩獨活羚羊角屑麥門冬去心焙桂心赤茯苓防風去蘆頭細辛麻黄去根節五加皮薏苡仁各一兩右𢷬羅為散每服四錢以水一中盞入生薑半分煎至五分去滓入淡竹瀝一合更煎一