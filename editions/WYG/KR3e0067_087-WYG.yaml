body:
  text: 普濟方卷八十八明周王朱橚撰諸風門中風活命金丹衛生寳鑑治中風不語半身不遂肢節頑痺痰涎上潮咽嗌不利飲食不下牙闗𦂳噤及解一切藥毒酒毒發熱腹脹大小便不利胷膈痞滿上實下虛氣閉靣赤汗後餘熱不退勞病諸藥不治無問老㓜男子婦人俱宜服之貫衆甘草板藍根􅀈硝乾薑各一兩一作乾葛龍腦研麝香研青黛各三錢牛黄研生犀研珠子末薄荷各半兩川大黄一兩半辰砂四錢一半入藥一半為衣桂三兩右為末與研藥一處攪勻煉蜜同水浸蒸餅為劑毎兩作十丸别以硃砂為衣就濕真金箔四十片為衣臘月修合磁器收貯多年不壞如療風毒茶清化下解藥毒新冷水化下汗後餘熱勞病及小兒驚熱薄荷湯化下已上並量病大小加減用之大有效一方貫衆不用牛黄鐵粉丹御藥院方治中風痰甚精神昏憒語言蹇澁手足不隨諸藥不效服之神驗牛黄膩粉硃砂麝香生犀木腦子研鉛白霜雄黄各一分南星牛膽製鐵粉川􅀈硝人參各半兩金箔銀箔大者各十片右研細煉蜜和丸如雞頭大毎服二丸以薄荷湯化下紅雪通中散出聖濟總録大青别研一兩硝石五斤煎藥後下丹砂别研半兩桑根白皮一兩羚羊角鎊半兩蘇枋木二兩梔子仁一十五枚槐花一兩升麻一兩半淡竹葉二握訶黎勒十五枚去核大腹㯽榔各五枚剉右别研丹砂大青外餘並粗搗篩用水一斗浸一宿煎至五升去滓入銀石鍋即下硝石丹砂大青不住手攪候沫盡水即成紅雪置磁器中三日取出搗羅為末即用瓷缾盛不得泄氣有皮風疾者即及一切滯悶不通臨服用温水調下二錢匕小兒半錢匕亦治傷寒附子湯出聖濟總録治中風欲死身體緩急目不能開强舌不能語芍藥甘草炙麻黄去根節先煎掠去沬白术各一兩防風去义防己各一兩半附子炮裂去皮臍一枚人參黄芩去黑心桂去粗皮獨活去蘆頭芎藭各一兩天雄炮裂去皮臍一枚右剉如麻豆每服五錢匕水一盞半入生薑半分切煎八分去滓空心日午夜卧各温服如人行五里以熟生薑稀粥投之㣲汗出慎外風五靈脂丸出聖濟總録治中風精神昏昧四肢縱緩言語蹇澀五靈脂别為末附子炮裂去皮臍天麻各五兩白殭蠶生用天南星生用烏頭去皮酒浸烏蛇酒浸去皮骨炙各三兩地龍去土白花蛇酒浸去皮骨炙各五兩白附子生用一兩牛黄龍腦麝香各二錢並細研右為末用醇酒五升以五靈脂末並入細麫一兩同煎成膏與衆藥杵丸如雞頭實大毎服一丸用葱白二寸生薑一寸細剉酒一盞煎臨熟去滓入薄荷汁少許放温磨下神照散出聖濟總録治中風昏塞肢體不收口眼喎僻木香白茯苓芎藭蒺藜子炒去角人參獨活去蘆頭黄耆剉各一兩一分附子炮裂去皮臍遠志去心各三分萆薢茵芋各一兩梔子仁二兩右為末每服一錢匕温酒調下加至二錢三錢匕空心日午夜卧服苦參丸出聖濟總録治中風風熱未退頻服前湯力不能攻更服方見本門風熱類獨活湯出聖濟總録治中風五臟奄忽不能言四肢埀曵皮肉􅍙痺痛癢不知獨活去蘆頭三兩防風去义芎藭白茯苓去黑皮當歸切焙葛根桂去粗皮各二兩細辛去苖葉甘草炙各一兩附子炮裂去皮臍各一兩麻黄去根節先煎掠去沬焙三兩右剉如麻豆每服五錢匕水一盞半生薑五片煎至八分去滓空心日午夜卧温服若初得病自有汗減麻黄宿有滯氣加吳茱萸湯洗七遍炒二兩厚朴去粗皮薑汁炙一兩乾嘔加附子炮裂去皮臍一兩噦加陳橘皮湯浸去白二兩若胷中吸吸少氣加大棗去核十二枚心下驚悸加茯苓去黑皮一兩若熱去生薑加葛根初得風不須加減即依本方服四五日以後更視病虛實或加減鐵粉散出聖濟總録治中風涎潮搐搦口眼喎斜手足垂嚲及破傷風沐風生産後中風等鐵粉研四兩天麻一兩蠍稍炒一分白殭蠶直者炒一兩白附子炮半兩烏頭炮裂去皮骨白花蛇酒浸去皮骨炙各三分桂去粗皮半兩麝香龍腦各一分丹砂一兩三味同研細右以前八味搗羅為末以後三味合研令勻每服一錢匕薄荷汁和酒調下臘茶清亦得如病勢危急研龍腦膩粉薄荷水調服小兒驚風半錢匕防風湯出聖惠方治中風不語兩目不開手足抽掣發歇往來昏塞涎潮防風去义羚羊角鎊赤箭獨活去蘆頭當歸切焙麻黄去根節桂去粗皮杏仁湯浸去皮尖㕠仁麸炒各一兩前胡去蘆頭甘草炙剉秦芁去苖土各半兩右粗搗篩每服四錢匕以水一大盞生薑半分切煎至七分去滓不計時温服人參順氣散一名通氣驅風湯出直指方治男子婦人血氣虚弱虛風攻疰肌體顫掉肩背刺痛手足拳攣口眼喎斜半身不遂頭目旋暈涎痰壅盛語言蹇澁行歩艱難心忪氣短客氣所凑四肢拘急鼻塞頭痛脾胃不和心腹刺痛胷膈不快少力多困精神不爽不思飲食嘔吐惡心霍亂吐瀉胎前産後但是風虛百病皆可治之依法常服調榮衞進食去風通滯氣天台烏藥五兩桔梗去蘆頭白川芷川芎甘草炙陳皮去白白术各二兩半麻黄枳殻去穰麸炒各一兩半乾薑炮七錢半人參去蘆頭半兩右細末每三錢水一盞薑三片棗一箇煎八分食前服傷風鼻塞頭疼葱白薄荷同煎婦人血氣當歸煎一方去白术人參加殭蠶炒去絲嘴各一兩乾薑半兩細末生薑薄荷同煎治風氣不順手足偏枯流注經絡并濕毒進襲腿膝攣痺筋骨疼痛大有功效若用治風去薄荷增棗煎名烏藥順氣散血虛生風氣痺之狀亦類中風世人呼曰中風所謂熱則生風蓋大綱之論其實疼痛癱瘓縱掣攣痺之證因於血氣不流行者為多間有起居不節為賊風所中亦必因虛而得故治風以暖散中通為先通則痰氣不薰蒸風亦自得以攄散小續命湯古今治風良法也但無通氣藥不可獨用復以此藥兼而治之成功必矣一方無乾薑用紫蘇木𤓰湯調末服一方治閃挫身體不能屈伸温酒調下一方治搔癢抓成瘡薄荷煎服一方每料加天麻一兩沉香五錢常服踈風通滯氣調榮衛進飲食加減續命湯一名小續命湯出濟生方治中風不省人事漸覺半身不遂口眼喎斜手足顫掉語言蹇澁肢體痿痺神情昏亂頭目眩重痰涎併多筋脉拘攣不能屈伸骨節煩疼不得轉側亦治脚氣弱緩熱久服之瘥有病風人每遇天色隂晦節候變更宜預常服不可缺以防瘖啞麻黄去根人參黄芩白芍藥川芎甘草防己杏仁去皮尖炒桂各二兩防風一兩半附子炮去皮臍有熱者用白附子以上係正方右剉散每服四錢水一盞半生薑三片棗二枚煎不拘時候温服取汗隨人虛實與所中輕重也筋急拘攣語遲脉弦加薏苡仁治筋急加人參黄芩芍藥以避中寒服後稍輕再加當歸全愈脚氣痺弱不能轉側心神恍惚加茯神遠志骨節煩疼有熱者去附子倍加秦芁煩懆大便澁去附子倍芍藥加竹瀝臟寒大便自利去黄芩加白术附子骨肉疼痛者加肉桂附子煩懆多驚者加犀角嘔逆腹脹人參半夏自汗去麻黄語言蹇澁手足顫掉石膏蒲黄竹瀝大便秘胷中不快枳殻大黄氣塞沉香有痰南星數片發渴麥門冬乾葛𤓰根身疼秦芁上氣浮腫喘急防風桑白皮以上所加各一兩小兒漫驚煎取藥汁一盞入生薑汁再煎一二沸日三服夜二服夏間又有熱者減桂一半春加麻黄一兩夏加黄芩一兩秋加當歸四兩冬加附子半兩風虛加川芎一兩一方加木香縮砂獨活各一兩川烏炮三分亦效牙闗𦂳急用南星末半錢龍腦一匙頻擦牙上令熱即開若便痢産後失血并老人小兒加麻黄桂心甘草各二兩若或歌或哭或笑語無所不及用麻黄三兩人參桂枝白术各二兩無附子生薑防風有當歸一兩自汗出去麻黄杏仁加白术若脚弱加牛膝石膏各一兩若腰疼加桃仁杜仲各半兩若失音加杏仁一兩深師方有白术無杏仁救急方無川芎杏仁延年方無防風葉氏方有羗活川烏當歸無防己外臺方無防己加石膏忌猪肉冷水海藻葱菜一方無棗煎名防己湯此方諸風通治然有感受不同法湏兼服一曰首風因沐頭而感多汗惡風當先風一日而病頭痛不可出至日則少愈用熟附子一箇鹽等分二味為散沐了以此方摩痛上令藥行二曰漏風因醉而感多汗少氣口乾而渴近衣則身熱如火飲食則汗出如浴骨節怠惰用澤㵼白术各一兩為末每服二錢酒飲任下空心名麋啣湯三曰内風房室而成惡風多汗沾衣口乾上瀆不能辛苦身體盡疼生附子人參各半兩茴香茯苓山藥各一分甘草乾薑各三分為散毎用四大錢薑三片少鹽煎食前名附子湯一方中風卒失音濃煎桂末三服效云喉痺用本方麻黄續命湯出拔翠方治中風不審六經之形證加減雖治與不治無異也開則洒然寒閉則熱而悶知暴中風邪宜先以加減續命湯隨證治之中風無汗惡寒麻黄防風杏仁依本方加一倍宜鍼太陽經至隂出血崑崙舉蹻小續命湯出拔萃方中風有三内經曰人之氣以天地之疾風名之故中風者非外來風邪乃本氣病也凡人年逾四旬氣衰者多有此疾壯嵗之際無有也若肥盛則間有之亦形盛氣衰如此治法和臟腑通經絡便是治風然輕重有三中血脉則口眼喎斜亦有賊風襲虛傷之者也中腑則肢廢中臟則性命危急此三者治各不同如中血脉外有六經之形證則從小續命加減及踈風湯治之中腑内有便溺之阻隔宜三化湯或局方中麻仁丸通利外無六經之形證内無便溺之阻隔宜養血通氣大秦芁湯羗活愈風湯治之中臟痰涎昏冐宜至寳丹之類鎮墮若中血脉中腑之病初不宜用龍麝牛黄為麝香治脾入肉牛黄入肝治筋龍腦入腎治骨恐引風入骨髓如油入麫莫之能出又不可以槩用大㦸芫花甘遂㵼大便損其隂血真氣愈虚方列於後治風經驗方麻黄去節人參去蘆黄芩去黑心芍藥甘草炙川芎杏仁麫炒去皮尖防己官桂各一兩防風一兩半蘆頭去附子炮去皮臍細剉半兩右除附子杏仁搗為粗末後入二味令勻每服五錢水一盞半入生薑五片煎至一盞去滓稍熱服一方有熱者加桂枝麻黄各用半兩黄芩加作二兩去附子一本云恍惚者加茯神遠志録驗方有白术不用杏仁救急方無川芎杏仁延年方無防風昔有人久患脚弱服此六七劑乃愈有風疹值天隂節輒合服之可以防瘖瘂附子續命湯出拔萃方治中風無汗身涼附子加一倍乾薑加二兩甘草加三兩宜鍼隠白穴去太隂之賊也此一證太隂經中風也桂枝續命湯出拔萃方治中風有汗惡風桂枝芍藥杏仁依本方加一倍宜鍼風府此二證太陽中風白虎續命湯出拔萃方治中風身熱無汗不惡寒石膏知母一料中各加二兩甘草依本方加二倍葛根續命湯出拔萃方治風中身熱有汗不惡風葛根桂枝黄芩依本方加一倍宜鍼䧟谷刺厲充鍼䧟谷者去陽明之賊也刺厲充者㵼陽明之實也此二證陽明中風也羌活連翹續命湯出拔萃方無此四證六經有繫於少陽厥隂或肢節攣痛或麻木不仁小續命八兩羗活四兩連翹六兩右古之續命混淆無經今立分經治療又分各經鍼刺則無不愈也治去厥隂之井大敦刺以通其經少陽之經絶骨灸以引其熱以此通經引熱是鍼灸同象治法之大體也桂附續命湯治中風有汗無熱甘草桂枝附子依本方加一倍宜鍼太溪此證少隂經中風也續命湯一名西州續命湯治中風入臟四體不自知口不能語昏昧不知痛處或筋脉拘急中外疼痛不得轉側方見本門風痱類大通青金丹出聖濟總録治中風金箔四十九片丹砂别研硫黄研曾青二分螺髻者為上研胡粉鉛丹與曽青末紫石英末胡粉鉛霜再同研雄黄各三分與丹砂同研紫石英研一兩鉛霜研水銀三分與硫黄結砂子研右取一湖南燒藥缾子并蓋用六一泥固臍火熁令乾先下金箔二十片次下砂子同研四味末實按平又下金箔二十片次下曾青同研五味末又按實令平次又下金箔九片始用蓋子六一泥合蓋子只留縫一寸不泥合用火法并再搗羅出火毒及再研法並與前方大通水銀丸同用槐膠濃煮湯去滓停令温入麫煮作稠糊丸如梧桐子大凡中風癱瘓風手足攣急風口靣喎斜風癲癎風狂風邪並用温酒下至五丸七丸空心日午夜卧各一服薏苡仁湯出聖濟總録治中風風勢未退服前湯數日未效萎蕤一兩石膏研二兩半生薑切焙三兩薏苡仁炒一兩半犀角鎊半兩地骨皮人參各一兩麥門冬去心生用半兩烏梅去核二十枚杏仁去皮尖雙仁炒一兩半右粗搗篩每服五錢匕水一盞半煎至八分去滓入竹瀝半合白蜜少許攪令勻温服病若熱多即食前冷服若冷多即食後煖服如服後苦參丸以此湯嚥下麻黄湯出聖濟總録治中風肢體弛緩言語蹇澁精神昏憒麻黄去根節先煎掠出沬焙三兩桂去粗皮半兩獨活去蘆頭三錢羚羊角鎊三分萎􅅋切焙一兩葛根剉三兩防風去义一兩半升麻一兩半石膏碎六兩甘草炙剉三分右粗搗篩每服五錢匕水一盞半煎至八分去滓温服如人行五里再服用熱生薑稀粥投汗出愼外風犀角搜風丸出御藥院方治風下痰解結順氣乾生薑木香各半兩白茯苓去皮車前子木通各一兩青皮去白三兩陳皮去白枳實麸炒去穣各二兩牽牛頭末四兩生犀角一兩半鎊屑右為細末湯浸蒸餅為丸如梧桐子大每服三十丸至五十丸食後温生薑湯下乳香尋痛丸出危氏方治中風癱瘓不遂手足嚲曳口眼喎斜或旋暈僵仆涎潮搐搦卒中急風不省人事每服二十丸黑豆淋酒下風虛眩冐項筋拘急太陽穴疼痛宜用生地黄汁調酒下脚腰疼重行歩艱辛筋脉攣促俛仰不利賊風所中痛如錐刺皮膚頑厚麻痺不仁或血脉不行肌乾瘦生葱酒下或生葱茶亦可風濕脚氣腿膝無力或腫或疼不能舉歩兩脚生瘡膿血浸漬癢痛無時愈而又發温鹽酒下打撲閃肉筋骨損已經多年每遇天寒時發疼發痛没藥酒下乳香川烏沒藥五靈脂白膠香地龍白薑半夏五加皮赤小豆各等分右為末糊丸隨證湯引如前並空心服桂附湯一名解語湯治中風精神冐悶語聲不出方見諸風雜治類神異温風丹治中風一切諸疾麻黄去下節擇浄生用五兩人參白术乾薑炮各三兩茯神附子炮去皮臍白膠香别研甘草炙各一兩乳香别研全蠍炒各一兩右將麻黄細剉用水五升熬去半入蜜六兩又熬成膏入前件藥末和丸如彈子大每服一丸温酒下日三服除濕湯余居士選竒方治一切中風自汗淅淅惡風翕翕發熱呼吸少氣風濕風温表實裏虚或表虛裏實腠理開踈氣道壅塞虛汗目黄身腫小便不利胷膈滿腰疼體痛嘔吐涎沬白术白茯苓蒼术米泔浸藿香葉去土甘草炙橘紅厚朴製半夏各一兩附子六錢炮生薑二兩右厚朴半夏生薑共一處搗作餅子焙乾同衆藥研為粗末每服三錢水一盞薑十片煎至一盞不拘時候服麻黄湯治中風氣逆滿悶短氣麻黄三兩去節甘草二兩炙石膏四兩碎綿褁杏仁五十枚去雙仁及尖皮研碎人參三兩半夏一兩洗乾薑五兩防風茯苓各四兩桂心三兩右㕮咀以水九升煮取三升先食服一升日三服忌海藻生葱羊肉餳菘菜大通水銀丸出聖濟總録治中風水銀鉛丹研丹砂胡粉研鉛霜别研候藥成入雄黄硫黄先以銚子銷鎔熟帛濾水銀入後以栁杖子急攪結沙子搗研細硇砂以水銀硫黄雄黄丹砂同研曾青以上各一兩别研次以曾青鉛丹胡粉同研右先將水銀砂子雄黄丹砂硇砂入湖南瓶子中實築次下曾青鉛丹胡粉實築用蓋子蓋訖使六一泥固濟留縫一寸不泥合火炙令乾先用文火養一日夜後用文武火從午時燒至申時通赤縫中有煙焰藥氣即抽火向後急泥合縫用篩了浄灰蓋窨缾子後至來日冷即開取藥出搗羅下用篩了濕浄沙土攤開上以重抄紙三重襯置藥在上上更以三重抄紙蓋細勻洒濕上以盆合蓋經三日夜每日㣲晒日滿取藥再入鉢與鉛霜一味同研細用爛蒸青州大棗取肉研如膏拌和丸如梧桐子大每服一丸至兩丸用豆淋酒下空心午時夜卧服得汗出慎外風未汗用熱生薑稀粥投汗出即瘥附子補湯出聖濟總録治中風服前湯後服附子炮裂去皮臍石膏碎乾薑炮各一兩半桂去粗皮一兩犀角鎊各二兩地骨皮二兩白术二兩獨活去蘆頭芎藭各二兩右剉如麻豆毎服五錢匕水一盞半入生薑半分切煎至八分去滓空心温服三服後用熱生薑稀粥投以厚衣覆令出汗不止以牡蠣粉粉身覺熱壅即踈服病勢損不必盡劑服此二藥未效宜服薏苡仁湯青金丹出御藥院方治中風不省痰涎壅滯在咽嗌間如拽鋸聲連服三兩丸或吐或利後精神出立省膩粉粉霜各一兩滑石為末水銀鍚結砂子一兩半夏湯洗過生薑汁浸為末三錢青黛二錢腦子麝香各一錢續隨子去皮研一百二十箇右為末同研令勻水丸如榛子大每服三兩丸煎葱白湯下或薄荷湯化亦得大星附湯一名生附㪚出醫方大成中風雖能言口眼喎斜而手足嚲曵脉虛浮而數風中肺也蓋風中肺則口眼喎斜風中腑則肢體廢風中臟則性命危凡風中腑痰涎昏冐牽掣不遂宜以汗解服澹寮方天南星半夏二味切薑汁浸黑附子白附子川烏並生去皮殭蠶人參白茯苓没藥研各等分右㕮咀毎服二錢水酒各一盞煎至七分去滓服并進得汗為愈鹿本薑七片防風湯一名防己湯治證同前方見中風半身不遂類水銀丸出聖濟總録治中風仆地口眼喎斜涎潮語澁手足不遂及非時胷膈痰涎水銀一兩臘茶末半兩青州棗十枚取肉煮右將棗肉同水銀研令星盡然後入臘茶末一處研勻旋滴糯米飲丸如皂子大每服一丸温酒下不計時候磨下防風湯出本事方治中風内虛脚弱語蹇石斛一兩半乾地黄杜仲丹參各一兩一分防風川芎麥門冬桂心川獨活各一兩右為粗末毎服五錢水一大盞半棗二枚同煎八分去滓温服金箔丸出旋舍備要治中風語澁口吐涎頭目昏項强直口眼喎及治痰飲腸鳴清膈利涎踈風壅金箔五十片天南星炮半夏各一兩白附子炮各二兩雄黄研飛半兩牛黄研硃砂研飛半兩人參半兩犀角一分右為末麫糊為丸菉豆大生薑湯下十五丸急病竹瀝下茯苓湯治中風入腹心下如刺不得卧或在脇下轉動無常腹滿短氣惙惙欲死此病或中虛冷或素有宿食食飲不消或素風氣在内今得他邪往干五臟故成此病茯苓二兩芎藭乾薑芍藥白术當歸人參各一兩枳實三分炙甘草炙二兩右細切以水九升煮取三升日三服若病劇者可相去人行五里頃一服胷中有氣可加人參二兩服一劑不瘥不過兩劑忌海藻菘菜桃李雀肉大鮓牛黄丸出聖濟方治中急風涎潮昏塞不省人事口眼喎斜手足嚲曵抽掣麻木筋脉拘急皮膚不仁牛黄别研天南星搗羅為末内牛膽中隠乾者各一兩白附子生用半兩天麻三分天雄炮裂去皮臍一分躑躅花醋拌炒半兩烏頭炮去皮臍一兩犀角二兩右除外搗羅為末拌勻煉蜜為丸如雞頭大每服一丸或二丸温薄荷自然汁化下不計時候羗活湯出聖濟總録治中風身體疼痛四肢緩弱不隨羗活去蘆頭半兩葛根三分甘草炙一分乾熟地黄焙三分桂去粗皮一分芍藥半兩麻黄去根節三分黄耆半兩右剉如麻豆大毎服五錢匕水一盞半煎至八分去滓食後良久温服訖衣被覆取㣲汗為度雄硃丸出和濟方治中風涎潮咽膈作聲目眩不開口眼喎斜手足不遂應是一切風疾並宜服之雄黄研硃砂研龍腦研麝香研各一兩白附子生天南星洗生白殭蠶去絲嘴生烏蛇去皮骨生各半兩右除研外餘皆為末煉蜜為丸如梧桐子大如中風涎潮牙闗不開先用大蒜瓣搗爛塗在兩牙闗外腮上次用豆淋酒化一丸揩牙齒上即開續用薄荷酒化下一兩丸如丈夫風氣婦人血風牙闗𦂳急者只用豆淋酒化藥揩牙齒上即開如頭風目眩暗風眼黑欲倒者急嚼一兩丸薄荷酒下八味順氣散出濟生方治中風亦當間服此藥中氣者尢得其宜白术白茯苓青皮去白香白芷陳皮去白人參各一兩甘草炙半兩天台烏藥一兩右為細末每服三錢水一大盞煎至七分温服不拘時候可加生南木香仍以酒化蘇合香丸兼服蘇沈良方謂蘇合香丸祇用人參湯否則白湯嚼如古方用酒多不效然愚謂恐人之臟腑有不宜酒者古方末間服有風之人先宜服此次進治風藥療風飲子羌活三兩桂心半兩人參一兩蜀升麻茯神防風生薑和皮切生犀角屑各二兩右切以水一大升煮取二大合分温三服如熱下竹瀝一盞忌生葱鮓七寳丸出御藥院方治中風不計緩急涎潮冐悶不知人事丹砂牛黄水銀龍腦膩粉麝香以上各細研各一錢金箔大者二十片與藥同研右再同研令水銀星盡用蒸棗肉丸如梧桐子大病輕者毎服十丸重者二十丸温水化破服利下涎須服和氣藥日後時慢服治風藥治中風涎潮不下精神昏憒不省人事者用薄荷湯磨下雄黄半夏丸出聖濟總録治五臟内虛中風昏冐涎潮氣壅雄黄研飛過一兩丹砂研一兩膩粉研一分麝香研一分半夏湯浸七遍去滑焙三分為末牛黄研一錢天竺黄研一分右研極細用生薑自然汁調麫和丸如梧桐子大毎服一粒食後臨卧生薑湯下如要行風氣空心服二粒甚效銀粉丸出御藥院方治中風痰涎不得下精神昏塞不省人事水銀二兩鍚結沙子另研突中煤牛黄研各半兩麝香另研蠍稍各一兩天南星四兩牛乳拌勻濕炒白附子生薑汁拌勻炒取二兩右除别研外為細末後同研令勻煉蜜和丸如彈子大毎服半丸薄荷湯化下如大便不利薄荷湯調膩粉半錢匕下小兒服量虛實服如豆大一二丸桃溪回陽丹出簡易方治卒暴風中氣中癱瘓手足不遂語言蹇澁口眼喎斜筋脉攣急半身不舉不省人事川烏洗草烏各三兩洗地龍洗五靈脂洗南星洗各一兩腦子麝香各少許右日乾細末蜜丸雞頭子大每服半丸漸加小丸至大丸薑汁磨化温酒先嚼薄荷日午夜卧服癱瘓不能行服三十丸必愈如中風不軟只口眼喎斜服三二丸效紅龍散出三因方治一切中風前開闗竅不致枯廢服此後服治風之藥硃砂别研五靈脂各一兩半全蠍半兩茯神萆薢各一兩腦子别研麝香别研各半錢右為細末毎服二錢酒調或煎荆芥薄荷湯服次服神異温風丹十二味正氣散出朱氏集驗方治風中氣中陳皮厚朴半夏藿香甘草人參二錢半茯苓白术石菖蒲木香遠志薏苡仁各半兩右除人參外餘藥各半兩㕮咀每服三錢水一盞薑三片棗一枚煎八分服通心辰砂丸出旅舎備要治一切風涎潮發以至狂語狀若心風只服此藥方硃砂半兩研龍腦半兩硇砂半兩研明者黄丹炒一錢白芥子㣲炒取末一兩半夏湯洗取末半兩天南星炮取末半兩右研勻麫糊丸如菉豆大更研硃砂為衣每服十五丸同鐵粉牛黄丸共服㗜鼻奪命散出德生堂方治中風不省人事口眼喎斜痰涎塞壅半身偏廢及卒中風癎即隂證傷寒手指青冷諸般眼疾暴發者悉皆治之頑荆葉石菖蒲谷精草東平薄荷各四錢芎藭二錢半藜蘆二錢細辛二錢半右為細末先令患者吃葱茶一盞後噙水在口郤用手捻藥末些小㗜入鼻内如手不可動以葦管吹入即時痰唾涕噴隨時見效如三次吹藥不涕噴其病難治以順氣之藥服之為效分涎散出御藥院方治中風涎潮作聲不得出口噤手足搐搦方見急風類薏苡仁湯出聖濟總録治中風肢體緩縱精神恍惚言語蹇澁薏苡仁炒五兩萎蕤切焙三兩犀角鎊二兩茯神去木三兩烏梅去核七枚麥門冬去心焙三合右粗搗篩每服五錢匕水一盞半入生薑半分切煎至八分去滓入竹瀝白蜜各少許再煎三五沸食後日午夜卧各一服附子湯一名附子散出醫方大成治五臟中風挾寒手足不仁口面喎斜昏暈失音眼目瞤動牙車𦂳急不能轉動附子炮去皮臍桂心各半兩細辛去苗防風去义人參乾薑炮各六錢右剉為散每服四錢水一盞半薑五片棗一枚煎至七分去滓食前服或為末酒調二錢服亦可青龍湯治中風發三春脉浮短者多㐫大而長可療甘草一兩炙生薑芍藥各二兩大棗二十枚擘麻黄二兩去節桂心七寸右㕮咀以水六升煮取二升半分為兩服初服覆取汗後即止忌海藻菘菜生葱等物三陽湯治中風發三夏脉沉𦂳惡寒不汗而煩當歸一兩生薑二兩甘草炙五分麻黄五兩去節杏仁四十枚去皮尖并雙仁碎為用石膏二兩碎綿褁右㕮咀以水六升煮取半升再服忌海藻菘菜等物扶金湯治中風發三秋脉浮大而洪長葛根三兩獨活二兩附子一兩炮四次石膏二兩碎綿褁右㕮咀以水八升煮取三升服九合日三夜一忌猪肉冷水等物温脾湯治中風發三冬脉浮者芎藭二兩石膏四兩碎綿褁甘草炙四分黄芩三兩杏仁十四枚去皮尖雙仁碎麻黄六分去節蜀椒二分去汗防風四分桂心五分右㕮咀以水八升煮取三升分三服忌海藻菘菜生葱等物五虎湯治中風嚲曳目睛上視牙闗𦂳急涎盛昏塞不省人事出衛生家寳方南星草烏川烏並炮去皮半夏炮七次皂角去皮絃子炙右㕮咀等分毎服三大錢水二盞薑十片煎至八分去滓温服不以時口噤灌下余居士選竒方二草烏川烏並不去皮尖二香三建湯出醫方大成治男子婦人中風虛極言語蹇澁六腑俱㣲舌强不語痰涎並多精神如癡手足偏廢不能舉動此等證候不可攻風止可扶虛天雄去皮生用附子去皮生用川烏生去皮各一兩木香不見火半兩沉香旋磨水入右㕮咀毎服四錢水二盞生薑十片煎至七分去滓温服空心食前勝金丸一名硃砂丸出簡易方治中風忽然昏昏若醉形體昏悶四肢不收涎潮于上膈氣閉不通生薄荷半兩猪牙皂角二兩搥碎水一升二味一處並搗取汁慢熬成膏𤓰蒂末一兩藜蘆末一兩硃砂半而研右將硃砂半兩與二味研勻用膏子搜和丸如龍眼大以餘硃為衣温酒化下一丸甚者二丸以吐為度得吐即省不省者不可治心用方論中風無吐法引金虎碧霞為戒且如卒暴涎生聲如引鋸牙闗𦂳急氣閉不行湯藥不能入命在湏臾執以無吐法可乎但不當用銀粉藥恐損脾壞人四肢爾荆瀝湯出聖濟總録治男初中風四肢不收心神昏憒眼不識人不能言語先服荆瀝竹瀝生葛汁各一升生薑汁三合右和勻去滓瓷器中煎三五沸每服二盞平旦日午晡時夜卧各一服服訖覺四體有異以次更服後防風湯次服防風湯出聖濟總録防風去义麻黄去根節先掠去沫焙各二錢杏仁湯浸去皮尖并雙仁炒芎藭防己人参附子炮裂去皮臍石膏研三両黄芩去黒心桂去粗皮甘草各半兩炙芍藥羚羊角鎊一兩右剉如麻豆毎服五錢匕水一盞半入生薑半分切煎至八分去滓更入竹瀝葛汁各少許再煎三五沸温服日二夜一覺減損更服後防己竹瀝湯次服防己竹瀝湯出聖總録防己剉一兩防風去义升麻麻黄去根節先煎掠去沫焙桂去粗皮芎藭獨活去蘆頭羚羊角鎊各三兩一方無獨活右粗搗篩每服五錢匕水一盞半煎至八分去滓更入竹瀝一合再煎三五沸温服日二夜一手足逆冷加生薑三兩白术二兩風若未除更服後防風獨活湯次服防風獨活湯出聖濟總録防風去义獨活去蘆頭秦芁去苗土黄耆芍藥人参茯神去木白术剉炒芎藭山茱萸薯蕷天門冬去心焙桂去粗皮羚羊角鎊升麻麥門冬去心焙各一兩甘草炙丹参五加皮厚朴去粗皮生薑汁炙石斛去根地骨皮逺志去心各四兩陳橘皮湯浸十一日焙附子炮裂去皮臍麻黄去根節煎掠去沫焙各三兩石膏碎六兩乾菊花半開者一开㣲炒薏苡仁一升牛膝去苗酒浸切焙熟乾地黄焙六兩右剉如麻豆每服五錢匕水一盞半入生薑半分切煎至八分去滓空心日午夜卧各温服如覺心膈虗煩滿悶氣喘面赤即與前四味荆瀝湯相間服佳又用竹根竹葉細切煮濃汁去滓代水煎防風湯尢良一方治偏風半身不隨肌肉偏枯者加防己二兩可再服本類荆瀝湯小竹瀝湯出醫方大成治中風涎潮言語昏塞四肢緩縱不収秦芁去苗上剉防風去蘆頭附子炮去皮臍獨活剉各一分右水四盞煎二盞入生地黄汁竹瀝合半盞煎三五沸去滓分四服不拘時熱服病去以他藥扶持未知再作羌活湯出仁存方治中風眩暈惡風自汗或身體不仁兼濕身體疼煩掣痛不可屈伸或身㣲腫羌活附子炮白术甘草右等分每服四錢水一盞半薑五片煎至八分去滓温服不拘時雄附醒風湯出醫方大成治中風涎潮牙關𦂳急不省人事附子一箇天雄一箇各一兩蠍稍半兩南星一箇一兩重與雄附並生用去皮臍右㕮咀每服五錢水一盞薑七片煎七分不拘時三化湯出㧞萃方治中風外有六經之形證先以加减續命隨證治之内有便溺之阻隔復以三化湯導之厚朴薑製大黄枳實羌活右剉如麻豆大每服三兩水三升煎至一升半終日服之以㣲利為度無時法曰四肢不舉俗曰癱緩故經所謂太過則令人四肢不舉又曰土太過則敦阜阜髙也敦厚也既厚而又高則令除去此真所謂膏梁之疾非肝腎經虛何以明之經所謂三陽三隂發病為偏枯痿易四肢不舉王注曰三隂不足則發偏枯三陽有餘則為痿易易謂變易常用而痿弱無力也其治則㵼令氣弱陽衰土平而愈或三化湯調胃承氣湯選而用之若脾虛則不用也經所謂土不及則卑䧟卑下也䧟坑也故脾病四肢不用四肢皆稟氣於胃而不能至經必因於脾乃不得稟受也今脾不能與胃行其津液四肢不得稟水糓氣日以衰脉道不利筋骨肌肉皆無氣以行故不用焉其治可補十全散加减四物去邪留正桂枝湯治中風身體煩疼惡寒而自汗出頭强痛急桂心五兩生薑八兩甘草二兩炙葛根八兩芍藥三兩大棗十二枚擘右切以水七升煮取二升半服八合日三温服取汁忌生葱海藻菘菜普濟方卷八十八
