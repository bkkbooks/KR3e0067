焙乾三四錢右為細末每用半字於鼻内吹上日一度併吹三日如不愈後用黃芩末煎湯下五錢諸黃附論論曰諸黃病者一身盡痛發熱靣色潤黄七八日後壮熱口裏有血當下如豬肝状其人小腹滿若其人眼睛澁痛鼻骨痛兩膞及項强腰背急即是患黄也黄病多大便澁但令小便快即不慮死不令大便多澁澁即心脹不安此由寒濕在表則熱搐於肝胃腠理不開瘀熱與宿榖相搏煩欎不得消則大小便不通故身體靣目皆變黄色凡黄病其寸口近掌無脉口鼻氣冷並不可治方白鮮皮㪚聖濟總録治諸黄皮肉如金色小便赤黒口乾煩渇白鮮皮二兩黄連去鬚土𤓰根芍藥大青梔子仁茵陳蒿栝蔞根柴胡去苗各一兩五錢芒硝三兩五錢研黄芩去黒心一兩真珠三十枚焼赤研大黃三兩右為㪚每服三錢匕煎茅根汁調下空心頓服取利至晚不利冄服服了以小葱豉粥投之無忌紫金丸危氏方治積黃理脾胃退黃針砂醋煮通紅紫荆皮酒浸香附子炒三稜醋浸一宿煮蒼术米泔浸青皮去皮陳皮去白厚朴薑製􅒦砂各一兩右為末醋糊和丸每服三十丸酒椒湯下熟水下亦可苦參方千金方治人無故忽然振寒皮膚麯塵出小便赤澁大便時秘氣力無異飲食不妨諸藥湯不除因為乆黄苦參黄連𤓰蒂黄栢去皮大黄蒸各一分葶藶炒五錢右為末每服一大錢米飲調服當吐下隨時消息加减一方用黄芩茵陳蒿丸聖濟總録治一切黄病茵陳蒿四兩大黃剉黃芩去黒心梔子仁各三兩右生用為末煉蜜和丸如梧子大每服二十丸米飲下日二服量病與之小便金色身皮皆黃並治之豬膏髪煎聖惠方治諸黃豬膏八兩亂髪如雞子大三塊右和膏中煎之髪消藥成分冄服病從小便出一方不計時候温水調下半雞子殻治黃病多效本草用酸浆根搗汁飲之治黃病身作金色本草用煮稻穰汁浸之一方服之又稻榖芒炒令黃細研作末酒服之治五種黃病女子白沃漏下止血飬精保血脉嗜食生筋力去伏熱本草用芹菜作虀葅及煮食之治熱黃結實不通少頃當瀉一切惡物沙石草髪並出不利小便本草用蔓菁子水和服治黃病潤心肺用生王𤓰子治發黃方千金方大黃茵陳黃蘖梔子仁各三兩黃連二兩右㕮咀以水九升煮取三升分三服先服湯後服丸又丸方千金方大黃五兩茵陳梔子各三兩黃蘖黃連黃芩各二兩右為末以蜜丸如梧子大白飲服二十丸令微利茵陳丸千金方治氣淋臚脹腹大身體靣目悉黃及酒疸短氣不得息茵陳天門冬梔子各四兩大黃桂各三兩通草石膏各二兩半夏半升右蒸大黃天門冬通草半夏梔子曝令乾合搗篩蜜丸如豆大服三丸日三忌生魚以豆羹服不得用酒一方去石膏内滑石二兩不知加至十丸治發黃身靣目悉黃如金色小便如濃蘖汁衆醫不能療者千金方茵陳梔子各四兩黃芩大黃柴胡升麻各三兩龍膽二兩右㕮咀以水八升煮取二升七合分三服若身體羸去大黄加梔子仁五六兩生地黃一升延生秘録無茵陳有梔子四兩栝蔞三兩芒硝二兩近效方有枳實二兩夫發黃色乆變作桃皮色心下有堅嘔逆不下飲食小便極赤色少四肢逆冷脉深沉極㣲細遲者不宜服此方得下必變呃也宜與大茵陳湯除大黄與生地黄五兩服湯盡消息㸔脉小浮出形小見不甚沉㣲便可治也脉浮見者黄當明不復作桃皮色心小自寛也大茵陳湯治内實熱盛發黄如金色脉浮大滑實𦂳數者夫發黃多是酒客勞熱或温毒内熱者故黃如金色也茵陳黄蘖各一兩五錢大黄三兩黄芩白术各一兩甘草茯苓栝蔞根前胡枳實各二兩梔子二十枚右㕮咀以水九升煮取三升分三服得快下消息三四日更治之療黄心煩熱口乾皮肉皆黃肘後方秦芁一錢二分牛乳一大升右同煮七合去滓分温服冄服痊治一切發黃方朱氏集騐方山茵陳川棟子麥門冬山梔子甘草右等分以燈心煎服不拘時候破黃七神丹華陀中藏經方朴硝二觔硃砂五兩大黄七兩濕紙包煨梔子二兩䜴半升以絹袋盛甘遂二兩膩粉一兩右以水二㪷熬令盡除甘遂豉梔子大黃只取朴硝硃砂粉末糊丸如彈子大每服一丸水下以吐瀉為度棗礬丸治食勞黃目黃身黃者用皂礬不拘多少砂鍋内木炭焼通紅赤米醋内㸃之赤紅為細末棗肉為丸如梧子大每服二十三十丸食後生薑湯下去目黃好睡本草用葈耳葉挼安舌下令涎出治患熱黃本草用扁蓄搗汁頓服一升重者冄服治熱黃及心痛本草以白蒿生搗汁飲之治黃本草以髪髲焼灰水服一寸匕日三治五種黃病本草用翹揺生搗汁服一升日二瘥甚益人黃汗附論論曰黃汗者汗出如蘖汁沾衣黃色故謂之黃汗由脾胃有濕瘀熱伏留熏發肌肉㪚而為汗其證使人身體虗浮骨節疼痛發熱汗出而不渇者是也方黃耆湯聖惠方治黃汗身體腫發熱不渇狀如風水汗出染衣黃耆去蘆蜜炙赤芍藥茵陳蒿各二兩石膏四兩淡䜴一兩麥門冬去心一兩炙甘草五錢右㕮咀每服四錢水一盞生薑五片煎至七分去滓食前服一方入竹葉十四片不用生薑一方無甘草吳籃湯聖濟方治黃汗身體發黃汗出而不渇状如風水汗出着衣皆黃呉籃芍藥麥門冬去心桑根白皮剉防己白鮮皮山梔子各一兩五錢右剉如麻豆每服三錢匕水一盞煎至八分去滓空心温服未效再服茵陳蒿湯聖惠方治黃汗身體熱不退大小便不利茵陳蒿赤芍藥炙甘草剉木通剉赤茯苓去黒皮黃耆各一兩大黃炒二兩右剉如麻豆每服五錢匕水一盞半煎至八分去滓温服如人走十里再服以大小便通利為度桂枝黃耆湯治黃汗自出發熱身腫小便不利白芍藥一兩五錢辣桂一兩甘草炙一兩黃芩五錢黃耆炙二兩右剉㪚每服四錢水一盞半薑五片棗三枚煎服覆取㣲汗未汗冄服桂枝加黃耆湯千金方治黃汗病兩脛自冷假令發黃此属􅊗節食已則汗出又身常夜卧盗汗出者此勞氣也若汗出即發熱者乆乆身必甲錯也發熱不止者必生惡瘡也若身重汗出已輒輕者乆乆必身瞤瞤則胷中痛又從腰已上必汗出下無汗腰寛弛如虫在皮中狀劇者不能食身疼重煩躁小便不利者名曰黃汗桂枝湯加黃耆五兩主之桂去粗皮白芍藥各三兩甘草炙三兩黃耆五兩右剉如麻豆每服五錢匕水一盞半入生薑半分棗二枚擘破同煎取七分去滓温服覆取微汗湏㬰不汗者食稀熱粥助湯力未汗冄服直指方有黃芩名桂枝黄耆湯甘草湯聖惠方治脾臓瘀熱不㪚心神煩亂小便赤澁或汗出如蘖汁甘草㣲炙梔子仁黃蘖白术各一兩右為㪚每服四錢以水一盞煎至六分去滓温服日四五服黃耆苦酒方千金方治黃汗身體腫發熱汗出而不渇狀如風水汗水沾衣色黃如蘖汁脉自沉此由汗出入水中浴水入汗孔從外而得之黃耆五兩芍藥桂去皮各三兩右剉如麻豆每服五錢匕苦酒一盞半煎至七分去滓温服服之當心煩苦酒阻故也一方用苦酒三合水一盞半同煎梔子丸聖惠方治黃汗體熱大小便不利梔子仁括蔞剉炒苦參各一兩右為末醋漬雞子全用二枚丸如梧桐子每服三十丸温水下日四五服一方除熱不吐下即自消也治黃汗汗出如蘖汁沾衣身體虗浮用蔓菁子二兩毎服二錢匕井花水調下空心日三三服以知為度急黃附論論曰諸發熱心戰定必發為急黃謂其卒然發黃心滿氣喘命在湏㬰故名急黃也有初得病即身體靣目發黃者有初不知是黄死後變黄者但先辨其證當急治之此由脾胃有蓄熱榖氣欎蒸因熱毒所加故有斯疾方龍膽湯聖惠方治急黃靣目如金色渇欲飲水龍膽一兩木通剉土𤓰根各一兩五錢石膏二兩碎犀角屑一兩梔子仁五錢大黃剉炒一兩五錢白茅根剉朴硝各一兩右粗㪚每服三錢匕用水一盞煎至七分食後温服白鮮皮㪚聖惠方治急黄頭目四肢煩熱疼痛小便赤大便難心躁不得睡白鮮皮升麻各五錢朴硝二兩茵陳一兩黄芩五錢梔子仁大青葛根各五錢大黃炒二兩右為㪚毎服以新汲水調服三錢湏㬰當利三兩行如人行十里未利再服茵陳湯聖惠方治急黃目如梔子色小便赤心煩悶茵陳蒿梔子仁黃芩去黒心大黃剉炒白鮮皮黃連去鬚各一兩朴硝貝齒煆各五錢右除朴硝外粗搗篩毎服五錢匕水一盞半煎至一盞去滓入朴硝末一錢冄煎令沸食後温服犀角湯治急黃熱毒攻發舌急眼黃犀角屑三分茵陳蒿梔子仁升麻各五錢黃芩去心三分大黃炒一兩朴硝研一兩五錢甘草五錢右為㪚每服五錢水一盞半入竹葉四五片同煎至一盞食後温服赤小豆㪚聖惠方治急黃煩熱口乾皮肉悉黃赤小豆一合丁香秫米一勺𤓰蒂薫陸香另研各一分青布五寸燒灰研麝香另研一分右各硏㪚和匀每服一錢匕米飲調下食後服當吐下黄水即瘥一方少許吹鼻中犀解㪚治急黃心膈煩躁目赤痛犀角屑黃芩升麻梔子仁各一兩茵陳朴硝各二兩右為㪚每服四錢以水一盞入竹葉三七片煎至六分去滓不拘時候温服升麻湯聖濟總録治急黃靣目如金色煩渇飲水升麻三分秦芁去苗土一兩凝水石硏一兩五錢括蔞根三分朴硝三分右粗㪚每服三錢匕用水一盞煎至七分去滓食後温服日三丁香㪚聖惠方治急黃宜服吐之丁香𤓰蒂赤小豆各七粒右為㪚以雞子一枚相和用新汲水調服之當吐利即效未應再服麥門冬飲子吐訖及炙了計即渇仍服麥門冬去心四兩括蔞三兩竹葉一升茯苓四兩升麻二兩生蘆根一升甘草炙一兩右切以水七升煎取二升五合絞去滓分温三服服後相去如人行八九里乆服此飲渇即止黒豆煎治急黃心膈煩躁徧身悉黃黒豆一升生地黄汁麥門冬生藕汁各二兩酥五錢右先用水五盞煎黒豆至二盞去豆取汁再煎一盞然後下蜜生地黃麥門冬生藕等汁并酥相和慢火煎成膏磁器盛候冷每服半匙或一匙食後含化日三服𤓰豆㪚治急黃心上堅硬渇欲飲水氣息喘粗眼黄𤓰蒂二合熬赤小豆二合為末煖浆水五合右服方寸匕一炊乆當吐不吐再服五分匕若吹鼻中兩三黒豆許黃水出歇芒硝㪚千金方治急黃熱氣骨蒸兩目赤腫生地黄汁八合芒硝一兩大黄一兩五錢右每用二服五合日二以利為度不湏二服熱甚方可用大黃㪚治急黃兼治氣痛黄大黃芒硝各二兩以水三升半漬一宿平旦煎絞汁一升半納芒硝二兩絞服之湏㬰當快利雞子方聖惠方治急黄及心黄狂走煩躁不解生雞子二枚去黄用白朴硝五錢細硏右相和熟調頓服之效治急黃小便赤黒口乾煩躁聖惠方用蔓菁子取油不計時候頓服如無油即以蔓菁子搗汁絞取一盞服之候顔色黃或精神憊用之有效未效再服治暴熱身黃秘塞用苦菜煮汁服之治急黃欲死本草用雄雀屎兩枚細硏調水温服之治五般急黃本草用山豆根末空心以水調下二錢治心急黃本草用百合蒸過蜜和食之作粉尤佳紅花者名山丹不堪食黃蒸湯黃蒸麥麴猪屎各一升以水五升漬一宿煮取三升絞去滓頓服一升治急黃本草取苦瓠一枚開口以水煮中攪取汁滴鼻中治急黃黃疸及内黃腹結不通本草用蕪菁搗為末水絞汁服當得嚏鼻中出黃水及下利治卒患急黃熱盛欲死者本草於沙土中掘坎斜埋患人令頭出土上灌之乆乃出曾試有效當是土能收攝熱也陰黃附論論曰陰黃者靣色黃頭痛不發熱不欲聞人聲此由陽伏於陰邪熱沉潛㪚於肌肉身黃如橘故謂之陰黃昔人有説下之後謂身目發黄者當於寒濕中求之此其類也方茵陳㪚治陰黃身體靣目俱黃小便如䜴汁色茵陳白鮮皮黃芩栝蔞根梔子仁赤芍藥木香各一兩枳殻一兩去白炒黄柴胡去苗黃連去鬚朴硝土𤓰根茅根大黃炒各二兩大青一兩右為㪚每服五錢水一大盞入䜴五十粒煎至五分去滓温服如人行十里再服以利一二行為度便煮稀葱䜴粥食之忌猪肉冷水魚蒜粘膩及熱食一方以茅根煮飲待冷空腹以茅根飲服一方有紫雪無朴硝秦艽丸聖惠方治陰黃身靣悉黃大便澁小便如梔子汁秦艽去苗梔子仁茵陳梹榔各一兩啇陸一分陳皮湯浸去白甜葶藶隔紙炒令紫色各一兩右為末煉蜜丸如梧子大每服二十丸温水下日三茵陳㪚聖濟總録治陰黃身如橘色小便不利茵陳二兩桂去皮五錢澤瀉一兩赤茯苓去皮白术猪苓去皮各三分右為㪚每服二錢匕温水調下日三服大黄散聖惠方治陰黃小便不利靣赤身汗出者表和裏實也宜下之大黃炒黃蘖梔子仁甘草炙木通各一兩朴硝二兩右為散每服四錢水一盞煎至六分温服如人行十里再服以利為度赤小豆散聖惠方治陰黃赤小豆丁香各三七粒麝香一錢硏𤓰蒂二七枚青布灰二錢右為㪚每服一錢匕熟水調下日二服以吐為度更取少許吹鼻中即有黃水出為效半夏湯聖恵方治陰黃小便色不變欲自利腹滿而喘者宜服下人參去蘆頭葛根各二兩半夏一兩湯泡洗七次去滑焙右剉如麻豆每服四錢匕水一盞生薑半分切煎取七分去滓不拘時候温服秦艽湯一名秦艽㪚聖惠方治陰黃不欲聞人言小便不利秦芁去土一兩旋覆花赤茯苓去皮甘草炙各五錢右為粗末每服四錢匕以牛乳一盞煎至六分去滓温服不計時候龍膽湯聖惠總録治陰黃龍膽秦芁去苗各一兩五錢升麻一兩右為粗末每服五錢匕水一盞半浸藥一宿平旦煎至八分入黃牛乳五合再煎至一盞去滓空心分温服日二服再取利為度治陰黃汗染衣涕唾黃肘後方用蔓菁子搗末平旦以井花水服一匙日加至兩匙以知為度每夜小便中浸少許帛子各書記日色漸退白則瘥不過服五升以來治陰黃眼黃汗染衣涕唾黃聖惠方用大黃五兩飯下蒸一炊取出曝乾為散以温水調下日三四服常要大小便利為度又方用好黄蒸二大升毎夜以水二大升浸㣲暖令熱勿令沸銅器中平旦絞取汁半升飲之餘汁湏飲則飲冬日微煖服夏日冷服每夜則浸依前服之亦得每夜小便中浸帛片取色退為騐忌麵猪羊魚等肉療因将息傷熱變成隂黃通身壯熱小便黃赤眼如金色靣又青黒心頭氣痛遶心如刺頭旋欲倒兼肋下有瘕氣及黃疸等經用有騐本草用麗春草以春三月採花隂乾有前病者取花一升搗為散每平朝空腹取三方寸匕生麻油一盞頓服之日惟一服隔五日再進以知為度治陰黃黃疸及暴急黃本草𤓰蒂丁香各七枚小豆七粒右為末黒豆許吹於鼻中少時黃水出瘥内黃附論夫内黃者由熱毒之氣在於脾胃與榖氣相摶熱蒸於内不得宣㪚先心腹脹滿氣急然後身靣悉黃名為内黃也方治内黃梔子仁黃芩柴胡升麻栝蔞根大黃炙芒硝各一兩龍膽五錢右為㪚每服四錢水一盞煎至六分去滓不拘時候温服茵陳㪚聖惠方治内黃身靣眼延黃如金色小便如濃蘖汁衆醫不能療茵陳二兩黃芩梔子大黃炒龍膽枳殻去白炒黃秦芁去苗各一兩升麻三兩右為㪚每服四錢水一盞煎至六分去滓不計時候温服三黃散一名三黃丸聖惠方治内黃身體皆黃宜服之大黃炒黃連去鬚黃芩各二兩右為末每服以温水調下二錢一方以蜜為丸不拘時服治内黃用桞枝二兩剉水一盞半煎至六分不拘時候温服又方用大黃一兩剉水一盞煎至六分不拘時候温服又方用黃栝蔞一枚大者以新汲水一盞半浸栝蔞搗絞汁下蜜半合入三分細硏攪令匀分三服頓服之黃病小便下淋澁附論夫黃病小便下淋澁者由積熱在於心臟流於小腸則令小便澁少下物如沙而多疼痛也方木通㪚治心臟黃結靣目四肢通黃乾嘔大便不通小便赤色腹痛心煩木通一兩大黃炒一兩五錢枳殻黄芩各五錢赤芍藥一兩前胡去蘆一兩五錢白术梔子仁各三分甘草㣲炙五錢半夏湯洗七次去􅉸三分右為散每服五錢水一盞生薑半分煎至五分去滓不拘時温服以大小便利為度茅根㪚治心脾熱壅皮肉靣目悉黃煩躁小便赤澁茅根麥門冬去心各二兩秦芁去苗一兩犀角三分大黃一兩五錢黃芩一兩赤芍藥三分朴硝一兩右為㪚每服四錢水一盞至六分温服如人行十里再服以利為度蘧麥㪚治黃病小便赤澁心神煩悶蘧麥茵陳黃芩麥門冬去心各一兩大黃一兩五錢梔子仁二兩右為㪚每服四錢水一盞煎至六分無時服小便利為度大黃㪚治黄病腹脹滿小便赤而澁大黃炒朴硝梔子仁各二兩黃蘖冬葵子各一兩右為㪚每服四錢水一盞煎至六分温服日四五服以利為度茵陳㪚治黃病心下橫堅小便赤黃不利疼痛茵陳木通各一兩赤茯苓前胡各三分椒目炒一分赤芍藥三分右為末每服二錢以粥飲調下日四五服普濟方卷一百九十五
