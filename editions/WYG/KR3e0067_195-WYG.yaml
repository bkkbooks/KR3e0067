body:
  text: 普濟方卷一百九十五明周王朱橚撰黄疸門總論夫五疸者黄汗黄疸榖疸酒疸女勞疸是也黄汗之状身體俱腫汗出而不渇状如風水汗出染衣黄如蘖汁其脉自沉此由脾胃有熱汗出入水浴水入汗孔中故汗黄也黄疸之状食已即飢身體靣目爪甲牙齒及小便悉黄欲安卧或身體多赤多青皆見必發寒熱此由酒食過度臟腑熱急水榖相併積於脾胃復為風濕所搏結滯不㪚熱氣欎蒸所為也大抵發於陰部其人必嘔發於陽部必振寒而發熱榖疸之状食已即頭眩心中怫欎不安而發黄此由大飢大食胃氣衝蒸所致也酒疸之状身目皆黄心中煩痛足脛滿小便黄靣發赤斑此由飲酒多進榖少胃内生熱因大醉當風水入所致也女疸之状身目皆黄發熱惡寒小腹滿急小便不利此由大勞大熱不能保攝房事復入水所致也其間多渇而腹脹者其病難療又有時氣傷風傷寒伏暑意令人發黄五疸口淡怔忡耳鳴脚弱㣲寒發熱小便白濁當作虗証治不可妄投凉劑愈傷血氣臨病之際不可不辨明也五疸雖不同其為黄則一自本自根未有非熱非濕而能致病者也濕氣勝則如薫黄而晦熱氣勝則如橘黄而明盖脾主肌肉土色尚黄濕熱内蒸或重或輕不容掩於外矣自其濕熱瘀而傷血此又為血證發黄何以明之疸証之黄小便不利血証之黄則小便自利耳况夫脾受濕熱欎而不行意多有腹脹之候治法綱領大要䟽導濕熱於大便小便之中人徒見茵陳湯五苓㪚黄連㪚三黄丸等隨試輙效則目之以尋常不思單陽無陰病勢已極疸而不渇猶可用攻疸而復渇其或腹膨全濟者鮮甚則寸口無脉鼻出冷氣與夫形如烟薫垂頭直視為心絶環口䵩黒油汗發黄為脾絶此皆倉扁所望而驚焉者也脾與腎俱病為黒疸疸脉大順弦急而堅逆已食而飢胃熱消榖也黄疸附論論曰内經謂目黄者曰黄疸又曰安卧脉盛謂之黄疸其外証身體靣目及爪甲小便盡黄其内証食已即飢此由酒食過度脾胃有熱復為風濕所搏瘀結不㪚熱氣欎蒸故發是疾若靣色㣲黄身體或青赤黒色皆見者與純熱之証不同當於濕家求之諸黄疸發於陰部其人必嘔發於陽部其人振寒而㣲熱疸而不渇者可治其渇而疸者難治夫黄疸病發熱煩喘胸滿口燥者或因火刼其汗或從濕得熱在裏當下之方茯苓渗濕湯出濟生㧞粹方治黄疸寒熱嘔吐而渇欲飲冷身體靣色黄小便不利不得安卧不思飲食白茯苓五分梔子二分茵陳蒿六分澤瀉三分木猪苓三分生黄芩黄連漢防己白术蒼术陳皮青皮各二分右㕮咀作一服水煎空心服知母湯經濟總録治中熱黄疸寒熱往來脉數煩困四肢勞倦知母焙赤茯苓去黒皮常山茵陳犀鎊黄連去鬚人參羚羊角鎊各一分柴胡鱉甲醋炙去裙襴甘草炙五錢龍膽半分右為㪚别入丹砂末半分合研匀磁合収每服二錢匕食前人参湯調下日再黄連湯聖經總録治黄疸遍身黄靣目皆黄黄連去鬚大青山梔子仁柴胡去苗茵陳蒿地骨皮黄芩去黒心芒硝各一兩大黄二兩細剉醋炒右粗搗篩每服五錢匕水一盞半煎八分去滓不拘時服茵陳湯聖濟總録治黄疸目黄小便如血心煩躁悶口苦頭痛茵陳蒿山梔仁各三分木通一兩炙甘草五分葀蔞根柴胡去苗各一兩麥門冬去心焙一兩五錢右粗搗篩每服五錢匕水二盞入竹葉廿七片同煎至一盞去滓食後温服木通湯治黄疸脾胃積熱皮肉皆黄煩躁口苦小便赤澁木通剉瞿麥各一兩赤茯苓去黒皮白茅根大青秦芁去苗土各三分生亁地黄焙一兩五錢右粗搗篩每服五錢匕水一盞半煎至八分去滓食前温服茵陳㪚聖惠方治黄疸食已即飢身體靣目爪甲牙齒小便悉黄或寒熱身體多赤多青皆由酒食過度為風濕所搏熱氣欎蒸而成茵陳木通梔子仁各一兩大黄炒葀蔞一箇石膏各二兩炙甘草五分右㕮咀毎服四錢水一盞生薑五片葱白一莖煎至八分去滓不拘時候温服大小便秘加枳實赤茯苓葶藶子又有傷寒瘀血不解欎發於表為黄疸其脉浮𦂳當以汗解獨煎麻黄節飲之木香丸治諸般黄疸婦人血氣不和男子諸積皆治之木香三錢皂礬五分百藥煎五分蒸餅八箇去皮捻碎平胃㪚紅棗肉四分針砂一兩醋炒右為末用好醋和蒸餅紅棗肉入前藥為一處丸如梧桐子大每服十五丸姜湯送下日進二服茵陳㪚治黄疸心神煩躁小便赤大便難不得安卧茵陳一兩犀角五錢升麻一兩梔子仁三分甘草三分炙㣲赤黄芩一兩朴硝一兩右為㪚每服四錢水一盞煎六分去滓無時温服大小便利為度雞舌香湯聖濟總録治黄疸靣黄眼如金色四肢羸弱或時煩渇雞舌香秦艽去苗土各二分胡黄連丁香芎藭各五分柴胡去苗一兩右為粗㪚每服三錢匕水一盞煎至六分去滓食前温服山茵陳㪚直指方治黄疸大小便秘澁梔子一兩枳實七枚製赤茯苓葶藶甘草炙各一兩每剉每服三錢薑三片煎服治黄疸夲草以亂髪燒灰水調服一錢匕日三服又方夲草以風延母煮服之土𤓰根㪚聖惠方治黄疸其小便自利白如泔色此状得之因酒過傷宜服土瓜根白石脂桂心蔞根兎絲子酒浸一日暴乾為末牡蠣燒為末各一兩右為末每服煮大麥粥飲調下二錢日三四服加减五苓湯濟生方治飲酒伏暑欎發黄煩渇小便不利赤茯苓去皮猪苓去皮澤瀉白术茵陳各等分一方用桂心無茵陳右㕮咀每服四錢水一盞半煎至八分去滓温服不拘時候一方治黄疸利小便為㪚渇時水服方寸匕極飲水即利小便及汗出愈一清飲危氏方治黄疸發熱諸熱通用柴胡三兩赤茯苓二兩桑白皮製一兩川芎一兩甘草炙五錢右剉碎每服三錢生薑棗子水一盞煎服茵陳丸聖惠摠録治黄疸靣目身體皆黄口乾煩躁發熱狂悶茵陳蒿常山各五錢大黄二分炒朴硝一分研豉一台炒右為末煉蜜和丸如梧桐子大每服二十丸食後煎竹葉湯温送下必效㪚直指方治黄疸通用葶藶子隔紙炒龍膽草山梔子仁山茵陳黄芩各等分右為粗末每服三錢新水煎服茵陳丸聖濟總錄治黄疸身靣悉黄小便如濃梔子汁茵陳二兩黄芩枳殻一兩炒黄去白大黄㣲炒升麻各一兩五錢右為末煉蜜為丸如梧桐子大每服三十丸清粥飲下日三四服大黄硝石湯千金方治黄疸腹滿小便不利靣赤自汗出為表和裡實當下之大黄黄蘗硝石各四兩梔子十五枚擘破右㕮咀水煎去滓納硝石礬石煮一升頓服茵陳湯治黄疸小便赤茵陳山梔仁秦芁升麻各四錢右搗為末每服三錢水一盞煎服柴胡湯聖濟總錄治黄疸通身並黄柴胡去苗茵陳各一兩升麻龍膽各三分右剉碎每服五錢七水一盞半煎至八分去滓入地黄汁一合攪令匀食後温服茵陳丸聖濟總録治黄疸身體靣目皆黄茵陳三分大黄剉炒黄連去鬚黄芩去黒心各一兩右為末煉蜜和丸如梧桐子大每服十五丸食後臨卧温水送下黄連㪚出濟生㧞粹方治黄疸身體靣目皆黄小便秘澁臟腑壅熱黄連去鬚川大黄細剉醋炒各二兩黄芩去黒心甘草炙各一兩右為㪚每服二錢匕食後温水調下日三服治水腫不利小便非其法也故内經云濕氣在上以苦吐之濕氣在下以苦瀉之吐瀉後長服益元㪚加海金砂煎以長流水服之則愈矣大忌脚膝上針刺出水取一時之效後必死矣尤忌房室濕麵酒醋鹽味犯之必死鐵刷湯治黄疸靣目遍身如金色良薑六兩油炒茴香二兩炒甘草八兩五錢蒼术八兩右為細末每服二錢重薑三片鹽少許水一盞煎至七分和滓空心服四七湯治黄疸半夏五錢茯苓四錢紫蘇二錢厚朴三錢右為粗末每服五錢水一盞生薑棗煎至七分去滓無時服治黄疸靣目徧身如金色一名吹鼻㪚出聖恵方𤓰蒂十四箇母丁香一箇黍米四十九粒右先搗𤓰蒂為末次入二味同為細末每用半字夜卧令病人先噙水一口兩鼻内各吹半字吐了水便睡至夜或明日取下黄水旋用熟帛揾了直候取水定便服黄連㪚一方温水調下頓服令盡吐利黄水兩服永除病輕者五日重者半月一方有赤小豆梔子蘗皮湯經騐良方治黄疸頭㣲汗小便利而㣲發黄者濕熱相摶㣲者宜服亦治瘟病發黄黄蘗皮二兩甘草一兩山梔仁十五箇右為粗末毎服五錢水一盞半煎至七分温服不計時候梔子湯聖濟摠録治黄疸心中懊惱煩熱山梔子仁五錢枳殻去白麩炒一分大黄一兩剉炒右為粗末每服三錢匕水一盞入䜴二十粒煎至七分去滓温服不拘時金櫃方用枳實不用枳殻豬苓㪚肘後方治黄疸病及狐惑病豬苓茯苓白术各等分右共為末每服方寸匕水調下赤小豆㪚肘後方治黄疸心膈躁熱小便赤澁赤小豆一百粒秫米一百粒雞糞白一兩㣲炒右為末毎服以新汲水調下一錢日三四服黄汗當出此通治靣目黄即瘥大黄丸聖濟摠録治黄疸靣目飢痩大黄剉一觔芎藭八兩右為末用蜜和成劑甑上炊七遍丸如梧桐子大每服三十丸熟水下空心食前日三服治黄疸本草以麻草一把去節綿褁以美酒五升煮取半升去滓頓服如治傷熱表發亦宜汗之則愈如人行十里汗未出則冄服冬月用酒春宜用水煮之良治黄疸本草以芭蕉子生食之消癉黄本草以鳬茨作粉食之秦椒㪚千金方治黄疸飲少溺多秦椒六銖瓜蒂五錢右治下篩水服方寸匕日三瓜丁㪚本草治黄疸目黄遍身如金色㣲腫五疸汗如黄栢汁𤓰蒂四十九箇六月六日採自然落者用如末用以梹榔葉裹於東墻有風處挂吹令亁丁香四十九粒右用乾鍋子焼烟盡為度細研作末小兒用半字吹鼻内及揩牙大人用一字吹鼻内立瘥一方為末如大豆許納鼻中令病人深吸取鼻中黄水出梔子酒治黄疸梔子茵陳各一束右以無灰酒二大碗煎至八分三更時分服之忌油膩濕麵豆腐生冷等物柴胡湯出直指方柴胡去苗五錢甘草炙一分右剉以水一碗白茅根一握同煎至七分去滓温服葶藶丸一名大黄丸千金方治黄疸大小便難喘急促甜葶藶炒二兩大黄炒一兩右為末煉蜜和丸如梧桐子大每服二十丸温米飲下食後臨卧服喘慢即藥止治黄疸心膈燥熱小便赤澁聖惠方茅根三把細剉豬肉八兩細切右以水三大盞煎茅根至二盞去滓入肉合作羹盡一服愈茵陳五苓㪚出濟生㧞粹方治黄疸茵陳蒿末一錢五苓㪚五分同煎右和食前服方寸匕日三治黄疸身眼黄如金色危氏方用東引桃根切細如筯若釵股者以下一握以水一大升煎取適温空腹頓服後三日其黄離離如薄雲㪚聚百日方平復可時飲一盞清酒飲之則眼中易㪚不飲則㪚遲忌食麵豬魚等肉採桃根之時不可使婦人雞犬見修製此是徐之才家秘方治黄疸經騐良方用自死大螺焼灰存性平胃㪚各等分無灰酒煎茵陳湯調服不能飯煎湯調服解熱方直指方治黄疸解諸熱淋用生車前草研極細井水調下一方炒子為末米飲調下立止洞瀉治寒熱黄疸濕瘴本草取端午日南行猪苓合大丹是也治黄疸百藥不瘥本草用驢頭一枚煮熟以薑虀噉之并隨多少飲汁即效療男子女人黄疸病耳目悉黄飲食不消胃中脹熱生黄衣在胃中此腸間有燥糞使病宜服聖惠方用煎煉猪脂五兩每服炒大半匙以葱白湯調服頻頻服之以通利為度一方無葱白止用猪脂温熱服之燥屎下愈治黄疸并利小腸作虀喫甚益顔色毒氣欎蒸面目盡黄寒熱發渇聖惠方用小麥苗杵絞汁飲六七合盡飲之三四日便愈大麥苗亦可服六七合日三四此酒疸也治黄疸皮膚眼睛如金色小便赤肘後方用生蔓菁子末熟水下方寸匕日三先後十日愈治患疸黄聖惠方用苜蓿根生搗絞汁服之良治黄疸肘後方用栁枝以水一斗煮取濃汁半升服令盡治大熱黄疸傷寒頭痛身熱瘴瘧利小便聖惠方用茵陳細切煮