參黄耆剉酸棗仁㣲炒各半兩白茯苓去黑皮三分甘草一分炙右粗搗篩每服四錢匕水一盞入生薑半分棗二枚擘破煎至六分去滓温服日三服大補中當歸湯出千金方治産後虛損不足腹中拘急或溺血少腹苦痛或從髙墮下傷犯於内兼治金瘡血多肉傷然男子有證亦宜服之當歸續斷桂心芎藭乾薑麥門冬各三兩芍藥四兩白芷二兩甘草二兩吳茱茰一升乾地黄六兩大棗四十枚右㕮咀以酒一斗漬藥一宿明旦以水一斗合煮取五升去滓分五服日三夜二入黄耆一兩益佳人參散出聖惠方治産後虛羸腑臟氣乏食飲不進宜服人參一兩去蘆頭當歸半兩剉微炒五味子黄耆剉芎藭桂心續斷白茯苓各三分熟乾地黄一兩白术半兩麥門冬半兩去心甘草一分炙微赤剉右為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓温服日三服羊肉當歸湯出聖惠方治産後虛羸乏弱無力喘急汗出腹中㽲痛不可忍肥羊肉二斤當歸白芍藥各半兩桂心附子炮川芎黄耆人參龍骨白术各三分熟地黄一兩右為粗末先以水五大升煮羊肉取汁二大盞每服四錢汁一中盞薑三片棗一枚煎至七分去滓温服日三服當歸湯治産後虚羸不足臟腑虛冷肢體疼痛時或血露臍腹刺痛當歸切焙兩半芍藥吳茱茰湯淘去涎輕炒各二兩甘草炙令赤一兩麥門冬去心焙一兩生乾地黄焙三兩白芷一兩桂去粗皮續斷芎藭乾薑炮裂各一兩半右粗搗篩每服三錢匕水一盞煎至七分去滓温服食前日二夜一羊肉黄耆湯出千金方治産後虛羸四肢瘦弱不能飲食羊肉五斤黄耆一兩半剉白茯苓一兩白芍藥一兩當歸一兩半剉㣲炒續斷五味子萆薢剉桂心熟乾地黄各一兩麥門冬一兩半去心焙右為散用水一斗煮羊肉取汁五升每服用肉汁一中盞藥末四錢棗三枚生薑半分煎至六分去滓温服日三服當歸芍藥湯出千金方治産後虛損逆害飲食當歸一兩剉芍藥人參桂心生薑乾地黄甘草各一兩大棗二十枚右㕮咀以水七升煮取三升去滓分三服日三烏豆丸出聖惠方療産後羸乏復令肥白方以大烏豆净拭熬熟如造豆黄法去皮搗為末以臘月猪脂成煉右和丸如梧桐子大酒下五十丸日再一月内肥白也無所忌羊肉黄耆湯出聖惠方治産後虛乏補益羊肉三斤黄耆三兩大􅀥三十枚茯苓甘草麥門冬當歸桂心芍藥乾地黄各二兩右㕮咀以水二斗煮羊肉取汁一斗去肉内諸藥煎取三升去滓分三服日三一方用生薑煎服當歸丸治産後血氣不調日漸羸瘦身體肢節煩疼靣無顔色當歸切焙生乾地黄焙一方用熟澤蘭取葉各二兩防風去蘆黄耆剉續斷桂去粗皮各一兩人參地骨皮芍藥各一兩半右為末煉蜜為丸如梧桐子大每服二十丸温酒或米飲下不拘時地黄湯治産後虛羸寒熱往來補虛湯方見本門虚熱類紫石英湯治産後虛衰寒熱羸瘦紫石英别研如粉鍾乳粉白石英熟乾地黄焙當歸切炒半夏生薑自然汁製各半兩桂去粗皮白茯苓去黑皮各一兩人參甘草炙各三分右粗搗篩每服三錢匕水一盞生薑三片􅀥一枚煎七分去滓温服不拘時黄雌雞湯出聖惠方治産後虛羸四肢無力不思飲食肥黄雌雞一隻去頭足翅羽及腸洗當歸一兩剉微炒人參三分去蘆頭熟乾地黄一兩半桂心半兩甘草一兩炙微赤剉麥門冬一兩半去心焙芎藭三分白芍藥三分黄耆一兩半剉右為散先以水七升煮雞取汁三升每服用汁一中盞入藥四錢煎至六分去滓温服日三服杏仁湯出千金方治産後虛氣杏仁橘皮白前人參各三兩蘇葉半夏各一升桂心四兩生薑十兩麥門冬二兩右㕮咀以水一斗二升煎取三升半去滓分五服烏雞湯治産後血氣衰弱日漸虛羸補不足烏雌雞一隻去翅羽腸足以水五升煎取汁三升當歸切焙炒人參甘草炙桂去粗皮芎藭芍藥剉黄耆麥門冬去心炒各一兩右除雞外粗搗篩每服三錢匕煎雞汁一盞生薑三片棗一枚煎七分去滓温服日三不拘時三之一湯出濟生㧞粹方治産後虛勞雖日久而脈盛浮疾柴胡八錢黄芩人參半夏洗甘草炙熟地黄川芎芍藥當歸各三錢右為粗末依小柴胡湯煎服如日乆虛勞微有寒熱脉沉而遲宜柴胡四物湯芍藥湯治産後虛勞骨節疼痛寒熱往來精神恍惚夢寐驚悸芍藥牡丹皮元參芎藭乾薑炮甘草炙白茯苓去黑皮白薇各二兩麥門冬去心焙一兩半右粗搗篩每服五錢匕以水二盞煎至一盞去滓放温服之日三羊肉湯出千金方治産後虛羸困乏喘促自汗腹中絞痛肥羊肉三斤去脂當歸姚氏用葱白芎藭各三兩子母秘録作豉一升桂心甘草各二兩芍藥子母秘録作葱白生薑各四兩乾地黄五兩右㕮咀以水一斗半先煮肉取七升去肉内餘藥煮取三升去滓分三服不瘥重作一方加葱白一斤子母秘録若胸中微熱加黄芩麥門冬各一兩頭痛加石膏一兩中風加防風一兩大便不利加大黄一兩小便難加葵子一兩上氣欬逆加五味子一兩一方無當歸羊肉地黄湯出聖恵方治産婦七日後宜服補虚羸强氣力消滯血方見本門腹痛類乳蜜湯出千金方治産後七傷虛損少氣不足并腎勞寒冷補氣牛乳七升無則用羊乳白蜜一升半當歸人參獨活各三兩大棗二十枚甘草桂心各三兩右㕮咀藥以乳蜜中煮取三升去滓分四服當歸湯治産後虛勞骨節疼痛頭痛汗不出當歸人參生薑各二兩正方用二分黄耆三兩淡豉五合豬腎一具粳米二合薤白三合右水一斗五升先煮猪腎取六升後下諸藥煎至二升分為三服羊肉湯治産後排風補虛散血氣止痛白羊肉切一斤黄耆剉防風去蘆剉桂去皮剉當歸切焙芎藭各半兩剉大棗擘破七枚生薑切三分右先以水五升煮羊肉取三升澄去脂後内諸藥煎取一升半去滓食前分温四服如人行三五里再服養氣活血丸出楊氏家藏方治産後諸虛不足勞傷血氣真元内弱四肢倦乏肌肉消瘦及脾元虛損不入飲食或吐痢自汗或寒熱往來大艾葉炒焦取細末五兩乾薑炮取細末二兩半灰已上用好醋二升半無好酒二升生薑自然汁一升將前薑艾末同調勻於銀器内慢火熬成膏附子炮去皮臍二兩白芍藥白术椒紅當歸洗焙紫巴㦸去心糯米炒人參去蘆頭川芎五味子八味各二兩右件為細末入前膏子並炒熟白麫二兩半同和為劑入杵臼内搗千下丸成如梧桐子大每服五十丸温酒或米飲下食前内補芎藭湯出千金方治婦人産後虛羸及崩傷過多虛渴腹中絞痛芎藭四兩乾地黄四兩芍藥五兩桂心二兩甘草三兩乾薑三兩大棗四十枚右㕮咀以水一斗二升煮取三升去滓分三服日三不瘥復作至三劑若有寒苦癥瘕附子三兩旋加治婦人虚羸少氣傷絶腹中拘痛及崩傷虛竭靣目無色及唾血甚良進食散出大全良方治脾胃虛寒不思飲食及乆病人脾胃虛全不入食者只兩服能食青皮陳皮粉草良薑桂心各一兩川烏炮去皮尖草豆䓻仁各三箇訶子五箇右為細末每服一錢水一盞薑三片煎至七分温服此方既有川烏治血風攻脾不食豈無驗人參湯出便産須知方療産後多虛羸弱若大汗利皆至於死此重虛故也所以苦中風謬誤昬悶不省人事人參茯苓羗活桂心大棗逺志各十分竹瀝一升右用水六升煮取三升下竹瀝更煎取二升温分三服增損柴胡湯出濟生㧞粹方治産後虚羸發寒熱飲食少腹脹北柴胡人參甘草半夏陳皮川芎白芍藥右各等分㕮咀每服三錢水一大盞薑五片棗二枚煎七分去滓食後温服日二服如産後風氣在表靣目四肢浮宜局方中七聖丸白湯下之以利為度如浮腫添喘𠻳加木香㯽榔倍之謂氣多也如浮腫加頭痛昏冐加羗活川芎謂風多也如只浮腫依七聖丸本方服之芍藥湯療産後虛乏不思飲食四肢皆倦心腹陣痛補虛治氣人參芍藥桂心甘草生薑各一兩當歸一兩半生地黄二兩右㕮咀每服三錢水二盞􅀥二枚煎至一盞去滓温服日三服人參湯治産後虛羸困乏肌肉不生血脉不榮人參芎藭黄耆剉甘草炙令黄各二兩桂去粗皮一兩生乾地黄焙用二兩乾薑炮裂半兩右粗搗篩每服三錢匕用煮羊肉汁一盞煎七分去滓温服不拘時氣補湯出肘後方治産後大虛勞黄雄雞一隻赤小豆五升大豆亦得乾地黄一兩甘草桂心黄芩芍藥各二兩右以水二斗煮雞豆一斗去滓内藥煎取四升分為四服風濕湯治婦人産後血氣虛損傷風寒濕口急項强腰脚疼痺烏頭炮去皮一兩當歸芍藥麻黄去節甘草炒白术各半兩右㕮咀每服三錢水一盞半生薑四片煎至七分去滓温服不拘時黄雌雞湯黄雌雞一隻去頭足翅羽腸肚細切當歸白术熟地黄桂心黄耆各半兩右㕮咀以水七升煮雞至三升每服藥四錢以雞汁一盞煎至六分去滓温服日三服内補當歸建中湯出三因方治産後虛羸不足腹中㽲痛不止吸吸少氣或若小腹拘急痛引腰背不能飲食産後一月内得服四五劑為善令人力壯及治婦人一切血氣虛損時自汗出當歸四兩芍藥五兩甘草二兩生薑六兩桂心三兩大棗十八枚右㕮咀以水一斗煮取三升去滓分服一日令盡若大虛内飴糖六兩作湯成内之於火上飴消若無生薑則以乾薑三兩代之若其人去血過多崩傷内竭不止加地黄六兩阿膠二兩合八種作湯或去滓内阿膠若無當歸以芎藭代之甘草丸治産後虛損主補虛去血止痛甘草炙五兩當歸乾薑人參白术各二兩右搗篩蜜丸如彈子磨内一升酒中作一服日三治産後虛羸盜汗時嗇嗇惡寒以吳茱茰三兩以清酒三升漬一宿煮如蟻鼻沸减得二升許中分之頓服一升日再間日再作服亦治産後腹中疼痛羊肉方治産後大虛羸瘦無力腹肚痛冷氣不調又腦中風汗自出以白羊肉一斤如常法調和腌􅧐食之當歸湯治婦人寒疝虛勞不足若産後腹中絞痛並治之方見本門腹痛類豬膏煎出千金方治産後體虛寒熱自汗出者豬膏生薑汁白蜜各一升清酒五合右當炭火上熬令調和五上五下膏成隨意酒服方寸匕地黄羊脂煎出千金方療産後諸病羸瘦欲肥白生地黄一升生薑汁五升羊脂二斤白蜜五升右先煎地黄汁令餘五升下羊脂煎减半次下薑次下蜜便以銅器盛著湯中煎令如飴狀空肚酒一升取煎如雞子大投酒中飲日三良療産後虛羸困乏黄雌雞一隻去毛背上破生百合煨三枚白粳米半升右依常法着五味調和縫雞背合味汁煮熟開腹取百合并相和汁作羮食之肉亦食令盡略卧佳當歸散出神効方治婦人産後虛弱和血通經當歸一兩焙芍藥二兩香附子三兩炒右為細末每服一二錢米飲湯調下服之無時枳實散出肘後方治産後虛損煩亂不得眠枳實芍藥等分炙右為末服方寸匕日三服之二聖散治産後虛羸汗不止煩倦少力麻黄根二兩故敗扇燒取灰秤半兩右為散每服二錢匕煎人參湯調不拘時羊腎方出肘後方豬腎一具羊腎一具右以葱豉作臛食如常治産後虛勞骨節疼痛汗出不止出本草取豬腎造稀臛以葱䜴米如法食之治婦人産後虛損以蟶食之普濟方卷三百五十二
