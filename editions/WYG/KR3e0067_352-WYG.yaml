body:
  text: 普濟方卷三百五十二明周王朱橚撰産後諸疾門崩中漏下附論夫産後崩中漏下者盖由産卧傷耗經脉未得平復而勞役損動致血暴崩淋瀝不止或因醎酸不節傷􅗜榮衛氣血衰弱亦變崩中又有多因七氣所傷臓氣不平或服斷血藥早致惡血不消主成崩中方側栢丸治産後崩中乆下血不止或赤或黑臍下疼痛側栢炙㣲黄白芍藥黄耆剉熟乾地黄續斷各一兩代赭一兩半牛角䚡灰禹餘糧燒醋淬三徧桑耳當歸剉微炒艾葉㣲炒各一兩龜甲二兩塗醋炙令微黄右為末煉蜜搗三五百杵丸如小豆大每服空心以黄耆湯下三十丸熟乾地黄散治産後崩中頭目旋暈神思昏迷四肢煩亂不知人事熟乾地黄伏龍肝黄耆赤石脂各一兩阿膠甘草白术艾葉炒川芎人参各半兩當歸三分右㕮咀每服三錢薑三片水一大盞煎至七分去滓温服阿膠丸治産後崩中下血不止虛羸無力阿膠赤石脂各半兩續斷川芎當歸甘草丹参各一兩龍骨鹿茸酥炙烏賊骨龜甲炙各三兩右為細末煉蜜為丸如梧桐子大空心温酒下二三十丸一方加鱉甲一兩白芍藥散治産後崩中下血淋瀝不絶黄痩虛損白芍藥牡蠣乾薑熟乾地黄桂心黄耆烏賊骨鹿角膠龍骨各一兩右為末食前温酒調下二錢療産後下血不止桑耳炙芍藥炙地榆葛根牛角䚡阿膠各六分艾葉鷄蘇各四分白龍骨十分右㕮咀以水二升煮取八合分三服此藥尤能治産後痢先以桂丸小下之次投硇砂丸日九十丸利頓减半次日遂愈硇砂丸産後雖無疾亦宜服之能養血氣去積滯大黄散治崩漏下血不止大黄三両芒硝一兩桃仁水蛭虻蟲各三十枚甘草當歸各三兩蟅蟲四十枚右㕮咀以水三升酒二升合煎取三升去滓分三服龍骨散療崩中下血龍骨研赤石脂研各六分烏賊魚骨牡蠣粉肉蓯蓉各五兩龜甲炙芍藥右搗散飲服方寸匕日三漸加之加乾地黄十分佳龜甲散治産後崩中下血過多不止龜甲三兩醋浸炙令微黄黑桑耳二兩鹿茸一兩去毛塗酥炙令黄白石脂一兩禹餘糧一兩燒醋淬三徧當歸一兩剉微炒吳茱萸半兩湯浸十徧炒令微黄芎藭一両栢子仁一兩右為散每於食前以温酒調下一錢瑞蓮散治産後惡血崩漏狀如泉水瑞蓮百枚燒存性棕櫚燒存性當歸桂心各一兩鯉魚鱗燒川芎各三分㯽榔三枚右為細末每服三錢煨薑酒調下未止更盡即止桂丸硇砂桂心甘遂丁香木香芫花以硇砂炒焦已上各等分巴豆去心皮不去油减半右為細末麫糊丸如菉豆大每服二丸三丸温酒下加减更量虛實此丸最宜取積不以乆近皆能消化阿膠散出聖惠方治産後崩中下血不止作血片如雞肝色碎爛者阿膠一兩搗碎炒黄燥當歸一兩剉微炒續斷一兩地榆一兩剉熟乾地黄一兩牛膝一兩去苗紅花子一兩右為散每服三錢以伏龍肝一兩浸取水一中盞煎至六分去滓每於食前温服騏驎竭散出聖惠方治産後崩中下血不絶小腹痛騏驎竭一兩禹餘糧一兩燒醋淬三徧地榆一兩剉阿膠二兩搗碎炒令黄色赤芍藥一兩熟乾地黄一兩右為散每於食前以温酒調下一錢熟地黄散出聖惠方治産後崩中下血淋瀝不絶黄瘦虛損熟地黄赤石脂各一兩鹿茸牡蠣當歸各半兩右為細末食前粥飲調二錢固經丸出醫方集成治産後所下過多勞役傷損致血暴崩淋瀝不已或醎酸不節所致此謂重傷如有腹脹則是瘀血使然此藥又非其治艾葉赤石脂煆補骨脂木賊各半兩附子一箇炮右為末陳米湯和丸如梧桐子大食前温酒下二十丸米飲亦可一方煎芎歸湯加芍藥下評曰血崩不是輕病况産後有此是謂重傷恐不止醎酸不節而致多因驚憂怒氣不平或産後服斷血藥太早致惡血不消􅊊滿作堅亦成崩中固經丸自難責効不若大料煮芎藭湯加芍藥候定隨證藥治為得小腹滿痛肝經已壞難治局方大順散除杏仁用醋煮附子依等分入効桂心散出千金方治崩漏下血不止桂心蠐螬各二兩栝蒌根牡丹各三兩豉一升右㕮咀以水八升煎取三升去滓分三服治産後血崩不止出䕶命方兎絲子杜仲去皮益智子去皮萆薢山茱萸茯苓五味子赤石脂龍骨川芎各一分川椒三銖覆盆子半兩右為細末煉蜜丸如梧桐子大早朝空心鹽湯下三十丸治産後崩中惡露不止大腑冷方喫此方出䕶命方白术當歸芎白芷各半兩牡蠣火煆三分舶上硫黄一兩細研右為細末令如飛塵同舶上硫黄相衮鍊蜜丸如梧桐子大早朝空心鹽湯下三十丸伏龍肝散療崩中下血數升氣欲絶伏龍肝五升人参一兩麝香二兩生薑四兩右切以水一大斗煮土取二升下藥煎取一升半更别研伏龍肝一雞子許并麝香内湯中攪令調分服治産後連下血不止者黄連黄蘗阿膠炙各三分熟艾二兩右以水六升煮取二升半分温為三服龍骨丸治産後虛冷下血及所下晝夜旡數兼治産後惡露不斷方見本門産後惡露不絶類龍骨丸加味芎藭湯出醫學類証芎藭當歸芍藥各等分右㕮咀每服四錢水一盞半煮取七分去滓無時熱服治産後崩露下血不止出朱氏集驗方棕櫚皮乾薑烏梅各一兩燒灰存性右研為細末每服三錢煎烏梅湯調下不拘時候乆患三服愈香墨散出聖惠方治産後崩中下血不止香墨半兩露蜂房半兩微炒龍骨半兩右為散每於食前用水煎乾地黄湯調下二錢又方出聖惠方白墡半兩乳香一分阿膠半兩搗碎炒令黄燥右為散每於食前以粥飲調下一錢赤龍皮散出聖惠方治産後崩中有惡物或渴者赤鯉魚皮二兩亂髮一兩㯶櫚皮一両剉右同於銚子内用麻㸃火均炒令煙盡候冷入麝香半分研令勻每於食前以醋一合水二合煎一兩沸調一錢服之蚕退散出海上名方治崩露下血不止蚕退紙棕櫚皮各燒灰存性右研為末每服各抄二錢温酒調下立効又方出千金方治産後漏血不止露蜂房敗船茹右等分燒作灰取酩若漿服方寸匕日三又方出聖惠方艾葉一握㣲炒伏龍肝一雞子大右相和以酒一大盞煎至六分去滓食前分温二服又方出聖惠方牡蠣一兩燒為粉兎骨一兩塗醋炙微黄右為散每於食前以温酒調下二錢地黄酒方出聖惠方治産後崩中下血不止心神煩亂生地黄汁半小盞益母草汁半小盞右酒一小盞相和煎三五沸分為三服頻頻服之効治産後崩中不止方出聖惠方荷葉一兩七月七日採鹿角膠二兩搗碎炒令黄燥右為散每於食前以温酒調下二錢菖蒲酒出聖惠方治産後崩中下血不止用菖蒲一兩半細剉以酒二錢煎至一盞去滓温服分作三服食前夏枯草散出海上名方治崩中漏下血不止用夏枯草燒灰研為末每服二錢温米飲調下桃枝散療崩中下血不止并男子卒痢血取東南引桃枝三握細切以水四升煮取一升頓服未瘥更服良治産後血不止用竈黑煤以熱酒調送下便瘥又方出聖惠方用刺薊半斤浄洗曝乾以酒五升浸經三宿每日隨意多少煖服之白芷丸出千金方治産後所下過多及崩中傷損虛竭少氣靣目脱色腹中痛方白芷五兩乾地黄四兩續斷乾薑當歸阿膠各三兩附子一兩右七味為末蜜和丸如梧桐子大酒服二十丸日四五服無當歸芎藭代入蒲黄一兩炒續斷大蘇根代秘方龍骨丸出危氏方治半産後及下虛數月崩漏不止白牡蠣北赤石脂代赭石已上并煆白龍骨伏龍肝海螵蛸五靈脂側栢葉各等分棕櫚不拘多少燒灰真蒲黄多加入右為末醋糊丸如梧桐子大每服三十五丸以十全大補湯三錢加嫩鹿茸去毛酒炙阿膠蛤粉炒各一錢半薑三片棗二枚烏梅二箇煎吞服立効大聖散朱氏集驗方治小産下崩不止忽大渴飲水則吐藥食不進命在須㬰一醫用後藥一服吐住荆芥末半錢合大聖散用白湯㸃服治女人産後漏下及痔病下血方礬石一兩附子一枚右為末蜜丸如梧桐子大空心酒下二丸日三稍加至五丸數日瘥能百日服之永斷治崩中單方出千金方用牛角末以酒服方寸匕日三服亦治帶下月水不通附論夫産傷動於血氣其後虛損未復而為風冷所傷血之為性得冷則凝結故風冷傷經血結於胞絡之間致令月水不通也凡血結月候不通則變成血瘕水血相併復遇脾胃衰弱肌皮虚者則為水腫也方大黄丸治産後惡血凝滯月水不通川大黄一兩剉㣲炒桃仁一兩湯浸去皮尖雙仁麩炒微黄乾漆一兩搗碎炒令烟出赤茯苓三分甜葶藶三分隔紙炒令紫色牛膝一兩去苖牡丹三分水蛭半兩炒令黄芎藭半兩桂心半兩柴胡三分去苗牡蒙三分人参半兩去蘆頭當歸半兩剉微炒䖟蟲半兩㣲炒令黄去翅足川椒半兩去目及閉口者微炒去汗吳茱萸一分湯浸七徧焙微炒乾薑一分炮裂剉䗪蟲半兩炒令微黄生乾地黄一兩右為末煉蜜丸如梧桐子大每服食前以温酒下二十丸益母草子散出聖惠方治産後惡血積留經乆未消致月水不通靣色萎黄臍腹疼痛肌瘦無力益母草子一兩桂心半兩當歸三分熟乾地黄半兩大麥蘖半兩㣲炒赤芍藥半兩鬼箭羽半兩紅藍花半兩川大黄三分赤鯉魚皮灰半兩亂髮灰半兩宻佗僧半兩燒醋淬過䖟蟲一兩去翅足微炒水蛭二兩炒令黄麝香一分研入右為㪚以赤馬尿半中盞酒半中盞拌和前藥令勻直候乾研入麝香每服食前以温酒調下二錢䖟蟲散出聖惠方治産後日乆月水不通䖟蟲半兩去翅足微炒川大黄三分剉微炒亂髮灰半兩蒲黄半兩騏驎竭半兩延胡索三分伏龍肝半兩細研當歸半兩剉㣲炒赤芍藥半兩狗膽二枚乾者䗪蟲半兩微炒水蛭半兩炒令黄麝香一分研入硃砂半兩細研水飛過右為細散入研了藥令勻每服食前以温酒調下二錢虎杖散出聖惠方治産後多時月水不通虎杖三分牛膝三分去苗蘇枋半兩剉紅藍花半兩連子心半兩當歸三分剉㣲炒桂心半兩牡丹半兩乾漆半兩搗碎炒令烟出鬼箭羽半兩狗膽二枚乾者硇砂半兩研入琥珀半兩麝香一分研入右為散入研了藥令勻每服食前温酒調下二錢琥珀散出聖惠方治産後月水不通腹脇妨悶四體煩疼飲食减少漸覺虚困琥珀一兩虎杖三分牛膝一兩去苗木香半兩鱉甲一兩塗醋炙微黄去裙襴赤芍藥一兩柴胡一兩去苗赤茯苓三分桂心半兩桃仁三分湯浸去皮尖雙仁麩炒黄川大黄一兩剉碎微炒當歸三分剉微炒枳殻三分麩炒微黄去瓤右為散每服三錢水一中盞入生薑半分煎至六分去滓食前温服忌生冷油膩莧菜牛膝散出聖惠方治産後氣滯月水不通腹脇疼痛牛膝一兩去苗桂心半兩當歸半兩剉微炒菴䕡子一兩牡丹半兩蓬莪荗半兩蘧麥半兩琥珀半兩防葵半兩劉寄奴半兩桃仁半兩湯浸去皮尖雙人麩炒微黄甘草半兩炒微赤剉右為散每服三錢水一中盞入生薑半分煎至六分去滓食前稍熱服紅藍花出聖惠方治産後月水不通腹脇刺痛靣色萎黄時發煩熱不思飲食紅藍花半兩琥珀一兩川大黄一兩剉碎㣲炒蘧麥半兩當歸一兩剉㣲炒桂心一兩延胡索三分赤芍藥半兩薑黄半兩牛膝半兩去苗桃仁三分湯浸去皮尖䨇人麩炒㣲黄蓬莪荗半兩右為散每服一錢食前以温酒調下牡丹丸出聖惠方治産後月水不通脇腹滯悶四肢煩疼牡丹一兩川大黄一兩剉碎㣲炒赤芍藥一兩木香半兩桃仁半兩湯浸去皮尖䨇仁麩炒微黄䖟蟲一分微炒令黄去翅足水蛭一分㣲炒令黄蠐螬蘧麥三分芎藭三分當歸三分剉㣲炒海藻三分洗去鹹味桂心半兩右為細末煉蜜和丸如梧桐子大每服食前以温酒送下二十丸鬼箭羽散出聖惠方治産後月水不通脇腹時痛四肢煩疼不欲飲食漸覺瘦弱鬼箭羽一兩川大黄一兩剉碎微炒木香半兩當歸三分剉微炒桂心三分桃仁三分湯浸去皮尖雙仁麸炒黄赤芍藥三