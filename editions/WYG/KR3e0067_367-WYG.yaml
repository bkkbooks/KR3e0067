body:
  text: 普濟方卷三百六十七明周王朱橚撰嬰孩諸風門總論夫風者百病之長善行而數變小兒血氣未定肌肉脆弱腠理虚踈為邪風所中以春甲乙得之則中於肝以夏丙丁得之則中于心以季夏戊巳得之則中于脾以秋庚辛得之則中于肺以冬壬癸得之則中于腎各隨其腑臓之虚所中則為臓腑之風或客于皮膚肌肉榮衞或留于節膜骨髓隨其變化為病不一各有微甚之狀大約與大人所得證候皆同特小兒治之分劑多寡差殊宜消息以調之楊氏曰血氣未定寒温失調内則盛熱藴蓄外則腠理虚開致風邪自背上五臓俞而入乗其外虚而暴中之其狀昏不知人壯熱狂躁搐掣氣麄口噤痰潮必有五臟中風之證蓋風寒暑濕亦入楊氏曰又有小兒多因感風久嗽不能發散致風邪入肺臓之絡遂中肺風目能視人口不能言是其候也楊氏曰是風也始入于湊膚次達于經絡而摶于筋脉風入頷頰之筋則口喎而牙緊風塞咽喉聲音之門則語不出而失音風與氣摶以痰隔則喉間如鼾䶎之響摶于筋脉得寒則拘急攣痛脉必浮緊得熱則緩弛不隨脉必浮洪風夾寒邪即攣風濕夾熱氣即緩弛宜追風毒劑散等大抵脉浮病在表脉實病在裏脉促病在上在表宜散發在裏宜䟽導促于上胷膈澎湃者宜吐之若虚寒者附子川芎不可缺古人治法以灼艾為本又當消息權度而投劑焉朱氏曰凡治風先理氣不可專服風藥攻之愈急則風勢愈甚且調氣活血和平榮衞調暢則風疾不治而自愈風證其中人也卒其眩人也暈激人痰潮昏人神亂邪氣反緩正氣反急正氣引邪為喎斜為􅇡視為掣縱為搐搦為癰瘓為反張在陽則皮膚緩緩則四肢不收在陰則腹裏急急則一身不能仰隨其邪氣表裏深淺受證也偏枯者血氣偏虚半身不遂股肉枯瘦骨間疼痛風痱者神智不亂身體不痛四肢不拳一臂不隨能言者可治風癔者忽然迷仆舌强不語喉中窒塞噫噫有聲身軟有汗則生風痺者風寒濕三氣合而為痺其人肉厚身頑不知痛痒風多則走注寒多則疼痛濕多則重着在筋則筋屈不伸在脉則血凝不流在肉則不仁内經曰榮氣虚則不仁明理曰不仁者不知痛痒也在骨則癃重心中風偃臥不能傾側發失音其舌焦赤若汗流唇赤可治灸心俞若唇上白黒青黄乃心壞為水不治肝中風踞坐不能低頭上視多眩在脇偏疼諸筋攣急頭目瞤動若其目青遶兩目連額微青面黄者可治灸肝俞若大勢青黒目一黄一白不治脾中風踞致腹滿皮肉瞤動四肢不收若唇黄身通黄吐醎汁可治灸脾俞若手足青足冷或目下清不治肺中風偃臥胷滿氣短喘息時嗽躁悶汗出不能治有口不能言若鼻四圍至口及目下色白者可治灸肺俞若鼻口目下色黄乃肺壞為血及尋衣摸空不治腎中風踞坐面浮腰脊痛引小腹其耳黒視左右脇㸃㸃黄色可治灸腎俞若脇上黄㸃面如土色毛髪直齒黄赤不治胃中風腹滿脹膈塞不通張口喘息額上多汗楊氏曰或曰中風諸臓不關諸府然胃為五糓之海皆取氣于胃孫真人曰所謂飽食傷胃祛其胃風是也三因方云灸胃俞穴在脊二椎骨下兩傍各一寸半中風多是惡風自汗心風脉浮洪肝風脉浮弦腎風脉浮滑肺風脉浮濇脾風脉浮緩或以三部候之或以本臓脉取之不可一槩論也中風惡證詩曰中風惡證細推求口噤嘘遲脉數憂眼合不開并􅇡證而緋面黒手難收口開吐沫氣麄大髪直頭眩汗不流鼾䶎哀鳴兼鼻冷遺尿㵼血並皆休中風者人之驟病一時倉卒若未能精審五臓受證且先與搐鼻開關豁痰氣蓋中風皆因痰欝氣滯而作痰消氣下病勢稍蘇然後辨證灸治凡治風先理氣治風良劑小續命湯良排風湯次之然二藥主風不主氣須以人參順氣散烏藥順氣散佐助其間氣一流行則風自踈散矣順氣則蘇合香丸南木香軰消痰則白丸子南星半夏可用如銀粉鉛硝等謹勿妄施寒毒入胃則血脉凝滯真氣銷鑠而成廢人熱極則生風大綱然耳亦有胃虚氣虚血虚而生風者則天雄附子官桂川芎不可缺也又小兒三五歳或七八歳至十餘歳發驚涎潮搐搦如拽踞不省人事目瞪喘急將欲死者内經曰此症得之在母胞胎之所受悸愓驚駭恐懼之氣故令小兒輕者為驚風天吊重者為癎病風搐胎中積熱者為臍風已上諸風證可用吐涎散吐之吐訖宜珠犀龍麝清凉墜痰之藥方食乳子母皆宜服之安魂定魄之藥定志丸之類是也故婦人懷孕之月大忌悲憂驚怖縱得子必有前疾小兒風熱涎嗽者以通聖散加半夏同煎温服中風附論夫小兒中風者由氣血未定肌膚嫰弱設若將養乖宜寒温失度腠理虚開則為風所中也方蛇頭丸若兒搐搦不已驚狂迷悶角弓反張或昏沉嚙齒雙目直視頻喚不省變為癇證亟宜服此藥以除之却不可多進須仍以疎風藥相間調理凡服此藥亦須先以木香烏藥枳殻㯽榔磨少許灌之却服庶使關節通透藥力無不利朱砂三錢紫粉五錢全蝎十五個去毒生麝香半錢花蛇頭酒浸去皮骨五錢沉香真欝金五靈脂白附子各五錢金銀箔各五片片腦子半分蛇含石二兩炒醋煅令赤濃煎甘草湯淬以手撚得碎為度方可用殭蠶南星天麻各五錢右為末煉蜜丸小指頭大每服大者一丸小者半丸隨證依後大風膏湯引下一方加防風大風膏定諸般風搐天麻三錢防風一兩天竺黄五錢花蛇酒浸去皮骨蛇含石二兩燒紅淬醋煮七遍青黛紫粉各三錢殭蠶炒去絲五錢蜈蚣酒浸去糞一條代赭石一兩燒醋淬七遍白附子辰砂各五錢麝香半錢全蝎五個去毒天南星三兩薑汁浸焙乾右為末煉蜜丸久留用麵糊丸如小指頭大每服大者一丸小者半丸慢驚冬𤓰子仁湯下搐搦雞冠血薄荷湯急驚斑竹葉薄荷湯下化涎桑白皮湯退潮熱薄荷磨刀水止嗽北五味子杏仁夜啼燈心竈心土蟬退濃磨灌下天南星丸治小兒中風四肢拘急心神悶亂腰背强硬天南星一分炮製膩粉一分研入白附子半兩炮製半夏半兩湯洗七次去滑麻黄半兩去節根五靈脂一兩乾蝎一兩微炒金箔銀箔各二十片槐子微炒防風去蘆頭朱砂細研水飛過犀角屑各半兩牛黄細研麝香各一分細研右為末入研了藥都研令勻用醋一大盞入藥末一半以慢火􅆈成膏次入餘藥末和丸如菉豆大一歳一丸二歳二丸三五歳至三丸以温酒下日三四服長理石湯治小兒卒中風狀如欲絶增損續命長理石碎赤石脂碎石膏碎滑石碎桂去麄皮白石脂碎大黄剉炒令香防風去义牡蠣燒碎龍骨碎麻黄去根節先煎掠去沫焙括樓根剉各半兩甘草炙一兩寒水石一分右麄擣篩一二歳小兒每服一錢水半盞煎至三分去滓温服服後汗出以粉𫝊之若有熱者增大黄不汗者加麻黄無寒水石以朴硝代之日三服量兒大小加減牛黄丸治小兒中風手足搐搦及驚風牛黄細研乾蠍微炒防風各一兩去蘆頭犀角屑半兩麝香細研鉛霜各一分細研天麻天竺黄細研白附子炮裂烏蛇肉各半兩炙令黄天南星一分炮裂膩粉一錢朱砂半兩細研水飛過右為末入研了藥令勻煉蜜和丸如菉豆大每服用温薄荷酒研下三丸更量兒大小加減服之續命湯治小兒卒中風惡毒及久風四肢不隨并軃躄不能行歩角弓反張一名苦生湯甘草炙半兩黄芩去黒心一兩石膏一分人參一分麻黄去根節先煎掠去沫焙二兩芎藭葛根升麻杏仁十枚湯泡去皮尖雙仁麩炒令熱當歸切焙桂去麄皮獨活去蘆頭各半兩右麄擣篩三四歳兒每服一錢水七分煎至四分去滓連夜三四服量兒大小加減服之汗出粉𫝊之避風青黛膏治中風昏悶呵欠手足微冷天麻半兩白附子三錢蝎稍半兩麝香一錢花蛇肉酒炙天竺黄二錢青黛二錢朱砂三錢右為末煉蜜丸皂角子大薄荷湯下花蛇丸治中風項强天弔驚風癎疾殭蠶炒白附子南星朱砂全蝎花蛇肉酒浸炙十次去骨各等分右為末爛飯為丸如粟大麝香湯下大續命湯治中風痱身體不能自收口不能言冒昧不知疼痛筋脉拘急小兒凡得中風之疾未作他病可服麻黄去節一兩半桂去皮當歸洗去土人參石膏白薑各一兩甘草炙川芎白芍藥各半兩杏仁三分去皮尖雙仁炒已上十件係本方續加防風去蘆犀牛角屑各半兩右㕮咀每服二錢水半盞薄荷二葉煎三分去滓服排風湯治中風狂言失音不語精神昏困諸般惡證白鮮皮白术白芍藥桂去皮當歸洗酒浸一宿芎藭防風杏仁去皮尖雙仁麩炒甘草炙半兩川獨活去蘆白茯苓去黒皮麻黄去根節各一兩半右㕮咀每服二錢水半盞生薑三片煎至三分大小以意加減熱盛痰壅大便不利當用金星丸下自利可服奪命散小續命湯治中風不省人事涎鳴反張失音厥冷方見本門痙痓類銀白散治或吐或㵼涎鳴微喘露睛驚跳方見驚風門一切驚風類槐子煎治小兒中風不省槐子一兩炒白殭蠶一兩炒防風一兩白附子一兩乾薑半兩麻黄半兩去節半夏半兩湯洗七遍已上擣羅為細末用好醋兩大盞慢火􅆈成膏次用朱砂半兩水飛牛黄一分麝香一分金箔二十片細研右拌勻和成膏如菉豆大每服五粒温酒下量兒大小加減若牙關緊急即化破灌之石膏湯治小兒風痱不能語口眼喎斜四肢不隨石膏碎一兩甘草炙半兩射干半兩桂去麄皮半兩麻黄去根節先煎掠去沫焙一兩芍藥半兩細辛去苖葉一分當歸切焙半兩右麄擣篩二三歳兒每服一錢水半盞煎至三分去滓温服日三量兒大小加減服羗活散治小兒中風筋脉拘急或手足瘛瘲等羗活去蘆頭三分芎藭三分防風去乂三分天麻半兩白附子一分當歸炙乾切焙三分麻黄去根節煎掠去沫焙半兩甘草炙一兩右為散一二歳兒每服半錢乳汁調服三四歳兒服一錢七日三服如無乳熟水調服亦得量兒大小加減服之乳母亦用煖酒調下一錢大黄湯治少小中風狀如欲絶大黄牡蠣龍骨括蔞根甘草桂心各十二銖赤石脂寒水石各六銖右㕮咀以水一升内藥半兩煑再沸絞去滓半歳兒服如雞頭子大一枚大兒盡服入口中即愈汗出粉之藥無毒可每日二服有熱加大黄不汗加麻黄無寒水石朴硝代之螵蛸散治小兒中風痰盛桑螵蛸天麻各一兩天南星炮白殭蠶炒乾全蝎一分已上擣羅為末次用膩粉牛黄麝香各一錢研右同拌勻再研細每服一字至半錢温酒調下量兒大小加減羚羊角散治小兒中風筋脉拘急項强腰背硬手足搐搦發渴不定羚羊角屑防風去蘆頭麻黄去根節黄芩桂心細辛甘草炙微赤剉已上各半兩羗活三分右為散每服一錢以水一小盞煎至五分去滓入竹瀝半合更煎一兩沸温服量兒大小加減頻服汗出効一方無竹瀝用木𤓰同煎或麝香朱砂丸治小兒中風口眼偏斜筋脉拘急及胎中疾病朱砂半兩研細水飛過牛黄細研麝香細研乾蝎微炒天麻白附子炮製白殭􅁞微炒乾薑炮製已上各一分右為散入研了藥令匀用軟粳米飯和丸如黍米大每服以乳汁化下日三服更量兒大小加減服之一方無乾薑攝生飲治中風一切卒中不論中寒中暑中濕中氣及痰飲之類南星大者濕紙裹炮用二錢半夏用白者湯泡七次南木香各二錢細辛石菖蒲蒼术甘草炒各二錢右剉散每服一錢薑三片慢火煎取其半調蘇合香丸一粒灌下痰盛者又加全蝎防風温膽湯消痰順氣踈風半夏枳殻去穰麩炒茯苓各半兩陳皮防風各二錢半甘草一錢半人參二錢右剉散每服一錢入生薑紫蘇葉同煎服効一方無人參白玉丹治小兒中風涎潮天南星用生一兩半夏用生一兩白殭蠶一兩炒桂心一兩石菖蒲一兩一寸九節已上擣羅為末次用膩粉一分龍腦一分並細研右拌匀取生薑汁和如黍米大每服十粒煎人參湯下追風散治小兒因驚中風角弓