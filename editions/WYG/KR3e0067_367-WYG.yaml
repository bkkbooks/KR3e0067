麻津唾調藥摩之二聖散一名二聖膏治小兒口眼喎斜方見驚風門一切驚風類治小兒中風口喎斜僻宜塗用􅌝􅌣瓤以水絞取汁和大麥麵搜作餅子炙令熱熨正便止勿令大過殭蠶散治偏身口流涎沫蔓荆子黄茋茯苓人參南星天麻殭􅁞炒獨活羗活葛根甘草荆芥各等分右為散薑三片薄荷同煎服之中風四肢拘攣夫小兒肌肉嫩弱易傷于風風冷中于膚腠入于經絡摶于筋脉得冷則急故四肢拘攣也方硃砂丸治小兒中風四肢拘攣心神煩熱硃砂半兩細研水飛過牛黄細研麝香細研􅁞蛾微炒乾蝎微炒天麻白附子炮裂龍腦細研羗活已上各一分右為散都研令匀煉蜜丸如菉豆大每服以薄荷湯研下三丸日三四服量兒大小以意加減服之獨活湯治小兒中風四肢拘攣心神煩亂不得睡臥獨活去蘆頭一兩黄茋剉一兩防風去叉三分白鮮皮三分茯神去末一兩羚羊角屑三分桂去麄皮半兩酸棗仁一兩一方無甘草炙半兩右麄搗篩每服一錢水七分煎至四分去滓量兒大小加減獨活黄茋湯治中風拘攣桑根白皮半兩剉獨活一兩綿黄耆一兩酸棗仁一兩麻黄半兩去節羚羊角屑半兩肉桂半兩川芎半兩右都搗羅為末每服一大錢水一盞生薑薄荷各三片煎五分去滓放温服桑根白皮散治小兒中風四肢筋脉拘攣桑根白皮一兩剉羚羊角屑三分漏蘆三分敗醬一兩茯神三分木通一兩剉芎藭三分右為散每服一錢以水一小盞煎至五分去滓入生地黄汁半合更煎一兩沸量兒大小以意加減服之一字散治小兒中風手足筋脉攣急硃砂半兩細研水飛過蟬殻微炒乾蝎微炒半夏挫用生薑汁拌炒令熱白殭􅁞微炒天南星炮製各一分右為末每服一字以荆芥薄荷湯調下量兒大小加減服之日三四服效牛黄丸治小兒中風手足拘攣身體强直口噤壯熱牛黄犀角屑麝香胡黄連乾蝎硃砂羚羊角鈎藤雄黄天竺黄水銀􅀥肉大研星盡各一分蛇肉半兩酒浸去皮骨焙右為末蒸餅和丸如黍米大每服五丸薄荷湯下量兒大小加減服之麝香丸治中風四肢拘急心神昏亂腰背强直膩粉麝香牛黄白附硃砂槐子炒麻黄去節半夏犀角防風靈脂全蝎金箔銀箔甘草各三分右為末麵糊丸如菉豆大每服十丸白水吞下中風痙痓附論夫小兒風痙之症由風傷於太陽之經或觧脱衣或臍瘡未合而感風濕致之又虚極生熱熱極生風病之甚者傷風發熱頭痛汗出自嘔吐醫者不明汗之必發痙濕家發汗稍多亦發痓其狀可畏病在足太陽經痙有剛柔亦如陽陰陰隔陽之類其證始則發熱膓痛喘急次則牙闗緊頭揺十指微動漸加項背强直轉側不仁甚者昏困失音目睛直視滑泄不禁身體反張痓最難痊十救其一過三日不治項背强直腰身反張揺頭掣瘲噤口不語發熱膓痛鎮日不醒剛痓無汗面紅眼赤牙緊手張痰涎壅盛昏憒煩渴小便赤澁先讝語而發柔痓有汗大便滑泄不渴不語先手足冷而發剛柔不分之證身體壯熱讝語口乾手足反微寒大便反滑泄治法先與消痰順氣為上痰消則風止順氣則立伸醒病勢稍定然後審其熱之輕重觧利之熱輕者敗毒散熱者小柴胡湯壯熱胷滿口噤咬牙而大便秘結是為内實大承氣下之得病以來無汗用麻黄按方有汗則麻黄湯謹勿用也其若痰塞氣盛則南星半夏茯苓以消其痰枳實陳皮紫蘇木香以順其氣剛痓為之發汗柔痓為之觧肌並以小續命湯加減痰盛搐掣大便秘結當以枳殻大黄靈脂甘草利之小便赤澁心熱狂風當以辰砂五苓散入燈心行之既利大膓矣小便澁而風證乍作面色乍紅常有怫欝之狀何耶表熱表邪猶未觧也人參羗活散加青皮紫蘇薄荷主之參蘇飲亦可方牛黄丸治小兒中風痙牙闗緊急項强直及一切驚癎牛黄細研天竺黄細研雄黄細研龍腦細研犀角屑麝香細研水銀入少􅀥肉研令星盡乾蝎微炒附子炮裂去皮臍已上各一分硃砂細研水飛過天麻白殭蠶微炒蟬殻微炒桑螵蛸微炒羚羊角屑香附子羗活白附子炮製獨活蔓荆子麻黄去根節野狐肝微炙各半兩烏蛇一兩酒浸去皮骨炙令微黄右為末研入了藥同研令勻煉蜜和丸如麻子大不計時候以薄荷酒研下三丸量兒大小以意加減烏蛇丸治小兒中風痙及天弔驚癎一切諸風一名烏稍丹烏蛇一兩酒浸去皮骨炙令微黄天漿子二十枚去殻天麻半兩天南星半兩炮製乾蝎一分微炒白附子半兩炮製附子一兩炮製去皮臍防風半兩去蘆頭半夏半兩湯洗七遍去滑已上五味都以酒浸七日後取出炮乾搗羅為末牛黄龍腦麝香硃砂雄黄已上各一兩已上五味同研如粉右都研令匀用糯米飯和丸如黍米大不計時候用金銀薄荷湯下三丸量兒大小加減服之一方有人參無牛黄治吐利後生風及心肺中風尤宜服之烏犀丸治小兒中風痙及驚癎諸風手足搐搦不定烏犀角屑天南星炮製白附子炮製乾蝎微炒雄黄已上各一分白花蛇半兩酒浸去皮骨炙令微黄已上六味搗羅為末以無灰酒一小盞同入銀器内煎令稠再入後藥牛黄細研膩粉龍腦細研水銀用冬𤓰瓤研令星盡各一分硃砂半兩細研水飛過虎睛一對酒浸微炒右為末入前藥煎和丸如麻子大不計時候用竹瀝下三丸量兒大小以意加減服之小續命湯治剛柔不分之痓及中風等證麻黄去節人參黄芩川芎芍藥甘草炙杏仁去皮尖炒防己官桂去皮各五錢防風七錢半附子炮去皮二錢半右剉用生薑煎服剛痓去附子用麻黄柔痓去麻黄用生附子剛柔不分加生附子大便自利厥冷加熟附敗毒散治消痰順氣踈風方見傷寒門傷寒類一名十味湯螳螂丸治小兒中風痙身背强直牙闗緊急棘剛子去皮三十枚烏頭炮製去皮劑二枚天南星中者炮一枚防風去叉二分細辛去苖葉一錢螳螂一大枚去翅足炒令乾乾蝎白附子大者一枚丹砂研一分麝香研半錢右為細末用石腦油為丸如菉豆大每服一丸至二丸薄荷水化下不計時候如小兒目睛上視口噤不開用醋化一丸灌入鼻中男左女右灌之狐肝膏治痓病心肺中風並宜服之桑螵蛸炒一兩羗活一兩蔓荆子一兩麻黄一兩去節烏蛇肉一兩酒浸一宿焙乾已上搗羅為末再入後藥硃砂半兩牛黄一分麝香一分右拌勻用野狐肝半具石臼中同搗三二百下成膏如皂角子大每服一粒用薄荷自然汁入酒三兩㸃同化下奪命散治小兒痓病心肺中風並宜服之乾蛇頭一個酒浸炙黄蜈蚣一條赤頭者炙黄色乾全蝎一分草烏頭大者一枚炮去皮麻黄一分去節已上搗羅為末次用硃砂一分牛黄一錢腦子一錢右拌勻細研每服一字温酒調下天南星膏治痓病心肺中風並宜服之天南星一兩用細研慢火酒􅆈成膏赤頭蜈蚣半兩酥炙全蝎半兩烏稍半兩酒浸焙乾已上三味為末次用硃砂一兩水飛牛黄一分麝香一分右用天南星膏子拌匀于石臼中搗成膏每服一皂子大同薄荷自然汁入酒一滴同化下牛黄丸治小兒中風痙頸强直及風癎潮發牛黄研丹砂研天竺黄研蝎稍白殭􅁞天南星白附子各一分右並生用搗研令細煉蜜丸如梧桐子大每服金銀箔薄荷湯化下一丸至二丸服之桂枝葛根湯治柔痓有汗桂枝赤芍藥各六錢三分葛根一兩三錢甘草炙六錢一分生薑一兩大􅀥四錢右剉每服三字水煎服小柴胡湯治剛痓有熱方見傷寒門傷寒類通聖散治小兒中風痓病昏悶不醒一名至聖㪚蝎尾二十一枚晩􅁞蛾一十四枚天漿子一十四枚白附子半兩已上擣羅為細末次用入硃砂一分水飛麝香一錢研右拌匀細研每服一錢至半錢薄荷湯調入酒三兩滴同調下烏犀煎治痓病心肺中風並宜服之烏犀角一兩屑天南星半兩炮天麻半兩蝎稍半兩白附子半兩白花蛇半兩酒浸去皮骨炙黄右為末用無灰酒兩大盞入銀器中慢火􅆈成膏如皂子大每服一粒㸃麝香湯化下麻黄葛根湯治剛痓無汗麻黄去節赤芍藥各一兩半乾蝎五錢葱白三根豉三合右剉用水煎每服三字一方服了以厚衣蓋覆如人行四五里間再服良久如未得汗出更煮葱粥少許乗熱投之取汗硃砂散治小兒中風痙項强腰背硬四肢拘急牙闗緊神思昏悶硃砂三分雀兒飯瓮五枚蝎尾二七枚白附子二枚炮製為末晩􅁞蛾七枚右都研匀細不計時候以薄荷酒調下一字量兒大小加減服之大承氣湯治剛痓胷滿内實口噤咬齒方見傷寒門傷寒類理中湯治柔痓厥冷自汗人參川白薑炮甘草炒白术等分右剉散每服三字煎服三生飲治柔痓自汗肢體厥冷川烏生附子各半兩木香一分天南星生一兩右剉散每服一錢生薑五片慢火煎取其半通口服普濟方卷三百六十七
