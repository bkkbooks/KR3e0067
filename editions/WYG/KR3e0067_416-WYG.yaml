body:
  text: 普濟方卷四百十六明周王朱橚撰鍼灸門腧穴圖少商二穴木也在手大指端内側去爪甲角如韭葉明堂云白肉際宛宛中又云䧟中者以三稜針刺之微出血洩諸臟熱湊不宜灸昔成君綽忽顋頷腫大如升喉中閉塞水粒不下甄權針之竟愈明堂經云針一分留三呼㵼五吸宜針宜灸以三稜針刺之令血出勝氣針所以勝氣針者此脉脹顋之後顋中有氣人不能食故刺出血以宜者臟腠也忌令熱食下經云灸三壯甲乙經作乙壯銅人經云手太隂之脉所出也為井治煩心善噦心下滿汗出而寒欬逆痎瘧振寒腹滿唾沫唇乾引飯不下膨膨手攣指痛寒慄皷頷喉中鳴又云主不能食腹中氣滿喫食無味西方子云主嘔吐手不仁振慄欬逆喘及至脇下脹耳前痛魚際二穴火也在手大指本節後内側散脉中針一分留二呼素問主二分灸三壯銅人經云手太隂脉之所流也為榮治洒浙􅁖風寒虚熱舌上黄身熱頭痛欬嗽汗不出痺走胸背痛不得息目眩心煩少氣腹痛不下食肘攣痰滿喉中乾燥寒慄皷頷欬引尻痛溺出嘔血心痺悲恐針入二分留三呼又云主虚熱洒洒毛竪惡風寒喘痺少氣不足下濕隂痒喉中乾渇屋上氣熱病腹滿隂痿也不變肺心痛膈中虚食飲嘔身熱汗出重嘔吐血目泣出短氣逆氣任陽胃氣逆也西方子云土胃逆霍亂唾血吐血及主痓逆氣失瘖不能言及狂言大淵二穴土也在掌後䧟中灸三壯針一分素問注二分明堂下經云大淵在手中掌後横文頭䧟中灸五壯難經云掌中魚際下脉㑹大淵脉病治此又云主胸中氣滿不得卧肺脹滿膨膨然目中白翳掌中熱胃氣上逆唾血及狂言肘中痛銅人經云主胸痺逆氣寒戰善噦嘔飲水欬嗽煩悗不得卧肺脹滿膨膨臂内痛目生白翳眼皆赤筋缺分中引痛掌中熱數欠喘不得息噫氣上逆心痛唾血振寒咽乾狂言口噼又云手大隂脉之所注也同人曰大淵明堂大泉疑是二穴也千金方註云大泉即大淵避唐祖名改之於是書之以示世醫云泉脉青冷泉同經渠二穴金也在寸口䧟中針二分留三呼禁灸灸傷人神銅人經云手太隂脉之所行也為經治瘧寒熱胸背俱急痛胸滿膨膨喉痺掌中熱欬嗽上氣數欠及熱病汗不出暴癉喘逆心痛欲嘔吐鍼三分西方子云此穴不灸列缺二穴在腕側上一寸半明堂下經云腕上一寸以手交釵頭指末兩筋骨鏬中針二分留三呼㵼五吸灸七壯明堂經云針三分再灸七壯若患偏風灸至百壯若患腕勞灸至七壯下經云三壯素問註云腕上一寸半明堂經云在腕上一寸筋骨罅間宛宛中灸三壯主偏風半身不舉口喎腕勞肘臂痛及痛瘧面色不定銅人經云手太隂絡引走陽明療偏風口喎手腕無力半身不遂欬嗽掌中熱口噤不開寒瘧嘔沫善笑從唇口徤忘針二分留三呼㵼五吸可灸七壯慎酒麵生冷等物西方子云主汗出四肢腫小便熱痛主手臂身熱肩背寒慄少氣不足息寒厥交兩手而騖丸實則肩背汗出四肢暴腫虚則肩寒慄氣不足以息四肢厥喜笑身濕揺時時寒主熱癎驚而有所見主熱病煩心心悶先手臂身熱瘈瘲唇口聚鼻張目汗出如珠寒熱掌中熱主瘧寒熱及喉痺欬嗽不止及瘧甚熱口噤不開孔最二穴在腕上七寸明堂下經云䧟者宛宛中手太隂治熱病汗不出此穴可灸三壯即汗出欬逆臂厥痛針三分壯又云灸三壯明堂經云主肘臂厥痛屈伸難乎不及頭不握也銅人經云手太隂郄治吐血失瘖腫痛惡血尺澤二穴水也在肘中約上勲脉中針三分灸五壯明堂經云肘中約上兩筋動脉中甄權云在臂屈伸横文中筋骨罅䧟中不宜灸主癲病不可向手臂不得上頭素問刺禁云刺肘中内䧟氣歸之為不屈伸主云肘中謂肘屈折之中尺澤穴中也刺過䧟脉惡氣歸之氣閉闗節故不屈伸難經䟽言尺之一寸外為尺澤也言尺脉如澤尺水入大澤也銅人經云手太隂脉之所入也為合治風痺肘攣手臂不得舉喉痺上氣口乾欬嗽唾濁四肢暴腫臂寒短氣西方子云灸三壯小兒慢驚灸一壯支舌乾脇痛主心煩腹脹喘拒慄主嘔泄下上出兩脇下主欬逆上氣呼吸㤈唾濁沫膿血主掣痛手不可伸主肘痛時寒肩背寒痓肩甲内㢘痛氣隔喜嘔皷頷不得汗煩心身痛四肢暴腫銅人經云灸五壯明堂乃云不宜灸主癲病不可向手臂不得上頭既曰不宜灸矣又曰主癲病是則可灸也此必有誤且從銅人灸五壯明堂亦云禁穴許灸一壯至三壯故也俠白二穴在天府下去肘五寸動脉中針三分灸五壯西方子云主欬乾嘔煩滿主心痛氣短天府二穴在腋下三寸動脉中一云宛宛中以鼻取之禁灸使人逆氣今附刺鼻衂不止針四分留三呼又云針四分留七呼灸二七壯不除至百壯者出明堂經其甲乙經禁灸銅人經云治逆氣喘不得息目眩逺視􅉩􅉩卒中惡鬼疰不得安卧禁不可灸又云手太隂脉氣所發主頭眩目瞑西方子云灸五壯主身脹逆息不得卧風汗身腫喘息咳唾主上息喘不得上氣呼吸不知食味卒中惡風邪氣飛尸惡鬼語遁尸瘧病瘤癭氣咽腫泣出喜忘甲乙經銅人經皆云禁灸明堂乃云灸二七壯亦甚不同矣要非大急不必灸商陽二穴金也一名絶陽在手大指次指内側去爪甲角如韭葉留三壯針一分留一呼銅人經云手陽明脉之所出也為井治胸中氣滿喘欬肢腫熱病汗不出耳鳴耳聾寒熱痎瘧口乾頥頷􅀈齒痛惡寒肩背急相引缺盆痛目青盲可灸三壯右取左左取右如頃食立已西方子云及主胸脇柱滿二間二穴水也一名間谷在手大指次指本節前内側䧟中針三分灸三壯銅人經云手陽明脉之所流也為榮治喉痺頷腫肩背痛振寒鼻齀衂血多驚口喎眼斜又云主多卧喜睡肩髃痛喉痺咽如綆物傷忽振寒及傷寒熱三間二穴木也一名少谷在手大指次指本節後内側陷中針三分留三呼灸三壮銅人經云陽明脉之所注也為腧主喉痺咽如鯁多齒齲痛喜睡胸滿腹鳴唇焦口乾身熱喘息目背急痛西方子云主目上挿頭熱鼻􅍠衂血吐舌戾頸喜驚氣熱瘧病合谷二穴一名虎口在手大指次指岐骨間䧟中明堂云手大指兩骨罅間宛宛中針三分留三呼灸三壯今附若婦人姙娠不可刺刺之損胎氣在手大指兩骨間明堂經云主痎瘧寒熱熱病汗不出目不明生白翳肌膚痂疥徧身風疹銅人經云手陽明脉之所過也為原療鼻􅍠衂頭痛齒齲喉痺痿臂面腫唇吻不收瘖不能言口噤不開西方子云主風頭熱鼻清涕出陽谿二穴火也一名中鬼在腕中上側兩筋間䧟中針三分留七呼灸三壯銅人經云手陽明脉之所行也為經治狂言喜笑見鬼熱病煩心目風赤爛有翳厥逆頭痛胸滿不得息寒熱瘧疾喉痺耳鳴齒痛驚掣肘臂不舉痂疥可灸三壯愼如前法西方子明堂經云主目痛耳痛鳴聾咽如鯁吐舌戾頸妄言心悶而汗不出掌中熱心痛身熱漫涇煩滿及生舌本痛温溜二穴一名逆一名池頭在腕後大士三寸小士六寸針三分灸三壯明堂經云在腕後五寸六寸間脉中是穴主寒熱頭痛善噦衂肩不舉癲癎病吐舌皷頷狂言及喉痺不能言銅人經云一名蜿頭在腕後大五寸小上六寸手陽明治口喎腸鳴腹痛傷寒身熱頭痛噦逆肩不得舉癲疾吐涎狂言見鬼喉痺面虚腫西方子云在腕後小士五寸大士六寸主狂仆主瘧面赤腫下㢘二穴在輔骨下去上㢘一寸輔兊肉其分外斜針五分留二呼灸三壯銅人經云治頭風臂肘痛溺黄鍼入五分留五呼西方子云主腸鳴相追逐灸五壯資生經云此有下㢘足陽明亦有下㢘盖在足者及下巨虚也上㢘二穴在三里下一寸其分獨抵陽明之㑹外針灸五分灸五壯銅人經云治腦風頭痛小便難黄赤腸鳴氣走疰痛此有上㢘足陽明亦有上㢘盖在足者及上巨虚也三里二穴在曲池下三寸手陽明穴云二寸按之肉起兌肉之端灸三壯針二分明堂經云一名手三里在曲池下二寸主肘臂痠重屈伸難秦承祖云主五勞虚乏四肢羸瘦銅人經云治手臂不仁肘攣不伸齒痛頰頷腫瘰癧資生經云三里有二有手三里有足三里此手三里也故明堂云一名手三里是也銅人云三里在曲池下三寸明堂乃云二寸在手陽明穴亦云二寸恐銅人本誤二字作三字也偏厯二穴手陽明絡在腕徒三寸别徒太隂針二分留三呼灸三壯明堂下經云五壯銅人經云治寒熱瘧風汗不出目視眈眈癲疾多言耳鳴口喎齒齲喉痺嗌乾鼻􅍠衂血鍼入三分明堂經云在腕後三寸䧟者中灸五壯主瘧乆不愈手不及頭臂膊肘腕痠痛難屈伸曲池二穴土也在肘外輔骨屈肘兩骨中以手拱胸取之針七分得氣先㵼後補之灸大良可三壯明堂云曲池本也在肘外輔骨曲肘横文頭䧟中一云宛宛中曰灸七壯至二百壯且停十餘日更下火至二百壯罷忌同下經云在寸外輔屈肘曲骨中紋頭素問註肘外輔肘兩骨中千金云肘外曲頭䧟明堂經云主肘中痛屈伸難手不得舉偏風半身不遂捉物不得挽弓不開肘臂扁細秦承祖明堂云主大人小兒徧身風􅇙皮膚痂疥也銅人經云手陽明脉之所入也為合治喉痺不能言胸中短滿筋緩刺風􅐊疹痛及傷寒餘熱不盡皮膚乾燥又云灸亦良但令斷風抽氣而已西方子云肘寒臂朘細而無力及耳痛手不可舉重腕急肘節痺痠重腋急痛腕外側痛腕如㧞肩重痛不舉身濕揺明時寒瘈㿅癲疾寒熱渇肘髎二穴在肘大骨外㢘䧟中灸三壯針三分明堂經云一作肘聊主肘臂痠重麻痺不仁灸五壯銅人經云主肘節風痺臂痛不可舉屈伸攣急灸三壯西方子云灸三壯五里二穴在肘上三寸行向裏大脉中央灸十壯禁鍼素問氣穴諭云大禁二十五在天府下五寸註云謂五里穴也謂之大禁者禁不可刺也又曰五里者尺澤之後五里與此文同銅人經云治風勞驚恐吐血肘臂痛嗜卧四肢不得動揺寒熱瘰癧欬嗽目視眈眈痎瘧心下脹滿面痛上氣資生經云五里有二其一在足厥陰肝經部與此穴為二此當為手五里也素問所謂在天府下者指此五里也註云天澤之後五里指亦指此五里也尺澤穴在手太陰是也臂臑二穴在肘上七寸胭肉端手陽明絡灸三壯針三分明堂云在肩髃下一寸兩肋間兩骨罅䧟宛宛中平手取之不得挐手冷急其穴即閉宜灸不宜針日七壯至百壯若針不得過三過五多恐惡忌同千金名頭衝髎肩在肩部銅人經云治寒熱頸項拘急瘰癧肩背痛不得舉又云療勞癭臂細無力手不得向頭少衝二穴木也一名經始在小指内臁端明下作則去爪角如韭葉針一分灸三壯明堂云灸一壯又云灸三壯主心煩上氣卒心痛悲恐畏人易驚喜言手拳不得伸掌中熱痛也秦承祖明堂云臁主驚癎吐舌沫出也十金楊女橾同銅人經云手少陰脉之所出也為井治熱病煩滿痰冷少氣胷中痛口中熱咽中酸乍熱手攣不伸掌痛引肘腋痛西方子云主熱病心悶而汗不出及主身熱如火浸淫煩滿舌本痛咽酸太息少府二穴火也在手小指本節後䧟中直勞宫勞宫在手厥中灸二分灸七壯明堂云三壯銅人經云手少隂脉之所流也為榮治煩滿少氣悲恐畏人臂痠掌中熱肘腋攣急胷中痛手拳不得伸西方子云在手小指大節後䧟中有氣如息肉狀主小便不利便癃主數噫恐悸氣不足主陰痛實時梃長寒熱隂暴痛遺尿偏虚則暴癢氣逆明堂云主痎瘧灸不愈神門二穴土也一名兊衝在掌後兊骨端䧟中灸七壯炷如小麥針三分留七呼銅人經云手少隂脉之所主也為腧治瘧心煩甚欲得飲冷惡寒則欲處温咽乾不嗜食心痛數噫恐悸少氣不足臂寒喘逆身熱狂悲哭嘔血上氣遺溺大人小兒五癎西方子云笑若狂手掣攣攣主喉痺陰郄二穴在掌後脉中去腕五分針三分灸七壯銅人經云治失瘖不能言洒浙振寒厥逆心痛霍亂胷中滿衂血驚恐西方子云在掌後動脉中主氣驚通里二穴在腕後一寸䧟中針三分灸三壯明堂云灸七壯主頭目眩痛悲恐畏人肘腕痠重及暴病不能言語銅人經云主熱病卒心中懊憹數欠頻伸悲恐目眩頭痛面赤而兼心悸肘臂臑痛實則皮腫虚則不能言苦嘔喉痺少氣遺溺西方子云主熱病先不樂數目煩心靈道二穴金也去掌後一寸半或一寸灸三壯針三分銅人經云手少陰脉之所行也為經治心痛悲恐相引瘈瘲肘攣柱滿暴瘖不能言少海二穴水也一名曲節在肘内亷節後又云肘内大骨外去肘端五分屈肘得之針三分灸三壯甄權云出手向頭取之治齒寒腦風頭痛不宜灸針五分明堂云在肘内横紋頭屈手向頭取之䧟者宛宛中甲乙經云穴在肘内亷節後䧟中動應手針二分留三呼瀉五吸不宜灸下經云灸五壯素註云五壯銅人經云手少陰脉之所入也為合治寒熱齒齲痛目眩發狂嘔吐涎沫項不得回顧肘攣腋脇下痛四肢不得舉又云療腋下瘰癧痺痛屈伸不得風痺疼疰病西方子云主頭痛汗出寒熱不惡寒及主肩臂不舉不能帶衣項強急痛不可以顧主氣逆呼吸噫噦嘔羊癲疾羊癎吐舌沫出羊鳴戾頸主手臂攣主瘧振寒項痛引腋肘痛引少腹中及目黄脇痛銅人經云灸三壯明堂下經素問註皆云灸五壯上經甄權皆三不宜灸亦可疑矣非大急亦不必灸青靈二穴在肘上三寸伸肘舉臂取之灸七壯明堂下經云灸三壯銅人經云治肩臂不舉不臂帶衣頭痛振寒目脇痛極泉二穴在腋下筋間動脉入胷灸七壯針三分銅人經云治心痛亁嘔四肢不收咽亁煩渇臂肘厥寒目黄脇滿痛少澤二穴金也一名小吉在手小指端外側去爪甲下一分䧟中灸二壯針一分銅人經云一名少吉手太陽脉之所出為井也主瘧寒熱汗不出喉痺舌強口亁心煩臂痛瘈瘲頭痛咳嗽頸項急不可顧目生膚翳覆瞳子西方子云主口熱口亁咽中亁口中熱唾如膠主振寒小指不仁前谷二穴水也在手小指外側本節前䧟中針一分灸一壯明堂云灸三壯銅人經云手太陽脉之所流也為勞治熱病汗不出痎癲疾耳鳴頷腫喉痺欬嗽衂血頸項痛鼻塞不利目中白翳臂不得舉又云主目眩淫溜轉甲小指痛西方子云主目泣出急痛吸咽徧腫不可以咽臂重痛肘攣痎瘧執目上挿便小赤後谿二穴木也在手小指外側本節後䧟中灸一壯針一分明堂經云在手外側腕前起骨下䧟中灸三壯主痎瘧寒熱目生白翳肘臂腕重難屈伸五指盡痛不可掣銅人經云手太陽脉之所注也為腧治目赤鼻衂耳聾胸滿頸項強不得回顧癲疾肘臂攣急西方子云主目淚出􅗃爛有翳耳鳴鼻窒喘息不通有臑痛臂肘攣急風身寒泣出而驚熱病不出汗身熱惡寒腕骨二穴在手外側腕起骨下䧟中灸三壯針二分留三呼銅人經云手太陽脉之所過也為原治熱病汗不出脇下痛不得息頸頷腫寒熱耳鳴目冷淚生翳狂陽偏枯臂肘不得屈伸痎瘧頭痛煩悶驚風瘈瘲五指掣不可屈伸西方子云主頸項痛不可顧目泣出頷痛引耳嘈嘈無所聞肘節痺臂痠重腋急臂腕急外側痛如脫煩滿狂言臂肩疼痛乍寒乍熱陽谷三穴火也在手外側腕兊素問作銳骨下䧟中灸二壯針二分留二呼銅人經云手太陽脉之所行為經也主癲疾狂走熱病汗不出脇痛頸頷腫寒熱耳聾鳴上下牙齒禹齒痛臂腕外側痛不舉肩頸妄吐舌不得左右顧俛仰瘈瘲頭目眩痛西方子云主項強急痛目赤頷痛引耳嘈嘈無所聞自囓唇肘痛時寒熱病振慄鼔腹頷滿隂痿色不變乍寒乍熱瘧主笑苦狂痔痛腋下腫養老二穴在手踝骨上空一寸䧟中灸三壯針三分銅人經云手太陽郄主肩欲折臂如折手臂痛不能自上下目視不明支正二穴在腕後五寸别走少隂灸三壯針三分明堂云在手太陽腕後五寸去養老穴四寸䧟中灸五壯主驚恐悲愁肘臂攣難屈伸不握十指盡痛也秦承祖云兼治五勞四肢力弱虚乏等病銅人經云治寒熱頷腫肘攣頭痛目眩風虚驚恐狂揚生􅀈目西方子云主頸腫項痛不可顧狂言熱病先腰脛痠喜渇數飲食身熱項痛而振寒熱少海二穴土也在肘内大骨外去肘端五分䧟中甄權云屈手向頭取之灸三壯針二分銅人經云手太陽脉之所入為合治寒熱齲齒齗腫風眩頸項痛瘍腫振寒肘腋腫少腹痛四肢不舉西方子云灸五壯主項強急痛不可以顧癎發瘈瘲狂走不得卧心中煩癲疾羊癎吐舌羊鳴戾頸瘧背振寒及風瘧頭痛寒熱汗不出惡寒中衝二穴木也在手中指端去爪甲如韭葉䧟中針明堂云灸一壯主熱病煩心心悶而汗不出身熱如火頭痛如破煩滿舌本痛秦承祖云兼主神氣不足失志也銅人經云手厥隂心主脉之所出也為井西方子云主肘痛掌中心熱心痛浸淫勞宫二穴火也一名五里在掌中央横紋動脉中屈無名指着處是灸三壯明堂經云針二分得氣即瀉只一度針過兩度令人虚不得灸灸令生息肉月加忌同素注云灸三壯一名掌中銅人經云手厥隂脉之所流也為榮治中風善怒悲快不休手痺熱病三日汗不出休愓胷脇痛不可轉側大小便血衂不止氣逆嘔噦煩渇食飲不下大小人口中腥臭胸脇支滿黄疽目黄又云主手掌後􅂒痺手痺白屑起西方子云主喉嗌痛主嘔吐主風熱心中悲喜思慕歔郄喜笑不止及口中爛掌熱主熱痔欬逆溺血資生經云趙岐釋孟子云無名之指手第四指也今目屈無名指着處是穴盖屈第四指也無名指當屈中指為是今說屈第四指非也大陵二穴土也在掌後兩筋間陷中針五分灸五壯銅人經云手厥隂脉之所注也為腧治熱病汗不出臂攣腋腫善笑不休心懸若飢喜悲泣驚恐目赤小便如血嘔逆狂言不樂喉痺口亁身熱頭痛短氣胸脇痛西方子云主心痛欬逆寒熱發手掣手攣及主風熱善怒心中悲喜思慕歔欷喜笑不止主心下詹詹主掌中熱身如火浸􅁋煩滿舌本痛主瘧乍寒乍熱主欬喘主嘔血主胸中痛主痂疥内闗二穴在掌後去腕二寸别走少陽針五分灸三壯西方子云主面赤熱青􅉩􅉩昏夜無所見主赤支滿中風肘攣實心暴痛虚則心煩惕惕門使一穴金也在掌後三寸兩筋間陷中針三分灸五壯明堂經云七壯千金云腕後三寸或云掌後陷中又云主卒狂驚悸臂中腫痛屈伸難岐伯云主鬼神邪也銅人經云手厥隂脉之所行也為經治心懸如飢卒狂胸中詹詹惡風寒嘔吐怵惕寒中少氣掌中熱腋腫肘攣卒心痛多驚瘖不得語咽中如鯁西方子云灸七壯主心胸痺背相引主嗌中如振主肘内亷痛主熱病煩心喜噦喜動為熱郄門二穴去腕五寸手厥隂郄針三分灸五壯銅人經云治心痛衂血嘔噦驚恐畏人神氣不足及嘔血西方子云在掌後去腕五寸曲澤二穴水也在肘内亷陷中屈肘取之灸三壯針三分留七呼素問云主内亷下銅人經云厥陰心主脉之所入也為合治心痛善驚身熱煩渇口亁氣逆嘔血風膠臂肘手腕善動揺又云主心下詹詹時瘈瘲喜揺頭顔青汗不出不過肩傷寒病温温身熱西方子云主嘔逆或血掣手不可伸天泉二穴一名天濕在曲腋下二寸舉臂取針六分灸三壯銅人經云治心病胸脇支滿欬膺背胛間臂内亷痛闗衝二穴金也在手小指次指端去爪甲角如韭葉針一分灸一壯忌同素問註云三壯一云屈拳取之銅人經云手少陽脉之所出也為井治喉痺舌卷口亁頭痛霍亂胸中氣噎不嗜食臂肘痛不可舉目生翳膜視物不明慎猪魚酒麫生冷之物西方子云在手小指端主風眩心煩臂外亷痛手不及頭左取左右取右主肘疼不能自帶衣主屑臂痠重面黑渇風熱病煩心心悶而汗不出掌中熱心痛身熱如火浸􅁋煩滿舌本痛寒熱悽素氣上不得卧霍亂肩中熱頭不可以顧液門二穴水也在手小指次指間陷中針二分灸三壯一云屈拳取之明堂經云生肘痛不能行上下㾬瘧寒熱目澁􅉩􅉩痛泣出也一作腋門銅人經云手少陽脉之流也為榮治驚悸妄言咽外腫寒厥手臂痛不能自上下痎瘧寒熱目眩頭痛暴得耳聾目赤澁齒齲痛西方子云主呼吸短氣咽如息肉狀面赤熱病先不樂面熱無汗風寒熱耳痛鳴聾中渚二穴木也在手小指次指本節後間陷中針三分灸三壯明堂經云灸二壯主目􅉩􅉩無所見肘臂痠痛手五指不屈盡痛也銅人經云手少陽脉之所注也為腧治熱病不出目眩頭痛耳聾目生翳膜久瘧咽腫西方子云主頭目重額顱熱痛面赤目不明惡風寒嗌痛寒熱耳痛嘈嘈手五指不得屈伸陽池二穴一名别陽在手表腕上陷中針二分留三呼不可灸忌同素問註云灸三壯銅人經云手少陽脉之所過為原治寒熱瘧或因折傷手腕提拘不得肩臂痛不得舉慎生冷物等西方子云主熱病汗不出外闗二穴正少陽絡在腕後二寸陷中針三分留七呼灸二壯明堂經云三壯又云在腕後二寸陷中者宛宛中主肘腕痠重屈伸難手十指盡痛不得屈兼主耳淳淳渾渾聾無所聞也銅人經云手少陽絡西方子云主臂痿不仁臂不及頭支溝二穴火也在腕後三寸兩骨間陷中針二分灸七壯忌同明堂經云五壯素問註云三壯千金云腕後臂外三寸明堂經云主熱病汗不出肩背痠重脇腋急痛四肢不舉口噤不開暴哂不能言也銅人經云手少陽脉之所行也為經治霍亂嘔吐慎酒麫生冷猪魚物西方子云主心痛如錐刺甚者手足寒至節不息者死主欬面赤而熱肘節痺腋熱馬刀腫痿主漏主痂疥女人脊急目赤嗌痛㑹宗二穴在腕後三寸空中一寸針三分灸三壯銅人經云治肌膚痛耳聾風癎西方子云主耳渾渾淳淳聾無所聞三陽絡二穴在臂上大交脉明云肘前五寸卧亷陷中支溝上一寸禁針灸七壯明堂經云五壯銅人經云治嗜卧身體不欲動揺耳卒聾齒齲暴􅂒不能言天井二穴土也在肘外大骨後肘上明堂作後一寸兩筋間屈肘取之甄權云曲肘後一寸义手按膝頭取之兩筋骨鏬針三分灸三壯忌同明云五壯素問註刺一寸千金云肘後兩筋間明堂經云主肘痛引肩不可屈伸頸項及肩背痛臂痿不仁驚悸悲傷癎病羊鳴吐舌也銅人經云手少陽脉之所入也為合治心胷痛欬嗽上氣唾膿不嗜食驚悸瘈瘲風痺臂肘痛捉物不得慎如常法西方子云主大風黙黙不知所痛悲傷不樂悲愁恍惚瘧食時發心痛主癲笑驚掣羊癎戾頸肩肉麻木四凟二穴在肘前五寸外亷陷中灸三壯針六分留七呼銅人經云治暴氣耳聾齒齲痛西方子云主呼吸短氣咽中如息肉狀清冷淵二穴在肘上二寸伸肘舉臂取之灸三壯針三分西方子云一名清冷泉在肘後三寸又名清靈主臑從肩不舉不能帶衣頭痛振寒目黄脇痛消濼二穴在肩下臂外腋斜肘分下行針一分灸二壯明堂云在肩下外闗腋斜肘分下行六分灸三壯素問註云肩下臂外闗腋銅人經云治寒熱風痺項痛肩急西方子云主頭痛項如拔不可左右顧頸有大氣大敦二穴木也在足大指端去爪甲如韭葉及三毛中灸三壯針三分留六呼千金云足大指聚毛中銅人經云足厥隂脉之所出也為井治卒疝小便數遺溺隂頭中痛心痛汗出隂跳上入腹隂偏大腹臍中痛悒悒不樂病左取右右取左腹腫脹滿少腹痛中熱不寐尸厥足壯如死及婦血崩不止西方子云一名大訓主目不欲視大息五淋不得尿噦噫行間二穴火也在足大指間動脉應手陷中灸三壯針六分留十呼銅人經云足厥隂脉之所流也為榮治溺難又白濁寒疝少腹腫欬逆嘔血腰痛不可俛仰腹中脹心痛面色蒼蒼如死狀終日不得息口喎四肢逆冷嗌亁煩渇瞑不欲視目中淚出大息癲疾短氣不閉西方子云主莖中痛胷背痛心悲不樂數欠及主婦人月事不利見赤白而有身反敗隂振寒溲白尿難痛大衝二穴土也在足大指本節後二寸或一寸半陷中令附凡診大衝脉可訣男子病死生針三分留十呼灸三壯明堂云在足大指本節後二寸骨罅間陷中灸五壯素問註云在足十指間本節後二寸動脉應手刺腰痛又云在大指本節後内間二寸明堂經云主卒疝小腹痛小便不利如淋狀及月水不通銅人經云足厥隂脉之所注也為腧治腰引少腹痛腫㿉疝溏洩遺溺隂痛面目蒼色胸脇支滿足寒大便難嘔血女子漏血不止小兒卒疝嘔逆發寒嗌乾肘腫内躁前痛􅁋樂䯒痠腋下腫馬刀瘍瘻唇痛西方子云主善渇喉中鳴不得尿隂上痛溏泄泄血面陳黑中封二穴金也在足踝前一寸仰足取之陷中伸足乃得之針四分留七呼灸三壯素問註云内踝前一寸半甲乙經云一寸又云内踝前一寸斜行小脉上一名懸泉銅人經云足厥隂脉之所在為經治欬瘧色蒼蒼振寒少腹腫食怏怏繞臍痛足逆冷不嗜食身體不仁寒疝相引腰中痛或身㣲熱西方子云主小腹痛振寒溲白尿難痛嗌亁善渇身黄有㣲熱少氣身重濕内踝前痛膝腫瘈厥身體不仁癲疝癃暴痛瘻痛咽徧腫不可以咽蠡溝二穴在足内踝上五寸别走少陽針二分留三呼灸三壯又云交儀在内踝上五寸陷中恐即蠡溝穴但别出蠡溝故不同曉蠡溝亦名交儀銅人經云足厥隂絡治足疝少腹腫時少腹暴痛小便不利如癃閉數噫恐悸少氣不足腹中痛悒悒不樂咽中悶如有瘜肉狀背拘急不可俛仰西方子云主女子赤白􅁋下時少腹暴刺痛明堂云治卒疝小腹痛及婦人漏下赤白月水不調臍下即氣如卵右足寒頸痠屈伸難也又云灸七壯中都二穴一名中郄在内踝上七寸䯒骨中與少隂相直針三分灸五壯銅人經云治腸癖㿉疝少腹痛婦人崩中因産惡露不絶西方子云治足下熱脛寒不能久立濕痺不能行膝闗二穴在􅀈鼻下二寸陷中針四分灸五壯􅀈鼻在足陽明治風痺膝内痛引臏不可屈伸咽中痛銅人經曲泉二穴水也在膝内輔骨下大筋上小筋下陷中屈膝取之又云正膝屈内外兩筋間宛宛中又在膝曲横紋頭針六分灸三壯銅人經云足厥隂脉之所入也為合治女子血瘕按之如湯浸股内少腹腫隂梃出丈夫㿉疝隂股痛小便難腹脇支滿癃閉少氣洩利四肢不舉實即身熱目眩痛汗不出目􅉩􅉩膝痛筋攣不可屈伸發狂衂血喘呼少腹痛引喉咽及治風勞精神體極痛洩水下痢膿血隂腫䯒鍼入六分留十呼隂包二穴在膝上四寸股内亷兩筋間足厥隂走治要尻引少腹遺溺不禁鍼六分灸三壯明堂云七壯主腰痛連小腹腫小便不利月水不調五里二穴在氣衝下三寸隂股内動脉灸五壯針六分治腸中滿熱閉不得溺氣衝在腹部第三行隂亷穴氣衝同西方子云主嗜卧四肢不得動揺隂亷二穴在陽矢下去氣衝二寸動脉中灸三壯針八分留七呼銅人經云治婦人絶産若未經生産者灸即有子竅隂二穴金也在足小指次指端去爪甲如韭葉灸三壯針一分銅人經云足少陽脉之所出也為井治脇痛欬逆不得息手足煩熱汗不出轉筋癰疽頭痛心煩喉痺舌強口亁肘不可舉卒聾不聞人語王氏竅隂有二其一在此其一則在頭部此當為足竅隂也俠谿二穴水也在足小指次指岐骨間本節前陷中灸三壯針三分明堂云臨泣去俠谿一寸半銅人經云足少陽脉之所流也為榮治胷脇支滿寒熱汗不出外眥赤目眩煩額腫耳聾胷中痛不可轉側痛無常處西方子云主目系急目上挿背痛逆寒泣出目癢頷痛引耳嘈嘈無所聞瘧足痛腋下腫馬刀瘻婦人小腹堅痛月水不通乳腫潰胷中寒如風狀頭眩兩頰痛明堂經云主耳鳴聾地五㑹二穴在足小指次指本節後陷中去俠谿一寸針一分不可灸灸使人羸瘦不出三年卒銅人經云治傷内唾血足外膚不澤乳腫針三分臨泣二穴木也在足小指次指本節後間陷中去俠谿一寸半灸三壯針二分明堂經云主胷膈滿悶腋下腫善自嚙頰并瘧病日四發者銅人經云足少陽脉之所注也為腧治胸中滿缺盆中及腋下腫馬刀瘍瘻天牖中腫􅁋樂䯒痠目眩枕骨合顱痛洒浙振寒婦人月事不利季脇支滿乳癰心痛周痺痛無常處厥逆氣喘不能行西方子云主枕骨頷厭懸足痛大風目痛髀中痛不得行足外使痛身痺洒淅振寒及小兒驚癎反視王氏云偃伏第三行既有臨泣穴盖足以此亦有臨泣穴盖足臨泣也邱􅇕二穴在外踝下如前陷中去臨泣寸許灸三壯針五分留七呼銅人經云足少陽脉之所過也為原治胸脇滿痛不得息久瘧振寒腋下腫痿厥坐不能起髀樞中痛目生翳膜腿䯒痠轉筋卒疝少腹堅寒熱頸腫西方子云主瘧振寒腕不收目不明明胸脇痛善太息胸滿膨膨然足脛偏細懸鍾二穴在足外踝上三寸動脉中一名宛宛中針六分留七呼灸五壯千金云一名絶骨外踝上三寸又云四寸明堂經云主心腹脹滿胃中熱不嗜食膝脛連經痛筋攣急足收履坐不能起銅人經云足三陽之大絡按之陽明脉絶乃取之西方子云主五淋濕痺流腫筋急瘈瘲脛痛小兒腹滿不能食飲四肢不舉風勞身重明堂經云主腹滿中焦客熱不嗜食并腿胯連脛痺麻屈伸難也陽輔二穴火也在足外踝上四寸輔骨前絶骨端如前三分去邱墟七寸灸三壯針五分留七呼千金云外踝上輔骨前銅人經云足少陽脉之所行也為經治腰溶溶如坐水中膝下膚腫筋攣諸節盡痛痛無常處腋下腫瘻馬刀喉痺膝䯒痠風痺不仁西方子云主腰痛不可以顧腰痛如錘居中痛不可以欬則筋縮急諸節寒熱脇痛光明二穴在足踝上五陷中針六分留七呼灸五壯明堂下經云七壯治䯒疼不能久立舉陽輔療病同又云在膝脛痠痺不仁手足偏小坐不能也銅人經云别走厥隂足少陽絡治身解寒淫樂及熱病汗不出卒狂虚則痿痺坐不起實則足䯒熱膝痛身體不仁善囓頰西方子云主脛痠不能久立腹足清寒熱膝痛脛熱不能行手足偏小外邱二穴在足外踝上七寸針三分灸三壯銅人經云少陽所生治膚痛痿痺胸脇脹滿頸項痛悲風寒癲疾今附猘犬所傷毒不止發寒熱速以三姓人可灸所囓之處立愈陽交二穴一名别陽在外踝上七寸斜屬三陽分肉之間灸三壯針六分留七呼千金云一名足窌在外踝上七寸一云三寸銅人經云陽維郄治寒厥驚狂喉痺胷滿面腫寒痺膝䯒不收寒熱陽陵泉二穴土也在膝下一寸外亷陷中針六分得氣即㵼又宜灸留針灸七壯至七七壯即止明堂下經云一壯素問註云三壯千金云膝下外尖骨前難疏脛骨中㣲側少許筋㑹陽陵泉筋病治此銅人經云足少陽脉之所出也為合治膝伸不得屈冷痺脚不仁偏風半身不遂脚冷無血色又以蹲坐取之灸亦良可灸七壯至七七壯即止西方子云在外踝上七寸主頭痛寒熱口苦嗌中介介頭面腫胷脇柱心中􅇶愓驚恐人將捕明堂經云主膝腹内外亷痛不仁屈伸難及喉中鳴陽闗二穴在陽陵泉上三寸犢鼻外陷中針五分不可灸千金云陽闗一云闗陵銅人經云治膝外痛不可屈伸風痺不仁中瀆二穴在髀骨外膝上五寸分肉間陷中灸五壯針五分留七呼銅人經云足少陽絡治寒氣入於分肉之間痛攻上下筋痺不仁西方子云不可灸環跳二穴髀樞中側卧伸下足屈上足取之灸五十壯針一寸留十呼忌同明堂下經云在硯子骨宛宛中灸三壯甲乙經云五壯明堂經主冷痺風濕偏風半身不遂腰胯疼痛不得轉側岐伯云睡卧伸縮回轉不得也西方子云治風濕痺風胗及胸脇疼無常處腰脇相引急痛髀樞中痛不可屈伸脛痺不仁髀不仁銅人經云忌熱麫猪魚生冷物等風市二穴在膝外兩筋間立舒下兩手着腿當中指頭陷中療冷痺脚脛麻腿膝痠痛腰尻重起坐難明堂經云陷者宛宛中灸三壯王氏云予冬月當風市處多冷痺急擦熱手温之畧止日或兩三痺偶謬刺温針遂愈信乎能治冷痺也亦瘻灸此不特治冷痺亦治風之腰穴銅人乃不載一名或不同將其本不全耶隠白二穴水也在足大指端内側去𤓰甲角如韭葉宛宛中針三分今附婦人月事過時不止刺立愈明堂云針一分留三呼灸三壯銅人經云是太隂脉之所出也為井治腹脹喘滿不得安卧隔中嘔血食不下暴洩衂止足寒不能温又云治腹中脹逆氣滿胸中熱身體疼痛西方子云主腹痛及腹中寒冷氣主飲渇主踁中寒熱主卒尸厥不知人脉動如故及胸中痛太都二穴火也在足大指本節後陷中灸三壯針三分千金註云本節内側白肉際明堂經云主熱汗不出手足逆冷腹滿善嘔目眩煩心四肢腫病銅人經云足太隂脉之所流為榮治熱悶吐逆西方子云主目眩暴泄心痛腹脹熱病汗不足清厥逆霍亂目上挿太白二穴土也在足内側核骨下陷中灸三壯針三分千金云足大内側銅人經云足太隂脉之所注也為腧治身熱煩滿腹脹食不化氣脹腹鳴嘔吐洩有膿血腰痛大便難氣逆霍亂腹中切痛西方子云主頭痛寒熱汗出不惡寒胸脇脹衂痛腰痛不可俛仰熱病頭重煩悶身熱公孫二穴在足大指本節後二寸灸三壯針四分銅人經云别走陽明太隂絡治寒瘧不嗜食卒面腫煩心狂言腹虚脹如鼓西方子云主頭面腫腹内氣太滿啇邱二穴金也在足内踝下㣲前陷中灸三壯針三分銅人經云足太隂脉之所行也為經治腹中腸中鳴不便脾虚冷人所樂身寒善太息心悲氣逆痔疾骨疽蝕絶子厭鬼夢西方子云主心下有寒痺疼脾熱脾虚腹脹滿不得息善嘔心煩滿骨痺癲疾癎病寒瘧腹中痛痎瘧主痔血泄後重隂股内痛氣癰狐疝走上下引小腹痛不可俛仰小腹堅痛下引隂中三隂交二穴在内踝上三寸骨下陷中明堂云内踝上八寸陷中千金方云内踝上八寸骨下灸三壯針三分銅人經云足太隂厥隂之交㑹治痃癖腹中寒膝股内痛氣逆小便不利脾病身重四肢不舉腹脹腸鳴溏洩食不化女子漏下不止西方子云王膝内亷痛痿不能行資生經云昔宋太子善醫術出苑逢一姙婦太子診曰女令徐文伯診曰一男一女針之瀉三隂交合谷應針而􅀈􅀈果如文伯言故姙娠不可刺漏谷二穴一名太隂絡在内踝上六寸骨下陷中針三分明堂云灸三壯又云在足外踝上六寸陷者主足熱痛腿冷疼不能久立也銅人經云治痃癖冷氣心腹脹滿食飲不為肌膚濕痺西方子云主腸鳴強欠心悲氣逆腹䐜滿急小便不利失精久濕痺不能行麻痺不仁地機二穴亦名脾寒足太隂郄别走上一寸空在膝下五寸灸三壯針三分明堂云膝内側轉骨下陷中伸足取之主腰疼不可俛仰足痺痛屈伸難也銅人經云治女子血瘕按之如湯沃股内至太背痛丈夫溏洩腹脇氣脹水腫腹堅不嗜食小便不利西方子云治癥瘕腹中痛臟痺㿗疝精不足隂陵泉二穴水也在膝下内側輔骨下陷中伸足取之針五分當曲膝取之銅人經云足太隂脉之所入也為合治腹中寒不嗜食膈下滿水脹腹堅喘逆不得卧腰痛不得俛仰霍亂疝瘕小便不利氣閉淋寒熱不節西方子云灸三壯主心下滿寒中脇下滿腹中盛足痛失禁遺尿胸中熱暴泄脹滿不得息腎病氣癃尿黄婦人疝瘕按之如以湯沃股膝飱飱隂痛小腹堅急重下濕不嗜食腰痛血海二穴在膝臏上内亷白肉際二寸中一作一寸灸二壯針五分千金云白肉際二寸半注云一作三寸銅人經云治女子漏下惡血月事不調逆氣腹脹西方子云灸五壯主漏下苦血閉不通月水不調箕門二穴在魚腹上越筋間動脉應手在隂股内一云股上起筋間灸三壯銅人經云治淋遺溺鼠鼷腫痛小便不通西方子云主隂跳厲兊二穴金也在足大指次指端去爪甲如韭葉針一分灸一壯明堂經云主尸厥如死不知人多睡善驚西方子云上腫也銅人經云足陽明脉之所出也為井治尸厥口禁氣絶狀如中惡心腹脹滿熱病汗不出寒熱瘧不嗜食面腫足䯒塞喉痺齒齲惡風鼻不利西方子云主鼻不利涕黄哽咽不得卧腰寒心痛脹滿不得息吐舌戾頸内庭二穴水也在足大指次指外間陷中灸三壯針三分銅人經云足陽明脉之所流也為榮治四肢厥逆腹脹滿數欠惡聞人聲振寒咽中引痛喎齒齲痛瘧不嗜食西方子云主厥逆僻禁腹脹滿不得息喜頻伸數欠陷谷二穴木也在足大指次指外間本節後陷中去内庭二寸針三分留七呼灸三壯明堂云一名陷骨主卒疝小腹痛頭面虚腫及痃瘧發寒熱也銅人經云足陽明脉之所注也為腧治面目浮腫及水痛善咽腸鳴腹痛熱病汗不出振寒瘧疾西方子云主胸脇支滿腹滿善噫癰腫衝陽二穴在足跗上去陷谷三寸針五分灸三壯素問注跗上五寸骨間動脉刺三分千金跗上五寸骨間去陷谷三寸一云二寸銅人經云足陽明脉之所過也為原治偏風口眼喎斜肘重齒齲痛發寒熱腹堅大不嗜食振寒久狂登髙而歌棄衣而走足緩履不收西方子云穴在足跗上五寸骨間去陷谷二寸主面浮腫足痿又主熱病汗不出振寒而戰欠先寒洗浙甚久而熱熱去汗去之瘧瘧從足起腹大腹小解谷二穴火也在衝陽後寸半腕上陷中明堂下經云在繫鞋處針五分灸三壯素問註在衝陽後二寸半刺瘧註作三寸半二註不同當從甲乙經作寸半明堂經云主上氣喘嗽欬息急腹中積氣上不行及目生白翳也銅人經云足陽明脉之所行也為經治風面浮腫顔黑厥氣上衝腹脹大便不通瘈驚膝股䯒腫轉盼目眩頭痛癲疾煩心悲泣霍亂頭風面目赤西方子云治口齒痛胻痠轉筋濕痺腹大下腫風水面肘腫刺瘧口痛囓舌豐隆二穴在外踝上八寸下亷䯒外兼陷中針三分灸三壯明堂下經云七壯明堂經云主四肢不收身䯒倦怠膝腿痠痺屈伸難銅人經云别走太隂治厥逆胸痛如刺腹中切痛大小便難澁厥頭面浮腫風逆四肢腫身熱喉痺不能言西方子云主頭痛寒熱汗出不􅁖寒大小便難澁不能食狂妄言登髙而歌棄衣而走厥逆手足青痛如刺煩心狂見鬼好笑下亷二穴一名下巨虚在上亷下二寸當舉足取穴針八分灸三壯明堂云上亷下三寸兩筋兩骨罅陷宛宛中蹲地坐取之針六分得氣即瀉甲乙云針三分灸三壯主小腹氣不足面無顔色偏風熱風冷痺不遂風濕痺灸亦良日七七壯不及針灸瘡瘥冷痺則已素問註云足陽明與小腸合在上亷下三寸針三分銅人經云治少腹痛飱洩次指間痛唇亁涎出不覺不得汗出毛髮焦脫肉少氣胃中熱不嗜飲食洩濃血胸脇腹痛暴驚狂言非常女子乳癰喉痺䯒腫足跗不收鍼入八分可灸三壯西方子云治寒濕下注小便難黄資生經云手陽明亦有下亷此乃足下亷也條口二穴在下亷上一寸舉足取之針五分又明堂云在上亷下一寸針八分灸三壯銅人經云治膝䯒寒疼痛足緩失履不收濕痺針五分又云陽明脉氣所發主脛寒不得卧足下熱不能久立上亷二穴一名上巨虚在三里下三寸當足取之灸三壯針三分甄權云治臟氣不足偏風腲腿手足不仁灸隨年為壯明堂云且虚上亷在三里下三寸兩筋兩骨罅陷宛宛中針八分得氣即㵼灸大良日七壯明堂下經云灸三壯素問註在三里下三寸又云在膝犢鼻下䯒外亷六寸明堂云三里穴下二寸䯒骨外大筋内筋骨之間主脚脛痠痛屈伸難不能久立銅人經云治飱洩腹脇肢滿走挾臍腹痛食不化喘息不能行可灸三壯鍼入三分又云足陽明與太陽氣不足偏風腲腿不隨脚不得履地脚氣刺風痶風脚冷寒瘧灸之大良西方子云主小便難黄風水膝腫資生經云手陽明亦有上亷此乃足上亷也三里二穴土也在膝下三寸䯒外亷兩筋間一云䯒外大筋内骨中間一云陷者宛宛中當舉足取之泰承祖云諸病皆治食氣水氣毒痃癖四肢腫滿膝䯒痠痛目不明華佗云療五勞羸瘦七腹虚之胸中瘀血乳癰大小人熱皆調三里外臺明堂云人年三十已上若不灸三里令氣上衝目所以三里下氣也明同灸三壯針五分明堂云針腹背每須去三里穴針八分留十呼㵼七吸日灸七壯上百壯素問註刺一寸在膝下三寸䯒骨外亷兩筋肉分間指云深則足扶陽脉覔集云按之大衝脉不動明堂云主臟腑久積冷氣心腹脹滿胃氣不足聞食則腸鳴腹痛灸三壯銅人經云足陽明脉之所入也為合主胃寒腰滿堅見不能食及胃胸脇積氣脚弱針入八分灸亦良又云主胸中氣不足西方子云灸三壯主喉痺不能言脇中暴逆不得息咳嗽多唾主肘痛時寒腰痛不可以顧足痿失履不收足下熱不能久立瘧少氣腸鳴腹痛胸腹中瘀血水腫腹脹隂氣不足小腹堅熱病汗不出喜嘔口苦壯熱身反哲禁鼓頷腰痛視而有所見喜悲上下永之口僻乳腫目不明久㵼痢食不化脇下注滿膝痿寒熱中消谷不肌腹熱身煩狂言癰狂歌妄笑恐怒大罵霍亂遺尿失氣陽厥悽悽惡寒頭眩小便不利凡此等疾皆灸之多至五百壯少至二三百壯資生經云手有三里此亦曰三里盖足三里也銅人經云在膝下三寸明堂素問註背同人多不能求其穴每以拇指次指圏其膝盖以中指住處為穴或以最小指住處為穴皆不得真穴所在也予按明堂有膝眼四穴盖在膝頭骨下兩傍陷中也又按銅人等經有犢鼻穴盖在膝臏下骭挾罅大筋中也又按銅人有膝闗二穴盖在犢鼻二寸陷中也素問註巨虚上亷云三里在犢鼻下三寸則是犢鼻之下三寸方是三里不可便從膝頭上去三寸為三里穴也若如今人之取穴恐失之太髙干金云灸至五百壯少至二百壯犢鼻二穴在膝下骭俠解明堂作罅大筋中治膝中痛不仁難跪起膝臏腫潰者不可治不潰者可療若犢鼻堅硬勿便攻以洗熨即㣲刺之愈明堂云針三分灸三壯銅人經云治膝中疼痛不仁難跪起膝臏癰腫潰者不可治不潰者可療若犢鼻堅硬勿便攻先以洗熨即㣲刺之愈又云足陽明脉氣所發主犢鼻腫洗熨去之其久堅勿攻攻者死資生經云按素問刺禁云刺膝臏出液為跛犢鼻在臏下骭用針者不可輕也梁邱二穴在膝上二寸明堂云二寸兩筋間灸三壯針三分明堂云五分明堂作三寸銅人千金皆作二寸千金註胃或云三寸銅人經云治大驚脛痛寒痺不能屈伸又云足陽明郄治脛膝痛西方子云灸三壯注筋攣不得屈伸不可以行隂市二穴一名隂鼎在膝上三寸伏下陷中又云宛宛中拜而取之針三分不可灸明堂下經云灸三壯千金注二十卷云在膝上當伏不行二寸臨膝取之又云膝内輔骨後大筋下小筋上屈膝得之明堂經云灸五壯主卒疝小腹痛力痿氣少伏中寒腰如冷水銅人經云足陽明脉之所發主寒疝下至腰脚冷如氷小腸諸疝按之在膝上伏下針入三分灸三壯西方子云主腹中脹滿痿厥少氣腰痛不可以顧主膝上伏中寒資生經云銅人云不可灸明堂乃云灸三壯豈以禁穴許灸一壯至三壯耶伏二穴在膝上六寸起肉正跪坐取之一云膝盖上七寸針五分不可灸明堂云婦人八部諸病通針三分銅人經云治勞氣逆膝冷不得温針入五分又云足陽明脉氣所發治風勞痺逆狂邪手節攣縮身􅐊􅇙腹脹少氣婦人八部諸病西方子云不可灸髀闗二穴在膝上伏後交分中針六分明堂云灸三壯銅人經云治膝寒不仁痿厥股肉筋絡急不能屈伸又云針入三分西方子云主黄疸膝眼四穴在膝頭骨下兩筋傍陷中銅人云宛宛中主膝冷疼痛不已針五分留三呼㵼五吸禁灸有人膝腫其人為灸此穴遂致不救盖犯其所禁也資生經云銅人無此四穴明堂有知故附入如此湧泉二穴木也一名地衝在足心陷中屈足捲指宛宛中灸三壯針五分無令出血淳于意云漢濟北王阿母患足下熱喘滿謂曰熱厥也當刺足心刺足心立愈明堂經云灸不及針若灸廢行人動明堂下經云在脚心㡳宛中白肉際灸三壯素問註刺三分千金注肝臟卷云在脚心大指下大筋史記濟北王阿母足熱而滿淳于意曰血病熱厥也刺足心各三所按之無出血病得飯已酒大醉明堂經云主心痛不嗜食婦人無子欬嗽氣短喉閉身熱胸脇滿悶頸痛目眩男子如蠱女人如孕足掛盡疼不得踐地也銅人經云足少隂脉之所出也為井治腰痛大便難風疹又云主小便不利心中結熱脚底白肉際不得履地刺風脉風癎灸亦得西方子云治足五指端痛引入腹中痺喉痺哽噎寒熱咽中痛不可食脊脇相引忽忽喜忘衂血不止然谷二穴火也一名龍淵在足内踝前起大骨下陷中灸三壯針三分不宜見血素問注刺三分刺此多見血令人立飢飲食千金注婦人方云在内踝前直下一寸銅人經云足少隂脉之所流也為榮治咽内腫心恐懼如人將捕涎出喘呼少氣足跗腫不得履地寒疝少腹脹上搶胸脇欬唾血喉痺淋􅅹女子不孕男子精溢䯒痠不能久立足一寒一熱舌縱煩滿消渇物注小兒臍風口噤痿厥洞洩西方子云主胸中寒脉代時不至温瘧汗出隂上縮内腫氣咽喉而不能言舌下腫難言不嗜食太谿二穴土也在内踝後跟骨上動脉陷中灸三壯針三分明堂經云主痎瘧欬逆煩心不得卧小便黄脛寒唾血及鼻衂不止也銅人經云足少隂脉之所注也為腧治心痛如錐刺其心手足寒主節喘息者死嘔吐口中如膠善噫寒疝熱病汗不出黙黙嗜卧溺黄消癉大便難咽腫今附痃癖寒熱􅠲嗽不嗜食腹脇痛瘦瘠手足厥冷西方子云治大疝瘕積聚與隂相通及足清不仁熱病多汗黄癉多熱少腹寒中腫脹大鍾二穴在足跟後衝中灸三壯針二分留七呼銅人經云走太陽足少隂絡治實則小便淋閉洒洒腰脊強痛大便秘澁嗜卧口中熱虚則嘔逆多寒欲閉户而處少氣不足胸脹喘息舌乾咽中食噎不得下善驚恐不樂喉中鳴欬唾血西方子云主腹滿便難多寒少熱水泉二穴去太谿下一寸在内踝下灸五壯針四分銅人經云少隂郄治月事不來即多心下悶痛目􅉩􅉩不能逺視隂挺小便淋􅅹腹中痛照海二穴隂蹻脉所生在内踝下針三分灸七壯千金云在踝下四分明堂上經云隂蹻二穴在内踝下陷宛中針三分灸三壯明堂下經云隂蹻二穴在内踝下陷中灸三分一作外踝外千金云内踝下客爪甲銅人經云治嗌乾四肢懈惰善悲不樂久瘧卒疝少腹痛嘔吐嗜卧怠惰大風偏枯半身不遂不能行履小便難及女子淋􅅹隂挺出又云主卒疝小腹熱而偏痛病者左取右右取左立已女子月水不調如墮墜汗出面黑飢不欲食四肢􅁋樂心悶暴瘧及諸淋目痛大風暴不知人卧驚視如見鬼尿如黄水小腹熱咽乾也西方子云治大風黙黙不知所痛視如不明資生經云明堂上下經有隂蹻穴而銅人無之惟有照海亦在内踝下與隂蹻同而未知其故予按素問氣穴論云隂蹻穴在内踝下是謂照海隂蹻所生則與銅人照海穴合矣則是隂蹻即照海也故附隂蹻於照海之末復溜二穴金也一名昌陽一名伏白在内踝上三寸動脉陷中針三分留三呼灸五壯明堂云灸七壯主女子赤白漏下銅人經云足少隂脉之所行也為脛治腰脊内引痛不得俛仰起坐目􅉩􅉩善怒多言舌亁涎自出足痿不收履䯒寒不自温腹中雷鳴腹脹如鼓四肢腫十水病溺清赤黄白黑青取井赤取榮黄取腧白取經黑取合血痔洩後腫五淋小便如散火骨寒熱汗注不止西方子云主腰脊十分痛目視不明脚後亷急不可前却足跗上痛風逆四肢廢交信二穴在内踝上二寸少隂前太隂後亷前筋骨間腨灸三壯針三分留五呼明堂下經云内踝上二寸後亷筋骨陷中素問氣穴論跟上横二穴注云内踝上者交信穴也又云主氣淋卒疝大小便難及膝脛内亷痛也銅人經云足隂蹻之郄治風淋㿉疝隂急股引腨内亷骨痛又洩痢赤白女子漏血不止資生經云按素問氣府論隂蹻穴注云謂交信也在踝上二寸少隂前大隂後筋骨間隂蹻之郄竊意隂蹻即交信也至氣穴論隂陽蹻穴注乃云隂蹻穴在内踝下是謂照海隂蹻所則是隂蹻乃照海非交信矣故明堂下經既有交信穴在内踝上又出隂蹻穴在内踝下上不同盖二穴也但不知素問之注何故前後自異學者毋信其一注而不考其又有一注也築賓二穴在内踝上腨分中灸五壯針三分明堂云在内踝上灸三壯又云主小兒胎癲病吐舌及嘔吐下利也銅人經云治小兒胎疝痛不得乳癲疾狂言吐沫足腨痛明堂云在足外踝上隂谷二穴水也在膝内輔骨後大筋下小筋按之應手屈膝乃取手之灸三壯針四分留七呼銅人經云少隂脉之所入也為合治膝痛如錐不得屈伸久立舌縱涎下煩逆溺難少腹引急隂痛股内亷痛婦人漏血不止腹脹滿不得息小便黄男子如蠱女子如姙娠西方子云寒熱腹偏腫隂痿至隂二穴金也在足小指外側去爪甲角如韭葉一云宛宛中針二分灸三壯明堂云主瘧發寒熱頭重心煩目翳􅉩􅉩鼻塞不通小便淋􅅹失精銅人經云足太陽脉之所出也為井治目生翳鼻寒頭重風寒從足小指起脉痺上下帶胸脇病無常轉筋寒瘧汗不出煩心足下熱小便不利失精針入二分可灸三壯西方子云主鼻齀清涕出及主耳聾鳴脇相引急痛通谷二穴水也在足小指外側本節前陷中灸三壯針二分銅人經云足太陽脉之所流為榮治頭重目眩善驚引鼽衂頸項痛目􅉩􅉩甄權云結積留飲癖胸滿食不化西方子云主頭痛寒熱汗出不惡寒項如拔不可左右顧目不明惡風寒胸脇支滿心中憤憤數欠癲心下悸驚恐咽中乾痛心痛鼻鼽清涕束骨二穴木也在足小指外側本節後陷中灸三壯針三分明堂云主驚癎狂癲身寒熱頭痛目眩秦承祖云主風赤胎赤兩目眥爛銅人經云足太陽脉之所注也為腧治腰如折腨如結耳聾惡風寒目眩項不可回顧目内眥赤爛又云主身熱肌肉動西方子云主腸澼泄癲疾搐引善驚羊鳴頭痛狂易多言不休瘧從脚䯒起髀樞中痛不可舉京骨二穴在足外側大骨下赤白肉際陷中按而得之針三分灸三壯明堂云五壯素問註三壯明堂云灸五壯主寒瘧苦熱驚悸不欲食腿膝痿脚攣不得伸癲病狂走痰厥髀樞痛及脛膝寒也銅人經云足太陽脉之所過也為原治膝痛不得屈伸目内眥赤爛發瘧寒熱善驚頸項強筋治足䯒痠腰背不可俛仰齀衂血不止目眩西方子云主目中白翳目反白從内眥㜐主頭熱鼻不利涕黄淋濼自囓唇背惡寒痛脚攣足寒脊痙反折狂仆申脉二穴陽蹻脉所出在外踝下陷中容爪甲白肉際針三分千金云申脉在外踝下陷中明堂云陽蹻二穴在外踝前一寸陷宛中針三分素問氣穴注陽蹻穴是謂申脉陽蹻所在外踝下陷中按刺腰痛篇注在外踝下五分繆刺論注外踝下半寸容爪甲銅人經云治腰痛不能舉體足䯒寒不能久立不能乘舟車癲疾又云治脚氣腎氣婦人血氣西方子云主目反上視苦赤痛從内眥始脛中寒熱腠氣鼻衂血不止資生經云明堂上經有陽蹻穴面銅人無此穴惟申脉二陽蹻脉脉所出在外踝下陷中與陽蹻穴同而未知其故予按素問氣穴論隂陽蹻穴註云是謂申脉陽蹻所出在外踝下陷中則與銅人申脉穴合是則陽蹻即申脉也故附明堂陽蹻於申脉之後金門二穴一名闗梁在足外踝下一云陷中灸三壯炷如小麥針一分銅人經云足太陽郄維所别屬也治霍亂轉筋膝䯒痠身癉不行久立癲癎尸厥暴疝小兒發癎張口揺頭身反折西方子云主馬癎及暴死僕㕘二穴一名安耶在跟骨下陷拱足得之針二分灸七壯明堂云三壯銅人經云治足跟痛不得履地脚痿轉筋尸厥如中惡伏霍亂吐逆癲癎狂言見鬼針入三分明堂云主腰痛不可舉足承山下重西方子云主足跟後痛足痿失履不收癲疾馬癎吐舌鼓額恍惚煩痛小兒馬癎張口揺頭身反折馬鳴崑崙二穴火也在外踝後跟骨上陷中素問註細脉動應手灸三壯炷如小麥針三分明堂云上崑崙外跟下一寸大筋下一云在大筋後内陷骨宛宛中蹲地旁引取之又云主寒熱癲疾目􅉩􅉩鼻衂血腰尻重不欲起俛仰難惡聞人音女子絶産也銅人經云足太陽脉之所行也為經治腰尻痛足端重不得履地齀衂脚如結踝如裂頭痛肩背拘急欬喘暴滿隂腫痛小兒發癎瘈瘲又云上崑崙治惡血風氣腫痛脚腫又云下崑崙主刺風疹風熱風冷痺腰疼偏風半身不遂脚腫疼不履地針四分灸亦良百壯止西方子云灸十壯主目眩不明目如脫目眩􅉩不明惡風寒目急痛赤腫頭熱鼻齀衂腹痛滿暴喘腹脹滿不得安息且大便洞泄體痛霍亂尻腰腫腨跟腫狂易大風癎瘈口閉不得開瘧多汗瘧寒小兒隂腫頭眩痛脚痿轉筋尸厥中惡吐逆欬喘暴痛資生經云明堂有上崑崙又有下崑崙銅人只云崑崙而不載下崑崙豈銅人不全耶抑名不同未可知也但上經云内崑崙在外踝下一寸下經云内崑崙在内踝後五分未知孰是予謂既云内崑崙則當在内踝後矣下經之穴為通上崑崙在外踝故也付陽二穴在外踝上三寸足太陽穴同千金亦同陽蹻郄太陽前少陽後筋骨間陽蹻之郄灸三壯針五分留七呼明堂下經云附陽在外踝上二寸二字當作三後筋骨間宛宛中灸五壯素問氣府論隂陽蹻各一注云陽蹻謂附陽穴在外踝上三寸太陽前少陽後筋骨間陽蹻之郄明堂云陷者中主腰痛不能久立腿膝脛痠重筋急屈伸難坐不能起及四肢不舉銅人經云治痿厥風痺頭重頥痛髀樞股髀痛瘈瘲風痺不仁時有寒慄一作寒熱西方子云腨外亷骨痛資生經云按素問氣府論陽蹻穴註云謂附陽穴也在外踝上三寸竊意陽蹻即附陽也及考氣穴論隂陽蹻四穴注云陽蹻穴是謂申脉陽蹻所出則是陽蹻乃申脉非附陽後故明堂下經既有附陽在外踝上二寸上經又有陽蹻在外踝前一寸一寸二寸既異是附陽陽蹻各是一穴也但不知素問之注何故前後相背耶飛陽二穴一名厥陽在外踝上九寸明堂千金並云七寸針三分灸三壯明堂云五壯又云外踝上七寸陷者中主體重起坐不能步失履不收脚腨痠重戰慄不能久立銅人經云一名厥隂足太陽絡别走少隂在外踝上七寸治野雞痔厯節風足指不得屈伸頭目眩逆氣齀衂癲疾瘧又云主頭眩目痛西方子云主頸項疼汗出腰痛如折腨中痛吐舌下部寒熱汗不出體重狂瘧痓脊反折痔傷痛逆氣頭熱足痿承山二穴一名魚腹一名肉桂一名傷山在兊腨腸下分肉間陷中灸一壯針七分明堂云八分得氣即㵼速出針灸不及針止七七壯明堂下經云五壯一云在腿肚下分肉間銅人經云治腰背肩腕腨重戰慄不能立脚氣膝下腫霍亂轉筋大便難久痔腫痛又云定腹取之主脚弱無力脚重偏不遂久亦得西方子云主頭熱鼻齀衂大便難脚攣脛痠急跟痛脚筋急痛兢兢足下熱不能久立寒熱癲疾脚腨疼痛膝腰腨重起坐難小腹疝氣遊行五臟腹内切痛明堂云主筋攣急不可屈伸承筋二穴一名腨腸一名直腸在腨腸中央陷中灸三壯禁針明堂云在脛後從脚跟倒上七寸腨中央陷中針三分千金云從脚跟上七寸腨中央不刺銅人經云治寒痺轉筋支腫大便難脚腨痠重引少腹痛鼻齀衂腰背拘急霍亂又云足太陽脉氣所發治風勞熱足煩腫痛轉筋急痛身􅐊疹大小便不止西方子云主頭痛寒熱汗不出惡寒支腫大便難脚攣脚脛痠脚急跟痛脚筋急痛兢兢足下熱不能久立脛痺不仁瘈瘲脚痠脚痛如折脚腨痠痛重引小腹及腰脊痛惡寒痔痛指下腫鼻齀衂資生經云銅人千金皆云禁針明堂乃云針三分亦可疑矣不針可也合陽二穴在膝約中央下二寸作三寸針六分灸五壯銅人經云治腰脊強引腹痛隂腫成癰筋疾重履步難寒疝癲疾隂偏痛女子崩中西方子云主膝股熱脛痠重腹下痛腸澼隂偏暴敗痛委中二穴土也膕中央約文中動脉今附委中者血郄也熱病汗不出足熱厥逆滿膝不得屈伸取其經血此愈明堂云甄權云在曲踿内兩筋兩骨中宛宛是令面梃腹地而取之針八分留三呼㵼五吸甲乙云針五分留七呼灸三壯素問註在足膝後屈處膕中央約中文又骨空論云在膝解後曲脚中背面取之明堂經云令病人合面卧舒挺兩脚取之灸三壯主脚弱無力腰尻重曲踿中筋急半身不遂銅人經云足太陽脉之所入也為合治腰挾脊沉沉伏遺溺腰重不能舉體風痺樞痛可出血痼疹背愈西方子云凡風濕痺腰脚重痛於此刺血久痼宿疹亦背立已主小腹熱而偏痛隂蹻遺小便難尿赤難衂血劇不止腰痛挾脊至頭背痛筋急身熱痔痛腋下痛腫少腹堅腫脊強反折瘈瘲癲疾頭痛熱病汗不出足熱厥逆滿膝不得屈伸委陽二穴三焦下甫腧也在太陽後於膕中外亷兩筋間屈伸取之扶承下六寸灸三壯針七分素問註在足膕中外亷兩筋間千金云足太陽前少陽後銅人經云足太陽脉之中治腋下腫痛胸滿脇虚筋急身熱風痺不仁小便淋􅅹西方子云隂跳及小便難小腹堅痛引隂中不得小便腰痛不可俛仰脊強反折瘈瘲癲疾頭痛筋急膨脹飛尸遁注痿厥不仁浮郄二穴在委陽上一寸展膝得之灸三壯針五分西方子云主小腹熱大便堅太陽膀胱經大腸結股外經筋急髀樞之殷門二穴在内郄下六寸針七分西方子云主膝脊不可俛仰舉委惡血主之股外腫扶承二穴一名肉郄一名隂闗一名皮部在尻臀下股隂衝上文中針七分明堂經云灸三壯千金云在尻臀下股隂下文中一云尻臀下横文中又云主腰脊尻臀股隂寒痛五種痔疾㵼解血尻權中腫大便難小便不利西方子云主小便不利失精腋下腫尻下腫大便宜出及隂胞有寒腰脊相引如觧尻腋腫大便難資生經云以上諸穴皆依銅人經次第而編明堂上下經有穴而銅人不載亦或附入惟有其穴而無其名者無慮數十穴不編當各依本經所說而針灸之不可泥此經之無穴名而不針灸也又云扁鵲灸鬼邪凡三十穴與銅人明堂同而其名却異故不編入許希針經之穴既與諸經不同其名又異如與龍穴之類是已亦不付入者不欲以一人之私名亂諸經之舊穴以滋後學者惑也又云若諸穴以銅人為次凡三百六十其明堂上下千金等方有穴銅人不載數穴既附入之其未附入更數十穴如眉衝眉兩頭明直髪際上明堂鼻直上入髪際明下當陽當重人直上入髪際一寸明下胸堂兩乳間見欬逆上氣頭衝一名頸衝見癭瘤氣衝一名氣堂見口諼注市在兩乳邊邪下見尸厥交在臍下横文中胞門在闗元左邊二寸氣門在闗元旁三寸並見無干氣穴見月事水原王泉門並見無子衝門見難産九曲見血塊中都隂谷合陽見血崩天瞿見癲疾窮骨􅀈百勞穴見産後餘疾故載之卷末其扁鵲灸鬼邪十餘穴不載云吕細穴足太陽膀胱經資生等經不載出濟生㧞萃方及流注通𤣥指要賦治牙齒痛灸膏肓法莊季裕編灸膏肓腧穴法孫真人千金方論曰膏肓腧穴無所不治主羸瘦虚損夢中失精上氣欬逆狂惑忘誤取穴法令人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物搘之前勿令臂得動揺從脾骨上角摸索脾骨下頭其間當有四肋三間灸中間依脾骨之裏肋間空處去脾骨容側指許摩􅡗肉之表筋間空處按之自覺牽引胸户中灸兩脾中各一壯至六百壯多至千壯當覺氣下礱礱然如流水狀亦當有所不出若無停痰宿疾則無所下也若病人已困不能正坐當令側卧挽一臂令前來取穴灸之也求穴大較以右手從右肩上住指頭表所不及者是也左手亦然乃以前法灸之若不能久正坐常伸兩臂者亦可伏依襆上伸兩臂令人挽兩脾骨使相離不爾脾骨覆穴不可得也所伏依襆當令大小常定不爾則失其穴也此灸訖後令人陽氣康盛當消息以自補養取身體平復其穴近第五椎相准望取之論曰昔秦緩不灸晉侯之疾以其在膏之上肓之下鍼藥所不及即此穴是也時人拙不能救得此穴所以沉疴難遣若能用心方便求得灸之無疾不愈矣王惟一明堂銅人灸經云膏肓腧二穴在第四椎下兩傍相去各三寸人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物搘肘勿令臂動揺也從脾骨上角摸索至骨下頭其間當有四肋三間灸中間從胛骨之裏去胛容側指許摩胎去表肋間空處按之自覺牽引於肩中灸兩胛中一處至百壯多至五百壯當覺下礱礱似流水狀亦當有所下若得痰疾則無所不下也如病人已困不能正坐當令側卧挽上臂令前取穴灸之右以右手從右肩上住指頭所不及者是穴也左取亦然乃以前法灸之若不能久坐當伸兩臂令人挽兩髀骨使相離不爾即脾骨覆其穴灸之不驗此灸訖後令人陽氣康盛當消息以自補養量同身法第一千金方云尺寸之法依古者八寸為尺仍取病者男左女右手中指上第一節為一寸亦有長短不定者即取手大拇指第一節横度為一寸以意消息巧拙在人外臺方亦問上法又一云三寸者尺三寸指也聖恵方云今取男左女右手中指第二節内度兩横文相去為一寸自依此法療病多愈今以為定此穴取寸石藏用亦用聖恵方為准以蠟紙條子或薄篾量患人男左女右指中節横文上下相去長頭為一寸謂之同身寸若曲指即傍取中節上下兩交角相去逺近為一寸若伸指即正一取中指自上節横文至第二條横文長者相去逺近為寸與曲指一寸長短亦相符合然中節中從上人之身手指或冇異者至於指文亦各不同更在曲意詳度之也此摺紙篾與同身寸相等為六寸逐寸以墨界之勿令長短有所出入不同截斷收之俟以此量灸穴自脊中第四椎下停分兩傍各三寸為膏肓腧足太陽膀胱經脉氣之所發也正坐伸臂法第二令患人用墪椅正坐兩足平蹋至地膝與髀股髙下俱平兩足相並足指前齊盡脫去上體衣服若不盡脫則衣服束臂不能得脾穴不得若氣怯畏寒則反著衣以骨相離取領在胸前頷下以襟交覆腰間候㸃定穴灸時更臂穿衣令遮背心以帶束近穴處勿令與坐炷下火相礙曲脊伸臂以兩手按膝上令中指當膝盖中兩大指緊相並指頭與膝葢骨前齊微用力直舉腕中勿令斜屈動揺段彦聰仲謀大夫云若右手按左膝則脾骨開蔵用謂以左手按右膝交腕有髙下胛骨亦隨之偏則當嘗或用其說則兩手相上如舊法以左手按左膝為是揣顀骨定穴髙下法第三令患人正坐曲脊伸臂以指揣項後脊骨自第一顀至第五顀更有大顀在第一顀上宛宛陷中非有骨也有骨處即是第一顀顀字千金古方並作椎王惟一新定明堂經改本傍從顀逐顀以墨㸃記之令上下端直分明墨㸃訖便以蛤粉泡亁即克有擦動自第四顀至第五顀更以蠟紙或篾比量兩顀上下相去逺近摺為三分亦以墨界脊上顀間取第四顀下二分微多第五顀上一分㣲少用濃墨圏定此是灸穴相六寸之中為兩穴髙下逺近之准千金方謂穴近第五顀相顀望取之故謂顀上三分之一也更墨兩顀相去則同身一寸三分七厘㣲縮有無大段長短不同以㕘合甲乙經自大顀至脊骶并二十二顀共長三寸之法若顀骨分明縱有不同亦以顀數為定若以大顀至尾骶骨一尺法交之則令其人平身正立當脊骨中用勁直杖子從地北度至臍中心截斷回杖子於背上自命門穴杖子盡處即是第十四顀下第十五顀上當中命門穴也自命門穴上以同身寸量一尺三寸五分即是第四顀下九分七厘第五顀上四分其兩傍各三寸乃膏肓腧穴也若自第一顀北向下則同身寸五寸一分有餘是也然人身上下停長短各自不同大槩當以顀骨為定也王氷注素問注有云脊節為顀脊窮為骶定穴相去逺近法第四用先截量下同身六寸蠟紙或篾横置脊骨第五顀上中央墨圏定處令寸數界盡當墨圏中心兩頭平直各三寸勿使展縮於紙篾兩頭盡處以墨圏之令圏大小直徑三分千金方云黄帝曰灸不三分是謂徒之小謂寃炷務大也小弱炷乃小作以意商度謂虚弱小兒弱之人也一半在紙篾頭内一半在紙篾頭外令與脊中第五顀上墨圏定髙下處三圏相直以為兩穴相去逺近之准鈎股按穴取平法第五又用前量同身寸紙篾脊中第五顀上中央墨所圏處照脊骨端直向下比量四寸至第七顀以量㸃記自墨㸃却兩邊向上斜量歪灸穴圏中心使各恰當同身寸之五寸為兩穴髙下平直之准㕘驗求穴法第六令患人平身正坐自以右手從右肩上住附項伸指直搭背上以墨記其中指指頭所及處左手亦然記之又從脾骨上角摸􅟥至胛骨下頭其間當有四肋三間其四肋自胛骨撗排至脊骨上用力案摩如覺隠指是筋而非骨千金方謂两間空處疑四肋肋字為誤而王惟一於銅人灸經中又并改筋間為肋間及以右手從右肩上住亦用千金翼改為左肩上住若以右手搭左肩則指之所及已在第五顀下去穴甚逺皆非是當以方為正也灸穴當三間之中依胛骨下容側指許摩􅡗肉之表於筋間空處穴上按之自覺牽引胸户中千金翼云牽引肩中石按藏用又用箆子或筋頭令穴欲其堅實患人易覺也及照所圏灸穴在先記患人指所及之處下或傍側指不可及處以驗穴之是非然指有短長膚有豐瘦若相合固善如不合即不可以此遂廢餘法亦有人胛骨去脊骨相逺過同身三寸以上者即難用脊顀兩傍各三寸之求但求四肋三間之中依胛骨下側指許為穴可也坐㸃坐灸法第七坐炷下火時令患人一依㸃穴時正坐伸臂頭項肩背手足腕膝不得少有欹側伸縮改易及臂中舉按用力輕重亦常令匀若一事稍異於前胛骨便輙相近覆背灸穴艾炷即在骨上或胛骨開而相逺動争寸餘火氣不入穴中徒受苦楚無所益也若不失其穴灸至數壯覺胛骨中通熱而不堪痛意自快暢石用之云當覺臂中有習習然也至數十壯後或苦腕中疲辛若以几支或用輭帛於肘上腕中連束二臂令緩急得所亦能少助葢手欲按而臂欲舉故腕中費力或少休頃刻亦無害但要安頓身體四肢一如前耳如日灸五十壯累至數百為佳千金方云灸六百至千壯當覺氣下礱礱然如流水狀亦當有所下其治疾之效甚衆且敏有上氣喘滿即時平減者有婦人經候不通已八月灸兩日而下者如此之數甚多穴至在上而最能下氣非他穴藥石之比而又無所不治有疾者宜留意焉石用之取穴别法第八石藏用字用之京師大醫也其治療方術一從古法亦多為人灸此穴其取穴法令患人牀榻上盤膝正坐隨人之肥瘠大小置栲栳或墪枕之類以衾絮冐之令兩臂相交平伏其上餘亦相同乃用千金方不能久坐伸臂使伏衣襆上之意也其用堅物云欲大小髙下常定勝於衣襆但臂之伸屈與古異耳其治皆效蓋醫者意也隨事増損初無定方孫真人笑秦緩之拙不能求得此穴但知鍼藥之不及不知火氣之能徹側求之浸巧是不為過也紹興己未歳余守武昌時總領邵户部玉云少時病廢得泉州僧為灸膏肓令伏於栲栳上増以指節極力按尋其穴令病者覺中指麻乃是穴若指不麻或雖麻而非中指者皆非也已而求得之遂一灸而愈壬戌四月増記於此葉潘等取穴别法第九葉餘慶字元善平江人自云嘗病療疾其居對橋而行不能度有僧為之灸膏肓穴得百壯後二日即能行數里登降皆不倦自是康強其取穴法但並是垂手正身直立勿令俯仰取四椎下兩傍同身寸各三寸灸時以輭物枕頭覆面卧􅂷手附身或臨時置身取安便而已其轉為人灸亦用此法云皆有功然於昔人取穴之法甚畧又與千金方㸃則立灸之說不合歐陽興世行之陳了翁瑩中壻也了翁得無為張濟鍼術其穴求尤妙嘗為行之灸膏肓腧故痕可見以葉所言校之葉穴㣲下葢脊有曲直之殊不能無少異也又常熟縣醫二潘琪云渠傳之於師取穴之法正坐曲脊並足而仰兩手令大指與臍屈肘當脾股上亦自是其說雖與千金方伸臂令正直之法不同然此立㸃則近古矣又衢州開化縣普鑑院僧仲開得取穴三法其一法正坐䜿立兩膝當乳以兩臂環抱屈手向膝以左手頭指以指揑左膝眼右手指亦然於背上數椎骨量穴依此坐久又法正坐立膝外直伸向足豎兩手相背以頭指向身手揑兩足大指頭岐間餘亦如上其比同身寸只用伸指法似亦可用今俱存之不特以偹見聞之博且使後人較其短長知所適從不為異端之所惑也灸訖補養法第十孫真人云此穴灸訖令人陽氣康勝當消息以自補養取身體平復其補養之道冝食温輭羮飯毋令太飽及飲啖生冷油膩黏滑鷄炙魚蝦笋蕨其他動氣發風之物并觸冐風寒暑濕勿以陽氣乍盛輕犯房室如覺氣壅可灸臍下氣海丹田闕元中極四穴中一穴又當灸足三引火氣以實下隨病深淺加以歳月將息自可保平復不然是猶倚一木以支大厦之傾又發而去其覆必矣歸罪灸之不善非也余自遭金狄之難憂勞危難衝冐寒暑避地從晉丁未八月抵泗濱感痎瘧既至琴川為醫妄治榮衛衰耗明年春末尚若肘腫腹脹氣促不能食而大便利身重足痿杖而後起得陳了翁家專為灸膏肓穴自丁亥至癸巳積三百壯灸之次日即胸中氣平腫脹俱損利止而進食甲午已能肩輿出謁後再報之仍得百壯自是疾證浸減以至康寜時親舊聞見此殊功灸者數人宿疴皆除孫真人云若能用心方便求得其穴而灸之無疾不愈信不虚也因考醫經同異㕘以諸家之說及所親式自量寸以至補養之法分為十篇并繪身指曲伸坐立之像圗於逐篇之後令覧之者易觧而無徒寃之失亦使真人求穴濟衆之仁益廣於天下也建炎二年二月十二日莊綽記明堂應驗小兒灸穴圗附論夫小兒之患許悉幽𤣥黙而抱疾自不能言也或即胎中受病或是生後傷風動發無時寒温各異且據諸家方論醫藥多門藥既無痊全憑灸法散在諸經文繁至甚其說不同既㸃穴以差訛則治病全然繆按諸家明堂之内精選到小兒應驗七十餘穴並是曽經使用累驗神功今録於後頂上旋毛中穴頂上旋毛中及耳後青絡脉各灸三壯炷如小麥大治小兒驚癎先驚悸啼呌後乃發也髮際穴鼻柱上髮際宛宛中灸三壯炷如小麥大治小兒風癎先屈手指如數物乃發也天澤穴天澤二穴在肘中横文約上動脉中灸各一壯炷如小麥大治小兒緩驚風手大指次指間穴手大指次指間後一寸五分陷者中灸各三壯炷如小麥大治小兒二三歳忽發兩眼大小㫮俱赤臍上臍下穴臍上臍下各五分二穴灸各三壯炷如小麥大治小兒顖開不合灸瘡發顖門先合中衝穴中衝在中指胛後一分灸一壯炷如小麥大治小兒夜啼上燈鳴鷄鳴上者璇璣穴璇璣一穴在天突下一寸陷者中灸三壯炷如小麥大治小兒喉中鳴嚥乳不利巨闕穴巨闕穴在鳩尾下一寸陷者中灸三壯炷如小麥大治小兒猪癎病如尸厥口噦吐沫癎病者小兒惡疾也呼吸之間不及求師至困者不少諺云國無良醫枉死者半肘横文穴屈肘横文中上三分各灸一壯炷如小麥大治小兒睡中驚目不合勞宫穴勞宫二穴在手心中以名指屈指頭勞宫著處是也各灸一壯炷如小麥大治小兒口有瘡蝕齦爛臭穢氣衝人少隂穴手少隂在掌後去腕半寸陷者中灸三壯炷如小麥大治小兒鷄癎善驚反掣自揺内庭穴内庭穴在足大指次指外間陷者中灸各一壯炷如小麥大治小兒瘧久即愈入髮際三分穴鼻上入髮際三分灸三壯炷如小麥大治小兒身強角弓反張次灸大椎下節間三壯兩乳前各一寸半上兩行三骨間穴兩乳前各一寸半上兩行三骨罅間六處灸各三壯炷如小麥大治小兒龜胷縁肺熱脹滿攻胷膈所又縁乳母食熱麫五辛轉更胷起髙也凡春夏從下灸上秋冬從上而灸下若不依此法則十患不愈一二合谷穴合谷二穴在手大指次指兩骨間陷者中各灸一壯炷如小麥大治小兒疳瘡臍下二寸三寸穴臍下二寸三寸間動脉中灸三壯炷如小麥大治小兒秋深冷痢不止鬼禄穴鬼禄穴在上唇内中央弦上灸一壯炷如小麥大治小兒驚癎用鋼刀決斷佳分水穴分水穴在臍上一寸灸一壯炷如小麥大治小兒水氣盡腫及腹大手中指節穴手中指本節頭名拳尖灸三壯炷如小麥大治小兒熱毒風盛眼疼痛肺俞穴其穴在三椎下兩傍各一寸半各灸三壯炷如小麥大治小兒龜背生時被客風拍着脊骨風達於髓也所致如是心俞穴其穴在五椎下兩傍各一寸半灸各三壯炷如小麥大亦治小兒龜背與肺俞穴同膈俞穴其穴在七椎下兩傍各一寸半灸各三壯炷如小麥大亦治小兒龜背與肺俞心俞穴同腰骨節間穴腰對臍骨節間灸三壯炷如小麥大治小兒臍腫前項穴其穴在百㑹一寸灸三壯炷如小麥大治小兒急驚風若不愈須灸兩肩頭及鼻下人中一穴率谷穴其穴在耳上入髮際一寸五分嚼而取之灸小兒但是風癎疾諸般醫治不瘥者中庭穴其穴在亶中穴下一寸陷者中灸一壯炷如小麥大治小兒嘔吐妳汁中渚二穴其穴在手小指次指本節後陷者中灸各一壯炷如小麥大治小兒目澁怕明狀如青肓手大指内亷横文頭穴在手大指甲後一寸内亷横文頭白肉際灸各一壯炷如小麥大治小兒雀目夜不見物足大指次指文端穴在足大指次指端去爪甲如韭葉灸掣各一壯炷如小麥大治小兒睡中驚􅇟㑹一穴其穴在上星一寸直鼻灸二壯炷如小麥大治小兒多涕是腦門被風拍着及肺寒也天突穴其穴在項結喉下三寸兩骨間灸一壯炷如小麥大治小兒急喉痺鳩尾上五分灸三壯炷如小麥大治小兒食間者先寒熱洒淅乃發也鳩尾一穴其穴在腦蔽骨下五分陷者中灸三壯炷如小麥大治小兒牛癎目脹直視腹脹乃發也僕㕘二穴其穴在足跟骨下白肉際陷者拱足取之灸各三壯炷如小麥大治小兒馬癎張口揺頭身反折馬鳴也内崑崙二穴其穴在内踝後五分筋骨陷者中灸各三壯炷如小麥大治小兒隂腫百㑹一穴其穴在頭中心陷者是也灸三壯炷如小麥大治小兒脫肛㵼血毎廁臟腑撮痛不可忍者承漿一穴其穴在下唇􅏢下宛宛中是也灸七壯炷如雀屎大治小兒初生三四日二七日口忽噤不吮妳多啼者是客風中於臍循流至心脾二經遂使舌唇經痙嗍妳得斯疾所使方藥不有十全大抵以去風無過灸此穴次穴頬車頰車二穴在耳下曲頰骨後灸各七壯炷如雀屎大治證亦同前譩譆二穴在第六椎下兩傍各三寸宛宛中灸各一壯炷如小麥大治小兒食滯頭痛及五心煩熱九椎上穴九椎上灸一壯炷如小麥大治小兒三五歳兩眼毎至春秋忽生白翳遮瞳子疼痛難忍心俞穴其穴在五椎下兩傍各一寸半陷者灸三壯炷如小麥大治小兒五六歳不語者心氣不足舌本無力發轉難接脊穴其穴在十二椎下節間灸一壯炷如小麥大治小兒痢下赤白秋末脫肛毎厠肛疼不可忍者聖恵方作腹痛翠尾骨穴翠尾骨上三寸骨陷間灸三壯炷如小麥大療小兒疳痢脫肛體瘦渇飲形容瘦悴諸般醫治不瘥者岐伯云兼三伏内用桃栁水浴孩子午正時當日灸之後用青帛子拭亁有似見疳蟲子隨汗出也此法神效不可量龜尾穴其穴即脊端窮骨也灸一壯炷如小麥大治小兒脫肛㵼血秋深不效大杼二穴在項後第一椎下兩傍各一寸半陷者中灸各一壯炷如小麥大治小兒斑瘡入眼肩中俞二穴在肩甲内亷去脊二寸陷者中灸各一壯炷如小麥大治小兒妳癖目不明九椎下節穴第九椎下節灸三壯炷如小麥大治小兒羊癎目瞪吐舌羊鳴也陽剛二穴在十四椎下兩傍各一寸陷者中灸各一壯炷如小麥大治小兒飲水不歇面目黄者十字文􅇸後縫十字文當上灸三壯炷如小麥大治小兒胎産疝卵偏腫重者春灸夏效夏灸秋效秋灸冬效冬灸春效胃俞二穴其穴在十二椎下兩傍各一寸半陷者中灸各一壯炷如小麥大治小兒羸瘦食飲少生肌膚全嬰方灸法凡㸃灸法背須平直四肢無使傾倒灸時孔穴不正無益於事若卧則卧灸立㸃則立灸坐㸃則坐灸反此則不得其穴矣凡灸若霧風雪猛雨炎暑雷電虹霓暫時且停候晴明再灸灸時不可太飢太飽見一切不祥之事凡新生男女七日已上周歳已還不過七壯如雀糞大頭面手足胷前諸穴不可灸有疾不過七壯背不過七壯又云小兒艾炷如小麥許但三五壯而止又云夫病至極甚服藥無效者可以求療尺寸之法古者以人中指第二節内度兩横文為一寸其間有手短身長者是以不可一概論也今人不辨長短但以灸之多不應效通真子云身手平等者以中指第二節為一寸身長手短者大拇指第一節為一寸宜依此行取患者男左女右手為一寸即無礙矣又云大人小兒男左手女右手比量中指第一節為一寸千金翼云灸節指根普濟方卷四百十六
