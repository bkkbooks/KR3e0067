body:
  text: 普濟方卷三百二十五眀周王朱橚撰婦人諸疾門血積氣痛附論血積氣痛者惡血久積而成痛也其狀隠隠㽲痛或成塊攻築或聚或散或沈或浮盖氣痛則血行氣澀則血滯若月水不通産後惡露不盡或因他病使血不行皆致氣血凝滯血因氣聚藴而成積久不去則為痛方當歸煎丸治婦人血積血癖臍腹㽲痛心膈滿悶四肢煩疼口苦舌乾飲食減少漸成勞瘦當歸切焙附子去皮臍生用各半兩没藥研硇砂研血竭各一兩禹餘粮煅赤醋淬七遍延胡索各半兩以上搗研為末同酒三升調勻於石器内漫火熬成膏和後藥茈胡去苗鱉甲去裙襴醋炙黄人參乾地黄焙芍藥磁石煅醋淬七遍牡丹皮各一兩木香一分澤蘭半兩右將後九味搗為細末入前膏内和丸如豌荳大每服二十丸淡醋湯下空心食前服桃仁散治婦人因月水不通血積不散氣攻疼痛積聚成塊桃仁湯浸去皮尖雙仁炒二兩劉寄奴去根剉碎蓬莪茂炮細剉當歸炙剉蘹香子微炒烏藥剉白术陳橘皮湯浸去白穰桂去麄皮木香乾薑炮剉附子炮製去皮臍芎藭桑黄剉髙良薑剉各一兩右為細末每服二錢温酒或醋湯調下空心晩食前服當歸丸治婦人血積臍下結塊痛如錐刺或下赤白月水不調腰背痛當歸切焙芍藥吳茱萸湯洗焙乾炒大黄煨剉乾薑炮附子炮裂去皮臍細辛去苗葉牡丹皮芎藭各半兩蝱蟲糯米炒水蛭糯米炒各七十枚桂去皮三分厚朴去皮薑製桃仁去皮尖雙仁麩炒各一兩右為末煉蜜和劑搗令勻蜜丸如梧桐子大每服二十丸食前温酒下加至三十丸地黄煎丸治婦人因月水不調血結不通血疾小腹成塊如覆杯生地黄肥者細切研爛絞汁一十斤生薑去皮研爛絞汁一斤半二味汁於㣲火上煎令如稀餳乾漆炒令煙出桂去麄皮當歸切焙桃仁湯浸去皮尖雙仁麩炒生薑地黄焙芍藥牡丹皮牛膝去苗酒浸炙黃各二兩大黄煨一兩半水蛭糯米炒蝱蟲去翅足頭炒各百枚右搗羅後一十二味為末入前地黄煎中以微火上煎鞕輭得所衆手丸如梧桐子大每服七丸食前温酒下延胡索丸治婦人血臟久冷虛積氣攻心腹臍下痛嘔逆痰涎不思飲食延胡索米醋炙黄三分當歸切焙沈香剉各半兩木香白术芎藭青橘皮湯浸去白穰焙附子炮製去皮臍吳茱萸湯浸焙乾炒桂去麄皮荆三稜濕紙裹煨别搗為末各一兩半蓬莪茂剉炒一兩右為末以酒煑麵糊丸如梧桐子大每服二十丸煎生薑醋湯下日進三服不計時候勝金丸治婦人血積心腹疼痛氣刺氣脹攻築或經候不行肢節煩疼痰逆癖塊乾漆炒煙盡烏頭炮裂去皮臍狼毒京三稜剉碎炒黄各一兩紫葳凌霄花是也麒麟竭没藥梹榔各半兩八味同為末硇砂巴荳二十枚去皮心膜研去油大黄單搗為末一兩芫花單搗為末半兩右先以醋二升熬大黄芫花二味末次下巴荳硇砂同熬稠其餘八味同搗細羅為末同熬成膏和劑如乾鞕少入煉熟蜜同和劑令得所丸如菉荳大每服七丸至十丸當歸酒下桃仁丸治婦人因月水不利血結成積氣攻疼痛桃仁湯浸去皮尖雙仁麩炒黄澤㵼白茯苓去黑皮芍藥瞿麥用穗乾薑炮裂生乾地黄焙甜葶藶紙上炒當歸切焙甘草炙芎藭各一兩大黄剉炒一兩半右為末煉蜜和丸如梧桐子大每服二十丸空心食前温酒下米飲下亦得増減四物湯出蘭室秘藏方治婦人血積當歸川芎芍藥熟地黄廣茂荆三稜桂去皮乾漆炒煙盡右各等分為麄末每服三錢水二大盞煎如常食前没藥丸治婦人腹内血結氣攻疼痛行經没藥一兩研桂去麄皮當歸切炒芫花醋炒半焦乾漆炒煙透各半兩右搗羅為末醋煑麵糊丸如梧桐子大每服二十丸温酒下不拘時没藥丸治婦人血氣血積堅癖血瘕發歇攻刺疼痛嘔逆噎塞迷悶及血蠱脹滿經脈不行没藥研一兩芫花一兩用米醋二升煎至一升半濾去滓不用將醋入石器内入硇砂霜一兩巴荳肉七粒研細入醋内煎成膏入後藥末附子生去皮臍一兩梹榔剉一分木香肉荳䓻二枚炮去皮當歸剉焙桂去麄皮蓽撥各一兩斑蝥三十枚糯米炒令黄去翅足别研細右搗羅七味為末没藥研勻入煎膏内和搗千百杵丸如梧桐子大初服三丸以醋炒薤白令焦黑以酒浸煎一兩沸吞下漸加五丸七丸為度如急卒血氣攻心脾以酒醋共一盞煎沸吞下血瘕堅癖結塊攻心疼痛悶亂久醫不効者即入禹餘粮一兩火煅醋淬七遍為末和為丸每服五丸蘇木節三兩剉細酒三升煎至七合去滓分作三分每服下丸子三丸併服三服即血瘕隨大小腸遂下其病立瘥人弱者每服只二丸如是丈夫元臟小腸氣脾積氣癥塊等疾即入丹砂一兩細研和停以生薑鹽湯吞下三丸硇砂丸治婦人血塊攻築疼痛不可忍硇砂研没藥研各一兩粉霜半錢乾漆炒煙盡半兩乾薑炮京三稜炮各一兩桂去麄皮當歸剉焙各半兩阿魏一分醋化入白麵少許作餅炙令熟木香一分右為細末煑醋麵糊和丸如菉荳大每服十五丸淡醋湯下或空心食前服薑黄散治婦人冷癖血塊虚脹月經不調瘦弱不能食面無顔色薑黄白术各八兩生薑去皮細切三升當歸切十兩陳麯末大麥蘖末各二升生地黃細切三升桃仁去皮尖雙仁杏仁去皮尖雙仁各二升青橘皮湯浸去白切三升右為末臼搗如泥水甑中鋪勻以麵封之勿使洩氣蒸熱并甑置屋下三日取出藥暴乾搗羅為散酒服方寸匕日二服取利為度十日内忌生冷難消化物過十日百無所忌若煉蜜為丸亦得每服三十丸酒下日再服大黄丸治婦人月水不通結堅瘕如塊腹脹血積不散大黄剉炒硝石熬沸研細各二兩蜀椒去目及閉口炒出汗半兩代赭别研乾漆炒煙盡芎藭赤茯苓去黑皮乾薑炮蝱蟲去翅足并頭炒各一兩右為末煉蜜和丸如梧桐子大每服空心食前温酒下米飲亦得漸加至三十丸芍藥湯治婦人血積氣攻心刺疼痛不已面黄體瘦經水不調芍藥芎藭當歸切焙防風桂去麄皮各半兩甘草炙生乾地黄焙各一兩枳殻去穰麩炒白术各半兩右麄搗篩每服三錢水一盞煎七分去滓温服經水久不利煎成取入芒硝半錢食前稍熱服血竭散出瑞竹堂方治婦人臍下血積疼痛血竭乳香没藥别研白芍藥水蛭鹽炒煙出當歸麝香以上各一分虎骨塗酥炙令黄一錢六分右為極細末每服三錢空心調酒下硇砂丸治婦人年久血積塊攻刺疼痛不可忍或嘔吐不盡飲食面黄怠惰硇砂去夾石者當歸切焙芫花醋炒微焦各一兩蓬莪茂炮半兩木香一分巴荳三十粒去皮心膜出油盡右先研硇砂巴荳没藥如粉用米醋三升同煎為稀膏後將四味搗羅為細末入在前膏内和成劑瓷合盛用時丸如梧桐子大每服七丸看患虚實臨時加減用酒醋各半盞同煎數沸通口服不得嚼仍須飲盡酒醋立瘥没藥丸治婦人血氣積腹脇有堅癖攻築疼痛不思飲食没藥别研硇砂别研木香當歸剉焙各半兩五靈脂二兩半右搗羅三味為末入二研藥銀器内以酒醋各半盞同熬成煎瓷盒盛勿透氣每服旋取一櫻桃大熱酒化下不計時候日可三二服如不飲酒醋湯化下當歸丸治婦人虚冷血氣及血積隠隠㽲痛血塊攻築疼痛當歸切焙延胡索各一兩没藥研麒麟竭硇砂研各三分右為末合研勻用狗膽和丸如梧桐子大每服十丸加至二十丸醋湯或温酒下狗膽丸治婦人血氣狗膽一枚入巴荳七粒空房後掛三十日乾用木香丁香硇砂槐花各半兩右為細末煉蜜丸如菉荳大每服二丸血風虚腫氣急煎薄荷酒下兒枕不散疼痛不可忍煎醋湯下產後通身走注疼痛蓮花湯下吐血不止刺薊根入小便送下血塊桂心酒下血逆萞麻湯下熱疾地黄酒下敗血衝心蒲黄酒下青金丸治婦人血積氣攻衝心腹㽲痛吐逆不下食前發作神思昏悶四肢逆冷五靈脂二兩取細末一兩硝石一分同上研斑蝥不呌者去翅與糯米同炒取一分為末右同研令勻滴水丸如豌荳大每服七丸煎生薑醋湯嚼下不計時候服甚者再服愈秘傳降香湯出衛生家寶方治血氣攻刺如鑚針所刺痛不可忍及一切敗血成積無藥可療者服之即愈真降香一錢没藥一錢麒麟竭一錢右為末每服一錢磨真降香温酒下立止穿山甲散出楊氏家藏方治婦人血積氣塊往來刺痛經脈欲絶腹腸疼痛寒熱肌肉消瘦當歸洗焙乾漆米醋炒令煙盡穿山甲石灰炒如田螺乾薑炮右件各等分為細末每服二錢温酒調下食前治一切血氣出本草以蚶殻燒以米醋三度淬後埋令壊醋膏丸服之瘀血附論瘀血者由經水蓄聚或産後惡露不盡皆本衝任氣風冷所乘不能宣故血瘀也瘀血不去結痼成積則令人面黄痩煩渴増寒腰腫重痛久變癥瘕方調榮湯治瘀血不消臍腹引腰背俱痛川芎當歸芍藥生乾地黄三稜􅅫术白芷延胡索蒲黄香附子澤蘭細辛川白薑厚朴製各三分辣桂三分桃仁湯浸麩焙二分半夏製甘草炙各三分勝金丸治婦人久積瘀血在腹内疼痛不可忍水銀二分硫黄一兩已上二味同結作砂子細研㯶櫚皮燒灰乾漆搗碎炒令煙出鯉魚鱗燒灰自然銅細研麒麟竭以上各一兩狗膽一枚乾者當歸一兩微炒炙延胡索半兩蝱蟲一分㣲炒黄去翅足水蛭一分炒令微黄烏蛇一兩酒浸去皮炙微黄桂心半兩亂髮一兩燒灰没藥半兩右為末研令勻以酒煑麵糊丸如梧桐子大每服不計時候以熱酒下十丸麒麟竭丸治婦人經絡痞塞腹内有瘀血疼痛不可忍麒麟竭半兩没藥半兩硇砂用狗膽内浸一七日乾漆搗碎炒令煙出芫花醋拌炒令乾以上各一兩延胡索川烏頭炮去皮臍白附子各半兩當歸一兩剉微炒砒霜半兩伏龍肝一兩蝱蟲一兩微炒去皮水蛭一兩微炒巴荳一兩去皮心研紙裹壓去油紅藍花一兩右為末用生鍼銚子内入頭醋一升先下硇砂攪勻然後下藥末一半用漫火熬如膏後入餘藥末和丸如小荳大每服不計時候熱酒下五丸當歸丸治婦人經絡澀滯致有瘀血在臟結聚欲成癥塊當歸一兩半剉微炒鼈甲半兩塗醋炙令黄去裙襴琥珀半兩桃仁一兩去皮尖雙仁麩炒㣲黄川大黄剉碎㣲炒菴䕡子丹皮水蛭三分炒令黄芎藭桂心以上各半兩蝱蟲三分炒㣲黄去翅足牛膝去苗赤芍藥各一兩右為末煉蜜和搗三二百杵丸如梧桐子大每服日空心用熱酒下二十丸蝱蟲散一名桃仁散治婦人臟腑宿冷經脈不利腹中有瘀血攻刺疼痛方見本門㿂瘕積聚一塊川當歸散治榮衛消瘀血出聲音治痰嗽川當歸牡丹皮白芍藥子芩木通華隂細辛麥門冬甘草各半兩生地黄一兩右㕮咀每服三錢水一盞薑三片煎至七分去滓温服地龍散治婦人血氣不調腹中積瘀血疼痛地龍一分微炒蜴蜥炒芎藭桂心各一兩乾薑炮半兩蘇枋木一兩剉木香蒲黄牡丹赤芍藥水蛭炒以上各三分桃仁一兩去皮尖雙仁麩炒黄右為細散每服二錢食前温酒調下烏金散治婦人臟腑風冷宿有瘀血不消令黄瘦羸困鯉魚鱗三兩亂髮二分槐花三分桑蛾三分蝱蟲一分水蛭一分川大黄一兩剉碎硇砂芫花牛膝去苗各半兩右藥並入磁缾子内用瓦子盖以鹽泥固濟候乾以大火煆令通赤漫漫去火候冷取出入麝香二錢同研令細每服空心熱酒調下二錢敗蒲湯治婦人因血澀内瘀不散疼痛敗蒲燒灰當歸各二兩牡丹皮芎藭赤芍藥各一兩䜵心一兩桃仁湯浸去皮尖雙仁半兩陳橘皮去白焙一兩蒲黄紙上炒半兩右麄搗篩每服三錢水一盞煎至七分去滓入地黄汁一合朴硝一錢温服硇砂丸治婦人積瘀血在臟攻心腹時痛四肢黄痩夜卧心煩硇砂硫黄與硇砂同結為砂子細研芫花醋拌炒令乾没藥水蛭炒令黃當歸剉炒川大黄剉碎微炒牡丹蝱蟲炒令黄去翅足各半兩右為末入砂子研令勻煉蜜搗三二百杵丸如菉荳大每