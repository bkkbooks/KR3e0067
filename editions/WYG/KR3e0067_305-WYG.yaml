body:
  text: 普濟方卷三百五明周王朱橚撰杖瘡門總論論曰凡杖瘡入水則兩胻外臁作瘡年深未差膿汁常有涓涓不乾之狀蓋由中焦有緑水之注故也且人被杖之時感驚氣入腹驚則膽傷足少陽經也兼兩外臁皆少陽之部此膽中甲木受邪甲木色青當有緑水少陽在中焦如漚既伏驚涎在中焦飲冷水咽為驚涎所阻水随經而旁入瘡中故飲水則瘡中水出乃上湧寒痰汗如水流若縁水下盡而痂自乾證亦無患矣昔一男子被杖瘡痛焮發毒氣入裏驚涎堵塞牙禁不開粥藥不下前後月餘百治無功遂以三聖散吐青蒼驚涎次以利膈丸百粒下臭惡燥糞復煎通聖散數錢熱服之又以酸辣葱醋湯發其汗吐交出其人自活杖瘡方乳香膏出危氏方治老金瘡杖瘡神效乳香没藥各七錢白芷當歸羗活獨活川牛膝五錢川芎自然銅七錢石膏劉寄奴黒牽牛熟地黄赤芍藥黄丹紫金皮各五錢黄蠟一兩右為末用清油四兩煎沸即入藥同煎留膠香黄蠟黄丹末入用柳枝不住手攪試將欲成膏却去三味更試成膏生布濾凈用瓦器盛水傾在水中用箄攤開貼傅瘡口孔深者撚成膏條穿入孔中不問淺深放瘡上作熱加輕粉梅花腦子朴硝入膏内貼之濕摻藥没藥三錢乳香三錢輕粉蜜陀僧自然銅血竭各一錢黄蠟四錢磁片末少許十分細藥油少許膏藥少許右先以藥油膏藥扵銚内熬次入黄蠟令化諸藥不住手攪勻然後傾在瓦盞内如杖瘡有孔者用滚湯潑開候溫傾少許加於瘡孔内仍以膏藥貼之洗藥天南星草烏大黄貝母荆芥劉寄奴川椒降真纒野紫蘓右不以多少用水半小桶煎滚熟去粗傾於桶内入炒鹽煨葱布帛蘸湯淋洗瘡靨上候瘡微痒然後徐徐掲靨以湯淋洗治杖瘡腦子五分重麝香五分重龍骨胭脂蜜陀僧輕粉熟寒水石乳香没藥各一錢為末右為細末乾摻瘡上週圍用生麵糊圍定次用緋紅絹帛貼之乳香散出儒門事親治貼杖瘡腫痛大黄黄連黄蘖黄芩已上各三錢乳香另硏没藥另研已上各一錢腦子少許右為末後入三味冷水調勻攤於緋絹上貼杖瘡上杖丹大黄黄連黄芩梔子白芷芒硝南星各等分右先將油紙用皂莢湯煎去油水洗凈却用藥剉碎布汁中煮三二次除乾入白芨末摻煮依舊撈起隂乾若敷時用水浸濕貼於杖瘡上神讓散亦名鬼代丹出德生堂方治打着不痛地龍二兩蜜陀僧三兩無名異三兩自然銅火煆三兩木耳一兩乳香没藥各半兩右為細末臨受杖時先用熱酒調服不然驚氣奔心惡血入腹若杖瘡少差以藥油調此藥傅之用膏藥貼之一方無木耳蜜陀僧用木鱉子蜜為丸彈子大每服一丸葱湯送下溫酒亦可杖瘡有血一名如聖散方見金瘡門金刃所傷類七味如聖散杖瘡藥真緑豆粉一斤槐樹皮四兩右同入鍋内文武火炒令黄色去槐枝加乳香少許為末用井花水調立刻不疼痛五黄散一名乳香膏出濟生㧞萃方治杖瘡定痛㧞毒消腫黄丹黄連黄芩黄蘖大黄乳香各等分右為細末新水調成膏用緋絹帛上攤貼一方無乳香治杖瘡方血竭輕粉乾臙脂蜜陀僧乳香没藥右各等分為末冷水洗凈拭乾猪脂調搽扯碎紅紙貼自愈龍腦潤肌散出宣明論治杖瘡熱毒疼痛黄丹一兩蜜陀僧半兩麝香半兩輕粉一錢半龍腦一字右為細末摻藥在瘡上用青帛子塗之内留一孔治枚瘡神效方一名乳香散出濟生㧞萃乳香没藥各三錢茴香四錢自然銅火燒醋蘸七遍當歸各半兩右為細末每服五錢溫酒調下治金瘡及棒瘡風化石灰入黄丹狗血研細作餅子掛當風令待乾血竭乳香龍骨没藥炒右為細末傅傷處立愈加赤石脂尤良一方有葱無石灰治棒瘡方黄連黄栢白歛白芨五靈脂右等分為末井水調塗綿貼不用洗一服便好没藥散治杖瘡止瘡痛令瘡不移蜜陀僧没藥乳香各一兩乾臙脂一兩半膩粉半兩右為細末次入龍腦少許若多更妙燒葱與羊骨髓生用同硏如泥攤在緋帛上貼之靈異膏治杖瘡金瘡攧撲皮破湯火所傷久年惡瘡川欝金三兩真者生地黄二兩去土粉草一兩臘月猪板脂一斤右剉如豆粒大入脂内煎黒焦色濾去藥渣入明凈黄蠟四兩熬化逐旋入攪勻用磁器盛貯水浸之久去水收之每用時先以冷水洗瘡挹乾却敷藥在瘡上外用白紙貼之止血定疼且無瘢痕湯炮火燒不湏水洗治陳瘡尤妙没藥散出濟生㧞卒治杖瘡乾臙脂乳香没藥輕粉各等分右同硏極細㳿洗了摻瘡上圍藥治若四下腫脹不破用於四下不破處圍定消腫定疼痛無名異一錢半炒木耳去土一錢半炒大黄一錢半炒右硏極細用蜜并藥油調圍腫處治杖瘡及諸般腫毒白芨黄連黄丹右為末入磁碗内用新水攪打候藥澄結去水以黒傘紙攤膏藥貼上其冷如氷神效治杖瘡出千金方石灰七斤新猪血一升右和為丸熟燒之破更丸燒三遍止為末傅上治杖瘡方木耳生芝蔴右搗碎圍於杖瘡上其出血小毒甚妙治杖瘡出千金方用釡臍下土為細末以油和塗訖卧羊皮上瘥又方出千金方服小便甚良治杖瘡不作瘢止痛出本草用黍米燒為灰和油塗之治杖瘡出本草以爵牀汁塗患處立瘥俗名赤根老母草治杖瘡并打損瘡中風疼痛者出本草炒馬驢濕糞分取半替换熱熨之冷即易之日五十遍極効治杖瘡方用冬青樹葉搗汁取乳鷄毛刷數次即効又方用平胃散嚼帶殻銀杏用蜜調傅之鬼代丹療人打着不痛甚妙用地龍去土炒為細末每服三錢温酒調下後食黄蠟為丸如桐子大每服三十丸細嚼温酒一盞生䓤三五莖臨决時用之神効杖瘡惡瘡膏出永類鈐方黄丹二兩水飛清油六兩白膠香四兩浄黄連半兩㯽榔六箇杏仁一十箇生用如作膏法一方加桃仁乳香没藥有損加白膠香治棒瘡出永類鈐方用連鬚䓤煨熱擦甚妙杖瘡不問輕重先逐寒邪方治瘡口切不可與酒則寒邪不散生他證不能便愈㸔老弱先服香蘇散元有熱服敗毒散三四服然後服十宣散除杖瘡上用水調膏用菉豆粉清油白水各半調塗住痛用一黑散赤龍鱗煆存性採即古松皮退腫用一黄散鬱金四錢赤石脂三錢白芷二錢天花粉三兩腫甚加荆芥一云紅内消如不用白芷加獨活並用搽調貼瘡口外留口其他瘡如無膿熱酒調貼如有膿薑汁三分茶清七分調杖瘡用乳香煎油調傅瘡口内外皆有用仍加善應等膏藥貼肉潰爛用生肉藥摻或腫不消用破血藥外以針刺去瘀血用一黄散傅貼一黄散逐時調下早調下則不驗如臭洗藥中加藿香或杖後被人施毒藥急燒百沸湯候温以芒掃梗五六寸二百莖乾浄一横一直磊病臀上用二人於病腿上壓出瘀血扛出於熟冷水中浄洗至無血為度忌毒食行房不浄席卧登厠薫觸或有杖後苦痛只加乳没二藥出永類鈴方治杖瘡出本草以七仙草搗枝葉傅之治杖瘡出本草取牛蒡葉貼之永不畏風不膿亦搗傅之治杖瘡出本草取古厠木燒煙於瘡上熏之冷風不入治杖瘡出本草用馬齒莧搗傅之普濟方卷三百五
