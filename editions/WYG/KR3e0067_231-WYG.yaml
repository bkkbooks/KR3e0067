body:
  text: 普濟方卷二百三十一明周王朱橚撰虚勞門虚勞咳嗽附論夫虚勞咳嗽者以肺傷胃弱榮衞衰㣲氣不温充故也肺主氣為五臟之華盖其脉循環胃口肺臟勞傷令人胸肶皆㣲痛驚悸煩滿咳嗽上氣或唾膿血寒熱潮作面赤口乾偏卧喜汗不能飲食肌膚消瘦是也方人參補肺散一名人參保肺湯出御藥院方治五勞七傷咳嗽氣喘不接痰涎稠黏骨蒸熱一切風疾熱證人參柴胡當歸芍藥桑白皮知母白术川芎黄耆地骨皮石膏滑石寒水石荆芥穗紫苑各二錢半白茯苓去皮黄芩連翹大黄山梔子仁薄荷各半兩甘草桔梗各一兩以上并生右為散毎服三四錢水一盞生薑三片煎至七分去滓温服漸加至五七錢進三四服無時泄者去大黄同人參半夏丸服葶藶丸治勞嗽頭虚腫大便不通葶藶子浄洗曝乾漿水浸半日布内盛蒸一炊久取曝乾搗末郁李仁洗净湯浸去皮研防己等分剉右研令匀煑棗肉和丸如赤小豆大每服十五丸煎糯米飲下百勞煎出十便良方治虚勞嗽旦輕夕重憎寒壯熱少喜多嗔忽進或忽退靣色不潤積漸少食右將杏仁一兩以童子小便二斤用小口垍缾一隻浸杏仁七日㵼出去小便以温水淘過研如泥别取一垍缾以小便三升煎之如膏以好白麵糊和如梧桐子大毎服十五丸食後臨卧以熟水下驅勞湯治虚勞咳嗽喘急涕唾稠黏心膈滿悶秦芁去苗土五錢柴胡去苗五錢白茯苓去黒心皮五錢鼈甲去裙襴醋酷炙五錢貝母去心欵冬花紫苑去苗土地骨皮杏仁湯浸去皮尖雙仁研各一兩人參麻黄去根土去全節木皮訶梨勒皮三枚半夏姜浸三日湯洗切焙各一兩右麄搗篩每五錢水一盞半入生薑五片同煎至八分去滓温服阿膠丸治虚勞咳嗽發熱羸瘦阿膠炙令燥熟地黄焙山羊各一兩羚羊角屑栢子仁研茯苓去皮地骨皮五味子百合各五錢丹參逺志去心麥門冬去心焙人參各一兩蛤蚧蜜炙一對右為末煉蜜和丸如弹子大每服一丸水八分煎至六分放温時時細呷服食後夜卧各一蛤蚧散出楊氏家藏方治虚勞咳嗽咯血潮熱盗汗不思飲食蛤蚧一對蜜炙人參去蘆百部去心欵冬花去枝紫苑茸各五錢貝母阿膠蛤粉炒鼈甲醋炙肉桂去麄皮炒柴胡去蘆黄耆蜜炙甘草杏仁湯浸去皮尖半夏生姜各一兩右為末每服三錢水一盞半生薑三片煎至一盞不拘時温服肉桂雖去風寒有熱人不宜服則當改用細辛經效阿膠丸出濟生方治勞嗽并嗽血唾血阿膠蛤粉炒生地黄洗卷栢葉剉炒山藥炒剉大薊根鷄蘇各一兩栢子仁炒别研人參茯苓去皮百部去心逺志去心甘心水煑防風去蘆麥門冬去心各五錢五味子一兩右為細末煉蜜為丸如弹子大每服一丸細嚼濃煎小麥湯或麥門冬湯嚥下一方無茯苓百部逺志加味人參紫苑散出直指方治虚勞咳嗽人參北五味子紫苑茸陳橘皮貝母去心紫蘇葉桑白皮炒白茯苓各一兩杏仁去皮尖甘草炙各三分加川芎半夏麯各一兩阿膠炒酥五錢右為麄末每服三錢薑七片棗二枚烏梅一箇食後煎服補肺散出聖惠方治虚勞咳嗽氣喘乏力喫食全少坐卧不安人參去蘆頭桂心鍾乳粉白石英細研水飛對麥門冬去心焙五味子熟乾地黄白茯苓各一兩乾姜五錢製炒黄耆三分鹿角膠二兩炒令黄燥甘草三分炙微赤剉右為散每服不計時候煑薑棗粥飲調下二錢寧肺湯出楊氏家藏方治榮衛俱虚發熱自汗肺氣喘急咳嗽痰唾人參去蘆白术當歸去蘆熟地黄川芎白芍藥甘草炙麥門冬去心五味子桑白皮白茯苓去皮各五錢阿膠一兩􅑕粉炒右㕮咀每服四錢水一盞薑五片煎七分温服大寧嗽湯出直指方治勞嗽諸嗽通用之神效北五味子茯苓桑白皮紫蘇細辛橘皮枳殻製杏仁去皮煎阿膠炒酥甘草炙罌粟殻去筯蕊截碎蜜酒炒熟各一分半夏製二分右為散每服三錢薑五片棗二枚烏梅半箇食後煎服勞嗽多加川芎地骨皮丸治虚勞咳嗽喘滿食少脇痛時發寒熱地骨皮白㯽榔煨剉桔梗炒麥門冬去心焙茯神去木百合訶梨勒人參甘草炙剉各一兩熟地黄焙赤芍藥各二兩右為末煉蜜和丸如梧桐子大每空服煎黄耆湯下二十丸日三服訶梨勒散出聖惠方治虚勞咳嗽或時寒熱不得眠卧訶梨勒用皮鼈甲各一兩塗醋炙令黄去裙襴枳殻五錢麸炒微黄去瓤白茯苓一兩紫苑五錢去苗土柴胡去苗黄耆各一兩剉杏仁湯浸去皮尖䨇仁麺炒微黄甘草各五錢炙微赤剉百合酸棗仁各一兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓不拘時候温服忌莧菜參芎歸湯出直指方治虚勞少血津液内耗心火自炎燥熱乗肺咳嗽咯血及血不榮肌動輒毛寒咳嗽當歸川芎白芍藥各一分人參半夏製橘皮赤茯苓阿膠炒細辛北五味子甘草各一分右為散每服三錢薑四片棗二枚煎服保命丸治積勞咳嗽日久不輕自汗口中無味蛤蚧一枚如丈夫患用雄者腰上女人患用雌者腰下截酥炙欵冬花木香不見尖杏仁去皮尖童子小便浸一復時握乾蜜炒天麻乾地黄熟煑如黒􅄳另焙半夏湯浸丁香五錢五味子右為末煉蜜丸如梧桐子大每服食後生薑湯下十五丸至二十丸一方無天麻半夏丁香白茯苓散出聖惠方治虚勞咳嗽心胸壅悶白茯苓前胡去蘆頭人參去蘆頭黄耆剉訶梨勒皮各一兩麥門冬去心焙杏仁湯浸去皮尖䨇仁麸炒微黄紫苑陳橘皮湯浸去白瓤焙各三分甘草炙微赤剉五錢右為散每服三錢以水一中盞入生薑汁半分煎至六分去滓不計時候温服仙人肢丸出宣明論治逺年勞嗽不問寒熱痰涎喘滿先服松花膏子過多服此藥無不效人參沙參𤣥參紫圑參丹參白术牡蠣知母甘草各二兩蛤蚧一對頭尾全用河水洗净文武火酥炙黄色右為末用麻黄一觔去根枸杞子三觔熬成膏丸如弹子大磁盒内盛臨卧煎生薑自然汁化下一丸小兒量嵗加减人參鼈甲散治冷熱虚勞肌熱盗汗喘嗽困乏柴胡茸前胡人參秦芁漢防己木香茯苓桔梗白术各五錢鼈甲一箇去裙襴醋炙右為細末每服二錢酒炙猪腦子少許同和别以熱酒調下食前衣盖汗出效男用母猪女用雄猪鼈甲湯治虚勞咳嗽胷滿氣急發熱羸瘦鼈甲去裙襴醋炙黄柴胡去苗杏仁湯浸去皮尖雙仁麩炒欵冬花桃仁湯浸去皮尖雙仁麩炒甘草炙剉貝母去心知母焙各一兩皂莢去皮子酥炙一兩右麄搗篩每服三錢水一盞入小麥五十粒烏梅一箇煎七分去滓温服紫苑散出聖惠方治虗勞咳嗽涕唾調黏漸覺羸弱紫苑去苗土黄耆剉白茯苓欵冬花生地黄白前杏仁湯浸去皮尖䨇仁麸炒微黄桑白皮甘草五錢炙微赤剉右為末每服四錢以水一中盞入生薑半分煎至六分去滓不拘時候温服五味子散一名紫苑湯出聖惠方治虚勞咳嗽胷中寒熱短氣不足方見本門虚勞上氣類紫苑丸出聖惠方治虚勞咳嗽胷隔不利骨節疼痛飲食無味紫苑三分去苗土前胡一兩去蘆頭麥門冬一兩五錢去心焙桔梗五錢去蘆頭鼈甲一兩五錢炙令黄去裙襴白芍藥三分貝母煨黄五錢百合三分甘草五錢炙微赤剉右為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以生薑湯下二十丸忌莧菜天門冬丸出聖惠方治虚勞咳嗽喘促心煩天門冬二兩去心焙欵冬花五味子人參去蘆頭白茯苓貝母煨炒黄甘草炙微赤剉蘿蔔子酥拌炒令香各一兩熟地黄一兩右為末煉蜜和搗二三百杵丸如弹子每服以綿裹一丸常含嚥津陳橘皮丸出聖惠方治虚勞咳嗽腹脇妨悶大腸氣滯肢節煩疼陳橘皮二兩湯浸去白穰焙㯽榔一兩柴胡一兩五錢去苖訶梨勒皮白芍藥紫苑各一兩去苗土川大黄二兩剉微炒杏仁一兩湯浸去皮尖䨇仁麸炒微黄木香五分右為煉蜜和搗三二百杵丸如梧桐子大每服食前粥湯下三十丸蠟煎散楊氏家藏方治虚勞久嗽痰多氣喘或咯膿血杏仁去皮尖䨇仁者炒黄另研人參去蘆乾山藥貝母去心麥門冬去心白茯苓去皮甘草炙百合去苗黄明鹿角膠炙如無以阿膠代各等分右㕮咀將杏仁别研拌匀每服三錢水一盞入黄臘皂角子同煎至七分食後温秦芁飲一名秦芁散出王氏愽濟方治虚勞咳嗽不止時發寒熱涕唾稠濁秦芁去苗土柴胡去苗貝母去心焙桔梗炒各一兩甘草炙剉三分訶梨勒煨用核一兩五錢陳橘皮湯浸去白焙麻黄去根節各一兩右麄搗篩每服三錢用童子小便一盞入烏梅一箇同煎至七分去滓温服空心食前服温金散出三因方治積勞咳嗽喘悶咯痰中有血甘草黄芩桑白皮防風各一兩杏仁二十七粒製人參茯神各五錢麥門冬二錢五分右以前五味用米泔浸一宿曬乾次入人參茯神麥門冬三味同為細末每服三錢蠟一豆大水煎食後服一方無人參松花膏出宣明論方治三二十年勞嗽預于九月間宣利一切痰涎肺積喘嗽不利防風乾生薑野菊花芫花拘杞子甘草蒼术黄精右為末取黄精根熬成膏子和藥末丸如弹子大每服細嚼一丸冷水化下臨卧不喫夜飯服藥一粒紫菀湯治虚勞咳嗽腸鳴滑泄紫菀去土五錢柴胡去苗一兩附子炮製去皮臍五錢蒼术米泔浸一宿切片焙乾赤芍藥各一兩肉豆蔲去殻人參各五錢右剉如麻豆每服三錢水一盞煎至六分去滓不拘時温服柴胡飲治虚勞咳嗽氣喘頰赤心忪煩躁兩脇脹悶肌瘦少力不思飲食柴胡去苗五錢白术赤茯苓去黒皮枳殻去穰麸炒鼈甲去裙襴醋炙各五錢知母切焙犀角屑各一分右麄搗篩每三錢水一盞煎至半盞去滓温服早晨日午夜卧各一服七味湯治虚勞發熱咳嗽柴胡去苗厚朴去麄皮姜汁炙各二兩甘草炙桂去麄皮麻黄去根節陳橘皮湯浸去白焙半夏為末薑汁和作餅焙乾各一兩右麄搗篩每服三錢水一盞入生薑三片棗二枚同煎至七分去滓温服蛤蚧丸出聖恵方治虚勞咳嗽及肺壅上氣蛤蚧一對頭尾全者塗醋炙令黄貝母煨微黄紫苑去苗土杏仁各一兩湯浸去皮尖䨇仁麸炒微黄鼈甲三兩塗醋炙令黄去裙襴皂莢仁炒令焦黄桑白皮各一兩剉右為末煉蜜和搗三二百杵丸如梧桐子大每服以棗湯下二十丸日三四服忌莧菜蛤蚧丸出三囙方治積勞久嗽失音蛤蚧一對去口足温水浸去膜刮去血脉用好醋炙訶子煨去核阿膠炒熟地黄麥門冬細辛甘草炙各五錢右為末煉蜜丸皂子大每服一丸含化不拘時候服欵冬丸治虚勞喘嗽靣目浮腫葶藶馬兠鈴南星半夏枯礬欵冬花佛耳草各等分右為細末水糊為丸如梧桐子大每服二十丸生薑胡桃湯下食後日進二服蛤蚧湯治虚勞咳嗽痰唾不利喘急胷滿呀呷有聲飲食不進蛤蚧酥炙去爪一對人參一兩杏仁湯浸去皮尖研五兩白茯苓甘草炙剉四兩桑白皮米泔浸一宿剉焙一兩右麄搗篩每服三錢水一盞入生薑同煎至六分去滓温服空心夜卧各一鹿髓煎出聖惠方治虚勞傷中脉絶筋急肺痿咳嗽鹿髓半升生蜜酥各二兩生地黄汁四合杏仁二合湯浸去皮尖䨇仁以酒一中盞浸研取汁桃仁右先以桃仁杏仁生地黄等汁於銀鍋内慢火煎令减半次下鹿髓酥蜜同煎如餳每於食後含化一茶匙補肺散出夲事方治勞嗽桑白皮熟地黄各二兩人參紫花黄耆五味子各一兩右為末每服三錢水煎入蜜少許食後四君子湯加秦芁黄蠟煎服二黄丸治勞嗽青黛二錢辰砂雌黄雄黄白礬信石各一錢并生用右并為末淡豉百粒湯浸去皮研成膏為丸如菉豆大每服三丸至五丸臨卧茶清下秦芁湯治虚勞喘嗽寒熱盗汗秦芁去苗土甘草炙剉各一兩桂去麄皮柴胡去麄皮當歸切各五錢右麄搗篩每服三錢水一盞入生薑三片烏梅並棗各一枚劈破同煎至七分去滓温服紫艽散出聖惠方治虚勞上氣咳嗽不止紫芁去苗土白茯苓各一兩