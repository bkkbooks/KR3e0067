十丸辰砂為衣更好木香散治㵼痢米殻二兩神麴半兩甘草一兩乾薑半兩右為麄末每服三錢水二盞煎去滓無時服萬金飲一名三和湯治脾胃虚弱内受風寒或飲食生冷傷於脾胃嘔吐泄㵼臍腹疞痛脇肋脹滿膓内虚鳴及膓胃受濕膿血相雜下如黄汁或下瘀血裏急後重日夜無度飲食减少漸至痩弱冷熱痢並皆治之出和劑方陳皮去白甘草半生半炙罌粟殻去蒂盖半生半熟蜜炙各等分右為麄末毎服四錢先用沸湯泡中熱又於碗内盛重湯坐盞在内却抄藥末在中用沸湯泡至七分盞上用盞盖之良乆紗濾去滓空心食前温服血痢入烏梅一箇罌粟殻本草不説治痢近用之極効其功不下地榆黄蘖秦皮但性急澁服之則嘔不可不知一方治赤白痢陳皮粟殻蜜炙一半右等分為細末每服二錢陳米飲調服紅蠟丸治諸積㵼痢及暴氣㵼丹砂研令極細粉霜硫黄各一分三味同研巴豆去皮取半兩不破者㣲用油炒熱湯洗去油拭干右研如膏鎔黄蠟一兩半劑勻旋丸黍米大米飲下三二丸暴㵼水下赤痢甘草湯下白痢乾薑湯下白赤痢甘草乾薑湯下婦人血氣紅花酒下如聖針頭丸治㵼痢等疾大効廣木香無鹽豆鼔巴豆已上各等分右為末丸如黍米尖八十至小兒皆一丸如水㵼榆皮湯下白痢乾薑湯下赤痢甘草湯下赤白痢乾薑甘草湯下用倒流水送下神効鷄清丸出瑞竹堂治一切㵼痢木香二兩黄連二兩生肉荳䓻十箇大者生右先為細末取鷄子清搜藥作餅子於慢火上炙令黄色變紅稍乾再為末麵糊為丸如梧桐子大每服五十丸空心米飲湯下防風芍藥湯出濟生㧞萃方治泄痢飱泄身熱脉弦腹痛而渇及頭疼㣲汗防風芍藥黄芩已上各一兩右㕮咀每服半兩或一兩水三盞煎一盞温服大香連丸一名秘方香連丸治丈夫婦女膓胃虚弱冷熱不調泄㵼煩渇米榖不化腹脹膓鳴胸膈痞悶脇肋脹滿或下痢膿血裏急後重夜起頻併不思飲食或小便不利肢體怠惰漸成瘦弱宜服醫方大成石榴皮出肘後方治暴㵼不止及痢下赤白用酸石榴皮焼灰存性不以多少研為細末每服二錢空心用米飲調下炙鷄散治脾胃氣虚膓滑下痢用黄䳄鷄一隻治如食法以炭炙之乾了以鹽醋刷之又炙令極乾空腹食之厚朴散治氣止㵼痢霍亂厚朴去麄皮生薑汁炙令紫二兩甘草炮白芷乾薑炮懐香子畧炒各半兩陳橘皮去白焙乾一兩吳茱萸湯浸焙干炒三分右為散每服二錢凡氣不和鹽湯調下霍亂吐㵼煎木𤓰紫蘓湯調下泄㵼米飲調下赤白痢甘豆湯調下並食前白术安胃散出濟生㧞萃方治一切㵼痢無問膿血相雜裏急窘痛日夜無度又治男子小膓氣痛及婦人臍下虚冷並産後兒枕塊痛亦治痛産後虚熱寒熱不止者茯苓白术各一兩五味子半兩烏梅取肉半兩炒車前子三兩御米殻三兩去頂穰醋淹一夕蜜炒右為麄末毎服五錢水一盞半煎至一盞去滓空心温服不二散治諸般㵼痢神妙罌粟殻二兩甘草一兩炙青穰去穰焙乾二兩陳皮去穰焙乾二兩當歸甜藤一兩如無乾葛代右為細末每服二錢水一盞煎至七分去滓通口服如患赤白痢用酸石榴皮一片同煎極妙二香散一名参香散治㵼痢如神及腹痛下痢日夜頻數出楊氏家藏方罌粟殻蜜煎乳香木香人参黄連去蘆鬚二十兩用茱萸十兩同炒令赤去茱萸不用木香不見火四兩八錢八分右為細末醋糊為丸如梧桐子大每服二十丸飲飯吞下空心食前服日進三二服一方用粟米飯為丸一方二味生用鷄子黄為丸白痢乾薑湯下赤痢甘草湯下赤白痢用甘草乾薑湯下血痢用醋湯下肘後方用白蜜為丸乆冷用煨蒜為丸嬰孺用之亦効二聖散出御藥院方治泄痢不問新乆並皆治之乾黒木耳一兩炒鹿角膠一分炒如珠子右為細末每服三四錢温酒調下不拘時候赤石脂禹餘粮湯出直指方治泄痢諸藥不効以此固其下焦赤石脂剉小塊禹餘粮煆醋淬以酥為度右等分夾和每服四錢空心煎温服小紅丸治㵼痢腹痛膿血赤白及一切痢眀信眀丹各一兩右研極細鎔眀蠟一兩油五七㸃和為劑旋丸如豌豆大每服二丸泄㵼冷水下痢甘草水冷下血者局風胃湯益元散出宣明論治身熱吐痢泄㵼不止膓癖下痢赤白癃閉淋痛利小便偏主石淋乃服金石熱藥而結砂石從小便淋出者也蕩胃中積聚寒熱益精氣通九竅六腑生津液去留結消蓄水止㵼痢除煩熱心燥腹脹痛悶補益五臟大養脾腎之氣皆腎水之臟非為水之腑也理内傷隂痿安魂定魄五勞七傷一切虚損主癎痓驚悸徤忘止煩滿短氣臟傷欬𠻳飲食不下肌肉疼痛并口瘡牙齒疳餌眀耳目壮筋骨通經脉和血氣消化水榖保元真觧百藥酒食邪毒耐勞役飢渇寒熱辟中外諸邪所傷乆服強志輕身駐顔延夀及觧中暑傷寒疫癘飢飽勞損憂愁思慮恚怒驚恐傳染并汗後遺熱復諸疾并觧兩感傷寒能令遍身結滯宣通氣和而愈及婦人下乳催生産後損益血衰隂虚熱甚一切熱證兼吹妳乳癰乃神驗之妙藥也惟孕婦不冝服滑胎也桂府膩白滑石六兩甘草一兩炙右為末每服三錢蜜少許温水調下無蜜亦得日三服欲冷飲者新汲水調下觧利傷寒發汗煎䓤白豆豉湯調下四錢水一盞葱白五寸豆䜴五十粒煮汁一盞調下併三服効為度此藥是寒凉觧散欝熱設病甚不觧多服此藥平状無害但有益而无損乃惡性寒兼易得之賤物而不眀素聞造化之理而不取本草神驗之言多不用焉若以隨証驗之乃凡人之仙藥也不可闕之傷寒當汗而不可下當下而不可汗者且如誤服此藥則汗出自愈裏熱便得宣通而愈或半在裏半在表可和解而不可發汗吐下者若服上藥多愈小効是觧散拂欝邪熱甚者小加减凉膈散和觧為佳或人不當汗者更可加蒼术三分同葱豉煎湯調服甚良如孕婦不宜服滑石麻黄桂枝要發汗當用甘草一兩蒼术二兩同為末每服四錢水一盞半更加入䓤白五寸豆䜴五十粒同煎至七分去滓温服併三服取㣲汗為度逼毒散非孕婦可服太白散加麻黄二兩去節如法煎服世云神白散或逼毒散與加麻黄蒼术各等分去節秤濟衆云青龍散或青龍散欲更加入滑石與蒼术二倍最為發汗之妙藥也唯正可汗者即用誤服之轉加熱也名曰大逼毒散或觧利兩感同更兼煎凉膈㪚調下益元散四錢下乳用猪肉麵􅅅或酒之類調下四錢不計時候日三服宜服肉麵􅅅粥催生用温油漿調下三錢併二三服以産為度或死胎不下者煎三一承氣湯一服調下伍錢湏㬰更頻用温油漿調服煎後俱下胎可活産母也凡難産或死胎不下皆由風熱燥澁𦂳歛結滯不能舒緩是故産户不得自然開也其藥力至則熱結頓開而産矣慎不可温補而反生燥熱也欲未知産後日夜損血疼痛怖懼以致神狂氣亂則隂氣損虚邪熱太甚而為諸証由不眀素問造化故不識証候隂陽反以謂産後諸虚百損便為虚冷而無熱也誤以熱藥温補或見渇甚者不令飲水為本善心為害多矣豈知治病之道俱以臨時審其臟腑六氣虚實眀其標本如法治之而已矣此藥之常多用雖為効至大俗以病異藥同將為妄行反招侮慢今以若加黄丹令桃紅色是以名之紅玉散若加青黛令輕粉碧色名碧玉散若加薄荷葉末一分同研名鷄蘓散主療並同但以廽避愚俗之妄侮耳二勝丸名香䜴丸出宣眀論治泄㵼虚損不問乆新者治痢亦可鹽豉紫薑去皮各等分右同杵為膏丸如梧桐子大每服三丸至五丸米飲湯下如未愈赤白痢腹脇痛更與杏仁丸一方用豆豉丸服五十丸杏仁丸出指南方治一切赤白㵼痢腹痛裏急後重者杏仁巴豆去皮各四十九箇右以藥同焼存性研細如泥用蠟樻定旋丸如桐子大每服一二丸煎大黄湯下間一日一服一方無蠟樻醋糊為丸梧桐子大每服一丸米飲下勝金膏出宣眀論治一切泄㵼痢不已諸脉浮洪者及多日不已脉小者立止巴豆皮楮實葉同焼存性右為末蠟蜜丸如菉荳大每服五丸煎甘草湯下消内靈砂丹治㵼痢取積滯黄蠟一兩巴豆十四箇去殻作兩片入黄蠟内􅆈巴豆黒為度右件去巴豆不用將碙砂二錢用水煮乾只用一錢重仍入黄蠟内再􅆈就入朱砂末一二錢以黄蠟紅為度候冷刮下如用時旋丸小兒三歲只服十丸如黍米大大人服十丸如大麻子大白痢白薑湯下赤痢甘草湯下空心服如病人身體凉㣲細弦細皆是好証便用此藥止如病人身上有冷熱初不可便止先服前藥十丸次服五苓散加車前同煎三服小便清退盡熱方可再用煎藥止住如尚有熱止之决不住反生疼痛如止了熱又不止住可用後藥治㵼痢用正氣散一貼加烏梅􅀥子罌粟殻煎服治暴㵼痢用百草霜研末米飲調下止泄痢下食開胸膈痰實結氣下氣止渇用乾橘皮一斤搗為末蜜為丸每食前酒下三十丸治下焦冷又取陳皮乙斤和杏仁五兩去皮尖熱加蜜為丸每日食前三十丸下腹臟間虚冷氣脚氣衝心心下結哽勝金丸治㵼乆痢當歸二兩用吳茱茰一兩用炒香熟去茱茰不用只用當歸黄連三兩右為細末煉蜜丸如桐子大每服三十丸米飲下三神丸出和劑方治清濁不分泄㵼注下或赤或白臍腹刺痛裏急後重用台烏頭三箇去皮尖一箇炮一箇醋煑透一箇焼成灰存性為末醋糊為丸如菉豆大每服二三十丸水㵼用逆流水下赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下一方醋煑者只生用亦可一方云草烏水泄井花水並空心服忌腥臊熱毒生冷一方大人五七丸小兒三丸治泄痢并下痢赤白出仁存方用敗毒散陳米五十粒煎服治禁口痢妙一方加薑棗煎服一方治禁口痢晝夜無度脉勢遲者藥四錢陳米百粒薑三片􅀥二枚煎去滓食前温服名倉廪湯經驗方陳氏曰余弟二子年十歲病此用此藥一効治寒熱泄痢瘴瘧寒邪氣泄痢隂氣不足止渇及病酒頭痛用小豆花於鼓中煑三沸調和作􅃵食之小豆花本草名腑脾肉荳䓻方治脾㵼痢氣等以荳䓻二顆米醋麵調褁之置灰中煨令黄焦和麵研末更以炒了欓子末一兩相和又焦炒陳倉米為末每用二錢煎作飲調前二物三錢旦暮各一服便瘥治洩痢益氣和中去當風卧濕遇冷所中等病用黄凉米作飯食之治㵼痢取艾葉三月三日採作煎其治冷者患冷氣取熱艾麵褁作餛飩大如彈子一方為乾餅子生薑煎服白澤丸治脾元積冷臟腑虚寒真元不固膓虚泄痢心腹攅痛氣逆嘔吐自汗無時陽起石火煆過赤研附子炮去皮臍取末各半兩白檀香取末滴乳香别研射香别研各一两鍾乳粉㨂好者二兩右和勻滴水成劑分作六十丸每服一丸水一盞化開薑三片煎至七分通口温服食前空心一方附子只用一兩去射香加天雄一兩炮去皮臍火輪散治虚滑泄下寒不禁及暴脱欲死治諸色㵼痢方岀朱氏集驗方夏曰臟氣不和而渇宜以香薷湯調胃茯苓散若有裏急後重宜進胃氣湯加枳殻仍以麵炒去穰若有積滯宜進蘇感丸若水㵼宜進酒蒸黄連丸梅膠圓出十便良方治㵼痢黄連四兩烏梅二兩訶子阿膠茯苓當歸各一兩右為細末湯浸蒸餅糊丸每服三十至四十丸泄㵼米飲下赤痢甘草湯白痢乾薑湯下固膓散主㵼痢日乆不止羸不能食肉荳䓻生用木香不見火訶子炮去核乾薑炮阿井膠陳皮去白罌粟殻醋炙各等分右為末生薑三片紅棗一枚煎至七分臨卧服御米丸出朱氏集驗方治一切㵼痢肉荳䓻訶子白茯苓白术各一兩石連肉當歸各半兩罌粟殻一兩半蜜炙乳香二錢右為末水糊為丸每服三十五丸米飲下如血痢减荳䓻白术當歸罌粟殻澤蘭散出朱氏集驗方澤蘭葉㣲炒川中謂之苟苗米囊皮薑汁或蜜汁去膜甘草炮蒿豉以五月五日用青蒿真艾葉各等分同豆䜴搖亂作餅日乾右以服水一盞半煎再煉赤如黄連白加乾薑和氣飲出續易闕方治腹痛膓鳴泄痢蒼术一兩四錢桔梗一兩二錢枳殻去麄皮麩炒橘皮各六錢白芍藥白芷川芎當歸赤茯苓桂去麄皮半夏湯洗七次甘草炙各三錢厚朴去麄皮薑製乾薑各四分吳茱茰炒半兩右剉散每服四錢水一盞半生薑三片煎至八分去滓食前通口服二滓并煎大霍香散出如冝方治心肺脾胃氣變泄痢心腹攅痛霍香木香青皮神麴肉荳䓻大黄蘗人参甘草炙厚朴製乾薑半兩訶子白茯苓陳皮製各一兩右為末每服二錢陳米飲入塩調熱服大治脾泄小丁香散出王氏􅀶濟方治膓虚洩痢丁香一分附子臍一兩炮製去皮切作片子生薑去皮二兩細細切用右件三味除丁香外同於銚子内炒令黄色碾細為末每服一錢温粥飲調下木香熱呷散廣南四時攝生治一切㵼痢木香半兩肉荳䓻一斤去皮濕帋褁炮肉桂去無味者一分陳橘皮一分紫花木二分濕帋褁炮甘草炙半分右為散每服一錢水六分煎五六沸傾下熱呷如霍亂吐泄不止入薄荷二葉同煎熱呷忌生冷物地榆散治㵼痢或血痢地榆㣲炒當歸㣲炒阿膠糯米炒黄連去湏訶子肉炒取肉秤木香懐乾烏梅肉去核秤净已上各半兩右等分為末煉蜜為丸如桐子大每服二三十丸陳米飲吞下先公頃在括蒼病痢踰月得此方而愈余傾在霅上士人蘇子病此為甚其婦翁孫億來告急録此方以與旋即痊安致謝去䓻香丸出經藏經驗方和脾順氣止泄痢治腹疼并臟寒大便青色腹肚虚鳴頻併不止木香人参甘草炙各一兩罌粟殻盖房炒黒色二兩肉荳䓻十枚醋麵褁煨黄赤色去麵不用右為細末煉蜜為丸隨大小加减旋丸清粥飲化下無時服及療傷令泄㵼驚風入脾霍亂吐㵼不納奶食大便不消化痢下赤白石榴皮煎湯化下臨丁黄掌書元善三世醫小兒只有數十萬皆妙此一也吾家諸孫服之有効大人亦可服之温中厚朴湯老人虚平時多腹脹心下痞有妨飲食或刺痛泄痢氣痞滯思得厚朴去皮細剉甘草細剉生薑細切洗青州􅀥切已上各等分右上二味杵令得所方入生薑􅀥再杵令勻勻相入取出以火焙至浥浥入鍋釜内慢火炒至紫色杵羅為細末每服一錢擦生薑少許沸湯㸃空服以知為度氣味殊羙兼腹愈疾不易為也治泄痢以建茶合醋煎服之止洩痢并渇以鈎粟子食之止㵼痢調中去熱徤人因用小麥麫作餅食之止洩以甜藤葉搗汁服之治膓虚泄痢用五倍子為末熱湯服治泄痢以清蒿為末飯飲調五錢服之治四時暴泄痢四肢冷臍腹疼用深湯中坐浸至腹上頻頻作生陽佐藥無速於此虚寒人始坐湯中心戰仍常令祗守普濟方巻二百七
