body:
  text: 普濟方巻二百七眀周王朱橚撰泄痢門緫論難經云有脾泄有大腸泄有小腸泄有大瘕泄名曰後重盖胃者為黄腸水榖海也故㵼則色黄食不化脾者為胃行其津液者也故㵼則腹脹滿嘔吐大腸謂白腸故㵼則大便色白腸鳴切痛小腸謂赤腸故泄則便膿血小腹痛瘕者血聚也濁隂之氣結聚於内留滯而不行則裏結後重数至圊不能便故謂大瘕㵼也胃為水榖之海其精英則流布以養臟腑其糟粕則傳送以歸大腸腸胃虚弱或挾風或挾寒或傷暑傷熱停冷蓄熱冷熱不調泄㵼諸症皆能治之挾風者自汗惡風痛引腰背挾寒者筋節拘急身體怯寒傷暑者面垢燥渇之引水漿傷濕者肌肉虚浮肢體重著冷則腸鳴肚冷而手足清熱則煩燥肚熱而手足温冷熱不調者乍澁乍溏由熱積於内不能去其積徒以冷藥水飲之熱氣無所發泄故冷與熱摶而下注其或冷積於中不能去其滯徒以熱藥壓之冷積不得宣行故熱與冷甘而成泄或澁或溏裏急厚重是其候也外此則傷食一証失飢傷飽胃不能消心腹膨涨所下酸臭治法當䆒其感受之源然後為之固實不窒其源吾恐决潰四出莫知其終矣然脾胃合氣以消水榖水榖既分安有所謂泄人皆以泄為脾恙而不知腎病有泄焉腎㵼何如曰腹痛無定似痢非痢骨弱靣黒脚下時冷者是也諸有泄㵼用不換金散也除濕湯之類以去風濕以安腸胃此土品藥也次則温脾養胃之劑投之是為正法然用之而不作効抑且腹痛走上走下或臍間隠痛腰脊疼酸骨節軟弱面色黧悴尺脉虚弱病安在哉曰此腎泄也當以炒故紙生薑官桂乾薑木香當歸軰主之仍用安腎丸為佐其或腎水下涸心火上炎燥渇溺多飲無度此隂陽離絶也識者憂焉至若泄痢之後腹滿身疼是則為表裏俱病先當温裏急與四逆湯然後觧表急以桂枝湯與之肝木脾土木能勝土古人慮之固也經肝腎氣虚為病泄㵼亦孰知腎者所以守司於下而肝者又門户要束之具束則不㵼也不然泄㵼而面色青惨者古書謂肝經所受致寒時用當歸厚朴湯以主之果何意哉太素曰五泄有溏泄䳱泄飱泄濡泄滑泄也此乃是五泄者青是感肝木之象其色青赤者受心火之氣其色赤白者得金肺之氣色白黄者脾土之氣圡蒼者圡氣之下與水隨之其色蒼也泄㵼之症經中所謂飱泄澹洞泄濡泄溢泄水榖注下是也大腸為五榖傳送之官脾胃虗弱飲食過度或為風寒暑濕之氣所中皆能令人泄㵼如傷於風其脉必浮下必帶血當以胃風湯驅散之如寒氣所傷脉必沉細腹肚切痛下必青黒當以附子理中湯治中湯等温暖之若傷於暑則脉必沉㣲煩渇引飲其下如水當以飲服五苓散來腹丹以分利之或夾食則又當以胃苓湯下蘇感丸若濕氣所中其脉沉緩腰脚冷痺小便自利不渇其下黄黒色當以渗濕湯藿香正氣湯調之因停食而泄者下必臭類抱壊鷄子或噫氣作酸先服感應丸推其食積而後理脾氣體虚弱及年髙之人脾氣虗敗而自利者又當投以四柱散䓻附丸若脾腎氣虚清晨泄下一二次二神四神丸主之又有腎氣虚而泄者又須金鎻正元丹以固之凡治㵼之法先理其中焦分利水榖然後斷下醫之大法如此若脚氣泄㵼各以類求滑泄一症最忌五虗五虗者脉細皮寒少氣前後泄痢飲食不入者是也若得糜粥入謂泄㵼止作可治也五泄之病胃小腸大瘕三証皆以清凉飲子主之其泄自止厥隂症加甘草以緩之少隂證裏急後重故加大黄又有太隂陽眀二証當進退大承氣湯主之証不能食也當先補而后泄之乃進藥法也先煎厚朴半兩製水煎二三服後未已謂有宿食不消又加枳實二錢同煎二三服泄又未已如稍進食尚有熱毒又加大黄三錢推過泄止住藥如泄未止為腸胃有乆塵垢滑粘加芒硝半合宿垢去盡則愈也陽眀証能食是也當先泄而後補謂退藥法也先用大承氣湯伍錢水煎服如利過泄則少減之後稍熱退减大黄一半再煎兩服如熱氣雖已其人必腹滿又减去大黄與枳實厚朴湯又煎三兩服如腹滿退泄亦自愈後服厚朴湯数服則已如大便虚滑乆不愈太隂傳少隂為痢為賊邪宜以厚朴枳實湯主之儒門事親書云東門一男子病㵼痢不止腹鳴如雷不敢令坐坐則下注如傾諸醫例斷為寒症乾薑官桂丁香荳䓻之属枯礬龍骨皆服之矣何鍼不燔何艾不注迁延將二十載矣一日問於戴人戴人曰兩手寸脉皆滑余不以為寒然其所以寒者水也以茶調散涌寒水五七升無憂散泄積水数十行乃通因通用之法也次以五苓散淡劑渗泄通利之又以甘露散止渇不数日冷食寒飲皆如故此法王啓𤣥稔言之柰無人用之何哉又云凡大人小兒暴注水痢不止内經曰此名曰暴注速㵼乆而不愈者為洞㵼注下此乃火運太過之病也火星暴注故也急宜用新汲水調下甘露飲子五苓散天水散或用井華水煎此藥於冷服之病即瘳矣不可用御米穀乾薑豆㓂聖散子之類縱然泄止膓胃胃氣滯不通變腹脹此法冝分隂陽利水道乃為治法之妙也凡泄㵼水榖不化日夜無度腹中雷鳴下痢完榖可用導水丸禹功散泄之或病人老弱氣虚可用無憂散泄之再觀病勢強弱候一二日可服胃風湯以治其風如不愈者更服桂枝藤黄湯汗之則愈内經曰夫風之中為膓風飱泄啓𤣥子云風入胃中上黨於胃故食不化而化泄又云暮食不化為飱㵼又經云春傷入風夏為飱泄故風冝出汗膓中鳴者風以動之動而有聲慎不可用罌粟荳䓻乾薑大燥之藥病漸者燥之去其濕則愈病甚者攻之不動反能為害經曰其减則漸其加則甚可用五苓散去猪苓加人参散凡下痢膿血腹痛不止者何也諸瘴痒皆属於心火也可用通觧丸加减㵼之量其虚寔用之次用消濕散加生薑大棗芍藥服之㵼訖又用新水調五苓散服之又一法煎燈心湯調下益元散伍㭍錢此病大忌油膩暈腥熱物夫㵼痢兩証因膓胃先虚虚則六滛得以外入七情得以内傷致於飲食不節過食生冷多飲寒漿洞擾膓胃則成注下注下不已餘積不消則成滯下治㵼之法先當分利水榖車前子煎湯調五苓散是也次則上焦中焦正中湯及治中湯是也理中不効方可斷下乳豆丸固膓丸是也或尚腹痛未宜斷下斷下太早必成痢疾惟當調中化積痛輕者宜服治中湯蘇合香丸腹痛更甚者必然成痢也醫經所謂腹痛甚者必下痢也宜進靈砂丹以逐其積此丹用之屡驗㵼者止疼者愈有疾者内化且不動臟腑大凡痢疾不先去其積雖獲暫安後必為害或隂陽相摶冷熱不調而成㵼痢者當進香連丸更有脾腎頓虚腹脇膨脹飲食不化而泄㵼者宜助脾腎􅀥肉丸是也今之人乆㵼不止多投來復丹誤矣盖來復内用硝石硫黄皆有利性青皮陳皮又有遵性豈宜服之如夏月暴㵼乃可服也臟腑泄痢其証有多種大抵從風濕熱也是知寒少熱多故曰暴泄非隂乆㵼非陽膄而便膿血知氣行而血止也宜大黄湯下之是為重劑黄芩芍藥是為輕劑治法宜補宜泄宜止宜和和則芍藥湯止則訶子湯有暴下無聲身冷自汗小便清利大便不禁氣難喘急脉㣲嘔吐急以重藥温之漿水散是也後重則宜下腹痛則宜和身重者除温脉𢎞者去風膿血稠粘以重藥竭之身冷自汗以毒藥温之風邪内縮宜汗之鶩溏為痢當内之在表者發之在裏者下之在上者勇之在下者竭之身表熱者内踈之小便澁者分利之盛者和之去者送之過者止之除濕則白术茯苓安脾則芍藥桂枝黄連當歸宣通其氣則梹榔木香如泄痢而嘔上焦則生薑橘皮中焦則芍藥當歸桂茯苓下焦則治以輕熱藥下甚以重熱藥若四肢倦小便少或不利大便走沉困飲食减宜調胃去濕白术茯苓芍藥三味水煎服如發汗惡寒腹不痛加黄芩為主如未見膿而惡寒乃太隂欲傳少隂也加黄連為主桂枝佐之如腹痛甚者加當歸倍芍藥如見血加黄連為主桂當歸佐之如煩燥或先便血膿後白或發熱或惡寒非黄連不止上部血也如惡寒脉沉或白腰痛或血臍下痛非黄芩不止此中部血也如惡寒脉沉先血後便非地榆不能止此下部血也唯脉浮大者不可下至冬赤白痢者是冷熱乗於血血渗膓間與津液相雜而下甚者膓虚不復故赤白連滯乆不差也凡痢乆不瘥脾胃虚弱則變嘔穢胃熱氣逆故嘔也氣逆外有冷折之不通故噦亦變為䘌蟲食人五臟也三尸九蟲常食居人膓胃膓胃虚則動上食於五臟則心懊憹而悶齒斷唇口並生瘡下食於膓則肛門傷爛而榖道開也輕者可治重者致死大膓蟲痢者冷熱之氣入在膓間先下赤後下白連年不愈侵傷於臟腑下血雜白如病蟲之状名為膓蟲也有休息痢者胃管有停飲因痢積久或冷氣或熱氣乗之氣動於飲則飲動而膓虚受之故為痢也冷熱氣調其飲則靜而痢亦休膓胃虚弱易為冷熱其邪氣或動或靜故其痢乍發乍止謂之休息痢也夫水榖之精化為血氣津液以養臟腑受風邪入膓胃故痢則津液空竭臟腑虚燥故痢而兼渇也渇而引飲即痢不止翻益水氣脾胃已虚不能克消水水氣流溢侵漬肌肉則變成瘇也病有數種有水痢有榖痢有血痢有膿痢有膿血相和痢有傷澼痢其水痢者本由脾氣熱消榖作水榖氣不停便生此痢榖痢者由脾氣冷榖氣不消而生此痢血痢者由毒熱在腹血流入膓故有此痢膿痢者由積冷所致膿血相和痢者由冷熱相擊便致此痢膓澼痢者由積冷在膓間垢洟不能自固便有此痢色數雖多其源則一皆縁飲食不節将飬失宜也膓垢者膓間津液也由熱痢藴積膓間虚滑所以因下痢而便膓垢也當診其脉如下痢㣲小者生浮洪者死沉弦者下重脉大者未止𦂳者邪氣未觧脉弱而㣲渇必自愈膓澼下膿血者脉宜㣲滑也若弦急者必死手足厥冷無脉炙之不温脉不還反㣲湍者死身寒者生發熱者死臨病之際由此驗治之萬不失一下痢脉滑而數有宿食當下之下利脉遲而滑者寔也利雖未止宜急下之下痢脉反滑當有所去下乃愈下痢不欲食者有宿食當下之下利而腹痛滿為寒寔當下之下利腹中堅者當下之下利而讝語者腹内有燥屎宜下之下利二部皆平一作浮按其心下堅者急下之下利已瘥至其年日月時復發者此為下不盡更下之愈風寒下者不可下下之後心下堅痛脉遲一作浮此為寒但當温之脉沉𦂳下之亦然脉大浮弦下之當已下痢脉浮大此為虚以強下之故也設脉浮革者因爾膓鳴當温之下痢脉遲急為痛未欲止當温之得冷者滿而便膓垢下痢身軀疼痛急救裏諸温之属可與理中四逆附子湯熱藥下痢大孔痛者當温暖之下痢腹脹滿身軀疼痛者先温其裏乃攻其表下痢清榖不可攻其表汗出必脹滿下痢氣者當利其小便下痢脉反浮數尺中自濇其人必清膿血下痢脉數而渇者今自愈設不瘥必清膿血有熱故也下痢脉沉弦者下重其脉大者為未止脉㣲弱數者為欲自止雖發熱不死下痢脉沉而遲其人面少赤下痢清榖必欲冐汗出而觧病人必㣲厥所以然者面戴陽下虚故也下痢有㣲熱而渇脉熱者今自愈下痢脉數有㣲熱汗出今自愈設脉𦂳為未觧下痢脉反強發熱身汗者自愈下痢脉大浮弦下當已下痢舌黄燥而不渇胸中寔下不止者死下痢後脉絶手足厥冷晬時脉還手足温者生不温者死下痢手足厥冷無脉者炙之不温若脉不還反㣲湍者死少隂負跌陽者為順凡六腑氣絶於外者手足寒上氣脚縮五臟氣絶於内者下不自禁下甚者手足不仁也痢與㵼名目不同而感受之源一也治療之劑大要以散風邪行滯氣開胃腕為先不可遽用肉荳䓻訶子白术軰以補住寒邪不可遽投罌粟殻龍骨牡礪軰以閉塞膓胃邪氣得補而愈盛補之愈盛而愈作不為纒􅅰撮痛則為裏急後重所以日乆延淹而未已也痢之赤白其赤者熱乗於血血渗大膓則赤也若風邪挾熱則所下黄而赤其白者冷摶膓間津液凝滯則白也若寒邪併之則所下白而黒冷熱相交故赤白相半重者状若膿涎而血雜之輕者濃涎中間㣲有赤縷是也内挾風邪故青血流注或濕毒乗虚入膓胃之間則下如荳汁或有瘀血是也論者以手足寒為冷手足温為熱於理甚當亦當以赤白而並觀之雖然風寒暑濕感之於外者也其大嚼而傷飽而宿酒漿醯醢以成積滯房闥縱情加奔走勞役以耗精血非此病生於内者乎必眀别内外而推度之則受病淺深用藥輕重知有定向矣下痢壮熱湏用敗毒散加陳米間與五苓散黄連阿膠丸下痢雖曰有積有暑如用藥不效即是腰胃有氣邪熱者赤毒者與敗毒散冷者白者不換金正氣散加木香若下痢熱極煩併窘痛或乆不愈諸藥不能者湏下之以開除濕熱痞閉積滯而使氣液宣行者宜以逐之兼宣痢積熱也凡治痢不可拘於無積不成痢之説也專以去積為先豈有一歲之内獨於夏秋之間人皆有積亦湏眀其脉體之由辨其風寒暑濕所中盖風邪入胃水來勝土不為暴下則為痢疾其疾所發証候不一有赤痢白痢赤白痢冷痢熱痢蠱痢氣痢噤口痢積痢血痢乆痢休息痢膿血痢五色毒痢凡下痢赤黄但欲飲冷小便不順利得熱則更極心煩燥喜渇脉虚大而數或沉寔有力由乗虚熱入於胃凑於下焦津液不分併於大膓謂之恊熱痢先以小承氣湯一二服蕩之次以五苓散加車前子以利小便次以黄連阿膠丸治之治痢陟釐丸烏梅丸松皮散等暴痢服之何有不差其温脾湯建脾丸乆不得之焉能得愈大凡痢有四種謂冷熱疳蠱冷則白熱則赤疳則赤白相雜無復節度多睡眼澁蠱則純痢瘀血熱則多益黄連去其乾薑冷則加以熱藥疳則以藥吹灌下部蠱毒則以蠱法治之藥既主對相當痢者復自勉勵服餌焉有不愈者也諸㵼痢方炙肝散治脾胃虚弱五癆七傷肌體羸痩全不思食乆患泄㵼膓滑不止心胸滿悶臍腹疼痛或便膿血困倦無力四肢沉重及心勞口瘡並皆治之木香白术生􅙈角山茵陳去梗紅荳䓻縮砂仁桂去麄皮人参去蘆頭黒附子炮製去皮臍石斛剉炒狗􅆃去皮川芎良薑柴胡去苗訶子炮去核草荳䓻炮裂去皮臍各一兩半陳皮去白白芍藥乾薑炮桔梗防風紫苑去土紫參去皮白蕪荑炒去皮吳茱莄洗焙乾各半兩右為末每二錢羊肝二兩去筋膜薄批掺藥入䓤白生薑絲鹽各少許拌勻紙褁水濕文武火煨熟用生薑粥下食前日二木香荳䓻丸治臟腑泠極乆冷傷憊口瘡下泄米榖不化飲食無味肌肉消痩心多嗔怒婦人産後虚冷下泄及一切水泄冷痢脾泄此方於東坡家藏方内言用此藥與人莫不神應備録病愈人名姓兹不偹述予用此方十餘年無不取効脾㵼者即愈而㵼痢只一服見効惟熱痢熱㵼不治盖藥主熱也隨証用之木香破故紙各一兩良薑七錢半砂仁七錢半厚朴七錢半赤芍藥半兩陳皮半兩官桂半兩白术半兩胡椒二錢半吳茱茰熱水洗二錢半肉荳䓻四箇梹榔一箇右為末用漿水煑猪肝和藥搜勻仍用些麵糊為丸如梧桐子大每服五七十丸空心􅆈稀米粥飲送下訶梨勒丸治五泄痢訶梨勒半生半煨並去核肉荳䓻去殻木香各三分乾薑炮甘草炙剉各半兩右為末煑醋糊丸梧桐子大每服二十丸至三十丸米飲下鍾乳建脾丸治男子婦人虚損羸痩身體沉重脾胃冷弱飲食不消腹脹雷鳴泄㵼不止又治膓虚積冷下痢清榖或下純白腹中疞痛及乆痢赤白膓滑不禁少氣羸痩不思飲食並冝治之肉桂去麄皮人参去蘆黄連去鬚乾薑炮龍骨各一兩蜀椒去目及閉口者㣲炒出汗三兩半當歸去鬚石斛去根各一兩大麦蘗炒一兩附子炮去皮臍五錢細辛去苗土茯苓去皮神麴碎炒赤石脂各一兩鍾乳粉一兩半右為末入鍾乳粉和勻煉蜜為丸如梧桐子大每服三十丸食前服温米飲下日三服未効用三建湯吞金粟黄芽丹數粒方見痼冷類一方通治男女集驗無細辛龍骨丁香荳䓻散治脾胃虚弱宿寒停積或飲食生冷物内傷脾胃泄㵼注下水榖不化胸滿短氣嘔逆惡心臍腹疞痛脇肋脹滿腹内虚鳴飲食减少及積寒乆痢純白或白多赤少日夜無度或脾胃虚寒泄㵼日乆愈而復發者並宜服之京三稜炮木香不見火厚朴去麄皮薑汁製芍藥肉荳䓻炮人参乾薑炮茯苓白者去皮各五兩甘草炙吳茱茰湯泡七次焙丁香各二兩蒼术去皮七兩右為細末毎服三錢水一盞薑三片棗一枚同煎至八分空心食前温服不及煎入鹽少許湯㸃服亦得白术聖子散治一切㵼痢乆不瘥并婦人産後痢亦治御米殻三兩蜜炒當歸乾薑炮石榴皮甘草訶子肉荳䓻陳皮去白白术縮砂仁芍藥各等分右為末每服二錢水一大盞入乳香少許同煎和滓服固膓丸治㵼及泄㵼肉荳䓻面褁煨龍骨煆研水飛阿膠阿粉炒木香濕紙褁煨附子炮製乾薑炮赤石脂煆七次醋碎研人参去蘆已上各一兩沉香半兩鎊不見火白术二兩炒訶子去核二兩右為末粳米糊丸梧桐子大每服七八十丸空心米飲下服藥後覺熱去附子加茱茰一兩黄連一兩大温脾丸治脾胃虚弱冷氣攻衝飲食不化心腹脹痛嘔吐吞酸痞噎及膓鳴泄痢水榖不分面黄肌瘦食减嗜卧並皆治之常服温脾益胃消榖進食如乆虚痼冷食少多傷尤宜常服吳茱萸湯泡七次焙大麥蘗炒肉桂去麄皮各五兩甘草炙桔梗人参乾薑炮各三兩附子炮去皮臍細辛去苖各二兩枳寔麵炒一分半神麯碎炒三両一錢右為細末煉蜜丸梧桐子大每服二十丸温酒下米飲亦得日三服空心食前一方用枳殻訶梨勒散治泄痢無度訶梨勒母丁香各五枚甘草炙剉一錢肉荳䓻麵褁焼一枚右為散米飲調下半錢食前服纒金丹治大人小兒一切㵼痢無問冷熱赤白連綿不瘥愈而復發腹中疼痛者宜服之和劑方一名不二丸硇砂一方旡乳香各二錢半杏仁去皮尖巴豆去皮心膜出油各八錢半黄蠟朱砂各一兩木龞半兩白膠香一錢黄丹二兩半砒霜醋煑煆三錢半或研磁礶子以赤石脂固縫鹽泥固濟焼通赤候冷取出右為細末鎔蠟搜和丸如麻子仁大每服一丸小兒半丸水泄新汲水下赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下并於臨卧時服孕婦莫服忌熱物一二時辰一方鎔蠟為劑入油二十㸃令軟油單褁旋丸肉荳䓻丸出御醫院方治膓虚脾弱停積風冷大便泄㵼水榖不化腹脇脹痛下痢膿血遍數頻併裏急後重嘔逆惡心肢體困倦飲食减少肉荳䓻麵褁煨黒附子炮去皮臍川薑炮桂去麄皮硫黄研白术炒當歸去蘆頭各一兩川烏頭炮去皮劑紅荳䓻各半兩訶子皮一兩右為細末醋麺糊丸梧桐子大每服三十丸空心米飲下水煑木香丸仁存方治膓胃虚弱風濕進襲洩泄水榖滯下膿血疞刺疼痛裏急後重日夜無度及純下白痢淡紅黒痢當歸洗芍藥白甘草炙訶子去核各半兩青皮陳皮各一兩縮砂仁木香炮各一分厚朴去麄皮切薑製一兩罌粟殻切醋淹炒五兩右為末蜜丸一兩作五丸每服一丸水一盞煎七分食前温服凡血得熱則淖溢故行得寒則凝滯故瘀當審其風熱風冷二証與蠱痢大别外有血痔血枯肉衂酒利肺疽腸胃大蓄遠近瘀血等各有門類不可混雜積冷積熱及水榖寔而下痢者以大黄湯下之養生方亦云踈滌之更不知有寒熱風濕虚寔之不同後尋即妄用被害多矣吁可傷哉一方有乾薑無縮砂仁厚朴白术調中丸瑞竹堂治脾胃不和心下堅痞兩脇脹滿臍腹疼痛噫宿腐氣霍亂吐㵼米榖不消乆痢赤白膿血相雜多日羸痩不思飲食神麯四兩炒白术半兩人参去蘆白茯苓去皮猪苓去黒皮澤㵼各三錢木香二錢官桂去麄皮一錢半甘草去皮炙一兩乾薑炮一兩右為末麵糊丸梧桐子大每服五七十丸空心淡薑湯下加味六君子湯出徳生堂治一切脾胃虚熱泄㵼之証及傷寒病後米榖不化膓中虚滑發渇㣲痛不乆瘥者及治小兒脾甘泄㵼得痢人参白术白茯苓甘草黄耆山藥砂仁各一兩加厚朴七錢半肉荳䓻麵炒叧研七錢半右為末每服二錢飲水調服不拘時如熱煎麥門冬水調服震靈丹出直指方治脾㵼腹痛無定處似痢非痢骨痛面黧腰脚時冷禹餘粮火煆醋淬不計遍次手撚碎為度丁頭代赭石如上修製赤石脂紫石英杵碎已上各四両入于鍋内以瓦盖鹽泥固濟候乾用硬炭一十斤煆通紅火盡為度入地坑内出火毒二宿研末用滴乳香别研沒藥五靈脂并去砂石研各二兩硃砂一兩研右並為細末糯米粉糊丸小雞頭子大風乾每服三丸用炒故紙入􅀥湯調鍾乳粉少許空心下小兒腎泄白膿褐汁面黯齒脱畏人怯寒震靈丹末入㱔鍾乳粉以􅀥煎炒故紙取熱汁調下胃風湯出直指方治大人小兒風冷乗虚入客脾胃風散氣故血行大腑多便鮮血水榖不化泄㵼注下腸胃濕毒下如腹脇虚滿膓鳴豆汁或下瘀血日夜無度臍腹疞痛膓風下血婦人下血過多靣黄力倦服此尤能資補但味甜恐傷榖氣耳人参白术茯苓當歸芍藥桂心芎藭各二兩防風右㕮咀每服三錢水一大盞陳粟米百餘粒煎取七分去滓熱服小兒量力與服今人多用此治痢止㵼者皆非所宜但血痢脾胃虚壮冝服瘧痢皆生於脾虚而有痰外冐風暑致隂陽分争寒熱更作休作有時病名曰瘧若脾胃虚而受積内挾風暑致臓腑不調赤白雜下登厠頻数病名曰痢瘧痢二病中外証雖不同要知此能傷耗氣血治瘧之法當先分隂陽然後與之驅絶治痢之法當先除積滯然後與之調止由是而知痰者瘧之根積者痢之源治之者必先其要可也一方有甘草無防風易簡加减胃風湯又云若加熟地黄黄耆甘草等分足為十味名十補湯若虚勞𠻳加五味子若有痰加半夏若發熱加柴胡若有汗加牡礪若虚寒加附子若寒甚加乾薑皆依本方等分若骨蒸發熱飲食自若者用十補湯加柴胡二兩服之者氣短加人参若小便不利加茯苓若脉弦濇加川芎若惡寒加官桂若脉濇加當歸若腹痛加芍藥若胃熱濕加白术㓗古云黄防風為上使黄連為中使地榆為下使若血瘀色結者陳血也加熟地黄若血鮮色紅者新血也加生地黄若寒熱者加柴胡飢熱者加地骨皮若脉洪寔痛甚者加酒浸大黄一方無防風當歸散出危氏方住㵼痢地榆陳皮罌粟殻去蒂蕚穰當歸去尾赤芍藥甘草肉荳䓻煨黄連右各等分為末每服二錢冷水調服沒石子丸出危氏方治臓氣虚弱大膓滑泄次数頻併曰漸羸瘠不進飲食或乆患赤白痢脾㵼等病並皆治之白术白茯苓各二錢白薑切作片子炒赤石脂别研丁香不見火訶子濕紙褁炮取净皮各二錢肉荳䓻麺褁炮沒石南畨者麺炮各二兩右和勻用湯泡蒸餅為丸梧桐子大每服三四十丸米飲吞下食前一日三四服棗肉丸亦得感應丸出仁存方治臟腑停積臍腹疼痛米榖不化下痢赤白泄㵼注下丁香木香各一兩半肉荳䓻二十枚百草霜研二兩巴豆七十粒乾薑炮一兩杏仁一百四十粒去皮尖研成膏右除巴豆百草霜杏仁外餘為細末和勻用好蠟六兩溶濾去滓更以好酒煑蜜蠟溶候冷取出秤用凡春夏用清油一兩蠟秋冬用油一兩半熔蠟作汁和藥末搗成劑旋丸如菉荳大每服十丸加至三十丸米飲下薑湯亦可食前服三五丸地榆湯聖濟緫録治泄痢無問老小地榆剉酸石榴皮甘草炙剉各三分阿膠炙燥半分龍骨半兩白石脂半兩赤芍藥三分厚朴去麄皮生薑汁炙三分右搗篩每服五錢水一盞半煎一盞去滓空心日午温服斷痢散治一切㵼痢腹痛乆不瘥肉荳䓻丁香乾薑炮各二錢半甘草炙陳皮訶子去核各一兩御米殻去蒂蜜浴炒三兩右㕮咀每服二錢半水一盞乳香一粒粟