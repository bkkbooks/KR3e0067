body:
  text: 普濟方卷二百八十一明周王朱橚撰諸瘡腫門濕疥附論夫濕疥者起小瘡皮薄常有黄水出此風熱氣淺在皮膚間成也方烏頭散出聖惠方治濕疥常有黄水瘙癢不絶川烏頭藜蘆白礬灰馬腸根石菖蒲硫黄細研杏仁去皮苦參剉膩粉已上各半兩右搗細羅為㪚都研令勻用時先以桃湯洗拭乾後用油漿水和塗之三日一塗不過三兩次即瘥黄連散出聖惠方治濕疥有黄水皮膚瘙癢黄連二兩去鬚蛇床子半兩水銀一兩半赤小豆一兩胡粉一兩糯米一兩右搗細羅為散以生麻油和研候水銀星盡如膏取塗之又方出聖惠方硫黄一錢膩粉半分砒霜半兩斑猫十枚微炒右細研以口脂調塗之又方出聖惠方巴豆二枚乳頭香硫黄水銀已上各一分右同研令水銀星盡油調少許安在手心中夜後合手便卧神効立効散出聖惠方治濕疥浸淫流漬遍體火作瘭漿搔之水出小如粟粒癢痛難忍肌膚濕潤久不瘥者膩粉碌礬黄蘗㣲炙細研硫黄細研各等分右為細末研勻以生油調藥塗之又方出直指方治濕疥生明硫黄半兩胡粉黄丹各二兩右為細末擦治濕疥及惡瘡方出聖惠方葶藶子一兩炒令黑色白礬一兩燒令沸定右搗羅為末用生油調塗之又方出聖惠方臰黄四兩細研熟艾二兩右以煉好猪脂半斤先煎艾十餘沸濾去渣入臰黄末攪勻收於磁器中旋取摩塗不得近眼治濕疥常有黄水出方出聖惠方豆䜴一兩炒令煙出右細研以生油調塗之諸癬附論夫癬之字從鮮言如發於㣲鮮縱而弗治則浸淫滋蔓其病得之風濕客於腠理搏於氣血氣血否澁久則因風濕而變化生蟲故風多於濕則為乾癬但有周郭皮枯瘙癢搔之白屑起者是也濕多於風則為濕癬郭中如蟲行浸淫赤色搔癢汁出是也風折於氣血則為風癬􅍙痺不知痛痒是也如錢形然則為圓癬如雀目然則為雀目癬亦皆痛而瘙癢之或牛犬所飲刀刃磨滓之飲水取以盥濯毒氣傳人亦能生癬故得於牛毒者狀似牛皮於諸癬中最為􅍙厚邪毒之甚者俗謂之牛皮癬狗癬白點而連綴刀癬縱針無定形凡此八者皆風濕毒氣折於肌中故痛癢不已久而不瘥又俱謂之久癬又雲露下勿卧夏間露著人面令皮厚及喜生癬方漏蘆膏出聖濟總録治一切癬漏蘆地榆附子去皮臍杏仁湯浸去皮尖雙仁各一兩細辛去苖葉半兩藜蘆去蘆頭木通莽草白芷吳茱萸蜀椒去目并合口蠟各二兩清油一觔右細剉十一味先熬油令沸下諸藥煎候白芷赤黒色停冷綿絞去滓拭鐺令浄再下油并蠟煎候蠟鎔盡磁盒盛收旋塗患處仍用後丁香㪚敷之日三五上瘥丁香散出聖濟總録治一切癬塗漏蘆膏後宜敷此藥丁香搗末蝦蟇灰各一兩麝香研一分五倍子搗末白礬熬令汁枯研膩粉各半兩右合和為㪚敷於癬上以瘥為度又方出危氏方治遍身皮癬以雄黄末入輕粉猪膏塗抹治癬瘡方出肘後方取蟾蜍燒灰末以猪脂和敷之又方出本草以山豆根搗為末臘月猪脂調塗之胡粉散出仁存方治一切癬瘡瘙痒甚者胡粉一分砒半分大草烏一箇生用蝎稍七枚雄黄另研一分斑猫一枚麝香少許硫黄另研一分右為細末先用羊蹄根蘸醋擦動次用藥少許擦患處治頑癬瘡癩雄黄硫黄全蝎檳榔礬猪芽皂莢麝香少許蛇床子右等分為末用猪油調搽瘡上如聖丸出儒門事親書治癬黄蘗黄芩黄連防風已上各半兩白殭蠶一兩全蝎三分輕粉半錢右為細末羊蹄根汁浸蒸餅為丸如梧桐子大每服二三十丸嚼羊蹄根汁送下隨病人上下分食前後又用羊蹄根汁塗癬治癬藥方當歸鬚一兩獨活一両苦參一兩蒼耳頭二十箇黄連半兩杏仁二十箇羊蹄根五根右搗碎入消風散一帖用水一盞酒半盞煎至一盞食後服洗藥羊蹄根獨者五根桃頭十四箇母藤二十箇白礬飛過半兩杏仁二十箇湯泡去皮尖百藥煎半兩消風散一貼右搗碎用湯為丸擦洗之忌一切毒物狼牙膏出聖濟總録治一切癬狼牙搗雄黄研丹砂研硫黄研雷丸搗白礬煅枯研藜蘆去蘆頭各一兩右研細篩為㪚蜜調成膏塗癬上日三遍以瘥為度又方治癬白芨貝母川桂皮巴豆川剪草斑猫少許榆樹皮右為細末米醋調敷之又方出直指方以草烏頭不去皮尖切小塊一半用猪油煮令浮黄一半用鹽炒令焦黄為末酒麪糊丸如梧桐子大每服十五丸茶酒任下亦治諸風頑痺又惡癬方出直指方用紫背草入生明礬研細敷二三次斷根雄黄膏出聖濟總録治一切癬雄黄研細石硫黄研末羊蹄根濕者沙糖色白者荷葉新者各一兩右先以羊蹄根白糖荷葉於乳缽内細研如泥次入硫黄雄黄末相研成膏磁盒盛取塗癬上日三度如藥乾添蜜少許調之鯽魚㪚出聖惠方治一切癬或乾或濕痛癢不可忍鯽魚一箇生髮一雞子大明硫黄雄黄各半兩生猪脂四兩右先煮猪脂欲沸即入鯽魚煎令烟盡去渣入髪銷盡濾清即入硫黄雄黄末拌勻磁器收用不拘時候塗之醫癬方出直指方吳茱萸生半夏草烏白芷赤小豆等分右為細末米醋夾生蜜稀調先用川椒連根葱紫蘇莖煎湯洗次敷藥良遍身牛皮癬方出危氏方川烏草烏去皮尖何首烏白芷蘇木各等分右截小片臘月猪脂酒煮焦候冷入鹽少許磁器收時常挑一匙空心酒調服癬瘡藥桱皮五倍子檳榔斑猫羊蹄根各半兩右為細末用水調先用竹刀刮破癬上然後搽藥桱樹散出德生堂方治乾濕癬面腮髮際或手背腿上癢抓則痛而久不瘥者桱樹皮四兩白蒺藜二兩白礬一兩雄黄一兩白芨一兩半右為細末凉水調塗癬上三四次即愈治身體瘙癢白如癬狀者楮子二枚猪􅏬一具鹽一觔礬石一兩右以苦酒一升合搗令熟以拭身體日三又方用砂糖一小塊先用竹箆刮去皮血却用手敷立効又方出肘後方以燒人糞末水銀油和塗之瘥療燥癬苦酒磨狼毒敷之良又方出聖惠方取醬瓣半盞研爛浄洗入藜蘆末半兩調塗之又方出聖恵方取楝根以釅醋磨塗之銀粉㪚治一切頑癬輕粉二錢黄丹藶青白膠香各等分右為末麻油調拭浄或抓破竹箆挑搽二次便乾數次剥去殼也治牛皮癬如神治一切癬瘡羊蹄根四兩百藥煎二兩白礬一兩輕粉一錢右剉細砂盆擂用苧布包藥擦癬瘡上如聖散出聖濟總録治一切乾濕癬風化石灰半兩鉛丹三錢膩粉一錢石硫黄半錢右同研如粉用生油調先以布揩破癬塗之未塗藥先煎葱白甘草湯淋洗如換時亦依此沉香瀝出聖濟總録治一切乾濕癬沉香栢節杉節松節各半觔右剉如指面大以布囊盛置於漚麻水中浸一食久漉乾取一枚白坩穿底下作一孔如鷄子大以松葉一枚安孔上以藥囊坐坩内用鹽一升葢上以黄泥固濟坩令厚三五分以炭火加坩口燒之坩下安碗一口滴藥汁於碗中候烟盡即取碗中藥汁塗敷瘡癬上日三五次以瘥為度白秃疽疥惡瘡並皆治之梅實膏出聖濟總録治一切乾濕癬烏梅取肉十四箇大蒜頭去皮切十四箇屋塵細篩鹽各三合右先研烏梅次下大蒜屋塵鹽等和研令細以醋調成膏取塗癬上日三五度即瘥一方有大麻子四合龍腦膏出聖惠方一名雄黄㪚治一切乾濕癬癢痛不可忍者龍腦石硫黄斑猫去翅足膩粉各半兩右細研為末用麪油調成膏發癢痛時抓破塗之日三五次即愈水銀膏出聖濟總録治一切癬水銀一分蕪荑仁研末薑黄搗末各半兩酥二兩右先煎酥和水銀以栁條研攪候水銀散即下蕪荑薑黄末攪勻磁盒盛旋取塗癬上日三兩次諸癬妙方一名神妙方出聖惠方治一切癬斑猫二十一枚生用明硫黄藜蘆各三錢輕粉一錢半右為細末麻油調搽候癬癢發時先以布帛擦令傷即便塗之治癬妙方出傳信適用方川烏香白芷蟬蛻已上各半兩全蝎一分右為末用羊蹄根自然汁煉蜜為丸如梧桐子大每服二十丸先安排熱酒一盞去浴堂内解卸衣服了以羊蹄根自然汁滴在盞内嚥下藥便用熱湯澡洗却用羊蹄根代皂角擦之出浴令汗乾便不見癬治癬巴豆七粒去粒殼絳礬彈子大羊蹄菜根五條紅米飯一茶匙右與飯同研細塗癬仍以布先擦破癬秘方王元吉所傳吳材先用之効治癬硫黄巴豆斑猫地膽右為細末用津液唾調搽又方百藥煎明礬斑猫以七為數秃菜根右搗和爛研如泥丸成塊用時分少許紗片裹藥醋浸撲之昨葉荷草散出危氏方治一切癬無問風濕氣血與夫相染而生者昨葉荷草即瓦上曬乾一兩枯礬一兩雄黄半錢右為末以羊蹄菜根先蘸醋揩癬上令癢破即以藥末乗濕塗敷不過三兩次即愈又方一名貫衆散出百一選方治癬竒甚昔馮仲柔云清胃用止一兩次𫝊而愈之奇甚貫衆吳茱萸官桂等分髙下亦不妨右同為細末先以手抓破用藥擦之用米醋調傅亦得又方出百一選方治癬甚妙羊蹄根百藥煎右同搗爛傅上良一方用羊䠙根蘸藥擦之一方無白礬烏蛇散出聖濟總録治一切乾濕癬烏蛇酒浸去皮骨炙一兩乾荷葉一兩枳殼去瓤麩炒三分右為散每服一錢用蜜酒空心調下日晩再服三神丸出聖濟總録治一切癬蒺藜子炒海梧皮剉草烏頭鹽炒熟去鹽不用各一兩右為細末麪糊和丸如菉豆大每服十丸至十五丸空心温酒鹽湯送下殭蠶散出聖濟總録治一切新久乾濕癬白殭蠶炒去絲四十枚斑猫二十箇全者生用膩粉一錢右搗研為細末乾癬用生油調塗濕癬止乾揩貼之並候黄水出及數數癢痛永除根本亦無瘢痕附子散出聖濟總録治一切癬附子炮製去皮臍半兩皂莢一挺去皮子炙吳茱萸湯洗焙炒一兩右搗羅為㪚先用新布揩癬令濕然後塗藥日三兩上如乾癬以醋調塗治一切癬瘡方出聖惠方烏蛇半觔酒浸一宿取肉炙乾羌活去蘆頭四兩麝香一錢研右搗羅前二味為㪚入麝香同研每服二錢空心温酒下日三服治乾濕癬癢痛不可忍方出聖惠方羊蹄根一兩黄連去鬚二兩蛇床子半兩右搗羅為末用臘猪脂調令稀塗癬上良黄麻散出聖濟總録治諸瘡癬大黄剉炒四兩天麻𦍑活去蘆頭各二兩右為細散酒煎三盞服又方出聖惠方水銀一兩吳萸末半兩右以酥少許和研水銀星盡塗之治癬方出百一選方雄黄二錢好者川烏一箇右為細末先用竹刀子刮破癬用醋調少許傅之治久近癬極驗方出百一選方豆䜴半合斑猫七箇頭翅脚全者右一處慢火炒候有烟生為度搗末遇欲用藥時即抓破癬以蜜或沙糖水塗之良久乾擦藥末在癬上三二日必愈治癬立有神効藜蘆根半兩輕粉二錢半右為細末凉水調搽癬上防風散出聖濟總録治一切癬防風去叉母猪肉各二兩右同煮數沸去猪肉取防風焙乾搗羅為散每服一錢白湯㸃服不拘時候抵聖散出聖濟總録治一切癬草决明半兩焙搗末膩粉二分一方用輕粉右合和為散先以布揩癬令赤次以醋調藥塗之當汗出痛解即瘥一方不用醋調胡粉膏出肘後方治一切乾濕瘙癢胡粉二兩水銀一分右合研令勻以醋調成膏塗之仍以紙貼日三五上瘥一方不用醋調又方出肘後方蛇床子駝脂一作猪脂右先研蛇床子令細以猪脂調成膏塗之日一上五次即瘥雀糞塗傅方出聖濟總録治一切癬雀糞醬瓣水洗浄各半兩右合和細研塗敷癬上日三二次一方取醬瓣尿和塗之獨活散出聖濟總録治一切癬獨活半兩附子炮刮去皮臍一兩右搗羅為散以酒調和如糊先用皂莢煎水洗癬然後塗之一日二次大黄散出聖濟總録治一切癬大黄如棗大一塊斑猫脚翅全者七枚右搗研為細散以釅醋調如糊先揩破癬瘡然後塗藥候乾洗之七星散出聖濟總録治諸癬乾蝎七節者白殭蠶直者各七枚右搗羅為散每服三匙用好酒一盞入羊蹄根汁并蜜少許調服晡時一浴仍用羊蹄根滓揩浴治癬方出聖惠方治濕癢搔之有黄水者云余少年曾患癬初在頸項間後延上左耳遂成濕瘡用斑猫狗膽桃根等塗令􅀢蠚其瘡轉勝偶於楚州賣藥人教蘆薈一兩甘草炙半右為末相和令勻先以濕漿水洗癬用帛子拭乾敷癬上良乾瘥一方抓動癬次用藥擦之日三五次瘥又方川椒三分去目䜴三合右同燒為灰研如粉以清油調塗之苦參丸治一切癬苦參用皂莢十挺以水煮之以皂莢爛為度揀出苦參切曝乾将皂莢汁濾去渣熬成膏威靈仙洗擇焙乾各三兩右為末以皂莢膏和丸如梧桐子大每服二十丸空心温酒下加至三十丸又方治癬亦治白秃用羊蹄根於磨石上以苦酒磨之敷瘡欲敷瘡時先將瘡刮破以火炙乾後敷四五遍一方搗羊蹄根以白蜜和臨用先刮破瘡令傷敷之如炊一石米久拭去更以三年米醋和塗之若刮瘡處不傷即不瘥一方用乳汁和塗之又方以乾荆子燒中央器盛兩頭取汁塗之先刮瘡上令傷次用荆子汁治癬用煎滷熱搨不拘多少日一遍良又方用刺薊汁服之又方以燒蛇蛻一具酒服或以死蛇燒灰用猪脂和塗傅癬上瘥又方以生地黄汁服之佳又方用搗莨菪根蜜和敷之一方用葉亦得治頑癬以砒霜少許滴酒同熬為膏塗之亦妙如覺癢急但以冷水洗切不可抓破旱蓮方用旱蓮草葉不拘多少候癬癢時抓破拿葉擦之不可食害人煮蓮葉洗之亦可一方用栁葉洗亦良治癬如神方以杏仁七粒去皮尖自嚼令爛於手心安少膩粉帶津吐出急和膩粉擦之又方治癬積年者亦効用斑猫一箇去頭翅足以針劄燈焰上燒米醋内淬如此三兩次就燒成灰存性研為細末或糯米炒黄去糯米用紅棗一枚湯泡剥去皮核與斑猫末一處同研爛先以手抓破或生布擦動癬然後搽藥不可侵好肉上恐有毒金山長老云嘗有人患癬七年但得此方兩敷而愈又方以飯甑熱飯搦成團子擦之專治面上者又方用韮菜根炒存性搗末猪羔油調塗之瘥又方用凌霄花末以羊蹄根蘸藥擦之甚妙又方治遍身頑癬日久不瘥上至頭面妙方一名白礬散用獨莖羊蹄根剉搗白礬為末一處以極酸米醋調抓破塗藥覺癢極至痛即止隔日浴出不過兩上即愈治諸般惡癬先用韮菜煎湯洗次用臘猪油調蛇床子海桐皮末敷之兼治小兒奶癬婦人室女花癬癬藥以桱樹皮不拘多少用米醋極好者浸七次曬乾為末每用一錢以水調搽患處立効菖蒲酒治一切癬以菖蒲細切五斗水一石五斗煮取三斗去渣入醖米二斗如酒法旋助飲令極醉即愈一方用五觔酒五升漬蒸使味出絶酒一日服每服一升白礬塗方治一切乾濕癬以白礬一兩研為末用醋調如糊塗摩癬上日三五度即瘥炙魚塗方治一切乾濕癬以魚不問色目火上炙皮微焦乗熱去皮骨取肉研塗癬上日三五度即瘥半夏散出聖濟總録治一切癬以半夏二兩搗羅為散以陳醬汁調和如糊塗癬上日兩三度即瘥艾汁塗方出聖濟總録治一切癬取艾一兩細剉以釅醋半觔煎取濃汁去渣塗摩癬上日三五度即瘥蒿蕙敷方出聖濟總録治一切癬以蒿蕙二兩黄燥者搗羅為㪚以醋調和塗摩癬上日三兩度即瘥楮汁塗方出聖濟總録治一切癬以楮木自然汁不拘多少先以新布揩癬微破然後塗藥日二上即瘥一方用楮葉半觔細切搗敷桃葉汁塗方出聖濟總録治一切癬及澡癬以桃葉一兩日中時採研絞取汁塗摩癬上日三度即瘥一方用桃白皮苦酒敷之佳并糓樹白汁傅之良治諸癬并面上風刺方出聖濟總録取葛勒蔓草頭一把勿令人知鹽挼塗瘡三五上即瘥面上瘡取子為末空心酒調下三錢治癬方出經驗良方以櫸葉即烏桕葉為末酸醋調塗或用生葉及樹皮乾擦亦可治積年瘡癬生痂搔之黄水出遇天隂雨即癢出肘後方以狼毒為末醋調搽濕乾摻一方不用醋調又方出經驗良方用榖樹葉連漿擦破已復用雀兒酸又名酸妬草揩擦二次而可又用樹葉正面用清水浸貼過五六次即効又方出仁存方治癬殺一切蟲腫毒以羊蹄根醋磨塗癬速効亦煎作丸服之其方以新採羊蹄根不拘多少搗研絞取汁一大升白蜜半觔同熬如稠餳煎更用防風末一兩搜和令可丸如梧桐子大用栝蔞甘草酒下三二十丸日二三服甚佳治身體白駮以半天和取樹木孔中水洗𢷬桂屑唾和敷駮上日三白駮者浸淫漸長似癬但無瘡也治癬神驗方出聖惠方用雄黄研以苦酒和先以新布拭癬上令傷以藥塗之救急療癬方先以針鎌癬上即搗瓜蒂末傅上仍先以乾洗之又方用羊屎松脂薰黄搗末和更煎仍以泔清水洗癬敷之兩度即瘥必効療癬方用百藥煎塗之愈如口脂亦得療癬方作麻傅癬上裹之瘥以鹽及豉和搗塗之即瘥止肘後治澡癬方以雄雞冠血塗之又方用胡粉熬令黄赤色苦酒和塗之乾即易瘥止又方取肥猪肉薄割之於􅌯上以熨底炙之令熱使人體堪之以傅瘡上日三四度治一切癬并瘡出𫝊信適用方用茄子花為末乾用油調塗濕乾擦之治癬方用鳯兒花葉同羊蹄根加鹽𢷬醋傅又醋磨香白芷塗立止散治人身上牛皮癬用冬瓜皮燒灰小油調搽瘡上立止治癬方以枯礬栢油雞糞爛者洗浄敷之治風頑癬生滿面項頸諸藥不瘥者以甘草無製度碾為末極細先抓破瘡然後以此擦之兩三次立効治疥癬詩曰多年患瘡癬醫治又不除急取金鎻汁醋調塗便宜又方出聖惠方取狼䟦草以釅醋塗之又方出聖惠方取犬膽塗之立効又方出聖惠方取牛鼻頭津塗之又方出聖惠方取醬汁生葶藶末調塗之又方出聖惠方取地捲土將醋和調塗之牛皮癬方出直指方用舊皮鞋底燒灰存性麻油輕粉調敷又癬方出直指方用石榴取皮蘸明礬末擦切莫用醋則蟲沉也輕粉治癬方用五缺炙牛肉一片細嚼下少刻以真輕粉醋調酒下治頸項及面上白駮浸淫漸長有似癬但無瘡可治以鰻鱺魚脂敷之先拭剥上刮使燥痛後以帛傅之一度便愈甚者不過三度治癬方以槐青枝燒取瀝以塗之又方服驢尿良一醉散治遍身癬全蝎十四箇瓦上焙乾蟬蛻十四箇去頭足地龍十四條土土白殭蠶十四箇直者凌霄十四箇全者防風一兩紫苑一兩右為細末共作一服用好酒三升量酒多少得所羊蹄根如大指大兩莖研細與藥同研勻同煎三五沸通口服之作一氣服盡服了便入浴將渣再研令細就浴抓破擦有癬處擦了不必揩避風處歇卧定只一服効治癬方先􅎲破見血用生布擦了却以砂糖少許塗之兩次便効又方羊蹄根百藥煎右和搗爛敷瘡上袪濕散治濕乾癬大有神効蠶砂四兩薄荷半兩右為細末每用不拘多少乾摻於瘡上乾者生小油調搽硫黄散治癬及紫白癜風坯子半兩硫黄半兩白礬一兩半右為末先用羊蹄根取自然汁擦動敷之凌霄花散治風濕挾熱皮膚生癬久不愈者凌霄花一分白礬一分另研雄黄半錢另研天南星半兩黄連去鬚二錢羊蹄根焙乾半兩右件搗羅為細末抓破用生薑汁調藥搽之如癬不濕只癢用油調藥治癬方輕粉雄黄各等分右為細末猪脂調抓破搽東坡先生家藏方决明子為細末不拘多少右用水銀輕粉少許與藥末同研為膏㪚以物擦破癬上用藥敷之立瘥治癬以缺脯帯脂者薄割火上炙熱與人肉敷癬上蟲當入脯中候其少頃歇却須臾五三五度瘥又方以生鐵煆後飛淘去粗赤汁烘乾用蒜磨生油敷之又方以艾醋煎作膏敷之治癬瘡取蟾蜍燒灰末以猪脂和傅之治瘡癬以榆仁作醬塗之妙陳者尤良又方以蕪荑作醬食之其氣羶者良又方取皂莢嫩刺針以米醋熬作濃煎以敷瘡上有奇効又方用山豆根搗末臘月猪脂調塗之治癬取魚鮓和栁葉搗碎熟敷之又方以鱓魚斷取血塗之治癬瘡久不瘥用羊蹄根絞取汁用調膩粉少許如膏塗敷癬上三五遍即瘥如乾用猪脂調和敷之乾癬附論夫乾癬但有稜郭皮膚枯癢搔之白屑出是也皆是風濕邪氣客於腠理復值寒濕與血氣相搏所生若其風毒氣多濕氣少故風入深故無汗為乾癬也其中亦生蟲方黄連散治乾癬搔之白屑起亦治疥黄連一兩去鬚藜蘆半兩去蘆頭川大黄一兩乾薑半兩生剉䕡茹一兩莽草一兩右為細散入猪脂一觔以慢火煎成膏濾去渣收於磁器中先以新布拭瘡令傷然後塗藥無不瘥者又名大黄膏胡粉散治乾癬癢不止胡粉黄連去鬚蛇床子白歛已上各半兩右為細末以麪脂調塗乾者濕即貼之乾癬方狼毒草烏頭各二錢半斑猫七枚去翅足右生用為末津唾調敷用竹箆子刮破塗藥熟揩肉人候出黄水三兩日瘥一方用狼牙無狼毒又方治乾癬癢痛不止斑猫五月五日取十枚麝香一錢半右研為末以醋調塗瘡上多出黄水瘥又方川烏頭三枚生用乾蝎五枚右為末用麪油調作膏塗之一抹散治乾癬不瘥天南星草烏頭各一枚生用右為細散用羊蹄根搗絞自然汁調塗不過三上瘥治乾癬積年生痂搔之黄水出每逢隂雨即癢巴豆十枚肥者右於炭上燒之令油出盡即於乳砵内以少許酥和研膏薄塗之不過一兩度愈又方取青箱子末以口脂調先用漿水浄洗後敷之又方取槲樹白皮塗之治乾癬久不瘥出黄水不止隂雨之時即癢痛用斑猫半兩㣲炒為末蜜調敷之治乾癬積年生痂搔之黄水出每逢隂雨即癢用狼毒末塗之濕癬附論夫濕癬者亦有稜郭如蟲行浸淫赤濕瘙癢搔之多汁成瘡是其風毒氣攻注故為濕癬也其裏亦有蟲生方濕癬方明礬煅黄連各半兩胡粉黄丹水銀各二錢右為末用猪脂一兩夾研令水銀星盡成散磁盒收用螺殻散治濕癬癢不可忍螺殻一兩亂髪灰半兩龍膽半兩胡粉半兩各為細散研入胡粉令勻以油淀和塗之黄蘗散治濕癬癢不可忍黄蘗去粗皮剉末黄連去鬚胡粉研各一兩雄黄研細半兩右為細散先以米泔清洗浄拭乾敷藥日三兩度即瘥療濕癬方蛇床子一兩黄蘗一兩黄連一兩胡粉一兩研右為散内水銀一棗大加猪膏研入相和以塗瘡水銀膏治濕癬癢不可忍水銀二兩黄連二兩去鬚搗末胡粉二兩右以煉過臘月猪脂半觔都研候水銀星盡以温漿水洗瘡然後塗之一方麪油塗之英粉散治濕癬英粉炒黒細研二兩藜蘆去蘆頭為末馬腸根為末各一兩右和研令勻用生油調如粉塗癬上日三度蛇床子散治久患濕癬不瘥蛇床子黄連去鬚膩粉右等分為散用小油調塗之膩粉多入不妨輕粉散專治人面上濕癬神方輕粉斑猫去翅足右研細用温水以雞翎掃之周圍立効又方出聖惠方治濕癬癢不可忍用膩粉一兩以米醋調塗之又方出聖惠方用羊蹄根半觔日未出時採取鬚獨莖無枝撥者净洗細切搗令極爛入羊乳相和得所著少鹽拌勻於日中暴晒良久以塗之治濕癬肥瘡出千金方用大麻研敷之五日瘥治濕癬瘡以刮瘡令折火炙指摩之用蛇床子為末先以韮菜根煎湯洗之次用臘月猪脂搽小毒膏治濕癬疽瘡不瘥者以蟛蜝膏塗之食其肉能令人吐下又方出本草治濕疥以蕪荑搗和白蜜塗之又𢷬和少牛酪療一切瘡荆芥散出聖濟總録治多年濕癬以荆芥穗不拘多少用瓦罐子盛鹽泥固濟只留一竅用炭火燒出清烟便撥去火用濕泥塞了竅子放冷取出碾為細㪚每用末五錢入麝香一錢膩粉五錢同研勻細先以口含鹽漿水抓洗令破帛子揾了生油調藥塗之又方出聖惠方治癬濕癢不可忍以鯽魚一箇可長五寸者净拭不去鱗用硫黄末一分從魚口中送入腹内用净磚一塊安魚在上以炭火週廻熁之翻轉令魚黄焦碾羅為末入膩粉三錢同研令勻以生麻油調塗之治癬濕癢出本草用楮葉半觔細切搗爛敷癬上戴人十形三療云有一女子年十五兩股間濕癬長三四寸下至膝發痒時爬搔湯火俱不解癢定黄赤水流痛不可忍炙焫薰渫硫黄䕡茹白殭蠶羊蹄根等藥皆不効其女姿性顔巧以此病不能出嫁其父母求於戴人戴人曰能從余言則瘥父母諾戴人以䤵針磨令尖快當癢時於癬上刺百餘針其血出盡煎鹽湯洗之如此四次大病方除此方不書以告後人恐為癬藥所悞濕淫於血不可不砭者矣治漏瘤瘡濕癬癢浸淫日廣痒不可忍搔之黄水出瘥後又發及治瘑疥出本草取羊蹄根净去土細切搗以大酢和净洗上一時間以冷水洗之日一敷瘥若為末敷之妙風癬附論夫風癬者是惡風冷氣搏於血氣所生亦作圓文稜郭爬搔頑痹不知痛癢其裏亦有蟲生也方白花蛇丸出聖惠方治風癬瘡皮膚瘙癢久不瘥者白花蛇三兩酒浸去皮骨炙令㣲黄黄芩一兩防風一兩去蘆頭甘草一兩炙微赤剉白蘚皮一兩枳殼一兩麩炒微黄去瓤栀子仁一兩赤芍藥一兩川大黄一兩剉碎微炒蒼耳子一兩麥門冬一兩半去心焙黄耆一兩剉白蒺藜一兩微炒去刺羌活一兩苦參二兩剉右為末煉蜜和搗三五百杵如梧桐子大每於食後以薄荷酒下三十丸又方治一切風癬瘡䕡茹二錢剪草半兩苦楝樹皮二兩焙乾另研末輕粉半錢白礬二錢生用麝香一匙巴豆去皮入斑猫炒巴豆黄色去斑猫雄黄硼砂各一錢苦參半錢藜蘆半兩百部半兩右為末用羊蹄根汁調搽搔破瘡用藥獨活丸出聖惠方治風毒攻皮膚生瘡癬頑麻不知痛癢獨活二兩蒼耳子二兩羌活一兩五味子一兩兎絲子一兩另搗酒浸三日炮乾山茱萸一兩防風一兩去蘆頭白花蛇肉一兩酥炒令黄色黄耆一兩剉白蒺藜二兩㣲炒去刺右為末用白粱米飯和搗三五百杵丸如梧桐子大每日空心及晩卧時以温酒下三十丸硫黄散出聖惠方治風毒癬遍身背生癆癢硫黄一分細研雄黄一分細研硃砂細研麝香細研巴豆去皮心研川椒去目吳茱萸附子各一分去皮臍生用右為細末都研令勻先用新布揩癬令水出便以醋調塗之不過三兩上瘥乳香膏出聖惠方治風癬皮膚瘙癢乳香細研膩粉細研硫黄細研各一分杏仁湯浸去皮尖研吳茱萸搗末地龍糞細研巴豆去皮心各半兩右先以猪脂一觔煎十餘沸去巴豆入諸藥末和勻更煎十沸已來傾於磁器内盛令冷塗之雄黄膏出聖惠方治風毒疥癬雄黄一分細研附子半兩去皮臍膩粉白礬燒灰藜蘆去蘆頭川椒去目及閉口者各一分右為細末入乳缽内再研如粉以煉好臘月猪脂半觔黄蠟二兩净鐺内慢火煎候蠟銷傾在磁盒内入雄黄等末攪令勻每日四五度取少許塗之又方出聖惠方治風毒癬遍身皆瘙癢莽草蛇床子藜蘆石亭脂各一分白礬一兩黄蘗一兩剉鯽魚膏出聖惠方治一切瘡癬或乾或濕痛癢不可忍鯽魚一尾雄黄半兩細研膩粉半兩猪脂半觔亂髮一雞子大右先將猪脂􅆈令沸即下魚煎令焦次下髮令銷去渣下雄黄膩粉攪令勻傾於磁器中候冷塗之不過五七度無不瘥者洗浴丹參湯出聖惠方治風癬瘙癢丹參三兩苦參五兩剉蛇床子三兩白礬二兩細研右除白礬外搗篩為散以水三斗煎取二斗濾去渣入白礬攪令勻乘熱於避風處洗浴以水泠為度拭乾了以藜蘆末粉之相次用之以瘥為度苦參丸出聖惠方治一切風癬皮膚瘙癢苦參水浸一宿剉焙乾烏蛇酒浸去皮骨炙各四兩菖蒲一兩右為細末煉蜜丸如梧桐子大每服三十丸温熟水下無時又方治風毒攻皮膚生瘡癬頑麻不知痛癢出聖惠方苦參末三兩白花蛇肉三兩酒浸酥拌炒㣲黄右為細㪚每日四五度以温酒調下二錢煮腎㪚出聖惠方治一切風癬附子炮裂去皮臍椒紅各半兩右同搗為細末用猪腎一對竹刀切開去筋膜每箇入藥末一錢鹽一捻相和布綿纒縛以好酒一盞於甆器内煮約七分熟五更初不得潄口及說話去綿漸嚼細呷用所煮藥汁送下食少白粥投之當晩放利次日煮熟喫須連日服服盡再作備急羊蹄根塗方出聖濟總録治一切風癬及諸般癬瘙癢搔之不已羊蹄根草烏頭右净拂多人行磚土滴好醋先磨草烏頭約一分次磨羊蹄根二分爬發令癢以指點藥抹之仍喫煮腎散相為表裏烏頭圓出本草治宿患風癩癬遍身黒色肌體如木皮膚粗澁及四肢麻痺宜服草烏頭一觔入竹籮子内以水浸用瓦子於籮内就水中瀧洗如打菱角法直候瀧洗去皮及尖控起令乾麻油四兩鹽四兩入銚内炒令深黄色傾出油只留鹽并烏頭再炒令黒色烟出為度取一枚劈破心内如米一㸃白却好也如白多再炒趁熱杵羅為末用醋糊丸如梧桐子大乾之每服三十丸空心晩食前温酒下真州資福文雅白老元祐間有此疾服數年肌體黒黝頓除脚力强健視聼不衰有一宗人遍身紫癜風身如墨服踰年體恱澤教予服之亦得一年許諸風疹瘡瘍皆除然性差熱難制去毒要之五七日作烏頭粥啜之為佳粥法用豫章集中者治風癬以暖酒用蜜中攪之飲一杯即瘥天麻散出十便良方天麻防風細辛芎藭乾葛殭蠶各等分右搗羊蹄根汁調二錢成膏以熱酒浸動食後服以羊蹄根汁擦瘡上愈治風癬癬有數種荷葉癬者開生如圏多在頭面柯皮癬者皮厚癢痛輕者用荷葉心左纒藤葉為末麻油調塗厚者加砒少許和勻水調塗八寳散治風癩松皮頑癬久不瘥者神効予一鄉人患此疾數年不愈者後忽有舊親𫝊此方試用得驗遂再換身軀如常藿香破故紙大腹皮㯽榔雄黄輕粉硫黄枯白礬各一兩右為細末小油調搽日上數次癢則擦之搽瘡藥蛇床子一兩為末枯白礬一兩為末右用斑猫煎用麻油調塗瘡上久癬附論夫久癬者為諸癬有蟲而經久不瘥者也癬病之狀皮肉瘾疹如錢文漸漸増長或圓或斜癢痛有稜郭搔之有汁又有乾癬枯燥癢搔之無汁又有風癬搔之頑痺不知痛癢又有牛皮癬因飲牛食餘水得之其狀皮厚硬强又有圓癬作圓文瘾起四面赤又有狗癬因以狗食餘水洗手面得之其狀㣲白㸃綴相連亦㣲癢又有雀眼㿍作細文似雀眼搔之亦癢痛又有刀癬因以磨刀水洗面得之其狀無稜郭縱斜無定如此知癬初得或因風濕客於肌膚摶於氣血所生至其病成皆有蟲侵蝕轉深連滯不瘥故成久癬也方定粉膏治乾濕癬風癬不拘年月定粉水銀白蕪荑胭脂各一分右同研令勻用陳猪脂一兩同研成膏先用湯洗後以膏子臨卧塗之一上便瘥本法猪脂須用七年以上者若無但陳者亦得仍用後方淋洗楝實半觔無實根皮代楝葉及嫩枝凌霄葉及漆各一升剉丹參枳殼去瓤蛇床子地榆皂莢各三兩並細剉苦參三兩細剉右煎濃汁熱洗患處蛇床子湯浴方治一切嵗久不瘥蛇床子白土一作白鹽羊蹄根葛根苦參菖蒲莽草各三分黄連去鬚半兩右細剉以水五斗煎至三斗濾去渣温暖淋洗癬上三日後重暖藥湯更洗之不過三五度瘥五倍子散治癬久不瘥五倍子一兩燒令烟盡黄蘗一分剉當歸一錢剉微炒膩粉一分白礬一分燒灰漏蘆一分右為細散先用鹽漿水洗拭乾了以散敷之烏蛇丸治多年諸癬醫治不効者烏蛇酒浸去皮骨炙天麻各二兩槐子半觔白附子炮附子生去皮臍小便浸一宿各一兩白殭蠶炮羌活去蘆頭乳香研各兩半苦參十兩乾蝎炒一兩半右為細末用生薑自然汁和蜜各一觔熬膏入前藥和搗丸如梧桐子大每服二十丸空心温酒送下夜卧荆芥湯下黄連膏治一切久癬積年不瘥四畔濳侵復變瘡瘡色赤黑癢不可忍搔之血出黄連去鬚為末黄蘗去粗皮為末䜴研細蔓青子為末杏仁湯洗去皮尖雙仁細研各半兩水銀一錢右先以水銀於掌中唾研如泥次入乳缽内下生油一合和勻次入藥末同研成膏用磁盒盛日三五度取塗癬上即瘥治一切癬瘡經久不愈者以羊蹄根扁栢斑猫砂糖同一處炒令香以紗帛包藥薰擦癬上三五次愈又方出聖惠方治風癬久不瘥皮膚癢痛白礬一兩燒灰硫黄一兩細研膩粉一分黄連一兩半去鬚雌黄一兩細研蛇床子一兩右為細散都研勻猪脂調如稀麪糊先以鹽漿水洗净瘡即塗藥於上如冬月寒以㣲火煖用之久癬方出直指方生硫黄硝石明礬煅各半兩雄黄二錢半雌黄二錢半輕粉一錢右為細末好麻油調敷濕則摻白歛㪚出百一選方治乾濕癬瘡延生或如錢成圏暈久不効者宜服天南星一兩蠍一錢大草烏半兩白礬五分右搗篩為細散先以手於癬處抓動将藥摻貼每用藥二錢許入燒蟹殼一錢合和生油好粉貼瘡又方出聖惠方治風癬久不瘥皮膚癢痛吳茱萸粉脚白礬燒灰臭黄各一兩右細研如粉以生麻油調塗之砒霜散出聖惠方治癬不問乾濕積年不瘥砒霜一分硫黄三分蜜陀僧三分膩粉三分右細研為末如乾以生油調塗濕則用藥末摻之又方出聖惠方蒼耳汁一合生薑汁半合硫黄半兩細研右細和塗之乾更塗治癬瘡積年久不愈出經驗良方敗毒菜根要獨根者又名羊蹄根川百藥煎鹽梅肉等分右先搗菜根後将二味同擂以井花水一盞濾過澄清隔宿天明空心服服過不宜食熱食其渣留抓破瘡搽擦三四次愈黄藥子㪚出經驗良方治奶癬瘡經年不瘥黄連𤣥參赤芍藥各半兩右為末每用隨多少入輕粉少許嚼芝麻揉汁調先煎韮菜湯温洗令浄以藥敷之硫黄㪚出聖惠方治風癬久不瘥皮膚癢痛硫黄一分硝石半兩膩粉半兩白礬半兩燒灰右細研如粉以生麻油調如膏塗之又方出聖惠方麝香一分細研膩粉三分龍膽三分搗末巴豆半分去皮心右細研如粉以生麻油調如膏塗之又方治久癬不瘥用輕粉同臘月猪脂先以温米泔洗瘡拭乾塗之即再塗絶根最神効若小兒癬猪脊骨髓條研和膩粉傅治癬瘡久不差出千金方以羊蹄根𢷬絞取汁用調膩粉少許如膏塗傅癬三五遍即瘥如乾即以猪脂調和傅之一方用羊蹄根以桑柴炭煮汁四五沸以洗千金方云秃瘡疥癬皆有三年不瘥便為惡疾尋常治癬只用羊蹄根耳而此方最為神葢輕粉殺蟲第一又猪脂和之大有意義日未出採之佳必効方出聖惠方治久乾癬斑猫三枚微炒硫黄一分細研猪牙皂莢一分炙黄地卷一分背隂草一分右為末合和令勻用津唾調塗之剪草散出瑞竹堂方專治頑癬久不可者桱樹皮八兩剪草四兩白芨四兩巴豆十四箇連殼研右為細末新汲水調如糊厚敷於癬上乾去之再敷立効不湏抓破普濟方卷二百八十一
