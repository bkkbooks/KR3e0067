右同研勻以醋或水拌令濕用油紙裹之盛在袋兒内任意執之冷即再拌蒼耳㪚治一切風濕痺四肢拘攣右用蒼耳子三兩為細末水一鍾煎去滓分作三服或細末水糊丸如梧桐子大每服五十丸溫酒吞下亦可薏苡仁粥治久風濕痺補正氣除胷中邪氣利腸胃消水腫久服輕身益氣力亦治筋脉拘攣右用薏苡仁一升為末以水作粥空心服亦可三頓食之治久風濕痺筋攣膝痛除五臟胃氣結聚益氣止毒去黑痣面黟潤皮毛右用大豆黄者一升炒令香為末空心暖酒調下一匙治風毒痺厥方右諸家皆用菵草今醫家取其葉煎湯熱含少傾間吐之醍醐方補虚去風濕痺右用醍醐二大兩煖酒一杯和醍醐一匙飲之治風痺及卒中右用生料五積㪚二錢順元㪚一錢水一盞半生薑五片同煎至八分去滓少熱服方見寒濕門中寒類側子㪚治風濕痺皮膚不仁手足無力一名側子湯方見着痺類蛜􅖉㪚治風濕痺身體四肢不仁一名乾蠍散方見着痺類白花蛇丸治風濕痺皮膚不仁肢節痛疼方見着痺類大八風散治諸緩風濕痺脚弱方巴㦸天黄耆桂心細辛天雄萆􅐺蓯蓉牡荆子薯蕷菊花萎㽔山茱茰秦艽黄芩石斛白术礜石一作礬石厚朴龍膽人參蜀椒各半兩附子五味子各十八枚菖蒲茯苓牛膝千金異作干姜烏喙逺志桔梗三十銖芎藭白歛芍藥各六銖右三十二味治下篩酒服半即已三日未騐稍增令㣲覺一方無桔梗烏頭粥治風寒濕痺麻木不仁川烏頭生為末右以香熟白米作粥半碗藥末四錢同米用慢火熬熟稀薄不要稠下姜汁一恭脚許蜜三大匙攪匀空心啜之溫為住如是中濕更入薏苡仁末二錢增米作一中碗此粥大治手足四肢不隨痛腫不能舉者有此證預服防之左氏云風滛末疾謂四肢為四末也脾王四肢因風邪客于肝則滛脾為肝尅故疾在末殻氣引風濕之藥徑入脾經故四肢得安比湯劑極有力予常制此方以授人服者良騐越婢湯治風濕疼痛脚弱不能行立麻黄六兩去根節白术四兩石膏半兩大附子一個炮去皮尖甘草二兩炙右為粗㪚每服四錢水一盞半生薑七片棗子三個同煎一盞去滓溫服取汁此藥大能散風濕風盛麻痺者可服蠲痛丸治風寒濕痺筋骨重疼走注攻刺腰脚無力並宜服之草烏頭四兩去皮尖鹽炒煙天南星二兩生京墨半兩焼破故紙三兩炒沒藥一兩研地龍二兩去土五靈脂二兩炒乳香半兩炒白膠香二兩鎔開潑净石上冷研右為末醋煮麵糊丸如梧桐子大每服十丸溫酒下漸加丸數服夏英公酒浸飲子治風疾防風細剉萆􅐺羌活秦艽牛膝敗亀虎骨桔梗晚蚕砂炒黄各二兩蒼耳五升去刺搥碎酥炙乾茄根八兩洗剉蒸枸杞子炒五兩右十二味用好酒三斗浸瓶盛封蔽二七日開不得向面恐氣衝頭目每日午時空心及早辰各服一盞常令有酒氣一月除一切風毒濕痺癱瘓等疾神力丸出楊氏家藏方治風寒濕痺四肢拘攣脚膝疼痛客摶經絡筋骨無力及癱緩嚲曵並宜服之牛膝去蘆酒浸焙乾何首烏蓯蓉酒浸焙乾川椒去目閉口炒各二兩木鱉子去殻天南星炮茴香炒防風去蘆萆􅐺附炮去皮臍地龍去上㣲炒𦍑活去蘆烏藥金毛狗脊去毛白蒺藜炒去刺黄耆赤小豆覆盆子骨碎補去毛白附子以上十六味各一兩右件為細末酒煮麵糊丸如梧桐子大每服三十丸至五十丸空心溫酒或鹽湯下牛膝丸出楊氏家藏治諸風濕痺四肢拘攣脚膝疼痛脚氣等疾牛膝酒浸宿焙乾川芎肉蓯蓉酒浸宿焙羌活去蘆當歸焙麻黄去根節杜仲去皮薑汁浸剉炒赤芍藥木香沒藥别研乳香别研木𤓰附子炮去皮臍萆􅐺大復皮五加皮薏苡仁炒續斷右件等分為細末煉蜜為丸如梧桐子大每服三十丸溫酒送下空心食前石斛丸出楊氏家藏方治風濕客摶經絡筋骨冷疼四肢重痛石斛去根一兩牛膝酒浸宿焙干肉蓯蓉酒浸宿焙干杜仲去粗皮薑汁浸炒各一兩金毛狗脊七錢半去毛木香一兩牡丹皮一兩人參去蘆七錢半黄耆一兩山茱茰七錢半防風去蘆半兩羌活去蘆七錢半川芎半兩梹榔一兩半熟地黄一兩半右件為細末煉蜜為丸如梧桐子大每服五十丸溫酒或鹽湯送下空心食前中行丸出楊氏家藏方治風濕毒氣客摶經絡流注作痛白芍藥五兩甘草三兩炙犀角屑三兩葳靈仙去土一兩右件為細末煉蜜為丸如梧桐子大每服五十丸溫熱水下不拘時候服忌茶六月河中諸熱砂觸主風濕頑痺不仁筋骨攣縮脚疼痛冷風襲癱緩血脉斷絶出本草取乾沙日曝令極熱伏坐其中冷則更易之取熱㣲通汗然隨病進藥及食忌風冷勞復治風寒濕痺欬逆上氣開心孔補五臟通九竅明目耳出音聲以菖蒲採𦂳小似魚鱗者治擇一觔許以水及米泔浸各一宿又刮去皮切曝乾揚篩以糯米粥和匀更入熱蜜搜丸梧桐子大絺葛袋盛置當風處冷乾每日以酒飲任下三十丸臨卧更服二十丸久服得效治風濕痺拘攣出本草以柴胡作湯浴之治風氣濕痺膝脚痛出本草用牛膝葉一觔切以米三合令豉汁中相和煮作粥和鹽醬空心食之治風濕瘙癮􅇙身痒痺出本草用蒴藋作湯浴之亦以酒浸根稍食之治腰腎濕風痺常如水洗者出本草取鰻鱺魚以五味米煮空心食之甚補有濕脚氣人服之良治大風濕痺不得屈伸出本草用赤車使者根以八月九月採之日乾浸酒服治四肢濕痺不得屈伸出本草菖蒲作湯浴之治男子婦人虚濕痺毒風痺痛去男子腰痛浴男女隂去風冷火薀陽事主大風身痒出本草以蛇床子煎浴之即瘥治乆風濕痺四肢拘攣骨肉疼痛用伏牛花湯浴之一各隔虎利花導引法養生方去任縱臂不息十二通愈足濕痺不任行腰脊痛又正卧疊兩手著背下伸兩脚不息十二通愈足濕痺不任行腰脊痛痺有偏患者患左壓右足患右壓左足久行手亦如足周行滿十方止又云以手摩腹從足至頭正臥伸臂導引以手持引足注任臂閉氣不息十二通以療痺濕不可任腰脊痛普濟方卷一百八十五
