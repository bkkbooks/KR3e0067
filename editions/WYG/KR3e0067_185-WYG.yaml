body:
  text: 普濟方卷一百八十五明周王朱橚撰諸痺門總論夫風寒濕三氣雜至合而為痺皆因體虚腠理空踈受風寒濕氣而成痺也痺之為病寒多則痛風多則行濕多則著在骨則重而不舉在脉則血凝而不流在筋則屈而不伸在肉則不仁在脾則寒逢寒則急逢熱則縱此皆通所受邪氣而生證也痺痒並病總而言之凡有五焉筋痺脉痺皮痺骨痺肌痺是也其以春遇痺者為筋痺筋者為痺不已又遇邪者則移入於肝也其狀夜卧則驚飲食多少便數夏遇痺者為脉痺則血脉不流令人萎黄脉痺不已又遇邪者則移入于心其狀心下鼓氣卒然逆喘不通咽乾喜噫仲夏遇痺者為肌痺肌痺不已後遇邪者則移入于脾其狀四肢懈惰發欬嘔吐秋遇痺者為皮痺皮痺則膚無所知覺皮痺不已又遇邪者則移入於肺其狀氣奔喘滿冬遇痺者為骨痺骨重不可舉不能遂而痺骨痺不已又遇邪者則移入于腎其狀喜脹診其脉大而濇為骨痺脉來急者亦為骨痺濇而𦂳者亦為骨痺又有風血痺隂邪入于血經故也外有支飲亦令人痺當隨證施治三因方云凡使人煩滿喘而吐者是痺客于肺煩心上氣嗌乾恐噫厥脹滿是痺客于心多飲數小便小腹痛如懐姙夜卧則驚者是痺客于肝喜脹凥以代腫脊以代頭者是痺客于腎四肢懈惰發欬嘔沫上為大寒者是痺客于痺又有腸痺者數飲而小便不利中氣喘急時發飱泄又有胞痺者按之腹内痛若沃以湯下為小便上為清涕端効方云痺者閉也痺而不仁故曰痺寒勝則痛濕勝則風滛走痛往來而交擊無常晝靜夜潮發渇痛如鬼使腫滿細枯不能行走風濕寒濕風毒脚氣同病異名故也痿論云思想無窮所願不得意滛於外入房太甚總筋弛縱是為筋痿又為白滛斯痺之本千金方云風濕痺筋痺脉痺肌痺皮痺胞痺各有證候形如風狀於脉别之脉㣲澀其證身體不仁也諸痺由寒濕風三氣併客於肉分之間迫切而為沫得寒則聚聚則排分肉肉裂痛痛則神歸之神歸之則熱則痛解痛則厥厥則痺發發則如是此内不在藏而外則發于皮膚居分肉之間真氣不能周故為痺也其風最多者不仁則腫為行痺走無常處其寒多者則為痛痺其濕多者則為著痺冷汙濡但隨血脉上下不能左右去者則為周痺在肌中更止左以應在左右以應在右者為偏痺也夫痺乃陽氣少而隂氣多故令身寒從中出其陽氣多而隂氣少則痺熱也諸痺風勝者則易愈在皮間亦易愈在筋骨間者則難痊也久痺入深令榮衞澀經絡時踈則不知痛内經曰榮衞虚皮膚不仁居而不知痛可用蔚金散吐之次服𨗳水丸經寒之藥泄之泄訖以辛濕之劑發散汗出後常服當歸烏附行經和血之藥則愈矣儒門事親書云郾城梁賈人年六十餘忽暁起梳髪覺在手指麻斯須手臂麻又一臂麻斯須頭一半麻比及梳畢從脇至足皆麻大便二三日不通往問他醫皆云風也或藥或鍼皆不解求治于戴人戴人曰左手三部脉皆伏比右手小三倍此枯澀痺不可純歸之風亦有火燥相兼乃命一通一泄一汗其麻立止已後以辛凉之劑調之潤燥之劑濡之惟小指次指尚麻戴人曰病根已去此餘烈也方可鍼谿谷者谷也骨空也一日晴和往鍼之用靈樞中雞足法向上卧鍼三進三引訖復卓鍼起向下卧鍼送入指皆然手熱如火其麻全去昔劉河間作原病或常以麻與澀同歸燥門中真知病㡬者也諸痺八風㪚出千金方治八風十二痺猥腿半身不遂歴節疼痛肌肉枯燥皮膚瞤動或筋緩急痛不在一處卒起目眩失心恍忽語言倒錯身上㾦瘰面上起疱黄汗出更相染浸或燥或濕顔色赤或青或黑角弓反張乍寒乍熱麻黄白术各一觔羌活黄芹一觔五兩大黄半兩枯薑根甘草蔓荆天雄白芷防風芍藥天門冬石膏各十兩山茱茰茱茰躑躅各五升茵芋十四兩附子三十枝細辛乾薑桂心各五兩雄黄朱砂丹參各六兩右治下節篩酒服每日一服三十日後日再五十日知百日瘥一年平服常服不已進美飲食三痺湯出危氏方治血凝滯手足拘攣療風痺氣痺等病川續斷杜仲去皮切生薑汁炒防風桂心華隂細辛人參白茯苓當歸白芍藥甘草秦艽生地黄川芎川獨活各半兩黄蓍川牛膝右剉㪚每服五錢水二盞生薑三片棗一枚煎至一盞去滓熱服不拘時但腹稍空服大續命散出千金方治八風十二痺偏枯不仁手足拘急疼痛不得屈伸頭眩不能自起舉止顛倒或卧若驚如墮地狀溢汗淋不止婦人帶下無子風入五臟甚者恐怖見鬼來收攝或與鬼神交通悲愁哭泣忽忽欲走麻黄烏頭防風桂心甘草蜀椒杏仁石膏人參芍藥當歸䕡茹一作芎藭黄芩茯苓乾薑各一両右治下篩酒服方寸匕日後漸加以知為度防風湯治左脇氣衝膈上滿頭上有風如虫行手足頑痺鼻塞脚轉筋不能伸縮兩目時痛防風一兩猪腎一具芎藭橘皮澤瀉桂心石斛生薑丹參茯苓通草半夏各二兩乾地黄右咀㕮以水一斗半先煮腎汁三升去腎下藥煮取二升七合去滓三分服丹參膏出肘後方凡病在外支節麻痛㗋咽痺寒入腹則心急脹滿胸脇痞塞内則藥之外則摩之病癱緩不遂風濕痺不仁偏枯拘屈口喎耳聾齒痛頭風痺腫腦中風動其痛若癰結核漏瘰癧堅腫未潰傅藥可消及丹􅇙諸腫無頭形狀骨疽者摩之令消及惡核走身中者風水逰腫亦摩之其服膏如棗核大小兒以意減之日五服數用之悉效亦療傷寒行賊風惡氣丹參蒴藋各三兩莽草葉躑躅花菊花各一兩秦艽獨活烏頭川椒連翹桑白皮牛膝各二兩右以苦酒五升細麻七升入藥同煎令苦酒盡去滓用亦用猪脂同煎之若是風寒冷毒可用酒服若毒熱病但单服之仍用綿棗嚼之比常用猪脂煎藥有力小兒耳後􅊓子其堅如骨已經數月不盡以帛塗膏貼之二十日消盡乳香丸出聖濟總錄治風寒濕氣留于血脉痛痺不仁乳香研沒藥研五靈脂研各一兩烏頭炮製去皮臍草烏頭炮白殭蚕炮附子炮製去皮臍自然銅醋炒各半兩黑牽牛瓦上炒天麻酒浸切焙各一兩右為細末酒煮麺糊和丸如梧桐子大每服十丸至十五丸薄酒下芎附散出醫方集成治五瘧痺腿及臂間發作不定比脾胃虚榮衞澀皮肉間為風寒濕所著小川芎附子黄蓍白术防風熟地黄當歸桂心柴胡甘草以上各等分右為粗末每服四錢水一盞半生薑三片棗二枚同煎至七分去滓食前日三服常服不生壅熱兼消積冷茵芋㪚出御藥院方治風寒濕痺皮肉不仁骨膸疼痛不可忍者宜服此酒茵芋萆􅐺蜀椒出汗狗脊去毛桂去粗皮附子炮各一兩牛膝去苖酒浸石斛去根生薑各一兩半右㕮咀以絹袋貯以酒一斗浸經三二宿每服一盞或二盞酒服至半再旋添新酒覺藥味淡再合犀角散同前治風寒暑濕毒氣攻注經脉凝􅉣畜於筋骨皮肉之間或在四肢肉色不變發作連骨膸痛乍歇乍作或晝靜夜發發去來不常并宜服之犀角鎊當歸白芍藥各二兩牛膝酒浸一宿沉香木香虎頭骨酥炙各四兩槲葉脉二大握麝香半兩右除麝香外㕮咀每用藥一兩水三盞半煎至一盞半濾取清汁内麝香半錢攪匀放溫服食前服空心日午臨卧各一服四蒸木𤓰丸出御藥院方治肝腎脾三經氣虚為風寒暑濕相傳流注經絡竭日曠嵗治療不痊六氣更變七情不寧必至發動或腫或頑痺脚膝疼痛不能自持增寒壯熱嘔吐自汗葳靈仙苦葶藶黄耆續斷蒼术橘皮烏藥茯神各半兩右為細末大木𤓰四個去頂穣填藥在内却用頂兀盖定酒洒蒸熟研為膏丸如梧桐子大每服五十丸空心溫酒下鹽湯下世傳木瓜丸甚多此方最有神效增味五痺湯出直指方治風寒濕合而為痺肌體麻痺不仁羌活防己片子姜黄白术海桐皮白芍藥當歸各一兩甘草炒七錢半右剉每服三錢生薑十厚片煎服病在上食後病在下食前升麻前胡湯出宣明論治諸痺證主風痺廼風寒濕三氣相合而為痺風者百病之長善行數變常汗惡風目瞷脇痛或走注四肢皮膚不仁屈伸不定治肝風虚所中頭目眩痛胸膈壅滯心煩痛昏悶屈伸不便升麻前胡各一兩半𤣥參地骨皮各一兩羚羊角葛根各二兩酸棗仁一錢右為末每服三錢水一盞半煎至八分去滓再煎三五沸食後如行五六里更進一服附子湯出鮑氏醫書治風寒合痺骨節疼痛皮膚不仁肌肉重著四肢緩縱腰脚酸痛生附子一兩白芍藥官桂甘草白茯苓人參各半兩白术三分右㕮咀每服四錢水二盞生薑七片煎至六分去滓食前惡甜者減甘草一半兼治皮寛筋弛氣虚倦怠遍體酸痛一方治厯節風四肢疼痛如槌鍜不可忍者加乾薑半兩去生附子用熟附子等分名附子八物湯煎如前法若尋常寒熱濕相摶身體煩痛脚膝軟痛及熱虚頭眩止用白术附子各一兩甘草半兩姜棗煎服名增損术附湯久履濕地覺腰重脚弱尤宜服之若為濕氣所中則白术倍附子之數仍用白术半兩酒一盞煎至六分更進數服取㣲汗即愈不能飲者以水代煎若冐雨濕著于肌膚或因汗出浸漬或因澡浴得病當于增損术附湯中加茯苓官桂如甘草之數名茯苓白术湯大率濕為患遽用麻黄發表之藥汗出既多則腠理空虚便為偏廢之疾不可不知若中傷寒氣寒能泣血令人無汗當用麻黄汗出即愈盖中州之地生麻黄處雪為之不積者數尺故治寒病最得其宜薏苡仁方出瑞竹堂方治手足流疰疼痛麻痺不仁難以屈伸薏苡仁去皮當歸去蘆芍藥麻黄肉桂去粗皮各一兩甘草去皮㣲炒一兩蒼术去黑皮四兩半泔浸三日炒右㕮咀每服五錢水二盞生薑五片煎至七分食前溫服若病人汗出者減麻黄病人熱者減桂虚實加減服之七烏丸出仁存方治癱疾風濕寒痺脚疾證素問論痺云風寒濕三氣合而為痺風氣勝者行痺上下左右無定隨所至耳惟服此藥不劑而愈亦治風濕腰痛脚氣風氣之疾草烏去皮臍生用切作大塊何首烏作大片忌鐡器烏藥細切川烏以上各二兩烏梅五十個搥碎黑豆半觔揀洗净猪牙皂角二兩去皮切作半寸右用無灰酒二升米醋二升同上藥一處裝于磁瓶内浸二宿用文武火煮約存一升藥汁取出焙乾為細末仍用藥汁打糊為丸如梧桐子大或藥汁少益以酒醋虚心鹽湯下五七十丸病在上食後在下食前酒吞脚氣木𤓰湯下小瘡痬數服效與活絡丹相間服之一方或加木别子酒浸酒糊丸有晩吞砂一兩楮實丸治風冷濕脚痺腰脚不利方見本門風寒痺類菖蒲㪚治風濕冷痺身體俱痛一名六生㪚方見本門周痺類茯苓湯出濟生方治支飲手足麻痺多睡眩眊半夏湯炮七次赤茯苓去皮橘各一兩枳實去穣炒桔梗去蘆甘草炙各五錢右㕮咀每服四錢水一盞半生薑七片煎至七分去滓不拘時溫服术附防風湯治肢節痛重不可轉側脚氣痛痺自汗沾衣或身㣲腫者白术附子熟甘草防風各一兩桂心三兩茯苓半兩右為粗末每服五錢水一盞半煎至六分去滓溫服日三夜一服尋痛舒筋丸五靈脂兩頭尖各半兩草烏頭乳香沒藥各三分右為細末研生葱汁和丸如梧桐子大每服五七十丸溫酒送下食後臨卧鹽湯亦可忌熱物增損四觔丸出御藥院方治風寒濕冷客搏經絡或痛或不仁及諸脚氣痛並宜服之牛膝天麻木𤓰各半兩全蠍四兩以上四味皆别剉用好酒二升浸日取出焙乾乳香四兩别研右為細末研匀用藥浸酒煮麺糊為丸如桐子大每服三十丸至五十丸溫酒下食前服五生膏治寒濕客于經絡留結不散疼痛不止生附子去皮尖當歸吳茱茰木香桂心各半兩右為細末每用藥末三錢取生薑自然汁調如膏攤于臘紙上貼疼處乾即便易新者上用綿子或軟帛繫定烏木丸治風寒濕痺攣痛不能步握五靈脂川烏炮去皮臍蒼术酒浸薄切乾各二兩自然銅焼熟一兩右為細末水糊為丸如梧桐子大每服七丸溫酒下漸加丸數服至病除一方有當歸一兩一醉散治痺濕走注肢節疼痛川山甲炮麻黄不去節良薑各二錢石膏半兩右為細末每服五錢好酒一碗熱調下出汗為效休着風衣被盖之續命湯治八風十二痺羌活去蘆三兩茯神去木薏苡仁炒各一兩右搗篩每服六錢水二盞煎取一盞别入竹瀝一匙許更煎數沸去滓溫服日二夜一煮肝散治肝痿脚弱及傷寒手足乾小不遂軟不可行紫菀桔梗蒼术芍藥各一兩右為細末每服四錢羊肝半觔竹刀切忌水物令血散入鹽醋葱薑酒同煮熟空心日進三服服藥見其肉生一二日間生及復舊見東坡先生豕藏方載得效有名姓甚多火龍丹細鐵屑篩去粗淘去細着中存留鍋中炒冷一觔硇砂研細二錢右鐵屑一觔加硇砂末和匀分作四分冷水調匀一分用皮紙使絹帛包之拴繫放于手心渾身體溫如藥性熱過再用水調之復熱每一服熱三起約行百里如治風濕寒氣加蒼术草烏頭末用米醋調匀如前包於患處熨湯效治風寒濕痺五緩六急右以烏鷄一隻治如食法煮令極熟調作羮食之方粥法治風濕麻痺不仁方見寒濕門中溫類加味生料五積出徳生堂方治感患風濕冷痺之證盖因起居隂濕之地或在水鄉船之上以致渾身上下手足四肢强直不能屈伸其痛有不可忍者右用和劑局五積㪚五錢重作一服内加全蝎炒過一十箇川山甲却要看病者所患左右手足或臂脇疼痛處仍于川山甲身上亦要甲七片炮碎添麻黄一錢半麝香一字入藥用水二大盞生薑五片葱三根同煎至一大盞無灰酒一小匙杓稍熱服于熱炕上睡以衣被厚盖出汗愈須要有病處得汗為住如汗不出再煎滓服之出汗五積㪚方見寒暑溫門中寒類也附香㪚一名是齊方出醫方集成治十指疼痛麻木不仁孫盈仲嘗患此其祖善醫云有風而非虚以此治之而愈又名香附湯附子木香各等分右剉為粗末用薑一片如法煎服木香隨氣虚實加減足弱去附子用烏頭甚妙治麻痺出傳信方右用四味理中湯加防風天麻等同煎服甚效或去白术加附子妙獨活㪚出千金方治八風十二痺獨活石南各四兩防風三兩附子烏頭天雄茵芋各二兩右㕮咀以酒二斗漬七日每服半合日三以知為度乳香宣經丸出和劑方治體虚為風濕寒暑進襲四氣相搏半身不遂手足頑麻骨節煩疼足脛浮腫惡寒發熱漸成脚氣肝腎不足四肢攣急遍身吹疰或悶胸打撲内傷筋骨男子疝氣婦人經脉不調常服和血止痛補虚壯筋骨方見脚氣門寒暑濕氣類靈樞夀大剛柔弟六黄帝曰余聞刺有三變何曾三變伯髙答曰有刺榮者有刺衛者有刺寒痺之留經者黄帝曰刺三變者奈何伯髙答曰刺榮者出血刺衞者出氣刺寒痺者内熱黄帝曰榮衞寒痺之為病奈何伯髙答曰榮之生病寒熱少氣血上下行衞之生病也氣痛時來時去怫氣賁響風熱客于腸胃之中寒痺之為病也留而不去時痛而皮不仁黄帝曰刺寒痺内熱奈何伯髙答曰刺布衣者以火辟之刺大人者以藥熨之黄帝曰藥熨奈何伯髙曰用醇酒二十觔蜀椒一觔乾薑一觔桂心一觔凡四種皆㕮咀漬酒中用綿絮一觔細白布四丈并内酒中置酒馬煴盖封塗勿使泄五日五夜出布綿絮曝乾之乾復浸以盡其汁每漬必晬其日乃乾并用柤與綿絮復布為復中長六七尺為六十七尺巾則用之桑炭炙中以熨寒痺所刺之處令熱入至于病所寒復灸巾以熨之三十遍而止汗出以巾拭身亦三十遍而止起歩内中無見風每刺必熨如此病已矣此所謂内熱也出風科集驗方天麻黄耆湯東垣蘭室方治素有風證因連日醉飲其證復來右口角并眼頗有側視及左腿麻木疼痛黄耆六分人參四分甘草六分天麻六分葛根六分當歸五分芍藥三分黄栢六分蒼术六分茯苓三分柴胡九分澤瀉七分𦍑活三分肢節不痛去之麹三分黄連四分右㕮咀作一服水三盞去滓溫服食逺或加猪苓六分烏頭出永類方鈴治風寒冷濕留痺筋脉拘攣不得轉仄方見本門風濕痺身體手足不遂類附子煎出朱氏集騐方專治手臂無力麻痺不仁手足不隨風濕相搏筋骨諸疾疼痛不舉大附子一枚重八錢慢火炮製去皮切作十片同生薑米泔淹一宿去薑薄片切焙乾防風四兩骨髓補半兩去毛炒漢防己白术各半兩乳香二錢别研右細末入乳香拌匀酒煮糊為丸每服二三十丸溫下防風湯出朱氏集驗方治病後足履緩弱酸痺精神昏倦防風去蘆白术比芍藥暑當歸洗人參牛膝酒浸杜仲製黄耆炙熟地黄粉草川芎羌活各等三分溫絡湯出朱氏驗方治氣血不足風冷留于經絡足脛寒冷筋脉虚弱久成寒痺手足無力歩履難辛骨節疼痛多惡風冷大壯筋脉止疼痛溫四肢下痰止眩暈白术川牛膝酒浸杜仲炒附子炮虎脛骨酒炙各一兩黄耆七錢半沒藥乳香甘草人參各半兩白薑一兩半桂心三分當歸三兩二錢川芎七錢半右㕮咀水一盞薑三片木𤓰二片煎七分食後服調氣丸出治風經驗方治風虚手足麻痺語言謇澀胸膈滯悶痰涎併多南木香羌活舶上茴香炒桂黄粗皮不見火陳皮以上各半兩蓬莪茂剉炒酸棗仁炒各一兩半京三稜濕紙褁煨透取出搗枳慤面炒去瓤川芎搥碎炒各一兩㯽榔半兩右為末醋煮麺糊為丸如梧桐子大每服二十丸食前木𤓰湯下調氣進飲食最妙虎骨丸出治風驗方治風濕麻痺筋骨緩縱不隨及中風脚氣等去麻止風痛通利血脉有人患風左臂痛不可忍十餘服乃愈虎脛骨酥炙黄當歸海桐皮人參南木香舶上者附子去皮桂去粗皮不見火白花蛇酒浸取肉敗龜醋洗酥炙黄天南星炮製以上各三分蔓荆子甘菊白姜蚕㣲炒乾蝎去土㣲炒防風川芎羌活天麻以上各一兩麝香研沒藥研以上各一兩右為末入麝香研匀細煉蜜丸如梧桐子大每服二十丸漸加至三十丸空心食前溫酒下煎荆芥湯放溫下亦得治風痺極效屢試驗烏藥順氣㪚出和劑方治諸方戰掉踡攣眩暈麻痺白姜蚕川芎白芷枳殻桔梗甘草炙各一兩麻黄陳皮烏藥各二兩乾姜半兩右為末姜棗煎或酒煎加葱白煎服烏靈丸出衞生寶方治患風久虚麻痺行歩艱難五靈脂二兩川烏一兩炮去皮臍右為細末酒煮麺糊為丸如梧桐子大每服十丸加至五十丸空心溫酒送下忌一切冷物乳香應丸治手足麻痺筋疼補虚駐顔蒼术半觔或四兩川芎炮各一兩地骨去上半兩芍藥半兩五靈脂二兩炒石研自然銅火煆葫蘆巴破故紙炒甜瓜子炒白姜白附子川椒炒去汗茴香炒兩頭尖當歸牛膝各半兩酒浸乳香沒藥細辛各三錢去葉血竭二錢半研右為末醋糊丸如桐子大每服五七丸空心溫酒下乾物壓之鹽湯亦可一方無草烏神效黄耆湯治渾身麻木不仁或頭面手足肘臂或脚腿麻木不仁並皆治之如兩目急縮及羞明畏日或癮澁難開或視物無力睛痛昏花手不能近或目睛少光或中熱如火服六七次可效黄耆二兩人參八錢甘草炙一兩蔓荆子二錢白芍藥一兩橘皮半兩去白如小便淋瀝加澤瀉半錢每服去則止大熱証每服加黄栢三分酒洗右為㕮咀每服四五錢水一大盞煎至八分去滓稍熱服如治眼病俱宜撙節全去橘皮減黄耆一半如治麻木不仁雖有熱而不用黄栢更加黄耆一兩通三兩如眼縮急去芍藥忌酒醋濕麵大料物葱韮蒜及淡燥之物生冷硬物如麻甚者加芍藥一兩通用二兩芍藥補氣湯治皮膚間麻木此肺氣不行也潔古老人立此方神效黄耆一兩芍藥一兩橘皮一兩澤瀉半兩甘草炙一兩右㕮咀每服半兩水二盞煎至一盞去滓溫服如肌肉麻木必待瀉榮而愈如濕相合肢體沉痛當瀉濕熱導氣湯治兩腿麻木沉重黄耆八錢甘草六錢五味子一百二十個升麻二錢柴胡二錢當歸澤瀉各二錢紅花五分陳皮一錢青皮四錢右㕮咀作四服水二大盞煎至一盞去滓熱服食前人參補氣湯治兩手麻木黄耆八錢人參五錢生甘草根半兩炙甘草二錢五味子一百四十個白芍藥三錢升麻二錢柴胡根二錢右㕮咀作四服煎法如常除濕補氣湯治兩腿麻木無力喫飯有汗涎下身沈重言語不出聲多笑頭左右顧兩脉大蒼术四錢藁本二錢升麻六錢柴胡三錢五味子一錢半酒知母二錢陳皮一錢半酒黄栢三錢甘草稍二錢當歸二錢右剉如麻豆大每服五錢水五盞煎至一盞去滓空心候大小便後覺饑復空服待少時以早饍壓之治肝腎風氣四肢麻痺骨間疼腰膝無力者亦行大腸氣用五月五日六月六日九月九日採稀薟葉去根莖花實净洗曝乾入甑中層層灑酒與蜜蒸之又曝如此九過則已氣味極香美熬擣篩蜜丸服之成訥為江陵府節度使進稀薟丸方臣有弟訢年三十一中風床枕五年百醫不瘥有道人鍾針者親覩此患曰可服稀薟丸必愈其藥多生沃壤髙尺許節葉相對其葉當夏五月已來收每去地五寸剪刈以濕水洗泥土摘其葉及枝頭凡九蒸九曝不必大燥但取蒸為度仍熬擣為末丸如桐子大空心溫酒或米飲下二三十丸服至五十丸所患或加不須憂是藥吹之力服至四十丸必得復故五十丸當復丁壯臣依法脩合訢之病果愈鍾針又言此藥與本草所述功效相異盖出處盛在江東彼土人呼猪為稀呼臭為薟氣縁此藥如猪薟氣故以為名但經蒸曝薟氣自泯每當服後須喫飲三五匙壓之五月五日採者佳奉宣府醫詳録張詠知益州進稀薟丸表臣因修龍與觀掘得一碑内說脩養術并藥方二件依方差人訪問採覔其草頗有異金稄銀線素根紫荄對節而生蜀號火杴莖葉頗同蒼甘誰知至賤之中乃有殊常之效臣自喫至百服眼目輕明即至千服髭鬚烏黑筋力較徤效驗多端臣本州有都押衙羅守一曾因中風墜馬失音不語臣與十服其病立痊又僧智嚴年七十忽患偏風口眼喎斜時時吐痰臣與十服亦便得瘥令合一百劑差職官吏元奏進治胃痺熱中除渇止痢小便益氣力補中輕身長年以梁米炊飯食之治皮胃痳痺出本草以莽草濃煎湯淋洗風痺附論夫痺者為風寒濕三合而成痺也其狀肌肉頑辱或則疼痛此人體虚腠理開則受于風邪也病在陽曰風在隂曰痺隂陽俱病曰風痺也夫風痺病不可已者足如履冰時如入湯腹中股脛躁煩心頭痛傷痺腎時嘔眩自汗出傷心目眩傷肝悲恐短氣不樂傷肺不出三年死天麻丸出聖惠方治虚傷風手足無力肢體乾燥風痺不仁天麻一兩木香人參去蘆赤茯苓白芷羌活天蓼木芎藭當歸各半兩炒麻黄去節一兩烏蛇三兩酒浸黄去皮骨白附子半兩炮製龍骨一分鹿角膠半兩杵碎令黄燥甘菊花生地黄細辛各半兩牛黄一分研麝香一分研右為細末煉蜜和擣五七百杵丸如梧桐子大每服不計時候以溫酒下十丸虎骨酒出仁存方治諸般風痺手足疼痛行歩艱難腿膝緩弱久服身體輕健運動快捷大行血氣通榮衞補虚排邪大益真氣虎脛骨酥炙三兩半川附子炮去皮臍當歸酒洗焙蘆川芎川羌活去蘆川烏去皮尖赤芍藥獨活各二兩半杜仲炒斷絲二兩半萆薢白术防風去蘆黄耆去蘆白茯苓去皮白蒺藜炒去刺人參去蘆天麻去苖川續斷各一兩净右剉各項如麻子大以生絹袋子盛住用無灰酒二升浸之宻封春浸五日夏浸三日秋七日冬十日每服一盞溫暖空心食前服之芥草膏治風痺不仁風毒摩野葛膏内有巴豆若用多恐損皮肉芥草用葉當歸白芷防己蜀椒出汗去目者合口各三兩吳茱茰湯洗焙乾炒丹參芎藭商陸根切各四兩沉香木香零稜香鷄舌香犀角屑附子去皮乾炒右剉以新綿裏内净器苦酒三升浸經一宿取出用酥二觔同入鍋中以文武火煎三上三下候變色稀稠得所濾去滓裹攪匀傾磁瓶中宻封頭每有患旋以手摩傅之指令入皮肉野葛膏方見脚氣門脚氣雜治膏藥淋滯等類治諸風痺方出千金方一名黄芩湯方見本門周痺下麝香天麻丸出和劑方治風手足不遂或少力顫掉血脉凝濇肌肉頑痺遍身疼痛轉側無力筋脉拘攣不得屈伸紫背浮萍草乾去土四兩麻黄去根二兩防風去蘆天麻去蘆一兩以上四兩為末沒藥别研極細硃砂研飛各一兩安息香别研細麝香研各一兩血竭别研極鬼翏别研細三兩木月一兩半右除藥外將碾出藥同研拌匀錬濾白沙蜜與安息香同熬過搜成劑入臼擣杵熟為丸如彈子大每服一丸以溫酒或荆芥湯化下空心服患處㣲汗為效如不欲化服即丸如梧桐子大每服三十丸依前湯使下烏蛇丸出聖恵方治風痺手足緩弱不能舉伸烏蛇三兩酒浸炙黄去皮骨天南星炮製乾蠍㣲炒白附子炮白姜蚕炒桂心各一兩羌活麻黄各二兩去根節防風二兩去蘆右為細末鍊蜜和搗三二百杵如梧桐子大每服十丸不計時候以熱豆淋酒下羌活丸出聖惠方治風痺榮衞不行四肢疼痛羌活天麻各一兩附子一兩半炮去皮臍麻黄一兩去根節蛜􅖉三分炒桂心一兩烏蛇酒浸炙黄去皮二兩右為細末鍊蜜和擣二三百杵如桐子大每服十丸溫酒不拘時下細辛散出聖惠方治中風痺頭目昏悶肢節疼痛羌活赤茯苓白术芎藭柴胡去苖當歸各一兩炒麻黄二兩去根乾薑一兩半炮附子一兩炮防風去蘆獨活各一兩半石膏二兩杏仁去皮尖炒桂心甘草各一兩炙赤剉右為散每服四錢水一盞入生薑半分煎至六分去滓不記時候溫服白花蛇㪚出聖惠方治風痺闗節不利手足頑麻白花蛇二兩酒浸炙黄去皮骨磁石焼酒滓七遍研細白附子各一兩天麻狗脊萆􅐺剉側子炮去皮白姜蚕炒細辛防風去蘆芎藭白芷白􅐺皮羌活蔓荆子各半兩右為㪚入磁石同研令匀每服不計時酒送下蛜􅖉九出聖惠方治風寒入于肌内血氣不宣肢體不仁牽引腰背風痺疼痛蛜􅖉一兩炒去足虎脛骨三分酒浸炙黄安息香川烏頭各三分炮去皮白蒺藜炒去刺麻黄各一兩去根梹榔芎藭狗脊去毛赤茯苓各三分白花蛇二兩酒浸令黄去皮骨肉桂去皮赤箭枳實炒防風各三兩去蘆右為細末鍊蜜和搗二三百杵丸如梧桐子大每服不計時候以荷酒下十丸羌活散出聖惠方治風痺手脚不仁羌活漢防己各一兩荆芥薏以仁二兩防風一兩麻黄一兩半去蘆酸棗仁一兩黄松節附子一兩半去皮芎藭一兩天麻一兩半右為散每服不計時候以溫酒下二錢續斷湯出聖惠方治風痺後血氣未平復宜服續斷白芍藥黄耆人參川芎以上各一兩五味子半兩陳皮三分熟地黄一兩半甘草三分右搗篩作粗末每服五錢水一盞薑三片煎至八分去滓腹少空時服若筋脉攣急則當加當歸一兩桂心三分麻黄散治風痺四肢懈惰不能自舉麻黄去節根防風去蘆附子炮去皮芎藭桂心黄苓赤芍藥人參去蘆秦艽去苖茵芋甘草各一兩炙㣲赤右為㪚每服四錢水一盞入生薑半分煎至六分去滓不計時候溫服海藻酒治遊風行走無定腫起或如核或如甌或着腹背或着臂或着脚悉主之海藻茯苓防風獨活附子白术各三兩大黄鬼箭當歸各二兩右㕮咀以酒二斗浸五日初服二合漸加以知為度獨活散治風痺身體不舉常多無力獨活丹參各三分萆􅐺防風去蘆細辛人參乾薑炮剉天雄炮去皮牛膝去苖各一兩右為散每服不計時候以溫酒調下二錢白斂散出千金方治風痺腫筋急輾轉易常處白歛二分附子一分右搗下篩酒服半刀圭日三不知増至一刀圭身中熱行候十日便覺忌猪肉冷水麻黄散出聖惠方治風痺榮衞不行四肢疼痛麻黄五兩去根節桂心二兩右為散以酒二升慢火煎如餳每服不計時以熱酒調下一茶匙頻服以汗出為度川烏丸出聖惠方治風痺榮衞不行四肢疼痛川烏頭二兩去皮切碎以大豆炒候豆汗出即住乾蠍半兩㣲炒右為細末以釅醋一中盞熬成膏可丸即丸如菉豆大每服不拘時以溫酒下丸麻蕡方治風痺皮頑右為麻蕡炒令香搗碎小便浸取汁服麻子乃今人績布麻種子也生大豆方治賊風痺癱緩口噤瘇及麻痺右用大豆炒令黒及熱投酒中漸漸飲之治風痺補腦右用地榆汁醸酒服之治風痺右取蜂房一枚炙令黄赤色為末每用一錢臈月猪脂匀調傅之良附子酒出鮑氏醫書治風痺及冷淡癖脹滿右用附子三枚重二兩炮製去皮臍剉如麻豆大以醇酒五升浸五日每服一合去滓以脣口麻痺為度日再解風痺湯一名麻黄湯方見本門脾庳類治風痺風邪頑厚或疼痛不定或汗多而不仁出余居士選竒方麻黄去節生薑白术各一分石膏二十四個附子甘草薏苡仁白􅐺皮各一分右搗為粗末分八貼以水一升煎至七合不計時候服差為度忌猪麺肉等毒物猪絡丸出楊氏家藏方治風痺氣滯血脉凝澁筋脉拘攣肢節腰膝強痛行履艱難沒藥别研乳香别研虎骨酥炙敗龜酥五靈脂當歸各二兩白附子炮天麻去苗酒焙全蠍炒天南星炮附子炮川烏頭炮去皮臍尖杜仲去粗皮炒地龍去土炒威靈仙去苗烏蛇去皮骨酒浸牛膝酒浸一宿肉蓯蓉酒浸炙硃砂别研續斷十四味各一兩右為細末酒煮麺糊為丸如梧桐子大每服三十丸食前溫酒下川烏煎出鷄峯方治風痺骨節痛方老大芎不計多少右一味磨汁煎服一盞即安療風痺出本草以丹參酒漬飲之治風痺四肢攣急及主益人出本草煮五味根莖醸酒飲之治瘑癩風痺出本草用蒴藋煎湯浸洗去手足風痺出本草採霜後桑葉煮湯淋洗治風痺宿血拆傷瀝在骨間内痛不可忍及皮膚風瘙腫出本草以白楊皮和雜五木為湯將浸損處治風痺偏枯筋骨攣縮癱緩皮膚不仁疼冷等出本草取桃樹枝葉搗碎大甑中蒸令熱鋪著床上展卧冷更易骨間風盡出當大汗補藥及美粥食避風冷勞復久患風痺脚膝疼冷皮膚不仁氣力衰弱久服好顔色變白不老以石松浸酒服之及療大風瘘痺甚效出本草右用八月斷槐大枝使生嫩蘖煑取汁醸酒服治風痺出本草以熊脂酒煉服之瘥歴節出本草以栢枝節煮醸酒服治頑痺風瘙惡瘡毒腫死肌筋皮攣縮腕損筋骨出本草以野駝脂火炙摩之取熱入内亦作駝骨治風痺及補衰弱去痼疾用菊花水如常造食汲飲此水出南陽縣山谷中其水味甘乃是谷上左右皆生甘菊花壓其中歴世既久故水為變作甘谷水臨此谷中居民皆不穿水井悉食其谷水無不夀者昔司空王暢太尉劉寛太𫝊袁隗皆常為南陽太守每到官常使酈縣月送甘谷水四十斛以為飲之諸公多患風痺及眩胃皆得愈風冷痺附論夫痺雖異狀然皆本于三氣寒氣多者謂之冷痺其證令人脚膝痠疼行履艱難四肢􅍙麻身體俱痛甚則有一身不遂者虎骨散出聖經總錄治風毒冷痺偏枯不遂骨節疼痛手足攣拳虎骨酥炙黄敗龜酥炙各一兩羌活去蘆何首烏酒醮黒皮附子炮去皮各半兩當歸牛膝去苗酒浸焙芎藭秦艽去苗各三分威靈仙焙原蚕砂炒各三分延胡索糯米同炒赤為度半兩皂莢去皮子炙一兩梹榔煨二分白乾地黄焙一兩加減地仙丹出濟生方治風冷邪濕留滯下焦足膝拘攣腫滿疼痛不能步履宜服之地龍焙去土五靈脂去石烏藥白膠香别研椒紅炒去汗右等分為細末酒糊為丸如桐子大每服七十丸空心用鹽酒鹽湯下萆􅐺丸出聖濟錄治風冷痺逰走無定處一名血痺萆薢山羊牛膝製澤瀉各一兩白术半兩熟地黄二兩半茵芋一分地膚子乾漆炒烟出狗脊去毛谷三分右為細末鍊蜜丸梧桐子大每服空心溫酒下二十丸再防風湯治風冷痺身體不遂四肢􅍙麻不覺痛痒不能言語方見風溫痺身體手足不遂類巴㦸天湯治冷痺脚膝疼痛行履艱難巴㦸天去心三兩五加皮二兩萆薢牛膝酒製焙石斛去根甘草炙各一兩半防風去皮白茯苓去皮剉田各一兩三分附子炮去皮二兩右㕮咀如麻豆每服五錢生薑三片水一盞半煎至一盞去滓空心溫服一方無生薑亦可羌活飲治風痺膝冷疼煩脚無力方見風濕痺手足不遂類羌活飲蠲痺湯治風濕相搏身體煩痛項臂痛腫舉動艱難及手足冷痺腰腿沉重筋骨無力羌活去蘆赤芍藥姜黄當歸酒浸黄耆宻炙防風去蘆各一兩半甘草炙半兩右㕮咀每服三錢水一盞生薑五片煎至半盞去滓服一方無防風用棗煎服菖蒲散治風痺身體俱痛方見周痺類六生㪚楮實丸治風痺身體三焦虚寒腰脚不遂楮實炒二兩桂去皮二分枳殻炒三分梹榔煨剉牛膝酒浸焙切乾薑炮各兩半右為末鍊蜜和丸如桐子大空心晚食前溫酒下三十丸牛膝散治冷痺脚膝疼痛無力方見風濕身體手足不遂類小靈脂丸治一切風痺虚濕寒冷肢體疼痛痺不能行防風一兩五靈脂川烏頭炮去皮各二兩右為細末酒糊為丸如桐子大食前溫酒送下七丸日進二服白斂散治風冷痺腫筋急輾轉移易不常方見風痺類松節㪚治風寒冷濕搏於筋骨使筋攣掣痛行步艱難但是諸筋攣縮疼痛悉主之茯苓中心木剉如米一兩乳香研一錢右入銀石器内炒候冷存性為末每服二錢木𤓰酒調下治冷痺風其病狀腰眼膝間疼痛寒冷行歩艱難精神不足忽時疼痛兩足厥冷此病盖因久坐濕地及曾經冷處睡卧而得但臨病發時覺多困少力精神不守渾身筋骨沉重無力然後發作宜服此方石斛去根五味子茯苓當歸續斷芎藭木𤓰萆􅐺各半兩官桂去皮附子去皮防風羌活獨活細辛各一分川椒去子木香各二錢牛膝右為細末煉蜜丸如桐子大空心鹽湯任下四十九丸治風冷氣痺助陽氣行經絡以熱湯渫脚至脚上厚覆使汗出周身然别有藥亦終假湯氣以行也風濕痺附論風濕痺病之狀或皮膚頑厚或肌肉酸疼風寒濕三氣雜至合而成痺其風濕氣多而寒氣少者為風濕而成此濕痺也由血氣虚則受風濕而成此病久不差入於經絡搏于陽經亦變令身體手足不遂也石斛萬病散治風濕冷腰脚不遂方防風茯苓菊花細辛蜀椒乾薑雲母蓯蓉人參乾地黄附子石斛杜仲逺志兎絲子天雄萆􅐺桂心牛膝蛇床子白术薯蕷巴㦸菖蒲續斷山茱茰各一兩五味子半兩右治下篩酒服方寸匕日再服大甲丸治男女惡風濕痺周身不仁小腹拘急繞臍疼痛頭目眩暈時時嘔吐涎沫欬𠻳皆強難以俛仰心下懊憹面目無色喉咽不利耳聾惡風惡寒飲食失味膀胱忽滿大小便不利兩脛酸痛手足厥逆呼吸短氣時復失精白汗自出夢寐不安心神恍惚肌膚癮疹五味子炒䗪虫熬芎藭内蓯蓉酒浸焙白㣲黄連去鬚牡丹皮各三分阿膠炒麥門冬去心焙續斷石斛去根甘草炙吳茱茰洗焙桂去皮芒硝細辛去苗厚朴去皮薑製黄芩去心各半兩烏頭炮去皮蜀椒去目炒出汗乾薑炮去皮一兩當歸焙各一兩大黄一兩半商陸根切生地黄焙各一兩一分附子炮去皮一分右為末煉蜜為丸如桐子大每服五丸日夜再溫水下漸加至十丸以知為度石斛散治風濕痺脚弱拘攣疼痛不能行趺踵脹腫小腹堅不能食方見脚氣緩門脚氣緩弱類塗摩傅治風濕痺肌肉􅍙痺四肢攣急疼痛日久不瘥致機闗縱緩不能維持身體手足不遂牛膝去苗芍藥芎藭當歸白术白芷蜀椒去目合口厚朴去粗皮半夏湯洗七遍雷丸桔梗炒細辛去苗茱茰桂去皮附子去皮木香大腹梹榔各一兩酥二兩駞脂三兩臘月猪脂三觔右除後三味並細切量藥多少酒漬一宿先煉猪脂成膏去滓後盡入衆藥慢火從旦煎至晚其膏成以綿裹濾去滓再入鐺中投酥於中以合後并駝脂候消攪匀以瓷器盛封不拘多少以藥摩之經七日即歇三兩日再摩之側子浸酒方治風濕痺不仁脚弱不能行常服側子炮去皮牛膝酒浸焙山茱茰并子丹參杜仲去皮炙剉石斛去根蒴藋根各二兩防風細辛去苗蜀椒去目炒出汗獨活去蘆秦艽去苗桂去皮芎藭當歸白术茵芋去粗皮各一兩半乾薑炮五加皮一兩半薏苡仁炒半升右剉如麻豆大以生絹嚢貯用清酒三斗浸春夏三四宿秋冬六七宿初服三合再稍加之以知為度患目昏頭眩者服之彌精一方有金牙三兩五加皮丸治風寒濕氣合而成痺遍身疼痛難以轉側筋脉拘攣不能屈伸及頭目旋暈心腹脹悶小便赤澁大便秘滯脚弱不能行走並宜服之五加皮芍藥當歸芎藭大闕子連皮陳皮麻黄去節石南葉薏苡仁赤小豆杏仁各半兩木𤓰獨活杜仲炒萆􅐺各一兩牽牛頭末二兩右為細末酒浸蒸餅為丸如大豆每服三四十丸木瓜湯下不拘時曲膏出千金方治風濕疼痺四肢嚲弱偏陂不仁并癰腫惡瘡方大黄黄芩莾草巴豆野葛牡丹躑躅芫花蜀椒藜蘆附子各一兩右㕮咀以苦酒漬藥一宿以成煎豬膏三觔㣲火煎三沸一方加内白芷一觔三上三下白芷色黄藥成去滓㣲火煎炙手摩病上日三服為丸出瑞行堂方治腰脚風濕勞損手足麻痺筋骨疼痛不能屈伸行血駐顔補虚萆􅐺四兩破故紙炒杜仲炒胡䓃炒木通各二兩骨髓補去尾虎骨酥炙乳香研梹榔沒藥木香各一兩半甜瓜子三兩炒牛膝去蘆酒浸焙巴㦸各二兩去心胡桃仁一百個别研黑附子一兩炮右為細末與胡桃一處再研極細酒糊為丸如桐子大每服四五十丸溫酒送下食前服白花蛇丸一名附子丸出聖惠方治風濕痺四肢緩縱皮膚不仁精神昏憒白花蛇酒浸去皮骨炙二兩薏苡仁附子炮去皮萆薢仙靈脾各一兩羌活去蘆天南星炮天麻桂去皮芎藭各三分莽草炒乾蠍烏頭炮去皮防風去皮楓香脂各半兩右為細末糯米粥和搗三百杵丸如小豆大每服十丸荆芥湯溫酒下陳元膏出千金方治風濕痺骨肉疼當歸生附子生去皮天雄生去皮烏頭生去皮各一兩半生地黄一個取汁細辛去苗芎藭各一兩乾薑生桂去皮白芷去苖一塊丹砂别研各半兩猪脂不中水者别煉五觔雄黄别研一兩一分醋一升半松脂四兩右除二味研者并地黄汁猪脂松脂醋等相次入外餘剉切如豆粒先將地黄汁與醋拌匀浸一宿取猪脂松脂相與入器中煎常令小沸候白芷色黄入溫酒用厚綿濾去滓瓷盒盛入雄黄丹砂末熟攪至凝而止用塗摩病處修合時無令婦人小兒及鷄犬見一方有人參防風各三兩增損續斷丸出醫方大成治寒濕之氣痺滯闗節疼痛麻木方見寒暑濕門中濕類天蓼木丸出聖惠方治風濕痺脚膝緩弱天蓼木一兩天麻半兩白附子半兩炮芎藭半兩獨活半兩細辛半兩防風半兩去蘆藁本半兩烏蛇二兩酒浸炙黄去皮骨巴㦸半兩石斛半兩去根附子半兩炮去皮臍蛇麻仁半兩麝香一分研晚蚕蛾半兩㣲炒右為末煉蜜和搗三二百杵丸如桐子大每服二十丸不訃時候以溫酒下黄耆酒出危氏治風濕痺身體頑麻皮膚瘙痒筋脉攣急言語謇澀手足不遂時覺不仁黄耆去蘆防風去蘆天麻萆􅐺白芍藥當歸去蘆雲母粉仙靈皮甘草川續斷各一兩白术茵芋葉木香不見火官桂不見火右剉散以生絹袋盛以酒一斗浸之春五日夏三日秋七日冬十日每服一盞溫煖服之不拘時候常令酒氣相續為住一方有石斛虎骨聖靈丹出端竹堂方治男子婦人風濕相搏氣痺傳于手足麻腫疼痛久則偏枯及脚氣不能行履兼治癱瘓風濕手足復舊迭兩川烏出瑞竹堂方草烏去皮尖切片鹽炒香去鹽各半兩生地黄酒浸一宿焙麻黄去根炒出汗五靈脂炒去砂虎脛骨醋一宿炙酥黄自然銅醋碎七次以上各一兩研廣木香二錢半甜瓜子炒黄一兩沒藥炙一錢半另研沉香五錢末乾酸木𤓰生者八兩乳香另研一錢半敗龜底卜卦者醋炙黄七錢右為細末煉白沙蜜冷定和成劑每一兩分十二丸每服二丸隔夜生薑自然汁用磁盞浸至天明空心化開溫酒調服再食半盞熱酒送下日進二服唇吻㣲麻無妨風濕湯大治風寒濕痺脚氣筋攣着床不能行歩附子炮去皮白术甘草當歸焙防風桂枝薏苡仁各一兩乳香沒藥茯苓各半兩右為細末每服三錢水盞半煎至七分去滓溫服食前日三夜一服海桐酒一名薏苡仁酒治濕痺手足痿筋脉攣肢節疼痛無力不能行走牛膝海桐皮五加皮獨活防風杜仲枳殻各二兩生地黄二兩半白术薏苡仁一兩右㕮咀用生絹袋二個兩停盛藥以好酒一斗五升亦分兩磁器内浸春夏七日秋冬二七日遂旋酒浸每服一盞日三夜一使酒力薫薰百日步握如故狗脊散出聖惠方治風濕痺四肢不仁肌肉瞤動舉體無力狗脊半兩去毛附子三分炮去皮薯蕷三分熟地黄三分天雄炮去皮三分王闕三分桂心三分山茱茰二錢秦艽三分去苗白歛三分右為粗㪚每服四錢水一中盞煎至半盞去滓不計時候分溫二服一方以水酒各一中盞煎服烏頭湯出危氏方治寒冷濕痺流于經絡攣縮不得反側大烏頭細辛川椒甘草秦艽附子官桂白芍藥各七分獨活去蘆一兩三錢五分右剉散每服三錢水一盞半棗二枚同煎至八分去滓空心食前服續斷丸出醫方大成治風濕流注四肢浮腫肌肉麻痺方見寒暑濕門中濕類防己湯一名茵芋㪚出聖濟錄治風濕痺肌膚不仁體常汗出惡風防己三兩白术一兩半桂去粗皮茵芋丹參五加皮剉各一兩牛膝酒浸焙細辛去苗葉甘草炙各半兩右為粗散每服五錢水一盞半入生薑五片煎至八分去滓溫服不拘時候日二乳香宣經丸出楊氏家藏方治風寒濕痺四肢拘攣筋骨疼痛行歩艱難脚氣諸疾並宜服之茴香二兩炒烏藥威靈仙洗萆􅐺陳皮去白各四兩川練子肉二兩㣲炒黑牽牛生四兩草烏頭去皮尖二兩炒黑豆三合生用五靈脂一兩防風去蘆四兩附子八錢炮乳香八錢另研木香八錢右為細末酒煮麺糊為丸如桐子大每服三十丸漸加至七十丸空心食前酒下防己黄耆