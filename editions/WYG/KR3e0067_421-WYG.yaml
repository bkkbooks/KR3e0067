後臁痛穴天宗治肩肘痛穴天髎治肘節風痺臂痛不可舉屈伸難攣急臂痠重麻痺不仁穴肘髎治肘攣支滿穴魚際治肘攣穴靈道尺澤少海治驚掣肘臂不舉穴支正内關陽谿治臂肘厥寒穴極泉治手臂肘攣不伸穴竅陰手三里治臂肘不仁穴附分治偏枯臂肘不得屈伸穴腕骨治臂肘攣急穴後谿治臂肘痛穴五里天井下㢘治肘中痛穴衝陽曲池治肘攣支滿喉中焦乾渴頸上氣穴魚際治肘臂酸重屈伸難穴偏厯三里治肘酸痛穴中渚治肘痛穴太淵治肘痛屈伸難手不得舉偏風半身不遂捉物不得挽弓不得開肘臂偏細穴曲池療肘臂厥痛屈伸難手不及頭足不握物指盡痛穴孔最療肘臂攣難屈伸手不握十指盡痛穴支正療肘臂酸重不可屈伸麻痺不仁穴肘窌療肘痛引肩不可屈伸頸項及肩背痛臂痿不仁穴天井療肘痛不能上下穴液門治肘痛穴列缺甲乙經云五里在肘上三寸大脉中玉篇説肘臂節也此臂之下節也宓子賤使吏書而掣其肘盖其臂節當以此求之治肘攣拄滿穴魚際靈道脚􅂰痛治􅂰不得屈伸取其經血立愈資生經穴委中治脚􅂰拘急足寒如氷穴腎腧治筋骨攣痛穴灸絶骨治􅂰中痛不仁難跪起穴犢鼻療􅂰寒不仁痺痿不屈伸穴髀關療脛痛冷脾􅂰痛不能屈伸穴梁丘療腿膫連膝脛麻痺屈伸難􅂰脛連腰痛筋攣急足不收履坐不能起穴懸鍾療足寒脛酸屈伸難穴蠡溝療脚脛痠痛屈伸難不能久立甄權云主大氣不足偏風腲腿不相隨穴巨虚療脛麻􅂰痛穴風市療四肢腫滿腿􅂰痠痛穴三里療膫内臁痛小便不利身重足痿不能行穴三陰交療腿􅂰脛痿脚攣不得伸癲病狂走自嚙􅂰脛寒穴京骨療腿􅂰脛酸穴附陽療脚酸􅂰重穴承山療􅂰股内外臁痛不仁屈伸難穴陽陵泉治兩􅂰攣痛引脇拘急軃躄或青或焦或枯或黧如腐木穴風市治􅂰脛骨搖痠痺不仁穴絶骨治􅂰寒不仁痿痺不得屈伸穴脾關治痿痺坐不能起􅂰脛痠痺不仁手足偏小坐不能久穴光明治􅂰内臁痛引臏不可屈伸穴􅂰關治􅂰不可屈伸穴曲泉治筋攣􅂰不得屈伸不可行穴曲泉梁丘陽關治􅂰股腫䯒酸轉筋穴解谿條口丘墟太白治風水􅂰腫穴上㢘治􅂰腫少氣身重􅂰重内踝前痛穴中封治􅂰股胻腫穴解谿治脚後臁急不可前却穴復溜治脚脛急痛脚脛痠脚及跟痛穴承山承筋治脚結踝如裂穴崑崙治脚攣穴京骨承筋商丘治拘急穴膀胱腧治腨外骨痛穴附陽􅂰痛治􅂰䯒痠痛資生經穴三里治喉痺面腫寒痺􅂰䯒不收穴陽交治􅂰䯒寒痠痛足緩履不收濕痺足下熱穴條口治􅂰痛如錐不得屈伸穴陰谷治脚􅂰無力穴膀胱腧治􅂰肢痛穴合陽治腰􅂰拘攣穴陰交治􅂰寒不仁痿厥股内筋絡急穴髀關治脚􅂰伸屈不得冷脚不仁偏風半身不遂脚冷無血色穴梁丘治􅂰外痛不可屈伸風痺不仁穴陽關治􅂰中痛不仁難跪起􅂰臏癰腫不潰可治潰者不治穴犢鼻治􅂰股内痛穴三隂交治􅂰脛内臁痛穴信交治􅂰内痛穴曲泉治心腹脹滿胃熱不嗜食􅂰䯒痛筋攣足不收履坐不能久穴懸鍾治􅂰冷痛不已穴􅂰眼療􅂰冷穴伏兎療腿􅂰痠痺穴豐隆治􅂰外臁痛穴俠谿陽關主􅂰内臁痛引臏不可屈伸連腹引喉痛穴􅂰關治􅂰腫内踝前痛穴中封治􅂰内踝前痛穴太衝治􅂰中痛不仁穴犢鼻治􅂰痛脛熱不能行手足偏小􅂰脛痠痺不仁穴光明療􅂰痿痛穴三里療􅂰酸穴風市療􅂰重穴承山王氏云有弟行一二里路􅂰必痠痛不可行須坐定以手撫摩之而後能行後因多服附子而愈予冬月􅂰亦痠疼灸犢鼻而愈以此見藥與灸不可偏廢也若灸􅂰關三里亦得但按其穴痠痛即是受病處灸之不拘腰脚疼治腰脚腫痛久痼宿疹亦皆立已資生經穴委中刺出血治腰下至足不仁穴次窌療脚如冷水穴隂市療脚足不仁穴膀胱腧治腰背痛脚腨重戰慄不能立脚氣􅂰下腫穴承山治腰痛不能舉體足䯒寒不能久立坐如舟車中穴申脉治腰凥痛足腨痛不能履地穴崑崙療腰疼偏風半身不遂脚腫不得履地穴崑崙療脚痛不可舉下重脚痿穴僕参療腰痛不可俛仰足痺痛屈伸難穴地機療冷痺脚脛麻腿􅂰痠痛凥重起坐難穴風市療脚痠疼不能久立腰􅂰重起坐難筋攣急不可屈伸穴承山張仲文療腰重不可轉起坐難及冷痺脚筋攣不可屈伸灸曲䐐兩交頭左右脚四處各三壯每灸一脚二火齊下燒纔到肉初覺痛便使二人兩邊齊吹至火滅午時着艾至人定亥時行動肺腑一兩回或臟腑轉如雷聲立愈神効治腰腿手足不仁穴上㢘治腰溶溶如坐水中􅂰下暴腫筋攣諸節盡痛無常處腋腫痿馬刀喉痺膝䯒痠風痺不仁穴陽輔治腰􅂰拘攣穴陰交治患脚穴環跳陽陵泉巨虚下㢘陽輔治患風腰脚不隨不得脚起穴上窌環跳陽陵泉巨虚下㢘大理趙卿針二穴即得跪起治冷痺脛􅂰疼脚足攣急足冷氣上不能久立手足沉重日覺羸痩此名復連病宜灸即愈得跪起穴懸鍾下臁治足痿躃不能行穴地倉太泉腰痛附論腰痛之病皆本於腎盖腎病者腧在腰脊也諸經各有腰痛不同當隨症治之凡腰痛引項脊尻背如重状者病在足太陽脉也刺其郄中正經出血春無見血委中穴也腰痛加以針刺其病不可俛仰不可以顧者刺少陽成骨之端出血夏無見血成骨在膝外㢘之骨獨起者腰痛不可以顧顧如有見善悲者病在陽明於䯒前骨痏上下刺之出血秋無見血三里穴也腰痛引脊内㢘者属少陰刺内踝上二痏春無見血出血太多則不可復復溜穴也腰痛腰中如張弓弩弦者属厥陰刺腨腫魚腹之外循之累累然乃刺之蠡溝穴也腰痛引肩目􅉩􅉩然時遺溲者病在解脉刺􅂰筋内分間郄之外臁出血血變而止亦太陽之郄也腰痛如引帶常如折腰状善恐者亦解脉病也刺郄中結絡如黍粟刺之血射以黒見血而止委中穴也腰痛如以小錘居其中怫然腫者病在同陰之脉刺絶骨之端為三痏陽輔穴也痛上怫然腫者属太陽之脈刺腨下去地一尺所承山穴也腰痛不可以俛仰仰則恐仆得之舉重傷腰衡絡絶血歸之次郄陽筋之間上郄數寸衡居為三痏委陽穴也腰痛上累累然出汗汗乾令人欲飲飲已欲走者属㑹陰之脉刺蹻上郄下五寸横居視其甚者出血承筋穴也腰痛上怫然甚則悲與恐者病属飛揚之脉也刺内踝上五寸少陰之前與陰維之㑹復溜及曲鬂穴腰痛痛引膺目􅉩􅉩然甚則反折舌不能言者病在倡陽之脉内踝上太筋前太陰後上踝二寸所交信穴也腰痛而熱熱甚生煩腰下如横木居其中甚則遺溲者病在㪚脉刺􅂰前骨肉分間絡外㢘束脉三痏地機穴也腰痛不可以欬欬則筋縮急者病在肉里之脉刺太陽外少陽絶骨之後為二痏分肉穴也腰痛脊而痛至頭汎汎然目􅉩􅉩欲僵仆刺郄中出血腰痛上寒刺足太陽陽明上熱刺足厥陰中熱而喘刺足少陰刺郄中出血腰痛上寒不可顧刺足少陽大便難刺足少陰小腹滿刺足厥隂如折不可俛仰不可舉刺足太陽痛引小腹腰痛不可以仰刺腰尻交者兩踝胛上以月死生為痏數發針立已左取右右取左此治腰痛之法也衆穴之外又有遺法者附之於後治腰引小腹痛穴居髎治腰痛惡寒小腹堅急癃閉重不得小便澁利腰背卒痛穴胞肓治腰痛不能俛仰小便赤澁腰尻重不能舉穴秩邊治腰重不能舉體穴委中治腰髖疼脚􅂰不遂穴白環腧治因撲傷腰髖疼穴肩井治腰髖疼脊强不得展穴腰腧治腰腹相引痛穴命門治腰强痛穴肺腧治腰痛穴陰陵泉大腸腧治腰痛不得轉側穴下髎治腰如坐水中穴陽輔治腰痛大便難穴湧泉治腰痛不得俛仰寒熱腫脹引背不得息穴京門療腰痛肩寒穴肝腧療腰痛穴肝腧氣海腧中膂腧療風勞腰痛穴關元腧膀胱腧療惡氣腰背卒痛又云腰痛不可忍俛仰難惡寒小便澁穴胞肓療腰痛不可俛仰轉側難穴腎腧療腰尻重不欲起俛仰難惡聞人音穴崑崙治腰尻重起難穴風市療腰痛不能久立腰以下至足不仁坐起難腰脊急强不可俛仰腰腫如石難舉動穴腰腧治四肢寒熱腰疼不得俛仰身黄腹滿食嘔舌根直灸第十一椎上及右左各一寸五分三處各七壯治腰痛穴腰腧膀胱腧長强氣衝上窌下窌居髎主腰痛不可顧穴三里陰市陽輔蠡溝治腰痛如錘居中腫痛不可欬欬則筋縮急諸節痛上下無常寒熱穴陽輔治腰痛不能舉穴申脉太衝陽蹻治腰痛不可俛仰又治腰痛得俛不得仰穴委陽陰門太白陰陵泉行間治腰痛得俛不得仰穴委陽陰門治腰如折穴束骨飛揚承筋治腰痛大便難穴湧泉治腰痛不可久立穴京門治腰痛不得俛仰穴氣衝治腰背痛穴宜灸次􅂰腰勾畫中青赤絡脉出血便瘥治腰痛不得俛仰者令患人正立以竹拄地度至臍斷竹乃以度背脊灸竹上頭處隨年壯灸訖藏竹勿令人得知治腰痛灸脚跟上横文中白肉際十壯良又灸足巨陽七壯又灸腰目窌七壯尻上約左右是又灸八窌及外踝上骨約中治腰卒痛灸窮骨上一寸七壯左右一寸各七壯治腰脊痛灸小腸腧五十壯治腰背痛灸三焦腧隨年壯王氏云有婦人久病而腰甚疼腰眼既灸醫以針寘火令熱謬刺痛處初不深入既而痛止則知火不負人之説尤信云昔許知可因淮南大水忽腹中如水吼調治得愈自此腰痛不可屈伸思之此必腎經感水氣而得灸腎腧三七壯服鹿茸丸王氏云予謂腰痛不可屈伸灸腎腧自効不服鹿茸亦可王氏云舍弟腰疼出入甚難予用大針微微頻刺腎腧則步履如故初不知也屢有人腰背傴僂來覔㸃灸予意其是筋病使然為㸃陽陵泉令歸灸即愈筋㑹陽陵泉也然則腰疼又不可専泥腎腧不灸其他穴也治腰傴僂引項筋無力不收穴風池治腰强穴肺腧治腰如折腨如結耳聾惡寒風目眩項不可顧目内眥赤爛穴肺腧治腰脊攣痛穴白環腧治腰痛不得反側穴章門治腰痛不得已者灸白環腧二穴又灸腰目窌七壯治腰痛控睪小腹及股卒俛不得仰刺氣衝治忽然氣滯腰痛不可俛仰刺足太陽絡神道二穴次針足厥陰經行間二穴治久虚人腰痛刺而復發者腰重不能舉體取經血而愈刺足太陽經委中二穴治凡腰痛刺之不已者刺八髎而愈治腰背俱疼不可忍刺足少陽經風池二穴次針手陽明經合谷二穴次針足太陽經崑崙二穴治腎虚腰痛久不已刺足少陽經肩井二穴次針足太陽經腎腧二穴治腰脊内引痛不得屈伸近上痛者刺手陽明經合谷二穴治腰脊内引痛不得屈伸近下痛者刺足太陽經崑崙二穴刺足少陰經復溜穴治脊強反折刺督脉瘂門二穴應時立愈治腰胯疼痛不得轉側刺足少陽經環跳二穴次針丘墟二穴治閃着腰疼錯出氣腰疼及本臟氣虚刺任脉氣海二穴以圓利針刺肥人入一寸痩人針入五分三補三㵼令人覺臍上或臍下滿腹生痛停針候二十五息左右重按其穴右手進針三息又停針候二十五息依前進針令人覺從外腎熱氣上小腹滿状出針神效治腰疼寸步難移者端正齊足立地以杖子一條當前就地量至肚臍住以杖子量至脊背後杖盡住當脊兩邊約一寸三處齊灸每處三下除根也治反腰有血痛腎腰者猶如反腰灸腰眼中七壯治腰痛不可俛俯轉側身寒熱食倍多身羸面黄黒目􅉩􅉩及治丈夫婦人積冷氣勞病穴腎腧治腰痛不可俛仰夾脊膂痛上下按之應者從項後至此穴皆灸之立愈也穴中膂腧澹潦方云徐熙字秋夫不知何郡人時為射陽令少善醫方名聞海内嘗夜聞有鬼呻吟聲甚悽苦秋夫曰汝是鬼何所泣荅曰我姓解名斯家在東陽患腰痛而死雖為鬼而疼痛不可忍聞君善術願相救濟秋夫曰汝是鬼而無形云何可治鬼曰君但縳蒭為人索孔穴針之秋夫如其言為針腰眼四處又針肩井二處設祭而埋之明旦一人來謝曰䝉君醫療復為設祭除饑解痛感惠實甚忽然不見當代稱其通靈長子道度次子叔嚮皆精其術焉治腰尻引小腹痛遺尿不禁穴陰包治腰如冷水穴陰市治腰尻腫腨跟腫穴崑崙治腹疾腰痛膀胱寒澼飲注下灸下極腧隨年壯腰脊痛治腰痛夾脊至頭汎汎然凡腰脚重痛於此刺出血久痼宿疹亦皆立已資生經穴委中治腰脊痛穴太鍾治腰脊疝痛穴小腸腧中膂腧白環腧治腰脊痛惡寒腰下至足不仁穴次窌胞肓承筋治腰脊痛引腹穴合陽治腰脊尻臂股陰寒痛穴扶承治腰脊相引如解及腰痛大便難穴湧泉治腰痛脊急穴志室京門治腰脊急强穴脾腧小腸腧膀胱腧腰腧神道脊中長强大杼膈關水分療腰臗疼腰脊强不得轉穴腰腧治腰脊攣痛大小便不利百病髖疼不遂腰中冷不識眠睡又云治腰脊急强不能俛仰起坐難手足不仁小便黄腰尻重穴白環腧療腰脊痛急食不消腹堅急穴志室胞肓療脊急强腰至足酸重穴膀胱腧療腰脊急强逆氣上攻時噎穴神堂治腰脊强痛穴大鍾治腰脊强痛飲食不消腹堅穴志室治腰脊不得俛仰腰痛不可俛仰夾脊膂痛上下按之應者從項後至此穴皆灸之立愈穴京骨中膂腧治腰脊内引痛不得俛仰起坐目􅉩􅉩善怒多言舌乾涎自出足痿不收履䯒寒不自温穴復溜治筋攣䯒酸髀樞痛頸項强腰不可俛仰穴京骨治腰脚脊沉沉然遺溺腰重不能舉體風髀痺樞痛刺出血久痼痢疾皆愈又云熱病汗不出足熱逆滿􅂰不得屈伸取其經血立愈穴委中治腰脊强引腹痛陰股熱􅂰䯒痠重履步難穴合谷治腰脊相引如解及療腰脊尻臀腹冷難穴扶承治腰脊不可俛仰舉體惡血注之股外腫穴陰門治腰脊痛不得轉穴章門次髎治腰强不得屈伸穴懸樞治肩背急腰脊强不得俛仰穴三焦腧治腰脊痛穴膀胱腧治腰脊攣痛大小便不利腰髖疼脚膝不遂濕留腰脊冷疼不得俛仰又治勞損風虚穴白環腧史記太倉公告宋建曰君有病往四五日君腰脇痛不可俛仰又不得小溲不亟治病即入濡腎及其未舍五臟急治之病方今舍腎濡此所謂腎痺也宋建曰建故有腰脊痛往四五日弄石不得起即復置之暮腰脊痛不得溺至今不愈建病得之好持重即為柔湯使服之十八日而病愈然則腰脊傷持重得病而入腎灸腎腧可也治腰清脊强四肢觧墮善怒欬𠻳氣鬱鬱不得息厥逆肩不可舉馬刀强身瞤穴章門治背惡寒痛脊强難以俛仰穴膈關秩邊京骨治腰背不便筋攣痺縮虚熱閉塞灸第二十一椎兩邊相去各一寸半隨年壯脊痛治脊强反折瘛瘲癲疾資生經穴五處身柱委中委陽崑崙治脊强穴膈關治腎强背尻骨重穴崑崙治脊痙反折穴京門石關治脊内㢘痛穴陰谷療脊急强穴至陽治脊强不能俛仰穴章門膈腧胃倉大腸腧治脊痛穴胃腧治腹中氣脹引脊痛食多身痩名曰食晦先取脾腧後取季脇穴脾腧大腸腧療脊急强穴膀胱腧治赤白洞利腰脊痛穴小腸腧五十壯治賁氣上下引腰脊痛穴氣海治腎虚消渴腰脊不得俛仰夾脊膂痛上下按之應者從項後至此穴灸之立愈穴中膂骨疼療骨疼資生經穴膈腧紫虚玉堂治引骨疼穴上關治骨痛穴絶骨五十壯治骨痺煩悶穴商丘治皮内骨痛穴膈腧治骨痛穴太白治骨寒熱穴復溜治骨髓冷痛穴上㢘七十一壯骨㑹大杼禁灸骨病治此髓㑹絶骨髓病治此病在骨髓秦越人以為司命無奈之何則骨髓有病病亦惙矣八十一難經疏云骨腧太杼骨病治此髓㑹絶骨髓病治此是尚有針灸法矣可不針灸乎但明堂上經云大杼禁灸而銅人云可灸七壯明堂下經云可灸五壯素問諸經既同唯明堂獨異灸之可也况明堂經固云禁穴許灸三壯乎艾炷若小一二七壯亦可更灸上㢘絶骨等穴尤佳腠理痛治肩背急風冷客於腠頸項强痛不得顧資生經穴附分治肩腠寒慄重衣不得温穴陽白治腠中痛穴肝腧治背腠寒穴次髎治腰下至足不仁背寒小便赤淋心下堅脹史記扁鵲之言曰疾居腠理湯熨之所及也在血脉針石之所及也在腸胃酒醪之所及也其在髓雖司命無奈之何也夫疾之在骨髓盖始於居腠理也使居腠理而能治雖非聖人之治於無病亦賢者治将病也齊桓公乃以醫為好利欲治不疾以為功而卒至於不可救不特齊侯為然人皆然也吾故於扁鵲之言即腠理之不治以戒之亦使醫者當治人於将病焉耳腸痛治腸痛資生經穴太白治腸痛穴陷谷治腸切痛穴商丘治腸中疼嘔逆上氣心痛身腫穴建里治腸中大熱穴氣衝腸痛亦多端若疼甚者乃腸癰急宜服内補十全散等藥其他宜隨症灸之有老嫗大腸中常若裏急後重甚苦自言我必無痊日此竒疾也為按其大腸腧甚疼令婦灸之而愈治腸癰為病小腸重小便數似淋或繞臍生瘡或膿從臍出大便出膿血穴屈兩肘正灸頭銳骨各百壯則下膿血立瘥普濟方卷四百二十一
