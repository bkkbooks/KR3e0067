body:
  text: 普濟方卷四百二十一明周王朱橚撰鍼灸門虚損治腑臟虚乏下元冷憊等疾資生經穴灸丹田人有常言七七之類是旁太嵗壓本命六十有一是太嵗壓本命人值此年多有不能必者是固然矣然傳不云吉人吉其凶者乎常觀素問以六八之數為精髓竭之年是當節其欲矣千金云五十者一月一泄要之四十八便當依此千金載素女論六十者閉精勿洩是欲當絶矣當節不知節宜絶不能絶坐此而喪生盖自取之豈嵗之罪哉人無罪嵗則雖有孽猶可違矣所謂吉其凶者如此雖不灸丹田可也丹田可灸七十一壯或百五五壯治陽氣虚憊失精絶子灸中極中極一名氣原盖氣之原也人之陽氣虚憊者可不灸此以實其氣耶按難經云丹田一名大中極言丹田取人之身上下四旁最為中間也故名為極此亦曰中極其去丹田只一寸雖未居丹田之最中然去中不遠矣治胃寒心腹脹滿胃氣不足惡聞食臭腸鳴腹痛食不化秦承祖云諸疾皆治華陀云療五勞羸痩七傷虚乏胸中瘀血乳癰明堂云人年三十以上若不灸三里令人氣上衝目千金云治陰氣不足小腹堅熱病汗不出口苦壯熱身反折口噤腰痛不可忍胃氣不足久洩痢食不化脇下拄滿不能久立狂言狂歌妄笑恐怒大罵霍亂遺尿失氣陽厥悽悽惡寒穴三里凡此等疾皆刺灸之多至五百壯少至二三百壯資生經云小品云四肢但去風邪不宜多灸七壯至七七壯止得過隨年壯數故銅人於三里穴止云灸三壯針五分而已明堂上經乃曰灸七壯止百壯亦未為多也至千金方則云多至五百壯少至二三百壯何其多也要之日灸七壯或灸炷甚小可至二七壯數日灸至七七壯止灸瘡至乾則又報灸之似合也若要安丹田三里不曽乾之説可也必如千金之壯數恐犯小品之所戒也予曰有脚氣疾遇春則足稍腫夏中尤甚至冬腫漸消偶夏間依素問注所説穴之所在以温針微刺之翌日腫消其神效有如此者謬剌且然况於灸乎有此疾者不可不知此不止治足腫諸皆治之治久冷傷憊臟腑洩痢不止中風不省人事等疾穴灸神闕王氏曰舊傳有人年老而顔如童子者盖每嵗以鼠糞灸臍中一壯故也予嘗患溏利一夕灸三七壯則數日不如厠連數夕灸則數夕不如厠足見經言洩利不止之驗也予年踰壯覺左手足無力偶灸此穴而愈後見同官説中風人多灸此穴或百壯或三五百壯皆愈而經不言主中風何也治臟氣虚憊真氣不足一切氣疾久不瘥者灸氣海人身有四海氣海血海照海髓海是也而氣海為第一氣海者元氣之海也人以元氣為本元氣不損雖疾不害一傷元氣無疾而死也宜頻灸此穴以壯元陽若必待疾作而後灸恐失之晩也治男子臟氣虚憊真氣不足一切氣疾久不瘥不思飲食全無氣力燔鍼鍼任脉氣海一穴鍼入五分可灸百壯次以毫鍼鍼足陽明經三里二穴治虗勞喘𠻳灸脊骨從上第五椎下間神庭穴百壯治虗勞羸痩腎虚水臟久冷小便濁出精陰中痛五勞七傷虚憊足寒如氷身腫如水穴腎腧難經䟽云夾脊骨有二穴在左為腎在右為命門言命門者性命之根本也其穴與臍平凡灸腎腧者在平處立以杖子約量至臍又以此杖子當背脊骨上量之知是與平處也然後相去各寸半取其穴則是腎腧穴也更以手按其䧟中而後灸之則不失穴所在矣凡灸以隨年壯灸固有功亦在人涵養之如何爾人當愛䕶丹田吾既列方論之詳矣而妻妾之戕害未之及也君子偕老之序曰夫人淫亂失事君子之道故陳人君之德服飾之盛宜與君子偕老也宜偕老而不至偕老夫人之罪多矣故詩人以是刺之意可見也至於士大夫志得意滿不期驕而驕至侍妾數十人少亦三五輩淫言䙝語不絶於耳不能自克而􅁋縱其欲者多矣為内子者恬不之怪人有問者則曰自母言之則為賢母自我言之未免為妬婦人也人或以此多之其夫亦以為賢而不妬孰知其不妬乃其所以禍之歟雖然二南之化至以無妬忌而言此豈求異於詩人耶是不然古人十日一御妾媵彼其不妬者盖使媵妾為備十日一御之數爾不妬則同所以不妬則異吾故表而出之以為夫婦之戒非求異於詩也治失精五臟虗竭但是虗乏泠極皆宜灸穴曲骨灸五十壯治骨髓冷疼穴上㢘灸七十壯難經䟽八㑹曰府㑹中脘治腑之病臟㑹章門臟病治此筋㑹陽陵泉筋病治此髓㑹絶骨髓病治此血㑹膈腧血病治此骨㑹大杼禁灸骨病治此脉㑹太淵脉病治此氣㑹亶中氣病治此然則骨髓有病當先大杼後絶骨而後上㢘可也治膀胱三焦津液減少大小腸寒熱或三焦寒熱穴小腸腧灸五十壯治三焦膀胱腎中熱氣穴水道灸隨年壯治羸痩虗損夢中失精上氣欬逆發狂健忘等疾穴膏盲腧膏肓無所不療而古人不能求其穴是以晋景公有疾秦醫曰緩者視之曰在肓之上膏之下攻之不可逹之不及藥不至焉不可為也晋侯以為良醫而孫真人乃笑其拙為不能尋其穴而灸之也若李子豫之赤龍丹又能治其膏肓五音上下之鬼無待於灸也是緩非特拙於不能灸亦無殺鬼藥矣其亦技止於此哉治五臓虚勞小腹弦急脹熱及五臟痼冷腎風虚寒失精小便濁難穴灸腎腧五十壯老小損之虗冷可至百壯横三間寸灸之治虚勞隂中疼痛溺血泄精穴灸列缺五十壯穴又灸横骨五十壯穴又云治五臟虚竭又灸大赫三十壯治虚勞失精筋攣隂縮入腹相引痛穴灸中封五十壯治顔色焦枯勞氣失精肩臂痛不得上頭穴灸肩顴百壯治失精筋攣隂縮入腹相引痛穴灸承滿各五十壯大人加之小兒隨年壯此二穴喉腫厥逆五臟所苦鼓脹並主之治虚勞腰冷疼溺多白濁穴灸脾募百壯又灸三焦腧百壯又灸章門百壯治怯勞傷等疾先以蠟打線一條於患人頭匝轉以兩眉心為則截斷用銅錢一箇穿上套於頸上取咽喉為中轉錢向背錢眼中正穴用墨㸃却以蠟閉門合口横絞則寸截斷分中墨㸃兩傍是灸二七壯須以病人兩脚取齊以蠟線後脚後跟圍過至兩大脚拇指截斷以錢一文穿上亦行套於頸上取咽喉為中轉錢向背脊錢眼取中治諸虚勞小腹堅絞痛難忍及陰縮困篤欲死及隂陽易療丈夫得婦人隂易之病若傷房室者穴灸隂頭百壯皆愈又男初覺便灸隂三七壯若已病甚至百壯即愈灸眼無妨隂道創復如常治腦虚冷腦衂風寒入腦久遠頭疼等疾穴灸􅇟㑹王氏云年踰壯常寒夜觀書每覺腦冷飲酒過量腦亦疼甚後因灸此穴而愈有兵士患鼻衂不已教令灸此穴即愈有人久患頭風亦令灸此穴即愈又云主鼻塞不聞香臭等疾而已故予書此以補其治療之闕然以腦户不宜鍼觀之􅇟㑹亦不宜針針經止云八嵗以下不宜鍼恐未盡也治飲食不洩心腹膨脹面色萎黄世謂之脾腎病者穴宜灸中脘資生經云諸葛亮夙興夜寐罸至二十皆親覽而所噉食不至數升司馬仲逹知其将死既而亮卒仲逹追之楊儀反旗鳴鼓若将拒焉仲逹乃退不敢逼百姓為之諺曰死諸葛走生仲逹仲逹聞之曰吾能料生不能料死故也其曰料生盖料其事多而食不如前其死宜也食不如前仲逹且知孔明之死今人飲食减少是胃氣將絶不能久生矣方且常服金石使愈難尅化服酸補藥使脾胃反熱愈不能食初不知灸中脘等穴以壯脾胃亦惑之甚也難經云四臟以胃氣為本釋㫖云言主臟皆以胃氣為本胃者水谷之府人須養胃氣為生也然則欲全生宜灸胃脘腎虚治腎虚水臟久冷資生經穴腎腧治腎虗消渴穴中腎腧治腎氣穴陽蹻治小腸氣不足面無顔色穴下㢘治小氣痃癖氣發時腹痛如刀刺不可忍者并婦人本臟氣血癖走注刺痛或坐卧不得或小便不通不思飲食一云治寒疝有腸氣發牽通大腎大痛腫硬如石於左右脚下第二指第一節曲紋中灸十壯資生經云治小腸氣方甚多未必皆效耆成方奪命㪚良方倉猝㪚皆已試之効者有一兵患小腸氣依此方灸足第二指下紋五壯畧効而再發恐壯數未多也予以鎮靈丹十粒與之早晩五粒而愈灸固勝於藥若灸不得穴不如藥相當者見效之速且灸且藥方為當爾近傳一粒聖㪚用乾全蝎七箇縮砂仁二七枚炒茴香一錢為末分三服熱酒調下和滓空心服此疾是小腸受熱蘊積不㪚久不能愈服此立效雖未試用以其説有理故附於此有士年少覔灸夢遺為照腎腧痠疼令其灸而愈則不拘老少腎皆虚也古人云百病皆生於心又曰百病皆生於腎心勞生百病人皆知之腎虚生百病人未知也盖天一生水地二生火腎水不上升則心火不下䧏兹病所由生也人可不養心可不愛䕶腎乎勞瘵治丈夫五勞七傷六極腰痛大便難小便淋􅅹腹脹不利食洩資生經穴中髎治五勞羸痩七傷虚乏明堂云五勞虚乏四肢羸瘦穴三里治五勞七傷穴肩井治五勞七傷瘟瘧痎㾏背膊急脛風勞食氣穴大椎治寒熱喘滿虚煩口乾𫝊屍骨蒸勞肺痿欬𠻳穴肺腧治虗勞肺痿勞損萎黄五屍走注項强及療勞損虗乏穴魄戸治五勞四肢力弱虚乏秦承祖法穴支正治勞損虗乏不得睡穴譩譆治背痛身熱穴下焦腧治但是虗乏冷極穴曲泉治冷病面黒肌體羸四肢力弱小腹氣積賁豚腹弱胸盪欲死不知人五臟氣逆上攻穴氣海治羸瘦虗損夢中失精無所療穴膏肓腧治虗勞羸痩耳聾腎虚水臟乆冷腰疼心腹膨脹脇滿引小腹痛目視􅉩􅉩少氣溺血水溲濁出精陰痛五勞七傷虚憊脚􅂰拘急好獨卧足如氷頭重身熱振慄腰中四肢淫濼同洩食不化身腫如水又療身寒熱食多身羸痩面黄黒目視􅉩􅉩及女人久積冷氣成勞穴腎腧治勞疾羸痩體熱頸項强穴腦空治傷飽身黄羸痩穴章門治食不為肌膚穴漏谷治日漸羸瘦穴下脘治羸痩穴下脘胃腧脾腧下㢘治久勞法其狀手足心熱多盗汗精神困頓骨節疼寒欬𠻳漸吐濃血肌痩面黄减食少力令身正直用草一根男左女右自脚中指尖量過心下向上至曲䐐大横紋處截斷却将此草自鼻尖量從頭正中須分開頭心髪貼肉量至脊以草盡處用墨㸃記别用草一條令病人自撚合口量濶狹截斷却将此草於墨㸃上平摺兩頭盡處量穴灸時隨年多灸一壯如年三十灸三十一屢效羸痩固瘵疾自寒熱等症宜隨症醫治若素來清癯者非有疾也惟疾後痩甚久不復常謂之形脫與夫平昔充肥忽爾羸痩飲食减少者或有他疾乗之則難救療須辨之早而著艾可也然仲景論六極必曰精極令人氣少無力漸漸内虚身無澤潤翕翕羸痩眼無精光且云八味腎氣瘥六極而瘥五勞則是八味丸所當服仲景常服或常服去附子加五味子而腎腧等穴尤所當灸也治腹中氣脹引脊痛食多身羸痩名曰食晦先取脾腧後取季肋穴脾腧大腸腧治五臟六腑心腹滿腰背痛飲食吐逆寒熱往來小便不利羸痩少氣穴三焦腧灸隨年壯治勞瘵癸亥夜更六神皆聚之時觧去上體衣服於腰下兩傍微陷處謂之腰眼直身平立用筆㸃定然後上牀合面而卧每灼小艾炷七壯䖝或吐出或㵼下即安又法膏肓肺腧穴每穴各灸九壯乃依前虫醉日各穴腧多灸為妙後百日忌煎􅏼生冷熱物毒食仍戒房事避風寒减喜怒安心静處養息若一日猶覺未瘥於初穴上再灸治傅尸伏連殗殜骨蒸痃癖鬼氣惡寒或如瘧狀宜灸大椎上一穴又灸大椎兩傍近下少許對顴節間各相去一寸五分二穴又灸兩脇下二穴名章門又灸當心脊骨上兩傍各相去一寸二穴以上七穴日别灸皆取正午時灸各七壯滿百壯漸瘥至五百壯病除治骨蒸痃癖灸兩背井二穴若人面熱帯赤色者灸之即瘥取穴之法坐以手三指從􅈩骨罅向項筋上擦之中指下節是也上臁二穴在膝外下三寸是一云三里下三寸是下臁二穴在上臁下三寸是當心脊骨上平立以物拄地當心㸃起回量脊上㸃即是穴以上七穴灸之如前法治骨蒸痃癖令患者於板上平身正立以杖拄板向上度當臍㸃杖記之又回杖㸃之脊中又令患人合口兩吻當中折之以折處㸃灸又兩乳一大肋二穴總六穴灸之並如前法凡量皆取病者男左女右無名指中節屈之為寸又法取男左女右手中指以從指本量至指端仍將此度於脚跌上繋鞋處横紋當脛面上量一度是穴治𫝊尸殗殜喜魘夢穴商丘二穴灸七壯瘥乃止厲兊二穴灸一壯章門二穴灸三壯以上六穴商丘療多卧厲兊療嗜卧怠惰章門療賁豚氣脹治二十種骨蒸崔知悌曰骨蒸病者亦名傳尸亦謂殗殜亦稱伏連亦曰無辜丈夫以精為根女人以血為本無問老少多染此疾凡取四花穴以稻稈心量口縫如何濶斷其長多少以如此長裁紙四方當中剪小孔别用長稻踏脚下前取脚大指為止後取脚曲䐐横紋中為止斷了却還在結喉下垂向背後看稈止處以前小孔紙當中安分為四花葢灸紙四角也又一醫傳一法先横量口吻取長短以所量草數背上三椎骨下直量至草盡處兩頭筆㸃再量中指長短為凖却将量中指草横直量兩頭用筆圏四角為圏者是穴不圏不是穴可灸七七壯止王氏云三十日灸活十三人前後瘥者數踰二百非止单攻骨蒸别灸療氣療風或瘴或勞或邪或癖病狀既廣灸活者不可具錄灸後宜服治勞地黄丸良衞生寶鑑方云昔按察副使奥屯周卿子年二十三嵗至元戊寅三月間病發熱肌肉痩四肢困倦嗜卧盗汗大便溏多腸鳴不思飲食舌無味懶於語言時來時去約半載餘請予治之診其脉浮數按先無力正應王叔和浮脉歌云臓中積冷榮中熱欲得生精要補虗灸中脘乃胃之紀也引清氣上行肥腠理又灸氣海穴乃生發元氣滋榮百脉長養肌肉又灸三里乃胃之合穴亦助胃氣散上熱使下隂隂分以甘寒之劑㵼熱火佐以甘温養其中氣又食粳米羊肉之類固其胃氣戒以慎言語節飲食懲忿窒慾病氣日减數月氣得平復迨二年肥盛倍常或者曰世醫治虚勞病多用苦寒之劑君用甘寒之藥羊肉治發熱人皆忌之食羊肉粳米之類請詳析之予曰内經有云火位之主其㵼以甘藏氣法時論曰心若緩急食酸以收之甘以㵼之㵼熱補氣非甘寒不可若以苦寒以㵼其土使脾土愈虚邪火愈盛又云形不足者温之以氣氣不足者補之以味勞者温之損者益之十劑云補可以去弱人参羊肉之屬是也先師亦云人参能補氣虚羊肉能補血虚虚損之病食羊肉之類何不可之有哉治五勞七傷及山嵐瘴氣背􅈩煩重心痛注忤氣羸食不生肌膚寒熱邪頸項弱面色黒黄精神昏倦積年淋􅅹積癖鬼氣傳屍骨蒸等疾穴胃腧二穴灸七壯或至一百壯量病輕重加灸又穴腎腧二穴灸七七壯病深者日灸七壯至百壯住又章門二穴可灸七壯日灸漸至七七壯同前法又太衝二穴灸五壯漸加日灸如前法凡膏肓二穴令病人曲背伸兩臂著􅂰令直手大指臍膝以物拄肘勿令臂動從􅈩骨上角摩捺至􅈩骨下頭其間當有四肋三間灸中間依轉􅈩骨之裏去􅈩骨額側指許摩膂肉之表肋間灸處自覺牽引胸肩中灸兩􅈩骨肉各一處五百壯多至千壯氣下如水若有停痰宿水必有所下也灸法無所不治若病困即令側卧挽臂令前取穴或正坐伸臂令人挽之兩臂骨相遠不爾􅈩骨覆穴即難取也其穴近五顀相望求之又肝腧二穴在第六顀下兩傍各一寸五分日灸七壯病深者至百壯住又神堂穴在第五顀下兩傍各三寸陷中正坐取穴灸七壯至七七壯同前法以上七名總四穴若不能徧灸當取𦂳者灸之其緊者即膏肓胃腧章門腎腧太衝是也若能依次第灸之各滿百壯尤妙凡量穴不拘病人肥痩長短取病人男左女右中指度兩横紋為寸是為同身寸也凡灸皆取正午時佳若夜起空腹即傷人氣又令人血虚若日晚食後灸即病氣難除若至卒病風氣即不在此例夢遺失精治虚勞尿精夢泄資生經灸七椎兩傍各三十壮曲泉百壯治虚勞白濁泄精穴脾腧三焦腧腎腧章門各百壯治夢遺失精小便濁穴腎腧灸百壯治夢泄精及治失精隂縮穴中封灸百壯治男子夢與女人交泄精穴三隂交灸五十壯治隂痛溺血精出穴列缺灸五十壯治失精五臟虚怯穴曲骨端灸五十壯治失精隂縮莖痛穴大赫灸三十壯治失精􅂰脛痛冷穴曲泉灸百壯治腰脊冷疼溺濁穴脾募灸百壯治白濁漏精灸大椎骨龜尾骨并中間共三穴以䋲量大椎至龜尾骨折中取中間穴治精不足穴太衝中封地機治失精及小便不利穴中極蠡溝漏谷承扶至陰治失精小便淋瀝穴志室治失精溢䯒痠不能立足一寒一熱穴然谷治溺難白濁寒疝小腹腫穴行間治溺血便濁出精穴腎腧治夢失精穴膏肓腧治失精穴至隂曲泉中極治下腫失精穴志室治虚勞尿精泄精穴陽陰陵泉隨年壯或十椎或十九椎旁三十壯治失精及耳聾腰痛食少穴京門灸五十壯又十四椎百壯治失精穴中極治泄精灸三隂交七壯一云各二十一壮夢斷百日復五十壯一年無復有泄資生經云五臟論曰心有三孔藏精汁三合則人之遺漏其因於心乎心動則遺漏從之欲免此患要養其心使不動可也其次則邪念或起必須蚤養之至㳺居士云不愁念起只恐覺遲是也服藥鍼灸斯為下矣然猶愈於不為也消渴治煩中渴資生經穴商丘治消渴身熱面目黄穴意舍治消渇嗜飲穴然谷治飲渇穴隠白治苦渴食不下穴勞宫治寒熱渴穴曲池治嗌乾善渴穴兊端治腎虚消渇汗不出腰脊不得俛仰腹脹脇痛穴中膂腧意舍治舌縱煩滿消渴穴然谷治消渴飲水無度穴水溝治消渴穴陽綱治消渴嗜飲穴承漿意舍衝關然谷治消渴飲病兼身體疼痛穴隠白治消渴咽喉乾灸胃脘下腧三穴各百壯穴在背第八顀下横三寸間寸灸之又胸堂五十壯足太陽五十壯治病消渴