body:
  text: 普濟方卷二百十六明周王朱橚撰小便淋秘門小便難附論夫小便者此是腎膀胱氣故當以此二經為表裏俱主水行於小腸入胞為小便熱氣在於臟腑水氣則澁其熱勢為阻故小便難也診以尺脉浮小便難尺脉濡小便難尺脉緩小便難亦有餘瀝也方瞿麥散出聖惠方治心熱小便難赤澁痛瞿麥木通剉黄連防風茯神炙𤓰仁葳㽔川升麻地骨皮各一両葵子半合亁菊花半両右為粗散每分四服一錢一服水一盞煎六分去滓食前温服犀角散出聖惠方治膀胱積熱小便澁難犀角燈心各半両榆白皮剉赤茯苓子荆車前子川芒硝各半両木通一両滑石二両右為粗散每服四錢水一盞煎六分去滓食前温服以快利為度石韋散出聖惠方治小便難脬中有熱水道中痛石韋瞿麥各一両赤芍藥白茅根剉陳橘皮湯浸各二両右為散每服四錢水一盞煎六分去滓食前温服木通散出聖惠方治小便難澁痛所出不多令身體壯熱木通剉車前子石韋去毛瞿麥赤茯苓石鷰各一両右為細散每於食前以葱白湯調下二錢滑石散方見本門勞淋類治淋胞痛不得小便淋瀝湯治小便難滑石八両石韋三両榆皮葵子各一升通草四両右切以水一斗煮取三升分三服一方加黄芩三両石韋散治小便不利石韋去毛瞿麥穗冬葵子各二両滑石三両右為末每分三服一錢一服温水調下食前服治小便不利莖中痛出海上名方及治五淋用苦枤半両剉細用水一盞煎七分去滓食前温服一方為末用飯飲調下木通散方見本門小便出血類治小便難水道中痛小腸急治小便難脹滿悶不急療之殺人出十便方葱白三觔鹽二觔右相和研爛炒令熱以帛子裹分二包更替熨臍下小便立出陶効方出聖惠方治小便難秦艽二分冬𤓰子二両右為末酒服一七日三服神効治小便難小腸脹不急治殺人出本事方用葱白三觔細剉炒令熟以帕子裹作二處更熨臍下即通又方出聖惠方用秦芃一両去苖水一大盞煎七分去滓食前分二服瞿麥丸出金匱方治小便不利有水氣括蔞根二両大附子一箇茯苓山芋各三両瞿麥一分右杵羅蜜丸如梧桐子大一服三丸日三未知益至七八丸以小便利腹中温煖為止也木通散治小便不利莖中疼痛小腹脹痛治小便不利痛出海上名方海金沙滑石地遍竹各等分右為末每服二錢煎葱白湯調下金沙散出德生堂方治小便不出莖中有物塞硬疼痛甚至為急真琥珀海金沙各三錢麝香當門子一箇大者右為末每服二錢好酒調食前服燈心或萱草根熬湯調服亦可治小便不利莖中疼痛小腹急痛出聖惠方蒲黄滑石各等分右為散酒服方寸匕日三大驗滑石白魚散出金匱方治小便不利滑石亂髪燒灰白魚各二分右為散飲服半錢七日三服茯苓戎鹽湯出金匱方治小便不利茯苓半觔白术二両戎鹽大枚右為末白湯調服治小便不快出神効方没藥木香當歸右為末以刺薊心自然汁為丸梧桐子大服五七丸食前鹽湯送下治小便不快小便不快為何縁不用針醫用藥飡扁蓄水煎連口嚥神仙聖德不虛傳八味丸出妙意方治淋是小便㸃滴來時多疼是心與小腸両經病有熱有冷有腎虛氣虛熱者利小便藥中加涼劑冷者利小便藥中加熱劑虛者補腎藥中加通利小便牡丹皮茯苓澤㵼各三両山茱萸山藥各四両附子桂各二両熟地黄右末蜜丸如梧桐子大每服十五丸酒温調空心日二服清肺飲子出誠効方治渇而小便不利邪熱在上焦氣分也茯芩去皮二錢猪苓去皮三錢澤㵼五分琥珀半分燈心一分木通七分通草三分車前子一錢瞿麥半分萹蓄七分右為細末每服五錢水一盞半煎至一盞稍熱或作㕮咀煎服之亦可此証局方人正散仲景五苓散宜服之胃苓湯出如意方治沉冷小便不利及胃虛不和早辰心腹痛胃平散末五苓散各等分右沸湯調服如胃冷者服五積散治忍小便胞轉出本草自取木甲燒灰水服治忍小便乆致胞轉出本草以黄絹裹腰腎令頭致地三度通治男子婦人過忍小便胞轉用滑石末葱湯調下二錢小便不通附論夫小便不通由膀胱與腎俱有熱故腎主水膀胱主津液之腑此二經為表裏而水行於小腸入胞者為小便腎與膀胱熱熱入於胞熱氣大盛故結澁令小便不通小腹脹氣急甚者水氣上逆令心急腹滿乃至於死診其脉𦂳而滑直者不得小便也方通關瞿麥湯治膀胱積熱小便不通瞿麥穗芍藥大黄當歸葵子甘草白榆皮梔子仁木通石韋大麻仁各一両右粗搗篩每服五錢水一盞半燈心少許煎至一盞去滓温服石韋湯治膀胱藴熱小便不通石韋瞿麥穗木通剉葛根剉麥門冬黄芩赤茯苓冬葵子生亁地黄滑石各一両甘草半両右搗篩每服五錢水一盞半煎八分去滓空心頓服蒲黄湯治心腎有熱小便不通赤茯苓木通車前子桑白皮荆芥燈心赤芍藥甘草微炙生蒲黄滑石各等分右為末每服二錢葱頭一片紫蘇五葉煎湯調下透水散治水腸不通腸腹急滿瞿麥川大黄剉碎微炒川硝檳榔各一両陳橘皮湯浸去白木通剉各三分石韋三両牽牛子微炒滑石各半両右為粗末散每服四錢水一盞煎六分去滓食前温服治下冷小便不通方茯苓二分大黄六分芍藥當歸枳實白术人参各三分大麻仁四分右切以水六升煮取二升去滓分温三服要着芒硝亦得忌酢物桃李雀肉等治小便不通數日欲死神驗桃枝柳枝木通剉漢柳旱蓮子白礬各一両葱白一握燈心二十莖右為細剉以水三升煮取一升用瓷瓶一所熱盛一半藥汗熏外腎週廻以被圍繞輙不得外風入良乆便通如赤豆汁若冷即換之其切甚大一方無旱蓮子海蛤丸治小便不通臍間窘急三焦積熱氣不得通海蛤細研滑石各二両葵子蒲黄車前子各一両木通赤茯苓赤芍藥各半両右為末煉蜜和搗三二百杵丸如梧桐子大每服於食前葱白湯下二十丸鷄蘇散治小便不通心腹妨悶上氣喘急坐卧不安鷄蘇滑石葵子瞿麥防葵桑根白皮剉榆白皮剉各一両甘遂半両煨令黄右為粗散每服三錢水一盞煎六分去滓食前温服滑石散治膀胱熱小便不通舌亁咽腫滑石碎桑螵蛸炒桂去粗皮大黄各半両防己黄苓瞿麥穗各三分木香右為散每服二錢煎木通湯調下治小腸結澁不通心煩悶亂坐卧不安小豆葉苦竹鬚粟奴甘草各一分燈心二十莖銅錢七文葱白五寸右為散每水二大盞煎一盞三分去滓食前分三服硝石湯治小便不通小腹急痛悶絶硝石碎瞿麥穗葵子滑石甘草炙剉大黄剉木通各半両右搗篩每服五錢水一盞半葱白三寸煎七分入生地黄汁半合不拘時服鷄蘇飲治小便不通鷄蘇一握石韋三分冬葵子一両杏仁滑石各一両半木通生地黄各三両右剉如麻豆大以水十二盞煎四盞去滓分温四服如人行四五里未通再服療下淋小便不通來六七日方滑石五両通草三両瞿麥二両冬葵子一両茅根一升芒硝二両石韋三両右切以水九升煮取二升八合去滓内芒硝分温服三帖每服如人行六七里進一服以微利為度忌諸熱食物治下淋疼小便不通方冬葵子滑石各五両通草茯苓各三両茅根四両芒硝二両湯成下右切以水九升煮去滓内芒硝分三服温服如人行六七里忌炙肉熱食醋蒜等物大黄丸出聖惠方治小腸熱結脹滿小便不通川大黄剉碎大㦸剉碎赤芍藥川硝甜葶藶隔紙炒令各一両杏仁五十枚去皮右為末煉蜜和搗三二百杵丸如梧桐子大每於食前以葱白湯下二十丸治尿哽大小便哽淡竹葉陳皮燈心數珠子甘草各等分右用水二碗煎一碗服之立効宣氣散出濟生方治水便不通臍腹急痛甘草本通各三錢梔子二錢葵子滑石各一錢右為末每服半錢燈心湯調下玉蕊丸治小便不通氣上衝心胸滿悶丹砂研硇砂研滑石研瞿麥穗海金沙各一両右研為末别研箆麻子仁丸如梧桐子大每服十丸十五丸葱白煎湯酒下小兒减丸數服葵子散治小便不通木通剉冬葵子甘遂瞿麥穗各半両細炒滑石二錢右搗篩每服二錢水一盞入燈心同煎七分扣滓過服未通再服瞿麥湯治小便不通瞿麥穗滑石木通剉各半両海金沙一分冬葵子一分右搗篩每服五錢水一盞半燈心二十莖煎七分去滓温服不拘時立應散一名車前子散方見膀胱門膀胱執實類治膀胱熱結小便不通海蛤散出聖惠方治小腸壅熱小便赤澁瀝疼痛不通海蛤一両白鹽一分炒石鷰魚腦中石子各半両為細末散入乳鉢中研令極細每服葱白五莖切甘草二寸生用剉用水一鍾煎六分去滓調下散食前頻服即通葱白湯出指南方治卒暴小便不通臍腹膨急氣上冲心悶絶欲死橘皮一方作三両葵子一方作一両葱白二莖石韋右等分每服五錢用水二盞煎一盞去滓服之一方無石韋一方㸃臈茶一盞生油三両滴攪勻服亦妙松烟散治小便不通墨半盞酒半盞葱白五莖拍破膩研半錢右同煎七分放温去葱白頻服即通防己散治膀胱積熱小便不通防己一両海蛤滑石木香各半両右為散每服二錢水濃煎木通湯調下茯苓散治小便不通赤茯苓去黑皮白芍藥瞿麥穗各一両白术三分右搗篩每服五錢水一盞半入葱白五寸生薑一分拍碎同煎七分去滓食前温服木通湯治小便不通木通石韋去毛瞿麥穗各二両冬葵子一升右剉如麻豆大以水十盞煎三盞去滓入滑石末一両分温三服微利為度滑石丸治小便不通或淋瀝疼痛滑石碎續隨子去皮濕生蟲炒亁木通各一分右為末麵糊為丸如梧桐子大每服五丸燈心湯調下不拘時服治小便不通出聖惠方桑白皮猪苓去皮通草各二両一方作木通右切以水六升煎取二升分三服又方葱白䃼硝明礬右搗爛帖臍中立効方出聖惠方治小便不通燈心二錢生薑黑松各半両右為末用井花水一大盞煎五分去滓以葱一枝漫火燒酒熱拍破先安在臍中後頻服其藥又方出聖惠方蛤粉麻根各半両右為末散每服於空心以新汲水調下二錢葵子湯出聖惠方治小便淋澁不通冬葵子一合䃼硝半錢右同研匀以水三盞煎葵子一盞半去滓下朴硝空心服分二服治小便不通腹脹氣忽悶出聖惠方小麥二合滑石三分生薑半両右以水一大盞半煎小麥生薑取一盞去滓分三服調滑石末服之又方出聖惠方瞿麥一両剉甜葶藶半両炒甘草一分炙剉右為粗散水一盞半煎一盞去滓食前分三服利氣散出危氏方治老人氣虛小便閉塞不通綿黄蓍去蘆陳皮去皮甘草各等分右剉散每服三錢水一盞煎服自然流通治小便不通出千金方滑石三両葵子榆白皮各一両右為散煮麻子汁一升半取一升以散二服方寸匕和匀三服即通木通散出嚴氏濟生方治小便不通小便腹痛不可忍木通滑石各一両黑牽牛頭末半両右㕮咀每服一錢水半盞燈心十莖葱白一寸煎三分食煎温服蘹香子散治小便不通蘹香子炒馬藺花炒葶藶紙上炒各等分右為散每服二錢温酒調下食前服以通為度滑石散治小便卒不通滑石碎朴硝研木通各一両剉右調為散温水調下每服二錢不拘時服以通為度獨蒜塗臍腹方治小便不通梔子仁二七枚鹽花少許獨顆蒜一枚右爛搗攤紙花於上貼臍良久即通塗陰囊上立通葵子根飲治小腸積熱小便不通葵根一大握胡荽二両滑石一両為末右細剉以水二升煎取一升入滑石末温分三服亦治血淋治淋及小便卒不通出本草以龍鬚草席彌敗有垢者佳取方寸尺煮汁服之治小便不通十便良方􅅾莪茂剉炒蘹香子炒茶葉各半両右為散每服三錢水一盞鹽二錢葱白二寸煎六分和滓空心服療淋不通方滑石海蛤鷄子殻各等分右為散以米飲服半錢日三服漸加至一錢甚良治小便不通腹脹