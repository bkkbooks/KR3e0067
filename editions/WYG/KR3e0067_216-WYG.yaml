淋方取絲子以水煮服之可常作飲勿歇也又方取露􅉕房燒灰飲服之取碗大者妙又方取鷄子二枚去白黄以鹽内殻中使滿以水三升瀆一升絞取汁其殻中鹽投汁中攪令調盡服之療淋不通方取地麥草一名地膚草一把以水二升煎之亦可常服一法但漬䜴汁飲之良琥珀丸以神祐丸加琥珀一両是也治小便不通以五苓散加滑石末木通燈草煎湯調下八正散治心經邪熱小便赤澁不通用八正散加燈心枳殻車前子地膚草煎服並加半錢五苓散治小便不通壅上心滿用五苓散加燈心十根車前子二両煎湯調下通心散治心經有熱唇焦面赤發熱小便不通用通心散每服四錢水一盞半燈心十根滑石末一錢麥冬二十粒桑白皮七寸煎去滓再入生車前子汁合攪匀八味丸出危氏方治腎虛小便秘澁不通或過服凉藥者用八味丸每服五十丸温鹽湯下立効八味丸方見本門小便難類尊氣除燥湯出東坦先生蘭室秘藏方治小便閉塞不通及血澁盖氣不通而竅澁也知母細剉酒洗二錢黄栢去皮酒洗四両滑石三錢炒黄細末澤㵼三錢細末茯苓去皮二錢細末右件和匀服秤半両水三盞煎一盞去滓稍熱服空心如小便閉急不拘時服通關散出東坦先生蘭室秘藏方治不渇而小便閉熱在血方知母二両黄栢酒洗二両桂二錢為引用右件為細末煎熱水為丸如鷄頭大每服百餘丸或二百丸熱百沸湯下空心宿食消盡服之藥易下行故也如利時前隂中如刀刺之痛有惡物下為効亦或有無時神品藥也紅秫散出朱氏急驗方治小便不通上喘紅秫黍根二両萹蓄一両半燈草一百根右㕮咀每服五錢用河水二盞煎至七分去滓温服空心食前琥珀散出朱氏急驗方治老小便不通琥珀研如粉不拘多少右蜜為丸如梧桐子大每服十丸煎赤茯苓湯下甚者加丸數立通如小便純血只以末二錢煎燈心湯下治小老人小便不通出朱氏急驗方茴香白頸地龍右杵汁傾腦腸中即愈車前散楊氏家藏方除下焦留熱小便不通淋澁作痛已下小便檳榔木通陳橘皮赤芍藥滑石車前子赤茯苓當歸石韋炙去毛丸味各一両右件㕮咀每服五錢水二盞煎至一盞去滓食前服以利為度未利再服聖餅子出楊氏家藏方治小便不通黄連巴豆半両去殻不去汁右件同搗為膏捻作餅子大人厚薄如錢先以葱汁拌鹽滴在臍内次以餅子盖之上用大艾炷於餅上灸二七壯再換餅子重灸以利為度礬石散出聖氏家藏方治小便不通臍腹急脹白礬不用炙少研細右用水和麵捻作圏子圍臍腹高一寸許内安礬末以冷水逐漸滳礬末上令濕透更以水滴覺内冷透即小便通葵子方出鮑氏方治小便不通小腹脹不治害人葵子車前子白术木通赤芍藥各等分右末米飲下二錢以葱白細剉炒熱両帕包更熨小腹立便葵子散出宣明論方治小便不通葵子茯苓去皮各半両右為末每服四錢水一盞煎三沸食前服蒻葉散出指南方治小便先澁後不通亁蒻葉燒灰滑石半両右為細末每服三錢七米飲調下空心黄芩清肺湯出衛生寳鑑治因肺燥而得之小便不通黄芩山梔子仁擊破右都作一服水一盞半煎至一盞去滓温服食後如不利再一服之又不利加鹽䜴二十粒治小便不利臍下滿硬語言塞渫腰痛脚重不能立足也宜用後方出葉陀中藏經方瞿麥頭子一両官桂一分甘遂三分車前子一両炒右為末獖猪肝一箇去筋膜薄批開入藥末二錢匀裝濕紙包煨熟空心嚼服酒送下以大便為度小便未利臍腹未軟更服後方用葱白一寸去心入硇砂一錢安葱心中両頭以綿紙濕包煨熟冷醇酒送下空心服以効為度療關膈大小便不通脹滿欲死三日則殺人用芒硝二両紙裹三四重炭火燒之令内一升湯中盡服當先飲湯一升已吐出乃服之療小便不通出本草用滑石末一升以車前汁和塗臍四畔方四寸熱即易之冬月水和亦得治淋及小便卒不通出本草以龍鬚草席彌敗有垢者佳取方寸尺煮汁服之治小便不通及忍小便乆致胞轉出本草取梁上塵三指撮以水服之治小便不通出本草用苦𤓰煮汁漬陰括藪瞿麥丸方見本門小便難類治小便不利者有水氣紫草散出保生方治小便澁淋不通用紫草三分搗為散和井花水一盞半頓服治小便澁少用馬齒莧和少粳米醬汁煮食立瘥治小便溺不通右用皂角燒灰水調下一錢二錢立愈治秘澁不通右用葱一根略去鬚剜一小孔子入不蛀皂角末一匙内之候腹鳴三両次立隨通大妙小便利多附論夫腎者主水膀胱為府令腎氣傷不足膀胱有寒不能約制水液合津滑氣虛故小便利多久不差者則腎氣傷虧真陽耗損腰脊痠疼身體寒顫羸乏病生小便頻數者膀胱與腎俱虛而有客熱乗之故也腎與膀膀為表裏俱主水腎氣不通於陰此經既虛致受於客熱虛則不能制水故令數小便熱則水行澁澁則小便不快故令數起也診其脉趺陽脉數胃中有熱即消榖引食大便必鞭小便則數方覆盆子丸治元藏虛弱臍腹病痛膝脛少力百節痠疼昏倦多睡小便頻濁頭旋痰延背脊拘急飲食無味温順藏氣補益下元覆盆子肉蓯蓉酒浸切焙黄蓍五味子補骨脂烏藥石斛去根澤瀉篳澄茄沉香剉巴㦸尖一両熟地黄一両半芎藭當歸赤芍藥山茱根三分菟絲子酒浸三日搗焙二両右為末煉蜜和丸如梧桐子大每服二十丸食前温酒下米飲鹽湯亦得山茱萸丸治腎藏虛憊腰膝無力小便利多山茱萸山芋覆盆子菟絲子酒浸一宿搗焙巴㦸尖去心人参楮實五味子一両半草蔛牛膝酒浸桂天雄去皮胸各一両熟亁地黄二両半右為末煉宻和搗五百杵丸梧桐子大每三十丸空心食前酒下附子湯治腎氣虛寒小便滑數白术附子炮製去皮亁薑炮桂赤石脂一両右為末每服一錢空心生薑湯調下日進二服沉香蓯蓉煎丸因真氣虛臍腹疼痛臟腑不調小便滑數沉香五味子鷄頭實桑螵蛸金櫻子薰草鹿茸菟絲子牛膝肉蓯蓉附子右為末先將肉蓯蓉末以好酒一升慢火熬煎和前藥丸如梧桐子大每服三十丸空心食前生薑鹽湯温酒下亦可服沉香丸治下經虛寒小便滑數不欲食飲腹脇脹滿或時疼痛補益沉香丸訶梨勒皮人参赤茯苓蓽撥肉豆䓻仁亁薑胡椒葫蘆巴桂右為末煉蜜和丸如梧桐子大每服三十丸加至三十丸空心食前温鹽湯下木香湯亦可黄蓍丸治小利飲水多者又非淋疾黄蓍土𤓰根亁薑菝葜漏蘆地骨皮括藪根桑螵蛸右藥為末以濕紙裹粟米飯於煻火内燒過和搗令匀丸如桐子大每服二十丸微温牛乳汁下早晩両服漸加至三十丸多飲乳汁為妙八味補骨脂丸治小便滑石淋補骨脂炒巴㦸天去心桑螵蛸炒菟絲子酒浸三日别搗牛膝酒浸切焙熟亁地黄焙一両亁薑炮半両枳殻麩炒去穰三分右為末酒煮麵糊為丸如梧桐子大每服二十丸空心食前温酒下粟米飲亦得阿膠湯治腎虛小便多阿膠炙令燥别搗末人参各一両亁薑炮二両逺志去心四両甘草炙剉三両大麻仁爛研一升附子一枚炮製去皮臍右搗篩五味與麻仁拌匀每服六錢水二盞煎一盞去滓入阿膠末半錢更煎二沸食前温服日三正氣丸治下元虛冷少腹疼脹小便滑數婦人血海虛冷經候不調棟實麩炒蒼术米甘浸蘹香子各一両石菖蒲半両蜀椒一両知母焙半両附子炮製去皮右為末醋煮麵糊和丸如梧桐子大每服三十丸空心食前温酒下婦人醋湯下蓯蓉牛膝丸補益下元壯强真氣膀胱虛冷小便頻數肉蓯蓉牛膝補骨脂俱酒浸一宿炒巴㦸天去心羌活去蘆頭附子去皮蜀椒各一両右為末用豶猪腎一隻去筋膜細切研爛取汁牛膝酒同麵煮糊和丸如梧桐子大每服三十丸空心臨睡温酒下内篵蓉丸治膀胱久冷小便數洩精不止草薢龍骨煆醋淬山茱萸各一両補骨脂肉蓯蓉酒浸鹿茸去毛附子去皮各二両右為末煉蜜和丸如梧桐子大每服三十丸薑湯下空心食前各一服白术散治元藏虛冷腹内雷鳴夜多小便白术二両芍藥厚朴去粗皮薑汁呉茱萸湯浸培亁陳橘皮湯浸細辛各一両右為散每服二錢入鹽沸湯㸃服烏术丸補水臟壯筯骨止小便腹中雷鳴臍下疝撮疼痛蒼术東流水浸十日焙半觔蜀椒口開者燒磚令紅以醋潑磚安椒盖出汗取紅用烏頭米甘浸五日青橘皮湯浸各三両青鹽一両研右為末與鹽拌匀煉蜜和丸搗一千杵丸如梧桐子大每服二十丸空心食前鹽酒下厚朴湯治小腸虛冷臍下急痛小便滑數厚朴去粗皮薑汁炙一両半附子炮製去皮臍芎藭各三分白龍骨當歸切焙各一両右㕮咀如麻豆毎服三錢水一盞入生薑三片棗二枚擘破煎七分去滓食前温服五味補骨脂丸治小便利多補骨脂炒研五両附子去皮桂去粗皮各二両胡桃仁湯去皮膜研三両安息香二両酒化濾去滓熬成膏右搗羅二味為末與補骨脂胡桃仁合研匀用安息香膏和搗千杵丸如梧桐子大每服二十丸空心食前温酒下鹽湯亦得加至三十丸牡蠣丸治膀胱虚寒小便數牡蠣火煆獨沽去蘆頭狗脊去毛各三分龍骨半両肉蓯蓉酒浸焙一両右為末煉蜜和丸梧桐子大每服三十丸空心食前鹽湯下近効方治小便多漸消瘦生枸杞根切一升生麥門冬三両去心黄連二両小麥八合人参一両右切以水九升煮取三升八合去滓分為三服間食服之石菖蒲治小便數滑腰膝少力石菖蒲肉蓯蓉附子蜀椒右為末酒煮麵糊和丸如梧桐子大每服二十丸加至三十丸空心食前温酒下鹽湯亦得呉茱萸丸治小便多利呉茱萸蜀椒亁薑右為末用亁蒸餅為末入水内拌匀和搗熟丸如菉豆大每服十丸加至二十丸空心鹽湯下雄黄丸治小便滑數雄黄亁薑右為末酒煮麵糊和丸如梧桐子大每服二十丸加至三十丸空心酒温下糯米餈方治小便夜多及引飲不止用純糯米餈一手大臨卧炙令輭熟啖之以温酒送下不飲酒人温湯下多啖彌佳行坐良久待心空便卧一夜十飲行者服之即止或言假火氣温水道不然也大抵糯稻主縮水凡人飲夜酒者夜輙不溺此糯米之力也昔劉正夫罷宦門中次建溪嘗扣一大家求舍輙閉門不納既而使人來謝因遇有父有疾不能延客劉客其莊曰病渇殆死矣劉許為其營藥俄而暮子弟羣至求治其父之疾劉燒藥與之明日來謝云飲藥之一杯是夜啜水减七八升其方用糯稻稈斬去穗及根取其中心净器中燒作灰每用一合許湯一碗沃浸良久澄去滓甞其味如薄灰汁乘渇頓飲之此亦糯稻縮水之一驗也又方用茴香不拘多少淘浄入少鹽炒為末如前炙糯米糍蘸喫或用豶豬胞盛以糯米煮爛或入椒鹽少許同煎去糯米只用胞切片蘸藥或更飲好酒半杯臨卧各一服尤妙治老人夜起方用破故紙同糯米煮粥臨卧食之紫金丸治元氣虛冷小便頓滑腰􅆃疼痛益氣沉香木香肉豆䓻仁芎藭没藥烏藥蓽澄茄檀香檳榔蘹香子腽肭臍麝香桂丹砂蘇合香右除蘇合香外搗研為末和酒煮麵糊為丸如桐子大每服二十丸加至三十丸食前温酒下米飲亦得赤小豆方治小便數用赤小豆葉一片入於䜴汁中煮調和作􅅅食煮粥亦得一方單用小豆葉搗取汁空腹一小盞止小便利用桑螵蛸火炮令熱空心服之虛而小便利加而用之治渇小便利非淋方用榆皮二片去黑皮以水一斗煮取五升一合三服牡蠣散治不渇而小便大利以蠣末取患人小便煎服猪肚丸出經驗良方治小便頻數猪肚一箇連子一升同煎一週日亁為末去皮心母丁香川練子破故紙舶上茴香各一両右為末煉蜜丸每服五十丸空心温酒送下棘刺丸治男子百病小便過多失精棘刺芮石龍芮巴㦸天各二両厚朴麥門冬菟絲子萆薢一方作草雖萎蕤栢子仁亁地黄小萆細辛杜仲牛膝蓯蓉石斛桂心防葵各一両烏頭半両右為末蜜和更搗五六千杵丸如梧桐子大飲下十丸日二加至三十丸以知為度黄蓍丸出聖惠方治小便頓數此病有両種一者小便多而渇飲食漸加至肌肉漸减乏氣力少顔色此是消渇一者小便難數而不至多又不渇食飲亦不異常或不至多能食但稍遇天寒冷即小便多更無别候此是虛冷所至大都両種俱原腎氣膀胱冷渇不瘥便能殺人腎虛腰冷無所為害若候知是消歇小便數宜服後項等藥煎次服之黄蓍黄連去須土𤓰根各五両𤣥参六両括􅌣一方用根地骨皮龍骨菝葜鹿茸炙各四両牡蠣熬人参桑螵蛸炙各三両五味子一升右為末煉蜜和丸用後竹根飲下之初服十五丸日二服稍加至三十丸如梧桐子大忌諸肉冷水又竹根飲子筯竹根生茅根蘆根各切五升菝葜切三升石膏一觔杵碎烏梅五十顆生薑切一升竹瀝二升白蜜一升右以水五斗煮取一斗去滓内竹瀝及蜜著不津瓶貯之物下煎丸縱不下丸但覺口亁及渇即飲之不限多少冷煖及前後如熱月即逐日斟酌煎之頓煮恐壞也如不能作此飲且用烏牛乳下丸渇日服丸及飲夜中恐虛熱宜合後小麥麵等十四味煎細細含嚥之又小麥麵方用小麥麵五升水硬搜之别於水中揉挺令麵粉盡麵節别成一塊即止以此麵粉汁別器澄停瀝却汁清即以稠粉盛於練袋子中漉著令微生燥生葛根五挺徑三寸長二尺搥碎於水中揉挺令䒴根中粉汁盡别器澄停戒貯一如小麥麵法生括􅌣五升搗如上法胡麻三升去皮熬令熟為散筯竹根一觔生茅根切一觔生蘆根切一觔烏梅五十顆以上用水五斗緩火煎取一升半去滓澄取清冬𤓰汁二升生麥門冬汁三升生薑汁一升牛乳一升白蜜二升先取竹根等汁和冬𤓰汁以下汁微火上煎减半次内乳牛白蜜又煎六七沸投小麥麵粉生葛粉括􅌣胡麻散於諸汁中和熟攪之勿住手候如稠糖即成成訖止火待冷貯别器中每夜含如此初服一棗大稍稍加至一匙亦任性日日含之欲作丸飲亦得茸香丸出直指方治下焦虚冷尿多或虛勞遺尿或欲出而不禁鹿茸酥炙肉蓯蓉酒浸當歸各半両龍骨牡蠣灰赤石脂川白薑益智仁巴㦸乳香禹餘糧煆醋淬碎為度研細以上各二錢半鷄内金七錢半右為末糯米糊丸桐子大每服七十丸空心鹽湯下山茱萸散出聖惠方治小便數日夜無時山茱萸一両赤石脂肉蓯蓉酒浸一宿刮去粗皮炙亁各二両萆薢牛膝去苖狗脊牡蠣燒為粉黄蓍木𤓰根各一両右為散每服四錢水一盞煎六分去滓每於食前温服熟地黄丸出聖惠方治便數飲水多熟亁地黄土𤓰根黄蓍菝葜漏蘆地骨皮剉各一両􅌝􅌣根龍骨桑螵蛸一両右為末煉蜜和搗三二百杵丸如梧桐子大每服食前以蜜下三十丸亦宜常服牛馬乳妙桑螵蛸散出經驗良方治男子小便頓數稠米泔色此由勞心腎得之有服此藥不中劑而愈大能安神定志桑螵蛸鹽水炙逺志去心菖蒲鹽炙龍骨人参茯神當歸龞甲醋炙各等分一作罷甲右為末每服二錢臨卧時人参湯調服莬絲子丸出危氏方治小便多或不禁莬絲子淘净油烹焙二両牡蠣煆取粉一両肉蓯蓉酒浸二両五味子一両附子炮去皮一両鷄肶胵半両鹿茸一両桑螵蛸酒浸半両右為末酒糊為丸如梧桐子大每服七十丸食前鹽湯酒任下菝葜飲出聖惠方方見本門治腎虛客熱小便數多鷄肶胵丸出聖惠方治小便多數鷄肶胵二両黄蓍龍骨黄連去鬚麥門冬去心熟亁地黄各一両土𤓰根半両右為末煉蜜和搗二三百下丸如梧桐子大每於食前以粥飲下三十丸地骨皮飲子出聖惠方治腎中虛熱雖能食小便數多漸加瘦弱地骨皮三両生亁地黄人参白龍骨黄蓍各一両麥門冬去心二両右細研和匀每服半両以水一大盞入生薑半分小麥半合煎治五分去滓每食前温服黄連丸出聖惠方治小便數而多亦治熱淋黄連苦参麥門冬土𤓰根龍膽右搗篩以蜜丸如梧桐子大每服十丸加至二十丸熟水下良一方無苦参有黄芩又方瞿麥葵子滑石黄苓甘草右切以水六升煮取三升去滓一服六合川方五子丸治小便夜多脚弱老人虛人有此證令人卒死大能耗人精液頭昏不爽莬絲子家韮子益知子茴香蛇床子右等分為末酒糊丸如梧桐子大每服五十七丸糯米飲鹽湯任下龍骨散治小便數而多龍骨桑螵蛸􅌝􅌣根黄連右為散每服於食前以粥飲調二錢鷄肶胵丸出聖藏經驗方治小便多及遺尿鷄肶胵一両燒灰存性益知子一両石菖蒲一両鷄腸一副焙亁右為末酒糊為丸如梧桐子大每服五十丸酒吞下食前服經驗方陳氏云昔先公晩年小水多呉興醫者鍾將任獻此方用之有効治小便多滑數不禁方出儒門事親書白茯苓去黒皮亁山藥去皮白礬水内湛過慢火焙亁各等分右為末稀米飲調下服之治小便數而多方括􅌣一錢黄連五分右為散每服方寸日三良米飲調服治小便頻滑數不禁方出神効方知母黄蘖各等分右剉碎酒浸透炒微黄為末水丸桐子大如服藥前一日休喫夜飲來日空心立服米飲湯下一百丸只服効後喫淡白粥一傾縮泉丸出危氏方治脬氣不足小便頻數天台烏藥益智仁各等分右為末酒煮山藥末糊丸如梧桐子大每服七十丸臨卧用鹽酒送下治小便多數用半夏生薑煎為熟水時呷之盖半夏益脾土克水故也治小便利用鷄腸草一觔於䜴汁中煮調和作􅅅食之粥亦得治膏癉其人飲少小便多用秦椒一分出汁𤓰蒂二分末水服方寸匕日三服治小便多滑數不禁出儒門事親書用金剛骨末以好酒下調三錢服之益智丸出存仁方治心腎不足夜多小便眼見黑花極有神効用益智仁四両以鹽二両同炒為末糊丸如梧桐子大每服三十丸用白茯苓甘草煎湯吞服煎服亦得空心食前服萆薢丸出危氏方治小便頻數日夜無時川萆薢洗不拘多少為末酒和丸如梧桐子大每服七十丸空心食前用鹽湯鹽酒任下治小便數氣少走㵼用香附子為末湯酒任下治小便數多或熱痛酸楚手足煩疼用地膚子三両水四升煎取二升半分作三服治小便數多用胡桃肉一升細米煮粥一升和匀頓服即瘥一方便火炮熟温酒同嚼卧下治小腸虛冷出聖惠方用鷄腸一具治如常法作臛煖酒和飲之一方漿水向北斗服之治尿數而多者方用羊肺一具作􅅅内少羊肉和鹽豉如食法任性食之不過三具効治小便數而多方以桃仁一味㕮咀酒一升煮三沸去滓分為三服强人一服盡之療小便卒大數作淋令人瘦葛洪後方用石膏半觔搗碎水一斗煮取五升稍飲五合治日夜小便頻數出鄭氏家傳渇酒方鹿茸一對酥炙右為末每服二錢空心温酒下日三服萆薢丸大益腎氣能治小便頻數萆薢莬絲子白茯苓鹿茸肉蓯蓉黄蓍川巴㦸杜仲金毛狗􅆃益智仁右為末酒糊丸如梧桐子大每服四十丸鹽水飲之人参鹿茸丸治勞心過度心腎不足所以小便頓數津液隨下虛損食少虛煩攻下人参白子仁赤石脂川續斷鹿茸大當歸白茯苓酸棗仁伐赭萆薢亁連肉山藥天麻仁桑寄生右為末煉蜜丸如梧桐子大每服硃砂為衣蓮肉去皮心煎湯早晩進三十四丸水芝丸治下焦真氣虛弱小便頓多日夜無度連實右為細末醋糊為丸如鷄頭大每服五十丸酒温送下食前得之鹿角散出十便良方腎消夜尿七八升用鹿角一具炙令焦搗篩酒服方寸漸加至一半縮泉丸出朱氏集驗方治丈夫小便頻數烏藥益智川椒去目合口者出汗呉茱萸九蒸九煨右等分酒糊丸梧桐子大每服五十丸臨卧湯下雙白丸出朱氏集驗方白茯苓去皮鹿角霜右等分細末酒糊丸梧桐子大每服三十丸空心鹽湯下此二方梁氏總要本又方右䜴一升内於鹽中綿裹之以白礬好者半觔致綿上令蒸之一㪷米許時即下白礬得逍入䜴中出暴乾搗末每服方寸一方出鮑氏方以真龍骨白术酒下二錢末利小便出本草以烏犍牛尿半觔空心飲之止小便滑數出本草以烏藥葉及根嫩時採作茶片炙碾煎服之治腹冷夜起出本草以白荆子一升炒熟勿令焦細研以湯浸蒸餅丸如赤小豆大薑湯吞七丸甚効縮小便出本草以顆塊雄黄一兩半研如粉乾薑半兩切碎入鹽四大錢同炒令亁薑色黄同為末蒸餅入水為丸如菉豆大每服十九至二十丸空心鹽湯送下治小便數出本草以羊肥肚作羮食三五度瘥治下氣利小便用麻子炒令香搗碎以小便浸取汁服之今人續布者麻子也治腹冷夜起用象牙末燒灰米飲之治小便白數陽道乏者用牛領藤煮汁酒服之導引法養生方導引法云以両踵布膝除數尿小便遺失附論夫人之遺尿為心腎二氣之所傳送盖心與小腸為表裏腎與膀胱為表裏若心腎氣虧陽氣衰冷傳送失度則必有遺尿失禁之患故經云膀胱不利為癃不約為遺是也治之宜補煖下元清心寡慾又有産蓐不順致傷膀胱及小兒胞冷俱能令人遺尿失禁又當隨証施治診其脉來過寸口入魚遺尿肝脉微滑遺亦尿左手關上脉沉為陰絶者無肝脉也若遺尿尺脉實少腹牢痛小便不禁尺中虛小便不楚腎病小便不禁腎病脉當沈滑而反浮大其色當黒反黄此土之克水為逆不治内經言膀胱不約為遺縁其腎虛不能約束水液故小便多甚則下焦傷竭真氣不固而小便不禁也夫人有於眠睡不覺尿出者是其禀質陰氣偏甚陽氣偏虛則膀胱腎氣俱冷不能温制於水則小便多或不禁而遺尿膀胱足太陽也為腎之府腎為足少陰為臟與膀胱合俱水主凢人之隂陽日入而陽氣盡則隂氣受至夜半陰陽大會氣交則睡卧小便者水液之餘也從膀胱入於脬為小便夜卧則陽氣衰伏不能制於陰所以陰氣獨盛水下不禁故於眠卧而不覺尿出也方家韮子丸出三因方治小腸遺尿及男子虛劇陽氣衰敗小便白濁夜夢洩精此藥補元養氣進美飲食家韮子六兩鹿茸四兩蓯蓉酒浸牛膝酒浸熟地黄當歸各二兩巴㦸去心莵絲子酒浸各一兩半杜仲去皮石斛去苗桂心亁薑炮各一両右為末酒糊丸桐子大每服五十丸加至百丸空心食前鹽湯酒下小兒遺尿多因服寒亦禀受陽氣不足别作小服丸澤㵼散出聖惠方治遺尿小便澁澤㵼牡丹牡蠣燒為粉鹿茸去鹿茸毛桑螵蛸微炒右為散每於食前以酒調下二錢治小便遺失出聖惠方阿膠炒珠子牡蠣煆桑螵蛸酒炙鹿茸酒炙各等分右為末糯米糊丸梧桐子大每服五十粒空心鹽酒下一方治遺尿小便澁無桑螵蛸有桑耳以水七升煮取二升分二服作散以飲送之一方以粥飲調下治遺尿小便澁方出聖惠方桑耳右為散酒服方寸日三服又方出聖惠方漢防己葵子各二両防風三両右切以水五升煎取二升米分温三服作散亦佳阿膠飲出聖惠方治小便遺失不禁阿膠三両炒牡蠣煆取粉鹿茸各四両右剉散每服四錢水一盞煎七分空心服或作細末飲調亦妙秘元丹出危氏方治内虛裏寒自汗時出小便不禁白龍骨三両訶子十箇縮砂一両右為末糯米粥丸如梧桐子大每服五十丸空心鹽酒下一方有靈砂二両治失禁出不自覺方用豆醬汁和電突墨如豆大内尿孔中又治胞轉亦治小兒治小便失禁方以水三升煮鷄腸取一升分三服一方雄鷄腸燒灰為末用三脂一撮温漿水調下一錢向北斗服更良鷄内金散出十便良方治溺床失禁用鷄肶胵一具并腸净洗燒為灰男用雌者女用雄者研細每服方寸酒飲調服一方煮之又方出危氏方用猪胞洗净鐵鏟上炙香熟嚼細温酒下治睡中遺不覺方用薔薇根隨多少剉以酒飲之煮汁去滓一方用野白薔薇根戎鹽散出聖惠方治遺尿恒澁戎鹽白礬各三分甘草半両蒲黄龍骨各一両鹿角膠二両右為散每於食前棗湯調下二錢治遺尿小便澁方桑耳龍骨各三等礬石阿膠各二分炙右為散空服米飲方寸七日三療少小睡中遺尿不自覺方用鵲巢中蓐燒水服一錢即瘥鹿角霜丸治上熱下焦寒小便不禁用鹿角帯頂骨者不拘多少鋸作鋌子長三寸洗了用水桶内浸夏三冬五晝夜用清水同入内煮之覺湯少添温湯日夜不絶候角蘇麋為度輕漉出用力削去皮如雪白放在篩子上候白亁微火焙之其汁慢火熬為膠候角極亁為細末酒糊為丸如梧桐子大每服三十粒至四十粒空心温酒鹽湯下白薇散出聖惠方治小便失禁白薇白歛白芍藥各一両右為散每於食前以粥飲調下二錢栢皮湯出聖惠方治小便不禁栢白皮焙亁二升酸石榴枝一握燒灰細研右洗搗栢皮為粗末每服四錢水一盞半煎一盞去滓下石榴枝灰一錢半更煎八分空心服至晩再服療小便卒大數作淋令人瘦出肘後方用不中水猪肪如鷄子炙之下取肥汁盡服之為妙此方并療遺尿一方治大便俱不通猪脂水一升煮三沸飲汁立通鵲巢散出聖惠方治小便不禁重鵲巢中草一觔燒作灰細灰如粉薔薇根皮五両右先搗薔薇根為麄末每服三錢水一盞煎七分去滓調鵲巢灰両錢空心服牡蠣丸治小便不禁牡蠣白者三両赤石脂三両搗碎右同研匀酒煮麵糊丸如梧桐子大每服十五丸空心鹽湯送下黄蓍散治小便不禁黄蓍細剉猪􅆃去毛牡蠣各一両三分土𤓰根三両肉蓯蓉酒浸一両三分赤石脂萆薢朱牛膝山茱萸各二両半右先搗八味為細散更與赤石脂同研匀每服一錢酒調食前服至午間夜卧各一服漸加至両錢白茯苓散出十便良方治小便不禁日夜不止白茯苓龍骨甘草炙剉甘薑桂心續斷附子各一両熟亁地黄桑螵蛸微炒右為散每服四錢水一鍾煎至六分去滓每於食後温服鹿茸散出聖惠方治小便不禁陰痿脚弱鹿茸一両去毛羊躑躅酒拌韮子附子桂心澤㵼各一両右為細末每於食前以粥米飲調下二錢漿水亦可調服當歸湯治氣牽腰皆及脇内痛小腹堅小便不止禁當歸大黄桂各三両亁薑人参各二両呉茱萸水浸二両半甘草白芍藥各一両右搗篩每服三錢以水一盞煎至七分去滓食前温服日三鹿茸散治腎藏虛腰臍冷痛夜遺小便鹿茸去毛烏賊魚骨各三両當歸切焙人参白芍藥龍骨桑寄生各一両桑螵蛸一両半右搗羅七味為細末更與龍骨石研令匀每服一錢温酒調服空心晩臨卧各一蓯蓉丸治腎臟虛冷腰膝無力小便不禁或溺白色肉蓯蓉二両半杜仲去粗皮一両半黄蓍二両桂去粗皮山茱萸牛膝酒浸切焙各二両韮子去浮者三両為末鍊蜜和濟入臼内塗酥杵令匀熟丸如梧桐子大每服日空心腹煎黄蓍湯下三十丸至晩再服地黄湯治小便不禁多日便一二斗或如血色麥門冬亁地黄各八黄亁薑四両蒺梨子續斷桂心各二両甘草右㕮咀以水一斗煮取二升五合分三服一方治腎消脚細小便數莬絲子散治小便不禁莬絲子酒焙亁微炒一両蒲黄微炒細研黄連一両半肉蓯蓉一両五味子鷄肶胵黄皮各一両右先搗四味為末散再入莬絲子粉與蒲黄同研匀細每服二錢酒調服食前服日三一方久房散有消石一両米飲調服鷄腸散治小便不禁日夜無度黄鷄腸雄者四其肉蓯蓉酒浸赤石脂研苦参白石脂黄連各五両右搗羅四味為細末散更與赤石脂白石脂同研匀細每服二錢酒調服食前日二夜一莬絲子散出十便良方治小便多或不禁莬絲子二両酒浸三日為末牡蠣燒為粉附子炮製去皮五味子各一両鷄肶胵中黄皮三両肉蓯蓉二両酒浸右為末每於食前以粥飲調下二錢亁薑飲治小便不禁亁薑炮製一両附子半両芎藭三分桂去粗皮麻黄去根各半両右剉如緑豆每服四錢每半煎一盞去滓空心服至晩再服治少小睡中遺尿不自覺方雄鷄肝桂心各等分右搗丸服如小豆大一枚三日服又方雄鷄尿白熬桂心各等分右為末酒服方寸日二亦可除桂心礬石散出於居士選竒方治丈夫婦人遺尿不知出時礬石燒令汁盡牡蠣熬各等分右為末以粟米粥飲服方寸日三一方酒調三錢立効又方用雄鷄喉嚨及白雞肶胵裏黄皮燒末麥粥湯盡服亦可以赤鷄翅燒末酒飲三指撮日三近効療尿床方取麻鞋乳帯及鼻根等唯不用底須七兩以水七升煮取二升分再服一方以麻底尖頭七為灰嵗朝井花水服療尿床方用羊肚貯水令滿繫両頭熟煮開取水頓服之即瘥治尿床方用羊胞盛水滿中炭火燒之盡肉空腹食不過四五度瘥又方出十便良方以新炊熱飲一盞㵼尿床處拌與食之勿令知名治老人尿出不知出鄭氏家傳濁方揀草鳥二両以童便没七日便再浸去尖皮切碎同鹽炒右為末酒糊丸每服二十丸空心鹽湯下又方出危氏方益智仁一両鹽炒龍骨四錢别研牡蠣煆紅研末半両川烏去皮剉半両川烏同前藥炒川烏黄色為度右研為末酒糊丸每服五十丸川萆薢煎湯吞下固脬丸治小便不禁茴香一両附子半両炮去皮尖莬絲子二両桑螵蛸半両戎鹽一両右為末酒麵糊丸如梧桐子大米飲下三十丸治胞損小便不禁白牡丹根皮為末一錢須細花者不然無効白芨為末一錢生絹一尺右同以水煎如錫每服半盞二氣丹治内虛裏寒膀胱積冷小便不禁硫磺細研肉桂去皮為末各一分亁薑炮為末硃砂研為末各二錢附子一箇大者炮去皮臍為末半両右以麵糊丸如梧桐子大每服五十丸鹽湯空心下治尿失禁以露􅉕房水煮服之又方用益智母巴㦸二味青鹽酒煮加桑螵蛸莬絲子酒蒸四味為末酒糊為丸服二十丸鹽湯酒任下普濟方卷二百十六
