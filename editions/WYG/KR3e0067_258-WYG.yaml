body:
  text: 普濟方卷二百五十八明周王朱橚撰食治門食治霍亂附論夫隂陽不順清濁相干氣射中膲名為霍亂也皆為飽食豚膾復啖乳酪海陸百品無所不飡多飲寒漿眠卧冷蓆風冷之氣傷於脾胃中諸食結而不消隂陽二氣壅而及戾陽氣欲昇隂氣欲降隂陽交錯變成吐利而已百脈昏亂榮衞俱虚冷摶於筋則令轉筋冝以食治之也方訶梨勒粥方治霍亂不止心胷煩悶訶梨勒皮半兩生薑一両切粳米二合右以水三大盞煎訶梨等取汁二盞去滓下米煑粥不計時候食之高良薑粥方治霍亂吐利腹痛等疾良薑一兩剉粳米二合右以水三大盞煎良薑取二盞半去滓下米煑粥食之蠟粥方治霍亂後氣脫虚羸或㵼不止黄蠟五錢粳米三合細研右先以水煑粳米作粥臨熟次下蠟更煑臨蠟清温服之食治五噎附論夫五噎者一曰氣噎二曰憂噎三曰食噎四曰勞噎五曰思噎由隂陽不和三膲膈絶津液不利氣不調理之所至也此皆憂恚嗔恐氣結在於心胷不得通變是以成噎冝食治之也方烏雌鷄切麵􅃵方治五噎飲食不下胷中結寒痩弱無力烏雌鷄半隻治如食法白麵四兩桑根白皮三分末赤茯苓三分末桂心末一分右二味末入麵中以水煑桑根白皮湯麵切入䜴中煑熟與鷄肉調和一如常法食之羊肉索餅方治五噎胷膈妨寒飲食不下痩弱無力羊肉四両炒作臛白麵半斤生薑一合陳橘皮一分湯浸去白焙右以橘皮末及生薑汁和麵作索餅於䜴汁中煑熟入臛食之良黄雌鷄臛索餅方治五噎飲食不下胷膈妨寒痩弱無力黄雌鷄一隻去毛膓炒作臛白麵半斤桂心末一分赤茯苓一分末右以桂心等麵和末作索餅於䜴汁中煑入臛食之治氣噎方蜜半斤酥三兩生薑汁一合右相和以微火煎如稀湯毎於酒中調一匙服之或空食亦佳桂心粥方治胷膈痰氣壅結食飲不下如似鯁噎桂心三分赤茯苓一兩桑根白皮二両右細剉以水三大盞煎至二大盞半去滓下粳米二合煑作粥食之治噎病不下食方㫪杵頭細糠半合白麵四兩右相和溶作餛飩於䜴中煑食之治噎不下食方右用崖蜜毎於粥中化半匙食之又方右用老牛噍沫如枣許大置稀粥中飲之終身不復噎矣勿令患人知食治反胃嘔吐方粳米粥方治反胃羸痩四肢娄弱粳米一合淘薤白七莖細切豉二十五粒枳殻去麩為末一分生薑汁半合大枣劈破二枚陳橘皮去白焙乾為末一分右除薤白米外以水三盞先煎除藥至兩盞去渣下薤米與煑以熟為度空腹任意食之羊肚方治反胃食羊肚浄洗一枚陳橘皮湯浸去白切二兩䜴半斤葱白十菩切鹽少許右将四味貯入羊肚内以䋲繫頭煑熟去藥拌将羊肚細切任意食之猪肚羮方治嘔吐猪肚浄洗去脂膜一枚人參一両陳橘去白細切三分生薑去皮細切一両蘆根細切半両右以水一斗煑蘆根至七升去滓次用人參等三味貯在猪肚中以線縫合再用蘆根汁煑令爛熟去藥滓将猪肚細切作􅃵任意食之餘汁勿棄作三五次欲盡生薑粥方治反胃嘔吐不下食生薑去皮細切研一両枇杷葉拭去毛炙七片為末右以水二升煎至一升去滓用白粳米一合煑粥更入鹽醬汁五味等空心温食之人參粥方治反胃吐酸水人參半両為末生薑取汁半兩右以水二升煑取一升入粟米一合煑為稀粥覺飢食之撥粥方治反胃羸弱身不能動氣泛醋心亦治赤白痢及水痢生薑三両研取汁白麵四兩右以薑汁和麵作撥粥煑食之羊肉生湯治反胃朝食夜吐夜食朝吐諸藥不差羊肉去脂膜切作生五兩大蒜去皮細研一顆右先将蒜入鹽醋蘸羊生空腹任意食之薄荷餺飥方治反胃朝食暮吐紫薄荷新者一握搗取汁麵四兩右和作餺飥煑熟空腹食之羊肝方治反胃食畢即吐出羊子肝一具切為條磠砂五錢取霜右調和令勻以竹杖穿炙空腹食之一方無磠砂生切羊肚五味調又方右用蝟皮一枚炙令焦為末先以水二盞菉豆煑粥續入蝟皮末一錢和服之又方右用蒼茸不限多少嫩者端午日取煑熟作菜茹食治反胃右用糯米半升裹流水擺取清暴乾焼為末砂糖溶令和旋吃立止食鷄子法治反胃飲食不進附子一个炮去皮臍鷄子三个右先将附子為粗末同水二碗煑鷄子水進為度然後取鷄子温水洗去殻令病者旋食之烏鷄法治結腸飜胃飲食入腹經宿則吐食粒不化天南星三个極大者切作三片右以純烏鷄一隻去腸并毛内南星在内以䋲縛定用紅酒三升煑乾為度去南星不用取鷄食以人參末半兩調温酒送下次用糯米壓之然後以平胃散多加薑枣煎神食治煩熱附論夫心煩者由隂陽更虚隂氣偏少陽氣暴勝故也亦有風熱相摶風毒攻心煩燥昏憒狂言失志宜食治之方生地黄粥方治心膈虚燥煩渇不多飲食小便赤瀝生地黄一合生薑汁半合粳米二合淡竹瀝二合蜜一合右将水煑粥熟下地黄薑汁煑令熟次下蜜并竹瀝攪轉食後良乆或臨卧食藕實􅃵方治煩熱去渇補中養神益氣除百疾令人心神娯暢藕實三兩新嫩者甜𤓰皮四両切蓴菜四兩切右以䜴汁相和作􅃵調和食之鷄子􅃵方治心下煩熱止渇鷄子三枚蓴菜一斤半淡竹笋四兩去皮切右以䜴汁中相和作􅃵臨熟破鷄子投入􅃵中食之黒豆􅃵方治壅毒攻心煩燥恍惚黒豆淡竹葉五十片枸杞莖葉五兩切右以水二大盞煑二味取一大盞去滓下枸杞葉煑熟入五味作􅃵放温食之寒水石粥方治心下煩熱多渇恍惚寒水石二兩搗碎粳米一合牛旁根四兩切右以水四大盞煎至二盞半去滓下米煑粥食之茯神粥方出聖惠方治心胸結氣煩熱或渇狂言驚悖茯神一兩羚羊角屑五錢粳米二合右搗細羅為麵與米同煑為粥食之藿葉根方出聖惠方治氣壅煩熱或渇藿葉一斤切葱白一握切右以䜴汁中煑調和作􅃵食之滑石粥方出聖惠方治膈上煩熱多渇通利九竅滑石二兩碎粳米二合右以水三大盞煎滑石至二盞去滓下米煑粥温食之酸􅀥仁粥方出聖惠方治心臓煩噪不得睡卧酸􅀥仁一兩搗為末粳米二合右煑米作粥臨熟下酸棗仁末半兩攪勻食之玉屑飯方出聖惠方治胸中伏熱心煩燥悶口乾氣逆粱米飯一盞菉豆四兩研右将飯㪚粉内拌令勻入湯内煑令熟用䜴汁和食之菘菜羮方出聖惠方通利腸胃除胸中煩熱解酒毒右用菘菜二斤煑作羮淡食之作虀食亦妙葛粉粥方出聖惠方治胸中煩熱或渇心燥葛粉四兩粟米半升右以水浸粟米經宿來日漉出與葛粉同拌令勻煑粥食之食治乆新咳𠻳附論夫五臓六腑皆有𠻳而肺最多然肺居四臓之上外合毛皮皮毛喜受風冷故肺獨易為𠻳也寒氣客於肺則寒熱上氣喘急汗出胸滿喉鳴多痰唾面目浮腫故謂肺𠻳也肝𠻳者其状左脇下痛甚則不能轉側心𠻳者其状𠻳而心痛喉中介介如鯁状甚則咽腫脾𠻳者其状右脇痛瘖瘖引於背甚者則不可轉動則𠻳劇腎𠻳者其状腰背相引痛甚則欬逆此皆由風寒冷熱所傷或飲食不節所至冝以食治之也方灌藕方出聖惠方益心潤肺治胸膈煩燥除欬𠻳生藕五挺大者生百合二兩生薯藥三兩白茯苓三兩末棗三七枚去皮核生天門冬三兩去心細切麵四両牛乳二升蜜六合右将百合薯藥天門冬爛研如蜜更取細次入枣肉次入茯苓次右先以酥微炒葱入粳米二合用水依尋常煑粥令稍稀空心服未差更作黄牛乳亦可豆蔲粥方出聖濟總録治傷寒後脾胃虚冷嘔逆不下食肉豆蔲去殻一枚另作末粳米浄洗二合右先将粳米如常煑作稀粥後下肉豆蔲末攪勻頓服食治虚損羸附論夫血氣者所以榮養身也虚損之人精液萎竭氣血虚弱不能充盛肌膚故令人羸痩冝以飲食補益也方灌腸方出聖惠方治虚損羸痩精萎不能飲食冝喫大羊腸一條雀児胷前肉三兩細切肉蓯蓉半兩細切酒浸附子一錢末乾薑一錢末兎絲子二錢末胡椒末一錢漢椒末一錢糯米二合鷄子白三枚右将肉米并藥末和拌令勻入羊腸内令實繫腸頭煑令熟稍冷切作餡子空心食之羊腎饆饠方出聖惠方治下膲虚損羸痩腰膝疼腫或多小便羊腎兩對去脂膜細切附子五錢炮裂去皮臍搗羅為末乾薑一分炮裂搗末肉蓯蓉一両酒浸一宿剖去皺皮搗末胡椒一錢搗末麵三兩大棗七枚煑熟去皮核研為膏右将藥并􅀥及腎等拌和為饆饠饀㳛麵作饆饠以數重濕紙褁於糠火中煨令紙焦藥熟空腹食之良乆冝食三兩匙温水飲壓之藥肉粥方出聖惠方治虚損羸痩駐顔色或女人産後虛羸等疾羊肉二斤當歸剉微炒白芍藥五錢熟乾地黄五錢黄耆五錢生薑一分切粳米三合右以精肉留四兩細切餘一斤十二兩先以水五升并藥煎取汁三升去滓下米煑粥欲熟入生肉更煑令熟用五味調和空心食之雀児藥粥方出聖惠方治下元虚損陽氣衰弱筋骨不健雀児十枚剥去皮毛剉碎兎絲子一兩酒浸二宿曝乾别搗末復盆子一兩五味子一両枸杞子一両粳米二合酒二合右搗羅為末将雀肉先以酒焼入水二大盞次下米煑粥欲熟下藥末五錢攪轉入五味調和令勻更煑熟空心食之耆婆湯方出聖惠方主大虚風冷羸弱無顔色酥一斤生薑汁一合薤白三握去鬚切酒三升蜜一升熟油一升川椒三合去目閉口者微炒胡麻仁一升研爛橙葉二掘䜴一升糖一升右先以酒浸一宿絞去滓内酒入銀器中次入酥蜜油糖薑汁等煎令沸下椒橙葉胡麻慢火煎候薤白黄赤色即濾去滓収瓷盒中毎日空心焼服一合猪肚方出聖惠方補虛羸乏氣力肥大猪肚一枚浄洗如食法人參二両去蘆頭乾薑一兩炮裂剉椒半兩去目及閉口者炒去汗葱白七莖去鬚粳米三合一作白粱米右搗篩入米合和相得内猪肚中縫合勿令洩氣以水五升入鐺内微火煑令爛熟空腹食之次煖酒一中盞飲之一方兼下少飯白蜜煎丸出聖惠方補虚羸痩弱乏氣力白蜜二升臘月猪肪一升去膜胡麻油半升微熟熟乾地黄末一升右合和以銀器中重湯令可丸下之丸如梧桐子大毎服以温酒下三十丸日三服稍加以知為度乆服令人肥充好顔色煎猪肪出聖惠方治大虚羸困極冝服右用猪肪不中者半斤入葱白一莖於銚子内煎令葱黄色即止候冷煖如人體空腹服頓服之令盡煖榻卧覆盖至日晡後乃食白粥稀糜過三日後更宜加服羊肝羮方羊肝一具去筋膜細切羊脊寅肉二條細切麯末一兩枸把根五斤剉以水一十五升煑取四升去滓右用枸把根汁煎前羊肝等令爛入䜴一中盞葱白七莖切以五味調和作羮服空腹飽食之後三日慎食如上法羊脊羮方治下元乆冷反骨蒸羸痩不下食白羊脊骨一具全者椎碎羊髓兩具碎之羊腎一對右用粱米一合水四升煎骨熟入羊腎一對再煎候熟取去濾過将腎切入葱白五味如常羮食下米作粥亦可骨汁煑索餅方出聖惠方治虚損羸痩下焦反冷眼昏耳聾大羊尾骨一條以水五大盞煑取汁二盞半葱白七莖去鬚切陳橘皮一兩湯浸去白瀼焰荆芥一握麵三兩羊肉四両細切右都用骨汁煑五七沸去滓用汁少許溲麵作索餅却於汁中與羊肉煑入五味空腹食之羊肉粥方出聖惠方治虚損羸痩助陽壮筋骨羊肉二斤黄耆一両剉人參一兩去蘆頭白茯苓一兩枣五枚粳米二合右先将肉去脂皮取精者内留四兩細切餘一斤十二兩以水五大盞并黄耆等煎取汁三盞等去滓入米煑粥臨熟下切了生肉更煑入五味調和空心食之黄耆粥方出聖惠方治虚損痩弱益氣力除腸風黄耆三兩剉人參一兩去蘆頭白茯苓一兩生薑五錢白粱米三合桑根白皮一兩剉右細剉和勻毎用藥二兩以水三大盞入棗五枚煎取一盞去滓下米煑粥空腹食之蓯蓉粥方出聖惠方治乆積虚冷陽氣衰微白羊肉四両切肉蓯蓉一兩水洗切粳米三合鹿角膠炒燥三分葱白切七莖鷄子二枚右以五味汁中煑粥臨熟下膠鷄子空腹食之羊腎粥方出聖惠方治虚損羸痩羊腎一對去脂膜切肉蓯蓉一両酒浸一宿刮去皺皮切葱白三莖去鬚切薤白七莖去鬚切粳米一合右先将羊腎及蓯蓉入少酒炒後入水二大盞半入米煑之欲熟次下葱白薤白煑作粥入五味調和空腹食之羊脊骨粥方出聖惠方治虚損羸痩乏力益精氣羊連尾脊骨一握肉蓯蓉一両酒浸一宿刮去皺皮兎絲子一分酒浸三日曝乾别搗末葱白三莖去鬚切粳米三合右剉碎脊骨水九大盞煎至三大盞去滓将骨汁入米并蓯蓉等煑粥熟入葱五味調和候熟即入兎絲子末及酒二合攪轉空腹食之蓯蓉羊腎粥方出聖濟總録治腎勞風虚面色黄黒鬂髮焦乾肉蓯蓉一両五錢酒洗去土羊腎一具去脂膜細切羚羊角屑二兩磁石焼赤醋碎搗爛薏苡仁各三兩右羊腎磁石薏苡仁外剉細為三服毎服水二升半煎至二升去滓下磁石薏苡仁各一兩半腎一具煑粥空心任意食之羊腎羮方出聖惠方治羸痩虚損陽氣衰弱腰疼無力乃令人肥健白羊腎一對去脂膜切肉蓯蓉一両酒浸一宿刮去皺皮切葱白二莖去鬚切羊肺三兩切右並於䜴中煑入五味作羮空腹食之黄雌鷄粥方出聖惠方治虚損益氣壮筋骨去膀胱積冷補腎氣黄雌鷄一隻未周年者制之如法以水五升煑取汁一升杏仁十枚湯浸去皮尖雙仁熟乾地黄三兩剉碎與杏仁同研用酒三合研絞取汁粳米三合右毎用鷄汁二大盞半和米煑粥欲熟下地黄杏仁等更煑令熟空心食之肉蓯蓉臛方出聖濟總録治臓腑虚損四肢乏弱不欲飲食肉蓯蓉一両酒浸一宿刮去皺皮葱白三莖去鬚切糯米糁一両羊肉三兩右将蓯蓉羊肉細挼和米糁及葱都依尋常煑法作羮着鹽醋椒醬五味和空腹食之猪肚糜方出聖濟總録治虚損猪肚腎各一具去脂膜人參麥門冬三分去心地骨白皮三両右除肚腎外細剉用綿裹與肚腎同入水一斗煑熟棄藥取肚腎肉汁中入葱白一莖細切粳米一升用微火煑熟隨意飲汁食肉補藥羊肝方出聖惠方羊肝細切一具羊脊膂肉細切一條陳麯末三両枸杞根五兩切以水一斗二升煑取九升去滓右以枸把根汁重煎令沸次入肝肉麯末并葱䜴汁調和漸煎如稠分作三分空腹食之枸把羮方出聖濟總録治羸痩虚勞枸把一斤羊腎一對切羊肉三兩切葱白七莖切右以五味汁煑作臛空腹食之猪腎羮方出聖濟總録治諸虚羸益氣猪腎一對切枸把葉一斤切葱白十四莖切猪脊膂一條去脂膜切右以五味汁作羮空腹食之雀児粥方出聖惠方治臟腑虚損羸陽氣乏弱雀児五隻治如食法細切粟米一合葱白三莖切右以炒肉次入米一合煑用水二大盞半煑作粥欲熟下葱白五味等候熟空心食之椒腎羮方出聖惠方治下焦虚損乆冷漢椒二十粒去目及閉口者酒浸一宿白麵三両羊腎一對去脂膜細切右取椒麵内拌勻熱水中下並羊腎煑熟入五味調和作羮空腹食之鷄子索餅方出聖惠方治虚損羸痩令人肥白光澤白麵四両鷄子四両白羊肉四兩炒作臛右以鷄子清溲作索餅於䜴汁中煑令熟入五味臛空腹食之人參煑羊肉法出聖濟總録治勞補益人參一両枸把白皮三両肉蓯蓉酒洗去土三分右細剉先以水三升浸藥經兩宿煎之去滓取汁一升細切葱白一握鹽少許同羊肉半斤䜴一合於藥汁中和勻入羊肚内從五更初煑至平旦細切食之至飽不盡續食之補腎羮方出聖濟總録治勞虚損精氣絶竭羊腎一雙去脂切葱白一分切生薑一分切右細切羊腎入五味葱薑如常法作羮食之食紫菊法出聖濟總録治虚勞補益右用正月已後五月已前採黄花紫莖菊葉食之九月内採花隂乾搗末酒粥羮任意食之澤㵼羮方出聖濟總録治虚勞補益右用生澤㵼花葉切五兩以水三升煑至一升半去浄滓下半肚葱䜴等於汁中煑香熟任意食之老羊肚乃佳薏苡餅方出聖濟總録治虚勞補益右用薏苡仁熟水淘搗羅如作米粉法以􅀥肉乳汁相拌和作團如蒸餅大依法蒸熟隨性食之夏月用米粉不得留經宿恐酸壊一方同羊肉作羮如常法用葱䜴等熟食之苣勝粥方出聖惠方治五臟虛痩羸損益氣力堅筋骨填骨髓右用苣勝子不限多少揀去雜蒸暴各九遍毎取二三合用湯浸布裹挼去皮再研水濾汁煎成飲著好粳米煑作粥食之或煎濃飲澆索餅食之甚佳枸把煎方出聖惠方有人頻遭重病虚羸不可平服冝服生枸杞根細剉一斗以水五升煑取一斗五升沉清白羊脊骨一具細剉右以微火煎取五升去滓収瓷盒中毎取一合酒一小盞合煖毎於食前温服食治五勞七傷附論夫人有五勞七傷一曰志勞二曰思勞三曰心勞四曰憂勞五曰痩勞盖五勞則傷於五臟也凡人憂愁思慮則傷心髮燥而面無精光也形寒飲冷則傷肺氣促欬逆也恚怒氣逆上而不下則傷肝目暗筋骨攣痛也飲食勞倦則傷脾吐逆食少不成肌膚也乆坐濕地强力入水則傷腎腰脚重疼行履不任也此則五勞証候也七傷者是傷五臟六神故也肝藏魂肺藏魄心藏神脾藏意與智腎藏精與志此為七神也且五臟以七神而為主主若無臟如人無室臓若無神如室無人以此比之大可知也今言七傷者一曰隂衰二曰精清裏急三曰精少四曰精消陽事不興五曰小便苦數囊下濕痺六曰胸脇苦痛也七曰隂寒兩脛厥此皆臓腑虚損表裏受敵肌虚筋骨不榮故曰五勞七傷之病也冝以食調適之方藥餅方出聖惠方治五勞七傷下焦虚冷小便遺精冝食啖腰腎壮陽道附子一兩炮裂去皮臍神麯三両炒乾薑一両炮裂剉肉蓯蓉一両半酒拌一宿刮去皮炙乾桂心一両五味子一兩兎絲子酒浸三日暴乾搗為末一兩白麵一升黄牛乳一升半羊髓三兩􅀥二十枚煑去皮核漢椒半兩去目及閉口者微炒去汗酥二兩蜜四両右搗羅為散入麵與酥蜜髓乳相和入􅀥穰熟溲於盆中盖覆勿冷通氣風半日乆即将出更溲令熟擀作糊大麵以上以筋子璲之即入爐􅌯中上下以火煿令熟毎日空腹食一所入酵和麵更佳醸猪肚方出聖惠方治五勞七傷羸痩虚弱獖猪肚一枚洗浄去脂人參一両去蘆頭杏仁一両去皮尖研白茯苓一兩陳橘皮半兩湯浸去白穣焙乾薑一分炮裂蕪荑一分漢椒一分去目及閉口者微炒去汗蒔蘿一分胡椒一分黄牛酥一兩糯米五合淘折㸔肚大小臨時加減大􅀥二十一枚去核切右搗羅為末毎用藥一兩入酥􅀥杏仁米等相和令勻入肚内以麻線縫合即於甑内蒸令熟切作片空心漸漸食之藥髓餅子方出聖惠方治五勞七傷腎氣虚弱腰脚疼痛小便遺瀝乾薑一分炮裂剉漢椒半両去目及閉口者微炒去汗桂心一分附子一兩炮裂去皮訶梨勒一分煨用皮縮砂半兩去皮作末蜜一合􅀥一百枚去核細切羊骨髓五兩白麵二斤黄牛酥三兩右搗細羅為麵入諸物同和餡分為八分以溲麵包褁如常作髓餅入爐上下着火煿則須徹裏過熟氣日空腹食之一所覺腰腎及膀胱煖則止羊腎羮方出聖惠方治五勞七傷髓氣竭絶羊腎一對去脂膜切肉蓯蓉一兩酒浸一宿刮去皺皮生薯蕷一兩羊髓一兩薤白一握去鬚切葱白半兩去鬚切粳米一合右炒羊腎并髓等欲熟下米并䜴汁中五大盞次下蓯蓉更入生薑鹽等各少許煑成􅃵食之蘹香角子方出聖惠方治五勞七傷隂菱氣乏蘹香子一兩木香一両巴㦸一兩附子一兩炮裂去皮臍山茱茰一兩猪腎一對去脂膜細切漢椒去目閉口者微炒出汗右搗為末毎對猪腎用藥末二錢入鹽溲麵像肝角子樣修製灰内煨令熟薄茶空腹食之羊腎羮方治五勞七傷腎氣不足羊腎一具去脂膜切羊肉三両嫩枸把葉細切一升葱白三莖去鬚切粳米五両生薑切三分右先炒腎及肉葱白生薑欲熟下水二大盞半入枸杞葉次下米五味等煎作􅃵食之羊髓粥方出聖惠方治五勞七傷補虚强志益氣羊髓三合羊腎一對去脂膜細切葱白三莖去鬚切生薑五錢切粳米一合肉蓯蓉二兩酒浸一宿刮去皺皮右以炒腎及葱薑欲熟入水二大盞半次入米五味等煑作粥食之葱䜴粥方出聖惠方治五勞七傷體熱喘急四肢煩疼香䜴三合葱白切半升羊髓一両鹽花五錢薄荷三十莖右以水三盞先煎葱白四物十餘沸下䜴汁更煎五七沸去䜴入米二合煑為粥空腹温服之猪腎羮方出聖惠方治五勞七傷乍寒乍熱背膊煩疼羸痩無力猪腎一對去脂膜切生地黄四兩切葱白一握去鬚切生薑半兩切粳米一合右猪腎煑及葱白欲熟者䜴汁五大盞入生薑下地黄及米煎作􅃵食之缶鷄方出聖惠方治五勞七傷益下元壮氣毎服經月餘肌肉充盛老成少年冝服黄雌鷄一隻去毛羽腸臓肉蓯蓉一兩酒浸一宿刮去皺皮切生薯蕷一両切阿魏少許煉過粳米二合淘右先将鷄煑爛孹去骨汁下米及鷄肉蓯蓉等都煑粥入五味空心食之肉蓯蓉粥方出聖惠方治五勞七傷乆積虚冷陽事都絶肉蓯蓉二両酒浸一宿刮去皺細皮鹿角膠半兩搗碎炒令黄燥為末粳米二合羊肉四兩細切右煑羊肉蓯蓉粳米作粥臨熟下鹿角膠末以鹽醋五味調和作兩頓食之蘿藦菜粥方出聖惠方治五勞七傷隂囊下濕癢蘿藦菜半斤羊腎一對去脂膜切粳米二合右以細切煑粥調和如常法空腹食之羊腎粥方出聖惠方治五勞七傷羸痩陽氣不足心神虚煩白羊腎一對去脂膜切羊髓二兩白粳米二合右相和煑作粥入鹽椒空腹食之鹿腎粥方出聖惠方治五勞七傷陽氣衰弱益氣力鹿腎一對去脂膜細切肉蓯蓉二兩酒浸一宿刮去皺皮切粳米二合右以水二盞煑米作粥熟下鹿角膠蓯蓉及葱白鹽椒食之枸杞粥方出聖惠方治五勞七傷庶事衰弱枸杞半斤切粳米二合右以䜴汁相和煑作粥以五味葱白等調和食之鷄肝粥方出聖惠方治五勞七傷隂痿虚弱雄鷄肝一具細切兎絲子末半両粟米二合右以水二大盞半入五味及葱煑作粥空心食之猪腎羮方出聖惠方治五勞七傷隂痿羸痩精髓並竭四肢少力猪腎一對去脂膜切枸杞葉半斤切右用䜴汁二大盞半相和煑作粥􅃵入鹽醋椒葱空腹食之牛腎粥方出聖惠方治五勞七傷隂痿氣乏牛腎一對去脂膜筋切陽起石四兩布褁粳米二合右以水五大盞煑陽起石取二盞去滓石下米及腎五味葱白等煑作粥空腹食之煑羊頭蹄方出聖惠方補五勞七傷虚損白羊頭蹄一具草火焼令黄色刮去灰塵胡椒五錢蓽芰五錢乾薑五錢葱白切半升䜴半升右以水先煑頭蹄半熟内藥更煑令爛去骨空腹適性食之日食一具滿七日且暫止禁冷生醋滑五辛陳臭猪鷄等七日治風胎痩病五勞七傷虚驚悸用白羊頭一枚燖如食法煑令極熟切於䜴汁中五味調和食之食治骨蒸勞附論夫骨蒸之病而多異名為療皆同一體丈夫以勞損為宗婦人以血氣為本起於腎虚所至故云隂氣不足陽必湊之血氣不榮骨髓枯竭腎主於骨以先從骨熱故曰骨蒸又大都此病起於無端不問老小男女皆染斯病嬰孩之流傳注更甚其状心胸煩滿骨節疼痛頰口乾或寒或熱四肢無力毛髮乾焦咳𠻳頭疼精神昏悶多卧少起夣與鬼交驚悸不安時時盗汗毒氣傳及五臓日漸羸痩冝以食治之方杏仁粥方出聖惠方治骨蒸煩熱欬𠻳杏仁五錢浸洗去皮尖雙仁水研取汁生地黄三兩研取汁生薑一分研取汁蜜半匙粳米二合酥半両右先以水煑作粥次入杏仁等及煑令熟不計時食之牛膝葉羮方出聖惠方治骨蒸勞背􅈩煩疼口乾状熱四肢無力牛膝葉四兩龍葵菜四兩地黄葉四両生薑五錢䜴一合半右先以水五大盞先煎薑䜴取汁二大盞半去薑䜴下牛膝葉等煑作羮入少鹽醋調和食之地黄葉猪腎羮方出聖惠方治骨蒸勞乍寒乍熱背膊煩疼及痩弱無力生地黄葉四兩切猪腎二枚去脂膜切豆䜴一合葱白三莖去鬚切生薑一分切右先以水二大盞煎䜴等取汁一大盞半去滓入地黄葉等於汁中煑更入鹽醋米同作羮食之枸把葉根方出聖惠方治骨蒸勞肩背煩疼頭痛不能下食枸杞葉五兩青蒿葉一兩䓤白一握去鬚切䜴一合右先以水三大盞煎䜴取汁一盞五分去䜴下枸把葉等煑作􅃵調和食之地黄粥方出聖惠方治骨蒸勞痩日晩寒熱欬𠻳唾血生地黄汁三合粳米一合酥半両右以水一大盞先煑米欲熟入地黄汁次下酥候下熟温温食之葱䜴粥方出聖惠方治骨蒸勞煩熱欬𠻳四肢疼痛時發寒熱䜴一合葱白一握去鬚切粳米二合右以水二大盞半煑葱䜴取汁一盞半絞去葱豉入米煑粥不計時候食之酒煑鰻鱺魚方出聖惠方治骨蒸勞痩及腸風下蟲右用鰻鱺魚二斤治之如法剉作叚子入鐺内以好酒三大盞熟煑入鹽醋食之酸棗仁粥方出聖惠方治骨蒸心煩不得眠臥右用酸􅀥仁二兩以水二大盞半研濾取汁以米二三合煑作粥候臨熟入地黄汁一合更微煑過不計較時候食之食治補益虛損於諸内中蒸煑石英及取汁作食治附論夫石性甚剛猛利而能榮養隂陽逐氣祛風恱澤顔色但服餌有法功効殊常今則煑錬取其精華調品成其法膳可安臟腑用補虚羸者爾方猪肚煑石英法出聖惠方治虚損凡人年四十已下服二大兩四十五十及至六十已上加二兩常用四月以後服之候接秋氣石力下温其臟補益腰腎得力終無發動白石英二兩以生絹袋盛都縫合人参一兩去蘆頭生地黄二両切生薑一兩切葱白七莖切䜴半両羊肉半斤切猪肚一枚浄洗粳米一合川椒四十九粒去目及閉口者右藥及石英袋並内猪肚中急繫口勿使洩氣以水一斗煑至二升即停出藥肚著盤内使冷然後破之去石英袋訖取肚及汁将作􅃵服之毎年三五度服毎服石英依舊餘藥換之分數一依初法釀猪肚方出聖惠方治虚損不足令人肥白恱顔色猪肚一枚浄洗白石英一兩搗碎生地黄一合切饙飯半両紫石英一兩搥碎與白石英同線褁川椒三十粒去目及閉口者微炒去汗搗末葱白三莖去鬚切鹽少許右拌和諸藥等内猪肚中以麻線縫定蒸令爛熟取出石英細切任性食之三石猪腎􅃵方出聖惠方治腎氣不足陽道衰弱紫石英三兩白石英三兩磁石三両搥碎淘去赤汁猪腎二對去脂膜切肉蓯蓉二兩酒浸一宿刮去皺皮切枸杞半斤切右先将三石搥碎布褁以水五大盞煑石取二盞半去石著猪腎蓯蓉枸杞鹽醋醬五味末等作􅃵空腹食之三石水煑粥方出聖惠方治隂痿囊下濕或有瘡虛乏無力紫石英四両白石英四兩磁石八両搥碎淘去赤汁右搥碎布褁以水五大盞煑取二盞去石下米三合作粥食之其石毎日煎用之經三箇月即換之服牛乳方出聖惠方補虚益氣牛乳五升蓽芰末一両右入銀器中以水三升和乳合煎取三升後収瓷盒中毎於食前煖一小盞服之羊肉中蒸石英服餌法出聖惠方治虚損不足右用精羊肉一斤白石英三兩肉切作兩叚鑚作一孔内石英著肉中還相合即用荷葉裹又将蠟紙裹後又将布裹於二斗米飯中蒸之候熟即出肉却檢去石英後取肉細切和葱椒薑等作罨肉空心食之石英水煑粥法治腎氣虛損隂痿周痺風濕肢節中疼痛不可持物白石英二十両磁石二十両并搥碎右以水二斗器中浸於露地安置夜即掲盖令得星月氣毎日取水作􅃵煑粥煎茶湯喫皆用之用却一升即添一升服經一年諸風並差氣力强盛顔如童子葱䜴湯出聖濟總録治服乳石因食倉米臭肉發動者葱白一握切䜴一合右以水二升煎至升半去滓作常服䜴湯服可五六劑差煨羊腎方出聖惠方治虚損脚膝無力陽氣不盛補益羊腎一對鍾乳粉一分右取羊腎切去脂膜分為四片掺令勻却合用濕紙褁煨令熟空腹食之白石英粥方出聖濟總録治石發右用白石英五斤搗篩細研三日一乳牛十嵗以上時方養犢而羸痩者毎日秤一兩石英末拌豆與食之經七日即可取乳毎毎朝空服熱飲一升餘者作糜粥任意食之百無所忌五月上旬起良如急要用則亦不拘此牛糞糞地種菜供服乳人食甚佳一方先研末和牛糞糞地種枸杞牛膝豆菜等食之益人服乳石後将慎紫餺飥方出聖濟總録右用好烏豆任多少煑取濃汁以代水入少鹽和麵仍依常法作餺飥還向此豆汁中熟煑可三七沸溢出則添豆汁勿無水熟即出之任意以猪羊肉菉豆等類臛澆食之或作冷淘食亦得和山芋作餺飥益為佳麵餅方出聖濟總録治乳石發動右用新大麥為麵和肉汁作餅食之大凉麵作栁葉條為羮亦佳大麥和黒豆相拌熟蒸任意食春夏服之良冒熱逺行将大麥作餅食之壓石堅飢油麵餺飥方出聖惠方補虚勞生胡麻油一升折粳米泔清一斤右以微火煎盡泔清乃止出貯之取冷鹽湯二合将和麵作餺飥煑令熟入五味食之益腎氣强陽道出本草右用白羊肉半斤去脂膜切作生以蒜虀食之三日輒一度甚妙令人長脂肉肥白出本草右用猯肉和五味煑食之食治心腹痛附論夫心腹者由寒客於臓腑之間與氣血相摶随氣上下攻繫心腹而痛臓氣虚邪氣勝停積成疢故令心腹痛也冝食治之方蓽茇粥方出聖惠方治心中冷氣徃往刺痛腹脹氣滿蓽茇一分胡椒一分乾薑炮裂剉一分㯽榔一分桂心一分粟米三合右搗羅為末以水二大盞米煑粥候熟入藥末三錢攪令勻毎日空腹食之桃仁粥方出聖惠方治邪氣攻心腹痛桃仁二十一枚去皮尖生地黄一兩桂心五錢末粳米三合細研生薑一分并地黄桃仁以酒三合研絞取汁右先用水煑米作粥次下桃仁等汁更熟調入桂心末空腹食之高良薑粥方出聖惠方治心腹冷氣徃徃結痛或遇風寒及喫生冷即痛發動高良薑五錢粳米二合陳橘皮五錢湯浸去白右以水三大盞煎高良薑陳橘皮取汁一盞半去滓投米煑粥空腹食之蓽茇粥方出聖濟總録治心腹冷氣㽲痛妨脹不能食蓽茇一兩胡椒一兩桂去粗皮三分右搗羅為麵毎服三錢鹽水一椀半入葱一握䜴半合先煑葱䜴熟去滓次下米三合煑粥将熟入前藥末同煑少頃空腹食之高良薑粥方出聖濟總録治心腹積冷結痛高良薑搗為末半兩白米三合右先以水二大升煎高良薑取一升半去滓下米煑熟入五味調和空腹食之呉茱茰粥出聖濟總録治心腹冷氣衝脇肋痛呉茱茰水浸去涎焙乾炒搗末半両右先用水二升下米入葱䜴同煑熟後下茱茰末一分并鹽少許空腹食之桃仁粥方治冷氣心腹痛煩悶及治欬𠻳氣喘桃仁去皮尖䨇仁搗以水一升研取汁粳米三大合右以桃仁汁煑粥空腹食之紫蘇子粥方治冷氣心腹痛煩脹不能下食紫蘇子一合微炒桂心末二錢右搗碎紫蘇子以水二大盞絞濾取汁入米二合煑粥候熟入桂末食之椒麵粥方治乆患冷氣心腹結痛嘔吐不能下食蜀椒去目及閉口者一分炒出汗水浸一宿焙乾為末白麵三両右将椒末於麵内拌勻於䜴汁中煑令熟空腹食之食治腰脚疼痛附論夫腰脚痛者由腎氣不足受風邪之所為也勞傷則腎虚虚則受於風冷與真氣交争於腰脚疼痛冝以食治之也方食羊蜜方治虚勞腰痛咳𠻳肺萎骨蒸熟羊脂五両熟牛髓五兩白蜜五兩熟猪脂五両生薑汁五両生地黄汁五両右将猪羊脂煎一沸次下牛髓又煎一沸次下白蜜生薑地黄汁微火煎不住手攪膏成貯蜜氣中毎服一匙許空腹温酒調下􅃵粥中服之亦得若食素者以酥代脂髓加麥門冬汁若不能食或多風者加白术羊臓羊方治虚勞腰脚痛羊肝肚腎心肺各一具湯洗細切胡椒一兩蓽茇一兩䜴一合牛酥一兩葱白一握細切右先以五味相和以水七升慢火煎取五升去滓和羊肝等并汁皆内羊肚中繫肚口别用絹袋盛之煑熟乗熟出切肚食之旋旋服盡藥汁羊腎餛飩方治腎氣虚損腰脚疼痛五味子一兩山茱茰一両乾薑炮裂一両川椒去目及閉口者微炒去汗桂心一両右搗細羅為麵毎日取羊腎一對去脂膜細切入散兩錢木臼内杵如泥作饀用和麵稔作餛飩以水熟煑和汁食之羊脊骨羮方治腎氣虚冷腰脚疼痛轉動不得羊脊骨一具搥碎以水一斗煎取五升羊腎一對去脂膜切羊肉二両細切葱白五莖去鬚粟米二両右炒腎肉㫁血即入薑葱五味然後添骨汁入米重煑成羮空腹食之䜴酒方治下膲風濕腰脚疼痛行履無力䜴二合薤白一握切洗去滑附子半兩炮裂去皮臍杵末川椒五十粒去目及閉口右相和炒至薤熟投於三升酒中更煎四五沸毎取一小盞攪粥食之猪腎粥方治腎虚氣勞損腰膝疼行動無力猪腎一對去脂膜切米三合葱少許薑少許右以䜴汁一升半煑粥入五味并酒調和如常法空腹食之又枸把羊腎粥方治陽氣衰腰脚疼痛五勞七傷枸杞葉一斤羊腎一對細切米三合葱白十莖右細切加五味煑粥如常法空腹食羊脊骨羮方治腎臓風冷腰脚疼痛轉動不得羊脊骨一具搥碎葱白四莖去鬚切粳米四合右以水七大盞煎骨取汁四大盞漉去骨毎取汁二大盞入米二合及葱椒鹽醬作羮空腹食之猪肚炙方治下膲風冷腰脚疼痛轉動不得猪肚一枚湯洗酒一升附子半両炮去皮臍杵末右以椒葱鹽醬并酒附子末拌和煑亦作肉炙熟空腹食之兼飲酒一兩盞勿令過度生地黄鷄方治腰背痛骨髓虚不能乆立身重氣乏盜汗少食時復吐利生地黄八両飴糖五両烏鷄一隻右先将鷄去毛皮及腸臓細切地黄與糖相和内鷄腹中銅器貯之復置甑中蒸飯熟藥成取食之勿用鹽醋食肉盡即飲銅器中藥汁桂心酒粥方治腎臓虚冷腰脚疼痛不可忍桂心半両末好酒一升右煖酒和桂心末空腹分為二度攪粥食之梅實仁粥方治腰脚疼痛不可轉側梅實仁半兩研極細米二合右煑米令半熟即下梅實仁相和攪令勻候熟空腹食之婆羅粥方治腎臓風冷腰脚疼痛牛膝一兩去苖剉碎酒浸一宿白麵四両右将牛膝於麵中拌作婆羅粥煑熟十沸漉出則以熟水淘過空腹頓食之白羊腎羮方治乆積虚損陽道虚弱腰脚無力白羊腎一對去脂膜切肉蓯蓉一兩酒浸細切右相和入葱白鹽醬椒煑作羮如常法空腹食食治脾胃氣弱不下食附論夫脾胃者位居中宫象夫土也土生萬物四藏令口其氣故云人之虚者補之以味味以行氣氣以實志言滋形潤神必歸於食莊子云納滋味百節肥焉脾養肌肉脾胃氣弱即不能消化五榖氣虚弱則腸鳴泄痢既多則諸藏氣竭肌肉消痩百病輻凑冝以飲食和益脾胃之氣滋潤臓腑養於經脈祛疾之甚可謂上醫故千金云凡欲治病先以食療既食療不愈後乃用藥爾方醸羊肚方治脾胃氣弱不能下食冝食羊肚一枚治如常法羊囱一斤細切食茱茰半両末人參去蘆頭搗末一両陳橘皮一兩湯浸去白穣焙胡椒一分末肉豆蔲一枚去湯用末乾薑半兩末生薑一兩切葱白二十七莖切粳米五合淘鹽末半兩右取諸藥末拌和肉米葱鹽等内羊肚中以麄線繫合勿令洩氣蒸令極熟分三四度空腹食之和少醬醋無妨羊肝饆饠方治脾胃氣弱不能飲食四肢羸痩白羊肝一具去筋膜細切肉豆蔲一枚去殻末乾薑一分炮裂末食茱茰一分末蕪荑仁二分末蓽撥一錢末薤白一合切右先炒肝薤欲熟入豆蔲等末鹽湯㳛麵作饆饠爐裏煿熟毎日空腹食一兩枚極效蓴羮方治胃氣弱不下食四肢無力漸羸痩蓴菜四両鯽魚紙褁焼熟去鱗切四兩陳橘皮湯浸去白生薑一両葱白十四莖破羊骨一斤熬汁去骨右先将五味就羊骨汁中作羮空腹食之豆蔲發蒸方治脾胃氣弱食即吐嘔逆草豆蔲仁二枚煨高良薑細剉半両生薑汁二合羊肉炒臛四両麵四両右入麵溲乾即便入黄牛乳調㸔稀稠得所灌入藕中逐竅令滿即於甑中蒸熟毎飯後或臨卧時少少食之鹿髓煎方出聖惠方鹿髓五錢蜜三合酥三合生地黄汁四合杏仁三両桃仁三両同杏仁各湯浸去皮尖雙仁研碎以酒浸絞取汁一升右煎地黄杏仁桃仁等汁鹿髓酥蜜煎如稀餳収瓷盒中毎取一匙攪粥半盞不計時候食之杏仁粥方出聖惠方治肺氣療虚羸喘息促急欬𠻳等杏仁二十一枚湯浸去皮尖䨇人研碎以三合黄牛乳絞取汁􅀥七枚去核粳米二合桑根白皮二両剉生薑一分切右以水三大盞先煎桑根白皮􅀥薑等取汁二盞将米煑粥臨熟入杏仁汁更熟五七沸不計時候食之藥棗方出聖惠方治積年欬𠻳不差棗七枚擘破酥一雞子大莨菪一錢水淘二遍右鐺中炒令酥盡去莨菪取􅀥去皮食之良日三五服一方無莨菪藥餅方出聖濟總録治多年肺氣欬𠻳羊子肝一枚分為四片麝香末二錢膩粉一錢右和麵褁焼熟空腹食之時以冷水更換浸兩手良乆即住来日早晨轉下惡物有蟲如頭髮相似為騐猪方出聖惠方治上氣欬𠻳胸膈煩滿氣喘猪􅏬細切一具生地黄搗破六両餳四兩右先以炒猪􅏬即下地黄薑葱鹽䜴候熟下湯以瓷器盛毎日喫半盞許食猪腎方出聖濟總録治乆欬𠻳不差猪腎二具毎具上作十四孔蜀椒去目及閉口者二十八粒内腎孔中右以濕紙褁煨令勻熟去椒細嚼食之猪􅏬酒方出聖惠方治肺氣欬𠻳上氣乆不差猪􅏬細切二具大􅀥去皮核三十枚右以無灰酒三升同浸秋冬七日春夏三日布濾去滓隨意温服杏仁餳粥方出聖惠方治上氣欬𠻳稀餳三合杏仁二兩湯浸去皮尖䨇人熬研成膏右相和得所毎取一匙攪粥半盞不計時候食之又方出聖惠方生薑汁五合沙糖五両右煎令相和毎服一匙攪粥半盞不計時候食之醍醐方出聖惠方治一切肺病欬𠻳唾濃血不止右用真酥不拘多少煉三次取醍醐毎服一合差中邪風皮膚瘙痒温酒調服治欬𠻳乆不差出聖濟總録右用猪􅏬一具薄切入竹筒於糠火中炮令極熟食飯後喫之治勞痩温中補不足咳𠻳出本草右用蘿蔔和羊肉鯽魚煑食之食治眼痛附論夫目者肝之官肝藏於血榮養於目腑臓勞傷血氣俱虚不能榮養於目故目暗也若風熱之氣在於臓腑虚實不調故上衝於目則令赤痛乆不能差變生膚翳者眼睛上有物如蠅翅是也冝以食療之方竹葉粥方出聖惠方治膈上風熱頭目赤痛目視􅉩􅉩竹葉五十片洗浄石膏三兩沙糖一両浙粳米二両右以水三大盞煎石膏等三味取二盞去滓澄清用煑粥熟入沙糖食之猪肝羮方出聖惠方治肝臓虚弱逺視無力補肝猪肝一具細切去筋膜葱白一握去鬚切鷄子三枚右以䜴汁中作羮臨熟打破鷄子投在内食之蔓菁子粥方出聖惠方補中明目利小便蔓菁子二合粳米三合右搗碎入水二大盞絞濾取汁著米煑粥空心食之蓮實粥方出聖惠方益耳目聰明補中强志嫩蓮實五錢去皮細切粳米三合右先煑蓮實令熟次以粳米作粥候熟入蓮實攪勻熱食之蒼茸子粥方出聖惠方治目暗耳鳴蒼茸子半兩粳米半両右搗蒼茸子爛以水二升絞濾取汁和米煑粥食之或作散煎服亦佳青羊肝方出聖惠方右用青羊肝一具細切水煑漉乾以鹽醬醋調和食之立見效又方出聖惠方右用葱子半升炒熟搗細羅為散毎服用一匙以水二盞煎取一盞去滓下米煑粥食之馬齒實拌葱豉粥方出聖惠方治青肓白翳明目除邪氣利大腸去寒右用熱馬芽實一斤搗為末毎服一匙煑葱䜴粥和勻攪食之馬齒菜作羮粥喫並明目極佳烏鷄肝粥方出聖惠方治肝臓風虚眼暗右用烏鷄肝一具細切以䜴汁中和米作羮粥食之兎肝粥方出聖惠方治目暗青肓明目右用兎肝一具細切以䜴汁中作粥空腹食之以效騐為度梔子仁粥方出聖惠方治熱發眼赤􅉣痛右用梔子仁一兩搗為末為四分毎服用米三合煑為粥臨熟時下梔子末一分攪勻食之鷄頭實粥方出聖惠方益精氣强志意聰明耳目右用鷄頭實三合煑令熟去殻研如膏入粳米一合合煑粥空腹食之食治耳鳴聾附論夫耳鳴耳聾者腎為足少隂之經而藏精其氣通於耳耳宗脈之所聚若精氣調和則腎氣强盛五音分時若勞傷血氣兼受風邪損於腎藏而精氣脫則耳聾也血氣不足宗脈則虚風邪乗虚隨入耳中與氣相擊則為耳鳴也方猪腎粥方出聖惠方治腎臓氣憊耳聾獖猪腎一對去脂膜切葱白二莖去鬚切人參一分去蘆頭末防風一分去蘆頭末粳米二合薤白七莖去鬚切右将藥末并米葱薤白著水下鍋中煑候粥臨熟撥開中心下腎莫攪動慢火更煑乆入五味空腹食之羊腎羮方出聖惠方治耳聾耳鳴羊腎一對去筋膜細切生山芋四両去皮葱白一握擘破生薑一分細切右作羮如常法食之空腹飲菖蒲羮方出聖濟總録治耳聾耳鳴如風水聲菖蒲二兩米泔浸一宿剉焙猪腎一對去脂膜及筋細切葱白一握擘破米淘三合右以水三升半煑菖蒲取汁二升半去滓入猪腎葱白及五味作羮如常法空腹食人參粥方出聖濟總録治耳聾耳虚鳴人參一合末防風去又為末一分磁石二両搗碎綿褁猪腎一對去脂膜細切右先将磁石於銀器中以水一斗煑取三升入猪腎及粳米五合如常法煑粥候熟入煎二味更煑数沸空腹服磁石羊腎粥方出聖濟總録治耳聾養腎藏强骨氣益精髓除煩熱磁石半斤搗碎淘三徧綿褁置器中羊腎一對去脂膜研爛米三合右用水五升先煑磁石取汁二升去磁石下羊腎及米煑粥臨熟入酒一合調和如常法空腹食猪腎羮方出聖濟總録治耳聾耳鳴如風水聲猪腎去筋膜細切一對蜀椒去目及閉口者炒出汗三十粒陳橘皮半分洗切右用五味汁作羮空腹服鹿腎粥方出聖惠方治耳聾補腎氣鹿腎一對去脂膜研爛米三合右於䜴汁中五味調和煑粥如常法空腹食磁石腎羮方出聖惠方治乆患耳聾養腎臓强骨氣磁石一斤搗碎水淘去赤汁綿褁猪腎一對去脂膜細切右以水五升煑磁石取二升去磁石投腎調和以葱䜴薑椒作羮空腹服之作粥及入酒並得磁石常用煎之白鵝膏粥方出聖惠方治五臓氣壅耳聾白鵝脂二両粳米三合右和煑粥調以五味葱䜴空腹食烏鷄脂粥方出聖惠方治耳聾乆不差烏鷄脂一両粳米三合右相和煑粥入五味調和空腹食之烏鷄脂和酒飲亦佳鯉魚腦髓粥方出聖惠方治耳聾不差鯉魚腦髓二両粳米三合右煑粥以五味調和空腹食之乾柿粥方出聖惠方治耳聾及鼻不聞香乾柿三枚細切粳米三合右於䜴汁中煑粥空腹食之食治三痟附論夫痟渇者有三般一者痟渇二者痟中三者痟腎若飲水多者小便又少名曰痟渇若喫食多不甚渇小便數消痩名曰痟中若渇飲水不絶甚者腿膝痩弱小便渇者有脂液名曰痟腎此盖由積乆嗜食鹹物炙肉飲酒過度皆成痟渇然大寒凝海唯酒不氷明其酒性酷熱物無以喻如此之味酒徒躭嗜不離其口酣醉已後制不由已飲噉無度加以醋醬不擇酸鹹積年長夜酣飲不休遂使三膲猛熱五臓乾燥木石猶且燋枯如何人能不渇治之愈不愈属在病者若能如方節慎旬日而瘳不自保惜死不旋踵方雖效騐其如不慎者何其所慎者有三一酒二房三鹹食熱麵能慎此者雖不服藥自可無他不知此者縱使金丹玉粒亦不可救矣良可悲夫宜深思之今以飲食調治以助藥力也方羊肺羮方治三痟小便數羊肺一具治如食精羊肉五両切粳米半合葱白五莖生薑少許鹽醋各少許右相和依常法作羮飽食之治痟渇飲水不止方黄丹三分􅌝􅌣根一兩末葱白一握切白麵五兩薤白一握切右黄丹等末水和麵㳛餺飥先煑葱薤白令爛熟即内餺飥煑之令熟即并汁食之羊骨湯方治痟渇羊脊骨一具連喉者䜴一升白粟米一升薤白一握切右各分作兩處煑毎度用水六升煑至三升去滓渇即温汁量意飲之以差為度杏酪粥方治三痟心熱氣逆不下食杏酪煎極濃一升黄牛乳一升大麥二合折令細滑右依常法煑粥食之入餳沙糖和之更大美也藕實羮方治痟渇煩燥狂言目眩藕實去皮半斤薄荷一握蓴菜半斤右於豉汁中作羮入五味食之煑兎方治痟渇神效兎一枚新桑根白皮半斤細剉右剥兎去皮及腸胃與桑白皮同煑爛熟為度盡力食肉并飲其汁即效麥豆方治痟渇大麥仁半斤菉豆半斤水浸退去皮右净淘於星月下各貯一鐺中用水二升慢煑熟次取菉豆過麥仁鐺中同煑令爛并汁収在瓷瓶内渇即飲後仍喫三兩匙麥仁緑豆尤妙藕蜜漿方治痟渇口乾心中煩熱并散積血生藕去皮節切錬蜜各半斤右新汲水一升半化蜜令散内藕於蜜中浸半日許渇即量意食藕并飲汁􅌝􅌣根羮方治痟渇口乾心神煩燥􅌝􅌣根生嫩者洗細切冬𤓰去瓤細切各半斤右以水六升入鹽䜴半升煎至五升去䜴下前二味入醋作羮分三度食之􅌝􅌣粉方治痟渇右用􅌝􅌣根多取削去皮於新瓦中磨訖以水淘生細絹袋擺如造米粉法曝乾熱渇時冷水調下一錢許服之大效二月三月八月九月造佳用田螺活者要一升水一斗煑至二升不問食前後稍稍飲汁又一方用田螺五升水一斗半浸經宿渇即飲汁毎日須一度易水并螺一方用米一合煑作粥食之鹽䜴飲出聖恵方治痟渇右用濃煎鹽豉汁停冷渇即飲之又方出聖濟總録右用粟米炊飯頻食之佳又方出聖恵方右用火麥仁炊飯或煑粥食之佳小麥亦得水淘食之良又方出聖濟總録右用青小豆净淘煑粥食之和飲食亦得又方出聖惠方右用牛乳飲一小盞馬乳亦得生飲令人利熟飲令人渴蒸鹿頭方治痟渇口乾右用鹿頭一具治如食法蒸熟以醬醋食之黄雌鷄粥方治痟渇口乾小便數右用黄雌鷄一隻治如食法爛煑取肉隨意食之其餘汁和豉作粥食之亦妙生蘿蔔粥方治痟渇發動無時飲水不足右用蘿蔔五枚𢷬捩取汁一大盞攪粥作飲頻吃甚有效野鷄肉汁方治消渇舌燋口乾小便數右用野鷄治如食法以水五大盞煑取三大盞渇即旋取汁飲之肉任性食菉豆汁方治痟渇小便如常右用菉豆二升净淘用水一斗煑爛研細澄濾取汁於早晩食前各服一小盞如覺小便濃即差胡豆汁方治痟渇右用胡豆二合煑取汁勿用鹽隨意食之粱米粥方治痟渇及吐血心悶右用青梁米半升净淘粳米亦得以水三升煑稀粥時飲之以差為度爛研取泔飲之亦可葵虀汁方治痟渇心悶右用葵一束洗湯内畧煑過别煑粟米汁如常醃虀法候熟渇即飲汁以差為度地黄花粥方治痟渇右用地黄花隂乾𢷬羅為末毎用粟米兩合净淘煑為粥候熟入末三錢半攪勻更煑令沸任意食之普濟方卷二百五十八
