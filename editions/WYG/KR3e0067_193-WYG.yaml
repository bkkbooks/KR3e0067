腫通身腫滿喘急小便澁兼治水腫甘遂大㦸去皮各一兩右剉碎慢火炒令黄色搗篩每服一字匕以水半盞煎三五沸便須傾出不得煎過火去滓温服之不過十服一方用棗煎服之大㦸散出聖濟總録治通身腫滿喘急小便澀大㦸去皮細切微炒二兩乾薑炮製半兩右為散每服三錢匕用生薑湯調下良乆糯米飲接之以大小便利為度苦葶藶丸出衛生寳鑑治一切水病氣通身腫滿不可當者人參一兩苦葶藶四兩於鍋内鋪帋炒黄色右為末用棗肉和丸桐子大每服十五丸煎桑白皮湯下日三服空心食前此藥急效人不信試驗之治水腫通身出千金方苦瓠膜二分葶藶五分右合搗為丸如小豆大服五丸日三又方出千金方葶藶桃仁各等分右皆熬合搗為丸服之利小便一方用杏仁又方出千金方大棗肉七枚苦瓠膜如棗核大右熟搗丸一服三丸如人行十五里又服三丸水出更服一丸即止又方出千金方用搗生葶藶子酢和服以小便數為度又方出千金方用煎猪椒枝葉如􅄳空腹服一匕日三痒以汁洗之治水氣徧身浮腫方出聖惠方右取葱根葉不限多少細切晒乾杵羅為末毎用葱末二錢席下塵半錢相和作散每服於食前清粥飲調服之治水氣坐臥不得靣目身體悉浮腫方出聖惠方葱白七斤和鬚分作兩搨子右先以炭火燒一處浄地令赤即以葱搨子安在地上令病人脫襪以人扶着踏葱上蹲坐即以被衣圓褁勿令透風得汗通小便汗出黄水葱冷即止小便多即差矣蒴藋酒出聖惠方治水氣通身黄腫用蒴藋根搗汁一盞和之置暖處一宿旦起空心服之瘥葶藶丸出聖惠方治水腫氣滿用葶藶子三兩蒸過搗如泥和蜜為丸梧桐子大每服五丸加至七丸得利為佳或以葶藶一升用酒五升浸三宿每服取半盞日三小便利佳白鴨方出肘後方治水氣脹滿浮腫小便澁少用鴨白者一隻去毛膓湯洗燒飯半升以飯薑椒釀鴨中縫定如法蒸候熟食之又方出肘後方治通體遍身腫小便不利用猪苓五兩搗篩煎水一合調服方寸匕日二匕牽牛散出聖惠方治水氣遍身浮腫氣促坐臥不得用牽牛子二兩微炒搗細末烏牛尿浸一宿平旦入葱白一握煎十餘沸去滓空心分為二服水從小便中下大効一方為丸葱白湯加人尿令可丸服如小豆大日三治水通身腫方出千金方海藻剉錦紋大黄剉大㦸剉續隨子去殻各一兩右件好酒二盞浄椀内浸一宿取出晒乾後用甘遂炒黄一兩白牽牛一兩生頭末桂府滑石半兩浄肉豆蔲一箇青皮陳皮並去白各半兩共前藥都作一處杵為細末大人每服二錢如氣實者三錢半平明冷茶清調下至辰時取水三二行腫减五七分隔二三日平明又一服腫消息忌鹽魚肉百日小兒腫服一錢五嵗以上下者半錢婦人有胎不可服木香通氣丸導滯寛膈消腫進食牽牛半斤半生半熟陳皮四兩去白破故紙四兩炒茴香一兩炒南木香一兩㯽榔二兩海金沙四兩右件為末清醋為丸桐子大每服三十丸熟水送下食後白术丸治通身腫滿及病氣疾羗活白术半兩木通黄耆桑白皮各三兩木香二兩黒牽牛十兩半生半炒陳皮三兩右為末蜜丸薑湯下塌脹丸治水氣渾身腫喘急小便不利白樟栁根三兩剉細赤小豆五兩陳橘皮去白穣二兩木香一兩右件為末滳水和丸菉豆大每服三十丸煑赤小豆湯下防己湯主通身脹滿小便澁胸膈上下脹悶不能食食則脹者桑白皮五兩大豆五升以水三斗并桑白皮煑取一斗去滓防己橘皮赤茯苓三兩生薑五兩杏仁十枚去皮尖雙仁碎旋覆花一兩紫蘇莖葉二兩切右切以前件藥汁煑取三升去滓分為三服弱者分為五服相去六七里久被覆當大汗小便利腫氣消下冷多加茱茰四兩𤣥參四兩忌酢物普濟方卷一百九十三
