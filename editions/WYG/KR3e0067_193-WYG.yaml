方用小豆一斛煑令極爛得四五斗汁温以漬膝以下日日為之數日消盡若已入腹者不復漬但煑小豆食之莫雜食飯及鮭魚鹽又專飲小豆汁無小豆大豆亦可用如此之病十死一生急救之一方用赤小豆治水病兩足腫者出肘後方用葱葉及莖煑爛漬之日三五作乃佳治腿腫一月餘用服香蘇飲加㯽榔萆薢香附子治肺臟受水子母相生傳之於腎腎水之度受病兩股沉冷腰膝冷重而足浮腫臍腹肋滿徃徃外腎隨腫肉色黄黒宜服此方喫藥取轉後便喫後方藥以補之出䕶命方續斷乾薑川芎各半兩半夏椒目各二銖呉茱茰一分牽牛三兩右除牽牛一味自作一處杵為末所餘衆藥只作一處細杵羅為末先以生薑三兩搥碎赤小豆煑半升爛熟乾去薑不使杵豆些小為末毎服牽牛末二錢衆藥末二錢半豆末二錢麵一兩相和作麵羮水一碗葱五根同煑熟空心喫若未轉逐旋喫後方藥却滳熟水丸桐子大停待幾日更取一度取水盡喫硫黄丸治腎臟受水喫藥取轉後宜服此方以補之將此藥對硫黄丸以効為期出䕶命方巴㦸去心山茱茰續斷黄橘皮川芎各半兩通草一分右為末每服二錢生薑兩片以水一分同煎兩三沸空心熱喫治水病經久五臟之中皆有所受面目四肢手足悉皆浮腫外之証候未明水在何臟但未傷五臟皆可服此藥若屬皮青黒則肝有所傷缺盆平心有所傷腹臍凸者脾有所傷足下平者腎有所傷背平者肺有所傷五臟中内有一臟所傷者更不可喫藥出䕶命方乾薑呉茱茰續斷葶藶桔梗半夏官桂去皮羗活各一分椒目三銖㯽榔半兩已上自作一處杵為末牽牛二兩自作一處杵為細末右先使生薑一兩搥碎煑赤小豆一盞已來候待豆子臨熟時先抽豆汁兩盞用一餅子盛之却煑豆熟焙空心將乾豆子半盞來用拌飯半碗喫了停待片時却取初間所抽者豆汁入葱五枚重煎調前方藥和滓喫其藥每服五錢乾薑等衆藥末二錢牽牛末三錢滚為一服以通轉為度未轉次日仍用舊法喫豆飯了再用豆汁下乾薑等末三錢牽牛末四錢為一服和滓喫以轉下水為度治五臟受水喫疎轉藥下得水後喫此方以補之出䕶命方桑白皮乾薑呉茱茰巴㦸去心焙人參茴香肉蓯蓉去皮芎藭澤㵼剉木香研石庭脂一兩另研所餘衆藥盡為細末右將石庭脂末與衆藥末相和煉蜜為丸桐子大早朝空心米湯下五十丸須是取水盡後方可喫此藥面目四肢不是退腫即是水盡大腹水腫附論内經言水病下為附腫大腹又曰上下溢於皮膚故為附腫其証腹大四肢小隂下濕手足冷腰痛咳嗽煩疼是也蓋三焦不通水溢皮膚脹急如皷得病之本多因大病之後或虛勞損或食畢入水故令水氣不散宜然也赤茯苓散出聖惠方治大腹水腫大便澁氣滿悶赤茯苓二兩桂心一兩川大黄二兩剉碎㣲炒甘草一兩炙微赤剉大腹皮一兩半剉枳殻一兩半麩炒黄細辛一兩前胡一兩去蘆頭桑白皮三兩剉右為散每服五錢水一盞煎至五分去滓温服日三四服治大腹水腫氣息不通命在旦夕宜服此藥出聖惠方桑根白皮二兩剉昆布一兩洗去醎味桂心一兩去粗皮牽牛子二兩微炒甜葶藶半兩隔紙微炒紫色椒目一兩㣲炒右為末煉蜜和擣三二百杵丸梧桐子大每服三十丸粥飲下不計時候牛黄丸一名海藻丸出聖惠方治腹大水腫氣息不通并風水皮膚腫滿喘息不能眠臥牛黄二分研桂心去皮牽牛子各八分椒目三分昆布洗去醎炒海藻各十分洗去醎炒葶藶子六分炒紫色右為末别搗葶藶如膏令和丸梧桐子大粥飲下十丸日二稍加小便利為度崔氏云蜜和為丸蜜湯下宣明有麝香龍腦各分正觀九年漢陽王患水病醫所不治余處此方日夜尿水三斗五六日即差雄黄丸出聖惠方治卒大腹水病雄黄六分麝香三分甘遂芫花人參各二分右搗蜜和丸服如豆大二丸加至四丸即差温酒送下鯉魚茯苓湯治水腫腹苦滿急害飲食凡此滿或是虛氣或是風冷氣或是飲氣鯉魚一頭重五斤者以水二斗煑取汁湯去魚茯苓三兩桑白皮切炙澤㵼各五兩右取三物内魚汁中煑取四升去滓分服小便當利漸消甘甜丸出經驗良方治水腫腹脹甘遂半兩水煑甜葶藶一兩炒細辛去苗一兩半川椒二兩炒右為末蜜丸梧桐子大朝晨日午臨臥白湯下十五丸防己丸出聖濟總録治大腹水腫乾燥此腸間有水防己椒目葶藶炒令紫色大黄剉醋拌炒乾一兩右為末煉蜜為丸如小豆大每服十丸米飲下日三服稍稍增之口中有津則止勿服渇者加芒硝半兩麝香丸出聖濟總録治水氣大腹腫麝香一錢研甘遂炒芫花醋炒各半兩人參一兩右搗羅為末煉蜜為丸如小豆服二十丸米飲下葶藶丸出聖惠方治腫入腹苦滿急害飲食凡此滿或是虛氣或是風冷氣葶藶七兩椒目三兩茯苓三兩右搗篩蜜和丸梧子大服十丸日三忌酢物水銀丸出聖濟總録治大腹水腫利小便水銀水煑一日一夜研十兩葶藶炒令紫色椒目各一升右為末煉蜜丸如小豆大每服十丸米飲下日再服一方有芒硝甘草丸出聖惠方治水氣腹腫大甘草炙剉防己葶藶炒令紫色各一兩右為末用酒􅆈為丸如小豆大每服二十丸至三十丸米飲下蘇合香丸出聖濟總録治大腹水腫利小便蘇合香水銀水煑一復時入白歛為末各一兩一方作白㣲右合研令匀煉蜜為丸如小豆大毎服十丸米飲下日三大棗葶藶丸療大腹水病身體腫上氣促小便澁赤臍深頸上有兩大脉動唾稠不得眠睡每腫先隨脚腫亦有在前頭面腫或大便澁者服此藥大佳若先患大便利臍凸腹大膨脹手掌平滿即不可服此藥大棗四十枚肥不蚛者先以煖水浸令軟以飯飲裡蒸乃剥去皮核葶藶五兩隔紙炒杏仁五兩不取合歡者以湯浸去皮麩炒令黄色去尖右先搗葶藶子一萬杵㵼出之乃搗杏仁三百杵訖總和棗膏合搗一萬杵藥成平旦空腹服八丸日晩食消更服五丸以飲汁下之三日後每日一服五丸日晩服三丸如棗核如大便利未得服此藥若正服藥次忽患痢即先食二三口飲然後喫藥若利過多停藥即可另爛煑小豆勿加鹽食之忌醎粘脂膩及大冷熱物等唯得食秔粟米飯及淡醋不得喫稀粥只得喫飯佳如欲食粥即病發不得遣大便利大㦸丸出肘後方治腫入腹苦滿急害飲食凡此滿或是風冷氣或是飲氣大㦸烏頭白术各三兩右搗篩蜜和丸梧桐子大日一服二丸當下漸退更服取冷消乃止一方無白术葶藶大丸出三因方治腫滿腹大四肢痩澁濁甜葶藶隔紙炒芥菜根等分右為末蜜丸彈子大每服一丸陳皮湯嚼下只三丸小便清數丸腹當依舊葶藶散出肘後方治大腹水腫利小便葶藶炒紫色一兩杏仁二十枚湯浸去皮尖雙仁炒右搗令極爛分為十服毎米飲下日二服治療卒大腹水病牽牛子二分􅆈厚朴一分炙右搗篩强人服三稜角殻弱人二殻酒飲隨意治久水腹肚如皷者出千金方葶藶炒研蒼耳子灰各二十匕右水調和服之日二又方出千金方用椒目水沉者熬搗如膏酒服方寸匕又方出千金方用水煑馬兠鈴服之治大腹水腫諸藥無効宜服此方出聖惠方苦葫蘆二兩㣲炒右為細末不計時候粥飲調下二錢皂莢酒方出肘後方治腫入腹苦滿急害飲食右皂莢剥去筋皮炙令黄剉三升酒一斗漬石器煑令沸服一升日三服治卒大腹水病蓋水病之初先自上腫起如老蠶色頸頭脉動股裏冷脛中滿按之没指腹内轉側有節聲此其候也不即治須臾身體遍腫肚盡脹按之隨手起則病已成不可為治此皆從虛損大病或下痢後婦人産後飲水不即消三焦受病小便不利乃相結漸漸生聚遂流諸經絡出肘後方用葶藶一升􅆈臼内搗之割生雄鴨雞合血共頭搗萬杵服如梧桐子五丸稍加至十丸勿食鹽常食小豆飯飲小豆汁鯉魚佳又方出肘後方用取柯枝皮剉濃煑煎令可服如梧桐子大三丸須臾時又一丸當下小水後將服三丸日三服此樹一名木奴南人用作船又方出肘後方用萆麻子熟者二十枚去皮研之水解得之三㑹旦服至日中許當吐下諸水汁結裏若不盡三日後更服三十枚猶未盡更服作效後節飲及醎物等又方出肘後方用小豆一升白雞一頭治如食法以水三斗煑熟日飲汁稍稍令盡治水脹腹滿出本草用萆麻子細研水服壯人可五粒又方出肘後方用蛤蜊炙令熟日食十箇箆麻單方治水脹腹滿方見滿水類治大腹水病出肘後方用青雄鴨一隻以水五升煑取一升飲盡厚蓋之取汗佳葶藶湯治支飲乆不瘥大腹水腫喘促不止方見水蠱類大豆散出千金方治乆水腫腹肚如皷者用烏豆一斗熬令香勿令太熟去皮為末篩下􅄳粥皆食之初服一合稍加之若初服多後即嫌臭服盡更作取瘥不得食諸肥膩渇則飲美汁慎酒肉猪雞魚生冷酢滑房室得食漿粥牛羊兎鹿肉此散大飢渇時食之可忍亦勿食也此病難治雖諸大藥丸散湯膏當時暫瘥過後復發惟此散瘥後不發終身服之終身不發矣其所禁食物常須少噉莫隨意醎物諸雜食等皆當忌天雄丸出指南方治脾脹天雄枳實橘皮各半兩甘遂一分牽牛酒浸一宿煑令熟即去酒烘乾再炒取起連皮大腹子一兩酒浸一宿炒乾右為細末酒糊丸梧子大毎服十粒生薑湯下神祐丸出儒門事親甘遂依前大㦸醋浸煑焙乾芫花醋浸煑各半兩黒牽牛一兩大黄一兩右為末滳水丸小豆大每服五七十丸臨臥温水下治卒大腹水病出肘後方以春酒五升清葶藶子二升隔宿稍服一合小便當利治支飲久不瘥大腹水腫喘促不止出本草用甜葶藶三兩隔紙炒令紫色搗如膏每服丸如彈子大以水一中盞入棗四枚煎至五分去滓非時温服水氣徧身腫滿附論夫腎主水脾胃俱主土土尅水胃為水穀之海其氣虛不能𫝊化水氣使水氣浸淫府藏又脾得水濕之氣土衰不能制之水氣獨歸於腎腎虛三焦不㵼經絡閉塞故水氣溢於皮膚傳流四肢所以通身腫也其候上氣體重小便黄澁腫處按之隨手而起是也欵氣丸出聖濟總録治通身腫喘丁香木香沉香白檀桂去皮肉豆蔲去殻㯽榔蓽澄茄大㦸炒甘遂炒各一分木通一兩續隨子去皮海蛤郁李仁去皮瞿麥甜葶藶炒桑根白皮炙牽牛子各一分膩粉一分净巴豆慢火炮去出油盡一分右為細研白粳米飯為丸如菉豆大每服三丸至五丸煎橘皮湯下猪苓散出千金方治虛腫滿通身利三焦通水道猪苓葶藶人參𤣥參五味子防風澤㵼桂心狼毒椒目白术乾薑大㦸甘遂各二兩蓯蓉二兩半麥麴三合赤小豆二合右治下篩酒服方寸匕日三夜一老小一錢以小便利為度猪苓散出聖惠方治水氣徧身浮腫宜利三焦通水道猪苓半兩去黒皮赤茯苓半兩甜葶藶半兩隔紙炒紫色北五味子半兩川大黄半兩剉㣲炒大㦸半兩剉微炒漢防己半兩陳橘皮半兩去白澤㵼半兩桂心半兩白术半兩狼毒半兩醋拌炒碎椒目半兩㣲炒去汗乾薑半兩炮製剉右為末每於食前以葱白湯調下二錢得大小便利為度大豆湯出鮑氏方療風水氣舉身腫滿短氣欲絶大豆一大升杏仁一升去皮尖炒黄耆二兩白术五兩防風三兩清酒一升木防己四兩茯苓四兩麻黄四兩去節甘草四兩炙生薑六兩右十一味切以水三斗先煑豆取一斗去滓内酒及藥煑取七升分七服一日一服夜令盡當下小便忌海藻松菜桃李雀物大酢等疎鑿飲出醫方集成治水氣通身洪腫喘促息氣急煩燥多渇大小便不利服熱藥不得者澤㵼赤小豆炒商陸羗活去蘆大腹皮椒目木通秦芁去蘆㯽榔茯苓皮各等分右等分㕮咀毎服四錢水一盞半薑五片煎至七分去滓温服不拘時候一方無秦芁杏仁丸療水氣身腫脹滿杏仁十枚去皮尖研蘇子五分白前六分昆布八分洗去醎李根白皮