分也腑之出入也此氣血交變之大要也一言可通千萬也腧者隂也血也内也有形質也謹當深刺此是為隂中之隂也病在陽之陽者言六府也刺陽之合陽之合者通言六府之中各有所入為此一穴乃胃與癸腎也只合浮取中胃也用藥補以甘温瀉以苦寒假令陽氣下陷入隂中當推而陽之病在陽之隂者刺隂之經筋與骨病也刺隂之經若筋骨之邪在是何布分誰家筋骨病於何藏各藏穴中有經穴經者氣也肺主諸氣散入五臟為五經潔古云動而不休曰經此天元之正氣生萬物者也病在隂之陽者刺絡脉陽之陽者皮膚中見絡脉是也絡脉者竒邪也在五臟部分者為隂絡在六腑部分者為陽絡繆刺論中說交經刺之宜三稜鍼出血是其法也病在陽者命曰風此病在陽者言十二經受風也以髙言氣分也故身半以上風中之也用鍼當引而去之又曰散而去之用藥以辛温發散通因通用又曰熱因熱用是也病在隂者命曰痺身半以上濕中之也痺論曰飲食自倍膓胃乃傷得之飲食勞倦脾胃氣虚而下溜運氣營氣不能升降經營心肺也隂陽俱病命曰風痺言隂陽氣血俱病也病有形而不痛者陽之類也無形而痛者隂之類也無形而痛者其陽完而隂傷急治其隂無攻其陽有形而不痛者隂完而陽傷急治其陽無攻其隂隂陽俱動乍有形乍無形加以煩心命曰隂勝其陽此謂不表不裏其形不久隂陽俱動動者火也是陽之賊解云風寒傷形憂恐忿怒傷氣氣傷臟乃病臟寒形乃應形風傷筋脉筋脉乃應此形氣内外之相應也久痺不去於身視其血絡盡去其血諸陽受氣於四肢諸隂受氣於五臟論黄帝鍼經云凡刺之道畢於終始明知終始五臟為紀隂陽定矣隂者主臓陽者主腑陽受氣於四末隂受氣於五臟故瀉者迎之補者隨之知迎知隨氣可令和和氣之方必通隂陽五臟為隂六腑為陽足之三陽胃膽膀胱之經從元氣上至目從九泉之下至卯在人身為目之二皆從地出至卯也自子至卯一十二度半手之三陽三焦大腸小腸之經上走手表自開目時始行陽道二十五度此一十二度半自卯至午一十二度半手之三隂肺包絡心包絡兼之從手下走入腹中自陽臟也陽受氣於四末自天下降行秋令是血領諸氣乃秋自天外也自午至酉一十二度半足之三隂脾腎肝之經元氣從腹下走至足自酉至子一十二度半此諸陽臟之氣受領天上陽入於地藏道行冬令入於地中滿溢不能容地之用及天之體左遷上走出天隂氣上天寒涼是也故曰地以陽殺隂藏此之謂也到此之際隂領著陽行便是隂血先行陽氣後行故曰寒勝則浮乃隂之氣受於腹一十二度半故曰諸陽受氣於四肢諸隂受氣於五臟此之謂也已上論天元真氣一晝夜五十度周於身一刻行八丈一尺一百三十五息二刻轉一周天二百七十息行一十六丈三尺乃一萬三千五百息脉行八百一十丈也非經血經水者也十二經水左遷元氣右遷上上下下無有終始夫天真元氣者遷推以五味營氣穀氣又為陽氣又為少陽之氣奉滋養者也經云三隂上奉之者此也六節藏象論夫天食人以五氣地食人以五味五氣入鼻藏於心肺上使五色脩明音聲能彰五味入口藏於腸胃味有所藏以飬氣氣和而生津液津液相成神乃自生經脉别論云食氣入胃濁氣歸心淫精於脉脉氣流經經氣歸肝朝於百脉輸精於皮毛毛脉合精行氣於腑腑精神明留於四臟歸於權衡以平氣口成寸飲入於胃逰溢精氣上輸於脾脾氣散精上通於肺通調水道下輸膀胱水精四布五經並行此說營氣穀氣上升奉生者也上升於頭入手之三陽三陽得之散之六腑六腑下行滋養五臟通九竅利周身百脉也諸經貫舌并取亷泉辨黄帝鍼經曰手少隂之别名通理繫舌令是少隂之正繫舌本是太隂之正貫舌本足太隂之脉散舌下足少隂之脉夾舌本鍼經云足陽明之脉根於厲兊結於亷泉一穴一名舌本在頷下結喉上治舌下腫難言縱涎出口禁舌根急縮下食難刺瘧論云舌下兩脉者亷泉也刺禁論云刺舌下脉太過血不止為瘖刺節真邪論云取亷泉穴血變而止以明宜出血禁用氣鍼或問取亷泉穴二說不同一說取頷下結喉上一說取舌下兩脉何者為當荅曰舌本者乃舌根蔕也若取舌下兩脉是取舌稍也舌標也此法誤也當取頷下者為當此舌根也况足陽明之脉根於厲兊結於亷泉頷下乃足陽明脉之所行也若取舌下兩脉非陽明經也戊與癸合亷泉少隂也治涎下解辭云胃中熱上溢亷泉開故涎下當出血以瀉胃中之熱又知非舌下之兩脉也頷下喉嚨者為准矣脹論曰亷泉玉英者津液之道路也辨陷下則灸鍼經云陷下則灸之天地間無他惟隂與二氣而已陽在外在上隂在内在下今言陷下者陽氣下陷入隂血之中是隂反居其上而復其陽脉證俱見寒在外者則灸之異論云北方之人宜灸焫也為冬寒太王伏陽在内皆宜灸之以至理論則腎主臟臟陽氣在内冬三月主閉藏是也若太過則病固宜灸焫此明陷入隂水之中是也難經云熱病在内取陽之氣穴為陽陷入隂中取陽氣通天之竅穴以火引火而導之此宜灸焫也若將有病者一槩灸之豈不誤哉仲景云㣲數之脉慎不可灸因火為邪則為煩逆追虚逐實血散脉中穴氣雖㣲内攻有力焦骨傷筋血難復也又曰脉浮宜以汗解因火灸之邪無從出因之而盛病從腰以下必重而痺名火逆也脉浮熱甚而反灸之此為實實以虚治因火而動必咽燥唾血又云身穴三百六十有五其三十穴灸之有害七十九穴刺之為灾并中髓也仲景倒地傷寒三十按明堂鍼經各條下所說禁忌明矣内經云脉之所見邪之所在脉沉者邪氣在内脉浮者邪氣在表世醫只知脉之說不知病證之禁忌若表見寒證身汗出身常清數慓而寒不渇欲覆厚衣裳惡寒手足厥皮膚亁枯其脉必沉細而遲但有一二證皆宜灸之陽氣下陷故也若身熱惡熱時見躁又或面黄咽乾嗌乾口乾舌上黄赤時渇咽嗌痛皆熱在外也但有一二證皆不宜灸其脉必浮數或但數亦可灸灸之害立生若有鼻不聞香臭鼻流清涕眼臉時痒或欠或嚏惡寒其脉必沉是脉證相應也或輕手得弦緊者是隂伏其陽也雖面赤亦宜灸不可拘於面赤色而禁之也便有腦痛惡寒者雖面赤宜灸風府穴如帶偏腦痛更惡風者邪在少陽宜灸風池兼灸風府然艾炷不宜大但如小麥粒一七壯足矣若多艾炷大防損目論五臟六腑治證假令膽病善潔面青善怒得弦脉人病心下滿當刺膽井如見善潔面青善怒脉又弦人病身熱當刺肝榮如依前色脉人病體重節痛當刺膽俞如見善潔面青善怒脉又弦人病喘咳寒熱當刺膽經如依前色脉又病逆氣而洩當刺膽合餘經依例皆倣此假令脾病淋溲難轉筋兼人病或心下滿或身熱或體重節痛或喘咳或逆氣而泄依前刺之謂刺肝經諸穴也脉沉而弦假令小腸經病面赤口亁喜笑或心下滿刺井或身熱刺榮或體重節痛刺俞或喘欬寒熱刺經或逆氣而泄刺合脉浮而洪假令心經病煩心心痛掌中熱噦脉沉而洪或心下滿刺井或身熱刺榮或體重節痛刺俞或喘欬寒熱刺經或逆而泄刺合假令胃經病面黄善噫善思善味脉浮而緩依上法刺之假令脾經病腹脹滿食不消怠墮嗜卧脉沉而緩依上法刺之假令大腸經病面白善嚏悲愁不樂欲哭脉浮而濇依上法刺之假令膀胱經病面黑善恐欠脉俱沉依上法刺之假令腎經病泄如下重足脛寒而逆脉俱沉依上法刺之灸刺禁忌論凡用灸刺當先别其所宜有偏宜刺者若天柱素體禾髎肩真乳中周榮腹衰中衝隂陵泉條口犢鼻髀闗申脉中門承扶等三十一穴是也有偏宜灸者若絡却玉枕承靈角孫神道膏肓㑹隂横骨青冷淵等一十六穴是也其他並欲通行灸刺亦有不宜灸刺者皆有所禁若神庭腦户顱􅇟承泣膻中神闕氣衝五里三陽絡承筋之類皆不可刺腦户風府癋門承光素髎攢竹睛明迎香頭維下闗脊中心俞白環腧天牖人迎淵腋少商經渠天府陽池五㑹陽關伏兎之類皆不可灸又有鳩尾雖在可刺更宜精詳之石門雖在可刺在婦女則為大禁肩髃本不禁灸亦不宜多灸四肢雖亦可灸在法惟宜少灸此數者皆灸刺之先務不可不知也若不當灸而灸不當刺而刺皆有所傷内經所為刺禁其法曰刺頭中腦户立死刺面中溜脉不幸為盲刺客主人内陷及刺目上陷骨中脉為内漏而聾刺舌下中脉大過血出不止為瘖刺缺盆中内陷氣泄令人喘欬逆刺乳上中乳房為腫根食刺膺中陷中脉為喘逆仰息刺腋下脇間内陷令人欬刺脊間中髓為傴刺臂太隂脉出血多立死刺肘中内陷氣歸之為不屈伸刺手魚腹内陷為腫刺氣街中脉血不出為腫鼠鼷刺少腹中膀胱溺出令人少腹滿刺足少隂脉重虚出血為舌難刺隂股中大脉血出不止死刺隂股下三寸内陷令人遺溺刺膝臏出液為跛刺郄中大脉令人仆脫色刺闗節中液出不得屈伸刺腨腸内陷為腫刺跗上中大脉血出不止死刺足下布絡中脉血不出為腫刺中五臟皆死又有大禁二十五者即五里穴也所謂迎之五里中道而止是也其次無刺大醉令人氣亂無刺大怒令人逆氣故曰大醉無刺以刺無醉大怒無刺以刺無怒以至大勞新飽大飢大渇大驚大恐皆在切禁若誤犯之各有可救之理具於後云竒經八脉論論曰脉有竒常十二經者常脉也竒經八脉則不拘於常故謂之竒經盖言人之氣血常行於十二經脉其諸經滿溢則流入竒經焉竒經有八脉督脉督於後任脉任於前夾任脉者衝脉能為諸脉之海陽維則維絡諸陽隂維則維絡諸隂隂陽更相維持故諸經常調維脉之外又有帶脉者束之猶帶也至於兩足蹻脉有隂有陽陽蹻得諸太陽之别隂蹻本諸少隂之别譬猶聖人圗設溝渠以備水潦斯無濫溢之患人有竒經亦若是也今總集竒經八脉所發者氣穴去處共成一編督脉督脉者起於小腹以下骨中央女子入繫廷孔之端其絡循隂器合簒間繞簒後别繞臀至少隂與巨陽中絡者合少隂上股内後亷貫脊屬腎與太陽起於目内眥上額交巔上入絡腦還出别下項循肩髆内挾脊抵腰中入循膂絡腎其男子循莖下至簒與女子等其少腹直上者貫腹中央上貫心入喉上頥環脣上系兩目之中此生病從少腹衝心而痛不得前後為衝疝女子不孕癃痔遺尿嗌乾治在督脉督脉之别名曰長強俠腎上項散上頭下當肩胛左右别走太陽入貫膂實則脊強虚則頭重取之所别故難經曰督脉起於下極之腧並於脊裏上至風府入屬於腦上巔循額至鼻柱陽脉之海也此為病令人脊強反折督脉從頭循脊骨入骶長四尺五寸凡二十七穴任脉任脉者與衝脉皆起於胞中循脊裏為經絡之海其浮而外者循腹上行㑹於咽喉别而絡唇口血氣盛則肌肉熱血獨盛則滲灌皮膚生毫毛婦人有餘於氣不足於血以其月事數下任衝並傷故也任衝之交脉不營其口脣故髭鬚不生以任脉為病男子内結七疝女子帶下瘕聚故難經曰任脉起於中極之下以上毛際循腹裏上闗元至咽喉上頥循靣入目屬隂脉之海也凡此任脉之行從胞中上注目長四尺五寸總二十四穴陽蹻脉陽蹻脉者起於跟中循外踝上行入風池其為病也令人隂緩而陽急兩足蹻脉本太陽之别合於太陽其氣上行氣并相還則為濡目氣不營則目不合男子數其陽女子數其隂當數者為經不當數者為絡也蹻脉長八尺所發之穴生於申脉以付陽為郄本於僕參與少隂㑹於居髎又與手陽明㑹於肩髃及巨骨又與手足太陽陽維㑹於臑俞與手足陽明㑹於地倉又與手足陽明㑹於巨髎又與任脉足陽明㑹於承泣以上為陽蹻脉之所發凡二十穴陽蹻脉病者宜刺之隂蹻脉隂蹻脉者亦起於跟中循内踝上行至咽喉交貫衝脉此為病者令人陽緩而隂急故曰蹻脉者少隂之别别於然谷之後上内踝之上直上循隂股入隂上循胷裏入缺盆上出人迎之前入鼻屬目内眥合於太陽女子以之為經男子以之為絡兩足交脉長八尺而隂蹻之郄在交信凡隂蹻脉病治在交信衝脉衝脉者與任脉皆起胞中上循脊裏為經絡之海浮而外者循腹上行㑹於咽喉而絡脣口故曰衝脉者起於氣衝並足少隂之經俠臍上行至胷中為散此為病令人氣逆裏急在難經則曰並足陽明之經以穴攷之陽明之經俠臍左右各二寸而上行少隂之經俠臍左右五分而上行鍼經所載衝脉與督脉同起於㑹隂其在腹也行乎幽門通谷隂都石闗商曲肓腧中注四滿氣穴大赫横骨凡二十二穴皆足少隂之分也然則衝脉並足少隂之經明矣陽維脉陽維脉者維於陽其脉起於諸陽之㑹與隂維皆維絡於身若不能相維故為病則悵然朱志溶溶不能自收持其脉氣所發别於金門以陽交為郄與手足太陽及蹻脉㑹于臑俞與手足少陽㑹於天窌又㑹於肩井其在頭也與足少陽㑹於陽白上於本神及臨泣上至正營循於腦空下至風池其與督脉㑹則在風府及瘖門凡此陽維脉氣所發二十四穴也隂維脉隂維脉者亦維絡於身溢畜不能環流灌溉諸經者也隂維則維於隂其脉起於諸隂之交其病與陽維同其脉氣所發者隂維之郄名曰築賓與足太隂㑹於腹裏及大横又與足太隂厥隂㑹於府舎及期門與任脉㑹於天突及亷泉天突在結喉下宛宛中亷泉在舌本下凡此隂維脉氣所發共一十穴帶脉帶脉者起於季脇迴身一周其為病也腰腹縱容如囊水之狀其脉氣所發在季脇下一寸八分正名帶脉謂其迴身一周如帶也又與足少陽㑹於維道凡此帶脉所發共四穴也熱病灸刺法論黄帝治熱之穴五十九腧頭上五行五行謂督脉所過者上星􅇟㑹前頂百㑹後頂共五穴為一行兩傍各一行謂五處承光通天絡却玉枕各二共十穴又次兩傍各一行謂臨泣目窓正營承靈腦空等各二共十穴凡二十五穴以越諸陽之熱逆也大柱膺俞缺盆背腧此八者以瀉胷中之熱也大柱屬足太陽膺腧即中府屬手太隂缺盆在肩上屬手陽明背腧即風門熱府屬足太陽氣街三里巨虚上下亷此八者以瀉胃中之熱也八穴並屬足陽明經雲門髃骨委中髓空此八者以瀉四時之熱也雲門係手足太陽髃骨即肩􅀈係手陽明蹻脉之㑹委中膕中央係足太陽髓空即愈係督脉五臟腧旁五此十者以瀉五臟之熱也謂魄户神堂魂門意舎志室等各二係足太陽經也右五十九穴者皆熱之左右也故熱病則刺之又有刺熱之法肝熱則刺足厥隂少陽心熱則刺手少隂太陽脾熱則刺足太隂陽明肺熱則刺手太隂陽明腎熱則刺足少隂太陽凡熱病未發但見赤色來皆熱診也在顔為心熱在頥為腎熱在鼻為脾熱在左頰為肝熱在右頰為肺熱見赤色當急刺之審其井榮經腧之分在隂則補陽瀉隂在陽則補隂瀉陽刺熱之大法也熱穴之外别有遺法備載於後鍼經直說踝中腕骨是也肩解背後縫是也手陽明大腸經上柱骨缺盆外横骨是也䪼顴外是也顴謂項骨也足厥隂肝經足跗足面是也脇膝下是也膕屈心是也巔頂心是也人迎氣顙上兩傍動脉是股大腿是也督脉從人中入巔下項龍是也足少陽膽經頰車寜車捲兩二穴是也髀厭膝下腿上節處是也輔骨腹外是也絶骨外踝上是也三毛大指上三毛是也馬刀挾癭肐肘底肐􅭫是足少隂腎經踹内腿肚是也痿厥節弱是也手少隂心經銳骨掌下節骨是也手厥隂心包絡經心包包裏心之内是也大動心腫是也手太隂肺經胃口後門是也腋下臑内臂節是也足太陽膀胱經髆肩後是也膂脊内傍肉是也髀樞髆骨節是也足陽明胃經頥後下亷頥下周環是也乳内亷乳内中間是也賁嚮腹脹氣上撞是也上曰膺下曰胷骭骨䯒骨是也手少陽三焦經膻中胷乳之間是也足太隂脾經核骨孤拐骨是也䯒骨脛足骨是也得後大便是也與氣下氣是也若擬得與下氣注觧為說文理反害經意不可宗則王氷之解素問後之明者多有議論取舍豈止二公焉竇漢卿鍼經氣血問荅予問脉之理果是氣邪果是血邪荅曰氣血之波瀾身體之橐籥此說特未契理脉者陌也䰟魄之生氣血之府也天地之祖萬物之宗此說極有意味吾常擬此予問經之理果何意邪荅曰經者氣血經厯之路也故曰經予問身寸之寸擬何寸荅曰以中指大指相屈如環内側文兩角為寸各隨大小取之手太隂經起自肺何邪荅曰食入於胃輸精於脾播氣於肺此之謂也問曰周身之穴各有兩如補瀉時只刺病所兩穴俱刺邪荅曰不然隨病左右而補瀉之左則左補瀉右則右補瀉問曰何為絡荅曰横者為絡絡穴一十有五門鍼經云灸㡬壯鍼訖而復灸何也荅曰鍼則鍼灸則灸若鍼而弗灸若灸而弗鍼問曰榮衛之理果何為邪荅曰難經云血為榮氣為衛榮行脉中衛行脉外問撚鍼之法有左有右何謂之有左何謂之有右荅曰以大指次指相合大指往上進謂之左大指往下退謂之右如内鍼時須索一左一右普濟方卷四百十
