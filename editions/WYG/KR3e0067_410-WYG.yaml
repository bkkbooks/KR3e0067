body:
  text: 普濟方卷四百十明周王朱橚撰鍼灸門論灸之名黄帝問岐伯曰余聞九鍼之名上應天地四時陰陽願聞其方傳於後代岐伯對曰九針者一曰鑱針二曰圓針三曰鍉針四曰鋒針五曰䤵針六曰圓利針七曰毫針八曰長針九曰大針此是九針之名九針所應一天二地三人四時五音六律七星八風九野人之身形亦應之也鍼各有所宜人皮應天人肉應地人脈應人人筋應四時人聲應音人陰陽合氣應律人齒面目應星人出入氣應風人九竅三百六十五絡應九野故一針皮二針肉三針脈四針筋五針骨六針調陰陽七針益精八針除風九針通九竅除三百六十五節氣此之謂各有所主也黄帝問曰人生有形不離隂陽天地合其别為九野分為四時月有大小日有短長萬物並至不可勝量虚實呿吟敢問其方岐伯曰木得金而伐火得水而滅土得木而健金得火而缺水得土而絶萬物盡然不可勝竭故針有懸布天下者五黔首共餘食莫之知也一曰治神二曰知養身三曰知毒藥為真四曰制砭石小大五曰知腑臟血氣之診五法俱立各有所先今末世之刺也虚者實之滿者泄之此皆衆工所共知也若夫法天則地隨應而動和之者若響隨之者若影道無鬼神獨來獨往黄帝曰願聞其道岐伯曰凡刺之真必先治神五藏已定九候已偹乃後存針衆脉不見衆凶弗聞外内相得無所形先可玩往來乃施於人人有虚實五虚勿近五實勿逺至其當發間不容瞚手動若務針耀而匀静意視義觀適之變是謂冥冥莫知其形見其烏烏見其稷稷從見其飛不知其誰伏如横弩起如發機黄帝曰何如而虚何如而實岐伯曰刺虚者須其實刺實者須其虚也經氣以至慎守勿失淺深在志逺近若一如臨深淵如握虎神無營於衆物今列孔穴圗經於後者也論三陽三隂經脉夫黄帝正經者是先聖之遺教乃後人之令範是以先明流注孔穴麻指的其原若或苟從異說恐乖正理之言其十二經脉者皆有俞原足陰陽之交㑹血氣之流通外營指節内連臟腑故經云手三陽之脉從手至頭手三隂之脉從手至胷足三陽之脉從足至頭足三隂之脉從足至胸是謂日夜循環隂陽會合又曰春夏刺淺秋冬刺深縁春夏陽氣在上人氣亦在上故當淺取之秋冬陽氣在下人氣亦在下故當深取之足以春夏各致一隂秋冬各致一陽者也然春夏温必致一隂者初下針沉之至腎肝之部得氣乃引致之隂也秋冬寒必致一陽者乃初内針淺而浮之至心肺之部得氣而内之陽也是謂春夏必致一隂秋冬必致一陽者也凡孔穴流注所出為井所流為榮所注為俞所過為原所行為經所入為合此針之大法也春刺井夏刺榮季夏刺俞秋刺經冬刺合也肺出少商為井手太隂脉也流於魚際為榮注於大淵為俞過於列缺為原行於經渠為經入於尺澤為合心出少衝為井手少隂脉也流於少府為榮注於神門為俞過於通里為原行於靈道為經入於少海為合心包絡脉手厥隂之脉也出於中衝為井流於勞宫為榮注於大陵為俞過於内闗為原行於間使為經入於曲澤為合大腸出於商陽為井手陽明脉也流於二間為榮注於三間為俞過於合谷為原行於陽谿為經入於曲池為合三焦出於闗衝為井手少陽脉也流於腋門為榮注於中渚為俞過於陽池為原行於支溝為經入於天井為合小腸出少澤為井手太陽脉也流於前谷為榮注於後谿為俞過於腕骨為原行於陽谷為經入於小海為合足三隂三陽穴流注者胃出厲兊為井足陽明脉也流於内庭為榮注於陷谷為俞過於衝陽為原行於解谿為經入於三里為合膽出竅隂為井足少陽脉也流於俠谿為榮注於臨泣為俞過於邱墟為原行於陽輔為經入於陽陵泉為合膀胱出於至隂為井足太陽脉也流於通谷為榮注於束骨為俞過於京骨為原行於崑崙為經入於委中為合脾出隠白為井足太隂脉也流於大都為榮注於太白為俞過於公孫為原行於商邱為經入於陰陵泉為合肝出大敦為井足厥隂脉也流於行間為榮注於太衝為俞過於中都為原行於中封為經入於曲泉為合腎出湧泉為井足少隂脉也流於然谷為榮注於太谿為俞過於水泉為原行於復溜為經入於隂谷為合也論虚實補瀉夫能知迎隨之理可令調氣調氣知方者必在隂陽然所謂迎隨者知榮衛之流行經脉之往來也隨其逆順而取之故曰迎隨調氣之方必在隂陽者知其内外表裏隨其隂陽而調之故曰調氣之方必在隂陽者也夫用鍼刺者須明其孔穴虚實補瀉送堅付軟以急隨緩榮衞常行勿失其理故經云虚則補之實則瀉之不虚不實以經取之然虚者補其母實者瀉其子當先補而後瀉不實不虚以經取之者然是正經自生其病不中他邪當自取其經故言以經取之又云刺榮無傷於衛刺衛無傷於榮然針陽者卧針而刺之刺隂者先以左手捻按所針榮俞之處候氣散乃内針是謂刺榮無傷於衛刺衛無傷於榮也又云東方實西方虚瀉南方補北方者然是金木水火土當互相平也縁東方木西方金木欲實金當平之土欲實木當平之金欲實火當平之水欲實土當平之東方者肝也則知肝實西方者肺也則知肺虚瀉南方補北方者南方火火者木之子也北方水水者木之母也水勝火子能令母實母能令子虚故瀉火補水欲令金不得平木也經言不能治其虚何問其餘此之謂也論下針分寸夫言氣實者熱氣虚者寒也針實者以右手持針左手捻按開針穴以㵼之針虚者以左手閉針穴以補之補瀉之時與氣開闔相應是謂針容一豆補瀉之理也又云虚者徐而疾實者疾而徐徐即是瀉疾即是補補瀉之法一依此也下針之時揑取穴置針於榮上三十六息以左手搯穴令定法其地不動右手持針象其天而運轉也於此三十六息然定得針右手存意捻針左手揑穴可重五兩已來計其針如轉如不轉徐徐下之若覺痛即可重二兩若不覺以輕下之入榮至衛至疾得氣如有魚食釣即得其病氣也量其輕重以經取之名曰疾徐者至病即得氣欲出針時子午緩緩而出令引病氣不絶名曰徐也既引氣多一向無補名之曰瀉問曰凡下針時若何是好荅曰徐徐下之堅持為實凡下針先須持針堅得安穏不用飽食亦不用空肚欲患人欲針針者有乗車來者有步行來者如人行十里許須令坐息安神定氣乗車者如人行三里許患人嘿嘿而不言安大坐候氣脉安定乃可下針又云夫針之者不離身心口如㘅索目欲内視消息氣而不得安行針針入一分知天地之氣針入二分知呼吸之氣針入三分知逆順之氣針皮毛者無傷肌肉針肌肉者無傷筋脉針筋脉者無傷骨髓針骨髓者無傷諸絡東方甲乙木主人筋膜南方丙丁火主人血脉西方庚辛金主人皮毛北方壬癸水主人骨髓中央戊己土主人肌肉針傷筋膜者令人愕視失魂針傷血脉者令人煩亂針傷皮毛者令人上氣失魂針傷骨髓者令人呻吟失志針傷肌肉者令人四肢不收失智也刺若中心一日死刺若中肝五日死刺若中腎六日死刺若中肺三日死刺若中脾十日死刺若中膽一日半死又云無刺大醉無刺大怒無刺大勞無刺大飽無刺大飢無刺大渇無刺大驚已上古之深誡也氣血問答黄帝問曰十二經中氣血多少可得聞乎岐伯對曰其可度量者中度也以經水應十二經脉也谿谷逺近深淺氣血多少各不同其治以鍼灸各調其氣血合而刺之補虚瀉實皆須盡知其部分也肝足厥隂經少氣多血心手少隂經少血多氣脾足太隂經少血多氣肺手太隂經少血多氣腎足少隂經少血多氣膽足少陽經少血多氣小腸手太陽經多血少氣胃足陽明經多血多氣大腸手陽明經多血多氣膀胱足太陽經多血少氣心包絡手厥隂經多血少氣三焦手少陽經多氣少血視其部中浮經其色多青則痛多黑則風痺黄赤則熱多白則寒五色皆見寒熱也感虚則留於筋骨之間寒多則筋攣骨痛熱多則骨消筋緩也經脉統論經脉者其氣始從中焦注手太隂陽明陽明注足陽明太隂太隂注手少隂太陽太陽注足太陽少隂少隂注手心主手厥隂少陽少陽注足少陽厥隂厥隂後㑹於中焦注手太隂此榮氣之序也榮氣之行常循其經周身之度一十六丈二尺一日一夜行八百一十丈計五十度周於身衛氣則不循其經焉晝則行陽夜行於隂行陽者行諸經行隂者行諸臟凡刺之道須候衛氣所在然後迎隨以明補瀉然榮衛之行未始相從則氣血之分亦各有在一脉之間有所謂是動者有所謂所生病者此氣血之異也經曰刺榮無傷衛刺衛無傷榮鍼陽者卧鍼而刺之鍼隂者攝按氣散而内鍼兹其要妙榮衛之外有浮絡者有經筋者又有别絡者其生病各不同刺法亦宜有異焉刺齊論所謂刺骨無傷筋刺筋無傷肉刺肉無傷脉刺脉無傷皮刺皮無傷肉刺肉無傷筋刺筋無傷骨是也知此乃知淺深之齊氣血之分故十二經立其常五十五絡通其變邪在經則巨刺邪在絡則繆刺邪在榮則調之血邪在衛則調之氣邪在筋則刼刺之然後原九鍼之宜行十二刺之節明五變之理審其部分刺道思過半矣今於逐脉之下載其經穴與其病證兼及浮絡經筋之病共為一編竅穴雖同而淺深各有部分在用鍼者以意審之骨度統論凡用鍼當先明骨節骨節既定然後分别經絡所在度以身寸以明孔穴為施刺灸觀病在或淺或深若在皮毛若在血脉是動者治其氣所生病者治其血在浮絡之血在筋者以燔鍼刼刺之有餘則瀉不足則補不盛不虚以經取之治之大體也然人身骨本之數三百六十有五以應一朞之日骨節所在大小長短廣狹厚薄或隠或顯有勢有體無體有腋無腋皆有定體實刺法之先務也内經俱載但有骨空去處其骨度之説徒有其名未載其法至於三百六十之數因亦泯然使用鍼之人妄意腧穴不知骨節本原徒為鍼灸未得其法枉傷肌肉良可惜也今摭自古醫經有骨度之數析骨之論凡三百六十五骨之法以此論骨骼其庶矣故著於篇以冠鍼法之首云離合真邪說古有離合真邪云者葢聖人欲使其真邪相離而勿合之謂也若邪入於真則真受其蠧而不遂其純一之真真之不遂則其所為真也罹害有不可言者其被乎邪則邪竊其柄而肆其横逆邪既肆其横則其邪之為患復可勝言哉嗚呼真邪之不可合也如此胡為真胡為邪真之為言也天理流行賦與萬物得以為生者皆真也聖人保之如持盈滿邪之為言也天地間非四時五行之正氣而差臻迭至者皆邪也聖人避之猶避矢石其防㣲杜漸之嚴如是者淵乎㫖哉葢真立則邪退邪厲則真淺邪固可除真尤宜養養之道無須異求但飲食男女節之以限風寒暑濕禦之以時復能實慈恕以愛人虚中懐以應物念慮必為之方舉止必為之敬如斯内外交養周備則吾之生不求生而生無期壽而壽矣不然攝養或少不嚴則六邪乗隙競入諸疾交生衆害並作則吾生之真所與存者有㡬故聖人憂之為揆度權衡機宜所在示之以尅邪之方使屏之如雪汙受刺而無遺者以此古人有云植徳務滋除惡務盡亦此意也然去邪之方經所具存再拜遺銓敬為節録手足三隂三陽表裏支干配合係晝夜百刻十二時定體圗説手太隂肺經配手陽明大腸經相為表裏立手為上手太隂肺經五穴為隂穴大指内側角起少商魚際太淵經渠尺澤肺屬金在支為未在干為辛手陽明大腸經六穴為陽穴從大指次指内側角起商陽二間三間合谷陽谿曲池大腸屬金在支為卯在干為庚此之謂隂陽表裏支干配合也手厥隂心包絡經配手少陽三焦經相為表裏立手為中手厥隂心包絡經五穴為隂穴從中指之端起中衝勞宫太陵間使曲澤心包屬火在支為己在干為乙手少陽三焦經六穴為陽穴從小指之端去爪甲角起闗衝液門中渚陽池支溝天井三焦屬火在支為寅在干為甲此之謂隂陽表裏支干配合也手少隂心經配手太陽小腸經相為表裏立手為下手少隂五穴為隂穴從小指内側角起少衝少府神門靈道少海心屬火在支為午在干為丁手太陽小腸經六穴為陽穴從小指之端去爪甲分起少澤前谷後谿腕骨陽谷小海小腸屬火在支為辰在干為丙此之謂隂陽表裏支干配合也足厥隂肝之經配足少陽膽經相為表裏足厥隂肝經上内踝八寸交出太隂之後此所謂交經五穴為隂穴從足大指端大敦行間大衝中封曲泉肝屬木在支為亥在干為乙足少陽膽經六穴為陽穴從小指次指之端起隂竅夾谿臨泣邱墟陽輔陽陵泉膽屬木在支為申在干為甲此之謂表裏隂陽支干配合也足太隂脾經配足陽明胃經相為表裏足太隂脾經却交入厥隂之前五穴為隂穴從大指内側端起隠白大都太白商邱隂陵泉脾屬土在支為丑在干為巳足陽明胃經六穴為陽穴從足大指次指之端起厲兊内庭陷谷衝陽解谿三里胃屬土在支為酉在干為戊此之謂隂陽表裏支干相配合也足少隂腎經配足太陽膀胱經相為表裏足少隂腎經五穴為隂穴從足心陷中起涌泉然谷大谿復溜隂谷腎屬水在支為子在干為癸足太陽膀胱經六穴為陽穴從小指外側起至隂通谷束骨京骨崑崙委中膀胱屬水在支為戌在肝為壬此之謂隂陽表裏支干相配合也此手足三隂三陽十二經六十六穴井榮腧經合配金木水火土經絡流注或交或正表裏内外支干配合諸家鍼經圗說分析講解故從而述其大槩質之於先生而證之力所不逮理所未同復被教誨指訣僅得泮然氷釋沛然川决胷臆有學問幸不致自相矛盾凡刺孔穴名有所據經絡究所係疾證日辰禁忌虚實補瀉不可不察深明經之分孔穴所在如此者百無一殆手少陽三焦經手厥隂心包絡經直說手少陽三焦經諸陽氣之父屬腑手厥隂心包絡經隂血之母屬臟絡說絡一十有五有横絡有經絡一萬八千有孫絡不知其紀絡穴說絡穴正在兩經中間假令立身又手取之大指次指端盡處手腕後髙骨縫列缺是也内為手太隂肺經外手陽明大腸經列缺邪交兩經之中若刺絡穴表裏皆治他皆倣此絡穴辨流注六十穴内無此一十五絡穴一十二經毎經絡各有一絡穴外有三絡穴陽蹻絡在足太陽經隂蹻絡在足少隂經脾之大絡在足太隂經此一十五絡穴之辨也交經辨足厥隂肝經上内踝八寸交出足太隂脾經之後足太隂脾經却交出足厥隂肝經之前竇太師鍼灸法流注八穴交經八穴者鍼道之要也然不知郭氏之所術但序云乃少室隠者之所傳也近代往往用之彌驗予少時嘗得其本於山人宋子華子華以此術行於河淮間四十年起危篤患隨手應者豈勝數哉予嗜此術亦何啻伯倫之嗜酒也第恨斯學之初心術未常手法未成而兵火荐至家藏圗籍與其的本悉亡之今十五年矣切求而莫之獲近日得之於銅堂碑字王氏家其本悉如舊家所藏但一二字訛及味之亦無所害矣予復試此一一精曉疾莫不瘳苟診視之明俾上下合而攻之如㑹王師擒微姦捕細盗雖有不獲者寡矣噫神乎哉是術也今得之亦天之厚予於是者多矣然予之所嗜非欲以藉此而私已之為也蓋欲以民生舉無痒癎疾痛痼羸殘瘵之苦而為之也惟學者亦嗜是焉如是非予之所敢知也八穴交㑹公孫通衝脈合於胷心胃内闗通隂維臨泣通帶脈合於目銳眥耳後頰頸肩缺盆胷膈外闗通陽維後谿通督脉合於内眥頸頂耳戸衝􅈩小腸膀胱申脈通陽蹻列缺通任脈合於肺糸喉嚨胷膈照海通隂蹻定八穴所在公孫二穴足太隂脾之經在足大指内側本節後一寸陷中令病人坐踡兩足底相對取之合内闗穴内闗二穴手厥隂心之經在手掌後二寸令病人穏坐仰手取之獨㑹臨泣二穴足少陽膽之經在足小指次指本節後一寸陷中一云去俠谿一寸五分令病人􅂷足取之亦合於外闗外闗二穴手少陽三焦經在手腕後二寸别起心主令病人穏坐覆手取之獨㑹後谿二穴手太陽小腸之經在手小指外側本節後陷中令病人穏坐覆手取之合申脈申脈二穴足太陽膀胱經在足外踝下赤白肉䧟中令病人􅂷脚坐取之側卧取亦得合於後谿穴照海二穴足少隂腎之經在足内踝下赤白肉際陷中令病人穏坐足底相對取之合列缺列缺二穴手太隂肺之經在腕後一寸半兩手相乂指頭盡處筋骨罅間是合照海八孫穴計治二十七證九種心痛心胃痰膈涎悶心胃臍腹痛并脹三焦胃脇肋疼痛心胃産後血迷心主胎衣不下小腸胃泄瀉不止大腸胃痃氣疼痛心胃裏急後重大腸三焦傷寒結胷小腸心水膈酒痰肝胃中滿不快反胃嘔吐胃腹脇脹滿痛脾胃腸風下血大腸包絡大人小兒脫肛不收屬大腸肺氣膈心肺食膈不下胃脾食積疼痛胃脾癖氣并小兒食癖小腸心主兒枕痛小腸三焦酒癖胃三焦腹鳴小腸胃血刺痛肝脾大腸胃小兒脾瀉脾腎瀉腹痛胷中刺痛心瘧疾心痛心包絡右件病證公孫悉主之先取公孫後取内闗秋冬一寸春夏七分灸七壯内闗二穴主治二十五證心胷痞滿肝胃吐逆不定脾胃中滿不快心胃傷寒不觧心主胷滿痰膈肺心腹痛胃泄瀉滑腸大腸酒痰膈痛心主米穀不化胃横竪痃氣肝胃小兒脫肛大腸肺九種心痛心主胃脇肋痛肝膽婦人血刺痛肝腸鳴大腸積塊痛肝脾男子酒癖脾肺水膈并心下痞痛脾胃氣膈不下食胃心肺腹肋脹痛脾胃心主腸風下血大腸傷寒結胷胃裏急後重小腸食膈不下食心主胃瘧疾寒熱右件病證内闗悉主之秋冬針一寸半春夏針入一寸灸二十壯臨泣穴主治二十五證足跌腫痛胃手足麻小腸三焦手指戰掉肝心主赤眼并冷淚膀胱咽喉腫痛三焦手足攣急