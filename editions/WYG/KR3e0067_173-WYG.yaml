body:
  text: 普濟方卷一百七十三明周王朱橚撰積聚門久積癥癖附論癥之為病雖有形證推之不動癖之為病僻在脇肋按之水鳴此皆飲食留滯所致也不即治日漸増長盤結牢固邪氣日盛令人正氣衰微累歳不已甚則身痩腹大名曰久積癥癖方五石烏頭丸治男子女人百病虚弱勞冷宿寒久癖及癥瘕積聚或嘔逆不下食并風濕諸病無不治之者鐘乳錬硫黄礬石紫金英一作紫石英枳實赤石脂甘草白术紫苑防風白薇山茱茰桔梗天雄皂莢細辛蓯蓉人參附子去皮蔾蘆一兩六銖麥門冬乾薑吴茱茰蜀椒桂心各二兩半烏頭三兩厚朴逺志茯苓各一兩半當歸二兩棗膏五合乾地黄一兩十八株右為末錬蜜和擣五千杵如梧子大酒服丸日三稍加之夾食丸一名丁香丸出聖濟總録治癥癖食氣食勞五隔痰逆并夾食血氣疼痛乳香别研如粉木香丁香肉豆蔲去殻當歸切焙青橘皮去白焙京三稜炮剉各半兩紫苑去苖土乾薑炮細剉附子炮裂去皮臍巴豆去皮心别研紙裹衣壓去油各一兩鱉甲去裙欄用醋蘸慢火炙令黄色二兩丹砂一分别研如粉右除乳香丹砂巴豆外擣羅為末然後乳香等三味同研令勻都入臼中用蕎麥麫與藥末臨時以意㸔多少如麫擣徐徐入新汲水擣候可丸即止丸如菉豆大煎淡漿水令沸旋旋入藥煮三五沸漉出於日中曝乾毎服五丸食後用茶酒温水下要轉時只以冷茶下熱茶投即行也紫金丹出聖濟總録治男子婦人久氣塊癥癖兩脇下積冷胸腹氣刺痛鐡滓一斤淘净控乾硫黄半斤水飛過硇砂二兩右三味先取鐡滓硫黄二味於瓷噐内用米醋一斗慢火煎硫黄火上無熖即煿乾刮此二味入瓷合内固濟了用大火煆三度畢取合内藥再用水飛不用鐡滓控硫黄令乾入細瓷合内坐在平地别用火一秤煆至火盡取出入硇砂二兩同研令細再入合内用火一斤就灰池中養三日放冷取二兩再入下項藥硇砂半兩木香末丁香末膩粉丹砂研肉豆蔲去殻末乾漆炒煙盡研胡椒末阿魏用醋化麫和作餅子焼熟為末各一錢砒霜末一分半右一十味研細再同硫黄研勻用酒醋鍾半煎五靈脂薄麫糊丸如梧桐子大每服從五丸漸加至二十丸以意加减服若取積滯癥癖及酒食積急氣冷氣一切滯氣等疾更入後藥巴豆仁研一兩大㦸末半兩芫花末半兩草烏頭一分五靈脂末一兩膩粉二錢硇砂研半兩右七味以米釅醋二升入銚子内熬成膏便與前藥末搗為丸如梧桐子大量虚實加减服送一丸加用醋湯或茶清下礞石丸出華陀中藏經方治男子婦人逺年積氣消磨癥塊取虚中積脇肋堅硬腹刺痛及治脾滯氣酒食所傷飲食不化惡心嘔逆胸膈不快不思飲食胸腹脹滿臍脇有塊心脾冷痛口吐酸水停飲冷痰痃癖癥瘕發痛無度翻胃轉食面黄痩乏四肢頭面浮腫臟腑不調裏急後重及十隔氣虚中有積婦人血氣塊硬悉主之礞石半兩青色者生用擣羅為細末硇砂丁香桂去麄皮乾薑炮各二兩木香京三稜煨剉蓬莪荗煨剉芫花醋浸一宿炒煎檳榔煨剉為末猪牙皂夾去皮炙黒肉豆蔲仁各一兩青橘皮湯浸去白焙白豆蔲仁墨焼八分熟各半兩巴豆一兩半去皮心膜出油浸胡椒一分大黄一兩半半兩生用半兩煨熟半兩炒焦粉霜細研一分右為末用醋三升飛硇砂於銀石噐中文武火熬二十沸次入巴豆又熬五七沸次入礞石京三稜末又熬三五沸次取白麺二兩以無灰酒半升調入藥中又熬一兩沸次入大黄末又熬三兩沸次下諸藥末不住用栁木杖子攪勻候稠擣千杵丸如菉豆大每服三丸不問男女長幼心痛醋湯下左脇下疼煎薑棗湯下右脇下疼煎木香湯下婦人血癖血氣炒生薑醋湯下乆患冷痢煎黄連湯下小兒常服冷水下有姙者不得服小兒以意减丸數陳橘皮煎丸出聖濟總録治乆積冷氣攻心腹疼痛痰癖嘔逆腹脹滿不思飲食肌膚痩瘁腰膝倦痛下痢洩㵼瘧疾膓風并婦人血海乆冷無子陳橘皮湯浸去白焙十五兩别擣為末巴㦸天去心石斛去根牛膝酒浸切焙萆薢各三兩肉蓯蓉酒浸切焙鹿茸去毛酒炙杜仲去麄皮炙剉菟絲子酒浸三日别擣剉附子炮裂去皮臍陽起石酒浸研如粉厚朴去麄皮生薑汁炙甘草炙剉一兩吴茱茰湯洗焙乾炒當歸切焙乾薑炮京三稜煨剉右為末先以好酒五椀於銀石噐内煎橘皮末令如餳入藥攪匀再擣三五百杵稍乾更入酒少許和丸如小菉豆大每服二十丸至三十丸空心温酒下塩湯下亦得治一切塊癖積氣血聚等一二十年疾細墨半兩焼芫花醋浸炒焦赤青礞石大㦸子乾漆炒五靈脂荆三稜蓬莪荗蜜陀僧陳皮牡蠣各半兩巴豆一兩去皮濕紙三四重裹焼紙焦整大棗十四箇去核白丁香硇砂研䖟蟲去翅足班蝥去翅頭各一分右為細末酒醋煮糊為餅子每服十餅用煮麺湯送下宜食前服温白丸出鮑氏方治心腹積聚乆癥癖塊腹脹心下堅結大如杯椀傍攻兩脇心痛積年食不消化等病並治之紫苑净洗二分吴茱茰二分净擇塩水洗過菖蒲一分去蘆米泔浸過一宿水洗柴胡二分去蘆頭水洗過厚朴去皮生自然汁浸炙香熟桔梗皂莢去皮尖子茯苓各二分桂心三分生用乾薑炮黄連各二分蜀椒三分用紙襯於銚内出汗去根枝用巴豆去皮了秤二分用麫炒令麸稍焦為度爛研巴豆以紙裹壓出油如此三度換新紙然後入衆藥人參各三分本方各二分烏頭十分炮裂後掘地坑内之用盞子盖一饌間却出烏頭去尖皮再切用右擣篩以白蜜和更擣二千五杵丸如梧子大有病服一丸至二丸不知稍增至三丸五丸以知為度主心腹積聚乆癥癖塊大如杯椀黄疸宿食朝起嘔吐肢滿上氣時時腹脹心下堅結上来搶心傍攻脇徹背連胸痛無常處繞臍攪痛狀如蟲咬又療十種水病八種痞塞翻胃吐逆飲食噎塞五淋九種心痛積年食不消化或婦人諸疾斷緒不生帶下淋瀝或痎瘧連年不差又療一切諸風身體頑痺不知痛癢或半身不遂或疼痛或眉髪墮落又療七十二種風三十六種遁尸疰或癲癎或婦人五邪失心夣與鬼神交通四肢沉重不能飲食昏昏黙黙口欲取死終日憂愁心中不樂或恐懼悲啼飲食無味月水不調直似懐孕連年累月羸痩困敝遂至於死或歌或哭為鬼所亂莫之知也但服此藥者莫不除愈臣之方騐便合藥與婦人服之十日下出癥癖蟲長二尺五寸三十枚下膿二升黒血一升青黄汁五升所苦悉除當日有子臣兄堕馬被傷腹内有積血天隂即發羸痩異常命在旦夕與藥服下如鷄肝黒血如手者二百餘片白膿二升赤黄水一升其病即除臣之方騐敢不獻上忌生冷酥滑猪鷄魚犬牛馬鵝肉五辛油麺豆糯米陳臭等物一方無肉桂用生薑湯下木香丸出聖濟總録治逺年癥塊積聚木香硇砂研當歸切炒各一兩礞石研三分大黄煨剉陳麺不蚛者炒麥蘖炒墨研白麫各半兩大㦸炒乾漆炒煙出豉少許膩粉各一分巴豆仁一錢一分不出油研右為末以臈月雪水同搗三二百杵丸如菉豆大每服一丸空心用乾柿爛嚼裹藥随所傷物煎湯下不得吐津鱉甲丸出聖濟總録治乆積癥瘕鱉甲大者一枚浄洗去筋膜麺裹外面二三分厚上面用紙固濟泥一風爐子安鱉甲在上面别入桃仁半斤去尖皮雙仁研以米醋四升無灰酒三斤硇砂三兩同攪拌旋入向鱉甲中煎為膏取出用合盛却将鱉甲去紙泥炙令黄色青橘皮去白炒麥藥炒沉香剉肉豆蔲去殻各三兩丁香木香㯽榔半生半熟陳麹炒京三稜煨剉大黄生剉厚朴去粗皮生薑拌炒令紫各二兩柴胡去苖半斤桂去粗皮二兩右為末再研令勻用桃仁煎并熟蜜和丸如梧桐子大空心米飲下二十丸水銀丸治久虚損癥癖水銀豉研礞石末滴酒和勻瓷合内慢火逼乾各半兩膩粉京三稜末石三稜末鷄𤓰三稜末粉霜白丁香末硇砂研各三錢肉豆蔲去殻研㯽榔各二枚為末丹砂三錢研右合研勻細用棗肉和丸如菉豆大每服五丸温水下又一方治丈夫病入蘹香補骨脂各一分治婦人病入血竭没藥各一分三稜丸治多年積氣癥癖京三稜煨剉鷄𤓰三稜煨剉陳橘皮青橘皮各湯浸去白焙巴豆去皮心膜出油石三稜煨剉各五兩㯽榔十枚半生半熟剉肉豆蔲十枚去殻醋浸二宿丁香益智出皮各一兩木香二兩硇砂一兩半飛過右為末醋煮麫糊和丸如梧桐子大每服三丸如當心氣塊茱茰湯下左右氣塊木香湯下本臟氣塊蘹香子湯下人參丸治久癖塊聚心腹脹滿人參元參沙參丹參防風去叉苦參附子炮裂去皮臍各一兩巴豆去皮心煮研去油三十粒蜀椒去目并閉口炒出汗一分乾薑炮半兩䗪蟲三枚熬葶藶炮炒研一合右為末錬蜜和丸如梧桐子大每食後米飲下一丸未利再服一方用大黄四兩蓬莪荗散治久積癥癖氣不散脇下似覆杯多吐酸水面目萎黄或腹中疼痛蓬莪荗一兩鱉甲二兩塩醋炙令黄去裙闌赤芍藥半兩肉桂一兩去皴皮枳殻一兩麸炒當歸一兩剉乾薑半兩京三稜一兩泡剉川大黄一兩剉碎㣲炒木香一兩柴胡一兩半去苖㯽榔一兩右件為散每服三錢水一中盞入生薑半分煎至六分去滓不計時候温服三稜沒藥丸治逺乆沉積塊疼悶京三稜泡廣茂煨㯽榔鱉甲醋炙石礬焼赤青皮去油乾漆炒煙盡雷丸各半兩丁皮硇砂沒藥各二錢右為細末醋糊為末如菉豆大每服五七丸白湯下食前日進四服丁香丸治乆積食癖心腹時發疼痛胸膈不快痰逆惡心臟腑不調不思飲食或下痢膿血裏急後重􅄆惡氣逐滯結丁香木香桂去粗皮阿魏麫裹煨去麫研麝香研硫黄研水銀二味於盞内結成硇砂研粉霜胡粉研明一分巴豆去皮心右十一味搗羅三味為末與八味合研勻用安息香半兩酒化濾過入蜜少許重湯同熬和劑旋丸如梧桐子大每服三丸至五丸臨時煎生薑棗湯下更㸔虚實加减取下積聚惡物為効三稜湯治乆積癥癖不散心下結成狀如伏梁京三稜炒鱉甲醋炙去裙襴大腹剉炒各一兩桂去粗皮白芍藥陳橘皮去白焙當歸切培枳殻去瓤麸炒髙良薑各三分木香訶梨勒煆去核半兩右細剉每服五錢水一盞半煎取八分去滓温服鱉甲丸治乆癖結兩脇臍下堅如石按之痛劇食飲不下鱉甲去裙襴醋炙二兩牛膝酒浸切焙芎藭防葵當歸切焙乾薑炮桂去粗皮附子炮裂甘草炙各一兩大黄剉一兩半巴豆一枚右為末錬蜜和丸如梧桐子大每服空心温酒下三丸加至五丸日一服以利為度一方用細辛四分粥飲下大黄丸治乆積癥癖堅牢羸痩不能飲食宜服川大黄一兩剉乾薑一兩炮川芒硝一兩桔梗一兩石膏半兩甜葶藶一兩半赤茯苓半兩附子半兩泡杏仁半兩湯浸川烏頭半兩泡川椒半兩去膜右件藥為末入研了藥令勻錬蜜和搗三二百杵丸如菉豆大每服不計時候温酒下二十丸蓬莪荗丸治乆積癥癖氣攻左脇如覆杯及婦人血瘕蓬莪荗炒一兩桂去粗皮三分􅆚藥㯽榔剉枳殻去瓤當歸切焙木香昆布洗去鹹汁沉香剉白芷炒各半兩右為末錬蜜和丸如梧桐子大每服二十丸煨薑木𤓰湯下木香丸出聖濟總録治五毒五積五勞并一切氣疾癥癖塊及逺年積丁香半兩附子泡裂烏頭去皮㯽榔剉芫花醋炒大㦸炒甘遂炒紫苑去苖各一分硇砂醋飛過焙乾研一兩膩粉研一分半右一十味先将八味搗羅為細末入藥研和勻麫糊丸如梧桐子大每服七丸至十丸醋湯下消積丸出聖濟總録治乆積癥癖冷熱不調痰逆否悶心腹刺痛喘滿膨脹泄利羸困不思飲食代赭煆醋三七遍研礞石研各一兩白茯苓去黒皮桂去粗皮青橘皮湯洗巴豆去皮心各半兩京三稜煨剉楝實肉各一分硇砂研三分右為末拌勻酒煮麫糊和丸如梧桐子大每服二丸木香湯下㸔虚實加减桃仁􅄆出聖恵方治乆積癥癖氣結不散面色萎黄羸痩食少宜服桃仁一兩湯浸去皮尖䨇仁鱉甲二兩半塗醋炙令黄京三稜一兩泡剉當歸三分剉肉桂一兩去皮枳實一兩麸炒木香半兩㯽榔三分川大黄三分剉右件藥為散每服三錢水一中盞入生薑半分煎至六分去滓不計時候温服麝香丸出聖恵方治乆積癥癖氣不差或於脇肋作塊形大如杯或如鷄子大透隠皮膚或時疼痛堅硬如石宜服麝香一兩細研蓬莪荗三兩萆薢二兩剉芫花二兩醋拌炒神麹一兩炒鱉甲二兩塗醋炙大麥蘖一兩炒乾漆一兩搗碎炒京三稜二兩剉右件藥為末入麝香研令勻用醋煮麫和丸如梧桐子大每服食前温酒下十丸附子丸治乆積癥癖腹滿不能食附子一兩泡巴豆三十枚䗪蟲五十枚川椒一合去目乾薑半兩防葵一兩甜葶藶一合川大黄一兩剉右件為末研入巴豆令錬蜜和搗三二百杵丸如梧桐子大每服食前下三丸巴豆丸出聖恵方治乆積癥癖及一切惡氣並服巴豆一兩去皮硇砂一兩飛研京三稜一兩剉香墨半兩青橘皮二兩湯浸附子一兩泡裂乾漆一兩川大黄一兩剉右件藥京三稜乾漆為末入在巴豆醋内同熬及一半次入硇砂更熬令稠後下大黄青橘皮附子香墨等和搗三二百杵丸如菉豆大每服空心煎橘皮湯下三丸血癥塊即用當歸酒下一切惡物温酒下比金丸出聖濟總録治久積伏滯成塊婦人血癖血塊及産後敗血不行兒枕刺痛小兒如癖常服利胸膈除傷滯沒藥研一錢五靈脂研半兩皂荚去皮子末三錢白丁香雄者研硇砂研乳香各錢半巴豆一百粒去皮心右為細末用大􅀥十枚去核刮巴豆膏入在棗内線纒了慢火炙熟去線搗爛與前項藥末合勻搗成泥丸如菉豆大大人臟腑實者五丸虚者三丸小兒芥子大一嵗三丸五七嵗以上七丸十嵗以上十丸取積用焼皂子膿煎湯放冷下利胸膈用棗二枚爛嚼裹藥乾嚥不得嚼藥並臨卧服急患不拘時一方粥飲下硇砂丸出王氏博濟方治乆積癥癖塊心腹脹滿胸膈不利痰實胃脹喧硇砂好者二錢狼毒剉醋炒乾芫花醋浸一宿乾漆炒煙出鱉甲炙各一兩雄黄好者一分巴豆三七粒右為末和勻煮麫糊丸如豌豆大每服三丸食後臨卧温生薑湯下京蓬煎丸出聖生㧞萃方治痰癖消癥塊冷熱積聚胃膈疰悶通利三焦升降隂陽順一切氣消化宿穀京三稜二兩酒浸冬三日枳殻麸炒去瓤廣茂二兩醋浸冬二日木香末青皮去油茴香㣲炒㯽榔各一兩右為細末水糊為丸豌豆大每服三十丸生薑湯下加硇砂水銀治肉積神麯麦蘖治酒積水蛭䖟虫治積血木香㯽榔治氣積甘遂牽牛治水積雄黄膩粉治涎積礞石巴豆治食積要在臨時通變也療腹中癥癖兼虛熱者不用純冷專㵼藥宣覊縻攻之方鱉甲炙龜甲炙桑耳金色者泡大黄吴茱茰防葵各八分附子泡四分右搗篩蜜和為丸如梧桐子大酒服十丸日再服漸加一丸以㣲洩為度無所忌日晚服馬莧汁三四合以差為期馬齒菜即馬莧也忌猪肉冷水京三稜丸出聖恵方治久積癥癖氣不差令人羸痩不思飲食京三稜二兩川烏頭一兩泡硇砂一兩陳橘皮二兩乾薑一兩泡雄雀糞一兩微炒右件藥為末入硇砂研令勻以醋煮麫糊和丸如梧桐子大每於食前以酒下十丸沉香三稜煎丸出聖濟總録治臟腑乆積氣塊冷痞不思飲食沉香人參各一兩青橘皮湯浸去白焙一兩半京三稜三兩搗末右以三味為入三稜硇砂煎内和丸成劑有餘煎更於火上慢熬搗千百杵丸如桐子大每服三十丸食前米飲下婦人醋湯下日再三稜草煎方出夲草治癥癖又主鼓脹滿右以京三稜切一石水五石去滓更煎三斗汁銅噐中重釜煎如稠糖出内蜜噐中每服一匙用酒一盞服之日二每服常令酒氣相續熨癥癖方出聖恵方吴茱茰一升川烏頭三兩右件藥搗碎用醋拌炒令熱分作二包更畨熨之治乆積癥癖及元氣急痛方出聖恵方川烏頭二兩泡川椒一兩去目右件藥為末用鷄子白和丸如麻子大每服不計時候温酒下十丸治乆積癥癖及心腹鼓脹並宜服此方出聖恵方右用烏牛尿五升於銀噐中微火煎如稀餳每服空心以熱酒調下一匙頭服後當腹中鳴轉病出隔日更服防葵丸出聖濟總録治癥癖氣塊脇肋妨滿腹脹腹痛不能飲食防葵剉碎柴胡去苖赤茯苓各三分桂去粗皮木香各半兩鱉甲去裙襴炙黄色㯽榔剉各一兩半桔梗炒郁李仁湯浸大黄炒一兩當歸切焙京三稜泡剉五味子各半兩右除研外搗羅為末入郁李仁同研勻錬蜜丸如梧桐子大空腹温酒下二十丸一方有赤芍藥無赤茯苓鱉甲丸出聖濟總録治癥癖氣塊鱉甲去欄醋炙黄色木香烏頭泡裂去皮柴胡去苗各一兩半當歸切焙京三稜泡剉桂去粗皮厚朴去粗皮陳橘皮各二兩甘草炙剉㯽榔剉各半兩大黄剉碎炒朴硝研如粉各三兩右除朴硝擣羅為末同研令勻煉蜜和丸如梧桐子大空心服用温酒下十丸米飲下亦得大㦸丸出聖濟總録治癥癖化氣取食積及本臟氣水痰蟲脹大㦸半兩芫花醋炒一兩巴豆一百粒去皮油甘遂乾薑炮陳橘皮去白焙硇砂姜黄桂去粗皮各一分右為末於銀噐内炒令極熱勿令焦錬蜜丸梧桐子大常服生薑湯下一丸如取轉量臟腑虚實加减㯽榔湯出聖濟總録治癥癖腹滿如鼓坐卧不安食即欲吐氣悶喘急㯽榔二兩赤茯苓去黒皮芍藥京三稜陳橘皮湯浸各一兩半郁李仁湯浸退皮一兩食茱茰三分右粗搗篩每服三錢水一盞煎至七分去滓温服空心午後用柴胡湯出聖濟總録治癥癖氣腹痛脇肋脹滿不思飲食柴胡去苖赤茯苓去黒皮各三分桔梗炒木通炙芍藥鱉甲去裙欄炙黄色郁李仁湯浸各半兩右粗搗篩每服三錢以水一盞煎至七分去滓温服空腹午後用五食丸治虛積食氣蠱脹水氣年深癥癖大㦸刮去皮甘遂各半兩猪牙皂荚生去皮子一兩胡椒一分芫花半兩醋浸一宿炒乾巴豆半兩去皮右為末合研勻水煮麫糊和丸如菉豆大每服五丸用米麫菜肉豆煎湯放温下量病人大小加至七丸婦人有胎不可服牛膝丸出聖濟總録治癥癖積聚牛膝酒浸芍藥桔梗赤茯苓去黒皮厚朴去粗皮大黄剉炒茈胡去苖訶梨勒各三兩陳橘皮去白㯽榔剉各一兩枳殻炒一兩右末錬蜜和丸如梧桐子大每服二十丸空心棗湯下加至三十丸通利為度消癖丸出危氏方治彌年經吐汗下營衛虧損邪氣伏藏脇間結為癥癖腹脇疼痛芫花炒硃砂各等分右為末鍊蜜丸如小豆大每服十丸濃煎棗湯下去癖須用芫花大㦸破水之劑下後即與養胃湯治癥癖出本草右用馬莧汁飲之小兒服尤良金寳神丹楊氏家藏方治諸積癖塊血刺心腹下痢赤白及婦人崩中痛下一切虚冷之疾尤治飲食過多臟腑滑泄乆積乆痢並皆治之青礞石半斤細羅過將消石二兩細研右件滴水圎如小鷄頭大候乾再入乾鍋内少火煆火紅収之每有虚冷病服一丸至二三丸空心温水送下少食壓之乆病泄痢加至五七圎或十丸不妨烏金餅子治堅瘕積塊状如覆杯腹不下食及至婦人血氣刺痛乾漆一兩炒焙出為末没藥一分硇砂一錢右為細末棗肉和圎如桐子大作餅子每服三餅子男子塩湯婦人醋湯食後服治癥癖血瘕破血出本草右用馬鞭草作煎如糖酒服治風冷癥癖出本草右用木天苓苖藤切以酒浸服或以釀服大効治癥癖病又治痃癖氣鱉甲訶梨勒皮乾薑右各等分細末為丸空心下三十丸日再服如専治痃癖氣可醋炙鱉甲大黄為末以牛乳一合和一匙可朝朝服之又和琥珀大黄作散酒服二錢少時惡血即下若婦人小腸中血下盡即休服療癖令人肥悅出本草右用理石漬酒服之治老癖能為寒熱者出本草右用蛤蜊煮食之治積塊用山中生小蒜以醋服之甚効癥瘕附論夫癥瘕者皆由寒濕不調飲食不化與臟氣虚冷所生也其病不動者直名為癥若病雖有結瘕而可推移者名為瘕瘕者假也謂虚假也脉動可候其人發語聲嘶浥舌語而不出此人食結在腹其病寒口中常有水出四體灑灑常如發瘧飲食不能常自鬰鬰而痛此食癥病也診其脉沉而中散者寒食癥也脉絃𦂳而細癥也若在心下則寸口脉絃𦂳在冐管則關上絃𦂳在臍下則尺中絃𦂳診脉癥法左手脉横癥在左右手脉横癥在右又脉頭大在上頭小在下脉来遲而牢者為病癥也腎脉小急肝脉小急心脉若數皆為癥寸口脉結而伏者腹中有癥不可轉動必死不治方硇砂丸治血氣癥瘕氣塊黄痩者肚痛不忍硇砂三錢全蝎二錢丁香二錢蓬术半兩三稜半兩沒藥半兩芫青二錢紅娘子二錢虻䖝二錢水蛭二錢阿魏半兩乾漆四錢炒地膽半兩炒斑蝥二錢炒海馬一對醋炒甘草半兩人參半兩當歸一兩狗脊半兩穿山甲三錢蛤粉麝香少許右為細末醋糊為丸梧子大每服二三十丸空心醋湯送下如意丸治積聚塊痛疝瘕癥癖等疾沉香木香大丁香萆澄茄使君子辣桂川白薑桃仁五靈脂硇砂醋浸半兩雄黄好沒藥大㦸牽牛炒取末巴豆去油各一分荆三稜末蓬莪术肉豆蔲各半兩右為末水煮麫糊丸如麻子大每服二丸加至三丸止温酒下化癥丸治丈夫婦人小兒年深日近沉積瘕塊面色青黄時上搶心吐水吞醋舌生白沬婦人積年月經不調漸成血氣或血蠱塊中焦之間覆如杯椀連年累月漸至痩瘠寒熱徃来一切脾胃受寒乆不痊愈之疾並皆治之巴豆五兩丁皮二兩木香一兩半蓬莪荗三兩荆三稜三兩丁香兩半厚朴三兩石菖蒲二兩良姜一兩半䖟蟲一兩半川牛膝一兩石蓮子二兩薏苡仁一兩使君子三兩香附子四兩炒右為末稀麫糊為丸如菉豆大積年癥瘕成塊第一服用熟水下二十丸自後每日三丸更量虛實加减五日去盡積塊日近脾胃有積者每服五丸飯飲吞下婦人血氣成塊及血瘕每服二十丸蘓木用酒童子小便各一半煎五七沸温酒空心吞下自後每日用温酒下三丸其血塊逐旋消從大小二便去盡自知小兒蜖蟲腹痛不能忍日夜呌喚橘皮湯下七丸諸蟲皆宣下常服白湯或薑湯下三五丸中酒及酒積大便鮓臭者白湯舊酒各半吞下七丸一切噫塞心下硬痛加棗湯下五丸不拘時候大黄丸治久積癥瘕發動心腹疼痛不可忍大黄二兩雄黄半兩麝香二錢天雄一兩炮硃砂一分胡椒半兩巴豆十四枚㯽榔四兩當歸一兩桂心一兩木香半兩京三稜二兩犀角屑一兩乾薑半兩炮右件藥為末入研了藥令勻錬蜜和擣三二百杵丸如小豆大每服空心以酒粥飲下七丸防葵丸治癥瘕喘嗽腹中疼痛喫食减少四肢乏力防葵三分桂心半兩木香半兩桔梗三分吴茱茰半兩鱉甲一兩半川大黄一兩剉京三稜三分當歸半兩赤􅆚藥三分五味子半兩㯽榔一兩半郁李仁一兩湯浸右搗藥為末錬蜜和搗三二百杵丸如梧桐子大每服不計時候以酒下二十丸三聖丸治積年癥癖瘕塊諸藥療理不瘥至效舶上硫黄一兩水銀半兩硇砂一分右三物乳鉢内研如粉却以生銕銚内用文武火熬鎔成汁以火筋攪令勻停冷刀剗下以紙裹置地坑内埋一宿取出再研細次以赤芍藥當歸京三稜蓬莪荗紅花各一分並細剉以法酒一升煎及一半漉出砂盆内研生布袋取汁再熬令冷入飛羅麫為糊搗丸如菉豆大治因産後傷於飲食結伏在腹脇特發疼痛不可忍者當歸酒浸一升逐旋一升煖每服磨癖塊空心温酒下三丸至五丸所有藥渣瀝了焙乾為末别入乾地黄半兩真蒲黄芫花各一兩右為末以前一般糊丸如菉豆大治婦人血臟冷氣攻心疼一切血疾温酒十丸木香丸治癥瘕心腹脹痛胷膈煩悶不欲飲食四肢少力木香三分肉桂三分砒霜一分大㦸一分剉京三稜半兩附子半兩焙乾薑半兩炮乾漆半兩搗碎膩粉青橘皮半兩巴豆半兩去皮心右件藥為末入膩粉巴豆更研令勻用軟糯米飲和丸如小豆大每服空心以粥飲下三丸硇砂丸出聖恵方治癥瘕腹内疼痛硇砂一兩鱉甲一兩川大黄一兩剉木香三分肉桂三分附子三分泡巴豆半兩㯽榔三分京三稜二兩乾薑三分泡皂莢五挺取汁為膏右件藥為末入研了藥令勻以皂莢膏和丸如菉豆大每服空心以生薑湯下三丸京三稜散治癥瘕氣腹脹痛京三稜一兩柴胡三分桔梗一兩木通一兩當歸三分剉赤茯苓三分赤芍藥半兩陳橘皮半兩鱉甲半兩郁李仁三分湯浸右件藥為散每服三錢以水一中盞入生薑半分煎五分去滓温服日三四服鱉甲丸治癥瘕或寒或熱羸痩不欲飲食鱉甲一兩桑耳二兩吴茱茰三分龜甲一兩附子半兩泡防葵三分白术半兩川大黄一兩剉京三稜一兩剉右件藥為末錬蜜和擣三二百杵丸如梧桐子大每服以温酒下二十丸日三服大通丸治癥瘕神効川烏頭二兩泡硫黄一分芫花一兩巴豆一兩去皮心杏仁一兩半麝香一分黄丹一分炒猪牙皂莢一兩去黒皮自然銅一兩細研右件藥為末入研了藥令勻用黒豆麫和丸如菉豆大以研了自然銅末滚過服空心煎生薑橘皮湯下三丸元胡丸解化傷滯内消飲食治吐利腹脹心腹刺痛癥瘕結氣蟲煩不安調順三焦安和脾胃元胡當歸青皮去白雄黄蓬莪荗㯽榔木香各四兩荆三稜六分右為細末入雄黄勻水麫糊丸如梧桐子大每服三十丸生薑湯下不拘時候三稜湯治癥瘕痃癖積聚不散堅滿痞隔食不下腹脹荆三稜二兩白术一兩蓬莪荗半兩當歸半兩㯽榔木香三分右為末每服三錢沸湯㸃服食後一日三服薑湯調服亦可頂珠丸治積氣塊痛乆年脾積癖瘕之疾丁香木香淡豉硇砂朱砂各一分巴豆一錢半右為末陳米飯為丸如梧桐子大輕者一丸重者二丸臨卧先嚼煨薑如指許嚥下次以冷熟水吞藥不得嚼破上項一兩丸子請酌量用芎藭散治癥瘕乆不瘥令人不能食羸痩少力芎藭一兩桂心一兩鱉甲二兩川大黄二兩㯽榔一兩京三稜一兩微炒右件藥為散每服四錢以水一中盞入生薑半分煎至六分去滓温服日三治癥瘕不消宜服此方出聖恵方川大黄三兩剉鱉甲二兩㯽榔二兩桃仁一兩湯浸枳殻二兩麸炒右件藥為末用釅醋三升和攪令勻以慢火熬候可丸如梧桐子大每服空心以温酒下二十丸以通轉為度消石大丸治二十癥瘕及婦人帶下絶産無子并欲服寒濕散而腹中有癥瘕實者當先服之大丸下之後與寒食散大丸不下水穀但下病其不令人困硝石六兩人參甘草各二兩大黄半兩右為末以三年苦酒三升置銅噐中以竹筯柱噐中一升作一刻凡三升作三刻以置火上先内大黄常攪不息手使微沸盡一刻乃内餘藥又盡刻餘一刻極㣲火使可丸如鷄子大中黄凡合藥當先齋戒一宿勿令小兒女奴婢人等見之欲下病者用二丸若不能服大丸者可分作小丸然亦不可過四丸也丸欲令大不欲令細能不分為善若人羸者可少與強者可二十日五服和調半日乃下若婦人服之下者或如鷄肝或如米汁正赤黒或一升或三升下後慎風冷作一杯粥飲之後作弄臛自養如産婦法六月則有子禁生猪肉辛菜若寒食散者自如藥法不與此同日一服治癥瘕乆不瘥令人不食羸痩少力鱉甲三兩京三稜三兩桃仁二百枚右件藥鱉甲三稜為末先將桃仁水入鐺中煎三五沸次下藥末同煎至一升漸漸入酒二升熬如􅄳収瓷合中於食前以温酒調下一匙治癥瘕方右用㩂樹白皮煎令可丸服之取知病若不動减之療癥瘕乆痼冷病右以雄雀屎蜜和丸飲服或和少乾薑服之大肥恱人療癥瘕㾬瘧并治五痔隂蝕濕癉女子隂隱瘡及骨節中寒熱右以鱉甲水煮作浴漬之甚良積氣丹治一切新乆沉積氣塊面黄黒痩有氣無力癥瘕積聚口吐酸水㯽榔二枚芫花一兩荆三稜鷄𤓰黄連牛膝章栁根各一兩青皮陳皮石菖蒲各三錢巴豆木香各二錢半大㦸川大黄甘遂白牽牛乾薑炮青礞石乾漆各半兩蓬莪荗一兩硇砂二兩肉豆蔲二枚右為末醋麫糊丸如梧子大每服一丸臨卧焼􅀥湯下每夜一丸有積者肚内作聲病退為度元胡丸治積聚癥瘕解中外諸邪所傷元胡青皮陳皮當歸木香雄黄荆三稜生薑各一兩右為末酒麫糊為丸如小豆大每服五七丸生薑湯下一握七丸治臟腑宿藴風冷氣血不和停滯宿飲結為癥瘕杯塊及婦人血瘕腸胃中寒飲食不下欬逆脹滿及下痢赤白霍亂轉筯及矮躄拳攣脚膝疼痛行歩不能常服建脾暖胃堅骨強陽神麹半斤大附子二枚炮甘草二兩炙右為末錬蜜丸每左手一握分作七丸細嚼米飲下如神木香丸治槃氣聚結癥瘕胷脇悶痛或吐酸水食後噫作生熟氣腹脹泄瀉及四肢浮腫木香硇砂蓬术胡椒半夏乾漆各半兩縮砂仁桂心青皮各三兩附子炮三稜各一兩白薑炮一兩右為末蜜丸如梧子大每服三五十丸生薑橘皮湯下空心服乾柿丸治多年積聚氣塊癥瘕取㩎食硇砂研砒霜粉霜乾漆鱉甲黄連各一分旋覆花京三稜各半兩杏仁去皮乾薑各兩皂莢四挺巴豆四十丸右為細末先将乾漆鱉甲京三稜三味用粟米一盞不淘洗釅醋五升同熬成粥入衆藥拌和丸如椀豆大每服三丸爛嚼乾柿裹藥臨卧温下黒神丸消化癥瘕積聚酒食毒及冷氣膨脹五隔噎氣婦人血氣木香一兩官桂二兩附子一兩當歸二兩乾薑二兩細墨一兩白术二兩荆三稜二兩陳橘皮四兩芫花四兩巴豆二兩㯽榔半兩硇砂半兩大黄半兩右十四味杵為末用醋麫糊為丸如麻子大如常服化酒食茶湯下三五丸醋心腹脹橘皮湯下治癥瘣生薑湯下婦人血氣紅花酒下多年饜食乾柿裹十丸生薑湯下臨卧服順氣丸治積聚癥瘕積年氣塊發則大膓閉得通利則病甦閉則復作大黄五兩半車前子㯽榔麻仁牛膝郁李仁兎絲山藥各二兩山茱茰防風枳殻獨活各一兩右為末蜜丸如梧桐子大茶酒米湯任下此藥補益通利䟽風順氣治癥瘕癖氣痞積聚冷氣血塊宿食吐痰水用青黒大巴豆勿令白膜破但去其殻作兩片清麻油略潤之空心温水吞下一枚以飲壓少時腹内如火利出惡物雖利不虚人若乆服亦不利膜破者不用全而一兩頭尖如棗核者名剛字能殺人治癥瘕積聚去三尸益氣延年却老右雄黄二兩細研為末九度水飛過却入新净竹筒内盛以蒸餅子一塊塞筒口蒸七度用好粉脂一兩為丸如菉豆大日三服酒下七丸十丸療癥瘕出本草右羊脂同蒜虀食一升良治腹内癥瘕出夲草右取鮀魚甲炙浸酒服之治癥瘕積聚去三尸輕身益氣延年却老百病不侵甚益人出本草右用天門冬不計多少去心皮為末每服方寸匕日三四服以酒飲之不絶治瘕出本草右用藊豆葉和醋煑服之治鷄瘕出本草以蘓木一升煑服昔南齊褚澄善醫為吳郡太守百姓李道念以公事到郡澄見謂曰汝有重病荅曰舊有冷病至今五年衆醫不瘥澄為診曰汝病非冷非熱當時食白瀹鷄子過多所致令取紫蘓一升煑服乃吐一物如斤涎裹之能動開看是鷄雛羽翅爪距具足能行走澄曰此未盡更服所餘藥又吐得如向者鷄十三頭而病都差當時稱妙一説乃是用蒜煮服之治癥瘕氣塊琥珀一兩鱉甲一兩京三稜一兩延胡索半兩沒藥半兩大黄六銖右六味一處為末空心酒調服三錢每日二服神効莫及治癥瘕腰痛用淡菜先煮熱漉出除去半邊鏁殻及毛将汁澄清再将淡菜半邊殻肉入内却入蘿蔔或紫蘇冬𤓰同煑食之妙治癥瘕用魚脂二升盛銅噐中作大火炷脂上撚之令煖徹於癥上熨之以紙籍腹上晝夜勿息火良治蛟龍病誤食蛟龍子入腹中堅痞如石用寒食餳三升每服五合一日三服遂吐出蛟龍有兩頭及尾寒食餳即寒食節日餳是也昔開皇六年有人正月食芹得之其病發似癎面色青黄服寒食餳二升日吐出蛟龍有兩頭大驗諸癥積氣在腹中乆不瘥牢固推之不移者癥也皆由寒温失宜飲食不節致臟腑氣虚弱飲食不息按之其壮如盃盤牢結乆不已令人身痩而腹大至死不消診其脉弦而伏其堅不轉動者死之候也方蜥蝪丸治癥堅水腫蜚尸遁尸百注骨血相惡氣鬼忤蠱毒邪氣徃来夢寤存亡留隠結積虎狼所嚙猘犬所咋鴆毒入人五臟服藥已消殺其毒食不消婦人邪鬼忤亦能遣之蜥蝪蜈蚣各二枚地膽五十枚䗪蟲䖟蟲杏仁各三十枚蜣蜋十四枚朴硝巴豆各一兩欵冬花犀角切片桃奴澤瀉桑赤鷄鬼督郵各十八銖芍藥虎骨各兩半甘草乾薑各一兩甘遂一兩右為末别治巴豆杏仁如膏内藥末研調下蜜搗二萬杵丸如麻子先食飲服三丸旦不知加知不敢吐下者一丸有人風冷注癖堅二十年者差乾漆丸出聖濟總録破癥塊消積氣乾漆四兩懐香子炒令香木香㯽榔桂去粗皮附子泡青橘皮白牽牛陳橘皮大黄蓬莪荗京三稜芫花各二兩五靈脂取灰二兩皂角長五寸右為末錬蜜和丸如梧桐子大每服生薑湯下二十丸至三十丸忌猪魚熱麫等物半夏礞石丸出聖濟總録治癥塊氣積下結胸一切積滯半夏四十枚巴豆四十粒杏仁去皮猪牙皂莢去皮四十挺礞石研丁香木香沉香各二錢㯽榔半兩膩粉硇砂粉霜各一分右將後八味搗研為末入在前膏子内一處再搗約令均丸小豆大㸔虚實煎棗湯下二丸爛嚼乾柿乾嚼下亦得硇砂丸治癥病不消四肢羸困不欲飲食乆不差硇砂一兩硫黄一兩木香半兩㯽榔一兩川大黄三兩牽牛子一兩吴茱茰半兩京三稜一兩當歸一兩剉肉桂一兩去皮青橘皮一兩鼈甲一兩右件藥為末入研了藥令勻錬蜜和擣三二百杵丸如梧桐子大每日空心及晚食前以温酒下三十丸巴豆丸出聖恵方治癥病乆不消令人萎黄羸痩不欲飲食巴豆一兩去皮硫黄細研附子泡五靈脂乾薑丁香木香肉豆䓻㯽榔硇砂乾漆已上各半兩右件藥為末入諸藥研令勻以麫糊和丸如黄米大每服空心以酒湯下五丸得下惡物為効大黄丸治癥病心腹妨悶不欲飲食四肢不知川大黄半兩剉木香半兩肉豆蔲半兩硇砂半兩乾薑半兩青橘皮三分湯浸吴茱茰一兩㯽榔半兩桂心半兩蓬莪荗一兩巴豆一分去皮右為末入巴豆硇砂研令勻以醋熬成膏和丸如梧桐子大每服空心以粥飲下三丸鱉甲丸治癥塊衝心氣滿食不下手足煩悶鱉甲去裙襴訶梨勒各二兩防葵甘草炙人參大黄各一兩半白术郁李仁去皮桂去粗皮杏仁去皮尖各一兩右除研外搗羅為末入郁李仁杏仁同研勻錬蜜丸如梧桐子大空腹温酒下二十丸漸加至三十丸以微利為度沒藥丸治癥積五積食氣諸藥無効者沒藥硫黄白丁香當歸芫花浸半日硇砂乳香丹砂各一兩巴豆四十九粒右為末合研勻用水浸炊餅和劑搗一千杵丸梧桐子大豆麻子三等大每一丸婦人血氣童子小便和酒下心頭髙鞕當歸酒下逺癥積氣生薑湯下小兒脾積癥氣臘茶清下大人與大丸十五以下與中等十嵗以下與第三等者取積一塊氣丸治男子婦人氣積牽牛末二兩㯽榔末一兩杏仁末一兩羗活末一兩神麹半兩麥蘖半兩雷丸肉半兩江子一兩黄岑一兩右為細末湯浸蒸餅丸如梧桐子大硃砂為衣每服三嵗服三丸五嵗服五丸大人服十丸快利為度臨睡温水服烏頭丸出聖恵方治食不消結成癥病川烏頭半兩京三稜半兩芫花半兩巴豆半兩去皮硇砂湯化硝石半兩川大黄半兩剉青橘皮半兩湯浸右件藥搗羅為末入巴豆研令勻以酒一升相和以慢火煎如稀餳火住後用丁香一分肉豆蔲半兩搗羅為末硃砂一分細研與前藥同和丸如菉豆大每日早晨以生薑橘皮湯下三丸夜臨卧時服京三稜丸出聖恵方治癥病結鞕心腹疼痛京三稜一兩半㯽榔一兩木香一兩乾薑一兩炮陳橘皮一兩桂心半兩當歸一兩剉巴豆半兩右件藥為末用醋熬巴豆成膏入前藥末和丸如梧桐子大每服空心以生薑橘皮湯下五丸當歸煑􅄆治諸癥結痛起於脇下按之而堅妨痛不能飲食漸加羸痩當歸鱉甲桂皮木香桔梗桃仁研如膏各一兩半吴茱茰半兩右除桃仁外搗羅為末入桃仁同研令勻每服三錢水一盞煎至六分去滓温服逐日空腹日一服夜半一服保命丸治積年血氣癥塊徃来疼痛吐逆不納飲食當歸烏頭芍藥桂各半兩大黄一兩乾薑半兩班蝥二十一枚右為末醋煑麫糊丸梧桐子大空心服食前温酒下一丸木香􅄶丸治癥塊消食積止心腹疼木香硇砂各一錢半夏十枚桂去粗皮蓽撥四十九粒巴豆二十一粒杏仁二十一粒右為末先将杏仁巴豆同研入泥以好米醋八分一盞熬至二分以下成稠膏入前藥末和勻再入棗肉丸菉豆大揑􅄶丸常服食後良乆一丸生薑湯下要轉三丸男子婦人心痛炒菜服醋湯下破積丸療積聚堅癥大黄一斤牡蠣三兩凝水石石膏石鐘乳理石各一兩右搗合下篩如蜜丸如梧桐子大先食酒服飲任下三丸日三不知稍増之以知為度治腹中積癥方出千金方右葶藶子一升炒以酒五升浸七日每服三合日三服粉砂餅出聖濟總録治癥塊輕粉胡粉各一兩硇砂丹砂白丁香膩粉各半兩右研為末入麫一兩水揑作餅如棊子大慢火焼熟每服一餅麝香米飲嚼破服五靈脂丸出聖恵方治癥病腹中結便五靈脂一兩防葵半兩桂心半兩猪牙皂莢半兩木香半兩右件藥為末入巴豆更研令勻用醋煑麫糊和丸如黍米大每服空心臨卧時以生薑酒下三丸木香丸治積年癥塊血氣凝滯吴茱茰木香青橘皮各半兩巴豆去皮十粒硇砂研一分右除硇砂外搗羅為末入巴豆硇砂研令勻於煻火中煨粟米飯丸菉豆大每服温酒下三丸至五丸食後服溏痢勿怪老小减服硃砂丸治癥病腹中硬痛不欲食經乆不差羸弱無力硃砂一兩肉桂一兩巴豆二十枚禹餘粮一兩紫石英一兩細研右件藥都研令勻以湯浸蒸餅和丸如菉豆大每服食前以温酒下五丸治積年癥塊及血塊方出聖恵方砒霜粉霜各一分硇砂一分半膩粉三分右件藥細研令勻用肥棗去核入藥在棗裏面以綿繫定用白麫餅子逐筒裏焼熟餅子為度取出去棗皮研熟丸如菉豆大每服空心及臨卧時以薑棗湯下三丸治癥病腹中結硬出聖恵方硫黄一兩硇砂一兩巴豆一兩附子一兩泡裂右件藥先用頭醋二升煑巴豆令赤色即出之却入冷水椀中浸兩炊乆洗净去皮心研如粉又以醋二升與巴豆同煎至一升後下硫黄硇砂附子等末以文火熬令稀稠得所别入乾薑末一兩和黍米大每服空心以生薑棗湯下三丸夜臨卧時再服續隨子丸治積聚癥塊及涎積等續隨子三十枚膩粉二錢青黛炒一錢右先研隨子令爛次下二味合研勻細以焼糯米輭飯和丸如鷄頭子大每服先焼大棗一枚剥去皮核爛嚼取藥一丸錐破并棗用同冷臈茶清下服後便卧並不攪至中夜後取下積聚惡物為効治癥堅心下有物大如杯不得食食則腹滿心腹絞痛方葶藶子大黄各二兩澤瀉四兩右别研葶藶為膏其二味搗五百杵入蜜更搗千杵和丸如梧桐子大每服五丸不知加之日三服治脇下有氣結者狼毒二兩旋覆花一兩附子二兩泡右搗篩蜜和丸如梧桐子大二丸稍加至三丸服之療癥病丸射菵二兩熬蜀椒三百枚右搗末細篩以鷄子白和丸半如麻子大半如赤小豆先服如麻子漸服如小豆二丸不知稍增之以知為度熨癥方竈中黄土一斤生葫一斤右先搗葫熟納土復搗以好苦酒澆冷浥浥先以塗布一面仍㩉病上又塗布上乾復易之取冷消止一方有桂熨癥方右以吴茱茰三升碎之酒和煑熱布裹以熨癥上冷更炒更畨用癥之移走逐熨都消乃止也肘後方云亦可用菵五兩茱茰末以鷄子白和塗上癥熨癥法右銅噐受二升許貯魚膏令深三二寸作大火炷六七枚燃之令膏煖重紙覆癥上以噐熨之盡夜勿息膏盡更益也凡癥堅之起多以漸生而有覺便年大者自難療也腹中微有結積便害飲食轉羸痩療多用䧟水王壺八毒諸大藥令止取小小易得者方右取虎杖根勿令影臨水上者可得石餘浄洗乾之擣作末以秫米五升炊飯内攪之好酒五斤漬封藥消飯浮可飲一斤半勿食他鮓鹽癥當出亦可取其根一斤乾搗千杵酒漬飲之從少起日三亦佳此酒療癥乃勝諸大藥又方大黄半斤朴硝三兩蜜一斤右合於湯上煎可丸如梧桐子大服十丸日三偹急文仲崔氏同惟崔氏用朴硝半斤蜜一斤半服二十丸日再服破癥散治心腹宿癥及卒得癥并治乆積癥癖不差漸至羸弱宜服此方右以硃砂細研搜飯令硃多以雄鷄一隻先餓二日後以硃飯飼之却置雞於板上收取糞曝燥為末温清酒服五分七可至方寸匕日三服若病困急者盡夜可五六服一鷄少更飼餘鷄取足鷄末食硃飯先飼令肥治癥積滿腹諸藥不差者人屎服之皆下血片塊二十日即出也椒熨方治患癥結病及𤓰病似𤓰形日月形或在臍傍左右或在臍上下或若别在左右肋下或當心合子大法先針其足以椒熨之右取新盆子受一斗者鑚一百二十孔上著一重紙上著冷灰上着熱灰半升上著則灰火一升經一食頃盆底熱徹當病上初安氈一重即安火盆火盤大熱以漸更加一重若火更熱不可忍加至三重暫歇進一冷日飲還上火硝二分許即停止經止日勿着令至七日决得稍瘥然後食羙食自補若小不瘥作露宿丸服之保安丸治癥積心腹内結如拳漸上不止搶心疼痛乆不止及遶臍腹痛不可忍者川大黄三兩乾薑一兩炮大附子半兩鱉甲一兩半右為末取三年米醋一大升先煎四五合然後合藥丸如梧桐子大每服十丸空心或醋或酒米飲下後取疾如魚腸膿血爛肉汁青泥當下京三稜湯治積年癥塊京三稜一兩青橘皮半兩桂去粗皮一兩大黄半兩木香一分㯽榔剉半兩右粗搗篩每服五錢七分水一盞半煎至七分去滓温服空腹日午夜卧各一服治諸瘕結氣出夲草右取赤龍浴水服之枳术湯出衛生寳鑑治心下堅如大盤飲水所作枳實白术各三兩右以水一斗煎至三升分三服腹中軟即消减之對病增損治癥結出本草右用磨石澆赤熱投酒中飲之暴癥附論病源云暴癥者中藏氣虚弱食生冷之物藏既夲弱不能消之結聚成塊卒然而無漸之暴癥也本中藏弱其癥暴生至於成病斃人最速方蜥蝪丸出聖恵方治暴癥堅結四肢痩軟身無力蜥蝪一枚蜈蚣一枚鬼臼漢防己一兩半當歸二兩半川大黄二兩剉川芒硝赤芍藥二兩右件藥為末錬蜜和搗三二百杵丸如梧桐子大不計時候温酒下十丸為度野葛丸出千金方治卒暴癥野葛一尺當歸附子雄黄細辛各一兩蜀椒半兩烏頭二兩巴豆右㕮咀以醋浸一宿猪膏一半斤煎附子色黄去滓内雄黄粉攪至凝傅布上以掩癥處復以油重布上復著紙重以熨斗盛火著其上常令熱日三夜二猪膏乾為度巴豆丸出聖恵方治暴癥氣攻心腹脹痛不欲飲食巴豆一分去皮心川大黄半兩剉乾薑半兩炮木香半兩蓬莪荗半兩右件藥為末入巴豆同研令勻錬蜜和丸搗三二百杵丸如小豆大每服空心以生薑湯下五丸治卒暴癥腹中有物如石痛如刀刺晝夜啼呼宜服此方出聖恵方右牛膝三斤去苗剉以酒一斗漬蜜封於熱灰中焼令味出每於食前量力頻服以差為度便吐去宿食神効又方出聖恵方右用商陸根不限多少剉搗蒸之以新綿裹熨病上冷即換之以衣物覆其上數日用旦夕勿息又方出聖恵方右蒴藋根二箇細剉以酒一㪷浸三五日每於食前煖一小盞服之治卒暴癥腹中有物出聖恵方右以五月五日蒜十片去皮桂一尺二寸竈中黄土如鴨子一枚合搗以苦酒和塗以布㩉病不過三次又方出肘後方右取橉木焼為灰淋取汁八升以釀一斛米酒成服之從半合始不知稍稍增至二升不盡一劑皆愈此灰入染綘用葉中釀酒也又方出聖恵方右以蠶沙一年桑柴焼灰一斗以水淋之五度取生鱉長一尺者内中煑之爛熟去骨細擘剉更煎令可丸丸如梧桐子大一服七丸日三食前以温酒下又方出肘後方右以大猪心一枚破頭去血搗末雄黄麝香當門子五枚巴豆百枚去心皮生用心縫以好酒於小銅噐中煎之㸔心沒欲歇隨益盡三升當糜爛煎令可丸如麻子服三丸日三服酒盡不糜者出搗蜜丸之良久大黄末半斤朴硝三兩蜜一斤合於湯上煎丸如梧子服十丸日三服之治卒暴癥腹中有物硬如石痛刺晝夜若不治之百日内死方見本門主暴癥用虎杖根酒漬服之食癥附論夫脾胃虛弱飲食類傷積乆不去結在腹内與正氣交争則心復鞭痛妨害飲食肢體消痩以手按之積塊有形謂之食癥方木香􅄆治食癥冷氣及傷寒後一切氣疾食物不消木香㯽榔青橘皮肉豆蔲食茱茰紅豆蔲乾薑白术葛根草豆蔲虎杖麻黄厚朴桔梗桂去粗皮羗活人參芎藭已上各等分右為細末每服三錢空心炒薑塩湯調下京三稜丸治食癥癖氣食勞宿食不消痰逆京三稜半兩乳香半兩木香半兩丁香半兩肉豆蔲半兩當歸半兩紫苑一兩五靈脂半兩青橘皮半兩乾薑一兩炮附子一兩炮硃砂半分硇砂一兩巴豆一兩半去皮猪牙莢一兩鱉甲二兩右件藥以乳香巴豆同搗如泥餘藥搗羅為末先以釅醋一斤化硇砂去石滓熬令稠入麫煑為糊和諸藥末令軟硬得所搗三五百杵丸如菉豆大每服以温酒下三丸至五丸化積丸治食癥積氣成塊胷膈痞悶腹脇脹滿宿食不消心腹疼痛不能飲食一名五積丸硇砂芫花巴豆各半兩乾漆一兩烏頭猪牙皂荚去尖各三分大黄一兩鱉甲青橘皮京三稜當歸陳麹炒各一兩木香桂去粗皮各三分右十四味搗羅八味用前藥和丸如菉豆大毎服二丸至三丸茶酒任下如取積量虚實加减三稜丸治食癥勞氣五積五隔脾胃乆冷喫食無味飲食不化四肢少力痰毒氣脹胸膈不利京三稜石三稜鷄𤓰三稜黒三稜各煨剉巴豆乾薑蓬莪茂附子泡各一兩丁香木香桂㯽榔青橘皮肉豆蔲各半兩右為末每秤一兩末别用巴豆七枚去皮心膜出油細研拌勻更用硇砂一分醋化煮麫糊和丸如麻子大丹砂為衣每服三丸至五丸生薑湯下黒金丸治食癥瘕癖聚血結刺痛一切疾沉香附子各半兩木香乾薑青橘皮炒細墨炒桂去粗皮京三稜蓬莪荗各一分大黄乾漆麝香各半兩硇砂研一兩右為末将京三稜蓬莪荗大黄硇砂四味用米醋煮爛研作糊入衆藥末和丸如梧桐子大每服十丸至十五丸薑塩湯下不拘時丁香丸治食癥氣堅腹中疼痛方見乆積類木香丸三稜丸治逺年食癥積氣并酒食所傷胸膈脹滿及婦人血塊木香京三稜補骨脂牽牛子丁香皮乾漆各一兩烏梅肉陳橘皮五靈脂末各二兩沉香半兩巴豆霜一分右搗羅九味為末入二味膏子和丸如菉豆大每服五丸至七丸食後臨卧生薑湯下㯽榔丸治食癥氣㯽榔木香郁李仁茈胡大黄枳殻桂訶棃勒草豆蔲乾薑右搗羅九味為末入郁李仁同研令勻錬蜜和丸如梧桐子大每服十五丸空心温酒下日晚再服穿山甲丸治食癥破結塊取積年食及積惡血氣並宜服此穿山甲乾薑硇砂一分半夏一分葳靈仙半兩班蝥一分肉桂一分川烏頭芫花巴豆右件藥為末入巴豆硇砂令勻用糯米飯和丸如豆大每服食前煎橘皮湯放冷下三丸硇砂丸治食癥結塊疼痛發渇化氣消酒食硇砂乾漆各一分木香蓬莪荗丁香京三稜青橘皮芫花各半兩肉豆蔲五枚巴豆一分半右將米醋一椀浸蓬莪荗芫花三稜一宿後焙乾與五味同搗羅為末入硇砂巴豆拌勻醋煑麫糊和丸如麻子大每服三二丸如要取轉㸔虚實加减生薑湯下婦人血氣醋湯下小兒疳氣甘草湯下男子膈氣龍瑙湯下㵼痢甘薑湯下澤漆丸出聖恵方治食癥癖氣脾胃虚弱頭面四肢浮腫欲變成水病者澤漆半兩㯽榔一兩附子一兩木香半兩肉桂半兩陳橘皮半兩湯浸澤瀉半兩川大黄半兩郁李仁半兩厚朴半兩去粗皮右件藥搗羅為末錬蜜和搗三二百杵丸如梧桐子大每服以温水下二十丸日三四服麥蘖丸出聖濟總録治食癥嚥酸吐津胷膈疼痛氣噎食飲進退麥蘖炒陳麹炒厚朴㯽榔紫苑鱉甲當歸大黄各半兩右麄搗篩每服五錢用水一盞半煎至七分去滓温服空心午時臨卧各一服八靈丸治食癥氣塊痃癖等疾京三稜石三稜鷄爪大連木香㯽榔各一兩肉豆蔲半兩巴豆硇砂研各一分右搗羅六味為末入巴豆霜硇砂末拌勻醋煑麫糊和丸如小豆大每服五七丸男子生薑湯下婦人醋湯下痃癖氣煎木香湯下硇砂丸出聖恵方治食癥及氣塊攻刺心腹疼痛不可忍硇砂半兩巴豆半兩乾薑一兩附子一兩炮青橘皮一兩湯浸京三稜一兩乾漆一兩香墨半錠右件藥各别搗細羅為散内取硇砂巴豆細研用頭醋兩椀煎為膏然後摠入諸藥末相和丸如菉豆大每服食前以温酒下三丸通靈丸出聖恵方治食癥及惡血氣五靈脂一兩巴豆一兩硫黄一兩杏仁一兩川烏頭一兩芫花半兩皂莢一兩自然銅一兩右件藥搗為末入巴豆研令勻别入生薑黒豆麫二兩拌和令勻滴水為丸如菉豆大每服以生薑湯下二丸膈上有涎即吐有滯食血氣即轉下礞石丸出聖恵方治食癥乆不消礞石半兩硇砂半兩乾漆一兩附子一兩泡京三稜一兩青橘皮一兩香墨半挺巴豆一兩去皮右件為末以頭醋三升化硇砂研巴豆大銀鍋子内微火煎成膏入諸藥末和丸如菉豆大每服三丸宿食不消茶下婦人血癥當歸酒下心痛橘皮生薑湯下治食癥心腹疼痛脹滿面色萎黄不下食宜服此方出聖恵方巴豆半兩京三稜二兩乾漆半兩川大黄半兩青橘皮一兩附子半兩泡硇砂一分香墨半兩右件藥搗羅都細研為末以醋煮麫糊和丸如梧桐子大每服食前以醋湯下五丸當下惡物即差如聖散治男子婦人飲食所傷結成積塊痞痛陳皮乾薑各三錢巴豆一錢甘草一錢半三稜莪术芫花三味各半右為末和勻餘醋煮糊為丸如菉豆大每服六七丸淡薑湯下木香丸出聖恵方治食癥及喫食不著木香一兩桂心一兩五靈脂一兩乾薑一兩泡乾墨一兩猪牙皂莢一兩去黒皮巴豆半兩去皮心右研為末入巴豆研勻用軟糯米飲和丸如菉豆大每服食前以生薑橘皮湯下五丸治年積食癥方出聖恵方青礞石一兩硇砂半兩芫花半兩木香一分丁香一分巴豆三十枚去皮川大黄三兩剉右件為末入諸藥同研令勻以頭醋二升熬藥令稠可丸即如菉豆每服食前以生薑湯下三丸治食癥結塊在腹内不能飲食面色萎黄宜服此方出聖恵方硇砂半兩芫花一兩麥蘖半兩炒青橘皮半兩猪牙皂莢五挺巴豆半兩去皮右件為末入巴豆都研令勻先将皂莢汁於鍋子内慢火煎成膏然後取藥末一半更入米醋一大盞同煎令稀稠得所其餘藥為末丸如梧子大每服以生薑橘皮湯下三丸萬金丸出聖恵摠録治食癥氣聚不消㯽榔肉豆蔲青橘皮乾薑木香各一兩巴豆去皮心五十粒右搗羅五味為末入巴豆同研令勻浸塩豉和丸如梧桐子大每服一二丸煎生薑橘皮湯下良乆以粥飲投之以利為度麝香丸出聖恵方治積年食癥麝香一分硇砂半兩川大黄半兩神麯一兩巴豆三十粒寒食白麫一兩生用右件為末入研了藥令勻用易州墨汁和丸如梧子大如是十年至十五年食癥即先嚼乾柿半枚裹藥一丸同嚥之如尋常食癥即丸如豌豆大茶酒任下一丸治卒食不消欲成癥積方出千金方右用煎艾汁如飴取半升作一服便盡吐出宿食一方用艾五尺圍一束苡薏根一大把二味同煎治雜食瘀滯不消心腹堅痛方出千金方右用水三升煑白塩一升令消分三服吐去所食并治暴癥巴豆丸出聖恵方治積年食癥巴豆十枚陳橘一兩川大黄三錢硇砂一錢神麹三錢芫花二錢右件藥為末入巴豆等同令研勻磨香墨濃汁和搗令勻丸如梧桐子大每臨卧時用乾柿一枚分為三分爛嚼破裹藥一丸嚥之如此服三丸後喫湯飲下之至明當利下宿食隔日再服取差為度五通丸出聖濟摠録治食癥氣乾薑炮二兩巴豆米半分陳橘皮黄連白术各一分白皮煎湯下或塩湯下婦人醋湯下進食方出儒門川牛一兩巴豆三箇右為末水丸每服二三十丸食後随所傷物送下療凡所食不消方方見本門療食癥病取生葱食之瘥昔有人每食飲七升并羊脂餅不論數因道中過饑食生葱須㬰吐出一虫薄而圓繞畔有口試以食投之立消盡自吐此物後其人病便愈此名食癥無疑人有思肉不已食訖復思者為肉癥治之方出千金方右空腹飲白馬尿三升吐出肉不出必死治蠱食癥方出聖恵方右緑礬二兩搗研如粉以米醋一大椀於瓷噐内煎之用栁木篾攪成膏入赤烏脚一兩細研和丸如菉豆大每服空心温酒下五丸治食癥方出聖恵方右以青州棗三枚去核每箇入膩粉一錢以白麫裹焼熟即去麫空心以棗爛嚼嚥水下之即瀉下癥塊白銀透羅丹治積塊食積大便不行疼痛難忍寒食麫七錢巴豆三錢天南星半夏各一錢半右為末滴水為丸搯作餅子如桐子大每服七丸食後熬煑二服冷浆淘過冷水送下忌熱物等積氣丸治積年食氣癥塊消酒食利噎塞木香半兩乾薑炮一兩硇砂半兩巴豆半兩川大黄一兩附子一兩官桂半兩筒子漆一兩荆三稜一兩蓬莪荗一兩芫花半兩青橘半兩細墨半兩㯽榔半兩大㦸半兩肉豆蔲五箇右一十六味先將荆三稜大黄二味為末研巴豆令細入醋一升半煎此二味至半碗許入硇砂又同研入醋麫一匙成膏加諸藥末合和得所再入臼杵三五百下丸如菉豆大每服五丸如食癥氣用生薑橘皮湯下本臟氣茴香湯下赤白痢二宜湯下婦人血氣當歸酒下常服任下普濟方卷一百七十三
