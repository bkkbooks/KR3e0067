body:
  text: 普濟方卷二百五十五明周王朱橚撰雜治門卒死附論夫卒死者由三虚而遇賊風也所謂三虛者謂乘年之衰一也逄月之空二也失時之和三也人有三虚而為賊風所傷使隂氣偏竭於内陽氣阻隔於外二氣壅閉故暴絶如死也内經云出入廢則神機化滅升降息則氣立孤危盖謂是也若臓腑氣未竭者良乆乃蘇然亦有狭鬼神之氣而卒者皆有鬼邪退乃活也凡中惡及卒忤卒然氣絶其後得蘇若有其邪氣不盡者即停滯心腹令人腹痛或身體沉重不能飲食而成宿疾而變成疰也甲乙經云得三虚者乗年之衰逄月之空失時之和因為賊風所傷也得三實者逄月之滿得時之和有年之盛遇賊風邪氣不能傷也方五神返魂丹出聖惠方治卒死但有微氣心上稍暖者朱砂半兩牛黄半兩安息香半兩砒霜半兩大蜘蛛五枚重午者採袋内盛通風勿死右先研四味方入蜘蛛又研匀令用不蛀皂莢三寸去黒皮以水三合挼汁便入粟米飯煮令水盡和丸如梧桐子大如中惡卒死及急風者但有微氣以新汲水研下一丸如昏迷加一丸立活無疾常服一丸至老無病治男子婦人小児忽然行坐地死去右用銅鑼金鼓衆人亂呌不以時自張口眼以熱湯水灌之即認得人咲也必安南嶽紫虚魏元君起死廽生散出聖惠方凡卒死者皆因一時閉氣不通原非病乆命絶不救則枉死當以此藥治之右用半夏一味無製度為細末以竹筒蘆筒鵞翎管向吹入兩鼻死半日心頭尚温不過三四次或噴􅅉或吐痰涎但元氣一通即囬生矣百發百中真仙家方也所謂卒死者中風死痰厥死氣死産死打死溺水死自縊死中暑死諸癎死咽喉死乳鵞死心暴痛死小腸氣死魘死脚氣死跌死驚嚇死墻壓死鬼魅迷死絞腸沙死凍死針灸死受杖死失血死椒閉死酒醉死頭暈死烟搶淘井死諸毒䖝傷悶亂死凡人居家或出路須以此藥随身骨骾者亦可以吹之刺噴􅅉而出兼治六畜雖非人亦物命也一方云昔時有人忽遇一異人遍身雪白自云吾即救人之藥凡遇人非命已死無氣吾能生之吾即半夏也可用吾身為末以竹筒吹之入鼻中良乆即甦後用果驗治卒死無脉無化形候隂陽俱竭故也出千金方右以牽牛臨鼻上二百息牛䑛必差牛不肯䑛着以鹽汁塗面上牛即肯䑛又方出千金方治卒死及四肢不収失便者右用牛馬屎絞取汁飲之無新者水和乾者亦得按肘後方云乾者以水溺觧之此扁鵲法一方用馬屎屎一升水三斗煮取二斗洗足又取牛洞稀糞和以一升温酒灌口中灸心下一寸臍上三寸臍下四寸各一百壯差又方出聖惠方扁鵲云治忤有救卒符並服鹽湯法恐非當世所能故不載而此病在人所謂卒死與中惡鬼擊相類為治参取而用之已死者可治右用搗菖蒲生根絞汁灌之立差一方為末吹入鼻中又末内舌下尸厥之病雖死脉猶動聴耳中如有㣲語聲股間暖是也治卒死壮熱者出聖惠方右用礬石半斤水一斗半煑礬石消以浸脚及踝即蘇救卒死或先病或常居寝奄忽而絶皆是中惡出聖恵方右割一雄鷄冠取血塗其口乾後復塗并以此灰營死人一周一方塗喉中又吹喉中亦可塗其面吹鼻孔中妙治卒死而目閉者及救死或先病或常居寝卧奄忽而絶皆是中惡右騎一牛臨其面搗薤汁灌耳中又末皂筴吹入鼻中妙一方韭汁灌鼻中南嶽夫人方出聖惠方治卒死右用搗女青屑一錢安喉中以水或酒下立活亦可用醋下葱刺耳方出聖惠方右以葱管刺耳中鼻中血出者勿怪無血則難療有血者是活候也其欲蘇時當捧兩手莫放之須臾則死人自當舉手撈人言痛乃止男刺左鼻孔女刺右鼻孔令入七寸餘此方大良立效亦療自縊死療卒死而有脉形候隂氣先盡陽氣後竭故也右用嚼薤哺灌之追魂湯出三因方治卒厥暴死及主客忤鬼撃飛尸奄忽氣絶不覺口噤麻黄去莭三兩杏仁去皮尖二百五十个甘草炙一兩右為剉散毎服四錢水一盞半煎七分去滓灌之通治諸感忤或口噤不開去齒下湯湯入口活不下分病人髮左右捉搦肩引之藥下漸蘇令服盡取效千金方有桂心二兩金匱云寸脉沉大而滑沉則為實滑則為氣實相摶血氣入臟則死入胃則愈若卒厥唇口青身冷為入臟即死身和汗出則愈治中熱死出傳信適用方右以水頭巾湯浸洗汁服救卒死亦治中惡出金匱方右用鷄肝及血塗面上以灰圍四旁立起治忤打死心猶暖宜用虬法出聖惠方右取葱白内於下部中及鼻中須臾即活又方出聖惠方右截㹠尾取血灌之并縳㹠以枕之死人須臾活矣又方出聖惠方右用小便灌其面数即能逥語此是扁鵲法治烟薰迷悶欲死者右以蘿蔔汁灌立活乾則水擂亦可又方出千金方右以灸熨斗兩脇下觧急方云又治尸厥治疫死者出本草右用反魂香焼之死者聞香再活按漢書武帝時西域國進反魂香云聚屈洞中上有反魂樹採其根置於釡中以水煮候成汁方去滓重火煉之如漆候其凝則香成也治忤死出本草右先以衣三重藉忤死人腹上乃取調器若瓦器盛以熱湯着衣上湯冷者去衣大冷者換湯即愈治卒暴亡未移時者出本草右取臘月雄狐膽温水微研灌入喉即活常須預備此救人移時即無及矣起卒死救生丹華佗中藏經方大黄半兩濕紙煨膩粉半兩朱砂一分雄黄一分巴豆七个去皮去油右用鯤魚膽汁圓鷄頭大用童子小便下一丸擀開口灌之内大尾一寸許入鼻中如人行五七里當吐涎即活治睡死者用蠡實根一握水絞取汁稍嚥之口噤灌之蠡實即馬蘭也自縊附論仲景云凡自縊死心下微温者一日猶可活葛氏云心下倘微温雖乆猶可活二家所論必須有暖氣隂陽未盡根本尚存則可以救茍非此雖死未良乆必不活也大抵自縊以升降出入之氣暴絶不通若解其䋲有法者固有復生之理解失其理體雖尚温不能無害所謂救經引其足也仲景葛氏各有辨證并解䋲法詳審之凡自縊若覺纔死徐徐捧下其隂陽經絡雖暴壅閉而臟腑真氣尚或未盡所以救猶可療若見其垂掛忽遽截斷其䋲則不可救此言氣已壅閉䋲忽暴斷其氣雖通而奔迸氣不能還即不復得生又云自縊死旦至暮雖已冷必可活暮至旦則難療謂其晝則陽盛其氣易通也夜則隂盛其氣難通也又云夏則夜短又熱則易活又云氣雖已斷而心微温一日已上猶可治也盖夏時夜短於晝又熱猶應可療心下微温者一日以上猶可活然皆徐徐抱解不得絶截䋲上下安被卧之一人以脚踏其兩肩手稍挽其髮常弦弦勿縱之一人以手投據胷上微重之一人摩摶臂脛屈伸之居若僵但漸漸强屈之并按其腹如此一炊頃氣從口出呼吸眼開而猶引按莫置亦勿苦勞之須以少桂心湯及粥清含與之纔令濡喉漸漸能嚥乃稍止耳兼令兩人各以管吹其兩耳彌好此最善無不活者自縊死心下尚温雖乆猶可活法徐徐抱解其䋲不得㫁之懸其髮令足去地五寸許塞兩鼻孔以蘆管納其口中至咽令人嘘之有頃其腹中礱轉者是氣通也其舉手撈人當益堅捉持更逓􅌵之若活了能語乃可置耳若不得掛髮可中分髮遶兩手撁弦耳凡自縊死從早至夜雖已冷必可活從夜至早稍難若心下温一日已上猶可救欵抱其身緩緩解䋲切不得截斷䋲放卧令人踏其肩以手㧞其髮常令一人𦂳以手擦胷脇散動一人摩搦臂足屈伸之若已僵但漸漸强屈之及按其腹如此一飯乆即氣口中出得呼吸眼開勿苦勞動可用少官桂湯及粥清與之令潤喉更以兩人以筆管吹其耳中尤好若依此救無不效者又方𦂳用手罨其口勿令透氣兩時許氣急即活治自縊死出千金方右凡救自縊者極須按定其心勿絶䋲手抱之徐徐而觧之心下尚温者以氍覆口鼻兩人吹其兩耳又一方以衣物塞兩耳将竹筒口中重吹氣入仍塞其口邉莫令氣出可活又方出千金方治自縊死及中惡氣欲絶者右用皂莢細辛搗屑如胡豆大吹兩鼻中又有皂莢為末以葱葉吹鼻中又方出十便良方右刺鷄冠血出滴着口中即活男雌女雄塗喉亦可又一方男雄女雌又方出肘後方右用鷄屎白如􅀥大酒半盞和灌口及鼻中佳又方出千金方右用樑上塵如大豆許各納一小竹筒中四人各自捉一筒時吹兩耳兩鼻即活又方出千金方右用尿鼻口眼耳中并捉頭髮一撮如筆管大製之可立活治自縊急救之方出肘後方右急手掩其口鼻勿令内氣稍出二時許氣至即活治自縊急救方出十便良方右牽起其頭髮以物塞兩耳仍以葱葉刺鼻中兩人則極力痛吹之齒其兩脚跟即活亦可塞鼻而吹入其口亦活也一方捉其頭髮令其足纔至地一時即能活治自縊死出千金方右以藍青汁灌之治自縊死出聖濟總録右以松子油納口中令得入咽中便活又治溺死治自縊死救之未活以車載之法出聖濟總録右以絹纒身體令堅以車牛載行三十里許使人即於車上行踏肩引髪如前治邪厲縊溺魘死中暑凍死諸卒死凡卒死或先疾病及寝卧忽然而絶皆是中惡出經驗良方右用葱黄心或韭黄於男左女右鼻中刺入深四五寸許令同目中出血即活又方出聖惠方右用綿浸好酒半盞用手按住患人手足勿令驚滴此酒入鼻中又方出聖惠方右視其上唇裏弦有青息肉如黍米大以鍼决去之立差又方出經驗良方右用羊屎焼煙薫鼻中又方出肘後方治心下尚微温乆猶可活右徐徐抱解䋲懸髮令人去地五寸許塞兩鼻孔以小蘆筒吹内其口中至咽令人嘘嘘有頃其腹中遂礱礱轉是氣通也仍嘘若活了可置耳若不懸可分開中髮繞三指撮兩手牽使髪懸又方治自縊死右用䋲焼三指撮服之治五絶右一曰自縊二曰墻壁壓三曰溺水四曰魘魅五曰産乳凡五絶皆以半夏一兩搗篩為末丸如大豆様内鼻中愈心温者一日可治溺水附論凡人沉溺水中水入腹則冷氣閉暴絶而死救活之法宜泄其水使氣得通則可復活若救之後時水不得出心下不温者難古法或經半日及一日猶有可療者謂其氣雖絶心下猶温則亦可療也又方治溺水死已經半日右取一大甕覆地以溺死人腹伏甕上以微火於甕底下燃之正對死人心下甕暖口中水出盡則蘇但勿令過熱治溺水葱汁導水右取不蛀皂莢為細末以葱白汁或棗瓤和丸如枣子核大内下部中導其水自出治溺死酒灌活右倒垂死人以好酒灌鼻中又灌下部或醋灌鼻中亦得治忽溺水死者右宜卧倒瀝却水便於肚上多着灰掩之仍以皂莢細末吹鼻中即活治溺死石灰壅之得活右即取石灰壅之候下部中水出盡即活一方綿褁碎石灰内下部中治溺水死導水右取皂莢為末綿褁於下部伏面向下須臾水從口内鼻中出仍多取灰覆籍水盡即活治落水死右以灶中灰布地令厚五寸以甑側着灰之上令初死者伏於甑上使頭小埀下炒鹽二方寸匙内竹管之中吹下孔中即當吐水水下因去甑下死者着在灰中壅身使出鼻口即活又方右掘地作坑熬數斛灰内坑中下死人覆灰濕徹即更易勿令太熱㷮人灰冷更易半日便活又方右取大甑傾之死人伏其上令死人口臨甑口然乾葦火二七把焼甑中當死人心下令煙出少入死人口鼻中水出盡則活火盡後益之常以手候死人身旁及甑勿令甚熱當令火氣能使死人心下足得暖或卒無甑者於岸側削地如甑空心下如蛀焼令暖熱以死人著上亦可用車轂為之勿令引其腹令初死人低頭水得出并炒灰数斛令暖以數粉身濕則更易温者外䑓秘要甑作甕又方右但埋死人煖灰中頭足俱温惟開七孔水出即活又方右便脱取煖釡覆之取溺人伏上腹中出水便活又一方作暖衣覆之救溺水法右凡人溺水者救上岸即令溺水之人将肚横覆在在牛肩上兩邉用人扶䇿徐徐牽牛而行以出腹内之水沫如醒即以蘇合香丸之類或老薑擦牙若或無牛以活人於長板凳上仰卧即令溺水人如前法冄将肚抵活人身上水出則活又灸臍中百壮治溺水心頭尚温右用人抱定令頭微仰令口於鼻中吸出黄水却先取用綿絮熰其下體及隂囊䖏即活如無綿絮可用細灰數十籮通體埋盖只留面在外令頭仰亦可使活其本髮於紡車上却轉之則其人迷亂而不能自去凡溺死一宿尚可救右屈死人兩脚着生人肩上以死人背貼生人背擔之走吐出水即活亦療凍死又方右倒懸解去衣去臍中垢令兩人以筆管吹其耳中又方右熬熱沙覆死人面上下着沙只留出口鼻耳沙濕即令換之又方右或熱沙或炒熱灰将溺者埋於其中從頭至足水一出七孔即活竈灰二石又方出聖惠方右解死人衣炙臍中即活数方皆效多以為氣絶而卒不可傷数方從便而用之又方出危氏方右以酒壜一箇以紙錢一把焼放壜中急以壜口覆在溺水人面上或臍上冷則再焼錢紙於壜内覆在面上去水即活凍死附論夫人有在途路逄風寒苦雨繁霜大雪衣服霑濡冷氣入臟致令陽氣絶於外榮衛結澁不復流通故噤絶而死若早救療血温氣通則生又云凍死一日猶可治過此則不可療也又方治凍死出聖惠方於冬月落水凍四肢直口噤尚有微氣者或因風雨霜雪冷氣入臓陽氣暴絶致噤絶凍死者右以一大器中多熬灰使暖囊盛以摶其心冷即便更易心暖氣通目則得轉口亦及開可與温酒服用粥清稍稍嚥之即活若不先温其心将火炙其身冷則氣與火相摶急即不活也治凍死人救活宜與此藥一兩服出傳信適用方水薑一兩和皮剉碎陳皮不去白一兩剉碎右共用水三盞煎至一盞半放温與服不可冷不可熱又方出經驗良方右用氊或藁薦褁之以索繫定放在平穏處令兩人相對面輕輕衮轉往来如捍氊法四肢温和即活仍須炙臍中三五壮冬月凍倒人急與冷水一兩口扶之在暖温處不得與熱湯及向火必死雪泥中行便令近火即脚指随落入井塜悶附論夫肘後云此事他方少有其説且人寡為之不俟别滌今於水東之後尋此是地氣敲蒸盖亦障霧之例服諸解毒犀角雄黄麝香之屬䜴豆竹瀝升麻諸湯應為佳又方療入井塜悶冐出十便良方凡遇五月六月井中及深塜中皆有伏氣令中欝悶易殺人如其必須入中者先以鷄鴨雜毛投之直下至其底則無伏氣毛若徘徊不下則有毒氣也亦可先内生六畜等置中若有毒其物即死不必入若無有六畜當先以酒數升滴灑井塜中四邉畔停少時頃然後可入若覺中有此氣欝悶奄奄欲死者還急取其中水灑人面令飲之又以灌其頭及身體即能活若無水取他水用可也夏月不可淘井多致殺人出傳信適用方右冝先以鷄毛放井中試之如揺動不肯便下是即有毒氣不可入古塜亦然五月七月尤甚如已中毒取水以潠其面并含水調雄黄末二錢轉筋入腹痛或甚者使四人捉手足炙臍右邉二寸十四壮又取生薑一兩擘破酒五盞煮濃頃服又醋煮衣絮令徹乘温褁轉筋䖏又濃煮鹽湯通手足洗胷脇間療入井塜毒氣右取他井中水灑身上至三食頃便活東井取西井南井取北井水用之又方出肘後方治五月七月深井塜有毒氣殺人入遇毒者則以水噀其面并含水以雄黄犀角麝香調服怪疾一方治遍身忽皮底混混如波浪聲痒不可忍抓之血出亦不得解謂之氣奔出經驗良方人參苦杖青鹽白术細辛各一兩右為末作一服水二碗煎十數沸去滓飲盡便愈治手十指斷節壊唯有筋連無節肉䖝出如燈心長数尺餘遍身緑毛卷名曰血餘出經驗良方右以茯苓胡黄連煎湯飲之即愈治因着艾炙訖火痴便退落瘡内鮮肉片子飛如蝶形状騰空去了痛不可忍是血肉俱熱出經驗良方右用大黄樸硝各半兩為細末水調下微知利即愈治眼赤鼻張大喘渾身出斑毛髮起如銅鉄乃目中熱毒氣結於下焦出經驗良方右用白礬滑石各一兩為末都作一服水三碗煎至一半令不住飲候盡乃安治手甲忽然長倒生肉刺如錐痛不可忍出危氏方右速喫葵菜自愈治眼睛垂至鼻如黒角色痛不可忍或時時大便血出其名曰肝脹出經驗良方右用羌活煎汁服数盞自愈治腹中有物作聲隨人語言右用板藍汁一盞分五服服之又名應聲䖝當服雷丸自愈治人自覺自形作兩人並卧不别真假不語問亦無對乃是神離出經驗良方右用辰砂人參茯苓濃煎湯服之真者氣爽假者化矣治頭面發熱有光色他人手近之如火焼人出經驗良方右用蒜汁半兩調酒下吐出蛇状遂安治鼻中毛出晝夜可長一二尺漸漸麄圓如繩痛不可忍雖摘去一莖即復更生此由食猪羊血過多遂生出經驗良方右用乳石磠砂各一兩為末以飯丸如梧桐子様大空心臨卧各一服水下十粒自然退落一方用乳香者不用乳石治脇破腸出臭穢出經騐良方右急以油摸腸用手送入煎人參枸杞淋之皮自合好矣喫羊腎粥一十日即愈治忽然氣上喘不能語言口中汁流吐逆齒皆揺動氣出轉大則悶絶蘇復如是名曰傷寒併熱霍亂出經驗良方右用大黄人參末各半兩水三盞煎至一盞去滓熱極服可安治渾身生燎泡如甘棠梨毎箇破出水内有石一片如指甲大泡復生抽盡膚肉則不可活出經驗良方右急用荆三稜蓬莪术各五兩分三服酒調下連服立愈治項上生瘡如櫻桃大有五色瘡破即項皮斷上連髮卷去下去足脱之乃為肉人疾初見此瘡出危氏方右但宜逐日用牛乳自消治大腸頭出寸餘痛苦直候乾自退落又出名為截腸病若腸盡乃不活矣但初覺截餘寸治之出經驗良方右取芝麻清油器盛之以臀坐之飲大麻子汁數升立愈治口鼻中腥臭水流以碗盛之有鐵色鰕魚如粳米大走躍不住以手捉之即化為水此肉壊矣出經驗良方右用任意饌食鷄月餘愈治脚心凸如腫上面生黒色豆瘡硬似釘子釘了履地不得脛骨生碎眼髓流出身發寒顫唯思飲酒此是肝腎氣冷熱相吞右用炮川烏頭末傅之煎韭子湯服可愈治四肢節脱但有皮連不能舉動名曰筋解出經驗良方右以酒浸黄蘆二兩經一宿取出焙乾為末毎服止二錢酒調下服盡安治腹脹如鐵石臍中水出旋變則䖝行之状繞身匝啄痒痛難忍撥掃不能盡出經驗良方右用濃煎蒼术湯浴之及用蒼术末入麝香少許以清水調服痊治有飲油五升以来方始快意長得喫則安不爾則病此是髮入胃被氣血褁了化為䖝也出經驗良方右用雄黄半兩為末水調服虫自出如䖝者活置之於油中逡廵間連油潑之長江治卧於床四肢不能動只進得食好大言説喫勿謂之失説此名物望病出經驗良方右其治如説食猪肉時便云你喫猪肉一頓病者忽聞之即喜遂置肉令病人見臨要不與喫此乃失却他物望也當自睡口中涎出便愈治眼白人渾黒見物依舊毛髮直如鐵條雖能飲食不語如醉名曰血潰出經驗良方用五靈脂二錢為末酒調下治渾身臨卧時虱出約至五升隨後血肉俱壊毎宿漸多痒痛不可名状唯喫水卧床上晝夜號哭舌尖出血不止齒俱黒唇動鼻開右但飲鹽醋湯十数次即愈治口鼻中氣出盤旋不散凝如黒蓋色過十日漸漸至肩胷與肉相連堅勝金石鐵無由飲食此多因瘧後得之出經驗良方右煎澤瀉湯日飲三盞連服五日愈治遍身忽然肉出如錐即痒且痛不能飲食此名血住若不速治之潰而膿出出經驗良方右以赤皮葱焼灰淋洗喫豉湯三盞自安矣治眉毛揺動目不能視交睫喚之不應但能飲食有經日而不安者出經驗良方右用蒜二兩取汁酒調下即愈治毛竅節次血出者若血不出皮脹膨如皷須臾眼鼻口被氣脹合也此名脉溢夏子益治竒疾方三十八道唐與義刋印於上饒其間一二證昔嘗見有病之者皆莫知所以治療之法得子益之方取以附此書之末其廣用傳出危氏方飲生薑水汁各半盞安治血自皮膚濺右以煑酒瓶上紙碎撧如楊花用手揑在出血處立止昔廬陵明田李教諭梅心傳治怪疾竒方出經驗良方袁州分冝縣有一男子自十嵗喜飲酒至十九嵗日間飲一二斗不醉無酒呌吸呼不絶全不進食日就羸斃其父驚惶叩神或遇一道人令其父用手巾縳住手足不令揺動但扶坐少立却取生辣酒一壜就於其子口邉打開其酒氣衝入口中病者必飲取飲而道人堅不肯與之須臾口中吐出物一塊直下壜中道人即用紙封塞壜口用猛火焼滚約酒乾一半却開視之其一塊如猪肝様約三兩重周廽有小孔如針眼不可数計棄之江中自從此子飲食復舊雖滴酒不能飲矣治居民逃避石窟中賊以火煙薫之出經驗良方昔學師者被煙薫欲死迷悶中摸索得一束蘆菔俗名蘿蔔嚼汁下咽而甦蘆菔細物活人之功如此又炭煙薫人徃徃致死臨卧含蘿菔一片着口中煙氣不能毒人或預曝乾為末偹急用亦可或新水擂爛乾蘿蔔飲之亦可昔曽有一人自行因顛穿㫁舌下血出不止諸藥不能救出危氏方右以米醋用鷄翎掃所斷舌處其血即止仍用真大蒲黄杏仁湯泡去皮尖鵬砂少許研為細末用煉熟好蜜調藥稀調含化而安治人身上及頭面肉上浮腫如蛇状者出經驗良方右以雨滴塼堦上苔痕一錢水化開塗蛇頭立消救急痩疾右以甘草三兩炙毎旦以小便煮三四沸頓服之昔有人卧忽不寤若火煦之則殺人但痛嚙其踵及足拇指甲際而多唾其面即活犀角枕佳或以清水木香納枕中并帶昔江右嘗有商人左膞上有瘡如人面亦無他苦商人戯滴酒口中其面亦赤色以物食之亦能食食多則覺膊内肉脹起或不食則一臂痺有善醫者教其厯試諸藥以草木之類悉試之無苦至貝母其瘡乃聚眉閉口商人喜曰此藥可治也因以小葦筒毁其口灌之数日成痂遂愈然不知何疾也昔華陀行道見車載一人病咽塞不下呻吟陀示店家以蒜虀大酢三升飲之當痊果吐大蛇一枚而愈出本草昔南齊禇澄為呉郡守李道愈到郡澄見謂曰汝有重病答曰舊有冷病至今五年衆醫不瘥澄為診曰汝病非冷非熱當是食白瀹鷄子過多所致令取蘓一升煮服乃吐一物如升涎褁之能動開㸔是鷄雛羽翅爪距具足能行走澄曰此未盡更服所餘藥又吐得如向者鷄十三頭而病瘥當時稱妙一説乃是蒜煮服之治澡浴後忽天柱骨倒王荆公得噤口秘方右用多年五苓散一年者亦可用毎服三錢重燈心加七莖竹葉三莖烏梅三箇同煎湯調下治有䖝如蟹走於皮下作聲如小児啼為筋肉之化出經驗良方右用雷丸雄黄各一兩搗羅為末掺在猪肉一斤上面炙熟喫盡安治血濺右用槐花半升炒為細末傅之治腹上麻痺不仁出危氏方右但多煮葱白喫之自愈凡腹脹經乆忽瀉數升晝夜不止服藥不驗乃為鬼脱出危氏方右用益智子煎濃湯服立愈治玉莖硬不痿精流無歇時時如針状揑之則脆乃為腎蒲漏疾韭子破故紙各一兩右為末毎服二錢水一盞煎至六分毎日三次飲之愈則住服治眼前常見諸般禽虫飛走以手捉之則無乃肝膽經為疾酸􅀥仁羗活𤣥明粉青葙子花各一兩右為末毎服二錢水一大盞煎至七分和滓飲一日三服治面上及遍身生瘡似猫児眼有光彩無膿血但痛痒不常飲食减少乆則透脛名曰寒瘡出危氏方右但多喫魚鷄韭葱自愈治口内生肉毬臭惡自己惡見有根線長五寸餘似釵股吐毬出以飲食了却吞其線以手輕揑痛徹於心困不可言出危氏方右用水調生麝香一錢服三日驗治婦人産後兩乳伸長細小如腸垂下直過小肚痛不可忍危亡須臾名曰乳懸出危氏方右宜将川芎當歸各二斤半斤剉散於瓦石内用清水濃煎不拘時候多少温服餘一斤半剉作大塊用一香爐慢火逐旋焼煙安在病人面前車子下要令煙氣直上不絶令病人低頭伏棹子上将口鼻及病人乳常吸煙氣直候用此一料藥盡㸔病証如何或未即痊安略縮减再用一料如前法煎服及焼香煙薰吸必安此二料用盡雖兩乳略縮上而不復舊再用水磨萆麻子一粒於頭心上塗片時即洗去則能全安矣治婦人臨産服催生藥驚太早未嘗離經而用力大過以致育摸有傷産後水道中垂出肉線一條約三四尺牽引心腹痛不可忍以手微動之則痛苦欲絶出危氏方右宜先服失笑散数服仍用老薑三片洗净不去皮遂於石針臼内研爛用油二斤拌匀入鍋内炒熟以此油乾焦為度先用熟絹一叚五尺長摺作結方令一穏重婦人輕輕盛起肉線使之屈曲作一團納好在水道口却用絹袋兠褁油薑稍温傅在肉線上薫使覺薑漸冷又用熨斗火熨熱使之常有薑氣已過即除去又用新者如薫熨一日一夜其肉線已縮入大半再用前法越兩日其肉線盡服中其病全安却又再服失笑散芎歸湯補理切不可使肉線斷作為兩截則不可醫雜病附論千金論云聖人之道以慈濟物愽求衆藥以戒不虞倉卒之際應手皆得故有萬病方焉凡以諸方散在郡典乃令學者難用討尋遂鳩撮要妙以為斯品庶使造次可得好事君子安不忘危無事之暇可預和合以備可療也方耆婆萬病丸出千金方治七種辟塊五種癲病十種疰忤七種飛尸十二種蠱毒五種黄病十二時瘧疾十種水病八種大風十二種􅍙痺并風入頭眼暗瞙及上氣咳𠻳喉中如水鷄聲不得眠卧飲食不作肌膚五臟滯氣積聚消壅閉不通心腹脹滿及連胷背皷氣堅結流入四肢或脹又心隔氣滿時定時發十年二十年不瘥五種下利疾赤白諸䖝上下冷熱乆積痰飲令人多睡消痩無力䕃入骨髓便成滯患身體氣腫飲食嘔逆脚腰酸疼四肢沉重行立不能乆婦人因産冷入子臟臓中不净或塞閉不通胞中瘀血冷滯出流不盡時時疹痛為患或因此斷産并小兒赤白下痢及胡臭耳聾鼻塞等病此藥萬病悉除故稱萬病丸以牛黄為主故一名牛黄丸以耆婆良醫故名耆婆丸牛黄麝香犀角各一分茯苓桑白皮乾薑桂心當歸芎窮芍藥甘遂黄芩蜀椒細辛桔梗巴豆前胡紫苑蒲黄葶厯防風各一分蜈蚣三莭人參一寸朱砂一分石蜥蝪一寸雄黄黄連大㦸芫花禹餘粮芫青已上各一分右並令精細除牛黄麝香犀角硃砂雄黄禹餘粮巴豆别研餘者合搗重絹下篩以白蜜更搗三千杵蜜封下破除日旦空腹酒服三丸如梧桐子大取微下三升惡水為良若卒暴病不拘平旦早晩皆可服但以吐利為度不得限以丸数病强藥少即不吐利更非他故若其發遲以熱飲汁投之若吐利不止即以醋飯兩三口止之服後忌陳臭生冷酢滑飯食大蒜猪鷄魚狗馬牛驢肉白酒房事七日外始得一日服二日補之得食新米韭骨汁作􅅅粥飲食三四頓大良亦不得全飽産婦忽服吐利以後常須閉口少與於風處温床暖室将息若旅行卒暴無歇以小便送之為佳若一嵗以下小児有疾者令乳母服兩小豆亦以吐利為度近病及卒病皆用多積乆疾病即少服常取微溏利為佳卒病無死服三丸如小豆大即吐利即瘥諸有痰停飲者亦得卒中惡口噤服二丸如小豆暖水一合灌口令下微利即瘥諸有痰飲者服三丸如小豆五疰鬼利客忤服二丸如小豆不差後日更服三丸男女邪客歌哭無時腹大如姙娠服如小豆日三夜一間食服之大痢服一丸如小豆日三猫鬼病服三丸如小豆未瘥更服蠱毒吐血腹痛如刺服二丸如小豆不瘥更服瘧病未發前服一丸如小豆不瘥後日更服冷癖服三丸如小豆日三皆間食服之常令微溏利宿食不消服二丸如小豆取利癥瘕積聚服二丸如小豆日三皆間食服之以利瘥止拘急心腹脹滿心痛服三丸如小豆不瘥更服上氣喘逆胸滿不得卧服二丸如小豆不瘥更服疳濕以一丸如杏仁大和酢二合灌下部亦服二丸如小豆鼻衂服二丸如小豆即瘥水病服三丸如小豆日二皆間食服之瘥止人弱隔日服之頭痛惡寒服二丸如小豆覆取汗傷寒時行服二丸如小豆日三間食服之小便不通服二丸如小豆不瘥明日更服大便不通服二丸如小豆又内一丸下部中一丸即通耳聾䁎耳以線褁一丸如小棗核大塞瘥腫丁腫破内一丸如麻子大日一傅其根自出瘥犯丁腫血出以猪脂和𫝊有孔内孔中瘥止胸背腰脇腫以酢和傅腫上日一易又服二丸如小豆癩瘡先以酢泔水洗後取藥和猪脂𫝊之瘻瘡有孔以一丸如小豆内孔中兼和猪脂傅之痔瘡取藥塗線筋上内孔中日别易瘥止瘰􅊓以酢和傅上瘥惡刺以一丸内瘡孔中即瘥諸冷瘡積年不瘥者以酢和塗瘡上作餅子貼之瘡癬瘡先以布揩令汁出後取和傅上日一易立瘥蝎螫以少許傅螫處蜂螫以少許傅螫䖏蝮蛇螫取少許内螫䖏若毒入腹心悶欲絶者服三丸如小豆大婦人諸疾胞衣不下服二丸如小豆取吐利即出小兒客忤服二丸如米粒和乳汁傅乳頭令嗍之小児驚癎服二丸如米粒塗乳頭令嗍之隨児大小量飲小児乳不消心腹脹滿服二丸如米粒塗乳頭令嗍之不瘥便服一方無黄芩桑白皮桔梗防風大理氣丸出千金方治萬病牛膝甘草人參茯苓逺志恒山苦參丹参沙參龍膽龍骨牡䝉半夏杏仁紫苑芍藥天雄附子葛根橘皮巴豆狼牙各二兩大黄牡礪白术各三兩生薑末五兩白薇六分元參七分雚蘆大者一枚右先搗篩二十七味令熟次搗巴豆杏仁如膏和使相得加蜜後更搗五千餘杵丸如梧桐子大空腹酒服七丸日三疝瘕結五十日服永瘥當用理氣大覺有效神枕法出御藥方昔太山下有老翁者失其名字漢武東廵見老翁鋤於道背有白光髙数尺帝怪而問之有道術否翁對曰臣昔年八十五時衰老睡死頭白齒落有道士者教臣服棗飲水絶谷并作神枕法中有三十二物中二十四物蓋以當二十四氣其八毒蓋以應八風臣行轉少黑髮更生堕齒復出日行三百里臣今年一百八十矣不能棄世入山顧戀子孫復還食糓又已二十餘年猶得神枕之力徃不復老武帝視老翁顔状當如五十許人驗問其隣人皆云信然帝乃從受其方作枕而不能隨其絶谷飲水也方用五月五日七月七日取山林柏為枕長一尺二寸髙四寸空中容糓一斗二升以栢心赤者為盖厚二分盖致之令宻又當使可開閉也又鑽盖上為二行行四十九孔凡一百二十孔令含粟米并其用藥芎藭當歸白芷辛荑杜衡白术藁本木蘭蜀椒桂心乾薑防風人參桔梗白薇荆實蓯蓉飛㾾栢實薏以仁疑花白衡秦椒糜無已上二十四味以應善者二十四氣後八味應八風烏頭附子藜蘆皂莢莽草礜石半夏細辛右各一兩皆㕮咀以毒藥上安之滿枕百日面有光澤一年體中所疾及有風疾一一皆愈善而身盡香四年白髮變黒齒落重生耳目聰明神方秘效不傳非其人也藁本是芎藭母也武帝以問東方朔答云昔女亷以此方𫝊玉青玉以𫝊廣成子廣成子𫝊黄帝近者谷城道士淳于公枕耳百餘嵗而頭髮不白夫病之来皆從陽脉起今枕藥枕風邪不得侵矣又雖布囊衣枕猶當復圍囊重包之須欲卧枕時乃脱去之耳詔賜老翁匹帛老翁不受曰臣之於君猶子於父也子之道以上之於父義不受賞又臣非賣道者以陛下好善故進此耳帝止而更賜諸藥吹鼻一提金治一切雜證大有竒功便於出軍甘草川芎天麻􅆚藥薄荷荆芥人參乳香没藥白芷青黛滑石桔梗甘松黎蘆欝金甘菊藁本茯苓細辛防風元胡索猪牙細皂莢右等分為細末毎服一字吹鼻中喘蒸時須令患人口水不致藥入喉嚨寒水石散治脚氣毒遍内外煩熱不解口中生瘡狂走毒厲及解中諸熱藥毒邪熱卒黄等解蠱毒鬼魅野道熱毒又治小児驚癎熱病寒水石石膏磁石滑石已上四味各三斤搗為細末用水一石煮至四升四斗去滓入後藥元參一斤洗焙剉羚羊角五兩升麻五兩丁香一兩木香半兩甘草八兩已上六味搗為末入藥汁中再煮取一斗五升去滓入下頃二味藥朴硝精者二斤硝石好者二斤已上一味入前藥汁中微火煎不住手将栁木箆攪候有七八升許投在木盆中半日乆欲凝候却入下二味硃砂二兩細研射香當門子一兩二錢重乳細已上二味入前藥汁中拌勻調令全右為末同研令勻毎服一錢或二錢冷水調下大人小児仔細加减食後服仙人練絳雪治一切病肺氣積聚咳逆嘔吐膿血丹石毒發天行時氣熱病諸黄疸等心風昏亂心怯健忘四肢煩熱頭痛眼赤大小便不通煩悶不安骨節疼痛赤白痢血熱毒痢宿食不消化心腹脹滿出氣不得下并諸毒藥脚氣等飲酒多醉困乆痢不差小児驚癎等和水服之産後一切諸病墮胎和酒服之朴硝十斤升麻三兩大青桑白皮槐花各二兩犀角屑羚羊角屑各一兩蘓方木六兩竹葉兩握訶梨勒山梔子三十枚㯽榔仁二十顆硃砂半兩研右以水二斗漬一宿煎取一斗去滓入鍋内朴硝錬烊攪勿住手候欲凝出於盆中攪入硃砂并射香少許訖雪成収於器中蜜封有疾量取和水服之神效老小量之効方療疸時疫諸毒氣毒惡核金瘡等百病當歸天雄烏頭各三兩細辛芎藭硃砂各二兩乾姜附子雄黄桂心白芷松脂各八兩生地黄二斤搗絞取汁右别搗雄黄硃砂為末餘㕮咀以釅苦酒二升五合地黄漬藥一宿取猪脂八斤微火煎十五沸白芷黄為度絞去滓入雄黄硃砂末攪令稠和蜜器貯之腹内病皆對火摩病上日兩三度從十日乃至二十日取病出差四肢肥肉風瘴亦可温酒服杏仁大一枚太傅白膏治百病傷寒咽喉不利頭項强痛腰脊并兩脚疼有風痺濕腫難以屈伸不能行歩若風頭眩鼻塞有附息肉生瘡身體癮疹風搔䑕漏瘰􅊓諸疽惡瘡牛領馬鞍腫瘡及乆塞堅結在心腹痛胸痺煩滿不得眠飲食咳逆上氣徃来寒熱婦人産後餘疾耳目鼻口諸疾悉主之亦曰太乙神膏蜀椒一升升麻三兩附子巴豆芎藭杏仁五合狸骨細辛各一兩白芷半兩甘草二兩白术六兩當歸三兩右㕮咀苦酒淹漬一宿以猪肉四斤微火煎之削附子一枚以䋲繋着膏中候色黄膏成去滓傷寒心腹積聚諸風腫疾頸項腰脊强偏枯不仁皆摩之日一癰腫惡瘡䑕瘻瘰􅊓灸手摩之耳聾如大豆灌之目痛淚出縹白翳如珠當瞳子視無所見取如穄米傳白上令其人自以手掩之須臾即愈以水洗視如平復旦勿當風三十日後乃可行鼻中痛取如大豆許内鼻中并以摩之齲齒痛如線褁如大豆着痛齒上咋之中風面目鼻口喎僻以摩之若晨夜行辟霜霧眉睫落数数以鐵漿水用膏摩之粉霜丸此藥秘𫝊仙方凡治一切病證丁香木香粉霜五靈脂硃砂各二錢磠砂乳香麝香信濕紙褁煨候煙盡已上各一錢肉豆蔲巴豆去殻濕紙褁煨香各二兩右為細末醋糊為丸如黍米大毎服二丸隨湯引下若心脾疼石菖蒲湯下氣刺撮痛陳皮湯下腹脹滿悶蘿蔔湯下咳逆滿悶柿蒂湯下小腸氣疼水冷鹽湯下隔氣翻胃丁香湯下小兒羸痩藿香湯下脾寒瘧疾草菓湯下顛邪失志栁桃湯下小便頻併茴香湯下十種水腫氣猪苓湯下血痢槐花甘草湯下五般淋瀝燈心湯下盗汗出龍膽草湯下酒積肚腹痛温酒下赤白痢煎陳皮湯下中暑熱者沙糖水下水瀉不調生薑湯下山嵐瘴氣不伏水土温酒下婦人赤白帶下艾酢湯下阿魏藥煎治百病阿魏四分豆蔲仁七顆細研生姜十二分人參甘草炙各八分藕汁地黄汁各二升訶黎勒七枚去核牛膝半升白蜜一升鱉甲十二分炙右為末地黄等汁煎吹下藥㣲火煎攪勿住候如􅄳於不津器盛毎服取一匙酒和服之萬病無憂散治風疾瘡腫疥癬或臟腑積冷壅滯氣結風勞膀胱宿冷臟腑虚衰面色痿黄内有癥癖氣并常有疳蟲蚘䖝攻心腹俱痛中傷寒頭痛難忍状若山嵐時氣瘟疫之疾並冝急服此藥宣通三五行立瘥或中風口喎語多蹇澁睡後口中涎出不限時節不問男子婦人但五日一服不過三服永瘥乆患腰膝疼痛脚氣腫滿運動艱難飲食無味并小児疳痢脫肛者量大人與服一二五行自差大人乆泄氣利状若休息痢止有時但一服取下冷膿血一二升當日見效藥無四時冷熱老㓜弱衰病患悉皆除之任服他藥無效此盖縁捜出臟腑中積滯䖝膿故也無孕婦人乆患血虚氣弱痿黄無力者亦可依方服宣通氣血自不困倦此藥凡有百病並治之其功不可具載婦人或孕隂晦時節不可服天道晴明可進若雖復疾而未愈者再服妙黄茋木通桑白皮陳皮各一兩胡椒白术半兩木香半兩白牽牛炒四兩别取頭末右七味為細末毎服二錢牽牛末二錢生姜二錢切片煎薑湯一大盞調藥須臾又用生薑湯或温湯送下平明可行快利三五次無妨如病息後以白粥補之痊矣一方用黑牽牛微炒為末另作一處臨時量虛實加减依前藥服如氣體稍强多着牽牛末着七味藥弱者反此經騐方云利路耿運管望之二年前得肺疾甚異晝則右鼻濁涕終日夜則清涕如水不止良以為苦醫者只用治肺藥以辛荑為主幾年雖少損終不盡去後年餘客親戚王發運家又苦腫唇高於鼻飲食不容進齒亦盡腫家有一藥用些黒牽牛晚服畢瀉一兩行其腫即退初甚疑之恐牽牛之為害也腫既甚不得已進一服連瀉兩行不移時腫盡消所苦涕即止一藥而攻二病異哉妙香丸治一切乆逺沉積傷寒結胸太陽厥證燥欝攻不開者皆可服亦曰太聖丸巴豆去皮不去油膩粉磠砂硃砂水銀各一錢錫結砂子龍腦麝香牛黄各少許右為末煉蜜和丸如皂子大藥時急要動一丸分作二丸搏作小豆子大投煎大黄湯下復然茶一椀熱便利一方用蠟丸無磠砂加金枸杞酒治五内邪氣消渇風濕下腦脇氣頭痛堅筋骨强隂利大小便填骨髓長肌肉破除結氣五勞七傷去胃中宿食利耳目中衂血吐血風痓補中逐水破積瘀膿血石淋長髮傷食寒瘴癘毒氣煩燥滿悶虛勞喘吸逐熱破血脚氣腫痺悉主之糯米一石黍菊計常酸酒米一石用麴一斗此藥米亦得麥加五升彌加米用之惟上好者枸把根二十赤皮寸半剉之以水一石漬經宿刮皮三日煮取汁五斗生地黄二十斤洗去土細切和米炊之秋麻子三斗熬蒸成細粉蒸氣出以枸杞湯淋取汁二斗香䜴二斗以枸杞湯煮取汁右四味和米蒸之三物藥汁總合得五斗地黄濕即四斗分半拌漬米分半及麴和釀飯如人煩即總和一處蜜盖甕口經二七日壓取泥封復經七日初一度一釀用麻子二斗恐令人頭痛服酒忌生冷酢滑鷄魚麵蒜油膩白酒房室等服訖一二七日将息病盡乆服即少忌之奪命散治男子婦人心中積熱停痰腸垢諸毒變成百病酒麵食積痃癖氣塊小腸疝諸般膈氣反胃吐食胸膈痞悶脇肋疼痛嘔吐痰逆頭目昏重偏正頭風或驚怖口苦舌乾噎氣醋心腹脹如皷大便不通小児赤澁飲食過多不生肌肉心中煩燥面色痿黄肌體羸痩困倦少力夜多盗汗脾胃不和瀉痢膿血乆而成血癖血瘕並皆治之毎服三錢用好無灰酒一大盞少飲晩食臨卧服之卧仰睡一二更待藥微微利三兩行臟腑此藥不損真氣如婦人室女血脉不行加木香沉香枳殻煎當歸湯調服小腸氣用乾漆麥蘖木通炒茴香却去了木通乾漆二味量病虚實用綿文大黄四兩去皮炒存性麥蘖一兩半炒㯽榔七錢半茴香瞿麥地匾蓄各二錢半右為細末毎服虚實加减錢數隨證湯次僊人玉壺丸出千金方雄黄藜蘆丹砂礜石巴豆已上各二兩八角附子等分右先搗巴豆三千杵次内礜石又搗三千杵次内黎藜蘆三千杵次内附子三千杵次用雄黄三千杵次内丹砂三千杵蜜封又搗萬杵佳若不用丹砂者内真珠四兩毎内藥輙治五百杵内少蜜恐藥飛揚治藥用王相吉日良時童子齊戒為良天晴明日無雲霧白晝藥成封蜜器中勿泄氣著清潔處大人服丸如小豆欲下病者宿勿食平旦服二丸不知者以暖粥飲發之令下下不止飲冷水以止之病在膈上吐膈下利或但噫氣即已若欲漸除及将服消病者服如麻豆大二丸卒中惡欲死不知人以酒若物湯和二丸日再男女與鬼交通歌笑或哭無常或腹大絶經状如姙娠漿水服二丸如胡豆大日三夜一又若酒和令如􅏁毎旦傅手間使心主心主在手腕後第一約横紋中指至暮又傅足三隂三陽及鼻孔七愈又将服麻子大一丸日三服止惡風逆心不得氣息服一丸腹中如有䖝欲鑽脇出状急痛一止一作是惡風服二丸憂恚氣結在胸心苦連噫及咳胸中刺痛服如麻子大三丸日三腹痛脹滿不食服一丸心腹切痛及心中熱服一丸如麻子大日三服五日瘥風疝寒疝心疝弦毎發腹中急痛服二丸卒上氣氣但出不入并逆氣衡喉胃中暴積聚者服二丸日再澼隐痰平旦服一丸腹中三䖝宿勿食明旦炙牛羊肉三臠食須㬰進三丸如胡豆大日中當下過日中不下更二丸爛䖝必下卒闗格不得大小便欲死服二丸卒霍亂心腹痛腹滿吐下手足逆冷服二丸傷寒欲𠻳濇時氣熱病温酒服一丸厚覆取汗不汗更服寒熱徃來服一丸瘧未發一丸已發二丸便斷積寒熱老痞服二丸日三癥結堅痞一丸日三取愈下利重下者一丸取斷食肉不消腹堅脹一丸立愈若淋瀝痩瘠百節酸疼服一丸日三頭卒風腫苦酒若膏和傅之線褁癰疸痤癤瘰􅊓及欲作瘻以苦酒和傅之若瘡不可名瘑疥疽以膏若苦酒和先以鹽湯洗瘡去痂拭乾傅之齒痛綿褁塞孔中䑕瘻以猪脂和傅瘡起駁舌狗子䑛之中水毒服二丸若已有瘡苦酒和三丸傅之耳聾膿血汁出及卒聾以赤谷皮褁二丸内之風目赤或痒視物膜膜淚出爛皆蜜解如􅏁塗注目佳若為蠱毒所中吐血腹内如刺服一丸如麻子稍加如胡豆大亦以塗鼻孔中又以膏和通腹背上亦可焼之燻口及鼻若為蛇蝮諸毒所中及猘犬狂馬所咋苦酒和傅又水服二丸婦人産後餘疾及月不通徃来不時服二丸日再婦人胸中苦滯氣氣息不利小腹堅急繞臍絞痛漿服如麻子一丸稍加之如小豆大小児百病驚癎痞塞及有熱百日半嵗者以一丸如黍米大置乳頭飲之一嵗以上如麻子一丸和服右件細末大鉢中衮件兩日極令勻合糯米粉二兩添水煮胡阿膠膏和藥杵二千餘杵丸如鷄頭大焙令一分乾甆缾収置暖處但此方修合雖好然亦遲滯不若修剉生料衆藥同片生薑半斤或七兩甘草三兩於甆缾内用水一斗五升上下文武火煑水乾為度仍除乾松白茅檀香縮砂仁藿香葉勿煑令項焙搗為末庶香氣全所有煮者衆藥亦作一處焙搗為末末就了却令研腦麝同香松茅数件大鉢内衮三二日令藥味和合方作為丸煮藥下水之作訣以水髙衆藥一寸餘許文武火煑若火􅁟藥無味却酌量伺候風為萬病之根源盖五臟所受不同而引起疾證有異善衛生者日三飲送下小児大腹及中惡熱毒食物不化結成積聚服二丸小児寒熱頭痛身熱及吐哯服一丸如麻子大小児羸痩丁奚不能食食不化漿水服二丸日三又苦酒如和桐子大傅上良一切萬病量之不過一二丸莫不立愈欲行問孝者病服一丸又一丸擊頸上行無所畏至䘮家帶一丸辟百鬼若獨自宿山澤塜墓社廟叢林之中焼一丸百鬼不敢近仍以蠟和一丸如弹子大着絳囊中繫臂上男左女右山精鬼魅皆畏之硃砂鶴頂丹治諸疾半夏火炮裂杏仁去皮尖山豆去皮油各四十九宿蒸餅四兩去皮乾胭脂二錢為末右同搗為泥滳酢為丸小豆大毎服十丸加至十五丸此藥治二十一等病證心腹膨脹陳皮湯或米湯下傷寒陳皮湯下白痢乾姜湯下赤痢甘草湯下血痢當歸湯下大小便不通磨刀水下心氣疼菖蒲根湯下心疼痛醋湯下冷病艾湯下勞氣米湯下小腸氣茴香湯下腎臓風木𤓰湯下腸風痔漏㵼痢槐花湯下吐血丁香湯下隂毒傷寒葱白湯下瘧疾桃心湯下噎食木香湯下小児妳痺皂莢子湯下小児驚風薄荷湯下小児五疳八痢米湯下五嗽人參馬兠苓湯下一名鶴頂丹有硃砂三錢為衣湯酒食物随下臍腹疼痛鹽湯下腰疼脚氣牽牛湯下水瀉車前子湯下婦人月水不調紅花􅆚藥湯下普濟方卷二百五十五
