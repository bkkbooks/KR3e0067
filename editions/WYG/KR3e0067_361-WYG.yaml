三嵗至五嵗兒服五丸並用米飲下更量兒大小加減當歸散治小兒胎寒躽啼驚癎虚脹不嗜食大便青或夹膿并治諸癎症下半年至一嵗兒每服五丸一日三五服乳食作痛啼附論夫乳食作痛啼者因兒飲乳乳壅不散傷動脾胃脾胃氣弱不能消化滯乳停留與正氣交擊故成陣作痛而喘也湯氏曰臓寒腹痛由乳母食啖生冷觸冐風寒令乳夾冷氣入而腹中遇夜半隂氣又盛或失盖覆令兒腹冷痛或胎中受寒亦令腹痛多啼其證大便青白而瀉面白方治臓寒腹痛用四君子湯加丁香白薑每服木香匀氣散五積散又方以熟艾烘熱以帛包頻熨臍腹小兒不喫乳附論凡小兒初生㸔産人見兒出急須及時以手掩拭兒口無令惡血得入兒喉則兒腹内調和無有疾病若掩拭不及時則惡血穢露兒咽入腹令心腹痞滿故兒不喫乳也方硃砂丸治小兒三嵗己胃口閉不喫乳硃砂一分細研丁香一分麝香一分細研人參一分去蘆頭犀角屑半兩黄耆半兩剉石膏半兩水飛五靈脂半兩牛黄一分細研甘草一分炙㣲赤剉右搗羅為末入研了藥都研令匀煉蜜和九如菉豆大每服以熟水下三丸日四五服龍膽散治小兒壮熱肚脹不飲乳龍膽半兩去蘆頭犀角屑一分川升麻半兩川大黄一分剉碎㣲炒甘草一分炙㣲赤剉鼈甲一分塗醋炙令黄去裙襴右搗羅為散每服一錢以水一小盞煎至五分去滓放温分減漸漸與服之摩頂膏白术沈香香附子訶子炮去核木香檀香畢澄茄丁香犀角各一兩麝香半兩蘇合香酒炙􅆈成膏乳香硃砂各一兩腦子半兩安息香酒􅆈成膏人參各一兩右為末同蘇合香安息香膏八味煉蜜一處為丸如鷄頭大半嵗分作七服人參湯化下饑服六神散治腹痛啼哭面青口中冷氣四肢亦冷曲腰而啼大便泄㵼青白糞及不吮乳治因身熱服藥既表解後冄熱者盖氣不歸原而陽浮於外故耳此非熱證也當用此藥加粳米煎和其胃氣歸内身體自涼人參山藥白术各半兩甘草二錢白茯苓白扁豆炒各一兩右為末毎服一錢薑二片棗一枚煎一方用當歸白芍藥人參各二錢半甘草桔梗陳皮各一錢為散每一錢水煎時時與服前藥治胃冷加附子治風加天麻治痢加罌粟殻參香丸治小兒心腹痛并腸冷便青腹急痛乳香木香石菖蒲人參良薑炒各等分右為末酒糊丸如小豆大一嵗五丸米湯下蓬仙丸治小兒心腹刺痛躽身啼哭腸冷便青桂心去皮乳香蓬莪术炮各一錢右為末酒煮糊為丸如小豆大一嵗三丸鈎藤湯下饑服蒜乳丸治冷證腹痛夜啼面青手冷大蒜一枚慢火煨香熟取出細研切日中或火上焙半乾研乳香半錢别研右研匀為丸如芥子大毎服七粒乳飲空時服以乳汁送下治小兒腹痛夜啼牛黄如小豆大右用乳汁化服又臍下書田字瘥半夏丸治小兒腹痛啼呼悶絶半夏生薑汁洗去滑暴乾一分右為末用酒麫糊丸如黍米大百日兒每服三丸治小兒邪祟所侵兒目有所覩而驚哭其候兩手虎口俱無脈紋面變五色右研麝香雄黄硃砂同蘇合香丸降真香湯下又方右用熟艾紙上烘熱外以帕子包熨臍腹中作兩包頻易如大便青㵼宜服錢氏益黄散蚯蚓丸治小兒中客忤一名黄土散右用淡䜴竈中土蚯蚓糞用醋搗和丸如鷄子大摩兒􅇟上及手足心并臍上下各七次擘開藥如有毛即棄之心腹痛啼附論夫卒然心腹刺痛呌悶欲絶死者盖小兒氣血軟弱精神不足忽傷賊風遭邪氣中客忤皆虚而得者其証面易五色眼睛不視似驚癎状是也無問大小若隂陽順理榮衛和平神守内堅邪不干正無諸暴疾也或腸胃挾冷暴為寒邪所折邪氣分争攻衝上下亦令心腹刺痛而啼也方蘇合香丸治小兒心腹刺痛啼哭不住或中邪氣或衝客忤或驚氣入腹或夜啼瘹痛面色不定常服與少許辟邪氣瘟疾除癎霍亂人參乾薑炮白术甘草炙各等分右為末煉蜜為丸如弹子大每服一丸水一盞入大棗一枚擘破同煎至半盞分温三服以薑􅀥湯化下保嬰方為末每服一錢白湯調下名理中湯無時當歸酒治小兒五十日以來胎寒腹痛㣲熱聚唾弄舌躽啼上視當歸切焙粗搗一分猪肉一兩薄切小片右用清酒一碗煮至七分去滓每服取半呷許令兒嚥之日三夜一量兒大小加減胎熱伏心啼附論夫胎熱伏心啼者由姙娠之時不忌辛酸多食炙煿厚衣焙服熱氣熏蒸觸入胎中致胎下之後熱伏於經令兒恍惚風邪暴傷令兒驚啼面赤唇紅時時啼呌是胎熱伏心故也方導赤散治小兒躁啼面赤小便亦赤口中熱腹上亦熱或有汗仰身而啼至晩方息右以導赤散加黄芩煎未效通心飲加麥門冬車前子燈心薄荷湯與兒飲猪苓湯治熱在心本臟属火復為熱所乗故炎上而焦哭其証面赤紅小便赤口氣熱啼時時有汗仰身而啼煩躁畏燈火右以猪苓湯加辰砂導赤散小柴胡湯加黄芩生地黄並用燈心麥門冬或竹茹煎服芝燈湯治小兒熱証心躁夜啼右以芝蔴清油燈花三兩顆研細用燈心數莖煎湯調塗口中以乳汁送下邪干心痛啼附論夫邪干心痛啼者本非起於心乃邪氣客於心也心為五臟之主精神之舎心氣實則邪不干正心氣虚則邪傷於心當歸切焙半兩蜀椒去目及閉口者炒出汗一分附子一枚炮裂去臍皮狼毒剉炒半兩杏仁十二枚湯浸去皮尖雙仁麩炒䜴㣲炒巴豆二十枚去皮心研爛去油盡細辛去苖葉各一分右為末煉蜜和杵以甆器盛之每服旋丸未滿百日兒服如蔴子大一丸温水下一二嵗兒二丸早晨空心服更量兒大小加減以利為度楊氏當歸散治胎寒腹痛面色青白身温冷腹痛多啼當歸炒黄耆蜜炙北細辛去苗葉肉桂去皮白薑炮縮砂仁甘草各等分炙摩頂膏治小兒鼻塞腦悶喫乳不得羊髓三兩當歸三分剉㣲炒細辛三分白芷三分木通三分野猪脂三兩右搗碎先下脂髓於鐺中入諸藥以慢火煎候白芷色焦黄藥成以綿濾去滓於甆合盤盛令凝每用少許塗頂門上摩之兼以少許入鼻内立效人參丸治小兒腹痛不食乳人參半兩去蘆頭黄連半兩去鬚龍膽半兩去蘆頭馬牙硝半兩甘草半兩炙㣲炒剉枳實半兩麩炒㣲黄右搗羅為末煉蜜和丸如梧桐子大每服以乳汁研二丸灌入口中日三五服瘥乳黄散治小兒腹痛不止哺乳赤茯苓一分甘草一分炙㣲赤剉黄連一分去鬚右搗羅為末煉蜜和丸如梧桐子每服一丸研破著妳頭上令兒吮妳或研㸃口中亦得硃砂散治小兒不喫乳眼目不開手足牽挽此是驚風硃砂一分龍齒一分消石一分右細研為散每服煎竹葉湯放温調下一字如二嵗已上兒每服半錢鹽黄散治初生兒不飲乳吐不止蘧莪蒢少許鹽兩黄米大右以妳汁一合煎三五沸去滓即加牛黄兩粟米大分減服之立效青礞石丸治小兒吐妳白丁香一錢去土硫黄三錢青礞石一錢半百草霜一錢半五靈脂一錢半右為末細研米飯為丸如菉豆大捻作餅子毎服三十餅温水送下右㕮咀生薑糯米煎空心服當歸散治小兒胎寒聚唾弄舌躽啼反張怒驚方見本門胎寒類幼乳法治中寒其證手足厥冷寒顫口禁暈悶口吐涎沫不能啼哭右用五積散薑􅀥煎子母服一方消積飲加丁香薑􅀥煎子母同服一方用食鹽同茱茰炒絹包熨兒臍腹乳附丸治小兒腹冷寒胃冷便夾白膿心腹痛洩㵼氣虚腹痛啼呌有汗附子炮去皮乳香當歸訶子炮去核桂心乾薑炮吳茱茰各等分右為末酒糊為丸如小豆大月内兒一丸鈎藤湯下或米飲食前大小加減服芎藭湯治小兒胎寒腹痛躽啼芎藭當歸切焙黄耆剉焙各三兩乾薑炮甘草炙黄芩去黑心各半兩右搗篩每一錢用水一小盞煎至五分去滓温分二服早晨日晩一服量兒大小加減服之逐痛丸治小兒胎寒躽啼温中止痛雀屎一分炒牛黄别研芍藥芎藭各半兩當歸切焙一兩右為細末煉蜜和丸如麻子大百日兒每服一丸乳汁下早晨日午近晩各一服量兒大小加減理中丸治小兒胎寒腹痛躽啼不利方見前厚腸丸治小兒失乳以食飼之未有食腸不能尅化或生腹脹四肢瘦弱或痢腹痛啼橘皮三分去白大麥蘖五分炒半夏三分洗枳實三分炒蒼术三錢製青皮三分去穰人參二分厚朴二分薑炙神麯末五分炒右為細末水麵糊為丸如麻子大每服二十丸温水送下食前忌飽食普濟方卷三百六十一
