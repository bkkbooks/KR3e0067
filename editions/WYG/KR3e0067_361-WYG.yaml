body:
  text: 普濟方卷三百六十一明周王朱橚撰嬰孩初生門胎寒附論凡小兒胎中受寒於臟傷動胞胎生下不能将䕶冄傷外風其候面色青白四肢逆冷手足顫動似大人寒瘇或口噤不開乃胎寒之候也其寒氣或乗虚而入臟則令腹疼或作盤腸内瘹皆因寒而得之大便青者是也方調中丸出聖恵方治小兒胎寒虚脹滿不嗜食大便青挾白膿及欲𤼵癎宜服當歸半兩剉㣲炒川椒一分去目及閉口者㣲炒去汗附子一枚炮裂去皮臍狼毒半兩炒黄巴豆二十枚去皮心去油盡細辛一分豉四合炒㣲焦杏仁十二枚湯浸去皮犬炒黄右搗羅為末煉蜜和搗三五百杵以器盛之未滿百日兒以温水下一丸如麻子大一二嵗兒服二丸量兒大小以意加減服之以利為度當歸散出聖惠方治小兒胎寒聚唾弄舌夜啼反張怒驚當歸剉㣲炒黄蓍剉蜜炙細辛黄芩龍骨細研桂心赤芍藥各半兩右搗羅為末每服以乳汁調下一字日三服更㸔兒大小以意加減醫方集成治小兒胎中受寒生下冄感外風面青白四肢厥冷大便青黒及腸疼盤腸内弔並皆治之川白薑散出直指方治産婦取冷大過胎中受寒令兒腹痛不飲乳木香陳皮㯽榔官桂川薑甘草炙各等分右剉每服一捻水一合煎以綿蘸與之如嘔加木𤓰丁香雀糞丸一名透痛丸出聖惠方治小兒寒躽啼温中止痛雄雀糞一分牛黄半兩細研赤芍藥半兩芎藭當歸一兩剉㣲炒右搗羅為末煉蜜和丸如麻子大百日兒每服以乳汁下一丸日三服量兒大小以意加減服之茱茰散出危氏方治小兒腎縮乃初生受寒氣有此症右用茱茰硫黄各半兩為末研大蒜薄傅其腹仍以蛇床子燒烟熏之猪腎當歸散出聖惠方治小兒五十日以來胎寒腹痛㣲熱而驚聚唾弄舌躽啼上視此癎之候宜服此方猪腎一具薄切去脂膜當歸剉㣲兩炒一右二味相和以清酒一升煮至七合去滓毎服取如杏仁大令兒嚥之日三服夜一服量兒大小以意加減良治小兒多患胎寒好啼晝夜不止因此成癎矣出葛洪肘後方右用當歸末一小豆大用乳汁灌之日夜三四度瘥芎藭丸出葛洪肘後方治小兒胎寒腹痛大便青芎藭黄蓍各三錢牛黄研一分䗪蟲半兩麝香研一錢當歸切焙芍藥各半兩右為末煉蜜和為丸如麻子大每服兩丸至三丸米飲下早晨晩間各一量兒大小加減黄蓍湯出聖濟緫録治小兒胎寒腹中㽲痛黄耆切焙人參芍藥各一兩半當歸切焙甘草炙芎藭各一兩右搗羅每服二錢匕以水一小盞生薑二片煎至五分去滓温三服早晨日午近晩各一芍藥丸出聖濟緫録治小兒胎寒大便青不欲食芍藥當歸切焙人參各三分甘草炙一兩右為末煉蜜為丸如麻子大毎服一丸以乳汁下早晨日午近晩各一服量兒大小加減衣中白魚摩方出聖惠方治小兒胎寒腹痛汗出衣中白魚二十枚右以薄熟絹包褁於兒腹上回轉摩之以瘥為度梨汁飲出千金方治小兒怱患腹痛夭矯汗出名胎寒右以煮梨葉濃汁七合可三四度飲之當歸散出傅氏活嬰方治胎寒啼哭當歸一錢桂心一錢甘草半錢白茯苓二錢右為末每服一錢或半錢乳汁調入口中五加皮散出傅氏活嬰方治胎寒身軟當歸二錢甘草半錢木香二錢白茯苓三錢右為末每服半錢棗湯下或東𤓰仁湯下治胎寒喉中白膜口瘡出𫝊氏活嬰方黄連硼砂甘草各等分右為末用乳汁調滴入口中猪乳汁亦可人參散出傅氏活嬰方治胎寒人參當歸白茯苓白芍藥川芎甘草各等分右為末每服半錢乳汁調入口中小柴胡湯出傅氏活嬰方治胎病寒邪柴胡二兩黄芩人參半夏各三錢甘草半兩右件㕮咀每服一錢薑􅀥湯服胎熱附論小兒受胎熱因母受熱或恣食酒麫熱毒之物𫝊入胎中令兒生下面赤眼閉不開身體壮熱哭聲不止口熱如湯乃為胎熱之候也初生嬰兒以表用藥凡有胎熱証當令乳母服藥不可求速效也治法當以酸乳令兒喫漸次解之百無一失若遽以冷藥攻之必損脾胃加以嘔吐乃成大患學者當曉此理胎熱生下有血氣時呌哭身壮熱如茶色目赤大便赤黄糞稠急食乳浴法主之更别父母肥瘦肥不可生瘦瘦不可生肥也方地黄湯治在胎受母熱毒生下遍身面目俱黄身熱大便祕小便黄色多啼不食乳赤芍藥川芎當歸天花粉猪苓赤茯苓澤㵼甘草山茵蔯各等分右㕮咀生地黄煎子母同服解胎熱醸乳方出危氏得效方解胎内受熱生下面赤眼閉大小不通不食乳澤㵼二兩半赤猪苓去黑皮天花粉各一兩半生乾地黄二兩山茵蔯用葉甘草各一兩赤茯苓一兩半右㕮咀每服五錢水一盞煎至六分食後撒去舊乳去滓服急風散出醫方妙選治胎氣挾熱亦因母有邪熱傳染或生下洗浴當風褓襁失度致令嬰兒啼聲不出乳哺艱難名曰撮口不開病在七日之内尤甚宜用蛇蜕皮一分㣲炒鈎藤一分乾蝎稍一分硃砂一分水飛麝香半錢真牛黄半錢研細右為末每服一字取竹瀝一兩㸃同乳汁調下黄連散由洗兒洗目不浄穢汁浸漬或在母食熱服熱藥令兒目赤爛杏仁黄連黄栢當歸赤芍藥各等分右剉乳汁浸一宿晒乾為末每用一字生地黄汁調頻㸃眼中母服洗心散猪苓湯右加天花粉山梔仁白水煎臨熟入生地黄汁子母俱服胎驚附論胎驚者兒在母胎中十相具足或妊婦驚怪攧撲失驚而心至血脈應之於胎故生下未滿月而𤼵驚者是也初生嬰兒難以用藥凡有此候急令用取猪乳細研辰砂牛黄少許調抹口中功効不可具述又入麝香當門子尤佳方龍膽湯出直指方治胎驚月内氣盛發熱凡臍風撮口壮熱皆可用龍膽草鈎藤柴胡黄芩北梗赤芍藥茯苓甘草炙各半兩蜣蜋二枚去翅足炙大黄一分濕紙煨麦門冬去心一錢防風一錢右為末每服一錢北􅀥煎服或加防風麦門冬以導心熱黄芩減半用三因引用蜣蜋餘藥並同太一散出直指方治胎驚天漿子去殻㣲炒南星白附子各㣲炮天麻防風茯苓各二錢全蝎硃砂各一錢麝香少許右為末每服半錢乳汁化下參蝎散出直指方治胎驚定心神天漿子天竺黄人參硃砂全蝎天麻蟬殻各䓁分麝香少許右為末煉蜜丸梧桐子大每服三丸金銀湯下獨活湯出直指方治胎驚𤼵散風邪羌活獨活㯽榔天麻麻黄去節甘草各半分炙右剉散每服半錢水煎服於内加南星末蜜調可貼􅇟上猪乳膏出直指方治胎驚最妙琥珀防風各一錢硃砂半錢右為末猪乳調一字拭入口中全蝎散出直指方治諸驚胎癎全蝎一箇焙琥珀硃砂各少許右為末每服一字麦門冬煎湯調下全蝎散出湯氏寳書治驚胎風皆可服右以全蝎頭尾全者用生薄荷葉褁外以麻纒火上炙燥為度研為末另研生硃砂麝香少許煎麥門冬湯下牛黄猪乳膏出危氏方治兒在胎中受驚初生未滿月而𤼵驚右用硃砂細研同牛黄少許取猪乳汁調稀抹入口中入麝香當門子尤妙此法諸家方書並皆不曽載自余傳之始東官吳觀察新得一子有一月病此因用之牛黄散治小兒胎驚及乳癎心熱牛黄研半兩馬牙硝研鐵粉研龍齒研各一分右研細和匀每服一字七熱熟水調下早晨午間臨卧各一服随兒大小以意加減胎風附論夫胎風者由在胎之時臟腑未具神氣未全母動静不常酒色過度或憂愁思慮呌喚聲髙或自聞大聲傷動心神又因将養失宜觸冐寒暑腠理開洩風邪所傷入於胞中兒生之後邪氣在臟不能宣通或包褁失度冷觸臍帶風傷四肢若乳哺不調令兒吐噎時復面青或痰食壅積則生氣壯熱時或面紅二者不已致令拘急驚卧不安手足動揺身反强直乍静乍動此即胎癎也子在胞胎禀受不足肝心驚虚及其始生乳養無法觸冐外邪或因㫁臍瘡痂未斂風邪一入則令臟腑虚弱經絡不通藴結為熱盖風善行而數變入於榮衛氣血間則令兒壮熱吐哯精神不寧睡卧饒驚手足抽掣故名胎風縱而弗治則成癎矣方葛根湯治小兒初生至百晬前後驚癎連𤼵不醒及胎中感風體冷面青筋急反張葛根剉㣲炒麻黄去節𦍑活去蘆頭甘草炙剉枳殻去瓤麩炒各半兩杏仁湯浸去皮尖雙仁炒一分升麻黄芩去黒大黄剉炒各一兩柴胡去蘆芍藥各三兩鈎藤一分蛇蜕微炙三寸蚱蟬三枚去翅微炒石膏碎一兩右搗篩每服一錢水半盞煎至三分入竹瀝少許更煎一兩沸去滓分温三服随兒大小以意増減犀角丸出聖惠方治小兒胎風搐搦筋脈拘急牙關或時𦂳硬犀角屑半兩白花蛇一兩酒浸去皮骨炙令黄天南星半兩炮裂白附子半兩炮裂乾蝎半兩微炒天麻半兩麻黄半兩去根節以上七味搗羅為末用無灰酒二大盞攪令匀於慢火上煎旋添酒不住手攪以酒盡為度又方牛黄一分麝香半分膩粉一分硃砂一分虎睛一對㣲炙水銀一分以棗穣研令星盡龍腦一分右研入酒煎膏内㸔硬軟和丸如菉豆大不計時候以竹瀝下三丸量兒大小加減水銀丸出直指方治胎風壮熱痰盛翻眼口噤能下胎中藴受之毒亦治驚積但量用之水銀一錢蒸棗内研成泥白附子一錢半蝎一錢南星硃砂各一分天漿子牛黄蘆薈各半分腦一字鈆霜半錢和水銀研麝半錢直殭蠶炒七箇右為末粟米糊丸芥子大毎一丸薄荷湯下如未通利加至二丸虎睛丸治小兒胎風虎睛研牛黄研乾蝎七枚炒墨一棗大青黛研一分史君子十枚燒存性丹砂麝香研各半錢龍腦研金箔銀箔各十片右為末用水浸炊餅和為丸如櫻桃大煎金銀薄荷磨下半丸如疾甚重服更量兒大小加減龍腦散治小兒胎風及慢驚腹㵼多睡化涎解熟龍腦研麝香研白附子牛黄天麻白殭蠶直者妙乾蝎炒烏蛇肉酒浸炒各一分麻黄去節半兩天南星㣲炒半兩右除龍腦麝香牛黄同研令勻外餘搗碎不羅用新水一盞浸一伏時冬月浸兩伏時生絹濾藥汁和寒食白麵為丸如大皂子大陰乾搗羅為散入前三味冄同研匀毎服一字七薄荷湯調下量兒大小加減露蜂房丸治小兒胎中乆積風熱𤼵歇手足搐搦多驚不睡出聖惠方露蜂房半分炒令黄色蠶蛾半兩㣲炒天漿子三十枚㣲炒天南星半分炮裂硃砂半兩細研水飛過乾蝎一分㣲炒膩粉一分牛黄一分細研水銀一分以棗肉研令星盡右為末都研令勻以煉蜜和丸如菉豆大不計時候煎槐桞薄荷湯下五九量兒大小以意加減水銀丸出聖惠方治小兒風𤼵作抽掣渾身急强眼目反張水銀天麻天南星炮裂白附子炮裂乾蝎各一兩㣲炒麝香細研龍腦細研藿香各一分直殭蠶一兩㣲炒右為末先用少許􅀥肉研水銀星盡與諸藥同研令勻煉蜜和丸如菉豆大不計時候以薄荷酒研三丸服之量兒大小以意加減得汗出立効虎睛丸出聖惠方治小兒胎風及驚風目睛上視手足搐搦虎睛一對酒浸㣲炙黄天麻乾蝎㣲炒烏蛇肉炙㣲黄羌活獨活殭蠶㣲炒麝香各一分細研右為末以麵糊為丸如菉豆大每服三丸破研不計時候以薄荷湯服之一方名虎睛膏金箔為衣天南星丸治小兒胎風壮熱瘛瘲天南星炮二枚白附子炮十枚乾蝎全者炒一分牛黄研龍腦研各一錢丹砂研一錢半雄黄研一錢天漿子十枚去皮右為末煉蜜和為丸如皂角子大以丹砂為衣三二嵗兒每服一丸至十嵗服三丸煎金銀薄荷湯化下空心臨卧服虎睛丸治小兒胎風服犀角丸後宜服虎睛㣲炙研一分代赭搗研一分蘆薈研三分丹砂研一分麝香研一分牛黄研三分桃仁二七枚湯去皮尖炒當歸切焙一分右為末煉蜜和丸如麻子大一二嵗兒每服三丸四五嵗兒毎服五丸並温水下日冄牛黄丸出聖惠方治小兒胎風手足搐搦徧身壮熱牛黄一分細研水銀一分用黑鉛一分同結為砂子細硏硃砂一分細研犀角屑一分麝香半分細研蝎稍一分㣲炒天漿子一分天南星一分炮裂右為末以糯米飯和丸如菉豆大不