同糖煎化澄清喂飲之加淡竹葉一握能解五臓熱毒夏月産者尤宜服之黄龍湯出傅氏活嬰方治嬰兒出胎血肉未歛面目俱黄不啼鼻乾撮口四肢不伸縮並宜服山茱茰山藥生乾地黄澤㵼赤茯苓甘草各一錢腦子麝香少許右為末每服一錢温水㸃服如小便不通則用五苓散加人參加茵蔯煉燈心煎服變蒸附論凡兒生三十二日一變六十四日冄變變且蒸九十六日三變一百二十八日四變變且蒸一百六十日五變一百九十二日六變變且蒸二百二十四日七變二百五十六日八變變且蒸二百八十八日九變三百二十二日十變變且蒸積三百二十日小蒸畢後六十四日大蒸蒸後六十四日復大蒸蒸後一百二十八日復大蒸小兒自生三十二日一變冄為一蒸凡十變而五小蒸又三大蒸積五百七十六日大小蒸都畢乃成人小兒所以變蒸者是容其血脈改其五臟故以一變竟輙覺情態有異有變蒸之候變者上氣蒸者體變蒸有輕重其輕者體熱而㣲驚耳冷尻冷上唇頭白泡起如魚目珠子㣲汗出其重者壮熱而脈亂或汗或不汗不欲食食輙吐哯目白睛㣲赤黑睛㣲白又云目白者重赤者㣲變蒸畢目睛明矣此其證也單變小㣲兼蒸小劇凡蒸平者五日而衰逺者十日而衰先期五日後期五日為十日之中熱乃除兒始生三十二日一變二十九日先期而熱便治之如法至三十六日七蒸乃畢耳且變蒸之時不欲驚動勿令傍多人兒蒸變或早或晩不如法者多又初變之時或熱甚者違日數不歇審計變蒸之日當其時有熱㣲驚慎不可治及灸刺但和視之若良乆熱不可已少與紫丸㣲下熱歇便止若於變蒸之中加以時行瘟病或非變蒸時而得時行者其証皆相似惟耳及尻通熱口上無白泡耳當先服黒散以發其汗汗出温粉粉之熱當歇便就瘥若猶不都除乃與紫丸下之兒變蒸時若有寒加之即寒熱交争腹腰夭糺啼不止者熨之則愈也變蒸與温壮傷寒相似若非變蒸身熱㞍亦熱耳熱此乃為他病則可餘治審是變蒸不得餘治也凡小兒生三十二日始變變者身熱也至六十日冄變變且蒸其状端正也至九十六日三變定者候丹孔出而泄至一百二十八日四變變且蒸以能咳笑也至一百六十日五變以成機關也至一百九十二日六變變且蒸五機已成至二百二十四日七變以能匍匐也至二百五十六日八變變且蒸以知欲學語也至二百八十八日九變以亭亭然也凡小兒生至二百八十八日九變四蒸也當其變之日慎不可妄治之則加甚疾變且蒸者是兒送迎月也蒸者甚熱而脈亂汗出是也近者五日歇逺者八九日歇也當是蒸上不可灸刺妄治之也錢氏云小兒在母胎中乃生骨氣五臟六腑成而未具自生之後即長骨脈五臓六腑之神智也他變者易也變蒸者自内而長自下而上又身熱以生之日後三十二日一變每異常情惟異於前伺者長生腑臟智意故生何謂三十日長骨添長神人有三百六十五骨除手中足中四十五碎骨外有三百二十數自生下骨一日十段而上之十日百段而三十二日計三百二十叚為一遍亦曰一蒸骨之餘氣自􅻙分入齦中作二十二齒而齒有不及三十二數者乃變不足之常也或二十八日即至長二十八齒已下倣此但不過三十二數也凡一周變乃𤼵虚熱也諸病如此十周則蒸畢也計三百二十日生骨氣乃全而未壮也故初三十二日一變生腎至六十四日再變生膀胱其𤼵耳與骩冷腎與膀胱俱主水水數一故先變生之九十六日三變生心喜一百二十八日四變生小腸而發汗出而為驚心為火火數二一百六十日五變生肝一百九十二日六變生膽其𤼵目不開而赤肝主木木數三二百二十四日七變生肺聲二百五十六日八變生大腹其𤼵膚與聲不汗肺主金金數四二百八十八日九變生脾智三百二十日十變生胃其𤼵不食腸痛而吐乳此後乃平方龍膽湯治小兒初生血脈盛實寒熱温壮四肢驚掣𤼵熱大吐哯者若已能進哺飲食不消壮熱及變蒸不解中客人鬾氣并諸驚癎悉􅓼龍膽鈎藤柴胡去苖赤茯苓去黑皮桔梗炒黄芩去黑心芍藥大黄剉炒各一兩甘草炙剉蜣蜋去翅足炙當歸切焙人參各一兩右麄搗篩一二嵗兒每服一錢七以水五分煎至三分去滓温服三四嵗兒毎服一錢七水一小盞煎至五分去滓連下三四服量兒大小加减惺惺散出傅氏活嬰方退變蒸及温壮病輕宜服發熱咳𠻳痰涎鼻壅聲重人參白术白茯苓甘草白芍藥天花粉桔梗各半兩細辛一分右為末每服一錢水半小盞薑一片薄荷一葉煎至三分服之或除天花粉加川芎或加花粉升麻柴胡等分一方無白芍藥調氣散出直指方治變蒸吐㵼不乳不啼木香香附子炒去毛人參厚朴橘皮藿香去土甘草各一錢右剉散每服三字水一盞生薑三片紅􅀥一枚煎温服以上證候治之但當以平和之劑㣲表熱實者㣲利之柴胡湯一名人參散出聖惠方治小兒變蒸經時不止挾熱心煩啼呌不歇骨熱面青柴胡去苖甘草炙剉人參元參龍膽半兩麥門冬去心焙一兩半右麄搗篩每服一錢半水八分煎至四分去滓温服不拘時更量兒大小加減一方用防風無元參清心湯出醫方妙選治嬰兒周晬内時或體熱眠睡不寧乳哺目睛不明或瘥或作三十二日一變六十四日冄變甚者㣲驚乃長血氣名曰變蒸候過周晬漸除切不可亂投諸藥宜用人參半兩去蘆麻黄去節川大黄麥門冬去心甘草炙犀角用屑各一分右為細末每服一錢水八分杏仁一箇去皮尖拍破同煎至四分去滓放温時時與服前胡湯治小兒變蒸熱氣乗心煩躁啼呌不已及骨蒸煩熱前胡去蘆頭龍膽甘草炙剉麥門冬去心焙人參各一兩右麄搗篩每服一錢用水七分煎至四分去滓食後量兒大小加減温服紫砂丹出醫方妙選治證與前清心湯同當歸半兩焙硃砂水飛木香人參各一分去蘆代赭半兩研細水浸一宿澄去清水焙乾右為細末與代赭石研匀入杏仁十枚去皮尖巴豆五箇去心膜出油同研匀入麝香半錢拌匀滴水和如針頭大每服三粒煎荆芥湯下乳後服當歸散出直指方治變蒸有寒無熱當歸二錢木香官桂辣者甘草人參各一錢右剉散毎一錢水一盞薑三片紅棗一枚煎食前服紫丸一名紫雙丸出聖惠方治小兒變蒸𤼵熱不止并夾食傷寒温壮汗後熱不歇及腹中有痰癖哺乳則吐哯食癎先寒後熱赤石脂代赭各一兩醋研巴豆三十粒去油杏仁五十枚去皮尖右為末巴豆杏仁别研為膏相和更搗二千杵當自相得若硬入少蜜同搗之宻器中收三日兒服如麻子一丸與少乳令下食頃後與少乳勿令多至日中當小下熱除若未全除明日冄與一丸百日兒服小豆一丸以此準量増減夏月多熱喜令𤼵疹二三十日輙一服佳紫丸無所不療名下不虚入代赭須真者若不真以左顧牡蠣代之一方爛飯杵為丸一嵗二丸米湯下四君子湯治小兒變蒸時用四君子加茯苓去白术人參茯苓茯神各半兩甘草炙三錢右為細末薄荷調下慎不可服驚藥恐冷胃氣黒散治小兒變蒸中挾時行温病或非變蒸時而得時者亦治傷寒退熱一名黒散子麻黄杏仁各半兩大黄六銖右搗大黄麻黄為散别研杏仁如脂乃細細内散又搗令調和内密器中一月兒服小豆大一枚以乳汁和服抱令得汗汗以粉粉之勿使見風百日兒服如􅀥核以兒大小量之一方為末一嵗兒半錢熟水調下一方有甘草薄荷湯下小紅綿散治變蒸驚悸自泄天麻人參全蝎麻黄甘草茯苓白附紅花荆芥辰砂麝香各等分右為末每半錢薄荷同煎湯温服防風飲子治變蒸驚悸焦啼哯乳手足抽掣防風𦍑活白附甘草川芎白茯苓全蝎人參各等分右㕮咀為散每服一錢鈎藤同煎防風散治變蒸潮熱焦啼哯乳欲生瘡癬山藥半兩白茯苓半兩白附半錢甘草一錢全蝎一錢人參防風各一錢右為末散每服一字或半錢鈎藤同煎温平驚藥治嬰兒變蒸潮熱驚悸吐乳泄青夢裏佯啼嬉笑情思憔悴並宜服之茯苓逺志羌活防風白附川芎天麻全蝎粉草山藥硃砂代赭麝香白茯神白薇各等分右為末每服一字金銀薄荷湯下天麻四君子湯治變蒸吐乳泄人參白术白茯苓天麻甘草各二錢右為末每服半錢熱湯㸃服及治慢驚體弱冬𤓰仁􅀥子湯㸃服前胡飲子治變蒸潮熱煩渇頭痛瘡子沈伏或疹痘未勻並宜服之升麻白芍藥乾葛前胡川芎甘草知母麻黄苦梗黄芩各等分右為末每服一錢葱白薄荷同煎白术散治變蒸風吐乳自泄人參白术白茯苓甘草藿香山藥扁豆炒各等分右為末毎服一錢熱湯㸃服清神散治變蒸潮熱傷寒兼傷風咳𠻳氣急夜啼煩躁頭目昏沈麻黄去節二錢川芎五錢羌活二錢防風二錢荆芥苦梗甘草各二錢茯苓半兩人參三錢右為散每服二錢薄荷同煎温臟鈎藤膏治變蒸驚焦啼白附茯神甘草茯苓全蝎羌活天麻防風山藥蟬退殭􅁞逺志人參硃砂麝香金箔各等分右為末煉蜜為丸鈎藤膏蘇木湯化下蟬花散治變蒸風痰潮熱焦啼蟬花一兩白茯苓人參防風白附子甘草山藥全蝎天麻硃砂麝香右為末每服一字金箔薄荷㸃服小紅丸治變蒸潮熱咳𠻳多痰吐乳驚悸無時焦啼痄腮風痰宜服之南星半夏白礬各二錢各生全蝎一錢巴豆三七粒去油代赭半錢白附一錢生杏仁二錢炒硃砂二錢右為末爛飯為丸如粟米大每服十五丸葱白薄荷湯下連進三服立通洗心散治變蒸潮熱焦啼煩躁口舌生瘡眼赤熱痛並宜服之荆芥甘草防風羌活苦梗黄芩赤芍藥白芷大黄山梔子山藥川芎赤茯苓麻黄各等分右為末每服一錢燈心麥門冬煎湯㸃服連翹散治變蒸焦啼驚熱連翹荆芥防風甘草右各等分為末散白水煎服牛蒡散治變蒸生瘡防風荆芥甘草各等分牛蒡子炒一分右為末散白水煎服硼砂散治變蒸生口瘡硼砂豆粉硃砂各等分右為末摻口中犀角散治變蒸潮熱焦啼驚悸暴赤眼疾茯神茯苓荆芥防風藍葉升麻人參薄荷羌活苦梗黄芩山梔子川芎白芷山藥山茨菇赤芍藥粉草蟬退大黄各等分右等分為末每服半錢薄荷湯服驚啼附論夜啼脾臟冷而痛也當以温中藥法以禳之花火膏主之驚啼邪熱乗心也當安心神丸主之又有驚啼夜啼心腹刺痛啼邪干心痛啼乳食作痛啼十者大同小異又啼而不哭是煩哭而不啼是躁凡初生兒日夜煩啼真如有祟或謂熱在心經藥與踈利或謂寒停腑臟與服温煖醫者察而治之乃善也若兒啼哭胷膛仰突首反張喜燈者心經有熱宜䟱利服三黄丸或洗心散加燈心麥門冬子良若兒啼哭頭低身曲眼閉肚𦂳者臓腑留寒宜與温之胃風湯加黄耆煎效若不識證候但以蟬蜕二七枚全者去大脚為加硃砂一字蜜調與吻立效小兒夜啼有四證一曰寒二曰熱三曰重舌口瘡四曰客忤寒則腹痛而兒面青口有冷氣肢亦冷曲腰而啼此冷證也熱則心躁也而啼面赤小便赤口中熱腹煖啼時或有汗仰身而啼此熱證也若重舌口瘡則要乳喫口到乳上便啼身額皆㣲熱急取燈照口若無瘡舌必腫也客忤者見人氣忤犯而啼也如陽痛服對證藥不退可與珍珠丸利之冄與對證藥治之隂痛服對証藥不退亦可利之冄與對証藥治之立効盖有積也又治法一是邪熱在心本臟属火復為熱所乘故炎上而焦哭其候舌白小便赤者是也宜服珍珠散方見客忤門中小便赤澁熱宜導赤散又宜服官局紫雪二是恐有祟物所覩但口不能語而驚哭也其候兩手虎口俱無脈面變五色者是也玉環集三關虎口脈形歌云忽然兩手俱無見定知唐突惡神明宜服蘇合香丸仍以綘紗袋盛帶之及焼降真香醋炭薰之甚則燒符命有徳法師遣隔之三是有臟腑積冷或乳母飲食生冷令乳夾冷氣入兒腹遇夜半隂氣又盛或失盖覆孩兒腹肚疼痛冬尤甚也甚則令大便青白而㵼宜服乳香没藥等仍用葱白連須煎湯慰洗乳母宜服木香勻氣散宜服魏香散夫驚而有隂陽二證亦有半隂半陽證隂則身體温涼大便青緑時復驚啼陽則身體𤼵熱精神不定睡中驚啼良由風冷乘之榮衛不調又有身涼大便赤黄而啼者有身熱大便青白而啼是半隂半陽之證也隂用安寳膏陽用寧眠膏半隂半陽用蘇香丸琥珀散方蛇黄散治小兒風熱驚啼蛇黄搗碎研犀角鎊人參白茯苓防風細辛去苖土蚱蟬去翅足㣲炒乾蝎醋拌㣲炒丹砂研母丁香山茱茰㣲炒甘草炙右羅為末更研令細一二嵗兒毎服一字用竹瀝調服三四嵗兒每服半錢七日三服不拘時候安神散人參白术白茯苓各一錢甘草二錢辰砂半錢天麻半錢茯神半錢全蝎七箇荆芥一錢右為末每服半錢荆芥湯下如未安冄用調中散治小兒驚熱以犀角磨取汁服龍齒丸治小兒夜驚熱龍齒白殭􅁞當歸切焙芍藥蝸牛鈎藤各半兩代赭研牡蠣麝香研牛黄研各一分右搗研細煉蜜和如菉豆大二嵗兒三丸井花水化下量兒大小以意加減牛黄散治小兒風熱驚啼牛黄一分細研犀角屑一分人參一分去蘆頭茯神一分防風一分去蘆頭蚱蟬一分去足頭㣲炒細辛一分蛜蜥一分醋拌㣲炒硃砂一分細研甘草一分炙㣲赤剉右為散入硏了藥更研令勻一二嵗兒每服一字用竹瀝調服三四嵗兒每服半錢不計時候安神丸治心虚疳熱面黄頰赤壮熱驚啼神志恍惚不寧麥門冬去心焙馬牙硝乾山藥白茯苓寒水石研各半兩硃砂一兩研甘草半兩龍腦一字研右為末煉蜜為丸雞頭大每服半丸沙糖水化下不拘時候青金丸治小兒體熱忽𤼵吐逆夜驚多啼或泄或秘變成慢驚或為疳疾定搐搦􅓼疳蟲墜涎痰安神心龍腦研麝香研各一分墨一錢半史君子煨二枚膩粉一分白麵三分青黛二錢金銀箔各少許右為末滴井花水和丸如鷄頭大每服薄荷湯化下半丸桃紅丸治小兒驚啼眠睡不穏丹砂麝香研各半錢白附子半枚白殭蠶半枚乾蝎頭尾全炒一枚膩粉一錢匕研金箔銀箔各二片研右搗研為末水浸炊餅心和丸如菉豆大每服一丸金銀薄荷湯化下看兒大小臨時加減萬金散嬰兒臟寒禀氣怯弱或多􅇟解面色青白遇夜多啼甚者煩悶壮熱神祟亦由觸犯禁忌所致此名夜啼宜用沈香一兩丁香一兩人參一兩五味子一兩當歸一兩赤芍藥半兩白术半兩桂心一分右為末每服一錢用温水淡漿一小盞煎至五分温時滴口中立效一方有乳香清神散治小兒驚熱啼呌不安牛黄研天竺黄研鉛白霜研鬱金麥門冬去心焙甘草炙各一分人參半兩右為散毎服半錢七人參湯放冷調下乳食後牛黄膏治嬰兒睡眠着忽啼哭驚覺面赤口乾若神祟即非夜啼乃風熱邪氣乗於心臓名曰驚啼宜用真牛黄牡蠣人參甘草辰州硃砂雄黄龍腦右搗羅為細末煉蜜和成膏如鷄頭大每服半粒至一粒薄荷湯化下乳食後養藏湯嬰兒在胎之時其母将養一切不如法及取涼飲令過度冷氣入兒腸胃使胎不强致生下羸弱多病俛仰多啼名曰躽啼宜用川當歸一兩沈香半兩丁香半兩白术半兩桂心半兩川芎半兩木香右研為細末每服一錢水八分入生薑二片煎至四分去滓放温時時滴口中一方無木香紅輪散治小兒驚夜啼涎壅心躁并治中暑昏憒牙硝寒水石煅各一兩麝香半錢腦子半錢硃砂二兩甘草右為末周晬兒一字薄荷湯調下龍角丸治小兒五驚夜啼及壮熱心煩眠臥不安睡中或時搐搦龍角六銖牡蠣一作生用川大黄各九銖黄芩半兩蚱蟬二枚牛黄如小豆五枚右為末煉蜜為丸麻子大蓐裏兒服三丸随兒大小増減龍齒散治小兒拗哭夜啼龍齒蟬殻鈎藤有鈎子者羌活茯苓人參各等分右為末每服一大錢水一大盞煎至六分去滓温喜熱服治小兒驚啼𤼵歇不定真好麝香右研為末每服清水調下一字日三服量兒大小服鈎藤散治小兒驚啼壮熱心煩不得稳睡宜服鈎藤一分龍膽一分去蘆頭犀角屑一分茯神一分黄芩一分甘草一分炙㣲赤剉右為末散每服一錢以水一盞煎至五分去滓量兒大小分減頻服之龍齒散治小兒驚啼眠卧煩熱不安龍齒半兩麥門冬半兩去心焙赤芍藥一分川升麻一分川大黄一分剉碎㣲炒甘草一分炙㣲赤剉右為散每服一錢以水一小盞煎至五分去滓量兒大小分減頻服之乳哺兼去風癎虎睛研細二枚犀角屑一兩黄芩去黑心梔子仁大黄剉碎㣲炒各半兩右除虎睛外搗羅為末冄仝研匀煉蜜和丸如麻子大每服以粥飲下五丸日三四服量兒大小加減一二嵗用乳汁研破三丸三嵗兒每服五丸温水研破下勤服以利為度赤芍藥散治小兒初生一年内兒多驚啼不休或不得眠卧時時肚脹有佀鬼神所為赤芍藥一分桂心一分白术一分甘草一分炙微赤剉川大黄一分剉碎㣲炒右為散每服一錢以水一小盞煎至五分量兒大小加減温服牛黄丸治小兒驚啼壮熱少不得睡牛黄半兩牡蠣一分焼為末川大黄一分剉破㣲炒黄芩一分龍角一分右為末煉蜜和丸如菉豆大滿月兒以乳汁研破服二丸一嵗兒以薄荷湯下五丸餘以意加減服之雄黄丸雄黄半兩細硏牛黄半兩細研牡蠣半兩燒為粉真珍末一分巴豆三枚去皮心研出油右都研為末煉蜜和丸如黍米粒大小兒一月或五十日未發時飲服三丸母抱卧炊一斗米頃兒當􅆍身體輕汗出即解一服不解可冄服若小兒傷乳不安腹中有痰乳當㣲下如雞子清鳥屎鼻涕勿怪便住服藥雷丸浴湯治小兒寒熱驚啼不安雷丸三丸牡蠣三分黄芩三分細辛三分蛇床子右以水一斗煎取七分去滓分為兩度㸔冷煖用先令浴兒頭勿令水入耳目次浴背膊後浴腰已下浴乾避風以粉撲之真珠丸治小兒驚啼及夜啼不止真珠伏龍肝丹砂各一