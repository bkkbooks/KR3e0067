body:
  text: 普濟方卷一百四十七明周王朱橚撰傷寒門傷寒雜治附論夫風寒暑濕飲食勞倦皆能為病是謂五邪冬傷於寒春必病温春傷於風夏必飱泄夏傷於暑秋必痎瘧秋傷於濕冬必欬𠻳是乃四時之氣然五邪所中雖不同本皆外邪大率同類惟冬時嚴寒其毒厲尤甚人或中之病在冬時正名傷寒若邪毒藏於肌膚至春時乗盛暑而發為暑病所謂先夏至日為病温後夏至日為病暑是也其病傳之次先客於太陽其病令人頭頂痛腰脊強其脉尺寸皆浮太陽不已傳於陽明其病體熱目疼鼻亁不得卧其脉尺寸皆長陽明不已傳於少陽其病胷脅痛而耳聾其脉尺寸皆弦少陽不已太隂受之其病腹滿體重其脉尺寸俱㣲太隂不已少隂受之其病口燥舌亁而渇或背㣲惡寒其脉尺寸俱沉少隂不已厥隂受之其病煩舌囊縮其脉尺寸俱緩病之所傳不過三陽三隂而已其未滿三日者邪在陽經未入於裏其病在表宜汗之而愈若經四日者邪入隂經其病在裏宜下之而愈特其大略爾葢有一日而傳至数經者亦有數日而尚在太陽者陽病雖宜發汗陽明之病或宜下之隂病雖宜下之少隂之病或宜温之由人之禀受虚盛其傳有遲速又不傳經者當審其脉證凡此五經受病五邪脉證各不同傷風者必惡風其脉浮緩傷寒者必惡寒其脉浮𦂳以至傷暑脉虚傷濕脉緩於人迎𦂳盛為傷寒氣口急盛為傷食診得五邪之症知其本也診得六經知其標也有病雖在表而不可汗者或在裏而不可下者或若汗之太多則津液燥竭遂至亡陽下之太早則邪氣動膈乃或成結胷清濁相干則變為霍亂熱毒内瘀則變為瘀血又或為發黄者濕熱相蒸也或為發班者陽毒太盛陽盛之人得之於熱乃為陽毒隂盛之人得之於寒乃為隂毒蠱動則為狐惑壞病之甚則為百合若勞動復傷隂陽易之類雖瘥猶宜節慎變態多端不可備舉當以類推皆以適當為良唯二感之病表裏皆受邪難治其他或隂證似陽陽證似隂或隂盛隔陽陽盛隔隂者在診病者以意詳之夫人生天地間以氣血籍其真是故天無一嵗不寒暑人無一日不憂苦故有傷寒天行温疫之病盖冬令為殺厲之氣君子善攝生者當嚴寒之時行住坐卧䕶身周宻不受寒毒彼奔馳荷重房勞之人皆辛苦之徒耳當閉藏而反擾動之則欝結臟腑津液强耗為寒所搏則腠理不宻寒毒與榮衛相渾當是之時壮者氣行則己怯者則著而成病矣不即病者寒氣藏於肌膚之間春則病温夏則病熱此皆一氣使然也古之治法一日在皮當摩膏而火灸之二日在顱依法鍼觧而發散之汗出愈三日在肌亦發汗愈四日在胷宜吐之五日在腹六日在胃宜下此華陀之治法也若按三隂三陽之法傳變無出仲景之論盖治傷寒有傷寒之法治雜病有雜病之方豈能異其傳者同其治調理隂陽當按定法也至初得病者頭旋惡心振寒此即素問所謂時欲作嘔起居如驚神氣乃浮者是也傷寒如仲景明六經受病轉變者及素問所謂熱病也若病作無次第初得病表裏不明或先熱而渇不惡寒此即江南謂之黄病北方謂之汗病或長㓜逓相染著又是天行時氣新傷寒以輕劑散之如葱白散和觧散皆可用如六經傳變者當如仲景法有表證者麻黄湯桂枝湯有寒證互見者各半湯見裏證者小承氣湯十􅀥湯深者大承氣湯半表半裏小柴胡湯見痞及結胸者小䧟胸湯皆可用腹滿者理中丸此遇太隂者傳少隂便見厥逆脉浮細即當投四逆湯若見厥隂證用藥不可造次大凡仲景法皆可間用發表則用防風通聖散䨇觧散入腑三乙承氣湯大柴胡湯結胸痞滿大䧟胸湯寒入隂經附子四逆湯半表半裏和觧多用凉膈益元散傷暑亦依仲景用白虎湯桂苓甘露飲益元散備見真恪方子和法發表勝黄湯青龍湯和觧凉膈散當發表用通聖散逐去水腫必須禹切散舟車丸如大水中滿用之極驗方人參輕骨散治傷寒頭痛壮熱項背拘急百節煩疼增寒惡風肢體困倦大便不調小便赤澁嘔逆煩渇傷風頭痛體熱鼻寒聲重欬𠻳傷山嵐瘴氣潮熱徃來及五勞七傷心腹痞滿冷氣奔冲攻注刺痛又婦人血傷撮痛經候不調貝母去心白茯苓焙半夏煮各一兩枳殻去穣炒二兩五錢蒼术泔浸一宿六兩人參白术焙白芷不見火陳皮去白秦艽去蘆赤芍藥各二兩川芎當歸去蘆焙肉桂去麄皮亁薑柴胡去蘆麻黄去根節各三兩桔梗去蘆甘草炙各四兩厚朴薑製四兩右細末毎服三錢水一盞薑三片同煎七分通口熱服身體倦加烏梅一箇咳𠻳加􅀥子二枚同煎不拘時服葱白散觧四時傷寒頭痛壮熱項背拘急骨節煩疼憎寒惡風肢體困倦大便不調小便赤澁嘔逆煩渇不思飲食及傷寒頭痛體熱鼻寒聲重咳𠻳痰涎山嵐瘴氣時行疫癘並皆治之川芎蒼术米泔浸白术各二両甘草炙石膏煆甘葛焙各一兩麻黄去根節三兩右細末毎服三錢水一盞薑三片葱白二寸煎至七分熱服不拘時侯要出汗併三服厚盖取汗神仙百觧散一名神仙四季加減百觧散治傷寒無問隂陽二易證其間所用藥味各隨經絡治病如傷寒在表未傳入經發熱惡寒腰痛連進二服汗出而愈若已傳經絡胷滿頭痛肢體煩疼目睛㣲痛耳聾口燥咽亁或渇手足自温或肢厥自利或不自利小便反快服之則調中順氣袪逐寒邪如頭靣感寒風傷腠理頭痛項強發熱增寒鼻流清涕咳𠻳涎痰及治風濕相摶骨節煩疼肢體沉重洒淅惡風時自汗出此藥大能調順三焦觧表攻裏温潤肺經正四時之氣昇降隂陽能進飲食不問傷風傷寒中暑中寒骨蒸頭疼氣逆胷滿吐逆眩暈惡心及已經汗後不觧下之不當吐之不中此藥清而不凉温而不壅無問老年虚弱男婦人並皆服之如連進數服無不取効常服免瘟疫之疾不中暑寒之病秋服之即無瘧痢冬服之不致傷寒毒真神仙衛生妙藥也功効不可盡述山茵皮一兩柴胡去蘆前胡人参𦍑活獨活甘草蒼术米泔浸剉炒藿香去梗白术半夏薑汁製各一兩亁葛白芍藥升麻防風去苖藁本去蘆立春以後不加减立夏以後一料加柴胡一分赤茯苓當歸酪立秋以後酌减柴胡一分不用當歸茯苓只加亁薑炮肉桂去麄皮各一兩麻黄去半兩立冬以後並無加减一方無當歸有黄茯苓去蘆半兩右為細末毎服三錢水一盞半薑三片栆三枚煎至一盞熱服不計時侯併進二服如要表散加葱白三寸淡豆䜴三粒同煎服以衣被厚盖出汗而愈一方無山茵蔯前胡八觧散出和濟方治四時傷寒頭疼壮熱傷風多汗及療勞傷過度骨節酸疼飲食無味四肢疼痛行歩喘乏靣色痿黄怠惰少力咳𠻳寒熱羸弱自汗胷膈不快嘔逆惡心人參去蘆茯苓甘草炙陳皮去白白术藿香去上各一兩厚朴去麄皮剉生薑自然汁浸一宿炒紫色二兩半夏湯洗七次一兩右為細末每服二錢水一盞生薑三片􅀥子一枚葱白三寸同煎七分温服不拘時侯白术散出危氏方治傷寒氣脉不和憎寒壮熱鼻塞腦悶涕涶稠粘痰𠻳壅滯或冒渉風濕憎寒發熱骨節疼痛或中暑嘔吐眩暈及大病後調理失宜飲食勞復病證如初又治五勞七傷氣血虚損靣色痿黄精神恍惚睡卧不寧肢體倦怠潮熱盗汗脾胃虚弱面色痿黄飲食不羙口吐酸水臟腑滑泄腹内虚鳴反胃吐逆心復絞痛乆瘧乆痢及膈氣咽塞上氣喘促坐卧不安或飲食所傷胸膈痞悶腹脇膨脹婦人胎前産後血氣不和霍亂吐㵼氣厥不省人事常服辟四時不正之氣及山嵐瘴疫神效不可盡述山藥桔梗茯苓去皮甘草白芷陳皮去白青皮去白香附子各三錢白术四兩亁薑炮三兩右為細末毎服二錢水一盞薑三片􅀥一枚木𤓰亁一片紫蘇葉三片煎七分食前服若吐㵼入白梅煎喘入桑白皮杏仁煎傷寒再復入薄荷膈氣入木通三寸麝香少許中暑嘔逆入香薷産前産後氣血不和入荆芥霍亂入藿香氣厥入塩湯調下一方無陳皮𠻳入粟殻烏梅煎藿香正氣散出徳生方治傷寒頭疼憎寒壮熱上喘咳𠻳五勞七傷八般風痰五般膈氣心腹冷痛反胃嘔惡氣㵼霍亂臓腑虚鳴山嵐瘴瘧遍身虚腫婦人産後血氣刺痛小兒疳傷並宜服之大腹皮白芷紫蘇茯苓去皮各一兩半夏麯白术陳皮去白厚朴去麄皮用薑汁炙苦梗各二兩藿香去土三兩甘草炙二兩半右為細末每服二錢水一盞薑三片􅀥三枚同煎至七分熱服如欲出汗衣被盖如再汗不出加葱白根煎服冷𠻳喘滿每服加人參一錢塩梅一箇杏仁七粒去皮尖北五味子十粒就吞青州白丸三十五粒效氣促氣壅加人參一錢沉香五錢心腹痛加木香半錢𤣥胡索七粒切焙嘔惡甚加生薑三片木𤓰二片痰嘔加烏梅一箇寒濕腰痛心腹膨滿加生薑三片木𤓰二片蒼术功砂枳殻煨去穣各半錢檳榔半箇切片一方治憂欝血氣流注徧體刺痛𦂳滿加木香一錢縮砂五粒増减順氣木香丸荆芥散出和劑方治傷寒頭疼鼻寒流涕聲重咽亁胸膈滿悶頭疼如破天南星湯浸生薑自然汁炙輕切培亁草烏頭炮去皮荆芥穗各半兩石膏研一兩右為細末每服二錢陳茶末一錢生薑自然汁半呷薄荷三葉水二盞同煎八分通口服赤散出千金方治傷寒頭痛項強身熱腰脊痛往來有時亁薑防風沙參細辛白术人參蜀椒茯苓麻黄黄芩代赭桔梗呉茱茰各一兩附子二兩右製下篩先食酒服一錢鐡青湯出千金方治三隂三陽厥逆寒食胸脇支滿不能言氣滿肩息四肢時寒時熱喘悸煩亂吸吸少氣言輙飛颺虚損黄鐡三十斤以流水淘二三千徧炭五十斤燒鐡令赤投冷水中又以燒七遍如此澄清取汁二斗煮藥半夏麥門冬各一升白薇黄芩甘草芍藥各四両人參三両石膏五兩生薑二兩大􅀥三十枚右㕮咀内前冲中煮取六升服一升日三服兩日令盡百觧散出百選方治傷寒頭痛肢體沉重惡寒發熱痰逆咳𠻳困倦少力及偏正頭痛此藥專觧四時傷寒常服清神爽氣瘟疫瘴癘不生防風去蘆三兩半麻黄三兩半去蘆根白芷白芍藥各二兩川烏梅五錢炮去皮尖甘草荆芥穗亁薑各三両右為細末每服二錢葱茶或蠟茶㸃服不拘時候煎服亦可正氣散出和劑方治傷寒隂證増寒惡風正氣虚冷胸膈噎悶脇肋膨脹痞滿吐利嘔逆酸水欬逆怠惰嗜卧不思飲食甘草皮七錢陳皮藿香葉白术各一兩厚朴半夏同厚朴各三兩為末生薑四兩研爛為餅子㣲炒右為細末每服二錢薑三片棗一枚水一盞煎至七分食前熱服又治久患瘧疾膈氣心痛日三服常服寛中辟除瘟疫辰砂五苓散出和劑方治傷寒表裏未觧頭疼發熱心胸欝悶唇口亁焦神思昏沉狂言讝語如見神鬼又治瘧瘴煩悶未省等症辰砂研白术去蘆木猪苓去黒皮澤瀉先剉赤茯苓去皮各十二兩肉桂去麄皮八兩右為細末每服二錢沸湯㸃服不拘時如中暑作渇小便赤澁新汲水調下小兒惡心煩熱焦燥多哭咬牙上攛欲為驚風状服半錢熱水調李子湯出危氏方治陽明傷風能食口苦咽亁腹滿㣲喘發熱惡風自汗嗜卧身重小便難潮熱而噦其脉浮弦長而數悉主之杏仁去皮尖半夏湯去滑五味子各二錢半芍藥桂心細辛亁薑炮大黄蒸甘草各二錢炙茯苓右㕮咀每服四錢水一盞半煎至七分去滓食前服白术散出仙明論治傷寒雜病一切吐瀉煩渇霍亂虚損氣弱衰老保養又治酒積嘔噦等證白术茯苓去皮人參各半兩甘草一兩半炙木香一分藿香半兩葛根一兩右為細末白湯調下二錢煩渇者加滑石二兩甚者加薑汁續飲茯苓半夏湯出宣明論治傷寒雜病一切嘔吐或喘咳疼痛痞滿痛者茯苓一分去皮半夏一錢生薑一分取汁右剉如麻豆大水一盞煎至四分絞汁下生薑汁温服不計時侯一方加黄芩去腐甘草陳皮去穰各一分治風痰觧肌湯出經驗良方治大人小兒傷寒病大人全服麻黄去節半兩各用七錢半人參川芎芍藥獨活各半兩前胡二錢半右㕮咀每服四錢水半盞生薑一片薄荷二葉煎至三分去滓三嵗已下小兒一服分作三服口亁加亁葛二錢半川芎茶調散出和劑方治男婦諸風上攻頭目昏重偏正頭疼鼻寒聲重傷風壮熱肢體煩疾肌肉蠕動膈熱痰盛婦人血風攻疰太陽穴疼但見是外感風氣悉皆治之薄荷葉不見火八兩川芎荆芥去梗各四兩香附八兩炒防風去蘆一兩白芷𦍑活甘草炙各三兩右為細末每服二錢食茶清調下常服清頭目一方無香附増損四順湯治少隂病寒多表無熱但若煩憒黙然而寂不欲見光有時腹痛其脉沉細而喜渇經日不瘥舊用四順湯除其熱不可用也若隂病利而體猶有熱者不可復與黄連龍骨湯若已十日餘而下利不止手足徹冷及無熱候者可服甘草三兩炙人參二兩龍骨二兩黄連亁薑各一兩附子中形者一枚炮黒皮右切以水六升煮取二升分再服不差復服甚良若下而腹痛加當歸二兩嘔者加橘皮一兩忌海藻菘菜猪肉冷水陟釐丸出浩凉方治少隂病二十日後下不止陟厘四両不用􅀈者當歸四兩汗防己三兩黄連三兩紫石英三両煆研細末豉三升厚朴三兩炙苦酒五升右切以二升苦酒漬防己一宿出切炙燥復入苦酒中浸又以三升苦酒漬䜴一宿小蒸之研絞取汁搗下篩諸藥以酒豉和丸如梧桐子大冷浆水服二十丸忌猪肉冷水通氣丸治少隂不足腎氣㣲少忽為寒熱太陽下䧟入腎中腎氣奔迫内動三焦或發熱頭疼咳𠻳痰促或右脇牽痛或傳為疹子等證不一其脉左尺沉而弦按之則虚大而澁此方主之又治上氣神驗葫蘆巴一兩炒補骨脂七錢半𤣥參五錢杜仲一兩炒㫁絲川練子一兩半酒浸三稜五錢羌活茴香各五錢麻黄去節二錢春夏三錢右為細末麫為丸空心薑湯下五七十丸塩酒下亦可順觧散出宣􅃒方治傷寒凢初受疾未分隂陽表裏皆可服之蒼术半觔藁本水浸桔梗甘草防風獨活各四兩厚朴姜汁炒右為細末每服二錢薑七片水一盞半煎至八分去滓温服祭酒朴謙之説韶州醫人劉公從周言盛夏熱證有傷寒冒暑二證若熱有進退則為暑若一熱而不間㫁者則為傷寒但當以此别之普救散出經效濟世方一名不傳散治觧四時傷寒肌熱惡寒頭疼身痛汗與未汗但是隂陽二證皆可服蒼术半斤去皮净炒葛根四兩甘草二兩炙右為細末每服二錢水一盞半煎至七分去滓温服或加葱白三寸一方蒼术米泔浸炒甘草生用或只入山茶葱湯調下亦可服藥訖欲出汗者須衣被盖之酒調亦妙萬安散出經驗良方治傷寒輕清發散紫蘇葉陳皮香附去毛桔梗白芷半夏湯炮薑製甘草前胡去頭藁本各一兩亁薑二兩右為粗末每服五錢水一大盞生薑五片􅀥一枚煎八分去滓食前服加亁薑少許𠻳加桑白皮少許欲出汗極熱服無汗用麻黄去節加减法如熱多口渇心煩臟腑堅硬再加前胡臟腑單弱體虚不出汗加桂少許風赤眼目羞明不開再加前胡半兩無熱出汗太過加麻黄根少許六君子湯出徳生堂治傷寒汗下之後将見平復宜服此調理助脾進食辟邪大妙人參白术黄蓍白茯苓甘草山藥各等分右㕮咀每服四錢水一盞半生薑三片􅀥一枚同煎至七分去滓温服不拘時侯此温輕之劑如渇加亁薑烏梅煎大便自利加陳皮厚朴砂仁肉豆蔲煎餘熱加銀州柴胡煎對金飲子出徳生堂治諸疾無不愈者然傷寒後病退調理大宜時常服固元陽益氣血徤脾進食和胃袪痰自然榮衞調暢寒暑不侵此藥療四時傷寒極有功效厚朴甘草蒼术各二両陳皮四兩一方炒黄半觔一治四時瘟疫之氣二毒傷寒頭疼發熱加淡豆豉三十多粒葱白三根同煎一治五勞七傷手足心熱煩燥不安肢節疼痛加柴胡半兩搥碎或猪骨亦可煎服一治痰𠻳瘧疾寒熱之證加草菓梹榔烏梅半夏同煎一治小腸疝氣疼痛發寒熱者加塩炒小茴香同煎一治大便虚滑頻見加肉豆䓻一兩用麫褁煨過白术一錢同煎一治發熱口渴加地骨皮銀州柴胡烏梅同煎一治赤白痢赤痢加黄連白痢加吳茱茰煎一治服固陽益氣徤脾和氣祛痰自然寒暑外邪不侵加人參白术黄耆同煎有虚汗加浮麥煎一治病後體虚加羊骨髓或猪骨髓其骨槌碎同煎服數劑汗出得安如未得汗以稀粥投之厚盖衣服取汗立愈如水氣腫滿加桑白皮煎婦人帯下加黄耆煎酒傷加丁香食傷加良薑四時泄瀉加肉豆蔲風疾加荆芥穗腿膝冷疾加牛膝其拘急及虚壅加地骨皮腿膝加兎絲子頭風加藁本轉筋霍亂加南木皮以上助使止加一銖此藥無論老少胎前産後五勞七傷耳鳴目昏夢泄盗汗四肢沉重腿膝酸疼婦人宫臟乆冷月水不調若能每日一服即美容顔豐肌體調三焦壮筋骨祛冷氣快心胸神效莫述右㕮咀每服五錢水一盞半生薑三片􅀥一枚同煎至七分去滓温服不拘時候其滓再煎日進二三服䨇觧散出經驗良方治傷寒渾身壮熱氣麄煩渇多汗升麻亁葛甘草荆芥蔓荆子薄荷天麻殭蠶知母貝母各半兩右為細末每服四錢水一大盞薑二片葱白一寸煎至五分去滓温服小兒作三服通闗散出活劑方治中風傷寒發熱惡心頭疼目眩鼻寒聲重肩背拘急身體酸疼肌肉瞤動牙闗𦂳急乆新頭風痼疾眼暗並宜服之撫芎二兩川芎一兩川烏二兩薄荷一兩白芷甘草各二兩細辛半兩右為細末每服一錢葱白茶清調下薄荷湯亦可不拘時候破證奪命散出百選方治隂陽二證不明或投藥錯誤以致患人困重垂危七日以後皆可服傳者云千不失一右用人參一兩去蘆薄切水一大升銀石噐内煎至一盞新水澄之取冷一服而進汗不自出只在鼻梁尖上㳙如水是其應也妙慧蘇韜光云侍郎方公曾救數十餘人申屠行父子之婦産後病時疫二十餘日已成壞證偶見問因勸其服一味人參遂安是時方知與此方偶然暗合耳一方有生薑桂附湯出危氐方治足少隂腎經傷風胸滿心煩咽痛自汗腰連胻骨酸痛嘔逆吐涎沫頭痛其脉沉弦者附子生去皮劑桂心亁薑芍藥甘草茯苓桃仁去皮尖麩炒各一兩右為散每服四錢水二盞煎至七分去滓食前服或咽痛加桔梗半兩八物湯出危氏方治足厥隂肝經傷風惡風而倦自汗小腹急痛寒熱如瘧骨節煩疼其脉尺寸俱㣲而遲者桂心當歸川芎前胡防風各二兩芍藥一兩半甘草炙茯苓各半兩右剉散每服四錢水一盞半薑五片􅀥三枚煎八分去滓空心温服青膏方出千金方治傷寒頭疼項強四肢煩疼者當歸芎藭蜀椒白芷呉茱茰附子烏頭甘草各三兩右㕮咀以醇苦酒漬之再宿以猪脂四觔煎令藥色黄絞去滓以温酒服棗核大三枚日三服取汗不效稍増加服黄髙方出千金方治傷寒頭痛項強四肢煩疼者大黄附子細辛亁薑蜀椒桂心各半兩巴豆五十枚右㕮咀以醇苦酒漬一宿以臘月猪脂一觔煎之調適其火下藥成赤色熱酒服梧桐子大一枚又以火摩身數百遍兼治賊風遊走肌膚患處更宜摩之神效白膏出千金方治傷寒頭痛向火摩身體酒服如杏核一枚温服取汗摩身當千遍藥力及行并治惡瘡小兒頭瘡牛領馬鞍皆治之先以塩湯洗瘡以布拭之傅膏癰腫火炙摩千下自消天雄烏頭莽草羊躑躅各三兩右㕮咀以苦酒三升漬一夕作東向露竈煎藥令沸下著土聚上沸定復上如是數遍藥成去滓傷寒咽喉痛含如棗核大一枚日三摩用時令勿近目葱豉湯出肘後方治傷寒有脉數腫痛人不能分别令取一藥兼療者若初覺頭痛肉熱脉洪起一二日便服此方葱白一擡豉一升綿褁右以水三升煮取一升頓服取汗若汗不出更加亁葛根三兩一方更加升麻三兩水五升煮取二升分温再服徐徐服亦可必得汗即差若不得汗更加麻黄三兩去節以葱白湯研米三合水五升煮之少時下淡豆豉葱白四根令火煎取三升分服出汗為妙又方出肘後方用豉一升綿褁以童便三升煮取二升分温再服汗出為效五積散出濟生㧞萃方調中順氣除風冷化痰治脾胃宿冷腹脇脹痛肩背拘急肢體怠惰寒熱往來飲食不進及婦人血氣不順心腹撮痛經候不調白芷川芎甘草茯苓去皮當歸去蘆肉桂去麄皮芍藥半夏洗七次各三兩陳皮去白枳殻去穣炒麻黄去根節各六兩蒼术米泔浸去皮二十四兩厚朴去麄皮四兩人參二兩一方無人參右㕮咀每服四錢水一盞半生薑三片葱白連根三寸煎至六分去滓食前熱服尋常皮風濕氣交互為病頸項強直或半身偏疼或肢體麻痺宜用此藥加麝香少許煎服婦人經候不調寒濕腰疼每服加桃仁七枚去皮尖㣲炒碎同煎婦人經候不調心腹撮痛加白膠香太隂經傷寒手足逆冷或積聚腹痛及虚汗不止脉細面青嘔吐加熟附子數片炒茴香一捻冷氣煨薑三片塩少許煎脚氣下疰焮然赤腫増寒壮熱亦加大黄一錢利之久虚脾瀉傷食腹痛冷瀉不止加用炒陳米一撮烏梅一箇煎名和氣散心腹膨脹不食亦效乳癰初起加川牛膝生地黄各二根産後或尋常血氣痛加木香𤣥胡索半錢醋炒陳艾葉七片烏藥半錢婦人體虚脚疼加川烏去皮臍夏令熱寒氣折之秋發寒疫大效一治感冒四時傷寒之病先服前方發散諸藥不效者二三日後汗不出表裏未觧此乃汗證傳經必先問其患者渇與不渇大便虚實熱與不熱身上有無紅靨或有自利者有嘔逆者有狂言譫語者變證不一須要詳審是何病證以方對症服藥宜以小柴胡湯服之如有後證加减依方用藥如後方五積散性温敗毒散性凉凢人偶小感冒對半析和煎服名交加散亦多驗小小感冒因風寒冷所襲猝然劇之正氣未耗邪氣未深用此前數方先以助其氣使正旺則邪氣自散若倉卒未能辨只以葱白鬚數莖淡豆豉一捻生薑數片水煎熱啜連進三兩盞亦能發散邪氣已入經絡及時行疫癘則須依經按法表裏汗下不可差殊喝起散蒼术泔浸麻黄去節荆芥各二兩石膏煆三兩大黄一兩半蔞根亁葛芍藥白芷甘草各一兩右為細末每服二錢水一盞半生薑三片葱白三寸煎至七分食前服川芎湯出神效方觧利一切傷寒川芎藁本蒼术右件各等分為細末沸湯㸃三錢須㬰覺嘔逆便觧如不觧再服不卧散出神效方川芎一兩半石膏七錢半藜蘆半兩去土甘草二兩半生右為細末口噙水鼻内各㗜之少許喫白湯半碗汗出觧白芷散出百選方治傷寒鼻寒出清涕不已香白芷一兩荆芥一錢右為細末臈茶清調服如不用荆芥薄荷一錢亦佳清膈湯治發散四時不正之氣又傷寒未分證候癍疹欲出而未出並宜服之又療脾寒瘧疾潮熱往來状如骨蒸乆而耳黯唇青面色黧黑舌苦咽亁四肢倦怠飲食無味苦桔梗荆芥穗薄荷葉紫蘇葉甘草節栝樓根牛蒡子亁葛各等分右各無炮製為粗末每服三錢水一盞煎至七分去滓不拘時温服日進三五服觧肌湯出千金方治傷寒天行頭痛壮熱葛根四兩麻黄三兩黄芩芍藥甘草各二兩大棗十二枚右㕮咀水一斗煮取三升飲一升日三服三四日不觧脉浮者宜重服發汗脉沉實者宜以駃豉丸下之延年秘録有桂心一兩一方無麻黄治中風傷寒及時氣温病頭疼壮熱脉盛始得用真丹塗身令遍向火令汗出不拘時萬勿見風使汗出而又閉盖汗透而邪氣出則愈矣桂枝湯治初得傷寒時氣桂去麄皮甘草炙剉芍藥各半兩杏仁去皮尖炒黄色四十枚亁薑炮半兩麻黄去根節一兩右麄搗篩每服五錢水一盞半煎至八分去滓併兩服以衣被盖令汗透凉膈散出濟生㧞萃方治傷寒表不觧半入於裏下證未全下後燥熱怫結於内煩心懊憹不得卧臟腑積熱煩渇頭昏唇焦咽燥目赤煩渇口舌生瘡欬唾稠粘譫語狂言腸胃燥澁便溺悶結風熱壅滯瘡癬發瘢驚風熱極黑陷将死一名連翹飲子亦有加减法連翹一兩山梔大黄薄荷甘草一兩半朴硝黄芩各半兩右為末每服二錢水一盞蜜少許同煎至七分去滓温服諒虚實加之咽喉痛涎𠻳加桔梗一兩荆芥穗半兩咳而嘔者加半夏半兩每服加生薑三片同煎血衂嘔血加當歸芍藥各半兩生地黄一兩淋者加滑石四兩茯苓一兩去皮風昡加川芎防風各半兩石膏三兩酒毒加葛根一兩瘢疹加葛根一兩荆芥穗赤芍藥川芎防風桔梗各半兩三嵗小兒可服七八分或熱甚黑陷復滿喘急小便赤澁而将死者更加大承氣湯約以一錢下之得利者亦便效凡言加者皆自本方加也以意加减之退表裏熱加益元散一方用竹葉七片同煎錢氏去連翹加藿香石膏為瀉黄散䨇觧散出神效方巴豆六箇去皮油天麻二兩半胭脂錢許右将巴豆天麻為末酒水丸如秝米大胭脂為衣一日一丸二日二丸三日三丸已外不觧先喫冷水一口後用熱水下如人行十里以熱湯投之太和湯百沸湯是也治無藥處初覺傷寒傷食傷酒風便服右避風處先飲半碗或以酸虀汁亦妙以手揉肚覺恍惚更服半碗又用手揉至恍惚更服以至厭心腹無所容探吐汗出則已普救散出百選方治傷寒不問隂陽表裏但三日以前皆可服甘草四兩生薑二觔切片蒼术一觔剉右三味淹拌罨一宿次日焙亁碾為麄末每服不拘時候如頭痛加白芷腹痛加香附汗出即愈桂枝石膏湯出千金方治傷寒三日外與藥不差脉勢仍數者陽猶在經絡未入臟腑者桂枝黄芩甘草各二兩升麻葛根生薑各三兩芍藥六兩石膏八兩梔子二十枚右㕮咀以水九升煮二升七合分三服相去十里乆若前兩服訖即得汗後服即停不得汗更進一服得汗即止如不得汗者至明日於内去梔子却加麻黄足水二升再依前方煮服之得汗即止一方用白藥子無芍藥還魂丸治傷寒四五日及數年諸癖結堅心下飲食不消目眩四肢疼痛咽喉不利壮熱脾胃逆滿腸鳴兩脇裏急痞石尸鬼注邪氣或為驚恐傷瘦背痛手足不仁口舌乾燥天行發作有時風温不能久住吐惡水方巴豆去心皮熬甘草炙硃砂芍藥麥門冬二兩去心右五味各搗下篩合以𢷬三千下丸如梧桐子大每服二丸葱􅀥湯下小兒二嵗以上服如麻子大二丸日二服忌海藻菘菜野猪肉蘆笋生血物神术煮散出百選方治感寒凡人寒則傷榮血為榮風則傷衛氣為衛故治傷寒當用當歸數藥蒼术六兩當歸薑汁製厚朴薑製各二兩人參一兩白芍藥川芎陳皮各半兩右㕮咀每服三錢水一盞半薑五片􅀥二枚煎八分食前去滓熱服一方無厚朴不傳散出百選方治傷寒感冒風邪蒼术七兩以竹藎水中洗淨不須去皮亁葛三兩半甘草二兩七錢半右為細末每服三錢水一盞煎八分服若細切葱頭與茶同㸃見效尤速酒調亦可治一切傷寒感冒不問隂陽證初覺即服甚效出百選方蒼术米泔浸一宿焙亁秤一兩大菖蒲半兩剉甘草四錢半炙右㕮咀每服五錢葱白三寸水一盞半煎七分熱服微汗乃效濟生方名中和散用石菖蒲不用葱白煎生薑橘皮飲子出經驗良方治患有傷寒者不辨隂陽咳噎而大小便不通勢極危殆及夾食傷寒諸證生薑四兩切片陳皮四兩去白右二味剉碎水三大碗煎取两碗去滓分三服喫良久上下氣皆通遂出汗而愈保真湯出和濟方治四時傷寒疫氣不問隂陽二證纔覺疾作痛服此方立效藁本去蘆川芎各四兩甘草二兩炒蒼术十六兩洗剉炒右㕮咀每服三錢水一盞半薑三片同煎至七分去滓熱服不拘時候一方加􅀥一枚煎如久傷風不觧加葱白三寸同煎尋常感冒只一二服立愈消風百觧散治四時傷寒頭疼項強壮熱惡寒身體煩疼四肢倦怠行歩喘乏及塞壅咳𠻳鼻塞聲重涕唾稠粘痰涎壅盛氣急滿悶並宜服之荆芥白芷陳皮洗去白蒼术麻黄去節各四兩甘草右為細末每服二錢水一大盞薑三片烏梅一箇同煎七分不拘時温服或茶酒調下欲發散風邪入蓮鬚葱白三寸同煎截傷寒不問隂陽决有神效亁薑亁葛白芷甘草右等分為末若藥减少不效湏每服三錢水一盞半煎八分入生薑棗同煎不拘時候服了被盖睡少時汗出即愈雙觧散治風寒暑濕飢飽勞疫内外諸邪所傷無問自汗後雜病但覺不快便可通觧愈小兒生瘡疹使利出邪毒亦能宣通而愈益元散七兩防風通神散七兩右二藥一處相和名為䨇觧散各七兩攪勻每服三錢水一盞半葱白五寸塩豉五十粒生薑三片煎至一盞温服防己黄茋湯防己一兩黄茋一兩白术三分甘草半兩炙右剉每服五錢生薑四片棗一枚水一盞半煎至八分去滓温服良久再服喘者加麻黄半两胃中不和者加芍藥三分氣上衝者加桂枝三分有陳寒者加細辛三分服後當如蟲行皮中從腰下如米後坐被上又以被繞腰以下温令微汗瘥甘草麻黄湯治四肢腫水氣在皮膚甘草二兩麻黄四兩右以水五升先煮麻黄去上沫内甘草煮取二升温服一升重復汗出不汗再服慎風寒麻黄附子湯治水病發汗已其脉沉小麻黄三兩甘草三兩附子一枚炮右以水七升先煮麻黄去上沫内諸藥取二升半温服八分日三服華陀赤散治傷寒頭痛身熱腰背強引頸及風口噤瘧婦人産後中風寒經閉腹大丹砂十二硃蜀椒蜀漆亁薑細辛黄芩防己桂心茯苓人參沙參桔梗女萎烏頭各十八銖雄黄一十四銖呉茱茰三十銖麻黄代赭各三兩半右治下篩酒服方寸匕日三耐藥者倍覆令汗出欲治瘧不發一時併服藥二匕半以意消息之細辛丹桂丹砂雄黄不熬餘者皆熬之實表散治腠理不密易致感冒先服此藥則感冒自然觧散附子炮去皮劑蓯蓉酒浸一宿焙亁細辛去葉五味子各等分右為粗末以四味黄茋建中湯相對合和令停如本方煎服不過三四即安妙甚有理治傷寒用梅實三十枚去核豉一升苦酒三升煮取一升半去滓服治傷寒有數種庸人不能分别今復取一藥兼治天行内熱脉洪起至二日用葛根四兩水三升内豆豉一升煮取半升服搗生葛根主一切傷寒用甘草如中指長炙剉取童便一升煎七合空心服日再服治老少晩發傷寒三月至年末為晩發名梔子升麻湯生地黄一觔打碎梔子三十枚擘升麻三兩柴胡石膏各五兩右五味切以水八升煮取三升分五服頻頻服若不觧更若頭靣赤去石膏用亁葛四兩無地黄用豉一升煮取三升分三服忌蕪荑雪煎治傷寒麻黄十觔杏仁三斗四升大黄一觔十二兩如金色者右三味㕮咀以雪水五斛四斗漬麻黄入東向竈釡中三宿内大黄攪勻調炊以桑薪煮得二斛汁去滓復内釡中搗杏仁内汁中復炊之可餘六七斗汁絞去滓置銅噐中又以雪水三斗合煎之攪令調得二斗四升藥成可丸冷凝丸如彈子大病者以三服白湯五合研一丸入湯中適寒温服之立汗出若不愈者復服一丸密盛藥勿令泄氣神仙百觧散出衛生家保方治男子婦人四時傷寒八般痞氣山嵐瘴瘧渾身壮熱憎寒或中暑或風疾曲攣手足咽喉噎塞十種膈氣不思飲食無論百病初覺意思不快便先進一二服無不效驗婦人産前産後及小兒一嵗有病皆可服之白术茯苓各二兩藿香葉去土橘皮去穰甘草炙半夏擘破生薑汁製厚朴薑汁蘸炙各三兩右先将厚朴半夏為粗末用生薑四兩爛研同厚朴半夏一處拌勻浄噐中淹一宿次日焙亁却入前五味藥拌和勻並搗為粗末每服四錢水一盞半生薑五片或七片煎七分去滓熱服傷寒併喫二服常服寛中進食或冷物傷脾臓腑不調並皆神效柴胡散出十便良方治邪入經絡體瘦肌熱推陳致新觧利邪傷寒時疾中臈伏暑柴胡四両甘草一兩右為細末每服二錢水一盞同煎至八分食後熱服此藥冬月可以潤心肺止咳𠻳除壅熱春夏可以禦傷寒時氣觧暑毒常不可闕兼不以長㓜皆可服之倉卒可以便得一方治急傷寒急傷寒氣不能言斯病難醫永無傳半夏研末熱酒飲時間免得赴黄泉一方治傷寒傷寒不覺甚半錢好茱茰水煎空心服所患即消除發汗散治傷寒一米二芎四草麻諸般發汗不如他依方修合休交錯強如神仙聖手拿神仙不卧散出徳生堂觧利四時傷寒併一切風疾細辛甘草人參藜蘆川芎等分石膏半兩為末詞曰管甚傷寒壯熱徧醫夾腦頭風若㗜一字在鼻中㗜下教賢無病五苓散出醫方治傷寒温熱病表裏未觧頭痛發熱口燥咽亁煩渇飲水水入即吐或小便不利及汗出表觧煩渇不止者宜服之亦治霍亂吐利傷暑門以五苓散加甘草一兩炙夫疫雖以五種而成若天行時症多假六淫及錯悶欝折而致之者既有温寒兩疫風濕豈可不辨但證傷濕而脉色不同與夫一方相染長㓜同病即當作疫治除辟法外治濕五苓散加炙甘草治風用桂枝湯加黄芩無不愈者其如滛邪交結互織當以類推之治主一切天行病右取白藥研如麫浆水一大盞空腹服之便仰卧一飯頃時候心頭悶亂或惡心腹内如車鳴㽲刺痛良久當有吐利數行勿怪欲服藥時先令煮浆水粥於井中懸著待令若吐利過度即喫冷粥一碗止之不喫即困人治天時行熱病亦堪發汗甚有功右用浮萍草一兩四月十五日者麻黄去節根桂心附子炮裂去皮臍各半兩四物搗細篩每服二錢以水二中盞入生薑半分煎至六分不計時候去滓熱服汗出及差又治惡疾遍身瘡者取水中浮萍濃煮汁清浴半日多效此方甚可也火㷔散出永類鈴方治傷寒惡候舶上硫黄附子去皮剉用新臘茶各一錢右為細末先将好酒一升調藥入大新碗口中加火攤蕩令亁合於瓦上每一碗下燒熱艾一拳大以瓦撑起無令火著直至烟盡冷即刮取細研入磁合盛每服二錢酒一盞共煎七分有火熖起勿訝傷寒隂毒者四肢冷脉沉細或吐瀉惡心煩燥胷中結鞕或傳作伏陽在内湯水不下先喫一服如吐却更進一服服後心中熱其病已瘥如表未觧渾身壮熱脉氣洪大宜用發表藥或表觧者更不發熱便得眠卧渾身有汗若少有痞結脉實方可下之漸用調和脾胃補治元氣之藥也急提盆散出千金方雜病非隂候者主之右用草烏頭不以多少生研極細為末葱一枝肥者削去鬚頭圎上有葱汁濕蘸之從榖道中治病後鬚亂不可理通右生麻油二升将髮觧開安净銅噐中用油淹漬之細将釵子領髪斯須並自通一方出肘後方治傷寒手足疼痛欲死右取羊屎煮汁以灌之差止亦療時疾隂囊及莖熱腫亦可煮黄蘗洗之無憂散出危氏方治傷寒調理失序毒氣内結胷腹脹滿坐卧不安日久不瘥狂言妄語大小便不通或復吐逆臈月黄牛膽以天南星為末置膽内縛令𦂳當風避日懸之侯亁取用右為末以人參半兩煎湯七分盞調末二錢乗熱服遲頃更以熱人參湯投之或唾便溺下黄黑惡物是效治傷寒阮和南蒸法右以薪火燒地良久掃除去火可以水小灑取蠶砂若桃葉桑柏諸米糠及麥麩皆可趣用易得者牛馬糞亦可用但臭耳桃葉欲落時可益收取亁之以此等物著火令厚二三寸布席卧上温復用此發汗汗皆出若過熱當審細消息大熱者可重席汗出周身輙使止當厚衣覆身勿令遇風治暴傷寒用荆芥豉汗煎服之治傷寒無論隂陽神驗方用皂角一梃肥者燒令赤為末以水五合和頓服隂陽傷寒以酒和服治太陽傷寒用栝樓根二兩水五升煮取一升半分二服小便利即差神丹丸出聖惠方治傷寒脉濇惡寒發熱體痛硃砂二兩細研水飛過附子一兩半炮裂去皮臍赤茯苓一兩川烏頭一兩半炮裂去皮臍半夏一兩湯洗七次去滑人參一兩去蘆頭右為細末煉蜜和丸如梧桐子大每服生薑湯下五丸良久喫熱粥一盞投之得汗為度若不汗汗少不觧復服如前法若得汗足應觧而不觧者當服桂枝湯此藥多毒熱者令飲水寒者温飲觧之治瘧初發服二丸要略用細辛不用人參别有射干􅀥一枚名赤丸治寒氣厥逆六味清散方出聖惠方川烏頭一兩炮裂去皮臍桔梗一兩去蘆白术一兩附子一兩炮裂去皮臍防風一兩去蘆細辛一兩右為散每服二錢以生薑湯調服服藥後食頃不汗出者飲稀粥一盞以發之暖復汗出漐漐可也勿令流離汗出若汗大出不止者薄衣覆之如未得汗者當更服之以得汗為度橘皮湯出聖惠方治太隂病不觧雖暴煩下利十餘行而自止所以自止者脾家實腐穢已去故也陳皮一兩湯浸去白穰焙生薑一兩右細剉和勻分為四服每服以水一中盞煎至六分去滓不計時候温服桂枝芍藥湯出聖惠方治太隂病下之後腹滿時痛桂枝赤芍藥人參去蘆各一兩甘草半兩炙㣲赤剉右為散每服四錢以水一中盞入生薑半分􅀥三枚煎至五分去滓不計時候熱服一方無甘草术附子湯出脉類鈐方治風虚頭重眩苦極不知食味暖肌補中益精氣白术二兩附子一枚半炮去皮甘草一兩炙右剉每五錢匕薑五片􅀥三枚水一盞半煎至七分去滓温服七物黄連湯治夏月傷寒四肢煩疼發熱其人善煩嘔逆支滿劇如遇祟寒熱相摶故令善煩黄連十八銖茯苓十八銖黄芩十八銖芍藥葛根各一兩甘草一兩六銖小麥三合右㕮咀以水七升煮取三升冷分三服不能一升者可以稍服之病勢安乃卧藥主觧毒氣服後胸中熱及咽喉痛皆差其明日復煮劑如法服之此湯無毒但除熱下氣安病人小兒服者三分之一以水四升煮得二升稍稍服柴胡飲子觧利大小人傷寒餘熱不已柴胡黄芩人參甘草升麻地骨皮赤茯苓赤芍藥龍膽草各半兩右㕮咀每服四錢水一盞加薄荷沙糖同煎七分温服無時小兒分作三服加减五苓散藥中之寳五苓散專治傷寒有大功陽證見時須去桂隂加附子水煎澄狂言亂語辰砂末頭目疼痛入川芎咳𠻳多加五味子心氣不定麥門冬胃中嘔逆人參炒痰多半夏喜相逢定喘馬兠苓最好蒼术去濕腹中空小便閉澁加瞿麥黄芩能使大便通腹中氣塊三稜末青皮能退熱如烘麻黄用根除盗汗下部赤腫便椒紅飲水煩渇加亁葛鼻衂烏藥却為功眼中黄色茵陳炒勞復桔梗有神功目赤令添赤芍藥茵陳退腫又相逢眼目肉赤石膏末陳皮止瀉又叅同急醫水氣甜葶藶伏暑燈心浸水中二十四證真如决專心盡救效無窮半夏橘皮湯治傷寒病雜病嘔噦風眩痰逆欬喘頭痛并風熱反胃吐食諸證半夏炮如法陳皮湯浸洗去穣甘草炙人參茯苓黄芩去腐心各一分葛根半兩厚朴去皮一分右剉如麻豆大用水三盞生薑一分煎至一盞半絞取汁分四服作日食後温服真方金不換正氣散治四時傷寒五種膈氣和脾胃止吐瀉温中下痰飲止腹痛脹滿吞酸噫痞噎塞亁嘔惡心内受寒濕外感風邪身體沉重肢節酸疼頭昏鼻塞未分隂陽之間尤宜服之則氣自正而邪氣退又能止汗觧山嵐瘴氣八般瘧疾遍身浮腫五勞七傷或風氣所灌手足腫痛全不思飲食孕婦産後産前皆可服餌霍亂吐瀉心腹疼痛又治脾氣虚弱臟腑時鳴小兒脾胃不和時氣諸疾及治四方不伏水土凢過嶺南北藥不可闕厚朴二兩去麄皮剉如韮葉濶長半寸以生薑自然汁罨一宿半夏二兩湯洗七次以生薑四兩取汁浸旬日橘紅二兩甘草二兩剉炒過用藿香二兩洗葉取水蒼术二兩去皮尖米泔浸一宿甘果子二兩取葉水洗右先用砂鍋炒厚朴令香次入蒼术炒令紫色又半夏炒香熱又入甘草炒黄又入橘紅炒破方始将藿香葉二兩斡開衆藥安藿香葉在中心用藥遍盖罨定少時約藿香葉亁方可用取出同為麄末每服二大錢水一大盞生薑五片􅀥一枚煎至七分去滓空心服食前亦可常服和一切氣亦無瘟疫此乃不換金真方也煎時不得犯銅鐡噐黄連龍骨湯治少隂脉沉腹痛咽痛苦煩體猶有熱黄連一兩黄芩芍藥各一分龍骨半兩右分三服每服水一盞半煎至八分去滓服葛根湯葛根一兩麻黄三分熱湯炮去黄汁焙亁甘草半兩炙桂枝去皴芍藥各半兩右煎煮服餌如桂枝湯小青龍湯麻黄去節半夏湯洗芍藥細辛亁薑甘草炙桂枝去麄皮各三分五味子二錢右剉如麻豆大每用八錢水一盞半生薑四片煎至七分絞汁温服木香檳榔丸木香檳榔青皮去穰陳皮去白商枳殻麩炒去穰廣茂炮温黄連各一兩黄蘗皮香附子揀炒大黄剉炒各三兩黑牽牛半觔生取頭末四兩右為細末滴水和丸如梧桐子大每服三十丸或五十丸至㣲利為度食後生薑湯送下化鐡丹烏梅八觔不去皮巴豆十六粒不去皮油胡椒四十八粒陳皮去白五錢右為細末醋煮麫糊為丸如菉豆大每服五丸至七丸食後温生薑湯送下枳殻丸京三稜炮三兩二錢蓬莪术炮三兩二錢白术一兩半青皮去白一兩五錢陳皮去白一兩五錢木香一兩枳殻麩炒去白一兩白茯苓去皮一兩半半夏湯洗七次一兩黑牽牛炮二兩右為細末水麵糊為丸如梧桐子大每服五十丸温生薑湯送下食後服之又方無牽牛一名導飯丸木香三稜丸出集書木香一兩荆三稜二兩蓬莪术三兩大麥葉㣲炒六兩黑牽牛㣲炒六兩右為細末薑汁麫糊和丸如梧桐子大每服三十丸食後薑湯送下木附湯出十便良方若但寒頭重則眩暈肌肉酸疼牽急不得轉側漐漐汗出惡寒小便不利大便反快短氣眩暈足寒或時咽痛發熱此由寒濕之邪客摶經絡陽氣不得發洩藴於肌肉之間謂之寒濕之邪其脉遲而小弦蒼术四兩芍藥茯苓各三錢人參甘草各一兩附子一兩半右為麄散每服五錢水二盞煎一盞去滓温服通觧散出直指方治四時傷寒内外一功所傷蒼术四兩輕杵去麄皮甘草二兩滑石六兩黄芩二兩石膏四兩右杵同為麄末每服三錢水一盞煎至七分去滓温服日進四服如發汗用葱白塩豉同煎熱服如和觧用生薑五片􅀥五枚去核同煎去滓熱服食前進三服三一承氣湯出宣明方治傷寒雜病内外所傷日數逺近腹滿咽亁煩渴譫妄心下按之硬痛小便赤澁大便反快或濕熱内攻而為滑泄熱甚喘咳悶亂驚悸狂顚目痛口瘡舌腫喉痺癰腫陽明胃熱發瘢脉沉可下者小兒熱極驚風搐揑喘塞并瘢疹黑陷小便不通腹滿欲死或瘢疹後熱不退久不作痂或作瘢癰瘡癬久不已者怫熱内成疹癖堅積黄瘦疳積新久卒暴心痛風痰酒膈積滯痰壅風熱暴傷酒食煩心悶亂脉數沉實或腎水隂虧虚熱獨甚而僵仆卒中一切暴病不語一名失音畜熱甚陽厥極深脉反沉細欲絶或表乏冲和正氣與邪熱并之於裏則熱亢極似隂反為寒症或産婦死胎不下及兩感表裏熱甚可下者大黄半兩錦文芒硝半兩去皮厚朴半兩去皮枳實半兩甘草一兩右剉如麻豆大每服水一盞半生薑三片煎至七分内硝煎二服去滓服黄連觧毒湯出宣明論治傷寒煩燥熱毒煩悶亁嘔口燥吟呻喘滿陽厥極深畜熱内甚俗妄傳為隂毒者及汗下吐後寒凉諸藥不能退熱勢並兩感證者黄連去鬚黄蘗黄芩大梔子各半兩右剉如麻豆大每服秤半兩水一茶盞煎至四分絞去滓温服後或腹滿嘔吐或欲作利者每服加半夏三箇生合用厚朴二錢去皮穰茯苓三錢去皮剉用水一盞半生薑三片煎至半盞絞汁温服名曰半夏黄連觧毒湯一笑散出徳生堂方治傷寒感冒葱白七根浆水二碗煎一碗去葱先喫後用帯拴𦂳腰再服酸浆水一碗即吐𦍑活湯出保命集方通觧利傷寒不問何經中受病皆能釋然觧之即或於各經受病雖不盡觧亦無壞證𦍑活二兩防風一兩川芎一兩黄芩一兩細辛二錢半甘草一兩炙黑地黄一兩白术二兩如用蒼术加一兩右㕮咀每服五錢水二盞煎至一盞無時温服清如覺發熱引飲加黄芩甘草各一兩更隨證加頭痛惡風於白术湯一兩内加羗活散三錢都作一服𦍑活散出保命集方𦍑活一兩半川芎七錢細辛根一錢半如身熱依前加石膏湯四錢石膏湯出保命集方石膏二兩知母半兩白芷七錢如腹中痛者加芍藥散三錢芍藥散出保命集方芍藥二錢桂枝五錢如往來寒熱而嘔加柴胡散二錢半柴胡散出保命集方柴胡根一兩半夏五錢洗右加生薑煎如心下痞加枳實一錢如有裏證加大黄初服一錢次二錢又三錢論曰有汗不得服麻黄無汗不得服桂枝然春夏汗孔疎雖有汗不當用桂枝宜用黄耆湯和觧秋冬汗孔閉雖無汗不當用麻黄宜用川芎湯和觧春夏有汗脉乃㣲而弱惡風惡寒者太陽證冬之脉也亦宜黄耆湯無汗亦宜川芎湯秋冬有汗脉盛而浮發寒身熱者乃陽明證春夏之脉也亦宜黄耆湯無汗亦宜川芎湯大抵有汗者皆可用黄耆湯無汗者亦可用川芎湯黄耆湯出保命集方有汗則止也黄耆白术防風各等分右㕮咀每服五錢至十餘錢或半兩水煎温服清汗多惡風甚者加桂川芎湯出保命集方無汗則發也川芎白术𦍑活各等分右㕮咀同黄耆湯稍熱服惡寒甚則反脉大浮半加麻黄法云五臓之脉寸闗尺也今止言尺寸隂陽也如陽緩而隂急表和而裏病隂緩而陽急裏和而表病若傷寒食少發渇只可和胃止渇不可以太凉藥止之恐凉藥止之損着元氣必不能食也和胃白术湯出保命集方白术茯苓起卧不能謂之濕身重是也小柴胡湯黄芩芍藥湯起卧不安眠睡不穩謂之煩梔䜴湯竹葉石膏湯觧利四時傷寒能觧六經邪氣大白术湯出保命集方白术二兩防風一兩羗活一兩川芎一兩黄芩五錢細辛三錢白芷一兩半石膏二兩知母七錢甘草五錢或二錢枳實五錢去穰右為麄末每服半兩水一盞半煎至一盞大温服清未觧更一服兩服藥滓又作一服春倍防風羗活夏倍黄芩知母季夏雨淫倍白术白芷秋加桂五錢冬桂八錢或一兩立夏之後至立秋處暑之間傷寒者身多㣲凉有自汗四肢沉重謂之濕温又謂濕淫冝蒼术石膏湯出保命集方蒼术細剉半兩石膏末三錢知母剉一錢半甘草剉一錢右同和勻都作一服水兩盞煎至一盞温服清謂内有濕熱也多不欲飲食如身熱脉洪無汗多渇者是熱在上焦積於胸中宜桔梗散出保命集方薄荷一錢黄芩一錢甘草一錢炙桔梗半兩連翹二錢山梔子二錢右剉每服五錢或七錢秤半兩水煎加竹葉如大便秘結加大黄太乙丹出楊氏家藏方治傷寒傷風肢節煩痛如破服之觧寒清熱或發熱惡寒似瘴非瘴煩燥迷悶面色紅赤頭痛如破服之㣲汗出立愈天南星四兩剉炒赤勻令焦石膏四兩甘草取粉秤三兩半前胡二兩川芎二兩一分白殭蠶炒去絲嘴白附子炮防風去蘆頭各一兩右件為細末用生薑自然汁煮麫糊和丸每一兩作十丸隂亁每服一丸細嚼用葱白薄荷茶清送下不拘時侯祛毒散出楊氏家藏方觧風邪截傷寒蒼术四兩米泔浸一宿甘草炙黄芩赤芍藥各一兩赤茯苓半兩去皮麻黄去根節半兩右為細末每服三錢水一盞半生薑五片黑豆十五粒同煎至一盞熱服不拘時侯祛寒湯出楊氏家藏方祛逐寒邪觧利傷寒時行瘟疫青橘皮二兩不去白陳橘皮二兩半不去白丁香皮甘草炙亁薑炮各一兩右為細末如覺身熱頭疼即抄藥一錢沸湯㸃下不拘時侯順氣散出王氏傳濟方調順冷氣觧利傷寒吳茱茰洗令净春夏用一兩秋冬用半兩麻黄一兩去節人參半兩訶子半兩炒去掖秤大黄三分官桂一兩去皮厚朴一兩去皮薑汁炙亁薑炮半兩陳橘皮一兩去白甘草二兩炙右為末每服一錢水一盞入薑􅀥煎六分通口服如外傷邪即先服此三服次服發汗丸散效益元散出直指方治身熱嘔吐泄瀉腸澼下利赤白淋漓癃閉悶痛小腑不利胸中積聚寒熱失冝大益精氣通九竅六腑生津液去鬱結消畜水止渇利中除煩熱心燥胸腹脹痛益五臟大養脾腎之氣或腎水不足胃土衰弱風寒外感七情内傷隂痿陽衰安魂定魄五勞七傷一切虚損並皆治之滑石六兩膩好者甘草右為細末每服三錢蜜少許温水調下或無蜜亦可無論時日三服或欲冷新水調下亦得觧利發汗煎葱白豆豉湯下四錢每水一盞葱白五寸豆豉五十粒煮取汁七分調下併三服以效為度此藥治寒凉觧散欝熱設病甚不觧多服無害但有益爾本世傳名大白散俗惡性寒兼易得之賤物而又不明素問造化之理故不取本草神驗之言而多不用焉若以隨證驗之乃凡人之仙藥不可闕也夫傷寒當汗則不可下當下亦不當汗者若能急服此藥則汗自不出而裏熱亦獲小效即有裏熱便得宣通而愈者或半在表半在裏可觧和而不可吐下發汗者若服此藥多愈或不愈再服加减凉膈散和觧尤妙或必當汗觧者更加蒼术麄末三錢同煎葱豉湯調服尤良或孕婦不宜滑石麻黄桂枝單發汗即用甘草一兩蒼术二兩同為麄末每服四錢水一盞葱白五寸豉五十粒同煎至六分去滓熱服併二三服取㣲汗是名逼毒散非孕婦皆可服或大白散加麻黄去節二兩如前法煎服世云神白散更加滑石末與蒼术末二味最為發汗之妙藥乃此方唯正可汗者即用誤服之則轉加熱也名曰大逼毒散或觧利兩感煎凉膈散調下益元散四錢或下乳用猪肉麫羹或酒之類調下四錢不拘時候日三服又宜食肉麫羹粥催産温油浆調下五錢併二三服以産為度或死胎不下者三一承氣湯一服調下五錢須臾更頻用温油浆調服前藥數服而胎出可活産母也難産或死胎不下皆由風燥澁熱聚斂結而不能舒緩故産户不得自然開通也藥力至則結熱頓開而産矣後慎不可温補而反生燥熱也俗未知産後已損血液疼痛怖懼以致神狂氣亂則隂氣損虚邪熱大甚而為諸熱證由不明素問造化故不識隂陽反以謂産後諸虚百損便為虚冷而無熱也誤以熱味藥温補或煩渇者不令飲水本雖善心為害多矣豈知治病之道但以臨時審其臟腑六氣虚實名其標本如法治之而已矣此藥泛常無竒然為效至大而俗以為小使忽之此所以反招侮也今以加黄丹桃紅名曰經玉散加青黛令輕碧色名碧玉散加薄荷葉一分細羅同為末名曰鷄蘇散治療並同但以廽避愚俗之妄侮爾柴胡飲子退五臟虚熱四時加减出金匱方冬三月加柴胡八分白术八分大腹檳榔四板并支子用陳皮五分生薑五分桔梗七分春三月加枳殻三分减白术共六味夏三月加生薑三分枳實五分甘草三分共八味秋三月加陳皮三分共六味右各㕮咀分為三貼一貼以水三升煮取二升分温三服如人行四五里進一服如四體壅滯甘草少許每貼分作三小貼每小貼以水一升煮取七合温服再合滓為一服重煮都成四服訶梨勒丸長服出金匱方訶梨散煨陳皮厚朴各三兩右末之煉蜜丸如梧桐子大酒飲服二十丸加至三十丸五積散出三因方治太隂傷寒脾胃不和及有積聚腹痛蒼术泔浸一宿二十兩桔梗十兩陳皮六兩白芷甘草炙當歸二兩川芎一兩半芍藥半夏浸去滑各一兩白茯苓麻黄去節春夏二兩秋冬三兩亁薑春夏兩半秋冬二兩枳殻浸炮去穰剉炒四兩桂心春夏三両秋冬四兩厚朴薑製炒二兩右先将前十二味㕮咀㣲炒令香取出當風晾之入後枳殻桂朴三味同為細末每服三錢水一盞薑三片􅀥二枚煎七分食前温服傷寒手足逆冷自汗不止脉沉細面青嘔逆加順元散一錢同煎熱服産婦難産經三兩日不能生胎死腹中或産母氣乏委頓産道亁澁加順元散水七分酒三分煎並服氣血和即瘥胎死者不過三服當下其順元散多少量産母虚實加减傷寒發熱挾内寒者加葱白二寸豉七粒同煎服以汗觧順元散出三因方烏頭炮去皮尖二兩附子炮去皮臍天南星炮各一兩木香半兩右為末同前法煎此藥治内外感寒脉沉伏遲細手足冷毛髪恂慄傷寒隂證大啜一二盞氣和汗出即愈和氣治中湯治傷寒初受病服散吐後宜服藿香人參各半兩白术陳橘皮各三兩甘草亁薑白茯苓各一兩右件藥𢷬羅為散每服二錢以水一中盞入生薑半分煎至五分即去生薑和滓不計時候温服小柴胡湯治傷寒後肺萎勞出如宜方黄芩人參甘草各三兩半夏製二兩半柴胡八兩右㕮咀薑五片棗一枚煎如譫語潮熱胃實大便利脉洪數宜服亡陽譫語不可下宜加桂枝芍藥湯如自利挾熱或垢赤煩渇寒熱往來宜加茯苓如傷寒喜睡脅痛胷滿有熱脉數宜服不煩渇身冷脉遲宜四逆湯如傷寒瘥後寒熱往來似瘧又治亁嘔日晡發熱宜服如勞復宜服如腹色青難治死必吐舌如嘔逆煩躁作渇有寒熱脉數喜冷加竹茹湯靈夀縣董監軍癸丑年冬十二月間雪霽因事至真定忽覺有風氣暴至診侯六脉俱弦甚按之洪實有力其證手攣急大便秘澁不通面赤而熱此風寒客加於身也四肢者脾也以風寒之邪傷之作搐急而攣痺乃風滛末疾而寒在外也内經云寒則筋攣正謂此也本人素飲酒近日為覺風氣不飲内有實熱乗於腸胃之間故大便秘澁而面赤熱手足陽明受邪外則足太隂脾之經受風寒之邪用桂枝甘草炙以却其寒邪而緩其急搐用黄蘗之苦寒滑以瀉實而潤燥急救腎水用升麻葛根以升陽氣行手足陽明之經不令遏絶便以桂枝性熱入手陽明之經為引用潤燥復以芍藥甘草專補脾氣使不受風寒之邪而退本邪專益肺也加人參以補元氣為之輔佐當歸身去裏急而潤燥和血名活血通經湯升麻葛根各一錢桂枝二錢當歸二錢人參一錢芍藥半錢甘草一錢炙黄蘗二錢酒製右㕮咀都作一服水二大盞煎至一盞去滓稍熱服令暖房中近火摩搓其手一服而愈木桂湯東垣蘭室秘藏治寒温所客身體沉重胃脘痛面色痿黄麻黄一錢桂枝半錢杏仁十箇草䓻仁半夏各半錢炒麴半錢蒼术二錢橘皮一錢澤瀉一錢白茯苓一錢猪苓半錢黄蓍三錢甘草二分炙右都作一服煎法如常治傷寒熱病服轉藥後病已效可臟腑仍兩三日不出後喫食减少仍覺精神不快出䕶命方柴胡去毛桔梗去根麻黄去根杏仁黄芩荆芥穗大黄炮熱牡丹皮去心𦍑活沉香木香獨活各一分升麻半兩右為細末每服二錢水一盞煎一沸急瀉出食後和滓熱服治傷寒熱服傷脾渾身肌肉辟痛聞食即惡心思嘔吐徧身發熱兩唇亁焦診其脉即右手闗上脾脉一指徧洪𦂳如衆脉此即為病氣在脾宜服此方出䕶命方桔梗羗活杏仁麻黄去根麥門冬去心大黄荆芥穗各一分半夏二銖牽牛一兩青橘皮四兩右先杵牽牛半夏二味為末所餘衆藥只作一處杵為末每服五錢水一盞半生薑三片葱三枝煎衆藥末三錢沸一两沸瀉出取汁一盞用調下牽牛半夏等末二錢食後服交加散出如宜方治憎寒壮熱或外感風寒内傷生冷及風寒二證敗毒散五積散右等分薑􅀥煎如體虚宜養胃湯三建湯出危氏方治脉㣲身體冷重自然汗嘔吐加丁香胡椒各半兩方見積熱痼冷門痼冷類不卧散截傷寒出十便良方蒼术川芎甘草藁本各一兩右為麄末每服三錢水一盞葱白三寸同煎至八分去滓熱服不以時茯苓利膈湯出保生回車論茯苓一兩牛蒡子二兩炒荆芥穗一兩桔梗一兩㣲炒甘草半兩炙紫色右為麄散每服三錢水一盞薑三片同煎六分去滓温服日二三服不拘時侯觧肌湯出保生回車論麻黄一兩去根節蒼术四兩去皮羌活半兩甘草半兩炙荆芥穗半兩右為麄末每服三錢水一盞薑三片煎至六分去滓温服續續二三服㣲汗出即觧千金不傳散出澹寮方治傷寒兼主感風蒼术七兩竹籃盛水中攪洗不去皮亁葛三兩半甘草七錢半右為細末每服三錢加葱煎茶調亦可桂枝湯出鮑氏方治傷風頭痛鼻鳴亁嘔發熱自汗惡風或寒熱汗出則少觧如瘧状脉浮洪虚大桂枝一兩白芍藥一兩半甘草一兩右為散每服五錢煎八分食前服訖盖被取㣲汗或發滯漏不止小便難四肢拘急加炮附一分或項強漐漐反汗出惡風加亁葛一兩半或汗後身痛脉沉遲加芍藥生薑各半兩人參一兩半或嘔逆更加茯苓半夏人參陳皮冬末春初宜桂枝湯五積散盛夏時及淋家酒家衂家於桂枝湯加黄芩或夏日只用本方増芍藥名建中湯治氣痛等疾加烏藥香附炒加减香蘇葉出醫方大成香附子一兩紫蘇梗二兩陳皮一兩甘草半兩右為末剉散每服四錢水一盞半煎至一盞生薑三片連根葱白二莖同煎熱服頭痛加川芎白芷頭痛如斧劈加石膏連鬚葱頭偏正頭風加細辛石膏薄荷太陽穴痛加荆芥穗石膏傷風自汗加桂枝傷風無汗加麻黄去節并亁薑傷風惡寒蒼术傷風發熱不退加柴胡黄芩傷風咳𠻳不止加半夏杏仁去皮尖傷風胸膈痞塞加製枳殻傷風鼻聲風重咽鬲不和加苦梗旋覆花傷風痰涎壅盛加白附子天南星傷寒鼻内出血加茅花傷寒氣促不安加大腹皮桑白皮傷風鼻塞不通頭昏加羗活荆芥傷風不觧咽喉腫痛加苦梗傷風中脘寒不思飲食加去白青皮枳殻傷寒嘔吐惡心不止加丁香半夏傷寒後時作虚熱不退加人參傷風飲食不能消化加縮砂仁青皮傷風一向不觧作潮熱白日至日中不退日日如是加地骨皮柴胡人參菴䕡初感風寒頭疼作熱鼻塞聲重加羗活川芎感風腰痛不能伸屈加官桂桃仁感風渾身痛不止加赤芍藥紫金皮感風脛項強急不能轉動加羗活官桂腹肚疼痛加木香腹肚疼刺不可忍加薑製吳茱茰七粒小腹疼痛時刻不可忍加木香薑􅀥婦人忽然大便疼痛不能下地加木香木𤓰呉茱茰婦人被性所苦胸膈痞疼脇肋痛小便急疼加木香枳殻婦人被氣疼所苦加木香縮砂仁􅠛胃不和中脘不快加谷茅神麯傷食吐嘔泄瀉腹痛加亁薑木香心卒痛者加延胡索酒一盞飲酒太過忽遍身發疸或兩目昏黄加山茵陳山梔子中酒吐惡加烏梅丁香婦人經水将行先期發熱加蘇木紅花婦人産後作虚熱不退煩渇加人參地黄産後發熱不退加人參黄耆産後腰疼不止加當歸官桂冷𠻳不已加亁薑五味子杏仁脾寒加良薑青皮草果脚氣加木香木𤓰牛膝紫金皮茱茰川練子感風寒發熱頭疼加不換金正氣散感寒頭痛壮熱惡寒身痛不能轉動加料五積散飲食不進欲吐不吐加丁香與蘿蔔子感寒頭痛發熱身疼分隂陽加敗毒石膏婦人産後風脚手疼痛生料五積散人參敗毒散加木𤓰不換金正氣散加地黄川芎同煎术附湯出保生回車論白术二兩剉如麥豆附子一枚以半兩為率炮裂去皮臍剉如麥豆粒右如法製一處於杵臼中良時治之勿令作末每四錢以水一盞半煎及七分去滓温服日三服不拘時後凡言日進三服者疾勢稍重當促數服而未痊當作湯劑半夏中和湯出保生回車論半夏二兩湯浸七次切片焙亁厚朴四兩剉去麄皮剉碎蒼术四兩刮去麄皮剉令極碎獨活二兩剉碎草豆蔲十五箇去殻剉碎以上四味一處杵碎生薑屑一觔同杵摩爛又慢炒紫色甘草三兩炒令紫色右如法製一處杵為麄散每服炒四錢水一盞半生薑三片􅀥二枚同煎至七分去滓温服食前日進三服胃損人可常服嵐瘴諸邪皆不能為害茯苓茱茰丸出保生回車論茯苓吳茱茰浸五次焙亁芍藥不問赤白皆可用黄連去鬚右等分為細末煉蜜和丸如梧桐子大每服十五丸二十丸温熱水下如無蜜即用飯丸量大小加减不計時候升麻葛根湯出保生回車論麻黄二兩剉葛根二兩細剉芍藥四兩剉甘草一兩炙紫色剉右件篩為麄末每服四錢水一盞半生薑五片同煎至六分去滓温服日三服不拘時候麻黄桂枝湯出保生回車論麻黄二兩去根節桂枝一兩葛根三兩芍藥三兩甘草一兩炙紫色右為麄散每服四錢水一盞半生薑五片􅀥二枚同煎至七分去滓温服日三服夜一服三苓散出保生回車論茯苓一兩桂一分白术二兩右為細末每服二錢匕粥飲調下日二三服不計時候桂苓散出保生回車論茯苓二兩剉桂一分右為細末每服二錢粥飲調下日二三服不計時候每服藥後飲沸湯或粥飲一盞或半盞為佳猪苓散出保生回車論猪苓茯苓澤瀉白术阿膠先杵碎炒為末右四味等分如法製為麄末每服四錢水一盞半煎八分去滓入阿膠末二錢再上火沸温服日二三服术桂湯出保生回車論白术三兩剉桂一分右為細末每服二錢粥飲調下日二三服不計時候以上三藥服餌主療並與五苓同聖僧散出衛家寳治時行一切傷寒不論隂陽不拘輕重應老㓜及孕婦皆可服香白芷一觔生剉甘草半兩生剉右二味焙亁碾為麄末每服二錢水一盞棗二枚生薑三片葱白三寸同煎至七分熱服用衣被盖覆如人行五六里更進一服汗出即愈此藥可卜病之好惡如煎得黑色或悞打飜即難愈如煎得黄色無不愈者煎藥之時要在志誠加减正氣散出衛生家寳治傷寒傷風不論表裏但連進二服立效藿香葉半夏研細用薑汁搜和炙黄色厚朴去皮薑炙陳皮去白甘草研以上味乃局方正氣散再加白茯苓草菓仁右各等分細末每服二錢水一盞薑三片􅀥一枚煎七分食前稍熱服和中益胃湯出誠效方治太隂陽明腹痛大便常泄若不泄却秘而難見在後傳作濕毒下鮮紅血腹中㣲痛脇下急縮脉緩而洪弦輕之可得按之空虚熟地黄三分當歸酒製四分升麻半錢蘇木一分藁本二分炙甘草三分柴胡半錢益智仁二分右件都作一服水三盞煎至一盞去滓温服食前一服而愈茯苓白术湯出十便良方治傷寒服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿㣲痛小便不利者桂枝加此方芍藥生薑白术茯苓各三兩甘草二兩大􅀥二十箇右切每服半兩以水二大盞煎取一盞温服小便利則愈忌海藻菘菜酢桃李雀肉等隂陽應象論曰人之汗以天地之雨名之又曰濕盛則霖霪驟注盖以真氣已虧胃中火盛汗出不休胃中真氣已竭若隂火亦衰無汗皮燥乃隂中之陽陽中之隂俱衰四時無汗其形不久濕衰燥旺理之常也其形不久者秋氣主殺生氣者胃之榖氣也乃春少陽生化之氣也張耘夫因閏二月盡天隂雨隂寒濕相雜縁官事飲食失節勞役所傷病觧之後汗出不止沾濡數日惡寒重添厚衣心胸間時作煩熱頭目昏憒上壅食少此乃胃中隂火熾盛與外天雨之濕氣峻熱兩氣相合令濕熱大作汗出不休兼見風邪以助東方甲乙之風藥去其濕以甘寒藥瀉其熱羗活勝濕湯主之炙甘草三分黄耆七分生甘草五分生黄芩酒黄芩各三分人參羌活防風藁本獨活細辛蔓荆子川芎各三分升麻柴胡各半錢薄荷一分右件都作一服水二大盞煎至一盞半細辛以下入輕清四味再上火煎至一盞去滓熱服之一服而止諸證悉去胡洽大露宿丸出本草主寒冷百病方礬石煉亁薑桂心皂莢桔梗各二兩附子三兩右𢷬篩蜜丸服如梧桐子大五丸日三漸増以知為度治傷寒方右用半夏一升洗滑焙亁𢷬末小麥麫一升合和以水溲令熱丸如弹子大以水煮令麫熟則藥成初吞四五枚日二稍増至五十枚旋合旋服覺病减欲更重合亦佳禁食餳與羊肉治傷寒汗不出搐攣手脚出本草右用海蛤川烏頭各一兩川山甲二兩為末酒糊和丸大一寸許揑扁置所患足心下劈葱白盖藥以帛纒定於暖室中取熱水浸脚至膝上久則水寒又添熱水候遍身汗出為度丸一二日一次浸脚以愈為度治傷寒熱壮在臟腑狂躁煩滿大小便閉塞出本草取苦􅀥肉蜜為丸服佳治傷風寒熱骨節碎痛出汗治中風靣目浮腫咽喉不通安胎婦目除肝穢邪氣安中利五臟益目睛殺百藥出本草以葱葉作羹粥煠作虀食之良治傷寒大毒𠻳出本草以飴糖於蔓箐薤汁中煮一服頓服之治傷寒熱毒出本草以人屎水漬飲彌善病人兩手脉浮數而𦂳名曰傷寒若闗前寸脉力小闗後尺脉力大雖不惡風不自汗此乃降氣已盛先見乎脉也宜投藥和之表之也調脉湯陽明少陽也葛根一兩防風半兩前胡七錢半炙甘草半兩右為末每服五錢水二盞生薑一塊如􅀥大拍碎同煎如寸脉依前力小加棗三枚同煎服葛根柴胡湯陽明少陽也葛根一兩柴胡一兩芍藥桔梗甘草各五錢右為末每服五錢生薑一塊葱白三寸同煎服薄荷湯陽明也薄荷一兩炙甘草防風各半兩人參七錢半右為末水煎服防風湯陽明也防風一兩炙甘草四錢旋覆花桔梗各半兩製厚朴七錢半右為末生薑一塊加荆芥穗五錢同煎六物麻黄湯太陽陽明也麻黄去節一兩葛根七錢半人參半兩炙甘草半兩蒼术去皮七錢半右為末􅀥二枚同煎服後猶惡風加荆芥穗七錢丁香皮半兩七物柴胡湯太陽少陽也柴胡三兩蒼术荆芥穗麻黄去節各一兩炙甘草七錢加當歸一兩右為末生薑一塊􅀥三枚葱白三寸同煎太陽證頭項痛腰脊強發熱惡風自汗脉尺寸俱浮緩者是勞也桂枝湯主之是隂經榮藥也閑衛氣使隂氣不泄此藥為衛虚而設也若發汗過多發熱頭面揺卒口噤反背張反背張者太陽兼陽明也去風養血防風當歸散主之防風當歸川芎地黄各一兩右剉每服一兩水三盞煮至二盞去滓温服如無汗者葛根湯主之如有汗者桂枝加葛根白术湯治傷風寒上觧三陽下安太陽神方白术二兩如汗之改蒼术右㕮咀煎服若發熱引飲加黄芩生一兩若頭痛惡風加羗活散三錢半太陽證頭項痛腰脊強發熱惡寒無汗脉尺寸俱浮而𦂳是病發於陽陽者衛也麻黄湯主之是陽經衛藥也開腠理使陽氣伸泄此藥為衛實也傷寒見風脉傷風見寒脉二證大青龍湯主之老用桂枝麻黄各半湯後改用九味羗活湯黄蓍建中加當歸湯黄蓍當歸各一兩半白芍藥三兩桂一兩一分甘草一兩右麄末每服五錢生薑三片棗二枚水一盞半煎至八分去滓取七分清汁日三夜二服尺脉尚遲再作一劑發表湯太陽也麻黄去節一兩半蒼术舶上丁香皮各七分炙甘草半兩人參半兩當歸半兩加桂枝五錢細辛半兩如多减半汗不止則多右為末生薑一塊棗三枚同煎經云有汗不得服麻黄無汗不得服桂枝若差則其變不可勝言故立此法使不犯三陽禁忌觧表神方羗活一两半治太陽支節痛君主之藥也然非此無主也却亂反正之主也故大無不通小無不入闗節痛非此不治防風一兩半治一身盡痛卒伍卑下之職一聽君命将而行隨所使所引而至蒼术一兩半别有雄壮上行之氣能除濕下安太隂使邪氣不内傳之于足太隂脾細辛五錢治足少隂腎苦頭痛川芎一兩治厥隂頭痛在腦白芷一兩治陽明頭痛在額生地黄一兩治少隂心熱在内黄芩一兩治太隂肺熱在胸甘草一兩能緩裏急調和諸藥故有國老之稱以上九味雖為一方然一不可執中無權猶執一也當視其經絡前後左右之不同從其多少大小輕重之不一増損用之其效如神㕮咀水煎服若急汗熱服以羹投之若緩汗温服而不用湯投之也脉浮而不觧者先急後緩脉沉而不觧者先緩後急九味羌活湯不獨觧利治雜病有神中風行經者加附子中風秘澁者加大黄中風并三者合而成痺等證隨十二經上下内外地寒熱温凉四時邪氣加减補瀉用之煉蜜作丸亦可加生地黄各半治兩感傷寒如神用豆淋酒煎治破傷風太陽經傷寒得裏胸中有熱胃有邪氣傳陽明本也腹痛欲嘔者熱在内也宜黄連湯甘草黄連亁薑人參各七錢半大􅀥三枚右剉細每服五錢水煎服發熱惡寒自汗脉緩發熱惡風無汗脉緩此二證易老原用桂枝二麻黄一湯後亦改用九味羌活湯無論有汗無汗並宜服之易老利發九味羌活湯治傷寒唇𦂳右用鼈甲及頭燒灰作末傅之治傷寒大熱心悶右用槐子燒存性為末酒服方寸治汗不出拘攣腰脚并耳聾右用荆三稜茯苓米醋浸夏月浸四日冬月浸六日杵為末醋湯調下三錢治汗後霍亂者右用敗扇燒為末和粉粉身上發汗法出活人書凢發汗欲令手足俱能濈濈然一時許為佳不欲如水淋漓服湯中病即已不必盡劑然發汗須如常服湏腰以上厚衣覆之令腰以上汗出淋漓而腰以下至足心覺㣲潤病即可觧若病證仍在者三日内可三汗之令腰脚周遍為度一法無藥處可用兩手指相交𦂳叩腦後風府穴向前禮百餘拜汗出自觧出神效方普濟方卷一百四十七
