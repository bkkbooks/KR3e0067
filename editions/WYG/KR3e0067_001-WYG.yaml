body:
  text: 普濟方卷一明周王朱橚撰方脉總論辯男女形生神毓論嘗讀齊大夫禇氏遺書首論受形則曰男女之合二情交暢陰血先至陽精後衝血開裹精精入爲骨而男形成矣陽精先入陰血後參精開裹血血入居本而女形成矣陰陽均至非男非女之身精血散分駢胎品胎之兆復其説如經所謂男子爲陽得陰而生先生右腎爲命之門女子爲陰得陽而長先生左腎爲命之門命門者元精之所舍男子以藏精女子以繫胞男女所以有别者亦由陰陽先後所本有以異也欲知陰陽所本之異者於腎取焉可也男子始生居命門於右腎屬乎陽而應日主三魂降精赤而鎮丹元丹元者精舍也上赤下黑左青右白中央黄運其中三陽之正氣太一之真精名曰弱水内有元龜所以呼吸元氣行百脉爲三焦之原而應於衛也衛爲陽行於膏故男子命門取乎右腎至於左腎屬乎陰而應月主七魄降精黒而鎮金關此葢陽以陰爲本必禀生而在右者也乃若女子所生則具命門於左腎屬乎陰而應月主七魄降精黒而鎮元宫元宫者胞胎所繫也上黒下赤左白右青中央黄運其中三陰之正氣太一之真精名曰原泉内有螣蛇所以呼吸元氣運行百脉爲三焦之原而應於榮也榮爲陰行於脉故女子命門在乎左腎至於右腎則屬乎陽而應日主三魂降精赤而鎮玉關此葢陰以陽爲本必禀生而在左者也按藏教父母及子有相感業神乃入胎依地水火風衆縁和合漸得生長一七日如藕根二七日如稠酪三七日如鞋韈四七日如温石五七日有風觸胎名曰攝提兩臂兩脛及頭五種相現六七日有風名旋轉兩手兩脚四相現七七日及八七日手足十指二十四相現九七日眼耳鼻口及下二穴大小便處九種相現十七日有風名普門吹令堅實及生五臟十一七日上下氣通十二七日大小腸生十三七日漸知飢渴飲食滋味皆從臍入十四七日身前身後左右二邊各生二百五條脉十五七日又生二十條脉一身之中共有八百吸氣之脉至是皆具十六七日有風名甘露爲安置兩眼通諸出入息氣十七七日有風名毛拂能令眼耳鼻口咽喉胷臆一切合入之處皆得通滑十八七日有風名無垢能令六根清凈十九七日眼耳鼻舌四根成就得三種報曰身曰命曰意二十七日有風名堅二脚二手二十指節乃至一身二百大骨及諸小骨一切皆生二十一七日有風名生起能令生肉二十二七日有風名浮流能令生血二十三七日生皮二十四七日皮膚光恍二十五七日血肉滋潤二十六七日髮毛爪甲皆與脉通二十七七日髮毛爪甲悉皆生就母所飲食行住坐卧兒皆辛苦二十八七日生屋園池河等八想二十九七日各隨其業或黧或白三十七日黧白相現三十一七日至三十四七日漸得増長三十五七日肢體具足三十六七日不樂住腹三十七七日生不凈具穢黒暗三想三十八七日有風名藍花能令長舒兩臂轉身向下次有一風名趨下能令頭下足上以向生門如是處胎始終三十有八七日於胞胎中自然生十一種風開通整合使之筋脉肌骨機關孔竅皆得流通然後得成爲人然則父母生育功侔造化其爲恩也豈曰小哉又以道書言之玉清之氣生人上一是爲泥丸上清之氣生人中一是爲絳宫太清之氣生人下一是爲丹田𤣥元始合爲九氣生人九户二十四氣生人二十四體三百六十神生人三百六十骨節八十一分神生人八十一關節東方七宿屬陽明生人三魂西方七宿屬陰精生人七魄南方七宿屬丹元生人天氣北方七宿屬北極生人𤣥津無量妙一結爲子戸天中王氣上爲腦精每一月即有一天之氣下添如是一月欝单無量天真胞命黄演之氣下添乃至第九月無想無結無愛天嶽府命元自是氣不添夫九氣既添又有六甲之神相爲保衛而全成之夫所謂六甲神者甲子水神爲之調暢血脉潤澤三焦甲戌土神爲之調理肌肉使不偏枯甲申金神爲之𦂳固爪齒養育真牙甲午火神爲之和恱五臟混合百神甲辰風神爲之保固胎息呼吸陰陽甲寅木神爲之濯鍊筋骨通貫百骸信知婦人姙娠謂之六甲者豈有他哉五臟六腑筋骨髓腦皮膚血脉精藏水藏二萬八千形影一萬二千精光三萬六千出入八萬四千毛竅莫不各有其神主之然則人生天地中豈可不凝神守真而保其天之所以與我者哉予以釋老之言并前賢遺論輯而書之非臆説也男女動靜說觀常清凈經云天清地濁男動女靜降本流末而生萬物又讀周子太極圖曰陽動陰靜動極復靜靜極復動一動一靜互爲其根則知清濁者天地之位動靜者男女之機也男子爲陽陽主動動中有靜女子爲陰陰主靜靜中有動是以上古天真論女子二七天癸至任脉通太衝脉盛月事以時下至七七則任脉虚太衝脉衰少地道不通形壊而無子丈夫二八腎氣盛精氣溢瀉陰陽和故有子至八八則齒髮去以此知男女陰陽之質不同天癸精血之形亦異陰靜血滿月溢則行靜極復動也陽動氣合時泄而止動極復靜也四大奥論嘗歴覧諸家方論探求醫之妙理復讀佛書見經中多引醫爲喻有云醫善巧方普救一切人則知醫之心即佛之心也診療之際可不明其所以乎葢人之生寓形宇内假合四大以爲身四大者何地水火風也其生也由此而成其死也由此而滅從本不實故也人之生死既繫乎此則爲醫者正當明死生之理以究其疾痛之源可也夫髮毛爪齒皮肉筋骨腦髓垢色皆屬乎地若地大不和則髮焦毛拔爪枯齒槁皮緩肉脫筋急骨痿髓竭腦轉面垢色敗此病之源於地大者也唾涕膿血津液涎沬痰淚精氣大小便利皆屬乎水若水大不和則多唾鼽涕膿潰血溢津液不收涎沬流出痰壅淚盈精走氣泄大小不凈盈流於外此病之源於水大者也至於煖氣則歸火動轉則歸風若火大不和爲煩爲熱爲焦渇爲癰瘍爲狂走爲癃閉若風大不和則偏枯隨爲四肢癱瘓爲口眼喎斜爲筋脉攣急爲痒爲痛爲痺爲􅍙火大風大病故不同四者和合則一身安榮有一不和皆能爲病况於離散者乎矧乎四大之身人所均有而不自覺知醫之神師亦秘而不示於人唯佛書則言之詳矣葢佛爲大醫王了逹生死故能洞明此理予因得以經中所説一貫乎醫後之來者毋以予言爲迂如以予言為迂是亦以佛氏為迂矣五常大論太和絪緼天地設位化生萬物而人位乎其中三才立矣夫人之一身與天地同流上部法天主胷以上至頭之有疾中部法人主膈以下至臍之上有疾下部法地主臍以下至足之有疾髓者精之根命之元也精者血之本神之苖也萃五味之英集五氣之和融結而爲之夫五臟皆有精而内舍於腎以育百骸諸骨皆有髓而上屬於腦以鎮諸陽故腎爲精之舍腦爲髓之海也頭者諸陽之㑹上丹產於泥丸内則百神之所輯爲一身之元首也手之三陽從手至頭足之三陽從頭走足六陽之脉㑹於頭間是以頭痛多屬於陽也陰病亦有頭痛者葢諸陰之脉皆行至頸胷中而還不上循頭獨厥陰肝脉上入頏顙連目系上出額與督脉㑹於顚内經曰頭痛顚疾過於足少陽厥陰甚則入肝又有病頭痛連齒時發時止數歲不已者由寒氣内至骨髓骨髓者以腦爲主腦逆故令頭痛齒亦痛此腎所生病也諸陰經病無頭痛唯肝腎二經有者由此故也面者人神之牖也上部五嶽分别五官以屬五臟目者肝之官主鍳辨五色鼻者肺之官主吸引五臭口者脾之官主嗜食五糓舌者心之官主品嘗五味耳者腎之官主分别五音五官既具則一身之精神皆備於面矣内經云女子六七面皆焦丈夫六八面始焦由陽明氣衰於上也以其手陽明之脉直而上頸貫頰入下齒縫中還出挾口交人中左之右右之左上挾鼻孔足陽明之脉起於鼻交額中傍約太陽之脉下循鼻外入上齒縫中還出挾口環唇下交承漿却循頥後下廉出大迎循頰車上耳前過客主人循髮際至額顱難經云人面獨能耐寒者以其諸陽之脉皆上至頭耳黄帝於面焦髪墮獨言陽明而不言諸陽者葢諸陽之脉雖上循頭而不若陽明之脉維絡於面也合二經而攷之可識經脉之循環騐氣血之消長也茍情動於中邪滛於外形色有變皆見於面不可槩舉頸項者諸陽輻凑之地六陽之脉皆自肩頸出入缺盆下絡五臟所以古人取人迎動脉於頸間以候五臟六腑之氣有餘不足也其爲病則不一或頸項强痛不可囬轉或頸項痛而嗌乾或頸項痛連入缺盆則各隨其經脉所屬而爲病焉至於九瘺瘰癧癭瘤多生於頸項者亦由經脉之所聚也肩者六陽之脉與陽維之㑹皆走於肩而相交㑹循肩上下因知肩爲諸陽之道塗筋骨之樞㑹故能任重負戴背中之府諸陽受氣於胷中轉行於背經云人身之陰陽者背爲陽故五臟六腑之腧皆在於背也臑者臂節也穴名曰天府肘者手腕也穴名曰尺澤臂者從肩至掌統而言之也夫手之三陰三陽皆循臂前後廉上下往來或由中而行故爲病大同而小異用藥亦可以兼理灸之刺之則各隨其經也腋者腋也手三陰之脉與足少陽之脉循腋上下故爲病則腋下腫痛靈樞經曰手太陽之脉從肺系横出腋下手少陰之脉從心系却上肺出腋下手厥陰之脉循胷出脇上出腋下足少陰之脉則從缺盆下腋循胷中過季脇凡此四經或横出腋下或循腋上下别行各有其道也有患狐臭漏腋者古方共爲一病以理攷之其証不一狐臭者多因勞逸汗漬以手摸而臭致清氣道中受此宿穢吸上泥丸散入百脉多相沾染漏腋者由食啖五辛大過而有所發致腠理不宻其汗則自腋泄出浥浥而温浣衣數重皆透臭不可近狐臭漏腋皆腋中之疾雖不傷人命而害人身奉親事君乃至交游皆非所宜脩身之士務爲清潔者偶得此患不可不思有以去之脇者左右腋下也肋者脇骨也肝膽二經交㑹於此是以脇痛多屬肝膽也難經云臟㑹季脇季脇在軟肋之際其端有穴名曰章門直臍旁二寸八分是脾之分足少陰厥陰所㑹也凡熱病在内者則取其穴之所㑹以去其疾也膈者革也自心肺之下有膜與脊脇腹周囬相着如幕以遮蔽濁氣不上熏於心肺所謂膻中者臣使之官喜樂出焉膻中在兩乳間爲氣之海以分布陰陽志和氣逹則喜樂由生又云膈原之下中有父母膜原之上者氣海居焉氣者生之原命之主故氣海爲之父母膜原謂心肺之間也臍者齊也根源本始生成之處冲和凝結之氣通而禀受生焉有生生不窮之義及其形質已具分誕有期則如匏𤓰桃李臍乾而蔕脱矣是以號爲神闕前當腸胃後直腎俞爲天地中分黄庭云兩部水王對生門又云後有宻户前生門生門者臍也嬰兒在母腹中取氣於臍管母呼亦呼母吸亦吸正與宻户相對所謂臍者如此况臍之上下左右乃腸胃盤曲㑹聚之所經所以言五臟之動氣發於臍之上下左右也足陽明衝脉皆挾臍而督脉貫臍中央臍或凸出者水氣積於脾元臍腹疞痛者寒邪傷於下臟不可不知腰挾脊而居前與臍平爲前後分足少陰之脉貫脊足太陽之脉抵腰故腰者腎之外候腰半以上同天之陽腰半以下同地之陰腰爲陰陽之界也腰當人身之中任磬折俛仰之勞設或氣欝於内邪干於外皆致腰痛當以脉之真誕騐之至於房勞疲力耗竭精氣墜墮惡血留滯經絡與正氣衝擊傴僂身重腫痛引脇謂之瀝血腰痛或作勞汗出衣裹冷濕久久得之腰冷如身重不渴小便自利食飲如故腰以下如帶五千錢謂之腎着治之各有法内經云腰者腎之腑轉摇不能腎將憊矣二隂者前後難經云大腸小腸會爲闌門言闌約水糓從其别者也其糓自小腸承受於闌門以分别也其水則滲灌入於膀胱上口而爲溲便若糓之滓穢則自闌門而𫝊道於大腸故曰下焦在膀胱上口以分别清濁也内經云北方黒色入通於腎開竅於二陰二陰者腎之外竅也前曰溲便精血亦自此道出故男子水令居下火令居上女子水令居上火令居下所以男子由此分而爲火水未濟之卦女子由此分而為水火既濟之卦也後曰肛門肛門猶車之􅤧也爲肺下口號爲通事吏難經云下極爲魄門魄門者肛門也重十二兩大寸徑二寸大半長二尺八寸受糓九升三合八分合之一熱則肛門腫縮閉塞不通寒則肛門脱出腸鳴洞泄狐惑傷寒証云蟲食其肛下唇有瘡諸証不同學者宜審之七衝門四十四難曰七衝門何在然唇爲飛門齒爲户門㑹厭爲吸門胃為賁門太倉下口爲幽門大腸小腸㑹爲闌門下極爲􅅎門故曰七衝門也易老曰􅅎門對飛門其証俱狐惑之病以下衝上故曰七衝門也余依丁公主論甚當辨云幽門不通上衝吸門不開噎塞不便燥秘氣不得上下治在幽門閉大便不通以通幽湯主之髀股者足腿也膝者脛頭也膕者足腕也腨者足肚也一名腓腸趺足面也足之六經流注之地足之三陽從頭走足足之三隂從足至腹三陽之脉行足外亷皆循股也三隂之脉行足内亷皆循髀也唯膕中腨内陰陽上下行乎其間至於膝則太陰陽明之脉皆循股而入膝少陰之脉則出膝外亷也足趺者足面繫鞋之所骨間動脉應指名曰衝陽足陽明胃脉氣之所發也傷寒必皆診者以察其胃之有無也肝膽之脉雖亦循趺上下但所行各異其道十二經脉包羅一身無所不至昔紂妃妲姬冬月見二少年朝涉謂紂曰一老生之子一少生之子紂曰何以知之妲姬曰少生者耐寒髓滿脛也老生者畏寒髓不滿脛也紂斮其脛而觀之信然因知人之虚實由禀受之各異也内經曰腎生髓髓生肺子母之義孫真人以髓應肝膽葢不失其本也夫髓爲精之根精爲血之本命之元身之主也五臟像位肝名龍煙字含明號將軍之官於五行爲木故其體狀有枝葉也重四斤四兩有七葉左三葉屬甲為陽右四葉屬乙爲隂夫人夜卧則血歸於肝上朝於目有童子玉女身掛青衣手執青拂每夜三更繞身廵㸔一囬却朝青帝肝神七人老子名曰明堂宫蘭䑓府從官三千六百人肝神名藍藍其位居於左以應東方之木旺蒼龍於春七十二日墓在未其數三八上應歲星下合震卦律中太蔟心名丹元字守靈號帝王之尊爲一身之主於五行爲火故其體狀圓赤如蓮苞未開之質也重十二兩盛精汁三合劉子曰心行於光上智人心有七孔三毛中智人心有五孔二毛下智人心有三孔一毛愚人心有一孔而大愚混濁者有一孔而小矣或癈憨之輩雖有心而無孔故神出入無門者果矣有童子身掛緋衣手執紅拂每夜三更而出繞身廵㸔一囬却歸離宫百神安靜心神九人大尉名絳宫太子南極老人元先之身其從官三千六百人心神名呴呴其位處上焦以應南方朱雀之火旺於夏七十二日墓在戌其數二七上應熒惑下合離卦律中中吕脾名常在字魂停號諫議之官於五行爲土故其形象馬蹄居胃之上以消磨水糓也重二斤三兩扁廣二寸長五寸有散膏半斤主裹血温五臟有童子身掛中宫之衣手執黄拂毎夜三更繞身一囬却朝土主故令百神安靜脾神五人𤣥光玉女其從官三千六百人其藏爲中州以應中央戊巳之土寄旺於辰戌丑未之月各一十八日正旺於長夏墓在辰其數五十上應鎮星下合坤卦律中黄鐘肺名皓華字虚成號相傅之官於五行爲金故位處上焦狀如懸磬而五音之聲皆從肺出也重二斤三兩六葉兩耳凡八葉童子十四人身掛素衣手執玉節守氣廵遊於身却囬素宫百神始得安靜其神八人太和君名曰玉堂宫尚書府從官三千六百人肺神名鴻鴻其臟居髙爲五臟華葢其治在右以應西方白虎之金旺於秋七十二日墓在丑其數四九上應太白下合兊卦律中夷則腎名𤣥㝠字育嬰號作强之官於五行爲水處於下爲藏之根身之本也腎有兩枚重一斤一兩其左爲腎屬壬右者爲命門屬癸女子以右者爲腎左者爲命門男子命氣爲根傳丹田屬壬癸之位女子命氣爲根傳血海通三焦屬坎離之位有二童子身着皂裳手執壬癸之幡遶身廵㸔一囬却朝北帝令元神安靜其神六人司徒司空司命司𨽻校尉廷尉卿腎神名􅞎􅞎腎兩枚形如豆相並而曲附於脊膂外有脂裹内白外黒以應北方壬癸之水旺於冬七十二日墓在辰其數一六上應辰星下合坎卦律中應鐘六腑像位膽者謂青腸肝之府也號中正之官在肝之短葉間重二兩三銖盛精汁三合其神五人太乙道君居紫房宫中其從官三千六百人膽神名灌灌或人夜間恐懼大張眼時弩目視之其妖自息故得膽神相助其威如此旺墓應與肝同也小腸謂赤腸心之府也號受盛之官居胃之下重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左囬疊積十六曲盛糓二斗四升水六升二合合之大半其神二人元梁使者小腸神名潔潔旺墓應合與心同也胃者謂黄腸脾之府也號曰太倉主圍受食物爲水糓之海六腑之大原也與脾相連重二斤十四兩紆曲屈伸長二尺六寸盛糓二斗水一斗五升其神十二人五元之氣諫議大夫胃神名且且旺墓應合與脾同也大腸謂白腸肺之府也爲傳道之司號監倉之官居小腸之右重二斤十二兩長二丈一尺廣四寸徑一寸半當臍右囬十六曲盛糓一斗水七升半其神二人元梁使者大腸神名洞洞旺墓應合與肺同也膀胱謂黒腸腎之府也號州都之官居大腸之側臍之下應丹田人之根也重九兩二銖縱廣九寸名曰水漕又名玉海盛滿九升九合一作胞胞者􅀈也以虚受水爲津液府故云膀胱者胞之室也旺墓應合與腎同也三焦者元氣之别使也主持諸氣有位無形其經屬手少陽此外府也號决瀆之官上焦者在心下下膈在胃上口主内而不出中焦者在胃中脘不上不下主腐熟水糓下焦者在臍下當膀胱上口主出而不内以傳道也故經云三焦者水糓之道路氣之所終始也或難曰扁鵲以心主與三焦爲表裏心主者心胞絡也叔和以命門與三焦爲表裏命門者右腎也二人之論何相戾歟予辨之曰心爲五臟之君而居上部腎乃一身之根而處下元真心不受邪而下有胞絡腎有二枚而右爲命門上下相應與三焦俱爲相火上焦其治在膻中膻中者三焦之所㑹下焦其治在氣衝氣衝者元氣之别府是以三焦始於氣衝終於膻中也扁鵲以心主與三焦相爲表裏者心主非正臟而三焦亦非正府但以三焦之經屬手少陽心胞之經屬手厥陰二經俱屬於手隂陽相配合耳叔和以命門與三焦相爲表裏者腎爲精之舎三焦爲精之府命門雖係一臟外别無經與腎俱屬足少陰之經與足太陽膀胱相爲表裏以此推之三焦之氣與命門通而三焦之經不與命門合也扁鵲之論爲正至於中焦在胃中脘主腐熟水糓其精華則流而爲榮衛其糟粕則轉而爲滓濊葢胃爲水糓之海三焦爲水糓之道路以此而知三焦之氣各隨其所屬部分而爲之應又何疑焉五臟相涉肝者木也腎爲之母心為之子脾爲之匹肺爲之主也肝爲之病則有目脇指爪筋血諸證皆氣合血類從病由是生焉肝之竅在目目爲肝之官而五藏之精華皆上注於目骨之精爲瞳子屬腎筋之精為黒眼屬肝血之精爲絡果屬心氣之精為白眼屬肺肉之精爲約束屬脾其筋骨血肉氣之精與脉並爲系系上屬於腦後出於項中至於目决其面者爲兊皆足少陽經脉之所起屬於膽近鼻上爲外眥足太陽經脉之所起屬膀胱下爲内眥足陽明經脉之所起屬於胃以此知五臟精華三陽經氣互相交涉灌注於目所注不同也肝之爲病必脇下痛引少腹又云膽脹者必兩脇病口中苦善太息葢肝之經扺少腹布肋胆之經循脇裏出氣街是以脇痛之證屬肝與膽也内經曰肝之合筋也其榮爪也肝中寒兩肩不舉身無膏澤喜轉筋爪甲枯黒春差秋劇筋受寒則筋不能動十指爪皆痛肝外榮於筋故筋病不已傳之於肝靈樞經云膽之厚薄以爪甲騐之爪甲色黄則胆厚爪色紅則膽薄爪色青堅則膽急爪色赤軟大者膽緩爪直色白無約者膽直爪色多敗者膽結也故知肝應膽膽應爪互有所屬焉中藏經云若手足爪甲青黒呼罵口不息者謂之筋絶筋絶不治九日死難經云足厥隂氣絶則筋急筋急則引舌與卵故舌卷卵縮此筋先死庚日篤辛日死龎老云諸病及被毒爪甲青黒者死候也心者火也肝爲之母脾為之子肺爲之匹腎爲之主也心之一氣相屬如舌與血脉胷髮等證皆中外相應經絡流注而生病焉心氣通於舌舌爲心之官而心之本脉系於舌根脾之脉絡係於舌傍肝脉循陰器而絡於舌本凡此三經或爲風寒濕所中皆使人舌卷縮而不能言至於心熱則舌破裂而生瘡肝壅則舌出血如湧脾閉則白胎如雪諸證各異治之當隨其藏之所屬不可不知内經云心之合脉其榮色也心中寒則令人勞倦頭面赤葢心合脉榮於色也靈樞經云小腸厚薄則以皮之與脉急緩騐之皮厚則脉厚脉厚則小腸厚皮薄則脉薄脉薄則小腸薄皮緩則脉緩脉緩則小腸大而長皮急則脉急脉急則小腸結也故知小腸應心心應皮所以然也難經云手少陰氣絶則脉不通不通則血不流血不流則色澤去故面黒如黧此血先死壬日篤癸日死内經云諸藏受病懸脉絶者死候也脾者土也心爲之母肺爲之子腎爲之匹肝爲之主也脾之氣候相屬如唇口頥頷咽門肌肉中外相應也脾氣通於口口爲脾之官五味入口藏於胃脾主行精華分布津液於五臟五臟之氣偏勝味必偏應於口脾熱口甘膽熱口苦勞欝則口臭凝滯則生瘡煩躁則澁宿食則酸寒則醎虚則淡夫口乃一身之都門出入榮養之要道節宣㣲爽病必生焉豈得但於脾之一經言也内經云脾之合肉也其榮唇也胃應脾脾應肉肉與脾胃合肉堅則胃厚肉瘦則胃薄肉之𦂳緩踈宻與胃相應也胃病肉色變臟腑有病皆從肉生肉熱應臟肉寒應腑肉虚則坐席不安身色變動實則坐席不動喘氣迫脾之有疾皆騐於唇唇者脾之外候燥則乾乾則裂風則瞤動寒則揭氣欝則生瘡血枯則瀋而無色若以經脉變涉言之手陽明之脉挾口環唇足陽明之脉亦挾口環唇足厥陰之病循唇内凡此三經或自下而上或自上而下環繞於唇也龎老云經逆則榮衛不通陰陽反作内外傷繫致虛消瘦口噤唇黒者不治又言聲憂懼舌卷短縮此木克土陽繫於陰陰伏陽起起則實實則熱熱則悶亂體重唇黄聲咤者不治難經云足太陰氣絶則脉不榮其口唇口唇者肌肉之本也脉不榮則肌肉不滑澤肌肉不滑澤則肉滿肉滿則唇反唇反則肉先死甲日篤乙日死中藏經云凡病見唇乍乾黒者死肺者金也脾爲之母腎爲之子肝爲之匹心爲之主也肺爲五臟上蓋主持諸氣通息於鼻鼻居面部之中岳位而尊上透泥丸下應於肺夫人一日一夜呼吸出入通計一萬三千五百息從鼻往來未嘗間斷故鼻爲肺竅主吸引五臭衛養五臟内經云五氣入鼻藏於心肺上使五色脩明音聲能彰難經云心主臭肺主聲鼻者肺之竅而反知香臭其意何也肺者西方金也金生在已已者南方之火火者心心主臭故令鼻知香臭此五行相因而成也又肺之偏正以鼻騐之鼻正肺正鼻偏肺偏豐怯厚薄皆相應也内經云肺之合皮也皮者一身之包裹爲肺之外候難經云形寒飲冷則傷肺肺病則皮膚痛洒洒然寒熱上喘氣自汗出也靈樞經云大腸厚薄騐之於皮皮厚大腸厚皮薄大腸薄皮熱應肺皮寒應大腸葢肺主皮而大腸應皮也難經云手太陰氣絶則皮毛焦皮毛焦則津液去津液去則皮節傷皮節傷則皮枯毛折皮枯毛折則毛先死丙日篤丁日死凡五臟真脉見色不澤毛折乃死腎者水也肺爲之母肝為之子心爲之匹脾爲之主也腎之所主乃精髓骨腦腰齒脊前後二陰髀股膕腨足跟足心所生病也腎開竅於二陰而氣通於耳難經云腎肺主聲耳者腎之候而反聞聲其意何也腎者北方水也水生於申申者西方金也金者肺肺主聲故令耳聞聲此五行相因而成也内經云腎之合骨也其榮髮也腎應骨骨與腎合姙娠七月始受木精以成骨故曰無使身勞動居處必煖飲食避寒常食粳稻以宻腠理是謂養骨以堅齒今人立身以來嗜欲纔過則骨立羸瘠肩聳脊露齒則焦黒摇動而痛莫不由禀受之際有所感動而然夫腎應骨而齒者骨之幹資髓以養表而出之人受形於胞胎七月而骨齒成糓氣未行則居於斷糟中及其時至則齒生而嗜食􅇟合而能言亦造化生成自然之序且人一身之消長以齒候之内經云女子七歲腎氣盛髮更齒長至三七則腎氣平均故真牙生而長極七七則齒髮去矣丈夫八歲腎氣盛髮更齒長至三八則腎氣平均故真牙生而長極八八則齒髮去矣夫資身之器齒爲最勞自能食以至終身咀判百品略無少鈍此亦神竒古人每旦以鹽湯潄滌而扣啄則彌堅亦衛生之道也大抵腎衰則齒豁動摇精固則齒堅齊宻内丹訣云任督二脉爲一身陰陽之海五氣真元此爲機㑹而齦交二穴在唇内齒上縫爲任督二脉之㑹一身之要世上罕知之至於潄鍊為服此藥仙經云一物含五彩永作仙人禄言其備五行之英華總二脉之交㑹自古眞人秘此二穴訣在於口不傳文字鍼經云足陽明之脉入上齒縫中手陽明之脉入下齒縫中是以胃氣虚則上齒卒痛大腸壅則下齒或浮胃有流熱則齒腫大腸經虚則齦宣二經之脉俱循於齒故病如是難經云足少隂氣絶則枯黒少陰者冬脉也伏行而溫於骨髓骨髓不溫即肉不着骨骨肉不相親即肉濡而却故齒長而髮枯無潤澤者骨先死戊日篤已日死中藏經云凡病齒忽黒者三十日即死肺臟配天地論韓子曰形而上者謂之天形而下者謂之地介於其兩間者謂之人人受天地之中以生莫不禀二氣以成形是以六氣緯空五行麗地人則黙而象之故足厥陰肝居於己手厥陰右腎居於亥己亥爲天地之門户故風木化焉足少陰腎居於子手少陰心居於午子午得天地之正中故君火位焉足太陰脾居於未手太陰肺居於丑丑未爲歸藏之標本故濕土守焉足少陽膽居於寅手少陽三焦居於申寅申握生化之始終故相火麗焉足陽明胃居於酉手陽明大腸居於卯卯酉爲日月之道路故燥金行焉足太陽膀胱居於辰手太陽小腸居於戌辰戌爲七政之魁罡故寒水注焉此三才應奉二氣相須不刋之説殆如指掌至於五行六氣第相資生亦莫不有自然之序如厥陰風木生少陰君火君火生太陰濕土濕土生少陽相火相火生陽明燥金燥金生太陽寒水順天道而右旋所謂運行也或問君火生土土復能生相火火復生金其義何在此生成之道也相火既已發熖暈暈灰滅非土不成未見虚空能聚火金在鑛非火不能煆出所以河圖火七居西室金九居南室蓋互顯其成能也若以一性而推之無所不備故木焚則爲火絞則爲水石擊則爲火邃則爲水洲􅀈之内江河兢注大海之中火光常起此皆性之本有也又何疑土中火火中金夫木火土金水此乃常度人皆知之至於風暑濕燥寒謂之揆度鮮有能明其狀者故以木比風以火比暑以土比濕以金比燥以水比寒仍以上下二氣而配手足三陰三陽則爲之竒度又况五行各各不同有正氣有太過有不及天地氣化既然人之臟腑亦然感而爲病或外邪或本氣或禀賦必當推類而調之血榮氣衛論人之一身所以得全其性命者氣與血也葢氣取諸陽血取諸陰血何以爲榮榮行脉中滋榮之義也氣何以爲衛衛行脉外䕶衛之義也人受糓氣於胃胃爲水谷之海灌溉經絡長養百骸而五臟六腑皆取其氣故清者爲榮濁者爲衛二氣周流不息一日一夜脉行五十度平旦以來復㑹於肺口所謂陰陽相貫如環之無端則是二氣者常相隨而不相離也夫惟血榮氣衛常相流通則於人何病之有一窒碍焉百病由此而生矣故氣之作恙發而爲寒熱恚怒喜憂愁聚而爲積痞疝瘕癥痃癖上爲頭旋中爲五鬲下爲臍間動氣或喘促或咳噫聚則中滿逆則足寒凡此者氣使之然也血之爲患其妄行則上衂其衰涸則虚勞蓄之在上其人忘蓄之在下其人狂逢寒則筋不榮而攣急挾熱則毒内瘀而發黄在小便者爲淋痛在大便者爲腸風其餘婦人月事進退漏下崩中病尤不一凡此血使之然也夫血譬則水也氣譬則風也風行水上有血氣之象焉葢氣者血之帥也氣行則血行氣止則血止氣溫則血滑氣寒則血凝氣有一息之不運則血有一息之不行病出於血調其氣猶可以導逹病原於氣區區調血何加焉故人之一身調氣爲上調血次之是以先陽後陰之意也若夫血有敗瘀滯泥乎諸氣則氣之道路未免有所壅遏又當審所先而决去之經所謂先去其血而後調之不可不通其變矣然而調氣之劑以之調血而兩得調血之劑以之調氣而乖張如木香官桂細辛厚朴以至烏藥香附莪术三稜之類治氣可也治血亦可也若以當歸地黄輩施之血證無以逾此然其性纒滯每於胃氣有虧胃既虧則五臟六腑之氣亦餒矣善用藥者其間量劑而佐助之大凡治病當識本末假如嘔吐痰涎胃虚不食以致發熱若與凉劑退熱則胃氣愈虚愈熱不退惟先以助胃止吐爲本其熱自退縱熱不退但得胃氣已正亦可旋與解熱之劑又有傷寒發大熱屢經寒凉䟱轉其熱仍前但用調胃氣自然無事雖然心爲血之主肝爲血之藏肺爲氣之主腎爲氣之笥知血之出於心而不知血納於肝知氣之出於肺而不知氣之納於腎用藥模稜往往南轅而北轍矣假如血痢作恙以五苓門冬等劑行其心以巴豆大黄等劑逐其積而其痛獨存者血之所藏無以養也必佐以川芎或川歸湯輩則其痛止假如喘𠻳氣鳴以薑橘枳梗蘇桔調其氣以南星半夏細辛豁其痰而終不下降者氣之所藏無以收也必佐以補骨脂或安腎丸輩則其氣歸元病有標本治有後先綱舉而目斯張矣經云腎間氣五臟六腑之本十二經脉之根呼吸之門生炁之原也學診例凡欲診脉先調自氣壓取病人息以候其遲數過與不及所謂以我醫彼知與神㑹則莫之敢違凡診脉須先識脉息兩字脉者血也息者氣也脉不自動爲氣使然所謂長則氣治短則氣病也凡診須識人迎氣口以辨内外因其不與人迎氣口相應爲不内外因所謂關前一分人命之主凡診須先識五臟六經本脉然後方識病脉歲主臟者氣候逆傳陰陽有時與脉為異此之謂也凡診須認取二十四字名狀與關前一分相符推説證狀與病者相應使無差忒庶可依源治療總論脉式經云常以平旦陰氣未動陽氣未散飲食未進經脉未盛絡脉調匀乃可診有過之脉或有作爲當停寜食頃俟定乃診釋曰停寧俟定即不拘於平旦况倉卒病生豈待平旦經云切脉動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰可以參决生死之分釋曰切脉動靜者以脉之潮㑹必歸於寸口三部診之左關前一分爲人迎以候六滛爲外所因右關前一分爲氣口以候七情爲内所因推其所自用背經常爲不内外因三因雖分猶乃未備是以前哲類分二十四字所謂七表八裏九道七表者浮芤滑實弦𦂳洪八裏者㣲沉緩濇遲伏濡弱九道者細數動虚促結代革散雖名狀不同證候差别皆以人迎氣口一分而推之與三部相應而說證故脉贊曰關前一分人命之主左爲人迎右爲氣口神門决斷兩在關後沉細爲暑濕皆外所因喜則散怒則激憂濇思結悲𦂳恐沉驚動皆内所因㸔與何部相應即知何經何臟受病方乃不失病機也但經所述謂脉者血之府也長則氣治短則氣病數則心煩大則病進丈藻雖雅義理難尋動靜之辭有慱有約􅀶則二十四字不濫絲毫浮沉遲數總括紀綱故知浮爲風爲虚沉爲濕爲實遲爲寒爲冷數爲熱爲燥風濕寒熱屬於外虚實冷燥屬於内内外既分三因逈别學者宜詳覧不可憚煩也經中所謂視精明者葢五臟精明聚於目精全則目明神定則視審審視不瞭則精明敗矣直視上視眩瞑眊瞑皆可兼脉而論病狀也所謂察五色者乃氣之華也赤欲如帛裹朱不欲如赭白欲如璧之澤不欲如堊青欲如蒼玉之澤不欲如藍黄欲如羅裹雄黄不欲如黄土黒欲如漆重澤不欲如炭五色精敗壽不久矣所謂觀五臟有餘不足者候之五聲五音者臟之音中之守也中盛則氣勝中衰則氣弱故聲如從室中言者是氣之澁也言㣲終日乃復言者是氣之奪也譫妄不避善惡者神明之亂也發聲言意不相續陰陽失守也故曰得守者生失守者死所謂六腑強弱以候形之盛衰者頭者精明之府頭仰視深精神奪矣背者胷之府背曲肩隨胷將壊矣腰者腎之府轉摇不能腎將憊矣膝者筋之府曲伸不能筋將憊矣骨者髓之府也行則振掉骨將憊矣倉廪不藏者腸胃不固也水泉不止者膀胱不藏也得强者生失强者死此等證醫者要問在脉難明惟證易辨是故聖之垂教學者宜兼明之不可忽也診脉要法素問診脉與鍼經皆同取右寸口又名氣口氣口者肺部也在天者也爲十二經皆朝於肺肺者相也天元之氣皆朝於此乃從天而下至地也難經診法從地上合於天何以知其然也始於春終於冬乃弦洪毛石四法一少陽二陽明三太陽四太隂五少隂六厥隂又説左手脉行陽道右手脉行隂道脉分表裏太過不及仲景傷寒診法自外之内左寸為始一足太陽寒二足陽明濕三足少陽木四足太隂脾五足少隂水六足厥隂風已上六經皆足之六經在北方寒水東方風戌丑之位故始于傷寒病發于春為温病無竒經者不為外邪所傷此足六經皆以竒邪之火為附經者也叔和脉訣説左遷逆行天度為病故入式歌曰左心小腸肝膽腎右肺大腸脾胃命也圖解脉訣入式寸左右心肺小腸大腸闗左右肝脾膽胃尺左右腎包絡心膀胱三焦尺盛有病寸為陽借言男關尺為隂借言女説無病寸如隂女至此寸弱而此説順也尺弱有病寸為陽借言男關尺為隂借言女説無病尺如陽男至此寸盛而此説順也春夏背陽在上抱隂在下春夏背陽而抱隂春升夏浮順春夏不升浮反秋冬背隂在上抱陽在下秋冬背隂而抱陽秋降冬沈順秋冬不沈降反㸔之説同前反此言之説故病焉左寸闗尺左尺屬腎水所主者異右寸闗尺右尺屬相火受病則同男曰作强之官三十六難曰藏各有一耳腎獨有兩何也然腎兩者非皆腎也其左者為女曰技巧之官腎右者為命門命門者諸精神之所舎元氣之所繫也男子以藏精女子男子内結七疝以繫胞故腎有二也潔古云男子女人皆以左為腎右為命門藏精氣海女子帶下瘕聚也女係胞血海也所主者異受病一也論脉本始人禀天地五行之氣以生受父母隂陽之氣以成是以有五臟六腑四肢十二經三百六十五穴以象五運六氣四時十二月周天之度隂陽變化與天地同流乖其氣逆其理則隂陽交錯腑臓偏毗脉行遲速榮衞失度百病從生非脉無以探􅄨索隠所謂脉者乃天真之一氣是故上古聖人論理人形列别臓腑端絡經脉㑹通六合各從其經氣穴所發各有腧名所以善診脉者静心息意觀識知變於冥冥之中以神合神怱然獨悟口弗可言先别隂陽審清濁而知分部視喘息聴聲音而察病所生所謂隂陽者至者為陽謂隨呼而出也去者為隂謂随吸而入也動者為陽鼓擊躁急也静者為隂来去沈沈黙黙也數者為陽謂一呼一吸六至也遲者為隂謂徃来不滿三至也於三部九候之内察其脉形有獨異者謂獨大獨小獨疾獨遲獨不應四時者乃受病之所也凢人禀形氣有適中有躁静各各不同氣脉潮動亦各随其性禀故呼而脉再至吸而脉再至呼吸之間復一至合為五至此為適中者也春秋中日夜正等其呼而脉至多吸而脉至少或吸而脉至多呼而脉至少此則不同為冬夏日夜長短知異也凡氣脉呼吸晝夜變通效於四時然於呼吸定息應五至之限無有虧僻猶鑒刻與四時長短而歳功日數無遺也若人狀貎有羸有壮其呼吸雖相接續而晝夜息度随其漏刻是謂呼吸象晝夜變通效於四時也脉論十二經其實一脉也界為十二分而已何以知之手太隂起于中焦出於大指之端手陽明起於大指之端上挟鼻孔足陽明起於鼻交入大指間出其端足太隂起於大指之端注於心中手少隂起於心中入掌内循小指手太陽起於小指之端斜絡於目内眥足太陽起於目内眥至小指外側足少陽起於小指之下注胷中手厥隂起於胸中循小指次指出其端手少陽起於小指次指之端至目銳眥足少陽起於目銳眥入大指循岐骨内出其端足厥隂起於大指聚毛之際上注肺中以此考之故知其血氣通流相貫未嘗間㫁終而復始如環無端不然何以云流注也然必始於中焦者何也扁鵲云焦者原也人受天地之中以生所謂冲氣其二五之氣始自中原播於諸脉寅時注於肺卯時注於大腸辰時注於胃巳時注於脾午時注於肝未時注於小腸申時注於膀胱酉時注於腎戌時注於心包絡亥時注於三焦子時注於膽丑時注於肝寅時復注於太隂上合鷄鳴下應潮水其氣與天地同流加一至則熱减一至則寒上魚為溢入尺為覆古人處百病决死生候此而已東方甲風膽乙木肝南方丙熱小腸丁火心西南方戊濕胃己土脾西方庚燥大腸辛金肺北方壬寒膀胱癸水腎甲乙丙丁戊己庚辛壬癸風木熱火濕土燥金寒水肝膽小腸心胃脾大腸肺膀胱腎丙三焦相火父氣也無状有名丁命門包絡母氣也後天之根甲丙戊庚壬氣温熱凉寒升浮降沈在天為天元一氣又為寒暑燥濕風火在人為六腑又為呼吸榮衛乙丁己辛癸味辛甘淡醎苦酸散緩急軟堅收在地為三隂三陽又為金木水火土在人為五臓又為皮肉筋骨脉帝曰地之為人下否乎岐伯曰地為人之下太虛之中者也帝曰馮乎岐伯曰大氣舉之也燥以乾之暑以蒸之風以動之濕以潤之寒以堅之火以温之故燥熱在上温氣在中風寒在下火逰行其間寒暑出入故令虚而生化也人亦應之故心肺在上脾胃在中肝腎在下三焦元氣逰行其間通行十二經脉如經行肺之分野以肺經言之至肝之分野以肝言之之類是也若以名命氣以氣命處主生化氣血維養神明者也衰則從火化神氣衰矣黄帝曰脉行逆順奈何岐伯曰手之三隂從藏走手手之三陽從手走頭足之三陽從頭走足足之三隂從足走腹已上説十二經之血脉左遷非元氣真氣穀氣三焦之氣右遷也數者皆胃氣之别名也或曰腎氣對分之者是分男女之異耶願聞其説荅曰男子婦人之脉豈有異乎舉世之人皆當以左手尺脉常弱右手尺脉常盛為得其平何者盖左尺屬壬癸寒水膀胱腎之脉有水之體者然也難經曰按之至骨舉指来疾者腎也此語推之其為弱也明矣若右尺屬丙丁熱火三焦包絡之脉有火之體者然也難經曰浮而大散者心也以此推之其為强亦明矣右手尺脉男子主藏精施化婦人主胞胎有孕所主雖異所受則同俱為生化之原此三焦相火包絡十二經之元氣也故當常盛此男子婦女尺脉俱同而無異者也二脉乃真水真火之大要也惟命所禀於此根焉命之所係於此司焉天地隂陽氣血强弱於此見焉大矣哉脉之在人其所主有如此者故經云微妙在脉不可不察也或曰左手頭指乃心與小腸動脉所主何云火之子願聞其説荅曰左手頭指火之子者直指命門三焦相火在於左手寸口心君之位用事明君主無為相火代之内經云君火以名相火以位者是也脉經云手少隂之脉起自心中出屬心系心系者命門包絡三焦相火之别稱也顛倒右手尺脉於上為天部次於左手心脉之右以看之其理皎然若將兩手攙抄於前俱仰其手掌左手居外右手居裏則木火土金水五行相序而經綸四時之令無差忒矣六微㫖大論曰顯明之右君火之位也君火之右退行一步金氣治之復行一步水氣治之復行一歩木氣治之復行一歩君火治之是次列五行相生之理也皆所以明顛倒右手尺脉次心火之右無疑矣三焦相火及包絡之脉人之元氣也周身何處無之是明相火用事主持隂陽之氣神明之府已叔和正為生育之化在下故言火之子也六經所屬心部在左手寸口屬手少陰經與小腸手太陽經合肝部在左手關上屬足厥陰經與膽足少陽經合腎部在左手尺中屬足少陰經與膀胱足太陽經合肺部在右手寸口屬手太陰經與大腸手陽明經合脾部在右手關上屬足太陰經與胃足陽明經合右腎在右手尺中屬手厥陰心包經與三焦手少陽經合手少陰之脉起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目其直者復從心系却上肺出腋下下循臑内後廉行太隂心主之後下肘内廉循臂内後廉抵掌後廉骨之端入掌内廉循小指之内出其端手太陽之脉起於小指之端循手外側上腕出踝中直上循臂骨下廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支别者從缺盆循頸上頰至目鋭眥却入耳中其支者别頰上䪼抵鼻至目内眥斜絡於顴足厥陰之脉起於大指聚毛之際上循足跗上廉去内踝一寸上踝八寸交出太陰之後上膕内廉循股入陰毛中環陰器抵小腸挾胃屬肝絡膽上貫膈布脇肋循喉嚨之後上入頏顙連目系上出額與督脉㑹於巔其支從目系下頰裏環唇内其支復從肝别貫膈上注肺足少陽之脉起於目鋭眥上扺頭角下耳後循頸行手少陽之脉前至肩上却交出少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支别者目鋭眥下大迎合手少陽於䪼下交頰車下頸合缺盆下胷中貫膈絡肝屬膽循脇裏出氣街繞毛際横入髀厭中直者從缺盆下腋循胷過季脇下合髀厭中以下循髀太陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者從跗上入大指循岐骨内出其端還貫入爪甲出三毛足少隂之脉起於小指之下斜趨足心出然谷之下循内踝之後别入跟中上腨内出膕内廉上股内後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支從肺出絡心注胷中足太陽之脉起於目内眥上額交巔上其支别者從巔至耳上角其直行者從巔入絡腦還出别下項循肩膊内挾脊抵腰中入循膂絡腎屬膀胱其支别者從腰中下貫臀内入膕中其支别者從􅈩内左右别下貫髀挾脊内過髀樞循髀外後廉下合膕中下貫腨内出外踝之後循京骨至小指外側端手太陰之脉起於中焦下絡大腸還循胃口上膈屬肺從肺系横出腋下下循臑内行少陰心主之前下肘中循臂内上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指内廉出其端手陽明之脉起於大指之端循指上廉出合谷次指兩骨之間上入兩筋之中循臂上廉入肘外廉循臑内前廉上肩出髀骨之前廉上出柱骨之㑹上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫及頰下入齒縫中還出挾口交人中左之右右之左上挾鼻孔足太陰之脉起於大指之端循指内側白肉際過覈骨後上内踝前廉上臑内循脛骨後交出厥陰之前上循膝股内前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃别上膈注心中足陽明之脉起於鼻交額中下循鼻外入上齒中還出挾口環脣下交承漿却循頥後廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直行者從缺盆下乳内廉下挾臍入氣街中其支者起胃下口循腹裏下至氣街中而合以下髀關扺伏兎下入膝臏中下循脛外廉下足跗入中指内間其支者下膝三寸而别以下入大指間出其端手厥陰之脉起於胷中出屬心包下膈厯絡三焦其支者循胷出脇下腋三寸上抵腋下循臑内行太陰少陰之間入肘内下臂行兩筋之間入掌中循中指出其端其支者從掌中循小指次指出其端手少陽之脉起於小指次指之端上出両指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩交出足少陽之後入缺盆交膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項挾耳後直上出耳角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人交頰至目鋭眥普濟方卷一
