腸為表裏而肺主氣其候身之皮毛春陽氣雖在表而血氣尚弱其飲食居處運動勞役血氣虚者則為風邪所傷客於肌肉之間後因脾胃氣虚風邪又乗虚而進入於腸胃其脾氣弱者不能尅制水榖故糟粕不結聚而變為痢也又新食竟取風名為胃氣其状惡風頭多汗膈下塞不通飲食不下腹脹形瘦腹大食物則脹滿食寒則洞泄洞泄者痢無度也若胃氣竭者痢絶即死診其脉小手足寒難療脉大手足温易療也下白沫脉沉則生浮則死身不熱脉不懸絶滑大者生懸濇者死以藏期之也脉絶而手足寒晬時脉還手足温者生脉不還者死脉緩時小結者生洪大數者死懸絶而澁者死細㣲而濇者生𦂳大而滑者死得大絶脉者不死方廣濟療赤白水榖冷熱等痢地榆六分白术五分厚朴六分炙乾薑六分熟艾四分赤石脂七分研龍骨七分甘草四分炙黄連十分烏梅六分熬人參六分當歸五分右為末蜜丸桐子大米飲汁服三十丸日三服加至三十丸忌海藻菘菜肉生冷等厚朴散出聖惠方治水榖痢腹内疼痛兩脇虚脹不思飲食厚朴一兩去粗皮塗生薑汁炙令熟木香半兩人參去蘆頭半兩訶梨勒三分煨用皮乾薑半兩炮裂剉陳橘皮一兩浸去白焙當歸半兩剉炒地榆三分剉附子一兩炮去皮臍右為散每服三錢水一中盞煎五分去滓不拘時稍熱服藍青丸治中焦熱水榖下痢藍青汁三升黄連八兩黄蘗四兩阿膠五兩白术地榆地膚子烏梅肉熬各三兩右為散用藍汁和㣲火上煎取可為丸如杏子清白飲進二丸亦不得停留忌猪肉冷水􅊝李雀肉等訶梨勒丸治水榖痢腹脇虚脹時復疼痛不欲飲食訶梨勒一兩煨用皮乾薑三分炮剉當歸一兩剉炒黄連去鬚㣲炒白术一兩木香三分厚朴一兩去粗皮塗生薑汁炙香熟右為末煉蜜和搗二三百杵丸如梧桐子大每服不拘時粥飲下三十丸龍骨丸治水榖痢日夜數腹内疼痛龍骨三分艾葉一兩㣲炒赤石脂三分白礬一兩焙令汁盡黄連三分去鬚㣲炒當歸三分剉碎㣲炒附子一兩炮去皮臍右為末煉蜜和搗三二百杵丸桐子大每於食前以粥飲下三十丸㵼心湯治老小下痢水榖不分腸中雷鳴心下痞滿乾嘔不安人參黄芩甘草各一兩乾薑一兩半黄連二兩半夏三兩大􅀥十二枚右㕮咀以水八升煑二升半分三服并治霍亂若寒加附子一枚渇加栝蔞一枚二兩嘔加橘皮一兩痛加當歸一兩渇熱以生薑代乾薑胃風湯治胸結下痢風冷水榖不化方見本門諸泄痢類肉荳䓻散治水榖痢心腹脹滿不能飲食肉荳䓻一兩去殻木香一兩甘草半兩炙㣲赤剉乾薑一兩炮裂剉厚朴一兩去皮塗生薑汁炙香熟右為散每服三錢水一中盞入棗三枚煎六分不拘時稍熱服附子五味散榖痢乆候痢無期度食不消化腹痛每遇冷便發有此疾候者附子炮細辛白术各五兩乾薑四兩神麴一升熬右為散以飲下之初服一方寸匕日再服稍加至二三匕良忌猪肉冷生桃李雀肉等草荳䓻散治水榖痢不止腹内疼痛草荳䓻一兩去皮白石脂一兩當歸一兩剉㣲炒乾薑一兩炮剉右羅為散每服不計時以粥飲調下二錢四白丸治水榖痢臍腹疼痛日夜數行白石脂二兩白礬一兩焼灰白龍骨二兩胡粉二兩炒黄右研為末用粳米飯和搗一二百杵丸如梧桐子大每服食前粥飲下三十丸療水榖痢方乾薑三分鷄子二枚小豆二百粒炒令香中食黄連二分右搗篩三物内鷄子黄白中攪勻㣲火上炒令可丸一服五十丸如小豆大旦以飲服即瘥忌食脂膩生冷猪魚蒜葱療熱水榖下痢方黄連阿膠各二兩梔子二十枚右切以水七升煑二升分為三服忌猪肉冷水馬蘭散出聖惠方治水榖痢日夜百度及水痢百起馬蘭子一兩㣲炒乾薑一兩炮剉黄連一兩去鬚剉㣲炒右為散不拘時以粥飲調下二錢一方熟煑湯取一合許和二方寸匕入腹即㫁冷熱皆治常服神効不得輕之忌猪肉冷水又方橡斗五枚盛茛菪子炒令黒龍骨半兩柿蔕七枚右羅為散不拘時以粥飲下一錢神妙橡實散治水榖痢無問老小日夜百餘行橡實二兩乾楮葉一兩炙右羅為散每服不計時煎烏梅湯調下一錢菖蒲丸治水榖痢及冷氣腹痛虚鳴菖蒲三兩乾薑一兩半炮剉右羅為散用粳米飯和丸梧桐子大每服食前粥飲下三十丸又方龍骨末三兩巴豆二七枚去心皮研壓出油右以粟米稠粥和丸麻子大每服以陳米粥下三丸如㣲轉以井花水下荳䓻散治水榖痢久不止腹脇脹悶不思飲食方見本門諸痢類治水榖痢乆不止以胡粉二兩棗肉和搗作餅子急火中焼令赤即出地上以碗合之勿令風入待冷細研食前粥飲調下半錢治水榖痢出肘後方用韭作羮㣲炒任食之又方用小豆一合和蠟三兩頓服愈療水榖痢方用椶櫚皮焼灰研以水和服三方寸七廣濟療水痢及霍亂冷痢及食不化有白膿日夜無節度但疑是冷悉主之兼治㵼痢白石脂乾薑各八兩右為末以沸湯和少許麵薄糊和藥并手捻作丸如常法下不止加乾薑八兩忌如常法一方米飲空心下霍亂吐㵼漿水下療水痢腹中氣方茯苓八分白龍骨八分研訶梨勒八分黄連八分酸石榴皮八分右為末蜜丸梧桐子大空心以飲服每服二十丸日二服止忌肉油膩生冷等療水榖痢方狗骨灰牛骨灰亦得麴六月六日造熬令黄右等分為散空腹飲服一方寸七無六月六日麯即常麯亦得主水痢方鷄子二枚黄蠟一兩右熬熟食之宜空肚食之日三服佳又方主水痢及療熱水榖下痢黄連蒼术各三兩右作散和鷄子七枚同煑并捻作丸煑赤豆作漿粥服下三十丸日三服若渇但飲豆漿粥一方以水七升煑二升分服忌猪肉冷水黄芩五味散水榖之候必腹甚痛食無妨但食後即痢食皆化盡唯變作水痢無期度多食多下少食少下有此状者宜服黄芩黄連黄蘖各五兩黄耆四兩龍骨六兩右為散以飲下之初服一方寸匕日二稍加至二三七服瘥乃止忌猪肉冷水等治水榖痢黄連二兩黄蘖二兩阿膠二兩炙右為散以苦酒蜜各半升煎阿膠令洋入内諸藥令可丸飲服三丸日四白蒿方治夏日暴水痢用白蒿葉乾為末以米和一匙空腹服之療水榖下痢方用黄連一升金色者打碎陳米五合二物以水七升煑二升分為二服安石榴湯療水痢及赤白痢篤困欲死腸已滑醫不能療者乾薑黄蘖各二兩石榴一枚殻小者二枚阿膠二兩半炙切右以水三升煑一升二合去滓内膠令鎔頓服即瘥更治老小亦良羸瘦者稍服一方無黄蘖用黄連治水榖痢所下之痢並無赤色只下黄沫忽時下白沫飲食减少肌體黄痩宜服此方訶子麵褁炮去核用皮舶上黄研細各一兩黄橘皮白术川芎各半兩甘草炮四株肉荳䓻一箇右件細杵羅為末用舶上黄末相滚令均用薏苡仁杵作粉煑粥丸如梧桐子大急焙乾每服五十丸空心米湯下湏是焙乾莫令損藥氣治水榖痢乆不瘥厚朴三兩黄連三兩右剉以水三升煎取一升空心服蠱痢附論凡下痢膿血間雜瘀黒有片如鷄鴨肝與血皆下者蠱痢也此由歲時寒暑不調濕毒之氣襲人經脉漸至臟腑毒氣挾熱與血相摶客於腸間如病蠱注之状故名蠱痢也方療三十嵗以下痢及霍亂諸藥不能療并腸滑若是蠱注所中蓼子艾屑各二升龍膽續㫁白术各兩蜀椒去目汗附子炮桂心苦參乾薑甘草炙䑕尾草各二兩右搗篩蜜和丸如梧桐子大一嵗兒服一丸三嵗兒服二丸五歲兒服三丸大人服五丸飲下療寒熱氣堛堛在胸中卒氣痛繞臍忌桃李雀肉生葱猪肉冷水海藻菘菜蝟皮丸治臟腑傷動腸胃虚弱血滲腸間風冷相乗大便下血瘀黒有片或五痔腫痛乆下膿血者蝟皮一具切炙令黒當歸剉焙續㫁黄耆連翹槐寔炒乾薑炮附子炮去皮臍白礬飛各五兩生乾地黄五兩右為末煉蜜和丸如梧桐子大毎服五十丸空心食前米飲下地榆散治蠱注痢下血如鵞鴨肝腹痛不止地榆一兩剉甘草半兩炙㣲赤剉赤芍藥一兩栢葉一兩㣲炙茜根一兩剉當歸一兩剉㣲炒訶梨勒一兩煨用皮黄連一兩去鬚㣲炒右為散毎服四錢以水一中盞煎六分去滓不計時温服地榆湯治蠱痢下血如鷄鴨肝片腹痛煩悶一名􅙈角散地榆剉􅙈角鎊黄連去鬚㣲炒栢葉㣲炒當歸剉㣲炒黄蘖去粗皮炙剉黄芩去黒心生乾地黄焙赤地利各半兩右搗篩每服三錢以水一盞煎七分去滓温服不計時粥飲調亦得黄芩散治蠱注痢下血心中煩悶腹中㽲痛黄芩一兩地榆一兩剉犀角屑一兩茜根一兩栢葉二兩㣲炒甘草一兩炙赤剉訶梨勒一兩煨用皮牛角䚡灰一兩當歸一兩剉㣲炙炒右為散每服四錢以水一中盞煎六分去滓不計時温服茜根飲治蠱痢下血如鷄鴨肝腹中疞痛難忍心中煩悶不欲飲食一名升麻散茜根升麻犀角鎊桔梗去蘆頭剉炒黄芩去黒心黄蘖去粗皮各三分地榆白蘘荷各一兩用根右為粗散每服五錢水一盞半煎七分去滓日午空心服一方酒調服茜根丸治毒痢及蠱注下血如豚肝心煩腹痛又脉或大或小浮䧟而起下血如豚肝五内切痛此因服五石湯丸逼損隂氣甚則其血自百脉經絡而來注下成蠱毒此為難治茜根洗川升麻去蘆犀角鎊地榆洗黄連去鬚當歸去蘆洗枳殻去穰麩炒白芍藥右等分為末醋糊丸梧桐子大每服五十丸空心米飲下茜根散治蠱注下血如鷄肝體熱心腹中煩悶茜根一兩剉川升麻一兩犀角屑一兩地榆一兩剉黄連一兩去鬚㣲炒黄芩一兩右為散每服四錢以水一中盞煎六分去滓不拘時温服升麻湯治蠱痢下血片臍下㽲刺痛升麻地榆茜根黄芩去黒心各一兩半犀角鎊一兩山梔子半兩右搗篩毎服五錢水一盞半入生地黄一升切薤白三莖切豉三十粒同煎八分去滓空心温服日晩再煎服治中蠱下痢日数十行巴豆十四枚去皮心出油藜蘆去蘆頭芫青去翅足炒附子炮去皮臍白礬熬枯各半兩右為末和勻以綿褁藥一大豆許内下部日三治蠱注痢血如鷄肝者心神煩躁宜服犀角屑一兩地榆三分剉蘘荷根一兩馬兠鈴根一兩右為散每服四錢水一中盞煎六分去滓不拘時温服玉連丸治脾積下痢蠱痢同木香訶子連核各半兩黄連一斤炒紫色右為細末研粳米飲糊丸桐子大每服一百丸空心食前米飲下日進一服黄蘗丸治歲時蠱痢黄蘗去粗皮黄連去鬚各一兩右為末飯飲為丸桐子大每服二十丸空心米飲下日午再服黄芩湯治蠱毒痢如鵞鴨肝腹痛不可忍黄芩去黒心黄連去鬚各半兩炒右細剉以水二盞煎一盞去滓空心日晩乗熱服冷即凝黄連散治痔漏蠱毒下痢黄連去鬚一兩白礬焼令汁盡乾薑炮附子炮裂去皮臍各三分右為細散每服一錢半温酒調下空心日午服方寸匕不止更服之日三桔梗散出聖濟總録治蠱痢下血如鷄肝疼痛桔梗去蘆頭剉炒犀角鎊各等分右為散酒服一錢日三不能自服者即灌之藥下心中煩湏臾自靜七日廼止可食猪脾以補養之治蠱注下血如鷄肝體熱心腹中煩悶出聖惠方黒豆一合毛桃膠半兩右以水一大盞煎六分去滓食前分温二服治蠱注熱毒痢痢血或如小豆汁腹痛煩悶出聖惠方用扁竹葉一兩剉以水一大盞煎六分去滓入吳鹽汁二合更煎三五沸食前分温二次服治腸蠱先下赤後下白黄沫連年不瘥兼治痢下先白後赤若先赤後白為腸蠱出聖惠方用牛膝一兩切槌碎以醇酒一升漬一宿平旦空心服之再服愈羚羊角散一名黄連丸出危氏方治下血黒如鷄肝色相似時發渇者方見本門熱痢類治男子婦人小兒大腸下血黒茶脚色或膿血如靛色所謂蠱痢者也治之有殊效又能殺五臟蠱出圓經取側栢葉焙乾為末與川廣黄連二味為汁服普濟方卷二百十
