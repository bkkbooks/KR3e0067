body:
  text: 普濟方巻二百十眀周王朱橚撰泄痢門諸痢真人養臟湯治脾胃虚弱冷熱不調臟腑受寒下痢赤白或便膿血有如魚腦裏急後重臍腹疼痛日夜無度胸膈痞滿全不思食及脱肛酒毒便血方見本門赤白痢類水煑木香丸治純下白痢及淡紅黒痢方見本門諸㵼痢類治一切痢砒霜黄丹各等分右同研細用黄蠟溶和藥末為膏旋丸如菉豆大每服三丸飯飲下小兒丸如粟米大亦飲下忌葷腥治痢因腸胃間有酒食生冷積滯而成即古方所謂滯下者用加巴感應丸十餘粒白梅煎茶或薑湯嚥下如小便少五心煩熱煎生料五苓散吞下先令大便利去積滯却服㫁下湯之類即愈治痢以罌粟古方未聞今人所用雖其法小異而皆有竒功或用數顆慢火炙黄為末米飲下或去粟用殻如上法或以殻五七枚甘草一寸半生半炙大椀水煎取半椀温温呷服蜀人山叟但用殻并去核䑕杏子各數枚焙乾為末飲下尤治噤口痢厚朴枳實湯出保命集厚朴剉一兩枳寔剉一兩訶子一兩半生半熟木香半兩黄連二錢甘草炙二錢大黄三錢右為末每服三五錢水一盞半煎一盞去滓温服太陽經動下痢為䳱溏大腸不能禁固卒然而下成小泊光色其中或有硬物欲起而又下欲子而不水小便多清此乃寒也宜温之春夏桂枝湯秋冬白术湯桂枝湯出保命集桂白术芍藥各半兩甘草二錢炙右剉每服半兩水一盞煎七分去滓温服白术湯出保命集白术芍藥各二錢乾薑半兩炮甘草二錢炙右剉為粗末水煎服之甚則去乾薑加附子三錢神效越桃散治諸下痢之後小便利而腹中虚痛不可忍者此謂隂陽交錯不和之甚也大梔子三錢髙良薑三錢右和勻服每三錢米飲或酒調下其痛立効治㵼痢治臟腑不和虚滑榖不化用蒼术湯桃花丸出保命集蒼术二兩防風一兩右剉細用水一椀煎一大盞絞清汁下桃花丸八十丸立愈如小便澁少以五苓散下桃花丸或赤石脂丸小便利則愈矣𤓰蔞散出朱氏集驗方治五色痢疾乆不愈者𤓰蔞一箇黄色者以炭火炙存性用碗葢定地上一宿出火毒右研為細末作一服用温酒調服胡大卿有一僕人患痢半年至杭州遇一道人𫝊此方而愈堅腸丸出楊氏家藏方治一切痢不問赤白膿血並主之黄連半兩去鬚龍骨赤石脂厚朴薑汁塗各三錢已上各二分烏梅肉一分甘草一分炙阿膠二錢蛤粉炒右件為末用湯浸蒸餅丸如梧桐子大每服五十丸空心米飲送下天漿散出楊氏家藏方治下痢腹中痛膿血相雜罌粟殻五箇蜜炒烏梅半箇甘草半寸乾薑一塊煨酸石榴皮一小片右作一服水二盞煎盞半温服不拘時白痢不用甘草赤痢不用乾薑赤白痢依此方服之治酒痢痢至骨立不食但飲酒有年矣與麝香一兩止葢麝能去酒毒真人養臟湯出百一選方治一切痢丁香肉荳䓻麵褁煨去麵木香當歸洗去蘆白茯苓去黒皮罌粟去蒂炙人參去蘆各一兩二錢半甘草一兩炙烏梅肉一錢半酸石榴皮陳皮去白赤芍藥黄連去鬚白芍藥厚朴去粗皮薑汁製炒乾薑炮裂阿膠蛤粉炒地榆訶子炮去核七錢半右碾粗末每服五錢水一盞半煎八分去滓通口服食前兩服滓再作一服神應丸余居士選竒方治脾胃氣虚冷痛下痢不止厚朴汁三分川當歸四分枳殻礬煆八分乾薑十分縮砂六分赤石脂五分黄連四分龍骨十分附子十分去皮臍尖訶子七分五味子七分茯苓六分人參六分右搗末醋醪丸梧桐子大空心橘皮湯下三十丸日可三服凡食粘物及冷物酒麵則㵼痢徃徃氣膨胸膈滿悶㣲痛則溏㵼或五更初則下泄旦則有此状者並宜依此方服立效止痢法廣南四時攝生方肉荳䓻一箇訶子二箇炮去核不換金散出十便良方治痢新罌粟殻一兩白痢炙赤剉蜜塗炙赤赤白痢半炙半蜜炙甘草一錢白痢炙赤痢生赤白痢半炙半生陳橘皮半兩不去穰白痢炙赤痢焙赤白痢半炙半焙右為細末每服三錢用百沸湯調去滓熱服赤痢血多用烏梅一箇入藥妙治痢連茰丸出十便良方黄連吳茱茰各二兩右如常法㨂洗焙乾黄連剉如寸㫁同一處炒候香熟分為三各用醋糊為丸梧桐子大若小兒則菉豆大患赤痢則服黄連白痢服茱茰赤白則并服赤先白後則先黄連而後茱茰赤多白少則三分黄連一分茱茰反是亦如之每服五七十粒至百粒服之以愈為度陳米飲下大率茱茰治白黄連治赤黄連用鷹爪者鹿角散出十便良方治七八十老人患積痢不㫁兼不能飲食方上黨人參四分鹿角去上皮取白處作末炒令黄秤二分右二味搗篩為散平旦粥清服方寸匕日再觀音散出十便良方治男婦小兒痢木香一塊方一寸黄連半兩右二味用水半升同煎乾去黄連只薄切末木香焙乾為末三服第一橘皮湯下第二陳米飲下第三甘草湯下此方徐君景純傳夫人患痢將死夢中觀音受此方服之遂愈治痢疾神效粟飲子出華陀中藏經丁香五枚罌粟殻五箇炙黄甘草一寸炙肉荳䓻仁一枚乳香一皂子大右㕮咀以水一碗煎半碗温服治味除濕湯出危氏方治一身盡痛重著浮黄下痢如豆汁半夏麯厚朴去粗皮薑汁炒蒼术各一兩炒藿香葉五錢陳皮炒茯苓各五錢粉草五錢官桂木香各三錢右剉散每服四錢水一盞半薑三片􅀥二枚煎服空心仍以五苓散兼服利其小水頂禮散出衞生寶鑑方治隂陽相薄真氣失守上盛下寒便痢不禁先宜固其腸胃草果子一分白术白茯苓半兩訶子一分陳皮一分木香一分濕紙褁煨白扁豆生薑自然汁煑去皮炒一分罌粟殻蜜蘸慢火炙七次一錢半右同為末每服五錢濃煎粟米飲一大盞同藥煎七分空心温服茱茰如聖丸出衞生寶鑑治脾寒臟寒腹疼腸滑下痢吳茱萸一兩去梗黄連七錢半㣲炒罌粟殻去蒂穰凈用一兩火炙訶子去核半兩川厚朴去皮半兩薑製㣲炒白芍藥半兩肉荳䓻半兩用濕紙褁火煨熟右為末醋糊為丸梧桐子大每服五十粒用米飲下如白痢乾薑湯下赤痢甘草湯下赤白痢甘草乾薑湯下俱食前服百歲丸出衞生寶鑑治一切惡痢雜下赤白及脾泄等痢漏蘭子一箇大者阿膠半兩木香半兩黄連半兩罌粟半兩乳香少許别研右除乳香外將其餘五味剉成小塊炒令焦黒色存性不令烟絶為末乳香和勻麵糊丸桐子大每服一歲一丸因其年數服之不拘時候米飲下神應丸出衞生寶鑑治禁口痢全不進飲食痢下不時罌粟殻半兩乳香四錢木香半兩煨梹榔五箇煨肉荳䓻一分麵褁煨右為末煉蜜丸梧桐子大大人每服二十丸小兒十丸煎罌粟湯下治中湯出如宜方治臟寒冷氣腹痛腸鳴下痢青黒人參乾薑白术青皮陳皮甘草各等分右㕮咀每四錢水煎服又服附子理中湯對金散出如宜方治脾泄陳皮八兩蒼木厚朴各二兩右為末薑􅀥煎加肉荳䓻四神丸出楊氏家藏方治脾胃受濕腸虚下痢頻併不止附子炮去皮臍一兩肉荳䓻麵褁二兩煨香訶子煨去核半兩乾薑炮半兩右為細末蒸􅀥肉搜和丸梧桐子大每服五十丸陳米飲下養臟湯出續易簡方治濕毒痢所下如豆羮汁心腹刺痛腰腿沉重厚朴去皮乾製肉荳䓻麵褁煨蒼术米泔浸剉炒木香橘紅各二錢赤茯苓二錢半甘草炙一錢右剉散每服四錢水一盞半薑五片􅀥一枚煎八分去滓食前温服萬應丸出續易簡方治乆挾積滯因傷生冷遂作痢疾或赤或白經乆不瘥白牽牛肉荳䓻麵褁煨㯽榔各等分右為末煉蜜丸如菉豆大每服五十丸赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下空心食前服米粉丹出同前治痢瘧及積痢巴豆去心皮膜出油粉霜碙砂硃砂各一錢砒霜研半錢右研勻黄蠟二錢溶成汁下藥攪勻菉豆大米飲下一丸未瘥再進育腸湯出楊氏家藏方治脾胃虚冷或挾風冷臍腹撮痛下痢虚滑或變膿血人參去蘆頭白术髙良薑赤石脂煆過肉桂去粗皮當歸洗焙附子炮去皮臍甘草炙厚朴去粗皮生薑汁浸炒肉荳䓻麵褁煨香右各等分為粗末每服五錢水二盞入粳米二粒同煎一盞去滓温服治痢欲投補藥必擇温通之臍如四君理中湏用木香白荳䓻茯苓肉桂厚朴之類可以散風邪分水道開胃脘治纒􅅰利閉澁此攻守之意兩全矣若虚損厥逆六脉沉絶不可拘當重補兼助氣守而不攻可也宜四順附子湯參附二建之類若厥而有痰所下或純白黒凡薑附皆可用治痢當以開胃進食為急若行止澁非惟養痾必胃管閉而不通噤口不食急矣又易簡㫁下湯罌粟殻用醋炙加烏梅得法且有四君料不致閉悶妨食本事用生薑炒治患痢疾久後分寒熱急痛出本章以艾葉和蠟并訶子焼薫神驗治患痢久後分急痛出本草以訶梨勒和臘焼薫及熱煎湯通手後洗止下痢出本草以楓香水煎服止痢出本草以楂子煨食之治下痢後腸胃肥徤人出本草以橡實殻為散及煑汁服之止痢出本草以楓栁水煎服止痢補中益氣堅筋骨通血脉起陽道出本草用陳廩米炊作乾飯食之治痢後熱渇出本草以木槿作飲服之令人得睡止痢及霍亂出本草以髙良薑煑作飲服之治痢出本草以桑葉炙令㣲乾和桑皮煎服止痢治腹痛出本草以馬齒莧可細切煑粥食之治大人小兒下痢出同前以烏賊魚骨炙令黄去皮細研成粉粥中調服食之治暴痢後氣滿不能食出同前用赤小豆煑飯一頓服之即愈治下痢臍下切痛出本草以狗肝一具洗細切米一升稀調煑粥空腹㸃三兩合吃蒜椒葱鹽醋任性止煩㫁下痢平胃氣温中長肌出本草用粳米飯及粥食之止痢出本草以五月五日取鱓魚頭骨焼灰服之治人取葛根誤得黄環吐痢不止用圡漿觧之乃愈氣痢附論夫氣痢者由表裏不足腸胃虚弱積痢之氣客於腸間臟腑不和因虚則洩故為氣痢也氣痢者由冷氣停於腸胃間致冷熱不調脾胃不和腹脇虚滿腸鳴腹痛便痢赤白名氣痢治法宜厚腸胃調冷熱補脾氣則痢當自愈方人參湯出聖濟緫録治氣痢并休息痢人參陳橘皮湯浸去白炒黄連去鬚炒赤茯苓去黒皮樗皮地榆當歸切焙五味子黄芩去黒心白术炒甘草剉炙枳殻去穰麩炒桂去粗皮大腹子剉各一兩右搗篩每服五錢水盞半薑一片棗大煎八分去滓空心頓服木香散出聖濟緫録治氣痢泄㵼心腹㽲痛木香沉香剉桂去粗皮沒藥各一分胡椒一分當歸切焙一分龍骨半兩乾薑半兩甘草炙剉一分附子炮裂去皮臍一分肉荳䓻仁一枚赤石脂半兩蜜陀僧一分右搗羅為散每服一錢米飲調下食前服烏梅丸出同前治氣痢不瘥疲劣變成冷癆痢烏梅肉炒一兩猪肝一大葉以醋煑令爛研如糊草荳䓻去皮一兩甘草炙剉一分厚朴去粗皮生薑汁炙一兩訶梨勒皮炒三分肉荳䓻去殻當歸切焙乾薑炮蓽撥桂去粗皮半兩右搗羅十味為末用猪肝煎丸梧桐子大每服二十丸米飲下陳麴湯下亦得蒼术丸出聖濟總録治氣痢瘦弱諸藥不效者蒼术厚朴去粗皮生薑汁炙黄連去鬚當歸焙乾各一兩半龍骨一兩艾葉炒三分訶梨勒皮炒一兩半吳茱茰湯洗炒十一兩乾薑炮一兩半附子炮裂去皮臍一兩右為末米飲和衆手丸桐子大每服三十丸食前生薑湯下地榆散出聖濟總録治氣痢腹脇虚滿腸鳴腹痛便下赤白地榆樗皮當歸切焙黄連去鬚炒枳殻去穰麩炒桔梗桂去粗皮陳橘皮湯浸去白炒大腹剉去皮甘草炙剉各一兩右搗篩每服五錢水盞半薑一􅀥大煎八分去滓空心服蓽撥丸出同前治脾胃虚冷兼腸間冷㵼變成氣痢蓽撥一兩一分梹榔剉一兩一分附子炮去皮臍各一兩一分阿魏三兩以水四合煎五六沸同蜜和藥訶梨勒皮蕪荑仁各二兩白术黄連去鬚各三兩枳殻去穰麩炒一兩三分右為末煉蜜丸梧桐子大每服三十丸空心生薑湯下日再漸加至四十丸陳橘皮丸出聖濟總録治氣痢年深不