body:
  text: 普濟方卷一百七十一明周王朱橚撰積聚門息賁附論凡積氣在右脇下覆大如杯者肺積也氣上賁衝息有所妨名曰息賁此本心痛傳肺肺當𫝊肝肝以春適王而不受邪復賁於肺故結為積乆不已令人洒浙寒熱喘欬發肺癰以春甲乙得之所以然者肺主氣外合於皮毛今肺氣留積故有寒熱喘欬肺癰之病方半夏湯治肺積息賁欬嗽半夏湯洗去滑切片焙乾桑根白皮炙剉細辛去苖葉前胡去蘆頭各一兩半桔梗炒甘草炙剉貝母去心柴胡去苖人參訶梨勒白术各一兩右粗搗篩每服三錢水一盞􅀥三枚擘破生姜半分拍碎煎至七分去滓服食後夜卧各一服桃仁煎丸治息賁氣右脇下結硬如杯心腹脹痛不能飲食胸膈壅悶欬嗽喘促桃仁三兩湯浸去皮尖雙仁細研以酒三升同硇砂煎成膏硇砂一兩半不夾石者細研鼈甲一兩塗酥炙令黄去裙襴川烏頭半兩去皮臍剉碎鹽拌炒令黄紫菀半兩去苖土猪牙皂莢半兩去皮塗酥炙令焦黄防葵半兩木香三分梹榔三分亁姜半兩炮裂剉右為細末入桃仁硇砂煎蜜鎔和丸如桐子大每服食前生薑湯下十五丸防己湯出聖濟總録治肺積息賁下氣防己大腹取皮去子用各一兩半郁李仁湯去皮大麻仁炒梹榔剉陳橘皮湯浸去白焙桑根白皮剉炙訶梨勒㣲煨去核各一兩甘草炙剉半兩右除郁李仁麻仁外粗搗篩再同搗勻每服三錢匕入薑片數分拍碎以水一盞煎八分去滓温服空心午時各以利為度紫苑散出聖惠方治息賁氣在右脇下結聚脹痛喘促欬嗽紫苑一兩去苖土吳茱萸半兩湯浸七遍焙乾㣲炒白术半兩鼈甲一兩塗醋炙令黄去裙襴當歸半兩桂心半兩梹榔半兩郁李仁一兩湯浸去皮㣲炒枳實半兩麩炒㣲黄右為粗散每服三錢水一盞生薑半分煎至六分去滓不拘時候温服枳實丸出聖惠方治息賁氣腹脇脹硬欬嗽見血痰粘不利枳實半兩麩炒㣲黄木香半兩梹榔半兩訶梨勒皮半兩甜葶藶半兩隔紙炒令紫色赤茯苓半兩五味子半兩甘草半兩炙㣲赤剉杏仁一兩湯浸去皮尖雙仁麩炒㣲黄右為細散每服三錢水一中盞煎六分去滓不拘時候温服大腹皮散出聖惠方治息賁氣腹脇脹滿急欬嗽坐卧不安大腹皮五枚赤茯苓一兩前胡一兩去蘆頭訶梨勒皮半兩梹榔半兩木香一兩漢防已半兩桃仁一兩湯浸去皮尖雙仁麩炒黄川大黄一兩剉碎㣲炒右為麤散每服三錢水一中盞生薑半分煎六分去滓不拘時候温服三稜丸出聖惠方治息賁氣右脇下結聚成塊喘欬胸痛嘔吐痰涎靣黄體瘦荆三稜一兩炮剉碎醋拌炒令黄川大黄二兩剉碎㣲炒附子一兩炮裂去皮臍鼈甲一兩半塗酥炙令黄去裙襴梹榔一兩訶梨皮二兩木香一兩桃仁一兩湯浸去皮雙仁麩炒㣲黄吳茱萸半兩湯浸七遍焙亁㣲黄右為細末以酒煮麵糊和搗三二百杵丸如桐子大毎服食前生薑湯下二十丸枳實木香丸治肺積息賁上氣枳實去穰麩炒二兩木香陳橘皮湯浸去白焙人參海藻水洗去鹹焙葶藶紙上炒令紫色各一兩芍藥剉丁香各三分右為末棗肉和丸如桐子大每服二十丸用炒豆煎湯下空心日午夜卧各一服漸加至三十丸梹榔散治息賁氣胸膈妨實右脇下堅急上氣欬嗽梹榔一兩赤茯苓三分赤芍藥三分石茱萸三分荆三稜三分訶梨勒皮三分郁李仁一兩湯浸去皮㣲炒青橘皮三分湯浸去白瓤焙右為麤散每服三錢水一中盞生薑半分煎六分去滓不拘時候温服牛蒡子散治息賁氣令人喘欬心腹脹滿脇下疼痛牛蒡子一兩㣲炒木香一兩當歸一兩荆三稜一兩炮剉碎吳茱萸半兩湯浸七遍焙乾㣲炒梹榔半兩川大黄一兩剉碎㣲炒鼈甲二兩塗酥炙令黄去裙襴右為麤散每服二錢温酒調下食前服生薑橘皮煎湯下亦得木香丸治息賁氣胸膈悶腹脇堅急四肢不和食少無力木香一兩鼈甲一兩半塗酥炙令黄去裙襴桂心一兩吳茱萸一兩半湯浸七遍焙亁㣲炒訶梨勒皮一兩半梹榔一兩半枳實一兩麩焙㣲黄牽牛子三兩㣲炒右為細末以酒煮麵糊和丸如桐子大每日空心温酒下三十丸息賁湯治肺之積在右脇下大如覆杯乆乆不愈洒洒寒熱氣逆喘欬發為肺癰其脉浮而毛半夏湯洗七次吳茱萸湯洗桂心各二兩半人參甘草炙桑白皮炙葶藶炒各二兩半右剉為散每服四錢水一盞半薑七片􅀥二枚煎七分去滓食前服一方無人參此病患者急炙看脉有力欬嗽而脇下痛者則以十棗湯下之却用息賁湯調理其效尤速枳實湯治肺積息賁上氣胸滿欬逆枳實去瓤麩炒木香梹榔剉甘草炙剉吴茱萸湯浸焙亁炒葶藶紙上炒令紫色各半兩杏仁湯浸去皮尖雙仁炒三分右麤搗篩毎服三錢水一盞生薑一分拍碎同煎至七分去滓温服空心食前日三桑白皮湯治肺積息賁上氣脹滿欬嗽涕唾膿血桑白皮剉麥門冬去心焙各一兩半桂去麤皮十兩半甘草炙剉半兩陳橘皮湯浸去白焙猪牙皂莢酥炙去皮各一兩右麤搗篩每服三錢水一盞入生薑半分拍碎煎至七分去滓温服空心晩食前各一芫花煎丸治息賁氣結塊在右脇下疼痛芫花一兩半醋拌炒令乾為末硇砂一兩不夾石者細研用米醋二斤同芫花末焚成膏鼈甲一兩半塗酥炙令黄去裙襴荆三稜一兩剉㣲炒青橘皮一兩湯浸去白瓤焙右為細末入芫花硇砂煎中入小蒸餅和為丸如桐子大毎服食前生薑湯下十丸皂莢丸治肺積息賁上氣皂莢二挺不蛀者酥炙去皮子剉桂去蘆皮亁薑炮貝母去心右等分搗籮為末煉蜜和丸如梧桐子大每服空心日午生薑湯下十五丸加至二十丸五靈脂丸治肺喘乆而息賁五靈脂二兩半木香半兩馬兠鈴去殻炒一分葶藶一分右為細末􅀥肉和丸如桐子大每服二十丸生薑湯下日三服脾惡濕腎惡燥如硫黄附子鍾乳煉丹之類皆剛劑用之人以取陽補接真氣則可若云補腎正所惡者古人製方益腎皆濕潤之味正補腎經也近世盛行香茸丸可補腎經亦有數方具後推氣散治右脇下大如杯乆不已令人洒淅寒熱喘嗽發腫壅始由心病傳肺肺當傳肝肝乗王而不受邪氣留於肺結而為積其脉結澁謂之息賁枳殻炒桂心各半兩甘草二錢片子薑黄半兩右為細末每服二錢薑湯調服熱酒亦得不拘時候大􅀥丸治證如前葶藶橘皮桔梗右等分為細末熟棗肉為丸如桐子大每服三十丸米飲湯下治息賁氣喘欬心膈不利出聖惠方訶梨勒皮一兩郁李仁一兩湯浸去皮㣲炒研木香一兩右為細末入郁李仁研令勻每服不計時候以生薑湯調下二錢肺之積息賁丸出試效方治右脇下覆大如杯乆不已令人洒浙寒熱喘嗽發肺癰厚朴薑製八錢黄連去鬚炒一兩三錢亁薑炮一錢半桂去皮一錢巴豆霜四分白茯苓去皮一錢半另末人參去蘆二錢桔梗一錢紫苑去苗一錢半白荳蔲一錢川烏頭炮裂去皮一錢川椒炒去汗一錢半荆三稜炮一錢天門冬一錢陳皮一錢青皮半分右件除巴豆霜茯苓旋入外為末煉蜜丸如梧桐子大每服二丸一日加一丸二日加二丸漸加至大便溏再從二丸加服煎淡生薑湯下食逺週而復始積減大半止服秋冬加厚朴半兩通前稱一兩三錢減黄連七分只用六分加減息賁丸出試效方仲夏合其積為病寒熱喘嗽氣上奔脉澁失精又云血氣滯則短氣血凝澁則寒熱則氣分寒血分熱治法宜益元氣洩隂火滯氣削其堅也川烏頭一錢亁薑一錢半人參二錢厚朴八分黄連一兩三錢紫苑一錢巴豆霜四分桂枝三錢橘皮一錢半青皮七分川椒炒去汗一錢半紅花少許茯苓一錢半桔梗一錢白荳蔲一錢荆三稜一錢半天門冬去心一錢半右件為細末湯浸蒸餅為丸如梧桐子大初服二丸一日加一丸二日加二丸加至大便㣲溏利為度再從二丸加服煎生薑湯送下食前忌酒濕麵五辛大料熱物之類及生冷物賁豚附論夫腎之積名曰奔豚發於小腹上至心下若豚走之狀上下無時乆不愈令人喘逆發骨痿少氣以夏丙子日得之何以言之脾病傳腎腎以傳心心以夏適王王者不受邪腎欲復脾脾不肯受故留結為積故知奔豚以夏得之也奔豚氣者是腎之積也起於驚恐憂思所生若驚恐則傷神心藏神也憂思則傷志腎藏志也神志氣積於腎而氣上下遊走如豚之奔故曰奔豚其氣乗心若心中踊踊如車所驚如人所恐五臟不定食飲輙嘔氣滿胸中狂癡不定妄言妄見此驚恐奔豚之狀也若氣滿支心心下悶亂不欲聞人聲休作有時乍差乍劇翕翕短氣手足厥逆内填結痛温温欲嘔此憂思奔豚之狀也診其脉來觸祝觸祝者病奔豚也腎脉微急沉厥者奔豚也其足乃收不得前後皆從驚得之腎間有膿故也外臺祕要云師曰病如奔豚者氣從小腹起上衝喉咽發作欲死復還生皆從驚恐得之腎間有膿故也師曰病有奔豚有吐膿有驚怖者火邪此四部病者皆從驚恐得之火邪者桂枝加龍骨牡蠣湯主之若新亡財為縣官所捕迫逐驚恐者療用鴟頭鈆􅀈千金方有飛鴟鈆丹丸主癲癎瘈瘲此意相近鈆􅀈解為馬排木一云即羚羊角所言奔豚者病人氣息逆喘迫上如豚奔走之狀奔豚湯主之方治奔豚氣出直指方木饅豆亁者四兩剉先以皮入銚子炒次下豆并炒黄色茴香二兩炒右為細末每服二錢空心酒調服沉香石斛湯出聖濟總録治腎臟積冷奔豚氣攻少腹疼痛上衝心胸脇沉香剉石斛去根陳麯炒各一兩人参赤茯苓去黒皮五味子㣲炒巴㦸天去心炒桂去粗皮白术芎藭各三分木香肉荳蔲仁各半兩右粗搗篩每服三錢水一盞薑三片棗三枚擘煎至六分去滓食前熱服七氣湯療憂勞寒熱愁思及食飲隔塞虛勞内傷五臟欲絶奔氣不能還下心中悸動不安桔梗二兩人參三兩一方二兩芍藥三兩茱萸七合枳實五枚炙黄芩二兩一方三兩亁薑三兩一方二兩桂心三兩一方二兩亁地黄三兩一方二兩橘皮三兩甘草三兩一方二兩炙半夏三兩洗一方一斤右以水一斗煮取三升去滓分三服忌海藻菘菜羊肉􅄳生葱猪肉蕪荑等千金無桂心橘皮桔梗有厚朴栝蔞蜀椒木香硫黄丸出聖惠方治腎積頻發小腹急脹疼痛唇口青黒木香硫黄研青橘湯浸去白焙亁薑炮桂去粗皮沉香剉肉荳䓻去殻蘹香子炒附子炮裂去皮臍銅青研梹榔剉各一兩右將九味搗籮為末與别研二味和勻搗研糯米飯為丸如梧桐子大每十丸蘹香酒下加至二十丸一方無沉香木香梹榔散出聖濟總録治積病不散結伏奔豚發即上衝心胸令人喘逆骨痿少氣木香梹榔煨剉沉香剉磁石醋洗煅訶黎勒去核蘹香子炒芎藭白芷炒牡蠣煅各半兩桂去粗皮陳橘皮湯浸去白焙各三分右搗籮為散每服二錢炒生薑鹽湯調下木香湯出聖濟總録治一切風及腎臟奔豚氣上衝心胸悶亂木香一兩青橘皮湯浸去白焙白芷炒蘹香子炒沉香剉桂去粗皮蓬莪术焙炒杉木節各半兩枳殻去瓤麩炒木𤓰焙各三兩右搗籮為散每服二錢炒生薑鹽湯下神效丸治疝氣奔豚嬰孩溺祕疝氣因何得邪風在腎經流傳并血聚如此漸成形冷氣結在臟因兹小腹疼本經無别法踈利藥通靈芫花半兩醋浸炒木香梹榔三稜各半兩炒茯苓青皮全蝎附子炮硇砂桂各二錢半右將硇砂用水浸磁盞内沉去泥土留湯平頭頓成膏子糠醋打糊為丸如菉豆大每服三十丸空心温水送下沉香丸出聖惠方治奔豚氣小腹積聚疼痛或時上攻心胸壅悶沉香半兩阿魏半兩以少麵和鎔作餅子炙令黄木香一分桃仁半兩湯浸去皮尖雙仁麩炒㣲黄吳茱萸一兩湯浸七遍㥉亁㣲炒梹榔半兩蘹香子半兩青橘皮一分湯浸去白瓤焙蛜􅖉一兩生用硇砂三兩不夾石者細研以湯一盞化澄去滓取清内銀器中煎成霜研右件藥為末入硇砂令勻以酒煮麵糊和丸如梧桐子大每服食前以薑鹽湯下二十丸蘹香子丸出聖濟總録治腎臟乆積氣膀胱虚脹上攻膨滿疼痛蘹香子三兩㣲炒為末水米醋二斤熬如餳附子炮裂去皮臍一兩青橘皮湯浸去白焙木香狼毒炒當歸切各焙三分阿魏研以酒一斤煎取半硇砂一兩半研沸湯化澄煎取霜入阿魏煎中同熬如餳入蘹香煎攪勻自然銅煨醋淬研各一兩半右除煎研外搗籮為末同入煎内和搗丸如梧桐子大每服十五丸至二十丸空心温酒下木香賺氣丸出醫學切問方治奔豚痃癖心氣腹滿兩脇刺痛牽引腰背屈伸不利茴香一兩炒木香梹榔香附子各一兩三稜莪术各三錢蓽澄茄良薑亦用巴豆炒青橘皮半兩巴豆五枚炒去巴豆右為粗末每服三錢水一盞煎至七分空心熱服奔豚湯療虗勞五臟氣乏損遊氣歸上上走時若羣㹠相逐撞撞時氣來便如作驚夣精光竭不澤隂痿上引小腹疼痛靣乍熱赤色喜怒無常耳聾目視無精光葛根八兩亁煮生李根切半夏洗各一斤人参芍藥各三兩當歸甘草炙各三兩桂心五兩生薑二斤右以水二斗煮得五升温服八合日三不知少増至一升日三忌羊肉餳生葱海藻菘菜等賁㹠茯苓湯療虚氣五臟不足寒氣厥逆腹脹滿賁氣走衝心膈發作氣欲絶不識人氣力羸瘦小腹起騰踊如㹠子走上走下馳往馳來寒熱拘引隂氣手足逆冷或煩熱茯苓四兩甘草炙生葛八兩當歸芎藭各二兩生薑五兩人参李根白皮切半夏湯浸斤各一右切以水一斗二升煮取五升服一升日三夜二忌羊肉餳海藻菘菜酢等物賁㹠湯出指南方療賁氣上衝胸腹痛往來寒熱甘草炙芎藭當歸黄芩各二兩芍藥三兩半夏湯洗生薑各四兩生葛五分甘李根白皮斤切一右以水二斗煮取五升去滓温服一升日三夜二服忌海藻菘菜羊肉餳等甘李根散出聖惠方賁㹠氣臍腹脹痛翕翕短氣發作有時四肢疼痛甘李根二兩剉吳茱萸半兩湯浸七遍焙亁㣲炒半夏一兩湯浸七遍人参一兩去蘆頭附子一兩炮去皮臍桂心一兩當歸一兩剉㣲炒亁薑半兩炮剉梹榔一兩右為粗散每服三錢水一中盞煎至六分去滓不拘時候温酒調下二錢木香湯治積氣不散乆脹于臍腹間發似豚狀賁上衝心木香桂去粗皮各三兩赤茯苓去黒皮梹榔甘草炙半兩桑根白皮剉各一兩半陳橘皮湯浸去白焙紫蘇莖葉一兩右粗搗篩每服三錢水一盞入生薑半塊􅀥一枚拍破煎至七分去滓温服空心日午近晩各一服李根皮湯治賁豚氣衝心吸吸短氣發作有時李根白皮剉焙八兩半夏湯洗七遍焙七兩亁薑炮桂去粗皮各四兩赤茯苓去黑皮人参甘草炙各二兩附子一兩炮裂去皮臍右㕮咀如麻豆大每服五錢水一盞半煎至八分去滓温服郁李仁丸治賁豚氣從小腹奔衝上心昏亂嘔吐痛甚木香一兩郁李仁去皮生用三兩沉香剉梹榔剉桂去粗皮青橘皮去白焙附子炮裂去皮臍蘹香子炒各一兩右為末煉蜜為丸如梧桐子大蘹香子或薄荷酒下二十丸一日三服臍下有塊一月永除木香丸治賁豚氣上衝胸膈壓氣木香丁香白荳蔲去皮肉荳蔲去殻兩各半沉香三分吳茱萸醋浸一宿炒令黄色各半兩麝香别研二分青橘皮浸去白焙一分右除麝香外搗籮為末入麝香研勻用硇砂煎獖猪膽汁和丸如梧桐子大每服温酒下二丸奔豚湯治從小腹衝心胸咽喉發病如㹠奔狀上下無時乆不治病喘逆發則欲死由脾病傳腎腎當傳心心乗王而不受邪氣留於腎而為痺積其脉沉結謂之賁豚甘郁李根皮亁薑各一兩一分當歸川芎甘草黄芩各二兩半夏炮四兩右剉為散每服四錢水一盞半薑五片煎至七分去滓服一方用亁葛無亁薑茴香金鈴丸治奔豚氣金鈴子一兩每箇剉作四片用殭蠶半兩去絲嘴同炒令香熟去殭蠶不必用茴香微炒馬藺花吳茱萸湯洗七次炒令香熟食茱萸酒浸炒令香熟山茱萸青皮陳皮已上各一兩右為細末酒糊丸梧桐子大每服三五十丸温酒鹽湯下食前服醫學發明名茴香練實丸有芫花一兩醋炒糊丸量虛實加減以利為度療奔豚氣從下上者湯方甘李根白皮切五兩生葛五兩半夏五兩洗黄芩二兩桂心二兩芍藥三兩人参二兩生薑五兩右以水一斗二升煮取五升去滓温服日三服夜二服忌羊肉餳生葱奔豚湯療手足逆冷胸滿氣促從臍左右起欝冐者甘草四兩炙李根白皮切葛根各一斤黄芩三兩桂心栝蔞人参各三兩芎藭一兩右以水一斗五升煮取五升去滓温服一升日三夜二忌海藻菘菜生葱赤茯苓散治奔豚氣從小腹起上至心下妨脹壅悶胸中短氣坐卧不安一方七氣湯赤茯苓一兩半大腹皮半兩剉梹榔半兩桂心一兩髙良薑半兩剉訶黎勒皮一兩吳茱萸半兩湯浸七遍焙亁㣲炒牽牛子一兩微炒右為粗散每服三錢水一中盞煎至六分去滓不拘時候稍熱服㣲利兩三行為度一方無梹榔桃仁丸治腎虛積氣桃仁湯浸去皮尖雙仁炒二兩以温酒二升煎成膏木香去粗皮青橘皮湯浸去白焙蘹香子炒各半兩亁薑炮一分梹榔剉分右搗籮六味為末入桃仁煎丸如梧桐子大每服十五丸至二十丸空心温酒下七寳丸出聖濟總録治奔豚氣上衝脇肋㽲痛丁香沉香剉硇砂湯浸白攄澄入陳麯同煎成膏丸諸藥各半兩蒺藜子炒去角木香各三兩附子炮製去兩皮臍一麝香一分研右除煎外搗研為末用前煎和丸如梧桐子大每服十丸炒生薑酒或炒生薑黒豆小便下桃仁散出聖惠方治奔豚氣上攻心胸喘悶脹滿桃仁一兩湯浸去皮尖雙仁麩炒黄研入牽牛子一兩㣲炒梹榔半兩青橘皮半兩湯浸去白瓤焙蘹香子一兩㣲炒木香半兩郁李仁一兩湯浸去皮㣲炒右為散研入桃仁郁李仁令勻每服不拘時候温酒調下二錢硇砂煎丸出聖惠方治奔豚氣在小腹積聚成塊發歇疼痛硇砂三兩不夾石者細研以酒醋各一斤慢火熬令成膏附子一兩炮剉去皮臍桃仁一兩湯浸去皮尖雙仁麩炒㣲黄研入吴茱萸半兩湯浸七遍焙亁㣲炒防葵三分剉碎醋拌炒令黄木香三分梹榔三分右為細末入桃仁令匀硇砂煎中入少蒸餅和丸梧桐子大每服食前以温酒下十五丸梹榔丸出聖濟總録治腎積氣賁脉從小腹上衝心昏亂嘔吐疼痛梹榔一兩半煨半生木香㣲炒半兩吳茱萸湯洗焙安息香研各一分桂去粗皮青橘皮去白麩炒各半兩右為細末以猪膽二十枚水煎如餳和前六味末搗二千下丸如小豆大每服空心嚼破七丸煖酒下天雄丸出聖濟總録治奔豚氣上下攻走疼痛天雄生去皮臍一兩桃仁去皮雙仁炒㣲黄蘹香子炒桂去粗皮蜀椒去目汗合口炒出汗亁蠍炒各半兩右為末用狗裏外腎并膽細切就器中以無灰酒一斤煎成膏加藥末為丸如梧桐子大每服二十丸空心生薑鹽湯下木香丸出聖濟總録治賁豚氣臍腹左右堅硬横連如臂若弓弦急痛木香鼈甲去裙襴醋炙訶黎勒皮桂去粗皮各二兩吳茱萸湯浸焙炒一兩半牽牛子二兩炒右為末煉蜜丸如梧桐子大每服三十丸温酒下加至四十丸苦練丸出聖濟總録治奔豚及小腹痛不可忍者苦練茴香各一兩黒附子一兩炮去皮臍右用酒三斤煮酒盡為度曝亁或隂亁搗為細末每一兩藥末入全蝎十八個𤣥胡五錢丁香十五個共為末酒糊為丸如梧桐子大每服百丸空心酒下如痛甚煎當歸入酒大效奔氣湯一名茱萸湯出千金方療卒厥逆上氣氣入兩脇心下痛滿淹淹欲絶此謂奔豚病從卒驚憂怖得之氣從下上上衝心胸臍間築築發動有時不療殺人甘草炙人参各三兩吳茱萸半夏洗各一斤生薑一斤桂心三兩右切以水一斗煮取三升分三服此藥湏預蓄得病便急合服忌海藻菘菜生葱羊肉千金方桂心五兩甘草三兩治奔豚氣在心胸逆滿悶亂出聖惠方半夏二兩湯浸七次去滑桂心一兩半人参一兩去蘆頭吳茱萸半兩湯浸七次焙亁㣲炒梹榔一兩甘草半兩炙㣲赤剉右為散每服二錢水一中盞煎至六分去滓不拘時候稍熱服蘹香梹榔散出聖濟總録治奔豚氣成塊上衝腹脇滿痛蘹香子炒梹榔剉荆三稜煨剉木香一分青橘皮湯浸切鹽炒去白各半兩右搗籮為散每服二錢熱湯調服不拘時撞氣丸出聖濟總録治腎藏氣發攻心動築人心腹面黒悶欲絶及諸氣奔豚喘甚婦人傷冷血氣發攻心等症急用此鉛二兩赤石脂為末二兩木香為末二兩麝香研一兩右將鉛於銚子内慢火炒令亁入赤石脂末急手炒轉莫令烟起以水㣲噴之慢火再炒令亁傾于凈地坑子内以盞子覆之候冷取出細研如麵次入諸藥相和研之以粟米飲丸如鷄頭每服用二丸研破熱酒浸之頓服或下氣或通轉即愈如祕不通每一丸入𤣥明粉半兩如氣滿胸膈服藥皆吐即以炒豆熨令氣下便服此藥無不騐食氣湯出百一選方散寒氣亦治奔㹠茴香炒丁香各半兩良薑三兩麻油炒甘草三錢炙白荳䓻仁二錢右為細末每服二錢入鹽少許沸湯調下食前服療卒傷損食下則覺胸膈痛慄然水將下生李根一兩細剉麥門冬一斤去皮人参桂心甘草炙各二兩右㕮咀以水一斗煮取三升分三服忌海藻菘菜生葱治奔豚氣逆上衝心滿悶臍腹虛脹出聖惠方梹榔一兩訶黎勒皮一兩木香一兩吳茱萸三分湯七遍焙亁㣲炒牽牛子二兩㣲炒右為細散每服一錢以温酒一合童子小便一合相入和調下不拘時候服梹榔散出聖濟總録治奔豚氣衝心滿悶梹榔剉訶黎勒皮煨去核各二兩牽牛子㣲炒三兩吳茱萸陳者湯洗焙亁炒一兩半右搗籮為散每服一錢童子小便半盞空心調服不過三服效如患隂陽二毒傷寒及脚氣亦可服四味丸出聖濟總録治乆積奔豚氣時攻膀胱切痛蜀椒去目及閉口炒出汗蘹香子炒附子炮裂去皮臍肉蓯蓉酒浸切焙各一兩右為末煉蜜丸如梧桐子大每服十五丸空心温酒下磁石散出聖濟總録治奔豚冷氣上衝昏亂四肢輭弱不收磁石燒醋淬研肉荳蔲去殻木香梹榔剉各一兩右搗研為散每服三錢匕以生葱一莖細切熱酒投調下牡蠣賁豚湯療賁豚氣從小腹起憧胸手足逆冷牡蠣三兩熬桂心八兩李根白皮切一斤甘草三兩炙右切以水一斗七升煮取李根皮得七升去滓内餘藥再煮取三升分五服日三夜再忌生葱海藻菘菜療手足逆冷胸滿氣促從臍左右起欝冐者伏出鷄頭卵殻中白皮黎木灰麻黄去節紫苑各等分右搗篩作丸散隨宜酒服十丸如梧桐子大者方寸療三十年喉中結氣欬逆立瘥亦可水煮為湯以意分之吳茱萸飲出聖濟總録治腎臟乆積成奔豚氣小腹急疼發即不識人吳茱萸湯洗焙亁桃仁湯浸去皮尖雙仁各一分黒豆半兩右同炒以黒豆熱為度同童子小便一升浸少頃煎至六分去滓分三服空心日午夜卧各一三神煎出聖濟總録治賁豚氣上衝心腹桃仁去皮尖雙仁四兩湯浸研細取汁三升荆三稜煨剉二兩鼈甲去裙襴醋炙三分右搗二味為末先煎桃仁汁至二升次下藥末不住手攪良乆更入好醋一斤同煎如餳以瓷合收每服半匙空心好酒下茯苓桂甘湯出直指方治臍下悸動欬而奔豚茯苓二兩甘草半兩桂心一兩右剉細每服四錢􅀥一枚用甘泉水一盞半煎一盞温服治奔豚氣上下衝走悶亂面青出聖惠方甘李根皮二兩剉吳茱萸二兩湯浸七遍焙亁㣲炒生薑二兩炒亁右為粗散每服一錢水一中盞煎至六分去滓不拘時候熱服治奔豚氣出百遍方訶黎勒梹榔鷄心者各四個右兩箇半炮帶性兩箇半只生用並㕮咀分四服用水二大盞入新紫蘇三十葉苦陳者添十葉煎至八分遇發時半飢半飽服急時不拘時候沉香湯出聖濟總録治腎積化氣沉香黄耆人参各三分蘹香子炒附子炮裂去皮臍甘草木香桂去粗皮烏藥石斛去根五味子炒巴㦸天去心陳橘皮湯浸去白焙髙良薑各半兩牛膝酒浸切焙半分右剉碎麻豆大每服三錢水一中生薑一分拍碎煎七分去滓温服空心日午前各一服棗子酒出仁存方治奔豚氣右用斑蝥一枚去足頭翅好肥􅀥一枚擘開去核安斑蝥在内用濕紙包文武灰中煨熱去斑蝥不用將􅀥子細嚼熱酒送下空心服之治奔豚氣一名茱萸平胃散出百一選方右以醋酒各三分盞煎吳茱萸十餘粒候三兩沸用調平胃散三錢空心服此藥有功效但不能去根治奔豚氣上下衝走悶亂面青出聖惠方梹榔三枚搗籮為末生薑半合右件藥以童子小便一大盞㣲燒過入前藥二味攪令勻分為三服如人行五六里進一服湏臾下利為效桂枝加桂湯出指南方治奔豚氣官桂五分芍藥三分甘草二兩右為粗末每服五錢水二盞薑五片􅀥一枚煎一盞去滓服腎之積奔豚丸出試效方發於小腹上至心下若豚狀或下或上無時乆不已令人喘逆骨痿少氣及治男子内結七疝女人瘕聚帶下厚朴姜製七錢黄連去鬚炒五錢白茯苓去皮仝木二錢川烏頭炮半錢澤㵼二錢苦練酒煮二錢胡𤣥索一錢半全蝎一錢附子去皮二錢巴豆霜四分菖蒲二錢獨活一錢丁香半分肉桂去皮二分右除巴豆霜茯苓另為末旋入外為細末煉蜜為丸如梧桐子大初服二丸一日加一丸二日加二丸漸至大便溏再從二丸服淡鹽湯送下食前週而復始病減大半勿服秋冬加厚朴半兩通前一兩二錢如積勢堅大先服前藥不減于一料中加燒存性牡蠣三錢㿗疝帶下病勿加解鈴丸出楊氏家藏治奔豚氣疼痛手足拳縮不可忍者茴香一兩用青鹽一兩研細同炒炒和鹽用蝎稍一分去毒炒蓬莪术用紙數重褁油内蘸燈上燒過剉碎一兩右件為細末酒煮麫糊為丸如梧桐子大每服三十丸温酒鹽湯送下空心食前服奔豚湯出千金方治氣奔急欲絶者吳茱萸一升石膏人参半夏芎藭各三分桂心芍藥生薑各四分生葛根茯苓各十分當歸四分李根皮一斤右十二味㕮咀以水七升清酒八升煮取三升分三服木香散出聖惠方治奔豚氣上衝心胸悶亂臍腹脹痛飲食轉嘔木香一兩青橘皮半兩湯浸去白瓤焙梹榔一兩白术半兩沉香一兩蘹香子半兩木𤓰三分焙亁桂心一兩蓬莪茂半兩杉木節半兩右件藥搗細羅為散每服不計時候以温酒調下二錢治奔豚伏梁氣及内外腎釣并藿亂轉筋以椒葉和艾及葱研以醋湯拌罾並得一方以椒葉搗傅外煎水洗脚息積附論内經謂病脇下滿氣逆二三歳不已病名曰息積夫消息者隂陽之更事也今氣聚脇下息而不消積而不散故滿逆而為病然氣不在胃故不妨于食特害于氣而已其法不可炙刺宜為導引服藥藥不能獨治者盖導引能行積氣藥力亦藉導引而行故也導引法療厥逆上氣氣攻兩脇心下痛滿右以兩手拇指壓無名指本節作拳按捭趺坐扣齒三十六屏氣二十一息嚥氣三口再屏息再嚥如是三則以氣通為效遇子午卯酉時則行然按摩導引之法甚多隨意行之皆不必拘此法方化氣湯出三因方治息積癖于腹脇之下偏脹膨滿不妨飲食鐵藥不能取轉及治心脾疼痛嘔吐酸水丈夫小膓氣婦人脾血氣一切氣逆胷膈噎悶縮砂仁桂心木香各一分甘草炙茴香炒丁香皮青皮炒陳皮生亁薑蓬术炮各半兩胡椒沉香各一錢一字右為末每服二錢薑蘇鹽湯調下婦人醋湯調下桔梗丸治息積脇下氣逆妨悶歳乆不已桔梗剉碎枳實麩炒鼈甲去裙襴醋炙人参當歸切焙白术亁薑桂去粗皮吳茱萸湯洗焙亁炒甘草炙各三分大麥蘖炒一兩右搗籮為末煉蜜和丸如梧桐子大每服二十丸温酒下日再服漸加至三十丸沉香丸治息積脇下氣逆妨悶喘息不便呼吸引痛沉香剉桂去粗皮梹榔煨剉各二兩人参訶黎勒皮青橘皮湯浸去白焙白术荆三稜煨剉木香各三兩右九味搗籮為末煉蜜和丸如梧桐子大每服二十丸橘皮湯下漸加至三十丸每日二服白术丸出宣明論治息積脇下妨悶喘息氣逆呼吸引痛不已白术枳實麵炒桂去粗皮各一兩半人参二兩桔梗剉炒陳橘皮湯浸去白焙甘草炙一兩右搗籮為末煉蜜和丸如梧桐子大每服二十丸温酒下不拘時日三服赤茯苓湯治息積脇下氣逆滿悶妨脹赤茯苓去黒皮一兩半大腹剉半兩髙良薑一兩吴茱萸湯洗七次焙亁炒三分訶黎勒皮煨去核陳橘皮湯浸去白焙各一兩半右粗搗篩每服三錢匕水一盞煎至七分去滓空心温腹日晚再服理氣丸出仁存方治脇下滿氣逆不妨于食連年不已由風寒之邪客于衞氣伏留不散聚于膜外所以不妨于食謂之息積由出入之息以感疾也橘紅一兩桔梗桂心梹榔各半兩木香杏仁去皮尖各一分右為末煉蜜丸如梧桐子大每服薑湯下二十丸未知加至三十丸梹榔散治息積脇下氣逆滿悶梹榔剉訶黎勒煨去核各二兩陳橘皮浸去白焙三分吳茱萸陳者淘七遍焙亁炒一兩半右麤搗籮每服五錢匕水一盞半煎至八分去滓温服空腹日二服磨積丸出三因方治腸胃因虚氣癖于肓膜之外流于季脇氣逆息難竭日頻年醫所不治乆則榮衞停凝一旦敗濁潰為癰膿多致不救胡椒一百五十粒木香一分全蝎十枚去毒一用蝎尾右為末粟米飯丸如菉豆大服十五日橘皮湯下陳橘皮湯治息積脇下氣逆滿悶陳橘皮湯浸去白焙亁吳茱萸陳者水淘七次炒亁各一兩半右麤搗篩每服三錢匕水一盞入鹽少許煎七分不拘時去滓温服積聚心腹脹滿附論夫臟腑不和則血氣留滯而成積聚藴結氣不宣通與臟氣相傳故令人心腹脹悶煩滿短氣若為寒邪所并則傳于腑隂陽相擊而致心腹疼痛甚則泄利也方木香三稜丸治胸膈痞悶腹脹滿脇肋痛食飲遲化四肢困倦嘔逆惡心口苦無味積滯冷物不思飲食癥瘕疣癖堅硬氣塊並宜服之小兒傷食服之其效如神木香丁香砂仁紅豆薑屑炒甘松水洗良薑厚朴