皮塗生薑汁炙令香熟右為細末煉蜜和搗三二百杵如梧桐子大每服於食温酒送下二十丸肉荳䓻散出聖濟總録治積心腹脹滿宿食不化氣刺㽲痛泄㵼善噫吞酸食欲嘔吐手足逆冷白荳蔲去皮三分桂去粗皮丁香附子炮裂去皮臍各半兩髙良薑陳橘皮去白焙炒木香甘草肉荳蔲去殻各一分人参半兩枳殻去穰麸炒半兩右搗籮為散每服二錢煎木𤓰生薑湯調下荆三稜煎湯出聖濟總録治腑臟不和氣血留滯積聚痞滿心腹妨悶食物減少煩悶短氣荆三稜煨剉大腹連皮子剉延胡索天雄炮裂去皮臍芎藭白术各一兩半桃仁湯浸去皮尖枚雙仁炒三十桂去粗皮當歸切焙硝石各一兩郁李仁湯浸去皮一兩一分右㕮咀如麻豆大每服四錢匕水一盞半入生薑二片煎七分去滓温服開結導飲丸出拔粹方治飲食不消心下痞悶陳皮白术澤㵼茯苓炒麯麥蘖麵半夏製各一兩亁生薑半兩枳實炒一兩半青皮半兩如有積塊加巴豆霜一錢半右為末湯浸蒸餅為丸桐子大每服三五十丸至七十丸温水下食逺服沉香降氣丹出儒門事親言治一切氣聚胸膈脹滿不思飲食沉香木香縮砂仁白荳䓻仁青皮去白陳皮去白廣茂煨枳實麸炒已上各一兩蘿蔔子另末一兩大黄二兩炒黒牽牛末二兩右為末生薑汁浸蒸餅為丸如梧桐子大毎服三十丸橘皮湯下妙效丸出儒門事親書治積聚脹滿小腹疼痛荆三稜一兩炮川烏四錢去皮臍大黄一兩已上同為細末好醋半升熬膏神麯麥蘖已上各一兩亁薑二錢炒裂用巴豆兩個去皮心出油半夏半兩茴香一兩炒香官桂牽牛二兩揀净右為細末用膏丸如小豆大每服生薑湯下十丸至十五丸温涼水亦可以意加减以和為度木香亁漆丸出聖濟總録治積聚心腹脹滿利胸膈散滯氣消宿食木香半兩亁漆三分炒出烟肉荳蔲去殻荆三稜煨桂去粗皮各一兩青橘皮去白焙湯浸陳橘皮湯浸去白焙補骨脂炒各半兩牽牛子炒一兩梹榔剉半兩右為末酒煮麵糊丸如梧桐子大毎服十丸生薑湯下早晩食後服金翼丸出聖濟總録治積聚不消心腹脹滿沉香木香青橘皮湯浸去白焙芫花醋炒焦色荆三稜煨剉五靈脂各半兩亁薑炒煙出各一兩寒食麵炒三分墨燒研一分右為末每稱藥末一兩用去皮心膜巴豆仁稱一錢入淨臼搗極細方入藥末再搗勻用硇砂末半錢新汲水浸化旋入臼内搗千百下候硬軟得所丸如麻豆大毎服三錢食後臨卧熱水下心胸痞悶不快酒甘草湯下化氣丸治榮衞壅滯流傳臟腑脹滿飲食不消腹疼不止紫蘇子研炒一兩亁薑炮梹榔剉萊菔子研炒蕪荑炒各半兩青木香訶黎勒煨去核青橘皮湯浸去白草荳蔲去皮三分甘草炙剉三分右為末以麵作糊和丸如梧桐子大每服二十丸生薑鹽酒下木香枳實丸治濕飲停積胸膈痞悶消痰快氣宿食遲化木香枳實麩炒亁生薑一兩赤茯苓去皮青皮去白半夏湯洗七次縮砂仁白术澤㵼梹榔各二兩右為細末水煮麵糊為丸如桐子大每服七八十丸温姜湯送下連翹丸治男子脾胃不和氣滯積聚心腹脹悶亁嘔醋心飲食不下胸膈噎塞脇肋疼痛酒積靣黄四肢虗腫行歩不能但是脾胃諸疾並宜服之連翹洗陳皮各二百四十兩青皮洗蓬莪茂炮肉桂去粗皮不見火好墨煆一百六十兩肉荳蔲三十五兩梹榔八十兩牽牛子二百二十四兩煨三稜炮二百四十九兩右為末麵糊為丸如梧桐子大每服三十丸生薑湯下乆患赤白痢及大腸風秘脾毒㵼血黄連煎湯下婦人諸疾薑醋湯下不拘時候孕婦莫服硇砂丸治積聚不散心腹脹滿嘔吐酸水惡聞食氣臟腑不調或祕或泄硇砂一兩以醋一盞半同研化入麵一匙煮成糊烏梅去核炒三兩巴豆霜一錢匕没藥研蓬莪茂炒令烟出各半兩木香半兩右搗研八味為末令勻以硇砂糊丸如菉豆大毎二丸至三丸煎丁香烏梅湯下食後服更量虗實加减荆三稜散治積聚心腹脹滿醋心嘔吐冷痰不思飲食荆三稜煨剉蓬莪茂煨剉各二兩益智去皮炒縮砂仁梹榔剉青橘皮湯浸去白焙薑黄各半兩丁香一兩右搗籮為散毎服二錢沸湯㸃服不拘時候砂香丸治虛實積潮熱心腹脹滿疼痛丹砂研一兩牛黄研龍腦研麝香研各一分金薄十四片松霜膩粉各一錢蠟二兩巴豆去皮心一百二十粒肥者研右研細末如彈丸大量虛實加减夜半後龍腦漿水下虛藏即丸如小豆大每服三丸龍腦米飲下疾堅者加至十丸皆以針刺作數孔以行藥力小兒取積丸如菉豆大每服三丸又治小兒吐逆米飲下沉香散治心腹滿悶胸脇氣壅作痛沉香剉青木香剉陳橘皮湯浸去白焙各一兩郁李仁湯浸去皮别研大黄煨剉各一兩桂去粗皮半兩枳殻去瓤麩炒梹榔半生半熟訶黎勒皮各三兩右搗籮為散每服二錢炒生薑湯酒調下香桂湯治積聚心腹脹滿痞塞不通大膓結燥腰腹㽲痛面青口亁桂去粗皮陳橘皮去白焙梹榔生剉當歸切焙甘草炙剉木香芍藥枳殻去瓤麩炒大黄剉炒兩各半右粗搗篩毎服五錢水一盞半煎至八分去滓食後温服十味五積丸治五積氣嘔吐酸水心腹脹悶不思飲食沉香剉青橘皮去白焙荆三稜煨剉甘松各半兩薑黄木香甘遂炒芫花醋炒焦大㦸炒各一分牽牛子炒一兩右為末湯浸炊餅和丸如梧桐子大每服七丸食後臨卧橘皮湯下加至十丸治小腹堅大如盤胸中脹滿食不消化婦人瘦瘠者方右暖水服髮灰一方寸匕日再并炙肋端又方右飲服上好麴末服方寸匕日三又炙三焦腧隨年壯瘥治諸積膨脹滿痞塞不通等病右用小黄黒豆二分温水浸去皮􅝛黄芫花一分醋炒黄色共研細滴水為丸如菉豆大每服十五丸更自量加减要取㵼積滯可用温熱水送下不欲㵼只用冷水送下丁香丸一名丁香勻氣丸治積聚留結心腹脹滿胸膈痞悶宿食不消丁香木香沉香剉安息香乳香凈綿裹用沸湯急滚過研硇砂丹砂肉荳蔲去殻桂去粗皮荆三稜煨剉當歸切焙陳橘皮去白焙梹榔剉蓽澄茄各一兩附子炮裂去皮臍一分半巴豆十粒去皮心膜炒研如膏右先將安息香硇砂乳香三味細研用少許酒浸良乆别研巴豆砂并十一味搗籮為末合研令勻用前三味酒煮麵糊丸如麻子大常服五丸至七丸熱水下若氣痛甚即加十丸生薑湯下亦得一方無丹砂亁漆丸出聖惠方治積聚氣心腹堅脹飲食減少面色萎黄肌體羸瘦亁漆一兩搗碎炒令煙出鼈甲一兩塗酥炙令黄去裙襴訶黎勒皮一兩當歸一兩剉㣲炒附子一兩炮裂去皮臍木香三分白术一兩枳殻一兩麩炒㣲黄去瓤桂心一兩荆三稜一兩炮剉桃仁一兩湯浸去皮尖雙仁麩炒黄川大黄二兩剉研㣲炒厚朴二兩去粗皮塗生薑汁炙令香熟川椒三分去目及閉口者㣲炒出汗右籮為細末以酒煮麵糊和搗三百杵丸如梧桐子大每服食前以粥飲下三十丸鼈甲丸治腹内積聚心肋急滿時吐清水不能飲食時惡寒鼈甲去裙襴酥炙一兩半防葵剉人参前胡去蘆頭桔梗炒枳殻去瓤麩炒當歸切焙附子炮裂去皮臍亁薑炮白术各一兩梹榔剉大黄剉炮各二兩厚朴去粗皮生薑汁炙吳茱萸各三兩甘草炙剉一兩一分右為末煉蜜丸如梧桐子大每服二十丸温酒下早晩各一服漸加至三十丸一方用枳實無枳殻忌桃仁雀肉并莧菜魚蒜等五積丸治五積氣心腹脹悶噫氣吞酸不思飲食酸石榴各一兩巴豆和皮搥碎甘遂大㦸芫花各半兩荆三稜大黄杏仁去皮尖雙仁五靈脂䜴甜葶藶各一兩烏梅去核一兩半右剉為末用水一升煮令水盡炒過勿大焦搗為細末醋煮麵糊丸如菉豆大每服五丸食後温湯下三稜丸出聖惠方治乆積聚氣不消心腹脹滿食少體瘦荆三稜一兩炮剉桂心一兩川大黄一兩半剉碎㣲炒梹榔一兩半吳茱萸半兩湯浸七遍焙乾㣲炒亁漆一兩搗碎炒令烟出木香一兩附子一兩炮裂去皮臍青橘皮一兩湯浸去白瓤焙桃仁一兩半湯浸去皮尖雙仁麩炒㣲黄鼈甲一兩炮裂右為細末以醋煮麵糊丸如梧桐子大每服食前以温酒下二十丸鼈甲煎丸出聖惠方治積聚氣乆不消心腹虛脹不欲飲食鼈甲二兩塗酥炙令黄去裙襴防葵一兩剉碎㣲炒川大黄二兩剉碎㣲炒已上三味並搗籮為末以醋二升煎令如膏亁漆一兩搗碎炒令烟出桂心三分附子一兩炮裂去皮臍川椒紅㣲兩炒桃仁一兩湯浸去皮尖雙仁麩炒㣲黄别研入木香一兩枳實一兩麩炒㣲黄右為細末内前煎中更加少蒸餅和搗三二百杵丸如桐子大每服食前生薑橘皮湯下二十丸八仙丸出聖濟總録治消食化氣破積聚結心腹脹滿噫醋惡心荆三稜煨剉蓬莪茂煨五靈脂各一兩烏梅六十枚去核用縮砂一百枚去皮亁漆半兩炒烟出巴豆四十枚去皮出油研木香一分右為末用酸粟米飯三兩匙再入臼杵五七百下丸如菉豆大每服五丸至七丸生薑湯下小兒一丸如要宣轉十五丸更量虛實加減梹榔散出聖恵方治積聚氣腹脇堅急心胸脹滿不能飲食梹榔一兩荆三稜一兩炮剉木香一兩桂心半兩桃仁一兩湯浸去皮尖雙仁麩炒㣲黄青橘皮半兩湯浸去白瓤焙郁李仁半兩右為粗散每服四錢水一中盞生薑半分煎至六分去滓食前稍熱服防葵散出聖惠方治積聚氣心腹脹硬如石腹上青脉起飲食不下防葵半兩桔梗三分去蘆頭川朴硝三分桃仁半兩湯浸去皮尖麩炒㣲黄川大黄三分剉碎㣲炒木香半兩右為粗散每服三錢水一中盞煎至六分去滓食前稍熱服當利下惡物為度未利再服積氣丸出聖濟總録治積聚心腹脹滿宿食不消㽲刺疼痛惡心嘔吐不思飲食方見諸氣門諸氣類梹榔丸出保命集梹榔三錢半陳皮去白一兩木香二錢半牽牛頭末半兩右為細末醋糊為丸如梧桐子大每服十五丸至二十丸米飲下生薑湯亦可煮黄丸出保命集雄黄一兩另研巴豆五錢生用去皮研爛入雄黄末右二味再研入白麵二兩再和同研勻滴水為丸如梧桐子大每服時先煎漿水令沸下藥二十四丸煮三十沸撈入冷漿水中沉冰冷一時下一丸一日二十四時也加至㣲利為度用浸藥水送下此藥治脇下痃癖痛如神𤓰蒂散𤓰蒂三錢赤小豆三錢右為細末温水調下一錢以吐為度如傷之太重備急丸獨行丸皆急藥也枳實丸出保命集枳實麩炒五錢白术一兩剉右為細末燒飯為丸如梧桐子大每服十五丸水飲下治飲食不化腹膨悶梹榔主之如甚則脇肋虛脹煮黄丸主之治氣不下降飲食難消萬靈丸主之䧟堅散出至道方治食狗肉不消心腹脹急發熱多語杏人一升去皮尖以水三升煎滓取汁為三服下肉為度治食狗肉不消心下堅或腹脹口亁忽發熱妄語出本草煮蘆根飲之主積聚脹滿出本草以枕材煮汁服之普濟方卷一百七十一
