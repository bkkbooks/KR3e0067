水浸一宿揉絞取水一升右用精羊肉一觔細切前皂莢水同煎如膏入何首烏末及皂莢末丸如桐子大空心以米飲下三十丸治風毒瘰癧赤腫痛硬出聖惠方鼠粘子一升㣲炒荆芥穗四兩右為散每服三錢以水一盞煎至五分去滓入竹瀝半合攪勻服之日三治風毒所攻繞項生瘰癧如連珠冝服浸酒方出聖惠方海藻五兩洗去醎味烏蛇五兩酒浸去皮骨炙令微黄右為散以酒七升浸五日每取酒半盞飲之日再飲治瘰癧消風毒腫上癰内熱牡蠣二兩火煆為末𤣥參一兩甘草半兩炙右為末每服二錢同臘茶清調下又方用白鴿糞不以多少陳米飯擦和得所丸如梧桐子大米飲下五十丸治瘰癧赤腫出聖惠方用地松一觔搗如泥敷癧上乾即易之以痒為度治瘰癧風熱結毒腫硬痛未破方出聖惠方用五月内取大槲子葉一抨剉令細入大釡竈内以水五斗煎至一斗濾去滓却入鍋中熬成膏每服空心以温酒調半兩服之良久當吐以吐出癧子根為度治風毒瘰癧出聖惠方用牛蒡子三升微炒為散用絹袋盛以無灰酒五升漬二十七日空心温服一盞治風毒癧子用黄花蛇一條酒浸一宿去皮骨炙令黄搗為散空心以粥飲調下一錢服盡即歇十日若未消減即更作服之如已消即止治風毒瘰癧赤腫用生栗子肉生嚼敷之氣毒瘰癧附論夫氣毒瘰癧者由風熱氣毒攻於肺故也肺主通行諸臟之氣若經絡壅塞則衞氣凝滯不得宣行邪熱與氣相摶結聚於皮膚肌肉之間而生瘰癧也又有愁憂不足思慮干情恚怒傷於心肺肝氣毒滯於胸膈致臟腑否澁氣血凝留亦因兹而成氣癧也方㯽榔散出聖惠方治氣毒瘰癧心膈壅悶不下飲食㯽榔前胡去蘆赤茯苓牛蒡子各一兩炒人參去蘆枳殻麸炒黄去白防風去蘆沉香各半兩甘草炙微赤剉一分右為散每服四錢水一盞入生姜半分煎至六分去滓空心及晚食前温服治氣毒瘰癧結腫疼痛服之令内消方出聖惠方豆䜴一合以湯浸一宿研如泔膏以布絞汁去滓水蛭一箇炙令微黄鵓鴿糞一兩微炒夜明砂二兩微炒當歸半兩赤芍藥半兩薫陸香半兩白礬灰一分鷄子二枚去殻右為末入豉汁相和搗匀以油單褁炊飯上蒸候飯熟取出入少蜜丸如桐子大食前以温酒下十丸皂莢丸出聖惠方治風毒瘰癧腫硬疼痛時發寒熱不思飲食日漸羸瘦皂莢五挺去黒皮塗酥炙㣲黄焦去子蝸牛子五十枚炒㣲黄雄黄十兩細研何首烏陳軟棗連翹各一兩麝香一分細研龍腦一錢細研芫青七枚以糯米拌炒米黄為度去頭翅右為細末入研了藥令勻煉蜜和丸如桐子大食前𤣥參湯下七丸治風毒聚結生瘰癧漸多腫硬冝用此藥貼熁令消爛膿自出方出聖惠方燕糞斑猫芫青雌黄各一兩青黛麝香各一錢水銀一皂莢子大猪脂半兩右以猪脂先研水銀令星盡後入諸藥同研令細每用小豆大安在癧子上以醋麫糊紙花子其癧蓋之或先炙破亦得經五七日看癧子爛潰紅絲脚斷即漸漸揭起紙其癧子隨藥自出後用煮猪蹄温湯洗却别貼膏藥止痛生肌海金沙丸出聖惠方治氣毒瘰癧結硬不消日夜疼痛海金花丁香琥珀細研各一分敗龜塗酥炙黄甜葶藶隔紙炒紫色各一分麝香一錢細研皂莢二十枚炒為末右為末同研令勻煉蜜丸如桐子大每服於食前温湯下五十丸其病當從大小便出斑猫丸出聖惠方治氣毒瘰癧服之令内消斑猫一兩去頭足翅以糯米拌炒令米黄為度麝香半兩細研硃砂半兩細研乾薑三分生甘草半兩生剉犀角屑半兩粟米二合㣲炒右為末入研了藥令勻以蜀葵根白皮杵自然汁和丸如梧桐子大每服以蜀葵根湯下五丸空心臨臥服何首烏丸出聖惠方治氣毒心膈壅滯頸生瘰癧咽喉不利何首烏昆布洗去醎味各二兩雀児糞一兩微炒雄黄半兩細研麝香一分細研皂莢十枚去黒皮塗酥炙黄去子右為末入前研了藥一處同研細令勻用精白羊肉一觔細切更研相丸如桐子大食後以荆芥湯下五十丸薄荷丸出聖惠方治氣毒瘰癧心胸寒壅悶頸項腫發歇疼痛不欲飲食薄荷一兩乾者木香一兩連翹一兩青橘皮湯浸去白焙一兩麝香一分細研皂莢十挺長一尺不蛀者以漿水二升浸三日起取汁為膏右為末以皂莢煎和丸梧子大空心及晚前食以荆芥湯下十丸膩粉丸出聖惠方治氣毒瘰癧硬結疼痛不能消散者冝服膩粉一錢定粉半兩微炒夜明砂一兩微炒桂心半兩犀角屑三分斑猫一分以糯米炒米黄為度去頭翅足右為末研勻用軟飯和丸菉豆大每於食前以温酒下五丸硫黄丸出聖惠方治風毒瘰癧腫硬如石疼痛硫黄細研一分麝香細研一分鷄子一枚煮熟去皮皂角一分末斑猫二十七枚糯米拌炒以黄為度去頭翅足淨牽牛子一分炒右同研以軟飯和丸如小豆大食前人參湯下五丸又方出聖惠方木香半兩烏蛇三兩酒浸去皮骨炙微黄乾蝎一兩㣲炒皂針十三兩炒令黄啄木烏一隻燒為灰右為末煉蜜丸如桐子大每服以薄荷湯下十五丸日三又方出聖惠方治氣毒瘰癧結腫疼痛斑猫半兩去頭翅足糯米拌炒黄色牽牛子一兩生用雄雀糞三分枳殻一兩麩炒微黄去白右為散每服一錢五更初用粥飲調下或有吐逆即服枳殻湯投之日午後當取惡物蝸牛散出聖惠方治風毒瘰癧生於頸腋累累如桃李大小不定腫硬疼痛蝸牛殻一錢末皂角子煨去皮取末一錢乳香一錢膩粉二錢右為末鷄子一枚開取清去黄調藥末却入殻内以濕紙三五重褁以飯甑内蒸候飯熟取出空心以五味子湯嚼下後以暖水潄口良久㵼出毒物少年者只作一服年老者分為二服臨時以意加减之皂莢子丸出聖惠方治氣毒瘰癧結硬疼痛皂莢子二十枚炒熟巴豆一枚去皮油心研紙裹煨乳香二錢斑猫一枚以糯米拌炒米黄為度去頭足翅右為末用軟飯和丸如桐子大空心以温酒下二丸治氣毒瘰癧結腫未潰者令内消方出聖惠方槲白皮剉三觔丁香一兩末麝香細研半兩右以水五斗於大釡中先煮爛槲皮至一斗去滓更以慢火熬成膏後入丁香等二味攪令勻收於瓷器内食前以温酒調下半匙天靈散出聖惠方治氣毒瘰癧徧項及流注脇腋下有頭疼痛天靈盖一兩帯血色者以茅香水洗五七次塗酥炙令黄虎脛骨一兩塗酥炙令黄右為㪚以空心葱酒調下三錢晚食前再服又方出聖惠方蝸牛子二十枚生去殻炒微黄薄荷一兩乾者丁香半兩右為末煉蜜丸如桐子大食前荆芥湯下三十丸治瘰癧腫硬如石疼痛五靈脂二兩熬膏皂莢十枚不蛀者去黒皮塗酥炙去子右搗皂角末以五靈脂膏和丸如桐子大早晨以薄荷湯下九夜臨卧以温酒下十丸又方出聖恵方皂角針一兩燒灰槲白皮末一兩右同研令細食前以温酒調下二錢治氣癧用赤脚馬蘭搗細塗患處治氣瘰癧出聖惠方右用皂莢一觔不蚛者去皮子塗酥炙令黄色搗羅為末以精羊肉半觔細切研如糊下藥末相和圓如梧桐子大每於食前以皂莢刺搗碎煎湯下十五丸服此藥一月即有大驗熱毒瘰癧附論夫熱毒瘰癧者由人臟腑俱實氣血充盛内有積熱不得宣通熱毒之氣流於項腋之間搏於肌肉而生故謂之熱毒瘰癧也方𤣥參散出聖惠方治熱毒瘰癧癰腫疼痛宜服此散熱毒除根𤣥參連翹知母當歸雄黄細研牽牛微炒黒豆炒熟黄芩犀角赤芍藥空青荏子礬石泥褁燒半白細研各三分地膽一分以糯米拌炒黄為度去翅足斑猫一分以糯米拌炒以米黄為度去翅足右為散入研了藥令勻空心以温酒下一服一錢三五服後小便出爛肉為度連翹散出聖惠方治肝膈熱毒氣盛攻項腋生瘰癧腫痛心神煩悶背胛急疼四肢不利連翹漏蘆知母桂心黄芩𤣥參甘草炙㣲赤各三分木通剉柴胡去苗大黄㣲炒朴硝各一兩右為㪚每服四錢以水一盞煎至六分去滓每服於食前温服以利為度紫參丸出聖惠方治熱毒瘰癧腫痛未成者内消已破者行膿紫參苦參丹參連翹各二兩膩粉麝香别研各三錢滑石二兩半右為末用𤣥參一觔搗碎以酒三碗浸三日去滓皂角子三百枚煨熟搗末用𤣥參酒熬皂子末成膏和前藥如桐子大每服一丸黄耆湯下日加一丸至患人歲數止日减一丸瘡自乾有結内消治熱毒結成瘰癧日夜疼痛出聖惠方甘草炙㣲赤一兩犀角屑一兩半黒豆炒熟一兩麝香半兩細研斑猫半兩以糯米拌炒米黄為度去翅足右為末煉蜜和丸如桐子大空心以米飲下七丸服後覺瘡痛即住藥其病當從小便出却於盆子内看之若小便澁即服木通散木通散出聖惠官効方木通一分剉葵子一分滑石一兩右為散以䓤白湯調下一錢日三四又方出聖惠方斑猫一分以糯米拌炒米黄為度去頭足翅預知子一兩犀角屑一分水蛭一分微炒黄色黒豆一百粒炒熟蝱一分炒令㣲黄去頭足翅右為末以酒煮麫糊和丸如黍米大大人每日空心以酒下五丸小児二丸雄鼠糞丸出聖惠方治熱毒瘰癧結硬不消雄鼠糞二十一粒研菉豆粉一錢膩粉一錢斑猫二十一枚去頭翅足以糯米拌炒米黄為度右相和研令勻以冷水和丸如小豆大空心以酒下二十丸兩日後再服即病根並出地膽散出聖惠方治熱毒瘰癧内消地膽一分去頭足翅以糯米拌炒令黄為度滑石半錢朴硝一分熬令汁盡右為散空心以米飲調下半錢服後覺小便中下惡物即减地膽少許十日見效又方出聖惠方鷄子一枚斑猫二十一枚去頭足翅以糯米拌炒黄為度膩粉一錢右鷄子去黄留白入二味藥在内以紙盖蒸兩炊久取出丸如小豆大每日五更初以温酒下五丸當㵼出病根如服未效即日更服治熱毒瘰癧瘡腫疼痛冝服此方出聖惠方顆鹽一分微炒黄丹半兩微炒白礬一分燒令汁盡黄蘗一分剉白歛一分右為散每先用温鹽漿水洗瘡令盡淨拭乾以鷄子清調塗於帛上貼之山豆根方出仁齋直指方治咽喉上膈熱毒患瘰癧者常含汁嚥下仍服之山豆根紫蘇葉右用細剉煎湯臨臥服之觧毒方治瘰癧四畔紅腫多汁為熱證小黒豆二合紫蘇一両薑七片右用剉細煎湯食後服治熱毒瘰癧内消方斑猫十枚去頭頸翅足糯米同炒令黄色大青一兩剉微炒右為散食前温酒調一錢又方皂莢二百粒不蚛湯浸經宿用炒令黄搗末杏仁一百粒湯洗去皮尖雙仁㣲炒黄為度末搗膏糊為丸用蜜和右同研令勻煉蜜和丸如桐子大食前以粥飲下三十丸斑猫散治熱毒瘰癧斑猫三枚拌糯米炒令黄色去頭翅足滑石一分右為散分為兩股空心糯米飲調下如人行十里每服如覺小腸澁即煎黒豆湯服湏臾小腸内取下爛肉片子即瘥未愈隔日再服大薊根散治熱結瘰癧用薊根一觔搗為散每服用藥三錢匕食後酒湯調下日再服瘰癧有膿附論夫瘰癧者結風於内積熱在肝榮衞不和胷隔壅滯毒熱相摶流注於筋脉結聚而成也初得即覺項邉磊磊狀若連珠面色萎黄皮膚壮熱久而不療毒熱上蒸則成膿也按内經謂榮氣不從逆於肉理乃生癰腫盖榮氣逆則血􅉱􅉱則熱氣聚而為膿瘰癧之疾亦猶是也熱氣内結搏聚在肝肝主筋肝藏血久不差故熱聚於血血腐而為膿在於頸腋腫結相連有如梅李實者是也方神應膏治瘰癧已破瘡口浸引膿水不絶及治一切惡瘡貼之去惡肉好肉自生白芨白歛當歸桂去粗皮各一分附子一枚半兩者去皮臍乳香半両東南槐枝栁枝各二條各長七寸剉鉛丹三兩巴豆三分去皮研清油六兩右各剉細於石器内先下油與白芨等煎令焦黄以白綿濾去滓入鉛丹巴豆慢水熬藥成膏先以水一碗投藥入水其藥直入水中如珠為度後刮下入瓷器内收貯每用少許量核大小塗貼黄耆丸治瘰癧結腫生膿黄耆剉木香漏蘆𤣥參枳殻醋炒㣲黄去白犀角屑桔梗去蘆頭牛蒡子微炒大黄微炒各一兩右為末煉蜜和丸如桐子大空心及晚食前以米飲下二十丸鱉甲散治瘰癧出膿血不止冝服此消死肉散毒氣使癧子轉動寛軟鱉甲一両用醋塗炙令微黄去裙襴桑螵蛸五枚微炒狼毒三兩醋拌炒黄䗪蟲五枚微炒磁石三兩細研水飛過雄黄一兩細研麝香一錢細研右為散入研了藥再研勻每日空心日午近夜各一服米飲調下一錢枳殻丸治瘰癧結腫穿穴生膿枳殻麸炒微黄去白𤣥參漏蘆大黄微炒營實牛蒡子微炒各一兩黄耆露蜂房半兩㣲炒右為末煉蜜和丸如桐子大每服不計時候米飲下三十丸連翹丸治瘰癧結核於頸腋下内生癰潰方見本門寒熱類白歛丸治瘰癧結腫有頭膿水不止白歛黄耆剉木香枳殻微炒𤣥參烏蛇酒浸去皮骨炙色黄各一兩斑猫十四枚去頭足翅以糯米拌炒令米黄為度右為末煉蜜和丸如桐子大每服空心逐日及晚食前米飲下十丸蜂房膏治瘰癧生頭膿水不絶疼痛露蜂房一兩蛇蛻皮半兩𤣥參半兩黄耆二分杏仁一兩湯浸去皮尖雙仁研亂髪如鷄子大黄丹五兩右細剉用麻油一觔先煎髪及杏仁候髮消盡即以綿濾去滓下黄丹以栁木萞不住手攪候熬成膏即傾於瓷合中盛旋取塗於帛上貼之連翹散治瘰癧熱腫内敗生膿連翹犀角屑黄耆剉各一兩木通剉半兩漏蘆一分杏仁一兩湯浸去皮尖雙仁麩炒微黄色𤣥參半兩右為散每服三錢以水一盞煎至六分去滓食前温服紫金膏出聖濟總錄治瘰癧已破膿水不止栁枝三十條各長四寸槐枝仝上麻黄六兩青者是乳香别研没藥研栢脂各一分右為末先熬油令沸入槐栁枝煎令黒色去枝不用次入麻黄等熬成膏每用油紙攤塗之地膽丸出聖恵方治瘰癧成瘡有膿貼藥後服此地膽去頭足翅糯米拌炒米黄為度斑猫去頭足翅糯米拌炒米黄為度芫青一枚糯米炒令黄去頭足牛黄别研一兩生豆黄三十枚右為末豆黄再研勻煉蜜為丸如桐子大每服一丸空心茶下後更服尋常補益丸散去毒散出聖濟總録治瘰癧毒氣鬱結成膿發泄不止巴豆一兩去散薄荷末二兩皂莢末二兩麝香研二錢鯽魚一箇去腸肝右研勻四味入在魚肚内泥固濟以炭火五七觔燒存性候冷取出細研每服一錢匕用荆芥臘茶調下日三服蜂房散出聖濟總録治瘰癧貼瘡露蜂房蜜塗丈火炙令青色半兩羊屎四十九枚燒白色皂角一挺燒烟盡右同研和勻洗瘡口乾用此藥貼之後可服血竭散血竭散出聖濟總録治瘰癧已破膿水不止者血竭炒研一分大棗二十枚青州者燒為灰生乾地黄焙半兩别拌為末右同研如麫别取枳殻末三錢用水一盞煎至四分去滓調下散子半錢五更時服良久􅁴腹痛但只以枳殻飲之即自止有惡物從小便出為效豆牛子散出聖惠方治瘰癧頭多經久不瘥膿血不止疼痛豆牛子麝香半錢細研右都細研如粉以津唾調貼之薄荷丸出聖惠方治瘰癧結成顆塊疼腫穿潰膿水不絶不計逺近皆瘥薄荷一束如碗大隂乾皂莢十挺長一尺二寸不蚛者去黒皮塗酥炙令黄右搗碎以酒一斗浸經三宿取出曝乾更浸三宿如此取酒盡為度乾為散以軟飯和丸如桐子大每服食前黄耆湯下一十丸小兒减丸服之䑕灰散出聖惠方治瘰癧膿水不絶宜貼蛇腹中䑕一枚燒灰蝦蟇一枚燒灰右為末用生油調攤於帛上貼之日一度換之礶灰散出聖濟總録治瘰癧瘡口膿血不止用糞堆裏破瓦礶兒洗淨於竈掘坎安在坑中燒二日令捻得碎細研乾掺瘡上紫金散出聖濟總録治瘰癧方破用㯽榔不拘多少端正者為細末先以温􅄴水洗瘡以軟帛拭乾油調塗日三上用時㸔多少治瘰癧穿破作膿冝服此方出聖惠方用五月六月麥麴堆上生出菌子七枚熟搗先以米泔淨洗瘡拭乾貼日二度換之治有瘡口膿血出者用狸肉作羹如法食之水紅花飲出聖濟録方治瘰癧腫核結梗不消及膿汁旁穿不瘥用水紅花不拘多少一半炒用一半生用麄搗篩每服二錢水一盞煎七分去滓温服食後臨卧日三好酒調亦可服單方治瘰破與未破及膿血淋漓其效如神牡蠣不拘多少放於新瓦上以三觔炭煆令灰盡取八兩為細末甘草二兩右諸藥勻拌每服二錢食後以建茗同㸃日二服忌魚酒酢醤油鹽海味等此病多有人父子相傳至死如服此藥定並不疼痛亦無吐痢又方用牡蠣不拘多少火煆為末以糊丸如桐子大每服二十丸連翹煎湯吞下生肉方臘月猪脂松脂煑過收水上白者黄蠟煑過收凈潔者右各二兩用清麻油五六兩漫火熬成膏先將温水洗去舊藥拭乾用紙剪一大團子塗藥在上盖瘡上如痒不得動此生肉故也一日一次換藥切戒毒物輕肌散出鮑氏方治瘰癧上痛化惡膿血寒熱煩燥肢筋無力困倦虛渴飲食少進山茨菰即塗燈花何首烏蝦􅀈蝍甘草各三分生地黄半兩獨行竹一兩去安莖右為散每二錢薄荷七葉煎服活膿散出鮑氏方治瘰癧膿不快肢節疼痛煩熱口乾防風當歸人參川芎各半兩金星草五葉𦍑活甘草各三錢右為末每一錢酒下日三服若痛甚麥門冬湯下若紫赤色以羽刷上瘰癧毒赤腫刷四圍内托散出鮑氏方治瘰癧未出膿服内托裏止痛催破川烏炮一兩茯芩桔梗白蒺藜炒半兩大腹五箇獨活白芷甘草各半兩右為散以酒下二錢日二服秦皮散出鮑氏方治瘰並治一切惡毒秦皮三兩􅀢草二兩細辛苦參半兩黄連黄芩一兩大黄三分當歸右為麄末每一兩水煎去滓通手日一洗之碧油五枝膏出鮑氏方治瘰癧發毒出膿血瘀肉止痛桃枝栁枝桑枝槐枝皂角枝右前件各一握剉細麻油十兩煎至八分凈入明礬半錢乳血竭半兩黄丹四兩右都用漫火再熬成膏地上出火一宿用時化開攤片帛上大人小兒貼之收膿已破皆用未破不用瘰癧寒熱附論夫瘰癧者由風熱毒氣壅滯於胞膈之間不得宣通而摶於肝肝主筋故令筋搐結而腫多生於頸腋之間浮於筋皮之中有結核累累相連大小無定其初發之時熱毒腫結故令寒熱也方曽青散出千金方治寒熱瘰癧及䑕瘻曽青荏子礬石附子各半兩括蔞根露蜂房當歸防風芎藭黄耆黄芩狸骨甘草各半兩細辛乾薑各一兩斑猫芫青各五枚右治末篩以酒服一方匕日再連翹丸出聖惠方治瘰癧結腫不散欲成膿致寒熱不退連翹大黄炒沉香薫陸香牛蒡子炒黄耆枳殻麩炒黄各一兩𤣥參𦍑活赤芍藥升麻芎藭黄芩占斯各三分紅鹽一分波斯者皂莢子仁四十九粒炒微黃右為末煉蜜和丸如桐子大毎於食後温水下射干連翹湯出聖惠方治瘰癧寒熱射干連翹𤣥參赤芍藥木香升麻山梔子前胡去蘆當歸切焙甘草炙剉各一兩大黄剉炙二兩右為麄搗篩每服三錢匕水一盞煎至七分去滓入芒硝少許食後温服日再服曽青散出聖濟總録治寒熱瘰癧曽青研附子炮裂去皮臍礬石熬令汁枯研細荏子各半錢當歸切焙狸骨酥炙甘草炙皮各二兩細辛去苗葉乾薑露蜂房炙各一兩斑猫同芫青炒芫青各五枚去頭足翅用糯米拌炒去米不用右研為散每服一錢匕空心温酒下栝蔞子散出聖惠方治瘰癧初腫疼痛寒熱四肢不寧栝蔞子微炒皂子仁㣲炒牛蒡子微炒連翹牽牛子微炒何首烏大黄炒梔子仁甘草生剉白螺殻漏蘆各一兩右為散每服食前温酒調下二錢木通丸出聖惠方治癧結腫身體寒熱心胷壅滯敗醬三分大麻仁一兩大黄二兩炒赤芍藥三分犀角屑三分黒豆一兩炒熟去尖昆布一兩洗去醎末木通一兩剉𤣥參一兩連翹一兩升麻一兩右為末煉蜜和丸如梧子大食後漿水下二十丸沉香散出聖惠方治瘰癧寒熱結腫疼痛心胷壅滯沉香桑寄生射干升麻連翹各三兩大黄一兩半炒防風薫陸香藿香各三分麝香一分研細右為散入麝香研勻每服四錢水一盞煎至六分去滓温服日三四漏蘆湯出聖濟總録一名知母湯治瘰癧初結發寒熱漏蘆去蘆連翹木通桂去粗皮犀角屑黄芩去黒心茈胡去苗𤣥參大黄剉炒知母各等分右麄搗篩每服三錢匕水一盞煎至八分去滓下朴硝半錢匕攪勻湏空心臨臥服以快利為度土𤓰根散出聖濟總録治寒熱瘰癧土𤓰根去土連翹龍膽黄芩去鬚苦參括蔞實微炒大黄微炒芍藥木香右等分搗散食後臨卧温酒調下一錢匕日三服石燕丸出聖惠方治瘰癧結腫寒熱疼痛心腹煩壅石燕一枚細研真珠一錢麩金石三分細研木香井泉石續隨去皮各三分㯽榔一兩郁李仁一兩湯浸去皮微炒右為末同研令勻煉蜜和丸如桐子大每於食後以米飲十丸下旱蓮子丸出丸氏方治少長臟氣不平憂思驚恐抑鬰結聚及外傷風寒燥熱飲食結成百毒瘰癧發作寒熱遍於項腋凢久近悉主之旱蓮子連翹子威靈仙何首烏蔓荆子三稜醋浸濕紙包煆赤芍藥各一兩木香二兩大皂角二挺刮去皮酥炙無酥以羊脂炙右為末糊丸梧子大建茶清下三十丸或五十丸日三服小兒量與之食後服𤣥參散出聖惠方治癧初生結腫發渴寒熱𤣥參枳殻麫炒微黄去白木通獨活各一兩犀角屑半兩大黄一兩微炒杏仁一兩湯浸去皮尖雙仁麩炒黄右為散每服三錢水一盞煎至六分去滓温服日三兩木香消毒湯出聖濟總録治瘰癧寒熱煩悶木通大黄生各半兩竹葉乾者一分連翹一兩獨活去蘆半兩梔子仁十分右麄搗篩每服三錢水酒童子小便共一盞煎七分去滓温服狸頭散千金方有治療寒熱瘰癧連翹土𤓰根龍膽苦参黄連栝蔞芍藥常山皮各一兩狸頭骨一枚右搗下篩酒服五分匕日三忌猪肉冷水一方無狸頭連翹丸出聖濟總録治瘰寒熱結核在頸腋之下堅頭連翹𤣥參木香升麻各一兩大黄蒸半兩昆布去醎味焙二兩枳殻去穰炒一兩半大麻仁微炒别研一兩右搗研為末煉蜜和丸如桐子大每服十五丸食前米飲下加至二十丸一方作散空心米飲調下一錢射干丸出聖濟總録治瘰癧惡寒壮熱久則必成瘰瘻方見木門瘰癧久不差類白歛散出聖惠方治瘰癧生於腋結腫寒熱宜用貼白歛半兩甘草𤣥參木香赤芍藥大黄各半兩右為散以醋調為膏貼於患上乾即易之治瘰癧初起未破作寒熱出危氏方木鱉子二分去殻磨草烏半兩磨葱白連根用蚯蚓糞如木鱉子等分右真米醋磨木鱉子草烏二味入蚯蚓糞葱白調勻傅癧上扯紙條貼之湏流通氣孔療寒熱瘰癧散狸骨五兩半分烏頭七分炮黄連七分右搗下篩先食以酒服一錢匕日三忌猪肉冷水𤣥參湯出聖濟總録治瘰癧寒熱先從頸腋諸處起者𤣥參三觔細研磁石三觔内燒令赤醋淬七徧細研水飛過右以生絹袋盛酒三斗浸六七日每服一盞空心臨卧温服治寒熱瘰癧方出聖濟總録用狸頭一枚酥炙搗為散毎服一錢空心米飲調下烏犀湯出聖濟總録治初患瘰癧皮肉寒熱赤腫犀角一錢惡實炒各三兩沉香三分麝香研半錢丁香半兩𤣥參三分大黄剉炒木通剉射干連翹各等分右麄搗篩每服五錢匕水一鍾半煎至八分去津空心温服瘰癧久不瘥附論夫風熱毒氣藴積臟腑攻於筋膜則結為瘰癧其疾毒氣所感深者則衝發肌肉不得消散或成瘡孔膿水不絶或飲食觸犯或外因風冷所傷日久月深醫藥無效遂令久不瘥也此疾尤忌憂思恚怒氣血勞傷食寒冷方貫衆湯出聖濟總録治頸生瘰癧已鍼瘡尚不差者貫衆一兩半烏蛇酒浸炙去皮骨一兩連翹生乾地黄焙各二兩鶴虱炒一兩杏仁湯浸去尖雙仁炒桑根白皮剉各二兩白歛一兩葳靈仙去苗土一兩半白芨一兩半大腹皮二兩延胡索一兩半黄耆剉一兩半黄連去蘆一兩甘草炙一兩木占斯二兩右為末搗篩每服五錢匕水一盞半入生薑五片煎至八分去滓食後温服狼毒散出聖惠方治瘰癧久經年月膿水不時發焮腫狼毒剉醋拌䑕李根皮沉香連翹薫陸香鷄舌香詹糖香丁香各一兩薇銜三分斑猫二十枚以糯米炒黄去頭𤣥參三分昆布三分洗去醎味右為散食前以荆芥湯調下一錢麝香膏出聖惠方治瘰癧久經年月成瘻瘡者麝香雄黄半兩細研連翹恒山側子昆布狼毒黄耆敗醬各半兩斑猫三十枚蝦蟇灰一兩細研右細剉以臘月猪脂一觔半於淨鐺中煎十餘沸去滓下諸藥以漫火煎攪候黄耆黒色綿濾去滓收以瓦合中後下麝香雄黄蝦蟇灰調令勻每用故帛上塗貼日三兩度換之立應散治癧久不愈者方見本門諸癧類射干丸出聖濟總録治風熱毒癧久不瘥惡寒壯熱勞動轉甚漸成瘻射干昆布去醎味海藻洗醎味各一兩木香黄芩去黒犀角屑各三分芍藥連翹白歛各半兩大黄剉二兩𤣥參一兩一分烏蛇酒浸去皮骨二兩右為末煉蜜丸如桐子大食後温酒下十五丸丸出聖惠方治癧久不瘥沉注脇腋衝破皮肉膿血不止斑猫一分糯米拌炒令米黄為度去頭足麝香一分細研水蛭一分微炒令黄芫青一分糯米拌炒米黄為度去頭足甘草半兩炙煆赤剉黒豆一兩炒熟大黄一兩微炒烏蛇二兩酒浸去皮骨炙㣲令黄右為末入麝香研令勻煉蜜和丸如菉豆大空心以米飲下三丸如未覺加至五丸小便中當出爛肉為效如小便較澁以温水調滑石末一錢服之丁香丸出聖濟總録治癧久不瘥或已破膿血甚者母丁香生半兩蒼耳苖炒一兩青箱子生皂角仁各半兩甜葶藶半炒半生一兩厚朴去粗皮薑汁一兩炒丹砂研半兩一分藥為衣一分入右為末棗肉為丸如菉豆大丹砂為衣每服十丸至十五丸粟米飲下日三服漏蘆湯出聖濟總録治癧久不瘥將欲破者漏蘆洗焙半兩海藻洗焙半兩連翹一兩沉香剉半兩山梔子仁一兩一分丹參𤣥參各一兩右麄搗篩每服三錢匕水一盞半煎至八分去滓温服何首烏散出聖濟總録治瘰癧久不差何首烏去黑皮半兩黄耆細剉半兩皂莢酥炙去皮子薄荷各一兩蛇蛻皮焦灰半兩龍腦研一錢麝香研一錢右為末煉蜜如桐子丸大每服十丸薄荷湯下不拘時候犀角散出聖濟總録治瘰癧久不差犀角屑鎊蕪荑生斑猫炒一兩牽牛子炒黒豆各一兩生用麝香研龍腦研各一兩右除龍腦麝香外為細散再入研藥拌勻每服一錢匕熱酒調下空心服服藥後再飲酒一盞投之下惡物為度七神丸出聖惠方治瘰癧數年不瘥根株漸大流注四肢斑猫三十枚去頭足翅糯米拌炒米黄為度露蜂房半兩燒灰蛇蛻皮一條燒灰蝟皮一兩燒灰麝香三分細研雄黄半兩研細硃砂三分細研水飛過右為末入研了藥令勻煑棗肉和丸如桐子大空心糯米飲下七丸如腹内覺有小痛及増寒即减兩丸百日之内瘥硼砂散出聖惠方治瘰癧經久不瘥硼砂一兩斑猫三十枚糯米拌炒米黄為度去頭足翅乾漆足一兩搗碎炒令黄色水馬三七枚去足炒黄白芷半兩滑石一兩桂心半兩右為散空心以米飲調下一錢晚食前再服麒麟竭膏出聖惠方治瘰癧久穿穴傷風冷膿水不住冝用煖肌生肉麒麟竭一分白歛黄連梹榔丁香龍骨各一分麝香一錢細研右為末入乳鉢内便研令勻用野駝脂調如膏塗於帛上貼之日二用之六神散出聖濟總録治瘰癧久不瘥皂莢刺薄荷昆布洗去醎味海藻洗去醎味連翹各半兩白莢子五十枚燒灰右為細末每服二錢匕茶調下食後臨卧服地栢散出聖惠方治瘰癧經數年不瘥地栢半兩炒令微黄𤣥參三分升麻一兩牛蒡子一兩炒犀角一兩右為散食前温水調下一錢治瘰癧經年不瘥諸藥無效者宜服此方出聖惠方蛇蛻皮一條焼灰露蜂房一兩燒灰蝟皮一兩細研二十枚糯米拌炒米黄為度去頭足翅麝香一兩細研右令細煉蜜和丸如桐子大毎食前皂莢子仁湯下七丸必效散出瘡科精要治久患瘰癧不效斑猫四十箇去頭翅巴豆十箇去皮心膜白梹榔一箇麝香半錢南硼砂二錢半輕粉一錢右同研極細取鷄子清二箇去黄調藥勻却傾在鷄子殻内濕紙數重糊定無令透氣生飯甑内與飯一處蒸飯熟取藥曝乾研細末用時相度虚實虚人毎服半錢實人每服一錢並用炒生薑酒下五更初服藥至平明取下惡物如覺小腹内疼痛更用萆麻子燒灰入没藥等分同研細用茶調下一錢便入大腸其取下惡物如爛肉老鼠兒及新成卵内雀兒是藥效婦人有胎不可服紫金散出瘡科精要治瘰癧久不痊者枯白礬半兩砒霜一錢石膽半兩黄丹二錢右為細末糯米飲粥和丸如桐子大揑作餅子爆乾如瘡破者研為末掺於瘡上如不破者炙三壮炷如麥大安藥餅子於火盤上後用水沉香盖之去根平復勝金膏出聖濟總録治瘰癧久不瘥黄連去鬚蚛粟子去殻甘草根剉黄蜀葵花龍骨各半兩白芨一分右為細末取榆窠上紅蟲秤三兩半候乾同為末更入粉霜三錢同研勻每用藥三錢匕入膩粉少許取鷄子清調攤帛上先以口濕漿水洗凈揾乾貼之隔日易連翹湯出聖濟總録治瘰癧諸方不瘥連翹犀角鎊青箱子蔓荆實黄耆剉各等右麄搗篩每服三錢匕水一盞煎至七分去滓温服空心食前服破毒雄黄丸出危氏方治癧久作不愈寒熱徃來項筋攣急已破未破可服之惡物自小便中來通明雄黄顆塊大硃砂各二錢斑猫二十八箇去皮翅用糯米炒黄水銀三錢右先以斑猫為末續以雄黄硃砂為末再入水銀細研合和用鷄子清和糯米稠糊為丸菉豆大每服二七丸米飲或温酒下如惡物未見半日再一服聖惠方有膩粉無斑猫治癧積年癧惡瘡疳瘡軟癤膿出及多年瘡根蝕肉腫痛不可醫者俱用此出聖惠方青黛砒霜硼砂麝香各一兩粉霜一錢右入乳鉢内細研以麫糊丸如小麥粒大若瘡有頭即入瘡口中以麫糊紙盖頭湏臾藥發痛後至五七日出却瘡根便用生肌膏藥封之甚效桃紅散出聖濟總録用血竭湏真好者如無以深色胭脂代之為細末以自津唾調日夜頻塗瘡成靨即用浴毒湯洗之紫紅散出聖濟總録治瘰已成漏瘡歲久不愈信砒一錢礬石二錢鉛丹三錢右用瓷罐子先入砒次入礬次入鉛丹盖之鹽泥固濟炭火煆煙盡至紫色取出以紙襯於地上一時辰出火毒研細先以温水洗淨瘡挹乾取藥少許以生蜜調塗日夜五六次塗至五七日瘡漸歛紫黑色即用前桃紅散敷之浴毒湯出聖濟總録黄栢去粗皮黄連去鬚甘草剉黄芩去黑心各二兩大豆一合栢枝一把截如指莭長右麄搗篩每用三四匙以水二升煎至一升乘熱淋洗日三四次候洗下瘤子即用平肌散敷之平肌散出聖濟總録黄狗頭骨燒灰鱗鯉甲燒灰各一錢亂髮一團脂大燒灰右研勻如瘡口已乾用自津唾調濕敷之日三四次瘡即平愈一方無鱗鯉甲治癧經年不瘥常出膿血疼痛不止宜服此方出聖惠方斑猫一分糯米拌炒米黄為度去頭足翅羚羊角屑一兩麝香一分細研甘草一兩炙微赤右為末用軟飯和丸如菉豆大空心以荆芥湯下七丸蝪蜥丸治瘰癧久不瘥出膿水腫痛日夜不已方見本門赤瘰癧治瘰癧腫硬疼痛乆不瘥宜用此出聖惠方硼砂蜜陀僧斑猫雄雀糞各一兩右為末用軟飯和丸如麥粒大曝乾内入瘡孔中用麫糊帛貼之五六日自落烏鷄丸出聖濟總録治癧久不瘥烏鷄卵一枚錦貝子半兩右將錦子入鷄卵内用濕紙盖頭七重再用泥固濟火煆過後入地坑内出火毒一宿取出研細入雄黄半兩麝香一錢同細研煉蜜丸菉豆大空心蜜水下五丸不過五服效異效散出聖濟總録治癧結核久不瘥芫青四十九枚麒麟竭一兩右同藏於缾中存性燒過地上出火毒研細毎半錢米飲調下加至一錢匕内消方一名必揵丸出仁齋直指方治癧乆不瘥及治大人小児瘰癧内消斑猫一分糯米炒去頭足翅薄荷葉三分右為末烏鷄子清和丸梧子大空心茶清下二丸午時候服三丸臨卧服四丸次日空心服五丸臍下痛小便取下惡物為效如小便秘喫葱茶少許花葉散出仁存方治瘰漏瘡惡瘡婦人妳癰痛與不痛多年不瘥並治之黄蜀葵十五朶去蒂桑葉二十五片右窨乾為末入乳香半分研勻毎用少許瘡乾麻油調塗瘡濕乾掺治久年癧但未定交合項者皆可服出百選方用鯽魚二箇三寸大者開去腸肚不去鱗巴豆不拘多少填魚腹内滿為度麻皮纒定用煉熟黄泥褁了曬七分乾用三二觔炭火煆過魚藥同研極細陳米飲和丸菉豆大每服二粒或三粒陳米飲下日二三服加少麝香一方忌羊肉動風物治瘰癧久不瘥者出肘後方用生𤣥參搗碎敷之日三次易之木鱉膏出仁齋直指方治瘰癧經乆發歇無已及膿血淋漓並皆服之用木鱉仁二箇厚紙裏去油研碎以烏鷄子調和磁盞盛之甑内蒸熟毎日食後喫一次服之半月自然消靡治癧腫痛時久不瘥用狸頭蹄骨等用酥塗炙令黄搗為散毎日空心米飲調下一錢治瘰經久不瘥用斑猫一枚去翅足微炙以漿水一盞空服之或用蜜水調下重者不過七枚差治瘰癧腫硬疼痛時久不瘥出聖惠方用蝙蝠端午日收之燒灰細研如是翁癧即無頭母癧即有頭尖含水洗之以紙絍之絍藥於瘡孔中不過三五度即瘥若是翁即蜜陀僧末少許以麫糊調之即内消治瘰癧年深日久不瘥潰爛膿血作臭穢者用五丁草俗名猫兒眼睛連根采取不計多少亦不切碎盛入砂石鍋内澆滿冷水煎熬極爛順手不住攪轉乾則再添水至熬化成稠膏入全蝎數箇再熬撈去粗渣如膏藥馨香為度傾入磁礶埋土中留口出火氣為度以紅帛攤貼患處兩三日自落不過三兩次即愈比及上藥先以艾炷於瘡四圍排灸之痛極至不痛為度膿血流出用軟物揾乾淨然後前膏塗之治瘰癧久不瘥用臈猪膏塗之普濟方卷二百九十二
