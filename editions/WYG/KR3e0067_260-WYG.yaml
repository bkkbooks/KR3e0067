body:
  text: 普濟方卷二百六十明周王朱橚撰乳石門乳石體性附論夫金石之性堅剛而急烈又性清凈而惡滓穢凡服乳石訖即須以意消息尋檢舊法不可無備忌也但人性或冷或熱或寛或急皆湏量性將衛不可輕有犯觸凡乳石一服之後常在腸胃若人氣力衰石氣强即發動若人氣力盛石氣安即强健謹按古法皆令五十以上始服乳石殊謂不然今驗所見年少服者得力速兼無病患何以言者年少筋力滿盛飲食飽飫彌益精明壯健終無發理年歳遲暮氣候衰竭食飲失宜此石氣勝人無不發動歴觀得失莫過於此夫人年少縱不喫飲食血氣自强年老力微縱食精細猶不能健以此言之足明古法疎矣凡人身血脉經行不絶如血脉微有滯處便於其處發瘡或發熱神氣昬悶必欲防之每朝及暮温一兩盞清酒或可以生薑刮碎和少茱萸飲之令遍體熱氣薫薰又作熱羮粥歠之使腸胃通利即石氣流行其初服石一二百日尤宜作此將息又古法服石不取夏月即取冬月所以然者石有發動與服時皆背此又殊乖通論今驗服石飲食失宜勞役過度立即發動豈待背時今歴見將衛得宜並不發動復見名醫平常服石之人常作熱将息倘發調適乃易耳脫若石氣發動蹔須宜洩服少冷藥便得轉瀉若得暢通熱氣併除若作冷將息脫若石氣發動用冷藥便得轉瀉此一曲之說今古存之但欲廣聞見爾其將息皆須自量本性冷熱為候務取安稳不可拘執古論捨己從人庻通幽君子以此為意也按本草石鍾乳味甘温無毒主欬逆上氣明目益精安五臟通百節利九竅下乳汁益氣補虚損療脚弱疼冷下焦傷竭强隂久服延年益壽好顔色不老令人有子不鍊食之令人淋一名公乳一名盧石一名夏石生少室山谷及太山採無時蛇床子為之使惡牡丹𤣥石牡蒙畏紫石蓑草少室猶連嵩山也今第一出始興而江陵及東境名山石洞亦皆有之唯通中輕薄如鵞翎管碎之如爪甲中無鴈無光明者為善長挺乃有三尺者黄色以苦酒洗刷則白仙經用之少俗法所重亦甚貴之謹按鍾乳第一始興其次廣連灃朗栁等州者雖厚而光潤可愛餌之並佳今峽州清溪房州三洞出者惡於始興惡本草作亞自餘非其土地不可輕服多發淋渇只可擣篩白練裹之合諸草藥酒浸服之耳陶云鍾乳三尺者謬說也乳者陽中之隂石者隂中之陽乳石從來隂陽精體處至隂之裏有正陽伏其中正陽之中復在至隂之裏故陽生十一月甲子後服乳隂生五月甲子後服石隂陽發萌互相為用而服之皆理於内不泄於外也夫人膚虚皆帶風氣處人全軀常經含象理之有法則禍害不生乖於時候則危瘵立至竊覽古法皆云四月服石此謂浮學不曉由來按聞承開服石僉曰四月雖開而未平六月謂得氣之節他皆倣此常以不全實其腑不全虛其臟即八風之道無所滯焉或有藥觸成疴飲食發疹今並論次詳而行之本草經曰白石英味甘辛微溫無毒主消渇隂痿不足欬逆胷膈間久寒益氣除風濕痺療肺痿下氣利小便補五臟通日月光明久服輕身長年耐寒熱生華隂山谷及太山大如指長二三寸六靣如削白徹有光黄其端白稜名黄石英赤端名赤石英青端名青石英黒端名黒石英二月採亦無時惡馬目毒公今醫家用新安所出極細長白澈者壽陽八公山多大者不正用之仙經大小並有用唯須精白無瑕雜者如此說則大者為佳其四色英今不復用謹按白石英所在皆有今澤州虢州洛州山中俱出虢州者乃大徑三寸長五六寸者今通以澤州所出為勝又云紫石英味甘辛溫無毒主心腹欬逆邪氣補不足女子風寒在子宮絶孕十年無子療上氣心腹痛寒熱邪氣結氣補心氣不足定悸安䰟魄填下焦止渇除胃中久寒散癰腫令人悅澤久服溫中輕身延年生太山山谷採無時長石為之使得茯苓人參芍藥共療心中結氣得天雄菖蒲共療霍亂畏扁青附子不欲鮀甲黄連麥勾薑今第一用太山石色重澈下有根次出雹零山亦好又有南城石無根又有青綿石色亦重黒不明又有林邑石腹裏心有一物如眼呉興石四面纔有紫色無光澤㑹稽諸暨石形色如石榴子先時並雜用今散家採擇唯太山為最餘處可作丸酒耳仙經不正用而為俗法所重採時依此研鍊服餌鍾乳方研鍊鍾乳法出聖惠方取韶州鍾乳無問厚薄但令顔色明浄光澤者即堪入錬唯黄赤兩色不任用欲鍊亦不限多少置鍾乳於金銀器中即以大鐺中著水沈金銀器於鐺中用火煎之常令如魚眼沸水減即添若薄乳三日三夜即得若粗肥厚管者即七日七夜候乳色變黄白即熟如疑生更煎滿十日最佳煮訖出金銀椀其鐺内煮乳黄濁水棄之勿令人服服必損人咽喉傷人肝肺令人頭痛兼復下利不止其有犯者食猪肉即愈棄此黄水訖更著清水凖前更煮經半日許即出之其水色清不變即止乳無毒矣即於甆盆鉢中用玉鎚著水研之其鉢及鎚湏夾白練袋籠口稍長作之使鎚得轉兼通上下每日著水攪令調匀勿使著鎚鉢即封繫練袋自作字記勿使人開一則免纎塵入中二免研人竊喫研覺乾澁即是水盡即更添水常令如稀泔状乳細者皆浮在上麤者沉在下復繞鎚鉢四邉研之不及者即粗細匀為此每日湏一開或二開攪刮令匀勿使著鎚即匀熟免有粗細研至四五日状若乳汁研揩視之状如書中白魚膩即成自然光白便以水洗之不隨水落者即熱若得水而落者即未成更湏研之以不落為限熟訖澄取暴乾任将和藥及和酒空腹服佳五石護命散出聖惠方治虛勞百病羸痩欬逆短氣骨間有熱四肢煩痛或腹嗚㽲痛大小便不利尿多赤黄頭眩胷悶惡寒風痺食飲不消並宜服之鍊成鍾乳二兩紫石英二兩細研水飛過白石英二兩細研水飛過硫黄二兩赤石脂海蛤細研瓜蔞根各二兩黄耆剉生乾地黄桔梗去蘆頭白术乾薑炮製剉細辛人參去蘆頭各一兩防風去蘆頭桂心附子炮製去皮臍各三分麥門冬二兩去心焙右為細散入研藥和令匀每服空心及晚食前以温酒調下二錢服藥後稍有力者宜行百餘歩所貴藥勢歸下三石散治風勞積冷消除百病出聖惠方鍊成鍾乳二兩紫石英細研水飛過白石英細研水飛過白茯苓桂心瓜蔞根防風去蘆頭杜仲去粗皮炙令微黄剉各一兩人參去蘆頭白术細辛附子炮製去皮臍川椒去目及閉口者微炒去汗乾薑炮製剉各三分桔梗半兩去蘆頭牡蠣一兩燒為粉右為細散入研藥令匀每服空心及晚食前以温酒調下二錢更生散出聖惠方治男子婦人宿寒虚羸胷脇逆滿手足不仁飲食全少身體多病乍寒乍熱極者著床衆藥不瘥鍊成鍾乳三兩白石英二兩細研水飛過海蛤赤石脂細研𦍑活瓜蔞根各二兩白术石斛去根剉乾薑炮製剉防風去蘆頭各一兩附子炮製去皮臍人參去蘆頭牛膝去苖桂心細辛各三分右為細散入研藥和匀每服空心及晚食前以温酒調下二錢飲酒常令醺醺及行百餘歩以展藥勢五石更生散出聖惠方治男子五勞七傷虚羸着床乆醫不効鍊成鍾乳二兩白石英細研水飛紫石英細研水飛赤石脂硫黄海蛤細研各一兩防風去蘆頭瓜蔞根各一兩桔梗去蘆細辛桂心人參去蘆頭各半兩乾薑炮製剉防葵白术各三分右為細散入研藥和匀每服空心及晩食前以温酒調下二錢鍾乳散出聖惠方治諸虚不足羸弱不能起止鍊成鍾乳三兩人參去蘆頭熟乾地黄黄耆白茯苓薯蕷石斛去根剉杜仲去粗皮炙令黄剉肉蓯蓉酒浸一宿刮去皴皮炙各二兩甘草一兩炙微赤色麥門冬三兩去心焙右為細散入鍾乳研令匀每服空心及晚食前以温酒調下二錢東陵處士鍾乳丸出十便良方鍾乳無問州土但薄光潤者即堪以疎布袋盛懸於釡中勿令著底炭火煮之日三度易水出釡水淨洗訖内釡中發火如前候水色不變為度将乳袋出於新汲清水中洗去乳袋上浮沫更以牛乳五升緩火煮之一日欲服乳先飲此牛乳任和酒飲之其袋中乳傾出盤中以水淨洗入鉢即研研滿七日七夜常添水令如牛乳状勿令乾燥使粗細不匀候白光可愛水霑不落為度桂心蜀天雄炮各一兩人參乾地黄逺志皮葳㽔各二兩右搗篩六味訖即内乳粉入鉢更研候相和訖温白蜜去沫和為丸如桐子大酒下二十丸漸加至三十丸日再服忌如藥法鍾乳丸出聖惠方補虛損勞冷諸陽氣不足悦顔色令充實鍊成鍾乳二十四分石斛蛇床子各五分人參桂心各四分椒三分微炒去汗去目并合口者乾薑三分右藥四十八分計一十二兩以鍊白蜜和之搗三千杵藥成丸如梧桐子大空腹温無灰酒下二十五丸日再如性飲宜加飲少許仍行三數百歩即乳氣溜下任食若能節量甚佳古法云令食乾要得丸力速如覺熱衝上進一兩口飯行歩消息良久任食若能節食甚佳又云令食乾飯豆醤不得過多不可依古法終是節食忌行房事最要能依此法将慎補益之功不可具述鍾乳散出聖惠方主補虛勞益氣力消食防風人參各一分鍾乳二分研細辛半分桂心二銖乾薑一銖右為散分作三貼每晨温酒服一貼食時服一貼食時不用過飽亦不得過飢常令飲酒使體中醺醺有酒氣若熱煩以冷水洗手面不用熱食亦不得冷忌如常法鍾乳丸出聖惠方治丈夫衰老陽氣虚乏手足常冷心中少氣體血虛耗腰疼脚痺體煩口乾不能飲食宜服此安五藏補腸胃能息萬病下氣消食長肌膚和中焦鍊成鍾乳粉三兩吳茱茰半兩湯浸七遍焙乾微炒石斛一兩去根剉兎絲子酒浸一宿焙乾别搗為末二兩雄蠶蛾五十枚微炒肉蓯蓉一兩酒浸一宿刮去皴皮炙令乾右為末鍊蜜和搗三二百杵丸如梧桐子大每服空腹及晚食前以温酒下三十丸服訖行數百歩更飲温酒三五合飲訖復行百餘歩以展藥勢及喫乾飯豆醤一日不可聞見屍臭等氣及勿食自死陳惡諸物鍊鍾乳散療虚羸不足六十以上人痩弱不能食息百病法常服益佳出聖惠方鍾乳一斤取白凈光明色好者即任用之非此者不堪用煉法先泥一鐵鐺受四五斗者為竈貯水令滿去口二寸内乳著金銀甆器中任有者用之使得沉之於鐺中令水没器留一寸餘即得常令如此勿使出水也微火煮之日夜不絶水欲竭即添成滿水每日一周時輙易水洗鐺并淘乳七日七夜出之淨淘訖内甆鉢中用玉鎚著水研之一日一夜多著水攪令大濁㵼取别澄為粉其乳粗者自然沉㡳可研之凡三日三夜皆細逐水作粉畢澄取暴乾更於銀鉢中研之一日俟入水洗不落為佳可分秤入散藥服之取鍊成乳粉三兩上人參上石斛乾薑各三分右搗篩與乳令相得均分作九貼早朝空腹温酒服一貼黄昏後服一貼三日内準此服之三日補還湏準舊服如前盡此一斤乳訖其氣力當自知耳凡服此藥法皆三日一劑三日内止食一升半飯一升肉肉飯惟爛不得食䓤豉問曰何故三日少食勿得飽也答曰三日乳在腹中熏補臟腑若令飽食即推藥出腹所以不得飽食也何故不得生食由食生食即損傷藥力藥力既損脂肪亦傷所以不得食生食也何故不得食䓤豉殺藥不得食也三日服藥既盡三日内湏作羹食補之任意所便仍不用䓤豉及硬食也一得此法其後服十斤二十斤任意可知也鍾乳酒出聖惠方主風虛氣上安五藏通百節利九竅益精明目補下焦傷竭脚弱疼久服延年益壽肥健好顔色不老用鍾乳五兩細研兩重帛練袋盛内六升清酒中用白甆器盛宻封安湯中煎令三分可減二分即出湯還添酒滿元數封頭七日取飲一服三合忌如藥法又方出聖惠方用成鍊鍾乳三兩以無灰新熟清酒一斗於不津器中相和宻封閉冬七日夏二日空腹温服三合日再漸加以知為度十五日令盡亦有用此三兩和酒服三日令盡並令節食忌房事雜慎如藥法乳煎鍾乳方出聖惠方療風虚勞損腰脚弱補益充強氣力用鍾乳三兩研如麫以夾帛練袋盛稍寛容急繫頭内牛乳一大升中煎之三分減一分即好去袋空飲乳汁不能頓服為再服亦得若再服即待晚間食消時服之如能頓服即平朝盡服之不吐不利若稍虚冷人即微下少溏利亦無所苦明朝又以一大升牛乳準前煎之依法服餌其鍊袋每煎訖即以少許冷水濯不然氣不通洩如此三十度以上四十度以下即力盡其袋滓和麫飼母雞取其生子食亦好不然用浸酒亦得若欲服白石英並依此法若患冷人即用酒煎患熱人即用水煎若用水及酒例湏減半乃好若用牛乳三分減一分補益虚損無以加之永不發動单服乳粉方出聖惠方用鍾乳小秤一兩分為兩服朝服夜盡無問多少一準此法一兩為度凡服乳皆湏温清酒服之常令酒氣不絶為佳不得使醉吐三日少食日食一升許飯得滿三日不出即乳不隨食下化為度三日外任意作羹食将息其乳多少任人貧富服之服一斤百病自除二斤流及三世三斤臨死之時顔色不變在土下滿五百年後乃成強壮人補乳法出十便良方凡三日服乳三日補之十日服乳十日補之以此為度補乳法欲飽食服乳法欲少飡補乳以牛羊麞鹿等骨並煎取汁任意作羮噉之勿食倉米臭肉等及房事經一月後覺精氣滿盛百脉流通身體覺熱繞臍肉起此為得力可稍近房事亦不得頻數令藥氣頓竭彌更害人戒之慎之名之為乳者以其状人乳也宜與神丹相配與凡石逈殊然乳稱石精石滓故云上士服石服其精下士服石服其滓滓與精力逺矣鍾乳酒出聖惠方治虛損通順血脉補益下元鍊成鍾乳五兩綿裹附子三兩炮去皮臍甘菊花二兩肉蓯蓉酒浸去皴皮火炙令乾石斛各五兩右細剉以生絹袋盛用酒三斗浸經五日宻封勿令泄氣候日滿折開每空心温服二合漸加至五合晚食前再温服研鍊服餌石英方飛鍊研煮石英法出聖惠方治消渴隂痿不足欬逆胷膈間久寒益氣除風濕痺肺痿下氣利小便補五臟明目輕身用白石英半斤上好者以生絹袋盛之於一斗米飯甑中蒸四五徧然後搗罷又用玉鎚乳鉢内細研以清水飛過更以白練袋盛於飯甑中又蒸三徧取猪脂一斤以水浸逐日三兩度換水候水赤脉盡則剝去薄膜微火鍊次以石英末和之攪令相入每服空心及晚食前以熱酒調一茶匙服石英粉法出聖惠方治風虚勞損眼目不明神思昬濁用白石英任多少瑩浄者研飛鍊如前法成粉訖每四兩為一劑取鍊成白蜜和之為二十丸用甆合盛之每日空心及晚食前用煖酒嚼一丸服後喫少粥了宜行百歩以展藥力燒石英法出聖惠方治風虚久冷濕痺補諸陽不足用白石英三兩以甘堝子盛蓋頭於炭火中燒之令赤投入五升無灰酒中又取石英燒令赤再投於酒中如此三徧盛於甆瓶中宻封頭勿令洩氣每日旋開取空心及晚食前煖一中盞服之服後宜喫少粥飯壓之服石法麄白石英一大斤敲碎顆粒如酸􅀥核大不用全取白石顆先砂盆中和粗磊磊砂使壮兒仍少著水和挼三二千下訖即浄洗取石又於砂盆中和砂更挼一二千下依前浄洗即安柳簸箕中兼少許蒿葉少熟挼訖以水淨掏出晒令乾又以手細細挼之令浮碎搃盡熟挼使光滑即盛於夾帛練袋若出将行若於家内安當門床上每日平明未梳褁前取七顆含於口中以酒或水下之一顆一囬咽七囬吞直令到小腹下以兩匙飯壓之即依大家食一無所忌死生穢惡白酒牛肉但是石家所忌皆搃不慎所以辛苦料理使光滑者恐有浮碎薄人腸胃作小瘡子亦無他疑即每日早起梳褁前依前服之值冷熱都搃無忌比至日午左側即便轉出為新石推陳石下訖還依大家食時即飡飯若自知病羸至夜食前又服七顆依前法吞一夜令在小腹下温齊脚明日平明先便轉陳石搃與石下訖又朝法夜法服之此石常在小腹内仍附倉門但小腹温熱於四肢膀胱頭目髓腦膚體之内元無石氣欲從何而作丈夫婦人多有積冷若下熱必湏上冷若上下俱冷胃口不下食便成消渇至若上下俱熱頭面生瘡唇乾眼赤手脚枯槁及皮毛浮起不久成骨蒸凡人必湏上下焦冷熱氣息調和筋脉通達若上熱下冷必有痼積服石之後即下熱自然上冷骨氣堅實腰腎強健萬病自除石氣力得三年以來若不得力十斤亦湏常喫若得力訖一斤即止也白石英酒方出聖惠方治風虚濕痺脚弱筋攣隂痿體寒視聽不明白石英上好者搗碎磁石搗各五兩石斛去根剉附子炮製去皮牛膝去苖各三兩丹參防風去蘆頭山茱茰黄耆𦍑活羚羊角屑酸􅀥仁各一兩萆􅐺一兩生乾地黄白茯苓桂心各二兩杜仲一兩半去粗皮炙令黄右剉細以絹袋盛用酒二斗入甆瓶中宻封浸二七日後每於空心及晚食前煖一小盞服之其酒服五七日後旋添一二升至酒味淡薄即止又方治風虚濕痺筋脉拘攣脚弱不能行履白石英好者搗碎薏苡仁牛膝去苖各五兩續㫁茵芋防風去蘆頭附子炮製去皮臍桂心羌活枸杞子白茯苓各二兩石斛三兩去根剉山茱茰一兩生乾地黄半斤右細剉用生絹袋盛以酒三斗宻封浸二七日後每於空心及晚食前煖服一小盞忌生冷猪肚煮石方凡年四十以下服二大兩年四十五十乃至六十以上加二兩常用四月以後服之以熱者緣石性重服經兩月以後石氣若發即接秋氣石力下入其臟腰腎得力終無發理白石英二大兩末以生絹袋重盛縫却口人參末二大兩生地黄切二兩䓤七莖細切生薑細切二兩豉一撮椒四十九顆去目并合口者羊肉半斤細切猪肚一具浄如食法新粳米一合和前藥并石英袋著猪肚中急繫口勿使少洩氣及水入右以水二斗煮至八升即停出藥肚著盤上使冷然後破之如熱破恐汁流出先出石袋訖取煮肚汁将作羮服之每年三度服每服石英依舊餘藥換之分數一依初法每服隔一兩日不得食木耳竹笋白石英粉以白石英五兩微搗碎以醶醋五大升於不津甆器中蓋頭埋屋北隂處經七十日出㵼除醋搗碎研以水飛如出粉法澄清㵼之更研飛之可經二七日以醶酢三小升還置不津甆器蓋頭不埋可經二十日出以水洗去酢味盡研之極細即以好驢乳三大升安不津器中湯煮令乳竭止依方用和後丸白石英丸治五勞七傷羸瘦體熱心煩小便不利夜多恍惚生乾地黄茯苓華州者人參潞州者蜀天門冬枸杞白皮取時月州上者各三兩白石英五兩鍊成粉者右為散入石英粉令匀調鍊蜜和丸如梧桐子大初服十丸加至二十丸日一服以後地黄酒服之一方煎黄耆湯下三十丸地黄酒法用生地黄切五小升烏豆三小升以無灰清酒漬經五宿取服前丸藥金銀人參煮石英服餌方治諸虛邪氣安定心臟金十兩銀四兩人參二兩白石英五兩右取一大釡浄洗即下前件藥於釡中先下水三大升立一杖入釡中令至底水所浸著處即刻記之更下水二大斗七升通前總三大斗煎如魚眼沸漸減至杖所刻處即停火急取濕土置釡底取汁貯不津器中其金銀石等漉出收取其人參隨藥汁細細喫却其汁每朝空腹服三大合夜間又服二大合欲作食餌亦佳每服後隨性飲酒行藥氣忌如常法羊肉蒸石英服餌法精羊肉一斤白石英三兩右先取肉擘作兩叚鑚作孔内石英肉中還相合即用荷葉裹又将蠟紙裹又将布裹於一石米中蒸之俟飯熟即出却石後取肉細切和葱椒薑等絶小作餛飩子熟煮每旦空腹冷漿水中吞一百箇吞訖以冷飯壓之百無所忌宜春夏服大驗其石永不發動勿令餛飩破碎其石用三兩囘乃換石英汁作薑豉服餌法白石英二兩肥猪肉三斤右以水八升煮石英取五升量煮猪肉爛熟為度取肉汁下葱䜴切肉作薑豉食之一劑可六七日喫令盡二兩石英三度煮之第一度全用第二度中破第三度搗碎煮之每煮用白練袋盛之其石經三度煮即湏換新者二月以前八月以後皆作餌也石英磁石浸酒餌法白石英五兩澤州好者磁石五兩去毛石連碱多者十兩亦得右各搗令碎各用兩重白練袋盛以好酒一斗置不津器中懸藥浸經五六日以後每日飲三兩盞常令體中微有酒氣欲加牛膝丹參杜仲生地黄吳茱茰黄耆等藥者各自量冷熱及所患并隨所有者加之仍隨所加有忌者禁之餘無所忌一年後鬚髪變黑腰疼耳聾悉瘥其酒三五日後即漸添一二升常令瓶滿所加藥疑力盡者任換之經三五箇月疑石力稍微即便出搗碎還以袋盛經半年以後棄之準前更合乳酒煮白石英方出聖惠方治虛損勞痩皮膚乾燥四肢煩疼隂痿脚弱白石英五兩搗碎綿裹用宻絹袋盛牛乳三升酒三升右以乳酒相和以慢火煎石英至四升後出袋瀝乾其汁盛於甆瓶中每於食前煖三合服之其石英可三度用之亦效牛乳煮石英方出聖惠方治風虚勞損益氣安神明目白石英五兩搗碎牛乳二升水五升右先下牛乳於鐺中即以生宻絹兩重作袋盛石英繫頭以物懸下著乳中即勿令袋著底别以杖刻為記然後下水以炭火涓涓煎之水盡乳在還至前杖刻之處即止出石袋瀝盡乳以綿濾之冷熱調適每朝空腹細細服三二合若患冷氣宜加八顆蓽茇和煎之大佳石英飼㹀牛取乳服餌法出聖惠方能潤養臟腑悦澤肌肉令人體健用白石英三斤取好者以上亦得搗篩細研三兩日研了取一㹀牛十歲以上飬犢者唯痩甚佳每日秤一大兩石末和剉豆與服經七日即得取乳每朝空腹熱服一升餘者作粥喫任意食之百無所忌以五月上旬起服大好如急要亦不待時節終無發也牛糞糞地隨意菜供服乳人喫之石汁煮猪肉餌法用白石英一大兩絹袋盛以水三斗煎取四大升去石以猪肉一斤細切椒葱塩䜴一如食法煮之俟肉熟即下向一合中盛任意服之隔十日一度打碎煮之一無所忌銀罐煮白石英服水法出聖惠方治久虚心煩或渴脚膝無力視聽不聰用白石英五兩上好者以銀罐盛石受可一小升罐底開小孔子令遍側畔近下又兩行開孔遶遍於鐵鐺中著水五大升則内銀罐水中炭火上煎取二小升去罐澄清分再服服訖飲少酒脯行一二百歩許其石三遍煎一囘打碎一片作兩片乃至麻米大即棄之不堪也無所戒忌煮石英服餌法用石英五大兩澤州光浄無㸃翳者打碎如小豆大或蕎麥大去細末更於水中淘洗令浄重練袋盛之以䋲子繫頭取清水五大升於不津鐵鐺中煮之煮時石袋不用著鐺底恐沙石煎壞先以一杖横鐺口桂石袋著杖上去底三二分許煮取一升汁置椀中經宿澄取清平朝空腹頓服若以此汁煮稀粥服之亦佳每服後可行五百歩并飲清酒三兩盞又更依前法煮石二十度後石即無力以布褁埋南墻下深三尺滿百日又堪用服之然終不如新者服乳石後禁忌附論凡服乳石後藥菜等有不可食者有通食而無益人者有益人利石者有常宜收貯偹急者及五乖七急八不可三無疑等法服石之人若能依此可以蠲旦夕之暴庶免發動也今列于後法凡菜不可食者并可通食者出聖惠方不可食者油脂其性滑腸而令人不能食縱喫勿遣多也蕪荑能生瘡兼發石氣薺苨發石亦云損石芥子芥菜皆能發藥發熱蔓菁菜發氣又觸石葵菜滑而且壅亦不可食凡不可食者勿食為佳若欲食者皆湏報鍊雜以葱椒然後可通食者酥其物潤腹而能行石氣冬瓜龍葵此二物甚壓石服石人亦多食熱服蔓菁作黄菹和肉作羹始可少食亦湏雜以葱椒食之葵不可空喫腹胃燥澁可取三五葉入肉時食一頓也凡藥石發宜浴浴便得觧浴訖不瘥者乃可餘療若浴不瘥即得依後服葱白麻黄等湯諸隨身偹急藥目今附于後紫雪金石凌甘草葳蕤黄芩大黄狗白糞朴硝芒硝蘆根香䜴麥門冬石膏犀角前胡露蜂房白鴨通大麥奴右以上諸藥皆乳石所要常用隨身偹急服寒熱諸法湏明節度明節度則瘉疾失節度則生疾愚者不可強強必失身智者詳而服之審而理之凡服石人常宜收貯藥等人參朴硝苦竹瀝大黄梔子大麥麫好豉薺苨黄連升麻石膏荆瀝黄芩露蜂房猪膏葛根并粉酥蜜紫蘇子白鴨通粳米前胡冬葵子生薑冬瓜大豆車前地榆五加皮大小麥奴天門冬䓤白葳蕤麥門冬生地黄蘆根紅雪紫雪五乖出聖惠方重衣更寒一乖凡人寒衣即煖服石人宜薄衣若重衣即寒經云熱極生寒故云一乖飢則生臭二乖平人飲食不消作生食氣服石人忍飢失食即有生食氣與常人殊故云二乖極即自勞三乖平人有所疲極即湏消息恬養服石人少坐久坐疲極湏自勞適散石氣即暢故云三乖温即泄利四乖平人因冷乃利得煖便愈服石人温則泄冷則瘥故云四乖也飲食欲寒五乖平人食温煖則五内調和服石人食飲欲寒乃得安稳故云五乖千金翼方一名六反云腫瘡水洗六反也餘同此但此五條故云五乖也七急出聖惠方當洗勿失時一急若覺身體緩疼闗節強直翕翕發熱憒憒心悶即湏洗浴若初寒先用冷水後用生熟水若初熟先用煖水後用急冷水浴罷肘可以三二升冷水淋頭故云一當食勿飢二急湏食即食不得忍飢故云二急酒必淳清令温三急無問冬夏常湏飲多少任性熱飲尤佳故云三急衣温便脱四急食必極冷五急卧必榻薄六急食必壓多七急八不可出聖惠方冬寒欲火一不可飲食欲熱二不可當診自疑三不可凡服石常湏消息節度覺不安将息湏依法不得自生狐疑畏避風濕四不可若覺頭風熱悶憒憒心煩則宜當風梳頭以水洗手面即好與尋常風濕不同極不欲行五不可若久坐久卧有所疲極必湏行役自勞飲食畏多六不可居貪厚席七不可所欲從意八不可不用從意所適依石性将息節度為佳三無疑出聖惠方務遣常理一無疑委心棄本二無疑寝處必寒三無疑服石後将息補餌附論飲酒則石勢敷行經絡氣力強溢腎氣堅旺即頓為陽事陽事過多則腎虚虚則上熱熱盛則心下滿口乾燥飲隨嘔吐胃府不和宜服葛根飲安糓神除熱嘔吐止渴也且石酒相得逓相為用若石勢不行則須少飲如石氣調歇不復湏飲料量亦與石性同方雞心酸􅀥湯療飲後陽多腎虚發熱積熱不解胃中虚熱飲食不已氣入百脉心臟虚甚令人失常雞心十杦酸􅀥半斤人參一兩茯神芍藥各二兩白薇枳實炙知母甘草炙括蔞各二兩生地黄八兩右切以水一斗煮藥半熟内雞心煮取三升冷分三服黄芩飲若覺大熱者可服紫雪或今石陵或綘雪或白雪等但温半大升水取次研一大兩香湯浴後頓服之俟一兩利熱乃退矣凡此救急紫雪為上如不得通洩宜服之黄芩一兩梔子仁二七枚乾薑二兩芒硝半兩右切以水三大升煮至一大升絞去滓下芒硝調之分温兩服快利即瘥麥門冬飲若覺食不下兼嘔宜服之麥門冬一兩去心甜竹葉一大握生薑半兩切小麥四合去土并粃右以水三升煮取一升半分温兩服秦芁湯若熱盛充滿經絡心腹少脹心下不消或時聚如堅隨復消者宜服此湯得利便瘥秦芁三兩牛乳一斤右切細以牛乳煮取一小升去滓頓服之得利即瘥若老弱可量氣力進之其飲食亦宜清冷不得濁熱則石勢壅塞不行喜嘔吐病堅結也亦能發黄或小便赤心堅痛者亦宜服之得溏泄瘥熱氣散後黄色縱徹皮膚是瘥候勿怪熱散後慄慄寒顫若因顫後黄出外者是謂餘熱欲散也厚覆但使肌膚中少寒顫良葱根葛䜴湯若覺四肢筋強背脊重或頭痛如刺眼睛欲脱者宜以香湯浴湏虚静大屋内適寒温先以湯淋大椎及􅇟上三五十椀然後乃浴勿令見風浴訖覆被安臥擬取汗仍湏喫此粥葱根三大握乾葛六兩切豉三合䓤白一大握擘生薑少許切椒十五顆右先以水五大升煮葱根减半去滓下葛及豉煮取二大升去滓細研少米作稀粥并着䓤白等煮熟乗熱啜訖依前覆被取汗訖令婦人以粉遍身揩摩使孔合半日許始可出外其病立瘥不瘥可重服羮法服石之後一百日内須喫精細飲食羔粥酒等使血脉通利取麞鹿兎雉鵝鴨肉等以水浄洗切如指大於鐺中炒令欲熟即多下䓤白少下椒鹽熬令香即下少水煮次下粳米糝次下䜴清醤汁調醎酸適口每欲食先須歠十數口羮汁令胃口開通皮膚津潤然後進諸食縱噉炙肉亦無所慮作此将養食多且健縱噉餺飥亦湏多啜臛汁鮮鯽鱠若不下食體弱乏氣力即酒食之取鮮鯽魚剝去鱗破去腸血勿洗之用新布一二尺浄拭令血脉㫁依常法作鱠羮作蒜虀勿食瓜薑等醤尤益人下食亦療氣痢赤痢水穀痢食後仍湏白粥量事喫之即得瘥薯蕷餺飥若覺體氣沉滯石氣不行慎勿喫麵若覺虚惙任餌之取大薯蕷刮去皮薄切曝乾承潤挼作粉不粉者更曝依前法挼粉訖下篩以煖湯及鹽如麵細切作餺飥肉造臛如前羮法用澆餺飥任食此法補益强筋骨止渇生薑酒若少覺不下食服此酒生薑汁一合白蜜一匙清酒倍生薑汁右相和温頓服之半日乃効甚佳若飲熱歇後石勢虚損飲食入口自覺諸脉中濇濇如冷水入者是酒石俱退經絡空虚故也宜積日調冷食兼進猪蹄羮通諸脉自瘥止若頭眩耳聞空中有人語心怯恐懼兼憂悸不安四肢如痺或眠起則輒驚如被虎狼所逐威勢所懾者服竹瀝一二升乃至三升止即瘥亦可進白薇湯下之消息稍令飲粥常令有食力時進雞心酸棗湯常令美言相悦慎勿以惡事驚之若酒熱歇石熱亦不復行心下熱結已消黄縱未歇亦無所苦但冷飲食勿進辛辣菜及熱補食若不欲進清冷者可和煖餌勿令大熱若欲知體實而壅者先看脚拇指甲肉滿及肉色赤是實也實即畏熱發當須服藥微㵼若發熱但依法次第将息及服藥後得微汗微利為佳不要多利利多即反損石勢又加虚人服丹石人食之取利闗節採榆葉生服一兩頓佳又榆白皮為末和菜菹食之甚美令人能食仙家常服之服石後解散藥勢附論凡服五石散及鍾乳諸石丹藥等既差節度觸動多端發狀雖殊将攝相似比來人遇其證專執而療之或取定古法則與本性有違或取决庸醫則昧於時候皆為自忤遂推石過深求其理未曰合宜每尋古醫互相晦見直言沭浴實未探微寒温適情蓋湏自度隨時之義易所通焉故陶貞白云昔有人服寒食散撿古法以冷水淋身滿二百鑵登時殭斃人有取汗乃於狹室中四角安火湏㬰則殞據兹将息豈不由人追之昔事守株何甚寒食藥得節度者有輙解或二十日解温不堪寒即已解之候也其失節度者或頭痛欲裂為服藥食温作癖急下之今人多服单乳石或兼草藥服之雖非五石至於将息慎忌發動病由消息増益亦是五石之例或見單石不稱意便輕之唯以諸石散及至發動乃致困危若能明於節度則疾無不愈矣凡五石散皆名寒食散者言宜寒冷食及水洗取寒唯酒欲清熱飲之不爾即生百病也方麥門冬膏療石氣在皮膚熏熱生地黄汁三合生麥門冬去心葳㽔䑕李皮石膏碎凝水石沙參各一兩青箱子露蜂房各一分竹瀝一大合牛酥五大兩杏仁油二大合右剉内牛酥油瀝中微火煎令魚眼沸一炊久膏成覺有熱處即摩之瘥梔子湯若小便稠數者為熱食及噉諸熱餅肉之屬故也宜冷水洗腹兼服此湯梔子仁二兩甘草炙芒硝湯澄下黄芩各二兩右切以水五升煮取二升分温二服取利即瘥若手足卒患頑癖者為犯熱經久故也急與冷水洗飲熱清酒進冷食即止一法飲冷清酒亦止若惡食臭如死物氣者為食温作癖故也宜急以三黄湯下之若不下終不瘥若胸脇滿氣上嘔逆者為飢而不食藥氣上衝故也出聖濟總錄速與冷水洗食冷飯止若寒慄頭掉不自支持者為食少藥氣溢於肌膚五臟失守百脉揺動與正氣相競故也出聖濟總録宜強飲熱酒以和其脉強食冷食以定其臟強行以調其闗節強洗以宣其壅滯即瘥若失氣不可禁止者為犯温不時洗故也但冷水洗之即瘥若遺糞不自覺者為熱氣入胃大腸不禁故也出聖濟總錄當用冷水洗之即瘥若闗節強直不可屈伸為久停息不自勞洩藥氣不散漸侵筋脉故也出聖濟總錄宜出力使温冷水洗即瘥止若飲酒不解食不得下乍熱乍寒不便洗熱洗之復寒甚者數十日輕者數日晝夜不得寝寐愁悲恚怒自驚跳悸恍惚忘誤者為犯温積久寝處失節食熱作癖内熱與藥併行寒熱交争雖以法救之終不可解也用三黄湯服之瘥昔有曽餌石每發即欲自形強令飲食熱漸除縱家有寒熱藥發急皆忘雖素聰明發皆頑嚚告令難喻為兹斃者不可勝數遂合此湯服之大下便瘥若齒齗腫唇爛牙齒揺痛頰車噤為坐犯熱故也宜時救之可當風張口使冷氣入咽漱寒水即瘥若大便稠數為坐久失節度将死之候也可與大黄黄芩梔子芒硝湯下之倘十有一生耳可為必死之療不可不利致死令人恨也若食患冷不可下者為久冷食口中不知味故也出聖濟總錄當作白酒糜多著酥熱食一兩頓若小悶者還令冷飲食即瘥止若下部臭爛者為坐席厚熱故也出聖濟總錄當坐冷水中即瘥若鼻中有氣如㫁雞子臭者為著衣温故也或隂嚢臭爛為坐熱故也宜入冷水中及脱衣洗浴即自瘥若卒目暗無見者為飲食居處太温故也但脱衣冷洗冷食湏㬰即瘥若身肉處處痛痛無常處如遊風者為犯熱所作非風冷故也出聖濟總錄宜冷洗以冷石熨之自瘥若嗜寐不覺者為久坐熱悶故也宜冷洗冷食即瘥若肌膚堅如石不可屈伸為熱食温卧作癖五臟隔閉血脉不通故也急服三黄湯下之食冷食飲熱酒自勞即瘥若臂脚偏急痛苦者為久坐卧温熱不自移轉氣入肺脾胃故也又云熱入腹附骨故也出聖濟總錄宜勤以二布巾淹冷水搭之覺温則易如此不過三日即瘥若脉洪實或斷絶不足似死脉或細數弦駛其所犯非一此脉無醫不識也熱多則弦駛有癖則洪實急痛則斷絶出聖濟總錄但宜寒食自無所苦非死證惟勤節度為妙蓋熱發率常如此若人已困而脉不絶為藥氣盛行於百脉人之真氣已盡藥氣尚自行故不絶非生氣也死後體因温如生人肌腹中雷鳴顔色不變一兩宿乃作死人也壓丹石藥出本草以蜆糟煮服之良壓丹石出本草取白冬𤓰一顆和桐葉與猪肉食之壓丹石出本草取彌猴桃搗汁和生薑汁服之佳壓丹石熱出本草以苦瓠食之石泉公王方慶嶺南方服乳石補壅法云南方飬生治病無過丹砂遂著此方出本草用升麻末三兩研煉了光明砂一兩二物相合蜜丸如梧桐子大每日食後服三丸壓丹石毒出本草以蚌肉食之治石藥過劑者出本草以白鴨屎末和水調服之瘥乳石将適失度附論夫服餌藥劑皆有常式戒慎将適每務周至矧乳石慓悍尤當謹畏鍊食之後宜如何哉飲食衣服居處勞佚温熱寒凉之度所當究圖者無慮數十一失其度疾疢之孽速於影響蓋精明非華佗審治非仲景輕信服食棄是從非動發急難不知解救則有能消息節度専意候察者亦庶㡬免於困斃也方治乳石發動咽痛鼻塞清涕出者此為衣温近火方出聖濟總錄宜速脱衣當風取冷以冷石熨咽鼻即瘥治乳石發動輒安卧不與人語者此為熱盛食少失性方出聖濟總錄宜與熱酒冷洗冷食自勞即瘥治乳石發動耳鳴如風聲又有汗出者此為自勞過度陽事不節氣上方出聖濟總錄宜數飲食補之節禁陽事即瘥治乳石發動服藥心悶亂者此為服温藥與疾争力方出聖濟總錄當大吐或不吐病當困斃若吐不絶者可冷食飲即瘥若絶不識人口不開者亦當琢齒以熱酒灌之入咽吐出者更當與之但得酒氣下通不半日即蘇治乳石發動似傷寒温瘧者此為犯熱方出聖濟總錄宜以常治傷寒温瘧藥救之但勿服熱藥耳其傷寒藥等皆除破癖不與寒食相妨故通服也凡服寒食雖已熱解而更病者要先以寒食救之終不中冷治乳石發動脱衣便寒着衣便熱此為脱着失度方出聖濟總錄小寒自可着衣小温便可脱衣及冷洗之即爽應洗勿疑若忍之則病成矣治乳石發動夜不得睡者此為食少熱在内方出聖濟總錄當服大黄黄芩梔子三黄湯數進冷食自得睡也治乳石發動眩暈欲倒者此為衣厚犯熱方出聖濟總錄宜冷水淋頭并洗之即瘥治乳石發動百節痠疼者此為卧處太厚又蓋覆被衣温厚脚疼欲折方出聖濟總錄當單床薄被衣勿怠行役或以冷水洗勿着故垢衣雖冬寒亦湏散髮受風仍以冷石熨其衣勿繫帶若犯此煩悶者急以冷水浴勿忍病而畏冷也乳石發動附論内經謂石藥性悍非性緩心和人不可服夫聖人垂訓深矣世之服乳石者至於輕生傷性恃毫髮所得不戒夫毒烈之過夭於中道十有七八夫豈知大冶範形精全神固和理均足初無加損也能者養以取福則全生盡年若乃情竇一開嗜慾滋甚方且資剛暴勇猛之劑以靳補養積之畎澮洩之尾閭果何所賴邪説者以益氣補精安五臟通百節利九竅延年益夀利人如此其多謂不可不食其食也乃分稚強壯之先後又以石精石滓分上士下士所服之優劣夫以其有益於人必欲資是以袪沈疴痼疾可也當氣體調和榮衞流通亦何必區區於鍊餌哉胡不考服食之後将䕶多端一失其度發作異態飲食之細則有或熱或温之過衣服坐卧則有温衣久坐久停之患其他六反七急八不可三無疑又欲謹畏而力行倘有不慎疾不旋踵與其服食失度自詒伊戚曷若清浄恬澹克保冲和今叙疾病之由庶幾無輕餌神農桐君深達藥性制相反畏惡偹於本草而江左有道製散對治云鍾乳動术令人頭痛目眶疼术動鍾乳則胸塞氣短海蛤動鍾乳則目疼短氣雖患不同其治一也其五石散自後人發動将療亦非古法乃云鍾乳與术更互相動本草雖無正文而經方備載今故存焉方木香丸療天行丹石發動上下壅隔不通頭痛口苦不食青木香紫葛紫參元參丹參苦參人參石膏代赭石細辛桂心獨活蓯蓉乾薑齊鹽吴藍各一分巴豆二分去皮熟用右搗篩蜜和丸如梧子大有患丈夫服三丸強者服五丸餘即量與之以飲下得快利三兩行即瘥忌如常法薺苨湯治石毒卒發慄慄如寒或欲飲食或不欲飲食若紫石英發動亦熱悶惽惽喜卧少起無力或寒皆臟腑氣不和薺苨二兩甘草炙微赤剉藍子赤茯苓赤芍藥黄芩各半兩蔓荆子一兩右為粗散每服四錢以水一中盞煎至六分去滓不計時候温服治五石發動熱氣上衝心神煩躁口乾昏悶麥門冬去心薺苨各一兩豉一合葱白二七寸去鬚黄芩甘草生用各半兩右細剉以水五大盞煎至半去滓分温五服人參湯出聖惠方治礜石發令人心急口噤骨節疼强或時即體熱生瘡以冷水洗浴然後却用生熱湯淋之數徧畢宜喫少煖食飲一中盞稍熱酒行百餘歩即服此湯人參去蘆甘草炙微赤剉麻黄去根節各半兩䜴二合葱白去鬚八莖切麥門冬一兩去心右以水二大盞煮取一盞半去滓分温三服覆煖衣汗出瘥葱白䜴湯出聖惠方鍾乳對术又對栝蔞其治主肺上通頭胸术動鍾乳胸塞短氣鍾乳動术頭疼目痛又鍾乳雖不對海蛤海蛤能動鍾乳動則目疼短氣有時术動鍾乳直頭痛胸塞然鍾乳與术為患不過此也雖所患不同其治一矣發動之始要有所由始覺體中有異與上患相應宜速服之葱白半斤䜴二升甘草三兩人參外臺吴茱茰一升右㕮咀先以水一斗五升煮葱白作湯澄取八升内藥煮取三升分三服纔服便使人按摩揺動口中嚼物然後仰卧覆以煖衣汗出去衣湯熱歇即便冷淘飯燥脯而已若服此不解復服甘草湯出千金方甘草三兩桂心二兩䜴二升䓤白半斤右合服如上法若服此已解肺家猶有客熱餘氣復服桂心湯聖惠方名甘草湯一名生麥門冬湯桂心二兩麥門冬三兩人參一兩半甘草三兩炙䜴二升葱白半斤右細剉以水三大盞煮取一盞半去滓分温三服杜仲湯出聖惠方硫黄對防風又對細辛其治主脾通主腰脚防風動硫黄煩熱脚疼腰痛或嗔忿無常或下利不禁防風細辛能動硫黄而硫黄不能動彼始覺發便服此方杜仲三兩枳實一方作枳殻炒黄去穣甘草李核仁各二兩香䜴二升梔子仁十四枚右合服如上法若不解復服大麥奴湯出聖惠方大麥奴四兩甘草人參芒硝桂心各二兩麥門冬半斤右合服如上法若服此已解脾腎猶有餘熱氣或冷者宜復服人參湯出千金方人參乾薑甘草當歸各一兩附子一枚右合服如上法生麥門冬湯出聖惠方白石英對附子其治主胃通主脾腎附子動白石英煩熱腹脹白石英動附子嘔逆不得食或口噤不開或語言難手脚疼痛始覺發宜服此方生麥門冬四兩甘草炙麻黄各二兩䜴二升右合服如上法不解更服大黄湯出聖惠方大黄三兩甘草二兩䜴二升梔子仁二十枚右合服如上法頻服得下便止不下服盡若熱勢未除視瞻髙而患渴復服後方栝蔞湯若煩加細辛五兩栝蔞根湯出聖惠方栝蔞根一方作𤓰蔞大麥奴四兩甘草二兩葱白半斤䜴二升右合服如上法稍稍一兩合服之約得一升許便可食少糜動口若已解胃中有餘熱復服芒硝湯出千金方芒硝桂心各二兩通草甘草白术一兩大􅀥二十枚李核仁二十枚右合服如上法若腹脹去芒硝用人參二兩人參湯出聖惠方紫石英對人參其治主心肝通主於腎治腰脚人參動紫石英外臺云細辛人參動紫石英心急而痛或驚悸不得睡卧恍惚忘誤失性發狂昏昏欲眠或憒憒喜嗔或瘥或劇乍寒乍熱或耳聾目暗又防風雖不對紫石英紫石英猶動防風巢源云防風雖不對紫石英而能動紫石英為藥中亦有人參緣防風動人參轉相發動令人面赤痛煩熱頭項強始覺服此方人參白术各三兩甘草外臺無此味桂心各一兩細辛一兩䜴三升右合服如上法若嗔盛加大黄黄芩梔子各三兩若忘誤狂發猶未除服後方生麥門冬湯出聖惠方外臺秘要云此方治礜石發生麥門冬葱白各半斤甘草三兩人參一兩䜴二升右合服如上法温床煖覆床下著火口中嚼物使身稍汗一日便解若心有餘熱更服人參湯出千金方人參防風甘草各三兩桂心二兩生薑白术各一兩右合服如上法大黄黄芩湯一名大黄湯出千金方桔梗對紫石脂又對茯苓又對牡蠣桔梗發則頭痛目赤身體壮熱解與赤石脂同茯苓發則壮熱煩悶宜服此方大黄黄芩梔子仁各三兩葱白切一升䜴一升右㕮咀以水五升煮取二升半分三服栝蔞根湯出聖惠方海蛤對栝蔞海蛤先發則手足煩熱栝蔞先發則噤寒清涕出宜服此方栝蔞根一方作𤓰蔞甘草各二兩大黄一兩梔子仁十四枚右合服如解鍾乳法䓤白䜴湯一名香䜴飲治困失食發及飲酒過醉發方見本門乳石發下痢類理中湯出千金方服前湯不解者宜服此方人參甘草白术各三兩乾薑二兩右㕮咀以水六升煮取二升半分三服人參湯出千金方治因嗔怒太過發者方千金翼方云主散發氣短心腹絞痛不得氣息命在轉燭者人參枳實甘草各九分白术乾薑栝蔞根各六分右㕮咀以水九升煮取三升分三服若短氣者稍稍數服之葱白䜴湯出千金方礐石無所偏對其治主胃發則令人心急口噤骨節疼強或節節生瘡始覺發即服此方外臺云服麥門冬湯葱白半斤甘草二兩䜴二升右以水六升煮取二升半分三服若散發身體卒生瘡宜服梔子䜴湯出千金方治食宿飯陳臭肉及宿羮菜發者方梔子三七枚香䜴三升甘草三兩右㕮咀以水八升煎取三升分三服亦可加人參葱白露蜂房散出聖惠方治丹石發動令人體熱煩疼心躁口乾露蜂房一兩薺苨甘草生用各一兩右為散每服四錢水一中盞煎至六分去滓不計時候温服大黄丸治乳石發大黄五兩擣末大麻子五兩炒勿令焦待冷装簸箕中挼去皮取仁研如膏右合治令匀以蜜和丸如梧子大以湯飲下十丸至二十丸以宣利為度此方通暢壅秘服之尤良忌如常法烏梅湯出聖惠方治硫黄時令人背膞疼悶眼暗漠漠烏梅肉一兩微破沙糖半兩右以漿水一大盞煎至七分時時温呷大麥麨方出聖惠方赤石脂對桔梗其治主心通主胸背桔梗動石脂心痛寒噤手脚逆冷心中煩悶赤石脂動桔梗頭痛目赤身體壮熱如覺發宜温清酒飲之隨意行百餘步則解亦可服此方及前葱白䜴湯用大麥炒令汗出燥止勿令大焦舂去皮細擣絹篩以冷水和服之又方云搗去皮浄淘蒸令熱曝乾炒香為末蜜水調日三服一作米麨薑蜜飲出千金方治服散忽發動方用乾薑五兩㕮咀以水五升煮取三升去滓内蜜一合和絞頓服不瘥重作壓丹石發方用杏仁一百枚去皮尖以水二升於盆中研之絞取汁令盡以白麵二升用杏仁汁搜作餺飥還以杏仁汁煮務令極熱量性多少噉之令盡又美酒數升煮十餘沸候熱訖飲之徐令盡蓋覆安卧初覺心悶須㬰間四體輕虚一服三年不發胡豆汁方出聖濟總錄治一切石發用胡豆半升以水五盞同研生絹絞取汁每服半盞不拘時服虚弱人以意量之胡荽飲出聖惠方治乳石熱氣結滯經年數發用胡荽半斤五月五日採預收隂乾春夏採葉秋冬採根以水七升煮取一升半去滓每服一盞不計時候日三治硫黄發徧身熱出聖惠方以大麻油二合煎熟放温以銅匙抄少許啜之日三五服效治硫黄忽發氣悶方出聖惠方以羊血一合服之效治丹石發出聖濟總錄用河中石一兩燒令通赤投於童子小便内候温去石飲一盞良治一切丹石發出聖濟總錄用黄連去鬚二兩為細末以水三盞浸經一宿去滓每服半盞時飲之治一切石發出聖濟總錄以冬𤓰生去皮研爛四兩以水五升煮取二升去滓分温三服早晨日午近晚各一服治乳石發出聖濟總錄用枸杞白皮半斤剉碎以水五升煮取三升空心任意服之又方出聖濟總錄用薺苨半斤細剉以水五升煮取三升空心飲之术對鍾乳术發則頭痛目疼或舉身壮熱解如鍾乳法附子對白石英赤石脂附子發則嘔逆手足疼體強骨節痛或項強面目發腫者出聖恵方飲酒服麨自愈若不愈與白石英同解宜服大黄湯方見本類桔梗對赤石脂下人參對紫石英人參發則煩熱頭項強與紫石英同解牡蠣發則四肢壯熱心腹煩悶極渇解與赤石脂同乾薑無所偏對白石英發先腹脹後發熱石硫黄發通身熱兼腰膝痛礜石發徧身發熱兼口噤茯苓發頭痛桔梗發頭面熱牡蠣發頭痛而煩滿熱海蛤發心中發熱以上除海蛤外宜浴法紫石英發乍寒熱赤石脂發心噤身熱目赤以上二味宜酒又云赤石脂紫石英發宜飲酒得酒即解凡藥發或有宜冷或有宜飲酒不可一槩也石硫黄礜石發及桔梗牡蠣茯苓發宜浴白石英亦可小浴飲不宜浴礐石發宜用生熟湯茯苓發熱多攻頭即以冷水洗身浴法初熱先用煖水後用冷水浴時慎不可洗頭垂沐可以二三升灌之凡藥宜浴便解即佳不瘥可餘治之又法寒食散發者由草藥氣力易盡石性沉滯獨住胃中故令數發欲服之時以絹袋盛散一匕着四合酒中塞其口一宿後飲盡之其酒用多少量性節度自如舊法此則藥石之勢俱行石不住胃中何由而發事甚驗也治發動數患熱因壓藥下之方用猪腎脂一具不令中水以火炙承取汁適寒温一服三合每日夜五六服多至五六升二日稍隨大便下又方用肥猪肉臛一升調如常法空腹頓服之令盡少時腹中雷鳴鳴定藥下隨下以器盛取用水淘得石不盡更作如前服療石發熱盛甘草二兩生犀角一兩半屑萎㽔三兩右切以水四升煮取一升半分服效常防備熱發方麥門冬三兩去心甘草一兩人參三兩右搗篩蜜和丸如彈丸大日服三丸良治藥發熱困千金翼云凡散數發熱無賴下去之又云諸丹及金石等用同之用黍米三升作糜以煎成猪脂一斤和令調宿不食旦食之空心服令飽晚當下藥神效不盡熱發更合服之治乳石發動忽大熱多欲就卧冷地又不得食諸熱麯熱酒方用五加木根葉皮剉暴二兩粗搗篩每服四錢水一盞煎至七分去滓温服蜂房湯治乳石發熱服此下石用露蜂房三兩炙剉碎以水三盞煎至一盞去滓頓服若不定隔三五日再服其石當從小便中下如細砂砂盡即住服朴硝丸治金石發熱及諸熱用朴硝一味鍊成半斤研粉鍊蜜丸如梧桐子大每服三十丸食後蜜水下服金石經年覺身中少熱即以此丸壓之每夜卧時服三十至四十丸取胷膈凉為度若有時患發者取朴硝粉一匙空心水調服之以利為度凡朴硝取色白而不着風者佳色黄者傷人治丹石發熱以菰根和鯽魚煮作羮食之三兩頓即瘥若發急遍身熱如湯火或氣結不識人時倒口噤不開不自覺知者以熱酒隨其性灌之卒不得下者當折齒灌之咽中寒盛酒入必還出但灌勿止半日許以酒下氣徹乃蘇酒卒不下者難可救矣治服散卒發動困篤凡服五石護命更生散及鍾乳寒食散失将和節度皆致發動其病無所不為若發起倉卒不以漸而致者皆以散勢也宜及時救解之若四叚身外有一切痛違常者用冷水洗數百遍熱氣所衝水漬布巾隨以揩之又水漬冷石以熨之湏飲煖酒逍遥起行将冷太過發則多壮熱以冷水洗浴然後用生熱湯五六石浴之已食少煖食飲少熱酒行步自勞将熱太過發則多心悶時食少冷食瘥若夏月太熱時散發動多起於渴飲多所致以水和少麺服不瘥復作以瘥為度治藥發熱困用肥猪肉五斤入葱白半斤薤半斤合煮治如食法宿不食旦服之令盡不盡明日更服療丹石發動以含水藤中水飲之治服丹石人發動舌乾欬𠻳出本草用冬月葵葅汁每食後飲一盞便卧少時治大人丹石發動出本草以臘雪小温服之治藥石發動熱氣奔犯出本草用菉豆生研絞汁服服赤石脂發則心痛飲熱酒不解治法出本草用葱䜴綿裹水煮飲之治丹石發動不下食出本草用甖粟子和竹瀝煮作粥食之極美治服丹石人熱法出本草用桑耳和葱䜴作羮服之主金石藥發出本草以麥門冬去心六兩人參四兩甘草一兩炙三物治下篩蜜丸如梧桐子大每服一十丸日再米飲下普濟方卷二百六十
