body:
  text: 普濟方卷三百六十四明周王朱橚撰嬰孩頭眼耳鼻門眼生翳膜附論夫眼是腑臟之精華肝之外候而肝氣通於眼也小兒臟腑積熱熏漬衝發於眼初覺熱痛熱氣藴積變生障翳熱氣輕者生白翳結聚小者如黍米大者如麻豆隨其輕重生翳重者乃至兩三層也若生翳而白障者是病重極徧覆黒睛滿眼悉白則失明也其障有輕者黒睛邉㣲有白膜來侵黒睛漸染散漫若不早治則滿眼併生白障又眼翳暈者五臟煩壅攻於肝也或者内傷於風熱赤澁痛或腦熱下流或斑瘡入眼侵黑睛者是也車前子湯治小兒肝熱眼生翳膜或生血輪腫脹車前子防風去叉甘菊花甘草炙剉人參菥蓂子青葙子各三分梔子仁黄連去鬚各半兩右麄搗篩毎服一錢水一盞入淡竹葉七片煎至五分去滓温服日三量兒大小加减决明丸治小兒肝臟壅熱眼生翳障决明子車前子菊花川芎宣連當歸大黄紫参各等分右為末煉蜜丸如小豆大三嵗三十丸燈心湯下食後一方煎桑枝湯麥門冬熟水亦可以意加减服之㽔仁丸治小兒熱盛翳膜侵睛兼赤眼疼痛并眼生赤翳􅅋仁湯浸去皮搗一兩半肝炙一具梔子仁黄芩去黒心黄連去鬚各半兩升麻决明子各三分細辛去苖葉一分右為末煉蜜丸如菉豆大每三丸至五丸温水下早晨日晩各一服更隨兒大小加减一方無黄芩有羚羊角屑名兎肝丸龍腦飲治小兒肝受病目昏漸生翳膜散漫侵睛因此失明湏内外治之龍膽鈎藤土𤓰根茯神去木各半兩甘草炙桑根白皮炙防風去叉各一分右麄搗篩毎一錢水一盞入􅀥半枚同煎至六分去滓分作二服量兒大小加减早晩服鎻肝散治小兒痰熱退翳膜一名鎮肝散胡黄連梔子仁各一兩甘草炙馬牙硝青葙子各半兩以上各為細末次入真珠牛黄並研各一分右都拌勻細研毎服一錢水八分荆芥薄荷各少許煎四分去滓温服食後旋覆花散出聖惠方治小兒從下生赤膜上漫黒睛旋覆花桑根白皮剉羚羊角屑赤芍藥𤣥参以上各一分甘草半分炙㣲赤剉黄連半分去鬚右搗為散每服一錢水一小盞入竹葉七片煎至五分去滓日三四温服量兒大小加减真珠膏出聖惠方治小兒熱風眼生翳膜真珠末龍腦􅅋仁湯浸去皮膩粉朴硝青鹽硃砂以上各一分右研如粉酥和如膏毎㸃如黍米大日三四度㸃之㽔仁煎㸃方出聖惠方治小兒眼生翳膜瞳人昏昧㽔仁一分湯浸去皮黄丹半分井鹽半分黄連末一兩龍腦半錢麝香一錢蜜五兩右除麝香龍腦蜜外先将㽔仁等都細研以水一大盞入蜜同煎令稀稠得所用新綿濾去滓入麝香龍腦末調勻入甆器中盛每用銅筯㸃少許日兩度神効羗菊散出全嬰方治小兒肝臟壅熱眼生膜翳及治赤眼班瘡毒羗活防風山梔子各一分甘草菊花白蒺藜炒去刺各半兩右為末三嵗半錢蜜湯調下食後日三服大小以意加减通神散治小兒斑疹毒氣入眼雲翳失明石决明燒粉一分硼砂一錢粉霜一錢片腦一字硃砂半錢右研勻毎用一字乳汁調隨左右耳灌之日三次黄芩湯出聖惠方治小兒五嵗以下肝臟熱毒目生丁翳黄芩去黑心升麻甘草炙剉各半兩萎􅅋𤣥参犀角鎊各一分右麄搗篩毎一錢水七分煎四分去滓分温二服量兒大小加减日三四服黄芩散出聖惠方治小兒眼生翳膜體熱心煩黄芩决明子防風去蘆頭川升麻大黄剉㣲炒甘草炙㣲赤剉以上各一分右搗為散毎服一錢水一小盞入淡竹葉七片煎至四分去滓温服日三四服量兒大小加减羖羊角散出聖惠方治小兒眼生白翳羖羊角屑川大黄剉㣲炒桑根白皮剉真珠末甘菊花以上各一分甘草半分炙㣲赤剉右羅為散毎服温水調下半錢日三四服量兒大小加减苦竹葉散出聖惠方治小兒眼生翳膜下垂苦竹葉半兩知母川升麻川大黄剉㣲炒甘草炙㣲赤剉梔子仁以上各一分右為細末三五嵗者毎日於食後温淡漿水調下半錢稍大以意加之龍腦膏出聖惠方治小兒眼赤生翳膜龍腦細研麝香細研膩粉􅅋仁湯浸去皮黄連去鬚以上各半分馬牙硝半兩右搗為散都研令勻加白蜜四兩同於甆瓶中宻封頭於炊飯甑内蒸飯熟為度每日三四度以銅筯取少許㸃之蟬青煮肝散治小兒疳氣斑疹雲昏翳膜一切病眼榖精草去土蟬殻去嘴足土定粉蛇蜕皮長二寸石决明各等分右為細末毎服二錢猪肝二兩竹刀批開掺藥了捲麻扎定米泔煮熟分三五次熟鹽細嚼煮肝湯送下如瀉加定粉半兩决明子散治小兒眼赤或生翳膜或眼常合不開决明子車前子梔子仁防風去义黄連去鬚各一兩半右為散毎服一字至半錢搗生猪肝投熱湯取汁調下早晨日晩各一服更量兒大小加减青葙子丸出聖惠方治小兒眼有翳膜遮睛青箱子蚺蛇膽熊膽馬牙硝各半兩龍腦半錢右搗為末煉蜜丸如菉豆大每服以温水研化五丸日三四服量兒大小加减石决明散治小兒眼生翳膜石决明一分搗研令細龍腦半錢膩粉一錢黄丹一錢麝香半錢右同研極細毎於臥時取少許㸃之還明丸出全嬰方治小兒疳眼白膜遮睛并雀目夜明沙井泉石榖精草蛤粉各等分右為末煎黄蠟丸如鷄頭大三嵗一丸猪肝一片切開嵌藥在内麻扎定沙瓶内煮熟先熏眼後食之煮肝散治小兒疳眼翳膜沙澁黄連去鬚沙参𤣥精石决明子右等分搗羅為散毎半錢用羊子肝一片箆子切作縫子掺末在内線繫入沙罐子内垂掛勿令到底以米泔煮熟食羊肝毎一片分作兩服或三服量兒大小與食真珠膏醫方妙選治小兒眼久不瘥􅑩􅑩不見物真珠末甘菊花末香䜴炒研末井泉石各一分右研勻用白蜜一合鯉魚膽一枚同前藥慢火熬成膏次入好龍膽一錢拌勻毎用少許時時㸃眼中治小兒眼生障翳及努肉宜㸃此方出聖惠方龍腦珊瑚真珠末石决明以上各等分右研如粉以白蜜一合相和更研令勻以甆器盛不計時候相與㸃之即瘥治小兒眼生翳膜出經驗良方白菊花榖精草菉豆皮各等分右為細末用猪肝擂細為丸如菜子大每服三五十丸茶清送下或猪肝蘸藥喂之惡實散治小兒風翳散漫侵瞳人及風疳眼惡實木通剉蒺藜子炒去角各一兩右為散毎服半錢以水搗羊子肝汁調早晨日晩各一服更量兒大小加减治小兒眼生黑翳覆瞳子方出聖惠方空青一分貝齒一枚白􅈨一錢右研令細取如黍米大㸃翳上日再㸃之治小兒出瘡疹眼内有雲翳方輕粉黄丹各等分右用竹筒吹在耳内左眼有翳吹右耳内右眼有翳吹左耳内即退至妙立消膏出活幼口議治小兒眼患初作粟翳浮翳或來或去漸發差大侵睛减明用雪白食塩生者少許湏以浄器以大燈心㸃塩輕手指定浮翳就􅀈凢三五次㸃見効令子勿驚恐不痛疼亦不礙人多投之勿慮屢用尅効珊瑚散出聖惠方治七八嵗小兒眼有麸翳未堅不可妄傳藥以㸃用珊瑚細研如粉每日少少㸃之日三立愈治小兒目睛上白膜出直指方用白礬一分水四合熟銅器中煎取半合少許白蜜調之以綿濾過毎日三度㸃一芥子大貝齒入龍腦方出聖惠方治小兒黒花眼翳澁痛用貝齒一兩燒作灰研如麫入少龍腦㸃之又去目翳貝子十枚燒灰細研取一胡豆大着眼上卧如炊石米乆乃减息肉者加真珠與貝齒等一方单用貝齒研如粉㸃眼赤及翳治小兒眼生白膜方出聖惠方用雄雀糞以人乳汁熟研傅翳上當漸漸消除又方出聖惠方治小兒眼有障翳用馬腦半兩細研如粉毎用時取如黍米大㸃在翳上又方出聖惠方用楸葉三兩嫩者爛搗以紙裹更将泥重包着猛大燒之候泥乾即取去泥入水少許絞取汁以銅器盛慢火漸漸熬之令如稀餳即貯於甆合中每日一度㸃一菉豆許又方用書中白魚為末㸃少許翳上即愈又方用露蜂房一兩以水二盞煮五七沸去滓温温洗之即瘥洗肝散治眼生翳膜視物難明或尋常赤痛人参一錢荆芥穗半錢生地黄一錢酒浸當歸一錢甘草二錢赤芍藥一錢大黄半錢煨茯神一錢大澤草半錢右為末毎服半錢清米泔調下蒲黄散治小兒肝熱上攻眼生翳膜蒲黄一分黄連白芨各半兩黄蘖去麄皮二錢赤小豆一兩右件同為細末每用一錢井花水調作膏子封貼􅇟上日一易之煮肝散治小兒肝眼翳膜羞明不見物服十日必退下如大人雀目只一服効夜明沙青蛤粉榖精草各一兩右件為末每服一錢五七嵗以上二錢㹠猪肝一匙大批開糁藥在内攤勻麻纒定淘米泔水半碗煮肝熟取出肝湯傾碗内薰眼後温湯分肝三服嚼喫並用肝湯下一日三服不拘時候大人雀目空心服至十服便見物如患多時日三服治㿀後小兒眼有翳膜煎竹葉湯同沙糖化下㵼青丸一兩丸漸至㣲利為効目偏視通睛附論夫目偏視者皆由心肝臟風邪所攻瞳人不正顧視常偏宜服羚羊角散牛黄散治之小兒通睛外障者此眼初患之時皆因失悞築打着頭面額角倒蹙撲下令小兒肝受驚風遂使眼目通睛宜服牛黄丸犀角飲子通頂石南散立効歌曰嬰兒兩目患睛通欲擬看西又着東振着腦中睛帯轉肝中受得内驚風牛黄犀角頻硏灌細搗石南吹鼻中乳母牽連湏忌口數朝方得舊時容方羚羊角散治眼風邪所攻瞳人不正顧視常偏宜服羚羊角屑一兩半犀角屑蜜䝉花各一兩龍腦研牛黄各一分研天竺黄研甘草炙㣲赤硃砂研各半兩防風人参沙参各去蘆赤芍藥甘菊花細辛酸􅀥仁㣲炒蔓荆子􅅋仁湯浸去赤皮𤣥参各一兩右為散入研了藥更研令勻每於食後以竹􅄋湯調下二錢牛黄散治心肝臟風熱攻眼偏視宜服之牛黄一錢細研人参防風各去蘆犀角屑甘菊花天麻槐子芎藭車前子决明子蔓荆子黄耆剉各半兩硃砂一分細研龍腦一錢研甘草一分炙赤羚羊角屑半兩右為末入研了藥同研令勻每於食後以竹葉湯調下一錢臨卧再服牛黄丸牛黄白附子炮肉桂全蝎芎藭石膏各一分燒通赤白芷藿香各半兩硃砂二錢麝香一分右為末煉蜜丸芡實大三嵗以下毎服一丸薄荷湯化下乳食後乳母忌酒麪猪肉犀角飲子犀角一兩射干草龍膽各半兩鈎藤三分黄芩五分人参二兩茯苓甘草各一分遠志右為末以水一盞散一錢煎至五分食後去滓温服牛黄膏治嬰兒雙眼睛通者欲觀東邉則見西若振掉頭腦則睛方轉此肝受驚風冝服牛黄一錢犀角二錢金銀箔各五片甘草一分右為末煉蜜丸菉豆子大每服七丸用薄荷湯吞下食後服通頂石南散石南一兩藜蘆黄二分𤓰􅎞五七箇右為細末毎用一錢粳米少許一日兩度通頂為妙眼瞼生贅附論夫小兒瞼中生贅外障此眼初患之時皆因脾胃壅熱上衝於眼瞼眥之中致令生肉初時即小如麻米後三五年間如豆大摩隠瞳人赤澁淚出切莫鈎割散去瘀血後乃熨烙即効宜服搜胃散補肝丸㸃曽青膏即瘥歌曰小兒眼瞼贅雖稀學療之流也要知初即小如麻米大日深漸長豆珠垂亦湏割烙流瘀血斟量湯藥在臨時若逢髙貴嬌兒女㸃藥還湏得妙竒方搜胃散大黄桔梗黑参防風車前子細辛芒硝黄芩各等分右為末以水一盞散一錢煎至五分食後去滓温服補肝丸芎藭藁本五味子細辛各一兩羗活一兩半茺蔚子二兩知母右為末煉蜜丸如梧桐子大空心茶下十丸曾青膏曾青一兩龍腦少許乳香頭牙硝琥珀真珠各一分右研如麫入酥和為膏每至夜後㸃眼青肓外障附論夫眼無障翳而不見物者謂之青肓此由小兒臓内有停飲而無熱但有飲水停積肝也目是五臓之精華肝之外候也肝氣通於目肝為停飲所積臟氣不宣通精華不明審故不赤痛亦無翳而不見物名曰青肓也小兒青肓外障此眼初患之時於母胎中忽受驚邪之氣令生後五七嵗以來便乃患眼其初患之時夜卧多驚嘔吐痰涎黄汁漸漸失明還從一眼先患後乃相牽俱損致使然也初覺便宜将息急療服牛黄丸犀角飲子立効歌曰胎中受得風邪氣五臟相連各有名天弔只因心領得目肓肝細是前成痰涎嘔吐黄汁甚神彩時時忘與驚兩眼若能救見物服藥良醫始見能方牛黄丸牛黄牛膽鈎藤各半兩羚羊角藿香人参麝香各一兩虎睛少許右為末煉蜜丸如梧桐子大空心薄荷湯下三丸七嵗以上五丸犀角飲子出龍木論犀角防風芍藥黄芩各一兩羚羊角知母人参半兩右為末以水一盞散一錢煎至五分食後去滓温服羊子肝散出聖惠方治小兒青肓不見物􅅋仁一分湯浸去皮防風一分去蘆頭香䜴一分炒黄井泉石半兩細研右搗為散用羊子肝一片并藥同煮肝令爛四五嵗兒分作二服新汲水下甚者不過三四服隨兒大小加减菊花散治小兒青盲外障及雀目甘菊花一分牯牛膽一枚隂乾寒水石一分雌鷄肝一枚隂乾右搗為散取猪肝血調下半錢不過三五服驗兼退翳治小兒青盲􅑩􅑩不見物方出聖惠方真珠半兩研如粉白蜜一合鯉魚膽一枚右相和煎一兩沸候冷㸃眼中當淚出藥歇即効治小兒青盲不見物方出聖惠方鼠膽鯉魚膽各二枚取汁右相和㸃眼用之即効治小兒青盲腦痛方出聖惠方鯉魚腦鯉魚膽各等分右為相和令勻㸃眥中日三四度神効又方出聖惠方用猪膽一枚㣲火上煎之良久候冷㸃如黍米大効疳眼外障附論夫小兒疳眼外障此眼初患之時皆因腦熱頭上有瘡或因雀目多時瀉痢潜衝疼痛淚出難開膈間熱氣肝風入眼初患時時痒澁撏眉咬甲揉鼻致令翳生赤腫疼痛淚出難開間更白膜遮瞞怕日合靣而卧不喜􅎑頭此疾不宜燒灸頭靣恐損眼也尤忌㸃眼即宜服煞疳散退翳丸立効歌曰小兒疳眼有自來腦熱肝風變禍灾或因瀉痢潜衝上雀目多時亦是媒初患之時饒痒澁病深生翳腫難開手撏頭髮兼揉鼻怕見光明頭不􅎑拙計便将頭靣灸相遭疼痛實堪哀庸醫不觧輕輕㸃疼看瘡痕痛不才欲得痊瘥求合道服藥如風捲霧開方生乾地黄湯治小兒疳蝕眼患閉合不開羞明怕日及至開眼有如内障朦䑃失所宜服生乾地黄熟乾地黄各一兩酒洗麦門冬去心半兩川當歸一分枳殻米泔浸一宿麸炒秤一分杏仁湯泡去皮尖麸炒令赤防風甘草炙赤芍藥各一分右㕮咀每一大錢水一小盞黑豆七粒煎黑豆熟去滓通口服一方無黒豆退翳丸出龍木論黒参防風人参茯苓細辛桔梗車前子黄芩石决明各一兩半右為末煉蜜丸如梧桐子大空心茶下十丸煞疳散出龍木論防風龍腦牡蠣各二兩白芷五味子細辛各一分右為細末每日食前米飲調下一錢如聖散方出王氏博濟方治小兒因瀉痢日久眼生翳膜并疳眼退翳蛇蛻兩條用紙燭焼灰研穀精草一兩蝉蛻去土一分附子去皮臍生二錢石决明刷浄一分胡粉研四錢右為散每服一字半羊子肝一片批破掺末用麻皮線纒米泔煮熟先熏眼後與食量大小加减如未能食研灌之井泉石散出醫方妙選治眼疳邪熱攻於眼目漸生障翳致損睛瞳井泉石一兩石决明半兩甘菊花半兩夜明沙半兩㣲炒黄連半兩去鬚晩蚕沙半兩㣲炒右為細末每服一錢用米泔一盞入生猪肝少許煎五分肝爛為度放温時時服乳食後二草散治小兒疳眼睛疼及赤眼腫痛甘草龍膽草當歸細辛各一分右為末三嵗一錢水半盞沙糖少許煎三分去滓食後服三黄丸亦治疳熱眼若因瀉痢後疳昏澁大便不實者六神丸六甲丸并暖疳藥亦可服之撥雲膏治小兒風熱疳氣攻眼赤痛障翳桃仁杏仁各四枚並去皮尖雙仁􅅋仁郁李仁各五枚去皮右同生研細濾入蜜龍腦麝香膩粉各少許冄研極勻㸃之鷄肝散治小兒疳見明不得不赤不腫不痛但開眼不得者此藥能治之川烏頭大者一枚生去皮好坯子二字右為末五嵗一錢雄鷄肝一具洗浄去筋膜竹刀子薄切開掺藥在内箸葉裏麻皮扎定用第二次米泔半盞磁器中煮熟放冷切作片子空心臨卧嚼喫将煮肝湯送下又有腦熱閉目者鼻内乾燥通頂散可服神光湯治小兒腦熱疳熱閉目不開并腦疼以川大黄一分粗末水半盞浸一宿一嵗分作兩服餘滓􅂗頂上乾易之通頂散亦治瘡入眼外障附論夫小兒班瘡入眼外障此眼初患之時不論大小湏患班瘡一度瘡子患時覺入眼中即湏将息慎忌若不忌口将息即便疼痛赤而澁怕日難開腫硬翳如銀色此為熱氣在肝上衝於眼肝膈壅毒致成障翳宜用秦皮湯洗之然後服凉肝丸亦不宜鎌冼出血㸃藥挑撥恐損眼候疼痛定後即㸃退赤藥歌曰夫為人子既生身湏患斑瘡不可論熱氣透肝衝上眼難開皮腫且羞明疼時淚出翳如銀不要强将兩手親却恐呌啼傷破後湏知此語是慇懃秦皮煎水須頻洗眼藥應教㣲㸃勻謹省若能依得此遺君終老是全人方凉肝丸防風一兩黄芩茺蔚子黒参大黄知母各一兩人参茯苓各一兩半右為末煉蜜丸如梧桐子大空心茶下十丸秦皮湯秦皮二兩秦芁細辛防風各一兩甘草半兩右為末以水一盞散一錢煎三五服熱淋洗眼立効鱔血方治小兒豆瘡入眼生翳用鱔魚繫其尾而垂之從頂下割破些少取生血㸃得白鱔尤佳若翳已凝即用南硼沙以燈心蘸㸃仍用威靈仙仙靈脾等物為末每一錢第二次米泔調服消翳丸治小兒斑瘡眼生障翳硃砂指甲末不拘男子婦人先入水内淨洗指甲拭乾用木賊草打取細末右件等分再同研令極細以露水搜和丸如芥子毎用一粒於夜卧時以新筆蘸水㸃在眼内夜半更㸃一粒縁目生瘡附論夫小兒縁目生瘡者由風邪客於瞼眥之間與血氣相摶挾熱則生瘡浸漬縁目赤而有汁時瘥時發世云小兒初生之時浴而不浄使露穢浸漬瞼眥後遇風邪發則目赤爛生瘡難瘥瘥後還發成􅐄也方犀角散治小兒赤眼疼痛縁目生瘡難開澁痛及有熱淚犀牛屑羚羊角屑防風去蘆頭𤣥参黄芩黄耆剉以上各一分柴胡半兩去苗川大黄半兩剉㣲炒馬牙硝半兩右搗為散毎服一錢水一小盞煎至五分去滓温服日三四服量兒大小増减黄連散治小兒肝熱衝眼縁目生瘡黄連半兩去鬚赤芍藥􅅋仁湯浸去皮木通剉决明子梔子仁黄芩甘草炙㣲赤剉以上各一分右搗為散毎服一錢水一小盞入竹葉七片煎至五分去滓温服日三四服量兒大小加减細辛丸治小兒縁目生赤瘡及生翳細辛黄連去鬚蘆薈桑根白皮剉甜葶􅏣隔紙炒令紫色以上各一分􅅋仁半兩湯浸去皮龍腦半錢細研右羅為末煉蜜丸如菉豆大每服以温水下七丸日三服三嵗已上即服五丸白礬煎治小兒縁目及眥爛作瘡腫痛白礬一分燒為灰黄連半兩去鬚青錢十文防風三分去蘆頭朴硝三分地黄汁一合白蜜三令右搗為散用綿裹内一青竹筒中入地黄汁及蜜以絹油单蓋𦂳繫筒口於炊飯内蒸之候飯熟即瀉出以綿濾過日三四度取少許􅂗之黄連丸治小兒縁目及眥爛作瘡黄連半兩去鬚川大黄剉㣲炒細辛龍膽去蘆頭防風去蘆頭𤣥参以上各一分右羅為末煉蜜丸如菉豆大每服以熟水下五丸日三量兒大小加减龍腦煎治小兒風熱致縁目生瘡赤痛龍腦半錢川芒硝一分膩粉半分蜜三兩黄丹一分右同入筒内以重湯煮一日用綿濾過於甆瓶内盛每日三四度㸃之黄連煎治小兒眼赤痛及縁目生瘡黄連半兩去鬚童子蚘蟲五條吐出者龍腦半錢細研蜜二兩右除龍腦外入在甆瓶中於炊飯中蒸候飯熟為度以綿濾去滓取汁入龍腦令勻日三四度㸃之梨汁煎治小兒熱毒衝眼縁目生瘡熱疼不止大鵝梨一枚去皮核黄連末二錢龍腦一錢右先将梨爛研絞出汁綿裹黄連末於梨汁内浸半日入龍腦令勻日三五度㸃之猪膽煎治小兒縁目生瘡腫痛猪膽一枚龍腦一錢馬牙硝半錢右研令勻内猪膽中牢繫懸於旺方隂乾取出内甆合中每以麻子許水化日三四上㸃之又方黄連半兩去鬚杏仁一分湯浸去皮尖細研膩粉半錢右以綿褁冷水一小盞浸一宿後毎日三五上㸃之又方黄蘖黄連去鬚梔子仁各半兩右細剉以水一大碗青汁一分煎十餘沸綿濾過温温洗之日三兩度用之治小兒縁目眥爛作瘡方青錢二十文青鹽一兩右相和先以濕紙數重包又用泥褁候乾於猛火中燒令赤放冷剥去泥紙搗羅為散每取一菉豆許以津調􅂗瘡上車前子丸治小兒肝臟壅熱眼生瘡翳車前子甘菊花芎藭黄連去鬚當歸切焙各一分大黄􅊜紙裹煨黄芩去黑心各半分右為末煉蜜丸如菉豆大每服五七丸量兒大小加减煎桑枝湯下耳疾緫論夫耳者宗脉之所聚腎氣之所通小兒腎臟盛而有熱氣上衝於耳津液壅結則生膿汁亦有因沐浴水入耳内水濕停積摶於血氣藴結成熱亦令耳膿汁出皆謂之聤耳久不瘥則變成聾也聤耳者常有黄膿出是也膿耳者常有紅膿出是也伍耳者裏靣疳息是也纒耳者常有白膿出是也囊耳者裏靣虚明時有青膿出是也雖有五般其病源一也皆由風水入耳而内有積熱上壅而成此患若不速治久則成聾聤耳者小兒胎氣不充實關竅不通利蓋有禀賦不足胞養有虧臓傷腎經腎為根本水之一數也外應耳孔或云水入耳或曰乳食入耳要之皆非兒生氣脉根壮臟腑固實雖水及乳入耳必不作此自是氣不充脉不實使之然也兒無補腎之方但得清心肺而已初生之兒而有作尤甚重也卒難療理用藥傅掺少愈愈而復發至於過周與服黄耆白茯苓人参白芍藥川當歸熟地黄甘草等分作湯劑以固其内内若固實不必掺𫝊亦自瘥愈掺方用壁上蜘蛛一枚瓦上火乾坯子白礬腦子麝香各少許同研令勻雞羽引入自愈耳聾附論夫小兒耳聾者是風入頭腦所為手太陽之經入於耳内頭腦有風邪隨氣入其脉盛與氣相薄風邪停積則令耳聾也方通鳴散治小兒耳聾病菖蒲一寸九節者遠志去心各一兩柴胡去苗麦門冬去心防風去蘆頭半兩細辛一錢甜葶􅏣一錢磁石搗為末水淘去赤汁研杏仁十四箇浸去皮尖右為細末研勻每服半錢葱白湯調下日二服大小加减食後細辛膏治小兒耳聾或因腦熱或因水入或因吹著細辛防風川大黄剉㣲炒黄芩以上各一分川椒十粒去目䗶半兩右為剉用清麻油二合煎紫色濾過下䗶候消為膏每日三度用一大豆大㸃於耳中治小兒風熱兩耳聾鳴方遠志去心菖蒲柴胡去苖甘草炙㣲赤剉以上各半兩磁石三分搗碎水淘去赤汁麦門冬半兩去心焙右羅為散每服以葱白湯調下半錢日二服量兒大小加减治小兒耳聾不瘥方生地黄一寸半杏仁七枚湯浸去皮巴豆七枚去皮鹽半錢右同搗堪為丸即丸如􅅋核大用髪薄裹内耳中日一易之若耳内痛有水出即去藥未効再用之又方杏仁湯浸去皮甜葶􅏣一分鹽各等分右研如膏以少許猪脂和合煎令稠以綿裹如㽔核大塞耳中日一易之又方箆麻子一枚去皮棗肉七枚右搗如膏毎取㽔核大綿裹内於耳中日一易之又方取葱白於煻灰中煨令熟以葱白頭内耳中三易之又方搗芥子令爛以人乳和綿裹少許塞耳中日易之又方菖蒲末松脂烏油麻各半兩右相和搗熟綿裹如豇豆大塞入耳中日一易之又方菖蒲末一分杏仁半兩湯浸去皮尖双仁研如泥右相和以人乳調每用少許綿裹内於耳中日易之治小兒耳聾立効方取自死白頸地龍内葱葉中麺裹蒸令熟以汁􅄋著耳中不過三度瘥聤耳附論夫耳者宗脉之所聚腎氣之所通小兒腎臟盛而有熱氣上衝於耳津液壅結則生膿汁亦有因沐浴水入耳内水濕停積摶於血氣藴結成熱亦令膿汁出皆謂之聤耳久不瘥則變成聾也方紅藍花散治小兒聤耳病不瘥紅藍花洗黄栢各一兩烏魚骨黄芩各半兩雄黄研細半兩麝香一分研右研細以綿纒揾藥塞耳中日再換