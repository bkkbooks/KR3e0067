body:
  text: 普濟方卷二百十八明周王朱橚撰諸虚門補虚益氣附論夫形不足者温之以氣精不足者補之以味形精相感氣血生化則榮衛循流不失其度食飲不節起居靡常嗜慾之過形勞精揺則精氣將耗虚損之疾由是而生治法當補虚益氣方沉香續斷丸出聖濟總録方治骨髓傷敗補虚益氣沉香剉續斷牛膝去苖酒浸切焙石斛去根蘹香子炒補石脂㣲炒畢澄茄山茱萸防風去蘆熟地黄焙白茯苓去皮杜仲去皮炙肉蓯容酒浸焙各三分桂去皮大􅀥十枚附子三十枚一方不用右㕮咀以水八升煑取三升去渣分四服雙和湯治男子諸虚百損婦人血氣勞傷姙婦養胎益血進食止逆及因病後一切正氣不復補虚活血止痛方見本門補勞傷虚損類補虚方猪䐗一具人參五両蜀椒一両亁薑二両半葱白七両白粱米五升千金翼用粳米右㕮咀諸藥令相得和米内䐗内縫合勿令泄氣取四斗半水緩火慢熬煮空腹食之大焦兼下少飲附子天門冬散岀聖濟總録益氣補不足却老延年附子泡去皮臍二両石菖蒲木香桂去粗皮天門冬去心亁薑炮各一両右為散毎服一錢匕温酒空心服人參柴胡飲治大人小男虚勞瘦弱咳嗽延喘肌熱盜汗地骨皮人參柴胡茯苓芍藥甘草各五錢右為細末毎服二錢水一鍾青蒿七葉同煎至六分去渣温服不拘時日進二服益氣丸治言語損氣懶言補益氣麥門冬去心人參各三錢橘皮去白桔梗各半両五味子一錢去子右為末水浸油餅丸如鷄頭大毎服一丸細嚼津唾嚥下地黄酒治虚羸令人充恱益氣力輕身明目生地黄大者一石二斗搗絞取汁四斗杏仁一斗去皮尖二仁者熬黄搗末大麻子一斗熬搗末糯米一石泡亁上麯一斗五升净刮暴乾細剉右先以地黄汁四斗漬麯待發炊米二大斗作飯冷暖如人肌酸麯汁中和之候飯清更炊米一斗酸之如法又取杏仁麻子末各一升二合半和飯攪之酸麯汁中待飯消還炊米一斗杏仁麻子末各一升二合半亦依前法酸之如此丸八酸訖待酒沸定掛泥二七日取清温服一升加至二升日再服之食令人頓能食乆服去萬病婦人服之更佳令人有子補中丸岀聖濟總録補虚益氣順三焦壯筋骨烏頭泡製去皮臍葳靈仙去苖土巴㦸天去心赤芍藥蒼术米泔浸切慢火焙乾各一両右為末酒煮糊丸桐子大毎服二十丸温酒下食前服五精煎丸治上膈多熱下臟虚冷皮膚不澤氣力乏大便秘澀或時泄痢頭旋痰喘口亁舌強益夀延年白茯苓去黑皮筋取末亁菊花炊一服時不住晒酒泡亁别取末石菖蒲石上生者酒浸三日炊二日焙乾别取末桂去皮取心乾者另研取末各四両白术切作片子白者佳天門冬去心焙人參牛膝各一升搗碎各以水井酒共一斗浸藥三日後絞取汁濾去渣於銀石器内慢火各燉成膏生黄精五觔生地黄五斤二味各搗取汁銀器内慢火熬成膏右先將下六味逐味取汁熬至半斤可住火然後將膏六味共合成三斤以前四味散藥同和勻暴亁再入膏和攪直候入盡三斤膏藥再入臼中杵五六千下丸如桐子大每服三四十丸食前用清酒或米飲下乆服有効回陽湯岀醫方集成治體虚脉中大弱食飲不進亁薑泡一錢川烏生去皮臍青皮去白一両益智仁二両附子生去皮臍各五錢右㕮咀毎服三錢生薑七片􅀥二枚煎服或少加木香亦可補氣湯出瑞竹堂方黄茋三両去蘆蜜炙人參甘草炙各五錢苦梗去蘆炒一両麥門冬一両泡去心右㕮咀毎服四錢水一鍾半薑五片煎至七分去渣不拘時温服附子丸岀聖濟總録治元臟氣衰風弱勞冷腰脚無力筋骨痛日加痿瘁飲食不化脾胃泄㵼痢疾面無顔色及傷寒頭痛附子泡去皮臍製四両沉香一両蒺藜子㣲炒去角三両硇砂五錢用漿水半斤同附子慢火煎乾右為末煉蜜和丸桐子大毎服二十丸空心温酒或鹽湯下漸加丸數乆服四倍丸岀聖濟總録補虚益氣木香一両硫黄二両水研甘草水晒附子二両泡去皮臍蘹香子㣲炒四両右為末酒煮糊為丸桐子大毎服空心鹽湯或温酒下十五丸至二十丸四補丸岀聖濟總録益氣血補元臟恱顔色栢子仁生絹袋盛何首烏切作小片肉蓯容切作小片牛膝細切生絹袋盛各三両右用酒三升春夏浸七日秋冬浸二七日取牛膝栢子仁先搗如泥次將何首烏蓯容同搗得所為丸如桐子大毎服二十丸至三十丸空心温酒下鍾乳丸岀和濟方主五勞七傷肺損氣療丈夫衰老陽氣絶手足心冷少氣髓虚腰痛脚痺體煩口亁不能食能下氣消食長肌和中安五臟除萬病兎絲子酒浸搗焙石斛去根各一両鍾乳粉二両吳茱萸浸炒五錢右為細末煉蜜丸桐子大毎服七十丸空心温酒或湯米飲下再服訖行數百歩飲温酒三合復行二三百歩覺口胸内熱稍定即食亁飯豆醬過一日食時常酒暖將息不得聞見屍穢等氣亦不可服食粗穢陳惡食初服七日内忌陽事􅂈七日後任性然亦不宜傷多服過半劑覺有功即相續服三劑終身更無所忌補氣虚逆岀千金方大􅀥三升甘皮十具亁薑二両亁地黄半斤右治下篩酒四升清􅀥三宿漉岀􅀥取酒為炊汁將􅀥肉甑㣲火熬令棗膏入釜中酒裏煎令餘二升許候甑中􅀥只留皮核在乃止火貯器中將前散及熱下覺令調大畧與糖相似以酒服二合日再此方非止補氣亦通治一切短氣並形體羸瘦甚良四君子湯岀聖濟方治勞衞氣虚臟腑怯弱心腹脹滿不思食腸鳴泄㵼嘔噦吐逆大宜服之人參去蘆甘草炙茯苓去皮白术各等分右為細末毎服二錢水一鍾煎七分通口温服不拘時入鹽少許白湯㸃亦得常服温和皮膚進益飲食辟寒邪障霧氣一方加橘紅名異功散又方加陳皮半夏名六君子湯嘔逆加藿香砂仁泄㵼加木香肉豆䓻衛生湯治虚勞強五臟除煩養夏退邪熱順血脉緩中和神志潤澤容色常服通暢血脉不生癰瘍養胃益津當歸白芍藥各四両黄芪八両甘草炙一両右為剉散毎服四錢水一鍾半煎七分去渣不拘時服入少鹽四柱散許白湯㸃亦得常服温和脾胃進益飲食辟寒邪四肢怠倦小便滑泄㵼不止臟氣虚弱者悉宜服之白茯苓去皮附子泡去皮臍木香不見火各一両人參一両右為細末毎服三錢水一鍾半薑五片入鹽少許煎至七分食前温服滑㵼不止加肉豆䓻訶子煎名六桂散一方用􅀥二枚葱白二寸同煎服又一方有白术無茯苓白术散治四肢懶倦小便不利大便帯血沉困飲食減少白术芍藥茯苓各等分右為末水煎如發熱或惡熱或腹不痛而脉疾加黄芩為主未見膿血而惡寒乃太陰而傳少陰加黄連為主桂枝佐之如腹甚痛者加當歸倍芍藥如見白膿加黄芩為主如見血加黄連為主桂枝當歸佐之温中丸温中和胃主脾腎氣虚治心腹疼痛山藥二両亁薑炮甘草炙各一両右為細末煉蜜丸如彈子大白湯化一丸食前服蒜二升剥牛乳五升牛膝一斤末蒜主冷氣力温中下氣右以蒜内牛乳中煎之候蒜消盡攪勿住手下牛膝末煎成兎絲子酒浸一宿别搗鹿茸去毛酥炙附子泡製去皮臍澤㵼石龍芮各一両巴㦸天去心桑螵蛸炒芎藭五味子覆盆子木香各半両右為末酒煮糊丸桐子大毎服三十丸空心温酒或鹽湯任下葳靈仙湯岀聖濟總録治丈夫元臟風虚氣血勞傷飲食减四肢疲乏氣劣心悸上熱下冷口苦舌亁葳靈仙酒浸去蘆頭仙靈皮剉碎羊脂伴炒􅂈防風去义人參白茯苓去黑皮𦍑活去蘆獨活去蘆各三分附子泡製去皮臍各一両柴胡去苗一両半秦艽童便浸一宿洗焙梹榔木香各三分鱉甲童便浸一宿炙黄裙襴黄芪各一両枳殻去穰炒甘草炙沉香桂去粗皮芎藭各二分蓯容酒浸切焙巴㦸天酒浸一宿去心各一両牛膝酒浸一宿切焙半夏薑汁浸一宿焙當歸酒浸一宿瓦上焙乾各三分烏藥米泔浸一宿剉焙各三分右剉如麻豆毎服五錢水一盞半薑五片羊腎半枚同煎减半入酒半合更煎三二沸去滓通口服當空心午前各一服補益紫金丸岀聖濟總録飲食無味形氣衰憊積氣上攻心膈不利身體羸瘦青蒿柴胡去苖各二両芍藥五加皮續斷石斛去根黄芪𦍑活去蘆各一両以上八味剉以無灰酒童便各二升浸至日中暴三日逐轉動日足漉岀焙亁搗羅為末其浸藥者酒存熬後藥當歸切焙牛膝酒浸切焙各一両桃仁去皮尖麩炒肉蓯容酒浸切焙各一両半地黄汁取三升以上五味除地黄汁外搗羅為末同地黄汁並入前浸藥内慢火熬時時攪轉令膏凝即住火芎藭人參白茯苓去黒桂去粗皮蛇床子炒附子炮製去皮臍卷栢去根土炒蜀椒去目並閉口炒岀汗木香厚朴去皮薑汁浸炙蓽澄茄各一両右除十二味外將十一味搗羅為末並入藥膏同煎八味拌和令勻乾不可丸即添煉蜜為丸如桐子大每服三十丸空心日午温酒服一月除百病肌膚充實顔色紅潤進飲食壯筋骨暖血海黑髭髮婦人屢經産育血海冷憊腰腹氣痛並能治之地黄沉香丸岀聖濟總録治上熱下冷五勞七傷補益氣沉香剉鹿茸酒浸去皮酥炙肉蓯蓉酒浸切焙牛膝酒浸切焙附子泡製去皮臍兎絲子酒浸一宿各二両搗爛黄芪剉岀一両熟亁地黄焙四両蒺藜子炒去角二両巴㦸天去心芎藭石斛去根木香山茱萸𦍑活去蘆頭補骨脂炒蛇床子炒人參楝實取肉桂去根皮㯽榔剉蘹香子炒骨碎補去毛安息香用胡桃肉穰二枚製各二兩右為末别取地黄自然汁七升􅀥膏四両酒三升蜜半斤酥五両於銀器中熬如膏放冷入羯羊筒骨髓半斤煉油去渣和前末杵千百下丸如桐子大毎空心温酒或鹽湯下三十丸加至四十丸豆䓻藿香湯治脾胃諸虚百損氣血勞傷陽氣衰下寒陰汗中脘停痰心腹痞悶疼痛嘔逆減食困倦泄㵼腸滑病虚損正氣不復婦人月信不勻産前後諸病一切陰盛陽虚之證並皆服之藿香葉桂花甘松各一分陳皮去白亁薑炮各五両川芎白芷白术各二両益智肉豆䓻人參縮砂仁各一両紅豆茯苓去皮官桂五靈脂枇杷葉芍藥各五錢蒼术浄炒半斤甘草炙五両半桔梗三両半當歸三両焙木香五錢厚朴薑製四両半右為末毎服二錢濃煎生薑􅀥湯調下食前日進三服或薑􅀥同煎和渣服亦妙因産病後氣不復虚勞損弱乆服効妙蓮心散岀簡易方治虚勞或大病後心虚脾弱盗汗痰壅飲食少體倦夣遺白濁滑泄人參白茯苓蓮肉各一両白术甘草炙白扁豆薏苡仁㣲炒北桔梗亁葛炒黄芪炒當歸各半両桑白皮半夏麴百合亁薑炮山藥炒五味子木香丁香杏仁去皮麩炒白芷神麴炒各一分右末毎服二錢水一大盞薑三片􅀥三枚煎七分食前服建中湯出簡易方行血補氣温榮養衞治一切勞傷腹切痛酒客不可與之其意惡甜故也芍藥六両官桂三両粉草二両右㕮咀毎四錢水一盞半薑五片􅀥三枚煎七分去滓食前温服一法湯煎成去渣入飴一匙再煎溶服男子諸虚不足腰背疼痛肉酸疼筋骨䐜脹臍下虚滿喘乏不食或勞傷過度臟腑俱傷積勞虚損肢體消瘦氣短嗜卧寒熱頭痛咳嗽喘促嘔吐痰沫手足冷面容枯小腹拘急百節盡疼夜盗汗夣寐驚悸小便滑大便頻失血虚極心忪面黑脾腎乆虚飲食不進汗病後服此調理或病後不復加黄芪一両半名黄芪建中湯産後半月毎日三服婦人血氣一切虚損或産後勞傷虚羸不食加當歸一両名當歸建中湯産後半月毎日三服今人傷寒氣痛及一切氣加烏藥香附各一両更甚者入炒茱萸半両丁壯或吐㵼狀如霍亂或冐寒失賊風入腹切痛加附子三分名附子建中湯疝氣絞痛無定處手足厥冷五内拘急而陰縮更加蜜一匕一名蜜附建中湯婦人血痛男子心腹㽲痛四肢拘急疼甚者加逺志五錢名加味小建中湯諸虚不足邪正相干寒痰咳逆咯血吐紅煩倦少力加人參半夏各半両􅀥