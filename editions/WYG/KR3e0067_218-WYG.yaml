肉蓯蓉酒浸一宿削去皺皮炙乾右藥各一両搗羅為末煉蜜為和搗二三百杵丸桐子大每日空心温酒下三四十丸蘹香烏藥丸一名金釵石斛丸岀聖濟總録治臟眞衰耗氣羸力乏脇肋脹痞滿喘急腸鳴腹痛頭目多倦膝脛痠疼肢體怠惰食無味宜服方見本門補益諸疾類桂朴當歸散治諸虚和氣血腸痛泄㵼胃口停寒婦人血海虚冷臍腹㽲痛月候不勻赤白崩漏一切脾腎虚寒之証並皆服之桂川芎當歸焙芍藥桔梗蘹香五靈脂炒良薑炒各三両厚朴三両半甘草炙亁薑三両二味同搗炒加黄芪白茯苓橘皮去白各四両右為細末每服二錢濃煎生􅀥湯調下食前服天眞丸岀儒門事親書補虚損威靈仙一両當歸五錢縮砂仁一両蓮子肉三両炒熟廣茂半両亁地黄一両酒浸甘草二両牡丹皮一両牛膝酒浸一両木香半両白茯苓一両佛袈裟男用女女用男以新水二擔洗浄血水酒浸爛為泥右為細末同搗羅為丸酒浸蒸餅為丸如桐子大每服五十丸日三服大補氣岀千金方亁地黄五両甘草秦艽各一両亁薑昆布地骨皮各四両白术桂心人參厚朴海藻各三両羊腎一具去膏四枚羊肚一具治去膏蒸右治下篩内羊肚中合腎縫塞肚口蒸極熟為度及熟木臼合搗肚腎與藥為一家曝亁更搗為散酒服方寸匕日進二服巴㦸天丸岀醫方大成治腎肝俱冷虚收歛精氣補眞戢陽充悦肌膚進飲食五味子川巴㦸肉蓯蓉兎絲子人參白术熟地黄覆盆子茴香牡蠣煆白龍骨骨碎補去皮毛益智仁右為末煉蜜丸如桐子大每服三十丸空心食前米飲下日二三服補精止汗正元丹岀聖濟總録治下經積冷補虚損益氣血壯筋骨附子炮製去皮臍阿魏醋化麫和作餅慢火炙各一分硫黄研逺志去心沉香各五錢檳榔炮剉二枚木香一分青皮湯泡去白焙蜀椒去目並合口焙去汗亁薑炮蘹香子炒桃仁去皮尖雙仁不用炒各半両右為末酒煑糊丸桐子大以丹為衣毎服十五丸至二十丸食前温酒或鹽湯下黄耆丸岀聖濟總録治下臟積冷補虚益氣澤潤肌膚黄耆剉肉蓯蓉酒浸切焙人參防風桂去粗皮天雄炒桔梗炒牛膝酒浸切焙白术芍藥白茯苓去皮附子炮製去皮臍各一両右為末煉蜜丸桐子大毎服二十丸温酒或鹽湯下空心服黄耆益損湯岀直指方治諸勞倦肉桂熟地黄半夏甘草炙各三錢石斛酒炒當歸酒炒川芎黄茋炙白术各一両白芍藥一両半木香三錢北五味子半両右剉細毎服三錢薑五片􅀥二枚食前煎服有熱加柴胡益榮丹岀瑞竹堂方治心脉結而散肺脉浮而軟餘脉如經原所自思慮傷心憂慮傷肺蓋心乃諸血之㑹肺為諸氣母心虚則血少脉弱則氣虚遂至目澀口苦唇燥舌乾甚則齒痛鼻為之不利怔忡白濁腠理不宻易感寒邪今以補氣湯補氣以養肺益榮丹滋血以助心榮衛充心肺職治諸疾自愈當歸二両去蘆酒浸切焙紫石英火煆醋淬􅁆次研細一両栢子仁炒另研酸􅀥仁去殻小草木香不見火茯苓去木桑寄生卷栢葉熟地黄洗浄酒蒸焙龍骨各一両另研辰砂半両另研右為細末煉蜜丸如桐子大辰砂為衣毎服七十丸食前麥門冬湯送下萬安丸名與山藥丸岀危氏方補下經起陰發陽能令陽氣入胸安魂魄開三焦破積聚消五榖益子宫安臟腑除胸中熱強筋骨輕身明目去冷除風無所不治補益極多服最妙七十老人服之常有非常力方見虚勞門虚勞羸疲類人參養榮湯岀醫方集成治積虚損四肢骨肉痠痛吁吸少氣行動喘小腹拘急腰背強痛心虚驚悸咽亁唇燥飲食無味陽衰弱恐憂慘慽多卧少起乆者積年急者百日漸瘦削面少顔色五臟氣竭俱可煎服又治肺大腸俱虚咳嗽下痢喘乏少氣嘔吐痰涎白芍藥一両當歸陳皮黄芪桂心去粗皮人參白术㟪甘草各一両熟地黄製五味子茯苓各七錢逺志炒去心半両右剉散每服四錢水半盞薑三片棗三枚煎七分去渣温服便精遺泄極加龍骨一両咳嗽加阿膠尤妙鍾乳散治氣極虚寒陰畏陽氣晝寐暮甚氣短息寒亦治百病令人力强能飲去風冷鍾乳亁薑桔梗茯苓細辛桂心附子人參各一両六錢白术一両防風括􅌣根牡蠣各二両半右治下篩酒服方寸匕日三漸加至二七五十以上可數服得力乃止千金翼云有冷加椒有熱加黄芩各三両枸杞還童丸岀徳生堂治肝腎俱冷眼目昏花飲食少進此藥製煉取日精月華之氣於蒼术之中有通僊之妙可益氣延年宜服之茅山蒼术一斤四両酒浸四両米泔浸四両鹽水浸四両醋浸各浸巳日將蒼术和合各一處自初伏一日為始早辰朝東曬日午南曬至晚西曬夜則露天明放至伏盡日收起不曬如遇天隂下雨收藏至晴明日再曬西枸杞子一斤曬乾另研細用右為末和勻酒糊丸如桐子大乘空心􅀥鹽湯或酒下五七十丸或米飲湯下古杭陳鑑以此常服年近九十親筆傳神不減少年餘人服之咸有神効太乙守中丹岀御醫院方治陰氣不足虚熱内生陰痿不振天門冬去心白茯苓去皮楮實子逺志去心萆薢熟亁地黄木香各一両人參地骨皮牛膝焙地膚子炒香各二両右為細末煉蜜丸桐子大毎服五十丸温酒或温水空心服下亦得加至八十丸五補湯岀千金方治五臟内虚竭短氣咳逆傷損欝悒不足下氣通津五味子桂心甘草人參各一両麥門冬小麥各一升生薑半片粳米三合薤白枸杞根白皮各一斤右㕮咀水一斗二升煑取三升每服一升日三懆者先煑竹葉一把水減一升去葉内諸藥煑之杜仲丸岀瑞竹堂方補心腎益氣血暖元臟縮小便壯力蓮肉去心四両龍骨七錢半新瓦上煆另研細益智仁破故紙炒蘹香各一両㣲炒牛膝去苖一両酒浸洗白茯苓去皮一両兎絲子四両杜仲去皮剉酒拌炒斷絲一両桃仁湯泡去皮尖浄炒一両右為細末用山藥四両炙為末打糊丸如桐子大每服五十丸􅀥湯下空心食前溶溶暖火藏減去蓮肉龍骨白茯苓加好醅酒兼糟四両連鬚葱白四両蒼术四両米泔水浸一夕切片連葱糟搗淹一宿成餅晒亁炒令熱入前藥同研瓜蔞散治盛壯之時不自謹惜恣情縱慾年長腎氣虚弱不能房多服丹石真氣旣盡石氣孤立唇口乾精液自洩小便赤黄大便乾實小便晝夜百日行當除熱補虚白茯苓天花粉宣連白扁豆人參去蘆石羔甘草節寒水石白术去蘆猪苓各等分右為末毎服二錢熱湯調服附子倉米湯岀百選方補諸虚生胃氣逐冷痰和五臟快胸膈進食止㵼泄附子一箇泡去皮臍八錢人參甘草黄芪半夏泡去七次切作片子薑製白术各半両川薑炮二錢南木香一錢半右㕮咀每服二錢水盞半入陳倉米半合同煎至八分去渣空心食前温服萆􅐺丸萆薢杜仲炒兎絲子酒浸葫蘆巴炒破故紙炒川楝子蘹香鹽炒蓮子肉各一両沉香一両半廣木香五錢右為末麴糊為丸桐子大每服五十丸空心温酒送下鹽湯亦得忌冷硬之物凝唾湯一名茯苓湯岀千金方治虚損短氣咽喉凝唾不岀如膠塞喉麥門冬五両茯苓人參各二両前胡甘草乾地黄桂心芍藥各一両大􅀥三十枚右㕮咀水九升煑取三升分温三服地黄湯治虚益氣方見腎臟門腎虚多痰唾類補中益氣通血脈填精髓用荏子可蒸令熟烈日乾之當口開舂取米食之亦可休糧下氣調中補虚用芋和魚煑食之巴㦸天丸岀聖濟總録補虚損益正氣巴㦸天去心一両沉香剉五錢山芋一両兎絲子酒浸一宿搗一両半右為細末煉蜜丸桐子大空心食前鹽湯温酒下十五丸至二十丸妙枸杞子丸岀聖濟總録益氣補精枸杞子浄一斤肉蓯蓉酒浸切焙乾􅀥肉石斛去根各半斤逺志去心六両兎絲子酒浸一宿另研續斷各五両熟乾地黄八両天雄炮製去皮臍二両右為末煉蜜和杵千百下丸如桐子大每服温酒下三十丸五日後加至四十丸十日後加至五十丸二十日後加至六十丸三十日後却減十丸至三十丸止每日空心服仙靈皮酒岀聖濟總録補精益氣仙靈皮六両剉鵞脂一両炒陳橘皮湯浸去白焙半両連皮大腹剉檳榔剉各三枚黑豆皮一合桂去粗皮一分䜴一合生薑半分葱白三莖切右剉碎以生絹袋盛用好酒一斗二升浸掛藥勿令到底煻煨火外煨一服時取岀俟空心夜卧各服一盞服此酒後紫稍花散方淋浴羊肉補真丸岀十便良方治榮衛氣澀精神昏困肌肉羸瘦全不思食精羊肉熏乾者十両當歸白术神麴各二両丁香蘹香肉果砂仁乾薑桂各一両糯米半升炒黄右為末次入羊肉末拌勻蒸飯為丸如桐子大每服五十丸非時米飲下清心蓮子飲岀簡易方治心中蓄積時常煩燥因而思慮勞力多抑鬱以致小便白濁或有沙膜夜夢走泄遺瀝􅉣痛便出如血及酒色過度上盛下虚心火炎上肺金受尅口舌乾燥漸成消渴睡卧不安四肢倦怠男子五淋婦人帯下赤白及病氣不收歛陽浮於外五心煩熱藥性溫平不冷不熱常服清心養神秘精補虚滋潤腸胃調順血氣黄芩麥冬去心車前子甘草炙各半両石蓮肉去心白茯苓黄芪蜜炙人參各七錢半右剉散每服三錢麥門冬十粒水一盞半煎取八分去渣水中沉冷空心食前服發熱加柴胡薄荷煎補虚千金散藿香葉甘草炙乾薑炮神麴炒茯苓去皮各一両陳皮去白厚朴薑製各二両人參桂各半両右為細末每服二錢水一盞薑五片煎七分和渣食前日進二服麝香鹿茸丸一名鹿茸丸出醫方集成益真氣補虚憊治下焦傷竭臍腹痛兩脇脹滿飲食減少肢節煩疼手足麻痺腰脚重行步艱難目視茫茫夜夢邪交遺泄失精神情不爽陽事痿小便滑泄氣虚腸鳴大便自利虚煩盜汗而内燥方見本門補勞虚損類養正金丹岀百一選方補虚正氣硫黄細研肉桂去粗皮乾薑炮附子炮製去皮臍丁香不見火肉豆䓻半夏薑製厚朴去粗皮薑製以上各等分右為細末麴糊為丸如桐子大硃砂為衣每服三五十丸空心食前温酒或鹽湯下法製杏子岀瑞竹堂方杏仁一斤揀板杏真者用蒼术一斤白沙蜜二斤半夏一両薑汁浸一宿木香當歸人參各一両右將杏仁用熱水洗浸頓於罐内將生蒼术一斤為粗末用水熬一二百沸將汁浸杏仁封其口夏一日一夜春秋三日三夜冬五日五宿去其蒼术汁於鍋内炒乾調入蜜半斤再炒少時取岀將木香當歸人參半夏蒼术俱為細末拌於杏仁上冷定用磁罐盛頓上用生蜜半斤澆上每日空心細嚼三五十箇麫湯送下若氣不順加木香末一両血不和加當歸末一両若喘息加人參末一両若虚弱加蒼术一両痰盛加半夏末一両若婦人血氣不和當常服戊巳丸岀易簡方治丈夫婦人稟賦怯弱血氣衰敗飲食無味肌肉減積年脾蠱惡心嘔吐亦宜服之方見本門補益諸疾類益丈夫陰氣岀本草取白馬脛陰乾為末和蓯蓉丸空心下酒服四十丸日再百日見効金鎻補真丹岀德生堂此藥升降陰陽壯理元氣精神不敗効極多兼治夢遺白濁大能秘精川續斷川獨活糓精草黄精草各五分蓮花蕊一両乾用鷄頭粉一両煑熟用鹿角霜一両金櫻子五両去皮尖右為細末次將金櫻子搥碎用水三升煑至一升去渣銀石器内用慢火熬至三合成膏和勻將藥末丸如彈子大每服止一丸空心温酒送下服數日自然益氣補丹田精神加倍若欲藥行早晨另丸藥五十丸如桐子大温酒下應驗十日勝常如服後方知其功異乎諸藥好事君子有益兎絲子丸岀聖濟總録補元臟益脾胃止臍腹疼痛思進飲食固精氣顔色不改兎絲子水淘去浮水酒浸七日另搗取末萆􅐺各二両熟地黄二両焙黑骨脊骨並髓炙焦両半肉蓯蓉酒浸一宿切焙四両枳實㣲炒山芋各一両右為末酒煑麫糊為丸桐子大每服三十丸空心米飲食前服枸杞煎丸岀聖濟總録補虚益氣烏髭枸杞子根莱花不拘多少木臼中搗爛水煑一伏時絞取濃汁五升入酒五升同熬成膏肉蓯蓉酒浸切焙附子炮製去皮臍白术各二両熟乾地黄焙何首烏剉碎用大豆蒸焙乾去豆補骨脂炒各三両右為末以煎膏和丸每服三十丸空心温酒下天真丸岀經騐良方治先曾損血及脱血肌瘦絶不入食行歩難手足痿血氣枯稿形神不足如滑腸絶不入食守死不治者如咽喉窄飲食不得只用五七粒漸漸服多服數粒便可起恙乆服令人面色紅潤無有血者生血並津液大便燥者服之自潤實中有虚虚中有實皆治之羊肉七斤精者去筋膜脂皮仳聞入藥末當歸洗浄去蘆十二両肉蓯蓉濕山藥去皮各十両天門冬焙乾去心切一斤前四味置之肉内裹定用麻縷纒上色糯酒四缾煑令酒盡摻在藥内再入水二升又煑直候肉如泥再入黄芪末五両人參末三両白术末二両右以熟糯米飰焙乾為末一十両前後藥末同劑為丸如桐子大一日約服三百粒初服百粒旋加至前數服之定覺有精神美飲食手足添力血脈使行輕健如乆瘖不言者服之半月言語有聲咸云血下喘𠻳咳行歩不得服之必効恐藥難丸即入宿蒸餅五七枚焙乾為末同搜和入臼中搗千百下丸之用温糯米酒送下空心食前服人參黄芪湯岀濟生㧞萃人參二錢黄茋三錢白术一錢陳皮去白一錢甘草炙五分當歸二錢茯苓一錢右㕮咀水煎空心熱服胃熱不能食者加薑􅀥煎黄芪湯岀十便良方治口乾燥津液不生飲食不思黄芪乾地黄白芍藥五味子麥門冬去心各三分白茯苓一分甘草半両右為粗末每服三錢水一盞半薑􅀥烏梅同煎去滓服靈砂寧志丸一名寜神丸楊氏家藏方治男子婦人大病後傷損榮衛發汗吐下太過或失血太多之後精神虧損不能復心神恍惚不能眠睡飲食全減肌體瘦弱怠惰倦乏且嗜卧四肢酸痛常服補虚益氣滋養榮衛令人肌體充實飲食進美悦澤顔色精神清爽諸疾不生辰砂二両不夾石用夾絹袋盛於銀石器内懸於器内用椒紅三両取井水調椒紅入於器内可分别用鍋子住水置硃砂器在内重湯煑令魚眼沸三晝夜為度取出辰砂細研水飛鹿茸燎去毛酥炙黄白术黄芪􅁡炙各三両石菖蒲二両茯神去木人參右為末次入辰砂研勻用􅀥肉和杵一二千下丸如桐子大每服三十丸温酒米飲空心任下蒼术丸補精益氣蒼术好者六両去皮酒浸二両醋浸二両泔浸二両乾熟地黄一両蓮子肉半両酒浸軟裝在猪肚内五味子枸杞子破故紙各一両羊白腸一條將破故紙装在腸内俱用焙乾一處碾為細末右為末酒糊丸如桐子大每服四五十丸葱温酒送下白石英散岀千金方明目利小便治氣及補五勞七傷無所不治煉成白石英十両用白英不拘多少以搥子研極細燒向明選去壓黑翳色暗黑黄赤者搗細下磁器内研令細熟以生絹袋於銅器中水飛如作粉法如此三度研訖澄之漸漸去水盡至石英曝乾有粗惡不浄者去之取水中央乃作在下有粗惡去之更研堪用者使熟絹袋子盛着磁碗中以碗益之於三斗米下蒸之飯熟訖岀懸之俟乾更入於磁器中研之為成石斛蓯蓉各六両澤㵼茯苓橘皮各一両兎絲子三両右治下篩總於磁器内研令相得重篩酒服方寸匕日二不得過之忌猪魚鵝鴨蒜冷酢滑黄茋湯治氣極虚寒皮毛焦津液不通虚勞百病力氣損乏黄茋四両人參白术桂心各二両生薑半斤右於器中貯之食前以酒和兩匕服羊血忌之甘草湯岀千金方治虚羸惙惙氣欲絶甘草五味子生薑各二両吳茱萸一升人參一両右㕮咀水四升煑取茱萸小沸去渣取藥煑取一升六合二服服數劑佳補虚益氣潤五臟去痰𠻳冷氣以仲思􅀥食之乆服令人肌健好顔色不飢北齊時仙人仲思得之此􅀥因為名黄茋六一湯岀和劑方大治男子婦人諸虚不足肌體勞倦胸中煩悸及焦渴唇口乾燥面色痿黄不能飲食或先渴而欲發瘡或癰疽而後渴者尤宜服此常服平補血氣安和臓腑黄茋去蘆蜜炙六両甘草一両右㕮咀每二錢水一盞􅀥一枚煎七分去滓温服不拘時一方用麥門冬湯調下沉附湯岀危氏方治上盛下虚氣不升降陰陽不和胸膈痞滿減飲食肢節痛倦宜服之附子炮去皮臍一両沉香剉半両右剉散分作三服水二盞薑十片煎八分食前温服茋附湯岀危氏方治氣虚陽弱虚汗不止肌體倦怠黄茋去蘆蜜炙附子炮去皮臍右各等分剉散每服四錢水二盞薑十片煎不拘時服胡麻粥治五臟虚損羸瘦益氣力堅筋骨胡麻巨勝右二味本草云其實六稜名胡麻八稜名巨勝蒸暴各九遍每服取二合用湯浸布裹挼去皮再研水濾取汁煎飲和粳米煑粥食之一方用胡麻巨勝白蜜一升共三味合之名曰浄神丸常服能休糧填人骨髓虚而吸吸者加胡麻用不飢耐老益氣丸麻子二升大豆一升右熬令香搗末蜜丸日二服正元散蓬莪茂一両金鈴子去核一分右為末更入硼砂一錢煉過研細俱令勻每服二錢鹽湯或温酒空心調服交感丹夫世人中年精耗神衰蓋縁心血少而火不能下降腎氣憊而水不能上升至心中膈絶榮衛不和所苦上則心多驚怖中則寒痞飲食減少下則虚寒遺泄至陰痿不興臟氣滑泄愚醫徒知峻補下田非惟不生水滋心而健偽失真立見衰悴夭折之由當由此此方安心志服之半年漸屛去一切暖藥不可恃以馳嗜慾然後力習秘固泝流之術其神効難殫述俞通奉遺訓予年五十一嵗遇鐵甕申先生授此術酷志行持服大補而飲食嗜好不減壯嵗乃此藥之内功大矣今年八十五享天然之夀瞑目無憾由此耳普示群生同登夀域後有湯及白牙藥可同用牙藥方見牙齒門齒痛類茯神四両白附子一斤碎去皮新水浸一宿炒黄色降氣湯益氣清神香附子半斤修製前法茯神二両甘草一両半炙右為末熱湯㸃二錢送下交感丹地黄散主氣益氣調中補絶令人嗜食除熱用生地黄三十斤細切暴乾取生者三十斤搗汁漬之令相得岀暴乾復如是丸反暴搗末食後酒服方寸七勿令絶肉蓯蓉丸治下部虚損腹中疼痛不喜飯食平補用蓯肉二斤酒浸三日細切焙乾為末分一半醇酒煑作膏和一半入臼中搗五六百下丸如桐子大每服二十丸温酒或米飲下空心食前五味子丸明目下氣除煩止渴養血活經絡無所不治用北五味子一裹約二斤揀浄用酒一斗浸一伏時取岀或晒或焙碾為細末右將所浸藥酒熬成膏搜前件藥丸如桐子大每服二三十丸鹽湯温酒任下空心食前臨卧並無所忌浸藥酒不用菉豆麴恐解藥力補虚止渴健脾胃氣去留血補中以飴糖白者蔓青汁煑頓服之四物湯治體氣虚當歸白芍藥熟地黄川芎各等分右㕮咀水煎又去熟地黄加乾薑人參名增損四物湯如體氣虚加側栢葉又宜水調麫醬服二陽丹補中益氣安心主驚止心脾不足五臟虚弱腰膝疼痛硃砂二両人參一両白术茯苓各一両右研折為細末用附子數箇切蓋作甕子入藥在内將旋下者附子末同白麫用醋和作餅子先裹附子後以精羊肉一大片再裹甑内蒸熟一處杵爛用木臼乘熱搗丸如桐子大每服五七十丸空心食前温酒下團參散補虚氣生津人參五味子白术各半両甘草一分右作藥搗羅為粗散每服二錢以水一盞生薑三片同煎至六分去滓温服不拘時一字散治氣虚頭痛右用大附子一箇剜去心全蝎一箇入在内以附子末同鍾乳粉一分麫少許和水裹炮熟都碾為末以黄色為度葱茶下一錢又方半錢散大川椒芎二箇剉作四塊大附子一箇和皮生搗為細末右以水和附子末如麫劑裹芎作四處如附子末少入麫裹畢以針穿數孔子用真腦射薰有穴處内香在揑合穴子如未覺内有香即再薰一炷細羅灰用釩子内熱灰炮熟末之每服半錢葱茶調下不拘時四醫惕吉老二方神良保真丸補虚羸接真氣充實骨髓益夀延年肉蓯蓉酒浸一宿切焙兎絲子酒浸一宿焙蘹香炒川楝子肉剉葳靈仙去土浄剉菖蒲九節者剉五味子破故紙炒香葫蘆巴炒蒼术米泔浸一宿焙乾白龍骨生獨活木香以上十二味各一両牛膝酒浸一宿焙覆盆子揀浄天仙子炒杜仲去粗皮細切炒去􅁝乾熟地黄洗焙白薑炮狗杞子川椒炒去汗萆􅐺赤石脂巴㦸天去心青鹽麝香另研以上十三味各一両右件為細末將别研者再同研勻用好酒煑麫糊為丸如桐子大每服五七十丸温酒或鹽湯下空心食前沉香鹿茸丸岀楊氏家藏方補虚益真氣暖下元助老扶弱乆服强健鹿茸二両醋炙附子炮去皮臍半両沉香半両麝香一錢一字另研右四味為細末將肉蓯蓉一両半酒煑爛研細另入酒熬成膏和丸如桐子大每服五十丸温酒鹽湯任下空心食前青鹽椒附丸岀楊氏家藏方治元臟氣虚臍腹刺痛飲食減少臓氣不調兼嗜卧及婦人血海乆冷帯下赤白崩漏不止青鹽研香附子炒川椒揀去閉口並子炒附子炮去皮臍蘹香炒陳橘皮去白𤣥胡索蒼术泔浸一宿剉炒右件各等分為細末糊丸桐子大每服五十丸温酒或米飲下空心食前茯苓丸楊氏家藏方治真元氣弱榮衛俱虚精滑不固神氣耗乆服滋養血氣蠲除風冷使諸疾不至白茯苓去皮三両兎絲子五両酒浸一宿另研焙乾龍齒益智去殻破故紙炒逺志去心人參去蘆頭石菖蒲各三両右件為細末煉蜜為丸如桐子大每服一百丸燈心湯下空心食前補陰丹岀王氏愽濟方治男子本臟氣婦人血氣一切氣積及産後諸血臟病患並宜服此硃砂硇砂各去石延胡索半夏湯炮芫花醋浸炒黄木香斑猫去翅足酒炒焦黑半両海蛤荆三稜大附子炮去皮臍上蘹香蓬莪茂川苦楝子醋浸炒青橘皮各十両肉豆䓻三箇檳榔三箇右件藥杵羅為細末酒煑麫糊為丸桐子大每服五七十丸女人用醋湯下丈夫温酒或鹽湯下空心臨卧各一服大健元氣能療腸氣膀胱氣刺痛及婦人産後惡露不盡變作血瘕者並宜服之琥珀丸岀衛生家寳方養心腎滋益氣血大人室女皆可服之琥珀三分乳香三分乾熟地黄三両逺志一両一分去心白茯苓一両半附子一両炮桂一両一分人參一両一分麥門冬一両去心當歸一両硃砂一両研麝香一分研酸􅀥仁一両用湯浸去皮石菖蒲一両一分右為末和勻煉蜜丸如桐子大每服三十丸人參湯下日中夜卧服如孕婦去砂麝駐精丸岀衛生家寳方鎮心安䰟澀腸胃益氣力止洩㵼及夜夢遺小便白濁常服養神益力輕身耐老除百病白龍骨石蓮肉搥碎和殻用各等分右焙為末酒糊丸如桐子大每服三十丸米飲温酒鹽湯任下空心日午晩服十補丸岀朱氏集驗方治諸虚不足補元陽益真氣蘹香炒二両葫蘆巴炒破故紙炒蒼术米泔浸一宿兎絲子各一両酒浸一宿炒以上五味用煑酒浸三宿大川烏一箇一両者醋浸三宿炒青鹽五錢丁香二錢木通五錢用鹽二錢酒一碗煑乾麝香五分右為細末用前浸藥酒煑糊為丸如桐子大每服四五十丸空心温酒送下益中丹岀米氏集驗方治益真氣補虚憊下焦傷竭臍腹絞痛兩脇脹飲食減少肢節煩疼手足麻痺腰腿沉重行步難目視茫茫夜夢鬼交遺泄失精神氣不爽陽事痿小便滑數虚腸鳴大便自利虚煩盗汗津液内燥並宜服之鹿茸蜜炙丁香木香蘹香炒山藥黄芪蜜炙木通麴炒官桂去皮乾薑炮青鹽石斛天雄炮附子炮鵞管石火煆酒碎陽起石肉豆䓻川牛膝酒焙破故紙葫蘆巴兎絲子酒焙金鈴子去核覆盆子去核熟地黄蓽澄茄馬藺花肉蓯蓉韭子沉香人參各一錢一字麝香三字右為細末酒煑糊為丸如桐子大每服三十丸加至五十丸空心温酒服宋孝宗賜新安郡王吳珍傳吳武穆挺傳逆羲有提轄兼修合藥局官用禮被罪放罷押赴興元府中軍入隊使換吳彦是時任中軍統制年三十七患冷憊冷病為飲食過多食牛凍所傷服此藥三十五嵗間服養氣丹令髭鬢不白此藥之力也續斷煎治下經虚冷真氣不足經脈風寒氣血凝滯腰腿痛轉側不得續斷杜仲牛膝萆􅐺𦍑活木𤓰白术各四両狗脊青鹽熟地芎薏苡仁各二兩附子八両右為細末以白麫酒煑糊丸如桐子大每服三十丸一方加生茱萸五味子各一両空心食前抱婆丸治男子諸虚不足女人頭風男子氣虚弱吐痰脚氣腰疼下元冷憊並皆治之大附子一両一隻炮去皮臍蒼术三両米泔浸一宿南木香不見火大川烏去皮火炮天麻酒浸炙五錢右為細末酒煑麫糊丸如桐子大每服四十五丸温酒鹽湯下頭風食後葱酒下參歸湯補血氣俱不足黄芪七分人參二分甘草五分柴胡四分升麻四分益智少許草豆䓻四分熟地黄二分生地黄五分當歸身三分紅花少許右剉麻豆大都作一服煎法如常食逺杜仲散益氣補虚治男子羸瘦短氣五臟摟倦腰疼不能房室杜仲蛇床子五味子熟地黄六兩蓯蓉逺志去心各八分木防己五分巴㦸天七分兎絲子一錢右治下篩食前酒服方寸匕日二常服不絶佳温中益氣以鷄喉菜作羮食之益氣輕身乆服不饑堅筋骨能行歩以東廧子為飯食之主通神益智健氣駐顔以荔枝食之補中益力氣以烏藥葉及根嫩時採作茶片又碾煎服主不飢益氣輕身取薏苡子蒸令氣餾暴乾磨取炊作飯及麫食之主益氣安身遺泄温腸以都角子食之久服無所損也補虚益氣力久服不飢厚腸胃以萍蓬草根食之年當穀也益氣力寛腸令人不飢健行以榛子食之軍行食之亦可當糧益氣安神養血生肌以摩厨食之久服健人也鹿血酒服之令人血氣充盛以生鹿血和酒服之昔云有人服鹿血酒云得於射生者因採捕入山失道數日飢渴將委頓惟獲一生鹿刺血數升飲之飢渴頓除遂覺血氣充盛異常人有効其服餌刺鹿角間血酒飲之更佳益氣力以白鶴血飲之益氣力取胡燕屎二十枚投酒二升中漬之三日後取令夜服一二盞隨性多少甚益氣力補中益氣和五臟調經絡續氣脈用小麥作粉食之補中益氣續絶傷止洩痢消渴取牛骨髓和酒服之温中益氣補下元以米稻舂米食之即不發病耳益中空膈取薏苡葉為飲服甚勝補腸胃肥中益氣以棗蒸煑食之治補益虚羸之損以桄榔麵食之白蒿葅方以白蒿葉挼醋淹之為葅食之甚益人治益精氣强志意以利耳目以鷄頭實三合煑令熟去壳研如膏入粳米一合煑粥空心食之利腸胃益氣力去熱益人以米為飯食之久服不飢治氣虚以訶梨勒綏煨熱少服補虚羸之損温腸胃之嘔逆以師草實食之久食健人主開胃益氣以石首魚和蓴茱作羮食之益氣調中耐飢强志以葡萄釀酒服取藤汁釀酒亦佳狗肉汁釀酒大補調中益氣止洩除痰壓時氣去熱嗽用䑕麴草雜米粉作糧食甜美荆楚嵗時記云三月三日麴草汁和蜜為粉謂之龍舌䉽以壓時氣益氣力安中補不足利胃宜脾用稷作飯食之良不可乆食多熱令人煩悶普濟方卷二百十八
