body:
  text: 普濟方卷三十一明周王朱橚撰腎臟門腎臟虛冷氣攻腹脇疼痛脹滿附論夫腎臟虛冷氣者由腎氣不實下焦久寒陽氣外虛隂氣内積邪冷之氣在於臟腑積稸不散上攻於脾脾虛受乏則脹冷摶於隂經則痛也而又足少隂支脉行於兩脇令腎與脾俱虛為邪冷所攻正氣與邪氣相擊故令腹脇疼痛脹滿也方蓽澄茄散出聖惠方治腎臟虛冷氣攻心腹疼痛或時吐逆兩脇虚脹不思飲食四肢乏力蓽澄茄木香人參去蘆頭肉桂去皺皮肉豆蔲㯽榔訶梨勒皮陳橘皮湯浸去白穣焙各一兩丁香􅒦砂去皮乾薑炮裂剉京三稜㣲煨剉赤茯苓白术各三分附子一兩半炮裂去皮臍赤芍藥甘草炙㣲赤剉各半兩右搗細羅為散每服不計時候以熱酒調下二錢沉香丸出聖惠方治腎臟虛冷氣攻心神悶亂四肢逆冷腹脇脹滿疼痛喘促嘔吐沉香木香㯽榔苦楝子桂心蘹香子當歸剉㣲炒肉荳􅅳去殻桃仁湯浸去皮尖雙仁麸炒㣲黄阿魏麺裹煨麺熟為度蓬莪荗各一兩丁香乾薑炮裂剉乾蝎㣲炒呉茱茰湯浸七遍焙乾㣲炒青橘皮湯浸去白穣焙各半兩硫黄一兩半細研水飛過右為末煉蜜和搗三五百杵丸如梧桐子大每服不計時候以熱酒下三十丸五味子丸楊子建萬金護命方治腎臟虛冷腹脇疼痛脹滿非時足冷隂痿行歩無力五味子續斷牛膝酒浸切焙附子炮裂去皮臍桂去麄皮杜仲去麄皮炙剉蘹香子炒白茯苓去黒皮芎藭山芋當歸切焙㯽榔剉一方無㯽榔用木𤓰呉茱茰湯洗焙炒細辛去苖葉青橘皮湯浸去白焙各一兩一方用川椒右為末酒煮麺糊丸如梧桐子大每服二十丸至三十丸空心鹽湯下硫黄丸出聖惠方治腎臟虛冷氣攻腹脇脹滿發渴疼痛足脛逆冷骨節痠疼食少無力硫黄細研硼砂細研蓽澄茄蘹香子補骨脂石斛去根木香丁香肉荳蔲去殻桂心當歸剉㣲炒㯽榔呉茱萸湯浸七遍焙乾㣲炒各一兩何首烏一兩半麝香半兩細研右為末入研了藥令匀以酒煮麺糊和搗三二百杵丸如梧桐子大每服不計時候以温酒下十五丸補腎湯出聖濟緫録治腎臟虛冷氣攻兩脇下脹小腹急痛胷中短氣磁石水飛研淘去而汁附子炮裂去皮臍各二兩黄耆剉五味子當歸切焙白茯苓去黒皮石斛去根芍藥人參沉香各一兩桂去麄皮一兩半陳橘皮湯浸去白焙三分蜀椒去目并閉口炒出汗枳殻去穣各半兩右㕮咀每服三錢水一盞入生薑一􅀥大拍碎􅀥三枚擘破煎至六分去滓食前温服沉香散出聖惠方治腎臟虛冷氣攻腹脇疼痛或多嘔吐不思飲食兩脇脹滿四肢羸痩沉香白荳蔲去皮京三稜㣲炒剉桂心當歸剉㣲炒木香呉茱茰湯浸七遍焙乾㣲炒各半兩青橘皮湯浸去白穣焙三兩髙良薑剉附子炮裂去皮臍白茯苓白术各三分厚朴一兩去麄皮塗生姜汁炙令香熟㯽榔三錢右為散每服五錢以水一大盞煎至五分去滓不計時熱服蓽澄茄丸出聖惠方治腎臟虛冷氣攻心腹疼痛脇肋脹滿蓽澄茄木香沉香乾蠍㣲炒白术當歸剉㣲炒青橘皮湯浸去白穣焙各半兩桂心訶梨勒煨用皮㯽榔各一兩蘹香子蓬莪术髙良薑剉各三分右為末煉蜜和搗三二百杵丸如梧桐子大每服以熱生薑酒下二十丸葫蘆巴丸出聖惠方治腎臟氣虛下膲積冷氣攻腹脇脹滿臍下疼痛面色青黑足脛多冷葫蘆巴蘹香子硫黄細研附子炮裂去皮臍各一兩木香桂心當歸剉㣲炒阿魏研入青橘皮湯浸去白穣焙沉香白荳􅅳去殻各半兩桃仁二兩湯浸去皮尖雙仁别研如膏右為末入研了藥令匀用好酒一升半先熬桃仁膏令稠拌和諸藥末搗三二百杵丸如梧桐子大每服不計時候以温酒下二十丸沉香湯出聖濟緫録治腎臓虛冷腹脇疼痛脹滿沉香細辛去苖葉續斷木香芎藭當歸切焙甘草炙剉㯽榔剉石斛去根牛膝酒浸切焙枳殻去穣麸炒各半兩右麄搗篩每服三錢水一盞煎至七分空心去滓温服㯽榔散出聖惠方治腎臓虛冷氣攻心腹疼痛兩脇脹滿㯽榔蘹香子桂心當歸剉㣲炒芎藭白荳蔲去皮木香青橘皮湯浸去白穣焙各三分丁香呉茱茰湯浸七遍焙乾㣲炒各半兩附子一兩炮裂去皮臍右為散每服四錢水一中盞入􅀥三枚煎至六分去滓不計時候熱服蘹香子丸出聖濟緫録治腎臟虛冷氣攻腹脇脹滿疼痛心氣喘悶手足厥冷蘹香子炒木香桂去麄皮㯽榔剉桃仁去皮尖雙仁焙研成膏蓬莪荗煨剉各三分青橘皮湯浸去白焙萊菔子炒附子炮裂去皮臍各半兩厚朴去麄皮生薑汁炙一兩半右搗羅九味為末入桃仁膏研匀以酒煮麺糊丸如梧桐子大每服三十丸空心食前温酒下蓽澄茄煮散出聖濟緫録治腎臟虚冷氣攻腹脇疼痛脹滿煩倦蓽澄茄甘草炙剉人參芍藥各一兩蘹香子炒㯽榔剉各三分乾薑炮阿梨勒皮桂去麄皮各半兩右為散每服三錢水一盞煎至七分温服不拘時蘹香丸出聖惠方治腎臓虛冷氣攻兩脇脹滿腹内疼痛四肢不和蘹香子木香桃仁湯浸去皮尖雙仁别研為膏桂心蓬莪荗㯽榔各三分蘿蔔子半兩㣲炒青橘皮湯浸去白穣焙半兩厚朴一兩半去麄皮塗生薑汁炙香熟右為末以醋煮麺糊和丸如梧桐子大每服不計時候以熱酒下三十丸蘹香子丸出聖濟緫録治腎臟冷氣攻腹脇疼痛脹滿蘹香子炒蓬莪荗煨剉楝實煨去核白术訶梨勒皮各一兩丁香一分呉茱茰湯浸焙乾炒半兩桃仁三分去皮尖雙仁研如膏右搗羅七味入桃仁膏研匀煉蜜丸如銀杏大每服一丸温酒或鹽湯嚼下不拘時異香散出和濟方治腎氣不和腹肋膨脹痞悶噎塞喘滿不快飲食不化噫吞酸一切氣痞腹中刺痛此藥能破癥瘕結聚大消宿冷沉積常服調五臓三焦和胃進食石蓮肉去皮一兩蓬莪术煨京三稜炮益智仁炮甘草炒各六兩青皮去白陳皮去白各三兩厚朴去麄皮姜汁炙二兩右為細末每服二錢水一盞生薑三片􅀥一枚鹽一捻煎至七分通口服不計時候鹽湯㸃或温酒調皆可服木香湯出聖濟緫録治腎臓虚冷氣攻腹中疼痛兩脇脹滿木香沉香各半兩青橘皮湯浸去白炒京三稜煨剉各一兩桂去麄皮當歸切炒㯽榔剉厚朴去麄皮生姜汁炙各三分右麄𢷬篩每服三錢水一盞生薑三片􅀥二枚擘破煎至七分去滓温服葫蘆巴飲出聖濟緫録治腎臟氣冷腹痛嘔逆腹脇脹滿四肢少力不思飲食葫蘆巴白茯苓去黑皮舶上蘹香各一兩肉豆䓻去殻木香附子炮裂去皮臍各半兩沉香三分右㕮咀每服三錢鹽一捻煎至七分去滓温服空心食前烏頭蘹香子丸出聖濟緫録治男子腎氣虛攻腹脇疼痛脹滿烏頭炮裂去皮臍㯽榔剉蘹香子剉炒楝實剉炒當歸切炒各一兩木香半兩硼砂研一錢右為末和匀醋煮麺糊丸如梧桐子大丹砂為衣每服二十丸温酒下不拘時㯽榔湯聖濟緫録治腎臓虛冷氣攻腹脇脹滿疼痛㯽榔生剉木香各半兩菴䕡子桔梗炒各二兩肉桂去麄皮附子炮裂去皮臍各一兩右㕮咀每服三錢水一盞煎至七分去滓温服巴附丸聖濟緫録治腎臟虛冷腹脇脹滿葫蘆巴一兩半附子炮裂去皮臍硫黄研各一兩蘹香子炒三分㯽榔剉桂去麄皮各半兩右為末和匀酒煮麺糊丸如梧桐子大每服二十丸至三十丸温酒或鹽湯下空心日午臨臥服荳􅅳飲聖濟緫録治腎臟虛冷腹脇脹滿肉豆􅅳去殻葫蘆巴蘹香子炒丁香各一兩沉香三分右麄𢷬篩每服三錢水一盞入鹽少許煎至七分空心食前去滓温服葫蘆巴丸聖濟緫録治腎臟虛冷腹脇脹滿葫蘆巴二兩附子炮裂去皮臍硫黄研各三分右為末酒煮麺糊丸如梧桐子大每服二十丸至三十丸鹽湯送下艾茸丸聖濟緫録治腎臓虛冷氣攻腹脇脹滿疼痛木𤓰三十枚去皮核作瓮子甘菊花為末青鹽研各一斤右將甘菊花并青鹽填滿木𤓰瓮子内置籠牀内蒸以木𤓰爛為度研成膏再入新艾茸二斤搜和作劑丸如梧桐子大暴乾每服三十丸空心食前米飲下燒腎子十便良方治下焦虚冷臍腹撮痛心胷痞脹和元氣進飲食益胃舶上茴香川附子官桂川椒子木香胡椒陳橘皮巴㦸乾薑各半兩京三稜一兩右十味杵為末用豶猪腰子一對去筋膜切作片子以末二錢入葱絲少許鹽半錢温紙裹煨熟餌訖以酒或粥飯壓之湏㬰覺臍下煖甚妙羊脊骨湯主腎臟虛冷腰脊轉動不得用羊脊骨一具嫩者搥碎爛煮和蒜虀空腹食之兼飲酒少許妙鹿角屑散主腎臓虛冷腰脊痛如錐刺不能動摇用鹿角屑二兩熬令㣲黄搗末空腹煖酒服方寸匕日三兩服治腎臓虛冷腰膝無力自覺渾身沉重懶行歩無精神氣力小便餘瀝方楊子建萬全䕶命方萆薢杜仲續斷牛膝石斛狗脊去毛當歸五味子芎藭蓯蓉茯苓附子火炮去皮獨活兎絲子甘草細辛木香官桂各一分右細杵羅為末煉蜜丸如梧桐子大毎朝空心鹽湯温酒任下三十丸治腎臓虛冷内感寒邪睡中交鬼泄精方楊子建萬全䕶命方萆薢半兩杜仲去皮續斷狗脊去毛芎藭龍骨木香茯苓益智獨活天靈盖酥炙黄黒色石斛各一分阿魏二錢用稀麺和成團焙令乾使右細杵羅為末煉蜜丸如梧桐子大空心鹽湯温酒下三十丸留末一半早朝入鹽煎空心去滓喫不要多喫丸藥也病效丸藥止更不喫腎臓冷氣卒攻臍腹疼痛附論夫腎臓冷氣卒攻臍腹疼痛者由腎氣虛弱宿有冷疾或久坐濕地强力入水或食生冷過度觸冐風寒傷於腎經陽氣虗㣲隂氣獨盛邪正相擊故卒攻臍腹疼痛不可忍也方木香散聖惠方治腎臓冷氣卒攻臍腹疼痛脹滿壅悶木香乾薑炮裂剉蘹香子桂心㯽榔桃仁湯浸去皮尖雙仁麸炒㣲黄鷄舌香蓽澄茄青橘皮湯浸去白穣焙各三分右𢷬羅為細散每服不計時候以熱酒調下一錢阿魏丸聖恵方治腎臓冷氣卒攻臍腹疼痛不可忍阿魏麺包煨麺熟為度别研青橘皮湯浸去白穣焙附子炮裂去皮臍自然銅細研各半兩桂心乾蝎㣲炒木香㯽榔已上各三分桃仁一兩湯浸去皮尖雙仁麩炒㣲黄别研右𢷬羅為末以童子小便二升入桃仁阿魏於銀鍋子内以慢火煎令稠入諸藥末和丸如梧桐子大每服不計時候以熱酒下二十丸沉香散出聖恵方治腎臟冷氣卒攻臍腹疼痛不可忍手足逆冷沉香二兩附子炮裂去皮臍肉豆􅅳去殻各一兩肉桂去皺皮蘹香子蓬莪荗青橘皮湯浸去白焙阿魏麺包煨麺熟為度各三分右𢷬細羅為散每服不計時候以温酒下二錢蛜􅖉散出聖恵方治腎臟虛冷卒攻臍腹疼痛不可忍及兩脇疼痛蛜􅖉三十六枚頭足全掘一地坑子面闊四寸深五寸用炭火五斤燒坑子令通紅便净去灰土用頭醋一升潑在坑子内候滲乾便匀排蛜􅖉坑子底用一瓷碗盖之一宿取出蘿蔔子木香各一分胡椒三十粒㯽榔一枚肉荳􅅳一枚去殻右𢷬細羅為散每服不計時候以熱酒調下一錢桃仁丸出聖恵方治腎臓氣虛觸冐風寒冷氣卒攻臍腹疼痛桃仁湯浸去皮尖雙仁麸炒㣲黄附子炮裂去皮臍硫黄細研水飛過蘹香子木香髙良薑剉各三分右𢷬羅為末用煎醋浸蒸餅和丸如梧桐子大每服不計時候以熱酒下二十丸硫黄丸出聖惠方治腎臓冷氣攻臍腹疼痛兩脇脹悶飲食不下硫黄一兩細研水飛過木香㯽榔桃仁湯浸去皮尖雙仁麸炒㣲黄各半兩青橘皮湯浸去白穣焙蘹香子各三分右𢷬羅為末醋煮麺糊和丸如梧桐子大每服以熱酒下十丸不計時候服之胡椒丸出聖恵方治腎臓冷氣卒攻臍腹撮痛不可忍胡椒木香沉香桂心蛜􅖉各三分阿魏一分麺裹煨麺熟為度右𢷬羅為末煉蜜和丸如梧桐子大每服以熱生薑酒下二十丸不計時候服硼砂丸出聖恵方治腎臓冷氣卒攻臍腹疼痛甚者硼砂三分雄黄硃砂黄丹㣲炒各一分麝香一錢巴豆十枚去皮心研紙裹壓去油右藥都入於乳鉢内順手研半日用煎醋浸蒸餅和丸如