跳但見屋宇旋倒忽聞喉内如有一條冷物下至心中忽聞有一物在心前上築咽喉即悶絶不知人事此皆寒風冷涎所致宜服此方出䕶命方菖蒲細辛芎防風羌活乾薑官桂獨活半夏各一分吳茱萸四銖南椒去子三銖牽牛半兩右先杵牽牛半夏二味自作一處所餘衆藥並作一處杵為細末毎服六錢牽牛半夏末二錢衆藥末四錢共作一服熟湯調下和滓吃若不吐如人行一二里更進一服又如人行一里更進一服尚未吐以指頭斡于喉中令吐出涎若不吐即下入胃亦安穏若不吐不下更不可治也風成熱中論夫内經曰風氣與陽明入胃循脉而上至目内眥其人肥則風氣不得外泄乃為熱中而目黄夫風者陽氣也善行而數變風氣客于胃中内不得通外不得泄蒸欝于中故謂之熱中陽明之脉起于鼻交額中下循鼻外熱氣循入故令人目黄也方銀液生犀丸出聖濟總録治風邪藴積傳為熱中犀角鎊銀箔一錢水研結沙子牛黄研􅉱金竹茹阿膠炙令燥各一分天麻琥珀研人參白茯苓去黒皮防風去义紫石英研各半兩丹砂研一兩半天竺黄研陳膽星各一兩龍腦研麝香研各一分右為細末煉蜜丸如雞頭實大毎服一丸食後臨卧細嚼人參湯下雄黄散出聖濟總録治風氣入中藴積生熱口乾目黄時發潮燥雄黄研半兩丹砂研牛黄研丁香各一分桂去粗皮半兩天麻三分麝研一兩天南星炮製三分半夏為末生姜汁作餅暴乾麻黄去節煎去沫焙白殭蚕炒各三分龍腦一分先研如粉入麝香同研次入前三味同研附子炮製去皮臍乾薑炮大黄剉醋炒各半兩右將十味搗羅為末與别研五味和匀毎服半錢加至一錢匕空心夜卧温酒調下汗出即愈金箔牛黄丸出聖濟總録治風邪除熱中金箔十片研牛黄研龍腦研各一分犀角鎊琥珀研人參各一分丹砂研水飛過白茯苓去黒皮各二兩天麻白花蛇酒浸去皮骨炙各半兩白附子炮白殭蚕炒一兩甘草炙剉一兩右為末錬蜜和擣一千杵丸如櫻桃大以金箔為衣毎服一丸細嚼温薄荷湯下茶酒亦得常服半丸不拘時人參丸出聖濟總録治風邪除熱中解煩渴鎮心神人參一兩半蘆薈白术各半兩藁本去苖土半兩桔梗剉炒半兩白附子炮赤茯苓去黒皮菊花各一兩防風去义三兩天麻酒浸焙三分龍腦研麝香研各一分右為末以麫糊為丸如梧桐子大毎服十五丸食後煎黄耆荆芥湯下牛黄散出聖濟總録治風熱久不散變成熱中煩渴目黄精神昏暗牛黄研甘草炙剉白附子炮白殭蚕炒犀角鎊羚羊角鎊丹砂研各一分天南星炮半分龍腦研一錢天麻半兩右各搗研極細和勻毎服一錢匕荆芥湯調下犀角天麻丸出聖濟總録治風不散傳為熱中犀角鎊天麻酒浸切焙芎藭半夏為末生薑汁作餅焙乾菊花各半兩茯神去木人參羗活去蘆頭阿膠炙令燥丹砂研各一兩甘草炙剉三分右為細末煉蜜丸如皂子大毎服一丸食後臨卧細嚼人參湯下遠志湯出聖濟總録治風摶傷氣欝為熱中除目黄解煩渴遠志去心人參赤茯苓去黒皮犀角鎊桔梗剉炒前胡去蘆頭防風去义麥門冬去心焙大腹皮黄耆剉各半兩右粗搗篩毎服三錢七水一盞薑一棗大拍碎煎至七分去滓食後温服日再三内解散出聖濟總録治風邪入中藴瘀成熱頭昏目黄心膈注悶柴胡去苖黄芩去黒心葛根剉各一兩黄連去鬚一分石斛去根一分甘草炙剉一兩二分右為散毎服半錢七用柳枝蜜水調下薄荷蜜水亦得青龍散出宣明論治風邪傳入腹内瘀結而目黄風氣不得泄為熱中煩渴引飲仙靈脾生乾地黄焙防風去义何首烏去黒皮米泔浸一宿切焙各一分荆芥穗一兩右為末毎服一錢至二錢七食後沸湯調下日三服普濟方卷一百三
