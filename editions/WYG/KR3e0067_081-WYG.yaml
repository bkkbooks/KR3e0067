香散出神效方治攀睛瘀肉黄丹一両二錢水飛過洒乾白礬一両銀器内成汁乳香没藥各一錢鷹條一錢半血竭二分麝香少許輕粉三分粉霜二分右先將白礬於銀器内化成汁次入黄丹末以銀筯攪勻更入乳香没藥慢火不住攪令枯乾為粉候冷研極細熟絹羅過後入鷹條血竭麝香輕粉粉霜研極勻如粉再以熟絹羅過為末㸃之前胡湯出聖濟總録治眼赤膜不見物或息肉生前胡去蘆頭决明子炒黄連去鬚芍藥大黄升麻各二分山梔子仁枳殻去穰麩炒各一両右粗搗篩每服五錢水一盞半苦竹葉十片煎至一中去滓下芒硝末一錢食後臨卧溫服萎蕤湯出聖濟總録治眼生息肉􅁋膚萎蕤升麻黄連去鬚各一両半秦皮去粗皮三分地骨皮山梔子仁甘草炙剉各一両半右粗搗篩每服五錢水一盞半煎至一盞去滓投芒硝末一錢食後臨卧温服生地黄丸出直指方明目活血消去瘀肉人参防風各半両當歸川芎生地黄各一両全蝎去尾乾白蒺蔾炒去刺一両右為末煉蜜丸如梧桐子大每服五十丸食後薄茶下加羚羊角半兩尤佳洗輪散治風熱攻注眼生息肉兼瞖膜疼痛方見本門目赤疼痛類朴硝一斗以水半礶浄去土焙乾用白丁香五升以水一礶淘去土攪研用黄連膏出危氏方治一切眼目瘀肉攀睛風痒淚落不止右取水入香硝釡内熬至七分淘出令經宿水面浮牙者取出控乾以紙袋子盛風中懸至風化將黄連細末熬清汁乾硝用猪羊膽和加蜜㸃之大􅀥煎一名大棗膏出千金方治眼生赤膜息肉急痛不開如芥在眼碜痛方出本門目赤碜痛赤腫類硃砂方療眼暗熱淚膚肉光明硃砂研一両漿水一大升硇砂一両各大秤研右以五月五日合置銅器中日暴使乾用刀刮取以新帛裹之每夜眠時以草醮著一米許安眼四眥各一米愈忌生血物石鹽膏出千金方治眼中息肉驢脂石鹽末右和合令調注目両眥頭日三夜一瘥具齒散出千金方治目中生息肉膚翳稍長欲滿目閉瞳子反珠管具齒七枚燒為末珍珠等分一方用米砂右合製如粉以注瞖肉上日三度甚良亦治目中眯不出黄連湯出聖惠方療眼熱努肉及赤痒急痛不可忍如芥子在眼黄連一両碎竹葉一両切右以水一升半煎至半升置銅器中湯上煎似稀􅄳止卧時㸃眼中熱淚出即瘥一方用前二味以水三大盞入棗五枚煎至一盞半去滓食後分四温服之㸃眼蝸牛漿出聖惠方治息肉滛膚赤白膜以生蝸牛一枚去其掩内丹硃末於口中火上炙沸以綿注取汁傅眥中薤白方出聖濟總録治息肉􅁋膚用薤白新者以刀截安膚瞖上令偏膜皆著上復為又方出聖濟總録治息肉􅁋膚以丹砂一両五月五日研令如粉置銅器中以漿水及臘水各一盞浸一日曝乾用銅刀子刮取再研以磁盒收每㸃如黍米大加目眥頭累用愈又方出千金方治目中息肉以五加不聞水聲者根去土取皮擣末一升和上酒二升浸七日外一兩時服之禁醋二七日偏身生瘡若不出未得藥力以生熱湯浴之取毒瘡出瘥拂手膏治眼内瘀肉浮膜侵睛土在硇砂合子内一日紙封定至五刻取出硇砂以冷水浮洗過研為粉以筯頭㸃入眼中浮膜立退凡㸃眼先將温水洗眼了後㸃又洗再㸃不過三次立驗又方出龍木論治眼有白瞖息肉取馬齒莧一大握洗和朴硝少許以絹裹安眼上數易之目生努肉論夫邪熱之氣在於臟腑薫蒸於肝攻衝於目熱毒既盛倂於血脉藴積不散結取而生努肉也目生努肉者由脾肝不利風熱乘之其後或痒或痛赤瘀而煉壅熱久息肉増長近則侵睛輪大則覆瞳人治不可緩鈎割熨烙固自有法至於祛風條熱之劑豈可偏廢哉龍木論云努肉侵睛外障此眼初患之時或痒或痛即赤爛多年肺臓風壅𤼵無定准漸生内翳侵睛遮滿人患此狀宜令鈎割熨烙然後宜服除風湯㸃上寳膏立效謌曰努肉根基有兩般便須分别有根源或因赤爛多年後肺臟風衝赤使然或痒或痛無定准赤條根脉漸侵瞞初生浮小鈎除易復著瞳人即稍難去熱去風先服藥鈎割熨烙豈為全安心服藥便能效七寳消磨當自痊又云胞肉膠侵外障此眼初患之時皆是腸胃伏熱膈内風衝入眼胞瞼有肉初即小如麻米年多漸長大如飛李之状摩隱瞳人瞖為裹邊宜令針出血然後藥洗去瘀血令服細辛湯摩瞖即散瘥謌曰瞼胞皮肉瘀生瞖漸長如同毒李形針破裹邉毒後出還須服藥斷來程或因此患加風熱淚出自當有瞖生鈎割畧如風毒眼盡摩退散自相應方甘草湯出聖濟總録治風毒攻眼漸生努肉碜澀疼痛甘草炙剉防風去蘆羚羊角鎊羌活細辛去苖葉生乾地黄焙菊花元参杏仁去皮尖䨇仁炒黄地膚子蜀椒去自并合口炒出肝梔子仁青葙子决明子當歸切焙各一両右粗搗篩每服五錢水一盞半煎至一盞去滓食後温服珍珠散出聖惠方治眼生努肉瞖膜赤脉風赤澀痛難開珍珠細研水飛過琥珀細研水飛過犀角屑硃砂細研水飛過車前子地膚子甘菊花甘草炙微赤剉各一両茺蔚子二両川升麻一両半菥蓂子一両胡黄連細辛半両右為細散毎於食後以竹葉湯調下二錢大黄丸出聖濟總録治眼風熱生赤脉努肉大黄剉炒黄芩人参地骨皮洗去土焙决明子㣲炒防風石膽地膚子黄連去鬚甘草剉焙車前子各一両兔肝三具洗切日炙乾螢蟲一百枚去翼焙乾右為末用魚膽拌為劑更擣三五百杵令勻丸如梧桐子大毎服二十丸食後温水下臨卧再服升麻丸出聖濟總録治熱毒努肉瘡瞖升麻黄芩去黑心車前子决明子茺蔚子元参龍膽防風去蘆生乾地黄焙山梔子仁甘草地膚子各一両右為細末煉蜜丸如梧桐子大每服二十丸食後温漿下臨卧再服加至三十九前胡散出聖惠方治肝臟壅熱風毒所攻眼赤腫痛生努肉侵睛前胡去蘆頭防風去蘆頭獨活元参梔子仁車前子黄芩甘菊花甘草炙微赤剉桔梗去蘆頭地膚子以上各一両細辛一両半右為粗散毎服三錢以水一盞煎至六分去滓每於食後温服忌炙煿熱麵元参散治目赤痛努肉滿急方見本門目睛疼痛類瀉肝湯出聖濟總録治目赤痛生努肉滿急升麻蕤仁去皮車前子前胡去蘆頭秦皮去粗皮細辛去苗葉决明子微炒山梔子仁黄芩去黑心苦竹葉各三両甘菊花擇一両半右粗搗篩每服五錢以水一盞半煎至一盞去滓投芒硝末半錢放温食後臨卧再服如腹臟利即去芒硝蕤仁丸出聖濟總録治眼生努肉蕤仁三両芍藥防風去蘆各三両茺蔚子青葙子黄芩去黑心黄連去鬚石决明各一両一分枳殻去穰麩炒桂去粗皮各一両右為細末棗肉為丸如梧桐子大食前黄耆湯下二十丸至三十丸日再决明散出聖濟總録治眼生努肉侵睛及贅肉生瘡暈膜赤决明子炒車前子青葙子各半両萎蕤黄連去鬚甘草炙羚羊角鎊芎藭枳殻去穰麩炒各一両右為細散每服三十丸食後温漿水調下臨卧再服通明飲出聖濟總録治眼生努肉羚羊角鎊地骨皮剉山梔子柴胡去苖各一両蔓荆實芍藥蕤仁各三分枳殻去穰麩炒半両右粗搗篩每服三錢以水一盞煎至七分食後去滓温服日再烏犀丸一名犀角丸治努肉貼睛熱痛方見本門外障眼類黄連膏出聖濟總録治風熱眼努肉痒痛黄連去鬚黄蘗去粗皮蜜炙升麻蕤仁去皮各一両細辛去苖葉三分石膽末半錢研極細龍腦研細一両蜜一両右除龍腦石膽外粗擣篩以水二升煎至一升濾去滓兩徧澄淸次下白蜜一両煎令稀稠得所後入石膽龍腦攪勻入瓷盒宻封每㸃如黍米大細辛湯出龍木論治胞内膠凝外障努肉侵睛細辛人参五味子車前子黑参各一両防風地骨皮各一両半右糊為丸如梧桐子大加酒少即添酒為糊日午夜卧濃煎槐枝湯下三十丸五加皮湯出聖濟總録治青盲目無所見五加皮剉元参桑白皮麥門冬去心焙各一両茯神去木半両右搗篩每服五錢以水一盞半煎至七分去滓入荆瀝半合再煎一兩沸放温食後臨卧服治眼青盲不見物多淚宜㸃此方出聖惠方雄黄一両細研細辛一両乾薑一両炮製剉黄連一両去鬚蕤仁三十枚湯浸去赤皮右為細散入雄黄拌令勻以蜜二兩和内於甆瓶中油單宻葢於飲甑蒸一炊用新綿濾過以磁盒子内盛每卧時取麻子大㸃之猪肝膏出聖濟總録治内障青盲風赤瞖膜猪肝一具於净鐺中以水一斗同藥煑豆花地黄花槐花各一両右為末和肝煮一時辰上有凝脂作片掠取於磁鉢中以火煖之上有似酥片者即收入磁盒中以銅筯㸃眼槐芽散治青盲方見本門雀目類治眼靑盲不見物者宜服此方出聖惠方天靈盖二両多年爛者净洗了塗酥炙令黄龍腦三両去蘆頭白龍腦一錢細研右為末入龍腦研勻取黑豆五升净淘以水煮令豆爛取汁即煉成膏拌藥丸如梧桐子大毎服以溫水下二十丸日三服頻用新汲水洗頭面凡欲服時先令患人洗浄沐浴及剃却頂心髮静一室泥飾不得通明令安止自在供食慎䕶將息不論晝夜不得見明為供湯藥及食供食及藥畢便出房外兼不得在房内吹燈燭忌聞燈油煙氣如此忌慎一百日若至五十日七十日便開一方竅試令患人看當便是明却閉明處令滿百日漸看明却已見物者眼氣力復若不得全似尋常看物便使坐於室内將息直待好妥甚妙切忌羊血雞肉及動風壅滯熱喜怒房室等傷寒後青盲日近可治百一選方仙靈脾二両淡豆䜴四十九粒右以水一碗半煎至一碗露冷令病人頓飲之即瘥明目百葉丸出聖惠方治青盲百葉一両微炙夜明砂一両以糯米炒令黄右為末用牛膽汁拌和丸如梧桐子大毎夜臨卧時竹葉湯下二十丸至五更初以粥飲下二十丸真珠煎出聖惠方治眼青盲不見物宜㸃真珠一両白蜜二合右合和微火煎兩沸綿濾取汁日四度㸃之神效决明散出聖惠方治積年失明成青盲决明子三両蔓菁子三両蒸二夕為度乾右為細散每於食後以温水調下二錢烏雞丸出聖濟總録治青盲用黄荆嫩頭於春初取之九蒸九暴取半斤用烏雞雙翅黑者以米飼三日安浄板上飼以大麻子又一二日施收糞乾取半浄磁瓶子内熬令香黄然後和荆頭搗成末煉蜜和如梧桐子大每服十五丸陳米飲下加至二十丸日二服治眼忽不見物如青盲狀出聖濟總録令人爛嚼乾薑以舌舐眼六七度即瘥馬齒莧方出龍木論治青盲白瞖除邪氣利大小賜去寒熱以馬齒莧一大升搗為末毎一匙煮葱䜴粥和攪食葉作粥及著米糝五味作羮亦得桑柴火方出龍木論治青盲此一法當用之視物如鷹鶻者有此方效右以正月二八月三月六四月四五月六月二七月七八月二十九月十二十月十七十一月二十十二月晦遇上神日用桑柴灰一合以煎湯注之於磁器中澄令極清以葉枝梢燒洗之如覺冷即重湯煮令不住洗遇上神日不得不洗縁此神日本法也猪膽方療目盲用猪膽一枚微火上煎之可丸如黍米大内眼中頓良一用五枚取汁於銅器内煎如膏不時㸃之鐵扇子治青盲並迎風冷淚以十二月桑樹上粘帶不落自乾桑葉煎湯洗之數日漸覺見物半年如舊昔有一婦因䘮二子啼哀不已忽然雙目不見如青盲之狀忽遇授此方服至半年其目如故魚膽方療眼盲腦痛青盲㸃之以鯉魚膽并腦等分調以注目眥日三次良治眼青盲瞳子不壞者十得九者右取蔓菁子三斤蒸之看氣上以金中湯淋之暴乾還蒸淋如此三遍乾搗細羅為散每服以温酒調下二錢漸加至三錢空心及晚後服之宻䝉花方宻䝉花主青蒙膚瞖赤澀多眵淚消目中赤脉及肝氣攻眼水煎服治十年青盲取白大未開時乳汁注目中羚羊角方以羚羊角治青盲目痒風氣頭痛水磨服古文錢治目盲障膚赤以古文錢水磨㸃目中亦以鹽滷浸用治明目去盲􅀈以羊肝薄切日乾為末和决明子蓼子並炒香搗篩為丸每日服之普濟方卷八十二
