body:
  text: 普濟方卷八十二明周王朱橚撰眼目門眯目論夫眯目者簸糠飛塵等物入於目中也治宜亟出之久不出着於瞼眥因而傷動則為澁痛淚出古方初眯時令以綿裹筯撩去之或以墨汁或以雞血浮出之皆良龍目雲論眯目飛塵外障者初患之時皆因飛颺塵物入眼貼瞼皮粘定睛上疼痛隱澁難開木雜等症欲治之時但翻轉眼皮用綿裹針撥出眯物然切宜服藥將息忌口若因此翳膜生急須退之宜車前散補肝謌曰眯目諸般物飛來并濺來貼睛傷瞼眥疼痛復難開綿裏藏鍼撥物出始舒懐因兹翳膜好藥酒却能囬方車前散出龍木論治眯目飛塵外障車前子洗焙五味子炒芍藥各一両半細辛去蘆葉黑參茯苓白者去黑皮人參大黄剉炒桔梗剉炒各一兩右為細末以水一盞散一錢煎至五分食後去滓温服治雜物眯目不出出聖惠方用鮑魚頭二枚地膚子半合以水煎令爛取汁以注目中即出補肝丸出龍木論治眯目飛塵外障澤㵼菖蒲各二兩半乾山藥人參茯苓防風遠志知母乾地黄各二両右為末煉蜜為丸如梧桐子大空心吞下一十丸用葉下紅以鹽少許用絹片裹滴在眼中左眼疼用滓塞右鼻右眼疼塞左鼻如上障用雪裏開并用鵞不食草些少同前藥搗碎滴汁於眼中滓亦塞鼻脂膏出聖惠方治一切物入眯目中妨痛不可忍方取猪脂去筋膜於水中煮待有浮上如油者掠取貯於别器中又煮依前再取之仰卧去枕㸃於鼻中不過兩三度其脂自入眼角中流出眯物即出治麥芒入目出本草煮大麥湯洗之治沙塵入眼不可出者出本草取蜣蜋一枚手持其背遂於眼上影之沙塵自出治眯目物芒入目出本草以墨汁㸃瞳子上治眯目去刺出本草以穿鮑魚繩煮汁洗之大良也治竹木屑入目不出出本草以穿鱓魚繩煮汁洗之良治目中眯法出千金方旦起對門戸跪拜云門戸狹小不足客及便瘥外物傷目論夫目為外所傷輕者因物撞擊胞瞼腫痛重者或致目睛突出但眼帶未斷即内入瞼中急搗生地黄綿裹以傅之仍以辟風膏磨四旁無使外風乘隙内服除熱治風鎭驚定痛藥療之若治之失時惡血凝積腐瘀侵睛致生翳膜鈎割熨烙當隨所宜也龍木論云偶然被物撞破外障此眼初患之時必然被物悞有打撞瞼胞睛珠疼痛腫難開宜令鎌洗出血後以爛搗地黄綿裹封眼然後宜服除風散壓熱飲子口謌曰非理因遭撞破傷不任疼痛甚慌張瞳人破根念昏濁惡血仍流在眼眶欲療還須鎌瞼血地黄綿裹宻封藏除風壓熱凉湯飲免使他風致灾殃撞刺生翳外瘴此眼初患之時因被物悞有撞刺著治療不盡有餘㾗積血在瞼眥之中致此生翳如此病狀不須鈎割不須熨烙切須將息大忌淫慾嗔怒宜人参湯退熱茺蔚飲謌曰若有撞刺翳生根治之不盡有餘痕待他痛定徒磨治勸君將息忌淫嗔覺熱更須將藥壓外風切莫使相因若言此翳鈎除得知君不是解醫人方壓熱飲子出龍木治偶被物撞破外障犀角鎊大黄剉炒知母焙人参白茯苓去黒皮黄芩去黒心黑参各一両麥門冬焙一両半去心甘草半両炙剉右為末以水一盞散一錢煎至五分食後去滓温服赤芍藥散出聖惠方治眼撞打著疼痛赤芍藥一両茺蔚子一両防風去蘆頭川芎蒿本桂心黄耆剉枳殻黄人炒㣲去穰白芷各二両右為末散每服三錢水一盞煎至六分去滓不拘時服治目睛為物傷疼痛不可忍者傳信適用方以牛尿日兩次㸃之避風雖黒睛破者亦可療琥珀散出聖惠方治眼撞打着瞳人不損目睛有瘀血不散疼痛不可忍琥珀細研當歸剉微炒川大黄剉各㣲炒両赤芍藥羚羊角屑桃仁湯浸去皮尖䨇仁炒㣲黄突厥白生乾地黄藁本各三両右為細散不計時毎服食後以温水調二錢人参湯出龍木論治撞碎生翳外障人参二両黑参茯苓白者去黑皮黄芩去黑心五味子羌活去蘆頭細辛去苗葉各一両車前子二両半右為末以水一盞散一錢煎至五分食後去滓温服龍鹽膏聖濟總録治沙土入眼痛不可忍腫赤者鹽龍腦硼砂研馬牙硝研硵砂研飛􅂈蕤仁各一分杏仁去皮尖雙仁二十七粒右各研細再同研勻以生蜜和稀稠得所新磁盒盛用竹筯卧㸃瞿麥散出聖惠方治眯目不出生膚翳瞿麥穗乾薑炮各一両右為細末以井水調服二錢日二食後治稻麥芒等入目中方出龍木論取出蠐螬再以新布覆目上將蠐螬從布上摩之芒著布出良白魚方出聖惠方治沙石草木入目中不出以書中白魚取其汁注目中一方以衣中白魚暴乾為末㸃治雜物眯眼不出方出聖惠方以蠶沙揀令净空心用新汲水吞下十枚勿嚼破又方出聖惠方治雜物眯目不出右用桑根白皮取新者一片如筯大削一頭薄令軟滑可漸漸入眼中撥之須臾自出又方出聖惠方治雜物眯目不出用新大麥半合煮汁漸注目中即出又方出聖惠方用白蘘荷根取心搗絞汁滴入眼中即出又方出聖惠方用繒帶燒灰細研每服二錢水調服之即出又方出聖惠方東牆上馬齒莧燒灰細研少許㸃眥頭即出又方出聖惠方用生粟米七粒爛嚼并唾洗之即出又方出聖惠方用雞肝中血少許取滴目中即出又方出聖惠方用䜴三七粒以水浸洗目視之即出又方出聖惠方以酥少許内鼻中即隨眯目左右垂頭卧少時令流入目中淚與眯物同出又方出危氏方治飛絲入眼腫痛刮指甲上細屑筯頭㸃津液㸃爪屑入眼目其絲自隨爪㧞出又方出危氏方以石菖蒲椎破如絲在左眼菖蒲塞右鼻中在右眼即塞左鼻中百發百中治眯目良方出龍木論以食鹽并鼔罡水視之即出又一方以麻油滴入眼中即出又方出海上方治飛絲入眼腫痛以白菜及鮮茜菜包手帕内擘開眼滴汁三両㸃即出治眯目不明方出聖惠方雄羊鹿筯擘之如披筯内筯口中熟嚼擘眼内著腫子瞼上以手當瞼上輕之若有眯者二七過便出之視眯當著筯出未即止未出者復為之如此法當以平旦日未出時為之以瘥為度出訖以好蜜注目眦頭鯉魚膽亦佳若數目痛可間日之出墨運方出危氏方治飛絲入眼令人眼睛脹突出痛不可忍兼治脹膜及草芒沙石眯目不出用新筆兩三管濡好墨更换頻運睛上飛絲纒筆而出即安愈又一方治雲母并入眼㸃大小眥頭隨墨出又一方用清水研細墨以銅筯㸃之又方出聖惠方退熱茺蔚散出龍木論治症同前茺蔚子二両防風去蘆芎藭桔梗剉炒人參知母各一兩焙藁本去苖五分白芷三分右為末每日米飲調下一錢除風散出龍木治偶被物撞破外障防風去蘆二両車前子藁本去苖土細辛去苖葉五味子芎藭桔梗剉炒各一両半右為末用陳米飲空心調下一錢經效散治撞刺生翳大黄當歸芍藥各半両北柴胡各一両去蘆粉草連翹各一分犀角一錢後入右剉散每服三錢水一中煎食服仍用日生膚瞖磨翳膏㸃之生乾地黄散治眼忽被撞打着腫澁疼痛生乾地黄川芎羚羊角屑川大黄剉碎㣲炒已上各一両赤芍藥枳殻黄炒㣲去穰木香已上各三分右為末每服三錢以水一中煎至六分去滓不計時温服木通湯治目傷睛損木通剉赤芍藥大黄剉各一両半白芷三分防風去蘆山梔子仁各一両右粗搗篩每服五錢水一中半入苦竹葉七片煎至七分去滓入地黄汁一合更煎両沸食後温服臨卧再服治損傷眼藥大黄半両當歸乳香没藥赤芍藥甘草各二錢半右為散酒一碗水一碗同煎服地黄膏治被物撞打生地黄一合黄連一兩黄栢寒水石各半兩右以地黄自然汁和藥成餅子要用時以紙貼目上非但是撞打可用凡風熱赤目熱淚出等眼皆可用以其性凉能逐去熱毒耳三膽汁㸃眼方治目為物所傷羊膽二枚雞膽三枚鯉魚膽二枚右摘破將汁和勻每㸃日三上生地膚方治目為物所傷睛陷努肉以生地膚去土洗二兩絞取汁磁盒盛每取少許㸃目各月將乾者煎取濃汁用又方治為物所傷或努肉以杏仁湯浸去皮尖雙仁爛研用人乳化開日三度㸃努肉上物落眼方治麥芒及塵土並物入眼不出以大藕一節净洗爛搗以綿子裹於眼上擠取汁落眼中立出鯉魚膽雞肝血京墨汁皆可㸃睛為所傷損破方牛涎日二㸃避風黑睛破亦瘥墜睛論夫墜睛者眼為賊風所吹血脉受寒貫衝瞳人風寒氣隨眼帶牽拽睛瞳向下名曰墜睛也日久不治瞳人損陷遂至失明方犀角散治墜睛眼時發疼痛視物散亂犀角鎊羚羊角鎊各半兩青羊膽一枚五味子槐實青葙子荆實炒茺蔚子蘆薈研胡黄連地骨皮各三錢兔肝炙乾一具右除膽外研為散以膽汁拌勻每服二錢食後煎槐子湯調下臨卧再服忌發熱毒物槐實丸治墜睛失明眼牽䧟槐實羚羊角鎊獨活去蘆頭天麻沙參地膚子人參各一兩半防風去蘆甘菊花枳殻去穰麩炒各一兩决明子二両右為末煉蜜和丸如梧桐子大每服三十丸空心臨卧淡漿水下一方無膚子菊花散治墜睛風毒牽瞳人向下眼帶𦂳急視物不明甘菊花羚羊角屑各一両旋覆花防風去蘆頭蔓荆子各三分生乾地黄海桐皮秦艽去苖附子炮製白者决明子芎藭各半両右㕮咀毎服三錢水一中煎至六分去滓食後温服臨卧再服之犀角散治墜睛眼失明眼睛牽䧟或時發疼視物散亂犀角帶羚羊角屑各半両車前子枸杞子各一両槐子五味子青葙子牛蒡子㣲炒茺蔚子胡黄連各一分兔肝一具㣲炙右搗細羅為散毎於食後煎槐子湯下二錢臨卧再服羌活散出聖惠方治墜睛久不瘥羌活二両秦艽去苖防風去蘆頭桂心牛蒡子㣲炒胡黄連茯神各一両白附子炮製犀角屑酸􅀥仁㣲炒各三分龍腦一分研細右搗為細散每服空心鹽湯調下二錢晩食前煎麥門冬熟水再調服之細辛散出聖惠方治墜睛眼風熱牽瞳人向下細辛赤茯苓黄芩各一両麥門冬去心焙木通黄連萎􅅋各一両半川大黄二両剉碎㣲炒甘草半両剉碎㣲炒右㕮咀每服四錢以水一盞煎至六分去滓食後温服臨卧再服忌炙煿膩毒滑魚肉㸃眼蕤仁煎出聖濟總録治墜睛風毒所攻蕤仁去皮研二両黄連去鬚剉地骨皮取白者用曾青研如粉各一両靑鹽一分古錢十文蜜二盞右以新綿裹六味安新磁瓶中與蜜相和煑一復時後以重綿漉去滓冷盡依前安瓶中着露地兩宿去毒日㸃黍米大日三五次洗眼决明湯出聖濟總録治墜睛視物失明决明子柴胡去苖秦皮防風去蘆蛇啣草各一両生乾地黄二両右剉細每用一両以水三盞煎取二盞去滓再用綿濾過每温熱洗訖避風即瘥㸃眼藥方出聖惠方治墜睛風熱所攻猪肝一具黑豆花曝乾槐花曝乾地黄花曝乾各一両右除猪肝外搗細羅為散和猪肝内鐺中以水二斗緩火煎俟上有凝脂而収取之此是藥矣以物掠盡為度以磁盒中盛每以銅筯取如黍米大㸃眦中日三四度目珠子突出論夫人因風熱痰飲攻積腑臟陰陽不和肝氣藴積熱毒之氣上衝於是使目睛疼痛甚者突出治宜先服寒藥以㵼肝氣然後調治勿求速效惟漸治之仍須㣲針引出惡汁也龍木論云突起睛髙外障眼初患之時皆因疼痛𤼵􅀈非時盖是五臟毒風所攻全行突出此疾不宜針灸鈎割只宜服退熱桔梗飲黄連丸還睛丸用針破流出清汁即得稳謌曰忽然疼痛便睛髙毒風五臟熱相遭飲㵼肝湯令氣順又吞丸散漸還消若要終歸平穏處鍼出清涎莫用挑更鍼三次引惡汁睛輪平復似原朝方黄連丸出聖惠方治熱毒攻眼目珠子腫突出黄連去鬚犀角屑地膚子决明子黄芩苦参剉元参車前子各一両川朴硝龍膽去蘆頭各三両右為末煉蜜和丸如梧桐子大每服食後温水下二十丸臨卧再服之還睛丸出龍木論治眼睛突起外障逺志茺蔚子各二両車前子一両半防風乾山藥五味子人参茯苓細辛各一両右為末煉蜜和丸如梧桐子