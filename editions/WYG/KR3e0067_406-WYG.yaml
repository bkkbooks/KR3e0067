body:
  text: 普濟方卷四百六明周王朱橚撰嬰孩諸瘡腫毒門五色丹毒附論夫丹之為候由熱毒之氣摶於榮血而風乘之所以赤乳肌肉而為之走注也外因乳母食啖熱毒物藥及烘衣不候冷便與兒服而得之其證或發於手足或生於頭靣胷脇令兒煩悶腹脹其熱如火痛不可言赤腫遊赤徧體也湯氏所為丹有十五種又有赤遊風及熛瘡本事方以十種治之然丹不特色赤或青或黄或白或黒是血熱風毒有盛有衰挾冷挾熱故其色變易又不同焉要之諸瘡皆属於心心為血之主血為熱之媒古人以丹命名葢謂心應火色尚赤揣本揆元大槩心家血熱所致風以動之於是遊赤而遍體也蔓衍而不歇則爛肌自四肢而入腹入腎則殺人惟初生於胷腹然後流散於四肢者易愈夫小兒五色丹者由丹發而變改無常或青黄白黑赤此是風毒之熱有盛有衰或冷或熱故發為五色丹也赤丹者由風毒之重故使赤也初發疹起大如連錢小者如麻豆肉上生粟色如鷄冠故謂之赤丹亦名茱茰丹也白丹者由夾風冷之氣故使色白也初發痒痛微虚腫如吹妳起不痛不赤而白也黑丹者由風冷傷於肌肉故令色黑也初發痒痛或熛腫起微黑色者是也丹發於肉中有赤如丹色大者如手劇者遍身赤痒故號天火丹丹發於兩脇及腋下此謂之殃火丹也丹發兩膀上過一日便赤謂之神火丹也丹發赤斑如梅子遍背腹謂之野火丹也丹初發着兩頰兩腋下兩膀上謂之家火丹也丹發如灼在脇下正赤初從頭起而多痛謂之螢火丹也朱田火丹由丹發於背漸至遍身一日一夜而成瘡謂之朱田火丹者是也丹發兩膀裏尻間正赤流至隂頭赤腫血出謂之天竈火丹也丹發從足趺起正赤謂之廢竈火丹也丹發膝上從兩股起及臍間走入隂頭謂之尿竈火丹也有肌肉虚者為風毒熱氣所乘熱毒摶於血氣則皮膚赤而腫起其風随氣行遊不定故名赤遊腫也凡患諸丹癅腫毒必須先服升麻飲之類導氣藥以散其毒方可用藥調塗不然恐毒氣入腹則殺人也凡小兒丹瘤乳腫毒赤走引遍身者乃邪熱之毒在表以磁片撇出紫血其病立愈如不愈者後用凉膈散加大黄芒硝利三五行為效次用㧞毒散掃三五度必愈矣經曰丹煉赤瘤火之色也相火主之凡小兒有赤瘤暴腫可用牛黄通膈丸㵼之後用陽起石散傅之則腫毒自消如不消可用䤵針砭刺血出而愈矣䤵風熱發丹古方謂小兒得之最忌以其氣血未定肌膚柔脆無以勝悍毒故也是以諸丹不同其發無定處俗又謂之溜流走經絡散發肌表如塗丹之赤有法可鎌洩去毒氣不爾則毒入腹近心則死但初發於心頭者不可鎌爾方藍青散治丹毒大赤腫身壮熱百治不差寒水石十六銖石膏十三銖藍青十二銖冬用乾者犀角八銖柴胡八銖知母十銖羚羊角六銖杏仁八銖芍藥黄芩各七銖梔子二銖竹􅅹一升生葛汁四合澄清蜜二升右㕮咀以水五升并竹瀝煮取三升三合去滓内杏仁脂合蜜汁㣲火煎取二升一二歲兒服二合大者量加之米飲化下搨湯治小兒數種丹方大黄甘草當歸芎藭白芷獨活黄芩芍藥升麻沉香青木香木蘭皮各一兩芒硝右㕮咀以水一斗二升煑取四升去滓内芒硝以綿揾揚中適寒温搨之乾則易取差止藍葉散治諸丹發熱赤腫白芷柴胡知母杏仁去皮川芎赤芍藥生地黄川升麻生甘草各一分乾葛一分爛石膏梔子仁各半兩藍葉日乾一分右剉細每一錢半新水煎服熱甚加黄芩𤣥參煎服藍青散治一切丹毒赤腫身熱如火已服諸藥不退由風熱毒氣在於腠理熱毒摶血蒸發於外其皮上熱而赤如丹塗之状故謂之丹若乆不治則肌肉壞爛若毒氣入腹則殺人也今以一方同療之藍青知母甘草梔子各半兩黄芩一兩杏仁去皮尖用半兩升麻柴胡寒水石石膏各一兩赤芍藥四錢羚羊角右㕮咀每服三錢水一盞煎六分三次温服升麻膏治小兒一切丹發無常處體熱如火燒川升麻川大黄景天草蛇衘梔子仁寒水石川芒硝藍葉生地黄芭蕉根羚羊角屑梧桐皮各半兩右細剉以竹瀝浸一宿明日漉出却入鐺中用臘月猪脂一斤於慢火上熬一食乆承熱以綿濾去滓候冷成膏以甆合盛旋取摩之兼以膏如枣核大以竹瀝調服之升麻膏治小兒赤毒腫川升麻白歛漏蘆川芒硝各一兩黄芩枳殻連翹蛇御各一兩半梔子仁二兩蒴藋二兩右細剉以猪脂一斤入於鐺中以慢火煎諸藥令赤色去滓放冷以甆合盛旋取塗之麻黄湯治小兒丹毒風腫及風疹麻黄一兩半獨活射干甘草桂心青木香石膏黄芩各一兩右㕮咀以水四升煮取一升三歲兒分為四服日再升麻黄芩湯治小兒月内發丹一名藍葉散升麻黄芩去黒心犀角鎊大黄剉柴胡去苖山梔子仁各半兩石膏三分甘草炙剉一分藍葉切二合右搗篩每服二錢七水一盞煎至半盞去滓食後分温二服更量大小加减外䑓秘要用竹瀝四合同煎治小兒惡毒丹及風疹麻黄升麻葛根各一兩射干鷄舌香甘草各半兩石膏半合右㕮咀以水三升煮取一升三歲兒分三服日三治小兒大腹痞滿丹毒寒熱取郎耶根莖煮服之治小兒衝惡熱毒煩悶及諸熱丹毒以生銀水磨服功勝紫雪忌生血内托散紅内消當歸茄片甘草節羗活黄芩各半兩麝香半錢右為末每服二錢茄蒂煎湯調下或生地黄亦可金花散治一切丹毒鬰金黄芩甘草山梔大黄糯米黄連右各一兩生為末蜜和冷水調以鵝毛上患處淋洗方防風桑白皮黄菊花丹參莾草荆芥棗木根等分右剉煎水避風浴之大黄散治小兒一切丹遍身赤痛川大黄半兩剉微炒防風半兩去蘆川升麻一分黄芩一分麻黄一分去根節秦艽一分去苖川朴硝三分右搗羅為散每服一錢以水一盞煎至五分去滓放温不計時候量兒大小分减服之防己散治丹腫候熱毒之氣極與血相搏而風乘之故赤腫及遊走遍體者又名赤遊風入腹入腎則殺人也漢防己半兩朴硝犀角黄芩黄耆川升麻各半錢右㕮咀每服半錢水一盞加竹葉煎去滓大小以意加减服之一方加川芎蜜煎升麻飲治一切丹遍身壮熱煩渇赤流初發甚者一名消毒散升麻黄芩大黄各一錢麥門冬去心葛根朴硝各三錢研右為細末和勻熟水調下半錢一方煎服無葛根量兒大小加减黄芩湯治小兒丹毒徧身黄芩去黒心麻黄去根節秦艽去苖土升麻各一兩大黄剉炒防風去蘆各半兩右搗篩每一錢匕水七分煎至四分下朴硝末半錢匕去滓空心分温二服晩再服更量兒大小加减寄生散治毒腫甚者桑寄生獨活川大黄各一兩犀角朴硝甘草各半兩右搗羅為末每服一錢煎五分去滓温服量兒大小加减升麻膏治小兒赤丹初發肉色如硃色如鷄冠又名茱茰丹川升麻白歛漏蘆川芒硝各一兩連翹梔子各半兩右剉細以猪脂半斤入鐺中用慢火煎諸藥令赤色去滓放冷以磁合盛旋取每用少許塗患處升麻湯治小兒黒丹以此藥搨之升麻散二兩漏蘆二兩川芒硝二兩黄芩三兩梔子仁一兩蒴藋半兩右細剉和勻每用三兩以水五升煎至三升去滓微温以軟帛旋蘸搨病上以消為度牛黄散退丹毒鬰金甘草炙桔梗天花粉葛粉右等分為細末每服一錢薄荷湯入蜜調下淋洗方防風桑白皮黄菊花丹參莾草右等分加荆芥煎湯浴患處黄耆湯治小兒丹毒黄耆剉蒺䔧子炒去角黄芩去黒心大黄剉焙甘草炙剉各一分右搗篩每一錢匕水七分煎至四分下朴硝末半錢匕去滓食前分温二服更量兒大小加减吳藍湯搨方治小兒發丹毒熱痛吳藍大黄槐白皮啇陸榆皮各二兩右細剉每用二兩以水五升煎至四升去滓入朴硝半兩攪勻以綿二片浸於湯中更旋搨丹上日三五度即差祛毒膏治小兒丹黒色痒痛腫起一名祛毒散川升麻漏蘆芒硝各二兩黄芩一兩梔子一兩右為麄末每用兩匙頭以水三盞煎至二盞去滓微熱以軟帛旋蘸搨瘡上以消為度治小兒五色丹川大黄黄芩川芒硝梔子仁乾藍葉商陸各一兩右羅為散以水調塗之立効治小兒天竈火丹薺葉三分赤小豆一合鍜鑪門上灰一兩青羊脂三兩葱白二莖切右相和搗如膏摩之燥再摩之㧞毒散治小兒丹毒肉色變異或着四肢或在胷背遊走不定焮熱疼痛㧞毒消腫散熱痛石膏三兩甘草黄蘖各一兩寒水石七兩右為細末毎用水調服時以鷄翎刷掃以芭蕉汁調尤妙朱黛散治解丹熱諸毒青黛土硃各一分軟滑石荆芥穗各半分右為末每一錢半蜜水調下兼與撲身寒水石散治角癉遊走不定焮然赤腫疼痛用藥角歸手足上為妙寒水石石膏黄連黄栢各一兩右為末水調刷治小兒野竈丹從膝起薺葉塗方乾薺葉末香薷末赤小豆末各半兩生蒴藋葉莖一握細剉右細研蒴藋入諸藥末和調如糊塗乾即易之以差為度治小兒天竈火丹發尻間正赤流隂頭赤腫血出葱薺苨塗方葱五莖和須切碎薺苨五莖生者和梗切研赤小豆末竈門上灰研各一合右合研勻細以青羊脂三兩調勻塗之以差為度治小兒天火丹發徧身赤如絳色痒痛甚者桑根白皮二兩丹參二兩甘菊一兩半莾草一兩右細剉和勻每二兩以水三升煎至二升去滓令煖避風浴兒棗根湯治小兒五色丹徧身冝用洗浴丹發而變改無常棗木根四兩丹參三兩乾菊花二兩半右細剉煎湯避風冷處浴之次敷藥每用二兩以水五升去滓丹毒至効散治小兒一切丹毒及龍帶發作先服消毒飲次用傅之黄丹一錢朴硝一錢赤小豆兩頭尖者為末半合右研令勻井水調以鷄毛刷立効麻黄散治小兒丹若入腹及下部隂卵百藥不差麻黄去根節升麻各半兩硝石研一兩右搗羅為散每服半錢七井花水調下空心日晩各一三黄散貼一切丹腫毒大黄黄蘖宣連各等分右為末獖猪膽汁調塗頭心及貼脚心又方用硝石白麫等分研勻井水調稀睡時塗脚心効硝石散治小兒丹發如灼其初從額起至脇下大痛者名螢火丹硝石半兩寒水石一分赤小豆一合右搗羅為細末每用半錢以冷水調塗患處一方用猪脂莾草散治小兒丹發從足趺起色正赤乃名癈竈火丹莾草寒水石硝石各半兩右搗羅為散每用以新汲水調塗患處一方毎服半錢一日三服量兒大小加减服之愼火草散治小兒一切丹通用慎火草半兩紫葛半兩硝石半兩右搗羅為散用冷水調塗之乾即再塗以差為度治小兒黑丹茺蔚子蛇啣草慎火草各二兩右搗令爛以鷄子白調塗之治小兒天竈火丹細辛一兩糯米一合景天草三兩右搗如泥塗丹上差白玉散治赤遊丹毒白玉一兩寒水石二兩右為末米醋調傅貼患處或腫至外腎有破處只用水調亦可保嬰方無白玉用白土如乾上用水鷄翎掃之治小兒天竈火丹病從髀間起其小兒未滿百日犯行路竈君若熱流下令隂頭赤腫血出方鯽魚肉剉五合赤小豆末三合右二味同搗少水和傅之良姜礬散治小兒火丹并一切風疹赤腫生姜五兩切片子白礬二兩半研同上調少時自乾不見火右為末生姜自然汁調鵝毛拂之又方牽牛末薄荷蜜水調下食後大便利是効治小兒丹瘤綿羊腦子生用朴硝右調勻貼於瘤上備急治白丹苧麻根三斤連葉赤小豆四升右以水三斗煮浴日三四遍浸洗妙看冷熱避風甘草散治小兒丹毒防入腹甘草炙剉一分為末油麻半斤右先取油麻去皮研細絞取汁一合調甘草末半錢七服日再服青藍汁治小兒丹毒青藍汁一合竹瀝二合右和勻空心温服一合日晩再服以差為度鯽魚塗方治小兒丹毒徧身絳色生鯽魚一頭三兩麻油二兩右搗魚令細入油研勻塗丹上日三五度即差梓木灰塗方治小兒家火丹發如大指日長一寸偏着兩脇傍兩頰上梓木白皮蓼葉各一分右燒灰研末以鷄子白調如糊塗之以差為度猪槽泥塗方治小兒烟火丹從身起猪槽下泥一合生麻油一兩右和調如糊塗之以差為度癈塼塗方治小兒地竈丹從隂下起入踝骨上廢竈塼末屋四角茅燒灰各一兩右和研勻細以新水調如糊塗丹乾即易之以差為度戎鹽塗方治小兒鬼火丹發兩臂赤起如李子及從靣上起戎鹽一分附子一枚右燒過研細用雄鷄血調塗丹上日三五徧以差為度一方用雄黄半兩雄黄塗方治小兒野火丹發徧身斑如梅李狀雌黄戎鹽研各一兩右以鷄子白調塗丹上日三五次以差為度一方有雄黄無雌黄猪通灰塗方治小兒白丹猪屎灰鷄子白右調和如糊塗之以差為度茅灰塗方治小兒火丹從踝及䏶起茅草屋四角者取燒研灰鷄子白右和調如糊塗之以差為度㧞毒散治小兒發丹生於兩脅及腋下乃名殃火丹川朴硝一兩梔子仁一兩右羅為末每用半錢好醋調塗患處山梔膏治丹發生於兩脅及腋下乃名殃火丹山梔子四兩生鯽魚半斤右藥同搗如泥每用少許㸔丹發處以醋化塗患處竹葉散治小兒丹發斑斑如梅子徧背腹乃名野火丹青竹葉二兩燒灰竈中黄土一兩右細研為散㸔丹發處每用少許以鷄子白調塗患處赤豆散治小兒丹發於兩膀裏尻間正赤流至隂處乃名天灶火丹赤小豆一分研伏龍肝一分研右再同研勻每用一錢以鷄子白調塗患處二根湯治小兒丹發膝上從兩股至臍間走入隂處乃名尿灶火丹桑根白皮李子根各四兩右細剉每用三匙頭以水兩碗煎至一碗去滓㸔冷熱避風處淋患處硝石散治小兒一切丹徧身體熱硝石一兩乳香一分右細研為散以鷄子白調塗之又方太隂𤣥精一兩白礬一兩右細研為散以調塗之治小兒白丹方酸母草五葉草各五兩右搗絞取汁塗之治小兒黒丹風花石灰二兩屋四角茅草三兩燒灰右細研為散以鷄子白調塗之日三五度効治小兒天火丹發徧身赤如絳色虎脂二兩黄丹一兩右研為膏塗之即差治小兒鬼火丹景天草五兩蛇啣草右㨶如泥以鷄血調塗之治小兒野火丹白殭蚕二七枚慎火草一兩右搗令爛塗之治小兒螢火丹竈中黄土一合生油二合右調如泥時用塗之以差為度若痛至隂不治即殺人治小兒癈竈火丹赤小豆末一兩牛角二兩燒灰右細研為散用鷄子白調如泥塗之治赤遊毒腫用花蕋石散生姜薄荷自然汁調鵝毛刷上患處此方尤妙於前白玉散行在潘術幹傅尤妙於前方只一晝夜消盡治小兒丹毒及火丹熱如火遶腰者用搗馬齒莧一握取汁飲之以滓傅其上亦可又方用煎大豆汁塗之良差後亦無瘢㾗又方用臘月猪脂和釡下土傅乾則易治小兒五色丹方用猪槽下爛泥傅之乾則易又方服黄龍湯二合并傅患處佳治小兒赤丹方用蕓薹葉搗取汁服三合滓傅上良千金翼以蕓薹末用鷄子白和塗治小兒赤丹斑駁者方用唾和胡粉從外向内傅之一方粉熬過又方用鍜鐡屎以猪脂和傅之又方用屋塵以臘月猪脂和傅之治小兒火丹赤如朱走皮中方用醋和豉研傅之又方用鯉魚血傅之良又方用荏子搗傅之良亦治天火丹又方用猪米水和絞取汁温服少許良治小兒天火毒肉中有赤如丹色大者如手甚者遍身或痛或痒腫方用赤小豆二升為末鷄子白和如薄泥傅之乾則易便差一切並用此方皆瘥一方用五合水和取汁飲一合取滓塗五心一方水調鵝毛拂上大妙又有鷄冠丹大者如豆粒肉上生粟一名茱茰火療同前天火法治小兒骨火毒其瘡見骨方用搗大小蒜厚封之着足踝者是也治小兒殃火丹毒着兩脇及腋下者方用伏龍肝為末油和傅之乾則易若入腹及隂以慎火草取汁服之治小兒尿竈丹從兩股起及臍間走入隂頭皆色赤用切桑白皮二升以水二升煮取汁浴之良又方用燒李根為灰以田中流水和之良一方半斤治小兒朱田火丹病一日一夜即成瘡先從背起漸至徧身如豆棗大正赤色者亦治茱茰丹五色丹用濃煮棗根汁洗之已成瘡者赤小豆末傅之未成瘡者鷄子白和小豆末以傅之凡方中用鷄子者皆取先破者用之完者無力治小兒癈竈火丹初從足趺起正赤色者用棗根煮汁沐浴五六度治小兒丹毒用白豆末水和傅之勿令乾黄皮散治小兒徧身火丹并赤遊用黄皮山梔子等分為細末雪水調塗即差又方菉豆大黄為末薄荷蜜水調塗又方藍澱塗之并藍青汁飲之獨効散治小兒諸丹毒并赤遊腫用栢枝研細塗立効又塗白礬汁頻刷之即消又方以芒硝泡湯拭之亦効治小兒丹毒腫痛如火用土蜂窠為末入麝香少許蜜調塗之水調與喫尤妙治小兒丹毒入腹即殺人用水苔生地黄生菘菜豆葉蒴籊浮萍護火草五葉籐苦硝海藻菜蕓薹大黄梔子黄芩但得一味研末水調傅之良治小兒熱丹瘡成片及治大人用系茅草葉破即愈治小兒丹瘤用萆麻子五箇去皮研如麫以水一匙調塗之甚妙又方用木鱉子新者去殻研如泥淡醋調傅之一日三五次便効治急救丹毒方用白扁豆末水和塗若入心腹者以慎火草取汁一盞服乾即末之水調服本事方治小兒十種丹瘤腫毒所起形候一飛竈丹從頂起腫光用葱白研自然汁塗二吉竈丹從頭上紅腫痛用赤小豆末鷄子清調塗三鬼火丹從面上起赤腫用竈心土末鷄子清調塗四天火丹從背起赤㸃丹桑白皮末羊脂塗五天竈丹從兩臂赤腫黄色用柳木燒灰水調塗六水丹從兩脇虚腫用生鐵末猪糞調塗七胡吹丹從臍上起黄腫用㯽榔末米醋塗八野火丹從兩脚赤腫用乳香末羊脂調塗九烟火丹從兩角有赤白㸃猪槽下土清油調塗十胡漏丹從隂上起黄腫用屋漏處土羊脂調塗右此十種丹毒變易非輕治之或緩終不能救余不惜是方逐一子細辦認依方法治之萬不失一如經三日不治攻入臟腑則終不可救治之也治丹瘤方用大黄朴硝大土蜂窠三味為末篾箍子箍定真赤處將刀子刺破令出惡血然後用井水調塗赤處効又方用茅屋上經年青苔焙乾為末醋調塗赤腫處消治小兒瘤初發用麻子擂為漿井水調下治小兒丹瘤服托裏散消毒飲外用白芨白歛研為細末搽無病肉上而截之令不得過却用紫浮萍爛研傅瘤上萬不失一治大人小兒纒蛇丹初發便用用蚯蚓糞連皮生姜研爛傅即愈亦治火丹以水和泥傅之米醋調亦可又方用大黄為末搗爛馬齒莧取汁調塗已成丹亦治又方用蓼葉燒灰鷄子清和數數塗之又方用桃仁湯浸去皮爛搗塗之又清油調白礬末亦妙治小兒風丹疹用蜜調赤土硃入酒一二滴服之亦研塗疹上治諸丹用人參羗活散惺惺散夾和用竹葉煎湯調下熱證加黄芩𤣥參冷證加黄耆白芷踈風觧毒散治丹毒傅方用紫浮萍一碗活地龍中等者七條同研細傅之又方用水藻搗傅又方用芭蕉根用汁傅之又方用蚕沙一升井水煎温和密室洗之亦治天火丹治青白丹毒痒痛虚腫如吹用竈中黄土一分豉半分為末麻油調傅患處蜞針法用水蜞數條以青苔盖覆或温紙亦可去血即消未消再用癉毒滿身徧黒入腹入隂難治平血飲治風熱積毒聚成發於頭面手足熱者如胭脂色其熱如火輕輕着手痛不可忍右加紫草與犀角消毒飲相間煎服赤癉丹火癉紫萍癉並治壮熱煩渇甚加黄芩麥門冬去心朴硝各半錢一方與敗毒散和生姜薄荷蟬螁去足翼防風去蘆細切煎渇加天花粉少許治角癉用青黛土硃為末井水調入蜜敷角亦可又方用黄丹不拘多少磨刀水調刷治丹毒腫如火用大黄朴硝為末調塗腫處立効水苔生地黄菘菜浮萍梔子皆可硏爛水調傅洗方用防風醋車前赤豆竈心土煎水洗又方洗角後用小驚丸壓邪大驚丸鎮驚治丹發疼痛用搗篇竹汁服一日一兩服立差若未差再服之治赤白遊疹及癰腫毒腫用水蛭十餘枚令㗖病處取皮皺肉白無不差也冬月無蛭虫地中掘取暖水中養之令動洗去人皮醎以竹筒盛蛭綴之須㬰便咬血滿自脫更用飢者崔知悌令兩京預養之以防緩急收乾蛭當展其身令長腹中有子者去之此物難死雖加火炙亦如魚子烟薫三年得水猶活也治小兒赤遊行於體上下至心即死方用芒硝内湯中取濃汁以拭上又方以水調塗之治一切丹毒流腫治小兒丹毒破作瘡黄水出亦治惡瘡用䜴炒令烟絶為末油調傅之治小兒丹毒用栁葉一斤水一斗煮三升去滓搨洗赤處日七八度治小兒赤丹不止用畨黄米粉鷄子白和傅之治丹者惡毒之瘡五色無常用蜜和乾薑末傅之良治丹火毒偏身睡不可忍亦治赤流用藦蘿草搗絞取汁或搗傅上随手消治小兒熱毒遊腫用故麻鞋草鞋和人亂髪燒作灰醋和傅之治火丹毒用梔子和水調傅之一方用醋和塗之亦治神火丹治五色丹俗名遊腫若犯多致死不可輕之用敗蒲席燒灰和鷄子白傅之治小兒赤遊行於體上下至心即死用水中苔搗末傅上良治暴熱小兒丹毒寒熱腹内熱結用搗積雪草絞汁服之治小兒丹毒皮膚熱赤用寒水石半兩白土等分搗羅為末用米醋調傅之愈治白丹用取白甆末猪脂和傅之治小兒丹毒從臍起方用伏龍肝是年深竈下黄土研為末用屋漏水和如糊傅患處乾即易以差為度用新汲水調亦得一方用鷄子白相和塗良治天竈火丹風熱赤遊腫用猪脂塗治小兒赤遊行於體上下至心即死用蒴藋煎汁洗之一方摶葉傅之治丹毒五色者治小兒油丹赤腫用蕎麥麫醋和傅之良療螢火丹從頭起用慎火草搗和苦酒塗之療煙火丹發從背起或兩脅及兩足赤如火用景天草即慎火草真珠末一兩搗和如泥塗之治小兒赤遊行於體上下至心即死用愼火草生一握搗絞汁以拭之搨上日十遍夜三四遍治小兒赤丹不止用胡荽汁傅之差療竈丹從兩脚赤如火遶用五加葉根燒灰五兩取鍜鐵家槽中水和塗之五色丹名油腫不可輕用牛屎傅之乾則易治赤丹用研粟米傅之治熱遊毒赤腫用栝樓末二大兩釅醋調塗之治小兒丹毒用青黛和水服之又以汁傅之熱則易治小兒遊瘤丹毒諸惡瘡腫用爛搗剪刀草莖葉如泥傅之又以此草膏化如糊以鷄翎掃上腫便消殊効根煮熟未甚乾時人作果子常食無毒治小兒丹毒熱用旋覆花根苖搗絞汁服之治小兒風熱丹毒瘡用水甘草同煎飲服之又方用杵菘菜傅之治小兒火熖丹消赤腫用老鴉眼睛草根與木通胡菜煎湯服通利小便治小兒丹用杵黄芩末水調傅之香欒皮散治諸腫丹毒發於四肢腹背頭面或赤或白或痒或痛或寒或熱用香欒皮一兩水一大碗同煎取半碗以翎毛刷患處効蠐螬散治丹走行皮中浸廣者入腹殺人用蠐螬乾者碾末油調塗之以差為度泥醋塗方治小兒胡吹竈丹從隂下起用磨刀水棚下泥和醋調膏塗之乾即更塗以差為度鐵槽水洗方治小兒飛竈丹從項起用浸槽中水日三五度又方飲一合治熱毒遊腫犬骨灰塗方治小兒神火丹從項起用犬枯骨為末以青羊脂調如糊塗之日三五次治白丹鐵挑方右於兒男左女右大脢脂面螺文上以鐡挑有筋斷之差羊脂塗方治小兒殃火丹從兩脅下起青黒色用鍜鐵下槽中鐵屎搗研為末半兩羊脂二兩猪糞燒灰一兩同研如糊塗之以差為度治小兒患赤白遊疹用蝦蟇搗碎傅之煮熟色正赤小兒及鷄狗食之脚屈不行治一切丹毒用梔子大黄蜜水搗傅治小兒一切丹徧身體熱用浮萍草研如泥傅之又方用韭畦中土以水調塗之又方用粟米水煮濃汁洗之又方用地龍煮以水研如泥塗之治小兒一切丹及諸腫毒用䑕粘子根洗去苖搗絞取汁毎半合量兒大小分减服之治小兒一切丹用水苔搗爛頻頻傅之又方用景天草爛搗傅之一方取汁先微揩丹上後塗以差為度治小兒丹發惡毒五色無常用青粟毬有刺者搗碎以水煮洗之治小兒五色丹徧身熱如火燒遶腰即損人用蕓薹子一兩以酒一小盞細研取汁塗之治小兒火焰丹消赤腫用老鴉眼睛草葉入醋細研傅治小兒白丹用蘭香葉搗爛塗之又方用蓼葉搗爛塗之又方用樑上塵以醋和塗之用鹿角燒灰細研猪脂和塗之治小兒面身卒得赤丹或痒或腫起不速療之即殺人用羖羊角屑八兩以水五升煎至一升絹濾去滓入煉了猪膏五兩和令勻傅之治小兒赤丹用葛勒蔓輕磨破以醋研訶梨勒塗之妙治小兒黒丹用青羊脂熟摩日三五度用之又方用喂猪杓子炙令熱熨之治小兒天火丹發徧身赤如絳色用鬼木搗絞汁塗赤處又方用小兒埋胞衣瓶子中水二合時時與兒服及塗身上有毒處効治小兒殃火丹生於脇腋下方用川朴硝細研為散每服以竹瀝調下半錢量兒大小加减服又方用伏龍肝細研以生油調塗之一方鷄子白和傅又方用浮萍草絞取汁時時與兒服之治小兒神火丹用鯽魚半斤赤小豆屑三合搗如泥塗丹上唯數塗為良治小兒朱田火丹用鷄子白塗之治小兒天竈火丹用車前子末水調塗之又方用鐵落末以餳和如膏塗之治小兒尿竈火丹用屋四角茅燒灰細研為散以鷄子白調塗之澤蘭湯治丹入腹方見本門風瘙癮疹類治天行煩毒小兒寒熱丹毒用藍或青布水漬取汁飲之㧞毒膏治小兒赤毒腫及腮頰腫痛黄栢一兩寒水石一兩石膏半兩甘草二錢半黄芩半兩右為細末醋調成膏貼赤腫處或用新水調搽亦可葛根白术散治一切赤白丹腫毒白术一錢木香一錢半芍藥一錢半枳殻一錢半去穣麩炒甘草二錢炙茯苓三錢去皮葛根三錢右㕮咀每服三錢水一盞煎至七分去滓温服不拘時候量兒大小増减土黄散治赤流丹毒可用一小鈒刀䟱去赤暈惡血毒汁次用此藥土硝一兩大黄細末一錢右二味相合新水調攪勻用鷄毛蘸時時塗掃解肌散治火丹赤芍藥二錢半甘草二錢乾葛一錢麻黄去節一錢黄芩一錢川升麻二錢右㕮咀每服半錢桃柳條各七寸水六分盞同煎温服如發熱氣壅冝先用虎睛丸麥煎散人參散治赤遊丹人參三錢蟬退十五个去足羗活二錢防風三錢當歸二錢粉草二錢全蝎十个去毒茯苓三錢紅花三錢右㕮咀每服用燈心薄荷生地黄同煎當歸散治一切風丹火疹赤芍藥二錢當歸一錢地黄一錢紫草二錢麻黄一錢去節羗活一錢桂皮一錢甘草二錢右為末每服一錢薄荷葉同煎塗角藥赤小豆白藥子天花粉槐花滑石黄皮拍寒水石等右為末用生赤芍藥地黄藕節雪草搗汁塗患處即散治丹毒未見面目或不當處不可角退牡礪青黛豆粉等分右為末用生地黄汁塗角調傅患處又方赤小豆赤芍藥等分右為末用鷄子清生地黄藕汁調塗傅患處治小兒赤遊行體上下至心即死以生景天草搗傅瘡上治白遊赤遊以死蠶塗之白遊用白死蠶塗赤遊用赤死蠶塗普濟方卷四百六
