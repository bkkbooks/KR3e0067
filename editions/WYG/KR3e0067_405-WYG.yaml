頭炙令黄蕓薹子等分右羅為散以醋調傅又方石灰半兩乾姜半兩生用右羅為散以生油和揑作椀子罨在癤上立差治小兒軟癤雖出膿水熱痛不止赤小豆四十九粒乳香半分膩粉半兩右羅為散先去膿水後糝散藥於瘡上立効治小兒軟癤有膿不穴巴豆一粒豆豉五十粒葱白一寸右同研令爛塗在癤上别以醋麫糊封之治小兒軟癤赤腫疼痛不可忍天靈盖一枚塗酥炙黄麻鞋底一雙多年故者燒灰右羅為散每使以油調塗之猪頭散治軟癤愈而再作者用野蜂房一二箇燒灰存性以巴豆三七粒去殻煎清油三二沸去巴豆以油調藥敷立効白礬枯為末清油調亦効此藥有騐人以猪頭為謝故名之又方用大枳殻一枚去穣令空地上磨令口平以稠麸糊搽四唇霑在癤上自破膿溜出盡更無瘢㾗又方用桑螵蛸燒灰存性以清油調傅又方用鷄抱卵殻燒灰存性為末入輕粉少許清油調塗傅此物難得只以鷄子抱退殻如上法用亦可治小兒軟癤用炒油麻從銚中取乘熱嚼吐傅之又方用生澁柿子連皮薄切焙乾為末以少許輕粉三之一薄薄牛皮膠水調成膏攤帛上貼之先用温湯洗净去膿可一貼而愈治小兒軟癤焮熱用半夏末以水調塗之乾即更塗又方用葛蔓燒灰細研封之治小兒癤無頭者用黍粘葉爛搗傅之又方用雀糞細研水調傅之又方用葵子一枚以水下之即有頭錦鱗膏治小兒軟癤不差用鯽魚鱗取皮貼軟癤上極妙瘰癧附論凡小兒身生熱毒瘡乆不差者後則必生瘰癧其状如作結核在皮肉之間三兩相連瘰也是風邪搏於血氣焮結所生也方五香膏治小兒瘰癧沉香半兩煎香半兩木香半兩丁香半兩麝香半分細研熊膽一分蘆薈一分黄丹二兩黄蠟二兩亂髮一兩油半斤右藥細剉先以慢火煎油令沸下亂髪煎令消即下諸藥煎三上三下以綿濾去滓下黄蠟次下黄丹麝香攪勻膏成以瓷合盛每使先以米泔洗拭乾以膏攤於故帛上貼之連翹丸治小兒瘰癧發寒熱項頸生結核腫硬如石腹脇背裏有如堅急不通連翹半兩桑根白皮半兩剉犀角屑半兩白頭翁半兩漏蘆半兩黄蘖半兩剉牛蒡子半兩微炒川大黄一兩剉碎微炒秦艽半兩去苖川升麻半兩右羅為末煉蜜和丸如菉豆大每服以粥飲下五丸日三服量兒大小加减犀角散治小兒瘰癧焮腫疼痛身體熱大腸壅滯小便赤澁心神煩喿少得眠卧犀角鎊屑一兩惡實一兩連翹二兩麝香研一兩木通剉一兩元參二兩沉香剉一兩半丁香一兩半朴硝一兩右麄搗篩每服二錢匕以水一盞煎至六分去滓分温三服早晨日午晩後各一以利為度木通散治小兒瘰癧發盛壮熱煩躁坐臥不安木通一兩剉大麻仁一兩元參一兩川升麻一兩敗醬一兩連翹一兩川大黄一兩剉碎微炒川芒硝一兩犀角屑一兩右搗為散每服一錢水一小盞煎至五分去滓量兒大小分减温服當利下惡物筯膜為妙元參膏治小兒腦熱結瘰癧連兩耳下腫疼身體寒熱坐臥不安飲食减少元參紫葛黄藥子大黄剉炒令黄木香卷栢芒硝紫檀香各一兩右搗羅為末以鷄子白調稀稠得所調於腫上破時則去芒硝塗之麝香散治小兒腫結乆不消散成結瘰癧麝香一分研牛黄一分細研蝸牛子一兩炒令微黄皂莢子一兩炒微黄皂莢針一兩炙黄薄荷一兩乾研雄鴿糞一兩微炒右羅為末煉蜜丸如菉豆大每服以薄荷湯下七丸日三服量兒大小加减生肌膏治小兒瘰癧穴後黄丹半兩杏仁一兩湯浸去皮蛇蛻皮一條黄蠟半兩亂髮一兩菜子油六兩皂莢三寸水浸去黒皮子右先取杏仁蛇皮皂莢搗碎後以菜油於銚子中煎亂髮令消次下杏仁等三味同煎三上三下以綿濾去滓下黄臘次下黄丹以柳箟子不住手攪令勻候膏成以甆器盛於故帛上塗貼之赤小豆散治小兒熱毒風腫瘰癧内消赤小豆猪牙皂莢炙去黒皮并子黄蘖子硝石大黄剉炒木鱉子去殻各一兩右羅為散每用量大小以不語津唾調塗貼惡核用鷄子清調塗患處妙聖散治小兒瘰癧不消綿黄耆連翹各一兩鴿糞燒灰川大黄炒犀角屑各半兩糯米半兩用班猫七个同炒黄不用班猫右羅為細末每服一錢水八分入酒三二滴同煎五分去滓温服時時呷紫檀散治小兒瘰癧癭核紫檀香木香芒硝卷栢各一兩芍藥半兩大黄半兩右搗羅為細末每用少許以鷄子白調和得所塗患處連翹丸治小兒瘰癧不消去除根本連翹一兩元參一兩糯米半兩班猫一分微炒去翅足皂莢針半兩炙黄川大黄半兩剉碎微炒右羅為末煉蜜丸如麻子大每於空心以生薑湯下二丸當利下惡物為度後喫粥一日補之生肌散治小兒瘰癧成瘡有膿水顆鹽一分黄丹半兩黄蘖一分剉白礬一分以上四味以瓷瓶盛大火燒令通赤細研用白歛一兩膩粉一分右羅為散都研令勻每貼時先用温鹽漿水洗瘡令凈拭乾看瘡口大小貼之日一度用蜜陀僧散治小兒瘰癧穿潰膿水不止蜜陀僧二兩胡粉二兩熊膽一兩蘆薈一兩白芨一兩白歛一兩右搗羅為散傅瘡口内効皂莢丸治小兒瘰癧難消皂角八兩不蚛者水浸一宿去黒皮塗酥炙令黄燋薄荷五兩荆芥五兩雄黄半兩細研麝香一分細研右羅為末都研令勻用白羊肉四兩去筯膜細切以煉成蜜相和搗三五百杵丸如菉豆大每服以薄荷湯下十丸量兒大小加减四味大黄飲子治風熱毒氣與血相摶結成核生於項下頸上遇風寒所折不消成瘰癧乆而潰膿成瘡大黄甘草當歸赤芍藥右等分㕮咀水煎去滓大小以意加减食後服忌毒物膩粉散治小兒瘰癧除根本膩粉一分黄耆一分剉班猫二七枚去翅足以糯米拌炒微黄糯米二七粒右羅為散每服空腹以温酒調下一字良乆喫少許醋湯病随小便中出量兒大小加减服之治小兒瘰癧已結成外貼自出水銀一分手心内用津研如泥粉霜一分砒霜一分燕子糞一分班猫