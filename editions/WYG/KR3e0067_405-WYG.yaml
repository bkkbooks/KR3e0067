body:
  text: 普濟方卷四百五明周王朱橚撰嬰孩諸瘡腫毒門癰疽附論夫癰疽瘡癤瘰癧結核疥癩毒腫赤遊癮疹火癉等皆由風邪客摶經絡澁滯經曰五臟不和九竅不通六腑不和流結為癰或積毒熱氣不得宣行入於皮膚或發頭面或發虚處無故身熱微覺増寒或有痛處按之必熱乃癰癤欲發也其有火癉立名多端乃古人強為之名大抵治法同一理母患血熱兒在胎中受之其血亦熱母患氣壅兒在胎中受之其氣亦壅初生受母熱血壅氣聚在經絡臟腑之間積滯不散乆則成毒毒氣相交内不通利即從外消外無能消其血與氣壅在一處則是生背膐或脊督脉腫大如拳紅赤似血其兒之體是一塊腐血又加生一塊壅毒卒未能消醫有何法善術之士俾勞以鍼灸熨炳取次攻之十不得一外傅用朴硝天南星當歸秋芙蓉葉黄蜀葵花乳香木鱉子無名異其癰已熱即研白丁香少許津唾調傅菉豆大良乆破潰膿血迸出冝先與服托裏排膿消毒散血藥用生甘草𤓰蔞根苦桔梗枳殻川當歸錦頭漏蘆好大黄等分為末服一錢匕煎熱為服以利為度克効萬一不可荒亂意欲速消以惡毒草藥致難保小兒因五臟不和寒邪壅滯榮衛閉塞逆於膚肉遂生疽腫其状腫結皮強上如牛領然疼焮堅􅀈深附筯骨既得膿後其疽可愈更須用排膿換肌之藥若餘毒未去封歛稍疾則源流復至或痒或痛肌汁不斷瘡竅不得合矣陳氏子四嵗忽二月患核内塊五六枚不赤不腫亦不疼痛大小如鷄鴨子皮不實硬從肉内透起召愚視之曰素問云榮衛不從逆於肉裏乃生癰腫此因疳成瘰癧惡核也寳鑑云惡核而肉裏頻生瘰癧而頂邉暗長萬金丸大黄丸治無辜疳瘰癧惡核愚曰此病不可治通真子云核塊結實經乆不破破則膿潰經乆不合者肉死不治且謾與藥和肌兼用外醫膏藥貼治月餘無効覺微軟内有自破者有開破者膿潰不止經兩月瘡口不合或一日發熱與四順飲大黄丸并凉肌藥鎮驚藥熱除尚有進退雖飲食如舊日漸黄瘦主人曰服藥已多日何効遲遲如此愚曰藥非無効也病有終身不除者也藥非無驗也病有决不可救者也此病决不治後七月間忽傷食吐數口神昏不省因驚而卒核塊之有惡者如此後之學者不可不知也方五香丸治小兒癰疽癤毒未破或膿未潰増寒壮熱木香一分沉香剉蘇合香研各三合麝香研半分犀角鎊二兩大黄生剉一兩半吳藍葉二兩梔子仁二兩熟乾地黄二兩白芍藥一兩鷄舌香二兩人參一兩去蘆頭白茯苓一兩右搗羅為末煉蜜和丸如梧桐子大每服二十丸煎黄耆湯食前服木香散治小兒熱毒疽腫及赤白諸丹毒腫或生瘰癧瘡癤身中風疹瘙痒木香一分薰陸香一分鷄骨香一分黄芩一分麻黄一分去根節連翹半兩海藻半兩洗去醎味射干半兩川升麻半兩枳實半兩麸炒微黄牛蒡子半兩微炒川大黄二兩剉碎㣲炒右羅為散每服一錢水一小盞煎至五分去滓入竹瀝半合更煎三兩沸量兒大小不計時分减温服五香湯治小兒一切癰疽腫毒瘡癤瘰癧癮疹火癉赤遊等疾連翹木香沉香薰陸香即乳香射干升麻獨活桑寄生通草麝香丁香各一兩大黄半兩右㕮咀三歲用一錢煎汁去滓服藍葉湯治小兒疽瘡方見本門癰瘡類五香連翹湯治小兒熱毒腫色白或惡核瘰癧附骨癰疽節解不舉白丹走徧身中疹瘙方見本門毒腫類治小兒大腸頭惡癰熱瘡用蜣蜋臼𢷬汁𫝊其上即安或燒為末醋和塗數過先以鹽水洗之妙犀角知母湯治小兒癰疽犀角鎊知母焙黄耆剉黄芩去黒心人參丹參葛根剉大黄剉炒甘草炙各一兩元參三分麥門冬去心焙一兩半右麄搗篩每服一錢匕水半盞入生地黄汁半合同煎至四分去滓食後臨卧温服量兒大小加减漏蘆湯治小兒熱毒癰疽赤白諸丹毒瘡癤漏蘆連翹肘後用白薇白歛芒硝肘後用芍藥甘草各六銖大黄一兩升麻枳實一方不用麻黄黄芩各九銖聖惠方有赤芍藥二分右㕮咀以水一升半煎取五合兒生七日内取一合分三服八日至十五日取一合半分三服十六日至二十日取二合分三服二十日至三十日取三合分三服三十日至四十日取五合分三服肘後治大人各用二兩以水一斗煮取三升分三服其丹毒須針鑱去血經心録無連翹有知母芍藥犀角各等分黄耆湯治小兒癰疽瘡癤腫毒黄耆連翹升麻惡實炒各半兩元參丹參露蜂房枳殻去穰麸炒甘草炙各一分右麄搗篩每服一錢匕水七分煎至四分去滓食後臨卧温服小大加减木通湯治小兒疽木通升麻赤芍藥黄芩去黒心山梔子仁麥門冬去心焙各二兩大黄剉炒各一兩枳殻去穰炒半兩右麄搗篩每二錢匕水一盞入生地黄汁半合煎至七分去滓分温二服食後臨卧服量兒大小加减治小兒疽瘻丹砂大黄各十二銖雄黄䕡茹漆頭者各二十四枚礬石馬齒者十八銖雌黄二十四銖莾草十八銖黄連三十銖右㕮咀以猪脂一升三合微火煎三上三下膏成去滓下諸藥末攪凝傅黄耆湯治小兒瘡腫癰疽黄耆剉葛根剉麥門冬去心焙黄芩去黒心犀角鎊升麻甘草炙各一兩木香半兩右搗篩每服一錢匕水七分煎四分去滓食後服量兒大小加减服之黄蓍散治小兒疽腫及瘡癤身體壯熱口乾心躁黄耆半兩剉連翹半兩川升麻半兩元丹一分丹參一分露蜂房一分微炙枳實半兩麸炒微黄去穰甘草一分炙微赤剉右羅為散每服一錢水一小盞煎至五分去滓放温量兒大小加减服之犀角散治小兒疽毒腫硬壮熱大渇犀角屑三分葛根半兩剉麥門冬一兩去心焙川升麻半兩木香半兩黄耆半兩剉黄芩半兩甘草半兩炙微赤剉右羅為散每服一錢水一小盞煎至五分去滓放温量兒大小分减服之鷄舌散治小兒疽瘡鷄舌香一兩木香一兩沉香一兩麻黄海藻洗去醎大黄炮各半兩右搗羅為麄散每服一大錢水一大盞竹瀝三兩㸃煎至五分去滓温服兼放令温熱淋渫患處清水膏治小兒疽腫毒堅硬疼痛攻衝四畔焮赤冝用抽熱毒消腫氣羊桃根一兩剉川大黄一兩剉生用黄芩半兩赤小豆半合黄蘖半兩剉菉荳粉半兩右羅為散用蕓薹菜搗取自然汁以蜜少許相調藥令稀稠得所看四畔腫赤處大小剪生絹上勻攤可厚一錢貼之乾即換之天烏散貼方南星赤小豆草烏黄栢各等分右為末生姜自然汁貼患處或用米醋調尤佳治發背癰疽羗活一兩為末麝香少許川山甲醋炒焦半兩生龍骨煆存性半兩右件煎麻黄薄荷酒調如隂瘡頭平向者服之即突其功効不可具述若小兒痘瘡黒陷者只一服而起萬不失一龍角散治小兒癰疽腫癤一切等瘡或於頭面或發虚處無故身熱微覺増寒或有疼處皆癰癤證也地龍去土一兩荆芥穗一兩甘草一兩角刺三兩潤者杵去骨用皮濕秤右為末每服一錢酒水合半盞煎至三分去滓調入乳香末半錢加减服又方忍冬草甘草大黄各等分右為末依前法煎調乳香末服之黄連散治小兒疽已潰黄連半兩去須黄蘖半兩剉白芷半兩右搗為散每用鷄子白調塗於故細布上貼之又方白芷半兩黄連半兩去須地榆半兩剉白歛半兩右羅為散每用鷄子白調塗於故細布上貼瘡日三四度換之良蜜陀僧散治小兒疽腫穴後及惡瘡膿水雖净肌肉不生蜜陀僧一兩黄連三分去須㯽榔三分右羅為散用糝瘡上日三用之治小兒疽腫硬已成膿未成膿貼熁方鹿角屑二兩燒灰白歛一兩麄理黄石三兩燒赤以酒淬九遍右羅為散以醋調稀稠得所厚塗之乾即更塗五七度即効松脂餅子治小兒疽瘡乆不瘥松脂一兩薰陸香一兩右合研内少許鹽為餅子貼於瘡上汁出盡即差治小兒癰疽癤毒未破或膿未潰増寒壮熱用乾蝦蟇一箇燒灰細研以猪脂和傅之又方用敗布不以多少燒灰細研以猪脂和傅之備急神驗方治未結之初微有紅頭㿔子起隱疼者急用不語唾夜半頻頻塗之即消散飲了酒不可用若已結成當用治小兒疽腫結硬已成膿貼熁方用蛇蛻皮貼之經宿自消又方用啇陸爛搗傅之又方用芫花搗羅為末水和如膏塗之又方用蠐螬研塗之鰻鱺魚膽汁及血各用塗之並効癰瘡附論夫小兒六腑不和寒氣客於皮膚搏於血脉壅遏不通稽留於經絡之間結腫而成癰其状腫上皮薄而澤是也熱氣乗之熱勝於寒熱盛則致血肉腐化為膿若膿潰之後其瘡不瘥故曰癰瘡也方黄苓湯治小兒癰瘡煩熱疼痛黄苓去黑心梔子仁元參升麻大黄剉炒黄耆剉連翹藍葉甘草芎藭木香犀角屑右麄搗篩每服一錢匕水半盞煎至三分去滓温服量兒大小加减吳藍葉散治小兒肺熱毒攻於諸處生癰瘡及項腋下有結核煩熱疼痛不得睡卧吳藍葉半兩黄芩一分大青一分犀角屑半兩元參半兩川升麻半兩梔子仁半兩川大黄三分剉碎微炒黄芩半兩剉連翹子半兩甘草半兩右為散每服半錢水一小盞煎至五分去滓量兒大小不計時分温服黄耆散治小兒癰瘡膿潰數日不止致體虚煩熱頭疼昏悶宜服黄耆半兩剉防風半兩去蘆頭川升麻半兩羚羊角屑半兩芎藭一分甘草半兩地骨皮半兩人參半兩去蘆頭白茯苓半兩石膏右羅為散每服一錢水一小盞煎至五分去滓量兒大小不計時候分减温服犀角散治小兒癰腫成瘡臟腑壅滯犀角屑半兩麥門冬三分去心焙元參半兩赤芍藥半兩薺苨半兩葳㽔半兩川升麻半兩甘草一分紅雪半兩右為散每服一錢水一小盞煎至五分去滓入竹瀝半合更煎一兩沸服一方無紅雪入硝石末一字煎鎔去滓温服量兒大小加减麥門冬散治小兒癰瘡膿水出不盡心中煩悶不已麥門冬三分去心焙紫葛半兩黄耆半兩川升麻半兩犀角屑半兩甘草半兩炙微赤剉木通半兩右羅為散每服半錢水一小盞煎至五分去滓量兒大小不計時候温服大黄散治小兒癰瘡臟腑壅熱心神煩躁大小便不利大黄剉炒升麻梔子仁朴硝别研枳殻去穰麸炒黄耆剉各半兩右麄搗篩每服一錢匕水七分煎至四分去滓温服量兒大小加减連翹散治小兒癰癤等瘡連翹一兩沉香半兩白歛一分朴硝一分川大黄一兩炮甘草一兩右搗羅為細末每服一錢水一盞炒麝香一錢煎至五分食後温服大麻仁丸大麻仁二兩木香半兩枳殻半兩麸炒微黄去穣牛蒡子一兩微炒甘草半兩炙微赤刲川大黄一兩剉右為末煉蜜丸如菉荳大每以熱水下十圓取利為度更量兒大小加减服之黄蘖散治小兒一切癰腫毒諸風神驗黄蘖去粗皮蜜炙欝金各一兩陳橘皮湯浸去白炒人參葛根剉各半兩右搗羅為末用温水調下半錢匕量兒大小加减日兩三服大黄散治小兒癰瘡臟腑壅熱太過心神煩悶大小便不通川大黄半兩剉微炒川升麻半兩梔子仁一分川朴硝半兩葵子半兩右搗為散每服一錢水一小盞煎至五分去滓温服以利為度量兒大小加减服之益毒散治癰癤皆可用益母草二兩燒灰鹽花一兩炒乾伏龍肝半兩右研為細末每用一錢新水調稀稠得所旋取塗瘡口上消毒散治小兒癰瘡腫毒熱赤川大黄三分生剉杏仁三分浸去皮别研鹽花二分右羅為散入杏仁以新汲水和稀稠得所旋取塗瘡腫上乾即易之以効為度益母草飲治小兒癰瘡腫痛用益母草不拘多少洗剉搗取汁每服三二分服之更量大小加减以滓傅癰上乾則易又方用猪腦脂塗紙上貼之乾即易日數徧又方用芥子爛研水和塗紙上貼之又方用馬齒莧搗傅之又方用地龍糞新汲水調塗之一方薄荷汁調塗傅又方用姜石末和蒜搗封上又方用馬鞭草搗傅之即消又方用蕓薹菜搗塗之又方用鷄腸草搗爛傅之又方用伏龍膽末以好醋調作膏塗於故帛上貼之又方用地松爛搗傅之乾即易又方用赤小豆末以鷄子白和塗之又方用龍葵菜