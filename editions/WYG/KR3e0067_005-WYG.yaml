body:
  text: 普濟方卷五明周王朱橚撰方脉藥性總論本草用藥用藥偏勝合和六經藥性服餌本草論曰流變在乎病主治在乎物制用在乎人三者並明然後可以與七方十劑之法也宣通補㵼輕重澁滑燥濕是十劑也大小緩急竒偶複是七方也是以製方之體欲成七方十劑之用者必本於氣味生成而成方焉其寒熱温凉四氣者生乎天酸苦辛鹹甘淡六味者成乎地氣味生成而隂陽造化之機存焉是以一物之中氣味兼有一藥之内理性不符故有形者為之味無形者為之氣若有形以無形治之喘急昏昩乃生無形以有形治之開腸洞泄乃起經所謂隂味出下竅者陽氣出上竅王注曰味有質故下流便㵼之竅氣無形故上出呼吸之門故陽為氣隂為味味歸形形歸氣氣歸精精歸化精温氣形温味王注曰氣化則精生味化則形長是以有生之人形精為本故地産飬形形不足者温之以氣生産飬精精不足者補之以味形精交飬充實不虧雖有苛疾弗能為害故温之以氣者是温之以肺補之以味者是補之以腎是以惟人萬物之靈被萬物之養欲和温徳以化津液以淫注脈以行榮衛故經所謂隂之所生本在五味氣味合而服之以補精益氣所以為全生之術故五榖五畜五菜五菓苦甘酸鹹辛此為補飬之要也何則榖入於口而聚於胃胃為水榖之海喜榖而惡藥藥之所入不若榖氣此又以之先逹故制病之法必以榖氣為先是以聖人論真邪之氣者謂汗生於榖不歸於藥石辨死生之候者謂安榖在生其過不惟數於五臓凡明胃為氣本以此知五味能飬形也雖攻毒邪去榖之用兵蓋出於不得已也是以聖人發表不逺熱攻裏不逺寒辛甘發散為陽酸苦湧滯為隂故辛散酸收甘緩苦堅鹹耎隨五臓之病證施藥性之品味然後及扵竒偶大小緩急之制也故竒偶者四方四制之法四制者小大緩急也經謂氣有多少病有盛衰治有緩急方有大小故大小者君一臣二竒之制也君二臣四偶之制也君二臣三竒之制也君二臣六偶之制也而又曰竒方云君一臣二君二臣三偶方云君二臣四君二臣六所以立方者四制之法竒偶四制何以明之假令小承氣調胃承氣為竒之小方也大承氣抵當湯為竒之大方也所為因其攻下而用之者如此桂枝麻黄為偶之小方葛根青龍為偶之大方所為因其發而用之者如此經所謂近者竒之逺者偶之身之表者為逺身之裏者為近汗者不以竒下者不以偶不以者不用也故補上治以緩補下治以急急則氣味厚緩則氣味薄故味厚者為隂薄是隂之陽為味不純粹者也故味所厚則泄之下以味所薄則通氣者也王注曰味厚則泄薄則通氣氣厚者為陽薄者為陽之隂故附子乾姜味大熱為純陽之藥為氣厚者也丁香木香味辛温平薄為陽之隂氣不純粹者也故氣所厚則發熱氣所薄則發泄經曰薄則發泄厚則發熱王注曰隂陽潤下故曰味薄則發發則陽氣炎上故氣厚則發熱味薄為隂少故通泄氣薄為隂少故汗出是以論氣味之薄厚合竒偶之大小故腎肝在逺數多則其氣緩不能速逹於下必大劑而數少取其迅急可以走下也心肺位近數少則其氣急不能發散於上必小劑而數多取其氣叢易散可以補上也王注曰肺服九心服七脾服五肝服三腎服二五臟乃生成之常數也若竒之不效則偶之是謂重方也偶之不去則反佐以取之謂是寒熱温凉各從其病也王注曰是以聖人反其佐以同其氣令聲氣應合服冷寒熱参合使其終異而能同潤燥而散堅剛强必折柔脆自消矣故逆者正治從者逆治從少從多觀其妙也張仲景曰少隂病下痢而脉㣲者與白通湯痢不止厥逆無脉者乾嘔返者白通加猪膽人尿王注曰若調寒熱之逆冷則必行熱物冷服下滯之後冷體既消熱性便發由是病氣隨愈嘔噦皆除情且不違而治大逆此加人尿猪膽汗鹹苦寒物於白通湯熱劑中要其氣相從可去格拒之寒也經所謂熱因寒用寒因熱用塞因塞用通因通用必服其所主先其所因其始則同其終則異可使破積可使潰堅可使難通人又冩已此之謂也若病所逺而中道胃氣乏者食而過之無越其制度王注曰假如病在腎而心之氣味嗣而冷是仍急過之不嗣以謂腎藥凌之心心腹益衰與上下逺近例同是以聖人治上不犯下治下不犯上和中上下俱無犯故經所謂誅罰無過命曰大惑此之謂也有中外不相及其治其主病皆論標本不令要坎也故従所來者為本其所受者為標是以内者内調外者外治内者調之不言其治外者治之不言其調經所謂上滛於下所勝平之外滛於内所勝治之此之謂也若從内之外盛於外者先調其内而後治其外從外之内而盛於内者先治其外而後調其内王注曰皆謂先除其根底後削其枝條也是故病發有餘本而標之後治其本故仲景傷寒醫下之續得下痢清糓身疼痛者急當救裏身疼痛清便自調者急當救表救裏四逆湯救表宜桂枝湯故裏不足必先救之清便自調知裏氣已調然後急與桂枝湯以救表是謂病發本而標之先治本後治其標此以寒為本也故知標本者萬舉萬當不知標本者是謂妄行此之謂也雖本草曰上藥一百二十種為君應天中藥一百二十種為臣應人下藥一百二十種為使應地若治病者特謂此三品之說未也經所謂有毒無毒所治為主適其大小為制也故主病者為之君佐君者為之臣應臣者為之使非上中下三品之謂也王注曰但能破積愈疼觧急脫死則為良方非必要以先毒為是後毒乃非有毒為是無毒為非必量病輕重大小之治也帝曰三品何為也岐伯曰所以明善惡之殊貫也是以聖人有毒無毒服自有約故病有新乆方有大小有毒無毒宜合常制大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九糓肉菓菜食飬盡之無使過之傷其政也不盡行復如法王注曰法謂前四約也餘病不盡然再行之毒之小大如約而止必無太過是以上古聖人謂重身之毒有故無殞衰其大半而止故藥之性味本以藥治疾誠能處以中庸以疾適當且如半而止之亦何疑於坎治哉此之謂也故非調氣而得者治之奈何有毒無毒何先何後願聞其道王注曰夫病生類其有四焉一者始囙氣動而内有所成為積聚癥瘕瘤氣癭起結核癲癎之類是也二者始囙氣動而外有所成謂癰腫瘡痬痂疥疽痔掉瘛浮腫目赤熛胗胕腫痛痒之類是也三者不因氣動而生病於内為留飲澼食飢飽勞損宿食霍亂悲恐喜怒想慕憂結之類是也四者不囙氣動而病生於外為瘴氣賊􅂒蠱毒蜚尸鬼擊衝薄墜隨風寒暑濕斫射刺割捶扑之類是也如此四類者有獨治内而可愈大小承氣䧟胷抵當湯三化神祐藏用之類是也有兼治内而愈者大小柴胡通聖洗心凉膈黄連解毒之類是也有獨治外而愈者蓋應膏㧞毒散㸃眼藥生肌之類是也有兼治外而愈者撥雲散苦参散千金内托散之類是也有先治内後治外而愈者熛疹丹毒瘡痬疹麩豆之類悉囙三焦相火熱甚於内必先踈啓其中清凉苦寒之劑盪滌臟腑或以砭射敷掃塗抹於外者是也有先治其外後治其内而愈者傷寒刺割破傷皆囙風寒之邪從外之内先以發散其外發之不已量其淺深峻泄之有齊毒而攻擊者暴病大小便不利胎死堅積滿脹之類是也復有無毒而調引者痰滯氣痞胃虚脾弱氣不徃來以通經利其氣之藥之類是也凡此之類方法所施或勝或復寒者熱之熱者寒之温者清之散者收之仰者折之燥者潤之急者緩之剛者耎之衰者補之强者㵼之堅者削之留者攻之客者除之勞者温之温飬也結者散之燥者濡之損者温之温補也逸者行之勞者動之驚者平之平常也常見常聞上之吐之下之泄之磨之火灸之浴薄之刼之燔針刼刺其下開之發之適可為治各安其氣必清必净則病氣衰去歸其所宗此治之大體也是以聖人法無定體體變布施藥不執方合宜而用故論言治寒以熱治熱以寒而方士不能廢繩墨而更其道也有病熱者寒之而熱有病寒者熱之而寒二者在新病復起奈何治諸寒而熱者取之以隂熱而寒者取之以陽所謂求其屬也王注曰謂治之而病不衰退反囙熱寒而隨生寒熱病之新者也謂其益火之原以消隂翳壯水之主以制陽光故曰求其屬也夫取心者不必齊以熱取腎者不必齊以寒但益心之陽寒亦通行若强腎之隂熱之猶可此論五味所歸五臟寒熱温凉之主也嗚呼聖人之道乆塞而後之人獨不能之也王注曰言少可以貫多舉淺可以料大何法之明也如此故非聖人之道孰能至於是邪是以治病之本須明氣味之厚薄七方十劑之法也方有七劑有十故方不七不足以盡方之變劑不十不足以盡劑之用方不對病非方也劑不蠲疾非劑也七方者大小緩急竒偶複也大方之說有二一則病有兼證而邪不專不可一二味治之宜君一臣三佐九之類是也二則治腎肝在下而逺者宜分两多而頓服之是也小方之說有二一則病無兼證邪氣專一可以君一臣二小方之治也二則治心肝在上而近者宜分两㣲而頻頻少服之亦為小方之治也緩方之說有五有甘以緩之為緩方者為糖蜜甘草之類取其戀膈也有丸以緩之為緩蓋丸之比湯散藥力宣行遲故也有品味羣衆之緩方者蓋藥味衆多各不能騁其性也有無毒治病之緩方者蓋藥性無毒則攻自緩也有氣味薄而緩方者藥氣味薄則常補於上比至其下藥力既已衰為補上治上之法也急方之說有四有急病急攻之急方者如腹心暴痛前後閉塞之類是也有急風蕩滌之用急方者謂中風不省口噤是也取劑蕩滌取其易散而施攻速者是也有藥有毒之急方者如上湧下泄奪其病之大勢者是也有氣味厚之急方者藥之氣味厚者直趨於下而力不衰也謂補下治下之法也竒方之說有二有古之單行之竒方者為獨一物是也有病近而宜用竒方者為君一臣二君二臣三數合於陽也故宜下不宜汗也偶方之說有二有两味相配而為偶方者蓋两方相合者是也有病逺而宜用偶方者君二臣四君四臣六數合於隂也故宜汗不宜下複方之說有二有二三方相合之為複方者如桂枝二越婢一湯之類是也有分两均同之複方者如胃風湯各等分之類是也又曰重複之複二三方相合而用也反複之複謂竒之不去則偶之是也十劑者宣通補㵼輕重澁滑燥濕宣者鬱而不散為壅必宣劑以散之如痞滿不通之類本草曰宣可去壅必宣劑以散之如姜橘之屬攻其裏則宣者上也泄者下也湧劑則𤓰蒂梔豉之類是也發汗通表亦同通留而不行為滯必通劑以行之如水病痰癖之類是也本草曰通可去滯通草防己之屬攻其環則通者行也甘遂滑石茯苓芫花大㦸牽牛木通之類是也補不足為弱必補劑以扶之如氣形羸弱之類是也本草曰補可去弱人参羊肉之屬攻其裏則補養也經所謂言而㣲終日乃復言者此奪氣也故形不足温之以氣精不足補之以味是以膏粱理疾藥石蠲疾五糓五畜善能補養也㵼有餘為閉必洩劑以逐之如腹脹脾約之類是也本草曰洩可去閉即葶藶大黄之屬經所謂濁氣在上則生䐜脹故氣不施化而欝不通所以葶藶大黄味苦大寒專能洩熱去濕下氣仲景曰趺陽脉浮而澁浮則胃强澁則小便數浮澁相搏大便難其脾為約故約束津液不得四布苦寒之劑通塞潤燥而能泄胃强也輕實則氣壅欲其揚也如汗不發而腠宻邪勝而中藴必輕劑以揚之本草曰輕可去實麻黄葛根之屬經所謂邪在皮者汗而發之其實者散而泄之王注曰陽實則發散重怯則氣浮欲其鎮也如䘮神守而驚悸氣上厥以顛疾必重劑以鎮之本草曰重可去怯即磁石鉄粉之屬經所謂厥痰為顛疾故驚乃重之所以鎮涎也故使其體重之物則下涎而用之也澁滑則氣脱欲其收歛也如開腸洞洩便溺遺失必澁劑以收之本草曰澁可去脱則牡蠣龍骨之屬如寜神寜聖散之類是也滑澁則氣着欲其利也如便難内閉必滑劑以利之本草曰滑可去着即冬葵榆皮之屬滑能養竅故潤利也燥濕氣滛勝腫滿脾濕必燥劑以除之本草曰燥可去濕即桑白皮赤小豆之屬所謂濕甚於上以苦吐之以淡泄之是也濕津耗為枯五藏痿弱榮衛涸流必濕劑以潤之本草曰濕可去枯即紫石英之屬故痿弱者用之王注曰心熱獨盛則火光上炎腎之脉常不行令火盛而上炎用事故腎脉亦隨火炎爍而逆上行也隂氣厥逆火復内熖隂上隔陽下不守位心氣通脉故生痿脉是故腕樞紐如拆去而不相提絜脛筋縱緩而不能任用也故可下數百行而愈故此十劑七方者乃太古先師設繩墨而取曲直何叔世方士出規矩以為方圓王注曰人之死者但曰命不謂方士愚昩而殺之是以物各有性以謂物之性有盡也制而用之將使之無盡物之用有窮也變而通之將使之無窮夫惟性無窮用無窮故施於品劑以佐使斯人其功用亦不可一而具也於是有因其性而為用者有因其所勝為制者有氣同則相求者有氣相剋則相制者有氣餘而補不足者有氣相感則以意使者有質同而性異者有名異而實同者故蛇之性竄而引藥蟬之性脫而退翳䖟飲血而用以治血䑕善穿而用以治漏所謂因其性而為用者也努牙速産以機發而不括也杵糖下噎以杵築下也謂因其用而為使者也萍不沉水可以勝酒獨活不摇風可以治其風所謂因其所勝而為之用制也麻木糓而治風豆水榖而治水所謂氣相同則相求者也牛土畜乳可以止渇疾豕水畜心可以鎮慌惚所謂因其氣相剋則相制也熊肉振羸兎肝明視所謂因其氣有餘補不足也鯉之治水鶩之利水所謂因其氣相感則以意使者也蜂蜜成於蜂蜜温而蜂寒油本生於麻麻温而油寒兹同質而異性也蘼蕪生於芎藭蓬蔂生於覆盆兹名異而實同者也如此之類不可勝舉故天地賦形不離隂陽形色自然皆有法象毛羽之類生於陽而屬於隂鱗介之類生於隂而屬於陽空青法木色青而主肝丹砂法火色赤而主心雲母法金色白而主肺磁石法水色黒而主腎黄石脂法土色黄而主脾故觸類而長之莫不有自然之理也欲為醫者上知天文下知地理中知人事三者俱眀然後可以愈人之疾病不然則如無目夜逰無足登渉動致顛殞而欲愈疾者未之有也醫學發明論云病有逆從治有反正夫曰反治者是明四經各經之病源一經說手足二經内之病證便是八經治法亦然内經曰上下同法此之謂也手少陽三焦之經治法曰通因通用㨿病題止言手少陽三焦之經便有足少陽膽之經明見脉如筝絃無力如𢃄之類是也大抵為手足經氣血一般更為所主者同此則上下同法餘三反治放此不須再解也夫聖人立通因通用之意謂少陽春也生化萬物之始也金石草木羽毛鱗介乃隂陽生化之端也天將興之誰能廢之故國有春分停刑之禁十二經有取决於膽之戒履端於始序則不愆故中風者病之長乃氣血閉而不行此最重病凡治風之藥皆辛温上通天氣以發散為本始元氣始出地之根蒂也此手足少陽二經之病治有三禁不得發汗為風證多自汗不得下下之則一隂絶其生化之源不得利小便利之則使陽氣下䧟反行隂道實可戒也手少隂心之經乃寒因熱用蓋少隂之經真隂也其心為根本是真火也故曰少隂經標寒本熱是内則心火為本外則真隂為標其脉沉細按之洪大皷甚而盛也心火在内則皷甚洪大也真隂為標則脉得之沉細寒水之體也故仲景以大承氣湯酒制大黄煎乘熱喫之以除標寒用大黄芒硝辛苦大寒之氣味以㵼本熱以此用藥可以為萬世法也足太陽膀胱之經乃熱因寒用且膀胱之本真寒其經老陽也太陽標有陽之名無陽之實謂其將變隂也其脉𦂳而數按之不皷而空見外見虛陽而内有真寒也故仲景以薑附湯乆乆熱煎不温服而頓服之亦是寒也姜附氣味俱陽加之乆乆熱煎重陽之熱㵼純隂之寒是治其本也不温服而寒服以此假寒治太陽標之假陽也故為真假相對之治法也用藥處治者當按其脉之空虚則内伏隂寒之氣外顯熱證然大渇引飲目赤口乾面赤身熱四肢熱之真陽將絶於外則為隂寒所逐而欲先絶其躁欲坐井中也手太隂肺之經乃塞因塞用以嵗氣言之主秋主收又况内傷飲食其物有形亦屬於隂也所主内而不出故物塞其中以食藥寒令不行也但脾胃有痞氣仲景治痞有五藥皆用黄連以泄之兼傷之物有形質也皆從隂物乃寒之類亦以大黄枳實隂寒之藥以下泄之舉斯二者是塞因塞用又為寒囙寒用可以明知之矣已上四經反治之法為標本相反而不同為病逆而不順也故聖人立急治之法以應之雖然四經以其手足同法乃八經也其病為從治之法反治也正治者以寒治熱以熱治寒直折之也又經云為有陽眀厥隂不從乎中也啓𤣥子注云以厥隂司天中見少陽陽明司天中見太隂當從少陽太隂處治絜古老人云殆不然也四反治中見有少陽太隂二經若舉此是重差也夫厥隂者為生化之源其支在夘二月之分前為陽後為隂陽明者為肅殺之司其支在酉八月之分前為寒水後為燥火且二八月者乃隂陽之門戸為在天地分陽分隂之際内經謂其分則氣異不見病𫝊之逆順不能立定法故曰疑之間者陽明厥隂也是厥隂陽明之體也至貞要大論云兩陽合明故曰陽明在辰巳之間是生化之用也兩隂交盡故曰厥隂在戌亥間是殞殺之用也其厥隂心包乃包絡十二經之總也經曰中有陽明生殺之本足陽明為水糓之海又經云萬物生於土而終於土是也標本俱陽諸經中皆有之故不能從標亦不能從其本且手陽眀喜糓而惡清足陽眀喜清而惡熱足厥隂為生化之源宜温而惡清而手厥隂心包不係五行是坤元一正之土雖主長生隂静陽躁禀手少陽元氣乃能生育也若獨隂不長以此眀之是標本俱隂也足厥隂肝亦標本俱隂肝為五藏之一也受膽之氣乃能生長標蔕茅甲於地中其經乃隂之盡也故陽眀純陽厥隂純隂此二者標本不相反也故以寒治熱以熱治寒正治之法也當臨病斟酌若熱病以寒治寒病以熱治故曰從其中也今明正治假令手陽明有餘足陽明不足當以熱治寒若足陽明有餘手陽明不足當以寒治熱故曰以寒治熱以熱治寒謂治正治言之從中者以從合宜酌中處用藥也手足厥隂二經故此通而筭之是手足周身十二經反正之治法也濟生㧞萃云宣可以去壅薑橘之熱是也此大畧言之蓋外感六經之邪欲傳入裏三隂尚實而不受逆邪氣於胷中窒塞不通而或噦或嘔所謂壅也仲景云嘔多雖有陽明證不可攻之况乾噦者乎三隂者脾也故單用生薑宣散必愈若嘔者有聲而有物邪在胃系未深入胃中以生薑橘皮治之或以藿香丁香半夏亦此之類投之必愈此天分氣分虛無處一無所受今乃窒在仲景謂膈之上屬上焦扵表或有質形之物因而越之則可若氣壅則不可越之者吐也亦無下之理破氣藥也辛㵼氣若隂虛穢氣逆上窒塞嘔穢不定之病此地道不通也正當用生地黄當歸桃仁紅花之類和血凉血潤血兼用甘藥以補其氣㣲加大黄芒硝以通其閉大便利邪氣去則氣逆嘔穢自不見矣復有胃中虛熱榖氣乆虛發而為嘔噦者但得五榖之隂以和之五糓屬隂或食或飲白湯皆止嘔噦則嘔噦自止且如小兒痘班後餘熱不退痂不收歛大便不行是謂血燥則當以隂藥治血因而補之用清涼飲子通利大便而㵼其熱也潔古云涼風至而草木實夫清涼飲子乃秋風徹熱之劑傷寒家邪入扵裏日晡潮熱大渴引飲譫語燥狂不大便是謂胃實乃可攻之夫胃氣為濕熱所傷以承氣湯㵼其土實元氣乃得周流承氣之名扵此見矣今衰世人以苦寒㵼火故備陳之除熱㵼火非甘寒不可以苦寒㵼火非徒無益而反害之故諄諄及此至如孫真人言生姜嘔家之聖藥謂上焦氣壅表實而言之非以㵼氣而言之也若脾胃虛弱穀氣不行榮衛下流清氣不上胷中閉塞惟益氣推陽穀氣而已不宜㵼也若妄以㵼氣㵼血下之則轉增閉塞疼痛或變作結胷復不緩下其膈由此至危者多矣鍼經說呵欠噦唏振塞噫嗹嚲涕淚出太息涎下耳中鳴自嚙舌頰唇視生病者補之此十二邪者比竒邪之走空竅者也凡邪之所在皆為不足宜補而不宜㵼空竅者胃之清氣能通也胃既虛則榖不上行是氣路不利經云兼泉玉吏者津液之道路也津液不上胷中氣路不開亦令人噦勿作外實以辛藥生姜之類㵼其壅滯葢肺氣已虛而反㵼之是重㵼其氣必胷中如刀割之痛與正結胸無異亦聲聞扵外用藥之際可不慎哉通可以去滯通草防己之屬是也防己太苦寒能㵼血中大熱之滯也亦能㵼大便與大黄氣味同者皆可㵼血滯豈止防己而已通草甘淡能助西方秋氣下降利小便專㵼氣滯也小便氣化若熱絶津液之源扵肺經源絶則寒水斷流故膀胱受濕熱津液癃閉約縮小便不通宜以此治之其脉右寸洪緩而數左尺亦然其證胷中煩濕口燥舌乾咽嗌亦乾大渴引飲小便淋漓或閉塞不通脛朘脚熱此通草主之凡與通草同者茯苓澤㵼燈草猪苓琥珀瞿麥車前子之類皆可以滲泄利其滯也此雖泄氣滯小便不利扵肺中有所未盡爾予昔寓長安有王善夫病小便不通漸成中滿腹大堅硬如石壅塞之極脚腿堅脹破裂出黄水雙睛凸出晝夜不得眠飲食不下痛苦莫可名狀其親戚軰求治病人始病不渴近添嘔噦所服治中滿利小便之藥甚多素問云無陽者隂無以生無隂者陽無以化膀胱津液之腑氣化乃能出矣此病小便癃閉是無隂陽氣不化者也凡利小便之藥皆淡味滲泄為陽止是氣藥謂禀西方燥金之化自更隆也是陽中之隂非北方寒水隂中之隂所化者也此葢奉養太過膏粱積熱損北方之隂腎水不足膀胱腎之室乆而乾涸小便不化火又逆上而為嘔噦非膈上所生也獨為闗非膈病也潔古曰熱在下焦填塞不便是治闗格之法今病者内闗外格之證悉具死在旦夕但治下焦乃可愈遂處以禀北方之寒水所化大苦寒氣味者黄蘖知母各二兩酒洗之以肉桂為之引用所謂寒因熱用者也同為極細末煎熱水為丸如梧桐子大焙乾空腹令以沸湯下二百丸少時來熱藥之須㬰如刀刺前隂火燒之痛溺如暴泉湧出卧具盡濕牀下成流顧盼之間腫脹消散故因記之或曰防己之性者何曰防己大苦寒能泄血中之濕熱通血中之滯塞補隂㵼陽助秋冬㵼春夏藥也比之扵人則險而徤者也險徤之小人幸災樂禍遇風塵之警則首為亂階然而見善亦喜逢惡亦怒如善用之亦可以敵兇暴之人保險固之地此暝眩之藥聖人有所存而不廢耳大抵聞其真則可要下咽則令人身心為之煩亂飲食為之減少至扵十二經有濕熱壅塞不通及治下疰脚氣除膀胱積熱而庇其基本非此藥不可其行經之仙藥無可代之者復有不可用者數事若遇飲食勞倦隂虛生内熱元氣糓氣已虧之病以防己泄大便則重亡其血此不可用一也如大渇人引飲是熱在上焦肺經氣分宜淡滲之此不可用二也若人乆病津液不行上焦虛渇補以人参葛根之甘温用苦寒之劑則速危此不可用三也若下有濕熱流入十二經致二隂不通然後可審而用之耳補可以去弱人参羊肉之屬是也夫人参之甘温能補氣之虛羊肉之甘熱能補血之虛羊肉有形之物也能補有形肌肉人氣凡氣味與人參羊肉同者皆可以補之故云屬也人參補氣羊肉補形氣者有無之象也以大言之具天地兩儀者也以小言之則人之隂陽氣血也以之養生則莫重扵斯以天地物類論之則形者坤土也人之脾胃也乃生長萬物也地欲静靜則萬物安坤元一正之土亘古不遷者也耕種之土乃五行運用者也動之有時春耕是也若冬時動之令天氣閉藏者泄地氣凝聚者散精氣竭絶萬物不安亦如人之勞役形體則大病生焉故曰不妄作勞則明當静之時若勞役妄作則百脉爭張血脉沸騰精氣竭絶則九竅閉塞胃氣散解夫以人参甘草之類治其已病曷若救其未病為㧞本塞源之計哉内經云志閉少欲飲食有節起居有常減其思慮省語養氣庻㡬扵道何病之有如或不慎病形已彰若能調其脾胃使營氣旺清氣上升則四臓各得其所以氣論之天地人三焦之氣各異損其脾者益其氣損其脾胃調其飲食適其寒温黄耆之甘能補皮毛之氣人参之甘温能補肺之氣甘草之寒温能補脾胃之中經營之氣肺主諸氣氣旺則精自生形自盛血氣以平故曰陽生則隂長此之謂也血不自生須得生陽氣之藥血自旺矣是陽主生也若隂虛單補血血無由而生無陽故也仲景以人参為補血藥其以此與乃補氣補血之大畧也洩可以去閉葶藶大黄之屬是也此二味皆大苦寒葶藶氣味俱厚不減大黄又性過扵諸藥以洩陽分肺中之閉也亦能洩大便為體輕象陽故也大黄之苦寒能走而不守洩血閉也血閉者謂胃中阻穢有形之物閉塞者也陽明病胃家實是也日晡潮熱大渇躁有形之熱故洩其大便使通和汗出而愈矣一則治血病洩大便一則洩氣閉利小便若經絡中及毛分肉間但有疼痛一槩用牽牛大黄下之乖戾甚矣通則不痛痛則不通痛隨利減當通其經絡則疼痛去矣如輕可以去實麻黄葛根之屬是也謂如頭疼當以細辛川芎之類通之則無所凝滯即痛隨利減也臂痛有六道經絡究其痛在何經絡之閉以行本經行其氣血氣血通利則愈矣若表上諸疼痛便下之則不可當詳細而辯之也輕可以去實麻黄葛根之屬是也夫六淫有餘之邪客扵陽分皮毛之間腠理閉拒謂之實也實者謂榮氣不行之謂也宜以輕利開腠理致津液通氣也皮毛經絡寒邪之實去矣故二藥之體輕清成象象氣之輕浮也寒邪為實輕可以去之若大同而小異葢麻黄㣲苦為隂之陽可入足太陽寒水之經其經循眥下行本寒而又受外寒汗出乃愈當以發之葛根味甘温可以發足陽明燥火之經身已前所受寒也非正發汗之藥謂陽明禁發汗利小便但解去經絡肌肉間寒邪其氣和汗自出矣麻黄專發汗去皮毛氣分寒邪葛根和解血分寒邪乃一隂一陽能㵼表實不能㵼裏實若飲食勞倦雜病自汗表虛之證認作有餘便用麻黄發之汗大出則表益虛此葢不知表虛宜補其亡陽閉其自汗秋冬用桂枝春夏用黄耆代之黄耆者能治虛勞自汗陽明胃主自汗小便數若以人參甘草之類補之脾胃實則衛氣行衛氣行則表自實表既實自汗何由而出清氣上行雖飱泄亦止矣此治其本也葛根雖為和解之藥亦不可用用之則重虛其表仲景所論内外不足自汗之證大禁發汗利小便若已經發汗寒邪未去雖發汗數多不可禁也寒邪已出重發其汗則脫人元氣若多汗小便赤澁不得利小便為汗奪津液故也汗多不得重發汗小便多不得重利小便聖人所以切禁此者為津液乃氣血之基本也一云亡陽一云脫血病人重發汗重利小便必脫去氣七神無依則必危困辯麻黄葛根之宜禁故兼及之用藥偏勝論天有四時春為始聖人作經謂之履端葢履端扵始序則不愆以時令考之生氣既至萬物萌動一有舛錯則物為暴陵人為天傷故肅殺之令行扵發生之月此養生之大禁也在人之身亦有四時焉和氣為養生之本凡聖經所載寒藥必燥熱之病乃可用之不當以時令為限也今人不問膏粱貴族及閭巷細民一切用寒涼以自戕伐不知庸醫誰倡此論至謂病字疾脚下加丙火也病無不熱然則疾字乃疾脚下加矢凡有疾者豈皆中箭乎此尤可笑者予細為辯之夫寒物寒藥其性皆禀北方寒水之化而生葢冬月寒氣盛王萬物悉皆殞絶而不見其為肅殺可知矣寒物寒藥既禀此化而生施之於人非肅殺之令乎况寒涼之劑入腹周身之火得水而升走隂燥之極欲坐井中陽已先亡醫猶不悟復指為熱重以寒藥投之其死也何疑焉與夫春初服宣藥欲䟱以導三冬積熱不知月令有云二月之氣萌芽始發陽氣所養物乃條暢今反以寒藥行肅殺之令百穀草木方欲甲拆重為霜雪抑遏之雖欲發現其可得乎内經云春三月此謂發陳天地俱生萬物以榮大槩謂人順春令當生而勿殺予而勿奪賞而勿罰此春氣之應養生之道也即此觀之陽生隂殺乆則與之俱化自取危亡信矣豈惟寒哉熱亦如之經云一隂一陽謂之道偏隂偏陽謂之疾聖濟經曰陽劑剛勝積熱燎原為消狂癰疽之屬則天癸竭而榮涸隂劑柔勝積若凝氷為洞泄寒中之屬則真火㣲而衛散故大寒大熱之藥當從權以用之氣平而止如執而有所偏助令藏氣不平嗚呼死生之機㨗若影响殆不可忽治寒以温治熱以涼但中病即止矯枉則過正也葢涼藥頻施必至扵嘔耎沉冷温藥頻施必至扵煩燥閧熱所貴酌量權度一毫無過用焉是謂活法牽牛非神農藥也本草名醫續注云味苦寒能除濕利小便治下注脚氣此說氣味主治俱誤矣何以明之凡藥用牽牛者少則動大便多則泄下如水乃㵼氣之藥試取嘗之便得辛辣之味乆而嚼之猛烈雄壯漸漸不絶非辛而何續注味苦寒果安在哉若以為濕家㵼藥尤不知其的也何則能㵼氣中之濕熱不能除血中之濕熱況濕從下受之下焦主血是血中之濕宜苦寒家之味今反以辛藥㵼之其傷必矣夫濕者地之别名有形者也若肺先受濕則宜用之或有濕無濕但傷食或動大便或有熱證或只常服尅化之藥但用牽牛豈不誤哉殊不知牽牛辛烈㵼人元氣比之諸辛藥尤甚以辛之雄烈故也經云辛泄氣辛走氣辛㵼肺氣肺病者無多食辛况飲食失節勞役所傷是胃氣不行心火乘之腸胃受火邪名曰熱中肺經云脾胃主血當血中㵼火潤燥補血㵼胃經之濕熱及胷中熱是肺受火邪以黄芩之苦寒抑之以當歸之辛温和血以生地黄苦寒涼血益血少加紅花之辛温以㵼血絡以桃仁之辛温油膩之藥除燥潤大便然猶不可專用須扵補中益氣湯㵼隂火之藥内兼而用之何則上焦元氣已自虛弱若反用牽牛大辛辣氣味俱陽之藥以㵼水㵼氣可乎津液已不知足口燥舌乾而重㵼其津液利其小便元氣傷竭致隂火愈甚今重為備言之牽牛感南政熱火之化所生者也血熱㵼氣差誤太甚若病濕勝濕氣不得施化致大小便不通則宜用之耳濕去則氣周流所謂五臓有邪更相平也經云一臟未平以所勝平之火能平金而泄肺者此之謂也近代錢氏㵼黄散中獨用防風比之餘藥過扵兩倍者以防風辛温令扵土中㵼金不助濕者也經云從前來者為實邪謂子能令母實實則㵼其子此之謂以所勝者平之也古人有云牽牛不可耽耆則脫人元氣經云秋不食薑令人㵼氣故夏月食薑不禁為氣正王之時夏宜以汗散火令其以汗出越其熱故秋月則禁之朱晦菴語録中有戒秋食薑則夭人天命戒之深也薑尚如此况牽牛乎故不可一槩用之耳張仲景治七種濕證小便不利無一藥犯牽牛者仲景豈不知牽牛能㵼濕利小便為濕病之根在下焦是血分中氣病不可用辛辣氣藥㵼上焦太隂之氣故也仲景尚不敢輕用如此世醫一槩用之可乎六經藥性防風甘純陽太陽經本藥身去上風稍去下風與乾薑藜蘆白蘞芫花相及貫芎辛純陽少陽經本藥治頭眩頭痛細辛辛純陽主少隂苦頭痛白芷辛純陽陽明經本藥主治正陽陽明頭痛黄芩苦陽中㣲隂酒炒上頸主上部積血東垣曰泄肺火而解肌熱肺苦氣逆急食苦以泄之甘草生甘平炙甘温純陽補血飬胃稍去腎經之痛與逺志大㦸芫花甘遂海藻相反當歸陽中㣲隂頭破血身行血尾止血治上酒浸治下酒洗糖色大辛苦能潤腸與蒲黄海藻相反連翹苦辛隂中㣲陽諸客熱非此不能除又治手足少陽瘡瘻癰腫黄連苦純陽泄心火心下痞酒炒酒浸上頸已上與芫花菊花殭蚕欵冬花相反蒼术甘苦陽中㣲隂諸腫濕非此不能除足陽明太隂能徤胃安脾羌活甘苦純陽太陽經頭痛去諸骨節疼痛非此不能除亦能温膽太陽風藥也白术甘苦温陽中㣲隂脾苦濕急食苦以燥之利腰臍間血與蒼术同用海云蒼白有止發之異生地黄甘寒隂中㣲陽凉血補血不足治頸已上酒浸惡貝母與蕪荑相反白芍藥甘寒隂中之陽白補赤散㵼肝補脾胃酒浸行經止中部腹痛與石斛硝石相反人参甘苦陽中㣲隂飬血補胃氣㵼心火喘𠻳勿用之短氣用之與藜蘆相反柴胡苦隂中之陽去往來寒熱膽痺非柴胡稍子不能除與皂莢藜蘆相反少陽厥隂行經藥也黄耆甘純陽益胃氣去肌熱止自汗諸痛用之與鼈甲相反葛根甘純陽止渇升陽解酒毒陽明經之本藥也澤㵼醎隂中㣲陽渗泄止渇泄伏水升麻甘苦陽中㣲隂主脾胃解肌肉間熱脾痺非升麻稍不能除手足陽明傷風引用之的藥也半夏苦辛隂中之陽除痰涎胸中寒痰治太陽痰厥頭痛與羊血鼈甲皂莢雄黄相反桔梗辛苦陽中之隂療咽喉痛利肺氣治鼻塞為舟楫之劑與龍膽草相反蔓荆子苦辛隂中之陽涼諸經血止頭痛主目睛内痛與石膏相反枳殻苦酸隂中㣲陽破氣泄肺中不利之氣枳實苦酸純隂去胃中濕熱消心下疼痞厚朴苦隂中之陽去腹脹厚腸胃梔子苦純隂去心中懊憹躁煩橘皮苦辛隂中之陽利肺氣有白則補無則㵼脾活人治噦五味子酸隂中之㣲陽治𠻳補真氣與萎蕤烏頭相反知母苦隂中㣲陽涼腎經本藥上頸行經上酒炒乾薑辛純陽經曰寒淫所盛以辛散之見火後稍苦故止而不走也麻黄苦甘隂中之陽泄衛中實去榮中寒發太陽少隂之汗入手太隂藁本苦辛陽中㣲隂太陽經本藥治顛頂腦痛齒痛與箱子相反地榆甘苦酸陽中之隂㣲補治下部有血與麥門冬相反大黄苦純隂熱淫所盛以苦泄之酒浸入太陽經酒洗入陽明經其餘經不用酒其性走而不守獨活甘苦隂中之陽頭眩目運非此不能除足少隂經藥吳茱茰辛陽中㣲隂温中下氣腹痛温胃與丹参硝石五石英相反郁李仁苦辛隂中之陽破血潤燥豉苦醎純陽去心中懊憹傷寒頭疼煩躁黄蘗苦辛隂中之陽治腎水膀胱不足諸痿厥腰膝無力防己辛苦陽中之隂泄温氣與細辛相反川烏頭辛純隂去寒濕風痺血痺行經與半夏𤓰蔞相反與附子相同􅜰麥辛陽中㣲隂利小便為君黍粘子辛純陽潤肺散氣主風毒腫利咽膈白豆􅅳辛純陽散肺中滯氣主積冷止吐逆反胃消糓進飲食麥門冬甘陽中㣲隂治肺中伏火生脉保神強隂益精與苦参相反茯苓甘淡純陽渗泄止渇伐腎邪小便多則能止之澁則能利之白入辛壬癸赤入丙與白歛地榆相反熟地黄甘苦隂中㣲陽大補血虛不足通血脉益氣力忌羅蔔阿膠甘純隂補虛安胎止疼蘓木甘醎陽中之隂破死血及血脹欲死者猪苓甘苦陽中之隂渗泄止渇又治淋腫肉桂甘苦純陽太陽本藥去胃中風藥秋冬下部腹冷非此不能除之湯液發汗用桂枝補腎内用肉桂忌生葱龍膽草苦純陽㵼肝熱止眼睛疼酒浸上行木香辛純陽和胃氣療中下焦氣結滯刺痛須用㯽榔為使石膏辛甘隂中之陽止陽明頭痛止消渇中暑潮熱甘遂甘純陽水結胸中非此不能除與甘草相反天南星苦與半夏同金鈴子酸苦隂中之陽心暴痛非此不能除神麯辛純陽益胃氣紅藍花苦隂中㣲陽入心飬血又治血運惡血不盡絞痛地骨皮苦純隂凉骨熱酒浸解骨蒸非此不能除􅆶萎根苦純隂心中苦渇非此不能除與乾薑牛膝相反秦芁苦隂中㣲陽治陽明經風濕痺仍治口瘡毒通草甘純陽㵼肺利小便通隂竅澁牡丹皮苦辛隂中㣲陽涼骨蒸又治腸胃積血衂血吐血手厥隂足少隂治無汗骨蒸也地骨皮手少陽足少隂治有汗骨蒸也琥珀甘純陽利小便清肺火消瘀血安魂魄薑黄辛牡礪酸耎痞積又治帶下温瘧瘡腫為軟堅收澁之劑梧桐淚醎治瘰􅊓非此不能除草豆䓻辛純陽益脾胃去寒又治寒心胃痛巴豆辛純陽去胃中濕破癥瘕結聚斬闗奪門之將不可輕用茯神甘純陽療風眩心虛非此不能除蜀葵花隂中㣲陽治帶下赤治赤白治白㯽榔辛純陽破氣滯泄胷中至髙之氣苦参辛純陽氣沉去濕與兎絲子相反藿香甘苦純陽㣲隂補衛氣益胃氣進飲食又治吐逆霍亂青皮苦辛酸隂中之陽主氣滯破積結少陽經下藥也陳皮治髙青皮治低甘菊花苦純隂養目血茵陳蒿苦甘隂中㣲陽治傷寒散黄丁香辛純陽去胃中之實治腎氣奔豚痛大棗甘純陽温胃天門冬甘苦陽中之隂保肺氣治血熱侵肺上喘氣促生薑辛純陽益脾胃散風寒鬱金辛苦隂中㣲陽涼心京三稜苦甘隂中之陽破氣㵼真氣主老痺瘕氣結塊血脉不通氣虛不用髙良薑辛純陽温通脾胃欵冬花辛純陽温脾止𠻳香附子甘苦陽中之隂快氣黒附子辛純陽治脾中大實腎中寒甚通行諸經與防風相反白芨苦甘陽中之隂止肺澁白歛同蜀漆辛純陽破血射干苦甘陽中之隂去胃中癰瘡葳靈仙甘純陽去風去大腸之風通十二經絡馬兠鈴苦隂中㣲陽利小便又主肺熱安肺氣補肺燈草甘純陽利小便葫蘆巴苦純陽治元氣虛冷及腎虛冷白附子辛苦純陽温中血痺行藥勢主中風失音乃行而不止者也槐花苦純陽涼大腸之熱槐實苦同上沉香甘純陽補腎又能去惡氣調中東垣曰能養諸氣上而治天下而及泉與藥為使檀香甘苦陽中㣲隂主心腹霍亂中惡引胃氣上升進食乳香甘純陽定驚止痛川練子甘純陽入心主上下部腹痛竹葉隂中㣲陽涼心經山茱茰酸隂中之陽温肝又能強隂益精經云滑則氣脫濇則可以收之山茱茰之澁以收其滑蜀椒辛純陽明目又温中止精洩硃砂苦純隂涼心熱非此不能除龍骨甘純陽固大腹脫赤石脂甘醎陽中之隂固脫白石脂同芎藭辛純陽散諸經之風茜根苦隂中㣲陽去諸死血艾葉苦隂中之陽温胃王不留行苦甘陽中之隂孕導引利主治瘡瘍及痢苦寒以為君黄芩去心黄連去鬚黄蘗去皮知母去鬚生地黄但用酒洗過用之以酒熱為因也甘寒以為佐黄耆人參甘草大辛以觧結為臣結者散也連翹當歸去蘆藁本通經以為使手之三陽手走頭而頭走足足之三陽足走藏而腹走手足太陽膀胱經羌活藁本足少陽膽經柴胡足陽明胃經升麻葛根白芷足太隂脾經芍藥白者補赤破經足少隂腎經獨活桂足厥隂肝經柴胡手太陽小腸經羌活藁本手少陽三焦經柴胡手陽明大腸經白芷手太隂肺經白芷升麻如䓤白亦能走經手少隂心經獨活手厥隂心包經柴胡辛温和血去惡血當歸稍蘓木紅花牡丹皮専治胃流血凝血必先嵗氣無伐天和春防風升麻夏黄芩知母秋澤㵼茯苓冬桂桂枝補胃實胃進飲食橘皮人参甘草内實内熱者黄芩黄蘗知母表虛表寒者黄耆人参桂枝内發在外氣虛氣弱者陳皮黄耆人参入脾氣實氣結者青皮厚朴木香沉香血虛者生地黄當歸身血實惡血積聚者當歸稍蘓木紅花散隂瘡之結聚排膿者肉桂入心引血化汗化膿出瘡毒消瘡腫黍粘子用半生半熟觧表裏一名大力子牛旁子惡實子瘡出膈已上須用防風上節羌活桔梗此一味為舟楫使諸藥不能下沉瘡出身中已下須用酒水中半盞煎瘡出堅而不潰者昆布王𤓰根廣茂京三稜瘡痛甚者加用黄芩黄連黄蘗知母上二經中但有瘡皆血結氣聚必用連翹瘡發而渇者加葛根瘡出而嘔吐者半夏姜屑瘡出而渇悶者黄連瘡出而飲水者澤㵼茯苓瘡出而大便不通者煨大黄大便結燥而難得者桃仁麻子仁郁李仁中焦有瘡須用黄連酒洗下焦有瘡須用黄蘗知母防風俱酒洗先有燥熱而病瘡者盖胃火受邪當補腎水之不足黄蘗知母因酒過多瘡者當除膀胱留熱用澤㵼防風尾㵼腎火補下焦元氣生甘草稍子補三焦元氣調和諸藥共力成功者炙甘草馬刀挾癭須用昆布王𤓰根龍膽草馬刀未破而堅者須用廣荗京三稜地之濕氣濕寒傷之外鬱壅絡不行外有大寒濕之邪而内必生大熱當以辛温之藥及行本經藥通其皮毛壅滯内則苦寒之劑㵼其當氣之不從是其治也病在上為天製度宜酒炒酒洗煎藥宜武宜清服之宜緩飲病在下為地煎藥宜文宜濃服之宜急飲去咽嗌近者竒之逺者偶之汗不可竒下不可偶補上治上緩緩者氣味薄能逹其表劑小服而頻食後使氣味能逹去表逹去上故曰治肺者九盖服少而頻者也肺氣石膏辛血黄芩苦腎氣知母血黄蘗地骨皮㵼腎火緫治熱在外地為隂骨為裏皮為表牡丹皮治包絡火無汗而骨蒸四物内加上二味治婦人骨蒸知母㵼腎火治熱在内有汗而骨蒸論用藥上藥一百二十種為君主養命以應天無毒多服乆服不傷人欲輕身益氣不老延年者本上經中藥一百二十種為臣主養性以應人有毒無毒斟酌其宜欲遏病補虛羸者本中經下藥一百二十五種為佐使主治病以應地多毒不可乆服欲除寒熱邪氣破積聚愈疾者本下經三品合三百六十五種法三百六十五度每一度應一日以成一嵗倍其數合七百三十名也凡藥君臣佐使以相宣攝合和者宜合用一君二臣三佐四使又可一君三臣九佐使也又有隂陽配合子母兄弟根莖花實草石骨内有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者凡此七情合和之時用意審視當用相須相使者良勿用相惡相反者有毒宜治可用相畏相殺者不爾勿合用也又有酸醎甘苦辛五味又有寒熱涼温四氣及有毒無毒隂乾暴乾採造時月生熟土地所出真偽陳新並各有法其相使相畏也請列之如左處方之日宜深究之右一百九十七種有相制使其餘皆無故不備録或曰古人用藥至少分兩亦輕瘥病極多觀君處方非不煩重分兩亦多而瘥病不及古人者何也答曰古者日月長逺藥在土中自養經乆氣味真實百姓少欲禀氣中和感病輕㣲易為醫療今時日月短促藥力輕虛人多巧詐感病厚重難以為醫病輕用藥須少疴重用藥即多此則醫之一隅何足恠也又古之醫者自解採取隂乾暴乾皆悉如法用藥必依土地所以治十得九今之醫者但診脉處方不悉採藥時節至於出處土地新陳虛實一皆不悉所以至十不得五六者實由扵此夫處方者常須加意重復用藥藥乃有力若學古人徒自誤耳方來學者頁詳熟之凡紫石英白石英朱砂雄黄硫黄等皆須光明映徹肌理鮮净者為佳不然令人身體乾燥發熱口乾而死凡草石藥皆須土地堅石氣味濃烈不爾治病不愈凡狼毒枳實橘皮半夏麻黄吳茱茰皆欲得陳乆者良其餘惟須精新也論合和問曰凡合和湯藥治諸草石蟲獸用水升數消殺之法則云何答曰凡草有根莖枝葉皮骨花實諸蟲有毛翅皮甲頭足尾骨之屬有須燒煉炮炙生熟有定一如後法順方者福逆之者殃或須皮去肉或去肉須皮或須莖根或須花實依方鍊治極令凈潔然後升合秤兩勿令参差藥有相生相殺氣力有強有弱君臣相理佐使相持若不廣通諸經則不知有惡有好或醫自以意加减不依方分使諸草石強弱相欺入人腹中不能治病更加鬬爭草石相反使人迷亂力甚如刀劔若調和得所雖未能治病猶得安利五藏於病無所増劇例曰諸經方用藥所有熬鍊節度皆脚注之今方則不然扵此篇具條之更不煩方下别注也凡藥治擇熬炮訖然後秤之以充用不得生秤凡用石藥及玉皆碎如米粒綿裹内湯酒中凡鍾乳等諸石以玉搥水研三日三夜漂鍊務令極細凡銀屑以水銀和成泥凡礜石赤泥團之入火半日乃熟可用仍不得過之不鍊生入藥使人破心肝凡朴硝礬石燒令汁盡乃入丸散芒硝朴硝皆絞湯訖内汁中更上火兩三沸烊盡乃服凡湯用丹砂雄黄者熟末如粉臨取内湯中攪令調和服之凡湯中用完物皆擘破乾棗梔子之類是也用細核物亦打碎山茱茰五味子蕤仁核决明子之類是也細花子物正爾完用之旋覆花菊花膚子葵子之類是也米麥豆軰亦完用之凡橘皮吳茱茰椒等入湯不㕮咀凡諸果實仁皆去尖及雙仁者湯揉撻去皮仍切之用梔子者去皮用蒲黄者煮湯成下凡生麥門冬生薑入湯皆切三搗三絞取汁湯成去滓下之煮五六沸依如升數不可共藥煮之一法薄切用凡麥門冬皆㣲潤抽去心凡麻黄去節先别煮兩三沸掠去沫更益水如本數乃内餘藥不爾今人煩寸斬之小草瞿麥五分斬之細辛白前三分斬之膏中細剉也凡牛膝石斛等入湯酒拍碎用之石斛入丸散先以碪搥極打令碎乃入臼不爾搗不熟入酒亦然凡桂厚朴杜仲秦皮木蘭軰皆削去上虛軟甲錯取裏有味者稱之茯苓猪苓削除黒皮牡丹巴㦸天逺志野葛等皆搥破去心紫苑洗去土曝乾乃秤之薤白葱白除盡令青并草石南茵芋澤蘭剔取葉及嫩莖去大枝鬼臼黄連皆除根毛石􅅊辛夷拭去毛辛夷又去心蜀椒去閉口者及目用大棗烏梅皆用去核鬼箭削取羽皮凡茯苓芍藥補藥須白者㵼藥惟赤者凡莵絲子煖湯汰去沙土乾漉煖酒漬經一宿漉出曝㣲白搗之不盡者更以酒漬經三五日乃出更曬㣲乾搗之須㬰悉盡極易碎凡用甘草厚朴枳實石南茵芋藜蘆皂莢之類皆炙之而枳實去穰藜蘆去頭皂莢去皮子凡用椒實㣲熬令汗出則有勢力凡湯丸湯用天雄附子烏頭烏啄側子皆煻灰炮令㣲拆削去黒皮乃秤之惟薑附湯乃膏酒中生用生亦削去皮乃秤之直理破作七八片半夏熱湯洗去上滑一云十洗四破乃秤之以入湯若膏酒丸散皆煻灰炮之凡巴豆去皮心膜熬令紫色桃仁杏仁葶藶胡麻諸有脂膏藥皆熬黄黒别搗令如膏脂必視泯泯爾乃已成散稍稍下臼中合研搗令消散乃復都以輕絹篩之須盡又内臼中依法搗數百杵也湯膏中雖有生用者並搗破凡用麥蘗麹米大豆黄卷澤蘭蕪荑皆後炒乾漆炒令煙㫁用烏梅入丸散者熬之用熟艾者先炒細擘合諸藥搗令細散不可篩者内散中和之凡用諸毛羽齒牙蹄甲龜鼈鯪鯉等甲皮肉骨角筋鹿葺等皆炙之蛇蛻乃㣲炙凡用斑蝥等諸蟲皆去足翅㣲熬用桑螵蛸中破炙之牡礪熬令黄也殭蚕蜂房㣲炒之凡湯中用射香犀牛鹿角羚角羊角牛黄須末如粉臨服内湯中攪令調和服之凡丸散用膠先炙使通體沸起燥乃可搗有不沸處更炙之斷下湯直爾用之勿炙諸湯中用阿膠皆絞湯畢内汁中更上火兩三沸令烊凡用蜜先火煎掠去沫令色㣲黄則丸經乆不壊掠之多少隨蜜精粗遂至大稠扵丸彌佳凡丸中用蠟烊投少蜜中攪調以和藥丸湯中用飴糖皆湯成下諸酒用酒者皆臨熟下之凡藥有宜丸者宜散者宜湯者宜酒漬者宜膏煎者亦有一物兼宜者亦有不入湯酒者並隨藥性不得違之其不宜湯酒列之如左古秤惟有銖兩而無分名今則以十黍為一銖六銖為一分四分為一兩十六兩為一斤此數則神農之秤也吳人以二兩為一兩隋人以三兩為一兩今依四分為一兩秤為定方家凡云等分者皆是丸散隨病輕重所須多少無定銖兩三種五種皆悉分兩同等耳凡㸔古方類例最是朝代沿革升合分兩差殊數味皆用分兩不足較也第中間有用升合枚數大槩不同升斗秤尺本自積黍自不可見度量衡辛亦難明今以錢譜推測粗定梗槩凡度者分寸尺丈引本以一黍之廣為分十分為寸十寸為尺十尺為丈十丈為引觀今之尺數等不同如周尺八尺京尺長一尺六寸淮尺長一尺二寸約尺長一尺二寸五分並一小尺為卒小尺既自三㣲起却自可准唐武徳年鑄開元錢八分當十二錢半得一尺排錢比之十二箇已及一尺又不知唐用尺顧漢唐龠量並用尺寸分布尺寸如是不齊將何憑據博古君子必有說矣凡量者龠合升斗斛本以黄鐘龠容十二銖合龠為合重二十四銖今以錢凖則六銖錢四個比開元錢三個重升斗斛皆疊而成數漢唐同用至宋紹興升容千二百銖則古文六銖錢二百個開元二百二十個以紹興一升得漢五升其餘移用不足計也凡衡者銖兩斤鈞石亦以黄鐘龠所容重十二銖兩之為兩二十四銖為両十六兩為斤三十斤為鈞四鈞為石每兩則古文六銖錢四個開元錢三個至宋廣秤以開元十個為兩今之三兩得漢唐十兩明矣千金本草皆以古三兩為今一両古為三升今為一升諸藥之類例尤為難辯且如半夏一升凖五兩不知用何升何兩此修合制度要務不可不知漢銅錢質如周錢又曰半兩重如其文考文五年錢益移而輕乃更鑄四銖其文為半兩雜以鈆鉄錫非殽為巧則不得羸而姦或盗磨錢質取鎔有司言錢輕重請郡國鑄五銖錢周郭有質令不得磨取鎔則知漢以二半兩錢為兩重十銖明矣漢唐例以二十四銖為一兩稍末如修史人改作唐例亦不可知觀錢譜漢無六銖錢至唐方有分以五銖錢十六個正得開元錢十個重又以六銖錢十二個正得開元錢九個重則知開元錢每個已重八銖唐武徳四年鑄開元通寶徑八分重二銖四絫積十錢為兩似難攷據明食貨者必有說焉按藥書漢方湯液大劑三十餘兩小劑十有餘両用水六升或七升或煎取二升三升並分三服若以古龠量水七升煎今之三十兩未淹得過况散末藥只服方寸圭七丸子如梧桐大極至三十粒湯液豈得如此懸絶又如風引湯一劑計五十五両每兩只用三指撮水三升煮三沸去滓温服一升㸔其煮製每只三指撮未應料劑如此之多此又可疑也今以意説漢方當用半兩錢二枚為一兩且以术附湯方較若用漢兩計一百八十銖得開元錢二十二個半重分三服已是今之七錢半重一服若以唐方凖計三百三十銖得開元寶錢四十二個重每服計今之十四錢重大畧可知若以開元錢凖得一百單五個重分三服每服計三百五錢重此猶是小劑况有大劑名半兩數之多者未易槩舉留心此道幸少詳焉凡丸散云若干分兩是品諸藥宜少宜多之分兩非必止扵若干之分両也假今日服三方寸匕湏差正是三五兩藥耳凡散藥有云刀圭者十分方寸匕之一凖如梧桐子大也方寸七者作七正方一方抄散取不落為度錢匕者以大錢上坐金抄之若云半錢七者則是一錢抄取一邉爾並用五銖錢也錢五五者今五銖錢邉五字者以抄之亦令不落為度一撮者四刀圭也十撮為一勺兩勺為一合以藥升分之者謂藥有虛實輕重不得用觔両則以升平之藥升方作上徑一寸下徑六分深八分内散藥勿按抑之正爾㣲動令平調耳今人分藥不復用此凡丸藥有云如細麻大者即胡麻也不必扁但令較量大小相稱耳如黍粟者亦然以十六黍為一大豆也如麻子者即今大麻子凖三細麻子也如胡豆者今青班豆者以二大麻子凖之如小豆者今赤小豆也粒有大小以三大麻子凖之如大豆者以二小豆凖之如梧桐子者以二大豆凖之以方寸七散以蜜和得如梧桐子十丸為定如彈丸及鷄子黄者以十梧桐子凖之凡方云巴豆若干枚者粒有大小當先去心皮乃秤之以一分凖十六枚附子烏頭若干枚者去皮畢以半兩凖一枚枳實若干枚者去穰畢以一分凖二枚橘皮一分準三枚棗有大小以三枚凖一兩云乾姜一累者以半兩為正本草云一兩為正凡方半夏一升者洗畢秤五兩為正椒一升三兩為正吳茱茰一升五兩為正莵絲子一升九兩為正蛇牀子一升三兩半為正地膚子一升四兩為正此其不同也云某子一升其子各有虛實輕重不可通以秤準皆取平升為正凡方云桂一尺者削去皮畢重半兩為正甘草一尺者重二兩為正云某草一束者重三兩為正一把者重二両為正凡云蜜一觔者有七合猪膏一觔者一升二合凡湯酒膏藥舊方皆云㕮咀者謂秤畢𢷬之如大豆又使吹去細沫此扵事殊不允當藥有易碎難碎多末少末秤兩則不復均平今皆細切之較畧令如㕮咀者乃得無末而片立調和也凡云末之者謂搗篩如法也凡丸散先細切曝燥乃搗之有各搗者有合搗者並隨方所言其潤濕藥如天門冬乾地黄軰皆先切曝乾獨搗令扁碎更出細擘曝乾若值隂雨可㣲火烘之既燥少停冷乃𢷬之凡濕藥燥皆火耗當先増分兩湏得屑乃秤之為正其湯酒中不須如此凡篩丸藥用重宻絹令細扵蜜丸即易熟若篩散草藥用輕踈絹扵酒中服即不泥其石藥亦用細絹篩令丸藥者丸篩丸散藥畢皆更合扵臼中以杵𢷬之數百過視其色理和同為佳凡煮湯當取井花水令極淨潔升斗分量勿使多少煮之調和候火用心一如鍊法凡煮湯用㣲火令小沸其水數依方多少大畧二十兩藥用水一升煮取四升以此為率皆絞去滓而後酌量也然則利湯欲生少水而多取汁者為病湏快所以少水而多取汁補湯欲熟多水而少取汁者為病湏補益是以多水而少取汁好詳視之不得令水多少湯熟用新布兩人以尺木絞之澄去垽濁分再服三服者第二第三服以紙覆令宻勿令洩氣欲服以銅器扵熱湯上暖之勿令器中有水氣凡漬藥酒皆須細切生絹袋盛之乃入酒宻封隨寒暑日數視濕烈便可漉出不必待至酒盡也滓可曝燥㣲𢷬更漬飲之亦可散服凡建中腎瀝諸補湯滓合兩劑加水煮竭飲之亦敵一劑新藥貧人當依此用皆應先曝令燥也凡合膏先以苦酒漬淹浹不用多炙宻覆勿洩云時時者周時也從今旦至明亦有止一宿煮膏當三上三下以洩其熱勢令藥味得出上之便匝匝滯乃下之取沸静良乆乃止寜熟不生其中有薤白者以兩頭㣲熬黄為候有白芷附子者亦令小黄色為度猪肪皆勿令經水臘月者彌佳絞膏亦以新布絞之若是可服之膏膏滓亦湛酒煮飲之可摩之膏膏滓則宜以傅病至此益欲兼盡其藥力故也凡膏中有雄黄硃砂軰皆别𢷬細硏如麵湏絞膏畢乃投中以物疾攪至扵凝殭勿能沉聚在下不調也有水銀者扵凝膏中硏令消散胡粉亦爾凡搗藥法燒香洒掃净潔不得雜語喧呼當使童子𢷬之務令細熟杵數可至千萬杵過多為佳凡合腎氣薯蕷及諸大補五石大射香丸金牙散大酒煎膏等合時並勿令婦人小兒産母䘮者痼疾六根不具足人及鷄犬六畜等見之大忌切宜慎之其續命湯麻黄等諸小湯不在禁忌之限比來田野下里家因市得藥隨便市上雇人搗合非止諸不如法至扵石斛莵絲子等難搗之藥費人功力賃作搗者隠主悉盗棄之又為塵埃穢氣入藥中羅篩粗惡隨風飄揚衆口嘗之衆鼻齅之藥之精氣一切都盡與朽木不殊又復服餌不能盡如法服盡之後反加虛損遂謗醫者處方不效夫如此者非醫之咎自縁發意甚誤宜熟思之凡藥皆不用數數曬曝多見風日氣力即薄散宜熟知之諸藥未即用者候天大晴時扵烈日中曝令大乾以新瓦器貯之泥頭宻封湏用開取即急封之勿令中風濕之氣雖經年亦如新也其丸散以瓷器貯蜜臘封勿令洩氣則三十年不壊諸杏仁及子等藥瓦器貯之則䑕不能得之也凡貯藥法皆須去地三四尺則土濕之氣不中也論服餌若用毒藥治病先起如黍粟病去即止不去倍之不去十之取去為度病在胸膈已上者先食而後服藥病在心腹以下者先服藥而後食病在四肢血脉者宜空腹而在旦病在骨髓者宜飽滿而在夜凡服丸散不云酒水飲者本方如此是可通用也凡服利湯欲得侵早凡服湯欲得稍熱服之即易消不吐若冷則嘔吐不下若大熱即破人咽喉務在用意湯必酒澄清若濁令人心悶不解中間相去如歩行十里乆再服若太促數前湯未消後湯來衝必當吐逆仍問病者腹中藥消散乃可進服凡服補益丸散者自非衰損之人皆可先服利湯㵼去胸腹壅積痰實然後可服補藥應服治風湯散皆湏三五劑自有乆滯風病即須倍此乃至五十餘日可瘥又當斟酌所宜傷寒時氣不拘旦暮當即亟治其服藥亦不可拘以常法庶使病易得愈不致傳變是以小兒女子得病益以滋甚者良有隠忍異差不即治之也凡服湯法大約皆分為三服取三升然後乘病人榖氣強進一服最湏多次一服漸少後一服最湏少如此即甚安穏所以病人扵後氣力漸㣲故湯湏漸少凡服補湯欲得服三升半晝三夜一中間間食則湯氣溉灌百脉易得藥力凡服湯不得太緩太急也又湏左右仰覆卧各一食頃即湯勢遍行腹中又扵室中行皆可一百歩許不易出外即大益凡古方治疾全用湯法百千之中未有一用散者今世醫工湯散未辨且其説多異端承疑𫝊謬按湯法㕮咀為名切如麻豆散法治篩為治擇搗篩卒病賊邪湏湯以蕩滌長病痼疾湏散以漸漬此古人用湯液煮散之意也後世醫工惟務力省一切為散遂忘湯法傳行既乆不知其非一旦用湯妄生疑訝殊不知前世用湯藥劑雖大向日飲不過三數服而且方用專一今人治病劑料雖薄而類藥競進每藥數服以古較今豈不今反多乎又昔人長將藥者多作煮散法盖收其積日之功故每用一方寸七為一服多不過三方寸匕然而湏以帛裹煮時㣲㣲振動是古人之意豈湏欲多服藥哉又服丸之法大率如桐子大二十丸多不過三十四十丸及服散者少則刀圭錢五五多則方寸而已豈服湯特多煮散丸散則少乎後之世人既不知觔兩升合之制又不知湯液煮散之法今從舊例率定以藥二十五兩水一升小煮取今一升五合去滓垽分三服自餘利湯欲少水而多取數補湯欲多水而少取數藥各依方下製法凡服湯三日常忌酒縁湯忌酒故也凡服治風湯第一服厚覆取汗若得汗即湏薄服勿令大汗中間亦須間食不爾令人無力更益虛羸凡丸藥皆如梧桐子大補者十丸為始從一服漸加不過四十丸過亦損人云一旦三度服欲得引日多時不闕藥氣漸漬熏蒸五臓積乆為佳不必頓服早盡為善徒棄名藥獲益甚少凡人四十已下有病可服㵼藥不甚湏服補藥必若有所損不在此限四十已上則不可服㵼藥湏服補藥五十已上四時勿闕補藥如此乃可延年得養生之術耳其方備在第二十七卷中素問曰實即㵼之虛即補之不虛不實以經調之此其大畧也凡有臓腑積聚無問少長湏㵼則㵼凡有虛損無問少長湏補即補以意量度而用之凡痔漏疳􅯟等藥皆慎猪鷄魚油等味至老人服㵼藥不過以利為度慎勿過多令人下利無度大損人也凡諸惡瘡瘥後皆百日慎口味不爾即瘡發也凡服酒藥欲得使酒氣相接無得斷絶絶則不得藥力多少皆以知為度不可令至醉及吐則大損人也凡服藥皆斷生冷酢滑猪犬鷄魚油麺蒜及果實等其大補丸散切忌陳臭宿滯之物有空靑忌食生血物天門冬忌鯉魚白术忌桃李及魚肉葫荽大蒜青魚鮓等物地黄忌蕪荑甘草忌粉菜海藻細辛忌生菜莵絲子忌兔肉牛膝忌牛肉黄連桔梗忌猪肉牡丹忌葫荽藜蘆忌狸肉半夏菖蒲忌飴糖及羊肉常山桂心忌生葱生菜商陸忌犬肉茯苓忌醋物百子仁忌濕麺巴豆忌藜蘆羮及猪肉鼈甲忌莧菜凡風病通忌五辛甘滑生冷油膩之類凡傷寒時氣忌羊肉雜食及病差後尤忌肉食凡熱病新差及大病之後食猪肉及腹血肥魚油膩等必大下痢又食餅餌菜黍飴脯鱠炙棗栗諸果及堅實難消之物必更結熱以藥下之則胃中虛冷大痢不禁難救凡脚氣之病極湏慎房室羊肉牛肉魚蒜蕺菜菘菜蔓青匏子酒麵酥油乳糜猪鷄鵝鴨有方用鯉魚頭等此並切禁不得犯之并忌大怒生果子酥酢之食又特忌食匏子蕺菜犯之一世治不愈凡癥瘕癖積忌生冷酥滑物凡吐逆不利等忌生冷酥滑膩物凡噎塞脹滿及痼冷諸氣並忌生冷凡積熱忌魚酒熱麵等凡欬𠻳咯血吐血忌諸熱物凡痰飲忌酒酢凡消渇忌房室凡水氣忌羊頭蹄及鹽一切醎物凡服藥不可食生葫荽諸滑物及果實肥猪犬肉油膩羮魚鱠鯹臊等物凡服藥忌見死尸及産婦穢汚觸之兼急忿怒憂勞凡餌湯藥其粥食肉菜皆湏大熟即易消與藥相宜若生則難消復損藥力仍湏少食菜及硬物扵藥為佳亦少進塩醋乃善亦不得苦心用力及房室喜怒是以治病用藥力惟在食治將息得力大半扵藥有益所以病者務在將息節慎節慎之治可以長生豈惟愈病而已凡服㵼湯及諸丸散酒等至食時湏食口皆先與一口冷醋飲湏㬰乃進食為佳凡人忽遇風發身心頓惡或不能言有如此者當服大小續命湯及西州續命排風越婢等湯扵無風處宻室之中日夜四五勿計劑數多少亦勿慮虛常使頭面手足腹背汗出不絶為佳服湯之時湯消即食粥粥消即服湯亦少與羊肉臛將補若風大重者相續五日五夜服湯不絶即經二日停湯以羮臛自補將息四體若虚即當停藥漸漸將息如其不瘥當即服湯攻之以瘥為度凡患風服湯非得大汗其風不去所以諸風方中皆有麻黄至如西州續命即用八兩越婢六兩大小續命或用一兩三兩四兩故知非汗不瘥所以治風非宻室不得輒服湯藥徒自誤耳惟更加增未見損減矣凡上五十已上大虛者服三石更生慎勿用五石也四時常以平旦服一二升暖飲終身勿絶及一時勿用蒜油魚猪牛馬鷄鴨等肉即無病矣普濟方卷五
