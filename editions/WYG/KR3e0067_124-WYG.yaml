body:
  text: 普濟方卷一百二十五明周王朱橚撰傷寒門訣下太陽脉病証治法三十九証震甲結胸之病項且強其形亦如柔痙狀邪結胸中俯仰難陷胸丸子除悽愴震乙頭疼發熱惡寒時表未解而反下之痞鞕心胸成硬痛陷胸湯用亦相宜震丙結胸傷寒六七日脈𦂳而沉心下堅熱實按之如石硬陷胸湯劑更宜煎震丁傷寒熱結十餘日水在胸中脇下淤頭汗微微心有熱陷胸湯下悉能除震戊汗出復下大便難渇而舌燥又無眠日晡潮熱從心下少腹堅來五六天痛滿連臍不可近氣虚腹内更相煎陷胸湯劑須臾進餌下能教重病痊震已脉滑而浮熱尚淺按之心下痛還同除非小陷胸湯主此證名為小結胸震庚宜汗反將泠水噴刼之其熱腹中傳肉上粟起或煩渇文蛤五苓㪚可煎熱先在表旋歸裏裏實寒邪痞結胸痛鞕心中無熱證陷胸三物有竒功外無熱時歛入裏陷胸治之猶未止白散飲調與服之結消熱下病即已震辛太少之陽併病時頭眩項强亦無期心胸痞結非宜汗當刺大椎肝肺俞震壬婦人中風七八日發熱表邪還惡寒經水適來𫝊裏候脉遲脇滿礙胸間身涼讝語結胸狀邪熱應知血室干當刺期門泄肝氣更宜消息瀉之安震癸寒熱中風發有時經期遠斷竟違期熱入血室渾如瘧可與柴胡湯主之離甲七日發熱㣲惡寒却教肢節更疼煩雖疑心下猶存結加桂柴胡和解安離乙汗下曽經五六日小便不利渇煩時寒熱往來胸脇滿柴胡乾薑與桂枝離丙頭汗惡寒為在表心胸鞕滿裏傳推明醫好辨隂陽證識得柴胡表裏宜離丁嘔而發熱小柴胡妄下還防熱結無心下滿時成硬痛陷胸湯劑與之甦離戊蒸蒸發熱辨隂陽不與柴胡可較量但是滿而不痛者宜煎半夏瀉心湯離己漐漐汗出作有時心中痞滿更如斯乾嘔短氣表方解十棗湯煎治裏宜離庚痞拘心下按之濡脉在闗浮熱反虚實熱虚邪須辨識大黄黄連瀉心除離辛心下痞時復惡寒應從内熱表虚看瀉心湯中加附子因陽攻痞自能安離壬下之成痞瀉心湯不解還教渇飲漿口燥煩加溲不利五苓之藥効非常離癸汗解之後胃不和心胸痞􅀈噫難磨腹中下利雷鳴響益胃瀉心薑療瘥兊甲誤下之人利數行水糓不化腹中鳴滿胸痞鞕加乾嘔胃弱心煩痞轉増下之益甚非為熱胃中鞕是氣虚膨正宜甘草瀉心療内補隂虚表亦清兊乙心下􅀈時利不止理中復與證還添石脂餘糧湯最妙後利須從小便叅兊丙汗吐下後猶不解噫氣不除心下堅痞硬而虚和胃氣旋復代赭石湯煎兊丁下後不可桂枝湯汗出而喘亦同方麻杏甘膏偏主療除邪有法用之良兊戊外證未除數下之熱而遂利裏虚為痞鞕表裏倶不解桂枝人參湯最宜兊己汗下惡寒痞膈間桂枝解表最宜先大黄攻痞黄連佐加入瀉心湯内安兊庚汗出傷寒熱勿瘳心中痞鞕裏當求嘔而下利猶兼吐須用柴胡大者投兊辛項頭不痛脈㣲浮氣上攻心痞鞕憂當吐胸寒宜𤓰蒂能除喘息利咽喉病人脇下素有痞連在臍傍痛引腹腹痛因引入隂筋此名臟結邪相觸兊壬吐下之時表裏煩惡風燥熱口中乾數升水飲猶然渇白虎加參療可安兊癸傷寒大熱若無多口燥心煩渇奈何背上惡寒猶有表人參白虎自當和坎甲脉浮發熱身無汗麻黄湯療頗能除渇而欲飲無他證白虎五苓亦可袪坎乙太少陽傳項强時心中痞鞕自難舒慎無妄下詳其證當刺大椎肝肺俞坎丙太陽少陽來合病自利黄芩湯主之嘔者黄芩加半夏生薑陽下治偏宜坎丁傷寒有熱在胸中腹痛都縁邪氣攻嘔吐黄連湯可用隂陽升降始能通坎戊傷寒八九日來深風濕頭煩痛怎禁體重不能自轉側桂枝附子飲宜斟坎己大便􅀈時小便利滲津發汗兩非宜桂枝附子湯除桂更加白术效尤竒坎庚風濕相摶骨節煩屈伸掣痛苦艱酸甘草附子湯煎下固衛風邪即便寛坎辛傷寒之脉浮而滑表熱邪傳在裏寒白虎湯煎除内外益氣散熱自能安坎壬傷寒脉結代而還悸動心中不自寛真氣内虚邪更甚炙甘草劑便平安陽明脉病證治法四十四證木甲不吐不下心煩憂胃中鬰熱如蒸油隂陽之氣無偏勝調胃承氣湯可投木乙汗後脉遲不惡寒身重氣短潮熱還大便巳鞕腹中滿大承氣飲下之寛木丙惡寒多汗體微燒外未解來熱不潮可與小承調胃氣通時腹滿病須消木丁不轉失氣未可攻腹中燥糞熱難容大便鞕少飲水噦小承氣飲服之通木戊傷寒不便十餘日日晡潮熱發邪言獨語真如見鬼狀直晴更覺識人難怵惕尋衣㣲帯喘脉弦者活澁歸天大承氣下追其熱一服利時止後煎木己陽明之病汗何多津液焦枯外泄過讝語小承湯味入胃中燥鞕亦能和木庚陽明讝語熱而潮食反不能燥屎焦便鞕有時能食者亦宜逐結大承調木辛燥屎難容在胃中讝語汗出此為風表虚裏實證昏亂承氣湯煎大者通木壬三陽合病要分清汗下還須别重輕腹滿身重難轉側不仁讝語属陽明㣲塵面垢少陽證遺尿乃是太陽經手足逆冷兼自汗除非白虎保安寧木癸二陽併病發潮熱手足汗流大便難太陽證罷下之愈承氣湯宜大者餐火甲脉浮而𦂳口中乾喘熱縁何不惡寒發汗反教生讝語燒針煩􅏥更無眠下之又恐虚其胃客氣乗虚膈不寛舌上胎生何法治梔子䜴湯吐後安火乙渇欲飲水口舌乾中焦客熱燥而煩人參白虎湯宜治潤燥除邪病始痊火丙脉浮發熱渇飲漿小便不利客膀胱猪苓湯利下焦熱用瀉之時必得康火丁脉若浮來更帯遲裏寒表熱更何疑下利清榖知寒甚四逆湯温用却宜火戊陽明病下外有熱手足温而不結胸心下懊憹飢不食好將梔子䜴湯攻火己病在陽明發熱潮大便溏時小便調胸脇鞕滿邪猶在服了柴胡病自消火庚脇滿而嘔大便難更看舌上白胎瘢柴胡湯主通津液胃氣因和汗濈然火辛脉弦浮大辨隂陽短氣不通脇滿張嗜卧鼻乾不得汗一身面目悉皆黄溲難潮熱時加噦耳後耳前腫刺芒十日若教浮脉續便當速用小柴湯火壬脉但浮時無裏證表邪猶合用麻黄不尿腹滿猶加噦闗格之病入膏肓火癸發汗小便自利者津液内竭不可攻自欲大便猶有鞕土𤓰猪膽宻導通土甲陽明病若得遲脉汗出多而微惡寒未解之時宜發汗桂枝湯下表和安土乙脉浮無汗屬陽明表實還教喘不停發汗麻黄湯可用熱邪解散病安寧土丙陽明頭汗身無汗際頸而還渇引漿瘀熱發黄溲不利定當速餌茵陳湯土丁症在陽明蓄血間雖然屎鞕便非難若教黒色邪傳裏抵當湯速下之痊土戊陽明下後覺心煩初鞕後溏仔細看若果胃中有燥屎大承氣散下之安土己日晡發熱如瘧狀審看内外更詳之脉實大承氣湯下脉浮發汗桂枝宜土庚下後不便六七日煩熱腹滿痛相纒是知燥屎宿食故可與大承氣劑煎土辛小便不利大便難㣲熱時時喘不眠宿食胃中猶燥結大承氣劑下之寛土壬食糓不受嘔更饒茱萸湯劑始能調服湯愈甚縁何故當易别方理上焦土癸惡寒汗出太陽經渇而發熱屬陽明渇如不止邪傳裏津液調和用五苓金甲趺陽脉濇更兼浮脾約胃强津液畱大便難時小便數麻仁潤燥最相投金乙三朝發汗猶不解發熱蒸蒸入胃間調胃承氣湯煎服胃中邪熱下之安金丙傷寒腹脹熱邪招吐後縁知在上焦此是熱邪傳入胃調胃承氣亦能消金丁若吐若下若發汗小便因數大便堅表邪入裏脾約候小承氣湯病即痊金戊傷寒得病六七日大便鞕時小便利裏實心滿可攻之大承氣湯為要劑金己目不了了晴不和㣲熱便難實更多此是内邪危惡證大承氣劑急消磨金庚陽明發熱汗尤多津液將枯可奈何入府之邪攻更急大承氣劑下之瘥金辛發汗不解腹滿痛邪傳入臟急須攻大承氣劑下府熱潤燥除積有竒攻金壬腹滿不減實熱堅若教時減又為寒大滿大實可除下承氣湯宜大者煎金癸少陽合病與陽明脈滑而數宿食癥少陽脉勝陽明負大承氣劑泄其經水甲脉浮而數邪傳裏六七日來大便難喜飢消糓并瘀血抵當湯下即能痊水乙傷寒七八日身黄其色渾如橘子囊小便不利腹㣲滿便宜速下茵陳湯水丙傷寒發熱要消詳瘀在胃中身必黄梔子蘖皮湯可療除邪解散效非常水丁傷寒發熱瘀在裏表濕身黄甚法消赤小豆湯除濕熱麻黄加入與連翹少陽脉病證治法一證紀甲未經吐下脉沉𦂳脇滿往來寒熱時乾嘔邪傳半表裏柴胡湯劑正相宜太隂脉病證治法三證母甲太隂之病脉浮時發汗還當用桂枝在表之邪隨汗散四肢煩痛頗相宜母乙自利不渇太隂病中焦寒在理當温臟中須識因寒故用藥之時四逆純母丙誤下因成腹痛時桂枝加芍最相宐若教大實當除下桂枝大黄湯主之少隂脉病證治法二十三證天甲少隂發熱脉何沉其病當宜在表尋邪氣未深㣲發汗麻黄附子細辛斟天乙少隂得病二三日附子麻黄甘草湯邪未深時無裏證和榮益衞㪚之良天丙心煩之候更無眠寒極須從變熱看黄連阿膠湯與服扶隂㪚熱便能安天丁少隂得病口中和其背惡寒問炙科附子湯煎寒可㪚隂消陽助起沉疴天戊身體疼痛手足寒浮沉細向脉中看脉浮可汗沉寒甚便與温經附子煎天己病利頻多血與膿桃花湯用有神功下焦不約裏寒甚扶氣㪚寒益胃中天庚少隂腹痛四五日小便不通内結深下利頻頻便膿血桃花湯效莫沉吟天辛少隂吐利病難任手足寒邪厥泠侵煩躁陽争將欲死茱萸湯可㪚沉隂天壬少隂下利喉咽痛脇滿心煩邪内傳可與猪膚湯散熱調隂益胃自能痊天癸二三日病少隂傳咽痛時將甘草煎不愈更尋何法治選慿桔梗妙湯瘥人甲少隂之病入咽中言語聲難瘡在嚨苦酒煎湯頻潄嚥觧煩除熱有神功人乙病來相摶少隂中咽痛寒邪客氣冲半夏湯煎頻嚥服可將此法再旁通人丙少隂主水自調和寒不能禁下利多惟有白通湯可用散寒温裏病當瘥人丁乾嘔而煩下利并厥逆無脈要醫明白通湯内加猪膽暴出脈死微續生人戊真武湯煎制水氣少隂證治問元因四肢沉重兼腹痛小便不通自利頻嘔加生薑除附子下利去芍用薑辛欬者却須收逆氣乾薑五味細辛温有時小便還通利便減茯苓恐渗津人己手足厥逆利清榖面赤身熱不惡寒隂盛格陽脉㣲絶通脈四逆治之安面時赤色加葱用腹痛除葱用芍酸咽痛去芍加桔梗嘔者生薑二両寛便教利止脉不出去梗加參亦霍然人庚少隂四逆肢不温有時泄下還腹痛小便不通或欬悸四逆㪚煎即可用再加乾薑五味子止欬下利主治共悸者導氣加桂枝小便不利茯苓送腹痛加附用補虚薤白煮湯療下重人辛少隂下利六七日欬而乾嘔更無眠心煩口渇知其熱滲泄猪苓湯治痊人壬少隂得病二三日口燥咽乾急下之邪未深時熱已甚大承氣劑用之宜人癸少隂自利色純青口燥咽乾藴熱蒸心下邪乗猶自痛大承氣劑療之平地甲少隂之病六七日腹滿不便速下宜熱壅陽明勝腎水大承氣劑効偏竒地乙少隂之病脈沉沉外症未形何處尋四逆湯煎宜急療温中即可㪚邪隂地丙欲吐不能手足寒胸者實者吐之寛膈間痰飲成乾嘔四逆湯温始得安厥隂脈病證治法十九證乾甲蚘厥其人静復煩此為胃弱臟中寒蚘聞食臭時當吐温臟烏梅圓下安乾乙脉滑而厥可消詳有熱之時在裏藏白虎湯煎除内熱手足厥逆炙之良乾丙手足厥寒脈細㣲除非四逆入當歸陽虚隂弱須生助願得良醫辨病機乾丁厥逆其人内久寒散寒始得助陽還當歸四逆辛温味加入薑萸病即安乾戊大汗出時熱不去四肢拘急痛難當惡寒下利厥而逆散寒復陽四逆湯乾己内外雖分汗下餘陽虚隂勝搃無殊因而厥泠亡津液四逆回陽病可除乾庚胸中實結滿而煩厥泠雖飢不可餐脉乍𦂳時邪内陷須當𤓰蒂吐之安乾辛厥而心悸水猶停入胃還教下利并欲治厥時先治水茯苓甘草劑偏靈乾壬咽喉不利吐膿血寸脉沉遲手足寒麻黄升麻湯主治裏虚便泄治尤難乾癸傷寒本自寒下者復因吐下更増寒寒格之時食即吐芩連薑參等分煎坤甲下利清榖内有寒身熱不觧外増煩汗出而厥陽虚甚通脉四逆湯可飡坤乙利亡津液熱傷氣氣虚後重轉難通堅腎厚脇還散熱苦寒主治白頭翁坤丙下利腹滿身疼痛裏有寒時表未通四逆湯煎利可止身疼更與桂枝攻坤丁下利而渇欲飲漿有熱在内要參詳白頭翁湯服之愈散鬰涼中作主張坤戊下利還將讝語并就中燥糞辨分明此為胃實膓虚症良劑之中選小承坤己下利之後却更煩按而心下亦非堅乗虚客熱胸中滿梔子䜴湯吐即安坤庚嘔而脉弱邪傳裏裏若虚時小便多身熱㣲㣲還見厥急煎四逆救沉疴坤辛乾嘔之時吐沫涎更兼頭痛上攻煎散寒温裏茱萸劑治得其方亦可痊坤壬嘔而發熱用柴胡此證多由胃氣虚怫鬰諸經并表裏良醫審視莫模糊霍亂脉病證治法六證霍甲惡寒而利脉猶㣲利止須知血已虧四逆加參兼益血臨時消息可施為霍乙頭疼發熱隂陽半欲飲不飲辨機關熱重當煎五苓散寒多急與理中圓霍丙吐利止時内自和身疼猶是表邪多外臺有語汗之愈當用桂枝湯療瘥霍丁發熱惡寒汗出時上吐下利裏虚為四肢拘急厥而泠四逆湯煎主治之霍戊既吐且利小便利脉㣲欲絶大汗漬内寒外熱恐亡陽救之速投四逆劑霍己吐下之餘津液㣲汗出而厥脉如絲通脉四逆加猪胆陽虚欲絶好為之隂陽易勞復脉病證治法六證勞甲隂陽差易病其人少氣强交體重身熱上冲胸頭不舉隂中小腹急難容拘攣膝脛難舒展兩眼生花亦闇瞢餘毒薫蒸詳此症燒裩散服有竒功勞乙大病新瘥又復勞枳實梔子䜴湯熬宿食還加大黄用或觧或下辨分毫勞丙瘥後傷寒還發熱小柴胡可去其疴脉浮汗解沉實下消息合宜無太過勞丁傷寒瘥後致脾虚腰下腫縁水氣淤牡蠣澤瀉散主治利其小便病能除勞戊喜唾應知胃上寒猶疑瘥後有邪干胃間津液須温潤咽下理中丸便寛勞己傷寒解後面羸瘦少氣吐而逆氣拘竹葉石膏湯主治和調胃氣熱方除傷寒棺墓總例歌括木土棺墓上知屍臨墓下土金歸二木棺無氣止金水屍中有命隨火水氣前逢命者金火屍中有氣微水火棺中生有氣屍棺下木金危水火命前逢氣可土木逢之不可推墓棺上多應死屍棺下救應遲金土屍來木上病人危困不須疑屍向棺頭金木位患家猶自好求醫傷寒棺墓起例假令戊寅人甲子日得病前進三辰加至司天上見子是少隂腎之經當日行土運水氣微邪受病係天字號下第一證其脉浮緩其證腰脚沉重病甲巳日差是氣墓無邪其證濕寒又如乙亥日已生人病司天在亥司地在寅從邛上將已數到司天見丑字即大隂證也又將日干加人命已上數到司天見辛字壬字號下藥傷寒手三隂三陽運氣從午至亥假令甲午日病是手少隂經甲土運午是大氣歌云土火乙庚疾大減先干後差乙未日病是手太陽經乙屬金運未為金氣歌云金見丁辛先汗後差丙申日病是少陽經病屬水運身是火氣歌云水火命前逢氣可先汗後差丁酉日病是手陽明經丁屬水運酉為金氣歌云木風火熱氣和清戊戌日病是太陽經戊屬火運戌為火氣歌云火乙丁先汗後差己亥日病是手厥隂經己屬土運亥為火氣歌云土火乙庚疾大减傷寒足三隂三陽運氣從予至巳假令甲子日病是足少隂經甲屬土運子為水運歌云土水甲巳從來道乙丑日病是足太隂經乙屬金運丑為土氣歌云金土丁壬汗佀蒸丙寅日病是足少陽經丙属水運寅為木氣歌云水木元來號甲丁丁卯日病是足陽明經丁屬木運卯為土氣歌云木土丙辛之日差戊辰日病是足太陽經戊屬火運辰為水氣歌云水火氣前逢命者己巳日病是足厥隂經己屬土運巳為木氣歌云土木逢之不可推又棺墓例假令乙化金陽明金一屍重併又甲化土太陽水命墓相刑傷寒汗差總例歌括金見丁辛大乙丁丙己木水乙己并戊壬土水大丙己水土原來號用丁土水甲己從來道金土丁壬汗作蒸木土丙辛之日差火金己己汗如傾水金甲戊言文汗木火乙戊不差争土火己庚疾大減金木安康在丙庚金燥水寒中土濕木風火熱氣和清此是加臨安愈訣莫與迷入取次輕傷寒汗差起例假令戊戌入庚子日病是少隂司天將本命庚子日午起伍子元建歌云乙庚之歲戊為頭從寅順行至本命戊土是丙戌是小腸屬火逢水汗出第三日是壬寅與本命戌是三合小差第五日甲辰相冲第七日丙午相冲丙是水運見汗足太陽膀胱經腎與膀胱為合故足少隂與少隂與足太陽為表裏從目内眥上頭連於風府分為四道下項并正别脉上下六道以行於背與身為經太陽經為諸陽主氣或中寒邪必發熱而惡寒縁頭項腰脊是太陽經所過處今頭項痛身體疼腰脊强其脉尺寸俱浮故知太陽經受病也傷寒證識字號用藥歌訣甲子司天午人病還向甲子加人􅒛後千數到本司天破字號下第一證常將日干加人􅒛數到司天便見應㸔其十字那箇字尋號輪着支上定假令甲子日亥生人􅒛酉陽明證木字號第二證乙字用藥調胃承氣湯主之男逆傳經一日酉陽明經陽明第二證木字號下乙字號藥承氣湯主之二日甲少陽火紀字號下第一證甲子號藥小柴胡湯主之三日未太隂土母字號下第二證乙字號藥桂枝湯主之四日午少隂大人字號下第二證癸字號藥承氣湯主之五日已厥隂木坤字號下第八證辛字藥柴胡湯六日辰太陽水日字號下第七證庚字號藥桂枝湯主之女順傳經一日未太隂土母字號下甲字藥桂枝湯主之二日申少陽火紀字號下甲字藥柴胡湯主之三日酉陽明金木字號下丙字藥承氣湯主之四日戍太陽水武字號下丁字號藥調胃承氣湯主之五日亥厥隂木乾字號下戊字藥四逆湯主之六日子少隂火天字號下己字藥桃花湯主之傷寒運氣相尅病證衰旺歌氣旺人衰應不死人旺氣衰必定凶火水尅人原是􅁻人􅒛尅出寅時一刻或三刻差假令木􅒛上見丙丁屬心小腸相火受病火臨其輕見戊己脾土受病土臨其輕也上見甲乙肝膽木受病木臨其輕也運用十干起則君火不當其位也餘皆放此四時傷寒傳證例假令丙寅生人丙戌日得病丙辛是水運戌是太陽丙為水氣係天符日其病難愈當日足太陽司天前三辰司地是巳丑乃丑為隂支從子上将丙寅數到司天戌上是少隂君火證第二日受病二日傳至亥足厥隂木前證少隂君火乃厥隂木生少隂君火為母生子宜補脾㵼脾而愈三日傳至戌足太陽水前少隂大水尅火客勝主為賊邪其日雖因不死從初病戌日至第三日是戌子為火運子為火氣為水不能尅火一水不能尅三火也四日傳至酉足陽明土少隂火生胃土宜補心而愈五日傳至申足少陽木少隂火生膽木宜補肝㵼脾六日傳至未足太隂土少隂火生太隂脾土宜補脾而愈七日傳至午少隂腎水少隂火第七日至壬辰木運水氣為水生火水尅火為中半之道其人雖不死火困而已八日傳至巳厥隂心包絡火兩火相逄為此十二日合辰日差又汗差例假令乙化金陽明金見丁辛至第四日或第八日汗差又甲化土太陽寒水甲子日汗第三日見已亦有汗氣天非常運尅氣時無災若氣來尅運必須忙若逄屍絶井丘墓必定難逃此度殃此是先賢真妙訣後人學者仔細詳傷寒三丘五墓歌命前一殺是三丘斯人得病不須憂命後一殺是五墓相逄必定淚交流但將五子元中建又逄棺槨墓休囚日神但無屍棺墓醫人病療得無休註云戊己辰戍丑未為墓甲乙寅夘為庚申辛酉為棺屍棺居墓上日屍居棺下日對冲是又云寅夘辰為三丘丑為墓此例用五字元建從寅上順行至司上見木為棺金為屍尅人命者此為棺中有鬼谷必但以二字皆是辰却告風府一穴是督脉陽維之會在項後髪際二寸入筋宛宛中不可炙針入四分留三呼此二穴陽維之會非太陽經也太陽經穴夾項後髪際大筋外亷陷中名曰天桂不針此者桂枝已主太陽病故也足少陽膽經與膽為合故足厥隂與足少陽為表裏起於目外皆絡於耳分為四道下缺盆循於脇并正别脉六道上下主經營百鄭流氣三部故病人胷脇痛而耳黄帝針經邪在肝則兩脇痛又曰膽脹脹者脇下痛口中苦善太息或口苦咽乾或往來寒熱而嘔其脉尺寸俱弦者知少陽經受病也足少隂腎經脉起於小指之下斜趣足心行者入跟中上至股内復㾾貫腎絡膀胱直行從腎上貫肝鬲入肺中繫舌本傷寒熱氣行於藏流於少隂之經少隂主腎腎惡燥故渇而引飲又經發汗吐下已後藏府空虛津液枯竭腎有餘熱亦渴故病人口燥舌乾而渴其脉尺寸俱沉者知少隂經受病也足太隂脾經為三隂之首其肺有於脾胃絡於嗌喉故交入腹滿而嗌乾尺寸俱沉細者知太隂經受病也足厥隂肝經厥者盡也靈樞曰𤣥為左足之厥隂戌為右足之厥隂兩隂俱盡故曰厥隂夫隂盡為晦隂出為朔厥隂盡為義也其脉循隂噐而止絡於舌本也脉弗營則筋急則引舌與卯故唇青舌卷而卯縮凡病人煩滿而囊縮其脉尺寸俱微緩者知厥隂經受病也帝日氣口何以獨為五藏主岐伯曰胃者水榖之海六府之源口也五味入口藏於胃以養五氣氣口亦太隂也是以五藏六府之氣味皆出入胃變見於氣口右手闗前一分氣口之位人迎氣口屬太隂肺之經而黄帝乃云人迎亦胃脉何也在手闗前一分者人迎之位挾喉嚨兩旁者人迎之穴人迎之位屬手大隂肺之經人迎之穴屬陽明胃之經故素問云人迎亦胃脉也右手闗前一分人迎之位大谿穴足少隂腎之經男子以右腎為命門女人以右腎為命門三十六難曰命門者精神所舍原氣所係男子藏精女人繫胞主生死之要病人有命門脉者活無者死仲景云少隂病手足逆冷發熱者不死脉不至者灸太谿七壮故傷寒必診太谿以察其腎之盛衰也太谿穴足内踝後根骨上動脉陷中衝陽穴足陽明胃之經人受氣於糓糓入胃乃傳於五藏六腑皆受氣為榮濁者為胃榮行脉中衛行脉外隂陽相貫如環無端胃為水糓之海主禀四時皆以胃氣為本是謂四時之變病死生之要㑹故傷寒必胗衝陽以察胃氣之有無也衝陽在足跗上五寸骨間動脉上去陷谷三寸仲景云太陽病初服桂枝湯反煩不解者先刺風府却與桂枝湯後其證尚自汗發熱惡寒脉尚寸浮尺弱而反煩為邪痺在陽維經故可先針風池一穴是少陽陽維之㑹在項後髪際陷中是針入一寸一分穴在乳上脘下筋骨近腹處是也凡婦人病法當針期門不用行子午法恐纒藏膜引氣上但下針令病人吸五吸停針良久徐徐出針此是平寫法也凡針期門必寫勿補可肥人二寸瘦人寸半深足陽明胃經脾與胃為合故足太與足陽明為表裏從鼻來於鼻絡於目下咽分為四道并正别脉六道上下行腹綱維於身盖諸陽在表陽明主肌肉絡於鼻故病人身熱目疼鼻乾不得卧其脉尺寸俱長者知陽明經受病也穴在臍下一寸五分氣海二寸名丹田三寸名闗元闗元是小腸募足少隂任脉之會針入八分留三呼㵼五吸炙亦良然不及針普濟方卷一百二十五
