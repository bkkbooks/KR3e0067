兩鼈甲去裙襴醋炙三分赤茯苓去黒皮三分虎頭骨一兩酒塗炙焦右麄搗篩分為五貼以水三盞煎取一盞下地黄汁一合更煎三五沸去滓分温二服食後良久相繼服日一貼桔梗湯治寒熱似瘧桔梗剉炒一兩甘草炙半兩知母焙半兩柴胡去苗一兩半大黄剉炒半兩鼈甲去裙襴塗醋二兩右剉如麻豆分為六貼每貼用童子小便二盞葱白三莖䜴半合浸食頃煎煎取一盞去滓食後分温二服日一貼虎骨湯出聖惠方治徃來寒熱瘧經年不瘥瘦弱及勞瘧虎頭骨塗酥炙黄鼈甲塗酥炙黄去裙襴牡蠣炒為粉桃仁湯浸去皮尖麩炒微黄各三兩香䜴二合炒乾右為末和搗三二百杵丸如梧桐子大每於食前以粥飲下三十丸猪膏丸出聖惠方治瘧寒熱發渇徃來不定臘月猪脂二兩獨顆蒜一顆萎葱一握獨角仙一枚五月五日三家粽子尖右於五月五日五更初於凈房内修合勿令婦人見露頭赤脚舌柱上腭廻靣向北搗一千杵為度有患者用新綿子褁一丸如皂莢子大男左女右繫於手臂上砒霜丸出聖惠方治瘧徃來寒熱發渇無時砒霜生研一兩天靈蓋一兩生用為末猢猻頭骨一枚燒灰硃砂半兩細研東南桃柳枝各七莖長三寸右取五月五日午時為末取粽子角和丸如梧桐子大男左女右手把一丸豫先嗅之一丸可醫五七人人參湯出聖惠方治瘧寒熱作時靣色黄人參常山各半兩甘草生三分陳橘皮湯浸去白燒乾一分右麄搗篩為末每服五錢水一盞半入茶末半錢燈心五莖煎至七分去滓入酒半盞和匀候温未發前頓服取吐如未吐再服以痰出盡為度附子丸出聖濟總録治諸瘧寒熱徃來附子炮裂去皮臍大黄剉炒各三分常山蜀漆各一分右為末煉蜜和丸如梧桐子大每服三丸米飲下未發一服臨發再一服消石膏出聖惠方治瘧寒熱徃來砒黄半兩消石白礬各一兩膩粉一分右細研用醬水一大盞調成稀糊入鐺中以慢火煎又用冷醬水一升候沸即旋添添盡將乾取出曬乾若來日發今日初夜以冷醋湯下一菉豆大來日早晨再一服一日内不得食熱物逐邪丸出聖惠方治瘧徃來寒熱發歇無時濕生蟲四十七枚百節蟲四十九枚砒霜三分細研糉子角一七枚右於五月五日日未出時於東南方上尋取兩般蟲去足至午時靣向南都研不令雞犬婦人師僧孝子見丸如小豆大每患者於發前男左女右手把一丸嗅七遍立効常山散出聖濟總録治諸瘧寒熱徃來止而復發常山末一兩砒霜研一分丹砂研一錢右研匀入白麫糊和作餅子油内煮焦黒為度再研極細每服半錢夜半令茶清調下丹砂丸出經効濟世治瘧疾寒熱相半者兼治間日瘧丹砂人參各一錢附子一枚半兩者右為末蜜丸如梧桐子大煎竹葉湯吞下二三十丸未發前三服中病則吐或身習習麻木未中病加至四十丸明日發前如發服中病即止己巳嵗七月初十日予得瘧疾連日發作呻吟宛轉一榻間殆無生意如是者已兩旬平昔號為得効之藥服之已遍畧無所知教授龐國器出此方且云今公之病寒熱交戰者蓋陰陽之氣不分也龎安常有治瘧方寒熱相半所謂丹砂丸者公所宜服也其説適契予心即合此服之二日而即愈矣八月一日公悓記蜜煎主寒熱方蜜五合恒山甘草各二兩右三味取二味㕮咀以水二斗煮取二升去滓内蜜五合温服七合吐即止不吐更服七合勿與冷水一方用甘草半兩常山甘草湯出肘後方治寒熱日再三發可服常山三兩甘草二兩右切以水四升煎煮一升半分三服相去五里久進一服忌海藻菘菜生葱生菜一方水酒合煮服又方蜜二合醋八合右調和平旦頓服須臾泛泛然欲吐擿之若意中不盡明旦更服無不大嘔安穩柴胡括蔞根湯治瘧疾徃來寒熱引飲方見本門手少陰心瘧類治瘧徃來寒熱發渇無時出聖惠方用蜀漆末每服以温水調下一錢草菓飲出御藥院方治寒熱徃來煩渇頭痛或寒多少熱方草菓子仁四枚人參去蘆頭半兩甘草炙半兩半夏十三枚堅實者薑湯浸洗七次大棗烏梅去核三枚生薑二十一塊右件七味㕮咀用水一大碗煎至一盞去滓五更時温服七寳剉散出廣南衛生方常山懐中懐乾生用㯽榔秦芁洗去土甘草炙右等分為麄末每服藥三錢入桃枝柳枝各七寸烏梅三枚水二盞煎至一盞於未發日前臨卧放極温冷進一服當發日絶早空心旋煎又温冷進一服忌熱物半日以上即飲食皆無忌服藥時須是放温冷細細呷喫療寒熱出本草方以鳬葵搗汁服瘧病發熱身黄小便不利附論夫寒熱凌虐於人名為瘧而發熱小便不利者身必發黄此蓋熱氣不散入於小腸水道既澀故小便不利也方知母湯治瘧病發熱煩渇咽乾口燥身黄怠惰小水澀滯知母地骨皮升麻犀角屑人參麥門冬去心焙柴胡去苗各一兩石膏半兩鼈甲醋炙令黄去裙襴各三兩甘草生剉半兩赤茯苓去黒皮三兩右麄搗每服四錢水一盞半入香䜴五十粒煎至八分去滓不拘時候温服常山飲出聖惠方治瘧病手足苦煩發熱渇燥通身悉黄小便不利常山柴胡去苗甘草炙微赤剉梔子仁各一兩赤茯苓去黒皮石膏蜀漆鼈甲塗醋炙令黄去裙襴各三兩右麄搗每服五錢水一盞半入竹葉二七片䜴五十粒煎至八分去滓不計時候温服一方無赤茯苓有烏梅肉三七枚微炒升麻湯治瘧病發熱煩躁身黄靣黄小便不利赤茯苓去黒皮桂去麄皮黄芩去黒心各一兩升麻常山蜀漆甘草炙剉各半兩右麄搗篩每服三錢水一盞煎至七分去滓温服不拘時候茈胡湯出聖惠方治瘧病大渇煩躁引飲不止身體皆黄小便不利煩熱嘔逆柴胡去苖二兩甘草炙微赤剉半兩知母人參麥門冬去心焙杏仁湯浸去皮尖雙仁麩炒微黄各一兩右麄搗篩每服四錢水一盞煎至六分去滓不拘時候温服麥門冬湯出聖惠方治瘧病發熱煩躁體黄小便不利令人多驚如有見者麥門冬去心焙犀角屑杏仁湯浸去皮尖雙仁麩炒微黄常山剉甘草炙微赤剉各半兩糯米八十一粒右麄搗篩以水五盞煎至三盞去滓分為五服於發時煎温服之蜀漆湯治瘧發熱身黄小便不利蜀漆常山人參赤茯苓去黒皮桂去麄皮各一兩右麄搗每服三錢水一盞入生薑五片棗三枚擘破同煎至八分去滓温服不拘時候常山散治瘧病身黄小便不利常山鼈甲塗醋炙令黄去裙襴升麻赤茯苓去黒皮梔子仁人參各一兩右為散每服二錢温水調服不拘時分升麻丸治瘧病身黄發熱小便不利升麻二兩常山㯽榔各三分鼈甲塗醋炙令黄去裙襴知母生地黄各一兩半右剉如麻豆大每服五錢水一盞半入葱白三寸䜴三十粒同煎至八分去滓温服不拘時候常山散治瘧病頭痛發熱身黄色小便不利鼈甲去裙襴塗醋炙令黄甘草生用各一兩冬𤓰汁四合車前葉一握無葉收子二合常山半兩右麄搗篩漿水二盞并𤓰汁隔宿浸欲發日五更初以急火煎取一盞半去滓分為二服五更一服取抉吐三五度至發時又服亦取吐三五度過時便得喫漿水粥補之茯苓散治瘧病但熱不寒便身發黄小便澀滯赤茯苓去黒皮三兩桂去麄皮麻黄去節甘草炙剉各一兩右為散每服三錢新汲水調服不拘時候常山丸治瘟瘧發熱身靣皆黄小便不利常山赤茯苓去黒皮黄芩去黒心香豉炒乾二合右為末以粟米飲和丸如梧桐子大每服三十丸温酒下不拘時候茯苓湯治瘧病發病身黄小便不利赤茯苓去黑皮白芍藥瞿麥穗各一兩白术三分右麄搗篩每服五錢水一盞半入葱白五寸生薑一分拍碎同煎至七分去滓食前温服普濟方卷二百
