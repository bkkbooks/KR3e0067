body:
  text: 普濟方卷一百八十三明周王朱橚撰諸氣門上氣附論夫人一日一夜凡一萬三千五百息呼隨陽出氣於是升吸隨隂入氣於是降一升一降隂陽交通乃亨融所謂上氣者蓋氣上而不下升而不降否滿膈中胷背相引氣道逩迫喘急有聲者是也本於臟肺之虗復感風邪肺脹葉舉諸臓氣又上衝而壅遏此所以有上氣之候也方桔梗破氣丸出千金方治氣上下痞塞不能息桔梗橘皮乾薑厚朴枳實細辛葶藶各三兩吴茱茰白术各六兩胡椒蜀椒烏頭各七分蓽撥一錢人参桂心附子茯苓前胡防葵芎藭各五分甘草大黄㯽榔當歸各八分右為末煉蜜為丸如桐子大每服十丸酒下日三有熱者空服治上氣千金方硇砂細辛牛膝各等分右為末氣發酒服方寸匕後三日忌酒餘禁如藥法又方千金方上酥一升獨蒜頭五顆右先以酥煎蒜蒜黄出之用生薑汁一合共煎令熟空腹温服一方寸匕薑麥湯千金方治上氣短氣生薑五兩小麥一升右以水七升煮取汁一升頓服又方千金方卒得寒冷上氣方大棗二七枚紫蘇葉莖切一升右以酒三升煮取一升半分再服水煮亦得一方加橘皮半兩無􅀥奔氣湯千金方治大氣奔胷膈間諸病發時迫滿短氣不得臥劇者腹中溼冷溼氣腸鳴相逐成結氣半夏洗五錢吴茱茰炒五錢桂五錢人参甘草炙各三錢右㕮咀每服六錢水二盞生薑十片煎至六分去滓温服不拘時澤㯃湯聖濟緫録治上氣其脉沉者澤㯃三片細切以東流水五斗煮取一斗五升去滓澄清半夏五合生薑紫苑一作紫参白前各五兩黄芩甘草桂心人参右納澤㯃汁中煮取五升每服五合日三夜一麥門冬湯金匱方下氣上逆治大逆上氣咽喉不利麥門冬汁三升半夏一升粳米三合人参甘草各二兩大棗二十枚右以水一斗二升煮取六升去滓服半升日三夜一地黄煎聖濟緫録治上氣乏急生薑汁半升生地黄汁半升白蜜一升杏仁湯去皮尖雙仁炒二兩半研牛酥半升甘草炙剉一兩半貝母去心炒黄二兩紫蘇子研令細二兩赤茯苓去黒皮紫苑去苗土洗焙各一兩竹葉半升右先搗後五味為細末以水四升半煎取二升去滓入紫蘇子地黄汁生薑浄攄同白蜜牛酥銅器中重湯煎攪勿住手候如稀􅄳以乾器貯之含一時細細嚥汁常令喉中藥氣不絶白前湯聖濟緫録治上氣及諸氣逆白前去苗三分半夏湯浸去滑生薑汁製切紫苑去苗土焙乾二分麻黄去根節一兩厚朴去粗皮塗生薑汁炙三度焙乾人参各三分甘草炙剉半兩桂去粗皮杏仁湯去皮尖雙仁炒各三分右粗搗篩毎服五錢匕生薑半分拍碎􅀥二枚水二盞煎至一盞去滓温服日三欵冬花湯聖濟緫録治上氣咽中不利欵冬花去梗二兩麻黄去根節三兩五味子炒半夏湯洗去滑生薑汁製焙乾各二兩紫苑去土苗細辛去苗葉各一兩射干二兩右粗搗篩每服三錢生薑半分切棗一枚擘水一盞煎至七分去滓温服日三夜一沃雪湯聖濟緫録治上氣不得息咽喉不利以水二升五合先煮麥門冬生薑竹葉有一升五合内散二兩煎取一升二合去滓分二服平旦空肚服之日晩食消後服之不利每日加一劑忌油麫猪犬肉小荳粘滑酸醎海藻菘菜覆杯湯療上氣呼吸牽纒肩脇欲死麻黄去節四兩甘草炙乾薑桂心貝母各三兩右切以水八升煮取二升分再服則愈忌海藻生菜昔有人先有風患兼有因熱取冷當風飲酒房室體虗未春因天行病至氣中充尚虚有風熱未除兼藥石勢本過傷於胃氣因腹脹堅如石氣息不利因自下後變四肢浮腫逰走無定小便不通可服利藥忽吐逆不下飲食便噦至掣動百脉状如􅌵唏積日乃變上氣服此方加杏仁二兩與兩劑上氣得止厚朴湯療上氣煩悶嘔逆不得飲食厚朴三兩炙人参一兩半夏四兩洗生薑八兩茯苓甘草炙橘皮桂心各二兩枳實二兩炙右切以水八升煮取三升分三服忌海藻菘菜羊肉􅄳生葱醋貝母湯千金方治上氣咽喉窒塞短氣不得臥腰背痛胷滿不得食面色痿黄貝母一兩生薑五兩桂心麻黄石膏甘草各二兩杏仁三十枚半夏五合降氣湯治氣不下降大便不通加枳殻杏仁煎此藥流行肺氣方見脚氣門一切脚氣類附子養氣湯醫方大成治久病方愈氣上行脹滿痰吐稠粘服此能養脾氣療溼止嘔消化水穀進美飲食附子三兩泡製水浸削去皮臍切作片子人参切片白术紙裹煨切片白茯苓去皮各一兩木香半兩紙裹炮切右毎服四錢水一盞八分薑七片棗三枚煎七分去滓空心食前服清中湯十便良方治上氣虚壅精神倦怠頭目不爽菖蒲家生者刮去皮須切片米泔浸三復時漉去苦水秤八兩生薑五兩不去皮片子白术三兩甘草二兩白塩四兩炒與菖蒲生薑同淹一宿焙乾麻黄去根節二兩細辛去節葉一兩五味子㣲炒二兩桂去粗皮一兩半夏湯浸去滑生薑汁製焙乾二兩右粗搗篩毎服三錢水一盞半生薑一片􅀥一枚拍皮煎至七分去滓温服日三一方用乾薑一兩蘇子湯療上氣搶心胷奄奄不得息腹中脹滿食輙吐蘇子一升大棗三十顆擘半夏三兩洗橘皮生薑桂心各一兩蜀椒二分焙出汗右切以水七升煮取二升分三服忌羊肉湯半夏湯療上氣半夏洗茯苓各四兩橘皮白术各三兩生薑五兩檳榔十顆右切以水一斗漬一宿煮取二升七合分三服更加甘草三分人参二兩前胡三兩紫蘇一兩忌羊肉湯桃李雀肉醋物温中湯聖惠方療上氣喘急胷中滿咽喉不利氣逆搶心甘草二兩炙桂心生薑一片右切水七升半煎取三升分五服忌生葱海藻菘菜已試鯉魚湯一名杏仁散療上氣喘急胷中滿悶咽喉不利杏仁去兩仁皮尖貝母桂心各二兩橘皮人参甘草炙厚朴炙麻黄去節茯苓胡麻白前各二兩鯉魚五斤生薑六兩半夏五兩洗右切以水二斗煮魚得一斗二升去魚肉煎藥三升二合合分四分日三夜一忌海藻菘菜醋物羊肉湯葱等一方無貝母上氣二物散麻黄一斤去節杏仁一百枚去皮尖雙仁熬右藥各别搗合和細篩為散上氣發時服方寸匕可至三方寸匕以氣下為候不必常服柴胡五味湯療肺氣痰上氣氣急及欬柴胡五兩五味子橘皮紫苑貝母杏仁去皮尖兩仁者熬各三兩麻黄四兩去節甘草炙黄芩各三兩右細切搗極碎每服用麥門冬一兩去心生薑半兩竹葉一兩半右為細末毎服一錢㸃沸湯服不拘時療上氣急滿坐臥不安方右用鱉甲一大兩炙令黄細搗為散取燈心一握水二升煎取五合食前服一錢匕食後蜜水服一錢匕緑雲湯清上氣利頭目辟風邪新嫩栢葉一斤不用墳墓上土浄米泔浸七日如是沸湯内淖過亦得甘草四兩生薑半斤與栢葉同搗細曝或焙令乾右為細末每服一錢沸湯㸃服食後治上氣右以露蜂房水煮服之主上氣右以白前酒漬服之治下氣止煩滿右用舩版可作浴湯治下氣練五臓右以冬瓜煮食之治下氣清榖右以地門冬蒸若煮噉之百日則健壮兼倍駚扵术及黄精也亦作散并搗汁絞作液以服散尤益治下氣消榖去痰癖令人肥健右用蘿蔔作羮食之或炮煮和酥煎食之亦可一方生絞汁服理消渇卒上氣附論夫肺主於氣若肺氣虚實不倫或為風邪所乗則臓腑不利經絡痞澁不能宣和則卒上氣也又因有所怒則卒逆氣上衝甚則變嘔血為氣血傷也方麻黄散治卒上氣喘急氣奔欲絶麻黄二兩去根節甘草一兩炙㣲赤色桂心一兩馬兠鈴一兩杏仁一兩湯浸去皮尖雙仁麸㣲炒黄細辛一兩右為散每服五錢以水一大盞入生薑半分煎至五分去滓不拘時服五味子散治卒上氣奔喘五味子一兩麻黄二兩去根節甘草一兩炙㣲赤剉細辛一兩貝母一兩煨㣲黄右為散每服五錢以水一盞生薑半分煎至五分去滓不拘時温服青橘皮散治卒上氣胷中不利痰逆青橘皮一兩湯浸去白穣甘草半兩炙㣲赤剉訶黎勒皮一兩紫蘇莖葉二兩枇杷葉半兩去毛炙㣲黄右為散每服五錢生薑半分以水一盞煎至五分去滓不拘時温服細辛散治卒上氣心胷壅悶頭痛細辛半兩甘草半兩炒炙㣲赤剉人参一兩去蘆桂心三分半夏一兩湯洗七次去滑麻黄二兩去根節杏仁一兩湯浸去皮尖雙仁麩炒㣲黄前胡三分去蘆五味子一兩右為散每服五錢以水一盞生薑半分􅀥二枚煎至五分去滓不拘時温服治卒上氣喘急方杏仁一兩湯浸去皮尖雙仁麸炒㣲黄人参二兩去蘆頭陳橘皮二兩湯浸去白穣焙甘草一兩炙㣲赤剉淡竹枝梢二七莖長一握右為散分為十服每服以水一大盞入生薑半分煎至五分去滓不拘時候温服治卒上氣喘急腹痛乾薑一兩炮製五味子一兩木香一兩右為細散不計時候以煖酒送下二錢又方燈心木通一兩陳橘皮一兩湯浸去白穣焙右細剉以水二盞煎至一盞去滓下牛酥一分時時温服一合半夏蘇子湯治卒上氣胷心滿塞半夏五兩洗蘇子一升生薑五兩大􅀥四十枚劈橘皮桂心各二兩甘草二兩炙右切以水七升煮取二升七合分作三服氣即下忌海藻菘菜羊肉湯生葱竹篠下氣湯療卒上氣胷心滿生甘竹篠一虎口石膏一兩碎生薑橘皮各三兩甘草三兩炙右切以水七升煮竹篠取四升半去滓納諸藥煮取二升分二服此方療衝上氣不止者服兩三劑瘥忌海藻菘菜療卒上氣鳴息便欲絶方桑根白皮切三升生薑切半升吴茱茰半升右切以酒五升煮三服去滓浄令服之入口則愈又方麻黄去節甘草炙各三兩右切以水三升煮取一升半分三服一方用水八升煮取三升八合忌海藻菘菜瘥後欲令不發者更取二升并熬杏仁五十枚搗篩蜜為丸服四十丸每日三又療卒上氣不降抬肩息用乾薑三兩以酒一斗漬取一升日三服又方療卒上氣不降抬肩息麻黄二兩去節桂心甘草炙各一兩杏仁四十顆去皮尖兩仁者右切以水六升煮取二升分三服此方一名小投杯湯有氣痰者亦可為散若服之冷多加乾薑三兩有痰唾者加半夏三兩洗之忌海藻菘菜生葱投杯湯療疾病後暴上氣困篤石膏四兩碎甘草二兩炙五味子三兩大􅀥二十枚劈人参桂心半夏炙洗杏仁去皮尖各二兩麻黄三兩去節生薑四兩右切以水一斗煮取三升一服六合日三夜一忌羊肉湯海藻菘菜生葱等香蘇湯治下後煩氣暴上生蘇一把各用蘇子三兩香䜴五兩右以水五升煮取二升頓服治卒上氣鳴息便欲絶方茱茰二升生薑三兩右以水七升煮取二升分為三服治卒上氣喘急鳴息便欲絶本草右用人参末熟水調服方寸匕日五六服治卒上氣鳴息便欲絶出本草方見本門上氣喘息類一名韭汁飲治卒患食後氣不通出本草方以柰生搗汁服之久上氣附論夫肺主於氣通於呼吸而氣之行循環表裏流注經絡也若臓腑虚弱風冷之氣併上攻於肺肺氣不足邪之所乘積留日久不能宣通則胷中氣逆喘急不利此是久上氣也方麻黄散聖惠方治久上氣喘急坐臥不安麻黄去根節杏仁湯去皮尖雙仁麸炒㣲黄赤茯苓桑根白皮剉紫蘇莖葉陳皮湯去白焙甜葶藶隔紙炒紫色各一兩右為散每服五錢水一盞生薑半分煎至五分去滓温服不拘時如人行七里久服後葶藶丸葶藶丸用葶藶子六兩熬紫色搗如泥丸梧子大每食後􅀥湯飲下十丸日二服乾棗十枚劈碎水一升煮五合去滓服丸杏仁散聖惠方治久上氣胷中痰滯妨悶不能飲食杏仁湯去皮尖雙仁麸炒㣲黄麻黄去根節柴胡去苗各一兩木香半兩半夏二分湯洗七次去滑人参三分去蘆五味子一兩大腹皮三分枳殻半兩麸炒㣲黄去穰甜葶藶一兩紙炒紫色陳皮三分湯去白焙右為散每服五錢水一大盞生薑半分棗三枚煎至五分去滓温服不拘時赤茯苓散治久上氣心膈不利飲食全廢咳嗽不止赤茯苓一兩桂心半兩紫蘇莖葉二分陳皮三分湯去白穣焙