睡臥短氣出千金方陳皮一兩湯去白焙人参一兩去蘆五味子一兩紫蘇莖葉一兩右為散毎服五錢水一大盞棗三枚生薑半分煎至五分去滓温服日三四服一方無棗半夏丸一名鍾乳丸出聖惠方治上氣胷滿晝夜不得臥半夏湯洗去滑薑汁製焙乾芎藭各半兩附子炮製去皮臍半兩蜀椒去目及閉口者炒去汗一分貝母去心㣲炒桑根白皮剉炒欵冬花去枝梗焙細辛去苗葉各半兩紫苑去苗土焙一兩乾薑炮製半兩鍾乳研一兩杏仁湯去皮尖雙仁研細半兩右先将前十味搗羅為細末與鍾乳杏仁同研令匀煉蜜丸如梧桐子大毎服三丸至五丸粥飲下日三服不拘時候杏仁散出聖惠方治上氣喘急不得睡臥杏仁一兩湯去皮尖雙仁麸炒㣲黄甘草半兩炙㣲赤剉紫蘇子一兩㣲炒麻黄一兩去根節天門冬一兩陳橘皮三分去白焙五味子三分右為散毎服三錢水一大盞生薑半分棗三枚煎至五分去滓温服不計時候桂心丸出千金方治發熱氣上衝不得息欲死不得臥桂心半兩白石英麥門冬枳實白鮮皮貝母茯神㯽榔仁天門冬各二兩半人参車前子二兩前胡橘皮白薇杏仁各一兩半郁李仁三兩桃仁五分右為末蜜和丸如梧子大以竹葉飲服十丸日二加至三十丸為度竹葉飲出千金方竹葉紫蘇子各升紫苑白前各二兩百部甘草生薑各三分右㕮咀以水八升煮取三升温下藥盡更作蓽撥丸治上氣倚息不得臥蓽撥昆布洗炒乾吴茱茰湯洗焙㣲炒葶藶隔紙炒紫色杏仁湯去皮尖雙仁炒研細各一兩右先将前四味搗羅為末與杏仁同研令匀煉蜜和丸如梧子大空心服粥飲下五丸稍加至十丸治上氣急滿坐臥不得用鱉甲炙黄細搗為散燈心同煎食前服一錢食後蜜水下一錢三因神祕湯出永類鈴方治上氣喘急不得臥者净陳皮桔梗紫蘇人参五味子各等分右㕮咀四錢水煎服直指加㯽榔桑根白皮製半夏甘草薑五片煎治肺壅氣喘急不得臥葶藶子三兩炒大棗二十枚用水三升煮取二升汁右味将已炒葶藶子入煮棗汁一處再取一升去滓分作二服併服之瘥普濟方卷一百八十三
