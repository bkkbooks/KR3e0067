body:
  text: 普濟方卷二明周王朱橚撰方脉總論辨竒經八脉法脉有竒經八脉者何謂也曰有陽維有陰維有陽蹻有陰蹻有衝有督有任有帶之脉凢此八脉皆不拘於經故曰竒經八脉也經有十二絡有十五凡二十七氣相隨上下何獨不拘於經也曰聖人圖設溝渠通利水道以備不然天雨下降溝渠溢滿當此之時􅍂霈妄行聖人不能復圖此經脉滿溢經絡不能復拘也竒經者竒猶異也此之八脉與十二經不相拘制别道而行與正經有異故曰竒經其數有八故曰八脉也竒經八脉者既不拘於十二經皆何起何繫督脉者起於下極之前並於脊裏上至風府入屬腦夫督脉者陽脉之海督之言都也是人陽脉之都綱也人脉比於水故云陽脉之海此竒經之一脉也任脉者起於中極之下以上毛際循腹裏上關元至喉咽夫任者姙也此是人之生養之本故曰任脉中極之下長强之上也此奇經之二脈也衝脉者起於氣衝並陽明之經夾臍上行至胷中而散夫衝者陰脉之海也衝者通也言此脉下至於足上至於頭通受十二經之氣血故曰氣衝此竒經之三脉也帶脉者起於季脇迴身一周夫帶者言束也言總束諸脉使得調柔也季脇在肘下下接髖骨之間是也迴是繞也繞身一周猶如腰帶焉此竒經之四脉也陽蹻脉者起於跟中循外踝上行入風池夫蹻者㨗疾也言此脉是人行走之機要動足之所由也故曰蹻脉焉此竒經之五脉也陰蹻脉者亦起於跟中循内踝上行至咽喉交貫衝脉其陰蹻義與陽蹻同此竒經之六脉也陽維陰維者經絡於身溢稸不能環流溉灌諸經者也故陽維起於諸陽㑹也陰維起於諸陰交也夫維者維持之義也言此脉爲諸脉之綱維故曰維脉焉此是陰陽二脉是爲竒經之八脉也其受邪氣稸則腫熱砭射之也凡九州之内有十二經水以流洩地氣人有十二經脉以應之亦所以流灌身形猶若氣血以養生身故比之於溝渠竒經之爲病何如曰陽維維於陽陰維維於陰陰陽不能相維則悵然失志容貌不能自收持故悵然也其人驚驚即病維脉緩故令人不能自收持驚恐失志善忘恍惚也陽蹻爲病陰緩而陽急陽蹻在外踝病即其脉當從外踝已上急内踝已上緩也陰蹻爲病陽緩而陰急陰蹻在内踝病即其脉當從内踝已上急外踝已上緩也衝脉之爲病逆氣而裏急衝脉從關元至咽喉故其脉爲病逆氣而裏急也督脉之爲病脊强而厥督脉在脊病則其脉急故令脊强也任脉之爲病其肉苦結男子爲七疝女子爲瘕聚任脉起於胞門子戸故其病結爲七疝瘕聚也帶脉之爲病苦腹滿腰溶溶若坐水中帶脉者迴帶人之身體病即其脉緩故令腰溶溶也陽維爲病苦寒熱陰維爲病苦心痛陽為衛衛爲氣氣主肺故寒熱陰爲榮榮爲血血主心故痛此竒經八脉之爲病也又云衝脉者起於關元循腹裏直上至咽喉中任脉者起於胞門子户夾臍上行至胃中二本雖不同亦俱有所據並可依用寸口脉來大而漸小者陰絡也苦風痺癰時自發寸口脉來小而漸大者陽絡也苦皮膚滛痛汗出惡寒寸口脉來𦂳細而長至關者任脉也苦繞臍及横有痛診得任脉横寸口遲者苦胸中有氣上搶心不得俛仰拘急診得陽維浮者暫起即目眩陽氣盛實苦肩息洒洒如寒診得陰維沉大而實者苦胷中痛脇下支滿心痛也診得陰維如貫珠者男子兩脇實腰中痛女子陰中痛如有熱也診得帶脉左右繞臍腰脊痛連陰股也兩手脉浮陰陽皆盛實者此謂衝督之脉也衝督之脉者十二經之道路衝督用事者十二經不復朝見於寸口其人皆苦恍惚狂癡不定也兩手脉細㣲綿綿陰脉亦㣲細綿綿此爲陰蹻陽蹻之脉尺脉俱浮直下此爲督脉腰背强痛不得俛仰大人癩病小兒風癎也診得陽蹻病則急陰蹻病則緩尺寸牢直上下爲腫脉胷中有寒疝也六經本脉體六經所以分手足陰陽者以足爲本手爲標如足厥陰風木肝與足少陽相火膽爲表裏同在一處足太陰濕土脾與足陽明燥金胃足少陰君火腎與足太陽寒水膀胱皆相附近至於手三陰三陽相去頗逺葢足陰陽本乎地奠方有常手陰陽法乎天變化無定足爲常度手爲揆度體常盡變故爲竒度竒常揆度其道一也足厥陰肝脉在左關上弦細而長足少陰腎脉在左尺中沉濡而滑足太陰脾脉在右關上沉軟而緩足少陽膽脉在左關上弦大而浮足陽明胃脉在右關上浮長而濇足太陽膀胱脉在左尺中洪滑而長手厥陰心主包絡脉在右尺中浮弦而㣲手少陰心脉在左寸口洪而㣲實手太陽肺脉在右寸口濇短而浮手少陽三焦脉在右尺中洪散而急手陽明太腸脉在右寸口浮短而滑手太陽小腸脉在左寸口洪大而𦂳此手足陰陽六經脉體及其消息盈虚則化理不住運動宻移與天地參同彼春之煖爲夏之暑彼秋之忿爲冬之怒四變之動脉與之應者乃氣候之至脉也故要論云厥陰之至其脉弦一云沉短而數少陰之至其脉鈎一云𦂳細而㣲太陰之至其脉沉一云𦂳大而長少陽之至大而浮一名乍疎乍數乍短乍長陽明之至短而濇一云浮大而短太陽之至大而長本脉至脉雖識體狀又須推尋六氣交變南政北政司天在泉少陰之脉應與不應如要論所詮乙庚丙辛丁壬戊癸金木水火四運者皆曰北政少陰在泉故寸不應甲巳土運徳流四政譬如廵狩而居南面北謂之南政少陰在天故寸亦不應若北政厥陰在泉則右不應太陰在泉則左不應若南政厥陰司天則右不應太陽司天則左不應諸不應者反其診則見矣此乃常度合不應而反應是爲太過應而不應是爲不及皆爲外滛所因所以欲知少陰應否者以君火爲萬物資始不可不知此且以一歲而論之若細推尋當以日論精㣲之道不可不知若歲主藏害自當揆度平治六經中傷病脉左手關前一分爲人迎者以候寒暑燥濕風熱中傷於人其邪咸自脉絡而入以迎納之故曰人迎前哲方論謂太陽為諸陽主氣凡感外邪例自太陽始此考尋經似若不然風喜傷肝寒喜傷腎暑喜傷心包濕喜傷脾熱傷心燥傷肺以暑熱一氣燥濕同源故不别論以類推之風當自少陽入濕當自陽明入暑當自三焦入寒邪自太陽入故經曰陰為之主陽與之並别於陽者知病從來此之謂也足太陽傷寒生左手尺中與人迎皆浮𦂳而盛浮者足太陽脉也𦂳者傷寒脉也盛者病進也其証頭項強腰脊痛無汗惡寒不惡風足陽明傷濕右手關上與人迎皆濇細而長濇者足陽明脉也細者傷濕脉也長者病襲也其証關節疼痛重腫而弱小便澁秘大便飱泄足少陽傷風左手關上與人迎皆弦浮而散弦者足少陽脉也浮者傷風脉也散者病至也其証身熱惡風自汗項强筋滿手少陽傷暑右手尺中與人迎皆洪虚而數洪者手少陽脉也虚者傷暑也數者病增也其証身熱惡寒頭痛状如傷寒煩渴足太隂傷濕右手闗上與人迎皆濡細而沉濡者足太隂脉也細者濕脉也沉者病著也其証身重脚弱關節煩疼冷痺脹滿足少隂傷寒左尺中與人迎皆沉𦂳而數沉者足少隂脉也𦂳者寒脉也數者病傳也其證口燥舌乾而渴皆惡寒反熱倦怠足厥隂傷風左關上與人迎皆弦弱而急弦者足厥隂脉也弱者風脉也急者病變也其證自汗惡風而倦小腹急痛手厥隂心包傷暑左右尺中與人迎皆沉弱而緩沉者心包脉也弱者傷暑也緩者病倦也其證往來寒熱状如痎瘧煩渴眩暈背寒面垢此乃分布六經感傷外邪除燥熱外叙此二氣以爲宗兆若其傳變自當依六經别論所傷隨經説證施治或燥熱傷心肺當依經推明理例調治如四氣兼并六經交錯亦當隨其脉證審處别白或先或後或合或散在絡在經在表在裏四時之動脉與之應氣候以時自與脉期㣲妙在脉不可不察察之有紀從隂陽始始之有因從隂陽生此之謂也辨隂陽法脉有陰陽之法何謂也然呼出心與肺吸入腎與肝呼吸之間脾受味也其脉在中浮者陽也沉者陰也故曰陰陽心肺俱浮何以别之然浮而大散者心也浮而短濇者肺也腎肝俱沉何以别之然牢而長者肝也按之沉軟舉指來疾者腎也脾者中州故其脉在中是陰陽之脉也脉有陽盛陰虚陰盛陽虚何謂也然沉之損小浮之實大故曰陽盛陰虚浮之損小沉之實大故曰陰盛陽虚是虚實之意也陽脉見寸口浮而實大令輕手按之更減損小故曰陽虚重手按之反更實大故曰陽實也脉有一陰一陽一陰二陽一陰三陽有一陽一陰一陽二陰一陽三陰凡此六脉者謂浮沉長短滑濇也凡脉浮滑長者陽也沉濇短者陰也所言一陰一陽者謂脉來沉而滑也一陰二陽者謂脉來沉滑而長也一陰三陽者謂脉來浮滑而長時一沉也所言一陽一陰者謂脉來浮而濇也一陽二陰者謂脉來長而沉濇也一陽三陰者謂脉來沉濇而短時一浮也各以其經所在言病之逆順也浮大數動滑陽也沉濇弱絃㣲陰也長者為陽短者隂陽脉見陰脉者逆陰脉見陽脉者順闗前爲陽關後為陰陽數即吐陰㣲即下陽弦即頭痛陰弦即腹痛論五臟六腑部位脉法左手寸口者心與小腸脉之所出也心屬南方丙丁火夏旺七十二日其脉來洪大而長炎昇髙泛形若在膚之中象南方火位經曰夏日在膚泛泛乎萬物有餘而易取也自立夏之初四月陽明主氣候始入火位令其氣漸萌陰氣故脉雖浮大而㣲短也自仲夏之五月太陽旺火氣已盛脉上膚中輕手乃得其脉洪大而長也自夏至之後一陰生其脉來洪大而時滑也以迎陰氣而陽氣㣲下陰氣㣲上故卦乃天風姤是陰陽相接而運轉不離也至於季夏之月太陽旺而陽盛萬物長極陽氣有餘垂枝布葉皆下曲如鈎脉來疾而去遲其泛泛髙虚洪大而長也心脉來㣲洪或洪大而長者或累累如連珠之狀就手循琅玕者皆平脉也脉來喘連而手偃曲者胃氣少曰病脉來前曲後直者如操帶之鈎胃氣絶曰死又曰真心脉至堅摶如循薏苡累累然其面色赤黑不澤毛折者亦死心脉息數匀和而㣲洪長大者臟腑皆無病得本候也左手關上者肝與膽脉之所出也肝屬東方甲乙木春旺七十二日脉來弦長以象木形端直也經曰春應中規又曰春日浮之如魚逰在波雖出而未全見也立春之正月少陽王而萬物始生未有枝葉氣上㣲少故脉來乍數乍䟱乍短乍長欲暢未暢進退無常尚存隂氣至仲春之月少陽旺其陽旋昇枝葉漸長而脉濡弱而㣲長至季春之三月陽明旺其陽氣已昇陰氣漸伏草木稍長其脉來濡弱而弦長息數均匀皆平和之候也診脉來濡弱而弦長如揭竿之稍者曰平脉來盈實而滑如循長竿者胃氣少曰病脉來急益勁如張弓弦胃氣絶曰死矣左手尺中者腎與膀胱之所出也腎屬北方壬癸水冬旺七十二日其脉來沉濡而滑也沉者陰也滑者象北方水位也經曰冬應中權又曰冬脉在骨蟄蟲周宻君子在室故脉氣沉伏自立冬之初孟冬十月少陽旺陰氣方盛萬物收藏也水氷凝石伏行骨中脉當㣲沉而滑至仲冬十一月厥陰王而陰氣將極故言厥陰也自冬至之後一陽生故陰氣極而陽氣迎接故卦乃地雷復脉當沉短至季冬十二月厥陰旺陰氣有餘陽氣自子位交接漸有升發之意其氣出於骨外近肉有力脉當㣲浮滑而沉也其脉來濡弱喘喘累累如小而鈎曰平和之候脉來如引葛按之益𦂳胃氣少曰病脉來發於斷索劈劈如弹石胃氣絶曰死矣右手寸口者肺與大腸脉之所出也肺屬西方庚辛金秋旺七十二日秋脉毛而萬物蕭索草木凋落其脉如風吹羽以應西方金肅殺之象也經曰秋應中衡又曰秋日下膚秋初七月太隂乘夏之餘陽氣升而陰氣未盛其脉來𦂳大而長若仲秋八月太陰旺而陽氣漸降陰氣漸上萬物漸凋草木漸枯脉當輕虚而浮澁也至季秋九月少陰旺西方金陰極盛萬物所終草木皆凋落脉來似榆莢虚軟滑以近水位也凡息數均匀不大不小浮短濇者皆臟腑無疾脉來靄靄如車葢輕虚胃氣少曰病脉來蕭索如風吹毛羽紛紛散漫者胃氣絶曰死右手脉關上者脾與胃脉之所出也脾屬中央戊巳土以四時既旺十八日合七十二日應一歲三百六十之數脾者土也孤臟也其正旺於季夏脉應中短可平正之象也土能容納水糓變化津液溉灌肝心肺腎故脾胃之孤臟者以四時隨五脉之變其脉常得匀和緩慢之體應土位以存性厚重也故善不可得見惡乃見耳凡息數匀和脉來匀緩是謂脾胃安和之候又曰脉和柔相離如雞踐地緩息調和曰平脉如雀之啄如水之下漏皆肝腎乗胃則死腎來乘脾曰病又真藏脉至乍䟱乍數色黄青不澤毛折者乃死矣右手尺中者命門與三焦脉之所出也右腎也腎有兩枚左爲腎右爲命門者故男子以藏精女子以藏月水然命門雖屬水乃腎之餘氣非純水位也以肺之金藏引導氣血相生長養葢心主血血爲榮血潮肝流入腎肺主氣亦潮腎順則收血化爲精運入命門養於骨髓運真陽之氣上潮腦户故命門者接元陽正炁上通三焦與子午君火交泰之兆合心包絡通陰陽變化之道路應五臟六腑之根源非腎脉之司也葢命門中含真陽之氣常得陰中養陽之候然與腎旺七十二日故脉來大體不殊也冬沉濡而滑春弦滑夏洪滑秋㣲滑此謂平和之候亦應四時五行變化葢命門之根本也變化精氣長養育百骸溉灌腑臟無所不至而三焦之疾皆可見焉診四時脉及太過不及法春脉弦夏脉鈎秋脉毛冬脉石是主脉耶將病脉也然弦鈎毛石者四時之脉也春脉弦者肝東方木也萬物之始生未有枝葉故其脉之來濡弱而長故曰弦夏脉鈎者心南方火也萬物之所盛垂枝布葉皆下曲如鈎其脉來疾而去遲故曰鈎秋脉毛者肺西方金也萬物之所終草木花葉皆秋而落其枝獨在若毫毛也故其脉之來輕虚以浮故曰毛冬脉石者腎北方水位也萬物之所以藏也盛冬之時水凝如石故其脉之來沉濡而滑故曰石此四時之脉也如有變奈何然春脉弦反者爲病何謂反然氣來實强是謂太過病在外氣來虚㣲是謂不及病在内氣來厭厭聶聶如循榆葉曰平葢實而滑如循長竿曰病急而勁益强如新張弓弦曰死春脉㣲弦曰平弦多胃氣少曰病但弦無胃氣曰死春以胃氣為本夏脉鈎反者為病何謂反然氣來實强是謂太過病在外氣來虚㣲是謂不及病在内其脉來累累如環如循琅玕曰平來而益數如雞舉足者曰病前曲後直如操帶鈎曰死夏脉㣲鈎曰平鈎多胃氣少曰病但鈎無胃氣曰死夏以胃氣為本秋脉毛反者為病何謂反然氣來實强是謂太過病在外氣來虚㣲是謂不及病在内其脉來靄靄如車葢按之益大曰平不上不下如循雞羽曰病按之消索如風吹毛曰死秋脉㣲毛曰平毛多胃氣少曰病但毛無胃氣曰死秋胃氣為本冬脉石反者為病何謂反然氣來實强是謂太過病在外氣來虚微是謂不及病在内其脉來上大下鋭濡滑如雀之啄曰平啄啄連屬其中微曲曰病來如解索去如彈石曰死冬脉微石曰平石多胃氣少曰病但石無胃氣曰死冬以胃氣為本胃者水穀之海也主禀四時故皆以胃氣為本是謂四時之變病死生之要㑹也脾者中州也其平和不可得而見衰乃見爾來如雀啄如水下漏是脾衰見也五臟所屬左寸外以候心内以候膻中左關外以候肝内以候膈中左尺外以候腎内以候腹中右寸外以候肺内以候胷中右關外以候脾内以候胃脘右尺外以候心内以候腰五臟本脉體人之脉者乃氣之隧道也非氣使則不能行故血爲脉氣爲息脉息之名自是而分呼吸者氣之槖籥動應者血之波瀾其經以息寸度之計十六丈二尺一呼脉再動一吸脉再動呼吸定息脉五動閏以太息則六動一動一寸故一息脉行六動十息六尺百息六丈二百息十二丈七十息四丈二尺計二百七十息漏水下二刻脉行四丈二尺營周一身百刻之中得五十營故曰脉行陽二十五度行陰二十五度也息者以呼吸定之一日計一萬三千五百息呼吸進退既遲於脉故八息三分三毫三釐方行一寸八十三息三分三毫行一尺八百三十三息三分行一丈八千三百三十三息行十丈餘六丈二尺計五千六百一十七息通計一萬三千五百息方行盡十六丈二尺經絡氣周於一身一日一夜㑹於風府者是也脉屬陰陰行速猶太陰一月一周天息屬陽陽行遲猶太陽一歲一周天如是則應天常度故春肝脉弦細而長夏心脉浮大而洪長夏脾脉輭大而緩秋肺脉浮濇而短冬腎脉沉濡而滑各以其時而候旺相休囚脉息無不及太過之患故曰平人常氣禀於胃氣胃必以胃氣爲本取其資成也合本臟氣三分微似弦洪緩濇沉則爲平脉若真臟脉見則不佳矣五臟𫝊變病脉右手關前一分爲氣口者以候欝發與胃氣兼并過與不及乘尅傳變也内氣欝發食氣入胃滛精於脉自胃口出故候於氣口以五臟皆禀氣於胃胃者五臟之本臟氣不能自致於手太陰必因胃氣而致邪氣勝胃氣衰故病甚胃氣絶其臟獨見絶死假如春肝脉弦多胃少曰肝病但弦無胃氣曰死若其乘尅春雖有胃氣而有濇脉見則秋必病濇甚則今病夏心脉洪多胃少曰心病但洪無胃氣曰死如乘尅見微沉則冬病沉甚則今病秋肺脉濇多胃少曰肺病但濇無胃氣曰死秋見洪爲夏病洪甚爲今病冬腎脉沉多胃少曰腎病但沉無胃氣曰死冬見濡爲長夏病濡甚爲今病長夏脾脉濡多胃少曰脾病但濡無胃氣曰死長夏見弦脉為春病弦甚爲今病又如春肝脉合弦細而長太過則實强令人善怒忽忽眩冐癲疾不及則㣲虚令胷痛引背兩脇胠滿夏心脉合洪而㣲實太過則來去皆盛令人身熱膚痛爲浸滛不及則來不盛去反盛令人煩心上欬唾下氣泄秋肺脉合浮而短濇太過則中實傍虚令人逆氣背痛愠愠然不及則毛而微令人呼吸少氣上咯血下喘聲冬腎脉合沉而𦂳實太過則如彈石令人解㑊脊脉少腹痛不欲言不及則其去如數令人心懸如飢眇中青脊中痛少腹滿小便變長夏脾脉當沉而濡長太過則如水之流令人四肢不舉不及則如烏之啄令人九竅不通名曰重强太過不及脉之大要廹近而㣲不可失機又人之五臟配木火土金水以養魂神意魄志生怒喜思憂恐故因怒則魂門弛張木氣奮激肺金乘之脉必弦濇因喜則神廷融泄火氣赫曦腎水乘之脉必沈散因思則意舍不寧土氣凝結肝木乘之脉必弦弱因憂則魄户不閉金氣濇聚心火乘之脉必洪短因恐則志室不遂水氣旋却脾土乘之脉必沉緩此盖五情動不以正侮所不勝既不慕徳反謂能乗而勝之侮反受邪此之謂也其病有五五五二十五變若其能所傳授勝尅流變又當詳而論之故經曰五臟受氣於其能生傳之於其所勝氣舍於其所不勝如肝受氣於心傳於脾氣舍於腎至肺而死心受氣於脾傳於肺氣舍於肝至腎而死脾受氣於肺傳於腎氣舍於心至肝而死肺受氣於腎傳於肝氣舍於脾至心而死腎受氣於肝傳於心氣舍於肺至脾而死則知肝死於肺候於秋庚篤辛死餘皆倣此又如甲乙主寅夘丙丁主巳午庚辛主申酉癸壬主亥子戊巳主辰戌丑未一日一夜五分則可以占死者之早暮此病之資也然卒發者不必治於傳或其傳化不以次入者憂恐怒喜思令不得以其次故令人有大病矣此五臟傳變之大要也脉病名狀浮者按之不足舉之有餘與人迎相應則風寒在經與氣口相應則榮血虚損沉者舉之不足按之有餘與人迎相應則寒伏陰經與氣口相應則血凝腹藏遲者應動極緩按之久牢與人迎相應則温寒凝滯與氣口相應則虚冷沉積數者去來促急一息數至與人迎相應則氣躁熱煩與氣口相應則陰虚陽盛虚者遲大而軟按之豁然與人迎相應則經絡傷暑與氣口相應則榮衛走本實者按舉有力不疾不遲與人迎相應則風寒貫經與氣口相應則氣壅脉緩者浮大而軟去來㣲運與人迎相應則氣熱入臟與氣口相應則怒極傷筋𦂳者動轉無常如紐單線與人迎相應則經絡傷寒與氣口相應則臟腑作痛洪者來之至大去之且長與人迎相應則寒壅諸陽與氣口相應則氣攻百脉細者指下尋之來徃如線與人迎相應則諸經中濕與氣口相應則五臟凝涎滑者徃來流利有如貫珠與人迎相應則風痰潮溢與氣口相應則痰涎凝滯濇者參伍不調如雨霑沙與人迎相應則風濕寒痺與氣口相應則津汗血枯弦者端𦂳徑急如張弓弦與人迎相應則風走注痛與氣口相應則飲積溢疼弱者按之欲絶輕軟無力與人迎相應則風濕緩縱與氣口相應則筋絶痿弛結者徃來遲緩時止更來與人迎相應則陰散陽生與氣口相應則積阻氣節促者徃來急數時止復來與人迎相應則痰壅陽經與氣口相應則積留胃府芤者中空傍實如按慈葱與人迎相應則邪壅吐衂與氣口相應則榮虚妄行微者極細而軟似有若無與人迎相應則風暑自汗與氣口相應則㣲陽脱泄動者在關如豆厥厥不行與人迎相應則寒疼冷痛與氣口相應則心驚膽寒伏者沉隠不出着骨乃得與人迎相應則寒濕痼閉與氣口相應則凝思滯神長者徃來流利出於三關與人迎相應則㣲邪自愈與氣口相應則藏氣平治短者按舉似數不及本部與人迎相應則邪閉經脉與氣口相應則積遏藏氣濡者按之不見輕手乃得與人迎相應則寒濕散漫與氣口相應則飱泄緩弱革者沉伏實大如按鼓皮與人迎相應則中風着濕與氣口相應則半產脱精散者有陽無陰按之滿指與人迎相應則滛邪脱泄與氣口相應則精血敗耗代者藏絶中止餘藏代動無問内外所因得此必死分寸關尺三部脉位法經曰凡寸關尺者脉之要㑹也從關至尺是尺内陰之所至也從關至魚際是寸口内陽之所至也故分寸爲尺分尺爲寸陰得尺内一寸陽得寸内九分尺寸終始以一寸九分也夫人之三部寸口在上關脉在中尺脉在下經曰先言尺後言寸不從上而言反從下起者縁尺則是人性命之根本寸口者人身之本故有命然後有身所以先言尺澤在上葢取命之根本然後及於身而言之也凡十二經脉有病之時先於尺澤寸口見之故尺寸者是脉之㑹要也從闗至尺是尺内陰之所治者夫三部之脉取中而上下分之從關中至尺澤爲内是屬陰故言内隂之所治也言尺澤者尺脉一寸之外餘脉下入不見如入深澤而沉故曰尺澤也凡診者若寸口關脉不見唯尺脉在者其人必不死亦如樹之有根枝葉雖枯其根氣元活故寸關者枝葉也尺澤者根本也從關至魚際是寸口内陽之所治者夫自關而向上分之上至寸口故言關至魚際者是長骨後際如魚之頸際故曰魚際也言從關上至魚際下占一寸屬陽是内陽之所治也然寸口雖占一寸而脉見九分者言陽數竒陰數偶故也是以闗前屬陽故言九竒也關下屬陰故言寸偶也故分寸爲尺者關已上雖取一寸而脉見九分故曰分寸爲其先取一尺而言葢先從根本言之故一寸内取一尺而脉一寸内取九分而診之故言分寸爲尺從尺而取寸從寸而取分是也分尺作寸者從關已下至尺澤也葢取脉長一寸而診之其一寸之脉蓋先取一尺之分而其中除却九寸而更取一寸用之故言陰得尺内一寸陽得寸内九分從始至終寸尺位脉長一寸九分此則尺寸始終之法也凡寸後尺前両境之内生於關爲寸關尺也上部屬陽故法天下部屬陰故法地中部陰陽合故法人關者穿也言上可以穿其天下可以穿其地上下關通而取其中故言關也而分三部候天地人以法三才也凡古法定尺寸者皆先取一尺而言之從尺而取寸此則是其大綱也又凡脉長短不同其形各異又曰人長則脉長人短則脉短據此言之豈可執其一槩必在醫者以意審詳今則以魚際骨下為寸口位占九分更下行一寸爲尺部合成寸九分中間爲關部以安三指此之所定寸關尺蓋依黄帝難經永爲楷式不可改移辯九候法黄帝曰余閑九候於夫子衆多博大不可勝數余願聞要道以屬子孫傳之後世著之骨體藏之肝肺㰱血而受不敢忘洩令合天道必有終始上應天光星辰厯紀下副四將五行貴賤更立冬陽陰夏以人應之奈何岐伯曰天地之數始於一終於九焉一者天二者地三者人因而三之三三者九以應九野故人有三部有三候以决死生以處百病以調虚實而除邪疾帝曰何謂三部岐伯曰有下部有中部有上部部各有三三候者有天有地有人也必指而導之乃以爲真故下部之天以候肝地以候腎人以候脾帝曰中部之候奈何岐伯曰亦有天亦有地亦有人天以候肺地以候胷中之氣人以候心帝曰上部以何候之岐伯曰亦有天亦有地亦有人天以候頭角之氣人以候耳目之氣地以候口齒之氣三部各有天各有地各有人三而成天三而成地三而成人合而爲九九分爲九野爲九藏故神藏五形藏四合爲九藏五臟以敗其色必夭夭必死矣帝曰以候奈何岐伯曰必先度其形之肥痩以調其氣之虚實實則瀉之虚則補之必先去其血脉而後調之無問其病以平爲真帝曰决死生奈何岐伯曰形盛脉細少氣不足以息者危形瘦脉大胷中氣多者死形氣相得者生參伍不調者病三部九候皆相失者死上下左右之脉相應如參舂者病甚上下左右相失不可數者死中部之候雖獨調與衆相失者皆死也分别脉病形狀凡診脉視其人大小長短及性氣緩急之脉皆如其人形性則吉反之者則凶夫脉者血之府也長則氣理短則氣病數則心煩大則病進上盛則氣髙下盛則氣脹代則氣衰細則氣少短而急者病在上長而緩者病在下弦而沉者病在内浮而洪者病在外滑而㣲浮病在肺上𦂳下虚病在脾長而弦者病在肝脉少血少病在心大而𦂳者病在腎脉實者病在内脉虚者病在外浮而大者風浮而澁者氣沉細疾者熱遲𦂳者爲寒諸腑脉爲陽主熱諸臟脉爲陰主寒陽㣲則汗陰㣲則下陽數則口瘡陰數則惡寒陽芤則吐血陰芤則下血脉與肌肉相得久持之至者可下之弦小𦂳者可下之弦遲者宜温藥𦂳數者可發汗寸口脉浮大而病者名曰陽中之陽病苦煩滿身熱頭痛腹中熱寸口脉沉細者名曰陽中之陰病苦悲傷不樂惡聞人聲少氣時時汗出陰氣不通兩腎不舉尺脉沉細名曰隂中之陰苦兩脛痠痛不能久立陰氣衰小便餘瀝隂下濕痒尺寸脉牢而長關中無此為陰干陽苦兩脛重小腹引腰疼寸口脉壯大尺中無此爲陽干陰苦腰背痛陰中痛是脉浮而大爲陽干陽苦小腹痛滿不能溺溺即陰中痛大便亦然寸口脉𦂳者中風風攻頭痛夫瘧脉自弦弦數多熱弦遲多寒初持脉如躁之狀久久按之細而牢苦腰腹相引痛不能食足脛重脉來乍大乍小乍短乍長爲禍祟脉來但實者爲心勞脉來洪大嫋嫋者禍􅑂寸口脉弦中手短者頭痛脉來過寸口入魚際者遺尿脉來中手弦長者腰疼足脛痛脉來中手弦從上𦂳者肩背痛脉但數細心下熱盛脉盛滑𦂳者痛在外脉小實𦂳者痛在内脉小弱而浮滑久病脉濇浮而疾新病脉沉而弦者其人有痃腹内痛脉來緩滑者熱在胃中脉來盛𦂳者腹脹脉弦急疝瘕小腹痛脉出魚際逆氣喘急脉來伏者霍亂脉來弦急疾者癖病脉來大𦂳疾者癲病脉浮而緩皮膚不仁風寒入肌肉脉沉而𦂳下焦寒得冷即大小便痛脉來遲而澀胃中寒有癥結脉來駃而𦂳有積聚擊痛脉沉而細下焦寒小便數苦疞痛下重痢脉滑而浮散者有風脉短而滑者病酒脉𦂳而滑者吐逆脉遲而緩者脾胃有寒脉弦而鈎脇下如刀刺狀如飛脉沉而遲腹藏有冷病脉浮而細滑傷於寒飲脉沉而數其人中水冬時不治自愈脉滑者陽氣盛脉㣲而𦂳者有寒脉澀細而𦂳者痺病脉沉而滑爲下重背膂痛脉短而數心痛必煩脉𦂳而數寒熱俱發必當下之乃愈脉㣲弱者有寒少氣脉遲𦂳者胃中有寒若不能食時時利者當難治脉弦而𦂳脇下痛脉大細滑中有短氣脉㣲小者血氣俱少脉澀者少血多氣脉滑者多血少氣脉大者血氣俱多兩手脉前部陽絶者苦心下寒口中熱脉洪大𦂳急病在外苦頭痛發癰腫脉細小𦂳急病在中寒疝瘕積聚腹中痛脉浮大中風頭重鼻塞脉㣲浮秋吉冬病脉來疾者為熱遲者為寒濕爲鬼疰弦爲切痛脉沉重而直前絶者腹間血病在内脉沉重而中散者因寒食成癥脉沉而急病傷暑暴發虚熱脉來中散絶者病瘠渴脉沉重前不至寸口徘徊絶者在肌肉遁尸脉累累如貫珠不前主有風寒在大腸伏留不去脉來累累而止不至寸口軟者結熱在小腸膜中而伏留不去脉㣲即陽氣不足沾熱汗出凡無陽即厥無陰即嘔陽㣲不能呼陰㣲不能吸呼吸不足胷中氣促前大後小即頭痛目眩前小後大即胷滿短氣上部有脉下部無脉其人當吐不吐者死陽邪來見浮洪陰邪來見沉細水糓來見實堅浮而滑者宿食洪大傷寒熱病弦小者寒癖浮滑之脉速疾者食不消脾不磨也關脉𦂳而滑者蚘音回蟲也三部或至或不至冷氣在胃中故令脉不通也尺脉沉滑者寸白蟲也脉𦂳而急者爲遁尸脉𦂳而長過寸口者疰病關脉浮積聚熱在胃中尺脉浮者客熱在下焦諸浮諸𦂳諸弦諸沉諸澀諸滑若在寸口膈已上病若在關上胃已下病若在尺中腎已下病寸口脉沉胷中短氣若弦上寸口者宿食頭痛若有表無裏者邪之所止得鬼病何謂表裏寸尺爲表關上爲裏兩頭有脉關中絶不至也尺脉上不至關爲陰絶寸脉下不至關為陽絶隂絶與陽絶皆死不可治也評寸脉法寸口脉沉𦂳若心下有寒時痛即有積邪寸口脉偏絶則臂偏不遂其人両手俱絶者不可治寸口脉潎潎如魚上肥陽氣㣲寸口脉連連如蜘蛛絲陰氣衰寸口脉沉而𦂳病在中浮而盛病在外寸口脉沉而弱寒中疝瘕小腹痛寸口脉滑而遲不沉不浮不長不短者爲無病寸口脉大而滑沉即為血實滑即爲氣實血氣相搏入臟即死入腑自愈寸口脉弦而𦂳弦即衛氣不行惡寒水流走腸間寸口脉𦂳或浮膈上有寒肺下有水氣寸口脉沉滑者中有水氣血實目腫寸口脉雙弦兩脇下拘急而痛淅淅惡寒寸口脉浮而滑頭中痛寸口脉緩而遲緩即爲虚遲則爲寒虚寒相摶則欲溫食食冷即咽痛寸口脉遲而澀遲即爲寒澀爲少血寸口脉浮大按之反澀尺中亦㣲而澀故知有滯氣宿食寸口脉動而弱動即爲驚弱即為悸寸口脉㣲弱氣血俱虚男子即吐婦人即下血寸口脉浮中風發熱頭痛寸口脉𦂳傷寒頭痛寸口脉緩皮膚頑痺不仁風寒入肌肉寸口脉滑陽氣實胸中壅吐逆寸口脉弦心中愊愊㣲頭痛胃管痛心下有水氣寸口脉弱陽氣虚自汗出寸口脉澀是胃氣少虚竭不足寸口脉芤即吐血㣲芤者衂血寸口脉伏胷中逆氣噎塞不通是諸氣上衝胷中也寸口脉沉胸中引脇痛胸膈有水氣寸口脉軟弱汗自出是虚損病寸口脉遲上焦有寒寸口脉實上焦生熱評關脉法關脉時來時去乍大乍小乍䟱乍數者胃中寒熱羸弱不欲食如瘧狀關脉澀堅大實按之不减有力為中焦實有伏結在胃中關脉滑乍大乍小不匀必吐逆關脉浮大風在胃中張口肩息心下澹澹食即欲嘔關脉㣲浮有積熱在胃中嘔吐蚘音回蟲心神健忘關脉弦而長有痛如刀刺之狀在臍左右上下關脉浮氣虚腹滿不欲飲食關脉𦂳心下苦滿痛脉𦂳為實也關脉㣲胃中有冷氣心下拘急關脉數胃中有客熱關脉緩弱脾胃氣不足不能食關脉浮滑胃中有熱熱氣滿則不欲食食即吐逆闗脉弦胃中有虚冷氣心下厥逆關脉弱胃氣虚胸中有客熱脉弱為大虚小熱有熱不可大攻之熱去即寒生關脉澀血氣逆冷爲血虚也關脉芤大便下血關脉伏腹内有氣溏洩關脉洪胃中有熱必煩滿關脉沉心下有冷氣苦滿吞酸關脉軟苦虚冷脾氣弱重下痢關脉遲胃中有寒疾關脉實即脾胃氣塞熱盛腹滿評尺脉法尺脉弱下焦冷無陽氣尺脉牢小者足脛寒痿痺尺脉細溏洩下冷痢尺脉細而急者筋攣痺不能行尺脉大者熱在脬中小便赤痛尺脉按之不絶若與關脉相應和滑者男子氣血實婦人即為姙娠尺中來而斷絶者男子小腹有滯氣婦人月水不利尺脉浮下焦熱大小便難尺脉𦂳臍下及小腹結痛尺脉㣲厥逆小腹有寒氣尺脉數惡寒臍下熱痛小便赤黄尺脉緩脚軟下腫小便難有餘瀝尺脉滑血氣實經絡不利尺脉弦小腹疼腹中拘急尺脉澀足脛逆冷小便頻尺脉芤下焦虚小便脫血尺脉伏小腹痛寒疝瘕有水糓不化尺脉沉腰背痛尺脉軟脚弱風痺小便難尺脉遲下焦有寒尺脉𦂳臍下切痛尺脉㣲牢腰胯冷小腹痛小便不禁脉法讚肝心出左脾肺出右腎與命門具出尺部魂魄谷神皆見寸口左主司官右主司府左大順男右大順女關前一分人命之主左爲人迎右爲氣口神門决斷兩在關後人無二脉病死不愈諸經損减各隨其部三陰三陽一云按察陰陽誰先誰後陰病治官官臓内也陽病治府府臓外也竒邪所舍如何捕取審而知之鍼入病愈脉有三部陰陽相乗榮衛氣血而行人躬呼吸出入上下於中因息遊布津液流通隨時動作傚象形容春弦秋浮冬沉夏洪察色觀脉大小不同一時之間變無經常尺寸參差或短或長上下舉錯或存或亡病軟欲易進退低昻心迷易惑動失紀綱願為具陳令得分明師曰子之所問道之根源脉有三部尺寸及關榮衛流行不失衡銓腎沉心洪肺浮肝弦皆自常經不失銖分出入升降漏刻周旋水下二刻脉一周身旋復寸口虚實見焉變化相乗陰陽相干風則浮虚寒則𦂳弦沉潛水畜支飲急弦動弦為痛數洪熱煩設有不應知變所縁三部不同病各異端太過可怪不及亦然邪不空見終必有奸審察表裏三焦别分知邪所舍消息診㸔料度臟腑獨見若神普濟方卷二
