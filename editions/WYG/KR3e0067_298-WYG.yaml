body:
  text: 普濟方卷二百九十八明周王朱橚撰痔漏門牡痔附論夫内經謂飲食自倍腸胃乃腸因而飽筋脉横解腸澼為痔盖飽甚則腸胃滿膓胃滿則筋脉横解故澼而為痔其狀肛邉生䑕乳或痒或痛膿血時下謂之牡痔聖恵云痔肛邉生䑕乳者人臓腑空虚内有積熱不得宣洩流𫝊大腸之間結聚所成也此皆下元虚冷腎臓勞傷及風邪毒熱在内不散藴蓄日久因兹生疾亦由飲食不節醉飽無度恣食雞肉猪久坐濕地情慾盻着久忍大便是隂陽不和闗格壅塞風熱滯氣下衝肛腸故令腸頭生肉如䑕乳或似櫻桃或如大豆時時下血徃徃出膿亦曰牡痔也方皂莢丸出聖恵方治痔肛邉生䑕乳及大腸疼痛坐卧不得皂莢十梃不蚛肥長一尺者湯浸去皮塗酥炙令黄焦去子黄耆一兩剉枳殻一兩麩炒微黄麝香五錢細研入當歸一兩微剉桂心一兩槐耳一兩㣲炙槐子一兩㣲炒附子二兩炮製去皮臍白礬二兩五錢燒灰蝟皮一兩炙令焦黄烏蛇二兩酒浸去皮骨炙令㣲黄梹榔一兩鱉甲一兩塗醋炙令黄去裙襴川大黄一兩剉碎㣲炒右為末煉蜜丸和搗五七百杵丸如梧桐子大毎日空心及晚食前以温粥飲下三十丸鱉甲丸出聖濟總錄治牡痔肛邉生肉如䑕乳時出膿血鱉甲去裙襴醋炙生乾地黄焙黄連去鬚連翹蝟皮炙焦續斷剉附子炮製去臍槐實炒白礬熬令汁枯各一兩蠐螬炙五枚栝樓去皮黄耆乾姜炮各三分右為細末煉蜜丸梧桐子大毎服二十丸食前早晚米飲下取瘥為度治痔有乳結核作渇疼痛風盛熱實一名槐角子丸出本事方皂角醋炙黄耆荆芥川山甲灰炒木香露蜂房蝟皮鱉甲醋炙桔梗芍藥各二錢五分大黄五錢右為細末煉蜜為丸梧桐子大毎服三十丸温湯下食前日三服一方加槐子蝟皮丸出聖濟總錄治牡肛邉生䑕乳疼痛寒熱兼痔腸漏蝟皮炙焦槐木耳炙附子炮製去皮臍當歸剉炒赤芍藥桑根白皮剉白礬灰楮根白皮剉各一兩右為末煉蜜丸梧桐子大毎服三十丸食前粥飲下雷圓丸一名鶴虱丸治牡痔生䑕乳瘡方見本門痔瘻類槐子丸出聖濟總錄治牡痔因醉飽筋脉横解腸澼成痔毎下鮮血槐實㣲炒三兩蝟皮炙焦當歸切焙附子炮製去皮臍連翹乾薑炮續斷黄耆右為末煉蜜丸梧桐子大毎服十五丸空心米飲下日晚再服稍加至三十丸槐白皮膏出千金方治痔疾下部痒痛肛邉肉結如䑕乳腫硬疼痛宜用方見本門諸痔類槐皮膏一方有木鱉仁煮白丸一名玉屑丸治痔疾有頭生於肛邉如䑕乳及生瘡痛痒不止乳下膿血冷疼後重方見大腸門腸風下血類出聖恵方菩薩草三分黄連五分去鬚黄蘗三分剉膩粉一錢白礬五錢燒灰地龍三分㣲炒麝香三分剉右搗細末入膩粉麝香和匀先以鹽浆水洗痔後以散𫝊之日三四度用枳殻丸出聖濟總錄治牡痔肛邉生䑕乳出膿血枳殻去瓤麩炒防風酒浸一宿去火焙槐花麩炒荆芥穂薄荷甘草炙各五錢右為細末煉蜜丸梧桐子大毎服二十丸米飲下不拘時一日三服乳香散出王氏博濟方治牡痔生瘡乳香猪牙皂莢剉鯪鯉甲各二兩箬葉去頭麄鞭四兩剉黄牛角尖長二寸者一對剉蛇蜕一條頭尾全者右入在砂鑵子内盖口泥鹽固濟曬乾用十二斤炭火煆候碧烟出去火放冷取出細研毎服二錢七分胡桃一箇取肉細研拌藥空心酒調下喫五服見效天靈膏出聖濟總錄治牡痔有頭疼楚不可忍或有瘡漏濕天靈盖酥炙熏陸香各五錢葵根五錢李根葱根各一分細研麝香一錢研右為末猪脂或膠水調和如膏攤故紙上貼之一日三易瘥䔧盧膏出聖恵方治痔疾肛邉生䑕乳䔧盧五錢去蘆頭川大黄五錢剉碎黄連五錢去鬚剉楝子十四枚搗碎巴豆三枚去皮心研桃仁十四枚湯浸去皮尖雙仁右以猪脂五合煎二三十沸綿濾去滓放冷以塗痔上當歸餅出聖恵方治牡痔有頭痛楚不可忍當歸四兩杏仁去皮尖雙仁研五錢白芷桂心去麄皮各三兩雲䑓子研二兩右三味為末與杏仁雲臺子和匀以醋麵調捻作餅子似錢大坐之藥乾頻以易差可度治大腸久積風毒痔下血不止肛邉生䑕乳疼痛久不瘥出恵良方蝦蟇一枚櫸樹上菌子一箇鰻鯉魚頭一兩黄牛角腮一兩葫荽子一合右為細末水煎白膠香和丸如彈子大於瓶内如燒香法一丸熏下部差石榴散出聖恵總錄治牡痔肛邉生䑕乳醋石榴一枚大者黄連宣州者去鬚白礬熬各一兩穀精草五錢炒焦右先石榴割下盖子去裏面子三分取出一分次将黄連白礬同拍碎入在石榴内却用盖子掩定濕紙裹膠泥固濟炭火煆赤候冷去泥與榖精草同研極碎入麝香一錢七分空心熱酒調下荆槐散出聖濟總錄治䑕乳痔便血疼痛不可忍者荆芥穂槐花炒枳殻麩炒去穣黄連剉各等分右為細末毎服二錢七分米飲調下不拘時穿山甲散出直指方治痔肛邉生䑕乳或成瘡痛楚穿山甲㨂取後叚尾根盡處一兩炙焦存性鱉甲半兩酒炙挫麝香五分細研右為末毎服一錢五分用臘茶半匙夾和沸湯調下防風煎湯調下亦得留滓塗痔又方單用山甲一方無鱉甲黄耆湯下大豆帛方治痔下部痒痛肛邉生䑕乳腫脹突出方見本門脉痔類􅀥白皮散治牡痔有頭者或出似雞頭状漸作瘡有惡物不化􅀥白皮二兩細切酥五錢鯪鯉甲散治牡痔肛邉生鼠乳成瘡痛甚方見本門痔瘻類鱉甲散出聖恵方治牡痔肛邉生鼠乳氣壅疼痛鱉甲去裙襴醋炙三兩梹榔剉二兩右為細末毎服二錢七分食前粥飲調下葱桃湯出聖濟總錄葱根桃葉各一握右切搗以水三升煎數沸去滓入盆内乘洗日三兩度猪蹄灰丸治牡痔生䑕乳肛門痒痛難忍有膿血出不絶猪懸蹄殻熖火上燒灰研一兩水銀三大豆許右先取水銀用蒸􅀥二枚二次入蹄殻灰和為丸雞頭實大先以鹽湯洗下部内一丸夜卧時再用以差為度礬香膏出聖濟總錄治壯痔出膿血疼痛不可忍白礬五錢木香炮搗灰一分右用雞子白調成膏𫝊之槐子丸出聖恵方治痔疾䑕乳生肛邉煩熱疼痛槐子仁一兩㣲炒黄芩一兩右為細末水浸蒸餅和丸如梧桐子大毎食煎桑葉湯下二十丸虎骨膏出聖恵方治痔疾肛邉生䑕乳痒痛不可忍虎頭骨一兩炙令黄犀角屑一兩右為細末以猪蹄和為膏塗痔上日三五度用之馬蹄灰方出聖濟總錄治牡痔􅉶蟲右用馬蹄一兩燒灰研細末以猪脂調塗紙上内下部中日三五易即差治䑕乳痔出肘後方右用蒲黄末空心酒下方寸七日三服一方粥飲下一錢治䑕妳痔右用牛腮燒作灰空心酒服方寸七治痔疾肛邉生䑕乳痒痛不可忍者出聖恵方右用大鯉魚腸三條炙令香以紙裹一條更互熨下部中一炊久蟲當自出又方出聖恵方右用猪牙皂角莢一兩去皮炙令黄搗羅為末以猪脂和丸如棗核大上以赤錫裹一丸内入榖道當下積滯惡血有頭者自消矣又方出聖恵方右用蜘蛛絲纒繋痔䑕乳頭不􅁴自落赤小豆散治牡痔生䑕乳膿血出赤小豆一兩黄耆剉牡蠣粉赤芍藥白歛黄芩去黑心桂去麄皮附子炮製去皮臍各五錢右羅為散毎服三錢七分食前粥飲調下久者温酒調下牝痔附論夫牝痔者由大腸久虚為風熱留滯腸胃否澁津液不流邪熱之氣上攻肺臓下注肛腸不能宣散故成斯疾也此皆恣食生冷飲酒過度酒食之毒停滯臓腑𫝊流腸間故令下血生瘡腫疼故名牝痔也又名酒痔也方梹榔散出聖恵方治風氣稽留下部結成牝痔生瘡下血腫痛梹榔剉炒瞿麥穂澤㵼酒浸防風甜葶藶鬲紙炒各五錢藁本去苗土滑石椎碎各五錢木香芫花醋浸炒焦各一兩乾漆炒令煙半分陳橘皮湯浸去白炒郁李仁各五錢去皮右為細散每服一錢匕温酒調下不拘時日三地榆散出直指方治痔生瘡腫痛地榆黄耆枳殻檳榔川芎黄芩赤芍藥槐花羌活各五錢白歛蜂房炒焦甘草各一兩炙右剉毎服三錢水一盞半新米一撮煎服榼藤散出聖恵方治痔下血不止生瘡痛腫榼藤子一兩取仁槐子一合微炒龜甲一兩塗醋炙黄當歸三分剉微炒黄耆一兩剉川大黄一兩剉碎微炒露蜂房三錢微炒蛇脫皮一兩燒灰藁本五錢桂心五錢猪後懸蹄甲七枚炙令焦黄右為細末毎於食前以粥飲下二錢鱉甲散出聖恵方治痔下部生瘡腫下血不絶肚痛不止鱉甲一兩塗醋炙令黄去裙襴黄耆一兩剉枳殻一兩五錢麩炒微黄去瓤當歸一兩剉微黄桔梗三分微炒去蘆頭赤芍藥三分槐子二兩微炒桑皮一兩微炒生姜屑五錢焙乾右為細末毎於食前以粥飲調下二錢黄耆散出聖恵方治痔下部生瘡腫毒膿血不止黄耆二兩剉赤小豆一兩炒熟附子炮製一兩去皮臍白歛一兩桂心一兩赤芍藥三分槐木耳一兩微炒枳實一兩炒微黄黄芩三分右為細末毎於食前以温粥調下二錢大黄散出聖恵方治酒痔下血如肝肛邊生瘡疼痛因醉飽氣壅即發川大黄一兩剉碎㣲炒枳殻一兩麩炒微黄去瓤甘草五錢炙㣲赤剉生乾地黄一兩桑根白皮一兩黄耆一兩剉羚羊角屑一兩當歸一兩赤小豆花一兩右為散毎服四錢水一鍾煎至六分去滓不拘時温服黄耆丸出聖恵方治酒痔風熱壅滯大腸下血疼痛黄耆一兩剉蒺䔧子三分㣲炒去刺蝟皮一兩炙令黄枳殻二兩麩炒㣲黄去穰檳榔一兩烏蛻二兩酒浸去骨炙㣲黄川大黄三分剉碎㣲炒大麻仁一兩皂角莢子仁五錢炒黄右為細末煉蜜丸梧桐子大毎服食前桑根白皮湯下三十五丸赤小豆散出聖恵方治酒痔大腸中久積熱毒下血疼痛赤小豆一兩炒熱黄耆一兩剉白歛五錢桂心五錢赤芍藥五錢黄芩三分生地黄一兩當歸三分剉微炒右為細末毎於食前以槐子仁湯調下二錢露蜂房煎出聖濟總錄露蜂房槐皮各三兩棟實五十枚桃仁去皮尖雙仁五十枚白芷二兩猪脂一斤赤小豆搗碎一両右除猪脂外剉碎以醋拌一宿先熬脂令沸下調藥煎候芷赤黒色紙絞剉碎去滓磁瓦盒盛空心温酒調下一杯許晚再服再以紙裹似􅀥核大内下部中日二換即差地榆湯出聖恵方地榆剉黄耆細剉枳殻去穰麩炒梹榔剉當歸切焙黄芩去黒心赤芍藥各一兩右為麄末散毎服四錢七分水一鍾食前去滓温服艾葉散治痔下血方見本門諸痔類葛根湯出直指方治酒痔白乾葛枳殻炒半夏製茯苓生乾地黄杏仁各五錢黄芩甘草炙各一分右剉碎毎服三錢黒豆百粒薑五片白梅一箇煎服黄耆散出聖恵方治酒痔肛腸痛下血不止黄耆一兩剉赤芍藥枳殻一兩麩炒黄去瓤當歸一兩剉炒微黄槐子仁一兩微炒黄桑雞一兩煆炙白蛇一兩酒浸去皮骨塗醋炙令黄色右為末毎於食前煎黄耆湯調下二錢黄耆丸治牝痔下血下及治血痔黄耆細剉枳實去穣麩炒各三兩烏蛇酒浸炙去皮骨當歸切焙蝟皮炙焦赤石脂各二兩右細末煉蜜丸梧桐子大毎服二十丸空心酒下日二蝸牛散出聖恵方治痔生瘡腫痛下血不止蝸牛五枚炙令黄蠐螬三枚炙令黄螻蟈三枚炙令黄赤石脂一分白龍骨一分麝香細研一分右為細末毎服食前用粥飲調下一錢椿根散出聖恵方治牝痔下血不止疼痛大腸風冷殠椿根剉地榆剉黄耆剉伏龍肝研各一兩當歸切焙三分右為細末毎服食前以粥飲調下二錢七治酒痔肛邉生腫痛及下血不止鵝不食草五錢去泥焙乾雞冠花五錢微炙欝金五錢麝香五錢細研入當歸三分剉微炒右為細末毎於食前粥飲調下二錢黄耆丸出聖恵方治酒痔風熱壅滯大腸風冷下血疼痛黄耆一兩剉枳殻一兩去瓤麩炒微黄烏蛇二兩酒浸去皮骨塗酥炙微黄當歸一兩剉㣲黄皂莢刺一兩炙黄右為細末煉蜜丸梧桐子大毎服食前下二十丸皂角子散出聖恵方治牝痔下血日久不止皂莢子仁一百枚麩炒黄槐鵝炙牛角尖屑炙露蜂房炒各一兩右為細末