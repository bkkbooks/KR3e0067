蘭葉一兩椒末一錢鹽和麵四兩褁作燒餅煨熟空心喫不過兩三度又主胃反朝食暮吐暮食朝吐朝暮吐者青粱米煮甘蔗汁七升二味相和分為三服治咳逆出直指方右以蘇合香丸用丁香柿蒂煎湯調下噫逆胃寒所致也良薑為要藥人參白术佐之良薑温胃能解胃中風邪香飲子出經驗良方治咳逆不止用乾柿蒂十五枚為末水一盞加白鹽梅少許煎至六分服蓽澄茄散出危氏方療噫氣咳逆亦治傷寒咳逆日夜不定蓽澄茄良薑各二兩右為散每二錢水一盞煎六分沸投醋半盞取出呷之又方出聖恵方胡椒三十顆麝香一錢細研右搗破胡椒入麝香用酒一盞煎至半盞稍熱服治諸吃噫出肘後方用橘皮二兩湯浸去穰剉以水一升煎至五合通熱頓服更加枳殻一兩去穰炒同煎去渣服效柿蒂湯一名順氣湯出濟生方治胸滿咳逆不止亦治氣不順傷寒咳逆久痢柿蒂丁香各一兩右每服四錢水一盞半生薑五片煎至七分去渣熱服不拘時一方有甘草良薑一方人參湯一方無薑煎治胃冷欬癔氣厥不通出聖恵方丁香一分陳橘皮一兩湯浸去白穰焙右為粗散每服三錢水一盞煎至四分去渣不拘時熱服治氣逆欬癔不止出聖恵方呉茱茰半兩湯浸七次焙乾微研青橘皮半兩湯浸去白穰焙右為粗散每服三錢水一盞生薑半片煎至五分去渣不拘時熱服又方出聖恵方用木𤓰汁生薑汁等分勻温服一合又方出聖恵方用薄荷汁一合生蜜一錢和調服之桂苓五味湯出千金方治咳逆氣衝多唾口燥寸尺脉微手足厥逆氣從小腹上腫胸咽手足痺其靣翕熱如醉狀茯苓四兩桂枝四兩去皮甘草炙三兩五味子半升右四味以水八升煮取三升去渣分三服温服苓甘五味薑辛湯出千金方治咳逆胸滿衝氣即低而反更欬茯苓四兩甘草乾薑細辛各三兩五味子半斤右五味以水八升煮取三升去渣温服半升日三法導引法出養生方先以鼻内氣乃閉口還復以鼻内氣咳則愈向晨去枕正偃臥伸臂脛瞑目閉口無息極脹腹兩足再息頃間吸腹仰兩足倍拳欲自微息定腹為之春三夏五秋七冬九蕩滌五臟津潤六腑又云還向反望側望不息七通療咳逆胸中病寒熱欬逆上氣論夫五臟皆禀氣於肺肺感微寒成咳𠻳也寒搏於氣氣聚還肺則肺脹而為欬邪有動息邪動則氣奔逆上氣煩悶欲絶上則五臟傷動動於胃氣者胃氣逆而嘔吐也此肺是欬連滯氣動於胃而嘔吐者也有季夏脾王之時而脾氣虚不能王有寒氣傷之而咳𠻳者謂之脾咳其咳狀則又脇下痛陰陰引膊背甚不可動動則咳發脾與胃合脾欬不已則胃受之其狀欬𠻳而嘔嘔甚則長蟲出是也凡諸欬𠻳甚則嘔吐各隨證候知其腑臟也方鯉魚湯療欬逆上氣喉中不利生鯉魚一尾重十三斤熟艾二升白蜜一斤紫苑牡蠣各四兩熬欵冬花一升杏仁二十枚去皮尖雙仁䜴半斤射干二兩細辛三兩飴八兩菖蒲二兩右㕮咀和内鯉魚腹中置銅器中五斗米飯下蒸之藥成服一升日三夜一忌生菜羊肉餳等知母湯治咳𠻳痰喘氣促紫蘇連莖知母焙貝母去心欵冬花五味子人參桑白皮根剉各一兩厚朴去粗皮生薑汁炙甘草炙剉各半兩右為散每服三錢水一盞半入生薑三片煎七分去渣温服不拘時麻黄湯療卒欬逆上氣肩息晝夜不止欲絶麻黄去節細辛各二兩甘草半兩炙桃仁二十枚去皮尖雙仁研右切以水七升去渣分三服祕方忌海藻菘菜生菜治積年咳𠻳上氣多痰喘促膿血睡臥難禁出儒門事親用蘿蔔子一合研煎湯食前服或炒煉蜜作劑為丸服之殊效湯定欬逆上氣乾柿細切焙令焦黄乾薄荷葉陳橘皮去白焙各一兩右為散每服三錢水一盞煎至七分去渣温服日三杏仁煎療欬逆上氣杏仁一升去皮尖雙仁石斛乾薑各四兩桂心甘草炙麻黄去節各五兩五味子欵冬花紫苑各三兩右下篩以水一斗先煎麻黄取八升去滓内藥末膠飴半斤蜜一升調令相得未食服如棗大一枚日三服忌海藻菘菜救急療肺氣積聚心脇下滿急發即欬上氣麻黄三兩去節杏仁去雙仁皮尖柴胡生薑半夏洗十次葶藶子熬研如脂各四兩乾棗十二枚劈㯽榔十枚研子碎右切以水一斗煎取二升八合去渣分三服温服每服如人行八九里久七日忌食生冷猪魚羊肉此一方服劑訖將息滿七日則服後方忌羊肉餳等物又方茯苓乾紫蘇連莖橘皮麻黄各三兩柴胡杏仁去皮尖雙仁生薑各四兩右切以水一斗煮取二升七合去渣分温三服每服如人行八九里久禁酢物蒜熱麫猪肉五日服一劑治大小人咳逆上氣出肘後方用杏仁三升去皮尖炒令黄杵如膏蜜一升分為三分内杏仁杵令得所更内一分杵如膏又内一分杵熟止先食含之嚥汁療上氣咳𠻳嘔逆不下食氣上方橘皮紫苑各三兩人參茯苓柴胡杏仁去皮尖雙仁各二兩右切以水六升煮取二升分為三服患冷加生薑二兩熱加麥門冬三兩去心不能食加白术二兩厚朴二兩久忌醋物桃李雀肉等物一合湯療咳逆上氣脹滿息欲絶氣結於胸中心煩燥不安者芫花二分炒桂心乾薑各五分甘草炙細辛各四分蕘花二分右切以水三升煮取一升先食一合日三夜一又云合湯易得分六七服一日盡便愈一方有菖蒲四分無蕘花忌海藻菘菜生葱生菜等物消石丸療上氣咳逆口乾手足寒心煩滿積聚不和嘔逆若墜瘀血上氣胸膈脹滿少氣腸鳴食腸中裏急婦人乳飲滯下有邪濕陰不足大小便不利肢節皆痛消石一升乾薑前胡大黄各一斤杏仁一升去皮尖研右搗篩蜜和丸梧桐子大每服三丸日再五日後心服諸疾隨大小便去用經絶則通下長蟲數如亦利血及冷熱赤白帶癥瘕毒悉主之藥則以意消息蜀椒散療欬逆上氣腹中有堅痞往来熱令人羸痩不能飲食或時下利覺腹中如絞在臍上下闗疝氣上陽使然為病有氣通逆蜀椒五合去目并閉口炒出汗桂心甘草炙各二兩通草半夏洗各三兩右為散飲服方寸匕日三夜一為常藥中無毒忌海藻菘菜羊肉餳生葱紫蘇粥治上氣欬逆冷氣及腰脚中濕風結氣右將蘇子研汁煮粥良常服令人肥白身香和髙良薑橘皮等分蜜丸空心下十丸下一切宿冷氣及脚濕風皂莢丸治欬逆上氣時時唾濁但坐不得臥右用皂莢八兩為末蜜和丸如梧桐子大以棗膏和湯服三丸日三夜一必效方以酥炙皂莢治欬逆上氣以當歸飲飲之欬逆短氣論夫氣之在人得温則舒遇寒則澀肺主氣者也若為寒邪所傷則澀而不通故氣逆上行發為咳𠻳肺乃虚弱呼吸之間不能服息謂之欬逆短氣方人參丸治年深喘咳春秋發動痞滿痰涕如膠睡臥不寧人參一兩蛤蚧一對全者洗浄酥炙百部切紫苑去苖土一兩大黄剉炒半兩葶藶隔紙炒一分欵冬花百合貝母去心知母焙白前半夏湯洗十次焙桑根白皮炙剉五味子焙各三兩山芋三分右為末煉蜜和丸如梧桐子大每服二十丸糯米飲下橘皮湯亦可阿膠散治肺臟虚胸中短氣咳𠻳聲微四肢無力阿膠炒令燥山芋甘草炙剉麥門冬去心炒五味子炒人參各一兩乾薑半兩焙白术剉杏仁湯浸去皮尖雙仁㣲炒桂去粗皮各三兩右為散每服二錢用粥飲調下不拘時服前胡湯治逆氣咳𠻳胸中寒熱短氣不足前胡去蘆頭陳橘皮去白炒桂去粗皮甘草炙人參紫苑去苖土五味子炒各一兩右為散每服三錢生薑二片大棗一枚水一盞煎七分去渣温服潤肺湯治欬逆短氣人參生薑切與半夏同炒各一兩甘草三兩炙剉竹葉二兩陳橘皮去白焙二兩半夏湯浸七次切同生薑炒半兩右為散每服三錢水一盞半生薑五片煎至七分去渣温服日三夜一又方水六升煮取七升分三服亦治霍亂忌羊肉菘菜玉液飲治欬逆短氣喘息氣不相續甘草炙剉杏仁去皮尖雙仁研陳橘皮湯浸去白穰焙人參各一兩右為散每服五錢用水二盞生薑三片大棗一枚同煎至一盞去渣温服不拘時候羌活煮散止欬逆短氣羌活去蘆頭附子炮裂去皮臍蘹香子㣲炒各半兩木香乾薑炮各一錢右為散每服二錢水一盞鹽一捻同煎一二十沸乗熱服一服止欵肺湯治𠻳逆短氣人參半夏湯洗七次去滑炒乾各半兩陳皮去白焙二兩甘草炙剉一兩右為散每服三錢水一盞生薑三片煎至七分去渣温服日三紫蘇湯治欬逆短氣紫蘇莖剉一兩人參半兩右為散每服三錢水一盞煎至七分去渣温服日再治大人小兒欬逆短氣胸中吸吸咳出涕黏用淡竹瀝一合日三五服大人一升普濟方卷一百六十
