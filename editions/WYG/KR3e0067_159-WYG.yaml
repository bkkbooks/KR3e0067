body:
  text: 普濟方卷一百六十明周王朱橚撰咳𠻳門呷𠻳論夫氣者肺之所主肺虚為風冷搏則經絡否澁氣道不利𠻳而不作聲也此由肺氣不足上焦壅滯痰飲留結在於胸膊不能消散𠻳則氣動於肺上搏咽喉之間痰與氣相繫隨𠻳動息故呀呷有聲也宜調肺經和消痰破飲之劑方紫苑杏煎治肺臟氣積喉中呷𠻳不止皆因虚損肺臟致勞氣相侵或胃中冷膈上熱並服紫苑一兩半去苖土杏仁半升去皮尖雙仁别細研生薑汁三合地黄汁三合酥二兩蜜一升大棗肉半斤貝母去心三兩白茯苓去黑心五味子炒人參甘草炙剉桔梗剉炒地骨皮各一兩右搗八味為末調和自然汁并酥蜜杏仁等同於銅銀器中以文武火煎頻攪令勻煎百數沸成煎後在於甑上蒸三五遍每服食後服一匙頭便仰臥少𠻳時漸漸嚥夜再服射干丸治久𠻳喉中作聲發即偃臥不得射干一兩半夏洗十遍炒乾一兩一錢乾薑炮製皁莢去皮子炙欵冬花去蕚焙乾陳橘皮湯洗去白焙各一兩百部焙乾一兩一錢細辛去苖葉五味子揀浄各一兩一錢貝母去心炒令微黄白茯苓去黑心郁李仁湯浸去皮尖雙仁研如脂各一兩右細羅為末與郁李仁通研令勻煉蜜為丸如梧桐子大空心飲下七丸稍加至十五丸日再服芫根白皮丸治久患呷𠻳喉中作聲芫花根白皮剉碎炒乾半夏湯浸五遍炒乾射干百部五味子㨂浄各兩一錢乾薑炮製紫苑去苖土欵冬花去蕚白茯苓去黑皮皁莢酥炙去皮子細辛去苖葉貝母去心微炒各一兩右為細末煉蜜和丸如梧桐子大空心粥飲下三丸漸至五丸以知為度如㵼多用防風甘草湯解之前胡散出聖恵方治痰𠻳心中壅滯喉中作呀呷聲前胡三分去蘆木通三分剉半夏半兩湯浸七遍去滑紫苑半兩去苖土欵冬花半兩枳殻三兩炒杏仁三分湯浸去皮尖雙仁炒黄甘草半兩炙微赤剉桑白皮半兩剉右為散每服三錢以水一盞生薑半分煎至五分去渣不計時温服欵冬湯出聖恵方治肺感邪咳𠻳不已呀呷喘悶痰飲作聲胸膈痞滿不進飲食方見本門冷𠻳類欵冬花散赤茯苓丸治肺氣喉中作呀呷聲痰粘咳𠻳胸膈短氣脇肋堅脹赤茯苓三兩旋覆花半兩桔梗三分去蘆桑白皮一兩剉百合半兩杏仁一兩湯浸去皮尖雙仁麩炒研如膏熟地黄二兩甘草半兩炙微赤剉郁李仁三分湯浸去皮微炒右為細末煉蜜和丸如梧桐子大每服二十丸不計時候煎棗湯下天門冬丸出聖恵方治咳𠻳上氣喉中作呀呷及大小腸不利宜服天門冬一兩半去心焙木通一兩剉桑白皮一兩剉川大黄三兩剉碎微炒大黄仁一兩别研如膏杏仁三分湯浸去皮尖雙仁炒微黄郁李仁三分湯浸去皮炒紫苑三分去苖上右為細末煉蜜和搗二三百杵丸如梧桐子大煎桑枝湯下二十丸日三服黄耆丸治呷𠻳聲音不出喉中作聲黄耆剉碎􅌝􅌣根剉各一兩一錢甘草炙剉二兩大黄蒸過剉碎炒乾一兩杏仁湯浸去皮尖雙仁研如脂二兩馬牙硝熬研細一兩一錢右先搗前四味細羅為末與杏仁馬牙硝通研令勻煉蜜為丸如梧桐子大空心服飲水下十五丸日再香墨丸治呷𠻳食飲作聲墨燒煙盡甘草葶藶子炒紫各二兩前胡去蘆大黄剉炒各一兩一分巴豆去皮心炒另研如脂半兩右先搗前五味細羅為末與巴豆同研令勻煉蜜和丸如梧桐子大以白粳米飲下空腹服三丸三日以後更一服如吐痢不止以冷白飲之吐痢止後宜食白粥白龍丸治大人小兒上吐咳𠻳呀呷有聲痰涎痞滿半夏大者十枚湯浸去滑生薑汁製切焙搗末硇砂去石一錢細研巴豆八粒去皮心膜研不出油以上三味同棗肉和搜為劑外以生麫褁燒麫熟為度麫不用膩粉粉霜各一錢龍腦一字以上三味細研右同搗勻丸如麻子大每服五丸至七丸甘草湯下小兒一二丸白前散出聖恵方治咳𠻳坐卧不得喉中作呀呷聲白前一兩紫苑一兩去苖上半夏一兩湯洗七遍去滑大㦸一分剉碎麻黄一兩去根節甘草半兩炙剉炒微黄右為散每服二錢水一盞生薑半分煎至五分去滓不拘時温服杏仁丸治呷𠻳喉中作聲杏仁湯浸去皮尖雙仁炒乾研如脂一兩馬牙硝熬研碎半兩大黄蒸過剉碎炒乾半兩右先搗甘草大黄為末與杏仁馬牙硝通研令勻煉蜜為丸如梧桐子大每服十五丸空心温水下日再墜痰丸治痰𠻳止呀呷化風痰利咽膈白礬八兩於瓦器上枮過研細以紙裹埋黄土内一宿取出冄研入後藥槐花湯洗七遍焙乾以生薑汁和作餅子再焙乾秤二兩甘草一斤慢火炙剉右為末白麫和丸如梧桐子大每服十五丸食後生薑湯下雌黄丸治大人小兒呀呷𠻳雌黄半兩研丹砂鉛霜膩粉各一兩研右同研細糯米粥和丸菉豆大每服三丸用蛤粉湯下日三服胡黄連湯治呀呷𠻳胡黄連皂莢去皮塗酥炙令黄白㯽榔郁李仁湯浸去皮尖雙仁炒乾研如粉各一兩右粗篩每服三錢水一盞煎七分去渣不計時候温服桂心丸治咳𠻳喉中呀呷聲宜服桂心一兩不蚛皂莢五梃去黑皮塗酥炙焦去子􅌝􅌣一枚全者炙令乾甜葶藶一兩隔紙炒令紫色右為末煉蜜和丸如梧桐子大不計時候以粥下十五丸治咳𠻳喉中呀呷作聲積年不瘥者宜服此方出聖恵方鱟魚殻半兩猪牙皂莢一挺去黑皮塗酥炙焦黄去子貝母一兩炒微黄桔梗一分去蘆右為末煉蜜和丸如彈子大每含一丸嚥其汁服三丸即吐出涎便瘥訶梨勒丸出聖恵方治咳𠻳喉中呀呷作聲無問年月逺近悉治訶梨勒皮一兩黄連一兩去鬚露蜂房一兩炙黄右為末煉蜜和丸如梧桐子大每服三十丸不計時候以温水下又方出聖恵方治咳𠻳喘急喉中呀呷聲肥皂莢二挺㓠去黑皮好酥一兩右取肥皂莢以慢火上炙以酥細細塗之仍數翻覆以酥盡為度炙令焦黄搗羅為末煉蜜和丸如梧桐子大每服不計時候以温粥飲下十丸治咳𠻳喉中呀呷作聲積年不瘥者宜服此方右用水牛角尖以慢火炙令乾為散每服以茶清調下一錢五服愈又一方出聖恵方右用蟬殻七枚研末以粥飲調下一錢一方用井花水調服治久患呀呷咳𠻳喉中作聲不得眠出本草右用白前㨶為末温酒調二錢服五臟諸𠻳論夫肺氣之狀而喘急有音甚則唾血心欬之狀欬而心中介介心痛如骾甚則咽腫後癉肝欬之狀欬而兩脇下痛甚則不可以轉轉則兩脚下痞滿脾欬之狀欬而怯下痛陰引肩背甚則不可以動動則欬急腎欬之狀欬而腰背相引痛甚則咳涎五臟之欬久而不已乃𫝊六腑六腑之欬内經論之詳備方紫苑丸治肺唾血紫苑去苖土三兩蛤蚧一枚大者皂莢水浸一宿塗酥炙白茯苓去黑皮防風去义杏仁去皮尖雙仁蜜浸一宿炒各二兩麥門冬去心焙各一兩人參半兩甘草炙剉馬兜鈴炒各一兩黄耆細剉赤芍藥當歸剉焙貝母薑汁浸一宿焙棗四兩蒸熟去黒皮􅌝􅌣三十枚大者用肉研爛取汁龍腦研半字以上四味并研為膏白藥子半夏生薑汁浸一宿焙乾各半兩以上六味並為細末大麻子半升湯浸研爛去渣取汁右以前藥末入後膏内再搗和丸如梧桐子大煎麥門冬熟水下三十丸補肺湯出直指方治氣虚肺發之𠻳阿膠炒真蘇子桔梗半夏製甘草炙各半兩欵冬花紫苑細辛杏仁去皮尖陳皮桑白皮青皮去瓤宿砂仁五味子石菖蒲草菓各一分右為散每三錢薑四片紫蘇三葉煎服玉液散一名千緡湯出保命集方治肺𠻳痰唾半夏三兩大者洗浄去臍皂莢二十挺去皮子剉水一升同半夏煮至五升取出半夏薄切焙乾右只取半夏搗為散每服半錢水一盞薑一片煎四分食後温服一方二味於絹袋中盛水三升薑七片同煎至半揉取清汁食後分作三服效百部丸出指南方治肺𠻳惡熱百部八兩為末生地黄一斤取汁熬成膏右將地黄膏為丸如梧桐子大每服三十丸米飲下温酒亦可前胡湯治五臟諸𠻳前胡去蘆五味子生熟地黄焙半夏湯浸七次焙澤㵼各一兩貝母去心焙人參山芋白茯苓去黑皮白术杏仁湯浸去皮尖雙仁微炒麻黄不去節甘草炙剉葛根烏梅取肉各一兩右剉如麻豆每服三錢水二盞生薑五片煎至七分去渣食後臨臥温服去枕仰睡大阿膠丸出直指方治肺虛客熱咳𠻳氣息胸中煩悸肢體倦痛咽乾口燥渴欲飲冷多唾涎沫或有鮮血肌痩發熱少食思臥又或因呌怒或即房勞肺胃致傷吐血嘔血並宜服之麥門冬去心丹參貝母炒防風去蘆栢子仁茯神去木杜仲去粗皮炒百部根各半兩乾山藥阿膠炒茯苓去皮熟乾地黄五味子各一兩逺志人參各一兩右為細末煉蜜和丸每兩作二十四丸每服一丸水一盞煎至六分和查温服稍稍頻呷不拘時或金沸草湯加杜仲煎湯嚼下凡𠻳藥不效覺胸中腥悶乃宿血入肺黒豆入紫蘇生薑煎汁與之桑皮散出直指方治上焦有熱壅血腥悶𠻳聲連併氣不得透腦子北梗芎藭防風桑白皮黄芩北前胡柴胡紫蘇赤茯苓去皮枳殻製各一分甘草製一分半右剉細每服三錢薑棗煎或喫梨亦可一方無茯苓人參欵冬花膏出濟生拔粹方治脾胃虛寒久𠻳不已咽膈滿悶咳𠻳痰涎嘔迸惡心腹肋脹滿腰背倦痛或虚勞冷𠻳及逺年近日一切𠻳病諸藥不效者並治之欵冬花人參五味子八錢紫苑桑白皮各兩甜杏仁八分木香梹榔紫蘇子半夏湯洗各五錢右為細末煉蜜和丸如雞頭子大每服一丸食後細嚼淡薑湯下鍾乳補肺湯出醫方大成治肺氣不足年久咳𠻳上氣胸滿上邊咽喉閉塞短氣喘乏連唾不已寒送口中如含霜雪語不出聲甚則唾血腥臭乾嘔心煩耳間風雨聲皮毛瘁面色白漸成肺痿鍾乳碎如米粒桑白皮麥門冬去心各三兩白石英碎如米粒人參去蘆五味子欵冬花去梗肉桂去粗皮紫苑洗去土各一兩右除白石英鍾乳外同為粗末與白石英鍾乳同拌等分令勻每服四錢水二盞入生薑五片棗劈碎粳米三十餘粒同煎至一盞用綿濾去渣温服食後温肺湯出醫方大成治肺虚感冷咳𠻳吐痰沫半夏陳皮北五味子乾薑辣桂杏仁去皮尖各一兩細辛阿膠炒各半兩甘草二錢半炙右每服三錢薑棗煎服人參潤肺丸出醫方大成治肺氣不足咳𠻳喘急痰涎不痢胸膈煩悶涕唾稠粘唇乾口燥及療風壅痰實頭目昏眩精神不爽或肺胃俱虛久𠻳不已漸成虚勞肢體羸痩滿悶短氣行動喘乏飲食減少或逺年近日諸般咳𠻳並宜治之人參欵冬花去梗細辛去葉洗杏仁去皮尖㣲炒甘草炒各四兩知母六兩肉桂去粗皮桔梗各五兩右為細末煉蜜和丸如雞頭子大每服一丸食後細嚼淡薑湯下含化半夏橘皮湯治肺咳半夏湯洗十遍焙乾陳橘皮湯浸去白焙杏仁去皮尖雙仁㣲炒另研各一兩麻黄去根節赤茯苓去黑皮柴胡去苖各一兩生薑切焙甘草右為散每服三錢水一盞煎至六分去渣不拘時温服五靈脂湯治肺咳五靈脂一兩陳橘皮湯浸去白焙一兩甘草炙剉桑根白皮剉炒五味子杏仁湯浸去皮尖雙仁炒黄人參各半兩馬兜鈴一兩右為散每服一錢水一盞生薑五分同煎至六分去渣温服補肺湯出仁存方治肺氣不足逆滿上氣咽中悶塞短氣從背起口中如含霜雪言語失音甚則吐血五味子一兩乾薑桂心欵冬花各半兩麥門冬二兩粳米二合桑白皮四兩右每服三錢水一盞半棗子二箇粳米半撮煎至七分去渣服人參丸出濟生拔粹方治肺虚咳𠻳喘急胸膈痞痛脚膝微腫人參五錢半蛤蚧一對酥炙黄白牽牛炒甜葶藶炒木香苦葶藶炒各半兩梹榔五錢右為末用熟棗為丸如梧桐子大每服四十丸煎人參湯送下食後杏仁湯出指南方治肺寒咳𠻳杏仁炮去皮尖乾薑細辛甘草五味子各一兩桂半兩痰多加半夏右每服作三錢水一盞棗子一箇煎至七分去渣服食後如服熱作𠻳一時風熱在胸膈間所以作𠻳其證煩滿咽乾唾黄濁