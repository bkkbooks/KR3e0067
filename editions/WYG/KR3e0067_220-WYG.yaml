一兩炮製剉右為末用猪腎三對去脂膜薄切攤於紙上去血然後鋪一重腎著一重藥末以盡為度却以三五重濕紙裹煻火内燒待香熟取出去紙爛研若稍硬更㸃少許煉蜜和丸如桐子大每日空心以温酒下二十丸加至三十丸伏火太陽丹治一切冷氣硫黄十兩丹砂五兩右合研極細水飛過針砂二十五兩水淘净都入三斗頭鐵鍋内用水常及七分以來煑七伏時湯耗旋添熱湯頻以連皮東南栁條子攪轉如著條子上逐旋以桑白皮刮下却入鍋中候日數足取許於火上燒無鬼焰為度若有焰即更煑直候無焰住火再用水飛澄去鐵砂不用将丹砂硫黄鍋内慢火泣盡水脈團成塊安在鐵器中用炭火一稱以上團旋煆成汁候火盡停冷取藥以紙五七重裹掘地坑埋一宿取出細研用燈心煑棗剥取肉和丸如桐子大每服二丸至三丸空心温水或温酒下二石丸治脾腎久虚臍腹痼疾目暗耳焦身重足痛行步艱腿膝無力補丹田壯筋骨磁石二兩炭煆醋淬七次硇砂半兩右搥碎入砂合子内鹽泥固濟木炭火燒令通赤候冷取出細研以煑羊腎一對細爛研取汁入少麵為糊和丸如桐子大隂乾每服三十丸空心食前鹽湯下黒錫丸出本草方治虚心久冷黒鉛硫黄各三兩同炒舶上茴香附子葫蘆巴破故紙川楝肉肉豆䓻巴㦸木香沈香各半兩右将砂子細研餘藥末研匀入碾自朝至夕以黒光色為度酒糊丸如桐子大隂乾布袋内絞令光瑩如丈夫元臟虚冷真陽不固三焦不和上熱下冷夜夢鬼交覺來時汗流滿面肌體燥澁耳内虚鳴腰背疼痛心氣虚乏精神不寧飲食無味日漸羸痩並膀胱久冷夜多小便婦人月事愆期血海久冷惡露不止赤白帶下及隂毒傷寒面青舌卷隂縮難言四肢厥冷不省人事急用棗湯吞一二百粒即便回陽命無不活但是一切冷疾鹽酒湯下空心吞下三四十丸婦人艾醋湯下此藥大能調治榮衛升降隂陽安和五臟灑陳六腑補益虚損回陽反隂功効神聖麋角丸出聖恵方治久積虚冷補煖下元温中治氣麋角屑三兩酥拌炒微黄蓯蓉二兩酒浸一宿去皮炙乾補骨脂二兩微炒附子炮製去皮臍巴㦸各二兩木香桂心龍骨蘹香子一兩硫黄一兩細研水飛過右為末入硫黄同研令匀煉蜜和搗三二百杵丸如桐子大每日空心以鹽湯下三十丸附子丸治元氣虚冷婦人赤白帶下血海諸冷附子一兩炮製去皮臍硇砂右搗研為末酒煑糊為丸桐子大每服三十丸男子鹽湯婦人醋湯下空心服附子丸出十便良方補煖下元附子半斤生用硫黄二兩細研水飛過右以新汲水浸附子七伏時每一伏時換水一遍並不令見日氣日數足隂乾去皮臍搗羅為末入硫黄攪令匀以羊腎三對去筋膜研以酒三升煑令稠和末看硬軟得所三五百杵丸如桐子大每日空心以鹽湯下二十丸附子煎方出傳信適用方治虚冷用生附一箇重九錢以上者生去皮臍切片搥碎亦得用水三大盞入晉棗十枚生薑切二兩以炭火銀石器煎别用水一盞遇沸即以水旋㸃之㸃盡水煎至一大盞為度取滓再用水二盞煎至一盞並用沈香磨一錢青鹽一錢再煎沸即止放温分作二服畢以蒸餅壓之再温第二服用重湯不可再煎也補真丹出宣明論治男子元臟虚冷興陽助腎不燥黒附子一兩炮陽起石酒蘸燒灰三錢海馬二對乳香雌黄為衣血竭各三錢石連子半兩擗去心皮黒錫炒去沙子半兩石燕子一對入鍋内燒紅用鹽泥固濟麝香一分右為末麵糊丸每服二十丸用五香湯下五香湯出宣明論沈香箋香乳香麝香檀香各等分右為末每服半錢煎湯下十補丸出楊氏家藏方治元臟虚冷臍腹刺痛脇肋脹滿泄痢腸鳴困倦力竭小腸氣痛等疾並皆治之延胡索炒葫蘆巴炒蓽澄茄茴香木香補骨脂炒巴㦸去心蓯蓉酒浸一宿切焙川楝子炒以上各一兩九味附子炮去皮臍半兩右件並為細末麵糊為丸如桐子大每服五十丸以硃砂為衣温酒鹽湯任下空心食前白澤丸治臟腑虚冷真元不固腸鳴泄痢心腹撮疼氣逆嘔吐自汗無時陽起石一兩半撮令通赤研附子炮去皮臍取末一兩半鍾乳粉煉成好者二兩白檀香滴乳粉麝香一錢另研右件和匀滴水成劑分作六十丸每服一丸一盞水化開生薑三片煎至七分通口温服空心食前黒錫丹治上實下虚真元衰憊陽氣耗損隂氣獨盛氣喘促泄㵼嘔逆自汗心忡小便頻數一切虚寒並皆治之黒錫四兩新銚中以火熔開用香撥去錫滓入硫黄半兩用炒過取出煨為細末秤二兩别入硫黄末二兩二味和入銚中煉成汁取下銚候冷再見火如此三次令研為末舶上茴香畧炒附子炮去皮臍川楝子肉炒破故紙炒肉豆䓻麵裹煨木香略炒以上六味各一兩右為細末却将黒錫末一處和匀酒煑糊為丸如桐子大每服五十丸病勢重加一百丸空心食前米飲送下服畢少乾物壓之鍾乳石丸治臟寒腹痛下痢不禁鍾乳粉煉成者半兩硫黄半兩另研白礬一分火飛陽起石一分另研右為細末煑糊丸如小豆大每服十丸粟米飲下空心食前下固本丹治男子一切虚損衰弱夜夢顛倒遺精并小便白濁婦人血海久冷崩中帶下久無子息皆可治之牡蠣白者生為細末别用好醋和為丸子入火燒令通赤放冷秤四兩白石脂二兩硫黄一兩半陽起石一兩右件同研為末丹煑湯和丸如桐子大隂乾入合子内以赤石脂封口外用鹽泥固濟候乾煆令鬼烟絶埋黄土内出火毒參時辰取出每服五十丸温酒或米飲空心送下艾硫丸去邪養正補真益脾治髓冷血虚腰痛脚弱傷冷心腹疼痛霍亂吐利自汗氣急下元久虚小便數婦人衝任不足月水愆期腹肋刺痛崩漏帶下不思食兼治傷寒隂証手足厥冷脈微自汗熟艾十兩用水一升煎成膏子將膏子塗艾上令匀日中晒乾乾薑十兩炮生硫黄别研細生二兩附子炮去皮臍右件為末麵糊和丸如桐子大每服三十丸至五十丸温米飲下食前服硫黄熨法治臟腑虚冷吐利不止及陽虚隂盛真氣脱弱欲炙不能勝火力者冝用此法硫黄萆麻子七枚去皮細研右件同研令細每用藥二三錢填在心臍用令滿以衣被盖定用熨斗入文武火慢慢熨之白日須是熨半日夜間熨半夜儘多時為妙茴香丸補下元虚憊面色黧黒能除一切寒冷及小腸尿白脬寒附子二箇重六錢如法炮製去皮臍葫蘆巴洗淘净白茯苓去皮安息香酒洗化下滓酒浸作糊丸藥如無安息香以鹿茸代茸以酒洗浸炙黄桃仁麩炒去皮蓯蓉酒浸切焙木香以上各二兩麝香一錢入麝與茸謂之香茸丸去麝與茸及安息香謂之安息丸右為細末酒糊為丸如桐子大每服三十丸空心食前鹽湯送下腽肭臍丸治五勞七傷真陽衰憊臍腹冷疼肢體痠疼腰背拘急脚膝緩弱面色黧黒肌肉消瘦目眩耳鳴口苦舌乾飲食無味腹中虚鳴肋下刺痛心腹慘慽夜多異夢日少精神小便滑數大便溏泄時有遺瀝陽事不舉但是風冷濕氣皆可服之腽肭臍一對用酒蒸熟打和後藥天雄炮去皮附子炮去皮臍川烏炮去皮臍陽起石煆鍾乳粉各二兩人參硃砂研極細沈香不見火别研鹿茸酒浸各一兩右為細末用肭臍膏子入少酒糊入臼内杵和為丸桐子大每服七十丸空心用温酒鹽湯任下魏將仕青蛾丸方序云舶上故紙人呼為補骨脂亦名姿固脂也温精髓補勞傷夜白泄腹冷洞㵼却令腰疼飲食少味行步無力能補五臟去百病益肌膚壯筋骨活血駐顔黒髭烏髮予年過八十出宦南海忽忽不樂况越俗卑濕寒燥不常痛傷内外陽道痿絶鍾乳硫黄一二十方皆不効有舟人李摩阿來受予此方服之七日强氣壯陽道微動半月以來意充力足目明心悅神効不可具述故錄以傳元和十三年二月十日嶺南節度使鄭佃詩云晩年持節向番禺人事兼加並劣疎收得風光歸掌内青蛾不笑白髭鬚破故紙六兩淘洗净者焙乾隔紙炒香為末用胡桃穰四兩湯浸去膜研如泥右件和煉蜜丸如桐子大每服三十丸温酒鹽湯下空心臨卧漸加至五十丸食猪羊腰子以助藥力似覺水甜食美有効禁食芸薹菜羊血惡甘草或研如泥和蜜甆器内以熟水或酒調服便以飯壓之為妙一方加杜仲四兩剉如骰子大麩炒黄色治腎虚腰疼秘精益陽老者服之還童少年服之行步如飛一方入生薑十兩炒風科集驗方正氣丹出十便良方治隂寒内盛元臟不足陽氣衰下元傷竭手足厥逆戰栗背寒膝冷臍腹疼痛大便滑泄小便數行步思短色澤枯瘁嘔逆喘急咳逆自汗霍亂轉筋寒疝傷寒隂盛脈微欲絶温固精氣大益脾胃硫黄附子乾薑桂各等分右為細末水煑麵糊和丸如桐子大每服三十丸食前温米飲下山茱萸湯出十便方東莎劉先生溉固足經益陽火玉抱肚法茱萸吳茱萸各四兩胡椒二兩蛇床子生二兩大川烏頭一兩高良薑一兩生以上六味為粗末以好酒拌匀不可大濕裹一伏時慢火炒令乾不得有烟取出放冷牡蠣十兩乾薑香白芷浮萍草隂乾各二兩右十味為粗末每服水二盞以来秤藥一兩煎五七沸去滓盛盆内以氣薫足候通手淋洗如冷再煖亦得凡淋浴了著襪卧為佳若小浴尤佳若浴坐湯中須用水五斗藥末二兩半煎十餘沸通手及可坐之如冷再煖之以手淋腎腧愈妙淋了便須熱寢勿得見風五七日一淋效不可具述若卧覺腰􅂰微出汗尤竒須飽食可浴補虚冷消食出本草以莎木皮中麵作餅食之或作飯餌之朝真丹出本草治風虚傷寒冷暴作水㵼日夜數十行腹痛不止夏月路行憊急硫黄二兩牛角研令極細枯白礬半兩研細末右匀水浸蒸餅去水脈了和丸如桐子大硃砂為衣每服十五丸至二十丸温米飲下鹽湯亦可治虛冷短氣右用川椒三兩去目合口者以生絹袋盛用無灰酒五升浸經三日後隨性飲之普濟方卷二百二十
