body:
  text: 普濟方卷二百二十明周王朱橚撰諸虛門補虚壯筋骨附論夫人之有身不自愛惜竭精縱慾遂至勞傷筋骨肝腎虚弱精氣不足則骨髓枯竭形體消痩氣血既虚則百病斯作故為虚損也腎主骨肝主筋補肝養腎使精血氣實則所以筋骨自壯也方鹿茸丸補暖下元强筋骨益精髓壯腰膝祛風利氣美顔色鹿茸一兩去毛酥炙微黄蓯蓉一兩酒浸一宿去粗皮炙乾兎絲子一兩酒浸三宿曬乾别搗為末巴㦸一兩桂心人參去蘆白茯神五味子萆薢剉黄芪剉續斷逺志木香薯蕷澤㵼熟地黄石斛去根剉覆盆子蛇床子各一兩天雄白茯苓附子炮製去皮臍栢子仁牡丹防風去蘆各半兩右為末煉蜜和搗三五百杵丸如桐子大每日空心温酒並鹽湯下三十丸加至五十丸何首烏丸治風和血壯筋骨潤肌體何首烏一斤米泔浸一宿用竹刀切去皮切作片子焙乾赤芍藥牛膝去苗用醇酒浸一宿切焙乾熟地黄焙乾各四兩右木臼中搗羅為末以酒煑麵糊丸如桐子大每服三十丸空心温酒或米飲下四生丸壯元氣治一切筋骨疼痛萆薢防風去义狗脊去毛烏頭去皮臍生用右等分先以河水浸烏頭七日夜切作片每烏頭一兩用鹽半兩同炒黄次與諸藥同搗羅取細末用米醋麵糊丸如桐子大每日空心十丸漸加至三十丸温酒或鹽湯下肉蓯蓉丸出聖惠方暖水臟壯筋骨益精氣利腰脚明耳目强志力悦澤顔色充益肌膚肉蓯蓉二兩酒浸一宿刮去皮炙乾令乾末附子一兩炮製去皮臍巴㦸天一兩蘹香子一兩石斛一兩去根剉補骨脂一兩川椒三分去目及閉口者微炒出汗用佳桂心一兩鹿茸一兩去毛酥炙黄木香三分牛膝去苗一兩丁香三分五味子一兩澤㵼㯽榔一兩黄芪三分剉白术三分熟乾地黄一兩人參三分去蘆訶梨勒皮三分山茱萸三分乾薑三分炮製剉硃砂一兩細研水飛過麝香半兩細研右為末研令匀煉蜜和搗一千杵丸如桐子大每日空心以温酒下三十丸松枝丸出聖惠方治風冷强筋骨補五臟除風濕久服輕身能延年益氣補諸不足松枝三兩煉成者松花二兩白茯苓二兩菖蒲一兩桂心一兩生乾地黄二兩薯蕷一兩逺志一兩去心鹿角膠一兩搗碎炒令黄燥牛膝一兩去苗甘草一兩炙微赤剉㯽榔一兩肉蓯蓉一兩酒浸一宿刮去皮炙令乾兎絲子一兩酒浸三日曬乾别搗為末鹿茸一兩去毛炙微黄右為末煉蜜為丸和搗三五百杵丸如桐子大毎日空心以温酒下三十丸漸加至四十丸椒紅丸壯筋骨益血脈悦顔色蜀椒去目閉口者炒出汗取紅三兩牛膝去苗酒浸三宿洗暴乾四兩附子二兩泡製去皮臍桂心一兩巴㦸一兩生地黄五兩取汁􅆈為膏石斛一兩去根剉鹿茸二兩去毛塗酥炙微黄肉蓯蓉三兩酒浸去皮炙兎絲子三兩酒浸一宿焙乾為末磁石二兩燒醋淬七次細研水飛過吳茱萸一兩湯浸焙乾炒硫黄一兩細研水飛過木香一兩右為末入研予藥令匀煉蜜和搗三二百杵丸如桐子大每日空心鹽湯下三十丸烏頭煎丸補壯筋骨烏頭半斤不去皮尖水浸三二宿天麻一兩牛膝去苗酒浸一宿半兩切焙巴㦸天去心半兩海桐皮補骨脂炒半兩肉豆冦去壳半兩蘹香子炒一兩萆薢木香一兩石斛去苗半兩沈香剉一兩大棗十五枚爛煑去皮核入膏中右用黒豆半升煑烏頭以豆熟為度取出切作片子焙乾用青鹽二兩炒令黄色去鹽搗為細末以醇酒二升先煖酒令滚沸次下烏頭􅆈成膏然後以諸藥焙乾搗羅為末并棗膏入膏内和調得所丸桐子大每服三十丸空心鹽湯下五味子丸補虚損益氣血壯筋骨五味子熟乾地黄焙補骨脂炒牛膝去苗酒浸切焙各二兩杜仲去粗皮炙剉石斛去根山芋海桐皮剉黄芪細剉各一兩兎絲子六兩淘去浮者酒浸三日别搗取末三兩天雄半兩炮製去皮臍右為細末煉蜜丸如桐子大每服三十丸空心温酒下硫黄丸出聖恵方補治虚損益精髓悦顔色久服輕身倍力耐寒暑壯筋骨暖下元硫黄四兩酒煑黒色細研雄雀兒五十隻取肉研硇砂二兩細研阿魏三兩麵裹煨麵熟為度桂心二兩兎絲子二兩酒浸焙乾為末晩蠶砂三兩半醋浸焙乾逺志三兩去心右為末入研藥令匀煉蜜和搗三百杵丸如桐子大每日空心以鹽湯或温酒下二十丸不問少老並宜服之補真丸補元氣壯筋骨明目駐顔蘹香子炒一兩附子炮製去皮臍巴㦸天去心各半兩陳橘皮湯浸去白焙一兩青橘皮補骨脂青鹽研各十兩牛膝去苗酒浸一宿切焙乾蜀椒去目閉口者炒出汗取紅各一兩右為細末用羊腎一對去筋膜細切於砂盆内研令極細入酒半斤煑成糊和丸如桐子大每服三十丸空心温酒或鹽湯下蘹香子丸補虚損除風冷壯筋骨明耳目蘹香二兩炒川楝子二兩陳橘皮二兩去白穰川烏頭二兩炮製去皮臍萆薢二兩地龍二兩去土微炒旋覆花蜀椒去目閉口者炒出汗各二兩右為末煉蜜和丸如桐子大每服二十丸空心臨卧酒下萆薢丸補虚壯筋骨益氣血萆薢一兩半當歸剉乾薑炮厚朴去皮薑汁製炙桂去皮附子炮製去皮臍各一兩陳橘皮湯泡去白焙六兩京三稜炮剉右為細末酒煑糊丸如桐子大每服三十丸空心食前鹽湯下補氣丸補虚壯筋骨治臍下撮痛及小腸氣葫蘆巴炒良薑炒補骨脂炒烏頭炮製去皮臍葳靈仙去土各半兩蘹香子炒一兩半檳榔生二枚右為細末醋煑糊和丸如桐子大每服十五丸空心温酒下肉蓯蓉丸補元氣壯筋骨益精駐顔肉蓯蓉酒浸切焙牛膝去苗酒浸一宿切葫蘆巴炒蜀椒去目并閉口者炒出汗楝實去核炒蘹香子炒各一兩青鹽炒研半兩右為細末用猪腎一隻去筋膜細切将浸藥酒煑熟研爛入前件藥末和匀為丸如桐子大每服二十丸加至三十丸空心温酒下麋角丸出聖恵方補煖下焦治風虚壯筋骨麋角屑三兩酥拌微炒巴㦸三兩肉豆䓻二兩去壳微炒當歸一兩微炒檳榔二兩硫黄二兩細研水飛過乾薑一兩炮製剉右為末入硫黄同研末煉蜜和搗三五百杵丸如桐子每服空心以温酒下三十丸續命丸補虚益氣血實丹田悦顔色壯筋骨乾栢葉一斤甘菊花未開者白茯苓熟乾地黄焙四兩松脂一斤用桑柴灰汁二斗煑令白色為度右為細末煉蜜丸如桐子大每服三十丸空心温酒下萆薢煎丸補益丹田壯筋骨萆薢一斤用新米泔水洗净焙乾入新瓦罐子内以酒五升浸用油單紙密封口放日中曬一七日焙乾為末補骨脂炒四兩狗脊去毛醋炙巴㦸天去心牛膝去苗酒浸切焙蘹香子以鹽二兩同炒各二兩右以蜜胡桃仁相和􅆈如稀􅄳後入補骨脂等末和丸如桐子大每日空心以温酒下三十丸一方煉蜜和匀如飴盛瓦器中旦日以温酒化下一七熟水亦可久服延年益氣忌芸臺羊血刪繁本草注云補骨脂令多以胡桃合服此法出於唐鄭相國自序云予為南海節度年七十有五越地卑熱濕傷於内外衆疾俱作陽氣衰絶服乳石補益之藥百端不應元和七年有訶陵國舶主李摩訶知予病狀遂傳此方其藥予初疑而未服摩訶稽顙固請遂服之經七八日而覺應驗自爾常服其功神驗十年二月罷郡歸錄傳之破故紙十兩湯浸去細皮研如泥即入前藥更以好蜜和攪令匀如􅄳糖盛于瓷器中旦日暖酒二合調藥一七服之便以飯壓之如不飲人暖熟水調亦得服爾久則延年益氣悦心明目補添筋骨但忌食芸臺羊血餘無忌此物本自外番隨海舶而來非中華所有番人呼為補骨脂訛語為破故紙也婦人服之亦佳沈香丸調順脾胃補益真氣進飲食壯筋骨治虚乏輕腰膝沈香丁香肥者南木香舶上茴香炒香補骨脂炒南番葫蘆巴炒石斛去根川芎巴㦸去心牛膝青橘皮去穰以上各一兩附子半兩炮右為末煉蜜丸如桐子大每服三十丸空心温酒下飯飲亦得久服尤妙鹿茸丸出十便方補真氣煖腎臟縮小便退隂進陽壯筋骨耐寒暑進飲食鹿茸二兩蓯蓉焙乾秤附子山藥地黄牛膝破故紙各一兩桂麝香一分右搗羅為末以酒蜜各一半煉熟丸如桐子大每服三五十丸空心酒下香茸丸又方出十便良方熟乾地黄五兩兎絲子四兩另末鹿茸三兩右為細末入麝香半錢煉蜜杵丸如桐子大每服三十丸至五十丸温酒鹽湯下香苓丸出王氏博濟方補助元氣壯筋骨進飲食療膀胱小腸等氣疾茴香舶上者慢火炒令香金鈴子麩内炒過芸臺子炒大附子炮製去皮臍桑螵蛸略炒馬藺花醋浸一宿炒令紫色各一兩右件六味揀令净同杵為末酒煑麵糊丸如桐子大每服空心鹽湯下三十丸養肝丸出朱氏集驗方治養血氣壯筋骨白芍禹餘糧煆蓯蓉黄茋蜜炙當歸茯神杜仲鹿角膠炒一兩半牛膝木𤓰川續斷栢子仁石菖蒲各半兩右為末醋糊丸如桐子大早空心鹽湯下青鹽丸出聖濟總錄固丹田壯筋骨青鹽細研一兩蜀椒去目閉口者一兩半肉蓯蓉酒浸一宿切焙巴㦸天去心各二兩牛膝酒浸一宿焙右為細末用獖猪腎一對去脂膜細切研爛以浸藥酒􅆈為膏丸如桐子大焙乾每服五十丸空心食前温酒或鹽湯下附子丸出朱氏博濟方大壯筋骨補益丹元進飲食化氣治脚氣腰膝乏力行步艱難或脚疼痛或下注成瘡大附子十兩用黒豆一升水五升不犯鐵器内慢火煑候豆熟附子軟為度切作片子焙令乾川芎六兩木𤓰末牛膝半斤羌活四兩右為末蜜三斤和匀􅆈如􅄳膏可丸如桐子大空心食前鹽湯温酒任下十五丸或二十丸消榖助筋骨行榮衛明目輕身出本草以榧實多食一二升佳不發病令人能食補中益氣堅筋骨通血脈興陽道用陳倉米作飯乾食之補虚治風附論夫風者百病之始也清净則肉腠閉拒雖有大風竒毒弗之能害體虚之人本臟虧耗風邪易乗其証或心神驚悸手足顫掉筋脈拘急凡此之類皆因虚挾風所致法宜補藥中加以治風之劑方地仙丸治風順氣補元陽活血大壯筋骨滑膚明益壽駐顔久服輕身萆薢防風去义白蒺䔧炒狗脊去毛烏藥剉附子炮製去皮臍白附子炮赤小豆揀地龍去土骨碎補炒蘹香子炒羌活去蘆天南星炮黄耆剉炒各半兩牛膝酒浸切焙肉蓯蓉酒浸切焙何首烏去黒皮蜀椒去合口者及目炒出汗覆盆子去蒂各一兩木鱉子三分右為末酒煑麵糊為丸如桐子大每服二十丸空心食前鹽湯或酒茶任下男子久冷元氣虚憊脚手疼痛等疾皆可服之神厚朴丸治真元虚弱風寒冷氣入腸間使心腹暴痛背脊酸疼腸鳴泄㵼心虚嗜卧兼調隂陽和臟腑散風冷外邪補丹田正氣厚朴去皮生薑汁炙枳殻去穰麩炒蘹香子炒香肉豆䓻去壳桂去粗皮白术各一兩丁香蓽澄茄右為細末酒煑麵糊為丸如桐子大每服十五至二十丸空心温酒或鹽湯下婦人久冷亦可服磁石丸出聖恵方煖腰腎壯筋骨明耳目利脚膝磁石三兩燒醋碎七次細研水飛過雄黄二兩細研水飛過桂心末二兩牛酥一分雄雀糞一分兎絲子二兩酒浸三日曝乾另搗為末右将磁石雄黄二味取鷄子二枚打破小頭作孔出白調和二味令匀却入於鷄子殻内以數重紙糊定後却與鷄同抱之二十日後取出細研并兎絲子桂心二味末入牛酥等以蜜和丸如菉豆大每日空心以温酒下三十丸補腎氣壯元陽神効蓯蓉丸補壯筋骨蓯蓉酒浸一宿切焙附子炮製去皮臍牛膝去苗酒浸一宿切焙鹿茸酥炙去毛半兩兎絲子酒浸二宿另搗末各一兩右為細末酒煑麵糊為丸如桐子大每服三十丸鹽湯或白湯下烏頭丸補元臟壯筋骨益氣力療風寒濕痺暨手足不隨方見本門補虚治風類六味烏頭丸何首烏丸壯筋骨烏潤髭髮益血脈助陽氣一切風攻手足沈重皮膚不仁徧身麻木風勞風疾何首烏净洗以竹刀刮去皮切一斤與浄黒豆一升同用新汲水浸一宿炊以豆爛為度取出暴乾天南星炮去皮臍菖蒲𦂳小者去皮毛各四兩牛膝去苗酒浸焙半斤右為末以酒四升醋二升慢火熬竹箆子不住手攪候将藥杵和丸如桐子大空心食前温酒下三十丸臨卧鹽茶下十丸補骨脂丸出聖恵方暖下元補筋骨久服令人壯健澤顔色及因感濕陽氣衰絶補骨脂五兩微炒搗羅為末胡桃仁二兩研如脂蜜四兩訶梨勒皮沒藥細辛去苗葉洗焙天麻獨活去蘆赤石脂當歸芎藭半兩防風去义各三分右為細末酒煑麵糊為丸如桐子大每服二十丸至三十丸温酒下米飲亦得空心食前服如呼吸冷氣心腹疼痛裏急後重亦宜温酒下二服牛膝蓯蓉丸治本臟虚冷暖壯筋骨去風明目牛膝切酒浸焙蓯蓉酒浸三日焙乾用補骨脂炒葫蘆巴蘹香子炮枸杞子楝實巴㦸天去心白附子炮附子炮製去皮臍青鹽羌活去蘆頭蜀椒去目并合口者炒出汗獨活去蘆頭白蒺䔧炒黄耆剉炒各一兩右為細末分三處將二處藥用前浸牛膝蓯蓉酒煑麵糊為丸如桐子大每服空心温酒下二十丸至三十丸服一月面上紅臍下暖進飲食減昏困為驗餘藥為散子如傷冷腹痛用羊腎或羊肉上摻藥一錢七青鹽半錢七炙得香熟吃以温酒下如患小腸氣及小便赤􅉣毎服一錢七入蘹香子青鹽少許水一盞煎至八分空心食前服萬安丸治虚損大補乾蝎炒二兩白花蛇酒浸取肉炙桃仁去皮尖雙仁炒研各四兩㯽榔剉蓯蓉酒浸切木香當歸切焙蘹香子炒羌活去蘆頭芎藭天麻桂去粗皮沈香剉白附子炮阿魏米醋研用安息香研各一兩半右為末用蜜一斤拌和為丸如鷄子大每服温酒或茶嚼一丸硇砂煎丸治男子脾腎風勞大補益元臟和一切氣方見本門補虚益氣類椒紅丸治本臟虚損補煖逐風冷聰明耳目蜀椒去子并合口者八兩以火燒一坑子潑酒在上次傾椒在上急用一新瓦盆𦂳合定四縫以新土宻封一伏時取出杵取紅不用白附子炮製去皮臍二兩木香肉豆䓻去壳各四兩陳橘皮湯浸去白焙二兩生薑四兩切作片炙黄巴㦸天去心蓯蓉酒浸切焙牛膝酒浸切焙五味子炒桂心去粗皮補骨脂微炒黄蘹香子微炒蒺䔧子炒去角各一兩㯽榔剉半兩右為末用羊腎四對去筋膜細剉入青鹽二兩於砂盆内同研和前藥為丸如桐子大若調時更入少麵糊和丸每日温酒下三十丸鹽湯下亦得空心食前服天仙丸治腎臟久虚補暖逐風木香一兩硫黄二兩栁木罐研一七日頻以甘草水灑蘹香子微炒四兩桂去粗皮附子炮製去皮臍三兩葫蘆巴補骨脂金鈴子巴㦸天去心㯽榔剉牛膝切酒浸焙萆薢青橘皮浸去白焙沈香剉各一兩右為末酒煑麵糊為丸如桐子大空心鹽湯或酒下十五丸加至二十丸加五味子尤佳此藥亦名大玉辰丹蛜􅖉丸出聖恵方治腎臟久積風冷小腹氣滯腰膝痠痛臍脇冷痛飲食減少四肢無力蛜􅖉天麻附子炮製去皮臍木香補骨脂葫蘆巴牛膝去苗石斛去根剉㯽榔巴㦸天硫黄細研水飛過硇砂細研阿魏研入桃仁湯泡去皮尖二仁不用另研如膏以上各一兩右為末入研了藥令匀用酒三升入前藥末中拌匀攪以慢火􅆈如膏和餘上藥末更搗三二百杵丸如桐子大每服以熟生薑酒下二十丸肉蓯蓉煎丸治上熱下冷元臟風虚膀胱氣四肢腰脚無力疼痛頭目昏眩腹脇妨悶大虚補益肉蓯蓉好肉者酒浸薄切焙乾秤一斤巴㦸天去心附子炮製去皮臍蘹香子微炒各四兩牛膝去苗用半斤酒浸一宿炒乾與蓯蓉二味搗羅為末用無灰酒二升入銀石瓮器中重湯煎成膏葫蘆巴桂去皮木香青橘皮肉豆䓻去壳白附子炮山芋乾蝎用黄色頭尾全者微炒各二兩右除膏外細搗羅為末候膏成稀稠得所便入諸藥末一處和丸如桐子大空心温酒或鹽湯下二十丸恐藥輭但於盤内攤可丸即丸入新瓷器中盛服藥一月見効百日後諸病俱退仙茅丸治風順氣調利三焦明耳目益真元壯筋骨駐顔色仙茅切片刮去皮米泔浸暴乾羌活去蘆頭白术狗脊去毛白茯苓去皮各一兩薑黄菖蒲白牽牛各一兩半威靈仙去土二兩何首烏去黒皮蒼术浸切焙各一兩防風右並生用細搗為末以生白蜜和為劑再入臼杵一二千下丸如桐子大每服十五丸至二十丸冷水下不嚼婦人月事不通紅花酒下半月見効却老蓯蓉丸治腎臟虚損補真臟氣丹田風冷調順隂陽和胃進食肉蓯蓉酒浸切焙二兩山芋五味子炒各一兩澤㵼兎絲子酒浸三日焙乾另研取末赤石脂研白茯苓去粗皮山茱萸焙熟地黄焙覆盆子去梗石斛去根各一兩巴㦸天去心右為細末酒煑麵糊入蜜少許同和丸如桐子大毎服二十丸至三十丸温酒下粟米飲亦得空心食前服硇砂丸出聖惠方治腎臟風冷氣臍腹疼痛硇砂乾薑炮製剉㯽榔當歸剉微炒桂心乾蝎微炒苦楝子烏蛇肉酥拌微炒蘹香子附子炮製去皮臍沈香子以上各一兩木香右為末用好酒一升先煎硇砂消後用紗絹濾去石相次下諸藥末慢火煎之候可丸即如鷄頭大患者以熱酒化二丸服黄耆羌活丸治腎臟虚風補益元氣黄耆略炙炒羌活去蘆剉米泔浸一宿焙附子炮製去皮臍蒺䔧子炒去角烏頭炮製去皮尖沙苑蒺䔧生用牛膝酒浸一宿焙木鱉子去壳防風去义净洗剉萆薢净洗切各一兩狗脊去毛生用一兩半右為細末酒煑麵糊為丸如桐子大毎服二三十丸空心鹽湯下牛膝丸補虚損逐風氣益精駐顔壯筋骨通血脈牛膝酒浸切焙益智炒大棗用燈心煑熟去皮核各四兩蜜一斤煉乾薑炮一兩半桂去皮二兩半厚朴去皮生薑汁炙三兩逺志去心各一兩陳橘皮湯泡去白焙二兩烏頭炮製去皮臍右除蜜棗外搗羅為末先將肉棗同藥末研後入蜜同丸若乾燥即浸藥酒添助少許和丸如桐子大每服二十丸至三十丸空心鹽酒下十華飲出微生寳鑑治元氣虚損理脾胃風解二毒傷寒腰膝疼痛療酒色傷憊霍亂吐㵼偏風冷疼麻痺脚氣腫注行履不得等疾附子炮製去皮臍黄茋剉羌活去蘆白术白术炒桔梗剉炒青皮湯泡去白焙乾薑炮桂去皮甘草炙五加皮用吳茱萸一兩以水一碗用煑水盡為度去茱萸取五加皮細切焙乾各一兩右粗搗每服三錢水一盞入生薑二片大棗三枚擘破煎至六分去滓不拘時候温服一方加附子乾薑桂各半兩餘品味同入鹽煎一方有人參無桔梗人參地黄丸治下元不足去風冷邪氣調順脾胃壯氣明目進飲食人參巴㦸天去心肉蓯蓉酒浸一宿切焙白术乾菊花兎絲子酒浸一宿焙乾搗末五加皮剉石斛去根栢子仁另研熟地黄焙各一兩右件為末煉蜜和丸如桐子大每服三十丸温酒下食前服牛膝附子煎丸出王氏博濟方治男子下元虚冷傷憊筋骨衰遍身癮疹及風氣上攻下注疼痛不可忍者牛膝去苗細切五兩酒浸三日取出研如麵糊用酒於銅銀瓷器内慢火􅆈成膏虎骨酥炙黄色附子炮製去皮臍各三兩補骨脂炒葫蘆巴肉蓯蓉酒浸三日細切焙各四兩巴㦸天去心生用仙靈皮去莖生用一兩芎藭右搗羅八味為細末用牛膝膏和入臼杵令軟得所丸小彈大若難丸更入熟蜜少許同丸早晨夜卧温酒化下一丸服一月永無風氣等疾海桐皮丸治下臟風虚耳内蟬鳴久服壯筋骨駐顔色利胸膈調脾胃補虚海桐皮剉楝實剉炒蘹香子石斛去根牛膝寸截酒浸一宿焙乾各一兩㯽榔煨剉一兩芎藭一分木香右為末煉蜜丸如桐子大每服温酒或鹽湯空心下二十丸至三十丸小牛膝丸治腎臟虚冷風氣等疾牛膝寸截用酒一碗浸一伏時煑三兩沸搗爛取汁􅆈成膏防風去义附子炮人參赤小豆揀各二兩地龍去土檀香剉各半兩乳香三分右搗七味為末入膏和丸如豌豆大每服十五丸至二十丸空心鹽湯下覆盆子丸出聖惠方治諸風虚補煖下元變白髮久服神効覆盆子半斤五粒松半斤枸杞子六兩秦皮四兩川升麻三兩苣蕂五兩楮實五兩水淘去浮者暴乾微炒右為末以生地黄汁一升好醋半斤酥七兩先煎地黄汁等十餘沸入藥末和丸如桐子大每服於食後以温酒下三十丸如不飲酒以漿水下切不得食白蒿青蒿荏子蘿蔔蒜等物椒紅丸出聖惠方大補益治風毒健脾胃止咳逆消酒食暖下元補諸虚憊川椒十兩微炒附子四兩炮製去皮臍白蒺䔧二兩微炒去刺巴㦸二兩硫黄二兩細研水飛過硇砂二兩細研鹽花二兩右為末研令匀用豶猪腎五對煑熟去脂膜研爛如糊入諸藥末和乾濕得所搗一二千杵丸如桐子大每日空心以鹽湯下三十丸或酒下亦得地骨皮丸治風温補血氣地骨皮牛膝兎絲子焙枳殻去穰麩炒逺志去心熟乾地黄焙各六兩右並用酒浸三日焙乾為末用浸藥酒煑麵糊為丸如桐子大每服三十丸空心温酒下烏頭丸出王氏博濟方治補暖水臟虚冷壯筋骨縮小便大治風烏頭一斤用東流河水浸七日毎日三度換水日滿取出去黒皮并皮尖切作栁葉片入牽牛子一合同炒候香熟即去牽牛子不用蘹香子炒另搗為末二兩青鹽五兩另研蜀椒去目并合口者炒出汗牛膝各五兩細切以好酒浸七日爛研陳橘皮酒浸去白焙二兩右用牛膝膏和匀入臼再搗千下丸如桐子大每日空心鹽湯或温酒下十五丸至二十丸牛膝須酒浸後爛研與諸藥末拌和恐難得細或只將牛膝浸日足焙乾為末却將浸牛膝酒煑糊和末為丸亦得若更利膈湯散最相宜也一方無陳皮内青鹽蜀椒牛膝止用四兩餘藥味同鹿茸丸治元臟虚損一切風冷鹿茸去毛酥炙附子炮製去臍皮當歸酒浸一宿焙白术細辛去苗葉生用桂去皮生用各一兩右為細末煉蜜為丸如桐子大空心每服日午鹽湯下二十丸至三十丸沈香紫桂丸治丈夫元臟氣虚損婦人血海虚冷月脈憊漏五般帶下臍腹㽲痛及一切虚風冷氣攻注桂去粗皮烏頭炮製去皮臍赤石脂燒各一兩蜀椒去目合口者炒出汗各半兩乾薑炮右為末酒煑麵糊和丸如桐子大每服二十丸空心食前醋湯下丈夫鹽湯下除風散治八部諸風延年却老駐顔色益氣血白术甘菊花白茯苓去皮天門冬去心各一兩天雄炮製去皮臍半兩右為細散毎服一錢七温酒調下空心食前日進二服硇砂丸出聖惠方治水臟憊傷久積風冷硇砂半兩硝石一分青鹽半兩白礬一兩黄丹一兩右細研令匀用磁瓶子盛固濟瓶口以炭火七斤煆令通赤放冷取出細研以糊和丸如菉豆大每日空心以粥飲下十丸内養丸聖濟方一名草還丹一名益夀地仙丸治本臟虚風皮膚瘡腫固濟丹田方見本門補虚勞耳目類五緯丸治虚損補暖丹田去風冷氣附子一枚炮製去皮臍為末桂去皮為末各一分乾薑炮為末二錢硫黄細研右同研細麵糊和丸如桐子大丹砂為衣遇脾胃冷不思飲食腹中疼痛頻頻洞㵼及赤白痢並濃煎艾湯放冷下十丸良久再服怕冷物用冷水下十丸如小兒有此患化下一丸如冬天逺出早行亦用冷水下五七丸大禦寒氣此藥不熱甚温亦無反惡大無所忌常服五七粒永不患結胸隂毒傷寒等症不拘時候服四靈丸治腎虚還元保命壯氣除風巨勝子一兩白茯苓去皮三兩生乾地黄焙麥門冬去心焙各一兩右為細末煉蜜如桐子大毎服三十丸煎棗湯下水飲亦得服至百日自覺有異通神三靈丸治本臟諸虚延年益壽袪風氣通榮衛活血脈壯腰脚栢葉四斤米泔浸七日每日換泔洗净至次日取出近日隂處曬乾杵為末松脂四兩用滴乳香以桑葉灰汁内煑半日以上候化取出脂去灰汁入新水内候凝細研如粉右為末同拌匀煉蜜和丸劑再杵一千下丸如桐子大每日空心臨卧茶酒或温水下五十丸煨腎丸治虚風補暖黄蓍蒸過焙乾白蒺䔧炒羌活去蘆頭各半兩右為散每服猪腎一對入末四錢入鹽少許摻於腎内濕紙煨熟食之次用温酒一盞投之妙蓯蓉丸治腎虚補元臟除諸風益脾實腎烏頭一斤炮製去皮臍入米泔浸七日逐旦換水七日子别搗生黒豆末一斗以水二石煑烏頭作片子如盞大漸添豆末入水自平明煑至黄昏取出去豆末止将烏頭片子於長流水内浸半月出熱毒日滿隂乾入青鹽三兩同為末蓯蓉半斤酒浸二日入飯甑蒸三度每度添酒滿再蒸候蒸得如泥軟入砂盆内研爛牛膝半斤酒浸二日一日一焙乾搗為細末右以烏頭牛膝末入在蓯蓉膏内和匀丸如兩皂子大每服一丸温酒嚼下二三服永絶脾胃冷氣烏頭丸治風氣暖水臟去腰膝酸疼臍腹虚冷用川烏頭不以多少净洗曬乾寛掘地坑子一所却用好土實填築於好土内取作坑子一所亂削坑子口週迴如法然後用炭火燒令通赤却去火用釅醋一碗傾在坑子内候滲盡便匀鋪排烏頭在内使好土盖覆厚一寸已來築却然後坑口頭以炭火宻排燒之斟酌欲熟於坑口邊取出一枚看之以軟熟為度其藥又不得令生又不得大焦切在用意取出曬乾搗羅為末以粳米飲和丸如桐子毎服温酒或鹽湯下十丸加至二十丸為度曲囊丸出千金方治風冷補虚弱亦主百病方乾地黄薯蕷牡蠣天雄蛇床子逺志杜仲鹿茸桂心五味子鹿藥草石斛車前子兎絲子蓯蓉雄鷄肝未連蠶蛾各等分右十七味欲和任意搗末蜜丸如小豆大酒服三丸加至七丸日三夜一禁如常法須常有藥氣大益人服藥十日以後少少得强烏頭丸出廣南四時攝生論大補暖疎風治氣空心常服即無諸疾方川烏頭一斤以川中者無即草者先以黒豆一斗用水與烏頭同煑水乾旋添湯煑豆爛為度出豆不用烏頭去皮臍以竹刀切作片用鹽四兩湯化為水将烏頭同煎爛研成膏子乃用後藥肉豆䓻四個沈香一兩半破故紙一兩微炒巴㦸天一兩去心海桐皮二兩牛膝二兩半茴香二兩微炒甘草半兩天麻一兩半虎脛骨一兩㯽榔一兩右為散入烏頭煎捜和入臼杵内搗臨時看硬軟少許入蒸餅丸如桐子大每日空心鹽湯或温酒下二十丸煎烏頭或用青鹽更妙金粉丸出王氏博濟方治風冷氣流注腰脚疼痛行步艱難久患不瘥川烏一兩每個劈開作片子牛膝一兩去毛酒浸洗切之何首烏一兩劈破右用大豆一斗淘净先入一半甑内次下三味更用餘豆盖蒸半日只取藥隂乾為末别入地黄金粉一兩拌匀以酒糊丸桐子大空心木𤓰酒下三十丸或二十丸濟危上丹出衛生家寳方治虚極生氣産後尤好妙乳香研五靈脂研硫黄研陳皮去白太隂𤣥精石研以上四味用石器内微火炒桑寄生真阿膠炒右等分為末同和用生地黄汁糊丸如桐子大温酒下二十丸救陽湯出十便良方治陽微隂勝風寒侵襲真氣暴衰形寒脈結神識不明心腦痰滿嘔逆清涎頭目昏眩頻倦卧自汗不止飲食不入下利頻數臍腹疼痛肢體困倦並主之川烏頭乾薑各四兩搗碎同炒轉色右為粗末毎服三錢以水三盞煎一盞去滓食前温服寒多加良薑二兩汗出多加牡蠣一兩痰加附子二兩風加防風一兩肢節痛加桂一兩火輪丹即稀薟丸出鮑氏方補虚損益真元除諸風等症用稀薟草葉如芥菜而狹長長髙三尺秋乃花實苗色赤稈色紫為上青色次之節葉對生其根白枝桿方花小而黄向上開下有金絲紋是也其根枝圓花黄而大向下開如杓葉深綠下無金絲葉不相對者鶴虱也稀薟草略似蒼茸牛膝髙於鶴虱成節便張忠定公表言仲一諸般風氣痢桑株上木耳湯下冷氣乾薑湯下軟風頑麻風薑蠶湯下諸般勞風温酒鹽湯下奔豚風膈氣腎俞風乳香湯下筋骨風炒皂角子湯下血風血氣芸薹子湯下久血痢荆芥湯下蛔䖝米飲下一切風參湯下小兒腎腫陳米飲下痃癖氣㯽榔湯下除風血補益出本草以陳恩岌浸酒服之治風血去諸冷益老起陽出本草用鹿茸浸酒服之主一切風血補益并諸疾出本草以羊不吃草煑服之亦浸酒服補虚消痰附論夫脾胃者倉廩之官播萬物氣澤以埤諸臟腑者也脾土也土能制水則水不溢虚損之人脾胃氣弱故於水穀不能尅消土氣不能勝水津液停積結聚上膈是為痰也令補虚兼以助脾之藥則痰自消矣方天麻煎丸出聖濟總錄治肝腎久積風冷痰滯氣攻眼目腫澀疼肌肉瞤動心神倦痰去涎少壯筋骨補元氣益心利肺天麻半斤净洗焙乾搗末牛膝酒浸切焙一斤搗為末杏仁湯浸去皮尖雙仁細研四兩生地黄五斤好者净洗於臼内杵取汁三升右同於銀器内以新水三斗煎至七升以布絞取汁却將藥渣於木臼内搗令極細後以水三五升浸取汁同於銀器内􅆈更用無灰酒五升安息香三兩慢火煎成膏後入葫蘆巴二兩天雄炮製去皮臍石斛去根沈香剉桂去皮巴㦸天去心瑇瑁醋炙為末㯽榔白花蛇酒浸炙去皮骨各一兩當歸切焙一兩酸棗仁炒一兩芎藭一兩逺志去心三分大腹和皮剉一兩獨活去蘆頭三分乾薑炮製一兩益智去皮三分木香一兩右除前四味作外搗羅為末入前膏内和為丸於木臼内杵一二千下丸如桐子大每服以酒下二十五丸加至三十丸若常服空心一服有疾早晩一服枇杷前胡湯一名枇杷葉湯出聖濟總錄補益五臟去痰飲三焦虚熱風勞毒氣攻手足寒熱煩躁方見虚勞痰飲類附子湯出聖濟總錄體勞倦四肢拘急腹内刺痛體弱并頭痛腎臟傷憊胸臆噎塞乆疾冷氣婦人血海冷滯補足附子炮製去皮浄烏頭炮製去皮臍柴胡去土前胡去蘆黄蓍芎藭白术人參木香當歸切焙羌活去蘆頭甘草炙桔梗炒白芷地榆桂去皮各一兩右剉如麻豆大每服三錢水一盞生薑二片棗二枚葱白一寸同煎七分空心服五味子出聖濟總錄治痰盛利胸膈和脾胃肺氣止嗽思食心經虚熱咽喉舌乾澀壅悶口内生瘡五味子人參訶梨勒皮炒白术白茯苓去皮桔梗炒枳殻去穰麩炒前胡去苗土貝母去心炒甘草炙陳橘皮湯泡去白麥門冬去心焙半夏生薑汁製和作麯焙乾各一兩乾薑炮桂去皮各半兩右粗搗篩毎服三錢七水一盞入生薑一片大􅀥切煎七分去滓温服茱萸丸出聖濟總録補虚下氣去痰吳茱萸湯浸洗七次焙一兩半硇砂半兩用醋漿水淹攪五七百度用紙濾過瓷器内慢火逼令乾木香一兩京三稜三兩炮熟搗青橘皮泡去白一兩半附子炮製去皮臍一兩半蘹香子半夏乾薑炮製一兩半巴㦸天去心酒浸一宿一兩硫黄一兩甘草水浸七日研右各搗為末先用硫黄末以精羊肉十五兩細切拌和令匀淹一宿便用好醋一升半煎至醋盡刮去在臼内後將藥末并硇砂同入臼内杵一千下丸如桐子大每日空心鹽湯下一十丸五味子丸出易簡方平肺氣補虚消飲五味子三兩人參桂㯽榔煨青皮杏仁泡去皮尖細辛去苗各一兩附子炮去皮臍乾薑炮各半兩右為末蜜丸如桐子大每服三四十丸用酒或鹽湯下空心食前日三服理中湯出聖濟總錄補虚治痰木香一兩乾薑一兩炮白附子一兩炮附子二枚炮製去皮臍蘹香子一兩微炒天南星一兩切生薑十片同水煑過半夏一兩切生薑十片同水煑過焙乾右為末用羯羊腎一對和前藥一處入臼内杵二千下丸如桐子大每服十丸炒鹽湯下早晚二服瑞連丸出危氏方治濕定心消痰暖腎水匀血去黒痣蒼术蓮肉去心皮一斤酒浸軟入猪肚内煑爛取出焙乾研猪肚為膏毎蓮肉一斤約肚二個五味子主肺去梗破故紙主腎微炒熟地黄主血各一兩酒蒸右為細末猪肚膏酒煑飛羅麵為丸如桐子大每服三四十丸空心温酒鹽湯下雄硃丸出易簡方治丈夫婦人因驚憂失心或多思慮氣結不散積成痰涎留灌心包久而不去窒塞心竅遂心氣不寧狂言亂語呌呼奔走顆塊硃砂一分研雄黄有墻壁明净者一分研碎白附子一錢為末右拌和匀猪心血和丸如桐子大更别用硃砂為衣每服三粒用人參菖蒲濃煎湯吞下病去常服一粒能安魂定魄補心氣定神靈化痰利膈補虚調腹臟夫脾者倉廩之官也胃為水穀之海其氣和平布散精微上注於心肺下流於腎肝虚損之人倉廩不足穀氣衰弱腹臟不調法治宜以調和脾胃方沈香湯出聖濟總錄補虚治氣調順三焦安和臟腹進飲食沈香一兩肉豆䓻仁桂去皮厚朴去皮生薑汁炙木香㯽榔青橘皮湯泡去白毛焙訶䔧勒皮白术當歸焙人參枇杷葉炙刷去毛芎藭乾薑炮莪术煨剉黄茋附子炮製去皮臍白茯苓去皮石斛去根酒浸微炒前胡去蘆頭枳壳去穰麩炒郁李仁浸去皮并雙仁京三稜醋浸一宿煨剉甘草炙各半兩右剉如麻豆大每服五錢水一盞半入生薑三片大棗三枚劈破煎至八分去渣稍熱食前服木香和中丸和脾氣益腎水消腸胃積滯調三焦氣脈開胸膈痞滿上攻心腹悶痛筋脈拘急肢體困倦潤大便小便進飲食木香去腐沈香白豆䓻枳實去穰㯽榔蓬术去皮青皮去穰陳皮去白當歸酒浸黄芩去腐木通去皮黄連去鬚砂仁三稜去皮各一兩黄栢去腐皮香附子去皮毛各三兩大黄蒸熟四兩牽牛頭末二兩猪牙皂角去皮弦并子蜜炙乾用一兩右為細末水糊丸如桐子大每服二錢半食後温茶清下或薑湯亦可漸至三錢重如腎水隂虚火熱内餘五臟客熱遂用黄連黄芩黄栢治之如腸胃積熱生濕於内燥甚於腸胃之外則燥濕不相和濟用大黄黄連以流濕潤燥如三焦臟腑血氣血結滯作痛不能消化飲食香附子木香㯽榔青皮白豆䓻砂仁沈香蓬术三稜通流結滯之氣如大腸氣滯脹悶作痛大便燥澁艱難用枳殻郁李仁牽牛末以通利濕潤之如胸膈脇肋脹滿痞悶作痛枳實木香開通之如大腸中風燥下血生痔用皂角并子枳實枳殻郁李仁當歸以治之如胸心膀胱氣血鬱結不通臍腹腰胯脊背痛加牽牛頭末取快利之如稟受氣血壯實之人常服不減去牽牛年老之人血虚氣衰腸胃濕甚大便㵼軟減去牽牛茴香煎丸治脾胃弱腎氣虚飲食不美噫醋吞酸臍腹痛小腸氣痛及中酒惡心常服大益脾腎病後氣體痩弱尤宜服川椒半兩去子及合者老生薑二兩細研厚朴去粗皮青鹽海鹽亦得以上五味入磁礶内湯浸得所慢火煑乾各一兩茴香附子二味去皮臍尖剉骰大炒黄川楝子肉大川烏益智仁陳皮去白蒼术米泔浸一宿各一兩桂去皮破故紙炒右為細末醋糊丸如桐子大毎服三十丸温酒鹽湯下空心服蜜補固真丹劉先生直格方治脾腎真元虚損泄利痰嗽噦痞水榖酸臭惡飲食臍腹冷疼肢體麻痺下虚痿厥上壅滯腎虚耳鳴脾虚困弊肺腎虚證常服補養通氣血進飲食天南星半兩半夏製神麯麥芽茴香炒京三稜各一兩炮白附子乾生薑川烏各一兩生巴豆七枚牽牛三兩代赭石二兩官桂一分右為末水和丸如小豆大每服十丸至五十丸温水下除泄痢外並加大黄一兩木瓜丸出聖惠方治脾胃積冷腹肋疼痛宿食不消兩脚轉筋時復㵼痢木瓜七枚大者切頭上一片為盖子割去穰并皮子入硫黄青鹽在内硫黄二兩細研水飛過青鹽二兩細研木香一兩㯽榔兩肉豆䓻一兩去壳訶梨勒皮一兩桂心一兩白芍藥半兩當歸半兩微炒胡椒半兩蓽茇半兩草豆䓻半兩去皮右為末入木瓜中令盡以盖子盖之用竹簽子劄定以三五重紙裹木瓜於飯甑内蒸令爛熟研如膏候可丸如桐子大每服空心以温酒下二十丸石斛黄茋丸出聖濟總錄治真臟元氣弱洞泄寒中腹内雷鳴多便泄飲食減少多困嗜卧石斛去根二兩五味子一兩黄茋微炙剉一兩蓯蓉酒浸切焙乾各一兩半熟乾地黄一兩焙訶梨勒皮半兩山芋蒼术切炒澤㵼各一兩右為末以酒煑麵糊丸如桐子大每服二十丸至三十丸温酒或鹽湯空心食前木香丸出聖惠方治一切氣及宿食不消心腹脹疼大腸下利木香一兩㯽榔一兩訶梨勒皮半兩丁香桂心一兩牽牛麝香大腹皮半兩郁李仁一兩湯浸去皮微炒陳皮半兩湯浸去白焙吳茱萸半兩