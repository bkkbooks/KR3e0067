骨露蜂房炙各半兩澤㵼白茯苓絲子酒浸一宿桂去皮牛膝酒浸切焙石龍芮赤芍藥各一錢韭子炒二錢巴㦸去心三錢右為散每服三錢空心温酒調下或煉蜜丸如梧桐子大空腹温酒下二十丸加桑螵蛸亦得天門冬散治精極五臓六腑俱虚徧身及骨髓煩疼宜服天門冬二兩去心羚羊角屑一兩人參一兩黄耆一兩枸杞子一兩酸􅀥仁一兩芎藭一兩車前子當歸桂心各一兩澤㵼一兩甘草半兩右為散每服四錢鹽水一盞煎至六分去滓入竹瀝半合蜜一茶匙同煎三兩沸不計時候忌鯉魚鹿茸丸治精極上焦熱下焦冷補十二經脈添髓養血宜服鹿茸四兩去毛酥炙硃砂二兩細研水飛過野雞脛骨二兩天門冬二兩車前子二兩絲子二兩酒浸一宿曝乾為末雀腦二十枚肉蓯蓉三兩酒浸一宿刮去皮熟乾地黄三兩右為末煉蜜與羊脛髓拌和搗三二百杵丸如梧桐子大每服空心及晩食前以酒服三十丸忌鯉魚生血羌活補髓丸一名羌活丸治精極髓虚中傷臓腑方見本門骨髓虚實類茯神散治精極實熱勇悍多驚壯熱茯神三兩柴胡二兩去蘆黄耆三兩剉逺志一兩去心天門冬二兩去心人參一兩澤㵼二兩生地黄二兩甘草一兩炙右為散毎服三錢以水一鍾入淡竹葉七片煎至六分去滓不計時候温服竹葉黄芩湯治精極實熱眼視不明齒焦髪落形體疼痛通身虚熱竹葉切一升黄芩茯苓各三兩麥門冬大黄各二兩甘草二兩生地黄六兩芍藥四兩生薑六兩右㕮咀以水九升煮取三升去滓分三服石斛湯治精極實熱眼視不明齒髮焦落形衰通身虚熱甚則胷中煩悶夜夢泄精小草石斛去根黄耆麥門冬去心生地黄酒洗白茯苓元參各一兩甘草炙半兩右㕮咀每服四錢水一盞半薑五片煎至八分去滓温服不拘時候竹葉湯治精極實熱視不明齒焦髮落形衰通身虚熱甚則胷中痛煩悶泄精生地黄五兩芍藥四兩黄耆茯苓澤㵼甘草麥門冬去心各三兩右剉散每服四錢水一盞半薑五片淡竹葉十片煎七分去滓不拘時服生地黄煎治精極補骨髓生地黄十斤搗絞取汁牛酥白蜜各一斤右先以慢火煎地黄汁減半内牛酥更煎良久次下蜜攪令匀候稀稠於瓷器中盛每日空心午時及晩食前温酒下半匙補益鹿茸煎治精極骨髓虚竭用鹿茸五兩去毛塗酥炙令㣲黄為末以清酒二升於銀鍋中慢火煎膏盛於瓷器中每服空心及晩食前以温酒下半匙白淫附論内經曰思想無窮所願不得則意淫於外入房太甚宗筋施縱發為筋疾及為白淫夫腎蔵天一以慳為主志意内馳則精因而出思想為淫房室太甚則固者摇矣故淫不守隨流而下也然本於筋痿者以宗筋施縱故也七珍丸王氏博濟方補真益氣壯腰膝進飲食治小兒白淫肉蓯蓉半斤細切酒煮爛研成膏補骨脂炒巴㦸天去心附子炮去皮臍各二兩為末杏仁湯浸去皮尖桃仁湯浸去皮尖胡桃仁研各一兩右將後六味搗研為末與蓯蓉膏同研匀更入煉蜜搗三五百杵丸如梧桐子大每服一丸熱酒化下日三服一名四神煎蓮實丸治下元虚冷小便白淫蓮實去皮附子炮去皮臍巴㦸天補骨脂炒各二兩覆盆子炒一兩山茱茰一兩龍骨研半兩右為末煮米糊和丸如梧桐子大每服二十丸空心鹽湯下龍骨湯治小便白淫及遺泄無故自出龍骨研五兩人參白茯苓甘草炙牡蠣煅桂去粗皮熟地黄焙各二兩右為散每服五錢鹽水一盞半煎至八分去滓食前服内補鹿茸丸一名鹿茸丸治勞傷思慮隂陽氣虚益精止白淫方見虚勞門小便餘瀝類金鎖丸一名金鎖子丸治下元虚小便白淫夜夢遺泄方見虚勞門尿精類石斛散治陽虚憊小便白淫石斛去根巴㦸天去心絲子酒浸二宿别搗各三兩杜仲去粗皮炙剉桑螵蛸炒各一兩半右為散每服二錢空心温酒調下至晩再服白石英散治小便白淫白石英研肉蓯蓉酒浸焙澤㵼韭子各一兩白粳米淘五合右為散每服二錢米飲調下食前日三服秘真丸宣明論治小便白淫不止精氣不固及有餘瀝或夢寐隂人交泄龍骨研一兩訶黎炮去皮五箇縮砂仁去皮半兩丹砂研一兩留一錢為衣右為末煮糯米粥為丸如菉豆大以丹砂為衣每日空心熱酒下一丸夜臥冷水下三丸勿多服或大便祕欲通用葱湯㸃茶服之即通陽起石丸楊氏家蔵方治下元虚憊耳鳴面黒腰背疼痛遺泄白淫手足冷肌瘦陽起石煅研一兩白芷黄蠟各半兩生砒研一分右將三味同研匀以黄蠟為丸如梧桐子大每服三丸空心冷鹽湯或冷酒下㣲温亦可服藥後忌熱食少時久服美進飲食補下元暖腰脚天雄散治腎臓虚冷小便白淫方見虚勞門虚勞失精類附礬丸治白淫過甚附子炮去皮臍二兩礬石二兩熬去汁右為末水煮麵糊和丸如梧桐子大每服十丸至二十丸空心夜臥清茶下黄連丸治心腎氣不足思想無窮小便白淫黄連去鬚白茯苓去黒皮右等分為末酒糊和丸如梧桐子大每服三十丸煎補骨脂湯下不拘時金泊丸衞生寳鑑治下焦虚小便白淫夜多夢泄原蠶蛾破故紙韭子炒各一兩牛膝酒浸肉蓯蓉龍骨山茱茰桑螵蛸絲子酒浸已上各一兩右為細末煉蜜為丸如梧桐子大每服三十丸温酒下空心食前服補真玉露衛生寳鑑治隂盛精脱淫樂脛酸白茯苓白龍骨火煅韭子酒浸各二兩絲子酒浸一兩右為細末米醋同麵糊丸如梧桐子大每服五十丸温酒下鹽湯亦得須空心食前服待少時以美飯壓之普濟方卷三十三
