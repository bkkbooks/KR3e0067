草炙赤以上各一分右為細散入麝香牛黄天竺黄朱砂再研令勻每服二錢以竹葉煎湯調下不計時温服茯神丸治傷寒汗後熱不除心神不安茯神一兩麥門冬去心焙一兩羚羊角屑梔子仁白鮮皮川升麻𤣥參以上各二分車前子半兩鐵粉分半細研朱砂半兩細研右為末與鐵粉朱砂同研令勻錬蜜和丸如梧桐子大每於食後煎桑根白皮湯下二十丸治傷寒汗後餘熱不除頭痛内熱出聖惠方麻黄去根節一兩甘草半兩炙㣲赤剉雞子一枚去殻右細剉麻黄甘草二味水一大盞半先煎取一盞去滓下雞子攪令勻更煎三兩沸不計時放㣲温分二服治傷寒十日已上曾發汗未觧煩熱不除大青二兩甘草炙㣲赤剉一兩麥門冬去心一兩右為散末每服五錢水一大盞入豉半合煎至五分去滓不計時温服柴胡飲子治解利大人小兒傷寒柴胡黄芩人參甘草升麻地骨皮赤茯苓赤􅆚藥草龍膽各半兩右㕮咀每服四錢水一盞加薄荷沙糖同煎七分温服不計時小兒分作三服人參散傷寒汗下後餘熱不退或煩或渇面赤者人參梔子藍葉甘草白蘚皮各半兩右剉細每服五錢水煎服治傷寒發汗後身上餘熱未退麻黄去節根􅆚藥細辛牡丹皮去心前胡去毛山茵陳官桂荆芥穗桔梗麥門冬去心羌活各一分右細搗羅為末每服二錢食後熱湯調下木通散治傷寒汗下後足腫有濕氣不除者木通木香檳榔獨活各一兩丹參七錢右剉細每服五錢水煎服枳實􅆚藥乾薑甘草湯治傷寒汗下後氣逆利不止者寒也􅆚藥甘草枳實麩炒乾薑炮各半兩右剉細每服五錢水煎服防葵散治傷寒汗下後臍左有動氣者防葵一兩木香五錢柴胡黄芩各半兩右剉細每服五錢水煎服枳殻散治傷寒汗下後臍上有動氣者枳殻五錢麩炒赤茯苓一兩當歸一兩京三稜炮一兩木香五錢阿黎勒五錢右為細末每服五錢沸湯㸃服前胡散治傷寒汗下後臍右有動氣者前胡赤茯苓各一兩大腹皮人參各五錢木香三錢檳榔大黄各三錢右為細末每服五錢沸湯㸃服茯苓散治傷寒汗下後臍下有動氣者赤茯苓一兩檳榔三錢桂心大腹皮川茴香炮炒良薑各五錢右為細末每服五錢沸湯㸃服如有不治傳為積熱治之難痊不可汗下也調中散治傷寒喫藥轉病熱已減然大腑餘熱出後終未快精神昏悶宜服此柴胡前胡去毛桔梗貝母去心牡丹皮去心黄芩麻黄各一分枳殻只用青梔子各四銖升麻半兩甘草一分右細搗羅為末每服三錢水一盞煎兩三沸食後臨卧去滓任意服治傷寒汗後虚熱用葎草剉研取生汁飲一合愈傷寒煩躁論夫傷寒煩躁者此由陰氣少陽氣勝故熱而煩滿也少隂病惡寒而踡時自煩欲去其被者可治也病已解而反發暴煩者由病新瘥強食為脾胃尚虚不能消也故令㣲煩損糓即愈少陰病脉㣲細沉但欲卧汗出不煩時自吐五六日自利煩躁不得卧寐者死發汗後下之脉平而小煩者此新虚不勝穀氣故也又云傷寒陽氣多陰氣少病發於陽經者故令煩躁其候身熱而煩渇引水漿若胃中乾燥者必譫語亦有少陰經煩躁者當辨傷寒煩躁者為擾擾而煩躁為憤躁之躁合而言之煩躁為熱也析而分之煩也躁也有陰陽之别焉煩陽也躁隂也煩為熱之輕者躁為熱之甚者有煩疼煩滿煩渇虚煩皆以煩為熱也有不煩而躁者為怫怫然便作躁悶此為陰勝隔陽也凡大躁欲于泥水中卧但飲水入口者是也所謂煩躁者謂先煩漸至躁也所謂躁煩者謂先發躁而迤邐復煩者也煩躁之由又為不同有邪氣在表而煩躁者有邪氣在裏而煩躁者有因火刼而煩躁者有陽虚而煩躁者有陰盛而煩躁者皆不同也經曰當汗不汗其人煩躁太陽中風脉浮而𦂳不汗出而煩躁大青龍湯主之此是邪氣在表而煩躁者也病人不大便六七日繞臍痛煩躁發作有時此有燥糞也邪氣在裏而煩躁者也太陽以火熏之不得汗其人必躁太陽病二三日及躁火熨其背令人大汗出大熱入胃躁煩者火刼令煩躁者也陽㣲發汗躁不得眠與下之後後發汗晝日煩躁不得眠夜而安靜不嘔不渇無表証脉沉㣲身無大熱者乾薑附子湯主之及發汗若人之病仍不去煩躁者茯苓四逆湯主之是陽虚煩躁者也少陰病吐利手足厥冷煩躁欲死者呉茱萸湯主之是陰盛而煩躁者也諸如此者証之常也非逆也設或結胸証悉具煩躁者死發熱不利厥逆躁不得卧者死少陰病吐利煩躁四逆者死少陰病四逆惡寒而踡脉不出不煩而躁者死少陰病五六日自利復煩躁不得寐者死是數者又皆為不治之証嗚呼煩躁為常有之疾復有諸不治之証臨病者之側又當熟審焉歌括云煩躁來時熱氣升陰為陽勝大陽經陽明燥糞連臍痛腎㣲陽虚陰躁乗心主火腎主水心熱則煩腎熱則躁傷寒煩躁則有陰陽虚盛之别焉陰虚而陽盛則為煩陽虚而陰盛則為躁有先煩漸加燥者有先躁後復煩者煩其熱之輕躁則熱之甚也或邪在表或邪在裏或陽盛或陰盛或火邪條例不一當詳審而調理之太陽証煩躁寸闗脉浮數身熱是也風寒俱勝其脉浮𦂳無汗而煩躁當汗不汗其人煩躁並用大青龍湯心中悸而煩躁小建中湯熱七八日渇欲飲水五苓散無熱但狂言煩五苓散水調之劇吐之自汗不煩小便數不可與桂枝湯只用􅆚藥甘草湯服桂枝後汗出煩渇其脉洪大白虎加人參湯陽明証煩躁以多日不大便有燥糞故臍痛而煩躁也以承氣湯隨輕重用少陰証煩躁尺寸俱沉厥冷自利是也心煩不得卧黄連雞子湯黄連阿膠湯吐利厥煩躁欲死呉茱萸湯茯苓四逆湯下利咽痛心中煩滿猪膚湯下痢𠻳嘔煩渇不得眠猪苓湯惡寒而踡時而自煩欲去衣被大柴胡湯太陽病以火熏之而不得汗亦至煩躁或火熨脊背令人汗出大熱入胃煩躁並黒豆煎湯解之汗後煩不得眠欲水者少與之小便不利與五苓散下後晝煩夜靜不嘔不渇凡表証脉沉㣲乾薑附子湯若兼懊憹即與梔子豉湯發汗若下之病仍不解而煩躁茯苓四逆湯吐汗下後虚煩心下痞滿氣上衝胸頭眩筋動身為振揺茯苓桂枝白术甘草湯虚煩附入胸滿條瘥後胃弱不能勝穀亦致㣲煩減穀則愈仍與小柴胡湯陰極發躁或陰毒用火熨灸及投熱藥以發躁者並不可誤用凉藥當仍以熱劑可用四逆湯以回陽盖身㣲熱煩躁面赤脉沉而㣲此名陰証似陽也陰發躁熱發厥物極則返也大率以脉為主諸數為熱諸遲為寒凡如此最騐也假令身㣲熱煩躁面赤其脉沉而㣲者皆陰証也身㣲熱者裏寒故也煩躁者陰盛故也面戴陽者下虚故也若醫者不看脉象虚陽上隔煩躁誤以為實熱與凉藥則氣消成大病矣外臺秘要云陰盛煩躁名曰陰躁欲坐井中宜以熱藥治之仲景少隂症面赤者四逆加葱白主之身冷脉細沉疾煩躁而不飲水此名陰盛隔陽也傷寒陰盛隔陽者病人身冷脉細沉疾煩躁而不飲水者是也若欲引飲者非也不欲飲水者冝服下辟保正散須臾躁止得睡汗出即瘥此藥通散寒氣然後熱氣上行汗出乃愈大焰散丹砂丸並主之傷寒論陰盛隔陽病人身冷脉細沉疾煩躁而不飲水者又云大抵陰毒本因腎氣虚寒或因冷物傷脾外感風寒則陽氣不守遂發頭痛腰重腹痛眼睛疼身體倦怠四肢逆冷汗不止或多煩渇精神恍惚若誤服凉藥則渇轉甚燥轉急有此病者便急服辛熱之藥或時鄭聲指甲青黒面赤若陰毒已深病勢困重六脉附骨取之則有按之則無但於臍中用葱熨法或着艾三壯而手足不温者不可治也守真云或下後熱不退或畜熱内甚陽厥急深以至陽氣怫鬱不能營運于身表四肢以致遍身清冷痛甚不堪項背拘急目睛赤疼昏眩恍惚咽乾或痛燥渇虚汗嘔吐下利腹滿實痛煩寃悶亂喘息鄭聲以其虚熱極深而脉沉細欲絶者也未明其造化之理而煩傳於陰毒或失下熱極以致身冷脉㣲而昏冒將死欲急下之則殘陰暴絶陽氣後靜而立死不下亦死病人至此命懸頃刻然則治法當如何曰此當凉膈散或黄連解毒湯養陰退陽但欲虚熱漸漸宣散則心胸腹滿脉漸以生至于脉復有力可以三因承氣湯㣲下之或解毒加大承氣湯尤良俗未明此故認作陰症是以陰陽失其治也素問曰五運行氣論岐伯曰氣有餘則制以所勝而侮所不勝不及則制所以勝侮而乗之已所勝輕而侮之木餘則制土輕侮於金金氣不爭故木恃其餘而欺侮也又木少金勝土反傷木以木不急妄凌之也四季同侮謂侮謾而凌忽之也又云以火煉金熱極反化為水犀角散出聖恵方治傷寒四肢煩躁頭疼口乾壯熱犀角屑甘草炙㣲赤剉枳殻麩炒㣲黄去穰赤􅆚藥麥門冬去心焙赤茯苓葛根剉以上各半兩石膏二兩右㨶篩為散每服四錢以水一鍾煎至六分去滓不計時候温服麥門冬散出聖惠方治傷寒熱盛口乾煩躁不得汗麥門冬半兩去心人參半兩去蘆麻黄一兩去根節梔子仁三分生乾地黄半兩赤茯苓半兩甘草一分炙㣲赤剉木香一分黄芩一分右搗粗羅為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時温服升麻散出聖惠方治傷寒身體痠痛頭面如火心胸煩躁胃膈壅悶不思飲食川升麻三分葛根一兩剉前胡一兩去蘆頭馬牙硝一兩子芩半兩知母半兩赤􅆚藥半兩犀角屑半兩甘草半兩炙㣲赤剉𤣥參半兩麥門冬去心各一兩大腹皮一兩剉右搗粗羅為散每服五錢水一大盞煎至五分去滓不計時温服猪苓散出聖惠方治傷寒發汗後大下胃中乾煩躁不得眠卧欲得飲水者少與飲之令胃和則愈若脉浮小便利㣲熱燥渇者勿服猪苓去黒皮白术澤㵼桂心各一兩赤茯苓二兩右搗細羅為散每服二錢不計時以粥飲調下知母散出聖惠方治傷寒頭疼鼻塞痰壅四肢壯熱增寒恍惚煩躁知母一兩麥門冬一兩去心川升麻一兩桔梗半兩去蘆頭犀角屑半兩柴胡一兩去苖貝母半兩煨令㣲黄赤茯苓半兩地骨皮一兩木通半兩剉赤􅆚藥半兩甘草半兩微炙剉石膏二兩右搗羅為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時温服子苓散出聖惠方治傷寒身體疼痛頭面如火胸中煩躁胃膈壅悶不思飲食子芩半兩麥門冬一兩去心葛根半兩剉川升麻一兩前胡一兩去蘆頭𤣥參半兩犀角屑半兩赤􅆚藥半兩檳榔半兩馬牙硝一兩右搗粗羅為散每服五錢以水一大盞煎至五分去滓不計時温服茵陳散治傷寒後復熱在心煩躁恍惚或多驚恐及不得眠卧茵陳茯神梔子仁赤􅆚藥麥門冬去心黄芩以上各三兩犀角屑一分生乾地黄一兩右搗粗羅為散每服五錢以水一大盞入生薑半分去滓不計時温服治傷寒得汗後身熱未退心神煩躁梔子仁甘草炙㣲赤剉黄蘗剉各一兩右搗粗羅為散每服四錢以水一中盞煎至六分去滓不計時温服治傷寒煩躁不得睡卧方酸棗仁一兩㣲炒甘草一兩炙㣲赤剉豉一合右搗篩水一大盞半煎至一盞去滓不計時分三温服治傷寒未得汗發煩躁心悶麻黄一兩去根節甘草半兩炙赤剉桂心一兩麥門冬半兩去心杏仁半兩湯浸去皮尖雙仁麩炒㣲黄右搗粗羅為散每服五錢水一大盞煎至五分去滓稍熱服覆衣出汗如人行十里未有汗再服梔子仁散治傷寒五六日心膈煩躁壯熱不得卧梔子仁川升麻柴胡去毛石膏生乾地黄甘草炙㣲赤剉葛根剉以上各一兩右搗粗羅為散每服四錢水一中盞入生薑半分煎至六分去滓不計時温服一方無甘草名梔子升麻散不灰木散治傷寒得汗及未得汗煩躁悶亂不灰木二兩用牛糞火燒通赤延胡索子芩黄藥各半兩甘草三分炙㣲赤剉甘菊花半兩羌活半兩右搗細羅為散每服二錢用淡浆水一中盞煎至六分不計時和滓服之葛根散治傷寒煩躁乾逆葛根剉枳殻麩炒㣲黄去穰川大黄剉碎㣲炒麥門冬去心甘草炙㣲赤剉㯽榔以上各半兩右搗粗羅為散每服四錢水一中盞煎至六分去滓不計時温服茯苓四逆湯治傷寒汗下後病仍不解煩躁者白茯苓去黒皮四兩人參一兩附子一枚生去皮臍破八片甘草二兩乾薑一兩半右剉如麻豆每服五錢水一盞半煎至八分去滓温服呉茱萸湯治傷寒少陰病吐利手足冷逆煩躁欲死者呉茱萸湯洗焙炒一升人參二兩右㕮咀每服五錢水一盞半生薑棗大切大􅀥二枚擘煎至八分去滓温服日三知母湯治傷寒煩躁不解脉大喘熱頭疼知母栝蔞根甘草㣲炙一兩石膏二兩右粗搗篩每服三錢水一盞入粳米少許煮米熟去滓温服不拘時黄芩散治傷寒頭痛大熱煩躁黄芩去黒心𤣥參各二兩大黄剉炒甘草炙剉枳殻去穰麩炒各一兩升麻一兩半焙右搗羅為散每服二錢熟水調下大黄湯治傷寒心神煩躁壯熱狂言毒氣畱於胸膈大黄剉炒黄連去鬚甘草炙各半兩剉麥門冬去心焙柴胡各一兩去苗右搗篩每服三錢水一盞入竹葉十片生薑三片煎至六分去滓温服不拘時葛根散治傷寒煩躁退熱葛根剉黄耆剉甘草炙剉各五兩石膏研三兩小梔子仁八兩右搗研為散每服二錢新汲水入蜜調下大安丸治傷寒煩躁悶亂凝水石半斤煅赤黄土焙兩宿取水研末用菠薐汁和作餅陰乾再研又和又陰二次為度朴硝四兩甘草二兩炙剉為末右同研勻細用菠薐汁和丸難丸即入少許炊餅丸如彈子大又一等如梧桐子大每服一丸生地黄汁化下如復躁時即化大丸子下小丸子十五丸只一服即定如急迫無地黄汁新水化下不灰木散治傷寒大熱煩躁悶亂不􅁅木二兩滑石研凝水石研板藍根甘草生各一兩右搗研為散每服二錢用生米泔化乳糖一棗大調下雞清散治傷寒煩躁悶亂不解用鬱金二枚生用一枚煨熟一枚共搗羅為散以新汲水一盞生雞子清一枚調勻頓服取利一行躁熱立定八石散代赭石三兩凝水石甘草炙剉另為末不灰木各八兩金星石銀星石雲母石膏太陰元精石各四兩陽起石一兩生另研右除陽起石甘草外餘八味固濟瓷罐中嵌口約一秤炭火煅赤頻將代赭出醋中淬五度去火候冷取出濕地上紙襯盆合土葢兩宿搗羅更細研三二日入陽起石甘草末伴勻每服半錢至一錢生薑蜜水或新汲水調下凝水石丸治寒躁悶口乾時渇狂言亂道凝水石半斤用炭火半秤燒半日取出放濕土上出火毒研兩日令極細以磁器盛於井中浸一宿龍腦研硼砂各一分研甘草炙剉為末一分天竺黄半兩研右研勻細糯米粥和丸如彈子之大每服一丸生薑蜜水化下梅紅湯治傷寒煩躁狂言咽膈壅悶口乾多渇烏梅肉炒知母焙貝母去心藿香葉五味子蛤粉人參赤茯苓去黒皮大黄剉炒甘草炙剉各一兩右粗搗篩每服三錢水一鍾入小麥竹葉煎至六分去滓温服必效散治傷寒熱盛狂躁悶亂欲發黄皮發瘡疹熱毒氣盛口乾煩躁生地黄生地膽草生龍膽草並碎絞取汁三件共一盞同浸剉碎甘草末一兩候汁盡陰乾菠薐紫葉肥者去莖陰龍半兩龍腦一錢研牛黄半錢研右搗羅甘草菠薐為末與牛黄合研每服二錢研林檎絞取汁新汲水相和勻調服如大段躁熱及欲發黄即另入龍腦少許相和雞子清調服小兒服或半錢鉛霜散治傷寒三日後心煩躁熱狂言鉛白霜一分馬牙硝一兩右研勻每服半錢生薑蜜水調下小兒服一字蘆根湯治傷寒陽毒五六日以上但胸中燥熱乾嘔躁悶蘆根一兩知母焙栝蔞根柴胡去毛黄芩去黒心甘草右粗搗篩每服二錢水一盞生薑三片煎至七分去滓温服不拘時龍膽湯治傷寒温病後煩躁龍腦萎㽔􅆚藥黄芩去黒心石膏升麻麻黄去根節甘草炙剉各三分葛根一兩桂去粗皮大青各半兩右粗搗篩每服三錢水一盞生薑一棗大拍碎煎至六分去滓温服人參湯出聖濟總録治傷寒七八日汗後心煩躁渇人參黄芩去黑心柴胡去毛葛根剉各一兩山梔子仁甘草各半兩右搗粗篩每服五錢水一盞半生薑一棗大拍碎煎至七分去滓不計時温服硝石丸出聖濟總録治傷寒煩躁身熱譫妄硝石半兩丹砂一分右細研糯米粥和丸如櫻桃大每服一丸生糯米汁入油一兩㸃化藥青栁枝攪勻服神應散出聖濟總録治傷寒陰陽不和順發煩悶亂氣虚乾逆丹砂研石硫黄研各一錢上硝一錢蛤粉三錢半人參白茯苓去黒皮各一分右搗羅為散每服一錢用芝蔴水調下不計時服紫金散治傷寒有熱煩躁不安者焰硝八兩硫黄四兩代赭石三兩甘草三兩焙右為散更於臼中治之生薑蜜水和方寸匕服之其躁即止知母湯治陽明病身冷而内煩者知母葛根白术甘草炙各一兩右剉以水三升煮取一升五合去滓温服五合治發熱惡寒大渇不止煩躁肌熱不欲近衣其脉洪大按之無力或目痛鼻乾者非白虎湯症也此血虚發躁故也黄耆一兩當歸身二錢右㕮咀水煎服治傷寒服藥搶心煩躁出本草以䜴一升梔子仁四枚剉水三升煎取一升分三服普濟方卷一百三十二
