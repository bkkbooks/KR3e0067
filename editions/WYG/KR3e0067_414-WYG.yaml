body:
  text: 普濟方巻四百十四明周王朱橚撰鍼灸門腧穴圖頭部中行十穴外神聰四穴明堂一穴神庭一穴在鼻直入髮際五分灸七壯止七七壮岐伯曰凡欲療風勿令灸多縁風性輕多則傷宜灸七壮止二七壯禁鍼鍼即發狂忌生冷鷄猪羊魚肉酒麵動風等物明堂經云舉火之時忌熱食不宜熱衣亦云灸三壯銅人經云在髮際直鼻上督脉入髮際一寸灸二七壮至百壮治腫氣風癎癲風戴目上不識人羊鳴吐舌角弓反張棄衣而走披髮而行或歌或哭多學人言語驚悸不得安寢頭痛喘渇目不可視目淚出鼻清涕不止又云灸足太陽陽明脉之㑹主頭風目眩上星一穴在鼻直上入髮際一寸䧟中明堂云容豆是以細三稜鍼刺之即宣洩諸陽熱氣無令上衝頭目可灸七壮不宜多若頻灸之即㧞氣上令目不明忌如前甲乙經熱穴論注並刺三分銅人經云在額顱上直鼻中央入髮際一寸督脉氣所發治頭風面赤腫皮虛腫鼻塞不聞香臭頭痛目眩赤瘧疾發寒熱病汗不出目晴痛不能遠視又云鍼入三分留十呼瀉五吸鍼下氣盡更停鍼引之得氣即瀉灸亦得然不及鍼日灸三壯至百五壯罷須停十餘日然後更灸故不用相續加灸滿五十壮即以細三稜鍼刺頭上以宣熱氣忌酒麫蕎麥􅇟㑹一穴在上星後明堂經云上星上一寸䧟中可灸二七壯至七七壯初灸即不痛病去即痛亦云灸五十壯痛即罷灸鍼二分留三呼得氣即瀉若八歲以下不得鍼縁􅇟門未合刺之不幸令人夭素問注云刺四分銅人經云在上星後一寸䧟中可容豆督脉氣所發治目眩面腫鼻塞不聞香臭驚癎戴目上不識人若是鼻塞灸至四日漸退七日頓愈頭風生白屑多睡鍼之彌佳針訖以塩末生麻油相和揩髮根下頭風即永愈忌熱麫猪魚蕎麥等物明堂經云主頭皮腫靣赤資生經王氏云予少刻苦年踰壮患腦冷或飲酒過多則腦疼如破後因灸此穴非特腦不復冷他日酒醉腦亦不疼矣凡腦疼冷者宜灸此前頂一穴在􅇟㑹後寸半骨䧟中亦云在􅇟㑹上甄權云一寸今依素問寸半為定鍼一分灸三壯止七七壯素問注云刺四分銅人經云腎脉所發療頭風熱痛目眩頭面赤腫小兒驚癎風癎癲癡發作無時鼻多清涕頂疼痛又云針入三分留七呼瀉五吸大腫極即以三稜鍼刺之遶四方一寸以下其頭疼腫立差復以鹽末生麻油揩髮際下灸亦得忌如前法明堂經云在􅇟㑹後一寸直鼻中央䧟者中治頭皮腫百㑹一穴一名三陽五㑹在前頂後一寸半頂中央旋毛中可容至灸七壮止七七壯凡灸頭頂不得過七壮縁頭頂皮薄灸不宜多針二分得氣即瀉素問注云刺四分銅人經云腎脉足太陽交㑹於頂上治大人小兒脱肛久不差風癎青風心風中風角弓反張羊鳴或多哭言語不擇發作無時發時即死盛即吐沫心煩驚悸健忘心神恍惚痎瘧耳鳴耳聾鼻塞不聞香臭又云療頭風頭痛目眩多睡無心力吃食無味頭重飲酒靣赤如灸數至百五即停三五日訖繞四畔以三稜鍼刺令出血以井花水淋之令氣宣通不得令向火灸恐㧞氣上令人眼暗忌酒麺猪魚蕎麥蒜虀等資生經云唐秦鳴鶴鍼髙宗頭風武后曰豈有至尊頭上出血之理已而刺之微出血頭疼便立止后亟取金帛賜之是刺此穴能治頭風明堂經中風言語蹇澁半身不遂者灸七處亦先於百㑹北人始生子則灸此穴盖防他日驚風也王氏云予舊患心氣偶覩隂陽書有云人身有四穴最急應四百四病皆能治之百㑹盖其一也因灸此穴而心氣愈後閲灸經此穴果主心煩驚悸健忘身無力自是間或灸之百病皆主不特治此數病已也一名天蒲神聰四穴在百㑹四靣各相去同身寸一寸理頭風目眩狂亂風癎左主如花右主如果鍼三分明堂經有此穴而銅人無之其穴治頭風目眩狂亂風癎亦所不可廢者故附入於此明堂一穴在鼻直上入髮際一寸理頭風多鼻涕鼻塞三日一報針二分銅人經云針三分按銅人明堂經諸家針灸經鼻直上入髮際一寸皆云上星穴明堂經於此復云明堂穴不知何所據且附入於此所謂疑以傳疑也今以諸經挍勘上星穴後頂一穴一名交衝在百㑹後寸半玉枕骨上䧟者中灸五壮鍼二分明堂經云四分銅人經云鍼入四分灸五壮主風眩目􅉩􅉩額顱上痛亦云鍼入三分又云督脉氣所發治頸頂惡風寒頭偏痛明堂經云灸三壯主目不明頭目眩重西方子云主諸陽之熱嘔吐癲疾强間一穴一名大羽在後頂後寸半灸七壮針二分亦云五壯銅人經云督脉氣所發主頭如鍼刺不可以動項如㧞不可左右顧視又云治腦旋目暈頭痛不可忍煩心嘔吐涎沫發作無時項頂强明堂經云灸三壯岐伯云兼治風癎病西方子云主癲疾癎發狂走不得卧腦户一穴一名合顱在枕骨上强間後一寸半禁鍼鍼令人瘂可灸七壮亦可不妄灸令人夭明堂經云灸令人失音鍼三分素問註云四分甲乙云不可灸銅人經云一名仰風一名㑹顱是督脉足太陽之㑹主目睛痛不能遠視靣赤頭腫目黄又銅人經云禁針素問明堂經云鍼入三分四分亦可疑矣何如不鍼為穏素問盖云刺腦户入腦立死故也風府一穴一名舌本在項後髮際上一寸大筋内宛宛中經言其肉立起立休立下禁灸使人失音鍼三分銅人經云一名舌本督脉陽維之㑹治頭痛頸急不得回顧目眩鼻衂喉咽痛狂走目妄視又主頭項急不可傾側鼻不可息嗌痛足不仁明堂經云主暴瘖不得言多悲恐驚悸欲自殺目反視又云四分留三呼又云舌緩針風府資生經云岐伯對黄帝傷寒之問曰巨陽者諸陽之属也其脉連於風府諸穴為諸陽主氣也然則風府者因傷寒所自起也北人皆以毛裹之南人怯弱者亦以帛䕶其項俗謂三角是也王氏云予少怯弱春冬湏數次感風自用物護後無此患矣凡怯弱者須䕶項後可也瘂門一穴一作瘖一名舌横一名舌厭在頂中央入髮際五分宛宛中督脉陽維之㑹入繫舌本仰頭取之禁灸令人瘂鍼三分素問註云在項後髮際宛宛中去風府一寸明堂經云舌息不言如何治荅曰舌息鍼瘖門舌緩鍼風府得氣即瀉小繞針鍼入八分留三呼瀉五吸瀉盡更留鍼取之得氣即瀉銅人經云治頭項强舌緩不能言諸陽熱氣盛鼻衂血不止頭痛頭風汗不出寒熱風痙脊强反折瘛瘲疾頥重鍼二分曲差二穴在神庭兩旁寸半入髮際鍼三分灸三壯銅人經云足太陽脉氣所發治心中煩滿汗不出頭項痛身體煩熱目視不明鍼入二分灸三壯五處二穴在上星兩旁寸半鍼三分留七呼灸三壯明堂經云灸五壯銅人經云足太陽脉氣所發治目不明頭風目眩瘛瘲目戴上不識人西方子云在頭上去上星傍一寸主脊强反折癲疾頭痛又云在頭督脉傍去上星二寸半主風痺悶承光二穴在五處後寸半鍼三分禁灸明堂經云在五處後二寸素問註云一寸銅人經云足太陽脉所發治鼻塞不聞香臭喎鼻多清涕風眩頭痛欲嘔吐心煩目生白膜忌如前法通天二穴在承光後寸半鍼三分留七呼灸三壯銅人經云足太陽脉氣所發治頸項轉側難鼻塞悶偏風口喎鼻多清涕衂血頭重又云主項痛重暫起仆僵喘息不利齀衂有瘡絡穴二穴一名强陽又名腦盖在通天後寸半灸三壯素問註云刺三分留五呼西方子云主癲疾嘔吐狂走瘛瘲恍惚不樂腹脹滿不得息暫起仆僵銅人經云足太陽脉氣所發治青風内瘴目無所見頭旋耳鳴玉枕二穴在絡却後寸半明堂經云絡却後七分半狹腦户腦户在强間後一寸半傍一寸三分起肉枕骨入髮際上三寸灸三壯主頭重如石目痛如脱不能逺視銅人經云足太陽脉氣所發腦風寒痛不可忍者又云主目内攣系息痛頭寒汗多耳聾鼻塞西方子云失枕頭重項痛風眩頭中寒痛項如㧞不可左右顧目上揷卒起僵仆惡見風寒汗不出悽厥惡寒腦風明堂經又云鍼三分素註云留三呼甲乙經云二分資生經云銅人經云玉枕在絡却後一寸半明堂上下經皆云七分半若以銅人為悞則足太陽穴亦同若以明堂為誤不應上下經皆誤也小本明堂亦同王氏按素問註云玉枕在絡却後七分則與明堂之七分半相去不逺矣固當從素問為凖然而玉枕二穴既夾腦户不應止七分則止於腦盖也銅人之一寸半盖有説焉識者當詳辨之今總諸經校勘在絡却後寸半者是天柱二穴在夾項後髮際大筋外廉䧟中一云在宛宛中五分得氣即瀉明堂經云二分留三呼瀉五吸灸不及鍼日七壯至百五壯下云三壯素問註云刺二分銅人經云足太陽脉氣所發鍼二分主頭風目如脱項如㧞項疼頭重先瀉而後補之灸亦得然不及鍼忌如前法明堂經云主項痛頸强左右不可顧頭痛目不明目淚出鼻不知香臭風眩暴卒癎眩狂言不休目上煩滿汗不出足不仁身肩背痛欲折頭旋腦痛眉衝二穴一名小竹當兩眉頭直上入髮際是療目五般癎頭痛鼻塞不灸通鍼三分明堂上經有眉衝穴而銅人經云無之療目五般癎頭痛鼻塞治疾所不可廢者其穴與曲差相近故附於此臨泣二穴在目上皆直入髮際五分陷中鍼三分留七呼得氣即瀉忌囬素問註云灸五分銅人經云足太陽少陽之㑹主卒中風不識人風眩鼻塞目生白翳多淚忌如前法西方子云主腋下腫喜驚頰胷痺心痛不得反側瘧日夜發脇下痛資生經云足少陽有臨泣穴矣此亦有之蓋此乃頭臨泣也目窻二穴在臨泣穴後一寸鍼二分灸五壯今附三度刺目大明銅人經云足少陽陽維之㑹治頭靣浮腫痛引目外眥赤痛怱頭旋目􅉩􅉩遠視不明西方子云主諸陽之熱頭痛寒熱汗出不惡寒目眩瞑唇吻强上齒齲痛正營二穴在目窻下後一寸鍼三分灸五壯銅人經云足少陽陽維之㑹治齒痛唇吻急强齒齲痛頭項偏痛西方子云主諸陽之熱承靈二穴在目窻後寸半灸三壯素問註云刺三分銅人經云足少陽陽維之㑹治頭腦疼惡風寒齀鼻塞息不利西方子云主鼻衂窒喘息不通腦空二穴一名顳顬在承靈後寸半夾玉枕骨下陷中鍼五分得氣即瀉灸三壯銅人經云足少陽陽維之㑹治腦風頭痛不可忍目瞑心悸發即為癲風引目眇勞疾羸瘦體熱頸項强不得囬顧魏公苦患頭風發即心悶亂目眩華陀當鍼而立愈西方子云主鼻管疸發為厲鼻勞衂不止耳風鳴聾素問註云按腦空在枕骨後枕骨上甲乙經作玉枕骨中忌如前法明堂經云灸七壯主狂病身寒熱風池二穴在腦空後髮際陷中鍼七分留七呼灸三壯明堂經云在項後髮際䧟中甲乙經云腦空後髪際陷中鍼一寸三分大患風者先補後瀉少可患者以鍼取之留五吸瀉七吸灸不及鍼日七壯至百五艾炷不用大忌同西方子云主鼻衂窒喘息不通癲仆煩滿口癖惡寒銅人經云足少陽陽維之㑹治洒淅寒熱温病汗不出目眩苦頭痛痎瘧頸項痛不得囬顧目淚出欠氣多鼻齀衂目内眥赤痛氣發耳塞目不明腰傴僂引項筯無力不収鍼入七分可灸七壯又云主肺風面赤目􅉩􅉩項强靣腫皮軟腦頭痛灸亦良然不及鍼問曰如後髮際亦有項脚長者其毛首至頭骨亦有無項脚者毛齊至天牖穴即無毛根而何取穴也荅曰其毛不可輙定大約如此若的的定中府正相當即是側相去各二寸此法定穴當陽二穴當瞳人直上入髮際一寸療目不識人風眩鼻塞鍼三分資生經云銅人無當陽穴而明堂下經有之理卒不識人風眩鼻塞等疾亦不可廢者其穴與臨泣相近故附於此頷厭二穴在曲鬢下明堂陽穴無下字明堂同腦空上廉灸三壯鍼七分留七呼忌同明堂經云二分素問注云在曲鬢下腦空上上廉刺七分若深令人耳無所聞銅人經云手足少陽陽明之交㑹治頭風眩目無所見遍頭痛引目外眥急耳鳴多嚏頸項痛又云二穴在曲鬂顳顬上廉懸顱二穴在曲上足少陽穴同明堂無上字腦空中灸三壯鍼三分留三呼明堂經云二分素問注云在曲上腦空下亷新校正云按後手少陽中云鬂上此云鬂下必有一誤懸顱二穴在曲鬂上是也銅人經云足少陽脉氣所發治熱痛煩滿汗不出頭偏痛引目外眥赤身熱齒靣膚亦痛西方子云主熱痛引目内眥忌如前懸釐二穴在曲鬂上足少陽穴無上字腦空下廉鍼三分灸三壯銅人經云手足少陽陽明之交㑹治熱病汗不出頭偏痛煩心不欲食目兑一作内眥赤痛西方子云二穴在曲鬂顳顬下廉主靣皮赤腫痛癲疾互引善驚羊鳴天衝二穴在耳上如前三寸足少陽穴啚灸七壯鍼三分銅人經云二穴在耳上如前三分治頭痛癲疾風痙牙齗腫善驚恐可灸七壯鍼三分西方子云亦作天衢率谷二穴在耳上入髮際寸半陷者宛宛中灸三壯鍼三分明下云鍼而取之銅人經云足太陽少陽之㑹治膈胃寒痰傷酒風熱發兩目眩痛腦兩角弦痛不能飲食煩滿嘔吐不止曲鬢二穴在耳上髮際曲隅陷中皷頷有空明作穴鍼入三分可灸七壯明下云曲髮灸三壯指齒在耳上将耳掩前正尖上銅人經云足太陽少陽之㑹治頰頷腫引牙車不得開息急痛口噤不言灸亦良明堂經云主頸項急强不得顧引牙痛西方子云主暴瘂不能言齒齲痛銅人經云曲髮足少陽穴同素問亦同明堂下經云曲髮疑髮字誤也曲鬢穴是曲髮字誤角孫二穴在耳郭中間止開口有空明作穴治目生膚翳齒齗腫灸三壯明堂别無療病法明堂經云主牙齒不嚼物齲痛腫鍼八分銅人經云手足少陽之㑹又云手足少陽手太陽之㑹西方子云主頭腫項痛不可顧頸頷柱滿資生經云按明堂經云角孫主牙不嚼物齲痛腫則有療病法矣銅人乃云明堂别有療豈後人增益之耶将所治止此因謂之無療病法歟竅陰二穴在枕骨下少陽穴云完骨上揺動有空鍼三分灸七壯明堂經云灸五壯鍼四分在完骨上枕骨下完骨二穴在耳後入髮際四分銅人經云足太陽少陽之㑹治勞疸發厲頭痛引頭目痛又云主骨疽西方子云主頭痛如錐刀刺不可以動主頷痛引耳嘈嘈耳鳴無所聞舌本出血及主舌寒口乾心煩臂外肘莭痺不能伸鼻管疽發為齀鼻衂頭痛及四肢轉筋癰疽頭痛風惡引頭目浮白二穴在耳後入髮際一寸鍼五分灸七壯明堂經云三壯三分銅人經云足太陽少陽之㑹治發寒熱喉痺氣痺欬逆痰沫疝積胷中滿不得喘息耳鳴嘈嘈無所聞頸項癰腫及癭氣肩背不舉悉皆治之又云主疝積不能言西方子云主牙齒痛手縱足緩不收顱􅇟二穴在耳後間青絡脉灸七壯不宜鍼明堂經云顱􅇟在耳後青絡間灸三壯鍼一分不得多出血出血多殺人銅人經云足少陽氣脉所發治身熱頭重脅痛不得轉側風痙耳聾小兒發癎瘛痰喘不得息嘔吐延沫驚恐失精瞻視不明不宜鍼即可灸七壯又云主耳痛塞鳴胸脇相别不得俛仰及治頭眩瘛脉二穴一名資脉在耳本後鷄足青絡脉刺出血如豆汁不宜出血多灸三壯鍼一分明堂經云在内鷄足青脉銅人經云治頭耳鳴小兒驚癎瘛瘲嘔吐洩痢無時驚眵瞢目精耳不明耳後痛西方子云不灸完骨二穴在耳後入髮際四分灸七壯鍼三分明堂經云二分灸依年壯銅人經云足太陽少陽之㑹治頭痛煩心癲疾頭靣虛腫齒齲偏風口眼喎邪頸項痛不得囬顧小便赤黄喉痺頰腫鍼入五分又云主風眩項痛頭强寒熱鍼二分西方子云主肘腫足痿失履不收頭風耳後痛煩心及足不收僵仆狂瘧項强急痛翳風二穴在耳後陷中按之引耳中鍼七分灸七壯明堂下經云三壯在耳後尖角陷中銅人經云手足少陽之㑹治耳聾口眼喎鍼失穴脱頷口禁不開不能言頰腫牙車急痛西方子云主耳鳴口禁不開引鼻中口失欠及牙齒痛明堂經云主耳聾暴瘂青髎一穴一名靣正在鼻柱之端外臺云不宜灸鍼一分銅人圖經云督脉所發此穴諸方闕治療法千金治鼻塞痘肉不消多涕生瘡水溝一穴一名人中在鼻柱下宛宛中鍼四分留五呼得風即瀉灸不及鍼日三壯若灸可艾炷如小雀糞風水面中腫鍼此一穴出水盡頓愈明堂經云灸三壯至二百罷若是水氣唯得鍼此穴若鍼餘穴水盡即死下云灸五壯銅人經云水溝在鼻柱下一名人中督脉手陽明之㑹治消渇飲水無度水氣偏身腫失笑無時癲語不識尊卑乍喜乍哭牙關不開靣腫唇痛葉葉肺風伏如蟲行卒中惡鍼此一穴出水盡即頓愈又云鍼入四分徐徐出之西方子云主寒熱頭痛喘渇目不可視鼻不聞香臭口喎僻不能開水漿禁瘖不能言寒熱卒中惡風水靣腫忌如前法兑端一穴在唇上端鍼二分灸三壯炷如大麥明堂下經云在頥前下唇下宛宛中開口取之銅人經云治癲疾吐沫小便黄舌乾消渇衂血不止脣吻强齒齗痛鍼入三分可灸三壯明堂經云主口噤皷頷斷交一穴在脣内齒上齗縫筋中鍼三分灸三壯銅人經云治靣赤心煩痛頸項急不得回顧小兒靣瘡癬久不除㸃烙亦佳鼻塞不利目淚眵汁内皆亦癢痛生白膚翳鼻中息肉蝕瘡西方子云在脣内齒縫灸三壯主鼻窒喘息不利鼻喎僻多涕齀衂有瘡頭頷頞中痛口不能飲水漿喎僻口噤不開項如㧞不可左右顧靣赤頰中痛心煩痛承漿一穴一名懸漿在頥前唇下宛宛中日灸七壯止七七壯灸即血脉通宣其風立愈炷依小筯頭作鍼三分得氣即瀉明堂經云頥前下唇之下鍼三分半得氣即瀉瀉盡更留三呼徐徐引氣而出日灸七壯過七十停四五日後灸七七若急灸恐足陽明脉斷令風不差停息復灸令血脉通宣其風立愈下云唇稜下宛宛中銅人經云足陽明任脉之㑹療徧風口喎面腫消渇口齒疳蝕生瘡灸亦佳日可灸七壯至七七壯止矣其艾炷不用大一依小筯頭作炷脉粗細狀如細線艾炷破肉但令當脉灸雀糞大亦能愈疾凡灸臍下灸令疝瘕痃癖氣塊伏梁積氣宜灸炷大故小品諸方云腹背宜灸五百壯四肢則但去風邪不宜多灸七壯至七七壯止不得過隨手數如巨闕鳩尾雖是胷腹之穴灸不過七七壯艾炷不湏大以行筯頭則炷正當脉上灸之若灸胷腹艾炷大灸多令人永無心力如頭頂穴若灸多令人失精神臂脚穴灸多令人血脉枯竭四肢細度無力既腹失精神又加於細度即脱大真氣忌如前法明堂經云療消渇飲水無休口噤不開及暴瘂不能言也西方子云主靣風目眩瞑小便黄或不禁廉泉一穴一名舌本在頷下結喉上明云舌本間灸三壯鍼三分得氣即瀉明堂經云二分千金云當頥直下骨後陷中銅人經云隂維任脉之㑹治舌下腫難言舌縱涎出欬嗽上氣喘息嘔沫口噤舌根急縮下食難攢竹二穴一名始光一名光明一員柱兩眉頭少䧟宛宛中不宜灸針一分留三呼瀉三吸徐徐出針宜以細三稜針刺之宣洩熱氣三度目大明明云宜細三稜針針三分出血下云灸一壯銅人經云足太陽脉氣所發治目􅉩􅉩視目不明眼中赤痛及瞼瞤動明堂經云主頭目風眩眉頭痛鼻齀衂但是口厥顛狂痛神邪鬼魅主之忌如前法精明二穴一名涙孔在目内針一寸半留三呼雀目者可灸留針然速出禁灸明云目内眥頭外畔䧟宛宛中針分半留三呼補不宜灸一云目内眥外一分銅人經云手足太陽少陽明五脉之㑹治攀睛翳膜覆瞳惡風淚出目眥癢痛小兒雀目疳眼大人氣冷眼淚遮目視物不明大眥努肉侵睛針一寸五分留三呼禁灸資生經云按明堂針一分半銅人乃云入一寸半二者必有一誤王氏云予觀靣部針淺者一分深者四分素問氣府注云刺入一分則是銅人誤冩一分為一寸也巨髎二穴夾鼻孔傍八分直目瞳子蹻脉足陽明之㑹鍼三分得氣即瀉灸七壯明堂經云巨窌在鼻孔下夾水溝旁八分蹻脉足陽明之㑹鍼三分灸七七壯銅人經云治青盲目無所見遠視􅉩􅉩白翳覆瞳子面風寒鼻塞䪼上腫壅痛瘛瘲口喎僻鍼入三分灸亦良西方子云療招揺視瞻目淚出多赤痛癢迎香二穴在禾髎上一寸鼻下孔傍五分鍼三分留三呼不宜灸銅人經云手足陽明之㑹治鼻瘜肉不聞香臭衂血偏風口喎靣癢浮腫風動葉狀如蟲行刺或在唇動或癢腫痛忌如前法禾髎二穴在鼻孔下夾水溝旁五分鍼二分又手陽明穴云禾髎一名長頰直鼻孔夾水溝旁五分明堂經云灸三壯銅人經云手陽明脉氣所發治鼻衂不止鼻流清涕生瘡口噤不開及尸厥也西方子云主鼻窒口僻資生經云銅人經云禾髎二穴在鼻下夾水溝旁五分明堂下經作禾窌窌即髎也上經乃作禾髎皆在鼻下夾水溝旁五分則是一穴也而銅人手陽明穴復有和窌二穴在耳前兑素問作鋭髮䧟中其穴遠矣恐明堂經誤禾字作和字陽白二穴在眉一寸直目瞳子灸三壯鍼入二分銅人經云足少陽陽維之㑹治頭目痛目眵皆􅀈寒慄重衣不得温西方子云主目瞳子痛癢遠視􅉩􅉩昏夜無所見目系急目上揷承泣二穴在目七分直目瞳子陷中禁鍼鍼之令人目烏色可灸二壯炷勿大明堂經云鍼入四分半得氣即瀉特不宜灸若灸無問多少三日後眼下太如拳息肉日加長如桃大至三十日定不見物腫或如五升許大銅人經云蹻脉任脉足陽明之㑹治口眼喎斜目瞤面葉葉動牽口眼目視􅉩􅉩冷淚眼眥赤痛禁不宜鍼可灸三壯西方子云不灸資生經云銅人經云此穴可灸三壮禁鍼鍼之令人目烏色明堂乃知其若是不鍼不灸可也四白二穴在目下一寸灸七壯鍼三分凡用鍼穏審方得下鍼深即令人目烏銅人經云足陽明脉氣所治頭痛目眩眼生白翳微風目瞤動下急西方子云主目眗淚出多眼内眥赤痛癢地倉二穴夾口吻旁四分外如唇下有脉微動是也鍼三分明云鍼三分半留五呼得氣即瀉日可灸二七壯重者七七炷麤釵脚大炷若大口轉喎却灸承漿七七即愈銅人經云蹻脉手陽明之交㑹若乆患風其脉亦有不動者治偏風口喎目不得閉失瘖不語飲食不收水漿漏落眼瞤動止病左治右病右治左忌猪肉魚熱麵毒物房勞等大迎二穴在曲頷前一寸二分骨陷中動脉又以口下當兩眉鍼三分留七呼灸三壯銅人經云足陽明脉氣所發治寒熱頸痛瘰癧口喎齒齲痛數欠氣痓口噤牙疼頰頷腫惡寒舌强不能言風壅而腫目不得閉唇吻瞤動不止當鍼之頓愈西方子云治口噤不開引鼻中口涎不收本神二穴在曲差傍一寸半云直耳上入髮際四分鍼二分灸七壯銅人經云足陽明少陽維之㑹治目眩頸項强急痛胷脇相引不得轉側癲疾嘔吐涎沫鍼入三分可灸三壯西方子云療小兒驚癎絲竹空二穴一名目髎在眉陷中鍼三分留二呼宜瀉不宜補禁灸使人目小又令目無所見銅人經云少陽脉氣所發禁不可灸治目眩頭痛目赤視物眩眩風癎目戴上不識人眼睫毛倒發狂吐涎沫發作無時瞳子髎二穴自目外眥五分灸三壯鍼三分素問注云在目外眥五分千金主云一名火陽一名前關銅人經云手太陽手足少陽之㑹治青盲無所見遠視􅉩􅉩目中膚翳白膜頭痛目外赤痛又云灸二壯西方子云不可灸顴髎二穴在靣頰骨下廉兑骨端陷中鍼二分銅人經云手少陽太陽之㑹治喎靣赤目黄眼瞤動不止䪼腫齒痛鍼入三分西方子云主口喎僻不能言及口僻痛惡風寒不可以嚼齒痛頭維二穴在頷角入髪際本神傍一寸半鍼三分禁不可灸本神在曲差傍中半銅人經云足少陽陽明脉之交㑹治頭偏痛目視不明亦治微風眼瞼瞤動不止風淚出上關二穴一名客主人在前起骨上亷開口有空動脉宛宛中灸七壯艾炷不用大筯頭作炷若鍼必須側卧張口取之乃得禁鍼深問曰何以不得鍼深岐伯曰上關若刺深令人欠而不得欬下關灸留鍼即欵而不得牙關急是故上關不得鍼深下關不得久留鍼也明堂經云客主二穴入一分留之得氣即瀉日灸七壯至二百炷不用大其鍼灸之必須側卧開口取之乃得穴避風下云灸一壯銅人經云足陽明少陽之㑹治唇吻强耳聾瘛瘲口沫出目眩牙車不開口噤嚼食難偏風口眼喎斜耳中伏如蟬聲西方子云灸三壯主青盲無所見耳痛口喎僻不能言明堂經云主牙齒齲痛資生經云按素問刺禁日刺客主人内陷中脉為内漏為聾註云言刺太深則交脉破决故為耳内之漏則氣不營故聾審若是又不止令人欠而不得欬而已用鍼者所當知也下關二穴在上關下耳前動脉下廉合口有空開口即閉鍼入四分得氣即瀉禁灸又云下關不得久留鍼側卧閉口取之銅人經云足陽明少陽之㑹療停耳有濃汗出偏風口目喎牙車脱臼其穴側卧閉口取之牙齗腫處張口以三稜鍼出濃血多含鹽湯即不畏風西方子云灸三壯主耳痛鳴聾牙齒痛齲痛忌如前法前關二穴在目後半寸亦名太陽之穴理風赤眼痛目眩目澁不灸鍼三分資生經云銅人有上關下關各二穴素問亦同明堂上下經但有上關而無下關惟上經有前穴又不與下關穴同在上關之下恐别自是前關穴一名太陽穴理風赤眼頭痛目眩澀等疾所不可廢故附入于下關之後和髎二穴在耳兑髮下横動脉鍼七分灸三壯素問註在耳前鋭髮下横動脉銅人經云手少陽脉氣所發治車引急風頭重痛耳中嘈嘈頷頰腫和髎二穴在耳前髪陷中明堂上經云和窌即髎也在鼻孔下夾溝旁五分即銅人之禾髎明堂下經之禾窌也或者明堂上經誤寫禾字作和字耳恐人以和髎和窌為一穴故備論也聼㑹二穴在耳微前陷中上關下一寸動脉宛宛中張口得之鍼七分留三呼得氣即瀉不湏補日灸五壯止七壯三十日後依前報灸明堂云鍼三分忌冷食呵下云灸三壯一名聼呵前一云後明聽㑹一名聽呵銅人經云手少陽脉氣所發治耳聾耳中狀如蟬聲通耳疼痛不得食經云牙車脱臼相推三寸一云一寸其穴側卧張口取之灸亦良明堂經云主耳淳淳渾聾無所聞西方子云主齒痛惡食癲疾嘔吐骨痠眩狂瘛瘲口噤喉鳴牙車急痛忌食動風生冷猪魚等物聽宫二穴在耳中珠子大赤小豆鍼三灸三壯明堂云鍼一分銅人經云手足少陽手太陽脉之㑹治耳如物填塞無所聞耳中嘬嘬嘈嘈心腹痛失聲西方子云主耳若蟬鳴骨痠眩狂瘛瘲口噤喉鳴頰車二穴在耳下曲頰端䧟中鍼四分得氣即瀉日灸七壯又止七七炷勿大明下云在耳下二韭葉灸三壯又云耳下曲頰骨後千金云一名機關在耳下八分小近前銅人經云足陽明脉氣所發治牙關不開口噤不語失瘖牙車疼痛頷頰腫頸强不得回顧其穴側卧開口取之明堂經云主齒痛不得嚼西方子云主口僻痛惡風寒不可以嚼肩井二穴一名膞井在肩上陷明堂此有缺系中二字缺盆上大骨前寸半以三指按取之當中指下䧟中甲乙經秪可鍼五分此膞井脉足陽明之㑹乃連入五藏氣若鍼深則令人悶倒不識人即速湏三里下氣先補不瀉須臾平復如故凡鍼肩井背以三里下其氣大良灸七壯明堂云鍼四分先補而後瀉特不宜灸鍼不得深深即令人悶若婦人胎落後微損手足弱者鍼肩井立産灸乃勝日灸七壯止一百若鍼肩井必三里下氣如不灸三里即㧞上氣銅人經云手足少陽陽維之㑹治五勞七傷頸項不得回顧背膊痛兩手不得向頭或因俯仰撲傷腰髖疼脚氣上攻又云若有灼然解鍼者遣鍼不解鍼者不可遣鍼灸乃勝鍼鍼深便引入五藏之氣乃令人夀短大肥人亦可倍之西方子云主婦人脱堕胎後手足厥逆欬逆寒熱慱索氣不得卧資生經云明堂既云特不宜灸又云乃勝鍼日灸七壯至百壯罷則是又可灸矣不知何自畔其説也或者肩井不可灸惟胎落後手足弱者可灸耶天髎二穴在肩缺盆中上毖骨之際陷中央鍼八分灸三壯銅人經云手足少陽陽維之㑹治肩肘痛引頸項急寒熱缺分中痛汗不出胷中煩滿西方子云主臂痛不舉巨骨二穴在肩端上行兩乂骨間陷中灸五壯鍼寸半明堂云巨骨一穴在心脾骨頭日灸三壯至七壯禁鍼鍼則側懸一食頓乃得下鍼鍼入四分瀉之勿補鍼出始得正卧下云巨骨二穴在肩端上兩行骨陷中灸一壯銅人云云門在巨骨下夾氣戸旁各二寸俞府在巨骨下璇璣旁各二寸氣戸在巨骨下俞肉兩傍各二寸明堂經云主肩中痛不能動揺也銅人經云手陽明蹻脉之㑹治背膞痛胷中有瘀血肩背不得屈伸而痛灸五壯鍼入一寸又云主驚癎破心吐血忌酒麵熱食猪魚生冷食資生經云銅人經云巨骨二穴在肩脾上兩乂骨間明堂下經亦同但明堂上經云巨骨一穴在心脾骨頭不特一穴字不同而穴在心脾骨頭亦異豈其所謂一穴在心脾骨者非巨骨耶不然即是誤寫二字作一字肩脾為心脾也臑㑹二穴一名臑髎在肩前廉去肩頭三寸宛宛中鍼七分留三呼得氣即瀉灸七壯素問注臂前廉肩端銅人經云手陽明之絡治頸癭氣瘤臂痛不能舉氣腫痙痛鍼三分留十呼西方子云主咽腫寒熱頸瘰癧癲疾腠氣肘莭痺臂酸重腋急痛肘難屈伸肩髃二穴在膞骨頭肩端兩骨間陷中宛宛中舉臂取之灸七壯至二七壯以差為度若灸偏風不遂可七七壯不宜多恐手臂細若風病筋骨無力久不差灸不畏細也刺則洩肩臂熱氣唐庫狄欽苦患風痺手足不得伸甄􅁠鍼此穴令將弓箭射之如故明堂經云鍼八分留三呼瀉五吸不及鍼以平手取其穴日灸七壯增至二七若灸偏風不隨可至二百若更多灸恐手臂細若刺風癲風瘓風病當其火艾不畏細也千金云肩頭正中兩骨間名中肩井外一名偏骨也銅人經云手陽明蹻脉之㑹療偏風半身不遂熱風癮􅇙手臂攣急捉物不得挽弓不開臂細無力筋骨痠疼又云一名扁髃主難俛仰風刺風虛手不得伸頭臂冷而緩患刺風者百日刺筋百日刺骨方可得瘳灸亦得西方子云療肩中熱頭不可以顧忌如前肩髎二穴在肩端臑上陷中舉臂取之鍼七分灸三壯明堂經云五壯銅人經云治肩重不可舉背肘痛肩貞二穴在肩脾下兩骨解問肩髃後陷中鍼五分銅人經云治風痺手臂不舉肩中熱痛西方子云主頷痛引耳嘈嘈耳鳴無所聞頭不可以顧天宗二穴在秉風後大骨下陷中灸三壯鍼五分留三呼銅人經云手太陽脉氣所發治肩臂痛臂肘外後臁痛頰頷腫痛西方子云主肩重臂痛臑俞二穴在肩骸後大骨下脾上亷陷中鍼八分灸三壯素問云在肩臑後舉臂取之銅人經云手足太陽陽維蹻脉之㑹治寒熱肩腫引脾中痛臂痠無力秉風二穴在狂肩上小髎後舉臂有空灸五壯鍼五分銅人經云小髃後手太陽陽明手足少陽之㑹治肩痛不能舉西方子云俠大髎外灸三壯曲垣二穴在肩中央曲脾陷中按之應手痛灸三壯鍼明堂經云九分銅人經云主治肩痛周痺氣主氣主肩髀拘急疼悶西方子云灸十壯肩外俞二穴在肩脾上亷去脊骨三寸陷中鍼六分灸三明上云一壯銅人經云治肩脾痛熱而寒至時時西方子云主寒熱引項急强左右不顧肩中俞二穴在肩脾内亷去脊二寸陷中鍼三分留七呼灸十壯銅人經云治寒熱目視不明欬𠻳上氣吐血西方子云主小兒妳癧目不明灸三壯大椎一穴一作顧在第一椎上陷中鍼五分留三呼瀉五吸灸以年為壮明堂云日灸壮至七七壯甲乙經云大椎下至尾骸骨二十一椎長三尺折重量取俞穴銅人經云手足三陽督脉之㑹療五勞七傷温瘧痎瘧氣疰痎骸拘急頸項不得回顧風勞食氣凡度周身孔穴逺近分寸以男左女右取中指文為一寸素問云問身寸是也又多用䋲度量孔穴繩多出縮取穴不准今以簿竹片㸃量分寸療病准約西方子云灸一壯至四十九壯止主傷寒熱盛煩嘔明堂經云背膊中悶久瘧不愈資生經云既曰大椎又曰在第一椎上陷中必是二穴非二穴則不言在第一椎上矣此大椎第一椎所以異也但銅人經云大椎在第一椎上陷中諸經皆同惟明堂下經云在第一椎下陶道穴既在第一椎下不應大推亦在第一椎下必是下經誤寫上字作下也考之下經亦言陶道穴在大椎莭不與銅人合足見其誤寫上字作下無疑矣陶道一穴在椎莭下間俛而取之陷者中灸五壯鍼五分銅人經云督脉足太陽之㑹治頭痛目瞑洒淅寒熱脊强及頭汗不出西方子云主頭痛項如㧞不可左右顧目不明如脱身柱一穴在三椎莭下間宛宛中鍼五分灸七壯明堂云五壯下云三壯銅人經云督脉氣所發治癲疾瘛瘲怒欲殺人身熱狂走譫言見鬼西方子云主恍惚不樂胷熱口乾煩渇喘息頭痛吐而不出灸五壯明堂經云主小兒驚癎神道一穴在五椎莭下間陷中俛而取之灸七七壯止百壯小兒風癲瘛瘲可灸七壯明云灸五分灸三壯下云五壯銅人經云督脉氣所發西方子云主恍惚不樂胷熱口乾煩渇喘息頭疼吐而不出灸五壯西方子云主腰脊急强痎瘧恍惚悲愁健㤀驚悸主寒熱頭痛進退往來熱喘目痛視物不明靈臺一穴在六椎莭下間俛而取之銅人經云督脉氣所發西方子云主熱病脾熱温瘧汗不出出素問至陽一穴在第七椎莭下俛而取之鍼五分灸三壯明堂下經云七壯銅人經云督脉氣所發治寒熱觧散風濕脛痠四肢重痛少氣難言西方子作阻氣難言明堂經云灸七壯主胷中寒氣不能食胷脇支滿身羸瘦背中氣上下行腰脊疼腹中鳴也筋縮一穴在第九椎節下間俛而取之鍼五分灸三壯明堂云七壯銅人經云督脉氣所發治驚癎狂走癲疾脊急强目轉上反明堂經云灸五壯主顛疾多言反目瞪也脊中一穴一名神宗在十椎莭下間俛而取之禁灸灸令人腰背傴偻五分得氣即瀉明堂作脊俞一名脊中在十一椎中央按脊在十二椎莭間銅人經云一名脊俞督脉氣所發治風癎癲邪温病積取下利西方子云不灸懸樞一穴在十三椎莭下間伏而取之鍼三分灸三壯明堂經云在十椎下莭間下云十一椎下銅人經云督脉氣所發治積氣上下行水榖不化下利腰脊强不得屈伸復中留積明堂經云主積氣上下腹中盡通資生經云銅人經載懸樞在十三椎莭下間明堂上經作十二椎莭間下經作十一椎下脊中穴既在十一椎下不應懸樞又在十一椎下故知其誤矣考之素問亦與銅人同當以銅人為正明堂上經亦誤三字作二字也要之按脊穴在十二椎節下耳命門一穴一名屬累在十椎節下間伏而取之明堂作俛而取之鍼五分灸三壯銅人經云督脉氣所發治頭痛如破不可忍身熱如火汗不出瘛瘲裏急腰腹相引痛明堂經云主寒痎瘧陽關一穴十六椎莭下間伏而取之鍼五分灸三壯西方子云主脛脾不仁銅人經云關療病法腰腧一穴一名背辭一名髓孔一名腰柱一名腰户在二十一椎莭下間宛宛中一作陷中以挺腹舒身兩手相重支頷縱四體後乃取其穴鍼八分留三呼瀉五吸灸七壯至七七壯甲乙經云鍼二寸留七呼灸七七壯又云鍼五分灸三壯明堂經云三壯下二壯素問註云鍼一分按甲乙經作二寸水熱穴註亦云二寸氣府論註骨空論註作一分一名髄空銅人經云督脉氣所發治腰髖疼腰脊僵不得回轉及温瘧痎瘧明堂經云灸五壯主腰疼不得久立腰已下至足令不仁坐卧難腰脊强急不可俛仰腰重如石難舉動也忌房勞舉重强力長僵一穴一名氣之陰郄督脉絡别其穴跌地取之甲乙經云在脊骶端鍼三分轉鍼以大痛為度其穴跌地取之乃得灸不及鍼日三十壯止二百此痔根本是令甲乙經云鍼二寸留七呼明堂云五壯銅人經云足少陰少陽所結㑹治腸風下血乃漏種痔疳蝕下部􅉶又云在脊骨下宛宛中是西方子云主心痛氣短小兒脱肛瀉血秋深不愈驚癎瘛瘲吐㵼驚恐失精瞻視不明眵眼頭重洞泄不禁腰脊急彊不可俛仰脊痛寒痓反折主癎疾明堂經云主大小便難五淋久痔又云在腰俞脊骸端陷者中主狂病及小兒驚癎忌冷食房勞資生經云自大椎至腰俞長同身寸三尺折量取穴王氏云有里醫言凡灸椎骨莭突處方駛灸脊下當骨無驗以魚肉骨參之其言為可信盍依其言當骨莭灸之普濟方卷四百十四
