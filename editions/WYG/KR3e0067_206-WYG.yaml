body:
  text: 普濟方巻二百六明周王朱橚撰嘔吐門總論夫吐家脉來形狀如新卧起陽𦂳隂數其人食已即吐陽浮而數亦為吐寸口脉𦂳而芤𦂳即為寒芤即為虛寒虛相搏脉為隂結而遲其人即噎闗上數其人則吐跌陽脉微而澁微即下利澁即吐逆糓不得入跌陽脉浮者胃氣虛寒氣在上虛氣在下二氣並争但出不入即嘔而不得食恐怖如死寛暖即瘥嘔而脉弱小便復利身有微熱見厥難治凡服湯嘔逆不入腹者先以甘草三兩水三升煮取二升服之得吐但服之不吐亦佳消息定然後服飲餘湯即流利便不吐也凡嘔者多食生薑此是嘔家聖藥病者胃中寒心下淡淡四肢厥冷食即嘔吐名曰寒嘔或因食多致傷胃氣或因病曽經汗下致胃氣虛冷之所為也病者胃中挾熱煩燥聚結涎沫食入即吐名曰熱嘔或因胃熱伏暑及傷寒伏熱不解濕疸之類皆熱之所為也病者素盛今痩膈中歴歴有聲食入即嘔食與飲並出名曰痰嘔或因涎結氣鬱於胃口或因酒食甜冷聚飲之所為也病者心腹脹悶四肢厥冷惡聞食臭食入即嘔朝食暮吐暮食朝吐名曰食嘔皆因飲食傷脾宿糓不化之所為也病者心下滿食即嘔血嘔血即食出名曰血嘔此由瘀蓄冷血積聚胃口之所為也病者心悶胸膈脹滿氣逆於胸膈間食入即嘔嘔盡却快名曰氣嘔胃者足陽明合榮於足今随上氣逆結於胃口故生嘔病也病者身背皆熱肘臂攣痛其氣不續膈間厭悶食之則先吐而後下名曰滿氣此因上焦傷寒風開其腠理上焦之氣慄悍滑疾遇開即出經氣失道邪氣内着故有是證病者下焦實熱大便不通氣逆不續嘔氣不禁名曰走哺此下焦氣起於胃口下别入囬腸注於膀胱并與胃傳糟粕而下大腸令大小便不通故知下焦實熱之所為也今凡先嘔却渇者此為欲解先渇却嘔者為水停心此屬飲家又傷寒差後餘熱在胃嘔者依傷寒後證治之若脚弱脾痛而嘔者此脚氣内攻宜急依脚氣門治更有婦人懐娠惡阻嘔吐亦各從其門類或中毒而嘔以解毒藥解之酒家嘔吐當以解酲藥解之其如三焦漏氣走哺嘔吐則見上嘔門泄利則見下利門各從其類也嘔不得輕用利藥唯腹滿則視其前後何部不利利之即愈病源云嘔吐者皆由脾胃虛弱受於風邪所為也在胃則嘔膈間有停飲胃内有乆寒則嘔而吐其狀長太息心裏澹澹然或煩滿而大便難或溏泄並其候養生方云八月勿食薑一云被霜𤓰向冬發寒熱及温病食欲吐或心中停飲不消或為反胃仲景傷寒論夫嘔家有癰膿者不可療也其膿嘔盡自愈若先嘔後渇者為欲解也先渇後嘔者為水停在心下屬飲家嘔家本渇今反不渇者以心下有支飲故也此屬支飲此証多用小半夏加茯苓湯脾胃虛受於風邪故令新糓入胃不能𫝊化故糓之氣與新糓相干胃氣則逆胃逆則脾脹脾脹則氣逆復遇冷折之則噦也右手闗上脉沉而虛者善病噦也夫中脘有飲則嘈有宿食則酸食後噫醋吞酸皆宿食證俗謂之嚥酸是也夫人受天地之中以生莫不以胃為主葢胃受水糓脾主運化生氣以充四體者也若脾胃無所傷則無嘔吐之患其或飲食失節温凉不調喜餐腥膾乳酪或貪食生冷肥膩露卧濕處當風取凉動擾於胃胃脘既病矣則脾氣停滯清濁不分中焦為之痞塞遂成嘔吐之患然此特論飲食過傷風凉冷濕之所由致者又如憂思所感宿寒在胃中脘伏痰胃受邪熱瘀血停積亦能令人嘔吐故診其脉代者霍亂代而絶者亦霍亂也霍亂脉大者可治微細者不可治脉遲氣短少力不欲言者亦不可治胃虛之人或為寒氣所中或為暑氣所干或為飲食所傷或氣結而痰聚皆令人嘔吐又有瘀血停於胃口嘔吐之間雜以涎血當辨其脉證施以治法中寒則脉沉𦂳四肢厥冷飲食不下當以温暖之藥調之挾暑則脉弦數煩燥而渇又當清凉之停食則消化之痰聚則順氣温胃停積者多由憂思過度損傷經絡其脉實而大者難治虛細者易愈諸嘔吐酸皆屬於熱此上焦受外來客邪也胃氣不受外邪故嘔傷寒論云嘔多雖有陽明證不可攻之是未傳入裏三隂不曽受邪也亦可見此證在上也仲景以生薑半夏治之以雜病論之嘔吐酸水者甚則酸水浸其心不任其苦其次則吐出水令上下牙酸不能相對以大辛熱劑療之必减吐酸水嘔出水酸味者收氣也西方肺金旺也寒水乃金之子子能令母實故用大醎熱之劑瀉其子以辛熱為之佐而瀉肺之實以病機之法作熱攻之者誤矣葢雜病醋心濁氣不降欲為中滿寒藥豈能治之哉嘔吐出於胃氣之不和人所共知也然有胃寒有胃熱有痰水有宿食有膿血有氣攻又有所謂風邪入胃凡是數者可不究其所自來哉寒而嘔吐則脉沉𦂳四肢厥冷法當温暖之濕熱嘔吐則喜冷惡熱煩燥中乾法當清凉觧之病水證唾沫怔忪先渇後嘔與之消痰逐水軰宿食證者胸腹脹滿醋悶吞酸與之消食去積軰鯹氣燥氣熏炙惡心此膿血之聚經所謂嘔家有癰膿不須治膿盡自愈是爾七情内鬱闗膈不平此氣攻之證所謂諸鬱於胃則嘔吐是爾若夫風邪入胃人多不審率用參术助之攔住寒邪於此尤闗利害其或惡聞食臭湯水不下粥藥不納此則翻胃之垂絶者也辨之不早其何以為對治乎且夫足陽明之經胃之絡脉也陽明之氣行則順今逆而上行謹不可泄固也然嘔吐者每每大便秘結上下壅遏氣不流行盍思所以區畫而利導之也如汗後水藥不入口者逆嘔而脉弱小便復利身微熱而手足厥者虛寒之極也識者憂焉人之隂陽降升三焦調順脾胃和匀乃能腐熟水糓變化糟粕傳寫行道下走腸間若脾胃虛冷水糓不化則隂陽痞隔三焦不調濁隂之氣不能下行奔衝於上故發為嘔吐然咳逆之病有得之於膈實者有生於中滿者有發於下焦者種種雖不同悉本胃氣逆則嘔吐也葢胃者水糓之道路胃氣宣通則上焦如霧中焦如漚下焦如瀆命曰平胃既虛弱水糓停滯致三焦格拒升降不匀其氣虛滿得食則嘔而又有朝食暮吐暮食朝吐者有食已即吐者有嘔吐水糓不得前者有但嘔而無所出者有先嘔却渇者有先渇却嘔者嘔家本渇而反不渇者其本其治各各不同假令内格嘔逆食不得入是有火也病嘔而吐食乆反出是無火也舉此二者乃知嘔吐之名則一治療之法各異雖治法有冷熱虛實之别要當以安其胃氣為本使隂降陽升平匀調順嘔逆之病自愈矣嘔吐論夫嘔者胃氣上而不下也譬之逼缾小口頓溉不入乃升氣所礙人病嘔吐其理如此葢脾胃氣弱風冷干動使留停積飲食不化胃氣虛脹心下澹澹其氣上逆故嘔吐也沉香煎丸治嘔吐除中滿痞氣痰逆惡心宿昔成積面黄腹脹臟腑不調水糓不化調順脾胃阿魏醋浸開白麺同作餅炙令黄半兩巴豆去皮心膜細新瓦上攤去油盡一分沉香剉丁香木香胡椒沒藥研丹砂别研水飛髙良薑㯽榔麺褁煨熟去麺青橘皮去白穰焙硫黄别研水飛硇砂明净者石器慢火熬别研水飛過用各一兩縮砂去皮吴茱茰取陳乆者湯浸取沉者炒各半兩右除研藥外為末再入研藥匀煉蜜丸如菉豆大瓷盒貯封每服二丸食前臨卧温生薑橘皮湯下更量虛實大小加減柴胡湯療兩脇妨悶嘔逆不下食柴胡茯苓各八分橘皮人參桔梗各六分厚朴八分炙紫蘇五分生薑十六分甘草五分炙訶梨勒皮七枚去核右切以水八升煮取二升五合絞去滓分温三服服後相去如人行六七里進一服止吐利忌海藻菘菜酢物猪肉等物之類治嘔吐厥逆不思飲食白术丁香甘草炙剉陳橘皮去白焙木香各半兩剉大腹子剉枳殻去穰麸炒訶梨勒炮去核各三分草豆䓻去皮一兩右粗搗篩毎服三錢水一盞入生薑五片同煎至七分去滓空心温服白术散治嘔吐酸水結氣築心白术茯苓各八分吴茱茰四分橘皮六分蓽撥四分㯽榔十分人參六分大黄十分厚朴八分炙右搗篩為散空腹煮薑棗湯服方寸匕日二服漸加至二匕半覺熱服少飲食三兩口壓之忌酢物桃李雀肉等茯苓散治脾胃虛弱不思飲食嘔吐茯苓枳殻麸炒去穰人參去蘆甘草微炒剉蘆根切半夏湯洗七次去滑各一兩右粗搗篩每服三錢水一盞入生薑七片薤白二寸切同煎至七分去滓不拘時候温服半夏丸出江陽方治乆吐不止半夏一兩乾薑半兩右為末白麺糊丸桐子大非時陳皮湯下治嘔逆痰壅出本草用苦耽苖子煮汁服亦生搗絞汁服加味治中湯出危氏方治體虛感冐雨濕嘔吐人參白术乾薑青皮陳皮各一兩藿香半夏各五錢甘草二錢右剉散生薑三片紅􅀥一枚煎服前胡湯治嘔吐不下食前胡去蘆麥門冬去心焙人參淡竹茹芍藥陳橘皮去白焙半夏湯洗七遍焙各等分右剉如麻豆大拌匀每服三錢水一盞生薑三片煎至七分去滓食前温服小麥湯出千金方治嘔吐不止小麥一升人參厚朴各四兩甘草一兩青竹茹二兩半生薑汁二合茯苓三兩右㕮咀以水八升煮取三升去滓分三服木香白术湯出濟生拔粹方治嘔而吐食謂持實擊强是無積也胃强而乾嘔有聲無物脾强而吐食持實擊强是以腹中痛當以此和之一名丁香半夏湯丁香木香各一錢半夏􅎘一兩白术五錢㯽榔二錢茯苓五錢炙甘草四錢右為末濃煎生薑芍藥湯調下一二錢有積而痛手按之愈痛無積者按之不痛一方無丁香柴胡湯療徧體煩痛頭痛喫食嘔逆不得食柴胡十分茯苓八分枳實八分炙生薑八分去皮切麥門冬八分去心甘草六分炙右切以水六升煮取二升三合絞去滓分温三服每服相去如人行六七里進一服内消不利忌海藻菘菜酢物桃李雀肉熱麺炙肉油膩和胃湯治食飲不下嘔逆清水面目虛腫人參二兩茅根一兩甘草炙半兩竹茹三分木通剉三分赤茯苓去黒皮一兩半半夏湯洗七遍焙一兩右粗搗篩毎服三錢水一盞生薑三片棗二枚擘破煎至七分去滓温服丁香丸出傳信通用方治因食冷物凝滯胃間嘔吐不止大丁香半兩木香三錢胡椒二錢藿香三錢乾薑二錢甘草三錢肉桂三錢右為末蒸餅糊丸菉豆大焙乾時時乾嚼不必飲湯水水入則愈吐如覺痿弱更加附子随意人參丸治嘔吐服後半夏丸雖覺漸損然病根不除欲多合後丸又慮毒藥不可乆服欲不服藥又恐病滋蔓人參白术各五兩生薑屑八兩厚朴炙細辛各四兩橘皮三兩桂心二兩右搗篩為末蜜和丸如梧桐子大米飲下初服十丸日二服稍稍加至二十丸欲後半夏丸間服亦得忌桃李雀肉生葱生菜半夏丸治嘔吐積冷在胃嘔逆不下食半夏一升真熊州者洗小麥􅎘一升右搗半夏為散以溲麺丸如彈子大以水煮冷麺熟則是藥成初吞四五丸日二服稍稍加至十四五丸旋煮旋服服此覺病減欲更重合服亦佳忌羊肉餳柴胡知母飲治嘔吐不下食頭痛身熱柴胡去苗一兩知母焙半兩蘆根剉三分㯽榔一兩人參半兩陳橘皮半兩右為散每服三錢水一盞生薑五片同煎至六分去滓熱服輭紅丸治嘔吐丹砂研砒霜研各半錢胭脂一錢巴豆七粒取霜右研細鎔臘少許内油三兩滳水和藥為劑以油單褁之大人旋丸如菉豆大小兒如芥子濃煎槐花甘草湯放温下一丸勿熱食半時乆人參丸治嘔吐不下食人參三兩半夏湯洗七遍焙乾二兩前胡去蘆剉一兩鉛丹研半兩右細末煮􅀥肉丸如梧桐子大毎服二十丸薑湯下食後服豆蔲子湯治嘔逆不下食腹中氣結豆蔲子七粒碎生薑五兩甘草炙一兩人參一兩右切以水四升煮取一升五合去滓分温二服相去如人行五六里進一服内消忌海藻菘菜人參散出危氏方止吐逆及治瀉後除煩渇常服調中和氣白茯苓人參各半兩乾葛一兩一錢藿香木香甘草各一錢半黄耆一錢半右為末每服三錢水一盞煎七分去滓温服如瀉後渇者毎服加滑石末二錢同煎服藿香安胃散出御院方治嘔吐不止藿香葉一兩半夏二兩洗陳皮二兩去白厚朴一兩薑製蒼术三兩泔浸甘草二兩炙右為粗散每服五錢以水一盞半生薑五片棗二枚同煎去滓温服厚朴散治嘔吐不止消痰下氣厚朴去粗皮剉薑汁浸一宿炒四兩甘草剉炒二兩陳橘皮湯浸去白炒六兩生薑二斤洗浄切片焙乾炒令紫色草豆蔲去皮剉細炒二兩右為散毎服二錢沸湯入鹽㸃服脾氣等疾每服三錢水一盞薑二片棗二枚擘破煎至六分温服枇杷葉散出本事方治定嘔吐利膈枇杷葉去毛人參各一錢茯苓半兩茅根二兩切半夏一錢切右剉細每服四錢水一盞半生薑七片慢火煎至七分去滓入㯽榔末半錢和匀服之三乙承氣湯出經驗良方治嘔吐水浆不入或食已即吐大便秘或利而不鬆快時覺腹滿者或下利赤白而嘔吐食不下者或大腸小腸膀胱結而不通上為嘔吐膈食川大黄錦紋者用厚朴削去皺皮枳殻芒硝各半兩甘草一兩右為粗末每服四錢水一盞生薑五片煎至六分却入硝細啜服未利再服熱甚者此一劑分大半作一服未利再服少熱甚更熱甚者一劑都作一服熱勢極甚者亦有併二服作為一服方得利而効者臨時消息以利為度生蘆根飲療嘔吐病有兩種一者積熱在胃嘔逆不下食一者積冷在胃亦嘔逆不下食二事正反湏細察之必其食飲寝處将息傷熱又素無冷疹年壮力强膚肉充滿此則是積熱在胃致此嘔逆如将息食飲寝處不熱又素有冷病年衰力弱膚肉痩悴此則積冷在胃嘔逆不下食生蘆根切一升生麥門冬一升去心青竹茹一升生薑汁五合茯苓五兩右切以水八升煮取二升半去滓加竹瀝六大合攪三服相去如人行十里乆始服一劑得可欲重合服亦佳忌酢物五味丸治嘔吐前生蘆根飲雖可然未能全除者服此茯苓五兩人參三兩麥門冬一升去心青竹茹一升生薑屑六兩右搗篩蜜和為丸煎蘆根飲下之初服十五丸日二服稍加至三十丸如梧桐子大忌酢物枇杷葉散出御院方治脾胃氣虛嘔逆吐食枇杷葉去毛陳皮去白各等分右為粗末毎服五錢水一盞半生薑半分擘破同煎至一盞去滓温服不拘時候日進三服附子散出肘後方治冷氣嘔逆及吐食右附子生去皮臍一枚切作四片用生薑汁五合浸一宿取出火上炙乾入生薑汁浸良乆又蘸薑汁炙直候薑汁盡搗羅為散每服二錢米飲調下不拘時候紫粉丸治嘔吐不下食右鍼沙以醋浸一宿去醋便帯醋炒直候并銚子絶紅色無煙然後乃止放冷研令細更用酣團火内燒令通赤取候冷再研極細以白麺糊丸如梧桐子大每服四十丸用温粥飲下之服此藥訖便須啜一盞粥已不吐如未定再服之次定若與小兒服即小丸之更随兒大小與之治嘔吐不止出澹寮方脾氣虛弱多嘔吐粥藥纔食留不住胡椒雞舌送靈砂假饒反胃無憂慮専治脾胃虛嘔吐不止諸藥不効者右件用胡椒五十粒雞舌香十粒即母丁香也並為細末白湯半盞調藥送靈砂數粒便愈酒磨丸一名効磨丸出肘後方治吐逆粥飲不下及治丈夫婦人吐逆連日不止右五靈脂狗膽汁和丸如雞頭實大每服一枚煎熱生薑酒半升磨化再湯熨極熱先煮温粥半盞持在手病人乗熱飲藥便以粥送下一用左手與患人藥喫不得𠻳口右手急将粥與病人喫不令太多治嘔吐不止者出經驗良方右用來復丹以湯泡半夏為末一同碎和為丸薑湯下五十丸立止治水逆嘔吐出經驗良方用生料五苓散去桂煎熟去滓入生薑自然汁細細服之小半夏加茯苓湯治水氣嘔吐半夏一升生薑半斤茯苓三兩一方四兩右以水七升煮取一升五合分温再服金匱云嘔家用半夏以去水水去則嘔止治嘔吐大便秘結虛冷者右用靈砂或養正丹温而利之又蘇合香丸用四分感應丸用六分夾研作細丸薑汁泡沸湯下此亦温利若大便熱結用蜜煮凝捻作指鋌納後剖導之或用獖猪膽一枚取汁滴入醋少許以筆蘸灌於後部或燒皂角於桶内熏糓道或連根葱白一握漢椒五十粒搗細作餅焙熱和輕粉掩臍續以葱椒煎湯熏穀道治嘔吐百藥不差用生薑一兩切菉豆大醋浆七合銀器煎取四合空腹和滓旋呷之治嘔吐風氣又吐後轉筋右将木𤓰煮汁飲之甚良若脚膝筋急痛煮木𤓰令爛研作浆粥糕用褁痛處熱褁冷易一宿三五度便差煮木𤓰時入一半酒同煮之小藿香散出夲事方治心下悶亂嘔吐不止水浆不入有熱者服丁香乾葛枇杷葉藿香葉赤茯苓甘草右各等分為散每服三錢水二盞生薑三片煎至七分去滓服之人參飲治嘔不能食人參八分厚朴六分炙橘皮六分白术生薑各八分右切以水四大升煮取一升五合温分三服忌桃李雀肉等又凡服湯嘔逆不入腹者方先單煮炙甘草三小兩以水三升煮取二升服之得吐但更服不吐益好消息定然後服餘湯則流利更不吐也忌海藻菘菜犀角人參飲子出千金方治嘔逆胃氣虛邪風熱不下食犀角人參各二兩薤白五兩粟米一合右㕮咀以水四升半煮取一升七合下米煮令米熟分四服相去七里乆進一服治嘔吐胸膈痞滿不通出百一選方枳實去穰白茯苓剉各半分右煎四味大理中丸一丸作一服或俞仙人降氣湯十五味治嘔吐出肘後方白㯽榔一顆煨橘皮一分炙為末右以水一盞煎半盞服治天行後嘔逆不下食食入即出右取羊肝如食法作生淡食不過三度即止療無故嘔逆酸水不止或連三五口食後如此右用羊屎十顆好酒兩合煎取一合頓服即愈如未定更服㸔大小加減之六七嵗即五顆治嘔逆不能食出肘後方右訶梨勒皮二兩去核熬為末蜜丸如梧桐子大空心服二十丸日二服一方用訶子去核薑湯下治天行嘔逆不可食食即吐右以雞卵一枚煮三五沸出以水浸之外熟内熱則吞之良治嘔及嘔噦出肘後方右麻仁三兩杵熬以水研取汁着少鹽喫立効治嘔右用白油麻一大合清油半升煎取三合冷熱得所去油麻頓服胡椒丸出澹寮方名半夏丸胡椒二十一粒丁香十四粒半夏七粒湯浸去滑右為細末生薑自然汁丸如雞頭大毎用一丸以乾棗一枚擘破去核入藥在内以濕紙褁煨熟放温以米湯爛嚼下丁香丸出傅信適用方治吐逆丁香木香白术半夏乾薑右等分為末薑汁糊丸桐子大每服三二十丸米飲下食前服金花丸出濟生抜粹方治吐食而脉弦者由肝乘於脾胃而吐乃由脾胃之虛宜治風安脾之劑半夏二兩洗㯽榔二錢雄黄一錢半右為末薑汁浸􅔻餅為丸桐子大生薑湯下小兒另丸從少至多漸以服之以吐止為度覊絆於脾故飲食自下白术散出本事方治食後多吐欲作反胃澤㵼白术茯苓各等分右為細末每服一錢湯調温服人參飲主吐人參二兩橘皮三兩生薑一兩右切以水四升煮取一升五合分温三服治食已吐其食方出千金方大黄四兩甘草二兩右㕮咀以水三升煮取一升半分再服青金丹出本事方一名的竒方治一切吐逆不問虛實冷熱霍亂翻胃並皆治之水銀八錢生硫黄一錢别研右入無油銚内用慢火化開以栁木箆子撥炒或有煙㷔以醋洒入結成砂子再炒研為細末用粽尖杵和為丸如菉豆大毎服三十丸用生薑橘皮煎湯送下不拘時候一方用硃砂為衣每一丸煎丁香湯磨下食前熱服理中散治食後吐酸水食羮粥醋劇乾薑食茱茰右為散酒服方寸匕日三温服勿冷服之乾薑甘草湯出直指方療吐逆水米不下及脾中冷痛乾薑三分炮甘草一分炙右切以水二合煎取一合去滓頓服則定少間與粥則不嘔神驗忌海藻菘菜一方用􅀥煎治食飲輙吐方出千金方右頓服生熟湯三升即止治吐逆立効出肘後方右用上好黄丹四兩整仔細篩過用好米醋半升同内煎令乾却用炭火三秤就銚内煆透絶紅冷取細研為末用粟米飲丸如梧桐子大煎葱酵湯下七丸不得只一服即碧靈丹治吐右用生犀角末方寸匕新汲水調下差治嘔吐出肘後方右燒鹿角灰二兩人參一兩搗末方寸匕日三服治嘔吐不止出肘後方右用五倍子焙一箇生一箇同甘草為末米飲調下治吐逆不止出肘後方右生半夏一撮用水一盞煎不可多飲不可温服其吐即止治吐右用益元散加清油半合酸浆水一處煎用銀釵順攪一二沸服之前胡湯出千金方治寒熱嘔逆少氣心下堅聚膨脝不得食寒熱消渇補不足前胡生薑各三兩甘草朴硝湯下大黄别浸各二兩芍藥茯苓麥門冬當歸半夏滑石石膏括蔞根黄芩附子人參各一兩右㕮咀以水一斗二升煮取六升分四服大養胃湯出三因方治飲食傷脾宿糓不化朝食暮吐暮食朝吐上氣腹熱四肢冷痺三焦不調及脾虛寒氣在上虛氣在下二氣並争但出不入嘔不得食厚朴去皮生薑各二兩剉肥􅀥三兩剉同上二味炒白术山藥人參川芎橘皮當歸五味子藿香甘草枇杷葉刷去毛薑炙黄耆各兩右剉為散毎服四錢水一盞半生薑三片棗二枚煎七分去滓空腹服或為細末米飲調下亦得半夏湯出千金方治逆氣心中煩悶氣滿嘔吐氣上攻一名小半夏茯苓湯半夏一升生薑一升茯苓桂心各五兩右㕮咀以水八升煮取二升半分三服若少氣加甘草二兩治肺氣逆嘔吐噦逆而渇出肘後方用枇杷葉煎湯服生嚼亦可一方卒乾嘔取一斤火微炙粗布拭去毛水一斗煮取三升服煮蘆根亦佳匀理湯出危氏方治體虛上氣壅盛中脘痞塞嘔吐水飲不入其證急速右用木香匀氣散合理中湯鹽湯調服方寸匕風引獨活湯獨活茯苓甘草各三兩升麻一兩半人參桂心防風芍藥當歸黄耆乾薑附子各三兩大豆右㕮咀以水九升清酒三升煮三升半分四服相去如人行二十里乆更進一服藿香散出危氏方治風邪入胃嘔吐自汗或身疼人參五錢厚朴藿香陳皮各一兩半夏五錢芍藥一兩官桂粉草各五錢右剉為散每服四錢生薑五片紅棗一枚煎食前服養胃湯用亦効藿香正氣散出指南方治傷寒隂證憎寒惡風逐冷胸膈噎塞脇肋膨脹心下堅痞吐利嘔逆怠惰嗜卧不思飲食風邪入胃嘔吐半夏􅎘川厚朴製各三兩藿香葉橘紅各一兩甘草炙七錢右剉為散每服三錢薑七片紅棗一枚食前煎服又養胃湯通用藿亂吐瀉加白术三兩大枳殻丸出御藥院方治一切酒食所傷胸膈痞悶脇肋脹滿心腹疼痛飲食不消痰逆嘔吐噫醋吞酸飲食遲化並宜服之枳殻麸炒茯苓去皮白术厚朴薑製半夏湯洗人參木香青皮去穰㯽榔京三稜煨熟廣荗煨熟神􅎘炒黄麥蘖微炒以上各一兩乾生薑半兩牽牛净微炒大黄各二兩陳皮一兩去穰右為細末生薑汁麺糊丸如梧桐子大毎服一百丸生薑湯下食後服茯苓湯出三因方治憂怒兼并氣攻血溢停留胃管噯聞血醒嘔吐食飲及姙娠中脘宿冷血浸脾惡聞食氣病名惡阻半夏湯洗七次三兩茯苓熟地黄各一兩八錢橘皮細辛人參芍藥川芎旋復花桔梗甘草炙各一兩二錢右為剉散每服四大錢水二盞薑七片煎七分去滓空心服有客熱煩渇口瘡者去橘皮細辛加前胡知母茯苓下利者去地黄入桂心炒胃中虛熱大小便閉澁去地黄加大黄一兩黄芩六錢一方無旋復花桔梗甘草二陳湯出指南方一名治中湯治胸腹脹滿因傷宿食或吐後噫敗脾氣加丁香縮砂生薑七片烏梅一箇煎未効服治中湯同前兼療中寒飲食不化吞酸哯啘食則膨脝脹滿嘔逆人參白术甘草炙乾薑炮青皮陳皮各等分右毎服四錢水一盞半煎至七分去滓大便秘加大黄棋子大兩枚尋常入鹽㸃服白术丸出仁存方一名丁香半夏丸治心下温温常欲嘔惡惡聞食吞酸由宿寒胃冷不能運化水糓中緩成痰其闗脉弦小而短白术三兩半夏炮橘皮乾薑各二兩丁香一兩右為末薑汁煮糊為丸如梧桐子大毎服三四十丸