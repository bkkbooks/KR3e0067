三效治病人乾嘔方右取羊乳汁飲一盃治乾嘔方右酒浸馬屎一宿取汁服之治卒乾嘔不息右搗葛根汁服一升差一方用雞子破布濾去白吞黄數枚差治乾嘔頭痛食不下右用生雞子一顆開頭去白取黄着米醋拌煻火頓服醋盡熱飲未定更服不過三度差治嘔吐噦若手足厥冷右蘆根三斤濃煑汁飲之嘔噦附論夫噦者咳逆也古方則謂之噦凡吐利後多作噦大率胃實則噫胃虛則噦此由胃中虛膈上熱故噦或至八九聲相連收氣不囬至於驚人者若傷寒久病者得此甚惡内經所謂壊病者是也津减者知監器之漏聲嘶者知琴絃之絶落葉者知槁木之摧舉此三物衰傷之徴以此故知噦是病深之候也亦有噦而心下堅痞眩悸者以膈間有水所為其他病則各有治法脾胃俱虛受於風邪故令新糓入胃不能𫝊化故糓之氣與新糓相干胃氣則逆而嘔胃逆則脾脹脾脹則氣逆因遇冷折之則噦也右手闗上脉沉而虛者病善噦也食入於口而聚於胃脾胃散精氣以養四肢臟腑氣和乃能埤助於中若脾胃氣虛不能𫝊化水糓之精與新糓相干脾胃氣痞滿脹復遇冷折之故令噦逆也丁香茱茰湯治胃虛噦嘔吐逆膈咽不通丁香五錢吴茱茰一錢黄耆二錢草豆蔲一錢去皮人參一錢甘草柴胡橘皮半夏升麻當歸乾生薑蒼术黄蘖各等分右剉麻豆大每服半兩水二盞煎一盞去滓食前熱服忌冷物一方無半夏生薑胡麻飲治嘔噦人參胡麻仁橘皮枇杷葉各等分右㕮咀水一斗煮枇杷葉取五升下藥煮取三升内麻仁稍飲之橘皮湯療嘔吐不止陳橘皮生薑甘草枇杷葉各等分右切以水五升煮取二升五合絞去滓分温三服每服相去如人行六七里進一服内消忌海藻菘菜治嘔噦用小麥麵醋和作丸二三十箇以沸湯煮别盛浆二㪷用丸於湯内漉出又内於浆中㸔外熱氣稍减乘熱吞三四箇其噦定即不吞甚者加至七八丸尚未定晚後飯前再吞之治嘔噦及霍亂後惡心用葡萄根濃煮汁細細飲之蘆根方出千金方治嘔噦用蘆根切以水一斗二升煮取四升分四服一方兼以小童便一兩合不過三服則差療嘔噦出肘後方用生蘡薁藤斷之當汁出器盛取飲一升生葛藤尤佳小半夏加茯苓湯出肘後方治嘔噦糓不得下眩悸方見嘔吐門本類棗肉丸出永類鈐方治脾胃虛冷嘔噦方見膈噎門膈噎類半夏生薑湯出活人書一名半夏湯治噦欲死方見膈噎門膈噎類治乾噦若手足厥冷宜食生薑此是嘔家聖藥治氣厥嘔吐不得息方出千金方豉半夏各二兩生薑二兩人參前胡桂心甘草各一两右㕮咀以水九升煮取三升分三服又方出千金方大棗十五枚附子一枚橘皮二兩豉一升生薑甘草各一兩右㕮咀以水九升煎取二升分三服日三治卒嘔噦厥逆方出千金方右飲新汲冷水三升佳治嘔逆出本草以蓮實仁六枚炒令黄色研末冷熟水半盞和服便止療卒噦方用枳實三枚炙去穣㕮咀之取三家乳一升以羊脂五兩煎枳實令沸復内乳令沸去滓含咽之薤白湯出肘後方治人忽惡心不已薤白半斤茱茰一兩豉半斤米一合棗四枚枳實二枚鹽少許右如彈子大丸水三升煮取一升半為三服一方出肘後方但多咬豆蔲子及咬㯽榔亦佳治噦方出千金方用煮豉三升飲汁佳又方出千金方用薑汁空腹飲一升治惡心方出千金方用苦瓠瓤并子一升碎以酒水三升煮取一升頓服須臾吐并下如蝦蟆衣三升又方出千金方用麻子一升熬令香熟搗取酒三升熟研濾取一升飲盡日二服盡一石差一切病自能飲食不能酒任性多少又方出千金方用小便服百日佳治噦用牛口中齝涎草絞取汁服療卒噦不止方出肘後方右痛􅎲眉中央閉氣差又方出肘後方用物刺鼻中或以少許皂角内鼻中令􅅉則差又方出肘後方用粢米粉二升井華水服之止嘔噦出本草以甜糟三嵗者下有酒以物盛之服三聖散出聖濟總録治噦逆不止丁香四十九粒胡椒十四粒半夏七枚大者先以錐子鑽透心後用麻線穿過井華水浸七日一日一夜換水後焙乾右為細末大人生薑湯調一字小兒筯頭蘸生薑汁後㸃藥少許立愈再甚不過三服石蓮丸出聖濟總録治胃寒嘔逆石蓮肉去心附子炮製去皮臍乾薑炮各一兩右為末粟米粥丸如菉豆大蜀椒湯下十丸止勿再服小丁沉丸出聖濟總録治噦逆不止飲食不下丁香沉香木香㯽榔白豆蔲去皮各半兩麝香一錢另研人參二兩桂去粗皮白茯苓去黒皮二兩甘草半兩炙剉乾薑一兩炮訶梨勒一兩青橘皮去白炮半兩白术四兩右為末煉蜜丸小彈子大每服一丸炒生薑鹽湯嚼下無時沉香烏藥丸出聖濟總録治噦逆不止不思飲食沉香烏藥剉青橘皮去白炮白术剉炒白芷白茯苓去黒皮五味子甘草炙剉人參各等分右為末煉蜜和丸如雞頭大每服一丸至二丸粥前生薑紫蘇湯嚼下理中散出聖濟總録治胃中氣冷腹脹噦逆不思飲食方見脾臟門脾氣虛腹脹滯類豆蔲湯出聖濟總録治脾胃俱虛噦逆上氣草豆蔲去皮木香甘草炙剉乾薑炮髙良薑縮砂去皮益智去皮陳皮湯浸去白各等分右㕮咀每服三錢水一盞生薑三片煎八分去滓温服無時白术湯出聖濟總録治胃氣受冷氣逆奔衝噦逆不定白术剉甘草炙剉莎草根炮去毛各一兩草豆蔲五枚大者去皮炒乾薑炮陳麴炮麥蘖炒各半兩右㕮咀每服三錢水一盞生薑三片大棗二枚擘破煎七分去滓熱服不拘時候降氣丸出聖濟總録降陽氣於下使隂氣上升升降無礙隂陽調適飲食運化諸疾不生牽牛子二十兩炒熟取麵一十兩蓽澄茄十兩㯽榔剉二兩木香四兩赤茯苓去黒皮二兩補骨脂十兩右為末水煮麵糊為丸如梧桐子大每服二十丸温水下不拘時候丁香湯出聖濟總録治胃冷噦逆不思飲食丁香甘草炙剉陳麴炒各半兩草豆蔲去皮炒一兩陳橘皮去白焙一兩木香炮三分右㕮咀每服三錢水一盞生薑五片煎至七分去滓温服無時人參湯出聖濟總録治噦逆不止人參白术白茯苓藿香各半兩甘草一分炙剉右㕮咀每服三錢水一盞生薑五片煎七分去滓温服羗活湯出聖濟總録治風冷乘脾胃致噦逆不止羗活去蘆附子炮去皮臍蘹香子微炒各半兩木香乾薑炮各一分右㕮咀每服三錢水一盞鹽一捻煎八分去滓稍熱服無時厚朴煮散出聖濟總録一名調胃散治噦逆不止惡心氣不下降方見脾臟門兼理脾胃類乾薑丸出聖濟總録治脾胃俱虛内挾風冷噦逆上氣乾薑炮一兩半附子炮製去皮臍胡椒桂去粗皮各半兩右為末煉蜜丸每服十五丸加至二十丸食前濃米飲下如噦嘔冷沫濃煎生薑橘皮湯下豆蔲散出聖濟總録治胃寒噦嘔不止草豆蔲去皮剉八兩甘草四兩炙剉陳橘皮去白焙一兩生薑和皮切片用一斤右和匀入銀器内用水過藥三指許慢火熬令水盡取出焙乾為末每服一錢沸湯㸃之夏月煎作冷熟水服水銀膏出聖濟總録治諸般噦逆水銀不結沙子硫黄細研太隂𤣥精石各一兩細研右用釅醋五升文武火煎成稠膏瓷盒内盛旋丸梧桐子大每服七丸艾湯下不拘時候枇杷葉散出聖濟總録治噦逆不止飲食不下枇杷葉炙拭去毛四兩甘草炙剉三兩陳橘皮湯浸去白焙五兩右㕮咀每服三錢水一盞生薑棗大切煎七分去滓稍熱服無時兩順煮散出聖濟總録治脾胃俱虛脹滿噦逆髙良薑木香另搗右為散每服髙良薑一錢木香半錢水一盞煎七分温和滓徐呷服不計時勿用鉄器煎附香煑散出聖濟總録治噦不止附子一枚重一兩者訶梨勒三七枚右用同蛤粉炒令附子裂去臍尖訶梨勒去核為末每服二錢水一盞煎八分和滓温服治胃口冷噦逆不已出聖濟總録大棗一枚青州者去核胡椒七粒入棗内合定右用濕紙褁煨熟地上紙襯出火毒去紙空心細嚼温酒送下粥投之即效陳皮乾薑湯治噦陳皮通草乾薑炮甘草炙各二兩桂心去粗皮人參一兩右㕮咀每服四錢水一盞煎六分温服温中白术丸治胃寒嘔噦白术二兩半半夏二兩乾薑一兩丁香半兩右為末薑汁丸如梧桐子大每服三十丸生薑湯送下大半夏湯治胃寒嘔逆半夏薑製白术各五兩人參半兩右為粗末每服五錢水三盞煎至一盞入蜜一匙候温去滓服妙功藏用丸出宣明論又名神芎丸亦名顯人丸治嘔噦不食痿弱難運血溢血淋滿悶不通或洩利三焦壅滯𫝊化失常功不可述並宜服之大黄黄芩黄連各半兩黒牽牛荆芥穗滑石各二兩防風一分川芎一兩木香二分官桂二分去皮右為末滳水丸如小豆大每服二十丸至三十丸生薑湯下日三服温水亦得又方出肘後方右但閉氣抑引之普濟方卷二百六
