body:
  text: 普濟方附録直音畧普音溥捄救同覈音核賾鋤陌切駴胡揩切嚬音頻溽音辱音夢􅀈音金脽是惟切䪼之劣切拉力荅切焞音敦音陳璺音問腨時兖切溺音尿凝泣下音澁菘音嵩蕺祖父切治上平聲擇音亦㑊音閑橈匕卑履切窨音蔭皏普幸切炲音䑓癔於識切俳音排差去聲王相並去聲瓤音穰搈音搜中風上去聲蚛音虫跛音􅉫楔音屑風痱扶非布罪二切机音几窨窨同腲烏非切㾦上聲劃呼麥切帙音句蒟他對他沒二切魘音靨瘲子用切蚱側伯切踡貝負切駮垉角切鰻鱺上謨官切下郎奚切齲駈禹切溷胡困切鱟莫候切癜俗作殿又於其切萎悴上音逶下音翠痣職吏切鞕音硬齊頸上去聲盭郎計切女力切幅普力切薺􅠩上祖禮切下奴禮切茈柴同芃居包切藊房典切内藥上音納閉塞下入聲拍碎上音珀悸其季切痠先丸切疞舌巧切又音臭㕮咀上音父下音沮劇巨㦸切懊憹上於報切下音農怔忪上之成切下音鍾噫音呃舌强下去聲磣初甚切瞖暈上於計切下有慢切躑躅上音擲下直録切射干上音夜輭音軟礞音䝉已差下去聲肛户工切榧音匪辟温疫上必益切樗音樞鯪音陵甦音蘇􅀢若侯切聳息莮切數音朔菝葜上蒲八切下格八切竺音竹釭音江斡鳥括切溲踈有切痎音皆慄概音溉癉音亶喝音謂間日上去聲醇醨上音淳下音离滓音肺􅀈如倫切蓐乳属切澱音殿煽音扇憊蒲拜切瘁音悴馗巨屑切癓瘕上知陵切下音賈之夜切癃音隆悒於惠切顫掉上扇之切胛古狎切􅀈音旬惕音踢熇呵各切䈽居隠居欣二切瘴音障虺音鬼切糭作貢切瘵側畧切便利上平聲哺薄路切㹠徒昆切挾胡頰切櫸居語切礙王溉切噦於月切蘘音攘茜此見切髀補爾歩米二切瞶五怪切齊上臍同義左瘜思力切濼力毒切又音粕齧魚結切汩音骨蜚蠊上扶貴切下力占切菀於逺切疹音軫躄俾亦切􅉩呼光切瘠音籍瘛匹辟功二切埤音卑拭書翌切膨蒲行切􅀈音軟脘音管癖洒所界切譫之閻切滷音魯􅏬餘之切飴翼之切踹市䆓切咯血上力各切瞀莫切䯒户當切胵上音琵下音䲭痿挼奴和切胠音驅喎口淮切陟釐上音職下音离虙瘕上音伏下音古切黯鳥感切䏆才焦才髙二切骽他罪切契脮同凥苦髙切撞宅江切蓴常論切瞑音眠菰古胡切疰之戍切蝨所之切雚胡官切飫依伊切鹻公斬切鹼同羯音揭慒􅀈遭切臗苦官切弛音豕惙音輟烙力各切􅇟音信癎音閑舁音余蚰蜒上與周切下以然切犢徒木切蝦下加切蟇莫加切愊普力切臆音億筎汝余切芋王遇切骾音粳沉䩕下吾廉切王篇作䩕呀呷上許加切下呼加切啞音瘂嗄音厦柑音甘毗音琵膞音愽䠞千六切㤿於檢切鄲為温切槲薜荔上必益切下音詈涌並俞英莫結種切血切㯶橺音解息賁賁豚賁並音奔臚力居切􅓀奴切痃胡堅切鶩音木欓子上多郎切圊七情切姙娠上如林切下失人之忍二切痼古䕶切肛音功堰於㦥切嘿黙同酢泔淀上音醋中古三切下徒練切蚺如鹽切礜弋庶切澩胡角切呼篤切獺他逵切䏶毗米切􅍙渠軍切骽他罪切擡音謇九典切洵音荀渫士洽息列二切控枯洞切骭遐諫切喙詡切狸音离鳶以專切菥思擊切黏女㢘切黯上各旱切下昨旦切遽其據切毁沮下子與子預二切荏音餁􅑩莫郎切哽柯猛切悚息拱切颺弋章弋尚二切殗殜上於切切下余攝切騣子紅切控睪下音髙㿗邜上杜回切下虚管切脬音抛羸乏上力追切下房法切餈疾資切羖音古䏶毗米切葎陵出切蟯如消切肓音荒胴徒弄切臛火酷切乂音郝卒魘上倉聿切下音靨魅與魈同磥音磊梟古聊切噉徒敢切又音啖蚝之吏切蛓同螫式亦切蘹音懐慴之涉切穌音蘇痏羽軌切鬄髢司達計二切祟音隧殠欠救切凸音迭麨欠切皯皰上古且切下歩考切􅂒音尤皶織加切紺古暗切彡先亷所銜二切賁飾上彼義切饙甫云切辣力達切湏髮上與鬚同汞户孔切瘑古禾切鬐渠脂切椹時枕切瞳音童肓莫耕切􅗃才計切瞼九儉切觜子鬼切昉府防切熾尺示切茺蔚上音充下音尉眵充攴切疏瀹下弋灼余召二切眯莫禮切珂丘何切蔗睷音揵羃云各切熁虚業切泡普交切痒餘丙切鼢扶粉切又音墳鈐巨亷切莔口迎切矚之欲切蜆音贅之鋭切垜徒果切盎於浪切睢音雖鈹鎌上普皮切下力詹切諦都計切摭之石切薺在禮切檾􅔾同䑛神示切􅍬之忍切䁾音蔑捨鳥威切聾瞶上音龍下五隊切􅾛達零切耵矃上都領切下乃頂切攃七曷切齆鳥貢切泗洟上思至切下弋之切絆音半吻武粉切蠧音妬同瀋脣上充甚切齒􅉶下女力切齗音圻捍音汗芡音儉齲丘禹切骨䐬胙勞切璀璨上七罪切下七旦切鯇户本切懸雝下音饔碓丁潰切悒於急切㬽五各切鮎乃兼切鱖居月切笱音笱癭瘤上於郢切下音留靨黶普靨同瘻盧候切檞住買切稈古旱切蓏力果切鯷􅾒上大計切瘍音羊焚溺下音匿􅡒俞募上音庶下音莫捺乃曷切惻怛上楚力切下丁割切螯五力切蒻如灼切瘭布昭切棓歩項切捧柈司屨易上音句又良遇切下音昔刳音枯擦音察􅌯五到五髙二切窰音遥俚音里窠音科姤古候切􅀢於反於乍且故怯二切酉切瘑古禾切瘃音竹􅎲側交切迕呉胡切吮徐兖絶兖二切熠以立切蝙蝠上布田切下甫服切凹烏刀切垽五靳切忉都勞切􅔮音須餤音淬七内切菌竒隕切髀補爾歩米二切訂唐頂切菵音罔鏃作木切簽七亷切澼並擊切罨於儉切葈胥里切蹉跌上七何切下徒結切詎其吕切又渠據切殫多安切肭奴骨切攧丁愜切跕同踠於逺切蹴七六子六二切螟蛉上音㝠下音令踒於為切匈音信紊音問揣搦上初委切下女革女卓二切􅀢菌上荏切下商切咂子荅切惏力南切鮫古又切猘音制蜍與諸切蠷其係切螋山鄒切禳禬上汝陽切下公外切中灑上去聲下蘇駭切蜮兩逼切又音或縊於䜴切礱力公切罽衣上居厲切􅉊上音渠下音搜奄音掩矧式忍切皯直且切噀思困切搊楚鳩楚九二切衃匹才切鮀天何切鬐音耆惡阻上烏路切傴僂上郁禹切下力距切侏都儒切吃居一切腜莫回切肧匹囘切㠯音以醍醐上音啼下音胡柞子洛子各二切釭古紅古雙二切錐之推切沍音䕶橐他各切綰膺柭切齝丑之式之二切妬乳上丹故切撮倉括切㬽五各切解顱下洛胡切襁褓上居兩切下布老切骼柯額切疢疹同米末切頦胡來切尻苦髙切匍匐上蒲胡切下蒲北切髖苦官苦昆二切哯乎與切齘伯介切胗章忍切疱普交切􅀈啀上音孜下魚作切糕古勞切蛜􅀈上音伊下音祈瘹都呌切蚱音窄輞云往切躽於建切蹙子六切褊音匾魍魎上音㒺下音兩搯口洽切撏徐林徐占二切踧達的切蚌歩項切齆於貢切芹渠巾切璣音機熛必尭切矇音䝉悍乎日切瘙先到切蘄音祈痍餘脂切肪府昉切􅆵直連切􅂒初吏切鎊普忙切倪魚雞切弁薄官薄見二切掘渠力其日二切抝鳥狡切舶榜陌切棚薄庚切鱠古外切􅥪音甲饆饠上卑各切下洛可切餺飥上補备切下他洛切鳬音符骨空下音禮摭之石切骼柯額切㗁五各切蓧他彫切􅐳骭上音曷下羽俱切猒於艶切膠力條切窳俞矩切臑奴到切䏚音蒸骸何背切揵巨言其偃居偃三切踝胡尾切膕弋麥切鋭弋稅切揄臂上逾招抉候二切譩譆上於熈切下計其切拇莫口切内鍼上音納喝乙芥切又音郝髃音隅憡山責切郄綺㦸切鏬呼嫁切頄音逹頥以之切㬷巨損切頗惡葛切鼷下雞切槍千羊切滀仲六切䏆木焦才髙二切臀徒昆切􅀈以追切橛居越切摸􅟥上音莫下音索各切􅀢力紅切瘈胡計切丁結切㰦立伽切顳顬上仁涉切下仁朱切蹲在昆切猘音至骶丁計切笑笑同顀椎同狠胡懇切窌户枝切鑱士衫上懴二切鍉丁兮切筩徒東切鈹音皮切氂音毫焠青對切粢在兹切挃竹栗切鋥直孟切莫登莫中二切睢胥維切漯通合切胂音申古滑切之齊下音劑祖側助兖切啖音淡撤直列切眄音面幘側莗切塘音唐煒于匪切矛楯下時切一作盾噀思困切糚粧同駮甫而切勝直錦徒曽二切鑊胡郎切騶側留切咄丁骨切力的切髑髏上徒谷切下力佳切弭亡爾切罡谷音刚􅀈音祥摩乎為切又音麽啡普梅切朘子雷切涒他昆切噩音㗁涂達胡直都二切陬子侯切竊皮命切牂子唐切同㫠􅟡作􅀈音標欛必駕切鉀古狎切郍奴和切本作指鸕鷀上呼力切下疾之切姖本作嫗柈同槃檄户秋切鴧除禁切咤音吒蠕􅀈上而究切下他連切蝶徒篋切蝺音禹蚑音商婬滛同櫛阻瑟切䏶毗米切拗鳥較切悁於緣切胓蒲京切呬火利切眣徒結切禺䀯上音隅下布胡切飴翼之切胼歩田切呦音憂掇都活切普濟方附録
