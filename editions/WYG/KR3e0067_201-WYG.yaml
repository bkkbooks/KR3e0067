咀每服四錢以水一盞酒半盞生薑七片棗一枚煎至七分去滓溫服不拘時候人參㪚出聖惠方治霍亂身體疼痛四肢逆冷服理中四逆不效者人參一兩去蘆頭附子二兩炮去臍白芍藥一兩桂心二兩當歸一兩剉碎㣲炒陳橘皮二兩湯浸去白焙白术二兩髙良薑一兩剉右搗篩為散每服四錢以水一中盞入棗三枚煎至六分去滓不計時候熱服吳茱茰湯出聖惠方治霍亂多寒手足厥冷脉絶吳茱茰半升洗焙乾當歸切焙桂去粗皮芍藥各三分細辛去苗葉木通剉甘草炙各半兩右㕮咀如麻豆每服五錢匕水一盞酒半盞入生薑一棗大拍碎棗二枚煎至一盞去滓溫服如氣痞加葛根半兩去棗一方有木香無木通無酒附子散出聖惠方治霍亂腹滿虚鳴氣逆手足俱冷附子炮去皮臍草豆蔲去皮桂心陳橘皮湯浸去白焙髙良薑剉各半兩甘草炙㣲赤剉右搗篩為散每服三錢以水一中盞入生薑半分煎至六分不拘時候溫服人參散治霍亂吐瀉不定四肢逆冷大渇欲水出聖惠方人參三兩去蘆頭附子炮製去皮臍甘草炙㣲赤剉白术乾薑炮製剉麥門冬去心各二兩右搗篩為散每服三錢匕水一中盞煎至六分去滓不計時候熱服附子粳米湯出千金方治霍亂四逆吐少嘔多者中附子一枚粳米五合半夏半升大棗十枚乾薑甘草各一兩右㕮咀以水八升煑藥取米熟去滓分三服當歸㪚治霍亂嘔吐及下後腹中乾痛手足逆冷當歸㣲炒人參去蘆頭附子炮製去皮臍以上各一兩乾薑甘草炙㣲赤剉各半兩右搗篩為散每服三錢以水一中盞煎至六分去滓不拘時熱服甘草飲治主脾腎冷氣乗心痛煩吐痢四肢逆冷或則煩痛病源云霍亂而吐大下後其腸胃俱虚乃至汗出其脉欲絶手足皆冷為四逆四逆者謂隂陽絶也甘草炙人參乾薑厚朴炙白术各三兩右切以水五升煮取一升五合去滓分溫三四服如人行八九里忌海藻菘菜桃李雀肉等桔梗湯出聖濟總錄治霍亂吐痢已定汗出厥冷四肢拘急腹中痛不解脉欲絶桔梗剉炒乾薑炮各一兩甘草炙附子炮製去皮臍各二兩右剉如麻豆每服三錢匕水一盞煎至八分去滓溫服四順附子湯出聖惠方一名加味姜附湯治吐㵼過多手足逆冷脉沉細氣小不語急服及霍亂轉筋肉冷汗出嘔呃生附子白薑炮人參甘草炒各一分右剉每服四錢水一盞空腹服腹痛加桂小便不利加茯苓仍用炒鹽熨臍或用薑附湯一方附子炮去皮臍下甚加龍骨腹痛不止加當歸香薷飲一名青連飲子出聖惠總錄治霍亂吐㵼四肢厥冷香薷去根二兩半藿香去根焙二兩草烏頭浸切去皮臍晒乾二兩入鹽三兩同炒烏頭黄褐色去鹽不用黄連去鬚呉茱茰同炒二兩黄連去呉茱茰不用取二兩以水煎服驗通脉四逆湯一名薑附湯出十便良方治霍亂脉㣲欲絶或惡寒四肢拘急手足厥逆或吐痢已定汗出而絶四逆不解甘草炙二兩乾薑炮二兩附子炮去皮臍二兩右剉如麻豆每服五錢匕水一盞半煎至八分去滓溫服脉出即愈而赤者加葱白一莖同煎腹痛去葱白加芍藥二兩嘔加生薑一分切同煎咽痛去芍藥加桔梗并人參二兩吐痢止為度若身疼痛不休者消息和其脉外傷寒論中又有療諸發熱霍亂者審取之忌海藻菘菜猪肉天南星散一名回陽散出危氏方治吐下四肢逆冷不省人事南星末二錢棗五枚薑五片右水煎極熱服之一方無生薑半夏湯出危氏方治吐下四肢逆冷不省人事半夏末三錢生薑汁少許右以熱湯㸃一服可效白礬末㸃服亦驗治霍亂吐㵼冷氣攻心腹痛四肢逆冷汗出出聖惠方用硫黄一兩細研如麺以熱酒調下一錢回陽散出本草治吐瀉不止或致轉筋四肢發厥虚風不省人事服此四肢漸煖神識便省用天南星為末每服三錢入京棗三枚同煎八分温服未省再服普濟方巻二百一
