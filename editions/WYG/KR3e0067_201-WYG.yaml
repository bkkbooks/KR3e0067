body:
  text: 普濟方卷二百一明周王朱橚撰霍亂門總論霍亂有三名一名胃反言其胃氣虚逆反吐飲食也二名霍亂言其病揮霍之間便致撩亂也三名走哺言其哺食變逆者也診其脉來代者霍亂之脉代而絶者亦霍亂而轉筋葢由冷氣入於筋故也足三隂三陽之筋起於足指手之三隂三陽之筋起於手指並循絡於身夫霍亂大吐下之後隂陽俱虚血氣虚極則手足逆冷而榮衛不理冷摶於筋則筋為之轉冷入於足之三隂三陽則脚筋轉入於手之三隂三陽則手筋轉隨冷所入之筋而轉由邪冷之氣擊動其筋而移轉也經曰足太陽下血氣以日少則善轉筋善踵下痛者是氣少則易虚虚而風冷乗之故也診其左手闗上脉肝也沉為隂陽實者肝實也實由擊動轉筋左手尺中名神門以後脉足少隂經也浮為隂陽虚者病若轉筋霍亂之後煩躁卧不安者由吐下之後腑臟虚極隂陽未理血虚氣亂故血氣之行未復常度内乗於腑臟故煩躁而不得安卧也人生禀命以五臟為主夫臟者即是五行内為五行外為五味五行五味便宜扶抑所以春夏秋冬逆調理之食啖不可過度凡飲食於五臓相尅者為病相生者無他經曰春不食辛夏無食醎季夏無食酸秋無食苦冬無食甜此不必全不食但慎其太甚耳諺曰百病從口生盖不虚也四時昏食不得太飽皆能生病從夏至秋分忌食肥濃然熱月人自好冷食更無肥濃無食菓菜無節及逐飡眠卧冷水洗浴五味更相尅臟雖欲無病不可得也所以病故人自作之非闗運也書曰非天夭人人中自絶命此之謂也隂陽二氣擁而反戾揮霍之間變成吐利此名霍亂輕者脚多轉筋甚者遍體轉筋夏月伏暑亦令人吐痢傷寒亦令人吐痢當察其由施以治法大抵霍亂脉表浮洪者可治脉表㣲而遲氣少不語者不可治乾上坤下其卦為否陽隔隂而不降隂無陽而不升此否之所以痞而不通也人具此隂陽揮霍亂變結摶於中卒然或㵼而不吐或吐而不㵼大抵心腹攪悶煩痛其視天地不交之否異乎否乎霍亂之證心腹卒痛嘔吐下痢發熱憎寒頭痛眩暈先心痛則先吐先腹痛則先㵼心腹俱痛則吐㵼俱作甚則轉筋頽頓特反掌間盖陽明屬胃以養宗筋暴吐暴下津液驟亡宗筋失其所養故亦手急甚則舌卷縮囊危甚風燭矣然亦何以致此哉曰胃伏暑毒露卧早濕當風取凉風冷邪氣入於腸胃加以嗜好肥腥飲啖生冷居處不節激而發焉於是邪正相干中脘節閉氣不得通吐痢暴作所謂脾受賊邪水來勝土者此也治法藿香正氣散加藿香生薑為主不惟可以溫散風邪亦可以調理吐㵼其若傷暑所致未可遽投香薷散沉泠之劑自合先治中脘如二陳湯橘皮半夏湯等次則以香薷溫服散暑解煩昧者渾為脾胃虚冷遽用人參白术訶子肉豆蔲之屬以壯胃澁腸不思風冷未散輙以參术訶蔲攔補寒邪邪氣得之愈盛愈作縱得淹延或下痢或久瀉或腹脹虚浮或中滿不食變證將百出矣抑猶有說焉濕霍亂死者少乾霍亂死者多許仁則嘗有是言矣盖謂所傷之物因吐痢而出泄泄盡則止猶可幸免若上不得吐下不得痢所傷之物擁閉正氣闗隔隂陽燥攪喘脹其能生乎則知揮霍逆亂如人被髪交爭必有以俟之可也古方用來復丹正取踈利之意但多則太溫莫若薑湯下蘇感丸為愈霍亂氣息少力不欲言者不治又曰治嘔吐莫先於助胃既助胃而復嘔吐者中脘挾風寒也治喘𠻳莫先於調肺既調肺而復喘𠻳者風寒在表或在裏也㵼痢之疾固腸澁下終不作效非腸胃間留畜風寒邪氣之所致乎故必隨其感受解散於其先則某病某藥庶乎其對證矣解㪚風寒不換金正氣散為上其間增益則青皮官桂良薑乾薑撮用最良若欲其清解則紫蘇荆芥柴胡乾葛等藥酌量可也惟暑亦然每每隱伏作病或為焦煩或為膓痛或泄痢不止暑中類多有之治霍亂倉卒之症宜於臍中灼艾及用蓼花一把煎湯泡洗次投以薑附理中湯之類其脉洪大者易治脉㣲腎縮舌捲者難治又有霍亂而不吐者類吐不吐類痢不痢頃刻之間便致悶絶當多灌鹽湯引其必吐宿食飱盡然後以嚴氏加減理中湯治中湯欵調之既愈之後煩熱多渴者以麥門冬湯調之凡諸霍亂忌與米食飲胃中得米即吐不止但與厚朴葛根飲若冬𤓰葉飲但沾漬咽㗋而不可多與若服湯時隨服吐者候吐定乃止診脉絶不通以桂合葛根為飲吐下心煩内熱汗不出不轉筋脉急数者可犀角葛根為飲吐下不止發熱心煩欲水可以飲米粉汗出為佳若不止可以葛根薺苨飲服之問曰病者發熱頭疼身體痛惡寒而復吐痢當屬何病師曰當為霍亂霍亂吐痢止而復發熱也傷寒其脉㣲澁本是霍亂今是傷寒却四五日至隂經上轉入隂必痢今反不痢者不可治也霍亂吐痢者多必轉筋不渇即臍上築霍亂而臍上築者為腎氣動當先治其築治中湯主之去术加桂去术者虚故也加桂者恐作賁㹠也霍亂而臍上築吐多者若下多者霍亂而驚悸霍亂而渇霍亂而腹中痛嘔而吐痢欲得水者皆用治中湯主之霍亂吐痢附論夫霍亂吐痢者以三焦氣不升降而清濁相干於腸胃間若先心痛則吐先腹痛則痢先心腹並痛則吐痢俱發治此者多以中焦為本中焦既和則清濁自分而吐痢止矣諸惡風惡寒者有汗無汗重暑煩毒皆外所因盖傷風則惡風有汗傷寒則惡寒無汗胃濕則重暑則熱煩此雖常論揮霍之間倉卒不辨遂致錯誤亂經反常為害不淺諸大喜傷心則氣㪚大怒傷肝則氣上憂傷肺則氣怯驚傷膽則氣亂涎氣槩鬱聚結臟飲痞隔不通遂致滿悶隨其勝復必作吐痢當從内所因治之諸飽食膾炙恣飱乳酪水陸珍品哺鹽雜殽快飲寒漿強進石酒躭縱情慾不節以胃為五臟海因脾氣以運行胃既䐜脹臟復停凝藏氣不行必致鬱發遂成吐痢當從不外内因治之霍亂轉筋者以陽明養宗筋屬胃於大腸今暴吐津液頓亡外傷四氣内積七情飲甘膩致閉諸脉枯削於筋宗筋失養必致攣急甚則卵縮舌捲為難治又云霍亂吐痢後煩渴者以隂陽反戾清氣干濁水與榖併小便閉澁既走津液腎必枯燥引水自救煩渴必矣又云凡外所因必自經絡傳入臟腑須以脉證推其所因隨經絡調之則盡善矣假如傷寒在太隂經當用四逆湯少隂經當用麻黄附子湯厥隂經當用理中湯若在太陽經還用麻黄湯陽明經養胃湯少陽經小柴胡湯風暑濕亦然風則桂枝湯暑則香薷飲五苓散濕則苓术湯滲濕儒門事親云凡嘔吐而瀉病名曰何也内經熱論云此乃轉筋霍亂之證也何氣使然此乃邪氣在於中焦使隂陽二氣不能升降其證心痛則吐先腹痛則瀉先如心腹俱痛則吐瀉並作致使揮霍之間自然撩亂此證喜氣凉之物可用冰水調苓益元則愈矣大忌熱物轉筋之病治之奈何經曰勞者溫之溫者溫存之意也又一法生姜湯益元㪚白术散禹功散加氷沉細細呷之渴未止者頻頻飲之如無氷新汲水亦得用之大忌白粥米湯桂附種種之燥藥不可服之若一味用燥藥服之必死如無藥處可服地漿者掘地作坑注新水於其中間渾旋旋取澄清者飲三五盞立愈方杜若丸出千金方治霍亂久將逺行預備杜若藿香白术橘皮吳茱茰乾薑人參厚朴木香雞舌香瞿麥桂心薄荷女菀茴香右等分為末煉蜜為丸如梧桐子大酒下二十丸薺苨飲出千金方因霍亂吐下服諸熱藥吐下得止因即變虚心煩手足熱口燥欲得水嘔逆迷悶脉急數者及時行熱病後毒未盡因霍亂吐下仍發熱心腦欲裂者以此解之薺苨人參厚朴知母栝蔞根茯苓犀角藍子枳實桔梗橘皮葛根黄芩甘草各二兩右㕮咀以水一斗煮取三升分三服竹葉湯治霍亂吐痢已服理中四順等湯不解者竹葉一握小麥一升生薑十塊甘草人參附子芍藥各一兩橘皮當歸桂心各二兩白术三兩右㕮咀以水一斗半煮竹葉小麥取八升去滓下藥煮取三升分三服上氣加茱茰半升即瘥理中四順湯皆大熱若有熱宜竹葉湯木𤓰㪚出聖恵方治霍亂吐痢冷氣攻心腹木𤓰一兩乾者艾葉五錢當歸半兩剉㣲炒木香半兩桂心半兩訶梨勒三分煨用皮肉蔲半兩去壳人參半兩去頭白术三分陳橘皮一兩湯浸去穰焙厚朴三分去粗皮塗生薑汁炙香熟右為散每服三錢以水一鐘煎至五分去渣不計時稍熱服之人參湯出聖惠方治毒冷霍亂吐痢煩嘔轉筋肉冷汗出手足指皆腫喘垂死絶音不出百方不效脉不通者服此湯取瘥乃止隨吐續服勿止併灸人參附子炮裂去皮臍茯苓去黑皮厚朴去粗皮生薑炙甘草炙橘皮湯泡去白穰當歸切焙葛根剉桂心去粗皮乾薑各三兩炮過右㕮咀以水七升煮取汁二升半分三服不拘時一方有生薑虎掌丸出千金方治霍亂永不發虎掌薇衘各二兩枳實附子人參梹榔乾薑各二兩厚朴六兩皂莢三寸白术五兩右為末蜜丸如梧桐子大每服二丸酒下日三服一方用枳壳去枳實武徳行尼名净明患此已久或一月一發或一月再發将至死時在朝太醫院許甘巢之徒亦不能識余以此治之丁香丸出聖濟總錄治飲食過傷吐瀉丁香白术縮砂仁木香肉荳䓻去皮乾薑炮桂去粗皮三分陳橘皮去白焙一兩紅荳䓻去皮五錢枳殻去瓤麩炒半兩右為末煉蜜為丸如梧桐子大每服三十丸煎生薑木𤓰湯嚼下丁香散出十便良方治霍亂吐痢不止丁香桂心白术各半兩訶梨勒煨用皮厚朴去粗皮生薑汁髙良薑剉附子炮裂去皮臍各三分陳橘皮湯浸去白焙木𤓰乾者各一兩右為細散不計時分粥飲調下二錢乾薑湯出聖濟總錄治霍亂吐痢心腹痛疼氣逆手足冷乾薑炮甘草炙桂去粗皮附子炮裂去皮臍草荳蔲去皮木香髙良薑炮肉荳蔲去壳麵煨乾木𤓰各半兩右剉如麻豆每服三錢以水一盞煎至七分去滓溫服七氣湯出危氏方治憂思喜怒悲恐驚七氣鬱發致五臟互相刑尅隂陽反戾揮霍變亂吐痢交作寒熱暈眩痞滿咽寒半夏湯洗五兩厚朴薑炙桂心各三兩茯苓白芍藥紫蘇葉橘皮各二兩人參二兩右為㪚每服四錢水一盞半薑七片棗二枚煎至七分去滓空腹服白术湯治霍亂吐痢白术三兩甘草炙附子炮裂去皮臍人參各一兩桂去粗皮當歸切焙陳橘皮去白焙各二兩右剉如麻豆每服五錢以煮小麥汁一盞入竹葉一握生薑半分拍碎煎至八分大豆飲出聖濟總錄大豆香薷蘆根枇杷葉拭去毛炙竹茹前胡去蘆頭陳橘皮去白焙右等分㕮咀每服五錢以水一盞半入生薑一分切煎取一盞去滓溫服香薷丸出聖濟總錄治冷熱不調霍亂吐瀉香薷一兩半白扁豆炒一兩丁香皮三兩藿香去梗零陵香各半兩益智仁一分木香一兩右為末麵糊為丸如梧桐子大每服二十丸食前溫紫蘇湯下治要除濕湯出直指方半夏麵川厚朴製蒼术炒各二兩藿香葉陳皮茯苓赤者各一兩甘草炙七錢右剉散每服四錢薑七片棗二枚煎服霍亂而不吐者加桂吐而不瀉者去蒼术加丁香吐㵼俱作兼腹痛者只加桂一方無茯苓散利其小水一方有木香酸棗仁湯出危氏方治霍亂吐下増劇虚勞煩擾奔氣在胸中不得眠發寒熱頭疼暈悶酸棗仁炒一兩三分人參桂心知母茯苓各三錢三石膏煨半兩甘草炙二錢右剉散每服四錢水一盞半薑三片棗二枚煎七分去滓食前服理中散出十便良方治霍亂轉筋吐痢不止青木香六分桂心八分炙厚朴八分白术八分乾薑十分炮甘草八分炙附子六分炮右搗篩為散每服四錢匕人行六里不定更服一錢匕瘥忌海藻粉菜生葱理中丸出聖濟總錄治冷熱不調霍亂吐痢宿食不消人參白术髙良薑乾薑桂去粗皮各六兩右為末煉蜜和丸如梧桐子大每服三十丸空心米飲下日再服一方有甘草無白术除濕湯出危氏方治滿身腫者或多食生冷揮霍之間吐㵼俱作半夏湯洗一兩藿香葉五錢去土厚朴去粗皮切薑汁炒用一兩陳皮五錢去白甘草三錢蒼术米泔浸一兩切炒赤右剉散每服四錢水一盞半生薑七片紅棗二枚煎熱服不拘時候人參湯療霍亂卒吐下不禁脉暴數者人參茯苓葛根橘皮甘草炙麥門冬去心各二兩右切以水五升煮取二升去滓溫服分三次服忌海藻菘菜醋等髙良薑散治霍亂冷熱不調吐痢不止髙良薑剉木𤓰乾者香薷已上各一兩梨枝葉一兩五錢人參三分去蘆頭右為散每服三錢以水一盞煎七分溫頻服胃氣丸出危氏方治憂思過度脾肺氣閉聚結涎飲留滯腸胃氣鬱於隂寒凝於陽隂陽反戾吐痢交作四肢厥冷頭目眩暈或復發熱兼治老人胃寒大便反秘妊娠惡阻全不納食硫黄不拘多少猪臟内縛兩頭以米泔酒童子小便各一碗煮乾一半取出洗穢氣擦乾秤十兩半夏湯洗去滑秤五兩白茯苓人參各一兩石膏一分煆一法用硫黄煮右為末生薑自然汁炊餅糊丸如梧桐子大每服五十丸至百丸空心米湯入少生薑汁下紅丸子出三因方治脾胃虚冷飲食不節宿食留飲聚癖腸胃或因氣不調衝冒寒濕忽作霍亂吐痢併作心腹絞痛腸胃纒刺疲苶不勝蓬术剉二兩胡椒一兩三稜剉秤二兩同米醋煮一伏時青皮三兩炒阿魏一分右為末醋化阿魏陳米粉糊為丸如梧子大礬硃為衣每服百丸二百丸煎生薑甘草湯下太白丸出指南方治霍亂吐痢分利隂陽𤣥明石或云𤣥精石半夏各一兩硫黄三錢右為末麫糊丸如梧子大每服三十丸米飲下脾厥吐㵼霍亂出指南方附子炮裂去皮臍薑甘草炮䜴等分右用水一升藥末二錢棗七枚薑一錢煎一盞溫服草荳蔲㪚治霍亂水痢不止吐不下食兼煩渇草荳蔲去皮丁香各半兩黄連一兩去鬚炒右為散每服三錢以清水一鍾入黑豆五十粒生薑半分煎至六分去滓不計時候溫服人參湯出聖濟總錄治霍亂吐下人參乾薑炮陳橘皮去白焙桂去粗皮各一兩甘草炙半兩右搗篩每服三錢用水二盞入棗三枚擘煎取一盞去滓熱服連進三服立止菖蒲飲出聖濟總錄治霍亂吐㵼不止菖蒲切焙髙良薑各一兩甘草半兩炙白术半兩青橘皮去白焙一兩右為粗末每服三錢以水一盞煎十數沸傾出放溫頓服白丸療霍亂嘔吐及暴痢半夏三兩洗附子四兩炮乾薑四兩炮人參三兩桔梗二兩右作㪚臨病和之若吐痢不止者以苦酒和之飲服二丸如梧子不瘥復耐藥者加之以意下者以蜜和丸忌猪羊肉餳霍亂證出拔萃方本自胃經或因寒飲或因飲水或寒暑毒或濕氣冷熱不調水火相干隂陽相摶故轉筋攣痛經絡亂行暴熱吐瀉中焦胃氣所主也察其色脉隨經標本此治霍亂吐瀉之法也如頭痛發熱邪自風寒而來中焦為熱相乗之分邪稍髙者居陽分則熱熱多飲水者五苓㪚以㪚之如邪稍下者居隂分則為寒寒多不用水者理中丸以溫之如吐痢後有表者解之汗出厥逆者温之如既吐且痢小便利大汗出内外熱者亦溫之如此下後汗出厥逆不解脉欲絶者四逆等湯治之如吐瀉轉筋身熱脉長陽明本病也宜和中四君子湯平胃散建中湯四君子湯茯苓白术人參黄耆各一兩右剉如麻豆大每服一兩水三盞薑五片煎至一盞去滓溫服如吐㵼轉筋頭痛自汗脉浮者四君子湯加桂五錢主之如吐瀉轉筋頭痛無汗脉浮者四君子湯加麻黄五錢主之如吐瀉轉筋脇下痛脉弦者宜建中加木𤓰柴胡湯平胃加木𤓰五錢亦可也桂枝三兩半芍藥二兩甘草一兩膠飴半升生薑三兩大棗六枚木𤓰五錢柴胡五錢右剉如麻豆大每服一兩水三盞半去滓下膠飴兩匙煎化服吐瀉轉筋眼中痛體重脉浮而細者宜四君子加芍藥髙良薑湯四君子四味各一兩芍藥良薑各五錢同前煎服如吐瀉霍亂四肢拘急脉沉而遲者宜四君子加薑附子厚朴湯四君子四味各一兩生薑附子厚朴炮製各三錢如吐瀉轉筋四肢厥冷建中加附子當歸湯桂枝一兩當歸三錢芍藥二兩甘草五錢膠飴半兩生薑一兩附子三錢炮大棗六枚同前煎服理中丸出肘後方療霍亂吐痢宿食不消白术乾薑炮甘草炙人參大麥蘖熬令黄各二兩右搗篩蜜和丸以水飲服十五丸如梧子大日再服稍加至二十丸忌海藻桃李雀肉等物亂髪湯出聖濟總錄療霍亂諸藥不能療亂髪一握如雞子熬令焦小蒜十四枚附子一兩炮甘草三兩炙右切以水六升煮取三升去滓溫分三服忌猪肉海藻菘菜丁香㪚出聖濟總錄治霍亂不止丁香木香肉豆蔲去壳各一兩右為細散每服二錢以白粥飲調下熱服和氣煎出聖濟總錄治霍亂吐瀉冷熱不調胡椒菉豆各一兩人參一分右生搗羅為散每服三錢以水一盞煎五六沸去滓熱服厚朴散出聖惠方治霍亂吐瀉不止厚朴一兩半去粗皮塗生薑汁炙香熟甘草半兩炙粗赤剉肉豆蔲三分去壳黄連三分去鬚右件為㪚每服三錢以水一鍾煎至五分去滓溫頻服治霍亂下痢吐方出聖惠方人參去蘆頭三分厚朴半兩去粗皮塗生薑汁炙令香熟兎骨一兩炙令黄陳橘皮二分去白湯浸焙右搗篩為散每服三錢以水一中盞生薑半分煎至五分去滓不計時候溫服藿香烏藥散出百一選方治霍亂藿香葉烏藥香附子炒各半兩甘草二錢半炙右為粗末水一大鐘煎至七分溫服藿香湯出聖濟總錄治霍亂吐痢不止藿香去梗半兩丁香一分白芷縮沙去皮各一兩右粗搗篩每服二錢匕水一中盞煎至六分去滓熱呷不計時候正胃湯出聖濟總録治霍亂不止枇杷葉去毛炙桂去粗皮厚朴去粗皮薑汁炙陳橘皮去白焙各半兩右為粗末每服二錢用水一盞入生薑三片煎至六分去滓熱服不拘時金液丹治霍亂吐㵼硫黄二兩胡椒五錢黄蠟一兩右為末鎔黄蠟為丸如白豆大每服一丸凉水送下不止再服一丸香薷丸一名香薷湯出如宜方治隂陽不順清濁相干氣射中焦名霍亂因飽食所傷然也香薷一兩半厚朴二兩黄連二兩同厚朴入生薑四兩同拌匀炒令紫色右為末每服三錢水一盞酒一盞同煎去滓井水沉冷頓服不犯鐵器兼治吐痢腹中痛大渴煩躁四肢逆冷汗自出筋轉痛不可忍者髙良薑湯治霍亂冷熱不調吐痢瀉杜梨枝葉三兩良薑五兩木𤓰一枚右為末水六升煑取二升絞出滓空腹溫三服一方有藿香葉無杜梨理中丸出聖惠方治惡寒無汗過食生冷或飲寒漿霍亂吐下脹滿飲食不消心腹疼痛胸膈痞塞或暈緩弱脉微卧起不安手足躁擾水漿不下此由冷熱失和邪正相干清濁不分隂陽錯亂喜冷者因熱惡冷者因寒其脉弦大一名理中湯人參去蘆乾薑炮白术去蘆甘草炙各三兩右剉散每服四大錢水一盞煎至七分去滓食前服逺行防霍亂煉蜜為丸如梧子大每服三五十丸如作末每服方寸匕酒調下亦得若轉筋者加石膏煆三兩若臍上築者腎氣動也去术加桂心四兩腎惡燥故去术恐作奔㹠故加桂吐多者去术加生薑三兩下多者復用术悸者加茯苓二兩渇欲得水加术合煎成四兩半腹滿加人參合煎成四兩半若寒者加乾薑合煎四兩半腹滿去术加厚朴附子各半兩病退而不食者加白荳蔲橘紅麥蘖各半兩服藥後服熱粥一盃微自溫腹勿發掲衣被噦則加丁香吐痢止身體痛不休者審其元因以和解之如初因傷風用桂枝之類所謂治其本也香蘇散治身熱無汗霍亂吐下臉赤多痰加霍香葉生烏藥烏梅生薑煎甚妙一方吐瀉不止身冷汗出無脉者可服漿水㪚兼桂枝湯白术湯木𤓰湯出危氏方治霍亂吐下已舉體轉筋入腹則悶絶木𤓰乾一兩去瓤吳茱茰半兩湯洗茴香二錢半甘草炙一錢右剉㪚每服四錢水一盞半生薑三片紫蘇十葉食鹽一撮煎至七分去滓食前服仍研生蒜貼心下脚心上又用薑一附湯清煎沉冷服之效熱因寒用之法也訶子㪚治幼老霍亂吐痢一服效一方無鹽煎良薑飲治霍亂神效良薑藿香陳皮各一兩炙甘草三分右剉細末每服三錢水煎服白龍骨丸治吐瀉白龍骨白磰白石膏白礬各等分右為末滴水丸梧子大入乾鍋火煆紅為度每服五丸至十丸米飲湯下石膏是軟者北人謂之寒水石故可煆韓御帶施此藥即驗四逆加猪膽湯出肘後方療霍亂吐痢而汗小便復利或下利清糓裏外無熱脉微欲絶或惡寒四肢拘急手足厥逆甘草二兩乾炙薑半兩炮附子一枚生去皮破八片猪膽汁半合右切以水二升煑取一升四合溫分再服無猪膽以羊膽代之刪繁千金經心録同強人可與大附子一枚乾薑至三兩若吐之後吸吸少氣者及下而腹滿者加人參一兩諸藥皆減為一兩如証者亦宜與理厥逆人參湯佳忌海藻菘菜猪肉等豆湯療霍亂吐痢扁豆葉切一升香藿葉切一升木𤓰切一枚乾薑切一兩右以水六升煑取二升五合絞去滓分溫三服服後相去如人行六七里並無忌四神丸主霍亂冷實不除及痰飲百病無所不主乾薑桂心附子炮各一兩巴豆六十枚去心皮熬研如膏右為末蜜和為丸如小豆大飲服二丸取快不下又服一丸忌生葱野猪肉蘆笋治霍亂初覺吐痢方出聖惠方香薷一兩小蒜一兩厚朴一兩去粗皮塗生薑汁炙令香熟右細剉令匀每服半兩以水一大盞入生薑半分煎至七分去滓溫服不計時服之厚朴㪚出仁存方治霍亂吐痢厚朴二兩炙製肉豆蔲半兩草豆蔲仁半兩右為㪚每服三錢以水一盞鹽一捻煎至八分去滓熱呷再服立止婦人不用鹽薑二片煎陳橘皮湯出聖濟總錄治霍亂吐痢陳橘皮甘草炙一兩白术三兩右搗篩每服五錢以水一盞半竹葉十片生薑半分小麥汁半盞煎至八分去滓温服日三胡椒湯一名豆椒散出危氏方治霍亂吐痢諸藥不納兼治中暑暴下胡椒七粒生菉豆二十一粒右為末煎木𤓰温鹽湯調下一錢一方無木𤓰用新汲水煎湯下治中湯治飲食居處不節以致霍亂本方青皮陳皮乾薑能散風寒蘇合香丸用枳殻一方木𤓰半分煎湯調下治乾霍亂不吐不瀉氣痞于中心腹絞痛此證最惡青金丹一名的寄丹出十便良方治霍亂吐瀉不止及轉筋諸藥不效者一粒治一人及治一切吐逆翻胃不問虚冷熱並皆治之硫黄一兩研水銀八錢以銚子内炒栁木箆不住手攪更以栁蘸以候頻頻洒候如鐵色法如青金塊方成刮下再如粉留少半為散餘以粽子尖三個醋約半盞研稀稠得所成膏和丸如鷄頭大朱砂為衣每服一丸丁香湯磨化下伏熱丁香湯調下一錢傷寒隂陽乘伏用龍腦冷水磨日三二服或云以木𤓰湯調散并米飲亦得吳茱茰湯一名四片金出衛生寶鑑方治冒暑伏熱腹痛作瀉或痢并飲水過度霍亂吐瀉其證始因飲冷或胃寒或忍飢或大怒或乗舟車傷動胃氣令人上吐下瀉吐瀉併行頭足轉筋四肢逆冷用藥遲慢須㬰不救命在頃刻之間吳茱茰木𤓰食鹽各半兩右同炒令焦先用磁瓶盛水三升煑令百沸入藥煎至二升已下傾一盞冷熱隨病人服之卒無前藥用苦白礬為末每服一大錢沸湯調服更無前藥用鹽一撮醋一盞煎至八分溫服或鹽梅醎酸等物皆可服劇方本以醎酸二物煑香𤓰湯出百一選方木𤓰藿香良薑右等分為散每服三錢以水一盞煎去滓熱服訶子丸出楊氏家藏方治大人小兒瀉訶子一兩藿香一兩肉豆蔲二箇右為末蜜丸隨大小米飲下豌豆香薷散出聖惠方治霍亂吐痢豌豆三合香薷三兩右為末以水三大盞煎至一盞半去滓溫服三服藊豆散出千金方治霍亂藊豆香薷各一升右以水六升煑取二升分服單用亦得桑葉湯出聖惠方治霍亂吐瀉不定桑葉一握扁竹一握右剉以水二大盞煎至一大盞去滓溫服分為三服如人行三里再服水浸丹出三因方治伏暑傷冷冷熱不調霍亂吐痢口乾煩渇黄丹一兩分炒巴豆二十五箇去皮心右同研