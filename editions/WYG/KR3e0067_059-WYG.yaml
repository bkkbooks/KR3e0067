body:
  text: 普濟方卷六十明周王朱橚撰咽喉門總論夫咽者應五臟六腑往還神氣隂陽通塞之道也喉嚨胞囊舌者並津液五味之氣本也咽門者肝膽之候也其重十兩廣二寸五分胃管長一尺六寸主通五臟六腑津液神氣應十二味若臟熱則咽門閉而氣塞若腑寒則咽門破而聲嘶母薑酒主之熱則通之寒則補之若寒熱調和病不生矣喉嚨者脾胃之候也重十二兩長一尺二寸廣二寸其層圍十二重應十二時主通利水榖之道徃來神氣若臓熱喉則腫塞氣不通鳥翣膏止之若腑寒喉則耿耿如物常欲塞癢痺涎唾熱則開之寒則通之不熱不寒依臟調之咽者胃之系喉者肺氣之所通咽以嚥物喉以候氣咽喉嚨三者各有所司咽者舌本之根因物之至推而納之以通胃所司者納而不出喉者候氣之呼吸以通肺所司者有出有入嚨者舌下二竅但閉口齒屈舌於上腭則津液滿以通心所司者有出無入風邪客於喉間氣鬰而熱則壅遏而為咽疼熱氣生於肺胃風毒藴隆則腫結而為喉痺尸咽者隂陽不和脾肺壅盛風熱毒氣不能宣通故令尸蟲發動上蝕於喉或疼如䘌之候也榖賊者榖芒強澁藏於米而誤食之滯於咽門不能𫝊化故風熱併聚與血氣搏遂令腫刺如喉嗌之生榖賊也胃脘實熱燻炙上焦發為白頭赤根因有咽瘡之證臟腑停寒則氣縮如物窒礙其間亦有喉閉之證若懸癰生於上腭雖不關於咽喉所以暴腫者亦熱氣使然也咽喉懸癰闗要所係病不急療皆能殺人凡咽喉病毒氣歸心胷前腫滿氣煩促下部洞泄不止者死候也一十八種喉風證論曰一單蛾風其形圓如小筯頭大生於咽喉闗上或左或右闗下難治二雙蛾風有兩枚在闗喉兩邊亦圎如小筯頭大闗下難治三蟬舌風自舌下再生重舌者是四牙耆風牙根上聚成􅟻毒者五木舌風其舌相似煮熟猪舌不能轉動者六舌黄風自舌上腫痛黄色者是七咬牙噤口風近牙窮頭作臖口噤不開者八魚口風如魚吸水者不治九聚毒塞喉風喉闗聚毒涎唾稠宻發寒熱仍分上下三闗破毒下闗難治十𤣥耆蠱毒風上嗌食搶水外腫形如雞卵者十一搶食風一名飛絲毒口中或食腥惡發泡者十二臘頰風腮臉絡腫者是從牙窮頭碎此毒若成湏要半月調理十三纒喉風自耳邊過頥下赤色者是也亦有寒熱甚者傷人十四松子風口内滿喉赤如猪肝逆張吞則闗閉塞飲食不能者是用藥後口内散㸃松子様腫則喉響如雷者不治十五崩砂疳口風自舌上牙齦上下腫赤口内作脹如湯熱牙齦漸爛甚者亦能脱齒十六連珠風自上作毒或初成一箇碎而又作一箇以三五七九箇者是十七蜂子毒或在腮臉痒爛或在喉闗舌下作臖如黄金蜂者是十八走疰瘰癧風頸項結核五七箇皮膚赤腫作寒熱者咽與喉會厭與舌此四者同在一門其用各異咽以納氣故咽氣通於天喉以納食故喉氣通於地會厭管乎其上以司開闔掩其咽其食不下掩之其喉錯必舌抵上齶則會厭能閉氣喉矣四者交相為用闕一則飲食廢而死矣故難經言七衡門而會厭之不為吸門及其為病也一言可了一言者何曰火内經曰一隂一陽結謂之喉痺王太僕註云一隂者手少隂君火心主之脉氣也一陽者手少陽相火三焦之脉氣也二火皆主脉並絡於喉氣熱則内結結甚則腫脹腫脹甚則痺痺甚而不通則死矣夫足少隂循喉嚨挾舌本手少隂上挾咽此二者誠是也至於足陽明下人迎循喉嚨足太隂挾咽連舌本手太陽循咽下膈足厥隂循喉嚨之後此數經皆言咽喉獨少陽不言咽喉而内經言一隂一陽結謂之喉痺何也盖人讀十二經多不讀靈樞經中别一篇具載十一經之正别其文云手少陽之正繞髀入毛際合於厥隂别者入季脇之間循胷裏属膽散上之肝貫心以上挾咽出頥頷中散於面繫目系合少陽於外者也又手少隂心主之正下淵腑三寸入胷中别属三焦出循喉嚨出耳後合少陽脘骨之下是手少陽三焦之氣與手少隂心主之氣相合而行於喉嚨也推十二經惟足太陽别下項其餘皆凑於喉嚨然内經何為獨言一隂一陽結為喉痺盖君相二火獨勝則熱結正絡故痛且速也故曰一言可了者是也故十二經中言嗌乾嗌痛咽腫頷腫舌本強皆君火為之也惟喉痺急速相火之所為也夫君火本猶人火也相火者猶龍火也人火焚木其勢緩龍火焚木其勢速内經之言喉痺則咽與舌在其間耳以其病同是火故不分也世之醫者各詳其状強立八名曰單乳鵝雙乳鵞單鬪喉雙鬪喉子舌脹木舌脹纒喉風走馬喉痺熱氣上行結纒於喉之兩傍近外腫以其形似是謂乳鵞一為單二為雙也其比乳鵞差小者名鬪喉熱結於舌下復生一小舌子名曰子舌脹熱結於舌中舌為之腫名曰木舌脹木者強而不柔和也熱結於咽頷腫遶於外且麻且痒腫而大者名曰纒喉風喉風喉痺暴死者名曰走馬喉痺此八種之名雖詳若不歸之火則相去逺矣其㣲者可以鹹耎之而大者以辛散之今之醫者皆知其有藥也如薄荷烏頭白礬殭蚕朴硝銅緑之類也至於走馬喉痺何待此乎其生死反掌之間耳其最不誤人者莫如砭針出血血出則病已昔余以治一婦人木舌脹其舌滿口諸醫不愈以金䤵鍼小而銳者砭之五七度腫减三日方平計取出血幾至盈斗又治一男子纒喉風表裏皆作腫藥不能下余以凉藥灌於鼻中下十餘行又以拔毒散傅之陽起石燒赤與伏龍肝各等分為細末日以新水掃百遍三日熱始退腫始消又嘗治一貴婦喉痺盖龍火也隨用凉劑而不可使冷服為龍火宜以人火逐之人火者烹飪之火是也乃使爆於烈日之下於髙堂之上令侍婢携火爐坐藥銚子上使藥極熱不至火沸通口時時呷之百餘次龍火自散此以熱行寒不為熱病扞格也故大抵治喉痺用針出血冣為上策但人畏針委曲旁求瞬息喪命凡用針而有針瘡者宜搗生薑一塊調以熱白湯時時呷之則瘡口易合銅人中亦有灸法然痛㣲者可用病速者恐遲則殺人故治喉痺之火與救火同不容少待經火鬱發之發謂發汗然咽喉中豈能發汗故出血者乃發汗之一端也故願君子毋執小方而曰吾藥不動臟腑又妙於出血若幸遇小疾而獲効不幸遇大病而死矣咽喉病毒氣歸心胷前腫滿氣煩促下部洞泄不止此死候也實熱論一用敗毒散加黄芩半夏連翹倍用桔梗用生薑薄荷煎痰盛者加石膏同煎即効凡服此藥早晨服則午後攻作午後服則子時攻作天明退用針則無此攻作若服此藥後自利即換作虚熱醫後藥不可用服敗毒散後失音即服加减秘𫝊降氣湯二用生料消風散加𤣥參全蝎薄荷白水煎服三用前二藥不退用生料洗心散更加一二味去風毒藥為妙四用前二藥不退用防風通聖散立效虚熱論一用雙解散乃升麻葛根湯消風散加𤣥參黄芩薄荷二用秘𫝊降氣湯加生薑黄芩三如痰盛用桑白皮湯磨沉香吞養正丹仍用桔梗半夏湯冷木附湯等藥調理又一證上秘下㵼用秘𫝊降氣湯吞碧雪散附子理中湯如無用桑白皮湯亦可喉痺者毒客於喉間氣結藴積而生熱故喉腫塞而痺痛脉沉者為隂浮者為陽若右手闗上脉隂陽俱實者是喉痺之候也亦令人壮熱惡寒七八日不治則死喉痺論夫喉痺者喉裏腫塞痺痛水漿不得入也人隂陽之氣出於肺循喉嚨而上下也風毒客於喉間氣結藴積而生熱故喉腫塞而痺痛脉沉者為隂浮者為陽若右手之關上脉隂陽俱實者是喉痺之候也亦令人壮熱而惡寒七八日不治則死治法先鍼而後藥可謂急先務矣走馬喉痺之狀勢如奔馬喉間痺痛腫連頰骨壮熱煩滿數數吐氣者是也此盖脾肺不利熱毒攻衝發於咽喉所致狗咽者喉中忽覺結塞不通如喉痺状是也隂陽之氣出於肺循喉嚨而上下若風熱毒氣客於喉間氣結藴積而生熱故有結塞之證俗云此疾由誤嚥狗毛所致治法亦有将飯與狗分食取瘥者禳去之法也方綘雪散治熱結喉間連頰腫不消心膈煩滿木通剉桔梗剉炒㯽榔各二兩枳殻去瓤麸炒犀角鎊各一兩半柴胡去苖升麻木香赤茯苓去黒皮各二兩桑根白皮剉山梔子各四兩桂去粗皮人參各二兩蘇方木五兩訶梨勒去核五枚朴硝研一斤丹砂研一兩麝香研一分右除朴硝丹砂麝香外各細剉以水二斗於銀器内慢火熬至七分以生絹濾去滓再煎至五升下朴硝以栁木箆攪勿住手候稍凝即去火傾入盆中将丹砂麝香末拌令勻瓷器盛之勿令透氣每服一錢或二錢以冷蜜湯調下食後臨卧看老少加减菖蒲湯治喉痺口噤水漿不下風邪恍惚如有神鬼身體強直面目變色菖蒲秦艽去苖土桂去粗皮禹餘糧煆醋淬人參當歸切焙甘草炙剉附子炮裂去皮臍黄芩去黒心逺志去心防風去义龍骨各半兩赤石脂芎藭赤芍藥赤茯苓去黒皮防己各一兩半右剉如麻豆大每服二錢匕水一盞煎至七分去滓空心日再服乾喉風出危氏方朴硝川烏當歸牛膝各五錢麝香腦子各半錢硼砂荆芥薄荷甘草蛤粉各五錢全蝎七箇去毒右為末用清泔調春用菘菜汁調夏黄麥汁調如不能吞用豆腐切如棊子塊蘸藥入口内含化或新艾汁調下立効治咽嚨痛及喉痺並宜服之出本草以通草煎服之磨亦得急即含之治喉痺腫痛出本草取茘枝花皮根共十二分以水一升煮取六合去滓含之細細嚥汁瘥治喉痺出本草以天雄炮含之又方出本草以無患子研内喉中立開開闗潤喉蓬莱雪出危氏方梅花腦子生麝香各一字硼砂三錢朴硝五錢已上别研薄荷葉百葉煎全蝎去毒防風去叉粉草各五錢已上别研明乳香沒藥各三錢蒻葉或蘆葉盛火熨别研右為末每服少許以匙挑乾摻咽間及瘡上如在闗下摻舌上並旋旋嚥下仍用薄荷桔梗甘草煎水噙潄或用生薄荷研自然汁調成膏入口噙化亦妙奪命無憂散一名玉屑無憂散治纒喉風咽喉疼痛風涎壅滯口舌生瘡心腹脹脾積癥塊小兒妳癖誤吞骨硝硬塞不下熱勝喉閉涎滿氣急或悶亂不省人事並療之寒水石三兩煆元參去蘆貫衆去蘆滑石研縮砂仁去殻黄連去毛茯苓炒黄甘草炙山豆根荆芥各半兩生用硼砂三錢右為細末每服一錢乾摻舌上後以新水嚥下不拘時任是百毒硬物可以除化如喫巴豆杏仁石頭鐡札麥糖棘針瓷瓦子等物及諸藥毒火毒亦可用此藥每服半錢能潤三焦消五榖除三尸去八邪除百毒趕瘟疫專醫渴疾其効如神魯直號金臺玉簡方龍腦散出聖恵方治馬喉痺頰咽痛白龍腦細研牛黄細研犀角屑羚羊角屑馬牙硝細研元參沉香硃砂細研甘草炙㣲赤剉已上各一分川升麻半兩硼砂一錢細研右除龍腦牙硝搗篩為散每服三錢匕水一盞竹葉七片煎至六分去滓温入龍腦牙硝一錢攪令勻細含嚥利咽湯治喉咽諸疾桔梗枳殻牛旁子荆芥甘草升麻元參大黄紫蘇人參各等分右㕮咀每服五錢水二盞煎服生犀丸治熱衝喉間連頰腫痛吐氣煩滿犀角鎊枳殻去瓤麸炒射干海藻洗去鹹焙升麻各一兩杏仁湯浸去皮尖雙仁研百合胡黄連蒺藜子炒各三分白附子炮半兩右為末鍊蜜丸如彈子大每服一丸綿裹嚥津不計時龍腦丸治喉咽連頰頷腫日數深逺嚥津液熱發渴疼痛龍腦研升麻甘草馬牙硝研各一分元明粉研三分麝香研石膏碎大黄剉黄耆剉各一分生地黄二兩絞取汁右除地黄汁外𢷬羅為末以地黄汁和如乾更入鍊過蜜少許為丸如小彈子大用綿裹含化嚥津日四五次不計時治纒喉風腫痛黄芩五錢酒浸升麻麻黄荆芥薄荷防風各一錢黍粘子炒四錢生丼草一錢半𤓰三稜三錢炒黒大黄三錢煨右㕮咀以水一椀煎至七分去滓稍温服食後隨嚥之大硼砂散治喉閉咽腫瘡痛水米難下硼砂茯苓甘草各半兩馬牙硝盆硝朴硝薄荷葉各一兩殭蚕二兩蛇蛻皮一條右為細末臘月牛膽汁和成膏穰在腦内髙懸隂乾每用一錢綿裹嚥津金消丸治咽喉痺痛不能喘息水漿不得入鬱金剉馬牙硝研甘草剉山梔子去皮大黄剉栝樓根各二兩元參白礬硼砂研各一分右研為末鍊蜜和丸如鷄頭實大每用一丸綿裹含化嚥津天門冬丸治馬喉痺咽喉腫痛唇焦舌乾顋頰連腫天門冬去心焙元參惡實炒各一兩百藥煎紫蘇葉各半兩甘草炙剉兩半人參硼砂研龍腦研各一分右為細末鍊蜜和丸如皂角子大每服一丸食後臨卧細嚼温熟水下橘皮湯治馬喉痺勢如奔馬腫痛煩滿數數吐氣陳橘皮湯浸去白焙青竹茹生地黄切焙黄芩去黒心白术山梔子各三兩赤茯苓去黒皮二兩桂去粗皮一兩芒硝研湯成下右除芒硝外麄搗篩每服三錢匕以水一盞入生薑半分拍碎􅀥二枚劈破煎至五分去滓下芒硝末一錢匕攪匀温服食後日三仙方奪命丹出徳生堂方治纒喉風木舌脹雙單乳鵝喉閉或誤吞鷄魚骨刺竹木簽刺一切咽喉急症白茯苓宻陀僧炒黄色紫河車各一兩白殭蠶直者貫衆凈縮砂仁甘草莭各一兩烏魚骨去皮各二錢半麝香一字右細末却入麝香研匀同蒸餅包白麺蒸熟四兩和藥汲新井水丸如豌豆大蛤粉為衣放乾十年不壊每服一丸用瓦器研碎新水半盞浸一茶時化開用匙挑藥徐滴入喉中勿急用取藥盡為度木通散出聖恵方治喉痺心胷氣悶咽喉妨塞不通木通剉赤茯苓川芒硝前胡去蘆頭桑白皮各二兩剉羚羊角屑川升麻川大黄各一兩半剉碎㣲炒馬藺根一兩右為麄散每服三錢以水一中盞煎至六分去滓不計時候温服治喉痺咽喉腫痛上焦風熱痰唾不利出聖恵方射干白藥各三分絡石甘草生剉黄蘖各一兩白礬灰半兩天竺黄細研馬牙硝細研各二兩川升麻一兩半右為細散同研令匀每服以新木綿裹二錢含嚥津取喉中涎出危氏方草烏尖殭蚕紫具根啾唧紅椒白礬山豆根皂角各等分右為末用霜梅拌藥為丸如指頭大含化一丸取下涎然後用鹽湯灌潄吐出不可吞開喉闗出危氏方薄荷山豆根各五錢麝香腦子各半錢朱砂三錢甘草青鹽川烏各五錢右為末每服半錢臘月内菘菜汁夏黄麥浸水或葛水調如涕唾稠粘用芭蕉水調下或蜜丸指頭大含化搶食風出危氏方桔梗川烏草烏防風甘草大青根各五錢全蝎七箇去毒紫河車五錢右為末每服用水一盞連根葱一根紅椒七粒燈心七莖同煎三四沸食後熱服不安再用酒一盞入茱茰五粒同煎少時熱服之未效用蕉湯調下如落心肺間刺痛用宣利藥下如久不治則變為飛絲癆毒能傷人命龍腦破毒散出御藥院方治不測急慢喉痺咽喉腫塞不通盆硝研細四兩白殭蠶㣲炒去觜為末秤八分甘草生用秤八分青黛秤八分馬勃末三錢蒲黄半兩腦子一錢麝香一錢右研令匀細用甆合子收如有病證每用藥一錢用新汲水小半盞調匀細細呷嚥如有喉痺即破出血便愈如不是喉痺自然消散也若是諸般舌脹用藥半錢以指蘸藥擦在舌上下嚥津如是小兒一錢作四五服亦如前法用並不計時候生銀丸治口乾咽腫喉頰脹痛人參半兩丹砂研鉛霜研馬藺根朴硝研升麻各一分硼砂研三錢龍腦研一錢右為末和勻鍊蜜為丸如皂子大每服一丸含化嚥津射干湯治喉痺腫不通疼痛不下飲食并諸毒發動射干當歸切焙一兩升麻半兩白芷一兩甘草炙剉犀角鎊杏仁湯浸去皮尖双仁炒各半兩右麄搗篩每服三錢匕以水一盞煎七分去滓温服日三忌海藻菘菜禹餘糧湯聖濟總録治喉痺若胃中虚飢状少氣不足以息四逆泄注腹脹喜噫食則欲嘔泄癖溏口下乾四肢重好怒不欲聞人聲診其脉右手闗上隂陽俱虚者脾胃虚也禹餘糧煆醋淬大麻仁桑根白皮各二兩剉碎乾薑炮一兩黄連去鬚半兩白术一兩棗十枚焙取肉右麄搗篩每服三錢匕水一盞煎至五分去滓温服食後日三服如聖勝金鋌出和濟方治證服餌與後如聖勝金鋌同品味少異朴硝四兩川芎一兩硫黄細研一兩半貫衆二兩薄荷葉荆芥穂嫩茶各半兩右為末裂生葱自然汁攪和為鋌服藥湯使如後方同簡易如聖勝金鋌法同治喉痺并時疫毒桔梗甘草升麻連翹黍粘子防風酒製黄芩各等分右㕮咀每服五錢水煎細嚥如聖勝金鋌出和濟方治急喉閉纒喉風飛颺單蛾雙蛾結喉重舌木舌腮頷腫痛屢經用藥不能吞水粥又方見前硫黄研川芎薄荷葉去枝梗臘茶川烏炮硝石研生地黄各二兩右為細末以生葱汁捜和為鋌每服先用新汲水灌潄吐出次嚼生薄荷五七葉㣲爛用一鋌同嚼極爛以井水嚥下甚者連進三服即愈重舌腮腫先服一鋌次以一鋌安患處便消冒暑伏熱不省人事生薄荷水調研一鋌灌下即甦行路常噙一鋌即無暑熱之患口舌生瘡不能合口并食熱物如上法服訖用水灌潄嚼薄荷十葉如泥吐出再以水灌漱嚼藥一鋌噙口内聚涎裹之如涎滿方吐出如此服三鋌便能食遇食酒醋鹹酸酢脯炙煿喉中生炮須掐破吐血方着薄荷數葉以一鋌同嚼井花水吞下沙淋小便出血用車前草七葉生薑小塊研爛水調去滓嚼藥一鋌以水送下分隂陽去風熱化血為涎化涎為水常𢃄随身備急一鋌可活一人小兒只服半鋌一方去川烏貫衆以嫩茶代臘茶射干丸治喉痺腫塞射干一兩䜴一合杏仁湯浸去皮尖雙仁炒芎藭犀角屑各半兩升麻一兩甘草炙半兩右為末錬蜜和丸如小彈丸大每服一丸含化嚥津日可三五服瘥忌海藻菘菜七聖散治馬喉痺咽頰腫痛吐氣不快白礬二錢馬牙硝五錢硝石一兩鉛丹三錢硼砂一錢蛇蛻半條巴豆兩枚去殻右先研白礬牙硝硼砂三味入罐子内次入硝石消次摻鉛丹於上面只用平瓦一小片盖火燒成汁便用竹片子夾蛇蛻攪五七度又入巴豆更攪五七度取出候冷研為散如小可咽喉腫痛嚥津無礙及口瘡口乾摻一匙或大叚喉痺及馬喉痺或腮頰生瘀肉侵咽喉即乾摻半錢安稳仰卧其喉癰睡處自破立瘥療喉痺急疼妨悶不通方馬藺根切一升升麻三兩瞿麥三兩射干十兩犀角二兩屑通草二兩元參二兩右切以水八升煮取二升去滓細細含嚥一日令盡得破膿慎熱麺炙肉蒜黄芩湯聖濟總録治喉痺胷滿噎塞不通黄芩去黒心升麻射干木通剉各三分甘草炙剉犀角鎊各半兩右以水麄搗篩每服五錢匕以水二盞煎至一盞去滓下芒硝一錢匕細温呷如神散治咽喉一切急患不得開白礬白殭蚕炒藜蘆元參去皮核炒雄黄各三錢乳香一匙右為細末和勻每一匙分兩鼻内搐之口含水及舌下擦嚏出涎立効硼砂散出和濟方治大人小兒患喉痺閉塞不通腫痛生瘡語聲不快風壅痰毒鼻衂出血山藥六斤生腦子研七兩牙硝生一十四兩麝香研四兩甘草硼砂生各十二兩右為細末每服半錢如茶㸃服金鎻匙出醫學切問方凡人卒中喉痺口噤咽喉腫痛木舌重舌者以此藥治之猪牙皂角去皮煨大黄草烏鬱金南星各四錢巴豆五箇去心不去油右為末生薑自然汁調半錢許以鵝毛拂入喉中已死者用竹管吹入湏㬰醒然後用藥半錢薑汁調喫吐瀉為驗南星防風散出百一選方治風壅腮頷腫内生結核纒喉風等疾當歸二錢焙乾天麻三兩生用白殭蠶焙乾南星湯浸浄搗細薑汁製焙乾猪牙皂角去黒皮焙乾三錢防風生用不見鐵器各半兩右為末每服二錢水一盞薑三片入荆芥少許同煎至七分温服食後日進三服忌發風毒物如腫不散者加透明雄黄三錢同前藥一通為末煎服二砂丸治喉痺咽塞熱痛沙参丹砂研硼砂人參元參丹參各等用右為末鍊蜜丸如雞頭實大食後臨卧含化一丸犀角湯出聖恵方治馬喉痺喉中連頰焮腫犀角鎊甘草炙剉升麻各半兩射干桔梗炒馬藺根剉各三分右麄搗篩每服三錢匕水一盞入竹葉七片煎至七分去滓入馬牙硝末二錢匕攪令勻細細呷服玉液丸治毒氣壅塞咽喉不利頰頷連腫百藥煎一兩麝香研朴硝各半錢丹砂二錢研龍腦研甘草末各一錢右各研為末再同研勻細以水浸蒸餅心為丸如梧桐子大丹砂為衣隂乾含化犀角散出聖恵方治喉痺氣隔胷滿咽腫犀角屑馬藺根射干枳殻麸炒㣲黄去瓤甘草各一兩生用馬牙硝一兩半右為散每服三錢水一中盞入竹葉二七片煎至六分去滓不拘時候稍温含嚥碧雪散出仁存方治一切壅熱咽喉閉腫不能嚥物口舌生瘡舌根強言語不正腮項痛腫蒲黄青黛硼砂㷔硝甘草各等分右為細末每服手指捻摻喉間嚥津或水下頻頻用之治咽喉諸疾朴硝二兩甘草一兩蒲黄薄荷各半兩青黛三錢右為細末每服用一字摻口内通氣湯出聖濟總録治喉痺氣隔胷滿咽腫生膿犀角鎊半兩射干桔梗馬藺研各三分甘草炙剉半兩右麄搗篩每服三錢匕以水一盞入竹葉七片煎至七分去滓下馬牙硝一錢同攪令細細温呷又開喉闗方出危氏方南星半夏川烏草烏甘草各五錢右為末用米醋煎成膏傅毒上宣利方出危氏方巴豆三七枚去殻雄黄鬱金猪牙皂角大黄各五錢右為末飯丸如菉豆大每服七丸五更三㸃以冷茶清吞下如未利再下四五丸治咽喉閉疙疸堵塞不通氣水米難下至危者出御藥院方牽牛四兩半生半熟用䑕粘子一兩防風七錢半甘草生用枳殻麸炒去瓤各半兩右為細末每服五錢沸湯㸃下不拘時候治喉痺及喉中熱塞以車轄燒令赤投酒中乗熱飲之治喉痺出本草以紫硃煮汁服治喉痺出本草取橡斗子中仁碎為粉㣲熬水服一二匕一匙散一名如聖散治喉痺氣塞不通飲食不下者并咽喉作疼如乳鵝聲雄黄一分别研蝎稍七枚白礬生研藜盧各二錢猪牙皂角七錢右為末每用一匙吹入鼻中即時吐出頑涎為愈神効一方無蝎稍亦治得時氣纒喉風累用救人萬無一失治喉痺出百一選方大青魚膽新瓦上焙乾去膜取末蛇蛻皮去沙磁椀内燒灰研令極細白藥子新瓦上焙乾各一錢白殭蚕直者去絲嘴新瓦上焙乾白礬鑛銚内飛過存性各一兩右為細末再以乳缽和研勻每半錢吹八咽喉立愈若病輕以多年白鹽梅肉細切入前藥同搗匀丸如鷄豆大每服一丸含化嚥津如白梅乾硬用湯浸軟取肉細切用通闗散出直指方白礬枯直殭蠶南星生藜蘆各一分右為末以小管挑一字吹入鼻中吐痰喉通如聖丸出王氏博濟方治纒喉風及喉痺大黄末一分蝸牛二七枚白礬末陳白梅皮馬勃各一分右於五月五日午時用白梅皮蝸牛同研和丸如楝實大如患者開口不得即以水磨用竹管子吹下入喉中立瘥如輕者以綿裹含化一丸治馬喉痺頰咽痛五倍子半兩黄蘖半兩剉川升麻三分甘草一分炙㣲赤剉右為散每服三錢匕水一小盞煎至四分去滓不計時候温服一捻金散𫝊信適用方治喉閉欲死及治喉痛全蝎㣲炒川鬱金白殭蚕去絲嘴炒甘草炙各半兩地龍八錢右為細末入麝香少許每一字吹入喉内舌根不數次即愈治咽喉痛𫝊信適用方百藥煎去黒皮硼砂甘草白礬生用右等分為細末每服一錢食後調飲細細呷之奪命散治咽喉膽礬牙硝甘草青黛各一錢右每用少許將蘆管吹喉中立効龍腦丸出聖濟方總録治纒喉風龍腦一分丹砂一錢芒硝半兩麝香半錢右細研為末用鯉魚膽汁和丸如菉豆大鼻兩孔各塞一丸良久牙闗開涎出瘥消毒寛喉散出御藥院方治急慢喉痺咽喉閉塞腫痛或舌本強硬滿口生瘡馬牙硝朴硝各六兩青黛半兩寒水石生四兩右為極細末每服二錢濃煎薄荷湯㸃勻熱漱咽喉内令吐悮嚥不妨不計時候日用三五次銅青丸一名千金丸出百一選方不問隂陽閉如急病内外腫塞輒至不救用之能起死治纒喉風車前草嫩者半兩銅青二錢大黄牙皂各半兩右為末以白梅肉同研成膏每兩作十五丸用時以薄綿裹含出涎兩日後則難開矣牛膽膏一名佛手㪚出存仁方治鎻喉風神効青黛一錢殭蚕半兩去絲朴硝一兩研甘草二錢半生右為末用臘月黄牛膽安藥在内當風掛百日再入研麝香少許每服半錢或調服或研碎吹於喉中一方不用牛膽作散筒吹喉内一方不用麝香一方各等分殭蠶散一名三白散出仁存方治喉痺殭蠶一條馬勃拳大者瓦上焙成末白礬皂子大生天南星一箇炮右為末大人一錢小兒半錢生薑自然汁調下一方無馬勃白梅丸出仁存方治喉痺及腫痛白梅二十三箇取肉白礬一錢甘草末生萆麻四十九粒去皮右同研勻和丸如鷄豆大以綿裹之含化粉香散出瑞竹堂方吹乳鵝即開白礬三錢巴豆二粒去皮輕粉少許麝香少許研右於鐵器上飛白礬沸入巴豆在上礬枯去巴豆不同細末三味合吹喉啞瘴咽喉乳鵝方出瑞竹堂方雄黄五錢研鬱金五錢白礬二錢半生用研膽礬半錢右為極細末以竹筒吹入喉中立能言語治喉痺乳鵝喉風硼砂明礬膽礬芒硝硃砂各等分同為末右為細末吹喉中羅青散出瑞竹堂方治咽喉單雙乳蛾及治心肺積熱上攻咽喉腫痛閉塞水漿不下或喉癤重舌木舌腫脹並宜服蒲黄五錢羅青研盆硝各三錢甘草二錢右為細末每服一錢冷蜜水調下細細嚥之吞不下鷄翎蘸藥喉内掃之立効一方砂糖和丸每兩作五十丸每服一丸或噙化亦可烏龍膏治急喉閉纒喉風皂角七挺搥碎水五升桵汁去滓草烏頭剉天南星剉大黄剉一兩右並入皂角水内煮取二升濾去滓不用再熬成膏入新磁器内候㣲凝入朴硝末一兩攪勻候冷入白殭蚕末一兩收之如用以半匙頭甘草湯或茶清化下灌入口内立愈如乾以好酒調之不拘時候又方鴨觜膽礬銅青輕粉胡粉明礬右各一字姜茶半錢逐旋和以新汲水調呷嚥之如吐即愈奪命筯頭散治急喉閉咽喉腫滿堵塞氣不得通欲死者真膽礬草烏各四錢緑礬六錢雄黄二錢右為細末每服一筯頭㸃上咽喉内急吐涎末立應次以大黄甘草等分俱為麄末每服三錢水一盞半煎至一盞去滓化乳香一粒温服滌去滓毒恐其再發一方加白礬二錢玉鑰匙治風熱喉痺及纒喉風㷔硝一兩半硼砂半兩腦子一匙白殭蚕一錢右為末研勻以竹筒吹半錢許入喉中立愈雄黄散治纒喉風喉閉先兩日胷膈氣𦂳取氣短促忽然咽喉腫痛手足厥氣閉不通頃刻不治巴豆七粒三生四熟生者去殻研熟者帶殻研火燒存性乾桑黄茹二片雄黄一塊皂角子大透明者細研鬱金一枚蟬肚者研為末右再研勻每服半字茶清少許下如口噤咽塞用小竹管納藥吹入喉中湏㬰吐利即効一方無乾桑黄茹𤣥參丸出聖濟總録治纒喉風聖恵方𤣥參白殭蠶白礬生用各一分甘草生用半分右為細散用鯉魚膽汁和丸如赤小豆大每服十丸食後温服生薑湯下日三服開闗散出王氏博濟方治走馬纒喉風及喉痺硝石六兩鉛丹四兩白礬砒霜各半兩右細研用瓷罐子一箇先入硝石二兩鋪底次下砒霜又入硝石二兩方下白礬更入硝石二兩方下鉛丹後用圓瓦一片盖口於净地上用方磚一片襯藥罐子以炭火五斤煆令通赤礶子固濟鎔成水以炭條子攪令徹底匀方去火放冷於地上經宿打罐子取藥研如粉患者用筯頭蘸冷水惹藥深㸃咽喉内漸漸嚥津至甚者不過三兩度㸃伏龍肝散治喉痺伏龍肝半兩白礬煆過白殭蚕直者炒甘草生各一分右為散每服一錢匕如茶㸃服吐出涎立効未吐更一服治喉痺方蛇蛻白梅白殭蠶甘草各等分右為末綿裹含化嚥津四聖散出徳生堂治咽喉口齒喉閉乳鵝荆芥穂牛蒡子炒碾細紫河車各三錢大黄六錢大實者再加用右㕮咀每服五錢水一盞煎八分食後臨卧時先潄後嚥如聖湯出旅舍方治痰去熱利咽喉治咽中有瘡嚥物不下及咳𠻳咯血肺痿痰唾氣促并小兒瘡疹毒攻咽喉腫痛桔梗一兩甘草生一兩牛蒡子炒一兩麥門冬半兩右為細末沸湯調細細服入竹葉煎尤妙龍麝丹治纒喉風白礬飛過雄蛇蜕於髙處凢於屋上樹枝或籬壁上者是雄蛇一兩火煆過用硼砂半兩研麝香半錢另研右研勻用牛蒡子自然汁為餅子如錢大以紅綿包噙化如牛蒡子汁稀入糊少許治喉閉方猪牙皂角二錢燒存性葛根粉一錢末茶二錢乾荷葉一錢半右為細末吹入喉中即愈治喉痺咽喉腫痛上焦風熱痰唾不利烏蛇皮燒灰白梅㣲炒甘草生剉各一錢桂心半分右為細末每服以新綿裹二錢含嚥津立通一捻金散治咽喉方銅緑黄蘖香白芷各等分右為極細末入麝香少許每用一字吹入喉中如聖丸治九種咽喉殭蚕南星馬屁勃各等分右為細末用鹽梅生薑汁為丸如彈子大噙化又方殭蚕百葉煎大黄各等分右為細末鹽梅為丸如彈子大噙化通後補助紫蘇藿香甘草各等分右剉散每服四錢水煎空心服治喉痺大黄朴硝白殭蚕各等分右為細末水煎量虚實以利為度吹喉散治喉痺腫硬水漿不下白礬半兩半夏巴豆各七枚右鎔白礬剉半夏巴豆在汁中候乾研細吹入喉中地龍膏治纒喉風活地龍白頸者五條白梅肉二箇朴硝二錢右同研成膏挑入喉中含化一捻金散治乳蛾及風熱上攻咽喉腫痛直殭蚕去絲嘴三條薑汁浸濕炙黄色防風䑕尾者去义二錢明礬三錢研右為細末用竹筒吹入喉内立愈治喉痺猪牙皂角蜜塗炙香别研白礬一分研雄黄半兩研右和勻以濃茶少許調一字安舌上漸嚥下有涎即吐之如牙闗𦂳急㸃一字如齒藥用之治纒喉風青礬白礬雄黄各半兩右同研細以天南星三兩為末四味同和臘月用牛膽汁調勻捻成餅子隂乾要用時取少許為末白梅肉為丸如鷄豆大外用綿裹含口中勿令嚥下候汁流咽喉以吐風痰盡為度治急喉腫閉藜蘆𤓰蒂雄黄右等分為末吹入鼻中盖通闗竅也半夏桂甘湯治冷證無陽咽疼喉閉辣桂甘草焙半夏製右等分剉碎每服三錢水一盞煎半盞冷少呷山豆根方治熱閉山豆根射干升麻各等分右㕮咀用井水二盞同煎至一盞去滓通口時時呷之又喉閉方牙硝五錢胭脂半錢鹽梅屑一錢右同研以鷄羽送入觧毒雄黄丸治纒喉風急喉卒然倒仆失音不語牙闗𦂳急不省人事膈熱涎盛咽喉腫痛赤眼癰腫一切毒熱諸證華陀云其證先兩日氣緊驀然咽痛發腫或手足厥霎時氣閉不通多死也雄黄飛鬱金各一分巴豆去皮膜出油十四箇右為末醋糊丸菉豆大熱茶清下七丸吐出頑涎立甦未吐再服如未至死心頭尚温灌藥下喉即活吐瀉無妨小兒喉嚨赤腫驚熱痰涎壅塞服二三丸量大小用一方作散茶清調下如喉閉不開用筒吹入得吐則醒比金丸治喉痺鉛白霜半兩青黛一兩甘草半兩右為末醋糊為丸如鷄豆大含化嚥津痰出立効胡黄連散治咽喉中壅塞如核連頰腫痛胡黄連一分升麻半兩鉛霜研一分右除鉛霜外搗羅為散再同和勻每服半錢匕綿裹含化嚥津日三五度不計時候凝水石散治纒喉風卒然喉痺急如奔馬喉頰俱腫名走馬喉痺凝水石甜硝各半兩並用無油瓷合盛火煆通赤合於地上出火毒一宿白殭蠶麸炒黄研如粉一兩右同研勻每取少許摻咽喉中病甚每服二錢匕温水調下若牙闗𦂳急只於鼻中吸入奪命散治急喉風等證枯白礬南硼砂猪牙皂角皮弦㨂去各等分右為細末吹喉中痰出即愈治喉痺明礬膽礬各二錢半馬牙朴硝一錢右為細末用竹筒吹入喉中手扯住鼻孔一時牙闗𦂳急吹入鼻孔中又方猪牙皂角二錢半硼砂五倍子各一錢右為末用醋蜜調鵝翎㸃入口中繳出痰白礬散出聖恵方治喉痺氣悶白礬硼砂馬牙硝各半兩右於甆合子盛用鹽泥固濟候乾以炭火煆令通赤取出細硏用紙一兩重勻攤置於濕地上以物盖之一宿出火毒後再細研為散用半錢内於竹管中吹之喉内湏㬰即通如是咽門腫只以箆子抄藥㸃於腫處嚥津即瘥馬牙硝散出聖恵方治喉痺氣欲絶馬牙硝硝石硼砂已上各半兩右以瓷瓶子内盛用鹽泥固濟候乾以慢火煆成汁良久取出候冷於地坑子内先以甘草水灑後用紙三重裹藥以土盖之三宿出火毒後取出細研為散每服半錢用箆子抄内咽中嚥津更以竹管吹入喉中瘥硝石散出聖恵方治喉痺熱毒氣盛痛硝石白礬砒霜各半兩右同細研於瓷合中盛鹽泥固濟候乾炭火中燒令通赤取出向地坑中三日出火毒細研如粉咽喉腫閉處㸃少許便破治咽喉牛膝根糯米用四十九粒碾碎為末右用水二盞煎服或生用乾用俱妙如治便毒以帶皮生薑米醋調傅之治喉中毒百發百中及咽喉一切疾出衞生寳方皂角畧炮去土髙良薑各等分右為末搐鼻或已甚先湏含香油一口不可吞就後搐之如已結成候少頃要令濃血隨油而出輕者只含水如前法一用管子吹入喉中涎出愈神効不可言治喉痺出本草以牛角燒灰為末酒服方寸匕又方出本草取黄蘖根以水研汁含之保安散治喉内結核不消石膽硼砂右研細每用竹筒吹之或以筯頭蘸之去涎散出危氏方草烏鴨嘴青膽礬各等分右為末先用釅醋煮皂角調鵝翎刷傅赤腫處開口流出涎即将綿毬一指頭大以綿線繫定蘸前藥末吞嚥至腫毒處即抽出凡如此一二次其毒即破開口流出去盡涎血却以後合瘡口藥㸃上停久温鹽水灌潄後進食亦可合瘡口藥方用白礬黄丹麝香等分為末以筯調㸃瘡口上千金療喉舌諸疾方松子苦芥子右𢷬以苦酒和貼上金鎻匙出仁存方治咽喉腫塞雄黄末半錢巴豆一粒去油右作一服生薑自然汁調灌下或吐或下皆愈一方細研每遇急患不可下藥者用有口酒瓶装入㸃火一炷燒之候煙起将瓶嘴入一邉鼻中用紙覆瓶口熏之立聖膏出百一選方治纒喉風巴豆齊州半夏各三七粒右将半夏輕搥每粒分作四片巴豆剥去心膜銀銅石器内米醋三椀文武火熬盡醋為度用清醋㣲洗過研為膏子每患纒喉風喉痺或癎疾用一挖耳以生薑自然汁一茶脚化下甚者灌藥少時吐出惡涎如魚凍相似立愈極有神効治喉風皂角燒灰飛鹽右為末向喉内吹之一二次必効用净水漱之治咽喉紫舌脹元明粉白礬各等分右為細末吹在口内立効吹喉散治喉痺乳蛾喉風明礬二兩膽礬五錢右研細吹患處立効治喉痺方青礬半兩研杜牛膝草秋冬用根二寸春夏用心梗右同研看患處以筆蘸少許令吐膿血涎沫即愈礬硝散出朱氏集騐方治急喉痺纒喉風兼主重舌咽喉腫塞軟瘡白礬半兩飛過朴硝一錢飛過右細研為末摻入口中其効如神或搐鼻中一方銅筯㸃腫處再㸃瘡如穿硬則用針治急喉腫閉藜蘆猪牙皂角右等分為末吹入喉中立應丸一名如聖散出十便良方治纒喉風急喉閉南星一箇刮去皮一方炮地埋出火毒一夜白殭蚕七箇右挖南星心空作孔子入蚕於内濕紙褁文武火煨熟取出等分為末粥飲丸如桐子大如不丸只用綿裹藥末吞之亦便如開口不得塗齒上亦妙又為末每一匙以生薑汁調下如開喉不得以小竹管劈開口灌之涎自出小可只塗於唇上後用大薑一塊略炙過含之一方用蜜姜汁調藥将鵝毛蘸藥繳口内有涎吐出塩礬散一名玉珍散出經騐良方治喉中乳鵝漸長塞喉者及治懸喉癰垂長咽中妨悶白礬煆為末鹽炙等分右研細用筯頭頻㸃乳鵝上即焦硬而愈切不可挑破後有根時再發治急喉閉出經騐良方馬屁勃即灰菰㷔硝各一兩右為末每用一字許吹入喉内吐涎血出立愈治走馬喉閉出朱氏集驗方白殭蚕半兩炒甘草一錢生右為末每服一錢生薑汁調下涎出立愈治纒喉風出朱氏集騐方白礬銅緑右等分為末用一字鼻内搐之又方出海上名方生川烏頭尖膽礬右等分為末每服一匙酒半鍾調服如口不開即灌之二聖散出濟生方治纒喉風急喉痺鴨嘴膽礬二錢半白殭蚕去絲嘴半兩右為細末每服少許以竹管吹入喉中立愈殭蠶散一名開闗散出仁存方治喉風急喉痺白殭蚕直者去絲嘴焙明白礬半飛半生用右等分為末每服一錢取生薑自然汁濃調嚥下小兒入新薄荷少許同薑汁研更加生蜜少許同調半錢服藥後不可飲湯水解藥力住膈上少時也一方白梅和丸皂子大綿裹入喉涎出愈一方蜜丸含化神効方出三因方治喉閉熱腫語聲不出荆芥穂别為末萆麻生去皮研各等分右入生蜜少許丸如皂子大以綿裹含化急則嚼化一法用朴硝不用荆芥治喉痺方牛蒡子六分馬藺八分右𢷬為散空心煖水調服方寸匕漸加至一匕半日再服勝金散治咽喉卒腫喉痺戎鹽一兩青黛半錢右同研勻每服半錢匕或一字用小筒吹入咽喉嚥津効治喉痺方出聖恵方白礬燒令汁枯研白附子𢷬末各等分右研令勻塗在舌上嚥津有涎即吐之煙方出聖恵方白殭蚕三七枚直者乳香一分右為末每服一錢匕香爐上燒開口令煙熏入喉中涎出効療喉痺急疼妨悶不通方射干當歸各三兩右切以水三升煮取一升稍稍含之吐去更含升麻散出聖恵方治喉痺腫熱痛悶川升麻一兩馬藺子二兩右𢷬細為散每服以蜜水調下一錢治喉閉立効方出聖恵方蝸牛七枚白梅子三枚取肉右同爛研綿裹如􅀥核大含嚥津即通治咽喉牙闗𦂳閉出醫方集成用巴豆去殻以紙包巴豆肉用竹管壓出巴豆油在紙上以此紙作撚子㸃燈吹滅以烟熏入鼻中即時口鼻涎流牙闗開矣一方用熱烟刺入口内即出涎或瘀血普濟方卷六十
