body:
  text: 普濟方卷三百三十六明周王朱橚撰姙娠諸疾門𦙍嗣附論夫有夫婦則有父子婚姻之後必求嗣續故聖人謂不孝有三無後為大者言嗣續之至重也凡欲求子當先察夫婦有無勞傷故害之属依方調治便内外和平則夫婦人樂有子矣素問云天地者萬物之父母也隂陽者血氣之男女也有夫婦則有父母婚姻之後則有生育生育者人倫之本也且男女之合二情交暢隂血先至陽精後衝血開褁精隂外陽内陽精先至隂血後生精開褁血陽外隂内隂含陽胎而女形成矣陽含隂胎而男形成矣若夫受形之異者男女必當其年男子二八精氣溢㵼必三十而娶女子二七天癸至必二十而嫁欲其二氣充實然後交合交而孕孕而育育而夀儻若婚嫁不時真氣早泄未完而傷是以交而不孕孕而不育育而不夀者多矣以此觀之男女婚嫁貴乎及時夫婦貴乎益壯則易於受形也且父少母老生女必羸母壯父衰生男必弱誠有斯理或男子真精氣不濃婦人血衰而氣旺是謂夫病婦疹皆使人無子治療之法女子當養血抑氣以减喜怒男子益腎生精以節嗜欲依方調治隂陽平和則婦人易有子矣又曰無子者葢有三焉一者墳墓不嗣二者夫婦年命相尅三者夫病婦疹皆令無子若是墳墓不嗣年命相尅此二者非藥能益若夫病婦疹湏用藥餌乃能有効也然婦挾疾無子皆由勞傷血氣生病或月經閉澁或崩泄帯下致隂陽之氣不和經血不行乖候故無子也診其右手關後尺脉浮浮則為陽陽脉絶無子也尺脉為濇中年得此為絶産也少隂脉如浮緊則絶産後惡寒尺寸俱微弱者則絶産也又有因將攝失冝飲食不莭乘風取冷或傷過度致冷風之氣乘其經血結於子臓結冷故令無子也凡婦人二三十而無子經血如常或有時經血不調者乃隂不升而陽不降此上下不得交通有所滯礙不能為用故也可用獨聖散瀉訖寒痰三二升後用導水丸禹攻散泄三五行或十餘行单用無憂散泄十行處寒熱虛實用之次服葱白粥三五日胃氣冝通膓中得實可服玉燭散更服白术散茯苓之類降火益水既濟之道當不數月而有孕成胎内經曰婦人有癃痔遺溺嗌亁諸證湏服妙藥針炙亦終不能孕盖衝脉腎脉任脉有此病故不孕也婦人所以無子者衝任不足腎氣虛寒也内經云女子二七天癸至任脉通太衝脉盛隂陽和故能有子若衝任不足腎氣虛寒不能繫胞故令無子亦有本於夫病婦疹者當原其所因而調治之要之男服七子散女服紫石門冬丸及坐導藥盪胞湯無不有子也方秦椒丸出聖惠方治婦人㫁緒生來未産盪滌腑臟使玉門受紫精子臟風虚冷氣致隂陽二氣不能和合故令乆無子秦椒白术各三十銖沙参露蜂房䑕婦桃仁卷栢細辛白殭蠶牡䝉石斛甘草蕪荑各一兩牛膝人参芍藥牡丹皮大黄桔梗栢子仁桂心𤣥参白薇茯苓天雄各十八銖黄茋五味子當歸白芷蠐螬白歛乾薑各一兩半澤蘭乾地黄芎藭各一兩十八銖乾漆白石英附子各二兩鍾乳二兩半水蛭七十枚紫石英蔴布叩􅃨頭七尺燒蝱蟲一百枚右為細末蜜為丸如梧桐子大酒服日再稍加至二十丸若有所去如豆汁鼻涕此是病出覺有異日即停一方無䑕婦栢子仁丸出聖惠方治婦人子臟虚冷産後續斷無子多時栢子仁澤蘭防風去蘆頭當歸剉碎㣲炒白石英細研水飛過厚朴去麄皮塗生薑汁炙香熟熟乾地黄牛膝去苖各一兩杜仲去麄皮炙㣲黄剉乾薑炮製剉紫石英細研水飛過川椒去目及閉口者㣲炒出汁三分甘草炙㣲赤剉三分細辛白术蕪荑桂心赤石脂細研人参去蘆頭石斛去根剉桔梗去蘆頭肉蓯蓉白芷龍骨五味子白芍藥藁本防葵白茯苓鍾乳粉二兩獨活秦芁黄茋各一兩右為末入研藥料多研令勻煉蜜和丸梧桐子大每服三十丸空心晚温酒下白薇丸出聖惠方治婦人子風臟虚積冷經絡不調靣無血色肌肉消瘦不能飲食及帯下乆無子白薇細辛防風人参秦芁秦椒白歛一云白芷桂心牛膝蕪荑沙参芍藥五味子白殭蠶牡丹蠐螬各一兩乾漆栢子仁乾薑卷栢附子芎藭各十三銖桃仁紫石英各一兩半鍾乳乾地黄白石英各三兩䑕婦半兩水蛭蝱蟲各十五枚吳茱茰十八銖蔴布叩複頭一尺燒右為末蜜為丸如梧桐子大酒服十五丸日再稍加至三十丸當有所去小覺有異即停服又方出千金方一名白藢丸治乆無子或斷緒上熱下冷百病皆治之白薇乾地黄乾薑車前子蜀椒紫石英藁本石膏菴䕡子卷栢各三十銖澤蘭赤石脂白龍骨逺志麥門冬茯苓太乙餘糧各三兩當歸芎藭蛇床子白芷覆盆子桃仁人参各一兩半桂心蒲黄各二兩半細辛三兩橘皮半兩右為末蜜和為丸如梧桐子大酒服十五丸日再漸增以知為度亦可至五十丸慎猪鷄生冷酢滑魚蒜驢馬牛肉等覺有娠即停三月正擇食時可食牛肝及心至四月五月不用廣𦙍丹出御藥院方治乆無子息黄茋剉細一兩半人参上黨者去苖川續斷剉澤蘭葉去枝熟地黄焙牡丹皮净延胡索白芍藥川芎白薇嫩鹿茸燎去毛酥酒炙乾另研稱白茯苓去皮當歸去苖洗净切炒乾肉蓯蓉酒浸軟皴切焙乾防風去苖义尾藁本去苖葉丹皮華細辛去苖葉圡細搗羅過蓬莪茂京三稜二味和白麵褁浸火煨熟麵就熱杵碎稱以上各一兩乾薑炮製一兩半木香山茱茰肉桂去麄皮各半兩黒附子炮製去皮臍二錢甘草剉炒覆盆子去蕚枝各二兩右為細末煉蜜和丸如彈子大每服一粒空心食前細嚼温酒下日進三服有孕住服昔有人常服此藥而生七男以此常合與人服而皆應也白薇丸療百病斷絶緒産白薇細辛厚朴椒炒出汗桔梗鱉甲炙各五分防風大黄附子炮石硫黄研各六分人参桑上寄生各四分半夏牡䝉白殭蠶續斷秦芁紫苑杜蘅牛膝蝱蟲去趐足熬水蛭紫石英研朴硝桂心鍾乳當歸各八分右擣篩蜜丸空心服温酒下如梧桐子大十五丸日二漸加至三十丸不吐不利忌生冷油膩餳生血物大莧生葱生菜猪肉冷水粘食陳臭紫石門冬丸出聖惠方治婦人乆無子及數經墮胎皆因衝任之脉虚損胞内宿寒疾病經水不時㬥下不止月内再行或月後子宫臟積冷虚羸百病崩漏帯下三十六疾積聚癥瘕臍下冷痛小腹急重小便白濁以上疾症皆令孕育不成以至絶嗣不孕此藥並能主療常服除瘀血温子臟令有孕臨産易生子及生子充實無病紫石英天門冬各三兩當歸芎藭紫苑卷栢桂心烏頭乾地黄牡䝉一作牡荆子禹餘糧石斛辛夷各二兩人参桑寄生續斷細辛厚朴乾薑食茱茰牡丹牛膝各三十銖栢仁一兩薯蕷烏賊骨甘草各一兩半右為末蜜和丸如梧桐子大酒服十五丸漸増至三十丸以腹中熱為度不禁房室丈夫出外不可服藥或温米飲下空心食前日二服七子散出大全良方治丈夫風虚目暗精氣衰少無子補不足兼治婦人無子皆因五癆七傷虚羸百病所致五味子鍾乳粉牡荆子兎絲子車前子菥蓂子石斛乾地黄薯蕷杜仲鹿茸逺志各八銖附子蛇床子芎藭各六銖山茱萸天雄人参茯苓黄茋牛膝各五銖桂心十銖肉蓯蓉十一銖巴㦸天十二銖右為末酒服方寸匕日二不瘥增二匕以知為度禁如藥法不能酒者蜜和丸服亦得一方加覆盆子八銖女服紫石英丸紫石英砂鍋盛之以石掩口火焙煅紅禹餘糧熟地黄湯洗浄酒蒸焙辛夷仁紫桂去皮不見火卷栢醋炙石斛去皮剉酒炒川續斷栢子仁川烏炮去臍剉川芎海螵蛸醋炒牡丹皮川當歸去蘆酒洗粉草炙各一兩桑寄生華隂細辛山藥吳茱萸乾薑炮各半兩人参七錢半天門冬去心一兩半紫朴去皮薑汁塗炙右為細末醋糊爲丸如桐子大每服七十丸至百丸空心米飲吞下以腹中熱為度不禁房事夫出不可服盡劑當有姙卷栢丸治婦人子臟冷乆無子由風寒邪氣客於經絡卷栢牡䝉藁本當歸剉碎㣲炒熟地黄栢子仁乾薑炮製剉禹餘糧燒醋淬七遍白薇以上各一兩芎藭人参去蘆頭五味子石斛去根剉桂心附子炮製去皮臍防風去蘆頭吳茱萸湯浸七遍焙乾㣲炒甘草炙㣲赤剉牛膝去苖桑寄生川椒去目及閉口者㣲炒去汗以上各三分右為末煉蜜和丸如梧桐子大每服空心及晚食前以温酒下三十丸紫石英丸治婦人乆無子由子臟乆積風冷隂陽不能施化紫石英細研水飛過二兩細辛桔梗去蘆頭厚朴去麄皮塗生薑汁炙香剉防風去蘆頭川大黄剉碎㣲炒川椒去目及閉口者㣲炒去汗附子炮製去皮臍硫黄細研白薇當歸剉碎㣲炒桂心各一兩鱉甲二兩半生用牡䝉人参去蘆頭桑寄生半夏湯洗七遍去滑用白殭蠶㣲炒續斷紫苑洗去苖土杜蘅牛膝去苗各一兩半右為末煉蜜和丸如梧桐子大每服三十丸空心及晚食前温酒下飬真丸治婦人血虚氣憊隂不升降乆不成姙娠鹿茸當歸肉蓯蓉禹餘糧兎絲子覆盆子熟地黄紫石英桑螵蛸各二兩五味子真琥珀白石藥川芎桑寄生卷栢艾葉川薑堅茯苓人参牡蠣酸􅀥仁各一兩鍾乳粉四兩右為末酒煮麵糊丸如梧桐子大食前温酒吞下五十丸日三服喫後用粥飯壓之白薇丸治補調衝任服温暖子宫治胞絡傷損宿受風寒乆無子或受胎不牢多致損墮乆服去下藏風冷令人有子白薇去苖牡䝉藁本各五分薑黄當歸去蘆剉熟地黄各七分川芎栢子仁㣲炒石斛去根桂心去麄皮附子炮去皮臍五味子去梗防風去苖甘草炙川牛膝去苖酒浸一宿吳茱萸湯浸七次桑寄生各六分秦椒六分禹餘糧八分右為末煉蜜丸如梧桐子大空心酒下三十丸日二服忌生菜葱熱麵蕎麥蒜猪肉炙煿葵菜蕪荑菘菜海藻粘食臭物一方有紫参無牡䝉米飲亦得纔覺姙娠即住服已懐孕者尤不冝服之白薇丸治婦人無子斷緒上熱下冷飲食減退肢體黄瘁凡有一切疾病皆主之白薇熟地黄川椒去目及閉口者㣲炒去汗白龍骨各一兩車前子當歸剉㣲炒芎藭蛇床子細辛乾薑炮裂剉各半兩藁本桂心卷栢白芷覆盆子菖蒲人参去蘆頭桃仁湯浸去皮尖双仁炒㣲黄色白茯苓逺志去心各三分麥門冬去心焙一兩半右為細末煉蜜和丸如梧桐子大每服三十丸空心及晚食前温服續嗣降生丹治婦人禀受氣弱胎臟虚損子宫冷憊血寒痼冷難成子息功效如神當歸桂心龍齒烏藥真天台者佳益智杜仲石菖蒲吳茱茰各一兩半茯神川牛膝秦芁細辛苦桔梗半夏防風白芍藥各三分乾薑一兩半生半炒川椒三兩湯泡半日焙附子一隻重八錢者臍心作一竅如皂子大入硃砂一錢重湴麺褁煨牡蠣一大斤要取漳州土産者即用童子小便浸四十九日五日一换取出用硫黄末一兩半醋塗遍却用皮紙褁又用米醋浸令紙濕鹽泥厚固濟乾用炭五觔每遇合藥入二兩餘者留後次合藥用右為細末取附子入内硃砂别研為細末糯米糊為丸如梧桐子大每服三十丸至百丸空心吞淡醋温酒鹽湯俱可送下一日二服此藥兼療男子精氣不固陽事衰弱白濁夣泄及治婦人血虚帯下肌瘦寒熱但是男女諸虚百損客熱盗汗氣短乏力靣無顔色飲食少味並皆治之更有竒效難以具述君子宜預行善事調服此藥無不感應秦桂丸出仁存方治婦人無子秦芁桂心杜仲炒防風牡丹皮厚朴薑汁炒各三分附子陽起石煆白茯苓各一兩半白薇人参卷栢鹿茸各一兩細辛二兩一分右各為末以蜜和丸如梧桐子大每服三四十丸温酒下食前服朴硝盪胞湯出聖惠方治婦人破身以來全不産及斷緒乆不産三十年者朴硝牡丹皮當歸大黄桃仁生用全各三銖細辛厚朴炙桔梗人参赤芍藥茯苓桂心甘草炙牛膝橘皮各二銖附子六銖蝱蟲去趐足㣲熬水蛭各十枚炙右㕮咀以清酒五升水五升合煮取三升分四服日三夜一每服相去三時更服如常覆被取少汗不出冬日著火籠之必下積血及冷赤膿如赤小豆汁盖為婦人子宫内有此惡物使然或天隂臍下痛或月水不調為有冷血不受胎若斟酌不盡氣力弱大困不堪更服亦可二三服即止如大悶不堪可食酢飯冷漿一口即止然恐去惡物不盡不大得藥力若能忍服盡大好一日後仍著坐導藥一方不用桔梗甘草一方無水蛭白薇丸出千金方治月水不利閉塞絶産十八年服此藥二十八日有子金城太守方白薇細辛各三十銖人参杜蘅牡䝉厚朴半夏白殭蠶當歸紫苑各十八銖牛膝沙参乾薑秦艽各半兩蜀椒附子防風各一兩右為末蜜和為丸如梧桐子大先食服三丸不知稍増至四五丸此藥不可常服覺有娠即止用之大驗一方有桔梗丹参十八銖助陽丹治婦人無子月經不調盖因腹脇疼痛血塊血癖所以不能成胎先服當歸六合散空心煎十餘服先去敗露腹肚不疼可服助陽丹十五服必然成胎有一婦人三十七嵗無子服此藥半月有子細辛防風茱萸川椒白芷白歛乾薑茯苓各一兩半牛膝秦芁附子陳皮石菖蒲厚朴沙参人参桂心各七錢五分右為細末煉蜜和丸如紅豆大每服十丸温酒下日進三服尅日見效男子服能補益婦人服之有子覺有孕不可服婦人無夫者不可服用壬子日修合忌鷄犬孝服每月經後三五日净一舉便成亦可延年益夀凡人家園圃内有􅇒霄花婦人聞其氣不孕宜服七子丸出便産湏知五味子一兩净兎絲子一兩先去灰却用酒浸二日蒸擂細焙乾研用韭子一兩炒覆盆子一兩去蒂酒洗蛇床子半兩黒附子一兩炮去皮臍白茯苓半兩去皮原蠶蛾一兩酒煮肉蓯蓉一兩泡焙乾酒洗鹿茸一兩酒炙去皮毛益志子一兩去皮黄茋半兩蜜炙逺志半兩湯洗去皮陽起石一兩酒煆研如粉熟地黄一兩湯洗酒拌熟蒸右為細末酒煮糯米糊為丸如梧桐子大每服七十丸空心鹽酒或鹽湯下弱甚者加天雄半兩泡去皮脚腰痠痛者加杜仲一兩去皮薑汁炒去絲石斛一兩去根治婦人乆無子息大有神效茯苓桂心川芎人参當歸各二兩細辛二兩半沉香五味子各一兩川牛膝沙参白薇琥珀各半兩川烏一個川椒一兩半蜜一觔右為細末煉蜜和丸如梧桐子大每服五十丸温酒下醋湯亦得日進二服杜蘅丸治婦人腹臟乆積風冷血氣凝澁不能宣通故令無子杜蘅附子泡裂去皮臍細辛各一兩防風去蘆白茯苓各一兩白薇牛膝去苖半夏湯洗七遍去滑㣲炒沙参去蘆頭秦芁去苖桂心川椒去目及閉口者㣲炒去汗菖蒲藁本蛇床子各半兩右為細末煉蜜和丸如梧桐子大每服三十丸空心及晚食前温酒下有子即住服杜蘅丸治婦人無子斷緒杜蘅三月三日麥洗曝乾剉半夏湯洗二十遍碎用薑汁炒白薇桔梗剉炒附子泡裂去皮臍牛膝切酒浸經宿各一兩細辛去苖葉蜀椒去合口并目炒去汗厚朴去麄皮薑汁炙沙参去蘆頭防風去义乾薑炮剉桂去麄皮各半兩右為末煉蜜和丸如梧桐子大每服温酒下三十丸漸加五十丸早晨日午各一服吉祥丸出千金方治婦人積年不孕天麻柳絮丹皮茯苓乾地黄桂心各一兩五味子桃花白术芎藭各二兩覆盆子一斗桃仁一百枚兎絲子楮實子各一升右為末煉蜜和丸如菉豆大每服空心以苦酒下五丸日中一服晚一服秦桂丸一名螽斯丸出大全良方治婦人無子服有效危氏方秦艽去蘆桂心不見火杜仲去皮薑製斷絲防風厚朴各三分薑製附子生去皮臍白茯苓各一兩半白薇乾薑炮沙参牛膝酒浸半夏各半兩人参一兩細辛二兩一分右為末煉蜜為丸如赤豆大每服三十丸空心食前醋湯米飲任下未效加丸數已覺有孕便不可服用温酒下亦得昔金城太守范羅進此方云甚騐若服藥四十日無子請戮臣一家以爲天下醫人戒其方因張伯高學士傳云此藥諸士夫服後俱有應驗就藥緘上書刋二句云修合者用意以誠服餌者存心以仁不患無子也服此如覺無益稍加丸數為度如服七日後隂陽覺有娠此藥與前大子中舍宇文妻李氏年四十嵗無子服此藥十三日有娠此藥螽斯丸屢用屢驗此方不可不廣傳與人夫不在不可服扶血丸治婦人無子紫石英桑螵蛸半兩熟艾醋炙一兩卷栢一兩覆盆子四兩阿膠炒包金土各一兩栢子仁二兩二錢陽起石半兩熟地黄一兩五錢牡蠣二兩煆磁石二兩煆右為末以糯米粥丸如梧桐子大每服三四十丸酒吞下禹餘糧湯治婦人胞胎寒冷絶産無子禹餘糧煆淬七遍白殭蠶去黒㣲煆烏賊骨去甲皮各一兩龍骨碎研桂去麄皮竈下黄土無灰者石韋去毛炒乾薑炮滑石研赤芍藥半夏漿水浸一宿生絹袋子盛洗去滑切開生薑汁炒黄代赭釘頭者研各半兩右擣篩每服三錢匕水一盞生薑三片煎至六分去滓食前温酒服陽起石丸出危氏方治丈夫真精氣不濃不能施化是以無子陽起石火煆紅研細鹿茸燎去毛酒蒸焙兎絲子水淘净酒浸蒸焙别研天雄炮去皮韭子炒肉蓯蓉酒浸各一兩覆盆子酒浸石斛去根桑寄生沉香别研原蠶蛾酒炙五味子各半兩右為細末酒煑糯米糊為丸如梧桐子大每服七十丸空心鹽湯或温酒下紫石英丸出大全良方紫石英阿膠當歸川芎赤芍藥川續斷各一兩鹿茸白术桂心各半兩栢子仁二兩熟地黄三兩右為末煉蜜為丸如梧桐子大空心温酒下二十丸兼治虚中有熱頭旋暈足如履空嘔吐不食月水不調或多或少皆虛症也乆服能生髮令有子更治虚悸常若憂思皆心血不足空虚所致也調經􅄆出便産須知療月候不調或在月前或在月後或多或少或逾月不至或一月兩來以此不孕吳茱茰一兩去閉目者沸湯洗過三次半夏一兩湯泡七次當歸一兩酒洗去蘆人参麥門冬一兩半白芍藥南京者川芎色如臘者丹皮去骨厚朴去皮不見火阿膠蚌粉炒如珠子甘草炙一兩右㕮咀每服三錢水一盞半生薑五片煎至八分去滓食前稍熱服月候調月月如期而來按時而止則當有孕欲娠月候調均顔色肌膚如常但若沉重煩悶不欲飲食又知患之所在脉又平和是欲姙也如此两月後經或不通則結子矣既娠之後多病惡阻婦人怯弱有風氣痰飲則病其狀沉重昏眩惡聞食氣喜啖醎酸甚則寒熱心煩嘔痰恍惚不能支持輕者不服藥亦不妨重者須服藥詵詵丸治婦人衝任虚寒胎孕不成或多損墮澤蘭葉白术各一兩半肉桂去麄皮乾薑炮各半两熟地黄洗焙當歸洗焙各二两石斛酒浸剉炒川芎白芍藥牡丹皮去心延胡索各一两右為細末醋麵糊為丸如梧桐子大每服五十丸温酒空心下一方無乾薑肉桂白术有白薇人参坐導藥方夫求子服藥者須有次第不得不知其次第謂男服七子􅄆女服盪胞湯及坐導再服紫石門冬丸則無不效矣皂莢一两炙去皮子大黄戎鹽礬石燒當歸各二两五味子乾薑各三两細辛三两蜀椒炒出汗二兩葶藶子苦瓠各三分一方作山茱茰右為末搗篩内輕絹袋子如中指大長三寸盛之令滿内子門中坐任意勿行走欲小便時即出之便後仍納一日當有青黄冷汁汁盡即止可交合自有子若未見病出亦可至十日安其本為子宫有冷惡物故令無子值天隂冷即發疼痛須候病出盡方已不可中輟每日早晚用苦葉菜煎湯薫洗一方無葶藶一方有砒霜三分著藥後一日乃服紫石門冬丸鍾乳丸治婦人斷緒無子鍾乳研白礬燒令汁盡各一两阿膠炙令燥紫石英研細蜀椒去目及閉口者炒去汗生地黄焙五味子炒蛇床子炒原蠶蛾炒石亭脂研極細各半两右除石藥别研外餘藥為末和匀煉蜜和搗丸如梧桐子大每服空心煖酒下二十丸漸加至三十丸慶雲􅄆治丈夫陽氣不足不能施化覆盆子五味子各一升兎絲子二升天雄一两石斛白术各三两桑寄生四两天門冬九两紫石英二两右為末篩酒服方寸匕先食服日三素不耐冷者去寄生加細辛四两陽氣不足而無子者去石斛加㯽榔十五枚治婦人乆無子息吳茱茰湯浸二次焙乾白芷去毛白歛去皮白茯苓各三錢細辛去葉梗牛膝去蘆附子炮去皮臍各二錢人参一錢桂心一錢右為末煉蜜為丸如梧桐子大每服十丸用温酒送下食前服治婦人子臟風冷致令無子皂莢去黒皮塗酥炙焦黄去子川大黄剉碎㣲炒戎礬白礬炮灰當歸剉碎㣲炒各一两五味子川椒去目及閉口者㣲炒去汗乾薑炮裂剉細辛各三分右為末用綿裹藥末如棗大内産門中有惡物下即止未效再用熟乾地黄􅄆療乆無子斷緒小腹疼痛冷氣不調熟乾地黄川牛膝當歸各八分卷栢川芎防風各六分牽牛子末桂心各三分右㕮咀以水六升煑取三升三合去滓分三服服别和一分牽牛子末如人行四五里更進一服以快利止忌生菜葱熱麵蕎麥蒜醋猪肉炙􅘤葵菜蕪荑菘菜海藻粘食臭物等八真丹治婦人無子川當歸芍藥地黄川芎皂莢鹿茸阿膠炒作珠用乾草火燒艾葉續斷右八味等分細末醋打麵糊為丸如梧桐子大毎服二十丸空心好酒送下白芷煖宫丸出永類鈴方治煖血海實衝任治子宫虛弱風寒客滯因而斷續不成孕育及數常墮胎或帯下赤白濁下五色頭目虚暈吸吸成氣腹若滿心下煩悸臍腹刺痛連引腰背下血過多两脇牽急嘔吐不食靣色青黄肌膚瘁瘦寢常自汗禹餘糧製一两白薑炮芍藥白芷川椒製阿膠粉炒艾葉製川芎各三分右為末煉蜜丸如梧桐子大毎服四十丸米飲下或温酒醋湯亦得常服温補胞室和養血氣澤顔色消散風冷退除百病自成孕性平不熱大黄丸出千金方治帯下百病無子服藥十日下血二十日下長蟲及青汗三十日病除五十日肥大黄破如米豆熬令黑柴胡朴硝乾薑各一升芎藭五两蜀椒一两茯苓如雞子大一枚右為末蜜和丸如梧桐子先食服七丸米飲下加至十丸以知為度五日㣲下治婦人無病觸禁乆不生子出肘後方右常為月候月水絶後一日交接為男二日交接為女三日為男四日為女五日為男六日為女過此不成成勿復交接更待後月徒然無益浪辛苦也冝用後方栢子仁丸出肘後方大黄七分紫参五分皂莢杏仁吳茱茰各三分半夏前胡各二分右搗篩煉蜜和丸如梧桐子大每服二十丸不過半年有如前法即定男女也治婦人不生育者胡椒二两艾一两各為末熟鹽半两花椒半两為末砂仁官桂茴香各半两右為末裝入猪肚内縫合煑熟每日清晨割二两好酒三五盞服之肚腹熱便能有孕承澤丸出千金方治婦人下焦三十疾不孕絶産梅核仁辛荑各一升葛上亭長七枚細辛三两藁本一两澤蘭子五升右為末蜜和丸如豆大先食服二丸日三不知稍増若腹中無癥瘕稍聚者去亭長加通草一两惡甘者和藥先以苦酒搜􅄆乃内少蜜和為丸温酒下亦可陽起石丸出和劑方治婦人子臟虛冷勞傷過度風寒結摶不受胎遂致絶孕不産此藥服之益子宫消積冷陽起石酒浸半日細研二两吳茱茰炮七次焙㣲炒熟地黄各一两牛膝去苖酒浸焙乾薑炮白术各三分右為細末煉蜜和搗三百杵丸如梧桐子大每服二十丸至三十丸温酒或温米飲下空心食前日二服若覺姙即止抑氣􅄆出危氏方治婦人氣盛於血所以無子尋常頭暈膈滿軆痛怔忡皆可服之香附子乃婦人之仙藥也不謂其耗氣而勿服香附子炒杵净四两茯苓一两橘紅二两甘草炙一两右為細末毎服二錢入鹽少許食前沸湯調服仍兼進紫石英丸後可服螽斯丸及萬靈丸勝金丹等諸藥大妙專治婦人下元虚冷令有子嗣血竭一錢大黄五錢桃仁湯浸去皮尖及䨇仁四十九枚蝱蟲去趐足㣲炒三十枚水蛭糯米炒候米黄即去米三十枚右剉如麻豆每服一錢酒一盞煎至七分去滓空心温服如無結實不可服一方無水蛭治婦人無子以二三月選丁亥日採取桃花隂乾為末入麝香硃砂人参用井花水取戊子夜同為末當信行用温酒下二服大黄湯出肘後方治婦人月水不利結積無子大黄剉炒一两桃仁四十九枚蝱蟲去翅三十枚炒右為細末一處同煎熬成膏子如小豆大每服一丸服至七日再加一丸又七日服三丸一月見效療婦人無子臟冷宫内炙丸出聖惠方麝香二分研皂莢十分塗酥炙削去黒皮子蜀椒六分炒出汗右搗篩蜜丸酸棗仁大以綿裹内産宫中留少綿線出覺増寒不净下多即抽綿線出却丸藥一日一度換之無晝夜皆内無所忌也又方出聖惠方蛇床子石鹽細辛乾薑土𤓰根各四两右搗篩取如棗枚大以裹内子宫中以指進之依凖前法用療婦人臟冷偏僻冷結無子坐藥方出聖惠方間病未可必不得近丈夫餘無所忌並效蛇床子三两芫花三两右搗篩取棗大紗袋盛之内産門令没指袋少長作湏去任意卧著慎風冷茱茰丸出聖惠方治婦人隂寒十年無子吳茱茰一升蜀椒一升去目炒出汗右蜜丸如弹子綿裹導子腸中日再易無所下但問子臟令隂濕即有子也驗胎法一名探胞湯出危氏方婦人經脉不行已經三月者欲驗有胎用川芎生不見火為細末空心濃煎艾湯調下方寸匕覺腹内㣲動則有胎也如胎不轉動腰重如石可用酒調下治婦人無子及冷帯雞子殻五两燒灰細研如粉綿子二两瓦噐内煆令烟為末五月綿子最妙右酒糊每服二十丸空心酒下此藥盡見效煖宫丸治衝任虛損下焦乆冷臍腹疼痛月事不調或來過多或後期不至崩中漏血赤白帯下或月再行淋漓不止帯下五色經脉將至腰腿沉重痛連臍腹小便白濁靣色萎黄肢軆倦怠飲食不進漸至羸瘦及治子宫乆寒不成胎孕附子炮製去皮臍一枚杜仲炒斷絲地榆桔梗沙参厚朴去麄皮薑汁炒各四錢黄茋白薇去土川牛膝去苖川白芷北細辛去葉乾薑蜀椒各二錢五分右為末煉蜜丸如梧桐子大每服二十丸鹽酒服之一月自然有孕多服四物湯羊肉丸亦效或棗湯下辛茸丸出孟氏詵詵方治婦人子宫宿冷致多胎氣不固常有損墮冝去子宫風當服之嫩鹿茸炮去毛酥塗炙一兩五錢北細辛黄茋蜜炙當歸各三兩藁本頭赤芍藥川白芷牡丹皮川芎乾薑炮肉桂去皮小黒豆没藥别研防風川椒鹽炒出汗去鹽各一兩右為末煉蜜為丸如梧桐子大每服四五十丸用温酒或淡醋湯送下空心食前八珍散出孟氏詵詵方治婦人處深閨内閣常以無子為憂思慮過傷損脾胃脾虚則不能制水漏五色之症或只常下黄白水冝服此藥𤣥參人參白术粟米㣲炒白芷厚朴蘆製各一兩益智一兩黄茋二兩甘草五錢右為散每服三錢薑三片􅀥四個同煎至八分空心服千金保生丸出孟氏詵詵方若服調氣血藥覺氣調血順但未受娠則屏去他藥再服此藥以實子宫須經候過三日乃交媾自然成胎無疾而不娠者尤冝多服此藥自然成矣防風石膏煆糯米川椒去目炒出汗北黄芩秦艽去土厚朴去皮貝母北細辛石斛酒浸蒸三次大豆黄卷净如無以小黒豆代以上各二兩白薑炮一兩大蔴子炒去殻稱一兩甘草炙一兩熟地黄酒洗蒸三次焙當歸各二兩没藥真者一兩五錢右為末煉蜜和丸如彈子大每服空心用北􅀥四枚煎湯嚼下一日二服不可用酒下或發洩了真氣不能護血參香勝金散出孟氏詵詵方治婦人血不和須先調其榮衛使之順度則服千金保生丸乃能有孕當歸二兩白薇一兩没藥一分𤣥胡索去皮槀本頭綿黄茋蜜炙各一兩赤芍藥甘草肉桂紫石英煆白术白石脂火煆醋碎川芎白茯苓人參川白芷白牡丹皮沉香以上各五錢右為末每服二錢温酒調下空心服又水一大盞薑二片北棗二枚同煎若虚煩作熱每服之時入生地黄汁一合同煎一服千金方治産後勞損無子隂冷子宫閉積年不産身體寒冷防風一兩五錢桔梗三十銖人參一兩菖蒲半憂丹參厚朴乾薑紫苑杜仲各十八銖秦芃白歛牛膝沙參各五錢右十四味為末白蜜為丸如小豆大食後服十五丸日三服不知増至二十丸有娠止夫不在勿服之服藥後七日隂陽相合歸艾丸出朱氏集驗方治婦人平生無子服之屢驗生地黄一觔洗净生薑一觔洗净各用砂盆研爛如膏加散麺淹一宿銀器各炒乾入後藥白芍藥白茯苓延胡索當歸去蘆浸各二兩熟艾三兩醋調麵成餅蒸右除艾葉外各焙乾為末入地黄生薑作一處煉蜜和丸如梧桐子大每服五十丸空心酒下一日三服麝香丸出御藥院方治婦人隂中乆冷或成白帶下淋瀝不斷乆無子零陵香藿香各二錢蛇床子五錢吳茱茰桂白礬木香各三錢麝香二分五厘丁香韶腦各一錢五分不灰木白芷各二錢五分龍骨五錢右為細末煉蜜和丸每兩作四十丸每用一丸綿裹内隂中麋茸萬病丸出十便良方補養血氣乆服令人有子熟乾地黄當歸麋茸勿使鹿茸右件各等分煉蜜丸如梧桐子大空心食前米飲或温酒下五十丸附子當歸丸出十便良方治血臟虚冷方當歸三兩芍藥二兩附子白术各一兩右為細末醋煑麵糊和丸如桐子大米飲下三十丸未效加至五十丸空心服壯陽令人有子出本草以鹿項骨髓蜜煑服之令人有子出本草以正月十五日燈盞夫婦於冨家宴㑹所盗之初勿令人知之安卧床下當月有娠令人有子出本草以正月雨水夫妻各飲一盃還房當即有子神效也令婦人有子出本草以狗骨煎汁煑粥飲食之熱補令生男兒出本草以虎鼻懸户上療婦人無子二月丁亥日收桃花杏花隂乾為末戊子日和井花水服方寸匕日二三服姙娠附論夫何以知婦人姙娠脉平而虚浮者胎脉也經云陽摶隂謂之有子此是血氣調和陽施隂化也診其手少隂脉動甚者姙子也少隂心脉也心主血脉又腎名胞門子户尺中之脉按之不絶乃姙娠也三部脉沉正等按之無絶者有娠也姙娠初時㣲動小呼吸五至三月而尺數也姙娠四月欲知男子女人者左疾為男右疾為女左右皆疾為産二子又法左手沉實為男右手浮大為女左右俱大猥生二男俱浮大猥生二女尺脉若左偏大或左右俱大産二子大者如實狀又法左手尺中浮大者男右手尺中沉細者女若㣲而斷絶者月水不利又法左右尺俱大浮為産二男不然女作男生俱細為産二女不爾男作女生又法得太隂脉為男得太陽脉為女按太隂脉沉太陽脉浮又遣姙娠人面南行還復呼左廽首是男右廻首是女又看上􅂒時夫從後急呼之左廻首是男右廻首是女又婦人姙娠其夫左乳傍有核是男右乳傍有核是女姙娠欲知將産者懐姙離經其脉浮設腹痛引腰脊為将産也但離經者不病也又法欲産其脉離經夜半覺痛日中則生也孕原立本章有泰初有泰始渾淪一判旣見氣矣故經曰泰初立形矣故曰泰始氣初形始天地相因生生化化品物彰矣故曰大哉乾元萬物資始至哉坤元萬物資生有生之初雖陽為之主育而充之必隂為之主因形移易日改月化無非坤道坤之代終也謂之姙陽旣受始隂主之也謂之胞已為正陽隂胞隂包之也謂之胚未成為器猶之坯也謂之胎也旣食於母為已成也若娠則以時動也若懐則以身依之得地之氣隂陽之至和相與流轉於一軆也唯時能順時數謹人事勿動而傷則生育之道得矣觀四時之運生長收藏代出萬物有儀則生咸備而天地之氣未始或虧者隂陽相養以相濟也昧者曽不知此乃欲拂自然之理謬為求息之術方且推生死於五行蘄補養於藥石以為勝真以人助天縱或有子孕而不能育育而不夀者衆矣昔人論年老有子男不過盡八八女不過盡七七則知氣血在人固有量豈能逃隂陽之至數哉大全方云肝為血兮肺為氣血為榮兮氣為衛隂陽配偶不參差兩臟通和皆頼劑血氣旺定為孕無血旺氣衰應有體肝臟血為榮屬隂肺主氣為衛屬陽隂陽配偶者是夫婦匹配偶合精積乃有子也若血少氣盛則無娠孕若血盛氣少則有孕也尺㣲關滑寸帶數流利徃來并雀啄小兒之脉以見形數月懐躭猶未覺尺脉㣲關脉滑尺脉帶數及流利雀啄皆是經閉塞不行成胎以上之脉皆是血多氣少之脉是懐小兒之脉已見行正也左疾為男右為女流利相通速來去兩手關脉大相應已形亦在前通語左手脉疾為懐男右手脉疾為懐女及其脉流行滑利相通疾速來去是或兩手尺脉倍洪大相應是其胎已有形狀也左手帶縱兩箇兒縱者夫行乘妻水行乘火金行乘木葢即所勝脉也名曰横見於右手則懐二箇男兒也右手脉逆生三子逆者子乘母也是水行乘金火行乘木即生已之脉也名曰逆見於左手則懷三箇男兒也右手脉順還三女順者母乘子也是金行乘水木行乘火即生已之脉也名曰順見於右手則懐三女兒也寸關尺部皆相應一男一女分形證寸關尺部脉大小遲疾相應者是懐一男一女形證之脉也謂關前為陽關後為隂隂陽相應故懐一男一女也有時子死母身存或即母亡存子命此二句之文乃辨子母存亡之法往來三部通流利滑數相生皆替替陽實隂虗脉得明遍滿胸堂皆逆氣若寸關尺三部通行流利皆替替有力而滑數皆陽實隂虚之脉逆氣遍滿胸堂而不順也左手太陽浮大男左手寸口為太陽其脉浮大則是懐男子脉也右手太隂沉細女右手寸口為太隂其脉沉細是懐女脉也諸陽為男諸隂女指下分明長記取諸陽脉皆為男即浮大洪數滑實之類是也當懐男諸隂脉細沉㣲弱之類是也當懐女也三脉沉止等無絶尺内不止真胎婦寸關尺三部脉沉浮正直齊按無絶斷及尺内舉按不止住者真的懐胎婦也夫乘妻兮縱氣霧經云縱者夫乘妻也水行乘火金行乘木即鬼賊脉也縱氣霧霧者露也又上下也謂夫之陽氣乘妻之隂氣二氣上下相逐如霧如露潤澤結子也妻乘夫兮横氣助横者妻乗夫也見前注謂兩榜横氣相佐助也子乘母兮逆氣生逆者子乘母也謂之子氣乘母氣方乘母逆行之氣相生合也母乘子兮順氣䕶得母氣乘於子氣為順氣相䕶衛也凡縱横逆順四氣以榮衛養方乃成形也小兒日足胎成聚身熱脉亂無所苦汗出不食吐逆時精神結備其中住謂姙娠受五行精氣以成形秉三經以榮其母懷姙至五月其胎雖成其氣未備故胎氣常上衝心胸則汗出不食吐逆名曰惡阻俗呼選飯唯思酸辛之味以謂胎氣也滑疾不散胎三月姙娠三月名胎胚此是未有定儀心胞暗養之故脉見滑疾流利為少氣多血不散為血氣盛則始成胎也但疾不散五月母其脉但疾數而不散者是五箇月懷胎之母也弦緊牢强滑者安沉細而㣲歸泉路孕婦之脉冝弦緊牢强滑利為安吉之脉若沉細而㣲謂脉與形不相應故云死也前文雖云太隂沉細又云諸隂為女其説似有相反謂三部脉皆不沉細反㣲故不同也又云孕備論經云少隂脉動甚者有子厥指何哉曰手少隂之經屬心足少隂之經屬腎心之所主者血腎之所主者精精血合氣而成之也然而胞門子戸又所以為精血之㑹其於尺部二脉猶有可驗者焉且婦人尺部之脉滑是為實必主月事不行若其未斷絶或中絶而至者皆無孕惟滑而不絶畧無間斷於其間此則真胞孕之脉也胎之脉婦人懐胎臟氣常擁閉不可多睡不可憂懼勞後不可啖食粘滯辛酸强硬之物又不可妄施針炙所貴行數歩調陽自適使氣得其平若酒麵炙煿熱毒熏蒸若感觸邪氣傳染熱氣若悞服藥餌破胎若七情内傷快意縱慾則易致漏若胎腹痛方來用力太早則驚動胎轉反未得下若抱持不正多奔突後趍兒已近産門多觸犯禁忌則易産易難旣産之後或過用心力或素有疾阻或血虚氣熱或虚極乘寒則血暈眩悶之證生矣然而安胎之法有二因子病以致母病者宜安胎而母易産以膠艾湯芎歸湯各半縮砂佐之為良難産之劑前所謂四物湯加吳茱茰入醋夾煎黒神散用乳香煎湯調下皆其要藥産後血暈先以舊漆器燒烟㣲向其鼻次則五靈脂末半生半炒入蘇合香丸百沸湯調與之或黒神散入麝香少許調以紫蘇湯或花蕋石散用童子小便温酒調劑下也損胎驗法婦人面青手足冷指甲黒而且遍體不仁腰腹痛割其或面青唇青以致舌間黯黒口角沫出則不容以人力勝之大要將産腹痛萬勿驚動且須凭物而行直至腰痛子逼腎門方可用力盖腎繋於腰而胎繋於腎故也俗於産後用理中湯然蜜甘而滯不若但用生化湯俗於小兒初誕多用黄連然連苦傷胃不若但用甘草炙煎綿蘸入口良更迭用惡物自出俗於胎孕已成多胎滑用枳殻散然枳殻㣲寒須以縮砂烏藥為佐産後飲食米飲勿用可先與百沸湯時常調血以四物湯逐瘀以黒神散人所共知也若夫順氣等劑胎前産後猶當兼施而並用之血暈昏迷切勿用降真香熏之以塞其氣又方白术湯出宣明論治姙娠血液虚衰委弱難以運動氣滯痺麻榮衛不能宣通常服養液潤燥開通結滯令血昌盛白术三兩寒水石當歸黄芩芍藥人參石膏乾葛防風縮砂藿香各五錢甘草茯苓各一兩木香一錢右為細末每服三錢水一盞生薑三片同煎至六分去滓温服日三次宜去人参服之半夏加一錢為妙崔宣武方用白术一兩白术散出危氏方治婦人氣不調和飲食易傷白术炒乾紫蘇各一兩人參白芷各三分炒川芎訶子皮各五錢甘草一分右為末每服二錢水一盞薑三片煎至七分温服經云飲食自倍腸胃乃傷又云隂之所生本在五味隂之五宫傷於五味若姙子飲食不節生冷毒物恣性飲噉以致傷人最難用唯此木香白术散丸二方服最為稳當木香丸出危氏方治婦人有孕傷食木香三錢三稜炮人參白茯苓各三錢右為細末麵糊丸如菉豆大開水吞三四十丸胎孕九箇月將息胎法出大全良方用猪肚一箇具依法用葱五味煮熟食如不盡更食以盡為度不得與别人食無效犀角散出衛生寳鑑治姙娠婦人産前諸風熱困倦時發昏眩揀參犀角山梔子黄連青黛川芎川羗活吳白芷甘草茯苓去皮以上各五錢右為末每服五錢水一盞半生薑三片竹葉五七葉同煎至一盞去滓温服食前治姙娠臟腑常多轉㵼身上肌肉常冷心中寒慄方出楊子建萬全䕶命方白术續斷吳茱茰防風當歸人參芎藭五味子各五錢甘草各一分細辛三銖右為細末每服三錢水一盞二分生薑三片􅀥二枚同煎取一盞空心喫治姙娠渾身碎痛并腹内疼痛不可勝忍悶亂欲死方出楊子建萬全䕶命方白术當歸芍藥芎藭黄芩各一兩右杵羅為末每服三錢水二盞二分煎取一盞一分空心去滓喫法便産須知凡欲要男兒吉良者交㑹之日常避丙丁及弦望朔晦大風大雨大霧大寒大暑雷電霹靂天地昏瞑日月無光虹蜺地動日月薄蝕此時受胎非止百倍損於父母生子或瘖瘂聾瞶頑愚癲狂攣跛盲眇多病短夀不孝不仁又避日月火光星辰之下神廟佛寺之中并皂􅂒厠之側冢墓屍柩之傍皆悉不可夫交㑹如法則有福徳大智善人降托胎中仍令父母性行調順所作和合家道日隆祥福競集若不如法則有薄福遇癡惡人來託胎中則逆父母性行㓙險所作不成家道日否殃咎屢至雖生成長家國滅亡夫禍福之驗有如影響此乃必然之理何不再思之男女受胎時日法出便産須知凡男女受胎皆以婦人經絶一日三日五日為男仍遇月宿在宿貴日又以夜半生氣時㵼精者有子皆男必夀而賢明髙爵也若以經絶後二日四日六日㵼精者有子皆女過六日皆不成子又遇王相日尤吉推王相日法出便産須知春甲乙夏丙丁秋庚辛冬壬癸推貴宿日法正月一日六日九日十日十一日十二日十四日二十一日二十四日二十九日二月四日七日八日九日十日十二日十四日十九日二十二日二十七日三月一日六日七日八日十日十七日二十日二十五日四月三日四日五日六日八日十日十五日十八日二十二日二十八日五月一日二日三日四日五日六日十二日十三日十五日十六日二十日二十五日二十八日二十九日三十日六月一日三日十日十三日十八日二十三日二十六日二十七日二十八日二十九日七月一日十一日十六日二十一日二十四日二十五日二十七日二十八日二十九日八月五日八日十三日十八日二十一日二十二日二十三日二十四二十五日二十六日九月三日六日十一日十六日十九日二十一日二十二日二十四日三十日十月一日四日九日十四日十七日十八日十九日二十日二十二日二十九日十一月一日六日十一日十四日十五日十六日十七日十九日二十六日二十九日十二月四日九日十二日十三日十四日十五日十七日二十四日二十七日若春合甲寅乙夘夏合丙午丁巳秋合庚申辛酉冬合壬子癸亥與上件月宿日合者尤佳胎前避忌出産後救急方初受胎後凡妨胎藥物並不冝服或房勞不戒能令胎孕不成姙娠六七月後醉飽過度房室不節母多有腰疼腹痛之疾甚則傷胎不冝登髙舉重或至跌撲挫閃損胎古人入月則異寢此時邏於色慾則生子頭戴穢惡而出俗謂戴白生其子必患胎㿐姙娠食忌法出便産須知食雞子鮓乾鯉魚鱠令子多瘡食豆醬合藿令墮胎食兔肉令子缺唇食犬肉令子無聲食酒多食雀肉令子無恥食椹子及鴨子令子倒懸食驢馬肉令子延月食魚鱉子傷兒食山羊肉令子多病食驢肉令産難食肉雞及糯米令子腹中多虫食水漿令絶産食雀肉虵醬令子多滛無恥食螺螄令子鋪腹産姙娠六七月多食五辛􅘤酒麵令子胎熱多食水冷淘葵􅐜生冷菜菓令子患胎寒大小便勿向非常之地令子半産殺兒此大忌之食忌起居忌羊胎多食生子多厄難食蛙子喑啞食螃蟹横生子薑多食子生瘡多指乾薑蒜雞毒物皆忌食粘膩難化傷胎無鱗魚不可食鰍魚過多致有産難菰子名菌有大毒有食菌多誕子風夭勿亂服湯藥酒勿過飲卧産尤忌勿亂妄針炙勿向非常地小便旋半産殺人勿舉動重登高渉險勿有大驚子必癲疾宜自釋勿多睡須時行歩體虚腎氣不足子必觧顱疾冝自釋勿傷脾胃及榮衛虚怯子必羸瘦自家及隣家興修犯其胎氣令兒破形損命刀犯者形必傷泥犯者竅必塞打撃者色必青黒撃縳者相拘攣右等驗如反掌切冝避之胎前藥忌出胎産救急方雄黄雌黄與砂黄代赭碙砒巴豆霜水銀鉛粉生金屑硝分三品厚朴芒虎掌鬼臼鬼箭羽川牛牛膝川白薑天雄附子川草烏南星半夏及藜蘆紅花芫草并大㦸躑躅野菖與䕡茹白薇杜蘅牡丹等槐子皂角兼溲䟽桃仁三稜乾筒漆茜草通草瞿麥俱欓根芽根蘇方木牛黄蝟皮生䑕徒蚖青斑蝥并地膽蝱蟲水蛭及螻蛄殭蠶蠶布蠏爪甲蜈蚣蜥蝪衣白魚驢馬兔肉雞鴨子菜中莫食大小葫麝香肉桂蛇蟬蛻催生以前切忌諸普濟方卷三百三十六
