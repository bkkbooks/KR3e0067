body:
  text: 普濟方卷二百九十七明周王朱橚撰痔漏門痔漏附論夫五痔之疾或出鼠乳或發寒熱或生瘡或癢痛或下血其證不一治之不早勞傷過度則毒氣浸潰肌肉穿穴瘡口不合時有膿血故成痔漏經曰痔久不差變為漏是也腸風痔病者所發手太隂手陽明經以應動脈謂肺與大腸為表裏主為傳道以行糟粕腸風痔疾有五種其證亦異蓋隂陽氣虛而痃腑踈風邪乘而熱自生氣濕邪熱攻於腸中至使大便澀而燥熱鬱血熱散而流溢衝浸滲腸裏故以先血後便熱在下先便後血熱在上先血後便久而不愈乃作痔素問云因而飽食斤脈橫解房室勞傷為痔風熱不散榖氣流溢傳於下部故令肛門腫滿結如梅李核甚者變成漏也方蝟皮丸出濟生方治五腫痔漏豬左足懸蹄燒灰存性蝟皮一枚燒灰存性黃牛角腮燒灰存性貫衆槐角子炮雷丸雞冠花槐花炒油髮灰黃茋去蘆香白芷當歸去蘆酒浸枳殼去穰生用玄參黃連去須防風去蘆鱉甲醋炙各半兩麝香别研半錢右為末米糊丸梧桐子大每服七十丸加至一百丸空心米飲下年髙虛熱寒濕痔疾不宜服之麝香蝟皮丸治腸風痔漏疼痛不止大便下血時舉發雞冠花八兩微炒存性牛角䚡燒存性管仲去毛淨槐花微炒油髮灰香白芷當歸枳殼去穰玄參黃連黃茋防風去蘆半兩鱉甲一錢用炙黃色麝香半錢别研蝟皮燒存性用一箇訶子去核五錢淨微炒豬左懸蹄五十箇燒存性右入麝香和米為丸梧桐子大每服三十丸至四十丸空心米飲下忌動風發病之物內補丸出聖惠方治痔漏積年不瘥黃茋二分銼槐花一兩微炒苦參半兩銼白桐葉三分龍骨三分狸睛一對微炒漏蘆半兩蝟皮一兩炙黃色篇蓄半兩敗醬半兩木香厚朴一兩去粗皮塗生薑汁炙令香熟硫黃一兩細研豬後懸蹄甲一兩煮黃焦續斷半兩右搗羅為末煉蜜和丸梧桐子大每服食前粥飲下二十丸寸金錠子出御藥院方治一切痔漏經久不可忍者麝香輕粉硫黃雄黃雌黃藤黃砒霜粉霜黃丹各二錢别研黃漆牡蠣紅藤根各一兩右為末燒陳米飯和勻捏如大棗子核每用一錠子絍在肛門內可深二寸許用定新磚毬兒兩箇燒赤醋內蘸過綿裹肛門外尉冷即易一箇次日大便取下惡物立效黃耆葛花丸出宣明論治腸中久積熱痔漏下血疼痛黃茋葛花生地黃焙黃赤子小豆花各一兩大黃赤芍藥黃芩當歸各三兩蝟皮一箇檳榔白蒺黎皂角子仁炒各半兩右為末煉蜜丸梧桐子大每服二十丸至三十丸桑白皮下食前槐子煎湯下亦得內補散治痔人參黃耆當歸各二兩白芷桔梗川芎厚朴官桂防風甘草各一兩右為末木香同上藥為丸內痔外痔皆治一方用第勝藥煎湯洗患處雞峰烏金散出直指方治痔漏穿山甲刺蝟皮豬牙皂角黃牛角心各碎炒黃槐子皂策刺枳殼貫衆牛角阿膠各等分再夾和蝟皮山甲同炒黑右為末每一錢五分用胡桃肉研爛併調酒食前服大腸有熱荆芥泡湯調下漏血不止當歸煎湯調下代赭石丸出直指方治痔變為漏膿血不止代赭石煆醋碎研磁石煮米醋數沸蘸七次研牡蠣灰龍骨研蝟皮煮焦皂莢刺赤石脂川椒焙豬後蹄垂甲燒各存性木賊焙防風炒白礬煆右等分細末神麯糊丸小豆大每服五十丸食前艾并生薑湯下漏血處以熟艾橘和血蝎塞日三換二礬丸一名釣腸丸治痔漏傍穿數冗膿不止并腸風脫肛等洗痔方黃連黃芩荆芥蛇床子各二兩側柏葉生四兩槐條鏡面草蚵蚾草各一握黑豆半合甘草對半兩蔥連鬚一握右新汲水熟煎傾盆內熏後通手洗黃耆丸一名黃耆枳殼煎丸出本事方治逺年近日腸風痔漏熏癢結核成瘡諸藥不效黃耆蜜炙枳殼去白麩炒葳靈仁各二兩續斷槐角子去蘆比礬枯當歸炒乾薑一方作良薑附子炮生地熟地黃酒浸連翹炒半兩右為末煉蜜丸梧桐子大米飲下三十丸進三服枳殼荆芥散治腸風痔漏并臟毒下血或肛疼痛荆芥防風苽蔞木通當歸皂角刺甘草陳皮茯苓枳殼各等分右為末每服半兩水一盞煎七分和滓空心溫服後用淋洗藥甘松鳳眼草蒴藿用根葉莖全華蔥各等分右為末每服用藥一兩水二碗煎至三五沸痛癢時澡洗烏玉丹一名黑玉丹出直指方治丈夫婦人腸風痔漏著床大腸頭疼不可忍者服此藥不拘三四次見效初得此疾發癢疼痛榖道四周多生梗核此是痔如破是漏只下血是腸風皆因酒色滯氣風毒飲食五事過度即成此疾人多以外醫塗痔病在腸自有蟲若不去根本則不除此藥的有神效棕櫚亂頭髮皂角水淨洗各二兩雷丸芝麻各一兩苦練根二兩半蝟皮牛角腮三兩製洗淨乳香麝香各半兩豬蹄甲後腳者四十九箇洗淨右除乳麝外用藏瓶或沙盒盛鹽泥固濟周回用火煅煙盡存性不可以太過便去火入乳麝再研細用酒打糊丸如梧桐子大空心食前胡桃酒下二三十丸楊氏方名棕櫚丸添不蛀皂角一兩半餘同一方加槐角四兩燒灰存性榼藤子一兩二錢五分炒苦練根減一半牛角腮四兩豬蹄甲用二十五箇麝用二錢芝麻乳麝雷丸苦練根榼藤子不燒外餘藥各燒灰不用藏瓶每服五十粒荆芥茶或酒米飲任下秦芁蒼术湯出衛生寶鑑腸風痔漏者總辭也分則異若破者謂之痔漏大便不澀必作大痛此由風熱乘食飽不通氣逼大腸下而作也受病者燥氣也為病者胃濕也胃刑大腸則化燥熱之實勝附熱而來是濕熱風燥四氣而合故大腸頭成塊者濕也作大痛者風也作大硬燥結者主病兼受火邪也去此四者其西方肺主諸氣其體收下亦助病為邪須常破氣藥兼之治法全矣以銼湯與之其效如神秦芁一錢當歸三錢酒浸澤㵼二錢蒼术七分防風半錢大黃少許黃蘗五分酒洗檳榔二分皂角燒存性去皮一錢桃仁湯洗去皮錢右將檳榔桃仁皂角仁另為末外㕮咀都作一服水五盞去滓入檳榔等三味再煎去滓空心服一方青皮五分木香三分同煎病大者再服而愈生冷硬物冷茶之類及酒食大麵料乾薑之類犯之其藥不效如有白膿加白葵花去蕚青皮半錢不去白入正藥中同煎又用木香三分為細末同檳榔等三味再上火同煎依上法服餌古人治此疾多以嵗月除之此藥一服立愈若病大者再服而愈榼藤子丸出御藥院方治風癖下血痔漏結核疼痛榼藤子一箇重七錢酥炙和皮用茴香炒皂角刺燒存性蝟皮燒存性枯白礬白附子炮枳殼麩炒去穰樗皮焙乾各半兩乳香二錢右為末醋麵糊丸梧桐子大每服四五十丸溫酒食前服如有痔瘡疼痛醋研五七丸津唾塗患處木香厚朴湯出宣明論治痔漏脫肛腸胃冷脅虛脹不思飲食木香陳皮桂心桃仁厚朴各一兩肉豆蔲赤石脂各半兩大附三兩炮皂角子二兩去皮子酥炙黃右為末每服二錢溫粥飲調下食前神丹出危氏方治腸風痔漏刺胃皮一箇製鐵器中炒黑色為度皂角刺半兩燒灰存性硫黃研􅀈豬牙角半兩去黑灰塗蜜炙白礬枳殼銼碎炙黃耆蜜炙赤附子除去皮各半兩白雞冠花一兩右為細末酒煮糊為丸梧桐子大每服七丸至十丸空心食前溫酒下不飲酒者米飲下久年漏痔服至三四十日肉滿平安諸痔服之即自消外痔用藥十丸同硃砂細碾蜜調塗之常服永除根本若服藥覺熱加白雞冠子一兩五錢或二兩更加三五丸服之臟腑自調勻也治痔漏翻花㵼血出經驗良方狐狸手足一副隂乾穿山甲蝟皮各三兩川芎乳香黃明膠白附子川烏頭五靈脂各二兩右為粗末沙鍋固濟疾乾用炭火煆通赤去火開窩研為末入麝香研園荽酒調下二錢日三服黑丸子出危氏方専治久年痔漏下血乾薑百草霜一兩木饅䬦二兩烏梅敗棕百葉油髮各五錢以上各燒灰存性却入後藥桂心三錢白芷五錢各不見火右為末醋糊為丸梧桐子大空心米飲下三十丸治風痔漏不問有頭無頭定三日安出本事方藜䕡燒灰半兩皂角針只用針不用皮條炒二錢天麻半兩乾薑半兩蓮子草一兩真麝半錢橘子硫黃一兩苦瓜蔞一箇大者明礬一兩右將瓜蔞開一孔如小錢大入礬并硫黃在內却將原掩合定藤紙糊却丸罐子盛坐磚上炭火煆令煙盡為度瓶內悶死候冷取去研細同前六味藥末和勻煉蜜丸梧桐子大每服十丸至五十丸空心溫酒下日三服三日效油麵醃藏牛馬肉魚腥生冷行房行逺勞力一切忌之紫金丸出王氏博濟方治痔漏久不瘥肛邉牙血時出膿血龍腦麝香乳香雄黃蜜陀僧并研各炒一兩砒霜半兩丹沙阿魏安息香各一錢右先將乳香安息香阿魏熟水浸冷通軟研如膏次將龍腦麝香丹砂蜜陀僧雄黃各研為末砒霜加菉豆粉二錢同研細更用巴豆三粒去皮心膜壓出油亦研細與前藥一處研勻却入前乳香等膏和丸菉豆大每服一丸空心茶清下兼治腸風等疾婦人心痛血氣當歸酒下一丸心痛水㵼生薑湯下一丸食癥麵湯下氣痛溫酒下一丸韭根湯治諸痔漏出膿水疼痛不止韭根暴乾蜀椒去目并閉口炒出汗蛇床子續斷蕪荑仁野李根皂莢白皮松脂各一兩白礬半兩右細末每度二兩用水三碗煎二碗濾去滓乘熱於盆內先熏後洗日三香殼丸出宣明論治濕熱內甚因而飽食腸癖為諸痔久而成痛漏速治悉愈之木香黃蘗各三錢枳殼去穰炒厚朴各半兩黃連一兩蝟皮一箇燒灰當歸四錢荆芥穗三錢右為末麵糊丸梧桐子大每服二三十丸溫水食前日三服八寶散治腸風痔漏大附子一箇去皮臍南乳香半錢蝟皮一箇燒灰皂角針一兩燒灰榼藤子一箇去皮臍豬牙皂一兩去皮白礬半兩枯硫黃二錢半右為末醋糊丸小豆大每服七丸溫酒下日進一服二日進二服止假令十日進三次忌諸發毒物乳香丸出聖濟總録治一切痔漏反花瘡等疾乳香研半兩雄黃研生乾地黃瓦上煆醋浸焙乾黃蠟各一兩麝香研龍腦研丹砂研沒藥研各一錢右為末鎔蠟丸梧桐子大每服十丸麥門冬熟水下留少藥末貼欲貼時先用橘葉蔥湯洗之螺皮丸出聖濟總録治五痔連年不差漸成痔漏螺皮炙焦龍骨各二兩黃耆細銼當歸銼焙枳殼去穰麩炒乾薑炮各一兩半艾葉三分附子炮製去皮臍二兩右為末煉蜜丸梧桐子大每服三十丸食前黃耆湯下黑聖散出直指方治腸風臟毒痔漏及諸下血當歸川芎茯苓地榆槐花敗棕艾葉燒存性百草霜右等分為末每服二錢食前陳米飲下愈痔散出御藥院方治男子婦人一切腸風痔漏無問新久皆可服之南乳香另研槐花微炒木香商枳殼去穰麩炒鶴虱蓽澄伽去蒂白蕪荑各一兩右為末如服時先嚼核桃一箇次用熱酒一盞調藥二錢空心日進二服忌發風熱動氣等物榼藤子丸出宣明論治腸風㵼血濕熱內甚因為諸痔久而不治乃變成漏黃耆枳實槐花荆芥穗鳳眼草皂角三百箇炙榼藤子一箇炙右為末麵糊丸梧桐子大每服二三十丸空心酒下米飲亦得忌油膩冷豬魚臭血等物乳香沒藥散出宣明論治五腫腸風痔漏無問久新宣黃連白礬各一兩榖精草五錢醋石榴一箇用刀子割下蓋子裏面取子三停一停次將黃連白礬碎都入石榴內用元蓋子合用濕紙一張褁了後用膠泥拍作餅子裹石榴以炭火燒通赤取出去泥紙次將榖精草銚子內炒焦黃與石榴同研極碎却入麝香一錢乳香二錢沒藥一錢研碎拌勻右每服一錢熱酒小半盞調下日三服香墨散出聖惠方治痔漏下膿血不止香墨三分枳實一兩麩炒微黃黃耆一兩銼代赭一兩當歸一兩銼微炒麝香一分細研白芍三分右搗羅為散入麝香更研勻每服食前以粥飲調下一錢硫黃丸出聖惠方治痔漏腫痛膿血不止香墨三分枳實一兩麩炒微黃黃耆一兩銼代赭一兩硫黃一兩細研水飛過白礬一兩燒灰附子一兩炮製去皮臍皂莢一兩燒灰麝香一兩細研蝟皮一兩燒灰皂莢一兩去黑皮塗酥焦黃炙去子右搗為末入麝香研令勻以醋煮麵糊丸梧桐子大每服食前溫粥飲下十五丸治痔漏疼痛腫硬不消用此熏方出聖惠方莨菪子韭子雄黃吳茱茰豬牙皂角以上並生用右搗為末黃蠟為丸彈子大用小口瓶子內燒一丸熏痔漏上日可兩度用之槐角丸出直指方治五種腸風㵼血糞前有血名外痔糞後有血名內痔大腸不收名脫肛榖道四面努肉如嬭名鼠痔頭上有孔名漏並皆治之此藥治腸風癢內小蟲裏急下膿血不止癢痛消腫聚驅濕毒久服永除病源槐角去梗枝炒一兩地榆當歸酒浸宿焙防風去蘆各八兩黃芩枳殼去穰麩炒各半斤右為末酒糊丸梧桐子大每服三十丸米飲下不拘時槐荆丸出御藥院方治男子婦人腸風痔漏先臟腑後便血槐花微炒荆芥穗去土枳殼麩炒去穰各一兩白礬生薄荷葉鬱金各半兩右為末水麵糊丸梧桐子大每服六七十丸空心粥飲下日進二服淋泄藥出御藥院方治腸風痔漏經久不瘥痔以成漏瘡口膿汁涓涓不絶及瘡內有蟲癢痛不止並宜淋洗之如瘡不破者用後方乾上藥塗貼衛生􅀢鹽葳靈仙去土荆芥穗去土商枳殼去穰炒乳香各一兩細辛二錢半去苗鳳眼草二兩右為粗末每服用藥三兩水一大升半煎一升濾去滓稍熱淋洗患處如冷再溫熱再洗遍不用如洗罷用綿或白絹揩乾上藥如瘡破後不須上藥只淋洗乾上藥出御藥院方如瘡不破用前方淋泄訖用此藥塗之馬牙硝别研馬勃各半兩輕粉三錢半右為末如瘡癢痛不破者覷瘡大小用藥多少津液調成膏擦於患處日用三五次六神丸治痔漏膿血不止鯪鯉甲燒灰皂莢刺燒灰雄黃鶴虱為末硫黃研各等分右為一處研勻麝香水煮麵糊丸梧桐子大每服十五丸空心煎湯酒或湯下加至二十丸蝟皮丸出千金方治痔亦治漏蝟皮一具礬石當歸連翹乾薑附子炮續斷黃耆各二兩槐子三兩乾地黃五兩右為末蜜丸桐子大每服十五丸日再加四十丸一方無礬石地黃肘後方用黃連無連翹葛花黃連丸出德生堂治凡受痔漏便血之證者皆富貴人也蓋因嗜欲恣情酒色無度或食煎􅏼之肉大腸受熱毒之深故有斯疾或痔如鼠嬭連珠翻花雞冠之狀其形不一或在大腸頭上糞門左右腫痛流膿出血發作不時面色痿黃飲食減少或有糞後更血紅黑又有長系縷之血起卧艱難並宜服之黃連一斤酒蒸浸去酒晒乾枳殼半斤去穰炒乾葛四兩葛花四兩如無以干葛代之槐花四兩木香三兩右為末留浸黃連酒作麵糊丸如桐子大每服五十七十丸飯水下酒亦可不拘時日進三服奧樗皮散出聖惠方治痔漏下血不止及膿奧樗皮一兩微炒銼醋石榴皮一兩地榆一兩銼黃連一兩去鬚艾葉三分微炒阿膠一兩搗碎炒令黃色右搗羅為散每服食前粥飲下二錢蝟皮丸出聖惠方治痔漏膿血不止發歇疼痛蝟皮一兩燒灰白礬半兩燒令汁盡皂莢刺一兩燒灰硫黃半兩細研附子半兩炮製去皮榼藤子一箇去殼右為末醋煮麵糊丸桐子大每服食前溫粥飲下二十丸大􅒝薢丸出聖惠方治一切痔漏不論深淺必驗方黃耆二兩銼枳實一兩五錢麩炒微黃萆薢三兩銼白蒺黎三兩微炒去刺兔絲子一兩酒浸三日曝乾炒搗末烏蛇三兩酒浸去皮骨微炒右搗為末煉蜜和丸桐子大每服空心及晚食前溫粥飲下十五丸神驗散出神效方治腸風痔漏及五種腸風下血糞前有血名外痔糞後有血名內痔大腸名脫肛榖道四邉有弩肉如乳頭名鼠妳痔有穴腸出血名漏並皆治之牛頭角腮一隻酌中者豬牙皂角七匹穿山甲四十九片或圓取或四方取或一字去蝟皮一兩蛇蛻皮一條右捶碎盛在小口磁器內鹽泥固定日中晒乾瓶口微露出煙用文武火燒紅赤煙為少取出放冷為細末如服藥日先一日臨卧細嚼胡桃仁半箇如糊用溫醇糯酒一盞送下不語便睡先引出蟲至次日交五更服藥驗病年月逺近或稱三錢五七錢用水半大盞醇糯酒半大盞相合令熟煎藥服之至辰時更服一服再依前服藥不須用胡桃仁久病不過七服忌油膩魚鱉雉兔豬犬等物鶴虱丸治痔漏膿血不止十年不瘥亦殺蟲鶴虱炒雷丸白礬灰各一兩皂莢刺硫黃研等分各半兩右研為末醋煮為丸如桐子大雄黃為衣每服二十丸麝香溫酒下空心服之如聖餅治痔漏膿血不止臟毒下血寒食麵鉛丹研白礬燒令汁盡研輕粉研硫黃研各等分右研勻用倒流水和作餅如錢大每服發時以慢火炙黃熟一餅分四服用溫熱水嚼下日日午時夜服麝香散治痔漏麝香三錢槐花半生半炒荆芥穗各一錢千針草去皮根半兩硼砂研三錢右研為散每服二錢溫酒調下臨卧時服牽牛丸治腸風痔漏黑牽牛生熟各半豬牙皂角去皮何首烏香附子草烏頭切破冷水浸秋冬七日夏三日等分亭勻右為末醋打麵糊為丸如桐子大令患人勿食晚飯次日五更飽食燒熟豬肉一頓少時酒送下五七丸藥行息時用冷水飯頻頻壓之大忌熱物後用熟熱烏頭於瘡上時時換炙之麝香丸出聖惠方治痔漏瘡腫疼痛膿血不止麝香半兩研細蝸牛子二兩炒黃竈突黑二兩道人頭二兩漢椒二兩去目及閉口者微炒右為末煉蜜丸梧桐子大每服三十丸食前粥飲下黃礬丸出聖惠方治痔漏腫痛膿血不止黃礬三兩烏蛇六兩酒浸去骨皮炙令黃黃耆三兩銼枳殼二兩麩炒微黃去穰駱駝胸前毛三兩半燒灰右為末煉蜜和丸梧桐子大每服二十丸煎黃耆湯食前下熊膽散出御藥院方治痔漏瘡口不合膿汁清稀腫硬不消熊膽一錢雄黃輕粉各半錢麝香一字右件研為細末乾糝藥瘡口上治逺年近日痔漏不瘥木香丁香黑牛末白牛末各一錢右為末用雉子二箇打開取黃與前藥一處調勻再用雉子殼盛藥在內紙封口同煮熱分作四服空心溫酒下治痔漏附子一箇腦子麝香沒藥各一錢右為末取薄荷自然汁丸梧桐子大每服一丸用蛙口涎沫調開點痔一二丸可治五人枳殼散治腸風痔漏枳殼木鱉子防風􅒝薢各二錢右為末每用藥半兩水三升煎至三五沸蕩三五次效異功散治腸風痔漏便血登厠糞前血為外痔糞後血為內痔大腸不收名脫肛有弩肉為鼠妳痔頭有孔名漏方見本門諸痔漏治痔漏此因大腸感風熱而生出本事方生砒一字木銀一粒如米大真麝一粒如小豆大膩粉一字右件並乳入鉢內研令極細如痔或有珠子者將白礬蕩洗淨拭乾用手撚藥揩在痔內上揩得癢時便是藥行一日二次又洗去五日後住藥見效如或有孔即用紙撚引藥送入令徹其內更用紙貼孔前一日兩次使藥自然生合治腸痔漏出本事方大黃當歸川者苦參牙皂去皮右等分末醋糊丸梧桐子大每服二十丸空心溫酒下當歸湯一名清涼飲出直指方治痔漏消腫疼當歸切焙大黃煨銼赤芍藥甘草右為粗末每服二錢七分水一盞煎八分去滓稍熱服微利一行為效一方用乳香一錢碙砂五分訶梨勒皮半兩同研為末以大棗二枚去核加藥末二錢七分棗肉紙裹煨熟分作四服茶清嚼下與前藥相間服亦得榼藤散出聖濟總録治諸痔漏膿血不絶羸瘦榼藤三箇生油塗炙熱取肉續斷雞冠花炒烏賊魚骨去甲炙各一兩右為末每服二錢七分空心溫酒調下日晚再服丹粉散出聖濟總録治痔漏有瘡成竅膿血不止鉛丹鹽豉各一兩膩粉半兩大蒜一顆去皮切右先搗蒜令爛後入餘藥搗作薄餅焙乾為細末少許貼之日三五次痔瘡漏豬牙皂角七箇燒灰胡桃肉七箇燒灰樺皮七塊燒灰瓜蔞一箇燒灰存性右為細末好酒調服空心分二服喫痔瘡未破者乳香一錢硼砂一錢雄黃一錢信一錢右為細末用豬膽調塗硼砂丸出聖惠方治痔漏下血不止肌體黃瘦四肢無力硼砂一兩黃丹一兩砒霜半兩硃砂一兩右都細研入瓷盆子內歇口小火燒令煙出為度停冷又細研用火燒七遍了入麝香一分同研令細麵糊和丸梧桐子大每于食前枳殼湯下五丸忌熱物麝香散出御藥院方治下部脫血或瘡痔漏久不差麝香血蝎各半兩蝟皮一兩右先研蝟皮血蝎為末次入麝香拌勻每服半錢溫酒一盞調勻食前日二服枳殼散出御藥院方治腸風痔漏便血無數疼痛不可忍者枳殼麩炒去穰槐子微炒黃色荆芥穗各半兩右為末每服三錢粟米粥調下如人行一二里地再用粥壓之空心日進三二服治脫肛痔漏出神效方胡荽一升乳香少許粟粳半升或一升右先泥成爐子留一小眼可扺肛門大小不令透煙火熏治痔漏下血不止出神效方紫皮蒜十箇獨科者炒大椒六十顆豆䜴四兩右搗爛為泥丸彈子大空心細嚼一丸鹽湯下日三服薰泄藥出神效方風眼草赤皮蔥椒各等分右同漿水滚過坐盆令熱氣熏痔但通手泄之如法不過三次愈治痔漏乳痔出經驗良方側柏葉二兩乳香二錢枳殼去白一兩右為末二錢空心飯飲調下洗藥出經驗良方治痔漏下血荆芥枳殼各等分馬鞭草多使右焙乾為粗末煎湯熏洗治腸風痔漏京三稜用黑豆炒切作片子馬兜苓榖精草各等分右為散水同煎熏洗效枳殼丸治腸風痔漏久不差者先穗子三兩皂角一兩去皮酥炙黃枳殼二兩去穰生右為末煉蜜丸梧桐子大空心五十丸二聖散治腸風痔漏不問有吃嗒破不破者治之枳殼二兩用麩去炒過去穰用黃耆二兩破故紙二兩微炒右一處為細末空心好酒調下三大錢如不飲米湯調下忌食燒肉熱麵雞鮓牛馬肉蔥蒜韭并動風之物一月治腸風痔漏出本事方赤芍藥官桂去皮甘草炙各等分右㕮咀每服二錢生薑二片白糖一塊水一盞煎七分去滓空心服之丹砂塗方治諸痔漏疽瘡丹砂麝香蛇蛻燒灰各一錢右研令細以鹽湯洗瘡拭乾後塗傳日三二度療痔漏疽瘡光明砂别研麝香當門子别研蛇皮五月五日煮炙右等分研先以鹽湯洗拭乾瘡少蜜以散傳上瘥治痔瘡荆芥木鱉子朴硝各等分右煎湯入於瓶內熏後湯溫洗之立效治痔漏涓涓出膿血疼痛日夜不止漸加羸瘦宜服出聖惠方磁石二兩白礬二兩緑礬四兩右搗細末入瓦瓶子內盛大火燒令通赤候冷將出紙襯攤於地上經宿細研如粉煮棗瓤和丸菉豆大每服食前粥飲下二十丸木賊丸出聖惠方治痔漏痛不可忍者木賊一兩榼藤子仁二枚塗酥炙黃烏賊魚骨二兩右搗羅為末煉蜜和丸梧桐子大每服不拘時候溫粥飲二十丸下治痔漏久不瘥宜服此方出聖惠方蛇床子半兩末荆芥半兩末蝸牛三七枚右一處研爛塗在紙上每發時先用白礬熱水洗痔頭了後用被褥上安藥紙上坐兩次瘥露蜂房散出聖惠方治痔漏膿血不止露蜂房半兩炙黃蝟皮半兩炙令焦黃麝香一錢右細研令勻每日三五度半錢傳之管仲散出御藥院方治腸風痔漏管仲紅藤各四兩上等好者右為粗末分作四分服用綿紙包作四裹每服一包上好酒一升煎至五服用小口器溫服藥滓收著候四服藥滓一處用水碗半至五服用小口器盒盛放被兒內熏著瘡門就熱通手洗如蟲子死後便瘥不痛治痔漏出儒門事親書白牽牛頭末四兩沒藥一兩右細末如欲服藥先一日不食晚飯明日空心獖豬精肉四兩燒令香熱薄批散藥在內裹之漸漸細嚼食盡然後宿蒸餅壓之眇下膿血為效量病大小虛實加減服之忌油膩濕麵酒色三日外不忌一服見效或用淡水煮肉熟用上法亦可又用服前一日不食午飯并夜飯明日空心用之淨固丸出儒門事親書治痔漏下血癢痛槐花炒枳殼去穰各一兩右為末醋糊丸梧桐子大每服二十丸米飲下空心十服見效槐荆丸出儒門事親書治痔漏槐花荆芥右等分為末每服一兩水煎空心下蒲黃散出儒門寶鑑治下部痔漏蒲黃一兩血蝎五錢右為細末每用少許貼於患處治痔漏瘡方出本事方雞子一枚煮熱去黃取白切焙白礬明為如皂角子大匙上枯缺用三分右為末用溫湯淨洗拭乾用紙撚占藥入瘡孔內立效一日二易治男子婦人諸般痔漏出本事方黃牛角狼毒各等分右為細末翻花漏每服一錢甘草湯下合官漏薑湯下五分腸風米飲一錢酸醋調一錢滴珠漏山梔子三箇煎湯下蜀椒榼藤丸治痔漏不限年月深淺重痛穿血膿血不止蜀椒去目并閉口炒出汗木杵輕搗取紅四兩榼藤子大者一箇劈破炙右為末棗肉丸梧桐子大每服十五丸至二十丸空心溫酒下麝香散出聖惠方治諸漏痔有頭因穿破後成漏膿水經年不乾麝香研半兩鴿糞一升右將鴿糞於淨地上火煆煙盡候冷與麝同研為散每服二錢七分空心米飲下晚再服一方銷黑錫二兩和揑作餅子當於瘡上貼之神效鯪鯉甲散出聖濟總録治諸痔漏有瘡膿出楚痛鯪鯉甲炙焦五兩麝香研一分右為散每服二錢空心煎黃耆湯下日晚再服一方飯湯下熏漏瘡蒼耳枳殼各等分右件藥搗粗末水一碗裝磁瓶內煮汁濃坐在上熏妙治痔漏下膿血不止出聖惠方木賊一兩蝟皮一兩炙塗焦黃右搗為散每於食前粥飲下一錢又方出聖惠方逺志一兩棕櫚二兩燒灰右搗為散每於食前粥飲下一錢治痔漏膿血有瘡竅疼痛宜服此方出聖惠方砒霜半分研如粉黃蠟半分右銚子先鎔蠟作汁後下砒霜攪和勻看瘡大小撚為條子下部每發時用綿裹內瘡竅子中良久却取或未有竅子即內大孔中良久取出日三兩度用即效砒黃傅方治下部漏瘡砒黃研蛔蟲隂乾為末各各半兩右研令勻傅瘡口中以帛裹定日二次治痔漏出神效方用黑白牽牛一合炒黃為末豬肉四兩切碎炒熟與末藥攪勻作一服用新白米飲二三匙壓之取下白蟲為效又坐藥出聖效方用鯉魚鯪二三甲以薄綿繭裹如棗核樣內之痛即止治痔漏青蔥散出危氏方右用蔥青內刮涎對停入蜜調勻先木鱉子煎湯熏洗然後傅藥其冷如水唐仲舉云嘗有一吏人苦此渠族弟親合與之早飯前傳午後以榜子來謝拜於廷下云疾已安矣又方出經驗良方右用死鱉頭燒灰研末塗腸頭上便能縮入又方出危氏方治痔瘡肛門周匝有孔十數諸藥不效右用狗肉蘸藍汁空心食如不食狗肉騾肉蘸汁亦可七日自安治痔漏有蟲出肘後方右用􅒝薢細銼貫衆去土等分為末湯酒下二錢食前溫服一方治有蟲下血右用大棗肉一箇去皮用水銀少許以唾研開和棗肉令蒸熱納下部治腸風痔漏右用訶子不拘多少和皮於灰火內炮黃色為末先用槐枝煎湯洗瘡將藥末貼次日再用鳳眼草煎湯洗貼藥次用地蓬毛貼令病人自用津唾調搽如瘡有青水出速治如膿出難醫仍用紙撚入瘡內用藥仍服勻腸丸治痔漏右用取向東生芭焦根擂爛炒熟鋪於軟凳上候令坐又易不過三上其疾立除莫犯鐵器一方取汁熱酒浸空心服又方右用衮麻不拘多少將甑兒盛水於火上煎百沸將衮麻於甑內水中蘸過如法熱將衮麻於瘡上如法緊坐衮麻熱最好如此數次即愈瘡破者好治治痔漏右用茄花為末香油調傳或燒灰亦好用又方用肥皂去子劈開安蜜於內火炙內令蜜乾如此三次研為末空心酒四十日愈痔除漏孔自滿痔漏方初覺糞門腫痛者右以舊繡刀磨水洗之又方右用槿花半開者一把手採煎湯熏之治五般惡痔漏瘡右用黑虎膏丸如棗核樣隨大小入穴再用膏藥貼上仍用甘草漏蘆煎湯下治腸風痔漏出本事方右用鯽魚一尾破開盡去腸入白礬令滿瓦上燒過並為細末用雞毛捲藥傅治立效一方敗棕皮包紙裹煨香熱去紙尉斗內燒帶生存性為末每服一錢空心米飲下一方瓦上燒為灰軟飯丸桐子大每服二十丸粥飲下河水方出本事方治痔漏下血不止反收痔右用城市河中水一桶脫衣坐水中頻洗血即止痔亦可不過三五次立效治腸風痔漏出本事方右用雞冠花不拘多少濃煎湯洗每服一盞空心下井水亦得久患者皆瘥并與數人用皆然神效可驚不類他藥治諸瘡中毒痔漏等骨蒸彌良右用羊屎熏瘡治瘡疥痔下血者右用水蘇煮汁服之治癰疽痔漏瘡及小兒丹方右用水煮棘根汁洗之治痔漏瘡右用馬兜鈴於瓶中燒熏病處入藥炙用啄酒散出聖惠方治痔漏有頭出膿水不止右用啄木鳥一隻燒灰酒下二錢七分膽治瘡蟲立死治五痔漏瘡殺蟲方出肘後方用鰻鱺魚一頭治如食法切作片炙著椒鹽醬調和食之治大腸痔漏并脫肛出肘後方右用虎脛骨兩節蜜二兩炙令黑搗末蒸餅丸如桐子大每服清晨溫酒下二十丸隔夜先和大服後方服此藥狸骨痔及漏右用狸骨炙和麝香雄黃為丸服之糞燒灰治鬼瘧如聖膏治痔漏有頭或如鼠乳右用芫花根不計多少洗淨隂乾木臼內搗水少許絞取汁於銀石器內慢火燒成膏將絲綿就膏內度過以綿繫痔頭初時微痛心躁後落以紙撚子膏藥於竅內永除根本未落不得使水潤腸丸李方御傳科治痔丸方朝貴用之屢效蓋其用藥簡要有次苐製造有法無苦楚而收效甚速凡痔出外或審若蓮花復便血疼痛不可坐卧甚者用下藥早上藥一次午一次晚一次至夜看痔頭出黃水恙如泉當夜不可再上藥一二日為好若年髙人應外腎牽引疼痛可以人用火烘熱手於大小便間尉之其痛自安黃水未盡可再傳一日藥仍須勤晚外科人早晚有照黃水流至盡是病根已去也大黃枳殼當歸各等分右為末蜜丸梧桐子大每服三十丸白湯或蜜湯下老弱人宜麻仁丸或三黃丸痔漏傅雙金散雙金散黃連鬱金各等分龍骨散龍骨煆白芷黃丹寒水石煆各等分右為末摻瘡口上小便赤色服導赤散導赤散生地黃木通甘草各等分右為末每服三錢白湯下將好服內補散方見在前痔漏有頭疼痛下血不止出聖惠方右用桃根煮汁日二三上洗之炙漏法出千金方用葶藶子二合豉一升和搗熟作餅子如大錢厚二分許取一枚當瘡孔上作艾炷如小指大炙餅上三炷一易餅三丸炷隔三日復一炙之外臺炙瘰􅊓古今緣劎云不炙頭瘡葶藶氣入腦殺人又炙漏法出千金方右用搗生商陸根捻作餅子如錢厚三分安漏上以艾炙餅上乾易之灸三四次一升艾瘥外臺炙瘰􅊓又七月七日未出取麻花五月五日取艾等分搗作注用炙瘡上百壯血蝎散出楊氏家藏方治痔漏疼痛不可忍者血蝎須真好者右件為細末用唾津調塗頻用為妙玉屑散治腸風痔漏右用葫蘆殼燒灰出火氣研極細清晨飲湯調下治腸風痔漏右用沙糖打却將樣子蘸糖惹荆芥細末空心服之側金散出楊氏家藏方治痔漏竅下血疼痛乾黃蜀葵花黃蘗去粗皮蜜炙黃丹飛過韶粉以上四味各半兩麝香一錢别研右件前二味搗羅為末同後三味研勻每用如患處乾貼之降真散出楊氏家藏方治痔漏有竅子者銅録别研白礬别研蜜陀僧别研降真香楮葉各等分右件為細末每用少許以紙絍蘸藥撚入痔漏竅中三黃散出楊氏家藏方治痔瘡黃丹二兩火飛黃蘗皮去粗皮黃連去鬚二味各四兩白礬一兩枯右件為細末津唾調下交藤丸出楊氏家藏方血蝎半兩别研馬蘭根一斤川烏頭炮去皮研人參去蘆頭黃丹二兩何首烏四兩甘草二兩炙右件為細末醋煮麵糊為丸如梧桐子大每服三十丸鹽湯或酒送下空心食前後服藥了用茵蔯湯洗之如瘡乾無膿血後用三黃散貼黑神散出楊氏家藏方治痔瘡硫黃蜜陀僧碎右件同炒令煙絶細研為末用少許摻之日兩次用二香散出楊氏家藏方治逺年冷漏香鼠一枚令炙焦麝香少許同研右為細末和勻每用少許乾摻瘡口先以溫湯洗之過拭乾次用上件藥摻如瘡口深膿出藥下能入血者用紙撚蘸藥絍在瘡內自然膿出少從裏生肉面外有腳底被簽破及百日瘡不合口貼此藥遂瘥鯽魚散出楊氏家藏方治痔瘡鯽魚七枚長二寸者苜蓿三錢七分右件將鯽魚取去腸肚淨洗了用苜蓿子均入在七枚魚肚內以線繫了文武火上慢慢炙令通裏黃并骨焦研細每服一錢溫酒調下空心千金散出楊氏家藏方右用鼠狼一枚自死者不拘大小置砂瓶內篛葉包定瓶口次用鹽泥固濟用硬炭一十斤簇瓶火煆通紅七分盡取出藥瓶在地上出火毒一宿研為細末每服二錢入麝香少許熱酒調下食空服如藥十日之後用刺蝟皮一枚燒作灰細末入麝香少許每服一錢溫酒調下食前千金散服立驗膏出楊氏家藏方治痔漏止發忽腸頭不止血者貼之永除其根右方用活黃鱔魚一條利刀斷其首瀝熱血於掌中急以大活蜘蛛一枚以手指只就掌中研蜘蛛爛為度去蜘蛛皮刮於磁瓦器內收於發時塗傅不過三二次瘥狐骨散出楊氏家藏方治痔漏狐骨皂角不蛀者右件各等分㕮咀每服一兩如香燒熏二白散出余居士選奇方治痔漏膿汁逗流疼不止寒水石火燒赤放令冷白滑石細研右件各等分同研勻用新綿搵藥撲瘡頭頻用柢聖湯出家藏經驗方治痔漏方右用躑躅花十文俗號蜘蛛花煎湯候一兩滚熱入朴硝十文在滚的腳桶內其上用板一片蓋令密當中穿一穴坐在熏之旋將五文荆芥細研入臘茶二錢點飲盡之候湯冷即起昔曽有夫婦俱病因得此方知其效也玉粉散治痔漏右用牡蠣燒煆入地坑出火氣為末濕即乾摻如乾即以津調傳紹興桂真官用此療友人劉葉效秦芁白术丸治痔疾并痔漏有膿血大便燥硬而作疼痛不可忍者秦芁一兩去蘆當歸五錢酒製桃仁一兩湯浸去皮炙令黃地榆三錢枳殼麩炒半兩皂角仁一兩燒存性去皮澤㵼半兩白术半兩右同為細末和桃仁泥子研勻煎熟湯白麵糊為丸如雞豆仁大令藥光滑焙乾每服二丸白湯送下空心宿食消盡服之待少時以美膳壓忌生冷硬物冷水菜之類并濕麵酒及五辣辛熱大料等諸物犯之則藥無驗矣數服而愈痔漏之病乃風熱燥濕也以秦芁當歸尾辛溫和血涼燥踈風止痛桃仁潤血以皂角仁除風燥以地榆破血為下使以枳殼之苦寒補腎以下泄胃濕以澤㵼之淡滲使風歸於前隂以補清燥受冒之濕邪也白术之苦甘以苦補燥氣不足其甘未泄火而益元氣也故曰乾寒㵼火乃假枳殼之寒也故人為藥為下焦瀆又曰在下者引而蝎之多為大便必澀以大黃雄去之其津血亦不足以當歸和血及油潤之劑則大便自然軟利也宜作銼湯以與之是下焦有病急治之法也以地榆惡人而槐角故宿食消盡空心作丸服之秦芁防風湯治痔漏每日大便時發疼痛如無疼痛非痔漏也此藥治之秦芁防風當歸身白术以上各一錢五分黃蘗五分橘皮三錢甘草炙六分紅花少許桃仁三十箇大黃煨三分升麻二分柴葫二分澤㵼六分右件銼如麻豆大都作一服水三大盞煎至一盞去滓燒熱空心服之避風寒忌房事勿食酒麵辛熱物及當風寒處大便當歸郁李仁湯治痔漏大便硬弩肉大便下垂多血苦痛不能忍皂角仁前另為細末煎成調服郁李仁一錢麻子仁一錢五分秦芁一錢五分蒼术半錢當歸尾五分澤㵼三分大黃煨三分生地黃五分枳實七分右件㕮咀水三大盞煎至一盞去滓空心宿食消盡服之忌風寒處大小便秦芁羌活湯治痔漏成塊下垂乞疼不任其癢升麻五分柴胡五分黃耆一錢炙甘草五分防風七分藁本三分細辛少許紅花少許羌活一錢二分秦芁一錢麻半分右件銼如麻豆大都作一服水二盞煎至一盞空心服之忌禁如前秦芁當歸湯治痔漏大便結燥疼痛秦芁一錢當歸尾五分桃仁二十箇紅花少許枳實一錢大黃煨四錢澤㵼五分白术五分皂角仁五分右件銼如麻豆大都作一服水三盞煎至一盞去滓稍熱服食前小烏玉丹治痔漏瘡乳香五錢研麝香二錢研芝麻一兩生用苦楝根一兩去皮生用槐角子一兩五錢生用雷丸一兩生銼碎亂油頭髮三兩剪碎燒存性黃牛角腮三兩生用生豬前甲四十九箇蔞內燒灰存性南星一兩生用穿山甲四兩鹽固濟煆存性白礬一兩飛過半夏一兩生用枳殼一兩燒右件各依法過度為細末用好酒醋糊為丸如梧桐子大每服二十丸空心用米飲吞下日進二服如彔豆大亦得可服三十丸雞鵝肉新薑豆腐淹藏毒物枳殼散熏洗痔漏枳殼二兩貫衆二兩荆芥一兩大白皮一兩黃連五錢蛇床子五錢蒼耳根一把乾薑五錢炮柏枝一把薤頭一把黑豆一升無名異五錢青葉一把地骨皮五錢右件為粗末每服一大合用水三大碗煎至一碗先熏後溫洗日二三次五倍散敷貼痔漏瘡海螵蛸二錢五分五倍子三錢瓦上焙乾乳香一錢五分蕪荑五錢豆粉一錢炒黑色白鱔頭一對燒存性龍骨一分麝香半右為細末先用煎藥洗候乾如破有水乾摻如無水用津唾調塗瘡烏蛇丸治腸風五種痔漏方見本門諸痔類貫衆散治痔漏貫衆三箇大者一箇搗碎􅒝薢二兩白芷二兩好者右搗羅為細末每服二錢用胡桃酒調下陳米飲亦得空心午前服十年患者服之立效五聖丸治腸風痔漏子母痔內痔返花痔肥皂角三挺慢火燒存性一分去子青橘皮五錢去穰炒白礬五錢枯乾薄荷五錢乳香一分雷丸右一處搗羅為末麵糊為丸如彔豆大每服五七十丸用薄荷茶送下日進三服忌毒物平肌散治痔瘡久不合者黃狗骨頭燒灰亂髮燒灰穿山甲燒灰以上三味各等分右件同研令勻如瘡已乾自用津唾調塗如濕即乾傳日三四次兆亭散治腸風痔漏積年膿不乾白礬别研乳香别研黃連去鬚以上三味各一兩取末右件用大鯽魚一枚去腸并鱗入藥末在內濕紙裹麻皮纒鹽泥固濟文武火煨熟去泥紙却用慢火炙焦同為細末每服二錢空心粟米飲調下皂角子散治腸風痔漏下血經久不瘥者皂角一百枚燒留性研末榼藤子一枚全者去殼研不可搗右件為細末每服二錢七分熱酒下如人行一二十五里再飲熱酒一盞投之天聖年間知濠州馬忠肅家有媪病漏瘡已十年一日老兵掃廷下且言前數日過市有醫自逺來諸漏瘡可治頃刻之力媪曰吾更醫多矣不信也其黨有以白忠肅公者即為召醫視之可治無難需活鱔竹針五六與之醫乃擲鱔因屈槃以竹針貫之覆瘡良久取視有白蟲數十針著鱔醫即令置杯水中蠕動如線復覆之又得十餘如是五五醫者曰蟲固盡矣然其餘皆小蟲竟請以常用藥傳之時家有檳榔黃連散傳之明日以乾艾湯投白礬二三錢洗瘡然後傳藥蓋老人血氣冷必假艾葉以作陽而艾性亦能殺蟲也如是者再即生肌不一月即愈既而如其言醫曰瘡一月不治即有蟲蟲能蠕動氣血亦隨之病漏不可遂合合則結痛實蟲所為也醫無名於世而治疾有效亦良醫也醫説抵金膏治諸般痔漏久不愈者花蘂石火煆過醋淬研碎生硫黃細研黃丹細研牡蠣火煆過研如粉蚌粉細研以上五味各二兩自然銅一兩火煆醋淬研碎已上六味同研勻用清油三十二兩入銅鍋內用炭火熬去油十兩次入後藥草烏頭四兩連皮尖生用骨碎補去毛漢防己龍骨烏藥虎骨如無用敗皂五味各二兩已上六味並為細末入前油鍋內熬成稠膏次入後藥乳香沒藥血蝎白膠香安息香已上五味各二兩並為細末右件同入前鍋內急一枝子攪勻少時取出以合子盛之不得蓋收三日後火力定每服一小匙溫酒下不計時候茶蒻散治諸般痔漏下血疼痛黃牛角腮二兩蛇蛻豬牙皂銼刺蝟皮銼棕櫚皮銼牛鼠狼皮茶蒻葉剪碎已上六味各五錢穿山甲七十片管衆一兩乳髮一分右件拌勻入磁罐內以鹽泥固濟了晒乾用炭火煆通紅為度候冷取出研細末每服二錢先嚼胡桃肉半枚次以溫酒調藥同下臨卧至五更初又服一服至辰時又服一服如此服三日永除根本烏金散治一切痔漏瘡烏金子枳殼葳靈仙去土五倍子紫河車用煨者黃牛角腮已上六味各一兩同為細末皂角子豬蹄甲用豬蹄向後小瓜不著地者甲右件入磁罐子內以瓦蓋定用雄白雞糞及黃土對停入鹽少許和作泥固濟罐子用木炭七斤煆火盡為度碾為末每服二錢入鹽少許空心溫酒調下地骨皮散治諸風痔漏下血不止地骨皮鳳眼根皮並用懸崖中好者去土不用右二味各等分同炒微黃色搗為細末每服三錢空心溫酒調服忌油膩食物萬靈丸治五種痔漏丸榖道生瘤似鼠妳時時發動或出血者名曰酒痔又曰冷痔若生核子者曰腸風痔發時熱大便難下脫肛良久不入名曰及痔大便或出清血名曰血痔此冷熱摶結得之硫黃二錢别研白礬二錢豬牙皂角五錢炙附子一兩炮去皮臍皂角刺一兩燒存性刺蝟皮一兩燒存性榼藤子一枚生廣中丸者色如肥皂子右件為細末煮稀麵糊為丸如梧桐子大每服二十丸空心溫酒送下如痔已有頭者用硃砂少許同藥一二五丸一處研細塗於頭上旬日自落又用米醋調藥三五丸傳瘡上即愈如瘡在裏面即將米醋和糟拌藥三兩丸燒熏之萬金丸治一切痔漏久不瘥者木賊何首烏荆芥穗防風去蘆頭雞冠花焙枳殼去穰麩炒五倍子黃耆銼焙槐花槐角已上十味各一兩同為末皂角子豬蹄甲用豬蹄向後小爪不著地甲皂角刺麝香皮子榼藤子百藥煎刺蝟皮以上七味各一兩入磁罐內鹽泥固濟了候乾用炭火煆至青煙出與前藥末同研細次入麝香二錢右件為末酒煮麵糊為丸如梧桐子大每服五十丸食前米飲下病久者當常服即去根本艾葉散熏漏瘡鶴虱艾葉榼藤子白膠香右件各等分銼為散瓦瓶內燒煙熏患處治痔漏右以海豚魚皮肪中摩瘡此魚生大海中治痔漏瘻及蚛虷右取鱧魚腸以五味炙貼患處良久蟲出即去之一方炙香綿裹內榖道中一食頃當蟲出魚腸數易之盡三枚瘥鱧魚即蠡魚治痔瘻出本草右用桐皮水煎服之治痔漏出本草單用醋林子搗為末酒調一錢七分服之甚效治痔瘻出本草右以蜣蜋搗為丸塞下部引痔蟲出盡永瘥以赤其糞洗之治痔瘻并㵼血出本草右以瞿麥作湯粥食並得膽礬散出楊氏家藏方治附漏瘡焮腫疼痛侵潰膿水不絶久不生肌膽礬一兩煆白色龍骨五錢白色者黃丹二兩大飛蛇蛻一條全者燒灰别研麝香五分别研右件除蛇蛻麝香末外四味研為細末同蛇蛻麝香和勻先用蔥椒湯洗淨揾乾次用藥少許乾摻瘡口如瘡口小用紙撚子點藥絍入瘡口內日三次用治五痔漏瘡犍牛兒膽一箇蝟膽一箇膩粉四錢麝香少許右四味先將蝟膽汁調膩粉麝香和勻入牛膽內懸於簷前四十九日熟旋取為丸如麻子大送於瘡口後追出惡物是驗瘡口漸合生麵蓋瘡內一遍出惡物效治痔漏腸風方右用雲臺子四兩為末用好酒麵糊丸梧桐子大每服三十丸至五十丸溫酒送下日進一服治痔漏有頭疼痛下膿血右用吐出胭蟲二枚炙乾搗羅為末貼漏頭上當斷膿血貼五七度瘥又方用硫黃末少許內瘡孔中以艾熏之瘥治痔漏疳蝕惡瘡右用端午日取蟾酥以硃砂麝香為丸如麻子大內孔中治血漏瘡出本草右用雄黃末如大豆許內瘡中又服五錢七分血皆止痔漏疼痛不可忍附論夫痔漏蓋緣寒濕與夫房室醉飽間得之其作也肛邉腫癢甚則疼痛不可忍或蔓生數處或似螺霓膿血與肛汁綿綿而有孔不合故謂之痔漏昔人論燒蟲居胴腸間多則為痔方論有用熏法及化蟲之藥者不可不察方萬金丸出聖濟總録治腸風疾逺年不瘥疼痛不可忍者安息香乳香丁香木香沉香銼沒食子肉豆寇當歸麒麟竭沒藥蜜陀僧阿魏各五錢巴豆去皮心膜醋炙砒霜入菉豆五錢同研各三分右件將乳香安息香阿魏麒麟竭沒藥等細銼水少許浸一宿來日細研如膏餘藥搗羅為末如膏同研丸如黃米大每服一丸空心冷茶咽之北金丸出聖濟總録治痔疾疼痛不可忍及下血榼藤子附子炮製皮臍硫黃研白礬燒令汁盡螺皮炙黃枳殼去穰麩炒豬牙皂角醋炙各五錢右為末酒煮麵糊丸梧桐子大每服十丸米飲或酒下不拘時候服淋泄散出聖濟總録治痔漏痛不可忍黃芩去黑心木通銼梔子仁甘草炙銼太隂玄精石扁蓄朴硝右搗篩每用七錢七分水三碗煎沸傾盆內先坐熏之內候通手節淋泄上即止熏時令密覆勿泄藥氣能消丸出聖濟總録治痔漏疼痛如錐刀刺不可忍葳靈仙去苗土四兩一名能消卷柏去根防風去義蝟皮燒灰存性阿膠炙炒各五錢糯米炒一合右為末煉蜜丸如梧桐子大每服十丸加二十丸人參湯下日三服不拘時括蔞散出聖濟總録治痔漏疼痛行履不得大括蔞一枚開口豬牙皂角白礬各五錢鯉魚皮敞􅀢皮去穰􅀈刺蝟針各一分右除括蔞外為粗末入在括蔞內用鹽泥固濟候乾用炭五斤煆令通赤放冷取出搗羅為末每服二錢七分研胡桃酒調下荆蘭湯治五痔痛不可忍荆芥穗貫衆甘草蜀椒去目澤泄芍藥各二兩右搗篩每服用三匙水三碗煎沸傾盆內先坐熏之復令密勿泄出藥氣即淋泄試蟲散治五痔痛甚臭椿根地骨皮右用精豬肉一大片糝藥三錢七分在肉上就肉坐一二時起看有蟲即去看無即已熏洗方出聖濟總録治諸痔有頭疼痛不可忍地松一斤蝟皮二兩蔥根一握韭根一根右銼細以水五升盆內盛先坐乘熱熏通手即淋洗日三次用荆芥湯出聖濟總録治五痔疼痛連隂濕癢荆芥穗奧橘厚朴去粗皮各五錢右搗篩每用二兩水五升煎三升避風處淋洗血蝎散出危氏方治痔漏疼痛不可忍血蝎牡蠣灰髮灰各等分右細末入麝香少許自以津唾調傳如更痛研杏仁膏調藥傳之祛痛散治痔疾疼痛不可忍及腸風下血皂角子下住者一千枚麩二升同炒麩焦黑色去麩薄荷乾三兩銼右為散每服二錢米飲調下空心服枳殼散出聖濟總録治諸痔有頭疼痛不可忍枳殼四兩訶梨勒皮二兩右粗搗篩同炒令熱以綿裹熱尉之冷即再炒煙熏方出聖濟總録白鱔魚骨熟艾各等分右銼碎和勻用新盆子一箇盛藥在內以火燒藥候煙出盆上熏之煙盡即愈白礬散一名礬香膏治痔漏出膿血不止不可忍者方見本門牡毒類止痛膏出聖惠方治腸風痔瘻有頭下膿血疼痛不可忍莨菪子一合牛皮膠一兩右先用莨菪子後用膠清調成膏攤紙上貼之有頭者自消葳靈仙丸出聖濟總録治腸風痔漏肛邉乳鼠疼痛不可忍者葳靈仙淨洗焙乾二兩木香一兩右為末煉蜜丸梧桐子大每服二十丸加至三十丸不拘時煎荆芥湯下服藥後忌茶半日恐冷即復痛男子婦人皆服治大腸痔瘻脫肛疼痛出聖濟總録右用虎腳指二節以蜜二兩炙令搗羅為末米飲丸如梧桐子大每服空心溫酒下二十丸北金散出傳信適用方治久新痔痛如神先用獨行虎散洗後用北金散傅貼右用海螵硝去粗皮不拘多少為細末每用二三錢生麻油成膏以鵝翎拂上日夜用之久瘡自消是藥極好不須服藥獨能見效治痔瘡疼不可忍宜用治之出德生堂方菉豆粉一斤蝸牛一百五十箇二味一處炒鍋內文武火炒黃去蝸牛攤在地上出火毒後加沒藥乳香輕粉三錢菉豆一兩右與沒藥等一味各三錢同研細末每用少許涼水敷貼瘡上即住疼痛治痔疾肛門邉腫􅀈癢痛不可忍救急尉之白礬三分碾右以童子熱小便二盞化白礬以洗痔上二日立效普濟方卷二百九十七
