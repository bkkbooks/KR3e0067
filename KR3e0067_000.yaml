body:
  text: 普濟方醫家類提要臣等謹案普濟方四百二十六卷明周王朱橚撰橚太祖第五子初封吳王洪武十一年改封周十四年就藩開封洪熙元年薨諡曰定事蹟見明史諸王列𫝊橚好學能文留心民事嘗作救荒本草已著於録是書取古今方劑彚輯成編乃橚所自訂而教授滕碩長史劉醇等同攷定之凡一千九百六十論二千一百七十五類七百七十八法六萬一千七百三十九方二百三十九圖可謂集方書之大全者李時珍本草綱目采録其方至多然時珍稱為周憲王則以為橚子有燉所作未免舛誤明史藝文志作六十八卷與此不合則又誤脱一百二字也其書捃摭浩博重複牴牾頗不免雜糅之弊然醫理至深寒凉温補用各攸宜虚實隂陽時亦有當俗師見聞不廣往往株守一偏用之適足以致誤是書於一症之下備列諸方使學者依類推求於異同出入之間得以窺見古人之用意因而折衷參伍不致為成法所拘其有益於醫術者甚大正不必以繁蕪為病矣乾隆四十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:3d93a7576686232d39e0410d6deffc2a147b7099f295f1c7dd25ad570c791803
