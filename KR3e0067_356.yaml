body:
  text: 普濟方卷三百五十六明周王朱橚撰産難門總論凡婦人以血為主惟順氣則血順胎氣安而後生理和今富貴之家往往保惜産母惟恐運動故禁出入專坐卧曽不思氣閉而不舒快則血凝而不流暢産不轉動以致生理失宜臨産必難甚至悶絶一也且如貧者生育日夕勞苦血氣舒暢生理甚易何俟乎藥則孕貴於運動者明矣次則産婦妊娠已經六七箇月胎形已具而世人不知禁忌恣情交合嗜欲不節使敗精淤氣聚於胞中致令子損母傷臨産必難二也何以知之生下兒子頭上有白膜一片滯膩如膠俗強名曰戴白生兒身有青有黑俗強名曰宿痣此是入月交合所致也如此則不特母病其子一生浸淫赤爛瘡瘍俗謂之胎蛆動逾嵗月不差三則臨蓐太早傷筋骨或信巫卜或説鬼祟多方誤恐致令産母心驚神恐憂惱怖懼又為間雜婦人喪孝穢濁之人衝觸若不預為杜絶臨産必難三也何以知之如偷生之女不正之屬既無産厄子母均安其理可知凡臨産初時腹痛或作或止名曰弄痛穩婆踈率不候時至便令試水試水頻洴胞漿先破風颯産門産道乾澀及其兒轉便令坐草太早兒轉亦難致令産難四也直候痛極眼中如火此是兒逼産門方用坐草即令易産如坐草稍久用力太過産母困睡抱腰之人又不穩當致令坐立傾側胎死腹中其為難産五也時當盛暑宜居深幽房屋當常令坐立開啓忩户多貯清水以防血暈血悶血溢妄行血虛發熱之症如冬末春初天色凝寒宜密閉塞産室窒塞罅隙內外生火常令暖氣如春仍令下部衣服不可少綿方免胎寒血結無致産難六也經驗方云婦人産難重事也凡産婦入月切忌飲酒呌怒臨産時先脫尋常所著衣以籠井口則易産亦衣易下不可令人喧擾及作倉忙之狀止令老成在旁扶持看待産母惟當餐軟飯粥之類初覺微痛而不甚名曰弄痛不可便行試水探聼産母坐卧切須熟忍或服催生符藥却不可曲腰眼垂連腰引動眼中如見火色此是兒轉又須令人扶䇿徐徐而行若行步艱即憑物立須臾扶䇿再行直立至連相引陳痛頻頻又服催生符藥免強扶行痛轉甚難於行立認是産時將至然後安詳坐草上草之時切勿太早恐兒在腰中難於轉側及胞漿先破子道乾澀皆致難産務要産婦惜力心中熱悶先以蜜一匙新汲水調下若熱悶未已以生雞子一箇打破吞服直待兒逼産門頭端正然後令人抱腰其抱腰之人不得傾斜則兒順其理自然易産新産下便以新汲水令産母徐啜三二呷以涼心經不致敗血上行可省百病又有卧産者須待卧定皆平著席體不傴曲則兒不失道如能依此節度必無難産之理才得分娩切忌問是男是女且服壓血藥仍令人用手或物從心下按至臍腹惟宜避風房內常淬醋煙以防暈悶儒門事親書收産胎論云有一孕婦年十八嵗臨産召穩媪三人其二極拽婦之臂其一媪頭抵婦之腹中以兩手扳手腰極力為之胎死於腹良久乃下兒亦如血乃穩媪殺之也豈知瓜熟自落何必如此乎其婦因兹經脈斷閉腹如刀刺大渴不止小溲悶絶主病者禁水不與飲口舌枯燥牙齒黧黑臭不可聞飲不下昏憒欲死戴人先以雪水恣令飲之納二升許痛緩渴止次舟車丸通經散前後五六服下數十行食大進仍以桂苓甘露飲六一散柴胡飲子等調之又論云凡婦難産者皆因燥澀致臟腑不得開通宜先於降誕之日入月之日用長流水調益元散日三服産必易産後亦無一切虛熱氣血不和之疾如未入月則不宜服之以滑石滑胎故也凡人生産先知此十一産證候則生産之婦永無傷損性命生産之間性命最重幸而孩子易生人不知福萬一有少艱難則須臾之間子母之命懸於絲髮但世人所患者惟在生産收生之人少有精良妙手緣此多有損命因傷其事為十一産論一曰正産者蓋婦人懷胎十月滿足隂陽氣足忽然腰腹作陳疼痛相次胎氣頓陷至於臍腹疼痛極甚乃至腰間重痛榖道挺出迸繼之漿破血下兒子遂生此名正産二曰傷産者蓋婦人懷胎忽有七月八月而産或至九月十月而産忽有經一年二年及四年五年而後産今獨以十月滿足為正産蓋一人之生隂注陽定各有時日不可改移今有未産一月已前忽然臍腹疼痛有如欲産仍却無時是名試月非正産也但一切産母未有前面正産候即不可令人抱腰産母亦不可妄亂用力蓋欲産之婦臍腹疼痛兒身未順收生之人却教産母虛亂用力兒身才方轉動却被産母用力一逼遂使兒子錯路忽橫忽倒不能正身皆緣産母未當用力之所致也凡産母用力須待兒子順身臨逼産門始用力一迸令兒下生此方是産母用力得當也未有正産之候而用力太早並妄服藥餌令兒下生譬如揠苖而助之長非獨無益而又害之此名傷産三曰催産者言婦人欲産漿破血下臍腹作陳疼痛甚兼腰重是正産之候但兒却未生即可服藥以産之或有腹痛數日産母困苦已分明見得是正産之候但兒子難生亦可服藥以助産母之正氣令兒速得下生此名催産四曰凍産者蓋言三冬之月天氣寒冷産母血經得冷則凝結而不散因其血之不散以致兒子不能生下此之一弊為害最深然世人不知覺若冬産婦下部不可脫却綿衣并不卧坐寒冷之處當滿房著火令遍方常有暖氣常令産母背身向火令臍下腿膝間常有暖氣若背上心前少間寒冷須是暖炙綿衣以包之貴其血得熱則流散使兒子易生此名凍産若春秋之間天地有隂濕寒冷之氣亦可房中以微炭火暖為妙五曰熱産者蓋言盛暑之月欲産之婦當要其溫涼得所不可因熱恣意取涼及有傷損胎氣又生産之處不可多著人數切忌人多熱氣逼襲産母蓋人之血氣得熱則散熱過則損令當夏暑炎熱之盛而産母氣虛則其血得熱而上蒸能令産母發熱頭痛面赤昏昏如醉乃至不知人事世有名血暈者因此而成也若産於夏月時少有清涼之氣隂雨之變産母不可任取涼恐生大病六曰橫産者蓋兒子下先露其手或先露其臂此因未當用力而産母用力之過也臍腹疼痛兒身未順若是産母用力一逼遂致身橫而不能生不幸而有此證候當令産母安然仰卧令看生之人推兒入去凡推兒之法先推其兒身令直上漸漸通手以中指摩其肩推其上而正之漸引指攀其耳而正之須是産母仰卧然後推兒直上徐徐正之候其身正門路皆順煎催生藥一盞令産母吃了方可令産母用力令兒下生此名橫産若看生之人非精良妙手不可依此法恐恣其愚以傷人命七曰倒産者蓋因其母胎氣不足關鍵不牢用力太早致令兒子不能回轉順生便只直下先露其足也治之之法當令産母於床上仰卧令看生之人推其足入去分毫不得令産母用力亦不得驚恐候兒自順若久不生却令看生之人輕輕用手內入門中推其足令就一畔直上令兒頭一畔漸漸順下直待兒子身轉門路正當然後煎催生藥令産母服一盞後方始用力一逼令兒生下此名倒産若看生之人非精良妙手不可依用此法恐恣其愚以傷人命八曰偏産者蓋因兒子回轉其身未順生路未正却被産母用力一逼致令兒頭偏拄左腿或偏拄右腿反無從用力致令兒雖近人門而不能生下但云兒已露頂然不知兒之所露却非頂也或左額角或右額角而已謂兒頭偏拄一畔以此不能收治之之法當即令産母仰卧令看生之人輕輕推兒近上以手正其頭令兒頭頂端正向人門然後令産母用力一逼即便兒子生下即令兒却只露額當令看生之人以一件綿衣炙令溫暖用褁手急於榖道或是小兒之後骨偏拄榖道外旁輕而推兒令正即便令産母用力逼兒生也此名偏産凡遇榖道外傍推兒頭正須推其上而正之仍是小用輕力推些兒上而正之也若看生之人非精良妙手不可依用此法恐恣其愚以傷人命九曰礙産者蓋言兒身已順門路俱正兒子已露正頂而不能生下蓋因兒身回轉肚帶攀其肩以此露正頂而不能生此名礙産治之之法當令産母於床上仰卧令看生之人輕輕推兒近上徐徐引手以中指按兒肩下其肚帶也仍須候兒身正順方令産母用力一送使兒子下生此名礙産若看生之人非精良妙手不可依用此法恐恣其愚以傷人命十曰坐産者蓋言兒之欲生當從髙處牢繫一條手巾令産母以手攀之輕輕屈足坐身令兒生下非令産母臨生兒時著坐一物此名坐産若是産母兒將欲生却令坐著一物即抵著兒不能生也十一曰盤腸産趙都運恭人每臨産則母腸先出然後産子産子之後其腸不收甚以為苦名曰盤腸産醫不能療偶在建昌得一坐婆之法一施而收之其法遇産後子腸不收之時以醋半盞新汲冷水七分碗調停噀産婦面噀每一縮三噀收盡此良法也後學不可不知欲産之婦脈離經沉細而滑也歌云夜半覺痛應分誕來日日午定知生身重體寒熱又頻舌下之脈黑復青反舌上冷子當死腹中須遣母歸𡨕面赤舌青細尋看母活子死定應難唇口俱青沫又出子母俱死總當判面青舌青沫出頻母死子活定知真新産之脈緩活吉實大絃急見鬼新若得沉重小者吉切勿堅牢命不停寸口澀痰不調死沉細附骨不絶生臨産腹痛而腰不痛者未産腹痛轉甚者將産蓋腎候於腰胞繫於腎尺脈轉甚弦如急珠者産婦人産乳忌反支月若值此月當坐牛皮上或灰上勿令水血惡物著地則殺人及浣濯衣水皆以器盛過此忌月乃止凡生産不依圗脫有犯觸於後子母皆死若不至死母子俱病諸事皆不稱心若能依圗無所觸母即無病子亦易養凡欲産時特忌多人瞻視惟得三二人在傍待總産訖乃可告語諸人也若人衆看不無難生胎神逐月所直方位不可修造正月在床二月在户三月在門四月在竈五月在床六月在竈七月在房八月在厠九月在門十月在戶十一月在竈十二月在牀凡孕婦入月切不可洗頭方免産難及橫産逆産産難附論夫難産者由先因漏胞去血臟燥或子臟宿挾疾疢或觸犯禁忌或始覺腹痛産時未到便驚動穢露早下致子道乾澀産婦力疲皆令難也凡看母舌青兒死母活唇口青兩邉沫出者子母俱死面青舌赤沫出者母死子活也故將産時須令坐卧安定背平席體不傴曲則兒不失其道若坐卧未安身體斜曲兒正轉動忽遽強􅀈氣暴衝擊則令兒趨後孔或橫逆皆由産時匆遽或觸犯禁忌坐卧不安定所為故産婦坐卧須平安正順四時方面避五行禁忌若有觸犯多致災禍者也方瞿麥湯治難産及已産胞衣不下或墮胎後血不下瞿麥穗消石黃連去鬚滑石甘草炙各一兩王不留行延胡索當歸大黃各一兩一分生乾地黃連皮大腹鬼箭羽射干葳靈仙去土雷丸檳榔京三稜炒郁李仁各一兩半吳茱萸炒半兩牽牛子炒二兩右粗搗篩每服五錢水盞半入生薑五片同煎至八分去滓溫服不拘時催生湯治妊娠欲産痛陳尚踈難産經三兩日不生胎死腹中或産母氣乏委頓産道乾澀才覺痛密破水後便可服蒼术二兩米泔浸洗切焙黃色枳殼麩炒去穰白桔梗廣陳皮去白芍藥白芷大川芎各一兩歸身一兩交趾桂去粗皮不見火半夏湯洗粉草麻黃去莭乾薑刮去土皮厚朴薑汁製南木香杏仁去皮尖白茯苓各五錢右為末每服二錢順流水溫暖調服若覺熱悶白蜜湯或銼散入真米醋一合煎當隆暑之時恐難輕服但以五苓散用葵子燈心煎湯調下卻暑清魂滑胎易産胞漿先破則胎乾難産用白蜜清油浸一合熱酒調得所頓服胎氣即潤分娩矣易生湯治婦人血氣不調心腹疼痛或月閉不通每有妊娠多難産蒼术淨洗去皮十二兩桔梗二兩枳殼去穰麩炒麻黃去根附子炮去皮臍陳皮去白兩各三芍藥白芷芎藭當歸桂去皮半夏湯泡七次赤茯苓甘草各一兩半厚朴薑製乾薑炮各二兩右除桂枳殼二味别為末外一十四味同為末慢火炒令色轉攤冷次入桂枳殼末令勻每服三錢水一盞半醋一合生薑三片煎至一中盞去滓熱服不拘時候神聖散治婦人難産及橫逆産乾豬胎鯉魚皮女人亂髮三味各一兩入瓶子內燒令焦鐺墨伏龍肝細研各半兩墨煆醋三度當歸桂去皮芍藥白殭蠶炒白芷白附子炮芎藭各一兩右為散再研細每服三錢熱酒調下臨産腹痛時便子母俱無恙産後每日空心一服治月內諸血疾催生方治婦人臨産胞傷風冷腹痛頻併不能分娩王不留行京三稜煨牽牛子炒百合當歸葳靈仙各一兩半雷丸大黃天雄炮製去皮臍各一兩桂去粗皮甘草炙各三分大腹二兩右㕮咀每服五錢水一盞半煎八分去滓溫服令産婦安穩再用後沉香湯從心洗即平安沉香水馬各一兩飛生鳥毛零陵香詹糖香龍腦蘇合香苜蓿香各一分蘧麥二兩右以水二斗煎取一斗去滓待至臨蓐欲平安用湯如人浴即從心上洗三五遍其湯冷即平安亦無有痛苦處無忌七聖煎治産難多時不下垂困宜服蘧麥滑石各一兩牛乳黑豆黃酥三味兩各二冬葵子一合白蜜二合右為細末以乳酥蜜調藥令勻慢火熬成稀膏每服一匙熱酒調下治産難催生用麝香一錢研末水和服之保生無憂散胎胞臨門難産蓋身居富貴口食甘肥無度即飽即卧致令胞胎肥厚根蒂堅固行動氣急又不曽預服瘦胎之藥以致臨産艱難服此可保易産當歸酒浸川芎白芍藥各三錢南木香一錢半枳殼炒明乳香另研三錢血餘二錢半即油髮灰一方以獖豬心血和髮灰右為末二錢水一盞煎至七分日二服濟生方有甘草一錢半炙餘同一方無枳殼有硇砂甘草澤㵼湯治産難及煩悶不已一名瞿麥散澤㵼一兩瞿麥去根研二兩半榆白皮銼碎二兩木通甘草炙令赤一兩半桂去皮牛膝酒浸半日切焙一兩右粗搗篩每服四錢水一盞半薑三片煎一盞去滓溫服未産便服七聖散臨産腰痛方可服之延胡索沒藥白礬飛過白芷薑黃俱焙當歸桂心以上各等分右為細末臨産陳痛時燒鏵刃鐵令通赤淬酒調藥三錢服一二立産鏵刃犁頭是也此方河池縣喬醫家貨每服用一錢引道屢試有效其驗如神霹靂奪命丹治婦人恣意情性有失調理衛竭榮枯胎轉難動坐草之時用力過多腹痛又不能堅忍坐草驀然氣挫目反口噤面黑唇青沫出口中子母俱殞若兩臉微紅子死母生蛇退一條入在鎡罐內煆千里馬路上左腳舊草鞋一隻洗燒灰一錢髮灰一錢金銀箔各一片乳香半錢另研馬明退蠶退燒灰一錢黑鉛一錢半水銀七分半依十五問中法右為末以獖豬心血為丸如梧桐大倒流水灌下數丸如灌不行化開灌效如服藥可者更用前藥繫縳左右手上立效一方五月五日須焚香至誠修合勿令婦人雞犬見一方丸藥時每丸念救苦天尊救苦觀世音菩薩各一聲一方有千里馬無髮灰一方有蠶子布無蛇退治産難方槐枝切二升榆白皮切大麻仁各一升瞿麥通草各三兩牛膝五兩右㕮咀以水一斗二升煮取三升半分五服牛蘇煎治難産經日未産真牛酥三兩秋葵子一合白蜜二兩滑石瞿麥穗大豆黃卷各一兩右先以清酒一升研細葵子內酥蜜中微火令銷後即下諸藥慢火煎令如魚眼沸約減半如膏成則將瓷器中以綿濾之用溫酒調初服半匙漸加至一匙苧麻子根飲治難産産經論云三十後嫁者謂之晚嫁也少嫁則筋骨軟懦易産也晚嫁則筋骨堅強所以難産入月宜常服乾苧麻根新者刮削銼陳皮去白甘草炙生乾地黃焙烏梅去核取肉人參各二兩右搗篩每服二錢水一盞薑三片同煎七分去滓溫服日夜各一催生奪命丹治婦人臨月坐草而難産者此藥於五月五日至心修合應驗牡丹皮秋少用白茯苓春少用桂心夏少用赤芍藥冬少用桃仁去皮四兩研澤㵼各一兩右為末煉蜜丸彈子大細嚼淡醋湯下榆白皮散衛生寶鑑治難産滑胎易産治妊娠曽有漏胎去血或臨産驚動太早産時未至穢露先下致使胎燥臨産艱難榆白皮一兩葵根一兩牛膝三分去苖蘧麥一兩木通半兩大麻仁三分右為末每服四錢水一鍾煎六分去滓不計時候溫服又方黃芩一兩蘧麥滑石一兩冬葵子一兩酥一兩蜜一兩右為散先將酥蜜於銚子內慢火煎三五沸下諸藥攪令勻更煎三兩沸以熱酒調下一匙不過再服子母平安勝金散治難産逐敗血即自生若橫逆則轉活子死腹中則胎軟膨寬即産王不留行酸漿胎死倍用茺蔚子白蒺藜去刺五靈脂行血俱生用右各等分為散每服三錢取利山水一盞半入白芷劉寄奴子一撮同煎溫服車前子散治難産不下經日車前炒半兩榆白皮刮淨一兩滑石半兩當歸焙兩半瞿麥穗一兩右為散每服二錢用酒調下溫湯亦得如血水未下用大黃二錢煎湯一盞分作三服調前藥下甘草湯治難産腹痛胎不轉動一名葵子散甘草炙半兩榆白皮刮一兩桂心一兩半葵子一合滑石六分右為散每服四錢水一中盞煎六分去滓溫服抵聖散治難産催生紅藍花六月六日取蜀葵花五月五日採桃花三月三日採凌霄花七月七日採大麥七月十五採各一兩右依時採取搗羅為細散每服三錢以熱酒調下立産芍藥散治難産催生赤芍藥二兩漚麻頭一握揀擇淨芎藭當歸茯神去木陳皮湯浸去白甘草炙各二兩亂髮灰一分右為散臨卧時溫酒調下二錢頻服立産生滑胎散治痛楚難産榆白皮切一升蘧麥三分木通三分牛膝一兩去苖大麻仁一兩右為散每服四錢水一鍾煎六分去滓溫服頻服效又方蘧麥槐枝牛膝木通榆白皮已上各一兩右細銼每服五錢水一鍾煎六分去滓溫服立效催生丹療産婦生理不順産育艱難或橫或逆大有神效十二月兔腦髓去白膜研如泥通明乳香一分細研母丁香末一錢右拌勻以兔腦髓和丸如雞頭實大隂乾用油紙密封貼每服一丸溫水下即時産隨男左女右手中握出是驗一方治或橫或逆五行散治産難及胞衣不下難産者初覺腹痛産時未至便驚動穢物早使子道乾澀難之一也用力太早致兒傷難之二也如是難産即將夫衣覆井口以弓絃繫其腹治之以五行散主之牛膝洗去蘆酒浸一日蒸熟為度榆皮桂心瞿麥木通已上各半兩右為細末每服二錢用熟水芝麻三五點調下子死腹中加附子半兩車前子煎治難産車前子一升新布褁用水熟挼漉出日乾又以新布褁熟揉之令光滑不用搗生地黃汁一升白蜜一升好酥五合右相和微火煎當令有魚眼沸起即㵼於瓷器中每服半匙以沸湯調通口服之治難産催生蘧麥半兩桂心二錢半蟹爪半合牛膝酒浸半日焙半兩右粗搗篩每服五錢水一盞半煎八分去滓溫服如産便住滑胎散治婦人諸般惡産槐子炒麥蘖炒當歸焙滑石各等分右為散每服二錢溫酒調下不拘時服療母子俱傷者産難及胎不動轉者榆白皮三兩葵子五合甘草炙桂心一兩右切以水四升煮取二升服一升須臾不産更服一升忌海藻菘菜生蔥一方有黃芩名滑胎散催生丹治難産金箔三十片銀箔三十片麝香一錢硃砂半兩細研右細研如粉臘月兔腦髓和丸梧桐子大臨産時茅香湯下五丸難産七丸立效又方冬葵根三分銼蒲黃半兩桂心半兩羚羊角屑三分右為散煮棗肉和丸如桐子大不拘時候以粥飲下三十丸又方蛇蛻皮七寸炙黃萆麻子七枚去皮研硃砂半兩麝香少許右都研為末煉蜜和丸如小豆大以溫水下二丸治産難或半生半産不下或子死腹中或著脊至坐草數日不産血氣上搶心母面無顔色氣欲絶者亦治橫産醇酒二升白蜜或煎豬膏各一升右合煎取二升一服不能再服可隨所患服之治産後惡心血不除上搶心痛煩急者以地黃汁代醇酒一方不用酒蛇蛻皮治難産數日不下蛇蛻皮一條燒灰臘月兔腦髓一枚車脂棗許大暴乾右除兔髓外搗羅為末以兔髓搜和為丸如梧桐子大二十丸溫酒下蟹爪飲治難産兼子死腹中或妊兩子一子已死一子却活令死者出生者安一名千金神造湯蟹爪一合甘草炙半兩阿膠炒燥一兩右㕮咀如麻豆大每服三錢以東流水一盞煎七分去滓溫服車前子散治滑胎易産車前子滑石各一兩阿膠炒燥一兩半右為散每服二錢蜜湯調下不時服至入月乃服藥利九竅不可先服治妊娠難産方水銀一分膩粉一分兔腦十二月者右研以兔腦和丸如梧桐子大不拘時候以溫水下五丸催生如意散臨産腰痛方可服之人參為末乳香各一錢辰砂半錢右一處研臨産時急用雞子清一箇調藥末再用生薑自然汁調開冷服如橫生倒生即端順子母平善傳於鄂倅施漢屢見功效治産難纍日氣力乏盡不得生兼惡露出盡胞不産阿膠二兩赤小豆二升右水九升煮豆令熟去滓內膠令煬每服五合不覺更服不過三服即出一方用黃明膠此方係舊用極驗一方水半盞煎八分又方槐子十四粒蒲黃一合右件內酒中溫服須臾不生再服水服亦得又方生薑汁生地黃汁各半升右合煎熟頓服之治産難胞衣不出橫倒者及子死腹中母氣欲絶半夏白斂各二兩右治下篩酒服方匕小難一服橫生二服倒生三服兒死腹中四服可加代赭瞿麥各二兩為佳一名催生持危散溫服不能飲者瞿麥湯調服催生柞木飲子治産難或橫或逆死胎爛脹於腹中此方屢用神妙生大柞木枝一大握長一尺淨洗寸銼甘草大者五寸作五假右用新汲水三升半同入新沙瓶內以紙三重緊封之文武火煎至一升半令香覺腹痛便準備候産婦腰重疼欲産時即溫飲一小盞便覺心胸豁如覺再渴又飲一盞至三四盞覺下重便生更無諸苦切不可坐草早及坐婆亂下手催生藥只消一服此方至驗也若橫生倒生不過三服即正子死腹中取下能保子母俱全最為神驗有婦人謂其夫曰屢服催生散不效遂令勿韯以此藥濃煎一碗服少頃蘇醒進些粥再與一碗困睡少時忽云我骨節都折開了快扶起我水血俱下拔出死胎竟全不費力可謂更生以此救人百發百中神劑且倉卒易辦毋忽治難産或倒橫不順方蛇蛻一條全者桑樹上佳蠶蛻紙一張右入新瓦瓶中鹽泥固濟燒存性為末煎榆白皮乳香湯調下一錢三服覺痛便生一方云臨産腰痛用藥三字麝香一字溫酒調下名二妙散三家水調亦得一名二退散金筆丸治難産金箔三片兔毫筆頭三個燒為灰右和停用蠟為丸如梧桐子大作一服溫酒下勝金散治難産若逆生並皆治之一名麝香散麝香一錢研鹽豉一兩以舊布青的褁了燒赤乳鉢研右為末取稱錘燒紅以酒淬之調下一大錢效嚴氏濟生方云難産者何答曰胎成之後子居腹中每食母血有餘遂成結塊謂之兒枕子欲生時血塊先破為散血褁其子所以難産當服勝金散要知胎成之後全在調攝令氣道平順十月滿足則産無難矣更有年少初生才覺腹痛便驚怖不安氣道不順以致難産宜服催生獨盛散及子蘇飲瘦胎散治産難一名催生枳殼湯枳殼四兩甘草二兩分為三片刀前者生刀後者炙熱右為末每服空心一錢如茶點後服自五月後一日一服至臨月不惟易産仍無胎中惡病滑胎易産莫出此方昔有胡陽公主頻有産難每産則經旬痛不安艱難懼産遍尋異術遂傳此方而易産兼令胎瘦而微黑百日後方始變白若臨月之時不得上厠恐兒墮也催生治漏血産藏乾澀難産痛劇以黃葵花春用苖夏用花秋用子冬用根焙搗為末酒調服神應黑散一名神效草散一名白芷散一名烏金散治難産此藥之功也人多不服以為極賤之藥大槩産難或一日兩日未免水血先下如舟坐灘殊不知香白芷百草霜再固其血服之如魚得水決自轉生兼治月水不調崩中等疾及橫生逆生能全子母性命香白芷百草霜各等分右為末每服二錢童子小便醋各半呷許沸湯燒入六七分點服流水見功甚速再服即分娩矣或用蜀葵子四十九粒白滑石末三錢順流水煎湯空心二服如人行五里即下一方煎服三因方云評曰産難不知胎側有兒枕破與敗血褁凝隨其胎息因緣自有難逆其如橫逆多因坐草太早努力過多兒轉未遲或已破水其血必乾致胎難轉若先露腳謂之逆先露手謂之橫法當以微針刺之使自縮入即服神應黑神散以固其血必自轉生養生方云倉皇之間兩命所係不可不廣傳蓋贊黑神之功也或以鹽塗兒腳底抓搔之燒弓絃散治難産弓絃五寸銼碎箭簳五寸銼碎右用燒作灰研為細散作一服以溫酒下其子即出未效再服之羊肉湯寒月中産當寒月寒入産門臍下脹悶手不可犯此寒疝也若謂其有瘀血欲以抵黨湯治之有曰非其治也可服張仲景羊肉湯二服愈兼治産後腹中疼痛虛勞不足裏急脅痛精羊肉四兩當歸二錢生薑一兩橘皮半兩右水三碗酒少許煎一碗分二服或少加蔥鹽亦佳如意膏治難産催生萆麻子二七粒去殼研如膏丹砂半錢研細右一處和勻用油單一片圓如盞口大將藥攤之當臍下少腹間貼之外以帶帛繫令固候産罷并胞衣下畢速去之稍緩即脫人氣血此藥覺腹痛便宜用之貝母散治難産滑胎貝母一兩半去心稱槐子十月上已日採之佳一兩半右為散每服三錢以熱水調下未産更服馬齒莧散治難産如覺痛甚服此散即覺平安馬齒莧常莧各曝乾三兩重午日採右為散每服二錢新汲水調服宜頻服之當歸湯治難産疑胎斃腹中試驗死服之即出活服之即安及治産將至漿破血下腹中作陳疼痛漸至腰腳方見妊娠諸疾門安胎類一名芎藭湯治難産用蛇黃以水煮研汁服治難産用豬槽上垢及土取一合和麵半升烏頭二十顆煮取汁服之治難産及已産胞衣不下或墮胎後血不下真珠研半兩伏龍肝一兩右為散每服二錢溫酒調下二聖丹治難産催生丹砂乳香各一兩右同研如粉用倒流水和丸如雞頭實大慢火焙乾産婦腹痛時用稱鎚一枚洗淨濃研丹砂筆於稱鎚周面書金木水火土五字以炭火燒令通赤取出投於酒內將酒下藥一丸立産如是取死胎用水銀一皂子大蔥白一莖研如泥及當歸一錢同炒酒半盞作一服下藥一丸并酒飲盡不飲酒用酒少許和醋湯下一方用麝香酒調下貝母散治産難胎在腹中如兒并胎不出或胎斃貝母蒺藜子各四兩炒去刺等分右為末每服三錢米湯調下良久再服一方溫酒調下或熟水亦得相去四五里不下再服治難産催生飛生皮一枚燒灰蛇螁一條燒灰右研為散熱酒調下立生又方虎頭骨燒為灰兔頭燒為灰各半兩右研為散以熱酒下一錢便生又方金箔三七片硃砂一分右研令極細以臘月兔腦髓和丸如菉豆大不計時候溫酒下一丸催生散治難産牽牛子一兩微炒禹餘糧醋煅三遍右為細散每服煎榆白皮湯調下二錢宜頻服又方烏牛糞一錢萆麻子三顆去皮右都搗塗布上貼於腳心下産了即去急洗之勿令遲也治産難方取厠前已用草二七枚燒作灰水調服之粥飲調服亦得又方令夫唾婦口中二七過立出治難産及日月未足而欲産者用知母一兩為末蜜丸如兔屎大每服一丸痛不止更服一丸一法酒化療産婦生理不順産育艱難用通明乳香一塊如皂子大為末覺腰痛時用新汲水一小盞入醋少許同調服扶立令産婦兩手握兩石燕坐婆飼藥飲之先令妊娠念醫靈藥聖三遍然後服之仍係扶行數步須臾坐草便生無痛楚神良如神開骨膏用乳香不拘多少五月五日午時令一人在壁背捧乳鉢在凳上令一童兒以筆管透壁縫內逐粒從筆管中過入乳鉢內研極細以童兒面北滴水丸如雞頭大每服一粒無灰酒吞下海上方用乳香硃砂等分為細末麝香酒調下如聖膏治難産兼治胞衣不下兼治死胎一名如聖散用萆麻子七粒去殼細研成膏塗腳心胞衣速下寸金散治産難用敗兔毫筆燒為灰細研為末生藕汁一盞調服立産若産婦弱虛及素有冷病恐藕汁動氣當於銀器內重湯調溫服之又方以大硃砂隨多少端午日晒至百日不得著雨如滿百日取研如粉用臘月兔腦髓和丸如菉豆大欲覺産粥飲下一丸良久便生其藥男左女右手中把出又方用臘月兔頭一枚燒為灰為細末蔥白煎湯調服二錢産又方凡臨盆欲産又未産吞赤小豆二十粒立效又方取梁上塵三指撮酒調服之救産難經日不生及不順生立效用雲母粉半兩以溫酒調服入口當産不順者亦産萬不失一又方將雲母粉澄過研細一團如雞子大臨時無灰酒調下益母丸專治産難橫逆并安胎順氣用益母草其葉類大麻葉莖方花紫色白者不是五月五日採其葉莖隂乾不見日忌鐵器以石器磨為末煉蜜丸彈子大每服一丸臨産以童子小便溫送下若氣不順用木香參湯并艾醋湯送下治産難亦治催生用石燕一對令産母左右手持一隻合手不問生死胎即下治産難亦治胞衣不下神驗方以皂角末少許吹鼻中嚏出便下又方吞子二枚亦得療産婦難産催生用飛生皮令婦執之或蓋在背上帶毛亦效療臨産月日宜服以榆白皮焙乾為末日三服方寸匕令易産既産下兒身上皆有塗藥是其驗也催生湯治妊娠欲産痛陳尚踈難産經三兩日不生胎死腹中或産母氣乏委頓産道乾澀才覺痛密破水便可服治難産取貝母作末服之兼治胞衣不出取七枚末酒下療婦人産難朱書紙曰坐為蒲卧為魚女屬母兒屬夫急急如律令使産婦吞之又書兩道兩手各執一丸子即下又方用土瓜根搗細羅為散醋湯調下二錢便生治難産兒不出兔腦皮毛及頭並燒灰酒服治難産以弓弩絃縳腰及燒弩牙令赤內酒中飲之皆取發快速之義也治難産用滑石末與丹參蜜豬脂為膏俟入月即空心酒下彈丸大臨産倍服令滑胎易生治難産取真珠末一兩和酒服之立出治難産取羚角一枚刮尖為末酒調方寸匕一方將屑燒末酒服治難産取鱉甲燒末水服方寸匕立出治婦人生子不出用白狗血內酒中服之主下痢卒風痙伏日取之大補虛小兒驚癎止下痢治生産難用白雞距及腦燒灰酒服之治婦人難産取龍腦少許以新汲水調服立效治難産及胞衣不下即取一升人尿用薑蔥各一分煎三兩沸乘熱飲便下治産難取井花水半升頓一服立聖丹治産危急者一名立聖鶴頂膏用寒水石四兩內二兩炭五升煆通赤取出同生者研細入硃砂同研如深桃花色每用二分井花涼水調糊用紙花剪如杏葉大攤藥貼臍心乾再易三過三上便産橫逆惡候死胎不下並治神驗寒水石非方解石也即今人謂之軟石膏者是也又法用雞子清少許同調合時須極至誠勿令雜人及雞犬見治産育艱難或一嵗一産者可以此少間之用四物湯每服三錢加蕓薹子一撮於經行後空心服之又方用升麻葛根二兩加瞿麥乾土牛膝栝蔞根豆豉炒各半兩為散分作八服空心一日二服合滓服於每月經行後便服每服加蕓薹子一撮尤妙治難産催生右蛇蛻皮一條全者取端午日置於沙鍋中用紙一張水浸一日煎之候乾收此紙有難産者剪三片子如蛇形新汲水吞之立産或每片紙子內拌牛糞中豆與吞亦神效即男左女右手把出藥也一方端午合酸漿酒治難産用酸漿草挼自然汁每服半盞暖酒半盞調之頓服立出治難産方右吞大豆三枚至七枚立産又方右於臨月帶海馬子一枚良治難産胎衣不下方用大麻根三本以水一升煮取三合頓服之立下又方右令人含醋噀面悶即解亦治産母暈絶療産難歷日氣力乏盡不能得生此是宿有病也雖有對證之劑倉卒亦可單用此方取馬銜一枚覺腹痛即令左手持之催産蠶退散方用蠶退紙一大張燒作灰研以酸漿草爛搗絞自然汁三分許酒三分微暖調下一方溫水調服亦得雞子酒療難産二三日不下用雞子一枚去清或三枚亦得以苦酒半盞投雞子酒中飲之産催生馬齒莧酒方用馬齒莧搗絞取自然汁三分入酒三分微暖服之立産催生石燕子酒方取石燕子以童子小便三分摩取自然汁微暖下赤小豆七粒立産千鎚草散療難産取鑿柄入孔裏者燒末酒服之立下一方燒灰淋汁服治母已死兒子不出方但以水銀如彈丸格口內喉中捧起令下食頃又捧令起子便落又方右搗菖蒲根絞取汁一二升灌口中此亦母死子生驗若日月未至而欲産者方取夫衣帶五寸燒作灰酒服立下又方取全蛇蛻一條腹痛時以絹袋盛繞腰治産難取萆麻子二枚兩手各抱一枚須臾立下治産難橫生逆生胎死胞不出方右破雄雞脅以手探取肝酒漬之須臾出肝但以飲酒入口不覺生又一方雞肝一具切以酒一盞煎六分去肝分二服治産難數日不出極困欲絶者祕方取烏雞一頭令走二時許捉取刺左翅下取血又刺血門取血以醇酒一小盞和血內真丹末方寸匕攪勿令凝服之投杯即活胎即下佳治産難用本年厯頭剪下臘月三十日一行如月小用二十九日一行却剪為三假記定上中下作三丸依上中下三次水吞下即産治産時困悶以冬葵子一合水二升煮取半升去滓頓服之少時便産通靈散正産催生緊卷蛇蛻全者一條以蚯蚓泥裹之燒赤為末入些藥末相助酒調服若經行不産然後用此一方先覺熱悶又以新汲水調白蜜服之治産時子但趨榖道者方以熬鹽尉之自止又方右搗滑石末溫酒下一錢立效治兒在腹中哭右以多年空屋下鼠穴中土一塊令産母服之即止又方治産時子但趨榖道者方取桃仁分破書一片作可字一片作出字依前還合令母吞之便下即此是天尊法神驗催生桂膏貼足方桂去粗皮為末雄黃末一錢匕右以萆麻子三七枚去皮爛研入二味同研如膏紙上攤於兩足心貼之才産訖急去藥催生聖散子方黃蜀葵子二七枚赤小豆七枚生用右同研細童子小便三分調頓服立下一方無赤小豆聖功散治難産橫生倒長困頓不省人事兒死腹中用蜀葵子陳者不拘多少為散每服三錢酒調下如口噤斡開灌之無子用根銼碎煎汁濃滑冷服井水調服亦得如人行五七里路不來再服分娩矣順生散治生産不正及難産者山茵陳葉仙靈脾各等分右件為細末每服三錢童子小便并酒共半盞溫酒下治産難數日欲死右書紙作兩行字凡二十字文曰帝乙生子司命勿止即出其胞及保其子無病其母封其中央以朱印之令産婦持之甘草散預服散令易生母無疾病未生一月日前預服過三十日行步動作如故兒生墮地皆不自覺方見本門數日不産類治婦人難産令易産以海馬與産母帶之於身神驗不再臨卧燒末飲服亦可手握之枳殼散治妊娠令易生枳殼甘草糯米各等分右同炒為末米飲白湯調下一日之中二兩三五服不計時候治生子令易産用鼺鼠飛生一枚槐子故弓箭羽各十四枚合搗丸桐子大酒服二丸令易産也又方用舂杵頭細粳燒末水服方寸匕又方用蓮花一葉書人字吞之立産治産婦臨蓐服之令兒易生取鼺鼠用皮毛與兔頭燒灰研末酒下飛生丸療婦人易生産取蛇蛻皮著衣帶中銅弩繫衣帶臨欲産時左手持馬䘖右手特飛生皮令易産暑月中産有盛暑中産三日發大熱其噓疾而大惡露不行血攻心狂言呌呼奔走拏捉不住乾荷葉生地黃牡丹皮各等分右濃煎湯調服蒲黃末二錢一服即定胎即下遂安妊娠食物無度口厭甘肥既飽便睡以致胞厚胎肥臨月難産湖陽公主妊娠七八箇月服效方盆弦枳殼一兩去穰麩炒黑色甘草粉大者炙半兩右為細末空心沸湯點服勿登高厠原有胎寒腹痛休服産母唇青沫出口中子母皆致不救若兩頰微紅母却得生故書以别之幸詳審用之妊娠得病用附子等劑醫家之意惟恐墮胎且如服他藥不效日後一日因循大病以致子母皆殂可謂枉死其家真不幸即是謂愛指失掌豈不先救母斯若有實學更以一十八問方對證參考用藥治療終不致於俱殞也催生奪命丹牡丹皮枳殼赤芍藥各一錢蟬退二錢青皮阿膠炒甘草炙五加皮蕓薹子管仲蠶退紙火炙焦各半錢花蕊石半錢乳香一字計九錢一字細末煉蜜丸如彈子大臨坐草細嚼棗湯下治婦人産時胞衣下遲既産後復起早傷風吐㵼不止方吳茱茰防風羌活肉豆䓻黃橘皮藿香葉蒼术乾木瓜各一分官桂半兩當歸一兩右為細末每服三錢水一盞棗一枚薑二片同煎取九分空心連滓服一方黃金散詩云黃金結實似粟米細研酒調五十粒靈丹功效妙如神難産之時能救急右取油菜子研細酒調服催生及難橫逆鉛丹水銀二錢黑鉛一銚內鎔汁搗水銀結砂右用熟絹巾絞出銀細研汗衫紐作丸子如菉豆大臨坐草時香水吞下一二丸立效仍須仰卧又法先脫産婦常著衣一件蓋竈頭免胎衣不下之厄又法偷剪鍾馗左腳燒灰水下又法尋左腳舊草鞋洗燒灰桃枝三錢水下又法不作聲將花錢倒提向厠頂禮倒燒急回此法用一二神效不可不作治産難密以淨紙書本府州太守姓名燈上燒灰湯調下即産此雖厭勝頗驗走馬催生丹治産難危急橫生逆産子死腹中胎衣不下一丸可治十人雄蛇退一條首尾全者樹上退者是雄不然只取中間五寸燒煙欲盡急速取出用瓷器盆蓋於地上周回用溫土圍之良久取出為末光明辰砂一兩研麝香研一錢右二味研極細以桃栁嫩苖各七莖如無取皮須是取向東方者苖向東方炒與硃砂麝同研細却入蛇退灰又研勻糯米飯丸如糊椒大硃砂為衣晒乾難産者淡醋湯吞下一丸不久産下便於兒手內取丸藥男左女右手中出救命抵聖丹治難産危急辰砂有鏡面者半兩細研滴乳香半兩别研萆麻子二七粒去皮麝香當門子真者半兩别研真角屑一錢乾細研黃葵子一合慢火炒磁石半兩引得針者千里及洗淨焙燒灰存性别研千里及向東方死草中尋舊草鞋一雙須左右腳全右件於乳鉢中用鉢捶研須極細至勻鎔真蠟入藥和令得所入臼杵五百數就香煙上圓如梧桐子大每遇婦人就産發覺肚疼時取順流水半盞入無灰酒吞下一丸良久分娩於男左女右手中取所服之藥以乳香湯洗油紙褁埋地中三日取出安靜處可以活三人衣不下用流水抱雞子窠中洗下盛半盞水入溫酒少許吞下立愈如産難急橫倒不正眼唇黑指中青死胎在腹用炒黃葵子一合研碎溫酒調一丸立效如覺胎往來辰砂湯服一丸合時忌雞犬婦人生人丸時念北方黑帝大逞神通靈丹入口男女速生治逆生便産須知針法常用小線針於兒手足心針入一二分三四刺之以鹽塗止輕輕送入兒得痛驚轉即縮當回順鹽塗足底又可急搔之以鹽摩母腹上治産難用古城桂木煮湯服主難産搗益母草取汁七大合煎半頓服立下無新者以乾者大握七合煎服主難産取厠籌燒取熱氣衝上主婦人難産用郎君子與産婦手把之便生極有驗也治難産墨一寸磨水服之立産治婦人産難取銅弩牙燒赤內酒中飲汁古者彌勝治婦人生兒不出以枯蟬燒灰服之治婦人入月而難産取梁上塵竈突煤二味合方寸匕酒服治婦人産難并逆橫産用銅稱錘燒赤酒淬服治難産取水龜令産婦戴之亦可臨時燒灰酒下此物出南海如龜長二三尺兩目在側傍主婦人難産以舍生草産婦口中含之立産亦咽其汁主邪氣産難絶傷及主癮疹牙齒諸風疾春初採嫩槐葉並可食之治難産方用赤小豆生吞七枚出若是女二七枚佳治難産用彈丸土末一錢匕熱酒調服之大有功效也數日不産附論夫難生産者緣胎氣也子成在胎中每食母血食血有餘遂成塊俗謂之兒枕子欲生時血塊先破遂為散血散褁其子胎伏熱故有難産更有少年未經生産驕富貴説聼異端月數將滿才覺腹痛轉動便相告報傍人擾擾産婦驚怖不安心氣畜結是故難産要知月滿足不得妄憂慮或覺腹痛之時但令老娘安存莫遣人多無使擾亂腹痛稍頻衣破漿行須臾即生也依此將護必免難産之厄甘草散治妊娠數日不産滑胎易産一名大豆卷散甘草炙一兩黃芩去黑心大豆黃卷炒乾薑炮桂去粗皮吳茱萸湯浸各半兩糯米淘淨麻子仁各一合右為散每服三錢溫酒調下若臨月每日頻服一方有大麥芽無糯米大黃丸治妊娠數日不産養胎易生大黃炒二兩枳殼去穰芍藥各一兩芎藭三分乾薑炮厚朴薑炙半兩白术杏仁湯去皮尖雙仁麩炒吳茱萸湯泡去核炒半兩右為末煉蜜和勻丸梧桐子大每服二丸溫酒下不拘時候滑胎當歸散治妊娠數日不産當歸焙一兩麻子仁一合吳茱茰湯浸去核炒知母乾薑炮桂去粗皮黃芩去黑心甘草炙各半兩大豆炒去皮糯米各一合右為散研細每服二錢空心溫酒調下漸加至三錢如欲作丸即煉蜜丸如梧桐子大溫酒下二十丸治難産數日不生子死腹內方取揀淨川椒二斤分為二分蒸之以布褁更互熱尉産婦臍腹中死胎便出治産經數日不出或子死腹中母欲死以瞿麥煮濃汁服之麥門冬丸治妊娠數日不産益氣滑胎麥門冬去心芎藭厚朴去粗皮薑炙枳殼去穰麩炒芍藥赤茯苓去皮各二兩大黃炒半兩檳榔煨三枚訶梨勒煨取皮五枚右為末煉蜜和塗酥為劑搗熟丸如菉豆大每服二十丸空心酒下瞿麥湯治妊娠數日不産滑胎易産瞿麥去根銼榆白皮木通各二兩滑石一兩冬葵子揀淨微炒一合右為散每服四錢匕水一盞半煎至七分去滓空心溫服葵子湯治妊娠數日不産自由體性冬葵子炒一合滑石瞿麥去根各一兩丹參一兩半右為散每服四錢水一盞半煎七分去滓下牛酥白蜜各半合再煎六分食前服溫入月預服治妊娠數日不産令易産方以銅弩牙一隻燒通赤投半盞食醋中臨産服之一方酒服如聖散治妊娠數日不産用生過蠶紙燒灰研為細散每服二錢溫酒調下不計時治婦人難産數日不下至危急者用官桂去粗皮銼碎略炒鐵器不妨碾為細末每服三錢白湯調下立産此藥須旋合乃佳加味芎歸湯治産五七日不下埀死者及矮弱女子交骨不開者用川芎當歸各一兩自死乾龜殼一個酥炙生男女者婦人頭髮一握燒存性共為散每服三錢水一盞半煎服屢效約人行五里生胎死胎俱下無自死龜殼鑽龜廢殼亦可催生防葵散治難産三兩日不得産喘息不調腹內疼痛防葵一兩滑石三分硃砂一分别研冬葵子三分木通三分瞿麥三分榆白皮三分銼飛生皮一分燒灰右為散每服四錢水一中盞煎至六分去滓溫服治難産或經日三五日不分娩兼子死腹中方當歸三分微炒龜甲三分塗酥炙令黃搗末右先取産多者婦人髮半兩燒為灰細研入當歸末以水一大盞半煎取八分後下龜甲末煎五七沸分為二服如行人四五里便服治妊娠臨月數日不産覺不安服藥令兒手持出方古文錢八枚燒令赤內醋中九遍為末槐子一兩末右和研令勻煉蜜為丸如桐子大取朱粉著銅器中搖動使丸令赤七月七日午時合之每服以東流水下三丸神驗治三日不産方取鼠頭燒灰細研以新汲水調服一錢立效又方右燒龜甲成灰研新汲水調下一錢立效酒調亦可又方取門限裏土三指撮酒調服之又方取羚羊角屑燒研為末酒調一錢服治七八日不産至困方黃明膠一兩炙黃焦用好酒一大盞煎不住手煬膠約一二十沸內新生雞子一枚打破鹽一錢相和頓服之立産治七八日不産至困方藥闕以前藥治度服一服令婦人坐倚物上伸腿腰大口作二次服取鸕鷀頭手執之又方取益母草搗汁三合服之立下如無生者乾者一握以水一大盞煎取半盞去滓溫服治産經數日不出或子死腹中母氣欲絶瞿麥六兩通草桂心各三兩牛膝四兩榆白皮一升右㕮咀水九升取三升去滓分三服治數日不産胎上衝心欲悶絶方榆白皮滑石當歸車前子益母草以上各半兩右為細末煎生薑小便調下二錢治經日不産蒲黃地龍陳皮各等分右將地龍洗去土於新瓦上焙令微黃各為末三處搗之各抄一錢新汲水調服立産牛酥散治數日不産胎上衝心欲死牛酥半兩冬葵子炒一合滑石三分右以二味為末和牛酥置生絹袋內盛之用酒一升煎七合去滓袋子令溫每服半盞一二服如未下更服之茱茰湯治婦人數日不産下體已冷無藥甚窘以椒橙茱茰等葉濃煎湯可下手則和臍腹人門處皆淋洗即刻氣溫血行遂産或以紅花數兩速濃煎湯扶女於凳上以綿帛蘸水遏之又以水洗帛上兩頭仍以器盛水又暖又淋久而蘇遂生男子蓋遇嚴冬血冷凝滯不行溫則行矣血行則産即易也治難産三日不出以車軸脂吞大豆許兩丸一方車脂書兒足底作出字一方用酒又方燒藥杵七八遍令赤內酒中飲之立産鐵器亦得又方右燒大刀鐶以酒一杯沃之頓服即出救死不分娩者酥葵膏治妊娠數日不産或生不順理百方不得安方見本門難産類逆産附論夫逆産者蓋因妊娠初覺腹痛産時未至驚動傷早兒回轉未竟便用力産之即令逆也又或安胎之處及坐卧須順四時方面并避五行禁忌若觸犯者多致災禍方烏金散治橫生倒産子死腹中胎衣不下當歸酒浸沒藥生乾地黃蒲黃生用芍藥炒紅藍花各一兩鯉魚鱗臘月者佳桂各二兩血餘小兒胎髮真者二枚右將血餘鯉魚鱗二味用銷銀鍋子先以炭火燒灰沒藥研餘為散和勻每服二錢溫酒調下不拘時滑胎煎治難産經三日或橫倒不出垂死瞿麥取穗一兩酥五兩滑石葵子各三兩白蜜四兩黑豆皮一合牛膝去苖二兩右除酥蜜外為末將酥蜜煉熟入諸藥末及明乳香五兩煎以瓷器盛每服半匙溫酒或湯化下不拘時救生散治孕婦逆生其證孕婦欲産時遇腹痛不肯舒伸行動多是曲卧腰眼忍痛其兒在腹不能轉動故腳先出謂之逆生須臾不救則子母俱亡矣烏蛇脫一條蟬脫二七箇血餘一團即胎髮右燒灰每服二錢溫酒下併進二服仰卧霎時一手􅎲兒手心足心令轉其兒即時順生子母俱活用槐角子尖刺小兒腳心尤妙治逆産法大蒜七顆去皮生薑半兩蔥白去青三十莖各碎右置在一盆子中以百沸湯五碗乘熱投於盆中速扶産婦於盆上坐候冷易之凡三易則胎正又方取蒲黃用水調塗兒足心底又方取丹砂末半錢蜜調塗兒足底又方取牛齝涎絞以溫酒和服之治逆生方以鹽塗兒足底一方用鹽粉塗和又急爪搔之并以鹽摩産婦腹上即順治逆産橫産不出手足先見者以蛇蛻皮燒為末服一刀圭靣向東酒服即順一方豬膏和丸服又方取蟬殼二枚治為末三指撮許溫酒服之一方作蟾蜍二枚為末酒服又方以手中指取釡底墨交盡兒足下順生催生如聖散用黃蜀葵花不拘多少焙乾為末熟湯調下二錢或有漏血胎臟乾澀難産痛極者併進三服良久腹中氣寬胎滑即時産下如無花時只用葵子爛研半合以酒調濾去滓溫過頓服亦治打撲傷損如胎死不下煎紅花溫酒調下一方花為末入麻油順流熟水調下一方用葵子一味研墨或研硃砂為衣每服四十九粒溫酒下濟生兼服紫蘇飲或黑神丸亦佳又歌云葵子炒香七十粒研爛酒調濟君急若使臨危産難時免得全家俱啼泣治婦人倒産右麻蕡吞二七枚即正治倒産難産用原蠶蛾為末飲服三錢療逆産以真丹砂一刀圭塗兒腋下治逆死及子死腹中取車輪上土以三指撮酒調下又方取彈子二枚搗羅為散溫酒調服二錢又方取甑帶燒灰研散溫酒調服二錢又方取晚蠶子紙一幅燒灰研末米飲調服暖水亦得又方取夫十指甲燒灰研末以溫酒調服又方取車前子搗為末溫酒調服二錢保安散治因漏胎胞乾難産橫逆不順用蟬退不拘多少燈上燒存性研入真麝香少許臨時每服半錢淡醋湯調下治生産不順手足已冷口噤欲死方以朱書兒左足下作千字右足作勿字手出者亦效又方用當歸銼微炒搗末酒調下二錢又方用艾葉一兩以酒一盞煎六分去滓分溫二服水煎亦得又方以兔絲子搗末以溫酒調下一錢效一方用米汁服又方以酒調竈突塵二錢服之效一方水苦酒服一方用竈屋上墨以酒煮一兩沸取汁服治倒産子死腹中方取釅醋一升格口灌之出艾葉湯治逆産及子死腹中用大麻仁淨㨂研爛半兩水二盞同煎一盞去滓溫服酸醬飲治橫産倒産安胎用五葉酸醬草不拘多少取自然汁半盞酒半盞染胭脂末半兩和勻溫飲之未效再服之催生如聖散療逆産橫産瘦胎兼治産前産後虛損月脈不調崩漏一名催生黑神散又名烏金散又名二神散方見本門又方療逆産夫取隂毛二七根燒以豬膏和丸如豆大水吞下兒手即握出神驗治橫逆産理不順手足先出或子死腹中右以伏龍肝細研每服一錢酒調服兒頭戴出妙更用搽産母臍中亦效又方治産時子但趨榖道者方右腹肚痛兒數日不下者或倒産見兒腳於上書大人名即却順産極妙治逆産以釭中膏畫兒腳底即正治婦人橫逆産以古文錢二十文燒令赤投酒中服之立産治逆橫産瘦胎妊娠産後損月候不調崩中用百草霜白芷等分為末每服二錢童子小便醋各少許調勻更以熱湯化開服不過二服即産普濟方卷三百五十六
