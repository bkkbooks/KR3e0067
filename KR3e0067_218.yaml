body:
  text: 普濟方卷二百十八明周王朱橚撰諸虛門補虛益氣附論夫形不足者溫之以氣精不足者補之以味形精相感氣血生化則榮衛循流不失其度食飲不節起居靡常嗜欲之過形勞精搖則精氣將耗虛損之疾由是而生治法當補虛益氣方沉香續斷丸出聖濟總録方治骨髓傷敗補虛益氣沉香銼續斷牛膝去苖酒浸切焙石斛去根蘹香子炒補石脂微炒畢澄茄山茱萸防風去蘆熟地黃焙白茯苓去皮杜仲去皮炙肉蓯容酒浸焙各三分桂去皮大棗十枚附子三十枚一方不用右㕮咀以水八升煮取三升去渣分四服雙和湯治男子諸虛百損婦人血氣勞傷妊婦養胎益血進食止逆及因病後一切正氣不復補虛活血止痛方見本門補勞傷虛損類補虛方豬䐗一具人參五兩蜀椒一兩乾薑二兩半蔥白七兩白粱米五升千金翼用粳米右㕮咀諸藥令相得和米內䐗內縫合勿令泄氣取四斗半水緩火慢熬煮空腹食之大焦兼下少飲附子天門冬散出聖濟總録益氣補不足却老延年附子泡去皮臍二兩石菖蒲木香桂去粗皮天門冬去心乾薑炮各一兩右為散每服一錢匕溫酒空心服人參柴胡飲治大人小男虛勞瘦弱咳嗽延喘肌熱盜汗地骨皮人參柴胡茯苓芍藥甘草各五錢右為細末每服二錢水一鍾青蒿七葉同煎至六分去渣溫服不拘時日進二服益氣丸治言語損氣懶言補益氣麥門冬去心人參各三錢橘皮去白桔梗各半兩五味子一錢去子右為末水浸油餅丸如雞頭大每服一丸細嚼津唾咽下地黃酒治虛羸令人充恱益氣力輕身明目生地黃大者一石二斗搗絞取汁四斗杏仁一斗去皮尖二仁者熬黃搗末大麻子一斗熬搗末糯米一石泡乾上麯一斗五升淨刮暴乾細銼右先以地黃汁四斗漬麯待發炊米二大斗作飯冷暖如人肌酸麯汁中和之候飯清更炊米一斗酸之如法又取杏仁麻子末各一升二合半和飯攪之酸麯汁中待飯消還炊米一斗杏仁麻子末各一升二合半亦依前法酸之如此丸八酸訖待酒沸定挂泥二七日取清溫服一升加至二升日再服之食令人頓能食久服去萬病婦人服之更佳令人有子補中丸出聖濟總録補虛益氣順三焦壯筋骨烏頭泡製去皮臍葳靈仙去苖土巴戟天去心赤芍藥蒼术米泔浸切慢火焙乾各一兩右為末酒煮糊丸桐子大每服二十丸溫酒下食前服五精煎丸治上膈多熱下臟虛冷皮膚不澤氣力乏大便祕澀或時泄痢頭旋痰喘口乾舌強益夀延年白茯苓去黑皮筋取末乾菊花炊一服時不住晒酒泡乾别取末石菖蒲石上生者酒浸三日炊二日焙乾别取末桂去皮取心乾者另研取末各四兩白术切作片子白者佳天門冬去心焙人參牛膝各一升搗碎各以水井酒共一斗浸藥三日後絞取汁濾去渣於銀石器內慢火各燉成膏生黃精五斤生地黃五斤二味各搗取汁銀器內慢火熬成膏右先將下六味逐味取汁熬至半斤可住火然後將膏六味共合成三斤以前四味散藥同和勻暴乾再入膏和攪直候入盡三斤膏藥再入臼中杵五六千下丸如桐子大每服三四十丸食前用清酒或米飲下久服有效回陽湯出醫方集成治體虛脈中大弱食飲不進乾薑泡一錢川烏生去皮臍青皮去白一兩益智仁二兩附子生去皮臍各五錢右㕮咀每服三錢生薑七片棗二枚煎服或少加木香亦可補氣湯出瑞竹堂方黃茋三兩去蘆蜜炙人參甘草炙各五錢苦梗去蘆炒一兩麥門冬一兩泡去心右㕮咀每服四錢水一鍾半薑五片煎至七分去渣不拘時溫服附子丸出聖濟總録治元臟氣衰風弱勞冷腰腳無力筋骨痛日加痿瘁飲食不化脾胃泄㵼痢疾面無顔色及傷寒頭痛附子泡去皮臍製四兩沉香一兩蒺藜子微炒去角三兩硇砂五錢用漿水半斤同附子慢火煎乾右為末煉蜜和丸桐子大每服二十丸空心溫酒或鹽湯下漸加丸數久服四倍丸出聖濟總録補虛益氣木香一兩硫黃二兩水研甘草水晒附子二兩泡去皮臍蘹香子微炒四兩右為末酒煮糊為丸桐子大每服空心鹽湯或溫酒下十五丸至二十丸四補丸出聖濟總録益氣血補元臟恱顔色柏子仁生絹袋盛何首烏切作小片肉蓯容切作小片牛膝細切生絹袋盛各三兩右用酒三升春夏浸七日秋冬浸二七日取牛膝柏子仁先搗如泥次將何首烏蓯容同搗得所為丸如桐子大每服二十丸至三十丸空心溫酒下鍾乳丸出和濟方主五勞七傷肺損氣療丈夫衰老陽氣絶手足心冷少氣髓虛腰痛腳痺體煩口乾不能食能下氣消食長肌和中安五臟除萬病兔絲子酒浸搗焙石斛去根各一兩鍾乳粉二兩吳茱萸浸炒五錢右為細末煉蜜丸桐子大每服七十丸空心溫酒或湯米飲下再服訖行數百步飲溫酒三合復行二三百步覺口胸內熱稍定即食乾飯豆醬過一日食時常酒暖將息不得聞見尸穢等氣亦不可服食粗穢陳惡食初服七日內忌陽事過七日後任性然亦不宜傷多服過半劑覺有功即相續服三劑終身更無所忌補氣虛逆出千金方大棗三升甘皮十具乾薑二兩乾地黃半斤右治下篩酒四升清棗三宿漉出棗取酒為炊汁將棗肉甑微火熬令棗膏入釜中酒裏煎令餘二升許候甑中棗只留皮核在乃止火貯器中將前散及熱下覺令調大略與糖相似以酒服二合日再此方非止補氣亦通治一切短氣並形體羸瘦甚良四君子湯出聖濟方治勞衛氣虛臟腑怯弱心腹脹滿不思食腸鳴泄㵼嘔噦吐逆大宜服之人參去蘆甘草炙茯苓去皮白术各等分右為細末每服二錢水一鍾煎七分通口溫服不拘時入鹽少許白湯點亦得常服溫和皮膚進益飲食辟寒邪障霧氣一方加橘紅名異功散又方加陳皮半夏名六君子湯嘔逆加藿香砂仁泄㵼加木香肉豆䓻衛生湯治虛勞強五臟除煩養夏退邪熱順血脈緩中和神志潤澤容色常服通暢血脈不生癰瘍養胃益津當歸白芍藥各四兩黃芪八兩甘草炙一兩右為銼散每服四錢水一鍾半煎七分去渣不拘時服入少鹽四柱散許白湯點亦得常服溫和脾胃進益飲食辟寒邪四肢怠倦小便滑泄㵼不止臟氣虛弱者悉宜服之白茯苓去皮附子泡去皮臍木香不見火各一兩人參一兩右為細末每服三錢水一鍾半薑五片入鹽少許煎至七分食前溫服滑㵼不止加肉豆䓻訶子煎名六桂散一方用棗二枚蔥白二寸同煎服又一方有白术無茯苓白术散治四肢懶倦小便不利大便帶血沉困飲食減少白术芍藥茯苓各等分右為末水煎如發熱或惡熱或腹不痛而脈疾加黃芩為主未見膿血而惡寒乃太陰而傳少陰加黃連為主桂枝佐之如腹甚痛者加當歸倍芍藥如見白膿加黃芩為主如見血加黃連為主桂枝當歸佐之溫中丸溫中和胃主脾腎氣虛治心腹疼痛山藥二兩乾薑炮甘草炙各一兩右為細末煉蜜丸如彈子大白湯化一丸食前服蒜二升剝牛乳五升牛膝一斤末蒜主冷氣力溫中下氣右以蒜內牛乳中煎之候蒜消盡攪勿住手下牛膝末煎成兔絲子酒浸一宿别搗鹿茸去毛酥炙附子泡製去皮臍澤㵼石龍芮各一兩巴戟天去心桑螵蛸炒芎藭五味子覆盆子木香各半兩右為末酒煮糊丸桐子大每服三十丸空心溫酒或鹽湯任下葳靈仙湯出聖濟總録治丈夫元臟風虛氣血勞傷飲食減四肢疲乏氣劣心悸上熱下冷口苦舌乾葳靈仙酒浸去蘆頭仙靈皮銼碎羊脂伴炒過防風去義人參白茯苓去黑皮羌活去蘆獨活去蘆各三分附子泡製去皮臍各一兩柴胡去苗一兩半秦艽童便浸一宿洗焙檳榔木香各三分鱉甲童便浸一宿炙黃裙襴黃芪各一兩枳殼去穰炒甘草炙沉香桂去粗皮芎藭各二分蓯容酒浸切焙巴戟天酒浸一宿去心各一兩牛膝酒浸一宿切焙半夏薑汁浸一宿焙當歸酒浸一宿瓦上焙乾各三分烏藥米泔浸一宿銼焙各三分右銼如麻豆每服五錢水一盞半薑五片羊腎半枚同煎減半入酒半合更煎三二沸去滓通口服當空心午前各一服補益紫金丸出聖濟總録飲食無味形氣衰憊積氣上攻心膈不利身體羸瘦青蒿柴胡去苖各二兩芍藥五加皮續斷石斛去根黃芪羌活去蘆各一兩以上八味銼以無灰酒童便各二升浸至日中暴三日逐轉動日足漉出焙乾搗羅為末其浸藥者酒存熬後藥當歸切焙牛膝酒浸切焙各一兩桃仁去皮尖麩炒肉蓯容酒浸切焙各一兩半地黃汁取三升以上五味除地黃汁外搗羅為末同地黃汁並入前浸藥內慢火熬時時攪轉令膏凝即住火芎藭人參白茯苓去黑桂去粗皮蛇床子炒附子炮製去皮臍卷柏去根土炒蜀椒去目並閉口炒出汗木香厚朴去皮薑汁浸炙蓽澄茄各一兩右除十二味外將十一味搗羅為末並入藥膏同煎八味拌和令勻乾不可丸即添煉蜜為丸如桐子大每服三十丸空心日午溫酒服一月除百病肌膚充實顔色紅潤進飲食壯筋骨暖血海黑髭髮婦人屢經産育血海冷憊腰腹氣痛並能治之地黃沉香丸出聖濟總録治上熱下冷五勞七傷補益氣沉香銼鹿茸酒浸去皮酥炙肉蓯蓉酒浸切焙牛膝酒浸切焙附子泡製去皮臍兔絲子酒浸一宿各二兩搗爛黃芪銼出一兩熟乾地黃焙四兩蒺藜子炒去角二兩巴戟天去心芎藭石斛去根木香山茱萸羌活去蘆頭補骨脂炒蛇床子炒人參楝實取肉桂去根皮檳榔銼蘹香子炒骨碎補去毛安息香用胡桃肉穰二枚製各二兩右為末别取地黃自然汁七升棗膏四兩酒三升蜜半斤酥五兩於銀器中熬如膏放冷入羯羊筒骨髓半斤煉油去渣和前末杵千百下丸如桐子大每空心溫酒或鹽湯下三十丸加至四十丸豆䓻藿香湯治脾胃諸虛百損氣血勞傷陽氣衰下寒陰汗中脘停痰心腹痞悶疼痛嘔逆減食困倦泄㵼腸滑病虛損正氣不復婦人月信不勻産前後諸病一切陰盛陽虛之證並皆服之藿香葉桂花甘松各一分陳皮去白乾薑炮各五兩川芎白芷白术各二兩益智肉豆䓻人參縮砂仁各一兩紅豆茯苓去皮官桂五靈脂枇杷葉芍藥各五錢蒼术淨炒半斤甘草炙五兩半桔梗三兩半當歸三兩焙木香五錢厚朴薑製四兩半右為末每服二錢濃煎生薑棗湯調下食前日進三服或薑棗同煎和渣服亦妙因産病後氣不復虛勞損弱久服效妙蓮心散出簡易方治虛勞或大病後心虛脾弱盜汗痰壅飲食少體倦夢遺白濁滑泄人參白茯苓蓮肉各一兩白术甘草炙白扁豆薏苡仁微炒北桔梗乾葛炒黃芪炒當歸各半兩桑白皮半夏麴百合乾薑炮山藥炒五味子木香丁香杏仁去皮麩炒白芷神麴炒各一分右末每服二錢水一大盞薑三片棗三枚煎七分食前服建中湯出簡易方行血補氣溫榮養衛治一切勞傷腹切痛酒客不可與之其意惡甜故也芍藥六兩官桂三兩粉草二兩右㕮咀每四錢水一盞半薑五片棗三枚煎七分去滓食前溫服一法湯煎成去渣入飴一匙再煎溶服男子諸虛不足腰背疼痛肉酸疼筋骨䐜脹臍下虛滿喘乏不食或勞傷過度臟腑俱傷積勞虛損肢體消瘦氣短嗜卧寒熱頭痛咳嗽喘促嘔吐痰沫手足冷面容枯小腹拘急百節盡疼夜盜汗夢寐驚悸小便滑大便頻失血虛極心忪面黑脾腎久虛飲食不進汗病後服此調理或病後不復加黃芪一兩半名黃芪建中湯産後半月每日三服婦人血氣一切虛損或産後勞傷虛羸不食加當歸一兩名當歸建中湯産後半月每日三服今人傷寒氣痛及一切氣加烏藥香附各一兩更甚者入炒茱萸半兩丁壯或吐㵼狀如霍亂或冒寒失賊風入腹切痛加附子三分名附子建中湯疝氣絞痛無定處手足厥冷五內拘急而陰縮更加蜜一匕一名蜜附建中湯婦人血痛男子心腹㽱痛四肢拘急疼甚者加逺志五錢名加味小建中湯諸虛不足邪正相干寒痰咳逆咯血吐紅煩倦少力加人參半夏各半兩棗