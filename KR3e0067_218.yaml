同熬成膏肉蓯蓉酒浸切焙附子炮製去皮臍白术各二兩熟乾地黃焙何首烏銼碎用大豆蒸焙乾去豆補骨脂炒各三兩右為末以煎膏和丸每服三十丸空心溫酒下天真丸出經驗良方治先曾損血及脫血肌瘦絶不入食行步難手足痿血氣枯稿形神不足如滑腸絶不入食守死不治者如咽喉窄飲食不得只用五七粒漸漸服多服數粒便可起恙久服令人面色紅潤無有血者生血並津液大便燥者服之自潤實中有虛虛中有實皆治之羊肉七斤精者去筋膜脂皮仳聞入藥末當歸洗淨去蘆十二兩肉蓯蓉濕山藥去皮各十兩天門冬焙乾去心切一斤前四味置之肉內裹定用麻縷纒上色糯酒四瓶煮令酒盡摻在藥內再入水二升又煮直候肉如泥再入黃芪末五兩人參末三兩白术末二兩右以熟糯米飰焙乾為末一十兩前後藥末同劑為丸如桐子大一日約服三百粒初服百粒旋加至前數服之定覺有精神美飲食手足添力血脈使行輕健如久瘖不言者服之半月言語有聲咸云血下喘嗽咳行步不得服之必效恐藥難丸即入宿蒸餅五七枚焙乾為末同搜和入臼中搗千百下丸之用溫糯米酒送下空心食前服人參黃芪湯出濟生拔萃人參二錢黃茋三錢白术一錢陳皮去白一錢甘草炙五分當歸二錢茯苓一錢右㕮咀水煎空心熱服胃熱不能食者加薑棗煎黃芪湯出十便良方治口乾燥津液不生飲食不思黃芪乾地黃白芍藥五味子麥門冬去心各三分白茯苓一分甘草半兩右為粗末每服三錢水一盞半薑棗烏梅同煎去滓服靈砂寧志丸一名寧神丸楊氏家藏方治男子婦人大病後傷損榮衛發汗吐下太過或失血太多之後精神虧損不能復心神恍惚不能眠睡飲食全減肌體瘦弱怠惰倦乏且嗜卧四肢酸痛常服補虛益氣滋養榮衛令人肌體充實飲食進美悅澤顔色精神清爽諸疾不生辰砂二兩不夾石用夾絹袋盛於銀石器內懸於器內用椒紅三兩取井水調椒紅入於器內可分别用鍋子住水置硃砂器在內重湯煮令魚眼沸三晝夜為度取出辰砂細研水飛鹿茸燎去毛酥炙黃白术黃芪蜜炙各三兩石菖蒲二兩茯神去木人參右為末次入辰砂研勻用棗肉和杵一二千下丸如桐子大每服三十丸溫酒米飲空心任下蒼术丸補精益氣蒼术好者六兩去皮酒浸二兩醋浸二兩泔浸二兩乾熟地黃一兩蓮子肉半兩酒浸軟裝在豬肚內五味子枸杞子破故紙各一兩羊白腸一條將破故紙裝在腸內俱用焙乾一處碾為細末右為末酒糊丸如桐子大每服四五十丸蔥溫酒送下白石英散出千金方明目利小便治氣及補五勞七傷無所不治煉成白石英十兩用白英不拘多少以捶子研極細燒向明選去壓黑翳色暗黑黃赤者搗細下磁器內研令細熟以生絹袋於銅器中水飛如作粉法如此三度研訖澄之漸漸去水盡至石英曝乾有粗惡不淨者去之取水中央乃作在下有粗惡去之更研堪用者使熟絹袋子盛著磁碗中以碗益之於三斗米下蒸之飯熟訖出懸之俟乾更入於磁器中研之為成石斛蓯蓉各六兩澤㵼茯苓橘皮各一兩兔絲子三兩右治下篩總於磁器內研令相得重篩酒服方寸匕日二不得過之忌豬魚鵝鴨蒜冷酢滑黃茋湯治氣極虛寒皮毛焦津液不通虛勞百病力氣損乏黃茋四兩人參白术桂心各二兩生薑半斤右於器中貯之食前以酒和兩匕服羊血忌之甘草湯出千金方治虛羸惙惙氣欲絶甘草五味子生薑各二兩吳茱萸一升人參一兩右㕮咀水四升煮取茱萸小沸去渣取藥煮取一升六合二服服數劑佳補虛益氣潤五臟去痰嗽冷氣以仲思棗食之久服令人肌健好顔色不飢北齊時仙人仲思得之此棗因為名黃茋六一湯出和劑方大治男子婦人諸虛不足肌體勞倦胸中煩悸及焦渴唇口乾燥面色痿黃不能飲食或先渴而欲發瘡或癰疽而後渴者尤宜服此常服平補血氣安和臟腑黃茋去蘆蜜炙六兩甘草一兩右㕮咀每二錢水一盞棗一枚煎七分去滓溫服不拘時一方用麥門冬湯調下沉附湯出危氏方治上盛下虛氣不升降陰陽不和胸膈痞滿減飲食肢節痛倦宜服之附子炮去皮臍一兩沉香銼半兩右銼散分作三服水二盞薑十片煎八分食前溫服茋附湯出危氏方治氣虛陽弱虛汗不止肌體倦怠黃茋去蘆蜜炙附子炮去皮臍右各等分銼散每服四錢水二盞薑十片煎不拘時服胡麻粥治五臟虛損羸瘦益氣力堅筋骨胡麻巨勝右二味本草云其實六稜名胡麻八稜名巨勝蒸暴各九遍每服取二合用湯浸布裹挼去皮再研水濾取汁煎飲和粳米煮粥食之一方用胡麻巨勝白蜜一升共三味合之名曰淨神丸常服能休糧填人骨髓虛而吸吸者加胡麻用不飢耐老益氣丸麻子二升大豆一升右熬令香搗末蜜丸日二服正元散蓬莪茂一兩金鈴子去核一分右為末更入硼砂一錢煉過研細俱令勻每服二錢鹽湯或溫酒空心調服交感丹夫世人中年精耗神衰蓋緣心血少而火不能下降腎氣憊而水不能上升至心中膈絶榮衛不和所苦上則心多驚怖中則寒痞飲食減少下則虛寒遺泄至陰痿不興臟氣滑泄愚醫徒知峻補下田非惟不生水滋心而健偽失真立見衰悴夭折之由當由此此方安心志服之半年漸屛去一切暖藥不可恃以馳嗜欲然後力習祕固泝流之術其神效難殫述俞通奉遺訓豫年五十一嵗遇鐵甕申先生授此術酷志行持服大補而飲食嗜好不減壯嵗乃此藥之內功大矣今年八十五享天然之夀瞑目無憾由此耳普示群生同登夀域後有湯及白牙藥可同用牙藥方見牙齒門齒痛類茯神四兩白附子一斤碎去皮新水浸一宿炒黃色降氣湯益氣清神香附子半斤修製前法茯神二兩甘草一兩半炙右為末熱湯點二錢送下交感丹地黃散主氣益氣調中補絶令人嗜食除熱用生地黃三十斤細切暴乾取生者三十斤搗汁漬之令相得出暴乾復如是丸反暴搗末食後酒服方寸七勿令絶肉蓯蓉丸治下部虛損腹中疼痛不喜飯食平補用蓯肉二斤酒浸三日細切焙乾為末分一半醇酒煮作膏和一半入臼中搗五六百下丸如桐子大每服二十丸溫酒或米飲下空心食前五味子丸明目下氣除煩止渴養血活經絡無所不治用北五味子一裹約二斤揀淨用酒一斗浸一伏時取出或晒或焙碾為細末右將所浸藥酒熬成膏搜前件藥丸如桐子大每服二三十丸鹽湯溫酒任下空心食前臨卧並無所忌浸藥酒不用菉豆麴恐解藥力補虛止渴健脾胃氣去留血補中以飴糖白者蔓青汁煮頓服之四物湯治體氣虛當歸白芍藥熟地黃川芎各等分右㕮咀水煎又去熟地黃加乾薑人參名增損四物湯如體氣虛加側柏葉又宜水調麵醬服二陽丹補中益氣安心主驚止心脾不足五臟虛弱腰膝疼痛硃砂二兩人參一兩白术茯苓各一兩右研折為細末用附子數箇切蓋作甕子入藥在內將旋下者附子末同白麵用醋和作餅子先裹附子後以精羊肉一大片再裹甑內蒸熟一處杵爛用木臼乘熱搗丸如桐子大每服五七十丸空心食前溫酒下團參散補虛氣生津人參五味子白术各半兩甘草一分右作藥搗羅為粗散每服二錢以水一盞生薑三片同煎至六分去滓溫服不拘時一字散治氣虛頭痛右用大附子一箇剜去心全蝎一箇入在內以附子末同鍾乳粉一分麵少許和水裹炮熟都碾為末以黃色為度蔥茶下一錢又方半錢散大川椒芎二箇銼作四塊大附子一箇和皮生搗為細末右以水和附子末如麵劑裹芎作四處如附子末少入麵裹畢以針穿數孔子用真腦射薰有穴處內香在揑合穴子如未覺內有香即再薰一炷細羅灰用釩子內熱灰炮熟末之每服半錢蔥茶調下不拘時四醫惕吉老二方神良保真丸補虛羸接真氣充實骨髓益夀延年肉蓯蓉酒浸一宿切焙兔絲子酒浸一宿焙蘹香炒川楝子肉銼葳靈仙去土淨銼菖蒲九節者銼五味子破故紙炒香葫蘆巴炒蒼术米泔浸一宿焙乾白龍骨生獨活木香以上十二味各一兩牛膝酒浸一宿焙覆盆子揀淨天仙子炒杜仲去粗皮細切炒去絲乾熟地黃洗焙白薑炮狗杞子川椒炒去汗萆􅐺赤石脂巴戟天去心青鹽麝香另研以上十三味各一兩右件為細末將别研者再同研勻用好酒煮麵糊為丸如桐子大每服五七十丸溫酒或鹽湯下空心食前沉香鹿茸丸出楊氏家藏方補虛益真氣暖下元助老扶弱久服強健鹿茸二兩醋炙附子炮去皮臍半兩沉香半兩麝香一錢一字另研右四味為細末將肉蓯蓉一兩半酒煮爛研細另入酒熬成膏和丸如桐子大每服五十丸溫酒鹽湯任下空心食前青鹽椒附丸出楊氏家藏方治元臟氣虛臍腹刺痛飲食減少臟氣不調兼嗜卧及婦人血海久冷帶下赤白崩漏不止青鹽研香附子炒川椒揀去閉口並子炒附子炮去皮臍蘹香炒陳橘皮去白玄胡索蒼术泔浸一宿銼炒右件各等分為細末糊丸桐子大每服五十丸溫酒或米飲下空心食前茯苓丸楊氏家藏方治真元氣弱榮衛俱虛精滑不固神氣耗久服滋養血氣蠲除風冷使諸疾不至白茯苓去皮三兩兔絲子五兩酒浸一宿另研焙乾龍齒益智去殼破故紙炒逺志去心人參去蘆頭石菖蒲各三兩右件為細末煉蜜為丸如桐子大每服一百丸燈心湯下空心食前補陰丹出王氏博濟方治男子本臟氣婦人血氣一切氣積及産後諸血臟病患並宜服此硃砂硇砂各去石延胡索半夏湯炮芫花醋浸炒黃木香斑貓去翅足酒炒焦黑半兩海蛤荆三稜大附子炮去皮臍上蘹香蓬莪茂川苦楝子醋浸炒青橘皮各十兩肉豆䓻三箇檳榔三箇右件藥杵羅為細末酒煮麵糊為丸桐子大每服五七十丸女人用醋湯下丈夫溫酒或鹽湯下空心臨卧各一服大健元氣能療腸氣膀胱氣刺痛及婦人産後惡露不盡變作血瘕者並宜服之琥珀丸出衛生家寶方養心腎滋益氣血大人室女皆可服之琥珀三分乳香三分乾熟地黃三兩逺志一兩一分去心白茯苓一兩半附子一兩炮桂一兩一分人參一兩一分麥門冬一兩去心當歸一兩硃砂一兩研麝香一分研酸棗仁一兩用湯浸去皮石菖蒲一兩一分右為末和勻煉蜜丸如桐子大每服三十丸人參湯下日中夜卧服如孕婦去砂麝駐精丸出衛生家寶方鎮心安魂澀腸胃益氣力止泄㵼及夜夢遺小便白濁常服養神益力輕身耐老除百病白龍骨石蓮肉捶碎和殼用各等分右焙為末酒糊丸如桐子大每服三十丸米飲溫酒鹽湯任下空心日午晚服十補丸出朱氏集驗方治諸虛不足補元陽益真氣蘹香炒二兩葫蘆巴炒破故紙炒蒼术米泔浸一宿兔絲子各一兩酒浸一宿炒以上五味用煮酒浸三宿大川烏一箇一兩者醋浸三宿炒青鹽五錢丁香二錢木通五錢用鹽二錢酒一碗煮乾麝香五分右為細末用前浸藥酒煮糊為丸如桐子大每服四五十丸空心溫酒送下益中丹出米氏集驗方治益真氣補虛憊下焦傷竭臍腹絞痛兩脅脹飲食減少肢節煩疼手足麻痺腰腿沉重行步難目視茫茫夜夢鬼交遺泄失精神氣不爽陽事痿小便滑數虛腸鳴大便自利虛煩盜汗津液內燥並宜服之鹿茸蜜炙丁香木香蘹香炒山藥黃芪蜜炙木通麴炒官桂去皮乾薑炮青鹽石斛天雄炮附子炮鵝管石火煆酒碎陽起石肉豆䓻川牛膝酒焙破故紙葫蘆巴兔絲子酒焙金鈴子去核覆盆子去核熟地黃蓽澄茄馬藺花肉蓯蓉韭子沉香人參各一錢一字麝香三字右為細末酒煮糊為丸如桐子大每服三十丸加至五十丸空心溫酒服宋孝宗賜新安郡王吳珍傳吳武穆挺傳逆羲有提轄兼修合藥局官用禮被罪放罷押赴興元府中軍入隊使換吳彥是時任中軍統制年三十七患冷憊冷病為飲食過多食牛凍所傷服此藥三十五嵗間服養氣丹令髭鬢不白此藥之力也續斷煎治下經虛冷真氣不足經脈風寒氣血凝滯腰腿痛轉側不得續斷杜仲牛膝萆􅐺羌活木瓜白术各四兩狗脊青鹽熟地芎薏苡仁各二兩附子八兩右為細末以白麵酒煮糊丸如桐子大每服三十丸一方加生茱萸五味子各一兩空心食前抱婆丸治男子諸虛不足女人頭風男子氣虛弱吐痰腳氣腰疼下元冷憊並皆治之大附子一兩一隻炮去皮臍蒼术三兩米泔浸一宿南木香不見火大川烏去皮火炮天麻酒浸炙五錢右為細末酒煮麵糊丸如桐子大每服四十五丸溫酒鹽湯下頭風食後蔥酒下參歸湯補血氣俱不足黃芪七分人參二分甘草五分柴胡四分升麻四分益智少許草豆䓻四分熟地黃二分生地黃五分當歸身三分紅花少許右銼麻豆大都作一服煎法如常食逺杜仲散益氣補虛治男子羸瘦短氣五臟摟倦腰疼不能房室杜仲蛇床子五味子熟地黃六兩蓯蓉逺志去心各八分木防己五分巴戟天七分兔絲子一錢右治下篩食前酒服方寸匕日二常服不絶佳溫中益氣以雞喉菜作羮食之益氣輕身久服不飢堅筋骨能行步以東牆子為飯食之主通神益智健氣駐顔以荔枝食之補中益力氣以烏藥葉及根嫩時採作茶片又碾煎服主不飢益氣輕身取薏苡子蒸令氣餾暴乾磨取炊作飯及麵食之主益氣安身遺泄溫腸以都角子食之久服無所損也補虛益氣力久服不飢厚腸胃以萍蓬草根食之年當穀也益氣力寬腸令人不飢健行以榛子食之軍行食之亦可當糧益氣安神養血生肌以摩厨食之久服健人也鹿血酒服之令人血氣充盛以生鹿血和酒服之昔云有人服鹿血酒云得於射生者因採捕入山失道數日飢渴將委頓惟獲一生鹿刺血數升飲之飢渴頓除遂覺血氣充盛異常人有效其服餌刺鹿角間血酒飲之更佳益氣力以白鶴血飲之益氣力取胡燕屎二十枚投酒二升中漬之三日後取令夜服一二盞隨性多少甚益氣力補中益氣和五臟調經絡續氣脈用小麥作粉食之補中益氣續絶傷止泄痢消渴取牛骨髓和酒服之溫中益氣補下元以米稻舂米食之即不發病耳益中空膈取薏苡葉為飲服甚勝補腸胃肥中益氣以棗蒸煮食之治補益虛羸之損以桄榔麵食之白蒿葅方以白蒿葉挼醋淹之為葅食之甚益人治益精氣強志意以利耳目以雞頭實三合煮令熟去壳研如膏入粳米一合煮粥空心食之利腸胃益氣力去熱益人以米為飯食之久服不飢治氣虛以訶梨勒綏煨熱少服補虛羸之損溫腸胃之嘔逆以師草實食之久食健人主開胃益氣以石首魚和蓴茱作羮食之益氣調中耐飢強志以葡萄釀酒服取藤汁釀酒亦佳狗肉汁釀酒大補調中益氣止泄除痰壓時氣去熱嗽用鼠麴草雜米粉作糧食甜美荆楚嵗時記云三月三日麴草汁和蜜為粉謂之龍舌粄以壓時氣益氣力安中補不足利胃宜脾用稷作飯食之良不可久食多熱令人煩悶普濟方卷二百十八
