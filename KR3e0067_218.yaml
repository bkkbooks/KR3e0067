肉蓯蓉酒浸一宿削去皺皮炙乾右藥各一兩搗羅為末煉蜜為和搗二三百杵丸桐子大每日空心溫酒下三四十丸蘹香烏藥丸一名金叉石斛丸出聖濟總録治臟真衰耗氣羸力乏脅肋脹痞滿喘急腸鳴腹痛頭目多倦膝脛痠疼肢體怠惰食無味宜服方見本門補益諸疾類桂朴當歸散治諸虛和氣血腸痛泄㵼胃口停寒婦人血海虛冷臍腹㽱痛月候不勻赤白崩漏一切脾腎虛寒之證並皆服之桂川芎當歸焙芍藥桔梗蘹香五靈脂炒良薑炒各三兩厚朴三兩半甘草炙乾薑三兩二味同搗炒加黃芪白茯苓橘皮去白各四兩右為細末每服二錢濃煎生棗湯調下食前服天真丸出儒門事親書補虛損威靈仙一兩當歸五錢縮砂仁一兩蓮子肉三兩炒熟廣茂半兩乾地黃一兩酒浸甘草二兩牡丹皮一兩牛膝酒浸一兩木香半兩白茯苓一兩佛袈裟男用女女用男以新水二擔洗淨血水酒浸爛為泥右為細末同搗羅為丸酒浸蒸餅為丸如桐子大每服五十丸日三服大補氣出千金方乾地黃五兩甘草秦艽各一兩乾薑昆布地骨皮各四兩白术桂心人參厚朴海藻各三兩羊腎一具去膏四枚羊肚一具治去膏蒸右治下篩內羊肚中合腎縫塞肚口蒸極熟為度及熟木臼合搗肚腎與藥為一家曝乾更搗為散酒服方寸匕日進二服巴戟天丸出醫方大成治腎肝俱冷虛收斂精氣補真戢陽充悅肌膚進飲食五味子川巴戟肉蓯蓉兔絲子人參白术熟地黃覆盆子茴香牡蠣煆白龍骨骨碎補去皮毛益智仁右為末煉蜜丸如桐子大每服三十丸空心食前米飲下日二三服補精止汗正元丹出聖濟總録治下經積冷補虛損益氣血壯筋骨附子炮製去皮臍阿魏醋化麵和作餅慢火炙各一分硫黃研逺志去心沉香各五錢檳榔炮銼二枚木香一分青皮湯泡去白焙蜀椒去目並合口焙去汗乾薑炮蘹香子炒桃仁去皮尖雙仁不用炒各半兩右為末酒煮糊丸桐子大以丹為衣每服十五丸至二十丸食前溫酒或鹽湯下黃耆丸出聖濟總録治下臟積冷補虛益氣澤潤肌膚黃耆銼肉蓯蓉酒浸切焙人參防風桂去粗皮天雄炒桔梗炒牛膝酒浸切焙白术芍藥白茯苓去皮附子炮製去皮臍各一兩右為末煉蜜丸桐子大每服二十丸溫酒或鹽湯下空心服黃耆益損湯出直指方治諸勞倦肉桂熟地黃半夏甘草炙各三錢石斛酒炒當歸酒炒川芎黃茋炙白术各一兩白芍藥一兩半木香三錢北五味子半兩右銼細每服三錢薑五片棗二枚食前煎服有熱加柴胡益榮丹出瑞竹堂方治心脈結而散肺脈浮而軟餘脈如經原所自思慮傷心憂慮傷肺蓋心乃諸血之會肺為諸氣母心虛則血少脈弱則氣虛遂至目澀口苦唇燥舌乾甚則齒痛鼻為之不利怔忡白濁腠理不密易感寒邪今以補氣湯補氣以養肺益榮丹滋血以助心榮衛充心肺職治諸疾自愈當歸二兩去蘆酒浸切焙紫石英火煆醋淬數次研細一兩柏子仁炒另研酸棗仁去殼小草木香不見火茯苓去木桑寄生卷柏葉熟地黃洗淨酒蒸焙龍骨各一兩另研辰砂半兩另研右為細末煉蜜丸如桐子大辰砂為衣每服七十丸食前麥門冬湯送下萬安丸名與山藥丸出危氏方補下經起陰發陽能令陽氣入胸安魂魄開三焦破積聚消五榖益子宫安臟腑除胸中熱強筋骨輕身明目去冷除風無所不治補益極多服最妙七十老人服之常有非常力方見虛勞門虛勞羸疲類人參養榮湯出醫方集成治積虛損四肢骨肉痠痛吁吸少氣行動喘小腹拘急腰背強痛心虛驚悸咽乾唇燥飲食無味陽衰弱恐憂慘戚多卧少起久者積年急者百日漸瘦削面少顔色五臟氣竭俱可煎服又治肺大腸俱虛咳嗽下痢喘乏少氣嘔吐痰涎白芍藥一兩當歸陳皮黃芪桂心去粗皮人參白术崴甘草各一兩熟地黃製五味子茯苓各七錢逺志炒去心半兩右銼散每服四錢水半盞薑三片棗三枚煎七分去渣溫服便精遺泄極加龍骨一兩咳嗽加阿膠尤妙鍾乳散治氣極虛寒陰畏陽氣晝寐暮甚氣短息寒亦治百病令人力強能飲去風冷鍾乳乾薑桔梗茯苓細辛桂心附子人參各一兩六錢白术一兩防風括􅌣根牡蠣各二兩半右治下篩酒服方寸匕日三漸加至二七五十以上可數服得力乃止千金翼云有冷加椒有熱加黃芩各三兩枸杞還童丸出德生堂治肝腎俱冷眼目昏花飲食少進此藥製煉取日精月華之氣於蒼术之中有通仙之妙可益氣延年宜服之茅山蒼术一斤四兩酒浸四兩米泔浸四兩鹽水浸四兩醋浸各浸巳日將蒼术和合各一處自初伏一日為始早辰朝東曬日午南曬至晚西曬夜則露天明放至伏盡日收起不曬如遇天隂下雨收藏至晴明日再曬西枸杞子一斤曬乾另研細用右為末和勻酒糊丸如桐子大乘空心棗鹽湯或酒下五七十丸或米飲湯下古杭陳鑑以此常服年近九十親筆傳神不減少年餘人服之咸有神效太乙守中丹出御醫院方治陰氣不足虛熱內生陰痿不振天門冬去心白茯苓去皮楮實子逺志去心萆薢熟乾地黃木香各一兩人參地骨皮牛膝焙地膚子炒香各二兩右為細末煉蜜丸桐子大每服五十丸溫酒或溫水空心服下亦得加至八十丸五補湯出千金方治五臟內虛竭短氣咳逆傷損鬱悒不足下氣通津五味子桂心甘草人參各一兩麥門冬小麥各一升生薑半片粳米三合薤白枸杞根白皮各一斤右㕮咀水一斗二升煮取三升每服一升日三懆者先煮竹葉一把水減一升去葉內諸藥煮之杜仲丸出瑞竹堂方補心腎益氣血暖元臟縮小便壯力蓮肉去心四兩龍骨七錢半新瓦上煆另研細益智仁破故紙炒蘹香各一兩微炒牛膝去苖一兩酒浸洗白茯苓去皮一兩兔絲子四兩杜仲去皮銼酒拌炒斷絲一兩桃仁湯泡去皮尖淨炒一兩右為細末用山藥四兩炙為末打糊丸如桐子大每服五十丸棗湯下空心食前溶溶暖火藏