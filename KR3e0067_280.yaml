body:
  text: 普濟方卷二百八十明周王朱橚撰諸瘡腫門論疥附論夫瘡疥之為病雖苦不害人然而至難治者多矣素問云諸痛癢瘡皆屬於心由心氣鬱滯或飲食不節毒藴於腸胃發見於皮膚又方有所謂馬疥水疥乾疥種類不一生於手足乃至遍體或癢或痛或膿或腫或皮肉隱嶙或抓之凸起或㾦㿔或膿水浸淫治之內當理心血袪散風熱外則加以敷洗理無不愈字書以疥有介守之義言疥雖微小然守形體而難治也是以疥有五名皆因風氣邪氣客於肌膚之間久則化而為蟲時則發作故凡瘡腫焮赤痛者謂之大疥皮肉隱起結根搔之不痛謂之馬疥瘙癢皮起謂之乾疥三者為重以風熱深在肌肉故若水疥㾦㿔如粟漿濕疥瘡上面汁出特風熱淫於皮膚之間故淺而輕也然皆風熱之客故皆有蟲或以謂蟯蟲內出理或然也治宜疏風滌熱當以薰浴傅塗之法與湯劑並行則善矣方神仙疥藥硫黃六兩雄黃三兩雌黃三兩天仙子三兩芫青二兩紅娘二兩寒水石二兩井泉石二兩桔白三兩黑狗脊八兩大楓子仁三兩大黃三兩斑貓二兩輕粉三錢蛇床子八兩人言三兩狼毒八兩川烏八兩藜蘆一兩右為細末生豬油調藥生絹袋盛之火炙取汁搽鼻聞立效忌口苦參散出聖濟總録治遍身瘡疥風熱或痛或癢苦參三兩人參丹參沙參玄參各一兩秦艽去苖土各一兩半白蘚皮升麻各一兩一錢枳殼去瓤銼炒令黃色各一兩梔子仁犀角屑二兩黃芩去黑心芍藥一兩一錢當歸切炒一兩半蒺藜子去刺炒一兩防風去義一兩一錢黃連去鬚一兩半白花蛇炙黃色去皮骨二兩右為散每服二錢用溫酒一盞調下日晚再服烏蛇散出聖濟總録治一切疥風癢瘑瘡等烏蛇酒塗炙去皮骨二兩羌活去蘆頭白蘚皮苦參人參枳實去皮麩炒蒺藜子炒去角黃芩去黑心山茱萸漏蘆牡蠣熬附子炮刮去皮臍白殭蠶玄參秦艽去苖土甘草炙銼防風去叉甘菊花搗各一兩右搗羅為細散每服五錢空心酒調下五參散出聖惠方治諸疥風虛惡瘡人參去蘆頭玄參丹參沙參去蘆頭苦參各一兩蒺藜子炒杵去尖秦艽去苖土各半兩梔子仁三分黃芩去黑心半兩烏蛇酒浸一兩獨活去蘆頭茯神去木山芋麻黃去根節細辛去苖葉防風去義各半兩枳殼去瓤銼炒令黃色三分右搗羅為散每服三錢空心熟水調下日晚再服以瘥為度一方有甘菊花溫酒下名白蒺藜散升麻和氣飲出三因方治瘡疥發於四肢臀髀痛癢不常甚至增寒發熱攻刺疼痛浸淫浮腫又癩風入臟隂下溼癢耳鳴眼痛並皆治之乾薑熟枳殼各半兩熟蒼术桔梗升麻各一兩當歸乾葛茯苓白芷各二錢陳皮甘草各一兩半熟半夏芍藥七錢半大黃蒸半兩右銼散每服四錢水一盞半薑三片燈心十五莖煎至七分去渣服治瘡疥腰胯手足皆生瘡疥者出千金方栝蔞根四兩黃連芍藥薔薇根鼠李根皮黃蘖各三兩苦參黃耆黃芩石龍苪各二兩大黃當歸續斷各一兩右為末蜜丸如梧桐子大以薔薇飲服二十丸日二加至三十丸又方治療瘑疥柿樹皮燒煙欲盡以缶蓋滅火研一兩荷葉如前法燒灰取一兩草烏去皮尖半兩硫黃半兩黃連半兩去鬚黃蘖半兩去粗皮胡椒半兩雄黃研細半兩白蕪荑半兩淨細辛半兩黃芩半兩白礬研三錢輕粉一錢右為細末和令勻濕瘡乾摻乾瘡用烏桕油或酥或油蠟調塗夜間以手掌多擦藥有癢處即以手掌擦之一方有苦參無黃芩赤小豆散出聖濟總録治濕乾疥赤小豆三合炒乾納醋中如此七遍人參甘草炙令赤色銼白斂當歸切焙瞿麥穗黃芩去黑心豬苓去義黑心半兩防風去叉各半兩黃耆銼薏苡仁升麻各三分右細散每服三錢空心以粥飲調下日二夜一藜蘆膏出聖濟總録治瘡疥藜蘆去蘆頭一兩半石硫黃研豬牙皂莢乳香研各半兩附子一分杏仁去皮尖研半兩膩粉一分巴豆去殼研半分豬脂五兩酥二兩白礬研一分豬膽二枚右搗研九味為末先熬脂酥膽汁令沸即下諸藥末攪勻以磁盒盛每日塗摩三五度苦參散出聖濟總録治遍身瘡疥風毒瘙癢苦參白花蛇酒浸去皮骨炙各二兩黃連去鬚當歸切焙各三分人參玄參丹參沙參芍藥蒺藜子炒去角防風去義各半兩右為細末每日不拘早晚溫酒調下二錢日一夜二妙功散出瑞竹堂方治疥瘡黃柏蛇床子白礬各等分右為細末用後藥煎油調搽清油二兩黃柏花椒巴豆數粒蔥三莖厚朴枳殼各少許右同清油一處熬數沸濾去渣將妙功散於熱油內更加桕油燭一二枝放冷調搽赤小豆湯出仁存方治少年血氣俱熱遂生瘡疥變為腫滿或煩或渴小便不利赤小豆炒當歸去蘆炒商陸澤㵼連翹仁赤芍藥漢防己木豬苓去皮桑白皮炙乾漆已上各半兩右㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候熱甚者加犀角二錢半一方無漢防己當歸飲子出仁存方治心血凝滯內藴風熱發見皮膚遍身瘡疥或癢或痛或膿水浸淫或發赤疹㾦㿔當歸白芍藥川芎生地黃白蒺藜荆芥穗各一兩何首烏黃耆甘草各半兩防風去蘆一兩右為細末每服四錢水一盞半生薑五片煎八分去渣不拘時候溫服若於浴堂內服此藥就用胡桃仁七箇去皮細嚼下飲酒一盞出汗神效治瘡疥樟腦白礬檳榔蕪荑翦草生硫黃蛇床子花椒細辛右用硫黃樟腦加倍餘藥等分細研香油調敷瘡溼者乾敷一方加消風散又方治疥瘡雄黃硫黃黑狗脊白礬藁本蛇床子斑貓巴豆各等分人言少許右為細末或烏桕油或豬脂調和為丸用氣呵手心熱將藥勻擦開搽之為驗一擦膏出仁存方治一切瘡疥雄黃黃連黃柏苦參蛇床子鹿梨白礬翦草松糖各等分右為末瘡乾用油調搽溼瘡乾摻又方治疥瘡蛇床子一斤花椒全蝎各二兩五倍子百部白礬硫黃貝母各四兩右為細末香油調搽治癩頭疥瘡硫黃二錢半黃丹黃連藜蘆蕪荑五倍子各二分半黃柏一錢半穀雨前茶五錢右為末先將患處摩擦用芝麻油調敷之治風疥瘡雄黃白硫黃狼毒人言蛇床子炒水銀輕粉末茶各等分右為細末羊豬膏調塗之神異膏出仁存方治一切瘡疥全蝎七箇去毒皂角一挺銼碎巴豆七粒去殼蛇床子取末三錢麻油一兩黃蠟五錢輕粉半匙雄黃三錢另研右先將皂角全蝎巴豆煎油變色去三味入黃蠟化開取出冷定入雄黃蛇床子末輕粉和勻成膏先用苦參湯溫洗却以藥擦瘡疥上神效一方加斑貓七箇去毒加蔥煎油又松葉煎湯淋洗神效苦參湯出危氏方苦參蛇床子白礬荆芥穗右各等分煎湯洗之治風疥及寒溼諸雜瘡方千年韭根好礬石雄黃藜蘆瓜蒂胡粉各一兩水銀三分右以栁木研水銀使星盡用豬肝一升煮藜蘆韭根瓜蒂三沸去渣入諸藥和勻調令相得即成以敷之神良一笑散治渾身疥癩瘙癢生惡瘡檳榔藁本硫黃苦參蛇床子五倍子白膠香各等分右為末濕者乾搽乾者油調搽如頭上瘡便搽上不用剃甚者不過三五次便平復如故大黃膏黃連十四銖藜蘆十二銖大黃一兩乾薑十四銖䕡茹十銖莽草十二銖羊躑躅十銖右搗篩以煎成豬脂二斤微火向東煎之三上三下膏成去痂汁盡敷之神效合時勿令婦人雞犬見之疥藥出百一選方雄黃硫黃地黃翦草蛇床子白礬飛過右等分為細末麻油一兩巴豆七粒同煎候巴豆焦去巴豆不用候油冷旋調藥搽藁本散治疥藁本蛇床子黃柏各半兩硫黃三錢半白礬五分輕粉炒一錢半右同研勻油蠟為膏子擦之止癢除疥一浴散出瑞竹堂方治疥瘡熱毒硫黃雄黃漢椒玄精石枯白礬各等分輕粉右欲治疥時早起空心飽食乾物勿食飲湯煎大防風通聖散一貼入白沙蜜二兩送神芎丸五七十丸入浴堂內令汗出便休下湯浴將疥抓破用前藥以清油搽之入浴堂內洗就浴堂內如此擦洗三次方才出浴更不須再搽藥合掌散治疥瘡䕡茹蛇床子各二兩苦參二錢生硫黃一錢雄黃輕粉各一錢右為細末香油調於手心擦之如熱鼻嗅之次將兩手交互合於大腿上安眠檳榔煎丸出聖濟總録治風毒疥一切風壅檳榔銼羌活去蘆頭枳殼去瓤麩炒獨活去蘆頭白牽牛略炒黑牽牛略炒各半兩右為末用大皂角一尺已上者一挺挼汁煎膏和丸如梧桐子大臨卧溫酒或熱水下三十丸量人虛實加減久患瘡疥服之即愈神捷散出聖濟總録治諸疥瘡吳茱萸一兩赤小豆四十九粒白蒺藜一兩白蕪荑仁半兩輕粉五錢石硫黃少許研右搗研為散令勻每用生油調藥半錢於手心內摩熱後遍揩周身有疥處便睡覺其疥自愈疥藥大楓子舶上硫黃􅒝麻子白礬胡桃豬脂各等分右為細末用生絹袋兒盛膏一處搽胡麻散出德生堂治心血凝滯內藴風熱發見皮膚遍身瘡疥或癢或痛或膿水浸淫或發赤疹㾦㿔胡麻十二兩荆芥苦參首烏甘草炙葳靈仙各六兩右為細末每服二錢酒調服茶清亦可隨證上下服六根散治蟲瘡疥藜蘆根黃柏根烏藥苦楝根不辣回根芫花根各等分右為末麻油調敷之殺瘡藥出三因方羊蹄根生切二兩薑一分礬一錢半硫黃一錢草烏頭一箇右以米泔淹一宿研極細入釅醋和勻入浴時抓破瘡敷之遲頃以溫湯洗去絶妙苦參散出衛生寶鑑方治遍身瘡疥經年不效苦參蔓荆子何首烏荆芥穗葳靈仙各等分右為細末每服二錢食前酒調下日進三服忌發風物雞子塗方出聖濟總録治惡疥瘡雞子七枚炙熟取黃熬成膏膩粉亂髮灰白礬各一分石硫黃研半兩右除雞子外研為末雞子膏和研令勻塗敷患處日三五度即瘥當歸丸治諸般瘡疥何首烏八兩草烏四兩苦參八兩赤土三錢半荆芥四兩右為細末用醋糊為丸如梧桐子大每服六七十丸溫酒送下治瘡疥硫黃白礬薄荷石膏蛇床子右各等分為末生豬油調搽五龍散治諸疥瘡蛇床子炒花椒炒牙硝枯礬土硝各等分右為細末柏油調搽治風疥瘡何首烏蔓荆芥蛇精草甘草荆芥各等分右為末茶清調下忌胡椒酒日進三服治疥瘡全蝎檳榔藁本硫黃防風各等分右為末油調掌中搽瘡上又方藜蘆根一兩蛇床子銀硃枯白礬雄黃各二錢半右為末油調搽水黃膏出德生堂治一切瘡疥不用臭硫黃者有效真狼毒五錢倭黃三錢輕粉二錢水銀三錢末茶先研如泥右與前􅟢藥三味俱為末入水銀內再碾為膏用少許於手心搓揑時聞藥氣則瘡愈矣巴豆膏出聖惠方治一切瘡疥有蟲時作瘙癢巴豆七粒去皮研硫黃半兩細研白礬半兩燒灰蕪荑半兩豬脂三兩右為末煉豬脂成油入前藥末調和令勻每用蓮子大於手掌內搓塗之如意散出御藥院方治疥瘡時發癢痛乾漆生黑狗脊生輕粉研生黃耆生研各一兩右為細末研藥令勻每用藥先微搔用生油調如稀糊擦患處一日三兩次合掌散出仁存方治瘡疥羌活獨活硫黃輕粉各二錢右為末用麻油腳傅塗手心中擦熱嗅了却擦在瘡上硫黃散出仁存方治瘡疥硫黃荆芥穗黑狗脊蛇床子各等分右為末油調成膏先以火炙瘡令癢抓破依前方嗅後擦瘡治疥瘡一名四聖膏出百一選方藜蘆根掘取不拘多少生薑半之白礬隨意用吳茱萸看多少入右同於砂盆內入米醋爛研以淨器盛之候白醭生方可用遇浴時以代皂角不過一兩次即安若遍身生者尤宜用之治疥神效狼毒二錢細辛一錢水銀一錢輕粉半錢右為細末油蠟和劑作兩丸綿裹兩手將於周身疥多處擦之一掃散治大人小兒諸般瘡疥白秃肥爛瘡癢疼流水者如神香白芷五兩生不見人明礬五兩生臭硫黃一兩樟腦少許右為末香油調傅擦之再擦如此上三五次尅日見效用豬膏亦妙先以皂角蔥白煎湯洗淨後上藥治疥瘡海桐皮蛇床子雄黃硫黃右各等分為末用香油調傅黃薰方出聖惠方治諸疥雌黃研雄黃研石硫黃研各半兩熟艾五兩末右同研和令勻將藥鋪在紙上令勻緊捲如餅餤樣用麵糊粘却切為四段患人早食及大小便了當仰臥安藥於四口瓦內兩腋下兩髀下以火燒煙用水洗舊布單上以厚衣覆不令通風汗出至曉藥煙盡即去藥瓦以瘥為度烏頭散出聖濟總録治諸疥烏頭吳茱萸石硫黃莨菪子各一兩右為散用生油調如糊塗患處三五度即瘥硫黃塗傅方出聖濟總録治諸疥石硫黃研一錢蜀椒去目及合口者吳茱萸黃蘗各一兩右搗研為散用生油調如糊塗傅疥上日二三異方疥瘡藥出經驗良方百發百中水銀滓五錢研細粉朴硝二錢天南星草烏各一錢右為末和勻用清油半盞又入連鬚蔥一根於油內煎令香熟去蔥將藥調塗患上治疥不拘久新方出本事方白蕪荑一兩檳榔吳茱萸各七兩硫黃二錢另研右為末麻油調抓破擦搽又方出直指方治諸疥乾癢生明硫黃五錢黃丹獐腦各一錢輕粉半錢右為末乾寒熱癢赤腫加荆芥三黃膏治瘡疥久不痊者皂角三箇斑貓巴豆各二十箇黃柏半兩右將臘脂一盞煎至藥黑色濾去渣次入硫黃雄黃末攪勻搽疥藥方蛇床子一兩香白芷二錢舶上硫黃一錢半右為細末香油調搽疥藥方寒水石舶上硫黃川椒蛇床子各等分右為細末小油調搽忌自死雞鵝肉疥藥方羊尾子油二片大楓子二十箇去皮白硫黃一錢查肉三十箇去尖右合做一處搗爛用生絹布袋裝每日掌在手中聞又疥方明礬治枯一錢蛇床子二錢半樟腦一錢明硫黃一錢右為末擦在九竅內臍中腋下等處神驗吸氣入肚自然好備急葛氏療疥瘡方取楝根削去上皮切皂莢去皮子等分熟搗下篩脂膏和搔疥去痂以塗之護風勿使女人小兒雞犬見治疥瘡用黑神散酒調服畢即入混堂洗浴愈治疥瘡花椒三兩香油四兩烏桕油四兩舶上硫黃一錢右用香油浸椒一晝夜用鐵器以油熬椒慢火數沸候椒焦色去椒入桕油候油溫些入硫黃冷成膏搽瘡荆芥丸治疥瘡及風熱瘡以荆芥穗不拘多少為細末蒸爛入蘿蔔於木石器內爛搗為丸如梧桐子大每服三四十丸食後茶湯熟水任下服荆芥藥忌食無鱗魚薰疥方明信雄黃各半錢椒末一錢右研細用紙一方尺熟艾攤平摻勻捲成長錠瓦兩口合紙捲子點火慢慢煙薰被下緊擁衾被油塗眼耳口鼻小兒只空衣蓋被臥亦效宜淨室溫床牢擁衾被無令透煙以薰氣至其人口鼻為效牽牛子丸治一切風熱疥瘡攻注牽牛子一兩一半瓦上炒一半生用蘹香子一兩微炒陳皮二兩水浸去白於瓦上焙乾右為細末用生薑汁煮麵和為丸如録豆大每服空心臨卧用炒鹽湯下十丸丹參洗湯治疥及風瘙苦癢成瘡丹參苦參各四兩蛇床子四兩右銼搗以水一斗煎取六升濾去滓溫洗瘡上用絹帛拭乾以藥塗摩三五度即瘥治疥瘡藥斑貓去嘴腳用三箇以枯柴燒慢火爐糯米一合和炒至米黃為度去米生硫黃一錢信石即白砒霜一錢右為末至夜滅燈時用清麻油調藥掌上合擦心熱以鼻逺吸其氣三四次却搽蕩患處不問乾濕疥瘡却不可抓破摩蕩瘡上至於偏僻處切不可搽仍忌鴨子及水洗神效治積年疥瘡不愈者名胡粉散水銀三錢又茶末少許於瓦器用津液擦化作末輕粉三錢狼毒一兩置水中沉者取為末一半生用一半炒右用清油調生鐵衣名鐵鏽油摩塗疥癩若蜘蛛蟲等毒磨蒜兼傅之或清油浸藥出藥面一寸髙過夜不見燈火只點清油塗瘡上仍以口鼻於藥盞上吸入藥氣諸疥方透明生硫黃半兩明白礬煅二錢半白蛇一條去中心骨燒存性右為末麻油輕粉調抹又方生明硫黃半兩煅石膏二錢黃丹一錢右為細末麻油調抹潤澤丸治遍身熱瘡疥大黃一兩黑牽牛半生半熟天仙子各一兩右為細末用皂角子為丸每服五七十丸溫水送下腎臟風發瘡疥雞心檳榔二箇破開以黃丹三錢合在內用濕袋裹煨全蝎六箇明硫黃四錢右為末入輕粉半錢麝香少許青黛末半錢於磁器內收每用少許清油調抹兩掌掩外腎以兩掌掩兩乳各睡至醒次日又用經驗又疥方柏油明礬花椒各等分右為細末入香油調敷上數次立效一擦膏治一切瘡疥黃連淨蛇床子去皮石膏煅各等分右為末却以輕粉硫黃各三錢並和為末真麻油調傅治埋頭疥瘡未出皮并小兒頭煉腳煉并背煉硫黃蛇床子各等分右為細末用生豬油調藥搽鼻聞立效忌口一方搗為散同研令勻夜間欲卧時先以熟鹽漿水洗瘡取生麻油調塗之於避風處以綿被蓋之取汗為度快肌丸治遍身疥瘡不瘥葳靈仙去土一兩半焙細末豬膽三枚右取膽汁和丸如梧桐子大每服二十丸荆芥湯下無時候何首烏洗瘡治乾濕疥滿身作瘡不可藥者及風癢瘡何首烏艾各等分細銼右相度瘡多少用藥並水煎令濃於盆內盛洗之拭乾敷取艾煎膏治一切惡瘡疥方出聖濟總録黃柏末石灰研右等分研極細以生麻油和如薄麵糊淨洗瘡塗四五次瘥烏頭煎出聖濟總録治瘡疥甚者烏頭每箇四破之大豆一兩半右同入砂瓶煮及爛每服烏頭一片豆少許空心酒服下立效散出聖惠方治疥瘡經久不愈朴硝三兩研細如粉硫黃一分研極細右和勻臨卧清油調敷上一夜三次明日便愈一方用生麻油調塗烏頭丸出經驗良方川烏頭一兩去皮尖生用荆芥穗二兩右為末米醋糊丸如梧桐子大每服三十丸溫酒或熟水送下日三服無時蟬蛻散出危氏方治疥瘡蟬蛻薄荷各一錢右為末五更酒調服入混堂浴蕩候臭汗出盡再以湯淋之枳殼丸出聖惠方治一切風熱生瘡疥枳殼四兩去瓤麵炒微黃苦參八兩銼右為末蜜水和搗三二百杵丸如梧桐子大每於食後以酒下三十丸又方治疥瘡藜蘆海桐皮右各等分入明礬輕粉各少許油調搽治患疥已十五年遇冬則為瘡昔有人少患疥十五年遇冬則為瘡人教用後藥取愈出百選方羊蹄根蛇床子根各等分右片切如錢米泔浸二三宿漉出入生薑礬同研細裹以生布遇浴先擦洗良久以水澆三四次用即除根後數年再生用前法亦愈治疥癆等瘡出百一選方硫黃白礬右各等分肥皂倍之羊蹄根又倍之同搗為丸浴時揩擦癢處微痛甚妙治疥瘡方出肘後方以巴豆十粒火炮過黃色去皮膜用順手研如麵入酥少許膩粉少許同研勻抓破以竹箆子點藥不得落眼裏及外腎上如煎銼著外腎以黃丹塗甚妙治療瘑疥出十便良方用雄黃一兩黃連松脂各二兩髮灰如彈丸大四塊鎔豬膏與松脂各熱搗以敷瘡上大良又方出肘後方用油麻莖苦酒和磨硫黃塗之並佳又煮苦參飲之良薰疥法取艾如雞子大先以布裹亂髮於紙上置艾薰黃辰砂末杏仁末水銀各如查仁許水銀於掌中以唾研塗紙上以捲末藥炙乾燒以薰之一云筒瓦一口一用安灰蓋上以繩束之用薰疥如腳頭被內置之少時火盡上隔日一薰不過再即瘥治疥癆傳信適用方用豬膏煉油石灰細羅二味以意度多少一處銚內炒以乾為度先鋪紙在地却傾所煉豬膏石灰於其上用盆蓋之出火毒一夜研末乾擦治瘡疥出經驗濟世方用地錦草裹皂角燒為灰入硫黃同研為細末入好粉油調淨浴了用一分敷瘡上一分塗兩手心一分塗外腎臨臥蓋了用兩手捧外腎婦人掩玉門禁抓一夕芫花膏出聖惠方治瘡疥用芫花一味以豬脂煎候焦去渣常用搽疥上治疥一名硫黃散出百一選方用硫黃不拘多少用尉斗內鎔成汁以荆芥穗手撚碎投之候乾放冷研為細末每用藥以手抓破擦藥在上即愈仍不作硫黃氣治遍身風癢生瘡疥出肘後方用蒺藜子苖煮湯洗之立瘥又方出肘後方用茵蔯不計多少火煮濃汁洗之立瘥又方出肘後方用竹葉為末以雞子白和之塗上不過三四立瘥治疥瘡方杵蟹傅之亦效治久疥方用兔骨同醋磨敷之治疥方出肘後方用羊蹄根熟搗和豬脂塗上或入鹽少許治疥瘡方用薤葉煎湯洗之佳搗如泥敷之亦可石菖蒲散治疥瘙癢用石菖蒲搗為末油調塗之又方治疥瘡久不瘥用狐肉空心服之腸肚性寒患瘡疥久不瘥者作羮臛食之又方出危氏方用大紅川椒去目水蘸濕半日夾山查仁研膏擦手如去垢法亦效肘後療疥方出十便良方用石灰二升以湯五升浸去汁先用白湯洗瘡拭乾以此汁洗之有效治年久日近遍身瘡疥癮疹發㾦流膿出水或癢痛出德生堂方用好地道艾如無止用上好香艾先研為細末再以米糊和作餅子曬乾再研為末每服三錢酒調浴堂內服之自汗出此藥專治年久日近遍身瘡疥癮疹發㾦流膿出水或癢痛多苦者一服見效豫得內臺傳吳安之因患斯疾服此藥而愈豫集方特載此以傳流後世又方出聖惠方治一切疥風瘙搔之癢成瘡用硫黃一兩細研以生麻油調令勻塗之又方出聖惠方用苦參五兩銼以酒五升浸三日每於食後溫服一鍾治瘡疥風疹出百一選方用野鴨白煮或燒作常食無時本草云此物性冷而能解金石毒故也治疥方用葎草連本莖葉同主疥功用入丹主膏淋搗生汁三升酢二合相和空腹頓服毒從溺或自汗出也䕡茹散出濟生拔粹方治疥經年不瘥水銀一錢好茶二錢䕡茹三錢輕粉少許右為細末每用不拘多少小油調搽硫黃散出濟生拔粹方治疥硫黃川椒石膏白礬以上各等分右為細末以生油調搽經驗狗脊膏出衛生寶鑑方治疥瘡硫黃雄黃信川烏黑狗脊白礬各半兩巴豆三枚右為細末先用小油熬之次下黃蠟調勻擦之椒艾湯出楊氏家藏方去風溼遍身生瘡疥或下部溼癢腳氣等疾石菖蒲一兩銼川椒揀淨二錢半艾葉銼二錢半蔥白七握右􅟢一處以水三升煎數沸淋洗藜蘆散出聖惠方治疥瘡用藜蘆一味不拘多少以鯽魚煎油塗之合掌散出簡易方治腎淤氣毒入兩腿骨癢痛兩膊內疥瘡兩手膿瘡十指縫露白每日疼痛不可忍者檳榔四箇全蝎二箇白芷四塊草烏大者二箇地龍四條青葙子一合海桐皮一錢枯白礬硫黃各指大兩塊麝香一匙右研為末和勻香油調開臨睡時先於兩手心上著塗藥擦熱用鼻嗅得心中覺硫黃氣似此依前三次畢第四次多將藥原塗於兩手心合著捧外腎睡不可放開睡覺為度重者不過三五度即愈再不發一掃散出危氏方治一切瘡疥但相對而生者便是不問乾濕痛癢日近年深用之立效藜蘆皮二兩輕粉十貼好蛤粉一兩水粉一兩透明雄黃五錢右為末大鯽魚一箇入香油煎候熟去魚攤冷調藥搽瘡未效可加信石末少許研查仁十粒近隂處勿用治疥瘡臘日食蒸餅豬脂家藏經驗方臘日空心用蒸餅搽豬脂食之一年不生瘡疥久服身體光滑令諸孫嵗嵗服之有效本草圖經曰黔人有治疥癩遍身諸藥不能治者生取白花蛇中節火燒一大磚石通紅沃醋令熱氣蒸便置蛇於上以盆覆一宿如此三次去骨取肉芼以五味令香熟與病者頓噉之瞑眩一晝夕乃醒瘡痂隨皮便蛻其人便愈用乾蛇亦以眼不陷者為真也治惡瘡疥癆出華陀藏經中巴豆十一粒油煎令沸去巴豆不用蛇床子䕡茹右後二味等分為末入輕粉少許用巴豆油調傅之及揩擦癢處陳藏器云人患瘡疥多以水銀塗之但水銀性滑重直入內須謹之昔北齊徐五療攣躄病以金物太多故用水銀以水銀能蝕金候金色白者是也如此數度病瘥洗風散出楊氏家藏方治大人小兒風熱毒氣攻注遍身瘡疥病丙穩禾疹疼痛荆芥四兩苦參四兩防風去蘆頭川芎當歸洗焙白蒺藜白芷地榆地骨皮黃蘗八味各二兩右件㕮咀每用五錢水三升煎三五沸通手淋瀝患處浣肌散出楊氏家藏方治風熱客搏皮膚瘙癢癮疹㾦㿔瘡瘍疥癬抓之水出浸淫不止或風氣遊走暴腫槐香另研荆芥穗各三兩大黃苦參當歸升麻白蒺藜枳殼去瓤皮六味各二兩射干一兩半右同焙乾碾為細末入楓香和勻每用五錢水三升同煎三五沸通手淋洗雙蛇丸出楊氏家藏方治遍身瘡疥或癢久不愈者白花蛇五兩烏蛇一條右二味用水洗淨控乾去頭尾并項後內二寸不用其餘約二寸長截段用無灰酒一斗錫一斤作塊子并二蛇同入酒內浸封固瓶口待十五日取出去皮骨焙乾為細末却以原浸藥酒煮麵糊為丸如梧桐子大每服三十丸食前溫酒送下槐枝膏出楊氏家藏方治疥瘡瘙癢槐枝黃連去鬚黃蘗三味各三兩巴豆五錢不去殼右為末用好麻油一斤入諸藥漬令黃色綿子濾去渣次入黃蠟四兩熬成膏子取去更入膩粉半兩攪勻擦之停抓散出楊氏家藏方治疥瘡瘙癢硫黃另研蕪荑仁翦草焰硝另研蛇床子黃連去鬚吳茱萸藜蘆八味各一分檳榔十枚炒鰍魚一枚熟去骨右􅟢為細末用生麻油調敷之三物浴湯出楊氏家藏方治遍身瘡疥瘙癢山牡丹葉二斤鹿梨根二斤生薑一斤右􅟢㕮咀作一次用水五斗煮三沸浴之久患瘡疥者不過三五次浴取效初用藥時亦不知覺浴至三五次皮膚覺痛即愈合掌丹出朱氏集驗方治瘡疥蛇床子藁本各一兩硫黃一分石亭脂老硫黃青色一錢麝香二分右先用前二味為細末却細研後二味並入前末和勻生麻油調於無風處爬搔用少許在掌心合定候融暖化擦遍身患處內服四物湯調血氣袪風毒四物湯用生地黃赤芍藥川芎當歸加荆芥穗等分粗末水煎黃連散出朱氏集驗方治疥瘡萬無一失大椒黃蘗皮黃連檳榔各等分右為細末用巴豆二十粒煎麻油塗之巴豆煎至黑色為度妙應膏出華陀藏經中治疥癮䕡茹藜蘆右等分為細末油調煎焦黑去渣入黃蠟熟成膏塗擦八味散出聖濟總録治遍身瘡疥皮破而痛或瘙癢膿水塗敷方川椒去目吳茱茰湯洗焙乾炒青鹽研膩粉研石硫黃研白殭蠶炒蘗皮各一兩麝香少許右搗研為散用豬膽汁調塗之濕則乾摻治疥瘙風瘡有蟲出本草以狗舌草為末和塗之即瘥治惡瘡疥癩出本草以鯪鯉甲燒末敷之治瘡疥滅瘢䀶以梅雨水洗之治癩取蝮蛇一枚及他蛇亦得燒坐其上有赤蟲如馬尾出仍取蛇肉塞鼻之孔治惡瘡疥以桐油塗之治皮膚瘡疥用粟米泔酸洗之治疥瘡以狼跋子用苦酒磨敷之治客風疥瘡以菖蒲作末蒸熱裹罨患處甚驗治疥及諸瘡久不瘳生死肌除大熱藜蘆煮洗之治瘑疥及瘡癩以柏枝燒取脂敷之良治瘡疥風疽以椿木葉水煮汁洗之治皮膚瘡疥殺蟲用積雪草根刮取皮焙乾為末油和塗瘡上治瘡疥以冬瓜藤燒灰洗之療瘡疥及熱氣瘡癢用漏蘆根以苦酒磨敷之亦可作湯浴治身癢瘡以糞藍煎湯洗之治瘡疥以雞蘇葉煮汁服治瘡疥甚效用芥心草搗末敷治瘡疥痂息肉以丹砂水研塗之治惡瘡疥以生鐵煅後飛淘去粗赤汁烘乾用蒜磨生油敷之治瘡痍疥癩用􅒝麻子油研敷之乾疥附論夫乾疥者但癢搔之皮起作乾痂此風熱氣深在肌肉間故也方秦艽丸治遍身生疥乾癢搔之皮起秦艽一兩去苖黃耆二兩銼烏蛇四兩酒浸去皮骨炙令微黃漏蘆一兩半去蘆頭防風一兩半去蘆頭黃連一兩半去鬚苦參二兩銼川大黃二兩銼碎微炒麻黃二兩去根節右為末煉蜜和搗三二百杵丸如梧桐子大每服三十丸食後溫酒送下日進二服一方無麻黃名大黃丸皂莢膏治皮膚風濕熱生疥乾癢宜塗之豬牙皂莢膩粉硫黃細搗研臰黃細研白礬灰黃蠟巴豆去皮烏頭生用吳茱萸已上各一分右為末細研令勻先入麻油二三合以慢火化蠟攪和令勻日二塗之黃耆丸治乾疥瘙癢久不瘥者黃耆二兩銼烏蛇四兩酒浸去皮骨炙令黃茵芋二兩川烏頭二兩炮刮去皮臍附子三兩炮刮去皮臍石楠一兩秦艽二兩去苖右為末煉蜜和搗三二百杵丸如梧桐子大每服三十丸食後以荆芥湯下以瘥為度黃連膏治諸疥乾癢白礬一兩燒灰硫黃一兩細研黃連一兩半去鬚雌黃一兩細研蛇床子三分末右研令勻以煉豬脂和如餳每用先以鹽漿水洗令淨拭乾塗之一方有胡粉名白礬散如聖散治肺臟風毒攻發皮膚血氣凝澀變生瘡疥瘙癢搔之皮起作痂轉輾蔓延連滯不瘥活血脈潤皮膚散風邪止瘙癢蛇床子半兩黃連去鬚三分水銀同胡粉點水研令黑一分胡粉結沙子一兩右以生麻油稀滑每用藥時先以鹽漿水洗瘡令淨後以藥塗之乾即便換不過三五度瘥一方有硫黃一分名水銀膏又方治疥瘡生乾痂癢不止豬脂一斤巴豆半兩去皮研焙蠟半兩硫黃一分末右先煎豬脂令沸入巴豆候次下蠟令鎔化又下硫黃末攪令勻盛於瓦合內日三五度塗之治疥瘡生乾痂癢不止方皂莢一兩臰黃一兩右為細末以醋二升熬成膏塗之日三二易普濟方卷二百八十
