body:
  text: 普濟方卷二百八十明周王朱橚撰諸瘡腫門論疥附論夫瘡疥之為病雖苦不害人然而至難治者多矣素問云諸痛癢瘡皆屬於心由心氣鬱滯或飲食不節毒藴於腸胃發見於皮膚又方有所謂馬疥水疥乾疥種類不一生於手足乃至遍體或癢或痛或膿或腫或皮肉隠嶙或抓之凸起或㾦㿔或膿水浸淫治之内當理心血袪散風熱外則加以敷洗理無不愈字書以疥有介守之義言疥雖微小然守形體而難治也是以疥有五名皆因風氣邪氣客於肌膚之間久則化而為蟲時則發作故凡瘡腫焮赤痛者謂之大疥皮肉隐起結根搔之不痛謂之馬疥瘙癢皮起謂之乾疥三者為重以風熱深在肌肉故若水疥㾦㿔如粟漿濕疥瘡上面汁出特風熱淫於皮膚之間故淺而輕也然皆風熱之客故皆有蟲或以謂蟯蟲内出理或然也治宜疎風滌熱當以薰浴傅塗之法與湯劑並行則善矣方神仙疥藥硫黄六兩雄黄三兩雌黄三兩天仙子三兩芫青二兩紅娘二兩寒水石二兩井泉石二兩桔白三兩黑狗脊八兩大楓子仁三兩大黄三兩斑猫二兩輕粉三錢蛇床子八兩人言三兩狼毒八兩川烏八兩藜蘆一兩右為細末生猪油調藥生絹袋盛之火炙取汁搽鼻聞立効忌口苦參散出聖濟總録治遍身瘡疥風熱或痛或癢苦參三兩人參丹參沙參𤣥參各一兩秦艽去苖土各一兩半白蘚皮升麻各一兩一錢枳殼去瓤剉炒令黄色各一兩梔子仁犀角屑二兩黄芩去黒心芍藥一兩一錢當歸切炒一兩半蒺藜子去刺炒一兩防風去义一兩一錢黄連去鬚一兩半白花蛇炙黄色去皮骨二兩右為散每服二錢用温酒一盞調下日晩再服烏蛇散出聖濟總録治一切疥風癢瘑瘡等烏蛇酒塗炙去皮骨二兩羌活去蘆頭白蘚皮苦參人參枳實去皮麩炒蒺藜子炒去角黄芩去黒心山茱萸漏蘆牡蠣熬附子炮刮去皮臍白殭蠶𤣥參秦艽去苖土甘草炙剉防風去叉甘菊花搗各一兩右搗羅為細散每服五錢空心酒調下五參散出聖惠方治諸疥風虚惡瘡人參去蘆頭𤣥參丹參沙參去蘆頭苦參各一兩蒺藜子炒杵去尖秦艽去苖土各半兩梔子仁三分黄芩去黒心半兩烏蛇酒浸一兩獨活去蘆頭茯神去木山芋麻黄去根節細辛去苖葉防風去义各半兩枳殼去瓤剉炒令黄色三分右搗羅為散每服三錢空心熟水調下日晩再服以瘥為度一方有甘菊花温酒下名白蒺藜散升麻和氣飲出三因方治瘡疥發於四肢臀髀痛痒不常甚至増寒發熱攻刺疼痛浸淫浮腫又癩風入臟隂下溼癢耳鳴眼痛並皆治之乾薑熟枳殼各半兩熟蒼术桔梗升麻各一兩當歸乾葛茯苓白芷各二錢陳皮甘草各一兩半熟半夏芍藥七錢半大黄蒸半兩右剉㪚每服四錢水一盞半薑三片燈心十五莖煎至七分去渣服治瘡疥腰胯手足皆生瘡疥者出千金方栝蔞根四兩黄連芍藥薔薇根䑕李根皮黄蘖各三兩苦參黄耆黄芩石龍苪各二兩大黄當歸續斷各一兩右為末蜜丸如梧桐子大以薔薇飲服二十丸日二加至三十丸又方治療瘑疥柿樹皮燒煙欲盡以缶盖滅火研一兩荷葉如前法燒灰取一兩草烏去皮尖半兩硫黄半兩黄連半兩去鬚黄蘖半兩去粗皮胡椒半兩雄黄研細半兩白蕪荑半兩浄細辛半兩黄芩半兩白礬研三錢輕粉一錢右為細末和令勻濕瘡乾摻乾瘡用烏桕油或酥或油蠟調塗夜間以手掌多擦藥有癢處即以手掌擦之一方有苦參無黄芩赤小豆㪚出聖濟總録治濕乾疥赤小豆三合炒乾納醋中如此七遍人參甘草炙令赤色剉白歛當歸切焙瞿麥穗黄芩去黒心猪苓去义黒心半兩防風去叉各半兩黄耆剉薏苡仁升麻各三分右細散每服三錢空心以粥飲調下日二夜一藜蘆膏出聖濟總録治瘡疥藜蘆去蘆頭一兩半石硫黄研猪牙皂莢乳香研各半兩附子一分杏仁去皮尖研半兩膩粉一分巴豆去殻研半分猪脂五兩酥二兩白礬研一分猪膽二枚右𢷬研九味為末先熬脂酥膽汁令沸即下諸藥末攪勻以磁盒盛每日塗摩三五度苦參散出聖濟總録治遍身瘡疥風毒瘙癢苦參白花蛇酒浸去皮骨炙各二兩黄連去鬚當歸切焙各三分人參𤣥參丹參沙參芍藥蒺藜子炒去角防風去义各半兩右為細末每日不拘早晚温酒調下二錢日一夜二妙功散出瑞竹堂方治疥瘡黄栢蛇床子白礬各等分右為細末用後藥煎油調搽清油二兩黄栢花椒巴豆數粒葱三莖厚朴枳殼各少許右同清油一處熬數沸濾去渣將妙功散於熱油内更加桕油燭一二枝放冷調搽赤小豆湯出仁存方治少年血氣俱熱遂生瘡疥變為腫滿或煩或渇小便不利赤小豆炒當歸去蘆炒商陸澤㵼連翹仁赤芍藥漢防己木猪苓去皮桑白皮炙乾漆已上各半兩右㕮咀每服四錢水一盞半薑五片煎至八分去滓温服不拘時候熱甚者加犀角二錢半一方無漢防己當歸飲子出仁存方治心血凝滯内藴風熱發見皮膚遍身瘡疥或癢或痛或膿水浸淫或發赤疹㾦㿔當歸白芍藥川芎生地黄白蒺藜荆芥穗各一兩何首烏黄耆甘草各半兩防風去蘆一兩右為細末每服四錢水一盞半生薑五片煎八分去渣不拘時候温服若於浴堂内服此藥就用胡桃仁七箇去皮細嚼下飲酒一盞出汗神効治瘡疥樟腦白礬檳榔蕪荑翦草生硫黄蛇床子花椒細辛右用硫黄樟腦加倍餘藥等分細研香油調敷瘡溼者乾敷一方加消風散又方治疥瘡雄黄硫黄黑狗脊白礬藁本蛇床子斑猫巴豆各等分人言少許右為細末或烏桕油或猪脂調和為丸用氣呵手心熱将藥勻擦開搽之為驗一擦膏出仁存方治一切瘡疥雄黄黄連黄栢苦參蛇床子鹿梨白礬翦草松糖各等分右為末瘡乾用油調搽溼瘡乾摻又方治疥瘡蛇床子一觔花椒全蝎各二兩五倍子百部白礬硫黄貝母各四兩右為細末香油調搽治癩頭疥瘡硫黄二錢半黄丹黄連藜蘆蕪荑五倍子各二分半黄栢一錢半糓雨前茶五錢右為末先将患處摩擦用芝麻油調敷之治風疥瘡雄黄白硫黄狼毒人言蛇床子炒水銀輕粉末茶各等分右為細末羊猪膏調塗之神異膏出仁存方治一切瘡疥全蝎七箇去毒皂角一挺剉碎巴豆七粒去殻蛇床子取末三錢麻油一兩黄蠟五錢輕粉半匙雄黄三錢另研右先将皂角全蝎巴豆煎油變色去三味入黄蠟化開取出冷定入雄黄蛇床子末輕粉和勻成膏先用苦參湯温洗却以藥擦瘡疥上神効一方加斑猫七箇去毒加葱煎油又松葉煎湯淋洗神効苦參湯出危氏方苦參蛇床子白礬荆芥穗右各等分煎湯洗之治風疥及寒溼諸雜瘡方千年韮根好礬石雄黄藜蘆𤓰蒂胡粉各一兩水銀三分右以栁木研水銀使星盡用猪肝一升煮藜蘆韮根𤓰蒂三沸去渣入諸藥和勻調令相得即成以敷之神良一笑散治渾身疥癩瘙癢生惡瘡㯽榔藁本硫黄苦參蛇床子五倍子白膠香各等分右為末濕者乾搽乾者油調搽如頭上瘡便搽上不用剃甚者不過三五次便平復如故大黄膏黄連十四銖藜蘆十二銖大黄一兩乾薑十四銖䕡茹十銖莽草十二銖羊躑躅十銖右搗篩以煎成猪脂二觔㣲火向東煎之三上三下膏成去痂汁盡敷之神効合時勿令婦人鷄犬見之疥藥出百一選方雄黄硫黄地黄翦草蛇床子白礬飛過右等分為細末麻油一兩巴豆七粒同煎候巴豆焦去巴豆不用候油冷旋調藥搽藁本散治疥藁本蛇床子黄栢各半兩硫黄三錢半白礬五分輕粉炒一錢半右同研勻油蠟為膏子擦之止癢除疥一浴散出瑞竹堂方治疥瘡熱毒硫黄雄黄漢椒𤣥精石枯白礬各等分輕粉右欲治疥時早起空心飽食乾物勿食飲湯煎大防風通聖散一貼入白沙蜜二兩送神芎丸五七十丸入浴堂内令汗出便休下湯浴将疥抓破用前藥以清油搽之入浴堂内洗就浴堂内如此擦洗三次方才出浴更不須再搽藥合掌散治疥瘡䕡茹蛇床子各二兩苦參二錢生硫黄一錢雄黄輕粉各一錢右為細末香油調於手心擦之如熱鼻嗅之次将兩手交互合於大腿上安眠㯽榔煎丸出聖濟總録治風毒疥一切風壅㯽榔剉𦍑活去蘆頭枳殻去瓤麩炒獨活去蘆頭白牽牛略炒黑牽牛略炒各半兩右為末用大皂角一尺已上者一挺挼汁煎膏和丸如梧桐子大臨卧温酒或熱水下三十丸量人虚實加减久患瘡疥服之即愈神㨗散出聖濟總録治諸疥瘡吳茱萸一兩赤小荳四十九粒白蒺藜一兩白蕪荑仁半兩輕粉五錢石硫黄少許研右搗研為散令勻每用生油調藥半錢於手心内摩熱後徧揩周身有疥處便睡覺其疥自愈疥藥大楓子舶上硫黄􅒝麻子白礬胡桃猪脂各等分右為細末用生絹袋兒盛膏一處搽胡麻散出徳生堂治心血凝滯内藴風熱發見皮膚遍身瘡疥或癢或痛或膿水浸淫或發赤疹㾦㿔胡麻十二兩荆芥苦參首烏甘草炙葳靈仙各六兩右為細末每服二錢酒調服茶清亦可隨證上下服六根散治蟲瘡疥藜蘆根黄栢根烏藥苦楝根不辣回根芫花根各等分右為末麻油調敷之殺瘡藥出三因方羊蹄根生切二兩薑一分礬一錢半硫黄一錢草烏頭一箇右以米泔淹一宿研極細入釅醋和勻入浴時抓破瘡敷之遲頃以温湯洗去絶妙苦參散出衛生寳鑑方治遍身瘡疥經年不効苦參蔓荆子何首烏荆芥穗葳靈仙各等分右為細末每服二錢食前酒調下日進三服忌發風物鷄子塗方出聖濟總録治惡疥瘡鷄子七枚炙熟取黄熬成膏膩粉亂髪灰白礬各一分石硫黄研半兩右除鷄子外研為末鷄子膏和研令勻塗敷患處日三五度即瘥當歸丸治諸般瘡疥何首烏八兩草烏四兩苦參八兩赤土三錢半荆芥四兩右為細末用醋糊為丸如梧桐子大每服六七十丸温酒送下治瘡疥硫黄白礬薄荷石膏蛇床子右各等分為末生猪油調搽五龍散治諸疥瘡蛇床子炒花椒炒牙硝枯礬土硝各等分右為細末栢油調搽治風疥瘡何首烏蔓荆芥蛇精草甘草荆芥各等分右為末茶清調下忌胡椒酒日進三服治疥瘡全蝎檳榔藁本硫黄防風各等分右為末油調掌中搽瘡上又方藜蘆根一兩蛇床子銀硃枯白礬雄黄各二錢半右為末油調搽水黄膏出徳生堂治一切瘡疥不用臭硫黄者有効真狼毒五錢倭黄三錢輕粉二錢水銀三錢末茶先研如泥右與前􅟢藥三味俱為末入水銀内再碾為膏用少許於手心搓揑時聞藥氣則瘡愈矣巴豆膏出聖惠方治一切瘡疥有蟲時作瘙癢巴豆七粒去皮研硫黄半兩細研白礬半兩燒灰蕪荑半兩猪脂三兩右為末煉猪脂成油入前藥末調和令勻每用蓮子大於手掌内搓塗之如意散出御藥院方治疥瘡時發癢痛乾漆生黑狗脊生輕粉研生黄耆生研各一兩右為細末研藥令勻每用藥先微搔用生油調如稀糊擦患處一日三兩次合掌散出仁存方治瘡疥羌活獨活硫黄輕粉各二錢右為末用麻油脚傅塗手心中擦熱嗅了却擦在瘡上硫黄散出仁存方治瘡疥硫黃荆芥穗黑狗脊蛇床子各等分右為末油調成膏先以火炙瘡令癢抓破依前方嗅後擦瘡治疥瘡一名四聖膏出百一選方藜蘆根掘取不拘多少生薑半之白礬隨意用吳茱萸看多少入右同於砂盆内入米醋爛研以浄器盛之候白醭生方可用遇浴時以代皂角不過一兩次即安若遍身生者尤宜用之治疥神效狼毒二錢細辛一錢水銀一錢輕粉半錢右為細末油蠟和劑作兩丸綿裹兩手将於周身疥多處擦之一掃散治大人小兒諸般瘡疥白秃肥爛瘡癢疼流水者如神香白芷五兩生不見人明礬五兩生臭硫黄一兩樟腦少許右為末香油調傅擦之再擦如此上三五次尅日見効用猪膏亦妙先以皂角葱白煎湯洗浄後上藥治疥瘡海桐皮蛇床子雄黄硫黄右各等分為末用香油調傅黄薰方出聖惠方治諸疥雌黄研雄黄研石硫黄研各半兩熟艾五兩末右同研和令勻将藥鋪在紙上令勻𦂳捲如餅餤様用麪糊粘却切為四段患人早食及大小便了當仰臥安藥於四口瓦内兩腋下兩髀下以火燒烟用水洗舊布單上以厚衣覆不令通風汗出至曉藥煙盡即去藥瓦以瘥為度烏頭散出聖濟總録治諸疥烏頭吳茱萸石硫黄莨菪子各一兩右為㪚用生油調如糊塗患處三五度即瘥硫黄塗傅方出聖濟總録治諸疥石硫黄研一錢蜀椒去目及合口者吳茱萸黄蘗各一兩右搗研為㪚用生油調如糊塗傅疥上日二三異方疥瘡藥出經驗良方百發百中水銀滓五錢研細粉朴硝二錢天南星草烏各一錢右為末和勻用清油半盞又入連鬚葱一根於油内煎令香熟去葱將藥調塗患上治疥不拘久新方出本事方白蕪荑一兩㯽榔吳茱萸各七兩硫黄二錢另研右為末麻油調抓破擦搽又方出直指方治諸疥乾癢生明硫黄五錢黄丹獐腦各一錢輕粉半錢右為末乾寒熱癢赤腫加荆芥三黄膏治瘡疥久不痊者皂角三箇斑猫巴豆各二十箇黄栢半兩右將臘脂一盞煎至藥黑色濾去渣次入硫黄雄黄末攪勻搽疥藥方蛇床子一兩香白芷二錢舶上硫黄一錢半右為細末香油調搽疥藥方寒水石舶上硫黄川椒蛇床子各等分右為細末小油調搽忌自死鷄鵝肉疥藥方羊尾子油二片大楓子二十箇去皮白硫黄一錢查肉三十箇去尖右合做一處搗爛用生絹布袋裝每日掌在手中聞又疥方明礬治枯一錢蛇床子二錢半樟腦一錢明硫黄一錢右為末擦在九竅内臍中腋下等處神驗吸氣入肚自然好備急葛氏療疥瘡方取楝根削去上皮切皂莢去皮子等分熟搗下篩脂膏和搔疥去痂以塗之䕶風勿使女人小兒鷄犬見治疥瘡用黑神散酒調服畢即入混堂洗浴愈治疥瘡花椒三兩香油四兩烏桕油四兩舶上硫黄一錢右用香油浸椒一晝夜用鐵器以油熬椒慢火數沸候椒焦色去椒入桕油候油温些入硫黄冷成膏搽瘡荆芥丸治疥瘡及風熱瘡以荆芥穗不拘多少為細末蒸爛入蘿蔔於木石器内爛搗為丸如梧桐子大每服三四十丸食後茶湯熟水任下服荆芥藥忌食無鱗魚薫疥方明信雄黄各半錢椒末一錢右研細用紙一方尺熟艾攤平摻勻捲成長錠瓦兩口合紙捲子點火慢慢煙薫被下𦂳擁衾被油塗眼耳口鼻小兒只空衣蓋被臥亦効宜浄室温床牢擁衾被無令透煙以薫氣至其人口鼻為効牽牛子丸治一切風熱疥瘡攻注牽牛子一兩一半瓦上炒一半生用蘹香子一兩微炒陳皮二兩水浸去白於瓦上焙乾右為細末用生薑汁煮麪和為丸如录豆大毎服空心臨卧用炒鹽湯下十丸丹參洗湯治疥及風瘙苦癢成瘡丹參苦參各四兩蛇床子四兩右剉搗以水一斗煎取六升濾去滓温洗瘡上用絹帛拭乾以藥塗摩三五度即瘥治疥瘡藥斑猫去嘴脚用三箇以枯柴燒慢火爐糯米一合和炒至米黄為度去米生硫黄一錢信石即白砒霜一錢右為末至夜滅燈時用清麻油調藥掌上合擦心熱以鼻逺吸其氣三四次却搽盪患處不問乾濕疥瘡却不可抓破摩盪瘡上至於偏僻處切不可搽仍忌鴨子及水洗神効治積年疥瘡不愈者名胡粉散水銀三錢又茶末少許於瓦器用津液擦化作末輕粉三錢狼毒一兩置水中沉者取為末一半生用一半炒右用清油調生鐵衣名鐵鏽油摩塗疥癩若蜘蛛蟲等毒磨蒜兼傅之或清油浸藥出藥面一寸髙過夜不見燈火只㸃清油塗瘡上仍以口鼻於藥盞上吸入藥氣諸疥方透明生硫黄半兩明白礬煅二錢半白蛇一條去中心骨燒存性右為末麻油輕粉調抹又方生明硫黄半兩煅石膏二錢黄丹一錢右為細末麻油調抹潤澤丸治遍身熱瘡疥大黄一兩黑牽牛半生半熟天仙子各一兩右為細末用皂角子為丸每服五七十丸温水送下腎臟風發瘡疥雞心梹榔二箇破開以黄丹三錢合在内用濕袋裹煨全蝎六箇明硫黄四錢右為末入輕粉半錢麝香少許青黛末半錢於磁器内收每用少許清油調抹兩掌揜外腎以兩掌揜兩乳各睡至醒次日又用經驗又疥方柏油明礬花椒各等分右為細末入香油調敷上數次立效一擦膏治一切瘡疥黄連净蛇床子去皮石膏煅各等分右為末却以輕粉硫黄各三錢並和為末真麻油調傅治埋頭疥瘡未出皮并小兒頭煉脚煉并背煉硫黄蛇床子各等分右為細末用生猪油調藥搽鼻聞立效忌口一方搗為散同研令勻夜間欲卧時先以熟鹽漿水洗瘡取生麻油調塗之於避風處以綿被蓋之取汗為度快肌丸治遍身疥瘡不瘥葳靈仙去土一兩半焙細末猪膽三枚右取膽汁和丸如梧桐子大毎服二十丸荆芥湯下無時候何首烏洗瘡治乾濕疥滿身作瘡不可藥者及風癢瘡何首烏艾各等分細剉右相度瘡多少用藥並水煎令濃於盆内盛洗之拭乾敷取艾煎膏治一切惡瘡疥方出聖濟總録黄栢末石灰研右等分研極細以生麻油和如薄麪糊浄洗瘡塗四五次瘥烏頭煎出聖濟總録治瘡疥甚者烏頭每箇四破之大豆一兩半右同入砂瓶煑及爛每服烏頭一片豆少許空心酒服下立効散出聖惠方治疥瘡經久不愈朴硝三兩研細如粉硫黄一分研極細右和勻臨卧清油調敷上一夜三次明日便愈一方用生麻油調塗烏頭丸出經驗良方川烏頭一兩去皮尖生用荆芥穗二兩右為末米醋糊丸如梧桐子大每服三十丸温酒或熟水送下日三服無時蟬蛻散出危氏方治疥瘡蟬蛻薄荷各一錢右為末五更酒調服入混堂浴盪候臭汗出盡再以湯淋之枳殼丸出聖惠方治一切風熱生瘡疥枳殻四兩去瓤麪炒㣲黄苦參八兩剉右為末蜜水和搗三二百杵丸如梧桐子大每於食後以酒下三十丸又方治疥瘡藜蘆海桐皮右各等分入明礬輕粉各少許油調搽治患疥已十五年遇冬則為瘡昔有人少患疥十五年遇冬則為瘡人教用後藥取愈出百選方羊蹄根蛇床子根各等分右片切如錢米泔浸二三宿漉出入生薑礬同研細裹以生布遇浴先擦洗良久以水澆三四次用即除根後數年再生用前法亦愈治疥癆等瘡出百一選方硫黄白礬右各等分肥皂倍之羊蹄根又倍之同搗為丸浴時揩擦癢處㣲痛甚妙治疥瘡方出肘後方以巴豆十粒火炮過黄色去皮膜用順手研如麪入酥少許膩粉少許同研勻抓破以竹箆子㸃藥不得落眼裏及外腎上如煎剉著外腎以黄丹塗甚妙治療瘑疥出十便良方用雄黄一兩黄連松脂各二兩髮灰如彈丸大四塊鎔猪膏與松脂各熱搗以敷瘡上大良又方出肘後方用油麻莖苦酒和磨硫黄塗之並佳又煮苦參飲之良薰疥法取艾如鷄子大先以布裹亂髮於紙上置艾薰黄辰砂末杏仁末水銀各如查仁許水銀於掌中以唾研塗紙上以捲末藥炙乾燒以薰之一云筒瓦一口一用安灰蓋上以繩束之用薰疥如脚頭被内置之少時火盡上隔日一薰不過再即瘥治疥癆傳信適用方用猪膏煉油石灰細羅二味以意度多少一處銚内炒以乾為度先鋪紙在地却傾所煉猪膏石灰於其上用盆蓋之出火毒一夜研末乾擦治瘡疥出經驗濟世方用地錦草裹皂角燒為灰入硫黄同研為細末入好粉油調浄浴了用一分敷瘡上一分塗兩手心一分塗外腎臨臥蓋了用兩手捧外腎婦人掩玉門禁抓一夕芫花膏出聖惠方治瘡疥用芫花一味以猪脂煎候焦去渣常用搽疥上治疥一名硫黄散出百一選方用硫黄不拘多少用熨斗内鎔成汁以荆芥穗手撚碎投之候乾放冷研為細末每用藥以手抓破擦藥在上即愈仍不作硫黄氣治遍身風癢生瘡疥出肘後方用蒺藜子苖煮湯洗之立瘥又方出肘後方用茵蔯不計多少火煮濃汁洗之立瘥又方出肘後方用竹葉為末以鷄子白和之塗上不過三四立瘥治疥瘡方杵蟹傅之亦効治久疥方用兎骨同醋磨敷之治疥方出肘後方用羊蹄根熟搗和猪脂塗上或入鹽少許治疥瘡方用薤葉煎湯洗之佳搗如泥敷之亦可石菖蒲㪚治疥瘙癢用石菖蒲搗為末油調塗之又方治疥瘡久不瘥用狐肉空心服之腸肚性寒患瘡疥久不瘥者作羮臛食之又方出危氏方用大紅川椒去目水蘸濕半日夾山查仁研膏擦手如去垢法亦効肘後療疥方出十便良方用石灰二升以湯五升浸去汁先用白湯洗瘡拭乾以此汁洗之有効治年久日近遍身瘡疥瘾疹發㾦流膿出水或癢痛出徳生堂方用好地道艾如無止用上好香艾先研為細末再以米糊和作餅子曬乾再研為末每服三錢酒調浴堂内服之自汗出此藥專治年久日近遍身瘡疥瘾疹發㾦流膿出水或癢痛多苦者一服見効予得内䑓傳吳安之因患斯疾服此藥而愈予集方特載此以傳流後世又方出聖惠方治一切疥風瘙搔之癢成瘡用硫黄一兩細研以生麻油調令勻塗之又方出聖惠方用苦參五兩剉以酒五升浸三日每於食後温服一鍾治瘡疥風疹出百一選方用野鴨白煑或燒作常食無時本草云此物性冷而能解金石毒故也治疥方用葎草連本莖葉同主疥功用入丹主膏淋搗生汁三升酢二合相和空腹頓服毒從溺或自汗出也䕡茹散出濟生㧞粹方治疥經年不瘥水銀一錢好茶二錢䕡茹三錢輕粉少許右為細末每用不拘多少小油調搽硫黄散出濟生㧞粹方治疥硫黄川椒石膏白礬以上各等分右為細末以生油調搽經驗狗脊膏出衛生寳鑑方治疥瘡硫黄雄黄信川烏黒狗脊白礬各半兩巴豆三枚右為細末先用小油熬之次下黄蠟調勻擦之椒艾湯出楊氏家藏方去風溼遍身生瘡疥或下部溼癢脚氣等疾石菖蒲一兩剉川椒揀净二錢半艾葉剉二錢半葱白七握右􅟢一處以水三升煎數沸淋洗藜蘆散出聖惠方治疥瘡用藜蘆一味不拘多少以鯽魚煎油塗之合掌散出簡易方治腎淤氣毒入兩腿骨癢痛兩膊内疥瘡兩手膿瘡十指縫露白每日疼痛不可忍者檳榔四箇全蝎二箇白芷四塊草烏大者二箇地龍四條青葙子一合海桐皮一錢枯白礬硫黄各指大兩塊麝香一匙右研為末和勻香油調開臨睡時先於兩手心上著塗藥擦熱用鼻嗅得心中覺硫黄氣似此依前三次畢第四次多將藥原塗於兩手心合著捧外腎睡不可放開睡覺為度重者不過三五度即愈再不發一掃散出危氏方治一切瘡疥但相對而生者便是不問乾濕痛癢日近年深用之立効藜蘆皮二兩輕粉十貼好蛤粉一兩水粉一兩透明雄黄五錢右為末大鯽魚一箇入香油煎候熟去魚攤冷調藥搽瘡未効可加信石末少許研查仁十粒近隂處勿用治疥瘡臘日食蒸餅猪脂家藏經驗方臘日空心用蒸餅搽猪脂食之一年不生瘡疥久服身體光滑令諸孫嵗嵗服之有効本草圖經曰黔人有治疥癩遍身諸藥不能治者生取白花蛇中節火燒一大磚石通紅沃醋令熱氣蒸便置蛇於上以盆覆一宿如此三次去骨取肉芼以五味令香熟與病者頓噉之瞑眩一晝夕乃醒瘡痂隨皮便蛻其人便愈用乾蛇亦以眼不陷者為真也治惡瘡疥癆出華陀藏經中巴豆十一粒油煎令沸去巴豆不用蛇床子䕡茹右後二味等分為末入輕粉少許用巴豆油調傅之及揩擦癢處陳藏器云人患瘡疥多以水銀塗之但水銀性滑重直入内須謹之昔北齊徐五療攣躄病以金物太多故用水銀以水銀能蝕金候金色白者是也如此數度病瘥洗風散出楊氏家藏方治大人小兒風熱毒氣攻注遍身瘡疥病丙穩禾疹疼痛荆芥四兩苦參四兩防風去蘆頭川芎當歸洗焙白蒺藜白芷地榆地骨皮黄蘗八味各二兩右件㕮咀每用五錢水三升煎三五沸通手淋瀝患處浣肌㪚出楊氏家藏方治風熱客搏皮膚瘙癢瘾疹㾦㿔瘡瘍疥癬抓之水出浸淫不止或風氣遊走暴腫槐香另研荆芥穗各三兩大黄苦參當歸升麻白蒺藜枳殼去瓤皮六味各二兩射干一兩半右同焙乾碾為細末入楓香和勻每用五錢水三升同煎三五沸通手淋洗雙蛇丸出楊氏家藏方治遍身瘡疥或癢久不愈者白花蛇五兩烏蛇一條右二味用水洗浄控乾去頭尾并項後内二寸不用其餘約二寸長截段用無灰酒一斗錫一觔作塊子并二蛇同入酒内浸封固瓶口待十五日取出去皮骨焙乾為細末却以原浸藥酒煮麪糊為丸如梧桐子大每服三十丸食前温酒送下槐枝膏出楊氏家藏方治疥瘡瘙痒槐枝黄連去鬚黄蘗三味各三兩巴豆五錢不去殼右為末用好麻油一觔入諸藥漬令黄色綿子濾去渣次入黄蠟四兩熬成膏子取去更入膩粉半兩攪勻擦之停抓散出楊氏家藏方治疥瘡瘙癢硫黄另研蕪荑仁翦草焰硝另研蛇床子黄連去鬚吳茱萸藜蘆八味各一分檳榔十枚炒鰍魚一枚熟去骨右􅟢為細末用生麻油調敷之三物浴湯出楊氏家藏方治遍身瘡疥瘙癢山牡丹葉二觔鹿梨根二觔生薑一觔右􅟢㕮咀作一次用水五斗煮三沸浴之久患瘡疥者不過三五次浴取効初用藥時亦不知覺浴至三五次皮膚覺痛即愈合掌丹出朱氏集驗方治瘡疥蛇床子藁本各一兩硫黄一分石亭脂老硫黄青色一錢麝香二分右先用前二味為細末却細研後二味幷入前末和勻生麻油調於無風處爬搔用少許在掌心合定候融煖化擦遍身患處内服四物湯調血氣袪風毒四物湯用生地黄赤芍藥川芎當歸加荆芥穗等分粗末水煎黄連散出朱氏集驗方治疥瘡萬無一失大椒黄蘗皮黄連檳榔各等分右為細末用巴豆二十粒煎麻油塗之巴豆煎至黒色為度妙應膏出華陀藏經中治疥瘾䕡茹藜蘆右等分為細末油調煎焦黒去渣入黄蠟熟成膏塗擦八味散出聖濟總録治遍身瘡疥皮破而痛或瘙癢膿水塗敷方川椒去目吳茱茰湯洗焙乾炒青鹽研膩粉研石硫黄研白殭蠶炒蘗皮各一兩麝香少許右搗研為散用猪膽汁調塗之濕則乾摻治疥瘙風瘡有蟲出本草以狗舌草為末和塗之即瘥治惡瘡疥癩出本草以鯪鯉甲燒末敷之治瘡疥滅瘢㾗以梅雨水洗之治癩取蝮蛇一枚及佗蛇亦得燒坐其上有赤蟲如馬尾出仍取蛇肉塞鼻之孔治惡瘡疥以桐油塗之治皮膚瘡疥用粟米泔酸洗之治疥瘡以狼䟦子用苦酒磨敷之治客風疥瘡以菖蒲作末蒸熱裹罨患處甚驗治疥及諸瘡久不瘳生死肌除大熱藜蘆煮洗之治瘑疥及瘡癩以栢枝燒取脂敷之良治瘡疥風疽以椿木葉水煮汁洗之治皮膚瘡疥殺蟲用積雪草根刮取皮焙乾為末油和塗瘡上治瘡疥以冬瓜藤燒灰洗之療瘡疥及熱氣瘡癢用漏蘆根以苦酒磨敷之亦可作湯浴治身癢瘡以糞藍煎湯洗之治瘡疥以鷄蘇葉煮汁服治瘡疥甚効用芥心草搗末敷治瘡疥痂息肉以丹砂水研塗之治惡瘡疥以生鐵煅後飛淘去粗赤汁烘乾用蒜磨生油敷之治瘡痍疥癩用􅒝麻子油研敷之乾疥附論夫乾疥者但癢搔之皮起作乾痂此風熱氣深在肌肉間故也方秦艽丸治遍身生疥乾癢搔之皮起秦艽一兩去苖黄耆二兩剉烏蛇四兩酒浸去皮骨炙令㣲黄漏蘆一兩半去蘆頭防風一兩半去蘆頭黄連一兩半去鬚苦參二兩剉川大黄二兩剉碎㣲炒麻黄二兩去根節右為末煉蜜和搗三二百杵丸如梧桐子大每服三十丸食後温酒送下日進二服一方無麻黄名大黄丸皂莢膏治皮膚風濕熱生疥乾癢宜塗之猪牙皂莢膩粉硫黄細搗研臰黄細研白礬灰黄蠟巴豆去皮烏頭生用吳茱萸已上各一分右為末細研令勻先入麻油二三合以慢火化蠟攪和令勻日二塗之黄耆丸治乾疥瘙癢久不瘥者黄耆二兩剉烏蛇四兩酒浸去皮骨炙令黄茵芋二兩川烏頭二兩炮刮去皮臍附子三兩炮刮去皮臍石楠一兩秦艽二兩去苖右為末煉蜜和搗三二百杵丸如梧桐子大每服三十丸食後以荆芥湯下以瘥為度黄連膏治諸疥乾癢白礬一兩燒灰硫黄一兩細研黄連一兩半去鬚雌黄一兩細研蛇床子三分末右研令勻以煉猪脂和如餳每用先以鹽漿水洗令净拭乾塗之一方有胡粉名白礬散如聖散治肺臟風毒攻發皮膚血氣凝澁變生瘡疥瘙癢搔之皮起作痂轉輾蔓延連滯不瘥活血脉潤皮膚散風邪止瘙癢蛇床子半兩黄連去鬚三分水銀同胡粉㸃水研令黑一分胡粉結沙子一兩右以生麻油稀滑每用藥時先以鹽漿水洗瘡令浄後以藥塗之乾即便換不過三五度瘥一方有硫黄一分名水銀膏又方治疥瘡生乾痂癢不止猪脂一觔巴豆半兩去皮研焙蠟半兩硫黄一分末右先煎猪脂令沸入巴豆候次下蠟令鎔化又下硫黄末攪令勻盛於瓦合内日三五度塗之治疥瘡生乾痂癢不止方皂莢一兩臰黄一兩右為細末以醋二升熬成膏塗之日三二易普濟方卷二百八十
