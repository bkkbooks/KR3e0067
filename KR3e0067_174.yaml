body:
  text: 普濟方卷一百七十四明周王朱橚撰積聚門米癥附論夫病源人有好啖米轉久彌嗜啖之若不得米則胸中清水出得米便止米不消化遂生癥結其人常思米而不能飲食久則斃人方治米癥其疾常欲食米若不得米則胸中清水出雞屎升白米五合右合炒取米焦搗篩為散用水一升頓服取盡少時即吐出癥如研米汁碎若無癥即吐白沫淡水乃厭米不復食之治米癥久不療羸瘦此方神效蔥白烏梅三十枚右以水三升宿漬烏梅使得極濃清晨取蔥白隨飲烏梅汁令盡頓覺心腹煩欲吐即令出之三晨療之當吐去米癥差無所忌治食生米方家藏經驗方男子婦人因食生熟物留滯於脾胃遂至生蟲久則好食生米否則終日不樂至於肌膚憔悴面色萎黃不思飲食以害其生右用蒼术不拘多少米泔水浸一宿取出銼碎焙乾碾為細末煮稀麵糊為丸如梧桐子大每服五十粒空心食前米飲下日三服益昌伶人劉清嘯家一婢曰花翠年踰笄病此三月餘監惠民局趙尹能醫以此治之兩旬而愈蓋生米留滯於脾胃受濕則穀不磨致成此疾蒼术能去濕暖胃消穀故也尹先云曾用此藥療綿州常振省幹兩旬而痊因筆於册髮癥附論病源云有人因飲食內誤有頭髮隨食而入胃成癥胸喉間如有蟲下上來去者是也方食中有髮不覺因食而入久則胸間如有蟲狀上下去來惟欲飲油一日之中飲至三二升不欲飲食者為髮癥治出聖惠方右用油一升以香澤煎之大搔􅀈貯之安病人頭邊令口鼻臨油上勿令得飲轉鼻面令有香氣當呌喚取飲食不得與之必當疲極大睡其髮癥當從口出令一人専守視之并偹石灰一裹見癥出以灰粉手捉癥抽出及盡即是髮也初從腹中出形如流水中濃菜隨髮長短形亦如之又方出千金方右用酒三升煮豬脂三升二沸服一升日二白馬尿服之亦佳無白馬白牛亦得療胸喉間覺有癥蟲上下偏聞蔥豉食香此是髮蟲故也右用油煎蔥豉令香二日不食張口而卧將油蔥豉置其口邊蟲當漸出徐徐以物引去之無所忌治誤食頭髮如蟲疾者右雄黃研細水飛過酒調服吐出惡物乃愈蝨癥附論病源云人有多蝨性好齧既多而臟腑虛弱不能消之不幸變化生癥而患之者亦少俗云患蝨癥人見蝨必齧之不能禁止蝨生長在腹內時有從下部出亦斃人方療蝨癥嚙蝨在腹生長為蝨癥方出千金方故箆子一枚故梳子一枚右二味各破為兩分各取一分燒作灰取一分以水五升煮取一升取頓服前末盡少時當病出無所忌鱉癥附論病源云鱉癥者謂腹內癥結如鱉之形狀也有鱉觸冷不消而生癥者也有食雜物得冷不消變化而作者此皆脾胃氣弱而遇生冷不尅消故也癥者其病結成推之不動移是也方蟹瓜丸治鱉癥狀在心下手揣見頭足時轉動并痛蟹瓜三分附子六分麝香三分半夏六分生薑四分鱉甲六分防葵六分郁李仁八分右搗篩密和如梧子大空肚以酒下二十丸日再服以知為度忌生冷油鹹熱麵蕎麥陳臭粘膩羊肉餳豬肉莧菜宿癥及卒得癥方出肘後方右用白雌雞一雙絶食一宿明旦以膏熬飯飼之取其屎無問多少小便和之於銅器中火上熬燥搗篩每服錢許日四五服消盡乃止常飼雞取屎病差後殺雞單食之治鱉癥服白馬尿一升五合溫服之令盡差治鱉癥腹堅硬腫起大如盆眠卧不得方出千金方右取鹽一升搗水三升絞取汁每服一升日二若食中得病為鱉癥在心下堅強硬者並須服之又方出千金方右蒴藋根白皮一握研取汁水和頓服之又方出千金方右用白馬尿一升雞子三枚取白二合空腹頓服不移時當吐病出又方出千金方右雞屎一升炒令黃取五合以酒一升浸取半搗為末以所浸酒服方寸七日二服三日中作一劑治人龜病人門龜病不能言肚裏生成硬似磚自死殭蠶白馬尿不過時旬軟如綿結瘕附論結瘕者積聚之類也結伏積聚久不散謂之結凝滯腹內按抑有形謂之結瘕之證形體瘦悴食不知飢飽中隂寒冷濕之氣則發而腹脅塊硬隱隱然痛者是也瘕之證腹中氣痛動轉橫連脅下有如癖氣遇脾胃有冷陽氣不足而發動者是也方檳榔湯出聖濟總録治結瘕脈弦腹滿坐卧不安食即欲吐喘急檳榔一兩半赤茯苓芍藥陳橘皮吳茱茰郁李仁訶梨勒各三分京三稜桑根白皮各一兩右搗粗篩每服五錢水一盞半煎至八分去滓溫服食前後各一服若服後頻利即減檳榔郁李仁紫葛丸出聖濟總録治結癥腹脹堅硬如石肚上青筋浮起紫葛一兩芍藥桔梗紫苑木香訶梨勒皮各三分大黃一兩半牽牛子半兩郁李仁一兩右為末煉蜜為丸如梧桐子大每服十五丸空腹煎木通及棗湯下老弱量減丸數防己湯出聖濟總録治結瘕氣積腹滿如石氣急少卧小便不利防己百合郁李仁各一兩木通一兩半吳茱茰半兩陳橘皮當歸赤茯苓各三兩右搗篩為散每服三錢水一盞生薑半分至六分去滓空心溫服羌活丸出聖濟總録治結瘕氣塊飲食不消肺氣發心胸中逆氣喘卒中風毒腳氣大腸祕澀奔豚氣痛羌活桂去粗皮芎藭木香檳榔各一兩郁李仁大黃各二兩右除郁李仁外搗羅為末與郁李仁研勻煉蜜和丸如梧桐子大每服二十丸空心煎生薑湯下或棗湯下氣痛溫酒下木通湯出聖濟總録治結瘕腹脹堅硬不消木通赤茯苓各一兩赤芍藥吳茱茰各三分檳榔一枚紫苑郁李仁各半兩右粗搗篩每服三錢水一盞半煎取七分空腹服日再防己散出聖濟總録治結瘕癖實腹滿如鼓食即欲吐喘息急其脈弦而緊防己訶梨勒郁李仁白术檳榔各一兩半吳茱茰炒三分右除郁李仁外搗羅為散入郁李仁同研令勻每服三錢水一盞煎至六分和滓空心溫服木香湯出聖濟總録治逺年虛實積聚瘕塊木香一兩海馬子一對大黃青橘皮白牽牛各二兩巴豆四十九粒右以童子小便浸青橘皮軟裹巴豆以綿繫定入小便內再浸七日取出麵炒黃去巴豆只用青橘皮并餘藥粗搗篩每服二錢七分水一盞煎至三五沸去滓臨卧溫服木香煎丸治結瘕積聚血結刺痛方見本門蛇瘕附論病源云有人食蛇不消因腹內生蛇瘕也亦有蛇之津液誤入飲食內亦令人病瘕其狀常若飢而食則不下喉噎塞食至胸內即吐出其病在腹揣摸亦有蛇狀謂蛇瘕也方療蛇瘕大黃湯出千金方大黃半兩芒硝一枚烏魚骨三枚黃芩半兩甘草一尺皂莢六枚右㕮咀以水六升煮之三沸下絞去滓內芒硝候溫盡服之十日一劑煮作如上法欲服之宿無食平旦服當下病也忌海藻菘菜等治蛇瘕方出聖惠方川芒硝半兩烏賊魚骨半兩川大黃半兩防葵半兩皂莢半兩右為散每服四錢以水一中盞煎至六分去滓溫服日三四服又方出聖惠方雄黃一分白礬一分硇砂一分膩粉一錢麝香一分巴豆二十七粒右為末以桃膠和丸如菉豆大每服以溫酒下五丸日三四服治蛇癥瘕方出千金方右以白馬尾切長五分酒服方寸匕大者自出更服二分者一方寸匕中者亦出更服三分者一方寸匕小者復出不可頓作一服殺人鱉瘕附論病源云鱉瘕者謂腹內瘕結如鱉狀是也有食鱉觸冷不消而生者亦有食諸雜冷物變化而作者皆由脾胃虛弱而遇冷即不能尅消所致瘕言瘕也謂其形假而推移也昔曾有人共奴俱患鱉瘕奴在前死遂破其腹得一白鱉仍故活有人乘白馬來看此物白馬忽尿墮落鱉上即縮頭及腳尋以白馬尿灌之即化為水其主曰吾將愈矣即服之果如其言得差故飬生云六月勿食澤中水令人成鱉瘕方療鱉瘕方出聖惠方大黃六銖乾薑半兩附子九銖人參九銖蟅蟲大一寸側子半兩桂心六銖貝母半兩白术一兩細辛十八銖右十味搗篩以酒服半方寸匕日三忌生菜生蔥桃李雀肉豬肉冷水一方有檳榔又方出聖惠方防葵一兩鱉甲一兩苦棟子一兩郁李仁一兩檳榔一兩右為細散每服以溫酒下二錢日三四服患鱉瘕者出本草右用新赤黍米取泔水汁生服一升不過三兩度愈魚瘕附論夫人胃氣虛弱者食生魚因為冷氣所摶不能消之結魚瘕揣之有形狀如魚是也亦有飲陂湖之水誤有小魚入腹不死便即生長亦有形狀如魚故以名也方治食魚鱠及生肉住胸膈中不化吐之不出便成癥瘕方出聖惠方厚朴一兩川大黃二兩右為散作二服每服以酒一大盞煮取六分去滓放溫盡服良久再服療食魚鱠及生肉住胸膈中不消化吐之不出多成癥病出聖惠方朴硝一枚大黃二兩右以酒二斤煮取一斤去滓盡服之立消無朴硝用芒硝硝石亦佳一方為散每服三錢以酒一中盞煎至六分去滓空腹溫服當下利即差治食鱠不消方及生肉住胸膈不化心成癥瘕出聖惠方右搗馬鞭草汁一大盞煎五七沸溫分二服盡即消服生薑汁亦消又方出聖惠方右以魚鱗燒作灰細研每服以新汲水調下一錢治食魚肉等成癥結在腹內并諸毒方出千金方右以狗屎五升燒末綿裹以酒一斗浸再宿濾取清分十服日三三日令盡隨所食癥結即出治食魚鱠腹中脹滿成瘕痛悶飲食不下日漸瘦用水中石子數十枚火燒赤投五升水中各七遍即熱飲之如此三五度當利出瘕也痃癖附論夫痃癖本因邪冷之氣積聚一向而生也痃者在腹內近臍左右各有一條筋脈急痛大者如臂因氣而成如弦之狀名曰弦氣也癖者則在兩肋之間有時而癖故曰癖也夫弦之與癖名號雖殊針石湯丸主療無别此皆隂陽不和經驗否膈飲食停滯不得宣流邪冷之氣摶結不散故曰痃癖也方木香通氣丸出聖惠方治痃癖氣滯心腹痞滿嘔逆咳嗽消痰進食散痞人參木香各一兩半元胡一兩陳皮黑牽牛各六兩檳榔丁香各半兩荆三稜廣茂三兩半夏茴香木通神麴麥蘖青皮各三兩右為細末水糊為丸如小豆大每服二三十丸生薑湯下食後日進二服硃砂三稜丸主痃癖氣塊留滯一切內傷石三稜荆三稜雞瓜三稜蓬术枳殼川練子茴香青皮當歸各半兩檳榔七錢半丁香二錢木香三錢巴豆肉豆蔲七錢半硃砂五錢右為細末除硃砂外生薑釅汁打糊亦用麵成劑為丸如小豆大每服十五丸薑湯下溫水亦得療痃癖氣兩脅脹滿方牛膝大黃各十分桔梗芍藥枳實白术各八分人參柴胡桂心各六兩鱉甲茯苓訶梨勒皮各八分右搗蜜和丸如梧桐子大空心酒飲及薑湯任下二十丸日二服漸加至三十丸利多即以意減之常取微通泄為度忌生硬難消油膩等物及莧菜桃李雀肉豬肉冷水生蔥開結妙功丸治怫熱內盛痃癖間積酒積食積一切腸垢癥瘕積聚疼痛脹悶作發有時三焦擁滯二腸燥澀懊憹心煩不得眠􅠲嗽逆不能食或風濕熱兼為腫脹黃瘦眼澀昏睡一切所傷心腹暴痛風熱燥鬱偏頭疼筋脈拘換肢體麻痺走注疼痛頭目睧眩中風偏染邪氣上逆上實下虛腳膝冷痛常服保養宣通血氣消進飲食荆三稜茴香神麴麥蘖大黃各一兩乾薑二錢川烏頭四分半夏半兩桂二錢巴豆四枚牽牛三錢右為細末用膏丸小豆大生薑湯下十丸十五丸或嚼生薑溫水或只用溫水涼水下亦得漸加至三二十丸或心胃間稍覺藥力暖心然即却減丸數以意加減無時日三服或取久積或破堅積初服十丸次服二十丸每服加十丸三服以加至快利三五行後如常服少得食力更後加取利以意消息病去為度病甚者自三五丸加服二香三稜丸出聖濟總録治痃癖結塊面黃肌瘦腹引痛不欲飲食宿滯冷痰丁香木香各一兩荆三稜雞瓜三稜石三稜各三分硇砂牽牛子大黃蓬莪茂各半兩檳榔一兩烏梅肉二兩巴豆五十枚右為末再研勻酒煮糊和丸如菉豆大每服五丸至七丸陳橘皮湯下食後服木香三稜丸治心腹痃癖癥瘕氣塊腸胃積聚上下不通木香七錢荆三稜一錢半石三稜一兩半蓬术一兩半青皮一錢半肉豆蔲四兩雞瓜黃連檳榔四兩巴豆三二十枚右為末水煮生薑取釅汁打糊成劑為丸如小豆大每服十丸溫生薑湯下或溫水送下不以時候日進一服斟酌虛實加減丸數雞瓜三稜丸治五臟痃癖氣塊雞瓜三稜石三稜京三稜木香青皮陳皮各半兩硇砂三分檳榔肉豆蔲各一兩右為細末生薑汁麵糊為丸如桐子大生薑湯下一方無陳皮云年深者一月見效忌一切生冷硬物及滑物木香丸出聖惠方治痃癖氣脅肋妨悶不欲飲食四肢瘦弱木香半兩乾薑一兩草豆蔲一兩桂心一兩當歸一兩陳橘皮一兩附子一兩巴豆五十枚右件藥搗羅為末入巴豆研令勻煉蜜和搗三二百杵丸如菉豆大每服食前以粥飲下五丸京三稜丸治丈夫婦人痃癖氣一切積滯京三稜芫花各三兩蓬莪茂桂各一兩附子一兩半乳香硇砂各一分巴豆右搗研令勻每用藥味二兩鎔黃臘一兩蜜少許同和丸如梧桐子大丹砂為衣生薑木瓜湯下二丸至三丸甘草生薑湯下亦得看虛實臨時用烏頭丸出聖惠方療癖痃積冷發如錐刀所刺鬼疰往來者烏豆人參桂心附子乾薑赤石脂各八分硃砂研三分右搗篩蜜和為丸如梧桐子大以暖酒服七丸稍稍加至十丸忌生冷醋滑豬魚雞蒜小豆油膩牛馬肉生血物生蔥等物療痃癖右以蓼每日取一握水煮服之療痃癖右以鼠屎一大合炒將黃濕者炒乾即不須炒即用以水二升煮五六沸及熱濾取汁置碗中急內硇砂一小兩乃蓋頭經宿明日平旦溫為兩服稍晚食無所忌大黃散治痃癖氣連心肋相引痛堅硬川大黃一兩當歸一兩白术一兩枳殼一兩柴胡一兩鱉甲一兩右件藥搗篩為散每服三錢以水一中盞入生薑半分煎至五分去滓不計時候溫服吳茱茰散出聖惠方治痃癖氣不消吳茱茰半兩鱉甲三兩川大黃一兩當歸三分京三稜一兩檳榔一兩右件藥搗細羅為散每服食前以暖酒調下一錢丁香散出宣明論治痃癖氣脅下痞滿息而不消積而不散元氣在胃而妨食者好丁香二十枚白丁香七十枚蜜陀僧舶上硫黃黃鷹調各半錢右為末每服一匙皂子煎湯調下不計時候治肚內硬生物肌膚黑瘦如柴嘔吐積滯日三服食後妙應丸治老人虛人一切虛寒痃癖積塊攻脹疼痛諸臟氣虛積聚煩悶及飲食中蠱毒或食水陸蓏子卯入腹而成蟲蛇魚鱉或宿食留飲婦人産後敗血不消女子月水不通結為癥瘕時發寒熱唇口焦黑肢體瘦削嗜卧多壓食少腹痛大便糟粕變成冷痢黑附子二枚硇砂三錢木香七錢半破故紙蓽撥各一兩右將飛過硇砂末作附子甕內却用剜出附子末蓋口用和成白麵裹附子熟約半指厚慢灰火內煨令黃色去麵同木香等為細末却將元裹等為末黃麵醋調煮糊為丸如菉豆大每服十五丸至二十丸食後生薑湯下一方有青皮消滯千金丸治證同前牽牛四兩香附子二兩五靈脂一兩半京三稜五錢右為末醋糊為丸每服二三丸甘草湯下桃仁丸療十年痃癖桃仁六升豉六升蜀椒三兩乾薑三兩右先搗桃仁如脂合搗千杵如乾可少許蜜和搗令可丸空肚酒服三丸如酸棗大日三鱉甲丸出聖惠方治痃癖氣塊不消令人羸瘦面色萎黃四肢少力不欲飲食鱉甲三兩京三稜三分川大黃三兩陳橘皮三兩右件藥搗羅為末於銀鍋中入米醋三升以慢火熬成膏候可丸即丸如梧桐子大每於食後以粥飲下三十丸芫花丸出聖惠方治痃癖氣疼痛芫花半兩硇砂一兩乾薑半兩京三稜半兩右件搗藥為末用硇砂醋熬成膏以蒸餅少許同和丸如菉豆大每服食前以薑橘皮湯下十丸加減麻仁丸療積年患氣不能飲食兼食不消化風氣冷氣熱氣衝上痃癖氣并乳食氣發動並療之服經三四日自覺有效蜀大黃四兩訶梨皮四兩人參二兩大麻仁二兩右搗篩依法以蜜和丸每服十丸二十丸增減以意量之以溏利病除亦不損豫常服三十餘年至八十嵗萬病皆無百無所忌補理腰腳服經七八日腰腎先冷者即下膿水腰腳輕健以酒飲下之並得治大人小兒痃癖氣塊往來疼痛不止又治心氣痛不可忍者白玉赤玉右為細末用水糊為丸如梧子大每服三十丸薑湯送下又方南星製香附子各等分右為末薑汁丸每服二三十丸熱薑湯下治丈夫痃癖兩肋虛脹此法出傳尸方豬􅏬一具青蒿葉右以無灰酒一大升微火溫之乘熟內豬􅏬中和蒿葉相共暖使消盡又取桂心一小兩别搗為末內酒中每日平旦空腹取一小盞服之午時夜間各再一服甚驗忌熱麵油膩等治冷氣痃癖羸瘦方見本門治積冷痃癖氣不思飲食四肢羸困宜服此方莨菪子三分大棗四十九粒右件藥以水三升相和煮水盡即取棗去皮核每於食前喫一枚粥飲下亦得覺熱即止治痃癖不差脅下痛硬如石方出聖惠方生商陸根汁一升棗仁一兩右件藥研杏仁令爛以商陸根汁和研濾取汁以火煎如餳每服取棗許大空腹以熱酒調服之漸加以利惡物為度治痃癖氣不消方出聖惠方京三稜一兩川大黃一兩右件藥搗羅為末用醋熬為膏每日空心以生薑橘皮湯下一茶匙大黃丸出聖惠方治痃癖氣時攻心腹疼痛令人不思飲食漸為瘦病川大黃一斤鱉甲三兩枳殼三兩半當歸一兩半赤芍藥一兩半京三稜三兩吳茱茰一兩右件藥搗羅為末先以米醋三升熬大黃為膏次入諸藥和丸如梧桐子大每服於食前以溫酒下三十丸消飲方治一切積聚痃癖氣塊及大小結膏痛不能抑按天南星半夏芫花自然銅各等分右為末醋煮麵糊為丸如梧桐子大每服七丸食前溫水下良久蔥粥投之相虛實加減硇砂丸出聖惠方治痃癖冷癥塊及療丈夫腰腳補暖水藏善治婦人氣血暖子宫殺三蟲伏火右先取臘月細桑條子不限多少燒作灰略以水淋却苦汁後將灰晾乾收之每一兩硇砂用灰三兩先研硇砂以水化消拌灰令乾濕得所取一固濟