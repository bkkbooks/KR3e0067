痛𦂳急方白术枳殻各三兩柴胡四兩鼈甲炙二兩右以水七升煑取二升五合去滓空肚分三服相去七八里乆能連服三四劑始知騐禁生冷猪肉并毒魚頻服有効忌莧菜桃李雀肉生葱治痃氣發渇衝心痛不識人方出聖恵方川烏頭一兩芫花一兩醋浸青橘皮一兩吴茱茰一兩右件藥搗羅為末以軟飯和丸如梧桐子大每服不計時候以橘皮湯下十丸巴豆丸出聖濟總録治痃氣心痛方見夲門治痃氣發渇衝心疼痛不識人方出聖恵方桃仁一兩吴茱茰三兩右二味相和以慢火熬桃仁色稍黄即取出合噐盛之宻盖定待冷擇去茱茰留桃仁每日空心爛嚼二七顆以熱酒下晚食前再服枳殻湯出聖濟總録治痃氣腹脹兩肋急滿不能飲食頭痛壯熱身體疼痛枳殻一兩半桔梗人參前胡桂各一兩㯽榔半兩鼈甲一兩半右粗搗羅每服三錢以水一盞半入生薑半棗大拍破同煎至七分滓温服日三一方用枳實無枳殻蓬莪茂散出聖恵方治痃氣發渇衝心疼痛不識人方方見夲門治痃氣其狀腹内疼痛發作有時臨發作疼痛時有一條絃連臍左右強急疼痛大者如臂小者如指急如弦之狀宜服此方出䕶命方當歸鼈甲京三稜延胡索牽牛大黄㯽榔各半兩桔梗芫花沒藥木香各一分白蒺䔧一兩桂心八銖右為細末與芫花沒藥同研如飛塵每服三錢不計時候葱湯調下癖氣附論夫五臟調和則榮衛氣理津液敷腴則脾胃流轉雖復多飲酒漿亦不能為病若攝養乖方則三焦痞膈而腸胃不能宣行因飲水漿便令停滯不散更遇寒氣積聚而成癖癖者謂僻在左右兩脇之間而痛是也方大五明狼毒丸出千金方治堅癖痞在人胸脇或在心腹狼毒乾地黄四兩附子大黄蓯蓉人參當歸細辛蜀椒五味子䕡茹各一兩半夏麹乾薑官桂各一兩半芫花莾草厚朴防己旋覆花半兩杏仁巴豆二十四枚右為末蜜和丸如梧桐子大每服二丸旦夜一以知為度鼈甲大黄丸出聖濟總録治癖積健脾胃消宿滯鼈甲二兩大黄㯽榔附子麦蘖各一兩烏藥訶梨勒木香白术桂去粗皮蓬莪茂京三稜枳殻吴茱茰各半兩右為末後將硇砂三兩細研醋三升濾去滓將前藥末平分一半入硇砂内攪和於銚子内煎成膏和丸如梧桐子大空心炒生薑塩湯下二十丸療癖羸瘠髄酒方猪肪膏薑汁生地黄汁各三升牛髄二升油五升當歸蜀椒各四分吴茱茰桂心人參芎藭各五分乾地黄七分逺志皮五分五味子六分右切搗九味三篩為散取膏髄等五種汁加水一斗同汁煎取水并藥汁俱盡但餘膏在俟小冷下散攪令調火上煎三上不燥噐貯凝冷為餅方寸以清酒一升煖下膏取服之晝兩服夜一服非但療癖亦主百病忌生葱蕪荑防葵丸出聖恵方治癖氣兩脇下硬按之痛心間欬逆不下飲食四肢羸痩積年不瘥防葵三分芎藭半兩赤茯苓三分鼈甲一兩桃仁三分枳殻半兩木香半兩川大黄三兩當歸半兩乾薑半兩桂心半兩細辛半兩桔梗半兩京三稜三分右件藥搗羅為末煉蜜和搗五七百杵丸如梧桐子大每服不計時候以粥飲下三十丸防葵丸出聖濟總録治癖氣脇肋妨滿腹脹不思食方見本門木香硇砂煎丸治癖氣積氣血結刺痛木香一分硇砂半兩巴豆大黄京三稜乾漆青橘皮蓬莪茂附子桂去粗皮乾薑各一兩墨一指右將大黄京三稜巴豆三味各搗研為末同於銀石噐内以醋一升煎一兩沸次入硇砂同熬成膏次將諸藥搗羅為末用膏和成劑杵千數為丸如菉豆大每服五丸炒生薑湯下結聚腹内氣塊痛乾薑湯或橘皮湯下食飡麫黏食不消成塊聚煑麫湯下食牛羊鼈肉成氣塊不散各用本肉淡汁下宿酒不消温酒下婦人諸般血氣當歸酒下姙婦不得服如要宣轉茶清下加至七丸小兒三丸鼈甲丸出聖恵方治癖氣兩脇下硬如石按之痛心腹痞滿不能下食心悶欬逆積年不瘥方見本門療腹中癖氣方牛膝枳實鼈甲茯苓各八分桔梗芍藥白术人參厚朴大黄桂心㯽榔各六分右搗羅蜜和丸空肚温酒服如梧子大二十丸日二服漸加至三十丸老小微利忌生冷油膩小豆粘食莧菜桃李雀肉醋大蒜葱猪三稜丸出聖濟總録治食氣癖塊胸膈噎塞冷氣攻刺吐酸水不美飲食腹脇脹滿痛氣不升降京三稜芍藥桔梗乾薑㯽榔吴茱茰烏頭各半兩大黄訶梨勒各一兩鼈甲一兩半桃仁三分右為末酒煮麫糊為丸如梧子大每服十五丸炒橘皮塩湯下如酒食所傷胸膈不快腹脹醋心熱水下鼈甲三稜丸治男子婦人小兒虚中癖氣臟腑不調飲食不消久致痩弱不可取轉者服之自然安好又治虚氣膨脹心胸滯悶并婦人産後血積蓐勞痩瘁甚者鼈甲九肋重四兩京三稜水浸兩宿乾漆各三兩木香乾薑補骨脂㯽榔沒藥硇砂墨研各一分右為末再同研勻醋煑麫糊丸如菉豆大每服三十丸生薑塩湯下婦人血病醋湯下牛黄湯療癖牛黄麝香硃砂生犀角各等分以上四味並研令極細湯沸後内之大黄弔藤升麻各一兩甘草鼈甲半兩丁香五十枚右切以水三升先煮大黄等六味取強半升絞去滓内牛黄等四味和攪分為三服每服如人行十里乆忌如藥法若利出如桃膠肉醬等物是病出之候特忌牛馬肉其藥及水並是大兩大升此藥分兩是十五以上人服十嵗以下酌量病减之忌莧菜海藻艾菘菜生血物等必効練中丸主癖虚熱兩脇下癖痛惡不能食四肢酸弱口乾唾涕稠粘眼澁頭時時痛并氣衝背膊虚腫大小便澁小腹痛頭髪落耳鳴彌至健忘服十日許記事如少時無禁忌大黄一斤朴硝十兩芍藥八兩桂心四兩右搗篩蜜和為丸如梧桐子平旦酒服二十丸日再稍加至三十丸以利為度能積服彌佳縱利不損人忌生葱硇砂丸出聖恵方治癖氣在兩脇結聚不散硇砂半兩乾薑半兩川烏頭一兩芫花半兩皂荚半兩京三稜半兩五靈脂一兩巴豆半兩右件藥搗羅為末入硇砂巴豆同研令勻用醋熬為膏旋丸如梧桐子大每服空心及臨卧時以生薑橘皮湯下二十丸一方搗羅為末入硇砂巴豆拌勻再羅每秤此藥末一兩入去皮心膜油煎黒色巴豆二十枚研和勻以醋煮麫糊丸如大麻子大每服五丸至七丸茶酒熟水任下柴胡飲出聖濟總録治癖氣腹痛兩脇脹滿不飲食方見夲門小狼毒丸出千金方治堅癖痞在人胸脇或在心腹狼毒三兩附子旋覆花半夏䕡茹白附子各三兩右為末蜜和丸搗五千杵丸如梧桐子大每服三丸至十丸日三一方無半夏白附子䕡茹只三味等分枸杞子散枸杞子乾薑白术橘皮各五兩吴茱茰一斤蜀椒三合右六味切搗五味三篩下為散取枸杞子燥瓷噐貯研暴如作米粉法七日暴之一暴一研前藥散和之又研随飲酒食等即便服一方寸匕和酒食進之如此能三年服非但療百病亦長陽氣忌桃李雀肉魚鮓等鼈甲丸出聖濟總録治積年癖氣塊攻心腹鼈甲炙一兩乾薑半兩京三稜一兩青橘皮半兩巴豆一分右除巴豆外搗羅為末入巴豆膏和丸如菉豆大每服三丸至五丸生薑湯下空心食前服如意丸出聖濟總録治虚積導滯氣消癖塊硇砂十二塊巴豆三十枚大棗十二枚白丁香八十四箇膩粉一錢右將已去核棗六枚水煮熟同搗納餘藥成膏丸如菉豆大每服五丸煎生薑湯下小兒二丸至三丸煎皂子湯下臨卧服郁李仁丸出聖濟總録治丈夫婦人腹内癖氣郁李仁京三稜芫花蓬莪茂木香各一兩右用醋一斤同煮醋盡焙乾搗羅為末麫糊丸如菉豆大每服三五丸生薑湯下日三吴茱茰丸出聖恵方治癖氣脹痛吴茱茰半兩附子一兩桃仁一兩巴豆三十枚乾薑一兩右件藥搗羅為末入巴豆研令勻以軟飯和丸如黍粒大每服不計時候煎生薑橘皮湯下五丸硇砂丸治癖疼痛腹脇脹滿發歇定不可忍不思飲食療癖飲并醋咽吐水及食飲不消氣逆脹滿大腹㯽榔十兩髙良薑三分桃仁一升右和搗絹篩以白蜜和丸酒服如彈子丸二枚再服漸加至四五丸加减任意自量應通丸出聖濟總録治癖氣發歇疼痛不可忍者宜急服桂去粗皮乾漆京三稜當歸右等分為末醋煑麫糊為丸如梧桐子大焼紙灰酒下十五丸破癖丸白术枳實柴胡各三兩右切以水五升煑取二升分温三服服三十劑永差忌桃李雀肉京三稜散出聖濟總録治癖氣在脇下痛乆不去京三稜半斤枳殻兩甘草三兩右搗篩為散每服三錢入塩半字沸湯㸃藥空心食前服消癖丸治癖氣結硬不消胸脇脹悶出聖恵方巴豆一分硇砂一盞猪牙皂莢四兩右先將皂莢搗羅為末入巴豆研勻用硇砂膏和丸如菉豆大每服一丸食後臨卧粥飲下蓬莪茂散出聖濟總録治癖氣發歇衝心疼痛不知人蓬莪茂半兩胡椒一分附子半兩右搗羅為散每服半錢以醋湯調下不計時候療癖出肘後方右用大黄十兩杵篩以醋三升和勻白蜜兩匙煎堪丸如梧桐子大每服三十丸生薑湯吞下以利為度小者减之療腹滿癖堅如石多年不瘥者出聖恵方用白楊木東南枝去蒼皮䕶風細剉五升熬令黄以酒五升淋訖即以絹袋盛滓還内酒中蜜封再宿每服一合日二食前服療癖氣以生薑竿子一片壓破以水五升漬二七日空腹一杯服神良必効療癖方取車下李仁微湯退去皮及並仁與乾麫相拌搗之為餅如乾和淡水如常搜麫大小一如病人手掌為二餅㣲多使黄勿令至熟空肚食一枚當快利設如不利更食一枚或飲熱粥汁即利以快利為度至午後利不止即以醋飲止之利後當虚病未盡者量力一二日更進一服以病退為限小兒以意量之不得食酪及牛馬肉但病重者李仁與麫相半輕者以意减病减之後服者亦任量力頻試差神効千金散右治大人小兒脾癖并有疳者宜服錦文大黄三兩為極細末陳醋二大椀用砂鍋内文武火熬成膏子傾在新磚瓦上日晒夜露三朝夜將下来再研為細末後用上髙船上硫黄一兩形如虎珀者極妙官粉一兩將前大黄末一兩三味再研為細末十嵗以下小兒每服可重半錢食後臨卧米飲湯調服此藥忌生硬冷葷魚鷄鵝一切發病之物服藥之後服半月白米軟粥如一服不愈後半月之後再服鼈甲丸主癖氣發動不能食心腹脹滿或時發熱鼈甲枳實麥門冬人參各八分白术芍藥前胡厚朴各六分右搗篩蜜和為丸如梧桐子飲服二十丸漸漸加至三十丸冷即酒服極効禁生物粉酪油膩等亦忌莧菜桃李雀肉紫葛膏治癖氣脇下硬痛心煩不能食方見本門如神丸出聖濟總録治乆積癖氣心胸不和嘔吐痰逆脇肋脹滿疼痛烏頭乾漆乾薑桂各一兩硇砂半兩巴豆半兩右合研令勻取炒棗肉刻成塊用温紙厚裹塩泥固濟厚紙宻裹日三曝乾地坑子内以木三斤簇焼候灰銷手取出看硬輭搗碎為丸如小豆大每服三丸至五丸木𤓰湯下不拘時治癖氣積滯發作有時大腑不調或酒食過度停滯不散之所致乆而不治當為大病大臟冷然後喫此藥出䕶命方當歸芫花枳殻官桂㯽榔黄橘皮各一分半夏桔梗吴茱茰細辛各三錢白蒺䔧熟牽牛木香各半兩右為細末每服三錢空心以葱湯調下和滓喫通靈丸治乆患癖塊或因氣不和即發疼痛胸多痞塞消化癥瘕大効京三稜醋石榴杏仁甘遂大㦸子大黄巴豆苦葶藶芫花五靈脂各一兩塩豉烏梅各二兩右件一十二味藥剉細用水一斗二升入藥於鍋内同熬候水盡就鍋内炒令黄焦色止取出杵為末更入木香青皮末各一兩拌勻醋煑麫糊為丸如小豆大每服薑湯下三五丸心胸痞悶疼橘皮湯下喫酒食飽悶生薑湯或茶湯温水下亦得治氣結破癖氣及下四肢水出本草右用郁李仁四十九粒酒服止瀉尤良治癖積氣出夲草右用砒黄磨研酒飲之治氣痃癖出夲草右用土落草作煎酒亦搗絞汁温服治一切血氣癥癖用蚶殻不以多少焼以米醋淬三度埋於地中令壊爛取出為末以醋膏丸酒服之導引法養生方云卧覺勿飲水更眠令人作水癖又云飲水怱急咽乆成水癖又云舉兩膝夾兩頰邊兩手據地蹲坐故乆行之愈伏梁者宿食者不消成癖腹中如杯如盤宿癰者宿水宿氣癖數生癰乆行腸化為筋骨變為實普濟方卷一百七十四
