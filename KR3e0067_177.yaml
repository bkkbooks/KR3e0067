body:
  text: 普濟方卷一百七十七明周王朱橚撰痟渇門痟渇治痟渇丸一名麥門冬丸出十便良方麥門冬用上元板橋鮮肥者二大兩黄連九莭者一大兩右搗末以肥苦瓠汁浸麥門冬經宿然後去心即於臼中搗爛納黄連末臼中和搗候丸得疾併手丸梧桐子大食後飲下五十丸日再但服兩日其渇必定若重者毎服一百五十丸第二日一百二十丸第三日一百丸第四日八十丸第五日依本服之若欲合藥先看天氣晴明其夜方浸藥切須净處禁婦人雞犬見知少可毎日服二十五丸服訖覺虛即取白羊頭一枚净去毛洗了以水三大㪷煮令爛去頭取汁可一㪷以來細細服之亦不用着鹽不過三劑平復海上方治痟渇丸云偶于野人處得神效不可言又一法出仁存方白扁豆净煮爛去皮一兩右為末以蜜入天花粉汁同丸梧桐子大用金銀箔為衣毎服二十丸日二服同𤓰蔞根汁下次用麥門冬湯下病退忌炙煿酒色次服補養藥與𫝊信方稍同其方用黄丹麥門冬牡蠣知母各一兩黄連天花粉苦参各二兩金箔百片銀箔二百片生栝樓根汁為丸如上服香墨散出聖濟總録治痟渇香墨一兩栝樓根二兩鉛丹半兩右為末二錢新水一盞調下次日一服水調藥末一錢不計時候服藥時不必忌水任意飲三兩盞後自然怕飲服三五日見效治痟渇熱出聖恵方或心神煩亂宜服此櫻粟一合右細研以温水一大盞調令匀分三服食前服之又方出聖恵方田中活螺三升洗去土又以糯米二升煮為稀粥可及二㪷已来候冷即將田螺置扵冷粥盆内以物盖養之待螺食盡粥却吐沫收瓜連丸出經驗良方治痟渇骨蒸右用大冬瓜一枚去瓤入黄連細末實冬瓜内浸十餘日覺冬瓜肉消盡為度同硏丸梧桐子大毎服冬瓜煎湯隨意服之治痟渇及小便多出千金方右用瓜蔞粉和雞子打和得所曝乾為末滴水為丸毎服三四十丸温熟水或新水或白湯放温服一方薄切炙乾五兩水五升煮取四升隨意飲之良栝樓粉出千金方治大渇深掘大栝樓根厚削皮至白處止寸切水浸一日一夜易水經五日取出爛搗碎硏之以絹袋濾出粉乾之水服方寸匕日三四服亦可作粉粥乳酪中食之不限多少取瘥止孫思邈作粉治法治不渇而小便大利垂至扵死者右用牡蠣五兩以患人尿三升煎取二升分再服神驗又方出千金方水和栝樓散服方寸匕亦可蜜丸梧桐子大服三十丸方見渇利類又方出本草以青梁米煮取汁飲之即瘥治痟渇頭痛壯熱又婦人血氣牢閉不堪者及五淋茅根三升切右搗取汁令盡渇飲之一方白茅煎汁服之白茅能破血治痟渇揀黄連一兩八九莭者右㕮咀水一碗去滓頓服之立效治霍亂心頭卒熱渇出本草粟米泔右飲數升即愈一作煮泔治口渇失精醒酒田螺右水漬汁飲之最良小便數亦可服或煮汁服之亦可治渇出本草牛肚右以醋煮食之治一切渇出肘後方大牡蠣右扵臈日或端午日用黄泥裹煆通紅放冷取出為末用活鯽魚煎湯調一錢小兒調半錢只二服瘥専治日夜發渇飲水頻併兼治黄腫出肘後方浮萍草右八月取来隂乾為末臨卧酒調或浮萍汁飲之専治渇扒殻一名薇葜右㕮咀毎服半兩水三盞烏梅一箇煎一盞治渇備急方出聖濟總録大豆苗嫩者右以三五十莖塗酥炙令黄熟搗羅為散毎服二錢煎人參湯調下治痟渇方出聖濟總録冬瓜一枚削去皮右埋在濕地中一月將出破開取清汁飲之或燒絞取汁服之盡更佳治渇出危氏方糯稲稈灰右取中一尺燒淋汁飲或不燒便煎服亦妙同生牛乳細呷或生蘿蔔搗取汁時飲少許治熱去煩渇出本草甜瓜右取去皮食後喫之煮皮作羮亦佳止渇方酪右味酸寒無毒主之又方出十便良方桑葉炙右煎飲之一如茶法治渇方出肘後方糯米二升右淘取泔飲訖則定又方出肘後方糯米右渇者腹當飽硏取白汁飲之以瘥為度止酒後煩熱渇牡蠣肉右扵姜醋中生食之亦主丹毒治煩熱少睡多渇小麥右用作飯水淘食之治渇止小便數出本草羊肺小豆葉右合并煮食之良治痟渇不止下元虚損出肘後方牛膝五兩生地黄汁五升右將牛膝細剉為末入生地黄汁内晝曝夜浸汁盡為度蜜丸如梧桐子大空心酒下三十丸後乆服壯筋骨駐顔色黑髪津液自生一方粥飲下治痟渇傷中小便數出本草黄雌雞一隻右治如常煮令熟去雞停冷渇即飲肉亦可食若和米及鹽豉作粥及五味作羮並得又方出本草兔一隻右剥去皮爪五臓等水一斗半煎使爛骨肉相離漉出骨肉斟酌五升汁便澄濾令冷渇即飲之極重不過三服便效桑根白皮湯出肘後方治卒小便多痟渇桑根白皮入地三尺取桑根剥白皮炙令黄黒剉右水煮之令濃随意飲之亦可納少米勿入鹽一方治痟渇後成癰疽粗搗篩毎服二錢水煎治痟渇出本草石燕水牛鼻右和煮飲之自死牛鼻不如落厓死者良又方出本草麻鞋底故者右用煮汁服之獨勝散出肘後方蘿蔔出子者三枚右净洗薄切晒乾為末毎服二錢煎猪肉澄清調下食後并夜卧日三服治痟渇飲水不知出本草花白鴿一隻右切作臠以土蘇煎令病人嚥津白鴿即鵓鴿也治痟渇出本草荔枝右以食之治痟渇風熱益氣力發氣脹出本草苦竹笋右蒸煮炒任食之治痟渇引飲無度食韭苗自止法出肘後方韭苖右日喫三五兩或炒或作羮不入鹽效但喫十斤即佳過清明勿喫醬肉無妨煩熱痟渇真珠知母右為散服之治痟渇止煩悶烏梅肉二兩㣲炒右為末毎服二錢水二盞煎一盞去滓熱入豉二百粒煎至半盞去滓毎扵食後及臨卧煎服之當解煩止渇也治痟渇出本草糯米右作糜食一㪷效治多年痟渇無不瘥者出本草牡驢骨右用煮頭汁令服三二升治大渇日飲數㪷小便赤者麻子一升右用水二升煮三四沸取汁飲之無限服過九升麻子愈麻子今人績布麻種子也治痟渇心脾中熱下焦虚冷小便多漸羸瘦者出本草黄牛乳右渇飲三四合一方用牛羊乳治痟渇補肝腎氣和小膓療虚勞益精氣出本草羊乳羊脂右合作羮食之亦主女人與男人中風治卒痟渇小便多出十便良方竹瀝右恣飲數日愈一方治痟渇小便不利食後時飲一合治痟渇濮瓜去皮毎食後嚼喫三二兩五七度良治痟渇日夜飲水數斗小便數瘦弱者出本草猪肚一枚右用水洗净水五升煮令爛熟取二升已来去肚着少豉渇即飲之肉亦可喫又和米着五味煮粥飲之亦佳治煩熱痟渇出本草獼猴桃右俟熟收之取瓤和蜜煎作膏食之一名藤棃一名本子一名獼猴棃大冷不可乆服治煩熱痟渇出本草麥門冬去心右以煮飲服之止煩渇出本草芭蕉油右以服之治卒痟渇小便多出本草黄蘖一斤右水一斗煮三五沸渇即飲之恣意飲數日便止一方用酒煮三沸去滓飲治痟渇得效出刖後方烏豆牛膽右取烏豆置牛膽中隂乾百日吞之即瘥又方比梨右毎日服食以安為度猪肚丸出神效方治痟渇猪肚一枚黄連五兩栝樓四兩麥門冬四兩去心知母四兩如無茯神代之右為細末納猪肚内線縫安置甑中蒸極爛熟就熱木臼中搗可丸如硬少加蜜梧桐子大毎服三十丸漸加至四十丸渇則服之如無木臼以沙盆中用木杵硏亦可爛之為妙酒蒸黄連丸一名獨連丸出神效方治痟渇日飲水數升至二三斗小便五七十次發熱瘦弱口乾食已如饑此名痟癉今用黄連味苦寒無毒除熱氣止煩渇厚膓胃消渇人喜水脾胃惡濕黄連為對症黄連净半斤酒二升重湯蒸候時取出曝乾右為細末滴水和丸如梧桐子大毎服五十丸大茶飯前服之温水下初伏日為頭服之一方以醋煮和丸一方用蜜丸無酒蒸治痟渇出聖恵方䜴汁右飲任性多少瘥止一方豆豉三合以水二大盞煎取頓汁服神效散出家藏經驗方治痟渇白芍藥甘草各等分右為末水調日三服有人患此九年服七日愈經驗方陳氏云昔鄂渚李祐之嘗病渇九年服藥不一徃徃止而復作與蘇朴宰交因授此方服三四日疾勢頓愈今年餘不作覺前後所服之藥取效無愈扵此者不當以所用之藥平易而忽之也又方出肘後方故破屋瓦右用煮之多飲即惡聞水氣一方故屋上古瓦兩張净洗搥破水煮濃汁食後温頻服一小盞治痟渇撏猪湯右用濾過勿使患人知飲一碗即愈又方治痟渇香水梨或好鵞梨或南雪梨俱可右用蜜熬瓶盛不時用熱水或冷氷水調服大有功效止嚼梨亦妙東坡家藏方載消渇日飲水數斗食倍常而頻溺連年服藥不愈者可用麝香當門子一箇須浸之作十小丸以枸杞熬湯送下随意此病脾脈實而腎脈衰初因飲酒瓜菓過度熱在脾内若胃而停積生冷雖實飲過人而喫水既多不得不溺非消渇也言甚當理服者審之人參白术湯治胃膈癉熱煩滿不欲食或癉或為痟中善食而瘦或燥鬰甚而痟渇多飲而小便數或熱病或恣酒色誤服熱藥致脾胃真隂血液損虚肝心相摶風熱燥甚三焦傷胃燥怫鬰而水液不能宣行則周身不得潤澤故瘦瘁黄黑而燥熱痟渇雖多飲而水液終涸下焦虚冷誤死多矣又如周身風熱燥鬰或目瘴癰疽瘡瘍上為喘𠻳下為痿癉或停積而温熱内甚不能𫝊化者變水腫腹脹也凡多飲數溲為痟渇多食數溲為痟中肌肉消瘦小便有脂液者為痟腎此世之所𫝊三痟病也雖經所不載以内經考之但燥熱之為甚者也此藥兼療一切陽實隂虚風熱燥鬰頭目昏眩風中偏枯酒過積毒一切膓胃澁滯壅塞瘡疥痿痺并傷寒病雜煩渇氣液不能宣通並宜服之人參白术當歸芍藥大黄山梔子澤㵼已上各半兩連翹栝樓根乾葛茯苓已上各一兩官桂木香霍香寒水石各一兩甘草三兩石膏四兩滑石半斤盆硝半斤右為粗末毎服五錢水一盞生薑三片同煎至半盞絞汁入蜜少許温服漸加十餘錢無時日三服或得臓腑疏利亦不妨取效更妙後却常服之或兼服消痞丸似覺膓胃結滯或濕熱内甚自利去大黄芒硝宣明論有荆芥穂薄荷桔梗知母四味不用盆硝無比散治痟渇土瓜根六兩苦參粉鹿茸炙栝樓白石脂研甘草炙黄耆各三兩黄連去毛頭牡蠣煆白龍研各五錢雄雞膓三具桑螵蛸三七枚炙雞肶胵黄皮三十具炙右搗篩為散一服毎方寸匕日再服夜一服以後藥下之竹根十兩麥門冬去心石膏碎綿裹各四兩甘李根白皮三兩右水一斗二升煮取三升五合以下前件散藥如難服可取此藥汁和丸一服六十丸仍還用此藥汁下之忌猪肉海藻菘菜黄連丸治痟渇除膓胃熱實麥門冬茯苓黄連石膏萎𬎼各八分人參龍膽黄芩各六分升麻四分枳實五分生薑枸杞子外臺用地骨皮栝樓根各十分右為末蜜丸如梧桐子大以茅根粟米汁下十丸日二服若渇則與無比飲至足大麻麥亦得飲方如左茒根一升切粟米三合右水六升煮取米熟用煎藥土瓜丸一名麥門冬丸治脾胃中熱痟渇小便數骨肉日漸消瘦黄連麥門冬十分去心苦參栝樓知母茯神土瓜根各六分人參甘草各六分炙右搗篩和蜜丸如梧桐子大毎食後少許煮蘆根大麥飲下二十丸日二服漸加至三十丸取利忌海藻菘菜狗肉等物一方無黄連黄連丸治痟渇黄連胡者去毛一升麥門冬去心五錢右為末生地黄汁牛乳各三合栝樓根和頓為丸如梧桐子大一服二十五丸飲下日再服漸漸加至三十丸不頓為丸經宿即不相著也痟渇及小便多並是虚熱但用冷補將息即瘥前件三方並是冷補空腹服下常喫少許食壓之大好忌猪肉蕪荑崔氏本方中此處更有一方用栝樓根黃連去心治痟渇熱或心神煩亂宜服此地骨皮一兩半右以半天河水一中盞井華水一大盞同煎至一大盞去滓食後分温二分半天河水在槐樹間者又方出聖恵方冬瓜瓤一兩曝乾右搗碎以水一中盞煎至六分去滓温