半兩茯苓皮煮茯神半兩去皮用乾葛燈心煮右㕮咀用禾根麥門冬煎服沈香散調心氣止渴生津之藥人參沈香木香白术乾葛白茯苓藿香各一兩蛤粉五錢炙右㕮咀每服三錢水一盞半煎至七分去滓大口服空心一日三二次生津液醒酒止渴再用醋林子以鹽醋收藏以充果子食之不可多食令人口舌粗折及熟採之隂乾和核同用其葉味酸夷獠人採得入鹽和魚鱠食之勝用醋也主下氣止渴令人不睡蔥母枝葉右取炙令黃香作飲食之治痟渴白鵝右取煮汁飲之止渴除煩潤五臟利大小便去渴止熱木蜜枝葉右用噉之煎如飴食亦得止渴明目除煩不睡痟渴苽蘆木葉右取水煮飲之以當茗令人通夜安睡止渴鳬茨右以作粉食之止渴石榴子右以食之烏梅肉右擘破水漬以少蜜相和服之班龍腦珠丹鹿角霜十兩為末鹿角十兩酒浸數日蒸糊為丸用藥兔絲子十兩酒浸蒸作餅焙乾柏子仁十兩淨别研熟地黃十兩酒浸二宿蒸焙乾以餘酒入膠用右將衆藥研調却以鹿角膠酒三四升煮糊搜藥杵三千下丸如梧桐子大早晚空心食前鹽湯任下五十丸至一百丸成都府每開藥市有緑髮美顔道士酣醉于酒樓上歌曰尾閭不禁滄海竭九轉靈丹空謾説惟有班龍腦上珠能補玊堂關下穴一作有人遇之乃得此方水葫蘆丸生津液止煩渴利咽嗌紫蘇葉人參乾葛各三錢木瓜甘草烏梅肉炙各一兩右為細末煉蜜和丸每兩作三十丸每用一丸綿裹含化咽津不拘時候或新汲水化服亦得梅蘇丸止渴生津液烏梅肉乾木瓜紫蘇葉各一兩半甘草炙半兩白檀三錢麝香一研錢右五味為末入麝香勻入乾糖淨八兩蜜一兩同煉和為劑每兩作二十丸每服一丸細嚼咽津不拘時候或新水化服亦得白术散治諸病煩渴津液內耗不問隂陽服之渴止生津液白术人參去蘆頭茯苓去皮甘草炙藿香葉木香各一兩乾薑二兩右為細末每服三錢水一大盞煎至七分去滓溫服不拘時候福夀二味散乾薑生用石決明各等分右為細末每服一錢用男兒津唾于左手心內調令稀稠得所不可犯婦人手烏梅湯止渴生津和氣暖胃爽口恱神梅肉甘草各四兩草豆蔲仁桂心木香乾生薑各半兩白鹽六兩炒右如法炮製同為細末每服一二錢沸湯點服痟渴出如宜方黃連栝樓根一分生冬瓜十分右煎湯常服渴則飲之冬瓜飲子大冬瓜去皮搗爛取自然汁五大碗五苓散一兩去桂右調成飲子時時喫一盞喫藥時不可與水不過二料立愈治止痟渴第一方大黃麵褁爆焙乾當歸芍藥甘草炙麻黃不去莭荆芥穗各六兩白术一兩半羅參茯苓去皮各一兩五味子天花粉宣連各一兩右㕮咀每服二錢水一盞半薑薄荷煎溫服第二方大冬瓜一箇去瓤黃連一兩半為末麥門冬去心為末天花粉各一兩為末右將三味入瓜中浸七日後焙乾為末煉蜜丸每服三十粒空心熱湯下第三方宣連二兩去鬚童便浸三宿白扁豆二兩炒辰砂一兩牡蠣一兩煆鐡鏵粉一兩别研知母五錢苦參天花粉為末蘆薈各半兩人參栝樓根茯苓去皮五味子黃耆各一兩右為細末煉蜜丸如彈子大用金銀箔二十片為衣每丸麥門冬湯嚼下第四方青黛人參龍腦五味子栝樓根各一兩鉛白霜天花粉黃連各半兩右為細末煉蜜丸如梧桐子大每服三十丸鹽湯下治渴三神湯羚羊角作屑葛粉犀角屑栝樓根白茯苓白茅根已上各等分右為末煎人參湯更合八味丸山藥丸服聚瑶丹辰砂二兩鐡鏵粉一兩一分煆牡蠣一兩一分煆人參半兩珍珠半兩大金箔二百片研天花粉一兩九宣連九莭者一兩去鬚苦參一兩扁豆白者一兩知母一兩一分右為末生栝樓根嫩者取汁一盞入煉蜜二盞于銀器內煎七八沸候冷搜和丸如梧桐子大每服三十粒麥門冬湯任下一日空心五次治渴中人參二兩肉桂一兩甘草二兩右為末每服二錢煎枇杷葉湯調下空心服珍珠龍腦丸治痟渴鎮心安神人參神砂珍珠各半兩銀箔五十片腦子一錢天花粉一兩黃連半兩去鬚右為末煉蜜丸如雞頭大每服一丸嚼細用麥門冬湯送下空心臨午及卧時服龍膽丸已上十方並係鄭氏家傳渴濁方人參一兩粉草二兩用雄豬膽一枚取汁浸炙盡為度右為末入腦子半錢煉蜜丸如梧桐子大每服二丸嚼細空心冷白水下噙下亦可止渴潤肺出本草荏子右用生食之治肺渴出本草玊右以含之咽津以解之天寶遺事云唐貴妃嘗用此方治痟渴出本草好井水及土石間新出泉水右以飲之兔絲子丸出鄭氏家傳渴濁方兔絲子一兩淨酒浸一宿五味子白茯苓肉蓯蓉酒浸一宿舶茴炒鹿茸酥炙各一兩右為細末蜜丸如梧桐子大空心飯湯飲下三十粒補骨脂丸出鄭氏家傳渴濁方補骨脂舶茴香炒丁公藤酒浸各一兩鹿茸酥炙五錢茯苓香附子各一兩右將丁公藤細末同所浸酒打糊丸如梧桐子大鹽湯任下三十粒玊真丹黃柘三兩去粗皮滑石六兩淨末知母一兩右為細末滴水空心下治渴用遇逺行無水處用之苦栝樓右用水花和為丸朝預服二十丸永無渴止渴菰首右用煮食之療痟渴苧右以漬汁食之止渴潤肺通氣脈填骨髓芭蕉子右以蒸熟曝之令口開春取仁食之治痟渴椰子右以漿飲之治痟渴蒻頭右搗碎以炭汁煮成餅五味調和為茹食之療渴疾菴羅果右以食之亦以葉作湯服之治渴及吐橘囊上筋膜炒右以煎湯飲甚驗止渴下氣令心寬木通實右以食之治胸膈諸熱明目止渴甘露蜜右以食之潤五臟止痟渴開胃蛤蜊右以煮食之治痟渴胡豆子右煮食之勿用鹽止渴鹽麩子葉如椿秋熟為穗粒如小豆上有鹽似雪右食之酸醎能止渴一方用鹽麩子乾搗為末食之理正氣止煩渴和中補脾利大腸解酒毒消甘蔗去皮右食後喫之治止渴紫色苧右煮汁飲之治痟渴鹿頭右作膠服之彌善治渴鎮心君遷子右以食之久服輕身亦得恱人顔色治煩渴熱悶下痰通小腸淋止頭痛臯蘆葉右用作飲代茶治痟渴薏苡仁右煮汁飲之治痟渴下氣令人能食利五臟調中海月右取以生薑醬食之消腸中宿物令易飢止小便治痟渴李根右煮汁飲之止渴粳米右煮汁飲之治痟渴重者市門衆人溺坑中水右取一小盞服之勿令病人知之三度即瘥治痟渴蜆肉右浸取汁服之治痟渴菉豆右研煮飲服之治痟渴蕕草右絞取汁服之治痟渴漚麻右以汁飲之治渴潤肺去煩除痰都咸子及皮葉右用水煮作飲服止渴潤五臟去溫痺熱及山行無水處用之含水藤右斷之得藤中水清美可飲愈百疾止痟渴令人身輕不飢肌肉恱澤秋露水在百草頭者右取飲之痟渴硃砂天花粉右等分為末糊丸如梧桐子大每服一百丸黑豆湯下止渴療熱馬乳右以飲之止渴理肺枇杷葉去毛右煮飲之治三痟風延母右煮服之治三痟生鮧魚涎黃連研末右取生鮧魚涎黃連末作丸飲後烏梅煎飲下五七丸渴便頓減又方菘菜右用作虀爼食之治一切痟渴好宣連去蘆頭鬚右不拘兩數研冬瓜自然汁浸黃連一宿漉出曝乾再浸曝凡十次乾為細末再用冬瓜汁為丸如梧桐子大每服二三十丸熟水吞下普濟方卷一百七十七
