半兩茯苓皮煮茯神半兩去皮用乾葛燈心煮右㕮咀用禾根麥門冬煎服沈香散調心氣止渇生津之藥人參沈香木香白术乾葛白茯苓藿香各一兩蛤粉五錢炙右㕮咀毎服三錢水一盞半煎至七分去滓大口服空心一日三二次生津液醒酒止渇再用醋林子以鹽醋收藏以充菓子食之不可多食令人口舌粗折及熟採之隂乾和核同用其葉味酸夷獠人採得入鹽和魚鱠食之勝用醋也主下氣止渇令人不睡葱母枝葉右取炙令黄香作飲食之治痟渇白鵞右取煮汁飲之止渇除煩潤五臓利大小便去渇止熱木蜜枝葉右用噉之煎如飴食亦得止渇明目除煩不睡痟渇苽蘆木葉右取水煮飲之以當茗令人通夜安睡止渇鳬茨右以作粉食之止渇石榴子右以食之烏梅肉右擘破水漬以少蜜相和服之班龍腦珠丹鹿角霜十兩為末鹿角十兩酒浸數日蒸糊為丸用藥兔絲子十兩酒浸蒸作餅焙乾栢子仁十兩净别研熟地黄十兩酒浸二宿蒸焙乾以餘酒入膠用右將衆藥硏調却以鹿角膠酒三四升煮糊搜藥杵三千下丸如梧桐子大早晩空心食前鹽湯任下五十丸至一百丸成都府毎開藥市有緑髪羙顔道士酣醉扵酒樓上歌曰尾閭不禁滄海竭九轉靈丹空謾說惟有班龍腦上珠能補玊堂關下穴一作有人遇之乃得此方水葫蘆丸生津液止煩渇利咽嗌紫蘇葉人參乾葛各三錢木瓜甘草烏梅肉炙各一兩右為細末煉蜜和丸毎兩作三十丸毎用一丸綿裹含化嚥津不拘時候或新汲水化服亦得梅蘇丸止渇生津液烏梅肉乾木瓜紫蘇葉各一兩半甘草炙半兩白檀三錢麝香一研錢右五味為末入麝香勻入乾糖净八兩蜜一兩同煉和為劑毎兩作二十丸毎服一丸細嚼嚥津不拘時候或新水化服亦得白术散治諸病煩渇津液内耗不問隂陽服之渇止生津液白术人參去蘆頭茯苓去皮甘草炙藿香葉木香各一兩乾薑二兩右為細末毎服三錢水一大盞煎至七分去滓温服不拘時候福夀二味散乾薑生用石决明各等分右為細末毎服一錢用男兒津唾扵左手心内調令稀稠得所不可犯婦人手烏梅湯止渇生津和氣暖胃爽口恱神梅肉甘草各四兩草豆蔲仁桂心木香乾生薑各半兩白鹽六兩炒右如法炮製同為細末毎服一二錢沸湯㸃服痟渇出如宜方黄連栝樓根一分生冬瓜十分右煎湯常服渇則飲之冬𤓰飲子大冬瓜去皮搗爛取自然汁五大碗五苓散一兩去桂右調成飲子時時喫一盞喫藥時不可與水不過二料立愈治止痟渇第一方大黄麵褁爆焙乾當歸芍藥甘草炙麻黄不去莭荆芥穂各六兩白术一兩半羅參茯苓去皮各一兩五味子天花粉宣連各一兩右㕮咀毎服二錢水一盞半薑薄荷煎温服第二方大冬瓜一箇去瓤黄連一兩半為末麥門冬去心為末天花粉各一兩為末右將三味入瓜中浸七日後焙乾為末煉蜜丸毎服三十粒空心熱湯下第三方宣連二兩去鬚童便浸三宿白扁豆二兩炒辰砂一兩牡蠣一兩煆鐡鏵粉一兩别研知母五錢苦參天花粉為末蘆薈各半兩人參栝樓根茯苓去皮五味子黄耆各一兩右為細末煉蜜丸如彈子大用金銀箔二十片為衣毎丸麥門冬湯嚼下第四方青黛人參龍腦五味子栝樓根各一兩鉛白霜天花粉黄連各半兩右為細末煉蜜丸如梧桐子大毎服三十丸鹽湯下治渇三神湯羚羊角作屑葛粉犀角屑栝樓根白茯苓白茅根已上各等分右為末煎人參湯更合八味丸山藥丸服聚瑶丹辰砂二兩鐡鏵粉一兩一分煆牡蠣一兩一分煆人參半兩珍珠半兩大金箔二百片研天花粉一兩九宣連九莭者一兩去鬚苦參一兩扁豆白者一兩知母一兩一分右為末生栝樓根嫩者取汁一盞入煉蜜二盞扵銀器内煎七八沸候冷搜和丸如梧桐子大每服三十粒麥門冬湯任下一日空心五次治渇中人參二兩肉桂一兩甘草二兩右為末毎服二錢煎枇杷葉湯調下空心服珍珠龍腦丸治痟渇鎮心安神人參神砂珍珠各半兩銀箔五十片腦子一錢天花粉一兩黄連半兩去鬚右為末煉蜜丸如雞頭大毎服一丸嚼細用麥門冬湯送下空心臨午及卧時服龍膽丸已上十方並係鄭氏家傳渇濁方人參一兩粉草二兩用雄猪膽一枚取汁浸炙盡為度右為末入腦子半錢煉蜜丸如梧桐子大毎服二丸嚼細空心冷白水下噙下亦可止渇潤肺出本草荏子右用生食之治肺渇出本草玊右以含之嚥津以解之天寳遺事云唐貴妃嘗用此方治痟渇出本草好井水及土石間新出泉水右以飲之兔絲子丸出鄭氏家𫝊渇濁方兔絲子一兩净酒浸一宿五味子白茯苓肉蓯蓉酒浸一宿舶茴炒鹿茸酥炙各一兩右為細末蜜丸如梧桐子大空心飯湯飲下三十粒補骨脂丸出鄭氏家傳渇濁方補骨脂舶茴香炒丁公藤酒浸各一兩鹿茸酥炙五錢茯苓香附子各一兩右將丁公藤細末同所浸酒打糊丸如梧桐子大鹽湯任下三十粒玊真丹黄柘三兩去粗皮滑石六兩净末知母一兩右為細末滴水空心下治渇用遇逺行無水處用之苦栝樓右用水花和為丸朝預服二十丸永無渇止渇菰首右用煮食之療痟渇苧右以漬汁食之止渇潤肺通氣脈填骨髓芭蕉子右以蒸熟曝之令口開春取仁食之治痟渇椰子右以漿飲之治痟渇蒻頭右搗碎以炭汁煮成餅五味調和為茹食之療渇疾菴羅菓右以食之亦以葉作湯服之治渇及吐橘嚢上筋膜炒右以煎湯飲甚驗止渇下氣令心寛木通實右以食之治胸膈諸熱明目止渇甘露蜜右以食之潤五臓止痟渇開胃蛤蜊右以煮食之治痟渇胡豆子右煮食之勿用鹽止渇鹽麩子葉如椿秋熟為穂粒如小豆上有鹽似雪右食之酸醎能止渇一方用鹽麩子乾搗為末食之理正氣止煩渇和中補脾利大膓解酒毒消甘蔗去皮右食後喫之治止渇紫色苧右煮汁飲之治痟渇鹿頭右作膠服之彌善治渇鎮心君遷子右以食之乆服輕身亦得恱人顔色治煩渇熱悶下痰通小膓淋止頭痛臯蘆葉右用作飲代茶治痟渇薏苡仁右煮汁飲之治痟渇下氣令人能食利五臓調中海月右取以生薑醬食之消膓中宿物令易饑止小便治痟渇李根右煮汁飲之止渇粳米右煮汁飲之治痟渇重者市門衆人溺坑中水右取一小盞服之勿令病人知之三度即瘥治痟渇蜆肉右浸取汁服之治痟渇菉豆右研煮飲服之治痟渇蕕草右絞取汁服之治痟渇漚麻右以汁飲之治渇潤肺去煩除痰都咸子及皮葉右用水煮作飲服止渇潤五臓去温痺熱及山行無水處用之含水藤右斷之得藤中水清美可飲愈百疾止痟渇令人身輕不饑肌肉恱澤秋露水在百草頭者右取飲之痟渇硃砂天花粉右等分為末糊丸如梧桐子大毎服一百丸黑豆湯下止渇療熱馬乳右以飲之止渇理肺枇杷葉去毛右煮飲之治三痟風延母右煮服之治三痟生鮧魚涎黄連研末右取生鮧魚涎黄連末作丸飲後烏梅煎飲下五七丸渇便頓减又方菘菜右用作虀爼食之治一切痟渇好宣連去蘆頭鬚右不拘兩數硏冬瓜自然汁浸黄連一宿漉出曝乾再浸曝凢十次乾為細末再用冬瓜汁為丸如梧桐子大毎服二三十丸熟水吞下普濟方卷一百七十七
