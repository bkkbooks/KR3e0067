骨槽風草烏頭實大者三兩分作三分一分燒存性二分燒黒色為度細辛去苗葉半兩青鹽半兩地龍去土一分右為散早夜如齒藥揩牙齒動摇處療牙齒疼痛出聖惠方防風附子蜀椒各二兩莽草一兩炙右搗篩為散温清酒一盞和少許含勿嚥汁以酒潄口十年患亦瘥治齒痛出聖惠方當歸桂心甘草炙各二兩礬石六分燒右以漿水二升煎一升含之日五六瘥止治牙疼方牡蠣末三錢烏龍尾錢半乾薑末錢半麝少許右為末和勻吹鼻用神應膏出徳生堂貼牙疼全蝎二十一箇五倍子五錢土狗六箇地龍二十一條去土右為細末葱白二根爛搗取汁調成膏紙花貼太陽左右穴上立效麝香丸出十便良方治牙齒疼痛麝香半錢細研胡椒一分甘松香一分雄黄半分細研右為末都研令勻以水蜜和丸如梧桐子大每以新綿裹一丸安在患處咬之立效皂莢丸出聖惠方治牙疼挿耳皂莢一挺豉一合蒜一頭去皮巴豆七枚去皮麥炒微黄右搗研為散每一字綿裹如梧桐子大隨病左右内耳中立效阿魏丸出聖惠方治牙疼塞鼻阿魏臭黄砒霜各一分雄黄一錢右細研為散以端午糭子和丸如梧桐子大如牙疼在左邊即内右鼻中以紙撚子塞之合口閉氣良久即定如是蚛牙内一圓有涎即吐却右邊同香椒散出直指方治疼證齒痛香附子紅川椒炒故紙炒各二錢蓽撥一錢桃白皮湯出聖濟總録治牙齒疼痛桃白皮槐白皮柳白皮各二兩右剉如麻豆分為六貼每貼以酒一升浸一宿煎三五沸去滓熱潄冷吐藜蘆散出聖濟總録治牙齒疼痛藜蘆去蘆頭半兩附子炮裂去皮臍一分麝香一分研右搗羅為散每用半錢擦齒上牙有蟲孔即綿裹少許内之蜀椒湯一名如神散出和劑方治牙齒疼痛亦治舌腫强及齒腫不消及風蚛牙痤疼日夜不止睡臥不安不問年逺日近並皆療之蜀椒去目并閉口炒出汗鹽研用青色土蜂房各一分一方用露蜂房微炒右搗篩每服五錢以水三盞入葱白三寸煎十餘沸熱潄冷吐日三五度一方無葱白醋漿水煎亦可一服立效不可入喉中蒟醤散出御藥院治牙齒疼痛發作徃來不已蒟醤細辛各半兩大皂角一挺去皮子青鹽每竅塞滿火燒存性細研用右為末如痛時用軟刷牙蘸藥刷痛處次用莽草葉散盥潄莽草葉散方見木頭槐枝湯地龍散出神效方治牙齒疼痛地龍去土延胡索蓽撥各一分右為細末左邊牙疼用一字新綿裹納左耳中右牙疼納右耳中其疼必止一字救苦散出御藥院治牙疼香白芷一兩雄黄錢半另研草烏頭半兩去皮心臍白者用心黒者不用右為細末與雄黄拌勻每服藥末少許擦於患處少時温水潄止細辛散出御藥院治牙齒疼痛荆芥細辛露蜂房各等分右為粗末每用三錢水一大盞煎至七分去滓温潄冷吐三聖散出御藥院治牙齒疼痛久不已細辛一兩剉荆芥穗二兩剉蒼耳莖三兩剉右並㕮咀每用半兩水三大盞煎至一盞半去滓熱潄冷吐悞嚥無妨以痛止為度麝香玉線子豆粉半兩信一錢枯白礬一錢半右同研入麝香半錢再研為細末滴水和於手背上撚作線如用時先以漿水潄口用毛翎刷了縫中凈臨卧貼或為線子塞於縫中延胡索散治牙疼延胡索一錢班猫三箇去頭尾炒白丁香三十箇右為細末新汲水調為丸小豆大新綿褁左疼入左耳右疼入右耳治牙疼出危氏方雄黄沒藥各一錢乳香半錢右為末若左邊疼用藥些少搐入左鼻又吹入左耳若右邊疼用藥些少搐入右鼻吹入右耳無不效驗雄黄散治牙疼雄黄紅豆滄鹽各等分右為細末㗜一字入鼻中白礬散治牙疼屋松白礬蜂窠炒各等分右粗末醋煎熱潄凉吐追風散出端竹堂治諸般牙疼貫仲鶴虱荆芥穗各等分右為㕮咀每用二錢加川椒五十粒用水一碗煎至七分去滓熱潄吐去藥立效薑黄散出海上方治諸牙疼不可忍舒廷之撫幹嘗患遍用諸藥方無若此方之良薑黄如無以川芎代細辛白芷各等分右為末擦三兩次鹽湯盥潄立止如蛀牙疼去薑黄加蝎稍立效政和八年胡長文給事之父牙疼不可忍面腫偶無薑黄撿本草川芎亦治牙遂代之坐間便見腫消痛止後止用川芎亦驗麝香散出海上方治諸般牙疼全蝎三個麝香一字細辛二錢右為細末乾擦牙疼處候涎出盡方用鹽湯潄治牙疼蟾酥少許巴豆去油如泥杏仁炒各等分右研為泥用綿裹似粟米大如蛀牙扎入蛀處如風牙扎入牙縫内涎盡為驗潄牙羌活湯薄荷一錢半羌活一錢大黄半錢右㕮咀作一服用水二盞煎至一盞去滓温潄冷吐之嚥亦無妨齒痛通用方出直指方蜂房炒明礬煆黄丹等分右為末飲為小圓塞齒川芎散出危氏方治面腫牙疼不可忍川芎白芷細辛各等分右為末擦兩三次鹽湯潄立止巴豆丸一名麝香丸出聖惠方療牙疼巴豆十枚去皮心熬研如膏大棗二十枚取肉細辛一兩末右相和研為丸以綿裹著所疼處咬之如有涕唾却勿嚥入喉中日三瘥一方有麝香有蚛孔即内一圓立止治牙疼方蕬𤓰兒藤剉細川椒一撮燈心一小把右為末濃煎去滓温潄吐之數次立效立柱散出徳生堂治牙疼如神荆芥京杖子蓽撥右等分㕮咀每服三錢水一盞煎七分去滓温潄吐去涎喝住散出徳生堂治牙疼如神丁香石膏川芎右各等分為細末用手揩㸃唾津蘸藥末擦牙吐去涎再擦三上即住疼砒霜丸出聖惠方治牙疼砒霜半錢乾地龍三錢末巴豆六枚去殻右同研令細以猪脂膽和丸如麻豆大綿褁一丸於病處咬之有涎即吐白芥子吹鼻散出聖惠方治牙疼白芥子舶上蒔蘿芸臺子各一兩右搗細羅為散每用一字如患左邊疼即吹入右鼻中如患右邊即吹入左鼻中仍先淨洗鼻中吹藥即驗白楊皮散出聖惠方治牙疼白楊樹皮一握細辛半兩露蜂房半兩右搗篩為散每用三錢以水一大盞浸一宿煎令三五沸去滓熱含冷吐治齒痛立效方生附子十枚為末蟾酥菉豆大麝香一字右都研令細用糯米飯和丸如黍米大以綿褁一丸於痛處咬之有涎即吐呉茱萸散出聖濟總録治牙齒疼呉茱萸湯浸焙炒白芷右等分為散用沸湯浸藥一錢潄疼處乳香散出聖濟總録治牙齒疼痛不可忍乳香半錢蜀椒輕炒取紅為細末一錢右二味合研為散每用半匙一字揩貼痛處良久温荆芥湯潄口立效一方研細溶蠟丸如麻子大每用一丸塞孔中蓽撥丸出聖濟總録治牙齒疼痛蓽撥胡椒右等分為末化蠟丸如麻子大每用一丸内蚛孔中乾地黄湯一名牢牙散出千金方治牙齒痛及動摇生乾地黄焙三兩獨活去蘆頭一兩右㕮咀如麻豆每用五錢以酒一盞浸一宿煎十餘沸去滓熱潄冷吐以瘥為度水煎或漬一宿亦可一方二味各三兩細辛湯出聖濟總録治牙齒痛細辛去苖葉苦參各一兩右剉如麻豆大以水一盞藥五錢煎五七沸去滓熱潄冷吐治牙齒疼痛出聖惠方槐白皮一握荆芥穗半兩右以醋一升煎至五合入鹽少許熱含冷吐以瘥為度補骨脂散出御藥院調養血氣治牙齒疼痛久不已青鹽半兩補骨脂二兩右同炒令㣲爆為度候冷取出搗為細末每用少許以指蘸藥擦於牙齒疼處有津即吐悞嚥不妨每日丁香散補骨脂散相間使用香附子散出御藥院治牙齒疼痛徃來不歇香附子四兩細辛半兩右為粗末每用二錢水一盞煎至八分去滓稍熱潄冷即吐追風散出御藥院治牙齒疼痛不止川薑炮裂川椒去目各等分右為細末每用以指蘸藥不時擦牙痛處後鹽湯潄草烏頭散出端竹堂治牙齒疼痛動摇不穩用之辟風邪能令病牙易落草烏頭一兩炒令紫黒色用尖細辛一錢右為細末每用少許擦牙疼處後用手左右摇動日用三五次有津則吐悞嚥不妨一方治風牙疼為細末先以冷水洗潄淨用手指㸃藥擦牙須臾立愈細辛湯出御藥院治牙齒痛久不瘥細辛蓽撥各等分右為粗末每用一錢水一盞煎至七分去滓熱潄冷吐獨活散出御藥院治牙痛不可忍諸藥不效者獨活二兩去土華隂細辛根一兩去皮右為粗末每用五錢水二盞入荆芥十穗同煎至一盞去滓不時熱潄冷吐宜先用丁香散擦後用此藥潄三二次治牙疼出神效方樟腦一錢好硃砂一錢右為末每用少許痛處擦又方出神效方好紅豆二錢花减少許右為末隨牙左右疼處鼻内㗜之治牙疼出海上方川芎頭尖地花椒右各等分為細末擦患處普濟方卷六十五
