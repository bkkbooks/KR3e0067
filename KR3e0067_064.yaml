body:
  text: 普濟方卷六十五明周王朱橚撰牙齒門總論夫口齒者為臟腑之門户呼吸之機關納滋味以充胃膓通津液以潤經脉故口為脾之應候齒作骨之榮華在乎一身實為大要是以黄庭經云只為玉池太和宫潄嚥靈液灾不干齒治之堅牢白淨則津液美而無病矣或揩洗無方招風致病性有踈嬾不能矜持滋蔓既深損蠧尤甚唇為飛門齒為户門宣發五音摧伏諸榖凡有病起因口所成含惡氣以嚥津益痰澼而在膈使心胸壅滯毒氣攻蒸而薫之焉得不損究其病本實有多般且疳􅉶者其齒齗虚軟無膿血又口􅉶者其齒齗觸着即血膿出又口疳其齗不觸自然膿血出又風疳者其齒齗上齶有小孔形如蜂窠之状又齒疳其齒骨脆爛又齒齗唇口忽變白色或作青黒色者是急疳之状也死不過旬日宜急治之先看唇頰裏有紫赤或青黒脉處即須針去惡血不然烙之亦好附齒有黄黒色物似爛骨之状者名為齒状凡治齒者先看有此物即須用疳刀掠之附齒有物如蟬翼或如雞子或如絲纒著齒根亦湏用疳刀掠之不爾則齒斷永不著齒根也夫齒者骨之所终髓之所養腎實主之經云腎衰則齒豁精固則齒堅或曰手陽明之支脉入齒手陽明者大腸經也於齒何預不思大腸傳送氣道行焉壅則齒浮虚則宣露挾風則上攻頭面疳􅉶則變成齲脱不相為而實相關也夫齒之為痛者五一曰風熱二曰風冷三曰毒痰四曰惡血五曰蟲蝕風氣襲虚客於齒間乗於血氣故令齗腫熱氣加之致濃汁遺臭此風熱之為齒痛一也血氣不足骨髓乃虚風冷凑入停於齒根不腫不蛀日漸動摇此風冷之為齒痛二也熱則生痰毒氣上攻灌注經絡最能發痛外證壅盛潄唾交衝此毒痰之為齒痛三也頭面有風挾熱攻齗熱搏於血故令血出瘀滯不消掣痛鎻刺此惡血之為痛齒四也凡人飲食肥甘不能潔齒腐臭之氣淹漬日久齒根有孔蟲在其間蝕一齒盡又及其餘至如疳􅉶皆其種類必蟲殺而后痛止五也且百物養生莫先口齒不潄不洗損蠧之媒是不惟患生宿腐暑熱酒毒常伏于口齒之間莫若時時洗潄之為愈也臨睡洗畢至於晨興盥潄一口吐出掌中就掌滌眼自覺光明终身行之真可謂終身受用凡齒齗宣露多是疳􅉶及月蝕以角蒿灰夜傅齗間使滿勿食油二三夜瘥食油乾棗即發所以患齒者忌油乾棗及桂心每旦以一捻鹽内口中以煖水含化揩齒及叩齒百遍為之不絶不過五月齒牢密凡人齒齗不能食菓菜者皆由齒根露也為此鹽湯揩齒叩齒法神良無不愈也凡人好患齒病多由月蝕夜食飲之所致也識者宜深慎之以日月蝕未平時特忌飲食小兒亦然澤州李繼之忽病牙疼皺眉不語欒景先見之曰何不樂也曰牙痛欒曰曽記張戴人云陽明經熱有餘也宜大下之乃付舟車丸七十粒服畢過數日知交留飲强飲熱酒數盃其藥為酒所發盡吐之吐畢而痛止李大服曰戴人神人也不三五日大痛又服前藥一百餘粒大下數行乃愈牙齒厯蠧論牙齒厯蠧者皆腎氣虚弱骨髓不固氣血衰耗不能榮滿於口齒故令牙齒黯黒謂之厯蠧腎主骨齒者骨之餘也人之腎氣强勝骨髓堅固則牙齒瑩白璀璨今腎氣虚弱無以榮於骨髓故令牙齒槁而黒黄方獨活丸治牙齒厯蠧齒根黯黒獨活防風去蘆頭芎藭細辛當歸沉香乾生地黄各一兩雞舌香零陵香川升麻甘草各一錢右為末以化了蠟和丸如紅豆大綿裹常含一丸嚥津榖精草散治牙齒厯蠧榖精草一兩燒灰馬齒莧半兩乾者甜田菁苗半兩川升麻半兩白礬一分燒灰乾漆一分猪牙皂莢一兩乾蝦蟆三兩燒灰右搗細羅為散入鉢細研令勻每用半錢傅於患處有涎即吐日三度用之皂鹽散出聖濟總録治牙齒厯蠧黯黒皂莢一挺酥炙去皮子鹽花槐皮各半兩升麻白礬熬令汁枯甘松香細辛去苗葉各一分右為細散先以鹽揩齒後用藥半錢勻傅之升麻散出聖濟總録治牙齒厯蠧齒根黯黒槐枝皮半兩升麻半兩白附子炮蜜陀僧煆露蜂房各一分右為細散入地黄汁一合和勻隂乾每用揩齒黄丹散治牙齒厯蠧色黒黄丹半兩白礬一兩川升麻一分末細辛一分末麝香一錢細研右先研白礬黄丹令細於生鐡銚子内炒如火色取出於地上用紙一重襯以物葢之出火毒一宿後入川升麻等三味同細研為散用半錢摻於患處效榖精草散出聖濟總録治齒厯蠧榖精草燒灰白礬灰各一分蟾酥一分炙乾麝香少許右細研為散於宣露處貼之柳枝膏出聖濟總録治齒厯蠧柳枝剉一握防風去苗葉剉細辛去苗葉剉鹽花各一分右用水三盞煎至一盞半去滓更煎膏以甆器收每用薄紙剪如柳葉塗藥貼齒上麝香散出聖濟總録治齒厯蠧麝香一字定粉一錢黄䗶半兩右細研前二味後鎔䗶調攤紙上臨臥時煎作片子貼所患齒痛止胡桐淚散出聖濟總録治牙齒厯蠧齒根黯黒胡桐淚一兩丹砂半兩麝香一分右同研極細常用揩齒脆壞欲盡方出聖濟總録治牙齒厯蠧右用白礬不拘多少新綿裹之以所患齒咬定有涎即吐一方治齒腫枯礬為末傅齒根下或熱水潄之亦治牙疼牙齒疼痛論夫牙齒痛者是牙齒相引痛牙齒是骨之所終髓之所養陽明之脉入於齒若髓氣不足陽明脉虚不能榮於牙齒為風冷所傷故疼痛也又有蟲食於牙齒則齒有孔蟲居其間又傳變餘齒皆以疼痛此則針灸瘥傅藥蟲死痛止牙齒疼痛有二手陽明虚風冷乗之而痛者謂之風痛蟲居齒根侵蝕不已傳受餘齒而痛者謂之蟲痛二者不同古方有塗傅潄渫之藥治風去蟲用之各有法也治牙疼法熱怕冷水冷怕熱湯不怕冷熱即是風牙有蟲竅者即是蟲牙熱則用牙硝鬱金雄黄荆芥之類冷則用乾薑蓽撥細辛之類熱牙宣於牙齗上出血腫痛牙用藥皆以温湯潄之方牙藥麝香散出御藥院牢牙齒止疼痛養氣血黒髭鬢緑礬枯生地黄青黛各半兩青鹽二錢石膽炒三錢訶子皮何首烏龍骨白茯苓各一兩縮砂八錢甘松四錢零陵香藿香葉各六錢百藥煎一兩細辛二錢龍腦麝香各三錢石燕子燒通赤醋淬七次半兩五倍子一兩二錢右為細末每用以刷牙蘸藥刷牙齒上待少時用温水微潄早晨食後或臥日用三兩次防風飲出聖濟總録治牙疼舌痒食物不得防風去乂升麻桂去粗皮白石脂研當歸切焙㯽榔剉桑根白皮剉炒乾木𤓰人參黄連去鬚羌活去蘆頭芎藭剉天雄炮裂去皮臍各二兩黄芩去黒心遠志去心半兩右㕮咀每服三錢水一盞生薑五片煎至七分去滓温服藁本湯出聖濟總録治牙疼藁本去苗土芎藭防風去乂蔓荆實去皮細辛去苗葉羌活去蘆頭升麻木通剉各三兩楊白皮細切二兩鹽二兩露蜂房炙擘碎狼牙草切莽草去梗各半兩大豆炒令香熟二合右搗篩每用五錢水一盞入生地黄汁少許煎十餘沸去渣熱潄冷吐齒齗通用方出直指方蓽撥生地黄當歸鬚荆芥穗白芷桑白皮炒蜂房炒赤芍藥薑黄細辛藁本赤甘草生各等分右為粗末每服三錢井水調頻潄齒丁香膏出聖濟總録治牙齒痛丁香膏三兩好者以水三升煎至半升黄蠟三兩沉香二兩水三升煎至半升細辛三兩去苗葉水三升煎至半升麝香一兩别研丹砂松脂一兩煉黄耆剉一分鉛丹三兩硫黄一兩研如粉右先以銀器中煎丁香沉香汁次入細辛汁煎半以來次入松脂次入諸藥末候藥無水氣即入好麻油五兩以柳木箆子攪不得住手候膏成即入銀器中盛之如牙齒冷痛以塗絹可牙齒大小貼之立效貼藥齗腫出膿血並是病蟲出也莽草散出御藥院治牙齒痛烏髭鬢牢牙莽草牛膝去苗柳枝皮取白胡蒜子生乾地黄生薑兔絲子無食子桐子漆猪牙皂角各六兩右各剉如麻豆大入藏瓶鹽泥固濟火煉一日後入地一尺二寸深埋三伏時取出露三夜不得見日氣研羅為細散每用手指蘸藥於牙上旋擦神應散擦牙疼川芎防風升麻細辛茯苓白芷香附子蓽撥甘松各等分石膏比已上加三倍右為細末每服晚臨臥刷凈牙以指蘸藥擦熱麻潄去常用牢牙去風羌活散出海上方治牙疼胡椒川椒川芎炮烙二錢荆芥穗白芷防風草烏羌活蓽撥露蜂房各半兩右並晒乾為末揩牙鹽湯潄之忌食動風物露蜂房散治諸牙疼不可忍者當歸細辛川芎赤芍藥白芷防風藁本升麻蜂房炒各二錢川椒五粒右作一貼用白水煎乗熱含冷吐之頻用妙清風定痛散荆芥穗一兩朴硝二兩膽礬一錢羅青二錢半防風細辛白芷全蝎升麻草烏以上各五錢右為細末每用擦牙治牙疼胡椒麝香青鹽芫花乳香蓽撥良薑雄黄細辛烏頭各等分右為細末牙疼時噙水一口左邊牙痛用藥些少吹入左鼻孔内右邊牙疼吹入右鼻孔内即止升麻散出聖濟總録治牙齒疼痛生齗肉去熱毒解外風防風去乂當歸切焙升麻各一兩藁本去苗土甘草炙白芷細辛去苗土芎藭各半兩木香一分右為散於乳鉢中研細塗貼齒齗粗者以水二盞藥五錢煎五七沸去滓熱潄冷吐悞嚥不妨升麻散出經驗良方治牙疼腮腫升麻地黄川芎地骨皮槐子細辛皂角白芷各半兩川椒二錢半右為細末以藥少許揩牙有涎吐出用鹽湯盥潄專治牙疼出海上方川芎二錢升麻一兩石膏四兩蝎稍一錢細辛一兩胡椒半錢荆芥穗一錢蓽撥一錢膽礬少許右為細末先以温漿潄過用藥一字擦痛處又以漿水潄口再以藥擦之叩齒三遍再以温漿潄去再不痛定痛牙散防風荆芥穗各二兩細辛一兩草烏一兩白芷一兩全蝎七錢半青鹽五錢朴硝一兩青黛五錢右為細末每用少許先以鹽湯潄淨後擦患處再潄麝香白牙散出徳生堂治牙疼牙宣口臭石膏半斤炒細辛一兩刺蒺藜一兩青鹽半兩炒三奈子五錢丁香三錢甘松三錢檀香三錢白芷三錢右為細末入麝少許研勻用手揩以唾津濕蘸藥加川芎半兩尤妙茯神散治牙齒疼痛茯神去木一分白茯苓去黒皮一分松脂一分熬丹砂一分研青葙子半兩炒令焦白礬一兩熬汁令枯麝香半兩研乳香一分研右為散貼於牙齒疼痛處定愈散出聖惠方治牙齒痛乳香半兩白礬一兩燒灰黄耆剉半兩琥珀一兩松脂一兩熬汁盡青葙子一兩熬令熱不得焦丹砂半兩研如粉麝香三分好者右為散更别搗乳香煉熱為汁入前藥中如有疼痛蟲孔之中乾貼之不用諸物貼藥之時不得用水其痛立止升麻散出聖惠方治牙齒疼痛川升麻半兩莽草一分桑寄生一分地骨皮半兩防風半兩細剉去蘆頭藁本一分柳枝一握剉槐白皮半兩剉右為散每用五錢以水二大盞入鹽末一錢荆芥五穗煎至一盞去滓熱含冷吐日三槐枝八仙散出御藥院治牙齒疼痛地骨皮生乾地黄梧桐律莽草各一兩細辛去苗半兩乳香另研青鹽各二錢半新槐枝取束引者五握細剉對本人稱重一兩右除槐枝乳香青鹽外同為細末另入槐枝乳香青鹽攪勻停分作八服每服用水三盞煎三沸去滓帶熱緩緩潄之悞嚥無妨冷即吐去大止牙痛痛愈更宜再潄忌甘甜之物㯽榔散出御藥院治牙齒疼痛連齗頰俱腫去風熱消腫痛㯽榔荆芥穗莽草升麻羌活藁本木香細辛各半兩右並不見火生搗羅為末每用半錢傅在腫痛處吐津悞嚥無妨不拘時候延斷散出御藥院牢牙齒定疼痛固齗􅠛益氣血黒髭鬢大有神效澤烏頭皂角去皮子生地黄各一兩右三味為粗末用生薑自然汁和成團子用槐枝火燒令煙盡取出於淨地上用碗葢一宿出火毒再搗為細末入後件藥細辛取末青鹽各三錢石膽白礬灰麝香各二錢五味另研右件入前藥中同研令勻細每用擦牙病處或用刷牙蘸刷亦得早晨食後臨臥日用三次有津即吐悞嚥不妨茯苓散出神效方治牙疼細辛去苗白茯苓去皮川升麻蓽撥青鹽明石膏川芎不蛀皂角去皮弦酥炙黄色已上各等分右為細