body:
  text: 普濟方卷二百四十七明周王朱橚撰㿗疝門總論夫腎主納氣人之氣海繫焉腎虗而為風寒所乘而為暑濕所襲為喜怒憂恐所傷而氷結不散又與氣摶是以羣邪聚於其中曰疝曰奔曰小腸氣曰膀胱氣皆是物也其候不特外腎小腹作痛或攻刺于腰脅或逰走于背膂或冷氣搶心心下痛滿或手足厥冷自汗嘔逆痛繞臍膀或脅之左右如杯或臍之上下如臂或腹中纍纍如桃李或胃脘間覆大如盤有壯熱惡寒者有灑淅寒熱者有不得大小便者有裏急而下泄者自汗出者有不欲食者其於隂間則卵有大小伸縮而上下不常囊有腫脹急痛而發歇無定挾冷觸怒則塊物逼上囊根或攻腹之脅時和心平則塊物自循膋系歸入囊中凡此皆謂之腎氣治法綱領風則散之寒則溫之暑則解其熱濕則滲其水七情所發調其心氣水與氣摶行其小便其間以主治腎氣之劑參之然總治之法大要以流行踈利為先毋曰腎虛得病不敢踈泄蓋腎為邪氣所干若非逐去病何由愈儻或姑息畏虛妄以剛劑兜住使大小腑祕而不通邪氣入腹衝心危殆必矣然腎氣發則固以腎虛得之然虛中有冷虛中有熱又有冷熱不調尤當詳審冷者脅邉及外腎清冷小便清而多遇寒即發是也熱者內挾暑氣或積毒或服暖藥於前外腎與小腹俱熱肛門間糞後赤熱小便數澀遇熱則甚是也冷熱不調者小便外腎乍冷乍熱大便小便或祕或利用藥溫涼當隨證而權度之但所謂流行踈導常常運轉於其中矣其若大小便流利之後或更有刺引疼或氣逰注於肌膚之間此則腎虛血虛氣不還元當加潤飬人參當歸川芎芍藥桑螵蛸葫蘆巴輩又不可無惟是逆氣長虛中脘停酸燥悶擾甚而至於嘔吐最為惡候何則天一生水腎實主之中筋系於隂隂器惟藉陽明以飬之今脾土不濟腎水上乘必為酸汁為必涎飲荏苒踰時遂成暴吐醫家執劑之始皆知腎經惡燥如蒼术白术良薑之類誠不敢用及其嘔吐大作薑术輩用之而不顧若猶未也則吳株萸蓽撥剛燥等劑又加多焉雖附子亦用之而救急矣病勢至此脾土未強腎水已為之涸腎水既涸脾土又為之焦往往隂陽不升降榮衛不流行大小二便關隔澀閉而腎汁皆自其口出也如此者大抵不救臨病須當識病預與病家言之夫心火下降則腎水不患其不溫真陽不行則腎氣不患其不和安有所謂木強者哉惟夫嗜欲內戕腎氣虛憊故陽隂不相交水火不相劑而沉寒涸冷凝滯其間脹大作疼頑痺結硬勢所必至矣執劑之法不可純用燥熱當溫利以逐其邪邪氣內消榮衛流轉蓋如寒谷逢春有不戒而速不行而至者矣外此又有一種升髙墜下外腎跌傷驚起與敗血交攻亦有木強脹疼之證治法大要則同於中更為之消瘀大抵諸疝之脈脈當弦緊蓋弦者寒也緊者痛也疝有七證厥疝癓疝寒疝氣疝盤疝附疝狼疝是也何以言之厥疝則心痛足冷食已則吐癓疝腹中氣乍滿滿氣積如臂寒疝因寒飲食卒然脅下腹中痛氣疝腹中乍滿減而痛盤疝腹中痛盤疝腹中痛引臍膀附疝腹痛連臍下有積聚狼疝小腹與隂相引而痛諸疝不愈邪氣留滯及成積聚其脈厥而緊浮而牢皆積聚之脈也但牢強急者生虛弱急者不可治儒門事親書云寒疝名水疝律科王敏之病寒疝臍下結聚如黃苽每發繞腰間痛急不能忍戴人先以舟車及豬腎散下四五行覺藥繞病三五次而下其㵼皆水也豬腎甘遂皆苦寒經言以寒治寒萬幸萬全但下後忌飲冷水及寒物宜食乾物以寒疝本是水故也即日病減八分食進一倍又數日以舟車丸百餘粒通經散四五錢服之利下俟三四日又服舟車丸七十八粒豬腰散三錢乃行步如常矣又一僧疝病發作冷氣上實齒下貫腎緊若繩挽兩睪時腫時冷戴人稱兩手脈細而弱斷之日秋脈也此因金氣在上下伐肝木水畏金木伸故病如是肝氣磐薄而能下榮放睪丸故其寒實非寒木受金制傳之胃土胃為陽明故上實齒病非齒之病肝木者心火之母也母既不伸子亦屈伏故下冷而水化乘經曰木鬱則達之土鬱則泄之令涌四次果覺氣和睪丸癢而暖戴人曰氣已入睪中矣以茴香术荗之藥劑以服首尾一月而愈淡療方云治疝氣發作痛不可忍真科五苓散一貼連根蔥白一寸燈心七莖煎湯吞下青鹽木香丸五十粒即效又法青木香丸二百粒斑貓七枚去頭趐為粗末用瓦銚於文武火上同炒令木香微香却以磁碟蓋藥銚放冷處少時去斑貓取木香丸二服空心茴香酒吞下纍試之冇驗也論云厥隂脈滑則病狐疝少隂脈滑則病肺風疝太隂脈滑則病脾風疝陽明脈滑則病心風疝也太陽脈滑則病腎風疝少陽脈滑則病肝風疝靈樞經云心脈微滑為心疝引臍少腹鳴肝脈滑甚為㿗疝夫滑脈關已上見者為大熱蓋陽與陽併也故大熱脈滑尺脈見為大寒生㿗疝滑脈者命門胞絡之名也為丙丁熱火併于下蓋丙丁不勝壬癸從寒水之化也故生㿗疝寸口脈弦而緊弦即衛氣不行衛氣不行即惡寒緊則不欲飲食弦緊相摶即為寒跗陽脈浮而遲即為寒疝凡瘦人繞臍痛必為風冷榖氣不行而反下之其氣必衝心不則否夫隂㿗屬肝係宗筋胃陽明養之世多不識謂之外腎非特名義差錯亦使內臟不分其可不辨古方四證但曰腸㿗氣㿗水㿗卵脹殊不别其所因如腸㿗則因房室過度元臟虛冷腸邊膋系不收墜入㿗中上下無定謂之腸㿗不內外因病者久蓄憂思恐怒兼并隨臟氣下墜隂㿗腫脹急痛名曰氣㿗屬內所因病者久坐冷濕濕氣下襲致隂腫脹名曰水㿗屬外所病者勞役無莭及跨馬坐車致卵核腫脹或偏有大小上下無常者名曰卵脹亦屬不內外因有小兒生來便如此者乃宿疾也卵脹腸㿗皆難治氣㿗水㿗治之易愈又寒疝下注入于㿗中名為狐疝亦屬㿗病世人因此病以㿗病為疝氣不審之甚婦人隂門挺出亦稱㿗病名義不分有如此者凡㿗唯腸㿗無問貴賤多有之有睡卧膋系延入脅下者有墜入囊中者或遇疲勞及天色變動逼上囊根腫急作痛過於寒疝得暖則下其如卵脹有作熱生膿為癰潰爛者比比有之前隂分大寒大熱囊垂縮隂陽别證云三陽為病發寒為癰腫不為痿厥喘瘖其傳為索睪其傳為㿗疝夫熱在外寒在內則纍乖此九夏之氣也寒在外熱在內則卵縮此三冬之氣也足太陽膀胱之脈逆上遞手太陽小腸之脈下行至足厥隂肝之脈不得伸其任脈並厥隂之脈逆則如巨川之水治陽氣下墜是風寒濕熱下出囊中至兩睪腫大謂之曰大甚則為㿗足厥隂肝之經與太陽膀胱寒水之脈同至前隂之來傷寒家説足厥隂肝經為痛滿囊縮急下之宜大承氣湯以㵼大熱靈樞經曰足厥隂肝經經脈中以為寒則筋攣卵縮為大寒前説囊為大熱此説囊縮寒此説囊縮垂睪下引㿗疝腳氣大寒風濕盛下垂為寒與上二説不同以平康不病人論之夏暑大熱囊卵纍垂冬天大寒急縮上次與三説又大不同何也是相乖邪不相乖邪答曰傷寒家囊卵縮大熱在內宜承氣湯急下之與筋經説囊卵縮大寒在外亦是在內與傷同故再引平康之人以證之也冬天陽氣在內隂氣在外人亦應之故寒在外則皮急而囊氣縮夏月隂氣在內陽氣在外人亦應之故熱在內則皮暖皮暖則垂囊此㿗疝之相也三説文殊皆亦理也用藥詳而審之諸疝附論疝病有七厥逆心痛足寒飲食則吐者名厥疝腹中氣滿心下盡痛氣積如臂者名堅疝寒飲則脅下腹盡痛者名寒疝腹中乍滿乍寒而痛者名氣疝腹中痛在臍膀者名盤疝腹中乍痛在臍下有積聚者名附疝小腹與隂相引而痛大便難者名狐疝凡此七疝皆寒由血氣凝澀不得通利冷劇則痛故皆謂之疝難經曰任之為病其內若結男子為七疝女為瘕聚蓋明此也方敵金散出直指方治疝氣外腎腫脹極大或生瘡出黃水其痛繞腸寒熱往來荆三稜蓬莪茂木豬苓白附子蘿蔔子赤芍藥黑牽牛川楝肉山茵陳青木香陳橘皮五靈芝薑黃茴香各一兩南木香半兩丁香一分澤㵼一兩半已上并生用海藻酒浸一宿焙乾海浮石米醋浸火煨紅淬醋又煨淬如此七次黑為度川山甲熟火灰煨焦各一兩青皮去白二兩生用一兩截碎以班貓五十箇頭翅去足同炒黃色去班貓不用香附杵淨三兩一兩生用一兩以巴豆五十粒去壳同炒色焦去巴豆不用右截碎夾和微炒並為末酒麵稀糊為丸如梧桐子大每服三十丸溫酒送下此藥泄斟酌用之又方川楝散出直指方治外腎脹大麻木痛硬及奔豚疝氣偏墜諸證川楝子不蛀者四十九箇先切七箇取肉以茴香二錢慢火同炒併留茴香又切七箇以破故紙二錢半同炒併留故紙又切七箇以黑牽牛二錢半同炒併留牽牛又切七箇以鹽一錢同炒併留鹽又切七箇以班貓十四箇去翅同炒去班貓不用又切七箇以巴豆肉十四箇作兩斷同炒去巴豆不用又切七箇蘿蔔子一錢半同炒去蘿蔔子不用外更别分入茴香炒青木香各半兩桂心南木香各二錢半夾和右為末酒調麵糊丸如梧桐子大每服三十丸食前鹽酒下積日計功打墜瘀血一方加延胡斑牛半兩略炒入藥研末調酒下療疝氣核腫疼方見本門諸㿗類黃蓍丸消疝丸出楊氏家藏方治寒在下焦臍腹牽痛膀胱重墜久而不愈漸至腫大甚者生瘡時有濃汁焮硬赤痛不忍者金鈴子去核炒黃赤撲兒焙茴香炒稱三味各二兩肉桂去皮半兩甜瓜子微炒一兩右件為細末酒煮麵糊為丸如桐子大每服五十丸至一百丸空心溫酒或鹽湯下忌熱麵生蔥大酢粘食等物川椒散出直指方治疝氣外腎腫痛川椒去目并合口者微炒出汗官桂各半兩白豆仁甘草各一兩川芎當歸青皮陳皮製枳壳檳榔赤茯苓青木香南木香蓽澄茄右為粗散每三錢薑棗煎食前服蒺藜丸出三因方治囊核堅大行動難發作牽連偏墜疼痛白蒺藜微炒去刺海藻浸洗去鹹澤㵼各一兩茴香炒一兩半桂心牛膝銼酒浸五味子木香煨檳榔各二兩茯神人參逺志水浸去心薑汁炒各三兩川練去皮核麩炒桃仁去皮尖炒别研赤芍藥續斷山茱茰蓯蓉酒浸青皮各四兩右為末蜜丸梧子大空心食前溫酒鹽湯下三五十丸海蛤丸出濟生拔萃方治㿗疝地膽二十一箇去頭足翅海蛤醋淬三遍當歸海金沙膩粉碙砂各一錢海藻粉霜各半兩水蛭二十箇炒青黛滑石乳香各一錢朱砂二錢為末右為末鹽湯麵糊為丸如小豆大朱砂為衣每服十丸煎燈草湯空心服之小便下冷濃惡物乃效却以黃連紫河車板藍根各三錢煎湯嗽口以手刷齒一方去板藍根加管仲椒薑丸治七疝諸寒在臍傍痛上義胸中滿少氣蜀椒去目及閉口炒出汗一兩一分乾薑炮厚朴去粗皮塗生薑汁炙黃芩去黑心細辛去苖果芍藥桂去皮各一兩桔梗炒半兩烏啄炮裂去皮臍一分柴胡去苖白茯苓去黑皮牡丹皮各一分右為末煉蜜和丸梧桐子大每服二十丸溫酒或米湯飲下日三服聚香飲子出危氏方治七情所傷遂成七疝心腹脹痛腰脅連背不可俯仰檀香木香乳香沉香合香各一兩玄胡索炒去皮片子薑黃川烏炮去皮尖桔梗去蘆銼炒桂心不見火甘草炙各半兩丁香亦不見火一兩右㕮咀每服四錢水一盞半生薑七片棗一枚煎七分去滓溫服不拘時厚朴丸治七疝肢體寒臍腹堅痛滿痛厚朴去皮生薑汁炙附子炮製去皮臍蘹香子炒白术銼炒桂去皮乾薑炮枳壳去瓤麩炒青橘皮湯浸去白焙芎藭炮製去皮臍烏頭炮木香當歸切焙各一兩右為末煉蜜丸如梧桐子大每服二十丸溫酒下生薑湯亦得不拘時海藻丸治奔豚疝氣膀胱小腸氣頑卵木腎及小兒偏墜一切腎氣等症海藻半兩洗焙乾木香檳榔川椒去目炒甘遂各半兩川烏半兩炒小兒去之老人用一兩白牽牛二兩取