body:
  text: 普濟方卷二百三十二明周王朱橚撰虚勞門虚勞不足附論夫虚勞不足者是因中風傷寒熱病勞瘟瘧大病之後血氣减耗臟腑未和使虚乏不足則經絡受邪隨其所犯變成諸病也方肉蓯蓉丸出聖恵方治虚勞腎氣不足夢與鬼交四肢少力不思飲食肉蓯蓉熟乾地黄鍾乳粉五味子龍骨山茱茰車前子桂心人参牛膝枸杞子逺志白茯苓黄蓍石斛杜仲防風薯蕷石菖蒲附子兎絲子右為末煉蜜和丸如梧桐子大毎服空心及晩温酒下三十丸麋茸丸出聖恵方治虚勞不足麋茸鹿茸熟乾地黄牛膝人参白茯苓桂心五味子巴㦸兎絲子附子蛇床子山茱茰薯蕷車前子逺志肉蓯蓉漢椒右為末取羊腎十隻去筋膜細切爛研用好酒五升火熬成膏入前末藥搗如梧桐子大每服用温酒空心下二十丸黄蓍湯出御藥院方治虚勞少氣胸心淡冷時驚惕心中悸手脚逆冷五臓六腑諸虚榮衛不調補諸不足又治風寒裏急黄蓍人参橘皮當歸桂心細辛前胡甘草芍藥麥門冬茯苓生薑大棗半夏右㕮咀以水二斗煮取四升毎服五合日三夜一深師方無橘皮細辛前胡甘草麥門冬有烏頭三兩蜀椒二兩逺志二兩胡洽崔氏有蜀椒一兩烏頭五枚崔氏藥令黄蓍湯一方有五味子無橘皮治四肢煩疼食脹汗出附子湯出千金方治虚損少氣腹脹内急拘引小腹至冷不得屈伸不能飲食寒熱頭痛手足逆冷大小便難或復下痢口乾百莭疼痛附子厚朴甘草人参桂心當歸茯苓麥門冬黄蓍龍骨芍藥生薑飴糖生地黄大棗右㕮咀以水一斗二升煮取四升去滓内飴糖毎服八合三夜三日倍加生薑人参補虚湯出御藥院方治虚勞不足四肢困弱嗜卧少力心中悸動夜多盗汗建中進食黄蓍人参陳皮當歸白芍藥桂細辛前胡半夏麥門冬甘草白茯苓熟乾地黄右為末每服三錢水一盞薑五片棗一枚食前煎服熟地黄散出聖恵方治虚勞不足四肢無力不能飲食食即多汗熟乾地黄牡蠣黄蓍剉人参麥門冬白茯苓續斷白芍藥桂心五味子甘草當歸白术山茱茰右為散毎服四錢以水一中盞入生薑半分棗三枚煎至六分去滓每於食前温服治虚勞不足小便數四肢無力不能自持宜服此方石斛黄蓍澤㵼補骨脂逺志牛膝當歸人参熟乾地黄桂心五味子白茯苓鹿茸龍骨右為散毎服用羊腎一對切去脂膜以水一大盞半煮取汁去腎入藥煎服之黄蓍散出聖恵方治虚勞不足不能飲食黄蓍人参陳橘皮當歸附子石斛白术山茱茰白茯苓桂心甘草麥門冬右為散毎服三錢水一中盞入生薑半分棗三枚煎至六分去滓温服胡麻散出聖恵方治虛勞不足胡麻桂心甘草人参澤㵼黄蓍白茯苓五味子麥門冬地骨皮天門冬去心已上各半兩熟乾地黄右為散每服四錢水一中盞入薤白兩莖生薑半分煎六分去滓不計時服龍齒散出聖恵方治虚勞不足汗出而悶心悸虚煩龍齒一兩甘草半兩炙黄蓍一兩剉麥門冬一兩熟乾地黄一兩人参一兩乾薑半兩阿膠一兩桂心半兩右為散每服四錢水一中盞入棗三枚煎至六分温服建中散出聖恵方治虚勞脾腎氣寒饑不欲食面色黒少氣不足磁石散治虚勞能益補足磁石二兩黄蓍一兩剉杜仲一兩半去麄皮白石英一兩五味子三分白茯苓白术各一兩桂心三分附子一兩右為散毎服三錢以水一中盞煎至六分去滓食前温服治虚勞不足補益思食助力石斛一兩桑螵蛸㣲炒紫芝五味子紫苑各三分熟乾地黄鍾乳粉各一兩逺志半兩去心附子三分右為散毎於食前以温酒調下二錢兎絲子散出聖恵方治虚勞不足隂陽失度傷筋損脉嘘吸短氣漏泄不止小便赤顔色不悦兎絲子三兩甘草二兩棗肉桂心各三分杜仲五兩麥門冬二兩生乾地黄五兩肉蓯蓉三兩右以酒五升浸三宿出曝乾復浸以酒浸盡為度搗羅為末食前以温酒調下二錢胡麻湯出聖恵方治虚勞絶傷羸極氣少不足四肢消瘦胡麻三兩熟乾地黄二兩人参一兩去蘆頭甘草一分炙㣲赤剉麥門冬二兩去心焙藁本三分右為散毎服四錢以水一中盞煎至五分去滓食前温服鍾乳散出聖恵方治虚勞不足益氣力思飲食鍾乳粉二兩黄蓍剉桂心各一兩乾薑三分炮製剉肉蓯蓉湯浸一宿刮去皺皮炙令乾白术各一兩右為散毎服食前以温酒調下二錢鍾乳酒浸方出聖恵方治虚勞不足補養五臟療風氣堅筋骨益精髓宜服鍾乳粉三兩黄蓍剉牛膝去苖石斛去根莭防風去蘆頭各二兩熟乾地黄五兩右細剉都以生絹袋盛以酒三斗浸三日後毎於食前温飲一小盞清神甘露丸出衛生寳鑑治男子婦人虚勞不足骨枯肉䧟並皆治之生地黄汁白蓮藕汁牛乳汁生用已上各等分用砂石器内以文武火同煎熬成膏子用後藥白术人参黄連黄蓍五味子胡黄連右各等分為細末煎膏子和劑如梧桐子大毎服五十丸人参湯下八味腎氣丸出千金方治虚勞不足大渇欲飲水腰痛小便拘急大便不利小腹脹滿羸極氣少四肢無力效騐方乾地黄八兩山茱茰薯預各四兩澤㵼牡丹皮茯苓各三兩桂心附子各二兩右為末蜜丸如梧桐子大酒下十五丸日三加至二十五丸仲景云常服去附子加五味子治大風冷姚公云加五味子三兩蓯蓉四兩張文仲云去五味子蓯蓉各四兩肘後方云地黄四兩附子澤㵼各一兩餘各二兩又方出肘後方方見本門虚勞小便不利類一名苦参丸同五加皮酒出千金方治虚勞不足五加皮枸杞白皮各一斗右㕮咀以水一石五斗煮取七斗分取四斗浸麴一斗餘三斗用拌飯下米多少如常釀法熟壓取服之多少任性禁房事如法將息愈虚勞嘔逆附論夫虚勞之人中焦有冷不能化榖寒氣入胃痞滿不通故雖能食而胃亦不受使氣上行令人嘔逆痞悶不安心下逆滿也虚勞嘔逆者為勞傷之人五臓不安六腑不調胃氣虚弱故也胃為水穀之海今既虚弱復有寒氣所侵則不勝於水穀故氣逆而嘔也方七香丸治虚勞脾胃冷寒痰嘔吐心腹脹滿疼痛水穀不消零陵香去梗甘松香去土各一兩藿香去梗木香各一兩半丁香皮剉沉香各半兩麝香研紅荳蔲去皮蓽澄茄各一兩草荳蔲去皮一兩山芋㯽榔煨各二兩厚朴去麄皮姜汁炙熟白术半夏湯浸七遍去滑青橘皮湯浸去白焙白荳蔲去皮人参蒟醬各一兩陳橘皮湯浸去白三分甘草炙一兩半右搗羅為末麵糊和丸如梧桐子大毎服二十丸食前生薑湯下厚朴丸治虚勞脾胃氣弱嘔吐口乾煩渇不能飲食四肢疼痛厚樸去麄皮薑汁炙熟陳橘皮湯浸去白焙白茯苓去黒皮人参乾薑炮白术薏苡仁各一兩半桂去皮石斛去根甘草炙牛膝酒浸焙各一兩一分枳殻去穰麩炒細辛去苖葉食茱茰大麥蘖炙各三分右搗羅為末煉蜜和丸如梧桐子大毎服二十丸温酒下日二服加至三十丸訶棃勒散出聖恵方治虚勞脾胃氣不和嘔逆不納飲食四肢少力胸膈煩悶訶棃勒皮一兩黄蓍一兩剉白荳蔲去皮陳橘皮湯浸去白穰焙白术各三分半夏湯浸七遍去滑㯽榔各半兩人参去蘆頭厚樸一兩去麄皮塗生薑汁炙令香熟甘草半兩炙㣲赤剉桂心三分前胡三分右為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服赤茯苓散出聖恵方治虚勞胸膈氣滿嘔逆不納飲食赤茯苓一兩陳橘皮湯浸去白穰焙人参去蘆頭各三分丁香半夏湯浸七遍各半兩黄蓍剉白术各三分五味子枳實麩炒㣲黄各半兩甘草一分炙㣲赤剉訶棃勒皮三分桂心半兩右為散毎服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服藿香湯治虚勞脾胃乆虚吐逆不下食藿香葉人参白茯苓去黒心桔梗去蘆頭炒桂去麄皮木香白术甘草炙杏仁湯浸去皮麩炒半夏湯洗七遍去滑炒令黄各半兩枇杷葉十片拭去毛炙右搗篩毎服五錢水一盞半生薑五片同煎至七分去滓稍熱不拘時服黄蓍散出聖恵方治虚勞脾胃氣不和喫飲食嘔逆黄蓍剉訶棃勒皮各一兩煨桂心半兩半夏半兩湯洗七遍去滑白术白茯苓草荳蔲去皮厚樸去麄皮塗生薑汁炙令香熟各一兩人参三分去蘆頭陳橘皮一兩湯浸去白穰焙甘草半兩炙㣲赤剉右為散毎服三錢以水一中盞入薑半分棗三枚煎至六分去滓不計時候稍熱服半夏飲治虚勞胃氣寒中脘痞悶嘔吐多痰不思飲食半夏一兩湯洗去滑用生薑二兩搗作餅子焙乾丁香木香各一分白术沉香陳橘皮湯浸去白焙各半兩甘草炙草荳蔲五枚去皮青橘皮湯浸去白炒各一兩右麄搗篩毎服五錢水一盞半生薑半分煎取一盞去滓温服白术湯治虚勞胸中氣滿痰飲癖結或時嘔逆不欲飲食白术陳橘皮湯浸去白炒白茯苓去黒皮桂去麄皮前胡去蘆頭各一兩枳實麩炒半夏湯洗七遍去滑附子炮製去皮臍各一兩甘草各半兩右剉如麻豆毎服三錢以水一盞半生薑半分煎至一盞去滓不計時候温服橘皮湯出聖恵方治虚勞嘔逆煩渇不能食四肢少力陳橘皮一兩湯洗去白穣焙半夏湯洗七遍去滑半兩白茯苓白术人参去蘆頭麥門冬去心黄蓍枇杷葉去毛炙㣲黄各半兩甘草一分炙㣲赤剉右為散毎服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服前胡散出聖恵方治虚勞脾胃氣滯胸膈痰壅不散食即嘔逆前胡一兩去蘆頭赤茯苓半兩陳橘皮三分湯浸去白穣焙枇杷葉半兩拭去毛炙黄㯽榔人参去蘆頭草荳蔲去皮半夏湯浸七遍去滑甘草炙㣲赤剉各半兩右為散毎服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服白术散出聖恵方治虚勞脾胃氣冷食即嘔逆無食即饑白术三分藿香半兩枇杷葉二分拭去毛炙㣲黄人参去蘆頭白茯苓各一兩肉荳蔲三枚去殻甘草半兩炙㣲赤剉厚朴一兩去麄皮塗生薑汁炙令香熟桂心半兩右為散毎服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服丁香散出聖恵方治虚勞脾胃氣弱嘔逆不欲飲食四肢少力丁香人参去蘆頭各三分甘草半兩炙㣲赤剉白术三分茯神一兩髙良薑剉白荳蔲去皮陳橘皮湯浸去白穣焙半夏湯洗七遍去滑各半兩右為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓稍熱服不計時前胡湯治虚勞胸滿氣逆嘔吐飲食不欲前胡三分去蘆頭柴胡去苖桔梗炒赤茯苓去黒皮各半兩大腹子三枚并皮剉半夏湯洗七遍去滑陳橘皮湯洗去白炒各一兩人参右麄搗篩毎用五錢水一盞半生薑一分拍碎煎至一盞去滓空腹分温二服人参湯治虚勞脾胃氣弱嘔吐不納飲食四肢怠堕人参肉荳蔲去殻炮半夏湯洗七遍去滑黄蓍剉厚朴去粗皮生姜汁炙熟枇杷葉拭去毛炙藿香去梗白茯苓去黒皮各二兩右麄搗篩毎服三錢水一盞入生薑指大拍碎大棗二枚擘破煎取七分去滓空心食前温服半夏湯治虚勞脾胃氣滯胸膈痰壅食即吐嘔半夏湯浸去滑焙乾一兩陳橘皮湯浸去白焙二兩芍藥白茯苓白术杏仁湯浸去皮尖雙仁别研各一兩半右除杏仁外麄搗篩和匀毎服五錢用水一盞半入棗二枚擘破生薑一分拍碎煎至一盞去滓分温二服附子湯治虚勞脾胃冷弱胸滿氣逆嘔吐咳嗽腹痛腸鳴附子炮製去皮臍甘草炙各一兩乾薑炮三分白术炒剉一兩半生薑二兩同搗作餅炙蒼术米泔浸去粗皮剉炒二兩半夏一兩湯洗去滑右剉如麻豆每服三錢水一盞半棗二枚擘破生薑半分煎至一盞去滓分為二服虚勞咳唾膿血附論夫虚勞之人血氣乆耗寒邪僣熱伏結上焦内傷心肺殘賊榮衛心主血血為榮肺主氣氣為衛榮衛不調金火相尅其病難治則因咳嗽間有膿血者津液腐化也宜潤飬上焦滋益榮衛則病緩而可也方鼈甲湯治五勞咳嗽咯唾膿血言語