炮製當歸切焙甘草附子炮製去皮臍人参赤石脂厚朴去麄皮生薑汁炙桂去麄皮各一兩右剉如麻豆毎服五錢水一盞半煎至一盞去滓温二服五柔丸療虚勞不足飲食不生肌膚三焦不調大便秘澁此藥和腸臟療癖飲百病方見本門虚勞大便類白术散出聖恵方治虚勞脾胃虚冷食不消化漸加無力白术三分陳橘皮一兩湯浸去白穣焙人参麥蘖一兩㣲炒附子一兩炮製去皮臍芎藭三分厚朴一兩半去麄皮生薑汁炙令香熟訶棃勒一兩煨用皮桂心三分右為散毎服三錢以水一中盞入生薑半分棗二枚煎至六分去滓食前稍熱服白术散出聖恵方治虚勞脾胃虚冷飲食不消白术人参去蘆頭各一兩桂心三分厚朴一兩半去麄皮塗生薑汁炙令香熟吳茱茰半兩湯浸七遍焙乾㣲炒訶棃勒一兩煨用皮益智子三分去皮㯽榔半兩陳橘皮一兩湯浸去白穣焙右為散毎服三錢以水一中盞入棗三枚煎至六分去滓食前稍熱服神麴丸出聖恵方治虚勞脾胃虚冷飲食不消腹脇氣滿神麴三兩炒㣲黄白术附子炮製去皮臍枳殻麩炒㣲黄去穣髙良薑剉人参去蘆頭吳茱茰湯浸七遍焙乾㣲炒訶棃勒煨用皮草豆蔲去皮各一兩右為末煉蜜和搗三二百杵丸如梧桐子大毎服食前煎橘皮湯下二十丸草豆蔲散出聖恵方治虚勞脾胃虚冷食不消化草豆蔲去皮人参去蘆頭各一兩桂五錢白术一兩半夏湯浸七遍去滑五錢甘草一分炙㣲赤剉陳橘皮一兩湯浸去白穣焙厚朴一兩半去粗皮塗生薑汁炙令香熟右為散毎服三錢以水一中盞入生薑半分棗三枚煎至六分去滓食前稍熱服白术丸治虚勞脾胃虚冷消食下氣白术人参各一兩半枳殻去穰麸焙一兩一分厚朴去粗皮生薑汁炙桂去粗皮㯽榔剉各一兩陳橘皮湯浸去白焙三分右為末煉蜜丸如桐子大毎服二十丸米飲湯若有寒温酒下平胃丸治虚勞胃氣不調不能食冷即腹脹泄痢甘草炙剉枳殻去穣麸炒白术人参各一兩乾薑炮製半兩麥蘖炒一兩右為末煉蜜和丸如桐子大毎服二十丸米飲下不拘時日三丁香丸治虚勞脾氣虚弱腹脹飲食不消面無顔色四肢羸痩丁香一兩硫黄二分細研神麴一兩炒㣲黄㯽榔陳橘皮湯浸去白穣焙厚朴去粗皮塗生薑汁炙令香熟各一兩右為末煉蜜和搗三二百杵丸如桐子大毎服空心及晚食前以温酒下二十丸粥飲下亦得白术丸治虚勞脾胃虚冷不能食食不消化白术二兩陳橘皮湯浸去白焙人参厚朴去粗皮生薑汁炙甘草炙剉各一兩右為末煉蜜丸如梧桐子大毎服十五丸至二十丸温酒下日一服一方無甘草米飲下神麴散治虚勞脾胃冷弱腹中氣脹滿食不消化草豆蔲去皮各二兩神麴二兩㣲炒木香陳橘皮湯浸去白穣焙麥蘖㣲炒右為散毎服食前以温酒調下一錢普濟方卷二百三十二
