body:
  text: 普濟方卷二百三十二明周王朱橚撰虛勞門虛勞不足附論夫虛勞不足者是因中風傷寒熱病勞瘟瘧大病之後血氣減耗臟腑未和使虛乏不足則經絡受邪隨其所犯變成諸病也方肉蓯蓉丸出聖惠方治虛勞腎氣不足夢與鬼交四肢少力不思飲食肉蓯蓉熟乾地黃鍾乳粉五味子龍骨山茱茰車前子桂心人參牛膝枸杞子逺志白茯苓黃蓍石斛杜仲防風薯蕷石菖蒲附子兔絲子右為末煉蜜和丸如梧桐子大每服空心及晚溫酒下三十丸麋茸丸出聖惠方治虛勞不足麋茸鹿茸熟乾地黃牛膝人參白茯苓桂心五味子巴戟兔絲子附子蛇床子山茱茰薯蕷車前子逺志肉蓯蓉漢椒右為末取羊腎十隻去筋膜細切爛研用好酒五升火熬成膏入前末藥搗如梧桐子大每服用溫酒空心下二十丸黃蓍湯出御藥院方治虛勞少氣胸心淡冷時驚惕心中悸手腳逆冷五臟六腑諸虛榮衛不調補諸不足又治風寒裏急黃蓍人參橘皮當歸桂心細辛前胡甘草芍藥麥門冬茯苓生薑大棗半夏右㕮咀以水二斗煮取四升每服五合日三夜一深師方無橘皮細辛前胡甘草麥門冬有烏頭三兩蜀椒二兩逺志二兩胡洽崔氏有蜀椒一兩烏頭五枚崔氏藥令黃蓍湯一方有五味子無橘皮治四肢煩疼食脹汗出附子湯出千金方治虛損少氣腹脹內急拘引小腹至冷不得屈伸不能飲食寒熱頭痛手足逆冷大小便難或復下痢口乾百莭疼痛附子厚朴甘草人參桂心當歸茯苓麥門冬黃蓍龍骨芍藥生薑飴糖生地黃大棗右㕮咀以水一斗二升煮取四升去滓內飴糖每服八合三夜三日倍加生薑人參補虛湯出御藥院方治虛勞不足四肢困弱嗜卧少力心中悸動夜多盜汗建中進食黃蓍人參陳皮當歸白芍藥桂細辛前胡半夏麥門冬甘草白茯苓熟乾地黃右為末每服三錢水一盞薑五片棗一枚食前煎服熟地黃散出聖惠方治虛勞不足四肢無力不能飲食食即多汗熟乾地黃牡蠣黃蓍銼人參麥門冬白茯苓續斷白芍藥桂心五味子甘草當歸白术山茱茰右為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓每於食前溫服治虛勞不足小便數四肢無力不能自持宜服此方石斛黃蓍澤㵼補骨脂逺志牛膝當歸人參熟乾地黃桂心五味子白茯苓鹿茸龍骨右為散每服用羊腎一對切去脂膜以水一大盞半煮取汁去腎入藥煎服之黃蓍散出聖惠方治虛勞不足不能飲食黃蓍人參陳橘皮當歸附子石斛白术山茱茰白茯苓桂心甘草麥門冬右為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓溫服胡麻散出聖惠方治虛勞不足胡麻桂心甘草人參澤㵼黃蓍白茯苓五味子麥門冬地骨皮天門冬去心已上各半兩熟乾地黃右為散每服四錢水一中盞入薤白兩莖生薑半分煎六分去滓不計時服龍齒散出聖惠方治虛勞不足汗出而悶心悸虛煩龍齒一兩甘草半兩炙黃蓍一兩銼麥門冬一兩熟乾地黃一兩人參一兩乾薑半兩阿膠一兩桂心半兩右為散每服四錢水一中盞入棗三枚煎至六分溫服建中散出聖惠方治虛勞脾腎氣寒飢不欲食面色黑少氣不足磁石散治虛勞能益補足磁石二兩黃蓍一兩銼杜仲一兩半去粗皮白石英一兩五味子三分白茯苓白术各一兩桂心三分附子一兩右為散每服三錢以水一中盞煎至六分去滓食前溫服治虛勞不足補益思食助力石斛一兩桑螵蛸微炒紫芝五味子紫苑各三分熟乾地黃鍾乳粉各一兩逺志半兩去心附子三分右為散每於食前以溫酒調下二錢兔絲子散出聖惠方治虛勞不足隂陽失度傷筋損脈噓吸短氣漏泄不止小便赤顔色不悅兔絲子三兩甘草二兩棗肉桂心各三分杜仲五兩麥門冬二兩生乾地黃五兩肉蓯蓉三兩右以酒五升浸三宿出曝乾復浸以酒浸盡為度搗羅為末食前以溫酒調下二錢胡麻湯出聖惠方治虛勞絶傷羸極氣少不足四肢消瘦胡麻三兩熟乾地黃二兩人參一兩去蘆頭甘草一分炙微赤銼麥門冬二兩去心焙藁本三分右為散每服四錢以水一中盞煎至五分去滓食前溫服鍾乳散出聖惠方治虛勞不足益氣力思飲食鍾乳粉二兩黃蓍銼桂心各一兩乾薑三分炮製銼肉蓯蓉湯浸一宿刮去皺皮炙令乾白术各一兩右為散每服食前以溫酒調下二錢鍾乳酒浸方出聖惠方治虛勞不足補養五臟療風氣堅筋骨益精髓宜服鍾乳粉三兩黃蓍銼牛膝去苖石斛去根莭防風去蘆頭各二兩熟乾地黃五兩右細銼都以生絹袋盛以酒三斗浸三日後每於食前溫飲一小盞清神甘露丸出衛生寶鑑治男子婦人虛勞不足骨枯肉陷並皆治之生地黃汁白蓮藕汁牛乳汁生用已上各等分用砂石器內以文武火同煎熬成膏子用後藥白术人參黃連黃蓍五味子胡黃連右各等分為細末煎膏子和劑如梧桐子大每服五十丸人參湯下八味腎氣丸出千金方治虛勞不足大渴欲飲水腰痛小便拘急大便不利小腹脹滿羸極氣少四肢無力效驗方乾地黃八兩山茱茰薯預各四兩澤㵼牡丹皮茯苓各三兩桂心附子各二兩右為末蜜丸如梧桐子大酒下十五丸日三加至二十五丸仲景云常服去附子加五味子治大風冷姚公云加五味子三兩蓯蓉四兩張文仲云去五味子蓯蓉各四兩肘後方云地黃四兩附子澤㵼各一兩餘各二兩又方出肘後方方見本門虛勞小便不利類一名苦參丸同五加皮酒出千金方治虛勞不足五加皮枸杞白皮各一斗右㕮咀以水一石五斗煮取七斗分取四斗浸麴一斗餘三斗用拌飯下米多少如常釀法熟壓取服之多少任性禁房事如法將息愈虛勞嘔逆附論夫虛勞之人中焦有冷不能化榖寒氣入胃痞滿不通故雖能食而胃亦不受使氣上行令人嘔逆痞悶不安心下逆滿也虛勞嘔逆者為勞傷之人五臟不安六腑不調胃氣虛弱故也胃為水穀之海今既虛弱復有寒氣所侵則不勝於水穀故氣逆而嘔也方七香丸治虛勞脾胃冷寒痰嘔吐心腹脹滿疼痛水穀不消零陵香去梗甘松香去土各一兩藿香去梗木香各一兩半丁香皮銼沉香各半兩麝香研紅豆蔲去皮蓽澄茄各一兩草豆蔲去皮一兩山芋檳榔煨各二兩厚朴去粗皮薑汁炙熟白术半夏湯浸七遍去滑青橘皮湯浸去白焙白豆蔲去皮人參蒟醬各一兩陳橘皮湯浸去白三分甘草炙一兩半右搗羅為末麵糊和丸如梧桐子大每服二十丸食前生薑湯下厚朴丸治虛勞脾胃氣弱嘔吐口乾煩渴不能飲食四肢疼痛厚朴去粗皮薑汁炙熟陳橘皮湯浸去白焙白茯苓去黑皮人參乾薑炮白术薏苡仁各一兩半桂去皮石斛去根甘草炙牛膝酒浸焙各一兩一分枳殼去穰麩炒細辛去苖葉食茱茰大麥蘖炙各三分右搗羅為末煉蜜和丸如梧桐子大每服二十丸溫酒下日二服加至三十丸訶梨勒散出聖惠方治虛勞脾胃氣不和嘔逆不納飲食四肢少力胸膈煩悶訶梨勒皮一兩黃蓍一兩銼白豆蔲去皮陳橘皮湯浸去白穰焙白术各三分半夏湯浸七遍去滑檳榔各半兩人參去蘆頭厚朴一兩去粗皮塗生薑汁炙令香熟甘草半兩炙微赤銼桂心三分前胡三分右為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服赤茯苓散出聖惠方治虛勞胸膈氣滿嘔逆不納飲食赤茯苓一兩陳橘皮湯浸去白穰焙人參去蘆頭各三分丁香半夏湯浸七遍各半兩黃蓍銼白术各三分五味子枳實麩炒微黃各半兩甘草一分炙微赤銼訶梨勒皮三分桂心半兩右為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服藿香湯治虛勞脾胃久虛吐逆不下食藿香葉人參白茯苓去黑心桔梗去蘆頭炒桂去粗皮木香白术甘草炙杏仁湯浸去皮麩炒半夏湯洗七遍去滑炒令黃各半兩枇杷葉十片拭去毛炙右搗篩每服五錢水一盞半生薑五片同煎至七分去滓稍熱不拘時服黃蓍散出聖惠方治虛勞脾胃氣不和喫飲食嘔逆黃蓍銼訶梨勒皮各一兩煨桂心半兩半夏半兩湯洗七遍去滑白术白茯苓草豆蔲去皮厚朴去粗皮塗生薑汁炙令香熟各一兩人參三分去蘆頭陳橘皮一兩湯浸去白穰焙甘草半兩炙微赤銼右為散每服三錢以水一中盞入薑半分棗三枚煎至六分去滓不計時候稍熱服半夏飲治虛勞胃氣寒中脘痞悶嘔吐多痰不思飲食半夏一兩湯洗去滑用生薑二兩搗作餅子焙乾丁香木香各一分白术沉香陳橘皮湯浸去白焙各半兩甘草炙草豆蔲五枚去皮青橘皮湯浸去白炒各一兩右粗搗篩每服五錢水一盞半生薑半分煎取一盞去滓溫服白术湯治虛勞胸中氣滿痰飲癖結或時嘔逆不欲飲食白术陳橘皮湯浸去白炒白茯苓去黑皮桂去粗皮前胡去蘆頭各一兩枳實麩炒半夏湯洗七遍去滑附子炮製去皮臍各一兩甘草各半兩右銼如麻豆每服三錢以水一盞半生薑半分煎至一盞去滓不計時候溫服橘皮湯出聖惠方治虛勞嘔逆煩渴不能食四肢少力陳橘皮一兩湯洗去白穰焙半夏湯洗七遍去滑半兩白茯苓白术人參去蘆頭麥門冬去心黃蓍枇杷葉去毛炙微黃各半兩甘草一分炙微赤銼右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服前胡散出聖惠方治虛勞脾胃氣滯胸膈痰壅不散食即嘔逆前胡一兩去蘆頭赤茯苓半兩陳橘皮三分湯浸去白穰焙枇杷葉半兩拭去毛炙黃檳榔人參去蘆頭草豆蔲去皮半夏湯浸七遍去滑甘草炙微赤銼各半兩右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服白术散出聖惠方治虛勞脾胃氣冷食即嘔逆無食即飢白术三分藿香半兩枇杷葉二分拭去毛炙微黃人參去蘆頭白茯苓各一兩肉豆蔲三枚去殼甘草半兩炙微赤銼厚朴一兩去粗皮塗生薑汁炙令香熟桂心半兩右為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服丁香散出聖惠方治虛勞脾胃氣弱嘔逆不欲飲食四肢少力丁香人參去蘆頭各三分甘草半兩炙微赤銼白术三分茯神一兩髙良薑銼白豆蔲去皮陳橘皮湯浸去白穰焙半夏湯洗七遍去滑各半兩右為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓稍熱服不計時前胡湯治虛勞胸滿氣逆嘔吐飲食不欲前胡三分去蘆頭柴胡去苖桔梗炒赤茯苓去黑皮各半兩大腹子三枚并皮銼半夏湯洗七遍去滑陳橘皮湯洗去白炒各一兩人參右粗搗篩每用五錢水一盞半生薑一分拍碎煎至一盞去滓空腹分溫二服人參湯治虛勞脾胃氣弱嘔吐不納飲食四肢怠墮人參肉豆蔲去殼炮半夏湯洗七遍去滑黃蓍銼厚朴去粗皮生薑汁炙熟枇杷葉拭去毛炙藿香去梗白茯苓去黑皮各二兩右粗搗篩每服三錢水一盞入生薑指大拍碎大棗二枚擘破煎取七分去滓空心食前溫服半夏湯治虛勞脾胃氣滯胸膈痰壅食即吐嘔半夏湯浸去滑焙乾一兩陳橘皮湯浸去白焙二兩芍藥白茯苓白术杏仁湯浸去皮尖雙仁别研各一兩半右除杏仁外粗搗篩和勻每服五錢用水一盞半入棗二枚擘破生薑一分拍碎煎至一盞去滓分溫二服附子湯治虛勞脾胃冷弱胸滿氣逆嘔吐咳嗽腹痛腸鳴附子炮製去皮臍甘草炙各一兩乾薑炮三分白术炒銼一兩半生薑二兩同搗作餅炙蒼术米泔浸去粗皮銼炒二兩半夏一兩湯洗去滑右銼如麻豆每服三錢水一盞半棗二枚擘破生薑半分煎至一盞去滓分為二服虛勞咳唾膿血附論夫虛勞之人血氣久耗寒邪僣熱伏結上焦內傷心肺殘賊榮衛心主血血為榮肺主氣氣為衛榮衛不調金火相尅其病難治則因咳嗽間有膿血者津液腐化也宜潤飬上焦滋益榮衛則病緩而可也方鱉甲湯治五勞咳嗽咯唾膿血言語