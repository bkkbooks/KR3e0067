炮製當歸切焙甘草附子炮製去皮臍人參赤石脂厚朴去粗皮生薑汁炙桂去粗皮各一兩右銼如麻豆每服五錢水一盞半煎至一盞去滓溫二服五柔丸療虛勞不足飲食不生肌膚三焦不調大便祕澀此藥和腸臟療癖飲百病方見本門虛勞大便類白术散出聖惠方治虛勞脾胃虛冷食不消化漸加無力白术三分陳橘皮一兩湯浸去白穰焙人參麥蘖一兩微炒附子一兩炮製去皮臍芎藭三分厚朴一兩半去粗皮生薑汁炙令香熟訶梨勒一兩煨用皮桂心三分右為散每服三錢以水一中盞入生薑半分棗二枚煎至六分去滓食前稍熱服白术散出聖惠方治虛勞脾胃虛冷飲食不消白术人參去蘆頭各一兩桂心三分厚朴一兩半去粗皮塗生薑汁炙令香熟吳茱茰半兩湯浸七遍焙乾微炒訶梨勒一兩煨用皮益智子三分去皮檳榔半兩陳橘皮一兩湯浸去白穰焙右為散每服三錢以水一中盞入棗三枚煎至六分去滓食前稍熱服神麴丸出聖惠方治虛勞脾胃虛冷飲食不消腹脅氣滿神麴三兩炒微黃白术附子炮製去皮臍枳殼麩炒微黃去穰髙良薑銼人參去蘆頭吳茱茰湯浸七遍焙乾微炒訶梨勒煨用皮草豆蔲去皮各一兩右為末煉蜜和搗三二百杵丸如梧桐子大每服食前煎橘皮湯下二十丸草豆蔲散出聖惠方治虛勞脾胃虛冷食不消化草豆蔲去皮人參去蘆頭各一兩桂五錢白术一兩半夏湯浸七遍去滑五錢甘草一分炙微赤銼陳橘皮一兩湯浸去白穰焙厚朴一兩半去粗皮塗生薑汁炙令香熟右為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓食前稍熱服白术丸治虛勞脾胃虛冷消食下氣白术人參各一兩半枳殼去穰麩焙一兩一分厚朴去粗皮生薑汁炙桂去粗皮檳榔銼各一兩陳橘皮湯浸去白焙三分右為末煉蜜丸如桐子大每服二十丸米飲湯若有寒溫酒下平胃丸治虛勞胃氣不調不能食冷即腹脹泄痢甘草炙銼枳殼去穰麩炒白术人參各一兩乾薑炮製半兩麥蘖炒一兩右為末煉蜜和丸如桐子大每服二十丸米飲下不拘時日三丁香丸治虛勞脾氣虛弱腹脹飲食不消面無顔色四肢羸瘦丁香一兩硫黃二分細研神麴一兩炒微黃檳榔陳橘皮湯浸去白穰焙厚朴去粗皮塗生薑汁炙令香熟各一兩右為末煉蜜和搗三二百杵丸如桐子大每服空心及晚食前以溫酒下二十丸粥飲下亦得白术丸治虛勞脾胃虛冷不能食食不消化白术二兩陳橘皮湯浸去白焙人參厚朴去粗皮生薑汁炙甘草炙銼各一兩右為末煉蜜丸如梧桐子大每服十五丸至二十丸溫酒下日一服一方無甘草米飲下神麴散治虛勞脾胃冷弱腹中氣脹滿食不消化草豆蔲去皮各二兩神麴二兩微炒木香陳橘皮湯浸去白穰焙麥蘖微炒右為散每服食前以溫酒調下一錢普濟方卷二百三十二
