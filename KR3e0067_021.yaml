body:
  text: 普濟方卷二十一明周王朱橚撰脾臟門脾臟冷氣腹內虛鳴夫脾為中州腐化水榖禆諸臟腑若脾虛冷氣與正氣相擊則令腹內虛鳴甚則腹痛不利食不能化內經所謂暴氣不能雷者以陽氣不足隂氣有餘邪冷之氣入在臟流走往來故令腹內虛鳴也方陳橘皮湯治脾虛冷邪正氣相擊摶腹虛鳴兼治隂陽二毒傷寒陳橘皮湯浸去白麩炒桂去粗皮甘草炙銼乾薑炮白术枳殼去瓤麩炒人參白茯苓去黑皮厚朴去粗皮生薑汁塗炙半夏湯浸七遍去滑麩炒各一兩訶梨勒五枚煨去核草豆蔲二枚去皮檳榔二枚銼附子炮裂去皮臍沉香銼木香各一兩右銼如麻豆大每服三錢水一盞生薑三片棗三枚擘破煎六分去滓熱服脾㵼氣痛服之神妙傷寒併二服烏頭丸治脾臟冷氣腹內虛鳴四肢多冷心腹疼痛草烏頭去皮尖取末一兩芫花一錢醋炒黃别杵為末二味用醋一升熬成稠膏刮去桂去粗皮乾薑炮檳榔銼青橘皮湯浸去白焙肉豆䓻仁天雄炮裂去皮臍當歸去焙烏頭炮裂去皮臍胡椒炒藿香葉紅豆䓻丁香各三錢右除二味熬膏外搗羅為末入前膏和劑如硬入蜜少許丸梧桐子大每服十五丸生薑湯或米湯橘皮湯下病已即止橘皮煮散出王氏慱濟方治脾藏冷氣不和腹內雷鳴膨脹刺痛及解傷寒陳橘皮湯浸去白焙白术各二兩訶梨勒炮去核枳殼去瓤麩炒乾薑炮桂去粗皮木香人參甘草炙各一兩檳榔五枚銼草豆蔲去皮七枚半夏湯浸七遍三錢厚朴去粗皮生薑汁炙各一兩半右搗為粗散每服三錢七水一盞入生薑三片棗二枚擘破煎七分去滓食前溫服益智煮散治脾臟冷氣腸鳴相逐飲食無味補虛益智去皮烏藥銼桂去粗皮天仙藤各一兩莎草根炒陳橘皮湯浸去白焙甘草炒各二兩乾薑炮木香芎藭白术丁香各半兩人參一錢右搗為粗散每服三錢匕水一盞入生薑三片棗二枚擘破煎六分去滓溫服食前桔梗散出聖惠方治脾臟久積冷氣流動腹虛鳴兩脅脹滿少思飲食桔梗一兩去蘆頭木香一兩丹參一兩去蘆頭白豆蔲三分去皮附子三分炮裂去皮臍髙良薑三分銼木香三分沉香三分檳榔三分訶梨勒一兩半用皮陳橘皮半兩湯浸去白瓤微炒右為散每服三錢水一盞入生薑半分煎六分去滓食前稍熱服訶梨勒丸出聖惠方治脾臟冷氣腹內虛鳴胸膈氣滯不能飲食雖食不消頻嘔逆訶梨勒一兩半煨用皮赤茯苓一兩吳茱茰半兩湯浸七遍焙乾微炒白术一兩桂心三分人參一兩去蘆頭桔梗半兩去蘆頭陳橘皮一兩湯浸去白瓤焙紅豆䓻一兩去皮乾薑半兩炮裂銼厚朴一兩去粗皮塗生薑汁炙黃香熟右為末煉蜜和丸梧桐子大每服不計時生薑湯下二十丸厚朴湯治脾臟虛冷腹脹腸鳴疼痛泄㵼飲食不化厚朴去粗皮生薑汁炙白茯苓去黑皮人參草豆䓻去皮陳橘皮湯浸去白瓤焙各三錢桂去粗皮半夏湯浸去滑生薑汁裂木香炒枳殼去瓤麩炒各半兩右搗篩粗末每服四錢七水一盞半薑三片棗一枚擘破同煎至七分去滓食前溫服厚朴丸治脾臟冷氣腹內虛鳴內寒外熱宿食不消大便乍祕乍泄腑臟不調少思飲食厚朴一兩半去粗皮塗生薑汁炙令香熟白术半兩乾薑半兩炮裂銼桔梗一兩去蘆頭當歸一兩銼微炒檳榔半兩陳橘皮半兩湯浸去白瓤焙甘草半兩炙微赤銼訶梨勒一兩煨用皮白茯苓半兩右為末煉蜜和丸梧桐子大每服食前粥飲下二十丸忌生冷油膩肉豆䓻丸治脾臟虛冷氣攻心腹脹痛腸鳴肉豆䓻去殼乾薑炮陳橘皮湯浸去白焙半夏湯洗去滑七遍焙桂去粗皮吳茱茰湯浸焙乾炒厚朴去粗皮生薑汁炙烏頭炮裂去皮臍白茯苓去黑皮各半兩右為末棗肉丸梧桐子大食前生薑醋湯下十五丸補脾散治脾臟冷氣腹內虛鳴泄㵼及食氣塊憎寒壯熱日漸羸瘦木香半兩草豆蔲白麵裹慢火煨令焦去皮並麵陳橘皮湯浸去白焙蘹香子炒厚朴去粗皮生汁炙乾薑炮荆三稜炮各一兩陳麴炒大麥蘖炒各二兩右搗羅為散食前炒生薑鹽湯調下二錢赤茯苓散治脾臟冷氣胸膈不利腹內虛鳴少思飲食赤茯苓三錢桔梗三錢去蘆頭白术三錢吳茱茰一錢湯浸七遍焙乾微炒檳榔木香沉香各半兩當歸半兩銼微炒枳實一錢麩炒微黃右為散每服三錢水一中盞生薑半分棗三枚煎六分去滓食前稍熱服忌生冷油膩白术丸白术三兩生薑二兩同搗令爛慢火炒令黃色桂心半兩檳榔二兩髙良薑一兩銼木香半兩人參一兩去蘆頭阿魏一錢麵裹煨令麵熟為度吳茱茰半兩湯浸七遍焙乾微炒陳橘皮三錢湯浸去白瓤焙右為末煎醋浸蒸餅和丸梧桐子大每服食前生薑橘皮湯下吳茱茰出聖惠方治脾臟冷氣積滯醋心嘔逆宿食不消腹臟虛鳴時時疼痛吳茱茰半兩湯浸七遍焙乾微炒神麴一兩焙令微黃陳橘皮二兩湯浸去白瓤焙白术一兩人參一兩去蘆頭桂心一兩熟乾地黃一兩乾薑半兩焙裂銼訶梨勒一兩煨用皮右為末鍊蜜和丸梧桐子大每服食前粥飲下二十丸忌生冷趂氣丸治脾虛冷氣腹脹滿虛鳴腰腿疼重刺痛胡椒炒一百粒木香三錢檳榔一枚銼蠍稍炒二錢阿魏醋化去砂入藥陳橘皮湯浸去白焙各一兩肉豆䓻去殼二枚萊蔔子炒一分右為末生薑自然汁煮麵糊丸豌豆大每服二十丸溫酒或陳橘皮湯下不拘時草豆䓻丸治脾胃久冷氣攻心腹脹鳴腸滿痰逆惡心草豆䓻炮去皮乾薑炮桂去粗皮各一兩半訶梨勒煨取皮甘草炙銼白茯苓去黑皮人參各一兩右為末煉蜜丸梧桐子大溫酒下二十丸人參散治脾臟冷氣腹腸虛鳴飲食不化泄㵼不止人參訶梨勒皮各三錢枳殼去瓤麩炒檳榔銼各四錢陳橘皮湯浸去白焙丁香各半兩木香一右為散每服二錢匕用薑米飲調下空心服丁香丸治脾臟冷氣心腹痛脹悶胸膈不利嘔逆腹內虛鳴丁香蘹香子炒桂去粗皮陳橘皮湯浸去白焙甘草炙銼胡椒等分右為末鍊密丸櫻桃大每服一丸生薑鹽湯嚼下太白湯治脾虛冷腹中雷鳴附子炮裂去皮臍二兩青橘皮湯浸去白焙一兩乾薑炮蘹香子炒木香炮各半兩右㕮咀如麻豆每服三錢匕水一盞入生薑二片棗一枚擘破煎七分去滓溫服不拘時溫脾丸治脾臟冷氣腹內虛鳴髙良薑一兩附子炮裂去皮臍乾薑炮胡椒炒各半兩右為末鍊密丸梧桐子大每服二十丸生薑橘皮或米飲下不拘時脾氣虛腹脹滿夫脾受水榖之精化為血氣飬於臟腑充於肌膚若其氣不榮則不能與胃行其津液周養身形致體重懈墮四肢不舉腹脅虛脹胸滿咽乾不能嗜食縱食如嘔水榖不化泄利腸鳴則是脾氣不足之候也方京三稜鱉甲丸治脾胃久冷心腹脹滿宿食不消時作嘔逆日漸羸瘦兼癖瘕氣塊等疾京三稜炮銼鱉甲去裙襴醋炙黃耆銼焙白术各一兩半乾薑炮厚朴去粗皮塗生薑汁炙熟二兩訶梨勒皮吳茱茰湯浸焙枳殼去瓤麩炒橘皮湯浸去瓤焙乾桔梗炒麥蘖炒陳麴乾地黃焙桂去粗皮檳榔銼木香當歸切焙甘草炙銼人參白茯苓去黑皮各一兩右為末煉密丸梧桐子大空心米飲下三十丸加至四十丸溫酒下大腹木香湯治脾氣虛弱心腹脹滿嘔痰逆胸膈不利腹脅刺痛不思飲食大腹皮銼木香各兩前胡去蘆肉豆䓻去殼人參白茯苓去黑皮各半兩乾薑炮京三稜炮銼各一兩半青橘皮湯浸去白焙半夏湯浸七遍去滑各半兩訶梨勒炮去核各半兩厚朴去粗皮生薑汁炙一兩陳橘皮微炒一兩肉桂去粗皮大麥蘖微炒各半兩右搗篩每服三錢匕水一盞生薑三片棗二枚去核煎七分去滓稍熱食前服小沉香丸治脾氣虛弱中脘痞悶脅肋脹滿心腹刺痛嘔逆痰涎不思飲食沉香丁香木香枳殼去瓤麩炒人參赤茯苓去黑皮雲藍根玄參焙各一兩訶梨勒去核白豆冦去殼肉豆冦去殼丁香皮銼桂去粗皮麝香研各半兩白术四兩右為末煉密丸梧桐子大每服二十丸煎棗湯下米飲白术散出聖惠方治脾氣不足心腹脹滿不欲飲食若食則氣滯體重四肢無力白术一兩訶梨勒二兩煨用皮麥蘖三錢微炒人參一兩去蘆頭丁香三錢草豆冦三錢去皮沉香三錢陳橘皮三錢湯浸去白瓤微炒木香三錢枳實半兩麩炒微黃甘草半兩炙令赤銼黃耆三銼附子三錢炮去皮臍白茯苓三錢蓽澄茄一兩右為散每服三錢水一中盞入生薑半分棗三枚煎六分去滓不計時溫服忌生冷油膩濕麵蓽澄茄煮散治脾臟虛弱冷氣不和心胸不快腹肋膨脹氣刺氣痛不思飲食面黃口淡及治中酒蓽澄茄炒半兩丁香皮炙銼二兩髙良薑一兩厚朴去粗皮汁炙一兩京三稜炮搗熱陳橘皮湯浸去白焙甘草炙銼蘹香子炒桂去粗皮各一兩香附子焙一兩桔梗炒一兩白鹽炒研十二兩阿魏棗子大一塊麵裹煨熟去麵另研右搗研為散再同和勻每服二錢七入生薑二片水一小盞煎五七沸熱服一方便入木香半兩阿魏如兩皂子大治脾胃桔梗丸治脾胃冷氣腹內雷鳴冷氣入腹中脘痞悶脅肋脹滿飲食不下桔梗炒二兩防風去義禹餘糧醋淬研逺志去心萆薢鹿茸去毛炙橘皮浸去白焙蕪荑紫石英研桂去皮乾薑炮各一兩吳茱茰洗焙乾炒甘草炙銼各三分右為末煉蜜丸梧桐子大每服日空心用米飲下二十丸育神湯一名厚朴散出聖惠方治脾氣虛弱腹脅膨脹喫食不消面色萎黃四肢少力弱厚朴去粗皮生薑炙二兩丁香半兩白术各一兩木香半兩當歸切焙人參各一兩半訶梨勒煨去核一兩附子炮裂去皮臍乾薑炮三分桂去皮一兩甘草炙半兩白茯苓去黑皮一兩右為粗搗篩入淨瓷器中收貯每服五錢七水一盞半入生薑半分大棗二枚擘破煎八分去滓食前溫服一方有陳皮忌生冷油膩濕麵粘滑等物㵼脾丸治毒風在脾中流腫脹滿短氣食輒響并不消時時微下當歸三分吳茱茰二分乾薑二分大黃二分狼毒炙一分桂心三分芎藭二分川椒去汗二分白薇一分甘遂煨二分附子炮二分葶藶炒令紫色三分右搗篩蜜丸如梧子每服三丸日三忌豬肉冷水生蔥厚朴散出聖惠方治脾氣不足心腹脹痛喜噫吞酸食則欲嘔四肢少力厚朴一兩去皮生薑汁炙令熟肉桂一兩去皮當歸半兩微炒人參半兩去蘆頭丁香半兩白术半兩白豆寇半兩去皮吳茱茰一分浸七遍炒微黃訶梨勒一兩煨用皮髙良薑半兩陳橘皮半兩湯浸去白瓤微炒右為散每服三錢水一盞生薑半分棗三枚煎六分去滓不計時溫服忌生冷油膩訶梨勒散聖惠方治脾氣不足四肢不和腹脅脹滿或時下利飲食難消訶梨勒三分煨用皮人參一兩去蘆當歸三分微炒白术三分乾薑半兩炮銼桂心三分草豆冦三分去皮甘草半兩炙微赤銼厚朴一兩去皮薑汁炙香熟吳茱茰半兩浸七遍焙乾微炒陳橘皮三分浸去白瓤焙右為散每服三錢水一中盞棗三枚煎三分去滓食前稍熱服之白豆寇丸聖惠方治脾氣不足體重胸滿腹脅虛脹食少無力水榖不消或時自利白豆寇一兩去皮訶梨勒二兩煨用皮黃耆一兩銼沉香一兩附子一兩炮去皮臍白术一兩人參一兩去蘆頭肉桂一兩半去皮木香一兩枳實一兩炒微黃厚朴二兩去皮薑汁炙令香熟右細羅為末酒煮麵糊和丸如梧桐子大每服溫酒下三十丸空心及晚食前服忌生冷油膩黏食紫桂大丸治脾虛冷氣心腹脹痛胸隔滿悶腹脹鳴桂去粗皮蘹香炒白豆䓻仁去皮青橘皮浸去白焙髙良薑附子炮去皮臍各一兩丁香木香甘草炙各半兩胡椒炒一分右為末鍊蜜丸彈子大每服半丸至一丸嚼米飲下溫酒亦得異效散治脾氣虛弱飲食不美心胸膨脹脅肋痞滿噫氣不通滿悶噎塞積滯不消結聚癖瘕京三稜銼浸一宿焙乾白术各三兩甘草炙二兩麥蘖微炒陳麴微炒各一兩髙良薑半兩肉豆冦二枚去殼青橘皮浸去白焙各一兩