每服十五丸食前温酒下日三服治一切男子婦人脾受勞氣减食减力口無滋味肌體消痩面黄大腑不調非時滑泄多困少力精神不足宜服此方若人患勞五臟五行相傳至於脾而後求藥身雖枕簟之間而精神楚越矣藥餌何用哉今為此方但一切患虚冷勞疾之病未有五行相傳之證而忽有此候宜服此方若患脾瘧大腑虚冷亦宜喫之出獲命方藿香黄橘皮草豆䓻人參鱉甲醋炙黄色羌活天靈盖酥炙令焦黑色甘草炙枇杷葉去毛木香搥碎水浸三日日日換水蒸熟焙乾川芎各一分右為細末煉蜜丸梧桐子大早朝空心米湯下三十丸榖勞夫胃受水榖其氣虚弱不能𫝊化則令人怠惰嗜臥肢體煩重腹滿善飢而不能食食已則發榖氣不行使然也故謂之榖勞方沉香湯治榖勞體重食已便臥快氣消食沉香剉一兩白豆蔲去皮草豆䓻去皮炒人參甘草炙剉白茯苓去黒皮半夏湯洗薄切生薑汁拌炒黄色木香各半兩白术炒一兩厚朴去皮薑汁炙一兩陳橘皮浸去白炒三分乾薑炮一分右粗搗篩每服三錢七水一盞生薑三片棗二枚擘破同煎至七分去滓温服空心日午各一服京三稜湯治榖勞體重四肢煩重食已便臥京三稜煨剉五兩陳麯炒麦蘖炒木香㯽榔肉豆䓻去殻炮亁薑炮甘草杏仁浸去皮雙仁麸炒研厚朴去皮薑汁炙各一兩右搗篩每服三錢七水一盞煎至七分不拘時候去滓温服木香湯治榖勞身重少力多困木香陳橘皮去白焙人參陳麯炒甘草炙各三分大棗去核焙五十枚厚朴去皮生汁炙麦蘖炒蓬莪术煨各一兩右搗篩每服三錢匕水一盞煎至八分去滓温服木香湯治榖勞身重食已困倦嗜眠木香人參附子炮裂去皮臍甘草炙白茯苓去黑皮各二兩草豆蔲去皮半兩乾薑炮一分陳麯炒麦蘖炒各一兩右剉如麻豆大每服二錢匕水一盞煎七分去滓服沉香湯治榖勞身重食已好臥困倦嗜眠沉香剉白檀香剉各二兩乾薑炮二錢甘草炙人參白茯苓去黒皮肉豆蔲去殻炮木香各一兩右搗篩每服一錢水一盞煎七分去滓服㯽榔散治榖勞身重四肢少力食已好臥昏憒㯽榔半兩人參白茯苓去黒皮各一兩木香陳橘皮浸去白焙五味子甘草炙各一兩右搗篩羅為細末每服二錢以沸湯㸃服丁香丸治榖勞嗜臥四肢怠惰沉香剉陳橘皮浸去白焙訶梨勒煨熟取皮各一兩木香丁香肉豆蔲去殻炮二兩右為末煉蜜丸彈子大陳米飲或生薑鹽湯嚼下豆􅛌丸治榖勞體重食已好臥白豆蔲去皮一兩半枳殻去瓤麸炒半斤陳橘皮浸去白切炒訶梨勒煨去核肉桂去皮當歸切焙各一兩右為末用漿水煮棗去皮爛研丸如梧桐子大每二十丸薑湯下分氣丸治榖勞嗜臥身體煩重京三稜煨剉蓬莪荗煨剉青橘皮剉用巴豆半兩拍破同炒黄去巴豆不用各一兩胡椒半兩阿魏一兩醋麺作餅炙亁右為末細煮麺糊為丸梧桐子大每服二十丸陳橘皮湯下日三服脾癉夫有病口甘者此五氣之溢也名曰脾癉夫食入於隂長氣於陽肥甘之過令人内熱而中滿則陽氣盛矣故單陽為癉其證口甘乆而弗治轉為消渴以熱氣上溢故也方麥門冬煎治脾癉内熱煩渴生麥門冬汁生地黄汁各半斤括蔞根二兩地骨皮黄耆剉萎𬎼知母淡竹葉切犀角鎊屑升麻各一兩甘草炙半兩石膏碎研凝水石碎研各二兩右除前三味外搗篩以水七升煎取三升出滓次入前三味再以慢火熬如稀餳以瓷合盛每服一匙湯化不拘時竹葉湯治脾癉煩懊口甘咽乾煩渴淡竹葉切一兩柴胡去苖二兩犀角鎊屑芍藥各一兩半黄芩去黑心大黄剉炒各半兩梔子仁七枚右搗篩每五錢七水一盞半煎一盞去滓温服前胡湯治脾癉口甘煩渴不止前胡去蘆頭一兩半赤茯苓去黒皮二兩肉桂去皮三分犀角鎊屑一兩㯽榔三枚剉芍藥一兩右搗篩每服五錢七水一盞半煎一盞去滓温服茯苓湯治脾癉口甘咽亁煩燥赤茯苓去黑皮厚朴去皮生薑汁炙剉各四兩甘草炙剉人參黄芩去黑心各二兩肉桂去粗皮五兩半夏浸七遍五兩右搗篩每服五錢水一盞半煎七分去滓生薑三片煎葛根湯治脾癉面黄口甘煩渴不止葛根剉二兩半麻黄去根節一兩肉桂去皮三分石膏碎三兩芍藥一兩一分甘草炙一分右搗篩每服三錢水一盞煎七分去滓服麥門冬湯治脾癉發黄口甘煩渴麥門冬去心生用三兩芍藥黄芩去黑心各一兩半梔子仁五枚石膏碎三兩犀角鎊一兩右搗篩每服五錢七水一盞半煎一盞去滓入朴硝半錢服赤芍藥湯治脾癉藏熱唇焦口氣引飲不止赤芍藥生亁地黄大黄剉炒甘草炙各半兩右搗篩每服二錢水一盞煎七分食後服三和飲子治脾癉煩渴生薑半兩研取汁糯米半合泡研蜜一合右相合和分為五服以新水一盞調下不拘時蘭草湯治脾癉口甘中滿用蘭草一兩切以水三盞煎取一盞半去滓分温三服羚羊角丸治脾癉口甘内熱中滿方見本門脾癉實熱類肉極夫凡肉極者主脾也脾應肉肉與脾合若脾合若脾病則肉變色又曰至隂遇病為肌痺肌痺不已復感于邪内舎於脾體滛滛如䑕走其身津液脱腠理開大泄鼻上色黄是其相也凡風氣藏於皮膚肉色則敗已季夏戊日得之於傷風為脾風之狀多汗隂動陽寒寒則虚虛則體重怠惰四肢不欲舉不嗜飲食食則欬欬則右脇下痛隂引肩背不可以動轉名曰厲風裏虛外實若陽動傷熱熱則實實則身上如有鼠走唇口壊皮膚變色身體津液脱腠理開汗大泄名曰惡風而煩决其綱紀其終始隂陽動静肉之虛實實則泄之虛則補之善療病者風始入肉皮毛肌膚筋脉之間即湏决之若入六腑五臓則半生半死扁鵲曰肉絶不療五日死何以知之皮膚不通外不得泄肉應太隂足太隂氣絶則脉不榮其唇口口唇者肌肉之本也脉不榮則肌肉濡肌肉濡則人中滿人中滿則唇反唇反則肉先死甲篤乙死木勝土是也若使良醫妙藥終不可療肉虛者坐不安席身危變動肉實坐席不動喘氣肉虚實之應主於脾若其腑臓有病從肉生熱則應臓實則應腑方大黄茋湯治肉極虚體重怠惰四肢不欲舉闗節疼痛不嗜飲食食則欬欬則右脇下痛隂引背及肩不可轉動黄茋桂心巴㦸去心石斛酒浸澤㵼茯苓乾薑炮各三兩防風獨活人參各二兩天雄炮去皮臍芍藥附子炮去皮臍半夏浸七次細辛去苖白术黄芩括蔞根各一兩右剉為散每服四錢水二盞生薑七片煎七分去滓食前服黄耆丸治肉極虚冷寒為癉風體重怠惰四肢不欲舉闗節疼痛不嗜飲食黄耆二兩剉巴㦸二兩桂心一兩乾薑一兩炮裂剉澤㵼一兩白茯苓一兩柏子仁一兩石斛一兩去根剉獨活二兩白芍藥一兩山茱茰一兩天雄一兩炮裂去皮臍半夏一兩浸七遍去滑細辛半兩白术一兩右為末煉蜜和丸梧桐子大每服空心食前酒下三十丸石楠散治肉實極肌滛滛如䑕走津液脱腠開汗大泄或不仁四肢急痛或腹緩弱唇口壊破皮膚變色石楠一兩一分天雄炮去皮臍山藥芍藥桃仁製炒去皮亁菊花甘草炙各一兩升麻萎𬎼各一兩黄茋辰砂别研各三分石膏煆二兩山茱茰一兩三分右為細末每服二大錢食前温服調下一方桃仁作桃花辰砂作真珠無芍藥忌猪肉海藻菘菜一方無甘草枸杞湯治肉極虚寒氣所加體重怠惰四肢不舉肢節疼痛飲食减少坐臥不安枸把黄耆剉炒附子炮裂去皮臍各二兩芎藭人參芍藥白茯神去木甘草炙剉羌活去蘆頭肉桂去粗皮各二兩防風去叉三分半夏浸七次去滑一兩半右㕮咀每服五錢水一盞半生薑五片煎八分去滓服獨活湯治肉極皮膚不通表實裏虚外不得泄腰膝疼痛獨活一兩當歸兩半白茯苓去黑皮一兩半乾薑炮裂剉人參去蘆黄耆剉防風去蘆甘草炙㣲麻黄去根節牛膝去苖各一兩桂心附子炮裂各兩半右為散每服四錢一盞大豆半合煎五分去滓食後服半夏湯治肉極虚寒則脇下隂隂引背痛或動則欬𠻳腹滿留飲痰癖大便不利小腹切痛膈上有寒宜服半夏一兩浸七次去滑白术一兩赤茯苓一兩人參三分去蘆甘草半兩炙㣲赤剉附子三分炮裂去皮陳橘皮三分浸去白瓤焙桂心三分木香三分大腹皮一兩剉訶梨勒一兩半煨用皮前胡二分去蘆頭右為散每服三錢水一中盞入生薑半分棗三枚煎六分去滓食前服茯苓散治肉極坐臥不安寒氣所加體重怠惰四肢不舉闗節疼痛飲食無味白茯苓二兩黄耆二兩剉白芍藥白术石斛一兩去根牛膝一兩去苖附子二兩炮去皮人參去蘆一兩當歸沉香桂心芎藭各一兩右為散每服三錢水一中盞入生薑煎六分去滓食前服石斛散治肉極身體津液水泄為厲風若下焦虚極則脚膝緩弱並宜服石斛一兩半去根剉牛膝一兩半去苖五加皮白术山茱茰各二兩天麻一兩半甘草炙㣲赤剉桂心附子炮裂去皮薏苡仁獨活防風去蘆頭各一兩右為末每服三錢水一中盞入生薑半分棗三枚煎六分去滓食前服防風散治肉極肌肉變防風去蘆獨活白茯苓各一兩半人參去蘆乾薑炮裂剉五加皮甘草炙㣲赤剉當歸桂心芎藭各兩附子半兩炮裂去皮臍右搗羅為散每服四錢七用水酒各半盞煎六分去滓食前服石楠散治肉極則身上如䑕走或痺唇口坼皮膚色變宜服石楠二兩半薯蕷黄耆剉山茱茰各二兩天雄炮去皮臍桃花各半兩獨活薏苡仁丹參各一兩川升麻三分甘草半兩炙㣲赤剉右為散食前以温酒調之二錢服下人參丸治肉極四肢急强脇肋背心下滿痛飲食不多手足不舉憂恚思慮宜服人參二兩去蘆頭附子三分炮裂去皮臍逺志半兩去心白术茯神桂心川椒去目及閉口者㣲炒去汗細辛各一兩乾薑二分炮裂剉麥門冬一兩半去心焙甘草一兩炙㣲赤剉右為末煉蜜和丸如梧桐子大食前酒下三十丸薏苡仁散治肉實極肌膚滛滛如䑕走津液開洩或麻痺不仁四肢肌痛薏苡仁石膏煆川芎桂心不見火防風去蘆漢防已羚羊角鎊赤芍藥杏仁去皮尖炒甘草炙各等分右㕮咀每四錢水盞半薑五片煎八分去滓温服半夏湯治肉極虚體重脇引肩背不可動動則欬𠻳脹滿留飲痰癖大便不利半夏湯浸七次白术茯苓去皮人參橘皮去白附子炮去皮臍木香不見火大腹皮甘草炙各等分右㕮咀每四錢水盞半薑五片煎七分去滓温服不拘時續命湯治肉極熱膚滛滛如䑕走津液開泄汗出或痺不仁四肢急痛麻黄去根節兩半當歸剉炒石膏剉各一兩桂去皮甘草炙剉黄芩去黑心防風去苗芍藥各半兩杏仁去皮尖及雙仁研十五枚芎藭半兩右除杏仁外搗篩和勻每服五錢水盞半薑一分拍碎煎一盞去滓空心温服日晩再服人參丸治肉極虚寒四肢怠惰欬引脅心下滿痛手足厥冷不嗜食人參一兩一分附子炮去皮臍三分乾薑炮三分逺志去心半兩麥門冬去心焙三分蜀椒去目并閉口者炒出汗一兩一分桂心五分甘草炙剉三分細心去苖葉半兩右為散煉蜜丸如彈子大每一丸含化細細嚥下覺胸中熱藥再服麻黄湯治肉熱肌痺滛滛如䑕走身上津液脱腠理開汗大泄為痺風風氣客於皮膚肉色變變則鼻見黄色宜止汗通肉觧風痺麻黄去根節枳實去瓤麩炒防風一作防己白术細辛去苖葉一兩石膏碎四兩附子炮裂去皮臍二兩甘草炙剉肉桂去皮各一兩右如麻豆每五錢七水一盞半生薑一分碎煎一盞去滓空心服日午夜臥再服小風湯療肉極寒肌肉變舌痿名曰惡風腰脚疼弱獨活防風茯苓甘草炙人參各三兩當歸乾薑各二兩附子一枚炮大豆二升熬去皮右以水一斗酒三升煮取二升去滓分四服日三夜一忌冷油物半夏湯治肉極寒虛脾右脇下痛隂隂引肩背痛不可以動動則欬脾脹滿留飲癉癖大小便不利小腹切痛膈上寒半夏三兩白术赤茯苓人參甘草附子陳橘皮各一兩桂一兩半右搗篩每服五錢七水一盞半入生薑半分碎煎一盞去滓温分二服半夏湯治肉極實坐席安不能動作喘氣主脾病熱氣所加闗格發喘半夏宿薑各八兩杏仁五兩細辛橘皮各四兩麻黄一兩石膏七兩射干二兩右㕮咀水九升煮三升分三服湏利下芒硝三兩越婢湯治肉極熱身體津液脱腠理開汗大泄下焦痿弱麻黄三分石膏三兩碎甘草一兩附子一兩炮去皮臍右剉如麻豆每服五錢七水盞半分拍碎棗二枚劈破煎一盞去滓空服日午夜臥温一方有白术普濟方卷二十一
