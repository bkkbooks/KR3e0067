body:
  text: 普濟方卷二十一明周王朱橚撰脾臟門脾臓冷氣腹内虚鳴夫脾為中州腐化水榖禆諸臓腑若脾虚冷氣與正氣相擊則令腹内虚鳴甚則腹痛不利食不能化内經所謂暴氣不能雷者以陽氣不足隂氣有餘邪冷之氣入在臓流走徃来故令腹内虚鳴也方陳橘皮湯治脾虚冷邪正氣相擊摶腹虚鳴兼治隂陽二毒傷寒陳橘皮湯浸去白麸炒桂去粗皮甘草炙剉乾薑炮白术枳殻去瓤麸炒人参白茯苓去黒皮厚朴去粗皮生薑汁塗炙半夏湯浸七遍去滑麸炒各一两訶梨勒五枚煨去核草豆蔲二枚去皮㯽榔二枚剉附子炮裂去皮臍沉香剉木香各一两右剉如麻豆大每服三錢水一盞生薑三片棗三枚擘破煎六分去滓熱服脾㵼氣痛服之神妙傷寒併二服烏頭丸治脾臓冷氣腹内虚鳴四肢多冷心腹疼痛草烏頭去皮尖取末一两芫花一錢醋炒黄别杵為末二味用醋一升熬成稠膏刮去桂去粗皮乾薑炮㯽榔剉青橘皮湯浸去白焙肉豆䓻仁天雄炮裂去皮臍當歸去焙烏頭炮裂去皮臍胡椒炒藿香葉紅豆䓻丁香各三錢右除二味熬膏外搗羅為末入前膏和劑如硬入蜜少許丸梧桐子大每服十五丸生薑湯或米湯橘皮湯下病已即止橘皮煮散出王氏慱濟方治脾藏冷氣不和腹内雷鳴膨脹刺痛及觧傷寒陳橘皮湯浸去白焙白术各二两訶梨勒炮去核枳殻去瓤麸炒乾薑炮桂去粗皮木香人参甘草炙各一两㯽榔五枚剉草豆蔲去皮七枚半夏湯浸七遍三錢厚朴去粗皮生薑汁炙各一两半右搗為粗散每服三錢七水一盞入生薑三片棗二枚擘破煎七分去滓食前温服益智煮散治脾臟冷氣腸鳴相逐飲食無味補虚益智去皮烏藥剉桂去粗皮天仙藤各一两莎草根炒陳橘皮湯浸去白焙甘草炒各二两乾薑炮木香芎藭白术丁香各半两人参一錢右搗為粗散每服三錢匕水一盞入生薑三片棗二枚擘破煎六分去滓温服食前桔梗散出聖惠方治脾臓久積冷氣流動腹虚鳴兩脇脹滿少思飲食桔梗一两去蘆頭木香一两丹参一两去蘆頭白豆蔲三分去皮附子三分炮裂去皮臍髙良薑三分剉木香三分沉香三分㯽榔三分訶梨勒一两半用皮陳橘皮半两湯浸去白瓤㣲炒右為散每服三錢水一盞入生薑半分煎六分去滓食前稍熱服訶梨勒丸出聖惠方治脾臟冷氣腹内虚鳴胷膈氣滯不能飲食雖食不消頻嘔逆訶梨勒一两半煨用皮赤茯苓一两吳茱茰半两湯浸七遍焙亁㣲炒白术一两桂心三分人参一两去蘆頭桔梗半两去蘆頭陳橘皮一两湯浸去白瓤焙紅豆䓻一两去皮乾薑半两炮裂剉厚朴一两去粗皮塗生薑汁炙黄香熟右為末煉蜜和丸梧桐子大每服不計時生薑湯下二十丸厚朴湯治脾臟虚冷腹脹腸鳴疼痛泄㵼飲食不化厚朴去粗皮生薑汁炙白茯苓去黒皮人参草豆䓻去皮陳橘皮湯浸去白瓤焙各三錢桂去粗皮半夏湯浸去滑生薑汁裂木香炒枳殻去瓤麸炒各半两右搗篩粗末每服四錢七水一盞半薑三片棗一枚擘破同煎至七分去滓食前温服厚朴丸治脾臟冷氣腹内虛鳴内寒外熱宿食不消大便乍秘乍洩腑臓不調少思飲食厚朴一两半去粗皮塗生姜汁炙令香熟白术半两乾薑半两炮裂剉桔梗一两去蘆頭當歸一两剉㣲炒㯽榔半两陳橘皮半两湯浸去白瓤焙甘草半两炙㣲赤剉訶梨勒一两煨用皮白茯苓半两右為末煉蜜和丸梧桐子大每服食前粥飲下二十丸忌生冷油膩肉豆䓻丸治脾臟虚冷氣攻心腹脹痛腸鳴肉豆䓻去殻乾薑炮陳橘皮湯浸去白焙半夏湯洗去滑七遍焙桂去粗皮吳茱茰湯浸焙乾炒厚朴去粗皮生薑汁炙烏頭炮裂去皮臍白茯苓去黑皮各半两右為末棗肉丸梧桐子大食前生薑醋湯下十五丸補脾散治脾臓冷氣腹内虚鳴泄㵼及食氣塊憎寒壮熱日漸羸痩木香半两草豆蔲白麵裹慢火煨令焦去皮並麺陳橘皮湯浸去白焙蘹香子炒厚朴去粗皮生汁炙乾薑炮荆三稜炮各一两陳麹炒大麥蘖炒各二两右搗羅為散食前炒生薑鹽湯調下二錢赤茯苓散治脾臓冷氣胷膈不利腹内虚鳴少思飲食赤茯苓三錢桔梗三錢去蘆頭白术三錢吳茱茰一錢湯浸七遍焙亁㣲炒㯽榔木香沉香各半两當歸半两剉㣲炒枳實一錢麸炒㣲黄右為散每服三錢水一中盞生薑半分棗三枚煎六分去滓食前稍熱服忌生冷油膩白术丸白术三两生薑二两同搗令爛慢火炒令黄色桂心半两㯽榔二两髙良薑一两剉木香半两人参一两去蘆頭阿魏一錢麵裹煨令麫熟為度吳茱茰半两湯浸七遍焙乾㣲炒陳橘皮三錢湯浸去白瓤焙右為末煎醋浸蒸餅和丸梧桐子大每服食前生薑橘皮湯下吳茱茰出聖惠方治脾臟冷氣積滯醋心嘔逆宿食不消腹臓虚鳴時時疼痛呉茱茰半两湯浸七遍焙亁㣲炒神麹一两焙令㣲黄陳橘皮二两湯浸去白瓤焙白术一两人参一两去蘆頭桂心一两熟乾地黄一两乾薑半两焙裂剉訶梨勒一两煨用皮右為末鍊蜜和丸梧桐子大每服食前粥飲下二十丸忌生冷趂氣丸治脾虚冷氣腹脹滿虚鳴腰腿疼重刺痛胡椒炒一百粒木香三錢㯽榔一枚剉蠍稍炒二錢阿魏醋化去砂入藥陳橘皮湯浸去白焙各一两肉豆䓻去殻二枚莱菔子炒一分右為末生薑自然汁煑麺糊丸豌豆大每服二十丸温酒或陳橘皮湯下不拘時草豆䓻丸治脾胃久冷氣攻心腹脹鳴腸滿痰逆惡心草豆䓻炮去皮乾薑炮桂去粗皮各一两半訶梨勒煨取皮甘草炙剉白茯苓去黒皮人参各一两右為末煉蜜丸梧桐子大温酒下二十丸人参散治脾臟冷氣腹腸虛鳴飲食不化泄㵼不止人参訶梨勒皮各三錢枳殻去瓤麸炒㯽榔剉各四錢陳橘皮湯浸去白焙丁香各半两木香一右為散每服二錢匕用薑米飲調下空心服丁香丸治脾臓冷氣心腹痛脹悶胷膈不利嘔逆腹内虚鳴丁香蘹香子炒桂去粗皮陳橘皮湯浸去白焙甘草炙剉胡椒等分右為末鍊宻丸櫻桃大每服一丸生薑鹽湯嚼下太白湯治脾虚冷腹中雷鳴附子炮裂去皮臍二两青橘皮湯浸去白焙一两乾薑炮蘹香子炒木香炮各半两右㕮咀如麻豆毎服三錢匕水一盞入生薑二片棗一枚擘破煎七分去滓温服不拘時温脾丸治脾臓冷氣腹内虚鳴髙良薑一两附子炮裂去皮臍乾薑炮胡椒炒各半两右為末鍊宻丸梧桐子大每服二十丸生薑橘皮或米飲下不拘時脾氣虚腹脹滿夫脾受水榖之精化為血氣飬於臟腑充於肌膚若其氣不榮則不能與胃行其津液周養身形致體重懈墮四肢不舉腹脇虚脹胷滿咽亁不能嗜食縱食如嘔水榖不化洩利腸鳴則是脾氣不足之候也方京三稜鱉甲丸治脾胃久冷心腹脹滿宿食不消時作嘔逆日漸羸痩兼癖瘕氣塊等疾京三稜炮剉鱉甲去裙襴醋炙黄耆剉焙白术各一两半乾薑炮厚朴去粗皮塗生薑汁炙熟二两訶梨勒皮吳茱茰湯浸焙枳殻去瓤麸炒橘皮湯浸去瓤焙乾桔梗炒麦蘖炒陳麹乾地黄焙桂去粗皮㯽榔剉木香當歸切焙甘草炙剉人参白茯苓去黒皮各一两右為末煉宻丸梧桐子大空心米飲下三十丸加至四十丸温酒下大腹木香湯治脾氣虚弱心腹脹滿嘔痰逆胷膈不利腹脇刺痛不思飲食大腹皮剉木香各两前胡去蘆肉豆䓻去殻人参白茯苓去黒皮各半两乾薑炮京三稜炮剉各一两半青橘皮湯浸去白焙半夏湯浸七遍去滑各半两訶梨勒炮去核各半两厚朴去粗皮生薑汁炙一两陳橘皮㣲炒一两肉桂去粗皮大麥蘖㣲炒各半两右搗篩每服三錢匕水一盞生薑三片棗二枚去核煎七分去滓稍熱食前服小沉香丸治脾氣虚弱中脘痞悶脇肋脹滿心腹刺痛嘔逆痰涎不思飲食沉香丁香木香枳殻去瓤麸炒人参赤茯苓去黒皮雲藍根𤣥参焙各一两訶梨勒去核白豆冦去殻肉豆冦去殻丁香皮剉桂去粗皮麝香研各半两白术四两右為末煉宻丸梧桐子大每服二十丸煎棗湯下米飲白术散出聖惠方治脾氣不足心腹脹滿不欲飲食若食則氣滯體重四肢無力白术一两訶梨勒二两煨用皮麦蘖三錢㣲炒人参一两去蘆頭丁香三錢草豆冦三錢去皮沉香三錢陳橘皮三錢湯浸去白瓤㣲炒木香三錢枳實半两麸炒㣲黄甘草半两炙令赤剉黄耆三剉附子三錢炮去皮臍白茯苓三錢蓽澄茄一两右為散每服三錢水一中盞入生薑半分棗三枚煎六分去滓不計時温服忌生冷油膩濕麵蓽澄茄煮散治脾臟虚弱冷氣不和心胷不快腹肋膨脹氣刺氣痛不思飲食面黄口淡及治中酒蓽澄茄炒半两丁香皮炙剉二两髙良薑一两厚朴去粗皮汁炙一两京三稜炮搗熱陳橘皮湯浸去白焙甘草炙剉蘹香子炒桂去粗皮各一两香附子焙一两桔梗炒一两白鹽炒研十二两阿魏棗子大一塊麵裹煨熟去麵另研右搗研為散再同和勻每服二錢七入生薑二片水一小盞煎五七沸熱服一方便入木香半兩阿魏如兩皂子大治脾胃桔梗丸治脾胃冷氣腹内雷鳴冷氣入腹中脘痞悶脇肋脹滿飲食不下桔梗炒二两防風去义禹餘粮醋淬研逺志去心萆薢鹿茸去毛炙橘皮浸去白焙蕪荑紫石英研桂去皮乾薑炮各一两吳茱茰洗焙亁炒甘草炙剉各三分右為末煉蜜丸梧桐子大毎服日空心用米飲下二十丸育神湯一名厚朴散出聖恵方治脾氣虚弱腹脇膨脹喫食不消面色萎黄四肢少力弱厚朴去粗皮生薑炙二两丁香半两白术各一两木香半两當歸切焙人参各一两半訶梨勒煨去核一两附子炮裂去皮臍乾薑炮三分桂去皮一两甘草炙半两白茯苓去黒皮一两右為粗搗篩入净瓷器中收貯每服五錢七水一盞半入生薑半分大棗二枚擘破煎八分去滓食前温服一方有陳皮忌生冷油膩濕麵粘滑等物㵼脾丸治毒風在脾中流腫脹滿短氣食輙響并不消時時㣲下當歸三分吳茱茰二分乾薑二分大黄二分狼毒炙一分桂心三分芎藭二分川椒去汗二分白薇一分甘遂煨二分附子炮二分葶藶炒令紫色三分右搗篩蜜丸如梧子每服三丸日三忌猪肉冷水生葱厚朴散出聖惠方治脾氣不足心腹脹痛喜噫吞酸食則欲嘔四肢少力厚朴一兩去皮生薑汁炙令熟肉桂一兩去皮當歸半两㣲炒人参半两去蘆頭丁香半两白术半两白豆㓂半两去皮呉茱茰一分浸七遍炒㣲黄訶梨勒一两煨用皮髙良薑半两陳橘皮半两湯浸去白瓤㣲炒右為散每服三錢水一盞生薑半分棗三枚煎六分去滓不計時温服忌生冷油膩訶梨勒散聖惠方治脾氣不足四肢不和腹脇脹滿或時下利飲食難消訶梨勒三分煨用皮人参一两去蘆當歸三分㣲炒白术三分乾薑半两炮剉桂心三分草豆冦三分去皮甘草半两炙㣲赤剉厚朴一两去皮薑汁炙香熟呉茱茰半两浸七遍焙亁㣲炒陳橘皮三分浸去白瓤焙右為散每服三錢水一中盞棗三枚煎三分去滓食前稍熱服之白豆㓂丸聖惠方治脾氣不足體重胷滿腹脇虚脹食少無力水榖不消或時自利白豆㓂一两去皮訶梨勒二两煨用皮黄耆一两剉沉香一两附子一两炮去皮臍白术一两人参一两去蘆頭肉桂一两半去皮木香一两枳實一两炒㣲黄厚朴二两去皮姜汁炙令香熟右細羅為末酒煮麵糊和丸如梧桐子大每服温酒下三十丸空心及晚食前服忌生冷油膩黏食紫桂大丸治脾虚冷氣心腹脹痛胷隔滿悶腹脹鳴桂去粗皮蘹香炒白豆䓻仁去皮青橘皮浸去白焙髙良薑附子炮去皮臍各一两丁香木香甘草炙各半两胡椒炒一分右為末鍊蜜丸弹子大每服半丸至一丸嚼米飲下温酒亦得異效散治脾氣虚弱飲食不美心胸膨脹脇肋痞滿噫氣不通滿悶噎塞積滯不消結聚癖瘕京三稜剉浸一宿焙亁白术各三两甘草炙二两麦蘖㣲炒陳麹㣲炒各一两髙良薑半两肉豆冦二枚去殻青橘皮浸去白焙各一两