body:
  text: 普濟方卷三百十明周王朱橚撰折傷門續筋附論被傷絶筋論曰凡肢體為物所傷致筋斷絶不相續須養之方補骨腽肭臍散出聖惠方治筋傷骨損腽肭臍酒炙熟乾地黃焙藝薹子研桑根白皮銼沒藥研當歸銼炒各一兩桂去粗皮半兩右為散每服二錢溫酒下不拘時桂附散出聖惠方治骨折筋斷傷損桂去粗皮附子炮裂去皮臍白殭蠶微炙蒲黃茅根銼古銅醋淬銼末當歸銼炒各一兩右為散不拘時候以溫酒調下二錢益母草煎出聖惠方治被傷折筋益母草汁二升生地黃汁半升白蜜生用二兩右和勻以綿絹濾去滓入銀石器中慢火煎不住手攪候如稀餳以磁合盛每服一匙用溫酒化下不拘時蟹髓方出十便良方治被傷筋絶以蟹髓取甲中并足中者不拘多少略熬內筋斷處帛繫縛即更搗葛根汁飲之一方生搗蟹炒窨良治救急續斷筋法以旋覆草根洗淨土搗量瘡大小傅之日一二易以瘥為度治被傷筋絶出聖濟揔録用葛根汁飲之葛白屑熬令黃傅瘡止血小香膠散出鮑氏方治斷筋用白膠香末傅之治􅀈折續筋骨出本草以牡鼠搗傅之三日一易治療筋骨斷碎疼痛瘀血出草部用栗子生嚼塗瘡上治續筋骨長肉止痛出草部以栁葉煎膏塗之治被破筋斷者以旋覆花根搗汁瀝瘡中仍用滓封瘡上十日五易即斷筋便續此方出蘇景仲家獠奴用旋覆花上等田野人呼為金錢花葉如栁莖細六月開花如小錢大又有近水生似紅藍治折傷續筋骨除風癢用接骨木煎湯浴之接骨木髙三丈許花葉都似陸英水芹輩故一名蒴藋其木輕虛無心斫枝上便生人家亦用之治傷折跌筋骨生肌破血止痛用折傷木味甘鹹平以酒水濃煎汁飲之折傷木生資州資山谷藤生繞木生葉似茵草葉有尖圎八月九月採傷損止痛生肌附論凡肢節為物所傷皮肉破裂久而疼痛不止肌肉不生者以寒冷摶之榮衛不溫津液不養故也方黃耆散出聖惠方治傷折氣血凝滯瘡口不合肌肉不生黃耆銼赤芍藥熟乾地黃切焙當歸切焙桂去粗皮各一兩乾薑一分炮木通銼續斷銼各半兩附子一枚去臍炮裂右為散每服二錢溫酒調下不拘時服黃耆膏出聖濟揔録治一切損傷止痛生肌黃耆銼當歸切焙附子炮裂去皮臍白芷芎藭續斷細辛去苗葉薤白細切各一兩豬脂切一斤右除豬脂外搗碎以酒半升拌一宿焙乾次日先煎脂沸下諸藥候色變去滓以盒盛之不拘多少塗所傷處尋痛丸出危氏方止痛清心行氣和血如神草烏去皮尖生用乳香火尉沒藥火尉五靈脂各三兩生麝香少許右為末酒糊丸如指頭大硃砂五錢研為衣每服一圓薄荷生薑研汁磨化止痛黑神散出聖惠方乾瘡止痛生肌長肉亂髮二團如雞子大燒煙盡露蜂房三分燒煙盡膩粉一分突厥白三分為末臘月豬脂一兩右研細用豬脂和勻以栁木箆子塗於瘡上長肉散出聖惠方治從髙墜損有瘡口止痛乾瘡黃連去鬚檳榔木香蜜陀僧細研各一兩麒麟竭半兩右為末於瘡口撲之紫檀香傅方出聖惠方治傷折肉破瘡口不合止痛生肌紫檀香銼山芋鉛丹研各二兩馬齒莧十兩細切暴乾右除鉛丹外為末再和研勻每用隨瘡大小傅之一方有紫藤香檳榔散出聖惠方治傷損瘡口不合止痛生肌檳榔生銼黃連去鬚木香各一兩龍骨煅過半兩一方無右為散隨瘡大小敷之麒麟竭散出聖惠方治傷損皮破成瘡肌肉不生疼痛麒麟竭一兩生人牙齒火煨過蜜陀僧煅過半兩右為細散隨瘡口大小傅之止血散出聖惠方乾瘡止痛生肌長肉及金瘡麒麟竭三兩為末炒令紫色雞子十枚取白和風化石灰為三團入炭火內燒令紅色取出於地上出火毒一宿風化石灰十兩研細用小便浸三日三夜後濾出曬乾為末右為極細末旋旋糝於瘡上又方出聖惠方石灰三兩鹽銅青各一兩半右搗細入砂瓶內以泥固濟瓶四畔候乾以十斤炭火煅半日取出埋地內三日出火毒後為末敷瘡上生肌肉乾瘡口療墮損骨肉苦痛不可忍以故馬氊兩段其氊須故膩者於鐺中以酒五六斤著一抄鹽煮令熱即納氊於當中看氊熱便用裹所損處冷即易之勿令久熱傷肉如是三五遍痛定即止仍服止痛藥即漸瘥止血生肌方用􅀢菜搗汁人及禽獸有傷折敷之良立愈打撲傷損附論凡打撲損傷或為他物所擊或乘髙墜下致傷手足腰背等處輕者氣血凝滯隨處疼痛重則聚為焮腫痛甚不可忍當察其內外輕重以治之折傷者謂其有所傷於身體者也或為刀斧所刃或墜墮地打撲身體皆能使出血不止又恐瘀血停積于臟腑結而不散去之不蚤恐有入破攻心之患治療之法須外用敷貼之藥散其血止其痛內則用花蘂石散之類化利其血然後徐徐調理生肌或因折傷而停鬱其氣又當順之方紫金皮丸紫金皮醋炒劉寄奴川當歸煨鹽水炒香白芷醋炒加減赤芍藥白芍藥米泔炒加減黑牽牛生地黃鹽煨浸炒川芎米水浸川牛膝茶水炒乳香可加減沒藥可加減破故紙錯炒木通去節木香茶水炒自然銅骨不碎折不用臨好時用藿香木賊官桂可加減羌活獨活半夏五錢水炒無痰不用骨碎補草烏醋炒孕婦不用川烏火煨孕婦則不用各一兩金刃傷銼出臼者去自然銅骨碎補折者用之然須於此方內且去自然銅臨欲好時却入用之服成他疾右先擇出自然銅官桂沒藥乳香不炒者其餘藥或炒或火焙或日晒乾皆可然後入不炒四味同研為末用蜜糊丸如彈子大以黃丹為衣或被攧撲損傷金刃箭鏃不問輕重每服一丸如被金刃傷斷損內重者以薄荷湯或木瓜薑燈心諸湯吞下若攧碎用自然銅其他傷不用用之恐生他疾如骨折損賴痛不止加乳香沒藥白芷川芎各五錢生薑酒下或不作丸為末亦可或加土當歸熟地黃鹽水炒杜牛膝茶水炒川芎米水浸炒一方若筋斷加入續斷五錢清心藥方降真香香白芷醋炒蘇木鹽水炒枳殼水浸去瓤藿香清油炒丁皮鹽水炒紫金皮丁香米泔水炒木香茶水炒木通去節山梔子大黃沈香蓮子酒煮人參當歸濕紙煨川芎煨羌活獨活花蘂石醋炮烏頭燈心少許赤芍藥各等分右為細末或大小腸不通服此亦可用五隔寬中散同服立效或惡血污心或煩悶暴死每服二錢薄荷湯或燈心湯調下或童子小便尤好為散水煎服亦可如痰血口中出可加半夏定痛沒藥散治一切打撲傷損筋骨疼痛蒼术一斤刮去黑皮炒紫色桂去粗皮熟乾地黃焙乾沒藥甘草炙微赤銼蒲黃各一兩右為細末每服二錢溫酒一盞調下不拘時候日二服活血丸治患者血脈不和筋急行步不可服之寬筋乾地黃酒煮二兩當歸煨白芍藥續斷麵水炒白术煨川芎醋炒各一兩右為細末麵糊丸如梧桐子大每服三十丸溫酒下石斛丸治打撲損傷後止疼痛補虛損石斛去根牛膝去苗杜仲去皺皮炙微黃銼肉從蓉酒浸一宿刮去皺皮炙乾附子炮裂去皮臍桂心木香牡丹皮黃耆銼熟乾地黃各三分狗脊去毛川萆薢銼羌活人參去蘆頭山茱萸各三分鹿茸去毛塗酥炙微黃防風去蘆芎藭檳榔一兩半右為末鍊蜜丸如梧桐子大每服三十丸溫酒送下日三服附子散治閃肭打撲傷損疼痛不可忍附子炮裂去皮臍敗龜醋炙去裙欄虎腦骨酥炙粟楔千金藤補骨脂白芷骨碎補去毛炒自然銅煅三遍醋淬續斷赤芍藥當歸切各一兩牛膝酒浸一宿焙桂去皮烏藥各半兩沒藥乳香研各一分右為細末每服二錢蘇枋木酒調日進三五服紫金皮散出鮑氏方治一切打撲損傷金刃箭鏃浮腫紫金皮醋炒天南星半夏黃柏鹽水炒草烏炮川烏炮川芎川當歸煨杜當歸烏藥川白芷鹽水炒破故紙劉寄奴桑白皮川牛膝各等分右為末生薑薄荷汁兼水調糊腫處皮熱甚加黃柏皮生地黃五錢有瘡口者勿封其口四畔用此糊之紫金散出醫方大成治打撲傷折內損肺肝嘔血不止或有瘀血停積於內心腹脹悶降真香續斷補骨脂各一兩紫金藤皮二兩琥珀别研蒲黃牛膝酒浸一夕無名異燒紅酒焠七次當歸焙桃仁去皮尖炒各一兩大黃紙裹煨朴硝别研各一兩半右為末每服三錢濃煎蘇木當歸酒調下併進三服利即安乳香黃茋散治打撲傷損筋骨及瘡腫焮作疼痛乳香五錢另研沒藥五錢别研黃茋當歸酒浸赤芍藥川芎甘草麻黃陳皮各一兩人參去蘆一兩栗殼去頂蒂蜜水炒二兩右㕮咀白水煎病上食後服病下食前服乳香消毒散出御藥院方治一切傷折蹉跌焮腫疼痛不可忍者乳香另研沒藥另研白斂白芍藥各一兩白芥子當歸滑石二兩黃蘗另研細末三兩黃丹三錢如加血竭另研半兩右為細末入另研者一處再研勻每用新水調如稠膏攤在紙花上貼患處接骨膏出聖惠方治一切打撲驢傷馬墜脫臼折骨兼定疼痛續斷一兩桂心去皮附子炮裂去皮臍白及白斂當歸切焙桑根白皮銼獨活去蘆頭黑狗脊骨燒作炭用各一兩黃米炒三合右為末或打撲閃肭及骨折碎用藥末三錢酒半盞白麵二錢生薑自然汁少許同以慢火熬成膏攤帛上貼之三日一換用米沙木箆子綿繩夾縳夏月栁枝子五條夾縳雖緊不妨又方一字散出百一選方治一切打撲傷損筋骨折有人醉亡酒墜懸崖之下昏不醒手臂已折舁歸得此藥遂愈五靈脂另研沒藥别研烏頭去皮臍生用草烏去皮臍生用各四兩地龍乳香各半兩另研麝香半錢别研朱砂三分别研白膠香一兩後四味加減些不用右為細末每一字溫酒調下為丸如梧桐子大加減自少至多服之亦可腰以上損食後服腰以下損食前服覺麻為驗如未加藥麻甚即減昔趙叔恭名公寅以善錘鐵著名其父宰嵊縣日因與族人聚飲超化寺醉亡酒墜懸崖之下亟視之昏不醒人事臂已折舁歸得此藥治之遂愈其後運錘如故叔恭嘗知大寧監云大續筋接骨丹治打撲閃肭筋骨銼者肉蓯蓉川山甲黃丹飛龍骨虎骨炙白及木鱉子仁天靈蓋各半兩寒食麵一兩右為末醋熬為膏攤絹帛上塗折處綿纒竹箆正一日一換效治跌撲傷損乳香沒藥白芍藥烏頭水浸去皮當歸酒浸一宿骨碎補去毛自然銅火煅醋淬七次各一兩川芎生地黃各一兩右為末生薑自然汁和蜜煉熟為丸一兩作四丸酒半盞蘇木汁半盞化藥服雙烏散出朱氏集驗方治諸傷百損如被打破傷損之後時時疼痛雖新被傷後不破皮而肉損者尤宜服之川烏草烏略炮各三錢白芍藥蘇木生乾地黃大黃紅麯當歸半兩麝香少許右為末用酒煮一瓦瓶放冷服如覺痺麻無害但二烏頭生用有力恐其太猛所以用溫火略炮乳香丸出聖濟揔録治打撲損傷疼痛乳香一兩桂去粗皮安息香沒藥各半兩地龍炒補骨脂炒各二兩當歸切焙白脂五靈脂二兩右為末將乳香沒藥安息香三味用酒研如糊和餘藥丸如龍眼大每服一丸酒磨溫服不拘時續骨丸臘月豬脂十兩蠟煉過半斤鉛丹重羅自然銅煅醋淬七次研細蜜陀僧研細各一兩白礬十二兩麒麟竭沒藥乳香丹砂各一兩右新鼎中先鎔脂次下蠟出鼎放冷處入蜜陀僧鉛丹自然銅緩火再煎滴入水中不散更出鼎放冷處下諸藥用栁箆攪勻㵼水入磁盆內不住手攪至凝丸如彈子大且用笋皮之類襯之冷收凡折傷用一丸入少油火上化開塗傷處以油單護之甚者以燈心裹木夾之更取正已骨折者兩上便安牙疼甚者貼之即止沒藥降聖丹出醫方大成治打撲閃肭筋斷骨折攣急疼痛不能屈伸及榮衛虛弱外受遊風內傷經絡筋骨緩縱皮肉刺痛肩背拘急身體倦怠四肢少力並皆治之自然銅火煅醋淬十二次研細水飛過焙川烏頭生去皮臍骨碎補去毛白芍藥沒藥研乳香别研當歸焙炒一兩生乾地黃川芎各一兩半右並生用為末以生薑自然汁與蜜等分煉熟和丸每一兩作四丸每服一丸捶碎水酒各半盞入蘇木少許同煎至八分去蘇木熱服一丸空心食前定痛丸出宣明論治打撲傷損筋骨疼痛如骨損者先用竹夾正骨定後用好酒下麻黃三錢然後服此藥大效乳香一分蒴藋根白皮乾川椒當歸沒藥赤芍藥川芎自然銅以上各半兩右為末鎔蠟為丸如彈子大細嚼酒下一丸骨碎者先用竹夾夾定三五日依舊小可與服乳香定痛散出醫方大成治打撲傷損落馬墜車一切疼痛乳香沒藥川芎白芷芍藥甘草牡丹皮生地黃右為細末每服二錢酒并童子小便調下不拘時候如聖散出百一選方治打撲傷損筋斷骨折接骨定痛良薑吳茱萸金毛狗脊去皮木鱉子去殼白膠香别研敗龜醋蘸炙黃牛膝當歸各半兩右為細末入麵同藥末酒熬成膏子敷貼用紙七重封繫定筋骨自然相連七日一換酒麵皆不可多用以麵熟為度熬過恐乏力沒藥四生丸治打撲閃肭損傷筋骨疼痛及寒熱濕骨痛防風當歸焙川烏炮去皮臍萆薢細切自然銅醋淬七次骨碎補去毛各半兩乳香沒藥各一分右為細末醋糊為丸如小豆大每服二十丸溫酒下食前日進二服延胡索散出聖濟總録治打撲傷損疼痛筋骨未合肌肉未生延胡索桂去粗皮沒藥别研乳香各一分當歸切焙白斂桑上寄生生熟乾地黃各一兩黃耆銼一兩右為散每服三錢溫酒調下不拘時候煎服亦可乳香散出聖濟總録治傷損血入口四肢疼痛不可忍乳香研白芷桂去粗皮沒藥研安息香研地龍去土炒補骨脂炒當歸炙半兩右為散熱酒調下二錢封裹虎骨膏治傷折虎骨連項鎖一穿鯪鯉甲連項鎖骨一穿敗龜背骨一枚以上五味燒成灰研為極細淨末日炙沙二兩雨後地卷皮是也淨者火煅花乳石二兩煅令化狗頭骨一枚雄雀糞尖者炒一兩右為細末每用一大匙醋煮粟米入藥乘熱攪勻攤在帛子上裹痛處如是痛定一日一度洗換新藥接骨桂藝膏治打撲筋骨傷折疼痛不可忍桂去粗皮藝薹子研白芥子研木鱉子去殼研大黃銼敗龜甲酥塗炙赤狗腦骨燒灰各一兩右為末每用小黃米粥於布上攤勻摻藥一匙頭在上於損處裹之以竹片夾定用繩子縛一復時解去換藥沒藥乳香散出醫方大成治打撲傷損疼痛不可忍白术銼微炒五兩當歸切焙甘草銼炒沒藥别研白芷各二斤桂去粗皮乳香别研各一兩右為細末入研藥再研令勻每服二錢溫酒一盞調下不拘時候日進二三服乳香丸治打撲傷損或從髙墜下跌撲傷損及臂虛寒濕摶於骨節之間疼痛不可忍者並皆治之乳香蒼术五兩去黑皮炒天仙子炒黑澤烏頭三兩生去皮臍自然銅醋淬七次黑牽牛微炒官桂去粗皮以上四味三兩二錢半右為細末水麵糊為丸如梧桐子每服十丸至十五丸食前空心溫酒送下五傷接骨丸一名沒藥散治打撲內損筋骨疼痛及治一切傷折驢馬傷墜沒藥乳香芍藥川椒去子及閉口者川芎當歸各半兩自然銅二錢半炭火燒右為末用黃蠟二兩鎔開入藥末不住手攪勻如法丸彈子大每服一丸用好酒煎開乘熱服之隨痛處卧霎時連進有效治打撲傷損骨頭方乳香沒藥各三錢木綿灰一錢黃蘗一錢童子頭髮燒成灰水蛭炒各一兩右為細末每服三錢溫酒調服骨頭碎者再服續斷丸治撲打筋骨疼痛續斷二兩防風去叉黃耆銼各一兩乳香研沒藥研各半兩自然銅煅醋淬七次一兩牛膝酒浸切焙一兩五錢右為末酒煮麵糊丸如梧桐子大每服三十丸用溫酒送下不拘時候服甘松丸治撲打損傷手足筋骨疼痛甘松去土淨黃荆實芥菜子陳者赤蓼花白殭蠶炒檔子螟蛉殼各半兩右為末煉蜜丸如彈子大每服一丸溫酒化下不拘時候治被打繫頭眼青腫方以肥豬肉炙令熱撮上或炙豬肝亦可乳香沒藥散治打撲傷搕損乳香沒藥當歸縮砂仁枳殼用米炒甘草各等分每用白水盞半煎三四沸用溫無灰酒三兩點便服在上食後服在下空心服治打撲傷損苦丁香十個甜瓜蒂是草烏五錢沒藥三錢自然銅半錢青皮二錢右為末每服二錢用溫無灰酒調下服後除黑牛肉蘿蔔二味以鹽食外其一應肉物並忌效神效膏治打撲傷損筋動骨折不問手足腰背並皆治之糯米粉一合飛羅麵一合馬屁勃一碗即灰菰右三味拌勻和於生布上篩用生薑自然汁半碗調却入後項藥牛膠二兩酸米醋一碗右先用醋熬牛皮膠化便入前所調三味藥不住手攪成膏子以磁器盛之每遇磕損以藥膏攤於紙上貼被傷處却用杉木片夾定用厚衣服裹之勿令動三兩日一換若初折者只三次效加味芎藭湯治打撲傷損敗血流入胃腕嘔黑血如豆汁方見本門傷墮致損吐唾出血類治打傷折損一切疼痛及血氣攪刺內傷血聚以麒麟竭為末酒調服之又敷藥方紫金皮蒼术豬牙皂角切焙三兩雞角楓葉骨碎補各等分右為末糊水調糊腫處地黃散治打撲傷損筋骨疼痛熟乾地黃焙當歸切焙各三兩羌活去蘆頭苦參各一兩續斷四兩右為散每服三錢溫酒調下不拘時候海金沙散治打撲內損疼痛海金沙二錢大黃生乳香研沒藥研各二錢麒麟竭一分右為研外羅為散和勻每服二錢乳香溫酒調下不拘時候牡蠣散治打撲傷損疼痛牡蠣一斤半炭火燒紅細研水飛過取一斤鉛粉洛陽者炒黑細研半斤硼砂研乳香研各一兩半右研勻先用醋煮小黃米粥攤紙上用藥末三錢勻摻粥上裹貼患處次用藥末二錢濃煎蘇枋木汁一盞調下不拘時候活血散出三因方治童子婦人內外損傷止諸疼痛接骨和血一切傷折毒蟲咬隂氣入腹消諸水腫血脈不通左右癱瘓熱癡等欲死及腹中有瘀血刺兩脅疼氣築心悶亂婦人乳癰産後敗血灌注四肢積痔痔瘻但是疼痛並冝服之極痛者只一丸輕者只半丸用無灰酒半升乳香一皂子大先磨乳香盡次磨活血丸同放銚子內煎五六沸臨卧時溫服服了就痛處卧如要出汗衣被蓋之即