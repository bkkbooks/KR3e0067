此傅之即不痛遂復舊出醫方大成猴薑不以多少生薑半之右搗爛罨損處用帛包乾即易之又方以胡薑研爛取汁同酒煎服或為末酒調服亦可昔長樂縣一盜因役笞箠身無全膚以此藥傅瘡不數日平復如故治搕損刀抓破出百一選方輕粉一錢軟石膏煅令通紅放地上以去火毒細研半兩右用清麻油調傅止痛不作痕黑神散出百一選方治打撲傷損筋斷骨折接骨黃牛脛骨帶髓者不以前後腳用炭火燒酒盡為度取出用好陳米醋浸於地上盆覆令冷定真器炭火煅紅米醋淬七遍以酥為度右為細末以牛骨末七分定器末三分拌勻如是撲損用好米醋調麯入藥末如稠糊貼損上以紙三重封貼如骨折於紙上更用竹片封扎絹纒不得動若初撲損先以熱酒調服二錢傷在腰下食前日進二服傷在腰上食後服治攧撲傷致筋骨損者出本草用肥皂不以多少搗細入魚膠煎熬成膏紙攤貼妙攧損百節疼痛者一夜愈治打撲傷損皮肉青腫出衛生家寶方老黃茄一個切片焙乾沒藥半兩研右為末每服三錢溫酒調服臨卧時服來日即消治打傷止痛腫赤色半夏南星各等分右為末水調敷貼加官桂硃砂丸出直指方治打撲驚汁血入心竅不能語言以硃砂為細末雄黃豬心生血和丸如麻子大晒乾每服七丸石菖蒲湯棗湯俱可送服天南星貼方出聖濟總録治打撲損傷瘀血熱疼痛天南星一兩黃蘗去粗皮半兩右為末用生薑汁調貼腫疼處烏頭丸出聖濟總録烏頭七個去皮生為末黃狗膽一枚右以膽汁和藥末丸菉豆大每以溫酒一盞下三丸酒須飲令盡奪命丹一名接骨散出朱氏集驗方治打撲傷損微有氣者能治乳香沒藥各一兩右為末和勻每服三錢溫酒調灌連進三五服少刻小便利血乃止又方用真川椒絲瓜纒小藤兒用鹽一撮水二小碗煎至一碗呷在口嗽含之吐出立愈治打撲傷折手足出醫方大成用菉豆粉新鐵銚內炒令紫色用新汲水調稠厚傅損處貼以紙將杉木片縛定立效又方出本草用金櫻子細嚼咽之血止治打傷刀傷血出不止出本草用血竭草炒熱罨傷瘡處治打撲傷損出本草用野柿樹根細杵米醋調開攤痛處治折傷見血出百一選方用槐花不以多少內一半炒焦色煙出却將先者一半拌勻入沙合子中同罨令冷為末飯飲調下仍用極細者敷破處一方用陳槐花入血竭同為末乾糝傅公實之僕忽折足得之於一軍人遂愈芭蕉膏出百一選方用糯米粥攤布帛上以芭蕉根放粥上乘熱裹患處雖時下甚痛即便無事又方出百一選方治一切墜壓攧撲傷損至重困者用無名異三五塊研細入溫酒中調藥服訖溫酒半盞投之傷在頭去枕卧餘皆就所傷卧吳內翰初得此方姪女户限上損腦痛呼試令服之立止又嘗墜馬失腳損腰至重服十餘塊飲酒一二升其病皆愈後以救小人無不效一方用無名異末熱酒服趕下手摩血皆散矣四妙散出永類鈴方治打破跌損內傷骨碎補銼生薑乳香當歸右擂酒熱服接骨加自然銅治打撲搕傷損出百一選方用石榴葉細研罨損處一方用榴皮研又方治打撲傷損以鹽梅捶塗瘡口永無破傷風黑神散蜜和生薑自然汁調敷加官桂尤良又方治攧撲傷損用白芥子為末和童便服之死者復蘇治攧撲腫痛用米粉炒黃為末放地上出火毒氣用醋調罨之腫消痛止即愈滅痕方出經驗良方治打撲有傷䀶瘀血流注以半夏為末用水調塗傷處一宿不起痕又方出危氏方治瘀血流注紫黑或傷䀶上血紫黑用大黃為末以薑汁調塗一夜一次上藥一宿黑者紫二宿紫者即白矣治打傷瘡出本草用老鼠一箇自死臘月者和腸肚劈銼油半斤煎令焦黑用罐收之使時以雞翎惹油傅於瘡上即乾瘥治打搕傷損瘀血腰痛骨疼骨冷出本草以生薑研微暖塗貼心痛酒醋服之治打搕損疼痛出聖惠方用夜合花為末酒調服二錢炒與合歡同治腦骨破及骨折用蔥白細研和蜜厚封損處立瘥治撲損用胡桃肉合破故紙搗篩蜜丸朝服梧桐子大三十丸療壓撲損傷搗肉和酒溫頓服便瘥用陜洛間者治打損折去瘀血出本草用甜瓜葉為末酒服之或搗敷之治一切傷損不可者止血生肌無瘢痕出本草用楊梅核和鹽杵之如泥成挺子竹筒中收遇破即填小可即傅之此藥之功神聖絶妙治墜傷撲損瘀血煩悶出肘后方用蒲東末空心熱酒調下三錢服之即瘥治有中傷因損者腹中瘀血出本草用熱酒調狗膽半箇服之瘀血盡下治一切傷折出肘后方用寒食蒸餅不限多少為末酒服之驗治多年傷折不瘥出肘后方以炒冬瓜子末溫酒服之治撲損取龜血作酒食肉生研厚塗之立效補骨脂裹方出聖濟揔録治打撲傷損以補骨脂二兩微炒搗為末用醋煮黃米粥攤在紙上封裹損處治打損成瘡不合并竹樁戳破手足以萆麻子去殼生研貼患處如乾以津唾潤之治有病呵欠口不合及卒然牙關緊滴水不能入以致死者出經驗良方用鹽梅二箇擦之牙關即開復又口不合者亦用鹽梅肉擦兩牙框即合此是風證閃肭附論凡舉動不慎為外物所擊致死腕折者筋骨損血氣蹉跌或留積或瘀焮腫疼痛冝速治之外則傅貼肌肉內加調養榮衛之劑則肢體可完矣方補痛丸治閃肭筋骨諸痛川芎附子赤小豆各三錢乳香沒藥各三錢赤土蘇木各三錢降真香木鱉草烏各二錢烏藥三錢右為細末酒糊丸如梧桐子大每服三四十丸用酒任下取溫暖為度淹䕡子丸出德生堂治墜墮閃肭氣滯腰疼之症淹䕡子半兩沒藥二錢另研杜仲去粗皮半兩乳香三錢半另研破故紙炒半兩酒浸一兩炒威靈仙淨洗一兩八角茴香二兩川練子二十一箇去核七箇用巴豆仁炒七箇海金砂二錢炒七箇斑蝥去毒炒過後用牽牛四兩止取頭末每一兩炒取二錢穿山甲四升蛤粉炒吳茱萸洗淨再炒四兩右為細末酒糊丸如梧桐子大每服三十丸空心鹽湯下乾物壓之治打破血出不止方出聖濟揔録用燈心爛嚼和津唾貼之或用帛裹之血立止療打破青腫方出聖惠方以水磨桂塗之赤則以牆中朽骨磨塗之立效又方出聖惠方治墜傷瘀血不散肉色青黑方取釜臍下土細末塗之一方深掘竈中心好土三升於鐺以水拌熬熱用青布裹於痛處尉之冷即頻易又方用羊上卧之治打撲傷損出海上名方以炒松枝節磨用無灰酒下一方井華新水磨塗患處或用酒煎亦可服治搕損久年爛者出本草用茯女草葉如天郎機一般研細用鹽些少盫患處二三伏即可治打撲傷損用糟和紅豆末炒熱罨傷處杉板夾之治皮破用燒鹽泡湯調四圍蜜亦可治一切打撲跌傷肢體碎折者用梧樹向陽根上皮銼碎同酒糟一處搗爛銚內炒若先將損骨掿上次用藥乘熱厚敷上却用杉木厚皮杉木片亦可夾住以麻爛編繩纒縛定勿動以黃蠟鎔為丸如桐子大酒送百十粒日二服夜以甜瓜子炒焦色為末酒調服至三五十服不妨治傷折及肭閃折筋骨傷損用骨碎補石上生者如無用樹上生者取其根拭其毛後加生薑搗篩以煮黃米粥和傅損處治打撲傷損及刀斧所傷生血生肌定痛用好降真香碾為細末臨用看瘡口大小乾糝上便不疼亦可作膿或以好酒須無灰者同煎服尤佳發背瘡惡瘡等疾洗去膿水亦可乾貼須用結實色深者治打撲傷損出血不止用紫蘇研爛盫之瘡口自合一方以葉為末乾糝良治打撲傷損用牡蠣火煅數次為末濃煎蘇木酒下四五錢如損上體則食後服損在下則食前服治被打擊頭面青腫方用新雄羊肉乘熱封之又方以莨菪子為末傅瘡上一方用大豆黃末水調塗之治打撲傷損以柑橘葉白酒糟杵細縛痛處或燒地令紅用醋并潑地上急鋪薦令患人卧蒸出汗內則服藥外則貼掩則易安治跌撲內損昏悶不醒者用生料木香調氣散一貼再加羌活獨活蓬术用水一盞半童子小便一盞同煎連進三服立效治打撲傷損以蔥新折者便入爐火中煨乘熱剝擘開其開有涕便將窨損處仍多煨取續上易熱者崔給事云頃在澤潞與李抱真并判官李相方以毬杖毬子其軍將以杖相格便乘勢不能止因傷李相拇指并爪甲擘裂遽索金瘡藥裹之強坐頻索酒飲至數杯已過量而面色頳赤斯須云已不痛凡十數度用熱蔥并涕纒裹其指遂畢笑語金絲膏治打撲傷止痛散血右將松脂嫩者四兩先鎔二兩傾入水中候冷取出將已入水者再鎔成汁謂之兩熟却以二兩生者一處鎔成汁入麻油半兩冬月多些用油紙攤隨所用大小貼之治傷損成瘡中風亦治傷損成弓風以蜀椒麵裹作餛飩灰中炮之使熱斷開口封其瘡上冷易熱者三五度易之治諸傷損血氣併心不省白芷一兩大黃木通各半兩山梔十箇百草霜二錢右為細末每服二錢蘇木湯下血作潮熱大艾煎湯醋調治諸傷便不通豬苓滑石車前子各半兩天花粉三錢海金沙三錢右為細末麥門冬煎湯大小便俱不通生大黃末三錢當歸尾二錢紅花二錢熟枳殼半兩煎熟大黃末入加童便酒煎有潮熱除酒用水治傷紫䀶紫金皮小便浸七曬作末䀶青腫黑紫色用地黃生薑汁調不腫用蔥汁閃腰痛神麴火煅紅酒淬溫服或米醋和平胃散罨痛處或杜仲制及蒔蘿末酒調治打撲損筋骨折傷用胡量草搗篩與松脂乳香花桑柴炭亂髮灰同熬如彈子大如有其病以熱酒磨一丸服之其疼痛立止鬼代丹出經驗良方治打不痛乳香沒藥無名異自然銅火煅醋淬木鱉子去皮地龍各等分右為細末蜜丸彈子大酒送一丸遇打著體不痛治攧撲傷損至折筋骨出者須揣骨歸元位出經驗良方五銖錢十箇火煅醋淬乳香沒藥各半兩右為細末每服一錢入麝香少許空心溫酒調下以食壓之治一切損刺傷諸蟲咬諸瘡口染著風水毒忽癲腫疼痛忽如有一條紅線隨脈上出入臟腑冝用此方出活命方皂角子半兩瓶內煅過麝香一分右為細末先煮甘草栁枝水淋洗拭乾著藥在瘡口中用舊罩􅀢紙褁定便效治一切打撲折傷腹中碎痛血氣昏悶大腸祕熱數日不出後冝服此方出護命方桂心木香當歸檳榔芍藥連翹荆芥穗各一分牡丹皮去心半兩牽牛大黃醋炙香熟各一兩右細杵羅為末每服二錢半食後蔥湯調下返魂神白散出王氏博濟方治打撲及傷花乳石五斤捶碎如皂子大硫黃六兩捶碎如皂子大右用磁合十一箇先入乳石次入硫黃一重重鋪盡浮上用鴨舌草獨掃是也赤石脂和塗合子口縫又用鹽泥固濟勿令有小縫紋用新磚一塊四面書金木水火字中央書土字上放合子用炭火二稱燒之耗及三分漸漸去之取出合子地坑內埋一宿細研為末但是刀刃傷損至死者於傷處摻藥其血為黃水更摻藥其人復活更不痛不疼如婦人産後血暈至死但心頭暖即以童子小便調下一錢取下惡血如豬肝片終身不患血風氣若膈上有血化為黃水吐出及隨小便出立便效若牛角抵人腸出者急內入以桑白皮縫合肚皮於縫上糝藥可活亦不得封裹如損血入臟腑熱煎童子小便及入酒少許用一錢服之此藥真神仙所傳如逢仁德者傅之神仙餅子出宣明論治一切打撲傷損金石刀刃血出不止者立效此藥敷上無膿退痂便愈烏魚骨一兩五月五日前先準偹下青薊草一握一虎口人手取團圎是也萵苣菜一握韭菜一握石灰四兩右以五月五日未出本人不語將取三味同杵爛次後下餘藥味杵得所摶作餅子晒乾用時旋刮用敷之正骨散出楊氏家藏方治打撲傷折筋攣骨損蘇木四兩細銼當歸四兩洗焙無名異一兩白萵苣菜二兩沒藥半兩别研乳香半兩别研右件㕮咀每服三錢水一盞煎至半盞去滓再入酒半盞和勻溫服不拘時候大活血丹出衛生寶鑑方治打撲折損筋骨俱損痛楚呻吟瘀血不散內或㾏氣轉側不得或下惡血皮膚青腫破損傷風手足腰膝不能舉及牛觸人傷刀斧所損惡血凝結疼痛不止又治癰疽發背腦癰一切惡毒瘡癤每服一圎濃煎蘇木酒磨下忌一切動風物一七日婦人溫酒磨下孕婦不可服當歸三兩研為末陳檔子一兩半無名異一兩别研麻黃一兩去根節香墨一兩生地黃三兩研為末芥菜子一兩附子香二兩芍藥二兩乳香半兩别研右用生薑一斤取自然汁熬當歸地黃末成膏入衆藥末拌勻圎如大彈子大隂乾至妙至妙中興活血方出衛生家寶方治打撲傷損等疾神效沒藥一兩不焙别研乳香一兩不焙别研麻黃四兩切細炒黃色五月蠶沙二兩炒菱角燒成灰二兩川歸二兩切焙五月桑條燒灰稱二兩用五月五日收土當歸二兩切焙右為末用生地薑各二兩研細入酒醋共一升去滓煮膏丸前藥如彈子大每服一丸生地黃十寸生薑三片先研細入酒一盞去滓入藥再研細入酒半升同煎三五沸溫服便睡須忌生冷油麵無鱗魚等物及牛馬驢肉六十日如牛馬等撲傷以半丸灌之亦效補骨丹出衛生家寶方治打撲傷損腰痛山躑躅三兩何首烏三兩酒浸黃絲瓜五兩燒灰雲母石二兩研細入藥自然銅二兩煅醋淬取胞為度右焙碾為末糯米糊為丸如梧桐子大每服三十丸至五十丸當歸乳香末酒調送下當歸散治跌撲傷損川芎當歸各二兩沒藥一兩别研乳香一兩别研蘇木一兩右各銼為粗末酒二升水一升同煎至升半旋飲盡為度後食臨卧服服訖再依方煎常服如腫消血散即不用蘇木極佳六珍湯治跌損生血氣常服至愈川當歸熟地黃川芎白芍藥乳香别研沒藥别研右各等分為細末每服二錢以酒調服不拘時候神效傷損方自然銅纍纍然相綴如亂絲者最佳一兩右研細水飛過同當歸沒藥各半錢和勻每服三錢酒頓服仍以手摩痛處衍義云有人養折趐鴈飼以自然銅遂飛去透骨丸治打撲傷損閃肭筋骨手足無力四肢沈重乳香别研沒藥别研川烏頭生去皮臍破故紙瓦上炒熏晚蠶沙川芎荆芥穗海桐皮自然銅火煅醋淬上九味各一兩草烏頭生去皮臍三兩赤小豆一兩半右件為末酒醋麵糊為丸如梧桐子大每服一十丸至二十丸煎蘇木當歸酒下食後服治療打跌血滯腰脅疼破故紙茴香各炒辣桂等分為末熱酒調下五神丸治打撲傷損整骨續筋生肌止痛自然銅半兩火煅醋淬研細川椒去月二錢半炒出汗當歸半兩洗炒沒藥别研乳香别研二味各一錢右為細末取青蒿自然汁和丸如菉豆大每服五十丸熱酒調下當歸散治打撲傷損當歸沒藥各一兩芍藥木香川白芷川烏各半兩川芎生地黃各三錢鬱金二錢右為末空心酒調每服二錢如未愈加川牛膝紅花蘇木各半兩調服又方以晚蠶沙生用細末糝勻綿裹之隨手瘡愈血止治傷損打撲傷筋骨以胡孫薑即骨碎補石上生者補損樟樹上生者通氣治風損各用一半研爛取汁以酒煎或調服留渣敷傷處制法去皮毛切片微炒常用煮酒內損七日後飲之治打撲傷損後三五日水食不入口者用生豬肉二大錢口中嚼爛或用刀打爛却以溫水洗去血水又再擂爛用隂陽湯打和却用半錢多入碗中以雞羽送入喉內閉口者以隂陽湯灌下之其食蟲聞此香味竇開瘀血尋上貪食胸中自然開解却用通藥此損血凝聚心間其蟲食血飽病人心隔悶他蟲不來探故用此活法治諸傷損生獨活一兩草烏二錢南星半兩紫荆皮尖尾黃橙葉又名木葛葉能散血粉葛麥菜生者佳藍菜能住痛右此五味倍用不拘等分細末如打傷有大紫赤色未破血可加良薑山桂皮自然生薑汁調貼無薑水亦可若紫黑色已退除薑桂薑汁却用後藥煎湯泡洗上用前藥以蔥汁茶清調敷溫貼或有痛可用餅酒麩調藥不用薑痛腫即除仍喫藥消之若傷跌􅀈骨仍用桂乘熱貼之藥氣透骨痛止治打撲傷損或骨折者糞土邉尋小黃蝦蟆如指頭大者七枚放沙鉢內研細入生薑自然汁再研如泥用酒調作一服下屢用有效趙怡夫官常德曽用此療二折足者月餘能行治攧撲傷損歌半兩青銅火裏飛却將醋淬最為竒更添乳沒并香麝能接殘生斷續肢右五銖錢大者十文諸藥各一兩小者十文諸藥各半兩研細每服一字空心溫酒調下以食壓之妻姪方恂所傳大有竒效蘇木酒出聖濟揔録治被打傷損因瘡中風用蘇木椎令爛研二兩酒二升煎取一升分三服空心午時夜卧一服蠶子酒出聖濟總録治被打傷損因瘡中風用蠶子不拘多少將刀子於紙上量事刮取約一錢匕細研暖酒三合至五合調服如行里許更一服熟大黃湯治打撲腰痛惡血蓄瘀痛不可忍大黃生薑同炒如豆大各半兩右同炒令焦黃以水一大盞浸一宿五更去滓頓服天明所下如雞肝即惡物也活血丹出永類鈴方治打撲傷折骨碎筋疼瘀血腫痛煩悶風痰癱􅂒頑痺婦人血風産後敗血浮腫血氣㽱痛勞發四肢痠疼孕婦勿服青桑灰一斤好醋殺火大栗間焙乾骨碎補制焙南星生薑汁浸一宿焙赤白芍藥兼焙牛膝洗焙川烏炮雄烏豆各一兩六錢自然銅醋淬木鱉子肉切和麵炒赤各八錢淨細辛一兩焙沒藥四錢乳香六錢並别研白膠香三錢血竭六錢或畨降節代右為末糯米粉醋煮丸杵千下集手丸緩則發裂大丸重六錢濕中丸三錢濕後乾以漆擦手上將兩三丸栁漆為衣收用每服半丸無灰酒磨化漸煎三五沸溫服無時以紗葛袋收挂淨處經久不壞治傷損皮肉破及刃傷急用未經水蔥白細切炒極熱裹傷處血止痛定或用晚蠶蛾為末和石灰罨傷處住痛止血合口通靈黃膏出楊氏家藏方治打撲傷損驢傷馬墜癰疽瘰􅐇鬼箭骨疽漏瘡軟癤眉發背腳膝生瘡逺年惡瘡膁瘡纒喉風五般痔漏耳鼻內生瘡牙疼等疾須是臘前七日浸藥於臘日修合木香當歸洗焙金毛狗脊去毛防風白及白斂香白芷白术乳香别研松脂别研楓香别研杏仁去皮尖及雙仁者别研各一兩右件除乳香楓香松脂外各焙乾細銼用清油三斤煉熟放冷浸藥於銀石器內文武火養三日勿令大沸恐損藥力常似魚眼候香白芷黃為度濾過别入淨鍋內入黃臘八兩細羅黃丹二兩次入已研者楓香乳香用槐栁枝子不住手攪再上慢火熬少時候凝成每先用膏藥半分蛤粉為衣溫酒送下次用藥摩病處如損者以竹夾夾直用藥摩之患纒喉風服藥不下者先用藥於喉外摩之候喉寬然後服之牙疼齒浮出血者以藥填齒縫如有清水吐之耳內停風氣疼痛作聲紙撚住藥在耳內續骨膏出朱氏集驗方治打撲傷損骨折黃蘗半夏桂花右為末生薑自然汁調塗腫痛處其功全在生薑如藥乾頻上薑汁為佳治諸損丸子藥健筋骨生氣血養百脈疏風順氣升降隂陽虛弱常宜川牛膝宣木瓜天麻蓯蓉當歸川續斷酒浸焙何首烏酒蒸杜烏藥白芷五加皮酒浸狗脊製淮烏薑蔥炒骨碎補去毛酒浸炒川獨活一兩淨大川烏附子各一兩焙乳香嫩苴酥炙沒藥别研自然銅醋淬川芎各一兩兔絲子淘淨酒蒸杜仲薑汁炒蒼术半生半熟上二味各四兩全蝎半兩炒破故紙三兩酒浸用虎骨酥炙北五味子威靈仙水洗酒浸京芍藥川山甲蚌粉炒細辛龜板酥炙各一兩半右為細末酒糊丸常服即補下元藥破傷水方糯米生用三之二甘草末用三之一沙糖調搽腫處先自腫赤盡搽敷至瘡口水皆從瘡口出即安治諸傷至重但不透膜者出永類鈐方以海味中鹹白螵揀大片色白而有絲紅色者成片鋪在傷處以綿扎之血即止如膏脂出不傷內膜者即去患人頭心髮不令患人知以熱尉汁於頂上尉膏脂自入以桑白皮線縫合用給草木蠟葉礠石為末乾糝之即合應痛乳香丸出永類鈐方治諸損乳香沒藥信朱别研半兩白膠香一兩同乳香鎔草烏製四兩石楠藤二兩骨碎補炒去毛桔梗白芍藥各二兩熟乾地黃一兩川烏二錢暗松節燒過存性一兩荆芥穗一兩右為細末醋糊丸如梧桐子大每服三十丸煨蔥或松節酒下治傷折損等疾方出朱氏集驗方自然銅醋淬木鱉去油草烏川烏治打撲腕折用菴䕡味苦微溫煮汁服之甚效治打撲并搕著疼不可忍無名異一味為末用二錢溫酒調下極妙一説辨無名異用磨盞口注水彌滿不溢出效治一切打撲并杖癰疼痛右用敗龜為末打糯米糊貼之治磕撲損骨節疼痛不可忍右用大鯽魚一尾去腸肚煨熟入生薑一小塊同罨損處有殊效治搕撲傷損肌膚青腫用茄子味甘寒老黃者一枚切作片如指厚新瓦上焙乾為末欲卧酒服二錢匕一夜消盡無痕迹也普濟方卷三百十
