body:
  text: 普濟方卷三百二十明周王朱橚撰婦人諸疾門吐血附論夫人吐血者皆由臟腑傷損所致夫血者外行於經絡内榮於臟腑若傷損氣血經絡則虛血行失於常理氣逆者吐血又怒氣逆甚則嘔血然憂思驚恐内復氣逆上者皆吐血也方生地黄煎治婦人勞熱至甚吐血不止心神煩躁少思飲食生地黄汁一升生藕汁三合青蒿汁三合生薑二両取汁蜜四両酥一両柴胡一両去苗知母二両雞蘇葉一両右為散與煎藥汁同於銀器中攪令勻漫火煎成膏収瓷盒中每服半匙以清粥飲調下不計時候雞蘇散治婦人吐血心煩昏悶麥門冬當歸八分雞蘇葉一両阿膠生地黄刺薊各一両黄耆羚羊角屑茴根甘草各半兩伏龍肝黄芩各三分右為粗末每服四錢水一盞煎至六分去滓温服用薑三片如半雞子大同煎刺薊散治婦人頭疼壮熱心中煩悶吐血刺薊二両雞蘇葉二両赤芍藥麥門冬二両去心石膏三両赤茯苓一両黄芩一両茴根一両炙㣲赤剉甘草一両炙㣲赤剉生乾地黄二両右為散每服四錢水一中盞入生薑半分青竹茹一分煎至六分去滓温服不計時候阿膠散治婦人吐血心神煩熱阿膠二分𢷬碎炒黄燥當歸三分犀角屑三分黄芩三分桂心三分雞蘇葉三分羚羊角屑三分麥門冬三分去心生乾地黄二両甘草半両炙赤剉右為散每服四錢水一中盞入淡竹茹一分生薑半分煎至六分去滓温服不計時候雞蘇散出大全良方治虛損氣逆吐血不止雞蘇葉黄芩各一両當歸半両赤芍藥阿膠二両伏龍肝二両刺薊生地黄黄耆各両右為粗末每服四錢薑三片竹茹如彈子大水同煎此大全良方雞蘇散此多刺薊生地黄黄耆内煎法多生薑竹茹然治證并分両全同故法良方而存此也麥門冬散出聖惠方治婦人心中壅毒吐血煩悶麥門冬二両生乾地黄二両薺苨一両半犀角屑一両黄芩川升麻各一両白茅根三両半剉藍葉二両甘草一両炙㣲赤剉右為散每服四錢水一中盞入香豉一百粒淡竹茹一分生薑半分煎至六分去滓温服不計時候伏龍肝出永類鈴方治男子婦人五臟結熱吐血衂血並皆治之伏龍肝生地黄各一両竹茹一升芍藥當歸黄芩川芎桂心甘草各二兩右為㕮咀水一斗三升煮竹茹減三升内藥煮取三升分為三服一方無桂又用生葱心塞鼻或因刺著血不止立佳竹茹出子言方治婦人汗血吐血尿血下血竹茹二升人參芍藥桔梗芎藭當歸甘草桂心各一兩乾地黄四兩右㕮咀以水一斗煮取三升分三服生地黄散出濟生㧞萃諸見血無寒衂血下血吐溺血背熱属於熱生地黄熟地黄枸把子地骨皮天門冬黄耆芍藥甘草黄芩各等分右為粗末每服一兩水煎脉微身凉惡風每一兩加桂半錢治肌痩咯血肺痿等疾出大全良方蛤蚧一雙全者酒浸一宿頭炒知母貝母去心人參去蘆杏仁去皮尖麩炒枇杷葉去毛炒鹿角膠粉炒甘草右各一兩凈秤為末每服三錢水一盞入桑白皮煎至八分温服日三夜二青飲子出大全良方治咯血青黛杏仁各等分右一處同研成膏用黄蠟和作三十餅子每服一餅子用乾柿半箇夾定以濕紙裹煨合香同嚼粥飲下無時治婦人熱毒上攻吐血不止一錢五神湯出聖惠方生藕汁刺薊生地黄汁各三合生薑汁半合白蜜一合右和煎三兩沸無時以小盞調炒麫塵一錢服柴參散出聖惠方治婦人卒吐血不止胷心悶痛紫參一兩鹿角膠一兩𢷬研炒黄燥青竹茹一兩生乾地黄二兩羚羊角屑一兩炒黄燥右為散每服二錢新汲水磨生薑調下不計時候生地黄散出聖惠方治婦人心熱壅悶吐血生乾地黄一両半麥門冬一両去心甘草半両炙㣲赤剉薺苨三分白茅根二両剉藍葉一両右為散每服四錢水一中盞入生薑半分豆豉一百粒煎至六分去滓温服不計時候葇脾湯出大全良方治虛勞吐血下血自汗出甘草白芍藥黄耆各一兩熟地黄三両右為末每服四錢水酒各一大盞已上煎至七分盞攄去滓只取六分清汁放温食前服之女年十四月水不行遂妄行而嘔血諸藥無效察其形容人肥脉不大不出且用四生丸即安又嘗治一男子因飽低頭負重吐血諸藥無效亦用四生丸及青餅子即安更不發僕觀初盧世治吐血不喜用竹茹生地黄藕汁然亦不可拘泥此説如陽乘於隂血得熱則流散經水沸溢宜服凉藥以觧之大黄犀角生地生艾藕汁其能無效如隂乘於陽所謂天寒地凍水凝成氷冝服温藥以煖之乾薑肉桂豈能無功學者更宜思之可也已上所論中四生丸青餅子各見於後四生丸出聖惠方療吐血陽乘於隂血熱妄行宜服此藥生荷葉生艾葉生地黄右等分爛研丸如雞子大每服一丸三盞煎至二盞去滓温服無時候經驗方陳氏云先公逰福青靈石寺見侍者齋罷來侍立見桌子不稳急聲呼叱之當時即嘔血盖食飽後破肺也明年再到寺因問去年嘔血者無恙其主僧答之得四生丸服之遂愈因以屢救人有效又方出聖惠方治婦人吐血百治不差龍骨半両當歸三分剉㣲炒生乾地黄一両右為細散以生地汁調下二錢不計時候又方出聖惠方青竹茹一両生地黄二兩切羚羊角屑半兩右以水一大盞半煎至一盞去滓分三服不計時候又方出聖惠方桂心一両阿膠半両搗碎炒黄燥生乾地黄半両右為細散每服一錢煎竹茹湯調下不計時候温服又方出聖惠方治吐血生地黄三升切阿膠二両炒蒲黄六合右用水五升煮取三升分三服僕嘗治一人吐血診其脉肝部弦氣口濡此因怒極而得之遂用蘇合香丸和雞蘇丸服即效一方為散粥餅調下二錢或煎乾薑甘草湯與服或四物理中湯亦可服生地黄竹藕汁治婦人吐血出聖驗方陳槐花二両炒百草半両右為細末每服芽蔗根煎酒調下亦治血崩一方無芽蔗根用鍾紅燒淬酒下治熱毒吐血經日百治不差者出聖惠方地黄汁半升生大黄末一方寸右煎地黄汁三兩沸調大黄末令勻為三服又方出大全良方治吐血用桂心末水調方寸匕日夜可二十服又方出聖惠方治熱毒吐血用伏龍肝研令極細每服二錢新汲水調下頓服取效茅花湯出聖惠方用白茅花濃煎飲之立止𢷬生白茅根取汁一合飲之亦得或取根一握長六寸水煎去滓温服又方出聖惠方用生葱心塞鼻即定若因刺着并刀斧所傷血不止用之立定又方出大全良方用釡底墨研入鼻中又方出聖良方用亂髪灰細研以竹管吹入鼻中立止又方出聖惠方取龍骨末吹入鼻中立止治一切風并鼻紅吐血腸風血痢及崩中帶下用牡驢皮煎膠食療熱甚嘔血者以犀角地黄湯局方小三黄丸以白茅根煎治吐血及下血出本草以雞蘇莖葉煎取汁飲之咳嗽附論夫婦人咳嗽者由肌體虚外受於寒熱風濕所得也肺為四臟之華盖内統諸臟之氣外合於皮毛若為寒熱風濕所傷邪氣自皮毛而入於肺中外皆傷故令咳嗽也大抵治咳不可一槩治當以脉息辨之脉浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒風者散之濕者燥之熱者凉之寒者温之虛者補之未有不安者也經曰㣲寒為嗽寒甚為傷臓古人立方治嗽未有不下温藥如乾薑桂心細辛之属以寒氣入裏非辛甘不能發散以此準之未有内寒而嗽也又曰熱在上焦因咳為肺痿又實為肺癰虚則為肺痿此人其原或血不足或酒色滋味太過或因服利藥重亡津液操氣内氣焚肺金受邪脉數熱咳嗽膿血病至於此亦已危矣古人立方亦用温藥加建中之属今人但見發熱咳嗽卒用柴胡鼈甲門冬葶藶等藥旋踵受弊而不知非可為深戒就使不可進以温藥必須用此湯丸古之調治無為鹵莾致傷人命經曰人感於寒則受病㣲則為咳甚則泄為痛凡咳嗽五臓六腑皆有之惟肺先受邪盖肺主氣合於皮毛邪初傷外客皮毛故咳為肺病五腑則各因四時受邪六腑傳入五臟所以古言肺病難愈而善卒死者肺為嬌臟怕寒而惡熱故邪氣易傷而難治以世湯散逕過鍼灸不及故也十種咳嗽者肺咳心咳脾咳腎咳肝咳風咳寒咳支飲咳膽厥隂咳華陀所謂五嗽者冷咳嗽氣嗽之嗽飲邪嗽孫眞人亦有方治寒毒渥嗽者歴代方論著之甚詳惟今之所謂勞嗽者無所經見意其華陀所謂邪嗽眞人所謂注嗽者是也此病盖酒色過度勞極傷肺損動經絡其重者咯唾膿血輕者時發時差又有因虛感邪惡之氣且傳疰得之或先嘔而後嗽或先咳嗽漸就沉羸此則非特内損肺經又挾邪惡傳疰之氣所以特甚病之毒害無過此也眞人治疰嗽通氣丸方用蜈蚣四節又夜夣與鬼交通及飲食者全用蜈蚣外臺方四滿丸治五嗽亦用蜈蚣遇世名公能推原其㫖意卒用蛤蚧天靈盖桃桞枝麝香雄黄安息香之類以通神明之藥療之深知古人之意矣又肺中有蟲如蚕令人喉痒而咳嗽湯散逕過鍼灸不及以令口化蟲死即嗽止夫嗽者感風於皮毛入於腠理寒於肺經所以嗽也潤肺湯散主之有吐而嗽者由茶飲過多停積於胸膈乆則成痰使人頭目昏痛精神不爽惡風憎寒此因痰作咳嗽也潤肺湯加半夏食臓物炙嗽有肺受傷也六合湯玉屑丸主之姙娠而嗽者亦同也但急治恐胎墜治之以前藥攻之然與産後一理又有經産後而暴虛則肺虛客寒房勞之故使肺作其嗽六合湯主之儒門事親論云楊夀之妻病嗽十餘年闕麝香湯止之以半猶不足用止之明旦闕覺惡心以人参止之二日稍寕自下藥中闕先日病乆嗽藥已經病自然遲觧涌後調理數日及止戴人常言涌後有傾悞者有徐悞者有反悶悶心者病來盡如有反熱者不可不下也大抵二日後無不快者若嗽不止者以氷水觧之藥熱則行寒則止方潤肺湯治咳嗽痛喉中鳴人参去蘆杏仁去皮尖麻黄紫苑洗去皮後炒各半両陳皮浸去穣桔梗去蘆炒阿膠剉炒令沸燥甘草各三錢貝母去心炒右㕮咀每服五錢水一盞煎至七分熱服之橘皮湯療春冬傷寒秋夏冷濕咳嗽喉中作聲上氣不得下頭痛陳皮紫苑麻黄去根杏仁製當歸桂心甘草黄芩各等分右㕮咀每服五錢水一盞半煎至六分去滓熱服人参散治婦人肺臟虚冷時有咳嗽不思飲食人参一両去蘆頭細辛半両白术三分陳皮一両湯浸去白穣焙肉桂三分去皺皮厚朴一両去粗皮塗生薑汁炙香熟白茯苓三分紫苑三分洗去苖土乾薑三分炮製剉桔梗半両去蘆頭甘草半両炙㣲赤剉右為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓温服不拘時候五味子散治婦人心胸痰壅時有喘促欬嗽不欲飲食五味子三分半夏湯浸七遍去滑紫苑洗去苗土枇杷葉㓕去毛黄各半両前胡去蘆頭陳橘皮湯浸七遍去滑各三分桔梗半両去蘆頭訶梨勒皮三分杏仁半両去皮尖雙仁麩炒㣲黄赤茯苓二分枳殻半両麩炒㣲黄去穣甘草半両炙㣲赤剉右為散每服三錢水一中盞入生薑半分煎至六分去滓温服不計時候訶梨勒丸治婦人欬嗽不止痰毒壅滯心胸不利咽喉噎塞訶梨勒子三分貝母二分射干三分紫苑浸洗去苖土桂心三分紫蘇子三分㣲炒前胡三分去蘆頭桔梗三両去蘆頭木通三分剉皂夾子仁二両㣲炒郁李仁一両半湯浸去㣲炒剉研入右為細末研入郁李仁令勻煉蜜和𢷬三五百杵丸如梧桐子大每服不計時候以生薑湯下二十丸細辛散治婦人肺臟虛寒胸中痰滯不欲飲食時復咳嗽細辛洗去苗土訶梨勒皮各半両附子一両炮製去皮臍桂心半両甘草半両炙㣲赤剉紫苑三分洗去苖土人参半両乾薑半両炮製碎剉陳橘皮一両湯浸去白穣焙半夏半両湯浸七遍去滑右為粗散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓温服厚朴散治婦人體虚感於寒氣時有欬嗽厚朴一両去粗皮生薑汁炙香熱白茯苓一両桂心三分白术一両訶梨勒皮三分陳橘皮三分湯浸去白穣焙人参一両去蘆頭細辛半両甘草一分炙㣲赤剉右為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓温服不計時候蘿蔔子丸出聖惠方治婦人腹虛上氣欬嗽胸膈痰滯含化蘿蔔子一両㣲炒冬瓜子仁半両㣲炒􅌝􅌣子仁半両桂心半両訶梨勒皮麥門冬一両去心焙皂莢子仁半両㣲炒五味子半両甘草半両炙㣲赤剉右為細末煉蜜和丸如彈子大不計時候常含一丸嚥津含化貝母出聖惠方治婦人咳嗽不止貝母一両醋炒㣲黄欵冬花二両桂心一両百合一両紫苑一両洗去苖土杏仁二両湯浸去尖雙仁麩炒令黄木乳一両去粗皮塗醋炙黄甘草半両炙㣲赤剉右為細末研入杏仁令勻煉蜜和𢷬如彈子大不計時候常含一丸嚥津白莢丸出聖惠方治婦人咳嗽乆不止皂莢一両去皮子塗醋炙焦色五靈脂一両蜀桑根一両已上並搗細羅為末甜天蔴一両半隔紙炒令紫色别𢷬如膏杏仁一両半浸去尖雙仁麩炒黄研如膏右以棗肉及煉子蜜和丸如梧桐子大每服食後紫蘇子湯下十丸治婦人欬嗽不止出聖惠方露蜂一両㣲炙貝母半両桂心半両黄明膠一両搗碎炒黄燥甘草一分炙㣲赤剉右為細散每服一錢食後以糯米粥飲調下木乳散出聖惠方治婦人咳嗽乆不止木乳三両去粗皮塗酥炙黄貝母二両酥炒㣲黄甘草一両塗酥炙㣲赤剉杏仁二両湯浸去皮尖雙仁麩炒令黄右為散每服一錢生薑橘皮湯調下食後四蒲丸出聖良方治五嗽一氣嗽二飲嗽三熱𠻳四冷嗽五邪嗽乾薑桂心躑躅花芎藭紫苑各二分人参鬼督郵半夏洗甘草炙各一分蜈蚣一枚去頭足炙細辛一分芫花根皮二分右為細末煉蜜為丸如大豆許每服五丸米飲下日三未知加至七丸八丸見效忌羊肉餳生葱生菜海藻菘菜四蒲丸出聖惠方療五嗽一氣𠻳二脾𠻳三熱𠻳四邪𠻳五冷𠻳悉皆主之蜈蚣二枚炙芫花揀五分熬躑躅炒乾薑芎藭各四分人参細辛各三分桂心四分右為末煉蜜丸如梧桐子大米飲下一十丸日三服加至十五丸忌生葱生菜金不換散出聖良方治諸嗽鸎粟殻七錢去項子蜜炙白术一錢欵冬花一錢陳皮一錢去白黄連一分半右剉末作五服水一盞半薑三片烏梅一箇煎至七分温服治勞嗽神效又黄耆建中湯加五味子補肺湯一名清金湯治丈夫婦人逺年近日脾氣欬嗽上氣喘急喉中涎聲胸滿氣逆坐卧不安飲食不下及治肺感寒邪咳嗽聲重語音不出鼻塞頭昏並皆治之出大全良方鸎粟殻二両製人参粉草各半両陳皮明阿膠茯苓杏仁白术北五味子桑白皮薏苡仁紫蘇莖各一両右㕮咀每服三大錢水一盞半薑三片棗兩枚烏梅半箇煎至一盞臨卧温服如加百合貝母去心半夏麯欵冬花各一兩服之效定喘湯出永類鈴方治状同前半夏麯炒明阿膠炒甘草各錢半鸎粟殻半両製北五味子桑白皮麻黄去莭人参各一分右㕮咀每服三大錢薑三片烏梅半箇煎至七分去滓漸漸温服食後臨卧服六合湯治肺虛作嗽喘急紫苑洗去土剉碎炒杏仁去皮尖欵冬花去枚梗子人参去蘆甘草炙紫蘇葉各等分右㕮咀每服三錢水一盞入蜜少許煎至五分食後温服之人参散出聖危氏方治血風勞嗽乍寒乍熱傷寒咳嗽起坐不能人参知母秦芁欵冬花麻黄馬兠鈴杏仁苦梗寒水石南星地骨皮粉草半夏各等分右剉散每服三錢水一盞半麥門冬三十粒去心煎温服喘嗽加烏梅氣急加桑白皮治婦人血氣勞嗽出經驗良方猪牙皂角四両蜜製馬兠鈴天門冬麥門冬去心百部知母炒麻黄去節甘草炙蒼术各一両右為末每服二錢空心陳米飲下温金散出大全良方治勞嗽甘草黄芩桑白皮防風各一両杏仁二十七粒人参去蘆茯苓各半両麥門冬一分右以前五味二錢用米泔浸一宿晒乾次人参茯苓麥門冬三味同為細末每服二錢水一盞煎至八分食後温服蛤蚧丸出聖惠方治婦人咳嗽不止漸成勞氣宜服之蛤蚧一雙酥炙紫苑欵冬花鼈甲貝母去心皂莢子仁各一両炒杏仁炒去尖一両半右為細末煉蜜丸如梧桐子大每服二十丸淡薑湯吞下含化丸出大全良方昔有婦人患肺熱乆嗽身如炙肌痩将成肺勞服此安寇宗爽傳此方枇杷葉去毛桑白皮欵冬花木通紫苑杏仁各等分大黄减半右為細末煉蜜丸如櫻桃大食後夜卧含化一丸未終一劑而愈補肺湯出大全良方治勞嗽桑白皮熟地黄各二両人参去蘆紫苑黄耆川五味子各一両右為細末每服二錢水一盞煎至七分入蜜少許食後温服一方四君子湯加秦芁黄蠟煎服尤妙已上諸方辰陽李倅曾屢救人甚效服藥止可食淡煮猪蹄肉仍須煮熟肉去厚汁再以白湯熟煮仍忌房勞生冷魚腥醎醃藏寺修合煎藥忌一切生人男女猫犬雞畜見仍不令病人知藥味大有功治婦人室女患勞嗽百藥無效者此藥如神出經驗良方蛤蚧一隻去毛蜜炙細切絳礬一錢煆别研入射干一錢水洗生用萆麻子半両米炒浸炙右為末每服一大錢水一盞生薑五片煎至八分温服忌醎藏鮓脯之属早晨服妙金不換散出危氏方治男子女人肺胃虚寒乆嗽不已喘促滿悶咳嗽延盛腹脇脹悶腰背倦痛或虛冷嗽咳唾紅痰及逺年日近一切喘咳疾病諸藥無效者並治之鸎粟殻半兩製杏仁製甘草各三錢枳殻四錢右㕮咀每服三錢水一盞半薑三片烏梅半個煎至八分食後臨卧漸漸熱服許元林先生乙卯年七月僕嘗治一婦人咳嗽不已服諸藥無效漸成勞瘵永念診之六脉濡弱以愚考之此是血虚勞太過而成斯疾合用當歸等藥治之必愈遂先用橘皮湯空心服蘇子降氣湯後用金釵煎熟地黄丸當歸調理得安又治一婦人時興感熱咳嗽遂用小柴胡湯去人参薑棗只加北五味子煎即愈黄耆散出大全良方治虛中有熱咳嗽膿血口苦咽乾黄耆四両甘草二両右為細末湯㸃二錢服日三服一方甘草一兩黄耆六兩名黄耆六一湯口㕮咀水煎服貝母湯出大全良方治諸嗽乆不差貝母生薑汁浸半日北五味子黄芩乾薑熱者减半陳皮各一両半夏桑白皮桂心各半両木香甘草各一分北柴胡半両熟者加一半右為粗末每服五錢水一盞半杏仁七箇去皮尖碎之生薑一片煎至七分去滓熱服食稍空及臨卧各一服黄師文云戊申冬有姓蔣者其妻積年嗽製此方授之一投而差以治諸嗽悉皆愈玉屑丸治咳嗽延盛痰壅咽喉不利半夏一両薑製生薑一両炒片子白礬􅀈百部一両醋炙右百部共礬為末半夏生薑同煮令爛去生薑将半夏研如泥和百部礬為丸如梧桐子大每服五十丸食後臨卧薑湯送下痰飲附論夫痰之為害多因外感五邪及寒暑燥濕風内傷七氣不時喜怒憂思驚恐恚因五邪而得者得風為風痰得寒為寒痰得冷為冷痰得熱為熱痰得暑為暑痰因七氣所傷者多因婦人情性熱者不能容忍而有此證豈特只因風冷而成哉所以外感五邪内傷七氣則一身之中血濟淚汗涕唾身中濕者則獨變而成痰乘間而為害也經云清則運為精華濁則凝為痰飲此之謂也然有痰涎欽沫四種相類宜仔細詳辨調治因風而生疾者宜服三生飲星香飲青州白丸子化痰丸因寒冷而得者宜服降氣湯黒飲丹養正丹因熱而得者宜服金沸草散柴胡半夏湯因暑而得者消暑丸氣不調欝結而成者宜服参蘇飲四七湯二陳湯痰在上者以𤓰蒂散吐之在下者以控涎丹利之雖曰可吐可下亦要觀人之勇怯察脉之虚實方可投之初虞世有金虎碧霞之戒者此也闕方旋覆花丸出御藥院方治停痰積飲在脇下乆而不愈漸成癖心腹脹滿羸痩不能食雖食不消化喜睡乾嘔大小便或澀或利腹中動揺有水聲或口乾好飲水或覺兩脇注痛服之必安乆服除根旋覆花去梗桂心去皮枳實麩炒去穣人参各一両乾薑炮芍藥白术各一両二錢半赤茯苓一兩狼毒一兩烏頭炮一両芫花醋浸半日炒乾橘皮去穣吳茱茰湯浸去毒炒黄細辛去苖大黄㣲炒黄芩去黒心厚朴去粗皮生薑炙葶藶隔紙炒七錢半甘遂炒半両礬石火燒赤一両七錢半右為末水糊為丸如梧桐子大每服三十服淡薑湯吞下食前服柴胡半夏湯出永類鈴方治痰熱頭痛胸膈煩悶手足煩熱榮衛闕拘倦身體疼痛嗜卧少力飲食無味兼治五嗽痰癖柴胡八両半夏二両半人参去蘆甘草黄芩麥門冬各二兩白术二兩右㕮咀每服五錢水一盞半生薑五片棗一枚煎至八分去滓服四七湯出濟生㧞粹治喜怒悲思憂恐驚之結成痰涎状如破絮或如梅栘在咽喉之間咯不出嚥不下此七氣所為世或中脘痞滿氣不舒快或痰涎壅盛喘急或因痰飲中節嘔逆惡心並宜服之婦人情熱者不能寛觧多被七氣所傷遂致氣損胸臆或如梅桞核上咽喉甚者滿悶欲飽産婦尤多此證宜虚服此劑間以香附子藥乆服取效切不可謂紫蘇耗氣且新産氣血俱虛不冝多用服之效紫蘇二両厚朴三両茯苓四両半夏五両右㕮咀每服四錢水一盞半薑七片棗一枚煎六分去滓熱服無時候若因思慮過當小便白濁用藥吞青州白丸子極妙大半夏湯出大全良方治痰飲及脾胃不和半夏白茯苓生薑各一分右㕮咀作一服每遇膈間有寒痰以水二盞煎至一盞去滓臨卧温服如有熱痰加炙甘草一分如脾胃不和去甘草加橘皮一分同煎此即二陳湯加减得理瓜蒂出大全良方療病如枝證頭不痛項不强寸脉㣲浮胸中痞硬氣上衝咽喉不得息者此為胸中有痰也當吐之宜服瓜蒂炒黄赤小豆各半両右二味同研為細末取湯七合先漬之須臾煑作稀糜去滓取汁和散温頓服不吐少少加得快吐乃止諸亡血虚家不可與之脉㣲大忌令人吐茯苓丸出大全良方茯苓一両半夏二両枳殻半両炮製風化利硝一分右為末薑汁煮糊為丸如梧桐子大生薑湯下二十丸食後服控涎丹出大全良方凡人忽患胸背手足頸項腰胯隠痛不可忍連筋骨牽引釣痛坐卧不寕時時走易不定俗醫不曉謂之走疰便用風藥及針灸皆無益又疑是風毒結聚欲為癰疽亂以藥貼亦非也此乃痰涎伏在心膈上下變為此痰或令人頭痛不可舉或神意昏倦多睡或飲食無味痰唾稠粘夜間喉中如鋸聲多流睡涎手脚重膇冷痺氣不通誤認為癱瘓亦非也凡有此疾但以此藥不過數服其疾如失甘遂去心大㦸去皮眞白芥子各等分炒右為末糊丸如梧桐子大臨卧淡薑湯吞下五七丸如疾猛加至十丸風痰附論夫婦人風痰者由臟腑風冷水飲停積在於胸膈所成也人皆有痰少者不能為妨多者成患胸膈有痰隠疾於五臟則令眼昏亦令頭眩頭痛也夫心胸嘈雜婦人多有此證原疾之由多是痰也皆血液淚汗變成云是血嘈今人多用猪餘血炒而食之則愈詳其此理是以血歸導血原兩恰如塩梅下涎之義不若用旋覆花湯治心腹中脘痰水冷氣心下汪洋嘈雜腹鳴多睡口中清水自出脇肋急脹悶痛不欲食此胃氣虛冷所到其脉沉遲弦細是其證也方旋覆花湯出聖惠方治婦人風痰嘔逆及中脘冷心下嘈雜口中清水自出脇肋急脹滿痛頭目昏悶不欲食胃氣虛冷脉沉遲弦細旋覆去蒂枇殻穣㣲炒前胡人参去蘆𦍑活桂心枳殻半夏各半両甘草羚羊角屑赤茯苓各三分右為粗末每服三錢水一盞薑三片煎至七分去滓温服天南星丸出聖惠方治婦人風痰心膈壅滯天南星白附子並炮皂莢仁炒黄半夏麯各一両晋礬半両枯右為細末以酒煮麯糊丸如梧桐子大每服十丸生薑薄荷湯吞下又方出聖惠方半夏天南星各二両肥皂莢五挻剉生薑三両右以水五升一同煮令水净去皂莢生薑只用半夏天南星焙乾為末以酒煮麫糊丸如梧桐子大每服七丸生薑薄荷湯吞下一方加白附子二兩晋礬半兩拈旋覆花湯出大全良方治婦人心胷嘈雜多是痰證或是云血嘈今人多用餘血炒食之則愈此以血導歸原法此湯治中脘心腹冷痰心下嘈雜口中清水自出脇肋急脹滿痛不欲食悉主之旋覆花北細辛橘皮桂心人参甘草苦梗白芍藥半夏各半両赤茯苓三分右㕮咀每服四錢水一盞半生薑七片煎至八分去滓温服羚羊角散出聖惠方治婦人風痰氣壅心膈滿悶頭目昏重不下飲食羚羊角屑二分赤茯苓三分防風半両去蘆頭訶梨勒皮三分藿香半両半夏半両湯洗七遍去滑赤箭半両旋覆花半両芎藭半両前胡三分去蘆頭赤草半両炙㣲赤枇杷葉半両拭去毛炙㣲黄枳殻半両麩炒㣲黄去穣右為散每服三錢水一中盞入生薑半分煎至六分去滓温服不拘時候半夏散出聖惠方治婦人風痰氣逆胸膈壅悶難下飲食半夏一兩湯洗七遍去滑前胡一両去毛頭旋覆花半両大腹皮一両剉桂心半両人参二分去蘆頭白术三分甘草半両炙㣲赤剉防風半両去蘆頭枳殻半両麩炒㣲黄去穣桑根白皮半両剉陳橘皮半両湯浸去白穣焙右為散每服三錢水一中盞入生薑半分煎至六分去滓温服不計時候赤茯苓散出聖惠方治婦人風痰心胸不利頭目昏重時欲嘔吐不下飲食赤茯苓一両蔓荆子半両細辛半両人参三分去蘆前胡一両去蘆頭白术半兩枇杷葉三分拭去毛炙㣲黄芎藭三分半夏半両湯洗七遍去滑陳橘皮半両湯浸去白穣焙防風半両去毛頭甘草半両炙㣲赤剉右為末每服三錢水一中盞入生薑半分煎至六分去滓温服不拘時候皂莢煎丸出聖惠方治婦人風痰皂莢一枚細剉去子用水七升漾後取寸於銀鍋中煎熬如膏人角星二兩炮製防風二両去蘆頭天麻二両旋覆花二両薄荷三両乾者右為細末入前煎中拌和為丸如梧桐子大每服十丸生薑湯下不計時候又方出聖惠方治婦人風痰白礬一両通明者生用朱砂一両研細水飛過右同研勻以水浸蒸餅和丸如菉豆大每服五丸薄荷湯下不計時候喘滿附論黄帝問岐伯對曰夜行則喘出於腎滛氣病肺有所墮恐喘出於肺滛氣言脾有所驚恐喘出於肺滛氣傷心度水跌仆喘出於腎與骨是之當時勇者乞行則以怯者則着而為病也原疾之由雖曰皆本於肺與氣然感外射則有太陽證脉浮無汗而喘者宜麻黄湯陽明並汗出惡不寒腹滿而喘有漸熱者宜承氣湯者表邪未觧誤服下利藥利不止促喘而汗出者宜葛根黄芩湯㣲喘者桂枝厚朴杏仁湯汗出喘若無大熱宜麻黄否子甘草石膏湯若表邪未觧心下停水發熱而或嘔者青龍湯去麻黄加杏子主之若隂證喘促者四肢逆冷脉息沉細或寸大尺小或六脉促疾或心下腹滿結硬或冷汗自出或大便頻数上氣喘促或咽喉不利者此是本氣極虛内外挾寒冷所致使隂寒内消伏陽氣得腹則愈宜返隂丹主之大槩諸臟同乘而喘者以杏子散如感寒伏熱而喘者以軰盖散九寳湯若暴寒冷覆衣被過當腹熱肺實而喘促者其状多有熱證宜洗心散冷水調服若因氣宗不調痰盛喘促者宜四七湯無官局桔梗薑湯煎服若涎多而喘者宜千緡湯橘皮半夏湯若不卧卧即喘者此由水氣逆行上乖於肺中或在右脇下大如杯令人灑淅寒熱喘發癰疽宜棗膏丸若於上焦得水則浮而開使氣不得通流六脉大宜神祕湯肺之積名息賁上氣喘者宜神授湯若上盛下弱而喘促者宜蘇子降氣湯吞黒錫丹若尊年之人素來禀賦太厚不任熱藥者不可輕投丹劑及諸熱藥但以祕傳降氣湯分心湯氣飲論之梗槩不出於此若素有脚氣而喘者當作脚氣治之又有骨蒸勞喘治之别有法夫促者脚病者肺為之主五臟六腑皆禀氣於人喜怒太過不節動肺氣實則上喘虚則氣跌然有娠者經水不通上榮於乳下養於胎若宿有停飲與血摶後冷熱不調動其血飲上達故胸膈悶而嗽産後喘者榮血暴竭衝氣無主攻肺故喘促過在産時漏下太過此名有陽絶患難以喘論宜服六合湯若因惡露發喘先與琥珀散後與喘藥服之方九寳湯出聖惠方治感風伏熱一切咳嗽喘急不問髙年小兒室女婦人産前後皆可服惟虚勞自汗不可服薄荷葉紫蘇大腹皮洗麻黄去穣莭各四錢桑白皮桂心杏仁去皮尖陳橘皮甘草各二両半右㕮咀每服半兩水一盞半薑十片烏梅一箇煎至六分去滓温服食後服一方加鸎粟殻二箇人参少許有兩浙張大夫病喘二十年每冬輙劇不可坐卧百方不瘥後得臨平謂法本服之遂瘥法本凡病三十年服此藥半年乃絶根本永不復發凡服此藥須久乃瘥神祕湯出大全良方治水氣乘肺而喘兼療支飲而喘陳橘皮洗去白紫蘇葉人参桑白皮生薑各等分右㕮咀每服半兩水煎去滓温服神授湯出大全良方治上氣喘急不得卧橘皮苦梗紫蘇人参北五味子右各等分㕮咀每服四錢水一盞煎六分去滓食後服千緡湯出大全良方治痰喘齊川半夏七個炮製四片炒之皂角去皮尖一寸甘草炙一寸生薑如指大右同以水一煑去滓半碗頓服沈與宗待制常病痰喘不能卧人扶而坐數日客有見之曰我曾如此得良藥一服瘥我以千緡酬之謂之千緡湯可試為之與宗得湯一服而瘥棗膏丸出大全良方療息賁葶藶研細陳皮苦梗右後二味為末入葶藶令停煮肥棗内研為膏和丸如梧桐子大每服五七丸飲下許學士云予嘗患停飲水積肺經食已必嚏漸喘覺肺系急服此良驗杏子散出大全良方治諸臟相乘喘急杏子仁去皮尖雙仁麩炒黄細研如膏麻黄根為細末等分右和煎橘皮湯調下二錢無時候治婦人喘促虚腫快利小便即瘥用生薑二兩取汁白麫三兩以薑汁搜作小劑大半夏十個打研入麫中作七餅炙熱作黄色為末温熱水調下一錢以小便通利為度天門冬丸出楊氏家方治婦人喘急手足煩熱骨蒸寢汗口乾引飲面目浮腫天門冬十両去心秤麥門冬八両去心生地黄三斤取汁為膏子右二味為末膏子和丸如梧桐子大每服五十丸煎逍遥散送下散中去甘草加人参或服王氏博濟方中人参荆芥散亦可如靣腫不已經旦靣腫惡風故宜汗麻黄桂枝可發其汗後服柴胡飲子去大黄故論曰治臟者治其俞治腑者治其合乳腫治其經治俞者治其土也治合者亦治其土也如立家國魏救趙之法也嘔吐附論夫婦人嘔吐者由脾胃有邪冷糓氣不理為之也胃為水谷之海其氣不調而有風冷乘之冷摶於胃胃氣中逆則令嘔吐凡嘔吐之疾非特脾胃虛冷而嘔吐也亦有胃熱而嘔者亦有中冷胃口熱而吐者亦有痰盛而嘔者亦有血弱而喘者經云無隂則嘔是也不可以一槩用藥如胃冷而嘔吐宜用局方人参丁香散理中丸及許則仁半夏丸人参七味丸如胃熱而嘔吐者宜用小柴胡湯盧根湯竹茹湯槐花散如胃中冷胃口熱而嘔吐者宜局方藿香正氣散生薑棗子煎俟冷服即止如痰盛嘔吐者宜局方半夏茯苓湯二陳湯如惡阻兼服茯苓丸如血不歸原而嘔者宜用十全大補湯加陳皮半夏藿香棗薑煎服凡嘔吐者飲食不時生冷過度致使脾胃不和氣逆嘔吐與無礙丸五物湯主之之類或咽喉不通經絡澀滯四肢浮腫而吐不能止則為胃虚也宜與五物湯姙娠而嘔吐經血既閉水積臟腑氣不宣通故心煩情悶閉食不美喫食無味飲啖酸菓脇滿嘔吐此名惡阻胎氣上衝故也五物湯主之産後中惡嘔吐因其血損其氣虚其臟腑感其風寒則脾胃虛冷而嘔吐五物湯加半夏主之凡滯下病之稍乆或欲愈之時多有咳逆及嘔逆之證然咳逆者古人所謂噦是也噦者胃寒所生此證最危其他病亦惡欬逆如見此證宜用橘皮乾薑湯下半夏生薑湯丁香柿蒂湯若陽證欬逆者小柴胡湯橘皮竹茹湯嘗治一痢疾欬逆不止六脉沉弱諸醫用藥灼艾皆無效僕投退隂散兩服愈又嘗治許主簿痢疾愈後咳逆不止服諸藥無效遂灸期門穴三壯而愈如有嘔逆之證雖經云無隂則嘔然多有胃熱而嘔亦有胃寒而生有暑毒而生如胃熱而嘔宜服小柴胡湯孫兆竹茹湯蘆根湯官局桔梗湯竹葉石膏湯加生薑主之嘔而發消者猪苓湯又嘗治一痢疾後嘔不止六脉虚弱此胃寒而嘔又似暑毒壅於胃脘投局方香蒂散愈方益母子散出聖惠方治婦人脾胃乆虚氣弱多欲嘔吐全不飲食四肢少力益母一兩附子炮縮砂仁丁香厚朴白茯苓黄耆白术陳皮川芎良薑藿香葉當歸各三分人参桂心各半両右㕮咀每服三錢薑三片棗三枚水一盞煎至七分去滓無時温服一方加白豆蔲半兩甘草半兩厚朴丸出聖惠方治婦人胃冷嘔吐不下食厚朴去粗皮生薑汁炒三両右以薑汁一升水五合煮令汁盡焙乾為末以酒和神麯為丸如梧桐子大每服三十丸不拘時温酒下白豆蔲散出聖惠方治婦人脾胃氣弱時欲嘔吐白豆蔲三分去皮芎藭半両丁香半両藿香半両白术一両木香訶梨勒皮各半両厚朴一両去粗皮塗生薑汁炙香熱半夏半両湯洗七次白茯苓半両桂心半両附子半両炮製去皮臍髙良薑半両剉陳橘皮三分湯浸去白穣焙甘草半両炙㣲赤剉右為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓温服不拘時候七香丸出聖惠方治婦人脾胃氣弱腹脹嘔吐不納飲食沉香三分麝香一分細研入白檀香三分藿香三分丁香三分零陵香三分㯽榔半両白芷半両訶梨勒皮三分芎藭三分白豆蔲一両㣲桂心三分附子半両當歸三分剉碎㣲炒細辛三分木香三分右為末煉蜜和𢷬五七百杵丸如梧桐子大每服二十丸生薑湯嚼下不計時候白术丸治婦人脾胃氣虚弱腹中冷痛時復嘔吐不能下食四肢少力白术一両木香半分訶梨勒皮半両當歸半両剉碎㣲炒桂心半両芎藭半両青橘皮三分湯浸去白穣焙附子一両炮製去皮臍蓬莪茂人参各半両去蘆頭厚朴三分去粗皮生薑汁炙令香熟甘草一分炙㣲赤剉吳茱茰半両湯浸七遍焙乾㣲炒乾薑半両炮製剉右為末酒煮麫糊和𢷬三五百杵丸如梧桐子大每服二十丸棗薑湯下不計時候茅香花散治婦人脾胃氣逆或時嘔吐不思飲食四肢乏力茅香花一両厚朴一両去粗皮塗生薑汁炙令香熟丁香半両藿香三分髙良薑半両剉陳橘皮一両湯浸去白穣焙訶梨勒皮半両當歸附子各半両炮製去皮臍人参半両去蘆頭白术一両甘草半両炙㣲赤剉桂心半両右為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓稍熱服不拘時候訶梨勒散治婦人脾胃氣逆胸中痰滯時欲嘔吐不思飲食訶梨勒皮一両草豆蔲二両去皮陳橘皮一両湯浸去白穣焙白术髙良薑各三分剉厚朴一両去粗皮塗薑炙令香熱半夏半両湯浸七遍去滑白茯苓三分桂心半両人参三分去蘆頭附子三分炮製去皮臍甘草半両炙㣲赤剉右為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓熱服不計時候龍腦散治婦人脾胃虛弱胸膈氣滯吐逆不止白龍腦一分研入訶梨勒皮半両人参一両去蘆頭丁香半両肉豆蔲半両去殻藿香半両茅香花半両沉香三分甘草一分炙㣲赤剉右為散研入龍腦令勻每服一錢温酒調下生薑粥飲亦得不計時候草豆蔲散治婦人脾胃虚冷胸膈不利食即嘔吐草豆蔲一両去皮沉香半両白豆蔲半両去皮白术半両桂心半兩訶梨勒皮半両丁香母半両甘草一分炙㣲赤剉右為細散每服一錢生薑調下不計時候開胃丸治婦人吐血不止半夏三両湯浸去皮塗生薑用搗令爛焙乾白豆蔲一両去皮白术一両人参一両去蘆頭陳皮一両湯浸去白穣焙右為細末生薑汁煮棗肉和搜為丸如梧桐子大每服三十丸粥飲下不計時候丁香散治婦人臟腑虚冷脾胃氣弱食則嘔吐水穀不消丁香白术縮砂仁草菓仁各二分一作草豆蔲當歸人参一両白豆蔲一作肉豆蔲藿香葉甘草二分橘皮三分神麯訶子各半兩右為細末每服二錢用煎薑棗湯調下半夏丸療積冷在胃嘔逆不下食半夏一升眞熊州者洗去滑小麥麵一升右搗半夏為散以水搜麵丸如彈子大以水煮令麵熟則是藥成初吞四五丸日二服稍加至十四五丸旋服比覺病减欲更重合服亦佳忌羊肉餳救急用人参七味丸此藥服前半夏丸雖覺漸損然病根不除欲再服之又慮藥毒不可乆服恐病滋蔓者宜服人参白术各五両厚朴炙細辛各四両生薑八両末橘皮三両桂心二両右為細末煉蜜丸如梧桐子大米飲下十丸漸加至二十丸與半夏丸間服亦可忌桃李雀肉生葱生菜槐花散治胃熱嘔吐皂莢白礬槐花炒令黄共黒色甘草各等分右為細末白湯調二錢竹茹湯治胃熱嘔吐乾葛三両半夏湯洗七次薑汁半盞漿水一升煮合耗半可取三分用甘草三分右㕮咀每服五錢水二盞薑三片竹茹一彈大棗一枚煎至一盞去滓温服胃熱者手足心熱昔有一人病傷寒得汗身凉數日忽嘔吐藥與飲食俱不下進丁香藿香滑石等藥下咽即吐謂此正汗後餘熱留胃脘孫兆竹茹湯正相當耳橘皮乾薑湯出大全良方橘皮通草乾薑桂心甘草各四両人参二錢右㕮咀每服四錢水一盞煎至七分去滓温服生薑橘皮湯治乾嘔噦若手足厥冷者橘皮四兩生薑半觔右㕮咀每服半兩水一盞煎至七分去滓温服橘皮竹茹湯出大全良方治噦逆橘皮二両去白竹茹一升新者甘草二両人参半両半夏一両湯洗右㕮咀每服四錢水二盞生薑六片棗一枚煎至七分去滓温服金匱方無半夏治嘔逆氣亂心煩右以乾柿一箇水二盞煮呷神效猪苓湯出大全良方治咳而嘔渴心煩不得眠猪苓赤茯苓澤瀉阿膠炒滑石各半両右㕮咀每服三錢水一盞煎後膠消盡服丁香柿蔕湯出大全良方治吐咳逆丁香一十粒柿蔕一十五箇右㕮咀用水一盞半煎至八分去滓熱服半夏生薑湯治噦欲死半夏二両一分洗生薑二両切右以水二盞煎至八分去滓分為二服白堊散出大全良方治婦人翻胃吐食及治男子白磰土以米醋一升煆白磰土令赤入醋内浸令冷再煆再浸以醋乾為度取一両研乾薑一分炮右為細末研停每服一錢飯飲調下甚者二錢如服一觔以上取效白芷散出大全良方治婦人翻胃吐食右用白芷一兩切作片於瓦上炒令黄為細末用猪血三十文切片以沸湯泡七次将血蘸藥喫七片如剰藥末留後次用心腹脹滿附論夫婦人心腹脹滿者臟腑乆冷氣血虛損而邪氣客之乘於心脾故也足大隂脾之經也脾虛則脹足少隂腎之經也其脉起於小指之下斜趣足心入跟中上眼内後兼貫腎絡膀胱從腎上貫肝膈入肺中其支者從肺出絡於心臟虛邪氣客於三經與正氣相摶積聚内外氣并於脾脾虛有脹故令心腹煩滿而脹也診其脉遲而滑者脹滿也胸腹脹滿者由體虛風冷之氣客於腸胃摶於心腹氣血壅滯不能宣通得冷則逆上搶胸腹故令腹滿緣腹中故有停宿冷因冷胎氣相干是故腹脹産後兩脇或腹脹妨悶膀胱有停宿水因産而惡露不盡二物相雜流於胃故使然也脹悶之疾龍涎湯降氣主之夫婦人胸脇脹滿者由勞傷體虚而風冷之氣乘之客於臟腑腸胃之間摶於血氣血氣壅之不宣氣得冷則逆與血相摶則上搶胸脇脹滿也方訶梨勒散出聖惠方治婦人心腹兩脇脹滿不思飲食四肢少力訶梨勒三分煨用皮吳茱茰半両湯浸七次焙乾㣲炒人参半両去蘆頭半夏半兩湯洗七遍去滑陳橘皮三分湯浸去白穣焙桂心三分木香半両當歸三分剉㣲炒白术三分厚朴三分去粗皮塗生薑汁炙香熱甘草一分炙㣲赤剉桃仁三分湯浸去皮尖雙仁麩炒㣲黄右為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓温服不計時候阿魏丸出聖惠方治婦人臟氣乆虚腹脹不能食阿魏三分木香一両㯽榔一両肉豆蔲半両去殻當歸一両剉㣲炒陳橘皮三分湯浸去白穣焙訶梨勒一両煨去皮用桃仁三両湯浸去皮尖雙仁研如膏丁香半両附子半両製去皮臍桂心白术三分右為末同童子小便煎阿魏桃仁成膏另温同入煎藥末和𢷬五百杵丸如梧桐子大不計時候温生薑酒下二十丸㯽榔散出聖惠方治婦人禀賦實熱心腹脹滿不欲飲食㯽榔前胡川芎青皮各三分赤芍藥桂心大黄苦梗木香枳殻各半両右為㕮咀每服四錢薑三片煎至七分去滓温服無時候鼈甲散出聖惠方治婦人血氣壅滯心腹脹滿攻背膊疼悶鼈甲一両塗醋炙令黄去裙襴赤芍藥枳殻麩炒㣲黄去穣芎藭各半両赤茯苓一両剉㣲炒甘草一分炙㣲赤剉桃仁半両湯浸去皮尖雙仁麩炒㣲黄木香半両荆三稜三分㣲炮剉陳橘皮三分湯浸去白穣焙川大黄一両剉㣲炒右為散每服三錢水一中盞入生薑半分去滓每於食前温服白术散出聖惠方治婦人脾胃氣虛心腹脹滿不欲飲食四肢少力白术草菓仁亦作草豆蔲訶子肉各三分㯽榔桂心赤茯苓各半両陳皮厚朴人参各一両甘草右為粗末每服四錢水一中盞入薑三片棗一枚煎至七分去滓食前熱服木香散出聖惠方治婦人脾胃虛冷心腹脹滿不欲飲食木香桂心白术乾薑炮陳皮訶梨勒草菓仁亦作草豆蔲人参各一両神麯炒黄二分甘草炙半両右為細末每服一錢如茶㸃熱服㯽榔散出聖惠方治婦人臟腑氣滯心腹脹滿不能飲食㯽榔一両桔梗三分去蘆頭桂心一両陳橘皮三分湯浸去白穣焙鼈甲一両塗醋炙令黄去裙襴枳殻三分麩炒㣲黄去白穣當歸半両剉㣲炒川大黄一両剉碎㣲炒桃仁一両湯浸去皮尖雙仁麩㣲炒右為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓温服不計時候胡椒丸出聖惠方治婦人脾胃乆冷心腹虛脹靣無顔色四肢羸痩不思飲食胡椒一両桂心三分炮芎藭二分當歸三分剉㣲炒高良薑一両剉附子一兩炮製去皮炒木香半両草豆蔲一両去皮白术三分右為末煉蜜和𢷬三五百杵丸如梧桐子大不計時候熱酒下三十丸龍涎湯治心腹脹悶嘔吐不思飲食噎塞沉香木香各一錢不見火人参四錢不見火甘草二錢炙丁香四錢不見火烏藥六錢陳皮七錢浸去穣無礙丸治心腹脹滿嘔逆酸水大腹皮㯽榔炮三稜各半兩炮莪术一両炮木香半両不見火右為細末以糊為丸如梧桐子大每服五十丸用橘皮湯下不拘時候又㕮咀白水煎至七分熱服五物湯治心腹脹滿送食不下木香二錢半不見火㯽榔炮白术製朴甘草各三錢右㕮咀每服五錢水二盞入紫蘇葉七片塩半錢煎至七分熱服不拘時候降氣丸治心腹脹悶不下飲食枳殻去穣炮橘皮去穣各二両木香三錢半右為細末煉蜜為丸如梧桐子大每服五十丸用薑蔔湯食後下㯽榔散出聖惠方治婦人血氣攻心胸膈氣滯腹脇虛脹㯽榔半両當歸一両剉㣲炒桂心半両木香半両赤芍藥一両吳茱茰一分湯浸一遍焙赤㣲炒青橘皮一兩湯浸去白穣焙右為細散不計時候熱酒調下一錢大黄丸出聖惠方治婦人心胸氣壅兩脇滿悶不能飲食川大黄一両剉碎㣲炒桂心半両枳殻三分麩炒㣲黄去穣柴胡一兩去皮炮訶梨勒一両煨用皮桔梗一両去蘆頭右為散每服四錢水一中盞入生薑半片煎至六分去滓温服不計時候人参紫金丸出大全良方治婦人榮衛不和心腹刺痛胸膈脹滿不思飲食紫金皮蒼术石菖蒲香附子二両人参半両木香三錢右為末蜜米糊和丸如梧桐子大每服三十丸食後薑湯下兩脇脹痛附論夫婦人兩脇脹痛者由臟腑虛弱氣血不調風冷之氣客於腹胃復於胞絡之間與血氣相摶壅塞不宣邪氣交争擊故令兩脇脹痛也方三脘散治中焦虚痞兩脇氣痛靣目手浮足踵大便秘澀兼治脚氣大腹皮紫蘇沉香乾木𤓰獨活各一両白术川芎木香甘草陳皮㯽榔各三両右㕮咀每服三錢水一盞煎至七分去滓空心熱服日中服大全良方亡昔有一婦中焦虚痞腸脇脹痛大便秘結六脉虚弱更數醫服藥無效僕投此藥不數劑而愈訶梨勒皮治婦人心腹氣滯兩脇脹痛四肢無力不思飲食訶梨勒一両煨用皮㯽榔桂心木香各半両赤芍藥白术桔梗去蘆頭當歸剉㣲炒各三分芎藭半両陳橘皮一両湯浸去白穣焙鼈甲一両塗醋炙令黄去裙襴右為散每服四錢以水一中盞入生薑半分煎至六分去滓温服不計時候枳殻丸治婦人心腹氣滯兩脇脹痛不能飲食枳殻三分麩炒黄去穣㯽榔一両桂心三分木香半兩芎藭半両鼈甲一両塗醋炙令黄去裙襴吳茱茰半両湯浸七遍焙乾㣲炒當歸半両剉㣲炒訶梨勒皮三分川大黄一両剉碎㣲炒陳橘皮三両湯浸去白穣右為細末煉蜜和𢷬三二百杵丸如梧桐子大每服煖酒下三十丸草豆蔲散治婦人脾胃虚氣攻兩脇脹痛草豆蔲訶子肉各一両桂心桔梗厚朴各三分甘草一分川芎當歸乾薑㯽榔各半両右為粗末每服四錢水一盞煎至七分去滓熱服食前菴䕡子散治婦人臟腑虚冷宿食氣攻兩脇脹痛坐卧不安菴䕡子延胡索桃仁桂心琥珀當歸赤芍藥木香沒藥各半両右為末每服二錢温酒調下無時候木香散治婦人血氣攻兩脇脹痛背膊壅悶手足煩疼不能飲食木香三分白术一両桂心訶梨勒皮三分赤芍藥川大黄當歸三分剉㣲炒鼈甲一両半塗醋炙令黄去裙襴桃仁三分湯浸去皮尖雙仁麩炒穣㣲黄右為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候温服木香散治婦人胷膈氣壅兩脇脹悶不欲飲食木香半両枳殻一両麩炒㣲黄去穣川大黄一両剉碎㣲炒白术三分前胡一両去蘆頭赤茯苓三分桂心三分訶梨勒一両煨用皮大腹皮半両右為散每服三錢水一中盞入生薑半分煎至六分不計時候分温服木通散治脇肋苦痛甚效併心下脇肋并小腹牽引痛者皆主之及治心下脇肋小腹疼痛皆素有積寒而温煖湯散亦可主治甚者以温藥下之心下與小腹痛諸書並有效方脇肋下痛鮮獲治法木通青皮去白川練子去皮核各一両已上三味用巴豆一両炒黄去豆蘿蔔子炒舶上茴香一両炒莪术木香滑石各半両右為細末煎葱白酒調三錢一服愈甚者不過再服木香散治婦人虛冷氣攻兩脇脹痛不能飲食木香一両吳茱茰半両湯浸七遍焙乾㣲炒芎藭三分桂心三分髙良薑半両剉當歸三分剉㣲炒桃仁三分湯浸去皮尖雙仁麩炒㣲黄右為細末不計時候熱酒調下二錢靈寳散治婦人氣攻刺痛引兩脇並治痃癖冷氣丁香木香乳香各錢半當歸𤣥胡索白芍藥各半両右為末每服一錢温酒調服食前芍藥湯出危氏方治冷證脇痛諸藥不效香附子四両黄子醋二升塩一兩煮乾為度肉桂延胡索炒白芍藥各一兩右為末每服二錢沸湯調不計時候服一婦人年八十忽兩脇痛愈氣針丸出大全良方治乆積風壅疎利滯氣寛胸膈止刺痛黒牽牛二両半生半炒木香青皮去白大黄炮㯽榔各一両右為末煉蜜丸如梧桐子大温水下三十丸大全良方云昔有鄧安人年五十忽然氣痛投神保丸愈不一二日再痛再服神保丸六十七粒大腑不通其疾轉甚亦有要用沉香木香薑桂等藥而未敢投痛甚則築心築背定兩脇似有兩柴十字揷定心脇呌聲徹天召僕診之六脉沉伏乍來乍去衆問僕診脉吉凶何如荅曰夫凡痛之脉不可凖也但以證辦用藥觀其肌體肥偉問其大腑數日不通僕曰實痛也其腹必脹但以人按之痛甚手不可向逆此大實也經云滿大實者可不之用氣針丸五六百粒是後即愈又金陵有家提幹闕内人病心腹脹痛醫家投木香沉香㯽榔大腹芍藥薑桂之類病益甚召僕診之六脉弦𦂳而和不似病脉但診時手如火以此知其實痛也衆問如何治療僕曰大凡心腹刺痛不可便作虚冷治之有二醫荅曰非冷而何熱即生風冷生氣是也僕曰不然難經云虚作痒實則痛文通景云腹痛者用甘草芍藥湯痛甚者附子乾薑湯家提幹云荆布素來質弱僕曰有可辦處遇痛時使一婢按之若痛止是虛寒証也若按之轉甚手不可近此實痛也令一婢按之手不可近呌喚異常僕曰此實熱無可疑者當用大柴胡湯治之衆皆不許僕責状而投之八服愈逍遥亦妙普濟方卷三百二十
