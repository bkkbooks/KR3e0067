剉碎微炒知母半兩厚朴一兩去粗皮塗生姜汁炙令香熟㯽榔一兩川朴硝一兩右搗羅為末煉蜜和搗二三百杵丸如梧桐子大毎服不計時候以生薑湯下三十丸人參湯出聖濟總錄治傷寒食毒初得病身體不大熱心胷痞悶不思飲食吐逆不定上氣築心下利不止水穀不化人參一兩赤茯苓去黒皮黄芩去黒心各三分訶梨勒炮去核高良薑剉炒厚朴去粗皮生姜汁炙剉陳橘皮去白炒甘草炙剉草豆蔲去皮附子炮製去皮臍各半兩乾薑炮細辛去苗葉各一分右㕮咀如麻豆大毎服三錢以水一盞生薑三片煎至七分去滓温服以粥飲投取汗芎藭湯出聖濟總錄治傷寒食毒壮熱頭疼時復憎寒四肢疲痛口苦芎藭附子炮製去皮臍大黄剉炒桂去粗皮各三分乾薑炮甘草炙剉木香各半兩右㕮咀如麻豆大毎服三錢以水一盞生薑三片棗一枚擘煎至六分去滓空心温服續命丸出聖濟總錄治傷寒食毒水癖不消及痰實大黄剉醋炒黄芩去黒心麻黄去根節黄連去鬚各半兩豉半分炒甘遂半分炮梔子仁朴硝研杏仁去皮尖雙仁炒研各一分巴豆一分去皮心膜研以紙壓去油右搗羅七味為末與三味研者拌勻煉蜜和丸如大麻子大毎服三丸空心温熱水下以利為度未利加一二丸大黄湯治傷寒食毒心腹脹滿時復嘔吐憎寒不下食大小便祕澁大黄剉炒白术厚朴去粗皮生姜汁炙剉大腹皮剉各一兩木香桂去粗皮朴硝研牽牛子炒各半兩右麄搗篩毎服二錢以水一盞生薑三片煎至六分去滓温服不拘時候疎氣湯治傷寒後食毒所傷心腹脹滿水穀不化大便不利京三稜煨剉牽牛子炒各一兩乾薑炮半兩陳橘皮去白炒一兩右搗羅為末煉蜜和丸如梧桐子大毎服二十丸不拘時生薑湯下取利為度未利再服㯽榔散治傷寒食毒所傷腹脹氣急大小便不通㯽榔剉郁李仁去皮各一兩大腹皮剉陳橘皮湯浸去白炒各半兩右搗羅為散毎服二錢以生薑湯調下橘皮丸治傷寒食毒惡寒腹脇急脹嘔吐不下食手足厥冷陳橘皮去白炒草豆蔲去皮桂去粗皮枳殻去穰麩炒木香各一兩大黄剉炒二兩鼈甲去裙襴一兩半用醋五合浸炙硇砂一分研右搗羅為末煉蜜和丸如梧桐子大毎服二丸空心生薑湯下乾薑湯治傷寒食毒頭痛惡寒心腹虛脹大便泄利乾薑炮甘草炙剉各半兩附子炮製去皮臍陳橘皮去白炒厚朴去粗皮生姜汁炙各三分右剉如麻豆毎服三錢以水一盞煎至七分去滓食前温服茯苓湯治傷寒食毒腹脹虛鳴不能食赤茯苓去黒皮陳橘皮去白炒人參白术木香炮厚朴去粗皮生姜汁炙剉五味子各一兩乾薑炮半兩右麄搗篩毎服三錢以水一盞生薑三片煎至六分去滓空心温服芍藥湯治傷寒食毒心腹脹滿或時泄利芍藥白术厚朴去粗皮生姜汁炙各一兩白豆蔲去皮桂去粗皮乾薑炮甘草炙剉各半兩木香三分右麄搗篩毎服三錢以水一盞生薑三片煎至六分去滓食前温服蓽澄茄丸治傷寒食毒心胸痞悶泄利頻併蓽澄茄一兩乾薑炮三分陳橘皮湯浸去白焙一兩桂去粗皮三分厚朴去粗皮生薑汁炙一兩阿魏半兩肉豆蔲去皮三枚縮砂去皮半兩草豆蔲去皮三枚甘草炙三分附子炮製去皮臍一兩蓽撥一分白术半兩右搗羅為末煉蜜為丸如梧桐子大毎日空心酒下十丸至二十丸以知為度麯桂湯治傷寒食毒咳嗽陳麯剉炒桂去粗皮百合麻黄去根節黄連去鬚枳殻去穰麩炒白石脂各一兩半桑根白皮炒剉地骨皮附子炮製去皮臍各二兩欵冬花羚羊角屑旋復花微炒各一兩黄芩去黒心半兩杏仁湯浸去皮尖雙仁炒十枚右搗麄篩毎服五錢以水一盞半入生薑三片同煎至八分去滓温服普濟方卷一百三十六
