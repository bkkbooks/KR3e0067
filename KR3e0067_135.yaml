body:
  text: 普濟方卷一百三十六明周王朱橚撰傷寒門傷寒頭痛論夫傷寒頭痛者邪氣循陽脈上攻於頭也是以傷寒傷風温病熱病風温病皆有頭痛症者葢頭痛皆陽症也故太陽頭痛必發熱惡寒陽明頭痛不惡寒反惡熱少陽頭痛脈弦細而發熱至於三隂脈從足至胸皆不至頭惟厥隂脈挾胃属肝絡膽循喉嚨上頂顙連目出額故仲景止有厥隂頭痛一症治以呉茱茰湯者是也又傷寒頭痛謂邪氣外在經絡上攻於頭所致也難經曰三陽經受風寒伏留而不去則名厥頭痛言三陽之經上於頭爾然傷寒頭痛者太陽専主也何者以太陽之經起於目内背上頭交巔上入絡腦經所謂太陽受病者頭頂痛腰脊强又曰七日病衰頭痛少愈雖然陽明少陽亦有頭痛不若太陽之専主也葢太陽為病属表而頭痛則專主表症雖風寒之不同必待發散而後已太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者傷寒也麻黄湯主之太陽病頭痛發熱汗出惡風者中風也桂枝湯主之雖有傷寒六七日不大便頭痛有熱者可與調胃承氣湯下之也又云若小便清者知熱不在裏仍在表也當以桂枝湯以頭痛未去雖不大便六七日其小便清者猶為在表是知頭痛属表者明矣頭痛一切属三陽經也而隂病亦有頭痛乎太隂少隂二經之脈皆上至頸胸中而還不上循頭則無頭痛之症惟厥隂之脈循喉嚨之後上入頂顙連目絲上出額與督脈㑹於巔病亦有頭痛經曰乾嘔吐涎沫者呉茱茰湯主之者是矣夫頭者精明之府也神明居之小小邪氣作為頭痛者必曰發散而可也其或痛甚入連於腦而手足寒者又為真病豈但發散而已哉嗚呼頭痛為外病猶有不可治者又矧臓腑之疾乎又傷寒頭痛者是外中風邪上注腦中三陽之脈受於風寒伏留不去則流傳於心肺故使上焦壅滯心煩鼻塞壮熱頭痛也歌括惡寒發熱太陽經惡熱頭痛胃氣蒸脈細而强兼發熱少陽頭痛自分明又云三隂本没頭痛疼若有頭疼属厥隂非次頭痛涎作病心煩鼻塞温家尋又論云太陽惡寒發頭疼無汗麻黄湯有汗桂枝湯已發汗未發汗頭疼如破者連鬚葱白湯不已者葛根葱白湯陽明頭痛胃氣所蒸也調胃承氣湯少陽頭疼小柴胡湯涎沫頭疼𤓰蒂搐鼻法温家鼻塞頭疼𤓰蒂搐鼻法去鼻中黄水即愈厥隂頭疼脈必㣲浮浮者欲愈也不愈者小建中湯外症發熱似瘧者欲愈也宜桂枝麻黄各半湯又云三隂無頭疼至呉茱茰症却云乾嘔吐涎沫頭疼属少隂以此論之少隂亦有頭疼但稀少耳孫真人云少隂傷寒不壮熱不頭疼其稀少可知少隂身雖有熱而無頭疼厥隂有頭疼而無身熱而又頭疼属陽症無疑矣歌括頭痛惡冷太陽先惡熱陽明脈細弦濕鼻塞兮痰膈滿厥隂乾嘔吐清涎又頭痛属三陽陽明少陽皆有之而太陽則専主是也太陽専主頭痛則頭痛之属表症者居多陽明少陽又次而輕耳隂經絡上不至頭無頭痛惟厥隂循喉嚨之後上連目絲頂巔有頭痛乾嘔吐涎可用呉茱茰湯一症却無身熱亦與陽症不同也雖然太隂少隂其經從足至胸並無頭痛是固然耳然風温病在少隂濕温病在太隂而頭反痛至於隂毒亦然是又某病則又有某症脈絡相通不可拘也若夫頭痛劇甚入連於腦手足俱寒此則真痛神丹在手其能救乎諸無熱頭疼如斧劈用生薑葱白煎湯下若頭疼脈數發熱惡寒而身不痛左手脈平和此名食積也傷食亦令人頭痛脈數發熱但驗左手人迎脈平和身不疼痛者是也甲乙經云人迎盛𦂳傷於寒氣口盛𦂳傷於食左手闗前一分者人迎之位也右手闗前一分者氣口之位也葢人迎主外氣口主中以此别之傷食之症由脾胃伏熱因食不消發熱似傷寒却身不疼痛此為異耳若膈實嘔吐食在上脘宜吐之若心腹滿痛者宜下之治中湯五積散黒神丸可選用也方石膏散出聖恵方治傷寒頭痛壮熱石膏桂心細辛白术桔梗去蘆頭乾薑炮製剉薄荷各半兩麻黄去根節赤芍藥附子炮製去皮臍各三分甘草一兩炙微赤剉右搗羅為散毎服四錢以水一中盞入生薑半分葱白七寸豉五十粒煎至六分去滓不計時候稍熱服黄芩散治傷寒頭痛心神煩熱四肢不利黄芩甘草炙微赤剉各半兩赤芍藥桂心細辛各三分麻黄去根節前胡去蘆頭各一兩石膏二兩右搗篩為散毎服三錢以水一盞煎至六分去滓不計時候稍熱服治傷寒壅熱頭痛不可忍宜服此方出聖恵方石膏二兩滑石一兩黄芩柴胡去苗赤芍藥前胡去蘆頭犀角屑甘草炙微赤剉杏仁湯浸去皮尖雙仁麩炒微黄各三分右搗篩為散毎服五錢以水一大盞入淡竹葉三七片煎至五分去滓不計時候稍熱服厚朴散治傷寒壮熱頭痛煩燥無汗厚朴去粗皮塗生姜汁炙令香熟甘草炙微赤剉附子炮製去皮臍陳橘皮湯浸去白穰焙麻黄去根節川大黄剉碎微炒各一兩呉茱茰湯浸七遍焙乾微炒乾薑炮製剉前胡去蘆頭各半兩右搗羅為細散毎服三錢以水一中盞入生薑半分煎至六分去生薑不計時候和滓稍熱服以衣覆取汗未汗再服旋復花散出聖恵方治傷寒頭痛心膈痰壅旋復花甘菊花芎藭各一兩甘草半兩炙微赤剉皂莢樹白皮三兩塗酥炙赤色右搗羅為細散毎服二錢以水一中盞入荆芥七穂煎至六分不計時候和滓熱服甘菊花散治傷寒痰壅頭痛心煩四肢拘急不得睡卧甘菊花旋復花蔓荆子細辛枳殻麩炒微黄去穰甘草炙微赤剉各半兩防風去蘆芎藭酸棗仁葳㽔各一兩右搗麄羅為散毎服三錢以水一中盞入生薑半分煎至五分去滓不計時候温服治傷寒汗後頭痛不解宜服此方出聖恵方石膏太隂𤣥精石各一兩麻黄二兩去根節甘草半兩炙微赤炒右㕮咀毎服三錢水一中盞入竹葉二七片煎至六分去滓不計時候温服通頂吹鼻散出聖恵方治傷寒頭痛不止黎蘆一分去蘆頣𤓰蒂馬牙硝各二分龍腦研麝香研各半錢右搗羅為細散研龍腦麝香令勻用少許吹入鼻中得嚏差黄芩湯出䕶命方治傷寒頭痛不止黄芩去黒心石膏研茵陳子蒿柴胡去苗桔梗剉炒牡丹皮荆芥穂梔子仁各一分麻黄去根節半兩右麄搗篩毎服三錢以水一盞煎至七分去滓食後温服一方和滓服呉茱茰湯出金匱方治傷寒厥隂症乾嘔吐涎沫頭痛呉茱茰二兩洗焙人參一兩半右㕮咀如麻豆毎服五錢以水一中盞半入生薑一棗大拍碎棗三枚去核同煎至八分去滓温服若急者隂毒甘草湯白术散附子肉桂散迴陽丹反隂丹至於隂盛隔陽霹靂散火熖散隨經部分選用之石膏丸出聖濟總錄治傷寒頭痛痰盛石膏細研水飛過四兩烏頭去皮臍生用一兩消石研一兩半太隂𤣥精石研二兩右搗研為末和勻如粉以生薑自然汁煑麪糊和丸如梧桐子大毎服十丸至十五丸荆芥茶下甚者不過三服聖白散出聖濟總錄治傷寒頭痛壮熱發汗化痰附子一枚大者炮製去皮臍白附子生天南星炮半兩白芷一分半夏洗去滑為末生姜汁和作解焙乾麻黄去根節各五兩石膏碎研一兩麝香研半錢右搗羅六味為末入石膏麝香末同研令勻毎服半錢以熱葱茶調下甚者連進三服太乙㪚出王氏博濟方治傷寒頭疼附子大者炮製去皮臍一兩甘草生石韋去毛各半兩石膏研滑石研各二兩右搗羅三味為細散入石膏滑石末同研勻毎服二錢以葱白薄荷茶調下白鮮皮湯出聖濟總錄治傷寒頭痛白鮮皮菊花石膏研荆芥穗各一兩桂去粗皮一分甘草炙半兩麻黄去節二兩右麄搗篩毎服三錢以水一盞煎七分去滓温服茶調散出聖濟總錄治傷寒頭痛不止石膏碎研二兩羌活去蘆頭生用蒼术去皮甘草半生半炙芎藭茵陳蒿荆芥穂各一兩桂去粗皮半兩右搗羅為散毎服一錢用臘茶一錢同葱白湯㸃熱服麝香雙丸出聖濟總錄治傷寒頭痛目眩汗出麝香研龍腦研各一分丹砂一兩半研雄黄研木香赤箭各一兩牛黄研白花蛇肉烏蛇肉各酒浸炙乾蠍炒去毒羚羊角鎊各半兩天南星炮麻黄去根節各二兩白附子生天麻酒浸焙防風去叉零陵香葉三分藿香葉天雄炮製去皮臍各三分右搗羅十四味為末入麝香等五味研勻煉蜜丸如小鷄頭實大毎服二丸細嚼温酒下不拘時候天南星丸出聖濟總錄治傷寒頭痛天南星末二兩石膏末二兩水飛過右填牛膽中用薄荷包更用荷葉外包於風道中掛以清明節候入龍腦少許滴雪水丸如鷄子大毎服一丸嚼薄荷湯下石膏湯出王氏博濟方治傷寒頭痛不可忍石膏研碎麻黄去根節各一兩何首烏去黒皮半兩葛根剉三分右麄搗篩毎服三錢以生薑三片水一盞同煎至八分去滓温服石膏煮散出聖濟總錄治傷寒頭痛石膏研水飛過一兩半旋復花一兩白蒺藜炒甘菊花山梔子仁茵陳蒿各半兩芎藭一兩太隂𤣥精石研半兩右搗羅六味為細末入石膏等研勻毎服三錢以水一盞入荆芥少許同煎至七分不去滓温服不拘時候一字散出聖濟總錄治傷寒頭痛鼻塞芎藭一兩草烏頭炮製去皮尖一兩半石膏研二兩雄黄二錢醋浸一宿焙研右搗羅三味為散入雄黄末研勻毎服一字入臘茶半錢以葱白一寸煎湯㸃服𤓰蒂散出聖濟總錄治傷寒頭疼胸中滿及發寒熱脈𦂳而不大者膈上有痰涎右用𤓰蒂一兩搗羅為散毎服一錢温熱水調下吐涎愈人參湯出聖濟總錄治傷寒頭痛自汗壮熱身體拘急喘促骨節酸疼人參甘草炙各二兩桂去粗皮陳橘皮湯浸去白焙白茯苓去黒皮防風去叉五味子柴胡去苗各一兩附子炮製去皮臍半夏生姜汁浸一伏時各半兩右剉如麻豆大毎服三錢以水一盞入生薑二片棗二枚劈破同煎至七分去滓熱服不拘時候麻黄丸出聖濟總錄治傷寒解表止頭痛兼治破傷風及一切諸風麻黄去根節湯煑掠去沫焙乾烏頭水浸三日洗暴乾炮製去皮臍各四兩天南星炮搗末四兩半夏湯洗去滑七遍四兩白芷三兩石膏泥裹火煨通赤研四兩甘草炙剉一兩龍腦研半兩射香研一分右將八味搗研為末水煑天南星和丸如小彈子大毎服一丸葱茶或葱酒嚼下薄荷茶亦得連二三服此本白龍丸後又加麻黄作六兩寒水石用石膏末為衣治傷寒至佳小小傷風服之立差解表藥中此尤神速白雪丸出聖濟總錄治傷寒頭痛三日以裏可服烏頭去皮臍附子去皮臍白附子天南星天麻麻黄去根節甘草並生用各等分右搗羅為末水浸一宿炊餅和丸如櫻桃大火煅寒水石粉為衣毎服一丸熱酒或葱茶嚼下良久以熱粥投之前胡湯出聖濟總錄治初得傷寒頭痛壮熱前胡去蘆頭半夏湯浸七遍去滑生姜汁製切焙𤣥參堅者旋復花甘草炙剉桂去粗皮黄芩去黒心桔梗剉炒各一兩生乾地黄焙一兩右搗篩毎服五錢以水一盞半生薑五片煎至八分去滓熱服不拘時候四白散出聖濟總錄治傷寒頭痛身熱百節疼痛蒺藜子炒去角白芷白附子炮白殭蠶炒各等分右搗羅為散毎服二錢以清茶或酒調下不拘時候太陽丹出和劑方治頭痛傷寒感風氣積偏正夾腦一切頭疼風壅痰盛咽膈不利並宜服腦子二兩别研川芎甘草白芷各一斤石膏别研二斤大川烏炮去皮臍一斤右為細末蜜同麪糊丸毎兩作一十八粒硃砂為衣毎服一粒薄荷茶嚼下乾葛湯出經驗良方治傷寒頭痛不可忍者石膏二兩麻黄去根節乾葛川芎各一兩右為細末毎服四錢薑三片水一盞煎至七分温服治三陽頭痛出濟生拔萃方羌活防風荆芥升麻葛根白芷柴胡川芎芍藥細辛各等分右以連鬚葱白煎服分兩旋加若隂症頭痛只用温中藥足矣乃理中薑附之類是也石膏湯治太陽病氣逆面赤頭痛目疼不可忍者石膏二兩碎綿裹防風二兩葛根一兩芍藥一兩前胡一兩葱白并根三莖生薑二兩切右以水七升先煑葛根减二