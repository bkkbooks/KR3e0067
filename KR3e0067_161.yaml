body:
  text: 普濟方卷一百六十二明周王朱橚撰喘嗽門咳嗽上氣唾膿血夫咳嗽唾膿血者損肺傷心之故也肺主氣心主血肺感于寒微者則成咳嗽傷于陽脈則有血血于氣相隨而行咳嗽極甚傷血動氣俱乘于肺以津液相搏蘊結成膿故咳嗽而有膿也久咳嗽上氣者是肺氣虛極風邪停滯故其病積月纍年久不瘥則胸背痛面腫甚則唾膿血久咳嗽唾膿血者肺感于寒微則成咳嗽極甚傷于經絡血液蘊結故有膿血氣血俱傷故連滯積久其血黯瘀與膿血相雜而出也方欵冬花丸治三十年上氣咳嗽唾膿血喘急不得卧欵冬花紫菀細辛石斛防風芎藭人參當歸藁本甘草蜀椒白术半夏天雄菖蒲鍾乳桂心麻黃各三兩獨活二兩烏頭芫花附子各一兩桃仁二十枚大棗十五枚右為末蜜丸如梧桐子大每服二十丸酒下日二不知加之酒漬服亦得欵冬花丸治積年咳嗽唾膿血喘急不得卧欵冬花石斛去根紫菀去苖土細辛去苖葉防風去義芎藭人參當歸切焙藁本去苗土甘草炙銼蜀椒去目並閉口炒出汗白术銼天雄炮裂去皮臍菖蒲切各二兩桂去粗皮半兩麻黃去根節湯浸煮掠出沫二兩半夏湯洗七遍去滑焙生薑汁製二兩獨活去蘆頭銼半兩芫花醋浸炒乾鍾乳粉研桃仁湯浸去皮尖雙仁研各二兩右為末和勻煉蜜為丸如梧桐子大每服二十丸煎桑白皮湯下日三夜一補肺湯療咳逆上氣吐膿或吐血胸膈滿痛不能食黃耆一法五兩桂心乾地黃茯苓厚朴乾薑紫菀橘皮當歸五味子逺志去心麥門冬去心各三兩甘草炙鍾乳白石英各二兩桑根白皮人參各三兩大棗二十枚擘右切以水一斗四升煮取四升分四服日三夜一忌海藻菘菜生蔥酸物欵冬花丸治三十年上氣咳嗽唾膿血喘急不得卧欵冬花乾薑蜀椒吳茱茰桂心菖蒲各五分人參細辛芫花紫菀甘草桔梗防風茯苓皂莢各三分右為末蜜和丸如梧桐子大每服三丸酒下每日三服羊肺湯療咳嗽晝夜無間息氣欲絶傷肺唾血鍾乳五兩牡蠣煆桂心各六兩射干桃仁去皮尖貝母橘皮百部根五味子各三兩生薑六兩白石英半夏洗各三兩欵冬花甘草炙厚朴炙各一兩羊肺一具右切以水二斗三升煮羊肺取一斗去肺內諸藥煮取三升分四服日三夜一忌海藻菘菜羊肉餳生蔥貝母散出聖惠方治久咳嗽晝夜不息氣奔欲絶傷肺唾膿血宜服之貝母三分煨微黃桂心一兩射干半兩鍾乳粉一兩桃仁三分浸去皮尖雙仁炒陳橘皮半兩浸去白穰百部半兩五味子一兩白石英二兩細研半夏三分湯洗去滑欵冬花三分甘草半兩炙微赤銼厚朴半兩去皮塗薑汁炒令黃杏仁一兩湯浸去皮尖雙仁炒羊肺一具以水三大碗煮取汁一碗半右為散每服五錢用羊肺汁一大盞煎至五分去滓不計時候溫服欵冬花丸出聖惠方治咳嗽氣逆眠睡不安唾膿血喘急連年不瘥欵冬花一兩杏仁一兩湯浸去皮尖雙仁炒研如膏紫菀一兩去苖土蛤蚧一對頭尾全者酥慢火炙黃柏葉三分白石英一兩半細研水飛人參三分甘草三分炙銼五味子三分白茯苓一兩天門冬一兩半去心焙桂心三分熟地黃二兩乾薑半兩炮鹿角膠三兩搗碎炒黃燥右為末煉蜜和丸搗三二百杵丸如梧桐子大每服三十丸以粥飲送下不拘時葶藶散出聖惠方治肺壅咳嗽唾膿血不得睡卧甜葶藶二兩半隔紙炒令紫色右為末每服二錢水一盞煎至六分不拘時候溫服又療傷肺唾血右用茅根為散每服方寸日三亦可絞取汁飲之主熱渴治一切肺疾咳嗽膿血不止出肘後方右用豬臟一具削薄竹筒盛于煻火中炮令極熱食上喫之一方以黃酒煮食令盡不過二服欵冬花散刪繁療肺偏損胸中應肺偏痛唾血氣短欵冬花當歸各六兩桂心芎藭五味子附子炮各七分細辛貝母各四分乾薑乾地黃白术甘草炙杏仁去皮尖各五分紫菀三分右為散清酒服方寸日二服忌生蔥菜桃李雀肉海藻菘菜豬肉蕪荑黃耆散出聖惠方治咳嗽唾膿血胸滿痛不得能食黃耆一兩銼桂心熟地黃赤茯苓紫菀去苖土陳皮湯浸去白穰當歸五味子麥門冬去心甘草炙赤銼白前人參去蘆各一兩桑白皮一兩半鹿角膠二兩搗碎炒黃燥右為散每服四錢水一中盞入棗三枚煎至六分去滓溫服不拘時茜根散出聖惠方治久咳嗽不瘥氣喘欲絶肺唾膿血茜根三分百合一兩桑白皮一兩銼欵冬花三分貝母半兩煨黃紫蘇葉一兩阿膠一兩搗碎炒黃麥門冬一兩去心焙川升麻半兩熟地黃一兩黃芩一兩甘草半兩炙赤銼杏仁湯浸去皮尖雙仁炒黃三分右為散每服四錢水一中盞入竹茹一分煎至六分去滓不拘時溫服欵冬花丸出千金方治三十年上氣咳嗽唾膿血喘急不得卧欵冬花乾薑桂心紫菀各三分細辛二分杏仁皂莢礜石一作礬石菖蒲烏頭各一分蜀椒五合吳茱茰六合右為末蜜和丸如梧桐子大酒服五丸日三夜二治二十年嗽不過五十日患愈咳嗽喉鳴上氣服一劑永瘥白膠湯出千金方治肺傷咳唾膿血胸滿上氣不能食惡風目暗􅉩足脛寒冷白膠生薑各五兩桂心人參紫菀各二兩大棗二十枚乾地黃切半斤桑白皮切二升芎藭大麻仁飴糖各一升大麥三升右㕮咀水一斗五升煮麥下藥煮取三升分作五服桑白皮煎療咳經年不瘥氣喘欲絶傷肺見血桑白皮切五合白羊肺一具切芍藥十分欵冬花六分茯苓十二分貝母十二分麥門冬六分杏仁六分去皮尖熬為膏升麻十二分生地黃汁一升黃芩十二分蜜一升右切以水一斗煮取三升去滓內杏仁脂地黃汁蜜等微火上煎如魚眼沸攪勿停手取二升二合煎成淨綿夾布濾每服食後含一合日夜三四度老小以意減之微含之佳忌生冷油醋麵魚蒜蕪荑團參飲子出濟生方治病因抑鬱憂思喜怒飢飽失宜致臟氣不平咳嗽膿血漸成肺痿憎寒壯熱羸瘦困頓將成癆瘵人參紫菀茸阿膠蛤粉炒百合蒸細辛洗去苖土欵冬花杏仁去皮尖炒天門冬湯浸去心半夏湯浸七次經霜桑葉五味子各一兩甘草炙半兩右㕮咀每服四錢水一盞半生薑五大片煎至七分去滓食後溫服因氣而嗽者宜加木香咳而唾血有熱者加生地黃咳而唾血有寒者加鍾乳粉因疲極而咳者加黃耆因損咳而唾血者加沒藥藕節咳而嘔逆腹滿不食者加白术仍倍加生薑咳而小便多者加益智仁咳而大便湧者去杏仁加鍾乳粉咳而面浮氣逆者加沉香柑皮煎地黃散出聖惠方治久咳嗽唾膿血四肢瘦弱熟地黃一兩茜根三分白芍藥三分甘草半兩炙赤銼柏葉三分白茯苓三分當歸半兩杏仁三分浸去皮尖雙仁炒黃子芩半兩鹿角膠一兩搗碎炒令燥羚羊角屑半兩貝母半兩煨微黃右為散每服四錢水一中盞入生薑半分煎至六分去滓不拘時溫服欵冬花丸療咳逆氣喘不息不得眠唾血嘔血短氣連年欵冬花十二分杏仁八分去皮尖雙仁煮熬香䜴十八分熬人參二分甘草三分蜀椒三分炒出汗天門冬六分去心乾薑桂心乾地黃各三分右搗篩蜜和丸如彈子含稍稍咽汁日四夜三神良忌海藻菘菜生蔥蕪荑鯉魚紫菀湯治咳嗽吐膿血胸膈滿痞不思食紫菀去苖土欵冬花去梗杏仁去皮尖雙仁炒令黃色生乾地黃麻黃去根節甘草炙銼秦艽去苖土桑根白皮炙銼黃明膠炒燥馬兜鈴糯米右各等分粗搗篩每服五錢水一盞半入棗三枚擘碎同煎至八分去滓食後溫服杏仁湯治肺氣壅熱咳嗽上氣或唾膿血杏仁去皮尖雙仁炒黃色桑根白皮炙銼茈胡去苖各三分甘草炙銼麻黃去根節桔梗去蘆頭欵冬花去梗紫菀去苖土茜根銼半夏湯浸去滑生薑汁製焙右各等分粗搗篩每服五錢水一盞半生薑三片煎至八分去滓溫服補肺白石英散出聖惠方治久咳嗽唾膿血胸滿不能飲食卧則短氣白石英一兩細碎研欵冬花三分桂心半兩鍾乳粉一兩乾薑一分炮裂銼麥門冬一兩去心五味子一兩赤茯苓一兩甘草半兩炙微赤銼桑白皮一兩銼熟地黃一兩半右為散每服三錢水一中盞入生薑半分棗二枚煎至六分去滓不拘時溫服蛤蚧湯治咳嗽唾膿血及肺痿羸瘦涎涕稠粘蛤蚧酒浸酥炙知母焙貝母炮鹿角膠炙令燥甘草炙銼杏仁湯浸去皮尖雙仁炒葛根銼桑根白皮炙銼人參一兩枇杷葉去毛炙各一兩右粗搗篩每服三錢水一盞半煎至八分去滓不拘時溫服阿膠煎治久咳嗽唾膿血阿膠二兩搗碎炒令黃燥薯蕷一兩貝母一兩煨微黃白茯苓一兩天門冬去心一兩半焙酥一兩生地黃汁一升生薑汁一合白蜜二合杏仁一兩湯浸去皮尖雙仁麩炒微黃研如膏右為細末與後五味相和于銀器中以慢火熬令得所用不津器盛不計時候含半棗大咽津鹿角膠散出聖惠方治咳嗽唾膿血日夜不止喘息短氣鹿角膠搗研炒黃柏葉炙令微黃川椒去目及閉口者炒汗出乾薑炮裂白蒺藜微炒去刺麻黃去根節紫菀去苖土人參去蘆頭刺薊銼芫花醋拌炒乾各半兩右為散每服一錢水一小盞煎三兩沸不拘時候溫服紫菀散海藏濟生拔萃治咳嗽唾中有膿血虛癆症肺痿變癰紫菀人參知母貝母桔梗甘草五味子茯苓阿膠各等分右為粗末生薑水煎百部散出聖惠方治咳嗽肩髀漸高唾膿血其味腥鹹百部一兩枳殼一兩麩炒去穰麥門冬一兩去心木通一兩銼天門冬一兩去心紫菀一兩去苖土貝母一兩煨微黃赤茯苓甘草三分炙銼右為散每服四錢水一中盞入生薑半分竹葉二七片煎至六分去滓不拘時候溫服百部丸出聖惠方治咳嗽唾膿血百部二兩黃芩一兩桂心一兩五味子一兩甘草一兩炙微赤銼紫菀一兩去苖土乾薑一兩炮裂銼生地黃一兩茜根一兩右為細末煉蜜為丸如梧桐子大每服三十丸以粥飲下不拘時候服生地黃煎出聖惠方治肺臟虛熱咳嗽咽乾痛時唾膿血生地黃取自然汁八合黑錫三合白蜜三合白沙糖三合生薑汁一合川升麻三兩為末鹿角膠三兩搗碎炒黃酥三兩右件藥都于銀鍋中以慢火煎攪勿住手候稀稠得所以不津器盛之不計時候含一茶匙咽津補肺湯治咳嗽逆唾膿血咽喉悶塞胸滿上氣不能飲食卧則短氣欵冬花三兩桂去粗皮鍾乳粉研乾薑炮裂白石英各三兩麥門冬去心焙四兩五味子炒三兩桑根白皮銼半斤右粗搗篩每服五錢水一盞半入棗二枚擘粳米數十粒煎至一盞去滓溫服日二夜一栝蔞湯治咳嗽吐血喘滿肺痿栝蔞一枚取瓤仁蛤粉一匙同炒黃馬兜鈴炒防己葛根銼貝母去心甘草杏仁湯浸去皮尖雙仁炒阿膠銼入糯米二合同銼炒去米右粗篩每服三錢水一盞蜜半匙煎至七分去滓溫服日三夜一五味子湯出千金方治咳嗽唾膿血牽胸脅痛五味子炒生地黃焙桑根白皮炙銼各一兩桔梗紫菀去苖土續斷甘草炙銼赤小豆各半兩右粗搗篩每服三錢入竹茹少許水一盞半煎至八分去滓溫服日三夜一乾地黃散出聖惠方治肺傷咳嗽唾膿血腹中有氣不欲食惡風目暗足脛酸寒熟地黃一兩白茯苓三分芎藭一兩鹿角膠一兩搗碎炒桂心三分紫菀三分去苖土人參一兩去蘆頭大麻仁一兩右為散每服三錢水一中盞入棗二枚大麥一匙煎至六分去滓不拘時候溫服百部丸出千金方治諸嗽不得氣息唾膿血百部根三兩升麻半兩桂心五味子甘草紫菀去苖土乾薑各一兩右為末蜜和丸如梧桐子大每服二十丸日三以知為度一方去乾薑有桑根白皮一兩粥飲下阿膠散治肺痿嗽血唾血阿膠炒酥二分人參茯苓生乾地黃天門冬水浸去心北五味子各分一白芨二分右白芨别為末餘藥銼散每服三錢水一大盞入蜜二匙秫米百粒薑五片同煎臨熟入白芨少許食後服之桑白皮湯治咳嗽出膿血痰涎桑根白皮炙銼麥門冬去心焙欵冬花各一兩貝母去心甘草炙銼黃