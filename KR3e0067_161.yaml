御米殻七錢半酥炙右為細末每服三錢水一盞入黄蠟如棗核許同煎至八分去滓大溫臨卧服之寜神丹治逺年近日咳𠻳喘滿不得眠卧或因風寒入于腠理不得眠者並皆醫療防風一斤烏梅肉桔梗甜葶藶各半斤人參知母紫蘇葉各四兩右為細末麻黄膏子為丸如彈子大每服一丸水一盞煎至四五沸化開如不開時用匙杓研開臨卧時熱服汗出為度煎藥可用銀石沙磁器内不用銅鐡器服藥後忌房室驢馬肉雁雞猪肉魚鴨等又忌濕麪油膩發病等嗔怒熬麻黄湯法用麻黄五斤去根切作二寸走水洗過用長流水三斗運取于銀石噐内同麻黄熬水至五升將麻黄就于水内一把搓盡去麻黄將麻黄水用羅子隔去净再于銀石沙器内熬成膏㸃些入水中不散為度將前項藥末同麻黄膏子相和勻杵一千以上然後為丸治咳𠻳喘氣不得睡卧宜服桑白皮一兩剉木通一兩剉桔梗三分去蘆頭紫蘇苖三分大腹皮一兩剉欵冬花半兩郁李仁三分湯浸去皮右為散每服三錢水一中盞生薑半分煎至五分去滓不拘時候溫服治咳𠻳晝夜不得睡卧咽喉作聲川烏頭半兩炮裂去皮臍桔梗半兩去蘆頭根乾薑半兩炮裂剉前胡三分去蘆頭射干半兩五味子半兩川椒半兩去目及閉口者炒去汗右為末煉蜜和𢷬二三百杵圓如半棗大每服一丸含嚥津日進三服四服治咳𠻳不得睡卧杏仁三兩湯浸去皮尖雙仁麩炒研如膏黄耆一兩剉酸棗仁一兩㣲炒青橘皮半兩湯浸去白穰甘草半兩炙㣲赤剉桑白皮一兩剉右件藥除杏仁外𢷬羅為末入杏仁膏拌勻錬蜜和搗三百杵丸如梧桐子大每服二十丸不拘時以粥飲下一方有麻黄青龍散一名橘皮五味子湯治咳𠻳上氣不得卧及嘔吐出御藥院人參去蘆頭陳皮去白五味子紫蘇葉各一兩右為末每服三錢水一盞生薑三片煎至七分去滓溫服不拘時知母丸治逺年近日一切喘𠻳連不得睡卧者知母貝母甜葶藶炒黄色杏仁去皮研各等分右為細末用錫餹籠内蒸七遍與藥末相和為丸如豌豆大每服三十丸淡薑湯下蜜湯亦可安眠散治一切咳𠻳夜不得卧睡罌粟殻去蒂稂杏仁烏梅甘草右㕮咀每服半兩白水煎卧服定喘餅子治咳𠻳虚喘悶亂不眠白礬貝母苦葶藶並生各一兩右為細末每服一錢白麪和作餅子慢火燒熟細嚼生薑湯下食後日進二服葶藶子散治咳𠻳引氣不得卧或遍體氣腫或面腫或足腫上氣並主之右用葶藶子三升㣲火炒搗篩為散以清酒五升漬之冬七日夏三日初服如桃大日三夜一冬日二夜二量其氣力取㣲利一二為度如患急困者不得待日滿亦可以綿紬絞即服其葶藶單莖面上葉端出角麄且短又有一種茍芥草葉近根下作竒生角細長取時又須分别前件乃二種也殭蠶湯治𠻳喘喉中如鋸不能睡卧方見喘門喘𠻳類五味子湯治咳𠻳晝减夜加不得眠卧食即吐逆五味子蒺藜子炒去角麻黄去根節熬掠去沫焙桑根白皮剉白石脂杏仁去皮尖雙仁炒百合各一兩半貝母煨去心欵冬花枳殻去穣麩炒紫菀去苖土柴胡去苖各一兩旋覆花半兩桂去麄皮半兩右為散每服五錢水一盞半入生薑五片粳米五十粒煎取八分去滓溫服不拘時候無憂丸治年深日逺咳𠻳涎喘夜卧不安經霜桑葉經霜萆麻葉御米殻去蒂蜜炒各一兩右為細末煉蜜為丸如彈子大每服一丸食後白湯化下日進一服治咳𠻳不得睡杏仁去皮尖人參胡桃肉生薑各等分右擂成膏加熟蜜丸如彈子大臨睡嚼一丸又方一名治痰喘方治咳𠻳不得睡方見喘門喘類咳𠻳熏法方療欱咳烟法鍾乳研白石英研人參丹參研雄黄各七分研水銀研三分烏羊腎脂一具浄紙十張右為末以水銀投藥裹細研使入諸藥羊脂熬取置紙中令匀平使厚一分散藥令周遍剪紙一張作三分痩弱婦人五日用半寸熏未服藥前齋戒五日服藥後一百日忌五辛酒肉此一劑得療五十年上氣悉皆愈忌生血物治咳𠻳欵冬花三錢鵝管石一錢半寒水石二錢雄黄一錢半鍾乳粉一錢半箭草一錢半枯礬半錢官桂一錢半右為細末令病者睡着喚醒急用作筒子燒烟吸之清茶送下治咳𠻳用藥熏方出聖恵方臰黄一錢猪牙皂莢末一錢蠟一分細切膩粉一錢人乳一合大麻仁一合研爛右件藥都以人乳調和令勻以蘆葦筒長一尺二寸破作四片一尺塗藥二寸令空却令相合以綿繫定須令心中通氣餘有一半藥塗在一張蠟紙上裹定筒子煞乾一頭㸃火一頭吸烟逐口嚥下如覺口乾便喫稀粥喫小蜜其烟筒子歇口時權以物塞定如此熏三四遍肺内有蟲即吐出如無蟲亦有黒涎及出血吐便瘥秘方煙筒兒治一切不問逺近日久咳𠻳及婦人胎前産後産前皆治雄黄五錢佛耳草欵冬花各二錢半人參艾葉各三錢右為末以蠟打厚紙濶四寸竪八寸長捲一眼裝藥在内燒煙熏喉煙筒兒雄黄欵冬花各二兩硼砂二錢右為細末雞子青一個攤紙上晒乾做管每日空心火上燒煙吸之一口用茶送下忌酸鹹等物治久冷痰咳𠻳及多年癆𠻳服藥無効者熏法雄黄雌黄不夾石者各半兩二味同研極細蠟三兩右先鎔藥成汁下藥末攪勻候凝刮下用紙三五叚濶五寸長一尺鎔藥蠟塗其面令厚以箭捲成筒子令有藥在裏乾令相著乃拔去箭臨卧熨斗内盛火然筒子一頭令有煙乃就筒子長引氣吸取煙陳米飲下又吸每三吸為一節當大咳𠻳咯出冷涎即以衣覆卧良久汗出若病三五年者二三吸即瘥十年以上痩甚咳聲不絶胸中常有冷痰服過寒藥補㵼俱無効者日一為之不過五七日愈昔有人病𠻳胸中常如氷雪三年治之莫愈用此法即瘥治久𠻳熟艾欵冬花各二錢雌黄末半錢右件用紙𦂳捲燒口吸烟湯送下莨菪子散治十年呷𠻳莨菪子新者木香雄黄無石者研各半兩右為散與雄黄同研令匀用青紙一張先以羊脂塗次以散藥再糝脂上捲裹之早晨空腹燒令煙出吸十嚥每日三度欵冬花熏方治肺虚咳𠻳日久欵冬花木鱉子各一兩右細剉每服二錢燒酒餅慢火焚之吸煙良久吐出涎凡如是熏五六次每次以清茶潤喉次服補肺藥治咳𠻳用藥熏方右熏黄一兩細研以蠟紙一張上用熏黄薄塗令匀與蠟相乳入急捲如上法熏之以吐為度七日將息後喫羊肉羔補之治咳𠻳用藥熏方右以爛青布廣四寸上鋪熟艾上又布少白礬末礬上又布少熏黄末及少鹹又布少䜴末急捲之以火燒令着内乾罐子中以紙縵罐子上面開一小孔以口吸取烟嚥之以吐痰涎為度若心悶時略歇煙盡乃止每日三度作不過三五度瘥三七日慎油膩物治久咳𠻳不瘥熏方右每旦取欵冬花半兩用小蜜拌使潤内于一小鐣中以磁碗合鐣磁碗底上鑽一孔孔中内一小竹筒如無竹葦筒亦得其筒稍長作之碗當相合令宻安筒處以麪埿之勿令通氣鐣下着炭火燒之少時欵冬花煙自筒出則口含筒吸取煙嚥之如覺心少悶須暫舉頭即以指捻筒頭勿使漏烟吸使盡即止凡如是三日一度為之待至六日則飽食羊肉餺飥則便永瘥治咳𠻳腹脹上氣不得卧亦治身體水腫用藥熏之右用蠟紙一張以熟艾匀薄布遍紙上熏黄末一分欵冬花末三分並布艾上著一葦筒捲之每取三寸以麄綿繫定燒下頭吸煙嚥之盡三劑即瘥後斷鹹醋一百日治𠻳熏法及久𠻳不瘥者右以熟艾薄薄布于紙上廣四寸後以硫黄末薄布艾上務令調匀以荻一枚如紙長捲作十枚先以火燒纒下去荻煙從孔出口吸煙嚥之取吐止明旦復熏之如前日熏一二自瘥後食白粥其餘皆忌恐是熏黄如硫黄見火必熖炙欵冬花散治年深日久咳𠻳肺虚及寒熱右欵冬花不拘多少于宻室中如香焚之煙起以筆管吸其烟則嚥之或坐卧處如香焚之不吸亦妙重病數日見効輕者便効一方咽乾口燥清茶送下歌曰逺年咳𠻳人難治休要相醫枉使錢細研欵冬花作善燒煙口吸奔喉咽三竒散治一切咳𠻳不問新舊喘頓不止晝夜無時欵冬花二百文熟乾地黄二兩佛耳草五十文右三味焙乾碾為麄末每次二錢裝猛火于香爐中燒之用紙作筒子一頭大一頭小如粽様安在爐上以口吸嚥盡為度即以清茶嚥下有涎出吐之經驗方陳氏云予家一蒦久苦此疾數令醫治如水投石偶在曲江置得沅州一婢親製此藥兩服而愈普濟方卷一百六十二
