body:
  text: 普濟方卷一百六十二明周王朱橚撰喘𠻳門咳𠻳上氣唾膿血夫咳𠻳唾膿血者損肺傷心之故也肺主氣心主血肺感于寒㣲者則成咳𠻳傷于陽脉則有血血于氣相隨而行咳𠻳極甚傷血動氣俱乗于肺以津液相搏蘊結成膿故咳𠻳而有膿也久咳𠻳上氣者是肺氣虚極風邪停滯故其病積月累年久不瘥則胷背痛面腫甚則唾膿血久咳𠻳唾膿血者肺感于寒㣲則成咳𠻳極甚傷于經絡血液蘊結故有膿血氣血俱傷故連滯積久其血黯瘀與膿血相雜而出也方欵冬花丸治三十年上氣咳𠻳唾膿血喘急不得卧欵冬花紫菀細辛石斛防風芎藭人參當歸藁本甘草蜀椒白术半夏天雄菖蒲鍾乳桂心麻黄各三兩獨活二兩烏頭芫花附子各一兩桃仁二十枚大棗十五枚右為末蜜丸如梧桐子大每服二十丸酒下日二不知加之酒漬服亦得欵冬花丸治積年咳𠻳唾膿血喘急不得卧欵冬花石斛去根紫菀去苖土細辛去苖葉防風去义芎藭人參當歸切焙藁本去苗土甘草炙剉蜀椒去目並閉口炒出汗白术剉天雄炮裂去皮臍菖蒲切各二兩桂去粗皮半兩麻黄去根節湯浸煮掠出沫二兩半夏湯洗七遍去滑焙生薑汁製二兩獨活去蘆頭剉半兩芫花醋浸炒乾鍾乳粉研桃仁湯浸去皮尖雙仁研各二兩右為末和勻煉蜜為丸如梧桐子大每服二十丸煎桑白皮湯下日三夜一補肺湯療咳逆上氣吐膿或吐血胷膈滿痛不能食黄耆一法五兩桂心乾地黄茯苓厚朴乾薑紫菀橘皮當歸五味子逺志去心麥門冬去心各三兩甘草炙鍾乳白石英各二兩桑根白皮人參各三兩大棗二十枚擘右切以水一斗四升煮取四升分四服日三夜一忌海藻菘菜生葱酸物欵冬花丸治三十年上氣咳𠻳唾膿血喘急不得卧欵冬花乾薑蜀椒吴茱茰桂心菖蒲各五分人參細辛芫花紫菀甘草桔梗防風茯苓皂莢各三分右為末蜜和丸如梧桐子大每服三丸酒下每日三服羊肺湯療咳𠻳晝夜無間息氣欲絶傷肺唾血鍾乳五兩牡蠣煆桂心各六兩射干桃仁去皮尖貝母橘皮百部根五味子各三兩生薑六兩白石英半夏洗各三兩欵冬花甘草炙厚朴炙各一兩羊肺一具右切以水二斗三升煮羊肺取一斗去肺内諸藥煮取三升分四服日三夜一忌海藻菘菜羊肉餳生葱貝母散出聖恵方治久咳𠻳晝夜不息氣奔欲絶傷肺唾膿血宜服之貝母三分煨㣲黄桂心一兩射干半兩鍾乳粉一兩桃仁三分浸去皮尖雙仁炒陳橘皮半兩浸去白穣百部半兩五味子一兩白石英二兩細研半夏三分湯洗去滑欵冬花三分甘草半兩炙㣲赤剉厚朴半兩去皮塗薑汁炒令黄杏仁一兩湯浸去皮尖雙仁炒羊肺一具以水三大碗煑取汁一碗半右為散每服五錢用羊肺汁一大盞煎至五分去滓不計時候溫服欵冬花丸出聖恵方治咳𠻳氣逆眠睡不安唾膿血喘急連年不瘥欵冬花一兩杏仁一兩湯浸去皮尖雙仁炒研如膏紫菀一兩去苖土蛤蚧一對頭尾全者酥慢火炙黄栢葉三分白石英一兩半細研水飛人參三分甘草三分炙剉五味子三分白茯苓一兩天門冬一兩半去心焙桂心三分熟地黄二兩乾薑半兩炮鹿角膠三兩𢷬碎炒黄燥右為末煉蜜和丸𢷬三二百杵丸如梧桐子大每服三十丸以粥飲送下不拘時葶藶散出聖恵方治肺壅咳𠻳唾膿血不得睡卧甜葶藶二兩半隔紙炒令紫色右為末毎服二錢水一盞煎至六分不拘時候溫服又療傷肺唾血右用茅根為散每服方寸日三亦可絞取汁飲之主熱渴治一切肺疾咳𠻳膿血不止出肘後方右用猪臟一具削薄竹筒盛于煻火中炮令極熱食上喫之一方以黄酒煮食令盡不過二服欵冬花散刪繁療肺偏損胷中應肺偏痛唾血氣短欵冬花當歸各六兩桂心芎藭五味子附子炮各七分細辛貝母各四分乾薑乾地黄白术甘草炙杏仁去皮尖各五分紫菀三分右為散清酒服方寸日二服忌生葱菜桃李雀肉海藻菘菜猪肉蕪荑黄耆散出聖恵方治咳𠻳唾膿血胷滿痛不得能食黄耆一兩剉桂心熟地黄赤茯苓紫菀去苖土陳皮湯浸去白穣當歸五味子麥門冬去心甘草炙赤剉白前人參去蘆各一兩桑白皮一兩半鹿角膠二兩𢷬碎炒黄燥右為散每服四錢水一中盞入棗三枚煎至六分去滓溫服不拘時茜根散出聖恵方治久咳𠻳不瘥氣喘欲絶肺唾膿血茜根三分百合一兩桑白皮一兩剉欵冬花三分貝母半兩煨黄紫蘇葉一兩阿膠一兩搗碎炒黄麥門冬一兩去心焙川升麻半兩熟地黄一兩黄芩一兩甘草半兩炙赤剉杏仁湯浸去皮尖雙仁炒黄三分右為散每服四錢水一中盞入竹茹一分煎至六分去滓不拘時溫服欵冬花丸出千金方治三十年上氣咳𠻳唾膿血喘急不得卧欵冬花乾薑桂心紫菀各三分細辛二分杏仁皂莢礜石一作礬石菖蒲烏頭各一分蜀椒五合吴茱茰六合右為末蜜和丸如梧桐子大酒服五丸日三夜二治二十年𠻳不過五十日患愈咳𠻳喉鳴上氣服一劑永瘥白膠湯出千金方治肺傷咳唾膿血胸滿上氣不能食惡風目暗􅉩足脛寒冷白膠生薑各五兩桂心人參紫菀各二兩大棗二十枚乾地黄切半斤桑白皮切二升芎藭大麻仁飴糖各一升大麥三升右㕮咀水一斗五升煑麥下藥煑取三升分作五服桑白皮煎療咳經年不瘥氣喘欲絶傷肺見血桑白皮切五合白羊肺一具切芍藥十分欵冬花六分茯苓十二分貝母十二分麥門冬六分杏仁六分去皮尖熬為膏升麻十二分生地黄汁一升黄芩十二分蜜一升右切以水一斗煑取三升去滓内杏仁脂地黄汁蜜等㣲火上煎如魚眼沸攪勿停手取二升二合煎成净綿夾布濾每服食後含一合日夜三四度老小以意減之㣲含之佳忌生冷油醋麪魚蒜蕪荑團參飲子出濟生方治病因抑欝憂思喜怒飢飽失宜致臟氣不平咳𠻳膿血漸成肺痿憎寒壯熱羸痩困頓將成癆瘵人參紫菀茸阿膠蛤粉炒百合蒸細辛洗去苖土欵冬花杏仁去皮尖炒天門冬湯浸去心半夏湯浸七次經霜桑葉五味子各一兩甘草炙半兩右㕮咀每服四錢水一盞半生薑五大片煎至七分去滓食後溫服因氣而𠻳者宜加木香咳而唾血有熱者加生地黄咳而唾血有寒者加鍾乳粉因疲極而咳者加黄耆因損咳而唾血者加沒藥藕節咳而嘔逆腹滿不食者加白术仍倍加生薑咳而小便多者加益智仁咳而大便湧者去杏仁加鍾乳粉咳而面浮氣逆者加沉香柑皮煎地黄散出聖恵方治久咳𠻳唾膿血四肢痩弱熟地黄一兩茜根三分白芍藥三分甘草半兩炙赤剉栢葉三分白茯苓三分當歸半兩杏仁三分浸去皮尖雙仁炒黄子芩半兩鹿角膠一兩搗碎炒令燥羚羊角屑半兩貝母半兩煨㣲黄右為散每服四錢水一中盞入生薑半分煎至六分去滓不拘時溫服欵冬花丸療咳逆氣喘不息不得眠唾血嘔血短氣連年欵冬花十二分杏仁八分去皮尖雙仁煑熬香䜴十八分熬人參二分甘草三分蜀椒三分炒出汗天門冬六分去心乾薑桂心乾地黄各三分右𢷬篩蜜和丸如彈子含稍稍嚥汁日四夜三神良忌海藻菘菜生葱蕪荑鯉魚紫菀湯治咳𠻳吐膿血胸膈滿痞不思食紫菀去苖土欵冬花去梗杏仁去皮尖雙仁炒令黄色生乾地黄麻黄去根節甘草炙剉秦艽去苖土桑根白皮炙剉黄明膠炒燥馬兠鈴糯米右各等分麄𢷬篩每服五錢水一盞半入棗三枚擘碎同煎至八分去滓食後溫服杏仁湯治肺氣壅熱咳𠻳上氣或唾膿血杏仁去皮尖雙仁炒黄色桑根白皮炙剉茈胡去苖各三分甘草炙剉麻黄去根節桔梗去蘆頭欵冬花去梗紫菀去苖土茜根剉半夏湯浸去滑生薑汁製焙右各等分麄𢷬篩每服五錢水一盞半生薑三片煎至八分去滓溫服補肺白石英散出聖恵方治久咳𠻳唾膿血胸滿不能飲食卧則短氣白石英一兩細碎研欵冬花三分桂心半兩鍾乳粉一兩乾薑一分炮裂剉麥門冬一兩去心五味子一兩赤茯苓一兩甘草半兩炙㣲赤剉桑白皮一兩剉熟地黄一兩半右為散每服三錢水一中盞入生薑半分棗二枚煎至六分去滓不拘時溫服蛤蚧湯治咳𠻳唾膿血及肺痿羸痩涎涕稠粘蛤蚧酒浸酥炙知母焙貝母炮鹿角膠炙令燥甘草炙剉杏仁湯浸去皮尖雙仁炒葛根剉桑根白皮炙剉人參一兩枇杷葉去毛炙各一兩右麄𢷬篩每服三錢水一盞半煎至八分去滓不拘時溫服阿膠煎治久咳𠻳唾膿血阿膠二兩𢷬碎炒令黄燥薯蕷一兩貝母一兩煨㣲黄白茯苓一兩天門冬去心一兩半焙酥一兩生地黄汁一升生薑汁一合白蜜二合杏仁一兩湯浸去皮尖雙仁麩炒㣲黄研如膏右為細末與後五味相和于銀器中以慢火熬令得所用不津器盛不計時候含半棗大嚥津鹿角膠散出聖恵方治咳𠻳唾膿血日夜不止喘息短氣鹿角膠𢷬研炒黄栢葉炙令㣲黄川椒去目及閉口者炒汗出乾薑炮裂白蒺藜㣲炒去刺麻黄去根節紫菀去苖土人參去蘆頭刺薊剉芫花醋拌炒乾各半兩右為散每服一錢水一小盞煎三兩沸不拘時候溫服紫菀散海藏濟生拔萃治咳𠻳唾中有膿血虚癆症肺痿變癰紫菀人參知母貝母桔梗甘草五味子茯苓阿膠各等分右為麄末生薑水煎百部散出聖恵方治咳𠻳肩髀漸高唾膿血其味腥鹹百部一兩枳殻一兩麩炒去穣麥門冬一兩去心木通一兩剉天門冬一兩去心紫菀一兩去苖土貝母一兩煨㣲黄赤茯苓甘草三分炙剉右為散每服四錢水一中盞入生薑半分竹葉二七片煎至六分去滓不拘時候溫服百部丸出聖恵方治咳𠻳唾膿血百部二兩黄芩一兩桂心一兩五味子一兩甘草一兩炙㣲赤剉紫菀一兩去苖土乾薑一兩炮裂剉生地黄一兩茜根一兩右為細末煉蜜為丸如梧桐子大每服三十丸以粥飲下不拘時候服生地黄煎出聖恵方治肺臟虚熱咳𠻳咽乾痛時唾膿血生地黄取自然汁八合黒錫三合白蜜三合白沙糖三合生薑汁一合川升麻三兩為末鹿角膠三兩𢷬碎炒黄酥三兩右件藥都于銀鍋中以慢火煎攪勿住手候稀稠得所以不津器盛之不計時候含一茶匙嚥津補肺湯治咳𠻳逆唾膿血咽喉悶塞胸滿上氣不能飲食卧則短氣欵冬花三兩桂去粗皮鍾乳粉研乾薑炮裂白石英各三兩麥門冬去心焙四兩五味子炒三兩桑根白皮剉半斤右麄𢷬篩每服五錢水一盞半入棗二枚擘粳米數十粒煎至一盞去滓溫服日二夜一栝蔞湯治咳𠻳吐血喘滿肺痿栝蔞一枚取瓤仁蛤粉一匙同炒黄馬兠鈴炒防己葛根剉貝母去心甘草杏仁湯浸去皮尖雙仁炒阿膠剉入糯米二合同剉炒去米右麄篩每服三錢水一盞蜜半匙煎至七分去滓溫服日三夜一五味子湯出千金方治咳𠻳唾膿血牽胸脇痛五味子炒生地黄焙桑根白皮炙剉各一兩桔梗紫菀去苖土續斷甘草炙剉赤小豆各半兩右麄𢷬篩每服三錢入竹茹少許水一盞半煎至八分去滓溫服日三夜一乾地黄散出聖恵方治肺傷咳𠻳唾膿血腹中有氣不欲食惡風目闇足脛酸寒熟地黄一兩白茯苓三分芎藭一兩鹿角膠一兩𢷬碎炒桂心三分紫菀三分去苖土人參一兩去蘆頭大麻仁一兩右為散每服三錢水一中盞入棗二枚大麥一匙煎至六分去滓不拘時候溫服百部丸出千金方治諸𠻳不得氣息唾膿血百部根三兩升麻半兩桂心五味子甘草紫菀去苖土乾薑各一兩右為末蜜和丸如梧桐子大每服二十丸日三以知為度一方去乾薑有桑根白皮一兩粥飲下阿膠散治肺痿𠻳血唾血阿膠炒酥二分人參茯苓生乾地黄天門冬水浸去心北五味子各分一白芨二分右白芨别為末餘藥剉散每服三錢水一大盞入蜜二匙秫米百粒薑五片同煎臨熟入白芨少許食後服之桑白皮湯治咳𠻳出膿血痰涎桑根白皮炙剉麥門冬去心焙欵冬花各一兩貝母去心甘草炙剉黄