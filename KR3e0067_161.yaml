御米殼七錢半酥炙右為細末每服三錢水一盞入黃蠟如棗核許同煎至八分去滓大溫臨卧服之寧神丹治逺年近日咳嗽喘滿不得眠卧或因風寒入于腠理不得眠者並皆醫療防風一斤烏梅肉桔梗甜葶藶各半斤人參知母紫蘇葉各四兩右為細末麻黃膏子為丸如彈子大每服一丸水一盞煎至四五沸化開如不開時用匙杓研開臨卧時熱服汗出為度煎藥可用銀石沙磁器內不用銅鐡器服藥後忌房室驢馬肉雁雞豬肉魚鴨等又忌濕麵油膩發病等嗔怒熬麻黃湯法用麻黃五斤去根切作二寸走水洗過用長流水三斗運取于銀石器內同麻黃熬水至五升將麻黃就于水內一把搓盡去麻黃將麻黃水用羅子隔去淨再于銀石沙器內熬成膏點些入水中不散為度將前項藥末同麻黃膏子相和勻杵一千以上然後為丸治咳嗽喘氣不得睡卧宜服桑白皮一兩銼木通一兩銼桔梗三分去蘆頭紫蘇苖三分大腹皮一兩銼欵冬花半兩郁李仁三分湯浸去皮右為散每服三錢水一中盞生薑半分煎至五分去滓不拘時候溫服治咳嗽晝夜不得睡卧咽喉作聲川烏頭半兩炮裂去皮臍桔梗半兩去蘆頭根乾薑半兩炮裂銼前胡三分去蘆頭射干半兩五味子半兩川椒半兩去目及閉口者炒去汗右為末煉蜜和搗二三百杵圓如半棗大每服一丸含咽津日進三服四服治咳嗽不得睡卧杏仁三兩湯浸去皮尖雙仁麩炒研如膏黃耆一兩銼酸棗仁一兩微炒青橘皮半兩湯浸去白穰甘草半兩炙微赤銼桑白皮一兩銼右件藥除杏仁外搗羅為末入杏仁膏拌勻錬蜜和搗三百杵丸如梧桐子大每服二十丸不拘時以粥飲下一方有麻黃青龍散一名橘皮五味子湯治咳嗽上氣不得卧及嘔吐出御藥院人參去蘆頭陳皮去白五味子紫蘇葉各一兩右為末每服三錢水一盞生薑三片煎至七分去滓溫服不拘時知母丸治逺年近日一切喘嗽連不得睡卧者知母貝母甜葶藶炒黃色杏仁去皮研各等分右為細末用錫糖籠內蒸七遍與藥末相和為丸如豌豆大每服三十丸淡薑湯下蜜湯亦可安眠散治一切咳嗽夜不得卧睡罌粟殼去蒂稂杏仁烏梅甘草右㕮咀每服半兩白水煎卧服定喘餅子治咳嗽虛喘悶亂不眠白礬貝母苦葶藶並生各一兩右為細末每服一錢白麵和作餅子慢火燒熟細嚼生薑湯下食後日進二服葶藶子散治咳嗽引氣不得卧或遍體氣腫或面腫或足腫上氣並主之右用葶藶子三升微火炒搗篩為散以清酒五升漬之冬七日夏三日初服如桃大日三夜一冬日二夜二量其氣力取微利一二為度如患急困者不得待日滿亦可以綿紬絞即服其葶藶單莖面上葉端出角粗且短又有一種茍芥草葉近根下作竒生角細長取時又須分别前件乃二種也殭蠶湯治嗽喘喉中如鋸不能睡卧方見喘門喘嗽類五味子湯治咳嗽晝減夜加不得眠卧食即吐逆五味子蒺藜子炒去角麻黃去根節熬掠去沫焙桑根白皮銼白石脂杏仁去皮尖雙仁炒百合各一兩半貝母煨去心欵冬花枳殼去穰麩炒紫菀去苖土柴胡去苖各一兩旋覆花半兩桂去粗皮半兩右為散每服五錢水一盞半入生薑五片粳米五十粒煎取八分去滓溫服不拘時候無憂丸治年深日逺咳嗽涎喘夜卧不安經霜桑葉經霜萆麻葉御米殼去蒂蜜炒各一兩右為細末煉蜜為丸如彈子大每服一丸食後白湯化下日進一服治咳嗽不得睡杏仁去皮尖人參胡桃肉生薑各等分右擂成膏加熟蜜丸如彈子大臨睡嚼一丸又方一名治痰喘方治咳嗽不得睡方見喘門喘類咳嗽熏法方療欱咳煙法鍾乳研白石英研人參丹參研雄黃各七分研水銀研三分烏羊腎脂一具淨紙十張右為末以水銀投藥裹細研使入諸藥羊脂熬取置紙中令勻平使厚一分散藥令周遍剪紙一張作三分瘦弱婦人五日用半寸熏未服藥前齋戒五日服藥後一百日忌五辛酒肉此一劑得療五十年上氣悉皆愈忌生血物治咳嗽欵冬花三錢鵝管石一錢半寒水石二錢雄黃一錢半鍾乳粉一錢半箭草一錢半枯礬半錢官桂一錢半右為細末令病者睡著喚醒急用作筒子燒煙吸之清茶送下治咳嗽用藥熏方出聖惠方臰黃一錢豬牙皂莢末一錢蠟一分細切膩粉一錢人乳一合大麻仁一合研爛右件藥都以人乳調和令勻以蘆葦筒長一尺二寸破作四片一尺塗藥二寸令空却令相合以綿繫定須令心中通氣餘有一半藥塗在一張蠟紙上裹定筒子煞乾一頭點火一頭吸煙逐口咽下如覺口乾便喫稀粥喫小蜜其煙筒子歇口時權以物塞定如此熏三四遍肺內有蟲即吐出如無蟲亦有黑涎及出血吐便瘥祕方煙筒兒治一切不問逺近日久咳嗽及婦人胎前産後産前皆治雄黃五錢佛耳草欵冬花各二錢半人參艾葉各三錢右為末以蠟打厚紙濶四寸竪八寸長捲一眼裝藥在內燒煙熏喉煙筒兒雄黃欵冬花各二兩硼砂二錢右為細末雞子青一個攤紙上晒乾做管每日空心火上燒煙吸之一口用茶送下忌酸鹹等物治久冷痰咳嗽及多年癆嗽服藥無效者熏法雄黃雌黃不夾石者各半兩二味同研極細蠟三兩右先鎔藥成汁下藥末攪勻候凝刮下用紙三五假濶五寸長一尺鎔藥蠟塗其面令厚以箭捲成筒子令有藥在裏乾令相著乃拔去箭臨卧尉斗內盛火然筒子一頭令有煙乃就筒子長引氣吸取煙陳米飲下又吸每三吸為一節當大咳嗽咯出冷涎即以衣覆卧良久汗出若病三五年者二三吸即瘥十年以上瘦甚咳聲不絶胸中常有冷痰服過寒藥補㵼俱無效者日一為之不過五七日愈昔有人病嗽胸中常如氷雪三年治之莫愈用此法即瘥治久嗽熟艾欵冬花各二錢雌黃末半錢右件用紙緊捲燒口吸煙湯送下莨菪子散治十年呷嗽莨菪子新者木香雄黃無石者研各半兩右為散與雄黃同研令勻用青紙一張先以羊脂塗次以散藥再糝脂上捲裹之早晨空腹燒令煙出吸十咽每日三度欵冬花熏方治肺虛咳嗽日久欵冬花木鱉子各一兩右細銼每服二錢燒酒餅慢火焚之吸煙良久吐出涎凡如是熏五六次每次以清茶潤喉次服補肺藥治咳嗽用藥熏方右熏黃一兩細研以蠟紙一張上用熏黃薄塗令勻與蠟相乳入急捲如上法熏之以吐為度七日將息後喫羊肉羔補之治咳嗽用藥熏方右以爛青布廣四寸上鋪熟艾上又布少白礬末礬上又布少熏黃末及少鹹又布少䜴末急捲之以火燒令著內乾罐子中以紙縵罐子上面開一小孔以口吸取煙咽之以吐痰涎為度若心悶時略歇煙盡乃止每日三度作不過三五度瘥三七日慎油膩物治久咳嗽不瘥熏方右每旦取欵冬花半兩用小蜜拌使潤內于一小鐣中以磁碗合鐣磁碗底上鑽一孔孔中內一小竹筒如無竹葦筒亦得其筒稍長作之碗當相合令密安筒處以麵埿之勿令通氣鐣下著炭火燒之少時欵冬花煙自筒出則口含筒吸取煙咽之如覺心少悶須暫舉頭即以指捻筒頭勿使漏煙吸使盡即止凡如是三日一度為之待至六日則飽食羊肉餺飥則便永瘥治咳嗽腹脹上氣不得卧亦治身體水腫用藥熏之右用蠟紙一張以熟艾勻薄布遍紙上熏黃末一分欵冬花末三分並布艾上著一葦筒捲之每取三寸以粗綿繫定燒下頭吸煙咽之盡三劑即瘥後斷鹹醋一百日治嗽熏法及久嗽不瘥者右以熟艾薄薄布于紙上廣四寸後以硫黃末薄布艾上務令調勻以荻一枚如紙長捲作十枚先以火燒纒下去荻煙從孔出口吸煙咽之取吐止明旦復熏之如前日熏一二自瘥後食白粥其餘皆忌恐是熏黃如硫黃見火必熖炙欵冬花散治年深日久咳嗽肺虛及寒熱右欵冬花不拘多少于密室中如香焚之煙起以筆管吸其煙則咽之或坐卧處如香焚之不吸亦妙重病數日見效輕者便效一方咽乾口燥清茶送下歌曰逺年咳嗽人難治休要相醫枉使錢細研欵冬花作善燒煙口吸奔喉咽三竒散治一切咳嗽不問新舊喘頓不止晝夜無時欵冬花二百文熟乾地黃二兩佛耳草五十文右三味焙乾碾為粗末每次二錢裝猛火于香爐中燒之用紙作筒子一頭大一頭小如粽樣安在爐上以口吸咽盡為度即以清茶咽下有涎出吐之經驗方陳氏云豫家一蒦久苦此疾數令醫治如水投石偶在曲江置得沅州一婢親製此藥兩服而愈普濟方卷一百六十二
