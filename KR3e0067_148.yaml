滓薤及米煮為稀粥進兩碗良無方名原本缺前胡橘皮甘草炙各一兩麥門冬三兩去心竹茹生薑各二兩生地黃四兩切右切以水七升煮取二升三合絞去滓分溫三服服如人行六七里進一服忌海藻菘菜蕪荑熱麵豬肉油膩小青龍湯治天行數日或十許日而表不解心下有水熱毒相摶作嘔時服有咳者增損麻黃去節芍藥甘草炙各二兩桂心細辛各一兩右切以水六升煮取二升溫服七合阮本湯方等分雖未嘗用嫌其太溫余增損其分兩以療十餘人皆愈忌海藻菘菜生蔥生菜等橘皮湯治天行壯熱嘔逆不下食橘皮茯苓各三兩生薑四兩右切以水五升煮取一升五合去滓分溫五六服中間任食一日服盡忌大酢蒜麵救急療天行嘔逆不下食入則出出肘後方取羊肝如食法須淡食不過三兩度即止又方出肘後方以雞子一枚於沸湯中煮三兩沸則出水津之外熟內熱吞之神效生蘆根湯治天行後氣膈嘔逆不下食燈心一分生麥門冬十二分去心人參四分生蘆根一大握切右以水一大升煎取八合去滓分溫三服茅根湯治瘟病有熱飲水暴冷厄者茅根葛根各切半斤右以水四升煮取二升稍溫飲之厄止則停治瘟病熱未除重被暴寒入胃熱藴結不散變厄者以單煮梓皮稍稍飲之佳溫病積飲冷結胃中熱入腎中變壯熱大厄者服梓皮溫厄得止者也夫腎中有熱者病瘥後足心皮膚喜剝脫去頭鬚秃落是其候也治溫病有熱飲水暴冷枇杷飲子枇杷葉拭去毛茅根各半斤右切以水四升煮取二升稍稍飲之前胡湯治時行疫癘壯熱惡寒食即吐逆前胡去蘆頭生地黃焙麥門冬去心焙陳橘皮湯浸去白焙甘草炙人參各半兩右粗搗篩每服三錢匕水一鍾竹葉七片煎至七分去滓溫服即差柴胡湯治時行病疫癘數日未得汗渾身壯熱嘔逆不下食柴胡去苖升麻大黃銼炒各一兩桂去粗皮甘草炙枳實去瓤麩炒知母焙各三分鱉甲醋炙去裙襴一兩一分梔子仁一分麻黃去根節一兩半右粗搗篩每服三錢匕水一盞半入生薑三片煎至七分去滓溫服前胡湯治時氣壯熱頭痛嘔逆前胡去蘆頭知母焙犀角屑鎊葛根銼赤芍藥各一兩石膏二兩碎右粗搗篩每服五錢匕以水一盞半入生薑三片拍碎蔥白二寸切煎至八分去滓溫服不計時候白术湯治時氣出汗吐下後四肢羸劣嘔逆減食白术銼炒黃茋銼細人參厚朴去粗皮生薑汁炙透白茯苓去黑皮桔梗銼炒桂去粗皮陳橘皮湯浸去白瓤甘草炙銼各一兩右粗搗篩每服五錢匕以水一盞半煎至八分去滓溫服不拘時候治天行嘔逆吐不下食用半夏半兩湯浸洗七遍去滑用生薑一兩同銼碎以水一大盞煎至六分去滓分溫二服不拘時候時氣心腹痞滿論夫時氣太陽少隂并病脈浮緊反入裏則作痞痞者心下滿也病發於隂者不可下下之則心下痞按之自軟但氣痞耳故不可下也若熱毒氣乘心則心下痞滿面赤目黃狂言恍惚者此為有實宜吐下之方鱉甲散出聖惠方治時氣熱毒不退大便祕澀心腹痞滿飲食不下精神昏亂恍惚狂言脈候洪數鱉甲塗醋炙令黃去裙襴赤茯苓桔梗去蘆頭人參去蘆頭檳榔茵陳白蘚皮麥門冬去心川大黃銼碎微炒各一兩甘草炙微赤銼陳橘皮湯浸去白瓤焙枳殼麩炒微黃去瓤各一兩右為散每服五錢以水一大盞入生薑汁半分煎至五分去滓不計時候溫服前胡散出聖惠方治時氣心下痞滿胸膈不利前胡去蘆頭赤芍藥木香青橘皮湯浸去白焙檳榔各一兩右為散每服五錢以水一中盞煎至六分去滓不計時候溫服半夏散出聖惠方治時氣若吐下後發汗後心下痞滿氣上衝胸起即頭眩脈沈緊者半夏湯洗七遍去滑白术甘草炙微赤銼赤茯苓桂心人參去蘆頭訶䔧勒用皮前胡去蘆頭各一兩右為散每服五錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服前胡散出聖惠方治時氣心腹痞滿身體疼痛煩熱嘔逆前胡去蘆頭半夏湯浸七遍去滑枳殼麩炒微黃去瓤黃芩人參去蘆頭桔梗去蘆頭檳榔各一兩赤芍藥甘草炙微赤銼各半兩右為散每服五錢以水一中盞入生薑半分棗三枚煎至五分去滓不計時候溫服陳橘皮散出聖惠方治時氣已汗下後脾胃氣虛心下痞滿腹中雷鳴陳橘皮三兩湯浸去白瓤焙人參半兩去蘆頭乾薑炮銼甘草炙微赤銼半夏湯洗七遍去滑赤茯芩桔梗去蘆頭白术木香各一兩右為散每服五錢以水一中盞煎至六分去滓不計時候溫服桔梗散出聖惠方治時氣心腹痞滿氣喘痰涎不絶桔梗去蘆頭半夏湯洗七遍去滑赤茯苓各三分前胡一兩去蘆頭旋覆花大腹皮銼枳殼麩炒微黃去瓤赤茯苓甘草炙微赤銼各半兩右為散每服四錢以水一中盞入生薑半分煎至五分去滓不計時候溫服赤茯芩散出聖惠方治時氣氣壅上衝心腹痞滿坐卧不安赤茯苓赤芍藥紫蘇莖葉各三分枳殼麩炒微黃去瓤大腹皮銼甘草炙微赤銼各半兩百合郁李仁湯浸去皮尖微炒各一兩右為散每服四錢以水一中盞煎至六分去滓不計時候溫服治時氣飲水過多水結心下痞滿川大黃銼碎微炒川朴硝各一兩甘遂一錢煨金黃右為散每服不計時候溫服調下一錢以水利為度治時氣飲水過多心下痞硬痛用莞花半斤以醋拌令勻以慢火炒熱用帛褁尉之冷即更炒以效為度治溫氣痺腫出本草用赤小豆和桑根白皮煮食之普濟方卷一百四十九
