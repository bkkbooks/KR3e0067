滓薤及米煮為稀粥進兩碗良無方名原本缺前胡橘皮甘草炙各一兩麥門冬三兩去心竹茹生薑各二兩生地黄四兩切右切以水七升煮取二升三合絞去滓分温三服服如人行六七里進一服忌海藻菘菜蕪荑熱麫猪肉油膩小青龍湯治天行數日或十許日而表不解心下有水熱毒相摶作嘔時服有欬者増損麻黄去節芍藥甘草炙各二兩桂心細辛各一兩右切以水六升煮取二升温服七合阮本湯方等分雖未嘗用嫌其太温余増損其分兩以療十餘人皆愈忌海藻菘菜生葱生菜等橘皮湯治天行壯熱嘔逆不下食橘皮茯苓各三兩生薑四兩右切以水五升煮取一升五合去滓分温五六服中間任食一日服盡忌大酢蒜麫救急療天行嘔逆不下食入則出出肘後方取羊肝如食法須淡食不過三兩度即止又方出肘後方以鷄子一枚於沸湯中煮三兩沸則出水津之外熟内熱吞之神效生蘆根湯治天行後氣膈嘔逆不下食燈心一分生麥門冬十二分去心人參四分生蘆根一大握切右以水一大升煎取八合去滓分温三服茅根湯治瘟病有熱飲水暴冷呃者茅根葛根各切半斤右以水四升煑取二升稍温飲之呃止則停治瘟病熱未除重被暴寒入胃熱藴結不散變呃者以單煮梓皮稍稍飲之佳温病積飲冷結胃中熱入腎中變壯熱大呃者服梓皮温呃得止者也夫腎中有熱者病瘥後足心皮膚喜剥脫去頭鬚秃落是其候也治温病有熱飲水暴冷枇杷飲子枇杷葉拭去毛茅根各半斤右切以水四升煮取二升稍稍飲之前胡湯治時行疫癘壯熱惡寒食即吐逆前胡去蘆頭生地黄焙麥門冬去心焙陳橘皮湯浸去白焙甘草炙人參各半兩右麄搗篩每服三錢匕水一鍾竹葉七片煎至七分去滓温服即差柴胡湯治時行病疫癘數日未得汗渾身壮熱嘔逆不下食柴胡去苖升麻大黄剉炒各一兩桂去粗皮甘草炙枳實去瓤麩炒知母焙各三分鼈甲醋炙去裙襕一兩一分梔子仁一分麻黄去根節一兩半右麄搗篩每服三錢匕水一盞半入生薑三片煎至七分去滓温服前胡湯治時氣壯熱頭痛嘔逆前胡去蘆頭知母焙犀角屑鎊葛根剉赤芍藥各一兩石膏二兩碎右麄搗篩每服五錢匕以水一盞半入生薑三片拍碎葱白二寸切煎至八分去滓温服不計時候白术湯治時氣出汗吐下後四肢羸劣嘔逆减食白术剉炒黄茋剉細人參厚朴去粗皮生薑汁炙透白茯苓去黑皮桔梗剉炒桂去粗皮陳橘皮湯浸去白瓤甘草炙剉各一兩右麄搗篩每服五錢匕以水一盞半煎至八分去滓温服不拘時候治天行嘔逆吐不下食用半夏半兩湯浸洗七遍去滑用生薑一兩同剉碎以水一大盞煎至六分去滓分温二服不拘時候時氣心腹痞滿論夫時氣太陽少隂并病脉浮緊反入裏則作痞痞者心下滿也病發於隂者不可下下之則心下痞按之自軟但氣痞耳故不可下也若熱毒氣乘心則心下痞滿面赤目黄狂言恍惚者此為有實宜吐下之方鼈甲散出聖惠方治時氣熱毒不退大便秘澁心腹痞滿飲食不下精神昏亂恍惚狂言脉候洪數鼈甲塗醋炙令黄去裙襴赤茯苓桔梗去蘆頭人參去蘆頭檳榔茵陳白蘚皮麥門冬去心川大黄剉碎微炒各一兩甘草炙微赤剉陳橘皮湯浸去白瓤焙枳殻麩炒微黄去瓤各一兩右為散每服五錢以水一大盞入生薑汁半分煎至五分去滓不計時候温服前胡散出聖惠方治時氣心下痞滿胷膈不利前胡去蘆頭赤芍藥木香青橘皮湯浸去白焙檳榔各一兩右為散每服五錢以水一中盞煎至六分去滓不計時候温服半夏散出聖惠方治時氣若吐下後發汗後心下痞滿氣上衝胷起即頭眩脉沈緊者半夏湯洗七遍去滑白术甘草炙微赤剉赤茯苓桂心人參去蘆頭訶䔧勒用皮前胡去蘆頭各一兩右為散每服五錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候温服前胡散出聖惠方治時氣心腹痞滿身體疼痛煩熱嘔逆前胡去蘆頭半夏湯浸七遍去滑枳殻麩炒微黄去瓤黄芩人參去蘆頭桔梗去蘆頭檳榔各一兩赤芍藥甘草炙微赤剉各半兩右為散每服五錢以水一中盞入生薑半分棗三枚煎至五分去滓不計時候温服陳橘皮散出聖惠方治時氣已汗下後脾胃氣虚心下痞滿腹中雷鳴陳橘皮三兩湯浸去白瓤焙人參半兩去蘆頭乾薑炮剉甘草炙㣲赤剉半夏湯洗七遍去滑赤茯芩桔梗去蘆頭白术木香各一兩右為散每服五錢以水一中盞煎至六分去滓不計時候温服桔梗散出聖惠方治時氣心腹痞滿氣喘痰涎不絶桔梗去蘆頭半夏湯洗七遍去滑赤茯苓各三分前胡一兩去蘆頭旋覆花大腹皮剉枳殻麩炒微黄去瓤赤茯苓甘草炙微赤剉各半兩右為散每服四錢以水一中盞入生薑半分煎至五分去滓不計時候温服赤茯芩散出聖惠方治時氣氣壅上衝心腹痞滿坐卧不安赤茯苓赤芍藥紫蘇莖葉各三分枳殻麩炒㣲黄去瓤大腹皮剉甘草炙㣲赤剉各半兩百合郁李仁湯浸去皮尖微炒各一兩右為散每服四錢以水一中盞煎至六分去滓不計時候温服治時氣飲水過多水結心下痞滿川大黄剉碎㣲炒川朴硝各一兩甘遂一錢煨金黄右為散每服不計時候温服調下一錢以水利為度治時氣飲水過多心下痞硬痛用莞花半斤以醋拌令匀以慢火炒熱用帛褁熨之冷即更炒以效為度治温氣痺腫出本草用赤小豆和桑根白皮煑食之普濟方卷一百四十九
