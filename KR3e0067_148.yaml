body:
  text: 普濟方卷一百四十九明周王朱橚撰時氣門時氣發狂論夫時氣發狂者由熱毒氣盛則棄衣而走登高而歌或不食數日踰垣上屋非是素所能也皆隂陽爭氣外并於陽四肢者諸陽之本也熱盛則四肢實則能登高而歌熱盛於身故棄衣而走狂言妄見聞皆熱毒氣盛所為也方梔子散出聖惠方治時氣熱毒攻心面目俱赤發狂不識人梔子仁葳㽔茯苓麥門冬去心知母川升麻黃芩犀角屑沙參去蘆川大黃銼碎微炒甘草炒微赤銼各一兩右為散每服四錢以水一中盞煎至六分去滓不計時候溫服治時氣心神狂躁言語無度出聖惠方雞子二枚取清白蜜半合生地黃汁一合川大黃半兩銼碎微炒杵右相和令勻頓服之以利為度白蘚皮散白蘚皮一兩半大青羚羊角屑玄參梔子仁子芩川大黃銼碎微炒甘草炙微赤銼地骨皮各三分右為散每服五錢以水一大盞煎至五分去滓不計時候溫服又方出聖惠方麥門冬三兩去心杏仁二兩湯浸去皮尖雙仁麩炒微黃甘草一兩炙微赤銼白蘚皮二兩黃芩一兩生乾地黃二兩右為散每服五錢以水一大盞入蔥白二莖煎至五分去滓不計時候溫服犀角散出聖惠方治時氣熱毒攻心發狂煩亂不得睡卧犀角屑龍齒子芩沙參去蘆頭葳㽔麥門冬去心川升麻杏仁湯浸去皮尖雙仁麩炒微黃赤茯苓赤芍藥各一兩大青枳殼麩炒微黃去瓤甘草炙微赤銼各三分右為散每服五錢以水一大盞煎至五分去滓不計時候溫服治時氣發狂呌呼不識人出聖惠方黃連去髮秦芁去苖梔子仁各一兩鐵粉二兩右為散每服不計時候以新汲水調下二錢又方出聖惠方梔子仁半兩豉一合蔥白五莖右以水二大盞煎去滓分溫二服治時氣發狂出聖惠方寒水石馬牙硝各一兩右細研如麵不計時候以新汲水調下一錢又方出聖惠方秦芁去苗大青甘草炙微赤銼各半兩右為散不計時候以生地黃汁調下二錢服治時氣熱盛癲狂或時昏沈出聖惠方寒水石半兩硃砂鉛霜各一分右俱研如粉以軟飯和丸如梧桐子大每服不計時候以溫水下十丸治時氣得汗後心神狂亂出聖惠方鐵粉半兩野豬糞麩炒半兩生地黃二兩燒灰右為末以粟米飯和丸如梧桐子大不計時候以人參湯下二十丸大黃丸出聖惠方治時行氣已得汗熱毒不解心煩躁悶言語不定小便赤澀大便不通狂亂欲走大黃二兩銼碎微炒黃芩一兩半梔子仁一兩半大青二兩龍膽一兩去蘆頭川朴硝二兩細研苦參一兩銼右為末入朴硝勻煉蜜和搗三五百杵丸如梧桐子大不計時候以麥門冬湯下三十丸鐵粉丸出聖惠方治時氣熱毒心神發躁狂亂欲走鐵粉一兩研犀角屑一兩硃砂半兩細研苦參銼一兩甘草二兩銼生用朴硝細研一兩右為末令勻煉蜜和丸如梧桐子大不計時候以人參湯下三十丸又方出聖惠方以藍靛半大匙用新汲水一盞調令勻頓服之治時氣天行發狂熱疾用糞清以臘月截淡竹去青皮浸滲取汁服鎮心散治時氣汗後發狂用緊白龍骨不拘多少為細末每服二錢新汲水調下效治天行病六七日熱盛心煩狂見鬼者右絞人屎汁飲數合一方治時行大熱狂走用多年乾者搗末沸湯沃汁服之治瘟病大熱狂言出本草取白頸蚯蚓破去土鹽拌日暴須臾成水飲其汁皆差若患天行熱狂出本草以甘蔗搗絞汁服甚良治天行熱狂煩悶消渴出本草以芭蕉根絞汁服之除煩悶解時疾狂熱退胸膈熱及消酒毒出本草用小麥苗絞汁服之時氣發斑論夫時氣在表已發汗未解或吐下後毒氣不散煩躁謬語此為表虛裏實氣躁於外故身體發斑如錦文凡發斑不可用發表藥令瘡開泄更增斑爛虛故也方升麻散出聖惠方治時氣表裏不解熱毒在臟致斑瘡升麻犀角屑玄參秦芁去苗子芩柴胡去苗杏仁湯浸去皮尖雙仁麩炒微黃甘草炙微赤兩銼各一右為散每服五錢以水一中盞煎至五分去滓不計時候溫服又方出聖惠方玄參川升麻甘草炙微赤銼各一兩右為散每服五錢以水一大盞煎至五分去滓不計計時候溫服羚羊角散出聖惠方治時氣壅毒不退發班遍身煩熱大小便不利羚羊角屑梔子仁麥門冬去心玄參川麻黃川大黃銼碎微炒黃芪銼赤芍藥甘草炙微赤銼各一兩右為散每服五錢以水一大盞煎至五分去滓不計時候溫服葛根散出聖惠方治冬溫未即為病至夏得熱其冬溫毒氣始出肌中斑斕癮疹如錦文喘咳悶嘔吐清涎葛根銼陳橘皮湯浸去白瓤焙麻黃去根節知母黃芩杏仁湯浸去皮尖雙仁麩炒微黃甘草炙微赤銼各一兩外臺祕要用各二兩右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服外臺祕要切以水七升煮取三升分溫三服嘔吐當先定後便宜消息忌海藻菘菜名葛根橘皮湯治時氣赤班瘡出後胸中惡熱瘡盛出聖惠方雞子二枚去殼釅醋二合豬膽汁三合右藥相和煎十餘沸放溫不計時候分溫三服治時氣熱毒在臟腑中欲發赤斑出聖惠方地黃汁五合䜴二合麝香一錢細研右於鍋中以鍊成豬脂半斤相和煎十餘沸濾去滓入麝香攪令勻每服二合盡服之毒當從肉中為汗出便愈又方出聖惠方以生蝦蟇一枚去腸肚爛研以水一大盞絞取汁頓服之或五月五日午時收者燒灰細研冷水調服益佳治天行熱病若發赤黑斑如疹出活人書用青木香二兩以水二升煮取一升頓服之效卑膏湯出活人書治時行溫毒發斑大疫難救病源夫人冬月觸冒寒毒者至春始發病初在表或已發汗吐下而表證未罷毒氣不散故發斑瘡又冬月天時溫暖人感乖候之氣未即發病至春又被積寒所折毒氣不得泄至夏遇熱其春寒解冬溫毒始發出於肌膚斑斕癮疹如錦文也生地黃半斤切打碎好豉一升右以豬膏二斤合前藥煎五六沸令三分減去滓研雄黃麝香如大豆者內中攪勻盡服之毒便從皮中出則愈忌蕪荑黑奴丸出肘後方治溫毒發赤斑者五死一生黑斑者十死一生大疫難救方見本門時氣六日類黑奴丸同治天行斑瘡須臾遍身皆戴白漿此是惡毒氣用冬葵菜葉煮以蒜􅐽啖之則止治天行時病發斑瘡頭面及身須臾周匝狀如火燒瘡皆戴白漿隨沒隨生不治數日必死治後瘡盤黯黑一歲方減此惡毒之氣所為用水煮升麻綿漬洗之酒煮尤妙但痛難忍黃連橘皮湯出活人書治冬溫未即病致春被積寒所折不得發至夏熱其春寒解冬溫毒始發出肌中斑斕癮疹如錦紋而咳心悶嘔吐清汁眼赤口瘡下部亦生瘡黃連四兩去鬚橘皮杏仁去皮尖雙仁麻黃去節枳實炙亦用枳殼葛根各二兩厚朴炙甘草炙各一兩右銼以水八升煮取三升分三服令盡且稍息下當先止忌豬肉冷水海藻菘菜等漏蘆橘皮湯治冬溫未即病至春被積寒所折不得發至夏熱其春寒解冬溫毒始發出肌中斑斕癮疹如錦紋而咳心悶嘔吐清汁眼赤口瘡下部亦生瘡漏蘆橘皮甘遂麻黃去節杏仁去皮尖雙仁黃芩各二兩右銼以水九升煮取三升分四服得下為佳下後餘外證未除更服葛根橘皮湯方在前小品方忌海藻菘菜等一方有知母枳實白薇升麻大黃甘草為十二味治天行發斑瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨沒隨生若不急治數日即死方見本門時氣發豌豆瘡類治時行病發瘡治時氣發瘡癮用葡萄研酒食之甚效治時氣行病發瘡用升麻五兩以水二升入蜜同煎三沸半服半傅瘡上差時氣發豌豆瘡論夫時氣發豌豆瘡者是熱毒氣攻於臟腑餘氣流於肌肉遂於皮膚毛孔之中結成此瘡所出如豌豆顆因以名之但以解熱毒之藥其瘡即止脈洪數者是其候也方犀角散出聖惠方治時氣發豌豆瘡出後疼痛心神煩悶犀角屑丁香董陸香木香各半兩玄參川升麻各一兩麝香一分右為散每服二錢以水一中盞煎至五分去滓不計時候服又方出聖惠方用黃連二兩去鬚為散每服三錢以水一中盞煎至五分去滓不計時候溫服治時氣發豌豆瘡如爪甲大赤黑色者出聖惠方羊膽七枚取汁羊脂三兩右二味相和於銀鍋中煎五七沸待冷摩傅瘡上日四五用之又方出活人書用川芒硝二兩細研以豬膽汁和塗於瘡上勿令動著直候痂落無瘢仍卧黃土末上良此病小便澀有血者中壞也瘡皆黑靨不出膿者死不療治時氣發豌豆瘡出聖惠方以好白蜜通身塗於瘡上亦可救數食蜜如瘡爛痛可用細研黃土傅之治時氣熱毒攻發豌豆瘡出聖惠方用苦參二兩細銼以水二大盞煎至一盞去滓分為二服日三四服之治時氣發豌豆瘡初覺出聖惠方用川大黃半兩銼碎微炒以水一大盞煎至七分去滓分為二服日三四服之又方出千金方用青黛半兩細研以新汲水調服之日三四服一方用真波斯青黛大如棗又方出千金方用木香一兩搗碎以水一大盞煎至六分去滓不計時候溫服之聖濟録用二兩以水三升煮取一升頓服之治時氣發豌豆瘡亦治六畜時氣熱病出千金方用濃煮黍穰汁洗之若誤使穄穰不即差聖濟總録瘡若黑者搗蒜封之治傷寒時氣熱毒豌豆瘡出幼幼新書用樺皮木銼煎汁溫服取安又方治時氣熱病豌豆瘡用蕓薹煮汁洗之又方出千金方若赤黑發如芥大者煎羊脂摩傅之又方出千金方用小豆屑雞白和傅又方出千金方用婦人月水帛拭之又方出千金方小兒著用取月水汁和水浴之治時行病發瘡出肘後方用好蜜遍身摩瘡上亦可以蜜煎升麻摩之并數數拭之外臺祕要肘後比嵗有病天行發斑瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨沒隨生不即療劇者數日必死得差後瘡瘢紫黑黯彌嵗方滅此惡毒之氣也世人云以建武中於南陽擊虜所得仍呼為虜瘡諸醫恭詳治療用之有效治傷寒時行熱毒發瘡頭面及身須臾周匝狀如火瘡皆帶白漿隨沒隨生葵菜煮爛蒜􅐽各不拘多少右拌勻初患急食之不早治殺人但差後瘡瘢色黑彌嵗方滅此是惡毒時氣也又方出肘後方用水濃煮升麻汁漬綿洗之若酒漬彌佳但燥痛難忍也水解散治天行熱氣則生疱瘡疼痛解肌出汗麻黃一兩去節黃芩芍藥桂心各二分右搗篩暖水調服二方寸匕覆令出汗日再服差者減之忌海藻菘菜龍腦散治時疾天行豌豆瘡赤瘡子未透心煩狂躁氣喘妄語或見神鬼以龍腦一錢細研旋滴豬心血和丸如雞頭大每服一丸紫草湯下少時心神便定得睡復發透依常將息取安治時氣病骨中熱生豌豆瘡疱瘡飲鐵漿瘥治豌豆瘡出本草服油麻一升須利即不生白漿大效又方用蔓菁根搗汁挑瘡破傅在上三食時時氣口瘡論夫時氣發汗吐下之後表裏俱虛毒氣未散攻心脾上焦熱燥故口舌生瘡也方升麻散出聖惠方治時氣熱盛口中生瘡川升麻木通銼射干麥門冬去心蘆根羚羊角屑一兩右為散每服五錢以水一大盞煎至五分去滓不計時候溫服大青散出聖惠方治時氣咽痛口瘡煩躁頭重大青黃芩川升麻麥門冬去心梔子仁甘草炙微赤銼各一兩右為散每服四錢以水一中盞入竹葉三七片煎至六分去滓不計時候溫服麥門冬散出聖惠方治時氣熱盛昏沈如醉及腹脅痛百節痠疼舌裂生瘡麥門冬一兩去心川升麻三分柴胡一兩去苖赤芍藥三分淡竹葉三分甘草三分微黃銼石膏二兩豉二合右為散每服五錢以水一大盞入蔥白二莖煎至五分去滓不計時候溫服治時氣心脾臟熱毒舌裂滿口生瘡出聖惠方川升麻一兩黃蘖半兩銼苦竹葉半兩射干三分大青半兩龍膽玄參生乾地黃各半兩右為散每服五錢以水一大盞煎至五分去滓入蜜半合攪勻不計時候徐徐含咽之犀角散出聖惠方治時行氣心脾臟熱毒上衝遍口生瘡大青半兩犀角屑玄參各一兩胡黃連半兩川升麻甘草生用各三分右為散