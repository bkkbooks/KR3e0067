body:
  text: 普濟方卷二百四十二明周王朱橚撰腳氣門風濕腳氣附論夫腳氣痺攣者寒氣多也寒摶於筋脈而為痛則筋急不能轉側行步艱難甚則不可屈伸也方羌活禦風湯治腎肝筋骨虛弱言語難精神昏憒及治風濕內弱風熱體重或瘦一肢偏枯或肥而半身不遂心亂則百病生靜則萬病息是以此能安定心神調養陰陽使無偏勝羌活甘草防風去蘆黃茋去蘆人參去蘆蔓荆子川芎細心去苖葉枳殼去穰炒地骨皮去骨麻黃知母去皮甘菊薄荷去枝枸把當歸去蘆獨活白芷杜仲炒去系秦艽去蘆柴胡去苖半夏厚朴薑製熟地黃防己各二兩芍藥去皮黃芩去黑石膏四兩生地黃白茯苓去皮三兩蒼术四兩桂一兩淨前胡三兩右銼每服一兩水二盞煎至一盞去滓溫服如遇天隂加生薑三片煎空心一服臨卧再煎滓服更有四時加減之法烏蛇丸出直指方治風寒腳氣隱痛痺癢烏蛇四兩酒浸取肉虎骨醋浸二兩巴戟去心蓯蓉酒浸黃松柏枝酒浸官桂防風獨活續斷五加皮薏苡仁當歸川芎木香各半兩乳香乾生薑一分石斛半兩右為末酒麵糊丸如梧桐子大每服四十丸木瓜橘皮煎湯送下加味獨活寄生湯出濟生方治風傷腎經虛弱作卧當風著濕得腰痛若不速治流入腳膝乃為偏枯冷痺緩弱痛腫或腰攣痛腳重痺癢正冝服之獨活三兩桑寄生杜仲去系細心去苖牛膝去苖酒浸秦艽去心茯苓去皮白芍藥桂心不見火芎藭防風去蘆甘草炙人參熟地黃洗蒸當歸去蘆二兩右為銼散每服四錢水二盞煎空心服氣虛下利或中脘不快者除地黃加生薑并治新産婦人腹痛不得轉動及腰腳攣痺弱不屈伸此方最除風消血一方有附子一枚無寄生人參甘草當歸若人將治􅊓癤風並腳氣流注甚妙為丸加乳香沒藥酒服效小續命湯出經驗良方治男女久近腳氣風濕漢防己桂去粗皮人參去蘆杏仁去皮白芍藥甘草麻黃去根芎藭一兩防風去蘆一兩半何首烏四兩川牛膝一兩黃芩去黑心草烏頭去皮切片半兩附子去皮尖半兩右為細末用大木瓜二箇好酒一瓶小鍋炭火慢煮十分煉去皮穰於瓦盆內研爛搜和前藥如硬燥就用煮木瓜酒添搜和為丸如梧桐子大每服三十丸空心溫酒下常用服此藥去根黃茋湯治風濕腳氣黃耆炙銼桂去粗皮芍藥各三兩細辛麥門冬去心赤茯苓去黑皮當歸切焙橘皮去白人參前胡去蘆頭甘草炙銼二兩半夏四兩烏頭十五個去皮蜀椒去目及合口者炒汗出一兩右銼如麻豆每服五錢半水一盞半生薑三片大棗三枚擘破同煎至一盞去滓溫服日三夜一海桐皮散治風毒流入腳膝行履艱難向夜筋脈痺攣痛海桐皮銼獨活去蘆五加皮銼防風去乂郁李仁炒去皮一兩杜仲去粗皮炙銼枳殼去穰薏苡仁炒牛膝酒浸虎脛骨醋炙惡實炒熟乾地黃焙各一兩半朴硝另研二兩右為散如郁李仁膏並朴硝同研勻服每二錢半溫酒調下早晚食後夜卧各一服牛膝丸治風濕毒氣留滯經絡壅遏榮衛致腳膝腫痛不仁牛膝去苖酒浸肉蓯蓉酒浸防風去仁海桐皮銼自然銅煆醋淬七宿葳靈仙狗脊去毛烏頭炮裂去皮各一兩乳香研半兩骨碎補去毛四兩地龍去土炒二兩沒藥研半兩木鱉子去殼炒四兩淨右除乳香沒藥外搗羅為細末再入研者藥和勻酒煮麵糊丸如梧桐子大每服三十丸溫酒空心食前服加減芎芷香蘇散出經驗良方治男女初患腳氣有筋一條自腳脛骨至臂及腰起痛皆因風濕而感先須發散川芎甘草香附子白芷縮砂仁陳皮蘇葉萆薢川獨活荆芥穗乾木瓜檳榔各等分右為粗末每服四錢水一盞半生薑三片棗二枚併煎三四服腳氣稍愈可再下藥蓯蓉丸一名木瓜丸出傳信通用方治風濕腳氣客摶筋脈痺攣不仁蓯蓉酒浸牛膝酒浸天麻黃芪銼何首烏米泔浸一宿竹刀去皮木瓜去皮作片已上各十兩好酒一斤浸候藥吃酒乾取出與藥同焙狗脊去毛銼續斷銼萆薢銼各二兩右為末用木瓜三枚去皮剜銼甕子入青鹽一兩在內閉口飯上兼蒸爛熟搗成膏上件藥末和丸如木瓜膏少即入酒糊丸如梧桐子大每服三十丸鹽湯或酒任下不拘時候石楠丸治腳膝攣痺去風濕活血脈益元氣石楠白术牛膝三味酒同浸一宿焙乾防風去乂天麻枸杞黃茋銼二兩桂去粗皮鹿茸醋炙去毛各一兩半右為末用木瓜一枚去皮穰炊令爛熟搗成膏和藥末更用麵糊少許同為丸如梧桐子大每服三十丸至五十丸空心溫酒下鹽湯亦得薏苡仁酒方治風寒濕氣中腳摶於筋脈痺攣不可屈伸者薏苡仁炒白斂芍藥酸棗仁乾薑炮甘草炙各五兩附子炮裂去皮臍一兩右銼如麻豆大以酒五升漬一宿微火煎沸去滓瓷器貯之每服一小盞甚者常使人扶行少飲酒者可隨性飲之常令酒氣佳飛步丸出瑞竹堂治隂陽風濕腳氣手臂舉動不起無問逺年近日並皆治之紫金皮二斤取頭末八兩㨂時嚼似腦子未透頂者方佳又名滑藤根木鱉子四兩竹刀切片用三年醋浸三宿肥川烏二兩半去皮生用蒼术二兩半未乾水浸五加皮二兩半焙右為細末醋糊為丸似魚眼睛大每服三十丸至五十丸空心鹽及木瓜少許細嚼和藥無灰酒送下忌動風之物經驗立應散出醫方集成治風濕腳氣麻黃去根莭殭蠶各二兩炒斷系丁香一錢沒藥五錢另研乳香五錢另研右為末每服一兩用酒一碗調取醉蓋覆得汗愈曽經蒸炮者難愈治風濕腳腫痛不可行步出經驗良方右用苦瓜芳葉去艻刺及莖祗用葉不拘多少採嫩細葉者尤佳擂爛葉用燒皮散一貼生薑自然汁調好塗腫處其痛即止半夏丸治風濕腳氣痰壅頭痛半夏湯浸七次去滑暴乾二兩右為末生薑自然汁和丸梧子大每服二十丸食前生薑湯下日三沉香三味散出經驗良方治腳氣初發去風濕檳榔麵褁煨去麵甘草微炒木香不見火陳皮去白芎藭白术各七分半大腹皮炙黃羌活去蘆紫蘇葉宣木瓜切焙乾沉香各一兩右每服五錢水一大盞煎至六分溫服中年人弱病冝服术附湯壯盛者人參敗毒散加大黃木瓜煎服不時服之病腳氣常服尤妙地黃丸出本事方治益氣血補肝元祛風濕壯腳膝熟地黃一兩牛膝石斛各三分肉蓯蓉茵芋防風川芎五味子桂心附子薏苡仁已上各半兩右為末煉蜜丸如梧桐子大每服三四十丸酒吞下空心食前服人參湯治腳氣風濕痺弱人參防風去乂各二兩芍藥炒銼甘草炙銼當歸切焙各一兩半赤茯苓去黑皮半兩肉蓯蓉去皮黃茋切各二兩橘皮湯浸去白焙桂粗皮去龍骨各一兩右粗搗每服三錢半水一盞半入大棗三枚擘破生薑二片同煎至一盞去滓服日三夜一通津丸出御藥院方治一切腫滿風濕腳氣攣腫宣導小水愛飲水者常服妙見效赤茯苓木通大腹子破故紙炒蓽澄茄木香苦葶藶隔紙炒已上各半兩白牽牛五兩微炒右為細末水麵糊為丸如梧桐子大每服五六十丸漸加至七八十丸陳皮燈心湯下食後服或食前亦得敷藥出瑞竹堂治風濕腳氣草烏白芷防風獨活羌活右等分為細末用生地黃數條研爛醋米酸調敷葶脂丸出瑞竹堂治風濕腳氣好川烏一兩生用無名異二兩研石葶脂研一兩生用右為細末用蔥白搗爛取自然汁丸如梧桐子大每服一錢空心生蔥淡茶下日止一服木瓜丸出聖惠方治風濕腳氣上攻胸腹壅悶痰逆木瓜一兩乾者陳皮一兩湯浸去白穰焙人參一兩去蘆頭桂心半兩檳榔二兩丁香半兩右㨂淨為細末煉蜜搜和劑更搗五百杵丸如梧桐子大每服十五丸煎陳皮湯下空心午後可二三服漸加至三十丸一方用生薑湯下抱龍丸出仁存方治肝腎臟虛風濕進襲流注腿膝行步艱難漸成風濕腳氣足心如火上氣喘急小腹不仁全不進飲食赤小豆四兩略炒五靈脂白膠香破故紙炒地龍炒狗脊火療去毛木鱉子去殼海桐皮葳靈仙草烏米泔浸三日淨洗去皮尖右各一兩為末酒糊為丸如梧桐子大辰砂為衣每服五十丸空心鹽湯或酒任下通逐邪氣淋泄方治益氣補肝元祛風濕壯腳膝川山甲麩炒黃色如去癱者用穿山甲去邉及前後二瓜川烏頭紅色海蛤各一兩右為末每服三錢生薑自然汁調得所傅在腳心用綿子扎定又以水數升煎數服噓曲踿內次用衣被蓋身出汗氣腥臭為度小敘命湯出如冝方治風濕腳氣痺弱不能轉側防己麻黃人參肉桂黃芩甘草炙白芍藥杏仁川烏各一兩附子半兩防風一兩半右㕮咀每服四錢薑七片棗二枚同煎不拘時溫服如筋骨掣痛冝虎骨散又方出鮑氏方紫荆藤蛇床大黃輕粉白芷蕪荑雄黃全蝎等分右為末麻油調傅仍以芥菜湯下石楠丸五聖散出朱氏集驗方治腳氣夫腳氣之患皆因坐立濕地或因行腳熱脫鞋又著濕鞋其風濕之氣易入初在皮膚次傳經絡甚至入骨髓遂成此疾發作必然行步艱難痛不可忍若不治之漸次傳在心胸並在臟腑久則傷命深可哀嘆余因授到一方能療此疾極有功效試之果驗沉香流氣飲人參敗毒散三和散小敘命湯除去附子香蘇散右五件各一貼加檳榔三十箇搜麵包煨熱去麵川練子十枚京南芍藥二兩共三件並銼碎同前貼藥共一處和勻作五服水一盞薑三片棗一枚木瓜三片同煎至一盞濾滓再煎二次與藥合和用瓦器盛安頓屋上露一夜次早取下暖熱調復元氣散半貼空心服此藥不問男子婦人小兒加減服其效不可盡述增加敗毒散一貼出朱氏集驗方大黃荆芥穗各半錢拌和右分作二服依本方煎服以大便流利為度過秋則以香蘇散間服亦如前服二項藥虛弱人略加些微又方出朱氏集驗方何首烏黃連赤小豆菉豆粉各等分右為末用生地黃煎湯候冷調塗亦如前法乾則用醋潤玉淨瓶出朱氏集驗方紫雲根長葉成叢者是右生採等分細切入好茶末二三錢同擂爛每用一圓如三錢重用瓦器碗盛水化開同煮數沸候冷如前法此藥専治赤腫熱痛者神效赤骨丸出楊氏家藏方治風濕攻注腳踝腫痛或筋脈牽急疼痛天南星大者赤小豆生用右等分為細末麵糊為丸如梧桐子大每服三十丸淡薑湯下食前治腳氣風濕出本草宜以紫蘇子和髙良薑橘皮等分蜜丸空心下十丸治腳氣膝風濕出汗少力疼痛及隂汗右用燒磨作灰細研末一匙頭沸湯投之淋洗痛處乾濕腳氣附論夫腳氣者由體虛感於風毒故也然腳氣有乾有濕有隂有陽乾者不腫濕者腫滿在臟為隂在腑為陽病雖一原所受各異其於虛實不等取捨殊途為療當慿形證也夫乾氣者由腎虛房事不節或當風取涼卧不覆足或行立濕地或夏月以冷水洗腳腠理開踈風邪氣摶於腳膝入於經絡血脈痞澀皮膚頑痺脛弱枯細日夜酸疼飲食減少肌體羸瘦心腹氣滯大便不通毒上攻心神煩悶四肢無力其候腳膝不腫故名乾腳氣也夫濕腳氣者由體虛當風卧濕醉後取涼風濕毒氣卒摶於腳膝之所致也此皆由腎虛膀胱宿有停水經絡痞澀不得宣通即先腫滿漸攻心腹毒氣不散遍入四肢兩腳熱疼心胸燥悶上氣喘急咳嗽稠黏面目虛浮脅腹脹滿見食嘔吐壯熱頭疼小便不利祕澀風凝滯皮膚生瘡其後腳膝浮腫故名濕腳氣也方羚羊角飲治乾濕腳氣羚羊角鎊羌活去蘆頭桂去粗皮牛膝酒浸白茯苓去黑皮杏仁去皮尖郁李仁湯浸半夏湯洗七遍附子炮裂去皮麻黃去根大腹皮大黃煨半兩葶藶子紙上炒木香白术防風去乂陳橘皮湯浸枳殼去穰甘草炙銼各一分檳榔白附子炮各半兩右銼如麻豆分為八服若髙年或臟腑虛冷即分作十六服每服用水二碗生薑十片煎至二盞臨熱更磨犀牛角水一合投入再煎沸去滓分作二服不拘時候溫服滓兩服重用水一碗煎至一盞作一服更看疾狀每料臨時添藥或腳刺疼添桂附子牛膝羌活各一分