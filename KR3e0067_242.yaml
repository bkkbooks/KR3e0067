利再服大黃丸一名方靈丸治乾濕腳氣膝脛疼痛大便祕澀小便赤黃大黃生破故紙炒黑牽牛炒各一兩右為末用不蚛皂角十枚水浸一夜揉汁濾去滓熬膏和前藥末為丸如梧子大每服十五丸空心溫熱水送下烏藥散出王氏博濟方治乾濕腳氣烏藥一兩蒔蘿炒一分右為細散溫酒調下二錢乾腳氣用楝實五枚銼碎漿一升煎至五合去滓調下烏附丸治乾濕腳氣附子八錢去皮黑豆半升入磁碗中慢火煮以附子爛為度右熟豆一合同附子研為餅焙乾為末煉蜜為丸如皂角子大每服二丸空心麝香酒嚼下治乾濕腳氣破故紙一兩炒黑牽牛一分生右為細末每服一大錢木瓜酒調下空心食前服治乾濕腳氣出海上方昔有楊監獄晚年此苦親見用之效大黃黑豆右等分為細末用冷水調厚塗之以紙貼其上乾則再換訶梨勒丸治乾腳氣上攻心胸壅悶訶梨勒皮二兩塗酥火炒令黃檳榔二兩右為細末煉蜜和丸如梧桐子大每服於食前以溫酒送下三十丸治乾腳氣心腹煩悶腳膝疼痛出聖惠方蘿蔔子一兩微炒羌活一兩右為散每服四錢水一中盞煎至六分去滓每於食前溫服治乾濕腳氣上攻心胸喘促悶絶檳榔二兩吳茱茰三分湯浸右為散每服用童子小便一小盞入生薑汁一茶匙令暖溫不計時候調下二錢治乾濕腳氣并腎勞癲疝氣開胃右用蘹香子得酒服之桃花散治濕腳氣及腰腎膀胱宿水并痰飲不下食右用桃花陰乾量取一大升但隨滿不須按捺搗碎為散紗羅下溫清酒和一服令盡通利為度空腹服之則須臾當轉下可六七行但宿食不消化等物總須㵼盡若中間覺飢虛進少許軟飯及糜粥無不即安者不俟轉藥明朝但覺腰腳氣輕快使人踴躍食味頓倍佳腳先腫者一宿頓砂於囊中貯滿傾腳相擦摩又無毒意易將息唯忌葫菜豬肉三月內腹虛脹大都不冝刻削慎生冷醋滑五辛麵酒及粘食肥膩之肉五日外諸食復常鹿茸丸治濕腳氣腿腕生瘡右用鹿茸五味子川當歸熟地黃等分為細末酒糊為丸如梧桐子大每服三四十丸溫酒或鹽湯下未食前又服川芎當歸二味等分同煎以調荆芥細末約一二錢食後再服煎四物湯調消風散二三錢只宜服此三藥後絶不發五生丸治風毒乾濕腳氣渾身一切風痛及諸服不得效者川烏草烏南星五靈脂凌藥等分生用右為細末以醋調五靈脂末作膏子研和為丸如梧桐子大每服十丸空心溫酒下草聖丸治乾濕腳氣及下部一切瘡癢乾木瓜白殭蠶炒去系子荆芥穗草烏頭炮去皮右各等分為細末麵糊為丸如梧桐子大每服十丸加至十五丸空心溫酒下湯任下神妙丸一名金龍丸治乾濕腳氣骨衰作痛或熱腫或不腫引至膝上走疰難忍隨手見效赤足蜈蚣全者一條頭不用全蝎二十一個黑豆三七枚地龍去土焙草烏生各半兩右為細末糯米糊為丸如赤豆大空心麝香冷酒下七丸如人行二十里將荆芥茶一盞投之服後行如不能動步則腳病初服時忌食熱物如利了腳腫處便皺且不疼但初服時漸麻動更加二半丸亦可極神效一方有川烏大效牛膝丸治一切乾濕風毒腳氣逺年日近發動無時不能移步浮腫疼痛牛膝天麻宣木瓜肉蓯蓉各一斤銼用好酒五升浸一伏時於良器石中文武火煮酒乾為度焙乾沒藥四兩川烏四兩虎骨半斤黑豆三升同烏頭煮兩時辰出切開用鹽二兩炒右為末煉蜜為丸如梧桐子大每服三十丸空心溫酒鹽湯送下補㵼丸余居土選竒方治乾腳氣及腿膝無力行步艱難南木香川烏檳榔大黃大麻仁去皮牛膝酒浸枳殼各二兩續斷杜仲薑製五加皮防風山茱茰已上各三兩生薑屑羚羊角屑訶子皮炮取去皮各一兩半右除附子檳榔不見火同為細末次將大麻仁研如泥拌勻煉蜜為丸如梧桐子大空心食後溫酒下三十丸加至五十丸忌魚麵生果熱物如常服無忌此藥其效如神矣神效丸治乾濕腳氣骨裏疼痛或腫或不腫並治之川烏一枚去皮草烏半兩地龍半兩全蝎四十二個黑豆四十二粒去皮蜈蚣一條去頭足右焙乾為末入糯米糊為丸麝香為衣用冷酒下七丸至十丸小頃用荆芥穗些少先嚼用茶酒灌潄之其效如神用之果有驗也獨聖散出朱氏集驗方治乾濕腳氣不問新舊悉能療之右用平胃散一貼紫蘇梗細銼同煎通口服如是濕熱腳氣則一貼可愈蘇梗不用葉並不問新舊腳氣上氣附論夫風濕毒氣之中人多從下起足先受之故名腳氣毒氣循經上入於肺則氣道奔追升降不順故令上氣喘滿也方萆薢湯治腳氣上氣喘嘔逆咳嗽減食萆薢當歸切焙木香牛膝酒浸切焙桂去粗皮黃連去鬚一兩延胡索芎藭天雄炮檳榔銼代赭研桑耳石韋去毛葳靈仙去苖土射干兩半右為散每服五錢水一盞半入生薑五片煎取八分去滓不拘時候溫服貝母丸治腳氣咳嗽貝母去心三分蛤蚧一對洗淨紫苑去苖土防己細銼桑根白皮銼人參赤茯苓欵冬花大黃天門冬葶藶子白檳榔百部紫蘇子木香杏仁右為細末煉蜜和丸如梧桐子大每服一十丸空腹米飲下日午再服海蛤丸治腳氣上衝頭目靣浮腫咳嗽喘乏氣促心胸脹兩腳及腰重小便澀胯冷腿膝疼腫無力海蛤研如粉訶梨勒焙柴胡去苗赤茯苓杏仁湯浸牽牛子炒令熟一兩半貝母去心橘皮湯浸桑根白皮炙銼白檳榔大黃郁李仁湯浸去皮枳殼一兩赤芍藥兩半右為細末煉蜜為丸如梧桐子大每服空心煎棗湯下二十丸午後再服桑白皮散治腳氣上氣坐卧不得咽喉不利四肢煩疼桑根白皮三兩射干三分枳殼三分赤茯苓一兩貝母三分白前三分生乾地黃兩半柴胡一兩甘草半兩赤芍藥三分天門冬三分百合三分檳榔三分右為散每服四錢以水一盞入生薑半分煎至六分去滓不拘時候溫服紫蘇散治腳氣上氣心胸壅喘不得伏卧紫蘇莖葉一兩桑白皮一兩赤茯苓一兩紫苑三分白前三分木通一兩檳榔一兩百合三分甘草半兩杏仁三分右為散每服四錢水一盞入生薑半分煎至六分去滓不計時候溫服茯苓湯治腳氣上喘心下妨悶不能食赤茯苓桑根白皮白术檳榔防己旋復花橘皮大黃杏仁右為散每服三錢先别用麻黃一分水一盞半煎五沸掠去沫下藥并生薑一分拍破同煎至六分去滓溫服空心服日晚再服旋復花湯治腳氣循經上乘於肺令人上氣喘滿旋復花三兩羌活去蘆芎藭桑白皮炙銼桂去粗皮青橘皮去白焙附子炮製去皮赤小豆一兩萊茯子炒香一兩右銼如麻豆大每服三錢以水一大盞煎至七分去滓空心溫服橘皮防己湯治腳腫滿上氣陳橘皮湯浸防己一兩桑白皮一兩吳茱茰湯浸檳榔一兩大腹并子銼七枚生薑三兩甘草一兩右為散每服五錢水一盞半入生蔥白三莖切同煎八分去滓溫服空心食前風引湯治痺滿上氣遍身脹膝疼并去風溫疼痛大豆三升附子三兩枳實炙澤㵼橘皮四兩甘草炙茯苓防風各二兩右切以水二斗酒二升煮大豆取一斗去滓內藥煮取三升分三服三劑腫消去大豆澤㵼更服三劑差忌豬肉冷水海藻菘菜醋訶梨勒散治腳氣上氣胸中滿悶不能下食訶梨勒一兩蘿蔔子三分紫蘇莖葉一兩木通一兩赤茯苓三分檳榔一兩陳橘皮三分桑白皮二兩右為散每服四錢水一盞入生薑半分煎至六分去滓不計時候溫服半夏湯治腳氣上入腹腹急氣上胸膈真氣欲絶半夏桂乾薑蜀膝甘草人參附子右銼如麻豆每服三錢水一盞煎至六分去滓溫服空腹日午晚間各用一初服消停藥力恐氣上不得下冝減服之牛膝散治腳氣上引兼氣脾滿不能食牛膝細切酒浸磠砂研細辛去苗丹參去蘆白术郁李仁湯浸右除研者外搗羅為散再入研藥拌勻每服二錢食前以溫酒調服春秋冬三月冝夏月熱不可服之消腫利小便兼補益除風虛冷服少食烏豆泄腳湯治腳氣上氣擡肩喘衝心痛右用烏豆二斗以水五斗煮取二斗五升分開為兩甕中盛每甕中浸一腳遣人從膝向下淋洗百遍以為度久病者不過再浸亦差加減木香丸先泄腳後服木香三分白芍藥二分枳殼二分檳榔四枚桂半兩大黃二兩右為細末煉蜜為丸如梧桐子大空腹酒下十五丸日午再服漸加至三十丸以大便通利為度杏仁煎方治腳氣乘肺上氣喘促杏仁湯浸去皮尖雙仁炒一兩百合去皮擘洗令淨一分入水二分同研麻黃不去莭射干各半兩右除百合外細切入在百合汁中煎取一升去滓貯在淨器中每日不限早晚取一合服之此藥不得久停惟冝旋合桂苓湯治腳氣上喘心下妨悶桂去粗皮三兩澤瀉銼赤茯苓去黑皮乾薑炮各三兩右為散每服三錢水一盞煎至七分空腹日午晚各一服大麻子湯治腳氣脹悶喘促大麻子炒檳榔一錢生薑一合右先以童子小便一盞研麻子汁檳榔末生薑汁銀器盛湯微煎三兩沸空心溫服紫蘇湯治腳氣肺氣不問冷熱一切氣紫蘇葉兩半白茯苓去黑皮陳橘皮湯去白焙半兩右為散每服三錢水一盞入生薑半分拍破同煎至七分去滓空腹溫服晚再服若患四體熱者加麥門冬一兩去心焙患冷者加厚朴一兩去粗皮生薑汁炙小便澀者加桑白皮一兩炙大便祕者加檳榔仁一兩銼霍亂腹脹加甘草一兩炙銼瘧加黃連人參皆隨疾狀以意加減磠砂牛膝三物湯療腳氣上氣病源云此由風溫毒氣初從腳上後轉入腹而乘於氣故名上氣也磠砂牛膝細辛右為細散酒和服方寸匙日再經四五服即效桑白皮湯治腳氣靣目腫上氣眠卧不得氣欲絶桑根白皮炙黃三兩陳橘皮湯浸去白葶藶子紙上炒紫黃色另搗二兩右除葶藶别搗外粗搗篩入葶藶末再搗勻每服三錢先用棗五枚擘破水一盞半煎至一盞去滓入藥末再煎至七分去滓溫服如人行五里以來再服後當利一二行腫氣下即差三五日服一劑紫蘇湯出聖惠方治腳氣上氣不止蘇莖葉三兩白前一兩桑白皮二兩右為散每服四錢以水一中盞生薑半分煎至六分去滓不計時候溫服木香檳榔湯治腳氣衝心煩悶上氣喘急木香三分檳榔半兩右為散每服三錢水一盞入蔥白二寸擘破煎至七分去滓下紅雪二錢半薑汁半合童子小便一合再煎一兩沸溫服檳榔湯出聖惠方療上氣檳榔二七枚杏仁四七枚去皮右以小便一升煮分為二服相去五六里許時此方甚下氣一日再服之佳如腹中欲須利楮榔并子槌碎如前煮汁服即快利也治腳氣上攻心腹妨悶大麻仁三合檳榔末一兩右先將麻仁成膏入檳榔末研令勻丸如梧桐子大每服不拘時候煎童子小便送下二十丸薑汁飲治腳氣上氣悶絶者開胃口令人能食右用生薑四兩和皮搗取自然汁早晨取半合以淡溫湯半合和服之每如人行十里一服日三豌豆湯淋泄方治腳氣擡肩喘右以豌豆三升水五斗蔥白十莖擘破椒三分煮取滚湯二斗傾入兩瓷甕以腳各安在一甕中浸遣一人從膝上淋洗百遍如無磁甕瓦甕亦得患急者不過兩次效治腳氣上氣入腹腫方右用野椒根除土皮細銼一升以酒二升安一瓶中泥頭煻火燒得一沸然後溫服一盞甚效惟忌冷肥二物其餘不禁治腳氣上氣出肘後方右取鯘魚一尺長者作鱠食之一兩頓即瘥鯉魚亦甚佳普濟方卷二百四十二
