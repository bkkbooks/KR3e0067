body:
  text: 普濟方卷二百八十六明周王朱橚撰癰疽門諸癰附論夫癰者由六腑不和所生也六腑主表氣行經絡而浮若喜怒不測飲食不節隂陽不調則六腑不和榮衛虛者腠理則開寒客於經絡之間經絡為寒所折則榮衛稽留於脈榮者血也衛者氣也榮血得寒則澀而不行衛氣從之與寒相搏亦壅遏而不通氣者陽也陽氣蘊積則生於熱寒熱久不散故積聚成癰腑者陽氣浮行主表故癰浮淺皮薄以澤久則熱勝於寒熱氣蘊結傷肉而敗肌故血肉壞化而為膿其患則表浮淺則骨髓不燋枯腑臟不傷敗故可治而愈也五常政大論云天不足西北左寒而右涼地不滿東南右熱而左溫髙者氣寒下者氣熱故寒涼者脹溫熱者瘡下之則脹已汗之則瘡已夫東南二方在人則為丙小腸熱甲膽風小腸與膽皆居其下其性炎上其瘡外有六經之形證內無便溺之阻隔飲食如故清便自調知不在裏非疽瘡也止癰癤也小則為癤大則為癰其初所受於下風濕之地氣自外而來侵加於身者也經云營氣不從逆於肉理乃生癰腫病機云諸痛癢瘡痬皆屬心火此瘡自外而入是丙小腸左遷入於膽作痛而癢也此二方皆主血血為病必痛此元氣不足營氣逆行其初出未有傳變在於肌內之上皮毛之間只於風熱六經所行經絡地分出矣宜瀉其風濕熱醫者只知隂復其陽則宜汗也此宜發汗者乃濕熱鬱其手足少陽致血脈凝逆使營氣周身元氣消弱也其風熱鬱滯於下其面色赫赤面腫微黯東方青理沒之色也風木之性上衝顔必忿色其人多怒而瘡之色亦赤赫腫硬微帶黯色其瘡之形勢亦奮然高起結硬而作痛也其肺只在左手屬表左寸外洪緩左關洪緩而弦是客邪在血脈之上皮膚之間宜急發其汗而通其榮衛則邪去矣以內托榮衛湯發之瘡瘍者火之屬須分內外治其本若其脈沈實當先疏其內以絶其源也其脈浮大當先托裏恐邪氣入內也有內外之中者邪氣至盛遏絶經絡故發癰腫此因失托裏及失疏通又失和榮衛也治瘡之法大要須明托裏疏通行榮衛之三法內之外者其脈沈實發熱燥煩外無焮赤痛深於內其邪氣深矣故先疏通臟腑以絶其源外之內者其脈浮數焮腫在外形證外顯邪氣恐極而內攻故先托裏也內外之中者外無焮惡之氣內亦臟腑宣通知其在經當和榮衛也用此三法之後雖未瘥必無變證亦可使邪氣峻減而易愈脈數身無熱即內有癰諸浮數脈當發熱而反洗洗惡寒若有痛處當結為癰脈微而遲必發熱脈弱而數此為振寒當發癰腫脈浮而數身體無熱其形默默胃中微燥不知痛處其人當發癰腫脈滑而數滑則為實數則為熱滑則為榮數則為衛榮衛相逢即結為癰熱之所過即為癰膿身體有痛處時時苦有瘡凡癰發腫髙者疹源淺腫下者疹源深大者易療小熱者難療初便大痛傷肌晚乃大痛傷骨都堅者未有膿半堅半軟者有膿發腫都軟者血瘤也非癰發腫以漸知長引日月亦不熱時時牽痛瘤也非癰諸氣結亦有腫久久不消成癰療之宜散氣氣已散若初腫處有浮氣年衰皆發癰療之宜及年盛并折散熱可無此憂發癰堅如石走皮中無根瘰癧也久不消因得他熱之疾時有發為癰也無虛勞腹中之疾或發血瘤瘡狀墳父吻切起頭正盤直不當炙療療之火尉便燋爛剝刮去焦痂則血泄不可禁必死凡癰無問大小已覺即取膠如手掌大暖水浸令軟納納然稱大小當頭上一孔如錢孔大貼腫上令相當須臾乾急若未有膿者即定不長已作膿者當自出若以鋒針當孔上刺至膿大好至瘥乃去其膠凡癰髙而光大者不大熱其肉正平無尖而紫者不須攻之但以竹葉黃耆湯申其氣耳肉正平為無膿也癰卒痛以八味黃耆散傅之大癰七日小癰五日其自有堅強者寧生破法乳若熱手不可得近者先內服王不留行散外摩發背膏若背生破無若在乳宜令極熟候手按之隨手即起者瘡熟也須針之針法要得著膿以意消息胸背不過一寸斟量不得膿即與食肉膏散著兊頭內癰口中如體身熱歇即服木占斯散五日後癰欲著痂者即服排膿內塞散凡癰破之後便綿惙欲死內寒外熱腫自有似癰而非者當以手按腫上無所連乃是風毒勿針之宜服升麻湯外摩膏破癰口當令上留三分近下一分針之務令極熟熟便不痛破後敗壞不差者作豬蹄湯洗之二日一度夏用一日又口用六七日用湯半劑亦可夫癰壞後有惡肉者宜豬蹄洗去穢次傅食肉膏散惡肉盡後傳生肉膏散及摩四邊令好肉速生當斷絶房室忌風冷勿自勞煩待筋脈平復乃可任意耳緣新肉易傷傷則裏潰潰則裏發發則難救慎之慎之白痂最忌治癰久瘡口不合其肉白而膿血少此為瘡口冷滯乃病人氣血枯竭不潮於瘡遂致如是合用此艾葉一把入瓦器內濃煎湯避風處乘熱用艾湯澆洗瘡口四圍淨肉以絹帛兜艾葉乘熱澆沃一日一次洗了須避風仍燒松香以煙薰瘡口良久用神異膏貼之其瘡勿令厭穢之人見若不能禁忌瘡口難安藥亦無效方五黃丸出千金方治虛勞客熱數發癰腫瘡癤熟地黃四兩黃耆黃芩大黃黃連澤瀉細辛各三兩甘草桂心芍藥茯苓乾漆各二兩人參一兩天門冬五兩右為末蜜和丸如梧桐子大酒服十丸日三夜一加至二十丸久服終身不發癰疽凡方中用大黃薄切五升米下蒸熟曝乾用之熱多倍大黃一方無澤瀉玄參散出聖惠方治癰腫始發熱毒氣盛寒熱心煩四肢痛疼玄參半兩甘草半兩生銼麥門冬三分去心前胡去蘆頭枳實麩炒微黃人參去蘆頭赤芍藥生乾地黃黃耆芎藭赤茯苓黃芩各一兩石膏二兩右為散每服四錢水一中盞入竹葉二七片小麥一百粒煎六分去滓不計時候溫服黃耆散出聖惠方治癰腫熱氣大盛寒熱進退黃耆銼川升麻川大黃銼碎微炒黃芩逺志去心赤茯苓赤芍藥各一兩生乾地黃二兩當歸半兩麥門冬一兩半去心人參半兩去蘆頭甘草半兩生銼右為散每服四錢水一中盞煎至六分去滓不計時溫服之生地黃散出聖惠方治發癰腫熱腫疼痛心神煩悶生乾地黃二兩玄參二兩甘草生銼赤芍藥黃耆銼木通銼黃芩當歸銼微炒地骨皮各一兩赤茯苓一兩半川升麻一兩川大黃一兩銼碎微炒右為散每服四錢水一中盞入竹葉二七片煎至六分去滓不計時候溫服蛇銜膏出肘後方療癰腫瘀血産後血積耳目暗等牛領馬鞍瘡蛇銜大黃附子去黑皮芍藥當歸細辛黃芩大戟椒去目莽草獨活各一兩薤白十四莖右切以苦酒淹一宿以不中成鍊豬膏二升龍銜藤一兩合膏煎名龍銜膏今又有龍草似蛇銜而葉大耳亦有取其根合煎者亦名龍銜膏肘後方云於七星火上各熬絞去滓溫酒服如彈丸一枚日再病在外摩傅之耳以綿褁塞之目病如黍米注皆中一方不用大戟連翹飲治癰腫瘡癤排膿連翹防風去蘆各三兩玄參白芍藥薺苨各二兩甘草炙銼一兩桔梗銼炒白茯苓去黑皮各一兩黃耆銼四兩黃芩去黑心二兩桑根白皮銼炒二兩半前胡去蘆頭人參各一兩右搗篩每服五錢水一盞半煎取八分去滓溫服日二次玄參散治一切癰疽瘡腫玄參黃芩去黑心羊蹄根芍藥白芷丁香木香硝石碎半夏湯泡七遍白斂木鱉子去殼莽草右為散以醋調塗日三犀角散出聖惠方治初見皮膚有瘡恐成癰腑臟壅滯或寒熱噤癢口乾心煩犀角屑知母各一兩木通二兩銼赤芍藥川升麻薺苨葳蕤黃苓甘草生銼各一兩半麥門冬去心馬牙硝各二兩右為粗散每服四錢水一中盞煎六分去滓入竹瀝一合更煎一沸不計時候溫服內消散出聖惠方治癰腫結硬疼痛赤小豆一合熬令熟人參一兩去蘆頭甘草一兩生銼蘧麥一兩白斂一兩當歸銼微炒黃芩防風去蘆頭黃耆銼沉香川升麻各一兩右為細末不計時候以溫水調下二錢犀角丸出聖惠方治癰腫及發背乳癰一切腫毒悉能內消腫化為水犀角屑川升麻防風去蘆頭黃芩當歸銼微炒梔子仁吳藍甘草生銼川大黃碎銼微炒巴豆半兩去皮心研紙裹壓去油黃香一兩半銼右為細末煉蜜和搗三五百杵丸如梧桐子大每服空腹以粥飲下三丸得快利為度即喫冷白粥止之未利加至五丸亦可松脂膏療癰腫膿潰內服藥外宜貼膏松脂一斤鍊者膒脂三合生椒葉一兩白蠟三兩蛇銜黃耆芎藭白芷當歸細辛芍藥各一兩右切以水先煎脂蠟煬盡內諸藥三上三下白芷色黃膏成用剪故帛量瘡大小塗膏貼之日夜各一松脂貼方出千金方療癰腫當歸黃耆黃連芍藥蠟黃芩芎藭大黃各一兩細切松脂一斤半膒脂一合半右切以微火煎之三上三下綿布絞去滓向火塗生箋紙上隨大小貼之日三葛根散出聖惠方治癰腫乳癰臟腑壅滯口乾寒熱頭痛嘔噦不能下食葛根銼麥門冬去心紅雪各一兩犀角屑半兩葳㽔薺苨赤芍藥甘草生銼各三分石膏二兩右為粗末散每服四錢水一中盞煎六分去滓入竹瀝一合復煎一沸不計時候溫服一方無紅雪用黃芩一兩解毒散出聖惠方治癰瘡如覺便宜服犀角屑木通銼川麻黃赤芍藥川朴硝各一兩石膏一兩甘草生銼玄參麥門冬去心各半兩右為粗散每服四錢水一中盞煎至六分去滓不計時候溫服之白斂貼方療癰腫堅核下不消白斂大黃赤石脂芍藥莽草黃芩黃連茱萸右等分搗篩以雞子黃和如濁泥塗布上隨核大小貼之燥復易黃耆貼方療癰腫黃耆當歸各一兩半黃芩芎藭黃連白芷芍藥各一兩右搗篩以雞子白和如膏諸暴腫起以布攤貼之燥易腫處不覺冷便熱勢毒者加白斂一兩王不留行散出千金方治癰腫不得潰困苦無聊賴方王不留行子三合龍骨當歸各二兩乾薑桂心各一兩野葛皮半分括蔞根六分右為末篩食後溫酒服方寸匕日三四肢習習為度不知稍加之令人安穩不覺膿自潰即著瘡痂平復神良此殷仲堪方隨濟闍黎所名為神散癰腫即消千金翼云治癰疽及諸腫已潰皆服之白斂貼方療癰腫白斂當歸芍藥大黃莽草芎藭右各等分搗篩下雞子黃和如泥塗布隨大小貼之燥易梔子湯出千金方治表裏俱熱三焦不實身體生瘡及發癰癤大小便不利梔子仁二十七枚芒硝二兩黃芩甘草知母各三兩大黃四兩右㕮咀以水五升煮減半下大黃取一升八合去滓內芒硝分作三服當歸消毒散治癰腫初發荆芥牛旁子甘草防風當歸赤芍藥各等分右㕮咀每服半兩水二盞煎八分服水澄膏出儒門事親治癰腫雄黃水飛二錢黃連半兩鬱金二錢黃柏半兩大黃半兩黃丹半兩水飛右為細末量所腫處用藥多少以新汲水半盞抄藥在內須臾藥沉漫去其沉者水盡然後用槐栁枝攪數百餘轉如麵糊相似勻以小紙花子攤藥塗腫上更以雞翎撩涼水不住掃之解毒丸治中外諸邪毒癰腫瘡筋脈拘攣寢汗咬牙一切驚悸熱毒大黃黃連梔子黃芩各五錢牽牛滑石各一兩右為細末滴水為丸如梧桐子大每服三四十丸溫水送下加減用服之野葛散出聖惠方療癰腫不能潰野葛皮二分龍骨二兩乾薑半兩炮裂銼桂心一兩􅌝􅌣二兩乾者王不留行一兩右為細末不計時候以溫酒調下二錢黃耆貼方療癰腫有熱甘草炙大黃白斂黃耆芎藭右各等分搗篩以雞子黃和如濁泥塗布上隨赤熱有堅處大小貼之燥易五黃膏消拔毒熱癰腫小兒赤眼瘡瘤大黃黃柏黃連鬱金各一兩黃丹半兩右為細末新水或蜜水調塗掃加朴硝妙黃耆貼方療癰腫黃耆大黃白芷牡礪白斂右各等分搗篩和雞子貼天南星膏出百選方治風毒癰癤大天南星一兩厚黃柏半兩赤小豆一分皂角一挺不注者燒存性右為末以新汲水調成膏皮紙貼之已結即破未破即散之立效皂桃散治肚癰半月才覺亦可消皂角燒灰盡用之胡桃燒存性牛旁子微炒連翹生右等分為細末每服三錢溫酒調下空心食前服黃連貼方出聖惠方療癰腫已潰黃連黃柏地榆白芷各一兩右為搗篩以雞子白和塗布薄攤上對瘡口穿布出癰氣令踈氣妙溫中湯主癰腫取冷過多寒中下利食完出甘草炙乾薑附子各六分炮蜀椒二百四十枚研右以水六升煮取二升分三服忌海藻菘菜豬肉冷水甜葶藶散出聖惠方治一切癰疽腫毒甜葶藶半兩木通半兩銼川大黃半兩生銼莽草半兩右為細散以水和如稀膏塗腫上乾再塗白斂散療癰腫白斂烏頭炮黃芩各等分右搗下篩和雞子白傅上即愈白斂薄貼方主癰腫白斂大黃黃芩各等分右搗篩和雞子白如泥塗布上薄貼乾則易之可以三指撮藥末內三升水中煮三沸綿注汁拭腫上數十遍以寒水石末和塗腫上以紙覆之乾復易之一易輒以煮汁拭之日夜三十度三色膏出百選方治癰癤未成拔毒止痛消腫蚌粉半兩黃丹一分草烏一兩生為末右為勻水調塗乾即再傅大要入草烏在瘡口效過他藥消腫膏出千金方治癰腫發背初作及經十日已上腫赤焮熱毒氣盛日夜疼痛百藥不效雞子一枚新出狗屎如雞子大右攪調和微火熬令稀稠得所捻作餅子於腫頭上堅處之所貼之以紙貼之以帛抹之時時看視覺餅子熱即易勿令轉動及歇氣經一宿定如多日患者三日貼之一日一易至瘥止此方穢惡不可施之勝然其愈疾一切諸方皆不可及自外諸方還復備員設儀注而已學者當曉此方以備諸急爾水調膏出百選方治風毒癰癤天南星生為末白礬細研右為各等分新汲水調塗乾即再塗又方出千金方治癰腫痛煩悶及諸腫癰潰內有刺不出者用生楸葉十重貼之以帛褁令緩急得所日二易止痛兼消腫蝕膿甚良如冬月先取乾者臨用以鹽潤之亦可薄削楸皮用之甚驗又方治大人小兒癰腫用生豬腦傅紙上貼之乾則易日三四度芥末傅方用芥菜子為末湯和傅紙上貼之一方豬脂和傅之一方豬膽和如泥傅之日三易又方用白薑石末蒜和搗傅上一方搗馬鞭草傅上即頭出治癰方用芫花為末膠和如粥傅之腫毒當化為水治癰以梁上塵灰葵莖等分用醋和傅之又方用人乳和麵傅上比曉膿血盡出不用近手又方用箔金繩燒末臘月豬脂和傅下畔即潰不須針灸赤小豆方治熱毒癰腫散惡血不盡煩滿及水腫皮肌脹滿亦可用搗赤小豆薄塗癰腫上烏金散治癰癤腫硬不變色者用米粉四兩蔥白細切一兩同炒黑色杵為細末每用看多少醋調攤紙貼病處一伏時換一次消治風毒癰癤以車螯殼頻醮米醋炙令赤色碾為細末溫酒調下透膿散治諸癰瘡及貼骨癰不破者不用針刀一服不移時自透有效驗用蛾口繭一箇單出蛾繭者燒灰用酒調服即透切不可兩箇三箇繭兒一箇只一箇瘡口若服兩箇三箇則兩箇三箇瘡口切勿輕忽決癰腫以雀卵白天雄兔絲子末為丸空心酒下五丸治癰腫用蚌粉醋調塗消治癰腫毒發背詐腮等疾用赤小豆為末好雞子清和傅之消一方以新汲水調傅瘡及四傍赤腫處乾落即再傅治一切瘡癰疼痛用酒熬皂角膏能消腫止痛鹿角醋方治瘡癰腫熱毒用鹿角醋磨傅之一方用水磨如泥塗患處日三五次亦治癰疽結硬未成膿治癰腫用烏蘝莓或生人家籬墻間俗呼為籠草取根搗傅之又方用伏龍肝以醋和作泥塗於布上貼之乾再傅一方用蒜和傅之一方搗篩合葫研塗癰甚效治風癰腫毒赤疣用醋磨都管草根之汁傅之治惡癰癤腫破以熱酒磨葫荲草一彈丸服之治癰攻腫若息肉突出者用烏頭五枚以苦酒三升浸三日洗之日三治癰腫毒等用紫石英醋淬搗為末生薑米醋煎傅之磨亦得治癰未潰及癰腫用括根赤小豆等分為末醋調塗之又方用石蟹醋磨傅癰腫亦解金石毒採無時治熱結癰腫無頭者用大麻子吞之則易穴有效治癰無頭方用搗龍葵傅之治一切癰腫無頭用葵菜子一粒新汲水吞下須臾即破如有兩處破服兩粒要破處逐粒加之驗治諸癰不消已成膿懼針不得破令速決取白雞翅下第一毛兩邊各一莖燒灰研水調服之一方雞羽三七枚燒灰服之即潰治癰瘡未潰用莽草末雞子白塗紙厚貼上燥復易得痛良又風齒疼頰腮腫用五兩水一斗煮取五升熱含吐之一日盡治單服硫黃發為癰用醋和豉研如膏傅癰上治熱毒癰腫用搗天麻莖葉傅之亦取子作飲去熱氣治癰腫不消用土蜂房用醋水調塗乾即更易治諸癰發起微赤腫用括摟搗作末以井花水調方寸匕一方用苦酒熬燥搗篩和塗紙上攤貼服金石人宜用之治癰腫未成膿用取牛耳中垢封之愈清涼膏治初患癰腫瘡癤熱焮疼痛消腫毒用搗大黃為末漿調攤貼之醋磨亦得又方出聖惠方取井底泥塗瘡上又方出聖惠方用取地龍屎以小便和塗之又方出聖濟總録搗惡􅀈根貼之又方出聖濟總録搗地黃貼之日再易又方出聖惠方搗車前葉貼之又方出聖濟總録搗蔓菁根貼之又方出聖惠方搗雞腸草貼之又方出聖惠方搗芭蕉根貼之一方絞汁服治癰肉中如眼出千金方用附子削令如碁子安腫上以唾貼火炙之令附子欲燋復唾濕復以火炙之如是三度令附子熱氣徹內即瘥白荻灰方療癰腫大按乃痛者病深小按便痛者病淺按之處陷不復者有膿若當上破者膿出不盡不盡稍深食骨骨碎出當以角導側際從下頭破令膿出盡出盡則骨生愈矣若惡肉不盡者食惡肉藥去之膏塗即愈食肉藥用白荻灰水淋之煎令如膏此不宜預作作之十日則渴并可以去黑子藥住便即拭去不時拭則傷膏一方以桑白皮灰及白炭灰亦可治瘀血不散變成癰用搗生菴䕡蒿取汁一升服之治一切癰腫未破疼痛令內消出王氏傳濟方見本門前癰疽等瘡內消法類白芷升麻湯昔有尹大家素貧寒形志皆苦於手陽明大腸經分出癰幼小有癩疝其腎外皆腫痛在陽明左右短中得之俱弦按之洪緩有力此癰得自八風之變以脈斷之邪氣在表其證大小便如故飲食如常口知味知不在裏也不惡風寒止惡燥脈不浮知在表也表裏既和知氣在經脈之中內經云凝於經絡為瘡癰其癰出身半已上故風從上受之故知是八風之變為瘡者也故以却寒邪調和經脈使無凝滯也白芷七分升麻半錢炙甘草一錢酒黃芩二錢生黃芩一錢半黃耆一錢當歸稍一錢中桂少許連翹二錢生地黃一錢桔梗半錢紅花少許右㕮咀都作一服酒水各一大盞半煎至一盞去滓稍熱服應臥一服而愈一方無當歸尾中桂連翹生地黃內托羌活湯出東垣先生蘭室祕藏方治足太陽經中左右尺脈俱緊按之無力尻臀生癰腫痛大作羌活二錢防風一錢藁本一錢肉桂七分黃蘖二錢酒洗連翹一錢炙甘草半錢當歸稍一錢黃耆一錢半蒼术橘皮各五分右㕮咀都作一服酒三盞煎至一煎去稍熱服空心以夾衣蓋癰上使藥力行罷去之治諸癰毒乳癰等第一藥出鮑氏方草烏南星木鱉仁赤小豆當歸鬚赤斂白芷紫河車忍冬藤赤芍藥右等分為末淡醋和蜜調傳初效甚緊天蘿瓜汁調尤佳潰膿出鮑氏方黃連黃芩黃柏梔子大黃當歸鬚南星半夏赤芍藥白芷紫河車右等分為末依前用醋調傅點破出鮑氏方白丁香雀糞直尖起者草烏尖研斑貓去首足右等分為末極細米醋調成膏於高尖軟處點破如筯頭大但此方猛烈切不可輕用治一切癰腫大小腑祕熱毒氣所攻發為癰腫疼痛鮮赤不可勝忍但止得一兩日未成膿者宜服此方忽先痛後腫大難治療出獲命方麻黃去根牡丹皮去心川大黃連翹當歸黃耆山梔硝石升麻桃仁貝母去心柴胡去苖羌活各一分半夏牽牛各一兩半右細杵羅為散子每服五錢水兩盞煎取一盞八分食後去滓熱服取轉一行了便於腫處當頭灸以五七十壯而止若是冷腫堅硬而不痛即便不須喫前方藥只於腫處當頭再灸百餘共而止也只是冷腫千萬不可喫藥諸癰出類鈴方生麻油一斤黃丹四兩蠟四分右三味臘日前日午用火煎至明早下丹蠟成膏忌女人六畜見成膏用平胃散末黃桑菰為末油調傅佛手祛毒膏出楊氏家藏方治風熱毒氣壅滯榮衛血氣盛聚結癰腫煩疼不止肌肉敗潰及諸瘡焮赤疼痛大黃山梔子各二兩白斂連翹各一兩二味升麻葫藋各半兩二味右㕮咀用煉成豬脂一斤同煎候白斂色焦濾去滓令淨量時月入黃蠟就成膏傾於磁罐內盛候冷塗傅或攤貼之佛手散出楊氏家藏方治風濕毒氣結搏腠理氣血壅盛欲成癰腫及手足諸風癢痛妨悶及風氣結核遊走上行或久新癢疾疼痛不止漢防已苦參二味各四兩大黃生用白斂二味各三兩藿香葉去土黃芩二味各一兩凌霄花甘草生用二味各一兩半右為細末每服用三錢沸湯泡通手淋洗凡貼癰腫出永類鈴方生地黃忍冬藤芭蕉等自然汁右調藥傅尤有功凡薰洗出永類鈴方加畨蜂末楓乳右為丸燒薰去穢安氣至有功療癰腫本草以蜜休根醋磨傅之治癰腫風毒本草以蒻頭磨傅腫上治癰腫本草以蒿實吞一枚即破若熱結癰腫無頭者吞之則為頭易穴一方用九月十月採隂乾治癰腫不消本草以半夏新生者磨塗之治癰腫本草以伏雞子根搗傅之治癰本草折取苦苣莖中白汁滴上立潰治癰腫本草以蝦蟇碎塗之治癰腫惡瘡本草取紫葛根皮搗細末醋和封之治癰本草以黃耆作膏貼之治患癰苦不潰以雀屎一枚傅之立決雄雀屎頭尖者是也治癰毒本草方見本門前諸癰疽類即以米粉散射癰腫令散本草以好井水及土石間新出泉水飲之易散治癰腫惡瘡本草用師系煮洗之療癰腫本草用木甘草煮熱洗之治癰瘡甚效本草用小青葉三月採生搗碎傅治癰瘡本草用黃葵花為末水調塗之立愈主癰腫本草搗鬼膞莖葉傅之瘥治癰腫本草以人髭燒灰傅瘡立愈唐李績嘗疾醫討之得鬚灰服之方止太宗遂自剪髭燒灰賜服之故白樂天云剪鬚燒藥賜功臣消癰腫本草用見腫消生苗葉爛搗貼治癰腫無頭本草杵蜀葵末傅之主癰腫風疹腳疼本草以螺黛草搗傅之亦煮湯洗腫處療癰腫本草用苦痂子其子以醋磨傅癰腫根亦作浴湯治諸瘡癰腫不散者本草取生白藥根爛搗傅貼乾則易之無生者用末水調塗之亦可治一切惡瘡癰腫本草以風延母煮服之治癰一切腫未成膿拔毒本草方見本門前癰疽等瘡內消法類蠣粉散治癰瘡腫毒本草以芋葉和鹽研細傅之去皮膚風熱流注骨節癰腫疼痛用火炭母草葉搗爛於垍器中以鹽酒炒傅腫處經宿一易治癰腫發數處本草方見本門前諸雍疽類二聖散治癰腫未有頭必穴方以醋磨黃藥塗之治癰腫用升麻水煎綿拈拭瘡上亦治豌豆瘡又方用齒垽和黑蝨研塗之又方用東向厠溺坑中青泥水調服之未膿即散有膿潰之治生癰毒未成頭赤腫疼痛不可忍右以竹片為圈子看腫大小作圈置腫上取馬蝗三五條置圈中令咂去毒血即消腸癰附論夫癰發於外人可得見者猶為危急之疾而况隱伏腸間痛無定處人不可得而見者乎蓋癰疽五發在外則為發背發腦發眉發鬚發頥在內則為腸癰心癰腎癰肺癰臍癰等患治之得法尚庶幾焉一著小差枰碁去矣何則腸癰為病身皮甲錯腹皮緊急如腫之狀而按之濡體無閧熱腹無積聚者此積隂冷之所致也當以溫藥調之發汗無汗灑淅惡寒小腹腫強而按之痛小便澀數其候如淋者此內結熱之所致也當以涼劑利之其脈遲緊膿未成者可下其脈洪數膿已成者不可下甚者腹肚脹大轉側聞有水聲或繞臍生瘡膿汁穿出或臍中常常出膿或大便屢下膿血凡此皆為惡證其間寒熱氣急煩渴悸驚嘔惡唾膿咳嗽痰涎自汗自利如尋常發癰之狀亦類有此婦人尤多得之內經有曰息賁病有人得之二三年遍身微腫其後大便與臍俱出膿血遂致不救此亦腸癰之類寸口脈滑則為實數則為熱滑則為榮數則為衛衛下降榮上升遇時或有熱則榮衛相干血為滑偹心小腹痞滿小便或腹惡寒膿為已成設脈遲緊聚為瘀血血下則愈膿成引日又諸浮數脈當發熱而灑淅惡寒若有痛處者當積有膿脈滑澀相搏腸癰唾膿是也千金方云官羽林婦病醫何以知林婦腹中有膿為下之即愈答曰寸口脈滑而數滑則為實數則為熱滑則為榮數則為衛衛數下降榮滑上升榮衛相干血為滑備小腹痞堅小便或澀或復汗出或復惡寒膿為已成設脈遲緊即為瘀血血下則愈方當歸煎出聖惠方治腸內生癰腫令人心膈間氣滯急痛壯熱嘔逆小便黃赤焮表發腫腫中夜間如湯沸聲速須救療當歸一兩沒藥三分麝香半兩細研乳香半兩桂心半兩硃砂半兩細研黃耆三分漏蘆自然銅丁香各半兩木香三分芎藭半兩騏驎竭二分檳榔雲母粉沈香甘草白斂白芷蜜陀僧各半兩赤芍藥三分野駝脂三兩黃犬脂三兩生地黃半斤絞取汁右藥除脂外為末銀鍋內用好酒五升熳火煎去二升即下地黃汁更煎漸濃次入野駝脂不住手以栁木箆攪如膏即下藥末更攪令勻以瓷盒盛每日空心午時晚間以甘草酒下一彈丸大取塗貼患處亦良木通散出直指方治腸癰熱證腹痛而強發熱惡寒小便似淋膿未成者用此薏苡仁木通葶藶炒甘草炙川升麻桔梗桃仁浸去皮炒赤茯苓牡丹皮各一兩大黃半兩朴硝一分生乾地黃甜瓜子敗醬赤芍藥各一兩半右為散每服三錢井水一盞半薑五片煎服犀角丸出聖濟總録治腸癰并一切癰疽發背腫毒犀角屑一兩半巴豆十粒去皮心炒研去油蜀椒去目并閉口者炒去汗半兩黃芩去黑心防風去叉人參當歸切焙黃耆細銼藜蘆去蘆頭山梔子去皮黃連去鬚甘草炙銼升麻各半兩右為末煉蜜丸如梧桐子大每服三丸空心米飲下加至四五丸利下黃水為度牡丹散出直指方治腸癰冷證腹滿而痛時時利膿人參牡丹皮白茯苓天麻黃耆木香當歸川芎辣桂各三分白芷薏苡仁甘草炙各二分桃浸去皮炒三分右為末每服三錢井水煎食前服木通散出聖惠方治腸癰小便不利似淋腹中苦痛寒熱汗出時時利膿木通銼薏苡仁各一兩生乾地黃二兩甘草炙微赤銼桔梗去蘆頭各一兩丹參二兩麥門冬一兩去心赤芍藥一兩半赤茯苓一兩敗醬二兩牡丹一兩黃耆一兩銼右為粗散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服以小便利為度內補散出醫方集成治諸發已潰去舊生新老人血氣虛弱宜補之此潰後服至愈而止一名護壁都尉及治腸癰冷證癰疽等患人參當歸川芎厚朴薑製防風白茯苓桔梗焙白芷辣桂黃耆炙甘草炙各等分右為末每服三錢溫酒調下如不飲酒楠木香煎湯下諸癰熱證黃瓜蔞煎湯下一方無白茯苓牡丹湯出千金方治腸癰牡丹皮一兩芍藥丹參生乾地黃切焙各二兩桔梗銼炒麥門冬去心焙各一兩半甘草炙赤茯苓去黑皮敗醬各一兩右粗搗篩每服五錢水二盞入生薑五片煎至一盞去滓空心日晚溫服甜瓜子散治腸癰腫痛妨悶氣欲絶甜瓜子二兩桃仁浸去皮尖雙仁麩炒微黃牡丹皮各一兩川大黃一兩半銼微炒川朴硝一兩薏苡仁一兩敗醬一兩當歸半兩檳榔三分右為散每服四錢水一中盞煎至六分去滓不計時溫服牡丹散出聖惠方治腸癰未成膿中痛不可忍牡丹二分川大黃二兩銼微炒木香桃仁湯浸去皮尖雙仁麩炒微黃三分川硝一兩赤芍藥三分敗醬甜瓜子各三分右為散每服四錢水一中盞煎至六分去滓食前服以利下膿血為度伏梁丸出外科精要治環臍腫痛胃瘡疽厚朴薑汁製茯苓枳殼麩炒去穰白术人參京三稜炮半夏湯洗七次各一兩右為細末麵糊為丸如小豆大每服三十丸食前米湯下梅仁湯出聖濟總録治腸癰裏急隱痛大便祕塞梅核仁四十九箇去皮尖大黃三兩牡丹皮一兩三分冬瓜仁四兩犀角鎊一兩半芒硝二兩半右㕮咀如麻豆大每服五錢水二盞煎一盞去滓溫服以下膿血三兩行為度赤茯苓散出聖惠方治腸癰小腹牢強按之痛小便不利時有汗出惡寒脈遲未成膿赤茯苓一兩甜瓜子二兩川大黃二兩銼碎微炒川芒硝半兩桃仁一兩浸去皮尖雙仁麩炒微黃牡丹一兩半右為粗散每服四錢水一中盞煎至六分去滓溫服日三四服之大黃湯出聖濟總録治腸癰小腹堅腫大如掌而熱按之則痛其上色或赤或白小便稠數汗出憎寒其脈遲緊者未成膿如脈數則膿已成大黃銼炒牡丹皮硝石研桃仁浸去皮雙仁麩炒芥子各半兩右粗搗篩每服五錢水二盞煎至一盞去滓空心溫服以利下膿血為度未利再服牡丹湯一名瓜子湯出千金方治腸癰小腹腫痞按之即痛如淋小便自調時時發熱自汗出惡寒其脈遲緊者膿未成可下之當有血洪數者膿已成不可下大黃蒸桃仁去皮尖各十兩牡丹皮一兩一錢瓜蔞子三分一作瓜子芒硝二錢右銼散以水三盞煎八分去滓入芒硝再煎沸不拘時頓服一方用冬瓜子一升無瓜蔞子未效用敗毒散刪繁方用芒硝半合瓜子五合劉涓子用硝石三合云腸癰之病小腹痞堅或偏在膀胱左右其色或白堅大如掌熱小便欲調時自汗出其脈遲堅者未成膿可下之當有血脈數膿成不復可下薑黃散治內毒乾薑一兩大黃一兩生薑一兩皂角刺九箇右用酒一碗水一碗同煎至一半去滓溫服滓酒水各一碗再煎溫服須用瓦器煎四聖散一名神效瓜蔞散出直指方治腸癰癰疽生於腦髭背腋乳便毒神效生黃瓜蔞一枚去皮粉草末四錢沒藥末三錢乳香末一錢右用好紅酒二大碗熳火煎至一碗分作兩服兩日服盡大便順下惡物妙若乾瓜蔞則用兩枚一方若病在上食後服病在下食前服毒已結成即膿化為水毒未成即於小便中出疾甚再令服以退為妙薏苡仁湯一名瓜子湯出千金方治腸癰薏苡仁一升牡丹皮桃仁各三兩瓜瓣仁二升右㕮咀以水六升煮取二升分再服姚氏不用桃仁用杏仁崔氏有芒硝二兩云腹中疼痛煩毒不安或脹滿不下飲食小便澀此病多是腸癰人多不識婦人産後虛熱者多成此病縱非癰疽但是便服此湯瓜子汁出聖惠方治腸癰壯熱惡寒微汗氣急小腹痛小便澀或大便如刀錐刺痛或有膿腹中已成膿瓜子仁三合與水六合同研絞取汁當歸切焙一兩搗末蛇退一條燒灰研右將二味末和勻分作二服用瓜子汁調下空心日午服下膿血差薏苡仁附子敗醬散出鮑氏方治脈數身無熱腹無積聚按之濡此為腸癰及治腹癰有膿者薏苡仁二兩半附子炮半兩敗醬一兩一分右為銼散每服四錢水一盞半煎七分去滓空心服小便利為效一方入生薑半分同煎雞毛散出千金方治腸癰雄雞頂上毛燒灰雄雞屎燒灰各一兩右為細散每用溫酒二合空心調下一錢日晚再服燒棗散出直指方治腸癰乾棗連枚燒在性川百藥煎研細等分右為末每服一錢米飲調下治腸癰腹脹皮急微汗小腹重強按之即痛小便數似淋未有膿方聖惠方牛蒡根汁五合川芒硝一兩右藥相和煎一二沸分為二服空心及晚食前溫服治腸癰出千金方用截取簷頭尖少許燒灰水和服當作孔出膿血愈拔毒散出千金方凡腸癰其狀兩耳輪文理中錯初患腹中苦痛或臍邊有瘡如栗皮熱便膿血出赤白下用馬蹄灰以雞子白和塗即拔氣不過再又方出千金方用瓜子三升搗末以水二升煮取一升五合分三服又方出千金方用死人塜上土作泥塗之治內癰未作頭者方出千金方取伏雞屎服之即瘥又方出千金方用馬牙灰雞子和塗之乾則易治腸癰腹臟瘀血運撲損用大薊葉生研酒并小便任服惡瘡疥癬鹽研四音傳又名刺薊山牛旁治小腸癰毒及軟癤不作頭本草以茅針濃煎和酒服木占斯散一名內補散治腸癰病在上當吐病在下當下膿血此謂腸癰之屬其癰腫即服諸疽痔若已潰便早愈發背無有不療不覺腫去時常服去敗醬多治婦人諸産癥瘕益良方見本門諸雍疽類肺癰附論內經曰肺之癰喘而兩胠滿蓋主氣而合於息其脈反别者從肺系橫出腋下故邪氣藴積於肺則上為喘急下連兩胠滿治宜瀉其肺臟之邪毒也肺癰病咳咳膿血其脈數實者屬肺癰虛者屬肺痿咳而口中自有津液舌上胎滑此為浮寒非肺痿若口中辟辟燥咳即胸中隱隱痛脈及滑數此為肺癰也問曰病者咳逆師脈之何以知為肺癰當有膿血吐之則死後竟吐膿死其脈何類何以别之師曰寸口脈微而數三因云寸口脈數而實按之滑微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血脈風舍於肺其人口乾喘滿咽燥不渴多唾濁不時時振寒熱之所過血為凝滯蓄結癰膿吐如米粥如萌可救膿已成則難治寸口脈數趺陽脈緊寒熱相摶故振寒而咳趺陽脈得緩胃氣如弦此為肺癰師曰振寒發熱寸口脈滑而數其人飲食起居如故此為癰腫病醫及不知而以傷寒治之不應愈也何以知有膿膿之所在何以别知其處師曰假令膿在胸中者為肺癰其脈數咳唾有膿血設膿未成其脈自緊數若但數膿為已成也凡病肺癰脈來短澀順浮大者死其色當白而多赤者亦死中府隱而微痛者肺疽也上肉微起者肺瘡也中府者穴也在雲門下一寸六分乳肋間動脈應手陷中也是以候始萌則可救膿成則多死若欲知有膿者但診其脈若微緊而數者未有膿也緊甚而數者已有膿也肺癰肺痿二證皆為難治肺癰者出於上焦客熱停於肺腑咳嗽胸膈內痛致使肺爛成癰唾膿如敗糊臭穢此難治脈關前緊後微小下虛上盛也古人以黃茋為主甘桔湯為佐然罕有安者以肺穿故儒門事親書云舞水有一富家二子長者年十三幼者十一歲皆好頓食紫缺一二斤每歲須食半月後一二年幼者發肺癰長者發肺痿相繼而死戴人常曰人之死者命缺方消膿飲出聖惠方治肺有癰膿腥氣上衝嘔而咳嗽生南星一兩知母貝母去心炒生地黃阿膠炒川芎桑白皮炒甘草炙各三兩防風射干桔梗天門冬去心腦荷杏仁不去皮半夏製紫蘇葉白芷白芨各半兩右銼散每四錢薑七片烏梅一箇食後煎服桔梗湯出鮑氏方治男婦人咳而胸膈隱痛兩腳腫滿咽乾口燥煩悶多渴時出濁唾腥臭名肺癰小便赤黃大便多澀實者先投參蘇飲四服虛者先投小青龍湯四服並用生薑棗子煎却服之桔梗去蘆貝母去心大當歸酒浸瓜蔞仁枳壳去穰炒薏苡仁微炒桑白皮炒甘草節防己去粗皮各一兩百合蒸半兩黃茋一兩半正地骨皮知母杏仁北五味子甜葶藶各半兩右銼散每服四錢水一盞半生薑五片煎不拘時溫服咳不活加百藥煎熱加黃芩大便不利加煆大黃少許小便澀甚加木通車前子煎煩燥加白茅根咳而疼甚加人參白芷桔梗湯出濟生方治肺癰心胸氣壅咳嗽膿血心神煩悶咽乾多渴兩腳腫滿小便赤黃大便多澀桔梗去蘆貝母去心膜當歸去蘆酒浸瓜蔞子枳殼去穰麩炒薏苡仁炒桑白皮蜜水炙防己各一兩甘草節生用杏仁去皮尖麩炒百合蒸各半兩黃茋去蘆一兩半右㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候若大便祕者加大黃小便祕者加木通理肺膏出危氏方治肺癰正作咳唾不利胸膈迫塞訶子去核百藥煎五味子微炒條參去蘆欵冬花蘂杏仁知母貝母甜葶藶子紫苑百合甘草節各五錢右為末用白茅根淨洗稱三斤研取自然汁入磁石器中熬成膏更添入好蜜二斤再熬勻候冷調和前藥為丸如梧桐子大溫水吞下黃茋散出聖惠方治肺癰心胸氣塞咳嗽膿血有胸煩悶小便赤黃大便多澀黃茋一兩白蒺藜三分枳殼三分麩炒微黃去穰紫蘇莖葉赤茯苓各一兩杏仁三分湯浸去皮尖雙仁麩炒微黃桑根白皮銼天門冬去心川大黃銼碎微炒各一兩當歸甘草各半兩生乾地黃一兩右為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服葶藶散出危氏方治肺癰咳嗽氣急睡臥不安心胸脹滿甜葶藶子一兩半百合白附子北五味子炒甘草節羅參欵冬花百藥煎各一兩紫苑去木一兩大硃砂五錢别研右為末每服二錢燈心湯調下升麻白斂膏療腸癰肺癰方升麻白斂漏蘆芒硝各一兩黃芩枳實炒連翹蛇銜各三兩梔子二十枚擘蒴藋根四兩右搗令細以水三升漬經半日以豬脂五斤煎令竭去滓傳日三若膠緊合水煎漢防己散出聖惠方治肺癰喘急咳嗽膿血心神煩悶咽乾多渴漢防己三分麥門冬三分去心桑根白皮一兩銼赤茯苓一兩枳殼三分麩炒微黃地骨皮三分前胡一兩去蘆黃茋一兩銼甘草半兩炙微赤銼右為散每服四錢水一中盞入生薑半分煎至六分去滓不拘時溫服牡丹散治肺癰胸乳間皆痛口吐膿血氣作腥臭川升麻苦梗薏苡仁地榆黃芩赤芍藥牡丹皮北甘草各等分右銼散每一兩水一升半煎五合溫服三日桔梗白术湯治肺癰吐膿經時不瘥桔梗銼三升白术生地黃焙薏苡仁甘草炙敗醬各二兩當歸切焙一兩桑根白皮銼一升右銼如麻豆以水一斗五升煮大豆四升取七升去豆內清酒三升合諸藥煮之去滓取三升每服一盞日三夜二升麻湯出經驗良方治肺癰吐膿血作臭氣胸乳間皆痛升麻桔梗薏米即苡仁地榆黃芩牡丹皮芍藥各五錢甘草七錢半生地黃湯治肺癰生地黃汁升當歸切焙甘草炙白石英碎綿裏人參各一兩附子炮製去皮臍一兩白豆小者十粒白雞一雙男用雌女用雄治如食法一作雄右除地黃汁雞外銼如麻豆以水一斗五升先煮雞取七升汁去雞內地黃汁諸藥等煮取三升去滓每服一盞日三夜二服平肺湯治肺癰氣逆喘咳紫苑去土人參紫薊去梗各二兩杏仁去皮尖雙仁麩炒橘皮湯浸去白焙各一兩黃茋一兩銼沈香半兩右㕮咀如麻豆每服五錢水一盞半煎至八分去滓溫服日三為效竹茹散出聖惠方治肺癰煩悶咳嗽膿血苦竹茹一兩生乾地黃一兩茜根半兩百合半兩杏仁半兩湯浸去皮尖雙仁麩炒黃茋一兩銼甘草半兩炒微赤銼右為粗散每服五錢水一大盞入生薑半分煎至五分去滓不拘時溫服內護排膿散出危氏方理肺癰吐膿宜後服排膿補肺嫩黃茋二兩川白芷北五味子炒人參各一兩右為末煉蜜丸如小指頭大偃仰入口噙化旋旋咽下食後臨臥服治肺癰證始萌易治膿成難治診其脈數而實已成微而清漸愈面色白嘔膿而止者自愈有膿而嘔食面色赤吐膿如糯米粥者不治男子以氣為主得之十愈二三婦女以血為主得之十愈七八青葦散出聖惠方治肺癰其聲破嗄體有微熱煩滿胸前皮甲錯者肺腫也青葦二莖薏苡仁二合甜瓜子二合桃仁五十枚湯浸去皮尖右搗碎先以水三大盞煎葦至一大盞去滓入薏苡仁等三味同煎至七分去滓不計時候分溫二服四順湯治肺癰吐膿五心煩熱壅悶咳嗽貝母去心桔梗炒紫苑去苗土各一兩甘草炙銼半右搗篩每服三錢水一盞煎五七沸去滓不拘時候稍冷服如咳嗽甚入去皮尖杏仁二枚同煎小兒量減華蓋散治肺癰上喘咳嗽胸膈滿悶口乾煩熱及吐血赤茯苓去黑皮甜葶藶隔紙炒桑根白皮銼各一兩大黃半兩濕紙裹煨熟右搗羅為散每服二錢薑調下食後臨臥服葦葉湯出三因方治肺癰薏苡仁瓜瓣仁桃仁去皮尖各一兩右為銼散每服四錢水二盞先以葦葉一握煎取一盞去滓入藥六分食後服或吐膿血勿疑葶藶丸治肺癰甜葶藶隔紙炒别研細羅過杏仁去皮尖雙仁麩炒别研如膏各一兩貝母煨令黃色去心别搗再研半兩右先使不蛀皂莢肥者二兩生椎碎入在無灰酒半升內熟挼濾去滓入淨銚子中慢火熬成膏次將前三味藥拌勻旋入皂莢膏和丸如梧桐子大每服二十丸溫水下如肺氣喘急濃煎桑白皮湯下不拘時候服防己葶藶丸治肺癰防己一兩葶藶隔紙炒三分杏仁去皮尖雙仁麩炒研如脂一分右先搗前三味細羅為末與杏仁同研令勻取棗肉和丸如梧桐子大每空心服煎桑白皮湯下二十丸日三服麥門冬湯治肺癰涕唾涎沫吐膿如粥麥門冬去心焙二兩桔梗去蘆頭五兩甘草炙銼三分右粗搗篩每服三錢水一盞青蒿葉十片同煎至七分去滓溫服稍輕者粥飲調下亦得不計時候杏仁丸治肺癰喘急杏仁去皮尖雙仁麩炒研入右搗羅為末煉蜜和丸如梧桐子大生薑蜜湯下十丸至二十丸食後臨臥服棗膏丸出醫方集成治肺積在右脅下大如杯發為癰疽陳皮桔梗葶藶研各二兩右前二味為末入葶藶研勻煮棗肉和丸如梧桐子大每服五七丸米湯送下薏苡湯治肺癰唾吐膿血薏苡仁二合黑豆百粒烏梅一箇右水二盞煎至一盞入透明阿膠生蒲黃各一錢再煎沸食後服二桔梗白散一名桔梗丸出聖惠方治咳胸中滿而振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如粳米粥者肺癰也桔梗三分貝母三分巴豆一分去皮心熬研作脂右搗篩強人服半錢羸人減之若病在膈上必吐膈下者必利若利不止者飲冷水一杯則定忌豬肉蘆笋等葶藶湯治肺癰咳嗽上喘氣急不得臥涕唾拓粘胸膈不利葶藶隔紙緩炒紫色别研如膏桑根白皮微火細銼大棗揀洗去核右用水三盞先煎桑白皮一兩棗十二枚取一盞半去滓入葶藶膏一彈子大攪化煎取八分溫服良久當吐惡物或微利三兩行其疾減後宜服補肺藥七日外病未退量人加減更一服一方瀉肺湯無大棗薏苡仁湯治肺癰心胸甲錯者薏苡仁一升苦酒三升右同煮取一升去滓微溫頓服有膿血吐出驗補肺散治肺癰已吐出膿血以此潤護真鍾乳粉一兩白骨石右為末每服三錢米飲調下夜合湯一名黃昏湯出聖惠方治肺癰咳喘體有微熱煩滿胸前皮甲錯者用夜合白皮一兩銼以水三盞煎取一盞半分溫二服排膿散出聖惠方治肺癰得吐膿血喘急此藥排膿補肺用綿黃茋去蘆二兩生用為細末每服二錢水一中盞煎至六分溫服吐膿後用甜葶藶二兩半隔紙炒令紫色為末每二錢煎六分溫服治肺癰方出聖惠方以薏苡為末糯米飲調下又粥內煮喫亦可一方水煎服當下膿血便愈葶藶大棗瀉肺湯出聖惠方治肺癰胸脹滿一身并面目浮腫鼻寒清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞飲不得息以葶藶炒令黃研細丸如彈子大用水三盞煮棗十枚至一盞去棗入藥煎至七分食後服金匱令先投小青龍湯三服乃進此樂一方去棗水煎服治上膈壅熱而成肺癰兼感風寒重用加味敗毒散入黃芩瓜蔞仁薄荷當歸川白芷半夏烏梅桑白皮半料各五錢生薑生地黃燈心白茅根煎熱甚加大黃治腹癰為病小腹重抑之則痛小便數時時汗復惡寒其身背甲錯或繞臍生瘡或膿出大便療之方亦治腸癰肺癰搗生鯽魚令熟以淳酒加塗腹上集驗方出肘後方療胸中滿而振寒脈數咽燥不渴時時出濁唾腥臭久久吐膿如糯米粥是肺癰治之一名桔梗湯桔梗甘草各二兩炙右以水三升煮取一升分再服朝暮吐膿血則瘧一方溫服如人行八九里再服金沸草散如宜方治肺癰嗽出膿血神悶咽燥渴大小便澀荆芥穗四兩半夏製甘草各一兩麻白製前胡旋覆花各二兩赤芍藥一兩右㕮咀薑棗煎熱服後服防己丸又紅棗百藥煎等分燒灰存性為末飲湯下桔梗湯出衛生家寶方治肺癰初萌桔梗甘草薏苡仁各二兩右為粗末每服五錢水二盞煎至一盞去滓服治肺癰咳血出永類矜方以薏苡仁為末熟煮豬胰切片蘸藥食候空時食之蓋苡仁補肺豬胰引入絡經又薏苡仁三合搗爛水二大盞煮一盞去滓分二服佳肺癰咳血經效出永類矜方馬兜鈴桑白皮地骨皮並蜜微炒桔梗薏苡仁以食後粳米一撮入生地黃汁少許補肺散出永類矜方人參北五味黃茋右用羊肺豬肺瓦器煮食蘸好鍾乳粉便癰附論夫便癰者謬名也乃男子血疝也難素所不載然而足厥隂肝之經絡是血流行之道路也衝脈任肺督脈亦屬肝經之旁絡也難經曰男子七疝血疝乃七疝之一也治以導水丸桃仁承氣湯或抵當湯投之若瘀血聚而不散可以大作劑料大瀉一二十行次以玉燭散和血通經之類是也世人多用大黃牡礪間有不愈者是不知和血通經之道也方七聖散治便癰大黃山梔牡礪生瓜蔞去常蓋金銀花皂角針火燒出火氣甘草各等分右為細末每服半兩生薑一大塊酒水各一盞煎耗半去滓空心服以通利為度却以藥盫於腫處仍用扯自身衣帶縳住腳大指隨病左右乳香定痛膏出經驗良方治便癰先服復元通氣散黑神散打和酒調服以藥調塗南星半夏殭蠶各半兩柏霜葉一兩即芙蓉葉沒藥乳香各一兩右為末薑汁調塗極能定痛消腫及治腫毒無名惡瘡瓜蔞散出瑞竹堂治便癰等惡瘡瓜蔞一箇去皮生薑半兩甘草半兩金銀花三錢牛旁子三錢微炒右將藥不犯銅鐡鎚碎用酒一大升煎數沸空心溫服微利為度便癰方出神效方便癰本名血疝牡礪大黃甘草各半兩懸蔞一箇三物湯治便癰牡礪大黃山梔子各等分右為末水酒一大盞煎至七分露一宿溫起空心服治便癰朴硝末三錢乾薑末一錢右作一服用無灰好酒半碗空心調下宣毒散治便癰腫毒大黃一兩牡礪一兩炒右為細末每服三錢酒二盞煎至六分和滓溫服以利為度水調掃腫上即消治便癰出神效方用冬葵子為末酒調下三兩服又方治便癰俗名􅂒􅗢欲作未作之時用皂莢不蛀者燒過隂乾為末酒調服之又皂角子七箇水服之亦效胡桃酒方出神效方用胡桃七箇燒過隂乾研為末酒服之不過三服生蜜粉方出神效方用生蜜米粉調服休喫飯利小便為度治便癰出危氏方牛旁子破故紙大黃黑牽牛右等分為細末空心酒調下一服即消神效樺皮散出永類矜方治便癰初發即用樺皮杏仁皂角刺甜桃十二枚山梔子五味各燒灰三錢川山甲黃土炒三錢乳香沒藥各二錢酒浸别研調和加麝香少許共九味前六味並作末却加下三味可作六服酒調猛進二服即見效經驗只用豬牙皂角煨令黃色作末酒調效初發時服五香連翹散吞皂角煎丸用復元通氣散不及此淮人用蜀葵子七粒皂角半挺作末以石灰同醋調搽貼獨子肥株同蒜搗貼亦佳身熱脈實先服敗毒散數服住已潰者太乙膏貼又四住散一兩十宣散二兩打和酒調又擂蔥根入蜜和勻貼腫處用紙不令走氣內服樺皮通氣等散一云服前樺皮散丸用胡桃煎於油中却用酒空心嚼胡桃使大便稍利却用樺皮散一川山甲燒存性為末酒服後用土塗瘡上未成即消已成即潰初作宜服復元通氣散為先腎癰附論夫腎癰於內腎相對皆由腎氣衰敗而成突起皮赤者易安陷入皮黑者難痊如精神清爽顔色紅潤飲食不減多起少臥此為善義也顔色黑黃飲食全減斯為可憂惟須詳審速療肺癰乃將理失宜勞傷氣血風寒之氣乘虛而入內舍於肺及挾邪熱其氣結聚或作寒熱脈數而實者是也方消毒散出百選方治男子腎癰婦人乳癰一切赤腫焮毒服之自散赤土一皂子大木鱉子七箇炮去皮右同研令極勻分三服熱酒或米飲調下食後服不動臟腑不過一劑效治外腎癰瘡用抱雞卵殼鷹爪黃連輕粉等分為末煎過清油調塗治大夫隂頭癰出肘後方用鱉甲一枚燒為末以雞子白和傅之治腎癰及天行熱疾用烏賊骨末粉傅之甘草膏出百選方治水穀道前後生癰謂之懸癰乃肛門及膀胱處生核子如橄欖㨾或梅李狀初不作痛至旬月漸作熱不早治瘡潰膿血出日數碗有至腸腐而大便從瘡口出者其苦不可言近亦數月逺至一二年亦愈須是作核未痛以前治之不過一二服便自消此病初發如松子大漸如蓮子數十日後如覺赤腫似桃李即破若破則難治服此藥此癰已破服此藥二服瘡口即合甚妙用粉草半斤內用無節者四兩如算子㨾擘破隨取泉石間長流水以甘草入水中浸透以炭火將甘草蘸水焙炙以一碗水盡為度不可急性劈開和將所炙甘草另用泉水二盞無灰好酒五盞用瓦罐煎至二之一如膏一起服之立愈另用有節甘草四兩仍用泉水隨罐大小煎湯漉洗患處三遍其效如神如水冷再溫熱洗一方治懸癰卒腫用硼砂半錢綿褁含咽津瘥治懸癰大黃甘草節貝母白芷右為末小酒調兼治弩氣諸瘡瘥癤虛弱人加當歸一半大黃煨一半治懸癰乖宜􅀈中妨悶出本草白礬一兩焙灰鹽一兩右細研為散以筯頭點藥在上瘥附骨癰附論凡身體盛熱不可當風蓋風冷之氣入於肌肉則熱氣搏伏不得出故附著於骨而成癰也其狀無頭但腫而濶皮膚薄澤者以毒氣伏留於內故也法宜外散其寒內逹藴熱乃得本摽之治乎方金石凌法出聖濟總録治附骨癰梔子仁半斤犀角屑麝香研各半兩桔梗銼炒二兩半石膏捶碎寒水石捶碎各四兩木通銼甘草銼炙鬱金銼各二兩青木香銼一分朴硝研四斤金二十兩右除朴硝麝香外先將寒水石石膏金以水二斗於銀器內慢火煎至一斗次下前犀角等草藥七味再煎至五升以生絹濾去滓下朴硝以栁木箆攪勿住手候稍凝即住火入麝香拌令勻盛密器中每服一錢新水調下老幼加減服貫衆湯出聖濟總録治附骨癰生股上伏肉淋貫衆地骨皮穀精草枇杷葉拭去毛炙荆芥去梗蜀椒去目并閉口者各一兩當歸散出神效方治附骨癰及一切惡瘡當歸半兩甘草一兩山梔子十二箇木鱉子一箇去皮右為細末每服三五錢冷酒調下蜜陀僧散出聖濟總録治附骨癰蜜陀僧自然銅各半兩杏仁去皮尖雙仁二七枚右用苦竹筒一枚入藥在內紙封筒口慢火煨候竹筒黃色取研極細看瘡大小用藥以新汲水調勻用雞翎掃藥塗癰上甚者不過二七日效蛇皮散一名三生散治附骨癰疽癤腫丁腫諸毒根臟腑瘡口久不合蛇皮露蜂房亂髮各半兩右燒灰存性研細每服二錢溫酒調下日三服一方其蜂房用樹上懸得風露者其蜂黃黑色長寸許馬牛人及至死者用此皆有效非人家屋下小小蜂房也牛膠散出聖濟總録治附骨癰牛皮膠黃明者慢火炙令黃甘草用水一盞蘸炙水盡銼各半兩右為散每服二錢濃煎木賊湯調下空心服復取藥末以井水調膏看瘡大小攤紙貼之甘草湯出聖濟總録治附骨癰甘草炙二兩露蜂房一兩右銼以水五升煎至三升去滓以故帛二片浸湯中更互洗瘡上日三槲皮散出聖濟總録治附骨癰疽用槲皮三兩燒令煙盡細研為末每服二錢空心米飲調下日晚再服治附骨癰方出聖濟總録用生地黃取汁一盞於銀石器中煎如膏候冷塗傳腫上日三五度又方出聖濟總録用新鼠皮一張看瘡大小裁貼日二次出膿若已潰者用豬脊脂貼吮膿出盡即瘥五香連翹湯一名連翹散治附骨癰結核膿水腫痛心腸氣滿方見本門發背類內托黃茋柴胡湯出誠效方治附骨癰黃茋二錢柴胡一錢羌活五分連翹一錢三分肉桂三分土瓜根一錢酒製生地黃一分黃柏五分當歸尾七分半右㕮咀作一服水三盞酒一盞同煎至一盞去滓熱服宿食消盡服一服而愈昔賈德茂男年十歲丁未四月十一日於左腿近膝股內出附骨癰肉色不變漫腫皮澤未硬瘡勢甚大其左腳乃肝之脾土也更在足厥隂肝經之分侵足太隂脾經之分其脈左三部細而弦按之洪緩微有力一方無黃柏內托黃茋酒煎湯出誠效方治附骨癰柴胡一錢半連翹一錢肉桂一錢黍粘子炒一錢黃茋二錢當歸尾二錢黃五分升麻七分甘草炙五分右㕮咀好糯米酒一盞半水一大盞半同煎至一大盞去滓溫服空心宿食消盡服之待少時以早膳壓之使不令大熱上攻中上二焦也丁未季春二十二日蒲度主老年七十因寒濕地氣得附骨癰於左腿外側足少陽膽經之分微侵足陽明分闊六七寸長一尺堅硬漫腫不變肉色皮澤深但行步作痛以指按至骨大痛與藥一服立止再服堅硬除而腫消石癰夫人之氣血得熱則泳永旱澤得寒則凝結石癰者寒氣凝結致熱一氣不得散故其腫結確實有核皮肉不甚熱微痛熱時自歇此寒多熱少堅硬如石之狀而謂之石癰久久熱氣乘之乃有膿也治宜溫調榮衛散其寒邪使氣得陽而外發則腫硬自消而膿血出矣方沈香湯治石癰腫毒結硬疼痛乾口煩熱四肢拘急不得卧方見本門石疽類犀角湯出聖惠方治石癰熱毒氣盛腫硬疼痛口乾煩悶犀角鎊三分連翹射干梔子仁升麻當歸切焙各一兩大黃銼炒二兩木香三分枳殼麩炒赤芍藥右粗搗篩每服三錢水一盞煎六分去滓不計時候溫服占斯散治石癰結實已壞未壞方見本門石疽類升麻湯出聖濟總録治石癰皮色紫赤惡寒壯熱一二日未成膿者下之亦治石疽堅硬升麻連翹大青各一兩生地黃焙二兩敗醬絡石白斂各半兩人參一兩大黃銼炒二兩右粗搗篩每服五錢水一盞半煎八分更入芒硝末半分去滓空心溫服微利為度黃連散出聖惠方治石癰結硬發熱紫赤色毒氣攻衝未定日夜疼痛宜用此消腫化毒止痛黃連川大黃生用白斂馬牙黃柏銼各一兩青鹽騏驎竭各半兩赤小豆半兩炒熟杏仁四十九枚湯浸去皮尖研用右為細散用蜜水調塗癰上乾則易之凝水石散出聖濟總録治癰疽結硬未成膿貼之凝水石黃柏黃茋銼黃連去鬚大黃石膏梔子仁各半兩白斂一兩右搗羅極細以漿水調如糊攤故帛上貼患處大黃散出聖惠方治石癰腫硬疼痛心腹煩悶不得宣暢川大黃一兩銼碎微炒當歸一分川芒硝黑豆皮枳殼麩炒微黃各半兩牛旁子一分微炒芎藭一分甘草半兩生銼右為散分三服每服水一大盞煎至五分去滓不計時候溫服以利為度木香散出聖濟總録治石癰已服前升麻湯後用此貼塗木香大黃銼炒升麻白斂各半兩芒硝赤小豆各半兩右為散以榆白皮汁入水少許調和如糊塗故帛上貼之日二雄黃散出聖惠方治石癰風毒初結焮核堅硬雄黃細研川大黃生用磁石搗碎細研白礬燒令汁盡細辛各半兩右為細散用雞子白和生蜜調塗之乾則易也練石散出千金方治癰有堅硬如石核者復大色不變或作石疽粗理黃石一斤鹿角八兩燒白斂三兩右用醋五升先燒石令赤內醋中不限數醋減半止總搗末以餘調和如泥厚傅之乾則易取消止盡更合諸漏及瘰癧其藥悉皆用之仍火針針破頭傳藥又單磨鹿角半夏末和傳之時候至取消止內服連翹湯下之姚方云燒石令極赤內五升苦酒中復燒又內苦酒中令減半止搗石和藥先因所餘苦酒不足添上用黃茋當歸散出聖濟總録治石癰久不瘥黃茋銼十兩當歸切炒八兩右為散每服三錢溫酒調下不計時候蜀漆方出聖濟總録治石癰疽蜀漆乾者半兩桑根白皮二兩右為末量多少而用以鎔牛皮膠并酒調和傅腫處日三五次又方出聖惠方治石癰堅如石不作膿者梁上塵葵根莖葉各等分右醋和傅之即瘥并治石疽又塗半夏方出聖濟總録治癰疽結硬未成膿用半夏一兩為末以新水和如糊塗患處日三五次又塗莨菪子方出千金方用莨菪子二兩為末以醋調如糊塗患處乾即易一方治癰始覺腫令消用莨菪末三指撮水和服之治石癰堅如石不作膿者方出千金方用生商陸根不拘多少熱搗傳之乾則易取軟為度及治濕􅀈諸癰癤羊城人用方最效者蛇蛻散出千金方用蛇蛻皮貼之經宿便瘥一方燒灰細研以醋調塗腫上又方出千金方用櫟子一枚以醋於青石上磨之以塗腫上乾易不過十度愈赤小豆方治發癰至堅而有根者名為石癰治療之法當服非酒即藥勢不宜但當稍飲取令相得和散便止凡癰腫有肥人用貼宜瓜栝蔞根和平體用赤小豆五合內苦酒中熬之畢搗為散以苦酒和之塗拭紙上貼腫從發腫兩頭治石癰發腫至堅而有根者方出千金方用桑根白皮搗末酒傅之一方隂乾搗末煬膠和酒附腫根即拔治石癰堅如石不作膿者方出聖惠方用芫花為末水和如膏塗之胃脘癰內經謂人病胃脘癰者當候胃脈其脈沉細者氣逆氣逆者人迎甚盛甚盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰夫隂陽升降則榮衛流通氣逆而隔則留結為癰胃脘癰者由寒氣隔陽熱聚胃口寒熱不調故血肉腐壞以氣逆於胃故胃脈沉細似陽氣不得下通故人迎甚盛令人寒熱如瘧皮甲錯或咳或嘔或唾膿血觀伏梁之病亦有夾胃脘內癰者以其褁大膿血居腸胃之外故也方連翹升麻散出聖惠方治熱聚胃脘留結為癰連翹升麻射干去尾獨活去蘆頭桑寄生木通銼各二兩半大黃銼微炒二兩已上搗為粗末木香沉香鎊薰陸香丁香麝香各等分已上搗研為細末右煎藥五錢水二盞煎至一盞半去滓入後五香末二錢再煎至一盞溫服日三服以快利為度芍藥湯出聖濟總録治胃脘蓄熱結聚成膿赤芍藥犀角鎊木通銼石膏碎升麻各二兩甘草銼朴硝玄參麥門冬去心各一兩右粗搗篩每服五錢水一盞半煎八分去滓溫服不計時候麥門冬湯出聖濟總録治熱氣留聚胃脘內結成癰麥門冬去心焙犀角鎊葳蕤薺苨赤芍藥石膏各一兩半甘草炙銼紅雪各一兩右粗搗篩每服五錢水一盞半煎至八分去滓入竹瀝一合再煎三二沸溫服犀角湯出聖濟總録治胃腑實熱留結為癰陽氣不得下胃脈沉細者犀角鎊梔子仁赤芍藥赤茯苓去黑皮黃芩去黑心射干去毛大黃銼炒各一兩右粗搗每服五錢水一盞半煎至一盞濾去滓入蜜一匙攪勻再煎一兩沸食後溫服射干湯出聖濟總録治榮衛不流熱聚胃口血肉腐壞胃脘成癰射干去尾梔子仁赤茯苓去黑皮升麻各一兩赤芍藥白术各一兩半右㕮咀麻豆大每服五錢水一盞半煎至八分去滓入生地黃汁一合蜜半合冉煎三沸溫服不拘時候日二服癰有膿夫癰有膿者由寒氣搏於肌肉折血氣結聚乃成癰也凡癰不瘥不復可消者若按之都牢強者未有癰也按之牢強半軟者有膿也又手掩上不熱者為無膿若熱甚者有膿也凡覺宜急破之不爾侵蝕筋骨也方托裏排膿散出聖惠方治癰疽一切瘡腫木香一分黃茋三分銼白斂一分占斯芎藭當歸銼微炒細辛桔梗去蘆頭赤芍藥檳榔敗醬甘草炙微赤銼桂心羌活白芷各一分右為細散每服二錢食前甘草湯調下雄黃散出聖惠方治癰疽赤腫疼痛未得膿潰貼成膿雄黃三分細研麝香一兩細研木香半兩川大黃三分黃連一兩白芷二分桂心半兩當歸三分銼微炒黃柏三分銼檳榔二分芎藭半兩騏驎竭三分右為細散用臘月豬脂調令勻塗於絹上貼腫處候膿潰後即用膏藥搜膿生肌龍骨散出聖惠方治癰疽赤腫未得膿潰化膿止痛龍骨兩川大黃半兩生用白斂半兩黃茋半兩銼黃芩半兩白芨半兩牡礪半兩燒為粉雌黃半兩細研甘草半兩芎藭半兩右為細散用豬膽調令如膏攤於帛上塗貼取穴為度大黃散出聖惠方治癰腫已作膿宜貼之川大黃當歸各一兩細辛半兩木通銼芎藭黃連赤芍藥黃茋銼白芨各一兩右為細散每用以雞子白和塗於故細布上以貼腫處燥復易之黃茋散出聖惠方治癰腫惡瘡排膿黃茋一兩半銼白斂赤芍藥芎藭赤小豆各一兩附子羊桃根銼䕡茹牡蒙各半兩當歸散出聖惠方治癰疽瘡等熱毒熾盛不散已成膿潰瘡不可忍止痛搜膿當歸一兩羊桃根一兩銼桂心半兩白斂一兩木香半兩丁香半兩榆白皮一兩銼漢防己一兩右為細散用醋漿水調如膏貼於腫上乾即易之丹粉散出聖惠方治癰腫惡瘡中膿水及新瘡口未乾宜用此散令乾方黃丹二兩定粉二兩白礬二兩右藥研入瓷瓶內用鹽泥固濟慢火熁令乾後即用大火煆通赤候冷將出細研傳瘡蜜陀僧散出聖惠方治癰腫穴後及惡瘡膿水雖減肌肉不生宜此蜜陀僧一兩黃連一兩去鬚檳榔二分右為細散日三貼之治癰腫惡瘡內膿不止出聖惠方用蝟皮燒灰細研內瘡孔中癰煩渴附論夫癰者因寒摶於血血澀不通而熱歸之壅結所成熱氣不得宣泄內薰五臟故煩燥而渴也凡癰腫熱渴者則引飲冷氣入於腸胃即變下利亦變嘔噦所以然者本由虛熱氣逆故嘔噦逆冷乘之故下利也方連翹散出聖惠方治癰腫焮痛口乾煩渴不欲飲食連翹一兩半葛根銼川升麻枳殼麩炒微黃黃芩藍葉赤芍藥玄參白斂羚羊角屑木通銼黃茋銼川大黃銼碎微炒甘草銼各一兩右為粗散每服四錢水一中盞煎至六分去滓不計時候溫服之黃茋散出聖惠方治癰腫體熱煩渴肢節拘急肩背疼痛黃茋一兩半生乾地黃一兩赤芍藥半兩川大黃一兩半銼碎微炒赤茯苓知母柴胡去苗川升麻各一兩當歸半兩木通一兩銼甘草半兩生銼羚羊角屑一兩右為粗散每服四錢水一中盞入小麥一百粒煎至六分去滓不拘時溫服犀角散出聖惠方治癰腫初發熱盛口乾煩渴四肢拘急骨節疼痛犀角屑知母各半兩木通三分銼赤芍藥川升麻各半兩川大黃一兩銼碎微炒萎㽔黃芩各半兩麥門冬三分去心甘草半兩生銼馬牙硝一兩半右為粗散每服四錢水一中盞煎至六分去滓不計時候溫服三二行為度玄參散出聖惠方治癰腫成膿水不能下食心熱口乾煩渴飲水四肢嬴瘦玄參一兩川升麻三分白鮮皮一兩黃連一兩去鬚木瓜根一兩麥門冬一兩去心赤芍藥一兩川大黃一兩半銼微炒大麻仁一兩半川芒硝一兩半右為散每服三錢水一中盞入生地黃一分細切煎至六分去滓不拘時溫服葛根散出聖惠方治癰腫熱甚口乾煩渴或時乾嘔葛根一兩銼甘草半兩生銼黃茋一兩銼川升麻瓜蔞根麥門冬去心赤芍藥生地黃梔子仁各一兩黃芩三分右為粗散每服四錢水一中盞煎至六分去滓不拘時溫服之癰虛熱附論夫發癰虛熱者由寒客於經絡使血氣否澀及結腫成癰熱氣壅結則血化為膿膿潰既瘥之後餘熱未盡而血氣已虛其人翕翕苦熱惙惙虛乏故謂之虛熱也方熟地黃散出聖惠方治癰發後膿潰不止肌體虛熱口乾少食熟乾地黃黃茋銼麥門冬去心各一兩黃芩半兩人參一兩去蘆頭石膏二兩芎藭當歸各半兩白茯苓一兩甘草半兩生用右為散每服四錢水一中盞煎至六分去滓不拘時溫服黃茋散出聖惠方治癰膿潰數日不止致體虛煩熱頭目昏悶黃茋銼防風去蘆頭川升麻羚羊角屑各一兩芎藭三分甘草半分人參一兩去蘆頭地骨皮半兩白茯苓石膏各一兩右為散每服四錢水一中盞煎至六分去滓不拘時溫服沉香散出聖惠方治癰膿潰已絶肌肉內虛尚餘熱不退沉香一兩銼黃芩甘草生銼各半兩熟乾地黃二兩柴胡一兩去苗瓜蔞根半兩白术三分麥門冬一兩去心黃茋一兩銼右為粗散每服四錢水一中盞入竹葉二七片小麥五十粒煎至六分去滓不拘時溫服人參散出聖惠方治癰穴後膿水過多致內虛熱人參一兩去蘆頭白术三分麥門冬一兩去心地骨皮半兩熟乾地黃黃茋銼白茯苓各一兩甘草半兩生銼右為散每服四錢水一盞煎至六分去滓不拘時溫服普濟方卷二百八十六
