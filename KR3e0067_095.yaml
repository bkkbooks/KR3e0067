半馬藺花萆薢各一兩半乳香研楓香脂研五靈脂各一兩地龍去土半兩草烏頭生去皮臍二兩半右將七味搗羅為末入研者二味和勻醋煮麵糊和丸如小豆大每服三丸至五丸荆芥湯下空心臨卧各一服續命獨活湯治偏風半身不隨熱悶語澀獨活去蘆頭防風去義人參芍藥各二兩防己一兩半桂去粗皮一兩羚羊角鎊三分右㕮咀如麻豆大每服五錢以水一盞半煎至八分去滓入竹瀝半合更煎一二沸溫服羌活酒出聖劑總録治偏風才得冒悶不知人事手足嚲曳便速服神效羌活去蘆頭獨活去蘆頭芎藭各半兩大麻子仁一合炒研黑豆去塵土一合不搗右粗搗篩以黍米酒四升浸夏月三日秋冬七日滿更煎十餘沸炒黑豆令煙起乘熱傾放酒中窨經少時淨絞去滓每服二合至三合日二夜一安息香丸出聖劑總録治偏風半體不仁縱緩不收或即痺痛安息香研乳香研各一兩麻黃去根節二兩胡桃仁湯浸去皮研一兩半乾浮萍草去土一兩半右先搗麻黃浮萍草為末與研藥拌勻鍊蜜和丸彈子大每服一丸溫酒化下以汗出為效羚羊角湯出聖劑總録治偏風手足不遂四肢􅂒痺羚羊角鎊一兩獨活去蘆頭二兩防風去義一分烏頭炮去皮臍三分右銼如麻豆每服五錢以水三盞煎取一盞去滓分溫二服空腹夜卧各一羌活湯出聖劑總録治偏風一邊手足嚲曳行履不得肌肉􅂒痺百日內能起羌活去蘆頭一兩半桂去粗皮一兩葛根一兩附子一枚及半兩者炮去皮臍右銼如麻豆每服五錢以水一盞半煮取一盞去滓分溫二服臨卧各一麻子仁酒出聖劑總録治偏風手足不隨口面喎斜麻子仁二合炒黑豆二合緊小者炒令黃色鴿糞二合炒垂栁枝二握銼半寸長右先以酒七升煮栁枝及五升炒鴿糞麻仁黑豆等令黃乘熱便投以栁枝酒須臾去滓令淨每服旋取溫服二合至三合空心臨卧各一服急療偏風膈上風熱心經恍惚神情昏悶天隂心中憒憒如醉不醉者宜服淡竹瀝三升若熱多用竹瀝冷多用荆瀝羚羊角屑二分石膏十分碎綿裹茯神切六分右以水一升合竹瀝煮取一升五合去滓食後欲消分為三服常能服之永不畏風發忌酢物生地黃湯出聖劑總録治偏風手足一邊不收口目喎戾言語蹇澀其湯不虛人老小並可服之生地黃汁竹瀝荆瀝各一升五合右别將羌活防風各一兩去蘆頭并又銼附子一枚重半兩者去皮臍生用作八九片入前三汁中慢火煎取一升半去滓每服用醇酒三合調化藥二合暖服之日二夜一無問冬夏並宜服之竹瀝湯出聖劑總録治偏風手足一邊不隨心神恍惚不知人舌強不能言才覺中風先服之竹瀝二盞生葛汁一盞生薑汁三合右相和煎至五七沸去滓每冝微熱服三合日可三服夜一服若覺四體稍快冝服前方麻黃湯鐵彈丸出聖劑總録治偏風卒中風五靈脂烏頭去皮臍尖並生取淨各等分右合研令勻滴新水硬和入臼中杵一千下丸如彈子大生絹袋子內盛之懸透風處每丸分四服爛嚼溫酒喫下十服後一丸分二服更十日後却一丸分四服一月內必瘥如不喫酒薄荷茶葉亦得然不如酒服一方治中風肢體麻痺頑疼少力用鍊蜜為丸溫酒化下食後治偏風手足一邊拘攣半身不隨經年不瘥出聖劑總録女真葉一擔楸葉一擔右東西掘地方五尺深二尺為坑坑內先燒黃蒿蒼耳令坑中赤熱方出灰灑薄醋入二件葉欲滿令勻即將病人就偏風不遂及疼痛處臥於葉上以衣厚蓋令汗出為度經三月偏即瘥獨活酒一名大紫豆湯治偏風一邊不隨口眼喎斜方見風痓類石灰膏治偏風口喎斜方見中風口眼喎斜類又方用鹿肉生貼正即除之如上貼左右治偏風手足不遂皮膚不仁出聖惠方用仙靈脾一斤細銼絹袋兜浸酒春夏三日秋冬五日厚粉重重封閉無使失氣逐旋開隨意暖飲常令醺醺不得大醉久之無不效驗合時切忌雞犬見之白魚膏治卒患偏風口喎語澀方見風口眼歪斜類治偏風半身不遂及癖疰用桃仁一千七百枚去雙仁皮尖以好酒一斗三升浸經二十日出曬乾令細作丸每服二十丸還將桃酒服之治偏風半身不遂兼失音不語用生杏仁七枚不去皮尖日服從一七漸加至七七枚七七日周而復始後即以竹瀝下之任意多少每料一升取效附子酒治偏風半身不遂冷癖方見大風癩病類竇侍御仙酒出家藏方治偏風手足拘攣半身不遂牛膝淨洗切半斤牛蒡根淨洗炮半斤大麻子一升淨洗炒枸杞子一合淨洗蒼术一斤洗淨切牛蒡子淨洗炒蠶沙淨洗炒秦艽淨洗切桔梗去蘆頭淨洗切已上六味各一兩羌活去蘆頭淨切防風去蘆頭淨切右件無灰酒二斗於銀器內浸密封七日每服一大盞食後溫服常令有酒力治偏風筋骨癰緩手足不隨及腰軟膚頑痺以原蠶屎炒令熱袋盛熱尉之治中偏風牽口面喎斜出本草取新硬石灰一合以醋炒調如泥于患人口脣上不患處一邊塗之立便牽正如向右即於左邊塗之向左即於右邊塗之後才正如舊即須以水洗下大妙治偏風中惡出本草以薑酒服之治卒患偏風口喎語澀出本草取白魚摩耳下喎向左摩右喎向右摩左正即止衣魚今人呼在衣書中蟲也主偏風口喎手足癱患補虛益陽去冷氣風痺出本草用龍手藤斟酌多少以醇酒浸近火令溫空心服之取汗出療偏風半身不遂冷癖疰出本草以附子一兩生用無灰酒一升右附子㕮咀內於酒中經一七日隔日飲之一小合差治半身不遂失音不語取萆麻子油一升酒一斗銅鉢盛油著酒中一日煮之令酒油熱服導引法養生方云一手長舒合掌一手捉頦挽之向外一時極勢二七左右亦然手不動兩向側勢急挽之二七去頭骨急強風腦旋喉痺專內冷疰偏風又云一足踏地一手向後長舒弩之一手捉湧泉急挽足弩手挽一時急勢左右換易二七去上下偏風隂氣不和普濟方卷九十六
