腸為表裏而肺主氣其候身之皮毛春陽氣雖在表而血氣尚弱其飲食居處運動勞役血氣虛者則為風邪所傷客於肌肉之間後因脾胃氣虛風邪又乘虛而進入於腸胃其脾氣弱者不能尅制水榖故糟粕不結聚而變為痢也又新食竟取風名為胃氣其狀惡風頭多汗膈下塞不通飲食不下腹脹形瘦腹大食物則脹滿食寒則洞泄洞泄者痢無度也若胃氣竭者痢絶即死診其脈小手足寒難療脈大手足溫易療也下白沫脈沉則生浮則死身不熱脈不懸絶滑大者生懸澀者死以藏期之也脈絶而手足寒晬時脈還手足溫者生脈不還者死脈緩時小結者生洪大數者死懸絶而澀者死細微而澀者生緊大而滑者死得大絶脈者不死方廣濟療赤白水榖冷熱等痢地榆六分白术五分厚朴六分炙乾薑六分熟艾四分赤石脂七分研龍骨七分甘草四分炙黃連十分烏梅六分熬人參六分當歸五分右為末蜜丸桐子大米飲汁服三十丸日三服加至三十丸忌海藻菘菜肉生冷等厚朴散出聖惠方治水榖痢腹內疼痛兩脅虛脹不思飲食厚朴一兩去粗皮塗生薑汁炙令熟木香半兩人參去蘆頭半兩訶梨勒三分煨用皮乾薑半兩炮裂銼陳橘皮一兩浸去白焙當歸半兩銼炒地榆三分銼附子一兩炮去皮臍右為散每服三錢水一中盞煎五分去滓不拘時稍熱服藍青丸治中焦熱水榖下痢藍青汁三升黃連八兩黃蘗四兩阿膠五兩白术地榆地膚子烏梅肉熬各三兩右為散用藍汁和微火上煎取可為丸如杏子清白飲進二丸亦不得停留忌豬肉冷水桃李雀肉等訶梨勒丸治水榖痢腹脅虛脹時復疼痛不欲飲食訶梨勒一兩煨用皮乾薑三分炮銼當歸一兩銼炒黃連去鬚微炒白术一兩木香三分厚朴一兩去粗皮塗生薑汁炙香熟右為末煉蜜和搗二三百杵丸如梧桐子大每服不拘時粥飲下三十丸龍骨丸治水榖痢日夜數腹內疼痛龍骨三分艾葉一兩微炒赤石脂三分白礬一兩焙令汁盡黃連三分去鬚微炒當歸三分銼碎微炒附子一兩炮去皮臍右為末煉蜜和搗三二百杵丸桐子大每於食前以粥飲下三十丸㵼心湯治老小下痢水榖不分腸中雷鳴心下痞滿乾嘔不安人參黃芩甘草各一兩乾薑一兩半黃連二兩半夏三兩大棗十二枚右㕮咀以水八升煮二升半分三服并治霍亂若寒加附子一枚渴加栝蔞一枚二兩嘔加橘皮一兩痛加當歸一兩渴熱以生薑代乾薑胃風湯治胸結下痢風冷水榖不化方見本門諸泄痢類肉豆䓻散治水榖痢心腹脹滿不能飲食肉豆䓻一兩去殼木香一兩甘草半兩炙微赤銼乾薑一兩炮裂銼厚朴一兩去皮塗生薑汁炙香熟右為散每服三錢水一中盞入棗三枚煎六分不拘時稍熱服附子五味散榖痢久候痢無期度食不消化腹痛每遇冷便發有此疾候者附子炮細辛白术各五兩乾薑四兩神麴一升熬右為散以飲下之初服一方寸匕日再服稍加至二三匕良忌豬肉冷生桃李雀肉等草豆䓻散治水榖痢不止腹內疼痛草豆䓻一兩去皮白石脂一兩當歸一兩銼微炒乾薑一兩炮銼右羅為散每服不計時以粥飲調下二錢四白丸治水榖痢臍腹疼痛日夜數行白石脂二兩白礬一兩燒灰白龍骨二兩胡粉二兩炒黃右研為末用粳米飯和搗一二百杵丸如梧桐子大每服食前粥飲下三十丸療水榖痢方乾薑三分雞子二枚小豆二百粒炒令香中食黃連二分右搗篩三物內雞子黃白中攪勻微火上炒令可丸一服五十丸如小豆大旦以飲服即瘥忌食脂膩生冷豬魚蒜蔥療熱水榖下痢方黃連阿膠各二兩梔子二十枚右切以水七升煮二升分為三服忌豬肉冷水馬蘭散出聖惠方治水榖痢日夜百度及水痢百起馬蘭子一兩微炒乾薑一兩炮銼黃連一兩去鬚銼微炒右為散不拘時以粥飲調下二錢一方熟煮湯取一合許和二方寸匕入腹即斷冷熱皆治常服神效不得輕之忌豬肉冷水又方橡斗五枚盛茛菪子炒令黑龍骨半兩柿蒂七枚右羅為散不拘時以粥飲下一錢神妙橡實散治水榖痢無問老小日夜百餘行橡實二兩乾楮葉一兩炙右羅為散每服不計時煎烏梅湯調下一錢菖蒲丸治水榖痢及冷氣腹痛虛鳴菖蒲三兩乾薑一兩半炮銼右羅為散用粳米飯和丸梧桐子大每服食前粥飲下三十丸又方龍骨末三兩巴豆二七枚去心皮研壓出油右以粟米稠粥和丸麻子大每服以陳米粥下三丸如微轉以井花水下豆䓻散治水榖痢久不止腹脅脹悶不思飲食方見本門諸痢類治水榖痢久不止以胡粉二兩棗肉和搗作餅子急火中燒令赤即出地上以碗合之勿令風入待冷細研食前粥飲調下半錢治水榖痢出肘後方用韭作羮微炒任食之又方用小豆一合和蠟三兩頓服愈療水榖痢方用棕櫚皮燒灰研以水和服三方寸七廣濟療水痢及霍亂冷痢及食不化有白膿日夜無節度但疑是冷悉主之兼治㵼痢白石脂乾薑各八兩右為末以沸湯和少許麵薄糊和藥并手捻作丸如常法下不止加乾薑八兩忌如常法一方米飲空心下霍亂吐㵼漿水下療水痢腹中氣方茯苓八分白龍骨八分研訶梨勒八分黃連八分酸石榴皮八分右為末蜜丸梧桐子大空心以飲服每服二十丸日二服止忌肉油膩生冷等療水榖痢方狗骨灰牛骨灰亦得麴六月六日造熬令黃右等分為散空腹飲服一方寸七無六月六日麯即常麯亦得主水痢方雞子二枚黃蠟一兩右熬熟食之宜空肚食之日三服佳又方主水痢及療熱水榖下痢黃連蒼术各三兩右作散和雞子七枚同煮并捻作丸煮赤豆作漿粥服下三十丸日三服若渴但飲豆漿粥一方以水七升煮二升分服忌豬肉冷水黃芩五味散水榖之候必腹甚痛食無妨但食後即痢食皆化盡唯變作水痢無期度多食多下少食少下有此狀者宜服黃芩黃連黃蘖各五兩黃耆四兩龍骨六兩右為散以飲下之初服一方寸匕日二稍加至二三七服瘥乃止忌豬肉冷水等治水榖痢黃連二兩黃蘖二兩阿膠二兩炙右為散以苦酒蜜各半升煎阿膠令洋入內諸藥令可丸飲服三丸日四白蒿方治夏日暴水痢用白蒿葉乾為末以米和一匙空腹服之療水榖下痢方用黃連一升金色者打碎陳米五合二物以水七升煮二升分為二服安石榴湯療水痢及赤白痢篤困欲死腸已滑醫不能療者乾薑黃蘖各二兩石榴一枚殼小者二枚阿膠二兩半炙切右以水三升煮一升二合去滓內膠令鎔頓服即瘥更治老小亦良羸瘦者稍服一方無黃蘖用黃連治水榖痢所下之痢並無赤色只下黃沫忽時下白沫飲食減少肌體黃瘦宜服此方訶子麵褁炮去核用皮舶上黃研細各一兩黃橘皮白术川芎各半兩甘草炮四株肉豆䓻一箇右件細杵羅為末用舶上黃末相滚令均用薏苡仁杵作粉煮粥丸如梧桐子大急焙乾每服五十丸空心米湯下須是焙乾莫令損藥氣治水榖痢久不瘥厚朴三兩黃連三兩右銼以水三升煎取一升空心服蠱痢附論凡下痢膿血間雜瘀黑有片如雞鴨肝與血皆下者蠱痢也此由歲時寒暑不調濕毒之氣襲人經脈漸至臟腑毒氣挾熱與血相摶客於腸間如病蠱注之狀故名蠱痢也方療三十嵗以下痢及霍亂諸藥不能療并腸滑若是蠱注所中蓼子艾屑各二升龍膽續斷白术各兩蜀椒去目汗附子炮桂心苦參乾薑甘草炙鼠尾草各二兩右搗篩蜜和丸如梧桐子大一嵗兒服一丸三嵗兒服二丸五歲兒服三丸大人服五丸飲下療寒熱氣堛堛在胸中卒氣痛繞臍忌桃李雀肉生蔥豬肉冷水海藻菘菜蝟皮丸治臟腑傷動腸胃虛弱血滲腸間風冷相乘大便下血瘀黑有片或五痔腫痛久下膿血者蝟皮一具切炙令黑當歸銼焙續斷黃耆連翹槐實炒乾薑炮附子炮去皮臍白礬飛各五兩生乾地黃五兩右為末煉蜜和丸如梧桐子大每服五十丸空心食前米飲下地榆散治蠱注痢下血如鵝鴨肝腹痛不止地榆一兩銼甘草半兩炙微赤銼赤芍藥一兩柏葉一兩微炙茜根一兩銼當歸一兩銼微炒訶梨勒一兩煨用皮黃連一兩去鬚微炒右為散每服四錢以水一中盞煎六分去滓不計時溫服地榆湯治蠱痢下血如雞鴨肝片腹痛煩悶一名􅙈角散地榆銼􅙈角鎊黃連去鬚微炒柏葉微炒當歸銼微炒黃蘖去粗皮炙銼黃芩去黑心生乾地黃焙赤地利各半兩右搗篩每服三錢以水一盞煎七分去滓溫服不計時粥飲調亦得黃芩散治蠱注痢下血心中煩悶腹中㽱痛黃芩一兩地榆一兩銼犀角屑一兩茜根一兩柏葉二兩微炒甘草一兩炙赤銼訶梨勒一兩煨用皮牛角䚡灰一兩當歸一兩銼微炙炒右為散每服四錢以水一中盞煎六分去滓不計時溫服茜根飲治蠱痢下血如雞鴨肝腹中疞痛難忍心中煩悶不欲飲食一名升麻散茜根升麻犀角鎊桔梗去蘆頭銼炒黃芩去黑心黃蘖去粗皮各三分地榆白蘘荷各一兩用根右為粗散每服五錢水一盞半煎七分去滓日午空心服一方酒調服茜根丸治毒痢及蠱注下血如豚肝心煩腹痛又脈或大或小浮陷而起下血如豚肝五內切痛此因服五石湯丸逼損隂氣甚則其血自百脈經絡而來注下成蠱毒此為難治茜根洗川升麻去蘆犀角鎊地榆洗黃連去鬚當歸去蘆洗枳殼去穰麩炒白芍藥右等分為末醋糊丸梧桐子大每服五十丸空心米飲下茜根散治蠱注下血如雞肝體熱心腹中煩悶茜根一兩銼川升麻一兩犀角屑一兩地榆一兩銼黃連一兩去鬚微炒黃芩一兩右為散每服四錢以水一中盞煎六分去滓不拘時溫服升麻湯治蠱痢下血片臍下㽱刺痛升麻地榆茜根黃芩去黑心各一兩半犀角鎊一兩山梔子半兩右搗篩每服五錢水一盞半入生地黃一升切薤白三莖切豉三十粒同煎八分去滓空心溫服日晚再煎服治中蠱下痢日數十行巴豆十四枚去皮心出油藜蘆去蘆頭芫青去翅足炒附子炮去皮臍白礬熬枯各半兩右為末和勻以綿褁藥一大豆許內下部日三治蠱注痢血如雞肝者心神煩躁宜服犀角屑一兩地榆三分銼蘘荷根一兩馬兜鈴根一兩右為散每服四錢水一中盞煎六分去滓不拘時溫服玉連丸治脾積下痢蠱痢同木香訶子連核各半兩黃連一斤炒紫色右為細末研粳米飲糊丸桐子大每服一百丸空心食前米飲下日進一服黃蘗丸治歲時蠱痢黃蘗去粗皮黃連去鬚各一兩右為末飯飲為丸桐子大每服二十丸空心米飲下日午再服黃芩湯治蠱毒痢如鵝鴨肝腹痛不可忍黃芩去黑心黃連去鬚各半兩炒右細銼以水二盞煎一盞去滓空心日晚乘熱服冷即凝黃連散治痔漏蠱毒下痢黃連去鬚一兩白礬燒令汁盡乾薑炮附子炮裂去皮臍各三分右為細散每服一錢半溫酒調下空心日午服方寸匕不止更服之日三桔梗散出聖濟總録治蠱痢下血如雞肝疼痛桔梗去蘆頭銼炒犀角鎊各等分右為散酒服一錢日三不能自服者即灌之藥下心中煩須臾自靜七日乃止可食豬脾以補養之治蠱注下血如雞肝體熱心腹中煩悶出聖惠方黑豆一合毛桃膠半兩右以水一大盞煎六分去滓食前分溫二服治蠱注熱毒痢痢血或如小豆汁腹痛煩悶出聖惠方用扁竹葉一兩銼以水一大盞煎六分去滓入吳鹽汁二合更煎三五沸食前分溫二次服治腸蠱先下赤後下白黃沫連年不瘥兼治痢下先白後赤若先赤後白為腸蠱出聖惠方用牛膝一兩切槌碎以醇酒一升漬一宿平旦空心服之再服愈羚羊角散一名黃連丸出危氏方治下血黑如雞肝色相似時發渴者方見本門熱痢類治男子婦人小兒大腸下血黑茶腳色或膿血如靛色所謂蠱痢者也治之有殊效又能殺五臟蠱出圓經取側柏葉焙乾為末與川廣黃連二味為汁服普濟方卷二百十
