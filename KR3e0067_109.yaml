body:
  text: 普濟方卷一百十明周王朱橚撰諸風門大風癩病石榴浸酒方出聖惠方治大風頭面熱毒皮膚生瘡面上生結如梅子者酸石榴甜石榴各七枚和皮搗爛人参去蘆頭苦参沙参去蘆頭丹参蒼耳子羌活各二兩右細剉綿褁以無灰酒一斗於磁瓶中浸之宻封頭春夏七日秋冬二七日每於食前煖服一中旋添酒味薄再合苦参散出儒門事親治厲風苦参取頭末稱二兩猪肚一個去脂右以参末掺猪肚内用線縫合隔宿煑軟取出洗去原藥先不食飯五頓至第二日先飲新水一盞後將猪肚食之如吐了再食之食後待一二時用肉湯調無憂散五七錢取出小虫一二升為效後用皂角一斤不蛀者去皮絃及子搥碎用水四碗煑至一碗用生絹濾去滓再入苦参末攪入稀麵糊膏子相似取出放冷後出餘藥相和藥附于後何首烏二兩防風一兩生芍藥五錢人参三錢當歸一兩焙右為細末入皂角膏子為丸如梧桐子大每服五十丸温酒或清茶送下不忌時候日進三服後用荆芥苦参麻黄煎三濟丸出三因方治大風惡疾當歸熟地黄川芎荆芥各三兩防風細辛一兩桂心一分右剉為散先以醋一升浸一宿濾出焙乾再以生地黄一斤搗汁浸一宿焙乾酒一升浸一宿焙乾旋入乳香半兩以餘酒醋地黄汁合蒸餅為丸如桐子大用好川烏頭一個炮製剉荆芥穗半兩酒三升旋温下藥五十丸麋角散出聖濟方治大風惡病滑泄精氣麋角半斤先用桑柴灰二斗煎湯淋取汁三斗次截麋角入灰汁中漫火煮盡汁為度乾用四兩蘆薈赤箭蝎稍麝香研附子炮製去皮臍各半兩乾薑炮一分右為散每用三錢入好臈茶末七錢和勻丸患此疾鼻梁未倒語聲未轉精氣滑泄者取藥一錢用荆芥薄荷湯如茶㸃熱服覺藥力𦂳每㸃入塩少許要出汗即熱服厚衣覆出汗慎外風為妙烏麻子丸出聖濟方治大風癩疾烏麻子一斗九蒸九晒研天麻去苖二兩丁香乳香另研各一兩蘇枋木黄櫨木各五兩内黄櫨木細剉新汲水一斗六升磁内浸二七日濾出焙其浸木水㽞之右為末拌和勻用赤黍米一升淘净以浸木水煑為稠粥研膏熟杵為丸如桐子大每服二十丸至三十丸食後用漿水下日二夜一鱟魚膽散出聖濟總録治大風癩鱟魚膽白礬綠礬各生用膩粉水銀麝香各半分右作一處細研時㸃少許水銀研水銀星盡為度每服一錢至二錢井華水空心調下至午時未動腹空更一服後欬出稠黏涕唾或㵼下五色涎為效一月内可三度服若牙疼齒縫中涎出乃愈更量虚實用之六神散出聖濟總録治癩病螻蛄一枚去肚腸髙陸根汁半盞蜜蜂七枚用泥半指厚褁徧以火一斤濕煆候泥乾通赤火放冷取出細研不羅生蜜三分薑汁三分菉豆末一錢右一處和勻更用温酒調下只作一服半日許發動惡心涕唾汗出仍吐出涎渇時頓與温米湯喫若吐多㵼多或更有血勿疑是病出也切忌出風中如吐㵼後取下一塊大小如雞子有諸般顔色者此是病根也如不思飲食以甘草二寸黄連二條水一盞煎至半盞温喫其藥即不以老少强弱都作一服若是半日以來未發動即便服樟栁等根汁投之尚不覺更與喫無妨面上如有紫㾦㿔未銷者用乾斑猫末以生油調成膏藥傅患上約日許㾦㿔脹起以輭帛子揩拭去藥以棘針挑破近下令水自出訖即不得剥其瘡皮斑猫不得令入口眼若面上有小尖㾦㿔子者不用斑猫即以熱艾入膽礬少許帋杵作釵股大小艾炷灸之每個灸一炷如手脚上下有瘡未效煎甘草熱湯淋洗更以白藥子三兩甘草一分荆芥十穗一處搗羅為末乾貼如浴煎水洗亦好切忌房室事動風發氣塩醋料物等只得喫淡粥過一百日小牛黄丸治心肺積熱腎蔵風毒攻于皮膚時生疥癬瘙痒難忍時出黄水及大風手足壞爛眉毛脱落一切風疾𤣥参荆芥各四兩苦参半斤大川烏宣連各一兩牛黄三錢右為末水糊為丸如桐子大每服三十丸熱水或清茶下一二兩加升麻防風皂角為膏入煉蜜為丸妙治大風證輕者服此當歸羌活獨活琥珀五錢金毛狗脊酒拌蒸各二兩大楓子肉十兩炒令香另搗為末右為末入大楓子肉在藥末中飯糊丸如桐子大四五十丸清茶日進三服半月見效治一切大風癩疾不問久新者百日見效重者半年必愈白花蛇一條用無灰酒浸去皮骨取肉焙乾為末大風子研五兩烏藥去心土剉晒乾為末用二兩甘草炙為末三錢半香附子去毛為末三兩防風去蘆頭剉細晒乾為末五兩右為末和勻逐杵粳米飯丸如桐子大每服四五十丸空心食前白湯日進三服忌房事戒食甘味療癩身體面目有瘡水銀研蕳茹䔧蘆真珠研丹砂雄黄研右各一斤皆研如粉以三歳苦酒三石五斗于甕中漬諸藥令耗七日于净温宻室中漬浴始從足漸至腰浸之且以綿拭面目訖以水洗兩目勿令入目也七日為之勿令冷忌猩肉生血等物乳香散治大風疾肌肉欲壞顔色變改眉髪落語聲散乳香天麻各三兩末牛黄麝香細研雄黄各一兩研胡麻二斤净淘四十九遍去乳香再蒸從夘時蒸至酉時上用黒豆壓之次又用一重濕土葢之恐釡湯少仍須時添熱湯至酉時後取出炒令香燥即住候冷搗羅為末散與諸藥味同拌令勻右都研令勻細每日空心及晚食前用臈麺清茶調下二錢初服三日心逆四日多睡五日腰脚疼形如醉人是其候也相次漸愈只須常服此藥風癩必瘥治大風癩疾方金漆五合烏蛇酒浸去皮骨炙防風去蘆頭桑鵝各三兩冬采者佳􅌝􅌣根半斤續隨子一兩半去皮右為末先將烏蛇防風桑鵝等三味搗為末取自醖秫米酒三升先用一升半研續隨子絞取汁令盡即并餘酒同内于石鍋中煎三五沸後將鍋離火乃下漆匀攪候稍稠下桑鵝蛇肉等末不住手攪冄加入􅌝􅌣粉溶令匀和揑作餅子如錢許大烈日晒乾每服一片爛嚼茶下空心及晩食前服一百日内鬢眉並生如常苦参散治大風徧身結聚如桃李核作瘡苦参五兩剉生乾地黄四兩朱砂二兩細研水飛過䧺黄半兩甘草一兩炙剉右為末研入朱砂令勻煉蜜為丸如桐子大每服不忌時候以温水下三十丸神仙退風丹治大風疾知母貝母烏梅肉海桐皮金毛狗脊去毛各等分右為細末煉蜜丸如桐子大每日空腹日中臨卧服三十丸每夜第一次睡覺時即于頭邉取三十丸便服並用羊蹄根自然汁下大忌酒及房室一切發風之物只喫淡粥一百日皮肉漸皆復舊半年後無所忌服時頭每夜專令一二謹信人就病人睡處坐守纔候第一次睡覺時便扶起喫藥一服禁忌房室發物親見林承務苦此疾服之取效治大風方無如此效者若不忌房事無益也凌霄散一名五九散出儒門事親治癘風此疾非止肺臓有之以其病發於鼻從俗呼為肺風也鼻凖腫赤脹大而為瘡乃血隨氣化也氣既不施則血為之聚血既以聚則死肉爛而生虫也生虫者厥隂主之以藥緩踈之煎耳局方升麻湯下㵼青丸餘病各隨經治蟬殻地龍炒白殭蠶全蝎各七個凌霄花半兩右為細末每服二錢酒調下于浴室内常在湯中汗出粘臭氣住一時許服藥效天麻丸出聖濟總録治大風癩天麻白茯苓去黒皮二兩白附子炮一兩半白芷芎藭各三兩附子炮去皮臍一兩防風去蘆一兩細辛去苗葉半兩獨活去蘆白殭蠶炒桔梗炒馬牙硝碾各一兩丹砂研三分白龍骨一兩牛黄研一分麝香研半兩右除研外搗羅為末次將别研藥和勻煉蜜為丸桐子大每服七丸至十丸温酒下空心日午卧睡服治一切風要出汗即炒豆淋酒下厚衣葢覆石斛散出聖惠目錄治大風疾四肢不収不能反覆兩眉中疼痛身重腦急筋攣不可行履時發寒熱足踹似錐刀所刺此飲酒露卧傷于風濕從下上衝腹背强直痿痺榮衞不足精氣虚弱血脈壅塞怵惕不樂囊下冷濕方見諸風襍治類蒼甘酒療大風惡疾及一切諸風乃至骨髓中毒令人悦方蒼甘和莖葉花實刈取剉一石八月収牛膝根切一升商陸根切一斗白色佳鼠粘根切一斗松葉切二斗右以水兩石五斗煑取六斗汁如釡小可分煑之即分三斗汁將浸麴一斗二升髙量其麴加於常法五分為藥力費麴故也餘三斗汁㽞將拌饙料糯米一石二斗分作五酘净淘乾漉以上並大斗第一酘一日炊四斗米取藥汁九升拌饙熟細切生地黄三升和米下之第二饙三日炊二斗米取藥汁七升拌饙熟與杏仁一斗去皮尖碎和搗如泥下之第三酘五日炊二斗米取藥汁六升半拌饙熟取大麻子一斗搗碎和下之第四酘九日炊二斗米取藥汁三升半拌饙熟取胡麻一斗搗碎和之第五酘九日炊一斗米取藥汁三升拌酘下之以上五酘法須候米消盡即煑如米少酒味薄更炊一二斗下之使味足然後去糟取清依常法飲半升下能者可量性多少常使有氣逼夜飲最宜補養益精神令人先健大去風疾敗龜散治大風緩急四肢拘攣或久癱緩不収攝方取龜釀酒飲之皆瘥苦参散治諸癩方見烏癩類葎草方療癩用葎草一担以水二斗煑取一担以漬洗瘡不過三五度差附子酒出千金方治大風冷痰癖脹滿諸痺等病祛風除濕舒經絡散寒邪用大附子一枚重半兩者兩枚亦可炮之酒漬春冬五日夏秋三日服一合以瘥為度日再服無所不治治大風出本草以蚺蛇肉一截食之昔泉州府盧元欽患大風唯鼻未倒五月五日取蚺蛇膽欽進或云肉可治風遂一截蛇肉食之三五日頓覺漸可百日平復摩勒香方出聖惠方治大風疾摩勒香一斤乳香内㨂光明者是右細研入牛乳五升甘草末四兩于磁盒中盛都攪令勻以小桌子擡于庭中安置利劒一口夜於北極下禱祝去盒子葢露之一夜來日將合子入甑中蒸之炊三斗米熟即止夜間依前禱祝露之又蒸如此三遍方可服之每服抄一茶匙以温酒調空心及晩食前服之如體上有瘡者以麩兩石作一卧褿令於内卧服藥後當有惡物出至三日三夜當愈通天再造散出三因方治大風惡疾欝金半兩生大黄一兩炮白牽牛六錢重半生半炒皂角刺一兩炮經年半黒者佳右為末每服五錢日未出面東以無灰酒下盡量為度晩利黒頭小虫病稍輕者止利於魚腸臭穢物忌毒半月但食稠粥軟飯漸生眉毛皮膚如常甚者不過三兩次須將理不可妄有勞動及終身不得食牛馬驢騾等肉日犯者死不可救凡下藥條至物令病人知蟲􅉶神虎丸治大風癩病烏頭生去皮臍茛菪子吴茱萸湯浸七遍黒豆生去皮各等分右為末滴水為丸如桐子大每服十五丸冷水下日三如瘡膿血潰爛甚者更用後藥蛇床子散蛇床散治大風癩病蛇床子茛菪子等分右為散每量多少濃煎汁洗瘡逐日服神虎丸十日瘡漸乾半月後鬚眉漸生如風癩眼不見物病退更服二聖散二聖散治大風癘疾眼昏咫尺不見人物眉髪自落鼻梁崩倒肌膚有瘡一名追命再造散一名千金散將皂角刺一二斤燒灰研細煎大黄半兩調下二錢服之方用冷酒調㵼出黒虫為驗如虫口黒色乃是多年虫口赤色是為方近三數日又進一服直候無虫則絶根也蔓荆丸治大風蔓荆子枸杞子牛蒡子炒黒牽牛炒胡麻白芷何首烏葳靈仙荆芥穗獨活蒺藜炒杵去刺華隂細辛去苗葉土直殭蠶炒去絲道人頭去刺取仁晒各半兩皂莢刺炒焦苦参大草烏去皮炙各一兩右細末大風油和丸桐子大每服二十四丸食前茶清下換肌丸治諸癩大風疾苦参三兩大風油一兩右將苦参為細末入楓油及少酒糊丸桐子大每服五十丸時用温酒送下仍將苦参煎湯帶熱洗之為佳苦参丸治大風癩遍身瘾疹如爛桃李大瘡經年不愈毛髪脱落苦参十六兩剉搗取粉八兩丹砂研一兩一分乳香半兩炒軟放冷研再與丹砂末同研生乾地黄焙乾搗五兩半右研匀煉蜜為丸如桐子大每日空腹夜卧以温水下二十丸漸加三十丸一方無乳香用薫陸香松脂醖酒方治大風癩皮膚瘙痒搔之落如麩片冝安腑臓去胃伏熱觧咽乾舌澁除風痺虚羸眉鬚墮落久服輕身延年不老松脂二斗五升大山川谷六月採黍米二斗五升細麯十五升半糯米五斗右水一担煎松脂浮上掠取入冷水中再揀入湯如此四十五度煑須換湯暴乾研作粉得一斗一升二合半用煉松脂初法用水四斗浸麴麴發黍米一斗五升以松脂粉拌飯一如常法相次成料每麯隨常醖法入更炊一斗黍米拌脂粉下第一料又相次更炊糯米三斗入松粉和荅酘又相次更炊糯米二斗同松粉拌匀取其松脂粉並須合飯用盡每一斗米入松脂粉一升五合拌入酘後壓去滓取清酒每服五合細飲日夜可四五服漸漸加至一升煎温任性飲之常令醺醺酒勢相接又一方加杏仁五升去皮及雙仁者隨料均湯退去皮搗破研如膏入之佳治大風癩頑麻風紫㸃白癜乳香黄明者炒令軟冷搗白膠香光明好者松脂各五兩佳者龍腦三錢右將上同三味倒入銀鍋或石鍋中以水一斗五升煑藥二十沸專看火候如使溢出即㵼入冷水中漉取藥又依前以水一斗五升又錬一依前法如此三十遍㵼入冷水中漉出暴乾細研如粉入龍腦同研令均每日空心及晩食前以冷酒調下一錢第一浴法麻黄根地骨皮草烏頭各二兩右為剉散研朴硝二兩勻和每用藥二兩水一桶椒一合葱三十莖艾葉一兩同煎十沸入米醋一中打勻去滓坐温室中且用手巾撘四肢候湯可浴即浴令汗透面上如珠流更坐室中或睡片時尤佳候汗觧方着衣避風而出五日再浴如此兩三浴便服換骨丹換骨丹九肋鱉甲去裙海蜈蚣細剉各半兩右以塩泥固濟候乾火煆存二分性為末巴豆半兩去皮膜順手研青州棗子七個去核入巴豆膏在棗中火燒令焦存巴豆五分性將棗巴豆爛研如泥入前二味同研勻以醋煑糊為丸如菉豆大每服七丸虚者四五丸用温地黄汁下候利惡物如膿血爛魚腸即住只此三兩服未利更加一二丸次服遇仙丹人参紫参各一兩苦参白殭蠶去嘴各二兩右為末白麵糊丸如桐子大每服三十丸温鹽湯下食前日二次服之踈風散山梔仁一兩半大黄白滑石熟地黄懸豆酥炙焦黄各三兩右為末入朴硝半兩每服食後淡茶清調下次以佛手膏佛手膏去黒紫瘡核斑猫七個去翅皮巴豆七粒去皮杏仁二十個去皮紅娘子七個黄臈韶粉各半兩瀝清研一兩盆硝一兩硫黄黄丹各三錢膩粉炒一兩菉豆一合槐角三條清油四兩亂髪一兩砒霜一錢另研右用油煎令髪化次下紅娘子次用巴豆槐角等逐味下焦者漉出方下硫黄盆硝及丹粉等以箆子不住手攪令勻滴水成珠為度用時先將針刺瘡核用藥一粟米大放針處次日臍瘡有黒臭膿血出三兩日血漸少次服去毒丹去毒丹赤芍藥甘草白滑石各半兩朴硝大黄各一分巴豆去皮炒另研後入黒牽牛一兩半生炒右為麵糊丸菉豆大臨卧服十五丸金銀薄荷湯下加至三十丸次服甘草散甘草散甘草白滑石各半兩山豆根一兩大黄一分右為末每服一錢蜜湯調下日二服次服觧毒丸觧毒丸苽蔞根三兩甘草半兩炒大黄一分生朴硝一分另研右為末麵糊丸菉豆大每服二十丸至三十丸白湯下次服福神丹福神丹訶子四個炒巴㦸炒黒牽牛生各半兩甘遂二錢赤小豆四十九粒生右為末麵糊丸菉豆大每服十丸至十五丸薄荷湯下次用水膏藥水膏藥傅貼破處及面脚上瘡陳皮去灰土拌斤炒紫用陳米半斤炒藿香馬蹄香香一錢另研右為末入麝香用冷水調掃傅瘡上有膿䖏如損破煎槐枝湯洗再上藥此十方乃秘傳大要病人須能如法將息敬而信之皂角湯治大風一名通天再造散皂角刺燒半生半灰二錢北大黄一錢輕粉半錢右為末酒調空心服取下惡物服藥數日齒出毒血甚臭一方無輕粉桑栁煎丸治大風癩神效東引桑枝十二月採東引栁枝正月採各二斤乾槐子十月採一斤右用童子小便二斗春夏秋浸經兩日冬浸七日别用長流水五斗泉水二斗同煎至一斗絞取汁更煎至五升入白蜜五合又入煎如稠餳以甕合盛經一宿後服餘藥滓隂乾入熟絹袋収取桃仁吴茱萸各二兩生用與藥滓三兩半同入鍋内炒黄乗熱入甕重紙葢口𦂳復一時去桃仁茱萸不用煎滓三兩却加原蠶沙訖白椹仙靈脾牛膝防風各三兩同搗羅為末煉蜜丸桐子大每服取前煎三錢至五錢用熱酒五合調化下二十丸空心食前夜卧各一服别更入紅雪或經火朴硝尤佳胡麻宿肌散治大風癩疾一名乳香散方見惡風類黒豆方治大風癩疾黒豆三升細粒者佳天雄去皮臍生用五個烏頭去皮臍生用七個右剉烏頭天雄如豆粒大用水二斗慢火煎至七升去滓浸黒豆二升一伏時漉出暴乾更爆以渗乾汁為度暴取乾每三枚七枚空心食前用酒下日二服夜深更進一服一方取三月四月天䧺烏頭苖及根去土净勿洗搗汁漬豆忌房事猪魚鷄䓤蒜一切發物百花煎治大風癩疾白蜜二十兩石榴七顆酸者并皮用生薑去皮細切八分右先研生薑石榴絞取自然汁更濾令净入蜜盛於甕瓶以臈紙封口勿泄氣垂繫於釡中勿到底以重湯煎一復時成煎空心酒調二錢漸至三錢日二夜一旬日内有惡物隨便而出是病根出矣黄精煎出聖惠方治大風癩病面赤疹起手足攣急身發瘡痍及指落者黄精生者十二兩白蜜五斤生地黄肥者五斤右先將黄精生地黄洗净細剉為末石杵臼搗熟復研爛入水三斗絞取汁置銀銅器中和蜜攪勻煎之成稠為度每用温酒化二錢至三錢日三夜一久服風癩痊平面如童子延年不老凝水石塗方出聖濟方治大風癩病凝水石研為細末四兩水銀四兩膩粉一兩右滴水研如薄泥卧病人于宻室先將一半藥遍身塗之除咽㗋心上不塗以兩手摩令極熱俟夜更將餘藥准前塗摩或當夜或次日臓腑取下惡物但喫温補藥忌一切動風物一月皮膚復舊兩月眉睫生甚者半嵗必再發准前用藥則永安也治風癩胡麻白大豆棗右同九蒸九曝作團食令人不飢延年斷榖又合蒼甘子散服之治大風大楓子肉白花蛇一條烏頭一條右入烏藥順氣散末粳米飯丸服追風散一名神效追命散出永類鈴方治大風神效川大黄實者皂角刺各半斤川欝金五両右為細末三大錢用真大楓油入無灰温酒調藥末臨卧時服臟腑轉時直就地上取下虫如疾多年其虫色黒日近者其虫色赤隔三兩日再服直候無虫方是病瘥即止其藥只服平常風藥及諸補藥此藥大有奇效下藥切不可與病人知恐虫藏匿則疾難愈六十日齋戒忌房色一切俗念不可嗔怒作善事為佳大凡服藥之時須忌酒色清油麵食猪羊雞鵝魚等肉加芎藭同煎亦可乳香煎出聖惠方治大風腹臟有䖝令人皮膚生瘡語聲變眉髪落乳香三兩細研雄黄三兩細研預知子二兩搗末右先以香末用水一斗于銀鍋内漫火煎至五升入預知子並雄黄慢火熬成膏入磁器中盛每空心以温酒調下一茶匙後有䖝如馬尾随大便出即愈治大風疾神效方出聖惠方水銀三兩硫黄一兩細研松脂煉成者二兩末右同入銚子内火上結為砂子烏鵶不損者一隻以濕紙裹七重又以泥裹作毬候乾大火煆令通赤㣲冷去泥取出研入砂及松脂末都研令細煉蜜和丸如桐子大每服空心以温酒下五丸晩食前再服狼毒散出千金方治惡疾及大風疾狼毒秦艽各等分右治下篩酒服方寸日三服五十日愈萆麻法出仁存方治癘風手指攣曲節間疼痛不可忍漸至斷落及鼻壞者萆麻去殻黄連剉各二兩右以小瓶子入水一升浸春夏三日秋冬五日後每用萆麻一粒擘破外殻以浸藥水吞下平旦服漸加至四五粒微利不妨水盡更添一方云服兩月後喫大蒜諸肉試驗如不發依前法再服如腿脤用針出毒物乃有神效神效散出仁存方治大風癩疾肌肉瘑潰鼻柱蝕爛黄柏三錢皂角刺燒灰三錢右研匀作一服温酒調空心服晩勿飲此藥至二更後取下䖝或大小長短如墨顔色不一約一二升其病愈利下惟是䖝更無他物並不損人利後三日内惟食白粥及補氣血藥忌食麵猪雞動風等物如四肢腫用針刺出水再服之治大風苦參地龍去土各等分右為細末㸔病淺深多少随意服茶酒任下不拘時候皮膚有破處用五靈脂細末以清麻油調塗之萆麻煎丸出聖濟方治大風疾萆麻子去皮十兩黄連去鬚五兩二味細剉以水一斗同水煑水盡取出不用黄連將萆麻子細研為膏九節菖蒲二兩白附子一兩右除前膏外搗羅為末入萆麻膏中拌勻煉蜜為丸桐子大每服三十丸薄荷茶下日三服蝦蟆丸一名小䖝丸出聖惠方治大風遍身生瘡腹臟有䖝鬢半落語聲欲破乾蝦蟆一兩炒黄肥長皂莢一條先炒透後去皮絃以酒再炙右為末以竹管引入羊腸内繋兩頭用麩二升鋪甑中置麩上蒸熟去麩入麝半錢同搗丸桐子大每服三十一粒空心温酒下劣弱者服二十丸任意飲酒取醉為度專㸔大腸内有䖝下即瘥治大風瘡出經驗良方用大風子不拘多少燒存性灰研細羅過與輕粉等分用麻油調於瘡上極妙如濕只乾擦之經騐方云昔章貢有鼔角匠面生肉瘰因詰之云舊害大風得道人傳此藥今遂愈矣還肌煎出聖惠方治大風甘穴鼻梁倒壞杜落崔一稗亦名克媍草無灰酒三斗右和根莖葉細剉置鍋内旋入酒煑令稠濾去滓再熬成膏入新磁器盛取桑東南根汁别収之有患者與前膏各一匙許以無灰熱酒調下厚衣覆蓋出汗仍於宻室内服藥至醉醒後以温桑枝水洗其壞肉著綿衣勿令當風苦參丸出聖濟總録治大風癩及熱毒風瘑疥癩苦參于九月末旬掘取根去黑皮暴乾用粉一斤枳殻去瓤麩炒六兩右為末煉蜜為丸桐子大每服三十丸患冷者以温酒下餘以粟米飲或淡漿水下食後服日二夜一若苦參根皮薄者即連皮用但細剉搗取粉棄滓不用治癩出肘后方取白蜜一斤生薑二斤搗取汁先秤銅鐺令知斤兩即下蜜於鐺中消之又秤知斤兩下薑汁於蜜中㣲火煎令薑汁盡秤蜜斤兩在即休藥已成矣患三十年癩者平旦服棗許大一丸一日三服酒飲任下忌生冷醋滑臭物功用甚多活人衆矣能一一具之治大風并壓丹石熱毒風手脚下逐出風科集驗方硝石一大兩生烏麻油二大斤右合内鐺中宻封口以紙泥固濟勿令氣出細進火煎之其藥未熟時氣腥候香氣發即熟更以生麻油二斤和合又㣲火煎之以意斟量得所即内不津器中服法患大風者用大火為使在室中重作小紙屋子外然火令患人在紙屋中發汗日服一大合病人力壯日服二服服之三七日頭面疱瘡皆滅若諸丹石藥熱發不得食熱物着厚衣卧厚床者即兩日共服一劑服法同前不用火為使忌風二七日若丹石發即不用此發但取一匙内口中待稍嚥汁熱除忌如前法雄黄丸出聖惠方治大風身體若䖝走之狀雄黄松脂煉成右等分蜜和丸以飲服十丸如桐子大日二百日差慎酒肉䀋醋生冷生血物等抱朴子載癩病煉松脂服之久服夜卧多當見有光大如鏡奇效又療通身癩瘡方用蓮荷二十枚石灰一斗淋取汁合煑令極濃以漬瘡半日許可數為之治大風神驗方出聖惠方通明乳香三十兩苦參四兩肥好者細剉右先用好酒五升浸苦參于磁瓶内以重湯煑一伏時其鍋釜下火亦不絶猛但令常小沸為候經一伏時足即取出濾去渣滓祇將好酒量其多少浸乳香於銀鍋内如餳糖般即止入天末四兩大麻仁二兩另研如膏内研攪令匀慢火熬之可丸即丸如桐子大每日空心及夜飯前以大麻仁酒下二十丸妙大麻仁酒法出聖惠方用大麻仁三升水淘令淨候乾以酒一斗浸一宿後和酒研取白汁以生絹濾過却入磁瓶中以重湯煑數沸止每遍取一小盞煖過下藥仍兼服後散相兼服之紫茄子根散出聖惠方服前藥後宜服紫茄子根切暴乾搗取汁一升白藥末三兩甘草炙赤取末一兩右和令匀早飯後至晩常均匀服三服每服温水調下二錢治大風疾出聖惠方煉成松脂三兩杏仁一升湯浸去皮尖䨇仁右先將杏仁搗碎漸入水絞取汁五升入松脂煎五七沸乗熱去渣内磁瓶中更入酒五升同封一宿每於食前煖一小盞服之何首烏散出聖惠方治大風癩惡疾何首烏一斤入白米泔水浸一七夏月逐日換水用竹刀子刮令碎九蒸九晒胡麻子四兩九蒸九曝右為細散每服食前用温酒調下二錢荆芥薄荷湯茶調下亦可治大風半身不遂出千金方用蠶砂兩石熟蒸分作直袋三枚各受七斗熱盛一袋著患處如冷即取餘袋前法數數易換百不禁瘥止須羊肚醸粳米䓤白薑椒豉等爛煑熱喫日食一具十日止又方出千金方蒸鼠壤土袋盛熨之瘥即止治諸癩大風等證一名苦參丸出海上名方用苦參為末稀糊丸桐子大每服三十丸苦參湯下食後滓煎湯沐浴尤良治大風用烏蛇三條修治令淨蒸煑熟去皮骨取肉焙乾為細末用宿蒸餅丸為丸如米粒大以喂烏雞其雞食盡烏蛇三條然後烹雞取肉為末或丸或散酒服之丸時乃用宿蒸餅每服五十丸甚者不過三五雞即愈白花蛇造酒方出瑞竹堂治大風每白花蛇一條蒸米一斗缺底先用酒麴次將蛇用絹袋盛之頓于麴上用紙封缺口候三七日開缺取酒將蛇去皮骨為末每酒一盞温服蛇末少許仍將酒脚並糟作餅食之尤佳羊蹄根方治風癩裂口唇方見澁瘍風類皂角丸出聖惠方治大風諸癩肥長皂角先炙透二十條後去皮絃其核自脱右以皂角肉用多酒慢火煎稠粘濾出清稀者候冷入雪糕杵為丸桐子大每服五十丸空心用酒送下一方云凡治大風病先服此宣洩却服他藥一方以十條塗酥炙黄為末十條去皮子搥碎用水五升煎碎皂角至一升生布濾去滓重煎成膏和前末為丸得效方出韋氏方治癘風即大惡癩疾是也名曰風未必皆因風大率多是濁氣外注傳流徧體故色敗皮膚瘍潰鼻梁塌壞或自作不仁極穢之業所致久之則遍身白皮脱落如蜕狀如或頭面生瘡眉髪髭落用桑枝灰一斗熱湯淋取汁先洗頭面之上然後用大豆及菉豆漿添熟水三日一浴一日一洗面脚用側柏葉蒸曝乾白膠香各等分為末蜜丸温水下三七粒日三服一方無白膠香治大風出本草以驢頭撏去毛煑汁以漬麯醖酒服治身上癩瘡以蒼耳子葉煎水洗之天門冬丸出聖惠方治大風癩病用天門冬去心生用五斗研絞取汁内磁器中宻蓋口以蠟封勿走藥氣于淨室中經一年取開其色赤如沙糖即少入苦參粉及乾地黄末為丸桐子大每服十丸温熟水下食前服淋渫方出聖惠方治大風癩疾用馬棘葉三斤為細末夏月取馬棘青葉與乾末同搗揑作餅子暴乾再為細末每用三兩水十五碗煎取沸濾入大盆淋渫徧身及渫肉損爛處日三遍不過半月肌體復舊治榮氣不清久風入脉因而或癩鼻壞色敗皮肉痒潰出聖惠方用黄精根去皮洗淨二斤日中曝乾令軟内粟米飯甑中同蒸之二斗米熟為度不拘時候服之烏蛇浸酒方治大風癩病方見白虎風類門内互用治大風用牝驢生脂和生椒熟搗綿裹塞耳又治積年耳聾狂癩不能語不識人者和酒服三斤良蒴藋湯治瘑癩風痺方見風瘙癮疹類馬先膏散治癩方見大風眉鬚堕落内蒿艾酒治癩疾出聖惠方取白艾蒿十束如升大煑取汁以麴糯米一如釀酒法候熟絹濾飲之但是惡疾遍身面目有瘡者皆可飲之又療身風體如䖝行方出千金方用鹽一斗水一担煎減半澄清温洗浴三四遍療一切風又方出千金方以淳灰汁洗面不過一月日愈又方出千金方以大豆漬飯漿中旦温洗面頭中痒加少麵沐頭復以水濯之十洗必瘥驅烏丸治大風癩疾皮肉頑麻不仁或風疹腫痒浸淫惡瘡以七月十五日取紫背浮萍日乾為末半斤入好消風散五兩入水數椀煎熬頻頻服之更浸湯洗之去根大蓼粥方出聖惠方治大風疾取大蓼刮去粗皮碎剉四兩以水一斗煎取汁一升去滓將汁煑糯米為粥空腹食之如病在膈上即吐出在膈中即汗出在膈下即轉出宜避外風之類治大風癩疾肌肉頑痺手足拘攣久服輕身延年好顔色不老一名大風丸出聖惠方用煉成松脂三斤研如粉以夾絹袋盛每服空心及晩食前煖無灰酒調下二錢一方煉蜜丸飢即服之日三鼻柱斷者百日服之瘥忌鹽襍食房事又天門冬酒服百日愈一方以蜜湯下二十丸上真散出十便良方治患癩大風疾用浮萍草三月採不拘多少淘浄三五次窨五日焙乾為細末不得見日食前空心二錢温酒調十服病退忌猪雞魚蒜通天再造散出十便良方治大風錦文大黄一兩濕紙包煨熟切片焙乾皂莢刺一兩去粗皮取嫩莖者剉碎右藥為細末每服十錢空心冷酒調下一方寸至午時取下毒物如魚腦膠之類如未效再服五錢即取下如亂髪之䖝惡物取盡然後補藥雄黄膏雄黄一兩水飛白花蛇全者一條五寸許煎浸一宿去骨炙乾為細末白砂糖一斤杏仁一斤去皮尖研爛右將雄黄白花蛇末入在蜜杏仁内同煉蜜為膏每服一錢温酒調服日進三服久服絶根本四聖保命丹出衛生寳鑑大黄半兩黄蘗半斤苦參四兩荆芥穗四兩蝦蟆灰一個燒灰右為細末煉蜜為劑分作一百二十丸每服一丸温酒送下食後日進三服忌肉醬祛風散出衛生寳鑑大蠶砂五斤水淘三遍東行蝎虎一個焙乾為末用白麵四五斤泮蠶砂為絡素暴乾右每服二合熬柏葉湯調服食前日進三服柏葉湯出衛生寳鑑東南枝上摘柏葉一秤水一桶煑三沸濾滓甕盛起旋熬調蜜初服苦澁三五日後甜十日四肢沉困便赤白痢服藥一月後發出瘡疙瘩四十日瘡破後瘡上傅藥烏龍散出衛生寳鑑倒懸青灰二錢烏雞子皮右用柏油二兩調搽又方出海上名方治諸癩大風等疾苦胡麻半斤别搽天麻二兩乳香三分右為細末每服三錢荆芥臈湯下忌鹽房事動風物一百二十日服半月後兩腰眼灸十四狀活血散出楊氏方治大風疾并諸風渾身頑麻瘙痒成瘡白花蛇五兩須𦂳細者草烏頭十兩川烏頭五兩防風二兩半已上四味用水同煑香熟為度濾出先去防風不用次將白花蛇去皮骨焙乾將草去皮臍焙乾稱取五兩次將川烏去皮臍焙乾秤取二兩外别入草烏生去皮尖秤五兩川烏生去皮尖秤二兩半一處為末入後藥血竭一兩另研麝香半錢另研右件和匀臨服藥時先於食後將真大楓油一錢麝香少許用清茶或酒調服續將活血散每服一錢濃煎貫衆湯点清茶調下更量疾勢加減服切忌雞肉地龍丸出衛生寳鑑治大風一切風毒生瘡全蝎地龍去土蛇退油炒香附子防風胡麻子另研已上各一兩川烏去皮尖蠶砂荆芥已上各二兩蒼术二兩半米甘水浸右碾為細末用醋糊為丸桐子大每服二十丸至三十丸茶酒任下不拘時候用朱砂為衣廬山胡以方嘗患此在北方傳得此方效出永類鈴方杏仁鐵屑夜明沙朴硝地骨皮右等分為末入柏子油内煎三兩去滓用酒搽南方少得柏子油以老節有油者燒漉亦可並治疥瘡諸惡瘡袁髙致傳來一方田菜子根又枸杞子根等分皆同外有服藥并洗藥出永類鈴方蒼术二兩半白芷一兩天麻白蛇淨逺志肉全蝎自然銅牽牛北細辛白术地龍甘草殭蠶狗脊青皮陳皮各一兩南木香草烏麻黄苦參各半兩薄荷當歸荆芥防風藁本乳香没藥各三錢川山甲川芎人參各二兩烏蛇一錢麝香二錢龍腦一錢二味别研為末右為末煉蜜桐子大不拘時四十丸服茶酒任下洗藥出永類鈴方蒼术防風荆芥細辛川烏苦參麻黄地骨皮何首烏百草澤各二兩右剉散煎常洗搽藥當用丸罐熬十個時苦參丸出澹察方治肺腎先受風邪腠理發作遍身成瘡片片皮膚燥痒痛不已大風癩發眉髪不存亦可服之苦參香白芷荆芥蒼耳子無則以莖代之蔓荆子香附子撫芎各三兩右㕮咀於甑内蒸過三曝為末用猪脂十五兩畧熬冷成油入宿蒸餅五七餅同搗成膏可丸即丸如不可則添入白糊一處為膏丸桐子大每服三十丸荆芥湯下苦參丸出澹寮方治肺積熱腎臟風毒攻于皮膚時生疥癩燥痒難忍時出黄水及大風手足壞爛眉毛脱落一切風疾苦參二十兩荆芥去梗十六兩右為末水糊丸桐子大每服三十丸好茶吞下或荆芥湯食後一方有熱者宜荆芥大黄通利之即愈治癩方出本草煉松柏脂服之昔趙翟病癩厯年醫不瘥家乃齎粮棄送於山穴中翟自怨不幸悲歎涕泣經月有仙人經穴見之哀之具問其詳翟知其異人也叩頭自陳乞命於是仙人取囊中藥賜之教其服百餘日瘡愈顔色悦肌膚潤仙人再過視之翟謝活命之㤙乞遺其方仙人曰此是松脂彼中極多汝可煉服之長服身輕力百倍登危涉險終日不困年百嵗齒固髮不白夜卧常見有光大如鏡者以問左右皆云不見久而漸大一室盡明如晝日又夜見面上有綵女二長二三寸面體皆具但短小耳游戱其口鼻之間如是且一年此女漸長大出在其側又嘗聞琴瑟之音欣然獨笑在人間三百許年色如少童乃入抱犢山去必為地仙也治大風及諸惡瘡出本草以蝮蛇酒浸服之昔宣城間山人取蝮蛇一枚活著器中以好酒一斗投之埋於馬溺處周年已後開取酒味猶存蛇已消化有患大風及諸惡風惡瘡瘰皮膚頑痺半身枯死皮肉手足臟腑間重疾並主之不過服一升已來當覺舉身輕健服訖不服他藥得力亦有小毒不可長服治風癩出本草以胡麻合蒼耳子為散服之治水癩偏大上下不定疼痛出本草以牡蠣不限多少鹽泥固濟炭三斤煆令火盡冷取二兩乾薑一兩炮又為細末用冷水調稀稠得所塗病處小便大利即愈治患大風出本草烏蛇酒浸方治大風出風科集旋方釋普明齊州人久止靈巖晩逰五䑓得風疾眉髪俱堕百骸腐潰哀號苦楚人不忍聞忽有異人教服長松明不知識復告之云長松生石松下取根餌之皮色如薺菜長三五寸味㣲苦類人參清香可愛無毒服之益人兼觧諸䖝毒明採服不旬日毛髪俱生顔貎少色如故今并代間世人多取長松襍甘草乾山藥為湯煎服甚佳然木草及諸方書皆不載獨釋慧祥清涼傳怡序之治大風身痒用蛇床子煎湯服之差治肺毒瘡如大風疾用桑葉好者淨洗過蒸一宿後日乾為末水調二錢服治瘡疹及癩疾用苦參五斤切以好酒三斗漬三十日每飲一合日二服常服不絶若覺痺即差或取根為末服之亦良治癩方用乾艾随多少浸麴醸酒如常法飲之覺痺即差也普濟方卷一百十
