body:
  text: 普濟方卷九十七明周王朱橚撰諸風門風偏枯論夫風偏枯者由血氣偏虚則腠理開受於風濕風濕客於半身在分腠之間使血氣凝濇不能潤養久不差生氣去邪獨留則成偏枯其狀則半身不遂肌肉偏枯小而痛言不變智不亂是也邪初在分腠之間宜温卧取汗益其不足損其有餘乃可復也診其胃脉沉大心脉小牢急皆為偏枯男子則癈左女子則癈右若不瘖舌轉者可療三十日起其年未滿二十者三嵗死又左手尺中神門以後脉足太陽經也虚者則病惡風偏枯此由愁思所致憂思所為也方凝水石酒出聖劑總録治八風十二痺偏枯不遂宿食虚冷五勞七傷亦治婦人産後餘疾月水不調皆主之凝水石白石英白石脂代赭石礬石礜石石膏芒硝卷柏石南石韋各一兩天雄附子並炮去皮臍常山續斷芫花白术防風黄芩去黑心黄連去須大黄炒麻黄去根節熟地黄山茱茰杏仁湯洗去皮尖雙仁𤣥參䕡茹狼毒半夏湯洗七次焙䔧蘆菖蒲前胡蜈蚣甘草炙龍膽桔梗剉炒秦艽去苖芍藥紫菀去苖白芷逺志去心莵絲子酒浸一宿焙各一兩右剉如麻豆盛以絹袋用水三斗七月七日麴三斤黍米三升作飯依和酒法以藥著袋中春秋七日冬十日夏三日酒成服半鷄子殻日三并暴囊中藥滓更搗篩酒服方寸匕以體暖為度一方有桂心細辛烏頭躑躅蜀椒無芒硝大八風湯療毒風濕痺嚲曵或手脚不隨身體偏枯或軟弱不任或風經五臟恍恍惚惚或多語喜忘有時恐怖或肢節疼頭眩煩悶腰脊强直不得俯仰又加腹滿食少時氣欬或始遇病時卒倒悶絶即不能語便失音半身或舉體不隨不仁沉重皆由體虗恃少不避風冷所致二十三種方見風毒類漏蘆散出聖劑總録治中風偏枯手足不隨漏蘆去蘆頭地龍去土炒當歸切焙附子生用去皮臍各一兩半天麻二兩乾蝎去土炒黄芪細剉没藥研丹砂研各半兩白花蛇酒浸經宿去皮骨炙取肉烏蛇酒浸經宿去皮骨炙各半兩粟揳牛膝浸酒切焙麻黄去根節羌活去蘆頭天南星生用獨活去蘆頭虎骨酥炙黄麻黄去根節白殭蠶炒各一兩麝香研二錢桑根白皮剉炒半兩右除别研外搗羅為細末即入别研者拌和令匀每服半錢匕研胡桃酒調下豆淋酒亦得入急中風手足攣拳言語蹇澁服一錢匕服了就所患痛處卧立應或有汗出慎外風牛黄丸出聖惠方治中風偏枯不遂常在牀枕轉動艱難牛黄細研麝香細研各一分硃砂細研水飛過天南星炮天雄炮去皮臍牛膝去苖赤茯苓葳靈仙烏犀角屑羚羊角屑萆薢剉各一兩躑躅花酒拌炒乾羌活人參去蘆頭白殭蠶㣲炒天麻獨活防風去蘆頭芎藭當歸剉炒各一兩半烏蛇酒浸去皮骨炙㣲黄三兩右為末如前研了藥令勻鍊蜜和丸如梧桐子大每服食前以温酒下十五丸龍腦丸出聖惠方治中風偏枯不遂肢節疼痛行歩艱難龍腦雄黄麝香各細研牛黄天南星炮躑躅花酒拌炒乾各一分硃砂細硏水飛過乳香細研乾蝎㣲炒白殭𧖟㣲炒安息香各半兩川烏頭去皮臍生用天麻羌活附子去皮臍生用白花蛇酒浸去皮骨炙令㣲黄各一兩重白附子炮三分麻黄去根節搗碎以酒五升煎取一升去滓熬成膏五兩右為末入前研藥六味令勻令用麻黄和搗三五百杵丸如梧桐子大每服食前以温酒下十丸忌生冷羊血油膩毒滑魚肉甘草湯治中偏風積年不差手足枯細口面喎斜精神不守言語倒錯甘草炙剉側子炮去皮臍桂去粗皮防己各一兩防風去义三分附子炮去皮臍芎藭人參麻黄去根節煎掠去沫焙乾當歸切焙赤芍藥各一兩秦艽去苖土三分茯神去木二兩白术黄芩去黒心半兩細辛去苖葉㣲炒半兩重甘菊花未開者一兩右剉如麻豆大每服六錢匕以水二盞入生薑半分煎至一盞去滓入竹瀝半合更同煎沸温服空心日晩近夜服牛膝浸酒方治風及偏枯腰膝疼痛牛膝去苖茄子根各八兩防風去蘆頭鼠粘子㣲炒三兩萆薢枸杞子羌活海桐皮蒼耳子搗碎附子炮去皮臍五加皮虎脛骨塗酥炙㣲黄各二兩牛旁子四兩大麻子搗碎晩蠶沙黑豆炒熟搗碎各三合秦艽去苖一兩右細剉以生絹袋盛用好酒三斗宻封頭浸經七日每日空心午時及夜臨卧温飲一小盞其酒旋添味淡即換藥忌猪肉鷄毒魚粘滑物烏蛇散治中風偏枯手足不隨筋骨疼痛烏蛇酒浸去皮骨炙令㣲黄二兩赤箭羌活防風去蘆頭桂心海桐皮藁本萆薢剉獨活當歸阿膠搗碎炒令黄燥用麻黄去根節天雄炮去皮臍枳殻麩炒㣲黄去瓤乾薑炮剉牛旁子根乾者刮去皮各一兩右搗細羅為散每服不計時候以温酒調下二錢忌生冷油膩鷄猪狗肉没藥丸治中風偏枯手足不隨言語蹇澁口眼歪斜没藥研乳香研丹砂研各半兩麝香研一分人參剉半兩烏頭炮去皮臍地龍去土炒𤣥參各一兩羚羊角鎊屑一分犀角屑鎊一分丁香一分木香一分天麻酒浸一宿切片焙二兩龍腦研一分右為細末鍊蜜和丸以金箔為衣櫻桃大每服一丸温酒化下食前服日二重病者服一月差初患五七服即愈一方治中風手足不遂有白花蛇無𤣥參茱茰散治中風偏枯不遂筋脉拘急肢節疼痛山茱茰一兩半天雄炮去皮臍麻黄去根節川椒去目及閉口者㣲炒去汗萆薢剉桂心川烏頭炮去皮臍防風去蘆頭甘草炙㣲赤剉牛膝去苖狗脊莽草微炙躑躅花酒拌炒令乾石南各一兩右搗羅為散每服不計時候以温酒調下二錢祛風丸治中風偏枯手足戰掉語言蹇澁筋骨疼痛川烏頭炮草烏頭炮天南星半夏各一兩菉豆粉一兩甘草川芎藿香葉白殭蠶糯米泔浸去絲用零陵香地龍蝎稍各三錢川薑半兩炮右為末二兩用菉豆粉一兩以白麵二兩滴水為丸如梧桐子大量人虚實加减細嚼茶酒下五七丸食後初服三丸漸加天蓼木浸酒治中風偏枯不遂失音不語天蓼木十片細剉以水一碩煎至五斗用此水造酒湏及五斗熟後浸後藥桑根白皮地骨皮石斛去根逺志去心牛膝去苖莵絲子各半斤生地黄防風去蘆頭各半兩槐子白蒺藜㣲炒去刺各半升烏蛇一條酒浸炙令黄烏鷄糞五合炒黄右細剉以生絹袋盛入天蓼木酒中宻封閉冬月三七日春夏二七日量性飲之令常有酒容如覺熱即减之眼鼻及面口偏者七日取正手脚不遂者半月内差失語服之即語此方神驗不具言之十聖天麻丸治中風手足偏枯跛蹇不隨天麻酒浸焙乾地榆凈洗焙附子以生薑半兩棗四枚同煮一時去皮臍切碎焙乾炒各三兩白附子米泔浸焙乾三兩丁香半兩木香半兩雄黄研半兩黄芪細剉三兩已上七味同搗羅為末犀角鎊細末真珠研各半兩牛黄研一兩麝香研一兩右除七味搗羅外五味别研然後同拌和令匀後鍊蜜丸櫻桃大每服一丸温酒嚼下移時更以熱酒一盞投之任加衣被葢覆空心食前臨卧各一服六十歳以下兩月平復四十嵗以下一月平復十日後或汗出或如蟲行勿怪如欲常服每丸分作四服逐日一服虎脛骨酒出濟生方治風偏枯半死行勞得風若鬼所繋四肢不遂不能行歩但是一切諸風攣急之證悉皆治療石斛去根石南葉防風去蘆虎脛骨酥炙當歸去蘆茵芋葉杜仲剉炒川牛膝去蘆芎藭川續斷金毛狗脊燎去毛川巴㦸去心各一兩右剉如豆大以絹囊盛藥以酒一斗漬之十日每服一盞盪熱服不拘時候桂心散出聖惠方治中風偏枯手足不遂筋脉拘急疼痛腹脇不利桂心枳殻麩炒㣲黄去穰牛膝去苖㯽榔各一兩續斷虎掌湯洗七遍生薑汁拌炒令黄各半兩重剉海桐皮萆薢剉犀角屑木香當歸羌活各三錢右搗篩為散每服四錢以水一大盞入生薑半分煎至五分去滓不計時候麻黄散出聖惠方治中風偏枯不遂輕利四肢宣祛風毒麻黄去根節羌活芎藭荆芥附子炮去皮臍獨活防風去蘆頭天麻甘草炙㣲赤剉赤芍藥桂心㯽榔各半兩右搗細羅為散每服不計時候以温酒調下二錢天雄散出聖惠方治中風跛蹇偏枯不遂肢節疼痛晝夜呻吟天雄炮去皮臍白歛桂心附子炮去皮臍薯蕷乾漆搗碎炒令烟出狗脊防風去蘆頭當歸各一兩吳茱茰湯浸七遍焙乾㣲炒乾薑炮剉枳殻麩炒㣲黄去穰各半兩右搗細羅為散每服不計時候以温酒調下二錢忌生冷油膩等物當歸湯出聖劑録治中風手足偏枯口面歪斜疼痛眼不能合當歸切焙白芷防風去义白鮮皮白术芎藭甘草炙剉甘菊花杏仁湯浸去皮尖雙仁炒各一兩人參半兩天雄炮去皮臍一兩右剉如麻豆大每服五錢匕以水二盞入生薑半分煎至一盞去滓温服日三夜一與食相間服之金箔丸出聖劑總録治中風偏枯手足不隨言語蹇澁心神恍惚金箔研二錢丹砂研一兩阿膠炙燥二兩丁香一兩麝香研一兩龍腦研一兩牛黄研一兩墨燒過細研半兩天南星炮半兩雄黄研一兩右為細末再将研藥拌匀錬蜜丸如梧桐子大每服二丸細嚼温酒下此藥兼療婦人血風頭目昏眩胸膈諸疾烏藥順氣散治風氣不順手足偏枯流注經絡并濕毒進襲腿膝攣痺筋骨疼痛方見諸風雜治類乳香没藥丸治中風偏枯手足不能舉動没藥研乳香研虎骨醋炙黄白附子炮木鼈子去殻草烏頭剉炒黒存性已上各一兩麻黄去根節三兩自然銅醋浸七次研一兩乾蝎去土炒二兩右為細末再入研藥拌匀以酒磨濃墨汁和先分作十塊每塊更分作二十丸每服一丸温酒磨下日三五服不拘時候服之獨活散出聖惠方治中風偏枯不遂口眼不正語澁四肢拘急獨活桂心赤箭羚羊角屑各半兩枳殻麩炒㣲黄去穰芎藭當歸剉㣲炒細辛各一兩防風去蘆頭三分右搗麄羅為散每服四錢以水一中盞煎至六分去滓入竹瀝半合更煎一兩沸不計時候温服忌生冷油膩猪鷄肉赤車使者酒出聖劑總録治中風濕偏枯緩縱不隨五勞七傷寒冷百病者赤車使者當歸切焙各半兩防風去义獨活去蘆頭細辛去苗葉人參各一兩白茯苓去黒皮半兩附子炮去皮臍十五枚右剉如麻豆大用水一斗麴一斤五兩造酒内三斗甖中宻以油袋盛甖勿令水入沉井底三宿藥成即置髙燥䖏停二日平旦服半盞日三漸増之天南星丸出聖劑總録治中風偏枯體肢細小而痛言語神智不亂天南星半夏湯洗七次焙烏頭去皮臍草烏頭自然銅木鼈子去殻滑石各二兩乳香一分並生用右為細末用醇酒煮麵糊和如梧桐子大每服十丸温酒送下川烏頭丸出聖惠方治中風偏枯不遂手足攣急疼痛川烏頭炮去皮臍一兩天南星炮半兩白殭蠶㣲炒三分桂心半兩赤箭一兩安息香一分麝香細研二錢牛黄細研半兩右為末研入後二味匀鍊蜜和丸如梧桐子大每於食前麻黄酒下五丸兼取麻黄末三兩以酒二升慢火煎如膏放冷丸如彈子大每服以冷酒或冷水研下一丸須臾偏枯䖏有汗通手足舒展獨活浸酒出聖惠方治中風偏枯不遂骨節疼痛獨活桂心防風去蘆頭附子炮去皮臍牛膝各一兩大麻子二合川椒去目及閉口者㣲炒去汗天蓼木剉各二兩右並細研以生絹袋盛以酒一斗宻封頭浸三日每日食前及臨卧時煖一中盞飲之以藥力盡為度患者不過三兩劑必效磁石湯治中風偏枯骨痠無力磁石燒赤醋淬七次三兩防風去义三兩五味子二兩甘草炙剉一兩𤣥參二兩牡丹去心二兩附子炮去皮臍一兩右剉如麻豆大每服五錢匕以水二盞入黒豆三十五粒同煎至一盞去滓空心午後卧服虎骨散出仁存方治半身不遂肌肉乾燥漸漸細痩或疼痛由血少氣勝風邪留於脉絡榮衛不得運行名曰偏枯謹勿用麻黄藥發汗重亡津液愈耗其血也當潤筋去風當歸二兩赤芍藥川續斷白术藁本虎骨各一兩烏蛇肉半兩右為細末每二錢温酒調下食後服如骨中煩疼熱者加生地黄一兩若臟寒自利者加天雄半兩一方有防風無藁本竹瀝飲子出聖惠方治中風偏枯不遂言語蹇澁膈上熱心神恍惚惛惛如醉竹瀝三合羚羊角屑半兩石膏二兩茯神一兩麥門冬去心獨活各三分右細剉都以水三大盞煎至一盞半去滓入竹瀝分為四服不計時候温服之皂莢丸出聖惠方治中風偏枯不遂行歩艱難出汗肥皂莢十挺去黒皮酥塗炙令黄去子羌活二兩防風去蘆頭桂心各三兩乾薄荷四兩附子炮去皮臍二兩右搗羅為末錬蜜和丸如梧桐子大每服以温酒或薄荷湯下二十丸日三服常於患䖏有汗為效犀角煎出聖劑總録治中風手足偏枯不隨或癱或緩脚氣攻頭面浮腫口眼喎斜語澁多涎精神恍惚大便風祕犀角鎊搗細末天麻取細末附子炮去皮臍取末各二兩龍腦生者研半兩葳靈仙十斤紫色者右先将葳靈仙用河水一石煮至三斗以絹濾去滓只取清汁更入醇酒一斗同再以銀石器中熬至一斗更澄去細塵次入天麻附子末再在藥汁中再以慢火煎成膏放令温冷後入犀角屑龍腦末一處同攪勻用瓷合子内盛之如有患者用薄荷湯化下一錢茵芋淋浸出聖劑總録治中風手足偏枯攣臂不得屈伸茵芋去粗莖三兩獨活去蘆頭六兩防己四兩蒺藜子去角生用三升椒去目及閉口者一升右麤搗羅篩以清漿水三斗煮取二斗去滓入鹽二兩半適寒温用淋浸所患手足水温即止鷄峰活血丹出指南方治一邉足膝無力漸漸乾痩上牽脇肋下連膝脛筋脉攣急妨於歩履由病後重亡津液血少不能榮養於筋故也乾地黄三兩白芍藥當歸川續斷白术各一兩右為末酒糊丸梧桐子大每服三十丸温酒下三靈丹出聖惠方治中風偏枯不隨口不收涎丹砂研三兩雌黄研一兩硫黄研半兩右先将雌黄硫黄於鍋内銷成汁後下丹砂末攪令勻候却下桑柴灰汁煮三日三夜旋旋添煖灰汁日足即住刮入鼎子中以文武火逼乾出隂氣盡入盒子内固濟以二十斤火煆候火銷至三五斤其藥已在合底作一片候冷鑿取以甘草餘甘子瓷器中入水煮一日出火毒了更研令細入棗肉和研為丸如菉豆大每日空心以冷椒湯下三丸漸加至五丸服半月即差忌羊血山龍丸出聖劑總録治偏風半身枯痩肢體細小而痛蜥蜴一名山龍子酥炙二錢海蛤一錢烏頭炮去皮臍半錢右為細末麵糊丸分作兩粒葱白兩枝中心分開入藥在内帛子繋向兩脚心底用煖水浸以衣被覆之春夏浸至踝秋冬浸至膝自然汗出羌活散出醫方集成治中風偏癈附子一箇羌活烏藥各一兩右㕮咀每服五錢水四盞慢火煎至二盞去滓分二服香豉散療三十年風躃偏枯不能行生地黄三十斤香豉三升綿裹右洗地黄㕮咀先蒸之半日暴燥更合豉蒸半日蒸令燥搗下篩以酒服三方寸匕日三亦可水服益精爽氣服數月有神效小黄茋酒出千金方治大風虚痰癖四肢偏枯兩脚弱手不能上頭或小腹縮痛脇下攣急心下有伏水脇下有積飲夜喜夢悲愁不樂恍惚善忘此因風虚五臟受害邪所致或久坐腰痛耳聾卒起目眩頭重或舉體流腫疼痺飲食惡冷濇濇惡寒胸中痰滿心下寒疝藥皆主之及婦人産後餘疾風虚積冷不除者黄茋附子蜀椒防風牛膝細辛桂心獨活白术芎藭甘草各三兩秦艽大黄葛根乾薑各二兩烏頭集驗用薯蕷三兩山茱茰二兩當歸二兩半右㕮咀少壮人無所熬鍊虚老人㣲熬之以絹袋中盛清酒二斗漬之春夏五日秋冬七日可先食服一合不知可至四五合日三服此藥攻痺甚佳亦不可令人吐悶小熱宜冷飲食大虚加蓯蓉二兩下利加女萎三兩多忘加石斛菖蒲紫石各二兩心下多水者加茯苓人參各二兩薯蕷三兩酒飲已盡可更以酒二斗重漬滓服之不爾可曝滓搗下酒服方寸匕不知稍増之服一劑得力令人耐寒冷補虚治諸風冷神良治中風偏枯不遂手脚冷頑强硬展縮不得及走注疼痛皂莢一斤不蛀者寸截鹽二斤右相和炒令熱以青布裹熨令麻疼痛處以差為度治風攣拘急偏枯血氣不通利出肘後方以鴈肪四兩煉濾過每日空心煖酒一盃肪一匙頭飲之續斷湯出指南方治偏枯少血當歸三兩生用生地黄二兩橘皮芍藥細辛去苖各一兩右為麤末每服五錢水二盞煎至一盞去滓温服臟寒多利者加附子一兩炮去皮臍入煎藥内大八風湯出指南方治中風偏枯失音半身不遂時恍惚當歸切焙杏仁去皮尖甘草炙桂去粗皮乾薑各二兩五味子升麻各一兩川烏炮去皮臍黄芩芍藥獨活防風川芎麻黄去節秦艽石斛去節人參茯神石膏黄芪紫苑去苖各一兩大豆三兩炒去皮右為麤末每服五錢水二盞酒一合煎一盞去滓温服恍惚不用酒導引法養生方云正倚壁不息行氣從頭至足止愈疽疝大風偏枯諸風痺又云仰兩足指五息指引腰背痺偏枯令人耳聞聲常行眼耳諸根無有障礙又云正倚壁不息行氣從口趣令氣至頭始止療疽痺大風偏枯又云一足立地足不動一足向側相轉身欹氣并手盡急回右左送二七去脊風冷偏枯不通潤中風四肢拘攣不得屈伸論夫藏真散於肝肝藏筋脉之氣筋為肝所養筋得其養則俯仰屈伸莫或乖戾者經絡偏虚風邪侵来客於機關則筋脉縮急干於陽絡則肩背從而拘攣此皆邪氣内盛正氣不能榮養諸筋故為四肢拘攣不得屈伸久而不已重感於邪則夜卧不寧小便滑數凡以肝藏魂為病為驚駭又腎之脉絡膀胱其直者從腎上貫肝膈而致然也葢此由體虚腠理開風邪在於筋故也春遇痺為筋痺則筋屈邪客關機則使筋攣邪客於足太陽之絡令人肩背拘急也足厥隂肝之經也肝通主諸筋王在春其經絡虚春遇風邪則傷於筋使四肢拘攣不得屈伸診其脉急細如弦者筋急足攣也若筋屈不已又遇於邪則移變入肝其狀夜卧則驚小便數也方生犀丸出聖劑總録治風邪客於機關筋脉縮急肢體拘攣生犀鎊木香赤箭牛膝去苖酒浸㣲炒芎藭天麻漿水煮一日切作片子焙乾萆澄茄各取末二兩葳靈仙去土焙乾乾薄荷取末羌活去蘆頭薏苡仁酸棗仁㣲炒補骨脂生乾地黄焙各取末三兩黄芪剉焙何首烏米泔浸五日竹刀切焙甘菊花杜仲去粗皮炙剉防風去义白花蛇酒浸一日去皮骨炙黄蔓荆子桂去粗皮丹砂研厚朴去粗皮生薑汁炙令香白附子㣲炮白芷甘草炙剉各一兩香墨一兩生用年深好者用二兩佳右為末别入生龍腦五錢細研於凈盤中攪拌勻再羅三兩徧須是勻細鍊蜜􅊧和入臼中杵約三千下取出每一兩分作三十丸以麝香油塗手為丸以瓷器内收盛身體昏沉鼻塞氣悶煎人參湯嚼下二十丸日三服不以時候上膈不利痰涎忽多以龍腦木香湯嚼下二十丸食後臨卧一日三服常服茶酒任下輕骨丹出御藥院方治中風手足緩弱肢節不伸筋脉攣急癱瘓偏風半身不遂口面喎斜語言蹇澁肌肉蹇澁不生一切諸風並皆治之常服此藥壮筋骨補虚注顔色强骨生力益真氣搜骨髓間風邪牛膝莵絲子肉蓯蓉並酒浸獨活當歸羌活並去土骨碎補去毛金毛狗脊去毛附子炮去皮臍萆薢蜜炒川烏頭炮去皮臍川心巴㦸鹽炒破故紙葫蘆巴白芥子五味子天麻防風去蘆頭川芎木香全蝎續斷各一兩没藥並别研地龍去土甜𤓰子炒木鼈子各半兩熟地黄一兩乳香半兩右為細末酒煮麵為丸如梧桐子大每服三十丸至四十丸食前温酒下萆薢丸出聖惠方治風毒所攻四肢拘攣骨節疼痛脚膝無力萆薢酸棗仁㣲炒獨活附子炮去皮臍石斛去根節虎脛骨酥塗炙黄㯽榔已上各一兩乾蝎半兩㣲炒芎藭仙靈脾丹參牛膝去苖當歸防風去蘆頭桂心狗脊赤箭海桐皮木香已上各三分麝香一分細研右為末入研了藥令勻鍊蜜和丸如梧桐子大每服不計時候以温酒下二十丸酸棗仁煎出聖劑録治筋骨拘急及輭風疼痛行履不得方見柔風類列節浸酒方出聖惠方治風骨節疼痛行歩不任列節黄茋羌活桂心海桐皮虎脛骨酥塗炙黄牛膝去苗附子炮去皮臍各二兩防風去蘆頭茵芋生地黄芎藭當歸枸杞子敗龜酥塗炙㣲黄白芷五加皮酸棗仁已上各一兩黑豆三合炒熟右細剉和勻以生絹袋盛用酒三斗宻封瓶頭浸經一七日後開取每日空心午時及夜卧熱煖一小盞飲之其酒旋旋更添或将此酒下諸丸散亦得忌生冷猪鷄牛馬肉白花蛇丸出聖劑總録治風邪客於機關筋脉縮急肢體拘攣白花蛇酒浸去皮骨取肉炙一兩蟬殻去泥土乾蝎去土炒人參天麻白殭蠶洗炒萆薢當歸切焙芎藭羌活去蘆白芷烏頭炮去皮臍附子炮去皮臍各半兩狼毒三分炮生犀角末半兩龍腦三錢别研雄黄研兩半水飛過甘草炙剉一分右研勻鍊蜜和丸皂角子大每服不拘時茶酒任嚼下一粒服之乳香丸出聖劑總録治中風四肢拘攣筋骨疼痛乳香細硏一兩烏頭炮去皮臍附子炮去皮臍雄黄細研水飛各半兩羌活去蘆頭白附子炮一兩羚羊角一兩原蠶蛾㣲炒防風去义烏蛇酒浸去皮骨炙白殭蠶炒虎脛骨酥炙一兩膩粉一分麝香細研一分赤箭牛膝酒浸切焙没藥研各半兩右為末再同和勻鍊蜜丸如梧桐子大每用豆淋熱酒下十丸如人行十里再服羌活散出聖惠方治風毒入四肢筋脉拘攣疼痛羌活天麻酸棗仁㣲炒羚羊角地骨皮栢子仁已上各一兩半芎藭鹿角膠搗碎炒黄側子炮製去皮臍人參去蘆頭白附子炮製桂心薏苡仁海桐皮各一兩牛膝去苖二兩烏蛇酒浸去皮骨炙㣲黄三兩犀角屑三分右為散不拘時候以豆淋酒調下二錢羌活湯出聖劑總録治中風四肢拘攣筋急或緩縱不隨骨肉疼痛羸痩眩悶或腰背强直或心忪悸怵惕不安服諸湯汗出後又覺虚困病仍未痊急服羌活去蘆頭三兩防風去义三兩人參三兩白茯苓去黒皮四兩芎藭二兩逺志去心二兩半薏苡仁炒三兩附子炮去皮臍桂心去粗皮麻黄去根節煎掠去沫焙乾各二兩磁石煆醋淬五兩秦艽去苖土丹參各二兩五加皮二兩半生地黄焙杏仁湯退去皮尖雙仁炒各半兩右剉如麻豆每服五錢匕水二盞棗二枚擘破生薑半棗大切同煎至一盞去滓温服空心晚食前各一服若病者有熱即去桂加葛根一兩剉白蘚皮一兩炙剉四肢疼痛痿弱攣急加當歸切焙細辛去苖葉各二兩天雄丸出聖劑總録治筋骨拘急脇下痛不可轉側天雄炮製去皮臍桂去粗皮羌活去蘆頭當歸切焙白术炒天麻酒炙芎藭各一兩烏藥炒陳皮去白焙續斷石斛去根白茯苓去黒皮乾薑炮白芷炒乾蝎去土炒乾漆炒令烟出各一兩右𢷬羅為末鍊蜜和丸如梧桐子大每服三十丸空心荆芥酒下日二服防風散出聖惠方治風四肢不利筋脉拘急發作疼痛防風去蘆頭羌活黄茋五加皮牛膝去苖丹參酸棗仁㣲炒桂心赤茯苓麻黄去根節附子炮去皮臍已上各一兩㯽榔當歸枳殻麩炒㣲黄去穣已上各三分右為散每服五錢以水一大盞入生薑半分煎至五分去滓不拘時候温服忌生冷油膩猪鷄犬肉牛黄丸出聖惠方治風毒攻四肢筋脉拘急牛黄研麝香研各半兩白附子炮製防風去蘆頭虎脛骨酥塗炙黄大黄剉炒㣲黄桂心羚羊角屑各一兩烏蛇酒浸去皮骨炙令㣲黄白殭蠶㣲炒附子炮製去皮臍各二兩天麻羌活各一兩半麻黄三分去根節右為末以無灰酒五升於銀鍋内用藥末一半同熬候如膏入餘上藥并牛黄麝香和搗三五百杵丸如鷄頭實大每服不拘時候以温酒嚼下三丸乳香丸出聖惠方治風四肢拘攣筋骨疼痛乳香硏白附子炮製羚羊角晩蠶蛾㣲炒烏蛇酒浸去皮骨炙令㣲黄羌活防風去蘆頭白殭蠶㣲炒已上各一兩烏頭炮製去皮臍雄黄研水飛過附子炮製去皮臍各半兩膩粉麝香研各一分右為末鍊蜜和丸如梧桐子大每服以熱豆淋酒下十丸如人行十里再服一方加當歸三分防己麻黄湯