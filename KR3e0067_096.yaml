五錢鎊天麻一兩天台烏藥三兩青皮五錢去穰白芷甘草人參各五錢右㕮咀每服三錢水一盞半生薑三片紫蘓五葉木𤓰三片棗子一枚煎至七分去滓空心温服羚羊角散出聖惠方治風毒攻四肢筋脉拘攣羚羊角屑桂心附子炮製去皮臍羌活酸棗仁㣲炒天蓼木剉各一兩桑根白皮三兩剉防風去蘆頭三分右為散每服三錢以水一中盞入生薑半分煎至五分去滓不拘時候温服麻子湯出聖劑總録治中風四肢拘攣筋急風行在皮膚身體牢强服之令人不虚方見大風癩病類附子飲出聖劑總録治中風四肢拘攣屈伸不得附子兩枚大者一枚炮去皮臍一枚生用桂去粗皮二兩甘草炙剉二兩麻黄去節先煎掠去沫焙乾四兩杏仁湯退去皮尖雙仁炒二兩右粗搗篩每服五錢匕以水二盞煎至一盞去滓温服相去如人行五里再服以被葢之通體有汗即愈未汗用熱生薑葱豉稀粥空心臨卧常服三合甚佳地龍餅子出聖劑録治中風手足筋急拘攣疼痛地龍炒海蛤硫黄研各半兩烏頭炮製去皮臍半兩鯪鯉甲炙一兩右為末醋煮麵糊為丸如鷄頭大揑作餅子暴乾每用一餅以葱白裹安在手足節上以手帛繋住閣在一杉木桶上用熱湯淋之候覺骨中熱極方解去帛子後㸔手足未得舒展再用熱湯淋之每一餅可用三次如用藥畢且着衣服蓋之不得透風舒筋丸出聖劑録治筋脉中風四肢拘攣不得屈伸手足無力烏頭去皮臍一兩半生半炒烏藥剉一兩牛膝酒浸切焙一兩地龍去土炒一兩赤小豆一合生用右搗羅為末鍊蜜和丸如梧桐子大每服十五丸鹽湯下不計時服之麻黄湯出仁存方治中風四肢拘攣百節疼痛心煩惡寒淅淅不欲飲食麻黄去根節先煎掠去沫焙乾一兩獨活去蘆頭一兩細辛去苖葉黄芩去黒心各半兩右麤搗篩每服五錢匕以水二盞煎至一盞去滓空心温服相去如人行五七里再服㣲汗即愈病在四肢者併服有熱加大黄二分剉如麻豆用醋炒令紫色腹滿加枳殻二分去穰麩炒氣逆加人參二分脇下悸滿加牡礪灰二分渴加𤓰蔞仁二分素有寒加附子一枚炮製去皮臍一方治中風百節疼痛有黄茋腹滿加枳實附子湯治中風語澁四肢拘攣不得屈伸身體沉重行歩艱難骨節煩疼附子炮製去皮臍桂去粗皮白术各二兩甘草炙一兩右㕮咀每服三錢以水一盞入棗二枚擘破生薑三片煎至七分去滓不計時候稍熱服如有汗出為效杜仲飲治中風筋脉攣急腰膝無力杜仲去粗皮炙一兩半芎藭一兩附子炮製去皮臍半兩右剉如麻豆大每服五錢以水二盞入生薑一棗大擘破碎煎至一盞空心温服如人行五里再服汗出慎外風杏仁飲治中風四肢攣急屈伸俯仰甚難杏仁湯退去皮尖雙仁炒半兩附子炮製去皮臍三分蜀椒去目并去閉口者炒出汗一分右剉如麻豆每服五錢匕以水二盞煎取一盞去滓空心分温二服相去如人行五里再一服以衣被葢之取汗通身差或只在夜併服之佳三聖散出百一選方大治手足拘攣口眼歪斜左癱右瘓骨節痠痛脚弱無力行歩不正一切風疾除孕婦外老㓜皆可服當歸洗炒肉桂去皮𤣥胡索灰炒並為細末各等分右為末每服二錢温酒調下臨卧日進三服除孕婦外老㓜皆可服一名舒筋散烏荆丸治風氣四肢攣搐方見諸風雜治類療暴得風四肢攣縮枯細不能行動取大豆三大升凈㨂擇淘之漉出蒸之待氣溜下甑傾二大升釅醋甑中和攪令遍於宻屋内地上鋪設席一綿帕傾豆着帕上以五六重綿衣覆豆令病人於豆上卧以被覆之若豆冷漸漸却綿衣令一人於被内引挽攣急處却綿衣盡豆冷收取更着甑中依前法蒸熱下甑復着升半酢和豆一凖前法用鋪設每一收豆作二升荆瀝湯與病人飲飢即任食日再夜一如此三日三夜即愈忌風枳茹酒治中風身體强直不得屈伸方見諸風雜治類治中風身直不得屈伸反覆者取槐皮黄白者切之以酒或水六升煮取二升去滓食温稍稍服之簡易方稀涎散治中風四肢不收涎潮膈寒氣閉不通光明晉礬一兩牙皂四條肥實不蛀者去皮弦右細末研每服一錢至二錢温水調灌下得微㣲冷涎出一二升便甦不可大吐能虚人小續命湯又有人五七年病右手筋急拘攣言語稍遲左手上二部右手下二部脉弦𦂳與小續命湯加薏苡仁一兩以治筋急减黄芩人參芍藥各半兩以避中寒杏仁只用百五粒後云尚覺太冷减前三味加當歸一兩果遂安愈同上活人書小續命湯分兩不同主治中風及脚氣痺弱不能轉側小兒慢驚水一盞半煎取藥汁一盞入生薑汁再煎一二沸日三夜二服柔痙自汗出去麻黄夏間及有熱證者减桂一半及春初加黄芩崔氏外䑓有防己龎安常小續命湯尤妙録全方於後麻黄去根節一兩氣實者全用氣虚者一半以葳靈仙代一半木香一兩不見火砂仁一兩人參去蘆一兩芎藭甘草炙一兩杏仁去皮尖炒一兩漢防己一兩桂心去粗皮一兩北防風一兩半附子炮製去皮臍半兩川烏炮三分白芍藥二兩黄芩七錢獨活一兩右㕮咀每服三錢半生薑五片棗子一枚煎至七分去滓食前温服主治半身不遂口眼歪斜手足戰掉語言蹇澁肢體麻痺神思昏亂頭目眩重痰涏壅盛筋脉拘攣屈伸轉側不便涕唾不收但是諸風服之立效豶肝丸主四肢攣縮不伸等證曽有人自㓜年酒多長而風痰酒使痰注骨節四肢不能運動服此有效茯神去心木白茯苓去皮川烏白术黄芪羌活五加皮天雄炮製薏苡仁木𤓰去皮穰半夏麯炒神麯獨活白芍藥乳香别研没藥研防風木香當歸𤣥胡索桑寄生海桐皮去粗皮荆芥穗各五分陳皮去白枳殻南星地龍去土姜黄各五分麝香右用豶猪肝一具洗凈煮存性研爛同酒麵糊為丸如梧桐子大每服三十丸温酒送下不飲酒木𤓰湯下貼藥芫花散治臂腿間忽一兩㸃痛著骨不可忍者以研芫花根剉碎研為末米醋調隨大小傅之治手足腕中風屈伸不能者洗蘸方出選竒方蒼耳三斤和子用蒴藋三斤小豆一升鹽四兩右水十升煮五升入盃内下鹽浸手足倦即更煖換之次下後藥驅風散出選竒方乾葛防風白芍藥各二分獨活四兩生薑四兩五兩亦得川當歸附子麻黄甘草各二兩右搗為末分作十貼每貼水一升半煎取半升空心服未差更服痰急加半夏旋覆花如汗加白蘚皮三服立差枸杞菖蒲酒出千金方治緩急風四肢不隨行歩不正口急及四肢不得屈伸方枸杞根一百斤菖蒲五斤右二味細切以水四石煮取一石六斗去滓釀二斛米酒熟稍稍飲之雄朱丸出經驗方治中風手足不隨麻痺疼痛神妙雄朱研朱砂研天麻大天南星炮製割凈白附子炮製白殭𧖟畧炒狼毒炮桂去粗皮取有味者不見火㯽榔南木香已上各半兩白花蛇烏蛇三味並用酒浸去皮骨取肉焙乾各二兩蝎稍一分畧炒大川烏頭水浸一宿去皮臍切片隂乾只生用一兩半麝香研龍腦研各一錢右為末鍊蜜為丸如梧桐子大每服十五丸薄荷温酒㣲嚼下腹空時服屢用此得效烏龍丸出經驗方治風手足不隨痰涎語澁烏蛇一條全煮去首尾約二寸作截子輕搥動酒浸一宿去皮骨焙乾荆芥穗薄荷葉葳靈仙只削取根上細茸温水急洗過令净不得見火只暴乾已上各四兩右為末别用大不蛀皂角一片削去黒皮搥動以長流水一斗浸宿凈揉取汁生絹濾過銀石器中慢火上熬取五分更入白沙蜜四兩再熬作稠膏與藥末拌和搗可丸即丸如梧桐子大每服十五丸至二十丸不拘時候薄荷湯下一日三服服五七日後覺手足疼痛乃是氣通血行不踰月自然平復後每日只可兩服一服趙偁戸部言其祖母服之得效治中風麻痺緩弱及風氣攻注手足不遂薰藥方出經驗方穿山甲艾葉椒目吳茱茰烏頭菵草右六味各等分搗為粗末每用先燒江上石五七塊通赤以盆器盛摻藥末一兩在石上候大烟起以好醋一大盞投石上冷熱氣手起便将所病手足於石盆上薫之仍用衣被蓋覆有汗出即拭去一二日一度便覺輕快職方郎髙士英云其祖用之得效舒筋丸治中風手足筋急開展艱難係王美傳大天南星炮製半兩杏仁湯浸去皮尖雙仁麩炒黄别研山梔子取仁畧炒各一兩川烏頭炮製半兩自然銅一兩大小燒酒内淬十數遍研細水飛過淘别硏右為末入研者再拌勻更用胡桃肉二兩湯去黄皮研爛拌勻法酒煮麵糊為丸如梧桐子大每服七丸至十丸煎葱白酒下腹空時服一日二服三五日後其身上如蟲行是效未覺即加丸數婦人血風攣却手脚服有大效治筋脉拘攣久風濕痺下氣除骨中邪氣利腸胃消水腫久服輕身益氣力右薏苡仁一升搗為末作粥空心服地榆丸治風氣攻疰四肢疼痛無力此由榮衛壅滯所致久不療漸成癱緩大川烏頭鹽炒不得過熟去皮臍尖用一兩甜參一兩地榆一兩麝香一分别研入前四味中拌令匀天麻二兩酒浸一宿焙右件為末五味同搗煉白米五兩和為丸如梧桐子大以瓷合宻封貯之每日空心食前温酒下二十丸此藥當有汗出是驗治中風四肢逆冷吐清水宛轉啼呼者出本草取桂二兩㕮咀以水三升煮取二升去滓食前温盡服治中緩風四肢不隨者出本草用豉三升水九升煮取三升分為三服日二作亦可酒漬飲之導引法養生方云手前後遞互交拓極勢三七手掌向下低頭面心氣向下至湧泉倉門却勢一時取勢散氣放縱身體平頭動復膊前後欹側柔轉二七去膊井冷血筋急漸漸如消又云兩手抱左膝生腰鼻氣内七夕展右足除難屈伸拜起脛中痛萎又云以兩手抱左膝着膺除下重難屈伸又云踞坐伸右脚兩手抱左膝頭生腰以鼻内自極七息展右足著外除難屈伸拜起脛中冷痺又云立身上下正直一手上拓仰手如似推物勢一手向下如捺物極勢上下来去換易四七去膊内風兩膊井内冷血兩腋筋脉攣急又云踞伸左脚兩手抱右膝生腰以鼻内氣自極七夕展左足着外除難屈伸拜起脛中疼痺風身體疼痛論夫風身體疼痛者由風濕搏於陽氣故也夫人陽氣虚者腠理易開而為風濕所折使陽氣不得發泄而與風濕相搏於分肉之間相繋故疼痛也診其脉浮而𦂳者則身體疼痛也方摩風神驗膏方出聖惠方治風身體疼痺頭風目眩傷風項强耳鼻俱塞硫黄硃砂雄黄俱細研人參去蘆頭當歸細辛防風去蘆頭白芷桂心乾薑芎藭川椒去目及閉口者獨活菖蒲川大黄藁本白术吳茱茰已上各三兩松脂半斤後入附子生去皮臍天雄生去皮臍已上各四兩右細剉以酒浸一時然後别取生地黄半斤搗絞取汁同入猪脂中以慢火煎之取藥味盡為度以綿濾去滓後下松脂雄黄硃砂等藥以栁枝不住手攪至膏凝取於瓷合中病在内即以酒服彈子大病在外即取彈子大熱炙手摩之即效麻黄煎丸治一切風手足不隨遍身疼痛語澁精神恍惚及偏枯丹砂研天南星炮製附子炮去皮臍桂心去粗皮羌活去蘆頭芎藭白蘚皮海桐皮剉當歸切焙防己鉛白霜硏膩粉研麝香研已上各一兩自然銅煆醋淬乾蝎去土炒虎脛骨酥塗炙烏蛇酒浸去皮骨焙天麻已上各二兩麻黄去根節一斤右除研者外為細末再研令勻用醇酒五升煮麻黄二升去麻黄不用入蜜四兩於熬稠餳和藥成劑丸鷄頭大每服一丸攤緩暗風四肢不隨筋骨疼痛葱白豆淋酒嚼下驚風搐弱口角垂涎語澁神昏薄荷汁同温酒化下破傷風用多年槐木煎取濃湯同温酒化下如牙關𦂳急不開即研藥如泥用葱葉於鼻中灌之即開錫麟脂丸治男子婦人痛風錫麟脂防風沒藥天南星炮赤小豆炒白殭蠶白附子破故紙炒川萆薢五靈脂胡蘆巴白膠酒各一兩天雄一雙炮去皮臍附子一雙重六錢者炮去皮臍草烏頭二兩炮去皮臍乳香半兩糯米三合骨碎補四兩去毛自然銅二兩用錫麟脂入乾鍋内火煆一時醋淬右為細末用無灰酒糊為丸如梧桐子大每服二三十丸更量虚實加减胡桃酒送下空心服大治諸風神效竺叅議操𫝊云韓宗愈子友仁苦癱瘓服藥踰年不效得此方初服便覺稍减服至一料遂能行履韓宗常以醫數人皆有效也至聖丸治風氣身體疼痛筋脉拘急手足􅍙麻睡卧多涎及丹田虚冷附子炮去皮臍牛膝去苖酒浸焙乾海桐皮剉肉蓯蓉酒浸切焙防風去义萆薢狗脊黒者去毛黄茋剉蒺蔾子炒葳靈仙續斷蘹香子舶上者炒木香各一兩骨碎補四兩乳香研沒藥研各半兩木鼈子去殻二兩右除研者外為細末再同和勻以酒煮麵糊丸如梧桐子大每服二十丸空心嚼木𤓰酒下虎骨散出聖劑總録治風身體疼痛或手足􅍙痺腰股沉重牽曵不隨虎骨敗龜俱酥塗炙黄生地黄焙已上各二兩羌活去蘆頭一兩芍藥蠶沙醋炒何首烏去黒皮各一兩一分芎藭二兩半延胡索一兩附子炮去皮臍一兩當歸剉焙㯽榔剉各一兩半牛膝酒浸切焙白芷秦艽去苖土葳靈仙去土各五分皂莢子炒二兩右為細散每服空心以温酒調下三錢匕日三服如不飲酒用童子小便一盞半薄荷一握生薑少許同煎至一盞去滓温服獨活散出聖惠方治身體疼痛腰背拘急獨活防風去蘆頭桂心芎藭人參去蘆頭白术茵芋海桐皮剉枳殻麩炒㣲黄去穣甘草炙㣲赤剉已上各半兩附子炮製去皮臍麻黄去根節赤茯苓牛膝去苖各三分薏苡仁一兩右為散每服三錢以水一中盞入生薑半分煎至六分去滓不拘時候温服忌生冷油膩毒魚滑物茵芋散出聖惠方治風身體疼痛肢節不利羌活肉桂去粗皮海桐皮芎藭狗脊茵芋牛膝去苖松節蒼耳子㣲炒當歸防風去蘆木香已上各一兩附子二兩炮去皮臍麝香一分研右為散入研了藥令匀不拘時候以温酒調下二錢如不飲酒荆芥薄荷湯下亦得忌生冷油膩猪鷄犬肉羌活湯出聖劑總録治風身體疼痛筋脉拘急行榮衛除風濕羌活去蘆頭地骨皮各三兩桂去粗皮黄連去鬚一兩白术一兩麻黄去節各一兩半羚羊角鎊一兩芎藭一兩半當歸焙一兩半附子炮去皮臍甘草炙各一兩桑根白皮二兩木香各一兩右剉如麻豆每服五錢匕以水一盞半入生薑五片煎取八分去滓温服不拘時候芎藭散出聖惠方治風身體疼痛頭目昏重芎藭麻黄去根節當歸赤芍藥已上各三分防風去蘆頭枳殻麩炒㣲黄去穰白术桂心天雄炮去皮臍蔓荆子甘草炙㣲赤剉藁本已上各半兩右為散每服三錢以水一鍾入生薑半分煎至六分去滓不拘時候温服防風散出聖惠方治風身體疼痛轉側不得防風去蘆頭羌活當歸芎藭肉桂去粗皮各二分薏苡仁仙靈脾附子炮去皮臍牛膝去苖骨碎補各一兩細辛枳實炮㣲黄半兩右為散每服三錢以水一中盞煎至六分去滓不拘時候稍熱服乳靈丸出危氏方治痛風數年不能舉動日夜呻吟不數圓大效川烏去皮生用半兩生乾地黄酒浸一宿一兩木香不見火二錢半草烏頭小者去皮臍鹽炒半兩去鹽五靈脂煉去沙石㣲炒一兩乾木𤓰酸明者二兩虎脛骨一兩酥塗火炙存性自然銅火煆七次米醋淬七次别研一兩麻黄去根節㣲炒去汗一兩敗龜乃江浙間卜筮鑽過下截龜殻米醋浸三日炙黄色再用醋淬七錢半滴乳香好者和燈心研末二錢半去燈心右研細如粉蜜煉去白沫為丸如龍眼大每一兩重作十二丸以帶皮生薑自然汁化開一丸熱酒服更以酒半盞送下病在下空心食前服病在上食後少停少時服一日二服口有少麻勿疑附子散出聖惠方治風身體疼痛四肢懈惰附子炮製去皮臍一兩五加皮麻黄去根節獨活當歸秦艽去苖赤茯苓芎藭桂心萆薢剉枳殻麩炒㣲黄已上各三分右為散每服三錢以水一中盞入生薑半分煎至六分去滓不拘時候温服忌生冷油膩毒滑魚物靈效丸出百一選方治男子婦人痛風錫靈脂乾鍋内煆通紅白膠香眀凈者研五靈脂如歴青成塊者當歸凈洗去蘆草烏頭去尖白附子香白芷没藥糯米炒黄桑柴灰須是純桑木他木不可雜各一兩右為細末糯米糊為丸如梧桐子大每服三四十丸空心温酒下羚羊角散出聖惠方治風身體疼痛筋脉拘急不可俯仰羚羊角屑一兩羌活赤茯苓薏苡仁防風去蘆當歸赤芍藥芎藭桂心已上各三分㯽榔半兩右為散每服四錢以水一大盞煎至六分去滓不計時温服虎骨丸出聖劑總録治一切風遍身疼痛脚膝少力虎脛骨酥塗炙黄六兩烏頭炮製去皮臍海桐皮剉芎藭天南星炮天麻各一兩白花蛇酒浸去皮骨炙牛膝去苗酒浸一宿焙乾蒺蔾子炒去角各三兩右為細末鍊蜜丸梧桐子大每服温酒下二十丸地龍丸出聖劑總録治風身體疼痛地龍炒一分甜𤓰子炒半兩乳香研一錢骨碎補赤芍藥五靈脂當歸切炒各半兩沒藥研一分自然銅燒醋淬研二兩右除研者外為細末再和匀酒煮糊丸如梧桐子大每服十丸空心臨卧温酒下祛風丸出聖劑總録治風身體疼痛沒藥研木鼈子各一兩防風去义半兩乳香研一分血竭硏半兩荆芥穗半兩五靈脂二兩半青橘皮湯浸去皮焙一兩烏頭炮製去皮臍一兩半右除研者外為細末再和匀用醇酒熬成膏丸如鷄頭實大熱酒化下一丸萆薢散出聖劑總録治風身筋骨疼痛萆薢牛膝酒浸切焙蒺藜子炒去角枸杞子惡實秦艽去苗土羌活去蘆頭當歸切焙桂心去粗皮各等分右為散每服二錢匕嚼少胡桃仁熱酒調下痛急者再服一服痛止者更可五服骨疼者飯後服脚膝及腹内痛者空心服之五加皮散出聖惠方治風氣壅滯身體疼痛五加皮羌活丹參赤芍藥羚羊角屑㯽榔已上各三分枳殻麩炒㣲赤去穰防風去蘆頭桂心各半兩右為散每服四錢以水一中盞煎至六分去滓不拘時候稍熱服沒藥丸出聖劑總録治諸風筋骨及遍身疼痛没藥研乳香研各二錢地龍去土半兩甜𤓰子一分骨碎補五靈脂各半兩自然銅醋淬研一兩乾蝎去土炒一分右除研者外為細末再和勻醋煮麵糊丸如梧桐子大每服五丸加至七丸温酒下羌活湯出千金方治中風身體疼痛四肢緩弱不遂及産後中風宜服之方見柔風類没藥丸出聖劑總録治風身體疼痛腰脚無力没藥研半兩荆芥一百穗草烏頭生去皮臍擘開一兩以黒豆同炒令黄色㨂去豆蒼术米泔浸刮去皮二兩虎骨酥塗炙黄一兩乳香瓷盞内鎔過研麒麟竭各半兩右除研者外為細末再合研勻酒煮麵糊丸如小豆大每服五丸温酒下如疼痛甚者用猪羊筒骨髓并鹽各少許同前熱酒下空心日中臨卧日三應痛丸出聖劑總録治風身體疼痛烏頭炮製去皮臍草烏頭剉炒黒楓脂香研赤小豆天南星炮葳靈仙去土地龍去土各半兩右除研者外為細末再同和勻用醋煮麵糊丸如梧桐子大每服冷酒下十丸没藥丸出聖劑總録治風氣身體疼痛狀如繋縳沒藥研一分骨碎補葳靈仙各二兩草豆蔲去皮一兩半夏湯洗七次焙自然銅燒醋淬七次研各一兩地龍去土炒三分右除研者外為細末飯丸如梧桐子大空心温酒下三五丸海桐皮丸出聖劑總録治一切風冷身體手足疼痛海桐皮剉防風去义牛膝酒浸切焙羌活去蘆各半兩大附子剉三枚郁李仁去皮尖雙仁炒硏一分蒴藋葉一束搗取汁一升右除蒴藋汁外為末先以蒴藋汁同酒一升熬成膏入藥末搜和為丸梧桐子大每服空腹温酒下三十丸通氣防風散一名羌活勝濕湯治肩背痛不可回顧者此手太陽氣鬰而不行以風藥散之脊痛項强腰似折項似㧞此是太陽經不行以通氣防風散主之方見諸風雜治類露蜂房淋蘸方出聖惠方治風手足疼痛皮膚瘙痒露蜂房水葓茵芋附子生去皮臍各二兩蒴藋川椒各一兩去目右細剉以水五斗煎至二斗去滓淋蘸疼痛䖏應正丸出聖劑總録治風氣身體疼痛血脉凝滯手足無力熟乾地黄焙一兩烏藥甜𤓰子各二兩乳香沒藥研各半兩右除研者外為細末再同和勻酒煮麵糊丸如梧桐子大空心食前温酒或荆芥湯下二十丸麝香丸出聖劑總録治風身體疼痛頭目不利肩背拘急肌肉􅍙痺痰涎壅滯胸膈滿悶麝香研半兩秦艽去土四兩獨活去蘆頭白术㯽榔已上各二兩右除麝香外為細末入麝香研勻鍊蜜和杵千百下丸如龍眼大每服一丸細嚼温酒或臘茶清下不拘時候葳靈仙丸出聖劑總録治風身體疼痛葳靈仙擇三兩乳香研一分楓香脂研三分五靈脂研一兩草烏頭炒黑三分右除研者外為細末再和勻鍊蜜丸如鷄頭實大每服一丸生木𤓰一片同嚼爛温酒下兼治大風疾黒神丸出聖劑總録治風身體疼痛草烏頭炒令黑存性五兩地龍去土瓦上炮過一兩五靈脂半兩麝香研一分右除研者外為末再和勻醋煮麵糊丸如菉豆大每服十丸温酒下治風痛方天南星蒴藋花一名躑躅花右並生地同搗和作餅子甑上蒸四五遍以稀葛嚢盛之候要則取焙為末蒸餅丸如梧子大温酒下五丸腰脚骨痛空心服手臂痛食後服大良治渾身風痛艱難舉動不得者用松根露泥半出者佳同煮酒二盞煎至八分温服服後患人自覺身手脚尖颼颼顫痒日進三服十餘日内即便除去病根虎骨酒出千金方治骨髓疼痛風經五臟男女皆可服用虎骨一具炭火炙令黄色搥刮取凈搗碎得數升清酒六升於磁瓶中浸密封春夏七日秋冬二七日夜開取浸五宿隨性多少稍飲之易曰虎嘯風生龍吟雲起此亦有情與無情相感治風之效故亦無疑一方治厯節風塗酥炙黄用骨碎補丸出和劑方治肝腎風虚上攻下疰筋脉拘攣骨節疼痛頭面浮腫手臂少力腰背强痛脚膝緩弱屈伸不利行履艱難並宜服之荆芥穗白附子炮牛膝酒浸炮乾肉蓯蓉酒浸一箇切作片焙骨碎補去毛炒葳靈仙去苗􅒦砂仁各半兩地龍去土㣲炒沒藥各一錢半自然銅醋浸九遍草烏頭炮去皮臍半夏湯洗七次各半兩右為細末酒煮麵糊丸如桐子大每服五丸至七丸温酒下婦人醋湯或當歸酒下姙娠不宜服之不拘時候治一切腫痛風病以刺虎根葉枝幹細剉焙乾搗羅為末暖酒調服一錢治丈夫冷氣及筋骨疼痛用麋角作粉常服又於漿水中研為泥塗面令不皺光華可愛又常惹人以皮作鞾薰脚氣天麻飲子出衛生家寳治氣血不足正氣與風邪相搏渾身臂膊疼痛潮熱往来倦怠心間煩躁恍惚不寧血虚難以發散不禁凉藥此藥調血退熱解勞倦進飲食輕健四肢天麻酒浸防風去蘆當歸洗淨去蘆酒浸川芎羌活葳靈仙酒浸五加皮白芍藥炒各一兩肉桂去粗皮不見火木香不見火酸棗仁㣲炒去皮犀角屑已上各半兩海桐皮酒浸人參去蘆白术乾葛細辛去苗洗甘草炙已上各三分右為粗末每服三錢水一盞生薑二片煎至七分去滓熱服不拘時候治吹手足出經驗方睡中風吹手足或痠或疼或腫用炒熱鹽徐徐熨之微有汗出即愈余来武昌舟中睡着為風所吹右臂痠腫稍人云用鹽熨之兩日而愈也鐵彈丸出儒門地龍去土木鼈防風白芷白膠香五靈脂没藥當歸已上各一兩細蜜三錢乳香别研二錢草烏頭水浸炮用一兩麝香另研二錢右為末糯米粥丸彈子大每服一丸生薑酒下治項急身中急痛者出本草方見本門中風類活鼠方除風痛出汗出本草用桑葉煎汁服之治風濕煩疼日晡劇者與麻黄杏仁薏苡仁湯出本草麻黄三兩杏仁三十枚甘草薏苡仁各一兩右四物以水四升煮取二升分温再服普濟方卷九十七
