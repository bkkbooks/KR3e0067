body:
  text: 普濟方卷二百三十四明周王朱橚撰虛勞門虛勞心腹痞滿附論夫虛勞之人氣弱血虛榮衛不足復為寒邪所乘食飲入胃不能傳化停積於內故中氣痞塞胃脹不通使人心腹痞滿也方參苓煮散治虛勞心腹痞滿不思飲食胸膈不利人參白茯苓去黑皮丁香木香桂去粗皮益智去皮青橘皮湯浸去白焙芎藭蓬莪茂銼乾薑炮附子炮製去皮臍各半兩逺志去心白术厚朴去粗皮臍各半兩黃蓍銼炒半夏湯浸二遍用生薑汁製當歸切焙荆三稜炮銼陳麯炒麥蘖炒各一兩肉豆蔲去殼檳榔銼訶梨勒煨去核各五枚右為散每服三錢入鹽少許水一盞煎至七分去滓溫服乾地黃丸出千金方治虛血勞胸腹煩滿疼痛瘀血往來臟虛不受穀氣逆不得食補中理虛乾地黃三兩當歸乾薑麥門冬甘草黃芩各二兩厚朴枳實防風大黃細辛白术各一兩茯苓五兩前胡六分人參虻蟲蟅蟲各五十枚乾漆一兩右為末蜜和丸如梧桐子大先服十丸日三稍加訶梨勒湯出聖惠方治虛心勞腹痞滿脅肋妨悶不思飲食訶黎勒煨去核赤茯苓去黑皮陳橘皮湯浸去白焙前胡去蘆頭各一兩白术紫蘇葉黃蓍銼人參檳榔銼草豆蔲去皮各三分桔梗炒木香甘草炙銼桂去粗皮各半兩右為散每服三錢水一盞入生薑一分切碎煎至七分去滓溫服木香煮散治虛勞冷氣心腹痞悶腸鳴腹痛飲食減少木香白术縮砂去皮益智去皮藿香用葉人參各一兩丁香半兩陳橘皮湯浸去白焙青橘皮湯浸去白焙各四兩桔梗炒三兩桂去粗皮厚朴去粗皮生薑汁炙各二兩髙良薑一分甘草炙銼半兩右為散每服三錢水一盞入生薑三片棗二枚擘破煎至七分和滓稍熱服如不及煎入鹽少許加湯點服木香散出聖惠方治虛勞冷氣不和氣攻心腹痞滿不思飲食木香半兩訶黎勒一兩煨用皮人參去蘆頭桂心白术荆三稜炮銼芎藭檳榔赤茯苓桔梗去蘆頭枳實各三分麩炒微黃陳橘皮湯浸去白瓤焙一兩吳茱茰湯浸七遍焙乾微炒甘草各一分炙微赤銼右為散每服三錢水一中盞煎至六分去滓不計時候溫服人參煮散治虛勞心胸痞悶腹脅虛脹補虛進飲食人參去粗皮陳橘皮湯浸去白焙鱉甲去裙襴醋炙各一兩附子炮製去皮臍縮砂蜜去皮桂去粗皮乾薑炮柴胡去苖桔梗略炒當歸各三分切焙五味子甘草銼炒各半兩右為散每服三錢水一盞入生薑二片鹽少許同煎至七分去滓溫服每日空心午前日晚各一茵蔯煎丸治虛勞下焦虛冷心腹痞滿喫食無味舌澀口乾四肢少力健脾胃茵蔯蒿三兩搗為末用醋一升煎為膏鱉甲去裙襴醋浸炙令黃色荆三稜煨杵碎各一兩附子炮製去皮臍枳殼去穰麩炒桂去粗皮青橘皮湯浸去白焙各半兩柴胡去苗一兩白术半兩厚朴去粗皮生薑汁塗炙吳茱茰水浸一宿焙乾炒各一兩乾薑炮製半兩右除茵蔯外搗羅為末用茵蔯煎和為丸如梧桐子大每日空心生薑湯下三十丸如和不成更入熱蜜半夏散治虛勞心腹痞滿胸膈壅悶不思飲食半夏湯洗七遍去滑鱉甲塗醋炙令黃去裙襴白术人參去蘆頭黃蓍銼赤茯苓各一兩桔梗去蘆頭甘草微炒銼木香各半兩桂心前胡去蘆頭陳橘皮各一兩湯浸去白瓤焙右為散每服三錢以水一中盞入薑半分棗三枚煎至六分去滓不計時候稍熱服忌生冷油膩莧菜厚朴丸出聖惠方治虛勞冷氣心腹痞滿四肢少力不欲飲食厚朴去粗皮塗生薑汁炙令香熟一兩木香半兩桂心附子各三分炮製去皮臍人參半兩去蘆頭黃蓍三分陳橘皮湯浸去白瓤焙訶梨勒煨用皮白术草豆蔲各一兩去皮乾薑炮製銼當歸右為末煉蜜搗和二三百杵丸如梧桐子大每食前生薑湯下三十丸白术丸出聖惠方治虛勞冷氣心腹痞滿不思飲食四肢少力疼痛白术人參當歸各三分去蘆頭桂心附子各一兩炮製去皮臍木香三分桔梗去蘆頭陳橘皮湯浸去白穰焙訶梨勒煨用皮石斛去根銼黃蓍各一兩銼吳茱茰半兩湯浸七遍焙乾微炒右為末煉蜜和搗二三百杵丸如梧桐子大每服食前以溫酒下三十丸草豆䓻丸出聖惠方治虛勞心腹痞滿脅下妨悶不思飲食草豆蔲一兩去皮木香半兩當歸三分前胡去蘆頭人參去蘆頭檳榔白术訶梨勒各一兩煨皮焙赤茯苓桂心陳橘皮湯浸去白穰焙右為末煉蜜和搗三二百杵丸如梧桐子大每服食前以生薑湯下三十丸桔梗散出聖惠方治虛勞心腹痞滿不思飲食胸膈不利桔梗去蘆頭陳橘皮湯浸去白穰焙人參去蘆頭赤茯苓厚朴去粗皮塗生薑汁炙令香熟木香前胡各一兩去蘆頭杏仁湯浸去皮尖雙仁麩炒微黃甘草各半兩炙微赤銼右為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服木香散出聖惠方治虛勞心腹痞滿氣攻兩脅滿痛不思飲食木香檳榔桂心各半兩青橘皮湯浸去白穰焙當歸白术各三分訶梨勒煨用皮柴胡去苖鱉甲各一兩塗醋炙令微黃去裙襴右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服忌生冷油膩莧菜等訶梨勒丸出聖惠方治虛勞心腹痞滿脅不時痛不思飲食訶梨勒煨用皮厚朴去粗皮塗生薑汁炙令香熟檳榔白术人參桂心各一兩乾薑炮製銼吳茱茰各半兩湯浸七遍焙乾微炒當歸三分右為末煉蜜和搗三二百杵丸如梧桐子大每於食前以生薑湯下三十丸蓽澄茄丸治虛勞冷氣上衝心腹痞滿腹鳴相逐或多刺痛嘔噦膨脹蓽澄茄沉香丁香木香蘹香子舶上者炒各半兩烏藥銼一兩白芷葫蘆巴炒三分右為末煉蜜為丸彈子大每服一丸生薑湯嚼下前胡丸治虛勞胸膈痞悶氣逆煩滿脅肋虛脹前胡去蘆頭人參白茯苓去黑皮陳橘皮湯浸去白穰桂去粗皮白术各一兩半杏仁去皮尖雙仁入麩炒研檳榔銼各二兩右為末煉蜜丸如梧桐子大每服二十丸溫酒下日二黃蓍建中湯一名黃蓍湯療虛勞腹滿食少小便多方見本門虛勞裏急類建中丸治虛勞脾胃冷弱心腹痞滿不思飲食四肢怠墮補虛調胃人參白术厚朴去粗皮薑汁炙乾薑炮陳橘皮湯浸去白焙枳殼去穰麩炒各半兩訶梨勒三枚炮取皮右為末以煮棗肉和丸如梧桐子大每服二十丸薑橘皮湯下不拘時候柴胡飲一名苖竒湯治虛心腹痞滿不思飲食方見本門虛勞羸瘦類柴胡湯治虛勞氣逆心腹痞滿四肢羸瘦腹脹不下食柴胡去苖三兩枳殼去穰麩炒二兩白茯苓去黑皮二兩白术二兩人參一兩麥門冬去心焙一兩右粗搗篩每服三錢水一盞入生薑半分拍碎煎至七分去滓空腹溫服日午夜卧各一白术散出聖惠方治虛勞冷氣心腹痞滿不思飲食四肢少力白术訶梨勒煨用皮陳橘皮湯浸去白穰焙草豆蔲各一兩去皮人參去蘆頭桂心各三兩右為散每服四錢以水一盞入生薑半分棗三枚煎至六分去滓不拘時稍熱服虛勞積聚附論夫氣之所積名曰積其本在臟隂所生也氣之所聚名曰聚其夲在腑陽之所生也臟病無止而不移腑病無所留結是為積聚虛勞之人隂陽傷損血氣澀滯不能宣通各隨其腑臟之氣而留結故成積聚之病也方大鱉甲丸治虛勞積聚心腹脹滿喘促氣逆面色萎黃痰嗽心怯不思飲食鱉甲一枚重二兩去裙襴醋炙柴胡去苖大黃濕紙裹煨熟乾地黃焙烏梅去核炒桃仁湯浸去皮尖雙仁炒各一兩乾薑炮檳榔銼木香人參白茯苓去黑皮芎藭桂去粗皮紫苑去苖土芍藥牛膝酒浸切焙知母焙荆三稜炮銼五味子白术黃連去粗皮薑汁炙厚朴黃芩去黑心陳橘皮湯浸去白焙枳殼去穰麩炒當歸切焙各半兩右為末煉蜜和丸如梧桐子大每服二十丸三十丸溫酒下日三補真丸治冷勞心腹積聚羸瘦盜汗不思飲食腹脹下痢四肢無力厚朴炮製去皮薑汁炙蒼术去皮米泔浸切焙各四兩陳橘皮湯浸去白焙石斛去根附子炮製去皮臍柴胡去苖人參白茯苓去黑皮沉香各二兩丁香鱉甲去裙襴醋炙肉蓯蓉酒浸去皴皮切焙木香巴戟天去心當歸切焙草豆蔲去皮桂去粗皮訶梨勒炮去核五味子檳榔銼山茱茰杜仲去粗皮炙銼黃蓍銼三兩補骨脂炒各一兩吳茱茰半兩湯浸洗三遍焙乾炒右為末煮棗肉和丸如梧桐子大每服二十丸米飲下日三烏頭丸治虛勞心腹積聚及百病邪氣往來搶心羸瘦不能食破積聚並冝服之烏頭炮製去皮臍一兩前胡去蘆頭黃芩去黑皮蜀椒去目并閉口者炒出汗白頭翁水洗五遍焙甘草炙銼龍骨研半夏湯浸去骨焙黃連去鬚吳茱茰水洗五遍焙白术細辛去苖葉紫苑去苖土桔梗乾薑炮萎蕤芎藭厚朴去粗皮薑汁炙礬石燒令汁盡人參桂去粗皮生薑切焙各半兩右為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下日午臨卧再服靈感丸治虛勞積聚腹脅堅滿男子婦人一切風勞冷氣頭旋眼疼手腳􅍙痺血風勞氣攻擊五臟四肢筋脈掉動面上習習似蟲行遍生瘡癬心膈煩悶腹疼虛鳴腰痛膝冷手足或熱諸氣刺痛嘔逆醋心胃閟澀肺氣發動耳復虛鳴腳膝無力仍治婦人諸病冷血勞氣髮損靣黃氣刺心腹骨節痠疼經年不調經年逾月或下過多不定兼治冷熱諸痢腳氣水腫等柴胡去苖防風去叉紫苑去苖土當歸切焙赤茯苓去黑皮乾薑炮製桔梗炒菖蒲烏頭炮裂去皮臍厚朴去粗皮塗生薑汁炙大黃吳茱茰湯浸焙乾皂莢去皮子酥炙蜀椒去目并閉口炒出汗陳橘皮去白炒郁李仁别研黃連去鬚炒巴豆各半兩去油研人參半兩右為末煉蜜和丸如梧桐子大每服空心酒飲任下五丸取微利為度如風冷氣人長服此藥最佳又宜夜服天通丸治虛勞心腹積聚脅下刺痛肌體羸瘦不欲飲食及八風十二痺氣血不榮久服身體潤澤熟乾地黃焙半兩天門冬去心焙白术銼乾薑炮當歸切焙石斛去根甘草炙銼肉蓯蓉酒浸去皴皮切焙芍藥人參大黃炙銼紫苑洗各一兩半白茯苓防風去乂麻仁生研各三分白芷半兩蜀椒去月及閉口炒出汗一兩杏仁三分湯浸去皮尖雙仁炒右為末煉蜜煮棗肉和丸如梧桐子大每服二十丸米飲下日三狼毒丸治虛勞積聚腹中堅硬氣脹喘急狼毒二兩半醋浸尖肉桂二兩去皺皮川烏頭半兩去皮臍醋拌炒荆三稜一兩炮銼紫苑三分洗去苖土附子一兩炮製去皮臍川大黃二兩半銼碎微炒鱉甲二兩塗醋炙微黃去裙襴甜葶藶三分隔紙炒令紫色檳榔二兩鮀甲炙桃仁二兩湯浸去皮尖雙仁麩炒微黃木香各一兩芫花半兩醋拌炒令乾吳茱茰湯浸七遍焙乾微炒該一兩皂莢三分湯浸去皮塗酥炙黃焦去子右為末煉蜜和搗三五百杵丸如梧桐子大每服空心溫酒下十丸忌莧菜濕麵生冷鱉甲散治虛勞積聚或心腹疼痛四肢羸瘦小便赤不能飲食鱉甲二兩酥醋炙微黃去裙襴厚朴一兩去粗皮塗生薑汁炙令香熟木香檳榔各三分神麴二兩搗碎微炒荆三稜一兩炮銼川大黃二兩銼碎微炒芎藭桃仁湯浸去皮尖雙仁麩炒微黃青橘皮各三分湯浸去白穰焙桂心當歸半兩麥蘖各一兩炒微黃赤芍藥一兩柴胡一兩半去苖右為散每服四錢以水一中盞入生薑半分煎至六分去滓食前稍熱服忌莧菜生冷橘皮丸治脾腎虛勞心腹積聚面色萎黃不思飲食胸膈悶滿青橘皮二兩麩炒黃搗羅為末醋一盞半於銀石器內文武火熬成膏木香桂去粗皮用人參訶梨勒皮炒荆三稜炒銼藿香去莖厚朴去粗皮薑汁炙當歸切焙萆􅐺乾薑炮各半兩半夏一分湯洗十遍焙右搗羅十一味為末入橘皮煎內搗三二百杵丸如梧桐子大每服二十丸空心日午溫米飲下青金煮散治虛勞積聚不消心腹煩悶脾胃氣滯不思飲食青橘皮湯浸去白焙白术木香薑黃檳榔銼郁李仁湯浸去皮炒楝實銼炒蘹香子人參益智去皮炒赤茯苓去黑皮白牽牛微炒各兩半右為散每服二錢