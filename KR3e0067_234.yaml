鱉甲一兩别搗羅為末乾漆搗碎炒令煙出附子炮製去皮臍荆三稜炮銼川大黃各一兩銼碎炒過木香半兩右為末先將鱉甲末以頭醋三升煎令稠後入諸藥末和搗二三百杵丸如梧桐子大每服空心及晚食前以溫酒下十丸忌莧菜生冷三神煎出聖惠方治虛勞癥瘕結塊不消者桃仁一千二百粒湯浸去皮尖雙仁研旋以水濾取濃汁五升已來荆三稜二兩炮銼鱉甲三兩塗醋炙微黃去裙襴右除桃仁外搗羅為末於鐺中先煎桃仁汁耗一半下二味藥末以木箆不住手攪煎良久又下好酒三味煎如稀餳收磁器中盛每日空心晚食前以熱酒一中盞調下一茶匙忌莧菜生冷濕麵虛勞浮腫附論夫腎氣不化則二隂不通故小便不利胃氣不足則肌肉開踈故皮膚浮腫脬者土也皮虛既不能制水腎者胃之關也關閉不利以水氣流溢於皮膚為脬腫也方人參湯治虛勞四肢發腫飲食不進百莭無力多卧少起人參赤茯苓去黑皮桑根白皮炒銼芍藥秦芁去苖土半夏湯浸去滑七遍各一兩鱉甲去裙襴醋炙三兩柴胡土苖大腹皮炮木香各一兩荆三稜醋浸炮搗碎二兩甘草炙銼枳殼去穰麩炒一分右粗搗篩每服三錢水一盞入生薑三片棗二枚同煎至五分去滓溫服不拘時候郁李仁散出聖惠方治虛勞通體洪滿腹堅脹喘急不能飲食郁李仁湯浸去白皮尖微炒川大黃各一兩銼碎微炒柴胡土苖澤㵼赤芍藥豬苓各三分去黑皮杏仁湯浸半兩去皮尖雙仁麩炒微黃桑根白皮三分銼鱉甲一兩塗醋炙令黃去裙襴赤茯苓半兩桔梗去蘆頭麻黃各三分去根莭右為散每服三錢以水一盞入生薑半分煎至六分去滓不計時候溫服五味子湯治虛勞四肢浮腫氣急大小便不利坐卧不安五味子炒黃蓍銼枳殼去穰麩炒大腹微煨銼桑根白皮炙銼桂去粗皮檳榔煨白术陳橘皮各一兩湯浸去白炒厚朴去粗皮生薑汁炙熟防己各一兩半右粗搗篩每服三錢水一盞半煎至七分去滓空心溫服日晚再服微利即止漢防己散出聖惠方治虛勞四肢浮腫喘息促小便不利坐卧不安漢防己豬苓各三分去黑皮海蛤木通各一兩銼陳橘皮一兩湯浸去白穰焙木香白术各半兩桑根白皮銼赤茯苓各三分紫蘇莖葉檳榔各一兩右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服前胡丸出聖惠方治虛勞四肢浮腫心胸滿悶不欲飲食前胡一兩去蘆頭旋覆花半兩人參三分去蘆頭檳榔一兩木香陳橘皮各半兩湯浸去白穰焙訶梨勒皮一兩赤茯苓桑根白皮各三分銼桂心半兩郁李仁一兩湯浸去皮尖微炒右為末煉蜜和搗三二百杵丸如梧桐子大每服煎薑棗湯下三十丸日三服大腹皮湯治虛勞身體浮腫上氣喘促小便不利大腹皮銼檳榔煨銼前胡去蘆頭赤茯苓去黑皮防己陳橘皮湯浸去白焙赤芍藥各一兩甘草半兩炙銼桑根白皮銼木通各二兩銼右粗搗篩每服三錢水一盞煎至五分去滓溫服日二桑白皮湯治虛勞脾氣弱水液妄行四肢浮腫小便不利桑根白皮炙銼豬苓去黑皮滑石碎木通銼郁李仁湯浸去皮尖炒赤茯苓去黑皮各一兩半陳橘皮湯浸去白半兩檳榔微煨三枚澤㵼三分右粗搗篩每服五錢水一盞半煎至一盞去滓溫服細辛散治虛勞心胸壅悶喘促四肢浮腫細辛半兩枳殼三分麩炒微黃去穰漢防己桂心各半兩黃蓍一兩銼白术赤茯苓赤芍藥各三分當歸半兩右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服木香散出聖惠方治虛勞損臍下痛抽腎入腹四肢浮腫木香五加皮各一兩松莭二兩銼桑根白皮一兩銼薏苡仁三分檳榔桃仁各一兩湯浸去皮尖雙仁麩炒陳橘皮三分湯浸去白穰微炒郁李仁一兩湯浸去皮尖微炒右為散每服三錢以水一中盞煎至六分去滓不計時候稍熱服陳橘皮丸出聖惠方治虛勞心胸壅悶喘促大小便不利四肢浮腫陳橘皮二兩湯浸去白穰焙紫蘇子三分微炒漢防己甘遂各半兩煨微黃桑根白皮銼甜葶藶隔紙炒令紫黃赤茯苓木通各一兩銼郁李仁一兩湯浸去皮尖微炒右為末煉蜜和搗三二百杵丸如梧桐子大每服空心及晚食前以薑棗湯下二十丸赤茯苓湯治虛勞遍身浮腫心腹氣脹大小便澀赤茯苓去黑皮防己檳榔煨銼桑根白皮銼甜葶藶隔紙炒令紫色木通銼陳橘皮湯浸去白穰焙郁李仁湯浸去皮炒各一兩右粗搗篩每服三錢水一盞半煎至七分去滓食前溫服以大小便利為度人參湯治虛勞却氣臍腹及面目浮腫人參一兩鱉甲醋浸去裙襴炙黃二兩柴胡去苖當歸切焙枳殼去穰麩炒用甘草炙銼各一兩白檳榔一枚銼桃仁七十枚湯浸去皮尖别研右粗搗篩每服三錢童子小便一盞浸一宿平旦煎至七分去滓空心溫服若女人病加牛膝一兩防己丸治虛勞脾腎不足身面浮腫卧即脹滿喘痰嗽胸膈痞悶大小便不利漸成水氣防己一兩半杏仁去皮尖雙仁麩炒三分赤茯苓去黑皮郁李仁湯浸去皮尖麩炒紫蘇葉各一兩苦葶藶炒香三兩一分陳橘皮湯浸去白焙一兩右為末煉蜜和丸如梧桐子大空心食前溫酒下三十丸麻仁散出聖惠方治虛勞四肢浮腫大麻仁商陸防風去蘆頭附子炮製去皮臍陳橘皮湯浸去白穰焙漢防己各一兩右為末每服五錢以水一大盞入赤小豆一百粒煎至五分去滓食前溫服虛勞目暗附論夫肝候於目而臟於血血為榮養於五臟今臟腑已有勞傷則血氣俱虛五臟既虛則不能榮養於目故令昏暗也方還睛丸出聖惠方治虛勞目暗兔絲子一兩酒浸三日曝乾别搗為末真粉三分細研逺志去心防風去蘆頭蔓荆子車前子各半兩石斛去根銼白茯苓各一兩玄參人參去蘆頭木香決明子地膚子蕤仁湯浸去赤皮芎藭羌活羚羊角屑各半兩熟乾地黃一兩枸杞子半兩牛膝一兩去苖薯蕷甘菊花黃蓍銼地骨皮各半兩覆盆子三分兔肝二兩炙微黃右為末煉蜜和搗三五百杵丸如梧桐子大每服食前以溫酒下三十丸粥飲下亦得忌熱麵葷辛生冷羚羊角丸出聖惠方治虛勞乏弱四肢無力頭目昏暗身體疼痛不欲喫食羚羊角三分鹿茸一兩半塗酥炙山茱茰防風各三分去蘆頭牛膝一兩半去苖肉蓯蓉一兩酒浸一宿刮去皺皮炙乾薯蕷蜜蒙花當歸各三分白茯苓一兩黃蓍銼三分兔絲子一兩酒浸三日曝乾别搗為末人參三分去蘆頭五味子半兩桂心三分細辛地膚子甘菊花決明子青葙子各半兩熟乾地黃附子各一兩炮製去皮臍甘草半兩炙微赤銼磁石二兩燒醋淬七遍搗碎細研水飛過車前子三分右為末煉蜜和搗五七百杵丸如梧桐子大每服以溫酒下三十丸日服三棗湯下亦得忌炙煿熱麵葷辛車前子丸出聖惠方治虛勞氣目昏暗身體少力車前子一兩磁石二兩燒醋淬七遍搗碎細研水飛過石斛一兩去根銼兔絲子二兩浸酒三日曝乾别搗為末熟乾地黃逺志去心澤㵼牛膝各一兩去苖桂心半兩蒺藜子微炒去刺白茯苓山茱茰五味子各一兩巴戟一兩半肉蓯蓉一兩酒浸一宿刮去皺皮炙乾甘草半兩炙微赤銼黃蓍人參各一兩去蘆頭右為末煉蜜和搗三五百杵丸如梧桐子大每服空心及晚食前以鹽酒下三十丸磁石丸出聖惠方治虛勞目暗磁石一兩半燒醋淬七遍搗碎細研水飛過硃砂細研水飛過補骨脂各半兩微炒肉蓯蓉酒浸一宿刮去皺皮炙乾神麴各三分炒令微黃逺志去心木香覆盆子五味子各半兩乾熟地黃三分巴戟桂心各半兩牛膝去苖石斛各三分去根莭甘草炙微赤銼薯蕷車前子各半兩右為末入研了藥令勻煉蜜和搗三五百杵丸如梧桐子大每服食前煎黃蓍湯下三十丸地膚子丸出聖惠方治虛勞眼痛淚多不明地膚子半兩川大黃一兩銼碎微炒柏子仁三分㽔仁半兩去皮決明子三分甜瓜子青葙子各半兩白蒺藜三分微炒去刺茺蔚子半兩藍子三分兔絲子一兩酒浸三日曝乾别搗為末黃連去鬚細辛桂心螢火蟲各分右為末煉蜜和搗三二百杵丸如梧桐子大每空心不計時候以粥飲下二十丸忌生冷豬肉熟麵葷辛兔肝丸出聖惠方治虛勞肝腎風虛眼膜昏暗不能久視無力兔肝二兩炙微黃防風三分去蘆頭玄參白茯苓各一兩羚羊角屑三分人參去蘆頭決明子各三分車前子一兩地骨皮三分枳殼半兩麩炒微黃去穰黃蓍一兩銼熟乾地黃一兩甘菊花三分麥門冬一兩半去心焙右為末煉蜜和搗丸如梧桐子大每服食前以溫粥飲下三十丸肉蓯蓉丸出聖惠方治虛勞目暗逺視無力四肢乏弱肉蓯蓉二兩酒浸一宿刮去皺皮炙乾薯蕷巴戟車前子黃蓍銼覆盆子各一兩犀角屑半兩兔絲子一兩酒浸三宿曝乾别搗為末山茱茰一兩熟乾地黃二兩人參去蘆頭牛膝去苖續斷各一兩甘菊花一兩右為末煉蜜和搗三二百杵丸如梧桐子大每服食前以粥飲下三十丸忌生冷油膩熱麵羚羊角散出聖惠方治虛勞肝腎風虛頭昏目暗四肢少力羚羊角屑半兩黃蓍一兩柴胡一兩半去苖防風一兩去蘆頭人參三分去蘆頭附子一兩炮製去皮臍澤㵼三分山茱茰覆盆子決明子車前子青葙子各一兩甘草半兩炙微赤銼右為末每服四錢以水一中盞煎至六分去滓不計時候溫服防風散出聖惠方治虛勞肝氣乏弱四肢不收筋骨疼痛目多昏暗防風去蘆頭山茱茰羚羊角屑各三分枳殼半兩麩炒赤銼黃蓍三分銼白茯苓一兩羌活三分黃芩半兩當歸三分麥門冬一兩半去心焙五味子半兩薏苡仁半兩右為散每服三錢以水一中盞煎至六分去滓溫服日三四服黃蓍散出聖惠方治虛勞益肝明目牛膝一兩去苖附子一兩炮製去皮臍牡蠣粉三分澤㵼一兩乾薑三分炮製銼兔絲子二兩酒浸三日曝乾别搗為末右為末煉蜜和搗三五百杵丸如梧桐子大每服空心及晚食前以溫酒下三十丸白羊肉湯治虛勞羸瘦腳膝無力耳聾盜汗心多怯悸白羊肉二斤去脂膜以水四升煮取二升杜仲一兩去粗皮炙微黃銼白茯苓一兩熟乾地黃一兩銼牛膝去苖人參去蘆頭黃蓍銼白术各一兩桂心三分磁石三兩搗碎水淘去赤汁龍骨一兩逺志一兩去心右為散每服四錢用羊肉汁一中盞煎至六分去滓食前溫服之地黃湯治虛勞耳聾及虛鳴熟地黃一兩磁石二兩搗碎水淘去赤汁防風三分去蘆頭羌活三分黃蓍一兩銼白芍藥木通銼桂心各三分人參一兩去蘆頭右為末每服用羊腎一對切去脂膜以水一大盞半煎至一盞去腎入藥末半兩煎至六分去滓空心及晚食前分暖為二服菖蒲浸酒方治虛勞耳聾菖蒲三分木通二兩銼磁石五兩搗碎水淘去赤汁防風去蘆頭桂心各三兩牛膝三兩去苖右為細銼用生絹袋盛以酒一匙內藥浸七日後每日食前暖一小盞服之普濟方卷二百三十四
