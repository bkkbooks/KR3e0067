body:
  text: 普濟方卷三百一明周王朱橚撰下部瘡門下部瘡縂論隂瘡者有三等一濕隂瘡二妬精瘡三隂蝕瘡又曰下疳瘡葢濕者由腎經虛弱風濕相摶邪氣乘之瘙痒成瘡浸滛汗出狀如癬瘡是也妬精由壮年精氣盈滿久曠房室隂上生瘡赤腫作膿妨悶痒痛是也隂蝕瘡由腎臓虛邪熱結下焦經絡痞澁氣血不行或房勞洗浴不潔以致生瘡隠忍不醫焮痛尤甚袖瘡在裡手指無妨疼痛注悶或小便如淋隂丸腫痛或經十數日潰爛血濃肌肉侵蝕或血出不止以成下疳若身體壮熱煩渇惡寒宜急之以大豆甘草湯漬之潰毒湯洗之服五香連翹漏蘆湯踈之更以截疳抵聖㪚乾掺四畔摩風膏潤之後以將䕶忌慎之渇不止者竹葉黄耆湯大便軟者服托裡茯苓等藥調治之腎臓風論曰實則為痛虛則為痒癢之出於腎虛也明矣腎屬足少隂之經囊問濕痒調之腎臓風世所共知也孰知宗筋聚於隂器足厥隂之肝系焉惟腎主虛惟肝主風人之精血不充内為嗜欲所耗外為風冷所乘風毒濕氣皆從虛入囊間其有不痒濕者乎脚下其有不瘡瘍者乎療治之法先當䟽散風邪流行濕毒夫然後以芎歸活血與細辛蒺藜驅風數軰潤飬而平治之若欲遽用川烏故紙燥裂之劑吾恐攔住内邪病無由愈間有患者為酒麵炙􅏼所傷腎虛而挾熱如猪肚黄連蒸為丸子不可無其或不施藥餌一切從事於熱湯雖沃之暫止然眞氣愈泄肝腎愈虛或者未知攸濟耳方宣毒方治腎餘氣瘡苦參荆芥當歸川芎𤣥參白芷各半兩黒牵牛一兩半烏蛇一條青黛半兩一半入藥一半為衣右先將牽牛巴豆肥白者去殻三十粒慢火炒令巴豆黒色去巴豆用黒牽牛同前九味為細末却將煨熟大蒜擂細看稠得所丸時入糊和丸如梧桐子大每服十丸塩酒下浴毒丸出瘡科精要方治小腸風隂瘡痒痛木通藁本枳殻管仲白芷荆芥甘松薄荷各等分右㕮咀用藥二兩水五升入芒硝半兩煎至三升熱洗浴瘡隂瘡膏治男女隂瘡米粉一酒杯許芍藥黄芩牡蠣附子白芷各十八銖右㕮咀以不中水猪膏一斤微火上煎三上三下候白芷黄膏成絞滓去内白粉和傅瘡上猪蹄湯出聖惠方治隂瘡濃血不絶猪蹄二枝黄栢三分剉敗醤三分黄芩半兩黄連三分甘草一兩剉營實根一兩右搗羅為散用漿水二升煎至一升半熱用洗之七寶㯽榔散出德生堂經驗治下元玉莖上或包頭内有疳瘡漸至蝕透不愈者㯽榔蜜陀僧雄黄輕粉黄連黄栢朴硝各等分右為細末入麝香一字和勻再研細先用葱白漿水洗淨軟帛掩乾如瘡濕乾掺如乾小油調塗玉粉散治下隂瘡疼不止寒水石煆蜜陀僧滑石各半兩膩粉麝香各少許右為細末油膩或乾貼牡蒙散出聖惠方治隂下生瘡濕痒失精牡蒙菟絲子栢子仁蛇床子蓯蓉各二兩右治下篩酒服方寸七日三以瘥為度一方無蛇床子宣風散出仁齋直指方治踈肝腎風大鷄心梹榔二箇橘皮半兩甘草焙三錢牽牛生取來一兩炒右為末每服二錢蜜湯調下全蝎散出仁齋直指方治腎臓風發瘡疥鷄心梹榔一大箇破開以黄革丹一錢合在内温紙裹煨明硫黄研二錢生黄丹一錢全蝎三枚焙右為細末入輕粉半錢麝香少許於磁器收每用少許蔴油調抺兩掌先以鼻臭男以兩掌揜外腎女以兩掌􅀈兩乳各睡至醒次日又如此用藥屢效又方出仁齋直指方右用大紅川椒去目水蘸濕半日夾生杏仁研膏擦手如上法亦驗烏頭丸出衛生家寳方治腎臓風上攻下疰生瘡並癬川烏二兩草烏一兩二味以黒豆半升煮透軟去皮切日乾天麻地龍去土秤白附子各半兩右為細末酒糊為丸桐子大每服二三十丸空心食前塩酒或塩湯下輕黄散治水莖上生瘡不乾見骨者大黄三錢燒灰存性黄栢二錢燒灰存性輕粉少許久年壁土東向者一錢右先用温熱水洗淨血水以綿帛拭乾然後藥乾掺切忌房室硫黄散出聖惠方治隂上生瘡硫黄半兩赤石脂半兩麝香一錢膩粉一錢右藥都和如粉每先以甜淡浆水温洗令淨裛乾貼之牡蠣散治隂囊兩傍生瘡或隂濕出水甚痒甚苦夜則􅎲之無定後必自痛或兩腋汗脚板心常濕汗無所柰何此藥主之予親得此症受苦數十年得此方隨用二三日如法搽之二十年餘不發實為神效枯白礬四兩黄丹砂二兩牡蠣粉二兩右為細末遇夜睡手揑藥於痒處痛擦之不一時又搽之三四次後頓减次夜再搽雖大减又搽後自然平復如腋汗亦有頓搽方可脚汗先搽大减又搽後装藥靴或鞋底上脚板上塗藥纒脚褁之亦可麻黄根粉治腎勞熱隂囊生瘡麻黄根石硫各二兩米粉五合右治下篩安絮如常用粉法搽瘡上粉温更搽之胡連散治隂生瘡腫痛胡粉三錢黄連末一錢五倍子末一錢右藥都和研為散先以甘豆湯洗淨拭令乾以藥末傅於瘡上日再用之天雄散治隂生瘡腫痛天雄一末膩粉一錢麝香一錢右細研為散以温漿水洗瘡淨後用津液塗之夾塩散治隂瘡及惡瘡皷子草根一把大麥三十粒塩少許右搗令爛傅瘡上一易經三日後三日一易逺志散治莖中痛囊津液不行逺志去心五倍子焙蛇床子各等分右為細末毎用藥末五錢水三升入葱白三寸同煎五沸去滓熱淋渫效桑枝湯治隂瘡桑枝三握剉葱二握右以水三升煎至二升去滓稍熱浴瘡上一方水煎桑白皮湯洗之蚯蚓散治隂莖瘡豆粉一分蚯蚓二分右用水研塗上乾又傅之一方用豉一分黄白散治近榖道四畔時復生泡痒而生痛無非風毒流行去風乾水足矣黄栢皮黄連去須白礬煆過白蛇皮燒灰各等分右為細末重篩入麝香臘茶末各少許和勻津唾調塗過痒𤓰破水出即塗如水多即乾搽石灰散治腎漏隂囊先腫後穿破出黄水瘡如魚口能致命右用五倍子同石灰炒黄色去灰攤地出火毒炒盆内研為細末不犯銅鉄乾搽瘡上五七次愈又方右用豆豉燒灰貼之蛇床散治隂囊生瘡疼痛右用川椒荆芥火掀草蛇床子煎湯洗後用鷄清調朴硝末塗之即見效荆芥湯治玉莖上生瘡右先用荆芥黄栢煎洗後用黄白眞蚌粉荆芥青黛為末乾掺瘡上丹胞散治莖上生瘡臭爛者右以猪胞一箇連尿去一半用新磚兩塊炭火煆新磚將猪胞連尿於磚上焙乾不住手一向移放於兩塊磚上輪流不歇莫與火煆過胞以尿乾為度研為末入黄丹一錢先用葱湯以鵝毛沬洗以舊綿帛滲乾此藥搽三五次立見效鱉灰散治丈夫隂頭癰不能治者右用鱉甲頭燒灰以鷄子白和傅之及治婦人隂脱肛地連散治玉莖上生瘡右用地骨皮煎湯洗訶子連核燒存性為末乾掺川連散治下部注瘡右用黄連為細末漿水調成餅攤於碗面上内用艾及川甲三片燒烟覆椀薫成黒色再取下如是者五次以黄連餅黒色為度地上出烟毒再研細濕塗乾清油調塗三四先用黄白藿香茵蔯煎湯温洗煎蜜散療男子隂瘡損爛右爛煮黄栢洗之又用白蜜塗之一方蜜炙燋為末傅於瘡上蠟茶湯治隂囊上瘡右用臘面茶為末先以甘草煎水洗後用貼妙猪脂散治天行䘌瘡右用猪蹄燒灰以猪脂和傅日五六用桃熊散治熱病後下部生瘡右取濃煮桃白皮如稀餳内少許熊膽以綿蘸藥内下部瘡上黄栢散治楷襠右先用熱温水洗過楷痛處即用黄白皮末一錢和勻新米泔調塗或用新米泔調服三五服水瘡湯療隂瘡隂邊如粟粒生瘡及濕痒右以槐北面不見日處白皮一大握塩三指一撮以水大二升煮取一升洗之三五遍適寒温用苦渉逺恐衝風即以米粉和塗神效蠟燭平胃膏治腎臓風瘡右用平胃散以蠟燭油煎過候冷調傅瘡愈合掌散治腎臓生瘡右用梹榔硫黄為末臨睡用香油調掌心上鼻臭之即以藥掩外腎睡二三日用之效治隂痒生瘡右嚼胡麻塗之驗治水莖上生瘡不乾見骨者右用烏賊魚骨末按滿瘡口以紙纒之治楷檔右用嫩楓葉挪爛擦之立愈又方右用老鴉酸草又名酸毒草挪爛指擦以冷水洗之又方右用馬屁勃即灰菰尋常採收如有此疾先用温水或冷水輕輕洗淨以菰為末摻患處如新菰不必為末將菰擦患處治男子腎生瘡癬作痒右以百草霜用香油調搽立效治隂囊上瘡右用甘草煎湯温洗即用臘茶末就𫝊貼一方同地龍糞輕塗治天行䘌下部生瘡右濃煮桃皮如糖以内下部中若口中有瘡含之治隂瘡右用狼牙五兩細剉水五升煮至三升温洗之治下部生瘡已成洞口右服牡丹方寸日日三服又方用桃皮葉杵水漬㑹濃者去滓着盆中漬之蟲出療男子隂瘡右以蜜煎甘草末塗之大良比有人患塗頭睡次下瘡欲㫁者以猪肉湯漬洗之後用黄連黄栢等為末傅之治隂痒痛右用車前子以水三升煮三沸去滓服治隂生瘡右燒杏仁研為末傅之滛汁方治莖物腫爛右用大腹皮一升夾苦參荆芥煎湯温洗拭以津唾塗次用油髪燒存性入些白艾末傅逐日煎湯蜜洗換藥或用乳香龍骨散仍服蠟礬丸並髪灰用米飲調下淋渫藥治莖痛囊縮津液不行右用蛇床子去皮㨂淨四兩為麄末每用藥一兩水二碗煎一碗半去滓乘熱薫下部候通手淋浴臨睡用松節散治腎風瘡右用松節和􅗑羊尿白礬一處燒瀝油搽瘡上立效治下部飬蟲方出聖惠方硃砂一分細研白礬一兩燒灰芎藭半兩右為末毎用綿褁一錢内下部中日再易之又方出聖惠方用蛇一條如指麄者掘地作坑置蛇於中燒之取有孔板覆坑上坐薫之其䖝盡出神効方出仁齋直指方治莖頭三五孔小漏瘡出血微濃右用香髪燒存性灰𫝊乾則津唾調髪灰食前服烏喙湯治若有瘜肉突出右以苦酒三升浸烏啄五枚三日一洗一日夜三四度瘥治隂下濕導引法飬方道引法云卧令兩手布膝頭取睡置尻下以口内氣腹脹自極以鼻出氣七息除隂下濕少腹裡痛膝冷不隨治人下部中痒出十便良方右以蒸棗取膏以水銀熟研丸之令相得長二三寸以綿薄褁内孔中蟲出瘥治糓道中瘡右以水中荇葉細搗綿褁内下部日三胡粉散療隂瘡黄栢黄連各三分胡粉一合右為末粉土日三婦人綿褁棗核大内之肘痛如刺方出肘後方但服生射干汁取下亦可服丸藥下之云作走馬湯亦在尸注中有訶子散治妬精瘡有富家子唐靖者年十八九未娶忽於隂頭上生瘡初祇針眼大畏疼不敢洗刮日久連莖爛一二寸許醫不止用膏藥貼之愈疼有道人周守眞謂此名下疳瘡亦名妬精瘡縁此為後生未娶精氣溢盛陽過興起當泄不泄不泄強泄脹㫁嫩皮怕痛失洗日久遂爛有害性命若治此瘡須是斷房事数月先用荆芥黄栢皮馬鞭草剉入葱煎湯洗令去濃靨以訶子燒灰入麝香乾摻患處令睡時喫冷水兩三口勿令陽道興起腸㫁瘡靨靨堅即安雙妙散出十便良方療男子隂卒腫方鷄翮六枚燒蛇床子等分右二味為末以飲少許隨卵左右取鷄羽又方出十便良方煮桑根皮汁洗之又方出十便良方治隂下濕痒成瘡吳茱萸三合右用水三升煮三五沸以洗之諸瘡亦甚妙也治蟲已食下部肛盡腸穿者亦用長股蝦蟆青背者一枚鷄骨一分並燒灰為末合吹下部令深入數用大驗治下部蟲齧用梅葉桃葉杵一斛蒸之令極熱内小器中大布上坐蟲死茴香㪚出千金方治隂瘡風冷所傷疼痛方白蒺藜附子茴香子右件藥等分搗細為散每於食前以温酒調下二錢止痛丸出聖惠方治隂痛不可忍吳茱萸二兩梹榔一兩茴香一兩右件搗羅為末用醋煮麵糊和丸如梧桐子大不拘時候以熱酒下二十丸隂頭生瘡溪螺溪港中螺也舊者為妙右甘鍋煆過為細末仍先以塩水洗五七次後以此藥傅之又方治糓道生泡痒而復痛此風毒流行證枯礬半字和勻米泔調塗此方專治行路楷襠糓道痛仍用水先洗唾調散出本草治同前右五倍子末唾調傅治隂頭上生瘡出本草治以蜜煎甘草塗之瘥治隂莖上瘡痛爛出本草用䜴一分蚯蚓濕泥二分水研和塗上乾易禁熱食酒莱蒜治毒攻下部生瘡者出本草用槲苦皮合櫸皮煮汁如飴糖以導之一方出本草治腎瘡腰痛用蛇床子五倍子蕪荑煎湯以帛囊盛稍熱洗之先以塩洗眼或以蕪荑剪草黄連全蝎黄栢末蔴油調之傅濕隂瘡附論夫虛勞隂瘡者為腎氣榮於隂今腎虛不能榮則津液汗出於隂也虛則為風邪所乘客於腠理而正氣不洩邪正相干在於皮膚故痒搔之則生瘡也方天雄丸治虛勞隂萎濕痒搔之汁生瘡小便淋瀝或赤黄莖中痛甚者失精劇苦尿血目視􅉩得風淚出脚弱不能久立宜服天雄一兩炮裂去皮臍蛇床子三分細辛半兩川大黄半兩剉碎為妙杜仲三分去粗皮炙微黄剉栢子仁三分白茯苓三分防風半兩去蘆頭􅒝􅐺三分剉菖蒲三分澤㵼三分苽蔞三分桂心三分逺志半兩去心川椒半兩去目閉口者微炒出汗牛膝三分去苗石韋半兩去苗山茱萸三分白术三分右搗羅為末錬蜜和搗三五百杵丸如梧桐子大每服食前以温酒下三十丸蛇床子丸治虛勞陽氣衰絶隂萎濕痒生瘡蛇床子三分續㫁半兩薯蕷半兩桑寄生半兩肉蓯蓉一兩酒浸一宿刮去皴皮炙乾附子半兩炮製去皮臍菟絲子一兩酒浸三日曝乾别搗為末逺志半兩去心莨菪半兩小淘去浮者水煮芽出焙乾為黒色右搗羅為末錬蜜和搗三二百杵丸如梧桐子大每服食前以温酒下三十丸小浴方治虛勞隂濕痒生瘡川椒一兩半蛇床子苦參一兩半白礬一兩香附子一兩桂心三分白芷一兩狗脊一兩細辛一兩右搗麄羅為散每用一兩以水三升煎至二升去滓入盆子内但承熱氣坐盆子上薫之良久通身便洗患處甚者不過三五度乳香龍骨散治外腎濕痒滛爛如㿐龍骨生石膏五倍子各一分白芨乳香黄革丹各半分麝少許右為細末先以苦參大腹皮紫蘇莖葉温洗後傅螵蛸散治虛勞隂濕生瘡桑螵蛸灰一分牡厲粉半兩米粉一分胡粉一分騏麟竭一分蜜陀僧一分右研細末如粉用塗瘡沐浴長春散治男子下元虛濕久冷隂囊左右夜痒􅎲之則喜任之則痛成瘡流水為害甚苦此藥見效及婦人下部隂濕胎元冷牡蠣蛇床子破故紙官桂紫稍花乾荷葉各等分右㕮咀每服一兩半水一小鍋入葱白數莖煎至八分去滓先薫後洗却用枮礬一兩半入黄丹半兩蛤粉半両一處和勻研末洗用手揑藥搽濕痒處螵蛸散治隂瘡或痒桑螵蛸灰一分胡粉一分硃砂一分騏麟竭一分右研細如粉貼於瘡上黄粉散治隂囊上生瘡黄水流注有妨行歩五倍子黄栢滑石輕粉等分右為細末貼之數次即愈硫黄散治虛勞隂濕生瘡麻黄根末半兩硫黄半兩細研米粉一分右研令勻細每用如粉塗之騏麟竭散治虛勞隂濕生瘡騏麟竭半兩坐拏三兩黄蘗半兩右搗羅為末入膩粉一分都研令勻如瘡破有濃水即乾上如無濃水即以生油調塗臘茶散治隂瘡痒瘡出黄水久不瘥者一名五信散臘茶五倍子各等分膩粉少許右為細末先以漿水葱湯洗之頻傅椒湯尤佳一方不用臘茶黄龍散治濕乾瘡癬黄汁浸滛色如香瓣黄栢龍骨赤石脂各一兩右為細末好酒調掃瘡或乾貼之槐白皮湯出聖惠方治虛勞隂濕痒生瘡槐白皮二兩黄栢一兩半香茅葉一兩半右細剉以水三升煎至二升去滓看冷煖洗之烏梅散出聖惠方治虛勞隂濕痒生瘡烏梅十四枚青錢四十文塩三錢右以水酒各一升於銅器内煎至升半去滓看冷暖洗立效一方與臘茶㪚相随用之一方有醋一升一方水煎洗佛手散治濕疳瘡癬痒痛皮爛黄丹炒黄二錢豆粉炒黄二兩右研勻清油調掃瘡上後摻如聖散如聖散石膏黄芩去皮心各一兩右為細末乾摻之瘡上内服佛手散猪寄湯出聖惠方治虛勞隂濕痒生瘡猪蹄二枝剉槐樹寄生細剉一升右以水五升煮取三升去滓看冷暖洗瘡三五度用之永瘥玉粉散治隂瘡浸滛不止白礬枯定粉各等分右細末先浴淨淹乾摻之䳄鷄散治隂下濕痒右用黄䳄鷄以光粉滑石為末和飯與鷄食之後取鷄食甚補益蒲黄散治丈夫隂下濕痒右用蒲黄末傅之三次良千金論曰有人自少至長隂下常有乾癬者宜依癬方主之有五勞七傷而得隂下癢濕搔之黄汗出者宜用補丸主之仍須傅藥治亦有患妬精瘡者以妬精方治之夫妬精瘡者男子在隂頭節下婦人在玉門内並似疳瘡作臼韲食之大痛疳即不痛也苦參湯療隂囊下濕痒瘡右煮槐皮苦參黄蘗及香薷汁洗之並良礬石散出海上方治隂囊上生濕瘡黄水流注有妨行歩右白礬不以多少研為末入冷水内洗瘡即愈療隂下濕痒成瘡出聖惠方右煮桃皮和黍米汁洗之療隂下濕痒瘡出千便良方右用甘草一尺以水五升煮取三升漬洗之日三四度便愈治隂囊濕痒瘡方見本門前下部瘡類即淋滯藥猪蹄兩脚槐寄裡白皮切一升右以水煮洗瘡一日五六遍永瘥治血驅風散出仁齋直指方治肝腎囊濕痒脚下瘡癬當歸川芎白芷華隂細辛白蒺藜炒去刺桃仁浸去皮焙白芍藥半夏製塊苓五靈脂甘草生各三錢蒼术炒杜仲姜汁炙炒去絲辣桂天麻薏苡仁橘紅梹榔厚朴枳殻各五錢右剉每服三錢水二盞半姜五片棗二枚煎至七分濾清暖熱入乳香末少許食前服乳香以佐心氣使心腎相交或有熱症去桂乳香加黒豆煎銅碌散出濟生拔粹方治男子婦人隂部淹瘡五倍子細研五錢白礬一錢銅碌少許輕粉一字乳香五分右為細末洗淨摻之治男子婦人隂瘡濕痒右用槐實末摻之及煎水洗之治隂生濕疱瘡及隂蝕瘡出三因方右取石硫黄研如粉傅瘡上日三以葱椒白礬湯洗淨次以藥傅之又方燒杏仁搗塗之青黛散出危氏方治下部生濕瘡熱痒而痛寒熱大小便澁食亦减身體不安面微浮腫此食魚蝦發風熱物得之右馬齒莧四兩研爛入青黛一兩再研勻塗上立有神效仍服八正散日三服生薑平胃散治腎風瘡及下部濕右用生薑皮炒燋為末濕者乾傅之乾瘡搔靨香油調傅如覺熱不可忍用平胃散凉去之或入平腎散於薑皮末内傅之自然伏大熱宣毒散出洗方治丈夫隂氣盛陽氣微弱風寒之氣乘虛而客於腎經治隂囊濕痒而微熱一種但痒而不濕一種在隂根並毛際痒一種濕不痒一種無汁者謂之毒氣不洩此藥治之全蝎微炒白殭蚕炒去絲嘴蟬蜕洗淨去土炒焙乾各半兩石燕三兩醋碎火煆令酥右末毎服二錢用塩酒煮猪腰子一䨇蘸藥嚼之以元煮酒送下用蒸餅乾喫壓之頻服見效此方亦治腎臓風濕流注生瘡痒甚者亦神效兼用卷栢散洗卷栢散出洗方隂濕生瘡出汗痒甚服前藥去腎臓風此作洗藥卷栢荆芥穗川烏大艾葉升麻去下根節露蜂脫蚕沙藁本頭各一兩右為散每服二兩水三大碗煮取一半濾去滓先薫後洗瘡安即止大抵人不可以熱湯浴洗得腎氣耗散早年目昏又脚無力治隂上生瘡似喫虫所食連年不效出䕶命方右以糊粉一件食刀上煆令通赤與椒末相衮生油調塗之頻度必效治隂腫痛用出永類鈐方苦楝根白楊根木香吳茱萸梹榔各等分一方出永類鈐方蜜陀僧黄連硃砂右為末傅一方出永類鈐方五倍子黄連膩粉為末甘草烏豆湯洗拭傅之又瘡㿗疼不可忍出永類鈐方香豉一合地龍新糞水少和成膏塗之隂邊生瘡濕痒出永類鈐方柏皮向北不見日者取煎湯洗三黄湯料煎湯隂囊濕痒生瘡及㾗瘡出澹療方五倍子煨末輕粉右為末傅吳茱萸散出澹療方治風寒濕注下成瘡梹榔一兩硫黄半兩呉茱萸一分川烏頭一个右四味為細末摻瘡上乾者油調傅之療疳濕時行熱熛瘡出本草以青羊膽和醋服之良治男子隂痒痛出本草白殭蚕七枚為末用酒調下方匕治隂冷漸漸冷氣入隂囊腫滿恐死疼悶不得眠出本草以大梨根煮汁服立瘥治隂毒痿出本草以無食子燒灰用傅之治隂腎痿弱囊下濕痒出本草用無名木皮煎取其汁小浴極妙治丈夫隂囊濕瘡出本草以鑄鏵鉏孔中黄土為細末摸之亦去隂汗最佳治隂莖熱瘡出本草用絲𤓰燒為灰傅之治隂痿出本草取露蜂房燒灰酒服之療瘡及濕痒出本草用枯柏皮向北不見日處大握水二升煮之一升洗之三五遍冷復煖若渉逺恐風即以米粉即效治隂囊下濕痒及瘡出本草以槐枝煎湯治妬精瘡方麝香散出三因方治妬精瘡痒而濕者麝香黄礬青礬各等分右為細末小便後用些小傅之一方治濕生瘡黄流注白礬不以多少為末先以冷水洗瘡然後傅之津調散出三因方治妬精膿汁淋漓臭爛黄連欵冬花各等分麝香少許一方不用右為末以地骨皮蛇床子煎湯用軟帛挹乾津調藥傅之最忌不得用湯洗黛青散出仁齋直指方治妬精瘡右用久年册皮青紙以津唾粘濕貼上明日又重貼勿動自愈用青紙葢取青黛凉而然後䖝紙無生耳白散子出三因方治妬精瘡痒不可忍者及皮膚諸瘡手􅎲疽瘡晉礬不拘多少炒輕粉每服入少許右研勻摻瘡上立瘥如治漏瘡每服挑一錢入黄栢末一錢輕粉半錢訶子散治妬精瘡方見本門前下部瘡類田螺散治妬精瘡右用大田螺兩箇和殻煆存性為末入輕粉摻所患處即可安一方用麝香少許麝香散出千金方治妬精瘡者男子在隂頭節下婦人在玉門内並似疳瘡作半劑食之大痛疳即不痛右用銀釵以綿褁用臘月猪脂薫黄火上煖以釵烙瘡上令熱取乾槐枝熱之塗之以麝香黄礬末傅之小便後即傅之不過三兩度瘥但用疳痢方中藥傅之即瘥油髪散出仁齋直指方治妬精瘡隂蝕瘡乾青黛欵冬花各等分油髪青黛各等分右為末入些麝香或摻或津唾調傅麝香散出仁齋直指方治妬精瘡乾青黛欵冬花各等分麝香少許右為末先以地骨皮桑白皮煎湯温洗軟帛拭乾次以津唾調藥傅治疳瘡即妬精瘡又名隂蝕瘡又名趕注瘡右用鬼枯蔞煎湯洗患處次用枯婁灰存性研為末傅之凡兩次立愈夫邏慾之人多患妬精瘡者以婦人隂中先有宿精男子與之交接虛熱即成痛初發在隂頭如粟沸之則痛甚矣兩日後濃清作臼孔蝕之大痛婦人亦有此病生在玉門外以疳蝕瘡不痛為異耳出三因方陰妬蝕瘡方洗毒湯出瘡科精要方治蝕瘡苦參防風甘草露蜂房各等分右㕮咀水煮濃汁洗瘡腫痛塌腫湯出瘡科精要方治外隂蝕下疳痷瘡腫痛芍藥丹參白歛黄芩去黒心各等分右㕮咀用藥五錢水一升煎十沸帛蘸頻塌之甘草大豆湯出瘡科精要方治外隂蝕下疳痷瘡腫痛甘草二兩赤皮葱莖大豆一合右用水三升煮豆熟為度槐條一握同煮清汁熱淋浴冷即再温浸三二時度豆坯散出仁齋直指方治隂蝕瘡菉豆粉蝦蟆各一分胭脂半分右為細末乾摻雄黄散出十便良方治蝕生瘡或痒雄黄礬各二分麝香半分右為末摻瘡即瘥蒲黄散出三因方治隂蝕瘡蒲黄三兩水銀一兩右研勻先以猪肉湯浸洗挹以藥摻之胭脂散出百一選方治隂瘡坯子胭脂真菉豆粉右同研傅之洗湯方出聖惠方治隂下生瘡地榆黄栢各八兩右㕮咀以水一斗五升煮取六升去滓適冷暖洗瘡日再或只煮黄栢汁洗亦佳蝦蟆散出聖惠方治隂蝕欲盡瘡痛甚者蝦蟆一枚燒灰兎糞一兩右為同研令細日三四度用少許傅瘡上鷄礬散出聖惠方治隂蝕瘡鷄糞一分礬火煎茶一分右搗更細研如粉先用桑枝葱白豉湯洗後貼藥日三度貼之黄連粉散療隂瘡有二種一者作臼膿出名曰隂蝕瘡二者但赤作瘡名為熱瘡若是熱瘡此方右以黄連和胡粉末傅之必效一方用胡粉傅之大驗又方治如前右取黄栢黄芩各一兩切作湯洗用黄連黄栢末傅之又方紫笋茶末一分荷葉一片燒灰右為末以塩漿水調傅之三五度即愈又方右取停水處乾地骨皮末傅之神效是長郭承思用之效麻仁膏療人隂生瘡膿出作臼右取高昌白礬麻仁等分研煉猪脂相和成膏槐白皮作湯瘡拭令乾即塗膏然後以楸葉貼不三五度瘥治隂蝕瘡右用肥猪肉五觔水三斗煮令極爛去肉以湯極熱便以漬瘡中冷即愈下陰疳蝕方烏金散治疳瘻惡瘡麝香蟾酥各一字粉霜硇砂輕粉各一錢銅碌砒霜白乾姜草烏頭天南星舶上硫黄各半兩右為細末紙撚縱之或浸湯蒸餅和為挺子縱瘡口内上以膏貼之乳香散治下疳瘡乳香没藥輕粉苗丹龍骨烏魚骨黄芩銅碌以上各一兩黄連麝香少許右細末以温漿水洗過貼瘡上陀僧散治疳瘡乳香没藥另研龍骨銅碌枯白礬赤石脂黄飛丹蜜陀僧烏魚骨麝香等分右為細末乾貼之截疳散治年深疳瘻瘡大效蜜陀僧白歛白芨黄丹各一両黄連腦子麝香各半錢輕粉一錢右為細末和勻為散每用或摻或縱瘡中以膏貼之良效勝疳散治一切下疳等瘡黄栢去皮黄連㨂淨訶子去核蜜陀僧各三錢輕粉人中白麝香少許右為細末用漿水洗渫了乾貼或油潤了貼亦得博金散治下疳蝕臭爛腫痛麝香乳香半錢黄丹輕粉各一錢白堊二錢蜜陀僧半兩白礬半兩與蜜陀僧同為末相和炒鍋内火上炮汁盡右為細末先須另用槐枝葱白塩甘草熬湯淋溻洗一二時挹乾摻上項藥每用藥先須浴然後摻藥甚者三五次瘥𫝊藥方治疳瘡麝香三錢研白芨半箇壊胭脂一錢輕石膏五文煆黄栢炙酥滓七次五文木鱉子二箇去皮核子札之炙酥滓七次右為細末如爛甚者入炒黄丹三幹甘草洗藥方治下疳瘡洗藥甘草三錢荆芥一錢淡竹葉一握燈心半錢麥門冬草一握小蘗一握五七莖右同剉為麄散湯洗之甘石散治下疳瘡橡斗子燒灰存性二錢蜜陀僧蘆甘石各一錢半輕粉一分龍骨半錢麝香少許右為細末先用荆芥杜仲川椒水煎湯放温浴洗罷然後藥一搽乾貼蝦蟆散治疳蝕入諸處但是赤血利久不瘥蝦蟆一枚五月五日燒灰研金銀土鍋人糞灰一方云髪灰各一兩麝香研一分銀末小豆許錯右為末每用少許傅瘡上即瘥痢者吹下部𤣥胡散出百一選方治下疳瘡𤣥胡索五文輕粉五文石膏五文煆枇杷葉四片洗去毛活田螺一箇燒灰以煆用白殻為度並肉右為末傅之黄連散治下部疳瘡隂濕神效黄連黄栢各半兩輕粉二錢枯礬黄丹各一錢右為細末漿水葱白湯渫洗後乾貼之金銀花散出德生堂經驗方治下疳瘡金銀花荆芥蛇床子朴硝甘松白芷梹榔各一兩右㕮咀毎用五錢水五碗加葱白二根同煎數沸盆水洗蒸後洗即上藥末乳香散治下疳瘡乳香麝香輕粉白礬黄丹大梔子等分右将梔子切開去仁安前五味藥在内繫定燒成灰為細末貼瘡上金銀花散出百一選方治下疳瘡竹蛀屑少許金花胭脂四箇海鰾鮹一箇麝香三十文石膏五文煆右為細末傅之丹髪散治下疳瘡白礬為末黄丹穿山甲洗焙人髪剪細香等分右停用橡斗盛兩箇合定住用膠泥固濟原炭火燒過取出冷定打破橡斗内取藥研細末加輕粉麝香少許和勻瘡上用漿水洗淨無糨帛揾乾将藥貼塡三二次即愈黄連輕粉散出醫方集成治腎瘡用抱鷄卵殻鷹𤓰黄連輕粉等分為末煎清油調塗香附子白芷五倍子煎水洗之一方有黄丹龍骨散治疳瘡烏魚骨赤石脂龍骨孩兒茶等分右為末乾貼之麝香散出瑞竹堂方治男子下疳瘡白礬煆過輕粉麝香蠐螬就活壓去尿焙乾右為細末貼瘡上三兩次先以口含漿水洗淨揾乾用藥僧伀散治下隂疳瘡蜜陀僧半錢甘草炒燋一分黄丹一錢炒麝香一分右為細末乾貼或香油調上大有效驗輕粉散治疳瘡漏輕粉没藥乳香蜜陀僧各等分右為細末熬漿水葱白湯洗淨口瘡淹乾用藥貼之麝香散治下隂疳瘡右用乾瓦一片鋪黄丹一錢上鋪白礬一兩枯盡為末研入麝香膩粉少許同研勻先用葱白湯洗了上之甚妙上沸散専治一切疳瘡疾白礬皂子大乾胭脂少許鍋煤已上約量勻准奪狗糞下土狗量分右為細末洗淨瘡乾貼之烏金散貼惡瘡瘻瘡右用橡子二箇内一箇實白礬末相合定用黒梢麻皮纒了火内燒研加麝香少許洗淨瘡貼之輕粉散出神效方治疳瘡馬明退燒灰三錢輕粉少許乳香少許右為細末先以温漿水淨乾摻之膍胵散治疳瘡連年月深不退者疳病重欲死此藥麝香少許各等分用漿水洗就温搽即可朱粉散治諸疳瘡多時不效訶子一兩枯白礬半兩黄丹二錢炒右為細末先用温漿渫了傅之效佛手散治男子婦人下疳瘡人中白五錢鉄上炒輕粉半錢麝香一字右為末口含塩水洗淨瘡揾乾貼之如鼻血不止口含水鼻内㗜有效螻蛄散治疳瘡漏年久不效螻蛄上截放於葱筒内隂乾三分麝香少許二味右為末蟾眉汁急着手和為丸如芥子大每服用一丸為絍在瘡上蟾麝散治疳瘡漏膽礬二錢蟾酥一字麝香少許右為細末用蒸餅心和丸芥子大絍在瘡内龍骨散治冷疳空肚草乾為末龍骨生用虎骨濕紙褁衣灰火内煨存性右為細末傅之乳石散出神效方治疳瘡久不愈者海孔石燒紅醋泮數次二錢金銀花一錢右為細末每服二錢半如薟茶一般每服用二服如病一年服藥半年則愈梹榔散治疳瘡浸滛不愈右用梹榔燒灰存性為末入輕粉用蒸飯甑葢上滴淚調傅之立效梔子散治下疳瘡右用梔子一箇去瓤装入明礬末麵糊合口火燒熱存性為末洗淨乾摻上隨效五倍子散治下疳瘡右用孩兒茶為末五倍子燒灰存性加龍骨貼之黄僧散治疳瘡黄栢蜜陀僧各等分右為末如泥葱白漿水洗淨乾貼之一方有硃砂砂糖散治諸般疳右用砂糖與麵各五錢同炒熟加梹榔末一兩無時吞喫蜣螂散出徳生堂經驗方治冷疳透骨相穿膿水常流不愈者右可用屎蜣二三箇炙令乾研為末加輕粉一錢和勻却用烏龍德生膏藥揑作定子蘸藥入瘡孔内又再用膏藥外貼在瘡上換用藥頻上直至生肉為驗銀粉散出危氏方治下疳瘡隂頭生瘡右用墻上白螺螄不以多少火上煆酥為細末於水内飛過土石麄者次用輕粉隨分兩入在藥内毎用少許乾貼在瘡上一方不用膩粉仍生塩水洗五七次後以藥傅之枯礬散治疳瘡燒棗子存性枯白礬右為末乾用油調濕則乾傅如不效再加二味五倍存性青黛應效散出瑞竹堂方治下疳右用地骨皮不以多少隂乾杵為末每月紙撚蘸絍瘡内頻用自然生肉更用米飲調二錢無時日進三服立效方出瑞竹堂方治下疳用燈心灰入輕粉麝香少許乾貼之濕小油調貼桃花散治下疳瘡青蛤粉一兩黄丹炒二錢右為細末乾貼之立效鯽魚湯出聖惠方治隂生瘡蝕欲落者鮮鯽魚去腸肚鱗右用蜜陀僧細研滿塡魚腹用線縫合用慢火炙令乾不得燋黒搗為末入麝香一錢細研毎用藥先以暖塩漿水洗冷淨潔用輕帛拭乾避風貼散以帛幔𦂳一日一洗一換五七日瘥枯礬散治疳膁瘡右用黄栢末枯礬二味和勻乾搽瘡上白芷散治疳瘡右用甘草節白芷五倍子水煎温洗治下疳瘡出德生堂經驗方右以孩兒茶研細為末先净洗則小油調傅濕則乾搽上神效治疳瘡方出海上名方右用透明膠香為末入輕粉少許摻之乾則麻油調抹五倍散出百一選方治下疳五倍子甘草滑石各一錢虢丹一字右為細末先以甘草湯或漿水湯洗之𫝊藥一方無滑石治惡瘡瘻疳出百一選方右治爛甚出濃不淨者以活地龍二十條洗淨了用餅子盛之以重紙褁開一竅夜間入患處令地龍食瘡濃盡明日傅藥如覺痒不妨可令患人知治疳瘡浸滛不愈右用糯米燒灰存性為末傅之治疳瘡右用板門背後飛塵羅過虀水洗淨乾貼之即愈治疳氣入隂胞囊腫大用黄栢燒灰存性猪膽汁調敷凡下疳久不愈方右俗呼臊疳可以導水丸禹功散先㵼肝經乾以木香散傅日上三兩度後淡粥一二日止立應散出楊氏家𫝊方治疳瘡麝香半錢另研黄栢皮一錢黄丹一錢瓦上飛過另研白礬半兩瓦上飛過研地龍糞一兩瓦上焙乾另研右件研勻温水洗瘡口用挹乾用藥摻患處日用三次歛肌散出楊氏家藏方治下疳瘡牡蠣火炙蜜陀僧研橄欖核燒灰蠟茶四味各等分右件為末乾摻瘡上如乾摻不止即以油調傅之地龍散出楊氏家藏方治下疳瘡地龍糞韮菜地内者不以多少火煆過右為細末入膩粉少許同研勻先以甘草湯洗了後用藥乾搽或油調傅亦得換肌散出衞生家寳方治下疳㾾治一切惡瘡下瘡力男子陽瘡也蜜陀僧研細妙一錢膩粉一錢黄蘗皮研為末用炒一錢半右同和勻末先以温湯洗用軟帛子乾摻上患甚者不過三次即愈㿗風附論㿗風證治男子精血不調為風冷所襲致隂下濕痒之不已流注手脚悉生瘡痬名曰㿗風世謂腎臟風者乃認㿗為腎也㿗屬宗筋系於肝胃陽明養之陽明主肌肉消經流入四肢生瘡正胃之㿗風非腎臓風也方蒺藜散出仁齋直指方治㿗風上攻耳嗚目眩下注隂濕瘡痒蒺藜炒杵刺草烏頭水浸三日逐日換水去皮各半兩白芷白附子生蒺藜蒼术炒荆芥穗各二錢半右為細末米糊丸如梧桐子大毎服三十丸上則茶清下則塩酒服烏頭煮塩方出三因方治原臓氣虛㿗風入胃上攻頭痛眼赤眵淚昏澁口乾咽燥下注四肢疼痛歴節隂下濕痒足脛腰膝遍生瘡風水浮腫川烏頭洗淨者大破開小者全用蒼术呉茱萸各四兩京三稜半兩白塩十二兩水煮四味候烏頭透控乾洗淨塩右為末米糊丸如梧桐子大毎服五十丸空心温酒塩湯任下之凡水病必忌塩此藥用塩無所忌四生散出三因方治㿗風上攻下注耳鳴目痒鼻赤齒浮或作口瘡下注隂濕四肢瘙癢遍體生瘡及婦人血風瘡白附子沙苑蒺藜黄耆羗活各等分右為末每服二錢塩酒送下或猪腎破開入塩摻藥間煨服亦佳一方用腰子一枚切開去䈥膜入藥少許於内濕紙褁煨炮熱再入藥三錢浸酒調藥並腰子嚼喫令盞底淨盡三五服或只用塩酒調亦可或腰子一枚分兩次用羊腰猪腰皆用雄猪羊者為妙蛇床子散温中主藥右以蛇床子仁為末以白粉少許和令勻相得如棗大綿褁之自然温矣隂汗附論夫虛勞損腎氣不足故隂汗冷夜自泄風邪乘之則搔痒也方海桐皮散治隂囊濕痒黄連全蝎硫黄花椒大腹子樟腦海桐皮白芷輕粉黄皮蛇床枯礬榆樹皮斑蝥少許桱樹皮剪草右為細末臘油調傅山茱萸散出御藥院方治腎氣虛弱隂囊多汗或冷腫痛不消或牽引少腹時發疼痛並皆治之山茱萸吳茱萸硇砂飛紫稍花零陵香藿香葉丁香皮以上各半兩木通細辛木鱉子天仙子蛇床子續㫁逺志各二錢右為麄末毎服用一匙水一碗煎五七沸先以熱氣薫後浴亦葢避風琥珀藥出御藥院方治隂囊瘙痒不已及自汗不收西琥珀黄丹各六錢枯白礬一錢麝香四錢龍泉粉二兩右為細末每用半錢摻在手心於患處擦牡蠣散治男女隂汗濕冷痒疾牡蠣灰蛇床子川烏兎絲子良薑各半兩右為細末用藥三錢白麵一錢酒醋熱調勻渫洗浴之或塗外腎帛包尤妙浥乾方出御藥院方治津液不散攝泄汗𤣥府不閉腠踈汗多不止滑石二兩白芷寒水石粉半兩黄丹坐看多少用顔色如桃紅為度右為極細末和勻毎用乾摻患處蛇床湯治囊濕蛇床子吳茱萸荆芥細辛右各件少許煎湯洗之多年壁上土細碎紗袋盛撲即可乾荷葉散出御藥院方治隂囊腫痛濕潤瘙痒及隂痿弱乾荷葉牡蠣粉蛇床子浮萍草各等分右為細末用羅篩每用兩匙一大碗同煎三五沸濾去滓淋渫洗避風冷眞蛤散出仁􅀈直指方治隂汗濕痒蘆甘石緑者一分眞蚌粉黄連五倍子各半分一名文蛤一方用油調傅之妙右為細末摻洗以蜂房大腹皮煎湯温洗牡蠣蛇床子散治隂汗右用牡蠣和麻黄根蛇床子乾姜為粉傅之塩梅湯療隂囊下濕痒皮剥右用烏梅十四枚錢四十文三撮塩苦酒一升於銅器内縂漬九日洗之又煮槐皮黄栢汁及香菓汁並良爐甘石散出仁齋直指方治隂汁濕痒緑色爐甘石一分眞蚌粉右為細末撲傅陀僧散出百一選方治隂汗神效右用蜜陀僧好者研令極細蚌粉撲使之乾瘡用津調傅五加皮湯出海上方治隂痒有汗右用五加皮煎湯洗之蜜陀僧撲之百藥煎末傅之安腎丸出危氏方治隂汗不止右以安腎丸用舊乾醤煎湯入塩少許吞下大蒜丸出危氏方治隂濕痒右用大蒜不以多少煨剥去皮爛研淡豆豉末搜丸如梧桐子大硃砂為衣毎服三十丸棗子燈心煎湯送下洗方出危氏方治隂汗濕痒用蛇床子酒浸炒白礬陳醤煎水淋洗治隂痒汗出出肘後方右嚼生大豆黄塗之亦療屎尿瘡東垣先生蘭室秘藏方一富者前隂間常臊臭者又因連日飲酒服中不和應之經曰前隂者足厥隂肝脉絡之隂器出其挺末凡臭者心之所主散入五方為臭入肝為臊此其一也當於肝經中㵼莖間是其本後於心經中㵼少衝乃治其標酒者氣味陽能生裡之濕熱合於下焦為邪故云下焦如瀆又云在下者引者竭之酒者是濕熱之水亦宜决前隂以去之是合下焦二法之治清震湯治隂部時痒而有臊臭之狀柴胡稍一錢澤㵼一錢車前子半錢木通半錢生地黄三分當歸稍三分草龍膽三分右件煎藥剉如麻豆大都作一服水三盞煎至一盞去滓稍熱服空心腹中宿食消盡服之便羙饍壓之此藥柴胡入肝為引用澤㵼車前子木通其渗泄之味利小便赤除臊氣是名在下者引而竭之生地黄草龍膽之苦寒㵼酒熱更前兼車前子之類以徹肝中邪氣肝生血用當歸以滋肝中血不足也固眞湯治兩冷前除痿弱隂汁如水小便後有餘滴尻臋並前隂冷惡寒而喜熱膝下冷升麻稍二分羗活稍一錢酒黄栢一錢蒼术半錢柴胡稍一錢炙甘草一錢草龍膽二分澤㵼一錢半黄栢二錢知母二錢右剉如麻豆都作一服水三盞煎至一盞去滓稍熱服空心腹時服之以早飯壓之恐犯腎氣㵼肝湯治小便弱黄臊臭淋瀝兩丸如氷隂汗浸多升麻半錢柴胡五分羗活根一錢酒黄栢一錢蒼术半錢漢防己一錢紅花一錢藁本二分當歸二分猪苓三分澤㵼四錢黄芩半錢麻黄根三分右件剉如麻豆大都作一服水三盞煎至一盞去滓臨卧服大忌酒濕麵青紅湯治外腎冷兩髀隂汗前隂痿隂囊痒臊氣柴胡二錢甘草稍二錢酒黄栢二錢升麻一錢半當歸稍一錢漢防己一錢紅花一錢羗活稍一錢澤㵼一錢半麻黄根一錢草龍膽一一錢茯苓一錢五倍子二十箇右剉如麻豆大都作一服水三盞煎至一盞去滓稍熱服食前忌酒濕麵房事椒粉散治前隂兩丸濕痒秋冬尤甚夏月㣲减麻黄子一錢黒狗脊半錢斑猫一錢猪苓三分肉桂二分當歸稍三分輕粉少許紅花少許蛇床子半錢小椒右為末乾摻上避風寒冷熱處坐卧補肝湯治前隂氷冷並隂汗兩脚痿弱無力黄耆七分人參三分炙甘草根錢半葛根三分升麻四分柴胡二分羗活二分陳皮二分當歸二分黄連一分用連翹黄栢二分白茯苓三分澤㵼二分蒼术半錢麴末二分猪苓二分知母一分防風二分右剉如麻豆大都作一服水二大盞煎至一盞去滓稍熱服空心忌酒濕麵淋渫藥丁香散出御藥院方治腎氣虛弱隂囊多汗或冷腫痛不消或牽引少腹時發疼痛並皆治之紫稍花丁香肉桂蛇床子吳茱萸細辛去苗以上各半兩紅豆川芎莨菪子黒狗脊藿香葉甘松山茱萸以上各一兩蜀椒微炒一兩香附子羗活芭㦸木香甜葶藶香白芷槐子炒芸䑓子天雄炮裂不去皮已上各三分右件另麄末每用酸漿水三升藥末一兩塩少許煎五七沸漸漸乘熱小浴下部臨卧用之濕腎湯出試效方治靣色痿黄脚痿弱無力隂汗隂莖有夭色麻黄六分防風一錢半白术一錢澤㵼二錢猪苓白茯苓一錢升麻一錢柴胡一錢酒黄栢一錢蒼术一錢半右件分作二服水二大盞煎至一盞去滓稍熱服食前一大晴明服之候一時辰方食治隂汗出本草無食子燒灰先以微温湯浴了即以帛微裛後傅灰囊上甚良治隂汗出本草硇砂損隂以莨菪子煎湯洗之方猪蹄湯邂逅著硇砂損隂猪蹄一具劈破浮萍草三兩右以水三升煮取半升去滓以瓶子盛汁内隂瓶中漬之冷即出拭乾便傅後藥粉之又粉法薔薇根皮黄蘗各三分朴硝蛇床子各一分甘草一分炙右為散用前法浸洗後以敷瘡上鷄子治主著硇砂右取鷄子一枚煮熟剥取肉更用生鷄子二箇傾取白和熟研令細以帛褁之立定甘蘗散主著硇砂甘草黄栢白礬燒令汁盡右為末傅之瘡上普濟方卷三百一
