body:
  text: 普濟方卷二百五十明周王朱橚撰㿗疝門膀胱氣痛附論夫治膀胱氣痛不可忍醫者投剛劑其痛尤甚小便三日不通隂陽痞塞惟有待死適遇明醫投五苓散一兩分而為三分各用蔥鬚三根茴香及鹽少許連服中夜下小便如黑汁三升臍下寬得睡續服硇砂丸數日而安蓋此疾本因虛而得不宜驟補邪之所湊其氣必虛留而不去其病則實故必先滌所蓄之邪然後補之方金鈴丸出永類鈐方治膀胱腫硬牽引疼痛及小腸氣隂囊腫毛間水出并能治之金鈴子肉五兩茴香炒馬藺花炒海蛤兔絲子破故紙海帶各三兩木香丁香各一兩右為末糊丸如梧桐子大每服二三丸空心食前溫酒鹽湯任下蔥白散出三因方治一切冷氣不和及本臟膀胱發氣攻刺疼痛及治婦人産前腹痛致胎不安或血刺者兼能治血臟宿冷百骨節倦痛腹瘦怯弱傷勞帶癖久服盡除凡婦人一切疾病宜服川芎當歸枳殼麩炒去瓤厚朴薑製炒官桂去皮青皮乾薑炮茴香炒川楝炒神麯炒麥蘖炒三稜炮蓬术醋浸一宿焙人參茯苓芍藥木香乾地黃各一兩右為末每服三錢水一盞蔥白三寸煎七分入鹽少許熱服大便祕澀加大黃煎大便溏利則加訶子煎食前服治膀胱疝氣腎腫隂痛不可忍欲死者川楝子十個巴豆五個斑貓十個一處炒黃去巴豆斑貓不用沒藥五分八角茴香小茴香五分枳殼火炒五分右為末三分溫酒送下葫蘆巴丸治腎經虛冷膀胱氣痛或隂腫偏墜或小腹有物如卵上下走痛方見本門諸疝類葫蘆巴丸膀胱疝氣外腎腫大破故紙黑牽牛二味瓦器內炒大半留小半生右末别取大蒜入巴豆濕紙裹煨軟熱巴豆不用以蒜研入藥作劑可丸為度丸如梧桐子大每服三十丸茶清吞下青木香丸治膀胱疝氣腫痛及胸膈噎塞氣滯不行腸中水聲嘔噦痰逆不思飲食常服寬中利膈黑牽牛六兩炒香搗末三兩青木香一兩補骨脂炒香蓽澄茄檳榔用粟米飯拌以濕紙包火中煨紙焦去飯各二兩右為末入牽牛末令勻以清水拌和丸如梧桐子大每服五十丸溫熱水吞下又法出永類鈐方右用青木香丸二百粒斑貓七箇去頭足翅為末同置於文武火上慢炒令丸子微香以磁碟蓋銚上頓放在冷處少頃去斑貓末取丸每服五十丸茴酒下於空心服纍試之有驗茴香散出本事方治膀胱氣痛茴香金鈴子肉蓬莪荗荆三稜各一兩甘草五錢炙右為末每二錢熱酒調又云每發痛甚連日只二三服立定頃在徽城日歙尉宋姓膀胱氣作疼不可忍醫者以剛劑與之疼愈甚小便不通三日矣下虛脹心悶豫視之見其靣赤黑脈洪大豫曰投熱藥太過隂陽痞塞氣不得通為之奈何適有五苓散一兩許分三服用連鬚蔥一莖茴香一撮鹽一錢水一盞半煎分服中夜下小便如黑汁者一二升臍下寬得睡翌日診之脈已平矣續用硇砂丸與之數日瘥大抵此疾因虛得之不可以虛而驟補藥經云邪之所湊其氣必虛留而不去其病則實故必先滌所蓄之邪然後補之是以諸方借巴豆氣者蓋謂此也牽牛丸出危氏方治膀胱有氣服暖藥致成壅滯作痛黑牽牛三錢大黃二錢白礬一錢右用巴豆去皮三十粒先入銚炒焦乾去巴豆入衆藥炒香為末煨大蒜研細為丸茴香湯送下七丸治男子腎經虛弱膀胱為邪氣所搏結成皆因憂思愁慮失餐感寒疝氣攻痛有橫痃竪痃臍腹攻腠腰腳沉重不能舒伸服諸藥不效者宜速療之香附子一斤巴豆斑貓各五十個右同一處炒令香熱去巴豆班貓用艾葉煎醋打麵糊為丸如梧桐子大每服三四十丸用鹽酒下念珠丸出衛生家寶方治膀胱疝氣外腎腫脹痛不可忍乳香硇砂各三錢飛黃蠟一兩右乳香研細又同硇砂研勻鎔蠟和丸分作一百單八以線穿之露一夕次日用蛤粉為衣旋取一粒用乳香湯吞下頃年有人貨疝氣藥上擔人我二字以為照目日貨千有一國醫多金得之用之良驗金聖散治小腸膀光氣痛不可忍地膽五錢去翅足頭微炒滑石一兩硃砂五錢右為末每服二錢用苦酒調下食前金鈴子散出危氏方治膀胱疝氣閉塞下元大小便不通疼痛不可忍服之神效金鈴子四十九箇去核銼如麻豆大不得碎細用巴豆四十九箇去皮亦不得碎細同炒以金鈴子深黃為度去巴豆不用茴香一兩一方用鹽炒右不用巴豆將二味為末每服二錢食前溫酒調下一名抽刀散蔥白酒空心調服儒門事親金鈴散出直指方治膀胱小腸氣外腎腫痛方見本門諸疝類治膀胱氣右以葫蘆巴蘹香子桃仁治膀胱氣甚效配合惟桃仁用麩炒各等分半以酒糊丸半為散每服五七十丸於空心食前鹽湯下散以熱米飲調下與丸子相輪間空心服日各一二服治膀胱氣出本事方青礬一兩白礬一兩各為粗末右用小瓦罐子一隻入藥於內用麻皮縛緊鹽泥如法堅牢固濟炭五斤煉令通紅盡炭為度取出入鹽穴內去火毒二宿為末醋糊為丸如菉豆大每服十丸空心鹽湯下或白湯亦可金蓮散一名川楝散出肘後方治膀胱氣痛巴豆三十粒去殼截斷川楝子二十四箇湯浸去皮薄切片右用麩二合同炒令黃赤去麩與巴豆只用川楝為末每服二錢溫酒調空心服一方茴香湯下得泄為效余閲一切名方無如此方奇特有效治膀胱氣急宜下氣出肘後方右蕪荑搗和食鹽末二物等分以綿裹如棗大內下部或即下惡汁并下氣佳茴香飲出朱氏集驗方治膀胱偏墜疝氣八角茴香白牽牛炒右二味各等分為細末空心酒調下去斗丸治膀胱腎腫局方紅丸連翹丸青木香丸各一貼右用班貓二十一箇同藥用磁銚慢火炒令班貓黃黑色連藥傾在地上去火毒一伏時去班貓却將藥於袋中製去班貓屑分作十服空心酒吞服不飲酒或鹽湯下其病雖大如斗亦安香附子丸出經驗良方治膀胱氣腫痛香附子去毛淨洗用米醋煮乾為末醋糊為丸用木饅頭一箇生薑一小片連皮擂爛同炒入鹽少許將水一大盞煎兩三沸去滓咽下二十丸治膀胱氣痛用檳榔二枚一生一熟搗末酒煎服之療膀胱氣急宜下氣右用髙麗昆布一片白米泔浸一宿洗去醎味以水約一斗煮令向熟擘長三寸闊四五寸仍取蔥白一巨莖二寸切斷擘之令昆布極爛仍下鹽酢䜴披摻之調和如臛法不得鹽酸以生薑橘皮椒末等和宜食粳米飯或粳米粥海藻亦依此法極下氣大效無所忌兼金丸出危氏得效方治熱入膀胱臍腹上下兼脅肋疼痛便燥欲飲水按之痛者大黃濕紙裹煨八錢硝石桂心甘草桃仁四十箇去皮尖右為末煉蜜丸如梧桐子大每服五七丸至十丸米飲下婦人血閉疼痛亦宜服之茴香酒出朱氏集驗方治膀胱偏墜久不愈者右用燈籠草根渾酒却將茴香炒碾用此酒調下治膀胱氣痛方出朱氏集驗方有歙縣尉宋葡甫膀胱氣作痛不可忍醫者以剛劑謾與之痛愈甚溲溺不通三日許學士診其脈曰投以熱藥太過適有五苓散一兩分作三易其名用連根鬚蔥一莖茴香及鹽少許水一盞半煎七分連服用之中夜下小便如黑豆汁一二升臍下寬得睡及明日脈已平續用硇砂丸數愈此疾往來皆因腎虛按聖惠云腎氣虛風冷所侵流入于腎不能宣𣪚而致然也卵脹腸㿗難治獨氣㿗治之易愈人又有寒疝之氣注入㿗中名曰狐疝亦屬㿗病嚴氏云四㿗其治法橘核丸主之謾録于後黑牽牛四兩半生用白术五錢茴香五錢澤㵼二錢海金沙二錢巴戟五錢川棟子五錢去核南木香四錢右煉蜜為丸桐子大每服二十七丸虀酢汁下空心服治一切丈夫元陽虧弱膀胱小腸虛冷非時氣痛忽衝心脅疼痛難忍宜服此藥出護命方益智子去皮淨蓬莪荗各五錢茴香牛膝山茱萸牽牛炒熱續斷甘草芎葫蘆巴防風各一分右細杵羅為末每服三錢水一盞二分煎兩三沸空心和滓喫熱湯調下二錢七亦得腎氣附論夫腎氣內虛邪熱內入於腎經其脈洪大小便頻數所出澀少赤濁而痛此不可以牽牛行之治法瞿麥燈心煎湯調真料五苓散滲泄其熱邪水竇一通勿藥有喜方蔥白散出直指方治腎氣刺痛七氣通用當歸川芎枳殼製官桂青皮川白薑茴香炒川棟子陳皮紫蘇三稜煨蓬术醋浸一宿焙白芍藥茯苓木香各一兩人參沉香甘草炙各五錢右為粗末每服三錢蔥白二寸鹽少許煎服大便祕加大黃治腎氣奔豚氣穿山甲五錢麩炒木香海藻焙茴香各一兩全蝎十五箇去稍毒土狗子十箇去翅頭瓦焙乾黑牽牛頭末四兩香附子去皮破故紙麩炒各五錢吳茱萸一兩五錢右用蘿蔔一箇大者剜去心肉入吳茱萸在內用糯米一碗同蘿蔔煮熟飯爛為度次將蘿蔔細切入米飯擂細茱萸晒乾同前藥為細末用前藥與蘿蔔為丸如梧子大每服二十丸加至三十丸鹽酒送下食前服金鈴子丸出和劑方治腎氣發動牽引疼痛臍腹弦急攻衝不定金鈴子去核炒四兩益智仁葫蘆巴石菖蒲破故紙炒茴香巴戟去心各二兩木香白茯苓去皮陳皮去白各一兩右為末酒煮麵糊為丸如梧桐子大每服五十丸鹽湯溫酒下一用米飲下治腎氣半夏牽牛舶上茴香豬苓木通炒豬苓去通不用蘿蔔子炒牛去蔔子不用石薜茄炒茴香茄不用糯米炒去碙不用各一兩碙砂三錢炒糯去碙不用班貓三十箇炒半夏色黃去班貓不用右為末酒糊丸如桐子大每服二十丸至三十丸鹽湯酒送下金山老艾瓜丸出直指方治腎氣攻刺及腳氣酸痛通日皆得效葫蘆慢火炒牛膝酒浸焙舶上茴香酒浸炒肉蓯蓉酒浸焙續斷揀淨生用厚杜仲去粗皮薑製炒令絲斷天麻各二兩當歸酒浸沒藥别研各一兩右為末以艾去枝梗二兩大木瓜二枚切蓋去瓤入艾塞滿蓋定竹針插麻線繫蒸爛研細和藥為丸梧桐子大每服七十丸溫酒鹽湯任下通氣丸少隂不足腎氣微少忽為寒折太陽下陷人中腎氣奔迫內動三焦或發熱頭疼咳嗽痰促或右脅牽痛或傳為疹子等證不一其脈左盡沉而弦按之則虛大而澀又治上氣葫蘆巴炒杜仲炒斷絲各一兩補骨脂玄參三稜各五錢羌活茴香各三錢川楝子一兩五錢酒浸炒麻黃去節二錢春夏三錢右為細末麵糊為丸空心薑湯下五七十丸鹽酒下代炙膏木香附子吳茱萸蛇床子馬藺花各等分右為細末薑搗熱麵攤開貼痛處梔子散出直指方治腎氣虛中有熱小腹外腎肛門俱熱大小便不通梔子仁製枳殼各五錢北梗北前胡青木香赤茯苓車前子甘草各一分右銼每三錢新水煎服壯熱加柴胡大便祕加大黃柴胡桂枝湯出直指方治腎氣冷熱不調證柴胡一兩三錢人參桂枝白芍藥生薑各五錢半夏黃芩甘草炙各三錢右銼散每服四錢棗一枚水大盞煎七分溫服海藻丸治腎氣海藻四兩三稜六兩茴香九兩牽牛一兩二錢炒右為細末水糊為丸如梧桐子大每服三四十丸溫鹽水下青娥丸出和劑方治腎氣虛弱風冷乘之或血氣相摶腰痛如折起坐艱難俯仰不利轉側不能或因勞役過度傷於腎經或處卑濕地氣傷腰或墜墮傷損或風寒客摶或氣滯不散背冷腰痛腰間似有物重墜起坐艱辛悉能治一方加川續斷桃仁去皮尖玄胡索黑牽牛炒酌量入熱蜜丸亦可腹虛極十補湯吞下胡桃去皮膜二十箇蒜熬膏四兩破故紙酒浸炒八兩一方芝麻同炒去芝麻取末杜仲去皮薑汁浸炒十六兩右為末蒜膏為丸每服三十丸空心溫酒下婦人淡醋湯下常服暖筋骨活血脈烏髭鬚益顔色一方不用蒜一方或加炒生薑十兩治木腎乳香沒藥地膽蚖青去翅足有種木腎要知原乳沒將研各二錢蚖青地膽二錢半去翅為末亦同前共作二十有五粒能飲酒者飲三傳空心細嚼一丸下便如脫俗做神仙治腎氣橫竪弦柱痛及外腎腫脹川椒二兩小茴香生薑連皮紙包煨各二兩八角茴香八箇右作一服用井水一碗河水一碗無灰酒一碗同煎至一碗露一夜分為三盞再溫每日空心一服作三日喫如服畢以手摩臍下覺熱為驗甘豆湯出直指方治腎氣虛中有熱大小便不通黑豆三合甘草二錢銼薑七片右作一劑新水煎取清汁服三仙散出本事方治腎氣蓬莪荗一兩茴香三兩揀淨阿魏三錢真者右為末每服二錢溫酒調下治腎氣衝心右用五苓散一貼去官桂加茴香一撮作一服以水二盞鹽一捻蔥白一根煎七分不拘時服海浮石散出直指方治腎氣熱證小便祕澀黃赤右用海浮石為末每服二錢煎麥門冬赤茯苓湯調和下五苓散生車前子竹園荽赤茯苓麥門冬去心燈心烏梅右煎湯調下治腎氣小便不通兼治水結不散暑證通用苦楝丸出三因方治肝腎氣虛風冷相摶心腹絞痛攻刺腰背不能禁受注因氣腫癢疼痛久服養腎活血駐顔輕身奈老進美飲食川棟一十一箇銼碎分三去一用巴豆十粒去皮微炒焦黑色去巴豆不用又用斑貓七箇炒焦去斑貓又用海金砂七錢半同炒去海金沙不用茴香炒破故紙炒葫蘆巴炒木香炮各一兩烏藥右末酒糊丸如梧桐子大每服三五十丸湯酒任下金鈴子丸出仁存方治釣腎氣膀胱偏墜痛不可忍川棟子五兩銼五分一分用班貓一箇去翅頭炒去斑貓一分用茴香三錢鹽半錢炒熱去鹽留茴香入藥一分用牽牛三錢同炒去牽牛一分破故紙三錢同炒留故紙入藥一分用蘿蔔子一錢焙去蘿蔔子不用右將楝子去核同破故紙茴香焙乾為末酒糊為丸梧桐子大每服三十丸溫酒空心下小腸膀胱腫硬香附子海藻煎湯調下治腎氣偏墜伏道艾藥防風駱駝糞蔥子韭子右為細末用瓦桶去底安地上內用盤子盛灰以前藥末如裝香篆細細排滿盤內以火燒著却坐於瓦桶上合煙上熏隂囊候煙透徹其囊偏墜即滿補驗腰子散治腎氣作痛黑牽牛炒熟白牽牛炒熟等分右為末每服用三錢豬腰一副薄切開縫入川椒五十粒茴香一伯粒以牽牛末遍摻入腎中線繫濕紙數重裹煨香熟出火氣燈後空腹嚼喫好酒送下少頃就枕天明取下惡物即愈腎氣方右用大七氣湯加炒牽牛煎服又方右用生薑每多開小孔納以川椒濕紙煨透老酒嚼爛下治心痛霍亂腎氣腹腫右用檀香濃煎服水磨傅外腎并腰腎痛處奪命丹吳茱萸半斤分作四分酒醋小便米泔四處浸三宿取出晒乾用藥為末加海帶海藻海螵蛸澤㵼共四味同為末酒糊為丸如梧桐子大每服二三十丸食前酒送下雄黃丸治腎氣大便不通酌量輕重右以溫白丸用枳殼散下白羊肉湯益腎氣強陽道右用白羊肉半斤去脂膜切作生以蒜虀食之三日輒一度甚妙椒附散治腎氣上攻項背不能轉移大附子一枚六錢以上者炮去皮臍末之右每服二大錢好川椒二十粒用白麵填滿水一盞半生薑七片同煎七分去椒入鹽通口空心服本草方云腎氣自腰夾脊上曹溪穴然後入泥宫曹溪一穴非精於般連者不能透今逆至此不得通用椒以引歸經則安矣蕭上達椒下達詩言椒聊且貽我握椒皆此意也治卒腎氣衝脅如刀刺痛喘息不得亦甚理小腸氣右用蘹香子生搗韭葉汁一合投熱酒一盞服之通神丸治腎氣偏墜疝氣腫痛水流不止兼腎癰此藥去敗濃勻和下消膜外腫脹大桃仁二百箇去皮尖研以童子小便一盞半石器文武火熬成膏刮出真阿魏三分乾蝎十箇全者去毒真麝香五分右三味研末桃仁和丸如梧桐子大空心酒下二丸日進二服增損腎氣丸填補止渴泗洲楊吉老傳乾地黃二兩薯蕷澤㵼已上各四兩茯苓牡丹皮附子炮去皮臍桂心去皮已上各一兩山茱萸五兩右為細末蜜和為丸如梧桐子大每服十丸溫酒送下空心食前治丈夫腎氣疼痛不可勝忍悶絶欲死諸般氣藥不可救療緣此氣候胸膈有涎以此投藥不驗但寸關脈氣覺似洪大却沉伏俱是有涎宜服此方延胡索官桂鱉甲醋炙檳榔芎半夏狼毒捶碎醋二碗同芫花土器內煮乾炒黃黑色木香各一分芫花牽牛各一兩吳茱萸三錢當歸牛膝大黃醋炙各一分羌活五錢右件藥爛研芫花狼毒二味為末牽牛半夏二味自作一處杵羅為末所餘衆藥合作一處杵羅為末每服六錢半芫花狼毒末半錢牽牛半夏末三錢衆藥末三錢合為一服以水一盞二分生薑二片蔥二枝瓦鍋內煎兩沸急㵼出和滓空心熱服吐出膠涎即安若未吐連進服尚未吐即轉下膠痰便得安效若喫藥了已吐膠涎即便喫後方藥治丈夫腎氣喫前面方藥取痰出後便宜服此方令安效荆三稜殭蠶去絲連翹羌活當歸沉香延胡索桑寄生木香芎各等分右細杵羅為末每服二錢水一盞煎兩沸㵼出非時服治丈夫一切腎氣婦人血氣疼痛不可勝忍面青脣黑幾於不救丈夫則攻擊臟腑腰背拳曲婦人則腹中成塊結為癥瘕忽驟然疼痛便至危困忽經年纍月痛無暫停並宜服此此藥神驗不可具述芫花四兩沒藥麒麟竭延胡索蓬莪荗荆三稜牽牛醋浸焙乾使木香各五錢當歸芍藥各二兩狼毒五錢捶碎同芫花於土器內醋炒黃微黑色右先修製芫花狼毒乳鉢內研如塵又將麒麟竭沒藥亦作一處研如飛塵所餘衆藥共作一處杵羅為末方將芫花狼毒麒麟竭沒藥等末滚令均更爛研千百遍每服一錢五分氣痛時蔥酒調下和滓喫不通飽食後喫也若是大腑祕熱出後不通脣皮焦赤口中涎溢喫此藥一盞不見驗自别有方上乃卷中第一方是也治腎氣受邪相刑於心心既受病先診其腎脈其病證若是腎邪干心即宜先喫此退腎邪散辰戍年六丙年多有此候心有冷病先喫此方萆薢牛膝茯苓石斛續斷天靈蓋酥炙各半兩羌活獨活木香芎各一分以上細杵羅為末以小便少許化麝香三銖對蜜同煉丸如梧桐子大空心鹽湯下三十丸三仙丹出醫學切問安和腎氣進美飲食壯陽事川烏半兩炒蒼术三兩米泔水浸茴香一兩山藥一兩金鈴子四兩去皮核肉炒萆薢五錢青鹽破故紙一兩右為末酒糊為丸如梧桐子大每服三十丸溫酒送乾物壓之此藥行四方皆不伏水土山嵐瘴氣去風濕避寒暑進飲食厚腸胃令人肥長志有精神治渾身走注痛和血脈治冷積去寒疝氣小腸痛添精補髓和血駐顔壯筋骨身輕體健明目暖水臟行如風語如鍾百病不生黑髮鬢此藥延年益壽無干妄方得如持長陽之事不可相傳如獨居無婦陽氣豪旺不可當如説修真煉性道氣吞靈淫戰行除此藥休言矣大有利益所説功效不可具述玉抱肚溫暖丹田薰蒸腎囊藹如春意大有功效出德生堂經驗方川烏川椒小茴香破故紙葫蘆巴官桂良薑馬藺花白芷甘松乾薑吳茱萸川楝子海藻青木香乳香沒藥各五錢好艾四兩碾末先鋪在裹肚上後用藥末右細末用細絹做夾裹肚一腰前襜覆過臍腹下斜尖如匾稍狹覆護隂囊别作稍尾以帶抄住于後不礙小淨手遇大淨手取下後襜上覆腰與腎堂不及腎上裹肚前後襜各鋪綿用前藥末勻摻入綿微灑以水薄皮紙蓋上綿綴定住翻綿在內如入綿衣縫纜常用拴裹腰腹護囊使藥氣熏逼功用至神治丈夫腎氣方見本門治腎氣類育腸氣附論夫腎者內藏於精精舍於志與膀胱為表裏俱主於水液其氣貫於小腸而通於隂陽不調臟腑衰損將攝乖失腎氣虛微為邪冷之氣所侵傳注小腸則令小腸連隂疼痛故號育腸氣也方蓽澄茄散出聖惠方治育腸氣小腹疼痛不可忍蓽澄茄檳榔木香苦楝子蘹香子碙砂細研入各一兩乾蠍微炒阿魏麵裹煨麵熟為度吳茱萸湯浸七遍焙乾微炒各五錢桃仁三分湯浸去皮尖雙仁麩炒微黃右搗羅細為末每服不用時候以熱生薑湯酒調下二錢磁石丸出聖惠方治育腸氣久患不瘥磁石一兩炒醋淬七遍搗碎細碎水飛過用硇砂一兩木香一兩乾蠍微炒白礬灰自然銅細研阿魏研入各五錢陽起石三分酒煮半日細研水飛過銀末半分右先研硇砂以醋調塗於銅葉上以新盆蓋七日刮取緑細研諸藥别搗羅為末同研令勻用醋煮麵糊和丸如菉豆大每服食前以生薑酒下十丸八仙丸出聖惠方治育腸氣桃仁湯浸去皮尖雙仁麩炒微黃木香髙良薑銼青橘皮湯浸去白瓤焙各三分阿魏麵裹煨麵熱為度腽肭臍酒刷炙微黃各五錢桂心五錢乾蠍一分微炒右搗羅為末用醋浸蒸餅和丸如梧桐子大每服食前以熱酒下二十丸桃仁丸出聖惠方治育腸氣疼痛不可忍桃仁湯浸去皮尖雙仁麩炒微黃木香各三分阿魏麵裹煨熟為度乾蠍微炒苦楝子桂心芫花醋拌炒黃各五錢檳榔一兩右搗羅為末以醋浸蒸餅和丸如梧桐子大每服不拘時候以熱生薑酒下一十丸蛜􅖉丸治育腸氣發歇疼痛不可忍蛜􅖉補骨脂各一兩蘹香子木香阿魏馬藺花苦棟子各五錢桃仁二兩湯浸去皮尖雙仁麩炒微黃右為末以桃仁膏和搜為丸如梧桐子大每服不計時候以熱酒下十丸沉香散治育腸氣疼痛沉香葫蘆巴肉豆蔲去殼桂心蘹香子各五錢檳榔木香各二分右搗羅細為散每服不計時候以溫酒調下二錢緑雲丹治育腸氣疼痛手足逆冷硇砂一兩硫黃雄黃蛜􅖉阿魏青鹽各五錢右藥同研令勻細入釅醋調令稠塗於銅鈔鑼裏合於淨地上四畔以泥密封經五日後刮取藥細研以醋煮麵糊和丸如粟米大每服不計時候以熱生薑酒下五丸蘹香散治育腸氣小腹連隂疼痛蘹香子苦棟子炒微黃檳榔各一兩木香青橘皮湯浸去白瓤焙各五錢右為散每服二錢以水一中盞入生薑半分煎至五分和滓不計時候熱服木香丸木香苦棟子蓬莪荗蘹香子桂心各一兩右為末用生漆和先以生油塗手丸如梧桐子大隂乾每服不計時候以熱酒下十丸阿魏丸阿魏硇砂用酒一大壺與阿魏同熬成膏苦棟子炒微黃附子炮裂去皮臍各一兩木香三分右為末入硇砂膏和丸如梧桐子大每服不計時候以熱生薑酒下十丸硇砂丸硇砂二兩研為末以醋煎稠塗於多年銅照子檳榔木香蘹香子各一兩沒藥半兩右為末入硇砂研令勻以糯米飯和丸如豆大每服不計時候以熱生薑酒下七丸苦楝子丸馬藺花以瓷器內炒令微黃芫花醋淬微炒各一兩葫蘆巴苦棟子各五錢右為末以醋煮麵糊和丸如梧桐子大每服不計時候以熱酒下十丸硇砂丸硇砂一兩朱砂雄黃各半兩右藥同研如粉入頭醋調令稀稠得所用青銅錢一百文洗刷令淨後以鹽水煮過揩乾於淨地上以炭火燒令赤以醋灑過更燒如此三遍淨掃却浮灰鋪錢在燒處以雞翎塗藥在錢上取新瓦盆子蓋周回以濕土壅縫更以水灑周廽常令濕潤如此七日後取出以鋼刀刮下細研同醋煮麵糊和丸如菉豆大每服不計時候以熱生薑酒下十丸諸㿗附論夫隂㿗者由腎氣虛為風冷所侵流入腎經不能宣散故也㿗有四種有腸㿗有卵㿗有氣㿗有水㿗腸㿗卵㿗難瘥氣㿗水㿗針炙易愈也方蒺䔧方蒺䔧子乾地黃各十分鹿茸炙十分白斂八分磁石十分研礜石煉十分鐡精桂心續斷各五分巴戟天芍藥玄參通草升麻牛膝桑寄生射干海藻如髮者各八分澤㵼七分蓯蓉右為末以蜜和為丸如梧桐子大飲下十丸日二漸增至二三十丸忌食生蔥蕪荑生血等物黃耆丸治隂㿗核腫疼痛黃耆銼桃仁五兩微炒去刺山茱萸五加皮檳榔各二兩白蒺䔧湯浸去皮尖雙仁麩炒微黃海藻洗去鹹味玄參各二兩五味子四兩五錢肉蓯蓉酒浸一宿刮去皺皮炙乾牛膝去苗赤茯苓枳殼麩炒微黃去瓤一方用枳實人參去蘆頭續斷桂心逺志去心各一兩石南一兩龍骨二兩右為末煉蜜和搗二三百杵丸如梧桐子大每服於空心及晚食前溫酒下三十丸一方無五加皮亦治隂疝氣攻腫痛茱萸內消丸出和劑方治隂㿗偏大上攻臍腹疼痛膚囊腫脹疝氣為病由腎氣膀胱經虛為邪所襲伏留不去結成寒疝隂囊偏墜氣刺奔豚痃癖時發疼痛初發心必先寒壯熱甚者嘔逆惡心或生瘡瘍時出黃水腰腿沉重足脛腫滿行走艱辛服之內消不動腑臟大腹皮川棟三兩銼炒五味子海藻洗玄胡索各二兩五錢茴香炒枳實麩炒去瓤川烏炮去皮尖吳茱萸一方無青皮白蒺藜各二兩桔梗橘紅桃仁麩炒别研各一兩木香一兩五錢石茱萸山茱萸此二茱萸用帶溺豬胞裝入線縫酒煮乾取出焙乾為末各二兩右為末酒糊丸如梧桐子大溫酒下三十丸木香流氣飲兼服效一方無白蒺藜枳實橘紅一方有馬藺花山藥白蒺䔧丸出聖惠方治隂㿗腫大白蒺䔧微炒去刺熟地黃乾鹿茸去毛塗炙微黃白斂各二兩半磁石三兩燒醋淬七遍細研水飛過鐡精細研桂心續斷各一兩巴戟赤芍藥玄參木通海藻洗去鹽味牛膝去苗桑寄生澤㵼肉蓯蓉浸一宿刮去皺皮炙乾各二兩射干一兩五錢右為末入研了藥令勻煉蜜和搗五七百杵丸如梧桐子大每於空心及晚食前溫酒下三十丸治㿗丸出千金方桃仁蜘蛛各十五枚桂心蒺䔧子地膚子澤㵼防風五味子橘皮茯苓防葵芍藥各二兩牡丹皮細辛海藻各一兩狐隂一具右為末蜜和丸如梧桐子大每服十丸稍加至三十丸桃仁丸出聖惠方治隂㿗腫痛桃仁湯浸去皮尖雙仁麩炒微黃海藻洗去鹽味各二兩澤㵼防風去蘆頭防葵桂心赤芍藥青橘皮湯浸去白瓤焙五味子白蒺䔧微炒去刺地膚子赤茯苓細辛牡丹各一兩狐隂一具炙微黃右為末煉蜜和搗三二百杵丸如梧桐子大每日空心及晚日前溫酒下三十丸治隂㿗偏大出聖惠方白蒺䔧微炒去刺鹿茸去毛塗酥炙微黃白斂磁石燒醋淬七遍搗碎細研水飛過肉蓯蓉酒浸一宿刮去皺皮炙乾各一兩鐡精細研桂心木通銼牛膝去苗玄參桑寄生澤㵼各半兩熟乾地黃一兩右為末煉蜜和丸如梧桐子大每於食前溫酒下三十丸橘核丸出仁存方治四種㿗病卵核腫脹偏有大小或堅硬如石或引臍腹絞痛甚則膚囊腫脹或成瘡毒輕則時出黃水甚則成癰潰爛橘核炒海藻洗昆布洗海帶洗川楝肉取肉炒桃仁去皮尖炒各一兩厚朴薑炙木通枳實炒玄胡索桂心不見火木香各五錢不見火右為末酒糊丸如梧桐子大每服六十丸空心鹽湯任酒下虛寒者加川烏一兩腎腫久不消加硇砂二錢醋煮旋入有熱氣帶者加黑牽牛大黃各五錢狐隂丸出聖惠方治腎氣隂㿗腰膝冷疼隂囊腫癢狐隂一隻炙微黃木香白蒺䔧微炙去刺昆布洗去鹽味腽肭臍酒刷炙黃檳榔各一兩五錢石斛去根銼桃仁湯浸去皮尖雙仁麩炒微黃各二兩五錢牛膝去苗兔絲子酒浸三日曝别搗為末各二兩右為末煉蜜和搗三五百杵丸如菉豆粒大每於食前溫酒下二十丸至三十丸日再服忌熱麵蕎麥豬魚粘食等物大戟丸一名麝香大戟丸治隂㿗腫脹或小腸氣痛出三因方大戟去皮銼炒黃五錢葫蘆巴四兩炒木香一兩大附子炮去皮臍一兩舶上茴香六兩訶子煨去核檳榔各一兩川棟五兩後入麝香半分别研右為末獨留川楝以好酒一二升蔥白七枚長四寸煮川楝子軟去皮核取肉和上件藥丸如梧子大空心溫酒下五七丸至十丸薑湯亦得潮發疼痛炒薑熱酒下十五丸天雄散出聖惠方治㿗便大腫痛天雄四顆炮裂去皮臍桃仁半斤湯浸去皮尖雙仁研川棟子三十枚葫蘆巴五兩胡椒乾蠍微炒各一兩海藻三兩洗去鹽味蘹香子三兩右用酒二斗於銀器內盛日煎二七日曝乾搗細羅為散入桃仁研令勻每於食前溫酒下二錢七珍散出海上方近陳拙存有此證乃全腹赤光而微疼痛和與此藥服之無效反有所害五苓散加黑牽牛炒茴香共七味白水同煎服之不愈再與塌氣丸出海上方右以黑牽牛分作三分一分用硇砂同炒一分用破故紙同炒一分用剛子同炒各去同炒三味止用牽牛研為末糊之如菉豆每服七十丸空心紫蘇湯下之拙存服此二藥其疾愈甚連小腹皆脹滿以此知必不可用㵼腎也故録此以戒將來云療超躍舉重卒得隂㿗出聖惠方白术五分地膚子十分桂心一分右搗末以飲服一刀圭日三忌生蔥桃李雀肉等物一方溫酒調下三白散出和劑方治膀胱藴熱風濕相乘隂㿗腫脹大小便不利白牽牛略炒二兩白术五錢桑白皮陳皮木通各五錢右為末每服二錢薑湯調下空心服初進一服未覺再進此藥不損臟氣只導利留滯疝方大率多用熱藥此方唯壅熱證宜服之昔時人患隂囊腫脹屢嘗試之有驗過謂此藥以為㵼腎藥太過爾抵聖丸出三因方治膀胱有熱多因天氣熱而發隂㿗腫滿赤痛大便祕欲飲水按之臍腹痛續隨子薏苡仁郁李子茵芋白牽牛各一錢略炒右為末滴水丸如桐子大五丸一方用香薑散咽黃昏服五更利下惡物效治腎虛隂㿗腰膝冷疼隂囊腫癢出聖惠方狐隂一隻炙微黃海藻洗去鹽味牡丹各五錢桂心三分右為末煉蜜和丸如梧桐子大每於食前溫酒下十五丸小兒服五丸治㿗隂卵偏大有氣上下脹痛或行走便發腫黃蘗銼牡丹桂心防風去蘆頭各五錢右為末散每於食前溫酒下二錢荔核散出危氏方治腎大如斗不過數劑除根舶上茴香青皮荔枝核右等分銼散炒出火毒為末酒下二錢日三服蜘蛛散一名蜘蛛丸出三因方治隂狐㿗氣偏有大小時時上下脹人蜘蛛十四箇熬焦桂心五錢右為末蜜丸梧子大米飲下十丸為散取八分飲和服日再治腎虛隂㿗腰膝冷疼隂囊腫癢出聖惠方漢椒一兩去目入閉口者微炒去汗昆布半兩洗去鹽味右為末用好酒煮麵和丸如梧子大每於食前冷椒湯下十丸治㿗方出千金方右用楊栁枝如腳趾大長三尺二十枚水煮令極熱却以故布及氊掩腫處取熱栁枝更互柱之如此取瘥治隂㿗右以取白頭翁根生者不限多少搗之隨遍腫處悉敷之一宿當作瘡二十日愈香附散出三因方治㿗脹及小腸氣右以香附子不拘多少為末每用酒一盞煎海藻一錢候煎至半盞洗撈海藻嚼細用所煎酒調香附子細末二錢服一方以海藻為末以熱酒用調尤妙甚劇者灌之一方熱酒下荆芥末治㿗卵腫痛右用昆布汁咽之一方酒煎服治水㿗偏大上下不定疼痛右以取牡礪不限多少鹽泥固濟三升煆令火氣盡却取二兩乾薑二兩炮共為細末冷水調稀稠得所旋塗病處小便小利即愈牡丹散療㿗偏大氣脹不能動方牡丹桂心一方作桂枝防風鐡精豉熬各等分右為末搗篩酒和方寸匕服之小兒一刀圭二十日愈嬰兒以乳汁和大豆喫之大效忌生蔥胡荽一方以䜴汁調下一方治病後交病勞復隂㿗腫縮入腹絞痛或便不通右用蚯蚓數條絞汁服之以敷囊外即愈祕傳茱萸內消丸治腎虛為邪所襲留伏作痛隂㿗便大或生瘡出黃水吳茱萸半酒半醋浸一宿焙乾山茱萸蒸去核馬藺花醋浸焙川楝子蒸去皮核官桂黑牽牛炒去末舶上茴香用鹽炒延胡索略炒橘皮青皮去白海藻浸洗去鹽炒各一兩桃仁浸去皮炒白蒺䔧炒杵皮核木香各五錢右為細末酒麵稀糊丸梧桐子大每服四十丸食前溫酒鹽湯任下治隂卵㿉疾去熱風可作湯沐右用地膚子與陽起石同服主丈夫隂痿不起補氣且益力橘核丸治四種㿗病卵核腫脹偏有大小或堅硬如石或引臍腹絞痛甚則膚囊腫脹或成瘡毒輕則時出黃水甚則成癰潰爛橘核炒海藻洗昆布洗海帶洗川棟子取肉炒桃肉麩炒各一兩厚朴去皮薑製炒五錢右為末酒糊為丸每服七十丸空心鹽酒鹽湯任下虛寒甚者加炮烏一兩堅腹久不消者加硇砂二錢醋煮旋入治㿗氣初入隂囊疼痛腫起小腹兩畔相連腰胯處有兩條絃急疼痛不可勝忍行動難阻急於痛處絃上著炙斷其根脈然後喫此藥大腑熱脣焦赤方可喫荆芥穗白蒺䔧去刺各五錢連翹羌活木香黃茋防風蔓荆子獨活芍藥山梔牽牛各一分右細杵羅為末每二錢食後熱湯調下仍是空心喫後方荆三稜二分白蒺䔧去刺一兩延胡索當歸檳榔官桂木香各一分半夏芫花牽牛醋煮狼毒捶碎好醋一碗同芫花於土器炒令乾微黑色不要焦各四銖右為細末煉蜜丸如梧桐子大空心熱湯下三十丸大腑冷方可喫療㿗方右單以桃仁搗敷之亦療婦人隂腫乾即易治男子隂㿗右以狸隂莖燒灰東流水服之治隂卵㿉疾右以地膚子作湯沐之普濟方卷二百五十
