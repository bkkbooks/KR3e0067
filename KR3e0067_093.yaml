弱不收便利無度口面喎斜乾薑附子各八兩桂心麻黄各四兩芎藭三兩右㕮咀以水九升煑取三升分三服三日後服一劑輕骨丹治脾胃虛弱血氣虧耗風邪相攻半身不遂少氣汗出宜服狗脊去毛木鱉子去殻五靈脂草烏頭去皮各等分右並生用為末醋煑麵糊用東南引桃柳枝各七莖攪候糊成和丸如梧桐子大隂乾每服七丸温酒下不拘時候趂風膏治中風手足偏廢不舉川山甲左癱用左足右癱用右足紅海蛤如棊子大川烏頭大者生用二兩右為末每用半兩搗葱白汁和成厚餅約經寸半貼在所患一邊脚中心用舊帛緊縳定於無風處室中椅子上座椅前用湯一盆將貼藥脚於盆内浸仍用人扶病人恐汗出不能支持候汗出即急去了藥汗欲出身麻木得汗週遍為妙切宜避風自然手足可舉如病未除候半月二十日以後再依此法用一次自除根本仍服治風補理藥忌口逺慾以自養枲耳散專治半身不遂口眼喎斜肢體麻痺皆可服之方見諸雜類八生飲子治半身不遂手足無力由飲食起居失節陽氣不歛風邪所侵若服補劑則風毒愈固其病尤難治矣宜以歛陽消隂踈風去濕之藥必可取效服之旬日以手足輕脚膝有力為驗可戒羊肉猪頭動風氣物切不可針炙也天雄二兩此藥最佳無則以大附代之去皮大川烏二兩去皮天南星白附子天麻白术各二兩川芎木香全蝎羌活拌全用半夏各半兩同天雄附子南星川烏并生用右件並生用剉如麻豆大每服水五盞生薑一兩切片子每藥一兩半文武火煉取一盞半更以水二盞再煉第二遍取一盞又用水三盞再煉第三遍取一盞共煉三盞一處和合分作三服空心稍温服一日可服此三盞舒筋丸治療同前蒼术削去皮酥炙川牛膝去蘆剉肉蓯蓉剉木𤓰去穣各一兩並酒浸一宿焙乾虎脛骨一兩酥炙附子一兩半炮去皮臍乳香沒藥研官桂不見火右件為細末酒煑麵糊為丸如梧桐子大每服五七十丸温酒空心送下日二服附子大獨活湯治男子婦人體虛中風半身不遂左癱右瘓口眼喎斜手足嚲曵經脉攣縮足膝軟弱四肢酷冷肌肉頑痺骨間疼冷行歩艱難及風濕相摶闗節酸痛自汗惡風項急面目浮腫兼療八風五痺乆患頭風毎遇隂雨發則頭疼項强節𦂳頭暈憎寒嘔吐發渴不已一切風氣虛損不足並宜服之白殭蠶人参肉桂乾葛白芍藥當歸各九兩川獨活十六兩大附子九枚防風甘草各二兩右為㕮咀每服三錢水二盞煎至一盞去滓無時温服其驗如神中風者此藥不過十服立見殊效也風藥聖餅子治男子婦人半身不遂手足頑麻口眼喎斜痰涎壅塞及一切踈風他藥不能治者小兒驚風大人頭風婦人血風並宜服之川烏二兩生用草烏一兩生荆芥一錢半防風七錢半蒼术五錢白附子五錢藿香二錢半川芎五錢香白芷二兩雄黄一錢六分白殭蠶五錢何首烏五錢麻黄一兩去節乾薑二錢半右為細末醋打麵糊為丸如梧桐子大捻作餅子每服二餅細嚼破茶清送下食後服之治一切風疾半身不遂口眼喎斜或成癱瘓或生煩熱拽或腿膝無力手足沉重四肢不舉頭目昏眩語言蹇澁心神煩躁大腑祕熱一切風病證候並宜此方出䕶命方麻黄一兩去根附子炮去皮荆芥穗木香蔓荆子細辛人参沉香藿香殭蠶桔梗防風天麻乾蝎烏蛇酒浸去骨如白花蛇修製伏牛花菊花芎藭羌活天南星半夏薑汁煑洗十餘次獨活麝香當歸各一分龍腦三銖牽牛二分右除麝香龍腦二味了所餘衆藥味都作一處杵羅為末却入麝香等相研令匀細毎服四錢煎薑湯半盞薄荷湯半盞相對入藥末更煎一服和滓空心頓服盖衣被以出汗為度若汗未出煑葱粥入生薑一二片同煑喫半碗投之仍盖衣被出汗為度若臟腑傷冷只用生薑一片濃煎湯後入藥末更煎一沸空心頓服也取汗如前法若是初中即如此發汗若中已多時只平常服毎服一錢半非時薄荷湯調下和滓喫也大腑冷不可喫搜風順氣飲子出海岱居士袐方治男子婦人半身不遂節脉拘攣脛酸肢體困倦口眼喎斜語言蹇澁濕痺渾身骨痛或麻木不仁無問乆新並宜服之大黄五錢甘草五錢當歸一錢防風二錢朴硝六錢白芍藥三錢天麻三錢右㕮咀作一服用水二大盞去租食前温服以利取效渣再煎服治半身不遂頑痺腰膝疼痛或走不定狀如結核出余居士選奇方芎藭附子杏仁川當歸甘草生薑各四兩石膏十四分麻黄人参防風肉桂右搗為細末以水一盞煎至七分服加减沖和湯出衛生寳鑑順徳府安撫使張耘夫年六十一歳於己未閏十一月初得風證半身不遂言語蹇澁心神昏憒躁熱自汗表虛惡風如洒雪水口不知味鼻不聞香臭聞音則驚悸小便頻大便結燥若用大黄之類下之却飲食减少不然滿悶晝夜不得瞑目最苦於此約三月餘凡易三醫病全不减至庚申三月七日又因風邪加之痰𠻳嗌燥疼痛不利唾多中脘氣痞似噎予思之内經有云風寒傷形憂恐忿怒傷氣傷氣臟乃病臟病形乃應又云人之氣以天地之疾風感之此乃風氣下䧟入隂中不能生發上行則為病矣又行藥志若病生於脉神先病也邪風加之邪入於經動無常處前証互相出見治病必求真本邪氣乃服論時月則宜升陽補脾胃㵼風木論病則宜表養衞氣㵼風木潤燥益元氣節喜怒是治其本也以此藥治之柴胡升麻黄耆各五兩半夏二分陳皮人参芍藥各二分當歸三分甘草炙三分黄藥湯洗二分右件剉如麻豆大都作一服水二盞煑一盞温服如自汗多加黄耆半錢𠻳者加五味子二十箇晝夜不得睡乃因心事煩擾心火内動上乘陽分衞氣不得交入隂分故使然也以硃砂安神丸服之由是晝亦得睡十日後安撫曰不得睡三月餘今因睡不已莫變他証否曰度此乃衛氣交入隂分循其天度故安穏而得睡也何病之有焉十三日晡㣲有悶亂不安與前沖和湯又加柴胡三分以升少陽之氣飲三服至十五日全得安卧自汗惡寒燥熱胸膈痞滿小便多服藥之後减半大便一日二行鼻聞香口知味飲食如常脉㣲弦而柔和按之㣲有力當歸連翹湯治眼白睛紅隱澁難開宜熱洗之方見眼目門一切眼疾雜治類𤣥参升麻湯治咽喉中妨悶㑹厭後睡舌赤早辰語言快利午後㣲澁方見咽喉門咽喉中如有物妨悶類大阿膠丸出楊氏家藏方治一切中風半身不遂口眼喎斜并産後中風及風氣注痛逰走不定白花蛇酒浸取肉四兩烏蛇酒浸取肉虎脛骨酥炙海桐皮赤箭已上四味各三兩麻黄去根節蟬蛻去上天南星酒浸一宿木香白殭蠶炒去絲嘴半夏湯洗煑薑汁製附子炮去皮臍尖白术已上八味各二兩半全蝎去毒粳米炒香白芷防風去蘆頭白附子川芎已上五味各二兩阿膠蛤粉炒沒藥别研肉桂去粗皮細辛去土葉人参去蘆頭犀角屑硃砂别研麝香别研已上八味各一兩半右件同為細末煉蜜為丸一兩作十丸空心生薑酒磨下小兒每丸分作四服薄荷湯下乳香宣經丸出仁存方治中風寒濕半身不遂手足頑麻骨疼手腫惡寒發熱漸成脚氣或閃肭傷筋骨男子疝氣婦人血不調葳靈仙苦葶藶黄耆續斷蒼术陳皮烏藥茯神右各半兩毎須用木𤓰一箇在内如常法三蒸三曝蒸時用酒洒然後焙乾為末研𤓰膏為丸如梧桐子大毎服十五丸鹽湯温酒任下食前八味順氣飲出德生堂治中風得病之源多因憂思欝結心神不安又為酒色過度邪氣乘虛入腠理以致半身不遂口眼喎斜語言蹇澁神志昏憒骨節攣拳痰涎壅滯麻痺不仁遍身疼痛此疾先當調氣不當治風大宜服之人参白术白芷烏藥青皮陳皮白茯苓各一兩甘草半兩如痰盛可加南星半夏各半兩如氣不順加黄木香半兩右㕮咀每服五錢水盞半煎至七分去滓温服無時服如藥有南星半夏必加生薑七片棗一枚同煎服臨時可服活絡丹或青州白丸子蘇合香丸三藥相間服之烏金煎出經驗方治中風半身不遂手足麻痺疼痛大附子二箇生去皮臍重一兩雄黒豆一百粒右用水一大碗入銚子内煮候豆爛則先漉出豆其附且於豆汁内更煑直令汁乾不令焦爛取附子收起貯於空瓶將黒豆以温水淘過先取一粒至十五粒入口爛嚼如糊未得嚥下更遂旋將黒豆嚼直候一百粒一齊嚼爛如糊滿口便用熱酒半盞猛衝下别用熱酒半盞潄牙縫内黒豆滓令净嚥下然後就患處一邊卧被覆必有汗出明日又將收起之附子依前煮黒豆一百粒嚼服第三日亦依前煮服訖方將治附二箇劈為八片各以濕紙包裹每日空心爛嚼一片熱酒下如前法並逐日被覆取汁後甚者不過似此三兩次用效當見人用此藥數無疑聖散子出經驗方治偏風半身不遂一切風麻痺疼痛及破傷急風等川烏頭皮小皺有蘆頭者可用削去皮先丸無蘆頭者不可用四兩川芎當歸藁本防風桂不見火天南星生雄黄研入已上各半兩白芷乾薑生已上各一兩右十味為末毎服一匙用煨葱白麝香酒調下空心食前服病甚可服半錢踰時方可進飲食治熱風中人忽悶倒不知人事半身不遂口眼喎斜其病所起盖因酒色之傷或多服熱藥後恣行忽愛食油膩上焦氣滯下部氣弱精原空竭上膈氣昏致生斯病其病候必先於一年或數月前覺上膈氣昏睡中口内生涎頭目昏重忽然悶倒不知人事喉中涎併膠涎滿口宜服取涎散後服踈風氣方若喉中潮涎併多填塞喉方進取涎散若無潮涎只是口眼喎斜不宜進此藥出獲命方治風痰取涎散方出楊子建獲命方湏識是熱方可喫半夏三分硝石半兩牽牛一兩羌活獨活麝香荆芥穗天南星殭蠶各一分右為細末毎服四錢熱湯調下和滓喫若人牙闗急口不開急以木杓柄斡開口灌之以吐涎為度未吐更進一服治熱風中人悶倒不知人事先要喫前面取涎散子後喫此踈風氣方臟腑熱方可喫出楊子建獲命方荆芥穗防風桑寄生羌活芍藥乾蝎天麻白花蛇酒浸十餘度炙黄熟去骨不用只用肉附子大去皮炮半夏麻黄去節木香蔓荆子川芎殭蠶去絲沉香麝香硃砂牡丹皮去心官桂各一分龍腦三銖右為細末了然後入硃砂龍腦麝香同研令如塵每服三錢以薑三片濃煎薄荷湯調下食後喫治大風半身不遂出楊子建獲命方方見本門大風癩類風腰脚不遂附論夫風腰脚不遂者腰脚運用不能相繼也盖肝主筋腎主骨肝腎氣虗風邪攻之則流傳筋骨走注腰脚故令機闗不利不能相随也方金鳯丹出聖濟總録治肝腎乆虛風邪攻注腰脚不遂五靈脂天麻酒浸一宿焙各三兩烏頭炮製去皮臍楓香脂研各二兩乳香研各一兩地龍去土炒三兩半沒藥研半兩木鱉子去殻二兩海桐皮剉一兩黒豆去皮各一兩草烏頭炙薄荷葉乾蝎全者去土狼毒炮各一兩牛膝酒浸切焙一兩丹砂研半兩附子炮製去皮臍各一兩當歸切焙一兩自然銅煅醋淬骨碎補去毛虎骨酥炙各一兩龍腦研麝香研各一錢右為末以生薑葱白汁和丸如鷄頭大每服一丸生薑葱酒下走注風乳香酒下卒中風薄荷酒下半身不遂煎松明酒下婦人産後破血氣煎黒豆酒下不可食葱婦人産後虛腫及頭面生瘡偏身痒痛白芷酒下諸風疾治之皆效羌活丸出聖濟總録治風冷下注腰脚不遂五勞七傷六極并諸風痺羌活去蘆頭鹿茸去毛酒炙牛膝酒浸切焙乾熟地黄切焙酸棗仁炒兔絲子酒浸别搗山茱萸巴㦸天去心茯神去木防風去义五加皮剉桂去粗皮五味子蛇床子炒各半兩黄芩去黒心白蘚皮羚羊角鎊各一分生乾地黄焙一兩右為末煉蜜丸如梧桐子大毎服二十丸至三十丸空心温酒下日冄服乾地黄丸出聖濟總録治風腰脚不遂膝脛沉重飲食减少日漸無力熟乾地黄切焙大麻仁炒研二兩萆薢炒五加皮剉石斛去根赤芍藥防風牛膝酒浸切焙桂去粗皮酸棗仁炒羌活去蘆頭木香各三分附子炮製去皮臍牡丹皮半兩㯽榔二枚剉右為末煉蜜丸如梧桐子大毎服十五丸至二十丸空心服温酒下日再竹瀝湯出聖濟總録治風腰脚痺弱或脚脛轉筋或皮肉脹起如腫而按之不䧟心中煩懊不欲飲食或風患風氣者竹瀝湯下甘草炙剉秦艽去苖細辛去苖葉白术炒黄芩去黒心桂去粗皮防風去义各一兩乾薑炮各半兩葛根防己升麻麻黄去根節煎掠去沫焙三兩用附子炮製去皮臍右除竹瀝外剉如麻豆每服五錢匕水一盞半煎至八分去滓入竹瀝一合更煎一沸温服空心日晩各一服茯神丸出聖濟總録治風腰脚不遂行履不得丈夫五勞七傷六極并治諸風痺茯神去木五加皮防己去义桂心去粗皮五味子蛇床子炒各一兩羌活去蘆頭鹿茸去毛酒炙牛膝酒浸切焙山茱萸兔絲子酒浸别搗酸棗仁炒巴㦸天去心各一兩熟乾地黄切焙三兩右為末煉蜜丸如梧桐子大每服二十丸至三十丸温酒下早晩食前各一服萬金散出危氏方治風補益虗勞衞理氣血治腰膝沉重無力醫官杜壬治手足風累驗予常病左臂不遂後雖已痊平而手指不便無力試諸藥不驗遂服此藥半劑即愈續斷杜仲去粗皮炙香切防風牛膝酒浸焙細辛華隂者白茯苓人参當歸桂去粗皮取有味處不見火甘草炙各一兩川芎獨活秦艽去土各半兩熟乾地黄半兩右麄末每服五錢匕水二盞煎至一盞濾去滓不拘時但空心熱服本事方有白芍藥共十五味前十味秤兩同後四味各三兩細末每服二錢水一盞生薑三片棗一枚同煎至七分空心食前熱服文潜云予常臂不遂後已痊愈而手指不便試不驗遂服此藥纔半劑而愈名續斷湯録驗方治手足麻木杏仁防風秦艽羌活附子等分粗末三錢水一大盞半姜三片煎至七分去滓入地黄汁兩合再煎數沸空心服名小防風湯一方治血虛體弱加鹿茸肉蓯蓉各兩半白蘚皮湯出聖濟總録治風腰脚不遂四肢􅍙痺口噤不語手臂脚膝痿弱顫掉白蘚皮女萎防風去义細辛去苖葉升麻蒼耳炒桂去粗皮附子炮製去皮臍五味子炒用各一兩黄芩炙剉二兩菖蒲九節者去湏節米泔浸切焙蒺藜子炒用各一兩右剉如麻豆每服五錢匕水一盞半煎至八分去滓食前温服日再萆薢丸出聖惠方治腰脚不遂骨節酸疼筋脉拘急行履稍難兩脇抽痛萆薢三兩牛膝細切浸焙白㯽榔煨酸棗仁炒防風去义各二兩杜仲去粗皮炙丹参赤芍藥郁李仁去皮尖炒石斛去根各一兩半當歸炙一兩一分桂去粗皮皺二兩右為末煉蜜丸如梧桐子大每服空腹煖酒三十丸牛膝湯出聖濟總録治風腰脚不遂牛膝去苗土羌活去蘆頭羚羊角鎊各半兩升麻酸棗仁炒芍藥各三兩防風去义虎脛骨酥炙各一兩梔子仁二枚右麄搗篩每服五錢匕水一盞半煎至八分去滓温服不拘時候服黄耆湯出聖濟總録治風腰脚不遂脚脛􅍙痺疼痛不可忍黄耆炙剉獨活去蘆頭防風去义酸棗仁炒茯苓去木各一兩白蘚皮三分羚羊角鎊半兩桂去粗皺皮半兩右麄搗篩毎服五錢匕水一盞半煎至八分去滓温空心服晩食前各一巴㦸湯出聖濟總録治腎臟風冷腰脚不遂補理腎臟虛風巴㦸天去心覆盆子炒羚羊角鎊地骨皮牛膝酒浸切焙酸棗仁炒各半兩右粗搗篩毎服五錢匕水一盞半煎至八分去滓温服早晩食前各一服桑寄生丸出聖濟總録治風腰脚不遂桑寄生黄耆炙剉熟乾地黄炒枳殻去穰麩炒各二兩蔓荆子炒一兩右為末煉蜜丸如梧桐子大毎服二十丸空心温酒下日再服合藥宜於净室中仍取服人自身天醫三生日牛膝丸出聖濟總録治風腰脚不遂攣急疼痛牛膝酒浸切焙四兩萆薢炒各八兩烏頭炮製去皮臍一兩丹参炒右為末煉蜜丸如梧桐子大毎服十丸十五至二十丸温酒或鹽湯下早晩食前各一附子飲出聖濟總録治風冷腰脚疼痛不遂由少年服冷藥太過補煖調氣附子一枚炮去皮臍防風去叉羌活去蘆頭一兩牛膝切焙酒浸三分右㕮咀如麻豆大毎服五錢匕水一盞半煎至八分去滓温服早晩食前各一茯苓湯出聖濟總録治冷濕風虛腰重不遂脚膝浮腫温腎白茯苓去黒皮乾薑炮澤㵼各一兩桂去粗皮一兩半右粗搗篩每服五錢匕水一盞半煎至八分去滓温服空心食前夜卧各一服杜仲酒出千金方治腰脚疼痛不遂諸虛杜仲八兩石楠二兩羌活四兩大附子五枚右㕮咀以酒一斗漬三宿每服二合日再偏宜冷病婦人服之即效萆薢散中風腰脚緩痺行歩艱辛不穏萆薢二十四分杜仲八分右為末早朝温服調服三錢加至五錢忌食牛肉雄豆散出聖濟總録治風腰脚不遂筋急行履不得用雄豆𦂳小者不拘多少以新汲水浄淘漉乾頻灑水候生藥纔及半暴乾炒熟不退皮搗羅為散每服二錢至三錢匕温酒調下日三至半月後所患處覺有觸動是驗紫葳散出聖濟總録治風腰脚不遂用紫葳東引根凌霄花根是也炙剉搗羅為散每服二錢匕空心温酒調下蒴藋散出聖濟總録治風腰脚不遂用蒴藿根去皮土切焙搗羅為散每服一錢匕空心温酒調下漸加至一錢半治一切風筋骨節繫急腰脚不遂右以金牙石燒浸服之良治骨斬風腰膝疼行履不得遍身瘙痒出本草以何首烏大而有花紋者同牛膝剉各一斤以好酒一升浸七日暴乾於木臼内搗末蜜丸每日空心食前酒下三五十丸普濟方卷九十四
