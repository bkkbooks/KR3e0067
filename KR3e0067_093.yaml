body:
  text: 普濟方卷九十四明周王朱橚撰諸風門中風半身不遂附論夫脾為胃水榖之海水榖之精化為氣血氣血充盛則身體滋榮而風邪不能為冦脾胃既弱水榖虧耗所以滋養者不足氣血偏虛又為邪風所侵此所以半身不遂病苦悲傷不樂惡聞人聲少氣時汗出臂偏不舉診其脉寸口沉細是也又寸口偏絶者則偏不遂兩手俱絶則不可治也又云世傳左為癱右為瘓此說尤非何者經有偏中半身不遂之候則癱瘓之候當以左右俱中者名之又云春夏得之難治秋冬得之易治春夏者陽氣上騰火力方盛風火相得而旺故難治也秋冬者陽氣下降火力漸㣲則易治也此說亦未可必惟其中之淺深者為難易耳治法疏理肝腎為得盖肝主筋腎主骨風中肝腎則筋骨癱瘓也方鐵骨丹治諸風癱瘓拳攣半身不遂川烏頭草烏頭川芎當歸酒浸晒辣桂川續斷晒洗華隂細辛補骨脂炒烏蛇洗酒浸取肉用晒乾七錢半直殭蠶木鱉子去殻炒熟麻黄去根節酒浸晒羌活獨活堅白南星炮熟白蒺藜炒搗去刺薏苡仁天麻酒浸晒炒蒼术炒各半兩萆薢鹽水煑乾杜仲去粗皮剉盡炮裂炒焦各一兩牛膝酒浸晒一兩虎脛骨洗酒浸炙焦白附子炮各三兩秦艽二錢半全蝎去毒炒三錢半川五靈脂四錢自然銅燒紅醋淬七次三兩重巴㦸酒浸去心晒防風滴乳香沒藥炒各半兩麝香半錢令别研右細末乳香沒藥别研漸入拌和以浸藥酒調飛麵煮糊研築丸彈子大每服一丸温酒磨下或宣州木𤓰煎湯下黒豆淋酒下不拘時候服仍間用高良薑碎一升煎湯圍燻湯盆浴最妙未服藥前湏以班猫二十一箇去翅足用黑豆一中盞慢火同炒焦只用七箇并豆入全蝎十四枚㣲炒五靈脂二錢半為末糕糊丸如麻子大毎二十一丸老酒下先去其風根烏犀丸治中風半身不遂身體頑麻烏犀屑羚羊角屑天南星醋浸一宿炒令黄色天雄炮製去皮臍天麻桂心白殭蠶㣲炒乾蝎㣲炒川烏頭炮製去皮臍芎藭白术當歸乾薑炮製剉白芷細辛牛膝去苖㯽榔青橘皮湯浸去白穣炒白附子炮製桑螵蛸㣲炒阿膠搗碎炒令黄燥已上各一兩烏蛇酒浸炙黄去皮骨防風去蘆頭麻黄去根節各二兩牛黄細研麝香細研各一分右為末入研了藥令匀煉蜜和搗五七百杵丸如梧桐子大毎服食前以温酒下十丸天雄丸出聖惠方治中風半身不遂言語蹇澁肌膚頑痺筋脉不利骨節疼痛天雄炮製去皮臍天麻附子炮製去皮臍麻黄去根節仙靈脾乳香道人頭已上各一兩羚羊角屑桑螵蛸㣲炒蟬殻牛膝去苖桂心當歸芎藭羌活白殭蠶㣲炒五加皮薏苡仁防風去蘆頭乾蝎㣲炒硃砂已上各半兩細研烏蛇肉二兩浸酒炙㣲黄牛黄一分細研麝香一分細研右為末煉蜜和搗五七百杵丸如梧桐子大毎服以温酒下二十丸漸加至三十丸日三四服秦艽散出千金方治半身不遂言語錯亂乍悲角弓反張皮膚風癢秦芁獨活胡冷用烏頭黄耆人参各二兩防風山茱萸桂心石斛胡冷用萆薢各一兩防己細辛當歸芎藭胡冷用桔梗五味子甘草白术乾薑各三十株麻黄逺志胡冷用防己天雄各一兩白蘚皮三十銖胡冷用白歛甘菊花二兩胡冷用蜀椒茵芋十八銖胡冷用茵草右治下篩酒服方寸匕日再漸漸加至二七又云治風無新乆并補虚弱茯神湯出聖濟總録治中風手足一邊不收精神健忘茯神去木三兩防風去义牛膝去苖枳殻去穰麩炒防己剉秦艽去土𤣥参堅者芍藥黄耆細剉澤㵼白蘚皮剉獨活去蘆各二兩桂去粗皮一兩半五味子半升人参半兩薏苡仁炒半升羚羊角鎊屑二兩石膏研半斤麥門冬去心焙半兩甘草炙剉一兩半磁石十二兩烈火燒赤醋淬十次淘用别搗研右除磁石外粗搗篩毎用藥一兩磁石末半兩别入杏仁七枚去皮尖碎以水四盞同煎至二盞去滓分二盞㣲熱服之空心并午時各一服毎自仲春宜服至季夏住一方用枳實無枳殻仍忌生冷海藻等物天麻散出聖惠方治中風半身不遂沉重天麻白附子白殭蠶炒防風去义麻黄去節甘菊花撶白蘚皮藁本去苖土羌活去蘆頭獨活去蘆頭細辛去苖土阿膠炙火燥乾蝎去土炒烏蛇酒浸去皮骨炙各三兩當歸炙刺桂去粗皮白茯苓去黒皮乾薑炮甘草炙各一兩半右為散毎空腹煖酒調三錢匕服忌生菜鷄肉油膩赤箭丸出聖惠方治肝腎乆虛外中風毒半身不遂肢節攣急腰間痠疼漸覺羸瘦赤箭一兩茯神五加皮一兩防風去蘆頭一兩牛膝去苖一兩半獨活蛇床子酸棗仁㣲炒山茱萸巴㦸仙靈脾萆薢熟乾地黄桂心已上各一兩鹿茸去毛塗酥炙令黄附子炮裂去皮臍石斛去根各二兩兎絲子三兩酒浸三日曝乾别搗為末右為末煉蜜和搗三二百杵丸如梧桐子大毎於食前以温酒下三十丸仙靈脾浸酒方出聖惠方治中風半身不遂肢節疼痛無力仙靈脾天麻獨活天雄炮裂去皮臍牛膝去苖五加皮芎藭茵芋萆薢狗脊海桐皮鼠黏子蒼耳子川椒去閉口及目㣲炒去汗已上各一兩虎脛骨二兩塗酥炙黄桂心當歸石斛去根已上各一兩半右細剉以生絹袋盛用好酒二斗浸之宻封至七日後毎日不計時候温酒飲一小盞常令酒氣相續其酒出一盞入一盞以藥味薄即止荆瀝湯出聖濟總録治中風半身不遂心虛風熱發即恍惚煩悶筋脉攣急荆瀝旋入麥門冬去心生二兩人参一兩地骨皮酒洗焙二兩梔子仁一兩甘草炙一兩半黄芩去黒心白茯苓去黒皮各一兩芎藭一兩桂去粗皮一兩細辛去苗葉一兩杏仁湯浸去皮尖雙仁炒一兩豉炒㣲乾一合半防風去义一兩海桐皮一兩石膏一兩半竹瀝旋入右除荆竹瀝外十五味㕮咀如麻豆大每用一十二錢匕以水四盞入生薑一分切煎取二盞去滓入荆竹瀝各一合更煎五沸分四服日三夜一間食服之良一方用白蘚皮無海桐皮白蘚皮湯出聖濟總録治中風半身不遂口不能言及諸風偏枯白蘚皮炙剉附子炮製去皮臍白术防風去义麻黄去根節先煎掠去沫焙乾用葛根獨活防己人参石膏碎二兩桂去粗皮一兩白芷半兩茯神去木當歸切焙各一兩半甘草炙杏仁湯退去皮尖併去雙仁炒右㕮咀如麻豆大毎用藥十錢匕以水三盞煮取一盞半去滓分温三服日二服不拘時候一方治風痱入生薑半分同煎黒龍丸治中風半身不遂口眼喎斜手足拘攣或生嚲曵語言蹇澁心多驚悸其狀多端各随所中此由氣血俱虛腠理踈弱風邪外中真氣失守邪正相干故為是病宜服之一名資壽黒龍丹方見諸風雜治類側子湯治中風手足不遂口眼喎斜側子炮去皮臍一分附子炮去皮臍一分獨活去蘆頭一兩芎藭秦艽去苗土各一兩麻黄去根節先煎掠去沫焙用一兩半木通一兩磁石烈火燒赤醋淬十次淘用三兩山茱萸山芋各一兩杜仲去粗皮刺白蘚皮各一兩半甘草炙桂心去粗皮各一兩防風去义半兩右㕮咀如麻豆大每用十五錢匕以水四盞入生薑一分切煎至二盞去滓分温三服日一服夜并二服服此湯訖唯暖覆所患處㣲取汗慎外風白芷湯治中風手足一邊不遂言語蹇澁白芷白术芎藭防風去义各半兩石膏一兩半羌活去蘆頭一兩牛膝去苗狗脊去毛麻黄去根節洗煎掠去沫焙乾用半兩葛根一兩桂去粗皮一兩半附子炮裂去皮臍一兩萆薢炒半兩薏苡仁炒杏仁湯退去皮尖並雙仁炒各一兩右㕮咀如麻豆大每十八錢匕以水四盞入生薑一分切煎取二盞去滓分温三服㣲熱服日二夜一摩挲丸治中風癱瘓半身不遂口眼喎斜言語蹇澁精神昏塞歩履艱難或肌肉偏枯手足嚲曵或筋脉拘攣不得屈伸及氣痺之疾諸風身體疼痛麻黄一斤去苗洗辰砂細研水飛天台烏藥自然銅燒赤醋淬麝香别研生龍腦别研雄黄飛研薰陸香油的乳者别研烏犀鎊屑别為細末各四兩地榆去苖木香黒参揀潤者洗浄去土焙乾八兩真珠末研二兩川烏頭炮製去皮臍尖八兩右為末研匀煉蜜和丸如楮實大每服一丸温酒化下不拘時候服訖避風處衣被盖覆令汗出患重者服一月痊安輕者半月瘥初患者五七日服可安八風九州湯治男子婦人寒冷不自愛䕶當風觧衣汗出卧冷濕地半身不遂或俛仰屈伸難周身滛滛麻痺四肢不收狀如風狂飲少溲少手足苦冷或不遂麻黄四兩去節甘草炙乾薑附子防風獨活各三兩石膏綿裹茯苓白术芎藭柴胡當歸人参各三兩杏仁四十枚去皮尖二枚細辛右㕮咀以水一斗清酒五升漬三夜煑取四升分為三服一日令盡若病人羸瘦者用水煎服藥訖被覆當汗出㣲㣲去上衣汗皆用粉撲上忌生菜海藻菘酢李猪肉雀肉化風丹治一切中風半身不遂言語蹇澁神昏錯亂洗頭破傷血風驚風服之皆效防風一兩羌活獨活各一兩麻黄去根節白芷三錢芎藭桂枝川烏炮去皮臍藁本去土茯苓去皮白附子全蝎去毒甘草炒皀角燒存性各半兩右為細末水浸蒸餅為丸如彈子大隂乾每服一丸傷風葱白酒下婦人血氣當歸酒下小兒驚風人参細嚼温酒下日三服涎痰薄荷酒下破傷豆淋酒薄荷酒下附子散治中風半身不遂肢節無力疼痛附子炮裂去皮臍防風去蘆頭五加皮萆薢薏苡仁桂心牛膝獨活當歸杜仲去粗皮炙黄剉海桐皮木香仙靈脾枳殻炒㣲黄去穰已上各一兩右為散每服三錢以水一盞入生薑半分煎至六分去滓不拘時候温服三石丸治中風半身不遂病苦悲傷惡聞人聲少氣多汗偏臂不舉凝水石火煅通赤研為細末三兩半石膏煅令赤研一分天南星炮去皮臍陽起石煅令通赤研為細末一錢一匙天雄炮去皮臍草烏頭炮去皮臍為末白附子炮為末乾蝎去土炒白殭蠶龍腦研麝香研各一錢海蛤煅通赤研二兩蟬殻去土焙乾為細末半錢右匀細入白麵一錢半令匀煉蜜和丸如鷄頭大毎服一丸細嚼荆芥薄荷湯下茶酒亦得不拘時候禦風丹治一切中氣半身不遂神昏語蹇口眼喎斜婦人頭風血氣暗風倒仆嘔噦涎痰手足麻痺川芎白芍藥桔梗細辛去葉防風一兩羌活白殭蠶炒天南星薑製各半兩麻黄去根節白芷各一兩半乾生薑甘草炒各三分硃砂二錢半為衣右為細末煉蜜為丸如彈子大毎服一丸熱酒化下食前日三服神昏有涎者加硃砂二錢半麻黄散出聖惠方治中風半身不遂頭目昏痛心煩體熱麻黄去根節葛根剉各二兩桂心犀角屑地骨皮丹参白术獨活芎藭石膏甘菊花各一兩甘草半兩炙㣲赤剉右為散每服四錢以水一中盞煎至六分去滓不計時候温服忌油膩毒滑魚肉仙酒方治大風手足拳攣半身不遂川牛膝一斤洗浄秦艽一兩洗浄切防風二兩洗浄枸杞子二兩洗浄蠶沙二兩洗浄牛蒡子炒一斤桔梗二兩洗蒼术二斤去皮蒸爛用地黄一兩八錢洗當歸一兩八錢洗净用天麻五兩洗浄右用無灰酒二斗以前藥於浄磁缸内浸用七重浄白紙宻封七日勿用婦人封取藥成若用時人靣勿得於缸口内覷毎酒一盞日進三服年深重風不過二斗忌濕麵等物常毎日一服人参湯一名参桂湯出千金方治中風半身不遂手足拘急不得屈伸身體痺冷或時瘛瘲或身背强直不語或狂言妄語或角弓反張或欲得食或不能食或大小便不利悉皆治之人参一兩半桂心去粗皮麻黄去根節先煎掠去沫焙乾各一兩當歸切焙乾獨活去蘆頭甘草炙剉各一兩半石膏淬三分黄芩去黒心乾薑炮各半兩杏仁湯退去皮尖雙仁炒四枚右粗搗篩每用藥十二錢匕以水三盞煎取一盞半去滓分為二服空心并服服後相去如人行五里衣覆令汗出觧即自食粥慎外風未汗復更煎并服之唯汗出得差服藥後如人行七八里用熱生薑稀粥發汗活絡通經丸出三因方治半身不遂口眼喎斜癱瘓諸風通活經絡宣道凝滯常服壯筋骨助血脉起偏廢其效如神川烏