body:
  text: 普濟方卷四明周王朱橚撰方脉總論九道病脉細為氣血俱虚為病在内為積為傷濕為後泄為寒為神勞為腹滿為憂傷過度細而𦂳為癥瘕積聚為刺痛細而滑為僵仆為發熱為嘔吐數為熱為虛為吐為痛為煩渴為煩滿動為痛為驚為攣為泄為恐虛為寒為虛為脚弱為食不消化為傷暑促經並無文釋曰其促有五一曰氣二曰血三曰飲四曰食五曰痰但藏熱則脉數以氣血痰飲留滯不行則止促止非惡脉也結為痰為飲為血為積為氣釋曰氣寒脉緩則為結數則為促雖緩數不同結亦當如促脉分别可也散經無文釋曰六府氣絶於外則手足寒上氣五臟氣絶於内則下利不禁甚者不仁其脉皆散散則不聚病亦危矣革為滿為急為虛寒相搏婦人半産漏下釋曰革者革也固結不移之狀三部應之亦皆危脉也代者一藏絶他藏代至釋曰代真死脉不分三部隨應皆是如前所例皆本聖經學者當熟讀令心開眼明識取體狀然後交絡互識所謂六經流注五藏相傳各以部位推尋使了然不昧其如隨病分門諸脉證狀尤當參對審詳之如是精誠方可為醫者不爾則傍倚聖教欺罔賢良為含靈之巨賊幸宜勉旃九道脉名一長者有餘而過也故屬於陽其脉舉按皆有餘再再尋之往來流利出於三關如持竿之狀是謂長也病應渾身壯熱坐卧不安神思恍惚甚則陽虚内勝三焦不利法宜汗而散之二短者不及之脉故屬於隂凡物短長各有所宜適當其可然後為中夫長短未始有定體質於中而過者為長質於中而不及者為短有中短乃見焉其脉按舉之間雖往來洪盛而不及本位故曰短病應邪氣内結宿食成瘕心腹切痛三關不利陽邪虚摶三焦氣厥外為寒熱内則便硬於法宜引而竭之三虚者隂也不實之象陽為實隂為虚陽氣自得𫝊肝氣不勝則少力多驚故其脉動為虚指下尋之不足舉之亦然往來無力似浮而弱不欲内固之意是謂虚狀原其病本陽邪内結恍惚無定故發狂熱厥與夫譫言妄謬夣寐虚驚在小兒則主驚風四促者陽盛也陽邪上忤氣有偏盛偏衰故也其脉指下按之有餘舉之洪數下遊三關併朝寸口雖盛疾如此必時一止而乃復來謂之促夫脉之行度亦有隂陽之從陽邪奔止血朝於心榮衞趨蹶徐疾不常脉則因之時止而促爾其病令人三焦不和積聚憂思氣逆而厥故上盛下虚上溢下絶其候宜服退不宜進故法以退之者生進之者死五結者隂盛也真陽已極衰弱也夫脾布中和因陽而發陽衰隂盛則脾氣忤而不能施化故脉來緩緩然時一止而復來或往或來或聚或散謂之結凡以膠塞而不可解隂盛故也病應四肢勞倦憂悶煩躁切痛上下連連相續氣忤不施故法宜通導以去其結也六代者隂也内經曰代則氣衰葢心散則氣衰不能下應於土脾不得安其常故脉代也說文曰代者更也脾不安常而然其脉按之動而復起再再尋之不能自還病應形容羸瘦不能言正氣欲絶神無所居七牢者堅也固圍之象氣之欝結故若是仲景云寒則牢堅而沉結指下尋之不見舉之全無再再尋之小而有力斷續不常見故曰牢葢重隂之所入以隂包陽故似無而按有病應骨中疼痛氣血不守榮衞解散是以胷中氣促而併夫脾與胃相為表裏十二經脉之所本而平人之常氣皆禀於胃今已脾胃不能符御則生生之道曷可全乎法以牢為水火相刑必死之候八動者陽與隂相搏也仲景云隂陽相摶名曰動又曰數脉見於關上下無頭尾厥厥摇者曰動以其脉混混然指下尋之似有舉之全無再再尋之不離其處病應四體虚勞煩滿崩中乆病血虚於内溢而自利歌曰舉無再再覓方逢體倦虚勞利血濃女子崩中宜速救血虚崩潰藥無功九細者精氣虚弱之極而形容不足内經曰細則氣少其脉之狀稍稍應指往來如綿至微而不絶謂之細脉雖為虚弱之極然必應於診者為正要之精氣既已怯弱陽道由是衰微病必脛痠髓冷力乏精氣皮毛焦乾形容枯瘁温之以氣補之以味豈可緩也謌曰指下尋之極細微脛痠髓冷不支持遺精髪槁形枯瘁速灸關元豈可遲九道脉主治一長者陽也潔古云長法乾此陽明脉故尺寸俱長身熱目痛鼻乾不得卧當汗陽化氣也長脉迢迢度三關指下時來又却還陽毒在臟三焦熱徐徐發汗始能安雲岐曰陽毒在臟何由言發汗非在五臟之本陽毒之氣在五臓之標何為五臓之本肝心脾肺腎是也何為五臓之標血毛皮脉肌肉筋骨是也以其在五臓之標故徐徐發汗者為在標之深逺也急則邪不能出發之以升麻湯發在陽明標一法加羌活麻黄中治法以地骨皮散治渾身壯熱地骨皮茯苓各半兩柴胡黄芩生地黄知母石膏各二兩如自汗已多加知母㕮咀入生薑煎徐徐發者汗之緩也二短者隂也主四肢惡寒腹中生氣宿食不消短法坤腹中有宿食當下之短主隂成形隂不化穀也短脉隂中有伏陽氣壅三焦不得昌臓中宿食生寒氣大㵼通腸必得康宿食生寒氣何由通暢謂隂中伏陽故也使三焦之氣宣行於上下故用巴豆動藥也外藥隨見證應使之此在上脉交論内細說之病久温白丸新病備急丹三虚者隂也主少力多驚心中恍惚小兒驚風虚怯離虚脉者離火也中虚之象心主血也血虚則脉息難成驚風治以㵼青丸恍惚心中多悸驚三關定息脉難成血虚臓腑生煩熱補益三焦便得寧恍惚者陽主動之貌脉難成往來之象煩熱者血虚也欲令氣血實故補益三焦命門以助心神之氣也是以男子藏精婦人繫胞宜以加减小柴胡湯主之柴胡去苖黄芩各一兩地骨皮人參知母半夏製茯苓各一兩炙甘草三錢白芍藥八錢右㕮咀每服一兩生薑水煎久疾虚煩不得眠酸棗仁湯治之四促者陽也促脉象坎主中盛滿之象遇坎而退則是脉八九至併寸口漸漸退則活退則隂生逆之促而散也一云促者熱數併居寸口陽太過隂不及也促脉前來已出關常居寸口血成班忽然漸退人生也若要痊除命在天升多而不降前曲後直如操帶鈎曰死漸退者以陽得隂則解如散絲者獨陽脫隂知命在天也五結者隂也主四肢氣悶連痛時來結脉象兌金動而有止曰結應腹中之右旁故曰結聚也血流而不行氣滯而不散脾主四肢結而不通故悶痛積氣生於脾臓旁大腸疼痛陣難當漸宜稍㵼三焦火莫謾多方立紀綱生氣是三焦之氣旺於脾臓旁脾受濕而反熱傳至大腸故發疼痛乃大腸金受三焦火邪故入大腸藥㵼三焦火邪則愈禁暴用寒藥急攻當緩緩下之六代者隂也主形容羸瘦口不能言不因病羸瘦脉有止曰代代真死脉也若暴損氣血以至元氣不續而止可治以人參黄耆湯人參白茯苓熟地黄甘草炙地骨皮各半兩黄耆白芍藥桔梗天門冬半夏製當歸各一兩陳皮去白二兩右㕮咀入生薑十片水煎一兩去滓食前服滋養血氣調和榮衞和順三焦通行血脉若傷寒代者炙甘草湯代脉時時動若浮再而復起似還無三元正氣隨風去魂魄冥冥何所居浮甚陽太過沉甚隂太過浮甚八至九至死在外沉甚一至二至死在内脾脉居中土之象生三元正氣代者似有似無曰代風邪害於脾故云正氣隨風去七牢者隂也牢脉象震其脉不來不往曰牢其性𦂳而急前後水火相乘之象水能尅火得相勝則死脉入皮膚辨息難時時氣促在胷前只言水火相刑尅欲要痊除更問天牢者木也前後有水火相乘之象以牢為隂助水尅火故云命在天又云水火併於胷寒熱發於表之象以為牢脉也八動者隂也主四體虚崩中血痢動脉象艮山也不來不往曰動山止之貌動而不移也崩中血痢治之以赤石脂丸及禹餘粮湯動脉根源氣主隂三關指下礙沉沉血山一倒經年月志士名醫只可尋以衞為葉榮為根血去則根亡而葉凋此脉寸有尺無絶無根葉此脉第三同斷病也宜内補丹出元戎方一云動主血敗不止面色無光治之以養血氣八物湯當歸白芍藥地黄熟用白术各一兩人參乾薑灼茯苓桂各半兩右㕮咀每服一兩生薑七片水煎食前服九細者隂也主腰酸髓冷乏力折精腎無所養陽不榮於下隂不榮於上隂陽不能相守乏力無精治法春夏地黄丸秋冬八味丸主之乏力無精脛裏酸形容憔悴髪毛乾如逢冬季經霜月不療其疴必自痊細脉象巽風也為木風主髪陽氣内不潤於皮毛致毛髪乾至秋則失冬時氣平故不療自愈此諸陽發於春夏諸隂發於秋冬吉也普濟茴香丸主之上氣浮腫本在表宜解肌湯葛根黄芩各一兩麻黄去節半兩赤芍藥四錢右㕮咀一兩生薑七片水二盞煎至一盞去滓熱服食前若汗出浮腫是邪從汗出浮者陽也當發散而解之若不愈諸消腫藥治之肩息頻者喘者脉浮而滑亦在於表宜麻黄湯發表也十恠脉名一釜沸之狀如湯湧沸指下尋按之中央起四畔傾流有進有退殊無息數但見其為湧沸而起是為釜沸而已議曰如湯如羮葢水火之相沸有激而為之者水勝火也火從之者也而與火相沸不得其已而終亡也脉至若是三陽之數極而亡者之候葢火為陽水為隂以陽亡隂以水勝火所以取於釜沸者名與義俱得之者也夫隂在内陽為之守也陽數極而亡隂則氣無所守故奔騰而沸湧氣亡則形亡此所以為必死且榮衞周流乎一身凡五十度是為百刻之常此以呼吸往來計之也釡沸之狀氣有出而無入有來而無往則計二十五度而終是為百刻之半故診見之旦占夕死夕占旦死二魚翔之狀宛如魚遊於水面但尾掉而身首俱不動其脉浮於膚上不進不退指下尋之其首定而尾緩摇時起時下有類乎魚之遊於水是為魚翔也夫魚之為物浮陽者也陽潛則在於淵未翔也陽升則在乎渚斯翔也脉至若是者乃以三隂數極不能與陽相使故動翔應診於膚表主腎與命門俱絶衞氣與榮血兩亡隂陽别論曰别於陽者知病從來别於隂者知死生之期脉至於此隂極而亡陽則不可期以日矣故夜半占日中死日中占夜半死三彈石之狀堅而促來遲去速指下尋之至摶而絶喻如指彈石辟辟然堅而不可入故曰彈石此真臓脉見也夫春弦夏洪秋毛冬石四時之常也故腎欲石然石而有胃氣為可治但石而無胃氣則死矣石之為物堅而且實方冬時氣沉而在骨故脉欲堅而實素問云冬日在骨蟄蟲周密君子居室然而有胃氣存焉故曰應四時今胃氣先絶真脉獨見命本已喪何可久也不可期以時日惟見戊巳日即死矣四解索之狀指下散亂息數無凖或聚或散如繩索之解而無收約由腎與命門氣皆亡形枯髓竭故脉之應如是也夫索之為物糾而成者也糾則合解則散合則包而實散則利而流内經曰冬脉如營萬物之所以合蔵故兩尺之脉則宜糾而合包而實者為正今也根本離索真氣無所結固而解散不能以糾合矣則脉亦如之故解索之脉形於兩尺者以戊巳日篤辰巳日死五屋漏之狀如屋之漏滴滴然不相連續或來或止時動時復其診亦如之謂之虚屋漏此脾胃已絶穀氣空虚失於長養之令者然耳夫脾主中州呼吸之間脾受穀氣脉行有常今胃氣與榮絡俱絶而呼吸不得其常則脉亦應之如屋之漏時滴時止豈復能有常哉期以八日而死六鰕遊之狀指下尋之若鰕遊於水面不進不退瞥然驚棹而去再再尋之杳然不見須臾復於指下隠隠而來應診不動倏爾還去脉之異狀間忽有全類此者故目之曰鰕遊病應其人魂魄飛揚而形獨存但略有少穀氣而無所附託也夫穀氣以真氣為本相附而周榮於一身以應十二脉之動今也真氣既䘮而穀氣獨存則神無所依故魂魄飛揚矣魂陽也遊而無定魄隂也止而有守魂魄之所依真氣而已若無所依而飛揚則形與神不能相保逺者期以七日近者二日而死矣七雀啄之狀來而急數頻絶而止良久凖前後来若雀啄食之狀葢來三而去四也由脾元穀氣已絶於内腸胃虚乏無所稟藏而不能散於諸經則諸經之氣隨而亡竭矣夫五臓六腑生於真氣養於穀氣真氣亡則無所本穀氣亡則無所養無所本者死無所養者亦死四十三難曰平人不食飲七日而死胃中穀氣俱盡則雀啄之脉可見也八偃刀之狀尋之如循刀刃責責然無進無退其數無凖故曰偃刀由心元血枯真火之象無所歸宿而胃氣獨居不能相為導續是傷於真心者如此心主血也肺主氣也血榮氣衞脉之所依以行血枯而衞氣獨居則心不能尅制而肺金勝矣刀金也金之為物剛而利也其脉之狀應於診者皆氣之使然也故有取於偃刀焉若是者期以四日而死九轉豆之狀脉來應指混然如豆之周旋展轉不進不退殊無息數故謂之轉豆者不通之象也血氣雖已敗然其動必轉焉及三元正氣已散五臓六腑空虚中無所流矣象曰行尸其死可立而待也十麻促之狀應指如麻子之戚促散亂分雜殊無均和之意葢麻之生也其微不一穀之甚細而分錯者也由肺元已絶衞氣已枯榮氣獨澀而隂陽錯亂故取於麻促之狀也輕者三日而死重者寅時死矣辨脉動止投數法脉一動一止二日死一經云一日死脉二動一止三日死脉三動一止四日死或五日死脉四動一止六日死脉五動一止七日死脉六動一止八日死脉七動一止九日死脉八動一止十日死脉九動一止十一日死經云十三日死又立春死脉十動一止立春死一經云立夏死脉十一動一止立夏死一經云夏至死脉十二動十三動一止者立秋死又一經云立冬死脉十四動十五動一止者立冬死一經云立夏死脉二十動一止一嵗死又一經云立秋死脉二十五動一止二嵗死一經云一嵗又云立冬死脉三十動一止三嵗死脉四十動一止四嵗死脉五十動一止五嵗死脉来五十投而一止者一藏無氣却後春草生而死脉来三十投而一止者二藏無氣却後三嵗麥而死脉来二十投而一止者三藏無氣却後二嵗桑葚赤而死脉来十投而一止者四藏無氣嵗中死脉一来而久住者宿病在心主中脉二来而久住者病在肝支中脉三来而久住者病在脾下脉四来而久住者病在腎間脉五来而久住者病在肺之間五脉病虚羸人得此者死虚羸人藥不得而治鍼不得而及如壯盛人可治氣全故也五用乖違病脉察脉必以人迎氣口分内外所因者乃學診之要道也所以脉讚云闗前一分人命之主然既有三因固可以盡詳而考之於理自備且如疲極筋力盡伸度量飲食饑飽叫呼走氣房室勞逸及金瘡挫折虎狼毒蟲鬼疰客忤畏壓溺等外非六滛内非七情内外不收必屬不内不外雖難論曰人迎𦂳盛傷於寒氣口𦂳盛傷於食殊不知飲食入胃能助發宿藴其所以應於氣口者正由七情欝發因食助見本非宿食能應氣口且如宿食脉有浮大而微濇者有數而滑實者在隂則濇在陽則滑宿食不化脉則沉𦂳宿食成瘕脉則沉重此等名證皆曰傷胃曾何關於氣口邪且如疲極筋力其脉弦數而實筋痛則動皆傷肝也凝思則滑神耗則散皆傷心也弦動耗氣脉濡而弱呌呼走氣脉散而急皆傷於肺也房勞失精兩尺浮散男子遺精女子半産弦大而革皆傷腎也右件明文氣口何與况藏寒蛔厥脉自微浮及為𦂳滑胃虚不食其脉必緩亦有微濡五飲停伏浮細而滑久畜沉積沉細而軟形虚自汗脉皆微濡揮霍變亂脉自沉伏僵仆墜下脉則細滑踒折傷損瘀血在内疝瘕癥癖五内作痛脉皆弦𦂳中寒癥結脉則遲濇五積六聚食飲痰氣伏留不散隳道節滯脉皆促結三消熱中尺中洪大癲狂神亂關上洪疾氣實脉沉血實脉滑氣血相搏脉亦沉實婦人姙娠脉則和滑遁尸尸疰脉沉而不至寸或三部𦂳急鬼祟附着脉兩手乍大乍小乍短乍長陽邪來見脉則浮洪隂邪來見脉則沉𦂳鬼疰客忤三部皆滑洪大嫋嫋沉沉澤澤但與證不附者皆五尸鬼邪遁疰之所為也如診得此等脉證雖與人迎氣口相應亦當分數推尋三因交結四句料簡所謂單内單外不内不外亦内亦外亦不内外脉理微妙藝能難精學又如忽見異像驚惑眩亂脉多失序急虚卒中五臓閉絶脉不往來譬如墮溺脉不可察與夫金瘡踒折頓走血氣脉亦無凖學者當看外證不必拘脉診百病决死生法診人温病三四日不得汗出脉大疾者生脉細難得者死診人温病瀼瀼大熱其脉細小者死診人病甚而脉不調者難差診人病甚而脉洪易差診人頭痛目痛卒視無所見者死診人温病不利腹中痛甚者死診人病汗不出出不至足者死診人病瘧腰脊强急瘈瘲者不可治診人熱病七八日氣不喘脉不數者當後三日温汗汗不出者死診人熱病七八日其脉微細小便赤黄口燥舌燋乾黑者死熱病未得汗脉盛躁得汗者生不得汗者難差熱病已得汗脉靜安者生脉躁者難治熱病脉躁盛而不得汗者此陽之極也十死不治熱病已得汗脉常躁盛氣之極也亦死熱病已得汗常大熱不去者死熱病已得汗熱未去脉微躁者慎不得刺治也熱病發熱甚熱者其脉隂陽皆竭慎勿刺汗不出必不治診癲病脉實堅者生脉沉細小者死診人心腹積聚其脉堅急者生虚弱者死若腹大脹四肢逆冷其人脉形長者死診人心腹痛痛不得息脉細小遲者生堅大疾者死診人腸澼下膿血脉沉小流連者生數疾大熱者死診人腸澼下白膿脉沉者生浮者死診洞洩食不化下膿血脉數微小者生堅急者死診腸澼下膿血脉弦絶則死滑大則生凡腸澼之屬身不熱脉不弦絶滑大皆生弦濇皆死診諸腸澼下膿血有寒者生熱者死診諸腸澼其脉滑者生浮者死弦絶澀者皆死診欬嗽脉沉堅者死浮直者生診吐血䘐血脉滑小弱者生實大者死診唾血脉堅强者死滑者生夫病吐血而嗽上氣其脉數有熱不得卧者死夫病欬嗽羸瘦脉堅大者死診傷寒欬嗽上氣其脉散者死謂其形損故也診嗽脫形發熱脉堅急者死診嗽而嘔腹脹而洩其脉弦細欲絶者死診諸欬嗽其脉浮軟者生沉伏者死診上氣脉數者死診人肌瘦脫肛形熱不去者死診上氣面浮腫肩息其脉大不可治加力必死診人消渴其脉數大者生細小浮短者死診人消渴脉實大病久可治脉小𦂳急不可治診人病蟲下蝕疘隂其脉虚小者生脉堅急者死診人腸澼筋攣其脉小細安靜者生浮大堅者死診人被風不仁痿厥其脉虚者生堅急疾者死診人上氣喘息低昻其脉滑手足温者生脉澀四肢寒者死診人汗出若衂其脉小滑者生大躁者死診人隂陽俱竭者見其齒上如熟豆其脉小躁者死診人寒熱瘈瘲其脉代絶者死診金瘡血出太多脉虚細者生實大者死診人從髙頓仆内傷腸滿其脉堅强者生小弱者死診傷寒熱盛脉浮大者生沉小者死診傷寒已得汗脉沉小者生浮大者死診心腹積聚其脉勁强者生沉小者死診厥逆汗出脉堅强急者生虚緩者死診水病脉洪者可治微細者不可治診水病隂閉其脉浮大者生沉細虚小者則死診水病腹大如皷脉實者生虚者死診洩注脉緩時小結者生浮大數者死診人内外身體俱冷而汗出微嘔而煩擾手足厥逆體不得安靜者死診寒氣上攻脉實而順滑者生實而逆澀則死診金瘡出血脉沉小者生浮大者死診人卒然中惡脉大而緩者生堅而浮者死堅細而微者亦生診中惡吐血數升脉沉數細者死浮大而疾者生診人為百藥所傷脉微細者死洪大而速者生診老人脉微微陽羸隂强者生脉躁大加息者死隂弱陽强脉至而代竒月而死診熱病三五日身體熱腹滿頭痛食飲如故脉直而疾者八日死尺脉濇而堅為血實氣虚也其發病腹痛逆滿氣上衝此為婦人胞中絶傷有惡血久成結瘕黍穄赤而死脉來細而微者血氣俱不足細而來有力者穀氣不充得即轉動棗葉生而死左手寸口脉偏動乍大乍小不齊從寸口至關關下至尺三部之位處處動摇各異不同其人仲夏若得此脉桃葉落而死右手寸口脉偏沉伏乍小乍大朝來浮大暮夜沉伏浮即太過魚際沉伏即不至關中往來無常時時復來者榆葉枯落而死左手尺部脉三十動一止又須臾還三十動一止乍動乍踈不與息數相應其人雖食穀猶不愈蘩草生而死右手尺部脉三十動而一止止而復來來如循直木如循張弓弦絙絙然如兩人共引一索至立春而死扁鵲診諸反逆脉法脉浮短者其人肺傷諸氣微少不過一季死法當嗽也脉涌涌不去者死脉分絶者死而上下分散也脉來洪大盛而堅硬者血氣俱盛實也病若閉目不欲見人脉當得肝脉强急而長而反得肺脉浮短而濇者死病若開目而渴心下牢者脉當得𦂳實而數反得濡而微者死病若吐血復鼽衂脉當得沉細而反浮大牢者死病若大腸洩而脉當微細澀而反得𦂳大而滑者死又形脉與病相反者死病若頭痛目痛脉反濇者死病若四肢厥逆脉反浮大而短者死病若腹痛脉反浮大而長者死病若腹滿而喘脉反滑利者死病若耳聾脉反浮大而濇者死病若腦痛脉反大而緩者死左有病右痛下有病上痛此為逆逆者不可治脉來沉之即濡浮之不止推手者半月死人形病脉不病者生脉病形不病者死人病尸厥呼之不應脉絶者死脉當大反小者死肥人脉細小如絲欲絶死羸人得躁脉者死人自澀而脉來往滑者死人自滑而脉來澀者死人自小而脉來往大者死人自短而脉來往長者死人自長而脉來往短者死人自大而脉來往小者死尺脉上應寸口大遲者半日死診五臓六腑十二經脉皆有相反逆即為死候也辯七診脉法七診脉諸家經論不盡分别今顯脉形伏并疾病有可療者不可療者同論于中獨大者皮膚壯熱喘息上衝其脉通度三關多出少入與太過相似兩手並極此乃不治之疾獨小者四體微寒中隔氣閉腹衝兩脇其脉沉度於三關名曰獨小小者氣也不治之疾獨寒者惡寒也四肢俱冷伏陽在内其脉指下沉沉如爛綿按之不知所在此不治之疾獨熱者四指俱熱臓腑亦熱其脉洪數故曰獨熱可治之疾獨遲者其脉三部俱遲氣在脾胃致有不安可治之疾獨疾者寸關急數尺脉微虚熱在於胃致使口乾心燥鼻塞頭痛可治之疾獨䧟者其脉軟隱在肌肉隂陽並然四肢不舉疼痛在骨名曰獨陷可治之疾診三部脉虚實决死生法三部脉實長病得之不治三部脉虚長病得之不治虚而濇長病亦死虚而滑亦死虚而緩亦死虚而弦急癲癎亦死矣三部脉浮而結長病得之死浮而滑亦死三部脉弦而數卒病得之死三部脉微而伏長病得之死三部脉麄長病得之死卒病得之生三部脉潎潎如羮上肥長病得之死卒病得之生三部脉連連如蜘蛛絲長病得之死卒病得之生三部脉軟長病不治自愈卒病得之生三部脉如革長病得之死卒病得之生三部脉累累如貫珠長病得之死三部脉如水淹然流長病不治自愈三部脉如水之流者長病得之生卒病得之死三部脉實而滑長病得之差卒病得之死三部脉羸非其人得之死三部脉堅而數如張弓弦蠱毒病必死三部脉浮而數長病得之生卒病得之死三部脉數軟蠱毒病得之生三部脉細長軟長病得之生微而𦂳亦死三部脉芤長病得之生三部脉細而數長病得之生三部脉弦急長病得之生三部脉實而滑長病得之生實而緩則生實而𦂳亦生三部脉𦂳急癲病可治辯脉虚實法人有三虚三實者謂有脉之虚實有病之虚實有診之虚實也脉有虚實者脉來濡者為虚𦂳牢者實病有虚實者出者為虚入者為實言者為虚不言者為實緩者為虚急者為實有診之虚實者濡者為虚牢者為實痒者為虚痛者為實外痛内快為外實内虚内痛外快為内實外虚又邪氣盛則實精氣脫則虚何者是重實大熱病氣熱脉滿者是也脉盛皮熱腹脹前後不通為五實脉細皮寒氣少洩痢飲食不入為五虚辯損至脉法脉有損至何謂也然至之脉一呼再至曰平三至曰離經四至曰奪精五至曰困六至曰命絶何謂損一呼一至曰離經二呼一至曰奪精三呼一至曰困四呼一至曰命絶此損之脉也至脉從下上損脉從上下也損脉之為病奈何然一損於皮毛則皮聚而毛落二損於血脉血脉虚少則不能榮於五臓六腑三損於肌肉肌肉消瘦則食飲不為肌膚四損損於筋筋緩則不能自收持五損損於骨骨萎則不能起於牀反此者至於收病也從上下者骨萎不能起於牀者死從下上者皮聚而毛落者死損至之法奈何然損於肺者益其氣損於心者調其榮衞損於脾者調其飲食適其寒温損於肝者緩其中損於腎者益其精此損至之法也察色論論曰聲合五音色合五行聲色符同然後定臓腑之榮枯若滋榮者其氣生如翠羽雞冠蟹腹豕膏鳥羽是也枯夭者其氣敗如草滋衃血枳實枯骨如炲是也至於青赤見於春赤黄見於夏黄白見於長夏白黑見於秋黑青見於冬是謂五藏之生者以五行之相繼也得肝脉色見青白心脉色見赤黑脾脉色見黄青肺脉色見黑黄是謂真藏之見者以五行之相尅也若乃肺風而眉白心風而口赤肝風而目青脾風而鼻黄腎風而肌黑以風善行數變故爾肝熱而左頰赤肺熱而右頰赤心熱而顔赤脾熱而鼻赤腎熱而頤赤以諸熱皆屬火故爾以至青黑為痛黄白為熱青白為寒以九氣不同故爾鼻青為腹水氣白為無血黄為寒赤為有風鮮明為留飲而五色取决於此故爾然審病者又皆以真脾為本葢真脾之黄是謂天之氣五色又明病雖久而面黄必生者以其真氣外榮也察聲色決死生法凡人赤者欲如帛裹朱砂不欲如赭色也白者欲如白璧之色不欲如白堊也青者欲如蒼璧之色不欲如藍也黄者欲如羅裹雄黄不欲如黄土也黒者欲如漆不欲如炭也凡色青如草滋黒如炲黄如枳實赤如衃血白如枯骨有此五色者並為死候也凡青如翠羽黒如鳥羽赤如雞冠黄如蟹腹白如豚膏有此五色並為生候也病人耳目鼻口有黒色起入口者必死病人兩目皆有黄色起者其病當愈病人耳目及頰顴上赤者五日死病人有黒色出扵額上及髮際至鼻脊兩顴上五日死病人及健人黒及白色入目鼻口者五日而死病人及健人面忽如馬肝色望之如青近之如墨者死病人口如魚口不能復閉而氣出多不返者死病人妄語錯亂及不能語者不可治熱病者可治病人循衣縫譫言者不可治病人尸臭甚者不可治病人目迴迴直視肩息者一日中死病人背青人中反者三日死病人面無精光似土色不能食者四日死病人目無精光及牙齒黑色不可治病人面黄目黑九日死病人面白目黑者不可治病人面赤目白者十日死病人但張其口不能閉者三日死病人面赤目青者立即死病人面黑目白者八日死病人目系傾者七日死病人齒色忽變黒者十三日死病人髮直者十五日死病人遺尿不覺者死病人脣口忽乾者必死病人爪甲青者必死病人頭目久痛卒視物不見必死病人舌卷及卵縮者死病人面黑目直視惡風者死病人面黄目白者不死病人面黄目青者死病人面黄目赤者不死病人面色青目白者死病人而目俱黄者不死病人面目俱白者即死病人面青唇黑者死病人髪如乾麻喜怒者死病人髮與眉衝起者死病人面色黑兩脇下滿不能自轉反者死病人卒腫面色蒼黑者死病人手掌腫無文者死病人臍腫反出外者死病人隂囊莖俱腫者死病人手足爪甲下肉黑者死病人汗出不流舌卷者死病人唇反人中滿者死病人隂陽絶目眶陷者死病人五藏已奪神氣不守聲嘶者死病人隂結陽絶目精脫恍惚者死病人隂陽俱絶裂衣掇空妄言者死病人隂陽俱洩絶失音不能言者死病人榮衞竭絶面浮腫者死病分氣血晝夜衰旺夫百病晝則増劇夜則安靜是陽病有餘乃氣病而血不病也百病夜則増劇晝則安靜是隂病有餘乃血病而氣不病也晝則氣行晝者陽也主行陽道也氣也無形質而象天也熱也火也動輕也主外也動而不息者也氣主呴之春也浮也夜者隂也主行隂道也血也有形質而象地也寒也水也靜重也主内也靜而濡潤者也血主濡之秋也降也冬也沉也病有夜則惡寒晝則安靜是隂氣自旺於本部也有夜則安靜晝則惡寒是隂氣上溢於中也有夜則惡寒晝亦惡寒此隂部太盛兼有其陽乃病之極矣亟㵼其隂峻補其陽病有晝則發熱夜則安然是陽氣自盛於本部也有晝則安然夜則燥煩是陽氣下陷於隂中也名曰熱入血室病有晝則躁作夜則煩躁是陽極太盛兼有其隂當亟㵼其陽峻補其隂為隂氣將竭重陽者死重隂者死宜亟攻之病有晝則惡寒夜則煩躁飲食不入病名曰隂陽交交者死矣病機論論曰察病機之要理施品味之性用然後明病之本焉故治病不求其本無以去深藏之大患故掉眩收引膹欝腫脹諸痛痒瘡皆根於内夫百病之生也皆生於風寒暑濕燥火以知化之變也經言盛者㵼之虚者補之余錫以方士用之尚未能十全余欲令要道必行桴皷相應猶拔刺雪汚工巧神聖可得備聞靈樞經曰刺深而猶可拔汚深而猶可雪莊子曰雪猶洗也岐伯曰審察病機無失氣宜此之謂也黄帝曰願聞病機何如岐伯對曰凡諸氣掉眩皆屬於肝少慮無怒風勝則動肝者罷極之本魂之君也其華在爪其充在筋以生血氣其味酸其色蒼為將軍之官謀慮出焉此為隂中之少陽通於春氣其脉弦王注曰肝有二部葉一小葉如木甲拆之狀啓經所謂其用為動火乃木之為動火太過之政亦為動葢火木之主暴速所以掉眩也掉摇也眩昏亂也旋運皆生風故也是以風火皆屬陽陽主動其為病也胃脘當心痛上支兩脇膈咽不通食飲不下甚則耳鳴眩轉目不識人善暴僵仆裏急緛戾脇痛嘔泄甚則掉眩癲疾兩脇下痛引少腹令人怒也虚則目職昏昏無所見善恐如人將捕之凡病肝木風疾者以熱為本以風為標故火本不燔遇風烈乃焰肝本不甚熱因金衰而王肺金不勝心火木來接於金故諸病作矣其為治也燥勝風王注曰風自木生燥為金化風餘則制之以躁肝勝治以清凉之氣也木氣之下金氣承之又曰風滛於内治以辛凉肝欲散急食辛以散之故木主生榮而主春其性温故風大則反凉而毁折是兼化制其木也故風病過急反而中外燥燋是反並金化也故非為金制其木是甚則如此中風偏枯者由心火暴甚而水衰不能制則火實尅金金不能平木則肝木勝而兼於火熱則卒暴僵仆凡治消癉仆繫偏枯痿厥氣滿發肥賁髙粱之疾也故此藏氣平則敷和太過則發生不及則萎枯諸痛痒瘡瘍皆屬於心靜則神明熱勝則腫心者生之本神之象變也其華在面其充在血脉為陽中之太陽通於夏氣其脉鈎其味苦其色赤為君主之官神明出焉此為主官陽中之陽也王注曰心形如未敷蓮花中有七空以導引天真之氣神明之宇也經所謂其用為燥火燥性動其明於外熱甚火赫爍石流火金之極變也燔焫山川旋反屋宇火之災𤯝也故火非同水水智而火愚其性暴速其為病也當胷中熱嗌乾右脇滿皮膚疼痛寒熱咳嗽唾血血洩鼽衂嚏嘔溺色變甚則瘡痒胕腫肩背臑痛缺盆中痛瘍疼身熱驚惑惡寒戰慄譫妄悲忘衂衊語笑瘡瘍血流狂妄目赤胷中痛脇支滿脇下痛背膺肩胛間痛背痛虚則胷腹大脇下與腰背相引而痛其為治也以寒勝熱王注曰小熱之氣凉以和之大熱之氣寒以取之甚熱之氣汗以發之發之不盡制之制之不盡求其屬以衰之又曰用水之主以制陽光經曰氣有多少病有盛衰治有緩急方有大小此之謂也是以熱滛於内治以醎寒佐以甘苦以酸收之以苦發之心欲耎急食醎以耎之君火之下隂精承之水氣化之是故火主暴虐故燥萬物者莫熯乎火夏月火熱極甚則先失氣薰味而萬物反潤以水出液林木津流及體熱極而反汗液出是火極而反兼水化俗以難辨認是作非不治已極反攻王氣是不明標本但隨兼化之虚象妄為其治反助其病而害於生命多矣故此藏平則昇明太過則赫曦不及則伏明王注曰百端之起皆自心生諸濕腫滿皆屬脾土味知氣化濕勝則濡泄脾者倉廪之官本營之居也名曰器能化糟粕轉味而出入者也其華在唇其充在肌其味甘其色黄又名諫議之官五味出焉此至隂之類通於土氣為隂中至隂脾也其脉緩王注曰脾形象馬蹄内包胃腕象土形也其用為化兼四氣聚散復形群品以生溉灌肝心腎肺主於時寄王四季經所謂善不可見惡不可見也其液入驟注其灾霖潰其為病也胕腫骨痛隂痺按之不得腰脊頭頸痛時眩大便難隂氣不用飲食不欲咳唾則有血積飲痞膈中滿霍亂吐下為善肌肉痿足不收行脇䐜嘔吐洩注下王注曰脾熱之生虚則腹滿腸鳴飱洩食不化者有胃之寒者有胃之熱者色白澄徹清冷皆屬於寒色黄水赤渾濁皆屬於熱故仲景曰邪熱不利穀水性疾速此之謂也其為治也風勝濕濕自土生風為木化土餘則制之以風脾盛治之以燥故濕傷肉濕勝則濡洩甚則水閉胕腫王注曰濕為水水盛則腫水下形肉色已消又曰濕氣為淫皆為腫滿但除其濕腫滿自衰若濕氣在上以苦吐之濕氣在下以苦泄之以淡滲之治濕之法不下小便非其治也故濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之若濕上甚而熱治以苦濕佐以甘辛以汗為散而止濕淫於内治以苦熱佐以酸淡以苦燥之以淡泄之脾苦濕急苦以燥之又曰土氣之下木氣承之本草曰燥可去濕桑皮赤小豆之屬王注曰半身已上濕氣有餘火氣復欝所以明其熱能生濕經所謂風寒在下燥熱在上濕氣在中火遊行其間是以熱之用矣故土主濕雲雨零而宏靜雨熱極甚則飄驟散落是反兼風水制其土也若脾甚土自壅燥去其濕以寒除熱脾土氣衰以甘緩之所以燥泄積飲痞隔滿腫濕熱乾涸消渴慎不可以温藥補之故積温成熱性之温乃勝氣之藥也藏喜新而惡陳常令滋澤無使乾涸故此土平則備化太過則敦阜不及則卑濫諸氣膹欝病委皆屬於金肺氣常清利燥勝則乾肺者氣之本魄之處也其華在毛其充在皮其味辛其色白而為相傅之官治節出焉為陽中之少陽通於秋氣其脉毛王注曰肺之形象人肩二布葉一小葉中有二十四空行列以布分諸藏清濁之氣經所謂其用為固其變肅殺其生目蒼落其為病也骨節内變左胠脇痛寒積於中感雪太凉革候咳腹中鳴注泄鶩溏咳逆心脇滿引小腹善暴痛不可反側嗌乾面塵色惡腰痛丈夫􅒃疝婦人少腹痛浮虚鼽尻隂股髀腨胻是病皴揭實則喘欬逆氣肩背痛汗出尻隂股膝髀虚則少氣不能報息耳聾嗌乾其為治也熱勝燥燥自金生熱為火化金餘則制之以火肺勝則治之以苦又曰金氣之下火氣承之燥淫於内治以苦温佐以苦辛以苦下之若肺氣上逆急食苦以泄之王注曰制燥之勝必以苦温故受乾病生焉是以金主於秋而屬隂其氣凉凉極天氣清明而萬物反燥若火是金極而反兼化火也故病血液衰也燥金之化極甚則煩熱氣欝痿弱而手足無力不能收持也凡有聲之痛應金之氣故此藏平氣則審平太過則堅成不及則不從革也諸寒熱皆屬於腎水能養動耗寒勝則涸腎者主蟄封藏之官本精之處也其華在髪其充在骨其味醎其色黑為作强之官伎巧出焉為隂中之隂通於冬氣其脉石王注曰腎藏有二形如二豆相並而曲附於膂筋外脂裏白表黑主藏精故仙經曰心為君火腎為相火是言在腎屬火而不屬水也經所謂膻中者臣使之官喜樂出焉故膻中者在乳之間下令在於腎是火居水位得升則喜樂出焉雖君有二火之氣論其五行造化之理同為熱也故左腎屬水男子以藏精女子以繫胞右腎屬火遊行三焦興衰之道由於此故七節之傍中有小心是言命門相火也經所謂其變凝冽其清冰雹其為病也寒喀心疼腰腿痛大關節不利屈伸不便若厥逆痁堅腹滿寢汗實則腹脛腫喘咳身重汗出憎風虚則胸中痛大小腹痛清厥意不樂王注曰大小腹大小腸也此所謂左腎水發痛也若夫右腎命門相火之為病少氣瘡瘍疥癬癰腫脇滿胷背首面四肢浮腫腹脹嘔逆瘛瘲骨痛節有動注下温虐腹中暴痛血溢流注精液目赤心熱甚則瞀昧暴痛瞀悶懊憹健嘔瘡瘍驚躁喉痺耳鳴嘔涌暴注瞤瘛暴死瘤氣結核丹熛皆相火熱之勝也其為治也寒勝熱燥勝寒若熱淫於内治以醎寒火所勝平以醎冷故相火之下水氣承之如寒淫於内治以甘熱佐以甘辛寒淫所勝平以辛熱又曰腎苦燥急食辛以潤之腎欲堅食苦以堅之故水本寒寒急則氷氷如地而能載物氷發而雹雪是水寒亢極反似尅水之土化是兼謂化也所謂寒病極者反腎滿也左腎不足濟之以水右腎不足濟之以火故此藏水平則靜順不及則涸流大過則流衍諸厥固泄皆屬於下厥謂氣逆固謂禁固氣逆則肝腎失守失守則不能禁固出入無燥濕不恒故氣下則愈也經所謂厥氣上行滿脉去形諸痿喘嘔逆皆屬於上肺者藏之長也為心之華葢故肺熱葉焦發痿躄是氣欝不利病喘息而嘔也嘔謂嘔醎水火氣炎上之象也胃膈熱甚則為嘔也若衰火之炎痿躄則愈利肺之氣喘息自調也道路開通吐嘔則除凡病嘔涌溢食皆屬之火也王注曰内格嘔逆食不得入是有火也經所謂三陽有餘則為痿易王注曰易有變易常用自痿弱無力也故病此者為熱明矣諸熱瞀瘛皆屬於火熱氣甚則濁亂昏昧也瞀瘛乃昏也經所謂病筋脉相引而急名曰瘛者故俗謂之搐是也熱勝風捕併於經絡故風主動而不寧風火相乘是以熱瞀瘛而生矣治法祛風滌熱之劑折其火勢熱瘛可立愈若妄加灼火或飲以發表之藥則取死不旋踵諸禁皷如䘮神守皆屬於火禁慄驚惑如䘮神守悸動怔忪皆熱之内作故治當以制大劑其神守血榮而愈也諸頸項强皆屬於濕寒濕同性水火同居故足太陽膀胱經屬水而下所以濕可傷也其脉起目内眥上額交於顛上其支别從顛入絡於腦還出别下項故主項强太陽表中風加之以濕客於經中内挾寒濕則筋脉抽急故頸項强而不柔和此太陽傷濕當詳有汗治以䟽濕祛風緩發表而愈也諸逆衝上皆屬於火衝攻也火氣炎上故熱甚則欝於内也諸脹腹大皆屬於熱肺主於氣貴乎通暢若嘔涌溢食不下也肺脹而腹大是以火主長而髙茂形見彰顯升明舒葉皆腫之相也熱去則見順利也諸燥狂越皆屬於火胃實則四股實而能登髙也故四肢者諸陽之本經所謂隂不勝陽則脉流薄疾病乃狂是以陽勝則使人妄言罵詈不避親踈神明之亂也故上善若水下愚若火此之謂也治之也以補㵼隂陽奪其食則病已也諸暴强直皆屬於風暴虐而害也强頸有力而不能和柔也乃厥隂風木勢甚而成此王注曰陽欝於内而隂行於外千金曰强直為風治㵼火補金木能自平也諸病有聲皷之如皷皆屬於熱腹脹大而皷之有聲如皷者熱氣甚則然也經所謂熱勝則腫此之類也是以熱氣内欝不散而聚所以扣之如皷也諸腹脹大皆為裏證何以明之仲景曰少隂病腹脹大不便者急下之宜大承氣湯所謂土勝堅水則乾急與大承氣湯下之以救腎水故知無寒其熱明矣諸病胕腫疼酸驚駭皆屬於火胕腫熱勝於内則傷氣滯故也疼酸由火實制金不能平木則木王而為酸者肝之味也故經所謂二陽一隂發病主驚駭王注曰肝主之原火其本也自心火甚則善驚所以驚則動而不寧也故火衰水平治之本也諸轉反戾水液渾濁皆屬於熱熱氣燥爍於筋故筋轉而痛應風屬於肝也甚則吐不止暍熱之氣加之以泄濕勝也若三氣雜乃為霍亂故仲景曰嘔吐而利若為霍亂故有乾霍亂有濕霍亂得其吐利邪氣得出名曰濕霍亂也十存八九若不得吐利揮霍撩亂邪無所出名曰乾霍亂十無一生者皆以冐暑中熱飲食不節寒熱氣不調清濁相干隂陽乖隔則為此病若妄言寒者大誤矣故熱則小便渾而不清寒則潔而不濁故井水煎湯沸則自然渾濁也諸病水液澄徹清冷皆屬於寒水液為病寒也故水清淨其氣寒冷水穀不化而吐利其色白腥穢傳化失常食已不饑雖有邪熱不殺穀而不饑者無倦而常好動其便色黄而酸王注曰寒者上下所以出及吐出溺出也又曰小寒之氣温以和之諸嘔吐酸暴注下迫皆屬於熱流而不腐動而不蠧吐嘔吐酸者胃鬲熱甚則欝滯於氣物不化而為酸也酸者肝木之味或言吐酸為寒者誤也暴注者是注泄也乃腸胃小轉化失常經所謂清氣在下則生飱泄下迫者後重裏急窘迫急痛也火性急速而物不化故也俗云虚坐弩責而痛也諸澁枯涸乾頸皴揭皆屬於燥澁枯者水液氣衰少血不榮於皮肉氣不通利故皮膚皴揭而澁也及甚則麻痺不仁涸乾者火多水少繫辭云燥萬物者莫熯乎火故火及熱甚水溢乾而不調潤於身皮膚乃啓裂手足有如斧傷而深二三分者冬月甚而夏月衰故法曰寒能收斂收斂則燥澁皴揭熱能縱緩則滋榮潤澤此皆屬燥金之化也王注曰物之生滑利物之死枯澁其為治也宜開通道路養隂退陽凉藥治之榮血通流麻木不仁澁涸乾勁皴揭皆得其所慎無服烏附之藥經所謂金木水火土運行之數寒暑燥濕火風臨御之化則失道可見民病可調凡受諸病者皆歸於五行六氣勝復盛衰之道矣王注曰人生有形不能無患既有其患亦常有逃生化出隂陽者也故曰謹守病機各司其屬有者求之無者求之盛者責之必先五勝踈其血氣令其得調達而致和平此之謂也三因論夫人禀天地隂陽而生者葢天有六氣人以三隂三陽而上奉之地有五行人以五臓五腑而下應之於是資生皮肉筋骨精髓血脉四肢九竅毛髪齒牙唇舌總而成體外則氣血循環流注經絡喜傷六淫内則精神魂魄志意喜傷七情六淫者寒暑燥濕風熱七情者喜怒憂思悲恐驚若將護得宜怡然安泰役冒非理百病生焉病症既成須尋所自故前哲示教謂之病源經不云乎治之極於二者因得之閉户塞牖繫之病者數問其經以從其意是欲知致病之本也然六淫天之常氣冒之則先自經絡入内合於腑臓為外所因七情人之常性動之則先自藏腑欝發外形於肢體為内所因其如飲食饑飽叫呼傷氣盡神度量疲極筋力隂陽違逆乃至虎狼毒蟲金瘡踒折疰忤附着畏壓溺等有背常理為不内外因金匱有言千般疢難不越三條以此詳之病源都盡如欲救療就中尋其類例别有三因或内外兼併淫情交錯惟其深淺斷以所因為病源然後配合諸證隨因施治藥石鐵艾無施不可内外傷論辨脉古人以脉上辨内外傷於人迎氣口人迎脉大於氣口為外傷氣口脉大於人迎為内傷此辨固是但其說有所未盡耳外感風寒有餘之證是從前客邪來也其病必見於左手左手主表乃行陽二十五度内傷飲食及飲食不節勞役所傷皆不足之病也必見於右手右手主裏乃行隂二十五度故外感寒邪則獨左寸人迎脉浮𦂳按之洪大𦂳者急甚於絃是足太陽寒水之脉按之洪大而有力中見手少隂心火之脉下與壬合内顯洪大乃傷寒脉也若外感風邪則人迎脉緩而大或大於氣口一倍或兩倍三倍内傷飲食則右寸氣口脉大於人迎一倍傷之重者過之少隂則兩倍太隂則三倍此内傷飲食之脉若飲食不節勞役過甚則三脉遍見於氣口是心火刑肺其肝木挾心火之勢亦來薄肺經曰侮所不勝寡於畏者是也故氣口脉急大而數時一代而澁也澁者肺之本脉代者元氣不相接脾胃不及之脉洪大而數者心脉刑肺也急者肝脉挾心火而反尅肺金也若不甚勞役惟右關脾脉大而數謂獨大於五脉數中微緩時一代也如飲食不節寒温失所則先右關胃脉損弱甚則隱而不見惟内顯脾脉之大數微緩時一代也宿食不消則獨右關脉沉而滑經云脉滑者有宿食也以此辨之豈不明白易見乎辨寒熱外傷寒邪之證與飲食不節勞役形質之病及内傷飲食俱有寒熱舉世盡將飲食失節勞役不足之病作外傷寒邪有餘表實之證反㵼其表枉死者多矣外傷寒邪發熱惡寒寒熱併作其熱也翕翕發熱又謂之拂拂發熱發於皮毛之上羽毛之拂明其熱在表也是寒邪感胃之明証也皮膚毛腠者陽之分也是謂之元氣所滋養之分也以寒邪乘之欝遏陽分不得伸故發熱也其面赤鼻氣擁塞不通心中煩悶稍似袒裸露其皮膚已不能禁其寒矣其表上虚熱止此而已其惡寒也雖重衣下幕逼近烈火終不能禦其寒一時一日增加愈甚必待傳入裏作下證乃罷其寒熱齊作無有間斷也其内傷飲食不節或勞役所傷亦有頭痛項彊腰痛與太陽表證微有相似餘皆不同論中已辨之矣内傷不足之病表上無傷不能禦風寒也此則常常有之其躁熱於腎間者而有之與外中寒邪畧不相似其惡風寒也葢脾胃不足營氣下流而乘腎肝此痿厥氣逆之漸也為胃氣平常飲食入胃其營氣上行以輸其心肺以滋養上焦之皮膚腠理之元氣也既下流其心肺無所禀受皮膚間無陽失其營衞之外護故陽分皮毛之間虚弱但見寒或居隂寒處無陽日處便惡之也此常常有之無間斷者也但避風寒及温暖處或添衣葢温養其皮膚所惡風寒便不見矣是熱也非表傷寒邪皮毛間發熱也乃腎間受脾胃下流之濕氣閉塞其下致隂火上衝作蒸蒸而燥熱上徹頭頂旁徹毛皮渾身燥熱作須待祼衣露居近寒凉處則已或熱極而汗出亦解彼外傷惡寒發熱豈有汗出者乎若得汗出則病愈矣以此辨之豈不如黑白之易見乎當内虚而傷之者燥熱也或因口吸風寒之氣欝其隂火使咽膈不通其吸入之氣欲入為膈上衝脉之火所拒使隂氣不得入其胸中之氣為外風寒所遏欝欝而不得伸令人口開目瞪極則聲發於外不能上下塞於咽中而氣欲絶又或噦嘔咽吐而躁熱發必有所因凡有此證其表虚惡風寒之證復見矣表虚之弱為隂火所乘躁發須臾而過表虛無陽不任風寒復見矣是表虚無陽常常有之其躁熱則間而有之此二者不齊作燥作寒已寒作燥已非作外傷之寒熱齊作無有間斷也百病俱有身熱又謂之肌熱又謂之皮膚間熱以手捫之方知者是也乃肌體有形之熱也亦須皆待隂陽既和汗出則愈矣慎不可以此上辨之以其虚實内外病皆有之故難辨耳只依先說病人自覺發熱惡寒之熱及躁作之熱上辨之為准則矣辨外感内傷惡風外感八風之邪乃有餘證也内傷飲食不節勞役所傷皆不足之病也其内傷亦惡風自汗若在温暖無風處則不惡矣與外傷鼻流清涕頭痛自汗頗相似細分之時異耳外感風邪自汗頭痛鼻流清涕常常有之一日一時増加愈甚直至待入裏作下證乃能罷語聲重濁髙厲有力鼻息壅塞而不通能食腹中和口别味大小便如常筋骨疼痛不能動摇便着牀枕非扶不起其内傷與飲食不節勞役所傷然亦惡風居露地中兼大漫風起却不惡也惟門窻隙紙中賊風來大惡也與傷寒傷風俱不同矣况鼻流淸涕頭痛自汗間而有之鼻中氣短少氣不足以息語則氣短而怯弱妨食或不下或不飲食三者互相有之腹中不和或腹中急而不能伸口不别五穀之味小便頻數而不渴初勞役得病食少小便赤黄大便常難或秘或結或虚坐只見些小白膿時有下氣或泄黄如糜或溏泄色白或結而不通若心下痞或胸中閉塞如刀劙之痛二者亦互相見不併出也有時胃脘當心而痛上肢兩脇痛心臍下相火之勢如巨川之水不可遏而上行使陽明之經逆行亂於胸中其氣無止息甚則髙喘熱傷元氣合四肢不收無氣以動而懶倦嗜卧其外感風寒俱無此證故易為分别耳復有一等乘天氣大熱之時在於路途田野中勞形得之更或有身體薄食小勞役過甚又有修善長齋之人有氣久虚而因勞役得之者皆與陽明熱白虎湯證相似必饑體捫摸之壯熱必躁熱悶大惡渴而飲水以勞過甚之故亦身疼痛始受病之時特與中熱得有餘之病相似若誤與白虎湯旬日必死此證脾胃太虚元氣不足鼻口中氣皆短促而上喘至日轉以後足陽明得時之際病必可減若是外中熱之病必到日晡之際大作讝語其熱増加大渴飲水煩悶不止其勞役不足者皆無此證尤易為分解若得有難决疑似之證必當待一二日而求醫治療必不至錯矣或因勞役動作腎間隂火沸騰事閒之際於大舍之内或於隂凉處或解脫衣裳更有新浴或身閒於背隂處坐卧其隂火不行還歸腎間皮膚腠理極虚無陽但風來或為寒凉所遏表虚不任其風寒自認外感風寒求衣解表以重絶元氣取禍如翻掌茍幸而免者致虚勞氣血皆弱不能完復且表已虚之人為風寒所遏亦是虚邪犯表始病一二日之間時與外中賊邪有餘之證頗有相似處故致疑惑諸醫者只於氣少氣盛上辨之其外傷賊邪必語聲前輕後重其聲髙厲而有力若是勞役所傷飲食不節表虚不足之病必短氣氣促上氣髙喘懶語如有所問難勉强對答一兩句其聲困弱而無力至易見也分内外傷治法内經篇云夫邪之生也或生於隂或生於陽其生於陽者得之風雨寒暑乃天之邪感則傷人五臓是八益之邪故曰風從上受之其中人也髙俗言傷風傷寒者是也治法邪在皮者汗而發之其生於隂者得之飲食居處隂陽喜怒乃水之寒熱感則害人六腑是七損之病故曰濕從下受之經言飲食勞倦則傷脾俗言内傷飲食是也又云勞則氣耗熱伏榮中陽氣不得伸故頭痛耳鳴九竅不利皆腸胃之所生也治法邪在下者引而竭之帝曰風雨之傷人奈何岐伯曰風雨之傷人也先客於皮膚傷入於孫脉孫脉滿則傳入絡脉絡脉滿則輸於大經脉血氣與邪併客於分凑之間其脉堅大故曰實實者外堅充滿不可按之按之則痛此重明八益之邪傷人中人也髙是客邪表受風寒帝曰寒濕之傷人奈何岐伯曰寒濕之中人也皮膚不收肌肉堅𦂳榮血泣衞氣去故曰虚虛者聶辟氣不足按之則氣足以温之故决然不痛此清虛之地氣傷人也必從足使故曰地之濕氣感則害人皮肉筋脉夫百病之變皆生於風雨寒暑及飲食居處隂陽喜怒鍼經解云若身形不虛外邪不能傷故知百病皆由喜怒不節勞役形體飲食不調胃氣一失榮氣不生隂火乘之清氣伏匿於下焦隂火隂血上涌閉塞九竅元氣逆行百病之變由是來矣是知清靜之氣不可妄勞胃氣不可不養若能志閒而少欲心安而不懼形勞而不倦乃天清地淨百骸和暢得盡天年帝曰善隂之生實奈何岐伯曰喜怒不節則隂氣上逆上逆則下虚下虛則陽氣走上故曰實矣夫隂氣逆上者盛怒得之非喜也喜則氣和此喜之一字傳冩誤矣前已有說血之與氣并走於上則為大厥厥則暴死是謂盛怒也先說熱中一段内云血并於上為善怒舉此兩段為證言喜者誤矣帝曰隂之生虚奈何岐伯曰喜則氣下悲則氣消則脉虚空因寒飲食寒氣熏滿則血泣氣去故曰虛矣辨云隂虚者說飲食居處隂陽喜怒按隂陽應象大論云喜怒傷氣今言喜氣下行者非也喜則氣和以此證之飲食勞倦是為隂病非陽喜之病皆陽氣不足隂氣有餘但遇天隂寒心不樂病必增加故言悲則氣消若遇晴暖心喜樂或美食充口其病皆去聖人立法只宜補陽附其陽道知非喜為氣下也帝曰經言陽虛則外寒隂虛則内熱陽盛則外熱隂盛則内寒余已聞之矣不知其所由然也此一段帝問在表陽病在裏隂病四證陽虛則外寒陽勝則外熱此明客邪傷表六淫有餘之證隂虚則内熱隂盛則内寒飲食脾胃病始於熱中終於寒中岐伯曰陽受氣於上焦以温皮膚分肉之間今寒氣在外則上焦不通則寒氣獨留於外故寒慄寒慄謂心寒慄也非戰動又明陽虚生外寒此風寒傷表有餘病也隂虛生内熱奈何岐伯曰有所勞倦形氣衰少榖氣不盛上焦不行下脘不通胃氣熱氣氣熏胷中故内熱此再明濕從下受之病之形狀乃水榖之寒熱則害人六腑此中焦不足脾胃先受病乃飲食勞倦始受熱中陽盛生外熱奈何岐伯曰上焦不通利則皮膚緻密腠理閉塞𤣥府不開衛氣不得泄越故外熱此乃末傳客寒化熱當下也故經云人之傷於寒則為病熱是也隂盛生内熱奈何岐伯曰厥氣下密寒氣積於胷中而不㵼不㵼則温氣去寒獨留則血凝泣則血脉不通其脉盛大以濇故中寒此再明脾胃不足勞役形體中焦榮氣受病末傳寒中惟宜補陽㵼隂帝曰隂與陽并血氣以并病形以成刺之奈何岐伯曰刺此者取之經隨取血於營取氣於衞用形者因四時多少髙下此一段明脾胃榮氣不足從隂引陽并㵼血絡經隨榮者主血隂氣也衞者主氣陽氣也夫行針之道必先知形之長短骨之廣狹循三備法通針身形以施分寸故曰用形也四時多少髙下具在下篇此脾胃不節榮衞不行始病熱中經隨隂血宜理陽氣帝曰血氣以并病形以成隂陽相傾㵼奈何此復問八風表邪及傷寒客邪在外有餘之證惟宜㵼之血氣以并及隂病勞役脾胃濕從下受中虚不足之證岐伯曰㵼實者氣盛乃内鍼岐伯先以風寒外邪為之對鍼與氣俱内以開其門如利其户鍼與氣俱出精氣不傷邪氣乃下外門不閉以出其疾揺大其道如利其路是謂大㵼必切而出大氣乃屈言欲開其穴而泄其邪氣切謂急也言急出鍼也予詳切字之義非急出鍼也切其穴路以防真氣泄止出其鍼以利其路獨令邪氣出令鍼頭引出其邪恐鍼帶出真氣此切之意也鍼解論云疾而徐則虛者疾出鍼而徐按之也大氣謂大邪氣也屈謂退伏也有餘外證帝曰補虛奈何岐伯曰持鍼勿置以定其意候呼内鍼氣出鍼入鍼空四塞精無從去方實而疾出鍼氣入鍼出熱不得還閉塞其門邪氣布散精氣乃得存動氣候時注曰動旡候時乃當近氣不失逺氣乃來是謂追之此治法不足内病脾胃也帝曰夫子言虚實者有十生於五臟五脉耳夫十二經脉皆生其病注曰甲乙經曰皆生百病素問今夫子獨言五臓夫十二經脉者皆絡三百六十五節節有病必被經脉經脉之病皆有虛實何以合之岐伯曰五臓者故得六腑以為表裏經絡之節各生虚實其病所居隨而調之病在脉調之血心主脉脉主血榮病治在心調血脉病在血調之絡肝主血血病治在肝調之絡病在氣調之衞肺主氣其病治在衛此五臓之氣也視何臓以調之病在肉調之分肉脾主肉病在血絡以鋒鍼决之故曰血實宜决之病在筋調之筋肝主筋病在筋治在肝血病在骨調之骨腎主骨骨病治在腎熱則疾之寒則留之燔鍼刼刺其下及與急者筋病在脾者以燔鍼刼刺治在筋筋急者熨絡先令氣行也病在骨焠鍼藥熨腎主骨以大寒為骨痺者先藥熨焠刺焠刺即燔鍼也病不知所痛兩蹻為上病在隂蹻陽蹻痢癎瘛瘲不知所苦兩蹻為上者取申脉穴是足太陽太隂外踝下也身形有痛九候莫病則繆刺之病在於左而右脉病者巨刺之大氣不能過關尺者巨鍼刺之必矣謹察其九候鍼道備矣調經篇云夫邪之生也或生於隂或生於陽其生於陽者得之風雨寒暑其生於隂者得之飲食居處隂陽喜怒也夫風雨寒暑者自外而感傷其形傷形為有餘當㵼之仲景之書已備至於飲食居處隂陽喜怒自内而致傷其氣傷氣為不足當補之諸書所載畧而未詳今隨證立方并四時加减詳論之諸方見脾臓門飲食勞倦類醫學發明衝督任脉云二十八難曰竒經八脉者既不拘於十二經皆何起何繼也然督脉者起於下極之俞並於脊裏上至風府入屬於腦任脉者起於中極之下以上毛際循腹裏上關元至咽喉衝脉者起於氣衝並足陽明之經夾臍上行至胷中而散夫督任衝三脉者為一源始於二隂之間分為三𣲖任脉者起於㑹隂穴根於曲骨入前隂中出腹裏過臍上行附足厥隂之經為生化之源也貫穿諸經無所不係焉衝者分為二道起於㑹隂根於氣衝為二道入腹中夾臍兩傍上行附足陽明之脉至胷中而散一說上至腦耳上角下至足内踝絡跗上若搐如引繩之壯上下動之若一貫諸經之脉無所不到以其從胃脉故也十二經之海也旺為生化升降之主督脉者出於㑹隂根於長强上行脊裏至於巔附足太陽膀胱之脉膀胱者諸陽之首又曰巨陽無榮衞之氣係焉督脉為附督者都也能為表裏上中下十二經之病焉此督任衝三脉之起末也今邪客衝督二脉係根在下焦下焦者裏也地道也血也隂分也自臍已下至足少隂分下至骨髓主行隂二十五度於夜所受之邪止於内俗呼為雜病焉散於十二經絡百病形相無有定止其邪之張也有若流水犯於少隂之脉甚則煩心神明不安加勞役則如乾霍之狀瞋目則魂如去浪甚則内閉九竅外壅肌肉衞氣散解陽道不行名曰煎厥乃隂氣大盛大勢之來也其苦百端不可名狀病之重者無過於此折人天年治當從隂引陽先㵼衝督以三稜針挈其隂火是治其源㵼以苦寒之劑佐以辛熱乃寒因熱用為下焦如瀆經云在下者引而竭之聖人之法因近於二隂故從權也然閉於便溺者可也如便溺已通不當利大小便宜泄之於其内急宜苦酸味薄者從隂中以升發陽氣佐以辛甘温熱於陽分使得徹於皮毛衞氣之分亦是助榮衞之氣此藥若服當一大㵼此一㵼反助隂氣從權泄熱不得已而用之不極勿用當從火欝是為上治從隂發陽候其陽道升氣平乃止骨空論三脉為此類頗異三十六難曰藏各有一耳腎獨有兩者何也然腎兩者非皆腎也左者為腎右為命門者諸精神之舍原氣之所係也故男子以藏精女子以係胞故知腎有一也潔古云一者男子婦人皆以左腎右腎為命門男子藏精者氣海也婦人係胞者血海也所主者二受病者一也東垣云夫腎有兩者分水火之異左腎屬水腎氣道於耳又主骨又主大便難取足少隂右腎屬火男子蔵精施化婦人係胞有孕啓𤣥子曰男曰作强女曰技巧造化形容生化則異受病則同叔和云尺脉第三同斷病又云積液多成唾水勝也焦煩水易虧火勝也水勝則㵼水火勝則㵼火仲景以姜附湯㵼水大承氣湯㵼火是傷寒變證也人人生命皆係於此得不辨乎三十七難曰邪在六腑則陽脉不和陽脉不和則氣留之留之則陽脉盛矣邪在五臓則隂脉不和隂脉不和則血留之留之則隂脉盛矣隂氣大盛則陽氣不得榮也故曰格陽氣大盛則隂不得營也故曰關隂陽俱盛不得相營也故曰關格關格者不得盡其命而死矣經言氣獨行於五臓不營於六腑者何也然氣之所行也如水之流不得息也故隂脉營於五臓陽脉營於六腑如環之無端莫知其紀終而復始其不覆溢人氣内温於臓腑外濡於腠理解云邪在五臓者以明水穀之寒熱感則害人六腑是飲食不節勞役形體以傷六腑元氣有虧陽氣不行便為七損之病五臓乃傷内經云隂虚生内熱傳變之極則隂盛生内寒者是也邪在六腑者是明天之邪氣感則傷人五臓是外生風邪八風之變天有八風人有五臓乃八益之邪外傷筋骨筋骨疼痛非扶不起謂係屬五臓故以五臓明之也内經復解之云陽虛生外寒傳變甚則云陽盛生外熱與此意同故外傷風寒者謂之寒傷形筋骨乃應内傷飲食勞役者謂之熱傷氣肺之元氣乃應皆始受病之邪也又曰五臓不和則九竅不通正謂飲食不節勞役形質脾胃有傷竒邪隂火之作過也六腑不和則留結為癰陽氣盛有餘之邪也經曰風寒傷形憂恐忿怒傷氣氣傷臓乃病臓病形乃應形傷筋骨乃應此形氣内外之相應也天之邪氣風寒六淫客邪有餘之變始則陽受外寒莫傳下行入裏而為陽盛生外熱飲食所傷水穀之寒熱先為憂喜忿怒所傷元氣飲食勞役為之變應諸病從此變而出矣故憂喜忿怒飲食不可不慎也普濟方卷四
