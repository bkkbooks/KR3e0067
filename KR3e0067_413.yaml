body:
  text: 普濟方卷四百十三明周王朱橚撰針灸門井榮俞經合部分圖凡人兩手足各有此三陽三陰之脈合為十二經脈每一經中各有井榮俞經合皆出於井入於合經云所出者為井所流者為榮所主者為俞所行者為經所入則為合井者東方春也萬物之始生故言所出為井也合者北方冬也陽氣入藏故言所入為合也故春刺井夏榮季夏刺俞秋刺經冬刺合者聖人所為因其時而取之以瀉邪毒出也井榮所屬陰井木陽井金陰榮經陽火榮水陰俞土陽俞木陰經金陽經火陰合水陽合土昔聖人先立井榮俞經合配象五行則以十二經中各有子母故刺法云虛則補其母實則㵼其子假令肝自病實則㵼耳之榮屬火是子若虛則補肝之合屬水是母餘皆倣此若他邪相乘陰陽遍勝則先補其不足後㵼其有餘此為針醫之大要若深達洞明則為上上者也足取膝下三陰三陽脈穴流注手取臂下三陰三陽脈穴流注用其針刺法遂有過補虛㵼實如其施兵伐叛也六十首俞穴細而審之各逐其藏腑井榮俞經合常以五行走方無一失也以逐日取六十首為井榮俞經合足不過膝手不過臂常當時尅者謂之關可以針醫無不愈疾也時刻未至至氣之亦然謂之􅂒無能愈其疾也賈氏云凡六十首者元有二種也有外行脈經六十首又有內行血脈六十首此法微妙古聖人隱之恐世人曉會之只載一説今不傳愚自少歲索隱井榮之法始可著題或曰因何名曰六十首也答曰謂氣血一晝夜行過六十俞穴也各分頭首十日一絡運行十干皆以五子元遁日時為頭是也明廣今輒將賈氏各分頭首運行十干六十首注穴之法集其樞要述之二圖庶令覽者易悉第一圖括五臟五腑各至本時相生五度注穴之法第二圖言陰中有陽陽中有陰綱柔相配相生注穴之法人多只知陽干注腑陰干注臟刺陰待陰干刺陽候陽時如是者非祕訣云假令甲日甲戌時膽引氣出為井甲中暗有其己乙中暗有其庚故大言陽與陰小言夫與婦夫有氣則婦從夫婦有氣則夫從婦故甲戌時膽出氣為井脾從夫行脾亦入血為井如是則一時辰之中陰陽之經相生所注之穴皆有他皆倣此陽日氣先脈外血後脈內陰日血先脈外氣後脈內交貫而行於五臟五腑之中各注井營俞經合無休矣或不得時但取其原亦得十經血氣皆出於井入於合各注榮俞經合無休矣或曰脈首十二經又因何只言十經其餘二經不言者何答曰其二經者三焦是陽氣之父心包絡是陰血之母也此二經尊重不係五行之所補注受納十經血氣養育故只言十經陰陽二脈逐日各注井榮俞經合各五時辰畢則歸其本此二經亦各注井榮俞經合五穴方知十二經遍行也三焦經關衝陽井液門榮中渚俞陽池原支溝經天井合每日遇陽干合處注此六穴如甲日甲戌時至甲申時為陽干合也心包經中衝陰井勞宫榮太陵俞間使經曲澤合每日遇陰干合處注此五穴假令甲日甲戌時膽氣初出為井己巳時脾出血為井陰陽並行陽日氣先血後陰日氣後血先己巳時至己卯時為陰干合也餘干日辰皆依此通前共十穴合成六十首每一穴分得一刻六十分六十釐六毫六絲六忽六秒此是一穴之數六十穴合成一日每一時辰相生養子五度各注井榮俞經合五穴晝夜十二時辰氣血行過六十俞穴也欲知人氣所在用五子元遁日時觀前圖可見六十首是活法依此井榮刺病甚妙五子元遁日時歌甲巳之日丙作首乙庚之辰戊為頭丙辛便從庚上起丁壬壬寅順行流戊癸甲寅定時候六十首法助醫流肝大敦為井主肝家中熱尸厥如死狀心痛腹脹陰汗多血崩臍痛用針加心少府心榮本節中心痛狂顛實讝語少氣悲憂虛在心寒熱胸中便下針脾太白脾俞骨下分吐逆霍亂心中痛身熱腹脹血便膿下針一刺得安寧肺經渠脈經熱在骨熱喘病疼心吐逆掌後寸口脈陷中禁灸神針有大功腎陰谷腎合膝後分小腹急痛并漏下腳痛難移好用針小便黃赤遁時尋膽竅陰為井膽中行喉痺口乾并臂痛脅痛煩熱及頭疼一針難步却須行小腸前谷為榮屬小腸頸項臂痛汗不出喉痺頷腫嗌咽乾目生翳膜並除康胃陷谷胃俞節後邊面目浮腫汗不出腹痛腸鳴痎瘧纒三分針入得獲全膽原邱墟為膽是為原腋腫髀樞腿酸痛胸脅滿庸瘧安纒目生翳膜並除痊大腸陽谷為經表腕邊心煩目赤頭風痛顛狂喜笑鬼神言熱痛心驚針下痊膀胱委中合穴膕紋中髀樞痛及膝難屈腰脊沉沉溺失頻取其經血使能平小腸少澤元本手太陽臂痛咳嗽連項急井注喉痺舌生瘡目生翳膜一針康胃內庭胃榮本間中口喎牙痛依冗用四肢厥逆滿腹痛使下神針便去根大腸三間為俞本節後胸滿腸鳴洞泄頻喉痺咽梗齒齲疼唇焦氣喘針時定小腸宛骨為原手踝中目中淚出兼生翳熱病相連汗出頻偏枯臂舉只神針膀胱崑崙為經外後跟頭痛吐逆并腹脹腰痛腰重更難行小兒癎搐一齊針膽陽陵泉血瞻合間半身不遂依針刺腰伸不舉臂風癎膝勞冷痺不針安心少衝為井是心象虛則悲驚實喜笑熱病煩滿上氣多手攣臂痛用針加脾大都脾榮本節中腹滿煩悶並吐逆熱病相連是逆行神針一刺即時寧肺大淵肺俞掌後尋眼目赤筋白翳膜嘔吐咳嗽腹膨膨心疼氣上一般針腎腹溜腎經魚肚中腹內雷鳴并脹滿面目昏昏喜怒停四肢腫痛刺時靈肝曲泉肝合胕骨中身熱喘中氣勞病女人血瘕腹腫疼足痛泄利又便膿胃厲兊為井主胃象汗病不出如瘧狀尸厥口噤腹腸滑齒痛喉痺針刺佳大腸二間庚榮本節中肩臂疼時依此用喉痺鼻衄在心驚下針牙痛更無根膀胱束骨壬俞本節中要風目眩并背痛耳聾項急本穴尋針之必定有神功胃衝陽為原動脈中寒熱往來如瘧狀偏風口眼注牙疼遁時取效有同神膽陽甫膽經四寸間風脾不仁依此用筋攣骨痛足腫寒神針一刺不須難小腸小海為合肘上中四肢無力難舉步寒熱風腫項頭疼遁時針刺有神靈肺隱白為井足太陰鼻衄滑腸食不化腹脹喘滿吐交橫月經不止血山崩脾魚際為榮熱汗風目眩少氣咽乾燥咳嗽頭痛痺主胸嘔吐同針有大功腎太溪腎俞內踝下咳嗽上氣并脈短足厥心疼嘔吐涎神針到後病伏潛肝中封為穴內踝前臍腹痛時兼足冷振寒痎瘧色蒼蒼寒疝相連針下康心小海心合曲節間頭項痛時涕與笑齒痛嘔逆滿心胸用針一刺管驚人大腸商陽為井大腸中喘逆病熱并牙痛次指指上氣主胸耳聾寒熱目赤紅膀胱通谷為榮本節遊目􅉩􅉩胸中脹滿頭痛鼻衄項筋收飲食不化即時休膽臨泣膽俞節後邊月事不調依此用中滿缺盆腫項咽氣噎如瘧當時安大腸合谷為原岐骨中目視不明并齒痛痺痿漏下熱生風牙關口噤一針功小腸腸谷為經刺腕中熱病過時汗不出顛疾狂走妄言驚耳聾齒痛目眩針胃缺肺少商肺并注心中飲食不下咽喉痛寒食咳逆喘脹衝三稜針刺血為功腎然谷腎榮內踝尋小兒臍風並口噤喘呼少氣足難行神針并灸得安寧肝大衝肝俞本節後淋瀝足寒並吐血腰引少腹小便膿漏下女子本中痛心靈道為經掌後真暴瘖即便難言語心痛肘攣悲恐驚建時到後即宜針脾隂陵泉穴脾之合霍亂疝瘕及腰疼腹腎喘逆身難卧小便不利針時過膀胱至陰為井是膀胱胸脅痛時依法用目生翳膜頭風狂小便不利寒中傷膽俠骨膽榮小節中寒熱目赤頸項痛胸脅脹滿足難行耳聾一刺便聞聲小腸後溪為俞節陷中耳聾鼻衄并喉痺寒熱氣瘧目生筋肘臂筋攣同用針膀胱京骨為原內際間目皆內赤頭頸強䯒痠膝痛屈伸難寒熱腰疼針下安胃解溪穴是胃之經頭痛霍亂面浮腫腹脹䯒腫腳轉筋大便下重也同針大腸曲池為合肘外邊身中痛急身無力半身不遂語難言喉痺針下也痊然金三焦之井號關衝臂肘痛攻不能舉目生翳膜主頭痛喉痺針刺取其靈水液門為榮刺陷中目赤齒血出不定驚悸癎熱共頭疼三稜針刺即時靈木中渚為俞節後尋目生翳膜咽喉痛熱病頭疼耳不聞針入三分時下明三焦原陽池為原腕表中臂痛身沉難舉步寒熱如瘧積心胸一針當面有神功火支溝為經腕後真霍亂吐時并口噤熱病臂肘痛廉疼一針得氣便醒醒土缺木中衝為井厥陰心熱病煩悶汗不出掌中煩熱及頭疼舌強針時得自平火勞宫心榮手掌中狂笑顛疼同日用中氣攣痺口中腥氣粗喘池須不寧土太陵心俞腕後尋目赤小便如赤色喜笑悲哀氣上衝狂言時痛建中時金間使心經掌後間熱時咽痛并驚悸心痛嘔逆惡風寒神針邪忤也須安水曲澤為合肘重存肘臂筋攣多嘔血心疼煩悶口乾中呼吸陰陽去疾根腎涌泉為井腎中尋身熱喘時同日刺大便祕結與心疼足寒逆冷也安平肝行間肝榮大指間腰痛心痛如死狀咳逆嘔血更咽乾溺難寒疝下針安心神門心俞掌後尋身熱嘔血多間病惡寒心痛不食中下針得刺有神功脾身寒逆氣并絶子尺澤肺合在肘中血氣輪流此處存手攣風痺氣衝胸肺咳嗽口舌乾喉痛缺五子元遁法中尋十二身流注五臟六府明堂肺人肺者臟也兩傍一十八穴甲乙經肺出於少商少商者木也在手大指端內側出手甲角如韭菜手太陰脈之所出也為井冬三月宜灸之流於魚際魚際者火也在手大指本節後內側散脈中手太陰脈之所流也為華春三月宜灸之注於太淵太淵者火也在手掌後陷者中手太陰脈之所注也為俞夏三月宜灸之行於經渠經渠者金也在寸口陷者中手太陰肺之所行也為經不可灸傷人神明入於尺澤尺澤者水也在肘中約上動脈手太陰脈之所入也為合秋三月宜灸之少商在手大指端內側去爪甲如韭葉灸一壯主瘧寒厥善噦心滿而汗出寒濯濯熱煩手臂不仁唾沫唇乾及熱煩心引食手按攣指支痛肺脹上氣耳中生風咳喘逆痺臂痛吐飲食不下彭彭熱病象瘧振憟鼓頷腹脹俾俔喉中喘耳前痛甄權云大手大母指甲骨外畔當角一韭菜白肉際宛宛中是也此脈肺之候論藏溪不宜灸之惡生冷熱食魚際在手大指本節後內側散脈中灸三壯主虛極灑灑毛起惡風寒舌上黃身熱咳嗽喘病走胸背不得息濕痛甚汗不出寒厥及熱煩心少氣不足以息陰濕癢腹痛不下飲食肘攣支滿喉中焦乾竭痓上氣熱病振憟鼓頷腹滿陰痿咳引尻漏出虛也膈中虛飲食嘔身熱汗不出數唾挺嘔吐血下肩背寒熱脫色目泣出皆虛也色不變者脈心痛也短氣心痺悲怒逆氣恐狂易霍亂胃氣逆太淵在手掌後陷者中灸三壯主痺逆氣寒厥逆煩心善唾噦噫胸滿噭呼胃氣上逆心痛咳逆煩悶不得臥胸中滿喘背痛脈脹彭彭臂厥肩膺胸滿痛目胸白翳眼青轉筋掌中熱乍寒乍熱缺盆中相痛數次喘不得息臂內廉痛膈飲煩滿病溫身熱五月以上者不出厥心痛臥若從中心間痛動作痛益甚色不變者肺心痛也如乳噫胃氣上逆心痛唾血振寒嗌乾狂言口臂肘中痛皆瘧痺胃也經渠在手口陷中不可灸傷人神明主瘧寒熱胸皆急胸中彭彭然甚即交兩手如瞀為暴痺喘逆候痺掌中熱咳逆上氣喘息數次熱病汗不出心痛欲嘔也列缺手太陰絡去腕上一寸半灸五壯甄㩲云腕後臂側二寸交又頭兩筋骨間宛宛中是也主遍氣口喎半身不隨腕勞灸三壯主瘧甚熱驚癎如有見者咳喘掌中熱虛則肩背寒憟少氣不足以息寒厥交兩手如瞀為口沫出實則肩背熱痛汗四肢腫身溫時時熱飢則煩飽則悶面色變口不開惡風泣血出喉痺咳上氣數次四肢厥逆善笑弱白熱病先手臂痛身熱瘈瘲唇口咽下汗出如連珠小便白熱痛兩乳下三寸堅脅下滿悸善忘口中沫出孔最手太陰郤去宛上三寸灸五壯主熱病汗不出此穴可灸五壯汗即出厥頭痛尺澤在肘中約上動脈灸三壯甄㩲云在臂屈橫交中兩筋骨陷者宛宛中不宜灸主喉痺上氣士乾脅痛心彭彭痛咳逆上氣舌乾脅痛心煩肩寒少氣不足以息腹脹喘振憟瘈瘲手不伸咳嗽唾濁氣膈善嘔鼓頷不得汗煩滿身痛因為縱衄唾血時寒時熱胞中有大疝瘕積與陰相引痛若穴泄上下出喉痺哽噎寒熱實則肩背熱痛汗不出四肢暴腫虛則臂寒背短氣心煩癲疾嘔沫手臂不得上頭頭肘痛也俠白在天府下去肘下五寸動脈手太陰别灸五壯主心痛咳乾嘔煩滿天府在腋下三寸臂臑內廉動脈手太陰脈氣所發禁不可灸候人逆氣主咳上氣喘不得息暴瘴內逆肝肺相摶口鼻出血身脹逆息不能臥風汗不出身腫喘喝多睡恍惚善忘嗜臥不覺甄推十金揚操同也大腸人大腸者肺之腑也兩傍四十二穴并下三單穴共四十五穴甲乙經大腸出於商陽商陽者金也一名絶陽在手大指次指內側去爪角如韭葉手陽明脈之所出為井冬三月宜灸之流於二間二間者水也一名間谷在手大指次指本節前內側陷者中手陽明脈之所溜也為榮春三月宜灸之注於三間三間者木也一名少谷在手大指本節後內側陷者中手陽明脈之所注也為輸夏三月宜灸之過於合谷一名虎口在手大指岐骨間手陽明脈之所過也為原行於陽溪陽溪者火也一名中魁在腕中上側兩筋間陷者中手陽明脈之所行也為經入於曲池曲池者土也在肘外甫屈肘曲骨之中手陽明脈之所入也為合秋三月宜灸之商陽一名在手絶陽大指尖指內側去爪甲角如韭葉灸三壯右取左左取右如食頃立巳主氣滿胸中喘息支脅熱病汗不出耳中風耳鳴耳聾時不聞熱瘧口乾下齒痛瘈引口中惡寒頻腫肩痛引缺盆喉痺青肓是也二間一名間谷在手大指次大指本節後內側陷者中灸三壯主人多臥善唾肩髃痛寒鼻齀赤多血侵淫起面身熱喉痺如哽皆傷忽振寒肩疼齒痛也三間一名少谷在手大指次指本節後內側陷者中灸三壯主喉痺腫如哽齒齵痛惡青多臥善唾胸滿腸間痛瘧寒熱唇口乾身乾喘息目急痛善驚合谷一名虎口在手大指岐骨間灸三壯主寒瘖瘧狂易鼻齀衄熱病汗不出腹目目痛舌齒齲驚喉痺痱痿鼻腕不用唇吻不收聾耳中不通瘖不能言口噤不開陽溪一名中魁在腕中上側兩筋間陷者中灸三壯主熱病煩心隨目目痛泣出厥逆頭痛胸齒滿不得息寒熱癲疾不嘔惡若笑見鬼喉痺耳聾鳴痛驚製瘧寒甚熱病腸澼臑肘臂痛虛則氣膈滿肩不舉吐舌戾頸妄言痂疥偏厯手陽明絡在腕後三寸灸三壯主風瘧汗不出寒熱風痛汗不出膸目目􅀈􅀈癲疾多言耳鳴口僻煩腫實則聾喉痺不能言齒齲痛鼻齀衄虛則痺隔也溫留一名逆注一名蛇頭手陽明郤在腕後小七五寸大士六寸灸三壯主腸鳴而痛傷熱頭痛噦衄肩不舉瘧面赤腫口齒痛癲疾吐舌彭頷狂言見鬼狂臥喉痺不能言虛氣面腫下廉右輔骨下去上廉一寸怒甫齊兑內分外斜灸三壯主眼痛熱弱黃也上廉在三里下一寸陽明之會灸三壯主小便黃腸中鳴相追三里在曲池下二寸按之肉起兑兑肉之端灸三壯主腹䐜時寒微腰痛不得臥齒痛頰腫也曲池在肘外輔屈肘曲骨之中灸三壯主肩肘中痛難屈伸手不可舉喉痺不能言目不明腕急身熱驚狂躄痿痺重瘈瘲癲疾吐舌胸中滿耳前痛齒痛目赤痛頸腫寒熱渴飲輒汗出不飲則皮乾熱傷寒餘熱不盡肘髎在肘大骨外廉陷中灸三壯主肩肘節戾重痺痛以至不可屈伸五里在肘上三寸又行馬褁大外中央灸十主風勞驚恐久泣血肘不飲舉風癎嗜臥四肢不熱搖身黃寒熱頸厯適咳呼吸膸目目昏昏少氣痎瘧心脹滿痛上氣左取右右取左是也臂臑在肘上七寸胭內端手陽明絡會灸三壯主寒熱頸瘰厯肩痛不可舉臑會一名臑扁在臂前廉曲肩頭三寸手陽明之絡灸五壯主癭臂氣腫陰理氣肩􅂒在肩端臑上斜舉臂取之灸三壯主肩重不舉臂痛肩髃在肩端兩骨間手陽明蹻脈之會灸三壯主中熱指臂痛巨骨在肩端上行兩義骨陷者中手陽明蹻脈之會灸三壯主有痺背痛臂不舉血瘀肩中痛不能動搖扶突一名水穴在曲頰下一寸人迎後手陽明脈氣所發仰而取之灸三壯主咳逆上氣天鼎咽喉鳴喝喘氣息暴瘖氣哽在頸缺盆直扶突氣之舍候一寸半手陽明脈氣所發主鼻窒口僻清涕出不可止齀衄有癰口禁不可開水溝在鼻柱下人中督脈手陽明脈之會直唇取之灸三壯主寒熱頭痛癲疾互引水腫人中盡滿唇反者死振寒手捲前僵鼻齀不能息鼻不收洟不知香臭血不止口不禁水漿喝僻睊目也兌端在唇上端脈氣所發灸三壯主寒熱鼓頷口禁癲疾吐末寒熱痓互引唇吻強上齒齲消渴嗜飲目睻身汗出衄血不止齗交在唇內齒上齗縫灸三壯主痓煩滿寒熱口僻癲疾互引目痛不明齒間出血有傷酸尖落痛口不可開引鼻中鼻中息肉不利鼻頭頷頥中痛鼻中有蝕瘡肝人肝人者臟也兩傍二十二穴甲乙經肝出於大敦大敦者木也在足大指端去爪甲韭葉及三毛中足厥陰脈之所出也為井冬三月宜灸之流於行間行間者火也在足大指間動脈應手陷者中足厥陰脈之所溜也為榮春三月宜灸之注於大衝大衝者土也在足大指本節後二寸或一寸半陷者中足厥陰脈之所主也為輸夏三月宜灸之行於中封中封者金也在足內踝前一寸仰足取之陷者中伸足乃得之足厥陰脈之所行也為經入於曲泉曲泉者水也在膝內輔骨下大筋上小筋下陷者中屈膝外灸而得之足厥陰脈之所入也為合秋三月宜灸之大敦在足大指端去爪甲如韭及三毛中灸三壯主卒心痛汗出陰跳遺溺小便難而痛厥陰上入腹中寒疝陰挺出偏大腫腹臍痛腹中邑邑不樂小兒癎瘈遺清溺虛則病諸瘕䫋實則閉癃少腹中熱善寢尸厥死不知人脈動如故痓行間在足大指間動脈應手陷者中灸三壯主咳逆上氣唾沫溺難痛白濁卒疝少腹腫咳逆嘔吐卒陰跳腰痛不可灸俯仰面倉黑熱腹中脹滿身熱厥痛心痛色倉倉然如死狀終日不得太息肝心痛也月事不利見大赤白而有身反敗陰寒腹痛上支心心下滿癃腹中痛怒瞋不欲視泣出長太息癲疾短氣嘔血骨背痛若驚悲不樂厥脛足下熱面盡熱嗌乾渴喉痺口喎喉咽如振狀也大衝在大足本節後二寸半或一寸半陷者中灸三壯主腰痛少腹滿小便不利如癃壯痛瘦意恐懼氣不足膽中常邑邑狐疝環臍痛陰騫兩丸縮腹堅不得臥黃疽熱中善渴女子疝及少腹腫溏泄隆遺陰痛面蒼黑目下背痛暴脹胸脅支滿足寒大便難面唇色白時時嘔血男子積不足女子滿血乳難嘔厥寒時有微熱脅下支滿喉痺痛嗌乾膝外廉痛淫樂脛酸腋下腫馬刀瘻肩腫唇傷痛色蒼蒼然如死狀終日不得太息者肝心痛也中封在足內踝前一寸仰足而取之陷者中伸足乃得之灸三壯主色蒼蒼然太息如將死狀振寒小便白便難痿厥身體不仁手足偏少頽疝陰暴膽疝疼臍少腹引腰中痛身黃時有微熱不嗜食膝內廉內踝前痛少氣身濕重女子少腹大乳難嗌乾嗜飲夾臍疝也蠡溝足厥陰絡在內踝前五寸灸三壯主女子疝少腹腫赤白淫時多時少陰跳腰腹痛實則􅀈長寒熱攣暴痛遺溺偏大虛則暴癢腫睪卒疝小便不利如癃壯數噫恐悸氣不足腹中邑邑少腹痛喉中有熱如息內狀如著欲出背孿不可俯仰中郤一名中都足厥陰郤在內踝上七寸脛骨中灸五壯主頽疝崩中復上下痛腸僻亦止精膝關在犢鼻下二寸陷者中足厥陰脈氣所變灸五壯主膝內廉痛引臏不可屈伸連腹引喉咽痛是也曲泉在膝內甫骨下大筋上小筋下陷者中屈膝乃得之灸三壯主女子疝按之湯沃兩股中少腹腫陰挺痛􅅹背來下血陰中腫或癢漉青汁若葵血閉頽疝陰跳痛陰臍中不得永陰痿腹脅下支滿癃閉後時少泄四肢不舉實身熱頭眩痛汗不出目􅑩􅑩筋攣膝不可屈伸發狂衄血喘呼少腹痛引喉咽病泄下血也陰包在膝上四才股內廉兩筋間足厥陰引走灸三壯主腰痛少腹痛五里在陰廉下二寸去氣衝三寸陰股中動脈灸三股主少腹中滿熱閉不得溺陰廉在羊矢下去氣衝二寸動膝灸三壯主婦人絶産若未曽産膽人膽者肝之腑也兩旁一百四穴甲乙經膽出於竅陰竅者金也在足小指次指之端去爪甲如韭葉足少陽風之所出也為井冬三月宜灸之流於俠溪俠溪者水也在足小指次指岐骨間本節前陷者中足少陽脈之所留也為榮春三月宜灸之注於臨泣臨泣者木也在足小指次指間本節後間陷者去俠溪一寸半足少陽脈之所注也為輸夏三月宜灸之過於邱墟在足外廉踝下如前陷者中去臨泣三月足少陽脈之所過也行於陽輔陽輔者火也在足外踝上四寸輔骨前絶骨端如前二分許去邱墟七寸足少陽脈之所行也為經入於陽陵泉陽陵泉者土也在膝下一寸外廉陷者中足少陽脈之所入也為合秋三月宜灸之竅陰在足小指次指之端去爪甲如韭葉灸三壯主脅痛咳逆不得息吸喘爪甲上與分者左取右右取左立巳不巳腹取之手足清煩熱汗不出手肢轉筋頭痛如錐刺之循循然不可以動動益煩心喉痺舌卷口乾胸內廉痛不可及頭耳聾鳴俠溪在足小指次指岐骨間本節前陷者中灸三壯主胸支痛寒如風吹狀寒熱熱病汗不出目外背赤痛頭眩兩頷痛逆寒汗不出多汗耳鳴聾目癢胸中痛不可及則痛無常久痎瘧疾狂是也地五會在足小指次指本節後陷者中不宜灸使人瘦不出三年死主內傷唾血不足外無膏澤亂腫也臨泣在足小指次指間本節後去俠溪一寸半陷者中灸三壯主厥四逆喘氣滿風身汗不出而清淨髀中痛不得行足皮痛胸中滿腋下腫馬刀瘻善自齧頰天牖中腫淫樂脛酸頭眩枕骨頷顱痛目澀身痺灑浙振寒季脅不支滿寒熱胸脅腰腹膝外廉痛月水不利見血而有身敗則及乳腫胸痺心一痛不得息痛無常處大風目外背痛身熱痱缺盆中痛瘧日西發邱墟在足外廉踝下如前陷中去臨泣三寸灸三壯主目視不明振寒目翳朣子見腰脅痛腳酸轉筋胸脅痛善大膝胸滿彭彭然瘧振寒腋下腫痿厥寒足腕不收躄坐不能起髀腳痛大疝腹堅寒熱脛腫狂疾懸鍾足三陽大絡在外踝上三寸動者中按之陽明脈絶乃取之灸五壯主滿胸中有熱不嗜食小兒腹滿不能飲食光明足少陽絡在外踝五寸灸五壯主身體寒少熱甚惡心惕然此與絶骨穴療病同功主淋􅅹脛酸熱病汗不出狂痛虛則痿躄坐不能起實則厥脛熱膝痛身體不仁手足偏小齧頰不能俯仰痓外邱足少陽郤少陽所生在外踝上七寸灸三壯主膚痛痿痺骨脅滿頭痛項內寒熱癲疾不嘔沫陽輔在外踝上四寸輔骨前絶骨之端如前三分許去立墟七寸灸三壯主寒熱腰痛如小錘居其中弗然腫不可以咳咳則崩縮急諸節痛上下無常處寒熱酸痟四肢不舉腋下腫馬刀瘻髃膝脛骨搖酸痺不仁喉痺陽交一名别陽一名足􅂒陽維郤在外踝上七寸斜屬三陽分肉間灸三壯主寒厥癲疾斷瘈瘲驚狂喉痺胸滿面腫寒熱髃脛不收瘖不能言也陽陵泉在膝下一寸外廉陷者中足少陽脈氣所發灸三壯主太息口苦咽中介介數唾脅下支滿嘔吐逆臏痺引膝股廉廉不仁筋急嘔宿汁心淡淡恐如人將捕之膽脹陽關在陽陵泉上三寸犢外陷者中不宜灸主膝外廉痛不可曲伸脛痺不仁中瀆在脾外膝上五寸分肉間陷者中足少陽脈氣所發灸五壯主寒氣在分肉間痛上下者痺不仁也環跳在脾樞中側臥伸下足屈上耳之足少陽脈氣所發灸五十壯主樞中痛不可舉腰脅相引急痛髀筋瘈脛痛不可屈伸痺不仁本神在曲差旁一寸半髮際一日直耳上入髮際四分足少陽陽維之會灸五壯主頭目眩痛頸頃強急胸脅相引不得傾側癲疾不嘔沫小兒驚癎也頭維在額角髮際本神旁一寸五分禁不可灸主寒熱頭痛如破目痛如脫喘逆煩滿嘔吐流汗難言臨泣當上背直入髮際五分陷者中足少陽太陽之會灸三壯主頰清不得視口沫泣出兩目眉頭痛小兒驚癎反視目窗一名至宫在臨泣後一寸足少陽陽維之會灸三壯主頭痛目瞑逺視􅑩􅑩上齒齲腫也正營在目窗後一寸足太陽陽維之會灸五壯主牙齒痛唇吻強上齒齲痛惡寒承靈在正宫後一寸半足少陽陽維之會灸五壯主腦風頭痛惡見風寒齀衄鼻窒喘息不通腦空一名顳顠在承靈後一寸半俠玉枕骨下陷者中足少陽陽維之會灸五壯主頭痛身熱引兩頷急腦風目瞑頭痛風眩目痛鼻管疽發為厲鼻癲瘦大瘦風池在顳顬後髮際陷者中足少陽陽維之會灸五壯主寒熱癲疾僵狂仆熱病汗不出頭眩痛痎瘧頸項痛不能雇目泣出互引鼻齀衄目內皆赤痛氣竅耳目不明喉痺傷引項筋攣不收顱息在耳後青脈間足少陽氣所發灸三壯主身熱頭脅痛不可反側小兒癎喘不得息耳鳴懸顱在曲周顳顬上廉足手少陽脈氣所發灸三壯主熱病頭痛引目外皆而急煩滿汗不出引頷齒面赤皮痛頷厭在曲顳周顬上廉手足陽陽明之會灸三壯主善嚏頭痛身熱目眩無所見偏頭痛引目外背而急耳鳴懸釐在曲周顳顬下廉手少陽陽明之會灸三壯主熱病偏頭痛外目外背耳鳴善嚏陽白在眉上一寸直瞳子灸三壯主頭目瞳子不可以視俠白強急不可以顧絲竹空一名目􅂒在肩後陷者中足少陽脈氣所發不可灸不幸使人目小及盲眩頭痛互引目中赤􅑩􅑩臍風目插痓反目憎風癲疾狂煩滿瞳子􅂒在目外去背五分手足少足少陽之會灸三壯主青盲無見逺視􅑩􅑩月中膚翳白膜一名後曲天衝在耳上如前三寸灸九壯主頭痛癲疾不嘔沫庢互引善驚蟀谷在耳上入髮際一寸五分嚼而取之灸三壯主醉酒風發兩角弦痛一云兩弦不能飲煩滿嘔出曲鬢在耳上入髮際曲隅陷者中鼓頷有空足太陽少陽之會灸三壯主頸頷支痛引邪齒口禁不開急痛不能言浮白在耳入髮際一寸下曲頰後灸三壯主足緩不收痿不能行不能言寒熱喉痺咳逆吐疝積胸中滿不得喘息胸痛耳聾嘈嘈無所聞頸項癰腫不能言及癭肩不能舉齒牙齲痛竅陰在骨腕上枕骨下手足太陽少陽之會灸五壯主管疽發厲項痛引頸癰腫也完骨在耳後入髮際四分足太陽少陽之會灸三壯主風頭耳後痛煩心足痛不收失履口喎僻頭頂搖瘈瘲車急癲疾僵仆狂虛面有氣齒牙齲痛小便赤黃喉痺項腫不可俯仰俠腫引耳痎瘧狂易也淵腋在腋下三寸宛宛中夆僻取之胸滿馬刀臂不舉禁不可灸之不幸主腫馬瘍腹內潰者死寒熱生馬瘍瘡大包脈出淵腋下三寸痺之大絡布胸脅中九肋間及季肋端灸三壯主大風不得息息即胸脅中痛實則其身盡寒虛則百節皆縱輒筋在腋下三寸復前行一寸著脅足少陽脈氣所發灸三壯主胸中暴滿不得臥喘息天池一名天會在耳後一寸腋下三寸著脅直腋撅肋間手心主足少陽脈之會灸三壯主寒熱胸滿頸痛四肢不舉腋下腫上氣胸中有聲喉中嗚章門脾募也一名長平一名脅􅂒在大橫外直脈季肋端足厥陰少陽之會側臥屈上足舉臂取之灸三壯主腹中鳴盈盈然食不化脅痛不得臥煩熱口乾躁不嗜食胸脅支痛腰清春強四肢懈墮善怒咳少氣鬱鬱不得息厥逆肩不舉馬刀強身瞷石水胃脹也帶脈在季肋下一寸八分灸五壯主婦人少腹堅痛月水不通五樞在帶脈下三寸一日在水道下一寸半灸五壯主男子陰疝兩丸上下入少腹痛婦人下赤白裏急瘈瘲京門腎募也一名氣府一名氣俞在監骨腰中季肋本俠脊灸三壯主庢反反折腰痛不可久立俯仰寒熱腹眏央央然不得息溢飲水道不通溺黃少腹裏急腫洞泄骨痺痛引皆也維道一名外樞在章門下五寸三分足少陽帶脈之會灸三壯主咳逆不止三焦有水氣不能食居􅂒在長平下八寸三分監骨上陷者中陽蹻足少陽之會灸三壯主腰引痛小腸在腹前兩筋間主肩前痛與胸相引臂裏攣急手不得上舉至肩後腋在腋後廉際兩筋間主腋外相引而痛手臂拘攣急不得上頭轉穀在旁骨下二骨間陷者中主胸脅支滿不與食穀入不化嘔吐腹出舉腋取之飲郤在食門下一寸骨間陷者中主腹滿臚脹極痛引臍傍腹鳴濯濯若中有水聲仰腹取之應突在飲郤下一寸主飲食不入腹中滿大便不得節腹鳴泄注仰腹取之脅堂在腋陰下二骨間陷者中主胸脅支滿臚脹賁豚噫噦喘逆膽視目黃舉腋取之也旁庭在脅堂下二骨間陷者中舉腋之灸三壯主卒暴之中飛尸遁反胸脅之滿時上搶心嘔吐喘逆咽乾脅痛始素在腋脅下廉下二寸骨陷者中主脅下支滿腰痛引腹筋攣陰氣上縮舉臂取之脾人脾者藏也兩傍四十八穴甲乙經脾出隱白隱白者木也在足大指端內側去爪甲角如韭葉足大陰脈之所出也為井冬三月宜灸也流於大都大都者火也在足大指本節後陷者中足太陰脈之所溜也為榮春三月宜灸之注於太白太白者土也在足內側核骨下陷者中足太陰脈之主也為輸夏三月灸之行於商邱商邱者金也在足內踝上微前陷者中足足太陰脈之所行也為經入於陰陵泉陰陵泉者水也在膝下內側輔骨下陷者中伸足乃得足太陰脈之所入也為合秋三月宜灸之隱白在足大指端內側去爪甲如韭葉灸三壯主腹中有寒氣起則氣喘熱病衄血不止煩心喜悲腸脹逆息熱氣足筋脛中寒不得臥氣滿胸中熱暴泄仰息足下寒膈中悶嘔吐不欲食飲尸厥死不知人脈動如故飲渴身體痛多唾太都在足大指本節後陷者中灸三壯主熱病汗不出厥手足清暴泄厥心痛腹脹滿心九痛甚者胃心痛也瘧不知所苦風逆暴四肢腫濕則唏然寒飢則心煩飽則頭眩目太白在足內側核骨下陷者中灸三壯主病先頭重煩痛煩寃身熱腰痛不可以俯仰腹滿兩頷痛甚暴泄若飢而不若食若噫熱中足清腹脹食不化若嘔泄有膿血苦嘔無所出先取三腹中切痛霍亂逆氣大便難身重骨瘻不不相知熱痛滿悶不得臥脾脹公孫在大指本節後一寸别走陽明大陽絡也灸三壯主瘧不嗜食多寒熱汗出實則中切痛厥頭面腫起煩心狂飲不嗜臥虛則鼓脹腹中氣大滿熱痛不嗜飲霍亂也商邱在內踝微前下陷者中灸三壯主癲疾狂多食善笑不體發於外煩心中渴瘧寒腸中痛汗出腹滿響響不便心下冇寒痛陰股內痛氣及狐疝走上下腹腹痛脾虛令人病寒不樂好太息喉脾寒熱若嘔痺卑煩滿癎瘈手足擾顛疾目昏口禁弱黃筋攣痛病善厭夢者絶厥頭面腫起咳而不欲食痔骨蝕管疽漏谷在足內踝上六寸骨下陷者中亦足太陰絡灸三壯主腹中熱若寒腸鳴強欠時內痛心悲氣逆腹滿腹脹而氣快然引肘脅下皆主之少腹脹急小便不利厥氣上頭癲三陰交在內踝上三寸骨下陷者中足太陰厥陰少陰之會灸三壯主足下熱脛疼不能久立濕卑不能行腹中熱若寒膝內痛心悲氣逆腹滿小便不利厥氣上及癲痺病者身重若飢足厥不欲行善掣腳下痛虛則腹脹腹鳴溏泄食欲不化脾胃肌肉痛素問地機一名脾舍足太陰郤别走上一寸空在膝下五寸灸五壯頽疝瘡瘕腹中痛藏痺陰陵泉在膝下側輔骨下陷者中伸足及得之灸三壯主溏泄穀下化腹中氣脹嗑膝下滿腹中嗑脅下滿腹中氣嗌腹脹逆不得臥腎腰痛不可俯仰氣癃尿黃寒熱不莭女子疝瘕按之如以湯沃其股內至膝飱泄婦人陰痛少腹堅急痛重下不嗜食心下滿寒中小便不利霍亂痺痛血海在膝下膝臏上內廉白肉際二寸中足太陰脈氣所發灸五壯主婦人漏下苦血閉不通逆氣脹箕門在魚腹上越筋間痛應手陰市內足太陰脈氣所發一云在股上起筋間灸三壯主淋遺溺鼠鼷痛小便難其門肝募也在弟二肋端不容傍一寸五分上直兩乳兩足太陰厥陰陰維之會舉臂取之灸五壯主婦人産余疾食飲不下胸脅支滿目眩足寒小便難心切痛善噫聞酸臭痠腹滿少腹尤太息賁脅下積聚喘逆臥不安席時寒熱心大堅賁豚上下癃遺溺鼠鼷痛小便難而白瘖不能言日月肝募也在其門下五分灸五壯主太息善悲少腹有熱欲走多唾言語不正四肢不收腹哀在日月下一寸半足太陰陰維之會灸五壯主便膿血寒中不化腹中痛也大橫在腹哀下三寸直臍傍足太陰陰維之會灸五壯主大風逆氣多寒善悲腹結一名腸屈在大橫下一寸三分灸五壯主繞臍痛搶心膝寒泄利府舍在腹結下三寸足太陰陰維之會灸五壯主疝瘕髃中急痛循脅上下搶心腹滿積下聚厥逆霍亂衝門一名慈宮去大橫五寸在府舍橫骨兩端約中動脈足太陰陰維之會灸五壯主寒氣腹滿癃淫樂身熱腹中積痛陰疝乳難子上衝心雲門在巨骨下氣户傍各二寸陷者中動脈應手足太陰脈氣所發舉取之灸五壯主喉痺胸中暴逆先取衝脈後取三里云門皆寫之咳喘不得息不得臥呼吸氣索咽不得胸中熱暴心腹痛疝積時發上衝心肩痛不可舉引缺盆脈代互至寸口四逆脈鼓不能通也中府脈募也一名膺中俞在云門下一寸一云一寸六分乳上三肋間動脈應手陷者中足太陰之會灸五壯至脈系急胸中痛惡青胸滿邑邑然嘔膽胸中熱喘逆氣氣相追逐多濁唾不得息肩背風汗出靣腹腫膈中食噎不下食喉痺肩息脈脹皮膚骨痛寒熱煩滿腫痛周榮在中府下一寸六分陷者中足太陰脈氣所發仰而取之灸五壯主胸脅之支滿却引胸脅支滿不得俯仰飲食不下咳喘陳膿胸鄉在周榮下一寸六分陷者中足太陰脈所發仰而取之灸五壯主胸脅之滿却引背痛臥不得轉側天溪在胸鄉下一寸六分陷者中足太陰脈氣所發仰而取之灸五壯主胸中滿痛乳腫賁膺咳逆上氣喉鳴有聲食竇在天溪下一寸六分陷者中足太陰脈氣所發舉臂助之灸五壯主胸脅滿膈間雷鳴滀陸常有少聲胃人胃者脾之腑也兩旁九十穴并下一單穴共九十一穴甲乙經胃出於厲兊者金也在足大指次指之端去爪甲如韭葉足陽明脈之所出入為井冬三月宜灸之流於內庭者水也在足大指次指外間陷者中足陽明脈之所留也為榮春三月宜灸之注於陷谷陷谷者水也在足大指次指之間本節後陷者中去內庭二寸足陽明脈之所主也夏三月宜灸之過於衝陽一名會骨足跌上五寸骨間動脈上去陷谷三寸足陽明脈之所為原春三月宜灸行於解溪解溪者火也在衝陽後一寸半腕陷者中陽明脈之所存也為經入於三里三里者土也在膝下三寸胻外廉足陽明脈之所入也為合秋三月宜灸之厲兊在足大指次指之端去爪甲如韭葉灸一壯主尸厥口禁氣絶脈動如故其形無知如中惡壯瘧不嗜食腹寒脹滿熱病汗不出齀衄眩前仆面浮腫足脛寒惡人與木音喉痺齲齒惡風鼻不利多臥善驚內庭在足大指次指外間陷者中灸三壯主四肢厥手足悶者使人久持之逆冷脛痛腹脹滿支膚痛善伸數次惡入與木音振寒嗌中引痛熱病汗不出下齒痛惡寒目急喘滿寒栗斷口禁僻不嗜食陷谷在足大指次指之間本節後陷者中去內庭二寸灸三壯主執痢面腫目癰腫善齒唇善噫腹痛脹滿腸鳴熱病汗不出水腫留飲胸脅支滿也衝陽一名原在足肘上五寸骨間動脈上去陷谷三寸灸三壯主皮先寒熱病汗不出口熱痛胃管痛時寒熱皆主之齒齲痛腹大不嗜食振寒而欠狂妄而行登而歌葉衣而走足下緩失履風水面浮腫也解溪在足衝陽後一寸半腕上陷者中灸三壯主熱病汗不出善噫腹脹滿胃熱調言風水面附腫顔黑厥氣上攴腹脹大下重瘈瘲驚股膝腫行轉荕頭眩痛癲疾厥寒熱欠煩滿悲泣出狂易見鬼火霍亂風從頭至足面目赤口痛齧舌足大指轉傷下車桎地適臂指端陽為筋痺也豐隆足陽明絡也在外踝上八寸下廉䯒外廉陷者中灸三壯厥逆胸痛如刺腹中切痛大小便齒難厥頭痛面浮腫煩心狂見鬼善笑不休發於外有所大喜喉痺不能言也巨虛下廉足陽明與小腸合在上廉下三寸灸三壯主少腹痛飱泄出糜次指間熱若脈陷寒熱身痛唇乾不得汗出毛髮焦脫肉少氣內有熱不欲動搖泄膿血腰引少腹痛暴驚狂言非常女子乳癰驚痺脛腫脹足跗不收跟疼痛條口在下廉上一寸足陽明脈氣所發灸五壯主脛寒不得臥脛疼足緩失足濕痺足下熱不能久立巨虛上廉足陽明與大腸合在三里下三寸灸三壯主飱泄大腸痛狂妄走善大腸有熱腸鳴腹滿俠臍痛食不化喘不能行立胸脅支滿惡聞人木音風水面腫甄權云主大氣不足偏風風腲腿腳隨也三里在膝下三寸胻外廉灸三壯主陽厥悽悽而寒少腹堅頭痛脛股腹痛消中小不利善噦痓中有寒腹中寒脹滿善噫聞食臭胃氣不足腹鳴腹痛泄不化心下脹熱病汗不出喜嘔吐苦癃痓身反折口禁喉痺不能言寒熱陰氣不足熱中消谷善飢腹熱身煩狂言胸中瘀血胸脅支滿膈不能久立膝痿寒水腹脹皮腫乳雍有熱五臟六脈脹狂歌妄言怒恐惡人與火罵詈霍亂遺時失氣犢鼻在膝臏下䯒上骨俠解大筋中足陽明脈氣所發灸三壯主犢鼻腫先尉去之其赤堅勿攻攻者死膝中痛不仁難跪起諸腫節潰者死不潰可療也梁邱足陽明郤在膝上二寸兩筋間灸三壯主大驚乳痛脛若膝痺不能曲伸不可以行陰市一名在陰鼎上三寸伏免下若拜而取之足陽脈氣所發不可灸主寒疝下至腹腠膝腰痛如青水大腹諸疝按之下膝上伏免中寒痛腹脹滿痿厥少氣伏在膝上六寸起肉足陽明脂脈氣所發禁不宜灸髀關在膝在膝上伏兔後交分中灸三壯主膝寒痺不仁委不得屈伸承泣一名溪穴一名面􅂒在日下七分直目瞳子蹻脈在脈足陽明之會甄權云在眼下八分禁不宜灸無問多少三日以後眼下大如拳息肉脹桃許大至三十日即定百日都不見物或如升大目不明淚出目眩普朣子癢逺視􅑩􅑩昏夜無所見目瞤動與頂口翏相引喎僻口不能言四白在目下一寸足陽明脈氣所發灸七壯主日痛口僻淚出不明迎香一名衝陽在禾􅂒上鼻下乳傍手足陽明之會主鼻齀不利窒洞氣寒喎僻多涕鼻血有癰不宜灸巨􅂒在僻鼻傍八分直瞳子蹻脈足陽明之會主面目面風寒䪼腫癰痛招搖視膽瘈瘲口僻青盲無所見逺視􅑩􅑩目中淫膚白膜覆瞳子地倉一名胃維俠口傍四分如近下蹻脈手足陽明之會灸三壯主口緩不收不能言語手足痿躄不能行承漿一名大池在頥前下唇之下足陽明任脈之會開口取之灸三壯主寒熱悽厥鼓頷癲疾嘔沫寒熱痓互引口乾小便赤黃或時不消渴嗜飲目瞑身汗出衄血不止上齒齲也頰車在耳下曲頰端陷者中足陽明脈氣所發灸三壯開口有空頰腫口急煩車骨痛齒不可用口嚼大迎一名髓骨在曲頷一寸二分骨陷者中動脈足陽明脈氣所發灸三壯主寒熱項瘰􅅹癲疾口喎喘悸痓口噤噤厥口僻失次下牙痛頰腫惡寒口不收舌不能言不能嚼上關一名客主人在耳前上廉起骨開口有空灸三壯主唇勿強上齒齲痛口僻禁不開耳痛聾齆瘈瘲口沫出寒熱痓青盲髓目惡風寒下關在客主人下耳前動脈下空下廉合口有空張口而閉灸三壯主失欠下齒齲下牙痛䪼腫耳聾鳴痓口僻耳中有乾底䁎耳冇膿不可灸耳門在耳前起肉當耳中缺者灸三壯主中有膿及底耳䁎耳皆不灸主耳痛鳴聾頭頷痛上齒齲人迎一名天五會在頸大膝脈動應手俠結喉傍以候五臟之氣足陽明脈氣所發禁不可灸灸之不幸殺人一云有病可灸三壯主陽逆霍亂陽逆頭痛胸滿不得息胸滿呼吸喘渴窮屈窘不得息刺人迎入四分不幸殺人水突一名水門在頸大筋前直人迎下氣舍迎入四分上足陽明脈氣所發灸三壯主咳逆上氣咽喉癰腫呼吸矩氣喘息不通氣舍在頸直入迎頰天突陷者中足陽明脈氣所發灸三壯咳逆上氣瘤癭咽腫肩腫不得雇亂喉痺氣戶在巨骨下俞府兩傍各二寸陷者中足陽明脈氣所發仰而取灸五壯主胸脅滿喘逆上氣呼吸肩息不知食味屋翳在庫房下一寸六分陷者中足陽明脈氣所發仰而取之灸五壯主胸脅支滿咳逆上氣呼吸多唾濁沫膿血身體腫皮膚不可近夜淫樂苛久則不仁膺窗在屋翳下一寸六分灸五壯主胸滿癰腫乳癰寒熱知氣臥不安乳中禁不可灸灸之生瘡瘡中有膿血青汁者可療瘡中有息內若蝕瘡者死也乳根在乳下一寸六分陷者中足陽明脈氣所發仰而取之灸五壯主胸下滿痛膺腫乳癰悽索寒痛不按搔動不容在幽門傍各一寸半去仁脈二寸直四筋端相去四寸足陽明脈氣所發灸五壯主嘔血肩脅下痛口乾心痛與背相引不可咳引腎痛承滿在不容下一寸足陽明脈氣所發灸五壯主腸鳴相逐不可傾側肩息嗂血梁門在承滿下一寸足陽明脈氣所發灸五壯主脅下積氣結所痛也關門在梁下五分一云一寸太一上足陽明脈氣所發灸五壯主遺溺腹脹若滿積氣身腫脹也太一在關門下一寸足陽明脈氣所發灸五壯主狂癲疾吐苦滑肉門在太一下五寸足陽明脈氣所發灸壯主狂癲疾吐苦天樞一名長溪一名穀門去盲俞一寸半在夾臍二寸陷者中足陽明脈氣所發灸三壯主臍疝繞臍而痛時上衝心女子胞絡中痛月水不以時休止腹脹腸鳴氣上腫胸不能久立腸中濯濯冬日重感於寒則泄當臍而腸胃間逰氣切痛食不化不嗜食身重休臍急瘧振寒熱盛狂言脾脹四支重不能衣陰疝氣疝煩嘔面腫大腸脹外陵在長溪下五分太巨上足陽明脈氣所發灸五壯主腹中盡痛大巨一名掖門在長溪下二寸足陽明脈氣所發灸五壯主腹滿痛善煩頽疝遍枯四肢不用善驚水道在太巨下三寸足陽明脈氣所發灸五壯主少腹脹滿痛引隂中用水至則腰背中痛胞中瘕子門有寒引臏髀三焦約小便不通歸來一名溪穴在水道下三寸灸五壯主少腹痛賁豚卯正入痛引莖中女子陰物中寒痛也氣衝在歸來下一寸鼠鼷下一寸動應手足陽明脈氣所發灸二壯主腹中大熱不安腹有大氣女子月水不利或閉塞暴腹脹滿癃淫樂身熱腹中交痛頽疝陰腫乳難子上搶心熱胞不出衆氣盡亂腹滿不得反息腰痛控睪少腹足股卒俯不得卯脫下石水無字少陰痛陰疝莖中痛兩瓦騫痛不可仰臥心人心者藏也兩旁一十六穴甲乙經心出於少衝少衝者木也一名經如在手小指內廉之端去爪甲如韭葉手少陰脈之所出也為井冬三月宜灸之流於少府少府者火也在小指本節後陷者中直傍宮於少陰脈之所留也為榮春三月宜灸之注於神門神門者土也一名兌衝一中都在掌後兑骨之端陷者中手少陰脈之所注也為輸夏三月宜灸之過於通里手少陰絡在腕後一寸行於靈道靈道者金也在掌後一寸半或一寸手少陰脈之所行也為經入於少海少海者水也一名曲節在肘內廉節後手少陰脈之所入也為合秋三月宜灸之少衝一名經始在手小指內廉之端去爪甲韭葉灸三壯主熱病煩心上氣心痛而冷煩滿少氣悲恐善驚掌中熱肘腋胸中痛口中熱咽喉中酸作寒作熱手捲不伸掌痛引肘腋少府在手小指本節後陷者中直勞宮灸三壯主煩滿少氣悲恐思人臂酸掌中熱手捲不伸神門一名兌衝一名中都在掌後免骨之端陷者中灸三壯主瘧心煩甚欲得冷水寒則欲處熱熱中喉乾不嗜食心痛數噫恐悸氣不足喘逆身熱狂悲笑嘔血上氣遺溺手及臂寒少陰郤在掌後脈中去腕半寸灸三壯主十二癎失瘖不能言悽悽寒咳吐血氣驚心痛通皇手少隂絡在腕後一寸灸三壯主熱病先不樂數日熱熱則卒心中懊憹數次頻伸悲恐頭眩痛面赤而熱無汗反癲心下悸臂臑肘痛實則支滿虛則不能言苦嘔喉痺少氣遺溺靈道在掌後一寸半或云一寸灸三壯主痛非恐相引瘈瘲臂肘攣暴瘖不能言少海一名曲節在肘內廉節後陷者中動應手灸五壯主寒熱齒齲痛狂易瘧皆振寒引肘腋痛甄權云穴在臂則曲肘內橫文頭屈手向頭而頭取之陷者中主腋瘰􅊓不宜針灸極泉在腋下筋間動脈入胸手少陰脈氣所發灸五壯主心腹痛乾嘔噦是動則病嗌乾心痛渴而欲飲為臂厥是主心所生病者目黃脅痛臑臂內後廉痛掌中熱痛黃帝問曰手少陰之脈獨無俞何也岐伯對之曰少陰者心脈也是五臟六府之大王也精神之舍也其臟堅固邪不能害害則心傷心傷則神去神去則死矣故諸邪之在於心者皆在心之包絡外心之主脈也故獨無俞焉曰少陰無俞者不病乎對曰其外經脈病而藏不病故獨取其經於掌後免骨之端小腸人小腸者心之腑也兩傍二十六穴甲乙經小腸出於少澤少澤者金也一名少吉在小指之端去爪甲一分手太陽脈之所出也為井冬三月宜灸之流於前谷前谷者水也在手小指外側本節前陷者中手太陽脈之所溜也為榮春三月宜灸之注於後溪後溪者木也在小指外側本節後陷者中手太陽脈之所注也為輸夏三月宜灸之過於腕骨在手外側腕前起骨下陷者中指太陰脈之所過也為原行於陽谷陽谷者火也在手外側腕中免骨之下陷者中手太陽脈之所行也為經入於小海小海者土也在肘內大骨外去肘端五分陷者中屈肘月得之手太陽脈之所入也為合秋三月宜灸之少澤一名少吉在手小指之端去爪甲一分陷者中灸一壯主振寒小指不用寒熱汗不出頭痛喉痺舌急卷小指之間熱口中熱煩心痛臂內廉脅痛咳瘈瘲口乾頸痛不可雇痎瘧寒熱前谷在手小指外側本節前陷者中灸三壯主熱病汗不出狂互引癲腫不可喉鼻不利日中白翳目痛泣出甚者如脫癲疾數發腕骨在手外側腕前起骨下陷者中灸三壯主熱病汗不出脅痛不得息頸頷腫寒熱耳鳴無聞衄狂易痓互引消渴偏枮臂腕痛肘屈不得伸風頭痛泣出肩臂如頸痛項急煩滿五驚指掣不可屈伸戰休痎瘧陽谷在手外側腕中免骨之下陷者中灸三壯一云在腕上側兩筋間陷者中主狂癲疾熱病汗不出脅痛不息得頸頷腫寒熱耳聾鳴牙上齒齲痛肩痛不能自帶衣臂腕外側痛不舉風眩驚手腕痛泄風汗不出至腰項急不可以上右雇及俯仰肩弛肘廢目痛痂疥并瘈瘲眩目痛痎瘧胸滿不可息養老手太陽􅂒在踝骨上一空在後一寸陷者中灸三壯主肩痛欲拆臑如拔手不能自土下支正手太陽絡在腕後五寸别走少陰者灸三壯主驚恐振寒寒熱頸項腫實則肘攣頭眩痛狂易虛則生忱小者痂疥風瘧症小海在肘內大骨外去端半寸陷者中屈肘乃得之灸三壯甄權云屈千向頭而取之不宜灸主寒熱齒齲痛風眩頭痛狂易癰肘瘧皆膂振寒項痛引肘腋腰痛引少腹中回四肢不舉天宗在秉風後大骨下陷者中手太陽脈氣所發灸三壯主胸脅之滿搶心咳逆肩重肘臂痛不可舉臑俞俠肩􅂒後大骨下甲上廉陷者中手足太陽陽維蹻脈之會舉肩取之灸三壯主寒熱肩腫引伸中臂酸寒熱頸厯適肩痛不可舉臂睛明一名淚孔在目內背手足太陽陽明之會灸三壯主目不明惡風目淚出憎寒頭痛目眩曹內背赤痛目􅑩􅑩無所見背癢痛淫膚自翳甄權云不宜灸心包人心脈也兩傍一十六穴甲乙經心出於中衝中衝者木也在手中指之端去爪甲如韭葉陷者中手心主脈之所出也為井冬三月宜灸之流於勞宮勞宮者火也一名五里在掌中央動脈心主脈之所留也為榮春三月宜灸之注於太陵太陵者土也在掌從兩筋間陷者中手心主脈之所注也為輸夏三月宜灸之行於間使間使者金也在掌後三寸兩筋間陷者中手心主脈之所行也為經入於曲澤曲澤者水也在肘內廉下陷者中屈手得之手心主脈之所入也為合秋三月宜灸之中衝在手中指之端去爪甲如韭葉陷者中灸一壯主熱病煩心心悶而汗不出掌中熱心痛身熱如火侵淫煩滿舌本痛勞宫一名五里在掌中動脈灸三壯熱病發熱而欲嘔噦三日以往不得汗休惕胸胸痛不可反則咳滿溺赤大便血衄不止嘔吐血氣逆噫不止嗌中痛食不下善渴口中爛掌中熱風熱善怒中心善悲纍嘔歔郤善笑不休煩心咳寒熱善噦少腹積聚小兒口中腥臭胸脅支滿黃痺目黃太陵在掌後兩筋間陷者中灸三壯主心痛善悲厥逆懸心如飢之狀心淡淡而驚恐熱病煩心而汗不出肘攣腋腫善笑不休心中痛目赤黃小便如血欲嘔胸中熱狂言不樂太息喉痺嗌乾喘逆身熱如火頭痛如破短氣胸痛而手攣不伸及腋偏枯不仁手瘈偏小筋急嘔血瘃癢欲嘔耳鳴內關手心主絡在掌後去腕二寸灸三壯面赤皮熱熱病汗不出中風熱目赤黃肘攣腋腫實在心暴痛虛則煩心惕惕不能動失智心淡淡善驚恐心悲間使在掌後三寸兩筋間陷者中灸三壯主心痛善悲厥逆懸心如飢之狀淡淡而驚恐驚狂面赤目黃熱病煩善噦胸中淡淡善動如熱身風熱嘔怵惕寒中少氣掌中善肘攣腋腫卒心中痛瘈瘲互相引肘內廉痛心熬熬然胸痺引背時寒喜驚瘖不能語咽中哽頭浸浸淫郤門手心主郤去腕五寸灸五壯主心痛衄噦嘔血驚恐畏人神氣不足曲澤在肘內廉下陷者中屈肘得之灸三壯主心痛卒咳逆心下淡然喜驚身熱煩心口乾手清逆氣嘔血肘瘈善悲頭清汗不出不過肩傷寒病瘟天泉一名天濕在曲胲下二寸舉腋取之灸三壯主足不收痛不可以行心痛胸中痛脅支滿痛膺背甲間兩廉痛虛則胸腹下與腰背相引而痛取經少隂水天泉主之腎人腎者藏也兩傍五十四冗并二十三單冗共七十七冗甲乙經腎出於涌泉涌泉者木也一名地衝在足心陷者中屈足捲指腕腕中足少隂脈之所出也為井冬三月宜灸之流於然谷然谷者火也一名龍淵在足內踝前起大骨下陷者中足少隂脈之所留也為榮春三月宜灸之注於太溪太溪者土也在足內踝後跟骨上動脈陷者中足少隂脈之所注也為輸夏三月宜灸之行於復溜復溜者金也一名伏白一名昌陽在足踝上二寸陷者中足少隂脈之所行也為經入於隂谷隂谷者水也在膝內輔骨之後大筋之下小筋之上按之應手屈膝得之足少隂脈之所入也為合秋三月宜灸之涌泉一名地衝在足心陷者中屈足捲指宛宛中灸三壯主腰痛大便難少腹中痛小便不利甄權云在腳心底宛宛中白肉際是主熱中少氣厥寒灸之熱去頭痛煩心痛不嗜食咳而短氣喉痺良熱痛脊脅相引匆匆善忘足厥喘逆足下清至膝隂痺腹脹頭項痛眼胘男子如蠱女子如阻身體腰背如解不欲食丈夫頽疝隂跳痛篡中不得溺腹䐜脅下支滿閉癃隂痿後時少泄四肢不舉實則身頭痛汗不出目􅑩􅑩然無可見怒欲殺人暴痛引臏下節時有熱氣筋攣膝痛不可屈伸狂如新發衄不食喘呼少腹痛引嗌足厥痛肩背頸痛時眩婦人無子咽中痛不可內食轉筋風入腹中俠臍急胸脅之滿衄不止五指端盡痛足不得踐地癲疾瘖不能言然谷一名龍淵在足內踝前起大骨下陷者中灸三壯主嗜食心如懸哀而善怒嗌內腫心惕惕恐如人將捕之多涎出喘少氣吸吸不足以息心痛如刺厥心痛與背相引善瘈如瘲後觸其心傴僂者腎心痛也厥心痛如錐刺其心心痛甚者脾心痛也胸中寒脈伐時不至上重下輕足不能安地少腹脹上搶心胸脅支滿咳唾有血喉痺癃疝石水女子不字隂暴出淋漏男子精溢脛酸不能久立寒熱消渴黃疸足一寒一熱亂縱煩滿小兒臍風口不開善驚痿厥癲疾洞泄太溪在足內踝後跟骨上腫脈陷者中灸三壯主瘧咳逆心悶不得卧嘔甚熱多寒少欲閉戶而處寒厥足熱腎脹熱病汗不出默默嗜卧溺黃少腹熱溢中痛腹脹內腫延下厥心痛如錐刺其心心痛甚者痺心痛也霍亂出泄不自知消痺善噫氣走喉咽而不能言手足清尿黃大便難嗌中腫痛唾血口中熱如膠胞中有太疝瘕積與隂相引如痛苦冗泄上下出痓胸中滿痛乳腫潰癰咳逆上氣喉咽喝有聲瘚氣上支大衝在足跟後衝中足少隂絡灸三壯實則閉癃悽悽腰脊痛宛轉目循然嗜卧口中熱虛則腰痛寒厥煩心悶喘少氣不足以息腹滿大便難時上走胸中鳴脹滿口舌乾口中吸吸善驚咽中痛不可內食善怒驚恐不樂咳喉中鳴咳唾血大腸結照海隂蹻脈所生在足內踝下灸三壯主熱病煩心足寒清多汗先取然谷後取大谷大指間動脈皆先補之目痛引脊少腹偏痛嘔瘈瘲視昏嗜卧痓驚善悲不樂如墮墜汗不出面塵墨病飢不欲食卒疝少腹痛病在左取右右取左立巳隂暴起疝女子不下月水婦人淋􅅹隂挺出四肢淫樂心悶暴瘧及諸淋目中赤痛雙股不能行大風默默不知所痛時如見金星尿黃少腹熱咽乾痺水原足少隂却去大溪下一寸在內踝下灸五壯主月經不來而多閉心下痛目􅑩􅑩不可逺視復溜一名伏白一名昌陽在足內踝上二寸陷者中灸五壯主腰痛引脊內廉嗌乾腹瘈痛坐起目􅑩􅑩善忘多言瘧熱少氣足胻寒不能自溫腹䐜切痛引心心如懸隂厥腳臑後廉急不可前却血淋暘澼便膿血足跌上痛舌卷不能言善笑足痿不收履溺青赤白黃黑青取井赤取榮黃取俞白取經黑取合血痔泄後重腹痛如淋壯在仆必有所扶持及大氣涎出鼻孔中痛腹中雷嗚骨寒熱無所安汗出不休心風四腫氣在橫骨風逆四肢腫乳難交信冗在內踝上二寸少隂前太隂後廉筋骨間足隂蹻之却灸三壯主氣癃頽疝隂急股樞腨內廉痛築賔在足內踝上腨分灸五壯主大疝絶子狂癲疾嘔吐隂谷在膝內輔骨之後大筋之下小筋之上按之應手屈膝而得之灸三壯主舌縱涎下煩悶狂痺脊內廉痛溺難隂痿不用少腹急引隂及腳內廉痛婦人漏血腹脹滿不得息小便黃男子如蠱女子如咀寒熱腹偏腫俞府在巨骨下璇璣傍各二寸陷者中足少隂脈氣所發仰卧而取之灸五壯主咳逆上氣喘不能息嘔吐胸滿不得飲食或中在俞府下一寸六分陷者中足少隂脈氣所發仰卧而取之灸五壯主咳逆上氣廷出多唾呼吸喘悸坐不得安神藏在或下一寸六分陷者中足少隂脈氣所發仰而取之灸五壯主胸滿咳逆喘不得息嘔吐煩滿不得飲食靈墟在神藏下一寸六分陷者中足少隂脈氣所發仰而取之灸五壯主胸脅支滿痛引膺不得息悶亂煩滿不得飲食神封在靈墟下一寸六分陷者中灸五壯主胸脅支滿不得息咳逆乳癰灑折惡寒步郎在神封下一寸六分陷者中足少隂脈氣所發仰而取之灸五壯胸脅滿膈逆不通呼吸少氣喘息不得舉臂幽門一名上門在巨闕傍半寸陷者中衝脈足少隂之會灸五壯主胸脅背相引痛心下溷溷嘔吐多唾飲食不下善噦支滿積不能食數咳善忘泄有膿血嘔沫吐涎少腹堅善唾女子心疝氣善吐食不下通谷在幽門下一寸陷者中衝脈足少隂之會灸五壯主失欠口喎僻不端食飲善嘔不得言一云舌下腫難以言舌縱喎唳不端隂都一名食宫在通谷下一寸衝脈足少隂之會灸五壯主身寒熱痎瘧心滿氣逆石關在隂都下一寸衝脈足少隂之會灸五壯主痓脊強口不能開多唾大便難婦人子藏中有惡血內逆滿痛商曲在石關下一寸衝脈足少隂之會灸五壯主腹中積聚時切痛肓俞在商曲下一寸直脛傍五分衝脈足少隂之會灸五壯主心大堅大腸寒中大便乾腹中切痛中注在肓俞下五分衝脈足少隂之會灸五壯主少腹有熱大便難四滿一名髓府在中注下一寸衝脈足少隂之會灸五壯主臍下積疝瘕胞中有血腸澼泄切痛振寒大腹石水腎痛氣穴一名胞門一名子戶在四滿下一寸衝脈足少隂之會灸三壯主月水不通奔氣上下引腰脊痛大赫一名隂維一名隂關在氣冗一寸衝脈足少隂之會灸五壯主女子赤淫男子精溢隂上編橫骨一名下極在大赫一寸衝脈足少隂之會灸五壯主少腹滿小便難隂下縱卵中痛鳩尾一名尾醫一名􅐳骭在臆前敞骨下五分任脈之别不可灸刺一云灸五壯主心中寒脹滿不得息貫時唾血血瘀熱病胸中痛不得卧心痛不可按善噦心疝大息面赤心皆相引而痛數噫喘息胸滿咳嘔腹痛皮瘙癢喉痺食不下甄權云宜針不宜灸巨闕在鳩尾下一寸任脈氣所發灸五壯主心痛不可安煩心熱病胸中淡淡腹滿暴痛恍惚不知人手清少腹滿瘈瘲病心疝滿不得息息賁時唾血心腹脹滿噫煩熱善嘔膈中不通利霍亂狂妄言怒恐惡火善罵詈狐疝驚悸少氣胸脅支滿瘈瘲引少腹痛短氣煩滿嘔吐心脹上管在巨闕下一寸五分敞骨三寸足陽明手太隂任脈之會灸五壯主寒中傷飽食飲不化五腹䐜脹心腹痛胸脅支滿脈虛則生百病甄權云主心風驚悸不能食心下有隔嘔血目眩頭懸眩痛身熱汗不出心痛有三蟲多涎不得反則腹中滿暴汗出中管一名大倉在管下一寸手太陽少陽足陽明所生任脈之會灸七壯主腹脹不通心大聖胃脹霍亂出泄不息知先取太溪復取太倉之原溢飲食下堅痛腹脹不道寒中傷飽食飲不化頭熱齀血目黃振寒噫煩滿隔嘔傷憂損思氣積痓甄權云主因讀書得賁豚氣積取腹中䐜暴滿心痛身熱難以俯仰衝疝胃死不知人心腹痛發作衝取往來上下行痛有休止腹中熱善涎出是蛇咬也鼻聞焦臭大便難小腹有熱尿赤黃病濕汗不出有血溢水建里在中管下一寸灸五壯主心痛上搶心不欲食支滿斥甄權云主腹脹逆氣上并霍亂下管在建里一寸足太隂任脈之會灸五壯食飲不化入腹還出六府之氣穀不轉甄權云主小便赤腹堅便也水分在下管一寸任脈氣所發灸五壯主痓脊強裏急腹中拘急痛甄權云主水病腹腫臍中灸三壯主水腹大臍平腹無理不治絶子灸令人有子臍疝繞臍痛腫胸不得息甄權云主水腫鼓脹腸鳴狀如雷聲時上衝心日灸七壯至四百壯罷隂交一名少隂一名黃戶在臍下一寸任脈隂衝之會灸五壯主水脈水氣行皮中甄權云冗在隂下附底宛宛中主驚不得眠善斷水氣上下五臟逰氣也隂疝引睪女子手腳拘攣腹滿疝月水不下乳余疾絶子隂癢賁豚上䐜腹堅痛引隂中不得小便兩丸騫氣海一名脖胦一名下肓在臍下一寸半任脈氣所發灸五壯主少腹疝卧善驚甄權云主下熱小便赤氣痛狀如刀擾石門一名利機一名精露一名丹田一名命門在下二寸任脈所發灸三壯女子禁不可灸主臍疝繞臍痛三焦脹水腹大及水氣行皮中心腹中卒痛而汗出氣癃小便黃氣滿虛則遺溺身寒熱吐逆溺難腹滿疝積乳余疾絶子隂癢賁豚上腹痛口強不能言腫先引腰後引少腹腰臗少腹堅痛下引隂中不得小便兩丸騫甄權云主婦人因産惡屈不止關元一名次門在臍下三寸任脈足三隂之會灸七壯主寒熱石水痛引脅下脹頭眩痛身盡熱氣癃尿黃甄權云小便處狀如散灰色轉胞不得尿少腹滿引脅下脹頭眩痛身盡熱賁豚寒熱入少腹時欲嘔傷中溺血小便數腰背臍痛下引隂䐜中窘急欲湊後泄不止癲暴痛少腹大熱身所傷血出多及中風寒若有所墮墜四肢解裂不收名曰體解女子絶子衄血在內不下中極一名氣原一名五泉在臍下四寸任脈足三隂之會灸三壯主女子禁中央腹熱痛婦人子門不端少腹苦寒隂癢及痛經閉不通乳余疾絶子內不足賁脹上搶心甚則不能息匆匆少氣尸厥心煩痛飢不能食善寒中腹脹引䐜而痛少腹與脊相控暴痛時窘之後經閉不通小腹不利大夫失精曲骨在橫骨上中極下一寸毛際陷者中動應手任脈足厥隂之會灸三壯主膀胱小便難腳曲轉胞不得尿婦人赤白淫隂中乾痛惡合隂陽水脹滿尿澀癲疾不嘔沫隂會一名屏臀在大便前小便兩隂間任脈别絡俠督脈者衝脈之會灸三壯主痺小便難竅中熱實則腹皮痛虛則癢搔痔與隂相通者死隂中病前後相引痛不得大小便女子血不通男子隂端寒上衝心中狠狠廉泉一名本池在頷下結喉上舌夲隂維任脈之會灸三壯主舌下腫難以言舌縱涎出咳逆少氣喘息嘔沫禁斷上氣窘屈胸滿天突一名五戶在頸結喉下五寸中央宛宛中隂維任脈之會灸三壯主咳上氣喘暴瘖不能言及舌下俠青綘脈氣頸有大氣喉痺咽中乾急不能息喉中鳴翕翕寒熱頸腫肩痛胸滿腹皮熱衄氣􅀈心痛陷軫頭痛面皮赤熱身肉盡不仁璇璣在天戾下一寸中央陷者中任脈氣所發仰頭取之灸五壯主胸滿痛喉痺咽癰水漿不下華蓋在璇璣下一寸陷者中任脈氣之所發仰而取之灸五壯主胸脅支滿痛引胸中咳逆上氣喘不能言紫宫在華蓋下六分陷者中任脈氣發仰而取之灸五壯胸脅支滿痺痛骨疼飲食不下嘔逆上氣煩心玉堂一名玉英在紫宮下一寸六分陷者中任脈氣所發灸五壯主胸中滿不得息脅痛骨疼喘逆上氣嘔吐煩心也膻中一名元面在玉堂下一寸六分直兩乳間陷者中在脈氣所發仰而取之灸五壯主胸心痺心痛煩滿咳逆喘唾頭氣不得息不能言中庭在膻中下一寸六分陷者中任脈氣所發灸三壯主胸脅支滿膈寒飲食不下嘔吐食腹還出膀胱人膀胱者腎之腑也一百二十穴并二十三單穴及膏肓附穴共一百四十四穴甲乙經膀胱出於至隂至隂者金也在足小指外側去爪甲角如韭葉足太陽脈之所出也為井冬三月宜灸之流於通谷通谷者水也在足小指外側本節前陷者中太陽脈之所溜也為榮春三月宜灸之注於束骨束骨者木也在足小指外側本節後陷者中足太陽脈之所注也為俞夏三月宜灸之過於京骨在足外側大骨下赤白肉陷者中足太陽脈之所過也為原行於崑崙崑崙者火也在足外踝後跟骨上陷者中足太陽脈之所行也為經入於委中委中者土也在􅀈中央動脈足太陽脈之所入也為合秋三月宜灸之至隂在足小指外側去爪甲角如韭葉灸三壯主頭重齀及瘈汗不出心煩足下熱不欲近衣項痛目鼻及小便皆不利痎瘧寒熱疝風寒從足小指起脈痺上下𢃄胸脅痛無常處失精也通谷在足小指外側夲節前陷者中灸三壯主身疼痛喜驚互相鼻齀癲疾寒熱目􅑩􅑩喜咳喘逆狂疾不嘔沫痓善喜唏頭眩項痛煩滿振寒痎瘧束骨在足小指外側夲節後陷者中灸三壯主身痛狂善行癲疾寒熱腰如折痓驚互引腳如結踹如裂暴病頭痛身熱痛肌肉動耳聾惡風目皆爛赤項不可雇髀樞痛泄腸僻瘧從䯒起京骨在足外側大骨下赤白際陷者中主痎瘧寒熱善唏頭重足寒不欲食腳腳攣癲疾狂妄行振寒善自齧俠偏枯腰髀樞痛善搖頭齀衄血不上淫樂頭痛目白翳跟尻瘈瘲并頭腫痛泄主上隂心月赤皆爛無所見痛從內背始腹滿頸項強腰背不可俯仰眩痿厥身體不仁手足偏小先取京骨後取中封絶骨寫之厥心痛與肩背相引善瘈如瘲後觸其心傴僂者腎心痛也痓目反白多鼻不通利涕黃便去血申脈陽蹻所生也在足外踝下陷者中容爪甲灸三壯主腰痛不不舉足小坐若下車躀地脛中燆然寒熱頸掖不腫癲疾互引僵仆金門足太陽却一名關梁在足外踝下灸三壯主尸厥暴死霍亂轉筯癲疾不嘔沫馬癎僕參一名堅邪在跟骨下陷者中共足得之太陽陽蹻脈所會灸三壯主腰痛不可舉足跟中踝後痛腳痿癲疾僵仆轉筯尸厥暴霍亂馬癎也崑崙在足外踝後跟骨上陷者中灸三壯主痓脊強頭眩痛腳如結喘如裂厥心痛與背相引善瘈如瘲後觸其心傴僂者腎心痛也寒熱癲疾目􅑩􅑩齀衄瘧多汗腰痛不得俯仰目如脫項如拔脊強大風頭多汗腰尻腹痛喘跟腫上齒痛脊背尻重不欲起聞食臭惡聞人音狂易女子字難苦胞衣不出泄風從頭至足癎瘈口閉不得開每大便腹暴滿按之不下噫悲喘附陽足陽蹻之却在外踝上三寸太陽前少陽後筋骨間灸三壯主痿痢風頭重眩煩痛樞股踹外廉骨痛厥瘲痺不仁振寒有熱四肢不舉飛陽一名厥陽在足外踝上七寸足太陽絡灸三壯主身懈寒少氣熱甚惡人心愓然取飛揚及絶骨附上臨泣已淫樂脛􅂒熱病汗不出皆主之下部寒體重逆氣頭眩痛痓反折瘧實則腰背痛虛則齀衄不渴間日作狂癲疾體痛頸項痛厯節汗出而步失履寒腹不仁喘中痛痔篡痛也承山中名魚腹一名肉柱在免踹腸下分肉間陷者中灸五壯寒熱篡反出癲疾瘈瘲齀衄腰背痛腳踹酸重戰栗不久立踹如裂腳急跟痛足攣少腹痛引咽喉大便難腹痛也承筋一名踹腸一名直腸在踹中央陷者中足太陽脈氣所發灸三壯主大腸實則腰背痛寒痺轉筋頭眩痛虛則鼻衄癲疾腰痛濕然汗出令人欲食欲走寒熱篡後出痢瘲腳踹酸重戰栗不能人立腳急腫痛附筋足攣少腹痛引喉嗌大便難痔篡痛腰背相引霍亂頸痺不仁也合陽在膝約中央下二寸灸五壯主痺厥癲疾嘔沫瘈瘲物急跟厥膝重腰脊痛引腹篡隂股熱隂暴痛寒熱膝酸重委中在約中央動脈灸三壯主腰痛俠脊至頭沈沈然目􅑩􅑩瘧頭痛寒從背起先寒後熱渴不止乃出癲疾反折熱痛俠脊痛痔篡痛遺弱筋急身熱少腹堅腫少腹時熱小便難尻股寒髀樞痛外引季脅內控八􅂒衄血不止委陽在足太陽之前少陽之後出於膕中外廉兩筋間承扶下六寸此足太陽之絡灸三壯一云出身取之主胸滿彭彭然實則閉癃腋下腫痛虛則潮遺腳急競競然筋痛不得小便痛引腹腰痛不得俯仰浮却在委陽上一寸展膝得之灸三壯主不得卧止也殷門在肉却下六寸灸三壯主腰痛得俯不得仰仰則化痛得之舉重惡血歸之扶承一名肉却一名隂關一名皮部在尻下股隂上衝文中一云股隂下衝文中灸三壯腰脊尻㬾股隂寒大痛虛則血動實并熱痛痔篡痛尻睢中腫大便直出隂胞有寒小便不利附分在第二椎下附項內廉兩傍各二寸手足太陽之會灸五壯主背痛引頸魄户在第三椎下兩傍各三寸足太陽脈氣所發正坐取之灸五壯主肩膊間急悽厥惡寒項背痛引頸咳上氣嘔吐煩滿背痛不能引顧神堂在第五椎下兩傍各三寸陷者中足太陽脈氣所發灸五壯主肩痛胸腹滿悽厥脊背急譩嘻在肩膊內廉俠第六椎下兩傍各三寸以手按之痛病者言譩嘻足太陽脈氣所發灸五壯主腋􅂒攣暴脈急引脅而痛內引心脈從項至脊以下至十二椎應手灸之立以熱病汗不出肩背寒熱痓互引身熱咳逆上氣虛喘喘逆鼻衄肩甲內廉痛不可俯仰眇季脅引少腹而脹痛小兒食􅀈頭痛引頭痎瘧風膈關在第七椎下兩傍各三寸陷者中足太陽脈氣所發闊肩取之灸五壯主背痛惡寒脊強俯仰難食不下嘔吐多涎魂門在第九椎下兩傍各三寸陷者中足太陽脈氣所發正坐取之灸三壯主胸脅脹滿皆痛惡風寒飲食不下嘔吐不留住也陽綱在第十椎下兩傍各三寸陷者中足太陽脈氣所發正坐取之灸三壯主飲食不下腹中雷鳴大便不節小便赤黃意含在第十一椎下兩傍各三寸陷者中足太陽脈氣所發正坐取之灸三壯主腹滿肚脹大便泄消渴身熱面目黃胃倉在第十二椎下兩傍各三寸灸三壯主臚脹水腫食飲不下多寒不能俯仰肓門在第十三椎下兩傍各三寸又肋間灸三壯主心下大堅婦人乳餘淚志室在第十四椎下兩傍各三寸陷者中足太陽所發正坐取之灸三壯主腰痛脊急脅下滿小腹堅急也胞肓在第十九椎下兩傍各三寸陷者中足大陽脈氣所發伏而取之灸三壯主腰脊痛惡寒少腹滿堅癃閉下重不得小便以手接之則欲小便澀而不得出肩上熱手足小指外側及脛踝後督熱岩脈陷取委中央也柣邊在第二十二椎下兩傍各三寸陷者中取太陽脈氣所發伏而取之灸三壯主腰痛骶寒俯仰急難隂痛下重不得小便攢竹一名貟柱一名始光一名夜光一名明光在肩頭陷者中足太陽脈氣所發灸三壯主風頭痛鼻齀衄眉頭痛善嚏目如欲脫汗出惡寒面赤䪼中痛項椎不可左右顧目系急瘈瘲癲疾互引反拆戴眼及眩狂不得卧意中煩目􅑩􅑩不明惡風寒癎發目上插痔痛曲差一名鼻衝俠神庭一寸半在髮際足太陽脈氣所發正頭取之灸五壯主頭痛身熱鼻室喘息不利煩滿汗不出也五處在督脈傍去上星一寸半足太陽脈氣所發灸三壯主痓脊強反折瘈癲疾頭重寒熱通天一名天目承光後一寸半足太陽脈氣所發灸二壯主頭痛重暫僵仆鼻窒鼻衄不得通喎僻多涕齀衄有瘡絡却一名強陽一名腦蓋反行在通天後一寸半足太陽脈氣所發灸三壯主青盲無所見癲疾僵仆目妄見恍惚不樂狂走瘈瘲玉枕在絡却後七分半俠腦户傍一寸三分起肉枕骨上髮際三寸足太陽脈氣所發灸三壯主頭項痛惡風汗不出悽厥惡寒嘔吐目內系急痛引頞頭重項痛寒熱骨痛頭眩痛頭半寒目痛不能視項似拔不可左右顧癲疾不嘔沫互引天柱在俠項後髮際大筋外廉陷者中足太陽脈氣所發灸三壯主寒熱暴痀攣癎眩足不仁目􅑩􅑩赤痛痓厥頭痛項先痛腰脊為應眩頭痛重目如拔狂見目上及項直不可以顧暴攣足不仁身痛欲折咽腫難言小兒驚癎大杼在項第一椎下兩傍各一寸半陷者中足太陽首陽之會灸七主癲疾不嘔沫痎瘧項痛不可以俯仰頭痛振寒瘈瘲氣實則脅滿夾脊痛并氣熱汗不出腰背痛痓脊強喉痺大氣滿喘胸中欎欎身熱眩目􅑩􅑩項強急寒熱僵仆不能久立煩滿裏急身不安席風門一名熱府第二椎下兩傍各一寸半腎膝足太陽之會灸五壯主頭風眩痛鼻衄不利時嚏清涕日出肺俞在第三椎下兩傍各一寸半灸三壯主肺寒熱呼吸不卧咳上逆嘔沫喘氣相追逐胸滿背膺急息難振慓脈鼓氣隔胸中有熱支滿不嗜食汗不出腰背痛肺脹癲疾憎風時振寒不能言得寒益甚身熱狂欲自殺目妄見瘈瘲泣出死不知人心俞在第五椎下兩傍各一寸半灸二壯主寒熱心痛循循然與背相引而痛胸中邑邑不得息咳唾血多涎煩中善噎飲食不下嘔逆目􅑩汗不出如瘧狀􅑩淚出悲傷痎瘧心脹膈俞在第七椎下兩傍各一寸半灸三壯主悽悽振寒數次伸咳而逆隔寒飲食不下寒熱皮肉骨痛少氣不得卧胸滿支兩脅膈上競競脅痛腹䐜胃管暴痛上氣肩背寒痛汗不出喉痺腹中痛積聚默默然嗜卧息惰不欲動身常濕心痛無可搖者用痺身背痛無可大汗出痓風汗出癲狂肝俞在第九椎下兩傍各一寸半灸三壯主咳而脅滿急不得息不可反側撅脅下與臍相别筋而痛反折目上視胘中循循然眉頭痛驚狂衄少腹滿目􅑩􅑩生白翳咳引胸痛筋寒熱唾血短氣鼻酸痓筋痛急互相引肝脹癲狂也膽俞在第十椎下兩傍各一寸半足太陽脈所發正坐取之灸三壯主胸滿嘔無時口苦舌乾飲食不下也脾俞在第十一椎下兩傍各一寸五分灸三壯主腹中氣脹引脊痛食飲多身羸瘦名日食晦先取脾俞後取季脅痺欠脅下滿欲嘔身重下動脾痛熱痓大腸轉氣夾之如覆不熱引胃痛脾氣寒四肢急煩不嗜食脾脹也胃俞在第十二椎下兩傍各一寸半灸三壯主胃中寒脹食多身羸瘦腹中而鳴腹䐜脹風厥胸脅支滿嘔吐脊急痛筋攣食不下三焦俞在十三椎下兩傍各一寸半足太陽脈氣所發灸三壯主頭痛飲食不下腹鳴臚脹欲嘔時注疾腎俞在第十四椎下兩傍各一寸半灸三壯主腰痛不可俯仰反側熱痓寒熱身多身羸瘦兩脅引痛心下腹痛心如懸下引臍少腹急痛熱面黑目􅑩􅑩喘咳少氣溺骨赤骨寒熱溲難腎脹風頭痛如􅀈足寒如氷頭重身熱振栗腰中四肢淫樂欲吐腹鼓大寒中洞泄食不化骨寒熱引背不得息大腸俞在第十六椎下兩傍各一寸半灸三壯主大腸轉氣按之如覆杯食飲不下善噎腸中鳴䐜脹面重暴泄腰痛足主津夜所生病者目黃口乾衄喉痺肩前臑痛大指次指痛不用氣盛有餘則熱腫虛則寒栗也小腸俞在第十八椎下兩傍各一寸半灸三壯主少腹痛熱控睪引腰脊疝痛上衝心腰脊強溺難黃赤口乾大小便難淋滯膀胱俞在第十九椎下兩傍各一寸五分灸二壯主熱痓互引汗不出反折尻㬾內痛似疸狀腰脊痛強引背少腹俯仰難不得仰息委重尻不舉溺赤腰以下至足清不仁不可以脛起中膂肉俞在第二十椎下兩傍各一寸半俠脊腴起肉灸三壯主腰不可以俯仰寒熱痓反折互引太陽脈氣所發不可灸主腰脊上下至足不仁小便赤黃也白環俞在第二十一椎下兩傍各一寸半足太陽脈氣所發不可灸主腰脊上下至足不仁小便赤黃也上􅡍在第一空腰髁下一寸俠脊陷者中足太陽少陽之絡灸三壯主腰脊痛而清善嘔皋跳蹇寒熱熱病汗不出痎瘧女子絶子隂挺出不禁白􅅹次􅡍在第二空夾脊陷者中灸三壯主腰痛怏怏不可以俯仰腰以下至足不仁脊腰背寒先取缺盆後取見骶與八􅂒女子赤白􅅹心下積脹同上法中􅡍在第三空夾脊陷者中灸三壯主厥隂所結腰痛大便難飱泄尻中寒女子赤淫時白氣癃月事少男子癃小腸脹下􅡍在第四空夾脊陷者中灸三壯主腰痛引少腹女子下蒼汁不禁淫隂中癢痛少腹控眇不可以俯仰腹脹鳴澼泄會陽一名利樓在隂尾骨兩傍督脈氣發灸五壯主五臟腹中有寒泄注腸澼便血素􅡍一名面在王鼻柱端督脈氣所發主齀衄洟出中有懸癰宿肉窒洞不通不知香臭也神庭在髮際直鼻督脈足太陽陽明之會灸三壯主頭腦中寒齀目泣出癲疾嘔沫風眩善嘔煩痎瘧寒熱頭痛喘喝目不能視上星在顱上直鼻中央入髮際一寸陷容豆督脈氣所發灸五壯主風眩善嘔煩滿顔旨痎瘧鼻齀衄寒汗不出目中痛不能視面腑腫癲疾兄云上星主之者先背取譩嘻後取天牖風池甄權云不以多灸之𩕄會在上星後一寸陷中督脈氣所發灸五壯主痓風眩善嘔煩滿頭痛顏青癲疾嘔沫暫起僵仆惡兒風寒面赤腫前頂在𩕄會後一寸五分骨陷中督脈氣所發灸五壯主風眩目䐜惡風寒面赤腫小兒驚癎百會一名三陽五俞在前後一寸半頂中央旋毛中陷容指督脈足太陽之會灸五壯痎瘧癲不嘔沫耳嗚痓項上痛風頭重目如脫不可左右顧也後頂一名交衝在百會後一寸五分枕骨上督脈氣所發灸五壯主風眩目眩顱上痛目􅑩􅑩不明惡風寒眩遍頭痛癲疾瘈瘲狂走項直頸痛甚也強間一名大羽在後頂後一寸半督脈氣所發灸五壯主頭痛如針刺不可以動項如拔不可左右顧癲疾狂走瘈瘲搖頭口喎淚項強也腦户一名匝風一名會顱在枕骨上強間後一寸半督脈足太陽之會不可灸主目赤痛不能視面赤腫頭痛項痛目不明風則腦中寒重衣不熱汗出頭中惡風癲疾骨痠胘狂瘈瘲口禁羊鳴舌本出瘖不能音痓目不􅓃寒熱風府一名舌本入項髮際一寸大筋內宛宛中督脈陽維之會不可灸之主頭痛項急不得頷側目眩鼻不得喘息舌急難言狂易多言不休走欲自殺目及妄見暴瘖不得言喉嗌痛足不仁之會瘖門一名橫舌一名舌厭在項髮際宛宛中入繫舌本督脈陽維之會仰頭取之不可灸令人瘖主項強舌緩瘖不能言脈傍去上星一寸五分灸三壯此以㵼諸陽氣熱衄善噫風頭痛汗不出寒熱痓脊強反折瘈瘲癲頭痛大椎在第一椎上陷者中三陽督脈之會灸九壯主熱以年為壯數傷寒熱甚煩嘔陶道在項大椎節下間督脈足太陽之會俯而取之灸五壯主頭重目瞑悽帶熱項強雖以反顧汗不出身柱在第三椎下間督脈氣所發仰而取之灸五壯主癲疾怒欲殺人狂走􅀈言見鬼瘈瘲神道在五椎節下間督脈氣所發仰而取之灸三壯主身熱頭痛進退往而痎虛恍惚悲愁也至陽在第七椎節下督脈氣所發仰而取之灸三壯主寒熱解爛淫樂脛痠四肢重痛少氣難言也縮筋在第八椎節下間督脈氣所發仰而取之灸三壯主小兒驚癎瘈瘲狂走癲疾脊急強目轉上插脊中在第十一椎節下間督脈氣所發不可灸之腹滿不能食腰脊強不得俯仰黃疸懸樞在第十三椎節下間督脈氣所發灸三壯主腹中積上下行命門一名屬纍在第十四椎節下間督脈氣所發伏而取之灸三壯主頭痛如破身熱如火汗不出癲瘈裏腰腰下引痛腰俞一名背解一名髓孔一名腰注一名腰户在二十一椎節下間灸三壯主腰痛引少腹控眇不可俯仰以日死生數發針在左取右右取左立巳腰以下至足青不仁不可以坐起尻不舉女子寒熱閉溺脊強互引反折汗不出乳子下赤白長強一名氣之隂却督脈絡别在脊骶端少隂所結灸三壯主腰痛上實則脊急強癲疾發如狂者面皮敦敦厚者不療虛則頭重洞泄癃痔大小便難腰尻重難起居寒熱痓反折心痛形氣短尻䐜澀小便黃閉小兒癎瘈瘲脊強互相引膏肓俞主無所不療諸羸弱瘦損虛勞夢中失精上氣咳逆狂惑妄誤取穴之法先令病人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂得動也從甲骨上角摸索至甲骨下頭其間當有四肋三門灸中間依甲骨之裏去甲骨容側指許摩股去表肋間空處按之自覺牽引於肩中灸兩甲中各一處至六百壯多至七百壯當覺下􅀢􅀢然流水伏亦當有所下出若停痰宿疾則無所不下也若病人已困不能正坐當令側卧挽上臂令前取冗灸之求穴大較以右手從左肩上住指頭所不及者是也左手亦然乃以前兩甲骨覆冗可得也所以衣僕當令大小有常不定兩甲則前却失其穴也此穴灸訖後令人陽氣盛當消息以自補養令得平覆其冗近第五椎相凖望取之論曰昔有和緩不救晉侯之疾以其在膏之上肓之下針藥所不能及此之冗是也人不能求得此穴所以宿病難遣若能用心此方便求得灸之無疾不愈三焦人三焦者腑也兩傍五十六冗甲乙經三焦出於關衝關衝者金也在手小指次指之端去爪甲如韭葉少陽脈所出也為井冬三月宜灸之流於腋門腋門者水也在手小指次指之間陷者中手少陽脈之所溜也為榮春三月宜灸之注於中渚中渚者木也在手小指次指本節後間陷者中手少陽脈之所注也為俞夏三月宜灸之過於陽池一名别陽在手表腕上陷者中手少陽脈之所過也為原行於支溝支溝者火也在腕後三寸兩骨之間陷者中手少陽脈之所行也為經入於天井天井者土也在肘外大骨之後肘後一肘兩筋間陷者中屈肘得之手少陽脈之所入也為秋三月宜灸之關衝在手小指次指之端去爪甲如韭葉灸三壯主喉痺舌卷口乾煩心臂表痛不可及頭在左取右右取左熱病汗不出肘痛不能自𢃄衣起頭眩頷痛面黑渴風肩頭痛不可顧霍亂寒熱耳聾鳴甄權云不可灸也腋門在手小指次指間陷者中灸三壯主熱病汗不出風寒熱狂疾瘧頭痛目澀暴變耳聾鳴眩寒厥手臂痛下齒齲則上齒痛膽善驚妄言面赤泣出也中渚在手小指次指本節後間陷者中灸三壯主熱病汗不出狂互引頭痛耳鳴目痛寒熱嗌外腫肘臂痛手上類類也五指瘈不可屈伸頭眩頷䫣顱痛耳聾兩顳痛身面癢瘧項痛目􅑩􅑩無所見喉痺陽池一名别陽在手表腕上陷者中灸三壯主寒熱痎瘧肩痛不能自舉汗不出痛也外關手少陽絡在腕後二寸陷者中灸三壯主肘中濯濯臂內廉痛不可及頭耳淳淳渾渾聾無所聞口僻禁之支溝在腕後三寸兩骨之間陷者中灸三壯主熱病汗不出互引頸嗌外腫肩臂酸消脅腋急痛四肢不舉痂疥項不可顧霍亂馬刀腫瘻目痛肩不舉心痛支滿逆氣出中禁不可開暴瘖不能言男子脊急目赤咳面赤熱會宗手少陽却在腕後三寸空中灸三壯主皮毛中肌肉耳聾羊癎三陽絡在臂上大交脈溝上一寸灸三壯主嗜卧身不能動搖大濕內傷不足四瀆在肘前五寸外廉陷者中灸三壯主卒氣聾齒痛天井在肘後大骨之後一寸兩筋間陷者中屈肘得之灸三壯主肘痛引肩不可屈伸振寒熱頸項肩背痛臂痿痺不仁大風默默然不知所痛嗜卧善驚瘈瘲胸痺心痛肩肉林小瘧食時發心痛悲傷不樂癲疾吐舌沫出聲如羊鳴更戾頸也清冷淵在肘上三寸伸以肘舉臂取之灸至三壯主頭痛振寒肩不舉不得𢃄衣也消濼在臂下臂外開腋斜肘分下行灸三壯主寒熱痺頭痛項背急也和􅡍在耳前兌髮下動脈手足少陽之會灸三壯主頭重頷痛引耳中膿膿􅀈􅀈聽會在耳門前陷者中張口得之動脈應手手少陽脈氣所發灸三壯主寒熱喘渴目視不能視目立出項項耳中癲飈者若風齒齲齒痛也聽宮在耳中珠子大如赤小豆手足少陽手太陽之會灸三壯主耳聾填填如無聞膿膿􅀈􅀈若蟬鳴鶴規鳴羊鳴驚狂瘈瘲眩仆癲疾瘖不能言沫出角孫在耳郭中間上開口有空是也灸三壯主齒牙不可嚼齲腫痛也瘈脈一名資脈在耳本雞足青絡主小兒癎瘈吐泄驚恐失精視瞻不明䏧􅀈翳風在耳後陷者中按之引耳中手足少陽太陽之會灸三壯主治聾僻不正失欠口不開痓不言天牖在頸筋缺盆上天容後天柱前完骨下髮際上手少陽脈氣所發灸三壯主肩痛寒熱厯適頸有大氣暴聾氣啄瞀目不用頭頷痛戾出洞鼻不知香臭風眩喉痺三焦病者腹氣滿少腹尤堅不得小便窘急溢則為水留則為脹候痎瘧天容在耳下曲俠後手少陽脈急所發灸三壯主寒熱疝積胸痛不得息窮屈骨中痛陽氣大逆上滿於胸中憤脹堅息大氣逆上喘喝坐伏病咽噎不得息咳逆上氣唾沫肩痛不可舉頸項癰腫不能言耳聾􅀈􅀈無所聞喉痺癭觀􅡍一名兑骨在面齀骨下廉陷者中手少陽太陽之會主口僻齒痛面赤目赤目黃口不能嚼䪼腫唇癰肩井在肩上陷解中缺盆上大骨前手足少陽陽維之會灸五壯主肩背痺痛臂不舉寒熱悽索天􅡍在肩缺盆中上恐骨之際陷者中足少陽陽維之會灸三壯主肩脈中痛引頂寒缺盆病汗不出胸中熱痛肩正在肩曲甲下兩骨解間肩髃後陷者中灸三壯主寒熱項厯適耳鳴無間引缺盆肩中熱痛手臂小不舉肩外俞在肩甲上廉去脊三寸陷中中灸三壯主肩中痛熱而寒至肘肩中俞在肩甲內廉去脊二寸陷者中灸三壯主寒熱厥目不明咳上氣唾血之證候曲垣在肩中央曲甲陷者中按之痛應手灸十壯至肩痛周痺缺盆一名天蓋肩上橫骨陷者中灸三壯主寒熱厯適胸中滿有大氣缺盆中滿痛死者外潰不死肩引項臂不舉缺盆中痛汗出喉痺咳嗽普濟方卷四百十三
