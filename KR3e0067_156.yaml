body:
  text: 普濟方卷一百五十七明周王朱橚撰咳嗽門總論夫人所以滋養其身惟氣與血呼吸定息衛氣之失常則為咳嗽津液流潤榮血之異常則為痰涎咳嗽吐痰氣血已亂以故世治之藥極多而卒不能遍效者蓋其治病之因不一世謂五嗽目以臟而言之要之內因七情外合六淫飲食起居煩勞呌呼皆能單復綺互而為病故經云五臟六腑感寒熱風濕皆令人嗽又微嗽厲風所吹聲嘶發嗽熱在上焦嗽為肺痰秋傷濕冬嗽皆外所因喜則氣散怒則氣激憂則氣聚思則氣結悲則氣急恐則氣劫驚則氣亂皆能發嗽却內所因其如飲食生冷房勞則疫治咳尤多皆不內外因也傷風咳者脈浮憎寒壯熱自汗惡風口乾煩躁鼻清涕傷寒嗽者脈緊憎寒發熱無汗煩躁不渴傷熱咳者脈數煩熱引飲口燥或吐涎沫聲嘶咯血傷濕咳者脈細骨節煩疼四肢重著灑灑淅淅並屬外所因診其脈浮為風急為寒數為熱細為濕隨其部位與人迎相應喜傷心者咳而喉中介介如重狀甚則咽腫喉痺名為心咳不已則小腸受之小腸咳狀與氣俱濕怒傷肝者咳而兩脅下痛甚則不可輾轉兩腳下滿名為肝咳不已則膽受之膽咳之狀咳嘔膽汁思傷脾者咳而右脅下痛隂隂肩背甚則不可以動名為脾咳不已則胃受之胃咳之狀咳而嘔則長蟲出憂傷肺者咳而咳息有聲甚則唾血名為肺咳不已則大腸受之大腸嗽狀嗽而遺尿恐傷腎者咳而腰背相引痛甚則咳涎名為腎咳不已則膀胱受之膀胱咳狀咳而遺溺久咳不已則三焦受之三焦咳狀咳而腸滿不欲飲則疾皆聚於胃關於肺肺取膈愈最近故內因多先有所感世人並名肺咳嗽也並屬內所因疹其脈隨其部位餘氣口相應浮緊則飢寒沈數則實熱弦澀則少血洪滑則多疾病者咳嗽發作寒熱引腰背痛或傷喘滿此因房勞傷腎病者中滿脹愴心痛不欲食此因飢飽傷脾病者咳嗽左脅偏疼引小腸并膝腕痛此因疲極傷肝病者咳嗽吐白涎口燥聲嘶此因呌呼傷肺病者咳嗽煩熱自汗咽乾咯血此因勞神傷心並屬不內外因論其脈隨其所假如尺脈浮澀而數則知傷腎右關脈濡則知飲食傷脾左關脈弦短則知疲極傷肝但不應人迎氣口者即是不內外因皆可類推診其右手寸口氣口以前脈手陽明經也其脈則為陽食實者病若胸滿善喘脈為大微汗痞咳飲少傷咳嗽脈浮大者有沈小傷匿者死又云脈浮者死咳且嘔腹脹且泄其弦弦欲絶者死咳脫行發熱脈小硬急者死咳且羸瘦絡脈大應者死嗽而尿血夢溲大者死問曰嗽病有十何謂也師曰有風咳有寒咳有肢咳有肝咳有心咳有肺咳有腎咳有厥隂咳問曰十咳之證以何為異師曰欲語因咳言不得説竟謂之風咳飲冷食寒因之而咳謂之寒咳心下緊滿咳則肢痛其脈返遲謂之肢咳咳則引脅下痛謂之肝咳咳而唾血引手少隂謂之心咳咳而涎出續續不止飲小腸謂之脾咳咳而引頸項而唾涎沫謂之肺咳咳則耳無所聞引腰并臍中謂之腎咳咳而引頭痛口苦謂之膽咳咳而飲舌本謂之厥隂咳風咳者不下之寒咳肢咳肝咳刺足大衝心咳刺手神門脾咳刺足大白肺咳刺手大泉腎咳刺足太豁膽咳刺足太陽凌泉厥隂刺手大陵久咳為㽷咳而時發熱脈在九菽一作卒弦者非虛也此為胸中寒實所致也當吐之夫嗽家其脈弦欲行吐藥當相人強弱而無熱乃可吐耳咳家其人脈弦為有水可與十棗湯下之不能卧出漢者隂不受邪故也留飲咳者其咳不得卧飲項上痛咳者如小兒掣縱狀夫酒咳者必致吐血此坐久極飲過度所致也其脈沈者不可發汗久咳數歲可發熱者可治實大數者死其脈虛者必善胃其人本有支飲在胸中故也致屬飲家上氣汗出而咳屬飲家咳而小便利若失溺不可發汗汗出即厥逆冷夫病者吐血喘咳上氣有脈數有熱不卧者死寒家嗽而上氣其脈數者死謂其人形損故也脈散而大散者為氣實而脈血虛名曰有表無裏上氣面附腫肩息其脈浮大不治痢家尤甚上氣躁而喘者屬肺脹欲作氣水發汗愈咳為無痰而有聲肺氣脹而不清也嗽為無聲而有痰脾濕動而為痰也欲咳是有痰而有聲蓋因傷於肺氣而咳動於脾濕之咳而為嗽也治咳嗽者治痰為先治痰者下氣為上是以南星半夏上勝其痰而咳嗽自愈也枳殼陳皮利其氣而痰自下也痰而能食者承氣湯微下之痰而不能食者厚朴湯治之夏月嗽而發熱者謂之熱痰嗽柴胡湯四兩加石膏一兩知母半兩用之冬月嗽而發寒熱者謂之寒嗽小青龍加杏仁服之蜜煎橘皮湯燒生薑胡桃皆治無痰而嗽此乃大例更當隨時隨證加減之有勞嗽一證皆因虛或若風寒暑濕乃勞逸抑鬱憂思喜怒飲食飢飽致臟氣不平積微至著以致漸成肺癰者咳嗽有痰者有乾咳無痰者甚則失聲咳吐膿血身體發熱五心煩熱盜汗自出夜夢鬼交日輕夜重肢體憔悴皮膚乾燥頰如傅胭脂飲食日少主人云瘡一月不愈則瘡中有蟲咳嗽一月不愈則肺中有蟲若肺中有蟲則藥難有功矣肺蟲如蠶漸致變亂日將月積致成勞矣自而始且勞蟲亦有傳尸亦有久病者心憂日慮藥不奏功而證候日深自此而成著床者多矣感風傷冷挾熱受濕瘀血停水與夫肺實肺虛皆能壅痰而發嗽也感風者鼻塞聲重傷冷者凄清怯寒挾熱為焦煩受濕為纏滯瘀血則膈間腥悶停水則心下怔忪或實或虛痰之黃白唾之稀稠從可知之大法肺脈浮為風邪所客以發散取之肺脈實為氣壅內熱以清利行之脈濡散為肺虛以補肺安之其間久嗽之人曾經解利以致肺胃俱寒飲食不進則用溫中助肺加和平治嗽等輩至若酒色過度虛勞少血津液內耗心火日熾遂焦熱乘肺咯膿血上氣涎潮其咳連續而不已惟夫血不勞肌故邪在皮毛皆能入肺而自背得之尤速此則人參芎歸所不可無一種傳尸病涉邪惡五臟反尅毒害尤深近世率用蛤蚧天靈桃栁枝丹砂雄黃安息通神之劑然則咳嗽證治於此可以問津率途矣抑猶有説焉脾運氣也肺為氣之主而腎為氣之藏凡咳嗽暴重動引百骸自覺氣從臍下逆奔而上者此腎虛不能收氣歸源也當以補骨脂安腎丸主之毋徒從事於寧肺諸氣諸痰咳嗽喘壅之類須用枳殼以枳殼不惟寬中又能行氣氣下痰證自平夫痰咳之疾有一時感冒寒熱者不可便投半夏南星等熱藥恐凝滯其痰終身為痼疾為一發散法去熱而痰嗽自止功宜審於用藥傷冷咳嗽身不憎寒發熱得之脾胃受寒傳入於肺遂成寒嗽嗽甚則吐白沫而多嘔此當先用溫藥其脾胃如此治中湯胡椒理中湯丁香半夏丸五味子煎服諸咳嗽附論夫咳嗽病有數種有熱嗽有肺氣有飲食嗽熱嗽者年力壯體氣充滿將息傷熱續熱所成故致熱嗽此但飲食取冷兼以藥壓之自歇冷嗽者年衰力弱體氣虛微如復寢食傷冷故成冷咳此但將息以溫兼進溫藥則當平復肺嗽者不限老少宿多內熱後因飯食將息傷熱則常嗽積年不斷肺氣衰便成氣嗽不早療遂成肺癰若此將成多不救矣飲氣嗽者由所飲之物停積在胸水氣上衝入肺故得此氣便成咳久而不除漸成水氣若作此病亦難療之熱嗽之狀更無其餘但遇熱便發此者宜合生地黃等七味湯服之方寧嗽湯出直指方諸嗽通用桑白皮炒紫蘇細辛北五味子橘皮半夏製茯苓去皮杏仁去皮縮砂仁枳殼製北梗甘草炒等分右銼每服三錢薑四片烏梅半箇食後煎服治嗽杏蘇飲杏仁欵冬花前胡半夏製五味子麻黃柴胡桑白皮人參桔梗已上各等分右為細末每服三錢水一盞半生薑五片同煎七分通一服寧神丸止一切咳嗽白茯苓去皮五味子炒乾山藥杏仁去皮尖麩炒白搗阿膠炒珠子熟乾地黃各一兩人參當歸並去蘆頭麥門冬貝母並去心柏子仁别搗杜仲炒絲斷百部肉桂去粗皮川芎細辛去苗甘草炙銼各半兩右為細末煉蜜和丸每兩作二十丸含化咽津不拘時常令咽喉中藥氣不歇益佳每服一丸杏仁煎治咳嗽不拘日月近逺杏仁湯浸去皮雙仁炒麻黃不去根節大黃銼炒柴胡去苗甘草炙銼桂去粗皮各三兩右為細末先用水一升半煎藥末水盡後旋再添五升煎令得所以生絹濾去滓再熬成煎瓷器中盛每服一大匙臨卧含化咽津阿膠湯治咳嗽阿膠炒令燥桑根白皮炒銼甘草炙銼各一兩五靈脂炒貝母炒去心知母銼焙各半兩右為散每服三錢水一盞烏梅半枚生薑三片煎至七分去滓溫服欵冬花膏治益肺氣止嗽人參白术欵冬花去梗甘草炙川薑炮鍾乳粉右各半兩為細末煉蜜丸每服十丸食前米飲下含化止嗽丸治肺氣不和咳嗽常服潤養心肺及大人小兒一切咳嗽服之大效欵冬花炒杏仁去皮尖麩炒貝母去心泡各一兩吳白芷甘草炙各半兩右為細末煉蜜和丸每兩作十五丸每服一丸至二丸時時含不拘時寧肺散治一切寒熱痰盛久新咳嗽不止者御米殼四兩木瓜三兩御米殼一處同蜜二兩水化開炒微黃五味子人參皂角各一兩右為末每服二錢烏梅同煎臨卧食後服大效治久新嗽不已皂角一寸刮去皮炙麻黃去節杏仁炒去皮尖桂去粗皮五味子各一分右㕮咀每服三錢水二盞生薑二十片同煎至七分去滓溫服不拘時候阿膠散治一切咳嗽虛人老人皆可服阿膠麩炒馬兜鈴各一兩五靈脂研桑白皮各半兩甘草炙一分右為末每服一錢水一盞煎六分通口食後夜卧服四滿丸療五嗽一曰上氣嗽二曰臊嗽三曰痺嗽四曰冷嗽五曰邪嗽乾薑桂心躑躅花芎藭紫苑芫花根皮各二分人參細辛甘草半夏鬼督郵各一分蜈蚣一枚去頭足炙右為末蜜丸如豆大服五十丸米飲下日三不止加至七十八十丸服此丸無不瘥方祕不傳忌羊肉餳生蔥菜海藻菘菜等治嗽補虛牛骨一副全髓白砂蜜八兩杏仁四兩去皮尖另研細乾山藥四兩去皮為末胡桃一斤取肉四兩去皮另研細右將骨髓砂蜜砂鍋內煎熬沸白絹濾去滓盛在瓶內前藥杏仁胡桃肉山藥三味研細都放在瓦瓶中紙封瓶口煮一日一夜每日早晨一匙溫湯化服當歸飲治男子因打傷負重女人因勞苦用力而傷肺經既損風寒咳嗽或咳血或至紫黑宜用此藥去心肺間瘀血仍炙肺腧病疾蘇肺腧穴在三焦下兩傍各一寸半蘇木生地黃當歸大黃赤山藥各等分右為末酒調服得去瘀血即止服養榮湯調理治瘦病咳嗽右取豬膽和小便生薑橘皮訶梨勒煎服防已丸治咳嗽不計新久及治肺癰防已杏仁湯浸去皮尖雙仁炒貝母去心焙甘草炙銼各二兩甜葶藶炒四兩右為末麵糊丸菉豆大每服一十丸生薑下一方溫湯下百部紫苑丸治咳嗽百部新瓦上炒紫苑去苗土欵冬花擇洗各一兩半桔梗炒貝母去心炒各一兩右為細末煉蜜丸桐子大每服二十丸煎甘草烏梅湯下食後臨卧服貝母丸一名百花丸治咳嗽上膈煩滿貝母去心炒白茯苓麥門冬去心炒山芋百合各一兩甘草炙銼阿膠炙燥各半兩五味子一兩右為細末用黃蠟一兩二錢鎔作汁入末拌和丸如彈子大每服一丸水一盞煎至七分和滓溫服細呷一方加蜜和丸百部散治咳嗽無問新久冷熱一切並服欵冬花百部各一兩知母貝母各半兩去心炒右為細末每服三四錢用虀汁調下食後服金粟丸治一切嗽粟殼去筋蜜炒一兩五味子半兩杏仁炒半兩胡桃肉半兩右為末同蜜丸如彈子大水一盞煎服此藥尤穩七寶散治諸般咳嗽老少並宜服北五味子罌粟殼去頂蒂穰陳皮甘草各等分右同炒用薑擦子攪令香碾粗末每服三錢水半盞烏梅一箇煎至一盞去渣溫服食前臨卧不犯銅鐵器煎尤妙治嗽出百一選方欵冬花一兩懷乾另研桂去粗皮不見火甘草懷乾各一分鵝管石半兩透明白者研右各修製入乳鉢中一處碾每服一錢許五更時蘆管旋吸入咽喉中服訖仰睡吐涎沫為效忌生冷油膩鹽醬等物淡食一兩日化痰丸治咳嗽涎喘南星生薑各一兩半夏枯礬各一兩半右細末水糊為丸桐子大每二十丸食後溫虀汁送下日三服治一切咳嗽痰盛人參半夏一兩煨製白礬六錢杏仁一兩生去皮尖右為細末生麵糊為丸好酸漿水煮三五十沸濾去澄乾每服三十五丸只用煮藥漿水送下真武湯出直指方治少隂腎水飲與裏寒合而作嗽腸痛不利白茯苓白术白芍藥各一兩熟附子半兩右銼每服二錢半加乾薑細辛五味子各半錢薑三片食前服凡年高氣弱久嗽通用仍再服養正丹溫肺丸治肺伏冷氣咳嗽乾薑炮一兩半皂莢去皮尖令黃陳橘皮湯浸去白焙白茯苓去黑皮各半兩右為末煉蜜丸梧桐子大每服二十丸生薑湯下不拘時桃仁丸一名貝母丸治咳嗽桃仁杏仁二味各湯浸去皮尖雙仁細研一兩欵冬花貝母二味各一兩搗細末與前研末和勻右先以砂糖一兩入銚子內銷鎔後入藥同熬黃熟入臼搗丸如彈子大每服一丸含化咽津又方療嗽蜀椒一合汗去目杏仁去皮尖倍少於椒熬豉少多與杏仁相似熬欵冬花如䜴一半多右㨶蜜和為丸晚間不食含一丸則知效驗十年者五六日知良療咳嗽羊肺湯欵冬花一兩紫苑乾薑細辛各一兩桂心甘草炙各半兩五味子半升白前吳茱萸各半兩羊肺一箇細切右以水八升合煮取三升去渣一服三合日三禁食鹽蒜生菜海藻菘菜生蔥葶藶方治嗽葶藶子一兩紙襯熬令黑知母一兩貝母一兩右同搗篩以棗肉半兩以糖一兩入藥中和丸如彈每服以新綿裹一丸含之徐徐咽津甚者不過二三丸一捻金一名貝母散治逺年近日諸般咳嗽自胸膈逐下寒痰停飲至臟腑次早必利一次溫粥補之五七歲小兒減藥末一半薑一片昔年信州永豐岐人作直符結束手持牌前面寫申時背面寫寅時口稱申時服了寅時效日得千金服者無不取效宜其寶此而不傳忽因犯事到官府有罪寓客趙吉老提舉韓挾取其方懇貸其罪知母貝母各一兩為末巴豆一十粒去油存性右為細末和勻每服一字薑三片煎藥末臨卧細嚼薑湯咽下便睡閉口氣其嗽即定如神一方用餳糖一塊得效百部丸百部焙麻黃各七錢半為末杏仁四十九粒去皮尖炒百研為末右和勻煉蜜丸如芡實大熟水化錢氏茹松子肉五十粒細研别入砂糖噙化極妙若肺受風邪不散喘急面黃目能認人口不能言用陳皮罌粟桑皮湯化下一丸黑靈丸治咳嗽不拘日近年深皆效羌活去蘆頭獨活去蘆頭各一分巴豆三十粒不去皮半夏三十粒同入瓶子內鹽泥固濟炭火三斤煨過取出入前二味右銼羅細末煉蜜丸如梧桐子大每服一丸以後馬兜鈴飲下馬兜鈴散馬兜鈴半兩桂去粗皮一分甜葶藶微炒半兩右銼粗篩每服一錢水一盞煎至八分去渣服丸藥其餘飲時時呷令藥氣常在咽喉中妙貝母散治咳嗽貝母十粒去心麩炒令黃阿膠炙燥甘草炙銼各半兩右為細散每服二錢臨卧煎糯米飲調下後去枕仰卧訶梨勒散治咳嗽用訶勒不拘多少緊實炮熟去核為散每服二錢豬􅏬一枚去脂膏劈開摻藥在內入打破烏梅一枚合定以芭蕉葉包之外濕紙重裹煨令香熟去紙葉烏梅祗將藥並􅏬慢慢嚼喫三兩服寧神散治嗽御米殼二兩蜜炒人參苦葶藶各半兩右為細末入烏梅同煎三五服去渣稍熱服食後薏苡仁湯一名桔梗湯治咳嗽肺癰初萌桔梗二兩甘草二兩薏苡仁三兩右銼如豆大每服五錢水煎入糯米為團米軟為度食後金粟丸治咳嗽不問新舊一服立效此方出內外傷辨雌黃雄黃信各等分右為末糯米糊如蘿蔔子大服四丸食後臨卧茶清下忌熱物平肺湯右用獖豬精肉三兩起薄作三片以皂角三寸暖水浸後洗去用水膩粉二錢摻在肉內以濕紙裹煨至五更時爛嚼以淡薑湯或桑白皮煎湯下至日午瀉下痰涎是病根也平氣散治一切咳嗽吐痰涎惡風不能食人參白术川芎當歸五味子甘草炙一分木瓜乾紫蘇子茯神烏藥去木杏仁去皮尖麩炒桂心白芷各等分右為末每服二錢水一盞薑三片棗二枚煎七分溫服一方無棗天門冬煎療咳嗽天門冬六兩去心杏仁三升去雙仁皮尖碎椒三升熬令汗出桂心厚朴炙杜仲苦參各三兩附子六兩炒乾薑六兩烏梅二枚炮人參六兩蜈蚣一枚去頭足炙右别搗杏仁其餘者合搗下篩以五斤膠飴和搗千杵服如大棗一枚忌冷水豬肉生蔥鯉魚治咳嗽用平胃散川百藥煎細末和勻略睡少時沸湯調服治諸般嗽出本事方􅌝􅌣一箇和皮子使甘草十兩滑石十文蚌粉黑色者五文蛤粉十文山藥三兩桂花十文桂皮十文苦參五文右為末每服二錢薑五片棗子三箇水一大盞入蜜同煎八分服治咳嗽乾咯散一名八仙散出百一選方李松傳於被囚道人屢以取效一切咳嗽喘急鵝管石嘗看不熱而涼者是此即白礬煅為不可用鍾乳石井泉石欵冬花佛耳草甘草白礬各一兩官桂人參各半兩右為細末每服半錢蘆管食後吸之涼冷茶清送下一方無人參吸咽喉中一方無井泉石佛耳草玉仙散出御藥院方治一切咳嗽白礬一錢烏梅去核四枚佛耳草杏仁去皮尖麩炒四十粒欵冬花知母貝母去心各一錢半甘草炙三錢右為細末每服半錢乾摻舌上咽津無時服紫參丸出醫方大成治逺年近日咳嗽諸藥不效者服之必愈紫參甘草炙桔梗各一兩五味子阿膠炒作珠子各半兩桂去粗皮烏梅肉杏仁湯浸去皮尖麩炒各二錢半右為細末煉蜜和丸每兩作五十丸每服一丸新鮮裹定湯食過含化咽津不計時法製溫半夏出御藥院方治咳嗽製半夏二斤用河水洗二次白礬一斤好酒一瓶川升麻丁皮縮砂仁生甘草已上五味各四兩生薑一十五兩切片右件洗半夏去滑白藥焙乾粗銼以大口瓶盛生薑片并前藥一處用好酒浸春夏三七日秋冬一月却取出半夏水洗焙乾餘藥不用每服嚼一二枚不拘時服保安半夏丸出宣明論治久新嗽或上逆涎喘短氣痰鳴痰乾渴大小便澀滯肺痿勞傷心腹痞滿急痛中膈氣上實下虛酒食積聚不消補養血宣行榮衛調進飲食或一切痰逆咳噦或宿食酸臭並宜服之半夏天南星大黃各半兩白礬一兩牽牛蛤粉各二兩黃蘗一兩半巴豆四箇右為末水和丸如小豆大每服十五丸溫酒下食後日三服孕婦不可服一方無巴豆有乾薑二錢半二聖散出宣明論治一切嗽喘漢防已一兩有花紋者馬兜鈴一兩去子右為末每服二錢水一盞生豬肉半斤煎至六分去渣肉溫呷藥清汁臨卧服人參八仙丹治逺年近日咳嗽痰喘肌熱盜汗虛損痿人參官桂麻黃去節甘草炒百部欵冬花杏仁湯浸去皮炒枮白礬各等分右為細末煉蜜丸如小彈子大每服一丸口含化晨晚日二服之治諸般嗽疾出本事方天南星半夏各一兩各使薑汁浸一夜白礬焙豬牙皂角去黑皮并子杏仁去皮尖麩炒黃青黛各半兩焰硝三錢巴豆二十一粒去殼生用右一處為末薑糊丸如菉豆大每服七丸臨卧薑湯下小兒五丸麻黃五味子湯療咳麻黃四兩去節五味子五兩甘草二兩炙半夏三兩洗乾薑五合細辛二兩桂心六兩杏仁三兩去皮尖雙仁者右切以水一斗煮取四升去渣溫五服日三夜二忌海藻菘菜羊肉餳生菜生蔥四滿丸療五嗽一為氣嗽二為痺嗽三為臊嗽四為邪嗽五為冷嗽悉療之方蜈蚣二枚炙芫花根五分熬躑躅花四分乾薑芎藭桂心各四分人參細辛各二分右為末蜜和丸一服米飲下五丸如豆大日三稍加十丸忌生蔥生菜甘草飲子療肺熱咳嗽涕唾多粘甘草六分炙欵冬花七分䜴心一合生麥門冬八分去心蔥白一握檳榔十顆各切碎桔梗六分地黃汁半升右切以水六升煮取二升巾絞去渣下地黃汁分溫三服如人行四五里進一服不利忌生菜熱麵炙海藻菘魚蒜粘豬肉等物人參安肺湯治咳嗽人參杏仁麻黃枳殼甘草烏梅五味子桑白皮右各等分兩為細末棗子生薑同煎去渣臨卧溫服生地黃七味湯生地黃一斤切生薑二合切桑根白皮一升切射干二升切乾葛六合切紫蘇三合竹瀝一升右細切以水一斗煮取三升去渣內竹瀝攪調每服後良久則服之分一服作四服若覺稍愈重合服之病輕者三數劑則瘥忌蕪荑紫苑十味丸又服前生地黃等七味後雖得暫瘥於後還發宜合服紫苑五分桑白皮六分射干四兩百部根五兩麻黃二兩去節乾葛五兩地骨皮升麻各四兩乾地黃六兩芒硝六兩右為細末蜜和丸如梧桐子大以竹瀝下之初服十五丸日再服稍加至三十丸忌蕪荑大棗七味湯又冷嗽之狀且遇諸冷此疾便發若有如此者亦宜合此大棗等七味湯服之大棗三十枚劈桂心四兩杏仁一百枚去尖皮兩仁者研細辛五兩吳茱萸當歸各三兩右切以水八升煮取二升六合去滓溫分三服每服如人行十里久服一劑覺得力至三四劑亦佳隔三四日服一劑忌生蔥生菜當歸十味丸又以乾薑湯服之後雖可未能斷其根遇冷便發宜合此方服之當歸切細辛甘草炙各五兩吳茱萸桂心人參各三兩蜀椒三合炒汗出橘皮乾薑各四兩白芨一兩右為細末蜜和丸煮乾棗飲下之初服十丸日再服稍加至三十丸如桐子大經三五日覺熱每服藥後良久喫三數口粥食壓之忌海藻菘菜生蔥菜延年紫苑飲住咳嗽紫苑貝母茯苓杏仁去皮尖雙仁生薑四兩人參二兩橘皮一兩去皮右切以水五升煮取一升五合去滓分溫三服如人行七八里進一服忌蔥蒜麵酢人參養肺丸出醫方大成治肺胃俱傷氣奔於上客熱薰肺咳嗽氣急胸中煩悸涕唾稠粘或有鮮血上氣喘急不得安卧肢體倦慵咽乾口燥飲食減少漸至瘦弱喘乏或墜墮惡懼水趺卧或因斗怒醉飽房勞致傷脾胃吐血嘔血並皆治之黃耆去蘆蜜塗炙人參一兩八錢白茯苓去皮枯蔞根各九兩杏仁去皮尖麩炒二兩四錢半夏法為末薑汁作面四兩炒皂角子炒三百箇右為末煉蜜丸如彈子大每服一丸食後細嚼用紫蘇湯送下如喘急用桑白皮湯送下細辛五味子湯出醫方大成治肺經不足胃氣怯弱或冒風邪或停飲食咳嗽喘息不得安卧胸滿迫塞短氣短食乾嘔作熱嗽唾結痰或吐涎沫頭目昏眩身體疼痛重語聲不出鼻清涕頭目腳膝時帶虛浮痰嗽不止痛引胸脅不問新舊並宜服之北細辛去苗半夏洗七次各一兩甘草炙烏梅去核各一兩五味子罌粟殼去蒂蓋各三兩桑白皮炒二兩右為粗散每服三錢水二盞半薑十片煎至一盞用紗帛濾滓溫服留存二服併作一服再煎桂苓白木丸出醫方大成治消痰逆上咳嗽散痞滿壅塞開堅結痛悶增進飲食調和臟腑無問寒熱嘔吐皆能開發以令遍身流濕爛燥氣液宣平而愈解酒毒療肺痿勞嗽水腫腹脹泄瀉不能為度隨證治之揀桂乾生薑各一兩茯苓去皮半夏各一兩白术陳皮去白澤瀉各半兩右為末麵糊丸如大豆大用生薑湯下二三十丸日三服病在膈上食後在下食前在中不計時一法並加黃連半兩黃蘗二兩水丸取效阿膠丸出楊氏家藏方治肺受風寒咳嗽不止痰涎併多上氣喘急睡卧不得及肺經熱咳而面赤久不已者阿膠一分炒貝母七箇炮南星一箇炮欵冬花一分紫苑知母白礬枯各一分右為末蜜和丸如菉豆大薑湯下二十丸食後服人參散止嗽御米殼二兩蜜炒黃甜葶藶烏梅肉桔梗各一兩人參甘草炒紫苑各半兩右為末每服一錢白湯調下人參飲子出醫方大成治寒熱上壅咳痰涎人參去蘆苦梗去蘆一作桔梗五味子赤茯苓白术炒各一兩枳殼麩炒甘草炙各半兩右銼散每服四錢水一盞薑五片煎至七分去渣食前溫服嗽多者加桑白皮一兩痰多者加半夏麯一兩寒暑之交氣盛人衣厚作壅忽痰盛熱此藥最妙若作感寒發其汗攻其邪必成大病此方佳處在赤茯苓能除心熱枳殼能疏肺壅故易一方有半夏一兩又云寒壅者加杏仁不去皮尖紫蘇各半兩依前煎服大抵嗽未易汗惟寒可汗恐傷津液也近效地黃煎療肺氣咳嗽補心肺令髮不白生地黃汁二升麥門冬五升生薑汁五合紫苑三分貝母欵冬花甘草炙各三兩右切以水七升煎至八分去渣却入鍋中下地黃汁麥門冬薑汁等三十沸下蜜一升煎如餳盛不津器內口含如棗許斟酌加之一方有人參三兩人參補肺散治咳嗽肺上喘半夏製陳皮知母甘草人參欵冬花各半兩御米殼一兩右為細末每服四錢水一大盞生薑五片煎至七分去渣食後溫服之治咳嗽麻黃甘草杏仁訶子木香少許青皮陳皮淨右各等分每服水二盞煎至八分卧時服玉液膏出德生堂治逺年近日咳嗽氣喘逆滿開目不卧語音不響服諸藥不效者服此人參烏梅肉五倍子五味子訶子肉玄明粉甘草各一兩右為細末臨卧食後用舌尖餂藥末如口徐徐咽下津液生嗽自愈有效前胡丸療新久咳嗽前胡六分烏梅炮二枚桔梗乾薑各二分桂心八分川椒八分炒汗右為末蜜丸如櫻桃大一丸含化稍稍咽之日食三又療晝夜不得卧咽中水雞聲欲死者療之良忌豬肉冷水生蔥又療咳嗽散出千金方細辛紫苑天雄炮石膏欵冬花鍾乳各二分右搗篩作散如大豆七聚以小竹筒吸服日二不食生魚醬醋生茝菜但食糜七日咳愈乃止若大豆七聚不知亦小益勿太多甚良罌粟神聖散出宣明論治男子婦人久新日夜咳嗽不止者御米殼一兩蜜炒烏梅肉揀人參訶子肉葶藶桑白皮各半兩右為末每服三二錢百沸湯潑臨卧調下寧肺散出儒門事親御米殼二兩蜜炒甘草乾薑當歸白礬陳皮已上各一兩右為末煎虀汁調二錢服人參補肺散出儒門事親人參麻黃去節白术防已防風各等分桑白皮倍加右㕮咀以漿水一碗煎至半碗去渣溫服每用半稱即愈白术湯出儒門事親白术甘草當歸陳皮桔梗枳殼各等分右為粗末水煎去渣溫服三五錢人參紫菀散治逺年近日咳嗽痰涎柴胡紫苑烏梅肉甘草各半兩炒人參三錢御米殼蜜浴炒二兩右為末每服二錢白湯調下蛤蚧散治咳嗽咽嗌不利蛤蚧一對雌雄全者不得有蛀水洗淨焙乾枇杷葉去毛三分柴胡去苗半兩紫苑洗淨焙乾三兩貝母去心炒一兩人參半兩鹿角膠炙三兩右為末用梨一顆去皮細切洗淨器研生絹濾自然汁於銀器內同藥半錢入梨汁慢火熬三五沸取出食後臨卧服去枕仰卧一飯時養中湯治肺胃受寒多咳嗽多痰胸滿短氣語聲不出晝夜不止飲食減少不以久逺並治之半夏炙八分罌粟殼去蒂蓋二兩半蜜炒甘草炙肉桂去皮各半兩右為細末每服一錢水一盞薑四片同煎至七分通口服不以時候九仙散出儒門事親九尖萆麻葉三錢飛過白礬三錢右用豬肉四兩薄批基盤利開摻葉三味荷葉裹文武火煨熟細嚼白湯送下後用乾食壓之止嗽丸方見本類後半夏丸儒門事親書內名止嗽散治卒咳嗽出肘後方右用梨一顆刺作十孔內川椒一粒以麵裹於熱火灰中煨令熟出停冷去椒食之治嗽方罌粟殼二兩揀乾硬不蛀者去頂蓋蒂穰火炙陳皮去白半兩右銼粗末每服三錢水一盞半入烏梅一箇煎至七分服又方出肘後方久了長咳嗽皂角一梃燒細研七錢匕食後豉湯調寧肺散出仁存方治大人小兒諸般咳嗽元胡索一兩枯礬二錢半右為末每服二錢用軟餳糖一塊和藥含化小兒一錢用蜜調亦可雌黃方出肘後方治久嗽暴嗽勞嗽右金粟丸葉子雌黃一兩研細用紙筋泥固濟小盒子一箇令乾勿令泥後將藥入盒子內水調赤石脂封盒子口更以泥封之候乾坐盒子於地上上面以未入窑瓦坯子大擁盒子令作一尖子上用炭十斤簇定頂上著火尉斗籠起令火從上漸熾後火燒三分去看瓦坯通赤則去火候冷開盒子取藥當如鏡面光明紅色乳鉢內細研湯浸蒸餅和為丸如粟米大每服三丸五丸甘草水服服後睡良久妙治咳嗽不瘥方出本草以黃明膠炙令半焦為末每服一錢匕人參末二錢匕用香豉湯大盞末八分蔥少許入銚子煎一兩沸後傾入盞遇咳嗽時呷三五口仍煎溫暖却準前咳嗽時喫之也又方出肘後方治嗽單驗右用好梨去核搗取汁一茶碗著椒四十粒煎七沸去滓即內黑餳四兩煎成膏不計時候服一茶匙細細含咽津立定杏酪湯右用杏仁一斤去皮尖新沙盆內帶水研如泥下水二大碗入銀石器內文武火煎約近八分入阿膠四兩化開以白蜜同煎用湯點如不甜加和磁盒收玉液湯保命雜方治咳嗽去痰涎利胸膈天南星炮半夏湯洗七次去滑各一兩右搗篩每服二錢水二盞生薑五片同煎七分去渣放溫食後臨卧細呷之石韋散治咳嗽石韋檳榔銼等分右為細散生薑湯調下二錢療咳方備急杏仁半斤去皮尖雙仁煮熬紫苑二兩右研杏仁取汁使盡細紫苑更煎少濃澄濾去滓內蜜使稠細細飲之立定又方療咳嗽雞子白皮十四枚熬令黃麻黃三兩去節右搗成散每服方寸匕日二食飲下之無所忌百部根方出本草治咳嗽及久肺氣以百部根火炙酒漬飲之又方出肘後方梨搗取汁一兩酥一兩蜜一兩地黃一兩右緩火煎細細含咽凡治嗽皆須待冷分喘息定方食汁熱食之反傷又方出御藥院方治咳嗽用半夏一兩湯浸七次去其涎水生薑一兩取自然汁銀石器內用文武火同熬汁盡為度每服嚼一粒食後生薑下令含化亦可治卒咳嗽不止出肘後方用白蜆殼不計多少搗研極細每服水飲調下一錢日三四服用好酒亦可白膠出肘後方治肺破出血忽嗽血不止者大驗用海犀角一大片於火上炙令焦黃色後以膠塗之又炙再塗令通透出碾為末用湯化三錢放冷服之即血止水膠是也又方出本草治一切嗽及上氣者用鯽魚頭主咳嗽燒灰為末水調服如不愈加豬肉同食天南星方出肘後方用天南星一枚大者炮令製為末每服一錢水一盞生薑三片煎至五分溫服日午臨卧各一服一方天南星一兩薑製香附子半兩微炒薑汁為丸又方出本草用鯉魚主肺咳嗽氣喘促鯉魚一頭重四兩去鱗紙裹火炮去刺研煮粥空心服之又方用鯉魚主上氣咳嗽胸膈氣喘鯉魚一頭切以膾以薑醋食之蒜虀亦得一方療腳氣破冷氣眩癖懷妊胎不安絹裹和煮羮熟後去鱗服治咳嗽用豬肉半斤酸骨煮上氣咳嗽炙末酒和三合服之日二桑白皮方出肘後方治咳嗽甚者或血殷鮮用桑白皮一斤米泔浸三日淨刮去黃皮銼細入糯米四兩焙乾一處搗為末每服米飲下二錢杏仁方出本草治咳嗽旦夕加重憎寒壯熱少喜多嗔忽進忽退靣色不潤漸漸少食其肺脈強緊浮者此藥主之用杏仁半斤去皮尖雙仁者於瓶內童子便二升浸七日了漉出去小便以暖水淘過於砂盆內研成泥别一瓷瓶中以小便三升煎之如膏量其輕重食上溫水下一錢婦人室女服之更妙加味二陳湯出德生堂治逺近日氣虛咳嗽喘逆嘔吐不得安眠甚危困者人參半夏白茯苓甘草陳皮紫苑紫蘇枳殼炒去穰桑白皮砂仁白豆蔲各一兩木香半兩右㕮咀每服四錢水一盞生薑五片棗一枚煎至八分去渣臨卧服之生薑五味子湯小品療咳五味子五合生薑八兩紫苑一兩半夏二兩洗吳茱萸一兩欵冬花半兩細辛一兩附子一枚炮茯苓四兩甘草二兩炙桂心一兩右切以水一斗煮取五升分溫三服老人可服五合忌海藻菘菜豬肉冷羊肉水餳生菜醋物生蔥半夏丸治肺氣不調咳嗽痰涎壅塞心下堅滿短氣煩悶及風壅痰實頭目昏眩咽膈不利嘔吐惡心神思昏憒心怔面熱涕唾稠粘並宜之白礬枯過十五兩半夏洗去滑薑汁一合浸一宿三升右為末生薑自然汁和丸梧桐子大每服二十丸加至三十丸食後臨卧生薑湯下酒亦可療五嗽一曰上氣嗽二曰飲嗽三曰鱢嗽四曰冷嗽五曰邪嗽出聖惠方特生礬石一兩泥包燒半日巴豆十六箇去心皮熬白搗如脂豉三百枚搗千杵右搗羅為末煉蜜和丸如豆大米飲下三丸不知增至四五丸忌野豬肉蘆笋大白丹出三因方治肺感寒熱咳嗽無度通明白礬枯成煉鍾乳寒水石煅水飛過各等分右研勻灼餅糊為丸如雞豆大每服一丸先嚼生薑胡桃各一片令細吸大陽氣和藥咽仍各茶清或溫酒送下止嗽丹皂角去皮洗右搗羅為末煉蜜為丸每服二三十丸臨卧服之立效治五嗽方出肘後方松屑銼取一分皂角二兩去皮子桂二分右搗蜜丸如梧桐子大每服十五丸小兒五丸日一二服溫脾湯治食飽而咳者甘草四兩大棗二十箇右以水五升煮取二升分三服溫之熱咽中痛而聲鳴者加乾薑一兩寧肺散一名寧神散治久新咳嗽肺氣不通漸咯膿血或壅滯不利咳嗽粘痰坐卧不安或語聲不出烏梅八錢御米殼一斤生醋炙炒右為細末每服二錢煎烏梅湯下不拘時候治諸般嗽皂角燒存性大順散川百藥煎五味子各等分右為末飴糖熬熱丸夜含化備急五嗽丸一名乾薑方治五種咳嗽一曰上氣嗽二曰飲嗽三曰鱢嗽四曰冷嗽五曰邪嗽皆因肺受風寒不宣通所致無問久新輕重以至食飲不下語聲不出坐卧不安晝夜不止面目浮腫胸脅引痛背寒氣喘並宜服之肉桂去粗皮乾薑炮皂角去皮子炙黃各等分右為細末煉蜜丸如桐子大每服十五丸溫酒或米飲下食後服乾薑須台州至好者炮皂莢去皮子取肥大無孔者桂心紫色辛辣者削去皮三物並别搗不篩各稱等分多少人意和合後更搗篩一遍煉白蜜和搜入搗一二千每服三丸稍加大如梧桐子不限食之先後嗽發即服三日劉淮南云凡人患嗽多用冷藥見此熱藥即不肯用故每施此藥多效三才丸治嗽人參天門冬去心熟乾地黃已上各等分右為細末煉蜜和丸如櫻桃大含化服之三生丸治嗽胡桃仁一兩生薑一兩去皮細切杏仁五錢去皮尖右同研為泥劑和作劑可得十三四丸臨卧爛嚼一丸數服即止療咳方棗一百二十箇去核豉一百粒桃仁一百二十箇去皮尖雙仁者熬令黃色右搗為丸如棗大含之無不瘥又方療咳麻黃二兩去節紫苑二兩貝母三兩去心右搗篩蜜和丸如杏核綿裹含稍稍咽汁盡更作日四五度又方療咳杏仁一百二十去皮尖豉一百箇熬令乾乾棗四十去核右搗如泥丸如杏含咽日七八度又方療咳爐中取鉛屑一分桂心二兩皂莢二兩去皮子尖右搗篩蜜和丸如桐子大大人米飲下十五丸小兒五丸日二服忌生蔥肘後同治咳嗽歌曰一兩清油二兩蜜半兩生薑自然汁紫苑麻黃及杏仁桔梗細辛丹漆入訶子枯礬等二錢慢火熬煎如黑漆臨卧沖服兩三匙明朝咳嗽無蹤迹人參清肺湯治肺胃虛寒咳嗽喘急胸膈噎悶脅肋脹滿迫寒短氣喜欲飲冷咽噎隱痛療肺痿勞嗽唾血腥臭乾嘔煩熱聲音不出肌肉消瘦倦怠減食坐卧不安方見喘門喘嗽類治嗽冷氣結脹卒乏氣氣下腹脹肩息以乾薑為末熱酒調一錢服一方用酒漬之萊蔔方治肺疾咳嗽用萊蔔子半升淘擇淨焙乾於銚子內炒令黃熟為末以糖丸如彈子綿裹含之治咳嗽用枇杷葉去毛煎湯服之療咳方用巴豆炮去殼勿傷肉以完者吞初日白飲服二枚二日三枚良忌野豬肉蘆笋治下氣咳除風去咽中水雞聲用杏仁一兩去皮尖及雙仁者搗碎水三升研取汁於鐺內煎以物攪勿住手候三分減二冷呷之若熱呷即令人吐故慎之連州銀坑官成方出本草治嗽氣嗽久者主之用生訶梨勒一枚含之咽汁口爽不知食味亦煎檳榔湯一碗服之立便有味人參潤肺散治咳嗽喘急痰壅鼻塞方見下本咳嗽失聲類潤肺湯杏霜湯調肺氣利胸膈治咳嗽止痰逆粟米炒一斗六升甘草炒十六斤鹽炒十六斤杏仁去皮尖麩炒另研十斤右為末每服一錢沸湯點服不拘時常服恱澤顔色光潤皮膚貝母散出危氏方治熱嗽辰時喫酉時可安兼治痰喘知母新瓦上焙貝母巴豆七粒同貝母炒略熟去巴豆不用各一兩右銼餳糖一塊同煎服一方以二母為末入巴豆霜少許臨卧用生薑二片蘸葉莢定細嚼咽下一方知母貝母末白糖和勻飯上蒸七次丸梧桐子大江米湯下十丸或加葶藶五倍子或二母隔紙炒加棗肉砂糖杏仁丸如彈子大新綿包含化青州白丸子治嗽大半夏一兩湯洗十次白附子一兩洗淨略炒川烏梅一兩略炮去皮核天南星一兩洗淨略炮右為末生薑自然汁煮糊為丸梧桐子大每服十丸至二十丸食後茶清或熟水下如癱瘓風溫酒下日進三服永無風痰膈痰小兒驚風薄荷湯化下二丸國初青州謝家有老人遊山見兩人對奕老人旁觀久之奕者曰汝飢否曰然遂指桃樹曰汝食此老人摘一顆食已腹飽少頃欲歸奕人曰汝家已更兩世今遂還家子孫亦不能識其為我守門若有變怪則不可開奕人遽起不見良久但聞絲竹之聲疊疊而來老人開户視之則奕人已對坐於門外曰吾固戒汝不得開不從吾言是無分也今有數方授汝歸使子孫售於世可以致富遂將老人推出墮於老人之宅子孫驚怪奔告鄰里里人曰汝家八十年前大父入山尋不見即此老人是也子孫方信以方鬻之果為潤屋至仁宗時有旨令其家上白丸子方其家深恐問藥不便於至尊服食遂易之以進其後子孫有為房陵宰者親與畨陽余童端學言其事且傳真方余時職教房陵辛丑歲中秋王少餘以郡檄至傳其所聞因筆之余得之今浙漕葉景夏服之果異於常者三妙湯出家藏經驗方治嗽罌粟殼大者四箇烏梅二枚炮北棗二枚右銀石器中用水兩大盞煎一半候熟入少餳臨睡隨意熱溫冷飲數兩卧少去嗽止武昌趙都統傳其家屢服得效欵肺散治嗽大半夏大杏仁各三十六箇右以乾鍋子內燒存性為末每服半錢至一錢溫米飲調下不拘時候服之三竒湯出海上方治咳嗽烏梅三箇拍碎白餳兩塊米囊皮三箇去囊蜜炙為粗末右三味以虀汁大半盞煎去滓臨卧服煮浮丸出胡氏方治咳嗽不止半夏二兩飛羅麵杏仁半兩右搗羅細末以生薑自然汁丸如梧桐子大每服四五十丸以水一盞煮藥丸子浮用藥湯候溫旋呷吞下時入少蜜葶藶散出楊氏家傳方治咳嗽痰涎喘氣葶藶半兩半夏生薑汁浸切作片子半兩巴豆四十九粒去皮同上二味一處炒候半夏黃為度右件除巴豆不用只用上二味為末每服一錢以生薑汁蜜少許同調下食後立安散出楊氏家藏方治一切咳嗽喘急坐卧不寧麻黃九兩不去節炒焦黃石膏半兩生用罌粟殼一兩蜜炙苦葶藶半兩微炒藿香葉半兩人參去蘆頭一兩右件為細末每服三錢白湯調下食後臨卧服平肺散出楊氏藏方治咳嗽上喘知母半夏洗七次杏仁去皮尖炒麻黃去節阿膠乾粉炒貝母各一兩桑葉欵冬花甘草炙各半兩右件每服三錢水一盞半生薑五片同煎至八方去滓分溫服食後虀汁湯治嗽并酒食所傷杏仁七粒去皮尖巴豆一粒去皮膜硃砂少許右件一處研成膏如黃米大每服七丸淡虀汁下臨卧小兒服一丸如酒積溫酒送下杏蘇飲子治咳嗽聲重胸滿氣喘面目虛浮鼻塞清涕肢節痠疼及腳氣發動腳腫腳逆疼痛寒熱並宜服之紫蘇葉四兩半五味子去梗大腹皮烏梅肉三味三兩杏仁二兩四錢去皮尖陳橘皮去白一兩八錢覆盆子一兩八錢桑白皮一兩半麻黃去根節一兩半右件㕮咀每服三錢水一盞生薑三片黑豆三七粒同煎至七分去渣熱服食後臨卧皂莢煎余居士選竒方治嗽神驗皂莢一斤揉細用湯一碗熬成濃汁杏仁二百四十粒天南星二兩半夏二兩右用文武火煮乾取南星半夏切作片子用生薑汁摻焙乾次用青州白丸子五貼白糖五塊烏梅肉二十箇隔宿蒸餅半箇虀汁半盞打糊為丸如梧桐子大每服三十丸臨卧生薑湯睡時枕頭放高溫肺湯治嗽一服安阿膠半兩炙生薑十片烏梅二箇甘草一寸紫蘇半兩杏仁七箇粟殼一箇淨大半夏三箇五味子十五箇右以水一盞煎六分任意服卧時尤佳九仙散出衛生寶鑑治一切咳嗽桑皮人參桔梗阿膠五味子烏梅欵冬花已上各一兩米殼八兩去頂蒂蜜炒黃右為細末每服三錢白湯點服嗽住後服人參蛤蚧散欵冬花清肺散出衛生寶鑑治咳嗽喘促胸膈不利不得安卧人參一兩去蘆甜葶藶一兩生用枯白礬一兩烏梅和核碎搗用一兩米殼醋炒四兩欵冬花一兩右為細末每服一錢溫米湯調服食後忌油膩物及多言損氣安肺散出衛生寶鑑治咳嗽無問新久麻黃不去節二兩米殼四兩去頂蒂炒黃色甘草一兩右為末每服三錢水一盞烏梅一箇煎七分臨卧溫服椒紅丸華陀中藏經方治嗽不止及補中益氣進食川椒揀淨二兩去目炒過出汗乾山藥一兩川附子一兩炮去皮臍右同為細末以好酒煮淡木瓜和之再入臼中杵三五百下如梧桐子大每服十五二十丸空心食前鹽湯下泄瀉米飲下如喉中痰涎如水雞聲曉夕不止者一二服見效靈應散出衛生家寶方治一切咳嗽不問久新輕重鍾乳粉欵冬花枯白礬各一兩甘草半兩炙輕粉一錢桂六分右件為細末入鍾乳粉輕粉同研令勻每半錢用匙挑入喉中咽津隨用茶清壓下每日臨卧只一服小兒或以糖少許和服五味子丸出衛生家寶方治嗽大罌粟殼去穰四兩劈破用白餳少許入水將殼浴過令淨炒黃色五味子新鮮者去梗二兩北方者為妙右為細末拌勻用白餳為丸如彈子大每服一丸水一盞撥破煎六分澄清臨卧溫服不拘時候調肺散治嗽不問新舊立效麻黃二錢不去節甘草二錢生用杏仁二錢不去皮尖燈心十尺長湖南蚌粉一塊如彈子大右為銼散入瓷瓶內用水一大碗煮至小半碗候五更初再溫過去滓作一服滓再煎一服經年嗽者一二服止聖棗子治老少人諸般嗽疾悉皆治之佛耳草天南星半夏甘草欵冬花鍾乳粉各二兩桂半兩去粗皮井泉石半兩研極碎如粉右為末內用天南星半夏生薑汁製成餅子炙黃次入六味用好皂角去黑皮炙捶碎用虀汁浸一宿汁膏子和藥捻棗核大服時用好棗一枚去核入藥在內濕紙裹文武火煨香為度臨卧時糯米飲嚼下無比飲子治一切咳嗽神效罌粟殼四兩去中穰蒂子杏仁一兩去皮尖山梔二兩去仁用殼五味子半兩生用阿膠半兩麩炒甘草半兩炙黃色右為粗末每服二錢用水一大盞入生薑二片煎至六分去渣溫服肺傷湯治逺近一切嗽疾渾身勞倦脅下疼時作潮熱飲食減少五味子一兩紫苑一兩熟地黃二兩阿膠二兩炒人參半兩杏仁一兩炒去皮尖黃耆一兩蜜炙川當歸二兩桑白皮一兩炒甘草一兩炙欵冬花一兩桂一分枳殼半兩去皮穰炒乾薑一兩半炮青蒿一兩小便浸黃芩半兩右為末每服三錢水一鍾入生薑三片烏梅棗子各一枚煎七分去渣空心一日三服紫蘇散治咳嗽紫蘇貝母欵冬花漢防已各一分右四味為細末每服一錢水一大碗煎七分溫服人參欵冬膏多年咳嗽變為瘕去節麻黃桔梗加粉草杏仁葶藶炒知母貝母欵冬花人參烏梅各等分搗羅為細莫教差煉蜜為丸如彈子含花一瓦去根芽治一種咳嗽直至頓吐飲食痰物俱出盡方少定此乃是肝木尅脾土風痰壅盛宜以青州白丸子作主料更加少木香丁香橘紅天麻全蝎去毒足殭蠶炒去嘴足等分同為散子大料煎服即效出詹療方咳逆方萊蔔子熱湯泡研取汁調木香調氣散乘熱服半夏湯出朱氏集驗方治嗽半夏二十箇每箇作四塊煨生薑二塊煨甘草一寸煨皂角一寸煨蟲蛀者去皮右為粗末水一碗煎半碗服海藻散治嗽胸中不利痞滿短氣心中時悸手足煩不飲食時惡寒海藻赤茯苓五味子各半兩半夏細辛杏仁各三錢半右㕮咀生薑煎食後服甚妙五味子湯出直指方治汗後氣閉咳嗽五味子半兩生薑一錢棗子五枚麥門冬人參杏仁陳皮各二錢右銼每服二錢水二鍾煎至一鍾服華蓋散出王氏博濟方治咳嗽麻黃二兩不去節甘草一兩炙杏仁二兩湯浸去皮尖後稱右先以二味為粗末後入杏仁研細拌勻每服三錢水一鍾煎七分去渣日三服橘參散出入宜方一名橘皮湯治咳嗽橘皮製二兩人參甘草炙半兩右㕮咀薑棗竹茹煎不拘時候溫服杏蜜湯出楊氏家藏方治停飲咳嗽開胃思食大醒酒快膈半夏三兩湯洗淨再用湯一碗入白礬末一錢同半夏浸一宿焙乾杏仁六兩湯淨去皮尖炒令黃甘草四兩炙白礬六兩炒訶子八枚煨去核生薑一斤四兩去皮切作片子焙乾右為細末入鹽和勻每用二錢入蜜半匙沸湯點下鍾乳丸出十便良方治肺虛寒嗽不已宜服此方鍾乳粉三兩人參白术乾薑甘草各二兩欵冬花紫苑各一兩右搗羅為細末煉蜜和丸如彈子大每服一丸含化人參丸出衛生家寶方治肺壅嗽有痰寒熱涕腥宜服人參半兩枳殼半兩二味用皂角水浸三日焙乾半夏半兩南星半兩二味白礬水浸三日令乾為細末生薑汁捻成餅子炙乾入藥訶梨勒半兩用麩炒去核木香一分右為細末煉蜜和丸如梧桐子大每服二十丸食後用生薑湯吞下百花湯出十便良方治肺不順逆咳嗽氣胸膈不利杏仁四兩生薑四兩研取汁同杏仁研細白蜜半兩右同攪拌勻以磁器蒸熟栁木匙撈候成膏每一服湯點一匙甚妙八味杏蘇散治肺感風寒咳嗽不已痰涎咳滿語聲不利面目浮腫肺氣不順紫蘇葉半夏麴紫苑陳橘皮五味子甘草半兩杏仁一兩桑白皮一兩半右搗羅為粗末每服四錢以水一盞生薑四片同煎七分去渣食後服蛤蚧丸治肺臟內傷咳嗽氣急久積不除漸加羸瘦蛤蚧一雙炙去口足訶子煨去核阿膠蛤蚧粉炒成珠子熟乾地黃洗焙麥門冬去心細辛去葉土甘草炙已上六味各等分右為末煉蜜和丸每一兩作十丸每服一丸食後含化治肺胃俱虛咳嗽涎沫間血絲不能食四味理中湯濃煎北五味子湯調下五味止嗽斂隂降氣故虛損若用補肺藥及傷脾胃不和乾薑等助肺使土旺生金肺氣安妥也出淡療方鳳隨湯出楊氏家藏方治肺療咳嗽松子仁胡桃肉湯浸去皮炙三兩蜜半兩煉右先研爛次入蜜和勻每服一錢沸湯點服潤肺散出本草治肺虛咳嗽阿膠杏仁各一兩糯米五合炒右搗羅為細末每服一錢不計時候白湯調下七聖散治肺氣虛寒咳嗽漸成勞證者成煉鍾乳粉别研欵冬花佛耳草肉桂去粗皮四味各半兩白礬三錢煅過甘草三錢炙右為末每服半錢炙分七處用蘆葦管逐一吸之溫白湯送下食後如聖飲子治肺氣虛寒咳嗽喘急人參去蘆一兩欵冬花一兩烏梅一兩搗碎罌粟殼去穰二兩炙右㕮咀每服五錢水二鍾煎一鍾去渣臨卧熱服細辛五味子湯治肺受風邪胸膈停寒頭目昏暈鼻塞聲重咳嗽嘔噦心腹痞滿脅下刺痛五味子二兩炒細辛去葉土二兩陳橘皮去白二兩高良薑一兩銼炒甘草一兩銼炒右㕮咀每服三錢水一鍾煎至七分去渣熱服不拘時候煨薑湯出十便良方治肺寒咳嗽日久不止生薑一斤半於火星內熱切片杏仁半斤去皮尖蒸過甘草四兩末山藥二兩末神麯三兩末右先將生薑杏仁同研細取三件藥末和為餅子焙乾為細末著炒鹽花五兩滚和沸湯食後臨卧點三錢神草湯出楊氏家藏方治肺與大腹俱受寒冷咳嗽喘急不進飲食大便泄痢時作寒熱人參去蘆頭白术白茯苓去皮各一兩當歸去蘆頭切酒浸一宿焙乾一兩半黃耆二兩細辛去葉土一兩五味子二兩乾薑一兩炮陳橘皮去白肉桂去粗皮一兩半白芍藥一兩桑白皮八錢研甘草八錢炙右㕮咀每服五錢水一鍾入生薑三片烏梅一枚同煎至八分去滓溫服不拘時候紫苑散出楊氏家藏方治肺感寒邪咳嗽不止風壅相摶頭疼聲重紫苑茸二桑葉人參去蘆甘草炙各半兩杏仁去皮尖麩炒别研細桔梗去蘆微炒各一兩麻黃去根節湯煮三兩焙乾稱三分右件每服五錢水一鍾半煎至八分去渣溫服食後麻黃散出楊氏家藏方治肺感寒邪暴生咳嗽涎痰上喘阿膠蛤粉炒皂角去皮尖令黃色杏仁去皮尖炒甘草炙麻黃去節等分右為細末每服二錢臨卧時用白湯調下治肺痿咳嗽吐涎沫心中溫溫咽燥而不渴者生薑五兩人參二兩甘草二兩大棗十二枚右以水三升煮取一升半分再服又方出肘後方用甘草二兩水三升煮取一升半分再服又方出肘後方用生天門冬搗取汁一斗酒一斗飴一升紫苑四合銅器於湯上煎可丸服如杏子大一丸日可三服又方出肘後方治肺痿咳嗽吐涎沫心中溫溫咽燥而不渴者方見本類煎溫脾湯麻黃蒼术湯治秋冬每夜五更嗽連聲不絶乃至天晚日高方緩口脅下痛心下痞悶卧而擎筋肢節痛唾涎沫日晚神昏呵欠全不進飲食柴胡根半錢麻黃八錢羌活根五分防風四分生甘草根五分甘草三分當歸稍四分草豆蔲六分黃芩三分黃耆一錢半蒼术五錢五味子九箇右㕮咀作二服煎法如常稍熱服臨卧主咳嗽痰飲出本草以枕柴煮汁服之治咳嗽出本草以獺肺燒灰酒調服之一方用獺肉燒灰為末酒服治嗽出本草以棎果熟者和蜜食之主消食止咳嗽虛羸悅人出本草以無漏子久服無損也治瘦病咳嗽出本草以豚膽和小便生薑橘皮訶梨勒桃皮煮服治嗽補肺丸出本草用大杏仁二升小者不用揀却雙仁及陳臭者以童子小便一升浸之春夏七日秋冬二七日并皮尖於砂盆子中研細濾取汁煮令魚眼沸候軟取麵糊去皮仍時以栁箆攪令著底後即以馬尾羅或粗布下之入暴通丸服之時食前後總須服三十丸任意茶酒下忌白酒粥只用米泔飲自初浸至成常以紙蓋之以畏塵土也如無馬尾羅即以粗布袋下之治咳嗽用田瓜蒂不限多少細研為末壯年一字已下老年去半早晨井花水下食頃含沙蜜一塊良久涎如水至半年有老痰一塊吐出布在水上如鹼倘吐多困甚即咽麝香湯一盞立止矣麝香細研溫水調下此藥大吐不逆只出涎水甚效普濟方卷一百五十七
