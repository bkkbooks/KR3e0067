body:
  text: 普濟方卷一百三十明周王朱橚撰傷寒門傷寒一日候論夫傷寒一日太陽受病太陽者膀胱之經也為三陽之首故先受病其脈絡於腰脊主於頭項故得病一日而頭項腰脊痛也傷寒一二日發熱惡寒頭痛腰脊強尺寸􅎃俱浮此是太陽膀胱經之病也太陽病頭痛發熱汗出惡風宜桂枝湯輕者只宜柴胡桂枝湯太陽病頭痛發熱無汗惡風宜麻黃湯輕者只桂枝麻黃各半湯麻黃湯桂枝湯二者均為解散症分隂陽不可不慎也仲景初謂無汗不得服桂枝有汗不得服麻黃常須識此勿令誤也今人才見身熱頭疼便發汗不知汗空閉而用麻黃汗空疏而用桂枝湯傷寒傷風其治不同故人有無汗者可發汗方桂枝湯出聖惠方治傷寒一日太陽受病頭痛項強壯熱惡寒桂枝附子炮製去皮臍乾薑炮製銼甘草炙微赤銼已上各半兩麻黃二兩去根節右為散每服四錢水一中盞入蔥白二莖煎至六分去滓不計時候稍熱服如人行五里以稀蔥粥投之衣蓋取汗如未汗一依前法再服麻黃散出聖惠方治傷寒一日頭痛身體百節酸疼惡寒宜服麻黃一兩去根節桂心三分甘草半兩炙微赤銼芎藭一兩杏仁三分湯浸去皮尖用麩炒微黃附子三分炮製去皮臍赤芍藥三分白术三分右為散每服四錢水一中盞入生薑半分大棗三枚煎至六分去滓不計時候稍熱服如人行五六里再服厚覆取汗解肌湯出聖惠方治傷寒初患一日體熱頭痛麻黃一兩去根節甘草一分亦作一分半炙微赤銼赤芍藥半兩葛根一兩半銼石膏半兩桂心三兩去粗皮杏仁半兩湯浸去皮尖雙仁麩炒微黃右為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱頻服衣蓋以汗出為效一方不用棗細辛散出聖惠方治傷寒初得一日壯熱頭目四肢疼痛細辛一兩赤芍藥一兩桂心三分乾薑半兩炮製銼附子半兩炮製去度臍甘草半兩炙微赤銼右為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候熱服良久吃蔥粥投之衣蓋出汗治傷寒一日脈弦而數頭項腰脊痛身熱煩滿不得睡卧出聖惠方麻黃一兩去根節乾薑炮製半兩銼石膏一兩右為散每服五錢以水一大盞入䜴半合蔥白二莖煎五分去滓不計時候稍熱頻服衣蓋出汗桔梗散出聖惠方治傷寒一日壯熱頭痛惡寒桔梗二兩去蘆頭細辛半兩川烏頭一兩炮製去皮臍麻黃半兩去皮臍根節白术半兩防風半兩去蘆頭桂心一兩乾薑半兩炮製銼吳茱萸一分湯浸七遍焙乾微炒右搗細羅為散每服不計時候以溫酒調下二錢衣蓋出汗如未出汗即再服之人參散出聖惠方治傷寒一日頭痛壯熱煩悶其脈洪數宜服人參半兩去蘆頭桂心三分赤芍藥半兩白术半兩乾薑半兩炮製銼麻黃三分去根節甘草一分炙微赤銼右為散每服四錢水一中盞煎至六分去滓不計時候溫服併四五服汗出效石膏飲子出聖惠方治傷寒一日頭痛壯熱心神煩悶石膏一兩搗碎柴胡半兩去苖䜴一合微炒麻黃一兩去根節蔥白二莖薄荷一分右細銼都以水二大盞煎至一盞三分去滓不計時候稍熱分為三服如人行三二里相續服盡厚蓋取汗解肌湯出聖惠方治傷寒一日邪氣毒在皮膚肌肉宜服麻黃半兩去根節桑根白皮半兩銼赤芍藥一分梔子仁一分前胡一分去蘆頭甘草一分炙微赤銼桂心一分杏仁一分湯浸去皮尖雙仁麩炒微黃右為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候稍熱頻服以厚衣蓋出汗前胡散出聖惠方治傷寒初覺頭痛膈上痰壅宜服前胡一兩去蘆頭人參一兩去蘆頭細辛半兩桂心一兩陳橘皮一兩半湯浸去白瓤焙赤茯苓一兩附子二兩炮製去皮臍訶梨勒一兩半用皮甘草一分炙微赤銼右為散每服五錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服麻黃散出聖惠方治傷寒初覺一日頭項腰脊痛惡寒麻黃半兩去根節乾薑半兩炮製蔥白三莖䜴一合右細銼為散以水二盞煎至一盞三分去滓不計時候稍熱分為三服衣蓋出汗治傷寒初得一日壯熱頭項腰腳疼痛宜服出聖惠方麻黃一兩半去根節葛根一兩銼赤芍藥三分柴胡一兩去苗桂心三分石膏一兩右為散每服五錢水一大盞入䜴半合椒二七粒蔥白二莖薄荷二十葉煎至六分去滓不計時候稍熱服藥後喫蔥䜴粥投之以衣蓋出汗治傷寒初覺增寒壯熱頭痛口苦宜服出聖惠方桂心一兩赤芍藥一兩甘草三分炙微赤銼右為散每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候稍熱服須臾喫蔥豉粥投之衣蓋取汗未汗即再服知母散出聖惠方治傷寒一日頭痛項強上連風府壯熱增寒體痛口苦宜服知母一分麻黃半兩去根節乾薑半兩炮製蔥白四莖䜴半合右細銼和均分為二服水一大盞煎至五分去滓不計時候稍熱服之衣蓋取汗未汗即再服葛根湯出聖惠方治傷寒一日初覺頭痛惡寒壯熱腹內熱脈洪大葛根一兩一作半兩蔥白五莖豉一合柴胡半兩去苖生薑一兩黃芩半兩右都細銼水三大盞煎至一盞五分去滓不計時候稍熱分為三服如人行五里再服衣蓋取汗又方出聖惠方麻黃一兩去根節附子半兩炮製去皮臍銼生薑半兩切片蔥白五莖切䜴一合右都細銼以水二大盞煎至一盞三分去滓不計時候稍熱分為三服如人行五里再服衣蓋取汗神丹丸出聖惠方治傷寒一日頭痛遍身壯熱時時惡寒宜服發汗人參一兩去蘆頭川烏頭一兩炮製去皮臍半夏三分湯洗七遍去滑赤茯苓一兩硃砂半兩細研水飛過右為末煉蜜和搗百餘杵丸如梧桐子大每服不計時候以生薑湯下十丸良久喫蔥䜴粥投之衣覆取汗未汗再服附子湯出聖惠方治傷寒一日壯熱頭痛其背惡寒者宜服附子一兩炮製去皮臍赤茯苓半兩赤芍藥半兩人參半兩去蘆頭白术半兩桂心半兩右為散每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服治傷寒一日頭痛先宜煎蒴􅀢湯淋背發汗出聖惠方蒴􅀢五兩槐枝三兩栁枝四兩桃枝三兩構葉四兩䜴一升蔥白十莖右細銼以水三斗煎取二斗去滓放無風處看冷暖淋背訖便喫蔥豉粥了以衣蓋出汗蔥豉湯出聖惠方治傷寒初得一日壯熱頭痛宜服蔥白三莖切麻黃一兩去根節銼䜴一合生薑半兩碎右以水二大盞煎至一大盞三分去滓不計時候稍熱分為三服頻服衣覆出汗治傷寒一日服蔥豉湯不得汗宜服出聖惠方葛根一兩銼蔥白三莖切䜴一合右都以水二大盞生薑半兩同煎至一盞三分去滓不計時候稍熱分為三服頻服衣蓋取汗青膏方出聖惠方治傷寒初得一日在皮膚頭痛項強四肢煩疼宜用當歸三兩川椒三兩去目及閉口者芎藭三兩吳茱萸三兩白芷三兩附子三兩去皮臍生用川烏頭三兩去皮臍生用莽草二兩右細銼以醇酒浸之良久漉出以鍊成豬脂四斤煎至藥色黃絞去滓不計時候以溫酒服如生棗大日三服稍稍增之若頭項強即摩之黃膏方出聖惠方治傷寒一日赤色頭痛頸項強直賊風所中宜用川大黃半兩附子半兩去皮臍生用細辛半兩乾薑半兩川椒半兩去目及閉口者桂心半兩巴豆二十一粒去皮心右細銼以醋浸一宿漉出以臘月豬脂一斤煎之附子黃色即止濾出滓瓷合中盛之傷寒赤色發熱酒服一丸如梧桐子大又以摩身數百遍兼治賊風及毒風走注肌膚之間隨風所在摩之甚良白膏方出聖惠方治傷寒一日赤色惡寒肢節疼痛并療惡瘡小兒頭瘡牛頭馬鞍瘡癰腫摩之皆差宜用天雄三兩去皮臍生用川烏三兩去皮臍生用莽草三兩躑躅花三兩右以酒三升浸一宿漉出用鍊了豬脂三斤與藥一處於銅器中文火煎令諸藥燋黃色即成膏去滓以瓷器中盛有患者摩之百遍即藥力行如傷寒咽痛含如棗核大日三咽之差其膏不可近日治傷寒一日至三日應汗者服此湯葛根半兩烏梅十四枚蔥白一握䜴一升綿裏右切水九升煮取三升分為三服初一服便厚覆取汗出粉之治暴傷寒出本草以荆芥䜴汁煎服之治傷寒二日候論夫傷寒二日陽明受病陽明者胃之經也主於肌肉其脈絡於鼻入於目故得病二日肉熱鼻乾不得眠也諸經在表表始受病在於皮膚之間故可摩膏火灸發汗而愈也傷寒二三日身熱目痛鼻乾不得卧尺寸脈俱長皆是陽明胃經受病也傷寒二日陽明經受病可發其汗非正陽明也正陽明者身熱汗出不惡寒反惡熱故可下也今言一二日傳陽明經身熱日疼鼻乾不得卧其脈俱長者是太陽陽明可表而已若無汗尚惡寒宦升麻湯有汗惡寒者表未解也宜桂枝湯無汗脈出其人喘者與麻黃湯少又問十二經皆一而陽明有三何也有太陽陽明有陽陽明有正陽陽明也太陽陽明者本太陽病若發汗下後復利小便此亡津液胃中乾燥因本傳屬陽明也太陽陽明脾約是也大便堅小便少其脾為約少陽陽明者本轉到少陽因發汗利小便已胃燥實大便難也正陽陽明者病人本風盛氣實也三陽明宜下唯惡寒中寒病在胃經與太陽合病屬表可發其汗蓋太陽與陽明合為脈必浮大而長外證必頭痛腰疼肌熱目痛鼻乾也脈浮大者太陽也長者陽明也頭疼腰痛者太陽也肌熱目痛鼻乾者陽明也尚惡寒者可升麻湯汗之若不惡寒反惡熱大便不祕者白薇散解之不惡寒反惡熱大便閉或譫語者屬胃家氣也可調胃承氣湯下之痛又問二陽有合病有併病何也脈浮大而長頭疼腰肌熱目疼鼻乾者合病也太陽初得病時發其汗汗先出不徹轉屬陽明續自微汗出不惡寒者併病也三陽皆有合病唯三隂無合病不可不知也太陽證罷但發出熱手足漐漐汗出大便難而譫語者下之愈宜大承氣湯若太陽證不罷不可下宜用桂枝麻黃各半湯小發汗設靣赤色陽氣怫鬱在表當解之熏之若發汗不大徹陽氣怫鬱不得越散當汗不汗煩躁不知痛處其人短氣但坐此者汗出不徹故也更以麻黃發其汗則愈何以知汗出不徹以脈澀故知之方桂枝附子湯出聖惠方治傷寒二日陽明受病陽明者主於肌肉其氣如寒熱往來鼻乾不得眠卧面赤身熱有此病證宜服桂枝一兩附子一兩炮製去皮臍甘草半兩炙微赤銼赤芍藥半兩右為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服汗出即愈人參湯出聖惠方治傷寒二日頭痛鼻乾面赤壯熱四肢煩疼人參三分去蘆頭訶梨勒皮三分乾薑一方炮製銼桂枝三分赤茯苓一分附子三分炮製銼去皮臍甘草一分炙微赤銼右搗篩為散每服三錢水一中盞煎至六分去滓不計時候溫服頻服之汗出差麻黃湯出聖惠方治傷寒二日頭痛發熱煩悶宜服麻黃一兩去根節桂心三分石膏三分黃芩半兩甘草一分炙微赤銼芍藥半兩一方赤芍藥杏仁二十一枚湯浸去皮尖雙仁麩炒微黃右為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候稍熱頻服汗出愈解肌湯出聖惠方治傷寒二日頭痛壯熱骨節煩疼宜服甘薑二兩炮製麻黃一兩去根節赤芍藥三分黃芩三分石膏一兩右為散每服五錢水一大盞入蔥白二莖䜴半合煎至五分去滓不計時候稍熱服如人行三里再服汗出差吳茱萸散出聖惠方治傷寒二日皮膚頭痛項強四肢煩疼宜服吳茱茰一兩湯洗七遍焙乾微炒當歸一兩微炒銼芎藭一兩附子一兩炮製去皮臍白芷一兩炮製去皮臍川烏頭一兩炮製去皮麻黃一兩去根節川椒一兩去目及閉口者微炒出汗右為散每服五錢水一大盞入生薑半分棗三枚煎至七分去滓不計時候稍熱分為二服頻服以衣覆取汗即差荆芥湯出聖惠方治傷寒二日頭項強四肢煩疼荆芥一兩附子一兩炮製去皮臍前