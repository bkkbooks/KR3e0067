body:
  text: 普濟方卷一百三十明周王朱橚撰傷寒門傷寒一日候論夫傷寒一日太陽受病太陽者膀胱之經也為三陽之首故先受病其脈絡於腰脊主於頭項故得病一日而頭項腰脊痛也傷寒一二日發熱惡寒頭痛腰脊强尺寸􅎃俱浮此是太陽膀胱經之病也太陽病頭痛發熱汗出惡風宜桂枝湯輕者只宜柴胡桂枝湯太陽病頭痛發熱無汗惡風宜麻黄湯輕者只桂枝麻黄各半湯麻黄湯桂枝湯二者均為解散症分隂陽不可不慎也仲景初謂無汗不得服桂枝有汗不得服麻黄常須識此勿令悞也今人纔見身熱頭疼便發汗不知汗空閉而用麻黄汗空疎而用桂枝湯傷寒傷風其治不同故人有無汗者可發汗方桂枝湯出聖恵方治傷寒一日太陽受病頭痛項强壮熱惡寒桂枝附子炮製去皮臍乾薑炮製剉甘草炙微赤剉已上各半兩麻黄二兩去根節右為㪚每服四錢水一中盞入葱白二莖煎至六分去滓不計時候稍熱服如人行五里以稀葱粥投之衣盖取汗如未汗一依前法再服麻黄㪚出聖恵方治傷寒一日頭痛身體百節酸疼惡寒宜服麻黄一兩去根節桂心三分甘草半兩炙微赤剉芎藭一兩杏仁三分湯浸去皮尖用麩炒微黄附子三分炮製去皮臍赤芍藥三分白术三分右為㪚每服四錢水一中盞入生薑半分大棗三枚煎至六分去滓不計時候稍熱服如人行五六里再服厚覆取汗解肌湯出聖恵方治傷寒初患一日體熱頭痛麻黄一兩去根節甘草一分亦作一分半炙微赤剉赤芍藥半兩葛根一兩半剉石膏半兩桂心三兩去粗皮杏仁半兩湯浸去皮尖雙仁麩炒微黄右為㪚每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱頻服衣盖以汗出為効一方不用棗細辛㪚出聖恵方治傷寒初得一日壮熱頭目四肢疼痛細辛一兩赤芍藥一兩桂心三分乾薑半兩炮製剉附子半兩炮製去度臍甘草半兩炙微赤剉右為㪚每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候熱服良久吃葱粥投之衣盖出汗治傷寒一日脈弦而數頭項腰脊痛身熱煩滿不得睡卧出聖恵方麻黃一兩去根節乾薑炮製半兩剉石膏一兩右為㪚每服五錢以水一大盞入䜴半合葱白二莖煎五分去滓不計時候稍熱頻服衣盖出汗桔梗㪚出聖恵方治傷寒一日壮熱頭痛惡寒桔梗二兩去蘆頭細辛半兩川烏頭一兩炮製去皮臍麻黄半兩去皮臍根節白术半兩防風半兩去蘆頭桂心一兩乾薑半兩炮製剉呉茱萸一分湯浸七遍焙乾微炒右搗細羅為㪚每服不計時候以温酒調下二錢衣盖出汗如未出汗即再服之人參㪚出聖恵方治傷寒一日頭痛壮熱煩悶其脈洪數宜服人參半兩去蘆頭桂心三分赤芍藥半兩白术半兩乾薑半兩炮製剉麻黄三分去根節甘草一分炙微赤剉右為㪚每服四錢水一中盞煎至六分去滓不計時候温服併四五服汗出效石膏飲子出聖恵方治傷寒一日頭痛壮熱心神煩悶石膏一兩𢷬碎柴胡半兩去苖䜴一合微炒麻黄一兩去根節葱白二莖薄荷一分右細剉都以水二大盞煎至一盞三分去滓不計時候稍熱分為三服如人行三二里相續服盡厚盖取汗解肌湯出聖恵方治傷寒一日邪氣毒在皮膚肌肉宜服麻黄半兩去根節桑根白皮半兩剉赤芍藥一分梔子仁一分前胡一分去蘆頭甘草一分炙微赤剉桂心一分杏仁一分湯浸去皮尖䨇仁麩炒微黄右為㪚每服五錢以水一大盞入生薑半分煎至五分去滓不計時候稍熱頻服以厚衣盖出汗前胡㪚出聖恵方治傷寒初覺頭痛膈上痰壅宜服前胡一兩去蘆頭人參一兩去蘆頭細辛半兩桂心一兩陳橘皮一兩半湯浸去白瓤焙赤茯苓一兩附子二兩炮製去皮臍訶棃勒一兩半用皮甘草一分炙微赤剉右為㪚每服五錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候温服麻黄㪚出聖恵方治傷寒初覺一日頭項腰脊痛惡寒麻黄半兩去根節乾薑半兩炮製葱白三莖䜴一合右細剉為散以水二盞煎至一盞三分去滓不計時候稍熱分為三服衣盖出汗治傷寒初得一日壮熱頭項腰脚疼痛宜服出聖恵方麻黄一兩半去根節葛根一兩剉赤芍藥三分柴胡一兩去苗桂心三分石膏一兩右為㪚每服五錢水一大盞入䜴半合椒二七粒葱白二莖薄荷二十葉煎至六分去滓不計時候稍熱服藥後喫葱䜴粥投之以衣盖出汗治傷寒初覺増寒壯熱頭痛口苦宜服出聖恵方桂心一兩赤芍藥一兩甘草三分炙微赤剉右為㪚每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候稍熱服須㬰喫葱豉粥投之衣盖取汗未汗即再服知母㪚出聖恵方治傷寒一日頭痛項强上連風府壮熱増寒體痛口苦宜服知母一分麻黄半兩去根節乾薑半兩炮製葱白四莖䜴半合右細剉和均分為二服水一大盞煎至五分去滓不計時候稍熱服之衣盖取汗未汗即再服葛根湯出聖恵方治傷寒一日初覺頭痛惡寒壮熱腹内熱脈洪大葛根一兩一作半兩葱白五莖豉一合柴胡半兩去苖生薑一兩黄芩半兩右都細剉水三大盞煎至一盞五分去滓不計時候稍熱分為三服如人行五里再服衣盖取汗又方出聖恵方麻黄一兩去根節附子半兩炮製去皮臍剉生薑半兩切片葱白五莖切䜴一合右都細剉以水二大盞煎至一盞三分去滓不計時候稍熱分為三服如人行五里再服衣盖取汗神丹丸出聖恵方治傷寒一日頭痛遍身壮熱時時惡寒宜服發汗人參一兩去蘆頭川烏頭一兩炮製去皮臍半夏三分湯洗七遍去滑赤茯苓一兩硃砂半兩細研水飛過右為末煉蜜和搗百餘杵丸如梧桐子大每服不計時候以生薑湯下十丸良久喫葱䜴粥投之衣覆取汗未汗再服附子湯出聖恵方治傷寒一日壮熱頭痛其背惡寒者宜服附子一兩炮製去皮臍赤茯苓半兩赤芍藥半兩人參半兩去蘆頭白术半兩桂心半兩右為㪚每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候温服治傷寒一日頭痛先宜煎蒴􅀢湯淋背發汗出聖恵方蒴􅀢五兩槐枝三兩栁枝四兩桃枝三兩構葉四兩䜴一升葱白十莖右細剉以水三斗煎取二斗去滓放無風處㸔冷煖淋背訖便喫葱豉粥了以衣盖出汗葱豉湯出聖恵方治傷寒初得一日壮熱頭痛宜服葱白三莖切麻黄一兩去根節剉䜴一合生薑半兩碎右以水二大盞煎至一大盞三分去滓不計時候稍熱分為三服頻服衣覆出汗治傷寒一日服葱豉湯不得汗宜服出聖恵方葛根一兩剉葱白三莖切䜴一合右都以水二大盞生薑半兩同煎至一盞三分去滓不計時候稍熱分為三服頻服衣葢取汗青膏方出聖恵方治傷寒初得一日在皮膚頭痛項强四肢煩疼宜用當歸三兩川椒三兩去目及閉口者芎藭三兩呉茱萸三兩白芷三兩附子三兩去皮臍生用川烏頭三兩去皮臍生用莽草二兩右細剉以醇酒浸之良久漉出以鍊成猪脂四觔煎至藥色黄絞去滓不計時候以温酒服如生棗大日三服稍稍増之若頭項强即摩之黄膏方出聖恵方治傷寒一日赤色頭痛頸項强直賊風所中宜用川大黄半兩附子半兩去皮臍生用細辛半兩乾薑半兩川椒半兩去目及閉口者桂心半兩巴豆二十一粒去皮心右細剉以醋浸一宿漉出以臘月猪脂一觔煎之附子黄色即止濾出滓瓷合中盛之傷寒赤色發熱酒服一丸如梧桐子大又以摩身數百遍兼治賊風及毒風走注肌膚之間隨風所在摩之甚良白膏方出聖恵方治傷寒一日赤色惡寒肢節疼痛并療惡瘡小兒頭瘡牛頭馬鞍瘡癰腫摩之皆差宜用天雄三兩去皮臍生用川烏三兩去皮臍生用莽草三兩躑躅花三兩右以酒三升浸一宿漉出用鍊了猪脂三觔與藥一處於銅器中文火煎令諸藥燋黄色即成膏去滓以瓷器中盛有患者摩之百遍即藥力行如傷寒咽痛含如棗核大日三嚥之差其膏不可近日治傷寒一日至三日應汗者服此湯葛根半兩烏梅十四枚葱白一握䜴一升綿裏右切水九升煮取三升分為三服初一服便厚覆取汗出粉之治暴傷寒出本草以荆芥䜴汁煎服之治傷寒二日候論夫傷寒二日陽明受病陽明者胃之經也主於肌肉其脈絡於鼻入於目故得病二日肉熱鼻乾不得眠也諸經在表表始受病在於皮膚之間故可摩膏火灸發汗而愈也傷寒二三日身熱目痛鼻乾不得卧尺寸脈俱長皆是陽明胃經受病也傷寒二日陽明經受病可發其汗非正陽明也正陽明者身熱汗出不惡寒反惡熱故可下也今言一二日傳陽明經身熱日疼鼻乾不得卧其脈俱長者是太陽陽明可表而已若無汗尚惡寒宦升麻湯有汗惡寒者表未解也宜桂枝湯無汗脈出其人喘者與麻黄湯少又問十二經皆一而陽明有三何也有太陽陽明有陽陽明有正陽陽明也太陽陽明者本太陽病若發汗下後復利小便此亡津液胃中乾燥因本傳属陽明也太陽陽明脾約是也大便堅小便少其脾為約少陽陽明者本轉到少陽因發汗利小便已胃燥實大便難也正陽陽明者病人本風盛氣實也三陽明宜下唯惡寒中寒病在胃經與太陽合病属表可發其汗盖太陽與陽明合為脈必浮大而長外證必頭痛腰疼肌熱目痛鼻乾也脉浮大者太陽也長者陽明也頭疼腰痛者太陽也肌熱目痛鼻乾者陽明也尚惡寒者可升麻湯汗之若不惡寒反惡熱大便不秘者白薇散觧之不惡寒反惡熱大便閉或譫語者属胃家氣也可調胃承氣湯下之痛又問二陽有合病有併病何也脈浮大而長頭疼腰肌熱目疼鼻乾者合病也太陽初得病時發其汗汗先出不徹轉属陽明續自微汗出不惡寒者併病也三陽皆有合病唯三隂無合病不可不知也太陽證罷但發出熱手足漐漐汗出大便難而譫語者下之愈宜大承氣湯若太陽證不罷不可下宜用桂枝麻黄各半湯小發汗設靣赤色陽氣怫欝在表當解之熏之若發汗不大徹陽氣怫欝不得越散當汗不汗煩躁不知痛處其人短氣但坐此者汗出不徹故也更以麻黄發其汗則愈何以知汗出不徹以脈濇故知之方桂枝附子湯出聖恵方治傷寒二日陽明受病陽明者主於肌肉其氣如寒熱徃來鼻乾不得眠卧面赤身熱有此病證宜服桂枝一兩附子一兩炮製去皮臍甘草半兩炙微赤剉赤芍藥半兩右為㪚每服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服汗出即愈人參湯出聖恵方治傷寒二日頭痛鼻乾面赤壮熱四肢煩疼人參三分去蘆頭訶棃勒皮三分乾薑一方炮製剉桂枝三分赤茯苓一分附子三分炮製剉去皮臍甘草一分炙微赤剉右搗篩為㪚每服三錢水一中盞煎至六分去滓不計時候温服頻服之汗出差麻黄湯出聖恵方治傷寒二日頭痛發熱煩悶宜服麻黄一兩去根節桂心三分石膏三分黄芩半兩甘草一分炙微赤剉芍藥半兩一方赤芍藥杏仁二十一枚湯浸去皮尖雙仁麩炒㣲黄右為㪚每服四錢水一中盞入生薑半分煎至六分去滓不計時候稍熱頻服汗出愈解肌湯出聖恵方治傷寒二日頭痛壮熱骨節煩疼宜服甘薑二兩炮製麻黄一兩去根節赤芍藥三分黄芩三分石膏一兩右為㪚每服五錢水一大盞入葱白二莖䜴半合煎至五分去滓不計時候稍熱服如人行三里再服汗出差呉茱萸㪚出聖恵方治傷寒二日皮膚頭痛項强四肢煩疼宜服呉茱茰一兩湯洗七遍焙乾微炒當歸一兩微炒剉芎藭一兩附子一兩炮製去皮臍白芷一兩炮製去皮臍川烏頭一兩炮製去皮麻黄一兩去根節川椒一兩去目及閉口者微炒出汗右為㪚每服五錢水一大盞入生薑半分棗三枚煎至七分去滓不計時候稍熱分為二服頻服以衣覆取汗即差荆芥湯出聖恵方治傷寒二日頭項强四肢煩疼荆芥一兩附子一兩炮製去皮臍前