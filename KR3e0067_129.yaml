氣全不再受尅邪無所容否極泰來榮衛将復水升火降則寒熱作而大汗解矣方小柴胡湯出聖恵方治傷寒病六日其病深結在臓是三隂三陽俱受病若五臓六腑榮衛皆不通其人難治柴胡二兩去苗黄芩一兩赤芍藥一兩半夏半兩湯浸七遍去滑枳實半兩麩炒微黄人參二兩去蘆頭甘草半兩炙微赤剉右為㪚每服四錢水一中盞入生薑半分煎至六分去滓不計時候温服大承氣湯出聖恵方治傷寒六日體重四肢煩疼多渇或譫語不知人事如此病症者胃中有結燥不通川大黄二兩剉碎微炒枳實二兩麩炒微黄川芒硝二兩厚朴一兩去麄皮塗生姜汁炙令香熟右為㪚每服四錢用水一中盞煎至六分去滓不計時候温服以利為度如人行十里未利再服㵼心湯出聖恵方治傷寒六日心胷妨悶煩熱不解面赤大渇壮熱身體疼痛此証是毒氣攻心半夏半兩湯浸七遍去滑人參半兩去蘆頭木通一兩剉甘草一兩炙微赤剉黄芩一兩川大黄一兩剉碎微炒右為㪚每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候服人參㪚出聖恵方治傷寒六日嘔噦不定頭疼體痛時有虛汗此証是冷熱未和人參三兩去蘆頭柴胡三兩去苗黄芩一兩甘草一兩炙㣲赤剉白术一兩半夏半兩湯浸七遍去滑厚朴一兩去麄皮塗生姜汁炙令香熟右為㪚每服三錢用水一中盞入生薑半分棗三枚煎至六分去滓不計時候温服黄芩湯出聖恵方治傷寒六日發汗不解嘔逆小便不利胷脇痞滿㣲熱而煩黄芩桂心赤茯苓各一兩前胡三兩去蘆頭甘草半兩炙微赤剉半夏一兩湯浸七遍厚朴一兩去麄皮塗生姜汁炙令香熟右為㪚每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候温服柴胡桂枝湯出聖恵方治傷寒六日發熱惡寒枝節疼痛微嘔心下痞結外症未去桂枝一兩柴胡二兩去苗芎藭一兩人參一兩去蘆頭黄芩一兩赤芍藥一兩枳殻二兩麩炒微黄去瓤甘草半兩炙微赤剉半夏一兩湯浸七遍去滑右為㪚每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候温服牡蠣㪚出聖恵方治傷寒六日其人已發汗而不解胸脇痞滿小便不利渇而不嘔但汗出徃來寒熱而煩牡蠣一兩燒為粉甘草一兩炙微赤剉乾薑半兩炮製剉柴胡二兩去苗􅌝􅌣根一兩木通一兩剉桂心一兩黄芩一兩厚朴二兩去麄皮塗生姜汁炙令香熟右為㪚每服三錢水一中盞煎至五分去滓不計時候温服人參㪚出聖恵方治傷寒六日吐㵼百骨疼痛脚冷腹熱人參三分去蘆頭柴胡三分去苗白茯苓三分牡蠣三分燒為粉黄芩三分白芍藥三分桂心三分半夏三分湯浸七遍去滑甘草三分炙㣲赤剉乾薑三分炮製剉右為㪚每服三錢水一中盞入生薑半分棗三枚煎至五分去滓不計時候温服猪苓㪚出聖恵方治傷寒六日發熱煩悶渇欲飲水得水而吐其脉浮數小便不利者猪苓三分去黑皮白术三分澤㵼一兩桂心半兩赤茯苓三分丁香三分厚朴去麄皮生姜汁炙令香熟一兩半甘草三分炙微赤剉右為㪚每服五錢水一大盞入生薑半分煎至五分去滓不計時候温服葛根㪚出聖恵方治傷寒六日心躁煩渇肢節解痛小腹急滿隂縮葛根三分剉石膏一兩柴胡一兩去苗川升麻三分知母三分梔子仁半兩甘草三分炙微赤剉川大黄一兩剉碎微炒右為㪚每服四錢水一中盞入生薑半分煎至六分去滓不計時候温服大青㪚出聖恵方治傷寒六日心躁煩悶四肢疼痛小腹滿急大青三分柴胡一兩去苗梔子仁一分川升麻三分知母三分石膏一兩甘草三分炙微赤剉右為㪚每服四錢水一中盞入生薑半分煎至六分去滓不計時候温服通關㪚出聖恵方治傷寒六日脉沈細不足者附子一兩炮製去皮臍乾薑半兩炮製剉甘草半兩炙微赤剉黄蓍三分剉桔梗半兩去蘆頭防風三分去蘆頭羗活半兩五加皮半兩桂心三分右為㪚每服三錢水一中盞煎至六分去滓不計時候温服柴胡㪚出聖恵方治傷寒六日頭疼壮熱百節疼痛柴胡一兩去苗川升麻三分黄芩三分知母一兩赤芍藥一兩大青三分石膏二兩梔子仁一兩川大黄一兩剉碎微炒杏仁三分湯洗去皮尖雙仁麩炒微黄右為㪚每服四錢水一中盞入生薑半分豉五十粒煎至六分去滓不計時候温服一方無生薑麻黄升麻湯治傷寒六七日其人左右寸脈沈遲手足厥逆下部脈不至咽喉痛不利唾膿血泄利不止麻黄二兩半去節升麻五分當歸五分葳㽔一作菖蒲知母黄芩各二分麥門冬去心一作天門冬桂心芍藥乾薑石膏碎甘草炙茯苓白术各一兩右切以水一斗先煮麻黄减二升掠去上沫内諸藥煮取三升去滓温分三服相去如炊三斗米頃令盡汗出便愈忌海藻菘菜葱醋桃李雀肉等黄芩湯治傷寒六七日發汗不解嘔逆不利小便不利胸脇痞微熱而煩黄芩桂心各三兩茯苓四兩前胡八兩半夏半升洗右切以水一斗二升煮取六升為六服日三服間食生薑粥取小便利為度忌羊肉餳生葱酢物小柴胡湯治傷寒六七日不解寒熱往來胸脇苦病黙黙不欲飲食心煩喜嘔寒疝腹痛前胡八兩半夏半升洗生薑五兩黄芩人參甘草炙各三兩乾棗十二枚擘去核右切以水一斗煮取三升分四服忌羊肉餳海藻菘菜黒奴丸出聖恵方治傷寒六日熱毒在臓胸中煩悶口噤不能言唯欲飲水成壊傷寒醫所不療麻黄二兩去根節竈下黄土二兩川大黄二兩黄芩二兩川芒硝二兩竈突墨二兩梁上塵二兩右為細末鍊蜜和丸如彈子大毎服不計時候以井華水下一丸治傷寒熱病五六日愈加困重喫疎藥後下糞如紫黒色病勢不减神思昏昏小腹逆滿狂妄不省人事甚則腹中有塊堅硬不㪚其脉反結伏此其毒氣攻血腹内有瘀積物此候九死牡丹皮去心射干羗活荆芥穂大黄黄芩桃仁去尖并雙仁者連翹𤣥參麥門冬去心柴胡去苗山梔麻黄去根沈香右細杵羅為末毎服三錢水一盞半煎兩三沸食後和滓服苦參湯出仁存方治傷寒熱病五六日已上熱不除黄芩二兩苦參三兩生地黄一兩右㕮咀毎服四大錢水一盞半煎至七分去滓服傷寒七日論夫傷寒七日病法當小愈隂陽諸經傳病終故也今七日已後反甚者欲為再經病也再經病者是經絡重受病也方桂枝湯出聖恵方治傷寒七日不解頭痛有熱有裏大腸秘澀與承氣湯後其小便清者病不在裏属在表也當須發汗若頭痛者必衂桂枝一兩赤芍藥一兩甘草一兩炙微赤剉麻黄一兩去根節柴胡一兩去苗芎藭一兩厚朴二兩去麄皮塗生姜汁炙令香熟右搗麄羅為㪚毎服四錢水一大盞入生薑半分棗三枚煎至六分不計時候熱服衣覆微汗如人行十里未汗再服知母㪚出聖恵方治傷寒七日脉浮發熱無汗渇欲飲水無表症知母一兩石膏一兩甘草半兩炙微赤粳米半合人參半兩去蘆頭葛根半兩剉右都剉以水二大盞半煎至二盞去滓不計時候分温二服前胡湯出聖恵方治傷寒六七日發熱汗出不解心中痞堅前胡二兩去蘆頭赤茯苓二兩白术二兩川大黄一兩剉碎微炒赤芍藥一兩枳實一兩白芷半夏一兩湯浸七遍去滑厚朴二兩去麄皮塗生姜汁炙令香熟甘草一兩炙微赤剉右搗麄羅為㪚每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候温服麻黄㪚出聖恵方治傷寒七日大下後脉沉遲手足厥逆咽喉不利胸膈煩躁唾膿血泄利不止為難治此方主之麻黄二兩去根節當歸一兩剉微炒川升麻一兩知母一兩赤芍藥一兩天門冬一兩去心桂心一兩赤茯苓一兩甘草一兩炙微赤剉石膏二兩白术一兩乾薑一兩炮製剉右搗麄羅為㪚毎服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候温服柴胡㪚出聖恵方治傷寒七日不解心煩腸中有結燥譫語柴胡二兩去蘆頭半夏一兩湯浸七遍去滑赤芍藥一兩甘草半兩炙微赤剉知母一兩黄芩一兩川大黄二兩剉碎微炒陳橘皮一兩湯浸去瓤人參一兩右搗麄羅為㪚毎服四錢水一中盞入生薑半分煎至五分去滓不計時候温温頻服稍利為度葶􅐗苦酒湯出活人書治傷寒七八日内熱不解葶􅐗一合紙上炒研膏生艾汁半升無生艾煮艾汁或用艾根搗取汁苦酒米醋是也一升半右三味同煎取七合作三服傷寒八日論夫傷寒八日病不解者或是諸隂陽經絡重受於病或因發汗吐下之後毒氣不盡所以病症猶在也方鼈甲㪚出聖恵方治傷寒八日熱勢彌重大便結澁心腹痞病飲食不下精神恍惚譫言妄語鼈甲一兩塗醋炙令微黄去裙襴細辛一兩呉茱茰三兩湯浸七遍枯乾微炒白鮮皮一兩附子三分炮製去皮臍枳殻一兩麩炒微黄去瓤茵蔯一兩川大黄一兩半剉碎微炒桂心三分右搗篩為㪚每服四錢水一中盞入生薑半分煎至六分去滓不計時候温服微利為度犀角㪚出聖恵方治傷寒八日煩熱不退四肢疼痛犀角屑一兩川升麻一兩半柴胡一兩半去苗葛根一兩半剉呉藍一兩甘草一兩炙微赤剉右搗篩為㪚每服四錢水一中盞煎至六分去滓次入馬牙硝三錢更煎三二沸不計時候温服又方出聖恵方柴胡一兩去苗黄芩一兩犀角屑三分茯苓三分人參一兩去蘆頭甘草半兩炙微赤剉右搗篩為㪚毎服四錢水一大盞煎至六分去滓次入馬牙硝三錢更煎三二沸不計時候温服柴胡㪚出聖恵方治傷寒八日不解黙黙煩悶腹中乾燥大腸結澁狂言柴胡一兩去苖知母半兩人參一兩去蘆頭半夏半兩湯浸七遍去滑川大黄一兩剉碎微炒黄芩半兩赤芍藥半兩甘草半兩炙微赤剉葳㽔半兩右搗篩為㪚毎服五錢水一大盞入生薑半分煎至五分去滓不計時候温服以微利為度附子湯出聖恵方治傷寒八日風温相摶身痛心煩不能自轉側不嘔不渇下之脉浮者附子一兩炮製去皮臍桂心一兩白术一兩白芷一兩甘草半兩炮炙微赤剉葛根一兩人參一兩去蘆頭陳橘皮一兩湯浸去白瓤焙右細剉和匀毎服半兩水一大盞入生薑半分棗三枚煎至七分去滓不計時候分温二服茵陳湯出鮑氏方治傷寒七八日内熱結身黄如橘小便不利腹脹并酒傷瘀熱在内發熱頭有汗身無汗茵蔯一兩淡竹葉大黄三錢半梔子五大个通草右為㪚水二盞煎茵蔯次下後藥至一盞調三硃五苓㪚下紅丸子甚效千金只前三件専治傷寒發黄汗并治谷疸生地黄湯出濟生拔粹方病人七八日後兩手脉沉遲細微膚冷臍下滿或狂或躁大便實而色黒小便自利者此畜血症具也若年老及小年氣虛弱者宜此方主之生地黄自然汁一升如無生地黄只用生乾地黄二兩乾漆半兩炒煙欲盡生藕自然汁半升如無藕用刺薊汁半升如無刺薊汁用刺薊末一兩藍葉一握切碎乾者用末半兩水蛭十个炒大黄一兩剉如骰子大桃子仁半兩細研䖟䖝二十个去趐足麩内炒黄右一處入水三升半同慢火熬及二升以來放冷分三服投一服至半日許血未下再投之此地黄湯比抵當湯丸其勢甚輕如無地黄與藕汁計升數添水同煎扺當湯丸恐用之太過有不止損血之候故立此湯衂不可汗者盖為脉微也脉𦂳而浮者麻黄湯主之脉浮緩者桂枝湯主之脉已微者犀角地黄湯主之普濟方卷一百三十
