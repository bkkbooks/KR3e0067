氣全不再受尅邪無所容否極泰來榮衛將復水升火降則寒熱作而大汗解矣方小柴胡湯出聖惠方治傷寒病六日其病深結在臟是三隂三陽俱受病若五臟六腑榮衛皆不通其人難治柴胡二兩去苗黃芩一兩赤芍藥一兩半夏半兩湯浸七遍去滑枳實半兩麩炒微黃人參二兩去蘆頭甘草半兩炙微赤銼右為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服大承氣湯出聖惠方治傷寒六日體重四肢煩疼多渴或譫語不知人事如此病症者胃中有結燥不通川大黃二兩銼碎微炒枳實二兩麩炒微黃川芒硝二兩厚朴一兩去粗皮塗生薑汁炙令香熟右為散每服四錢用水一中盞煎至六分去滓不計時候溫服以利為度如人行十里未利再服㵼心湯出聖惠方治傷寒六日心胸妨悶煩熱不解面赤大渴壯熱身體疼痛此證是毒氣攻心半夏半兩湯浸七遍去滑人參半兩去蘆頭木通一兩銼甘草一兩炙微赤銼黃芩一兩川大黃一兩銼碎微炒右為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候服人參散出聖惠方治傷寒六日嘔噦不定頭疼體痛時有虛汗此證是冷熱未和人參三兩去蘆頭柴胡三兩去苗黃芩一兩甘草一兩炙微赤銼白术一兩半夏半兩湯浸七遍去滑厚朴一兩去粗皮塗生薑汁炙令香熟右為散每服三錢用水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服黃芩湯出聖惠方治傷寒六日發汗不解嘔逆小便不利胸脅痞滿微熱而煩黃芩桂心赤茯苓各一兩前胡三兩去蘆頭甘草半兩炙微赤銼半夏一兩湯浸七遍厚朴一兩去粗皮塗生薑汁炙令香熟右為散每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服柴胡桂枝湯出聖惠方治傷寒六日發熱惡寒枝節疼痛微嘔心下痞結外症未去桂枝一兩柴胡二兩去苗芎藭一兩人參一兩去蘆頭黃芩一兩赤芍藥一兩枳殼二兩麩炒微黃去瓤甘草半兩炙微赤銼半夏一兩湯浸七遍去滑右為散每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服牡蠣散出聖惠方治傷寒六日其人已發汗而不解胸脅痞滿小便不利渴而不嘔但汗出往來寒熱而煩牡蠣一兩燒為粉甘草一兩炙微赤銼乾薑半兩炮製銼柴胡二兩去苗􅌝􅌣根一兩木通一兩銼桂心一兩黃芩一兩厚朴二兩去粗皮塗生薑汁炙令香熟右為散每服三錢水一中盞煎至五分去滓不計時候溫服人參散出聖惠方治傷寒六日吐㵼百骨疼痛腳冷腹熱人參三分去蘆頭柴胡三分去苗白茯苓三分牡蠣三分燒為粉黃芩三分白芍藥三分桂心三分半夏三分湯浸七遍去滑甘草三分炙微赤銼乾薑三分炮製銼右為散每服三錢水一中盞入生薑半分棗三枚煎至五分去滓不計時候溫服豬苓散出聖惠方治傷寒六日發熱煩悶渴欲飲水得水而吐其脈浮數小便不利者豬苓三分去黑皮白术三分澤㵼一兩桂心半兩赤茯苓三分丁香三分厚朴去粗皮生薑汁炙令香熟一兩半甘草三分炙微赤銼右為散每服五錢水一大盞入生薑半分煎至五分去滓不計時候溫服葛根散出聖惠方治傷寒六日心躁煩渴肢節解痛小腹急滿隂縮葛根三分銼石膏一兩柴胡一兩去苗川升麻三分知母三分梔子仁半兩甘草三分炙微赤銼川大黃一兩銼碎微炒右為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服大青散出聖惠方治傷寒六日心躁煩悶四肢疼痛小腹滿急大青三分柴胡一兩去苗梔子仁一分川升麻三分知母三分石膏一兩甘草三分炙微赤銼右為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服通關散出聖惠方治傷寒六日脈沈細不足者附子一兩炮製去皮臍乾薑半兩炮製銼甘草半兩炙微赤銼黃蓍三分銼桔梗半兩去蘆頭防風三分去蘆頭羌活半兩五加皮半兩桂心三分右為散每服三錢水一中盞煎至六分去滓不計時候溫服柴胡散出聖惠方治傷寒六日頭疼壯熱百節疼痛柴胡一兩去苗川升麻三分黃芩三分知母一兩赤芍藥一兩大青三分石膏二兩梔子仁一兩川大黃一兩銼碎微炒杏仁三分湯洗去皮尖雙仁麩炒微黃右為散每服四錢水一中盞入生薑半分豉五十粒煎至六分去滓不計時候溫服一方無生薑麻黃升麻湯治傷寒六七日其人左右寸脈沈遲手足厥逆下部脈不至咽喉痛不利唾膿血泄利不止麻黃二兩半去節升麻五分當歸五分葳㽔一作菖蒲知母黃芩各二分麥門冬去心一作天門冬桂心芍藥乾薑石膏碎甘草炙茯苓白术各一兩右切以水一斗先煮麻黃減二升掠去上沫內諸藥煮取三升去滓溫分三服相去如炊三斗米頃令盡汗出便愈忌海藻菘菜蔥醋桃李雀肉等黃芩湯治傷寒六七日發汗不解嘔逆不利小便不利胸脅痞微熱而煩黃芩桂心各三兩茯苓四兩前胡八兩半夏半升洗右切以水一斗二升煮取六升為六服日三服間食生薑粥取小便利為度忌羊肉餳生蔥酢物小柴胡湯治傷寒六七日不解寒熱往來胸脅苦病默默不欲飲食心煩喜嘔寒疝腹痛前胡八兩半夏半升洗生薑五兩黃芩人參甘草炙各三兩乾棗十二枚擘去核右切以水一斗煮取三升分四服忌羊肉餳海藻菘菜黑奴丸出聖惠方治傷寒六日熱毒在臟胸中煩悶口噤不能言唯欲飲水成壞傷寒醫所不療麻黃二兩去根節竈下黃土二兩川大黃二兩黃芩二兩川芒硝二兩竈突墨二兩梁上塵二兩右為細末鍊蜜和丸如彈子大每服不計時候以井華水下一丸治傷寒熱病五六日愈加困重喫疏藥後下糞如紫黑色病勢不減神思昏昏小腹逆滿狂妄不省人事甚則腹中有塊堅硬不散其脈反結伏此其毒氣攻血腹內有瘀積物此候九死牡丹皮去心射干羌活荆芥穗大黃黃芩桃仁去尖并雙仁者連翹玄參麥門冬去心柴胡去苗山梔麻黃去根沈香右細杵羅為末每服三錢水一盞半煎兩三沸食後和滓服苦參湯出仁存方治傷寒熱病五六日已上熱不除黃芩二兩苦參三兩生地黃一兩右㕮咀每服四大錢水一盞半煎至七分去滓服傷寒七日論夫傷寒七日病法當小愈隂陽諸經傳病終故也今七日已後反甚者欲為再經病也再經病者是經絡重受病也方桂枝湯出聖惠方治傷寒七日不解頭痛有熱有裏大腸祕澀與承氣湯後其小便清者病不在裏屬在表也當須發汗若頭痛者必衄桂枝一兩赤芍藥一兩甘草一兩炙微赤銼麻黃一兩去根節柴胡一兩去苗芎藭一兩厚朴二兩去粗皮塗生薑汁炙令香熟右搗粗羅為散每服四錢水一大盞入生薑半分棗三枚煎至六分不計時候熱服衣覆微汗如人行十里未汗再服知母散出聖惠方治傷寒七日脈浮發熱無汗渴欲飲水無表症知母一兩石膏一兩甘草半兩炙微赤粳米半合人參半兩去蘆頭葛根半兩銼右都銼以水二大盞半煎至二盞去滓不計時候分溫二服前胡湯出聖惠方治傷寒六七日發熱汗出不解心中痞堅前胡二兩去蘆頭赤茯苓二兩白术二兩川大黃一兩銼碎微炒赤芍藥一兩枳實一兩白芷半夏一兩湯浸七遍去滑厚朴二兩去粗皮塗生薑汁炙令香熟甘草一兩炙微赤銼右搗粗羅為散每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服麻黃散出聖惠方治傷寒七日大下後脈沉遲手足厥逆咽喉不利胸膈煩躁唾膿血泄利不止為難治此方主之麻黃二兩去根節當歸一兩銼微炒川升麻一兩知母一兩赤芍藥一兩天門冬一兩去心桂心一兩赤茯苓一兩甘草一兩炙微赤銼石膏二兩白术一兩乾薑一兩炮製銼右搗粗羅為散每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服柴胡散出聖惠方治傷寒七日不解心煩腸中有結燥譫語柴胡二兩去蘆頭半夏一兩湯浸七遍去滑赤芍藥一兩甘草半兩炙微赤銼知母一兩黃芩一兩川大黃二兩銼碎微炒陳橘皮一兩湯浸去瓤人參一兩右搗粗羅為散每服四錢水一中盞入生薑半分煎至五分去滓不計時候溫溫頻服稍利為度葶􅐗苦酒湯出活人書治傷寒七八日內熱不解葶􅐗一合紙上炒研膏生艾汁半升無生艾煮艾汁或用艾根搗取汁苦酒米醋是也一升半右三味同煎取七合作三服傷寒八日論夫傷寒八日病不解者或是諸隂陽經絡重受於病或因發汗吐下之後毒氣不盡所以病症猶在也方鱉甲散出聖惠方治傷寒八日熱勢彌重大便結澀心腹痞病飲食不下精神恍惚譫言妄語鱉甲一兩塗醋炙令微黃去裙襴細辛一兩吳茱茰三兩湯浸七遍枯乾微炒白鮮皮一兩附子三分炮製去皮臍枳殼一兩麩炒微黃去瓤茵蔯一兩川大黃一兩半銼碎微炒桂心三分右搗篩為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服微利為度犀角散出聖惠方治傷寒八日煩熱不退四肢疼痛犀角屑一兩川升麻一兩半柴胡一兩半去苗葛根一兩半銼吳藍一兩甘草一兩炙微赤銼右搗篩為散每服四錢水一中盞煎至六分去滓次入馬牙硝三錢更煎三二沸不計時候溫服又方出聖惠方柴胡一兩去苗黃芩一兩犀角屑三分茯苓三分人參一兩去蘆頭甘草半兩炙微赤銼右搗篩為散每服四錢水一大盞煎至六分去滓次入馬牙硝三錢更煎三二沸不計時候溫服柴胡散出聖惠方治傷寒八日不解默默煩悶腹中乾燥大腸結澀狂言柴胡一兩去苖知母半兩人參一兩去蘆頭半夏半兩湯浸七遍去滑川大黃一兩銼碎微炒黃芩半兩赤芍藥半兩甘草半兩炙微赤銼葳㽔半兩右搗篩為散每服五錢水一大盞入生薑半分煎至五分去滓不計時候溫服以微利為度附子湯出聖惠方治傷寒八日風溫相摶身痛心煩不能自轉側不嘔不渴下之脈浮者附子一兩炮製去皮臍桂心一兩白术一兩白芷一兩甘草半兩炮炙微赤銼葛根一兩人參一兩去蘆頭陳橘皮一兩湯浸去白瓤焙右細銼和勻每服半兩水一大盞入生薑半分棗三枚煎至七分去滓不計時候分溫二服茵陳湯出鮑氏方治傷寒七八日內熱結身黃如橘小便不利腹脹并酒傷瘀熱在內發熱頭有汗身無汗茵蔯一兩淡竹葉大黃三錢半梔子五大個通草右為散水二盞煎茵蔯次下後藥至一盞調三硃五苓散下紅丸子甚效千金只前三件専治傷寒發黃汗并治谷疸生地黃湯出濟生拔粹方病人七八日後兩手脈沉遲細微膚冷臍下滿或狂或躁大便實而色黑小便自利者此畜血症具也若年老及小年氣虛弱者宜此方主之生地黃自然汁一升如無生地黃只用生乾地黃二兩乾漆半兩炒煙欲盡生藕自然汁半升如無藕用刺薊汁半升如無刺薊汁用刺薊末一兩藍葉一握切碎乾者用末半兩水蛭十個炒大黃一兩銼如骰子大桃子仁半兩細研虻蟲二十個去趐足麩內炒黃右一處入水三升半同慢火熬及二升以來放冷分三服投一服至半日許血未下再投之此地黃湯比抵當湯丸其勢甚輕如無地黃與藕汁計升數添水同煎扺當湯丸恐用之太過有不止損血之候故立此湯衄不可汗者蓋為脈微也脈緊而浮者麻黃湯主之脈浮緩者桂枝湯主之脈已微者犀角地黃湯主之普濟方卷一百三十
