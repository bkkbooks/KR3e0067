body:
  text: 普濟方卷三百二十二明周王朱橚撰婦人諸疾門虚損附論夫婦人者衆陰所集當與温居十五以上陰氣浮溢百想經心内傷五臓外損姿容月水去留前後交互瘀血停凝中道斷絶其中復墮不可具論所以婦人别立方者以其氣血不調胎姙産生崩傷之意故也婦人之病與男子十倍難療以其嗜慾多於丈夫成病則倍於男子加以疾妬憂患慈戀愛憎深著堅牢情不體觧以為病根深療之難差也夫人將攝順理則氣血調和風寒暑濕不能為害若勞傷氣血便致虚損則風冷乗虛而干之乃生百病可依證而治也方補益大澤蘭圓治婦人氣損及中風白帯疝瘕陰中冷痛或頭腦寒兼而經絡忽滯血枯無子面上遊風去來目涙出多涕唾忽如醉或胃中冷嘔逆不止泄痢淋瀝或五臓六腑寒熱不調心下痞急邪氣日侵漏下赤白陰中腫痛胸脇支滿或體皮膚中澁如麻豆若痔痰疾結氣或四肢拘攣風行周身骨疼目眩無所見或上氣惡寒淅淅如痛或喉痺鼻齆風癎癲疾或月水不通魂魄不定飲食無味無所不治服之久令有子及治産後内衂澤蘭二兩芎藭白芷一兩川椒三分去目子及閉口者㣲炒去汗石斛一兩去根剉肉蓯蓉一兩酒浸一宿切去粗皮炙乾藁本一兩半當歸一兩半切碎㣲炒細辛一兩卷栢一兩赤石脂二兩細研厚朴一兩去粗皮生薑製炙令香七補丸出十便良方治婦人血氣虛弱衝任不和腹中經結狀若懷孕月候尚來未分加脉冝服此方當歸芍藥川芎各三分白芷白术熟地黄阿膠各二分炒右為細末蜜丸如梧桐子大每服三十丸空心米飲下地黄煎丸出大全良方觧勞生肌進食活血養心生地黄汁杏仁汁生薑汁藕汁各五升薄荷汁鵝梨汁各一升法酒一升沙蜜四升右慢火熬成膏入後藥苦梗去蘆二兩麝香半兩研熟地黄酒水焙四兩北柴胡去蘆三兩木香人參茯苓山藥栢子仁去皮炒研逺志去心枳殻去穰麩炒白术各一兩秦艽二兩右為細末以前膏子和丸如梧桐子大食前甘草湯下二十丸蛤蚧丸出大全良方治肺間邪氣胸中積血作痛失音含化丸蛤蚧一兩去足炙訶子去核阿膠粉炒麥門冬去心北細辛甘草生乾地黄各半兩右為細末煉蜜和丸如鷄頭大食後含化一丸黄蓍散一名防風湯出大全良方治勞氣食後身疼倦夜間盗汗此病因失血榮衛損也宜防風湯黄蓍白芍藥防風各三分甘草半兩當歸生乾地黄各三分右㕮咀每服三錢水一盞薑三片棗二枚煎至七分去滓食前温服椒紅丸治婦人血氣不調臟腑怯弱風冷邪氣乗虛客摶臍腹冷痛脇肋時脹面色痿黄肌體羸瘦怠惰嗜卧不思飲食常服補虚損暖下元逐痼冷進飲食沉香莪术訶梨勒炒去核椒紅㣲炒當歸去蘆酒浸㣲炒附子炮去皮臍白术各一兩麝香一分别研丁香肉豆蔲炮良薑去蘆麻油炒各半兩右為末入麝香勻酒煮麫糊丸如梧桐子大每服三十丸温酒空心下刼勞散治心俱虚勞嗽二三聲無痰遇夜發熱過即冷時有盗汗四肢倦怠體劣黄瘦飲食減少夜卧恍惚神氣不寧睡多異夢此藥能治㣲𠻳有唾唾中有有紅線名曰肺痿若有他病不治便成羸劣之疾白芍藥六兩綿黄蓍去皮蜜炙甘草炙人參去蘆頭當歸去蘆洗浄半夏白茯苓去皮熟地黄洗淨焙乾五味子揀去梗阿膠各二兩炒右㕮咀每服三錢水一盞生薑十二片棗三枚煎至九分無時温服日進三服石斛生地黄煎治婦人血虚羸氣胸逆滿悶氣脹石斛甘草炙紫苑各四兩桂心二兩生地黄汁淳酒各八升茯苓一斤大黄八兩麥門冬去心二升桃仁半斤去皮尖右十味搗末合成銅器中加炭火内鹿角膠一斤數攪之得一升内芡實三斤白蜜三升合和調更於銅器中釜湯上煎攪之以生竹抄無令着器攪令相得藥成先食酒服如彈子大一丸日稍加至二丸一方用人參三兩右㕮咀每服五錢水一盞入紫蘇七片烏梅一箇至煎七分温服如聖散治婦人所禀血氣不足不耐寒暑易冐疾傷月水不調久而心虛狀若心勞四肢易倦筋骨少力盗汗易驚或時不寕五心煩熱肌膚不長間作頭昏飲食無味胸膈不利或産前後受病並可服之北柴胡白茯苓甘草熟地黄人參當歸各一兩鼈甲胡黄連沉香知母各半兩桑寄生乾葛各二分右為細末每服二錢水一盞烏梅一箇棗二枚麥門冬數粒煎至八分無時候服當歸木香湯治婦人血氣虛勞令人頭目昏眩語聲沉音舌根硬言語蹇澁口苦不思飲食白日困睡夜發虛汗及神思恍惚夢寝不寕面色微黄頻發喘嗽遍身疼痛脚氣走注四肢沉重背甲拘急時發寒熱五心煩躁唇乾多渇胸膈不利咽喉噎塞尫羸瘦弱經曰脈大為勞宜服此藥青皮五加皮海桐皮桑白皮地骨皮丁香皮陳皮牡丹皮棕櫚皮以上諸藥全為灰末用六錢紅芍藥木香各半兩當歸一兩右為細末每服一錢水一盞入小油二㸃錢一文同煎至七分温服如婦人血腸臍下冷痛似刀攪刺遍身腫滿室女經脈不通用斑猫半兩大黄一兩炒剉二味為末用黄狗膽汁以温酒調下一錢如臍下疼上心間痰未止不兼二味只服後藥甘草半兩右為粗末每服二錢水一盞生薑三片棗二枚煎至七分去滓稍熱服煩渴心躁入烏梅一兩同杵為末生薑地黄湯治婦人血氣不調或時寒熱體痛不思飲食生乾地黄北柴胡各一兩羌活木香桂心防風各半兩酸棗仁羚羊角屑芍藥白术黄蓍川牛膝白茯苓當歸枳殻各三分右㕮咀每服三錢水一盞生薑三片煎至七分去滓空心服補陰丹治婦人血氣俱虛四肢困熱骨節煩疼熟地黄焙生地黄焙烏梅焙各二兩川芎三錢右為末煉蜜丸彈子大每服一丸麥蘗湯下不拘時日三服益母煎治婦人一切病産後一切傷損右用益母草不拘多少用竹刀切洗淨銀器内煉成膏瓶器封之並以酒服清氣湯治肌熱骨瘦者陽衰陰盛也是氣弱而血熱則傳而不通外蒸其肉内蒸其骨肌乃蒸瘦也或時暈熱煩渇口乾頰赤頭疼飲食無味心神驚悸肢體酸疼或時盜汗或時上暴或時咳𠻳或月經斷絶或經極少俗為血勞産後曰蓐勞及羸痩之人與清氣湯羊乳丸治之紫蘇子五味子大腹子枳殻桑白皮㣲炒菖蒲地骨皮白术柴胡秦艽獨活乾用乾葛甘草炙各一兩地黄澤蘭欓子防己川烏𤣥胡索各等分右為末每服二錢空心酒調下薤白湯治血虛勞倦鹿角膠當歸去尾黄蓍鹽炙肉桂石斛乾地黄酒炒木香白术白茯苓鼈甲酥炙秦艽川巴㦸柑子皮各一兩牡丹皮天仙藤甘草各半兩人參二錢枳殻三錢右剉散每服生薑九片水二盞薤白三寸煎空心温服香甲散治熱病後虛勞或四肢倦怠脚手疼痛飲食無味肌膚黄瘦或熱瘧盜汗頭暈虛煩此藥久服駐顔甚妙鼈甲三兩醋浸去裙炙黄又入醋醮七次當歸木香人參附子㯽榔羌活川芎沉香肉豆蔲酸棗仁大腹子各半兩北柴胡厚朴川牛膝白茯苓秦艽各一兩桂心一兩半右㕮咀每服五錢水一盞生薑三片烏梅一箇煎至八分去滓温服日三服空心忌生冷麵食鷄肉鮓醬之類香甲散治婦人血氣虚勞四肢少力肌肉黄瘦多困減食遍身痠疼真邪相擊心腹撮疼木香三分乾薑三分鼈甲醋炙二兩牡丹皮赤芍藥橘紅桂心人參茯苓熟地黄秦艽柴胡白术炒當歸附子炮去皮各一兩治寒熱當歸川芎白芍藥熟地黄各一兩生地黄二兩右為細末酒煮麵糊為丸如桐子大每服六十丸食前温酒下烏鷄煎丸治虛勞證烏鷄一隻五加皮二兩右用酒醋各一瓶同煎爛去皮骨搗膏加黄蓍鼈甲散妙香散再加烏沉湯紅麵末各二兩和膏為丸桐子大每服五七小丸空心食前服陳年乾猪皮入鷄膏内地黄膏子治婦人本藏血氣衰少困倦無力或發煩熱飲食減少並宜服之熟乾地黄八兩淨蜜十兩右將熟乾地黄為細末同蜜熬成膏子丸如桐子大每服四五十丸温酒下米飲亦得食前或作膏子酒化服或不飲酒者白湯化服甘草乾薑湯治婦人諸虛出血胃寒不能引氣歸元無以收約其血皆因陰乗於陽心肺經寒而嘔血者甘草炙川白薑炮䓁分右剉散每服三錢食前煎服大聖散治五勞七傷男女皆可服川白芷藁本川椒人參白薑丹參白术厚朴石棗捲栢茯苓栢子仁細辛桔梗當歸白芍藥川芎阿膠石膏桂心附子各二兩右為細末入生藕自然汁生薑自然汁蜜各一盞同煎數沸令香熟入藥調成膏用砂器貯每服一匙燈心棗湯化下寸金散治婦人虛勞百損内傷氣血風冷客邪耗散真氣臍下受寒刺痛難忍小便淋瀝腰背拘攣陰弱盜汗頭目昏重不時寒熱崩血帶下洗臍作痛諸藥不瘥此方立效不可具陳紫稍化胡椒韶腦破故紙蛇床子各等分右為細末煉蜜為丸如梧桐子大每服二十丸熱酒下空心食前喫一物壓至三十丸一日三服又將此藥末一兩釅醋一大升或好酒一升同藥煎熱沸令婦人披衣於收口盆兒上坐薰陰户迤邐淋洗盆下灰火冷再温三五次立效暖宫丸治衝任虚損下久冷臍腹㽲痛月事不調或多不斷或期不至或崩漏血赤白帶下或月内再行淋瀝不止帶下五色經脉將至腰腿沉重痛連臍腹小便白濁面色痿黄肢體倦怠飲食不進漸至羸弱及治子宫久寒不成胎孕生硫黄六兩禹餘粮酸醋淬手撚碎為度九両赤石脂炮去皮臍海螵蛸去殻各三兩右為細末以醋和丸如梧桐子大每服十五丸至二十丸空心食前温酒下或淡醋湯亦得五聖丸調益榮衛滋養氣血衝任虛氣損月水不調臍腹㽲痛崩中漏下血瘕塊硬發渇疼痛姙娠宿冷將理失宜胎動不安血下不止及産後乗虛風寒内摶惡露不下結生瘕聚小腹堅痛動作過多榮衛虛損陰陽不和乍寒熱並皆治之當歸川芎人參乾薑炮甘草炙白芍藥各等分右㕮咀每服四錢水一盞煎至六分去滓熱服若産後寒熱腹中刺痛則有敗血當五積散加醋煎及大聖散服之若血不過多猶有刺痛亦宜服此二藥一方治經血凝滯腹内血氣作痛用四物湯加莪术官桂等分名六合湯一方治下血不止及姙婦胎動加熱艾乾薑甘草阿膠黄蓍等分名膠艾湯一方治血痢不止加膠艾治産後血摶口乾煩渇加𤓰蔞麥門冬煩熱小便澁大便秘加大黄桃仁湯脇脹加厚朴枳實虚煩不得眠加竹葉人參大渇煩躁加知母石膏一方治婦人血虛心腹㽲痛不可忍者去地黄加乾姜名四神湯大率産後不問下血多少煩熱進黑神散三服下血少者以大聖散間之二服以後腹内略無疼痛方服四物湯建中湯之類若服之則補住敗血為後患不淺黑神大聖非逐血藥但能推陳致新多服不妨今人往往疑其逐血性寒則不然看其用藥可見後若惡血去多徐徐補之亦不為晚不可姑息以貽後患且如古方用四物理中丸為産後進食之劑既用蜜丸又炮甘草其甜特甚豈能快脾不若只用理中湯少損甘草素有痰飲者二陳湯之類服之為佳且如姙婦惡阻古方有茯苓丸茯苓湯内有地黄竹茹川芎等豈能定嘔服之則愈見增劇大抵惡阻皆由素有痰飲以致之可用二陳湯改名茯苓湯用之極效不可不知百花膏治婦人因失血後氣弱或産後虚羸亦宜服之熟乾地黄川當歸生乾地黄川芎白茯苓馬鞭草荆芥各四兩官桂白芍藥川椒當歸各二兩枳殻牡丹皮一兩右為粗末每服四錢水一盞半入烏梅半枚煎至一大盞去滓温服食後一方食前空心日四五服若此證服至旬日或半月經脈自通諸病皆去當歸沒藥丸出保愛集治婦人真氣虛憊血氣衰少不能榮養致使經氣不來或發寒熱飲食減少怠惰嗜卧以致虛勞當歸剉沒藥川薑炮天仙子炒黑色蒼术炒黄芍藥川芎熟乾地黄各二兩右為細末麵糊丸如梧桐子大每服五十丸温粥飲食前下大效内補丸出永類鈐方治受氣虛弱五勞七傷臓腑積冷痃癖癥塊虛脹或經脈不調痼冷赤白帶