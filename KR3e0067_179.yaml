如梧桐子大毎服三十丸米飲下神效散治渇疾飲水不止白浮石蛤粉蝉殻各等分右為末用鯽魚膽七箇調三錢服不拘時神效古方驗録論痟渇有三種一者渇而飲水多小便數似脂麩片甜者痟渇病也二者喫食多不甚渇小便少似有油而數者痟中病也三者渇飲水不能多便腿腫脚先瘦少隂痿弱小便數此腎病也特息房勞千金云痟渇病所慎者有三一飲酒二房室三鹹食及麵能慎此不須服藥亦自可痟渇之人愈與未愈當須慮患大癰必扵骨節間忽發癰疽而卒予親見友人卲任道患渇數年果以癰疽而死唐祠部李郎中論消渇者腎虚所致毎發則小便甜醫者多不知其疾故古今亦闕而不言洪範言稼穡作甘以物理推之淋餳醋酒作脯法須臾即皆能甜也足明人食之後滋味皆甜流在膀胱若腰腎氣盛則上蒸精氣則下入骨髓其次以為之膏其次以為血肉也其餘則為小便故小便色黄血之餘也騷氣者五臓之氣鹹潤者則下味也腰腎既虚冷則不能蒸扵糓氣則盡下為小便故味甘不變其色清冷則肌膚枯槁也猶如乳母糓氣上騰皆為乳汁痟渇病者下泄為小便皆精氣不實扵内則小便數瘦弱也又肺為五臓華蓋若下有暖氣蒸則肺潤若下冷極則陽氣不能升故肺乾則渇易扵否卦乾上坤下陽無隂而不降隂無陽而不升上下不交故成否也譬如金中有水以火煖之其金以板覆之則煖氣上騰故板能潤也若無火力水氣則不能至此板則終不得潤也火力者則是腰腎强盛常須煖補腎氣飲食得火力則潤上而易痟亦免乾渇也故張仲景云宜服腎氣八味丸此疾與脚氣雖同為腎虛所致其脚氣始發于三月盛扵五六月衰扵七八月凢痟渇始發扵七八月盛扵十一月十二月衰扵二三月其何故也夫脚氣壅疾也痟渇宣疾也春夏陽氣上故壅疾發則宣疾愈秋冬陽氣下故宣疾發則壅疾愈也審此二者則疾可理也猶如善為政者寛以濟猛猛以濟寛隨事制度爾仲景云足太陽者是膀胱之經也膀胱者腎之腑小便數此為氣盛氣盛則消榖大便梗衰則為痟渇也男痟渇飲一㪷小便亦得一㪷宜服八味腎氣丸方見痟渇類菝葜飲治痟渇飲水無休菝葜剉炒湯瓶内鹻各一兩烏梅二兩并核搥碎焙乾右粗搗篩毎服二錢水一盞瓦器煎七分去滓稍熱細呷又方治痟渇飲水過多不知足限栝樓根一兩黄連二兩去須甘草一兩炙㣲赤剉右為散毎服三錢水一中盞煎至六分去滓毎扵食後温服又方地骨皮一兩甘草三分炙㣲赤剉桑根白皮三兩剉右為散毎服四錢以水一中盞煎至六分去滓毎扵食後温服生津丸治痟渇飲水日夜不止青蛤粉白滑石右硏為細末用黄顙魚涎和為丸如梧桐子大毎服三十丸煎陳粟米飲下不拘時神應散治痟渇飲水不休滑石研寒水石研各半兩右硏為散用生雞子一枚鑿破去黄留青調和藥末令如稠膏却納在雞殻内以帋封口用鹽泥固濟曝乾灰火内燒令通赤放冷去土并殻取藥硏令絶細為度毎服食大人二錢小兒半錢米飲調下玊壺丸治痟渇飲水不度人參栝樓根各等分右末煉蜜丸如梧桐子大毎服三十丸麥門冬湯下沃焦散治痟渇飲水無度泥鰌魚千頭隂乾去頭尾燒灰細研為末乾荷葉細研為末右等分毎服各二錢新水調下遇渇時服日三候不思水渇即止治痟渇飲水過甚并小兒渇疾方黄狗膽一枚獖猪膽一枚右件狗膽併入猪膽内隂乾丸如梧桐子大毎服以麝香湯下二丸小兒半丸黄連丸治渇疾飲水不止黄連不以多少右為末入猪肚内蒸爛同搗丸如梧桐子大毎服三四十丸飯飲下一方用猪膽汁和匀蒸食栝樓根散治痟渇飲水不止熟乾地黄生乾地黄葛根栝樓根右件各等分焙乾為細末毎服二錢温米湯飲下不拘時候文蛤散治痟渇欲飲水而不止者文蛤即五倍最能回津本草在海蛤文下甚失其性識者當自知之右為末以水飲任調下方寸匕不以時三痟丸一名𤓰連丸治渇疾飲水不止骨蒸黄連細剉用冬𤓰汁浸一宿晒乾凡七次右為末用冬瓜自然汁搜成膏子隂乾為末再用冬瓜汁作餅如此七遍為末用冬瓜汁為丸如梧桐子大毎服三四十丸冬瓜汁煎大麥湯吞下尋常渇只一服炒米飲亦可甘露散治渇疾飲水不止乾猪胞十箇右剪破出却氣去却繫著處用乾盆子一隻燒胞煙盡取出硏令極細毎服一錢温酒調下不拘時候薑魚丸治同前乾生薑一兩末右用鯽魚膽汁和丸如梧桐子大毎服七丸米飲下不拘時服之水骨丸治同前湯瓶内水􅜮一兩右硏為細末燒粟米飯和丸如梧桐子大毎服十五丸人參湯下不拘時候服一方硏如粉沸湯或井華水調服治痟渇飲水過多小便不利方葵根葉五兩切右件藥以水三大盞入生薑一分豉一合煮取二盞去滓食後分温三服治痟渇飲水過多不瘥方凌霄花一兩右搗碎以水一盞半煎至一盞去滓分三服又方人參一兩去蘆頭搗細羅為散右用雞子清調下一錢日四五服治痟渇飲水無度小便多口乾渇雉一隻右細切和塩豉作羔食治痟渇煩燥飲水無度七家井索用近鑵口結處燒為灰右不拘時候以新汲水調服二錢不過三五服效人參湯治痟渇發作有時心脾有熱飲水無度人參桑根白皮剉炒各二兩麥門冬去心焙知母枇杷葉拭去毛炙黄連去須㣲炒葛根剉白茯苓去黑皮地骨皮一兩淡竹葉一兩右剉如豆毎服五錢用水一盞半煎至八分去滓温服天花粉丸治痟渇飲水多身體瘦天花粉黄連去須各一兩茯苓當歸各半兩右為末煉蜜丸如梧桐子大毎服三十丸茅根煎湯下黄連丸治痟渇飲水絶多身體黄瘦黄連半兩去須黄丹半兩炒令色紫豆豉半兩炒乾右為末入黄丹硏令勻用軟飯和丸如梧桐子大毎扵食後以温水下五十丸栝樓丸治痟渇飲水絶多身體黄瘦栝樓根黄連去須鐡粉細研已上各等分右為末入鐡粉硏令勻煉蜜丸如梧桐子大不計時煎茅根湯下二十丸治痟渇飲水不知足兔頭一具右以水煮取汁飲之治痟渇飲水多身體黄瘦窑突上黑煤結乾似鐡屎者半斤右搗取末更以生薑四兩同搗絹袋盛以水五升浸取汁不時候冷飲半合蘭香飲子一名甘露膏治痟渇飲水極甚善食而瘦自汗大便結燥小便頻數石膏防風生甘草各一兩知母酒浸一錢半半夏二分湯洗炙甘草人參蘭香白豆寇仁黄翅桔梗升麻各半錢右同為細末湯浸蒸餅和勻成劑捻作薄片子日中曝半乾碎如米毎服二錢食後淡生薑湯送下牛黄甘露丸治三焦渇疾飲水無度舌上皺裂肌内黄瘦精神减退小便多腹脇脹硃砂一兩成塊者牛黄麝香各一兩鐡粉梧桐律犀角剉丁香鉛白霜萎𬎼地黄知母檳榔麥門冬去心牡蠣苦參石膏甘草炙鍚藺脂白扁豆各半兩慢火炒宣黄連銀箔五十片生栝樓根一兩細研金箔一百二十片不用北地者右除栝樓根别搗外同為細末煉蜜和丸臨和時即入金箔及生栝樓根一處和勻為丸如菀豆金箔三片銀箔二片碎硏空心米飲下十丸漸加二十丸飯後臨卧各一服日近輕者當日止重者三日二十日後只空心一服夜一服用金銀箔各一片一月外只用温漿水下十五丸其藥合時二月至九月即用生蔞栝根九月後只用煉蜜為丸亦得忌醎酸炙煿魚酒等治暑月渇而飲水過多乾嘔復渇不思飲食乾葛一兩炮甘草一兩炙陳粟米二匙炒右㕮咀毎服二錢水一盞煎至六分去滓食上温服一日二三次痟渇飲水腹脹附論夫痟渇飲水腹脹者由水氣流行在扵脾得濕氣不能消穀得過經絡否澁氣血行則水不得宣通停聚流溢扵膀胱之間故令脹滿也脾土制水通調水道下輸扵膀胱痟渇飲水過多内漬脾土土不制水故胃脹則為腹滿之疾也内經謂水為隂腹者至隂之所居是以水飲之證先見扵腹滿人參湯一名木香湯又名桑白皮湯出聖恵方治痟渇飲水過多心腹脹滿不能食人參一兩去蘆頭桑根白皮半兩剉黄耆三分剉陳橘皮湯浸去白一兩半夏湯浸七徧去滑半兩木香赤芍藥草豆寇去皮桂心去粗皮檳榔剉枇杷葉去毛炙已上各半兩右為散毎服三錢水一盞入生薑半分煎至六分去滓不計時候一方用枳殻無陳橘皮人參湯出聖濟總録治痟渇飲水過多心腹脹滿或脇肋間痛腰腿沈重人參白芍藥大腹子兩枚慢灰火内煨切葛根剉黄芩去黒心知母焙桑根白皮剉赤茯苓去黑心各一兩半萎𬎼一兩一分枳殻去瓤麩炒三分右㕮咀毎服三錢水一盞入生薑如棗子大拍破煎至七分去滓空心温服食後夜卧任服桂心湯散出聖恵方治痟渇飲水傷冷太過致脾氣虚腹脇脹滿不思飲食桂心人參去蘆頭白茯苓訶黎勒皮甘草炙㣲赤剉枳殻麩炒㣲黄去瓤前胡去蘆頭白术大腹皮剉各半兩厚朴一兩去粗皮塗生薑汁炙令香熟右為散毎服四錢水一中盞入生薑半分棗三枚煎至六分去滓毎扵食前温服赤茯苓湯出聖恵方治痟渇飲水太過胃氣不和不思飲食宜服此赤茯苓人參去蘆頭赤芍藥已上各半兩白术檳榔桂心前胡去蘆頭厚朴各三分去粗皮生薑汁塗炙香熟枳殻半兩麩炒㣲黄去瓤甘草半兩炙㣲赤剉右為散毎服四錢水一中盞入生薑半分棗三枚煎至六分去滓毎扵食前温服陳橘皮散出聖恵方治痟渇飲水過多心腹脹滿或脇肋間痛腰腿沈重陳橘皮一兩去白訶黎勒皮赤茯苓桂心大腹皮剉芎藭枳殻炒黃去瓤赤芍藥各半兩甘草一兩炙㣲赤剉右為散毎服四錢水一中盞入生薑半分煎至六分去滓食後温服半夏散出聖恵方治痟渇飲水腹脹煩熱嘔吐不思飲食半夏半兩湯洗七遍去滑赤茯苓人參各一兩去蘆頭白术三分木香半兩甘草半兩炙㣲赤剉陳橘皮一兩湯浸去白焙右為散毎服三錢水一中盞入生薑半分棗三枚煎至六分又竹茹一分同煎去滓不計時候温服檳榔湯出聖恵方治痟渇飲水不止小便澁心腹連膀胱脹悶胸膈煩熱檳榔剉桑根白皮剉赤茯苓去黑皮木通剉紫蘇莖葉麥門冬去心焙各一兩右㕮咀毎服四錢水一盞入生薑半分切葱白七寸煎至六分去滓不計時温服赤茯苓丸出聖濟總録治乆痟渇小便數服止小便藥多渇猶不止小便復澁兩肋連膀胱脹悶急妨心胸煩熱赤茯苓去黒皮桑根白皮剉防風麥門冬去心焙各半兩郁李仁湯浸去皮焙乾研木香各一兩右先搗前五味為細末與郁李仁硏令勻煉蜜和為劑更扵石臼内酥杵令勻熟丸如梧桐子大毎日空腹煎木通棗湯下三十丸至晩再漸加至五十丸旋覆花湯出聖濟總録治痟渇腹脇虚脹心下滿悶旋覆花净擇去莖葉㣲炒桑根白皮剉陳橘皮湯浸去白㣲炒各一兩半紫蘇并嫩莖乾者犀角鎊各半兩赤茯苓去黒皮三分右㕮咀毎服七錢水三盞入棗三枚擘生薑半分拍破鹽豉半匙同煎至一盞半去滓分温三服毎食後一服如人行五里已来更一服大黄丸出聖恵方治痟渇腹脹利大小膓川大黄三兩剉碎㣲炒栝樓根檳榔枳殻麩炒去瓤㣲黄各一兩芎藭二分桂心三分右為末煉蜜和丸如梧桐子大不計時候以温水下三十丸麥門冬湯治痟渇喉乾不可忍飲水不止腹滿急脹麥門冬去心焙烏梅去核取肉炒各二兩右呚咀毎服三錢水一中盞去滓食後温服日三桂苓甘露散治飲水不消嘔吐瀉利流濕淤注宣通氣液水腫腹脹泄瀉不能止者兼治霍亂吐瀉下痢赤白止煩渇解暑毒大有竒效兼利小水桂心去粗皮半兩白茯苓猪苓並去皮白术寒水石别研細澤瀉甘草各一兩滑石别研二兩右為細末或煎或水調二三錢任意服之或入蜜少許亦得一方有石膏一兩無猪苓普濟方卷一百七十九
