body:
  text: 普濟方卷一百七十九明周王朱橚撰痟渴門虛熱渴附論夫五臟六腑皆有津液也若五臟內虛而生熱者熱氣在內則津液竭少故為渴也夫渴者喜水其人必煩目眩背寒而嘔皆因內虛故也診其心脈滑甚者為喜渴也人因勞傷腑臟或大病後未復氣血不足隂虛內熱熱則津液燥少故渴而飲引飲不能多多則腹滿不消氣虛不勝于水故也腎瀝湯出聖濟總録治臟氣不足內燥發渴生乾地黃洗銼剖澤㵼逺志去心桂心去粗皮當歸切焙龍骨甘草炙銼五味子赤茯苓去皮芎藭人參黃芩去黑心麥門冬去心焙各二兩右粗搗篩每用羊腎一隻去筋膜切開先用水一盞半煮羊腎一盞去腎入藥末三錢再煎七分去滓溫服不拘時黃耆湯出聖濟總録治氣虛燥渴引飲黃耆細銼栝樓根銼麥門冬去心焙赤茯苓去黑皮人參甘草炙銼黃連去須知母銼焙生地黃焙兔絲子酒浸一宿焙乾肉蓯蓉酒浸一宿去皺皮銼焙石膏煆赤各一兩右㕮咀每服三錢水一盞煎七分去滓溫服不拘時木香湯治虛熱渴飲水不已心腹脹滿木香枳殼去瓤麩炒芍藥檳榔生銼各半兩桑根白皮銼炒黃耆細銼草豆蔲去皮枇杷葉拭去毛炙黃連去須各二兩桂心去粗皮一兩人參一兩半右為散每服三錢水一盞煎至七分去滓溫服不拘時鹿茸丸治虛渴煩燥不利鹿茸去毛塗酥炙黃耆細銼人參土瓜根山茱茰杜仲去粗皮切炒桑螵蛸炙各一兩栝樓根兔絲子酒浸一宿别搗研雞肶胵十枚炙乾肉蓯蓉酒浸一宿去皮右為細末煉蜜丸如梧桐子大每服三十丸酒下不拘時溫服人參湯治虛渴飲水過多身體浮滿人參黃耆細研各二兩旋覆花桑根白皮銼各二兩紫蘇葉犀角鎊屑各半兩赤茯苓去黑皮陳橘皮湯去白焙五味子去梗澤㵼各一兩半右㕮咀每服三錢水一盞半煎一盞去滓溫服不拘時黃耆丸治虛燥渴不已黃耆細銼五味子各二兩烏梅茯神去木各一兩半附子炮製去皮臍大者二枚澤㵼酸石榴皮生乾地黃焙名半兩右為細末煉蜜和丸如梧桐子大每服三十丸漿水下不拘時服之人參湯出聖濟總録治痟渴飲水無節人參二兩五味子大腹皮各三兩赤茯苓去黑皮桑根白皮銼炒黃耆細銼各一兩半芍藥黃芩去黑皮葛根銼各一兩枳殼去瓤麩炒三分右㕮咀每服三錢水一盞煎至七分去滓溫服不拘時黃連丸出聖惠方治熱渴不止心神煩燥黃連栝樓根各等分右為末以麥門冬去心煮熟爛研和丸梧桐子大每服煎小麥湯下三十丸食後服雞蘇丸出危氏方治病後虛羸發渴右雞蘇丸以北五味子煎湯吞下後服安腎丸雞蘇丸方見諸血門鼻衄血類安腎丸方見虛勞門虛勞類薏苡仁湯出聖濟總録治虛不止渴薏苡仁五味子各一兩半覆盆子生乾地黃銼焙枸杞各一兩紫蘇莖葉黃耆細銼木通各一兩白茯苓去黑皮三兩右㕮咀每服三錢水一盞煎至七分去滓溫服不拘時清心蓮子飲出危氏方治心中蓄熱時常煩燥因而思慮勞力憂愁抑鬱是致小便白濁或有沙膜夜夢泄遺瀝澀痛便赤如血或因酒色過度上盛下虛心火炎上肺金受尅口舌乾燥漸成痟渴睡卧不安四肢多倦怠男子五淋婦人帶下赤白及病後氣不收斂陽浮于外五心煩熱藥性溫平不冷不熱常服清心養神祕精補虛滋潤腸胃調順血氣黃芩去心半兩黃耆去蘆蜜炙石蓮肉去心白茯苓去皮人參去蘆各七分麥門冬去心甘草地骨皮車前子去土炒各半兩右銼散每服三錢麥門冬十粒去心水一盞煎取八分去滓水中浸冷空腹服發熱加柴胡薄荷煎茯苓湯出聖惠方治心脾熱渴不止小便難宜服此赤茯苓一兩蘆根一兩銼黃芩一兩知母一兩栝樓根一兩瞿麥穗一兩麥門冬一兩去心甘草一兩炙赤銼木通一兩銼右為散每服四錢水一中盞入生薑半分煎至六分去滓不計時溫服地黃丸出聖濟總録治臟虛舌本燥渴引飲不已熟乾地黃銼焙山茱茰山茅澤㵼牡丹皮白茯苓去黑皮附子炮製去皮臍各一兩桂心去粗皮一分右為細末煉蜜丸如梧桐子大每服三十丸溫水下不拘時天竺黃散出聖惠方治熱渴天竺黃一兩細研黃連一兩去須茯神一兩甘草一兩炙微赤銼川芒硝一兩犀角屑栝樓根一兩川升麻一兩右為散入研了藥令勻每于食後煎淡竹葉湯調下一錢黃耆散出聖惠方治脾胃中熱煩渴不止黃耆一兩銼茯神一兩生乾地黃一兩地骨皮一兩栝樓一兩麥門冬一兩去心黃芩一兩甘草半兩炙微赤銼右為散每服四錢水一盞入生薑半分淡竹葉二七片煎至六分去滓不計時候溫服豬肚黃連丸出聖惠方治脾胃熱渴不止羸瘦困乏豬肚一枚淨洗黃連三兩去須别搗為末栝樓根一兩白梁米一合淨淘柴胡一兩去苖茯神一兩知母一兩麥門冬二兩去心焙右為末先將黃連末及米入肚內縫合蒸爛熟砂盆內研如膏入藥末和令勻丸如梧桐子大不計時以清粥飲下三十丸知母散出聖惠方治心脾實熱煩渴不止知母一兩蘆根一兩半銼栝樓根一兩麥門冬一兩去心黃芩三分川大黃一兩銼碎微炒甘草半兩炙微赤銼右為散每服四錢水一中盞煎至六分去滓不計時候溫服赤茯苓散出聖惠方治脾胃中熱引飲水漿渴不止赤茯苓栝樓根黃芩麥門冬去心生乾地黃知母各一兩右為散每服五錢水一大盞入生薑半分小麥半合淡竹葉二七片煎至五分去滓不計時候溫服人參散出神效方治身熱頭痛或積熱黃瘦或發熱惡寒畜熱寒戰或膈熱嘔吐燥熱煩渴瀉痢或目赤口乾或咽喉腫痛或風熱昏眩或蒸熱虛汗肺痿勞嗽一切邪熱脾胃肺腎不調及真隂損虛並宜服之石膏一兩寒水石一兩滑石四兩甘草一兩人參半兩或無亦得右為細末每服二錢溫水調下或冷水亦得早晚食後兼服梔子金花丸一名既濟解毒丸茯神丸出聖惠方治心脾壅熱煩渴口乾宜服此知母栝樓根各一兩麥門冬二兩去心焙黃連茯神各一兩右為末煉蜜和搗三二百杵丸如梧桐子大不計時以清粥飲下三十丸人參竹葉湯出千金方治熱病後虛熱渴四肢煩疼葛根一斤人參甘草各一兩竹葉一把右吺咀水一斗五升煮取五升渴飲之日三夜一龍硃散出聖惠方治心肝熱渴面赤口乾宜服之馬牙硝半斤川芒硝四兩寒水石四兩石膏三兩右件藥以水五升浸三日用銀器中煎至水盡後去寒水石及石膏隂乾别入龍腦半兩硃砂一兩同研為末不計時候蜜水調下一錢兼治喉痺腫痛甚妙石膏湯出聖惠方治熱極渴不止麥門冬一兩去心石膏二兩蘆根一兩右件為散每服半兩水一盞煎至五分去滓不計時候溫服黃連膏出聖惠方治熱渴不止心神煩燥宜服此黃連五兩去須搗為末地黃汁一兩蜜五合右件藥于銀器中以慢火煎成膏收于瓷器中每于食後煎竹葉麥門冬湯計彈子大服之黃連散出聖惠方治心肺熱煩渴口乾宜服之豉一合黃連一兩去須右為散每服半兩水一大盞煎至五分去滓每于食後溫服麥門冬湯出聖惠方治證同前黃連半兩去須麥門冬一兩去心右為散每服半兩水一盞煎至五分去滓每于食後溫服浮萍丸出聖惠方治熱渴不止心神煩燥浮萍右取水洗曝乾為末以牛乳汁和丸如梧桐子大每服三十丸不計時候以粥飲下麥門冬丸出聖濟總録治臟虛乾燥發渴飲水方見本門痟渴口乾燥類參茯白术散出如宜方治病後脾虛津液燥或有餘熱虛渴白扁豆薑汁浸炒去皮茯苓山藥人參甘草蓮肉砂仁桔梗薏苡仁炒各二兩右為末加烏梅天花粉煎上膈熱宜雞蘇丸治中熱酒渴疾出本草生葛右冬月取以水中揉出粉澄成挅先煎湯使沸後擘成塊下湯中良久色如膠其體甚韌以蜜湯中拌食之擦少生薑尤佳多食行少便亦能使人利治虛熱渴出本草葎草右以煮汁及生汁服之治熱渴心悶出本草地漿右水一大盞掘地作坎以水沃其中攪令濁俄頃取飲之解熱渴出本草酢漿草右取食之治虛熱渴出本草桃膠右以如彈丸含之佳治下虛上熱而渴出永類鈴方菝葜根右每服一兩水二盞半煎減半日三服渴減只二服治熱渴心悶橘皮甘草右等分煮飲時服咽之勿煩使多喫但以熱土及熬熱灰土壅其臍上為佳以溫湯喫飲之亦可治熱渴心悶麵右取一兩以溫水一中盞攪和服之胃熱渴附論夫胃氣實則生熱熱則土氣內燥津液不通咽膈煩滿故渴而引飲內經謂脾氣熱則胃乾而渴蓋臟貞濡于脾脾合為胃行其津液者也脾既受熱津液不濡于胃胃乾則渴不止也黃連湯出聖惠方治脾胃中熱煩渴身漸消瘦宜服此黃連一兩去須川升麻一兩麥門冬一兩去心黃芩一兩栝樓根一兩知母一兩茯神半兩梔子仁一兩甘草一兩炙微赤銼石膏二兩右為散每服四錢以水一中盞煎至六分去滓不計時候溫服茯神湯出千金方泄熱止渴治胃腑實熱引飲常渴茯神二兩外臺作茯苓栝樓根生麥門冬各五兩萎㽔知母各四兩生地黃六兩小麥二升大棗二十枚淡竹葉切三升右㕮咀水三斗煮小麥竹葉取九升去滓下藥煮取四升分四服服時不問早晚但渴即進非但止胃渴通治渴患熱者枸杞根湯出聖濟總録治胃乾渴不止飲水枸杞根栝樓根麥門冬生去心黃連去須各一兩半土瓜根乾者知母車前子去土各一兩右銼如麻豆每服五錢水一盞半入生地黃半兩切同煎至八分去滓溫服日三開胃解熱渴飲子出廣南四時攝生論大黃甘草各半兩半夏十箇生薑三兩好棗五七箇右用水一大銚同煎至八分旋取溫服之不拘時栝樓湯出聖濟總録栝樓根生薑各五兩生麥門冬汁蘆根切二升茅根切三升右㕮咀水一斗煮取三升分三服茯神湯出聖濟總録治胃渴引飲泄熱茯神去木二兩栝樓根麥門冬去心各五兩知母銼萎㽔各四兩右粗搗篩先水三盞淘小麥一匙淡竹葉五十片洗切同煮至一盞半去滓下藥末四錢棗三枚擘破生地黃半分同煎至一盞去滓溫服日三甘草湯出聖濟總録治胃熱乾渴甘草炙銼栝樓根各二兩麥門冬去心焙二分半夏湯先去滑七遍曝乾麩炒二兩半右粗搗篩水二盞淘小麥半合煎至盞半去麥下藥末五錢大棗三枚擘破生地黃半錢生薑一棗大拍破再煎至八分去滓溫服日再服栝樓根湯出聖濟總録治胃中乾渴栝樓根三兩知母焙二兩甘草炙銼人參各一兩右㕮咀每服三錢水一盞煎至七分去滓下白蜜少許攪勻不拘時候服日可數服黃耆湯出聖濟總録治胃乾渴洗心飲子出廣南四時攝生論甘草芍藥山梔杏仁去尖研入右等分為散每服三錢水二盞煎至八分夜後溫服冷湯出廣南四時攝生論甘草二十炮大棗五箇竹葉十四片熟附子末少許人參少許右微銼碎用水煮放冷時時服之治胃中熱痟渴利小便出本草陳粟米右炊飲食之暴渴附論夫暴渴緣熱甚腠理開汗大泄而津液暴燥故渴而飲引小便利者不能為害若三焦不和心肺壅熱胃中乾燥渴而小便不利者須變飲證不可不察喜渴者由心熱也心主于便汗便汗出多則腎中虛燥故令渴也凡夏月渴而汗出多則小便少冬月不汗故小便多此皆是平人之候名曰暴渴也蘆根散出聖惠方治暴渴飲水多或乾嘔蘆根一兩半銼人參半兩去蘆頭百合三分麥門冬一兩去心桑根白皮三分銼黃耆三分銼赤茯苓三分黃芩三分葛根三分炙微赤銼右為散每服四錢水一中盞入生薑半分淡竹葉二十片煎六分去滓不計時候溫服地骨皮湯出聖惠方治脾虛熱暴渴不已地骨皮栝樓根黃連麥門冬去心焙黃芩去黑心各一兩茯神去木逺志去心各三分甘草炙焙半兩石膏碎二兩右㕮咀每服三錢水一盞煎至七分去滓溫服不拘時蘆根湯出聖惠方治暴渴煩熱蘆根銼麥門冬去心焙栝樓根地骨皮各兩白