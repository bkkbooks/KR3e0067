body:
  text: 普濟方卷一百七十九明周王朱橚撰痟渇門虚熱渇附論夫五臓六腑皆有津液也若五臓内虚而生熱者熱氣在内則津液竭少故為渇也夫渇者喜水其人必煩目眩背寒而嘔皆因内虚故也診其心脈滑甚者為喜渇也人因勞傷腑臓或大病後未復氣血不足隂虚内熱熱則津液燥少故渇而飲引飲不能多多則腹滿不消氣虚不勝扵水故也腎瀝湯出聖濟總録治臓氣不足内燥發渇生乾地黄洗剉剖澤㵼逺志去心桂心去粗皮當歸切焙龍骨甘草炙剉五味子赤茯苓去皮芎藭人參黄芩去黒心麥門冬去心焙各二兩右粗搗篩毎用羊腎一隻去筋膜切開先用水一盞半煮羊腎一盞去腎入藥末三錢再煎七分去滓温服不拘時黄耆湯出聖濟總録治氣虚燥渇引飲黄耆細剉栝樓根剉麥門冬去心焙赤茯苓去黒皮人參甘草炙剉黄連去須知母剉焙生地黄焙兔絲子酒浸一宿焙乾肉蓯蓉酒浸一宿去皺皮剉焙石膏煆赤各一兩右㕮咀毎服三錢水一盞煎七分去滓温服不拘時木香湯治虚熱渇飲水不已心腹脹滿木香枳殻去瓤麩炒芍藥檳榔生剉各半兩桑根白皮剉炒黄耆細剉草豆蔲去皮枇杷葉拭去毛炙黄連去須各二兩桂心去粗皮一兩人參一兩半右為散毎服三錢水一盞煎至七分去滓温服不拘時鹿茸丸治虚渇煩燥不利鹿茸去毛塗酥炙黄耆細剉人參土瓜根山茱茰杜仲去粗皮切炒桑螵蛸炙各一兩栝樓根兔絲子酒浸一宿别搗研雞肶胵十枚炙乾肉蓯蓉酒浸一宿去皮右為細末煉蜜丸如梧桐子大毎服三十丸酒下不拘時温服人參湯治虚渇飲水過多身體浮滿人參黄耆細研各二兩旋覆花桑根白皮剉各二兩紫蘇葉犀角鎊屑各半兩赤茯苓去黒皮陳橘皮湯去白焙五味子去梗澤㵼各一兩半右㕮咀毎服三錢水一盞半煎一盞去滓温服不拘時黄耆丸治虚燥渇不已黄耆細剉五味子各二兩烏梅茯神去木各一兩半附子炮製去皮臍大者二枚澤㵼酸石榴皮生乾地黄焙名半兩右為細末煉蜜和丸如梧桐子大毎服三十丸漿水下不拘時服之人參湯出聖濟總録治痟渇飲水無節人參二兩五味子大腹皮各三兩赤茯苓去黒皮桑根白皮剉炒黄耆細剉各一兩半芍藥黄芩去黑皮葛根剉各一兩枳殻去瓤麩炒三分右㕮咀毎服三錢水一盞煎至七分去滓温服不拘時黄連丸出聖恵方治熱渇不止心神煩燥黄連栝樓根各等分右為末以麥門冬去心煮熟爛硏和丸梧桐子大毎服煎小麥湯下三十丸食後服雞蘓丸出危氏方治病後虚羸發渇右雞蘓丸以北五味子煎湯吞下後服安腎丸雞蘓丸方見諸血門鼻衂血類安腎丸方見虚勞門虚勞類薏苡仁湯出聖濟總録治虚不止渇薏苡仁五味子各一兩半覆盆子生乾地黄剉焙枸杞各一兩紫蘓莖葉黄耆細剉木通各一兩白茯苓去黒皮三兩右㕮咀毎服三錢水一盞煎至七分去滓温服不拘時清心蓮子飲出危氏方治心中蓄熱時常煩燥因而思慮勞力憂愁抑鬰是致小便白濁或有沙膜夜夢泄遺瀝澁痛便赤如血或因酒色過度上盛下虚心火炎上肺金受尅口舌乾燥漸成痟渇睡卧不安四肢多倦怠男子五淋婦人帯下赤白及病後氣不收歛陽浮扵外五心煩熱藥性温平不冷不熱常服清心養神秘精補虚滋潤膓胃調順血氣黄芩去心半兩黄耆去蘆蜜炙石蓮肉去心白茯苓去皮人參去蘆各七分麥門冬去心甘草地骨皮車前子去土炒各半兩右剉散毎服三錢麥門冬十粒去心水一盞煎取八分去滓水中浸冷空腹服發熱加柴胡薄荷煎茯苓湯出聖恵方治心脾熱渇不止小便難宜服此赤茯苓一兩蘆根一兩剉黄芩一兩知母一兩栝樓根一兩瞿麥穂一兩麥門冬一兩去心甘草一兩炙赤剉木通一兩剉右為散毎服四錢水一中盞入生薑半分煎至六分去滓不計時温服地黄丸出聖濟總録治臓虚舌本燥渇引飲不已熟乾地黄剉焙山茱茰山茅澤㵼牡丹皮白茯苓去黑皮附子炮製去皮臍各一兩桂心去粗皮一分右為細末煉蜜丸如梧桐子大毎服三十丸温水下不拘時天竺黄散出聖恵方治熱渇天竺黄一兩細研黄連一兩去須茯神一兩甘草一兩炙㣲赤剉川芒硝一兩犀角屑栝樓根一兩川升麻一兩右為散入硏了藥令勻毎扵食後煎淡竹葉湯調下一錢黄耆散出聖恵方治脾胃中熱煩渇不止黄耆一兩剉茯神一兩生乾地黄一兩地骨皮一兩栝樓一兩麥門冬一兩去心黄芩一兩甘草半兩炙㣲赤剉右為散毎服四錢水一盞入生薑半分淡竹葉二七片煎至六分去滓不計時候温服猪肚黄連丸出聖恵方治脾胃熱渇不止羸瘦困乏猪肚一枚净洗黄連三兩去須别搗為末栝樓根一兩白梁米一合净淘柴胡一兩去苖茯神一兩知母一兩麥門冬二兩去心焙右為末先將黄連末及米入肚内縫合蒸爛熟砂盆内硏如膏入藥末和令勻丸如梧桐子大不計時以清粥飲下三十丸知母散出聖恵方治心脾實熱煩渇不止知母一兩蘆根一兩半剉栝樓根一兩麥門冬一兩去心黄芩三分川大黄一兩剉碎㣲炒甘草半兩炙㣲赤剉右為散毎服四錢水一中盞煎至六分去滓不計時候温服赤茯苓散出聖恵方治脾胃中熱引飲水漿渇不止赤茯苓栝樓根黄芩麥門冬去心生乾地黄知母各一兩右為散毎服五錢水一大盞入生薑半分小麥半合淡竹葉二七片煎至五分去滓不計時候温服人參散出神効方治身熱頭痛或積熱黄瘦或發熱惡寒畜熱寒戰或膈熱嘔吐燥熱煩渇瀉痢或目赤口乾或咽喉腫痛或風熱昏眩或蒸熱虚汗肺痿勞𠻳一切邪熱脾胃肺腎不調及真隂損虚並宜服之石膏一兩寒水石一兩滑石四兩甘草一兩人參半兩或無亦得右為細末毎服二錢温水調下或冷水亦得早晩食後兼服梔子金花丸一名既濟解毒丸茯神丸出聖恵方治心脾壅熱煩渇口乾宜服此知母栝樓根各一兩麥門冬二兩去心焙黄連茯神各一兩右為末煉蜜和搗三二百杵丸如梧桐子大不計時以清粥飲下三十丸人參竹葉湯出千金方治熱病後虚熱渇四肢煩疼葛根一斤人參甘草各一兩竹葉一把右吺咀水一斗五升煮取五升渇飲之日三夜一龍硃散出聖恵方治心肝熱渇面赤口乾宜服之馬牙硝半斤川芒硝四兩寒水石四兩石膏三兩右件藥以水五升浸三日用銀器中煎至水盡後去寒水石及石膏隂乾别入龍腦半兩硃砂一兩同硏為末不計時候蜜水調下一錢兼治喉痺腫痛甚妙石膏湯出聖恵方治熱極渇不止麥門冬一兩去心石膏二兩蘆根一兩右件為散毎服半兩水一盞煎至五分去滓不計時候温服黄連膏出聖恵方治熱渇不止心神煩燥宜服此黄連五兩去須搗為末地黄汁一兩蜜五合右件藥扵銀器中以慢火煎成膏收扵甆器中毎扵食後煎竹葉麥門冬湯計弹子大服之黄連散出聖恵方治心肺熱煩渇口乾宜服之豉一合黄連一兩去須右為散毎服半兩水一大盞煎至五分去滓毎扵食後温服麥門冬湯出聖恵方治證同前黄連半兩去須麥門冬一兩去心右為散毎服半兩水一盞煎至五分去滓毎扵食後温服浮萍丸出聖恵方治熱渇不止心神煩燥浮萍右取水洗曝乾為末以牛乳汁和丸如梧桐子大毎服三十丸不計時候以粥飲下麥門冬丸出聖濟總録治臓虚乾燥發渇飲水方見本門痟渇口乾燥類參茯白术散出如宜方治病後脾虚津液燥或有餘熱虚渇白扁豆姜汁浸炒去皮茯苓山藥人參甘草蓮肉砂仁桔梗薏苡仁炒各二兩右為末加烏梅天花粉煎上膈熱宜雞蘓丸治中熱酒渇疾出本草生葛右冬月取以水中揉出粉澄成挅先煎湯使沸後擘成塊下湯中良乆色如膠其體甚靱以蜜湯中拌食之擦少生薑尤佳多食行少便亦能使人利治虚熱渇出本草葎草右以煮汁及生汁服之治熱渇心悶出本草地漿右水一大盞掘地作坎以水沃其中攪令濁俄頃取飲之解熱渇出本草酢漿草右取食之治虚熱渇出本草桃膠右以如弹丸含之佳治下虚上熱而渇出永類鈴方菝葜根右毎服一兩水二盞半煎减半日三服渇减只二服治熱渇心悶橘皮甘草右等分煮飲時服嚥之勿煩使多喫但以熱土及熬熱灰土壅其臍上為佳以温湯喫飲之亦可治熱渇心悶麵右取一兩以温水一中盞攪和服之胃熱渇附論夫胃氣實則生熱熱則土氣内燥津液不通咽膈煩滿故渇而引飲内經謂脾氣熱則胃乾而渇盖臓貞濡扵脾脾合為胃行其津液者也脾既受熱津液不濡扵胃胃乾則渇不止也黄連湯出聖恵方治脾胃中熱煩渇身漸消瘦宜服此黄連一兩去須川升麻一兩麥門冬一兩去心黄芩一兩栝樓根一兩知母一兩茯神半兩梔子仁一兩甘草一兩炙㣲赤剉石膏二兩右為散毎服四錢以水一中盞煎至六分去滓不計時候温服茯神湯出千金方洩熱止渇治胃腑實熱引飲常渇茯神二兩外臺作茯苓栝樓根生麥門冬各五兩萎㽔知母各四兩生地黄六兩小麥二升大棗二十枚淡竹葉切三升右㕮咀水三斗煮小麥竹葉取九升去滓下藥煮取四升分四服服時不問早晩但渇即進非但止胃渇通治渇患熱者枸杞根湯出聖濟總録治胃乾渇不止飲水枸杞根栝樓根麥門冬生去心黄連去須各一兩半土瓜根乾者知母車前子去土各一兩右剉如麻豆毎服五錢水一盞半入生地黄半兩切同煎至八分去滓温服日三開胃解熱渇飲子出廣南四時攝生論大黄甘草各半兩半夏十箇生薑三兩好棗五七箇右用水一大銚同煎至八分旋取温服之不拘時栝樓湯出聖濟總録栝樓根生薑各五兩生麥門冬汁蘆根切二升茅根切三升右㕮咀水一斗煮取三升分三服茯神湯出聖濟總録治胃渇引飲泄熱茯神去木二兩栝樓根麥門冬去心各五兩知母剉萎㽔各四兩右粗搗篩先水三盞淘小麥一匙淡竹葉五十片洗切同煮至一盞半去滓下藥末四錢棗三枚擘破生地黄半分同煎至一盞去滓温服日三甘草湯出聖濟總録治胃熱乾渇甘草炙剉栝樓根各二兩麥門冬去心焙二分半夏湯先去滑七徧曝乾麩炒二兩半右粗搗篩水二盞淘小麥半合煎至盞半去麥下藥末五錢大棗三枚擘破生地黄半錢生薑一棗大拍破再煎至八分去滓温服日再服栝樓根湯出聖濟總録治胃中乾渇栝樓根三兩知母焙二兩甘草炙剉人參各一兩右㕮咀毎服三錢水一盞煎至七分去滓下白蜜少許攪勻不拘時候服日可數服黄耆湯出聖濟總録治胃乾渇洗心飲子出廣南四時攝生論甘草芍藥山梔杏仁去尖研入右等分為散毎服三錢水二盞煎至八分夜後温服冷湯出廣南四時攝生論甘草二十炮大棗五箇竹葉十四片熟附子末少許人參少許右㣲剉碎用水煮放冷時時服之治胃中熱痟渇利小便出本草陳粟米右炊飲食之暴渇附論夫暴渇縁熱甚腠理開汗大泄而津液暴燥故渇而飲引小便利者不能為害若三焦不和心肺壅熱胃中乾燥渇而小便不利者須變飲證不可不察喜渇者由心熱也心主扵便汗便汗出多則腎中虚燥故令渇也凡夏月渇而汗出多則小便少冬月不汗故小便多此皆是平人之候名曰暴渇也蘆根散出聖恵方治暴渇飲水多或乾嘔蘆根一兩半剉人參半兩去蘆頭百合三分麥門冬一兩去心桑根白皮三分剉黄耆三分剉赤茯苓三分黄芩三分葛根三分炙㣲赤剉右為散毎服四錢水一中盞入生薑半分淡竹葉二十片煎六分去滓不計時候温服地骨皮湯出聖恵方治脾虚熱暴渇不已地骨皮栝樓根黄連麥門冬去心焙黄芩去黒心各一兩茯神去木逺志去心各三分甘草炙焙半兩石膏碎二兩右㕮咀毎服三錢水一盞煎至七分去滓温服不拘時蘆根湯出聖恵方治暴渇煩熱蘆根剉麥門冬去心焙栝樓根地骨皮各兩白