如梧桐子大每服三十丸米飲下神效散治渴疾飲水不止白浮石蛤粉蟬殼各等分右為末用鯽魚膽七箇調三錢服不拘時神效古方驗録論痟渴有三種一者渴而飲水多小便數似脂麩片甜者痟渴病也二者喫食多不甚渴小便少似有油而數者痟中病也三者渴飲水不能多便腿腫腳先瘦少隂痿弱小便數此腎病也特息房勞千金云痟渴病所慎者有三一飲酒二房室三鹹食及麵能慎此不須服藥亦自可痟渴之人愈與未愈當須慮患大癰必于骨節間忽發癰疽而卒豫親見友人卲任道患渴數年果以癰疽而死唐祠部李郎中論消渴者腎虛所致每發則小便甜醫者多不知其疾故古今亦闕而不言洪範言稼穡作甘以物理推之淋餳醋酒作脯法須臾即皆能甜也足明人食之後滋味皆甜流在膀胱若腰腎氣盛則上蒸精氣則下入骨髓其次以為之膏其次以為血肉也其餘則為小便故小便色黃血之餘也騷氣者五臟之氣鹹潤者則下味也腰腎既虛冷則不能蒸于穀氣則盡下為小便故味甘不變其色清冷則肌膚枯稿也猶如乳母穀氣上騰皆為乳汁痟渴病者下泄為小便皆精氣不實于內則小便數瘦弱也又肺為五臟華蓋若下有暖氣蒸則肺潤若下冷極則陽氣不能升故肺乾則渴易于否卦乾上坤下陽無隂而不降隂無陽而不升上下不交故成否也譬如金中有水以火暖之其金以板覆之則暖氣上騰故板能潤也若無火力水氣則不能至此板則終不得潤也火力者則是腰腎強盛常須暖補腎氣飲食得火力則潤上而易痟亦免乾渴也故張仲景云宜服腎氣八味丸此疾與腳氣雖同為腎虛所致其腳氣始發于三月盛于五六月衰于七八月凡痟渴始發于七八月盛于十一月十二月衰于二三月其何故也夫腳氣壅疾也痟渴宣疾也春夏陽氣上故壅疾發則宣疾愈秋冬陽氣下故宣疾發則壅疾愈也審此二者則疾可理也猶如善為政者寬以濟猛猛以濟寬隨事制度爾仲景云足太陽者是膀胱之經也膀胱者腎之腑小便數此為氣盛氣盛則消榖大便梗衰則為痟渴也男痟渴飲一斗小便亦得一斗宜服八味腎氣丸方見痟渴類菝葜飲治痟渴飲水無休菝葜銼炒湯瓶內鹻各一兩烏梅二兩并核捶碎焙乾右粗搗篩每服二錢水一盞瓦器煎七分去滓稍熱細呷又方治痟渴飲水過多不知足限栝樓根一兩黃連二兩去須甘草一兩炙微赤銼右為散每服三錢水一中盞煎至六分去滓每于食後溫服又方地骨皮一兩甘草三分炙微赤銼桑根白皮三兩銼右為散每服四錢以水一中盞煎至六分去滓每于食後溫服生津丸治痟渴飲水日夜不止青蛤粉白滑石右研為細末用黃顙魚涎和為丸如梧桐子大每服三十丸煎陳粟米飲下不拘時神應散治痟渴飲水不休滑石研寒水石研各半兩右研為散用生雞子一枚鑿破去黃留青調和藥末令如稠膏却納在雞殼內以紙封口用鹽泥固濟曝乾灰火內燒令通赤放冷去土并殼取藥研令絶細為度每服食大人二錢小兒半錢米飲調下玊壺丸治痟渴飲水不度人參栝樓根各等分右末煉蜜丸如梧桐子大每服三十丸麥門冬湯下沃焦散治痟渴飲水無度泥鰌魚千頭隂乾去頭尾燒灰細研為末乾荷葉細研為末右等分每服各二錢新水調下遇渴時服日三候不思水渴即止治痟渴飲水過甚并小兒渴疾方黃狗膽一枚獖豬膽一枚右件狗膽併入豬膽內隂乾丸如梧桐子大每服以麝香湯下二丸小兒半丸黃連丸治渴疾飲水不止黃連不以多少右為末入豬肚內蒸爛同搗丸如梧桐子大每服三四十丸飯飲下一方用豬膽汁和勻蒸食栝樓根散治痟渴飲水不止熟乾地黃生乾地黃葛根栝樓根右件各等分焙乾為細末每服二錢溫米湯飲下不拘時候文蛤散治痟渴欲飲水而不止者文蛤即五倍最能回津本草在海蛤文下甚失其性識者當自知之右為末以水飲任調下方寸匕不以時三痟丸一名瓜連丸治渴疾飲水不止骨蒸黃連細銼用冬瓜汁浸一宿晒乾凡七次右為末用冬瓜自然汁搜成膏子隂乾為末再用冬瓜汁作餅如此七遍為末用冬瓜汁為丸如梧桐子大每服三四十丸冬瓜汁煎大麥湯吞下尋常渴只一服炒米飲亦可甘露散治渴疾飲水不止乾豬胞十箇右剪破出却氣去却繫著處用乾盆子一隻燒胞煙盡取出研令極細每服一錢溫酒調下不拘時候薑魚丸治同前乾生薑一兩末右用鯽魚膽汁和丸如梧桐子大每服七丸米飲下不拘時服之水骨丸治同前湯瓶內水􅜮一兩右研為細末燒粟米飯和丸如梧桐子大每服十五丸人參湯下不拘時候服一方研如粉沸湯或井華水調服治痟渴飲水過多小便不利方葵根葉五兩切右件藥以水三大盞入生薑一分豉一合煮取二盞去滓食後分溫三服治痟渴飲水過多不瘥方凌霄花一兩右搗碎以水一盞半煎至一盞去滓分三服又方人參一兩去蘆頭搗細羅為散右用雞子清調下一錢日四五服治痟渴飲水無度小便多口乾渴雉一隻右細切和鹽豉作羔食治痟渴煩燥飲水無度七家井索用近罐口結處燒為灰右不拘時候以新汲水調服二錢不過三五服效人參湯治痟渴發作有時心脾有熱飲水無度人參桑根白皮銼炒各二兩麥門冬去心焙知母枇杷葉拭去毛炙黃連去須微炒葛根銼白茯苓去黑皮地骨皮一兩淡竹葉一兩右銼如豆每服五錢用水一盞半煎至八分去滓溫服天花粉丸治痟渴飲水多身體瘦天花粉黃連去須各一兩茯苓當歸各半兩右為末煉蜜丸如梧桐子大每服三十丸茅根煎湯下黃連丸治痟渴飲水絶多身體黃瘦黃連半兩去須黃丹半兩炒令色紫豆豉半兩炒乾右為末入黃丹研令勻用軟飯和丸如梧桐子大每于食後以溫水下五十丸栝樓丸治痟渴飲水絶多身體黃瘦栝樓根黃連去須鐡粉細研已上各等分右為末入鐡粉研令勻煉蜜丸如梧桐子大不計時煎茅根湯下二十丸治痟渴飲水不知足兔頭一具右以水煮取汁飲之治痟渴飲水多身體黃瘦窑突上黑煤結乾似鐡屎者半斤右搗取末更以生薑四兩同搗絹袋盛以水五升浸取汁不時候冷飲半合蘭香飲子一名甘露膏治痟渴飲水極甚善食而瘦自汗大便結燥小便頻數石膏防風生甘草各一兩知母酒浸一錢半半夏二分湯洗炙甘草人參蘭香白豆寇仁黃翅桔梗升麻各半錢右同為細末湯浸蒸餅和勻成劑捻作薄片子日中曝半乾碎如米每服二錢食後淡生薑湯送下牛黃甘露丸治三焦渴疾飲水無度舌上皺裂肌內黃瘦精神減退小便多腹脅脹硃砂一兩成塊者牛黃麝香各一兩鐡粉梧桐律犀角銼丁香鉛白霜萎𬎼地黃知母檳榔麥門冬去心牡蠣苦參石膏甘草炙鍚藺脂白扁豆各半兩慢火炒宣黃連銀箔五十片生栝樓根一兩細研金箔一百二十片不用北地者右除栝樓根别搗外同為細末煉蜜和丸臨和時即入金箔及生栝樓根一處和勻為丸如菀豆金箔三片銀箔二片碎研空心米飲下十丸漸加二十丸飯後臨卧各一服日近輕者當日止重者三日二十日後只空心一服夜一服用金銀箔各一片一月外只用溫漿水下十五丸其藥合時二月至九月即用生蔞栝根九月後只用煉蜜為丸亦得忌醎酸炙煿魚酒等治暑月渴而飲水過多乾嘔復渴不思飲食乾葛一兩炮甘草一兩炙陳粟米二匙炒右㕮咀每服二錢水一盞煎至六分去滓食上溫服一日二三次痟渴飲水腹脹附論夫痟渴飲水腹脹者由水氣流行在于脾得濕氣不能消穀得過經絡否澀氣血行則水不得宣通停聚流溢于膀胱之間故令脹滿也脾土制水通調水道下輸于膀胱痟渴飲水過多內漬脾土土不制水故胃脹則為腹滿之疾也內經謂水為隂腹者至隂之所居是以水飲之證先見于腹滿人參湯一名木香湯又名桑白皮湯出聖惠方治痟渴飲水過多心腹脹滿不能食人參一兩去蘆頭桑根白皮半兩銼黃耆三分銼陳橘皮湯浸去白一兩半夏湯浸七遍去滑半兩木香赤芍藥草豆寇去皮桂心去粗皮檳榔銼枇杷葉去毛炙已上各半兩右為散每服三錢水一盞入生薑半分煎至六分去滓不計時候一方用枳殼無陳橘皮人參湯出聖濟總録治痟渴飲水過多心腹脹滿或脅肋間痛腰腿沈重人參白芍藥大腹子兩枚慢灰火內煨切葛根銼黃芩去黑心知母焙桑根白皮銼赤茯苓去黑心各一兩半萎𬎼一兩一分枳殼去瓤麩炒三分右㕮咀每服三錢水一盞入生薑如棗子大拍破煎至七分去滓空心溫服食後夜卧任服桂心湯散出聖惠方治痟渴飲水傷冷太過致脾氣虛腹脅脹滿不思飲食桂心人參去蘆頭白茯苓訶黎勒皮甘草炙微赤銼枳殼麩炒微黃去瓤前胡去蘆頭白术大腹皮銼各半兩厚朴一兩去粗皮塗生薑汁炙令香熟右為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓每于食前溫服赤茯苓湯出聖惠方治痟渴飲水太過胃氣不和不思飲食宜服此赤茯苓人參去蘆頭赤芍藥已上各半兩白术檳榔桂心前胡去蘆頭厚朴各三分去粗皮生薑汁塗炙香熟枳殼半兩麩炒微黃去瓤甘草半兩炙微赤銼右為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓每于食前溫服陳橘皮散出聖惠方治痟渴飲水過多心腹脹滿或脅肋間痛腰腿沈重陳橘皮一兩去白訶黎勒皮赤茯苓桂心大腹皮銼芎藭枳殼炒黃去瓤赤芍藥各半兩甘草一兩炙微赤銼右為散每服四錢水一中盞入生薑半分煎至六分去滓食後溫服半夏散出聖惠方治痟渴飲水腹脹煩熱嘔吐不思飲食半夏半兩湯洗七遍去滑赤茯苓人參各一兩去蘆頭白术三分木香半兩甘草半兩炙微赤銼陳橘皮一兩湯浸去白焙右為散每服三錢水一中盞入生薑半分棗三枚煎至六分又竹茹一分同煎去滓不計時候溫服檳榔湯出聖惠方治痟渴飲水不止小便澀心腹連膀胱脹悶胸膈煩熱檳榔銼桑根白皮銼赤茯苓去黑皮木通銼紫蘇莖葉麥門冬去心焙各一兩右㕮咀每服四錢水一盞入生薑半分切蔥白七寸煎至六分去滓不計時溫服赤茯苓丸出聖濟總録治久痟渴小便數服止小便藥多渴猶不止小便復澀兩肋連膀胱脹悶急妨心胸煩熱赤茯苓去黑皮桑根白皮銼防風麥門冬去心焙各半兩郁李仁湯浸去皮焙乾研木香各一兩右先搗前五味為細末與郁李仁研令勻煉蜜和為劑更于石臼內酥杵令勻熟丸如梧桐子大每日空腹煎木通棗湯下三十丸至晚再漸加至五十丸旋覆花湯出聖濟總録治痟渴腹脅虛脹心下滿悶旋覆花淨擇去莖葉微炒桑根白皮銼陳橘皮湯浸去白微炒各一兩半紫蘇并嫩莖乾者犀角鎊各半兩赤茯苓去黑皮三分右㕮咀每服七錢水三盞入棗三枚擘生薑半分拍破鹽豉半匙同煎至一盞半去滓分溫三服每食後一服如人行五里已來更一服大黃丸出聖惠方治痟渴腹脹利大小腸川大黃三兩銼碎微炒栝樓根檳榔枳殼麩炒去瓤微黃各一兩芎藭二分桂心三分右為末煉蜜和丸如梧桐子大不計時候以溫水下三十丸麥門冬湯治痟渴喉乾不可忍飲水不止腹滿急脹麥門冬去心焙烏梅去核取肉炒各二兩右呚咀每服三錢水一中盞去滓食後溫服日三桂苓甘露散治飲水不消嘔吐瀉利流濕淤注宣通氣液水腫腹脹泄瀉不能止者兼治霍亂吐瀉下痢赤白止煩渴解暑毒大有竒效兼利小水桂心去粗皮半兩白茯苓豬苓並去皮白术寒水石别研細澤瀉甘草各一兩滑石别研二兩右為細末或煎或水調二三錢任意服之或入蜜少許亦得一方有石膏一兩無豬苓普濟方卷一百七十九
