body:
  text: 普濟方卷二百八十八明周王朱橚撰癰疽門癰疽發背作寒熱附論夫發背寒熱者由寒氣客於經絡折於氣血澀滯不行結成瘡腫人諸陽氣臻集寒化為熱熱盛則肉腐為膿此皆臟腑壅滯毒氣不得通故令寒熱也癰疽發背作寒熱癰疽發背病為急切然五臟腧皆在背發於何部宜精詳之其作也邪毒內鼓寒熱交攻氣血壅滯隂陽相干故令人身熱而惡寒也當以療癰疽之法治之李氏云近時有數人病背疽服前方藥未安之間遍身寒熱或先寒後熱或先熱後寒或連日作或間日作必先嘔痰然後寒熱寒熱解大汗出然後止時醫多欲用柴胡牡礪止汗之藥又有以為瘧疾欲下恆山飲子愚力辨云背疽之疾不可専以為有熱亦有氣虛而得之亦有因怒氣并氣血凝滯而得之所以發寒熱者先感寒邪脾氣不正疾盛而有此證若下柴胡必㵼肝母既虛豈得㵼其子牡蠣澀氣氣血本不榮運又服澀氣藥恆山飲子吐痰大損􅠛胃用藥如此可謂誤謬愚令服家傳不換金止氣散袪寒邪正脾氣痰飲自消寒熱不作兼服排膿內補散以退寒方地黃丸治癰疽發背時作寒熱疼痛不食解毒生乾地黃焙二兩黃耆銼栝蔞根黃芩去黑心麥門冬去心焙各一兩半桑螵蛸十五枚銼炒大黃銼炒人參梔子仁肉蓉蓯焙前胡去頭升麻芍藥知母焙王不留行各一兩逺志去心敗醬地脈草各半兩乾棗五十枚湯浸去皮核以蜜一升和蒸成膏右為末入棗膏和丸如梧桐子大每服三十丸加至五十丸空心米飲下日晚再服人參散治發背腫毒寒熱疼痛口乾心煩人參去蘆頭芎藭各二兩生乾地黃石膏各二兩甘草生銼知母各一兩黃耆一兩半銼黃芩一兩前胡一兩去蘆根麥門冬一兩半去心赤芍藥一兩枳實一兩半麩炒微黃川升麻一兩半柏仁子一兩半右為散每服四錢水一中盞入竹葉七片小麥一百粒煎至六分去滓不計時候溫服木通散治癰始發於背便生寒熱口乾心煩不得卧木通一兩半銼知母一兩半赤芍藥一兩當歸一兩生乾地黃一兩半川升麻一兩半黃耆一兩半銼枳實二兩麩炒微黃甘草一兩生銼赤茯苓一兩前胡一兩半去蘆頭麥門冬一兩去心黃苓五分芎藭一兩右為散每服四錢水一中盞入竹葉十片小麥一百粒煎至六分去滓不計時候溫服枳實散治發背結硬氣盛或經一月不已作苦寒熱枳實三分麩炒微黃芎藭三分生乾地黃三分赤芍藥三分木通三分銼黃芩三分前胡三分去蘆頭知母半兩赤茯苓半兩細辛半兩人參半兩去蘆頭甘草半兩生銼黃耆半兩銼右為散每服四錢水一鍾煎至六分去滓不計時候放冷溫服五香散升降諸氣宣利三焦踈導壅滯發散邪熱治隂陽之氣鬱結不消諸熱藴毒腫痛結核或似癰癤而非使人頭痛惡心寒熱氣結方見癰疽托裏類茈胡煎治熱毒癰腫血不散初覺增寒乾渴四肢煩悶能令速消茈胡一兩去苖知母一兩焙木通一兩半淡竹葉一百片瞿麥穗一兩連翹一兩防風二兩大黃生二兩細銼生麥門冬汁三合湯成下生藕汁三合湯成下甜硝四兩湯成下右先將八味銼如麻豆大以水三升煮取一升半去滓下硝令散次入麥門冬藕汁等共分為八服空服兩服以溏利為度餘藥食後緩服之漏蘆散治發背及一切瘡毒攻衝寒熱大腸祕澀除煩熱解毒漏蘆白斂黃芩麻黃去根節知母枳實麩炒微黃川升麻犀角屑赤芍藥各一兩川大黃二兩銼碎微炒甘草三分右為散每服四錢水一中盞煎至六分去滓不計時候溫服犀角散治發背癰疽一切瘡腫未穴時攻焮疼痛或發寒熱渴燥不食解毒勻氣犀角鎊一兩人參大黃銼炒栝蔞實焙甘草炙銼各半兩葛根銼赤茯苓去黑心檳榔銼木香各三分芎藭一兩右為散每服二錢空心晚間粥飲調下以差為度麥門冬散治發背癰盛作寒熱不止麥門冬一兩去心前胡一兩去蘆頭黃芩一兩川升麻一兩逺志一兩去心黃耆一兩銼赤芍藥一兩生乾地黃一兩􅌝􅌣根一兩當歸半兩右為散每服四錢水一中盞入竹葉二七片小麥一百粒煎至六分去滓不計時候溫服黃耆散治發背熱毒氣盛作寒熱往來疼痛不止黃耆一兩銼川升麻一兩犀角屑一兩赤茯苓三分麥門冬三分去心人參三分去蘆頭赤芍藥三分生乾地黃三分石膏二兩藍葉半兩右為散每服四錢水一中盞入竹葉二七片煎至六分去滓不計時候溫服真方不換真金正氣散治疽瘡未安之間遍身寒熱或先寒後熱先熱後寒或連日作或間日作必先嘔痰而後寒熱大汗出然後止服此祛寒邪正脾氣痰飲自消寒熱不作一方用芎藭半兩不用人參兼治四時感風寒冷熱之氣或傷冷物傷瘴癘之疾痰盛頭痛常服能辟山嵐瘴氣四時疫癘蒼术米泔浸半日炒令黃色大厚朴紫色者去粗皮切薑汁炒各二兩粉草炙一兩真橘紅水洗淨去白兩半同上四味在食鍋內炒去火毒半夏湯洗七次薑製藿香葉人參去蘆木香白茯苓去皮各一兩一方有川芎右為散每服三錢水一盞半生薑三片棗二枚煎至八分入鹽少許溫服無時此方最能發出風毒可與排膿內補散並行若瘡陷不發多加棗桂當歸升麻湯治癰疽始作堅硬皮色紫赤惡寒壯熱一二日未成膿者升麻連翹大黃銼炒生地黃焙炒木香各一兩白斂玄參各三分右粗搗篩每服五錢水二盞煎至一盞入芒硝末半錢去滓空心溫服取利為度未利再服人參散治發背未成膿身體寒熱人參當歸焙蜜陀僧煆沒藥研雄黃研各半兩丹砂研一錢栝蔞實二枚去瓤取皮子生用右為細散每服二錢用甘草煎湯放溫調下日三羊髓膏治癰疽始作便敗壞發寒熱疼痛及瘭疽浸淫廣大焮赤黑爛成瘡一名甘草膏羊髓甘草銼搗各二兩胡粉研大黃銼搗各一兩豬脂半斤右先熬脂髓令沸下甘草大黃煎候甘草黑色綿濾去滓入胡粉以桞箆攪勻瓷盒盛每日三五度塗傳瘡上以差為度神效托裏散治癰疽發背腸癰乳癰無名腫毒增寒壯熱類若傷寒之證黃耆去蘆用鹽水炙忍冬葉各五兩當歸酒浸去蘆一兩八錢粉草炙八錢右為末每服二錢以酒一盞半煎至一盞若病在上食後服病在下空心服少頃再進留滓外傅未成膿者內消已成膿者即潰老少虛人皆可服之黃蘗散治發背未潰身體寒熱亦治癰癤黃蘗煙熏壁土多年者各三兩右為細散每服二錢茅根煎湯調下仍用生薑汁調藥傅之苦茄散治發背未潰身體寒熱苦茄種甘草炙各一兩右為細散每服二錢甘草湯調下一方酒調服癰疽虛證寒戰方用明乳香研細半兩每服一錢熟水調下戰發於肝乳香著肝而溫之寒戰隨止癰疽發背發渴附論夫癰疽煩渴之證由熱氣熏灼五臟津液不足於內也蓋榮衛氣血腐化為膿血則津液不得不耗津液既耗熱氣復盛則心神內煩而引飲不止然或為嘔噦下利者五臟虛熱飲水過度氣不足以盛之故氣逆於上則嘔噦腸胃不固則變下利也此屬癰疽惡證凡病疽疾之人多有既安之後忽發渴疾而不救者十有八九疽疾將安而渴疾已作即合便服加減八味丸既安之後而渴疾之證未見亦合先服此藥以預防其未然若疾形已見卒難救療病後合服補藥若用峻補之藥則發熱又況癰疾人安樂之後多傳作渴疾不可治療當預服加減八味丸如能久服永不生渴疾血氣加壯未發疽人或先有渴證亦合服此藥渴疾既安疽亦不作癰疽作熱發渴毒氣炎盛急服神仙追毒丸每日一服取下惡毒次服清膻湯萬全散五香連翹湯六味車螯散千金漏蘆湯皆可選用然下利以後尚渴不止却用生津補氣祕傳金粉散人參黃耆散內補散之類津液生血氣實渴自止方地黃湯治癰疽虛熱大渴生地黃芍藥升麻木通甘草炙大黃銼微炒知母赤茯苓去黑皮人參當歸焙各一兩黃芩去黑心黃耆各一兩半括蔞根二兩前胡去蘆根一兩半小麥半升右㕮咀如麻豆每服五錢用水一盞半分入竹葉七片煎至八分去滓空心溫服如小便利除木通大熱加人參晚再服以差為度連翹湯療患瘡腫而渴方連翹黃芩乾藍大黃各三兩蜀升麻煎至七分去滓溫服一日三服早晨午時夜卧各一服一方藥品內無竹葉汁止用竹葉煎湯名清膻竹葉湯亦可治癰疽熱盛焮腫作渴癢痛升麻散治發背及乳癰壅毒熱渴疼痛川升麻三分犀角屑半兩木通三分銼黃芩三分麥門冬三分去心生乾地黃一兩玄參三分赤芍藥半兩甘草半兩生銼葛根半兩銼蘆根三分銼右為散每服四錢水一中盞入黑豆百粒淡竹葉二七片煎至六分去滓不計時候溫服蘆根散治發背一切癰癤身體煩躁熱渴疼痛蘆根銼連翹玄參射干川升麻梔子仁赤芍藥羚羊角屑各兩寒水石二兩甘草三分生銼乾地黃二兩右為散每服四錢水一中盞煎至六分去滓不計時候溫服麥門冬湯治諸癰腫臟腑壅滯口乾腳冷寒熱頭痛嘔逆不下食煩渴引飲生麥門冬去心焙二兩葛根銼蘆根生犀角鎊石膏碎萎蕤薺苨芍藥淡竹葉切甘草炙銼各二兩右粗篩搗每服五錢水一中盞煎至一盞入硝石一錢去滓溫服不拘時一方用竹瀝半合紅雪一分更煎三兩沸去滓空心晚溫服清心內固金粉散又名金花散辰砂别研白茯苓去皮人參去蘆各三分菉豆粉四兩研雄黃一分研甘草三分朴硝半兩别研白豆蔲仁半兩腦子麝香并研各一分右以參苓白豆蔲為末入研藥令勻每服一錢半蜜湯調下無時候生乾地黃散治發背壅熱煩渴不思飲食通治諸瘡大渴一名竹葉黃耆湯生乾地黃二兩黃耆一兩銼甘草半兩生銼麥門冬一兩去心赤芍藥一兩人參一兩去蘆頭黃芩一兩石膏二兩當歸三分半夏半兩湯浸七遍去滑右為散每服四錢水一中盞入淡竹葉二七片生薑半分煎至六分去滓不計時候溫服一方有川芎無生薑解毒散治發背熱毒焮腫疼痛煩渴犀角屑三分川升麻半兩梔子仁三分木通一兩銼麥門冬三分去心枳實三分麩炒微黃去瓤甘草三分生銼葛根三分銼地骨皮一兩右為散每服四錢水一中盞入生地黃一分䜴半合煎至六分去滓不計時候溫服黃耆飲子治發背熱渴疼痛黃耆一兩銼苽蔞根一兩赤芍藥半兩麥門冬半兩去心玄參半兩甘草半兩生銼赤茯苓半兩當歸半兩川升麻五錢右藥細銼和勻每服半兩水一中盞入淡竹葉二七片煎至五分去滓不計時候溫服黃耆湯治癰疽熱盛口燥發渴除熱止渴黃耆括蔞根生乾地黃焙升麻各一兩梔子仁一兩芍藥一兩半黃芩去黑心一兩麥門冬去心焙一兩半右銼如麻豆每服五錢水一盞半煎至八分去滓空心溫服日晚再服黑附丸治氣虛血弱老人疽發後四肢倦怠無力或躁渴好飲水不止者黑附子一箇九錢煨鹽水浸白茯苓五錢去皮茴香二兩炒川楝子一兩去皮核破故紙一兩炒交趾桂五錢去粗皮大當歸一兩去尾熟地黃淨洗切酒炒一兩右為末鍊蜜丸如梧桐子大每服三十丸空心鹽湯或鹽酒下如覺脾虛食減亦用參苓白术散兼服加減八味丸治腎虛津走及燥渴或先患癰疽而才覺作渴或有癰疽而無渴皆冝服此大地黃先焙乾却用酒灑飯上蒸七次焙稱二兩重真山藥炒一兩山茱茰去核取肉焙稱一兩肉桂去粗皮淡者不用厚者不見火取末半兩澤㵼水洗切作塊酒濕蒸五次切焙牡丹皮去心真北五味去枝梗略炒令透别為末一兩半白茯苓去皮焙已上各八錢右為細末東蜜丸如梧桐子大每日五更初未言語前用溫酒或鹽吞下三四十丸神效有人病疽疾未安而渴作一日飲水數升者諸醫盡用木瓜紫蘇烏梅玄參茯苓百藥煎等生津液止渴之藥服多時渴愈甚數日之後茫無功效愚用此藥服之三日渴止遂久服之不特渴疾不作氣血益壯飲食加倍強健過於少壯之年又有一士夫亦患渴疾治療纍載不安服此不半載而痊疴也蓋其疾本起於腎水枯竭不能上潤是以心火上炎不能既濟煎熬而生渴醫者多用醒脾生津止渴之藥誤矣今八味丸降其心火生其腎水則渴自止矣其中真北五味子最為得力能生腎水平補降心氣大有功效矣李氏云凡病疽疾之人多有既安之後忽發渴疾而不救者十有八九疽疾將安而渴疾已作即便合服加減八味丸既安之後而渴疾之證未見亦合先服此藥以預防其未然若疾形已見卒難救療癰疽後合服補藥若用峻補之藥則發熱又况癰疾人安樂之後多傳作渴疾不可治療當預服加減八味丸如能久服永不生渴疾氣血加壯未發疽人或先有渴證服此藥渴疾安疽亦不作梅花飲子初作有熱發渴便作此截定防毒內攻忍冬四兩括蔞根葛根川芎烏梅和核生綿黃耆蘇木各一兩赤皮草生一兩右為粗末分作四服每服分用水酒各一升同入瓷瓶內慢火熬十分去三分每服一小盞無時服此藥如毒已破其熱漸退即常服如初作未破此藥性雖和緩大能去熱毒托裏黃耆散治口乾微熱人參甘草各半兩白术茯苓芍藥桔梗各一兩黃耆二兩右為粗末每服三錢水一中盞煎至七分去滓稍熱不拘時候服六味車螯散內消癰疽取下惡毒首初便服車螯四箇黃泥固濟火煆透出火毒一宿研為术燈心三十莖甘草節二錢炒瓜蔞一個去皮用仁新瓦上炒令香右將瓜蔞燈心甘草節為粗末只作一服用酒二盞煎耗半碗去滓入蜜一大匙和勻每用酒八分盞車螯末二錢粉少許調勻空心溫服下惡物黃涎為效已上諸方宣利拔毒之藥可斟量輕重而用之萬不失一枸杞湯治發背癰疽熱渴悶亂枸杞枝葉五兩石膏末栝蔞根黃連去鬚甘草炙各一兩右㕮咀如麻豆每服五錢用水一盞半煎至八分去滓空心溫服日晚再服五味子湯治腎水枯竭運用不止致令口中乾燥舌上堅硬或如雞內金北五味子真者綿黃耆去蘆頭生用人參去蘆麥門冬去心各一兩半粉草炙半兩右㕮咀每服半兩水一盞半煎至八分去滓溫服無時候一日一夜五七服妙連翹散治瘡瘍癤腫一切惡瘡疼痛煩渴大便溏泄虛熱不寧連翹山梔子甘草防風各等分右為粗末每服三錢水一盞煎至七分去滓溫服不拘時候陳粟湯治發背乾嘔吐此因先患熱渴飲冷太過胃寒所致宜服溫脾平胃陳粟米微炒一合乾薑炮製半兩甘草炙四兩右㕮咀如麻豆每服五錢用水一盞半煎至八分去滓空心溫服日晚再服以差為度乾葛飲治發背作渴黃芩朴硝各五錢乾葛一兩右銼散每服三錢用枇杷葉去背上白毛淨洗同煎不拘時服凝水石煎方治發背癰疽發大渴口乾不可止凝水石石膏蜜各半斤右先搗二味石藥羅為末以水五升煎令稠即下蜜更煎成膏用瓷合盛每日空心取一棗大含化咽津日五七服黃耆六一湯常服終身可免癰疽之疾仍大治渴疾補虛乏諸發愈後亦可服綿黃耆去乂蘆用箭簳者六兩一半生焙細銼一半用鹽水溫潤器盛飯上蒸三次焙乾銼細用粉草一兩一半生細銼一半炙黃却細銼右為細末每服二錢早晨日午以白湯點當湯服若能飲初杯用酒調服尤妙一方用生黃耆六兩甘草一兩㕮咀水煎常服古人以黃耆為羊肉者此也一方薑三片棗二枚煎空心服犀角飲子犀角屑三兩羚角屑三兩右以水八升煮取三升渴即飲盡更作之時熱恐壞懸著井底甚妙桑枝湯大治口乾取花桑一小升細切炒香以水三大升煎取二升一日服盡一法以花桑枝不以多少寸銼炒令香先以水於瓦罐中用文武火煮折一半去滓再入銀器內重湯煮再一半或入少蜜亦可仙經云一切仙方不得桑枝不服出抱朴子常服療體中風癢乾燥臂痛腳氣風氣四肢拘攣上氣眼暈肺氣嗽消食利小便久服輕身聰明耳目令人光澤癰疽煩渴方參苓白术散右以瓜蔞根菉豆烏梅煎湯調下諸發附論夫五發者謂癰疽生於腦背眉鬢髯是也大槩論之分為三等一者疽也二者癰也三者癤也夫疽初生如黍米大癢痛有異誤觸破之即焮展四畔赤腫沉悶牽引脅肋疼痛數日之後漸覺肌膚壯熱惡寒煩渴腫暈侵展瘭漿汁出即日不潰抑之則流血者謂之發背疽也其發於腦者為腦疽也其發於鬢眉髯者以類呼也又有初生其狀無頭腫濶三四寸如覺注悶疼痛因循數日皮光微軟者甚則亦令人發熱惡寒頭疼煩渴者謂之發背癰也又有初生一頭色浮赤而無根腫見於皮膚之間大小一二寸者癤也三者之候惟疽最重此疾初生皆由滋味與厚衣衣服厚暖則表易招寒滋味過多則五臟生熱臟腑積熱則血脈不流而毒氣凝滯邪氣伏留熱摶於血血聚則肉潰成瘡淺則為癤實則為癰深則為疽矣亦有因服金石發動而患此疾者亦有平生不服金石藥而亦患此疾者蓋由上祖曽服餌其毒氣流傳子孫此病初生認是疽則宜速療之若氣實之人急服五香連翹湯漏蘆湯若年未五十而壯實者可服五利大黃湯化毒丸取通利臟腑一二行瘡頭上用追毒散之類貼溫熱膏濟更溻腫湯淋溻之如此調治以待膿成已前不可以諸藥救療以安患人之心慎勿觸氣惱至膿成敗潰宜服五香湯及內托裏散茯苓湯當歸托裏散之類渴不止者服竹葉黃耆湯乳香散勿為大熱服大黃朴硝苦寒之藥若因服利藥而利不止者死矣若瘡中惡肉未退膿水不快者即用追蝕之藥或鋌子絍之上用鹿角散以醋熬為糊貼之惡肉退去好肉漸生即用搜膿散翠霞散之類絍之若瘡中毒氣未盡慎勿早斂忌早上生肌之藥縱得平復必再發其間調理次第臨時致宜將護忌慎之法耳癰疽乳石之疾多發於陽部故在背則發府俞之間在頭則發腦以頭者諸陽所會而足太陽之經絡腦故也然腦為髓海精血之所臻而腦户風府啞門三穴不可妄行灸刺令人有瘖啞之病灸刺猶不可况癰疽之所發乎古人謂五發之病背腦為重始發皮膚若黍米然赤腫傍焮有頃痛楚寒熱當急治之稍縱不治則毒氣深入銷鑠腦膸化為膿血不可及已故經曰癰疽不得頃時回初發疽時一粒如麻豆大身體便發熱熱生疽處肉赤熱腫大而高多生疼痛破後肉色紅紫此為外發雖若盆碗如用藥有理則必全矣初發疽時不拘大小身體無熱自覺倦怠生疽處亦不數日之間漸漸開大不腫不高不疼不痛低陷而壞爛破後肉紫黑色此為內發未作之先臟腑已潰爛則不治矣復有心腎肺癰附骨疽證心癰者乃心經有熱或好飲酒或嗜熱物積聚成熱久而不散熏發於皮膚之外氣血不流凝滯而生雖曰穴道頗險而實可治宜用托裏活血之劑攻出外來腫髙不陷可保無虞若陷入裏亦不可恃如不飲食急須扶脾能食瘡已破穿見肉膜亦未為害但要洗滌淨潔以生肉藥四畔摻之自然而愈五發形圖方丹參膏療發背發乳口已合皮上急痛生肉丹參防風白芷細辛芎藭黃芩芍藥牛膝大黃槐子獨活當歸各一兩右以臘月豬脂五升微火煎成膏摩病日三四次不須向火療發背發乳房及諸惡瘡膏方黃連當歸馬齒芎藭薯蕷各一兩珍珠十四枚礬石燒黃蘗各半兩石葦三分去毛生竹皮三合豬肪一斤右㕮咀細切肪向美酒一升中令煎石葦焦膏成去滓有病稍傳上一方酒服棗核大一枚忌豬肉冷水洗方諸發已破未破皆洗如成膿潰爛最要洗淨去故肉生新肉洗後再用摻藥一日一次大柏皮澤蘭莽草荆芥赤芍藥山大黃土白芷土當歸獨活各等分右銼粗散用水一斗入蔥白大椒橘葉同煎薰洗如已爛入豬蹄下膝爪骨肉煎可免乾痛洗淨為度青金錠子專治腦疽發背去惡肉追膿生肌白礬枯粉霜輕粉白丁香真者炒各一錢銅緑硼砂龍腦麝香各五分右為細末稠麵糊為錠子如麻黃粗細外科精義青錠子治諸惡瘡膿出不快及多年疳瘻愈而復發無白礬犀角消毒散治發背發腳發手發脅一切惡瘡此藥溫和大能散毒荆芥穗防風甘草鼠粘子羌活白芷獨活桔梗等分右為末每服三錢水一盞煎至七分不拘時服神白膏貼五發未破南星大黃草烏白斂各半兩蚌粉大柏皮各一兩小赤豆二合右為末取芭蕉頭研取油調角四畔加乳香沒藥尤妙乾則芭蕉汁刷之一方無草烏止痛當歸湯治腦疽發背穿潰疼痛當歸黃耆人參官桂芍藥甘草炙生地黃各一兩右為粗末每服五錢水一盞半煎至一盞去滓溫服日進三服治癰疽腫疼發腦發背方栁樹上白木耳黃連去鬚乳香杏仁去皮尖各一兩鹽花少許蛇床子少許新蔓菁根一掘不得用隔旬者如無以菘菜代之右為末似覺有腫以溫水調傅乾即易之宣毒散初發或炙後用敷貼消腫收赤暈圍聚露蜂房三兩炒略微焦南星赤小豆各一兩小米一合生草烏一分生白礬五分右為細末用淡醋塗四畔乾即再上托裏散止痛消腫初發服之則消散已成則易潰生肌常服活血補損不患瘡痍黃栝蔞三箇去皮取瓤炒忍冬三兩乳香一兩蘇木二兩沒藥兩半甘草節炙半兩紅紋者右為粗末每服用藥一兩半無灰酒三碗同藥入瓦瓶內煮至一碗半去滓候溫分作三次空心日午臨睡服如要常服則為細末酒糊為丸如彈子大硃砂為衣每服一丸細嚼當歸酒下打撲傷損服至五丸即安萬靈丸治背腦疽并一切惡瘡初覺一二日硃砂血竭蓮蘂各等分麝香少許右為細末酒糊為丸如黃米大每服七丸溫酒送下瘡在上食後在下食前不過二服即效陵鯉甲散療發背乳房癰腫方陵鯉一頭取甲爪炙桂心三分當歸二分右為散服方寸匕日三進忌酒生蔥緑雲散治五毒發瘡生於背腦一名二草散一名緑雲一醉散金星鳳尾草形如鳳尾葉背有金星者是也乾稱四兩生粉草一分切右慢火焙為末分作四服每用紅酒一升煎三五沸入冷酒二升和勻入銀瓦器內封却時時服量力飲之以醉為度立效若曽服金石重藥者服此藥最妙以物枕著痛處睡良久遂下毒氣惡物次日減藥末并酒一半再進一服忌生冷油膩毒物不飲酒者新汲水調服如聖散治惡瘡背疽寒癰吹奶打撲傷損並治之甘草一兩半生半熟皂角三錢燒存性去皮核稱用右為細末每服三錢熱酒調下無時金銀花散治發背惡瘡托裏止痛排膿金銀花四兩無花用苗葉嫩莖代之甘草一兩右為粗末分為三服酒水各一盞同煎至去滓溫服無時海上方治癰疽發背發腦等疾用楓根白皮即楓樹根旋取去土及粗赤皮就溫用為粗末每用藥一升無灰酒二升煎至八分取清汁稍熱作三服藥滓傳瘡口瘡未破傳時留瘡口既破用藥敷瘡三服可活人命神效療治發癰疽發背及乳房方用半夏末雞子白和塗良姚云生者神效以水和塗之又方用酢和墓上土茱茰搗薑小蒜薄貼並良大荆芥方治癰疽發背腦瘍等不問有頭但要腫起知痛用藥一粟許於瘡頭點之少頃再點便覺肉地軟用大荆芥根洗淨細切爛研加小粉和勻隨瘡大小塗傳留口一云大荆芥即大蘇一味不拘多少洗淨細切研膏塗瘡上其冷如氷初發者能消散已成腫者無不見效一云加些少米醋同研取荆芥湯爛塗傅留口如一圍大才乾又换其口漸小口潰為度治癌方癌者上高下深岩穴之狀顆顆纍垂裂如瞽眼其中帶青由是簇頭各露一舌毒根深藏穿孔透裏男則多發於腹女則多發於乳或項或肩或臂其證令人昏迷治法急用萆麻子等藥外傳多出其毒水如癰疽方中乳香膏神效妙貼散是也內則於小便利之蓋諸痛癢瘡皆屬於心心與小腸為表裏所當宣毒於小便但諸發藴毒又非麥門冬燈心草所能宣必如是齋方中立應散以地膽為主以白牽牛滑石木通佐之而後可以宣其毒矣自此又於心腎用工人之一身水不能濟火則渴而後發瘡心腎相交水火既濟於人何病之有心主血也清心行血固所當然亦使腎得其養則水有所司貞元凝合彼瘡自平更服童生尿又可以灌滌飲毒切戒忌風邪入之將理一節米餔豬蹄可以益腎可以養中當加之意用生井蛙取皮暴乾燒帶生為末糝或蜜水調傅乳香膏神效妙貼散方見諸癰疽類立應散方見諸瘡腫門諸腫類治痼方痼發於手足或掌心或腰腿或臂下伸縮處長形平腫無頭無靣低貼肌肉瞰裏開瘡如棋而大走注牽連較之諸發煩渴為甚其患淺則可療其患深則害人或腫毒已平數月之後復於他處大發但作肉色微帶淡紅終不能救治法以癰疽類例推之大要培養內氣以防滑泄兼用膏藥化瘡神異膏遇仙膏可貼可服神異膏遇仙膏方見膏藥門諸瘡毒腫類復煎散治腦背疽及一切惡瘡方見癰疽等瘡內消法一名黃連獨活散向子明提點傳一宗八道治五發發腦發鬢發眉發頥發背癰疽瘭痼癌一宗藥保不死方凡覺寒熱瘡已現發渴即是其證先用車螯散紫背大車螯一名車娥也每箇用草先扎定上用鹽泥固濟日乾簇火煆之候通紅半時辰許滅火候通手取敲去泥以器皿合在淨地上出火毒半日許冷碾羅為細末砂合收甘草炙碾為末輕粉右每服抄車螯末二錢甘草末一錢輕粉炒五分溫麥門冬熟水調下五更初服至日出時候大便不痛下青緑苔或如黑煤惡物下也次用一生黃土細研砂半錢研入蒜三瓣細爛搗捉薄作三餅子不拘大小坐於瘡頭上用伏道熟艾灸之百壯少歇與飲食喫再灸之三五十壯也次用六一湯托藥真綿黃耆箭簳者是也木耆不堪誤人稱六兩以刀劈開揭簿用白沙蜜不醋者一兩微入水少許調解開易塗蘸候搓勻炙之微紫色候冷銼碎橫紋甘草炙一兩細銼右拌勻每服炒五錢水一盞煎至七分服之日三服夜二服次服苽蔞湯苽蔞一斤去皮將穰與子銼碎沒藥一分研甘草半兩生銼右用無灰酒三升煎至一升分三服溫飲次用豬蹄湯治癰疽等腫壞消毒去惡肉香白芷甘草獨活露蜂房黃芩赤芍藥當歸各等分右先將獖豬前蹄兩隻只用白水煮軟將汁分兩次澄清去上面油花下面滓肉每用藥半兩投於汁中再煎五七沸濾去滓以故帛蘸藥湯中薄揩瘡上死肉惡血隨洗下以乾故帛拭乾敷竅減痛仍避風忌人口氣吹之有狐臭人不得入宅貓犬亦忌月候人不令入房次用洗藥散風邪生好肉芎藭銼白蒺藜搗去尖防風銼右等分為細末每用抄一匙頭煎令沸氣上頓瘡候通手以帕揩洗之前藥一次换後藥兩次易二次藥相間洗凡瘡破有頭便用洗藥洗訖便用薄貼傅之薄貼謂膏藥也太上無比靈應神異膏露蜂房一兩銼碎蛇蛻皮半兩細煎玄參半兩細銼真綿黃耆三分細銼真杏仁一兩去皮尖略搗破黃丹五兩好者童男童女亂髮淨洗日乾如雞子大右先用真麻油不用菜子油一斤入鐺便下亂髮慢火熬候髮消盡次入杏仁濾去滓再入餘藥入鐺熬候焦黃再濾去滓次入黃丹候變色以新栁木箆子攪五千攪滴入水中看軟硬得所然後傾入瓷罐子內尚未硬更攪三百攪也攤用如常日换兩次夜换一次疽發人貼雲丹膏痛如刀割不可不審不可不知也亦不得用生肌藥口貼膏藥自然斂合如醫治後時為庸醫藥罨或刀割傷風重者兼以五香連翹湯木香麝香乳香沉香藿香連翹右等分為末每服二錢水一盞煎至七分候溫服無時瘡四邊以金箔先用津液吹點之大車螯散治癌瘰痼疽四般未破者癰不用此如已破者只用五積散踈利風氣然後服諸藥大紫色車螯一合黃泥固乾火煆通赤去泥末之大戟芫花醋炒甘遂甘菊檳榔大黃黃芩漏蘆膩粉一分右搗為末每服二錢車螯末二錢粉一錢五更苽蔞煎服良久下惡物膿血不妨自止後生壯者加一服老弱量與排膿散去瘀膿化惡血止痛去寒熱防風白芷人參細辛川芎仙靈皮甘草半兩羌活二錢右為末酒調下糯米飲亦可托裏散止痛固臟腑山蜈蚣一兩當歸川烏炒白术白芷川芎三錢麻黃一錢右為末酒下二錢薑薄荷小煎亦可敗毒散已破者服麻黃白术蒼术一兩荆芥甘草大黃三分黃芩半兩乾薄荷一分右為散水煎服內補散癌已破膿多瘡爛肉未生者附子炮一兩白薑一兩人參甘草三錢陳皮麻黃官桂半兩右為末一錢蔥煎食前服去膿血退寒熱生肌內消散癌已破未破去膿止痛退寒熱進食去瘀血紅內消何首烏紅者一兩玄參苦參蔓荆子威靈仙半兩甘草節赤小豆三分右為末每服二錢麥門冬湯酒任下日五服黃芩散癌瘡爛腫化惡膿止痛活血以此洗之黃芩五錢羌活五錢細辛白芷􅞒草秦皮川芎黃連三兩右為散每一兩半雄豬蹄水二升煎半去油滓煎藥濾清冷洗春冬月一洗夏日再麝香膏貼之麝香膏附子陳皮黃連白芷當歸五錢白豆蔲五個檳榔四個羌活白薑大黃縮砂一錢皂角三條右為散麻油十兩煎八兩藥焦色為度綿濾再煎沸入黃丹五兩熬至七兩水滴成膏收瓷器中仍出火用時絹片火上開藥隨大小貼內消丸治痼發附子川烏各炮半兩全蝎淨殭蠶一分草烏頭水煮爛去皮尖半兩乳香三錢研雄黃沒藥一錢研右為末蜜丸梧桐子大薄荷湯下二十丸若發急者只作末每一錢茶酒任下內解散川烏炮一兩甘草生半炙半麻黃一兩沉香蒼术防風􅒝薢一分杜仲半兩炙右為末每服二錢薑三片棗一箇水一盞煎至六分去滓溫服上二方須潰破膿透內虛之後可服一方向友正元仲之子也淳熙八年為江陵度支使攝江陵令癰發於胸臆間極痛療半歲弗愈常浴罷痛甚委頓而卧似夢而非夢見一丈夫微揖而坐傳藥方與之曰用沒藥苽蔞乳香酒煎服之且言桃源許軫知縣亦有此方但不用苽蔞其效故不速友正敬謝即如所戒不終劑而愈後詣玉泉禱雨瞻夀亭關王蓋所感夢者因繪像於家焉瘡瘍治驗戊申嵗以飲酒太過脈候沉數九月十七日至真定腦之下項之上出小瘡不痛不癢謂是白瘡漫不加意是夜宿睡善甫家二日後覺微痛見國醫李公明之不之門凡三見之終不以為言又二日腦項麻木腫勢駸駸乎外散熱毒焮發且聞此府留帥者近以腦疽物故便疑之三日間痛大作夜不復得寐二十二日詣鎮之瘍醫遂處五香連翹湯明日再往又請同門一醫共視之云此疽也然而不可速療十八日得膿候膿出用藥或砭刺三月乃可平四月如故豫記醫經凡瘡見膿九死一生果如二子言則當有束手待斃之悔矣乃詣姨兄韓參謀彥峻家請明之診視明之見瘡談笑如平時且謂豫言瘡故惡子當恃我無憂恐耳膏粱之變不當投五香五香已無及且疽已八日當先用火攻之策然後用藥午後以大艾炷如兩核許者攻之至百壯乃覺痛次為處方云是足太陽膀胱之經其病􅊇當反治脈中得絃緊按之洪大而數又且有力必當伏其所主而先其所固其始則同其終則異可使破積可使潰堅可使利氣可使和血必先嵗氣無伐天和以時言之可收不可下經與病禁下法當結者散之醎以耎之然寒受邪而禁醎諸苦寒為君為主甘寒為佐瀉熱為用如以苦寒瀉熱為君以辛溫解結為臣以甘益元氣而和血脈淡滲以導酒濕扶持秋令以益氣㵼火以入本經之藥和血且為引用既以通經以為主用君以黃芩黃連黃蘗生地黃知母酒製之本經羌活獨活防風藁本防己當歸連翹以解結黃耆人參甘草配諸苦寒者三之一所以滋榮氣補土也生甘草㵼腎之火補下焦元氣人參橘皮以補胃蘇木當歸尾去惡血生地黃當歸身補血酒製漢防以除膀胱留熱澤㵼助秋氣去酒濕熱凡此諸藥必得桔梗為舟楫乃不下沉投劑之後疽當不痛不拆精氣大旺飲啖進形體健豫如言服之藥後投床大鼾日出乃寤以手摸瘡腫減七八豫疑瘡透喉遽邀明之視之明之驚喜曰瘡平矣屈指計日不五七日作痂子可出門矣如是三日忽有宵寐之變豫懼其為死徴甚憂之而無可告語之者適明之入門戲謂豫曰子服藥後有三驗而不以相告何也乃歷數云子三二日來健啖否乎曰然又問子腳膝舊弱日行步有力否乎曰然又問子昨宵夢有宵寐之變何不自言豫為之一笑終不以此變告之也二十九日瘡痛全失去灸瘢膿出尋作痂初鎮人見帥病疽之苦言及者皆為悲慘聞豫復病此瘡親舊相念者皆舉手加額以早安為禱十月十七日明之邀往其家乘馬過市人見之有為之失喜者蓋始於投劑至瘡痂斂都十四日而已豫往在聊城見明之治梁縣楊飛卿脅癰及郭文之父腦疽楊叔能背疽不十日皆平復然皆不若治豫瘡之神也醫無不難療腦背瘡尤難世醫用藥豆無取效者至於治效之外乃能歷數體中不言之祕平生所見惟明之一人而已乙未秋豫自濟南回傷冷太過氣絶欲死明之投劑應手而愈起豫之死并此為二矣他日勸劉斯立傳錢乙當補述之明年秋七月二十有五日河東元好問記黃連消毒散黃連一錢黃芩五分黃蘗五分生地黃四分知母四分羌活一錢獨活四分防風四分藁本四分當歸尾四分桔梗五分黃耆二分人參三分甘草三分連翹四分蘇木二分防己五分澤㵼二分橘皮二分右件銼如麻豆大都作一服水二盞煎至一盞半去滓食後溫服一方加山梔子二分五味子二分麥門冬二分枳殼二分豬苓二分名消毒潰堅湯治八發癰瘇瘰􅊓乳癰隨惡人虛實藥劑輕重用之無不有效發腦附論夫發腦者六腑不和經絡不流氣血不行壅結所成也此皆臟腑藥積熱毒或乳石發動毒氣上攻於腦發於皮膚頭如黍米四畔焮赤腫鞕遍於耳項寒熱疼痛若不急治毒氣傷于血肉腐壞化為膿水從腦中出血肉既竭必至危殆李氏云凡腦疽及項已上有癰疽癤毒斷不可用大蒜錢子就腦項上灸之則引其氣一上痰涎膿血併起上攻傾人性命急於反掌但當急灸足三里穴并氣海穴乃漸漸服涼胸膈化血之藥人可小安此論載通神方論足三里一穴在膝下三寸是穴可灸五壯氣海一穴在臍下一寸是穴可灸二七壯或三七壯亦可騎竹馬穴法炙之凡腦疽咽喉生疽古法皆不治之證用此灸法引毒氣歸下其理頗長得此疾者豈可坐以受斃當信而用之如五香連翹湯漏蘆湯五香湯去大黃加人參黃耆犀角國老膏萬全散皆可選用方沉香湯治發腦瘡腫焮赤疼痛煩躁沉香二分麥門冬去心焙赤芍藥玄參甘草生銼枳實熬炒升麻前胡去蘆頭大黃銼炒生乾地黃焙各一兩犀角鎊三分麝香研一分萎𬎼黃耆細銼各半兩右除麝香外粗搗篩每服四錢水一大盞煎至七分去滓入麝香少許溫服不拘時黃耆散治發腦腫痛勢不可忍黃耆一兩半銼赤茯苓地骨皮麥門冬去心生乾地黃黃芩川升麻射干赤芍藥玄參甘草生銼各一兩右為散每服四錢用水一中盞煎至六分不計時候溫服葛根散治發腦癰疽腫臟腑壅滯心煩口乾腳冷煩躁頭痛嘔噦不能下食葛根一兩銼麥門冬一兩去心萎𬎼犀角屑半兩薺苨一兩赤芍藥三分石膏二兩甘草三分生銼紅雪二兩右為粗散每服四錢水一中盞煎至六分去滓下竹瀝半合更煎一沸不計時候溫服一方有蘆根犀角散治發腦已穴膿出後痛悶轉甚熱亂腦中若車馬走動痛不可忍石膏碎犀角鎊升麻芍藥各一兩甘草炙一兩黃耆細切二分木通銼一兩半右粗搗篩每服五錢水二盞煎至七分下朴硝一錢半濾去滓空心溫服日晚再服未愈可再入玄參三分去黃耆發腦內消散治發腦始結疼痛妨悶欲成癰疽熁之令內消硝石研二兩木通銼紫檀香甜葶藶隔紙炒白斂莾草各一兩大黃三兩右為末每服用漿水旋調得所塗於腫上乾即易大黃丸治發腦及一切熱毒氣結鞕腫痛通利臟腑壅滯大黃三兩銼醋浸一炊久慢火炒令熱枳殼去穰麩炒一兩牽牛子二兩半微炒一半生用一半木香生銼青橘皮湯浸去白焙各一兩皂莢五梃不蛀者佳酒一升浸挼取汁綿濾過用右為末取皂莢汁於鍋內熳火煎成膏入藥末和搗百餘杵丸如梧桐子大食前蔥茶下三十丸快利為度一方有檳榔一兩甘草五錢羊桃根散治癰發腦拔去瘡中毒羊桃根銼硝石研凝水石碎各一兩天靈蓋熳火燒煙絶木香白斂各半兩右為散清水調如糊攤於故帛上貼之乾即易瘡則瘥乳石散治癰疽初生如黃枳實破後如盞底深半寸許花乳石研赤石脂研滑石研􅀈甘石蜜陀僧各半兩研乳香研一分右為細散未破者醋調傅之已破即乾貼黃連餅子治發腦成癰及熱毒瘡腫黃連乳香薰陸香各一兩雄雀糞四十九枚尖細者是右為細散用蔓菁根二兩洗淨漉去水細切搗如泥若腫甚即更用竹葵根三兩入前藥四味合搗調勻即取出於瓷器中貯之可腫頭捻作餅子厚三分許貼之乾即易之止痛散治發腦結腫木香二兩紫葛一兩半檀香三分川朴硝二兩右為細散以溫漿水調如麵糊塗在絹上攤貼於腫痛處候乾即再貼以瘥為度硃砂膏治發腦及乳癰初結疼痛硃砂一兩乳香半兩右同研為末以蔥白四兩細切合研成膏每用生絹上塗貼候乾再上以瘥為度治腦癰用鹽西瓜皮晒乾燒灰存性為末香油調傅治發腦發背方取鼠剝取熱皮中心開一孔子用貼瘡上數數易之無頭者便當作頭膿出即愈治腦疽用松節細研用獖豬膽汁和合麻油傅瘡親見效普濟方卷二百八十八
