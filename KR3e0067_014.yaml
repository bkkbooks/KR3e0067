body:
  text: 普濟方卷十四明周王朱橚撰肝臟門總論肝主魂為郎官隨神往來謂之魂魂者肝之藏也目者肝之官肝氣通於目目和則能辨其五色其左目甲右目乙循環紫宫榮華於爪外主筋內主血肝重四斤四兩左三葉右四葉凡七葉有六金童玉女守之神名藍藍主藏魂號為魂藏隨莭應會故云肝藏血血舍魂在氣而為語在液為淚肝氣虗則恐實則怒虛則夢園花草得其時夢伏樹下不敢起肝氣盛則夢怒厥氣客於肝則夢山林樹木凡人寢卧血歸於肝目受血而能視足受血而能步掌受血而能握指受血而能攝凡肝藏象木與膽合為腑其經足厥陰與少陽為表裏其脈弦相於冬王於春春時萬物始生其氣來濡而弱寬而虛故脈為弦濡即不可發汗弱則不可下寬則開開者通通者利故名曰寬而虛春脈弦春脈肝也東方木也萬物之所以始生也故其氣來濡弱輕虛而滑端直以長故曰弦反此者病何如而反其氣來實而弦此謂太過病在外其氣來不實而微此謂不及病在內太過則令人善忘忽心眩冒而癲疾不及則令人心痛引背兩脅胠滿肝脈來濡招招如揭末稍曰平春以胃氣為本肝脈來盈實而滑如循長竿曰肝病肝脈來急而益徑如新張弓弦曰肝死真肝脈至內外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛者秋病毛甚曰金病肝藏血血舍魂悲哀動中則傷魂魂傷則狂妄其精不守令人陰縮而攣筋兩脅肋骨舉毛悴色夭死于秋足厥陰氣絶則筋縮引卵與舌厥陰者肝脈也肝者筋之合也筋者聚於陰器而脈絡於舌本故脈弗營則筋縮急筋縮急引卵與舌故唇青舌卷卵縮則筋先死庚篤辛死金盛木也肝死藏浮之弱按之中如索不來或曲如蛇行者死春肝木王其脈弦細而長曰平反得沉濡而滑者是腎之乘肝母之歸子為虛邪雖病易治反得浮大而洪者是心之乘肝子之乘母為實邪雖病自愈反得微澀而短者是肺之乘肝金之克木為賊邪大逆十死不治反得大而緩者是脾之乘肝土之陵木為微邪雖病即差心乘肝必吐利肺乘肝即為癰腫左手關上陰絶者無肝脈也苦癃遺溺難言脅下有邪氣善吐刺足少陽治陽左手關上陰實者肝實也苦肉中痛善轉筋吐刺足厥陰治陰肝脈來濯濯如倚竿如琴瑟弦再至曰平三至曰離經病四至脫精五至死六至命盡足厥陰脈也肝脈急甚為惡言微急為肥氣在脅下如覆杯緩甚為嘔微緩為水瘕痺大甚為內癰善嘔衄微大為肝痺縮咳引小腹小甚為多飲微小為消痺滑甚為㿗疝微滑為遺溺澀甚為痰飲微澀為氣瘈瘲筋攣肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆其喘而散色澤者當病溢飲者暴渴飲多而溢入肌膚腸胃之外也青脈之至也長而左右彈有積氣在心下支胠名曰肝痺得之寒濕與疝同法腰痛足冷頭痛扁鵲云肝有病則目奪精虛則寒寒則隂氣壯壯則夢山樹等實則陽壯壯則夢怒肝在聲為呼變動為握在志為怒怒傷肝精氣并於肝則憂虛則恐實則怒怒而不已亦生憂矣色主春病變於色者取之榮病先發於肝者頭目眩脅痛支滿一日之脾閉塞不通身痛體重二日之胃而胸脹三日之腎小腹腰脊痛頸痠十日已死冬日入夏早食病在脾平旦慧下晡甚夜半靜假令肝病西行若食雞肉得之當以秋時發病以庚申日也家有血腥死女子見之以隂邪為災不爾若感金銀物得之凡肝病之狀必兩脅下痛引小腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之欲治之當取其經足厥隂與少陽氣逆則頭目痛耳聾不聰頰腫取血者肝脈沉之而急浮之亦然若脅痛有氣支滿引小腹痛時小便難苦目眩頭痛腰脊痛足為寒時癃女人月事不來時無時有得之少年有所墜墮肝病其色青手足拘急脅下苦滿或時眩冒脈弦長為可治宜服防風竹瀝湯秦芃散春當刺大敦夏刺行間冬刺曲泉皆補之夏刺太衝秋刺中封皆㵼之當灸期門百狀背第九脽五十壯邪在肝則兩脅痛寒中惡血在內或善瘈莭時腫取之行間以引脅下補三里以溫胃中取脈以散惡血取耳間青脈以去在瘈凡有所墮墜惡血留內若有大怒氣上而不能下積於左脅下則傷肝肝中風者頭目瞤兩脅痛行常傴令人嗜甘如孕婦狀肝中寒者其人洗洗惡寒翕翕發熱面翕然赤漐漐有汗胸中煩熱肝中寒者其人兩臂不舉舌本燥善太息胸中痛不得轉側時盜汗咳食已吐其汗汗主胸中喘怒罵其脈沉胸中義窒欲令人推按之有熱鼻窒肝傷其人脫肉又卧口欲得張時時手足青目瞑瞳人痛為肝藏傷所致也肝水者其人腹大不能自轉側而脅下腹中痛時時津液微生小便續通肝脹者脅下滿而痛引小腹肝著其病人常欲蹈其胸上先未苦時但欲飲熱診得肝積脈弦而細兩脅下痛邪氣走心下足脛寒脅痛引小腹男子積疝女子瘕淋身無膏澤善轉筋爪甲枯黑春差秋劇色青色也肝病胸滿脅脹善恚怒呌呼身體有熱而復寒四肢不舉面白身體滑其脈當弦長而急今反短澀色當青而反白者此是金克木為大逆十死不治角音人者主肝聲也肝聲呼其音琴其志怒其經足厥隂厥逆少陽則榮衛不通隂陽交雜隂氣外傷陽氣內擊擊則寒寒則虛虛則卒然喑啞不聲此為厲風入肝續命湯主之但踞坐不得低頭面目青黑四肢緩弱遺失便利甚則不可治賖則旬月之內桂枝湯主之又呼而哭哭而反吟此為金克木隂擊陽隂氣起而陽氣伏伏則實實則熱熱則喘喘則逆逆則悶悶則恐畏目視不明語聲切急謬説有人此為邪熱傷肝甚則不可治若唇色雖青兩眼不應可治地黃煎主之靑為肝肝合筋青如翠羽者吉肝主目目是肝之餘其人木形相比於上角蒼色小頭長面入肩平背直身小手足有材好勞心少力多憂勞於事耐春夏不耐秋冬秋冬感而生病主足厥隂悒悒然脅廣合堅脆傾正則肝應之正青色小理者則肝小小則藏安無脅下之病粗理者則肝大大則虛虛則寒逼胃迫咽善膈中且脅下痛廣脅反骹者則肝髙髙則實實則肝熱上支賁加脅下為息賁合脅危骹者則肝下下則逼胃脅下空空則受邪易脅骨堅者則肝堅堅則藏安難傷脅骨弱則肝脆脆則善病消疸易傷脅腹好相者則腹端正端正則利難傷脅骨偏舉者則肝偏傾則脅下偏痛凡人分部陷起者必有病生膽少陽為肝之部而藏氣通於內外亦從而應之沈濁為內浮清為外若色從外走內者病從外生部處起若色從內出外者病從內生部處陷內病前治隂後治陽外病前治陽後治隂陽主外隂主內生死休否則藏神前變形于外人肝前病目則為之無色若肝前死目則為之脫精若天中等分墓氣應之必死不治看應增損斟酌賖則不出四旬內促則不延旬月之間肝病少愈而卒死何以知之曰青白色如拇指大靨點見顔頰上此必卒死肝絶八日死何以知之面青目赤但欲伏眠視而不見人汗出如水不止一日二日死面黑目青者不死青如草滋死吉凶之色在於分部順順而見青白入目必病不出其年若年上不應三年之中禍必應也春木肝脈色青主足少陽脈也春取絡脈分肉春者木始治肝氣始生肝氣急其風疾經脈常深其氣少不能深入故取絡脈分肉之間其脈根並在竅隂之間應在窗籠者耳前上下脈以手按之動者是也春三月者主肝膽青筋牽病也其源從少隂而涉足少陽之氣始發少隂之氣如衰隂陽怫鬱於腠理皮毛之病俱生表裏之痾因起從少陽發動及少隂氣則臟腑受厲而生其病相反若腑虛則為隂邪所傷腰背強急腳縮不伸胻中欲折目中生花若臟虛則為陽毒所損澀澀前寒而後熱頸外雙筋牽不能屈伸頸直背強眼赤黃若欲轉動合身回側故曰青筋病扁鵲曰灸肝肺二輸主治丹毒牽病當依源處治調其陽理其隂臟腑之疾不生矣肝實附論夫左手關上脈隂實者足厥隂經也肝實之狀苦心下堅滿常兩脅痛或引小腹忿忿如怒頭目眩痛眥赤生瘜肉陽毒所攻悒悒先寒而後熱頸直背強筋急不得屈伸其脈見於左手關上隂實者其脈浮大而數乃足厥隂經有餘之候蓋肝實則生熱熱則陽氣盛故其證如此左手關上脈隂陽俱實者足厥隂與少陽經實也病若胃脹嘔逆食不消名曰肝膽俱實也方㵼肝湯療肝氣實目赤若黃脅下急小便難人參甘草炙各二兩生薑五兩黃芩二兩半夏一升洗大棗十四枚擘右切以水五升煮半夏三四沸內藥最後內薑煎取二升去滓分為二服羸人三服忌海藻菘菜羊肉犀角地黃湯治肝臟壅實風熱客摶經絡動於心肺上膈痰痺喉嗌乾燥不利四肢淫樂或祕或壅犀角鎊屑一兩一分熟乾地黃洗切焙三兩羌活去蘆頭獨活去蘆赤箭石菖蒲芎藭藁本洗焙沒藥研威靈仙洗焙黃蓍銼烏藥銼甘草炙銼木香當歸切片焙蟬蛻洗焙防風去叉各一兩大黃銼炒郁李仁去皮研各二兩五錢右粗搗篩每服三錢水一盞薄荷五葉煎至七分去滓溫服日三次如膈有熱入生地黃汁少許如大腸祕澀加芒硝一錢驅風湯治肝實熱兩眼赤澀疼痛頭重心煩上焦壅滯蔓荆實羌活去蘆頭防風去叉升麻決明子黃芩去黑心赤芍藥甘草炙車前子羚羊角乾菊花麥門冬去心各五錢柴胡去苖枳殼去瓤麵炒梔子仁各一兩右粗搗篩每服三錢水一盞煎至七分去滓食後溫服㵼肝散治肝實熱心膈壅滯虛煩乾菊五錢決明子五錢黃芩五錢川升麻五錢枳殼五錢麵炒微黃去瓤防風五錢去蘆頭梔子仁五錢黃連五錢去鬚犀角屑五錢川大黃五錢銼微炒甘草一分炙微赤銼馬牙硝一分研龍腦一分研麝香一分研右為末入後三味更同研令勻每於食後煎麥門冬湯調下一錢忌炙煿熱麵㵼肝湯治肝臟積熱氣昏血澀或因食酸物過多肝血積不散氣血俱病兩脅下非時氣動每動左脅下有聲右脅相應日漸胃脘結塊使人心腹滿悶上衝咽喉頭目不利睡卧不安如蟲所齧心肝非時氣逆上築咽喉須是開口吐氣方得稍快須臾却平復如故大抵此病根起於肝相形於脾故病作時先於脅下方入胃脘宜服此藥荆芥穗連翹羌活去蘆心牡丹皮黃芩去黑心杏仁去皮尖雙人炒研當歸切焙芍藥梔子仁大黃銼炒雞蘇去梗虎杖麻黃去根節各五錢右粗搗篩每服三錢水一盞生薑三片煎至七分去滓溫服此藥數日後如病不減却進後方射干散取肝中積血從大便下如腐爛瘀血之類若服前藥已差更不用服後方射干散射干肉桂去粗皮牛膝酒浸切焙牡丹皮鱉甲醋炙去裙欄牽牛子炒大黃銼焙各五錢荆芥穗細辛去苗葉各一分狼毒芫花與狼毒同用醋炒焦色各一錢半夏為末用生薑汁和成餅子一錢右為細末每服一錢食後煎蔥湯調下一二服內如毒已下即不用服逺志散治肝邪熱出言反常乍寬乍急逺志射干杏仁大青各一兩五錢茯神麥門冬葛根甘草各一兩芍藥一兩三分桂心三分知母升麻各五分石膏二兩右為粗散以水二升五合煮竹葉一升取汁內藥一七半煎取八合為一服一以綿裹散煮之洗肝湯治肝實兩脅脹滿氣急眼昏柴胡去苖鱉甲醋炙去裙襴各二兩桔梗一兩赤茯苓去黑皮一兩五錢檳榔銼肉桂去粗皮甘草炙銼五味子陳橘皮湯浸去白焙人參各一兩白术一兩五錢半夏湯浸七遍去骨三分右為粗散搗篩每服二錢水一盞入生薑五片煎至六分食前去滓溫服竹瀝㵼熱湯治肝實熱陽氣伏邪熱喘逆悶恐目視物無明狂悸非意而言者竹瀝一升麻黃大青梔子仁升麻茯苓玄參知母各三分生葛石膏各八分生薑芍藥各四分右㕮咀以水九升煮二升半去滓下竹瀝煮兩三沸分三服須利下芒硝三分去芍藥加生地黃五分一方無芍藥石膏生薑生葛用人參三分