方牽牛子二兩半皂角一兩去黒皮炙乾右各細杵羅為末毎使三錢用舊筆管盛藥内在糓道中吹之取大腑氣下乾糞通暢筆管須是石上磨無鋒刄免傷腸胃治噎病如前方所説病根用引大腑藥了大腑通快宜服此方沉香木香各二銖羗活防風川芎薄荷枇杷葉新布拭去毛炙牽牛熟使荆芥穗各一分右細杵羅為末每服二錢水一盞生薑一片同煎一二沸食後去滓服治噎病如前方所説病根用前方引大腑藥已得通暢血脈盛者即喫此方枇杷葉半兩拭去毛甘草沉香各三銖紫蘇葉荆芥穗右細杵羅為末每服以生薑一大片煎藥水二盞取九分食後或半空心服治噎塞不通因憂悲而得大腑不通宜先用引大腑藥了後喫此方須是大腑通喫此藥桑寄生防風枇杷葉甘草桔梗沉香木香川芎各一分細辛四銖牽牛熟使半兩右細杵羅為末毎服二錢水一盞煎取九分空心服漸减分數即减牽牛一味治冷噎不通飲食不進身上厥冷胸前如有冷物一塊填塞心胸大腑虛冷宜進此服藿香細辛菖蒲半夏甘草各一分乾薑豆䓻吴茱茰蓬莪荗川芎各一兩煎香半兩右細杵羅為末每服三錢水一盞二分生薑三片同煎取一盞一分空心和滓去滓任意服治胃寒履濕四肢厥冷胸前噎塞飲食不下腹脇脹滿大腑虛冷草豆蔲半兩防風去蘆細辛肉豆䓻木香藿香川芎各一分官桂去皮丁香各三銖右細剉羅為末每服二錢水一盞煎一二沸和滓空心喫之東坡先生家藏五行記云出肘後方綘州僧病噎不下食告弟子吾死之後便可開吾胸喉視有何物言終而卒弟子依言而開視胸中得一物形似魚而有兩頭遍體是肉鱗弟子置器中跳躍不止戱以諸味皆隨化盡時夏中藍多作靛有一僧以靛置器中此蟲遂遶器中走須臾化為水故世稱藍靛治噎有効一方治膈氣咽喉噎塞飲食不下主噎哽心胸痛滿出本草用屐屧鼻繩灰着經乆逺欲爛斷者水服之良治食哽出本草右鷹屎燒灰服方寸匕虎狼鵰屎亦得療卒噎法出聖惠方右傍人可緩解衣帶令噎者知則愈治卒噎方右方與共食人當以手捉噎人筯問曰此等何物噎人當答言筯共食人云噎下去則立愈治卒噎不下方水一杯刀一口右先以刀横水已後盡飲之則下噎不下食煩悶夫隂陽不和則三焦隔絶而津液不利遂令氣不調是以成噎也此由憂恚所致憂恚則氣結氣結則不宣流食飲不下心胸煩悶故令噎塞不通也方木香散出聖惠方治心胸噎塞煩悶食飲不下木香半兩赤茯苓半兩昆布三分洗去醎味桔梗三分去蘆木通三分剉桑根白皮二兩半夏三分湯泡七次射干半兩人參三分去蘆枇杷葉三分拭去毛炙黄桂心三分枳殻三分麸炒微黄右為散毎服三錢以水一中盞入生薑半分煎至六分不計時候温服蘆根散出聖惠方治噎不下食心胸煩悶不得眠卧蘆根一兩剉木通半兩剉射干三分半夏三分湯泡七次赤茯苓半兩人參一兩去蘆甘草半兩炙枳殻三分麸炒微黄右為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候温服訶梨勒散出聖惠方治噎心胸煩滿食飲不下脇腹妨悶訶梨勒皮一兩半枳殻麸炒三分去穰甘草半兩炙微赤剉桂心三分陳橘皮一兩湯浸去白焙蘆根一兩剉木𤓰三分乾者木香半兩羚羊角屑三分右為細散不計時候煎木𤓰湯調下一錢半夏圓出聖惠方治噎心胸短氣煩悶不能下食半夏二兩湯泡七次木香一兩羚羊角屑一兩桂心一兩半枳殻二兩麸炒微黄去穰右為細末以生薑自然汁煮麺糊和丸如梧桐子大每服不計時候煎木𤓰湯下二十丸生薑汁煎出聖惠方治噎不能下食咽喉壅塞生薑汁五合白蜜五兩人參二兩去蘆搗羅為末百合二兩搗羅為末牛酥右件藥内銅鍋中以慢火煎成膏不計時候含一丸如半棗大嚥津或煎人參湯調下一茶匙亦得普濟方巻二百五
