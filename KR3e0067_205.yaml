body:
  text: 普濟方巻二百五明周王朱橚撰膈噎門膈氣宿食不消附論夫飲食入於胃而化於脾脾胃和調則水穀易腐若脾胃虛寒即𫝊化不時新陳藴積況膈氣之人氣道乆澁是以噫氣酸臭否滿噎塞而苦宿食不消也麥蘖散治膈氣宿食不消麥蘖四兩炒芎藭白芷蘹香子炒烏藥各一兩半莎草根炒去毛桔梗炒陳橘皮湯浸去白焙縮砂去皮紅豆蓬莪荗炮厚朴去粗皮生薑汁炙熟人參各一兩白术三兩桂去粗皮訶棃勒皮半兩木香二錢蒼术米泔水浸一宿麸炒三兩右為散每服二錢陳米飲或鹽湯調下不計時候厚朴湯治膈氣宿食不消厚朴去粗皮剉兩半生薑汁浸一宿炒草豆䓻去皮桂去粗皮髙良薑五味子各半兩青橘皮湯浸去白焙人參甘草炙麥蘖炒柴胡去苖麻黄去根節煮掠去沬焙陳麹炮訶梨勒炮去核各一兩益智炒去皮二兩乾薑炮一分烏頭炮製去皮臍二兩陳橘皮湯浸去白焙一兩右粗篩每服三錢以水一盞薑三片棗二枚擘破同煎至七分去滓稍熱服不計時候人參茯苓湯治膈氣宿食不消痰毒虛氣飲食無味壮熱增寒霍亂吐逆人參二兩赤茯苓去黒皮一兩半訶梨勒皮附子炮製去皮臍黄耆前胡去蘆頭枇杷葉拭去毛白术麻黄去根節益智子去皮陳橘皮桂去粗皮乾薑炮甘草炙各一兩右粗搗篩每服三錢水一盞生薑三片棗二枚擘破同煎至七分去渣温服如脾泄氣痢及傷寒三日外要出汗併三服衣被盖出汗不計隂陽一切食毒傷寒並能療之蓽澄茄散治膈氣壅滯脾胃虛弱宿食不消四肢虛乏蓽澄茄一兩草豆䓻半兩去皮人參半兩去蘆頭白术三分木香半兩大腹皮三分剉荆三稜半兩微煨剉五味子半兩細辛一兩甘草半兩炙微赤剉訶梨勒皮一兩髙良薑半兩剉半夏半兩湯洗七遍去滑青橘皮半兩湯浸去白穰焙右為散每服三錢以水一中盞入生薑半分棗二枚同煎至六分去滓不計時候稍熱服參麹散出聖濟總録治膈氣宿食不消氣攻兩脇痛口内唾痰心胸不快人參白茯苓去黒皮枳殻去穰麸炒京三稜煨熟桂去粗皮木香甘草炙白术白㯽榔剉陳麹炒黄訶梨勒皮乾薑炮厚朴去粗皮生薑汁炙熟各三分右為散每服二錢入鹽㸃服空心食前厚朴散出聖惠方治膈氣脾胃乆冷宿食不消心腹虛脹四肢痩弱宜服厚朴一兩去粗皮薑汁炙沉香三分青橘皮湯浸二宿去白穰焙㯽榔半兩丁香半兩訶梨勒皮一兩半桂心半兩草豆䓻一兩去皮白术三分人參三分去蘆頭木香三分髙良薑三分剉甘草一分炙微黄剉右為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服人參湯出聖惠方治膈氣壅滯不下飲食或宿食不消人參一兩去蘆頭木香半兩㯽榔半兩乾薑三分炮製剉白术一兩枳殻半兩麸炒㣲黄去瓤桂心一兩赤茯苓一兩青橘皮三分湯浸去白焙京三稜一兩微煨剉甘草半兩炙微赤剉訶棃勒皮一兩厚朴二兩去粗皮塗薑汁炙令香熟右為散每服三錢水一中盞煎至六分去滓不計時候稍熱服草豆䓻散治膈氣壅滯不下飲食或宿食不消人參三分去皮細辛半兩赤茯苓半兩厚朴一兩去粗皮塗薑汁炙令香熟草豆䓻三分去蘆頭青橘皮三分去白焙訶梨勒皮一兩益智子半兩去皮半夏半兩湯浸七遍去滑甘草一分炙微赤剉丁香一分㯽榔三分右散每服三錢水一中盞入生薑半分煎六分去滓不計時候稍熱服訶棃勒湯出聖惠方治膈氣脾胃積冷宿食不消心胸不利訶梨勒皮一兩人參三分去蘆頭白术三分木香二分黄耆三分剉神麯一兩炒微黄桂心三分麥蘖三分炒微黄髙良薑三分炒草豆䓻三分去皮陳橘皮半兩湯浸去白穰焙右為細末不拘時候以生薑湯調下一錢草豆䓻散治膈氣宿食不消草豆䓻去皮髙良薑炮陳麯炒木香各一兩訶棃勒炮去核陳橘皮湯浸去白焙桂去粗皮麥蘖炒烏梅肉炒甘草炙各半兩右為末每服二錢入鹽㸃服空心食前建中湯出王氏愽濟方治膈氣宿食不消胸膈痞滿心腹脹痛隂陽不和臍腹撮痛草豆䓻去皮陳麯炒麥蘖炒陳橘皮湯浸去白焙白术厚朴去粗皮炙香熟乾薑炮各一兩蘹香子炒木香各半兩右粗搗篩每服三錢入生薑三片棗二枚擘破水一盞同煎至七分去滓温服不計時候一方為末入鹽煎湯下空心常服磨脾湯出聖濟總録治膈氣宿食不消温脾胃除積冷木香人參附子炮製去皮臍赤茯苓去黒皮甘草各二兩乾薑炮神麯炒麥蘖炒草豆䓻去皮各一兩右為散每服二錢入鹽㸃服不計時候木香散出聖惠方治膈氣胸中不利宿食不化木香一兩桃仁半兩湯浸去皮尖䨇仁麸炒草豆䓻一兩去皮訶梨勒皮二兩桂心一兩㯽榔一兩白术三分麥蘖三分炒微黄甘草一分微炒右為散每服四錢水一中盞入生薑半分煎六分去滓不拘時候稍熱服人參散治胸膈氣滯脾胃虛冷飲食不消面無顔色人參一兩去蘆頭赤茯苓一兩白术一兩木香半兩麥蘖三分炒微黄訶棃勒皮一兩縮砂半兩去皮附子一兩炮製去皮臍吴茱茰一兩湯浸七遍焙乾微炒右為散毎服不計時候以粥飲調下一錢訶梨勒圓治膈氣心胸妨悶不能下食食不消化訶梨勒皮一兩半㯽榔一兩桂心一兩木香一兩甘草半兩炙微赤剉陳橘皮二兩湯浸去白焙前胡一兩半去蘆頭白术一兩五味子一兩右為末以棗肉和搗三二百杵丸如梧桐子大每服不計時候以生薑湯棗湯下三十丸神麯丸出聖惠方治膈氣不下食不能消化神麯四兩炒微黄麥蘖四兩炒微黄厚朴二兩去粗皮生薑汁炙熟桂心一兩陳橘皮一兩半湯浸去白焙㯽榔一兩乾薑一兩炮製剉訶梨勒皮一兩右為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候生薑湯下二十丸蘇湯煎治膈中氣不快酒食不消飲食不快善治脾元一切虛中積滯肉豆䓻丁香沉香硇砂各一分京