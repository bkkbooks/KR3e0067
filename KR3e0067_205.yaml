body:
  text: 普濟方卷二百五明周王朱橚撰膈噎門膈氣宿食不消附論夫飲食入於胃而化於脾脾胃和調則水穀易腐若脾胃虛寒即傳化不時新陳藴積況膈氣之人氣道久澀是以噫氣酸臭否滿噎塞而苦宿食不消也麥蘖散治膈氣宿食不消麥蘖四兩炒芎藭白芷蘹香子炒烏藥各一兩半莎草根炒去毛桔梗炒陳橘皮湯浸去白焙縮砂去皮紅豆蓬莪荗炮厚朴去粗皮生薑汁炙熟人參各一兩白术三兩桂去粗皮訶梨勒皮半兩木香二錢蒼术米泔水浸一宿麩炒三兩右為散每服二錢陳米飲或鹽湯調下不計時候厚朴湯治膈氣宿食不消厚朴去粗皮銼兩半生薑汁浸一宿炒草豆䓻去皮桂去粗皮髙良薑五味子各半兩青橘皮湯浸去白焙人參甘草炙麥蘖炒柴胡去苖麻黃去根節煮掠去沫焙陳麴炮訶梨勒炮去核各一兩益智炒去皮二兩乾薑炮一分烏頭炮製去皮臍二兩陳橘皮湯浸去白焙一兩右粗篩每服三錢以水一盞薑三片棗二枚擘破同煎至七分去滓稍熱服不計時候人參茯苓湯治膈氣宿食不消痰毒虛氣飲食無味壯熱增寒霍亂吐逆人參二兩赤茯苓去黑皮一兩半訶梨勒皮附子炮製去皮臍黃耆前胡去蘆頭枇杷葉拭去毛白术麻黃去根節益智子去皮陳橘皮桂去粗皮乾薑炮甘草炙各一兩右粗搗篩每服三錢水一盞生薑三片棗二枚擘破同煎至七分去渣溫服如脾泄氣痢及傷寒三日外要出汗併三服衣被蓋出汗不計隂陽一切食毒傷寒並能療之蓽澄茄散治膈氣壅滯脾胃虛弱宿食不消四肢虛乏蓽澄茄一兩草豆䓻半兩去皮人參半兩去蘆頭白术三分木香半兩大腹皮三分銼荆三稜半兩微煨銼五味子半兩細辛一兩甘草半兩炙微赤銼訶梨勒皮一兩髙良薑半兩銼半夏半兩湯洗七遍去滑青橘皮半兩湯浸去白穰焙右為散每服三錢以水一中盞入生薑半分棗二枚同煎至六分去滓不計時候稍熱服參麴散出聖濟總録治膈氣宿食不消氣攻兩脅痛口內唾痰心胸不快人參白茯苓去黑皮枳殼去穰麩炒京三稜煨熟桂去粗皮木香甘草炙白术白檳榔銼陳麴炒黃訶梨勒皮乾薑炮厚朴去粗皮生薑汁炙熟各三分右為散每服二錢入鹽點服空心食前厚朴散出聖惠方治膈氣脾胃久冷宿食不消心腹虛脹四肢瘦弱宜服厚朴一兩去粗皮薑汁炙沉香三分青橘皮湯浸二宿去白穰焙檳榔半兩丁香半兩訶梨勒皮一兩半桂心半兩草豆䓻一兩去皮白术三分人參三分去蘆頭木香三分髙良薑三分銼甘草一分炙微黃銼右為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服人參湯出聖惠方治膈氣壅滯不下飲食或宿食不消人參一兩去蘆頭木香半兩檳榔半兩乾薑三分炮製銼白术一兩枳殼半兩麩炒微黃去瓤桂心一兩赤茯苓一兩青橘皮三分湯浸去白焙京三稜一兩微煨銼甘草半兩炙微赤銼訶梨勒皮一兩厚朴二兩去粗皮塗薑汁炙令香熟右為散每服三錢水一中盞煎至六分去滓不計時候稍熱服草豆䓻散治膈氣壅滯不下飲食或宿食不消人參三分去皮細辛半兩赤茯苓半兩厚朴一兩去粗皮塗薑汁炙令香熟草豆䓻三分去蘆頭青橘皮三分去白焙訶梨勒皮一兩益智子半兩去皮半夏半兩湯浸七遍去滑甘草一分炙微赤銼丁香一分檳榔三分右散每服三錢水一中盞入生薑半分煎六分去滓不計時候稍熱服訶梨勒湯出聖惠方治膈氣脾胃積冷宿食不消心胸不利訶梨勒皮一兩人參三分去蘆頭白术三分木香二分黃耆三分銼神麯一兩炒微黃桂心三分麥蘖三分炒微黃髙良薑三分炒草豆䓻三分去皮陳橘皮半兩湯浸去白穰焙右為細末不拘時候以生薑湯調下一錢草豆䓻散治膈氣宿食不消草豆䓻去皮髙良薑炮陳麯炒木香各一兩訶梨勒炮去核陳橘皮湯浸去白焙桂去粗皮麥蘖炒烏梅肉炒甘草炙各半兩右為末每服二錢入鹽點服空心食前建中湯出王氏博濟方治膈氣宿食不消胸膈痞滿心腹脹痛隂陽不和臍腹撮痛草豆䓻去皮陳麯炒麥蘖炒陳橘皮湯浸去白焙白术厚朴去粗皮炙香熟乾薑炮各一兩蘹香子炒木香各半兩右粗搗篩每服三錢入生薑三片棗二枚擘破水一盞同煎至七分去滓溫服不計時候一方為末入鹽煎湯下空心常服磨脾湯出聖濟總録治膈氣宿食不消溫脾胃除積冷木香人參附子炮製去皮臍赤茯苓去黑皮甘草各二兩乾薑炮神麯炒麥蘖炒草豆䓻去皮各一兩右為散每服二錢入鹽點服不計時候木香散出聖惠方治膈氣胸中不利宿食不化木香一兩桃仁半兩湯浸去皮尖雙仁麩炒草豆䓻一兩去皮訶梨勒皮二兩桂心一兩檳榔一兩白术三分麥蘖三分炒微黃甘草一分微炒右為散每服四錢水一中盞入生薑半分煎六分去滓不拘時候稍熱服人參散治胸膈氣滯脾胃虛冷飲食不消面無顔色人參一兩去蘆頭赤茯苓一兩白术一兩木香半兩麥蘖三分炒微黃訶梨勒皮一兩縮砂半兩去皮附子一兩炮製去皮臍吳茱茰一兩湯浸七遍焙乾微炒右為散每服不計時候以粥飲調下一錢訶梨勒圓治膈氣心胸妨悶不能下食食不消化訶梨勒皮一兩半檳榔一兩桂心一兩木香一兩甘草半兩炙微赤銼陳橘皮二兩湯浸去白焙前胡一兩半去蘆頭白术一兩五味子一兩右為末以棗肉和搗三二百杵丸如梧桐子大每服不計時候以生薑湯棗湯下三十丸神麯丸出聖惠方治膈氣不下食不能消化神麯四兩炒微黃麥蘖四兩炒微黃厚朴二兩去粗皮生薑汁炙熟桂心一兩陳橘皮一兩半湯浸去白焙檳榔一兩乾薑一兩炮製銼訶梨勒皮一兩右為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候生薑湯下二十丸蘇湯煎治膈中氣不快酒食不消飲食不快善治脾元一切虛中積滯肉豆䓻丁香沉香硇砂各一分京