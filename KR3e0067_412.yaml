body:
  text: 普濟方卷四百十二明周王朱橚撰針灸門三人圖附經絡穴圖夫病源所起本於臟腑臟腑之脈皆出手足循環腹背無所不至往來出沒難以測量將欲指取其穴非圖莫可預備諸要非灸不精故經曰湯藥攻其內針灸攻其外則病無所逃矣方知針灸之功過半於湯藥然去聖久逺學徒蒙昧孔穴出入莫測經源濟弱扶危臨事多錯因慨其不逮鳩集今古名醫明堂以述此篇用補私闕庶依孔知穴按經識分則孔穴親踈居然可見矣舊明堂圖年代久逺傳寫錯誤不足指南今依甄權等所撰為定云爾銅人經云黃帝問曰余聞氣穴三百六十五以應一歲未知其所願卒聞之岐伯稽首再拜對曰善乎哉問也其非聖帝孰能窮其道焉因請益意盡言其處雷公問曰禁服之言凡刺之理經脈為始願聞經脈之始生帝答曰經脈者所以決死生處百病調虛實不可不通也流注經絡井榮圖説夫流注者為刺法之深源作針術之大要是故流者往也蓋流者要知經脈之行流也謂十二經脈各至本時皆有虛實邪正之氣注於所括之穴也夫得時謂之開失時謂之闔夫開者針之必除其病闔者刺之難愈其疾可不明兹二者乎况經氣內於五臟外應之節針刺之道經脈為始若識經脈則諸行氣部分脈之短長血氣多少行之逆順祛逐有過補虛㵼實則萬舉萬痊若夫經脈之源而不知邪氣所在而不辨往往病在陽明反攻少陰疾在厥陰却和太陽遂致賊邪未除本氣受弊以此推之經脈之理不可不通也昔聖人深慮此者恐後人勞而少功也廣因間暇之際爰取前經以按舊典遂為摘葉採托精萃以明流注之幽微庶免討尋之倦怠不揆荒拙列圖於後凡我同聲者見違闕改而正之不亦宜乎凡刺之理經脈為始經脈者所以能決死生處百病調虗實不可不通也夫經氣者內干五臟而外絡支節其浮氣不循經者為衛氣精血專行於經隧者為榮氣陰陽隨內外相實如環之無端以常平旦為紀其脈始從中焦手太陰出注於手陽明上行注足陽明下行至肘上注大指間與足太陰合上行抵脾從脾注心中循手少陰出腋下臂注小指合手太陽上行乘腋出䪼內背上巔下項合足太陽循脊下尻下行注小指之端循足少陰上行注腎注心外散於胸中循手心主脈出腋下臂入兩筯之間入掌中出中指之端環注小指次指之端合手少陽上行注膻中散於三焦從三焦注膽出脅注足少陽下行至肘上復從肘注大指間合足厥陰上行至肝從肝注肺中復出於手太陰此榮氣之行也逆順之常榮氣之行常循其經周身之度一十六丈二尺一日一夜行八百一十丈計五十度周於身衛氣則不循其經焉晝行於陽夜行於隂行於陽者行諸經行於隂者行諸臟凡刺之道須衛所在然後迎隨以明補㵼此之謂也黃帝內經曰凡人兩手足各有三隂三陽脈以合為十二經脈也手之三隂從臟走至手手之三陽從手走至頭足之三陽從頭下走至足足之三隂從足上走入腹絡脈傳注周流不息故經脈者行血氣通隂陽以榮於身者也其始從中膲注手太隂陽明手陽明注足陽明太隂足太隂注手少隂太陽手太陽注足太陽少隂足少隂注手厥隂少陽手少陽注足少陽厥隂足厥隂注手太隂其氣常以平旦為紀以漏水下百刻晝夜行流與天同度終而復始也手太隂肺之經手太隂之脈起於中膲中膲者在胃中脘主腐熟水榖水穀精微上注於肺肺行榮衛故十二注肺自此為始所以手太陰之脈起於中膲又髙蒸德云中膲乃臍中也下絡大腸大腸為肺之雄故肺脈絡大腸環循胃口胃口謂胃之上口賁門之謂也上膈屬肺手太隂為脈之主故其肺上膈屬於肺從肺系橫出腋下腋胃肩之裏也下循臑內臑為肩肘之間也行少陰心主之前少陰心主處中而大腸在後太隂行其前也下肘中尺澤穴分下循臂內上骨下廉上骨為臂之上骨上骨也下廉也入寸口經渠在穴此寸口中上魚魚為手大指之後也以其處如魚之形故曰魚循魚際魚際謂手魚之際有穴居此故名曰魚間也出大指之端少啇穴分也其支者針經曰支而為絡此手太陰之脈别走陽明者也穴名别缺從脘後直出次指內廉出其端手太陰自此交入手陽明是動則病手太陰常多氣少血今氣先病是謂是動難經曰是動者氣也此之謂乎肺脹滿膨膨而喘咳膨膨謂氣不宣暢也缺盆中痛缺盆穴名在肩下橫骨陷中言其處如缺豁之盆故名曰缺盆甚則交兩手而瞀太素注云瞀低目也是謂臂厥肘前曰臂氣逆曰厥主肺所生病者邪在氣留而不去則傳之於血也血既病矣是氣之所生故云所生病也難經曰所病者血也斯之謂乎咳嗽上氣喘渴煩心胸滿臑臂內前廉痛掌中熱氣盛有餘則肩背痛風汗出中風小便數而欠數頻者欠少也氣虛則肩背痛寒則少氣不足以息溺色變卒遺失無度盛者寸口大三倍於人迎虛者則寸口反小於人迎也寸口人迎諸書不同有言寸口人迎者有言肺口人迎者言氣然人迎者然則氣口脈如與寸口脈異也同乎按五臟别論注云寸口可以候氣之盛衰故云氣口可以切肺之動靜故云肺口由是則脈如氣口皆寸口也觀丁德用二難圖可知矣氣口人迎在頭而告取手手也在手關前一分人迎之估也右手關前一分氣口之位也候氣口以知陰候人迎以知陽知陽知陰而盛躁明矣明盛躁而死生定以扁鵲所為經脈十二絡脈十五皆因其圓如環之無端轉相激灌朝於寸口人迎以處百病而不決死生也者正謂此矣人迎主外寸口主內兩者相應俱往俱來若繩小大齊寸命之口平若其不一謂之有病素問云人迎盛病在三陽寸口盛病在三陰若細言之肺人迎一盛在病足少陽一盛而躁在手少陽迎人二盛病在太陽二盛而躁在手太陽人迎之盛病在足陽明三盛而躁在手陽明人迎四嵗已上謂之格陽寸口一盛病在足厥陰一盛而躁在手心主寸口二盛病在足少陰二盛而寸在手少陰寸口三盛病在足太陰三盛病而躁在手太陰寸口四盛已上謂之陰關若寸口人迎俱盛倍已上謂之關格關格者不得盡其命而死矣是以人迎二盛寫足少陽補足厥陰二寫一補曰一取之躁取之手人迎二盛寫足太陽補足少陽二二㵼一補二日一取之躁取之手人迎三盛寫足陽明補足太陰二寫一補日二取之躁取之二寸口一盛寫足厥陰補足少陽二補一寫日一取之躁取之三寸口一盛寫足厥隂補足少陽二足一寫日一取之躁取之手寸口二盛寫足少陰補足太隂一補二寫日二之躁取之手寸口二盛㵼足太陰補足陽明二補一㵼日二取之躁取之手寸口人迎此日必切而驗之氣和乃正今補經言盛者寸口大三倍於人迎則是寸口二盛而躁㵼手太陰補手陽明手二補三㵼日二取之者是也虛者寸口反小於人迎則是人迎三盛而躁㵼手陽明補手太陰三㵼一補日二取之者是也虛者寸口反小陽别論注云胃脘之陽者胃人迎氣也察其氣脈動脈大小與脈曰應否也胃為水谷之海故候其氣而知病處人迎在結候兩傍一寸五分動之動常在小而右大左小常以候臟右大常以候腑氣口在手魚際之後二寸皆可以候臟腑之氣手太陰之别名曰列缺起於脘上分間並太陰之經直入掌中散於魚際實則手鋭掌熱虛則欠咳小便遺數取之去脘寸半别走陽明也手太陰之筋起於大指之上循指上行結於魚除之後行寸口外側上循臂結肘中上臑內廉入腋下出缺盆肩前髃上結缺盆下結胸裏散貫賁合賁下下抵季肋其病當所過者支轉筋痛甚則成息賁脅急吐血治在燔針劫刺以知為數以痛為輸名曰仲冬痺也肺病者喘咳而肩背痛汗出尻隂股膝髀腨胻足皆痛虛則少氣不能報息耳聾嗌乾取其經太隂足太陽之外厥隂內血者肺熱病者先浙然厥起毫毛惡凮寒舌上橫身熱熱則喘咳痛走胸膺背不得太息頭痛不堪汗出而寒丙丁甚庚辛大汗氣逆則丙丁死刺手太隂陽明出血如大豆立巳手太隂肺經從腹走手長三尺五寸左右共七尺凡二十二穴中府二穴雲門二穴天府二穴俠白二穴尺澤二穴孔最二穴列缺二穴經渠二穴魚際二穴太淵二穴少商二穴手陽明大腸經手陽明之脈起於大指次指之端內側次指之端商陽穴在焉循指上廉出合谷兩骨之間合谷穴名也此兩骨之間上入兩筋之中陽谷穴也循臂上廉臂之上廉遍厯之手陽明之經也入肘外廉曲池穴分也上循臑外前廉上肩出髃骨之前廉髃骨謂肩髃之骨也故肩髃穴在此過骨之端故亦名髃骨上出柱骨之會上氣府論云注柱骨主之會乃天鼎穴也在頭缺盆上直扶突氣舍後同身寸之半是也下入缺盆絡肺肺為大腸之維大腸脈絡于肺下膈入屬大腸手陽明為太陽之經故其肺屬太陽其支者從缺盆上頸結喉之後曰頸頸後曰項貫頰頰為面傍也下入齒縫還出挾口交人中人中一名水溝在鼻柱之下左之右右之左上挾鼻孔手陽明自此交入足陽明是動則病手陽明常多氣少血今氣先病是謂是動也齒痛䪼腫䪼謂顴之秀骨也是主津所生病者血受病於氣是氣之所生故云所生病也手陽明血氣常多乃人之常數也亦有異於常者靈樞經曰手陽明之上氣血甚則須美血少氣多則氣惡血氣皆少則無須手陽明之下血氣盛則下腋下毛美手魚肉以溫血氣皆少則手瘦寒由此則手陽明血氣多少可得而知也目寒口乾齁衄玉水曰鼻中水出日齁血出曰衄喉痺肩前濡痛大指次指痛不可用氣有餘則當脈所過者熱腫虛則寒栗不復栗戰也隂氣盛陽氣不足則為寒栗盛者人迎大三倍於寸口虛者人迎反小於寸口也手陽明之别名曰偏厯去脘三寸别入太陽其别者上肘循臂乘肩髃上曲頰遍齒其别者入耳會於宗脈實則齒齲耳聾虛則齒寒痺隔取所别也手陽明之筯起於大指次指之端結於脘上循臂結於肘外上臑結於髃其支者繞肩脾挾眷直者從肩髃上頸其支者上頰結於頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筯肩不舉頸不可左右視治在燔針劫刺以知為數以痛為輸名曰孟夏痺也邪客於手陽明之絡令人氣滿胸中喘息而支胠胸中熱刺手大指瓜甲上去端如韭業各一廂左取右右取左如食頃巳商穴陽也邪客於手陽明之絡令人耳聾時不聞音刺商陽立聞不巳刺中指瓜甲上與肉交者立聞其不時聞者不可刺也耳中生風者不刺之如此數左刺右右刺左手陽明不巳刺其通脈出耳前者熱病如手臂痛者刺手陽明大陰而汗出止手陽明大腸經從手走頭長五尺左右共一丈凡四十穴商陽二穴二間二穴三間二穴合谷二穴陽溪二穴偏厯二穴溫留二穴手下廉二穴手三里二穴曲池二穴肘髎二穴肩髃二穴巨骨二穴天鼎二穴扶突二穴禾髎二穴迎香二穴手上廉二穴足陽明胃經足陽明之脈起於鼻交額中兩目之間鼻物深處胃之額中旁納太陽之脈足太陽起於目背而陽明旁行約之下循鼻外迎香穴分也入上齒中還出頰口環脣下交承漿承漿穴名也在頥前脣下脘宛中却循頥後下廉出大迎大迎之穴在曲額前寸同身寸之一寸分陷者中循頰車頰車胃頰之牙車也言足陽明脈循此頰車而行故頰車在耳下曲頰之端陷中上耳前過客主人客主人在耳前起骨聞口有空處循髮際至腮其支者從大迎前下人迎人迎在結喉兩旁大脈動應手是也循喉嚨入缺盆下膈屬胃足陽胃之經故其脈屬於胃也絡脾脾者胃之雌故胃脈絡於脾也其直者從缺盆下乳內廉下俠臍入氣衝中氣衝穴名也在腹下挾兩旁相去同身寸之四寸鼠鼷上或云在毛際兩傍鼠鼷上乃三焦之道路故云氣衝或曰在皈來下同身寸之一寸其支者起胃下口胃下口即小腸上口也此處名幽門循腹裏下至氣衝中而合以下髀關抵伏兔伏兔血在膝上同身寸之六寸下入膝臏中臏謂膝之蓋骨也下循䯒外廉䯒外廉三里之分也下足跗跗謂足上在也衝陽穴焉入中指外間其支者下膝三寸而别以下入中指外間其支者别跗上入大指間出其端大指間次指之端也居免所居焉素問云陽明根起於屬兑是陽明自此交入足太陰是動則病足陽明常常多氣多血今氣先病是謂是動也悽悽然悽悽然不樂之貌振寒寒氣客於經則陰氣盛陽氣虛故為之振寒善伸伸謂伸弩筋骨也數欠顔黑顔額也病至則惡人足陽明厥則喘而惋惋則惡人也與火足陽明氣血常盛邪客之則熱熱盛則惡火聞木音則惕然而驚胃土也木能克土故聞木音則惕然而驚心動謂心不安也欲獨閉户而處處居陰陽相薄陽盡陰盛故欲獨閉户牖而居以其惡喧爾甚則欲上髙而歌甚謂盛也陽盛則四肢實能登高也歌者以陽主喜故其聲為歌耳棄衣而走熱盛於身故棄衣也以陽主動故走也賁響腹脹是謂骭厥是主血骭者脛别名也所生病者血受病於氣是氣之所生病也足陽明血氣常多乃人之常數也亦有異於常者虛樞經曰足陽明之上血氣盛則􅀈短氣少血多則髯少血氣皆少則無髯兩吻多盡足陽明之下血氣盛則下毛美長至胸血多氣少則下毛美短至臍行則善髙舉足足指少肉足善瘃血氣皆少則無毛有則髙抽悴瘻厥足痺又云美髯者陽明多由此則足陽明血氣多少可得而知之也狂瘧足陽明病發則多狂妄溫淫汗出其體溫壯漫淫可止汗出乃巳然巳而復起齁衄口喎脣疹疹謂脣瘍也頸腫喉痺大腹水腫胃為水穀之海氣虛弱則不能傳上水谷令水腫侍因而留滿腸胃之間其腫大故曰大腹水腫膝臏腫痛循膺乳胃傍曰膺膺下曰乳街股伏兔衝胃氣衝股胃膝上也骭外廉足跗上皆痛中指不用氣盛則身以前皆熱氣盛身熱説在下文其有餘於胃則消榖善飢胃為水榖之海其有餘則能消在水穀故病善飢溺色黃氣不足則身以前皆寒腹為陰背為陽足陽明行身之陰其氣盛故以前皆甚氣不足故身以前皆寒栗善行身之陽者足太陽之謂也胃中寒則脹滿寒氣者陰也隂主下若陰盛氣盛則復上行故病脹滿盛者人迎大三倍於寸口也虛者乃人迎而反小於寸口也足陽明之别名曰豐隆去踝八寸别走太陰其别者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逸則喉痺卒瘖實則狂癲疾虛則足不收脛枯取之所别也足陽明之筋起於中三指結於跗上斜外上加於輔骨上結於膝外廉直結於髀樞上循脅屬脊其直者上循骭結於缺盆其支者結於輔骨合少陽其直者上循伏兔上結於髀聚於陰器上腹而布至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上綱陽明為目下綱其支者從頰結於耳前其病足中指脛轉筋腳跳堅伏兔轉筋髀前腫㿗疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋縱緩不收故僻治之以馬膏膏其急者以白酒和桂以塗之其緩者以桑鉤鉤之即以生桑炭置之坎中髙下與坐等以膏尉急頰且飲美酒噉美灸肉不飲酒者自強也為之三時而已治在燔針劫刺以知為數以痛為名曰季春痺也邪客於陽明之絡令人齁衄上齒寒刺足中指次指爪甲上者各一痏左刺右右刺左繆傳引上齒齒脣寒痛視其手背脈血者去之足陽明中指爪甲上一痏手大指次指爪甲上各一痏立已左取右右取左胃之大絡名曰虛里貫膈絡脈出於左乳下其動應衣脈宗氣也足陽明胃之經從頭走足長八尺左右共一丈六尺凡九十穴頭維二穴下關二穴頰車二穴承泣二穴四白二穴巨髎二穴地倉二穴大迎二穴人迎二穴水突二穴氣舍二穴缺盆二穴氣户二穴庫房二穴屋翳二穴膺窗二穴乳中二穴不容二穴乳根二穴承滿二穴梁門二穴關門二穴太一二穴滑肉門二穴天樞二穴外陵二穴大巨二穴水道二穴歸來二穴氣衝二穴髀關二穴伏兔二穴陰市二穴梁丘二穴犢鼻二穴三里二穴上巨虛二穴條口二穴下巨虛二穴豐隆二穴解溪二穴衝陽二穴陷谷二穴內庭二穴厲兊二穴足太陰脾經足太陰之脈起於大指之端循指內側大指內側隱白所居素間曰太陰之根之起於隱白白肉際過核骨後核骨之下太白所居焉上內踝前廉商丘此居內踝之前上踹內踹謂頸魚腹也循䯒骨後交出厥陰之前厥陰行太陰之前至䯒骨之後而太陰復在甚前上循膝膝下相側陰陵在焉股內前廉入腹屬脾足太陰脾之經故其脈屬于脾絡胃胃者脾之雄故脾脈絡于胃也上膈挾咽連舌本舌本與會厭相連發泄音之所也散舌下舌不有泉乃脾之靈冿也道家飲此以延生號曰華池仲長繞曰漱舌下泉而明之名曰台倉其支者復從胃上膈注心中足太隂自此交入手少隂是動則病足太隂血今氣先病常多氣是為是動舌本強食則嘔素問所胃食則嘔者物盛滿而上益故嘔也胃脘痛以其脈絡胃故耳也腹脹素問所胃者太陰子也十一月萬物氣皆藏于中故曰病脹善噫素問曰心為噫今足太陰之陰氣盛而上走於心故為衆耳以脈者復後胃别上膈注心中故也得後與氣則快然如衰素問所謂後于氣則快然如衰者十二月隂氣下衰而陽氣且出故病如是身體皆重以脾主內故脾病則身體重是主脾所生病者血受病于氣是氣之所生故云所生病也舌本痛體不能動搖食不下煩心心下急痛寒瘧凡瘧先寒而後熱者謂之寒瘧先熱而後寒者謂之溫瘧但熱而不寒者謂之痺瘧溏瘕泄水閉按甲乙經作溏水泄病水濕溏泄謂如傷之溏也素問所謂鶩溏者是也黃疸不能卧強立股膝內腫厥按甲乙經作好卧不能食肉脣青強立股膝內足大指不能動盛者寸口大三倍於人迎虛者寸口反小於人迎也足太陰之别名曰公孫去本節之後一寸别走陽明其别者入絡腸胃厥氣上逆則霍亂寒實則腸中切痛虛則鼓脹取之所别也足太陰之筋起於大指之端內側上結於內踝其直者上結於膝內輔骨上循陰股結於髀聚於陰器上腹結於臍循腹裏結於脅散於胸中其內者著於脊其病足大指支內踝痛轉筋痛膝內輔骨痛陰股引髀而痛陰器鈕痛上引臍兩脅痛引膺中脊內痛治在燔針劫刺以知為數以痛為輸名曰孟秋痺也邪客於足太陰之絡令人腰痛引少腹控脅不可以仰息腰尻之解兩胂之上是腰腧以月死生為痏數發針立巳左刺右右刺左脾病者身重善飢內痿足不收行善瘈腳下痛虛則腹滿腸鳴飱泄食不化取其經太陰陽明少陰血者脾熱病者先頭重頰痛煩心顔青欲嘔身熱熱爭則腰痛不可俯仰腹滿兩頷痛甲乙甚戊巳大汗氣逆則甲乙死刺足太陰陽明脾之大絡脈别名曰大包出淵腋下三寸而胸脅實則一身盡寒虛則百節皆縱此絡若羅絡之脈者皆取之足太陰脾經從足走胸中長六尺五寸左右一丈三尺凡四十二穴隱白二穴大都二穴太白二穴公孫二穴商邱二穴三陰交二穴漏谷二穴地機二穴陰陵泉二穴血海二穴箕門二穴府舍二穴腹結二穴大橫二穴腹衰二穴食竇二穴天溪二穴胸鄉二穴周榮二穴大包二穴衝門二穴手少陰心經手少陰之脈起於心中出屬心系下膈絡小腸小腸心之雄故下膈絡小腸也其支者從心系上頰喉咽目系其直者復從心系却上肺出腋下又下循臑內後廉行太陰心主之後太陰心主行臑之前而女陰出其後也下肘內廉肘內橫文少海所居循臂內後廉抵掌後靈道在掌後同身寸之一寸五分鋭骨之端神門穴分也入掌內廉少府所居循小指之內出其端少衛居此少指內則手少陰自此交入手太陰也是動則病手少陰掌少血多氣今氣先氣為是動也嗌乾心痛渴而欲飲是謂臂厥是主心所生病者血受病於氣是氣之所生故云所生病也目黃脅廉痛厥掌中熱盛者寸口大再倍於人迎虛者寸口反小於人迎也心者君主大再其實堅固不受諸邪邪客之則死矣其有病乃在心之包絡也故病者治包絡之經無絶其經君焉故靈樞經曰少陰無腧外經受邪者正謂此也手少陰之别名曰通里去腕一寸别而上行循經入于心中繫舌本屬目系其實則支膈虛則不能言取之掌後一寸别走太陽也手少陰之筋起於小指之內側結於鋭骨上結肘內廉上入腋交太陰挾乳裏結於胸中循臂下繫於臍具病內急心承伏梁下為肘綱其病當所過者支轉筋筋痛治在燔針劫刺以知為數以痛為輸其成伏梁唾血膿者死不治經筋之病寒則反折筋急熱則筋弛縱不收陰痿不用陽急則反折陰急則俯不伸焠刺者刺寒急也熱則筋縱不收無用燔針心病者胸中痛脅支滿脅下痛膺背肩脾間痛兩臂內痛虛則胸腹右脅下與腰相引而痛取其經少陰太陽舌下血者其變病刺郤中出血心熱病者先不樂數日乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗壬癸甚丙丁大汗氣逆則壬癸死刺手少陰太陽手少陰心經從腹走手長三尺五寸左右共七尺凡二十八穴極泉二穴青靈二穴少海二穴靈道二穴通里二穴陰郤二穴神門二穴少府二穴少衝二穴手太陽小腸經手太陽之脈起於小指之端小指之端小澤所居循手外側手外側本節之前谷穴也本節之後後穴也上腕腕前腕骨腕中陽骨出踝中直上循臂骨下廉出肘內側兩骨之間兩骨間小海穴在焉上循臑外後亷出肘內側向腋出肩解繞肩脾交肩上入缺盆絡心心為小腸之雄故小腸脈絡於心胃也循咽下膈抵胃屬小腸手太陽為小腸之經故其脈屬小腸其支者别從缺盆循頸上頰至目鋭眥針經曰月背外缺於面者為鋭背却入耳中其支者别頰上䪼抵鼻至目內眥手太陽自此交入足太陽是動則病手太陽常多血少氣今氣先病是謂動則病也嗌痛頷腫頷謂頰下也不可回顧肩似拔臑似折是主液所生病者血受於氣是氣之所生病也手太陽常多氣少乃人之常數亦有異於常者多樞經曰手太陽之上血氣盛則多須面多肉以手血氣皆少則面瘦惡色手太陽之下血氣血盛則掌中肉盈滿血氣皆少則掌瘦以寒由此則上太陽血氣多少可得而知也耳聾目黃頰頷腫頸肩臑肘臂外臂後廉痛盛者人迎再倍於寸口虛者人迎反小於寸口也手太陽之别名曰支正上腕五寸內主少隂其别者上走肘絡肩髃實則節弛肘廢虛則生疣小者如指痂疥取之所别也手太陽之筋起於小指之上結於腕上循臂內廉結於肘內鋭骨之後彈之應小指之上入結於腋下其支者後走腋後亷上繞肩胛循頸出走太陽之前結於耳後完骨其支者入耳中直者出耳上下結頷上屬目外眥其病小指支肘內鋭骨後廉痛循臂陰入腋下腋下痛腋後廉繞肩胛引頸而痛應耳中鳴痛引頷目瞑良久乃得視頸筋急則為筋瘻頸腫寒熱在頸者治在燔針以痛為輸其為腫者後而鋭之本支者上曲牙循耳前屬目外眥上頷結於角其病當所過者支轉筋治在燔針劫刺以知為數以痛為輸名曰仲夏痺也小腸病者少腹痛腰脊控睪而痛時窘之後而前熱苦寒甚獨肩上熱及小指次指之間熱若脈陷者此其候也邪在小腸者連睪系屬於脊貫肝肺絡心系氣盛則厥逆上衝腸胃動肝肺散於肓結於臍故取之盲原以散之刺太隂以與之取厥陰以下之取巨虛上下廉以去之控其所過經以調之手太陽之經從手走頭長五尺左右共一丈凡三十八穴少澤二穴前谷二穴後溪二穴腕骨二穴陽谷二穴養老二穴支正二穴小海二穴臑腧二穴天宗二穴秉風二穴曲垣二穴肩外二穴肩中腧二穴天窗二穴天容二穴顴髎二穴聽宫二穴肩貞二穴足太陽膀胱經足太陽之脈起於目內眥內眥謂月之大角也上額交巔上巔頂也中史有施毛可豆乃三陽五會也其支者從巔至耳上角其直者從巔入絡腦頂為中頂前曰囟頂後曰頂左右曰角還出别下項循肩髆內挾脊抵腰中入循膂絡腎腎為膀胱之雌故膀胱脈屬膀胱其支者從膊內左右别下貫胂胂中兩髀骨下腎堅起肉也挾脊內過髀樞環跳穴有此髀樞中絡問曰髀樞中絡正者正為此言也循髀外後廉下合膕中以下貫腨內出外踝之後外踝之後崑崙所居焉循京骨京骨穴名也太陽之原在外則大骨下至小指外側小指外至則隂穴分也素問云太陽根於至陰足太陽自此交足少陰也是動則病足太陽常多血少氣今氣先病是謂是動也衝頭痛目似脫項似拔脊痛腰似折髀不可以曲膕如結腨如裂是謂踝厥是主筋所生病者血受病於氣是氣之所生病足太陽血多氣少則惡血靈氣少則滿腫少理血少氣多則血多內血氣和則美色足太陽之下血氣盛則跟肉滿衝踵以上氣少血多則瘦跟空血氣皆出則喜轉筋踵下痛只日美眉者太陽血多由此足太陽血氣多少可得而知也痔瘧狂巔疾素問云所謂狂巔疾者陽盡在上而陰氣欲下腦頂痛目黃深入齁衄頂背腰尻膕腨腳皆痛小指不用足太陽行身之踢故頭腦項皆腰尻膕腨腳皆痛小指不用也盛者人迎大再倍於寸口虛者人迎反小於寸口也足太陽之别名曰飛陽去踝七寸别走少陰實則齀窒頭背痛虛則齀衄取之所别也足太陽之筋起於足小指上結於踝斜上結於膝其下循足外側結於踵循跟結於膕其别者結於腨外上膕中內廉與膕中并上結於臀上挾脊上項其支者别入結於舌本其直者結於枕骨上頭下顔結於鼻其支者為目上綱下結於頄其支者從腋後外廉結於肩髃其支者入腋下上出缺盆上結於完骨其支者出缺盆斜上出於頄其病小指及跟腫痛膕攣脊反折項筋急肩不舉腋支缺盆中紐痛不可左右搖治在燔針劫刺以知為數以痛為輸名曰仲春痺也邪客於足太陽之絡令人頭項肩痛刺足小指爪甲至陰穴也與肉交者各一痏立已不已刺外踝下三痏左取右右取左如食頃邪客於足太陽之絡令人拘攣背急别脅而痛刺之從項如數脊􅀈俠脊疾按之應手如痛刺之傍三痏立已足太陽膀胱經從頭走足長八尺共一丈六尺凡一百二十六穴睛明二穴攢竹二穴曲差二穴五虔二穴承光二穴通天二穴絡却二穴玉枕二穴肺腧二穴大杼二穴風門二穴膈腧二穴厥陰腧二穴心腧二穴脾腧二穴肝腧二穴膽腧二穴腎腧二穴胃腧二穴三焦腧二穴膀胱腧二穴大腸腧二穴小腸腧二穴上髎二穴中膂內腧二穴白環腧二穴下髎二穴次髎二穴中髎二穴魄户二穴會陽二穴附分二穴譩嘻二穴膏肓二穴神堂二穴陽綱二穴隔關二穴魂門二穴天柱二穴挨前通天穴是意舍二穴胃倉二穴肓門二穴至室二穴胞肓二穴祑邊二穴承扶二穴殷門二穴浮郤二穴委陽二穴委中二穴合陽二穴承筋二穴承山二穴僕參二穴付陽二穴崑崙二穴飛陽二穴申脈二穴金門二穴京骨二穴束骨二穴通谷二穴至陰二穴足少陰腎經足少陰之脈起於小指之下斜趣足心足心通泉穴分也素問曰少陰之根起於涌泉穴也出然谷之下然谷所居素問也云刺足下包絡中脈血不出為腫循內踝之後伏溪穴分也别入跟中伏腫在此跟中足少陰之絡别入太陽之絡以上踹內復留在內跟上同身中二寸腨分中出膕內廉陰骨居此膕內廉上股內後廉貫脊屬腎足少陰腎之經故其脈屬于腎其直者從腎上貫肝膈入脈中循喉嚨挾舌本其支者從脈出絡心注胸中足少陰自此交入手心中是動則病足少陰常少血多氣今氣先病是謂是動也飢不欲食面黑如炭色一作如地色素問曰所謂面黑如地者和氣內奪故變於色也咳唾則有血素問所謂效則有血者陽脈傷也陽氣未盛於上而脈則滿滿則咳故血見於鼻也喝喝而喘以其脈入肺中循喉嚨故爾坐而起目􅉩􅉩無所見素問所謂不能久立久坐則目􅉩􅉩無所見者萬物陰陽不定未冇主也秋氣姑至微霜姑下而方殺陰陽內奪目􅉩􅉩無所見也心懸若飢狀氣不足則善恐心惕惕若人將捕之素問所謂善恐如人將捕之者秋氣萬物未有畢去陰氣少陽氣入之陰陽相薄故有恐也是謂骨厥是主腎腎主骨骨厥則腎氣逆也所生病者受血病於氣是氣之所生也故云所生病也口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼臀股內後廉痛痿厥嗜卧人胃暑熱之毒舍於腎腎乃小臟也小不勝大則骨與髓虛故足不載身而痿厥生焉痿則故力故其卧也足心常熱而痛漸至足下重如不能舉步盛者寸口大再造於人迎虛者寸口反小於人迎也足少陰之别名曰大鍾當踝後繞跟别走太陽其别者並經上走於心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所别也足少陰之筋起於小指之下並太陰之筋斜走內踝之下結於踵與太陽之筋合而上結於內輔之下並太隂之筋而上循陰股結於陰器循脊內俠膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癎瘛及痙在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰治在燔針劫刺以知為數以痛為輸在內者尉引飲藥此筋折紐紐發數甚者死不治名曰仲秋痺也邪客於足少陰之絡令人卒心痛暴脹胸脅支滿無積者刺足下中央之脈各三痏凡六刺立已左刺右右刺左嗌中腫不能內唾時不能出唾者刺然谷之前出血立巳左右互刺腎病者腹大脛腫喘咳身重寢汗出憎風虛則胸中痛大腹小腹痛清厥意不樂取其經少陽血者腎熱病者先腰痛胻痠苦渴數飲身熱熱爭則項痛而強胻寒且痠足下熱不欲言其逆則項痛消消淡淡然戊巳甚壬癸大汗氣逆則戊巳死刺足少陰太陽腎熱病者頥先赤故熱病先身腫骨痛耳聾好瞑刺足少陰病甚為五十九刺足少陰腎經從足走胸中長六尺五寸左右共一丈三尺凡五十四穴涌泉二穴然谷二穴大溪二穴大鍾二穴照海二穴水泉二穴復溜二穴交信二穴築賔二穴陰谷二穴橫骨二穴大赫二穴氣穴二穴四滿二穴中注二穴肓腧二穴商曲二穴石關二穴隂都二穴通谷二穴幽門二穴步廊二穴神封二穴靈虛二穴神藏二穴或中二穴腧府二穴手厥陰心包經手厥陰心主之脈起於胸中出屬心包下膈厯絡三焦心為三焦包之雄故心包脈厯絡三焦之經其支者循胸出脅下腋三寸上抵腋下下循臑內行太陰少陰之間太陰行腨之前少陰行臑之後而心主行其中也入肘中曲澤穴分也下臂行兩筋之間兩筋間使所居入掌中勞宫所在也循中指出其端中衝在此中指之端其支别者掌中循小指次指出其端手心主自此交入手少陽是動則病手厥陰常多血少氣今氣先病是謂是動也手心熱肘臂攣急肘臂孿急蓋因胃屈而不申也腋腫甚則胸脅支滿心中淡淡席延經云淡淡水搖也大動面赤目黃善笑不休是主脈所生病者血受病於氣是氣之所生故云所生病也煩心心痛掌中熱盛者寸口大一倍於人迎虛者寸口反小於人迎也手心主之别名曰內腕去關二寸出於兩筋之間循經以上繫於心包絡心系實則心痛虛則為煩取之兩筋間也手心主之筋起於中指與太陰之筋並行結於肘內廉上臂陰結腋下下散前後挾脅其支者入腋散胸中結於賁其病當所過者支轉筋前及胸痛息賁治在燔針劫刺以知為數以痛為輸名曰孟冬痺也手厥陰心包脈從腹走手長三尺五寸左右共七尺凡一十八穴天池二穴天泉二穴曲澤二穴郤門二穴間使二穴中衝二穴內關二穴太陵二穴勞宫二穴手少陽三焦經手少陽脈起於小指次指之端次指端關衝指位也上出兩指之間本節前也門後中渚穴也循手表腕陽池穴分也出臂外兩骨之間兩骨之間溝所在焉上貫肘肘後天井穴也循臑外上肩而交出足少陽之後足少陽在手少陽之後上肩而手少陽復在其後入缺盆交膻中難經云膻中在玉堂下同身寸之一寸六分直兩臑內肩是也散絡心包心包為三焦之雄故云焦脈絡心包也下膈遍屬三焦手少陽三焦之經故其脈屬遍三焦其支者從膻中上出缺盆上項挾耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥手少陽自此交入足少陽是動則病手少陽常少血多氣今氣生是謂是動也耳聾渾渾焞焞嗌腫喉痺是主氣所生病者血受病於氣是氣之所生故云所生病也手少陽血少氣多乃人之常數也亦有異於常者靈樞經曰手少陽之上血氣盛則眉美次耳色美血氣皆少則耳憔惡色手少陽之下血氣盛則手樁多肉以溫血氣少則寒以瘦氣少血多則瘦以多脈由此則手少陽血氣多少可得而知之也汗出目鋭眥痛耳後肩臑肘臂外皆痛小指次指不用盛者人迎大一倍於寸口虛者人迎反小於寸口也手少陽之别名曰外關去腕二寸外繞臂主胸中合心主病實肘攣虛則不收取之所别也手少陽之脈起於小指次指之端結於腕上循臂結於肘上繞臑外廉上肩走頸合手太陽其支者當曲頰入繫舌本其支者上曲牙循耳前屬目外眥上乘頷結於角其病當所過者即支轉筋舌卷治在燔針劫刺以知以痛為輸名曰季夏痺也邪客於手少陽之絡令人喉痺舌卷口乾心煩臂外廉痛手及頭痛刺手中指次指爪甲上去如韭葉各一痏壯者立巳老者有頃巳左取右右取左比新病數日巳手少陽三焦經從手走頭長五尺左右共一丈凡四十六穴關衝二穴液門二穴中渚二穴陽池二穴外關二穴支溝二穴會宗二穴三陽絡二穴四瀆二穴系竹空二穴天井二穴清冷淵二穴消濼二穴和髎二穴臑會二穴肩髎二穴天髎二穴耳門二穴天牖二穴瘈脈二穴翳風二穴角孫二穴顱息二穴足少陽膽經足少陽之脈起於目鋭背上抵頭角下耳後循頭行手少陽之脈前至肩上却交手陽之後足少陽循頸行手少陽之前至肩上少陽復在足少陽之前入缺盆其支者從耳後入耳中出走耳前至目鋭眥下大迎合手少陽於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝肝為膽之雄故膽脈絡於肝屬膽足少陽為膽之注故其脈屬於膽循脅裏出氣衝氣衝在腹臍下橫骨兩端鼠鼷上同身寸之一寸動脈中繞毛際橫入髀厭中髀厭中環跳穴血分也其直者從缺盆下腋循胸中過季脅脅骨日肋肋盡處日季脅下合髀厭中以下循髀陽髀陽髀外也出膝外廉陽陵泉分也下外輔骨之前輔骨謂甫在䯒骨之骨在䯒之外直下抵絶骨之端陽甫居此絶骨之端下出外踝之前丘墟穴分也循足跗上出小指次指之間次指之端竅陽所之素問云少陽之拱起於竅隂其支者别跗上入大指循岐骨內出其端貫爪甲出三毛足少陽自此交入足厥隂是動則病足少陽常少血多氣今氣先病謂之是動口苦素問云口苦者病名膽痺也此人數謀慮不決故膽虛氣上溢而口為之苦治之以膽募俞善太息靈樞經曰人憂思則心系急心系急作氣道約約則不利故太息以叩出之心脅痛素謂所胃心脅痛者言少陽盛也盛者心之所表也九月陽氣盛而陰氣盛故云心脅痛也不能轉側素問所謂不可反側九月陰氣藏物物藏則不動以故不可反則也甚則面微塵塵胃面如微有獨骨塵土之色也體無膏澤足外反熱是為陽厥足骨所生病者血受病於氣是氣之所生故云所生病者足少陽血少氣多乃人之常數也亦有異共常者靈樞經曰足少陽之上血氣盛則通須美長血多氣少則通髯美短血少氣多則髯血氣背少則無須盛於寒溫則善痺骨疼爪枯也足少陽之下血氣盛則脛毛少外踝肥血多氣少則脛毛美短外踝皮豎血厚血少氣多則脛毛少外踝皮薄而軟血氣皆少則無毛外踝瘦血肉又云通須極鬚者少陽靈血由此足少陽血氣多少可得而知也頭痛角頷痛角頷耳下曲角之頷也以其脈下之頷車故病如是目鋭眥痛缺盆中腫痛腋下腫馬刀挾癭馬力瘦者靈樞經曰其癰堅而不憒者為馬挾癭汗出振寒以寒邪客以經虛則邪盛故為振寒瘧瘧寒熱之病也指中之瘧寒熱皆不盛脅胸肋髀膝外支脛絶骨外踝前及諸節背痛小指次指不用盛者人迎大一倍於寸口虛者人迎反小於寸口也足少陽之别名曰光明去踝五寸别走厥陰下絡足跗實則厥虛則痿躄不能起取之所别也足少陽之筋起於小指次指上結外踝上循䯒外廉結於膝外廉其支者别起外輔骨上走髀前者結伏兔之上後者結於尻其直者上乘䏚季脅上走腋前廉繫於膺乳結於缺盆其直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄其支者結於目眥為外維其病小指次指支轉筋引膝不可屈伸膕筋急前引髀後引尻上即乘䏚季脅痛上引缺盆膺乳頸維筋急從左之右右目不開過右角並蹻脈而行左絡於右故傷左角右足不用命曰維筋相交治在燔針劫刺以知為數以痛為輸名曰春痺也邪客於足少陽之絡令人脅痛不得息咳而汗出刺足小指次指爪甲上與肉交者各一痏不得息立巳止咳者溫衣飲食一日巳在左刺右在右刺左病立巳不巳復刺如法邪客於足少陽之絡令人留於樞中痛髀不可舉刺樞中以毫針寒則久留針以月死生為大數立巳熱痛先胸脅痛手足躁刺足少陽補足太陽病其支者為五十九刺熱病先眩冒而熱胸脅滿刺足少陰少陽足少陽膽脈從頭走足長八尺左右共一丈六尺凡八十六穴朣子髎二穴聼會二穴客主人二穴頷厭二穴懸顱二穴懸釐二穴曲鬢二穴率谷二穴天衝二穴浮白二穴竅陰二穴完骨二穴本神二穴陽白二穴臨泣二穴目窗二穴正營二穴承靈二穴腦空二穴風池二穴肩井二穴淵腋二穴輒筋二穴日月二穴京門二穴帶脈二穴五樞二穴維道二穴居髎二穴環跳二穴中瀆二穴陽關二穴陽陵泉二穴陽輔二穴懸鍾二穴邱墟二穴陽交二穴外邱二穴光明二穴地五會二穴俠溪二穴竅隂二穴足厥陰肝經足厥陰之脈起於大指之際聚毛大敦穴分也素問曰厥陰之根起於大敦上循足跗上廉大衝穴在焉去內踝一寸中分之位也上踝八寸交出太陰之後足厥隂行足太陰之前上踝八寸而厥隂復出太陰之後也上膕內廉曲泉穴分也循股陰入毛中環陰器扺少腹挾胃屬肝足厥隂為肝之經故其脈屬於肝也上貫膈布脅肋循喉嚨之後入頑顙靈樞經曰頑顙者分氣之泄池連目系上出額與督脈會於巔其支者從目系下頰裏環唇內其支者復從肝别貫膈上注肺中足厥陰自此行入手太陰是動則病足厥陰常多血少氣今氣先病是謂足動也腰痛不可俯仰素問所謂腰脊痛不可以俯仰者三月一振榮葬萬物一俯而不仰也丈夫㿉疝婦人少腹痛素問㿉疝婦人少腹腫者厥陰者辰也三月陽中之陰邪在中故曰㿉疝少腹腫也甚則嗌乾素問所謂甚則嗌於熱中者陰陽相薄而熱故嗌乾也面塵脫色面如有塵而去其色脫去也是主肝所生病者血受病於氣是氣之所生故云所生病胸滿嘔逆洞泄凡中其經內於肝肝氣塵脾故為洞泄矣狐疝狐夜不得屎日出方得人之所病與狐同候故曰狐病遺溺閉癃遺溺不禁閉癃為不行也盛者寸口大一倍於人迎虛者寸口反小於人迎也足厥陰之别名曰蠡㳰去內踝五寸别走少陽其别者循脛上睪結於莖其病氣逆則睪腫卒疝實則挺長熱虛則暴癢取之所别也足厥陰之筋起於大指之上上結於內踝之前上循脛上結內輔之下上循陰股結於陰器絡諸筋其病足大指支內踝之前痛內輔痛陰股痛轉筋隂器不用傷於於內則不起傷於寒則陰縮入傷於熱則縱挺不收治在行水清隂其病轉筋者治在燔針劫刺以知為數以痛為輸名曰季秋痺也邪客足厥陰之絡令人暴疝卒痛刺足大指爪甲上與肉交者各一痏男子立巳女子有頃巳左取右右取左肝病者兩脅下痛引少腹令人善怒虛則目􅉩􅉩無所見耳無所聞善恐如人將捕之取其經厥陽於少陽氣逆則頭痛耳聾不聰頰腫取血者肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿痛手足躁不得安臥庚子甚甲乙大汗氣逆則庚辛死刺足厥陰足厥陰肝經從足走胸中長六尺五寸左右共一丈三尺凡二十六穴大敦二穴行間二穴中封二穴蠡㳰二穴中都二穴膝關二穴曲泉二穴陰包二穴五里二穴陰廉二穴章門二穴期門二穴太沖一穴普濟方卷四百十二
