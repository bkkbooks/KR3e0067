body:
  text: 普濟方卷三百六十二明周王朱橚撰嬰孩五臟門緫論錢氏論云五臟所生心主驚實則呌哭𤼵熱飲水而搐虚則困卧悸動不安肝主風實則目直大呌呵欠項急煩悶虚則咬牙多欠氣熱則外生氣温則内生脾主困實則困睡身熱飲食虚則吐㵼生風肺主喘實則悶亂喘促有飲水者有不飲水者虚則哽氣長出氣腎主虚無實也豆瘡入腎則黑陷更當别虚實證假如肺病又見肝證咬牙多呵欠者易治肝虚不能勝肺故也若目直大呌哭項急頓悶者難治盖肺乆病則虚冷肝强直而反勝肺也視病之新乆虚則補母實則㵼子也肝臟病見秋木旺肝强勝肺也宜補肺㵼肝輕者肝病退重者唇青而死肺病見春金旺肺勝肝當補肝輕者肺病退重者目淡青必𤼵驚更有赤者當搐為肝怯當目淡青色也心病見冬火旺心强勝腎當補腎治心輕者心病退重則不竄不語腎怯虚也腎病見夏水勝火腎勝心也當治腎輕者腎病退重者悸動當搐也脾病見四季皆倣此治之順者易治逆者難治脾怯當面目赤黄五臟相反隨証治胃怯汗上至頂下至臍皆胃虚當補胃益黄散主之胃啼小兒筋骨血脈未成多哭者至小所有也胃氣虚面㿠白無精光口中冷氣不思飲食吐水當補脾益黄散主之胃冷虚面㿠白色瘦弱不思乳食當補脾用益黄散下痢者宜調中丸湯氏詩小兒心臓中風時偃卧唇紅汗濕衣但灸心俞三五壯唇青黄白黑休醫目瞪此為心已絶性命多應六日期此疾難别難治李倅之子任義烏丞患心臟中風諸醫皆言死而退已三日不醒余遂灸之今已長大凡見此候先宜㸔艾心俞正大中骨下兩傍各一寸半次服家傳牛黄丸肝風踞坐舉頭難早灸心俞病即安細視眼連唇上色青黄方可放心寛黑色只應旬日死命歸泉路不能還脾臟若或中風邪腹滿通身色似𤓰吐沫醫人猶可治唇青手足冷空嗟若灸肺俞三五壮縱能危困命難賖腰痛面黑腎之風兩脇􅂒􅀈病可攻急灸腎俞由得瘥面黄發痙莫從容啼不作聲有兩般肺絶無聲不用㸔或若外邪侵主臟温和調氣自然安忽然喘急心煩滿縱有靈方命亦拚急灸肺俞三五壮始知妙訣在人間楊氏肺中風多因𠻳而始但服𠻳藥不能散其風邪入於肺臟之絡其候喘急面色青黄目能認人口不能言醫人不明其證待斃而已余曽有親戚之子得此疾危亟余往視之尚留殘喘急以橘皮桑白皮罌粟殻三件煎湯化百部丸二服急灸肺俞至第三壮其喘已定忽能言冄灸作五状繼而索粥自此生矣心臟附論心熱者視其睡口中氣温或合面睡及上竄咬牙皆心熱也導赤散主之心氣熱則心胸亦熱欲言不能而有就冷之意故合面睡心氣實則氣上不行澁合卧則氣不得通故喜仰卧則氣得上下通也㵼心湯主之心有餘眠卧不安面伏地睡則導赤散洗心散主之虚弱則驚悸不安寧心膏主之小腸有熱或赤澁尿血木通散滑石散紅龍散主之心不驚悸恍惚憂愁不樂面無顔色用寧心膏安心膏有客熱則睡中語導赤散洗心散主之方參砂膏通心氣除膈熱去痰壅硃砂人參南星炮遠志去心木用皮薑汁浸焙白附子殭蠶炒各䓁分硼砂一半焙茯神等分麝香少許右為末煉蜜丸如櫻桃大金箔為衣每服一丸麥門冬去心煎湯調下八物定志丸補心氣安精神遠志去心麥門冬去心菖蒲茯神去皮木茯苓去皮白者各半兩牛黄一錢白术一分人參六錢右為末煉蜜為丸每一兩作三十丸以硃砂為衣每服一丸人參湯化下食後㵼心湯㵼子右用黄連一兩去鬚研極細末每服一字至半錢一錢臨臥温水調下海藏云易老單㵼心湯加減法出於此方實邪也實則泄其子肝臓附論肝主感風者呵欠頓悶口熱氣當𤼵散大青膏主之若能食飲水不止當用大黄丸㣲下餘不可下肝熱手尋衣領及亂捻物㵼青丸主之壮熱飲食喘悶㵼白散主之肝有風目連扎不搐得心熱則治肝㵼青丸治心導赤散主之肝有熱目得直視不搐得心熱則治肝㵼青丸治之導赤散主之肝有方甚則身反張强直不搐是肝受風也當補腎治肝補腎地黄丸治肝㵼青丸主之若病或新或乆皆引肝風風動而止於頭目目属肝風入於目上下左右如風吹不輕不重兒不任風目連劄也若熱入目牽其筋脈兩眥俱𦂳不能轉視故目直也若得心熱則搐以其子母俱有實熱風火相摶故也治肝㵼青丸治心導赤散主之肝有餘目赤多怒筋脈拘急肝風亦然或身熱者驅風膏并凉肝藥肝不足視不明兩脇拘脹面色青白多恐悲泣地黄丸主之方㵼青丸治小兒肝臟實熱手尋衣領亂捻物目直視不搐得心熱則搐身反折强直目連劄或目肉青或臓腑泄諸藥不止脾胃乆虚並宜服之又名㵼肝丸當歸去蘆頭切焙秤龍膽草焙秤川芎山梔子仁川大黄濕紙褁煨羌活防風去蘆頭切焙各等分右為末煉蜜丸鷄頭大每服半丸至一丸煎竹葉湯同沙糖温水化下地黄丸治小兒本氣虚怯由胎氣不成則神不足目中白睛多其顱即解開面色㿠白又腎氣不足則下竄盖骨重惟是墜於下而縮身也腎水隂也腎虚則畏明無精光者並宜補之熟乾地黄八錢焙秤山茱茰乾山藥各四錢澤㵼牡丹皮白茯苓去皮各三錢右為細末煉蜜和丸每兩作五十丸三嵗已下每服一二丸至三丸温水空心化下麝香青金丸治小兒肝臟有風呵欠頓悶神昏不爽口中熱氣急驚搐搦胸滿氣短並皆治之天麻半兩白附子三錢炮蝎稍微炒青黛二味各二錢白蛇酒浸取肉焙乾八錢麝香别研硃砂别研天竺黄各一錢右件為細末入研者麝香硃砂研匀煉蜜為丸每一兩作四十丸每服一丸煎人參薄荷湯化下乳食空脾臓附論脾有餘脾胃有熱不思乳食或吐黄水㵼深黄色實熱也或㵼黄沫如蠏吐沫虚熱也皆食不化寳鑑云胃受熱五榖不能實先以黄白散行其臓腑後以五苓散脾虚熱先五苓散次黄白散再服五苓散或少以益黄散脾不足脾胃經冷不思乳食噦吐清水㵼緑白色食物不化時腹痛或渇或不渇巢氏云小兒噦由哺冷冷氣入胃與氣相連則胃氣不通致令噦也錢氏云㵼青白米榖不化脾胃冷王氏云宿食不消脾胃冷也益黄散兩服柴胡丸逐積再益黄散千金云脾虚腹脹鳴溏㵼食物不消化脾胃有積不思乳食則或吐酸㵼白食物不化傷食亦同或腹痛或不痛家寳方云喫物不消是脾有積紫丸逐下食積益黄散補或食不知饑飽并能大便不化是疳熱積益黄散汁吞紫丸㵼下後益黄散補并六甲丸脾胃有風不思乳食嘔吐涎沫食物不化大便雜色㵼乆不定定而復作時多困倦錢氏云身温風在脾故大便不聚先下益黄散補脾次宣風散逐去脾間風再益黄散并神寳丹及温驚藥又云吐㵼乳不化傷食下之素問云脾胃受濕則水榖不分川椒丸五苓散古人曰五臓之病何脾病之多也盖脾土也萬物之𤼵生皆由於土百病起因皆是脾之受納榖飲占於諸臓乃病之多也脾怯當面目赤黄五臓相反隨證治之氣不和口頻撮當調氣益黄散主之食不消脾胃冷故不能消化當補脾益黄散主之弄舌脾臓㣲熱令舌絡㣲𦂳時時舒舌治之勿用冷藥及下之當少與㵼黄散漸服之亦或飲水醫疑為熱必冷藥下之非也飲水者脾胃少津液也又加面黄肌瘦五心煩熱即為疳瘦宜胡黄連輩大病未已用藥而弄舌者㓙涎液不收小兒因氣不升降膈脘痞滯致令乳飲不化流入胃中隨氣上溢故令多涎其候胸滿短氣飲食遲化内經謂脾為涎當調脾胃升降其氣則病可愈方鉛霜散治小兒脾風多涎心胸壅悶不下乳食昏昏多睡鉛霜研牛黄研半夏生薑汁製焙乾龍腦研各半分白附子炮馬牙硝防風去乂丹砂研天竺黄研犀角屑細辛去苖葉黄芩去黑心甘草炙剉各一分右為末再同研匀每服一字用生薑蜜温水調下更量兒大小以意加減不計時候防風湯治小兒脾肺風熱膈上多涎心神昏悶少欲乳食防風去义羚羊角屑黄芩去黑心人參枳殻麩炒去穰甘草炙剉各一分半夏半分生薑汁製焙乾右搗篩每一錢七水八分生薑少許煎至五分去滓不計時候量兒大小加減温服降氣丸治小兒脾氣上溢氣不升降涎液不収清膈牛蒡子梔子仁甘草炙㣲赤剉川硝鬱金以上各半兩枳殻一分麩炒㣲黄去穰龍腦半兩研右為末麵糊和丸如麻子大薄荷水化二丸至三丸不計時候量兒大小加減服之温脾散治小兒脾胃傷冷涎常流出在兩口角半夏半兩用白礬水浸人參荳蔲白术乾薑各半兩丁香一兩甘草半錢右為末每服二錢生薑二片煎服食前張煥温脾丹治小兒滯頤多涎流出漬於頤上此由脾冷者涎多故也脾之液為涎脾氣冷不能收制其津液故流出漬於頤上當温脾俗謂之揑破涎渦兒者葛丞相云此方甚竒半夏用生薑六兩同搗細炒丁香一兩木香一兩乾薑半兩炮青皮半兩去白陳皮亦可白术半兩右為末糊丸如黍米大一嵗十丸二嵗二十丸大小加減米湯下直指方有陳皮半兩一方煉蜜和丸金硃丹治脾熱多涎金箔二十片硃砂一兩研水飛半夏湯洗七次牛膽南星一兩白茯苓半兩石膏半兩研水飛右都拌匀再細研用生薑汁和丸如黍米大每服十粒人參湯下乳後㵼黄散又名㵼脾散治㵼脾熱目黄口不能吮乳藿香葉七錢山梔子一兩石膏半兩甘草三兩防風切焙四兩右剉同蜜酒㣲炒為細末每服一錢至二錢水一盞同煎至五分温服清汁無時南方多以寒水石為石膏以石膏為寒水石正與京師相反了大悞也盖石膏潔白堅硬有墻壁而寒水石則軟爛以手可研外微有黑細紋方書中寒水石則火煆用之石膏則堅硬不可入火如白虎湯石膏則能解肌熱破痰治頭痛若用寒水石則悞矣又有一等堅白全類石膏而方敲之亦皆成者名方解石也可代石膏用之南人有不信此説者孝忠嘗相與同就京師大藥肆中買石膏寒水石方觧石三種又同詣惠民和濟局及訪諸國醫詢證之皆合此説乃信服孝忠頃編保生信效方已為此論恐小兒尤不可悞故復見於此益黄散治小兒吐㵼脾虚不食五榖不化困倦少力腸滑夜起并疳盜汗并治涎唾流領下常濕名滯頤陳皮一兩去白丁香二錢訶子炮去核青皮去白甘草炮炒各半兩右為末三錢水半盞煎至三分去滓食前服大小加減服之海藏云此劑㵼脯熱牛蒡丹治脾熱多涎牛蒡子一兩鬱金川朴硝枳殻去穰麩炒皂子半兩炒黄右為細末用生薑汁打白麵糊丸如黍米大每服十粒煎人參湯下大小加減半夏丸治小兒脾熱乳食不下胸膈多涎一名皂莢丸半夏半分生薑湯洗七遍去滑皂莢子仁半兩右為末用生薑汁和丸如麻子大不計時候以温水下三丸隨兒大小以意加减半夏丸半夏一兩㣲炒白礬生研半兩右為細末麺糊和丸如粟米大每服五七丸量輕重加减食後臨卧生薑湯下桑白汁治小兒脾熱乳食不下胸膈痞悶涎溢不收右用新桑根白皮不以多少細剉取自然汁塗於兒口内立效如無新桑根白皮取桑根白皮一兩細剉水一盞煎至半盞放温塗兒口内極妙又方右以白羊糞少許入水研取汁塗兒口内效又方右取鹿角末炒令焦更研令細以清粥飲調下一字又方右取牛噍草絞取汁少少與服之鬱金散治滯頤不問脾虚驚熱並可進之鬱金南星白附子大半夏各半兩右用生薑二十片皂角三條水兩盞煎藥同煮以乾為度去皂角及薑以四味焙乾同雄猪膽一枚以盞乘定刺汁以藥入膽汁内浸灸乾又浸以膽汁盡為度冄用鐵孕粉半兩甘草三錢研匀同為末每服一錢薄荷蜜湯調下肺臟附論肺有餘咳𠻳氣急痰實成塊㵼肺散褊銀丸珍珠丸下涎肺不足哽氣喘息𠻳吐清涎目胞浮腫補肺散人參丸肺盛復有冷氣者胸滿短氣氣急喘𠻳上氣當先散肺後發散風冷散肺㵼白散大青膏主之肺只傷寒則不胸滿肺熱手搯眉目鼻面甘桔湯主之肺虚熱唇深紅色治之散肺虚熱少服㵼白散肺臓怯唇白色當補肺阿膠散主之若悶亂氣麄喘促哽氣者難治肺虚損故也脾虚病乆則虚而唇白脾者肺之母也母子皆虚不能相營故名曰怯肺主唇白白而澤者吉白如乾骨者死錢氏曰東都張氏係九嵗病肺熱他醫以珠犀熊射生牛黄治之一月不愈其証𠻳喘悶亂飲水不止全不食錢氏用史君子丸益黄散張曰本有熱何以又行温藥他醫用涼藥攻之一月尚無效錢曰凉藥乆則胃寒不能食小兒虚不能食當補脾後飲食如故乃㵼肺經病必愈矣服補脾藥二日其子欲飲食錢以㵼白散肺遂愈七分張曰何以不虚錢曰先實其脾然後㵼肺故不虚也方阿膠散補肺阿膠一兩半麸炒馬兠鈴半兩焙甘草二錢半炙黍粘子二錢半爐香杏仁七箇去皮尖糯米一兩右為末每服一二錢水一盞煎至六分食後温服海藏云杏仁本㵼肺非若人參天門冬麥門冬之補也當以意消息百部丸治小兒肺寒壅𠻳㣲啼百部炒乾秤天麻去節先作末各三分杏仁四十箇去皮尖炒煮三五沸研入右為末和匀蜜丸皂子大温水化下二三丸無時日三四丸此本方也仲陽加松子仁五十箇糖丸之含化大妙㵼白散㵼肺脾熱目黄口不吮乳喘𠻳桑白皮一兩剉炒黄地骨皮一兩甘草半兩炒右為細末每服一二錢水一盞入糯米百粒同煎食後服易老加黄連海藏云治肺熱傳骨蒸自汗用此以直㵼之梔子黄芩亦能㵼肺當以氣血分之腎臓附論腎有餘腹滿腸洩體重喘𠻳小便黄色牽牛散瘡頭變黑氣急亦腎有餘百祥丸腎不足體重厥逆腹大喘𠻳面無精光好暗畏明耳鳴聾重腦縫開地黄丸主之腎虚者兒本虚怯胎氣不成則神不足目中白睛多其顱即觧𩕄面色㿠白皆為難養縱長亦不夀若後更恣色慾多不及三十而亡或有因病後而致腎虚者非也又腎氣不足則下竄盖骨重惟欲下垂而縮身也腎少隂也腎虚則畏明皆宜補腎地黄丸主之膀胱内通腎臟一處承受三經所傳其外腎冷熱皆由心氣主之心經有熱熱入小腸或赤或白或淋或澁心經有寒流膀胱或祕或疝或腫或大凡小兒初生兩箇腎子俱大光浮名曰卵腫一邊差大名曰偏墜盖由驚氣所行傳受于中或母懐孕驚憂之氣不散胞胎之間兒以受之所以生下便有卵腫外宜黒神散傅之内用清心藥順之黒神散者用黄連黄芩黄柏大黄等分為末猪膽汁蜜調傅之立效清心以犀角地黄膏與服若有熱大連翹飲宿夜安定方羚羊角丸治小兒腎虚或病後筋骨弱五六嵗不能行宜補益肝腎虎脛骨敲破塗醋炙黄生乾地黄焙炙酸棗仁去皮炙秤羚羊角尖細而節密煮醋為末白茯苓各半兩桂去皮即有味處不見火防風去蘆頭當歸去蘆頭黄芩切焙各一分右為細末煉蜜和成劑每服一丸皂子大兒大者加之食前化下日三四服乆服取效地黄丸治小兒肝腎虚兩脇拘服多恐悲哭又治大病後不能作聲是腎怯不能上接於陽又治禀受腎氣虚頭骨開澤㵼牡丹皮白茯苓各三錢熟乾生地八錢焙秤山茱茰四錢山藥半兩牛膝四分右為細末煉蜜和丸如小豆大三嵗每服七丸空心温水下一方無牛膝白芨散治小兒腎氣不成腦髓不定小兒年大骨應合而頭縫開者是也宜以藥塗之白芨栢仁防風去苗細辛各一兩右為細末每服一錢以乳汁調塗在兒顱骨上每日一次用之甘豆湯治小兒腎虚有熱大小便不通黑豆一合甘草二錢薑七片右剉新水煎服㵼腎丸治脈洪而實右用前地黄丸熟地黄換生地黄去山茱茰是也此治左手本部脈若右尺洪實以風隨丹㵼之此地黄丸仲景八味丸去桂附若加五味子腎氣丸也此益肺之源以生腎水焉治腎縮治小兒初生兩腎縮了初生受寒氣也硫黄茱茰大蒜右同研塗腹仍以菵草蛇床子二味煎湯淋洗燻之盖初生受其寒氣而然治虚寒証惟腎主虚亦惟腎受寒小兒骨氣末就雖不容補但以地黄丸與之厥冷者以生乾薑炙甘草煎湯調下洞泄者却專用木香白术生乾薑各一分辣桂炙甘草半分剉細量兒大小作劑入陳米煎服治小兒外腎腫硬成疝用乾蚯蚓為細末用唾塗避風冷濕地治小兒外腎腫硬或疝疾或風熱暴腫右用地龍糞生薄荷汁調塗尤妙普濟方卷三百六十二
