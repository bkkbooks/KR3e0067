氣不升降況香蘇子養氣肥兒檳榔木香紫蘇葉紅棗白术湯治小兒脾胃氣虛乳食不消腹脹白术人參厚朴去粗皮薑汁炙各一分右粗搗篩一二歲兒每服一錢水半盞煎至三分去滓溫服至晚三服隨兒大小以意加減橘皮湯治小兒脾胃虛冷氣逆不能飲食陳橘皮湯浸去白焙桂去粗皮各一兩右銼碎分作三貼每用一貼以水三盞入薤白五莖細切黍米一合同煮稀粥熟去藥分二服治小兒胃寒蟲上諸危惡與癎相似肘後方乾漆炒煙盡白蕪荑各等分右為細末米飲調下一字至一錢治大人小兒不進乳食和氣去痰人參四兩半夏一兩右用生薑汁熬一宿曝乾為末麵糊丸如菉豆大每服十丸食後生薑湯下安胃和脾散治小兒脾胃不和中脘氣痞心腹脹滿全不思食食後嘔吐痰噎逆氣吞酸靣色萎黃肌肉消瘦腹脅刺痛泄瀉不止便利不調少力嗜卧胃虛弱飲食不化並宜服之此藥仙方世間老幼氣弱俱可常服淨蒼术二兩用生薑二兩切作片子同搗爛炒黃色厚朴去粗皮同前製小棗子二十四箇去核焙乾白术去蘆白茯苓去皮廣荗煨銼青皮去白木香藿香葉人參去蘆澤瀉縮砂仁檳榔甘草炙銼陳皮去白各一兩右為細末每服一二錢煎生薑湯調下日進二服忌一切生硬冷物一方無木香透關丸治小兒脾胃挾傷中滿硬氣及治伏熱生涎霍亂嘔吐或作食癎手足搐搦不省人事並宜服之大蒜端午日取出膜淨用百瓣細切搗爛硃砂一分細研水飛蠍梢三十五條去毒微炒為末細松煙墨一兩火煆過研末巴豆一十粒去殼出油研右同入瓷罐子內密封挂通風處百日取出丸如黍米大每服一二丸至五十丸新汲水送下不拘時候香橘丸治小兒脾胃挾傷心腹脹滿胸膈不快硬氣喘粗小便不利常服寬中快膈消化乳食食後臨卧服青橘皮去白肉豆䓻各二兩黑牽牛木香銼各半兩右將青橘皮炒黃次下肉豆䓻牽牛木香略同炒轉色為細末煮麵糊為丸如黍米大周歲兒每服十丸乳食空心薑湯下丁香麴蘖丸治小兒脾胃怯弱乳食遲化胸滿腹脹胃冷蟲作常服開胃口化宿冷消停滯美飲食丁香二錢半神麴炒黃麥蘖炒乾薑炮陳橘皮去白各半兩烏梅去核一兩檳榔二兩右為細末煮麵糊丸如黍米大每服一十丸溫米飲送下不拘時候癖化丹治脾胃不和或因驚多啼結成癖積脅下疼痛三稜煨莪术煨乾漆炒令煙盡木香青黛好墨各一錢右為末煮糊為丸每服二十丸米飲下四君子湯治小兒脾胃虛弱補五臟生津液調氣血進飲食解虛煩益肌體功效不可具録治久吐胃寒加蓮肉木香黃耆生薑棗子煎服治嘔逆噦不止加白稨豆薏苡仁並炒藿香同煎生薑自然汁調服治胸膈煩躁冷熱不調痰涎咳嗽不思飲食日夜壯熱加知母貝母烏梅乾薑蔥蜜炙桑白皮同煎服之治胎肚痛加陳皮青皮生薑同煎服之治夜間啼哭煩躁腹肚疼痛加陳皮木香硃砂鈎藤同煎服之治表裏虛弱時氣作熱欲傳疹痘加細辛桔梗瓜蔞生薑蔥白煎服治脾寒胃熱隂陽不順溫熱常作加滑石陳皮煎服之霍亂吐瀉神不安穩加藿香丁香木瓜生薑同煎熬喫治脾胃虛弱飲食不進加厚朴陳皮等分薑片棗子同煎服之治吐食不納穀氣加丁香半夏生薑向東陳壁土同煎服之治脾胃久虛不納飲食吐瀉不止加肉豆䓻青皮天台烏藥木瓜生薑煎服治虛中熱瀉米穀不分加瞿麥車前子煎服治虛熱煩躁安神定志加犀角川芎燈心煎服治心氣不足神情恍惚加石菖蒲石蓮肉石膏麥門冬煎服治虛煩體熱夜啼加白附子全蠍膩粉燈心銀環煎服治脾虛神困肌肉消瘦靣色萎黃食不尅化腸胃久寒吐逆無時加黑附子枳殼吳茱萸麥芽細辛生薑棗子煎服治霍亂吐逆腸鳴自利腹脅疼痛加白薑陳皮同煎服治虛中傷寒身熱疼痛煩渴加硃砂羌活防風天麻薄荷銀環同煎治脾虛不利腸肚㽱痛加陳皮訶子陳米同煎方見前長夀散治小兒脾胃虛弱常服強壯去寒熱天麻蜜炙甘草炙半夏泡洗人參白稨豆炒糯米炒薏苡仁各半錢木香一錢右為末每服二錢水一盞生薑三片棗子一箇煎至半盞服之治小兒脾胃虛弱臟腑滑泄日漸羸瘦丁香白术甘草肉豆䓻麵裹煨各等分右為細末每服一錢一歲兒米飲調下乳食前服助胃膏治小兒脾胃虛弱胸腹脹滿飲食少進臟腑不調嘔吐惡心肢體倦怠白术人參厚朴藿香當歸茯苓芎藭青橘皮甘草陳橘皮各一兩神麴麥蘖各半兩肉豆䓻丁香各一分右為細末煉蜜和丸如櫻桃大每服一丸至二丸生薑湯下食前服大人亦可服又方人參白术甘草茴香烏梅肉白豆䓻仁各半兩檀香一錢乾山藥乾木瓜各一兩右為末煉蜜為丸如皂子大空心每服一丸嚼服或溫水吞下養胃散飬胃氣快胸膈定噦逆止嘔吐美飲食丁香藿香葉陳橘皮白豆䓻仁縮砂仁各等分右為細末每服半錢生薑棗湯下乳食空時服丁香平胃丸治小兒氣虛寒氣逆上行胸膈不快吐逆不定腹脹短氣中滿痞悶丁香木香藿香葉沉香附子枇杷葉水銀硫黃同水銀結砂各一分肉豆䓻五枚肉桂半兩右為細末煉蜜為丸每服一兩作四十丸每服一丸乳食前生薑棗湯化下溫胃丸治小兒胃虛氣逆乾噦惡心胸膈痞滿嘔吐乳食丁香肉豆䓻各二錢木香人參蓮子心薏苡仁炒黃各一錢半右為細末煮神麴糊為丸如黍米大每服二十丸溫熟水送下乳食空心服豆䓻香連丸治小兒乳食所傷脾胃怯弱冷熱不調泄瀉嘔吐並宜服之黃連木香訶子去核半兩丁香二錢肉豆䓻半兩麵裹煨熟去麵不用右為末粟米飯搜和為丸如黃米大每服三十四丸空心食前溫米飲湯送下隨乳汁下亦可日進二服治小兒胃寒木香白术丁香各四錢右銼碎作一服水半盞入燈心一把煎五七沸去滓分兩次服溫脾散涎者脾之液脾胃虛冷故涎自流不能收約而漬於頤間也法當用溫脾半夏麴丁香木香各半兩乾薑炮二錢半白术炒白茯苓人參粉草各半兩炙右為末米飲調服局方理中丸亦妙一方用東行牛尾拭其口涎張浼方名溫脾丹與上散同去人參茯苓甘草加青皮或陳皮二錢半糊丸如黍米大木香散能和表裏通行津液木香大腹皮官桂前胡陳皮丁香訶子人參半夏赤茯苓甘草縮砂仁各三錢右為粗散每服三錢水一大盞生薑二片煎至六分稍熱空心服量兒大小以意增減替針丸治因冷傷脾心腹痛脅肋疼硬不思乳食臟腑不調青皮陳皮荆三稜枳殼厚朴訶子白豆䓻各一兩肉豆䓻檳榔各半兩乾薑三分右為細末水煮麵糊丸如麻子大生薑橘皮湯下二十丸食前服四君子丸治小兒脾虛受食不尅化停積中脘吐逆惡心臟腑泄瀉常服消化食滯進飲食厚腸胃充肌體恱顔色退黃疸縮砂仁烏梅肉焙乾陳橘皮訶子肉各一兩右為末煮好大棗取肉為丸如麻子大每服三十丸至五十丸棗湯熟水送下不拘時服玉桂枝丸治小兒飲食減少臟腑不調厚朴藿香陳橘皮神麴訶子皮各二錢川芎丁香木香白术甘草各一錢人參三錢右為細末煉蜜和丸如櫻桃大每服一丸生薑湯下食前服小兒一丸分二服米飲化下羸瘦附論夫小兒羸瘦不生肌肉者皆為脾胃不和不能飲食即血氣衰弱不能榮於肌膚也凡小兒在胎而遇寒冷或生出時挾伏熱皆令兒不能飲食故羸瘦也挾熱者身體壯熱肌肉微黃挾冷者時時下痢脣口青色也方秦芁丸治小兒羸瘦體熱心神煩悶小便赤黃秦芁去苗桑根白皮銼枳殼麩炒去瓤地骨皮黃耆銼人參去蘆頭赤茯苓犀角屑甘草炙各半兩龍膽去蘆頭柴胡去苗三分右為末煉蜜和丸如菉豆大不計時候用粥飲下五丸更量兒大小增減訶梨勒散治小兒羸瘦脾胃氣弱挾於宿食四肢不和訶梨勒皮陳橘皮湯浸去白瓤焙甘草炙各半兩黃耆銼人參去蘆頭白术藿香桂心白茯苓各一分右搗粗羅為散每服一錢以水一小盞入生薑少許棗一枚煎至五分去滓溫服日三四服量兒大小以意加減丁香散治小兒羸瘦脾胃虛冷四肢不和不欲乳食丁香桂心白术髙良薑甘草炙微赤各一分銼白茯苓厚朴去粗皮薑汁炙黃陳橘皮湯浸去白焙各半兩人參去蘆頭半兩右搗粗羅為散每服一錢以水一小盞入棗一枚煎至五分去滓量兒大小分減溫服日三四服黃耆丸治小兒羸瘦體熱靣色萎黃不欲乳食黃耆銼赤芍藥人參去蘆頭胡黃連甘草炙微赤銼各半兩麥門冬去心焙鱉甲醋炙微黃去裙襴各一兩柴胡去苗三分右為末煉蜜和丸如麻子大不計時候以粥飲下五丸量兒大小以意加減麥門冬丸治小兒雖食不長肌膚羸瘦骨熱小便赤黃麥門冬一兩去心焙人參去蘆頭黃耆銼青蒿子黃連去鬚桑根白皮銼枳殼麩炒去瓤地骨皮各半兩柴胡三分去苗右為末煉蜜和丸如菉豆大不計時候以熟水化五丸服量兒大小以意加減燒黃瓜丸治小兒羸瘦體熱食少黃瓜大者一枚黃連去鬚陳橘皮湯浸去白焙各半兩胡黃連柴鱉甲童子小便浸三宿炙黃去裙襴各一兩右搗細羅為散以黃瓜切開頭去瓤內藥末令滿切蓋子蓋之用蕎麥麵和溶固濟可厚三分於糖灰火內燒令麵焦黃為度取出麵放冷入麝香一錢都研和丸如菉豆大每服食前米飲下七丸更量兒大小以意加減甘草丸治小兒羸瘦氣惙惙宜常服不妨乳用甘草二兩炙微赤銼搗羅為末煉蜜和丸如菉豆大每服以溫水下五丸日二服量兒大小加減服之治小兒癆瘦并疳疾本草以黃色大蝦蟆調治同蛤煮食之治孩子瘦損用蘆薈子煎服普濟方卷三百九十三
