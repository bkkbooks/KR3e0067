body:
  text: 普濟方卷四十一明周王朱橚撰小腸腑門總論小腸腑者主心也舌是其候也心合於小腸小腸者受盛之府也號監倉吏重二斤十四兩長二丈四尺廣二寸四分難經甲乙云三丈二尺大二寸半徑八分寸之少半後附脊左回疊積其注於回腸者外傅臍上回運環反十六曲常留水榖二斗四升其一斗二升是水一斗二升是榖應主二十四氣也難經云十六曲盛榖二斗四升水六升三合合之大半甲乙云受三斗三合合之大半唇厚人中長以候小腸小腸病者小腸疼腰脊控而痛時窘乏復耳前熱若寒甚獨肩上熱及手小指次指之間熱若脈滑者脈經作陷甲乙同此其候也小腸控皋引脊上衝心牙在小腸者連皋系屬於脊貫肝肺絡心系氣盛則逆上衝腸胸動肝肺散於育結於臍故取之育原以散之刺太陰以與之取厥陰以下之取巨虛下亷以去之按其所過之經以調之左手關前寸口陽絶者無小腸脈也若臍痺小腹中疝瘕王月即冷上搶心刺手心主治隂心主在掌後橫文中入一分在關前寸口陽實者小腸實也若心下及熱痺小腸內熱小便赤黃刺手太陽治陽手太陽在手小指外側本節陷中小腸有寒其心下重便膿血有若虙痔小腸有宿食常暮發熱明日止小腸脹者小腹腫脹引腹痛心前受病移於小腸心咳不已則氣與咳俱出厥氣客於小腸夢聚邑街衢心應皮皮厚者脈厚脈厚小腸厚皮薄者脈薄脈薄小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈沖小者小腸小而短諸陽經脈皆多紆屈者小腸結扁鵲云手少隂於太陽為表清表濁清實濁虛故食下腸實而貫故腹實而不薄實則腹熱熱則口張口為之生瘡虛則傷寒寒則便泄膿血或發裏水其根在小腸先從起小腸絶不治六日死何以知之髮直如乾麻不得屈伸自汗不止小腸實附論夫小腸者受盛之官心之腑也手太陽其經也其氣盛則為有餘故左手寸口人迎以前脈陽實者小腸實也實生熱是有身熱來去口乾心煩身重汗不出小便不利之證治宜㵼之方升麻散出聖惠方治小腸實口乾舌燥心胸煩悶小便不利川升麻黃蘖銼杏仁湯洗去皮尖雙仁者麩炒微黃犀角屑栝蔞根桑白皮銼葵子木通葳蕤川大黃銼碎微炒各三分甘草半兩炙右為細末每服四錢水一中盞煎至六分去滓食前溫服犀角湯出聖惠方治小腸實熱心煩口瘡小便赤澀犀角鎊瞿麥穗杏仁去皮尖雙仁麩炒梔子去皮赤茯苓去黑皮木通黃連去鬚各二分白茅根一分銼甘草半兩炙麥門冬去心焙一兩右為末搗篩每服三錢匕水一盞入竹葉二七片煎至六分去滓溫服不拘時候柴胡澤㵼湯出千金方治小腸熱脹身熱手足心熱汗不出心中煩滿結塞不通口瘡身重柴胡澤㵼橘皮黃芩旋覆花枳實升麻芒硝各三兩生地黃切一升右㕮咀以水一斗煮取三升去滓芒硝分三服無時下鬱金散治小腸實熱熱則心下急痺口舌生瘡鬱金一兩白附子三分炮羌活一兩甘草半兩炙黃連一兩去鬚黃芩三分川大黃一兩微炒麥門冬一兩半去心焙川升麻三分右為細散每服食後煎麥門冬湯調下忌炙煿熱麵鬱金散治小腸實熱心下急痺口舌生瘡鬱金一兩白附子半兩羌活三分甘草半兩黃連一分黃芩去黑心半兩側柏半兩大黃銼炒半兩乾蠍去土炒半兩右為細散醋和勻每服二錢匕食後薄荷熱水調下生薑蜜湯下亦可赤茯苓湯治實熱面赤多汗小便不利急痛木通去節赤茯苓去皮檳榔生地黃焙黃芩赤芍藥各三分甘草炙半兩麥門冬去心焙三分右㕮咀每服四錢水一盞半生薑五片煎至八分去滓溫服不拘時一方無生薑煎瞿麥湯一名黃連散治小腸實熱小便黃赤結不通瞿麥犀角鎊豬苓去黑皮防己各三分黃連車前子木通銼各一兩甘草炙銼一兩右搗篩每服三錢匕水一盞煎取七分去滓溫服不拘時木通散治小腸實熱心煩悶小便澀腹中急疼痛木通一兩銼檳榔羚羊角屑赤芍藥黃芩當歸微炒銼車前子各三分甘草半兩炙右為散每服四錢水一中盞煎至六分去滓食前溫服大黃丸出千金方治小腸熱結滿不通大黃芍藥葶藶各二兩大戟朴硝各三兩杏仁五十枚巴豆去油七枚右為末蜜和丸如梧桐子大食後大人七丸小兒二三丸日去一服麥門冬湯楊子建護命方治小腸實熱脈氣盛實小便下血服此麥門冬去心焙知母蒲黃黃芩去黑心木通銼升麻各一兩大黃右搗篩每服三錢匕以水一盞煎至八分去滓食後溫服滑石散治下焦帶隂中疼痛小便艱澀滑石一兩研甘草炙銼大黃銼炒黃耆地椒山梔子去皮各半兩乳香一錢研右為散食前乳香酒調下一錢匕未愈再服胡荽湯治小腸風熱小便黃赤澀結不通胡荽車前子木通防己瞿麥穗犀角鎊黃連去鬚各等分右為散每服五錢匕水一盞半煎至八分去滓食後溫服日進三服射干湯楊子建護命湯治小腸實熱小便赤澀疼痛不可勝忍射干黃芩去黑心麥門冬去心焙大黃銼焙知毋木通銼等分右為散每服三錢匕水一盞入蔥白五寸切碎同煎至八分去滓食後溫服以利為度若三服以上未通急煎芎藭湯一盞投之即下自早至夜可兩服不可常喫海蛤丸出聖惠方治小腸實熱小腹滿小便赤澀海蛤三分漢防己半兩甜葶藶半兩隔紙炒令香檳榔半兩木通半兩豬苓半兩去黑皮右為末煉蜜丸如桐子大每服食前煎冬葵根湯下二十丸地黃湯出聖惠方治小腸實熱心中煩悶小便出血生地黃白茅根各半兩蔥白二錢焙右銼如麻豆大水三盞半去滓食前分溫三服小腸虛附論夫小腸者受盛之官心之腑也手太陽其經也其氣虛則為不足故在手寸口人迎以前脈陽虛者小腸虛也虛則生寒是故有顱際頭角偏痛耳聾不聰驚跳小便數之證治宜補之小腸者受盛之官化物出焉承奉胃司受盛糟粕受以傳於大腸是謂化物者也其經有寒則亦傳於大腸故化物難而又腸中懊痛便痢赤白脈經謂小腸寒則令人下重便膿血者是也方牡蠣丸楊子建護命方治小腸虛寒小便頻數便下有膜如乳酪狀牡蠣火煅細研萆薢川續斷益智仁去殼石斛去根芎藭淮牛膝酒浸切焙狗脊去毛五味子石硫黃另研山茱萸巴戟天去心龍骨各等分右為末煉蜜丸如桐子大空心鹽湯下四十丸小便止即已不必服一方杵為末入鹽煎空心頻頻服不止再煉蜜丸服烏梅丸治小腸寒下痢赤白烏梅一百箇乾薑炮黃連去鬚各三兩當歸切焙細辛去苖葉附子炮製去皮臍桂去粗皮蜀椒去目并閉口炒出汗黃蘖去粗皮銼人參各一兩右將九味搗為細末以苦酒漬烏梅一宿去核蒸令爛别搗如泥攪勻更入煉蜜少許和丸如梧桐子大每服十丸米湯下食前日三服至二十丸益智丸楊子建護命方治小腸虛寒小便後餘瀝隂痿不起益智子去皮萆薢狗脊去毛芎藭巴戟天去心乾木瓜續斷牛膝酒浸切焙各半兩附子炮製去皮臍大者一枚右為末煉蜜丸如梧桐子大每服四十丸空心鹽湯下蘹香子丸一名附子丸出聖惠方治小腸虛冷小腹疼痛不可忍蘹香子炒桂去粗皮各一兩附子炮製去皮臍當歸切焙蓽澄茄木香赤石脂各三分蜀椒去目及閉口者微炒出汗半兩右為末煉蜜丸如梧桐子大每服溫酒下二十丸空心食前一方有川烏三分溫腸丸治小腸虛冷下痢便泄膿血腸滑懊憹補骨脂炒一兩肉蓯蓉酒浸去皮焙一兩狗脊銼三分獨活去蘆頭三分附子炮製去皮臍巴戟天去心鹿茸酒炙去毛各一兩五味子三分右為細末煉蜜丸如梧桐子大每服三十丸鹽湯或酒任下乾薑黃連湯出千金方治小腸虛寒頭偏疼耳頰痛痢下赤白腸滑腸中懊憹腹中疼痛裏急後重乾薑三分炮當歸切焙黃蘖去粗皮地榆各四兩黃連去鬚阿膠各二兩炙令燥石榴皮三枚焙右㕮咀以水七升煮取二升五合去滓下膠煮取膠盡分三服一方加茴香沉香湯出聖惠方治小腸虛寒臍下急痛小便滑數沉香銼桂去粗皮附子炮製去皮臍白龍骨各一兩木香當歸各二錢枳實去穰麩炒半兩右銼如麻豆每服三錢水一盞入生薑半分煎至六分去滓食前服木香丸治小腸寒便利赤白腸滑木香黃連去鬚訶子皮無食子各半兩赤石脂一兩厚朴去粗皮生薑汁炙銼碎當歸切焙各三分右為細末炊棗肉為丸如梧桐子大每服二十丸食前溫米飲下吳茱茰散出聖惠方治小腸虛冷小腹如刀刺或繞臍結痛冷汗出吳茱茰一分湯浸七遍焙乾微炒厚朴半分去粗皮塗生薑汁炙令熱芎藭半兩乾薑半兩炮銼甘草半兩炙附子三分炮製去皮臍右為散每服三錢水一盞煎至六分去滓不拘時溫服椒附丸一名鹿茸丸出聖惠方治小腹虛冷小便頻數椒紅炒出汗桑螵蛸酒炙龍骨生用一方白者燒過用山茱茰取肉去核附子炮去皮臍鹿茸酒蒸焙一方用酥炙右等分細末酒糊丸如梧桐子大每服七十丸空心鹽湯下一方煉蜜為丸厚朴散治小腸受寒腸痛下重便利膿血厚朴去粗皮生薑汁製炙銼黃連去鬚微炒乾薑炮當歸切焙各一兩白茯苓去黑皮無食子各半兩右為細末每服二錢匕食前米飲調下阿膠湯治小腸寒腸中懊痛下赤白阿膠炙燥二兩桂去粗皮生薑切焙各半兩黃連去鬚三分右為散每服五錢匕水一盞半煎至一盞去滓稍熱日三服寸金丸出百一選方治元陽虛弱寒氣攻衝膀胱小腸發腫作痛或在心脅之間撁連屬隂間致身體增寒撮痛不可忍楮實子川楝子炒各一兩半巴豆炒七箇去皮油全蝎炒四十箇當歸去皮酒浸一宿一兩半右為細末用浸當歸酒打麵糊和丸如雞子實大空心溫酒鹽湯下吞二丸或三丸併進二服蓬莪荗散楊子建護命方治小腸虛冷時發刺痛蓬莪荗炮蘹香子炒芎藭牛膝酒浸切細各半兩桂去粗皮一分右為散每服三錢匕銀石器內煎蔥湯調下牛膝丸楊子建護命方治小腸虛冷小便頻數日夜五六十次牛膝酒浸切焙續斷芎藭各半兩萆薢二兩右為末煉蜜丸如梧桐子大空心鹽湯下四十丸或用鹽煎服厚朴散出聖惠方治小腸虛冷氣小腹卒疞痛如割胸脅氣滿悶亂不可忍厚朴一兩去粗皮塗生薑汁炙令香熟髙良薑一兩銼當歸三兩銼微炒桂心一兩芎藭三分白芍藥三分右為散每服三錢水一盞煎至六分去滓不拘時熱服木香湯治小腸有寒下利赤白腹痛下重木香三分黃連去鬚微炒當歸切微炒各一兩附子炮製去皮臍一兩半厚朴去粗皮生薑汁炙三兩吳茱茰湯洗七遍焙乾炒半兩右為散每服三錢水一盞煎至七分去滓稍熱食前服斷弓絃散出續易簡方治小腸虛冷寒撮痛併婦人血刺心痛五靈脂蒲黃等分右同研為散每服二錢匕先用釅醋一合熬藥成膏以一小盞煎至七分熱呷下治小腸虛熱忽因酒後頓喫冷水薺汁梨小柑子果食生冷之類冷氣偏勝裹著熱氣結於小腸其病狀臍下結塊如癰瘇堅硬不通連通外腎俱腫宜服此方診其脈短此即隂中有伏陽也但結塊當臍下堅硬不通者服之無有不驗也出楊子建護命方吳茱茰一分芎半兩木通草五錢半夏二錢右件細杵羅為末每服三錢以水一盞蔥三莖同煎取八分空心和滓喫喉間得瘇處癢即續進一盞其瘇處癢後散滿一服即喫後方治小腸冷熱不調取結氣方出楊子建護命方吳茱茰木通草芎官桂大黃炮炒細辛藁本獨活各一兩生牽牛熟牽牛各半兩半夏四錢右件細杵羅為末每服四錢牽牛半夏末二錢諸藥二錢合為四錢濃煎蔥湯空心調下以大腑快為度未通再酌量臟腑尋常帶熱即使大黃若不帶熱不使也治小腸頻數不計度數臨小便時即隂莖內疼痛不可勝忍凡人得此疾必先大腑祕熱不通水只就小腸中行大腑乾渴即不通也大腑熱甚即渾身熱心煩常思涼處愛吃涼水如此即得之重也詳此候本因貪酒好色臟腑中有熱毒之氣流行於小腸故小便時令痛也若不因貪酒必平生愛吃葷膩辛熱毒之物腸中行引此熱毒積如腐爛者瘀血之類又因色傷小腸氣虛水就小腸行致有斯疾此與淋病不同俱小便頻數每度止有一盞半盞已來若是澀而疼痛者治之不同也治小便頻數不計度數臨小便時疼痛不可勝忍宜服此方出楊子建護命方萆薢一兩用水浸少時漉出用鹽半兩相裹鍋內炒乾去鹽不用右件細杵羅為末每服三錢水一盞同煎取八分和滓空心服此藥兩盞後便喫後方治肝肺熱毒蒸鬱臟腑因生積滯其積者如腐爛瘀血之類熱毒熾盛大腸乾渴又因色傷小腸虛冷水道乘虛只行於小腸故小便常數而疼痛不可勝忍急宜服此化熱毒方然後非時以蔥湯洗榖道并內藥於榖道中令上下相感引水道下入大腑即自然小便不數疼痛自止也緣此病大腸熱渴小腸虛損下熱藥固小腸則大腸愈竭而病愈增下冷藥通大府則小腸愈數而病不減當此之際醫之莫不為難也嘗以此方治之得驗故備録之使後來者觀之更生髙見則萬世生靈無大折者矣治小便頻數肝肺有熱以致疼痛宜服此化肝肺熱毒方出楊子建護命方杏仁牡丹皮去心黃芩虎杖麻黃去根莭木香芍藥柴胡升麻紫苑貝母連翹荆芥穗羌活各等分右件細杵羅為末服二錢匕生薑二小塊同煎八分食後濾滓徐徐熱喫服此藥後常暖蔥湯於腳盆內探手掬水洗榖道使大腸與肺氣交感表裏上下相通引行水道轉入大腸漸次出後通即便減得小便并疼痛也大腑既通喫後方藥便喫積滯方乃得全安大腑若不通即以牽牛半兩皂角半兩杵為細末舊葦管盛藥末二錢匕內在榖道中一寸已來吹之即化積滯通大腑方方列前腸腑門大便祕澀不通類利小腸出本草以小麥苖絞汁服之滑小腸出本草用冬葵子細銼以水煎服一盞食之一方葵子葉煮汁服之治小腹堅大如盤胸中滿能食而不消出本草用麴末服方寸匕日二服普濟方卷四十一
