body:
  text: 普濟方卷二百七眀周王朱橚撰泄痢門總論難經云有脾泄有大腸泄有小腸泄有大瘕泄名曰後重蓋胃者為黃腸水榖海也故㵼則色黃食不化脾者為胃行其津液者也故㵼則腹脹滿嘔吐大腸謂白腸故㵼則大便色白腸鳴切痛小腸謂赤腸故泄則便膿血小腹痛瘕者血聚也濁隂之氣結聚於內留滯而不行則裏結後重數至圊不能便故謂大瘕㵼也胃為水榖之海其精英則流布以養臟腑其糟粕則傳送以歸大腸腸胃虛弱或挾風或挾寒或傷暑傷熱停冷蓄熱冷熱不調泄㵼諸症皆能治之挾風者自汗惡風痛引腰背挾寒者筋節拘急身體怯寒傷暑者面垢燥渴之引水漿傷濕者肌肉虛浮肢體重著冷則腸鳴肚冷而手足清熱則煩燥肚熱而手足溫冷熱不調者乍澀乍溏由熱積於內不能去其積徒以冷藥水飲之熱氣無所發泄故冷與熱摶而下注其或冷積於中不能去其滯徒以熱藥壓之冷積不得宣行故熱與冷甘而成泄或澀或溏裏急厚重是其候也外此則傷食一證失飢傷飽胃不能消心腹膨漲所下酸臭治法當究其感受之源然後為之固實不窒其源吾恐決潰四出莫知其終矣然脾胃合氣以消水榖水榖既分安有所謂泄人皆以泄為脾恙而不知腎病有泄焉腎㵼何如曰腹痛無定似痢非痢骨弱靣黑腳下時冷者是也諸有泄㵼用不換金散也除濕湯之類以去風濕以安腸胃此土品藥也次則溫脾養胃之劑投之是為正法然用之而不作效抑且腹痛走上走下或臍間隱痛腰脊疼酸骨節軟弱面色黧悴尺脈虛弱病安在哉曰此腎泄也當以炒故紙生薑官桂乾薑木香當歸輩主之仍用安腎丸為佐其或腎水下涸心火上炎燥渴溺多飲無度此隂陽離絶也識者憂焉至若泄痢之後腹滿身疼是則為表裏俱病先當溫裏急與四逆湯然後解表急以桂枝湯與之肝木脾土木能勝土古人慮之固也經肝腎氣虛為病泄㵼亦孰知腎者所以守司於下而肝者又門户要束之具束則不㵼也不然泄㵼而面色青慘者古書謂肝經所受致寒時用當歸厚朴湯以主之果何意哉太素曰五泄有溏泄鶩泄飱泄濡泄滑泄也此乃是五泄者青是感肝木之象其色青赤者受心火之氣其色赤白者得金肺之氣色白黃者脾土之氣圡蒼者圡氣之下與水隨之其色蒼也泄㵼之症經中所謂飱泄淡洞泄濡泄溢泄水榖注下是也大腸為五榖傳送之官脾胃虗弱飲食過度或為風寒暑濕之氣所中皆能令人泄㵼如傷於風其脈必浮下必帶血當以胃風湯驅散之如寒氣所傷脈必沉細腹肚切痛下必青黑當以附子理中湯治中湯等溫暖之若傷於暑則脈必沉微煩渴引飲其下如水當以飲服五苓散來腹丹以分利之或夾食則又當以胃苓湯下蘇感丸若濕氣所中其脈沉緩腰腳冷痺小便自利不渴其下黃黑色當以滲濕湯藿香正氣湯調之因停食而泄者下必臭類抱壞雞子或噫氣作酸先服感應丸推其食積而後理脾氣體虛弱及年髙之人脾氣虗敗而自利者又當投以四柱散䓻附丸若脾腎氣虛清晨泄下一二次二神四神丸主之又有腎氣虛而泄者又須金鎖正元丹以固之凡治㵼之法先理其中焦分利水榖然後斷下醫之大法如此若腳氣泄㵼各以類求滑泄一症最忌五虗五虗者脈細皮寒少氣前後泄痢飲食不入者是也若得糜粥入謂泄㵼止作可治也五泄之病胃小腸大瘕三證皆以清涼飲子主之其泄自止厥隂症加甘草以緩之少隂證裏急後重故加大黃又有太隂陽眀二證當進退大承氣湯主之證不能食也當先補而后泄之乃進藥法也先煎厚朴半兩製水煎二三服後未已謂有宿食不消又加枳實二錢同煎二三服泄又未已如稍進食尚有熱毒又加大黃三錢推過泄止住藥如泄未止為腸胃有久塵垢滑粘加芒硝半合宿垢去盡則愈也陽眀證能食是也當先泄而後補謂退藥法也先用大承氣湯伍錢水煎服如利過泄則少減之後稍熱退減大黃一半再煎兩服如熱氣雖已其人必腹滿又減去大黃與枳實厚朴湯又煎三兩服如腹滿退泄亦自愈後服厚朴湯數服則已如大便虛滑久不愈太隂傳少隂為痢為賊邪宜以厚朴枳實湯主之儒門事親書云東門一男子病㵼痢不止腹鳴如雷不敢令坐坐則下注如傾諸醫例斷為寒症乾薑官桂丁香豆䓻之屬枯礬龍骨皆服之矣何針不燔何艾不注遷延將二十載矣一日問於戴人戴人曰兩手寸脈皆滑余不以為寒然其所以寒者水也以茶調散涌寒水五七升無憂散泄積水數十行乃通因通用之法也次以五苓散淡劑滲泄通利之又以甘露散止渴不數日冷食寒飲皆如故此法王啓玄稔言之奈無人用之何哉又云凡大人小兒暴注水痢不止內經曰此名曰暴注速㵼久而不愈者為洞㵼注下此乃火運太過之病也火星暴注故也急宜用新汲水調下甘露飲子五苓散天水散或用井華水煎此藥於冷服之病即瘳矣不可用御米穀乾薑豆寇聖散子之類縱然泄止腸胃胃氣滯不通變腹脹此法冝分隂陽利水道乃為治法之妙也凡泄㵼水榖不化日夜無度腹中雷鳴下痢完榖可用導水丸禹功散泄之或病人老弱氣虛可用無憂散泄之再觀病勢強弱候一二日可服胃風湯以治其風如不愈者更服桂枝藤黃湯汗之則愈內經曰夫風之中為腸風飱泄啓玄子云風入胃中上黨於胃故食不化而化泄又云暮食不化為飱㵼又經云春傷入風夏為飱泄故風冝出汗腸中鳴者風以動之動而有聲慎不可用罌粟豆䓻乾薑大燥之藥病漸者燥之去其濕則愈病甚者攻之不動反能為害經曰其減則漸其加則甚可用五苓散去豬苓加人參散凡下痢膿血腹痛不止者何也諸瘴癢皆屬於心火也可用通解丸加減㵼之量其虛實用之次用消濕散加生薑大棗芍藥服之㵼訖又用新水調五苓散服之又一法煎燈心湯調下益元散伍㭍錢此病大忌油膩暈腥熱物夫㵼痢兩證因腸胃先虛虛則六淫得以外入七情得以內傷致於飲食不節過食生冷多飲寒漿洞擾腸胃則成注下注下不已餘積不消則成滯下治㵼之法先當分利水榖車前子煎湯調五苓散是也次則上焦中焦正中湯及治中湯是也理中不效方可斷下乳豆丸固腸丸是也或尚腹痛未宜斷下斷下太早必成痢疾惟當調中化積痛輕者宜服治中湯蘇合香丸腹痛更甚者必然成痢也醫經所謂腹痛甚者必下痢也宜進靈砂丹以逐其積此丹用之屢驗㵼者止疼者愈有疾者內化且不動臟腑大凡痢疾不先去其積雖獲暫安後必為害或隂陽相摶冷熱不調而成㵼痢者當進香連丸更有脾腎頓虛腹脅膨脹飲食不化而泄㵼者宜助脾腎棗肉丸是也今之人久㵼不止多投來復丹誤矣蓋來復內用硝石硫黃皆有利性青皮陳皮又有遵性豈宜服之如夏月暴㵼乃可服也臟腑泄痢其證有多種大抵從風濕熱也是知寒少熱多故曰暴泄非隂久㵼非陽膄而便膿血知氣行而血止也宜大黃湯下之是為重劑黃芩芍藥是為輕劑治法宜補宜泄宜止宜和和則芍藥湯止則訶子湯有暴下無聲身冷自汗小便清利大便不禁氣難喘急脈微嘔吐急以重藥溫之漿水散是也後重則宜下腹痛則宜和身重者除溫脈𢎞者去風膿血稠粘以重藥竭之身冷自汗以毒藥溫之風邪內縮宜汗之鶩溏為痢當內之在表者發之在裏者下之在上者勇之在下者竭之身表熱者內踈之小便澀者分利之盛者和之去者送之過者止之除濕則白术茯苓安脾則芍藥桂枝黃連當歸宣通其氣則檳榔木香如泄痢而嘔上焦則生薑橘皮中焦則芍藥當歸桂茯苓下焦則治以輕熱藥下甚以重熱藥若四肢倦小便少或不利大便走沉困飲食減宜調胃去濕白术茯苓芍藥三味水煎服如發汗惡寒腹不痛加黃芩為主如未見膿而惡寒乃太隂欲傳少隂也加黃連為主桂枝佐之如腹痛甚者加當歸倍芍藥如見血加黃連為主桂當歸佐之如煩燥或先便血膿後白或發熱或惡寒非黃連不止上部血也如惡寒脈沉或白腰痛或血臍下痛非黃芩不止此中部血也如惡寒脈沉先血後便非地榆不能止此下部血也唯脈浮大者不可下至冬赤白痢者是冷熱乘於血血滲腸間與津液相雜而下甚者腸虛不復故赤白連滯久不差也凡痢久不瘥脾胃虛弱則變嘔穢胃熱氣逆故嘔也氣逆外有冷折之不通故噦亦變為𧈟蟲食人五臟也三尸九蟲常食居人腸胃腸胃虛則動上食於五臟則心懊憹而悶齒斷唇口並生瘡下食於腸則肛門傷爛而榖道開也輕者可治重者致死大腸蟲痢者冷熱之氣入在腸間先下赤後下白連年不愈侵傷於臟腑下血雜白如病蟲之狀名為腸蟲也有休息痢者胃管有停飲因痢積久或冷氣或熱氣乘之氣動於飲則飲動而腸虛受之故為痢也冷熱氣調其飲則靜而痢亦休腸胃虛弱易為冷熱其邪氣或動或靜故其痢乍發乍止謂之休息痢也夫水榖之精化為血氣津液以養臟腑受風邪入腸胃故痢則津液空竭臟腑虛燥故痢而兼渴也渴而引飲即痢不止翻益水氣脾胃已虛不能克消水水氣流溢侵漬肌肉則變成瘇也病有數種有水痢有榖痢有血痢有膿痢有膿血相和痢有傷澼痢其水痢者本由脾氣熱消榖作水榖氣不停便生此痢榖痢者由脾氣冷榖氣不消而生此痢血痢者由毒熱在腹血流入腸故有此痢膿痢者由積冷所致膿血相和痢者由冷熱相擊便致此痢腸澼痢者由積冷在腸間垢洟不能自固便有此痢色數雖多其源則一皆緣飲食不節將飬失宜也腸垢者腸間津液也由熱痢藴積腸間虛滑所以因下痢而便腸垢也當診其脈如下痢微小者生浮洪者死沉弦者下重脈大者未止緊者邪氣未解脈弱而微渴必自愈腸澼下膿血者脈宜微滑也若弦急者必死手足厥冷無脈炙之不溫脈不還反微湍者死身寒者生發熱者死臨病之際由此驗治之萬不失一下痢脈滑而數有宿食當下之下利脈遲而滑者實也利雖未止宜急下之下痢脈反滑當有所去下乃愈下痢不欲食者有宿食當下之下利而腹痛滿為寒實當下之下利腹中堅者當下之下利而讝語者腹內有燥屎宜下之下利二部皆平一作浮按其心下堅者急下之下利已瘥至其年日月時復發者此為下不盡更下之愈風寒下者不可下下之後心下堅痛脈遲一作浮此為寒但當溫之脈沉緊下之亦然脈大浮弦下之當已下痢脈浮大此為虛以強下之故也設脈浮革者因爾腸鳴當溫之下痢脈遲急為痛未欲止當溫之得冷者滿而便腸垢下痢身軀疼痛急救裏諸溫之屬可與理中四逆附子湯熱藥下痢大孔痛者當溫暖之下痢腹脹滿身軀疼痛者先溫其裏乃攻其表下痢清榖不可攻其表汗出必脹滿下痢氣者當利其小便下痢脈反浮數尺中自澀其人必清膿血下痢脈數而渴者今自愈設不瘥必清膿血有熱故也下痢脈沉弦者下重其脈大者為未止脈微弱數者為欲自止雖發熱不死下痢脈沉而遲其人面少赤下痢清榖必欲冒汗出而解病人必微厥所以然者面戴陽下虛故也下痢有微熱而渴脈熱者今自愈下痢脈數有微熱汗出今自愈設脈緊為未解下痢脈反強發熱身汗者自愈下痢脈大浮弦下當已下痢舌黃燥而不渴胸中實下不止者死下痢後脈絶手足厥冷晬時脈還手足溫者生不溫者死下痢手足厥冷無脈者炙之不溫若脈不還反微湍者死少隂負跌陽者為順凡六腑氣絶於外者手足寒上氣腳縮五臟氣絶於內者下不自禁下甚者手足不仁也痢與㵼名目不同而感受之源一也治療之劑大要以散風邪行滯氣開胃腕為先不可遽用肉豆䓻訶子白术輩以補住寒邪不可遽投罌粟殼龍骨牡礪輩以閉塞腸胃邪氣得補而愈盛補之愈盛而愈作不為纒優撮痛則為裏急後重所以日久延淹而未已也痢之赤白其赤者熱乘於血血滲大腸則赤也若風邪挾熱則所下黃而赤其白者冷摶腸間津液凝滯則白也若寒邪併之則所下白而黑冷熱相交故赤白相半重者狀若膿涎而血雜之輕者濃涎中間微有赤縷是也內挾風邪故青血流注或濕毒乘虛入腸胃之間則下如豆汁或有瘀血是也論者以手足寒為冷手足溫為熱於理甚當亦當以赤白而並觀之雖然風寒暑濕感之於外者也其大嚼而傷飽而宿酒漿醯醢以成積滯房闥縱情加奔走勞役以耗精血非此病生於內者乎必眀别內外而推度之則受病淺深用藥輕重知有定向矣下痢壯熱須用敗毒散加陳米間與五苓散黃連阿膠丸下痢雖曰有積有暑如用藥不效即是腰胃有氣邪熱者赤毒者與敗毒散冷者白者不換金正氣散加木香若下痢熱極煩併窘痛或久不愈諸藥不能者須下之以開除濕熱痞閉積滯而使氣液宣行者宜以逐之兼宣痢積熱也凡治痢不可拘於無積不成痢之説也專以去積為先豈有一歲之內獨於夏秋之間人皆有積亦須眀其脈體之由辨其風寒暑濕所中蓋風邪入胃水來勝土不為暴下則為痢疾其疾所發證候不一有赤痢白痢赤白痢冷痢熱痢蠱痢氣痢噤口痢積痢血痢久痢休息痢膿血痢五色毒痢凡下痢赤黃但欲飲冷小便不順利得熱則更極心煩燥喜渴脈虛大而數或沉實有力由乘虛熱入於胃湊於下焦津液不分併於大腸謂之協熱痢先以小承氣湯一二服蕩之次以五苓散加車前子以利小便次以黃連阿膠丸治之治痢陟釐丸烏梅丸松皮散等暴痢服之何有不差其溫脾湯建脾丸久不得之焉能得愈大凡痢有四種謂冷熱疳蠱冷則白熱則赤疳則赤白相雜無復節度多睡眼澀蠱則純痢瘀血熱則多益黃連去其乾薑冷則加以熱藥疳則以藥吹灌下部蠱毒則以蠱法治之藥既主對相當痢者復自勉勵服餌焉有不愈者也諸㵼痢方炙肝散治脾胃虛弱五癆七傷肌體羸瘦全不思食久患泄㵼腸滑不止心胸滿悶臍腹疼痛或便膿血困倦無力四肢沉重及心勞口瘡並皆治之木香白术生􅙈角山茵陳去梗紅豆䓻縮砂仁桂去粗皮人參去蘆頭黑附子炮製去皮臍石斛銼炒狗脊去皮川芎良薑柴胡去苗訶子炮去核草豆䓻炮裂去皮臍各一兩半陳皮去白白芍藥乾薑炮桔梗防風紫苑去土紫參去皮白蕪荑炒去皮吳茱莄洗焙乾各半兩右為末每二錢羊肝二兩去筋膜薄批摻藥入䓤白生薑絲鹽各少許拌勻紙褁水濕文武火煨熟用生薑粥下食前日二木香豆䓻丸治臟腑泠極久冷傷憊口瘡下泄米榖不化飲食無味肌肉消瘦心多嗔怒婦人産後虛冷下泄及一切水泄冷痢脾泄此方於東坡家藏方內言用此藥與人莫不神應備録病愈人名姓兹不偹述豫用此方十餘年無不取效脾㵼者即愈而㵼痢只一服見效惟熱痢熱㵼不治蓋藥主熱也隨證用之木香破故紙各一兩良薑七錢半砂仁七錢半厚朴七錢半赤芍藥半兩陳皮半兩官桂半兩白术半兩胡椒二錢半吳茱茰熱水洗二錢半肉豆䓻四箇檳榔一箇右為末用漿水煮豬肝和藥搜勻仍用些麵糊為丸如梧桐子大每服五七十丸空心熬稀米粥飲送下訶梨勒丸治五泄痢訶梨勒半生半煨並去核肉豆䓻去殼木香各三分乾薑炮甘草炙銼各半兩右為末煮醋糊丸梧桐子大每服二十丸至三十丸米飲下鍾乳建脾丸治男子婦人虛損羸瘦身體沉重脾胃冷弱飲食不消腹脹雷鳴泄㵼不止又治腸虛積冷下痢清榖或下純白腹中疞痛及久痢赤白腸滑不禁少氣羸瘦不思飲食並冝治之肉桂去粗皮人參去蘆黃連去鬚乾薑炮龍骨各一兩蜀椒去目及閉口者微炒出汗三兩半當歸去鬚石斛去根各一兩大麥蘗炒一兩附子炮去皮臍五錢細辛去苗土茯苓去皮神麴碎炒赤石脂各一兩鍾乳粉一兩半右為末入鍾乳粉和勻煉蜜為丸如梧桐子大每服三十丸食前服溫米飲下日三服未效用三建湯吞金粟黃芽丹數粒方見痼冷類一方通治男女集驗無細辛龍骨丁香豆䓻散治脾胃虛弱宿寒停積或飲食生冷物內傷脾胃泄㵼注下水榖不化胸滿短氣嘔逆惡心臍腹疞痛脅肋脹滿腹內虛鳴飲食減少及積寒久痢純白或白多赤少日夜無度或脾胃虛寒泄㵼日久愈而復發者並宜服之京三稜炮木香不見火厚朴去粗皮薑汁製芍藥肉豆䓻炮人參乾薑炮茯苓白者去皮各五兩甘草炙吳茱茰湯泡七次焙丁香各二兩蒼术去皮七兩右為細末每服三錢水一盞薑三片棗一枚同煎至八分空心食前溫服不及煎入鹽少許湯點服亦得白术聖子散治一切㵼痢久不瘥并婦人産後痢亦治御米殼三兩蜜炒當歸乾薑炮石榴皮甘草訶子肉豆䓻陳皮去白白术縮砂仁芍藥各等分右為末每服二錢水一大盞入乳香少許同煎和滓服固腸丸治㵼及泄㵼肉豆䓻面褁煨龍骨煆研水飛阿膠阿粉炒木香濕紙褁煨附子炮製乾薑炮赤石脂煆七次醋碎研人參去蘆已上各一兩沉香半兩鎊不見火白术二兩炒訶子去核二兩右為末粳米糊丸梧桐子大每服七八十丸空心米飲下服藥後覺熱去附子加茱茰一兩黃連一兩大溫脾丸治脾胃虛弱冷氣攻衝飲食不化心腹脹痛嘔吐吞酸痞噎及腸鳴泄痢水榖不分面黃肌瘦食減嗜卧並皆治之常服溫脾益胃消榖進食如久虛痼冷食少多傷尤宜常服吳茱萸湯泡七次焙大麥蘗炒肉桂去粗皮各五兩甘草炙桔梗人參乾薑炮各三兩附子炮去皮臍細辛去苖各二兩枳實麵炒一分半神麯碎炒三兩一錢右為細末煉蜜丸梧桐子大每服二十丸溫酒下米飲亦得日三服空心食前一方用枳殼訶梨勒散治泄痢無度訶梨勒母丁香各五枚甘草炙銼一錢肉豆䓻麵褁燒一枚右為散米飲調下半錢食前服纒金丹治大人小兒一切㵼痢無問冷熱赤白連綿不瘥愈而復發腹中疼痛者宜服之和劑方一名不二丸硇砂一方旡乳香各二錢半杏仁去皮尖巴豆去皮心膜出油各八錢半黃蠟朱砂各一兩木龞半兩白膠香一錢黃丹二兩半砒霜醋煮煆三錢半或研磁罐子以赤石脂固縫鹽泥固濟燒通赤候冷取出右為細末鎔蠟搜和丸如麻子仁大每服一丸小兒半丸水泄新汲水下赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下并於臨卧時服孕婦莫服忌熱物一二時辰一方鎔蠟為劑入油二十點令軟油單褁旋丸肉豆䓻丸出御醫院方治腸虛脾弱停積風冷大便泄㵼水榖不化腹脅脹痛下痢膿血遍數頻併裏急後重嘔逆惡心肢體困倦飲食減少肉豆䓻麵褁煨黑附子炮去皮臍川薑炮桂去粗皮硫黃研白术炒當歸去蘆頭各一兩川烏頭炮去皮劑紅豆䓻各半兩訶子皮一兩右為細末醋麵糊丸梧桐子大每服三十丸空心米飲下水煮木香丸仁存方治腸胃虛弱風濕進襲泄泄水榖滯下膿血疞刺疼痛裏急後重日夜無度及純下白痢淡紅黑痢當歸洗芍藥白甘草炙訶子去核各半兩青皮陳皮各一兩縮砂仁木香炮各一分厚朴去粗皮切薑製一兩罌粟殼切醋淹炒五兩右為末蜜丸一兩作五丸每服一丸水一盞煎七分食前溫服凡血得熱則淖溢故行得寒則凝滯故瘀當審其風熱風冷二證與蠱痢大别外有血痔血枯肉衄酒利肺疽腸胃大蓄遠近瘀血等各有門類不可混雜積冷積熱及水榖實而下痢者以大黃湯下之養生方亦云踈滌之更不知有寒熱風濕虛實之不同後尋即妄用被害多矣吁可傷哉一方有乾薑無縮砂仁厚朴白术調中丸瑞竹堂治脾胃不和心下堅痞兩脅脹滿臍腹疼痛噫宿腐氣霍亂吐㵼米榖不消久痢赤白膿血相雜多日羸瘦不思飲食神麯四兩炒白术半兩人參去蘆白茯苓去皮豬苓去黑皮澤㵼各三錢木香二錢官桂去粗皮一錢半甘草去皮炙一兩乾薑炮一兩右為末麵糊丸梧桐子大每服五七十丸空心淡薑湯下加味六君子湯出德生堂治一切脾胃虛熱泄㵼之證及傷寒病後米榖不化腸中虛滑發渴微痛不久瘥者及治小兒脾甘泄㵼得痢人參白术白茯苓甘草黃耆山藥砂仁各一兩加厚朴七錢半肉豆䓻麵炒叧研七錢半右為末每服二錢飲水調服不拘時如熱煎麥門冬水調服震靈丹出直指方治脾㵼腹痛無定處似痢非痢骨痛面黧腰腳時冷禹餘糧火煆醋淬不計遍次手撚碎為度丁頭代赭石如上修製赤石脂紫石英杵碎已上各四兩入于鍋內以瓦蓋鹽泥固濟候乾用硬炭一十斤煆通紅火盡為度入地坑內出火毒二宿研末用滴乳香别研沒藥五靈脂并去砂石研各二兩硃砂一兩研右並為細末糯米粉糊丸小雞頭子大風乾每服三丸用炒故紙入棗湯調鍾乳粉少許空心下小兒腎泄白膿褐汁面黯齒脫畏人怯寒震靈丹末入些鍾乳粉以棗煎炒故紙取熱汁調下胃風湯出直指方治大人小兒風冷乘虛入客脾胃風散氣故血行大腑多便鮮血水榖不化泄㵼注下腸胃濕毒下如腹脅虛滿腸鳴豆汁或下瘀血日夜無度臍腹疞痛腸風下血婦人下血過多靣黃力倦服此尤能資補但味甜恐傷榖氣耳人參白术茯苓當歸芍藥桂心芎藭各二兩防風右㕮咀每服三錢水一大盞陳粟米百餘粒煎取七分去滓熱服小兒量力與服今人多用此治痢止㵼者皆非所宜但血痢脾胃虛壯冝服瘧痢皆生於脾虛而有痰外冒風暑致隂陽分爭寒熱更作休作有時病名曰瘧若脾胃虛而受積內挾風暑致臟腑不調赤白雜下登厠頻數病名曰痢瘧痢二病中外證雖不同要知此能傷耗氣血治瘧之法當先分隂陽然後與之驅絶治痢之法當先除積滯然後與之調止由是而知痰者瘧之根積者痢之源治之者必先其要可也一方有甘草無防風易簡加減胃風湯又云若加熟地黃黃耆甘草等分足為十味名十補湯若虛勞嗽加五味子若有痰加半夏若發熱加柴胡若有汗加牡礪若虛寒加附子若寒甚加乾薑皆依本方等分若骨蒸發熱飲食自若者用十補湯加柴胡二兩服之者氣短加人參若小便不利加茯苓若脈弦澀加川芎若惡寒加官桂若脈澀加當歸若腹痛加芍藥若胃熱濕加白术潔古云黃防風為上使黃連為中使地榆為下使若血瘀色結者陳血也加熟地黃若血鮮色紅者新血也加生地黃若寒熱者加柴胡飢熱者加地骨皮若脈洪實痛甚者加酒浸大黃一方無防風當歸散出危氏方住㵼痢地榆陳皮罌粟殼去蒂蕚穰當歸去尾赤芍藥甘草肉豆䓻煨黃連右各等分為末每服二錢冷水調服沒石子丸出危氏方治臟氣虛弱大腸滑泄次數頻併曰漸羸瘠不進飲食或久患赤白痢脾㵼等病並皆治之白术白茯苓各二錢白薑切作片子炒赤石脂别研丁香不見火訶子濕紙褁炮取淨皮各二錢肉豆䓻麵褁炮沒石南畨者麵炮各二兩右和勻用湯泡蒸餅為丸梧桐子大每服三四十丸米飲吞下食前一日三四服棗肉丸亦得感應丸出仁存方治臟腑停積臍腹疼痛米榖不化下痢赤白泄㵼注下丁香木香各一兩半肉豆䓻二十枚百草霜研二兩巴豆七十粒乾薑炮一兩杏仁一百四十粒去皮尖研成膏右除巴豆百草霜杏仁外餘為細末和勻用好蠟六兩溶濾去滓更以好酒煮蜜蠟溶候冷取出稱用凡春夏用清油一兩蠟秋冬用油一兩半熔蠟作汁和藥末搗成劑旋丸如菉豆大每服十丸加至三十丸米飲下薑湯亦可食前服三五丸地榆湯聖濟總録治泄痢無問老小地榆銼酸石榴皮甘草炙銼各三分阿膠炙燥半分龍骨半兩白石脂半兩赤芍藥三分厚朴去粗皮生薑汁炙三分右搗篩每服五錢水一盞半煎一盞去滓空心日午溫服斷痢散治一切㵼痢腹痛久不瘥肉豆䓻丁香乾薑炮各二錢半甘草炙陳皮訶子去核各一兩御米殼去蒂蜜浴炒三兩右㕮咀每服二錢半水一盞乳香一粒粟