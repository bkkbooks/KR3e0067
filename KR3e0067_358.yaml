虛脹小便難出大便積冷與脾虛藥服之如黑彎過三關者飯食不化喫水之時更加嘔吐肚大青筋蛔蟲頻出急與安脾胃藥服之遲即死也其外曲脈者主因驚而受風邪或即吐㵼如療之遲脈過第三節變成慢驚必死也其裏曲脈者主傷熱身體壯熱頭痛多啼哭不睡時時咬人只在其中節風熱灌於心臟而眼赤與涼風藥治之其脈過第一節可治過第二節為難治過第三節為靠甲名曰絶脈不拘顔色俱死證也如紅紫色白日死如青黑色夜後死指脈紋色樣深青色主驚悸淺青主便青肚疼青黑主驚搐內弔紅赤色主驚熱淺紅主下痢腹如不痢主吐㵼不食深紫色主驚哭淺紫主煩渴紋彎主傷乳不吐即㵼脈紋透起指面者必發熱驚卧不安則受病日深不久必變風搐若指紋生枝節者不治或有進退煩煎多睡精神不爽指紋不見者久必發驚候不治脈指訣歌小兒食指辨三關男左女右一般看皆知中氣初風候末是命關易亦難要知虎口氣紋脈倒指看形分五色黃紅安樂五臟和紅紫依稀有損益紫青傷食氣虛煩青色之時證候逆忽然純黑在其間好手醫人心膽寒若還直上到風關粒米短長分兩端如鎗衡直驚風至分作支火有數般弓反裏順外為逆順逆交連病已難義頭長短尤可救如此醫人仔細看男兒兩嵗尚為嬰三嵗四嵗幼為名五六次第分少長七齓八齓漸論情九歲為黃十稚子有病關隔辨其因十一癎疾號癲風疳病還同勞病攻痞癖定為停積候退它潮熱不相同初看掌心中有熱便知身體熱相從肚熱腳冷傷食定腳熱額熱是感風額冷腳熱驚所得瘡疹發來耳後紅小兒有積宜與拓傷寒三種解為宜時㵼之時須有積冷㵼須用與溫脾水㵼且莫澀臟腑先將滯腸散與之孩兒無事忽大呌不是驚風是天弔大呌氣促長聲粗誤食熱毒悶心竅勿須吐下却和脾若將驚藥真堪笑痢疾弩氣眉頭皺不弩不皺腸有風冷熱不調分赤白脫肛因毒熱相攻十二種痢何為惡禁口刮腸大不同兒但有病不可下不熱自汗兼自㵼神困囟陷四肢冷乾嘔氣虛神怯怕吐蟲面目毛焦穗疳氣潮熱食不化鼻塞咳嗽及虛痰脈細腸鳴躁煩作若將有與積踈通下了之時心生詫孩兒實熱下無妨面赤睛紅氣壯強脈大弦洪肚上熱胙腮喉痛尿如湯屎硬腹脹脅肋滿四肢浮腫夜啼長遍體生瘡肚隱痛下之必愈世為良凡看小兒初生至半睟之間有病即與看額前眉上髮際下以名中食三指輕手滿曲按之兒頭在左舉右手在右舉左手食指為上中指為中名指為下若三指俱熱感受寒邪鼻塞氣粗三指俱冷臟寒吐㵼若食中熱上熱下冷若名中指熱夾驚之後若食指熱胸堂不寬若名指熱乳食不和伍指稍冷主驚中指熱傷寒中指獨冷主痘分男左女右看之半睟以上方可看虎口周睟以上看虎口兼一指脈若五百七十四日變蒸滿足只與看一指脈以食指衮轉分取三部者非寸關尺也看面氣色為一部虎口紋脈二部寸口一指脈三部五脈者上按額前下診大衝併前三部謂之五脈凡兒有患惡候即不可不與診大衝之脈其脈定死生之要會也其證危惡故當診之驗五臟氣絶證心絶囟腫囟陷汗出不流汗出如珠如油舒舌出口舌腫發驚㵼黑黯血髮直如麻皮膚無血色並死壬癸日肝絶啼哭無泪不哭下淚爪甲青黑眼深如陷舌囊卷縮發搐目斜連唇口動手如抱頭之狀或腳面直素問云其華在爪其充在筋並死庚辛日脾絶人中滿或黑唇縮畨張唇焦枯燥唇乾紫黑唇不蓋齒舌腫尿血舌縮或卷鼻孔開張齒噤冷涎如油攝口如囊面如土色四肢冷逆如揾石之狀吃乳不收㵼糞赤黑並死甲乙日肺絶有病咽湯水并藥食喉中鳴是胃管直水不能蔭肺此證醫書罕有蓋纍曽有驗必死不治目直青鮮目直氣喘不回吃食多噎嗽痰眼上頭涎塞口喉中鳴響鼻乾黑燥鼻塞不通肺脹􅎍膈頭汗肢冷並死丙丁日腎絶面黑神昏眼黑睛腫目無光彩耳無輪青黃耳輪焦枯牙齒焦枯疳牙齒落髮踈黃燥膚黑皮燥驚風咬妳驚風戞齒泄屁發驚黑色繞口並死戊巳日五臟相尅雜證心病目黑腎尅心壬癸日絶肝病皮黑肺尅肝庚辛日絶脾病唇青肝尅脾甲乙日絶肺病頰赤目腫心尅肺丙丁日絶腎病面腫唇黃脾尅腎戊巳日絶五軟惡候手軟腳軟頸軟背軟腰軟五硬惡候手硬腳硬頸硬背硬心硬五冷惡候手冷腳冷氣冷唇冷面冷五縮惡候手縮腳縮舌縮唇縮隂縮五反惡候眼反唇反舌反項反腳反五緊惡候咽喉緊唇口緊眼稍緊手腳緊隂囊緊五陷惡候囟門陷太陽陷眼輪陷胸下陷肩井陷五腫惡候五心腫人中腫舌頭腫膝脛腫隂莖腫五喘惡候瘡痘喘驚風喘虛腫喘吐㵼喘下痢喘五噦惡候瘡痘噦驚風噦久渴噦久痢噦久瀉噦辨表裏諸證及治法表證屬陽陽病外證壯熱煩渴大小便祕澀頭面有汗昏潰氣粗揚手擲足三陽乃足三陽自頭至足太陽屬膀胱其證腰脊強頭項痛發熱惡寒乃陽證之表陽明屬胃其證目疼身熱鼻塞不惡寒反惡熱自汗不寐內實大便難乃陽證之表少陽屬膽其證胸隔痛或口苦咽喉乾目眩往來寒熱而嘔病在三陽三隂之間表證發熱頭疼惡風惡寒或身體疼痛其便清其脈浮洪浮緊浮數表虛脈浮而緩其證自汗惡風小便自利明理論曰汗出而惡風為表虛當解肌楊氏參蘇飲羌活散香蘇散加乾葛方本惺惺散解肌湯小柴胡湯表實脈浮而緊其證無汗惡寒大熱小便赤澀明理論曰無汗而惡寒為表實當表汗湯氏解肌湯楊氏麻黃桂枝湯加黃芩本方青龍湯解肌湯惺惺散並加麻黃論汗下活人書曰表病裏和汗之則愈下之則死楊氏曰陽證體輕脈經而浮于外在臟為表表有邪則知陽虛而隂盛發表之藥宜溫抑隂助陽湯氏曰凡小兒發熱之初急須表汗次當發散然後調理要在晝夜熱退為佳今之醫者多不用麻黃但用惺惺散羌活散之類乃常發致令失表三五熱不除入于經絡摶于血氣表裏受邪內外藴熱變證蜂起或作驚風或成痘證傷生之命皆失表之過當汗而不汗仁齋曰汗則血化為毒血熱則閉眩昏悶迷讝語心怯氣短發躁喘滿小便多皆血證也當汗而誤下明理論曰表未解而醫反下之胃中空虛陽氣內陷則為懊憹楊氏曰誤下則內泄其真氣邪氣得以深入為痞滿為結胸為懊憹為衄血張氏曰承氣入胃隂盛乃亡隂盛于內而誤投承氣下之外得寒而助邪內受虛而損正安得不亡述之為妄下之戒裏證屬隂隂病外證脈沉而微其證厥冷自痢煩躁無汗身熱頭疼太隂屬脾其證腹滿或痛手足溫自痢不渴咽乾腹滿時痛有積少隂屬腎其證口燥舌乾而渴惡寒欲寐不欲見光明咽乾口燥胃汗乾也厥隂屬肝其證唇青煩滿筋冷或渴不欲食舌囊卷縮毒入腎也裏證不惡寒反惡熱手足心掖下有汗口燥胃乾身熱腹滿小便如常大便堅硬其脈滑實弦緊中間數盛此裏證也裏實脈沉而實腹滿身熱口氣熱大便堅明理論曰腹脹滿而短氣者邪在裏為實法當下之楊氏四順清涼飲十方解肌湯惺惺散並加大黃虛者煨用裏虛而傳隂證脈沉而微細其證自痢厥冷身清四逆口氣冷煩燥而無汗身熱唇青舌黑或白胎或卷強頭額冷手足溫面色黯淡㵼清明理論曰腹濡滿而短氣者裏邪虛也宜溫之仁齋曰隂病裏虛當用溫熱藥救裏楊氏溫裏理中湯厥冷甘草乾薑湯本方實脾散四君子湯加乾薑重加附子論汗下溫活人書曰病裏表和下之則愈汗之則死仁齋曰裏病體重脈重實而不浮其病在裏屬隂謂之裏有邪則為隂虛而陽盛是以攻裏之藥性宜寒抑陽助隂也又曰隂病亦謂之裏隂經受邪則成臟病裏者胃腑之主而臟受病又深于裏焉又當助陽以救裏法當溫之是以溫隂之藥性冝熱助陽抑隂也當下而失下楊氏曰致血氣不通是以熱燥而厥深厥者乎足冷也陽盛則厥其脈滑數厥亦時溫當下而誤汗楊氏曰外泄其正氣內邪乘虛而出為讝語為亡陽動經下厥上竭至于陽厥似隂張氏曰桂枝下咽陽盛則斃正恐陽盛而入誤以桂枝汗之內得熱以助邪外受虛而損正安得不死述之為妄汗戒小兒諸病惟熱最多先當辨其虛實隨證治之虗熱其證面色青白身微熱溫冷口氣冷手足心不熱大小便自利恍惚神慢噓氣軟熱泄㵼多尿虛汗自出叔和曰虛熱不可大攻熱去則寒起惺惺散豬苓湯四君子湯錢氏白术散實熱其證面赤氣粗口熱燥渴唇腫大便難掀揭衣被煩啼暴呌在表宜汗青龍湯解肌湯並加麻黃在裏宜下四順飲解肌湯加大黃孫真人云得利謹勿中補熱氣得補復作表裏俱熱舉按脈實面黃頰赤唇煩口燥小便赤澀大便堅硬口中熱氣楊氏四順飲加川芎柴胡惺惺散加麻黃大黃本方青龍湯解肌湯加大黃黃芩麻黃鬱金冷熱不調其證身體乍清乍溫乍涼乍熱上盛下泄水穀不分楊氏敗毒散加本方本方解肌散加肉桂木香汗下熱不除仁齋曰退表熱宜微汗退裏熱宜微利汗下而熱又再表乃表裏俱虛氣不歸元陽浮于外不可再用涼藥及再汗下當和胃氣使陽氣收斂歸內其熱自止宜參苓白术散本方實脾散桞叔舉云若已經汗下大熱未除恐防痘證不可妄用涼藥除熱不除仁齋曰用涼藥不可十分盡蓋熱去則寒起古人戒之或餘熱不除不足關心但用川芎茯苓甘草白术少用白水煎以和胃氣收斂浮陽纍用取效又曰凡壯熱煩躁已用柴胡黃芩大黃解利之其熱乍輕乍進宜用黃連能㵼心川芎活血赤茯苓利小便生地黃退熱入燈心一捻水煎服心血一調其熱自退冷證其脈沉而微遲其證面色青白身溫冷口氣冷大小便自利手足冷乳食不化隨證用藥治之實熱往來明理論曰陽盛則熱隂盛則寒乃隂陽相勝也寒為隂熱為陽裏為隂表為陽邪克于表與陽爭則為寒邪入于裏與隂爭則為熱邪在半表半裏外與陽爭為寒內與隂爭為熱邪在半表半裏則實熱亦半矣審其寒熱多少知其表裏邪氣淺深小柴胡湯主之內經曰熱于內以苦發之必先散熱以苦寒為主柴胡為君黃芩為臣以成徹熱發表之劑人參味甘平邪氣傳裏甘以緩之用人參甘草為佐以扶正氣半夏味苦辛微溫邪初入裏辛以散之以三味佐柴胡和裏生薑味辛溫大棗味甘溫經曰辛能發散是以生薑大棗為使和柴胡以和表七味相合兩解之劑則當矣仁齋曰小柴非獨和解表裏大能解血熱消惡血蓋傷寒一二日調治失宜必致傷血小柴內有黃芩柴胡最能行血但藥性差涼宜以寒熱輕重用藥溫涼加減得法本方解肌湯內此方藥味俱用詳審之毋為熱過冷誤乃良工也素問虛實五虛身寒脈細不食前後和汗出五實身熱脈大能食悶瞀大小便不利石壁胡大卿痘疹方論虛實飲食進退則知人榖氣之虛實大便滑澀則知人臟腑之冷熱實者稟氣壯實夏酷暑而不畏熱冬嚴寒而不畏寒虛者稟氣怯弱易寒易熱見天氣寒隂則感寒而腹痛遇天氣稍炎則中暑發熱朱氏集驗方論虛實小兒面如桃花色乃童顔也大便黃稠小便清徹手足和暖乃表裏俱實其子易養無病不必服涼藥恐傷胃氣證傳吐利不可服熱藥者七足脛熱兩腮紅大便祕小便赤渴不止上氣急脈緊數不可服涼藥者七足脛冷腹虛脹糞青色吐乳食眼珠青而青白脈沉微楊仁齋論虛實貴賤五實脈盛大熱腹脹前後不通胃強五虛脈細皮寒氣少前後泄利乳食不進貴賤膏粱之腹與藜藿之腹不同葦布之軀與純綿之身各異論曰諸病出者為虛入者為實隂出乘陽陽入乘隂言者為虛不言者為實緩者為虛急者為實隂靜則緩陽燥則急濡者為虛堅者為實癢者為虛痛者為實外痛內快者外實內虛外快內痛者外虛內實其有心腹皮膚內外俱痛按之而止虛也按之而痛實也經所謂皮虛則熱脈虛則驚肉虛則重筋虛則急骨虛則痛髓虛則惰腸虛則泄三陽實三隂虛汗不出三隂實三陽虛汗不止錢氏治法出潔古錢氏補遺五臟五邪在前為實邪子能令母實拒鬼賊不敢傷于母其子又引母所剋妻相助故曰實邪也在後為虛邪母引子之鬼賊至由此母能使子虛也內經曰子能令母實母能令子虛此之謂也妻來乘夫為微邪夫來乘妻為賊邪法當泄鬼補本臟本臟自病為正邪法當虛則補之實則泄之內經曰滋苖者必固其根伐下者必固其上逆其根則伐其本伐其本則敗其真矣心主熱自病或大熱㵼心湯主之實則煩熱黃連㵼心湯主之虛則驚悸生犀散主之肺乘心微邪喘而壯熱㵼白散肝乘心虛邪風熱煎大羌活湯下大青龍丸脾乘心實邪泄㵼身熱㵼黃散腎乘心賊邪恐悸惡寒安神丸肺主燥自病喘嗽燥則潤之實則喘而氣盛㵼白散主之虛則喘而少氣先益黃散而後阿膠散心乘肺賊邪熱而喘嗽先地黃丸中𨗳赤散後阿膠散肝乘肺微邪惡風眩冒昏憒嗽羌活膏腎乘肺實邪增寒嗽清利百部丸脾乘肺虛邪體重吐疾泄㵼嗽人參白术散肝生風自病則風搐拘急肝苦急急食甘以緩之佐以酸苦以辛散之實則風搐力大㵼青丸虛則風搐力少地黃丸心乘肝實邪壯熱而搐利驚丸涼驚丸主之肺乘肝賊邪氣盛則引伸呵欠微搐法當㵼肺先補本臟補肝地黃丸主之㵼肺㵼白散主之脾乘肝微邪多睡體重搐先當定驚搐㵼青丸主之搐止再見後證則别法治之腎乘肝虛邪增寒呵欠搐羌活膏脾主濕自病則泄㵼多睡體重昏倦脾苦濕急食苦以燥之實則泄赤黃睡不露睛㵼黃散虛則泄白色睡露睛白术散肝乘脾賊邪風㵼而嘔茯苓半夏湯主之心乘脾虛邪壯熱體重而㵼羌活黃芩蒼术甘草湯主之肺乘脾實邪能實不大便而嘔嗽煎檳榔大黃湯下葶藶丸腎乘脾微邪惡寒泄理中丸之類腎主寒自病則足脛冷而逆人之五臟惟腎無實小兒瘡疹變黑陷則是腎實水尅心火是以水能制火也心乘腎微邪內熱不惡寒桂枝丸肺乘腎虛邪喘嗽皮澀寒百部丸肝乘腎實邪拘急氣搐身寒理中丸脾乘腎賊邪體重泄㵼身寒理中丸本臟虛弱是自己正令不行乃鬼賊之所尅害當補本臟之正氣假令肺病喘嗽時于初春見之法當補腎虛見於夏救肺見于秋㵼肺見於冬補心㵼本臟乃名寒嗽大抵五臟各至本位即氣盛不可更補逢所尅位不可更㵼外感風寒小兒外傷於風拘急呵欠頓悶皮毛澀口中氣熱當發散秋冬用溫熱藥春夏用涼寒藥若大熱飲水能食不大便用大黃丸作散子服之入身表無大熱而小便不利是為有濕熱結膀胱仍用勝濕藥白术茯苓之類利小便則其熱自退如清便自調慎不可妄下恐外熱逐於內而變結胸危證多矣肝熱肝主謀勇熱則尋衣稔物㵼青丸肺熱肺主氣燥熱則壯熱飲水喘悶鼻乾燥手捫眉面㵼白散肺證復有風冷胸滿短氣氣急喘嗽上氣皆是肺氣有餘復感風邪之所傷謂之微邪先㵼肺㵼白散而復發散大青膏肺臟虛怯唇乃肺所主紅則肺虛熱少服㵼白散色白者肺虛怯也可補之阿膠散若唇白無澤者難治心熱是積在心經內心自主熱合面而睡有就涼之意口中氣溫上竄搖頭咬牙皆心熱也𨗳赤散主之心實則上下氣澀喜仰卧氣得上下通也㵼心湯主之溫中丸亦妙腎氣不足下竄者是也兩足熱不喜衣服臍以下皆腎之所主緣心氣下行於腎部也此乃腎不足而心有餘宜地黃丸肝勝肺肝病身熱發搐又見肺虛喘而氣短病見於申酉戌時是肝真強也內經云受所制而不能制謂之真強法當補脾肺而後㵼肝𨗳赤散㵼青丸肺勝肝肺病喘嗽氣盛見於寅卯辰時木之位又以見肝怯弱少力正謂鬼賊所尅法當補肝㵼肺病喘久虛羸無實不得㵼肺只宜用地黃丸補之不可用㵼白散何謂也經云虛則補之實則㵼之肝風目連劄目直是不能轉視或極則身反強折直皆風熱也㵼青丸𨗳赤散地黃丸主之目者肝之竅屬木木性急故如是也當補腎㵼心發搐相勝男為木左視木位右視金位相擊則有聲男反右視女反左視亦皆有聲早辰發搐潮熱於寅卯辰木之位是肝旺也當補腎水以制心火㵼肝以止其搐日午發搐己午未火之位而發潮搐者心熱也𨗳赤散涼驚丸日晚發搐肺之位而肝強法當補脾恐被木之賊所尅害先㵼心肝以挫其強勢㵼心𨗳散㵼肝散㵼青丸而後補脾益黃散夜間發搐因傷風而得之口中氣熱呵欠頓悶項急強手足搖如此者同大人傷風寒疾病之類當辨有汗無汗隂陽二證用大青膏小續命之類開發則愈小續命湯方當用仲景方中者是也非局方也傷食發搐謂不因他病忽然而發搐此因飲食過度致損脾胃故見多睡或吐不思飲食脾胃既虛引肝風則發搐當先定其搐加羌活防風煎下㵼青丸後用白餅子下其食漸漸用調中丸異功散飬其氣急驚陽證也俱腑受病爾小兒客疾熱於心膈是少陽相火旺經云熱則生風因聞大聲而作蓋謂東方震卦得火氣而發搐火本不動得風而動當用利驚丸𨗳赤散㵼青丸地黃丸主之搐止服安神丸慢驚隂證也俱臟受病爾蓋小兒吐㵼病久脾胃虛損若不久治則成慢風名曰瘈瘲似搐而不搐也因脾胃虛損故大便不聚當去脾間風先以宣風散𨗳之後用史君子丸益廣散則其利自止既以失治則脾肺俱虛致被肝木所乘是為慢驚也當用溫補羌活膏論瘡疹素問云諸痛癢瘡皆屬於心火㿀瘡者相行君命三焦真陽之氣所作也若陽氣入於肺則變膿胞入於肝則成水㿀自病為㿀也心之君火入於脾作癮疹謂肺主皮毛君火不害肺金此乃君之德也辨傷風與㿀疹凡傷風則皮澀拘急鼻塞㿀疹則睡中發驚悸呵欠嚏噴是為可識也瘡疹輕重候凡未出而發者是謂感風寒之邪內發心熱之所作也當用茶粉下解毒湯犀角地黃湯主之一發便密如針頭形勢重者合輕其表而涼其內連翹升麻湯若㿀已發密重微喘飲水者有熱證用去風藥微下之若出不快清便自調知其在表不在裏當微發用升麻葛根湯下宣風散若身表大熱者表證未罷不可下若青乾黑陷身不大熱大小便澀則是熱在內煎大黃湯下宣風散若㿀疹已出見小熱小便不利當利小便已發後有餘毒未散復有身熱瘡腫之類當用茶粉下解毒丸瘡疹已出後有聲音者乃形病氣不病也若瘡疹出而聲音不出者是形氣俱病也當清其肺氣當用八風湯并涼膈散去硝大黃亦可吐㵼脾胃病夏月心火用事治吐㵼不可用溫暖藥秋用溫藥秋深用暖藥更有臟兼見證如有風㵼防風羌活有熱㵼黃芩大黃有寒㵼附子有溫㵼白术茯苓有肺㵼芍藥桂定喘荆芥人參如甚加檳榔木香大便不通則加大黃更詳看病新舊新則止之久則有傷風之患宜推陳致新法當宣風散𨗳過以用藏君臣藥調之益黃散凡大㵼引飲者其病不以新久皆宜服白术散痢病亦可同身熱吐㵼咳嗽是風木入於脾母虛其子亦弱法當煎檳榔豆䓻湯大青膏後服益黃散身熱吐㵼大渴小便必少是熱膀胱亡失此為大逆是隂陽相乘也五芩散主之身涼吐㵼不渴則知為寒㵼當補之煎附子桂枝湯下大青膏隂陽相乘肝入胃故發熱而嘔當服白术散後煎檳榔木香湯下大青膏腹脹虛實凡久病吐㵼之後虛則其脈微細肺主目胞及腮脾主四肢若色淡黃目胞腮虛腫手足冷先服塌氣丸後服異功散和中丸四君子湯益黃散之類諸溫藥以養其氣實則脈洪實不因吐㵼久病之後亦不自利不腹脹而喘急悶亂更有痰有熱及有宿食不化而腹脹宜服白餅子大黃丸解毒丸下之兼須詳認大小便不通先利小便後利大便傷寒表裏攻發有表證者惡風惡寒當發表如氣盛能食不大便無表證可攻裏春主生屬木身溫當發汗夏主長屬火身熱而煩躁合大發散長夏主化屬土及居四季同當調其飲食秋主收屬金身涼內溫合微下冬十二臟屬水身大寒內熱合大下口溫熱而惡風寒是熱在外而寒在內身涼寒而惡熱是熱在內而寒在外惡風者白术湯惡寒者神术湯能食便結無表可攻裏通膈丸春身溫可汗神术湯夏身熱煩躁可發散神术加黃芩湯長夏四季同調飲食四君子湯秋身涼內溫微下通膈丸金花丸冬身大寒內熱合大下宜調胃承氣湯熱在外寒在內調中湯丸熱在內寒在外三黃湯後有潔古老人法右是依四時隂陽升降順剛柔而施治氣升則順發之氣收藏則下之有汗發熱惡風脈浮緩者風傷衛桂枝湯無汗發熱惡風脈浮緊無汗惡風脈浮緩謂之榮衛俱傷青龍湯桂枝麻黃各半湯無汗發熱不惡風寒脈沉洪者可下之更詳其厥與不厥量寒熱淺深而治之有汗四肢厥脈沉微名隂厥四逆湯無汗四肢厥脈沉滑者名陽厥大承氣湯加膩粉如四肢不厥身熱內外皆陽不動涼藥三服下之黃芩甘草湯連翹飲子黃芩芍藥湯小柴胡湯黃芩梔子湯涼膈散黃芩白术散八正散黃芩蒼术湯白虎湯之後忽然而作二者因久病或取轉過度致脾虛引飲白术散三者因患溫熱病熱結膀胱小便不利大渴引飲有表裏證者五苓散亡失津液脾胃病若病後久虛亡水者是飲食不能榮養致脾胃久虛亡失津液合榮養胃氣白术散或初病大小便澀亡津液飲水者是為陽合用勝濕利小便藥五癎如有客疾發熱而有聲煎大黃朗春湯下五色丸熱為心之所主潮熱有特積也桃枝丸主之吐熱不退當用地骨皮散五色丸白虎湯蒼术防風熱風當用防風黃芩湯下大青膏溫風下熱當用白虎湯加蒼术伍色丸黃病陽黃則大便赤澀身熱是脾土與心火相摶故為陽病法當先利小便後下大便隂黃則清便自利面目及身黃四肢冷是脾虛不能制腎水當用益黃散下史君子丸凡治黃病脹當用茵陳蒿湯調下五苓散先利小便去大黃利大便則加大黃之類有陽證者可服謂面赤飲水者是也黃病血氣不足疸病一身盡黃大小便澀煎茵陳蒿湯調下五苓散病後微黃者胃熱也㵼黃散淡黃白者胃不和也平胃微調丸渴者人參白术散諸疳證疳者小兒病癖或久吐㵼醫者妄投轉過之藥小兒易為虛實致之胃虛小兒失津液內發虛熱外消肌肉一臟虛則諸臟皆弱其病目胞腫腹脹痢色無常漸加瘦瘁久不痊可是腸胃有風積法當用宣風散導之後各依本臟補其母脾內疳益黃散肺脾疳阿膠散心血疳安神丸肝筋疳地黃丸腎骨疳亦宜地黃丸大抵小兒疳病肌瘦血氣不足同大人癆瘵之疾乳食不消初起忽然氣出冷四肢亦冷面目色白無光澤精神不定此乃胃氣不和可以大溫藥治之史君子丸益黃散若病泄㵼日久不差乳食不化是脾胃有風合先服益黃散二服後用宣風散𨗳之宜再補胃咳嗽肺之生病而成嗽大抵秋冬病則實春夏病則虛更詳五臟兼見之證以辨虛實若實則面赤飲水身熱痰涎盛涕唾稠粘咽乾不利喘而面腫吐食皆當先補脾後㵼肝益黃散大青膏若咯膿血是肺痿也用清肺藥治之若虛則面白脫色氣少不語喉中有聲唾痰清利法當用阿膠散補之若亡津液用白术散目內有五色五色甚者㵼本臟色淡淺者宜補之澤不常者死黑是閉合發散抵當湯白是寒小便清四逆湯黃赤是熱用承氣湯㵼本臟青是腹痛捻頭散主之桂枝芍藥五臟標本肝在天為氣在地為木在人為肝在時為春腎水為母心火為子克脾土主筋主臟魂其聲呼其液泣其味酸上應眼外應爪甲其色青青欲如蒼玉之澤不欲如藍肝主風風喜疏暢鬱則傷肝病主驚風怒氣逆則傷肝氣痘主水疱燥氣盛則病面白為逆金邪克木也肝病面青筋急多怒目痛目閉不欲見人臍左動風肝實目赤多怒頭弦痛引兩脅小腹之下肝虛目昏胸痛筋縮拘拳恐懼如人將捕肝絶唇吻反青四肢多汗平脈春王七十二日春則弦緩而長春弦者端直之狀細弱而長賊脈浮澀為短金克木也危脈弦如張弓弦心在天為熱在地為火在人為心在時為夏肝木為母脾土為子克肺金主血主藏神其聲言其液汗其味苦上應舌外應掌其色赤赤欲如帛裹朱不欲如赭心主熱熱則傷心病主驚熱憂愁思慮則傷心押痘主紅班寒氣勝則病面黑為逆水克火也心病面赤喜笑心掌熱口乾開妄語臍上動氣心熱口乾喜笑身熱汗血筋脅膺背痛滿心虛恍惚多驚憂煩少色咳唾舌強腰背酸疼心絶搖頭直視形如煙薰平脈夏王七十二日夏則洪緩夏洪者大而散來疾去遲賊脈沉澀而微水克火也危脈鈎如操帶鈎脾在天為濕在地為土在人為脾在時為四季心火為母肺金為子克腎水主肌肉藏意智其聲歌其液涎其味甘上應口外應四肢其色黃黃欲如羅裹雄黃不欲如黃土脾主濕濕則傷脾病主乳食飢飽則傷脾痘主濕濕風氣勝則病面青為逆木克土也脾病面黃善思善嗜體重節疼四肢不收怠惰脾實肢體重著而不舉腹脹尿祕而苦肌脾虛吐逆泄痢乳食不消腹脹腸鳴四肢無力脾絶臍突唇反環口黧黑柔汗發黃平脈四季之月各王十八日土之脈溫厚氣行臟腑之間平和不得見其衰則見焉賊脈弦長而緊木克土也危脈狀如雞雀啄止而復來肺在天為燥在地為金在人為肺在時為秋脾土為母腎水為子克肝木主氣主藏魄其聲哭其液涕其味辛上應鼻外應皮毛其色白欲如白玉光澤不欲如堊肺主燥燥則傷肺其病嗽形寒體冷則傷肺痘主膿疱熱氣勝則病面赤為逆火邪乘金也肺病面白悲愁嚏哭吐衄喘咳寒熱脅有動氣肺虛哹吸少氣鼻涕嗌乾喘而咳血肺實喘促咳嗽上氣鼻塞脛股肩疼胸滿肺絶汗出髮潤喘而不休毛焦氣出平脈秋王七十二日秋則脈浮秋毛者稀軟之狀輕虛以浮賊脈浮大而牢火克金也危脈毛如風吹毛腎在天為寒在地為水在人為腎在時為冬肺金為母肝木為子克心火主骨主藏精與志其聲呻其液唾其味酸上應耳下應腰腎其色黑欲如漆重澤不欲如炭腎主寒寒則傷腎其病症淫欲則傷腎痘主黑陷濕氣勝則病面大黃為逆土邪乘水也腎病面黑恐欠足寒逆氣腹痛飱泄後重臍下動風腎實腹膨體重少氣不言骨痛飱泄小便少腎虛心懸如飢膚痛引脊厥逆溲多耳鳴腎絶反目直視狂言遺尿腰折骨枯平脈冬王七十二日冬則沉濡而滑舉指來疾賊脈緩而大土克水也危脈石如奪索去如彈石普濟方卷三百五十八
