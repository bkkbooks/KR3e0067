body:
  text: 普濟方卷二百二十七明周王朱橚撰虛勞門虛勞附論虛勞者五勞六極七傷是也五勞者一曰志勞二曰思勞三曰心勞四曰憂勞五曰瘦勞又有五勞肺勞者短氣而靣腫鼻不聞香臭肝勞者靣目乾黑口苦精神不守恐畏不能獨卧目視不明心勞者忽忽喜忘大便苦難或時鴨溏口內生瘡脾勞者舌本苦直不得咽唾腎勞者背難以俯仰小便不利色赤黃尿有餘瀝莖內痛隂濕囊生瘡小腹急滿也六極者一曰氣極令人內虛五臟不足邪氣多正氣少不欲言二曰血極令人無顔色眉髮墮落忽忽喜忘三曰筋極令人數轉筋十指爪甲皆痛苦倦不能久立四曰骨極令人痠削齒苦痛手足煩疼不可以立不欲行動五曰肌極令人羸瘦無潤澤飲食不生肌膚六曰精極令人少氣吸吸然內虛五臟氣不足髮毛落悲傷喜忘七傷者一曰隂寒二曰隂痿三曰裏急四曰精自出五曰精少隂下濕六曰精液清七曰小便苦數臨事不舉又一曰大飽傷脾脾傷喜噫欲卧靣黃二曰大怒氣逆傷肝肝傷少血目暗三曰疆力舉重久坐濕地傷腎腎傷少精腰背痛厥逆下冷四曰形寒寒飲傷肺肺傷少氣咳嗽鼻鳴五曰憂愁思慮傷心心傷若驚乍喜乍怒六曰風雨寒暑傷形形傷髮落肌膚枯稿七曰大恐懼不節傷志恍惚不樂男子婦人脈大為勞極虛亦勞男子勞之為病其脈浮大手足煩躁春夏劇秋冬差隂寒精自出痠疼診寸口脈浮而遲浮即為虛遲即為勞遲即衛氣不足浮即榮氣竭脈直上者逆虛也脈澀無陽是腎氣少寸關澀無血氣逆泠是大虛脈浮微緩而大者勞也脈微濡相薄為五勞微弱相薄虛損為七傷詩曰脈來浮大或弦數此脈為勞須早覺浮大沉緩尚堪醫血氣未耗人未弱雙弦肝木已侵脾加數則殆休進藥症勞大率生寒熱榮衛不和津液竭火炎於上痰嗽生汗出上氣時咯血水流於下毛髮焦夢漏遺精并滑泄小便滑數赤白濁腳弱無力困􅒒􅒒虛勞變證百千般大槩病源如上説法當先養胃調脾鎮安氣海仍依節次當滋腎育心神治病須知有妙訣醫經載五勞六極之症非傳尸骨蒸之比多內不能生施於過用逆於隂陽傷於榮衛遂成五勞六極之病焉蓋勞力謀慮成肝勞應乎筋極曲運補機成心勞應乎脈極意外過慮成脾勞應乎內極遇事而憂成肺勞應乎氣極房事不節成腎勞應乎骨極此五勞應乎五極者也蒙莊有言精大用則竭神大勞則憊借是可以論病矣夫人所以根本此性命者氣與血也終日役役神倦力疲縱欲恣情遂使五臟氣血俱虛此五勞之所從始也六極七傷類焉故心家虛則便濁汗多肝家虛則筋攣目眩腎家虛則腰痛泄精肺家虛則咳嗽關熱脾家虛則嘔吐不食日就羸黃前數證大抵心下引脅俱疼蓋滯血不消新血無以養之也治法大要潮熱者不可過用寒涼祕結者不可驟與踈泄嗽喘者不可妄施發散咯血者不可錯認以為熱但以滋養榮血為上調平臟氣次之其要又於養氣調血之中而增益也其或骨間有熱以至四肢緩弱不舉此名骨痿欲斯疾之有瘳也難矣雖然當歸地黃黃耆芍藥固養血之上藥也亦當以益胃消痰輩佐之蓋人以榖氣為本所謂精氣血氣由榖氣而生古人以五味五榖五藥養其病者不無先後於其間也當歸地黃滯膈引痰黃耆芍藥多則傷胃是可謂膠柱調瑟而劑量輕重之不審矣凡男子婦人所患證候皮膚發熱肌肉消瘦四肢倦怠兼有頭疼頰赤心忪唇乾口燥日脯漸熱夜有盜汗涕唾稠黏胸膈不利或時喘嗽五心煩熱睡卧不安飲食減少多思水漿經脈不通病名何病曰勞病論曰女子不月血滯之病也男子腎虛精不足也凡治此經降心火益腎水此之謂也可先用通解丸㵼三二行次服當歸飲子又用加減五苓散木香三稜丸人參黃耆散犀角散之類詳其虛實選而用之若咯膿咯血大小便血但亡血者不可宣吐勿服酸辛熱物薑附之類藥不可不戒慎也若犯諸下血之證者不可發汗不可溫補脾胃之藥若服之雖進飲食不生肌肉此病轉加危篤乃成虛勞之病也方五石黃耆丸療五勞七傷諸虛補益黃耆紫石英研赤石脂石硫黃研石斛白石脂白礬石煉研各二兩桂心四兩烏梅炮去皮煉鍾乳研芎藭防風各二兩茯苓三兩乾薑四兩棗一百枚當歸細辛各三兩人參肉蓯蓉附子炮乾地黃各二兩芍藥甘草炙各三兩白术二兩右草石各别搗篩棗蜜和丸如梧桐子大空腹酒下十丸日三漸加至三十丸忌海藻菘菜豬肉冷水桃李雀肉生蔥酢物蕪荑生菜長生聚寶丹出德生堂方治男子婦人諸虛百損五勞七傷腎臟寒膀胱怯冷心神恍惚元氣虛憊目昏耳聾唇焦口燥四肢倦怠百節酸疼面色黧黑腰腳沉重肌體羸瘦行步艱辛小腹堅硬下部濕癢兩脅脹滿手臂麻疼不能動夜夢遺精小便滑數白濁神思不定虛多汗陽事不舉及治諸種風氣手足不遂痰涎壅塞語音低事多健忘一切虛損常服壯筋骨補元陽真氣助脾去風邪厚腸胃安魂定魄耳聰目明進美飲食百病不生婦人諸病可除子嗣可必常以濟人功效不能盡述半兩錢七文醋煆炙自然銅二錢半醋煆七涎虎骨兩半酥炙龜板一箇大者酒浸炙當歸酒浸乳香另研桑螵蛸炒各一兩半牛膝淨酒浸沒藥叧研金剛骨炒蓯蓉酒浸龍骨煅檳榔訶子肉川烏炮各一兩木鱉子一兩半去油殼叧研川棟子一兩半皮核去葫蘆巴酒浸白膠香另研人參白附子何首烏草烏青鹽炒木香五靈脂去土丁香各一兩地龍七錢半砂仁淨赤芍藥破故紙酒浸附子去皮臍熟地黃酒浸白芷天麻酒浸宣木瓜各一兩續斷骨碎補各一兩半巴戟酒浸去心烏藥朱砂另研各一兩安息香酒浸另熬兔絲子酒浸鹿茸五加皮酒浸酸棗仁酒浸炒沉香鹿角霜另研蘇合香油另與安息香一處入藥琥珀另研各一兩麝香二錢半真者後研白茯苓一兩七錢半去皮白茯神一兩七錢半去木右為細末入安息香蘇合油熬和前藥酒糊為丸如梧桐子大每服三十五丸五更溫酒下如覺麻乃是藥行不久即散更量虛實加減至五十丸亦妙婦人艾醋湯下天門冬大煎出千金方治男子五勞七傷八風十二痺傷中六極一氣極則令人內虛五臟不足邪氣常多正氣少多寒痺腹痛喘息驚恐頭痛二肺極則寒痺腰痛心下堅有積聚小便不利手足不仁三脈極則顔色苦青逆噫多恍惚失氣狀似悲泣之後苦舌強咽喉乾寒熱惡風不可動不嗜食若眩喜怒妄言四筋極則拘攣小腹堅脹心痛膝寒冷四肢骨節皆疼痛五骨極則肢節厥逆黃疸消渴癰疽妄發病重浮腫如水病狀六肉極則發疰如得擊不復言甚者至死復生衆醫所不能治此皆六極七傷所致非獨房室之為也憂患積思喜怒悲歡復隨風濕結氣咳時嘔吐食變大小便不利時泄利重下溺血上氣吐下乍寒乍熱卧不安席小便赤黃時時惡夢與死人共飲食入塜神室魂飛魄散筋極則傷肝傷肝則腰背相引難可俯仰氣極則傷肺傷肺則小便有血目不明髓極則隂痿不起入房不交骨極則傷腎傷腎則短氣不可久立隂疼惡寒甚者卵縮隂下生瘡濕癢手搔不欲住汁出此皆為腎病甚者或多遭風毒四肢頑痺手足浮腫名曰腳弱一名腳氣醫所不治此悉主之常服尤佳天門冬切三斗半壓取汁生地黃切三斗半壓取汁白蜜三升酥用三升煉枸杞根三斤淨洗以水二石五斗煮取一斗二升澄清鹿腦骨一具搗碎以水一石煮取五斗澄清已上並用大斗銅器中微火先煎天門冬地黃汁減半相合煎取大斗二斗下後件散藥煎取一斗內銅器重釜煎令稀稠可丸如梧桐子大平旦空腹酒服二十丸日二加至五十丸慎生冷醋滑豬雞魚蒜油麵等須擇四時王相日修合今具散藥方于後茯苓桂心白术萎㽔五加皮菖蒲逺志澤㵼薯蕷柏子仁人參石斛牛膝杜仲覆盆子細辛獨活枳實芎藭大豆黃卷黃耆蓯蓉續斷狗脊胡麻仁萆薢白芷橘皮茯神巴戟天石南各三兩阿膠十兩甘草六兩蜀椒薏苡仁一升大棗一百枚煮作膏鹿角膠五兩蔓荆子三兩右治下篩內煎中有牛髓鹿髓各加三升大佳小便澀去柏子仁加秦芁三兩乾地黃六兩隂痿失精去萎㽔加五味子二兩頭風去柏子仁加菊花防風各二兩小便利隂氣弱去細辛防風加山茱茰二兩腹中冷去防風加乾薑二兩無他疾依方修合丸此煎九月下旬抹藥立冬日合至五月上旬止若十二月臘日合者經夏至七月下旬止若停留經夏不壞當於屋後隂處入地深六尺填沙置藥中上加沙覆之則經夏不損也女人先患熱者得服患冷者勿服神化丸出千金方治五勞七傷氣不足隂下濕癢或生瘡小便有餘瀝失精自出小腹急繞臍痛膝重不能久立自視漠漠見風淚出脛酸精氣衰微卧不欲起手足厥冷調中利食蓯蓉牛膝薯蕷各六分續斷山茱茰大黃各五分逺志澤㵼天雄柏子仁兔絲子人參防風石斛栝蔞根杜仲黃連白术甘草礐石當歸各一兩桂心石南乾薑蛇床子赤石脂萆薢茯苓細辛菖蒲芎藭各三分右為末蜜丸如桐子酒服五丸日三加至二十丸石英煎出千金方治男子女人五勞七傷消枯羸瘦風虛痼冷少氣力無顔色不動作口苦咽燥眠中不安惡夢驚慣百病紫石英白石英各一斤碎如米以醇酒化開銅器中微火煎取三升以竹箆攪勿住手去沸澄清乾地黃一斤白蜜三斤酥桃仁各三升石斛五兩柏子仁逺志茯苓山茱茰人參麥門冬桂心乾薑五味子白术蓯蓉甘草天雄白芷細辛芎藭黃耆防風薯蕷各二兩右治下篩內煎中如不足加酒取足為限煎令可丸丸如梧子大酒服十丸日三稍加至四十丸無度無病者可單服煎令人肥白充實瑱骨丸出千金方治五勞七傷安五臟治萬病石斛人參當歸牡蒙石長生石韋白术逺志蓯蓉巴戟天紫苑茯苓乾薑天雄蛇床子牛膝牡蠣附子丹皮柏子仁甘草薯蕷阿膠乾地黃五味子各二兩蜀椒三兩右為末白蜜和丸如梧子大酒服三十丸日三腎瀝散出千金方治虛勞百病􅗑羊腎一具隂乾茯苓一兩半五味子甘草巴戟天乾薑細辛桂心石龍芮牛膝山茱茰防風各一兩乾地黃二兩人參五分鍾乳粉五分石斛五分兔絲子五分蓯蓉五分附子五分丹參五分右治下篩合鍾乳粉和攪更篩令勻以溫酒服方寸七稍加至二七日再鍾乳白澤丸出和劑方治丈夫諸虛百損五勞七傷真氣不足元藏不固神志俱耗筋力頓衰頭目眩暈耳內虛鳴心悶痛氣迎嘔吐痰嗽喘促胸膈脹悶脾泄下痢遺精便濁厥冷自汗脈微欲絶婦人血海虛冷崩漏不止赤白帶下經候不調臍腹時痛面無顔色飲食不進但是一切虛勞之疾並宜服之白檀香取末滴乳香叧研各一兩陽起石煅令通紅研附子炮去皮臍各一兩半鍾乳粉二兩麝香另研一錢右和勻滴水搜成劑分作六十丸每服一丸水一盞煎化及七分空心熱服如急病不拘時久服補益精血助陽消隂養心神定魂魄延年增夀起死回生溫酒鹽湯下大薯蕷丸療男子五勞七傷氣喘急內冷身重骨節疼腰背疆痛腹內羸瘦不得飲食婦人絶孕疝瘕諸病補虛益氣服薯蕷五分大黃六分前胡三分茯苓人參各三分杏仁三分炒去皮當歸七分桔梗防風各二分黃苓麥門冬各八分甘草五分炙加三分五味子四分乾地黃九分棗百枚芍藥石膏研阿膠炙乾薑桂心各四分澤㵼八分白术二分乾漆三分黃耆五分右搗篩蜜和丸如梧桐子大空腹以酒下三十丸日再忌豬肉冷水桃李雀肉海藻菘菜生蔥蕪荑等物服此藥能令人肥白肌膚光澤燒肝散御藥院方治五勞七傷三十六種風二十四般氣臍腹寒痛四肢沉困倦黃瘦久患諸藥不能治病皆救之黑附子一兩縮砂仁川芎青皮陳皮肉桂益智肉豆䓻紅豆山茵蔯柴胡去苗芍藥桔梗白术蒼术去皮炒逺志去心乾薑白芷良薑細辛蓬莪茂蕪荑蓽撥大椒已上各五錢右為末每服五錢豬羊腎四兩批開蔥白二枝細切摻藥蔥重重盡紙裹三五重文武火燒香熟空心熱喫白麵燒餅二箇壓米飲送次喫好酒三兩盞頻頻喫此藥多驗經進地仙丹和劑方治男子五勞七傷腎氣虛憊精神耗行步艱辛飲食無味眼昏耳焦面色黧黑皮膚枯燥女人血海虛冷月經不調臟寒少子下部穢惡又治痔瘻瘡腸風㵼血諸風諸氣及虛弱易感寒暑並皆療之人參黃耆各一兩半附子炮蓯蓉酒浸焙各四兩白术一兩川椒去目及合口者微炒出汗四兩川烏炮白茯苓甘草各一兩兔絲子酒浸覆盆子天南星湯洗薑汁製焙防風去蘆白附子何首烏牛膝去蘆酒浸一宿四兩狗脊去毛赤小豆骨碎補去毛烏藥羌活各二兩木鱉子三兩萆􅐺二兩地龍右為細末煮酒麵糊為丸如梧桐子大每服三十丸加至四十丸空心溫酒吞下陶隱居云是時有人母幼年得風氣疾後屢發攣結疼痺久不能起百治不差卧床五十餘年肌肉消盡僅存筋骨乃於隱士處得此方依方修合日進二服才至五十餘服是母病頓除髮白再黑齒落更生至八十歲顔色如二十歲人筋力倍壯耳聰目明時有老奴常偷服其藥嚴冬御絺葛履霜雪無寒色負荷倍重於常時行步如飛疑為鬼物所憑遂打殺埋於水傍沙中久復為怪而里俗且云凡奴婢死為怪但折其脛令不得動作遂掘出折其脛見其髓盡實如黃金色折其臂赤然靈效頗異隱居云此奴若不打殺成地仙也五補丸出千金方治腎虛氣損五勞七傷腰腳酸疼肢節苦痛目昏暗心中喜怒恍惚不定夜卧多夢覺則口乾食無味心常不樂多有恚怒心腹脹滿四體疼痺吐酸水小腹冷氣尿有餘瀝大便不利悉主之久服可延年四時勿絶一年萬病皆除之杜仲巴戟天各六分人參五加皮天雄牛膝防風逺志薯蕷狗脊各四分乾地黃蓯蓉各錢二分兔絲子茯苓覆盆子石龍芮各八分蛇床子石南白术各三分天門冬七分右為末蜜丸如梧桐子大酒服十丸日三有風去天雄五加皮石南茯苓白术加芎藭當歸黃茋獨活柏子仁各三分有氣加厚朴枳實橘皮各三分冷加乾薑桂心吳茱茰附子細辛蜀椒各三分泄精加韭子白龍骨牡蠣鹿茸各三分泄痢加赤石脂龍骨黃連烏梅肉各三分春依方服夏加地黃五分黃芩三分麥門冬四分冬則去此加乾薑桂心蜀椒各三分若不熱不寒亦不須增損直爾服之三劑以上即覺功效悉皆慎酢蒜鱠陳臭大冷醉吐自外百無所慎稍加至三十丸不得增常以此為度十華散出和劑方治丈夫五勞七傷渾身疼痛四肢拘急腰膝無力元氣虛不思飲食霍亂吐㵼四肢冷麻解二毒傷寒療腳氣流注腫痛行步不得及虛勞等患並治之五加皮陳皮去白乾薑炒甘草各六兩桔梗羌活黃茋肉桂去粗皮蒼术去皮以上各八兩八錢大川烏三兩附子六兩右為細末每服二錢水一盞薑二片棗一枚煎至六分不拘時候熱鹽酒調服亦得兔絲子丸醫方大成治腎氣虛損五勞七傷小腹拘急四肢酸疼靣色黧黑唇口乾燥目暗耳鳴心忪氣短夜夢驚恐精神困倦喜怒無常悲憂不樂飲食無味舉動乏力心腹脹滿腳膝痿緩小便滑數房室不舉股內濕癢水道澀痛小便出血時有遺瀝並宜服之久服填骨髓續絶傷補五臟去萬病明視聽益顔色輕身延年兔絲子淨洗酒浸鹿茸去毛酥炙石龍芮去土肉桂去粗皮附子炮去皮各一兩石斛去根熟地黃乾用白茯苓去皮牛膝酒浸一宿焙乾續斷山茱茰肉蓯蓉酒浸切焙防風去苗杜仲去粗皮各錢半蓽澄茄補骨脂去毛酒浸沉香巴戟去心茴香炒各三分五味子桑螵蛸酒浸芎藭覆盆子去枝葉蕚各五錢澤㵼一兩右為細末以酒煮麵糊為丸如梧桐子大每服二十丸溫酒或鹽湯下空心服如腳膝無力木瓜湯下曉食前再服又方用龍齒三分逺志五錢不用石龍芮肉蓯蓉澤㵼銼散出和劑方治男子婦人五勞七傷感冷胃寒氣虛弱面少力常服壯筋骨肢體輕健進食天仙藤青蒿子炒桑白皮炒香附子炒荆芥穗前胡柴胡桔梗麻黃去節根蒼术炒乾葛陳皮各十斤茴香炒秦艽川芎白芍藥藁本黃茋半夏為粗末薑汁炙羌活各二斤半甘草炒肉桂去粗皮白芷厚朴去皮酒薑汁炒各五斤右為粗末每服三錢水一盞半入生薑烏梅棗子煎至七分去滓溫服並二滓再煎服黃耆丸出聖惠方治男子五勞七傷風虛羸瘦腰膝疼隂盛陽虛身力衰殘夜夢遺泄久服令人五臟內實肌膚外充靣色紅光反老為童黃耆銼人參去蘆頭石斛去根銼桂心肉蓯蓉酒浸一宿銼去鱗皮炙乾鹿茸去毛塗酥炙令微黃兔絲子酒浸三日暴乾别搗為末陽起石酒煮三日細研水飛過熟乾地黃杜仲去粗皮炙微黃銼鍾乳粉白茯苓狗脊赤石脂細研萆薢銼山茱茰薯蕷附子炮裂去皮銼五味子蛇床子巴戟白术續斷澤㵼右各一兩搗羅為末入陽起石研令勻煉蜜和搗五七百杵如梧桐子大每日以空腹用溫酒下三十丸晚食前再服漸加至五十丸生地黃丸療五勞七傷六極八風十二痺消渴心下積聚使人身體潤服之多情性補益養精生地黃一錢二分石斛天門冬兔絲子酒浸二宿焙乾别搗麥門冬去心各一錢茯苓甘草炙人參大黃牛膝當歸杏仁去皮尖焙麻子仁各八分乾薑玄參地骨皮各六分白术芍藥紫苑防風肉蓯蓉各七分椒三分去目炒出汗右為末蜜和丸如梧桐子大空心酒下二十丸日再服漸加至三十丸忌鯉魚海藻菘菜桃李雀肉大酢等物石斛萬病散療五勞七傷大風緩急濕癢不仁或偏枯筋脈拘攣胸脅支滿引身強直或頸項腰背疼四肢酸煩隂痿臨事不起癢濕卧便盜汗心腹滿急小便中疼痛或時便血咽乾口燥飲食不消往來寒熱體羸瘦肌肉損減或無子若生男女才欲成人便死此極勞血氣心神不足所致藥悉主之令人康健多子牛膝逺志去心