陽起石白龍骨各七分右合搗篩以酒服方寸匕日三忌豬肉冷水鯉魚蕪荑等無比山藥丸出和劑方治丈夫諸虛百損五勞七傷頭痛目眩手足逆冷或煩熱有時或冷痺䐴疼腰臗不隨飲食雖多不生肌肉或少食四體脹滿無光澤陽氣衰絶陰氣不行此藥能補經脈起陰陽安魂魄開三焦破積聚厚腸胃強筋練骨輕身明目除風去冷無所不治方見本門虛勞羸瘦類雙補丸出醫方集成治一切虛損五勞七傷面色黧黑唇口乾燥發渴目暗耳鳴心忪氣短食少神倦夜夢驚恐四肢酸疼寒熱盜汗小腸拘急小便滑數婦人諸疾並宜服之常服既濟水火益氣安神鹿角霜三兩熟地黃洗再蒸沉香兔絲子酒浸蒸研焙覆盆子去枝蒂白茯苓去皮人參去蘆宣木瓜薏苡仁炒黃耆炙蓯蓉洗酒浸五味子去皮炒石斛去根炒當歸去蘆酒浸澤㵼切塊再蒸各一兩麝香一錢别研硃砂五錢别研為末為衣右細末煉蜜為丸梧子大每服五七十丸空心鹽湯下是齋方用熟地黃半斤補血兔絲子半斤補精細末酒糊丸人參湯下平補精血不燥不熱理下部弱腎水冷氣不順沉香湯下心氣虛茯苓湯下心氣煩躁不睡酸棗仁湯下腎氣動茴香湯下小便少車前子湯下小便多益智湯下黃耆益損湯出危氏方治男子婦人童男室女諸虛不足榮衛俱弱五勞七傷骨蒸潮熱腰背拘急百節酸疼夜多盜汗心常驚惕咽燥唇焦嗜卧少力肌膚瘦瘁咳嗽多痰咯唾血絲寒熱往來煩熱神昏全不用食服熱藥則煩躁衝滿上焦進涼藥則膈滿而腹痛宜服此藥最有神效兼治大病後榮衛不調婦人産後血氣未復人參去蘆石斛去根甘草黃耆去蘆木香白术當歸肉桂茯苓芍藥半夏川芎熟地黃九蒸酒炒山藥五味子牡丹皮麥門冬去心各等分右銼散每服三錢水一盞半生薑五片棗二枚小麥五十粒烏梅一枚煎空心食前服薯蕷丸療丈夫五勞七傷頭痛目眩手足逆冷或煩熱有時或冷痺骨疼腰臗不隨食雖多不生肌肉或少食而脹滿體澀無光澤陽氣衰絶隂氣不行此藥能補十二經脈起發隂陽通內製外安魂定魄開三焦破積聚厚腸胃消五臟廓氣除心內伏熱強筋壯骨輕身明目除風去冷乾薯蕷二兩蓯蓉四兩牛膝兔絲子酒漬杜仲赤石脂澤㵼乾地黃山茱萸茯苓巴戟天去心各二兩五味子一兩五錢石膏三兩研逺志一兩去心柏子仁二兩白馬莖筋一條炙右搗篩蜜和丸如梧桐子大以酒空腹服二十丸至三十丸日再忌大酢蕪荑蒜陳臭物三仁九子丸出千金方治五勞七傷補益酸棗仁柏子仁薏苡仁兔絲子菊花子枸杞子蛇床子五味子蕃閭子地膚子烏麻子牡荆子乾地黃薯蕷桂心蓯蓉各一兩右為末蜜丸如梧桐子大酒服二十丸日二夜一服一方有韭子覆盆子各一兩無牡荆子菊花子覆盆子丸出千金方治五勞七傷羸瘦補益覆盆子兔絲子各二分蓯蓉鹿茸巴戟天白龍骨茯苓天雄白石英五味子續斷薯蕷各一錢乾地黃八分蛇床子逺志六分乾薑六分右為末蜜丸如梧子大酒服十五丸日再漸漸加至三十丸慎性冷陳臭張文仲方無龍骨鹿茸天雄續斷石英有石斛白术桂心枸杞子人參柏子仁澤㵼各六分牛膝四分山茱萸五分赤石脂甘草各二分細辛四分大山芋丸出和劑方治諸虛百損五勞七傷肢體沉重骨節酸疼心中煩悸唇口乾燥面體少色情思不樂咳嗽喘乏傷血動氣夜多異夢盜汗失精腰背強痛臍腹弦急嗜卧少起喜驚多忘飲食減少肌肉瘦瘁又治風虛頭目眩暈心神不寧及病後氣不復常漸成勞損久服補諸不足愈風氣百疾又名薯蕷丸白术麥門冬去心白芍藥杏仁去皮尖麩炒黃防風去蘆芎藭各一兩五錢大豆黃卷炒熟乾地黃肉桂去粗皮麴炒當歸酒浸各二兩五錢桔梗白茯苓去皮柴胡各一兩二錢五分乾薑炮七錢五分甘草炙七兩大棗一百枚蒸熟去皮白斂五錢阿膠炒人參各一兩七錢五分山芋七兩五錢右為末煉蜜與蒸棗同和丸如彈子大每服一丸溫酒或米飲化下嚼服亦得食前常服養真氣益精補髓活血駐顔一方加琥珀一兩逺志去心炒二兩茯苓三兩五錢即是養心丹虛遺減白术加龍骨二兩四味丸治五勞七傷補益精髓熟乾地黃焙天門冬去心焙白茯苓去黑皮逺志去心各三兩右為末煉蜜和丸如梧子大每服三十丸溫酒下沉麝香茸丸出瑞竹堂方治五勞百損諸虛怯精元氣不固沉香二錢麝香一錢南木香三錢乳香三錢小茴香四錢炒八角茴香四錢炒鹿茸酥炙蓮肉各五錢炒茯苓炒蓯蓉兔絲子牛膝川棟子各五錢酒浸炒地龍去土淨陳皮去白各五錢仙靈脾三錢酥炙右依分兩製和為末糊入麝香為丸如桐子大每朝不見紅日面東用溫酒下三十丸忌食豬羊血豆粉之類五洛散主五勞六極七傷八不足裏急胸脅脹滿背痛頭眩四肢重腰脊強環臍腹痛小便或難或數劇者大便失血翕翕少氣手足煩熱卧不能卒起起行不能久立名內極或憂愁恐怖或飽食生肉飲酒入房自竭陽氣虛竭耳鳴烏烏甚則手足浮腫逆害飲食名曰內消大黃六分麥門冬白薇當歸乾地黃山茱萸桑螵蛸炙各七分栝蔞甘草炙茯苓各五分石斛九分六安者桂心鐡屑研厚朴炙各三分吳茱萸二分右各搗篩白蜜一斤棗膏一斤當蒸溫湯浸之和叟踈有切前藥令如乾飯狀藥悉成又别取牛膝五兩肉蓯蓉六兩附子三兩炮三物各搗下篩內諸藥和令相得以酒服之方寸七日三不知稍增之長肌肉補不足久服益氣力若少氣力加石斛消渴加栝蔞止痛結煩裏急加芍藥腹中痛下膿血加厚朴四兩炙四肢酸疼加當歸翕翕少氣加天門冬白薇一名五若散忌海藻菘菜生蔥蕪荑酢物鯉魚等鍾乳丸出聖惠方治五勞六極七傷腰疼膝痛小便餘瀝心虛健忘榮衛不調宜服鍾乳三兩石斛兔絲子酒浸一宿曝乾别搗為末各二兩甘草炙微赤銼牛膝去苗蛇床子各一兩細辛山茱萸防風去蘆頭杜仲去粗皮炙微黃銼枳殼麩炒微黃去穰各三分五味子熟乾地黃各一兩川椒五錢去目及閉口微炒去汗右為末煉蜜和搗五七百杵如梧桐子大每服空心及晚食前溫酒下三十丸內補散出千金方治男子五勞六絶其心傷者善驚妄怒無常脾傷者令人腹滿言噫食即欲卧面目痿黃肺傷者令人少精腰背痛四肢厥逆其肝傷者令人少血面黑腎傷者有積聚小腹腰背痛痺咳唾小便難六絶為病皆起於火勞脈虛外受風邪內受寒熱令手足疼痛膝以下冷腹中雷鳴時時泄痢或閉或利面目腫心憤憤不欲語惡聞人聲乾地黃兔絲子山茱萸闕各五分逺志巴戟天各五錢麥門冬五味子甘草人參蓯蓉石斛桂心茯苓附子各一兩五錢右治下篩酒服方寸匕日三加至三七無所禁赤石脂丸出千金方治五勞七傷男子諸疾逺志栝蔞根赤石脂山茱萸各七分防風石韋各三分肉蓯蓉三分牛膝杜仲薯蕷各四分天雄柏子仁各五分蛇床子六分菖蒲續斷各三分右為末煉蜜棗膏和丸如梧桐子大空腹服五丸日三服十日知久服不老加兔絲子四分佳人參湯出千金方治男子五勞七傷胸中逆滿害食乏氣嘔逆兩脅脹小腹急痛宛轉欲死調中平臟絶傷人參當歸芍藥甘草生薑麥門冬白糖桂心各二兩前胡茯苓五味子蜀椒橘皮各一兩枳實半兩大棗十五枚右㕮咀流水一斗半除棗浸藥半日用三年陳蘆稍煎取四升內糖復上火煎令十數沸年二十以上六十以下一服一升二十以下六十以上一服七八合雖年盛而又羸者亦服七八合日三夜一不爾藥力不接則不能救病要用撈水陳蘆不則水強火盛猛則藥力不能出也黃耆丸出千金方療虛勞黃耆鹿茸茯苓烏頭乾薑各三分乾地黃當歸桂心芎藭各四分枸杞桑皮兔絲子五味子柏子仁白术各五分大棗二十枚右為末蜜丸如梧桐子大平旦酒服二十丸夜十丸以知為度人參五味子散治男子老稚諸虛百損氣血勞傷涎喘咳噥或嗽咯血寒熱往來夜有盜汗羸瘦困乏一切虛損人參五味子桔梗白术白茯苓甘草炙熟地黃當歸焙各五錢地骨皮前胡去苗桑白皮切炒枳殼去穰炒黃耆陳皮柴胡去苗各三分右為粗末每服三錢水一盞半生薑三片同煎至五分去滓溫服食後日三服煩渴加烏梅青蒿同煎咳膿血加知母阿膠同煎尤妙腎瀝湯療五勞六極八風十二痺補諸虛不足豬腎一箇去脂膜附子炮芎藭丹皮桂心人參當歸各四分茯苓桑螵蛸炙磁石研如粉牡荆子黃耆菖蒲各八分乾地黃六分右切以水一斗七升煮腎取一斗一升去腎內藥煎取四升分四服忌羊肉餳冷水酢生蔥蕪荑胡荽乾地黃丸出千金方治五勞七傷六極臟腑虛弱飲食不下顔色黧黯八風所傷益血氣進食資顔色長陽五味子四分阿膠棗肉各八分乾地黃茯苓天雄各七分蛇床子六分桂心麥門冬各五分逺志蓯蓉杜仲甘草各一錢右為末蜜丸如梧桐子大酒下二十丸日加至三十丸常服彌佳羊肝散治諸虛百損五勞七傷年深泄痢久作滑腸心腹痞悶塊癥疼痛硬下虛上熱口瘡燥渴一切隂盛陽虛之證縮砂仁白芍藥良薑切炒厚朴薑製橘皮胡椒各五錢破故紙丁香白术木香肉豆䓻吳茱萸湯洗七次焙官桂各三錢右為末羊肝三兩薄批開摻藥二錢五分鋪蔥絲一重捲定麻扎積火炙熟分三五次細嚼米飲下日均一劑食前普濟方卷二百二十七
