氣翕翕口乾失食麥門冬一兩半去心焙前胡一兩去蘆頭人參三分去蘆頭黃蓍一兩銼檳榔半兩茯神一兩右為散每服三錢以水一中盞入生薑半分小麥一百粒煎至六分去滓不計時候溫服黃芩散出聖惠方治虛勞煩熱不得睡卧黃芩二分知母羚羊角屑各一兩甘草半兩炙微赤銼白茯苓酸棗仁各一兩右為散每服四錢以水一中盞入棗三枚煎至六分去滓不計時候溫服麥門冬湯治虛勞煩燥夜不得眠少氣熻熻微熱口乾減食麥門冬去心焙前胡人參黃蓍銼炒各半兩右粗搗篩每服五錢以水一盞半入生薑半分拍碎小麥半合煎至八分去滓溫服不計時橘皮湯治虛勞晝夜不得眠短氣食飲不下或大病後虛熱痰冷陳橘皮去白一兩芎藭一分半半夏湯洗去滑炒半兩甘草炙銼一分右粗搗篩每服五錢以東流水一盞半入生薑半分拍碎生竹茹少許煎八分去滓溫服夜卧再煎服茯神湯治虛勞燥不得睡茯神去木人參各一兩酸棗仁炒去皮别研五兩右粗搗篩每服三錢以水一盞入生薑半分拍碎煎至七分去滓空服日二夜半夏湯治虛勞發煩不得眠半夏湯洗去滑七遍炒乾二兩白茯苓去黑皮四兩糯米炒黃一合右粗搗篩每服五錢以東流水一盞生薑半分拍碎煎至一盞去滓空腹溫服日二酸棗仁丸治虛勞煩熱不得睡卧酸棗仁微炒榆葉麥門冬去心焙各二兩右為末煉蜜和搗百餘杵丸如梧桐子大每服不計時候以糯米粥飲下三十丸酸棗仁丸治虛勞煩悶不得睡卧酸棗仁炒地榆葉各半兩右為末煉蜜和丸如梧桐子大每服三十丸糯米飲下治虛勞煩悶不得眠睡方右用酸棗仁不拘多少炒令香熟搗羅為散每服三錢用河水一盞煎至六分熱呷治卒連時不得眠方右暮以新布火炙以尉目并蒸大豆一斗更畨囊貯枕中冷後更易熱終夜常枕熱豆即立愈也治虛勞少睡去熱腫右用乾龍葵菜煮作羮粥食之治虛勞煩悶不得眠右用大棗二七枚蔥白七莖水三升煮取一升去滓頓服又方右用乾薑四兩為末湯和頓服取汗病愈梔子湯治大下後虛勞不得眠劇者顛倒懊憹欲死方仲景云發汗吐下後虛煩不得眠苦劇者反覆顛倒心中懊憹梔子湯治之大梔子四十枚豉七合右二味以水四升先煮梔子取二升半內豉更煮三沸去滓每服一升安者勿更若上氣嘔逆加橘皮二兩亦可加生薑二兩虛勞心腹痛附論夫虛勞之人氣弱胃虛飲食傷動冷氣乘之邪正相干則腹痛不已上干心絡故令心腹俱痛也方牛膝湯治虛勞邪氣攻擊心腹刺痛牛膝酒浸切焙柴胡去苖荆芥穗桔梗炒陳橘皮湯浸去白焙青橘皮湯浸去白焙各一兩人參肉蓯蓉酒浸切焙秦艽去苖土知母焙各一兩烏梅十五枚去核甘草炙三分黃連去鬚三分烏頭麩炒製安土上用盞蓋出火毒去皮臍尖三枚敗龜以醋一碗塗浸炙用一兩白茯苓去黑皮半兩右料㕮咀每服三錢水一盞入肥棗一枚擘煎至六分去滓溫服金花散治虛勞心腹疼痛泄㵼腸鳴面黃肌瘦脅肋脹滿不思飲食半夏湯洗七遍切焙烏頭炮製去皮臍木香各一兩鬱金用漿水生薑皂莢三味煮透令軟切作片子焙乾麩炒一兩馬藺花一兩酒浸焙胡椒楝實取肉炒當歸生切荆三稜蓬莪茂二味椎碎用巴豆半兩去殼同炒褐色為度不用巴豆大腹皮濕紙煨過蕪荑炒白术黃連去鬚炒各半兩右為散每服三錢用羯羊肝一具去筋膜批作片子勻滲藥末在內更入鹽三錢乾薑末二錢蕪荑末二錢匕蔥白一寸細切攪拌勻和白麵作肝角子慢火燒令香熟空心喫溫米飲下肉豆蔲丸治虛勞心腹脹滿刺痛食不消肉豆蔲去殼木香各一兩丁香各一兩當歸各半兩荆三稜炮銼神麴搗碎微炒各一兩陳橘皮半兩湯浸去白瓤焙桃仁二兩湯浸去皮尖雙仁麩炒微黃安息香半兩麝香一分麥蘖一兩炒微黃右為末煉蜜和搗五七百杵丸如梧桐子大每服食前以熱酒下十五丸蘹香子散治虛勞心腹撮疼胸膈痞滿和氣進食蘹香子炒附子炮製去皮臍桂去粗皮木香蜀椒去目并閉口微炒出汗胡椒陳橘皮湯浸去白焙乾薑炮各半兩荆三稜煨銼一兩巴戟天去心半兩右為散每服二錢用獖豬腎一對去筋膜切作薄片子入藥末蔥絲少許鹽半錢濕紙裹煨熟食以酒或粥飲壓之須臾覺臍下暖甚妙丁香散治虛勞冷氣攻心腹疼痛丁香半兩當歸赤芍藥各三分厚朴一兩半去粗皮塗生薑汁炙令香熟青橘皮一兩湯浸去白瓤焙木香桂心各三分人參半兩去蘆頭桃仁三分湯浸去皮尖雙仁麩炒微黃川椒一分去目及閉口者炒出汗右為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服附魏丸治虛勞心腹或臍下疼痛兼暖脾腎順氣思食阿魏半兩細研用白麵一兩拌搜作餅子􅏼令黃焦木香補骨脂微炒各二兩青橘皮一兩湯浸去白瓤焙乾薑炮製銼檳榔蘹香子微炒肉桂去皴皮吳茱茰湯浸七遍焙乾微炒附子炮製去皮臍各二兩右為末煉蜜和搗三五百杵丸如梧桐子大每服食前以熱酒下十五丸生薑湯下亦得茱茰豬肚丸治虛勞心腹撮痛肌體羸瘦吳茱茰湯浸焙炒一兩半食茱茰山茱茰各一兩附子炮裂去皮臍乾薑硫黃研陳橘皮湯浸去白焙各半兩青橘皮湯浸去白焙禹餘糧炭火煨赤各一兩右為末以生豬肚一枚先將藥末用醋攪和令勻入在豬肚內縫合用水一斗以文武火煮爛炒盆內一處研令得所丸如梧桐子大每服二十丸空心食前鹽湯下溫酒亦可碙砂附子丸治虛勞冷氣攻擊心腹撮痛腰膝重疼碙砂研一錢檳榔一枚木香一分乾蠍炒一錢附子炮製去皮臍沉香蘹香子炒桃仁去皮尖雙仁慢火炒自然銅火煆醋淬七遍各半兩右為末醋煮麵糊為丸如梧桐子大每服十五丸生薑熱酒下食前服蘹香子丸治虛勞元臟氣冷心腹疞痛蘹香子炒胡椒附子炮製去皮臍青橘皮湯浸去白焙阿魏麵和作餅子炙熟硫黃研菖蒲牛膝酒浸切焙五味子等分右為末麵糊為丸如梧桐子大每服十五丸空心溫酒下鱉甲散治虛勞肩背疼悶心腹脹痛腸胃虛鳴臍下拘急鱉甲塗酸炙令微黃去裙襴柴胡去苖各一兩半荆三稜一兩炮銼當歸一兩半赤芍藥人參去蘆頭白术各一兩陳橘皮三分湯浸去白瓤焙大腹皮半兩右為散每服三錢以水一中盞入生薑半分煎至六分去滓食前稍熱服芎藭散治虛勞肩背及心腹疼痛四肢不和腹胃脹滿芎藭一兩柴胡去苖一兩半桂心赤芍藥一兩白术一兩大腹皮三分桃仁二十枚湯浸去皮尖雙仁麩炒微黃陳橘皮三分湯浸去白穰焙木香三分右為散每服三錢以水一中盞入薑半分煎至六分去滓不計時候稍熱服木香散治虛勞心腹痛胃氣不和腹脅脹滿木香芎藭枳殼麩炒微黃去瓤桂心桃仁湯浸去皮尖雙仁麩炒微黃陳橘皮湯浸去白瓤焙赤芍藥人參去蘆頭檳榔各一兩右為散每服三錢以水一中盞入生薑半分煎至六分去滓食前稍熱服補骨脂散治虛勞心腹疼痛補骨脂炒半兩牛膝酒浸切焙半兩沒藥研半兩乾薑炮陽起石研蘹香子炒白茯苓去黑皮山芋各一兩右為散每服一錢溫酒調沉香散治虛勞心腹痛小腹悶滯沉香一兩半附子炮製去皮臍檳榔肉桂去粗皮當歸丁香各半兩陳橘皮湯浸去白穰焙蘹香子各一兩右為散每服食前以熱酒調下二錢楝實丸治虛勞心腹撮痛不思飲食補益元臟調和脾胃楝實炒白术各一兩烏藥銼蘹香子微炒補骨脂水淘去浮者微炒木香各半兩厚朴去粗皮用生薑汁炙一兩右為末酒煮麵糊和丸如梧桐子大每服二十丸空心食前溫酒或鹽湯下日三服補骨脂丸治虛勞心腹撮痛補骨脂炒楝實麩炒去核各一兩髙良薑微炒一兩半巴戟天去心一兩葫蘆巴半兩蘹香子麩炒一兩右為末酒煮麵糊為丸如梧桐子大每服二十九丸酒下鹽湯下亦得前服芍藥湯療虛勞腹中痛夢失精四肢疼痠手足煩熱咽乾口燥并婦人少腹痛芍藥桂心甘草炙各三兩生薑四兩大棗十二枚擘飴糖右切以水九升煮取三升去滓下糖分服七合日三夜一忌海藻菘菜生蔥黃蓍建中湯療虛勞短氣少腹急痛五臟不足方見本門虛勞裏急類治虛勞心腹或臍下痛疼兼暖脾腎順氣思食出聖惠方乾漆一兩搗碎炒令煙出荆三稜一兩炮銼蓬莪茂半兩煨青橘皮三分湯浸去白穰桃仁湯浸去皮尖雙仁麩炒微黃桂心各一兩右為散每服食前以熱酒調下一錢桂附丸治虛勞下元久冷心腹疼痛不思飲食桂去粗皮一兩乾薑炮半兩蘹香子炒二兩附子炮製去皮臍一兩硫黃研半兩右為末麵糊為丸如梧桐子大每服二十九丸空心鹽湯下治虛勞心腹或臍下疼痛兼暖脾腎順氣思食出聖惠方青橘皮一兩湯浸去白瓤焙桂心一兩木香一兩桃仁湯浸去皮尖雙仁麩炒微黃一兩右為散每服食前以熱酒調下一錢艾葉煎丸治冷勞心腹疼痛或時泄下痢兼治婦人下經冷病帶下方見本門虛勞兼痢類白芷散治虛勞元臟虛冷心腹疼痛精神倦怠白芷炒半兩巴戟天去心一兩髙良薑一錢右為散每服一錢豬腎一對去筋膜入藥末煨熟細嚼溫酒下普濟方卷二百三十三
