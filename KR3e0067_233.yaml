氣翕翕口乾失食麥門冬一兩半去心焙前胡一兩去蘆頭人参三分去蘆頭黄蓍一兩剉㯽榔半兩茯神一兩右為散毎服三錢以水一中盞入生薑半分小麥一百粒煎至六分去滓不計時候温服黄芩散出聖恵方治虚勞煩熱不得睡卧黄芩二分知母羚羊角屑各一兩甘草半兩炙㣲赤剉白茯苓酸棗仁各一兩右為散毎服四錢以水一中盞入棗三枚煎至六分去滓不計時候温服麥門冬湯治虚勞煩燥夜不得眠少氣熻熻微熱口乾减食麥門冬去心焙前胡人参黄蓍剉炒各半兩右麄搗篩毎服五錢以水一盞半入生薑半分拍碎小麥半合煎至八分去滓温服不計時橘皮湯治虚勞晝夜不得眠短氣食飲不下或大病後虚熱痰冷陳橘皮去白一兩芎藭一分半半夏湯洗去滑炒半兩甘草炙剉一分右麄搗篩毎服五錢以東流水一盞半入生薑半分拍碎生竹茹少許煎八分去滓温服夜卧再煎服茯神湯治虚勞燥不得睡茯神去木人参各一兩酸棗仁炒去皮别研五兩右麄搗篩毎服三錢以水一盞入生薑半分拍碎煎至七分去滓空服日二夜半夏湯治虚勞發煩不得眠半夏湯洗去滑七遍炒乾二兩白茯苓去黒皮四兩糯米炒黄一合右麄搗篩毎服五錢以東流水一盞生薑半分拍碎煎至一盞去滓空腹温服日二酸棗仁丸治虚勞煩熱不得睡卧酸棗仁㣲炒榆葉麥門冬去心焙各二兩右為末煉蜜和搗百餘杵丸如梧桐子大毎服不計時候以糯米粥飲下三十丸酸棗仁丸治虚勞煩悶不得睡卧酸棗仁炒地榆葉各半兩右為末煉蜜和丸如梧桐子大毎服三十丸糯米飲下治虚勞煩悶不得眠睡方右用酸棗仁不拘多少炒令香熟搗羅為散每服三錢用河水一盞煎至六分熱呷治卒連時不得眠方右暮以新布火炙以熨目并蒸大荳一斗更畨囊貯枕中冷後更易熱終夜常枕熱荳即立愈也治虚勞少睡去熱腫右用乾龍葵菜煮作羮粥食之治虚勞煩悶不得眠右用大棗二七枚葱白七莖水三升煮取一升去滓頓服又方右用乾薑四兩為末湯和頓服取汗病愈梔子湯治大下後虚勞不得眠劇者顛倒懊憹欲死方仲景云發汗吐下後虚煩不得眠苦劇者反覆顛倒心中懊憹梔子湯治之大梔子四十枚豉七合右二味以水四升先煮梔子取二升半内豉更煮三沸去滓毎服一升安者勿更若上氣嘔逆加橘皮二兩亦可加生薑二兩虚勞心腹痛附論夫虚勞之人氣弱胃虚飲食傷動冷氣乗之邪正相干則腹痛不已上干心絡故令心腹俱痛也方牛膝湯治虚勞邪氣攻擊心腹刺痛牛膝酒浸切焙柴胡去苖荆芥穂桔梗炒陳橘皮湯浸去白焙青橘皮湯浸去白焙各一兩人参肉蓯蓉酒浸切焙秦艽去苖土知母焙各一兩烏梅十五枚去核甘草炙三分黄連去鬚三分烏頭麩炒製安土上用盞盖出火毒去皮臍尖三枚敗龜以醋一碗塗浸炙用一兩白茯苓去黒皮半兩右料㕮咀毎服三錢水一盞入肥棗一枚擘煎至六分去滓温服金花散治虚勞心腹疼痛泄㵼腸鳴面黄肌痩脇肋脹滿不思飲食半夏湯洗七遍切焙烏頭炮製去皮臍木香各一兩欝金用漿水生姜皂莢三味煮透令軟切作片子焙乾麩炒一兩馬藺花一兩酒浸焙胡椒楝實取肉炒當歸生切荆三稜蓬莪茂二味椎碎用巴豆半两去殻同炒褐色為度不用巴豆大腹皮濕紙煨過蕪荑炒白术黄連去鬚炒各半兩右為散毎服三錢用羯羊肝一具去筋膜批作片子匀渗藥末在内更入鹽三錢乾薑末二錢蕪荑末二錢匕葱白一寸細切攪拌匀和白麵作肝角子慢火燒令香熟空心喫温米飲下肉荳蔲丸治虚勞心腹脹滿刺痛食不消肉荳蔲去殻木香各一兩丁香各一兩當歸各半兩荆三稜炮剉神麴搗碎㣲炒各一兩陳橘皮半兩湯浸去白瓤焙桃仁二兩湯浸去皮尖双仁麩炒㣲黄安息香半兩麝香一分麥蘖一兩炒㣲黄右為末煉蜜和搗五七百杵丸如梧桐子大毎服食前以熱酒下十五丸蘹香子散治虚勞心腹撮疼胸膈痞滿和氣進食蘹香子炒附子炮製去皮臍桂去麄皮木香蜀椒去目并閉口㣲炒出汗胡椒陳橘皮湯浸去白焙乾薑炮各半兩荆三稜煨剉一兩巴㦸天去心半兩右為散每服二錢用獖猪腎一對去筋膜切作薄片子入藥末葱絲少許鹽半錢濕紙裹煨熟食以酒或粥飲壓之湏㬰覺臍下暖甚妙丁香散治虚勞冷氣攻心腹疼痛丁香半兩當歸赤芍藥各三分厚朴一兩半去麄皮塗生薑汁炙令香熟青橘皮一兩湯浸去白瓤焙木香桂心各三分人参半兩去蘆頭桃仁三分湯浸去皮尖双仁麩炒㣲黄川椒一分去目及閉口者炒出汗右為散毎服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服附魏丸治虛勞心腹或臍下疼痛兼暖脾腎順氣思食阿魏半兩細研用白麵一兩拌搜作餅子􅏼令黄焦木香補骨脂㣲炒各二兩青橘皮一兩湯浸去白瓤焙乾薑炮製剉㯽榔蘹香子㣲炒肉桂去皴皮吳茱茰湯浸七遍焙乾㣲炒附子炮製去皮臍各二兩右為末煉蜜和搗三五百杵丸如梧桐子大毎服食前以熱酒下十五丸生薑湯下亦得茱茰猪肚丸治虛勞心腹撮痛肌體羸痩吳茱茰湯浸焙炒一兩半食茱茰山茱茰各一兩附子炮裂去皮臍乾薑硫黄研陳橘皮湯浸去白焙各半兩青橘皮湯浸去白焙禹餘糧炭火煨赤各一兩右為末以生猪肚一枚先將藥末用醋攪和令匀入在猪肚内縫合用水一斗以文武火煮爛炒盆内一處研令得所丸如梧桐子大每服二十丸空心食前鹽湯下温酒亦可碙砂附子丸治虚勞冷氣攻擊心腹撮痛腰膝重疼碙砂研一錢檳榔一枚木香一分乾蠍炒一錢附子炮製去皮臍沉香蘹香子炒桃仁去皮尖双仁慢火炒自然銅火煆醋淬七遍各半兩右為末醋煮麵糊為丸如梧桐子大毎服十五丸生姜熱酒下食前服蘹香子丸治虚勞元臓氣冷心腹疞痛蘹香子炒胡椒附子炮製去皮臍青橘皮湯浸去白焙阿魏麺和作餅子炙熟硫黄研菖蒲牛膝酒浸切焙五味子等分右為末麵糊為丸如梧桐子大每服十五丸空心温酒下鼈甲散治虚勞肩背疼悶心腹脹痛腸胃虚鳴臍下拘急鼈甲塗酸炙令㣲黄去裙襴柴胡去苖各一兩半荆三稜一兩炮剉當歸一兩半赤芍藥人参去蘆頭白术各一兩陳橘皮三分湯浸去白瓤焙大腹皮半兩右為散每服三錢以水一中盞入生薑半分煎至六分去滓食前稍熱服芎藭散治虚勞肩背及心腹疼痛四肢不和腹胃脹滿芎藭一兩柴胡去苖一兩半桂心赤芍藥一兩白术一兩大腹皮三分桃仁二十枚湯浸去皮尖双仁麸炒㣲黄陳橘皮三分湯浸去白穣焙木香三分右為散每服三錢以水一中盞入薑半分煎至六分去滓不計時候稍熱服木香散治虚勞心腹痛胃氣不和腹脇脹滿木香芎藭枳殻麸炒微黄去瓤桂心桃仁湯浸去皮尖双仁麸炒㣲黄陳橘皮湯浸去白瓤焙赤芍藥人参去蘆頭檳榔各一兩右為散毎服三錢以水一中盞入生薑半分煎至六分去滓食前稍熱服補骨脂散治虚勞心腹疼痛補骨脂炒半兩牛膝酒浸切焙半兩沒藥研半兩乾薑炮陽起石研蘹香子炒白茯苓去黑皮山芋各一兩右為散毎服一錢温酒調沉香散治虚勞心腹痛小腹悶滯沉香一兩半附子炮製去皮臍檳榔肉桂去麄皮當歸丁香各半兩陳橘皮湯浸去白穣焙蘹香子各一兩右為散毎服食前以熱酒調下二錢楝實丸治虚勞心腹撮痛不思飲食補益元臓調和脾胃楝實炒白术各一兩烏藥剉蘹香子㣲炒補骨脂水淘去浮者㣲炒木香各半兩厚朴去麄皮用生姜汁炙一兩右為末酒煮麵糊和丸如梧桐子大每服二十丸空心食前温酒或鹽湯下日三服補骨脂丸治虚勞心腹撮痛補骨脂炒楝實麸炒去核各一兩髙良薑㣲炒一兩半巴㦸天去心一兩葫蘆巴半兩蘹香子麸炒一兩右為末酒煮麵糊為丸如梧桐子大毎服二十九丸酒下鹽湯下亦得前服芍藥湯療虚勞腹中痛夢失精四肢疼痠手足煩熱咽乾口燥并婦人少腹痛芍藥桂心甘草炙各三兩生薑四兩大棗十二枚擘飴糖右切以水九升煮取三升去滓下糖分服七合日三夜一忌海藻菘菜生葱黄蓍建中湯療虚勞短氣少腹急痛五臓不足方見本門虚勞裏急類治虛勞心腹或臍下痛疼兼煖脾腎順氣思食出聖恵方乾漆一兩搗碎炒令煙出荆三稜一兩炮剉蓬莪茂半兩煨青橘皮三分湯浸去白穣桃仁湯浸去皮尖双仁麸炒微黄桂心各一兩右為散毎服食前以熱酒調下一錢桂附丸治虚勞下元乆冷心腹疼痛不思飲食桂去麄皮一兩乾薑炮半兩蘹香子炒二兩附子炮製去皮臍一兩硫黄研半兩右為末麺糊為丸如梧桐子大毎服二十九丸空心鹽湯下治虛勞心腹或臍下疼痛兼暖脾腎順氣思食出聖恵方青橘皮一兩湯浸去白瓤焙桂心一兩木香一兩桃仁湯浸去皮尖雙仁麩炒㣲黄一兩右為散每服食前以熱酒調下一錢艾葉煎丸治冷勞心腹疼痛或時泄下痢兼治婦人下經冷病帶下方見本門虚勞兼痢類白芷散治虚勞元臓虛冷心腹疼痛精神倦怠白芷炒半兩巴㦸天去心一兩髙良薑一錢右為散每服一錢猪腎一對去筋膜入藥末煨熟細嚼温酒下普濟方卷二百三十三
