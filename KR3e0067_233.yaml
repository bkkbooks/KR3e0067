body:
  text: 普濟方卷二百三十三明周王朱橚撰虚勞門虚勞羸瘦附論夫虚勞羸痩者五臓之氣傷損也經所謂一損損於皮毛毛聚而毛落二損損於血脉血脉虚少不能榮於五臓六腑也三損損於肌肉消瘦飲食不為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於牀然治損之法柰何損其肺者益其氣損其心者調其榮衞損其脾者調其飲食適其寒温損其肝者緩其中損其腎者益其精此治損之法也虚勞羸瘦者是五臓六腑虚損之候也凡人耽嗜聲色貪味甘脆殊無撙莭唯恣情性而又外觸風寒内傷氣血表裏受病隂陽相傳乆而不瘳遂成羸瘵此皆冷熱風血氣之所𧺫五勞六極之候因茲有焉脾胃勞傷肌骨枯瘁故成勞瘦之病也老小尫羸為和氣不足寒氣獨積于地炎氣獨散于天天地不交故體成否體成否則肌肉不潤腠理不通胸膈氣急腸胃招滿為隂衝陽陽不接也或膀胱堅積致是沉疴為陽氣不能下營隂氣獨盛也致大腸留壅湯藥不下或水穀不消更加短氣若不利闗格寔不得其死也方補益甘草丸治虚勞羸瘦膝冷腰疼神思昏沉肢莭無力少積乏氣睡卧多驚甘草炙㣲赤剉薯蕷逺志去心續斷桂心人参去蘆頭防風去蘆頭天雄炮製去皮臍石斛去根剉茯神覆盆子車前子五味子鹿茸去毛塗酥炙微黄楮實水淘去浮者焙乾山茱茰蛇床子杜仲去皴皮炙微黄巴㦸萆薢剉狗脊黄蓍各二兩剉牛膝一兩半去苖白龍腦半兩細研入肉蓯蓉酒浸一宿刮去皴皮尖令乾兎絲子酒浸三宿爆乾别搗為末生地黄鍾乳粉各二兩澤㵼一兩右為末煉蜜和搗五七百杵丸如梧桐子大毎服空心温酒下三十丸及晩食前再服補益鍾乳天雄丸治虚勞水臓乆憊腰膝疼冷筋骨無力夢寐不安陽道劣弱面色萎黄飲食不得日漸羸瘦鍾乳粉天雄炮製去皮臍巴㦸各一兩半蘹香子肉蓯蓉酒浸一宿刮去皴皮炙令乾兎絲子酒浸三日曝乾别搗為末補骨脂木香天門冬去心焙續斷沉香石斛去根剉丁香山茱茰附子炮裂去皮臍肉桂去麬皮當歸麝香細研白术人参去蘆頭仙靈脾薯蕷牛膝去苗厚朴去粗皮塗生姜汁炙令香熟熟乾地黄石龍芮各一兩磁石二兩燒令赤醋淬七遍細研水飛過右為末煉蜜和搗五七百杵丸如梧桐子大毎日空心以煖酒下三十丸臨卧時再服如不飲酒鹽湯下亦得羊腎丸出聖恵方治虚勞羸瘦補益骨髓肌膚羊腎二對去脂膜切破焙乾人参去蘆頭白茯苓白术各一兩桂心熟地黄各三兩肉蓯蓉酒浸一宿刮去皴皮炙乾當歸蛇床子各三分枳壳麩炒微黄去穰薯蕷黄蓍澤㵼山茱茰白芍藥吳茱茰湯浸七遍焙乾微炒兎絲子酒浸三日晒乾别研為末鹿茸去毛塗酥炙微黄逺志去心附子炮裂去皮臍牡丹皮石斛去根剉牛膝訶黎勒煨用皮一兩半右為末煉蜜和搗三五百杵丸如梧桐子大毎服空心以煖酒下三十丸晚食前再服通命丸療虚勞百病七傷六極少氣羸弱不能飲食茯苓甘草杏仁去皮尖熬乾天門冬去心芍藥大黄當歸乾薑人参各六分牛膝乾地黄各七分黄芩紫苑蓯蓉各五分阿膠桂心吳茱茰蜀椒出汗石斛各三分防風乾漆熬白术各四分右搗篩以棗膏蜜相拌和食前服七丸日三不知漸增以知為度病劇者夜更一服忌蕪夷鯉魚生葱海藻菘菜桃李爟鮓等物川椒丸出聖恵方治虚勞羸瘦食飲無味百莭疼神思昏沉四肢無力冝服補益強元氣令人肥徤川椒一兩七目閉口者炒去汗白茯苓栢子仁芎藭人参去蘆頭桂心黄蓍乾薑當歸山茱茰附子炮裂去皮臍枸杞子薯蕷各三分枳實半兩麩炒微黄牛漆去苗厚朴去麄皮塗生姜汁炙令香熟肉蓯蓉酒浸一宿去皴皮炙乾石斛去根剉熟乾地黄兎絲子酒浸三日焙乾别搗為末各一兩右為末煉蜜和搗三五百杵丸如梧桐子大毎服空心温酒下三十丸晚食前再服松子丸出聖恵方治虚勞百病絶傷羸瘦乆服強筋骨長肌肉恱澤顔色延年不老松子去皮白茯苓一兩麥門冬去心焙栢子仁薯蕷枸杞子五味子菌桂山茱茰覆盆子熟乾地黄澤㵼女真實石楠黄蓍剉逺志去心各一兩肉蓯蓉二兩酒浸一宿刮去皴皮炙令乾石斛一兩半去根剉甘草半兩炙微赤剉杜仲一兩半去皴皮炙令黄右為末煉蜜和搗五七百杵丸如梧桐子大毎服空心及晩食前酒下三十丸人参湯治虚勞羸瘦肌熱盗汗四肢少力不思飲食咳嗽多痰人参一分白茯苓去黒皮桂去麄皮紫苑各半兩去苖土木香一分青橘皮湯浸去白焙半兩桔梗炒赤芍藥五味子各一兩芎藭訶黎勒皮羗活去蘆頭當歸切焙各半兩防己一分秦艽去苖土半兩甘草炙剉鼈甲各一兩醋炙令焦黄柴胡半兩去苖地骨皮一兩右麄搗篩毎服二錢入葱白二寸生薑半分切碎同煎至半盞去滓入童子小便半盞再煎一兩沸毎日食前温服鍾乳粉丸治虚勞少氣羸痩無力鍾乳粉熟乾地黄焙杜仲去麄皮剉炒續斷肉蓯蓉去皴皮酒浸焙山茱茰桂去麄皮巴㦸天去心牛膝酒浸切焙石斛去根覆盆子五味子附子炮裂去皮臍兎絲子酒浸一宿白檳榔煨剉蛇床子狗脊去毛山芋各三兩萆薢一兩半右為末煉蜜和丸如梧桐子大毎服四十丸煖酒下空心食前服穀仙散治虚勞羸瘦目風淚出耳作蟬嘯口乾燥飲食多嘔或時下痢腹中雷鳴隂下癢濕不能乆立四肢煩疼石斛去根肉蓯蓉酒浸切焙杜仲去麄皮剉炒防風去叉萆薢菖蒲麥門冬去心焙白馬莖切焙兎絲子酒浸别搗逺志去心栢實續斷山芋蛇床子澤㵼細辛去苖葉天雄炮製去皮臍右等分搗羅為散毎服三錢匕温酒調下巴㦸丸出聖恵方治虚勞羸瘦下元冷憊脚膝無力風氣相攻巴㦸兎絲子酒浸三日晒乾别搗為末石斛去根剉松子去皮桂心人参去蘆頭牛膝去黄羗活附子炮裂去皮臍白茯苓各一兩鍾乳粉雲母粉肉蓯蓉酒浸一宿刮去麬皮炙令乾熟乾地黄各二兩甘菊花五味子防風去蘆頭各三分右為末入研子藥同研令匀煉蜜和搗五七百杵丸如梧桐子大毎服空心及晩食前以温酒下三十丸補益煎治虚勞肌損膝無力不思飲食和益榮衛駐顔補氣滋潤肌體及療一切皮膚生瘡生地黄四斤生天門冬一斤生藕一斤生薑半斤已上四味剉碎用生絹袋絞取汁石斛去根鹿茸酥炙去毛兎絲子酒浸一宿搗成子焙乾黄蓍剉牛膝酒浸一宿焙乾柴胡去苖地骨皮人参白茯苓去黒皮桂去麄皮木香附子炮裂去皮臍各一兩右搗羅十二味為末先將前四味自然汁於銀石器内熬耗一半入好酒一斗又熬去一半入酥蜜各半斤同熬次入上件藥末於汁内用栁枝不住手攪直候匙上抄起為度於新瓷器内盛用臘紙封口毎日空心温酒調下一匙山茱茰散一名五散治虚勞身體羸瘦寒熱作時咳嗽喘滿四肢無力百節痠疼盗汗心忪恍惚驚悸全不思食方見本門虚勞類肉蓯蓉丸出聖恵方治虚勞羸瘦心神徤忘腰膝多疼臓腑氣虚陽事衰絶肉蓯蓉二兩酒浸一宿刮去皴皮炙令乾兎絲子酒浸三日晒乾别搗為末薯蕷牛膝去苖巴㦸杜仲去麄皮炙微黄續斷白茯苓枸杞子五味子蛇床子山茱茰逺志去心栢子仁茯神各二兩右為末煉蜜和搗五七百杵丸如梧桐子大毎日空心以温酒下三十丸晩食前再服鼈甲丸治虚勞肌體痩發熱減食四肢少力鼈甲醋炙令黄去裙襴柴胡去苗各一兩半人参白术麥門冬去心焙訶梨勒皮黄蓍剉五味子沉香赤芍藥茯神去木生乾地黄木香枳實去穣麩炒各一兩右為末煉蜜為丸如梧桐子大毎日空心人参湯或粥飲下二十丸至三十丸日三當歸散治虚勞羸瘦面目黧黑四肢苦重短氣不思飲食當歸去蘆頭焙乾石斛去根天門冬去心焙菴䕡子地膚子肉蓯蓉酒洗去皴皮切焙乾各一兩白歛覆盆子甘草炙令赤剉五味子各三分桂去麄皮牛膝剉酒浸焙乾附子炮製去皮臍各半兩石鍾乳煉成者一兩一分右為散毎服三錢以温酒入少熟蜜調下空心日午夜食後服柴胡散治寒熱體瘦肢莭疼痛口乾心煩柴胡黄蓍赤茯苓白术各一兩人参地骨皮枳壳製桔梗桑白皮赤芍藥生乾地黄各七錢半麥門冬三兩甘草半兩右㕮咀毎服四錢薑二片水煎服猪肚黄連丸治勞瘦猪肚一具以童子小便一斗煮令爛切研如泥黄連去鬚一兩一分柴胡去苖一兩半白术一兩鼈甲醋浸炙令黄一兩半紫苑去苖土杏仁浸去皮尖雙仁生研一兩半桂去麄皮陳橘皮去白穰各一兩乾薑炮製三分人参一兩一分蕪荑仁炒令香三分右除猪肚外搗羅為末入猪肚更搗一千杵即以煉蜜相和調匀得所丸如梧桐子大毎日空腹温酒下三十丸漸加至四十丸炙肝散治急勞羸痩蒼术去麄皮木香桂去麄皮附子炮製去皮臍人参白茯苓去黒皮厚朴去麄皮塗生姜汁炙剉牛膝剉焙令乾芍藥鱉甲醋浸炙令黄當歸去蘆頭炙令乾切青橘皮去白焙右等分為散毎服用豶猪肝一具細切如桞葉用藥一兩摻拌匀以慢火炙熟空腹放温任意食之不過三服瘥黄蓍湯療體虚少氣羸瘦不堪榮衛不足苦驚胸膈淡冷而客熱欲冷水飲食則必腹弦滿脾胃氣少不能消食或時衂血黄蓍二兩附子一兩炮大棗十四枚甘草二兩炙蜀椒一兩炒出汗生薑六兩芍藥茯苓當歸各三兩人参三兩黄芩桂心各二兩右切以水一斗煮取三升半滓分五服日三夜一適寒温忌海藻生葱菘菜猪肉冷水大酢無比山藥丸出醫方集成療虚羸治諸虚百損五勞七傷肌體消瘦補下經起隂發陽能令陽氣入腦安魂定魄開三焦破積聚消五穀益子精安臓腑除心中伏熱強筋骨輕身明目去冷除風無所不治補益極多常服最妙七十老兒服之尚有常力一名萬安丸薯蕷二兩蓯蓉四兩酒浸牛膝酒浸兎絲子酒浸杜仲炒澤㵼巴㦸天去心山茱茰赤石脂各二兩五味子一錢乾地黄三兩茯神二兩一方作茯苓右為末以蜜和丸如梧桐子大食前以酒下二十丸至三十丸日再夜一服無所忌唯禁大醋無荑蒜陳敗物服之七日令人健四體潤澤唇口赤手足暖面有光恱消食身體安和音聲清朗是其驗七日後日長肌肉其藥通中入腦鼻必痠疼不可怪若欲求大肥加燉煌石膏二兩若失性健忘加逺志一兩少津液加栢子仁一兩一月許即充足隂下濕癢加蛇床子一兩一方用蓯蓉末半斤酒熬膏和丸古今録驗有白馬莖二兩共一十六味石斛散出聖恵方治虚勞羸瘦不能飲食面色黄黑手足多冷石斛二兩去根剉山茱茰一兩五味子半兩萆􅐺三分剉逺志去心桂心各半兩人参去蘆頭黄蓍各一兩剉當歸白茯苓各三分肉蓯蓉酒浸一宿刮去麬皮炙乾附子各一兩炮製去皮臍右為散毎於服四錢以水一中盞入生薑半分棗三枚煎至六分去滓毎於食前温服肉蓯蓉散出聖恵方治虚勞傷憊四肢羸痩腰膝無力不能飲食肉蓯蓉酒浸一宿刮去麬皮炙令乾熟乾地黄石斛附子炮製去皮臍黄蓍剉白茯苓牛膝各一兩去苗防風去蘆頭人参去蘆頭白术五味子桂心各半兩右為散毎服四錢以水一中盞入生薑半分棗三枚煎至六分去滓毎於食前温服黄蓍散出聖恵方治虚勞羸瘦四肢少力睡常不足少思飲食黄蓍一兩剉人参去蘆頭五味子各三分牛膝去苖白术各一兩桂心當歸續斷各三分白茯苓一兩甘草半兩炙微赤剉肉蓯蓉二兩酒浸一宿去皴皮炙令乾右為散毎服四錢以水一中盞入生薑半分棗三枚煎至六分去滓毎於食前温服人参散出聖恵方治虚勞羸瘦夜卧失精心神虚煩咽喉不利少思飲食人参去蘆頭龍骨一兩半桑螵蛸一兩微炙熟乾地黄一兩半桂心三分黄蓍剉茯神各一兩麥門冬一兩半去心焙甘草半兩炙微赤剉白术三分肉蓯蓉一兩酒浸一宿刮去皴皮炙乾右為散毎服四錢以水一中盞入生薑