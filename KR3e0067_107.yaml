蜜水調下食後服日二茵陳蒿散聖濟總録治風瘙癮疹皮膚腫痒茵陳蒿一兩荷葉半兩右為細散每服一錢以蜜水調下食後服白蜜散出聖惠方治風瘙病丙穩禾疹搔痒不止白礬一合酒二合右相和煎煖食前服或用生薑汁和香油於痒處再三傅而擦之小朱散出聖濟總録治風癮疹乆不瘥每發或先心腹痛痰噦麻痺筋脈不仁成塊赤土有沙石者不可用當歸切焙各等分右搗羅為散冷酒調下二錢兼用塗藥方慎火草大葉一名景天花生薑和皮不洗等分研鹽量多少右同研塗摩痒處如遍身癮疹塗發甚處自消礬石塗方治風赤白癮疹積年不愈毎發遍身腫久恐入腸傷人礬石生搗末三兩青酒三升右先煮酒令沸次入礬石末煮如稀糊塗之一方入小便一升治遊風癮疹赤土細研香白芷各一兩右為細末毎服二錢用茶清調下治皮膚風熱遍身生癮疹地黃茵陳蒿各一斤右用米一石麴三斤和地黃一斤茵陳炙令黃一作醸酒法服之自消又方以牛旁子浮萍等分用薄荷湯調下二錢日二服愈亦治筋骨攣急治瘙癮疹方出肘後方礬石細辛各一兩右以酒三升漬令消塗洗立愈積年入腹者亦得差治赤疹方禹餘糧半夏各等分右和以雞子黃合搗先取新布拭瘢上令赤以藥塗之勿令見風二十日滅矣十餘歲瘢不差平復如故杏葉煎揩拭方出聖惠方治風癮疹頑痒杏葉切五升蒴藋根切一升右以水一斗半煮取二升去滓用綿浸藥汁楷拭所患處日三兩度治風癮及疹癮出聖惠方白礬石灰各一兩右合和研令勻以生薑自然汁調如稀糊薄塗患處日二上之效治風瘙癮疹遍身皆痒搔之成瘡出聖惠方茵陳五兩生用苦參五兩右細剉用水一斗煮取二升温熱得所蘸綿拭之日五七度瘥治風瘙病丙穩禾疹出聖惠方用巴豆二兩以水七升煮取三升故帛染汁拭之大人小人以意加減茱萸方治風瘙癮疹方見風瘙痒類治風瘙癮疹出聖惠方用酪和鹽熱煮摩之隨手卽消又方出千金方用石灰淋取汁洗之良一方石灰隨多少和醋漿水塗疹上隨手卽滅大豆浸酒治風瘙病丙穩禾疹方見中風身體不隨類又方出聖惠方用牛膝為末酒下方寸匕日三並治骨疽癩病及㾦㿔又方出千金方用芥子末漿服方寸匕日三白术飲出千金方治風瘙癮疹方見風口噤類治癮疹百療不差者亦治赤疹出聖惠方用景天花一斤名慎火草細搗取汁傅上熱炙手摩之再三度差芒硝湯出千金方治癮百療不差者亦治赤疹用芒硝八兩以水一斗煮取四升適寒温綿染拭之一方用湯和拭之清肌散治暴發癮疹苦出而暴沒或作痠痛黒狗脊甘草荆芥各等分右生研冷水調去滓服半碗入口即效凡人患風疹有暴發者其證或熱或不熱忽煩燥遍身瘙痒發出癮疹此由是濕氣乗熱暴入脾經若不快出或致傷膓煩悶治癮疹出千金方用白芷刺燒存性為末温酒調二錢服一方用白芷根葉煮汁洗之治風疹瘙痒不可忍亦治風熱皮膚燥痒因而生瘡本草用赤土不拘多少研細毎服三錢荆芥茶調下食後荆芥酒調下亦得如氣實人用蜜水調尤妙一方温酒調下赤土亦代赭石洗方出聖惠方治風瘙癮疹遍身痒成瘡用蠶沙一升新水二斗煮取一斗三升去滓温熱得所宻室洗之宜避風清肌散出危氏方治風寒暑濕外搏肌膚發為癮疹遍身搔痒或赤或白咽乾或作寒熱用敗毒散一兩半加天麻薄荷三錢蟬蛻二七箇去足翼分作六服毎服水一盞半生薑三片煎温服取效石南酒聖濟總録治風癮疹經旬不解用石南葉去粗莖生用三兩為末每服半錢至一錢每用酒三合煎一沸空心温服松葉酒聖濟總録治風瘙癮疹三十年不瘥方見風眼口喎斜類蒴藋湯出肘後方治一切風病丙穩禾疹出聖惠方用蒴藋一兩切碎以水三碗煎至五七沸冷煖得所洗患處一方煮蒴藋湯以少酒塗之一方治癧瘍風以蒴藋淋灰取汁洗患處訖切以醋研木防己塗之並瘥蛇銜草傅方出肘後方治風癮疹赤色以蛇銜草搗極爛傅之瘥赤疹者由冷濕搏於肌中甚卽為熱乃成赤疹得天熱則劇冷則減是也枳實酒出簡易方治遍身白疹瘙痒不止用枳實不拘多少麫炒黃切片為粗皮每服二大錢用酒浸少時去枳實但飲酒最妙用水煎枳實洗患處尤佳一方醋浸令浥浥炒熱用綿褁熨疹上治癮疹出肘後方用楝皮以水濃煎浴之大效治風疹入腹身體强舌乾燥硬出聖惠方用蔓青子三兩為末每服温酒下一錢治風病丙穩禾疹出肘後方用水煮蜂房取二升入芒硝傅上日五度卽瘥露蜂房今蜂窠也白殭蠶散出澹寮方治風遍身癮疹疼痛成瘡方見破傷風類苦參飲治瘡疹最多亦可治癩疾方見烏癩類雲母散出肘後方治風疹遍身百計治不瘥者用雲母粉煅為末以清水調服之看大小以意斟量與之少多服如治風熱再服尤妙治一切疹一名枳實湯出肘後方用枳殻以水煮為煎塗之乾卽又塗之良一方剉煎湯洗服亦得治赤白遊疹以物發疹用蠐螬破碎取汁塗患處妙紫葳散治身上遊風疹毒方方見風腰脚不隨類治乆疹有時發動脇疼如打用六月七月取地膚子乾末酒服方寸日五六服療癮疹煩滿及血不止用新濕馬矢絞取汁服二錢升微者一升愈乾者水濕取汁療三十歲癮疹耳目合背春秋輙發方於南屋東頭第一梁壁外以細灰布地大小足容兩脚躡灰上訖使病人徑去無反顧灸脚十指間灸灰上隨病人年爲壯車瑗道方療風疹方用生葱一大束三尺以上圍者並根鬚鹽三大升以香漿水三石煮取二石傾数斗於浴斛中遍令熱浸雖積年患者不過三兩度浸必瘥枳殻湯治風疹不痒止方見風瘙痒類治風瘙病丙穩禾疹方出肘後方右燒石令熱赤以投水中内鹽數合及熱浸之良又方出聖惠方用大㦸五兩水七升煮取五升洗之日再治風疹痒不止方用蕓薹菜三握細剉爛研絞取汁於疹上熟擦時時上藥令熱徹又續煎椒湯洗又方用苦參五兩剉搗細煉蜜和丸如梧桐子大每於食後以温水下三十丸又方出聖惠方用蛇蛻皮一條以水一升煎取半升以雞翎一莖湯熱時蘸藥上即瘥治暴氣在表攻皮膚上癮疹作瘡出千金方用槐枝葉洗之治風疹風科集騐方杜甫詩有除􅶽草一篇蜀中謂之毛􅶽芒可畏觸人如蜂蠆擇取鮮者以此草㸃之一身皆失葉背紫者入藥齊亢結事守縉雲日少氣力風疹繼作服仙茅遂愈風科集驗方八九月時採得竹刀子刮去黑皮切如緑豆粒米泔浸兩宿隂乾搗篩熟蜜丸如桐子大每旦空肚酒飲任便下二十丸禁食牛乳及黑牛肉大減藥力也續傳信方南唐筠州刺史王紹顔所著皆因國書編録其方當時甚盛故今江南但呼此藥為婆羅門參黃土湯旅舍方治赤疹瘙痒煩燥昏悶用伏龍肝卽竈下黃土研細每服二錢生薑蜜湯調下治風癮疹方本草以楓香水煎熱渫洗治風疹本草用菉豆生研絞汁服治遍身風疹以側子令酒調服治皮膚風本草以槐花炒服治皮膚風本草以鮮五加葉可作蔬菜食之治風瘙痒癮疹本草以栁木中蟲屑作湯浴之大效苦參丸本草治人病遍身風熱疹細痒痛不可忍連胸頸臍腹及近隱皆然涎痰亦多夜不得睡方見風瘙痒類治風瘙癮疹身痒不止用鷰子窠内土水和傅之係抱子處土惡風論夫惡風者皆五風厲氣所致也風有青白赤黒黃之異其毒中人五臟則生蟲亦有五種蟲生息滋蔓入於骨髓五臟内傷形貌外應故食肝則眉墮落食肺則鼻柱倒塌食脾則語聲變散食腎則耳鳴如雷鼓之聲心不受食食心則為不可治是故謂之多風方殊聖散聖濟總録治惡風方天麻菖蒲九節者米泔浸焙乾何首烏乳香菊花蔓荆實葳靈仙地骨皮仙人骨胡麻防風去义枳殻去穣麩炒益母草烏蛇浸去皮骨小荆子蒼耳苦參沙參丹參人參𤣥參紫參荆芥右為散每服二錢以温酒調下食前後各一服隔宿先喫猪心一枚早辰并服三服白术散聖濟總録治惡風無問新乆四肢不仁一身盡痛頭目眩倒口面喎斜白术㣲炒人參秦艽去苗土當歸切焙天雄炮製去皮臍各三分附子炮製去皮臍烏頭炮製去皮臍各二兩乾薑炮製一兩蜀椒去目并閉口者炒出汗一兩防風去义桂去麤皮防己剉萆薢炒白歛桔梗去蘆頭炒黃耆細剉各三兩山茱萸麻黃去根節先煮掠去沫焙乾茵芋去麤莖甘草炙各三分細辛去苗葉半兩右爲末每服二錢以温酒調下空心午時各一服未效漸加服之覺口唇􅍙痺即減服之胡麻散聖濟總録治惡風胡麻一斤去浮者一半煮熟一半生用天麻乳香研何首烏蒼耳松花角蒿欵冬花克領草菖蒲人參苦參𤣥參沙參丹參葳靈仙去土各二兩甘菊花三兩蔓荆實二兩紫參二兩右爲散每服二錢以温酒調下如病深漸加至三錢服至旬餘若覺遍身疼痛是效豆蒸丸聖治總録治惡風原蠶蛾全者二十八枚炒羊靨二十八枚拆開炙乾猪靨二十八枚如前炙安息香犀角屑没藥研人參甘草炙剉何首烏大黃剉炒逺志去心各一兩角蒿蒲公草蒼耳地錦益母草土馬騣枸杞自角蒿以下七味各一兩另洗浄用黒豆葢覆甑中蒸令黒豆輭熟不用黒豆將藥暴乾右為末入搗梨汁並煉蜜同和丸如櫻桃大每服十丸不以時米飲嚼下如聖散聖濟總録治惡風胡麻二斤九蒸九暴天麻一兩乳香研松脂研欵冬花旋覆花蒼耳人參𤣥參沙參苦參紫參丹參松花白茯苓去黒皮各半兩木香丁香胡麻子花各一分右為散和勻每服三錢以薄茶調下日三四服不計時服藥分五日遍身及百骨節疼痛起止不得乃見效也兩三日後却得安及一月身體黒瘦方漸平復天麻散聖濟總録天麻防風去义細辛去苗葉附子炮製去臍槀本去苗烏蛇酒浸用肉羌活去蘆頭芎藭菊花桂去麤皮麻黃去根節先煎掠去沫焙乾乾薑炮製獨活去蘆頭甘草炙阿膠炙令燥白鮮皮各半兩右為散每日空腹温酒調服二錢一漸加至三錢每日二春夏煎當歸酒調下秋冬煎蒲黃酒調下野膏丸治惡風毒腫疼痺不仁瘰癧患瘡癰疽腫脛脚弱偏枯百病野葛犀角蛇銜莽草外薹作菌芋烏頭升麻防風蜀椒乾薑鼈甲雄黃巴豆各一兩丹參二兩躑躅一升右㕮咀以苦酒四升浸之一宿以成煎猪膏五斤㣲火大煎三上三下藥色小黃去滓以摩病上此方不可施之猥瑣之人胡洽無丹參躑躅有細辛又蘇恭白芷防風吳茱萸附子當歸代巴豆雄黃蛇銜防風鼈甲五參散聖濟總録治惡風人參沙參丹參𤣥參苦參木通剉蒺藜子炒去角烏蛇酒浸去皮骨乾蝎去土天麻赤箭何首烏去黒皮陳橘皮湯浸去白焙各一兩黃芩去黒心半兩原蠶蛾一分右並生用搗羅為散每服三錢以熱茶調下服及半料即減服二錢如初服三日後覺先頭項脊膂身上疼痛乃藥力與病相擊也當安卧復時許即無事如或身上有瘡腫服藥一日後便覺漸減麻黃湯治惡風毒氣脚弱無力頑痺四肢不仁失音不能言毒氣衝心有人病者但一病相當即服此第一服次服第二服麻黃一兩大棗二十枚茯苓三兩杏仁三十枚防風白术升麻當歸芎藭芍藥黃芩桂心麥門冬甘草各二兩右㕮咀以水九升清酒二升煮取二升半分四服日三夜一覆令小汗粉之莫令見風獨活湯第二服獨活四兩乾地黃三兩生薑五兩葛根桂心甘草芍藥麻黃各三兩右㕮咀水八升清酒二升合煎取二升半分四服日三夜一脚弱特忌食瓠子蕺菜犯之一世治療不愈葳靈仙丹一名丹參散聖濟總録治惡風方見大風癩病類何首烏丸聖濟總録治脾肺風惡等疾何首烏石菖蒲荆芥穗蒼耳胡麻炒各一錢𤣥參沙參苦參白花蛇酒浸去皮骨炙烏蛇酒浸去皮骨炙各半兩右為末煉蜜和丸梧子大每服十丸茶酒任下如要作散每服二錢以温酒調下白花蛇散聖濟總録治惡風白花蛇一條酒浸取肉三兩露蜂房㣲炙苦參剉防風去义丹參梔子仁山芋各二兩半秦艽去苗土一兩右為散每日空心用温酒調下二錢加至三錢服日再蔓荆實散聖濟總録治肺臟風毒發作如癩變成惡風證蔓荆實揉去白皮生用四兩胡麻搗為末炒熟兩半天麻二兩菊花未開者良生用四兩天南星炮製一兩枸杞生用四兩苦參搗取粉四兩右為散每服温酒調下二錢每日三夜一每服宜去食前後稍逺恐藥食相犯防風酒聖濟總録治惡癩病防風去义切碎一斤天麻剉碎五兩黍米一石枸杞根刮去雛皮去心剉碎用五斤好麵麴一十五斤右將防風天麻枸杞根三味同水六斗煮取三斗去滓置於不津器中將黍米依造酒蒸饙蒸訖麴米拌分三酘如常法又取槐白皮一斤細剉并用三年純黒猫兒去皮腸肚外爛煮同剉槐白皮相和入酒酒熟壓去糟每服温飲三四合至五合日二夜一天蓼散聖濟總録治惡風天蓼葉焙乾一斤天麻三兩何首烏去黒皮酒炒王不留行㣲炒各二兩右為散每服二錢須以熱漿水調服日三不計時烏蛇膽汁方聖濟總録治惡風烏蛇膽一枚冬𤓰子一枚截作五寸許去穰用梨一枚右掘地可深三尺掃拭令浄潔以物盛冬𤓰置内次安烏蛇膽梨於其上以物隔之用土葢覆三七日一看冬𤓰未甚壞則候七七日看蛇膽梨渾化為汁在冬𤓰皮内即取汁每服温一茶脚許小可風疾以匙頭濕過攪酒喫三兩服愈乳香散聖濟總録治惡風乳香研三錢胡麻水淘去浮者秤一斤文火炒香天麻慢火炙令黄色三兩右為散每用三錢以飯後先抄著口内煎荆芥茶旋呷旋嚥服五七日後覺遍身無力昏悶時勿怪乃藥力也即於腰眼兩邊相去量病人一寸半許各灸二七狀如麥粒大若鼻塌者用秋黍枝子去皮中心通作眼安在鼻中身上有腫處自消常服即煉蜜搜和為丸如桐子大温酒下三五丸玉粉丸聖濟總録治惡風礬石一兩研細生炊餅劑一枚右和勻却作炊餅蒸熟乘熱丸如梧子大每服三十丸食後茶清下勝玉散聖濟總録治惡風並􅓼諸風角蒿五月採者去根九蒸九暴為末胡麻九蒸九暴為末右每一料用角蒿末一斤胡麻末半斤更入乳香一兩别研為細末拌和令勻每服一錢或二錢以茶酒隨意調下硫黃酒出直指方治惡風頭面肢體癮疹魁瘰用透明鋒芒硫黃二錢乳鉢内研細入醇酒再研空心飲其清者滓又研細入酒飲之連日如是硫黃能殺惡毒自大便下治惡風疾方用松脂煉投冷水中二十遍蜜和成丸毎取兩丸服之日三鼻柱斷塌者二百日差斷鹽及房室又天門冬酒服百日愈普濟方卷一百八
