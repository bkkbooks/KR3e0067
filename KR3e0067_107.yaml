body:
  text: 普濟方卷一百八明周王朱橚撰諸風門風瘙病丙穩禾疹論素問言風邪客於肌中則肌虚真氣發散又被寒摶皮膚外發腠理毛竅開滛氣妄行則爲痒也所以有風疹瘙痒皆由於此又有赤疹者忽起如蚊蚋啄嚙痒極者沓沓壟起搔之隨手起又有白疹者亦如此赤疹熱時即發冷即止白疹天陰即發白疹冝煮礬石汁拭之或煮蒴藋和少酒浴之良或煮石楠汁拭之良或水煮雞糞汁或煮枳實汁拭之餘一切如治丹方法俗呼爲風屎亦名風尸風氣挾熱起於腠理皮膚不腫不疼發爲瘙痒謂之癮疹此風熱之浮淺者也其亦有寒暑濕之氣行焉熱在表天時炎暄而燥氣乘之則爲赤疹風熱在表天時寒涼而冷氣折之則爲白疹赤者遇涼清而後消白者遇温煖而後滅然則用藥加減可無權度於此哉其有浴後腠理中風與夫汗出解脫而得之者隠隠微黃似赤似白凝滯於肌肉之間而四體爲之重著此風熱之挾濕外證又可推矣如其不知寒暑濕之所由生槪以療風熱等治之按圖殆恐痰嗽嘔渇雜證變交攻由癮疹而變爲瘡疹世醫病丙穩禾疹無不謂是皮膚間風熱旣分冷熱冷熱即寒暑之證經曰諸痒痛瘡皆屬於心心實熱則痛虚寒則痒又陽明主肌肉属胃與大腸亦有冷熱分痛痒不可不審世人呼白者爲婆膜赤者爲血風名義混殽當以理曉内則察其臟腑虚實外則分其寒暑風濕隨證調之無不愈脈浮而大浮爲風虚大爲氣强風氣相摶即成病丙穩禾疹身體爲痒養生方云汗出不可露卧及浴使人身體振寒熱風疹也白疹天陰雨冷則劇與風亦劇得晴煖及著衣服即瘥方犀角竹瀝膏治風熱發即頭項脈掣動急强及熱毒疹痒犀角十二分升麻八分蒴藋根秦艽獨活白芨菊花白术防己白芷當歸防風芎藭青木香寒水石碎苦參漏蘆根各四分蒺䔧子二合莽草二分枳實二枚四破梔子仁七枚竹瀝三升吳藍一兩右㕮咀以竹瀝漬一宿明旦於炭火上和猪脂五升煎令九上九下以候白芷色黃膏成絞去滓内於不津器用摩風處日三延年蒴藋膏治身痒風瘙癮疹蒴藋根切蒺䔧子各一升附子獨活犀角屑薔薇根白芷防風苦參白芨升麻白歛防己各三兩川椒莽草青木香蛇床子蛇銜草各二兩茺蔚子切一升枳實五枚炙茵芋二兩半切右㕮咀苦酒漬令淹匝一宿明旦銅器中炭火上用猪膏五升煎令三上三下以候白芷色黃膏成絞去滓内不津器中用摩風疹延年牡丹膏治項强痛頭風瘙痒疹風腫牡丹皮當歸芎藭防風升麻防己芒硝各六分芍藥細辛乾薑犀角屑漏蘆蒴藋零陵香梔子仁杏仁去皮尖雙仁碎黃芩大黃青木香各三分竹瀝二升右㕮咀以竹瀝漬一宿醍醐三升半煎於火上三下三上候芍藥黃膏成絞去滓以摩病上烏蛇膏出聖惠方治風瘙痒疹結腫攻衝遍身發熱痛痒及治筋脈攣急烏蛇當歸芎藭不用多了一味木鼈子枳殻大黃各一兩天麻附子白彊蠶烏啄天南星桂心細辛吳茱萸羌活蒼术防風牛膝椒漠乾蝎白芷各半兩右並生用細剉以頭醋半升浸一宿用臘月猪脂二斤於鐺中入藥以慢火煎看白芷變黃紫色下火濾去滓令浄入於磁盒内盛之用摩塗於所患處立效蒴藋膏出聖惠方治風瘙癮疹皮膚苦痒搔之血出蒴藋根蒺䔧子白者茺蔚子切各一兩附子去皮臍獨活去苗犀角薔薇根白芷防風苦參剉升麻漏蘆防己剉各三分香术二兩枳殻去穣五枚茵芋去粗莖一兩半蜀椒去目並合口一兩蛇銜二兩右並生用粗搗篩以頭醋浸令浥浥一宿先用銅石或銀器於炭火上煎猪膏五斤去滓膜入藥煎令小沸約自辰至申待白芷色黃膏成停温去滓内不津器中取摩病處一方無茵芋草烏蛇丸出聖濟總録治風瘙病丙穩禾疹遍身腫起或赤或白痒痛難忍白蛇酒浸去皮骨炙焦乾蝎炒去土白附子炮天麻防風去义麻黃去根節先煎掠去沫焙各二兩五靈脂炒白茯苓去黒皮人參檳榔生用各一兩肉豆䓻去皮五枚牛黃剉乾研一分白殭蠶炒阿膠炙燥天南星炮桂去粗皮各一兩半右將一十五味為末入牛黃研勻煉蜜和丸如赤小豆大每服十五丸食前温酒下臨卧再服蒺䔧子湯出聖濟總録治風疹發歇不瘥或赤或白瘙痒至甚蒺䔧子炒去角二兩仙靈皮防風去义芎藭萆薢白石脂枳殻去穣麩炒各一兩半桂去粗皮黃芩去黒心各半兩白术麻黃去根節羌活去蘆天雄炮去皮臍羚羊角屑黃連去鬚各一兩旋覆花炒三分右剉如麻豆大每服五錢以水一盞生薑二片烏梅入半棗大同煎至八分去滓温服卷栢散出聖惠方治皮膚癮疹及風熱生毒瘡卷栢枳殻麩微炒黃去穣羌活五加皮麻黃去根節各一兩犀角屑天竺黃赤箭藁本桑耳防風芎藭黃耆剉各半兩烏蛇二兩酒浸去皮骨令炙黃色右為細散每服食前以薄荷湯調下二錢忌熱麫雞猪魚蒜麻黃湯出聖濟總録治風瘙痒癮疹時時發動麻黃去根節煎掠去沫焙黃連去鬚桂去麤皮當歸切焙羌活去蘆白芷各一兩王不留行甘草炙芎藭白蒺䔧天雄炮製去皮臍各一兩半桑根白皮石膏各二兩紅藍花炮半兩桂去麤皮右剉如麻豆每服三錢水一盞生薑三片煎至七分去滓温服升麻犀角膏療風熱毒氣痒衝出皮膚瘙卽病丙穩禾疹赤起兼有黃水出後結為膿窠痛悉主之升麻犀角屑白斂漏蘆枳實連翹生蛇銜草乾薑一作藍葉芒硝研湯澄下各二兩黃芩三兩梔子三十枚擘右㕮咀以竹瀝二升浸一宿以煉成猪脂五升煎令竹瀝水氣盡絞去滓内芒硝攪令凝膏成用摩患處日五六度益加一方有大黃藍葉無乾薑治癮疹痒痛方出千金方大黃升麻黃蘖當歸防風黃芩芍藥青木香甘草各二兩楓香五兩芒硝一兩地黃汁一升右㕮咀以水一斗煮取三升半去滓下芒硝令消帛染搨病一炊時日四五度青羊脂膏出千金方治風熱赤疹搔之遂手作成瘡青羊脂四兩甘草芍藥各三兩寒水石白芷白芨黃莽防風黃耆升麻各四兩竹葉切石膏各一升右㕮咀先以水八升煮石膏竹葉取四升去滓浸諸藥以不中水猪脂二升令煎膏成傅病上良佳胡麻散出危氏方治氣血風熱癮疹瘙痒胡麻子十二兩苦參荆芥穗何首烏各八兩葳靈仙防風石菖蒲牛旁子炒菊花蔓荆子蒺䔧炒去刺甘草炙各六兩右為末每服二錢食後薄荷湯㸃服之或好清茶亦得秦艽丸聖濟總録治風瘙病丙穩禾疹搔之愈甚秦艽去苗土防己松脂煉成者各一兩半枳殻去穣麩炒蒺䔧子炒去角各一兩半苦參白术芎藭防風去义附子炮製去皮臍蒴藋乾薑炮各一兩右為末煉蜜和丸如桐子大每服二十丸温酒下漸加至三十丸早晚食前各一服羚羊角散出聖惠方治風癮疹遍身痒痛心胸滿悶羚羊角屑白鮮皮防風去义麻黃去根節羌活白蒺䔧微炒去刺甘草炙微赤剉各一兩黃芩人參杏仁酒浸去皮尖雙仁麩炒㣲黄生乾地黃各三分枳殻半兩麩炒微黃去穣右㕮咀每服四錢以水一中盞煎至五分去滓入酒一合更煎一兩沸不計時候温服犀角散出聖惠方治風癮疹心悶犀角屑川升麻防風去义𤣥參白鮮皮景天花白蒺梨微炒去刺人參去蘆沙參去蘆牛黃細研各一兩甘草炙微赤剉馬牙硝各半兩右為細末研入牛黃令勻每服不計時候以竹葉湯下二錢楓香丸出聖惠方治風病丙穩禾疹不可忍楓香白蒺䔧微炒去刺白鮮皮蛇床子羚羊角屑各一兩川烏頭炮製去皮臍藁本仙靈皮小荆子莽草微炒赤箭景天花各半兩右為末煉蜜丸如桐子大每於食後以温漿水下三十丸加味羌活飲出三因方治風寒暑濕外搏肌膚發為癮疹増發熱遍體瘙痒隨臟氣虛實或白或赤心迷悶亂口苦咽乾前胡一兩羌活人參桔梗甘草炙枳殻麩炒川藭天麻茯苓各半兩蟬蛻去頭薄荷各三錢右為末每服二大錢水一盞薑三片煎七分不拘時服莽草膏出聖惠方治身體赤癮疹而瘙痒隨手腫起皮膚生㾦㿔疼痛莽草二分當歸芎藭大㦸細辛芍藥芫花蜀椒附子躑躅各四分猪膏二升半右㕮咀以酒浸一宿猪膏煎之候附子色黃膏成去滓以傅病上日三一方有蒴藋同醋煎天麻散出聖惠方治風熱病丙穩禾疹天麻川藭川升麻半夏製各三錢防風細辛羌活荆芥穗蟬蛻去足嘴甘草焙各二錢右細剉每服二錢薑三片水煎服挾寒者加官桂挾暑者加柴胡黃芩挾濕者加茯苓蒼木麻黃湯出聖濟總録治風瘙痒癮疹搔之隨手起痒痛煩悶麻黃去根節三兩防風去义二兩芎藭烏啄炮製去皮臍獨活芍藥當歸切焙蒺䔧子炒甘草炙人參各一兩右剉如麻豆每服五錢以水一盞半入生薑三片煎五分去滓温服日再一方止用水煮服之忌生冷油膩冷物枳實丸出聖濟總録治風瘙癮疹頭面腫痒枳實去穣麩炒一兩半天門冬去心焙獨活去蘆蒺䔧子炒人參防風去义桔梗炒各一兩半黃連去鬚薏苡仁炒各一兩桂去麤皮右為末煉蜜和丸如桐子大每服十五丸粟米飲或温酒下日再不拘時候升麻膏出聖惠方治熱風毒氣衝出皮膚搔卽癮疹赤起生瘡兼有黃水結為膿窠痛悉主之升麻白微漏蘆去蘆連翹芒硝黃芩去黑心蛇銜枳殻麩炒去穰各三兩山梔子四十枚蒴藋四兩右細剉以水三升煎候水涸去滓乾磁器中盛遇有疾塗之楓香洗湯出聖惠方治風癮疹楓香半斤芎藭川大黃黃芩苦參當歸川升麻甘草麝香各二兩蛇床子一兩右並生用為散每用五兩以水一斗煮取五升去滓乘熱洗病處日二度用之防風湯出聖惠方治瘙病丙穩禾皮膚痒痛心神煩悶防風去义黃耆剉犀角鎊升麻漏蘆去蘆秦艽去土各一兩半烏蛇酒浸去皮骨芒硝研枳殻去穣麩炒各二兩右㕮咀每服五錢以水一盞半煎至一盞去滓温服日再一方有白蒺䔧無升麻雷丸散一名丹參散出聖惠方治風瘙皮膚癮疹疼痛赤腆瘙痒隨搔生瘡雷丸人參苦參牛膝酒浸切焙白附子炮防風去义白花蛇酒浸去皮骨炙甘草炙剉各二兩丹參半兩右為散每服二錢食前温酒調下天雄丸出千金方治風瘙癮疹心中煩悶恍惚不寧天雄炮製去皮臍一兩防風去义一兩牛膝酒浸切焙桂去粗皮乾薑炮細辛去苖葉人參各三分栝蔞根五分白术二兩右為末煉蜜和丸如桐子大毎服二十丸空腹米飲下日二服一方加知母為末酒調服半錢枳實丸一名獨活丸出聖濟總録治風熱頭面身體瘙痒癮疹方見風㾦㿔類治身痒癮疹不止者本草以天名精揩之立已治癮疹本草以楮莖單煮洗浴治風瘙癮疹淋洗方一方馬蘭浴湯出聖惠方馬蘭子一方用花蒴藋礬石茺蔚子蒺䔧子茵芋羊桃篇竹各二兩右㕮咀以漿水二斗煮取一斗二升内礬石洗之日三又方蒴藋防風羊桃石南茵芋芫花蒺䔧礬石各一兩右㕮咀以漿水一斗煮取五升去滓内礬石令小沸温浴之塗擦雄黃丸出御藥院治髮際内諸痒瘡及膚起病丙穩禾疹痒不可忍每用少許臨卧塗擦患處以痒住為度猪肪脂三兩天麻香白芷各三兩輕粉二錢黃蠟雄黃各五錢麝香半兩巴豆五箇重半錢右以猪肪脂煮天麻白芷巴豆黃色濾去豆等不用澄清入下項輕粉等四味和勻放冷為度醉仙散聖濟總録治風遍身癮疹瘙痒麻木方見大風癩病類白术浴湯出千金方治癮疹諸症未瘥白术三兩戎鹽一作蒴藋礬石搥碎各半兩黃連去鬚黃芩去黑心細辛去苗葉芎藭茵芋各一兩右細剉以水二斗煮取一斗去滓淋洗一方有茵草蒴藋湯治延年塗風疹蒴藋根蒺䔧子羊桃切楮枝切茺蔚子石鹽各半兩辛夷仁礬石各三兩右水一斗煮取三升去滓内鹽攪令消用塗風疹上下塗之一方有兔藿枳實丸出聖惠方主風熱氣發衝頭面熱皮膚生風疹瘙痒盛生瘡不能飲食枳實炙蒺䔧子苦參各六分人參四分獨活天門冬去心茵桂各三分白术四分右