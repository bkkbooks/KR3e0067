body:
  text: 普濟方卷三百七十三明周王朱橚撰嬰孩驚風門總論夫驚者七情中之一也古人於小兒論中不言喜怒悲憂思恐而獨言驚者小兒初生氣脈未定精神未全天之所稟者混然一真七情雖具而有愛著惟念乳食餘無所知喜怒悲憂思恐皆動於中惟驚從外來神氣無雜一有所觸悸動不安啼呌搐搦嘗原喜思恐字皆從心驚之為字從馬古人因字命名亦有深意蓋惡之馬也適於善則為善適於惡則為惡其機甚可畏也驚之為病有慢有急留於陽則為急伏於隂則為慢亦猶馬之有善惡也馬以喻氣非銜轡則不能制驚之為病非藥石則不能調信之不可以不善猶驚之不可以或有也是以驚風有急慢二證而古方上曰隂陽二癎所謂隂陽者急慢之異名耳沉嬰孩十嵗以下曰癎十嵗以上曰癲陽屬腑陽證俗曰急驚其證身熱面赤發驚則搐搦兩目上視牙關緊硬宜用涼藥隂癎屬臟俗曰慢驚其證因吐與㵼或不㵼積日漸因而至脾虛不甚搐搦目微上視手足振動宜用溫藥不可一槩治施也嘗見後人不明乎此但知急驚用涼藥不知太過則反成慢驚至於慢驚但知用溫劑不知太過則反成急驚迸無定用見藥殊逆縱能取效於目前而不知釀成癎癲為終身之痼疾欲全嬰者幸加意焉驚積者受驚日久而積成之其狀額上有汗喘息煩渴潮熱往來肚皮中覺腹內有物跳動瀉下如白豆沙是也治法輕量重而踈導之邪調氣知味取愈大凡小兒肚或熱脹或硬皆為內實法當利天釣壯熱驚悸眼目翻騰手足抽掣或啼或笑喜怒不常甚者爪甲皆青如祟之狀蓋由乳母酒麵肉過度煩毒之氣入乳遄復乳兒遂使心肺生熱痰欎氣滯加之外挾風邪致有此耳法解利風熱取愈驚瘹復痛多啼唇黑囊腫傴僂反張眼紅筋斑血者是善寒氣壅結兼驚風而得之又盤腹氣與蟲證亦令腹痛多啼傴僂相若但盤氣痛則腰曲乾啼額上有汗是小腹為冷氣所摶然爾蟲痛則嘔吐清水沫痛有去來是疳化為蛔臟腑留滯然而內瘹用調氣踈風鎮驚之劑盤腸氣用溫和調氣之劑蟲證用殺蟲之劑驚熱者內藴實熱勃驚甚則搐掣變蒸徴驚以其熱成得之但與輕藥或不治亦愈通關定驚方論云諸搐風搐搦關竅不通皆由痰寒中腕留滯百節所致痰致所謂潮寒者氣實使之治風痰雖不出南星半夏全蝎殭蠶數輩亦須先用蘇合香丸入硃砂少許以薑汁浸薄荷湯調和與之蓋使氣下則痰下痰下則關自通若搐鼻不嚏者不治王氏曰退熱踈風凡驚搐多因感冒風熱欎於表以致熱極生風當以先解表通熱人參羌活散加麻黃荆芥得王氏惺惺散加荆芥麻黃小柴胡湯枳羌防風表汗加麻黃裏熱加大黃本方青龍湯解肌湯加麻黃生蔥金銀薄荷湯下又曰驚風難治凡小兒驚風緊急先用搐鼻則驚病熱稍定仍用退熱踈風之藥蓋熱退痰下可免驚再潮之患柳氏曰驚風初作使用青龍三解散合和研玉餅子同服為要法驚風心虛情忪氣怯神散痰涎來去其㵼必青潮生風而未致風也驚邪入心則面紅臉赤惕惕夜啼驚邪入肝則面目俱青眼睛竄視驚邪入腎積垢靣黑惡呌嚙妳咬牙驚邪入肺則面色淡白喘息氣之驚邪入脾則嘔吐不食虛汗多睡面色淡黃據脈觀意虛則散而濡實則數而滑治法鎮驚化痰安神定志須究竟某臟受病之處而調理之然有所謂溫驚則有所謂涼驚虛者補之實者利之熱者涼之是為活法睡中驚啼聲浮者易治聲不沉響者全急慢脾風不治證眼陷光白睛灌人爪人甲青黑四肢垂嚲一嵗既絶不可強用藥面赤而緋面青背冷頭目仰後足冷目青腹肚胸髙手拏胸膈唇舌黑急口氣粗𩕄陷啼哭無淚冷汗不止如珠如油眼青瀉黑悶痰入心肺噓舌出口咬乳效人五硬五軟五冷五乾急驚為證目睛畨轉口中出血兩足擺跳腹肚搐或神慢而摸體尋衣或證四能而神昏氣促噴藥不下通關不嚏心中痛絶魚口鴉聲左右搐逆小兒驚風死候歌曰小兒驚風候指甲青兼黑似煙口吐白蟲便黑血眼開不開半擡肩白日咬人多驚汗夜作鴉聲不得眠又小兒驚死候歌曰項軟多無力喉中似鋸枋面紅粧色見目睛杳無光口開粗氣腳跟直偏長摸衣胡亂咬瘀血瀉床暗開還又閉渾身便似十般驚候病體用更思量又歌曰壯熱頭拖不舉頭目黃眼澀也堪憂又時哯妳廉翻食四體如水痛入喉須信本因驚患得連綿日久更何求只應命盡歸泉壤脈亂浮洪却似鈎患驚風痰熱瘛癎痙癲此八種候惟痙與痓少有識者類同驚風發作之狀痓手腳氷冷痙舉身僵癎癲不殊目瞪涎手足搐搦急風為疾其證有四有驚有風有痰有熱或有驚有風而生痰作熱或有熱而因驚生風成痰或積痰欎熱熱極生風而轉驚或素有風痰因驚風而發熱孩童之患不外乎是醫家於其暴作即當察其所因疏風化痰散熱鎮驚四證相須用藥斟酌古人處方各有深意後學宗之隨症施治然以疏風散熱為主如兼有痰涎尚未轉驚者只化其痰不得妄投驚藥何也鎮驚之藥性多寒涼經絡本自無恙反因攻擊痰涎風熱乘虛而入於經絡却成搐搦為難愈也嬰孩五臟經絡即生風既所虛受其驚故自然而作驚風且作八候次第而生焉所謂兒童無病不可與服攻擊峻厲之藥嬰孩有大小有壯弱驚風發作有淺深有重輕大者加分劑重者多於服數乃合其理嬰孩聞響即掣跳者乃肝肺不足魂魄不稔故有不安聞響掣跳者非謂驚也犀角地黃丸主之又小兒心氣虛怯神不安定連併掣跳者宜與四君子加辰砂脾胃氣壯盛神魂俱清自然不恐嬰孩欲登驚風候先神不定顧左覷右覷上及下或定其睛凝其神恍惚惻怛人不若常目覷嬉者急當療之如有熱先退熱如有驚先散驚熱退不生痰驚散不作風良久自然安定神情和恱氣脈舒暢須知風變而理驚痰盛而退熱病勢尚緩未至四證俱全猶可療治嬰孩有患風痙風中等證候皆上竄拳搐號曰天吊書載甚多初無痰後初作搐後不搐不拳真皆風之惡候已是傳過若作驚風更與下之為必也驚風諸證候盡皆往但神情昏氣不足者未可保治驚風證候住其手拈物不拾睛轉緩緩於中非謂十全必有再發之候如再發不可施治矣驚風屎已遺者難治大小便閉者易治也驚熱併風痰未發隂陽二癎之前醫者即先與化痰禦風退熱利驚此隨病推究不惟繁難乃無法施治是故難於療理若已得病於證何憑凡此四證相隨不可攻其一也利其一也利其驚則風縱退其熱則痰久尋理未究竟忽一日省悟錢氏方宣風散正為此等孩兒病設有痰即壅有熱即閉有驚即悶昏昏沉沉輕藥不能散重劑恐傷害但服踈風散較之宣風欠一味一服之間風痰驚熱皆消去神情慶恱四體知安觀其此藥似有虎狼用之即何順推痰利驚散風解熱只與一服不移其時可見功效嘗見醫工調治此等證候多是疑二進退怯懼若過其時遲其日症候傳變驚風作風生痰自痰壅熱自聚或慢入候相從反覆變遞至發越之時不得而進此藥然踈風所療四證相待如賊方會極力一衡盡使散敗不至於作害耳聚而自散流入諸經脈故作搐搦引掣等證矣小兒驚風證可醫者十一非時竄眼驚入肝何以知在肝肝主筋肝受驚故搐於眼眼是肝之外應故非瀉時眼必糞青白夢裏咬牙驚入腎何以知在腎青齒也其齒也癢及夜屬隂乃咬牙故知驚入腎也夜啼之曉驚入小腸何以知在小腸是心之腑心屬南方丙隂陽相尅故入小腸至曉乃歇日屬陽夜屬隂乃相尅故啼爾面青下白驚入膽膽屬目其膽是肝腑故面青下白而知在膽必須吐而已氣喘噄水者則是肺虛熱故知在肺要噄水也臉靣紅赤驚入心何以知入心其心屬火又主血外應臉故令面赤是知入心也喘氣驚入肺何以知入肺其喘即是肺也肝屬木肺屬金故知隂傷陽也其人當糞青睡時手腳但搐不定如治驚宜下洗肝圗散矣前後五心熱驚入肝何以知入肝胃俱像土胃四肢故主脾故之入脾胃者是脾之腑其人必當吐後發熱不時是也喉內如鋸驚入大腸何以知入大腸大腸是肺之腑肺為諸臟之上蓋又主於氣入大腸上衡咽喉作聲如響如無痰故驚入大腸宜不助驚積藥無時乾嘔驚入胃何以知入胃以其胃在咽喉下主化榖食被驚風入其肺則癢而時時乾嘔故知在胃也宜調胃氣後下驚風藥睡中哭泣驚在三焦何以知在三焦其三焦狀只是脂膜睡著時上焦被驚邪所干即乃驚起而哭故知此患在於三焦證後日久自差只宜下驚藥也又證小兒驚風不可醫者非一驚風爪黑不驚其爪甲主肝肝絶雖不驚爪甲黑不醫者一為血不癊則爪甲十無一存也驚風㵼黑血不醫此為心絶心主血心絶則不能榮於血此人不得一周時也何以知之心是五臟之主主若絶故只得一日即死也驚風自汗盜汗不醫何以不醫汗者主於氣是衛之所係也衛既不管於氣故令汗出不止數日而死耳驚風急作鴉聲不醫此為肺絶只有出而不回肺亦主聲肺絶一去而無回其人三日必死也驚風咬人不醫其咬人者是骨絶腎主骨其應在齒此其骨若絶故令齒癢則咬人約七日死出則遲故在七日矣驚風眼半含不醫此謂之腎絶腎是五臟之根本外應其眼其腎絶則眼無光不能開閉其眼四日而死何以知之腎屬北方而首東其病從下上故知只四日而死驚風口唇乾黑不醫此為脾絶何以知脾絶脾主津液津液無乃知是脾絶兩日而死死時須寅卯時木尅土也凡是驚者則身體壯熱卧則驚呌不時脾風多因土而得必有風痰急驚風痰驚只是中外邪也慢驚風者是虛積主治驚熱之所為也論小兒其脈急數驚者乃腎受驚熱之氣流灌於心中心為啼主不受解搦既受觸若便生風素問云腎主恐小兒絶凡受觸搦便有面青呵吹淚孩童面青色是驚若一次受驚看太陽側青脈朝眼是也男左女右第二次受驚山根上青脈是也第三次受驚時下臉連金匱受有青見是也三處皆有青者皆是受驚極候主小兒睡驚擲見人恐怖咬齒無時候內有涎渾身抽掣手足瘛瘲吐食非時吐舌將手拏人多不住凡有此者皆驚候若小兒風熱盛乃驚痰流灌肝心二臟令小兒忽然眼目上視手足急搐惡呌暴絶悶死名風候宜與壓涎乳香散二服次與生銀丸三服下驚涎若小兒臟腑虛薄驚涎灌心絶絡令兒眼目緩慢手足微動喉內涎響渾身不熱是慢驚風候宜與生銀丸次與鎮心丸若驚風死候則其脈絃大急口開鹿喉中如牽鋸項軟無力腳面直𩕄目似開不開瀉如痢血身體軟無力已上並是死候不可用藥醫救小兒急慢驚風古書無之惟曰隂陽癎所謂急慢驚者後世名之耳正如赤白痢之類是陽動而速故曰急驚隂靜而緩故曰慢驚此隂陽虛實寒熱分别治之不可誤夫急驚由於熱熱即生風有或因驚而發則目上逆流涎潮熱搐搦身體與口中氣皆熱及其發定或睡起即了了如故此急驚證曰當其搐勢漸減時與鎮心治熱用藥一二服候其驚勢已定須臾以藥下其痰熱痢下痰熱心神安寧即愈慢驚得於大病吐㵼之後或誤取轉則脾胃虛損風邪乘之似搐而不睡而精神慢四肢與口中氣皆熱合睡露睛或胃痛而啼哭無聲此證已危蓋脾胃虛損故也一切驚風潤體圎幼幼熟書治諸風手足不隨神志昏憒語言寒澀口眼喎僻筋脈急骨節煩痛疼頭旋眩暈恍惚不寧健忘怔忪痰壅滯及皮膚頑厚黃痺不仁小兒驚風諸癎雄黃辰砂各水飛牛黃乳香生犀末羚羊角末沉香麝香七味各另研如粉木香丁香藿香葉白龍腦别研極細檳榔肉豆寇仁白殭蠶微炒蒺䔧子去白皮各一兩蔓荆子微炒人參兩半大黨黑附子炮裂去皮臍尖一兩羌活銼去蘆頭白附子桂去粗皮各一兩半防風去蘆頭枝一兩麻黃去根節一兩白茯苓去黑皮晚蠶蛾微炒一兩半乾蝎微炒半夏水浸三十次大者薄切焙製用生薑汁炒川烏頭炮裂去皮臍尖搗碎炒黃已上各一兩半白花蛇灑浸去皮取肉骨天麻去苗各三兩白豆寇仁南畨琥珀别研如粉珍珠别研末如粉獨活去蘆各三兩金箔六十片如鶯衣右為細末研藥令勻煉蜜搜和為丸雞頭子大每服一丸細嚼溫酒下荆芥茶下亦得加至二丸如破傷中風拳強手搐口噤發癎即以熱豆淋化破三丸斡口開灌下少時再服汗出乃愈若小兒驚風諸癎每服半丸薄荷湯化下不拘時候服大聖奪命金丹治驚風至重者急慢驚風癲癎天瘹客忤物忤中惡初生臍風撮口著噤胎驚胎癎牙關閉緊急驚風熱搐搦掣頭反引竄視昏悶不醒但是一地驚風危惡者緊急之證並治之其效如神其他驚藥功力俱不及此真起死回生良劑天麻炮全蝎去蘆羌活天南星大者白附子炮茯神白殭蠶炮川芎逺肉桔梗去蘆石菖蒲半夏生人參去蘆白术白茯苓去皮烏蛇尾酒浸炙五錢酸棗仁炒荆芥穗北細大川烏炮炙粉草三錢大赤足蜈蚣一條薄荷汁浸焙已上除全蝎蛇尾蜈蚣外餘藥各製同研細為末入全蝎三味如法研細方入後藥辰砂三錢龍腦三錢珍珠三錢銀箔四十片真琥珀三錢麝香一錢已上於乳鉢內細研和合令勻薑汁麯糊丸硃砂為衣金銀箔薄荷湯研化服如欲存久宜安暖處常加晒焙免失藥味驚風牙關不開搐藥不嚏以藥入搐鼻關開至聖奪命丹治驚風重者急慢驚癎中惡客忤愡􅀈口眼喎斜痰壅搐掣等證人參去蘆五錢白术三錢天麻炮三錢全蝎去毒三錢防風去蘆三錢羌活三錢北細辛去葉三錢獨活荆芥穗茯神三錢川烏炒去皮三錢半夏湯泡五錢殭蠶炒三錢酸棗仁炒逺志肉川芎白附子炒川白芷桔梗去蘆甘草石菖蒲各三錢蟬蛻四十右各製月為末去土雄黃一錢金箔三片銀箔三十片麝香一錢右四味乳鉢內炒白茯苓去皮三錢右合和令勻薑汁麵糊圎硃砂為衣臨用研化金銀箔薄荷湯下搐不正雞冠血下蛀皂角子下雄黃丹出幼幼新書治小兒驚風雄黃硃砂麝香各研膩粉各半兩白附子半夏湯洗七遍天南星炮川烏頭生去皮臍乾蝎羌活天麻附子川烏肉桂去粗皮白殭蠶木香白鮮皮烏頭花蛇並酒浸去皮骨取肉用已上各一兩巴豆半兩去心膜薄荷汁煮五七十沸淨洗紙裹出油用右為末令月粟米粥為丸如菉豆大常服茶酒下三丸冷氣生薑湯下宿食不消橘皮湯下大小遍通甘草豆淋酒下急風薄荷酒下癱綬豆淋酒下酒食傷生薑湯下風眼淡竹葉湯下元氣茴香酒下血氣芥下或醋湯祕澀生薑湯下白痢椒湯下坐間便退風頭槐枝湯下風疹蜜酒下赤白痢二宜湯下頭痛傷寒鹽湯下赤痢甘草湯下小兒疳米飲下治風古眼井水下小兒風眼古井水煎淡竹葉湯下小兒驚風薄荷乳汁下天竺黃丸出衛生家寶方治小兒驚風天竺黃三錢蛇肉一分酒浸拆肉如有花蛇肉便妙金箔十片全蝎一分炒人參一分鐵粉一分硃砂牛黃一錢最要真正者蜈蚣一條赤足者麝香半字腦一字天麻一分右為末用酒煮天麻糊為丸蘿蔔子大臨卧用薄荷湯下或十粒或十五粒神效如涎盛不能吞丸子即用薄荷湯化開服之心脾散出楊氏家藏方治小兒脾困昏睡面色青白內生虛風不進乳食人參去蘆頭白藊豆白术白附子炮天麻酸棗仁生用已上六味各等分右件為末每服半錢煎生薑棗湯調下乳食煎大鎮心丸出御藥院治小兒精神不爽寢寐心驚心忪恐悸四肢戰掉舉動欲倒狀類暗風或煩躁而多啼退驚風化痰涎壯心氣益精神生犀鎊末鐵粉研各一兩羚羊角鎊末龜甲鎊末赤剪鎊末麝香研菖蒲各兩半牛黃研茯神去木逺志去心珍珠研龍腦研天竺黃研肉桂去粗皮蛇蛻皮全者人參各一分金箔研丹參研半分銀箔各五片右為末煉蜜丸如梧桐子大每服一丸至二丸食後臨卧薄荷湯化下更量大小加減牛黃丸出外新書化風涎治積年心焦諸癎風癲謬忘昏亂急小兒驚風益精神開心志鎮驚消痰牛黃一分犀角屑一分羚羊角屑一分雄黃一分腦麝各半分人參一分硼砂一分鐵粉一分鉛霜一分金箔五十片鬱金一分膩粉一分白礬一分辰砂一分天南星去皮心骰子大入良熟黃牛膽內懸東坑方上百日令乾取三兩未乾則曝令乾如急要用天南星末膳汁和為餅曝乾用右為末服一字小兒半字薄荷湯調下中風涎甚及心疾每服一錢小兒一字薄荷湯或自然汁調下如中風吐涎臨時加膩粉半錢同服黑神丸出幼幼新書治一切左癱右瘓小兒驚風婦人産後中風心神恍惚頭目昏眩常服活血駐顔及治傷風鼻塞頭痛善治山嵐瘴氣其效如神桔梗麻黃去節防風香白芷木賊桂枝去皮紅豆縮砂仁金墨已上各四兩大川烏頭湯洗去皮劑一片天南星灰炮製黃為度半箇天台烏藥沉香各一兩麝香一錢右為末煉蜜為丸如龍眼大每服半丸蔥白一寸同嚼茶酒任下不計時候三解散治夾驚夾食寒傷刀瘡驚風痰熱等候一解驚風二解積熱三解傷寒藥性稍涼虛者莫服白附子炮三錢防風去蘆三錢黃芩三錢桔梗去蘆三錢人參去蘆三錢全蝎五錢薄荷汁炙北細辛三錢去土葉厚朴五錢薑製縮砂仁五錢赤芍藥三錢粉草二錢鬱金三錢皂角水煮麯餅五錢半夏麯五錢已上為末薑汁作餅子晒乾右為末金銀箔薄荷湯下大便不通加大黃枳殼急驚痰壅加南星半夏驚搐不止加金銀薄下雞冠血下裏熱壅實搐盛加大黃雄黃硃砂煎麥門冬湯入竹瀝下驚風不語石菖蒲湯下食積熱酒餅湯調下驚風緊急大熱不退用青龍湯下解肌湯同下謂之和解搐不止加全蝎二箇不蛀皂角子七粒驚風內虧紫蘇鈎藤湯下驚風痰壅撩痰卒中昏悶玉餅子一名青龍餅聚寶散出御藥院方治小兒一切驚風壯熱涎多精神昏憒目睛