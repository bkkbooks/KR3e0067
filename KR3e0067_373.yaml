微清耳光冷眼澀常淚出仍多睡胸中不利卧而多驚無搐即寒柴胡升麻各二分麻黃三分吳茱萸地龍各半錢蝎尾一分生地黃半錢當歸身三錢甘草一分黃柏橘皮葛根連翹各一分右件咬咀都作一服水一􅊦半煎至一􅊦去滓乳食後熱服之後添喜笑精神出氣和順乳食進睡驚丸出幼幼新書孩兒驚風服藥後須睡一向然後取下驚涎立安白龍腦硃砂香墨青黛蘆薈各一錢膩粉一錢史君子兩箇麵褁煨為末右研細以寒食麵作糊丸如梧桐子大每服一嵗半丸二嵗已上一丸五嵗已上兩丸薄荷湯化下聖餅子出幼幼新書治驚天南星白附子五靈脂全蝎並各半兩蟬退生青黛各一錢麝香半錢右為細末用好醋一大盞煮煎成膏入藥末拌勻和丸如梧桐子大成餅子如未滿月一餅二嵗已下二餅看大小加減煎金銀薄荷湯下被蓋鼻上出汗立效桃紅丸出幼幼新書治諸驚石燕一分燕白糞白附子一錢硃砂一錢輕粉半錢黃連半兩巴豆入粒半油煎右為末粟米飯為丸如梧桐子大一嵗一丸驚薄荷湯下驚積膩粉湯齁䶎蜜蛇生酒煎下牛黃膏出幼幼新書治驚風雄黃天竺黃甘草白茯苓龍腦鬱金硃砂各等分右為末生蜜丸如皂子大一嵗一丸看大小薄荷湯化下萬病太乙歸魂散出幼幼新書治驚五靈脂木斃子肉粉霜硃砂各一錢膩粉一錢巴豆十五箇川烏取去心一小塊如棗大右為細末每服一字蛤粉冷水調下但是久積驚癎諸疾皆治青金丹出直指方踈風利痰蘆薈牙硝一錢史君子三箇南硼砂輕粉半錢蝎稍十四箇右為細末香墨水丸麻子大每服一丸薄荷湯泡下涼肝丸出危氏方理治緣肝經風宜先涼膈肝風自退而色青乃肝風作宜用凡是肝痰者便用眼疾屬肝亦宜用又可加減用如眼疾加梔子膽草無妨龍膽草三錢當歸去蘆川芎山梔子仁羌活防風去蘆各五錢右為末蜜丸沙糖竹葉湯下一方無當歸㵼青丸治竄視發搐痰熱每服一丸薄荷湯化下珍珠丸出幼幼新方治驚風鎮心用北寒水石硬者細研如粉以雪水浸三宿又研以水澄下腳為度再取五錢為末傾出紙上攤一宿收入磁合內每服一字以雞子清為丸仍以雞子清磨下大熱方可服太乙硃砂丹出幼幼新書治小兒驚風壯熱涎盛發癎手足搐搦目睛上視及風壅實心膈滿悶嘔吐痰涎大便祕澀黑鉛煉十遍稱二兩水銀結砂子分為小塊同甘草水煮半兩冷取出研去甘草水銀結砂子鐵粉各三兩甘草十兩同煮鉛硃砂研半兩膩粉研一兩右同研勻以麵糊為丸如麻子大每一嵗兒服一丸薄荷湯蜜湯下微利為度未利再服食後萬金丹治小兒驚風鎮心丸十丸天麻防風丸十五丸牛黃清心丸十丸抱龍丸十丸麝香半兩龍腦半錢硃砂為衣右一處每丸如粟米大每服三丸十嵗已上五丸以下者二三丸薄荷湯送下虎睛丸出醫妙選治心膈挾痰者虎睛一對乾為末續隨子一分乾蝎一分粉霜一分青黛一分麝香一分珍珠一分右拌勻研細軟粳米飯和如黍米大每服五粒至七粒薄荷湯下更量大小加減服之大青丹出醫妙選治潮發荏苒不瘥蝎稍一分白附子一分白殭蠶一分乾蝦蟆二箇木香一分檳榔一分續隨子一分右一處拌勻用糯米飯和如黍米大每服十粒點麝香薄荷湯量兒大小加減麻黃湯出醫妙選祛風爽精神麻黃一兩防風一兩大川附子一枚重半兩羌活半兩黃芩一分甘草一分右為粗末每服一大錢水一盞入生薑三片薄荷兩葉煎至五分去滓稍熱時時灌之溫白丸出直指方驅風豁痰人參防風白附子生直殭蠶全蝎一錢南星天麻各三錢右為末飛白麵糊為丸如梧桐子大每服一丸薑湯化下黃耆湯出幼幼新書治小兒七日以後驚患吐哯眼中淚黃蓍芍藥芎藭黃芩當歸一分細辛右水八合煮取七合用牛黃一小豆大為四服若生二七日已上熱多者加一分生三七日而腦聚唾口青熱甚者加黃芩黃耆各三益水二合煮四合一嵗已上盜意增水藥服之睡驚丸出幼幼新書治小兒一切驚疳食積風癎之症史君子五箇金箔五片銀箔五片一方十片京墨腦麝各半錢膩粉二錢右研如粉生麵糊丸豌豆大每服一丸溫水化破下一方薄荷湯下或膈上有涎即吐出腹中有積滯即瀉而蝦蟆青苔之類天假驚風一切不須三服必效如小兒有疾即灌良久更睡如睡驚常服一丸分兩服小兒則間日可服半丸極妙一方不用腦子睡驚丸出幼幼新書治小兒驚渾身壯熱但染著驚便與服之粉霜京墨燒過蘆薈半錢南星一錢巴豆二粒史君子四箇右入麝腦少許水丸梧桐子大一嵗半丸量兒大小金銀薄荷湯化下三嵗已上一丸治小兒童子一百二十般難驚出幼幼新書天南星青黛麝香少許水銀一粒赤豆水輕粉一錢巴豆七粒右為末一處用煮麵糊為丸如菉豆大十嵗已下至一嵗已上每服十丸用生蔥湯吞下早晨日午至晚連霜空心各進一服生母皆忌生冷莧菜炙溥淹藏花色酒肉又云十五以下至七嵗十五丸七嵗已下至周嵗十丸周嵗以下至百日七丸皆蔥白湯下乳母依前百日以下至滿月五丸荆芥湯下滿月至三朝三丸用蜜薑汁少許調下以上日客空心日進三服但是不安看輕重加減與服金箔鎮心丸出幼幼新書治小兒一切驚風夜睡不穩喉中涎聲夢中狂呌精神躁並宜服之此藥不涼兼醒過一百日後四五日間服半丸甚妙如睡不穩便宜服之白附子一分白殭蠶半兩硃砂研腦麝少許金銀箔十片牛黃半錢右為細末麵糊為丸如梧桐子大留硃砂一半為衣服一丸或半丸煎薄荷湯化下臨卧一方無牛黃一丸分作兩服蜂蜜薄荷熟水磨下如天釣驚疾發一丸只作一服又名大驚丸硃砂丸出幼幼新書治小兒鎮心壓驚墜涎硃砂細研急水飛過俟灰池滲乾尤佳白殭蠶去絲直者洗過焙乾新羅白附子以濕紙褁煨候冷紙乾取出細切成片子焙乾天南星炮裂去粗皮臍切成片子各半兩麝香半錢研和勻乾蝎一兩銚慢小炒令極熱不可大過右驚取下後且以此六味藥研勻為細末與之一二服無不見效或有虛汗出者用麻黃根煎湯調送下亦妙七寶丹出幼幼新書治小兒退驚化痰硃砂生犀末牛黃珍珠末腦麝各一錢金箔右研如粉每服半錢薄荷水調下硃砂膏出幼幼新書治驚硃砂馬牙硝甘草炙各一錢甜硝一錢硼砂半錢腦麝各少許右為末煉蜜為丸如梧桐子大看大小薄荷湯化下一丸或半丸紫霜丸出幼幼新書治驚風紫粉天竺黃甘草炙茯苓硃砂各等分龍腦少許右為細末煉蜜為丸如皂子大一嵗半丸薄荷湯化下牛黃丸出幼幼新書治驚鎮心全蝎一箇巴豆二粒牛黃雄黃銀粉硃砂各一錢右為細末用蒸餅心丸如菉豆大每服三丸薄荷湯下驚呌夜啼煎燈心石蓮心湯下治小兒驚退後手足攣屈不能舒展出幼幼新書羌活芎窮當歸微炒防風天麻甘草炙已上各三分白附子炮一分右為細末每服一錢以薄荷湯酒少許調下日三服量大小加減神聖當歸散出幼幼新書治驚風癎咽喉有涎四肢壯熱大小便祕澀兼心神亂者當歸甘草滑石通草各一分大黃芍藥各三錢右為細末每服二錢水一盞生薑三片薄荷三藥燈心少許同煎至五分量兒分數服大人作一服虀半散出幼幼新書治驚風涎潮搐搦大人亦可服去涎去風半夏二兩厚朴二兩右二味用漿水一斗煮一復時去厚朴用半夏為末入真正腦子少許和藥周嵗半錢臘茶清調下日二服不妨非風候不入腦子普濟方卷三百七十三
