皮膚風毒結聚腫痛溫酒下偏頭疼夾腦風臘茶清下婦人血疰風四肢攻或痛或癢心腹刺痛當歸酒下並早晚食後服袐傳羌活散治一切風證甘草黃芩鼠毛者生地黃肥者連翅山梔子蔓荆子當歸滑石桂府者香白芷湯洗荆芥石膏明者用薄荷吉州羌活台芎水洗赤芍藥獨活麻黃陳皮桔梗防風右各等分㕮咀每服一兩二錢初服之時必加大黃朴硝動臟腑數行用溫粥補之量病虛實加減春冬利數行夏微動一二行便補自後每日一貼不加大黃朴硝用水煎至分數如病人血色黑暗者多加當歸生地黃病人麻木處或刺痛甚多加羌活白芷麻黃白芍藥煎藥當用文武火於沙石器內煎存下藥滓晒乾多加朴消在內煎湯洗浴如無當歸以蘇木代之辟風丹出御藥院治諸風疾無問新久者半身不遂口眼喎斜語言蹇澀精神昏憒痰涎併多咽嗌不利及風虛頭目痛眩旋運欲倒或心忪健忘恍惚不寧手足麻痺顫掉無力筋脈拘急骨節煩疼行步艱難並宜服之獨活洗去土焙防風去蘆吳白芷麻黃去節微炒桂藁本二兩白芍藥去皮天麻各一兩川烏頭炮製去皮捶碎炒黃藿香葉洗淨甘草銼炒全蝎去毒炒黃白花蛇酒浸去皮骨各半兩川芎七錢羌活去苖白殭蠶炒逺志湯浸去心焙乾各半兩硃砂二兩為衣白附子炮製捶碎炙微黃牛膽南星炒黃各四兩右為細末煉蜜和丸每兩作十丸硃砂為衣每服一丸細嚼或化服用生薑湯下麝香亦得如破傷風豆淋酒下急風癎病人參湯下不拘時候此藥功效不可具述烏犀丸出聖惠方治一切風烏犀角屑半兩天麻一兩桂心一兩防風一兩去蘆羌活半兩附子一兩炮製人參一兩去蘆海桐皮一兩當歸一兩芎藭一兩乾蝎半兩微黃羚羊角屑一兩萆薢一兩銼藁本半兩蔓荆子半兩麻黃一兩去根白附子半兩炮製白殭蠶一兩微黃龍腦一分細研麝香一分細研右搗羅為末入龍腦麝香等研令勻煉蜜和杵三五百杵丸如櫻桃大每服一丸嚼破以薄荷酒下躑躅攣風出聖惠方治破傷脫節多疼肌肉頑痺或遍體瘡癬或疹風瘙宜服躑躅羌活防風去蘆芎藭杏仁酒浸去皮細辛當歸已上各一兩白斂白芨白芷丹參苦參玄參桂心附子去皮臍川烏頭去皮臍皂莢去黑皮漢椒去目莽草川大黃各半兩右件藥細銼以酒米一升拌勻溫繇三宿後以火炒慢令乾用臘月豬脂二斤以慢火同煎一日候藥味出盡以新布絞去滓更以綿濾過再入鐺中煎以柳木棍不住手攪成膏侯凝收於磁盒中每服一彈子大攣於病上如臘月煎之經久不壞也川芎石膏湯出醫藥集成治一切風熱上攻頭目昏眩或痛或悶或風痰喘嗽或目疾時發壅生或鼻塞口瘡燥多渴或便溺淋悶或瘡癬皴揭並宜服之清利頭目宣通氣血并一切風熱或中風偏枯能解中外諸邪所傷及調理汗病下之前後并汗後餘熱旁復傳染等疾川芎山梔子荆芥穗當歸切焙芍藥用生大黃五錢菊花人參白术各半兩井草三兩石膏防風去蘆薄荷葉連翅各一兩滑石四兩寒水石黃芩桔梗各三兩縮砂一分右為粗末每服三四錢水一盞煎六分去滓食後溫服日二三服或為細末溫水調下二三錢忌生薑醋發熱之物人參羌活散治一切風疾人參羌活防風半兩去蘆天麻三錢甘草半兩半夏一兩川烏半兩白芷半兩川芎半兩細辛四錢藁本半兩南星一兩白茯苓陳皮半兩天台烏藥半兩木香半兩另入枳殼半兩赤芍藥半兩當歸半兩右㕮咀每服四錢水一盞半生薑五片同煎至一盞入麝香少許攪勻空心食前服如手足疼痛加乳香沒藥如熱多加荆芥穗半兩大聖黑神丸治癱緩及一切風疾木香一兩躑躅花紫威花烏頭炮製去皮臍烏蛇酒浸去皮骨乾蝎一兩蒼术二兩防風二分白芷一兩麻黃去根二兩芎藭三兩厚朴去粗皮生薑炙二兩芫花一兩桂二兩芍藥一兩陳橘皮二兩天南星一兩吳茱茰一兩自然銅六兩右為末入自然銅末和勻煉蜜和杵三二百丸如雞頭大每服一丸溫酒化下日三服不飲酒薄荷湯下如傷風三日豆淋酒下連三防風羌活丸宜四時常服除風疾之病患防風羌活五加皮芍藥人參丹參薏苡仁玄參麥門冬去心四分乾地黃大黃青木香各六分松子仁磁石各分研檳榔子五分枳實炙八分牛膝茯神八分桂心八分右搗篩和蜜丸如梧桐子大以酒服十五丸日再服稍稍加至三十丸如度忌豬肉魚蒜生蔥􅀈蕪荑上提金治一切諸風甘草人參天麻芍藥薄荷荆芥川芎乳香沒藥白芷甘松鬱金䔧蘆桔梗甘菊花藁本茯苓防風細辛右各等分為細末每用少許嗅鼻內大效普濟方卷一百十四
