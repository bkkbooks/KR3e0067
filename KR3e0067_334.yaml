出聖濟總録治婦人月水欲下臍腹撮痛不可忍吳茱茰湯浸七遍焙乾三分當歸微炒桃仁去皮尖雙仁麩炒黃各一兩一分大黃銼碎微炒朴硝桂去粗皮牛膝去苖酒浸切焙黃耆銼芎藭人參各一兩右為末煉蜜和丸搗勻熱丸如梧桐子大空心酒下三十丸加至四十丸日三服或為散子溫酒調服一錢蓬莪茂散出聖惠方治婦人胞絡夙挾風冷每至月事來時臍腹多痛宜服蓬莪茂當歸銼微炒各一兩桂心芎藭牡丹皮木香延胡索赤石脂各半兩桂仁三分湯浸去皮尖雙仁麩炒微黃右為末每於食前溫酒調下一錢桃仁湯出聖濟總録治月事不利或將下小腹痛桃仁去皮尖雙仁麩炒微黃五枚乾薑炮製木香芍藥吳茱茰微炒當歸微炙各一兩甘草炙半兩桂去粗皮一兩半大黃銼碎炒熟二兩右粗搗篩每服二錢水一盞煎至七分去滓入硝少許更煎一兩沸溫服琥珀煎丸治婦人經水不行臍腹絞痛當歸芎藭熟地黃赤芍藥各一兩川楝子玄胡索蓬术琥珀另研各半兩香附子兩半右除琥珀在外八味用好酒各一大碗煮乾焙過研為細末入琥珀醋糊為丸如梧桐子大每服五十丸醋湯下空心服之熟乾黃散出聖惠方治婦人月水每來不得快利臍腹下疼痛不可忍熟乾地黃三分菴䕡子延胡索當歸銼微炒木香京三稜微煨銼蓬莪茂桂心赤芍藥各半兩右為散每服三錢以水一盞生薑半分煎至六分次入酒二合更煎三兩沸去滓食前稍熱服乾漆丸出聖惠方治婦人夙有血滯至月水來時臍腹疼痛乾漆一兩搗碎炒令煙出桃仁酒浸去皮尖雙仁麩炒微黃芫花醋拌炒令乾赤芍藥當歸銼微炒桂心各三分木香檳榔硇砂各半兩右為末醋煮麵糊為丸如梧桐子大每服不拘時候以生薑酒下七丸金漆丸出聖惠方治婦人夙血積滯每至月水來時臍下疼痛金漆硫磺沒藥鬼箭羽當歸銼微炒搗末各一兩水銀與硫磺絡為炒子細研硇砂細研各半兩巴豆一分去皮心紙裹壓去油狗膽四枚乾者搗碎右先將水銀砂子及巴豆同研勻以釅醋一升半熬金漆令稠下諸藥末和丸如梧桐子大每於食前溫酒下三丸當歸飲出聖濟總録治婦人月水不調及欲來臍下痛肢體煩熱當歸微炒肉豆蔲去殼厚朴去粗皮生薑汁炒令煙出甘草炙芍藥枳殼去穰麩炒黃白茯苓去黑皮人參各半兩右粗搗篩每服三錢水一盞煎至七分去滓空心溫服麒麟竭散出聖惠方治婦人月信來時臍腹痛如錐刀所刺麒麟竭芫花醋拌炒令乾芎藭桂心當歸銼微炒延胡索琥珀已上各半兩麝香一分研入右為細散每於食前以熱酒調下一錢蟅蟲散出聖惠方治婦人月水每來臍腹疼痛時發寒熱靣色痿黃虻蟲十枚微炞芎藭當歸銼微炒女青赤芍藥已上各二兩川大黃半兩微炒桂心半兩川椒一分去目及閉口者微炒出汗右為細散每於食前以酒調下一錢大黃湯出聖惠方治婦人月水來腹痛臍下堅硬積血不止大黃銼碎微黃厚朴去粗皮生薑汁炙煙出如此七遍一兩一分芎藭一兩一分朴硝當歸芍藥各一兩右粗搗篩每服三錢水一盞生薑三片煎至七分去滓溫服行即止服治月經往來腹臍腫腰痛出千金方蟅蟲四枚蜀椒乾薑各六分桂心女青芎藭各半兩右治下篩取一刀圭先食酒服之日三十枚微下善養之芍藥湯出聖濟總録治婦人月水來腹臍痛煩悶體熱芍藥人參厚朴去粗皮生薑汁炙煙出各一兩當歸微炒甘草枳殼去穰麩炒各三分肉豆蔲去殼半兩右粗搗篩每服三錢水一盞煎七分去滓溫服不拘時候七聖散治月事方來腹痛難忍當歸一兩酒浸桂心不見火好者蒲黃麝香少許白芍藥川芎各七錢半玄胡索半兩右為細末每服二錢空心鹽湯調下蟅蟲散出聖惠方治婦人月水每來腰腹疼痛蟅蟲四枚微炒芎藭桂心各半兩女青川大黃銼微炒川椒去目及閉口者微炒出汗乾薑炮製銼各一分右為末散每服於食前以溫酒下一錢朴硝丸出聖惠方治婦人夙有血積月水不來時腹中疼痛宜下之川朴硝當歸銼微炒薏苡仁川大黃銼微炒黃二兩代赭牛膝去苖桃仁湯浸去皮尖雙仁麩炒黃各一兩右為末煉蜜和搗二三百杵丸如梧桐子大每於食前以溫酒下十丸硇砂丸出聖惠方治婦人久積虛冷四肢羸瘦飲食微少月水來時臍腹疼痛不可忍硇砂以漿一升熬如膏當歸銼微炙琥珀附子炮製去皮臍沒藥桂心木香已上各一兩右為末以棗肉並硇砂膏同和搗三五百杵丸如梧桐子大每於食前以溫酒下十五丸溫經湯出聖濟總録治婦人月水來腹內疼痛不可忍白茯苓去粗皮半兩芍藥土瓜根丹皮去心各一兩半丹砂别研如粉薏苡仁各一兩右除研外粗搗篩即以丹砂和勻每服三錢水七分酒三分共一盞同煎七分去滓溫服不拘時候芎藭散出聖惠方治婦人月水每來臍下疼痛四肢煩疼芎藭桂心桃仁湯浸去皮尖雙仁麩微炒吳茱萸湯浸七遍焙乾微炒當歸銼微炒各三分厚朴一兩去粗皮塗生薑炙令香熟右為散每服三錢以水一盞煎至六分去滓食前稍熱服琥珀散出聖惠方治婦人月水每來心間刺痛腹內疼結琥珀牛膝去苖當歸銼微炒赤芍藥各三分沒藥半兩芫花一分醋浸炒令乾右為細末散每服於食前以溫酒調下一錢硃砂丸出聖惠方治婦人血海風冷月水每來攻刺臍腹疼痛面色痿黃四肢無力硃砂細研水飛過硇砂細研各一兩半夏湯洗七遍去滑木香各一兩當歸一兩半銼微炒巴豆一分去皮心研紙裹壓去油右為末都研令勻以釅醋一升和狗膽一枚汁煎如稀餳和丸如菉豆大每於食前以醋湯調下二丸琥珀丸出聖濟總録治婦人虛冷月水凝澀不利腹內疼痛四肢煩熱皮膚癮疹飲食減少琥珀别研木香禹餘糧煆醋炙白术芍藥桂去粗皮鱉甲去裙襴酒炙令香附子炮製去皮臍羌活去蘆頭蓬莪茂炮銼細辛去苖葉丹皮去心肉豆蔲去殼人參京三稜炮銼黃耆銼各一兩當歸微焙檳榔銼枳殼去穰麩炒各一兩半柴胡去蘆芎藭安息香半兩研桃仁湯浸去皮尖雙仁麩炒黃色各二兩右為末以生地黃自然汁一碗與藥末同拌次用酒煮麵糊為丸如梧桐子大每服二十丸空心溫酒下華撥丸治婦人無時月水來腹痛方見本門血氣心腹疼痛類治女子忽得小腹中痛而經月初來便覺腰中切痛連脊間如刀錐所刺痛不可忍者衆醫不别謂是鬼疰妄服諸藥終無所益其疾轉增審察前狀相當即用此藥右取積粟草以夏五月正放花時採取暴乾搗篩為散女子有患前件病者取二寸匕和好醋二小合和令勻平旦空腹頓服之每日一服以知為度如女子先冷者即取前件藥五兩加桃仁二百枚去皮尖熬搗為散以蜜為丸如梧桐子大每日空腹以飲酒調下二十丸再服以疾愈為度忌麻子蕎麥芫花散出聖惠方治婦人血海風冷月水每來攻腹臍疼痛靣色痿黃四肢無力芫花一分醋拌炒令乾當歸銼微炒木香各半兩右為散不計時候以酒調下一錢羌活散出聖濟總録治室女經絡凝滯攻腹疼痛肢體煩熱骨莭痠倦羌活去蘆頭桂去粗皮牡丹皮芎藭枳殼去穰麩炒芍藥延胡索當歸切焙甘草炙大黃銼炒木香各半兩右為散每服二錢溫酒調下不拘時候地黃散出聖濟總録治室女不利血氣月水即少腹刺痛生地黃一兩焙生薑切作片四兩烏豆二合當歸切一兩右同入銀石器中漫火炒燥搗羅為散每服二錢溫酒少許調空心日午臨卧時服芍藥散出聖濟總録治室女月水不利來時腹痛芍藥當歸切焙芎藭各一兩乾薑炮半兩右為散每服二錢溫酒調下不拘時候牛膝散出聖濟總録治室女月水來腹痛牛膝去苖酒浸切焙牡丹皮當歸切焙丹參各一兩朴硝别研桃仁去皮尖雙仁麩炒芍藥桂去粗皮木香黃芩去黑心人參各一兩生地黃焙二兩半右搗研為散每服二錢溫酒調下或用水一盞生薑三片煎取七分空心食前溫服亦得牡丹散出聖濟總録治室女月水來不利腰腹痛牡丹皮芍藥檳榔銼當歸切焙白术芎藭赤茯苓去黑皮生乾地黃焙莎草根炒去毛桂去粗皮麥蘖各半兩炒人參一兩右為散每服三錢水酒共一盞煎至七分去滓空心溫服未瘥再服蓬莪茂散出聖濟總録治室女月水欲行攻臍腹疼痛蓬莪茂煨一兩當歸切紅芍藥芎藭蒲黃桂去粗皮延胡索烏藥沒藥别研五靈脂各半兩乾薑炮一分右為散每服二錢溫酒調下食前日午卧時服沒藥丸出聖濟總録治室女月事不快欲來即攻臍腹疼痛腰體沉重飲食不進沒藥研牡丹皮京三稜煨連皮大腹銼芍藥當歸研桂去粗皮木香各一兩丹砂細研半兩蘹香子炒丁香炒各三分右為末煉蜜為丸如雞頭實大每服一丸溫酒化下淡醋湯亦得桑耳丸治室女月水不利或來或不得宣通攻擊臍腹疼痛桑耳菴䕡子桂去粗皮芎藭人參牛膝去苖酒浸切焙赤茯苓去黑心白芍藥各一兩半大黃銼炒一兩生乾地黃焙一兩甘草炙半兩右為末煉蜜和丸如梧桐子大每服二十丸空腹溫酒下一方用土瓜根去人參沒藥丸治室女血氣凝澀月水欲行攻腹臍疼痛沒藥研延胡索各一兩高良薑銼乾膝炒煙出桂去粗皮炙半兩當歸切焙牛膝酒浸切各一兩牡丹皮乾薑炮各半兩右搗研為末醋煮麵糊為丸煎麴湯下空心食前服二十丸如梧桐子大牛膝湯治室女血氣凝澀月水來不快利少腹疼痛煩悶牛膝去苗酒浸切焙一兩菴䕡子微炒當歸切焙芍藥芎藭各半兩土瓜根洗切一兩朴硝别研牡丹皮去心桂去粗皮各三分右粗搗篩每服三錢水一盞煎至七分去滓溫服草豆蔲湯治室女月水不利攻刺腹痛草豆蔲去皮三枚當歸切焙厚朴去粗皮生薑炙甘草芍藥各一兩枳殼去穰麩炒白茯苓去黑心人參各三分右粗搗篩每服三錢水一大盞煎至七分去滓溫服不拘時候六神散治室女血臟虛冷月水凝澀欲來攻臍腹撮痛當歸切焙延胡索烏藥銼烏頭去皮臍炮製青橘皮去白炒各一兩乾膝炒煙出半兩右為散每服二錢溫酒調下空心日晚再服當歸丸治室女氣血不和月水欲來先攻腹刺痛當歸切炒二兩檳榔生銼赤芍藥牡丹皮延胡索各一兩右為末醋煮麵糊為丸如梧桐子大每服二十丸溫酒下空心日晚再服一方以當歸用米醋一升二合熬成膏入衆藥末和丸普濟方卷三百三十四
