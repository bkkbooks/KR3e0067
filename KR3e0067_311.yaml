子炮裂去皮臍腽肭臍酒刷微炙各一兩甘草一分微炙赤剉續㫁一兩半熟乾地黄獨活白芷黄耆剉桃仁湯浸去皮尖及雙仁麩炒微黄牡丹敗龜塗酥炙微黄劉寄奴川大黄剉碎微炒各一兩右為細末煉蜜和搗三二百杵丸如梧桐子大不拘時候以温酒下三十丸黒散子出聖濟總録治踠折筋骨疼痛香墨半兩火煅淬三遍烏頭燒灰存性芎藭敗龜醋炙各一兩赤芍藥酒浸焙剉沒藥研自然銅火煅醋淬七遍地龍去土炒乳香研當歸切片酒浸焙骨碎補桂去粗皮白芷各一兩半右為散每服二錢熱薑酒調下不拘時候乳香膏出聖濟總録乳香三兩沒藥三兩二味剉如皂子大用生絹袋盛黄米内蒸如膠候冷别研銅錢四十九文火煅醋淬數遍搗末蜜陀僧雄黄各半兩甜𤓰子當歸切焙骨碎補虎骨酥炙黒狗頭骨牛骨人骨木鼈子麒麟竭各一分右為末拌勻入絹袋子内蒸如餳以磁器内盛如有傷折者旋取丸如豌豆大每服二十丸温酒下琥珀丸出聖恵方治傷折踠損及理血補骨髓琥珀一兩鼈甲一兩塗酥炙令黄去帬欄牛膝三分去苗白芍藥三分白蒺藜三分微炒去刺淹䕡子三分鹿茸三分去毛塗酥炙微黄川大黄三兩剉碎微炒當歸一兩剉微炒黄耆一兩剉附子三分炮裂去皮臍桂心三分右為末煉蜜和搗三二百杵丸如梧桐子大不拘時候以温酒送下三十丸黄耆散出聖恵方治踠折筋骨傷碎瘀腫疼痛黄耆芍藥各三兩當歸乾地黄通草各二兩大黄一兩桂心附子續㫁乾薑各二兩蜀椒一合烏頭半兩右治下篩食前酒服五分日三服千金翼無大黄芍藥散出聖濟總録治踠折疼痛赤芍藥黄耆剉各二兩附子炮裂去皮臍當歸切焙續斷剉桂去粗皮羌活去蘆頭虎骨酥炙蜀椒去目并閉口炒出汗大黄生各一兩烏頭炮裂去皮臍半兩右為散每服二錢温酒調下不拘時候一方無大黄延胡索散出聖恵方治踠折筋骨疼痛延胡索橘子仁蒲黄芸臺子當歸切焙虎脛骨酥炙各一兩桂去粗皮半兩牽牛子三分一半生一半炒右為散每服二錢温酒調下不拘時候沒藥散一名虎骨散出楊氏家藏方治閃肭折傷及風濕客搏筋骨疼痛沒藥研麒麟竭丁香炒虎脛骨酥炙各半兩乳香一分別研骨碎補一兩桑根白皮剉焙赤小豆各二兩右為散每服二錢熱酒調下一法蘇木當歸酒調下空心臨臥乗熱服骨碎補散出聖濟總録治踠折手足熱腫疼痛骨碎補去毛當歸切焙芎藭剉桂去粗皮蒲黄蜀椒去目并閉口炒出汗各一兩澤蘭葉沒藥研各一兩右為散每服二錢温酒調下不拘時槐子膏療折踠傷筋骨槐子中仁秦芁白术續㫁各一兩桂心六分去皮浄巴豆十枚去皮心熬出油大附子一枚炒右㕮咀以醇酒苦酒漬一宿以煉成猪脂二斤同煎三上三下候膏成絞去滓温酒服杏子許一枚日三并塗傅忌葱冷水蘆笋桃李豬雀肉物止血散出聖恵方乾蝙蝠三枚燒灰代赭一兩燒令紫色頭髮三兩燒灰紅藍花一兩入鹽一分炒令黄蝟皮一兩半燒灰右為細末傅瘡上其血立止青金散出聖濟總錄治踠傷骨折生龍腦别研麝香别研各一兩丁香炒為末虎脛骨白者燒灰各一兩鯪鯉甲燒灰二兩右將鯪鯉甲虎脛骨灰丁香末同研極細次下龍腦麝香和研令勻磁合盛每服半錢用小黄米一合煮粥入醋少許攪匀下藥又取藥隨所傷多少用帛子攤裹經宿一換接骨膏出聖恵方治踠折傷筋骨疼痛不可忍獼猴項骨二兩水獺骨一兩猫兒項骨二兩龜殻二兩右細搗入瓶子内不得透氣燒為灰碾為末入腽肭臍末半兩每用二錢以小黄米粥相和攤在油單紙上裹傷折處一日一易三灰散出聖恵方治傷折骨碎割刺皮肉有瘡出血不止茅根灰三兩牛皮膠灰二兩麻􅀈灰二兩右為細末傅瘡口上止血大黄散出聖恵方治踠折瘀血桃仁四十枚亂髮一握大黄如指節大一枚右以布方廣四寸以繞亂髮燒之㕮咀桃仁大黄以酒三升煮取一升盡服血盡出或作米酒調服肘後云仲景方用大黄三兩緋帛子如手灰亂髮如雞子大灰又用炊單布方一尺灰桃仁四十九枚敗蒲蓆一握長三寸切甘草一根如指大以童子小便量多少煎湯成内酒一大盞次下大黄分温為三服别剉敗蒲蓆半兩煎湯以浴衣被重覆服藥通利數行痛楚立瘥利及浴水赤勿怪即瘀血又方出聖恵方桃仁六十枚大黄六兩桂心二兩右㕮咀以酒六升煮三升分三服當下血瘥或為細末以酒調服夢授方出聖恵方治踠折傷筋損骨疼痛不可忍生地黄一斤切生薑四兩切藏𤓰薑糟一斤右都炒令勻熱以布裹罨傷折處冷則易之曽有人傷折宜用生龜尋捕一龜將殺患人忽夢見龜告言曰勿相害吾有竒方可療於夢中授得此方又方出肘後方治踠折瘀血在腹乆不消時時發動者蒲黄一斤當歸二兩右治下篩食前酒服方寸匕日三治踠折瘀血及乆宿血在諸骨節及外不去時出千金方䖟蟲二十枚牡丹一兩右治下篩酒服方寸匕血化為水備急方云治乆宿血在諸骨節萵苣散出聖濟總録治踠折疼痛不可忍萵苣子一兩黒色者炒乳香半兩研右為細末每服二錢熱酒調下不拘時服訖向痛處卧白礬湯熨方出十便良方治踠折先用止痛以白礬一味為細末每用一匙沸湯一椀泡化以手帕子蘸乗熱熨傷處少許痛定排整筋骨次用貼藥雄䑕糞尖者是桂去粗皮為末右等分研匀量傷折大小以冷水調藥末攤軟帛上裹之須臾如火暖三日後損處極痒是筋骨生長切不可揺動搔抓其藥力常如火暖一兩日後覺藥力不暖即換新藥裹之麻根汁酒方出聖恵方治踠折骨損痛不可忍兼打撲損傷或墜墮瘀血腹滿氣短者以大麻根及葉搗取汁飲一升無生麻酒煮乾麻汁服或温酒服地黄膏出聖恵方治踠折四肢及骨碎筋傷蹉跌不歸臼疼痛以地黄不限多少熟搗用敷所傷損處或熬之以裹傷處以竹片夾裹又遍縛令急勿轉動一日可十易三日瘥若血聚在所傷處以刀子破出血一方用好醋熬乗熱攤於所傷處以帛繫定鹿角散出聖恵方治四肢骨碎筋傷蹉跌或従髙墮下被重物頓笮得瘀血者以鹿角不限多少用桑柴灰汁煮令微軟漉出曝乾搗羅為末以暖酒調下二錢日三服治肭閃腰痛不能轉側用神麯一塊如拳大燒通紅酒二大盞淬酒中覺酒温便飲盡仰卧少頃取効治踒折出本草以通草煮釀酒飲之治閃肭及傷折出本草用葱白入鹽擂爛炒乗熱傅治閃肭著出百一選方用米醋糟和平胃散罨患處一方用冷水調塗治閃出臼骨即拽入之後出百一選方以一色黄土及新蒲黄生薑同搗成泥罨損傷處日三四換之甚妙治男子婦人閃著脚手出本草用羯羊糞燒灰為末用猪脂攪和搽痛處立効治筋骨傷或被打瘀血在腹不消者出千金方以馬屎傅之或燒水煮熱傅一方用肥猪肉炙令熱搨傷處又方出聖恵方治踠折瘀血取淹䕡草汁飲之子亦可為末以酒調二錢日三四服又方出千金方凡被打及産後惡血及一切血瘀煮續筋骨木汁三升飲之専治閃肭擔閃挫腰不可忍者不可行動者及治陰冷陽虚腰痛破故紙二兩右瓦上炒香為末每服二錢酒調下不拘時一方酒浸一宿炒酒煮為丸仍用破故紙少許炒為末酒調下妙應散出家藏經驗方治閃肭動骨者黄蘗一片如掌大草烏頭兩個赤小豆一合右為細末以生薑自然汁調𫝊頻換勢退疼止為度此方的於謝守伯任渠云昨有僧因監修造撲損用此十數次遂安又有李享沖者溺水肭脚膝後漸愈而損處極熱微痛亟兩易之遂涼亦向安好僕亦屢試之五白散出楊氏家蔵方治打撲閃肭及風熱攻注一切腫痛白芨白芷白殭蠶炒去絲嘴白芍藥白蘞天南星上六味各半兩赤小豆一合右件為細末以生薑汁調傅腫上乾即再傅普濟方卷三百十一
