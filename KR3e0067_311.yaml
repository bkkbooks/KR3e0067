body:
  text: 普濟方卷三百十一明周王朱橚撰折傷門傷折疼痛附論凡筋骨傷折疼痛人之一身血榮氣衛循環無窮或筋肉骨節誤致傷折則血氣瘀滯疼痛倉卒之間失於調理所傷不得完所折不得續輕者肌膚焮腫重者髀臼挫脫治法冝先整其骨折之所然後施貼熁封裹之藥方麒麟竭散出聖濟揔録治筋骨損傷疼痛麒麟竭沒藥研自然銅煅醋淬七次研赤芍藥當歸切焙香白芷蒲黄大黄生用各半兩桂去粗皮細辛去苗葉各一兩骨碎補去毛炒二兩乾荷葉三分右為散每服二錢温酒調下不拘時候附子散出聖恵方治一切傷折疼痛不可忍附子炮裂去皮臍當歸剉微煨芎藭桂心沒藥澤蘭亂髪灰檳榔各一兩敗龜塗酥炙微黄虎脛骨塗酥炙微黄各二兩甘草半兩炙微赤剉麝香一分細研右為細末入麝香研令勻不拘時候以温酒調下二錢桃仁散出聖惠方治傷折疼痛接骨止痛桃仁湯浸去皮尖及雙仁者麩炒微黄桂心當歸剉微炒元胡索生乾地黄芎藭各一兩川大黄剉研微炒阿膠搗碎炒令黄燥各二兩亂髪如鴨子大川椒半兩去目及閉口者微炒出汗右為細末用酒二升先煎髪并阿膠如糖用綿濾去滓然後下諸藥末調匀焙乾搗細為散每服以温酒調下二錢日三四服效趂痛散出德生堂治男女跌傷疼痛不可忍者草烏炮裂碎别炒入藥白芷川芎各一兩半杜當歸二兩杜烏藥五兩乳香半兩紫金皮大塊童子小便浸春夏三日秋冬五日用半斤沒藥半兩天南星半斤右為細末每服二錢或半錢温酒調下病在上食後服病在下食前服當歸散出聖恵方治傷折疼痛青腫血滯當歸剉微炒桂心桃仁湯浸去皮尖雙仁麩炒微黄川大黄剉碎㣲炒赤芍藥各一兩敗蒲二兩燒灰沒藥骨碎補各一兩半右為細末每服以温酒調下二錢日三四服桂附散出御藥院治因傷損後筋骨疼痛桂去粗皮附子去皮臍生白礬細辛去苗葉五加皮白芷桑葉各二兩右為散每服二兩入連根葱白十莖水一斗煎四五沸淋洗立效地黄金粉煎出聖恵方治傷折筋骨後疼痛不止冝服散瘀血理折傷續筋骨止疼痛生地黄三斤浄洗令乾却入酒内浸二宿復取出紙袋盛火焙令乾為度天雄二兩炮裂去皮臍桂心當歸芎藭桃仁湯浸去皮尖雙仁微炒各一兩右為末入金粉内和令勻用酒一斗以文武火煎成稠膏每日空心午前夜卧時各以酒調一匙温服之當歸血竭散出聖恵方治傷折筋骨疼痛不可忍麒麟竭别研没藥另研當歸赤芍藥桂各一兩白芷一兩右為細末每服二錢用温酒調下不拘時候應病丸出醫方大成治傷折後為血氣所侵手足痛疼破故紙一斤半炒一半生蒼朮一斤骨碎補一斤去毛舶上茴香十二兩炒穿山甲去膜皮炒焦為度紫色亦可生草烏一斤剉如麥大右除草烏一斤用生葱連皮生薑各二斤擂爛草烏一處淹兩宿焙乾連前藥一處為末酒煮麪糊丸如梧桐子大每服五十丸酒湯任下忌熱物内固接骨丹出聖恵方治傷折疼痛古字錢二兩先於火内燒令通赤醋淬如此十度自然銅硫黄各一兩以上三味為末入車瓶子内以坯子泥封固瓶口候乾倒下於火燒令通赤候冷取出搗羅入水銀一兩同研水銀星盡後用白薄紙裹藥似毬子後以泥入臼内滴水爛搗裹藥毬入糠火内燒七日冷了出之細研入後硃砂末麝香末犀角末各一分右研令勻搗生地黄絞取汁於銀器中熬為膏和藥末丸如酸棗大如有患病者以温酒半盞入地黄膏一錢攪勻下藥一粒服了如吐清緑水或㵼清緑水二三合勿怪是病出也冝頻服好瘥為度接骨如神散治傷骨損折疼痛者水蛭糯米炒黄去米白綿燒灰沒藥别研乳香别研各等分血餘小兒胎髪十五團燒灰如無童子髪亦可右為末五十以上服一錢二十以下服半錢小兒服半字温酒調下接骨散出聖恵方治傷折疼痛粟黄一斤曬乾雄黄豆半升沒藥二兩麝香半兩研極細桑根白皮一斤剉右為散每服三錢以醋一中盞煎至半盞用漿水二合調服不過三服疼痛即止筋骨藥治一切疼痛及諸風川烏一箇草烏二兩去皮生用乳香當歸天麻各半兩虎骨醋炙沒藥自然銅芍藥川芎萆薢獨活各一兩右為末酒打麪糊為丸如桐子大每服十數丸温酒下乾地黄散出千金方治骨折筋斷傷疼痛者乾地黄當歸羌活一方用獨活苦參各等分右㕮咀每服七錢白水煎服或為末酒調下海桐皮散出聖恵方治傷折辟外生風疼痛海桐皮剉黒豆炒熟附子炮裂去皮臍各一兩防風二兩去蘆頭右為細末每服以温酒調下二錢日三四服治傷折疼痛不可忍出聖惠方當歸一兩半白芷桂心呉茱萸各一兩右為細末剉生龜一枚入藥擣令匀用封裹傷折處至聖黒龍丹出御藥院方治一切筋骨損傷疼痛米粉四兩於銀器内炒成塊子黄色放冷研為極細末後入二味乳香細研没藥研細各半兩右研極細每用以好酒或醋調如膏攤在紙上貼患處紫金散京三稜剉炒黒色連翹半兩黄耆三錢甘草炙三錢羌活半兩右為麤末作一服水一盞煎去渣食後服飲蛇龜酒出聖恵方治一切筋骨肌肉折傷疼痛飲蛇龜一枚糯米五升蒸作釀飯好酒二斗右剉龜釀飯同入酒甕中封七日即好每煖一盞服之雙靈膏出御藥院方治一切筋骨肌肉疼痛良薑一兩炒剉白芥子半兩微炒右為細末每用藥二錢半頭白麪半兩水調成膏攤在紙花上貼患處没藥散出聖濟緫録治墜折傷損疼痛不可忍者没藥别研乳香别研元胡索當歸切焙甜𤓰子各一兩丹砂研半兩右為細散拌匀每服一錢熱酒調下又取藥散二三錢以黄米作粥攤作餅子摻散藥在上用貼患處以帛封札定一二日換佳治折骨傷筋痛不可忍出經驗良方生地黄藏薑𤓰舊糟各一斤赤小豆半升生薑六兩右研爛同炒勻令熱以布帛裹罨傷處用杉板夾縳不過三日令安聖靈丹出御藥院方治一切打撲傷損及折傷疼痛不可忍者乳香五錢烏梅五箇去核白米一捻萵苣子大盞炒黄取用二兩八錢右為細末煉蜜為丸如彈子大每服一丸細嚼熱酒下如痛再服一方米湯送下病在上食後服在下食前服托裏止痛散黄耆白茯苓各一兩甘草半兩乳香一錢别研右為細末每服二錢酒半盞慢火煎成膏子再入酒一盞調勻温服蓬莪散治撲傷疼痛白殭蠶炒一兩蘇枋木剉二兩沒藥研半兩右麄搗篩每服一錢水一盞煎至七分去滓温服日三服若為細末熱酒調下亦得一方無沒藥烏梅煎出肘後方治傷折疼痛墜朴瘀血方用烏梅五升去核以飴糖五升煮稍稍食之自消一方烏梅煎湯調百草霜服又方取白茅根葉搗絞取汁三升服之不過三四服愈冬用根太嶽活丹出和濟治男子婦人外傷内損狗傷蟲咬車馬撲墜手足折傷一切疼痛腹中瘀血刺脇築心左癱右瘓走注疼痛癰疽痔漏及婦人冷氣入腹血脈不通産後敗血灌注四肢及吹奶腫痛血氣撮痛病冝服之花桑枝如臂大者燒灰盡淬米泔中焙乾粟楔粟􅀢中心扁者薄片日乾各一斤細墨半斤一半用萞麻子三兩細研塗墨上盡黄紙包泥固濟乾炭火五十七斤燒赤冷地上出火兩時一半用醋化硇砂塗墨上火炙令乾燥皂角刺一斤燒赤淬醋中炙乾大黒豆一斤濕布揩去垢黒皮焙乾亂髪二斤皂角水洗淨用清油二斤炒頓捻看色即止為末乳香四兩通明者乳缽細研入米醋一椀熬熟硇砂三兩洗淨者醋化塗墨上右為末拌令勻杵二三千下丸如彈子大醋糊丸重者一丸輕者半丸以無灰酒一盞乳香一豆大先磨乳香次磨藥盡煎三五沸臨卧温服以痛處就牀欲汗則被覆仍用藥塗傷處切忌一切動風物婦人服入當歸末一錢孕婦勿服一方無硇砂治折傷取括蔞根搗爛以布裹之熱除痛即止熟乾地黄丸出聖濟總録治逺年傷折忽因血氣不和舊傷處疼痛難忍熟地黄焙乾四兩杏仁湯浸去皮尖并雙仁牛膝去苗酒浸焙各一兩五錢苦參細剉焙乾莬絲子酒浸焙乾肉蓯蓉酒浸切焙萆薢炒各一兩桂去粗皮青木香生用各一分訶梨勒煨熟去核半兩升麻三分右除杏仁外搗細為末入杏仁别搗再羅匀煉蜜和搗三千下丸如梧桐子大每服空心温酒下二十丸至三十丸治折傷以水獺一箇用罐子内以泥固濟放乾燒灰為末以黄米煮粥於傷折處攤以水獺末一錢上摻便用帛子繫裹立止疼痛治折傷止痛化血出本草取能奴來生搗其肉及血傅之能即三足鼈也治傷折筋骨生肌破血出本草用每始王木酒水煮濃汁飲之治折傷先用止痛湯法出本草搗白礬為末每用一匙匕湯沸一椀衝了以手拍蘸乗熱熨傷處以時止然後排整筋骨貼藥治斷指出本草以蛇含草膏封之抱朴子云連已斷之骨治刀傷及折傷出朱氏集驗方右用烏狗血和酒連喫數椀盖犬血能散惡血也淮西總管李貴見効邕莞易倅因㑹客於南樓墜樓者二十餘人亦用此救之見功治折傷用菾音甜菜搗傅之傷折惡血不散附論夫脈者血之府血行脈中貫於肉理環週一身因其肌體外固經絡内通乃能流注不失其常若因傷折内動經絡血行之道不得宣通瘀積則為腫為痛治宜除去惡瘀使氣血流通則可以傷完也方牛黄散治大損後化惡血理好血止疼痛牛黄細研真珠細研龍腦細研各一分琥珀牡蠣燒為粉硃砂細研水飛過桂心當歸剉微炒蒲黄各一兩麝香半兩細研金箔銀箔各五十片細研右研令勻不拘時候以桃仁湯調下二錢白殭蠶丸治骨折筋傷後惡血攻疼痛不止白殭蠶炒當歸炒桂心補骨脂炒神麯炒黄半夏湯泡七遍去滑檳榔赤芍藥各一兩芎藭薯蕷炒黄白附子炮芫花醋拌炒各半兩右為末煉蜜和搗三二百杵丸如梧桐子大每服以温酒下二十丸日三服黄耆散治傷折惡血凝滯腫痛黄耆芍藥生乾地黄焙附子炮當歸切焙續㫁桂去皮各半兩乾薑炮大黄生各一兩椒去目并閉口炒出汗右剉如麻豆每服三錢水一盞煎至七分去滓温服不拘時候芍藥散治打撲筋骨惡血不散迷悶疼痛小便血下一名當歸散赤芍藥當歸剉微炒續㫁白芷生乾地黄黄芩甘草炙微炒剉牛膝去苗蒲黄各一兩右為細末不拘時候以温酒調下二錢一方無蒲黄芍藥湯治傷折惡血不散腫痛不消赤芍藥黄茋附子炮裂去皮臍當歸切焙續斷肉桂去粗皮羌活去蘆頭蜀椒去目并閉口者各一兩右剉如麻豆大每服三錢水一盞煎至七分去滓温服不拘時候芎藭湯治傷折腫痛氣血不散芎藭甘草炙剉蜀椒去目并閉口者炒出汗澤蘭附子炮裂去皮臍桂去皮各一兩當歸切焙大黄醋炒各半兩右為散每服三錢温酒調下不拘時候蒲黄散治骨折筋傷惡血攻心煩悶蒲黄三分芎藭當歸剉微炒桂心各半兩白芷細辛各一兩右為細末每服以生薑酒調下二錢日三四服草烏頭膏一名烏頭膏治傷折惡血結滯不散腫痛方見諸骨跌蹉類桃仁散治従髙墜下及落車馬胷腹中有惡血喘息不得川大黄剉碎微炒川硝石甘草炙微赤剉各一兩蒲黄一兩半桃仁湯浸去皮尖雙仁麩炒微黄右為散每服四錢以水一盞入棗二枚煎至六分去滓不拘時候温服芎藭湯治傷折惡血瘀結不散方見傷折腹中瘀血類一名桂藭湯蒲黄鯉魚㪚治車馬墜撲傷折惡血衝心迷悶蒲黄二兩鯉魚鱗五兩炒灰芸薹子一兩末生地黄汁五合右先將蒲黄芸薹子於盆内以慢火炒旋滴地黄汁於内炒令汁盡以乾為度并鯉魚鱗灰一時研為末不拘時候以童子熱小便調下二錢杉木節散治従髙墜損心胷惡血不散杉木節七箇細剉蘇枋木五兩細剉以水一斗煎取五升去滓醋五合入於蘇枋木汁内右將杉木節於一砂盆内以慢火炒旋滴蘇枋木醋汁相和炒令汁盡停冷搗為細末每服以童子小便調下二錢日三四服化去惡血為効蠶沙膏