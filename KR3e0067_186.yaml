body:
  text: 普濟方卷一百八十六明周王朱橚撰諸痺門風濕痺身體手足不遂附論夫風寒濕三合氣而成痺其氣時來亦有偏多偏少而風濕之氣偏多者名為風濕痺也凡人腠理虛者則風濕氣傷之搏于血氣血氣不行則不得宣通真邪相擊在肌肉之間故其肌膚盡痛或皮膚癮疹然諸陽之經宣行陽氣通于身體風濕客之于肌膚合而為痺若傷其諸陽之經則陽氣行遲緩而機關弛縱筋脈不收若風濕痺而復于身體故足手不得遂也仙靈脾丸出聖濟總録治風濕痺肢節疼痛身體手足不遂仙靈脾三分防風去人半兩羌活去蘆白附子炮犀角屑羚羊角屑乳香細研虎脛骨酥炙黃附子炮去皮當歸切焙牛膝酒浸切焙鹿耳酥炙去毛石斛去根苗銼海桐皮細銼各三分乾蠍炒半兩烏蛇酒浸去皮骨炙二兩麝香研一兩桂去粗皮半兩檳榔銼半兩木香半兩天麻一兩天南星炮半兩白薑半兩右為末與研者拌和勻煉蜜搗五七百杵丸如梧桐子大每服三十丸食前溫酒下當歸散出聖惠方治風濕痺嚲曵或手足不遂或風入五臟恍恍惚惚多語喜忘又時恐怖或肢節疼痛頭眩煩悶或腰脊強直腹滿不食當歸一兩炒升麻半兩川烏頭半兩炮去皮五味子半兩天門冬一兩去心焙赤芍藥半兩逺志半兩去心獨活半兩麻黃一兩去根節防風半兩去蘆芎藭半兩乾薑一兩炮銼秦芁一兩去苗桂心半兩大豆一合炒熟石斛半兩去根甘草三分炙銼人參半兩去蘆白茯苓二兩紫菀半兩去苗上石膏一兩黃耆半兩杏仁半兩洗去皮雙仁麵炒右銼為散每服四錢水一中盞煎至五分去滓入酒一合更煎一兩沸不計時候溫服萆􅐺丸出聖惠方治風濕痺身體手足收攝不遂肢節疼痛言語謇澀萆􅐺薏苡仁天雄炮去皮臍牛膝去苗各一兩當歸銼微炒莽草炙天麻天南星炮白附子炮芎藭川烏頭各半兩炮去皮海桐皮羌活躑躅花各三分醋拌炒入干乾蠍炒蟬殼各一分右為末煉蜜和搗三五百杵丸如桐子大每食前以豆淋酒下二十丸防風湯出聖惠方治風寒濕痺筋脈攣急及偏風身體手足不遂防風去皮薏苡仁三兩麻黃去根節煮焙干四兩白术芎藭細辛去苗葉羌活去蘆茵芋去粗皮狗脊去毛牛膝酒浸焙萆􅐺側子炮去皮臍杏仁去皮雙仁炒黃赤箭桂去粗皮各一兩右銼如麻豆每服四錢水一盞生薑三片同煎至七分去滓溫服不拘時候木瓜虎骨丸出端竹堂方治風寒濕客于榮衛合而成痺腳重不仁疼痛少力足下癮痛不能踏地腰膝筋攣不能屈伸及項臂拘急手臂無力耳內蟬鳴頭旋目眩及諸證腳氣行步艱難並宜服之木瓜麒麟竭研沒藥研虎脛骨塗酒炙木香自然銅醋碎七次楓香脂骨碎補去毛當歸切焙甜瓜子敗龜醋炙去裙襴桂各一兩安息香一兩湯酒入藥乳香研半兩地龍去土二兩右除研藥外為細末拌勻酒麵糊為丸如梧桐子大每服三十丸空心木瓜湯下溫酒亦得漸加至五十丸忌食冷物濕麵諸血等物換腿丸出直指方治足三隂經虛為風寒暑濕進襲攣痺緩弱上攻胸脅背下注腳膝疼痛漸成風濕腳氣行步艱辛足心如火上氣喘急飢不思食薏苡仁炒石南葉石斛牛膝去苗酒浸萆􅐺炒天南星炒羌活去蘆防風去蘆黃耆去蘆蜜炙當歸去苗酒浸天麻去苗續斷各一兩半檳榔二兩半木瓜四兩右為末酒煮麵糊為丸如梧桐子大每服五十丸溫酒湯下一方加蒼术川芎各一兩橘皮湯下天麻散出聖惠方治諸痺身體痛麻或多瘙癢筋脈拘急言語謇澀手足不遂天麻白附子炮羌活去蘆防風去皮芎藭獨活去蘆當歸切炮桂去粗皮各半兩牛膝酒浸焙白薑蠶炒各三分乾蠍炒麻黃去根節各一兩萆􅐺三分右為散每服二錢暖竹瀝酒調下不計時候烏頭湯出本事方治風冷濕痺留于筋脈拘攣不得轉側亦治腳氣大烏頭細辛川椒甘草秦芁附子官桂白芍藥各七分乾薑白茯苓防風當歸各一分川獨椒一兩三錢半右為粗末每服三錢水一盞半棗二枚同煎至八分去滓空心食前服若熱毒多服益加幾中用續命排風引竹瀝諸湯及神精丹茵芋酒之類更加以灸無不愈者然此疾積習已久非一日所能攻皆大劑久而取效唐書載王太后中風瘖默不語醫者蒸黃耆數斛以薰之得瘥皆此類也今人服三五盞求效責醫也亦速矣孟子曰七年之病三年之艾久而後知爾防風飲出經濟總録治風寒濕痺半身不遂不能言語四肢麻木或不知痛癢防風去皮一兩麻黃去節湯煮焙一兩半石膏黃芩去黑心芎藭當歸切焙各半兩桂去粗皮一兩杏仁去皮炒二十枚熟地黃焙甘草炙各半兩右搗篩每服五錢水二盞煎取一盞去滓空心食前溫服日二夜一巴戟湯治風寒濕痺腳膝疼痛行履不得方見本門風冷痺類羌活湯出聖濟總録治風濕身體手足不遂疼痛羌活去蘆三分防風去皮一兩五加皮銼半兩薏苡仁炒半兩赤芍藥一兩羚羊角半兩檳榔二枚喂銼磁石煅醋二兩半右搗篩每服六錢水二盞入生薑五片煎取一盞去滓空心食前溫服日二夜一菖蒲散一名六生散治風寒濕痺手足不遂方見本門周痺類五痺湯出和劉方治風寒濕邪客留肌體手足緩弱麻痺不仁或血氣濕鬱痺滯不仁並皆治之片子薑黃洗去灰土羌活白术防己各一兩甘草炒半兩右㕮咀每服四錢水一盞半生薑十片煎至八分去滓病在上食後服病在下空心食前服一方用防風不用防己加海桐皮亦治腳疼牛膝散出聖濟總録治風寒濕痺肢體腰膝冷痛疼痺滯不相隨牛膝去苗酒浸焙半兩桂去皮一分山茱茰半兩右為散每服二錢溫酒調下空心食前日再海上方一名木瓜丸治風濕客搏手足腰膝不能舉動方見寒暑濕門中濕類治風濕痺身體手足收攝不遂肢節疼痛言語澀出聖惠方右用蠋花不限多少以酒拌蒸一炊久取出烺乾為末牛乳一合酒二合令熱調下一錢排風湯出治風經驗方治風疾身體拘攣急麻痺精神錯亂心多怔忪獨活白茯苓麻黃去節各一兩半白蘚皮川芎當歸切焙桂去皮不見火甘草炙杏仁去皮炒各一兩右搗篩為粗末每服五錢水一盞半生薑四片煎至一盞濾去滓稍通口服空心食前日進三服治腰腳不隨出本草取虎腰脊一具細銼訖又以斧於石上更捶碎又取前兩腳全骨如前細捶之兩件並於鐵床上以大炭火勻炙翻轉候待脂出盡則投濃美無灰酒中密封春夏一七秋冬三七空腹隨飲性多則多飲少則少飲未飯前三度溫飲之大户以酒六七斗止小户二斗止患十年以上者不過三劑七年以下者一劑必瘥巳如藥法又一方虎脛骨五六寸已來盡刮去肉膜等塗酥炙令極黃熟細搗絹袋子盛以酒一斗置絹袋子于瓷瓶中然後粳火微煎至七日後任情喫之當微利便瘥治賊風手枯足痺四肢拘攣茵芋酒煮之方見本門血痺類熱痺附論內經於痺論有云其熱者陽氣多隂氣少陽遭隂故為痺熱蓋腑臟壅熱復遇風寒濕之雜至客經絡留而不行陽遭其隂故􅍙痺熻熱而悶也防風丸治熱痺防風去皮羌活去蘆茯苓去木牛膝酒浸焙桂去皮人參枳殼去穰麵炒五加皮銼芍藥丹參薏苡仁玄參麥門冬去心焙生地黃焙一兩磁石煆醋㳯四兩檳榔銼二兩松子仁大黃銼炒木香各半兩右為末煉蜜為丸如桐子大每服溫酒三十丸加至四十丸空心食前石南散治熱痺肌肉熱極上如鼠走唇口反縱皮膚色變兼治諸風石南葉灑醋炒山芋各一兩黃耆銼三分天雄炮去皮臍一兩山茱茰一兩半石膏别研升麻各二兩萎蕤銼一兩甘草炙銼三分丹砂一分另研仍闕研末一處石膏同桃花生用菊花未開者各三分珍珠别研一分山茱茰一兩半右為末次入所研藥拌勻每服一錢空心溫服酒調下日二夜一漸加至二錢升麻湯治熱痺方見脈痺類升麻湯治熱痺肌肉熱極體上如鼠走唇口反縱皮膚變兼諸風皆治之升麻三兩茯神去木人參防風犀角鎊羌活各一兩官桂去皮半兩右銼散每服四錢水二盞薑二片竹瀝少許同煎至一盞不拘時候溫服生地黃湯治熱痺生地黃研取汁竹瀝荆瀝各一升羌活去蘆三兩防風去皮三兩附子一枚重者炮去皮臍拍破之右除前三味外餘三味銼如麻豆每服三錢水一盞半地黃汁竹瀝荆瀝各少許同前煎數沸去滓取一盞不拘時候溫服治熱氣濕痺腹中激熱細擘鱉肉五味煮食之當微泄去一切毒氣除外中熱痺腹中淋露下淋血散五臟結積內寒用大豆煮飲服之肝痺附論內經謂氣寒濕三氣雜至合而為痺又曰以春遇此者為筋痺又曰筋痺不已復感於邪內舍於肝蓋五臟皆有合病久而不去者內舍於其合肝之合筋也故筋痺不已復感於邪則舍于肝也其證夜卧則驚悸小便數上為引懷者是也方人參散治肝痺氣逆胸脅引痛眠卧多驚筋脈攣急鎮肝去邪人參二兩酸棗仁炒杜仲去皮炒黃耆蜜炙茯神去木各一兩五味子熟地黃芎藭細辛去苗秦艽去苗羌活去蘆丹砂飛研各半兩右除丹砂同為散入丹砂研勻每服一錢溫酒調下不拘時候日三細辛湯治肝虛氣痺兩脅脹筋脈拘急不得喘息四肢少力眼目不明細辛去苗葉防風去叉白茯苓去黑皮柏子仁研山茱茰桃仁湯浸去皮尖雙仁麵炒令黃甘草炙各二分蔓荆子半兩木瓜一兩枳殼麵炒半兩萆􅐺五加皮各一兩右銼如麻豆每服三錢水一盞大棗三枚擘破同煎數沸去滓取七分溫服防風湯治肝痺頭目昏塞四肢不利胸膈氣煩防風去叉一兩芎藭黃耆銼五味子人參茯神去木獨活去蘆羚羊角鎊前胡去蘆各三兩細辛去苗葉酸棗仁炒甘草炙各半兩右搗篩每服三錢水一盞大棗三枚擘破同煎取七分去滓溫服不計時候補肝湯治肝痺兩脅下滿筋急不得太息疝瘕四逆搶心腹痛目不明白茯苓去皮一兩二錢山茱茰烏頭四枚去皮臍柏子仁研薏苡仁獨活各半兩附子三枚炮去皮臍桂去皮各三分甘草炙銼半兩防風去叉細辛去苗葉各二兩右銼如麻豆入研藥拌勻每服五錢水一盞半大棗二枚擘破同煎數沸去滓取一盞服不計時候牛膝湯治肝痺筋攣肢體不遂方見本門筋痺類薏苡仁治肝痺筋不利拘攣急痛夜卧多驚上氣煩滿薏苡仁羌活去蘆蔓荆子荆芥穗各二兩白术木瓜去核防風去叉牛膝酒浸焙甘草炙各一兩右銼如麻豆每服五錢水一盞半入薑五片煎至一盞去滓稍服茯神散出聖濟總録治肝痺多驚悸神思不安茯神去木酸棗仁炒黃耆人參各一兩逺志去心熟地黃焙五味子各半兩白茯苓去皮一兩丹砂另研半兩右除丹砂外為散入丹砂末再研勻每服一錢以溫酒調下不計時候萆薢丸出聖濟總目治肝痺緩筋脈去邪毒調榮衛萆􅐺羌活去蘆天麻酒浸焙各一兩附子炮去皮半兩沒藥研乳香研各一分右為末入沒藥乳香同研勻煉蜜為丸如彈子大每服一丸空心溫酒下日再補肝湯出聖濟總目治肝痺兩脅下滿筋急不得太息疝瘕四逆搶心腹痛目不明白茯苓去皮一兩二錢烏頭四枚去皮臍蕤仁研柏子仁研防風去叉細辛去苗葉各二兩山茱茰桂去皮各三分甘草炙銼半兩右銼如麻豆大入研藥拌勻每服五錢水一盞半入大棗二枚同煎數沸去滓取一盞服不計時候心痺附論內經言風寒濕三氣雜至合而為痺又曰以夏遇此為脈痺不已復感于邪內舍於心是為心痺其壯脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐蓋淫氣憂思痺聚在心經所謂諸痺不已亦益內者如此聖惠方云心虛而邪乘幅幅如滿隱隱而痛謂之心痺則怠于飲食心中痺疹其脈弦而強是其候也方犀角散出聖濟總録治心痺精神恍惚恐畏悶亂不得睡卧志氣不定言語錯誤犀角屑牛黃另研麝香另研羚羊角屑各一分丹砂另研半兩防風天麻獨活去蘆龍齒各一分