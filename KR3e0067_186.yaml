昏憤鹿茸去毛酥炙二兩天麻一兩半附子炮去皮臍巴戟天去心菖蒲各一兩石斛去根銼一兩半萆􅐺桂去粗皮乾蠍去蘆牛膝酒浸切焙天雄炮去皮臍獨活去蘆丹參當歸切焙杜仲去皮各一兩肉蓯蓉酒浸切焙一兩半磁石煨醋碎細研水飛一兩右為細末煉蜜和勻搗三五百下丸如桐子大每二十丸加至三十丸空心及晚食前溫酒下乾漆丸出指南方治肉骨痺皮寒鹿茸乾地黃各四兩乾漆半兩右為細末煉蜜丸如梧桐子大每服三十丸空心溫酒下血痺附論夫血痺之狀形體肌膚如被微寒所吹者是也蓋血為隂邪入於血而痺故謂之血痺宜先針引陽氣後以藥治之聖惠方云風血痺者由體虛故隂邪入於血經故也入於血經而為痺故為風血痺也其狀形體如被微風所吹此由優樂之人骨弱肌膚充盛因痺勞汗出膚腠易開為風寒所浸故也診其脈自微而澀在寸口關上小緊者為風血痺也急針引陽氣令脈和緊之則愈方黃耆酒一名小黃耆酒出鮑氏方治血痺及諸痺甚者四肢不遂風濕寒痺舉體腫痛疼不仁兼治風虛痰癖四肢偏枯兩腳弱手不能上頭或小腹縮痛脅下攣急心下有伏水脅下有稍飲夜夢悲愁不樂恍惚善忘由風虛五臟受邪所致或久坐腰痛耳聾卒起眼眩頭重或舉體脹腫疼痛不思飲食畏寒冷胸中痰滿心下氣塞及婦人産後餘疾風虛積冷不除者大黃銼生一兩山茱茰二兩乾薑炮三兩半黃耆獨活去蘆防風去叉甘草炙白术蜀椒去目并閉口者炒出汗附子炮去皮臍牛膝芎藭細辛去苗葉各二兩當歸切焙桂去皮二兩半葛根秦芃去苗上烏頭炮製去皮臍以上三味各二兩右銼如麻豆用夾絹囊盛貯以清酒一斗浸之春夏五日秋冬三日初服三合曰再夜一漸增以知為度虛弱者加蓯蓉二兩下利者加女萎三兩多忘加石斛菖蒲紫石英各二兩心虛加茯苓人參各二兩山藥三兩酒盡可更以酒二斗重漬服之不爾可曝滓搗下篩酒服方寸匕不知少增之服一劑得力令人耐寒冷補虛治諸風冷神妙壯人服無熬揀老弱人微熬揀乾地黃丸出聖濟總録治血痺去邪益心悅顔色壯筋力生乾地黃焙二兩半五味子桂去粗皮秦芃去苗土獨活去蘆附子炮去皮臍石斛去根各二兩半逺志去心一兩萆􅐺炒肉蓯蓉酒浸切焙兔絲子酒浸另搗蛇床子炒牛膝酒浸切焙狗脊去毛各一兩半訶梨勒皮檳榔銼各三兩半桃仁去皮尖雙仁炒一兩半右為細末煉蜜和丸如桐子大每日空心食前溫酒下二十丸萆薢酒出聖濟總録治血癢及五臟六腑皮膚骨髓肌肉筋脈等疾不問新久萆􅐺防風去叉兔絲子杜仲去粗皮銼炒黃耆菊花天雄炮去皮臍石斛去根生乾地黃焙地骨皮續斷金方煨醋淬石南肉蓯蓉酒浸切焙蜀椒去目閉口者炒出汗各一兩右㕮咀夾絹囊盛貯以無灰酒五升浸二七日每日月存性服候減一升即旋添酒一升藥薄即别製年老人亦可服萆􅐺丸出千金方治血痺手足足􅍙麻不仁遊走無定風痺等證萆􅐺炒山芋牛膝酒浸切焙各一兩白术半兩地膚子炒半兩乾漆炒令煙出蠐螬天雄炮去皮臍各三分澤瀉一兩熟乾地黃焙一兩茵芋去皮莖一錢狗脊去毛半兩山茱茰一兩車前子炒三分右除蠐螬研入外搗羅為末和令勻煉蜜和丸如梧桐子大空心食前溫酒下十丸至十五丸日二夜一地黃丸治風寒痺走無定處及諸風痺方見本門行痺類茵芋酒出聖濟總録治風血痺肌體手足痿弱四肢拘攣茵芋去粗皮附子炮去皮臍天雄炮去皮􅢥烏頭去皮臍秦芃去土女萎防風去叉羊躑躅防己石南細辛去葉苗桂去粗皮各一兩右㕮咀如麻豆夾絹囊盛貯以清酒五升浸之冬七日夏三日秋五日春五日初服一合日三漸增萆薢丸治風邪遊走無定處名曰血痺方見本門風冷痺類防風湯出醫方大成治風血痺皮膚不仁防風去叉二兩甘草炙銼半兩獨活去蘆三分赤茯苓去皮當歸秦芃去苗土各一兩茵芋去粗蒸半兩桂去粗皮三分杏仁湯去皮尖雙仁麵炒半兩右搗篩每服四錢水酒各七分入生薑五片煎至八分去滓溫服不計時候一方有赤芍藥黃芩各一兩無茵芋芍藥湯一名側子散出聖惠方治風血痺身體不仁肉冷赤芍藥側子炮去皮臍桂去粗皮麻黃去根節萆􅐺炒當歸切焙丹砂各一分細辛去苗葉甘草炙銼各半兩右銼如麻豆每服三錢水一盞入生薑五片同煎至六分去滓溫服不計時候麻黃散出聖惠方治風血痺肌膚不仁四肢緩弱麻黃三分去根節烏蛇二兩酒浸炙令黃去皮骨白术防風去蘆桂心當歸各三分銼微炒蛜􅖉一分微炒去足附子一兩炮去皮􅢥右為細散每服不計時候以豆淋酒調下一錢茵芋散出聖惠方治風血痺體虛風邪入血肌膚頑痺茵芋天雄炮去皮臍石南附子炮去皮臍桂心秦芃去苗防風各一兩去蘆川烏頭半兩去皮臍躑躅花半兩醋拌勻炒干右為末每服不計時候以溫酒調下一錢黃耆湯出千金方治血痺隂陽俱微寸心口關上微尺中小緊外證身體不仁如風狀者蜀黃耆人參芍藥桂心各二兩生薑六兩大棗十二枚右㕮咀以水六升煮取二升服七合三服令盡黃耆五物湯出三因方治骨弱肌重困疲勞汗出卧不時動搖加以微風遂作血痺脈當隂陽俱微尺中少腎身體如風痺狀黃耆芍藥桂心各等分右銼散每服四大錢水二盞薑五片棗三枚煎至七分去滓食前服日三一方有人參腸痺附論內經曰腸痺者數飲而出不得中氣喘爭時發飱泄夫人腸者傳導之官其所以傳導者皆沖和之氣今風寒濕三氣於虛客乘腸間則邪留而和氣閉矣故其證數飲而氣不得出中氣喘爭時發飱泄大小腸氣痺水道不通故雖多飲而不得溲便并氣於大腸使糟粨不化故中氣喘角爭時發飱泄也方木香丸出聖濟總録治腸痺腹脹癘痛時復飱泄食不消化小便祕澀木香白术桂去粗皮蕪荑炒髙良薑銼各一兩訶梨勒煨用皮一兩半乾薑炮三分附子炮去皮臍一兩肉豆蔲去殼半兩甘草炙各半兩厚朴去皮生薑汁炙過二兩右為末以麴末煎作糊和搗三二百杵丸如梧桐子大食前生薑棗湯下二十丸吳茱茰散治腸痺寒濕內搏腹腸滿氣急大便飱泄吳茱茰湯洗焙乾炒肉豆蔲仁乾薑炮甘草炙各半兩陳橘皮湯去白焙髙良薑厚朴去粗皮生薑汁炙各二兩縮砂仁白术各一兩右為散每服一錢稀粥飲調下食前服草豆蔲散出聖濟方治腸虛寒濕內攻腹痛飱泄草豆蔲陳橘皮湯去白各一兩桂去皮木香白术當歸切焙白豆蔲仁髙良薑各五錢右為散每服一錢煎生薑棗湯調下食前服訶梨勒湯出聖濟録治腸痺飱泄腹脹氣痛飲食不化訶梨勒煨用皮一兩半附子炮去皮臍一兩木香半兩當歸切焙三分桔梗炒半兩肉豆蔲去殼三分吳茱茰湯浸七次焙乾炒一分陳橘皮湯浸去白焙三分甘草炙銼一分右搗篩每服三錢水一中盞入生薑半分棗二枚煎至七分去滓食前稍熱服木香散出聖濟録治痺腹脹飱泄小便不利杏仁三兩訶梨勒焙皮半兩附子炮去皮臍一兩乾薑炮一兩厚朴去粗皮生薑汁炙二兩甘草炙半兩枳實去穰麵炒一兩赤茯苓去皮一兩當歸炒一兩右為末每服二錢粥飲調下食前赤茯苓丸出聖濟録治腸痺腹滿喘急小便不利大便飱泄赤茯苓去黑皮白术桂去粗皮各二兩訶梨勒煨去夥木香陳橘皮湯去白焙厚朴薑汁炙各一兩右為末煉蜜為丸如梧桐子大每服三十丸米飲下空心食前日二次服訶梨勒丸出聖濟録治腸痺飱泄腹脅脹滿訶梨勒煨用皮當歸微炒黃連去鬚白术厚朴去皮薑汁炙各一兩乾薑炮三分木香三分右為末煉蜜和搗三二百下丸如梧桐子大每服三十丸粥飲下不拘時候胞痺附論內經謂胞痺者少腹膀胱按之內痛若沃以湯澀於小便上為清洟夫膀胱為州都之官津液藏焉氣化則能出矣今風寒濕邪氣客于胞中則氣閉不能化出故胞滿而水道不通其證少腹膀胱按之內痛若沃以湯澀於小便以足太陽經氣閼故熱而痛也上為清涕以足太陽經其行者從巔入絡腦腦氣下灌出於鼻竅則為清涕矣方治胞痺臍腹疼痛小水不利山芋附子炮去皮臍續斷各一兩杜仲去皮酥炒巴戟天去心一兩半桑螵蛸切焙以麵令炒黑色為度一分逺志去心三分石斛去根各三分鹿茸酥炙去毛龍骨兔絲子酒浸一宿另搗三錢五味子山茱茰桂去皮各三分生乾地黃焙另于木臼內搗肉蓯蓉酒浸去皮切焙各一兩右為細末别搗者相合令勻煉蜜為丸如梧桐子大每服空心溫酒下三十丸黃耆湯治胞痺少腹膀胱按之內痛黃耆目銼當歸切焙甘草炙黃芩去黑心逺志去心焙五味子芍藥人參赤茯苓去黑心麥門冬去心焙澤瀉生乾地黃焙桂去皮防風一兩乾薑半兩右搗篩每服五錢水二盞入羊腎一隻細切大棗二枚擘破同煎至一盞去滓空心服秦芁酒一名羊膝酒治胞痺方見本門腎庳類人參湯治胞痺小便不利人參芍藥麥門冬去心焙當歸切焙生乾地黃酒浸去土焙甘草炙芎藭逺志去心赤茯苓去黑皮五味子各一兩黃芩去心半兩桂去粗皮三兩乾薑炮一兩右搗篩每服五錢先用水二盞煮羊腎一雙至一盞半除腎下藥末大棗三枚擘破同煎至一盞去滓空心溫服日二茯苓丸一名防風丸治胞痺少腹內痛方見本門腎痺方腎瀝湯出衛生寶鑑治胞痺小腹急痛小便赤澀桑螵蛸十枚切破炙令黃犀角屑麥門冬去心焙五加皮各一兩半杜仲去皮酥炙木通桔梗炒各一兩赤芍藥三分右搗篩每服五錢水一盞半入羊腎一雙去脂膜切竹瀝少許同煎至一盞去滓空心服日再一方用桑白皮無桑螵蛸百合飲治胞痺補益生百合三兩赤茯苓去黑皮二兩麋角屑三兩麥門冬去心焙肉蓯蓉酒浸切各一兩半黃耆一兩薏苡仁三合右銼如麻豆大每服五錢水一盞半煎至八分去滓溫服空心日再溫腎湯治胞痺小便不利腰脊疼腹背拘急絞痛赤茯苓去黑皮白术澤瀉乾薑炮各四兩腎著湯出宣明論治胞痺小便不利赤茯苓去黑皮白术各四兩乾薑炮二兩甘草炙三兩右㕮咀每服四錢水二盞煎至一盞去滓溫服空心食前各一服此味溫腎內用前右㕮咀每服五錢水二盞煎至一盞去滓溫服空心食前各一服加桂亦得普濟方卷一百八十六
