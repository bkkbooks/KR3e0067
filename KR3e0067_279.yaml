body:
  text: 普濟方卷二百七十九明周王朱橚撰諸瘡腫門毒腫附論毒腫之病風毒結腫於皮膚肌肉之中亦有根於虚軟處邪氣不出入人腹中乃至不救古方謂與風腫不殊葢以同受於風特有輕重之異耳令人壯熱増寒比風腫之證不止為虚浮而已時疫肐􅭫腫毒病者古方書論解不見其說古人無此病故無此方惟正隆楊公集拯濟方内言自天眷皇祐間生於嶺北次於太原後於燕薊山野頗罹此患至今不絶互相傳染多至死亡至有不保其家者其狀似雲頭腫連咽頸攻内則喉嚨堵塞水藥難通攻外則頭面如牛眼耳宂盈視聼俱非杜絶聞見病惡命危汗之益深疎利頗瘥初見増寒稍欲飲水脈沉不可温辛發汗急以大黄芒硝之類苦泄寒凉之劑加倍併服得快利方為可救毒氣稍退漸减凉藥理之咽堵食藥不下先灌生油半盞自然能通後於本方選而用之方消毒湯出瘡科精要治一切毒腫獨活防風細辛藁本川芎枸杞子荆芥漏蘆大黄黄芩去腐官桂葳靈仙苦參丹參黄耆當歸芍藥無心草茯苓黄連黄蘖麻黄葛根地骨皮蒴藋菊花杜仲秦皮菵草露蜂房甘草甘松藿香白芷升麻零陵香各一兩蒼术三兩菖蒲半觔朴硝五兩右為粗末每用藥半兩水二升葱三莖槐栁枝各一握同煎十餘沸去滓熱淋洗浴此藥用之如神百雜瘡腫悉能内消犀角丸出聖濟総録治一切毒腫服之腫化為水犀角鎊二兩升麻去黒心黄芩去黑心人參剉黄耆剉防風去尖叉當歸剉焙乾薑炮蓼藍焙黄連去鬚甘草炙梔子仁各四兩大黄剉三兩巴豆三十枚去皮心膜炒黄右硏巴豆令極細末入餘藥並為細末入巴豆和勻煉蜜和丸如梧桐子大每服五丸米飲下加至十丸以利為度得利以温漿水粥助之常服即減丸數腫消即止玉龍膏出聖濟總録治一切毒腫疼痛摩風止痛栝蔞大者一枚去瓤細剉以爛為度零陵香芍藥藿香葉甘草炙黄耆杏仁湯浸去皮尖雙仁各一兩香白芷半兩清油一十兩黄蠟一兩半麝香一分研當歸一兩生薑一兩切烏蛇酒浸焙取半兩右除黄蠟麝香外細剉如麻豆大以酒浸於銀石器内慢火養一日次日添火熬令黄色用綿濾去滓後入黄蠟攪勻看鞭輭欲凝方可下麝香傾在磁瓦罐内候冷貼腫處五香連翹湯出聖濟總録治毒熱腫初結膿血未潰攻發疼痛連翹射干升麻獨活去蘆頭桑寄生木通沉香木香薰陸香研一方用乳香麝香研各二兩丁香二兩大黄炒三兩右㕮咀十味如麻豆大再入硏藥和勻每服五錢用水一盞半煎至一盞入竹瀝三分再煎一沸去滓温服以利為度一方有甘草一兩大五香湯出聖濟總録治毒氣攻肌肉腫痛寒熱心中煩悶木香鷄舌香沉香剉藿香葉犀角剉甘草炙薰陸香各一兩升麻細辛去苖葉麻黄去根節桂去粗皮吳茱萸湯浸去涎炒各半兩右粗搗篩每服四錢用水一盞半煎至一盞去滓温服不拘時候漏蘆散出聖惠方治毒腫疼痛心神煩熱大腸秘濇漏蘆白歛黄芩麻黄去根節知母枳實麩炒微黄升麻犀角屑赤芍藥各一兩甘草炙微赤剉川芒硝川大黄各二兩剉碎㣲炒右為㪚每服三錢水一中盞煎至五分去滓不拘時候温服崔氏五香湯出聖惠方療毒腫麝香研青木香鷄舌香藿香薰陸香當歸黄芩升麻芒硝各三分大黄五分右切以水六升煮取二升去滓入芒硝令烊分為二服相去六七里久亦療諸卒尸諸惡氣也治諸毒腫膏方亦治熱瘡出肘後方升麻白歛漏蘆去蘆頭連翹芒硝各二兩黄芩去黒心蛇㘅草各三兩蒴藋根四兩山梔子仁二十枚右搗碎酒浸半月以猪膏二升煎之候氣歇膏成濾去滓磁瓦器盛塗貼腫處外臺秘要有枳實大黄散出聖惠方治毒腫恐惡氣入腹服此疎利毒氣川大黄二兩生用木香一兩丁香半兩獨活一兩桑寄生射干各一兩甘草半兩生用麝香一分細研右為散入麝香硏令勻每服五錢水一大盞煎至五分去滓食前温服犀角湯出聖惠方薰陸香青木香鷄舌香藿香犀角鎊各二分沉香二分升麻七分右切以水六升煮取二升半去滓分三服其間消息以意量之毒腫不治必殺人也麻子小豆湯出千金方治毒腫無定處或赤色惡寒或心腹刺痛煩悶者此是毒氣深腫所致也麻子赤小豆各半升生商陸二升附子二兩射干三兩升麻四兩右㕮咀以水四升先煮四味取二升半去滓次硏麻子碎和汁煮一沸濾去滓取爛汁煮豆其汁每服五合日二夜一以利小便為度腫退則瘥并食豆消腫木香散出御藥院方治濕毒腫皮肉色不變木香當歸射干莽草大黄黄蘖另為末各等分右為細末每用藥一大匙入白麪一匙頭淡醋調稀慢火上熬令稠攤在紙花子上貼患處勿令大乾則換新藥一日四五次消毒散治諸瘡毒腫大力子黄芩連翹大黄升麻𤣥參各等分右水煎三五錢去滓無時服沉香散出聖惠方治毒腫入腹心悶腹脹不欲飲食沉香木香丁香薰陸香各一兩麝香一分細研川大黄三兩剉碎㣲炒右為散每服四錢水一中盞煎至六分去滓不拘時候温服大黄丸出聖濟総録治風毒熱結日夜疼痛心煩懊悶大黄切作小塊洒微炒三兩甘草炙三兩杏仁去皮尖并雙仁研如膏四兩訶梨勒破取皮三兩芒硝研五兩右先将三味搗羅為末後入芒硝末杏仁膏同和入煉蜜為丸如梧桐子大每服十五丸温酒下初服未利加二十丸臟腑實則三十丸量虛實服之以効為度莽草散出聖濟総録治惡毒風腫不消結成堅核莽草剉附子生去皮臍剉木香白歛桂生去粗皮各一兩右為細末别以榆根剉搗絞取汁調藥於故帛上貼乾則易之開一小竅出毒射干飲出聖惠方治毒腫無定處或振慄惡寒心腹刺痛射干附子炮刮去皮臍各三兩商陸根薄切三兩赤小豆炒三合麻子一升半右㕮咀以水五升先煮麻子取三升去滓硏麻子令破以麻子汁煮藥以豆熟為度去滓取二升分四服空心温服日夜令盡小便利即毒腫消外臺秘要有升麻葛根牛蒡子湯出瘡科精要治時毒大頭病是也葛根管仲甘草鹹䜴牛蒡子各一兩右細末每服三錢用水調下此病近代患者傳染多致夭枉治之者不得其法只云大熱使然不知亦有虛實表裏之分治之者須詳其汗下吐之不同大抵與傷寒頗類其中亦有可針鎌砭射出血者亦有久而敗爛出膿者其間變易百端不可不慎也繁栁散出聖濟總録治腫毒繁栁燒灰二兩白歛一兩赤小豆一合大黄剉一兩右為細散以新水調和如糊塗貼腫上乾即易之以瘥為度大黄傅方出聖惠方治初覺腫痛令消大黄剉炒一兩木通剉葶藶紙上炒莽草各一兩右為末以水和之傅上乾即易一方無莽草洗毒湯出瘡科精要苦參防風甘草炙露蜂房右各等分㕮咀水煮濃洗瘡腫蕓薹子散出聖惠方治毒腫不消時有疼痛蕓薹子三兩桑葉一兩龍葵一兩牛蒡子半兩右為末用漿水調塗腫處乾即易之檀香飲出聖濟總録解惡毒風腫白檀香沉香一塊重三兩檳榔一枚右各於砂盆中以水三盞磨取盡濾去滓銀石銚内煎沸候温分作三服追風毒消腫散附子去尖皮臍剉石硫黄硏天南星生各半兩右為細末醋調塗腫處乾即易之消毒散消肐􅭫腫毒大黄牙硝青黛各等分右為細末水調鵞翎掃立消消毒丸出濟生㧞萃治時毒疙瘩惡證大黄牡蠣燒白殭蠶炒各一兩右為細末煉蜜為丸彈子大新汲水化下一丸無時内加桔梗䑕粘子尢妙内消膏出聖惠方治熱毒腫肥皂莢二挺以好酒一鍾浸挼取汁青鹽硝石各一分右相和熬成膏塗於腫上日二易之大黄散出聖惠方治毒腫惡瘡方見本門熱瘡類治毒腫不問軟硬方蜀葵根茄子根冬瓜根各五兩右並燒候煙絶即出勿令作灰細硏以生麻油調塗於故帛上貼之如膿未出當便内消膿已出即便撮合内消毒散出聖惠方白歛白芷白芨各二兩右為細散硏生薑汁調塗乾即再塗鹿角散出聖惠方治毒腫痛不可忍鹿角一兩磨刀粗石爛者一兩白歛一兩右為末以醋塗於腫上乾即更塗葱熨方出聖濟總録治惡毒風腫及白虎風痛釅醋五升葱白切三觔右相和煮沸漉出葱用布帛熱裹當腫上熨之冷即更煮依前熨以瘥為度保救膏出聖濟總録治諸腫毒及熱毒氣腫椒葉五升馬齒莧連根三觔洗浄切焙右用水五斗慢火煮時将栁木棍攪至一斗許住火放冷濾去滓将汁再熬令濃以新磁礶子盛用時以鷄翎掃藥如瘡腫痛以軟帛子貼之一方用自然汁治熱毒腫方出聖惠方蔓青根蕓臺苖葉各三兩右為散以鷄子清和貼熁乾即易治項側屬少陽經中疙瘩不辨肉色不分大小及日月深淺或赤硬腫痛出濟生㧞萃生山藥一挺去皮􅒝麻子一個右搗爛攤在帛上貼之如神蘹香草飲出千金方解惡毒風腫或著人隂或著一邉疼痛攣急牽引小腹悶亂難忍以生蘹香草不拘多少搗絞取汁每服一合用酒三合同煎令沸空心晚食前温服一方無酒渣敷腫上冬月缺生者根亦可此是外國神方用之起死回生神効治一切毒腫不問軟硬出聖惠方以胡葱熟搗和生油調塗之即瘥竈土塗方出聖濟總録治毒腫取竈底黃土以醋硏和塗腫上日三五度治一切毒腫以生大豆搗爛塗之治毒腫以生搗秫米和以鷄子白敷之良又方以粳米久陳者蒸作飯和醋封毒腫立瘥又北人炊之甕中水浸酸食之暖五臟六腑氣治背上忽腫漸如碟子不識名者用水中圓石一兩塊燒令極熱㵼入清水中沸定後洗腫處立瘥治腫大如斗取鷄翅毛一孔生兩毛佳右腫取左翅左腫取右翅雙腫取兩邊翅並燒灰研飲服之治氣腫毒初起急痛出肘後方用蔓青根大者削去上皮熱搗苦酒和如泥煮三沸急攪之出敷腫帛裹上日再三易用子亦良治毒腫出肘後方用决明子調塗之治脚腫向上至腹即殺人者出千金方用赤小豆以水三斗煮令爛出豆以汁浸脚至膝每日一度瘥止若已竟入腹不須浸但煮豆食之忌鹽菜米麪等如渇飲汁瘥乃止治一切毒腫疼痛不可忍者出千金方用胡麻子熟搗敷之即瘥李兵手即方出外科精要療毒瘡腫號呌臥不得人不識者以獨頭大蒜兩顆細搗以麻油和研敷瘡上乾即易之瘥治毒腫出肘後方以鷄腸草敷之治毒攻手足腫痛欲絶者出肘後方以猪蹄一具和葱煮去渣内鹽少許以敷之治毒腫痛取松枝燒研為細末塗之以帛裹其上良治毒腫入腹疼痛或牽小腹及腰胯痛方出聖惠方用桃仁二合湯浸去皮尖及雙仁硏如膏每服以暖酒調下小彈子大日三四服治熱毒腫痛不消出聖惠方用桑花五兩為末生蜜調塗敷腫上又方出聖惠方用葵菜根和鹽搗敷之又方出聖惠方用益母草二握去兩頭以酒三升煎取一升去滓頻服又方出聖惠方用鷄子清封腫上熱即易之又方出聖惠方用地松搗汁每服一小盞日四五服又方出聖惠方用狗舌草一觔去兩頭以水五升於銅器中煮汁二升去滓搜麪作羮粥食之治毒腫醋磨大黄塗患處即消此方得林庇民云嘗試易効治毒腫出本草以蕕草葉搗敷治毒腫出本草用石蒜搗敷貼治毒腫出本草以生瓜菜搗貼治毒腫出本草不問硬軟取楸葉十重敷腫上即以舊帛裹之日三易當重重有毒氣為水流在葉中如冬月取乾葉鹽浸良久用之或取根皮剉爛搗敷之皆効治毒腫結熱出本草以由跋用苦酒磨塗腫處効治腫毒出本草用地蜈蚣水摩塗治腫毒出本草用地芙蓉葉搗敷貼治毒腫出聖惠方以瓮近下鑽一孔盛水注於腫上丹毒附論夫諸痛瘡癢皆屬於心心虚寒則癢心實熱則痛丹毒之病由心實熱也心生血主脈血熱則肌浮隂滯於陽即發丹毒方論有云以其色赤如丹砂塗之故得丹名然又有水丹白丹五色丹油丹豈專以赤為名也又有赤硫天火殃火尿竈廢竈野火等方以為小兒出入遊行觸犯所致此因容或有之若小兒在襁褓中未能出入亦患此者是豈因犯即病乎大率皆血氣之所為也凡火丹者肉中或赤如丹塗之色痛癢不定甚至遍身白丹者肌肉腫起癢痛如咬状鷄冠丹者亦名茱萸丹肉上粟起如鷄冠水丹者徧身熱起黄色如水在皮中五色油丹亦名油腫赤流丹腫熱赤色流入四肢以上皆不問大小如天火螢火殃火尿竈朱田野火等丹多着少小但自腹内生出四肢者則易愈自四肢生入腹者則難治治丹毒方千金外䑓甚多無出用冷物治之凡冷物無過藻菜如有患丹毒熱腫等證者取渠中藻菜細切熱搗敷丹上厚三分乾則易之甚良熱毒之氣暴發於皮膚間不得外出則血為丹毒熱氣慓悍其發無常處大則如掌甚則周流四體不急治或至壊爛出膿血發熱於骨節之間則肢斷如截毒氣入腹則能殺人治法用針鎌砭割不可緩治也少陽客氣勝丹疹外發又曰諸痛瘡瘍皆屬於心火土大闗又謂百端之起皆自心生豈可便用辛温發散致熱勢增劇漸成臟毒下血咬牙發搐大熱明矣夫時毒者四時邪毒之氣而感之於人也其後發於鼻面耳項咽喉赤腫無頭或結核有瘡令人增寒發熱頭痛肢體痛甚者恍惚不寧咽喉閉塞人不識者将謂傷寒便服解藥一二日腫起益増方悟始召瘡醫原夫此疾並無方論世俗通謂丹瘤病家惡言時毒竊恐傳染考之於經曰人身忽經變赤狀如塗丹謂之丹毒此風熱惡毒所為謂之丹瘤與夫時毒固不同耳蓋時毒者感四時不正之氣初發狀如傷寒五七日之間乃能殺人治之宜精辨之先胗其脈滑數浮洪沉緊弦濇皆其侯也蓋浮數者邪氣在表也沉濇者邪氣深入也感四時毒氣壯實之人急服化毒丹以攻之熱實以五利大黄湯下之其有表證者解毒升麻湯以發之或氣軟者五香連翹湯主之又於鼻内搐通氣散取十餘嚏作効若㗜藥不嚏不可治之如嚏出膿血者治之必愈如左右看病之人日用㗜藥嚏之必不傳染切須記之其病人每日用嚏藥三五次以泄熱毒此治時毒之良法也經三四日不解者不可大下猶宜和解之服犀角散連翹散之類至七八日大小便通利頭面腫起髙赤者可服托裏散黄耆散宜針鎌砭割出血泄其毒氣十日外不治自愈也此病若五日以前精神昏亂咽喉閉塞語聲不出頭面不腫食不知味者即死之候然而此疾有隂有陽有可汗有可下當見粗工但云熱毒則用寒藥殊不知病有微甚治有逆從不可不審矣方烏蛇膏出和劑方治風邪毒氣外客皮膚薰發成腫所起不定遊走徃來時發癢痛或風毒熱盛攻注成瘡焮赤多膿瘡邊𦂳急但是風腫並皆治之吳茱萸藁本獨活白殭蠶去絲嘴炒細辛嘆椒去目炒半夏防風赤芍藥當歸桂心川芎香白芷各半兩烏蛇黄蠟各二兩乾蝎附子去皮尖各一兩右細剉以臘月猪脂二觔文火煎候白芷赤黑色為度綿濾去滓下蠟入磁器内盛每用取少許摩之令熱日三一方有芒硝升麻膏出聖惠方治丹疹煩熱疼痛不止升麻白薇肘後作白漏蘆蒴藋各四兩黄芩二兩蛇啣草枳實各三兩右搗碎以水三升浸半升再以猪膏五升煎令水氣盡去滓膏成傅上諸丹皆用之及熱瘡腫上日三經心録無枳實以治諸毒腫硼砂丸出聖濟總録治丹毒遊走及魚臍瘡硼砂研雄雀屎桂去粗皮獺膽去膜硫黄丹砂研細各一分麝香研一錢白蠟一兩半天南星三分鷓鴣嘴半兩右除蠟搗硏為細末先将蠟於磁器内慢火上鎔下藥調為丸如梧桐子大先用針撥破瘡口入一丸醋調麪塗故帛貼兩宿痛止即掲去収藥丸可再用漏蘆湯出聖濟總録治丹毒遊走搨洗後服漏蘆去蘆頭白歛黄芩去黒心麻黄去根節湯煮掠去沫升麻白薇芍藥大黄剉甘草炙各一兩右粗搗篩每服五錢用水一盞半煎至八分去滓食後温服至晚再服以瘥為度吳藍湯出聖濟總録搨洗丹毒吳藍一兩生地黄升麻石膏黄芩去黒心犀角鎊白歛梔子仁大黄各半兩右細剉每用半兩以竹瀝一盞水七盞同煎至四盞去渣以故帛浸搨患處一日五七次黄芩湯出聖濟總録搨洗丹毒癰疽始發焮熱浸淫長大黄芩去黒心升麻各一兩半黄連去鬚芎窮各一兩甘草剉當歸去蘆焙羚羊角鎊各半兩右細剉每用一兩以水五盞煎至三盞去渣下芒硝半兩攪勻以故帛三兩重浸藥汁濕搨患處數十遍早晩用以瘥為度金花散出三因方治一切丹毒鬱金黄芩甘草山栀大黄黄連糯米右各一兩生為末蜜和冷水調以鵝毛上患處升麻湯一名漏蘆湯出千金方治毒方及丹疹毒氣不消時發疼痛升麻一兩漏蘆芒硝各二兩黄芩三兩蒴藋三兩梔子二十枚右㕮咀以水一斗浸良久煮取七升冷以故帛染汁搨諸丹毒上常令濕搨後須服飲子并漏蘆湯方併見前癰腫條中服之立瘥小品用治丹疹諸毒腫聖濟方内不用蒴藋一方無黄芩胡粉塗敷方出聖濟總録治風丹胡粉赤小豆糯米黄連去鬚各一兩水銀半兩山茱萸一兩右除水銀外搗羅為散生油調如糊後取水銀於掌中以津唾硏如泥入藥内硏勻先以椒湯洗丹上拭乾用藥塗敷日三兩遍牛黄散治腫丹毒鬱金甘草桔梗天花粉蛤粉右為末每服一錢薄荷湯入蜜水調服四順清凉飲子治一切丹毒積熱壅滯咽喉腫痛當歸甘草芍藥大黄右等分㕮咀每服一錢水一盞半煎至七分去渣食後温服金花散出聖惠方治一切丹毒熱焮疼痛鬱金一兩黄連一兩黄芩一兩糯米二合右為細末每用蜜水調令稀稠得所用鷄翎薄掃丹上乾即便塗又方出聖濟總録治赤黑丹䜴一兩香薷蓼葉各半兩右為末和入酒少許細硏成膏塗患處乾即易又方出聖濟總録治丹毒遍身赤腫茺蔚草蛇啣草慎火草各一兩右剉搗令熟調敷患處數次治丹毒蛇蛻皮一條露蜂房三兩新附淋草半斤右以水一斗煮取四升以帛搨洗之隨手消神効治一切丹毒惡氣攻刺身體赤腫疼痛不可忍方出聖惠方車前子益母草地膽草右爛硏塗之乾即更塗又方出聖惠方治火丹赤小豆一升羊角一對右同燒存性為末和蜜塗之一方以鷄子白和塗之如無羊角單用小豆亦良白玉石散治赤遊丹毒腫白玉寒水石各一兩右為末米醋調敷患處或腫至外腎有破肌用水調掃又方出千金方治一切丹疹毒以水苔搗爛敷之又方出聖惠方以生地黄搗汁塗之熱即易赤小豆亦佳又方出千金方以生水菘菜搗爛敷之又方出千金方以五葉藤搗為末水調塗之又方出聖惠方以五葉草搗爛塗之又方出聖惠方以浮萍草搗爛塗之又方出百一𨕖方用大黄為末水和敷之又方出百一選方治火丹毒以梔子仁為末水和塗之又方名拔毒膏出千金方治丹毒凡天下極冷無過藻菜但有患熱腫毒并丹毒等等取渠中藻菜細切熟搗敷之厚三分乾即易之治諸丹神驗方出千金方以蕓薹菜熱搗厚封之隨手即消如餘熱氣未愈但以三日内封使醒醒好瘥上也然縱乾亦封之勿絶歇以絶本根昔有人飲多至夜睡中覺四肢遍體骨肉疼痛比至晩頭痛目眩左額角上如彈丸大腫痛不得近手五更時至於右角至夜諸處皆到其眼遂閉合不得開幾至殞斃以種種藥治不瘥經七日余自處此方其驗如神故留之以傳來世云耳治五色油丹方出千金方俗名油腫若犯者多致死不可輕之用菉豆作枕頭卧甚良治赤流腫丹毒一方云治五色油丹俗名油腫若犯多致死不可輕之出聖惠方取榆根白皮為末鷄子白和傅之千金翼云鷄子白和蒲席灰傅又方出千金方搗大麻子和傅之又方出聖惠總錄治丹毒流移不定以煎羊脂摩之得青羊脂最良集驗方云治人面目身體卒赤黑丹起如疥狀不治日劇遍身即殺人或用生猪肉切片貼之牛肉亦可香欒皮方出三因方治諸腫丹毒發於四肢腹背頭面或赤或白或癢或痛或寒或熱者以欒皮一兩水一大碗同煎取半碗以翎毛刷患處神効伏龍肝散出三因方治少小諸腫丹毒用伏龍肝不拘多少為末以鷄子白和傅之日三次赤小豆塗傅方出十便良方治丹毒如手掌大身體赤發痛癢或微生瘡用赤小豆搗羅為末以鷄子白調如糊塗丹上乾即易先用枸杞根煎湯洗後敷瘡如痛用水潤之又方出聖濟総録治赤黑丹兼治惡瘡亦治小兒白丹以猪屎燒灰細硏為散以鷄子白旋調如糊塗丹上日三五次治丹毒遍身赤腫出聖濟總録用生蘿蔔一味搗絞取汁調丹上日三五次又方出聖濟總録以惡實根五兩取時勿令見風及鷄犬剉搗熱水調敷患處乾即愈外臺秘要兼絞汁飲之佳治諸丹毒方出聖濟總録取蕓薹汁入大黄末芒硝生鐵衣相和塗之佳雞蘇塗方出聖濟總録治火丹熱毒之氣五色為定宜先傅然後服藥搗生雞蘇厚塗之又方出肘後方治火丹亦療白丹研䜴和屋塵等分以苦酒調傅之又方出聖濟總録取連錢草以鹽挼敷之纒蛇丹方以雄黄為末水調塗兼用酒調服治丹毒五色無常者一名鹿角散出肘後方燒鹿角為末和猪脂敷之一云治面目赤黑丹如疥不急治遍身即死治刪繁丹走皮中浸淫一名火丹及諸瘡疼痛出聖惠方取蠐螬搗敷之糞中者尤佳一方用研以鷄子清調塗之乾即再塗治丹毒惡瘡五色無常者出肘後方煮栗皮有刺者洗之佳又方出聖惠方治發足及一切丹毒惡氣五色無常痛不可忍若壞皮膚則出膿血或發骨節即斷人四肢此蓋疽之類也搗蒜厚敷乾即易大小蒜皆可治丹毒發作恐其入腹一時無藥秘方急以針於紅㸃處刺出惡血使毒氣於此而散纒蛇丹方用紫背草老鴉草擂搗爛塗之愈治螢火丹從頭起出千金方以醋塗之消治火丹方出聖惠方用黄芩為末水調塗上治丹者惡毒之氣結成無色無定出肘後方以蜜和乾薑末塗之驗又方治丹毒煮粟取濃汁以洗之妙又方出肘後方治火丹取曲蟮糞水和如泥塗之療面目身體卒得赤斑或黒斑如瘡狀或癢搔了腫起不即療之甚至殺人出十便良方用羚羊角或羖羊角屑三兩水一大盞濃煎摩之數百遍若無羊角用羊脂及猪脂煉候冷摩有毒者皆可用摩務令分散毒氣或水摩羚羊角塗之一方燒灰三兩細研以鷄子白調敷又方以猪槽下土泥塗之又以猪肉灼熨之即瘥療白丹方出聖惠方病原白丹者初發癢痛微煩腫如吹疹起不痛不赤而白色由挾風冷故然色白也以䜴為末和酒塗之搗香薷葉苦蓼敷之一方單用䜴為末水調塗之又方以酸模草五葉草煮汁飲之又以渣傅丹上以薺亦佳治白丹水丹著人足趺及腨脛間者作黄色如火丹状經久變紫色不療皆成骨瘡也無毒非殺人疾若成骨瘡即難瘥也經言風邪客於肌中肌虛眞氣發散又被寒氣搏於皮膚外發腠理開毫毛淫氣妄行則為癢也所以有風疹之疾皆由於此有赤疹者忽起如蚊蚤咬微煩且癢劇者少頃即漸漸腫起搔之隨手起有白疹者亦見此證也療之皆如療丹法也療之方搗白磁器屑以猪膏和塗之療丹毒或發背及諸腫遍身赤者搗鯽魚敷數易之良或但以生魚皮燒搗末以雞子白和塗之治風丹以苕菷子愼火草葉土硃三件中遇便者擂碎冷水澄濾過服之効又方蜜調土硃入酒少許服并擦疹上治一切丹毒出傅信適用方用芭蕉根搗自然汁塗及竈中黄土以水調塗又方用黄栢朴硝為末水調塗之治火燄丹并纒腰丹用生鐵為末猪膽汁為膏調即可治白丹出聖惠方燒鷄屎鷄子白和塗之或以鷄糞汁拭之治天母丹用陳壁泥炒出火毒以鷄子清調敷之又用絲𤓰水鷄毛蘸刷之或用老鴉草搗汁刷之又方出肘後方治天母丹以苧根三觔小豆四升水二斗煮浴之一方無小豆每日仍塗之又方出肘後方以生魚血塗之若走行皮中浸廣者名火丹至腹殺人或用魚膽和鹽傅之乾即易又方出聖惠方治一切丹毒流腫用䑕粘草根勿使見風洗去土搗爛貼之絞取汁飲之亦良治一切丹毒徧身方出聖惠方用蕓薹子一兩以酒一大盞和研去滓煎至七沸不拘時候温服一合莽草膏出聖惠方療身體赤癮疹而癢搔之隨手腫莽草二分當歸芎藭躑躅花大㦸細辛芍藥芫花附子炮椒各四分猪脂二觔半右切以猪膏合煎之候附子色黄膏成濾去滓收貯以傅病日三以瘥為度一方無椒延年療赤白二疹丸白术一觔蔓荆子四分防風四分附子三分炮桂心二分右搗篩蜜和為丸如梧桐子大酒服十丸日二服稍加至十五丸若能作散服一錢禁食桃李雀肉青魚鮓猪肉冷水生葱此療風疹正方凡風皆由舊來有風氣所以方中不得已用桂心附子白术既用一觔附子只有三分復有防風其防風即能斷附子毒所以一物毒有一物制伏聼進止療丹瘾疹出肘後方病原丹疹者肉色不變又不熱但起瘾疹相連而微癢故謂之丹疹以酪和鹽煮熱以摩之手下即消也又方出聖惠方以白芷根葉煮汁洗之効又方出聖惠方以愼火草葉爛搗封之甚良一方作䕶火草治凡赤疹熱時發冷即止白疹天隂冷即發方出聖惠方以酒煮石楠拭之極効又方出百一選方以酒煑蒴藋拭之良一方用葉搗塗之又方出聖惠方以白术末酒服方寸匙三日盡五觔忌桃李蒜青魚鮓雀肉又方治丹疹及燥瘤淋石灰汁漬之及洗之一方以石灰和醋調塗又方出聖惠方取芥子末以酢浆水服方寸匙日三服瘥又方出聖惠方療身體赤瘾疹而癢搔之隨手腫以礬石二兩酒三觔漬令烊拭上立瘥或但以水煮白礬汁又其赤疹心家稍虚熱氣相搏其色赤宜作芒硝湯拭之出千金方以芒硝三兩用湯一升内芒硝令消散以帛沾取拭疹即漸除湯盡更合以前二件赤白疹方一方治丹毒以芒硝細研為末水調塗之夫赤疹由冷濕搏於肌中甚即為熱成赤疹也得天熱則劇得冷即减此方療之及治一切丹毒出聖恵方取生蛇啣草搗極爛以塗之最驗白疹者由風氣搏於肌中之熱熱與風相搏遂為白疹也得天隂雨則劇出風中亦劇得晴暖則减著衣身暖亦减此方療之出聖惠方以水煮枳實拭之佳又搗末熬膏青布裹熨之又用鷄腸草生搗爛如泥封上用五六次効亦可生食煑作菜食之益人去脂膏毒氣治丹毒出百一選方用豆葉搗塗之治五色遊毒出千金方用牛糞塗之乾即易治丹毒出肘後方搗松葉塗之愈十二味單方出十便良方療丹毒或得一物瘥方水苔生地黄生松葉蒴藋葉慎火草浮萍草豆䜴水和大黄水和梔子水和黄芩水和豆葉硝右十二味但得一物搗以貼之即瘥赤小豆末和雞子塗之無雞子水和用之治纒腰丹毒出家藏經驗方先用麻油搽次用糯米同韮擂成膏塗治積年久疹有時發動用乾地黄十分甘草五分乾漆五分术五分桂一尺搗篩酒服一匙日三服療螢火丹從頭起出本草以慎火草搗和苦酒塗之療竈丹從兩脚起赤如火燒出本草用五加葉根燒灰五兩取煅鐵傢伙槽中水塗之治丹毒煩熱出本草用菉豆生硏絞汁服治火丹瘡出本草用龍葵和土搗敷之良療野火丹從背上兩脇起出本草用白殭蠶二七枚和愼火草搗塗之治大人小兒風疹出本草以吳茱萸一升酒五升煑取一升帛染拭之治熱遊赤腫出本草見本門熱腫類治熱丹赤腫出本草用括蔞為末二兩釅醋調塗之治熱丹毒癰腫出本草以陳白芨磨敷瘡上治熱腫丹毒出本草以積雪草搗敷之療煙火丹發從背起或兩脇及足赤如火出本草以景天草珎末一兩搗和如泥塗之治丹毒瘤出本草以蜈蚣一條乾者白礬皂子大一塊雷丸一箇百部二錢秤同為末醋調搽夫大人小兒瘡腫丹毒發熱疼痛不止有熱一法面北端想北滔天水山無際大寒嚴冷之氣一口吹在瘡腫之處立止用法之人大忌五辛之菜五厭之肉所病之人切忌雞猪魚酒醋濕麪等物無藥之處可用此法救人出儒門事親書疥癬附論夫疥與癬風毒客於肌膚所致也風毒之浮淺者為疥風毒之沉深者為癬疥則多因風毒挾熱得之癬則多因風毒挾濕得之疥發於手足或至於遍身癬則肌肉瘾疹或圓或斜或如苔莓走散内藏汁而外有筐二者莫不均有蟲也亦莫不易為之染觸也焮赤癢痛作瘡有膿曰大瘡隠起帶根搔不知痛曰馬疥􅂒㿔含漿摘破出水曰水疥癢而搔之皮起乾痂曰乾疥薄皮小瘡常常淫汁曰濕疥此疥之名目然也乾癬則搔出白屑索然彫枯濕癬則淫如蟲行搔之多汁風癬則爪擦痺頑不知痛癢牛癬則狀如牛領皮厚而堅其有時則微癢白點相連是之謂狗癬輪郭全無縱橫不定是之謂刀癬此癬之種類然也疥癬治法驅風殺蟲固已然殺蟲於其外亦須以硫黄輕粉蠟礬之輩服餌而内濟之庶絶其根矣若夫腫而濕者有熱槁而乾者無熱用藥加减又當權行方加減八風散出聖濟總録治風毒疥癬獨活去蘆頭四兩防風去叉黄耆剉甘草炙令赤色剉各一兩一分𤣥参苦参芎窮秦芃去苖各一兩白术炒令紫色松脂各一兩一分蛇床子三分黄連去鬚芥子天門冬去心焙各一兩丹參人參防己芍藥白歛細辛去苖葉桂去粗皮蒴藋各一兩蒺藜子炒乾去刺楓香脂各一兩一分麻黄去根節杏仁去皮尖及雙仁炒木通剉甘菊花白芷各一兩山茱萸一兩一錢生乾地黄焙二兩地骨皮菖蒲各一兩一分逺志去心一兩磁石三兩以火燒通赤入酒中淬十遍右為散每服二錢空心用生薑蜜湯調下晩再服漸加至三服䕡茹膏出千金方治一切惡瘡疥癬疽瘤䕡茹狼牙青箱地榆藜蘆羊蹄根當歸扁畜各二兩蛇床子白歛各六分漏蘆二分右搗以苦酒浸一宿明旦以煎成猪膏四升煎三上三下膏成絞去渣加後藥如左雄黄雌黄硫黄礬石胡粉松枝各二兩水銀三兩右細研看水銀散盡即傾前件膏中以十隻筯攙數百遍止用磁器宻貯封固勿令泄氣煎膏法必㣲火敷藥不可近目及隂先硏雄黄等令細候膏小冷即和傅之瘡藥如神膏黄芩黄蘖黄連當歸鬚川芎白芷𤣥參殭蠶防風斑猫十枚全蝎十枚蛇床子荆芥花椒檳榔巴豆十粒紫草右㕮咀入香油半碗浸藥春秋五日夏三冬七熬黑色為度再下烏桕油一小碗半寸斷栁槐條一握及用槐栁枝條攪令勻濾浄再下硫黄雄黄黄丹輕粉隨多少用下明礬一錢為率先用乳香研細下急攪勻候只將油敷瘡瘡藥方出瘡科精要治諸般疥癬小兒眉臉盛風並皆治之輕粉一錢雄黄一錢大楓子肉三錢蛇床子半升膽礬一錢半芒硝二錢半明礬一錢半信一錢半右為末用黄龍骨青龍皮龍鬚各一兩半納香油六鍾熬枯去渣又加入黄蠟硫黄各一兩半同藥末和膏於瓦瓶内收貯用之佳烏蛇散一名五參散出聖惠方治疥癬久不瘥遍身頭面皆生皮膚瘙癢烏蛇酒浸炙黄色去皮骨三兩漏蘆去蘆頭一兩半大黄剉碎炒令香𦍑活去蘆頭丹參沙參去蘆頭𤣥參五加皮甘草炙赤色剉白殭蠶炒乾蝎炒去土各一兩麻黄去根節二兩附子炮裂去皮臍半兩右為散每於食後薄荷湯調下二錢至晩再服以瘥為度一方無乾蝎天麻膏出瘡科精要治疥癬赤秃手足癬皮剥起瘑瘙疳瘡侵蝕疼痛膿汁浸淫蔓延經久不瘥者草烏頭釣苓根木鱉子用仁天麻藜蘆川芎狼毒輕粉各二分粉霜二分另研黄蠟六兩臘猪脂二兩油一觔右細剉如麻豆大於油内煎至焦紫色令冷濾去滓上火入黄臘猪脂鎔開再重綿濾過入輕粉粉霜攪凝磁盒内收貯用以塗之黄耆丸出瘡科精要治腎臟風虛攻注手足頭面麻痺痛癢或生疥癬腫焮黄耆烏藥茴香炒地龍去土川椒去目川練子炒防風赤小豆白蒺藜去刺海桐皮威靈仙陳皮各等分右為細末酒糊為丸如梧桐子大每服三十丸空心温酒送下天麻散出瘡科精要治白秃疳瘡及風毒疥癬藜蘆天麻狼毒白芷菌草釣苓根草烏頭管仲細辛各半兩輕粉一錢雄黄二錢右為細末每用藥半兩紙一重綿裹入油三兩浸經三日外蘸指擦患處如稍乾更添油二兩添至三兩止換藥其効如神疥癬藥方輕粉一錢雄黄一錢大楓子三錢蛇床子半升膽礬明礬信各一錢半芒硝二錢半硫黄一兩半已上為細末黄蠟一兩半香油六兩右用槐條栁皮各一兩葱鬚二兩二味下清油熬枯不用濾出下黄蠟鎔化次下前藥再攪少時為度除濕散大治一切風毒疥癬瘙癢狀如風癩苦參何首烏荆芥穗蔓荆子薄荷各一兩白芷天麻川芎防風並生用烏蛇酒浸二宿焙各半兩右為細末每服三錢茶酒下無時日進三服六日一浴令汗出宣通一月膚澤如故苦參丸出聖惠方治遍身瘙癢癬疥瘡瘍苦參四兩𤣥參黄連去鬚枳殻去瓤麩炒獨活去蘆頭大黄剉碎炒香熟防風各二兩去尖黄芩去黑心梔子菊花各一兩右為細末搗千下丸如梧桐子大每服三十丸漿水下食後日進三服茶酒任下亦得如聖散治疥風瘡癬蛇床子四兩黄栢苦參䕡茹各二兩白礬狗脊藜蘆剪草輕粉胡粉各半兩右為細末清油調搽治疥疽諸瘡方出千金方水銀胡粉各六分黄連黄蘖各八分薑黄十分礬石附子苦參蛇床子各三分右水銀胡粉另研如泥餘為末以煎成猪膏合和研令調以敷之一方無薑黄丹砂膏出聖惠方治久疥癬瘡癢不止宜用此殺蟲丹砂雄黄雌黄各三兩乳髪洗浄松脂白蜜䕡茹各三兩猪脂二觔巴豆十四枚去皮心細研右先以猪脂煎髮消盡内松脂蜜三上三下去渣内諸末更煎一沸上以敷之一方用蠟不用蜜徐長卿散塗方出聖濟總録治諸疥癬久不瘥者苦參附子生去皮臍吳茱萸泡焙乾炒旱蓮子細辛石硫黄菖蒲半夏生用右等分搗羅為散先以油煎葱白色黄将油和藥末塗仍先以湯浴了手足並用被覆更将火桶子安被内蓋令熱兩上瘥大黄膏治惡疥癬瘡信一錢半巴豆仁雄黄各一錢大黃黄芩黄連硫黄各二錢黄栢四錢右用好酒煮巴豆焦黑去巴豆不用入黄蠟四錢作麪入油量稀稠擦塗八仙散出瘡科精要治遊風腫癢疥癬或因洗頭遊風瘙癢生瘡細辛荆芥白芷川芎黄芩防風甘草地骨皮各等分右為粗末每用藥二兩水兩碗煎十沸去滓熱搨患處何首烏散出和劑方治脾肺風毒攻衝遍身疥癬瘙癢或生瘾疹搔之成瘡肩背拘攣肌肉頑痺手足皴裂風氣上攻頭面生瘡及治紫癜白癜頑癬荆芥穗蔓荆子去白皮蚵蚾草去土威靈仙洗浄防風去蘆叉何首烏去蘆叉甘草炙右各五升搗羅為末每服一錢食後温酒調下沸湯亦得袪風丸出聖濟總録治一切疥癬頑瘡槐芽焙乾皂莢芽焙乾各一觔苦參三兩防風去义𦍑活去蘆頭各三兩三分烏蛇一條酒炙去皮骨史君子一兩半右為末煉蜜和丸如梧桐子大每服三十丸空心酒下夜蜜湯下水銀膏治瘑瘡疥癬無名惡瘡但是手足瘡疥浸淫多汁久而蟲生塗之黄蠟一兩䕡茹一兩剉蛇床子微炒白礬枯水銀各二兩黄連剉二兩右用臘猪脂七兩熬膏下三件剉藥煮至焦紫色去渣再入蠟鎔開出火稍凝下水銀礬石攪勻每用塗摩如意散出直格方治疥癬無時痛癢愈發有時不已久新者吳茱萸牛蒡子荆芥各一兩牡蠣半兩輕粉半錢信砒二分右為細末硏勻每服臨臥炒一錢油調遍身搓摩上一半如後有癢不止更少旋塗之股脾之間聞香悉愈出宣明論海桐散治疥癬海桐皮䕡茹黑狗脊蛇床子硫黄各半兩輕粉一錢七分右為細末油調擦疥癬上薰鼻中一掃散治疥癬荆芥防風地骨皮薄荷甘草苦參右各等分兩為細末蜜為丸空心茶清送下或用散凉蜜水下不過三五服即痊可大人每服用三錢苦參丸治疥癬苦參荆芥何首烏威靈仙胡麻子蔓荆子各等分右為細末水糊為丸如梧桐子大每服三十丸茶湯送下食後服治疥癬硫黄井泉石鵝管石白礬黄栢雄黄各等分右為末香油調搽治疥癬雄黄盆硝雌黄半錢舶上硫黄半錢人言少許斑猫少許右為末用黄蠟小油少許和為一塊外用小油化開擦之治遍身瘙癢明目爽神威靈甘草石菖蒲苦參胡麻何首烏藥末二錢酒一碗渾身瘙癢一時無樺皮散出和劑方治肺臟風毒遍身瘡疥及瘾疹瘙癢搔之成瘡又治面上風刺及婦人粉刺杏仁去皮尖用水一碗於銀銚内熬候水减一半取出放冷乾荆芥穗各二兩枳殼去瓤用炭火燒存性取出於濕紙上冷樺皮燒成灰各四兩甘草炙半兩右除杏仁外餘藥都搗羅為末却将杏仁另研令極細次用諸藥末漸漸入研令勻每服二錢食後温酒調下日進三服瘡疥甚者每日頻進大檳榔散出瘡科精要治乾濕疥癬輕粉一錢硫黄一錢黑狗脊半兩紅娘子一箇大檳榔一箇右為細末每用藥半錢放手掌中臨臥時油調如糊兩手搓摩極熱鼻内聞之及摩擦疥上隔日再用甚者不過三上治久疥癬方出聖惠方白礬半兩搗為末亂髮兩塊雞子大右用清麻油一盞煎如稀餳輕粉罩連炙塗一兩上立効又方出聖惠方鷰子糞㣲炒斑猫燒灰右等分搗為末油調塗之治一切風癬疥癩腎溼下注風瘡成片經年不瘥者􅂒瘡等疾亦治之羊蹄根五塊用乾地上獨行赤色者佳近水黒义根不可用肥皂莢白礬少許生薑一塊明硫黄少許右用搗極細丸如彈子大先以温漿水淋洗瘡去膿血痂㾦以軟帛拭乾然後用藥丸滚搽瘡上停一時辰再用淡漿水不犯手淋洗浄須臾間瘡上追出紅血絲網為度此係瘡内風蟲也見此即瘥如不愈隔一二日再如此上藥治之二三次必愈如藥丸乾了以蜜和開再丸之瘡生過脚面以軟乾柿薄切片子榻上即瘥防風羌活散治疥癬風瘡防風羌活全蝎薄荷荆芥各一兩右為細末每服三錢酒調服茶清亦可無時服治久疥癬水銀礬石黄連一作雄黄蛇床子各一兩右為末以猪脂七合和攪不見水銀為度熟傅之一方加藜蘆一兩又云䕡茹一兩療諸瘡神驗無比雄黄散治疥癬石膏牡蠣燒各一兩雄黄一錢硫黄三錢右為細末好油一盞内巴豆仁十箇熬紫焦去巴豆調藥抹擦疥癬防風丸治一切風瘡疥癬皮膚搔痒成瘾疹防風去叉蟬殼各一兩半猪牙皂莢酥炙去皮子一兩半天麻二兩右搗為細末用精羊肉煑熟搗爛以酒熬為膏丸如菉豆大每服三十丸荆芥或酒茶湯下四生散治腎臟風疥癬等瘡及眼目昏花視物不見此藥主之一名四聖散白附子下注生瘡用黑附子沙苑蒺藜黄耆羌活各二兩右為細末每服二錢鹽酒湯下空心服若於猪腰子切開夾藥在内合定拴住紙裹煨熟尤妙又有患赤眼晴痛不可忍臨臥一服目反大痛至二鼔時方得睡更三四服乃愈再有頑癬經年服藥俱不効後得此藥三四服盡除此方治人腎臟風及眼疾頑癬無不効治疥癬方用藜蘆細搗為末以生油調敷之治疥癬膿泡以五倍子燒存性為末栢油調塗治疥癬風瘡用狗舌草為末和塗之即瘥四月五日採莖暴乾防風散治諸癬疥防風去叉天麻各二兩陳橘皮湯浸去白焙一兩右為細散每服三錢空心酒調服治脾肺風毒攻衝生瘡癬方升麻桃白皮苦參各半兩右細剉用水二斗煎取一斗去滓候温洗之治諸瘡疥癬久不瘥者水銀一觔臘月猪脂五觔右以鐵器中壘竈用馬通火七日七夜勿住火出之停冷取膏去水銀不妨别用以膏傅一切瘡無不應手立瘥一方又用水銀粉和猪脂塗之又方特牛尿一用乳牛尿升羊蹄根半觔切右以牛尿漬羊蹄根一宿日曝乾復内尿中取盡止作末傅諸瘡一方和猪脂用更精滑肌散治風邪客於肌中渾身瘙癢至生瘡疥及脾肺風毒攻衝遍身瘡疥皴裂乾濕發瘡日久不瘥皆治之剪草七兩忌見火輕粉一錢右為細末瘡濕用藥乾摻瘡乾用麻油調藥傅之烏龍丸治遍身風瘡瘙癢疥癬等疾服之清風熱利膈化痰唾治肺氣不和此藥推陳致新去腸垢治證甚多要能用度皂角肥者不拘多少炙刮去皮弦搥碎甜水煮熟取濃汁去滓銀器内熬成膏放冷黑牽牛不拘多少微炒令香熟研取頭末右將藥末與皂角膏和丸如梧桐子大每服三五十丸氣血虛者一二十丸食後温水送下無病氣實人一兩箇月一服取利三五行不傷正氣身體輕健肌膚光澤永無風痰疥癬之疾一方用酒下治疥癬諸瘡治肺受邪毒運於四肢久而不散以生内蠧硫黄舶上白礬枯各半兩右為細末乾者香油調敷溼者乾摻蒼术丸蒼术米泔浸去皮何首烏半觔右為細末酒糊為丸如梧桐子大每服六七十丸空心酒下疥癬惡瘡方以滿尺不蛀皂角三條炙去弦核為末米醋二大盞煑如鎔膠濾清汁入黄連末半兩輕粉二錢調抹候癬發時惡水出便可先以椿樹白皮搔破後塗藥三兩上便瘥凡諸瘡癬初生時或始痛癢即以後各單方救之出肘後方用鹽嚼塗之又以榖汁傅之又以蒜墨和傅之千金翼蒜作酥又以薑黄傅之又以鯉魚鮓糝傅之又以牛李子汁傅之若不瘥以前諸大方治之如聖散出瘡科精要治渾身瘙癢抓之成瘡及病丙穩禾疹之類右以蠶沙一升水二斗煎至一斗濾去滓夜卧避風處淋洗水冷即拭乾便睡治久疥癬出濟生㧞粹方以臘猪脂不拘多少同生白礬杏仁少加輕粉搗爛擦之治疥癬有汁以松脂末入輕粉先用油塗却摻上松脂一二次即安頑者三兩度瘥治頑癬久不瘥者用防風通聖散一帖全料依方法煎熟乗熱於浴堂内服之次先合下梨蘆荆芥各等分為細末每用一抄就於浴堂内乗熱用手揉揩藥於瘡患處如燥冄用藥揉揩候藥在身上良久然後冄澆湯用手不住揉揩為妙次用温湯豁去展拭乾出最妙山梔子散出聖濟總録治一切癬疥搗山梔子仁為細末炒過以蜜蒸三五度五更時酒湯下一匙許疥藥神効散出徳生堂治乾濕膿窠諸腫疥癬等證有効梹榔一兩全蝎半兩蛇床子一兩倭硫黄一兩半右化開硫黄入荆芥穗末滚數沸候冷再加輕粉二錢再碾又加山茶半兩更妙右為細末先將小油滚過候冷調藥擦瘡上仍以兩手搓藥開氣神効用荆芥末三錢附子膏出聖惠方治一切疥癬惡瘡不瘥附子一枚剉搗為末鯽魚一枚長五寸亂髮如雞子大猪脂四兩右先以猪脂煎魚亂髮令消濾去渣入附子末熱攪膏成旋取塗之四聖膏治風疳癬疥或痛經年不効者及一切惡瘡清油半觔巴豆去皮三錢當歸半兩輕粉一錢右將油慢火熬次下巴豆當歸熬至黒焦不用又下黄蠟輕粉鎔開冷定盆子盛每用量瘡搽之臭黄膏出聖惠方治風瘡疥癬久不瘥臭黄研亂髮燒灰蕪荑各半兩硫黄一分細研杏仁半兩湯浸去皮尖雙仁研吳茱萸半兩粉脚半兩細研右為細末散以生麻油調塗於兩手心合手於股内夾藥一宿如未痊者次夜更塗兼喫蜜酒使醉神効水銀膏出聖惠方治疥癬瘡經年不瘥水銀白礬蛇床子雄黄䕡茹已上各一兩右入煉好猪脂半觔都研候水銀星盡便用敷之日三兩上兼治小兒頭瘡浴遍身瘡疥及厲風癬以滚鹽水浴之極妙治癬及惡瘡疥蜘蛛咬者用生鐵同蒜磨生油敷並得治疥癬滿身作瘡不可治者出肘後方用何首烏以水煎令濃於盆中洗之甚能解痛生肌一方有艾等分治白癜癧痬及風惡瘡癬用絡石木連藤取汁敷瘡上治久疥癬方出聖惠方用川烏頭七枚生用搗碎以水三大盞煎一大盞去渣温洗之神効療熱瘡疥癬癢痛不可忍者先用泔清洗瘡去痂拭乾看瘡大小用硝石硏末和生麻油如麪糊以塗瘡上三兩度瘥治一切疥癬方出聖惠方取巴豆四五粒細研以油一合半以慢火熬一食久先喫山梔子湯一碗夜塗此藥一兩上瘡痂乾剥落神効三黄膏出楊氏家藏方治瘡癬疥癆紫白癜風雄黄另研雌黄另研砒另研三味各半錢白礬另研蛇床子取末䕡茹三味各一兩白膠香一錢叧研輕粉黄丹右􅟢用麻油四兩入巴豆四枚煎黄色去巴豆入各衆藥又入黄蠟少許熬成膏子先用荆芥湯洗後用藥摻之麝香䕡茹散出楊氏家藏方治疥癬麝香另研三錢水銀一分白錫一分結砂子右件䕡茹末同研勻每用三錢生麻油調成膏抓破瘡疥擦之日三兩次用苦參丸出御藥院方治肺毒邪熱頭面生瘡疥癬並宜服之苦參右為細末粟米和飯丸如梧桐子大每服三十丸空心米飲送下栢脂膏出濟生㧞萃方治乾溼疥癬栢油一觔黄蠟半觔杏仁四十五箇剉碎朴硝一撮右研巴豆令極細餘並為細末入巴豆和勻煉蜜丸如梧桐子大治疥癬出本草粉霜雄黄雌黄末各一錢半藜蘆末一兩汞二錢摩風膏半兩右打和葱煎清油調搽又方出永類鈐方以夜卧醒不語津搽甚良又方出永類鈐方用醋磨鐵銹水兼炒過青鹽白礬擦之又方出永類鈴方刮東向見日壁泥摩擦良又方出永類鈴方以雞子殼燒灰油調搽一上散出誠効方治諸般疥癬必効雄黄通明者可用碎熟硫黄各半兩斑猫三個去翅足研碎黑狗脊五錢寒水石六錢蛇床子半兩炒右另研雄黄硫黄寒水石如粉次入斑猫和勻蛇床子黑狗脊另為細末同研勻先用湯洗疥癬去痂油調手中擦熱鼻中嗅三兩次擦上可一上即愈也如痛甚腫滿髙起者加寒水石一倍如不苦癢只加狗脊如㣲癢只加蛇床子如瘡孔中有蟲加雄黄如喜火炙湯燙者加硫黄即嗅不止亦愈治一切男女人渾身疥癬一家易染經年搔痒不効者出䕶命方百部半兩碎切亂髮木香碎切㯽榔搥碎苦參各一分碎切南椒三錢鯽魚一觔不要見水切成片右以油五兩煎令得所去藥却用麝香一分膩粉一錢硫黄半兩雄黄半兩同研令勻入在油内更煎攪五七沸磁器盛之非時使也三神丸出十便良方治一切疥癬地龍二條蝎稍三枚去毒白殭蠶二十四枚炒去絲嘴右􅟢藥研令極細分作二服小兒作五服温酒調下服藥了然後浴五龍膏出十便良方治疥癬硫黄白礬白芷川椒吳茱萸右五味等分為細末煎油調塗之去風瘙疥癬出本草用碧海水煮浴之治䘌蝕疥癬瘻蟲咬出本草以鹽膽水敷之瘡有血者不可敷治瘡痍風瘙瘙癢疥癬出本草以鈞樟皮煎湯洗之治乾濕癬疥出本草以胡粉一分粉之即瘥治瘡疥癬出本草取野苧根醋摩敷之治疳䘌疥癬出本草以海桐皮水煮服治風疹疥癬出本草以積雪草用鹽挼汁傅之又方出本草取栁白皮細切以猪脂煎取汁傅之治疥癬出本草用礬石和桃仁葱湯浴之可出汗也治疥癬瘡出本草以百部根火炙浸酒空腹飲之治蟲瘡疥癬出本草用翦草浸酒服之治疥癬出本草以槐葉煎湯服皮莖同用治疥癬蟲瘡毒腫出本草以甖盛桐子瀝入油摩傅瘡上治疥癬殺蟲出本草以硫黄生研傅之治疥癬惡瘡出本草以天南星搗敷之治風瘡疥癬出本草用鬼皂莢作湯浴之治疥癬風瘙出本草用蒴藋皮作湯浴之良治惡瘡疥癬用石灰淋汁洗之又方用菖蒲根搗為末油調塗之又方用鴛鴦肉以酒浸汁令熱傅瘡上令更易其肉不可食即棄之又方用羊蹄根搗絞取汁入膩粉少許調如膏塗癬上三五遍即痒如乾即用猪脂調和敷之普濟方卷二百七十九
